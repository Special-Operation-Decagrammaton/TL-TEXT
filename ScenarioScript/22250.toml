[translation]
22250-1 = "Episódio 25; Millennium Science School"
22250-3 = "(E assim, ao unir forças, conseguimos resolver......)"
22250-4 = "(a ameaça que poderia ter se tornado um perigo para a Millennium―― e, por extensão, para Kivotos. E viveram felizes para sempre.)"
22250-6 = "......Decidi que encerrarei as instalações de Eridu sob minha responsabilidade."
22250-7 = "[s] \"Bom trabalho. Obrigado, Himari.\""
22250-8 = "......Conseguimos prevenir a ameaça daquela época, mas #n ainda nada foi resolvido, não é?"
22250-9 = "Como Chefe do Departamento de Investigação de Fenômenos Ocultos, é algo que não posso ignorar...... #n Haa...... Às vezes me pergunto por causa de quem toda essa confusão aconteceu."
22250-10 = "Bem, vamos considerar que estou fazendo isso por causa dessa 'certa pessoa', não vamos?"
22250-11 = "A hacker super genial, frágil e bonitinha vive ocupada, sabe...... francamente."
22250-12 = "[s] \"Ahaha, conto com você.\""
22250-14 = "Seminar - Escritório"
22250-15 = "(E quanto à pessoa envolvida, a Rio――)"
22250-25 = "Presidente Rio!? Do que você está falando de repente!? #n Renunciar ao cargo de presidente!"
22250-26 = "Ei, Presidente!? Onde você está!?"
22250-27 = "......Ah."
22250-28 = "Yuuka-chan, tem uma mensagem da Presidente aqui."
22250-29 = "Eh? Uma mensagem!? #n Deixa ver..."
22250-34 = "'Me desculpe'......?"
22250-35 = "..............."
22250-36 = "......A, pedir desculpas não vai resolver esse problema, né!? Presidente――!?"
22250-38 = "(Enquanto isso, na C&C......)"
22250-39 = "Para comemorar a alta da líder~! Um brinde!"
22250-40 = "Um brinde."
22250-41 = "Sim, um brinde~"
22250-46 = "......Que barulheira é essa?"
22250-47 = "Fufu. #n Como a líder recebeu alta com segurança, decidimos fazer uma festa de comemoração."
22250-48 = "É por isso que a C&C inteira está reunida aqui hoje!"
22250-49 = "Não, eu entendo isso, mas...... por que o Sensei está aqui?"
22250-50 = "[s1] \"Eu fui convidado. Neru, parabéns pela alta.\"\n[s2] \"Será que eu estou atrapalhando?\""
22250-51 = "A, ah...... obrigada......"
22250-52 = "Ugh......! Não, não é nada disso, mas..."
22250-53 = "Venha, venha, Mestre, beba! Beba!"
22250-54 = "Tem um montão de 'Youkai MAX' que a Veritas preparou, viu!"
22250-55 = "[s] \"......Ah, entendi. Então isso é Youkai MAX.\""
22250-56 = "Asuna-senpai, se você insistir assim, o Sensei vai ficar sem jeito......"
22250-58 = "Fufu. Karin, não tem problema ser hoje, tem?"
22250-59 = "Não é, Sensei?"
22250-60 = "[s] \"Por mim tudo bem, mas......\""
22250-61 = "Hmm, será que isso não animou o clima?"
22250-62 = "Ah!"
22250-63 = "Já sei! Todos preferiam que estivéssemos vestidas de coelhinhas?"
22250-64 = "Não acha, Mestre?"
22250-65 = "Vestida de coelhinha... isso, é um pouco complicado......"
22250-66 = "Não...... mas, se o Sensei quiser ver...... acho que não seria impossível..."
22250-67 = "[s] \"T, tudo bem! Vão acabar olhando para vocês de um jeito estranho!\""
22250-68 = "Haa...... para quem é essa festa, afinal..."
22250-69 = "Entendo...... então até a festa de comemoração é no estilo coelhinha."
22250-70 = "Então esse é o estilo da C&C. Aprendi uma coisa nova."
22250-71 = "......Hã?"
22250-72 = "Ara."
22250-73 = "......!"
22250-74 = "Aha♪"
22250-75 = "Cheguei atrasada, senpais."
22250-76 = "Ooi~ Toki-chan!"
22250-77 = "N, na... não... por que você está... aqui...!?"
22250-78 = "Ouvi dizer que este seria um banquete com a C&C reunida, então resolvi vir."
22250-79 = "Você não é subordinada exclusiva da Presidente!?"
22250-80 = "......Infelizmente, a Presidente desapareceu."
22250-81 = "Como não sabia o que fazer, me lembrei da C&C."
22250-82 = "Não me venha com essa, quem é que aparece na festa de alta da pessoa que você espancou!?"
22250-83 = "......Sim?"
22250-84 = "Hã! Não me olhe como se eu estivesse errada!"
22250-85 = "Ah! Líder, que grosseria! A Toki-chan veio de bom grado!"
22250-86 = "Não, não... ela era nossa inimiga até outro dia, não era!?"
22250-87 = "[s] \"Dizem que quanto mais brigam, mais se tornam amigas.......\""
22250-88 = "Ei! Até o Sensei está defendendo ela!?"
22250-90 = "Ah, Toki-chan. Já que está aqui, quer comer uns doces?"
22250-91 = "Obrigada."
22250-92 = "Sim! O próximo é esse!"
22250-94 = "......Hmm, o sabor do Youkai MAX é profundo."
22250-95 = "Hãaaaaaaa!?!?"
22250-96 = "............"
22250-97 = "Haa...... bem, tudo bem."
22250-98 = "[s] \"Neru......?\""
22250-99 = "Bem, no fim das contas, seguir ordens superiores é o que a C&C faz."
22250-100 = "――Você também só executou as ordens da Presidente, não foi?"
22250-101 = "A Neru-senpai é mais compreensiva do que eu pensava."
22250-102 = "Por culpa de quem você acha que é!?"
22250-103 = "Mas, tirando isso...... você é muito boa. #n Luta de um jeito bem eficiente."
22250-104 = "Sim, se eu estivesse em perfeitas condições, a Neru-senpai seria..."
22250-105 = "Venha, Toki-chan. Experimente este Youkai MAX também."
22250-107 = "Sim, espere, ... Akane-senpai, isso, ugh..."
22250-111 = "......Hã? O que foi?"
22250-112 = "[s] \"......Parece que vai ficar bem animado daqui para frente.\""
22250-118 = "(Mesmo depois de eventos tão intensos, o tempo continua a fluir como sempre――)"
22250-142 = "(E aqui não é diferente――)"
22250-144 = "[ns] \"......Foi assim que fui chamado aqui.\""
22250-145 = "Ah! Sensei! Bem-vindo!"
22250-146 = "Acabamos de começar nosso grupo de estudo!"
22250-147 = "[s] \"......Estudo de quê?\""
22250-148 = "É claro que é!"
22250-149 = "O estudo para criar nosso próximo jogo: #n 'RPG Estratégico de Coleta onde você transforma monstros fofinhos de beira de estrada em aliados para conquistar o mundo'!"
22250-150 = "[s] \"O gênero não mudou desde a última vez que falamos!?\""
22250-151 = "Ah, sobre isso, nossas ideias travaram um pouco... então... #n decidimos virar a mesa..."
22250-152 = "Minha irmã disse que queria tentar um gênero novo..."
22250-153 = "[s] \"......De novo?\""
22250-154 = "D, dizer 'de novo' é muito cruel...! #n Desenvolvimento de jogos é assim mesmo, sabia!?"
22250-158 = "Waaaah! Aris, não consigo transformar esse monstro fofinho em amigo!"
22250-159 = "Ah! Aris! Primeiro você precisa reduzir o HP dele na batalha!"
22250-160 = "Aí vai ficar mais fácil de capturar!"
22250-161 = "Mas o monstrinho não fez nada... #n A Aris tem que bater nele primeiro?"
22250-162 = "Hmm, pensando bem, talvez... seja um pouco estranho...?"
22250-163 = "Uuuu, mas jogos geralmente funcionam assim..."
22250-164 = "Ei! Parem de falar besteira! Vamos analisar isso direito!"
22250-166 = "B, bem, não precisa ter pressa......"
22250-167 = "[s] \"Certo. Então vamos fazer juntos.\""
22250-168 = "Sim! Sensei senta aqui! Do lado da Aris!"
22250-169 = "Muito bem! Já que todos se reuniram, vamos começar a batalha em equipe!"
22250-170 = "Haa...... tá bom."
22250-171 = "Fufu, sim......"
22250-173 = "(Enfrentamos muitos obstáculos, #n às vezes brigamos, nos ferimos e sofremos derrotas――)"
22250-174 = "(Mesmo assim, a aventura da heroína e seus companheiros continuará――)"
22250-175 = "(Sim, para sempre――)"
22250-178 = "#video;11000"