[translation]
22250-1 = "Episódio 25; Millennium Science School"
22250-3 = "（E assim, graças aos esforços de todos, Eridu foi...）"
22250-4 = "（...conseguimos resolver a crise que poderia ter se tornado uma ameaça para Millennium — e, por extensão, para Kivotos. E viveram felizes para sempre.）"
22250-6 = "…Decidi que assumirei a responsabilidade pelo fechamento das instalações de Eridu."
22250-7 = "[s] \"Bom trabalho. Obrigada, Himari.\""
22250-8 = "…Conseguimos evitar a ameaça daquela vez, mas...#nainda não resolvemos nada, não é?"
22250-9 = "Como chefe do Departamento de Investigação de Fenômenos Ocultos, é algo que não posso ignorar...#nAh... às vezes me pergunto por culpa de quem tudo isso aconteceu."
22250-10 = "Bem, vamos dizer que estou fazendo isso por causa de 'certa pessoa'..."
22250-11 = "Uma super gênio hacker, linda e doente, está sempre ocupada, afinal... francamente."
22250-12 = "[s] \"Ahaha, conto com você.\""
22250-14 = "Seminário - Sala de Trabalho"
22250-15 = "（E quanto à Rio, a principal envolvida...）"
22250-25 = "Presidente Rio!? O que você está dizendo de repente!?#nComo assim, renunciar ao cargo de presidente!?"
22250-26 = "Ei, presidente!? Onde você está!?"
22250-27 = "…Ah."
22250-28 = "Yuuka-chan, tem uma mensagem da presidente aqui."
22250-29 = "Hã? Uma mensagem!?#nDeixa eu ver..."
22250-34 = "“Me desculpe”...?"
22250-35 = "…………………"
22250-36 = "…Ah, um pedido de desculpas não vai resolver isso, vai!? Presidente!!??"

22250-38 = "（Enquanto isso, na C&C...）"
22250-39 = "Para comemorar a alta da nossa chefe! Um brinde!"
22250-40 = "Um brinde."
22250-41 = "Sim, um brinde~"
22250-46 = "…Que barulheira é essa?"
22250-47 = "Fufu. #nComo a chefe recebeu alta, decidimos fazer uma festa de comemoração."
22250-48 = "Por isso a C&C inteira está reunida aqui hoje!"
22250-49 = "Não, eu entendo isso, mas... por que o Sensei está aqui?"
22250-50 = "[s1] \"Fui convidado. Neru, parabéns pela alta.\"\n[s2] \"Será que minha presença está incomodando?\""
22250-51 = "Ah, ah... obrigada..."
22250-52 = "Ugh...! Não, não é nada disso, mas..."
22250-53 = "Vamos, vamos, Mestre, beba! Beba!"
22250-54 = "Temos um monte de Youkai MAX que a Veritas preparou!"
22250-55 = "[s] \"...Ah, sim. Então é Youkai MAX.\""

22250-56 = "Asuna-senpai, se você insistir assim, o Sensei vai ficar sem jeito..."
22250-58 = "Fufu. Karin, não tem problema só por hoje, não é?"
22250-59 = "Não é, Sensei?"
22250-60 = "[s] \"Por mim tudo bem, mas...\""
22250-61 = "Hmm, será que isso não animou o clima?"
22250-62 = "Ah!"
22250-63 = "Já sei! Será que todos preferiam que estivéssemos vestidas de coelhinhas?"
22250-64 = "Né, Mestre?"
22250-65 = "Vestidas de coelhinhas... isso é um pouco complicado..."
22250-66 = "Não... mas, se o Sensei quiser ver... acho que não seria impossível..."
22250-67 = "[s] \"N-não precisa! Vão acabar olhando para vocês de um jeito estranho!\""
22250-68 = "Ah... pra quem será que é essa festa, afinal..."
22250-69 = "Entendo... então até a comemoração é no estilo coelhinha."
22250-70 = "Então esse é o estilo da C&C. Aprendi algo novo hoje."
22250-71 = "…Hã?"
22250-72 = "Ora."
22250-73 = "……！"
22250-74 = "Ahá♪"
22250-75 = "Peço desculpas pela demora, veteranas."
22250-76 = "Opa, Toki!"
22250-77 = "Ma-mas... não... por que diabos você está... aqui...!?"
22250-78 = "Ouvi dizer que este era o banquete de comemoração da C&C, então resolvi aparecer."
22250-79 = "Você não é a guarda-costas pessoal da Presidente!?"
22250-80 = "……Infelizmente, a Presidente desapareceu."
22250-81 = "Fiquei sem saber o que fazer, e então... lembrei-me da C&C."
22250-82 = "E por acaso isso é motivo para aparecer na festa de alta de alguém que você mesma espancou!?"
22250-83 = "……Sim?"
22250-84 = "O quê!? Não me olhe como se eu estivesse errada!"
22250-85 = "Ah! Chefe, que grosseria! A Toki veio até aqui nos visitar!"
22250-86 = "Não, não... até outro dia ela era nossa inimiga, esqueceu!?"
22250-87 = "[s] \"Dizem que quem briga, se ama...\""
22250-88 = "Ei! Até você, Sensei, vai ficar do lado dela!?"
22250-90 = "Ah, Toki. Já que está aqui, quer comer alguns doces?"
22250-91 = "Agradeço."
22250-92 = "Aqui! O próximo é este!"
22250-94 = "……Hmm, o sabor do Youkai MAX é bem profundo."
22250-95 = "O QUÊ!?!?"
22250-96 = "…………"
22250-97 = "Haa... bom, tanto faz."
22250-98 = "[s] \"Neru...?\""
22250-99 = "Bem, no fim das contas, fazer o que nos mandam é o trabalho da C&C."
22250-100 = "――Você também só estava cumprindo as ordens da Presidente, afinal."
22250-101 = "A veterana Neru é mais compreensiva do que eu pensava."
22250-102 = "E de quem você acha que é a culpa!?"
22250-103 = "Mas, ainda assim... você é muito boa. #nSeu estilo de luta é bem eficiente."
22250-104 = "Sim, se eu estiver em perfeitas condições, contra a veterana Neru..."
22250-105 = "Vamos, Toki. Experimente este Youkai MAX também."
22250-107 = "Sim, espere, ...veterana Akane, isso, ah..."
22250-111 = "……Ah? O que você disse?"
22250-112 = "[s] \"……Parece que as coisas vão ficar bem agitadas por aqui.\""
22250-118 = "(Mesmo depois de um incidente tão grande, o tempo continua passando como sempre――)"
22250-142 = "(E aqui não é diferente――)"
22250-144 = "[ns] \"……Então, fui chamada para vir aqui.\""
22250-145 = "Ah! Sensei! Bem-vindo!"
22250-146 = "Estávamos justamente fazendo um grupo de estudos!"
22250-147 = "[s] \"……Estudo sobre o quê?\""
22250-148 = "Ora, é claro que é sobre!"
22250-149 = "O nosso próximo jogo: #n\"RPG de estratégia e coleta onde você conquista o mundo enquanto faz amizade com monstros fofos da beira da estrada\"!#"
22250-150 = "[s] \"Não mudou nada do gênero que você disse antes!?\""
22250-151 = "Ah, sobre isso, é que as ideias travaram um pouco, então... #nchutamos o balde e..."
22250-152 = "Minha irmã disse que queria tentar um gênero novo..."
22250-153 = "[s] \"……De novo?\""
22250-154 = "Dizer \"de novo\" é muita crueldade...! #nDesenvolvimento de jogos é assim mesmo, sabia!?"
22250-158 = "Waaaaah! Alice, não consigo fazer amizade com esse monstrinho fofo!"
22250-159 = "Ah! Alice! Primeiro você precisa reduzir o HP dele na batalha!"
22250-160 = "Assim vai ser mais fácil de capturar!"
22250-161 = "O monstro não fez nada...#nE a Alice vai lá e bate nele primeiro?"
22250-162 = "Hmm, agora que você falou... talvez isso seja um pouco estranho...?"
22250-163 = "Uuuuh, mas os jogos não funcionam assim por padrão...?"
22250-164 = "Ei! Parem de falar besteira! Vamos analisar isso direito!"
22250-166 = "É que, v-você pode ir com calma..."
22250-167 = "[s] \"Certo. Então, vamos fazer isso juntos.\""
22250-168 = "Sim! Sensei, aqui! Sente-se ao lado da Alice!"
22250-169 = "Beleza! Já que todos estão reunidos, vamos começar a batalha em equipe!"
22250-170 = "Ah... francamente."
22250-171 = "Hehe, é..."
22250-173 = "（Enfrentando inúmeros obstáculos,#n　às vezes brigando, se machucando ou até desistindo――）"
22250-174 = "（Ainda assim, a aventura da heroína e seus companheiros continuará daqui para frente――）"
22250-175 = "（Sim, para sempre――）"
22250-178 = "#video;11000"
