[translation]
22250-1 = "第25話;ミレニアムサイエンススクール"
22250-3 = "（そうして、みんなが力を合わせる事によってエリドゥを……）"
22250-4 = "（ミレニアムを――#nひいてはキヴォトスの脅威になったかもしれない危機を解決することができたのでした。めでたしめでたし）"
22250-6 = "……エリドゥの施設は、私が責任を持って閉鎖する事にいたしました。"
22250-7 = "[s] \"お疲れ様。ありがとうね、ヒマリ。\""
22250-8 = "……あの時の脅威はどうにか防ぐ事ができましたが、#nまだ何も解決していませんからね。"
22250-9 = "特異現象捜査部の部長として、看過できないことでもありますし……#nはぁ……一体誰のせいでこんな事を、と思ったりもしますが。"
22250-10 = "まぁ、その誰かさんのためにやっている……としておきましょうか？"
22250-11 = "超天才病弱美少女ハッカーは、いつも忙しいんですけどね……まったく。"
22250-12 = "[s] \"あはは、よろしくね。\""
22250-14 = "セミナー・執務室"
22250-15 = "（そして、当事者であるリオはといえば――）"
22250-25 = "リオ会長！？急に何を言ってるんですか！？#n会長を辞めるだなんて！"
22250-26 = "ちょっと会長！？会長は一体どこに！？"
22250-27 = "……あ。"
22250-28 = "ユウカちゃん、ここに会長からのメッセージが。"
22250-29 = "え？メッセージ！？#nどれどれ……"
22250-34 = "「ごめんなさい」……？"
22250-35 = "…………………"
22250-36 = "……あ、謝って済む問題じゃないでしょう！？会長ーー！？！？"
22250-38 = "（一方、C&Cでは……）"
22250-39 = "部長の退院を祝って～！乾杯！"
22250-40 = "乾杯。"
22250-41 = "はい、乾杯です～"
22250-46 = "……これは一体なんの騒ぎだ？"
22250-47 = "ふふっ。#n部長が無事退院したので、お祝いに打ち上げをすることにしたんですよ。"
22250-48 = "だから今日は、こうしてC&Cが全員集合したんだよ！"
22250-49 = "いや、それは分かるけど……なんで先生がいんだよ？"
22250-50 = "[s1] \"招待されたんだよ。ネル、退院おめでとう。\"\n[s2] \"やっぱり、私がいたら迷惑だったかな？\""
22250-51 = "あ、ああ……ありがとう……"
22250-52 = "うっ……！いや、別にそういう訳じゃねぇけどよ……。"
22250-53 = "さあさあ、ご主人様も飲んで！飲んで！"
22250-54 = "ヴェリタスが用意してくれた妖怪MAXならい～っぱいあるからね！"
22250-55 = "[s] \"……あ、うん。妖怪MAXなんだねコレ。\""
22250-56 = "アスナ先輩、そんな風に勧めたら先生も困ってしまうから……。"
22250-58 = "ふふっ。カリン、今日くらいはいいんじゃないですか？"
22250-59 = "ですよね、先生？"
22250-60 = "[s] \"私はかまわないけど……。\""
22250-61 = "う～ん、これじゃテンション上がらなかったかな？"
22250-62 = "あ！"
22250-63 = "そうだ！みんなバニー姿の方が良かったりした？"
22250-64 = "ねえ？ご主人様。"
22250-65 = "バニー姿なんて……それは、ちょっと困る……"
22250-66 = "いや……でも、先生が見たいっていうのなら……できなくも……"
22250-67 = "[s] \"だ、大丈夫だよ！変な目で見られちゃうから！\""
22250-68 = "はぁ……一体誰のための打ち上げなんだか……"
22250-69 = "なるほど……打ち上げさえもバニー姿で。"
22250-70 = "それがC&Cスタイルということですね。一つ賢くなりました。"
22250-71 = "……は？"
22250-72 = "あら。"
22250-73 = "……！"
22250-74 = "あはっ♪"
22250-75 = "遅くなりました、先輩方。"
22250-76 = "やほ～トキちゃん！"
22250-77 = "な、なっ……いや……てめぇがどうして……ここに……！？"
22250-78 = "C&C全員が集合する打ち上げの席だと伺ったので、来てみました。"
22250-79 = "あんたは会長専属だろ！？"
22250-80 = "……残念ながら、その会長が失踪してしまいまして。"
22250-81 = "どうしたものかと立ち尽くしていたところ……C&Cの事を思い出したのです。"
22250-82 = "だからって、自分が殴った相手の退院打ち上げに参加するヤツがどこにいんだよ！？"
22250-83 = "……はい？"
22250-84 = "んだよ！あたしが間違ってるみたいな顔すんなよ！"
22250-85 = "あっ！部長ひどい！せっかくトキちゃんが来てくれたのに！"
22250-86 = "いやいや……あいつ、この前まで敵だっただろうがよ！？"
22250-87 = "[s] \"ケンカするほど仲が良いっていうし……。\""
22250-88 = "ちょっ！先生まであいつ庇うのかよ！？"
22250-90 = "あ、トキちゃん。寄ったついでにお菓子でも食べていきますか？"
22250-91 = "ありがとうございます。"
22250-92 = "はい！次はこれ！"
22250-94 = "……うーん、妖怪MAXの味は奥が深い。"
22250-95 = "はぁああ！？！？"
22250-96 = "…………"
22250-97 = "はぁ……まあ、いい。"
22250-98 = "[s] \"ネル……？\""
22250-99 = "まあ、結局上から命令された事をやるのがC&Cだからな。"
22250-100 = "――あんたも結局、会長の依頼を遂行しただけだろうし。"
22250-101 = "ネル先輩は、思ったより聞き分けがいいんですね。"
22250-102 = "誰のせいだと思ってんだよ！？"
22250-103 = "それにしても……なかなかやるよな、お前。#n戦い方に無駄がないというか。"
22250-104 = "はい、万全の状態ならネル先輩くらいでしたら……"
22250-105 = "さあ、トキちゃん。この妖怪MAXも召し上がってみてください。"
22250-107 = "はい、ちょ、……アカネ先輩、その、うっ……"
22250-111 = "……あぁ？んだって？"
22250-112 = "[s] \"……これから賑やかになりそうだね。\""
22250-118 = "（あれほどの事件があった後でも、変わらず時間は流れていく――）"
22250-142 = "（それはここでも同じ――）"
22250-144 = "[ns] \"……ってことで、呼ばれたんだけど。\""
22250-145 = "あ！先生！いらっしゃい！"
22250-146 = "ちょうどみんなで勉強会してたとこなんだ！"
22250-147 = "[s] \"……何の勉強？\""
22250-148 = "それはもちろん！"
22250-149 = "私たちの次回作である#n「道端の可愛いモンスターを味方にしながら世界を征服する収集型育成戦略RPG」#nを作るための勉強だよ！"
22250-150 = "[s] \"この前言ってたジャンルから変わってない！？\""
22250-151 = "ああ、それでしたら、ちょっと発想が行き詰まってしまったので……#nちゃぶ台をひっくり返して……"
22250-152 = "お姉ちゃんが、新しいジャンルに挑戦してみたい、と……。"
22250-153 = "[s] \"……また？\""
22250-154 = "ま、まただなんて酷い……！#nゲーム開発ってそういうものなんだよ！？"
22250-158 = "うわぁーん！アリス、この可愛いモンスターさんを友達にすることができません！"
22250-159 = "あっ！アリス！まずバトルで体力を削らないと！"
22250-160 = "そうしたら捕獲しやすくなるからね！"
22250-161 = "モンスターさんは何もしていないのに……#nアリスが先に殴るんですか？"
22250-162 = "うーん、言われてみればたしかに……ちょっとおかしいのかも……？"
22250-163 = "ううう、でもゲームって元々そういうシステムっていうか……。"
22250-164 = "そこ！変な話ばっかしないで！ちゃんと分析するよ！"
22250-166 = "その、ゆ、ゆっくりでいいから……。"
22250-167 = "[s] \"よし。じゃあ、一緒にやろうか。\""
22250-168 = "はい！先生はここ！アリスの隣に座ってください！"
22250-169 = "よーし！みんな集まったからチームバトルを始めるよ！"
22250-170 = "はぁ……もう。"
22250-171 = "ふふっ、うん……。"
22250-173 = "（数多くの壁にぶつかって、#n　時にはケンカして傷ついたり挫折する事もあるけれど――）"
22250-174 = "（それでも、勇者と仲間たちの冒険はこれからも続いていく――）"
22250-175 = "（そう、いつまでもずっと――）"
22250-178 = "#video;11000"
