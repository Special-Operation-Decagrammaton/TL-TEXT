[translation]
1006705-1 = "心休まる場所"
1006705-2 = "シャーレ・休憩室"
1006705-5 = "（トキの安否が心配で、なかなか寝つけなかった）"
1006705-6 = "（何度か眠気は訪れたが、その度に……）"
1006705-8 = "こちら、コールサインゼロフォー。#n現在地は……"
1006705-10 = "[ns] \"トキ！？\""
1006705-11 = "（通信はすぐに切れるものの、しばらくすると……）"
1006705-16 = "こちら、コールサインゼロフォー。#n応答……してくだ……さ……"
1006705-17 = "（途切れがちな声が……）"
1006705-22 = "……承知しました。#n次は……"
1006705-23 = "（そうして、何度目かのタイミングで……）"
1006705-28 = "――回線が復帰しました。"
1006705-29 = "……あれ、なぜ先生が？"
1006705-30 = "[s] \"トキ！何があったの！？\""
1006705-32 = "私は……"
1006705-37 = "[ns] \"また切れちゃった……。\""
1006705-40 = "任務完……皆様、お疲れさ……"
1006705-42 = "（何度電話をかけても、トキの声で留守番メッセージが返ってくるだけだった）"
1006705-43 = "（明け方まで起きていたはずが、いつの間にか寝てしまっていた）"
1006705-48 = "（鳥の鳴き声で、ぼんやりと意識を取り戻す）"
1006705-49 = "（寝ぼけ眼で布団に腕を伸ばし、抱き寄せたところ……）"
1006705-58 = "（なぜか柔らかい人肌のぬくもりが……）"
1006705-61 = "[wa:1000]― ん……[wa:1200]先生……？"
1006705-64 = "[wa:900]― どうされました……？"
1006705-66 = "[wa:1000]― そんな、[wa:1000]おかしな[wa:300]顔をして……？"
1006705-69 = "[ns] \"ト、トキさんんんんんん！？\""
1006705-70 = "[wa:2000]― 差し支えなければ、"
1006705-72 = "[wa:500]― もう少し[wa:500]寝ても[wa:300]良いでしょうか……？"
1006705-75 = "[wa:3600]― んん……？[wa:1800]とりあえず[wa:700]起きてって……？"
1006705-77 = "[wa:1900]― ……嫌です。[wa:1200]私は[wa:500]もっと[wa:500]寝たいです。"
1006705-80 = "[wa:2000]― それに[wa:500]このベッド……"
1006705-82 = "[wa:600]― あったかくて、[wa:1500]ふかふかで、[wa:1800]気に入っているのです。"
1006705-85 = "[wa:2000]― 先生が[wa:500]なんと言おうと、[wa:1800]私は寝ます……。"
1006705-87 = "[wa:2000]― んん……[wa:1600]眠い……。"
1006705-91 = "（その後もトキが起きる気配はなく……）"
1006705-92 = "（目を覚ましてくれたのは、昼過ぎだった）"
1006705-97 = "……。"
1006705-98 = "[s] \"……どうして隣で寝てたの？\""
1006705-99 = "先生は、たまに不思議な質問をしますね。#nそこにベッドがあったから、です。"
1006705-100 = "[s] \"登山家みたいなこと言われても……\""
1006705-101 = "仕方ありませんね、説明いたします。#n深夜に任務を終え、帰ってきたところ……"
1006705-102 = "シャーレのオフィスに明かりが灯っていたので、気になり足を運びまして。"
1006705-103 = "[s] \"えっと……ドア、閉まってなかった？\""
1006705-104 = "先生、私はC&Cです。"
1006705-105 = "[s] \"……うん、そうだね。\""
1006705-106 = "オフィスに入って最初に目に入ったのは、電気を点けたまま机に突っ伏す先生でした。"
1006705-125 = "私が完璧なメイドであり、最高のエージェントでもある事は先生もご存知でしょう。#nですから、先生をベッドに運ぶのは当然です。"
1006705-126 = "今回の任務は少々難易度が高く、また、時間も深夜でしたから……"
1006705-127 = "流石の私でも、眠気の限界だったのです。"
1006705-128 = "その時……なんと目の前には、私に横になってほしそうなベッドがありました。"
1006705-129 = "他の選択肢はなかったと言えるでしょう。"
1006705-130 = "[s] \"だから……隣で寝たと。\""
1006705-131 = "そうです。"
1006705-132 = "ちなみに寝心地は最高でした。迅速に褒めて差し上げます。"
1006705-133 = "[s1] \"うん……ありがとう……。\"\n[s2] \"次は勝手に潜り込んじゃダメだからね。\""
1006705-136 = "今日は眠気の限界だったのです。"
1006705-137 = "[s] \"眠かったら、どこでも寝ちゃうの？\""
1006705-138 = "……！"
1006705-142 = "お待ちください、先生。#n少し考える時間を頂きます。"
1006705-143 = "[s] \"えっ、うん……。\""
1006705-149 = "（……しばらくして）"
1006705-150 = "（そこまで深刻に考える必要はないよ、と言おうとしたところ……）"
1006705-151 = "どこでもは……寝ません。#n……が、よく分かりません。"
1006705-152 = "[s] \"というと……？\""
1006705-153 = "何度考えても、他人のベッドで寝るのは抵抗があります。"
1006705-154 = "ですが、どうしてそのように感じるのか、自分でも分かりません。"
1006705-155 = "そして……なぜ先生なら大丈夫なのでしょうか？"
1006705-156 = "[s] \"な、なんでだろうね……？\""
1006705-157 = "先生でも分からないのですね。"
1006705-158 = "でしたら……この問題は、ここまでに致しましょう。"
1006705-159 = "[s] \"諦めるの早すぎない！？\""
1006705-160 = "考えても詮無いことには、時間をかけても仕方ありません。#n非効率ですから。"
1006705-161 = "それよりも遥かに重要な問題があると気づきました。"
1006705-162 = "[s] \"そんなに重要なことが？\""
1006705-163 = "はい、非常に重要……かつ重大な問題でしょう。"
1006705-164 = "それは、私が暇をしている、ということです。"
1006705-165 = "[ns] \"重要重大って言わなかった！？\""
1006705-166 = "先生には、事の深刻さが理解できないのですか？"
1006705-167 = "退屈はウサギを殺すといいます――遊ばないと死んでしまうのです。"
1006705-168 = "先生が構ってくださらないのなら……その気になるまで居座ります。"
1006705-169 = "それとも、先生は――わざとしているのですか？"
1006705-170 = "[s] \"……冗談だったり？\""
1006705-176 = "私が冗談を口にしたことがありますか？"
1006705-178 = "（あまりにも堂々としたトキの態度に戸惑いもしたが……）"
1006705-179 = "（この日はトキと2人で、楽しい時間を過ごした）"
