[translation]
201060-1 = "Episódio 6; O Retorno do Super-humano"
201060-2 = "（Expliquei os acontecimentos até agora para a aluna que afirma ser a Presidente do Conselho Estudantil Geral）"
201060-5 = "Conselho Estudantil Geral - Sala de Reuniões"
201060-6 = "……Entendo."
201060-7 = "Tantas coisas aconteceram enquanto eu estava fora… Não tenho palavras para me desculpar."
201060-11 = "No entanto, no seu relato, Sensei, há alguns pontos que divergem das minhas memórias."
201060-12 = "Primeiro, sobre o \"Shittim Chest\" que eu teria entregue ao Sensei."
201060-13 = "Para mim, ele parece apenas um tablet comum."
201060-14 = "Além disso, dar a um tablet o controle da Torre Sanctum é uma ideia perigosa demais. #nAfinal, ele pode controlar toda a infraestrutura de Kivotos."
201060-15 = "Se esse \"Shittim Chest\" cair nas mãos de alguém com más intenções, #numa situação irreversível ocorrerá."
201060-16 = "Não concorda?"
201060-23 = "[ns] \"Bem, é verdade, mas...\""
201060-24 = "Da mesma forma, o outro artefato que Rin mencionou, o \"Bastão de Schale\", #ntambém parece apenas um smartwatch comum."
201060-25 = "E depender de artefatos cujos princípios desconhecemos para resolver os problemas de toda Kivotos é..."
201060-26 = "Sinceramente, não consigo compreender. Sobre o plano que eu teria criado."
201060-27 = "Agora que voltei, acredito que seja necessário um \"ajuste\" no plano."
201060-28 = "[s] （Será que ela vai fechar o Schale ou algo assim...?）"
201060-33 = "Eu apenas cumpri minhas funções seguindo os documentos deixados pela \"Presidente do Conselho Estudantil Geral\"."
201060-39 = "A existência do Schale. A sua nomeação, Sensei. #nVocê não vai me dizer que também não tem memórias sobre os documentos relacionados a isso..."
201060-40 = "……."
201060-44 = "Deixando o conteúdo de lado, esta assinatura é certamente minha caligrafia."
201060-45 = "Os resultados do Schale já foram compartilhados por escrito."
201060-46 = "Não tenho a intenção de negar a existência do Schale, que se dedicou à autonomia e segurança das alunas sem abusar de sua autoridade."
201060-47 = "Na verdade, gostaria de expressar minha gratidão em nome do Conselho Estudantil Geral."
201060-48 = "[s1] \"Que bom...\"\n[s2] \"Pensei que seria demitido do nada...\""
201060-51 = "De jeito nenhum. Não sou tão inflexível a ponto de descartar o benfeitor que salvou Kivotos apenas por não ter memórias dele."
201060-55 = "Apenas..."
201060-56 = "Acredito que precisamos conversar mais para alinhar nossas percepções."
201060-62 = "Se você é a verdadeira Presidente do Conselho Estudantil Geral..."
201060-63 = "Por que você desapareceu de repente?"
201060-64 = "Onde você esteve e o que esteve fazendo até agora?"
201060-65 = "Infelizmente, não posso responder a essa pergunta."
201060-66 = "Lembro-me vividamente das últimas tarefas que realizei antes de eu, a Presidente do Conselho Estudantil Geral, desaparecer nos registros."
201060-67 = "Naquele dia, como sempre, li documentos oficiais, assinei-os e fui embora."
201060-68 = "Depois disso... não consigo me lembrar de nada, como se houvesse uma névoa na minha mente."
201060-69 = "Pensei que talvez tivesse caído em um sono profundo sem perceber. #nMas, quando acordei, muito tempo já havia se passado... #ne a situação em Kivotos havia mudado drasticamente."
201060-70 = "E então, encontrei você, que não se lembra de mim."
201060-71 = "Mesmo que me diga isso, não há como eu aceitar..."
201060-72 = "Sim. Naturalmente, você não pode."
201060-73 = "……Nem mesmo eu consigo entender minha própria situação."
201060-74 = "Mas essa perplexidade é o cerne deste mundo."
201060-75 = "Comparado aos inúmeros problemas que ocorrem em Kivotos, a perda de memória é algo trivial."
201060-76 = "Além disso, não posso parar só porque não consigo entender."
201060-77 = "Pois tenho o dever de cumprir minhas responsabilidades como Presidente do Conselho Estudantil Geral."
201060-78 = "…………."
201060-79 = "Rin. Vamos continuar conversando sempre que tivermos tempo."
201060-80 = "Cooperarei com tudo o que puder até que você encontre a Presidente do Conselho Estudantil Geral que possa aceitar."
201060-81 = "Mesmo que eu seja lembrada como uma impostora... não fugirei das minhas responsabilidades."
201060-87 = "Por que você... usa as mesmas palavras que aquela pessoa..."
201060-88 = "Bem, tenho trabalho a fazer, então com licença."
201060-89 = "Sensei do Schale, se precisar de algo, sinta-se à vontade para visitar o Conselho Estudantil Geral a qualquer momento."
201060-98 = "Conselho Estudantil Geral, Sala de Mediação, 2ª Sala de Reuniões Remotas"
201060-102 = "……Faz tempo que não nos falamos.#nPeço desculpas pelo contato repentino, mas gostaria de fazer um pedido."
201060-103 = "Poderia considerar a revogação da 'Portaria de Regulação de Circulação de Folhas de Chá de Trinity', proposta no mês passado?"
201060-107 = "Um contato da Presidente do Conselho Estudantil Geral.#nImaginei que fosse algo importante, mas é sobre aquele assunto, não é?"
201060-108 = "Nossa resposta é a mesma que transmiti à Chefe da Sala de Mediação no mês passado.#nNão podemos revogar a portaria."
201060-110 = "E-espere…… isso é……."
201060-111 = "Esta portaria visa simplificar a rede de distribuição e garantir o fornecimento estável de artigos de luxo para as alunas da nossa escola."
201060-112 = "Além disso, também tem o objetivo de preservar o valor das folhas de chá que são o orgulho de Trinity.#nGostaríamos muito de contar com a compreensão de todos do Conselho Estudantil Geral."
201060-113 = "E, embora eu possa estar me enganando……#nO Conselho Estudantil Geral não mantinha uma postura de não intervenção em portarias propostas por cada distrito autônomo?"
201060-114 = "A política mudou agora?"
201060-115 = "Não, não é o caso.#nCada distrito autônomo tem autoridade para propor portarias, e o Conselho Estudantil Geral respeita isso."
201060-116 = "Por isso, é um pedido. As folhas de chá de Trinity ocupam uma grande fatia do mercado de chá de Kivotos.#nComo a circulação foi subitamente restringida, os preços dispararam."
201060-117 = "Escolas como a Academia Federal Red Winter, que dependem de fontes externas para obter chá,#nestão em sérias dificuldades por não conseguirem desfrutar de sua bebida."
201060-118 = "Não creio que tenhamos a obrigação de nos preocupar com a situação de outras escolas."
201060-119 = "Sim, isso é verdade.#n……Falando nisso, apreciei muito o chá que você me enviou da última vez."
201060-120 = "Parecia ter um sabor mais refrescante e suave do que o anterior……#nFoi uma nova mistura?"
201060-124 = "……Você é perspicaz. Adicionei um pouco de óleo cítrico, usado no Lady Grey."
201060-125 = "Fico feliz que tenha agradado ao seu paladar, mas por que esse assunto de repente……?"
201060-126 = "Nada. Pensei que, se acompanhássemos o chá com doces, o sabor seria ainda melhor."
201060-127 = "Por exemplo, uma torta de chocolate feita com bastante mirtilo vermelho de Red Winter?"
201060-128 = "……."
201060-129 = "Se as alunas de Red Winter, que desfrutam de frutas de alta qualidade diariamente,#nexperimentarem o chá de Trinity, que combina perfeitamente com elas……#nAcho que isso também melhoraria a imagem da sua escola……"
201060-130 = "O que acha?"
201060-131 = "Um bom chá só demonstra sua verdadeira classe quando acompanhado pelos doces adequados."
201060-132 = "……Entendido.#nConsiderarei positivamente a revogação daquela portaria de regulação de circulação."
201060-133 = "Agradeço pela sua compreensão."
201060-134 = "Não há de quê. Foi um tempo muito significativo poder conversar com alguém que entende o valor do chá depois de tanto tempo."
201060-135 = "Na próxima vez que vier, receberei você com uma nova mistura de chá."
201060-136 = "Sim, estou ansiosa por isso."
201060-139 = "Recentemente, os distúrbios causados por alunas delinquentes em D.U. têm se tornado mais extremos a cada dia."
201060-140 = "De acordo com a investigação do Gabinete de Defesa, há relatos de que 50% dos problemas ocorridos nos últimos meses foram causados por alunas de Gehenna."
201060-141 = "Sobre isso, enviamos um pedido formal de cooperação na investigação ao Vice-Chefe de Defesa, mas#nainda não recebemos resposta."
201060-142 = "Presidente do Pandemonium Society, Makoto, você sabe algo sobre este problema……?"
201060-147 = "Kiki…… Que pergunta tola."
201060-148 = "Isso é, obviamente――"
201060-149 = "Eu não sei!"
201060-150 = "…………."
201060-151 = "Então, podemos começar agora?#nPoderia enviar reforços e apoio logístico do Pandemonium Society para colaborar na repressão às alunas delinquentes?"
201060-152 = "Por que está me dizendo isso?"
201060-153 = "A repressão às alunas delinquentes é papel do Comitê Disciplinar.#nSeja dentro ou fora do distrito autônomo de Gehenna, não é trabalho do nosso Pandemonium Society!"
201060-154 = "Em outras palavras, o fato de as delinquentes de Gehenna não desaparecerem é tudo……#nculpa da Presidente do Comitê Disciplinar, Hina!"
201060-155 = "E-espere um momento!#nDeixar assuntos relacionados à cooperação administrativa de Gehenna a cargo do Comitê Disciplinar, e não do Conselho Estudantil――"
201060-157 = "……Entendo, compreendi."
201060-164 = "Tudo é culpa da incompetência da Presidente Hina, não é?"
201060-165 = "P-Presidente!?"
201060-166 = "E-eh, sim……? B-bem, é exatamente isso."
201060-167 = "É lamentável que a Presidente Makoto, que se dedica tanto à academia apesar de ter uma presidente de comitê tão incompetente, tenha que se preocupar com isso……"
201060-168 = "Não precisa se desculpar. A Presidente Makoto é generosa com aqueles que admitem seus erros e se arrependem!"
201060-169 = "Acima de tudo, a Presidente do Conselho Estudantil Geral parece ser alguém que entende as coisas, ao contrário de outros."
201060-170 = "Se houver alguma exigência para nós, por que não a ouvimos?"
201060-171 = "Não, a Presidente Makoto já deve estar ocupada o suficiente cuidando da Chefe do Comitê Disciplinar."
201060-172 = "Hahaha! Gostei de você!"
201060-173 = "De agora em diante, se houver algum problema, encaminhe diretamente para o Comitê Disciplinar. #nAfinal, toda a responsabilidade de Gehenna recai sobre o Comitê Disciplinar!"
201060-174 = "Guardarei isso na memória."
201060-175 = "Então, com licença."
201060-181 = "Vice-Chefe de Defesa. Entre em contato com o Comitê Disciplinar de Gehenna imediatamente e solicite cooperação. #nNão se esqueça de compartilhar os dados dos suspeitos detidos na Sala de Defesa."
201060-182 = "Além disso, se o Comitê Disciplinar solicitar suprimentos, forneça apoio sem hesitação. #nPor favor, solicite o reembolso das despesas ao departamento responsável por Gehenna na Sala de Mediação."
201060-183 = "S-sim...!"
201060-184 = "Ah, e por último, envie separadamente uma caixa de remédios para fadiga e uma de remédios para o estômago para a Presidente Sorasaki. Tenho certeza de que serão úteis."
201060-189 = "O que significa isso, afinal!"
201060-190 = "Como assim o pudim de chocolate de edição limitada da Morikoori não será vendido no Distrito Autônomo de Red Winter!"
201060-191 = "Não, é que... não adianta me perguntar sobre as estratégias de vendas das empresas..."
201060-192 = "E por que veio falar com a Sala de Tráfego? #nQue incômodo..."
201060-193 = "Hum? Você não é a responsável pelos assuntos relacionados a doces no Conselho Estudantil Geral?"
201060-194 = "Quando a loja pop-up limitada da Galbee abriu outro dia, #nmesmo sendo dia de semana, você estava na fila, não estava? #nEu tinha certeza de que era seu trabalho..."
201060-198 = "I-isso é... não deve ser um engano de pessoa?"
201060-199 = "De qualquer forma! Não posso resolver esse tipo de coisa, procure outro lugar!"
201060-200 = "Nunu... você acha mesmo que pode me enganar com esse tipo de desculpa!"
201060-201 = "Eles vendem o pudim limitado em outros lugares, mas não em Red Winter. #nIsso é uma discriminação clara e um desafio à minha autoridade!"
201060-202 = "Até que isso seja resolvido, o Secretariado de Red Winter continuará protestando rigorosamente contra o Conselho Estudantil Geral, usando todos os meios necessários!"
201060-203 = "(Que problema...)"
201060-208 = "Com licença, poderia me dar um momento?"
201060-209 = "Quem é você...?"
201060-210 = "Faz tempo que não nos vemos. Cherino-sama, Presidente do Conselho Estudantil da Academia Red Winter, Chefe do Departamento de Embelezamento Ambiental, Secretária-Geral, Chefe do Departamento de Limpeza, Chefe do Comitê Disciplinar, Chefe do Departamento de Merenda e detentora do título de maior gourmet de Red Winter. Eu sou a Presidente do Conselho Estudantil Geral."
201060-211 = "O seu bigode continua maravilhoso hoje, Cherino-sama. #nDá até vontade de perguntar qual é o segredo."
201060-215 = "Ehem. A Presidente do Conselho Estudantil Geral tem bom olho para reconhecer a magnificência deste bigode."
201060-216 = "Mas não vou revelar o segredo. Porque, na verdade, eu nem cuido dele!"
201060-217 = "Ter um bigode desses sem nem cuidar... é de causar inveja. #nAgora entendo por que os alunos de Red Winter invejam o bigode da Presidente Cherino."
201060-218 = "A propósito, sobre o pudim de chocolate de edição limitada da Morikoori, #nparece que há relatos de que ele é muito grudento e suja a boca ao comer."
201060-219 = "Se o bigode da Presidente Cherino ficar sujo por causa do pudim, muitos alunos não ficariam desapontados?"
201060-221 = "I-isso é... é verdade..."
201060-222 = "Mas não posso desistir do pudim que tanto esperei...!"
201060-223 = "Por acaso, temos aqui o pudim de caramelo de edição limitada da 'L'Oiseau Brûlé'."
201060-224 = "É uma pequena lembrança, mas gostaria de lhe oferecer este pudim. Poderia, por favor, baixar a guarda desta vez?"
201060-228 = "O pudim de caramelo de edição limitada da L'Oiseau Brûlé...!"
201060-229 = "Hu-hum... Se a Presidente do Conselho Estudantil Geral insiste tanto, não tenho escolha. #nDesta vez, vou me contentar com isso."
201060-230 = "Mas não haverá uma próxima vez...!"
201060-231 = "Agradeço por compreender, Cherino-sama."
201060-239 = "Momoka..."
201060-243 = "N-não é isso! Eu não fui em nenhuma loja pop-up de doces limitados!"
201060-244 = "Mesmo que seja algo que você goste, não deve abandonar seu posto durante o horário de trabalho. #nSomos membros do Conselho Estudantil Geral e devemos ser um exemplo para os alunos."
201060-248 = "...Em vez disso, vou perguntar na reunião da próxima semana com os representantes das fabricantes de doces de Kivotos se podemos conseguir amostras para degustação."
201060-252 = "Sério!?"
201060-256 = "Incrível... Assim que a Presidente do Conselho Estudantil Geral voltou, todos os problemas anteriores foram resolvidos de uma vez..."
201060-257 = "Ela consegue manipular até os representantes orgulhosos de cada academia na palma da mão... #nQue carisma incrível."
201060-258 = "Foi muito bom que a Presidente do Conselho Estudantil Geral tenha voltado."
201060-259 = "É. Realmente não existe substituta para a Presidente do Conselho Estudantil Geral."
201060-263 = "..."
201060-264 = "...Não podemos continuar assim."
201060-269 = "Próxima vez;Pareamento"
