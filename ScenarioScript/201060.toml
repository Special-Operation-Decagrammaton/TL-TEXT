[translation]#[Texto Final. mas eventualmente pode haver alterações na formatação de texto. - Filipe 03/07.]
201060-1 = "Episódio 6: O Retorno da Super-Humana"
201060-2 = "(Expliquei os acontecimentos recentes à aluna\nque afirma ser a Presidente do Conselho)"
201060-5 = "Conselho Estudantil Geral - Sala de Reuniões"
201060-6 = "……Entendo."
201060-7 = "Tudo isso aconteceu na minha ausência……\nNão tenho como me desculpar o suficiente."
201060-11 = "Porém, alguns pontos do seu relato, Sensei,\ndivergem das minhas memórias."
201060-12 = "Primeiro, essa \"Caixa de Shittim\"\nque eu teria entregado a você."
201060-13 = "Para mim, não parece nada além\nde um tablet comum."
201060-14 = "Pra começar, conceder a um tablet o controle\nda Torre Sanctum é uma ideia perigosa demais.#nAfinal, ele permitiria controlar toda\na infraestrutura de Kivotos."
201060-15 = "Se essa \"Caixa de Shittim\" fosse roubada\npor pessoas mal-intencionadas,#nteríamos uma situação irreversível\nem mãos, não acha?"
201060-16 = "Você não concorda?"
201060-23 = "[ns] \"Até concordo, mas……\""
201060-24 = "Da mesma forma, o outro artefato anômalo que a Rin\nmencionou, o \"Cajado de Shaked\",#ntambém não me parece mais\nque um smartwatch comum."
201060-25 = "Além disso, resolver os problemas de toda\na Kivotos dependendo de artefato anômalos cujo\nfuncionamento ninguém entende……"
201060-26 = "Isso eu não consigo aceitar. Ainda que\no plano, dizem, tenha sido meu."
201060-27 = "Agora que voltei, creio que o plano\nprecisa de alguns \"ajustes\"."
201060-28 = "[s] (Não me diga que vai fechar a Schale……?)"
201060-33 = "Eu apenas cumpri meu dever, seguindo\nos documentos que a \"Presidente do\nConselho Estudantil Geral\" deixou."
201060-39 = "A existência da Schale. A sua nomeação,\nSensei.#nNão vai me dizer que também não se\nlembra dos documentos sobre isso."
201060-40 = "……"
201060-44 = "Independentemente do conteúdo, esta\nassinatura é mesmo da minha caligrafia."
201060-45 = "Os feitos da Schale já me foram\ncompartilhados por escrito."
201060-46 = "Não pretendo negar a existência da Schale,\nque, sem abusar de sua autoridade, se dedicou\nà autonomia e à segurança dos alunos."
201060-47 = "Pelo contrário: em nome do Conselho\nEstudantil Geral, eu gostaria até\nde agradecer."
201060-48 = "[s1] \"Ainda bem……\"\n[s2] \"Achei que seria demitido na hora……\""
201060-51 = "Imagina. Descartar quem salvou Kivotos\nsó por não me lembrar dessa pessoa……#nnão sou assim tão inflexível."
201060-55 = "Contudo……"
201060-56 = "Para alinharmos nossas percepções,\nainda precisamos conversar bastante."
201060-62 = "Se você é mesmo a verdadeira Presidente\ndo Conselho Estudantil Geral……"
201060-63 = "Por que desapareceu de repente?"
201060-64 = "Onde esteve e o que fez até agora?"
201060-65 = "Lamento, mas não posso responder\na essa pergunta."
201060-66 = "O meu eu dos registros…… ou seja,\na Presidente antes de desaparecer,#nlembro nitidamente do último\ntrabalho que realizou."
201060-67 = "Naquele dia, como sempre, li os documentos\noficiais, assinei e encerrei o expediente."
201060-68 = "Do que veio depois…… não consigo me\nlembrar de nada, como se houvesse\numa névoa dentro da minha cabeça."
201060-69 = "Cheguei a pensar que tivesse caído num sono\nprofundo sem perceber.#nMas, quando dei por mim, muito tempo\njá havia se passado……#ne a situação de Kivotos tinha\nmudado drasticamente."
201060-70 = "E então encontrei você,\nque não se lembra de mim."
201060-71 = "Dizer uma coisa dessas e esperar\nque eu me convença……"
201060-72 = "Sim. É claro que não vai se convencer."
201060-73 = "……Nem eu mesma compreendo\na situação em que estou."
201060-74 = "Mas esse mistério é justamente\no cerne deste mundo."
201060-75 = "Comparada aos incontáveis problemas\nde Kivotos, a perda de memórias\né algo trivial."
201060-76 = "E não posso ficar parada só porque\nexistem coisas que não compreendo."
201060-77 = "Afinal, tenho a obrigação de cumprir\nmeu dever como Presidente do Conselho\nEstudantil Geral."
201060-78 = "…………"
201060-79 = "Rin. Vamos continuar conversando\nsempre que houver tempo."
201060-80 = "Até você encontrar uma Presidente em quem\nconsiga acreditar, cooperarei com tudo."
201060-81 = "Mesmo que me registrem como uma impostora……\nnão vou fugir das minhas responsabilidades."
201060-87 = "Por que você…… usa as mesmas\npalavras que aquela pessoa……"
201060-88 = "Bem, o trabalho me espera.\nCom licença, vou indo."
201060-89 = "Sensei, se precisar de algo, apareça\nno Conselho Estudantil Geral quando quiser."
201060-98 = "Conselho Estudantil Geral - Departamento de Mediação, Sala de Reunião Remota 2"
201060-102 = "……Há quanto tempo.#nPerdão pelo contato repentino, mas venho\ntambém com um pedido a fazer."
201060-103 = "Poderiam reconsiderar a revogação do\n\"decreto de restrição à distribuição\ndo chá produzido em Trinity\", do mês passado?"
201060-107 = "Um contato da Presidente do Conselho\nEstudantil Geral.#nFiquei me perguntando o que seria,\nmas é aquele assunto."
201060-108 = "Nossa resposta é a mesma que demos à Chefe\nde Mediação no mês passado.#nNão podemos revogar o decreto."
201060-110 = "E-Er…… bem……"
201060-111 = "O decreto em questão simplifica a rede de\ndistribuição e garante o fornecimento\nestável desse item aos nossos alunos."
201060-112 = "Ele também visa proteger o valor das folhas\nde chá que são o orgulho de Trinity.#nEsperamos, de coração, a compreensão\ndo Conselho Estudantil Geral."
201060-113 = "A propósito, posso estar me lembrando mal……#nmas o Conselho não mantinha uma postura de\nnão intervir nos decretos de cada distrito?"
201060-114 = "A política mudou de uma hora pra outra?"
201060-115 = "Não, de forma alguma.#nCada distrito autônomo tem o poder de propor\ndecretos, e o Conselho respeita isso."
201060-116 = "Por isso mesmo é um pedido.#nO chá de Trinity ocupa boa parte do mercado\nde chás de Kivotos.#nCom a distribuição restringida de repente,\nos preços dispararam."
201060-117 = "Academias que sempre dependeram de\nfornecedores externos, como a Academia\nFederal Red Winter,#nestão sofrendo bastante, sem poder\ndesfrutar de seu chá."
201060-118 = "Não creio que tenhamos obrigação de nos\npreocupar com a situação das outras escolas."
201060-119 = "Sim, é bem verdade.#n……Aliás, o chá preto que nos enviou outro\ndia…… eu também o apreciei imensamente."
201060-120 = "Notei um toque mais fresco e suave\nno aroma, comparado ao anterior……#nSeria um blend novo?"
201060-124 = "……Perspicaz. Acrescentei um pouco do óleo\nde cítricos que se usa no Lady Grey."
201060-125 = "Fico feliz que tenha agradado, mas por que\nesse assunto agora……?"
201060-126 = "Nada demais. É que um doce para acompanhar\no chá torna a experiência ainda melhor,\nnão acha?"
201060-127 = "Por exemplo, uma torta de chocolate\nrecheada com bastante mirtilo-vermelho\nde Red Winter?"
201060-128 = "……"
201060-129 = "Se os alunos de Red Winter, acostumados\nàs frutas de qualidade,#nprovarem o chá de Trinity, que combina\nperfeitamente com elas……#na imagem da sua academia também\nsairia ganhando, não é mesmo……?"
201060-130 = "O que me diz?"
201060-131 = "Um bom chá preto só demonstra sua classe\nquando servido com doces à altura."
201060-132 = "……Está bem.#nVamos considerar positivamente a revogação\ndo decreto de restrição à distribuição."
201060-133 = "Agradeço imensamente a compreensão."
201060-134 = "Imagina. Eu é que agradeço: fazia tempo que\nnão conversava com alguém que entende de chá.\nFoi um momento muito proveitoso."
201060-135 = "Na próxima visita, farei questão de servir\num chá recém-blendado para recebê-la."
201060-136 = "Sim, aguardarei ansiosa."
201060-139 = "Ultimamente, os tumultos causados por\ndelinquentes em D.U. se agravam\na cada dia."
201060-140 = "Segundo a investigação do Departamento de\nDefesa, 50% dos problemas dos últimos meses\nforam causados por alunos vindos de Gehenna."
201060-141 = "Sobre isso, o Vice-Chefe de Defesa enviou\num pedido formal de cooperação investigativa,#nmas a resposta não chegou até hoje."
201060-142 = "Senhorita Makoto, presidente do Pandemonium,\nsabe de algo sobre essa questão……?"
201060-147 = "Kikik…… que pergunta tola."
201060-148 = "É claro que――"
201060-149 = "não sei de nada!"
201060-150 = "…………"
201060-151 = "Então não há problema em começar agora.#nO Pandemonium poderia enviar reforços e\nsuprimentos para nos ajudar a conter\nos delinquentes?"
201060-152 = "E por que pedir isso a mim?"
201060-153 = "Conter delinquentes é papel do comitê\nde disciplina.#nDentro ou fora do distrito de Gehenna,\nnão é trabalho do nosso Pandemonium!"
201060-154 = "Em outras palavras, se os delinquentes de\nGehenna não desaparecem, a culpa é toda……#nda presidente do comitê, Hina!"
201060-155 = "E-Espere, por favor!#nDeixar a cooperação administrativa de\nGehenna com o comitê de disciplina,\ne não com o conselho――"
201060-157 = "……Entendo, compreendi perfeitamente."
201060-164 = "A culpa é toda da incompetência\nda presidente Hina, correto?"
201060-165 = "P-Presidente?!"
201060-166 = "H-Hã……? B-Bom, é, é isso mesmo."
201060-167 = "Imagino o transtorno que é, para a senhorita\nMakoto, se dedicar tanto à academia tendo\nde carregar uma líder tão incompetente……\nSinto muito pela nossa inaptidão."
201060-168 = "Dispenso desculpas. A grande Makoto é\ngenerosa com quem admite a culpa\ne se arrepende!"
201060-169 = "Acima de tudo, a Presidente do Conselho,\nao contrário de CERTA pessoa, sabe ouvir."
201060-170 = "Se tiver alguma exigência a nos fazer,\npode dizer."
201060-171 = "Não é necessário. A senhorita já deve estar\nocupada demais cuidando da presidente\ndo comitê de disciplina."
201060-172 = "Há-há! Gostei de você!"
201060-173 = "De hoje em diante, qualquer problema, mande\ndireto pro comitê de disciplina.#nToda a responsabilidade de Gehenna\né do comitê de disciplina!"
201060-174 = "Vou gravar bem isso."
201060-175 = "Com licença, então."
201060-181 = "Vice-Chefe de Defesa: contate agora mesmo o\nComitê de Disciplina de Gehenna e formalize\no pedido de cooperação.#nNão esqueça de compartilhar os dados dos\nsuspeitos detidos pelo Departamento de Defesa."
201060-182 = "E, se o comitê de disciplina solicitar\nsuprimentos, forneça sem economizar.#nCobre os custos do setor responsável por\nGehenna no Departamento de Mediação."
201060-183 = "S-Sim, senhora……!"
201060-184 = "……Ah, por último: envie à presidente\nSorasaki, à parte, uma caixa de remédio\npara fadiga e uma de remédio pro estômago.\nCom certeza serão úteis."
201060-189 = "O que significa isso?!"
201060-190 = "O pudim de chocolate da edição sazonal da\nMorikoori não vai ser vendido no distrito\nautônomo de Red Winter?!"
201060-191 = "Ai, eu já falei: não adianta me perguntar\nda estratégia de vendas de uma empresa……"
201060-192 = "Aliás, por que o Departamento de Transporte?#nQue saco……"
201060-193 = "Hum? Os assuntos de doces do Conselho\nEstudantil Geral não são responsabilidade tua?"
201060-194 = "Quando a Galbee abriu aquela loja pop-up\nlimitada outro dia,#ntu estavas lá na fila, mesmo sendo\ndia de semana.#nAchei que fosse teu trabalho……"
201060-198 = "I-Isso…… não foi engano seu, não?"
201060-199 = "Enfim! Esse tipo de coisa não é comigo,\nprocura outro setor!"
201060-200 = "Grrr…… achas que me enganas\ncom tão pouco?!"
201060-201 = "Um pudim limitado à venda em todo lugar,\nmenos em Red Winter.#nIsso é discriminação explícita e um\ndesafio à minha autoridade!"
201060-202 = "Até que isso se resolva, a secretaria de\nRed Winter usará de todos os meios#npara manter seu rigoroso protesto contra\no Conselho Estudantil Geral!"
201060-203 = "(E agora……)"
201060-208 = "Com licença, posso interromper um momento?"
201060-209 = "Quem és tu……?"
201060-210 = "Há quanto tempo. Presidente do conselho\nestudantil da Academia Federal Red Winter;\npresidente do Clube de Embelezamento\nAmbiental; secretária-geral; presidente\ndo Clube de Limpeza; presidente do comitê\nde disciplina; presidente do Clube da\nMerenda; e detentora do título de maior\ngourmet de Red Winter―― senhorita Cherino.\nEu sou a Presidente do Conselho\nEstudantil Geral."
201060-211 = "Seu bigode segue esplêndido como sempre,\nsenhorita Cherino.#nDá até vontade de perguntar o segredo."
201060-215 = "Ahem! Se compreendes a magnificência deste\nbigode, tens bom olho, Presidente."
201060-216 = "Mas não revelarei o segredo. Pois eu não\nfaço manutenção alguma no bigode!"
201060-217 = "Um bigode desses sem nenhum trato?\nQue inveja.#nEntendo por que os alunos de Red Winter\ninvejam o seu bigode, presidente Cherino."
201060-218 = "A propósito, sobre o pudim de chocolate\nlimitado que a Morikoori vai lançar:#ndizem que ele é grudento demais e suja\ntoda a boca de quem come."
201060-219 = "Se o pudim manchasse o bigode da presidente\nCherino, quantos alunos não ficariam\ndecepcionados?"
201060-221 = "I-Isso…… é verdade……"
201060-222 = "Mas abrir mão do pudim que tanto\nesperei……!"
201060-223 = "Acontece que temos em mãos o pudim de\ncaramelo limitado da \"L'Oiseau Bulle\"."
201060-224 = "É uma lembrancinha modesta, mas oferecemos\neste pudim…… Poderia, desta vez,\nbaixar as armas?"
201060-228 = "O pudim de caramelo limitado……\nda L'Oiseau Bulle……!"
201060-229 = "H-Hum…… se a Presidente do Conselho insiste\ntanto, não há o que fazer.#nDesta vez, me contentarei com isso."
201060-230 = "Mas não vai ter próxima, hein……!"
201060-231 = "Agradeço a compreensão, senhorita Cherino."
201060-239 = "Momoka……"
201060-243 = "N-Não é nada disso! Eu não fui em loja\npop-up de doce limitado nenhuma!"
201060-244 = "Mesmo que seja sua comida favorita, não se\nausente durante o expediente.#nSomos funcionárias do Conselho Estudantil\nGeral, o exemplo a ser seguido pelos alunos."
201060-248 = "……Em compensação, na reunião da semana que\nvem com as fabricantes de doces de Kivotos,\nvou perguntar se conseguimos amostras\nde degustação."
201060-252 = "Sério?!"
201060-256 = "Incrível…… mal a Presidente voltou e os\nproblemas já estão se resolvendo\num atrás do outro……"
201060-257 = "Ela consegue manejar até os orgulhosos\nrepresentantes de cada academia……#nQue carisma impressionante."
201060-258 = "Que bom que a Presidente do Conselho\nvoltou pra gente."
201060-259 = "Né? É como dizem: a Presidente do Conselho\né insubstituível."
201060-263 = "……"
201060-264 = "……Não posso deixar as coisas continuarem assim."
201060-269 = "Próximo Episódio: Pareamento"