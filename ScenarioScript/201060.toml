[translation]
201060-1 = "Episódio 6: O Retorno do Übermensch"
201060-2 = "（Eu esvaziei os pulmões e narrei todo o histórico caótico do meu mandato em Kivotos para a garota que alega ser a Presidente do Conselho.）"
201060-5 = "Sala de Reuniões - Sede do Conselho Estudantil Geral"
201060-6 = "……Compreendo."
201060-7 = "Os pilares da cidade derreteram e um abismo se abriu durante a minha ausência cega... O meu fracasso com a nação é incalculável."
201060-11 = "Contudo, o dossiê que o senhor narrou cruza os fios e entra em choque frontal com algumas das minhas matrizes de memória."
201060-12 = "O primeiro gargalo lógico é a 'Caixa de Shittim'. O senhor alega que esse objeto foi outorgado diretamente pelas minhas mãos."
201060-13 = "Na minha ótica laboratorial, isso soa como um tablet genérico inofensivo."
201060-14 = "E do ponto de vista do Estado, acoplar e terceirizar as chaves vitais da Sanctum Tower para um equipamento portátil é uma bomba relógio militar absurda.#nÉ literalmente entregar as cordas do pescoço de Kivotos na mão de um hardware livre."
201060-15 = "Se a 'Caixa de Shittim' cair nas mãos sujas de algum corporativo megalomaníaco ou terrorista,#na metrópole sangrará de forma irrecuperável."
201060-16 = "O senhor, como portador desse risco, não enxerga a negligência que isso implica?"
201060-23 = "[ns] \"O seu argumento levanta uma ética válida, mas...\""
201060-24 = "Na mesma veia contraditória, a Rin relatou a existência do OOPArt catalogado como 'Cajado de Sharkade'.#nPara o meu cérebro, aquilo também simula apenas um relógio de pulso patético."
201060-25 = "Ajoelhar-se perante OOPArts de biologia obscura e rogar para que eles salvem as feridas de Kivotos não faz sentido... não na minha doutrina."
201060-26 = "Meu DNA rejeita essa lógica. Se o senhor insiste que esse foi o 'Plano' que eu tracei antes de desaparecer..."
201060-27 = "Com o meu retorno à cadeira, esse Plano precisará sofrer 'Ajustes' táticos brutais."
201060-28 = "[s] （Eita... O cérebro dela tá cogitando degolar a minha autoridade e fechar a Schale...?!）"
201060-33 = "A minha defesa se resume a um fato inegável: eu vesti a camisa e suei sangue seguindo os manuscritos e diretrizes deixadas pela 'Presidente'."
201060-39 = "A forja da Schale. O recrutamento e as credenciais cívicas do Sensei.#nA senhorita não cometerá a audácia de cuspir que o seu cérebro também não se lembra dos decretos que assinou autorizando tudo isso, cometerá?"
201060-40 = "……"
201060-44 = "Seja qual for o recheio do papel, a caligrafia da assinatura é incontestavelmente forjada pela minha mão."
201060-45 = "Além disso, a varredura das atas da Schale comprova estatisticamente a sua lealdade."
201060-46 = "A agência nunca prostituiu ou armou seu poder extrajudicial para ferir a soberania das Academias, focando apenas no escudo social. O seu currículo aqui está limpo de sangue, Sensei."
201060-47 = "No mais, eu deveria curvar a cabeça e declarar os agradecimentos oficiais do Conselho pelas vidas que você salvou."
201060-48 = "[s1] \"Ufa... O oxigênio voltou pro peito...\"\n[s2] \"O clima ficou tão cinza que achei que meu pescoço ia rolar da Schale sem aviso prévio...\""
201060-51 = "Que difamação. O meu cérebro não é uma fornalha inflexível a ponto de guilhotinar o Herói da Metrópole com a desculpa barata de um simples 'lapso de memória'."
201060-55 = "Todavia..."
201060-56 = "Nós precisaremos trancar as portas de muitas salas de reunião e cruzar nossos dados para desmanchar esse ruído cognitivo entre as partes."
201060-62 = "Se as suas células e cordas vocais juram que você é a VERDADEIRA Presidente Geral..."
201060-63 = "Por que você quebrou o tabuleiro e apagou a sua própria existência no meio do jogo?!"
201060-64 = "Sob qual asfalto ou lona a senhorita hibernou todo esse tempo?!"
201060-65 = "O meu cérebro sangra de frustração, mas eu estou tão cega quanto vocês para responder isso."
201060-66 = "O log visual do meu HD aponta que, nos segundos antecedentes ao lapso que afundou a 'Presidente' no nada...#nas engrenagens do meu escritório operavam na mais tediosa normalidade."
201060-67 = "Eu cessei o trânsito burocrático, cravei minha rubrica no último edital público, e vesti o casaco para bater o ponto e sair."
201060-68 = "E os arquivos seguintes a esse instante... foram triturados numa névoa espessa e cinzenta. Meu disco de memória está formatado."
201060-69 = "No começo da confusão biológica, cheguei a levantar a hipótese de um coma profundo. Mas, ao abrir os olhos... o sol já tinha girado centenas de vezes...#ne o sangue de Kivotos havia pintado outro quadro lá fora."
201060-70 = "E, para completar a farsa, o meu rosto havia sido extirpado e negado pelas sinapses do conselho inteiro."
201060-71 = "……Um papinho místico de amnésia cega para fugir do laudo técnico... A minha mente se recusa a tragar isso."
201060-72 = "Eu atesto a coerência dessa repulsa."
201060-73 = "……Nem o meu próprio córtex consegue decifrar e engolir essa anomalia."
201060-74 = "Contudo, esse choque irracional contra a tela de fumaça da amnésia prova que... há um tumor escondido apodrecendo a verdade no centro desse mundo."
201060-75 = "O meu bug biológico de memória não é nada perto da montanha de fogo cruzado que carboniza Kivotos diariamente."
201060-76 = "Ajoelhar e estagnar no escuro por falta de equações exatas não é o comportamento de um Monarca."
201060-77 = "A coroa voltou para a minha cabeça, e eu forjarei a máquina deste conselho voltar a cuspir progresso."
201060-78 = "…………"
201060-79 = "Rin. As minhas portas e canais estarão abertos para cruzar e costurar memórias com você sempre que as brechas da agenda permitirem."
201060-80 = "O meu sangue e o meu cérebro colaborarão até que o seu coração aceite e a enxergue novamente como a Presidente Geral."
201060-81 = "E, se no pior cenário burocrático, eu afundar na história com o rótulo eterno de 'Impostora'... a minha ética rechaça o recuo. A responsabilidade da Cadeira Suprema está cravada na minha pele."
201060-87 = "Essas malditas métricas e filosofias... é exatamente a ladainha daquela garot..."
201060-88 = "Os deveres estatais me convocam. Limparei a sala e me recolho às trincheiras."
201060-89 = "Sensei. Se a balística apertar o cerco da Schale, as comportas do Conselho Estudantil estarão destrancadas para guarnecer o senhor."
201060-98 = "Sala de Reuniões Remotas 2 do Comitê de Mediação - Sede do Conselho Estudantil"
201060-102 = "……As minhas saudações. O chamado de rádio atropelou a sua agenda e peço escusas, mas... há um clamor diplomático na linha."
201060-103 = "O embargo comercial cimentado no último mês, apelidado de 'Sanção Fiscal da Erva de Chá de Trinity'... as lideranças poderiam amolecer os laços e anular essa canetada?"
201060-107 = "Uma chamada emergencial chancelada com o selo da Presidente Geral.#nOs meus cálculos não mentiram, esse embargo causaria espasmos. Contudo..."
201060-108 = "O veredito da Tea Party não gaguejou desde que despachamos as negativas à Chefe de Mediação mês passado.#nA Sanção e a barreira aduaneira são irrevogáveis."
201060-110 = "B-Bom... err... veja..."
201060-111 = "A logística fiscal não fere leis morais. É um funil aduaneiro simples criado para sufocar contrabandos e garantir a nutrição básica e o deleite interno das próprias nobres de Trinity."
201060-112 = "Além de, obviamente, proteger e valorizar a patente orgânica da qualidade da colheita de folhas das nossas estufas.#nNós esperamos que a mente burocrática do Conselho abrace a pauta soberana."
201060-113 = "E se o meu córtex político não está corrompido...#nA doutrina federal ditava que o Conselho Estudantil jurou sangue de que manteria as unhas longe e rechaçaria intervir em decretos internos dos Distritos Livres, não é?"
201060-114 = "A Presidente ressuscitou das cinzas disposta a sujar e estripar as antigas constituições liberais da Federação?"
201060-115 = "A doutrina federal continua casta e irretocável.#nCada Academia reina soberana sobre suas plantações, e nós beijamos o selo dessa lei."
201060-116 = "A minha voz no rádio transmite uma súplica e um [ruby=・   ・   ・   ・   ・   ・]p e d i d o[/ruby] passional.#nA fatia monopolista de Trinity engole quase todo o giro mercantil da erva de chá em Kivotos.#nCortar essa artéria do nada asfixiou o mercado, inflou a inflação e causou pânico cívico na balança."
201060-117 = "Instituições de climas severos, como a Red Winter, cujo frio exige chá para evitar gangrenas e são incapazes de plantar, estão chorando sangue nos corredores sem o suprimento de vocês."
201060-118 = "O nosso coração nobre se consterna, mas o nosso cofre não jura empatia pelas caldeiras secas de Academias estrangeiras."
201060-119 = "O argumento logístico de fato se sustenta inquebrável.#n……Mudando a marcha do rádio: o pacote de infusões negras que a senhorita mandou por cortesia aduaneira mês passado foi deglutido e honrado."
201060-120 = "A matriz palatável e orgânica revelou um traço de frescor cítrico inexistente nas colheitas de outrora...#nUma patente nova ou manipulação de laboratório de infusão?"
201060-124 = "……O seu DNA gustativo é monstruoso de preciso. Forjamos a adição experimental de duas gotas da resina de laranja amarga da variedade Lady Grey na prensa das folhas secas."
201060-125 = "Se as suas glândulas salivares abençoaram o resultado empírico, nós soltamos fogos. Mas que relevância política esse devaneio chique teria agora...?"
201060-126 = "O xadrez exige sinergia.#nA amargura nobre de um chá refinado implora por uma parceria complementar de sacarose industrial ou orgânica pesada para o deleite máximo do usuário."
201060-127 = "A título de curiosidade... como reagiria a resina cítrica contra o impacto gorduroso e recheado de uma torta de chocolate mergulhada em Mirtilos Silvestres importados de Red Winter?"
201060-128 = "……"
201060-129 = "A lógica flerta com o paraíso fiscal. Se as proletárias russas, ricas na extração monopolista das frutinhas raras, mergulhassem a barriga na infusão botânica refinada de Trinity no inverno...#nAs engrenagens midiáticas e o marketing global de nobreza e pureza de Trinity disparariam nas bolsas globais... a troco de poucas folhas secas."
201060-130 = "O seu intelecto abarca as cifras e as vantagens?"
201060-131 = "A verdadeira supremacia nobre reside não em queimar e reter as folhas cegas no celeiro, mas em orquestrar a dança perfeita das iguarias estrangeiras aos pés de nossas xícaras."
201060-132 = "……As suas manipulações burocráticas seduziram a minha mesa.#nA Tea Party esmagará o embargo e as aduanas fluirão amanhã cedo."
201060-133 = "O conselho curva a espinha e beija a benevolência."
201060-134 = "Negativo. O meu cérebro atrofia rodeado de medíocres; dividir teses com uma mente que estuda folhas com requinte injetou dopamina na minha veia política de novo."
201060-135 = "A sua presença diplomática nos nossos jardins será escoltada por bules estalando a nossa melhor cepa mutante em breve."
201060-136 = "Ficarei na ávida espera do convite."
201060-139 = "O dossiê da violência urbana de D.U. aponta que as arruaças gangueiras e a carnificina saíram do eixo tolerável e ganharam feições terroristas essa semana."
201060-140 = "As perícias métricas do Gabinete de Defesa cravam sem remorso que 50% dos danos estruturais, saques e tiroteios possuem a assinatura criminal e o chifre do Distrito de Gehenna."
201060-141 = "A Sub-chefe de Defesa despejou memorandos emergenciais clamando o resgate investigativo dos seus tribunais, mas...#nO silêncio do comitê Pandemonium beira a insubordinação civil."
201060-142 = "Como Soberana da Sociedade Pandemonium, a Mestra Makoto teria o mínimo de decência burocrática para se manifestar perante o conselho federal sobre a sua escória...?"
201060-147 = "Guhuhu... Kiki... que pergunta rasteira de amadora..."
201060-148 = "Se o seu intelecto acha que a Soberana aqui sabe quem fura as cercas, a resposta é categórica――"
201060-149 = "EU TÔ CAGANDO E ANDANDO! SEI DE NADA!!"
201060-150 = "…………"
201060-151 = "Que o perdão me seja concedido pela falha e ignorância.#nMas, mesmo no crepúsculo tardio, a Pandemonium seria generosa e nobre o suficiente a ponto de exportar tropas de apoio logístico para frear o derramamento de sangue de seus párias urbanos em nossa cidade?"
201060-152 = "Hein? Por que os seus neurônios pífios direcionaram essa papelada inútil pro meu ouvido?!"
201060-153 = "Ajoelhar vândalos e botar algema em lixo é função única e exclusiva daqueles brutamontes cegos do Comitê Disciplinar!!#nSeja nos esgotos do nosso território de Gehenna ou na calçada suja de D.U., espremer bandido NÃO tá na constituição divina da Pandemonium!"
201060-154 = "Trocando em miúdos lógicos, se a proliferação da escória criminosa vaza pelos canos de Gehenna...#nA culpa inteira pela inépcia administrativa e por todo mal que recai sobre o mundo cai nas costas encardidas da Chefe Hina!!"
201060-155 = "E-Espera! Congela a chamada!#nTerceirizar trâmites diplomáticos e cooperação cívica pesada de Estado, saltando sobre as costas da Liderança Máxima estudantil da Academia pra empurrar as pranchetas diretamente pra esfera policial do Comitê Di――"
201060-157 = "……A lógica grotesca é clara. Entendo as suas engrenagens."
201060-164 = "Na sua ótica legislativa, os crimes descontrolados brotam exclusivamente da mediocridade asquerosa e incompetência policial e estrutural da Chefe Hina, correto?"
201060-165 = "P-Presidente... o que o seu cérebro de gelo tá cogitando?!"
201060-166 = "A-Ah... Ué...? A-Acho que essa lógica aí traduz direitinho a verdade dos deuses no papel. Isso mesmo, tá certinha!"
201060-167 = "Eu sinto o meu coração apodrecer de angústia cívica por saber que uma estadista do calibre e do brilho da Mestra Makoto tem que segurar as paredes divinas de Gehenna e suar a camisa... enquanto convive com uma inútil policial manchando seu império glorioso... a minha consternação é inenarrável."
201060-168 = "O pranto está dispensado, burocrata servil. O ego da Mestra Makoto abraça os mortais cegos que abaixam o pescoço e reconhecem o seu reinado!"
201060-169 = "Diferente dos cães traidores de gravata lá fora, o cérebro da nova Presidente sabe qual traseiro beijar no xadrez geopolítico."
201060-170 = "Se os seus gabinetes precisarem chorar mendigando ajuda tática, eu posso até abaixar a ponte imperial e escutar as preces dos miseráveis."
201060-171 = "O perdão é meu pela covardia, mas eu não ouso sequestrar a sagrada agenda política da Mestra Makoto.#nO seu fardo de ser forçada a esfregar o chão e arrumar a inépcia diária do Comitê Disciplinar já é penoso o bastante..."
201060-172 = "Gwahahahaha!! A sua mente obedece a hierarquia maravilhosamente! Tu tem futuro, Presidente!!"
201060-173 = "Daqui em diante, quando a sujeira ou o fogo criminal engolfar a sua porta de D.U., despacha a intimação jurídica direto pro pescoço dos imbecis da Comissão Disciplinar.#nA responsabilidade por carregar os lixos de Gehenna é exclusivamente do distintivo da Hina!"
201060-174 = "Os laudos criminais serão repassados segundo os ditames da Soberana."
201060-175 = "Encerro a conexão cívica. Minhas reverências, Mestra Makoto."
201060-181 = "Sub-chefe de Defesa. Direcione os fios telefônicos e exija o auxílio armado direto aos canais operacionais do Comitê Disciplinar de Gehenna agora.#nEmpacote os logs e confissões dos marginais fichados no interrogatório e entregue a cabeça deles de brinde pra polícia da Hina."
201060-182 = "Adicionalmente: se o armamento, coturnos ou frotas logísticas das tropas da Chefe Hina engasgarem... despache o socorro bélico e civil sem limites ao Comitê. Pague até os refeitórios deles.#nAs notas fiscais e faturas inteiras vão ser socadas no rabo do orçamento diplomático da Pandemonium pela Mesa de Mediação depois."
201060-183 = "C-Copiado e entendido... O-Ordem letal a caminho...!"
201060-184 = "……Ah, o epílogo: encomendem com dinheiro governamental uma carreta de suplementos hipercalóricos, injeção de glicose e uma caixa industrial de anti-ácidos pro estômago. Despachem pra mesa privada da Chefe Hina Sorasaki.#nO sangue e os ossos dessa policial chorarão de alívio por esses remédios muito em breve."
201060-189 = "Isso é conspiração assassina estatal!"
201060-190 = "A porcaria monopolista da mega-indústria de laticínios 'Morikori' proibiu os contêineres de exportar a edição limitada do pudim de chocolate aveludado pras gôndolas e aduanas geladas da República Federal Red Winter! É embargo intencional!"
201060-191 = "T-Tia, abaixa o fuzil e o fôlego... Os decretos mercantis de laticínios das corporações fogem cem por cento do alvará militar da nossa pasta..."
201060-192 = "E por que diabos o Departamento de Rodovias virou muro de lamentações de chocolate?!#nTô caindo fora, isso cheira a problema logístico de gordo..."
201060-193 = "Opa, peraí, cabelo de rosa! Você não era a engrenagem encarregada de engolir burocracia de lanches fúteis da presidência?"
201060-194 = "Naquela sexta de expediente do Estado... Quando a barraquinha pirata hiper-focada na venda temporária de itens da Galby abriu as portas nas ruas periféricas, a minha vista rastreou as suas orelhas de elfa marcando posição no meio da fila quilométrica da calçada!#nA minha dedução cívica acusou que aquilo era o seu trabalho burocrático e dever... Mas, pelo visto..."
201060-198 = "B-Bate na boca... I-Isso foi... O olho murcho da tia tá cruzando identidades falsas na rua... né não?"
201060-199 = "Cortando o assunto de vez! O governo não assina nota pra fiscalizar doce de pote alheio! Toca o terror na Secretaria da Indústria e vaza!"
201060-200 = "Uguuuu... A petulância de achar que os Bigodes de Aço caem em sofismas baratos! Se prepare pro Gulag mental!"
201060-201 = "Um pudim exclusivo e cremoso banhando os rios de todas as Academias estrangeiras e cimentando o boicote de importação unicamente nas trincheiras e planícies comunistas de Red Winter!#nO cheiro de sabotagem capitalista é evidente! É o desrespeito frontal aos meus decretos intocáveis e ao meu peso político!"
201060-202 = "Até as comportas logísticas serem escancaradas com leite e açúcar pras minhas fronteiras geladas... o Comitê Central da Red Winter fará uso das Forças Armadas para explodir de ofícios e protestos criminais as catracas deste Conselho Estudantil miserável todos os dias!!"
201060-203 = "（Eu vou dar um tiro na cabeça dessa nanica bigoduda...）"
201060-208 = "Interrompo o motim de açúcar com as devidas saudações formais."
201060-209 = "Quem ousa...?!"
201060-210 = "Presto meus respeitos. Minha reverência eterna e imaculada ao cargo da Liderança da República Federal de Red Winter, Diretora do Departamento de Embelezamento Ambiental, Honorável Secretária de Estado e Comando, Chefe da Unidade de Purificação, Titular do Comitê Disciplinar, Supervisora da Distribuição Merendeira e portadora da insígnia épica e suprema de A Maior Crítica e Sommelier Gastronômica dos confins gelados da República, Suprema Mestra Cherino.#nEu ostento o cargo de Presidente Geral deste Conselho."
201060-211 = "A silhueta monumental do seu bigode nobre exala, no dia de hoje, a mesmíssima elegância afiada do passado.#nO segredo cosmético da manutenção diuturna desse pêlo majestoso intriga profundamente minha ciência biológica."
201060-215 = "Goham! Ehehehe! Captar o peso majestoso e a glória infinita que repousa nas cerdas destas pelagens superiores prova que a Presidente tem os Globos Oculares lapidados em cristal fino!"
201060-216 = "A alquimia mágica desse volume jamais vazará aos tolos. Porque, sob a face do sol... O Grande Líder não precisa esfregar pentes fúteis no focinho, as engrenagens perfeitas do meu corpo cospem magnitude na cara de forma natural e espontânea!"
201060-217 = "As raízes divinas forjaram a obra crua. Causa-me angústia biológica de tanta inveja.#nA subordinação leal das fileiras comunistas da Red Winter diante de um pelo tão supremo é absolutamente irrefutável para os laudos sociais."
201060-218 = "Alterando a marcha diplomática para a insatisfação gastronômica e do tal pudim cremoso da marca 'Morikori'... As planilhas das avaliações civis e da Vigilância relatam que o corante e a viscosidade hiper-açucarada causam colapso e deixam marcas nojentas nas mucosas e arredores da boca na mastigação."
201060-219 = "Se a viscosidade repulsiva desse leite grudar nas tranças puras e majestosas do Bigode Imperial da Liderança Máxima Cherino... as fileiras devotas e fanáticos em Red Winter não sofreriam um revés mortal nas trincheiras e morreriam de indignação visual perante o pudor?"
201060-221 = "O-O baque do mico... A-As engrenagens estão apitando..."
201060-222 = "MAS A CARNE TÁ CHORANDO POR GLICOSE! EU ME RECUSO A PERDER A CHANCE NO MERCADO CARO!!"
201060-223 = "Numa ironia burocrática fantástica... Os cofres de recepção diplomática do nosso conselho possuem estoque refrigerado de um dos cálices raros de Pudim de Caramelo Assado na Forja Especial da refinaria francesa 'L'Oiseau Beurré'."
201060-224 = "É apenas uma amostra grátis e humilde na prateleira... mas se a Divindade e Grande Líder engolir esse cálice em nome da paz... as vossas tropas cancelariam as ofensivas bélicas contra nossa aduana de doces hoje?"
201060-228 = "A... A iguaria de açúcar maciço derretido na França Rica da 'L'Oiseau Beurré'...!!"
201060-229 = "B-Bom... O-O laudo pacífico mostra que... se a Presidente abaixa a cabeça pra suplicar armistício em nome de leite... o perdão imperial será outorgado.#nA trégua se estende só na força do sacrifício doce!"
201060-230 = "A cúpula russa guarda memórias cruéis... Vacilou com doce e na próxima o paredão fuzila!"
201060-231 = "A misericórdia e a paciência com o povo não cabem nos radares. Salve a Glória da Suprema Cherino."
201060-239 = "Momoka..."
201060-243 = "A-Análise negada!! A fofoca do pop-up ilegal de loja não entra no balanço!! Os olhos dela viraram sucata!!"
201060-244 = "Desvios passionais no meio da jornada administrativa em prol de sobremesas inflacionadas é uma quebra ética gravíssima.#nO peso dos nossos crachás impõe o estigma e a conduta de seres de aço para os plebeus nos corredores."
201060-248 = "……No lugar disso, vou apertar as veias da indústria na convenção de diretores confeiteiros e chantagear cotas grátis maciças da 'Amostragem Exclusiva' dos laboratórios experimentais deles."
201060-252 = "TÁ ZUANDO?!"
201060-256 = "Que demência burocrática bizarra e eficiente... Bastou as nádegas do Übermensch roçarem na cadeira e a bagunça sangrenta de Kivotos cede e vira dócil num minuto..."
201060-257 = "A lábia maldita de jogar os orgulhos infantis dos Titãs e Rainhas dos submundos uns contra os outros sem gastar uma bala...#nEssa Aura Administrativa não é pra mortais."
201060-258 = "Céus... O ar e o batimento cardíaco da mesa do conselho respiram paz e segurança agora que a Titã Suprema voltou pra carregar as paredes."
