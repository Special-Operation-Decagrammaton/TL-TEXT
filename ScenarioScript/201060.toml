[translation]
201060-1 = "Эпизод 6;Возвращение сверхчеловека"
201060-2 = "(Я объяснил всё, что произошло к этому моменту, студенту, которая называет себя Президентом Генерального Студенческого Совета.)"
201060-5 = "Генеральный Студенческий Совет — Зал заседаний"
201060-6 = "...Вот как."
201060-7 = "Пока меня не было, столько всего случилось... Мне глубоко стыдно."
201060-11 = "Однако в вашем рассказе, Сенсей, есть несколько моментов, которые противоречат моим собственным воспоминаниям."
201060-12 = "Во-первых, \"Сундук Шиттима\", который я, по вашим словам, вам передала."
201060-13 = "Как по мне, это выглядит как самый обычный планшет."
201060-14 = "Наделять планшетное устройство полномочиями по управлению Башней Святилища — крайне опасная затея. #nЭто ведь означает возможность контролировать всю инфраструктуру Кивотоса."
201060-15 = "Если этот \"Сундук Шиттима\" похитят люди с злыми намерениями, #nвозникнет непоправимая ситуация."
201060-16 = "Вы не согласны?"
201060-23 = "[ns] «Пожалуй, это так, но...»"
201060-24 = "Точно так же и другой артефакт, о котором упоминала Рин, \"Посох Шакада\", #nкажется мне обычными смарт-часами."
201060-25 = "К тому же полагаться на артефакт, принципов работы которого мы даже не понимаем, чтобы решать проблемы по всему Кивотосу..."
201060-26 = "Я просто не могу этого постичь. Вы говорите, что этот план составила я, но..."
201060-27 = "Теперь, когда я вернулась, я считаю, что этот план нуждается в некоторых „корректировках“."
201060-28 = "[s] (Погодите, она ведь не имеет в виду закрытие Шале...?)"
201060-33 = "Я лишь исполняла свои обязанности в соответствии с документами, оставленными \"Президентом Генерального Студенческого Совета\"."
201060-39 = "Существование Шале. Ваше назначение, Сенсей. #nВы ведь не хотите сказать, что у вас нет воспоминаний и о документах, касающихся этого?"
201060-40 = "...."
201060-44 = "Если отбросить содержание, эта подпись определённо сделана моей рукой."
201060-45 = "Достижения Шале уже были изложены в письменном виде."
201060-46 = "У меня нет намерения отрицать существование Шале, которое усердно трудилось ради автономии и безопасности студентов, не злоупотребляя своими полномочиями."
201060-47 = "Напротив, я бы хотела выразить свою благодарность от имени Генерального Студенческого Совета."
201060-48 = "[s1] «Слава богу...»\n[s2] «Я уж подумал, что меня уволят прямо на месте...»"
201060-51 = "Конечно же нет. Я не настолько косна, чтобы избавляться от благодетеля, спасшего Кивотос, просто потому, что я этого не помню."
201060-55 = "Однако..."
201060-56 = "Я считаю, что нам нужно обсудить всё подробнее, чтобы прийти к общему пониманию."
201060-62 = "Если вы действительно настоящая Президент Генерального Студенческого Совета..."
201060-63 = "Почему вы внезапно исчезли?"
201060-64 = "Где вы были и чем занимались до сих пор?"
201060-65 = "Боюсь, я не могу ответить на этот вопрос."
201060-66 = "Я отчётливо помню последнее дело, которое сделала до того, как \"я\" из записей — то есть Президент Генерального Студенческого Совета — пропала без вести."
201060-67 = "В тот день я читала официальные документы, подписывала их и ушла с работы как обычно."
201060-68 = "Всё, что было после... я не могу вспомнить, словно мой разум окутан туманом."
201060-69 = "Я подумала, что, возможно, погрузилась в глубокий сон, сама того не осознавая. #nНо когда я пришла в себя, прошло уже много времени... #nа ситуация в Кивотосе кардинально изменилась."
201060-70 = "И затем я встретила вас, тех, кто меня не помнит."
201060-71 = "Даже если вы говорите мне это, я никак не могу в это поверить..."
201060-72 = "Да. Естественно, вы и не должны."
201060-73 = "...Ведь даже я сама не могу понять собственное положение."
201060-74 = "Но эта тайна — суть этого мира."
201060-75 = "По сравнению со множеством бед, происходящих в Кивотосе, потеря памяти — лишь пустяк."
201060-76 = "К тому же я не могу просто стоять на месте только потому, что чего-то не понимаю."
201060-77 = "Потому что мой долг — исполнять свои обязанности Президента Генерального Студенческого Совета."
201060-78 = "......."
201060-79 = "Рин. Давай продолжим говорить обо всём, о чём только можем."
201060-80 = "Я буду сотрудничать изо всех сил, пока ты не найдёшь того Президента Генерального Студенческого Совета, в ком будешь полностью уверена."
201060-81 = "Даже если меня запомнят как самозванку... я не убегу от своей ответственности."
201060-87 = "Почему вы... говорите то же самое, что и тот человек..."
201060-88 = "А теперь мне пора за работу, так что прошу меня извинить."
201060-89 = "Сенсей из Шале, если вам что-нибудь понадобится, пожалуйста, не стесняйтесь посещать Генеральный Студенческий Совет в любое время."
201060-98 = "Генеральный Студенческий Совет — Комната медиации, 2-й зал для удалённых конференций"
201060-102 = "...Давно не виделись. #nПрошу прощения за внезапный звонок, но у меня есть к вам просьба."
201060-103 = "Не могли бы вы пересмотреть вопрос об отмене \"Постановления о регулировании распределения чайных листьев Тринити\", предложенного в прошлом месяце?"
201060-107 = "Послание от Президента Генерального Студенческого Совета. #nЯ гадала, в чём же дело, но речь об этом, значит."
201060-108 = "Наш ответ остаётся прежним, как мы и передавали главе Комнаты медиации в прошлом месяце. #nМы не можем отменить это постановление."
201060-110 = "Э-э... ну..."
201060-111 = "Это постановление — мера по упрощению распределительной сети и стабильному снабжению предметами роскоши студентов нашей школы."
201060-112 = "Оно также служит целям сохранения ценности чайных листьев, которыми гордится Тринити. #nМне бы очень хотелось, чтобы члены Генерального Студенческого Совета это поняли."
201060-113 = "Кроме того, возможно, это провал в моей памяти, но... #nразве Генеральный Студенческий Совет не придерживался позиции невмешательства в отношении постановлений, предлагаемых каждым автономным округом?"
201060-114 = "Неужели теперь политика изменилась?"
201060-115 = "Нет, это не так. #nКаждый автономный округ имеет право предлагать постановления, и Генеральный Студенческий Совет уважает это."
201060-116 = "Именно поэтому я и прошу вас. #nЧайные листья, выращенные в Тринити, занимают большую долю рынка чайных листьев в Кивотосе. #nИз-за того, что их распределение внезапно ограничили, цены взлетели."
201060-117 = "Школы, которые полагались на внешние источники чая, вроде Федеральной академии Ред Винтер, #nоказались в большом затруднении, потому что не могут наслаждаться своим чаем."
201060-118 = "Не думаю, что мы обязаны беспокоиться об обстоятельствах других школ."
201060-119 = "Да, это совершенно верно. #n...Кстати говоря, мне очень понравился чай, который вы прислали на днях."
201060-120 = "Казалось, у него был более освежающий и утончённый вкус, чем у предыдущего... #nвы использовали новый купаж?"
201060-124 = "...А вы проницательны. Я добавила немного цитрусового масла, которое используется в Эрл Грей."
201060-125 = "Я рада, что он пришёлся вам по вкусу, но к чему вдруг заводить об этом речь...?"
201060-126 = "Да нет. Я просто подумала, что если подавать чай со сладостями, он станет ещё вкуснее."
201060-127 = "Например, с шоколадным пирогом, приготовленным с обилием брусники из Ред Винтер?"
201060-128 = "...."
201060-129 = "Если бы студенты Ред Винтер, которые ежедневно наслаждаются высококачественными фруктами, #nпопробовали чай Тринити, который составляет им идеальную пару... #nя думаю, это также помогло бы улучшить имидж вашей школы..."
201060-130 = "Что думаете?"
201060-131 = "Хороший чай заслуживает столь же изысканных сладостей, чтобы считаться первоклассным."
201060-132 = "...Я понимаю. #nЯ положительно рассмотрю вопрос об отмене упомянутого постановления о регулировании распределения."
201060-133 = "Благодарю за понимание."
201060-134 = "Не стоит. Я тоже очень созидательно провела время, имея возможность спустя столь долгое время побеседовать с кем-то, кто знает толк в чае."
201060-135 = "В следующий раз, когда вы придёте, я угощу вас чаем нового купажа."
201060-136 = "Да, буду ждать с нетерпением."
201060-139 = "В последнее время беспорядки, устраиваемые хулиганами в Д.У., нарастают день ото дня."
201060-140 = "Согласно расследованию Оборонного ведомства, есть отчёт о том, что 50% происшествий, случившихся за последние несколько месяцев, были вызваны студентами из Геенны."
201060-141 = "В связи с этим мы направили письменный запрос о сотрудничестве в расследовании заместителю директора Оборонного ведомства, #nно ответа пока не получили."
201060-142 = "Знает ли Макото, президент Пандемониума, что-нибудь об этой проблеме...?"
201060-147 = "Ки-ки... какой глупый вопрос."
201060-148 = "Это, конечно же —"
201060-149 = "Я понятия не имею!"
201060-150 = "......."
201060-151 = "Тогда самое время начать. #nНе могли бы вы оказать поддержку, направив подкрепление и припасы от Пандемониума, чтобы помочь в борьбе с хулиганами?"
201060-152 = "С чего вы мне это говорите?"
201060-153 = "Борьба с хулиганами — это роль Дисциплинарного комитета. #nБудь то внутри или за пределами автономного округа Геенны, это не работа для нас в Пандемониуме!"
201060-154 = "Иными словами, причина, по которой хулиганы Геенны не исчезают, целиком и полностью... #nвина президента Дисциплинарного комитета Хины!"
201060-155 = "П-погодите минутку! #nВверять вопросы административного сотрудничества Геенны Дисциплинарному комитету вместо Студенческого совета — это —"
201060-157 = "...Я вижу, я всё поняла."
201060-164 = "Всё это вина некомпетентного президента Хины, вот оно как?"
201060-165 = "П-Президент?!"
201060-166 = "Ну... хм, да, в общем-то так и есть."
201060-167 = "Подумать только, что президент Макото переживает за академию, будучи обременённым столь некомпетентным главой комитета... это поистине прискорбно."
201060-168 = "Извинения не нужны. Макото-сама великодушна к тем, кто признаёт свои грехи и размышляет над ними!"
201060-169 = "Прежде всего, Президент Генерального Студенческого Совета, кажется, благоразумна, в отличие от некоторых."
201060-170 = "Если у вас есть к нам какие-то просьбы, давайте их выслушаем."
201060-171 = "Нет, президент Макото, должно быть, и так достаточно занят, приглядывая за главой Дисциплинарного комитета."
201060-172 = "Ха-ха-ха! Ты мне нравишься!"
201060-173 = "Отныне, если возникнут какие-то проблемы, направляйте их прямиком в Дисциплинарный комитет. #nВся ответственность за Геенну лежит на Дисциплинарном комитете!"
201060-174 = "Я буду иметь это в виду."
201060-175 = "Тогда прошу меня извинить."
201060-181 = "Заместитель директора Оборонного ведомства. Немедленно свяжитесь с Дисциплинарным комитетом Геенны и запросите их сотрудничество. #nНе забудьте поделиться данными о подозреваемых, полученными Оборонным ведомством."
201060-182 = "Также, если поступит запрос на пополнение запасов от Дисциплинарного комитета, поддержите их без колебаний. #nПожалуйста, укажите, чтобы расходы были выставлены на счёт отдела Геенны в Комнате медиации."
201060-183 = "Е-есть...!"
201060-184 = "...О, и последнее: пожалуйста, отправьте по одной коробке лекарства от усталости и лекарства для желудка президенту Сорасаки. Уверена, это окажется полезным."
201060-189 = "Что это значит!"
201060-190 = "Как так вышло, что сезонный лимитированный шоколадный пудинг от Морикори не продаётся в автономном округе Ред Винтер!"
201060-191 = "Да нет же, я ведь сказала, я не могу ответить, даже если вы спросите меня об экономической стратегии компании..."
201060-192 = "И почему вы спрашиваете Транспортное управление? #nЭто такая морока..."
201060-193 = "Хм? Разве ты не отвечаешь за дела, связанные со сладостями, в Генеральном Студенческом Совете?"
201060-194 = " Даже когда на днях открылся тот лимитированный поп-ап магазин Гэлби, #nты стояла в очереди, несмотря на то, что это был будний день. #nЯ решила, что это твоя работа..."
201060-198 = "Э-это... разве это не ошибка из-за внешнего сходства?"
201060-199 = "В любом случае! Я не могу заниматься подобными вещами, так что идите спросите кого-нибудь ещё!"
201060-200 = "Ну-ну-ну... думаешь, сможешь одурачить меня отговоркой такого уровня!"
201060-201 = "Они продают лимитированный пудинг повсюду, кроме Ред Винтер. #nЭто явная дискриминация и вызов моей власти!"
201060-202 = "Пока это не разрешится, Секретариат Ред Винтер продолжит заявлять решительный протест Генеральному Студенческому Совету любыми необходимыми средствами!"
201060-203 = "(Какая морока...)"
201060-208 = "Прошу прощения, можно мне на минутку?"
201060-209 = "Ты ещё кто...?"
201060-210 = "Давно не виделись. Черино, президент Студенческого совета Федеральной академии Ред Винтер, заслужившая титулы главы Отдела экологического благоустройства, генерального секретаря, главы Клинингового отдела, главы Дисциплинарного комитета, главы Отдела школьного питания и главного гурмана Ред Винтер. Я Президент Генерального Студенческого Совета."
201060-211 = "Усы Черино сегодня прекрасны как и всегда. #nМне почти хочется спросить в чём секрет."
201060-215 = "Кхм-кхм. Способность понять великолепие этих усов говорит о том, что у Президента Генерального Студенческого Совета хороший глаз."
201060-216 = "Но секрет я не скажу. Потому что я никак особо за своими усами не ухаживаю!"
201060-217 = "Обладать такими усами без какого-либо ухода. Я искренне завидую. #nКажется, я понимаю, почему студенты Ред Винтер завидуют усам председателя Черино."
201060-218 = "Кстати, насчёт лимитированного шоколадного пудинга, выпущенного Морикори, #nкажется, ходят слухи, что он очень липкий и оставляет рот грязным после еды."
201060-219 = "Если усы председателя Черино испачкаются из-за этого пудинга, разве многие студенты не будут разочарованы?"
201060-221 = "Э-это... правда..."
201060-222 = "Но я не могу отказаться от пудинга, которого так долго ждала...!"
201060-223 = "У нас как раз случайно оказался с собой лимитированный карамельный пудинг от \"L'Oiseau Brûlé\"."
201060-224 = "Этого немного, но я отдам этот пудинг вам, так не могли бы вы сложить своё копьё на этот раз?"
201060-228 = "Лимитированный карамельный пудинг от L'Oiseau Brûlé...!"
201060-229 = "Х-хм... раз уж так говорит Президент Генерального Студенческого Совета, ничего не поделаешь. #nНа этот раз я этим удовлетворюсь."
201060-230 = "Но следующего раза не будет...!"
201060-231 = "Спасибо за ваше понимание, Черино."
201060-239 = "Момока..."
201060-243 = "Н-нет, это неправда! Я не ходила в тот лимитированный поп-ап магазин сладостей!"
201060-244 = "Даже если это твое любимое лакомство, ты не должна покидать своё место в рабочее время. #nМы сотрудники Генерального Студенческого Совета, которые должны быть примером для студентов."
201060-248 = "...Вместо этого я спрошу, сможем ли мы получить несколько образцов для дегустации на встрече с представителями производителей кондитерских изделий Кивотоса на следующей неделе."
201060-252 = "Правда?!"
201060-256 = "Потрясающе... как только Президент Генерального Студенческого Совета вернулась, все проблемы до этого момента решаются разом..."
201060-257 = "Она даже обвела вокруг пальца гордых представителей каждой школы... #nкакая поразительная харизма."
201060-258 = "Я правда рада, что Президент Генерального Студенческого Совета вернулась."
201060-259 = "Да. Президенту Генерального Студенческого Совета действительно нет замены."
201060-263 = "...."
201060-264 = "...Я не могу позволить всему продолжаться в том же духе."
201060-269 = "Следующий эпизод;Сопряжение"