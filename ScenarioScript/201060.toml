[translation]#[Texto Final. - Filipe 12/07.]
201060-1 = "Episódio 6; O Retorno da Super-Humana"
201060-2 = "(Expliquei os acontecimentos recentes à aluna#nque afirma ser a Presidente do Conselho)"
201060-5 = "Conselho Estudantil Geral - Sala de Reuniões"
201060-6 = "……Entendo."
201060-7 = "Tudo isso aconteceu na minha ausência……#nNão tenho como me desculpar o suficiente."
201060-11 = "Porém, alguns pontos do seu relato, Sensei, divergem das minhas memórias."
201060-12 = "Primeiro, essa \"Baú de Shittim\" que eu teria entregado a você."
201060-13 = "Para mim, não parece nada além de um tablet comum."
201060-14 = "Pra começar, conceder a um tablet o controle da Torre Sanctum é uma ideia perigosa demais.#nAfinal, ele permitiria controlar toda a infraestrutura de Kivotos."
201060-15 = "Se essa \"Baú de Shittim\" fosse roubada por pessoas mal-intencionadas#nteríamos uma situação irreversível em mãos, não acha?"
201060-16 = "Você não concorda?"
201060-23 = "[ns] \"Até concordo, mas……\""
201060-24 = "Da mesma forma, o outro artefato anômalo que a Rin mencionou, o \"Cajado de Shaked\",#ntambém não me parece mais que um smartwatch comum."
201060-25 = "Além disso, resolver os problemas de toda a Kivotos#ndependendo de artefato anômalos cujo funcionamento ninguém entende……"
201060-26 = "Isso eu não consigo aceitar. Ainda que o plano, dizem, tenha sido meu."
201060-27 = "Agora que voltei, creio que o plano precisa de alguns \"ajustes\"."
201060-28 = "[s] (Não me diga que vai fechar a Schale……?)"
201060-33 = "Eu apenas cumpri meu dever, seguindo os documentos que a#n\"Presidente do Conselho Estudantil Geral\" deixou."
201060-39 = "A existência da Schale. A sua nomeação, Sensei.#nNão vai me dizer que também não se lembra dos documentos sobre isso."
201060-40 = "……"
201060-44 = "Independentemente do conteúdo, esta assinatura é mesmo da minha caligrafia."
201060-45 = "Os feitos da Schale já me foram compartilhados por escrito."
201060-46 = "Não pretendo negar a existência da Schale#nque, sem abusar de sua autoridade, se dedicou à autonomia#ne à segurança das alunas."
201060-47 = "Pelo contrário: em nome do Conselho Estudantil Geral#neu gostaria até de agradecer."
201060-48 = "[s1] \"Ainda bem……\"\n[s2] \"Achei que seria demitido na hora……\""
201060-51 = "Imagina. Descartar quem salvou Kivotos só por não me lembrar dessa pessoa……#nnão sou assim tão inflexível."
201060-55 = "Contudo……"
201060-56 = "Para alinharmos nossas percepções, ainda precisamos conversar bastante."
201060-62 = "Se você é mesmo a verdadeira Presidente do Conselho Estudantil Geral……"
201060-63 = "Por que desapareceu de repente?"
201060-64 = "Onde esteve e o que fez até agora?"
201060-65 = "Lamento, mas não posso responder a essa pergunta."
201060-66 = "O meu eu dos registros…… ou seja, a Presidente antes de desaparecer,#nlembro nitidamente do último trabalho que realizou."
201060-67 = "Naquele dia, como sempre, li os documentos oficiais#nassinei e encerrei o expediente."
201060-68 = "Do que veio depois…… não consigo me lembrar de nada#ncomo se houvesse uma névoa dentro da minha cabeça."
201060-69 = "Cheguei a pensar que tivesse caído num sono profundo sem perceber.#nMas, quando dei por mim, muito tempo já havia se passado……#ne a situação de Kivotos tinha mudado drasticamente."
201060-70 = "E então encontrei você, que não se lembra de mim."
201060-71 = "Dizer uma coisa dessas e esperar que eu me convença……"
201060-72 = "Sim. É claro que não vai se convencer."
201060-73 = "……Nem eu mesma compreendo a situação em que estou."
201060-74 = "Mas esse mistério é justamente o cerne deste mundo."
201060-75 = "Comparada aos incontáveis problemas de Kivotos#na perda de memórias é algo trivial."
201060-76 = "E não posso ficar parada só porque existem coisas que não compreendo."
201060-77 = "Afinal, tenho a obrigação de cumprir meu dever#ncomo Presidente do Conselho Estudantil Geral."
201060-78 = "…………"
201060-79 = "Rin. Vamos continuar conversando sempre que houver tempo."
201060-80 = "Até você encontrar uma Presidente em quem consiga acreditar#ncooperarei com tudo."
201060-81 = "Mesmo que me registrem como uma impostora……#nnão vou fugir das minhas responsabilidades."
201060-87 = "Por que você…… usa as mesmas palavras que aquela pessoa……"
201060-88 = "Bem, o trabalho me espera.#nCom licença, vou indo."
201060-89 = "Sensei, se precisar de algo#napareça no Conselho Estudantil Geral quando quiser."
201060-98 = "Conselho Estudantil Geral - Departamento de Mediação, Sala de Reunião Remota 2"
201060-102 = "……Há quanto tempo.#nPerdão pelo contato repentino, mas venho também com um pedido a fazer."
201060-103 = "Poderiam reconsiderar a revogação do#n\"decreto de restrição à distribuição do chá produzido em Trinity\", do mês passado?"
201060-107 = "Um contato da Presidente do Conselho Estudantil Geral.#nFiquei me perguntando o que seria, mas é aquele assunto."
201060-108 = "Nossa resposta é a mesma que demos à Chefe de Mediação no mês passado.#nNão podemos revogar o decreto."
201060-110 = "E-Er…… bem……"
201060-111 = "O decreto em questão simplifica a rede de distribuição#ne garante o fornecimento estável desse item aos nossas alunas."
201060-112 = "Ele também visa proteger o valor das folhas de chá que são o orgulho de Trinity.#nEsperamos, de coração, a compreensão do Conselho Estudantil Geral."
201060-113 = "A propósito, posso estar me lembrando mal……#nmas o Conselho não mantinha uma postura de não intervir nos decretos de cada distrito?"
201060-114 = "A política mudou de uma hora pra outra?"
201060-115 = "Não, de forma alguma.#nCada distrito autônomo tem o poder de propor decretos, e o Conselho respeita isso."
201060-116 = "Por isso mesmo é um pedido.#nO chá de Trinity ocupa boa parte do mercado de chás de Kivotos.#nCom a distribuição restringida de repente, os preços dispararam."
201060-117 = "Academias que sempre dependeram de fornecedores externos, como a Academia Federal Red Winter,#nestão sofrendo bastante, sem poder desfrutar de seu chá."
201060-118 = "Não creio que tenhamos obrigação de nos preocupar com a situação#ndas outras escolas."
201060-119 = "Sim, é bem verdade.#n……Aliás, o chá preto que nos enviou outro dia……#neu também o apreciei imensamente."
201060-120 = "Notei um toque mais fresco e suave no aroma, comparado ao anterior……#nSeria um blend novo?"
201060-124 = "……Perspicaz.#nAcrescentei um pouco do óleo de cítricos que se usa no Lady Grey."
201060-125 = "Fico feliz que tenha agradado, mas por que esse assunto agora……?"
201060-126 = "Nada demais. É que um doce para acompanhar o chá torna a experiência ainda melhor#nnão acha?"
201060-127 = "Por exemplo, uma torta de chocolate recheada com bastante mirtilo-vermelho de Red Winter?"
201060-128 = "……"
201060-129 = "Se as alunas de Red Winter, acostumados às frutas de qualidade,#nprovarem o chá de Trinity, que combina perfeitamente com elas……#na imagem da sua academia também sairia ganhando, não é mesmo……?"
201060-130 = "O que me diz?"
201060-131 = "Um bom chá preto só demonstra sua classe quando servido com doces à altura."
201060-132 = "……Está bem.#nVamos considerar positivamente a revogação do decreto de restrição à distribuição."
201060-133 = "Agradeço imensamente a compreensão."
201060-134 = "Imagina. Eu é que agradeço: fazia tempo que não conversava com alguém que entende de chá.#nFoi um momento muito proveitoso."
201060-135 = "Na próxima visita, farei questão de servir um chá recém-blendado para recebê-la."
201060-136 = "Sim, aguardarei ansiosa."
201060-139 = "Ultimamente, os tumultos causados por delinquentes em D.U.#nse agravam a cada dia."
201060-140 = "Segundo a investigação do Departamento de Defesa#n50% dos problemas dos últimos meses foram causados por alunas vindos de Gehenna."
201060-141 = "Sobre isso, o Vice-Chefe de Defesa enviou um pedido formal de cooperação investigativa#nmas a resposta não chegou até hoje."
201060-142 = "Senhorita Makoto, presidente do Pandemonium, sabe de algo sobre essa questão……?"
201060-147 = "Kikik…… que pergunta tola."
201060-148 = "É claro que――"
201060-149 = "não sei de nada!"
201060-150 = "…………"
201060-151 = "Então não há problema em começar agora.#nO Pandemonium poderia enviar reforços e suprimentos#npara nos ajudar a conter os delinquentes?"
201060-152 = "E por que pedir isso a mim?"
201060-153 = "Conter delinquentes é papel do comitê de disciplina.#nDentro ou fora do distrito de Gehenna, não é trabalho do nosso Pandemonium!"
201060-154 = "Em outras palavras, se os delinquentes de Gehenna não desaparecem, a culpa é toda……#nda presidente do comitê, Hina!"
201060-155 = "E-Espere, por favor!#nDeixar a cooperação administrativa de Gehenna com o comitê de disciplina#ne não com o conselho――"
201060-157 = "……Entendo, compreendi perfeitamente."
201060-164 = "A culpa é toda da incompetência da presidente Hina, correto?"
201060-165 = "P-Presidente?!"
201060-166 = "H-Hã……? B-Bom, é, é isso mesmo."
201060-167 = "Imagino o transtorno que é, para a senhorita Makoto#nse dedicar tanto à academia tendo de carregar uma líder tão incompetente……#nSinto muito pela nossa inaptidão."
201060-168 = "Dispenso desculpas.#nA grande Makoto é generosa com quem admite a culpa e se arrepende!"
201060-169 = "Acima de tudo, a Presidente do Conselho,#nao contrário de CERTA pessoa, sabe ouvir."
201060-170 = "Se tiver alguma exigência a nos fazer, pode dizer."
201060-171 = "Não é necessário.#nA senhorita já deve estar ocupada demais cuidando da presidente do comitê de disciplina."
201060-172 = "Há-há! Gostei de você!"
201060-173 = "De hoje em diante, qualquer problema, mande direto pro comitê de disciplina.#nToda a responsabilidade de Gehenna é do comitê de disciplina!"
201060-174 = "Vou gravar bem isso."
201060-175 = "Com licença, então."
201060-181 = "Vice-Chefe de Defesa: contate agora mesmo o Comitê de Disciplina de Gehenna#ne formalize o pedido de cooperação.#nNão esqueça de compartilhar os dados dos suspeitos detidos pelo Departamento de Defesa."
201060-182 = "E, se o comitê de disciplina solicitar suprimentos, forneça sem economizar.#nCobre os custos do setor responsável por Gehenna no Departamento de Mediação."
201060-183 = "S-Sim, senhora……!"
201060-184 = "……Ah, por último: envie à presidente Sorasaki, à parte, uma caixa de remédio#npara fadiga e uma de remédio pro estômago. Com certeza serão úteis."
201060-189 = "O que significa isso?!"
201060-190 = "O pudim de chocolate da edição sazonal da Morikoori#nnão vai ser vendido no distrito autônomo de Red Winter?!"
201060-191 = "Ai, eu já falei: não adianta me perguntar da estratégia de vendas de#numa empresa……"
201060-192 = "Aliás, por que o Departamento de Transporte?#nQue saco……"
201060-193 = "Hum? Os assuntos de doces do Conselho Estudantil Geral#nnão são responsabilidade tua?"
201060-194 = "Quando a Galbee abriu aquela loja pop-up limitada outro dia,#ntu estavas lá na fila, mesmo sendo dia de semana.#nAchei que fosse teu trabalho……"
201060-198 = "I-Isso…… não foi engano seu, não?"
201060-199 = "Enfim! Esse tipo de coisa não é comigo, procura outro setor!"
201060-200 = "Grrr…… achas que me enganas com tão pouco?!"
201060-201 = "Um pudim limitado à venda em todo lugar, menos em Red Winter.#nIsso é discriminação explícita e um desafio à minha autoridade!"
201060-202 = "Até que isso se resolva, a secretaria de Red Winter usará de todos os meios#npara manter seu rigoroso protesto contra o Conselho Estudantil Geral!"
201060-203 = "(E agora……)"
201060-208 = "Com licença, posso interromper um momento?"
201060-209 = "Quem és tu……?"
201060-210 = "Há quanto tempo. Presidente do conselho estudantil da Academia Federal Red Winter;#npresidente do Clube de Embelezamento Ambiental; secretária-geral; presidente do Clube de Limpeza;#npresidente do comitê de disciplina; presidente do Clube da Merenda;#ne detentora do título de maior gourmet de Red Winter―― senhorita Cherino.#nEu sou a Presidente do Conselho Estudantil Geral."
201060-211 = "Seu bigode segue esplêndido como sempre, senhorita Cherino.#nDá até vontade de perguntar o segredo."
201060-215 = "Ahem! Se compreendes a magnificência deste bigode, tens bom olho, Presidente."
201060-216 = "Mas não revelarei o segredo. Pois eu não faço manutenção alguma no bigode!"
201060-217 = "Um bigode desses sem nenhum trato? Que inveja.#nEntendo por que as alunas de Red Winter invejam o seu bigode, presidente Cherino."
201060-218 = "A propósito, sobre o pudim de chocolate limitado que a Morikoori vai lançar#ndizem que ele é grudento demais e suja toda a boca de quem come."
201060-219 = "Se o pudim manchasse o bigode da presidente Cherino#nquantas alunas não ficariam decepcionados?"
201060-221 = "I-Isso…… é verdade……"
201060-222 = "Mas abrir mão do pudim que tanto esperei……!"
201060-223 = "Acontece que temos em mãos o pudim de caramelo limitado da#n\"L'Oiseau Bulle\"."
201060-224 = "É uma lembrancinha modesta, mas oferecemos este pudim……#nPoderia, desta vez, baixar as armas?"
201060-228 = "O pudim de caramelo limitado…… da L'Oiseau Bulle……!"
201060-229 = "H-Hum…… se a Presidente do Conselho insiste tanto, não há o que fazer.#nDesta vez, me contentarei com isso."
201060-230 = "Mas não vai ter próxima, hein……!"
201060-231 = "Agradeço a compreensão, senhorita Cherino."
201060-239 = "Momoka……"
201060-243 = "N-Não é nada disso! Eu não fui em loja pop-up de doce limitado nenhuma!"
201060-244 = "Mesmo que seja sua comida favorita, não se ausente durante o expediente.#nSomos funcionárias do Conselho Estudantil Geral, o exemplo a ser seguido pelas alunas."
201060-248 = "……Em compensação, na reunião da semana que vem com as fabricantes de doces de Kivotos#nvou perguntar se conseguimos amostras de degustação."
201060-252 = "Sério?!"
201060-256 = "Incrível……#nmal a Presidente voltou e os problemas já estão se resolvendo um atrás do outro……"
201060-257 = "Ela consegue manejar até os orgulhosos representantes de cada academia……#nQue carisma impressionante."
201060-258 = "Que bom que a Presidente do Conselho voltou pra gente."
201060-259 = "Né? É como dizem: a Presidente do Conselho é insubstituível."
201060-263 = "……"
201060-264 = "……Não posso deixar as coisas continuarem assim."
201060-269 = "Próximo Episódio;Pareamento"