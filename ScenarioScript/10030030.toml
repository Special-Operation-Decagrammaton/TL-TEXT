[translation]
10030030-1 = "Episódio 3; O tédio também mata hackers"
10030030-6 = "……Ah, que horas são agora?"
10030030-7 = "Fiquei tão concentrada no livro que esqueci do tempo……"
10030030-11 = "E você, Sensei? Não ficou entediado?"
10030030-12 = "[s1] \"Graças a você, consegui relaxar um pouco depois de muito tempo.\"\n[s2] \"Foi divertido poder ler com calma.\""
10030030-15 = "Fico feliz em ouvir isso. #nDizem que mudar de ambiente ajuda a mudar o foco."
10030030-16 = "Um ambiente assim é perfeito para ler ou programar."
10030030-17 = "Desta vez eu deixei os eletrônicos para trás, mas na próxima, seria bom fazer algum trabalho que possa ser feito offline."
10030030-21 = "……Falando nisso, será que as outras estão descansando direito?"
10030030-30 = "……Hm? Para onde será que elas foram?"
10030030-31 = "[s] \"Não devem estar por perto dando uma volta?\""
10030030-32 = "É…… bem, elas não devem ter ido muito longe."
10030030-33 = "……Espero que não estejam aprontando alguma travessura por aí."
10030030-37 = "Sensei, que tal irmos procurá-las?"
10030030-38 = "Acho que elas devem estar por perto."
10030030-39 = "[s3] \"Como esperado da Chihiro, você é bem sensata.\"\n[s4] \"Sim, vamos juntos.\""
10030030-45 = "（Depois de um tempo……）"
10030030-56 = "Não é essa…… nem aquela……"
10030030-61 = "……O que você está fazendo aqui, Hare?"
10030030-65 = "Ah, senpai."
10030030-66 = "Estou procurando uma erva……"
10030030-67 = "Hm? Está procurando trevos de quatro folhas?"
10030030-68 = "Pode ser bom para relaxar, mas será que crescem trevos por aqui……"
10030030-69 = "Não, não é um trevo……"
10030030-70 = "……Eu estava procurando uma erva que tem um gosto parecido com energético."
10030030-74 = "……Hã?"
10030030-75 = "Do que você está falando? Não existe erva com gosto de energético."
10030030-76 = "Não, existe. Por exemplo, esta erva aqui é um pouco amarga, mas tem um doce bem presente, e quando você coloca na boca, a língua formiga……"
10030030-81 = "É como se tivesse o estímulo de um energético……"
10030030-82 = "Isso não é uma reação alérgica!?"
10030030-83 = "Hare, pare com isso! É perigoso."
10030030-84 = "Mas…… se eu ficar parada, minhas mãos e pés tremem…… eu não aguento mais……"
10030030-85 = "Cafeína…… preciso de cafeína……"
10030030-86 = "Isso é…… crise de abstinência de cafeína……?"
10030030-87 = "O que eu faço? Não tem nenhuma loja de conveniência por perto……"
10030030-91 = "[ns5] \"Ainda tenho um pouco de café na minha garrafa térmica que comprei no caminho……\"\n[ns6] \"Se quiser, pode beber este.\""
10030030-96 = "……Sim."
10030030-101 = "Ufa…… voltei à vida."
10030030-102 = "Não é tão bom quanto um energético, mas consegui ingerir cafeína e me sinto um pouco melhor."
10030030-103 = "Obrigada, Sensei, você me salvou."
10030030-104 = "Por pouco eu não acabei comendo uma erva perigosa……"
10030030-105 = "[s7] \"Fico feliz que pude ajudar, mas……\"\n[s8] \"Essa forma de falar acaba gerando mal-entendidos, sabia!?\""
10030030-108 = "Ter sintomas de abstinência em apenas meio dia…… por que você não diminui a quantidade que bebe normalmente?"
10030030-109 = "Do que você está falando? Energético é o combustível de um hacker!"
10030030-110 = "Eu consigo passar a noite em claro sem comer, mas sem energético, não consigo escrever nem uma linha de código!"
10030030-111 = "No próximo acampamento, vou trazer energético em pó……"
10030030-115 = "Ué, você vai acampar de novo?"
10030030-119 = "Pensei que você já tinha enjoado disso…… mas fico feliz que não seja o caso."
10030030-120 = "Vamos planejar outro acampamento com todo mundo em breve."
10030030-121 = "Ugh……"
10030030-122 = "Ah, é verdade. E a Maki e a Kotama? Não estão com você?"
10030030-123 = "Não sei da Kotama-senpai, mas..."
10030030-124 = "A Maki foi em direção àquela caverna ali."
10030030-125 = "Ela disse que viu as pedras e teve uma ideia."
10030030-127 = "…Uma ideia?"
10030030-128 = "[s] \"Uma caverna... será que ela vai fazer uma escultura?\""
10030030-129 = "Mas, até onde eu sei, ela não tinha nenhuma ferramenta desse tipo na mochila..."
10030030-133 = "…Bem, vamos lá dar uma olhada."
10030030-143 = "Hum, não é esse tom... precisava ser mais assim..."
10030030-144 = "Se eu tivesse um spray...#nNão, talvez só o vermelho já sirva..."
10030030-149 = "…O que você está fazendo, Maki?"
10030030-153 = "Ah, Chihiro-senpai."
10030030-154 = "Bem... eu não estou conseguindo criar a cor que eu imaginei."
10030030-155 = "…Cor? O que você está desenhando hoje?"
10030030-156 = "Olha só, veja isso! Ainda não terminei, mas—"
10030030-161 = "Pintura rupestre!"
10030030-168 = "Nossa, isso é..."
10030030-169 = "Incrível... como você fez isso?"
10030030-170 = "Em vez de tinta, eu misturei argila com pó de carvão para criar o pigmento."
10030030-171 = "Vi na internet que era assim que faziam pinturas rupestres antigamente, então tentei imitar...#nÉ mais difícil do que parece."
10030030-172 = "[s9] \"Com certeza o resultado é impressionante, mas...\"\n[s10] \"…Por que uma pintura rupestre?\""
10030030-173 = "Bem, é que... eu estava andando por aí procurando um lugar com sinal de rede, e de repente, pá! A inspiração veio!"
10030030-174 = "Bem, é que... eu estava andando por aí procurando um lugar com sinal de rede, e de repente, pá! A inspiração veio!"
10030030-175 = "Mas eu não tinha papel nem tela..."
10030030-176 = "E como não dava para conter minha alma artística em chamas..."
10030030-180 = "Então, usei a caverna como tela!"
10030030-183 = "Entendi..."
10030030-184 = "Você precisava mesmo fazer um grafite logo aqui?"
10030030-185 = "Ah! Isso não é grafite, não!#nGrafite é um tipo de arte urbana feita em locais públicos!"
10030030-186 = "E diferente das paredes da cidade que têm dono, ninguém vai se incomodar se eu desenhar nas paredes de uma caverna, né?"
10030030-187 = "Eu me incomodo!"
10030030-188 = "Por exemplo... o que acontece se alguém achar que isso aqui é uma ruína de verdade e começar a investigar?"
10030030-189 = "Ah, para com isso! Ninguém faria uma coisa dessas!"
10030030-190 = "[s] \"E esse desenho grande no meio... o que é?\""
10030030-194 = "Ah, aquilo é a Millennium Tower reconstruída sob a perspectiva do cubismo!"
10030030-197 = "Tentei representar a torre com padrões geométricos para expressar bem a imagem da Millennium, que valoriza a teoria e a lógica."
10030030-198 = "[s] \"E essas coisas que parecem formigas em volta...\""
10030030-199 = "São os alunos da Millennium depois do almoço."
10030030-200 = "Todo mundo se reúne no café para comprar café, então sempre fica uma loucura..."
10030030-201 = "[s] \"E essa criatura com chifres em cima da torre...?\""
10030030-205 = "Aquela é... a Yuuka-senpai processando recibos no Seminário."
10030030-206 = "…Acabou ficando com um ar meio sinistro, né?"
10030030-207 = "Não fique provocando a Yuuka nem aqui."
10030030-208 = "Maki, que rancor é esse que você tem para sempre pregar peças na Yuuka..."
10030030-209 = "Não é peça, é uma atividade artística séria, eu já disse!!"
10030030-212 = "Haa... você sabe onde a Kotama foi?"
10030030-213 = "Perguntei para a Hare agora pouco, mas ela também não sabe."
10030030-218 = "Ah, a Kotama-senpai..."
10030030-219 = "Ela disse que tinha algo para fazer na floresta e foi para aquele lado."
10030030-224 = "Sozinha na floresta...?"
10030030-225 = "[s] \"O que houve?\""
10030030-226 = "Hmm, pode ser só uma preocupação boba, mas nesta época do ano, animais costumam vir até o acampamento em busca de comida, então..."
10030030-227 = "Talvez a gente acabe encontrando um urso."
10030030-228 = "[s] \"Isso é terrível...!\""
10030030-229 = "Quando a Kotama se concentra em algo, ela acaba se distraindo com o que está ao redor..."
10030030-233 = "Vamos logo procurá-la."
10030030-234 = "Ah, Maki! Apague o mural antes de voltar, viu?"
10030030-240 = "Ah, Chihiro-senpai! Espere por mim!"
