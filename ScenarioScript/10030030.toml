[translation]
10030030-1 = "第3話;退屈はハッカーをも殺す"
10030030-6 = "……あれ、今って何時だろ。"
10030030-7 = "本に集中しすぎて時間を忘れてた……"
10030030-11 = "先生はどう？退屈じゃなかった？"
10030030-12 = "[s1] \"おかげで久しぶりにゆっくりできたよ。\"\n[s2] \"じっくり読書ができて楽しかったよ。\""
10030030-15 = "それなら良かった。#n場所が変わるだけで、集中力は変わるって言うし。"
10030030-16 = "こういう環境は、読書やプログラミングにピッタリだね。"
10030030-17 = "今回は電子機器を置いてきちゃったけど、今度はオフラインで進められる作業をするのも良さそう。"
10030030-21 = "……そういえば、みんなちゃんと休めてるかな？"
10030030-30 = "……ん？どこ行っちゃったんだろ。"
10030030-31 = "[s] \"近くを散策でもしてるんじゃない？\""
10030030-32 = "そう……まぁ、そんなに遠くには行かないか。"
10030030-33 = "……どっかで変なイタズラでもしてないといいけど。"
10030030-37 = "先生、ちょっと探しに行ってみない？"
10030030-38 = "たぶん、近くに居ると思うし。"
10030030-39 = "[s3] \"さすがチヒロ、冷静だね。\"\n[s4] \"うん、一緒に行こう。\""
10030030-45 = "（しばらくして……）"
10030030-56 = "これは違う……あれでもない……"
10030030-61 = "……ここで何してるの、ハレ？"
10030030-65 = "あ、先輩。"
10030030-66 = "ちょっと草を探してて……"
10030030-67 = "ん？四つ葉のクローバーでも探してるの？"
10030030-68 = "息抜きにはいいかもしれないけど、この辺にクローバーって生えてたかな……"
10030030-69 = "いや、クローバーじゃなくて……"
10030030-70 = "……エナジードリンクと似た味がする草を探してたの。"
10030030-74 = "……え？"
10030030-75 = "なに言ってるの、エナドリ味の草なんて存在しないでしょ。"
10030030-76 = "ううん。例えばこの草は少し苦味があるけど甘さもしっかりあって、口に含むと舌がピリッと……"
10030030-81 = "まるでエナドリのような刺激が……"
10030030-82 = "それ、アレルギー反応じゃないの！？"
10030030-83 = "ハレ、ちょっとそれ止めて！危ない。"
10030030-84 = "でも……ジッとしてると手足が震えるの……もう、耐えられない……"
10030030-85 = "カフェインが……カフェインが足りない……"
10030030-86 = "これは……カフェインの離脱症状……？"
10030030-87 = "どうしよう、近くにコンビニなんてないのに……"
10030030-91 = "[ns5] \"来る途中で買ったコーヒーが水筒に残ってるんだけど……\"\n[ns6] \"これでも良かったら飲む？\""
10030030-96 = "……うん。"
10030030-101 = "ふぅ……生き返った。"
10030030-102 = "エナドリほどではないけど、カフェインを摂取できて少し元気になった。"
10030030-103 = "ありがとう先生、助かったよ。"
10030030-104 = "もう少しで、危ない草に手を出すところだった……"
10030030-105 = "[s7] \"役に立てたみたいで良かったけど……\"\n[s8] \"その言い方は誤解を招くからね！？\""
10030030-108 = "たった半日で離脱症状が出るなんて……普段から飲む量を減らしたら？"
10030030-109 = "なに言ってるの、エナドリはハッカーの燃料だよ！？"
10030030-110 = "食事しなくても徹夜はできるけど、エナドリ無しじゃ1行もコードなんて書けないよ！"
10030030-111 = "次のキャンプは、粉末タイプのエナドリを持ってこよう……"
10030030-115 = "あれ、またキャンプに行くの？"
10030030-119 = "てっきり、もう嫌気が差したかと思ってたけど……そうじゃないなら良かった。"
10030030-120 = "またそのうち、みんなでキャンプの予定を立てようか。"
10030030-121 = "うっ……"
10030030-122 = "あ、そうだ。マキとコタマは？一緒じゃないの？"
10030030-123 = "コタマ先輩は分からないけど……"
10030030-124 = "マキなら、あっちの洞窟に向かってたよ。"
10030030-125 = "岩を見て、何かひらめいたって言ってた。"
10030030-127 = "……ひらめいた？"
10030030-128 = "[s] \"洞窟ってことは……彫刻かな？\""
10030030-129 = "でも、そんな道具はバッグに入ってなかったはずだけど……"
10030030-133 = "……まあ、見に行ってみようか。"
10030030-143 = "んー、この色じゃなくて、もっとこう……"
10030030-144 = "スプレーさえあれば……#nいや、ここは赤だけでも……"
10030030-149 = "……何してるの、マキ？"
10030030-153 = "あ、チヒロ先輩。"
10030030-154 = "えっと……思った通りの色が作れなくて。"
10030030-155 = "……色？今日は何を描いてるの？"
10030030-156 = "そう、これ見て！まだ途中なんだけど――"
10030030-161 = "洞窟壁画！"
10030030-168 = "なっ、これは……"
10030030-169 = "すごい……どうやって描いたの？"
10030030-170 = "絵の具の代わりに粘土と炭の粉を混ぜて、顔料を作ってみたの。"
10030030-171 = "昔はこうやって壁画を描いてたってネットで見たから、真似してみたんだけど……#n思ったより難しいね。"
10030030-172 = "[s9] \"たしかに、すごい出来だとは思うけど……\"\n[s10] \"……どうして壁画を？\""
10030030-173 = "えっとね……電波の入る場所を探して歩いてたら、いきなりパッ！ってインスピレーションが湧いたんだ！"
10030030-174 = "えっとね……電波の入る場所を探して歩いてたら、いきなりパッ！ってインスピレーションが湧いたんだ！"
10030030-175 = "でも、紙もキャンバスも無いし……"
10030030-176 = "かといって、燃え上がる芸術魂は抑えられなくて…"
10030030-180 = "だから、洞窟をキャンバス代わりに描いたってわけ！"
10030030-183 = "なるほどね……"
10030030-184 = "ここに来てまでグラフィティを描かなきゃダメだったの？"
10030030-185 = "あ！これはグラフィティじゃないよ！？#nグラフィティは、解放的な場所で行なわれるストリートアートの1つだから！"
10030030-186 = "それに持ち主が存在する街の壁と違って、洞窟の壁ならいくら絵を描いても困る人は居ないでしょ？"
10030030-187 = "居るから！"
10030030-188 = "たとえば……この壁画を本当に遺跡だと思い込んで調査しちゃう人が居たらどうするの。"
10030030-189 = "まっさかぁ～、そんなの居ないって！"
10030030-190 = "[s] \"真ん中に描かれてる大きいのは……？\""
10030030-194 = "あ、それは立体主義的に再構築したミレニアムタワー！"
10030030-197 = "理論と論証を重視するミレニアムのイメージをうまく表現できるように、タワーを幾何学的な模様で表現してみたんだ。"
10030030-198 = "[s] \"じゃあ、この周りの蟻みたいなのは……\""
10030030-199 = "それは昼食後のミレニアム生。"
10030030-200 = "みんなコーヒーを買おうとカフェに集まるから、いつもすごいことになってるの……"
10030030-201 = "[s] \"タワーの上に立ってるツノの生えた生物は……？\""
10030030-205 = "それは……セミナーで領収書の処理をするユウカ先輩。"
10030030-206 = "……ちょっと不気味な感じになっちゃったね。"
10030030-207 = "こんなとこでまでユウカに意地悪しないの。"
10030030-208 = "マキは何の恨みがあって、いつもユウカにイタズラを……"
10030030-209 = "イタズラじゃなくて、真面目な芸術活動だってば～！！"
10030030-212 = "はぁ……コタマがどこに行ったか知らない？"
10030030-213 = "さっきハレにも聞いたけど、知らないみたいで。"
10030030-218 = "あ、コタマ先輩なら……"
10030030-219 = "森に用があるって言って、あっちの方に行ったよ。"
10030030-224 = "一人で森に……？"
10030030-225 = "[s] \"どうしたの？\""
10030030-226 = "んー杞憂かもしれないけど、この時期は食べ物を探しに動物がキャンプ場まで来たりするから……"
10030030-227 = "もしかしたら、クマに遭遇するかも。"
10030030-228 = "[s] \"大変だ……！\""
10030030-229 = "コタマはなにかに集中してると、周囲への注意が散漫になっちゃうし……"
10030030-233 = "早く探しに行こう。"
10030030-234 = "あ、マキ！戻る前にちゃんと壁画を消してね。"
10030030-240 = "あっ、チヒロ先輩！待ってよ～！"
