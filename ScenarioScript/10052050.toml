[translation]
10052050-1 = "Hod: Glória comprovada pelo brilho"
10052050-2 = "Para o Departamento de Investigação de Fenômenos Anômalos, a primeira vez que travaram uma batalha foi em Binah, mas parece que tudo começou em Hodo."
10052050-3 = "[s] \"Ah, entendo.\"\"\n10052050-4 = \"Tenho certeza que tudo começou...\"\n10052050-8 = \"Unidade de comunicação da Região Autónoma do Milénio AI \"\".\"\n10052050-9 = \"Depois de ser hackeado e inspirado pelo Dekagrammaton, ele desapareceu deixando para trás um texto misterioso.\"\n10052050-10 = \"Agora que penso nisso... os profetas do Decagrammaton estão todos relacionados com o Milénio.\"\n10052050-11 = \"Quesed era uma fábrica de munições localizada nos arredores do Milénio.\"\n10052050-12 = \"O protótipo da Gebura, a sonda não tripulada nas regiões polares, também pode ser considerado relacionado com o Millennium num sentido mais amplo...\"\n10052050-13 = \"Escusado será dizer que Hodo...\"\n10052050-14 = \"Esse é o grande problema!\"\n10052050-15 = \"Em média, o tempo necessário para instalar a infraestrutura de comunicações aumentou 68%! #nPorque o hub foi capturado!\"\n10052050-16 = \"[s] \"É um bom incômodo para o Millennium...\"\"\n10052050-23 = \"Certo? #nVocê vai se tornar o deus dos dispositivos mecânicos...@#$%^...\"\n10052050-24 = \"…Sensei #$^@*#…ouça #%*….\"\n10052050-30 = \"...!\"\n10052050-31 = \"Quem você acha que foi? Foi a chave? Além disso, o sensei também. Bem, é conveniente, não é?\"\n10052050-32 = \"Cada vez que nos encontramos, uma chave, uma chave... Meu nome é Kay!\"\n10052050-33 = \"Sim, eu entendo. #n...Kay. Está tudo bem?\"\n10052050-34 = \"Mas não consigo entender. Você deve saber muitas coisas... #nVocê está dizendo isso mesmo sabendo disso?\"\n10052050-35 = \"O que você quer dizer? #nHá tantas coisas que não sei. Especialmente sobre este mundo.\"\n10052050-36 = \"O sensei não sabe, mas você sabe. Tenho certeza que existe, certo? #nPor exemplo――\"\n10052050-37 = \"Sobre um deus que agora desapareceu... ou algo assim.\"\n10052050-38 = \"! ?\"\n10052050-39 = \"Em outras palavras... eles eram deuses sem nome. #nAlém disso, sobre o sacerdote dos deuses sem nome.\"\n10052050-40 = \"…….\"\n10052050-41 = \"Essa expressão é a resposta. É muito fácil de entender. #nSe prosseguirmos com a discussão com base nesse \"conhecimento\"...\"\n10052050-42 = \"Você e a princesa... As ações de Alice agora são perdoáveis?\"\n10052050-43 = \"Uma ferramenta feita para um propósito se desvia desse propósito. #nExiste realmente algum valor nisso?\"\n10052050-44 = \"...Então? Você está dizendo que deveria seguir essas pessoas ignorantes?\"\n10052050-45 = \"ignorância! ? Está tudo bem em dizer isso? ?\"\n10052050-46 = \"Não importa o que aconteça, estou apenas dizendo a verdade.\"\n10052050-47 = \"Depois de negar a textura atual e usar Alice como pedra de cunha...\"\n10052050-48 = \"Dissolver toda sacralidade diferenciada e retornar ao mundo antes de começar. #nÉ mesmo?\"\n10052050-49 = \"Seja qual for o seu propósito, você não foi originalmente criado para ser assim? #nÉ por isso que existem vestígios do poder de deuses sem nome?\"\n10052050-50 = \"Só não quero que você diga isso. #nMesmo que ele tenha roubado esse poder descaradamente.\"\n10052050-51 = \"Apenas usamos o que temos disponível!\"\n10052050-52 = \"é assim mesmo.\"\n10052050-53 = \"Eu também estou apenas fazendo o que posso.\"\n10052050-54 = \"É uma memória.\"\n10052050-55 = \"É a providência.\"\n10052050-56 = \"É uma ilusão estúpida, é um dever...\"\n10052050-57 = \"Eu só quero raspar tudo e jogar em algum lugar do oceano!\"\n10052050-58 = \"Todos, exceto Alice, são meus inimigos!\"\n10052050-59 = \"[ns] \"E-eu também...?\"\"\n10052050-60 = \"...Bem, não há nada em que o sensei não pense.\"\n10052050-61 = \"Do que você está sorrindo?\"\n10052050-62 = \"de qualquer forma! #nIdiotas obcecados pelo passado deveriam ser eliminados pelo fluxo dos tempos! #n... Isso significa.\"\n10052050-63 = \"Há tantas coisas que quero dizer para vocês que estão interferindo e fazendo o que quiserem...\"\n10052050-64 = \"Bem, tudo bem. Vou ignorar isso agora como um erro devido à minha juventude.\"\n10052050-65 = \"Então por que não se render agora?\"\n10052050-66 = \"...Deixe-me contar! !\"\n10052050-67 = \"Essa é esta linha.\"\n10052050-68 = \"Até o seu sensei favorito usa uma caixa Shittim, certo?\"\n10052050-69 = \"Você não sabe que também se origina de vestígios anteriores ao início?\"\n10052050-71 = \"Não, não, não, quem ama quem! ?\"\n10052050-72 = \"Por favor cancele agora! #nSe não...vou processá-lo por exibir fatos! ! !\"\n10052050-73 = \"Suspiro... Isso é muito fácil de entender, querido.\"\n10052050-74 = \"Por favor, cale a boca! ! ! !\"\n10052050-75 = \"... Kohon.\"\n10052050-76 = \"Então essa é a história do que aconteceu. #nVocê acha que o sensei usará a caixa do Shittem para retexturizá-lo?\"\n10052050-77 = \"De qualquer forma, evitarei que isso aconteça.\"\n10052050-78 = \"Primeiro de tudo, não sou o tipo de pessoa que faria algo assim.\"\n10052050-79 = \"Então você acha que o mundo está bem do jeito que está?\"\n10052050-80 = \"Embora não seja perfeito, é muito bom.\"\n10052050-81 = \"O mundo continuará sem incidentes, senão para sempre. #n...Você realmente acha isso?\"\n10052050-82 = \"...Isso não é verdade.\"\n10052050-83 = \"Sim, está certo. Isso é o que é importante.\"\n10052050-84 = \"Então vamos cooperar.\"\n10052050-85 = \"Não é muito melhor do que ver este mundo feio continuar indefinidamente?\"\n\n10052050-86 = \"Brigar entre si é simplesmente cansativo.\"\n10052050-87 = \"Não é ruim.\"\n10052050-88 = \"Oh?\"\n10052050-89 = \"No entanto, você não tem permissão para fazer isso.\"\n10052050-90 = \"Por que! ?\"\n10052050-91 = \"Porque Alice está triste.\"\n10052050-92 = \"Além disso, é uma dor.\"\n10052050-93 = \"Problemático...? É por isso?\"\n10052050-94 = \"Isto é o mais importante.\"\n10052050-95 = \"“Problemas” é a força motriz por trás do desenvolvimento!\"\n10052050-96 = \"O que é invenção?\"\n10052050-97 = \"Depois de pensar em como relaxar, você chegará lá!\"\n10052050-98 = \"...Essa é uma frase que soa como se você tivesse se tornado um humano.\"\n10052050-99 = \"Está com ruídos.\"\n10052050-100 = \"Agora você está diminuindo sua autoestima.\"\n10052050-101 = \"Alice também. #nEu poderia ter me tornado algo maior, e ainda posso fazer isso o tempo todo.\"\n10052050-102 = \"Eu realmente não entendo. Por que tal imitação?\"\n10052050-103 = \"É minha escolha?\"\n10052050-104 = \"Ele disse que estava ótimo. Ele disse que viveria para a autoatualização. #nEsse tipo de pessoa é o mais perigoso.\"\n10052050-105 = \"Em primeiro lugar, não é bom interferir na vida dos outros.\"\n10052050-106 = \"Isso é algo que fazem pessoas que têm muito tempo disponível ou que não têm uma personalidade muito elogiada.\"\n10052050-107 = \"Neste caso, você se enquadra no primeiro ou no segundo?\"\n10052050-108 = \"...Não sei sobre este último, mas é chato ser chamado de preguiçoso. #nTambém estamos ocupados!\"\n10052050-109 = \"Você realmente não sabe de nada.\"\n10052050-110 = \"Pessoas preguiçosas são as pessoas mais ocupadas do mundo!\"\n10052050-111 = \"sim! ?\"\n10052050-112 = \"Por favor, não me entenda mal. Deus não criou os humanos.\"\n10052050-113 = \"O homem define Deus.\"\n10052050-114 = \"Recuso-me a pedir o único absoluto agora.\"\n10052050-115 = \"Não precisa necessariamente ser assim. #nTambém podemos ocupar o lugar do Absoluto.\"\n10052050-116 = \"E do Absoluto de que você está falando...\"\n10052050-117 = \"Podemos criar um mundo mais justo, racional e melhor?\"\n10052050-118 = \"Então tudo bem.\"\n10052050-119 = \"Um mundo que não pode sobreviver sem o Absoluto deveria simplesmente perecer.\"\n10052050-120 = \"Foi a mesma coisa que a professora disse! ?\"\n10052050-124 = \"Bem, certamente….\"\n10052050-125 = \"Mas não está errado, está?\"\n10052050-126 = \"Eu cuidarei de você. Com Alice.\"\n10052050-127 = \"Bem... vamos incluir também o sensei.\"\n10052050-128 = \"Em certo sentido, você pode estar certo. #nLifeforms são certamente estúpidos.\"\n10052050-129 = \"No entanto, é demasiado sábio para ser destruído.\"\n10052050-130 = \"...Bem, sou estúpido demais para criar um paraíso.\"\n10052050-131 = \"Então, tenho certeza que continuarei superando a brecha, falhando muitas vezes e me levantando novamente...\"\n10052050-132 = \"Acho que um dia encontrarei um jeito.\"\n10052050-133 = \"Isso é o que chamamos de confiança infundada.\"\n10052050-134 = \"...O atual é vendido pelo sensei. Não sei.\"\n10052050-135 = \"É uma mudança de responsabilidade? !\"\n10052050-139 = \"[ns1] \"Isso mesmo! Em uma emergência, o sensei assumirá a responsabilidade!\"\n[ns2] \"Os adultos são responsáveis ​​pelos erros das crianças!\"\"\n10052050-142 = \"Com certeza... se Soph estivesse aqui, ele teria dito: \"Não estrague tudo.\"\"\n10052050-143 = \"De qualquer forma, não quero que você interfira desnecessariamente.\"\n10052050-144 = \"Só porque os novos brotos parecem ter crescimento lento, não os force a arrancá-los.\"\n10052050-145 = \"As plantas crescidas acabarão morrendo pelas raízes.\"\n10052050-146 = \"... Não entendo muito bem o exemplo.\"\n10052050-147 = \"Por favor, estude um pouco!\"\n10052050-148 = \"Não é necessário! Eu também sou estudante!\"\n10052050-149 = \"sensei! Você pode de alguma forma fazer com que essas crianças sejam transferidas?\"\n10052050-150 = \"[s] \"Tenho os documentos de transferência prontos, entre em contato comigo a qualquer momento.\""

10052050-151 = "não, obrigado. Calma, calma."
10052050-152 = "Vamos, Hodo! Os preparativos estão completos!"
10052050-158 = "Suas escolhas - farei você se arrepender!"
