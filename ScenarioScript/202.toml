[translation]
202-1 = "Chesed: O juiz que condena com um tormento misericordioso"
202-2 = "Este espaço, chamado de \"Ruínas\", é um lugar extremamente interessante para nós também."
202-3 = "Alguns de nós da Gematria observam este lugar com grande interesse."
202-4 = "Uma fábrica de armamentos desativada e fechada que não está mais em operação."
202-5 = "Decagrammaton entrou em contato com uma IA chamada Division, que outrora controlava esta fábrica e produzia exércitos infinitos."
202-6 = "Esta fábrica de armamentos, a partir de agora, iluminará seu próprio caminho como o novo profeta do Decagrammaton."
202-8 = "——Chesed."
202-9 = "Seu caminho é a misericórdia que opera através do poder."
202-10 = "Seu epíteto é \"O juiz que condena com um tormento misericordioso\"."
202-12 = "Será possível usurpar a autoridade daquele que possui um reino sólido e um povo que lhe jura lealdade?"
202-13 = "Esta também é uma questão interessante."
