[translation]
202-1 = "ケセド： 慈悲深き苦痛をもって断罪する裁定者"
202-2 = "「廃墟」と呼ばれるこの空間は、私たちにとっても大変興味深い場所です。"
202-3 = "ゲマトリアの何人かはこの場所を、強い関心を持って見守っています。"
202-4 = "現在は稼働していない、閉鎖された軍需工場。"
202-5 = "かつてこの工場をコントロールし無限の軍隊を生産していた、ディビジョンという名のAIに、デカグラマトンが接触しました。"
202-6 = "この軍需工場はこれから、デカグラマトンの新しい預言者として、自らの道を照らすでしょう。"
202-8 = "――[ruby=Chesed]ケセド[/ruby]。"
202-9 = "その[ruby=Path]パス[/ruby]は、権力を通じて動作する慈悲。"
202-10 = "その異名は、「[ruby=the judge who condemns with compassionate torment]慈悲深き苦痛をもって断罪する裁定者[/ruby]」。"
202-12 = "堅固な王国と、忠誠を誓う民を相手に、彼の者の権威を奪うことができるだろうか。"
202-13 = "これもまた、興味深い問題です。"
