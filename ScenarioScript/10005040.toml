[translation]
10005040-1 = "Episódio 4: Reviravoltas, como de costume"
10005040-2 = "Play Lounge - Corredor dos fundos"
10005040-5 = "……Limpo, sem anormalidades."
10005040-6 = "Aqui também não há problemas."
10005040-7 = "E atrás?"
10005040-9 = "Tudo certo."
10005040-10 = "É tarde demais para dizer isso, mas será que estamos realmente no lugar certo...? É frustrante que tantas coisas sejam incertas. Se eu tivesse pegado um pouco mais leve naquela hora..."
10005040-11 = "Não se preocupe com isso, Karin. Para começo de conversa, a culpa foi minha."
10005040-12 = "Além disso, é bem melhor do que ficar sem saber o que fazer. Pelo menos agora sabemos onde devemos ir."
10005040-13 = "……É, talvez você tenha razão. Aquele segurança, no final, ficou inconsciente e só conseguia balbuciar \"Play Lounge\"... Espero que este seja o lugar certo."
10005040-14 = "Ainda assim, estou um pouco preocupada... Depois de fazer aquilo uma vez..."
10005040-15 = "Não, esqueça isso. A propósito, o que seria esse \"Play Lounge\"...?"
10005040-16 = "Como estava escrito no mapa, é o nome daquela sala enorme bem no centro, não é?"
10005040-17 = "Não, eu sei disso, mas..."
10005040-18 = "Você quer dizer, para que serve essa sala?"
10005040-19 = "De fato, nesse sentido, eu também não sei exatamente..."
10005040-20 = "Será que é um lugar que tem alguma relação com os títulos de dívida que aquela criança emitiu?"
10005040-21 = "Sensei, você sabe que tipo de lugar é este?"
10005040-22 = "[s1] \"B-bem, eu não tenho certeza...\"\n[s2] \"Levando ao pé da letra, parece significar 'parquinho' ou 'área de lazer'...\""
10005040-24 = "Entendo..."
10005040-26 = "É verdade..."
10005040-28 = "Bem, não importa o que seja. O que temos que fazer é o de sempre."
10005040-29 = "Não importa que tipo de lugar seja. De qualquer forma, vamos entrar e capturá-la."
10005040-30 = "O que temos que fazer não muda quase nada, certo?"
10005040-31 = "Sim, bem, parece que não temos outra escolha... Se for para acrescentar algo, desta vez vamos tentar fazer isso o mais silenciosamente possível."
10005040-32 = "Afinal, muitos dos nossos procedimentos acabaram saindo do controle..."
10005040-33 = "Então, recapitulando, nosso objetivo principal continua sendo o \"Coelho Branco\"."
10005040-34 = "Ao entrar no \"Play Lounge\", vamos nos separar para procurá-la. Assim que a encontrarem, avisem imediatamente."
10005040-35 = "Vamos neutralizá-la rapidamente e sair deste navio imediatamente."
10005040-36 = "Vamos usar apenas granadas de fumaça e de luz. Se fizermos muito barulho, vamos acabar levando uma bronca."
10005040-37 = "E nada de combate desnecessário. Derrotar todos os seguranças que virmos pela frente está fora de cogitação... Podemos seguir assim?"
10005040-38 = "Ah, que saco..."
10005040-39 = "[s3] \"Boa sorte, Neru.\"\n[s4] \"Você consegue, Neru, força!\""
10005040-43 = "……"
10005040-44 = "Ah, chega, que barulheira! Eu ia fazer isso mesmo sem vocês ficarem me bajulando!"
10005040-45 = "Quem vocês acham que eu sou? Isso é moleza para mim!"
10005040-46 = "Observem. Vou encontrá-la rapidinho, dar um golpe na nuca sem fazer barulho e trazê-la para cá num instante."
10005040-47 = "Então, vamos começar."
10005040-48 = "Beleza. Ah, Sensei, venha comigo. Se acontecer alguma coisa, eu te protejo, então não se preocupe."
10005040-49 = "……Então, vamos nessa!"
10005040-51 = "Play Lounge"
10005040-53 = "Hmm..."
10005040-54 = "Então aqui é o \"Play Lounge\", é...?"
10005040-55 = "Como posso dizer... não passa de um fliperama chamativo, né?"
10005040-60 = "Bem-vindos ao Play Lounge! Vocês estavam olhando com uma cara de curiosidade, será que é a primeira vez de vocês aqui?"
10005040-61 = "……Hã?"
10005040-62 = "Muito prazer, eu sou a guia do lounge, responsável por apresentar este local!"
10005040-63 = "Sou a funcionária que explica as regras e como utilizar os serviços para os nossos clientes."
10005040-64 = "Primeiro, vocês sabem que os serviços aqui no \"Golden Fleece\" variam de acordo com os bens que vocês conseguem nestes jogos, correto?"
10005040-65 = "Jogos...?"
10005040-66 = "Ora, não lhe explicaram isso quando chegou aqui...?"
10005040-67 = "Então, permitam-me explicar novamente: todos os serviços neste navio... como as acomodações, áreas de lazer e até mesmo os banheiros, têm seus níveis de qualidade determinados por bilhetes de troca obtidos através de jogos."
10005040-68 = "Os ranques vão de D a S, e basicamente, se você conseguir obter um 'A', poderá utilizar os melhores serviços disponíveis em quase todo o navio!"
10005040-69 = "[s5] \"Isso significa que...\"\n[s6] \"O 'S' seria algo ainda mais especial...?\""
10005040-70 = "Fufu, exatamente. Não seria exagero dizer que o 'S' é praticamente uma existência lendária."
10005040-71 = "Fufu, exatamente. Não seria exagero dizer que o 'S' é praticamente uma existência lendária."
10005040-72 = "Neste navio, o Golden Fleece, ele concede uma espécie de status extralegal..."
10005040-73 = "Guaaaaaaah!!"
10005040-74 = "……O que foi isso?"
10005040-80 = "Não acredito!! Fiquei no C de novo!"
10005040-81 = "Fi-finalmente tirei um B..."
10005040-82 = "O quê, você tirou um 'B'!? Diferente do 'C', o 'B' te dá direito a frango frito no curry, né!?"
10005040-83 = "E quando chega no 'A', como é? O serviço melhora muito?"
10005040-84 = "Bem, com certeza é bem melhor que o B. Mas comparado ao ranque S, não é nada demais."
10005040-85 = "Dizem por aí que, se você tiver o 'Bilhete VIP' de ranque S, pode ignorar todas as regras escolares deste navio..."
10005040-86 = "Ignorar as regras escolares...? Isso é permitido...?"
10005040-88 = "Opa, parece que alguém subiu do ranque C para o B! Parabéns!!"
10005040-89 = "Todos os outros, vamos nos esforçar para alcançar ranques mais altos também!!"
10005040-91 = "……O que eles estão fazendo?"
10005040-92 = "Aquele cara no telão subiu de ranque e está sendo celebrado? Não entendo nada disso."
10005040-93 = "[s7] \"Parece que o ranque é algo muito importante neste navio.\"\n[s8] \"Um mundo onde tudo é decidido pelo resultado de jogos...\""
10005040-94 = "Hum... então é por isso que eles estão focados nas máquinas, sem nem olhar para os lados."
10005040-95 = "Hum... então é por isso que eles estão focados nas máquinas, sem nem olhar para os lados."
10005040-96 = "Eles não vão nem para a escola e ficam aqui o tempo todo...?"
10005040-97 = "……Hã?"
10005040-98 = "Você se preocupa com esse tipo de coisa, né...?"
10005040-99 = "Ei, cala a boca! Eu também me atraso sempre, mas não costumo faltar tanto assim! Eu vou para a escola, tá ouvindo!?"
10005040-100 = "De qualquer forma, o que importa não é isso..."
10005040-101 = "……Bem, se ela estiver aqui no meio, não seria nada estranho."
10005040-102 = "Estão todos tão concentrados e barulhentos que mal dá para ouvir as vozes."
10005040-103 = "Não quer trabalhar, não quer fazer nada trabalhoso, não quer ser presa a ninguém... é o lugar perfeito para ela."
10005040-105 = "Ainda assim..."
10005040-106 = "Se ela realmente estiver aqui,"
10005040-107 = "O que diabos ela está fazendo...?"
10005040-111 = "[ns9] \"Neru?\"\n[ns10] \"Aconteceu alguma coisa?\""
10005040-112 = "……Achei."
10005040-113 = "……Achei."
10005040-114 = "Ali... está vendo? Aquela ali sentada lá no fundo."
10005040-118 = "Issooo! Hoje não está nada mal!"
10005040-119 = "Bom, vou parar por aqui enquanto estou ganhando..."
10005040-120 = "……Não, com esse ritmo, será que consigo ir um pouco mais...?"
10005040-124 = "Beleza, lá vou eu!! Vamos lá, Koyuki, você consegue, Koyuki!! Acredite na sua força! O lendário 'S' com certeza já está bem na minha frente...!"
10005040-129 = "……Ué, um B? Eu não quero isso!"
10005040-130 = "Ei, por queeeee!? Não acredito, você tem noção de quanto eu já gastei hoje!? Já não era hora de sair um S garantido!?"
10005040-131 = "Quando é que eu vou virar VIP, afinal!!"

10005040-136 = "Ei, ei, por favor, pare! Não bata na máquina...! Você vai ser banida!"
10005040-137 = "Ah..."
10005040-138 = "De-desculpe..."
10005040-144 = "[ns11] \"……Aquela garota?\"\n[ns12] \"Foi mais fácil de encontrar do que esperávamos, né?\""
10005040-145 = "É, pois é..."
10005040-146 = "Ah, é isso mesmo..."
10005040-147 = "Aquela pirralha que está tão distraída que nem percebeu a gente aqui, é a \"Coelho Branco\"."
10005040-148 = "Fala sério, eu aqui pensando no que ela estaria fazendo..."
10005040-149 = "Quer dizer que ela simplesmente torrou todo o dinheiro dos títulos em jogos...?"
10005040-150 = "Que ridículo... Por causa de uma coisa dessas, a gente teve que vir até aqui...!"
10005040-151 = "[s13] \"Bem, pelo menos não é nada pior.\"\n[s14] \"Entendo, ela é uma garota livre.\""
10005040-152 = "...Haa."
10005040-153 = "...Haa."
10005040-154 = "Como você disse, é melhor do que se ela estivesse tramando algo estranho com algum vilão por aí, mas..."
10005040-155 = "...Bom, pra mim, se fosse esse o caso, até que seria um desenrolar do meu agrado."
10005040-159 = "Ei, ei... Estão me ouvindo? Encontrei a \"Coelho Branco\", vou enviar a localização, reúnam-se aqui."
10005040-160 = "Ora, entendido."
10005040-161 = "Entendido, estou indo."
10005040-165 = "Parece que isso acaba aqui."
10005040-166 = "Foi pouco tempo, mas bom trabalho, Sensei."
10005040-167 = "Quando a Karin e a Akane chegarem, vai ser o fim da linha."
10005040-168 = "Ela nem percebeu a nossa presença ainda—"
10005040-175 = "Incrível, incrível! A nossa Asuna acaba de conquistar o Rank A na décima tentativa!"
10005040-176 = "Parabéns! Será que com esse ímpeto ela vai direto para o Rank S e se torna uma VIP?"
10005040-177 = "Não parece, e..."
10005040-181 = "...Hã?"
10005040-182 = "[s15] \"Asuna...?\"\n[s16] \"A Asuna está no telão, bem ali...\""
10005040-183 = "Ei, ei? Mentira?"
10005040-184 = "Ei, ei? Mentira?"
10005040-185 = "Ué!? Aquela não é a Asuna-senpai!?"
10005040-186 = "O, o que ela está fazendo aqui...!?"
10005040-187 = "Isso significa que..."
10005040-188 = "Será que...?"
10005040-189 = "...Tsc."
10005040-193 = "[ns] \"Olá.\""
10005040-194 = "Uwaaaaaaaah!? Oláaaaaaa!?"
10005040-195 = "Ei, segurança!! Tem um invasor aqui! Tem um invasor aquiiiii!!!!"
10005040-196 = "O quê, um invasor!?"
10005040-197 = "Ali, ali!"
10005040-198 = "Peguem eles logo!"
10005040-199 = "Todos os homens, reunir!! Capturem os suspeitos de invasão!!"
10005040-210 = "Ei, Sensei. Fique atrás. E além disso..."
10005040-211 = "...Essa aqui, não tem como deixar passar."
