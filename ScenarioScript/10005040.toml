[translation]
10005040-1 = "第4話;二転三転いつも通り"
10005040-2 = "プレイラウンジ・裏手廊下"
10005040-5 = "……クリア、異常無しです。"
10005040-6 = "こっちも問題ねぇ。"
10005040-7 = "後ろは？"
10005040-9 = "大丈夫。"
10005040-10 = "今さらだけど、ここで本当に合っているのかどうか……色々と不確定なのが悔やまれるな。あの時、もう少し手加減ができていれば……。"
10005040-11 = "気にしないでください、カリン。そもそもは私のミスのせいですし。"
10005040-12 = "それに、途方に暮れるよりずいぶんマシです。最終的に行ってみるべきところが分かっただけでも。"
10005040-13 = "……それもそうか。あの警備担当、最後の方は気絶したままうわ言みたいに「プレイラウンジ」しか言わなくなっていたな……ここが正解だと良いのだけど。"
10005040-14 = "それにしても、ちょっと心配だ……あれを一回やってしまうと……。"
10005040-15 = "いやそれより、ところでこの「プレイラウンジ」というのは……？"
10005040-16 = "案内図に書いてあった通り、この中央にあるやたらとでけー部屋の名前だろ？"
10005040-17 = "いや、それは分かってるけど……。"
10005040-18 = "何をするための部屋なのか、ということですか？"
10005040-19 = "確かに、そういう意味では私もはっきりとはよく分かっていませんが……。"
10005040-20 = "あの子が発行した債券とも、何か関係がある場所なのでしょうか？"
10005040-21 = "先生は、どういう場所なのかご存じです？"
10005040-22 = "[s1] \"ちょ、ちょっと分からないかな……。\"\n[s2] \"言葉通りに捉えると、「遊び場」って意味みたいだけど……。\""
10005040-24 = "そうでしたか……。"
10005040-26 = "そうですね……。"
10005040-28 = "ま、何だっていいだろ。やることはいつも通りだ。"
10005040-29 = "ここがどんな場所でも関係ねぇ。とにかく突っ込んでって、あいつを捕まえる。"
10005040-30 = "いつもとやることはほぼ変わんねぇ、だろ？"
10005040-31 = "そうですね、まあ基本的にはそうするしかなさそうですし……付け足すとすると、今回はせめてそれをできるだけ、静かにやるくらいで。"
10005040-32 = "そもそも、色々と手順が狂ってしまいましたし……。"
10005040-33 = "ではあらためて、あくまでも今回の目標は「白兎」です。"
10005040-34 = "「プレイラウンジ」に入ったら、それぞれバラバラになって彼女を捜索。見つけ次第すぐに連絡してください。"
10005040-35 = "速やかに制圧して、即座にこの船を抜け出しましょう。"
10005040-36 = "煙幕弾と閃光弾、それ以外は使わないようにしましょうか。ことを大きくすると怒られてしまいますから。"
10005040-37 = "それから、むやみな戦闘は無しで。警備の方々を片っ端から倒す、なんてもっての外……こんな感じで行きましょうか？"
10005040-38 = "はぁ、めんどくせぇな……。"
10005040-39 = "[s3] \"頑張ってね、ネル。\"\n[s4] \"ネルならできるよ、ファイト。\""
10005040-43 = "……。"
10005040-44 = "あーもううるせぇなぁ！んなお世辞、言われなくてもやるっての！"
10005040-45 = "あたしを誰だと思ってる、そんくらい朝飯前だ！"
10005040-46 = "見てろ。さっさと見つけて、ほぼ無音で後頭部ぶん殴って、すぐにここまで連れてきてやる。"
10005040-47 = "じゃあ、始めよう。"
10005040-48 = "おっし。あ、先生はあたしについて来い。何かあったらあたしが守ってやるから、心配すんな。"
10005040-49 = "……んじゃ、スタート！"
10005040-51 = "プレイラウンジ"
10005040-53 = "ほーん……。"
10005040-54 = "ここが「プレイラウンジ」、ねぇ……？"
10005040-55 = "なんつーか……ただの派手なゲームセンターだな？"
10005040-60 = "プレイラウンジへようこそ！物珍しそうに見られていましたが、もしかしてここに来るのは初めてでしょうか？"
10005040-61 = "……あん？"
10005040-62 = "初めまして、私はここの案内を担当しているラウンジガイドです！"
10005040-63 = "ご利用の方々へ、利用方法やルールを説明する係ですね。"
10005040-64 = "まず、ここ「ゴールデンフリース号」のサービスは、ここにあるこれらのゲームで手に入った財貨によって内容が変わる、というのはよろしいですよね？"
10005040-65 = "ゲームぅ……？"
10005040-66 = "あら、ここに来る際にご説明がありませんでしたでしょうか……？"
10005040-67 = "ではあらためまして、この船におけるすべてのサービス……たとえば宿泊施設、遊戯施設、その他にも例えばトイレまで、それら全てはゲームを通じて手に入れられる引換券によって、そのサービスの等級が決まります。"
10005040-68 = "ランクはDからSまでありまして、基本的には「A」を獲得することができれば、船内のほぼすべてのサービスにおいて最上級のものをご利用いただけます！"
10005040-69 = "[s5] \"っていうことは……。\"\n[s6] \"「S」は、それ以上の特別な何かが……？\""
10005040-70 = "ふふっ、そうですね。「S」はほぼ幻の存在といっても過言ではありません。"
10005040-71 = "ふふっ、そうですね。「S」はほぼ幻の存在といっても過言ではありません。"
10005040-72 = "このゴールデンフリース号において、ある種の超法規的な――"
10005040-73 = "ぐあああああっ！！"
10005040-74 = "……あんだぁ？"
10005040-80 = "ダメだー！！またC止まりだよ！"
10005040-81 = "よ、ようやくBが出た……。"
10005040-82 = "え、「B」出たの！？「B」は「C」と違って、カレーに唐揚げ添えてくれるんでしょ！？"
10005040-83 = "これ、「A」になるとどれくらいのもんなの？相当サービスが良くなる感じ？"
10005040-84 = "まあ、確かにBより全然良いかな。それでもSランクに比べると大したことないよ。"
10005040-85 = "噂だけど、Sランクの「VIPチケット」があると、この船における校則を全部無視できるとか……。"
10005040-86 = "校則を無視……？そんなんアリ……？"
10005040-88 = "おっと、どうやらＣランクからBランクに上がられた方がいらっしゃるようですね！おめでとうございまーす！！"
10005040-89 = "他の皆様も、ぜひ上のランク目指して頑張っていきましょ～～！！"
10005040-91 = "……何してんだ、あれ？"
10005040-92 = "あの大きなモニターに映ってるやつのランクが上がって？それでお祝いされてるってことか？意味わかんねぇ。"
10005040-93 = "[s7] \"この船だと、ランクがすごい大事なものなんだね。\"\n[s8] \"ゲームの結果で全てが決まる世界……。\""
10005040-94 = "ふーん……それでこいつら、周りには見向きもせずに筐体に向かってるわけか。"
10005040-95 = "ふーん……それでこいつら、周りには見向きもせずに筐体に向かってるわけか。"
10005040-96 = "こいつら学校にも行かずに、ずっとここでこうしてんのか……？"
10005040-97 = "……あん？"
10005040-98 = "そういうこと気にするんだね……？"
10005040-99 = "って、るせぇな！あたしだって遅刻はしょっちゅうだけど、元々そんなに欠席はしてねぇから！ちゃんと行ってっから！？"
10005040-100 = "とにかく、大事なのはそれじゃなくて……。"
10005040-101 = "……まあこの中にあいつがいるとしても、確かにおかしくねぇな。"
10005040-102 = "どいつもこいつも夢中になってるし、うるさくて話し声もよく聞こえねーし。"
10005040-103 = "働きたくない、面倒なことは何もしたくない、誰にも縛られたくない……あいつにはピッタリの場所だ。"
10005040-105 = "にしても……。"
10005040-106 = "本当にあいつがここにいるとして、"
10005040-107 = "一体何をしてんだ……？"
10005040-111 = "[ns9] \"ネル？\"\n[ns10] \"どうかした？\""
10005040-112 = "……見っけた。"
10005040-113 = "……見っけた。"
10005040-114 = "あそこだ……見えるか？あっちの奥の方で座ってるやつ。"
10005040-118 = "やっはーー！今日はまあまあ悪くない感じ！"
10005040-119 = "じゃあ今日はこの辺で勝ち逃げ……"
10005040-120 = "……いや、この勢いならもう少し行けるんじゃ……？"
10005040-124 = "よし、行くよ！！頑張れコユキ、行けるよコユキ！！自分の力を信じて！伝説の「S」はきっともう目の前に……！"
10005040-129 = "……え、Bじゃん。要らないんだけど！？"
10005040-130 = "ねーなんでぇーーーー！？信じらんない、今日いくら入れたと思ってんの！？そろそろ確定でSが出ても良くない！？"
10005040-131 = "一体いつになったらVIPになれるのさぁ！！もう待てないんだけどーーーー！！！"
10005040-136 = "ちょっ、ちょっとやめてください！機械を叩かないで……！出禁になりますよ！"
10005040-137 = "うっ……。"
10005040-138 = "す、すみません……。"
10005040-144 = "[ns11] \"……あの子が？\"\n[ns12] \"意外とあっけなく見つかったね？\""
10005040-145 = "ああ、そうだよ……。"
10005040-146 = "ああ、そうだよ……。"
10005040-147 = "夢中になって、こっちに全然気づいてもないあのガキが、「白兎」だ。"
10005040-148 = "ったく、何をしてるかと思ったら……。"
10005040-149 = "債券の金を、ただ全部ゲームに突っ込んでたってことか……？"
10005040-150 = "くっだらねぇ……そんなことのせいで、わざわざあたしらはここまで……！"
10005040-151 = "[s13] \"まあ、もっと悪いことじゃなくて良かった。\"\n[s14] \"なるほど、自由な子だ。\""
10005040-152 = "……はぁ。"
10005040-153 = "……はぁ。"
10005040-154 = "確かにあいつの言ってた通り、どこぞの悪党と組んで変なこと企んでるよりマシだったが……。"
10005040-155 = "……ま、あたしは別に、それならそれで好みの展開だったけどよ。"
10005040-159 = "あー、あー……聞こえてるか？「白兎」を見つけた、位置を送るから集まれ。"
10005040-160 = "あら、承知しました。"
10005040-161 = "分かった、すぐ行く。"
10005040-165 = "これで終わりそうだな。"
10005040-166 = "短い時間だったが、先生もお疲れさん。"
10005040-167 = "カリンとアカネが来たら、もうそれで終いだろ。"
10005040-168 = "あいつも全然、あたしらのことに気づいて――"
10005040-175 = "なんとなんと！こちらのアスナ様が、わずか10回目でAランクを獲得！"
10005040-176 = "おめでとうございます！この勢いで一気にSランク、VIPとなるのでしょうか？"
10005040-177 = "なさそう、だ、し……"
10005040-181 = "……は？"
10005040-182 = "[s15] \"アスナ……？\"\n[s16] \"今電光掲示板に、思いっきり大画面でアスナが……。\""
10005040-183 = "え、え？嘘？"
10005040-184 = "え、え？嘘？"
10005040-185 = "えっ！？今のアスナ先輩じゃん！？"
10005040-186 = "ど、どうしてここに……！？"
10005040-187 = "っていうことは……。"
10005040-188 = "もしかして……？"
10005040-189 = "……ちっ。"
10005040-193 = "[ns] \"こんにちは。\""
10005040-194 = "うわああぁぁぁぁぁっ！？こんにちはぁぁぁ！？"
10005040-195 = "ちょっと警備員さん！！ここに侵入者！侵入者がいるよーーーー！！！！"
10005040-196 = "なに、侵入者だと！？"
10005040-197 = "あそこあそこ！"
10005040-198 = "早く捕まえちゃって！"
10005040-199 = "総員集合！！侵入者と思しき者共を確保せよ！！"
10005040-210 = "おい、先生。下がってろ。それから……"
10005040-211 = "……こいつぁ、流石に見逃せ。"
