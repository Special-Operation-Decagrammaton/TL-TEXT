[translation]
2600705-1 = "O motivo da pressa"
2600705-2 = "（Saí com a caixa de ferramentas e os parafusos, conforme Ayane me pediu）"
2600705-3 = "（Lembrei-me vagamente do local, já que foi onde o helicóptero caiu）"
2600705-8 = "（…………）"
2600705-9 = "（Deveria haver trabalho sendo feito, mas não ouço som algum）"
2600705-13 = "[ns] \"……Ayane?\""
2600705-14 = "…………Ugh……."
2600705-15 = "……Ugh, ugh."
2600705-16 = "[ns] \"……Ayane, você está bem!?\""
2600705-24 = "Desculpe, Sensei... chamei você aqui para isso..."
2600705-25 = "Pensando bem, é óbvio... mesmo sendo um resort, trabalhar sob um sol escaldante por tanto tempo..."
2600705-26 = "O helicóptero é feito de metal, então o calor é intenso... se eu tivesse percebido isso mais cedo..."
2600705-27 = "Sinto muito..."
2600705-28 = "[s1] \"Eu que peço desculpas por ter demorado a notar.\"\n[s2] \"Você precisa cuidar melhor da sua saúde, sabe?\""
2600705-29 = "Sim……."
2600705-30 = "Sim……."
2600705-31 = "Ah, falando nisso, Sensei..."
2600705-32 = "Isso é..."
2600705-33 = "Os parafusos que eu pedi..."
2600705-34 = "Muito obrigada, Sensei. Já estou bem. Falta pouco, então vou terminar o resto."
2600705-35 = "……Eh? Você vai me ajudar, Sensei……?"
2600705-36 = "A consertar o helicóptero……?"
2600705-37 = "E-está tudo bem! Eu consigo fazer isso sozinha……."
2600705-38 = "O-ou então, que tal pararmos por hoje? Deixamos o resto para amanhã……."
2600705-39 = "……Eh?"
2600705-40 = "No meu lugar……?"
2600705-41 = "Você não só trouxe as peças……"
2600705-45 = "Por que você está fazendo o trabalho também……."
2600705-46 = "……Não, muito obrigada, Sensei."
2600705-52 = "Então, conto com você!"
2600705-54 = "（Depois disso, segui as instruções da Ayane e continuei o conserto do helicóptero）"
2600705-55 = "（Não era uma quantidade que terminaria em um dia, então, mesmo anoitecendo, o trabalho progrediu de forma constante）"
2600705-60 = "Eita..."
2600705-61 = "Acho que avançamos bastante……."
2600705-65 = "Vamos parar por aqui hoje, já que chegamos a um bom ponto."
2600705-66 = "[s3] \"Sim, acho que está bom.\"\n[s4] \"Sim, melhorou bastante.\""
2600705-67 = "Ainda estamos longe de um conserto completo, mas... ahaha……."
2600705-68 = "Ainda estamos longe de um conserto completo, mas... ahaha……."
2600705-69 = "……Eh? ……Você não está falando do helicóptero, mas de mim……?"
2600705-70 = "O que isso significa……."
2600705-71 = "[s5] \"A saúde é importante, mas achei que interromper à força também não seria bom.\"\n[s6] \"Pensei que, se eu fosse embora agora, ficaria preocupado com você o tempo todo.\""
2600705-76 = "Sensei…… você foi atencioso comigo……."
2600705-77 = "Então foi por isso que você não foi embora e fez o trabalho no meu lugar……."
2600705-78 = "Fico muito feliz, mas…… ao mesmo tempo, me pergunto se isso está certo……."
2600705-79 = "Eu sempre tento não ser um incômodo para você, Sensei……."
2600705-80 = "……'Porque é o Sensei, está tudo bem', é isso……?"
2600705-81 = "……Ahaha."
2600705-82 = "Sensei…… você não costuma dizer isso sempre?"
2600705-83 = "……Mas, obrigada. Hoje poderei dormir com o coração tranquilo."
2600705-84 = "E amanhã também……."
2600705-85 = "Eh...? Ao lado do helicóptero...? S-sim. Assim está bom?"
2600705-86 = "......Uma foto de recordação?"
2600705-87 = "N-não precisa! Uma foto, eu não mereço tanto...!"
2600705-88 = "[s7] \"Para comemorar seu esforço.\"\n[s8] \"Já que estamos aqui, por que não?\""
2600705-89 = "É, você acha? ...Hmm."
2600705-90 = "É, você acha? ...Hmm."
2600705-94 = "Hehe... tudo bem."
2600705-100 = "Se o Sensei insiste tanto, não tenho escolha."
2600705-103 = "[wa:4000]— Bem, [wa:1450] eu fico por aqui,"
2600705-105 = "— se eu aparecer num cantinho [wa:1350] já está bom...?"
2600705-108 = "— Assim, [wa:1250] está tudo bem...?"
2600705-111 = "[wa:1000]— O- [wa:650] o que eu faço para [wa:500] o helicóptero se destacar...?"
2600705-114 = "[wa:50]— Desculpe,"
2600705-116 = "— eu não estou [wa:800] muito acostumada com isso..."
2600705-119 = "[wa:1200]— Bem... [wa:1550] Sensei?"
2600705-121 = "— Se é uma [wa:500] foto de recordação do conserto..."
2600705-124 = "— não seria melhor [wa:650] focar mais no [wa:800] helicóptero...?"
2600705-127 = "[wa:200]— ...Eh, [wa:950] não é o helicóptero, [wa:1550] é uma foto minha...?"
2600705-130 = "[wa:50]— S- [wa:650] sério mesmo!? [wa:1450] Eeh!?"
2600705-133 = "[wa:950]— I- [wa:500] isso é, [wa:1350] não, [wa:800] eu não odeio, mas...!"
2600705-136 = "— M- [wa:600] meu rosto ficou, [wa:1400] de repente, tão quente..."
2600705-139 = "Levamos muito tempo só para tirar uma foto, não é..."
2600705-140 = "Obrigada, Sensei. Parece que hoje é um dia de muita sorte."
2600705-141 = "......Como forma de agradecimento, vou pilotar este helicóptero bastante para você também!"
2600705-142 = "Sempre que precisar, pode me chamar! Eu voarei até você imediatamente!"
2600705-143 = "[s9] \"Dá para voar de helicóptero com tanta frequência?\"\n[s10] \"Tem certeza? Acho que gasta bastante combustível...\""
2600705-148 = "......Ah."
2600705-149 = "......Agora que você mencionou."
2600705-150 = "Ah... ahaha."
2600705-151 = "......Bem."
2600705-153 = "A-acho que com muita frequência, não dá..."
