[translation]
2600705-1 = "焦っていた理由"
2600705-2 = "（アヤネに頼まれた通り、工具箱とネジを持って外に出た）"
2600705-3 = "（場所は、ヘリが墜落したところだったからなんとなく覚えていた）"
2600705-8 = "（…………）"
2600705-9 = "（作業をしているはずなのに、何も音がしない）"
2600705-13 = "[ns] \"……アヤネ？\""
2600705-14 = "…………う……。"
2600705-15 = "……うう。"
2600705-16 = "[ns] \"……アヤネ、大丈夫！？\""
2600705-24 = "すみません、先生……お呼び立てしておいてこんな……。"
2600705-25 = "少し考えたら当たり前のことなのですが……リゾート地とはいえ、炎天下でずっと作業していたら……。"
2600705-26 = "ヘリも金属だから熱もすごいですし……もっと早くそれに気付けていれば……。"
2600705-27 = "すみません……。"
2600705-28 = "[s1] \"こっちこそ、気づくのが遅くなってごめん。\"\n[s2] \"体調管理、大切にしないとね。\""
2600705-29 = "はい……。"
2600705-30 = "はい……。"
2600705-31 = "あれ、そういえば先生……"
2600705-32 = "それは……。"
2600705-33 = "私がお願いしたネジ……。"
2600705-34 = "ありがとうございます、先生。もう大丈夫です。あと少しなので、残りも片付けちゃいますね。"
2600705-35 = "……え？先生もご一緒に……？"
2600705-36 = "ヘリの修理を……？"
2600705-37 = "だ、大丈夫です！これくらい一人で……。"
2600705-38 = "そ、それか、今日はここまでにしましょうか？残りは明日に回して……。"
2600705-39 = "……え？"
2600705-40 = "私の代わりに……？"
2600705-41 = "部品を持ってきてくださっただけでなく……"
2600705-45 = "どうして作業まで……。"
2600705-46 = "……いえ、ありがとうございます先生。"
2600705-52 = "それでは、よろしくお願いします！"
2600705-54 = "（その後アヤネに指示をもらってヘリの修理を続けた）"
2600705-55 = "（一日で終わる量ではなかったので、夜になっても終わらなかったものの、作業は確実に進んでいた）"
2600705-60 = "よいしょっと……"
2600705-61 = "結構進んだかな……。"
2600705-65 = "今日はここまでにしましょうか、キリも良いですし。"
2600705-66 = "[s3] \"うん、大丈夫そうかな。\"\n[s4] \"うん、だいぶ良くなったね。\""
2600705-67 = "まだ完全な修理にはほど遠いんですけどね……あはは……。"
2600705-68 = "まだ完全な修理にはほど遠いんですけどね……あはは……。"
2600705-69 = "……えっ？……ヘリではなく、私の話……ですか？"
2600705-70 = "それは、どういう……。"
2600705-71 = "[s5] \"体調も大事だけど、無理に中断させるのも良くないかなって。\"\n[s6] \"途中で帰ったら、ずっと気にしちゃうかもなって思って。\""
2600705-76 = "先生……気を遣ってくださったのですね……。"
2600705-77 = "だから帰らずに、私の代わりにやると……。"
2600705-78 = "とても嬉しいのですが……それと同時に、これでいいのかなって……。"
2600705-79 = "先生に迷惑をかけないようにしようと、いつも思っているのに……。"
2600705-80 = "……先生だから大丈夫、ですか……？"
2600705-81 = "……あはは。"
2600705-82 = "先生……それ、よく言ってませんか？"
2600705-83 = "……でも、ありがとうございます。今日は安らかな気持ちで眠れそうです。"
2600705-84 = "そしてまた明日も……。"
2600705-85 = "えっ……？ヘリの横に……？は、はい。こうですか？"
2600705-86 = "……記念撮影？"
2600705-87 = "だ、大丈夫です！写真なんて、そんな……！"
2600705-88 = "[s7] \"頑張った記念に。\"\n[s8] \"せっかくだしね。\""
2600705-89 = "そ、そうですか？……う～ん。"
2600705-90 = "そ、そうですか？……う～ん。"
2600705-94 = "ふふ……はい。"
2600705-100 = "先生にそこまで言われたら、仕方ないですね。"
2600705-103 = "[wa:4000]― えっと、[wa:1450]私はこの辺の、"
2600705-105 = "― 端っこに写っていれば[wa:1350]良いでしょうか……？"
2600705-108 = "― こんな感じで、[wa:1250]大丈夫ですかね……？"
2600705-111 = "[wa:1000]― ど、[wa:650]どうすれば[wa:500]ヘリが際立つんでしょう……？"
2600705-114 = "[wa:50]― すみません、"
2600705-116 = "― こういうのは[wa:800]あまり慣れてなくって…"
2600705-119 = "[wa:1200]― えっと……[wa:1550]先生？"
2600705-121 = "― 修理の[wa:500]記念写真ということでしたら……"
2600705-124 = "― もっと[wa:650]ヘリを中心に[wa:800]撮った方が良いのでは……？"
2600705-127 = "[wa:200]― ……え、[wa:950]ヘリではなくて、[wa:1550]私の記念写真……？"
2600705-130 = "[wa:50]― そ、[wa:650]そうだったんですか！？[wa:1450]えぇっ！？"
2600705-133 = "[wa:950]― そ、[wa:500]それはその、[wa:1350]いえ、[wa:800]嫌ではないですが……！"
2600705-136 = "― な、[wa:600]何だか急に、[wa:1400]顔が熱く……っ"
2600705-139 = "写真一枚撮るのに、すごく時間かかっちゃいましたね……。"
2600705-140 = "ありがとうございます先生。今日は色々と運がいい日みたいです。"
2600705-141 = "……代わりにというのも何ですが、その分、このヘリを先生のためにもたくさん飛ばしますね！"
2600705-142 = "御用の際はいつでも呼んでください！すぐに飛んでいきますので！"
2600705-143 = "[s9] \"ヘリってそんなに頻繁に飛ばせるの？\"\n[s10] \"いいの？それなりに燃料もかかっちゃうと思うけど……。\""
2600705-148 = "……あ。"
2600705-149 = "……言われてみれば。"
2600705-150 = "あ……あはは。"
2600705-151 = "……えっと。"
2600705-153 = "あ、あまり頻繁には、ダメです……。"
