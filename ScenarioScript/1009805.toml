[translation]
1009805-1 = "ヒーロー、決戦"
1009805-3 = "あ、先生。"
1009805-4 = "来てくれて助かったよ。"
1009805-5 = "[s1] \"ホシノ一人で大丈夫？\"\n[s2] \"アジトってことは、たくさん人がいるはずじゃない？\""
1009805-8 = "うへ～、一人なんかじゃないでしょ。"
1009805-9 = "頼もしい相棒が、ここにいるじゃん。"
1009805-10 = "[s] \"あれ、もう照れなくなったんだね。\""
1009805-11 = "まぁ、あれだけヒーローって呼ばれてたらねぇ。"
1009805-12 = "よっぽどのことがなければ、もう動揺しないかな……？"
1009805-13 = "……うへへ。#nやっぱり、まだちょっと恥ずかしいかも。"
1009805-14 = "ま、とりあえず商店街を見て回ろっか。"
1009805-15 = "……そんなに余裕ぶってる時間はあるのか、って？"
1009805-16 = "正直に言うと、アジトの場所が合っているのかすら、まだ分かんないし。"
1009805-17 = "だから、まあ焦っても仕方ないよ。"
1009805-18 = "[s] \"これがヒーローの余裕……。\""
1009805-20 = "[ns] \"正体を隠して周囲に溶け込むのも、ヒーローには大事だよね！\""
1009805-21 = "うへ～、なんか勝手に解釈されてるけど……。"
1009805-22 = "ま、どっちでもいっか。"
1009805-26 = "それじゃ、出発しよ～。"
1009805-34 = "いらっしゃいませ！"
1009805-35 = "うへへ～、可愛い物がいっぱいだね。"
1009805-39 = "見て見て、先生。#n[ruby=くじら]鯨の[/ruby]ポーチがあるよ！"
1009805-40 = "チョッキに付けても似合うかな……。"
1009805-41 = "[s] \"買ってあげるよ。\""
1009805-45 = "うへっ？#nあ、いや、そういう意味で言ったわけじゃ……。"
1009805-46 = "ヒーローにはマスコットが必要、って……？"
1009805-47 = "……そういうものなんだ。"
1009805-52 = "じゃあ、ありがたくもらおうかな？"
1009805-56 = "うん、やっぱり可愛いね。#nありがとう、せんせ～。"
1009805-60 = "うへ～、美味しそうな匂いだぁ。"
1009805-61 = "この辺り、食べ歩きしてる人たちが多くない？"
1009805-62 = "お店の数は少ないけど、#nどれも美味しいから人が集まってるんだろうねぇ。"
1009805-63 = "少数精鋭って、こういう時にも使って良いのかな？"
1009805-64 = "[s] \"たぶん良いんじゃない……？\""
1009805-65 = "ね、先生。そろそろお昼の時間だし……。"
1009805-66 = "私たちも食べ歩きしない？"
1009805-70 = "まずは、あそこのたこ焼きから！"
1009805-73 = "うへ～、やっぱり商店街は良いね。#n買い物も食事も一緒に済ませられるし。"
1009805-74 = "先生も楽しめてる？"
1009805-75 = "[s] \"もちろんだよ。\""
1009805-77 = "[ns] \"今日はヒーローの日常パートだね。\""
1009805-78 = "日常パートかぁ……。"
1009805-79 = "……うへへ。#n先生とのんびり過ごすのは、楽し――"
1009805-86 = "……先生、あれ見て。"
1009805-92 = "サンドイッチと……。"
1009805-93 = "あ、飲み物も頼む。"
1009805-98 = "……ヘルメット団。"
1009805-99 = "少し監視しよう。"
1009805-101 = "お釣りは大丈夫だ。"
1009805-102 = "……えっ？#nあ、ありがとうございました！"
1009805-107 = "お釣りを快くあげるだなんて……。"
1009805-108 = "やっぱり怪しくない？#nいつもとは違う気がする。"
1009805-109 = "[s] \"後をつけてみようか？\""
1009805-110 = "……うん。"
1009805-111 = "見つからないように、距離を保とう。"
1009805-126 = "遅かったなぁ！？#n急げって言ったのによ……。"
1009805-127 = "す、すみません！"
1009805-128 = "もういい。#nおら、さっさと食って残りの仕事を終わらせるぞ。"
1009805-129 = "今のうちに、たんまり稼いでおかないとな。"
1009805-132 = "はいっ！"
1009805-137 = "……旧校舎？"
1009805-138 = "砂に埋もれていたはずじゃ……。"
1009805-139 = "[s] \"この前の砂嵐の影響かな？\""
1009805-140 = "……そうかもしれない。"
1009805-141 = "偶然、ここを見つけたヘルメット団は、#n金になりそうな物を集めて売ってたんだ……。"
1009805-142 = "装備が新しくなった理由も、#nほかの自治区で姿を見かけなくなった理由も、これで説明がつく。"
1009805-143 = "……掲示板を盗もうとしてた連中みたいに。"
1009805-147 = "これは見過ごせないね、先生。"
1009805-148 = "[s] \"ヒーローの活躍パートだ！\""
1009805-156 = "ん？"
1009805-157 = "何の音だ？"
1009805-158 = "侵入者です！"
1009805-159 = "はっ。私たちに楯突くとは、怖い物知らずだな！"
1009805-160 = "お前たち、目にものを――"
1009805-182 = "うへ～。"
1009805-184 = "た、隊長がやられた……！"
1009805-185 = "に、逃げろぉぉ！"
1009805-189 = "お、おいっ！#n先に逃げんじゃねえ！"
1009805-196 = "……さすがに、あの人数を追いかけるのはね。"
1009805-197 = "でも、これであいつらも手を引くでしょ。"
1009805-198 = "[s] \"さすが、アビドスのヒーロー！\""
1009805-199 = "うへ～、照れるねぇ。"
1009805-200 = "まぁ、ひとまず一件落着かな。#n先生もお疲れ～。"
1009805-201 = "……うん？#nこれでしばらく静かになるのか、って？"
1009805-202 = "それはどうだろね。"
1009805-203 = "アビドスが今の状態であり続ける限り、#nすぐにまた別のトラブルが起こると思うよ。"
1009805-204 = "[s] \"じゃあ、ヒーローの活動は続くんだね！？\""
1009805-205 = "……。"
1009805-206 = "うへ～、そうきたかぁ。"
1009805-207 = "ま、たしかに続けるしかないかもね。"
1009805-208 = "でも、おじさんのヒーロー活動が続くってことは……"
1009805-209 = "つまり――"
1009805-210 = "[s] \"つまり？\""
1009805-211 = "先生には、これからもおじさんの相棒でいてもらわなきゃ。"
1009805-212 = "うへへ～。#nこうなったからには、とことん付き合ってもらうよ。"
1009805-217 = "[ns] \"もちろんだよ！\""
1009805-218 = "うへへ、頼もしいねぇ。"
1009805-219 = "じゃ、さっそくほかの商店街の様子も見にいこっか。"
1009805-224 = "ついでに、おじさん綿菓子食べたいな～。"
