[translation]
1009805-1 = "Heróis, batalha decisiva"
1009805-3 = "Ah, doutor."
1009805-4 = "Obrigado por ter vindo."
1009805-5 = "[Hoshino, tem certeza de que pode lidar com isso sozinha? \"\n[s2] \"Se é um esconderijo, não deveria haver muitas pessoas lá? \"\"\n[s2]]"
1009805-8 = "Ugh - você não está sozinha, está?"
