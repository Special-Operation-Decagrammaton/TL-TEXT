[translation]
10032070-1 = "Episódio 7; Um desfecho inacreditável"
10032070-10 = "Não é gente demais?"
10032070-11 = "Não é uma única organização, é uma coalizão de gangues. O Don Arancino é o líder delas."
10032070-12 = "……E então, o Arancino? Ele ainda está desmaiado?"
10032070-13 = "Hmm."
10032070-14 = "……Parece que sim! Ele está completamente apagado!"
10032070-15 = "Será que o tiroteio de agora pouco causou muitos danos? Pode levar algumas horas para ele acordar~"
10032070-16 = "Ah, logo agora……"
10032070-17 = "Fala sério, por que não entregamos ele logo? O objetivo deles não é o chefe?"
10032070-18 = "Isso não dá."
10032070-19 = "Eles ainda não estão usando força total porque o chefe está com a gente."
10032070-20 = "Se entregarmos ele, eles vão atacar sem qualquer restrição."
10032070-21 = "Por isso, temos que levar o chefe e recuar para um lugar que seja vantajoso para nós."
10032070-22 = "Es-esperem um pouco……"
10032070-24 = "O que é essa situação?"
10032070-25 = "Por que vocês estão me ajudando? Até agora pouco vocês não estavam me perseguindo?"
10032070-26 = "Mesmo sendo inimigos……"
10032070-28 = "Bem, a situação mudou um pouco."
10032070-29 = "Uma coisa é uma coisa, outra coisa é outra coisa."
10032070-31 = "É, é mesmo? Não entendo muito bem, mas……"
10032070-32 = "Pessoal! Eles estão vindo de novo!!"
10032070-33 = "……!!"
10032070-34 = "Uaaaaaaah!!"
10032070-45 = "…………."
10032070-46 = "……Já vi isso antes, mas vocês são realmente corajosas."
10032070-47 = "Essa é a Problem Solver 68, que está no topo do submundo……!"
10032070-48 = "Ha, Haruka! Você está avançando demais! Precisa manter o ritmo……!"
10032070-49 = "Entendo. Quando estão do nosso lado, elas parecem tão confiáveis."
10032070-55 = "……Aru-chan, ouviu isso? Disse que somos o topo do submundo!"
10032070-56 = "Que bom, presidente. Não era algo que você queria ouvir há tempos?"
10032070-57 = "……Bem, não esperava ouvir isso em uma situação dessas."
10032070-58 = "……Fu, fufu! Cla-claro que sim!"
10032070-59 = "Guardem bem isso! Nós, da Problem Solver 68……"
10032070-70 = "Quer dizer, primeiro vamos sair daqui!"
10032070-71 = "Sensei! Dê o comando!!"
10032070-72 = "[s3] \"Deixe comigo!\"\n[s4] \"Vamos nessa!\""
10032070-77 = "Farei o meu melhor para não ser um peso."
10032070-86 = "Morram, morram, morram, morram, morram!!"
10032070-93 = "Todos vocês, morram logo!!!"
