[translation]
10032070-1 = "第7話;とんでもない結末"
10032070-10 = "ちょっと多すぎじゃない？"
10032070-11 = "一つの組織じゃなくて、ギャングの連合だからね。#nドン・アランチーノはそこのトップだし。"
10032070-12 = "……それで、アランチーノは？まだ気絶してる？"
10032070-13 = "う～ん。"
10032070-14 = "……そうっぽいね！完全に意識が飛んでるみたい！"
10032070-15 = "さっきの銃撃が結構ダメージあったのかな？起きるには、まだ数時間かかるかも～"
10032070-16 = "はぁ、よりによって……"
10032070-17 = "もう、こいつのこと渡しちゃえば？連中の狙いは、ボスの身柄でしょ？"
10032070-18 = "それはダメ。"
10032070-19 = "奴らがまだ全力を出してないのは、ボスがこっちの手にあるから。"
10032070-20 = "こいつの身柄を渡したら、向こうは手加減せずに攻めてくる。"
10032070-21 = "だから、ここはボスを連れて私たちに有利な場所まで引くしかない。"
10032070-22 = "ま、待ってくれ……"
10032070-24 = "なんだ、この状況は。"
10032070-25 = "なぜお前たちが私の手助けを？さっきまで追ってきていただろう？"
10032070-26 = "敵対していたというのに……"
10032070-28 = "まあ、少し状況が変わったから。"
10032070-29 = "それはそれ、これはこれってこと。"
10032070-31 = "そ、そうなのか？よく分からないが……"
10032070-32 = "みんな！また来るわよ！！"
10032070-33 = "……！！"
10032070-34 = "うあああぁぁぁ！！"
10032070-45 = "…………。"
10032070-46 = "……前にも見たが、本当に勇敢だな。"
10032070-47 = "これが裏世界のトップクラスに位置する便利屋68……！"
10032070-48 = "は、ハルカ！前に出過ぎよ！ペースを合わせないと……！"
10032070-49 = "なるほど。味方になると、こんなにも頼もしく感じるのか。"
10032070-55 = "……アルちゃん、聞こえた？裏世界のトップクラスだって！"
10032070-56 = "良かったね、社長。ずっと聞きたかった言葉なんじゃない？"
10032070-57 = "……まあ、こんな状況で聞くとは思わなかったけど。"
10032070-58 = "……ふ、ふふ！も、もちろんよ！"
10032070-59 = "しっかり覚えてなさい！私たち便利屋68は……"
10032070-70 = "って、まずはここから抜け出すわよ！"
10032070-71 = "先生！指揮を！！"
10032070-72 = "[s3] \"任せて！\"\n[s4] \"行くよ！\""
10032070-77 = "足手まといにならないよう、最善を尽くそう。"
10032070-86 = "死んでください死んでください死んでください死んでください死んでください！！"
10032070-93 = "全員、死んでくださいいぃぃぃぃ！！！"
