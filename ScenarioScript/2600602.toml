[translation]
2600602-1 = "Um dia de sorte"
2600602-2 = "Kivotos - Área Residencial"
2600602-3 = "Enquanto caminhava pela rua, encontrei uma moeda de 500 ienes caída no chão."
2600602-4 = "[s] Pegar a moeda de 500 ienes."
2600602-5 = "Espereeeee!"
2600602-8 = "Haa, haa... Sensei, essa moeda é minha!"
2600602-9 = "[s] \"A Nodoka deixou essa moeda cair?\""
2600602-10 = "Não, não é bem assim, mas..."
2600602-11 = "Eu a encontrei primeiro!"
2600602-12 = "A 1 km de distância!!"
2600602-13 = "[s] \"D-de 1 km de distância...?\""
2600602-14 = "Sim! Este telescópio consegue ver até formigas a centenas de metros de distância!"
2600602-15 = "O horóscopo da manhã estava bom, e eu estava pensando que algo de bom aconteceria hoje, então fiquei olhando pelo telescópio a manhã toda... e eu estava certa, que sorte!"
2600602-16 = "A Classe Especial 227 do prédio antigo tem poucos suprimentos e quase não conseguimos comer lanches..."
2600602-17 = "Mas com esses 500 ienes, eu posso comprar pão e bebida na loja de conveniência e comer até ficar satisfeita!"
2600602-18 = "Vamos, Sensei, me dê essa moeda!"
2600602-19 = "[s1] Assobiar.\n[s2] Fingir que não ouviu."
2600602-20 = "Por que, Sensei!?"
2600602-21 = "Por que, Sensei!?"
2600602-22 = "Hã? Não importa quem viu primeiro, quem pegou primeiro é o dono?"
2600602-23 = "Que injusto! Pão-duro! Isso é cruel!"
2600602-24 = "[s] \"Em vez disso, vou te pagar um bolo na 'L'Oiseau Bleu'.\""
2600602-25 = "S-sério? A 'L'Oiseau Bleu' é aquela confeitaria chique onde até o bolo mais barato custa mais de 1000 ienes, não é!?"
2600602-26 = "V-você tem certeza mesmo?"
2600602-27 = "[s] \"Com certeza.\""
2600602-28 = "O-obrigada."
2600602-29 = "Realmente... hoje foi um \"dia de sorte\"."
2600602-31 = "Depois disso, usei o Cartão de Adulto para pagar o bolo mais caro da \"L'Oiseau Bleu\" para ela, mas..."
2600602-32 = "Talvez pela pressão, Nodoka não conseguiu comer nem a metade."
