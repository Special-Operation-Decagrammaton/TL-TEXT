[translation]
2600602-1 = "運が良い日"
2600602-2 = "キヴォトス・住宅街"
2600602-3 = "道を歩いていたら、500円玉が落ちているのを見つけた。"
2600602-4 = "[s] 500円玉を拾う。"
2600602-5 = "待ってぇぇー！"
2600602-8 = "はあ、はあ……先生、その小銭は私のです！"
2600602-9 = "[s] \"ノドカが落とした小銭なの？\""
2600602-10 = "いいえ、そうではありませんが……。"
2600602-11 = "私が先に！発見しました！"
2600602-12 = "1km先から！！"
2600602-13 = "[s] \"い、1km先から……？\""
2600602-14 = "はい！この望遠鏡は、数百メートル離れたところにいる蟻も見ることができるんです！"
2600602-15 = "朝の占いも良かったですし、今日は何か良いことが起きるんじゃないかなと、午前中ずっと望遠鏡を覗いていましたが……やっぱり運が良かったです！"
2600602-16 = "旧校舎の227号特別クラスは、補給も少なく、おやつもあまり食べられませんから……。"
2600602-17 = "ですがこの500円さえあれば、コンビニのパンも飲み物も、お腹いっぱい食べられます！"
2600602-18 = "さあ先生、その小銭を私に！"
2600602-19 = "[s1] 口笛を吹く。\n[s2] 聞かなかったことにする。"
2600602-20 = "どうしてですか、先生！？"
2600602-21 = "どうしてですか、先生！？"
2600602-22 = "え？誰が先に見つけたかは重要じゃなくて、先に拾った人が持ち主、ですか？"
2600602-23 = "ずるい！ケチ！ひどいです！"
2600602-24 = "[s] \"代わりに、「ルワゾー・ブッレ」でケーキを奢ってあげる。\""
2600602-25 = "は、はいっ？「ルワゾー・ブッレ」といえば……一番安いケーキでも1000円を超えるという、高級スイーツのお店じゃないですか！？"
2600602-26 = "ほ、本当にいいんですか？"
2600602-27 = "[s] \"もちろん。\""
2600602-28 = "あ……ありがとうございます。"
2600602-29 = "本当に……今日は「運が良い日」でした。"
2600602-31 = "その後、大人のカードを使って、「ルワゾー・ブッレ」で一番高いケーキを奢ってあげたのだけれど……。"
2600602-32 = "プレッシャーが大きかったのか、ノドカは半分も食べられなかった。"
