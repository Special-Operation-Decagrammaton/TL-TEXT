[translation]
52100-1 = "第10話;不完全な記憶"
52100-3 = "ナグサちゃんのくせに……！"
52100-4 = "ナグサちゃんごときに、二回もやられた！！"
52100-5 = "あの時シャーレが……いや、アヤメさえいなければ……！"
52100-6 = "ううぅぅ……。"
52100-7 = "くやしいぃ～～～！！"
52100-11 = "というか、なんであいつがいたんです？アヤメはあの時、黄昏に……。"
52100-12 = "アヤメのふりをした誰か？それとも、手前の知らない何かが起きてるんです……？"
52100-16 = "……なんだっていいですけど！汚い手を使ったに決まってます！"
52100-17 = "せっかくの計画が、あんなあっけなく終わるわけないんですから――"
52100-22 = "可愛い顔が台無しだよ、おチビさん。"
52100-27 = "……アヤメ！？"
52100-28 = "ん？どこかで会ったっけ？"
52100-29 = "ああ、そうか……。"
52100-30 = "北部自治区にも私のファンがいたんだ！困っちゃうな～もう！"
52100-34 = "だーれが[ruby=てめぇ]手前[/ruby]のファンですかっ！？"
52100-35 = "怪書さえあれば、手前みたいな偽物――"
52100-43 = "……話は終わり？"
52100-49 = "ぐっ……くそおぉぉ！！"
52100-52 = "で、アヤメ委員長……見せたいものって？"
52100-53 = "そこに縛られて転がってるおチビさんとの寸劇……じゃないよね。"
52100-54 = "はは、違うって。ちょっと昨日の戦いで確認したいことがあってね。"
52100-55 = "ええっと……。"
52100-61 = "あったあった。"
52100-68 = "それ、昨日の[ruby=げんりょうつくもがみ]幻魎付喪神[/ruby]……？"
52100-69 = "うん。ほとんど壊れちゃって、原形を留めてるのはこれだけ。"
52100-70 = "レンゲ、これって何だと思う？"
52100-71 = "何って……ボロい傘？"
52100-72 = "そう。ただの古びた傘だね。"
52100-73 = "でも、昨夜はこれが生き物のように暴れて、私たちを攻撃した。"
52100-74 = "「花鳥風月部」の怪書は、どうやってこれを怪異にしたんだろう。"
52100-79 = "フンッ、愚問ですねぇ。"
52100-80 = "怪書に不可能はないんですよぉ。傘のオバケくらい、いくらでも――"
52100-81 = "だったら、丈夫な新品の傘で付喪神を作ればいいんじゃない？"
52100-82 = "金属の骨を持つ、丈夫で強い傘の怪異になったりして。"
52100-86 = "そ、それは……。"
52100-87 = "できないでしょ？"
52100-88 = "みんなが想像する「唐笠お化け」は、ボロボロの傘だもんね。"
52100-89 = "[ruby=てめぇ]手前[/ruby]、知ったかぶるんじゃないです――"
52100-90 = "怪書の力は知らないよ。#nでも、怪談……物語のことならわかる。"
52100-91 = "本来、物語は一人で語っても意味がない。"
52100-92 = "それを聞く者が共感し、理解を示してこそだからね。"
52100-93 = "だから、誰もが経験したり、感じたことのある要素が必要不可欠。"
52100-94 = "道端に落ちたボロボロの傘をみんなが不気味に思うから、怪談は成立するんだ。"
52100-95 = "心が動かないなら、はじめから怖くなんてないでしょ？"
52100-99 = "……。"
52100-100 = "クズノハ様探しを諦めかけていたとき、このあたりで噂を聞いたんだ。"
52100-101 = "見る者によって姿かたちを変える、百物語が現れた……って。"
52100-102 = "噂に尾ひれがついただけって思うこともできたけど……百物語を操る花鳥風月部が実在するのなら、それを撃退した伝説の委員長だっているはず。"
52100-103 = "それで、私は真相を探っていたの。"
52100-104 = "……だから。"
52100-105 = "……今まで連絡の一つもせずに、姿を消していたの？"
52100-106 = "……うん。迷惑をかけたのはわかってる。納得してもらえるとも思ってないよ。"
52100-108 = "まあ……らしいっちゃ、らしいというか。"
52100-109 = "前さ、委員長が家出猫を探しに山に入ったきり、二日間音信不通になっただろ？"
52100-110 = "仕事には全力で！ってのがアヤメ委員長のいいところでもあるからさ。"
52100-111 = "やると決めたら、脇目も振らずに進み続ける……まさに理想的なりぃだあ～ですわ！ "
52100-112 = "……アヤメは変わらないね。"
52100-113 = "この子も捕まえたことだし、花鳥風月部の本拠地も――"
52100-118 = "手前さん方に教えるわけないでしょうっ！"
52100-119 = "[ruby=てめぇ]手前[/ruby]らが何したって、ぜーったいにコクリコ様を裏切ったりなんてしませんから！"
52100-123 = "あ、そう？なら……。"
52100-124 = "アザミさん、囲炉裏を少し借りてもいいかな？"
52100-125 = "ええ。で、ですが何に使――"
52100-130 = "も、もしかして……！？"
52100-131 = "い、いやだ……！"
52100-132 = "本気か！？"
52100-137 = "うん！焼き鳥を食べよう！"
52100-138 = "お腹空いたかなって思ってね。この子、昨夜から何も食べてないでしょ？"
52100-146 = "……何か変なこと言ったかな？ "
52100-147 = "い、いえ。別に変ではありませんが……。"
52100-149 = "絶対変ですよぉ！？誰が朝から焼き鳥なんて食うんですかぁっ！"
52100-150 = "あと、今言ったこと忘れたんですかぁ！？[ruby=てめえ]手前[/ruby]らが何をしようが無駄無駄無駄です！"
52100-151 = "まして焼き鳥で買収だなんて……手前はそこらの[ruby=がき]餓鬼[/ruby]とは違うんですから！"
52100-152 = "いや……子どもだろ。"
52100-153 = "別に取引しようってわけじゃないよ。"
52100-154 = "花鳥風月部の居所は、もう目星がついてる。"
52100-158 = "そっ、そんなデタラメ……！"
52100-159 = "あと、朝から焼き鳥は普通だよ？"
52100-160 = "脂の乗った鶏肉にネギの風味が合わさって、もう……！ねぎまは、お祭りにも野営にもぴったりだよね！"
52100-161 = "その通り。"
52100-165 = "えっと、シュロちゃんだっけ。むね肉ともも肉、どっちがいい？"
52100-166 = "……。"
52100-167 = "あっ……塩派じゃなかったか。うーん、今たれがなくてね……。"
52100-171 = "て、手前は鶏は好きですけど、ネギなんてグニャグニャぶにゅぶにゅのモノ、食べないんですぅ！"
52100-172 = "ネギ、嫌いなんだ。でも騙されたと思って食べてみてよ！"
52100-173 = "そうそう。炭火で焼いた鶏の脂が加わると、ネギはとっても深みのある味になるんだ。"
52100-174 = "辛みと苦みが抑えられて、甘さと旨味が増すんだよ。食べないなんて、人生の半分を損していると言っても過言ではないね……。"
52100-179 = "こ、コクリコ様のお願いでも、ネギだけは食べませんしぃ……！"
52100-193 = "な、なんで近づいてくるんですかぁ……！"
52100-194 = "や、やだぁ……近づけないで……こ、この外道ぉ……！"
52100-203 = "みんな……それに、[USERNAME]先生も。"
52100-204 = "ちょっと、こっち来て……。"
52100-214 = "[ns1] \"急にどうしたのキキョウ？\"\n[ns2] \"ナグサのいない場所で何か話でも……？\""
52100-217 = "うん。アヤメ委員長について、話があるの。"
52100-218 = "ナグサ先輩は……。"
52100-219 = "今言っても、分かってもらえない気がして。"
52100-220 = "先生は、あのアヤメ委員長に違和感はなかった？しばらく黙ってたけど……。"
52100-221 = "[s3] \"違和感といっても……。\"\n[s4] \"前のアヤメに会ったことがないからさ。\""
52100-224 = "……ああ。 "
52100-225 = "ごめんなさい、そうだよね。"
52100-226 = "結論から言えば、私の知ってるアヤメ委員長とは、少し違うと感じてる。"
52100-231 = "そ、そんな……！誰かが、アヤメ委員長の真似をしているんですの？"
52100-232 = "断言するには早いよ。けど、その可能性も捨てきれない。"
52100-233 = "でも、アヤメ委員長と瓜二つの生徒がいるって話も……。"
52100-234 = "それに、アタシには前と同じに見えたけど。そんなに変なとこあったかな？ "
52100-235 = "なんとなくだけど……。"
52100-236 = "前よりも、「隙」がない気がする。"
52100-238 = "隙ですか……。"
52100-240 = "いやいや、前からアヤメ委員長はちゃんとしてただろ？"
52100-241 = "どんなややこしい任務も面倒な相談も、笑顔で請け負いあっさり片付ける。それが百花繚乱の委員長のアヤメ先輩で……。"
52100-242 = "もちろん、私もそう思ってるよ。"
52100-243 = "でも、アヤメ委員長にも苦手なことはあったでしょ？"
52100-244 = "たとえば、ナグサ先輩とは違って少食だった。"
52100-245 = "いつもご飯を少しだけ残して……それを見た私は、よく小言を漏らしてた。"
52100-246 = "……今日はめちゃくちゃお腹空いてたんじゃないか？"
52100-247 = "それに、さっきレンゲが言ったように、「仕事には全力」な性格なら……。"
52100-248 = "なぜ北部自治区で出没した百物語を追わないで、私たちと合流したの？"
52100-249 = "んー……花鳥風月部の拠点を調べてる最中だったとか？"
52100-250 = "それだけで偽物ってのは無理があるだろ。"
52100-251 = "たしかに、過敏になってると自分でも思うよ。"
52100-252 = "でも、いろいろあった後だし、慎重でいたいの。#n……みんなの意見は？"
52100-259 = "百花繚乱の一員ではありませんので、口をはさむのは気が引けますが……。"
52100-260 = "私も、突然現れたアヤメ委員長を信じるのは難しいと思います。"
52100-264 = "ここ数か月、エビス分校付近で百物語を追っていたそうですが……私は、青い羽織を着た生徒の噂を一度も耳にしていません。"
52100-265 = "何より、百物語は我々と同じ姿になることもできるとか……。"
52100-267 = "でも、百物語がアヤメ先輩になるかな？"
52100-268 = "昨日、アヤメ先輩はナグサ先輩を助けに駆けつけたし……敵ならそんなことしないだろ。"
52100-269 = "それに……花鳥風月部の罠だとしても、挑まれた勝負は受ける！その方が燃えるしな！"
52100-273 = "……熱血に目がくらむのは、あんたの悪い癖だね。"
52100-274 = "だって、偽物だとしてもアタシらに何ができるんだ？"
52100-279 = "身共は……よく分かりません。"
52100-280 = "久しぶりのアヤメ先輩は、以前と変わらずお日様のように明るく完璧なお方でしたが……。"
52100-281 = "キキョウ先輩のお気持ちもわかりますわ。"
52100-282 = "言葉にするのは難しいのですが……お日様のような暖かさはない、というか……。#nまるで人工照明のような無機質さといいますか。"
52100-283 = "今のアヤメ先輩の全てを信じられるかというと……素直には頷けません。"
52100-288 = "……でも、ナグサ先輩のあんな笑顔を見るのはいつぶりでしょうか。"
52100-289 = "今までのナグサ先輩は、楽しいときでもどこか寂しそうで、ふっと消えてしまいそうな儚さのある方でした……。"
52100-290 = "でも、アヤメ先輩と一緒にいるナグサ先輩は、本当に幸せそうですの。"
52100-291 = "たとえ今のアヤメ先輩の存在が危ういものだったとしても……。"
52100-292 = "悲しそうなナグサ先輩は……もう見たくありません。"
52100-293 = "私も……そうだよ。"
52100-294 = "[s] \"キキョウにとって、アヤメはどんな先輩だったの？\""
52100-295 = "私……？"
52100-296 = "うん……私にとってアヤメ委員長は、本当に優秀な先輩だった。"
52100-297 = "なんでもそつなくこなして、誰にでも分け隔てなく優しい。みんなに好かれていたのもわかるよ。"
52100-298 = "でも、決して完全無欠なんかじゃない。彼女にも限界はあったの。"
52100-299 = "[s5] \"うん。誰でも限界はあると、私も思う。\"\n[s6] \"完璧なように振る舞っていただけなのかも。\""
52100-302 = "そうだね。でも、昨日からのアヤメ委員長にはそういう隙がないように感じたから。"
52100-303 = "……先生は、今のアヤメ委員長をどう見てる？"
52100-307 = "[ns] \"今は答えられないかも、ごめんね。\""
52100-311 = "……なぜ？"
52100-312 = "[s7] \"世の中に完璧なものがないのと同じで……。\"\n[s8] \"誰かを正確に判断することもできないよ。\""
52100-315 = "[ns] \"それに、私はアヤメの信頼を得られるほど、まだ関わっていないから。\""
52100-316 = "……？私は、「先生がアヤメ委員長を信頼できるか」って聞いているんだよ。"
52100-317 = "[s9] \"信頼は小さな積み重ねだから。\"\n[s10] \"まだ、その時間が足りなかったのかも。\""
52100-320 = "……「時間が足りない」？"
52100-321 = "長い間、一緒に過ごしてきたつもりだったけれど……。"
52100-322 = "[s11] \"まずは一旦、目の前のアヤメと向き合おう。\"\n[s12] \"ちゃんとしているように見えても、危なっかしい一面があるのかもしれないし。\""
52100-327 = "……わかった。たしかに、結論を出すにはまだ早いね。"
52100-328 = "でも、私はこれからも疑っておくつもり。#n百花繚乱の参謀として、リスクは可能な限り排除したいから……。"
52100-329 = "……少なくとも、このキキョウは本物だな！"
52100-330 = "先輩がそう仰ってくださると、頼もしいですわ！"
52100-332 = "それにね……。"
52100-337 = "ナグサ先輩をあんな風にしたのに、笑顔で帰ってきたこと――"
52100-339 = "まだ私は、許してないから。"
52100-341 = "次回;彼岸へと至る道"
