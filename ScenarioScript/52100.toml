[translation]
52100-1 = "Episódio 10: Memórias Incompletas"
52100-3 = "Logo a Nagusa...!"
52100-4 = "Fui derrotada duas vezes por alguém como a Nagusa!!"
52100-5 = "Naquela hora, se o Schale não tivesse... não, se a Ayame não estivesse lá...!"
52100-6 = "Uuuu..."
52100-7 = "Que ódioooo!!"
52100-11 = "Aliás, por que ela estava lá? Naquela hora, a Ayame deveria estar no crepúsculo..."
52100-12 = "Alguém fingindo ser a Ayame? Ou será que algo que eu desconheço está acontecendo...?"
52100-16 = "...Não importa! Com certeza ela usou algum truque sujo!"
52100-17 = "Não é possível que um plano tão bem elaborado tenha acabado de forma tão simples assim—"
52100-22 = "Você está estragando esse rostinho bonito, baixinha."
52100-27 = "...Ayame!?"
52100-28 = "Hm? A gente se conhece?"
52100-29 = "Ah, entendi..."
52100-30 = "Então eu também tenho fãs no Distrito Norte! Que situação, hein!"
52100-34 = "Quem é que é sua fã, sua insolente!?"
52100-35 = "Se eu tivesse o Livro Misterioso, uma falsificação como você—"
52100-43 = "...Terminou de falar?"
52100-49 = "Grrr... maldita seja!!"
52100-52 = "E então, Presidente Ayame... o que você queria me mostrar?"
52100-53 = "Não me diga que é essa esquete com a baixinha amarrada aí no chão."
52100-54 = "Haha, claro que não. É que eu queria confirmar uma coisa sobre a batalha de ontem."
52100-55 = "Bem..."
52100-61 = "Achei, achei."
52100-68 = "Isso é o Tsukumogami Fantasmagórico de ontem...?"
52100-69 = "Sim. Ele foi quase todo destruído, só sobrou isso da forma original."
52100-70 = "Renge, o que você acha que é isso?"
52100-71 = "Como assim o que é... um guarda-chuva velho?"
52100-72 = "Isso. É só um guarda-chuva velho."
52100-73 = "Mas, ontem à noite, ele se moveu como se estivesse vivo e nos atacou."
52100-74 = "Como será que o Livro Misterioso do 'Clube Kachou Fuugetsu' transformou isso em uma assombração?"
52100-79 = "Humpf, que pergunta idiota."
52100-80 = "Não existe nada impossível para o Livro Misterioso. Transformar um guarda-chuva em monstro é moleza—"
52100-81 = "Então, por que não criam um Tsukumogami com um guarda-chuva novo e resistente?"
52100-82 = "Poderia virar uma assombração de guarda-chuva forte, com hastes de metal."
52100-86 = "I-Isso é..."
52100-87 = "Não consegue, né?"
52100-88 = "O 'Karakasa-obake' que todo mundo imagina é um guarda-chuva todo esfarrapado, afinal."
52100-89 = "Não venha se fazer de sabichona, sua insolente—"
52100-90 = "Eu não conheço o poder do Livro Misterioso. #nMas, sobre histórias de fantasmas... eu entendo."
52100-91 = "Originalmente, uma história não faz sentido se for contada por uma pessoa só."
52100-92 = "Ela só funciona quando quem ouve sente empatia e compreende o que está sendo dito."
52100-93 = "Por isso, elementos que todos já vivenciaram ou sentiram são indispensáveis."
52100-94 = "Uma história de fantasma só funciona porque todo mundo acha um guarda-chuva velho jogado na rua algo sinistro."
52100-95 = "Se o coração não for tocado, não tem como dar medo desde o início, certo?"
52100-99 = "..."
52100-100 = "Quando eu estava quase desistindo de procurar pela Srta. Kuzunoha, ouvi boatos por aqui."
52100-101 = "Diziam que as Cem Histórias haviam aparecido, mudando de forma dependendo de quem as via..."
52100-102 = "Eu poderia ter pensado que era apenas um boato exagerado, mas... se o Clube Kachou Fuugetsu, que controla as Cem Histórias, realmente existe, então a lendária presidente que os derrotou também deve existir."
52100-103 = "Por isso, eu estava investigando a verdade."
52100-104 = "……Por isso."
52100-105 = "……Você desapareceu sem dar uma única notícia esse tempo todo?"
52100-106 = "……Sim. Sei que causei problemas. E não espero que me entendam."
52100-108 = "Bem…… é bem a cara dela, eu diria."
52100-109 = "Lembra quando a presidente entrou na montanha para procurar um gato fugitivo e ficou dois dias sem dar sinal de vida?"
52100-110 = "Dar tudo de si no trabalho é uma das melhores qualidades da presidente Ayame, afinal."
52100-111 = "Quando ela decide fazer algo, ela segue em frente sem desviar o olhar... ela é uma líder verdadeiramente ideal!"
52100-112 = "……A Ayame não mudou nada."
52100-113 = "Já que capturamos esta aqui, o esconderijo do Clube Kachou Fuugetsu também..."
52100-118 = "Eu nunca contaria isso para vocês!"
52100-119 = "Não importa o que vocês façam, eu nunca trairei a senhorita Cocolico!"
52100-123 = "Ah, é mesmo? Então..."
52100-124 = "Azami, posso pegar a lareira emprestada por um instante?"
52100-125 = "Sim. Mas, para que você vai..."
52100-130 = "N-não me diga que...!"
52100-131 = "N-não, pare...!"
52100-132 = "Você está falando sério!?"
52100-137 = "Sim! Vamos comer espetinho de frango!"
52100-138 = "Pensei que você estivesse com fome. Essa menina não come nada desde ontem à noite, não é?"
52100-146 = "……Eu disse algo estranho?"
52100-147 = "N-não. Não é que seja estranho, mas..."
52100-149 = "É estranho, sim! Quem come espetinho de frango logo de manhã!?"
52100-150 = "E você esqueceu o que acabou de dizer!? Não importa o que vocês façam, é tudo inútil, inútil, inútil!"
52100-151 = "E tentar me subornar com espetinho... eu não sou uma pirralha qualquer!"
52100-152 = "Não... você é uma criança, né."
52100-153 = "Não estou tentando fazer um acordo."
52100-154 = "Eu já tenho uma ideia de onde o Clube Kachou Fuugetsu está escondido."
52100-158 = "I-isso é um absurdo...!"
52100-159 = "Além disso, comer espetinho de manhã é normal."
52100-160 = "A gordura do frango combinada com o sabor da cebolinha... é incrível! Negima é perfeito tanto para festivais quanto para acampamentos!"
52100-161 = "Exatamente."
52100-165 = "Bem, Shuro, né? Prefere peito ou coxa?"
52100-166 = "……"
52100-167 = "Ah... você não gosta de sal, né? Hum, não tenho molho aqui agora..."
52100-171 = "E-eu gosto de frango, mas não vou comer essa coisa mole e gosmenta que é a cebolinha!"
52100-172 = "Você não gosta de cebolinha? Mas experimenta, vai que você gosta!"
52100-173 = "É isso aí. Quando a gordura do frango assado na brasa se mistura, a cebolinha ganha um sabor muito profundo."
52100-174 = "O ardor e o amargor diminuem, e a doçura e o sabor aumentam. Dizer que não come isso é o mesmo que dizer que está perdendo metade da vida..."
52100-179 = "M-mesmo que seja um pedido da senhorita Cocolico, eu não vou comer cebolinha...!"
52100-193 = "P-por que você está se aproximando...!"
52100-194 = "N-não... não chegue perto... s-seu monstro...!"
52100-203 = "Pessoal... e também, sensei [USERNAME]."
52100-204 = "Venham aqui um pouco..."
52100-214 = "[ns1] \"O que houve de repente, Kikyou?\"\n[ns2] \"Quer falar algo longe da Nagusa...?\""
52100-217 = "Sim. Tenho algo a dizer sobre a presidente Ayame."
52100-218 = "A Nagusa-senpai..."
52100-219 = "Sinto que, se eu disser agora, ela não vai entender."
52100-220 = "Sensei, você não sentiu nada de estranho com a presidente Ayame? Eu fiquei quieta por um tempo, mas..."
52100-221 = "[s3] \"Sobre sentir algo estranho...\"\n[s4] \"É que eu nunca conheci a Ayame de antes.\""
52100-224 = "……Ah."
52100-225 = "Desculpe, você tem razão."
52100-226 = "Para ser direta, sinto que ela é um pouco diferente da Presidente Ayame que eu conhecia."
52100-231 = "I-Isso é...! Alguém está imitando a Presidente Ayame?"
52100-232 = "É cedo para afirmar. Mas não posso descartar essa possibilidade."
52100-233 = "Mas também há rumores de que existe uma aluna idêntica à Presidente Ayame..."
52100-234 = "Além disso, para mim, ela parecia a mesma de antes. Será que tinha algo tão estranho assim?"
52100-235 = "É só um palpite, mas..."
52100-236 = "Sinto que ela não tem nenhuma \"brecha\" como antes."
52100-238 = "Brechas, você diz..."
52100-240 = "Não, não, a Presidente Ayame sempre foi muito competente, não foi?"
52100-241 = "Qualquer missão complicada ou consulta problemática, ela aceitava com um sorriso e resolvia facilmente. Essa era a veterana Ayame, a presidente do Hyakka Ryoran..."
52100-242 = "Claro, eu também penso assim."
52100-243 = "Mas a Presidente Ayame também tinha coisas que não gostava, não tinha?"
52100-244 = "Por exemplo, ao contrário da veterana Nagusa, ela comia pouco."
52100-245 = "Ela sempre deixava um pouco de comida... e quando eu via isso, vivia dando sermão nela."
52100-246 = "...Será que ela não estava com muita fome hoje?"
52100-247 = "Além disso, como Renge disse agora há pouco, se a personalidade dela é \"dar tudo de si no trabalho\"..."
52100-248 = "Por que ela se juntou a nós em vez de perseguir os Cem Contos que apareceram no Distrito Norte?"
52100-249 = "Hmm... talvez ela estivesse investigando a base do Departamento Kacho Fugetsu?"
52100-250 = "Não dá para dizer que é uma impostora só por isso."
52100-251 = "É verdade, eu mesma sinto que estou sendo sensível demais."
52100-252 = "Mas, depois de tudo o que aconteceu, quero ser cautelosa. #n... Qual é a opinião de vocês?"
52100-259 = "Como não sou membro do Hyakka Ryoran, sinto-me um pouco hesitante em me intrometer, mas..."
52100-260 = "Eu também acho difícil acreditar na Presidente Ayame que apareceu de repente."
52100-264 = "Dizem que ela passou os últimos meses perseguindo os Cem Contos perto da filial de Ebisu, mas... eu nunca ouvi um único boato sobre uma aluna vestindo um haori azul."
52100-265 = "Acima de tudo, dizem que os Cem Contos podem assumir a mesma forma que nós..."
52100-267 = "Mas será que os Cem Contos se transformariam na veterana Ayame?"
52100-268 = "Ontem, a veterana Ayame correu para ajudar a veterana Nagusa... Se fosse inimiga, não faria isso, certo?"
52100-269 = "Além disso... mesmo que seja uma armadilha do Departamento Kacho Fugetsu, eu aceitarei qualquer desafio! Isso só me deixa mais empolgada!"
52100-273 = "...Se deixar levar pelo sangue quente é um dos seus piores defeitos."
52100-274 = "Mas, mesmo que seja uma impostora, o que nós podemos fazer?"
52100-279 = "Eu... não sei dizer."
52100-280 = "A veterana Ayame, depois de tanto tempo, era tão brilhante e perfeita como o sol, como sempre foi..."
52100-281 = "Eu entendo como a veterana Kikyou se sente."
52100-282 = "É difícil colocar em palavras... mas é como se não houvesse aquele calor solar, sabe? #nÉ como se fosse uma frieza inorgânica, como uma luz artificial."
52100-283 = "Se me perguntarem se posso acreditar em tudo o que a veterana Ayame diz agora... não consigo concordar prontamente."
52100-288 = "...Mas, há quanto tempo não víamos a veterana Nagusa sorrir daquele jeito?"
52100-289 = "Até agora, a veterana Nagusa, mesmo quando estava feliz, parecia solitária e tinha uma fragilidade que dava a impressão de que ela poderia desaparecer a qualquer momento..."
52100-290 = "Mas a veterana Nagusa, quando está com a veterana Ayame, parece realmente feliz."
52100-291 = "Mesmo que a existência da veterana Ayame agora seja algo incerto..."
52100-292 = "Eu não quero mais ver a veterana Nagusa triste."
52100-293 = "Eu também... sinto o mesmo."
52100-294 = "[s] \"Para você, Kikyou, que tipo de veterana era a Ayame?\""
52100-295 = "Eu...?"
52100-296 = "Sim... Para mim, a Presidente Ayame era uma veterana realmente excelente."
52100-297 = "Ela resolvia tudo com destreza e era gentil com todos, sem distinção. Entendo perfeitamente por que todos gostavam dela."
52100-298 = "Mas ela nunca foi perfeita. Ela também tinha seus limites."
52100-299 = "[s5] \"Sim. Eu também acho que todos têm limites.\"\n[s6] \"Talvez ela apenas estivesse agindo como se fosse perfeita.\""
52100-302 = "É verdade. Mas senti que a Presidente Ayame de ontem para cá não tem esse tipo de brecha."
52100-303 = "...Sensei, como você vê a Presidente Ayame agora?"
52100-307 = "[ns] \"Talvez eu não consiga responder agora, me desculpe.\""
52100-311 = "……Por quê?"
52100-312 = "[s7] \"Assim como não existe nada perfeito neste mundo…….\"\n[s8] \"Também não é possível julgar alguém com precisão.\""
52100-315 = "[ns] \"Além disso, ainda não convivi o suficiente com a Ayame para conquistar sua confiança.\""
52100-316 = "……? Eu estou perguntando se o Sensei consegue confiar na presidente Ayame."
52100-317 = "[s9] \"A confiança é construída através de pequenos passos.\"\n[s10] \"Talvez ainda não tenha passado tempo suficiente para isso.\""
52100-320 = "……\"Tempo suficiente\"?"
52100-321 = "Eu achava que tínhamos passado muito tempo juntos, mas……."
52100-322 = "[s11] \"Primeiro, vamos focar na Ayame que está diante de nós.\"\n[s12] \"Mesmo que ela pareça estar bem, talvez haja um lado perigoso nela que não vemos.\""
52100-327 = "……Entendi. De fato, ainda é cedo demais para tirar conclusões."
52100-328 = "Mas pretendo continuar desconfiada. Como estrategista do Hyakkiyako, quero eliminar os riscos o máximo possível……."
52100-329 = "……Pelo menos, essa Kikyou é a verdadeira!"
52100-330 = "Fico feliz em ouvir isso de você, senpai!"
52100-332 = "Além disso……."
52100-337 = "Depois de ter feito aquilo com a Nagusa-senpai, você voltou sorrindo――"
52100-339 = "Eu ainda não te perdoei por isso."
52100-341 = "Próximo episódio: O caminho que leva ao outro lado"
