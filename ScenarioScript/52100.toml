[translation]
52100-1 = "Episódio 10; Memórias Incompletas"
52100-3 = "Como você é persistente... mesmo sendo só a Nagusa-chan...!"
52100-4 = "Ser derrotada duas vezes pela Nagusa-chan...!"
52100-5 = "Se a Schale não estivesse lá naquela hora... não, se ao menos a Ayame não estivesse lá...!"
52100-6 = "Uuuuuuu......"
52100-7 = "Que frustraçãããoooo!!"
52100-11 = "Aliás, por que aquela pessoa estava lá? Naquela época, a Ayame deveria ter ido para o Crepúsculo..."
52100-12 = "Alguém fingindo ser a Ayame? Ou será que algo que eu desconheço está acontecendo...?"
52100-16 = "......Não me importa! Com certeza usaram um truque sujo!"
52100-17 = "Não tem como o meu plano, que foi tão difícil de montar, acabar de forma tão simples――"
52100-22 = "Esse rosto bonito está todo arruinado, baixinha."
52100-27 = "......Ayame!?"
52100-28 = "Hm? Será que já nos conhecemos?"
52100-29 = "Ah, entendi..."
52100-30 = "Então também tinha fãs meus no Distrito Norte! Que problema, hein!"
52100-34 = "Quem disse que eu sou fã de você!?"
52100-35 = "Se eu tivesse o Livro Misterioso, uma impostora como você――"
52100-43 = "......A conversa acabou?"
52100-49 = "Ugh... maldita sejaaa!!"
52100-52 = "Então, presidente Ayame... o que é que você quer nos mostrar?"
52100-53 = "Não é uma esquete com a baixinha amarrada ali no chão, né."
52100-54 = "Haha, claro que não. É que tem algo que quero verificar por causa da batalha de ontem."
52100-55 = "Bem, então......"
52100-61 = "Achei, achei."
52100-68 = "Isso é a Genryou Tsukumogami de ontem...?"
52100-69 = "Sim. Está quase toda destruída, só sobrou isso da forma original."
52100-70 = "Renge, o que você acha que é isso?"
52100-71 = "O que é... um guarda-chuva velho?"
52100-72 = "Exatamente. É apenas um guarda-chuva velho e gasto."
52100-73 = "Mas, ontem à noite, isso se contorcia como um ser vivo e nos atacou."
52100-74 = "Como será que o livro misterioso do 'Clube das Flores, Pássaros, Vento e Lua' transformou isso em uma assombração?"
52100-79 = "Hunf, que pergunta boba."
52100-80 = "Não existe nada impossível para os livros misteriosos. Eu poderia criar quantos guarda-chuvas fantasmas eu quisesse――"
52100-81 = "Então, por que não cria um Tsukumogami com um guarda-chuva novo e resistente?"
52100-82 = "Talvez virasse uma assombração de guarda-chuva forte, com hastes de metal."
52100-86 = "I, isso é..."
52100-87 = "Você não consegue, né?"
52100-88 = "O 'Kasa-obake' que todos imaginam é um guarda-chuva todo esfarrapado, afinal."
52100-89 = "Não tente fingir que sabe de tudo, sua――"
52100-90 = "Eu não conheço o poder dos livros misteriosos. #n Mas, sobre histórias de fantasmas... sobre narrativas, eu entendo."
52100-91 = "Originalmente, uma história não tem sentido se contada por apenas uma pessoa."
52100-92 = "Porque ela só ganha vida quando quem a ouve sente empatia e mostra compreensão."
52100-93 = "Por isso, elementos que todos experimentaram ou sentiram são essenciais."
52100-94 = "Uma história de fantasma só funciona porque todos acham assustador um guarda-chuva esfarrapado caído na beira da estrada."
52100-95 = "Se o seu coração não se emociona, não dá para sentir medo desde o início, né?"
52100-99 = "......"
52100-100 = "Quando eu estava quase desistindo de procurar por Kuzunoha-sama, ouvi boatos por aqui."
52100-101 = "Que uma Hyakumonogatari que muda de forma conforme quem a vê tinha aparecido..."
52100-102 = "Eu poderia ter pensado que eram apenas boatos exagerados... mas se o Clube das Flores, Pássaros, Vento e Lua, que controla a Hyakumonogatari, realmente existe, então a lendária presidente que os derrotou também deve existir."
52100-103 = "Foi por isso que eu estava investigando a verdade."
52100-104 = "......Por isso."
52100-105 = "......Foi por isso que você desapareceu sem nos mandar uma única mensagem?"
52100-106 = "......Sim. Sei que causei problemas. Não espero que vocês me perdoem."
52100-108 = "Bem... é bem a sua cara, eu diria."
52100-109 = "Lembra daquela vez que a presidente entrou na montanha para procurar um gato perdido e ficou dois dias sem dar notícias?"
52100-110 = "O bom da presidente Ayame é que ela sempre dá o máximo no trabalho."
52100-111 = "Quando decide fazer algo, ela segue em frente sem olhar para os lados... é uma líder verdadeiramente ideal!"
52100-112 = "......Ayame não mudou nada."
52100-113 = "Já capturamos essa aqui, e o esconderijo do Clube das Flores, Pássaros, Vento e Lua――"
52100-118 = "Eu nunca contaria isso para vocês!!"
52100-119 = "Não importa o que vocês façam, eu nunca trairei a Kokuriko-sama!"
52100-123 = "Ah, é mesmo? Então......"
52100-124 = "Azami, poderia nos emprestar um pouco da sua lareira?"
52100-125 = "Sim. Mas... para que uso――"
52100-130 = "N, não me diga que......!?"
52100-131 = "I, isso não! Sério, não pode ver isso......!!!"
52100-132 = "Você está falando sério!?"
52100-137 = "Sim! Vamos comer espetinhos de frango!"
52100-138 = "Pensei que talvez vocês estivessem com fome. Essa criança não come nada desde ontem à noite, né?"
52100-146 = "......Eu disse algo estranho?"
52100-147 = "N, não. Nada estranho, mas......"
52100-149 = "É muito estranho, sim!? Quem come espetinho de frango logo de manhã!?"
52100-150 = "Além disso, esqueceu o que eu disse agora pouco!? Não importa o que vocês façam, é tudo inútil, inútil, inútil!"
52100-151 = "E subornar alguém com espetinho de frango... eu não sou qualquer pirralha, sabe!"
52100-152 = "Não... você é uma criança, né."
52100-153 = "Não estou tentando fazer nenhum acordo."
52100-154 = "Eu já tenho uma ideia de onde fica o esconderijo do Clube das Flores, Pássaros, Vento e Lua."
52100-158 = "I, isso é um absurdo...!"
52100-159 = "Aliás, espetinho de frango de manhã é normal, sabia?"
52100-160 = "O sabor da cebolinha combinando com a carne de frango suculenta, nossa...! Espetinho de frango é perfeito para festivais e acampamentos!"
52100-161 = "Exatamente."
52100-165 = "Bem, Shuro, era esse o nome? Quer o peito ou a coxa?"
52100-166 = "......"
52100-167 = "Ah...... esqueci que você prefere sal. Bem, hoje só temos tempero com molho..."
52100-171 = "E, eu gosto de frango, mas essa coisa mole e gelatinosa de cebolinha, eu não como!"
52100-172 = "Não gosta de cebolinha? Mas tente comer, vai ver que é bom!"
52100-173 = "Isso mesmo. Quando a gordura do frango grelhado no carvão se mistura, a cebolinha ganha uma profundidade incrível no sabor."
52100-174 = "O amargor e a ardência diminuem, e a doçura e o sabor aumentam. Não exageraria se dissesse que você está perdendo metade da vida por não comer..."
52100-179 = "Mesmo que seja um pedido da Kokuriko-sama, cebolinha é a única coisa que eu não como......!"
52100-193 = "P, por que você está se aproximando......!"
52100-194 = "N, não, pare...... não chegue perto...... v, você, sua perversa......!"
52100-203 = "Pessoal...... além disso, Sensei [USERNAME]."
52100-204 = "Venham aqui um pouco, por favor......"
52100-214 = "[ns1] \"O que aconteceu de repente, Kikyou?\"\n[ns2] \"Quer falar de algo longe da Nagusa...?\""
52100-217 = "Sim. Tenho algo a dizer sobre a presidente Ayame."
52100-218 = "A Nagusa-senpai está......"
52100-219 = "Sinto que, se eu dissesse agora, ela não entenderia."
52100-220 = "Sensei, você não achou essa presidente Ayame estranha? Eu fiquei calada por um tempo, mas......"
52100-221 = "[s3] \"Estranha, como assim......?\"\n[s4] \"Como nunca conheci a Ayame de antes, não sei dizer.\""
52100-224 = "......Ah. "
52100-225 = "Desculpe, é verdade."
52100-226 = "Para ser direta, sinto que ela é um pouco diferente da presidente Ayame que eu conhecia."
52100-231 = "Is, isso não pode ser...! Alguém está fingindo ser a presidente Ayame?"
52100-232 = "É cedo para afirmar. Mas não podemos descartar essa possibilidade."
52100-233 = "Mas também dizem que existe uma aluna que é a cara da presidente Ayame..."
52100-234 = "Além disso, para mim, ela parecia a mesma de antes. Será que ela mudou tanto assim?"
52100-235 = "É só um sentimento, mas......"
52100-236 = "Sinto que ela não tem nenhuma 'abertura' mais do que antes."
52100-238 = "Abertura, é......"
52100-240 = "Não, não, a presidente Ayame sempre foi impecável, não foi?"
52100-241 = "Ela assumia qualquer missão complicada ou conselho chato com um sorriso e resolvia tudo facilmente. Essa era a Ayame-senpai, a presidente da Hyakkaryouran......"
52100-242 = "Claro, eu também penso assim."
52100-243 = "Mas, a presidente Ayame também tinha coisas que não gostava, não é?"
52100-244 = "Por exemplo, ao contrário da Nagusa-senpai, ela comia muito pouco."
52100-245 = "Sempre deixava um pouco da comida... e, vendo aquilo, eu sempre a repreendia."
52100-246 = "......Será que ela não estava morrendo de fome hoje?"
52100-247 = "Além disso, como a Renge disse agora pouco, se a personalidade dela é 'dar o máximo no trabalho'......"
52100-248 = "Por que ela se juntou a nós em vez de perseguir a Hyakumonogatari que apareceu no Distrito Norte?"
52100-249 = "Hm... será que ela estava investigando a base do Clube das Flores, Pássaros, Vento e Lua?"
52100-250 = "Acho forçado dizer que é uma impostora só por isso."
52100-251 = "Com certeza, sinto que estou sendo sensível demais."
52100-252 = "Mas depois de tudo o que aconteceu, quero ser cautelosa. #n ......Qual é a opinião de vocês?"
52100-259 = "Não sou membro da Hyakkaryouran, então sinto-me relutante em opinar......"
52100-260 = "Também acho difícil acreditar na presidente Ayame que apareceu de repente."
52100-264 = "Dizem que ela perseguia a Hyakumonogatari perto da Filial Ebisu há alguns meses, mas... nunca ouvi rumores de um aluno usando um haori azul."
52100-265 = "Acima de tudo, dizem que a Hyakumonogatari pode assumir a mesma forma que nós......"
52100-267 = "Mas será que a Hyakumonogatari conseguiria virar a Ayame-senpai?"
52100-268 = "Ontem, ela veio correndo salvar a Nagusa-senpai... um inimigo não faria isso, faria?"
52100-269 = "Além disso... mesmo que seja uma armadilha do Clube das Flores, Pássaros, Vento e Lua, aceitaremos o desafio! Fica mais emocionante assim!"
52100-273 = "......Ser cega pela paixão é o seu pior defeito."
52100-274 = "Porque, mesmo que seja uma impostora, o que podemos fazer?"
52100-279 = "Eu...... não sei dizer."
52100-280 = "A Ayame-senpai, depois de tanto tempo, era uma pessoa tão brilhante e perfeita como o sol, como sempre foi......"
52100-281 = "Entendo seus sentimentos, Kikyou-senpai."
52100-282 = "É difícil colocar em palavras... mas não sinto aquele calor como o sol, por exemplo... #n é como se fosse uma inorganização de luz artificial."
52100-283 = "Se posso acreditar em tudo o que a presidente Ayame diz agora... não consigo concordar com facilidade."
52100-288 = "......Mas, há quanto tempo eu não via a Nagusa-senpai sorrir assim."
52100-289 = "Até agora, mesmo quando a Nagusa-senpai estava se divertindo, ela parecia meio solitária, com uma fragilidade de quem poderia desaparecer a qualquer momento......"
52100-290 = "Mas a Nagusa-senpai que está com a Ayame-senpai parece realmente feliz."
52100-291 = "Mesmo que a existência da Ayame-senpai agora seja algo perigoso......"
52100-292 = "Eu não quero ver a Nagusa-senpai triste...... nunca mais."
52100-293 = "Eu também...... sinto o mesmo."
52100-294 = "[s] \"Kikyou, como a Ayame era para você?\""
52100-295 = "Eu......?"
52100-296 = "Sim...... para mim, a presidente Ayame era uma senpai muito talentosa."
52100-297 = "Ela resolvia tudo com perfeição e era gentil com todos sem distinção. Entendo por que todos gostavam dela."
52100-298 = "Mas ela nunca foi perfeita. Ela também tinha seus limites."
52100-299 = "[s5] \"Sim. Acho que todos têm limites.\"\n[s6] \"Talvez ela só estivesse fingindo ser perfeita.\""
52100-302 = "Verdade. Mas sinto que a presidente Ayame de ontem para cá não tem esse tipo de 'abertura'."
52100-303 = "......Sensei, como você vê a presidente Ayame agora?"
52100-307 = "[ns] \"Talvez eu não consiga responder agora, me desculpe.\""
52100-311 = "......Por quê?"
52100-312 = "[s7] \"Assim como não existe nada perfeito no mundo......\"\n[s8] \"Não consigo julgar alguém com precisão.\""
52100-315 = "[ns] \"Além disso, ainda não convivi o suficiente para ter a confiança da Ayame.\""
52100-316 = "......? Eu estou perguntando se 'o Sensei pode confiar na presidente Ayame'."
52100-317 = "[s9] \"A confiança é construída aos poucos.\"\n[s10] \"Talvez ainda não tenha passado tempo suficiente para isso.\""
52100-320 = "......'Tempo insuficiente'?"
52100-321 = "Eu pensava que tínhamos passado muito tempo juntas, mas......"
52100-322 = "[s11] \"Primeiro, vamos enfrentar a Ayame que está na nossa frente.\"\n[s12] \"Mesmo que ela pareça estar bem, talvez exista um lado dela que seja perigoso.\""
52100-327 = "......Entendi. Realmente, ainda é cedo para tirar conclusões."
52100-328 = "Mas vou continuar desconfiando. #n Como estrategista da Hyakkaryouran, quero eliminar os riscos tanto quanto possível......"
52100-329 = "......Pelo menos, essa Kikyou é a verdadeira!"
52100-330 = "É reconfortante ouvir a senpai dizer isso!"
52100-332 = "Além disso......"
52100-337 = "O fato de ela ter voltado sorrindo depois de deixar a Nagusa-senpai daquele jeito――"
52100-339 = "Eu ainda não perdoei."
52100-341 = "Próximo Episódio; O Caminho para o Outro Lado"

