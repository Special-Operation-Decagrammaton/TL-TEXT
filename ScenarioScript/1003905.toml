[translation]
1003905-1 = "RABBIT4、狙撃します"
1003905-2 = "こ、こんにちは。先生。"
1003905-3 = "こんなへんぴな所まで、お呼びしてしまってすみません……"
1003905-4 = "[s] \"ううん、気にしないで。\""
1003905-5 = "あ、ありがとうございます。今日はその、市街地戦を想定した狙撃訓練をしようかと……"
1003905-6 = "最初は、キヴォトス市内で訓練をしようと思ったのですが……"
1003905-7 = "見知らぬ人に迷惑をかけるわけには……「ここで訓練しますので」なんて言うわけにもいきませんし……"
1003905-8 = "[s1] \"まあ、それは確かにね……。\"\n[s2] \"市内だと住人も多くて、色々と危ないもんね。”"
1003905-9 = "はい。そこで、代わりの場所を探していたのですが……"
1003905-10 = "はい。そこで、代わりの場所を探していたのですが……"
1003905-11 = "以前ここで、使われてない廃家を見つけたんです。"
1003905-12 = "ここしばらく、持ち主の方が来ないか観察していたのですが……誰も来なかったので、多分もう捨てられているかと……"
1003905-13 = "それで、ここを使わせていただき……訓練をしようかな、と。"
1003905-14 = "[s] \"うん、了解。何を手伝ったら良いかな？\""
1003905-15 = "あ、えっと……狙撃の準備は私がしますので……。"
1003905-16 = "でしたら先生には、向こうの山の稜線のところに「ターゲット」を設置していただいても良いですか……？"
1003905-17 = "[s] \"分かった、300m先くらいのところで良い？\""
1003905-18 = "えっと、もっと……"
1003905-19 = "[s] \"500mくらい？\""
1003905-20 = "すみません、もう少し遠く……"
1003905-21 = "1kmくらい離れたところで、お願いできればと……。"
1003905-22 = "[s] \"……それ、見える？\""
1003905-23 = "はい、大丈夫です……SRTのスナイパーですから。"
1003905-24 = "RABBIT小隊のみんなの、迷惑にならないためにも……これくらいは、できないと……。"
1003905-25 = "では……すみません、お願いします。"
1003905-28 = "[ns] ターゲットを設置しに移動する"
1003905-30 = "（ターゲットを設置した後、再びミユがいる場所に戻ると……）"
1003905-31 = "うぅ……"
1003905-32 = "（何故かミユは、野生動物たちに囲まれていた……）"
1003905-35 = "[wa:700]― 呼吸を整えて……"
1003905-37 = "[wa:420]― 目標に、[wa:750]集中……。"
1003905-40 = "― 距離1,150m、[wa:2800]風は東北東から[wa:1000]15ノット……"
1003905-42 = "― 温湿度による[wa:1100]誤差を補正……"
1003905-45 = "[wa:1400]― あ、[wa:1000]あの……[wa:950]先生、"
1003905-47 = "― できればその、[wa:1900]そういった悪戯は[wa:1400]ご遠慮いただけますと……"
1003905-50 = "[wa:100]― えっと、[wa:1150]照準が乱れてしまうので……"
1003905-53 = "[ns] \"えっと、私じゃなくて……。\""
1003905-54 = "[wa:500]― ……なるほど。"
1003905-57 = "[wa:180]― これは[wa:400]邪魔ではなく、"
1003905-59 = "― 実践に近い状況下での[wa:1400]狙撃訓練、[wa:2100]ということですよね……"
1003905-62 = "― SRTでも、"
1003905-64 = "[wa:600]― 似たような訓練を[wa:800]したような気が……"
1003905-67 = "[ns] \"あのー……。\""
1003905-68 = "[wa:600]― ひゃぅっ……！？"
1003905-71 = "― せ、[wa:800]先生……！[wa:2300]いくら何でも、"
1003905-73 = "― 耳に息を[wa:900]吹きかけるのは……！？"
1003905-76 = "[wa:500]― （うぅ……[wa:1500]せ、[wa:1300]先生の吐息が、[wa:1900]この距離で……）"
1003905-78 = "[wa:240]― （しょ、[wa:1200]照準がぶれるっ……！）"
1003905-81 = "[ns] ミユに動物たちのことを伝える。"
1003905-82 = "わ、わっ……？この子たち、いつの間に……！？"
1003905-85 = "うぅ……。"
1003905-86 = "動物たちに警戒されないのは、数少ない長所だと思っていましたが……"
1003905-87 = "まさか、狙撃の妨害をされてしまうだなんて……"
1003905-88 = "やっぱりこの体質は、役に立たないみたいです……"
1003905-89 = "私は、存在感ゼロの役立たずなんだ……"
1003905-90 = "[s] \"多分だけど、私が隣にいれば大丈夫だよ。\""
1003905-94 = "[ns] \"もう一回やってみよう。\""
1003905-96 = "……はい。"
1003905-97 = "ありがとうございます、先生。では、お願いします……！"
1003905-99 = "（その後ミユのそばで近づいてくる動物たちに退いてもらいながら、狙撃訓練を見守った）"
1003905-100 = "（どうなるものかと思ったけれど、ミユは見事にターゲットの中央を撃ち抜いていた）"
