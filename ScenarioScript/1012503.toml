[translation]
1012503-1 = "\t魔法の帽子"
1012503-4 = "うぅ……来てくださったんですね、マスター！"
1012503-5 = "どうしたらいいのでしょう……。"
1012503-6 = "今日の午後に実技試験があるのですが……#n担当の監督官は、超冷酷かつ超厳しいことで有名でして――"
1012503-7 = "帽子はもちろん、試験に関係ない品は一切持ち込み禁止なんです……！"
1012503-8 = "私にとって、帽子を脱いで試験を受けるのは……#n裸で街を歩けと言われているのも同じです！"
1012503-12 = "ほ、本当にどうしたら……。"
1012503-13 = "マスター……私、裸で出歩きたくないです……。"
1012503-19 = "[ns1] \"と、とりあえず場所を変えようか！\"\n[ns2] \"変な誤解されるとまずいから……！\""
1012503-25 = "（静かな場所で、落ち着いてエリの話を聞いた）"
1012503-28 = "[ns3] \"つまり、持ち込めるのは画材だけってことだよね？\"\n[ns4] \"たしかに、それだけあれば絵は描けるけど……。\""
1012503-31 = "……マスターも、帽子を脱ぐべきだとおっしゃるんですか？"
1012503-32 = "つまり……あられもない姿になってほしいと……？"
1012503-33 = "[s] \"そんなこと言ってません！\""
1012503-34 = "こうなったら方法はただ一つ、試験監督に交代してもらうしか……！"
1012503-35 = "やはり呪いの魔法でしょうか……#n試験の時間は、腹痛でお休みしてもらって……。"
1012503-36 = "[s] \"そ、そんな魔法も使えるの！？\""
1012503-37 = "魔法に不可能はありません。食事にこっそり一服盛れば……。"
1012503-38 = "[s] \"魔法じゃなくて犯罪だからダメ！\""
1012503-39 = "うっ……うぅぅぅぅ……！"
1012503-40 = "わ、わかっているんです……そんなことをしてはいけないと……。"
1012503-41 = "……今から試験監督を交代させることは不可能でしょう。"
1012503-42 = "このままでは、私はすべての装備を失った状態で試験会場へ――"
1012503-43 = "そして、丸腰の状態で魔力も底を尽き、あんな目やこんな目に……！"
1012503-44 = "[s5] \"落ち着いて！まだ間に合うから！\"\n[s6] \"帽子を脱いで絵を描く練習をしてみよう？\""
1012503-47 = "今から、ですか？"
1012503-48 = "そう……ですね……。#n午後の試験は待ってくれませんし……。"
1012503-49 = "覚悟を……決めますか。ふぅぅぅぅ……。"
1012503-50 = "わかりました、帽子を脱ぎます……！#n恥ずかしいですが……！"
1012503-54 = "……マスター、目を閉じてあちらを向いていてください。#n絶対に見たらダメですよ！"
1012503-56 = "（言われた通り、目を閉じて顔をそらした）"
1012503-60 = "ふぅぅぅぅ……。"
1012503-61 = "いっそ、帽子を被ったまま服を脱ぐほうがマシです……。"
1012503-62 = "[s] \"お願いします、それだけはやめてください！\""
1012503-63 = "わかってます！冗談、冗談ですって！"
1012503-64 = "……ふぅ。#nもう目を開けても大丈夫ですよ、マスター。"
1012503-66 = "ど、どうですか？ 変じゃないです……？"
1012503-67 = "[s7] \"全然変じゃない。\"\n[s8] \"すごく自然だし、心配いらないよ。\""
1012503-70 = "そ、そうですか？にゅふふふ……。"
1012503-71 = "ありがとうございます、マスター。なんだか元気が出てきました。"
1012503-79 = "あっ、エリちゃんだ。"
1012503-80 = "やっほー、エリちゃん！帽子被ってないの、珍しいね。"
1012503-81 = "あっ！えっ！み、みなさん……！？"
1012503-82 = "あ、あああ、あの、こんにちはっ！どどどうしてこちらに……！？"
1012503-83 = "午後の実技試験の練習に来たんだよ。"
1012503-84 = "エリちゃんも練習？"
1012503-85 = "試験、お互いがんばろうね！応援してるから！"
1012503-86 = "あ、ああ……ありがとうございます！が、がんばります……！！"
1012503-91 = "あぁぁぁぁ……！も、もう終わりです……！#n同じ学科の方々に、裸を見られるなんて……！"
1012503-92 = "[s] \"裸じゃないから！落ち着いて！\""
1012503-93 = "……そ、そうですね！#n帽子を脱ぐなんて、た、大したことじゃ……！#n……一般的には。"
1012503-98 = "……うぅ、やっぱり無理かもしれません。"
1012503-99 = "何としてでも、帽子だけは試験会場に……。"
1012503-100 = "……そうだ。魔法で透明の帽子を作ればいいんです！"
1012503-101 = "それを被れば、没収される心配はありません……！"
1012503-102 = "……って、結局被ってないのと一緒じゃないですか！"
1012503-106 = "それじゃまるで「裸の王様」です！"
1012503-107 = "ああああ、もうダメです！やはり呪いの魔法で試験官を……！"
1012503-108 = "[s9] \"お、落ち着いて！とにかく練習しよう！\"\n[s10] \"やってみれば、きっといい絵が描けると思うよ！\""
1012503-111 = "うぅぅ……本当に、私に描けるんでしょうか……。"
1012503-112 = "[s] \"うん！横でずっとマナの補給もしてあげるから！\""
1012503-113 = "……マスターがそう言ってくださるなら。"
1012503-114 = "……わかりました。少し、気持ちを切り替えてやってみます。"
1012503-115 = "そうですね。#n自分がヌードデッサンのモデルになったつもりで、恥ずかしさを忘れてしまえば――"
1012503-116 = "ヌードも、立派な芸術ですから……！"
1012503-117 = "[s] \"な、なんか違う気もするけど……がんばって！\""
1012503-119 = "（こうしてエリのモデルとなり、実技試験の練習につきあうことになった）"
