[translation]
1601402-1 = "イブキと遊ぼう！"
1601402-4 = "失礼しまーす！"
1601402-8 = "先生！こんにちは！遊びにきたよ！"
1601402-9 = "[s1] \"イブキ！待ってたよ！\"\n[s2] \"久しぶりだね！\""
1601402-12 = "えへへ～"
1601402-13 = "今日はね、マコト先輩にシャーレで遊んできてもいいって言われたの。"
1601402-14 = "だからイブキ、先生とい～っぱい遊びたいと思って！"
1601402-15 = "[s3] \"……私も遊びたいんだけど、ごめんね。\"\n[s4] \"今ちょうど急ぎの仕事が来ちゃって……\""
1601402-21 = "大丈夫！"
1601402-22 = "イブキが手伝ってあげる！"
1601402-23 = "[s5] \"それじゃあ、お願いしてもいい？\"\n[s6] \"イブキが手伝ってくれたら、きっとすぐに終わるよ！\""
1601402-26 = "うん！何でも任せて！"
1601402-28 = "（そうして、イブキと仕事を始めた）"
1601402-36 = "んっと……1枚、2枚……3枚……"
1601402-37 = "……。"
1601402-41 = "……（ちらっ）"
1601402-42 = "[s] （……？）"
1601402-46 = "よ、4枚、5枚……"
1601402-51 = "…………（ちらっ）"
1601402-52 = "[s] （イブキの視線は、どうやらゲームに向いているようだった）"
1601402-53 = "（ふりふり）"
1601402-54 = "……だめ。#nちゃんとお手伝いしなきゃ、悪い子になっちゃう……"
1601402-55 = "[s] \"イブキ。\""
1601402-56 = "うん？先生、どうしたの？"
1601402-57 = "[s] \"ちょっとだけ、一緒にゲームする？\""
1601402-58 = "う、ううん！イブキ、今日は先生のお手伝いをするの！"
1601402-59 = "ここで遊んじゃったら、いつものイブキと一緒だもん！"
1601402-60 = "[s] \"でも先生は、イブキとゲームがしたいなぁ。\""
1601402-62 = "[ns7] \"いつも仕事ばかりで……\"\n[ns8] \"ゲームをする時間があんまり無いから。\""
1601402-65 = "うん……？"
1601402-66 = "じゃあ、時間が無いのにどうしてゲームやおもちゃがたくさんあるの？"
1601402-67 = "[s9] \"か、買うのが好きというか……\"\n[s10] （そんな純粋な目で見ないで……！）"
1601402-70 = "先生、お腹痛いの？顔色が悪いよ……？"
1601402-71 = "[s] \"だ、大丈夫だよ。……それで、どうかな？一緒にゲームしてくれる？\""
1601402-72 = "えっと……"
1601402-73 = "い、イブキは……"
1601402-77 = "[ns] \"遠慮しないで言ってほしいな。\""
1601402-79 = "[ns] \"先生は素直に言ってもらった方が嬉しいから。\""
1601402-84 = "へへ、そうなんだ。"
1601402-85 = "イブキもね、先生と遊びたかったの！#nゲームも人形遊びも、い～っぱいしたい！"
1601402-86 = "本当に、遊んでもいいの……？"
1601402-87 = "[s] \"もちろん！じゃあ、まずはゲームから！\""
1601402-88 = "やった～！"
