[translation]
1601402-1 = "Vamos brincar com a Ibuki!"
1601402-4 = "Com licença!"
1601402-8 = "Sensei! Olá! Vim aqui brincar!"
1601402-9 = "[s1] \"Ibuki! Eu estava te esperando!\"\n[s2] \"Quanto tempo!\""
1601402-12 = "Hehehe~"
1601402-13 = "Hoje, a Makoto-senpai disse que eu podia vir brincar no Schale."
1601402-14 = "Por isso, eu quero brincar muuuito com você, Sensei!"
1601402-15 = "[s3] \"...Eu também quero brincar, mas me desculpe.\"\n[s4] \"Acabou de surgir um trabalho urgente...\""
1601402-21 = "Tudo bem!"
1601402-22 = "A Ibuki vai te ajudar!"
1601402-23 = "[s5] \"Sendo assim, pode me ajudar?\"\n[s6] \"Se a Ibuki me ajudar, com certeza terminaremos rapidinho!\""
1601402-26 = "Sim! Pode deixar comigo!"
1601402-28 = "(E assim, comecei a trabalhar com a Ibuki)"
1601402-36 = "Hum... uma, duas... três..."
1601402-37 = "..."
1601402-41 = "...(olhadinha)"
1601402-42 = "[s] (...?)"
1601402-46 = "Qua, quatro, cinco..."
1601402-51 = "............(olhadinha)"
1601402-52 = "[s] (O olhar da Ibuki parecia estar voltado para o jogo)"
1601402-53 = "(balança a cabeça)"
1601402-54 = "...Não. #nEu preciso ajudar direito, senão vou ser uma criança má..."
1601402-55 = "[s] \"Ibuki.\""
1601402-56 = "Sim? O que foi, Sensei?"
1601402-57 = "[s] \"Quer jogar um pouquinho comigo?\""
1601402-58 = "N-não! A Ibuki veio hoje para ajudar o Sensei!"
1601402-59 = "Se eu ficar brincando aqui, vou ser a mesma Ibuki de sempre!"
1601402-60 = "[s] \"Mas o Sensei quer muito jogar com você.\""
1601402-62 = "[ns7] \"É que eu sempre trabalho demais...\"\n[ns8] \"E não tenho muito tempo para jogar.\""
1601402-65 = "Hum...?"
1601402-66 = "Então, se você não tem tempo, por que tem tantos jogos e brinquedos aqui?"
1601402-67 = "[s9] \"É que eu gosto de comprar, sabe...\"\n[s10] (Não me olhe com esses olhos tão puros...!)"
1601402-70 = "Sensei, sua barriga está doendo? Você está com uma cara ruim...?"
1601402-71 = "[s] \"E-estou bem. ...Então, o que me diz? Quer jogar comigo?\""
1601402-72 = "Bem..."
1601402-73 = "A, a Ibuki..."
1601402-77 = "[ns] \"Não precisa se segurar, pode falar.\""
1601402-79 = "[ns] \"Eu fico mais feliz quando você é sincera comigo.\""
1601402-84 = "Hehe, é mesmo."
1601402-85 = "A Ibuki também queria brincar com você, Sensei! #nQuero jogar e brincar de boneca muuuito!"
1601402-86 = "Sério, eu posso mesmo brincar...?"
1601402-87 = "[s] \"Claro! Então, vamos começar pelo jogo!\""
1601402-88 = "Ebaaa!"
