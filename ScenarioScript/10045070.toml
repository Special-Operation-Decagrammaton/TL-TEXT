[translation]
10045070-1 = "第7話;百花繚乱 vs 百花繚乱"
10045070-2 = "勝てたのはユカリのお陰だね。"
10045070-3 = "とんでもありません！身共とナグサ先輩、二人で掴んだ勝利ですの！"
10045070-4 = "……そうだね。"
10045070-7 = "（人は支え合いながら生きていくもの）"
10045070-8 = "（一人で全部背負う必要も、自分の弱さを恥じる必要もない）"
10045070-12 = "（……そうだよね、アヤメ？）"
10045070-15 = "ユカリ、次の相手はレンゲとキキョウだよ。勝てそう？"
10045070-16 = "お二人の強さは身共が一番存じておりますの！"
10045070-17 = "ですが、身共たちのちーむわ～くも負けておりませんわ！"
10045070-18 = "勝利にこだわりすぎず、最善を尽くすだけですの！"
10045070-19 = "うん、ユカリらしいね。"
10045070-20 = "私も、右腕の調子が戻ってきたから。"
10045070-21 = "悔いのない試合にしようね。"
10045070-22 = "ええ！もちろんですの！"
10045070-24 = "キキョウ、作戦を考えよう。"
10045070-25 = "今までは何とかなったけど、今度の相手は別格だ。"
10045070-26 = "何かいい案はあるの？"
10045070-27 = "え、ないけど？作戦参謀はキキョウだろ？頼りにしてるからな！"
10045070-28 = "……はぁ、まぁ、そうだろうと思った。"
10045070-29 = "……。"
10045070-30 = "私の予想が正しければ、ナグサ先輩とユカリは正面突破を狙ってくるはず。"
10045070-31 = "奇策やトリックを仕掛けてくることはないだろうね。何故なら……。"
10045070-32 = "それこそ、キキョウが一番苦手とする戦い方だから。"
10045070-33 = "そう。奇策の真骨頂は奇襲。#n真正面から勢いで押されたら、どうしたって分が悪い。"
10045070-34 = "となると、私たちがやるべきことも一つだけ。"
10045070-35 = "真っ向勝負ってことか。"
10045070-36 = "奇抜な作戦があまり意味をなさないのなら――"
10045070-37 = "少しでも「チームワーク」の優れたほうが勝つ。"
10045070-38 = "なら、有利なのはアタシらだな！"
10045070-39 = "……どうして？"
10045070-41 = "お前と何年一緒にいると思ってんだ？#nチームワークなら、他の誰にも負けないさ。"
10045070-42 = "レンゲ……。"
10045070-43 = "お前とアタシが組むんだ。勝てるよ。"
10045070-44 = "……。"
10045070-45 = "あんたは本当に……。"
10045070-46 = "分かった。作戦を考える。"
10045070-47 = "私とあんただから実現できる作戦を。"
10045070-48 = "ああ、よろしくな！"
10045070-50 = "しばらくして……。"
10045070-52 = "涙あり、ドラマありの敗者復活戦もいよいよ決勝戦！"
10045070-53 = "[ns] \"本戦への切符を手にするのは、どちらのチームか！\""
10045070-58 = "師匠はどっちが勝つと思ってるんだろう？"
10045070-59 = "余計なことは考えないの。"
10045070-60 = "相手に集中して。"
10045070-61 = "いい表情じゃん。調子が戻ってきたみたいだね。"
10045070-66 = "参ったな……二人とも、目つきが変わったね。"
10045070-67 = "覚悟を決めたのは、身共たちも同じですの！"
10045070-68 = "皆様に御覧に入れて差し上げましょう。"
10045070-69 = "百花繚乱の名に恥じない――真剣勝負を！"
10045070-71 = "それでは試合を始めますっ！"
10045070-75 = "[ns] \"最初のサーブはナグサ選手のようですね。\""
10045070-79 = "強力なスパイクサーブがさく裂！果たして受け止められるのか！"
10045070-80 = "レンゲ！"
10045070-81 = "あいよっ……！"
10045070-87 = "[ns] \"危なげなくサーブを受け止めました！\""
10045070-88 = "「零式」いくよ！"
10045070-89 = "任せろっ！"
10045070-90 = "零式、とは……！？"
10045070-95 = "はあぁぁっ！！！"
10045070-100 = "……！！"
10045070-101 = "あっと、キキョウ選手の正確なトスに続いて、レンゲ選手の時間差攻撃！#nナグサ選手、釣られて反応してしまいました！"
10045070-103 = "やられた……！"
10045070-105 = "身共がおりますの！"
10045070-110 = "あいたぁーっ！！"
10045070-112 = "これを受けるの……！？"
10045070-113 = "さすがユカリ！そうこなくっちゃ！"
10045070-115 = "お返し……！"
10045070-121 = "今度は私が……！"
10045070-122 = "頼んだ！"
10045070-127 = "くっ……！"
10045070-128 = "ナイスレシーブ！#n次は――青春Sだ！"
10045070-129 = "せ、せいしゅん――"
10045070-134 = "恥ずかしがってんのか！？"
10045070-135 = "せ、青春S！！！"
10045070-141 = "鋭いスパイクが一直線！止められるか……！？"
10045070-143 = "……！！"
10045070-144 = "あっ！！"
10045070-148 = "ビーチに突き刺さりました！得点ですっ！"
10045070-149 = "[ns] \"空いたスペースを狙い撃ちするスパイクだったね！\""
10045070-150 = "キキョウ……迷いはなくなったの？"
10045070-151 = "……素直になるって決めた。"
10045070-152 = "どんな私でも、信じて応援してくれる人がそばにいる――そのことを、思い出せたから。"
10045070-153 = "[ruby=みんな]百花繚乱[/ruby]のおかげだよ。"
10045070-154 = "頼もしい作戦参謀だね。"
10045070-156 = "ここからが本当の勝負ですの！"
10045070-157 = "望むところだ！手加減なしでいくよ！"
10045070-158 = "こちらこそ。"
10045070-159 = "やっと右腕も温まってきたところだから。"
10045070-160 = "そういうの、中二病っぽいからやめてって……。"
10045070-161 = "何やら大事なお話をしていたようですが……。"
10045070-162 = "どこか、選手の皆さんの顔が晴れやかになっているように見えます！"
10045070-164 = "（白熱した接戦はデュースにもつれ込み……）"
10045070-165 = "（気づけばスコアボードは20対20を示していた）"
10045070-175 = "きっ、決まったー！"
10045070-179 = "敗者復活の権利を獲得したのは……！"
