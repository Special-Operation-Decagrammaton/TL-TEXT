[translation]
10045070-1 = "Episódio 7; Hyakkaryouran vs Hyakkaryouran"
10045070-2 = "Conseguimos vencer graças a você, Yukari."
10045070-3 = "De jeito nenhum! Foi uma vitória que conquistamos juntas, eu e a Nagusa-senpai!"
10045070-4 = "……É verdade."
10045070-7 = "（As pessoas vivem apoiando umas às outras）"
10045070-8 = "（Não há necessidade de carregar tudo sozinha, nem de se envergonhar da própria fraqueza）"
10045070-12 = "（……Não é, Ayame?）"
10045070-15 = "Yukari, as próximas oponentes são Renge e Kikyou. Acha que conseguimos vencer?"
10045070-16 = "Eu sou a que melhor conhece a força das duas!"
10045070-17 = "Mas o nosso trabalho em equipe não perde para o delas!"
10045070-18 = "Não vamos nos preocupar demais com a vitória, apenas dar o nosso melhor!"
10045070-19 = "Sim, isso é bem a sua cara, Yukari."
10045070-20 = "Eu também, o movimento do meu braço direito voltou ao normal."
10045070-21 = "Vamos fazer uma partida sem arrependimentos."
10045070-22 = "Sim! Com certeza!"
10045070-24 = "Kikyou, vamos pensar em uma estratégia."
10045070-25 = "Até agora conseguimos nos virar, mas as próximas oponentes estão em outro nível."
10045070-26 = "Você tem alguma boa ideia?"
10045070-27 = "Eh, eu não? A estrategista não é você, Kikyou? Estou contando com você!"
10045070-28 = "……Haa, bem, eu imaginei que diria isso."
10045070-29 = "……."
10045070-30 = "Se a minha previsão estiver correta, a Nagusa-senpai e a Yukari vão tentar um ataque frontal."
10045070-31 = "Elas provavelmente não vão usar truques ou estratégias incomuns. Porque……."
10045070-32 = "Esse é justamente o tipo de combate que a Kikyou menos gosta."
10045070-33 = "Exato. A essência de uma estratégia incomum é o ataque surpresa. #nSe formos pressionadas de frente com força total, estaremos em desvantagem de qualquer jeito."
10045070-34 = "Sendo assim, só há uma coisa que podemos fazer."
10045070-35 = "Então é um confronto direto, é?"
10045070-36 = "Se estratégias mirabolantes não fazem muito sentido――"
10045070-37 = "Quem tiver o melhor \"trabalho em equipe\" vencerá."
10045070-38 = "Nesse caso, nós somos as favoritas!"
10045070-39 = "……Por quê?"
10045070-41 = "Há quantos anos você acha que estamos juntas? #nNo trabalho em equipe, não perdemos para ninguém."
10045070-42 = "Renge……."
10045070-43 = "Você e eu formamos uma dupla. Vamos vencer."
10045070-44 = "……."
10045070-45 = "Você é realmente……."
10045070-46 = "Entendido. Vou pensar na estratégia."
10045070-47 = "Uma estratégia que só pode ser realizada porque somos eu e você."
10045070-48 = "Ah, conto com você!"
10045070-50 = "Algum tempo depois……."
10045070-52 = "A repescagem, cheia de lágrimas e drama, finalmente chega à final!"
10045070-53 = "[ns] \"Qual equipe garantirá o ingresso para a competição principal!\""
10045070-58 = "Quem será que a mestre acha que vai vencer?"
10045070-59 = "Não pense em coisas desnecessárias."
10045070-60 = "Concentre-se na oponente."
10045070-61 = "Que expressão boa. Parece que você recuperou o ritmo."
10045070-66 = "Isso é um problema…… as duas mudaram o olhar."
10045070-67 = "Nós também estamos decididas!"
10045070-68 = "Vamos mostrar a todos vocês."
10045070-69 = "Um duelo sério, digno do nome Hyakkaryouran!"
10045070-71 = "Então, que comece a partida!"
10045070-75 = "[ns] \"O primeiro saque parece ser da jogadora Nagusa.\""
10045070-79 = "Um saque de viagem poderoso! Será que elas vão conseguir receber?!"
10045070-80 = "Renge!"
10045070-81 = "Pode deixar...!"
10045070-87 = "[ns] \"Ela recebeu o saque sem dificuldades!\""
10045070-88 = "Lá vai o \"Tipo Zero\"!"
10045070-89 = "Comigo!"
10045070-90 = "Tipo Zero, o que seria isso...!?"
10045070-95 = "Haaaaa!!!"
10045070-100 = "……!!"
10045070-101 = "Ah! Após o levantamento preciso da jogadora Kikyou, temos um ataque de tempo da jogadora Renge!#nA jogadora Nagusa acabou sendo enganada e reagiu!"
10045070-103 = "Fui pega...!"
10045070-105 = "Eu ainda estou aqui!"
10045070-110 = "Ai, ai, ai!!"
10045070-112 = "Você vai receber isso...!?"
10045070-113 = "Essa é a Yukari! É assim que se faz!"
10045070-115 = "O troco...!"
10045070-121 = "Desta vez sou eu...!"
10045070-122 = "Conto com você!"
10045070-127 = "Droga...!"
10045070-128 = "Belo passe!#nAgora é a vez do... S da Juventude!"
10045070-129 = "J-Juventude..."
10045070-134 = "Está com vergonha!?"
10045070-135 = "S-S da Juventude!!!"
10045070-141 = "Um corte afiado em linha reta! Será que ela consegue parar...!?"
10045070-143 = "……!!"
10045070-144 = "Ah!!"
10045070-148 = "Cravou na areia! É ponto!"
10045070-149 = "[ns] \"Foi um corte mirando exatamente no espaço vazio!\""
10045070-150 = "Kikyou... você não está mais hesitante?"
10045070-151 = "……Decidi ser honesta comigo mesma."
10045070-152 = "Não importa como eu seja, tem pessoas ao meu lado que acreditam em mim e me apoiam... Eu consegui me lembrar disso."
10045070-153 = "Graças ao Hyakkiyako."
10045070-154 = "Você é uma estrategista de confiança."
10045070-156 = "É daqui que a verdadeira partida começa!"
10045070-157 = "Era o que eu queria ouvir! Vou jogar sem pegar leve!"
10045070-158 = "Digo o mesmo."
10045070-159 = "Já que meu braço direito finalmente começou a esquentar."
10045070-160 = "Eu já disse para parar com essas coisas de chuunibyou..."
10045070-161 = "Parece que elas estavam conversando sobre algo importante..."
10045070-162 = "De alguma forma, o rosto de todas as jogadoras parece estar mais radiante!"
10045070-164 = "(A partida acirrada se estendeu até o deuce...)"
10045070-165 = "(Quando percebi, o placar marcava 20 a 20)"
10045070-175 = "E-ela marcou!"
10045070-179 = "Quem conquistou o direito de retornar à competição foi...!"
