[translation]
10033070-1 = "第7話;それぞれに抱えるもの"
10033070-3 = "あーもう、あれどういうこと？"
10033070-4 = "展望台の床、頑張って「掃除」したのにね。"
10033070-5 = "まさかそれで遊び始めるなんて……。"
10033070-6 = "「これを好む者はこれを楽しむ者に如かず」……だっけ。"
10033070-7 = "あー……まあ「楽しんだもん勝ち」って言葉もあるしね。#nいやぁ、爆弾がどうとか言い出した時はヒヤッとしたけど。"
10033070-8 = "そんなことされたら、後片付けが大変だもんね……。"
10033070-15 = "呑気にそんなこと言ってる場合かっ！！"
10033070-16 = "あ、リーダーお帰りなさい！"
10033070-17 = "どうでした、#n「肝試しコースで本物が出たらゲヘナも腰を抜かすんじゃないか計画」は？"
10033070-18 = "……撤退だよ！#n戦略的な撤退！"
10033070-19 = "帰りがけに見ましたけど……#nゲヘナの奴ら、何かそれも楽しまれてませんでした？"
10033070-20 = "あー、何か花火が上がってたのってそれですか？#n確かに遠目から見ても楽しそうでしたね。"
10033070-21 = "にしても、工房でいきなり温泉を掘ろうとしてたのはビビった……。"
10033070-22 = "やっぱりゲヘナはネジ飛んでるよ……。"
10033070-23 = "分かる……#nあ、でもクサヤジャムトーストはちょっと食べたい。"
10033070-24 = "お前もネジ飛んでるなぁ！？#n作る過程で三途の川が見えたぞあれ！？"
10033070-25 = "でも、美味しそうに食べてる奴いたし……。"
10033070-26 = "いや、あれはバケモンだろ……#n逆に、何なら食べられないのか直接聞きに行くか？"
10033070-32 = "だーーーーっ！#n楽しそうに話してる場合かっての！！"
10033070-33 = "どいつもこいつも弛んでる！#n神木祭はもう明日なんだぞ！？"
10033070-34 = "年に一回しかない、あたしたち百鬼夜行の大事なお祭り……。"
10033070-35 = "なのに、「ゲヘナが来たから開催日をそこに合わせる」だなんて！"
10033070-36 = "ご神木だって悲しんでるだろ絶対！"
10033070-38 = "まあ……でも、ゲヘナの生徒だって、#nお祭りを見に来た観光客なんじゃないですか？"
10033070-39 = "百鬼夜行は元々、観光客は大歓迎！な学区ですし……。"
10033070-40 = "神木祭も最近じゃ、#n「今年も良い年になると良いね！」くらいのお祭りになってますしね……。"
10033070-41 = "それにほら、ご神木としては、#nどんな名目でも人が集まるのは喜んでくれてそうじゃないです？"
10033070-46 = "お前らは何で向こうの肩持ってんだ！#n敵か！？敵なのか！？"
10033070-51 = "ま、まぁまぁ……#n「本当は百鬼夜行のもののはず」って意味では、#n概ねリーダーに同意はしてますから。"
10033070-53 = "はぁ……よし、とにかく神木祭は明日。#n必ずやあたしたち魑魅一座で、お祭りを取り戻してやるんだから！"
10033070-55 = "一応なんですけどリーダー……#nある意味、そのお祭りを私たちが妨害する感じなんですが、#nそれはオッケーなんです？"
10033070-56 = "それもそうだし、何か雲行き怪しいし……。"
10033070-58 = "だ、大丈夫！#n最近は儀式の形式も違うし、#n少しくらい滅茶苦茶になってもあんまり問題無いはず！"
10033070-59 = "とにかく「百鬼夜行の祭りは百鬼夜行のものだ」って伝われば良い！#nそれをゲヘナの奴らにも見せつけてやる！"
10033070-61 = "それはそうっすね。#n百鬼夜行のもので……つまりは、私たち魑魅一座のものでもある。"
10033070-62 = "ま、ここまでゲヘナにやられっぱなしなのも癪ですしね。"
10033070-63 = "うん、明日は気を引き締めて頑張ろうか？"
10033070-64 = "あ、そういえば神木祭ってことは、チセ様も来るじゃん！#n楽しみ～！"
10033070-65 = "舞をやってくれるんでしょ、絶対見たい！"
10033070-70 = "だ～か～ら～～！！"
10033070-78 = "お、お疲れ様です、先生。"
10033070-79 = "想像より、もめ事が起きずに助かりました……。"
10033070-80 = "[s1] \"そうだね、血で血を洗う枕投げしたりとか……。\"\n[s2] \"夜の街に繰り出す生徒とかがいなくて助かった……。\""
10033070-83 = "皆さん、昼間に色々あって疲労がたまってたんでしょう。"
10033070-84 = "同じように疲れてるはずなのに、#n先生は夜のパトロールまでしてくださって……。"
10033070-85 = "[s] \"ううん、少しでもウミカたちの手伝いをと思ってね。\""
10033070-86 = "いえ、私の方こそダメなところばっかりで……。"
10033070-87 = "……ほんと、目も当てられないくらい。"
10033070-88 = "計画通りに進んだものの方が少ないくらいでしたし……。"
10033070-89 = "こういう時、社長だったら……。"
10033070-90 = "[ns3] \"頑張ることは、もちろん大事だけどね。\"\n[ns4] \"計画は、どうしようもなくズレることもあるから……。\""
10033070-93 = "せ、先生？#nなんだか悲壮な目をされていますが……？"
10033070-94 = "とんでもない事情でやむを得ないこともある……？#nは、はぁ……。"
10033070-95 = "[s] \"お祭りも、毎回計画通りには行かないんじゃない？\""
10033070-98 = "た、確かに……。"
10033070-99 = "完璧に上手くいった、という記憶はほとんど無いですね……。"
10033070-100 = "やはり現場は、突発的な出来事の連続ですし……。"
10033070-101 = "……今回の、問題は。"
10033070-102 = "私が今まで、#nそういった場面の対処をしてこなかったところにあるんだと思います。"
10033070-103 = "[s] \"そうなの……？\""
10033070-104 = "そういう時は、社長が何とかしてくださいますから。"
10033070-105 = "情けないです……#nお祭りが好きだって言っておいて、準備は頑張ってるようでいて……。"
10033070-106 = "一番大事な、一番大変なことは社長任せで……#n私、無意識の内に甘えてたんです。"
10033070-107 = "今だってそうです。#n頑張らなきゃって、本当に思ってるんですけど……。"
10033070-108 = "同時に心のどこかでは……社長が早く、帰ってこないかなって。#nそんなことを、考えてるんです。"
10033070-109 = "[s5] \"どっちも本当で、良いんじゃないかな。\"\n[s6] \"投げ出したいって思ってるわけじゃないんでしょ？\""
10033070-112 = "それは……。"
10033070-114 = "隙ありぃ！"
10033070-115 = "[ns] \"のわっ！？\""
10033070-117 = "き、キララさん？エリカさん？"
10033070-121 = "やっほ！#n二人とも脇が甘いよ～？"
10033070-122 = "まったく、怪我とかさせないでよ？"
10033070-123 = "手加減したから大丈夫！#nで、何でそんな顔してんの？"
10033070-124 = "それは……。"
10033070-130 = "えー、ウミカちゃん頑張ってると思うけど？"
10033070-131 = "そう、でしょうか……#nですが、計画はズレてばっかりで、上手くいってないことの方が多くて……。"
10033070-132 = "……私が言うのもアレだけどさ。"
10033070-133 = "相手はゲヘナの生徒なんだから、#nむしろこれくらいで済んで凄いと思うよ。"
10033070-134 = "そーそー！#n自信持ってよ、ね？"
10033070-135 = "展望台で神木もすごかったし、工芸品体験も楽しかった！#nあとご飯も最高だったよ！"
10033070-136 = "肝試し、は……。"
10033070-137 = "び、微妙でしたか……！？"
10033070-138 = "あ、いや、私たちが変な楽しみ方しちゃったから。#n今更だけど申し訳ないなってだけ。"
10033070-142 = "……私は。"
10033070-143 = "私はもっと、もっと上手くやりたくって……#n他の人だったら、やれるはずで……。"
10033070-144 = "[s] \"……。\""
10033070-145 = "（だって、社長だったらきっと……）"
10033070-146 = "ま、完璧なんてそうそう無いじゃん？"
10033070-147 = "全部事前に把握できてるならまだしも、#nそれは土台無理な話だし。"
10033070-148 = "とにかく、あたしは今日楽しかったよ！#n明日もすっごく楽しみ！それで良いんじゃないかな？"
10033070-149 = "お、お世辞でも、嬉しいです……。"
10033070-150 = "あはは、お世辞じゃないってば―。"
10033070-151 = "今更だけど、先生もウミカもお疲れ様。#nこんな時間にパトロールなんて。"
10033070-152 = "だね、ガイドさんは大変だぁ。"
10033070-157 = "[ns] \"まあまあ。と言うか、全然別の話なんだけど……。\""
10033070-158 = "んー？"
10033070-159 = "[ns] \"もう、とっくに門限過ぎてない？\""
10033070-164 = "……誤魔化せなかったか。"
10033070-165 = "あはー、逃げろ～！"
10033070-170 = "[ns] \"待てぇー！\""
10033070-173 = "（……）"
10033070-174 = "（「全部事前に把握できてるならまだしも」……）"
10033070-175 = "（私は、何が起きるか知ってるはず……）"
10033070-176 = "（その上で、だからこそやれることが、ある……？）"
