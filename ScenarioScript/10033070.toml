[translation]
10033070-1 = "Episódio 7; O que cada um carrega"
10033070-3 = "Ah, fala sério, o que foi aquilo?"
10033070-4 = "Eu me esforcei tanto para \"limpar\" o chão do observatório, sabe."
10033070-5 = "Quem diria que eles começariam a brincar com aquilo..."
10033070-6 = "\"Quem gosta de algo não se compara a quem se diverte com isso\"... era assim, né?"
10033070-7 = "Ah... bom, tem aquele ditado de que \"quem se diverte, ganha\".#nMas, nossa, quando começaram a falar de bombas, eu gelei."
10033070-8 = "Se eles fizessem algo assim, a limpeza depois seria um pesadelo..."
10033070-15 = "É hora de ficar falando essas coisas tranquilamente?!"
10033070-16 = "Ah, líder, bem-vinda de volta!"
10033070-17 = "Como foi o #n\"Plano: Gehenna vai ficar de queixo caído se algo real aparecer no curso de teste de coragem\"?"
10033070-18 = "……Foi uma retirada!#nUma retirada estratégica!"
10033070-19 = "Eu vi na volta, mas...#nO pessoal de Gehenna não estava se divertindo com aquilo também?"
10033070-20 = "Ah, então foi por isso que soltaram fogos de artifício?#nRealmente, olhando de longe, parecia que eles estavam se divertindo."
10033070-21 = "Ainda assim, fiquei chocada quando tentaram cavar uma fonte termal do nada na oficina..."
10033070-22 = "Gehenna é realmente fora da casinha..."
10033070-23 = "Concordo...#nAh, mas eu queria provar aquela torrada de geleia de kusaya."
10033070-24 = "Você também é fora da casinha?!#nEu vi o rio Sanzu só de ver o processo de preparo!"
10033070-25 = "Mas tinha gente comendo e achando gostoso..."
10033070-26 = "Não, aquilo é um monstro...#nAo contrário, será que a gente deveria ir perguntar diretamente o que eles não comem?"
10033070-32 = "Chegaaaaa!#nÉ hora de ficar conversando alegremente sobre isso?!"
10033070-33 = "Todo mundo aqui está relaxado demais!#nO Festival da Árvore Sagrada já é amanhã, sabia?!"
10033070-34 = "É o festival mais importante da nossa Hyakkiyako, que só acontece uma vez por ano..."
10033070-35 = "E mesmo assim, \"como Gehenna veio, vamos ajustar a data do festival\"!"
10033070-36 = "Com certeza a Árvore Sagrada está triste também!"
10033070-38 = "Bem... mas os alunos de Gehenna não são apenas #nturistas que vieram ver o festival?"
10033070-39 = "Hyakkiyako, originalmente, é um distrito que dá as boas-vindas aos turistas!"
10033070-40 = "E o Festival da Árvore Sagrada, ultimamente, #ntornou-se um evento do tipo \"espero que este ano seja bom também!\"..."
10033070-41 = "Além disso, veja bem, a Árvore Sagrada #nnão parece ficar feliz com o fato de as pessoas se reunirem, não importa o motivo?"
10033070-46 = "Por que vocês estão defendendo o outro lado!#nSão inimigos?! Vocês são inimigos?!"
10033070-51 = "B-bem, bem...#nNo sentido de que \"na verdade deveria ser algo de Hyakkiyako\",#nnós concordamos com a líder, no geral."
10033070-53 = "Haa... certo, de qualquer forma, o Festival da Árvore Sagrada é amanhã.#nNós, o Grupo Chimi, vamos recuperar esse festival custe o que custar!"
10033070-55 = "Só por precaução, líder...#nem certo sentido, nós vamos atrapalhar o festival,#nisso é aceitável?"
10033070-56 = "É verdade, e o tempo também parece estar fechando..."
10033070-58 = "T-tá tudo bem!#nUltimamente o formato dos rituais mudou,#ne mesmo que vire uma bagunça, não deve ser um grande problema!"
10033070-59 = "De qualquer forma, basta que eles saibam que \"o festival de Hyakkiyako pertence a Hyakkiyako\"!#nVamos mostrar isso para o pessoal de Gehenna!"
10033070-61 = "Isso é verdade.#nÉ de Hyakkiyako... ou seja, também é nosso, do Grupo Chimi."
10033070-62 = "Bem, é irritante ter sido derrotada por Gehenna até agora."
10033070-63 = "Certo, vamos nos concentrar e dar o nosso melhor amanhã?"
10033070-64 = "Ah, falando nisso, se é o Festival da Árvore Sagrada, a Chise-sama também vai vir!#nQue legal~!"
10033070-65 = "Ela vai fazer uma dança, eu quero muito ver!"
10033070-70 = "E-u-j-á-d-i-s-s-e-!-"
10033070-78 = "O-obrigada pelo trabalho duro, Sensei."
10033070-79 = "Foi um alívio que não tenha acontecido tantos problemas quanto eu imaginei..."
10033070-80 = "[s1] \"Pois é, como uma guerra de travesseiros que terminasse em sangue...\"\n[s2] \"Foi bom não ter alunos perambulando pela cidade à noite...\""
10033070-83 = "Todos devem estar exaustos por causa de tudo o que aconteceu durante o dia."
10033070-84 = "Mesmo estando tão cansado quanto nós,#no Sensei ainda veio fazer a patrulha noturna..."
10033070-85 = "[s] \"Não, eu só queria ajudar a Umika e os outros um pouco.\""
10033070-86 = "Não, eu é que só cometi erros..."
10033070-87 = "……Sério, foi algo vergonhoso de se ver."
10033070-88 = "Quase nada saiu conforme o planejado..."
10033070-89 = "Nessas horas, se fosse a presidente..."
10033070-90 = "[ns3] \"Se esforçar é importante, claro.\"\n[ns4] \"Mas os planos podem acabar saindo dos trilhos de formas inevitáveis...\""
10033070-93 = "P-Professor?#nPor que está me olhando com esse semblante tão trágico...?"
10033070-94 = "Que às vezes existem circunstâncias inevitáveis e imprevisíveis...?#nAh, entendo..."
10033070-95 = "[s] \"Festivais também não costumam sair exatamente como planejado, não é?\""
10033070-98 = "I-Isso é verdade..."
10033070-99 = "Quase não tenho memórias de algo que tenha saído perfeitamente bem..."
10033070-100 = "Afinal, o campo de batalha é uma sucessão de eventos inesperados..."
10033070-101 = "O problema... desta vez,"
10033070-102 = "é que eu nunca tive que lidar com esse tipo de situação antes."
10033070-103 = "[s] \"É mesmo...?\""
10033070-104 = "Porque, nessas horas, a presidente sempre dava um jeito."
10033070-105 = "É patético...#nDigo que amo festivais, pareço estar me esforçando nos preparativos..."
10033070-106 = "Mas deixo o que é mais importante e difícil para a presidente...#nEu estava me apoiando nela inconscientemente."
10033070-107 = "Mesmo agora. #nEu realmente penso que preciso me esforçar..."
10033070-108 = "Mas, ao mesmo tempo, em algum lugar do meu coração... eu fico pensando se a presidente não poderia voltar logo.#nEu penso nessas coisas."
10033070-109 = "[s5] \"Não tem problema sentir as duas coisas, tem?\"\n[s6] \"Você não está querendo desistir de tudo, está?\""
10033070-112 = "Isso é..."
10033070-114 = "Achei uma brecha!"
10033070-115 = "[ns] \"Uwaa!?\""
10033070-117 = "K-Kirara-san? Erika-san?"
10033070-121 = "Ioi!#nVocês duas estão bem distraídas, hein?"
10033070-122 = "Qual é, não machuquem ninguém, tá?"
10033070-123 = "Eu peguei leve, tá tudo bem!#nMas por que estão com essas caras?"
10033070-124 = "Isso é..."
10033070-130 = "Ah, eu acho que a Umika-chan está se esforçando, não está?"
10033070-131 = "Será...?#nMas os planos só saem dos trilhos, e na maioria das vezes as coisas não dão certo..."
10033070-132 = "...Não que eu deva falar algo,"
10033070-133 = "mas como você está lidando com alunas de Gehenna,#nacho até impressionante que tenha dado certo até aqui."
10033070-134 = "Isso mesmo!#nTenha mais confiança, tá?"
10033070-135 = "A árvore sagrada no observatório foi incrível, e a experiência com artesanato foi divertida!#nE a comida também estava ótima!"
10033070-136 = "O teste de coragem, por outro lado..."
10033070-137 = "F-Foi ruim...?"
10033070-138 = "Ah, não, é que nós nos divertimos de um jeito meio estranho.#nÉ tarde para dizer isso, mas sinto muito."
10033070-142 = "...Eu."
10033070-143 = "Eu queria ter feito muito, muito melhor...#nSe fosse outra pessoa, com certeza teria conseguido..."
10033070-144 = "[s] \"...\""
10033070-145 = "(Porque, se fosse a presidente, com certeza...)"
10033070-146 = "Bem, perfeição não existe, né?"
10033070-147 = "Mesmo que desse para prever tudo de antemão,#nisso seria pedir demais."
10033070-148 = "De qualquer forma, eu me diverti hoje!#nEstou muito animada para amanhã também! Não é o suficiente?"
10033070-149 = "M-Mesmo que seja só educação, fico feliz..."
10033070-150 = "Ahaha, não é só educação, não."
10033070-151 = "Tarde demais, mas bom trabalho para você e para o Professor.#nPatrulhando a essa hora da noite."
10033070-152 = "Pois é, ser guia é difícil, hein."
10033070-157 = "[ns] \"Bem, bem. Aliás, mudando completamente de assunto...\""
10033070-158 = "Hmm?"
10033070-159 = "[ns] \"Já não passou do toque de recolher faz tempo?\""
10033070-164 = "...Não consegui enganá-las."
10033070-165 = "Aha, corram!"
10033070-170 = "[ns] \"Espere aí!\""
10033070-173 = "（……）"
10033070-174 = "（Se eu pelo menos soubesse de tudo com antecedência...）"
10033070-175 = "（Eu deveria saber o que vai acontecer...）"
10033070-176 = "（E com base nisso, é por isso que existe algo que eu possa fazer...?）"
