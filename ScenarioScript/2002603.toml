[translation]
2002603-1 = "Minori Twist"
2002603-2 = "Academia Federal Red Winter - Biblioteca"
2002603-3 = "（Aproveitando que visitei a Academia Federal Red Winter a trabalho pelo Schale, passei na biblioteca para pesquisar os registros administrativos da escola.）"
2002603-13 = "（Minori estava lendo em uma mesa no canto, onde não havia ninguém por perto.）"
2002603-14 = "Hmm..."
2002603-15 = "[ns] \"...Minori?\""
2002603-16 = "Não é o Sensei? O que faz por aqui?"
2002603-17 = "Entendo, veio procurar listas de alunos e atas de reuniões antigas."
2002603-18 = "Se for isso, é melhor desistir. Os registros da academia foram reescritos a cada golpe de estado que ocorreu. É como se os originais nem existissem mais."
2002603-19 = "Felizmente, apenas as obras literárias selecionadas a dedo pelos bibliotecários da 'Frente de Libertação do Conhecimento' permanecem em bom estado."
2002603-20 = "Às vezes, é possível encontrar até romances que saíram de catálogo nesta biblioteca. Não é uma má ideia visitar se estiver procurando por livros antigos."
2002603-21 = "[s] \"Entendo. E por que a Minori está na biblioteca?\""
2002603-22 = "Por que, você pergunta...?"
2002603-23 = "É óbvio que é para ler livros."
2002603-24 = "...É um insulto me comparar com certa baixinha que vem à biblioteca para tirar uma soneca."
2002603-25 = "[s1] \"Desculpe, não foi nesse sentido...\"\n[s2] \"É que as alunas do Departamento de Obras parecem ser bem ativas...\""
2002603-28 = "Bem, não vou negar. #nMas para manter o foco no trabalho em campo, isso também é necessário."
2002603-29 = "Não posso deixar passar nada em contratos cheios de termos técnicos complicados e acabar prejudicando os membros do departamento."
2002603-30 = "Por isso, como chefe, preciso adquirir um bom nível de cultura."
2002603-31 = "Nos dias sem trabalho ou manifestações, passo o tempo aqui na biblioteca lendo. Além disso, a biblioteca é mais quente que os outros prédios."
2002603-32 = "[s] \"Que tipo de livros a Minori gosta?\""
2002603-33 = "Vejamos. Gosto de ficção científica e ensaios que estimulam a imaginação, mas... #nO meu favorito é a 'Literatura Proletária'."
2002603-34 = "[s] \"Literatura Proletária...?\""
2002603-35 = "Sim. A literatura proletária é aquela que retrata a realidade dos trabalhadores. São histórias sobre trabalhadores que, colocados em situações difíceis pelas mãos dos capitalistas, se levantam e lutam."
2002603-36 = "Como trabalhadora, me identifico muito. #nAlém disso, dá até para aprender lições e métodos de como lidar com capitalistas!"
2002603-37 = "[s] \"E-entendo...\""
2002603-38 = "Existem vários tipos de literatura proletária, mas a minha obra favorita é..."
2002603-48 = "'O Banquete da Raposa e da Garça'."
2002603-49 = "[s] A Raposa e... a Garça?"
2002603-50 = "O Sensei não conhece 'O Banquete da Raposa e da Garça'? #nÉ uma obra tão famosa que está nas estantes de qualquer academia."
2002603-51 = "Em 'O Banquete da Raposa e da Garça', a garça, da classe trabalhadora, luta contra a raposa, que simboliza o capitalista maligno, e alcança a revolução."
2002603-52 = "A raposa prometeu dividir a comida de forma justa, mas serviu a sopa em um prato raso, difícil para a garça beber, para monopolizar a comida..."
2002603-53 = "[s] \"É, era assim mesmo...?\""
2002603-54 = "Sim, é isso mesmo."
2002603-55 = "Então, a garça aprendeu a lição e, da próxima vez, convidou a raposa para sua casa. Ela colocou a comida em uma garrafa longa, onde a boca da raposa não alcançava, e assim conquistou a vitória."
2002603-56 = "Ou seja, o que essa obra quer transmitir é... a tática básica de guerrilha: você pode alcançar a vitória atraindo o inimigo para um ambiente favorável a você!"
2002603-57 = "[ns] （Acho que a história não era bem assim...）"
2002603-58 = "Ah, e 'Os Três Porquinhos' também é indispensável!"
2002603-62 = "'Os Três Porquinhos' é leitura obrigatória para qualquer trabalhador da construção civil. #nEstá repleto de lições essenciais para o canteiro de obras."
2002603-63 = "O primeiro e o segundo porquinho negligenciaram a fundação e a casa desmoronou. Mas a casa do terceiro porquinho, construída com tijolos e cimento resistentes, permaneceu segura até o fim."
2002603-64 = "Embora, idealmente, a fundação devesse ser feita de concreto armado..."
2002603-65 = "Como é uma literatura infantil, deve ter sido uma necessidade da encenação."
2002603-66 = "[s] \"E-entendi...\""
2002603-67 = "Claro que também adoro 'O Vento Norte e o Sol'!"
2002603-68 = "O Vento Norte e o Sol tentam fazer o pobre viajante tirar o casaco através de opressão e persuasão. Esse é um método que os burgueses usam muito para dividir os trabalhadores..."
2002603-69 = "A lição que se tira dessa história é que, como trabalhadores, nunca devemos baixar a guarda—"
2002603-71 = "（Depois disso, continuei ouvindo as interpretações um tanto peculiares da Minori sobre contos de fadas.）"
