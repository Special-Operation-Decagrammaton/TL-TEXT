[translation]
2002603-1 = "ミノリ・ツイスト"
2002603-2 = "レッドウィンター連邦学園・図書館"
2002603-3 = "（シャーレの仕事でレッドウィンター連邦学園を訪れたついでに、学園の行政記録を調べるため図書館に立ち寄った）"
2002603-13 = "（近くに誰もいない端の席で、ミノリが読書をしていた）"
2002603-14 = "ふむ……。"
2002603-15 = "[ns] \"……ミノリ？\""
2002603-16 = "先生じゃないか。こんなところに何の用だ？"
2002603-17 = "なるほど、過去の生徒名簿や会議録を探しに来たのか。"
2002603-18 = "それなら、諦めた方が賢明だな。学園の記録は、クーデターが起きる度に書き換えられてきた。もはや原文など存在しないも同然。"
2002603-19 = "幸い、「知識解放戦線」の司書が厳選した文学作品だけは、良い状態を保っているが。"
2002603-20 = "絶版になった小説も、ここの図書館でなら見つかることがある。昔の本を探し求めて訪れる分には悪くない。"
2002603-21 = "[s] \"なるほど。それで、どうしてミノリは図書館に？\""
2002603-22 = "どうして、とは……？"
2002603-23 = "本を読むために決まってるじゃないか。"
2002603-24 = "……図書館で昼寝をするような、どこぞのチビと一緒にされるのは心外だ。"
2002603-25 = "[s1] \"ごめん、そういう意味じゃなくて……。\"\n[s2] \"工務部の生徒は、活動的なイメージだから……。\""
2002603-28 = "まあ、否定はしない。#nだが、現場で作業に集中するためには、これも必要なこと。"
2002603-29 = "あたしが難しい専門用語の羅列された契約書を読み落として、部員が不利益を被ってはならないからな。"
2002603-30 = "だから部長として、きちんと教養を身につけておきたいんだ。"
2002603-31 = "作業やデモがない日は、こうして図書館で本を読みながら過ごしている。それに図書館なら、他の建物よりも暖かいからな。"
2002603-32 = "[s] \"ミノリはどんなジャンルの本が好きなの？\""
2002603-33 = "そうだな。想像力を刺激するSFやエッセイも好きだが……#n一番は、「プロレタリア文学」だ。"
2002603-34 = "[s] \"プロレタリア文学……？\""
2002603-35 = "ああ。プロレタリア文学は、労働者の現実を描いた文学作品だ。資本家の手によって苦境に立たされた労働者が立ち上がり、闘争する物語になっている。"
2002603-36 = "同じ労働者として共感するところも多い。#nさらには、資本家を相手取る際の対処法と教訓まで得られるぞ！"
2002603-37 = "[s] \"そ、そうなんだ……。\""
2002603-38 = "プロレタリア文学にも色々あるが、なかでもあたしが一番好きな作品は……"
2002603-48 = "『キツネとツルのご馳走』だ。"
2002603-49 = "[s] キツネと……ツル？"
2002603-50 = "先生は『キツネとツルのご馳走』を知らないのか？#nどの学園の本棚に並んでいるほど、有名な作品なんだが。"
2002603-51 = "『キツネとツルのご馳走』は、労働者階級のツルが、邪悪な資本家を象徴するキツネに対抗して革命を成功させる。"
2002603-52 = "キツネは公平に食べ物を分け合うと約束したのに、ツル側からは飲みづらい平らな皿にスープをよそって、食べ物を独占し……。"
2002603-53 = "[s] \"そ、そうだったっけ……？\""
2002603-54 = "ああ、そうだ。"
2002603-55 = "そして、ツルはそこから教訓を得て、今度はキツネを自分の家に呼んだ。そして、キツネの口が届かない長い瓶に食べ物を入れることで、勝利を掴み取る。"
2002603-56 = "つまり、この作品が伝えたいのは……自分の有利な環境に敵をおびき寄せることで勝利を実現できるという、遊撃戦の基礎戦術なんだ！"
2002603-57 = "[ns] （そんな内容じゃなかったような……)"
2002603-58 = "ああ、それに『三匹の子豚』も欠かせない！"
2002603-62 = "『三匹の子豚』は、建築に係わる労働者なら必ず読むべきだ。#n現場で欠かせない教訓が詰まっているからな。"
2002603-63 = "一番目と二番目の子豚は、基礎工事を怠ったことで、家が崩れる。だが、レンガとセメントで丈夫な家を建てた三番目の子豚の家は、最後まで安全だった。"
2002603-64 = "本来であれば、鉄筋コンクリートで基礎を作るべきだが……"
2002603-65 = "児童向けの文学だから、演出の都合で仕方なかったのだろう。"
2002603-66 = "[s] \"そ、そうなんだね……。\""
2002603-67 = "もちろん『北風と太陽』も大好きだ！"
2002603-68 = "北風と太陽が、貧しい旅人から上着を脱がせるために、圧政と懐柔を繰り返す。あれは労働者同士を分裂させるために、ブルジョワどもがよく使う手法だな……。"
2002603-69 = "この話から学べる教訓は、労働者たるもの常に油断してはならないという――"
2002603-71 = "（その後も、ミノリから少し変わった童話の感想を聞き続けた)"
