[translation]
83306040100-6 = "Ah, ah... ugh... o que eu faço..."
83306040100-7 = "Hm? O que houve?"
83306040100-8 = "P-Presidente!? P-por que você está aqui...!"
83306040100-9 = "Pensei em fazer uma ronda, só por precaução."
83306040100-10 = "Então... algum problema aconteceu?"
83306040100-11 = "B-bem, é que..."
83306040100-12 = "M-me desculpe! Por um breve momento de distração, a chefe do Departamento de Desenvolvimento de Fontes Termais desapareceu...!"
83306040100-13 = "E-e-eu sinto muito mesmo—"
83306040100-14 = "Não precisa se desculpar. O que importa é o que você fará a seguir."
83306040100-15 = "P-Presidente...!"
83306040100-16 = "...Estamos falando da chefe do Departamento de Desenvolvimento de Fontes Termais. Eu também tive culpa por deixar tudo nas suas mãos."
83306040100-17 = "Primeiro, me mostre o local."
