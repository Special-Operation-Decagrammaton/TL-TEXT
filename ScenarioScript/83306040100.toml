[translation]
83306040100-6 = "あ、あぁ……うう……どうしたら……"
83306040100-7 = "ん？どうしたの？"
83306040100-8 = "い、委員長！？ど、どうしてこちらに……！"
83306040100-9 = "念のため、見回りをしておこうと思って。"
83306040100-10 = "それで……何か問題が発生したの？"
83306040100-11 = "そ、それが…………"
83306040100-12 = "も、申し訳ありません！少し目を離している隙に、温泉開発部の部長が姿を消してしまい……！"
83306040100-13 = "ほ、ほほ、本当に申し訳――"
83306040100-14 = "謝らなくて大丈夫。大切なのは、その次の行動よ。"
83306040100-15 = "い、委員長……！"
83306040100-16 = "……相手は温泉開発部の部長。あなたに任せきりにしていた私も悪かった。"
83306040100-17 = "まずは現場を見せてちょうだい。"
