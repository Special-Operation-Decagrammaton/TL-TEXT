[translation]
101030-1 = "第3話;日常の亀裂（１）"
101030-2 = "アビドス砂漠・発掘区域"
101030-5 = "み、見つかりました！"
101030-6 = "見つかったのか？"
101030-7 = "は、はい！例の座標から、約135m×23m×13mの構造体を発見しました……！！ "
101030-8 = "間違いない……！至急、ジェネラルに報告せよ！大至急だ！"
101030-9 = "は、はい！！"
101030-10 = "あと、連邦生徒会の防衛室にも連絡しておけ。#nそちらは専用の通信網でな。"
101030-11 = "はい！"
101030-16 = "アビドス市街地"
101030-17 = "……。"
101030-23 = "急げ、移動するぞ！"
101030-24 = "はっ！"
101030-29 = "カイザーPMC……。"
101030-35 = "PMCの兵力が、砂漠の方に移動してた？"
101030-36 = "ん。今までとは全然規模が違った。 "
101030-37 = "ふ～ん、何かあったのかな？#nあいつら最近静かだったのにね。"
101030-38 = "ここ数日、あちこちでカイザーPMCが移動しているのを見ました……。"
101030-39 = "あいつら、他人の自治区で好き勝手して！ほんと許せない。"
101030-40 = "アビドス砂漠で何かあったのでしょうか？"
101030-41 = "こっそり見に行ってみる？"
101030-42 = "シロコちゃん、それはちょっと……"
101030-43 = "あそこはカイザーの土地だから、勝手に行ったら怒られちゃうよ～。#n前もそれで揉めたじゃん？"
101030-44 = "ん……。"
101030-45 = "そうだ、先生に相談してみましょう！"
101030-49 = "そうしたいのはやまやまですが……最近、お忙しいみたいで……#n連絡したら、迷惑をかけてしまわないでしょうか？"
101030-50 = "迷惑かどうかは先生が決める事じゃないの？"
101030-51 = "そうですよアヤネちゃん。連絡する前から決めてしまっては、先生も何もできませんし……それに、先生ならきっと手伝ってくれます☆"
101030-52 = "ん。それに、この間先生から連絡きたばっかだし。"
101030-53 = "先生からですか？先輩に？"
101030-54 = "シロコ先輩がスタンプ爆撃でもしたからじゃないの？"
101030-55 = "いや、今回は違う。#n先生の方から。"
101030-56 = "そりゃシロコちゃんだってスタ爆ばっかじゃないでしょ～"
101030-60 = "もう、先輩がそうやっていつも甘やかすから！"
101030-61 = "うーん……そうかなぁ～？"
101030-62 = "んー……。"
101030-63 = "まぁまぁ、シロコちゃんはそういう所が可愛いんですから☆"
101030-64 = "あはは……それで、先生は何と？"
101030-65 = "特に何も……。#nただ、最近元気？とか、無事？とか……そんな感じの内容。"
101030-66 = "へぇ……それはそれで、なんだか素っ気ないねぇ。"
101030-67 = "とりあえず、私が先生に連絡してみますね。#n一度アビドスに来ていただけないか、と。"
101030-68 = "そうですね☆アヤネちゃん、お願いします！"
101030-73 = "ミレニアム・ゲーム開発部部室"
101030-75 = "お姉ちゃん、これはダメだよ。"
101030-76 = "え、なんで！？"
101030-77 = "私たちが作ってるのは「剣と魔法のRPG」でしょ？"
101030-78 = "そうだけど……それがどうしたの？"
101030-79 = "どうしたの？じゃないよ……なんで主人公が宇宙戦艦に乗ってるの？"
101030-80 = "敵が宇宙海賊だからね！それなら主人公は宇宙戦艦に乗らないと！"
101030-81 = "勇者が宇宙戦艦に乗ってどうするのさ……"
101030-83 = "なんで！宇宙勇者だよ！？良いじゃん！ "
101030-87 = "ユズはどう思う？"
101030-88 = "わ、わたしは……悪く、ないと思う……#n最近流行ってるダダイスムみたいな感じで……。"
101030-89 = "ほら！ユズもこれはイケるって！"
101030-90 = "ええ……。"
101030-95 = "「宇宙勇者」は素晴らしいと思います！"
101030-96 = "アリスちゃん？"
101030-97 = "アリス！おかえり！大丈夫だった！？"
101030-98 = "エンジニア部はなんて……？"
101030-99 = "簡単な身体検査とメディカルチェックをしましたが、特に異常はなかったそうです。"
101030-100 = "それと、ヴェリタスのみなさんが、定期的に検査をしようと仰ってくださったので、そうすることになりました。"
101030-101 = "そ、そうなんだ……じゃあアリスちゃんは、もう大丈夫なんだね？"
101030-102 = "あの時の変なヤツ……何だっけ、ケイ……だっけ？#nあいつは？"
101030-103 = "ケイじゃなくて「[ruby=キー]＜Key＞[/ruby]」じゃないかな、お姉ちゃん……。"
101030-104 = "名前なんて分かればなんでもいいよ！"
101030-105 = "はい。「ケイ」は発見できませんでした。 "
101030-106 = "結局「ケイ」でいくの？#n……まあ、いっか。"
101030-107 = "今のエンジニア部の技術では「ケイ」が消えたのかどうか確認できないようです。#nなので、ヴェリタスと協力してみるそうです！"
101030-109 = "そっか……。"
101030-110 = "あいつ、アリスを勝手に王女だか何かにしようとして！も～！#n次会ったらタダじゃおかないんだから！"
101030-111 = "アリスちゃんは、いいの……？"
101030-112 = "はい、アリスは問題ありません。#n今度「ケイ」に会ったら300%……いや10万%ビーム砲を発射します！"
101030-116 = "あと、アリスも宇宙勇者は素晴らしいと思います。#n宇宙戦艦に乗る勇者パーティー！素敵です！"
101030-117 = "でしょでしょ？こう、胸に響くものがあるよね。#nなんたって、宇宙戦艦はロマンだから！"
101030-118 = "アリスもいつか、宇宙戦艦に乗ることができるでしょうか？"
101030-119 = "そ、それはちょっと無理じゃないかな……。"
101030-120 = "えっ？でもなんかエンジニア部がそういうの作ってなかった？#nアリスのレールガンもその一つだったよね？"
101030-121 = "今の技術では、難しいよ……ロマンだから、みんな挑戦してるんだし……。"
101030-122 = "そうなの！？"
101030-123 = "不可能に挑戦するのは素晴らしいです！#nそれが、ロマンなんですね！アリスは理解しました。"
101030-124 = "よし！そういうわけで、次回作は宇宙勇者パーティーのスペースオペラもので決まりっ！"
101030-125 = "はい！素晴らしいです！"
101030-126 = "じゃ、じゃあ、ジャンルも弾幕シューティングに変えよっか……。#nすっごいハードな難易度で、コンティニューもスペシャルボムも無い――"
101030-132 = "はぁ……やっぱりこうなっちゃった。"
101030-135 = "……。"
101030-136 = "「ケイ」……"
101030-137 = "王女よ……あなたは自分の存在理由である「王女」を否定し……#n私の存在理由である「鍵」をも否定するのですか。"
101030-138 = "存在理由を失った鍵は、もはや鍵ではない……そう呼ばれる必要もないように。"
101030-142 = "……分かりました。 "
101030-143 = "それならば、私はあなたを見守る事とします。#n王女……いえ、「アリス」。"
101030-144 = "しかし、誰も存在理由から逃れることはできません。#nアリス、それが私たちが迎える運命です。"
101030-148 = "そして然るべき時が来たら……私は――"
101030-151 = "セミナー・執務室 "
101030-153 = "ふむ……。"
101030-154 = "――面倒事を全て私に押し付けるのですね、リオ。"
101030-155 = "「名もなき神」の遺産に手をつけた挙げ句、計画が破綻した途端、「後は頼む」――だなんて。"
101030-156 = "どのような事件を起こしたとしても、#n堂々としてこそ「ビッグシスター」の名に相応しいと思いますけど……"
101030-157 = "まあ……新雪のように高潔で、清水の如く透き通る私ですから、#nあなたのそんな我儘だって理解して差し上げましょう。"
101030-158 = "さて……あなたは、私に何を伝えたかったのでしょうか。"
101030-159 = "……。 "
101030-160 = "…………。"
101030-161 = "これは――"
101030-162 = "なるほど……仮説に推測を加えた解釈ではありますが……"
101030-163 = "これほどのデータを確保したのであれば……#nあなたのその偏執的とも言える妄想も、少しは理解できそうです。"
101030-164 = "さすがは、ビッグシスター、といったところでしょうか……"
101030-165 = "……まあ、だとしても「全知」と呼ばれる超天才病弱美少女の私の方が、優れているのですけどね。"
101030-166 = "それは部長が勝手に言ってるだけでしょ。"
101030-170 = "ひゃっ……！？#nエ、エイミ、いつから……"
101030-171 = "新雪がどうとか言ってた辺りから？"
101030-172 = "……。"
101030-173 = "特異現象捜査部は、元々リオ会長の直属組織でしょ。#n私もこの場所は知ってるよ。"
101030-174 = "それで、会長はなんて？"
101030-175 = "そうですね……重要な情報は厳重なセキュリティ下にあるので、確認に時間がかかるとは思いますが……"
101030-176 = "要約すると、「別の『特異現象』に備えろ」――と。"
101030-177 = "どういうこと？"
101030-178 = "――これはビッグシスターからの警告です。"
101030-179 = "近い将来――キヴォトスに未曾有の危機が訪れるでしょう。"
101030-180 = "……。"
101030-182 = "――私は、何をすれば良いでしょうか？"
101030-186 = "ひゃあっ……！？い、いつから……！？"
101030-187 = "会長の専属メイドの……トキ……？ "
101030-188 = "お二人がここにいらっしゃる少し前からです。#nここは隠れられる場所が多いので。"
101030-189 = "へえ、さすがはエージェント。全然気付かなかった。 "
101030-190 = "てっきり会長についていったんだと思ってたけど。"
101030-191 = "いえ。会長は、私に「これからは自由に暮らしなさい」と残して去りました。"
101030-192 = "ですが、何をどう自由にすればいいのか……私には分からず……"
101030-193 = "そうして、会長と過ごしたこの場所にいたらお二人が現れたのです。"
101030-194 = "ふむ……。"
101030-196 = "元はC&Cの所属ですから、そちらに身を寄せることになったと聞きましたが……断られたのでしょうか？"
101030-197 = "いえ、先輩方には良くしていただいております。"
101030-198 = "……？"
101030-199 = "ですが……その、 "
101030-200 = "……。"
101030-201 = "……なるほど。おおよその状況は理解できました。 "
101030-203 = "……。"
101030-204 = "意外と可愛いところがあるのですね、トキは。"
101030-205 = "もしも……何か危機が迫っているのでしたら、私もお力になりたいです。#nそれがどのような事態であろうと。"
101030-206 = "……どうする、部長？"
101030-207 = "答えなど明白でしょう、エイミ？#n協力者は多ければ多いほど良いものですよ。"
101030-208 = "……ありがとうございます。"
101030-209 = "さて、これからですが――"
101030-210 = "――まずは「シャーレ」の協力を仰ぎましょう。"
101030-211 = "やっぱ、そうだよね。"
101030-212 = "……。"
101030-214 = "次回;日常の亀裂（２）"
