101030-95 = "Eu acho “Space Hero” maravilhoso!"

101030-96 = "Alice?"

101030-97 = "Alice! Bem vindo de volta! Estava tudo bem! ?"

101030-98 = "E o departamento de engenharia...?"

101030-99 = "Um exame físico simples e um exame médico foram realizados, mas nenhuma anormalidade foi encontrada."

101030-100 = "Além disso, todos na Veritas me disseram para fazer inspeções regulares, então decidi fazer isso."

101030-101 = "Entendo… Então Alice-chan está bem agora, certo?"

101030-102 = "Aquele cara estranho naquela época... O que foi, Kei...? #nE ele?"

101030-103 = "Eu acho que é ``'' em vez de Kei, mana..."

101030-104 = "Qualquer coisa está bem, desde que você saiba o nome!"

101030-105 = "sim. \"Kei\" não foi encontrado."

101030-106 = "Afinal, irei com “Kei”? #n...Bem, eu acho."

101030-107 = "Parece que com a tecnologia atual do departamento de engenharia não é possível confirmar se “Kei” desapareceu ou não. #n, então eles tentarão cooperar com a Veritas!"

101030-109 = "Eu vejo..."

101030-110 = "Ele estava tentando fazer de Alice uma princesa ou algo assim! Também! #nDa próxima vez que nos encontrarmos, não será de graça!"

101030-111 = "Alice está bem...?"

101030-112 = "Sim, Alice está bem. #nNa próxima vez que eu encontrar \"Kei\", dispararei um canhão de 300%... não, 100.000% de canhão de raio!"

101030-116 = "Além disso, acho Alice e o herói espacial maravilhosos. #n Festa do herói a bordo do navio de guerra espacial! É maravilhoso!"

101030-117 = "Certo? Há algo aqui que toca meu coração. #nAfinal, os navios de guerra espaciais são românticos!"

101030-118 = "Alice poderá embarcar em um navio de guerra espacial algum dia?"

101030-119 = "Bem, acho que isso é um pouco impossível..."

101030-120 = "Huh? Mas o departamento de engenharia não fez algo assim? A arma elétrica de #nAlice era uma delas, certo?"

101030-121 = "Com a tecnologia de hoje é difícil... É romântico, então todo mundo está tentando..."

101030-122 = "Isso mesmo! ?"

101030-123 = "É ótimo tentar o impossível! #nÉ disso que se trata o romance! Alice entendeu."

101030-124 = "OK! Por isso o próximo trabalho será uma ópera espacial sobre a Space Hero Party!"

101030-125 = "sim! Incrível!"

101030-126 = "Pois bem, acho que vou mudar o gênero para bullet hell shooting... #n Dificuldade muito difícil, sem continuações ou bombas especiais."

101030-132 = "Suspiro... foi isso que aconteceu afinal."

101030-135 = "……."

101030-136 = "\"Kei\"..."

101030-137 = "Princesa...você nega a ``princesa'' que é a razão da sua existência...#nVocê também está negando a ``chave'' que é a razão da minha existência?"

101030-138 = "Uma chave que perdeu a razão de existir não é mais uma chave... não há necessidade de chamá-la assim."

101030-142 = "……Entendido."

101030-143 = "Nesse caso, ficarei de olho em você. #nPrincesa...não, \"Alice\"."

101030-144 = "Mas ninguém pode escapar da razão da existência. #nAlice, esse é o nosso destino."

101030-148 = "E quando chegar a hora certa... eu..."

101030-151 = "Seminário/Escritório"

101030-153 = "Hum..."

101030-154 = "-Você está colocando todos os problemas em mim, Rio."

101030-155 = "Depois de tentar o legado de um “deus sem nome”, no momento em que seu plano desmorona, ele diz: “Eu cuidarei do resto”."

101030-156 = "Não importa que tipo de incidente ela tenha causado, acho que ela merece o nome de “Irmã mais velha”, desde que tenha orgulho…"

101030-157 = "Bem...sou tão nobre quanto a neve fresca e tão claro quanto a água doce, então entenderei seu egoísmo."

101030-158 = "Agora... o que você queria me dizer?"

101030-159 = "……."

101030-160 = "…………."

101030-161 = "isso é--"

101030-162 = "Entendo... esta é uma interpretação que acrescenta especulação à hipótese..."

101030-163 = "Se tivermos protegido tantos dados... #nAcho que posso entender um pouco seus delírios paranóicos."

101030-164 = "Como esperado de uma irmã mais velha..."

101030-165 = "...Bem, mesmo que seja esse o caso, eu, uma garota supergênio e linda doentia que é conhecida como “onisciência”, sou melhor do que eu."

101030-166 = "Isso é exatamente o que o gerente está dizendo."

101030-170 = "Ei...! ? #nE, Amy, desde quando..."

101030-171 = "Pelo que você disse sobre neve fresca?"

101030-172 = "……."

101030-173 = "O Departamento de Investigação de Fenômenos Peculiares era originalmente uma organização sob o controle direto do Presidente Rio. #nEu também conheço esse lugar."

101030-174 = "Então e o presidente?"

101030-175 = "Bem... informações importantes estão sob estrita segurança, então acho que levará algum tempo para serem confirmadas..."

101030-176 = "Em suma, ``Esteja preparado para outro ``fenómeno singular''''."

101030-177 = "O que você quer dizer?"

101030-178 = "--Este é um aviso da Big Sister."

101030-179 = "Num futuro próximo, uma crise sem precedentes chegará a Kivotos."

101030-180 = "……."

101030-182 = "--O que devo fazer?"

101030-186 = "Eiaaaa...! ? Desde quando...! ?"

101030-187 = "A empregada pessoal do presidente... Toki...?"

101030-188 = "Já faz um tempo que vocês dois não estiveram aqui. #nHá muitos lugares para se esconder aqui."

101030-189 = "Ei, como esperado de um agente. Eu não percebi nada."

101030-190 = "Achei que ele estava claramente seguindo o presidente."

101030-191 = "lar. O presidente saiu e me deixou a mensagem: “De agora em diante, você pode viver livremente”."

101030-192 = "Porém, não sei o que fazer e como libertá-lo..."

101030-193 = "Aí, enquanto eu estava neste lugar onde passava um tempo com o presidente, apareceram os dois."

101030-194 = "Hum..."

101030-196 = "Eu era originalmente afiliado à C&C, então ouvi dizer que você decidiu se juntar a eles... Será que você foi rejeitado?"

101030-197 = "Não, fui bem tratado pelos meus superiores."

101030-198 = "...?"

101030-199 = "Mas... isso..."

101030-200 = "……."

101030-201 = "……Eu vejo. Eu entendo a situação geral."

101030-203 = "……."

101030-204 = "Toki tem um lado surpreendentemente fofo."

101030-205 = "Se... houver uma crise se aproximando, eu também gostaria de ajudar. #nNão importa qual seja a situação."

101030-206 = "...O que devemos fazer, chefe?"

101030-207 = "A resposta é óbvia, não é, Amy? #nQuanto mais colaboradores você tiver, melhor."

101030-208 = "……obrigado."

101030-209 = "Bom, de agora em diante..."

101030-210 = "--Primeiro, vamos pedir a cooperação da Placa de Petri."

101030-211 = "Claro, isso mesmo."

101030-212 = "……."

101030-214 = "Da próxima vez: Rachaduras na vida cotidiana (2)"

