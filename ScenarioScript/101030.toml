101030-49 = "Eu realmente quero fazer isso, mas você parece estar ocupado ultimamente...#nSe eu entrar em contato com você, isso não causará problemas?"

101030-50 = "Não cabe ao professor decidir se isso é um incômodo ou não?"

101030-51 = "Isso mesmo, Ayane-chan. Se você decidir antes de entrar em contato comigo, o professor não poderá fazer nada...e tenho certeza que o professor irá te ajudar☆"

101030-52 = "sim. Além disso, acabei de receber uma ligação da professora outro dia."

