101030-78 = "Sim, mas... o que aconteceu com isso?"

101030-79 = "o que aconteceu? Não...por que o personagem principal está em um navio de guerra espacial?"

101030-80 = "Porque o inimigo é um pirata espacial! Nesse caso, o personagem principal terá que pilotar um navio de guerra espacial!"

