[translation]
101030-1 = "Episódio 3; Rachaduras no Cotidiano (1)"
101030-2 = "Deserto de Abydos, Área de Escavação"
101030-5 = "E-Encontramos!"
101030-6 = "Encontraram?"
101030-7 = "S-Sim! Daquela coordenada, descobrimos uma estrutura de aproximadamente 135m x 23m x 13m...!!"
101030-8 = "Com certeza...! Relate isso para o General imediatamente! Agora mesmo!"
101030-9 = "S-Sim!!"
101030-10 = "E, não se esqueça de contatar a Secretaria de Defesa do Conselho Estudantil Geral.#nUse a rede de comunicações dedicada pra isso."
101030-11 = "Entendido!"
101030-16 = "Área Urbana de Abydos"
101030-17 = "......"
101030-23 = "Se apressem, vamos nos mover!"
101030-24 = "Certo!"
101030-29 = "A Kaiser PMC..."
101030-35 = "As forças da PMC se deslocaram pro deserto?"
101030-36 = "Sim. Numa escala completamente diferente da de antes."
101030-37 = "Hum, será que aconteceu alguma coisa?#nEles tavam tão quietinhos ultimamente."
101030-38 = "Eu também tenho visto o pessoal da Kaiser PMC se movendo pra todo lado nesses últimos dias..."
101030-39 = "Eles agem como se fossem os donos do nosso distrito autônomo! Eu não suporto mais isso."
101030-40 = "Será que aconteceu algo no Deserto de Abydos?"
101030-41 = "A gente deveria ir lá dar uma espiada?"
101030-42 = "Shiroko-chan, acho que isso não é uma boa ideia..."
101030-43 = "Aquele terreno é da Kaiser, a gente vai se encrencar se for lá sem permissão~.#nJá não tivemos problemas o suficiente com eles antes?"
101030-44 = "Hum..."
101030-45 = "Ah, já sei, vamos falar com o Sensei!"
101030-49 = "Eu também acho que devíamos fazer isso, mas... O Sensei parece estar tão ocupado ultimamente...#nSerá que não estaríamos sendo um incômodo?"
101030-50 = "Acho que isso é ele quem decide, não é não?"
101030-51 = "Isso mesmo, Ayane-chan. O Sensei não poderá fazer nada se desistirmos antes mesmo de entrar em contato... Além disso, o Sensei com certeza vai nos ajudar☆"
101030-52 = "É. Além disso, ele nos contatou há pouco tempo."
101030-53 = "Ele mandou uma mensagem? Para você?"
101030-54 = "Não seria por que você mandou um monte de figurinhas pra ele de novo?"
101030-55 = "Não, dessa vez foi diferente.#nO Sensei quem mandou primeiro."
101030-56 = "Eu duvido muito que a Shiroko-chan mande *apenas* chuva de figurinhas pra ele~."
101030-60 = "Nossa, você sempre a mimando, Hoshino-senpai!"
101030-61 = "Hmm... Será que é isso mesmo~?"
101030-62 = "Hum..."
101030-63 = "Calma, calma. A Shiroko-chan é tão fofa quando age assim☆"
101030-64 = "Ahaha... E então, o que o Sensei disse?"
101030-65 = "Nada de especial...#nSó um \"Como vocês estão ultimamente?\", ou \"Tudo bem?\"... Esse tipo de coisa."
101030-66 = "Ué... E-Isso é tão sem graça, não acha?"
101030-67 = "Vou entrar em contato com o Sensei e pedir que venha a Abydos se puder."
101030-68 = "Isso mesmo☆ Contamos com você, Ayane-chan!"
101030-73 = "Millennium, Sala do Clube de Desenvolvimento de Jogos"
101030-75 = "Onee-chan, não dá pra ser assim."
101030-76 = "Eh, por que não!?"
101030-77 = "O jogo que a gente tá fazendo é um 'RPG de Espada e Magia', esqueceu?"
101030-78 = "Eu sei, mas... O que que tem?"
101030-79 = "O que que tem? não... Por que o protagonista tá numa nave espacial?"
101030-80 = "Porque o inimigo é um pirata espacial! Então o protagonista precisa estar numa nave espacial!"
101030-81 = "O que um herói iria querer com uma nave espacial..."
101030-83 = "Por quê!? Ele é um Herói Espacial! Eu acho ótimo!"
101030-87 = "O que você acha disso, Yuzu?"
101030-88 = "E-Eu acho... que não é tão ruim assim...#nTem aquela vibe do Dadaísmo que tá na moda ultimamente e..."
101030-89 = "Viu! A Yuzu também disse que tem potencial!"
101030-90 = "Poxa vida..."
101030-95 = "Eu acho que a ideia do 'Herói Espacial' é maravilhosa!"
101030-96 = "Aris-chan?"
101030-97 = "Aris! Bem-vinda de volta! Você tá bem!?"
101030-98 = "O que o pessoal do Clube de Engenharia disse...?"
101030-99 = "Eles me deram exames físicos e médicos básicos, mas parece que estava tudo normal comigo."
101030-100 = "Além disso, as garotas da Veritas me falaram para fazer um exame de rotina, então decidi aceitar."
101030-101 = "A-Aham... então a Aris-chan já está melhor?"
101030-102 = "E o que aconteceu com aquela esquisitona... Qual era o nome dela mesmo, Kei...?"
101030-103 = "Talvez não seja Kei, mas sim '<Key>', Onee-chan..."
101030-104 = "Qualquer um dos dois tá bom pra mim!"
101030-105 = "Sim. A 'Kei' não pôde ser encontrada."
101030-106 = "No fim vamos de 'Kei' mesmo?#n...Bom, tanto faz."
101030-107 = "Parece que com a tecnologia atual do Clube de Engenharia não dá para saber se a 'Kei' desapareceu ou não.#nPor isso que vão colaborar com o pessoal da Veritas!"
101030-109 = "Entendo..."
101030-110 = "Ela que não invente de querer transformar a Aris numa princesa de novo! Nossa!#nEu não vou deixar barato da próxima vez que eu vir ela!"
101030-111 = "Aris-chan, tudo bem por você...?"
101030-112 = "Sim, para a Aris, não há problemas.#nSe a Aris se deparar com a 'Kei' de novo, a Aris usará 300%... não, 100.000% da arma de raio!"
101030-116 = "Aliás, a Aris também acha que o Herói Espacial é incrível.#nUm grupo de heróis voando em uma nave espacial! Que demais!"
101030-117 = "Né não? Isso meio que faz seu coração palpitar!#nAfinal, a nave espacial é um romance puro!"
101030-118 = "A Aris poderá pilotar uma nave espacial algum dia?"
101030-119 = "A-Acho que isso é meio impossível, não é..."
101030-120 = "Hein? Mas o Clube de Engenharia não tava fazendo algo do tipo?#nA arma de trilho da Aris é um deles, não é?"
101030-121 = "Com a tecnologia atual... acho que é bem complicado... O romance é que todos estão tentando alcançar isso..."
101030-122 = "Sério!?"
101030-123 = "Tentar algo impossível é maravilhoso!#nÉ isso que é romance! A Aris compreendeu agora."
101030-124 = "Beleza! O nosso próximo jogo será uma ópera espacial com um grupo de Heróis Espaciais!"
101030-125 = "Sim! É esplêndido!"
101030-126 = "B-Bom, por que não mudamos o gênero pra um Shoot 'em up então...#nDaqueles beeem hardcore, sem continues ou bombas especiais..."
101030-132 = "Haaa... No fim das contas, a gente sempre volta pra isso."
101030-135 = "......"
101030-136 = "'Kei'..."
101030-137 = "Princesa... você nega ser a 'princesa', o seu motivo de existir...#ne também nega a mim, a 'Chave', o meu motivo de existir."
101030-138 = "A chave que perde a sua razão de ser, já não é uma chave... e nem mais precisa ser chamada assim."
101030-142 = "......Entendido."
101030-143 = "Nesse caso, eu continuarei a observar.#nPrincesa... não, 'Aris'."
101030-144 = "No entanto, ninguém pode fugir do seu motivo de existir.#nAris, esse é o destino que a aguarda."
101030-148 = "E quando o momento certo chegar... Eu――"
101030-151 = "Seminário, Escritório"
101030-153 = "Humm..."
101030-154 = "――Você sempre joga as coisas difíceis para mim, não é mesmo, Rio."
101030-155 = "Mexer no legado do 'Deus Sem Nome' e, no instante em que o seu plano dá errado, sair dizendo: 'O resto fica com você'――Sério, o que eu devo achar disso."
101030-156 = "O nome de 'Big Sister' exige que você se comporte com orgulho, independente do tipo de problema que você crie..."
101030-157 = "Bem... Eu, sendo pura como a neve recém-caída e límpida como água pura,#tentarei ao menos entender a sua arrogância."
101030-158 = "Agora... o que você queria me dizer."
101030-159 = "...... "
101030-160 = "............"
101030-161 = "Isso é――"
101030-162 = "Entendo... Embora seja uma teoria baseada em especulações..."
101030-163 = "Se for para adquirir uma quantidade de dados como essa...#nAcho que até eu consigo compreender as suas paranoias extremas e absurdas."
101030-164 = "Como o esperado da Big Sister..."
101030-165 = "......Apesar de que eu, a genial jovem doente de quem chamam de 'A Onisciente', sou muito melhor do que você."
101030-166 = "Você que tá chamando de si mesma de doente, Ministra."
101030-170 = "Hyaaa...!?#nE-Eimi, desde quando você tá aí..."
101030-171 = "Foi quando você tava falando alguma coisa de neve ou algo assim?"
101030-172 = "......"
101030-173 = "A Divisão de Investigação de Fenômenos Singulares operava sob as ordens da própria Presidente Rio.#nEu também conheço esse lugar."
101030-174 = "Então, o que a Presidente disse?"
101030-175 = "Pois bem... Eu vou demorar um pouco para verificar porque a maioria das informações importantes estão muito bem protegidas, mas..."
101030-176 = "Em resumo: 'Preparem-se para um outro 'Fenômeno Singular''――Foi isso que ela disse."
101030-177 = "O que quer dizer com isso?"
101030-178 = "――Este é um aviso da Big Sister."
101030-179 = "No futuro próximo――Uma catástrofe sem precedentes abaterá Kivotos."
101030-180 = "......"
101030-182 = "――O que eu deveria fazer?"
101030-186 = "Hyaah...!? E-E desde quando você... !?"
101030-187 = "A serva exclusiva da Presidente... Toki...?"
101030-188 = "Um pouco antes de vocês duas aparecerem.#nTem muitos lugares bons para se esconder aqui."
101030-189 = "Uau, que espiã de classe mundial. Eu nem me toquei."
101030-190 = "Achei que ela tivesse fugido com a Presidente."
101030-191 = "Não. A Presidente saiu dizendo: 'A partir de agora, viva como quiser'."
101030-192 = "Mas eu não sei o que isso significa... o que eu deveria fazer..."
101030-193 = "Então, eu fiquei aqui de bobeira neste lugar que passei com a Presidente, e vocês duas chegaram."
101030-194 = "Humm..."
101030-196 = "Ouvi dizer que você faria parte da C&C de volta por conta do seu antigo posto com elas... Elas te rejeitaram?"
101030-197 = "Não, muito pelo contrário. As veteranas estão me tratando muito bem."
101030-198 = "......?"
101030-199 = "Mas... hum... "
101030-200 = "......"
101030-201 = "......Entendo. Compreendo mais ou menos o que tá acontecendo. "
101030-203 = "......"
101030-204 = "Você até que tem um lado fofo e carinhoso, né, Toki."
101030-205 = "Se houver... qualquer tipo de perigo que se aproxima, eu também quero ajudar.#nIndependentemente da situação."
101030-206 = "......E então, Ministra, o que faremos?"
101030-207 = "A resposta é óbvia, não acha, Eimi?#nQuanto mais aliados tivermos, melhor."
101030-208 = "......Agradeço."
101030-209 = "Agora, em relação ao que devemos fazer em seguida――"
101030-210 = "――Para começar, procuraremos pela ajuda da 'Schale'."
101030-211 = "Sim, bem que imaginei."
101030-212 = "......"
101030-214 = "Próximo Episódio; Rachaduras no Cotidiano (2)"