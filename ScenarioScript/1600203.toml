[translation]
1600203-1 = "私に尋ねてくれたのは正解です！"
1600203-2 = "……。"
1600203-4 = "あ、おはようございます先生！今日も良い天気ですね！"
1600203-6 = "……って、もう夜でしたね、あはは……。"
1600203-7 = "[s1] \"……元気無さそうだね。\"\n[s2] \"何かあったの？\""
1600203-8 = "え、あ、いえ、何でもありません。特に何も……。"
1600203-9 = "え、あ、いえ、何でもありません。特に何も……。"
1600203-10 = "ただ、いつもみたいに説明してあげようとしたら、逃げられてしまって……。"
1600203-11 = "ここまで含めて、いつものことです。あはは……。"
1600203-12 = "でも、そういえば今週は一度もきちんと最後まで説明してなかったなって思いまして。"
1600203-13 = "いつもなかなか最後まで聞いてくれる人がいないと思っていたのですが、もしかしたら……"
1600203-14 = "本当は、そもそも私の説明なんて誰も最初から聞きたいと思ってなかったのかなって。"
1600203-15 = "つい、そんなことを思ってしまいまして。いくらあれこれたくさん調べて、知識を蓄えていても……。"
1600203-16 = "それは何の意味も無いことだったのかもって思ったら、ちょっとだけ凹んでしまいました……。"
1600203-17 = "決して誰かを不快にしたり、自慢がしたくて説明していたわけではなくって……。"
1600203-18 = "私はただ、先生みたいに……あんな風になりたいなって、思っていただけなのですが。"
1600203-19 = "……。"
1600203-20 = "やっぱり、ちょっとおしゃべりが過ぎたのかもしれませんね。あはは……。"
1600203-21 = "そうとなれば、こういうのは意識的に抑えないと……。"
1600203-22 = "[s] \"……\""
1600203-24 = "[s] \"コンビーフの缶詰って、何であんな形なんだろうね？\""
1600203-25 = "……え？"
1600203-26 = "コンビーフの缶詰……どうしていきなりそんな……？"
1600203-27 = "[s3] \"この前は忙しくて、最後まで聞けなかったから。\"\n[s4] \"前からずっと気になってたから。\""
1600203-28 = "この前……？最後まで聞けなかったって……。"
1600203-29 = "前から……？どうして缶詰が……。"
1600203-30 = "……あっ。"
1600203-31 = "……っ！"
1600203-32 = "な、なるほど！気になってたんですね！そういうことでしたか～！"
1600203-33 = "あはは！そういうことでしたら、私に尋ねてくれたのは正解です！それはですね……！"
1600203-34 = "元々は食べ物を腐らせないためにシャンパンの瓶に食べ物を入れていまして、コルクで栓をしていたのですが熱を持って瓶が収縮する時に問題が……"
1600203-38 = "（急に目に光が戻ったコトリは、その後一時間近く休むことなく話し続けた）"
1600203-39 = "（そうやって時間が過ぎていくに従って、楽しい脇道へと逸れたりしながら、コトリは活気を取り戻していった）"
1600203-41 = "……というわけで、コンビーフの缶詰は基本的に他の缶詰とは違って台形で作られ、上ではなく下に蓋がある形になったんです！！そもそもそこに至る経緯では……"
1600203-42 = "……経緯では……。"
1600203-43 = "……。"
1600203-44 = "[s] \"……コトリ？\""
1600203-45 = "……。"
1600203-46 = "先生、あの……もしかして……。"
1600203-47 = "い、いえ、やっぱりなんでもありません！なんでもないことはないのですが……！えっと……！"
1600203-48 = "た、ただもしかして、もしかしてわざと聞いてくれたのかな、なんて……私のことを思ってとか、まさかとは思いつつ、その……！"
1600203-49 = "……。"
1600203-50 = "……えへへ。"
1600203-51 = "……ありがとうございます、先生。"
1600203-53 = "（そうやって優しく微笑んだ後、また何も無かったかのようにコトリは元通りのテンションで説明を続けた）"
1600203-54 = "（その後、コトリが満足するまでふたりで話してから、シャーレに戻った）"
