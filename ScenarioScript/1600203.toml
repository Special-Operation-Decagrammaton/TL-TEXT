[translation]
1600203-1 = "Você acertou em cheio ao me perguntar!"
1600203-2 = "……."
1600203-4 = "Ah, bom dia, Sensei! O tempo está ótimo hoje, não é?"
1600203-6 = "……Quer dizer, já é noite, não é? Ahaha……."
1600203-7 = "[s1] \"……Você parece desanimada.\" \n[s2] \"Aconteceu alguma coisa?\""
1600203-8 = "Eh, ah, não, não é nada. Nada em especial……."
1600203-9 = "Eh, ah, não, não é nada. Nada em especial……."
1600203-10 = "É só que, quando tentei explicar as coisas como sempre faço, acabaram fugindo de mim……."
1600203-11 = "Isso, incluindo tudo até aqui, é o de sempre. Ahaha……."
1600203-12 = "Mas, pensando bem, percebi que esta semana não consegui terminar nenhuma explicação direito."
1600203-13 = "Eu sempre achei que as pessoas não ouviam até o fim, mas talvez……"
1600203-14 = "Na verdade, talvez ninguém nunca tenha tido vontade de ouvir minhas explicações desde o começo."
1600203-15 = "Acabei pensando nisso. Não importa o quanto eu pesquise e acumule conhecimento……."
1600203-16 = "Ao pensar que talvez isso não tenha significado nenhum, fiquei um pouco para baixo……."
1600203-17 = "Eu nunca quis incomodar ninguém ou me gabar com minhas explicações……."
1600203-18 = "Eu só queria ser como você, Sensei…… ser alguém como você."
1600203-19 = "……."
1600203-20 = "Acho que acabei falando demais, como sempre. Ahaha……."
1600203-21 = "Se é assim, preciso controlar isso conscientemente……."
1600203-22 = "[s] \"……\""
1600203-24 = "[s] \"Por que será que as latas de carne enlatada têm aquele formato?\""
1600203-25 = "……Eh?"
1600203-26 = "Latas de carne enlatada…… por que de repente isso……?"
1600203-27 = "[s3] \"Da última vez eu estava ocupado e não consegui ouvir até o fim.\" \n[s4] \"Eu sempre tive curiosidade sobre isso.\""
1600203-28 = "Da última vez……? Não conseguiu ouvir até o fim……."
1600203-29 = "Sempre……? Por que uma lata……."
1600203-30 = "……Ah."
1600203-31 = "……!"
1600203-32 = "E-entendo! Você estava curioso! Era isso então!"
1600203-33 = "Ahaha! Se é esse o caso, você acertou em cheio ao me perguntar! É o seguinte……!"
1600203-34 = "Originalmente, para evitar que os alimentos estragassem, eles eram colocados em garrafas de champanhe e selados com rolhas, mas quando o calor fazia a garrafa contrair, surgiam problemas……"
1600203-38 = "(Kotori, com o brilho retornando aos olhos de repente, continuou falando sem parar por quase uma hora)"
1600203-39 = "(À medida que o tempo passava, desviando para assuntos paralelos divertidos, Kotori foi recuperando sua energia)"
1600203-41 = "……E é por isso que as latas de carne enlatada, diferentemente das outras, são feitas em formato trapezoidal e com a tampa na parte de baixo, e não em cima!! E sobre o histórico de como chegamos a isso……"
1600203-42 = "……o histórico……."
1600203-43 = "……."
1600203-44 = "[s] \"……Kotori?\""
1600203-45 = "……."
1600203-46 = "Sensei, hum…… será que……."
1600203-47 = "N-não, esquece, não é nada! Bem, não é que não seja nada, mas……! Hum……!"
1600203-48 = "S-só que, será que, será que você perguntou de propósito, pensando em mim…… eu sei que é improvável, mas……!"
1600203-49 = "……."
1600203-50 = "……Ehehe."
1600203-51 = "……Obrigada, Sensei."
1600203-53 = "(Depois de sorrir gentilmente, Kotori continuou sua explicação com o mesmo entusiasmo de sempre, como se nada tivesse acontecido)"
1600203-54 = "(Depois disso, conversamos até que Kotori estivesse satisfeita, e então voltamos para o Schale)"
