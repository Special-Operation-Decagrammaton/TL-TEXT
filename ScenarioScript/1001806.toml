[translation]
1001806-1 = "恥ずかしがり屋のアルバイト（２）"
1001806-2 = "遊園地・正門入口"
1001806-4 = "無理です……っ！"
1001806-5 = "ひ、人を直接相手しなくてもいいアルバイトって聞いたのに、まさかこんなに人が多い遊園地だなんて……。"
1001806-6 = "先生を信じたのに……信じてたのにぃ……！"
1001806-7 = "[s] \"心配しないで。前のアルバイトとはまた内容が違うから。\""
1001806-8 = "で、ですが、遊園地で人の相手をしないアルバイトなんて……。"
1001806-9 = "……え？き、着ぐるみを着て子供たちに風船を配るアルバイトですか？"
1001806-10 = "も、もちろん素顔のままお客様をお相手するよりは大丈夫かもしれませんが……知らない人にこちらから近寄るのは、まだ、怖いです……。"
1001806-11 = "それに、着ぐるみを着たアルバイトって、いたずらの標的にもされやすそうですし……。"
1001806-12 = "も、もし子供たちがいたずらで、着ぐるみの中に手榴弾を入れてきたり、スラッグ弾を撃ちながら追いかけてきたら、どうしましょう……。"
1001806-13 = "[s] \"そんなことは多分起きないんじゃないかな……。\""
1001806-14 = "そ、そうですかね？わたしが余計な心配をしてるだけでしょうか……？"
1001806-15 = "[s1] \"前回よりも簡単な仕事だから、大丈夫だと思うよ。\"\n[s2] \"ユズなら上手くできると思うよ。\""
1001806-16 = "……せ、先生の言う通りかもしれません。それに、他人の視線が怖いからって逃げ続けていたら、わたしは永遠にロッカーの中で、他の部員のみんなに迷惑をかけてばかりのままですし……。"
1001806-17 = "……せ、先生の言う通りかもしれません。それに、他人の視線が怖いからって逃げ続けていたら、わたしは永遠にロッカーの中で、他の部員のみんなに迷惑をかけてばかりのままですし……。"
1001806-18 = "いつまでも一人でそうしているわけには、いかないですよね……。"
1001806-19 = "わたし、今度こそ一生懸命、きちんとやってみせます……！"
1001806-20 = "花岡ユズ、頑張ります！"
1001806-29 = "み、みんな～、風船をもらってくださ～い、ふ、風船ですよー……！"
1001806-30 = "わあ、ありがとう！"
1001806-31 = "ど、どういたしまして。あ、あはは……。"
1001806-34 = "（着ぐるみを着てるせいか……なんだか、普段よりは声をかけやすい気が……）"
1001806-35 = "（このまま、時間まで何とか……）"
1001806-38 = "あの……着ぐるみのお姉ちゃん。"
1001806-39 = "え、は、はいっ？わ、わたしですか？"
1001806-40 = "うん。その着ぐるみ、ペロロでしょ？"
1001806-41 = "は、はい！そうです……！ぺ、ペロロですよ……！"
1001806-42 = "ああっ……！そ、そういえば、ペロロはこんな口調じゃなかったですね？"
1001806-43 = "す、すみませんペロペロ……！#nど、どうか着ぐるみに向かってスラッグ弾を撃つのだけはやめてください、ペロペロ……！"
1001806-44 = "えっと、そうじゃなくて……私、ペロロと一緒に写真が撮りたくて……。"
1001806-45 = "一緒に、写真撮ってくれる？"
1001806-46 = "そういうことでしたら……い、いくらでも大丈夫ですよ、ペロペロ～……。"
1001806-47 = "わぁ、ありがとう！#nお母さん！こっち、こっちだよ！早くペロロと写真撮って～！"
1001806-50 = "（なんだか……すごく、楽しそう……）"
1001806-51 = "（こんなに、誰かが楽しんでる姿をすぐ近くで見られるなんて、接客のアルバイトも悪い事ばかりじゃないかも……）"
1001806-54 = "ふう……な、なんとか無事に終えられました……。"
1001806-55 = "[s] \"最初に比べて、だいぶ慣れたみたいだね。\""
1001806-56 = "そ、そんなことありません……！知らない人と話すのはまだ怖いです……！"
1001806-57 = "ですが……それでも子供たちに喜んでもらえた瞬間、すごく嬉しい気持ちになりました。"
1001806-58 = "苦しくて、大変でしたが……その頑張りで誰かが幸せな気持ちになってくれるのは、嬉しいことだなって。やりがいのあることなんだなって思えたんです。"
1001806-59 = "ゲームを作ることと、同じで……。"
1001806-60 = "先生。わたし、もっと頑張ります！"
1001806-61 = "で、ですのでこれからも、もう少しだけ……わたしのこと、見守っていてください……！"
