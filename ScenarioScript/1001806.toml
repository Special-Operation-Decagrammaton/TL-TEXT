[translation]
1001806-1 = "Trabalho de meio período para tímidas (2)"
1001806-2 = "Parque de Diversões - Entrada Principal"
1001806-4 = "É impossível...!"
1001806-5 = "Eu, eu ouvi dizer que era um trabalho que não exigia lidar diretamente com pessoas, mas quem diria que seria um parque de diversões tão cheio..."
1001806-6 = "Eu confiei no Sensei... eu confiei em você...!"
1001806-7 = "[s] \"Não se preocupe. O conteúdo é diferente do trabalho anterior.\""
1001806-8 = "Ma-mas, que tipo de trabalho em um parque de diversões não envolve lidar com pessoas...?"
1001806-9 = "...Eh? U-um trabalho de vestir uma fantasia e distribuir balões para as crianças?"
1001806-10 = "E-eu sei que pode ser melhor do que lidar com os clientes de cara limpa, mas... me aproximar de estranhos por conta própria ainda é assustador..."
1001806-11 = "Além disso, trabalhos com fantasia parecem ser alvos fáceis para brincadeiras de mau gosto..."
1001806-12 = "E-e se as crianças, por brincadeira, colocarem uma granada dentro da fantasia, ou começarem a me perseguir atirando com balas de escopeta, o que eu faço...?"
1001806-13 = "[s] \"Acho que isso provavelmente não vai acontecer...\""
1001806-14 = "É-é mesmo? Será que estou apenas me preocupando à toa...?"
1001806-15 = "[s1] \"É um trabalho mais simples que o anterior, então acho que você vai se sair bem.\"\n[s2] \"Eu acho que a Yuzu consegue fazer isso muito bem.\""
1001806-16 = "...Ta-talvez o Sensei tenha razão. Além disso, se eu continuar fugindo só porque tenho medo do olhar dos outros, vou ficar para sempre dentro do armário, causando problemas para os outros membros do clube..."
1001806-17 = "...Ta-talvez o Sensei tenha razão. Além disso, se eu continuar fugindo só porque tenho medo do olhar dos outros, vou ficar para sempre dentro do armário, causando problemas para os outros membros do clube..."
1001806-18 = "Eu não posso continuar assim para sempre, não é...?"
1001806-19 = "Desta vez, eu vou me esforçar ao máximo e fazer tudo direitinho...!"
1001806-20 = "Hanaoka Yuzu, vai dar o seu melhor!"
1001806-29 = "Pe-pessoal, por favor, peguem um balão, ba-balões aqui...!"
1001806-30 = "Uau, obrigado!"
1001806-31 = "De-de nada. A-ahahaha..."
1001806-34 = "(Talvez seja por causa da fantasia... sinto que é mais fácil falar com as pessoas do que o normal...)"
1001806-35 = "(Vou tentar aguentar assim até o horário acabar...)"
1001806-38 = "Com licença... moça da fantasia."
1001806-39 = "Eh, si-sim? E-eu?"
1001806-40 = "Sim. Essa fantasia é do Peroro, né?"
1001806-41 = "Si-sim! É isso mesmo...! É o Pe-Peroro...!"
1001806-42 = "Ah...! A-aliás, o Peroro não falava desse jeito, né?"
1001806-43 = "De-desculpe, peropero...! #nPo-por favor, pare de atirar balas de escopeta na fantasia, peropero...!"
1001806-44 = "Err, não é isso... Eu queria tirar uma foto com o Peroro..."
1001806-45 = "Você pode tirar uma foto comigo?"
1001806-46 = "Se for isso... po-pode tirar quantas quiser, peropero..."
1001806-47 = "Uau, obrigada! #nMãe! Por aqui, por aqui! Vem logo tirar uma foto com o Peroro!"
1001806-50 = "(De alguma forma... parece que eles estão se divertindo muito...)"
1001806-51 = "(Poder ver alguém se divertindo tão de perto assim... talvez trabalhos de atendimento ao cliente não sejam tão ruins assim...)"
1001806-54 = "Ufa... co-consegui terminar sem problemas..."
1001806-55 = "[s] \"Parece que você se acostumou bem, comparado ao início.\""
1001806-56 = "Na-não é isso...! Ainda tenho medo de falar com estranhos...!"
1001806-57 = "Mas... mesmo assim, no momento em que vi as crianças felizes, senti uma alegria enorme."
1001806-58 = "Foi difícil e cansativo... mas pensar que, com esse esforço, alguém pôde se sentir feliz... é algo gratificante. Eu pude perceber isso."
1001806-59 = "É igual a criar um jogo..."
1001806-60 = "Sensei. Eu vou me esforçar ainda mais!"
1001806-61 = "Po-por isso, continue olhando por mim... só mais um pouco...!"
