[translation]
2801-1 = "Petição da Classe Especial 227 (1)"
2801-2 = "Ruínas perto do Antigo Edifício Escolar 227"
2801-5 = "Ugh, hoje está ainda mais frio..."
2801-6 = "A neve não para de cair... se eu ficar parada, vou acabar virando um boneco de neve..."
2801-7 = "Mas hoje consegui coletar várias coisas, então não preciso me preocupar em passar fome esta noite!"
2801-8 = "Você parece feliz, Nodoka. Aconteceu algo de bom?"
2801-9 = "Ah, Shigure-chan."
2801-10 = "Olha só, quantos galhos! E frutas também!"
2801-11 = "Com isso, acho que conseguiremos dormir aquecidas e de barriga cheia esta noite..."
2801-12 = "Entendo, que bom. Bom trabalho."
2801-13 = "Mas não exagere. Olha, suas bochechas estão vermelhas."
2801-14 = "A-ah, é mesmo...? Está tão visível assim...?"
2801-15 = "Vamos entrar logo, vou acender o fogo agora mesmo."
2801-18 = "Ufa, o calor está entrando no meu corpo... sinto que estou voltando à vida..."
2801-19 = "Nodoka, quer um pouco de chocolate quente?"
2801-20 = "Ah, muito obri... obrigada, Shigure-chan!"
2801-21 = "Eu que deveria agradecer. Obrigada por enfrentar esse frio."
2801-22 = "...Além disso, só de ver você sorrindo assim, Nodoka, eu já fico feliz."
2801-23 = "Obrigada, Nodoka. Por estar aqui comigo."
2801-24 = "S-Shigure-chan...!? P-por que de repente..."
2801-26 = "Nodoka..."
2801-28 = "Shigure-chan..."
2801-30 = "Parem, parem, paaaaaarem!"
2801-32 = "Antigo Edifício Escolar - Classe Especial 227"
2801-33 = "M-Meru-chan!? Que história é essa...!"
2801-34 = "P-por que eu estou sendo tão íntima da Shigure-chan...!?"
2801-35 = "Por que? Porque me pediram para 'registrar como os alunos do antigo edifício escolar vivem', então eu escrevi com base na realidade... Algum problema?"
2801-36 = "Claro, adicionei um pouco de 'tempero', mas basicamente está tudo baseado em fatos. Fufu..."
2801-37 = "Além de estarmos com frio e fome, quase tudo é invenção, não é!? O que eu pedi foi uma 'petição' descrevendo o quanto a Classe Especial 227 está sofrendo neste ambiente rigoroso do antigo edifício escolar, não uma história de ficção!!"
2801-38 = "A secretaria não nos dá ouvidos, não importa o que façamos... então pensei que, se fosse um 'pedido de outros alunos', eles nos escutariam...!"
2801-39 = "Mas só fatos são entediantes, não acha?"
2801-40 = "Para manter o interesse dos leitores, às vezes é preciso usar 'mentiras convincentes', sabe?"
2801-41 = "Por que você precisa se preocupar com o 'interesse dos leitores' em uma petição!? E, além disso, esse conteúdo...!"
2801-42 = "Ora, ora, eu até que gostei bastante."
2801-43 = "A cena da fogueira ficou especialmente boa, sim. O que você acha, Nodoka?"
2801-44 = "Shigure-chan... nós não estamos em um concurso literário..."
2801-45 = "Deveríamos estar transmitindo a realidade cruel do antigo edifício escolar... por que isso se transformou em um romance tão... i-impuro..."
2801-46 = "Se enviarmos isso para a secretaria, eles vão pensar que 'parece que elas estão se divertindo no antigo edifício' e podem até aumentar o nosso período de suspensão...!"
2801-47 = "Que crueldade chamar de 'isso'. Pode acabar se tornando uma obra-prima na história de Kivotos."
2801-48 = "N-não é hora de falar de valor literário, precisamos escrever uma petição decente de qualquer jeito...!"
2801-49 = "Baseie-se nos fatos! Reescreva de forma que nossas dificuldades fiquem bem claras!"
2801-50 = "Não tem jeito, então vamos começar de novo..."
2801-52 = "'Ao estimado Secretário-Geral. A Classe Especial 227 está sofrendo com uma grave escassez de suprimentos. Por exemplo, temos que dividir até mesmo uma única bala entre nós duas.'"
2801-53 = "Ah, isso está bom! Continue assim!"
2801-54 = "Para que nosso sofrimento seja compreendido, inclua exemplos ainda mais trágicos!"
2801-55 = "'Certo dia, quando Nodoka estava saboreando uma única bala que conseguiu com muito esforço...'"
2801-56 = "...Meru-chan? Esse começo está certo? Não conheço essa história..."
2801-57 = "'Shigure, que entrou no antigo edifício escolar um pouco depois, encontrou Nodoka. Pensando na bala que rolava na saliva dela, Shigure forçou a boca de Nodoka a abrir e sua língua quente...'"
2801-59 = "PAAAAAAARE!!"
2801-61 = "Por que isso acontece de novo!? Você quer levar para esse lado de qualquer jeito, não quer!?"
2801-62 = "Porque..."
2801-63 = "Não seria mais interessante assim?"
2801-64 = "Interesse não é o que precisamos agora! É por isso que a Frente de Libertação do Conhecimento sempre coloca os hobbies em primeiro lugar...!"
2801-65 = "Pedir para a Meru-chan foi um erro desde o começo!"
2801-66 = "Já chega, bom trabalho!"
2801-69 = "Não conseguir entender a qualidade desse desenvolvimento... Quando essa obra se tornar um grande sucesso, não adianta vir se arrepender!"
2801-71 = "B-bem, eu não me importo mesmo!"
2801-74 = "Que pena, achei que estava bem interessante."
2801-75 = "Shigure-chan, não é essa a questão... Desse jeito, não vamos conseguir alcançar nosso objetivo..."
2801-76 = "O que precisamos agora é de uma 'petição que faria até mesmo aqueles membros da secretaria, sem sangue ou lágrimas, chorarem sem parar ao ler'!"
2801-77 = "Não podemos continuar ficando neste prédio antigo para sempre..."
2801-78 = "Desta vez, precisamos chamar a atenção dos executivos da secretaria, incluindo a Presidente Cherino, para que nos deixem voltar ao prédio principal...!"
2801-79 = "Isso é verdade, mas... será que existe algum aluno na Academia Federal Red Winter que escreva melhor do que a 'Frente de Libertação do Conhecimento'?"
2801-80 = "Ugh, é verdade... não consigo pensar em ninguém de imediato, mas..."
2801-81 = "M-mas, o que é necessário para uma petição não é habilidade de escrita! Se alguém que se compadeça da nossa situação escrever com esse sentimento..."
2801-82 = "Com certeza existe alguém assim em algum lugar da Academia Federal Red Winter!"
2801-83 = "Vamos, Shigure-chan! Vamos procurar por esse 'alguém'!"
