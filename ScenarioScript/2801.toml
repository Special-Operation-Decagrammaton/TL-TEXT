[translation]
2801-1 = "227号特別クラスの嘆願書（１）"
2801-2 = "旧校舎227号付近廃墟"
2801-5 = "うぅ、今日は一段と寒い……。"
2801-6 = "雪も全然止まないし……動かないでいたら雪だるまになっちゃいそう……。"
2801-7 = "でも今日は色々と拾えたし、今夜は飢える心配無し！"
2801-8 = "嬉しそうだね、ノドカ。何か良いことでもあった？"
2801-9 = "あっ、シグレちゃん。"
2801-10 = "見てこれ、枝がたくさん！あと木の実も！"
2801-11 = "これで何とか今晩は、お腹いっぱいのまま暖かくして眠れそう……。"
2801-12 = "そっか、それは良かった。お疲れ様。"
2801-13 = "でも無茶はダメだよ。ほら、頬が赤くなってる。"
2801-14 = "あ、あれ？そんなに……？"
2801-15 = "早く中に入ろう、すぐに火を起こすから。"
2801-18 = "ふぅ、温度が身に染みて……生き返るー……。"
2801-19 = "ノドカ、ココアいる？"
2801-20 = "あっ、ありがとうござ……ありがとうシグレちゃん！"
2801-21 = "お礼を言うのはこっちだよ。寒い中ありがとね。"
2801-22 = "……それに、ノドカがそうやって笑ってくれるだけで、私は嬉しいから。"
2801-23 = "ありがとう、ノドカ。こうして一緒にいてくれて。"
2801-24 = "し、シグレちゃん……！？ど、どうしてそんな急に……。"
2801-26 = "ノドカ……。"
2801-28 = "シグレちゃん……。"
2801-30 = "ストップストップ、スト―――ップ！"
2801-32 = "旧校舎・227号特別クラス"
2801-33 = "め、メルちゃん！？こ、このお話は一体……！"
2801-34 = "ど、どうして私がシグレちゃんと、い、イチャイチャして……！？"
2801-35 = "どうしてって、「旧校舎の生徒たちがどんな環境で過ごしているかを記録して欲しい」と頼まれたから、実際に書き起こしたんだけど……何か問題が？"
2801-36 = "もちろん多少「スパイス」は加えたけど、基本的には事実に基づいて作ってるとも。ふふっ……。"
2801-37 = "さ、寒くてお腹が空いてること以外はほとんど捏造じゃないですか！？私がお願いしたのは、あくまで「227号特別クラスがこの厳しい旧校舎の環境でいかに苦労しているか」を記した「嘆願書」であって、創作のストーリーじゃないんです！！"
2801-38 = "私たちが何かしたところで、事務局は全然取り合ってくれないし……なら「他の生徒からの要望」だったら聞いてくれるだろうと思ってお願いしたのに……！"
2801-39 = "でも、事実だけじゃ面白みに欠けるじゃん。"
2801-40 = "読者の興味を引き続けるためには、時に「それらしい嘘」も必要なんだよ？"
2801-41 = "どうして嘆願書で「読者の興味」を気にする必要があるんですか！？そ、それにこの内容……！"
2801-42 = "まあまあ、私は結構楽しめたよ？"
2801-43 = "特に焚火のシーンが良いね、うん。ノドカはどう思う？"
2801-44 = "シグレちゃん……私たちは今、文学賞の品評会とかをしてるんじゃなくって……。"
2801-45 = "旧校舎の凄惨な現実をありありと伝えないといけないのに……それがどうしてこんな、ふ、不純な恋愛ものに……。"
2801-46 = "こんなものを事務局に送ったら「旧校舎で楽しそうにやってるみたいじゃないか」って、むしろ停学期間を延ばされる可能性も……！"
2801-47 = "「こんなもの」だなんて酷いな。もしかしたらキヴォトス史に残る名作になるかもしれないのに。"
2801-48 = "い、今は文学的な価値の話をしてる場合じゃなくて、とにかくちゃんとした嘆願書を書いてもらわないと……！"
2801-49 = "できるだけ事実を基に！私たちの苦情がこれでもかってくらい伝わるように書き直してください！"
2801-50 = "仕方ないなあ、じゃあ最初から……。"
2801-52 = "「敬愛する書記長へ。227号特別クラスは現在、深刻な物資不足で苦しんでおります。例を挙げるならば、小さな飴玉ひとつでも二人で分け合って食べなくてはならないほどです。」"
2801-53 = "あ、良い感じです！その調子で！"
2801-54 = "私たちの苦労が伝わるように、もっと悲惨な例えを盛り込んでください！"
2801-55 = "「先日ノドカさんが、大変な苦労をして手に入れた一粒の飴を舐めている時のことです……」"
2801-56 = "……メルちゃん？その始まり方大丈夫ですか？全然知らないお話ですが……"
2801-57 = "「遅れて旧校舎に入ってきたシグレさんは、ノドカさんの姿を見つけました。彼女の唾液の中で転がる飴玉のことを思い、シグレさんは彼女の口を無理やりに開き、熱い舌を――"
2801-59 = "ストーーーーーップ！！"
2801-61 = "どうしてまたそうなるんですか！？どう足掻いてもそっち方向にしたいんですか！？"
2801-62 = "だって……"
2801-63 = "その方が面白くない？"
2801-64 = "面白さは今必要無いんです！これだから趣味嗜好が第一の知識解放戦線は……！"
2801-65 = "メルちゃんに頼んだことがそもそもの間違いでした！"
2801-66 = "もう良いです、お疲れ様でした！"
2801-69 = "この展開の良さが分からないなんて……この作品が大ヒットしてから後悔しても遅いんだからな！"
2801-71 = "べ、別に良いですよーだ！"
2801-74 = "残念、結構面白かったのに。"
2801-75 = "シグレちゃん、そういう問題じゃなくて……あれじゃあ私たちの目的は達成できないから……。"
2801-76 = "今の私たちに必要なのは、「読んだらもう、あの血も涙も無い事務局の面々ですら涙が止まらないほどの嘆願書」！"
2801-77 = "こうしていつまでも、この旧校舎にい続けるわけにはいかない……。"
2801-78 = "今度こそ、チェリノ会長を含めた事務局の幹部たちに私たちの存在をアピールして、本校舎に戻してもらわないと……！"
2801-79 = "それはそうだけど……レッドウィンター連邦学園に、「知識解放戦線」より良い文章を書ける生徒っているのかな？"
2801-80 = "うっ、たしかに……すぐには思い浮かばないけど……。"
2801-81 = "だ、だけど、嘆願書に必要なのは文章力じゃないはず！私たちの環境に同情してくれた人が、その気持ちのままに書いてくれれば……！"
2801-82 = "そんな誰かが、きっとレッドウィンター連邦学園のどこかにいるはず！"
2801-83 = "さっ、行こうシグレちゃん！その「誰か」を探しに！"
