[translation]
2003303-1 = "偉大な議長の事業"
2003303-8 = "[ns] \"…………ん？\""
2003303-9 = "[ruby=はぬま]羽沼[/ruby]マコト議長の！ご入場です！"
2003303-16 = "うむ。私は先生と用事があるから、お前たちは外で待機するように。"
2003303-18 = "はいっ！"
2003303-22 = "……というわけで、このマコト様が直々に足を運んでやったぞ。"
2003303-23 = "[s1] \"あ、うん、いらっしゃい。\"\n[s2] \"えっと、コーヒーでも飲む？\""
2003303-26 = "キキッ、遠慮なくもらうとしよう。"
2003303-27 = "それより……"
2003303-28 = "キキキッ、ここが噂に聞くシャーレの執務室か。"
2003303-29 = "これは……"
2003303-30 = "[s] \"……これは？\""
2003303-31 = "あまりにも手狭で居心地が悪いな！"
2003303-32 = "[s] \"急に来たかと思えばひどい言い草だね！？\""
2003303-33 = "ひどいとは何がだ？私はただ事実を述べたに過ぎない！"
2003303-34 = "優秀なリーダーたるもの、それ相応の仕事場を用意するべきだ！"
2003303-35 = "こんな狭苦しい場所で、効率よく仕事ができるわけないだろう？"
2003303-36 = "それに……これでは威厳を知らしめるための像が置けないではないか！"
2003303-37 = "やれやれ……私からの提案を呑んでいれば、比べ物にならないくらい広々とした執務室を提供してやったというのに。"
2003303-38 = "[s3] \"今の執務室に不満は無いからね……\"\n[s4] \"普通は自分の像を部屋に置かないからね！？\""
2003303-41 = "ともかく、先生に提案を断られてから、じっくり考えたのだ。"
2003303-42 = "考えに考えた末！ついに今日、理解した！"
2003303-43 = "[s] \"聞かせてもらっても……？\""
2003303-44 = "キキキッ……まさか、こんなにも簡単な理由を見過ごしていたとは。"
2003303-45 = "その理由とは……先生は我[ruby=パンデモニウム・ソサエティー]々万魔殿の[/ruby]真価を知らないからである！#n不覚にも、このマコト様[ruby=あやま]の過ち[/ruby]だ……"
2003303-46 = "[s] \"過ちって……？\""
2003303-47 = "安心してくれ、先生に非は無い。"
2003303-48 = "全ては万魔殿の偉業を事細かに説明していなかった、このマコト様が悪いのだ。"
2003303-49 = "私にとって万魔殿の成長や成功は、もはや約束されたも同然。#nだからこそ、お互いの認識を共有できていなかった。"
2003303-50 = "優秀なリーダーとは、時に自身の過ちを素直に認めるもの！"
2003303-51 = "そこで今日、私が先生のもとを訪ねた理由はただひとつ。"
2003303-52 = "万魔殿が何をしているのか。#nそして、この羽沼マコト様がどのようにして偉業を成し遂げているのか――"
2003303-53 = "余すことなく、先生に見せるとしよう！"
2003303-54 = "そうすれば、私の提案を断ったのが間違いであると泣きながら後悔し、考えを改めるはずだ！キャハハハハッ！！"
2003303-55 = "[s] \"いや、さすがに泣きはしないんじゃないかな……\""
2003303-56 = "そうと決まれば、こうしてる場合ではない。"
2003303-61 = "さあ、先生をリムジンに案内せよ。"
2003303-62 = "今すぐ、万魔殿の傘下にある事業所へ移動する！"
2003303-63 = "[s] \"待って、マコト！まだシャーレの仕事が……！\""
2003303-64 = "キキキキッ！そう些細なことを気にするな！"
2003303-65 = "その顔も、すぐに畏敬と尊敬の念で染まるだろう！"
2003303-66 = "うむ！では行くぞ！"
2003303-67 = "[s] \"私の話は聞いてた！？\""
2003303-75 = "（こうして急遽、マコトと一緒に万魔殿の事業を見て回ることに）"
2003303-78 = "キシシッ。将来のパートナーとなる存在に、まず紹介するべきは……"
2003303-79 = "……ここであるっ！"
2003303-80 = "[s] \"……ここって、印刷所？\""
2003303-81 = "ああ。"
2003303-82 = "だが、単なる印刷所ではない。"
2003303-83 = "ここは我々万魔殿が単独で運営している印刷所だ。#n……そして、なんとゲヘナでも最大の規模を誇っている。"
2003303-84 = "ここで作られているチラシや新聞、雑誌、漫画など、あらゆる印刷物は全て……"
2003303-85 = "万魔殿を！延いては、このマコト様を宣伝するためのもの！"
2003303-86 = "[s] \"それはつまり……\""
2003303-87 = "キキキッ、そうだ！このマコト様は、すでに出版業を掌握している……#nつまり、メディア産業そのものを掌握したようなものだ！"
2003303-88 = "この事業は、これから先も右肩上がりの業績が期待されている。"
2003303-89 = "つまり、ゲヘナのマスコミを思いのまま操れるようになるのも、時間の問題なのだ！"
2003303-90 = "どうだ、先生よ。キヴォトス中を探しても、ここまでの事業を手掛ける者は、この羽沼マコト様以外に存在しないはず！"
2003303-91 = "これで私の偉大な業績が分かっただろう？"
2003303-92 = "[s] \"あ……うん、すごいね。\""
2003303-93 = "むむむ！？これを見ても、まったく動じないだと……？"
2003303-94 = "[s5] \"似たようなものを見てきたというか……\"\n[s6] \"規模が大きければ良いわけじゃないというか……\""
2003303-97 = "な、なんだと！？一体どれほどの修羅場をくぐり抜けてきたのだ……？"
2003303-98 = "……うむ、これくらい当然というわけだな。"
2003303-99 = "まだまだ他の事業も見てもらわねば！むしろ、これからが本番だ！"
2003303-100 = "さあ！次の現場に移動するぞ！"
2003303-103 = "ここだ！"
2003303-104 = "[s] \"工事の真っ最中だね、何を建設してるの？？\""
2003303-105 = "キシシッ、それはな……"
2003303-106 = "これはこれは、マコト様ではありませんか。#n今日は視察ですかね？"
2003303-107 = "ああ、工事は順調に進んでいるか？"
2003303-108 = "ははっ！それはもちろん、この通り。"
2003303-109 = "ご期待ください！もうじき、羽沼マコト様の威厳を知らしめる――"
2003303-111 = "「マコトタワー」が完成しますので！#nこれで、キヴォトスの全生徒はマコト様を仰ぎ見ることになるでしょう！"
2003303-112 = "[s] \"……マコトタワー？\""
2003303-113 = "キキキッ。ああ、この偉大な私に見合うビルを建設しているのだ。"
2003303-114 = "その高さは……なんと、シャーレのサンクトゥムタワーを[ruby=りょうが]凌駕[/ruby]する！"
2003303-115 = "ええ。私どもはマコト様から頂いた指示書に従い、建設を進めております。"
2003303-116 = "私の目標は……ゲヘナはもちろん、トリニティ、ミレニアム、百鬼夜行、それにレッドウィンターまでをも一望できる超高層ビルの建設だ！"
2003303-117 = "[s] \"さすがに不可能じゃない！？\""
2003303-118 = "ふん、何を弱気な！#nこのマコト様が手掛けている以上、成功するに決まっている！"
2003303-119 = "……ははっ。実際にビルを建設しているのは、私どもですがね。"
2003303-120 = "キャハハッ！私が建設しているようなものだ！"
2003303-121 = "ええ、ええ、そうでした。私どもは、マコト様の依頼を請け負っているだけですので！"
2003303-123 = "キャハハハハハッ！"
2003303-124 = "はははっ！"
2003303-126 = "完成した日には、ゲヘナのシンボルとして素晴らしい観光名所となるだろう。"
2003303-127 = "そうして巨額の観光収入を得て、キヴォトス全土に我々万魔殿の名を轟かせる！"
2003303-128 = "風紀委員会には想像すらできないだろう……#nそう！この計画は、マコト様でなければ成し得ない！"
2003303-129 = "どうだ、シャーレの先生よ！このビルを見たお前の感想を聞かせてくれ。"
2003303-130 = "……あまりの規模に驚いてしまったか？"
2003303-131 = "……ん？現実的な予算や観光消費額の調査はしたのか、だと……？"
2003303-132 = "キシシッ、つまらない考えは捨て置こう。"
2003303-133 = "[s] \"つまらないの一言で片付けちゃっていいの……？\""
2003303-134 = "ああ！現実を見ていても仕方あるまい。"
2003303-135 = "重要なことは、自分の心に聞けば自然と分かるものだ……"
2003303-136 = "己の欲望に従おうじゃないか！"
2003303-137 = "[s] \"……本当にそれでいいの！？\""
2003303-138 = "ふむ……未完成の建物を見せたところで、先生が納得するはずもなかったな。"
2003303-139 = "では、次だ！"
2003303-141 = "（その後も不安と心配を抱えながら、様々な事業を見て回った）"
2003303-143 = "ここのショッピングモールでは、万魔殿のポップアップストアが開催されている。"
2003303-144 = "マコト様の威厳が溢れているフィギュアやポスターをはじめ、様々なグッズが並んでいるだろう。"
2003303-145 = "うむ、好調だな！今後はオンラインショップを通して大量販売も計画している！#nそうすれば、このマコト様の名声は――！"
2003303-147 = "キキキッ！ここが我々万魔殿で運営しているリゾートだ。"
2003303-148 = "現在は全ての利用客に特別割引サービス券と万魔殿ファンクラブのバッジを配布している。これで、さらに影響力を――！"
2003303-156 = "（そうして万魔殿の様々な事業を回り終え、今度はゲヘナの商店街に訪れた）"
2003303-157 = "さて、いろんな事業を見せてきたが……どうだ？"
2003303-158 = "先生の感想を聞かせてくれ。"
2003303-159 = "[s] \"マコトは色々な事業を手掛けてるんだね。\""
2003303-160 = "キシシッ。ああ、その通りだ。"
2003303-161 = "今この瞬間も、どうすれば万魔殿を大きくできるのか、事業を成功できるのか考えている。"
2003303-162 = "そして――"
2003303-163 = "どうすれば、このマコト様の名を広げられるのか。"
2003303-164 = "もちろん、こうして事業を拡大するたびに、イロハは愚痴をこぼしているがな。"
2003303-165 = "[s] \"現場を見てきたから、なんとなく想像できるよ……\""
2003303-166 = "な、なにぃ！？"
2003303-167 = "ま、まぁ……着実に力を伸ばし続けて風紀委員会を完全に黙らせれば、ゲヘナを……#nいや、キヴォトス全土を掌握できるはず！"
2003303-168 = "これで我々万魔殿の素晴らしさを改めて実感しただろう。"
2003303-169 = "どうだ、先生。このマコト様と手を組む気になったか？"
2003303-170 = "[s] \"うーん……ごめん、マコト。やっぱりそれは難し――\""
2003303-175 = "ん？なんの騒ぎだ？"
2003303-177 = "ですから、この商品を仕入れてくだされば、新しい顧客を望めるはずです！"
2003303-178 = "どうだってええ。ウチらの商店街で、そんなもんを扱うわけにはいかん！"
2003303-179 = "……おじいさん！取引先は、なんとあの万魔殿ですよ！？#nきっと今よりも集客が見込めますし、お金の方も……"
2003303-180 = "ったく、これだから最近の若モンは！口を開けばカネカネカネ！#n店を潰されたら、常連さんが困るだろう！"
2003303-182 = "ですから、あくまで仕入れ数は……"
2003303-183 = "……何事だ？"
2003303-184 = "あっ……ま、マコト様！"
2003303-185 = "ふむ、そっちは見覚えのある仲介業者だな。何かトラブルか？"
2003303-186 = "そ、それは……"
2003303-187 = "なるほど。お主がこいつを仕向けて、ウチの商店街に「万魔殿特製おみやげ羽沼マコトセット」なんちゅうモンを仕入れるように指示したお偉いさんだな？"
2003303-188 = "[s] \"……羽沼マコトセット？\""
2003303-189 = "あぁ、たしかそんな製品も企画したな……それで、何が問題なのだ？"
2003303-190 = "はっきり言わせてもらおう。#nこんな胡散臭い商品を仕入れるために、今の店を潰して建て替えるなんて言語道断。"
2003303-191 = "いくらお主が店を買い取ったとはいえ、あまりにもひどい話だ！ご[ruby=ひいき]贔屓[/ruby]にしてくれている常連さんはどうしろと？商店街を守る立場として、このような仕打ちは決して許せん！"
2003303-192 = "そうだ！そうだ！"
2003303-193 = "会長の言う通りだ！"
2003303-194 = "好き勝手させるものか！"
2003303-196 = "い、いくら何でもそこまで言われる筋合いは……！"
2003303-197 = "なるほど……キシシッ。#nそれで、このマコト様の事業を邪魔しようと……そうかそうか。"
2003303-198 = "まったく、仕方ない――"
2003303-199 = "[s] \"ま、待って、マコト。あまり感情的には……\""
2003303-200 = "皆、よく聞け！"
2003303-205 = "我々の事業の目的は、あくまで万魔殿の名を広げることにある！#nそのためには、ゲヘナに住む皆と良い関係を築いていきたい。"
2003303-206 = "……もちろん風紀委員会は例外だが。"
2003303-207 = "今回は不本意ながら、こういったトラブルを発生させてしまい申し訳なかった。"
2003303-208 = "商店街との争いは私も避けたい。不満があるようなら、聞き入れて対応する。"
2003303-209 = "そして、お互いの妥協点を探るのはどうだ？"
2003303-210 = "これなら問題ないだろう？"
2003303-211 = "本当か！？"
2003303-212 = "……お主は、それでいいのかい？"
2003303-213 = "キシシッ、もちろんだ。マコト様は寛大かつ慈悲深いからな。"
2003303-214 = "……あ、風紀委員会が相手の場合は例外だ。"
2003303-215 = "……ウチらも熱くなって悪かった、感謝する！"
2003303-220 = "ふん、これで一件落着か。"
2003303-221 = "[s] \"さっきはビックリしたよ、本当にすごかった。\""
2003303-222 = "……あぁ。"
2003303-223 = "万魔殿のトップともなれば、あれくらい日常茶飯事だ。"
2003303-224 = "リーダーたるもの、些細な出来事に振り回されてはならないからな。"
2003303-225 = "それよりも……キキッ。#nこのマコト様の活躍を目にして、いよいよ万魔殿に協力する気になったか？"
2003303-226 = "[s] \"それとこれは別かな。\""
2003303-227 = "ぐっ！まだダメだったか！"
2003303-228 = "……ふん、まあ良い。"
2003303-229 = "先生の器には、この羽沼マコト様もまだ届かないというわけだな。"
2003303-230 = "[s] \"それは過大評価のような……\""
2003303-231 = "だが！マコト様は決して諦めない！"
2003303-232 = "いつか……先生を私のモノにしてやる！"
2003303-233 = "キキキッ……キャハハハハハッ！！そのときを待っているがいい！"
2003303-234 = "[s] \"あ、うん……お手柔らかにね？\""
