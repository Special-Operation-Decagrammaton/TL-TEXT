[translation]
2003303-1 = "O grande empreendimento da presidente"
2003303-8 = "[ns] \"…………hã?\""
2003303-9 = "A presidente Hanuma Makoto! Está entrando!"
2003303-16 = "Hum. Eu tenho assuntos a tratar com o Sensei, então vocês fiquem esperando lá fora."
2003303-18 = "Sim, senhora!"
2003303-22 = "……Dito isso, eu mesma, a grande Makoto, vim pessoalmente até aqui."
2003303-23 = "[s1] \"Ah, oi, seja bem-vinda.\"\n[s2] \"Bem, quer um café?\""
2003303-26 = "Kiki, aceitarei sem cerimônias."
2003303-27 = "Mas antes disso……"
2003303-28 = "Kikiki, então este é o escritório do Schale de que tanto ouvi falar."
2003303-29 = "Isso é……"
2003303-30 = "[s] \"……Isso é o quê?\""
2003303-31 = "É apertado demais e desconfortável!"
2003303-32 = "[s] \"Que comentário grosseiro para quem acabou de chegar, não acha!?\""
2003303-33 = "Grosseiro? O que há de grosseiro? Eu apenas disse um fato!"
2003303-34 = "Um líder excelente deve ter um local de trabalho à altura!"
2003303-35 = "Não tem como trabalhar com eficiência em um lugar tão apertado, tem?"
2003303-36 = "Além disso…… desse jeito, não dá nem para colocar uma estátua para impor respeito!"
2003303-37 = "Francamente…… se você tivesse aceitado minha proposta, eu teria te oferecido um escritório muito mais espaçoso, sem comparação."
2003303-38 = "[s3] \"Eu não tenho reclamações sobre o escritório atual……\"\n[s4] \"E, normalmente, as pessoas não colocam estátuas de si mesmas na sala, sabia!?\""
2003303-41 = "De qualquer forma, depois que o Sensei recusou minha proposta, eu pensei bastante."
2003303-42 = "Pensei e pensei! E finalmente, hoje, eu entendi!"
2003303-43 = "[s] \"Pode me contar……?\""
2003303-44 = "Kikiki…… quem diria que eu deixaria passar um motivo tão simples."
2003303-45 = "O motivo é…… o Sensei não conhece o verdadeiro valor da nossa Pandemonium Society! #nQue descuido, este é um erro da grande Makoto……"
2003303-46 = "[s] \"Erro, você diz……?\""
2003303-47 = "Fique tranquilo, a culpa não é do Sensei."
2003303-48 = "A culpa é toda minha, da grande Makoto, por não ter explicado detalhadamente os feitos da Pandemonium Society."
2003303-49 = "Para mim, o crescimento e o sucesso da Pandemonium Society já são garantidos. #nPor isso, não estávamos compartilhando a mesma percepção."
2003303-50 = "Um líder excelente é aquele que, às vezes, admite seus próprios erros!"
2003303-51 = "Por isso, o motivo de eu ter visitado o Sensei hoje é apenas um."
2003303-52 = "O que a Pandemonium Society está fazendo. #nE como eu, Hanuma Makoto, estou realizando grandes feitos――"
2003303-53 = "Vou mostrar tudo ao Sensei, sem esconder nada!"
2003303-54 = "Assim, você vai chorar de arrependimento por ter recusado minha proposta e vai mudar de ideia! Kyahahaha!!"
2003303-55 = "[s] \"Não, acho que não vou chegar a chorar……\""
2003303-56 = "Decidido isso, não temos tempo a perder."
2003303-61 = "Vamos, levem o Sensei até a limusine."
2003303-62 = "Vamos direto para uma das instalações sob o comando da Pandemonium Society!"
2003303-63 = "[s] \"Espere, Makoto! Eu ainda tenho trabalho no Schale……!\""
2003303-64 = "Kikikiki! Não se preocupe com essas trivialidades!"
2003303-65 = "Seu rosto logo estará tomado por reverência e respeito!"
2003303-66 = "Hum! Então vamos!"
2003303-67 = "[s] \"Você estava me ouvindo!?\""
2003303-75 = "(Assim, de repente, acabei saindo com a Makoto para visitar os empreendimentos da Pandemonium Society)"
2003303-78 = "Kishishi. Para o meu futuro parceiro, o primeiro lugar que devo apresentar é……"
2003303-79 = "……Este aqui!"
2003303-80 = "[s] \"……Isso aqui é uma gráfica?\""
2003303-81 = "Sim."
2003303-82 = "Mas não é uma gráfica comum."
2003303-83 = "Esta é uma gráfica operada exclusivamente por nós, da Pandemonium Society. #n……E, acredite, ostenta o maior porte de toda Gehenna."
2003303-84 = "Os panfletos, jornais, revistas, mangás e todo tipo de material impresso produzido aqui são, na verdade..."
2003303-85 = "Feitos para promover o Pandemonium! E, por extensão, para promover a mim, a grande Makoto!"
2003303-86 = "[s] \"Isso significa que...\""
2003303-87 = "Ki-ki-ki, exatamente! Eu, a grande Makoto, já tomei o controle do setor editorial... #nOu seja, é como se eu tivesse tomado o controle da própria indústria da mídia!"
2003303-88 = "Espera-se que este negócio continue crescendo cada vez mais daqui para frente."
2003303-89 = "Em outras palavras, controlar a imprensa de Gehenna como bem entender é apenas uma questão de tempo!"
2003303-90 = "O que me diz, Sensei? Mesmo se procurar por todo o Kivotos, não deve existir ninguém além de mim, Hanuma Makoto, capaz de gerenciar um empreendimento desse porte!"
2003303-91 = "Agora você entende as minhas grandes conquistas, não entende?"
2003303-92 = "[s] \"Ah... sim, é impressionante.\""
2003303-93 = "Mu-mu-mu!? Mesmo vendo isso, você não se abalou nem um pouco...?"
2003303-94 = "[s5] \"É que eu já vi coisas parecidas...\"\n[s6] \"Não é porque a escala é grande que significa que é bom...\""
2003303-97 = "O-o que você disse!? Por quantas situações críticas você já passou...?"
2003303-98 = "...Hum, então quer dizer que isso é algo natural para você."
2003303-99 = "Ainda preciso te mostrar outros negócios! Na verdade, o melhor está por vir!"
2003303-100 = "Vamos! Hora de seguir para o próximo local!"
2003303-103 = "É aqui!"
2003303-104 = "[s] \"Está em plena construção, o que vocês estão construindo?\""
2003303-105 = "Ki-shi-shi, é o seguinte..."
2003303-106 = "Ora, ora, se não é a Makoto-sama. #nVeio fazer uma inspeção hoje?"
2003303-107 = "Ah, a construção está avançando conforme o planejado?"
2003303-108 = "Haha! Com certeza, está tudo correndo bem."
2003303-109 = "Pode aguardar! Em breve, para mostrar a todos a majestade de Hanuma Makoto..."
2003303-111 = "A \"Torre Makoto\" estará concluída! #nCom isso, todos os estudantes de Kivotos terão que olhar para cima para admirar a Makoto-sama!"
2003303-112 = "[s] \"...Torre Makoto?\""
2003303-113 = "Ki-ki-ki. Sim, estou construindo um prédio que faz jus à minha grandeza."
2003303-114 = "Sua altura... superará até mesmo a Torre Sanctum do Schale!"
2003303-115 = "Sim. Nós estamos seguindo as instruções que recebemos da Makoto-sama para realizar a construção."
2003303-116 = "Meu objetivo é... construir um arranha-céu de onde se possa ver não só Gehenna, mas também Trinity, Millennium, Hyakkiyako e até Red Winter!"
2003303-117 = "[s] \"Isso não é impossível!?\""
2003303-118 = "Hum, que falta de confiança! #nJá que sou eu, a grande Makoto, quem está no comando, o sucesso é garantido!"
2003303-119 = "...Haha. Embora, na verdade, sejamos nós quem estamos construindo o prédio."
2003303-120 = "Kya-ha-ha! É como se eu mesma estivesse construindo!"
2003303-121 = "Sim, sim, é verdade. Nós estamos apenas executando o pedido da Makoto-sama!"
2003303-123 = "Kya-ha-ha-ha-ha-ha!"
2003303-124 = "Ha-ha-ha!"
2003303-126 = "No dia em que for concluído, ele se tornará um ponto turístico maravilhoso e um símbolo de Gehenna."
2003303-127 = "Assim, obteremos uma receita turística enorme e faremos o nome do nosso Pandemonium ecoar por todo o Kivotos!"
2003303-128 = "O Comitê Disciplinar nem consegue imaginar... #nIsso mesmo! Este plano é algo que só a Makoto-sama poderia realizar!"
2003303-129 = "O que me diz, Sensei do Schale! Diga-me o que achou ao ver este prédio."
2003303-130 = "...Ficou surpreso com a escala, não foi?"
2003303-131 = "...Hm? Você perguntou se eu fiz um estudo sobre o orçamento realista e o consumo turístico...?"
2003303-132 = "Ki-shi-shi, vamos deixar esses pensamentos entediantes de lado."
2003303-133 = "[s] \"Você pode simplesmente ignorar isso chamando de entediante...?\""
2003303-134 = "Ah! Não adianta ficar olhando para a realidade."
2003303-135 = "O que é importante é algo que você entende naturalmente quando ouve o seu coração..."
2003303-136 = "Por que não seguir os seus próprios desejos?"
2003303-137 = "[s] \"...Tem certeza de que isso é uma boa ideia!?\""
2003303-138 = "Hum... parece que mostrar um prédio inacabado não foi o suficiente para convencer o Sensei."
2003303-139 = "Então, vamos para o próximo!"
2003303-141 = "(Depois disso, continuei visitando vários outros empreendimentos, sentindo-me cada vez mais preocupado e apreensivo.)"
2003303-143 = "Neste shopping, está sendo realizada uma loja temporária do Pandemonium."
2003303-144 = "Começando por pôsteres e figuras que transbordam a dignidade da Makoto-sama, há vários tipos de produtos à venda."
2003303-145 = "Hum, está indo muito bem! No futuro, também planejamos vendas em massa através da loja online!#nSe fizermos isso, a fama desta Makoto-sama será...!"
2003303-147 = "Kikiki! Este é o resort que nós, do Pandemonium, administramos."
2003303-148 = "Atualmente, estamos distribuindo cupons de desconto especial e broches do fã-clube do Pandemonium para todos os clientes. Com isso, vamos aumentar ainda mais nossa influência...!"
2003303-156 = "（Depois de terminar de visitar os vários empreendimentos do Pandemonium, desta vez visitamos a rua comercial de Gehenna）"
2003303-157 = "Bem, eu te mostrei vários negócios, mas... o que achou?"
2003303-158 = "Deixe-me ouvir suas impressões, Sensei."
2003303-159 = "[s] \"A Makoto cuida de vários negócios, hein.\""
2003303-160 = "Kishishi. Ah, exatamente."
2003303-161 = "Mesmo neste momento, estou pensando em como posso expandir o Pandemonium e fazer com que os negócios sejam um sucesso."
2003303-162 = "E também..."
2003303-163 = "Como posso espalhar o nome desta Makoto-sama."
2003303-164 = "Claro, toda vez que expandimos os negócios assim, a Iroha fica reclamando."
2003303-165 = "[s] \"Como eu vi o local, consigo imaginar mais ou menos...\""
2003303-166 = "O-o quê!?"
2003303-167 = "B-bem... se continuarmos aumentando nosso poder de forma constante e silenciarmos completamente o Comitê Disciplinar, poderemos dominar Gehenna...#nNão, poderemos dominar todo o Kivotos!"
2003303-168 = "Com isso, você deve ter sentido novamente a grandiosidade de nós, do Pandemonium."
2003303-169 = "E então, Sensei. Você se sentiu inclinado a unir forças com esta Makoto-sama?"
2003303-170 = "[s] \"Hmm... desculpe, Makoto. Acho que isso é difícil...\""
2003303-175 = "Hm? Que barulho é esse?"
2003303-177 = "Por isso, se o senhor estocar este produto, poderá esperar novos clientes!"
2003303-178 = "Não me interessa. Não podemos lidar com esse tipo de coisa na nossa rua comercial!"
2003303-179 = "...Vovô! O parceiro de negócios é ninguém menos que o Pandemonium!?#nCom certeza atrairemos mais clientes do que agora, e quanto ao dinheiro..."
2003303-180 = "Puxa vida, é por isso que os jovens de hoje! Só sabem falar de dinheiro, dinheiro, dinheiro!#nSe a loja for fechada, os clientes fiéis ficarão em apuros!"
2003303-182 = "Por isso, a quantidade de estoque é apenas..."
2003303-183 = "...O que está acontecendo?"
2003303-184 = "Ah... M-Makoto-sama!"
2003303-185 = "Hum, aquele ali é um intermediário que eu conheço. Algum problema?"
2003303-186 = "I-isso é..."
2003303-187 = "Entendo. Então você é o figurão que mandou esse cara vir aqui e instruiu nossa rua comercial a estocar algo chamado \"Conjunto de Lembranças Especial do Pandemonium - Hanuma Makoto\"?"
2003303-188 = "[s] \"...Conjunto Hanuma Makoto?\""
2003303-189 = "Ah, é verdade, eu planejei um produto assim... Então, qual é o problema?"
2003303-190 = "Vou falar claramente.#nFechar a loja atual e reconstruí-la apenas para estocar produtos tão suspeitos é algo inaceitável."
2003303-191 = "Mesmo que você tenha comprado a loja, isso é terrível demais! O que faremos com os clientes fiéis que nos apoiam? Como alguém que protege a rua comercial, não posso permitir tal tratamento!"
2003303-192 = "Isso mesmo!"
2003303-193 = "O presidente está certo!"
2003303-194 = "Não vamos deixar que façam o que quiserem!"
2003303-196 = "I-isso é um exagero, não tenho motivos para ouvir isso...!"
2003303-197 = "Entendo... Kishishi.#nEntão, vocês pretendem atrapalhar os negócios desta Makoto-sama... entendo, entendo."
2003303-198 = "Francamente, não tem jeito..."
2003303-199 = "[s] \"E-espere, Makoto. Não seja tão emocional...\""
2003303-200 = "Todos, escutem bem!"
2003303-205 = "O objetivo dos nossos negócios é, acima de tudo, espalhar o nome do Pandemonium!#nPara isso, quero construir um bom relacionamento com todos que vivem em Gehenna."
2003303-206 = "...Claro, o Comitê Disciplinar é uma exceção."
2003303-207 = "Desta vez, embora não fosse minha intenção, peço desculpas por ter causado esse tipo de problema."
2003303-208 = "Eu também quero evitar conflitos com a rua comercial. Se houver insatisfação, estou disposta a ouvir e resolver."
2003303-209 = "E que tal buscarmos um ponto de compromisso entre nós?"
2003303-210 = "Assim não haverá problemas, certo?"
2003303-211 = "É verdade!?"
2003303-212 = "……você tem certeza disso?"
2003303-213 = "Kishishi, é claro. A Makoto-sama é generosa e misericordiosa, afinal."
2003303-214 = "……ah, exceto quando se trata do Comitê Disciplinar."
2003303-215 = "……nós também nos exaltamos, foi mal. Agradecemos!"
2003303-220 = "Hmph, então o caso está encerrado."
2003303-221 = "[s] \"Fiquei surpreso agora pouco, foi realmente incrível.\""
2003303-222 = "……ah."
2003303-223 = "Para quem está no topo do Pandemonium, esse tipo de coisa é o dia a dia."
2003303-224 = "Um líder não deve se deixar levar por acontecimentos triviais, afinal."
2003303-225 = "Mais importante que isso…… Kiki. #nDepois de ver o desempenho desta Makoto-sama, finalmente decidiu cooperar com o Pandemonium?"
2003303-226 = "[s] \"Uma coisa não tem nada a ver com a outra.\""
2003303-227 = "Guh! Ainda não foi o suficiente!"
2003303-228 = "……hmph, bem, tudo bem."
2003303-229 = "Isso significa que nem mesmo eu, Hanuma Makoto, estou à altura do nível do Sensei ainda."
2003303-230 = "[s] \"Isso soa como um exagero...\""
2003303-231 = "Mas! A Makoto-sama nunca desiste!"
2003303-232 = "Algum dia…… eu farei o Sensei ser meu!"
2003303-233 = "Kikiki... Kyahahahahaha!! Pode esperar por esse dia!"
2003303-234 = "[s] \"Ah, sim... pega leve comigo, tá?\""
