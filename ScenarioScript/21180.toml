[translation]
21180-1 = "Episódio 18; G.Bible"
21180-2 = "Millennium - Depto. de Desenvolvimento de Jogos"
21180-4 = "G.Bible... inicializar!"
21180-6 = "[56cd7b]Bem-vindo ao mundo da G.Bible."
21180-8 = "C-Começou!"
21180-9 = "[56cd7b]O que é o melhor jogo de todos... A busca por diversas respostas para esta pergunta #n[56cd7b]tem continuado por todo o mundo."
21180-11 = "[56cd7b]A qualidade da obra, popularidade, vendas, uma história maravilhosa ou a sensação de empolgação, uma direção de arrepiar, entre outros."
21180-13 = "[56cd7b]Esses elementos são frequentemente citados como 'condições' para o melhor jogo, mas #n[56cd7b]todos eles não passam de meros galhos e folhas da 'verdade'."
21180-16 = "[56cd7b]O segredo para criar o melhor jogo de todos, é apenas um."
21180-18 = "[56cd7b]E esta G.Bible, guarda essa verdade."
21180-20 = "F-Finalmente!"
21180-21 = "Isso parece incrível..."
21180-22 = "[56cd7b]A única verdade, o método secreto para criar o melhor jogo de todos... #n[56cd7b]Ireie ensiná-lo a você agora."
21180-24 = "Aí vem...!"
21180-25 = "[56cd7b]......"
21180-28 = "[56cd7b]......"
21180-30 = "[56cd7b]A"
21180-32 = "[56cd7b]m"
21180-34 = "[56cd7b]e"
21180-36 = "[56cd7b] "
21180-38 = "[56cd7b]o"
21180-40 = "[56cd7b]s"
21180-42 = "[56cd7b] "
21180-44 = "[56cd7b]j"
21180-45 = "[56cd7b]o"
21180-46 = "[56cd7b]g"
21180-47 = "[56cd7b]o"
21180-48 = "[56cd7b]s"
21180-49 = "Uau... Parece a cena de abertura. Bem no estilo!"
21180-50 = "A-Acha mesmo?"
21180-51 = "[56cd7b]Ame os jogos"
21180-52 = "......Não me diga que, acabou aí... Né?"
21180-56 = "D-Deu algum bug, não é?"
21180-58 = "Espera aí!"
21180-60 = "Ehm, onde ficam as configurações..."
21180-61 = "[56cd7b]Ame os jogos"
21180-63 = "[56cd7b]O fato de você ter apertado este botão significa que, #n[56cd7b]você está numa situação onde suspeita que o arquivo possa estar corrompido, ou se houve algum problema..."
21180-64 = "[56cd7b]Ou ainda, se algum tipo de erro ocorreu."
21180-66 = "Ah, sabia! Não tinha como acabar só nisso!"
21180-69 = "[56cd7b]Porém, [wa:500]não é um erro."
21180-70 = "Mentira!?"
21180-71 = "[56cd7b]Lamento, mas esta é a conclusão."
21180-72 = "[56cd7b]Ame os jogos!"
21180-73 = "I-Isso é impossível! Com certeza é um erro...!"
21180-74 = "Não há sinais de corrupção ou modificação no arquivo... A última informação de transferência, o tamanho do arquivo e a estrutura dos dados também estão normais."
21180-76 = "E-Então, isso realmente..."
21180-78 = "A-Acabou aqui!?"
21180-79 = "......M,"
21180-80 = "Mana... Será que nós tivemos um pesadelo..."
21180-81 = "Acabooouuuuuuuu!!!"
21180-82 = "(E agora...)"
21180-83 = "Ehm, Momoi... Você não vai fazer as missões diárias?"
21180-84 = "Você sempre dizia que 'Não há nada mais importante que as missões diárias'..."
21180-85 = "Aris... O meu HP já chegou a zero..."
21180-86 = "Ehm..."
21180-87 = "Midori...?"
21180-89 = "Desculpe, Aris-chan... Eu já sabia disso, mas a realidade é basicamente isso mesmo... Sim, ou seja, este é o True End... Um desfecho diferente do Happy End..."
21180-90 = "......"
21180-91 = "O-Onde está a Yuzu... Yuzu?"
21180-92 = "Provavelmente ela se trancou no armário de novo. Se você olhar bem, o armário às vezes dá umas tremidinhas, não dá?"
21180-93 = "A situação de vocês agora..."
21180-95 = "Parece que a sanidade fez logoff."
21180-96 = "Uugh..."
21180-97 = "Não dá pra evitar, era o nosso último recurso! Mas só ter uma única frase que todo mundo conhece escrita lá dentro! É muito clickbait pra uma coisa só!"
21180-98 = "Eu já sabia! Não existe um método fácil no mundo onde uma única coisa muda tudo e faz tudo dar certo! Mas a gente pode pelo menos criar expectativas, né! Uwaaaahhh!"
21180-99 = "Haa..."
21180-100 = "Desculpe, Aris-chan... Nós... não conseguimos criar um bom jogo sem a G.Bible..."
21180-101 = "......"
21180-102 = "Não."
21180-103 = "Eu nego."
21180-104 = "Sempre que a Aris joga 'Tales Saga Chronicle', ela pensa o seguinte."
21180-105 = "Que jogo divertido."
21180-106 = "Eh?"
21180-107 = "Dá pra sentir."
21180-108 = "Que a Momoi, a Midori e a Yuzu..."
21180-109 = "Amam muito este jogo."
21180-110 = "Quando eu viajo por aquele mundo, cheio de tantos sentimentos..."
21180-111 = "......O meu coração dispara."
21180-112 = "Aquela sensação de viajar para um mundo novo com meus companheiros..."
21180-113 = "Me ensinou... a sensação de como é sonhar."
21180-114 = "É por isso que, por mais que eu sofresse tanto quanto mais eu me aproximava do tão aguardado final do jogo, eu pensava..."
21180-115 = "Gostaria de não acordar desse sonho."
21180-116 = "É o que a Aris pensa."
21180-117 = "Aris..."
21180-118 = "......"
21180-119 = "Uwaah, Yuzu-chan!? Desde quando você tava aí!?"
21180-120 = "Desde que vocês começaram a falar de 'Tales Saga Chronicle'..."
21180-121 = "Você tava aí desde o começo!?"
21180-122 = "......Vamos criá-lo."
21180-124 = "Eh?"
21180-126 = "O meu sonho... era que as pessoas dissessem que os jogos que eu crio são divertidos."
21180-129 = "Mas aquele primeiro protótipo de 'Tales Saga Chronicle' que eu criei... só rendeu mais de quatro mil comentários com notas baixas e zombarias..."
21180-131 = "Isso foi tão doloroso que me tranquei no Departamento de Desenvolvimento de Jogos, até que..."
21180-133 = "Vocês duas vieram me visitar."
21180-135 = "(6 meses atrás...)"
21180-137 = "[56cd7b]Isso é um jogo?"
21180-139 = "[56cd7b]Sinceramente, tô curioso pra saber o que passa na cabeça de quem criou isso..."
21180-141 = "[56cd7b]O cérebro dela é impressionante... quer dizer, eu ia falar isso, mas duvido que tenha um aí dentro."
21180-142 = "[56cd7b]Acho que quem fez isso não entende nada de jogos."
21180-143 = "[56cd7b]É bom você se colocar no seu lugar."
21180-145 = "[56cd7b]Isso nem pode ser chamado de jogo, é só um lixo que parece um jogo."
21180-147 = "Uuuh..."
21180-148 = "Parem... me desculpem, me desculpem..."
21180-149 = "Por favor, eu imploro... me perdoem...!"
21180-150 = "(Toc, toc, toc!)"
21180-151 = "Hiii!"
21180-152 = "Q-Quem...?"
21180-153 = "Ehm, aqui é o Departamento de Desenvolvimento de Jogos da Millennium, que fez o protótipo do 'Tales Saga Chronicle'?"
21180-154 = "O-O que...? Agora vão vir falar na minha cara...?"
21180-155 = "M-Me desculpem, me desculpem...! Eu nunca mais vou fazer jogos na minha vida, então, por favor, me perdoem...!"
21180-156 = "Eeeh!?"
21180-157 = "O que você tá falando, o jogo é super divertido! Por que parar tendo feito só o protótipo!"
21180-158 = "Nós estamos morrendo de curiosidade pra saber como a história continua!? Deixar a gente na vontade assim é sacanagem!"
21180-159 = "......Eh?"
21180-160 = "O 'Tales Saga Chronicle' é super divertido!"
21180-161 = "A mana até virou a noite jogando."
21180-163 = "A Midori também tava jogando com um sorrisinho no rosto! E olha que ela nem ligava tanto para jogos antes!"
21180-164 = "E-Ehm... É verdade que o jogo era em pixel art, mas os personagens eram super fofos..."
21180-165 = "De qualquer forma, com licença! Vamos entrar!"
21180-166 = "(Clack!)"
21180-167 = "......!?"
21180-168 = "Você é a UZ-sama!?"
21180-174 = "Eh... a, s-sim..."
21180-177 = "Somos suas fãs!!"
21180-178 = "Eu, e a Midori também! Nós queremos criar um jogo divertido como os da UZ-sama!"
21180-179 = "......!!"
21180-180 = "......"
21180-181 = "......E então, vocês duas vieram."
21180-182 = "Juntas, nós terminamos o 'Tales Saga Chronicle'... mesmo que tenha ficado em 1º lugar no ranking de Piores Jogos deste ano..."
21180-183 = "Ugh..."
21180-184 = "......"
21180-185 = "Depois, a Aris-chan apareceu..."
21180-186 = "E disse que era divertido. E com isso, o meu sonho se realizou."
21180-187 = "Criar jogos com companheiros tão especiais que eu consigo me conectar de coração, e as pessoas dizerem que os jogos são divertidos... Esse sonho, que eu só imaginava sozinha por tanto tempo."
21180-188 = "......"
21180-189 = "Pedir mais do que isso talvez seja egoísmo da minha parte. Mas, se for possível, eu não quero que esse sonho... acabe."
21180-190 = "Yuzu-chan..."
21180-191 = "......Sim, então vamos lá!"
21180-192 = "Ei, quanto tempo falta até o Millennium Prize?"
21180-193 = "Mana...!"
21180-194 = "São 6 dias, 4 horas e 38 minutos."
21180-196 = "......Isso é mais que o suficiente."
21180-198 = "Agora, todo o Departamento de Desenvolvimento de Jogos!"
21180-200 = "Vamos começar a desenvolver o 'Tales Saga Chronicle 2'!!"
21180-201 = "Sim!"
21180-203 = "Próximo Episódio; Double O"