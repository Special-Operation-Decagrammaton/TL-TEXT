[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21180-1 = "Episódio 18: G.Bible"
21180-2 = "Millennium · Clube de Desenvolvimento de Jogos"
21180-4 = "G.Bible…… iniciar!"
21180-6 = "[56cd7b]Bem-vindas ao mundo da G.Bible."
21180-8 = "C-começou!"
21180-9 = "[56cd7b]O que é o melhor jogo do mundo…… para esta pergunta,#n[56cd7b]as mais variadas respostas vêm sendo buscadas pelo mundo afora."
21180-11 = "[56cd7b]Qualidade artística, popularidade, vendas, uma história magnífica, a sensação de satisfação, encenações de arrepiar……"
21180-13 = "[56cd7b]Essas coisas são, muitas vezes, apontadas como \"condições\" do melhor jogo, mas#n[56cd7b]todas elas não passam de galhos e folhas da \"verdade\"."
21180-16 = "[56cd7b]O segredo para criar o melhor jogo é um só."
21180-18 = "[56cd7b]E, nesta G.Bible, está oculta essa verdade."
21180-20 = "É-é agora!"
21180-21 = "Parece ser uma coisa e tanto……"
21180-22 = "[56cd7b]A única verdade para criar o melhor jogo, o método secreto……#n[56cd7b]é isso que eu vou lhes ensinar agora."
21180-24 = "Lá vem……!"
21180-25 = "[56cd7b]……"
21180-28 = "[56cd7b]……"
21180-30 = "[56cd7b]A"
21180-32 = "[56cd7b]M"
21180-34 = "[56cd7b]E"
21180-36 = "[56cd7b]O"
21180-38 = "[56cd7b]S"
21180-40 = "[56cd7b]JOGO"
21180-42 = "[56cd7b]S"
21180-44 = "Ooh…… parece tipo uma abertura, né.\nTá com cara de coisa boa!"
21180-45 = "S-será?"
21180-46 = "[56cd7b]Ame os jogos"
21180-48 = "……Não me diga que é só isso…… né, que não é?"
21180-49 = "S-será que não bugou?"
21180-50 = "Peraí!"
21180-51 = "Deixa ver, onde fica a opção de configuração……"
21180-52 = "[56cd7b]Ame os jogos"
21180-56 = "[56cd7b]Se você apertou este botão, é porque#n[56cd7b]deve estar desconfiando de que o arquivo corrompeu, ou que houve algum problema,"
21180-58 = "[56cd7b]de que ocorreu algum tipo de erro……, é essa a situação, não é?"
21180-60 = "Ah, eu sabia! Não tinha como acabar assim!"
21180-61 = "[56cd7b]Porém, [wa:500]não se trata de um erro."
21180-63 = "Mentiraaa!?"
21180-64 = "[56cd7b]Lamento, mas esta é a conclusão."
21180-66 = "[56cd7b]Ame os jogos!"
21180-69 = "I-isso não pode ser! Com certeza tem algum erro……!"
21180-70 = "Não dá pra achar dano nem correção no arquivo……\núltima informação de transferência, tamanho do\narquivo, e a estrutura dos dados, tudo sem problema."
21180-71 = "E-então, de verdade……"
21180-72 = "É-é isto, o fim!?"
21180-73 = "……M-,"
21180-74 = "mana…… será que a gente tá tendo\nalgum pesadelo……"
21180-76 = "É o fiiiimmm!!!"
21180-78 = "(E, agora……)"
21180-79 = "Ãh, Momoi…… você não vai fazer\na missão diária?"
21180-80 = "Você que sempre dizia \"não existe nada mais\nimportante do que a missão diária\"……"
21180-81 = "Aris…… o meu HP já é zero……"
21180-82 = "Ãh……"
21180-83 = "Midori……?"
21180-84 = "Desculpa, Aris…… eu já sabia, mas a realidade,\noriginalmente, é assim mesmo…… sim, ou seja, isto\né o final verdadeiro…… um ponto de chegada\ndiferente do final feliz……"
21180-85 = "……"
21180-86 = "E-e a Yuzu…… cadê a Yuzu?"
21180-87 = "Provavelmente ela tá enfiada dentro do armário\nde novo. Olha bem, o armário de vez em quando\ntá tremelicando, viu?"
21180-89 = "O estado de todas vocês agora……"
21180-90 = "é como se a sanidade tivesse dado logout."
21180-91 = "Uuh……"
21180-92 = "Não tinha jeito, era o último recurso! E aí era só\numa frase que todo mundo já conhece! Tem limite\npra trollagem!"
21180-93 = "Eu já sabia! Que não existe no mundo um método\nfácil assim, que só com ele tudo muda e dá certo!\nMas até que a gente pode criar uma esperancinha,\nnão pode!? Buááááá!"
21180-95 = "Haah……"
21180-96 = "Desculpa, Aris…… a gente…… sem a G.Bible,\nnão consegue fazer um bom jogo……"
21180-97 = "……"
21180-98 = "Não."
21180-99 = "Eu nego isso."
21180-100 = "Toda vez que joga o \"Tales Saga Chronicle\",\na Aris pensa o seguinte."
21180-101 = "Aquele jogo é divertido."
21180-102 = "Hã?"
21180-103 = "Dá pra sentir."
21180-104 = "O quanto a Momoi, a Midori, a Yuzu……"
21180-105 = "amam este jogo."
21180-106 = "Quando se viaja por aquele mundo, no qual foram\ndepositados tantos sentimentos……"
21180-107 = "……o peito dispara."
21180-108 = "Aquela sensação de viajar por um mundo novo\njunto dos companheiros……"
21180-109 = "Ela me ensinou o que é sonhar……\nessa sensação, a Aris aprendeu."
21180-110 = "Por isso, quanto mais eu me aproximava do tão\nesperado final, mesmo sofrendo tanto, eu acabava\npensando……"
21180-111 = "Tomara que este sonho…… nunca acabe."
21180-112 = "É isso que a Aris pensa."
21180-113 = "Aris……"
21180-114 = "……"
21180-115 = "Ué, uaah, Yuzu!? Desde quando você tá aí!?"
21180-116 = "Desde que a conversa sobre o\n\"Tales Saga Chronicle\" começou……"
21180-117 = "Você tava aí desde o começo!?"
21180-118 = "……Vamos fazer."
21180-119 = "Hã?"
21180-120 = "O meu sonho é…… ouvir todo mundo dizer\nque o jogo que eu fiz é divertido."
21180-121 = "Mas o protótipo do \"Tales Saga Chronicle\", o\nprimeiro que eu fiz…… terminou só com mais de mil\ncomentários de avaliação baixa, e puro deboche……"
21180-122 = "Isso doeu, e foi quando eu me tranquei\nno Clube de Desenvolvimento de Jogos……"
21180-124 = "que as duas vieram me visitar."
21180-126 = "(6 meses atrás……)"
21180-129 = "[56cd7b]Isto é um jogo?"
21180-131 = "[56cd7b]Fico até curioso pra saber o que se passa na cabeça de quem fez isto……"
21180-133 = "[56cd7b]Eu ia dizer \"os miolos\"…… mas é até duvidoso que tenha algum aí dentro."
21180-135 = "[56cd7b]Isso não foi feito por alguém que não entende nada de jogo?"
21180-137 = "[56cd7b]Melhor conhecer os próprios limites."
21180-139 = "[56cd7b]Isto não é jogo coisa nenhuma; é lixo com cara de jogo."
21180-141 = "Uuh……"
21180-142 = "Parem…… me desculpem, me desculpem……"
21180-143 = "Por favor, já chega…… me perdoem……!"
21180-145 = "(Toc, toc, toc!)"
21180-147 = "Iih!"
21180-148 = "Q-quem é……?"
21180-149 = "Ãh, aqui é o Clube de Desenvolvimento de Jogos da\nMillennium, que fez o protótipo do \"Tales Saga\nChronicle\", é isso?"
21180-150 = "Q-que…… agora é pessoalmente……?"
21180-151 = "M-me desculpa, me desculpa……! Eu nunca mais\nfaço jogo, então, por favor, me perdoa……!"
21180-152 = "Heein!?"
21180-153 = "Que é que você tá falando, sendo tão divertido!\nFazer só o protótipo e largar!"
21180-154 = "Eu tô super curiosa pra continuação, viu!? Depois de\ndeixar a gente toda empolgada, não pode largar assim!"
21180-155 = "……Hã?"
21180-156 = "O \"Tales Saga Chronicle\" foi divertidíssimo!"
21180-157 = "A mana virou a noite jogando, né."
21180-158 = "A Midori também jogou com aquele sorrisão na cara!\nSendo que nem ligava muito pra jogo!"
21180-159 = "Hã, é-é…… é verdade, era em pixel, mas os\npersonagens e tudo eram super fofos……"
21180-160 = "Enfim, ãh! Com licença!"
21180-161 = "(Cláqui!)"
21180-163 = "……!?"
21180-164 = "Você é a UZ!?"
21180-165 = "Hã…… a-ah, s-sim……"
21180-166 = "Sou sua fã!!"
21180-167 = "Eu, e a Midori! A gente quer fazer jogos\ndivertidos, igual a UZ!"
21180-168 = "……Kh!!"
21180-174 = "……"
21180-177 = "……E então, as duas vieram até mim."
21180-178 = "Completamos juntas o \"Tales Saga Chronicle\"……\ne, no fim, ele virou o nº 1 do Ranking dos Piores\nJogos do Ano, mas……"
21180-179 = "Uh……"
21180-180 = "……"
21180-181 = "Depois disso, a Aris veio me visitar……"
21180-182 = "E disse que era divertido. E, com isso,\no meu sonho se realizou."
21180-183 = "Fazer jogo junto com companheiras queridas, de\ncoração ligado ao meu, e ouvir delas que é\ndivertido…… aquele sonho que eu só ficava\nimaginando sozinha, todo esse tempo."
21180-184 = "……"
21180-185 = "Querer mais do que isso talvez seja ganância. Mas,\nse for possível, eu queria que este sonho……\ndaqui pra frente, também não acabasse."
21180-186 = "Yuzu……"
21180-187 = "……Sim, boa!"
21180-188 = "Ei, de agora até o Prêmio Millennium,\nquanto tempo ainda resta?"
21180-190 = "Mana……!"
21180-191 = "6 dias, 4 horas e 38 minutos."
21180-192 = "……Com isso já é o suficiente."
21180-193 = "Vamos lá, Clube de Desenvolvimento de Jogos!"
21180-194 = "Bora começar o desenvolvimento\ndo \"Tales Saga Chronicle 2\"!!"
21180-196 = "Sim!"
21180-198 = "Próximo episódio: Double-O"