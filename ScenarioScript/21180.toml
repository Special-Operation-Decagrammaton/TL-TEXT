[translation]
21180-1 = "Episódio 18; G.Bible"
21180-2 = "Departamento de Desenvolvimento de Jogos do Millennium"
21180-4 = "G.Bible... Iniciando!"
21180-6 = "[56cd7b]Bem-vindos ao mundo da G.Bible."
21180-8 = "C-começou!"
21180-9 = "[56cd7b]O que é o jogo perfeito... essa pergunta tem sido #n[56cd7b]explorada de várias formas ao redor do mundo."
21180-11 = "[56cd7b]Qualidade, popularidade, vendas, uma história incrível, sensação de satisfação, direção de arte de arrepiar, etc."
21180-13 = "[56cd7b]Muitas vezes, essas coisas são citadas como \"condições\" para um jogo perfeito, #n[56cd7b]mas todas elas não passam de meros detalhes da \"verdade\"."
21180-16 = "[56cd7b]O segredo para criar o jogo perfeito, existe apenas um."
21180-18 = "[56cd7b]E nesta G.Bible, essa verdade está escondida."
21180-20 = "E-está na hora!"
21180-21 = "Parece algo grandioso..."
21180-22 = "[56cd7b]A única verdade, o método secreto para criar o jogo perfeito... #n[56cd7b]está na hora de eu lhes ensinar."
21180-24 = "Lá vem...!"
21180-25 = "[56cd7b]..."
21180-28 = "[56cd7b]..."
21180-30 = "[56cd7b]Ame"
21180-32 = "[56cd7b]o"
21180-34 = "[56cd7b]jogo"
21180-36 = "[56cd7b]..."
21180-38 = "[56cd7b]..."
21180-40 = "[56cd7b]..."
21180-42 = "[56cd7b]..."
21180-44 = "Uau... parece uma abertura. Bem convincente!"
21180-45 = "S-sério?"
21180-46 = "[56cd7b]Ame o jogo"
21180-48 = "...Não me diga que isso é tudo... não pode ser, né?"
21180-49 = "N-não tem algo bugado aí?"
21180-50 = "Espere um pouco!"
21180-51 = "Hum, onde é que muda as configurações..."
21180-52 = "[56cd7b]Ame o jogo"
21180-56 = "[56cd7b]Se você apertou este botão, é porque está suspeitando que #n[56cd7b]o arquivo está corrompido ou que houve algum problema,"
21180-58 = "[56cd7b]ou que algum erro ocorreu..."
21180-60 = "Ah, eu sabia! Não tem como acabar assim!"
21180-61 = "[56cd7b]No entanto, [wa:500] não é um erro."
21180-63 = "Mentira!?"
21180-64 = "[56cd7b]Sinto muito, mas esta é a conclusão."
21180-66 = "[56cd7b]Ame o jogo!"
21180-69 = "N-não pode ser! Com certeza tem algum erro...!"
21180-70 = "Não vejo danos nos arquivos nem correções... as informações de transferência, tamanho do arquivo e estrutura de dados estão perfeitas."
21180-71 = "E-então, é realmente..."
21180-72 = "I-isso é o fim!?"
21180-73 = "...Irmã..."
21180-74 = "Irmãzinha... será que tivemos um pesadelo..."
21180-76 = "ACABOUUUUU!!!"
21180-78 = "(E agora...)"
21180-79 = "Ei, Momoi... você não vai fazer as missões diárias?"
21180-80 = "Você sempre dizia que \"não existe nada mais importante do que as missões diárias\"..."
21180-81 = "Alice... meu HP já está em zero..."
21180-82 = "Hum..."
21180-83 = "Midori...?"
21180-84 = "Desculpa, Alice-chan... Eu sabia, mas a realidade é assim mesmo... Sim, ou seja, este é o final verdadeiro... Um ponto de chegada diferente do final feliz..."
21180-85 = "..."
21180-86 = "Yu, Yuzu está... Onde está a Yuzu?"
21180-87 = "Provavelmente, ela se trancou no armário de novo. Olha bem, o armário não está tremendo de vez em quando?"
21180-89 = "O estado de todo mundo agora é..."
21180-90 = "Parece que a sanidade fez logout."
21180-91 = "Ugh..."
21180-92 = "Não tem como evitar, era nossa última cartada! E pensar que só tinha aquela frase que todo mundo conhece! Isso é uma pegadinha de mau gosto!"
21180-93 = "Eu sabia! Não existe no mundo um método conveniente onde uma única coisa resolve tudo e faz tudo dar certo! Mas não tem problema ter esperança, né! Uaaaaaah!"
21180-95 = "Haa..."
21180-96 = "Desculpa, Alice-chan... Nós... sem a G.Bible, não conseguimos fazer um bom jogo..."
21180-97 = "..."
21180-98 = "Não."
21180-99 = "Eu discordo."
21180-100 = "Toda vez que a Alice joga 'Tales Saga Chronicle', eu penso."
21180-101 = "Aquele jogo é divertido."
21180-102 = "Hã?"
21180-103 = "Eu consigo sentir."
21180-104 = "O quanto a Momoi, a Midori e a Yuzu..."
21180-105 = "Amam este jogo."
21180-106 = "Quando viajo por aquele mundo, onde tantos sentimentos foram depositados..."
21180-107 = "...meu coração dispara."
21180-108 = "Aquela sensação de viajar por um novo mundo junto com os amigos..."
21180-109 = "Me ensinou o que significa... sonhar."
21180-110 = "Por isso, mesmo tendo sofrido tanto, quanto mais me aproximo do tão esperado final, eu penso..."
21180-111 = "Que seria bom se esse sonho nunca acabasse..."
21180-112 = "É isso que a Alice pensa."
21180-113 = "Alice..."
21180-114 = "..."
21180-115 = "Eita, Yuzu-chan!? Desde quando você está aí!?"
21180-116 = "Desde que a conversa sobre 'Tales Saga Chronicle' começou..."
21180-117 = "Você estava aí desde o começo!?"
21180-118 = "...Vamos fazer."
21180-119 = "Hã?"
21180-120 = "Meu sonho é... fazer com que todos digam que o jogo que eu criei é divertido."
21180-121 = "Mas o protótipo do 'Tales Saga Chronicle' que eu fiz pela primeira vez... terminou apenas com comentários de avaliação baixa de quatro dígitos e provocações..."
21180-122 = "Quando eu estava sofrendo com isso e me tranquei no Clube de Desenvolvimento de Jogos..."
21180-124 = "As duas vieram me visitar."
21180-126 = "(6 meses atrás...)"
21180-129 = "[56cd7b]Isso é um jogo?"
21180-131 = "[56cd7b]Na verdade, fico curiosa sobre o que se passa na cabeça de quem criou isso..."
21180-133 = "[56cd7b]Eu ia dizer que isso nem é coisa de cérebro, mas duvido que tenha um aí dentro."
21180-135 = "[56cd7b]Quem criou isso não entende nada de jogos, né?"
21180-137 = "[56cd7b]É melhor conhecer o seu lugar."
21180-139 = "[56cd7b]Isso não é um jogo, é um lixo que se parece com um jogo."
21180-141 = "Ugh..."
21180-142 = "Parem... desculpem, desculpem..."
21180-143 = "Por favor, chega... me perdoem...!"
21180-145 = "(Toc toc toc!)"
21180-147 = "Hii!"
21180-148 = "Q-quem é...?"
21180-149 = "Err, é aqui que fica o Departamento de Desenvolvimento de Jogos da Millennium, onde criaram o protótipo de 'Tales Saga Chronicle', certo?"
21180-150 = "O-o que... Agora vieram pessoalmente...?"
21180-151 = "D-desculpa, me desculpa...! Eu nunca mais vou fazer jogos, então, por favor, me perdoa...!"
21180-152 = "Hã!?"
21180-153 = "Do que você está falando? É tão divertido! Não pode parar só no protótipo!"
21180-154 = "Eu estou super curiosa para saber a continuação!? Você não pode deixar a gente empolgada assim e simplesmente parar!"
21180-155 = "……Hã?"
21180-156 = "'Tales Saga Chronicle' foi incrível!"
21180-157 = "A minha irmã ficou a noite toda jogando, sabe."
21180-158 = "A Midori também ficou jogando com um sorrisinho no rosto! E olha que ela nem tinha tanto interesse em jogos!"
21180-159 = "É, b-bem... É verdade, os personagens em pixel art eram muito fofos..."
21180-160 = "Enfim, ah! Com licença!"
21180-161 = "(Clack!)"
21180-163 = "……!?"
21180-164 = "Você é a UZ-sama!?"
21180-165 = "Hã... ah, s-sim..."
21180-166 = "Eu sou sua fã!!"
21180-167 = "Eu e a Midori também! Queremos criar jogos divertidos como você, UZ-sama!"
21180-168 = "……!!"
21180-174 = "……"
21180-177 = "……E foi assim que as duas vieram até mim."
21180-178 = "Terminamos 'Tales Saga Chronicle' juntas... embora tenhamos ficado em 1º lugar no ranking de jogos ruins daquele ano..."
21180-179 = "Ugh..."
21180-180 = "……"
21180-181 = "Depois disso, a Alice-chan veio nos visitar..."
21180-182 = "Ela disse que era divertido. E foi assim que o meu sonho se realizou."
21180-183 = "Criar jogos com amigos importantes que entendem o meu coração, e ouvir que eles são divertidos... Aquele sonho que eu sempre imaginei sozinha..."
21180-184 = "……"
21180-185 = "Talvez seja pedir demais, mas... se for possível, eu não quero que esse sonho... que esse momento acabe nunca."
21180-186 = "Yuzu-chan..."
21180-187 = "……Certo, vamos lá!"
21180-188 = "Ei, quanto tempo falta para o Millennium Prize?"
21180-190 = "Irmã...!"
21180-191 = "Faltam 6 dias e 4 horas e 38 minutos."
21180-192 = "……Isso é mais do que suficiente."
21180-193 = "Vamos lá, pessoal do Departamento de Desenvolvimento de Jogos!"
21180-194 = "Vamos começar o desenvolvimento de 'Tales Saga Chronicle 2'!!"
21180-196 = "Sim!"
21180-198 = "Próximo episódio: 00"
