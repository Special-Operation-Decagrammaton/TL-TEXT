[translation]
2000505-1 = "Após o uso, limpe os equipamentos e coloque-os de volta no lugar."
2000505-2 = "Praia de Mui"
2000505-3 = "（Enquanto espero Hifumi na areia, ouço o som de um tanque.）"
2000505-7 = "Sensei!"
2000505-9 = "Desculpe a demora!"
2000505-10 = "Então, vamos começar logo a tomar sol!"
2000505-11 = "[s] \"A propósito, como exatamente vamos tomar sol com um tanque...?\""
2000505-12 = "Como assim? Quando se fala em tomar sol, a gente pensa em um tanque, não é?"
2000505-13 = "Ah, falando nisso, acho que ainda não apresentei a 'Crusader-chan' direito para você, Sensei."
2000505-14 = "Já que estamos aqui, vou te ensinar sobre as características da 'Crusader-chan', uma por uma!"
2000505-15 = "Primeiro, proteção contra raios UV! Como a Crusader-chan não tem cúpula, ela vem equipada com um suporte de guarda-sol para proteger o comandante do sol."
2000505-16 = "Mesmo quando estamos no tanque, cuidar da pele é muito importante."
2000505-17 = "Mesmo sem um guarda-sol, com isso aqui está tudo resolvido!"
2000505-18 = "E tem a impermeabilização! Esta Crusader-chan carrega tapetes para facilitar o deslocamento do tanque em lugares como a praia."
2000505-19 = "Seria um problema se ela ficasse danificada pela areia ou lama, ou se acabasse indo para a direção errada."
2000505-20 = "O material é um pouco diferente, mas acho que serve muito bem como tapete de praia!"
2000505-21 = "Por fim, hidratação! A Crusader-chan possui um mecanismo embutido para ferver água para o chá a qualquer momento."
2000505-22 = "Quanto mais pressionado você está, mais precisa de paz de espírito... Não importa a situação, a hora do chá é um momento indispensável!"
2000505-23 = "Seja um chá quente ou um chá gelado, com esta 'Crusader-chan', podemos preparar na hora!"
2000505-24 = "[s1] \"Isso parece mais um kit de passeio de uma madame...\"\n[s2] \"...Que legal! É incrível!\""
2000505-25 = "Ahaha... bem, na verdade, é um equipamento da Academia Trinity, então..."
2000505-26 = "N-né? Eu também adoro a Crusader-chan. Acho que é um tanque maravilhoso...!"
2000505-27 = "Bem, então, vamos nos mover um pouco mais para a areia?"
2000505-31 = "Hum, aqui está bom...?"
2000505-32 = "Aqui pega sol e o vento é agradável..."
2000505-33 = "Ah, mas não dá para ver o mar direito... Vamos um pouco mais para lá?"
2000505-34 = "Então, vou movê-la um pouco mais em direção à beira-mar..."
2000505-36 = "Ah, ué? Sinto que as ondas estão mais altas do que antes..."
2000505-43 = "[ns] \"Você está bem!?\""
2000505-44 = "E-estou bem... não esperava que uma onda tão alta viesse de repente..."
2000505-45 = "Ainda bem que estou de roupa de banho. Não imaginei que ficaria tão encharcada aqui..."
2000505-46 = "Encharcada..."
2000505-47 = "...Aaaaaah!? A Crusader-chan também ficou encharcada!?"
2000505-48 = "[s] \"É ruim?\""
2000505-49 = "S-se fosse água comum, tudo bem, mas...!"
2000505-50 = "A Crusader-chan não foi tratada para lidar com água do mar... Se tocar em água salgada, ela enferruja na hora...!"
2000505-51 = "T-tenho que lavar antes que enferruje...!"
2000505-52 = "[s] \"Não dá para pedir água emprestada ali?\""
2000505-55 = "É verdade, vamos nos apressar...!"
2000505-56 = "[s] \"Parece que o banho de sol vai ficar para depois.\""
2000505-57 = "Sim, agora a Crusader-chan é a prioridade...!"
2000505-61 = "[wa:500]— Hum hum~♪[wa:1500] Limpando[wa:750] cada[wa:750] cantinho~♪"
2000505-64 = "— Não posso deixar a Crusader-chan[wa:930] enferrujar."
2000505-67 = "[wa:20]— Afinal,[wa:450] é algo que[wa:400] todos usam,"
2000505-69 = "— Preciso devolvê-la à academia[wa:400] em bom[wa:400] estado."
2000505-72 = "[wa:500]— Ah,[wa:700] Sensei."
2000505-74 = "[wa:200]— Se ficar muito perto,[wa:1350] pode acabar se molhando, sabe?"
2000505-77 = "[wa:100]— Como você está de roupa de banho,[wa:1000] não se importa[wa:600] de se molhar[wa:1400]... é isso?"
2000505-80 = "— É verdade.[wa:2150] Ah,[wa:850] então,[wa:400] já que estamos aqui,"
2000505-82 = "— Depois disso,[wa:500] vamos nadar[wa:300] juntos!"
2000505-85 = "Com isso, acho que conseguimos evitar que enferruje."
2000505-86 = "Mas, sem que eu percebesse, já escureceu..."
2000505-87 = "É uma pena, já que o dia estava tão bonito. Desculpe, mesmo você tendo vindo até aqui..."
2000505-88 = "[s] \"Não, não. Foi divertido passar o dia com a Hifumi.\""
2000505-89 = "Ahaha, acabamos passando quase o dia todo lavando o tanque... mas fico feliz em ouvir isso."
2000505-90 = "Mas, para mim também, apesar de ser uma lavagem, foi divertido brincar com água com o Sensei."
2000505-91 = "Hehe. Foi inesperado, mas esse tipo de coisa também é bom."
2000505-92 = "Vamos voltar para tomar um banho de sol em outro dia de tempo bom!"
2000505-94 = "Depois disso, voltei para o alojamento junto com a Hifumi no tanque."
