[translation]#[Texto Final. - Filipe 05/07.]
90100050-1 = "Episódio 5: Coleta de Informações"
90100050-3 = "Horário padrão de Kivotos: 10h30."
90100050-4 = "Neste momento, o Esquadrão FOX inicia a\ncoleta de informações da \"Operação A Caça às \"Lores\"."
90100050-5 = "Reportem-se."
90100050-9 = "Aqui é FOX4. Observando a movimentação\ndo alvo no ponto Oscar."
90100050-10 = "Nenhum sinal de anormalidade até agora."
90100050-11 = "Mas…… tem um probleminha minúsculo\nno ponto Oscar."
90100050-12 = "Especifique."
90100050-13 = "Que caloor…… eu tô suando parada.#nO verão não tava longe ainda?!"
90100050-14 = "Debaixo desse sol rachando, coberta com\num pano de camuflagem, eu vou derreter~"
90100050-15 = "A temperatura deste ano parece\nmais alta que o normal."
90100050-16 = "Na próxima, procure um ponto na sombra.\nFoi mal, mas dessa vez――"
90100050-20 = "FOX4, sem chorumela. Antigamente você\naguentava lugar bem mais quente."
90100050-21 = "Amoleceu na Agência Correcional, foi?"
90100050-22 = "FOX3, sem sermão no canal da operação.\nTreinada ou não, calor é calor."
90100050-23 = "Se eu pudesse ficar só de camisole no lugar\nde roupa de baixo, como certa pessoa――"
90100050-24 = "Eu uso roupa de baixo, tá?!"
90100050-28 = "……FOX3, prossiga o relatório."
90100050-29 = "A-Aqui é FOX3. Er, eu uso roupa\nde baixo decen――"
90100050-30 = "FOX3. Não leve as piadas da FOX4 a sério."
90100050-31 = "É, é verdade. Uu……"
90100050-35 = "Aqui é FOX3. Coletor de números de\nidentificação de assinante ativo\nno ponto Papa."
90100050-36 = "Cruzei os IDs de dispositivo coletados com a\ncontagem de alvos do ponto Oscar:#nestimo que não há ninguém identificável\nnum raio de 500m."
90100050-37 = "Se surgir sinal de anormalidade ou aparelho\nextra na área vigiada, reporto na hora."
90100050-38 = "FOX1, entendido."
90100050-42 = "Por fim, FOX2――"
90100050-48 = "Aqui também tá tudo pronto."
90100050-49 = "Suprimentos garantidos,\ndisfarce impecável……"
90100050-50 = "Quando o alvo se aproximar, começo a coleta\nde informações conforme o roteiro."
90100050-51 = "Ótimo. Sendo assim――"
90100050-52 = "[ns1] \"Que conversa impressionante……\"\n[ns2] \"O que vocês vão aprontar agora?\""
90100050-55 = "Sensei [USERNAME]."
90100050-56 = "Após a operação, faremos um debriefing\ncom a sua presença.#nAvisamos que não precisava\nnos acompanhar."
90100050-57 = "Algo o preocupa?"
90100050-58 = "[s3] \"É a primeira operação conjunta da FOX com a Schale!\"\n[s4] \"Eu queria ver a Yukino em ação de pertinho.\""
90100050-61 = "……Entendo."
90100050-62 = "Bem, retomando. Iniciando o briefing."
90100050-63 = "O primeiro objetivo da Operação Kon-Ko……\ndigo, da \"Operação A Caça às \"Lores\"#né mapear os incidentes em série que ocorrem\naqui―― nos arredores da estação Shirounagi."
90100050-64 = "[s] \"O que anda acontecendo aqui……?\""
90100050-65 = "Desde o mês passado, alunos vêm sendo\nencontrados desacordados, um caso atrás\ndo outro.#nBem na época em que a Presidente\ndo Conselho retornou."
90100050-67 = "As vítimas quase sempre são encontradas\nao meio-dia,#ne, sem ferimentos além de arranhões, a\nprimeira suspeita foi insolação."
90100050-68 = "Mas o pulso e a temperatura das vítimas\nestavam normais, e muitas convulsionavam\ncom força.#nPor isso, suspeita-se de outra coisa."
90100050-69 = "Além disso, todas relataram estar seguindo\num \"espantalho branco\" logo antes,#ne a Escola de Polícia Valkyrie investiga\na identidade dele."
90100050-71 = "Mas ninguém além das vítimas parece ter\nvisto o espantalho branco……#nA investigação está emperrada."
90100050-72 = "E, com as vítimas aumentando, os boatos se\nespalham: maldição de fantasma,\nobra de espírito maligno……"
90100050-73 = "Fantasma não existe, gente!#nTão tudo falando da boca pra fora."
90100050-74 = "Boato espalhado sem responsabilidade\nborra o contorno do caso."
90100050-75 = "Concordo com a opinião…… mas, no momento,\ntemos poucos elementos."
90100050-76 = "Só nos resta revirar o caso com calma\ne juntar provas."
90100050-77 = "[s] \"E o que vamos fazer agora?\""
90100050-78 = "Primeiro, entrevistar os envolvidos."
90100050-79 = "Para que falem naturalmente, nos disfarçamos\nde vendedores e puxamos o assunto."
90100050-80 = "[s] \"Vão vender inarizushi de novo?\""
90100050-81 = "Mudamos o cardápio para atrair melhor\no interesse do alvo.#nCom esse calor, seria complicado."
90100050-82 = "A vítima mais recente é uma atleta\ndo clube de atletismo de Gehenna."
90100050-83 = "O clube costuma treinar neste calçadão.#nCom pouco movimento, deve ser\nbom pra correr."
90100050-84 = "Verifiquei as redes sociais: há treino\nmarcado para hoje."
90100050-85 = "Sendo do mesmo clube, talvez saibam algo\nsobre os momentos antes de a vítima cair."
90100050-86 = "[s] \"Faz sentido……\""
90100050-87 = "Aqui é FOX4. Desculpa cortar o papo\nagradável, mas――"
90100050-88 = "o alvo está se aproximando do ponto."
90100050-92 = "FOX2, é com você."
90100050-93 = "Deixa comigo~"
90100050-100 = "Um, dois! Um, dois!"
90100050-101 = "Não percam o fôlego! Acompanhem o ritmo!"
90100050-105 = "Com licença~"
90100050-106 = "Ei, sai, sai da frente!"
90100050-107 = "Desculpa interromper o treino…… Aceitam\nexperimentar o novo isotônico\n\"HyperAde\"?"
90100050-108 = "Hã? Quê? Isotônico? Do nada?\nQue venda forçada é essa?!"
90100050-109 = "Não, não! Estou distribuindo amostras.\nFiquem à vontade!"
90100050-110 = "Isso tá suspeito……"
90100050-111 = "Fufu. Ainda é pouco conhecido, mas……\né o novo produto da famosa\nFarmacêutica Kozuka."
90100050-112 = "Tem propaganda, tem evento promocional……#nmas, hoje em dia, o que vale mesmo\né o boca a boca."
90100050-113 = "Por isso queríamos que o clube de atletismo\nprovasse. Se gostarem, ajudem\na divulgar, tá?"
90100050-114 = "Como vocês já devem saber, depois de\nexercício intenso os eletrólitos vão embora\njunto com o suor…… e o melhor é repor com um\nisotônico de absorção rápida.#nO \"HyperAde\" tem concentração de\neletrólitos maior que a concorrência――"
90100050-115 = "T-Tá, tá bom. Deu pra ver que é séria.#nVou provar um gole, vai."
90100050-116 = "Tô com sede mesmo, caiu bem."
90100050-121 = "Será que é o calor?#nMatou a sede mais rápido que o normal……"
90100050-122 = "Parece que absorve no segundo\nem que você bebe……"
90100050-123 = "Exato! Garantir a absorção dos eletrólitos\nem qualquer condição#né o forte do \"HyperAde\"!"
90100050-124 = "Trouxe bastante; tem repeteco, viu?"
90100050-125 = "Funciona tão bem assim? Então eu também……"
90100050-126 = "Eu também! Quero provar!"
90100050-130 = "Que negócio é aquele? Nunca nem\nouvi falar……"
90100050-131 = "A Kurumi com certeza já bebeu.#nÉ o pó de suco da SRT diluído em\n1,5 vez a dose recomendada."
90100050-132 = "Quê? Aquela limonada vagabunda?\nTanta alegria por causa daquilo……?"
90100050-133 = "Aquela ali teria vencido na vida como\nvendedora, não precisava nem de SRT."
90100050-134 = "(A guarda delas foi quebrada\ncom sucesso……)"
90100050-136 = "……Valeu pela bebida. Como que\na gente agradece?"
90100050-137 = "Foi um prazer servir! Se puderem, postem\numa avaliação sincera nas redes sociais."
90100050-138 = "Pode deixar! Vou recomendar em todo canto\npra espalhar a fama!"
90100050-143 = "……Falando em \"espalhar\", lembrei\nde uma coisa."
90100050-144 = "Faz um tempinho, ouvi que uma atleta\ndesmaiou aqui perto…… sabem dessa?"
90100050-148 = "Hã? Da Tama? Por que você tá――"
90100050-149 = "……Por que quer saber?"
90100050-150 = "Ah, não é por nada de mais."
90100050-151 = "É que andam acontecendo vários casos assim\npor aqui; achei melhor tomar cuidado……"
90100050-152 = "…………"
90100050-153 = "Não temos nada pra falar sobre isso."
90100050-154 = "Vai dizer que foi insolação, né?"
90100050-155 = "Sem saber de nada……"
90100050-156 = "A-Ah, será que――"
90100050-160 = "Valeu pelo isotônico."
90100050-167 = "Haa…… fracassei……"
90100050-168 = "Pisou bem no calo delas, hein~"
90100050-169 = "Aqui é FOX2…… foi mal, acho que\neu estraguei tudo."
90100050-170 = "Tudo bem. Nunca esperei que fossem\nreceptivas de primei――"
90100050-174 = "Espere, FOX2. Outra pessoa se aproximando."
90100050-181 = "Oi…… ainda tá distribuindo essa bebida?"
90100050-182 = "C-Claro! Aceita um copo?"
90100050-187 = "Valeu. Não conhecia a marca,\nfiquei curiosa."
90100050-191 = "Hmmm…… tem um gosto bem peculiar. Acho que\nnunca provei nada assim.#nDepois vou contar pra Kirara."
90100050-192 = "Aliás, nunca te vi por aqui.\nVeio de outra escola?"
90100050-193 = "S-Sim! É um pouco longe daqui…… é que……\nda Academia Particular Hyacinth……"
90100050-194 = "Hmm…… acho que já ouvi esse nome\nem algum lugar……"
90100050-195 = "Enfim, deixa quieto. Não liga pro que as\nmeninas do atletismo falaram.#nElas tão meio tensas por causa\ndaquele caso."
90100050-196 = "Aquele caso……?"
90100050-197 = "Uma menina do clube foi encontrada\ndesacordada."
90100050-198 = "É esse caso que te interessa, né?"
90100050-199 = "Não, eu só――"
90100050-200 = "Tá escrito na sua cara: \"eu PRECISO\nsaber desse boato\"."
90100050-201 = "Você também é bem fofoqueira, hein."
90100050-206 = "Haha…… fui tão óbvia assim?"
90100050-208 = "O atletismo de Gehenna vai ter a seletiva\nde titulares pro campeonato nacional.#nA menina que desmaiou era favorita."
90100050-209 = "Dizem que ela treinava até nas folgas,\ncorrendo sozinha."
90100050-210 = "Então, quando a acharam caída, todo mundo\nachou que ela tinha forçado demais\ne era insolação……"
90100050-212 = "……Mas não era insolação."
90100050-213 = "Isso. Já se espalhou nas redes, mas o corpo\ndela não tinha nada de errado.#nO clube de medicina de emergência de\nGehenna confirmou; não é fake."
90100050-214 = "Só que aí fica a dúvida: por que a FAVORITA\ndesmaiou do nada?#nJá tem boato de \"as outras do clube\namaldiçoaram de inveja\", \"fizeram\nmaldade com ela\"……"
90100050-215 = "Ah…… por isso aquela reação."
90100050-216 = "Pode até diminuir a concorrência pela vaga,\nmas ouvir uma dessas é péssimo, né?"
90100050-217 = "\"Cada uma na sua, sem ligar pros outros\"……#naté as alunas de Gehenna, com essa fama,\nse incomodam com boato ruim."
90100050-218 = "Pois é. Como dizem: apontado por mil dedos,\nmorre-se até sem doença."
90100050-219 = "Enfim, ela não tá em condições\nde responder.#nÉ triste pela menina do atletismo, mas só\nresta esperar o boato se dissipar."
90100050-223 = "……Boato, é."
90100050-224 = "Rumores, o que o vento traz…… histórias que\npassam de boca em boca sempre acabam\ncomparadas a fenômenos naturais."
90100050-225 = "Não param quando se tenta pará-las; e,\nquanto mais se resiste, mais fluem pra onde\nnão se espera, espalhando o estrago."
90100050-226 = "Para quem está no meio, deve ser como\nencarar uma onda gigante."
90100050-227 = "Entregar-se à onda e aceitar ser levado\naté é uma opção, mas……"
90100050-228 = "nós não somos barcos sem vontade própria."
90100050-229 = "Se não empunharmos os remos e avançarmos,\nnem que seja contra a onda――#nnão chegaremos ao destino certo."
90100050-234 = "Fala por experiência própria?"
90100050-235 = "É que…… não existe quase ninguém que nunca\ntenha virado semente de boato na vida."
90100050-236 = "Fufu, você é interessante."
90100050-237 = "Bora trocar MomoTalk? Vai que a gente\nse esbarra de novo."
90100050-238 = "Claro. Um momento, por favor."
90100050-243 = "Fechou. Te chamo depois, então.\nCuidado com o calor!"
90100050-249 = "Que aluna cheia de brilho, hein."
90100050-250 = "Pois é. Mas, FOX2…… você não passou\nsua conta de verdade, né?"
90100050-251 = "Relaxa. É uma que se apaga em 24 horas."
90100050-252 = "Se a gente tivesse se conhecido em outro\nlugar, quem sabe não viraria amizade……\nmas estamos em operação."
90100050-256 = "Aqui é FOX2. Operação concluída.\nJá tô voltando."
90100050-258 = "Próximo Episódio: Verdades e Mentiras"