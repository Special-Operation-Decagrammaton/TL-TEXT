[translation]
90100050-1 = "Episódio 5: Investigação de Campo"
90100050-3 = "Hora local, 1030 no relógio padrão de Kivotos."
90100050-4 = "Deste minuto em diante, o esquadrão FOX deflagra as operações de espionagem civil na rua para a 'Operação Rastreio das Lores Ocultas'."
90100050-5 = "Atenção nas linhas. Relatórios de posição."
90100050-9 = "Aqui é a FOX4. As minhas lentes fitam os movimentos dos alvos civis no ponto Oscar."
90100050-10 = "O perímetro não apita anomalias místicas até o segundo atual."
90100050-11 = "Contudo... a minha retaguarda aqui no ponto Oscar lida com um obstáculo logístico microscópico."
90100050-12 = "Desenhe a ameaça."
90100050-13 = "O calor tá infernal... Os canos de suor vazam da minha pele mesmo com o meu corpo parado.#nAs planilhas mentiram que a estação de verão tava longe?!"
90100050-14 = "Estofar a pele com manta de camuflagem debaixo do sol do asfalto quente vai derreter a nossa carne antes do combate~"
90100050-15 = "A climatologia aponta que o teto solar rompeu as médias normais deste ano civil."
90100050-16 = "A bússola tentará caçar o próximo ninho tático num setor de sombras. A paciência por ora――"
90100050-20 = "Corta a choradeira no rádio, FOX4. O histórico das botas da tropa já desbravou desertos piores e areias mais quentes antigamente, não lembra?"
90100050-21 = "Ou a rotina carcerária murchou os ossos do seu corpo pra não aguentar um solzinho de praça?"
90100050-22 = "Cala a boca, FOX3. O canal seguro não é palco pra lição de moral militar. O treinamento não congela glândula de suor não, porra!"
90100050-23 = "Fica muito fácil latir frescor quando a maluca tática, como certas patentes aqui, joga o pudor no asfalto e corre no batalhão só de liganete e zero roupa íntima pra abafar――"
90100050-24 = "O MEU SUTIÃ TÁ VESTIDO NAS REGRAS MILITARES DE VESTUÁRIO!!"
90100050-28 = "……Tenente FOX3. Assuma o rádio e despache o sumário militar."
90100050-29 = "C-Canal ativo, FOX3 falando. E-Eu exijo protocolar nos autos que eu portava sutiãs decen--"
90100050-30 = "Aborta o protocolo, FOX3. Absorver o veneno verbal e infantil da recruta FOX4 com fúria orgânica desgasta o time."
90100050-31 = "S-Sim, Senhora... Uugh..."
90100050-35 = "Aqui é a FOX3 de volta. Extratores de Dados de Tráfego [IMSI] com força total operando no Ponto Papa."
90100050-36 = "O cruzamento balístico entre as digitais de IPs e IDs coletadas e as silhuetas orgânicas sob a mira da FOX4 aponta a seguinte matemática:#nRaio de quinhentos metros blindado. Não há testemunhas civis portando radar limpo no perímetro de caça."
90100050-37 = "Se os radares capturarem respingos do paranormal ou celulares estranhos vararem a cerca do perímetro, engatilharei as sirenes extras."
90100050-38 = "Limpidez recebida, FOX1 na escuta."
90100050-42 = "Encerrando a roda, FOX2 o rádio é seu--"
90100050-48 = "O meu teatro tático também tá montado!"
90100050-49 = "Despensa forrada de munição civil disfarçada, roupa de NPC limpa e intocável..."
90100050-50 = "Se os peões cruzarem a calçada, o espetáculo da pescaria de informações começa conforme as cartilhas."
90100050-51 = "Cristalino. Cortem as travas de sigilo, a caçad--"
90100050-52 = "[ns1] \"Uau... Os diálogos suados no canal soam como um filme de espionagem puro sangue...\"\n[ns2] \"E qual é o truque de mágica pra puxar os civis pro papo no asfalto?\""
90100050-55 = "Comandante [USERNAME]."
90100050-56 = "As atas da operação previam o despejo do balanço tático na sua mesa ao final da caçada em formato de inquérito fechado.#nO senhor foi avisado de que não precisava torrar no sol conosco."
90100050-57 = "A nossa proficiência paramilitar engatilhou as suas suspeitas, senhor?"
90100050-58 = "[s3] \"Nada disso, é porque esse é o primeiro trabalho fantasma da Schale unida com a FOX!\"\n[s4] \"Ficar na cadeira burocrática ia ser um saco, eu quero assistir aos instintos de rapina de vocês suando e comendo poeira ao vivo e a cores, hehehe.\""
90100050-61 = "……Aceito a vistoria sádica."
90100050-62 = "Atualizarei a roda. Retomando o mapa do Briefing paramilitar:"
90100050-63 = "O coração da... 'Operação Rastreio das Lores Ocultas'... é cimentado em um objetivo:#nDrenar o oceano e desenhar a anatomia completa das atrocidades que assolaram as proximidades dessa estação, Shirounagi."
90100050-64 = "[s] \"Que sangue rolou nessa estação...?\""
90100050-65 = "As delegacias empilham boletins desde o mês retroativo narrando que civis estão despencando no asfalto em estado de coma.#nAs datas das covas e comas cívicos acompanham simultaneamente o regresso duvidoso da Atual Presidente no Trono."
90100050-67 = "Estatisticamente, as carcaças desacordadas são resgatadas do cimento pelo meio-dia. Como a perícia visual relatava hematomas ínfimos de arranhões contra o chão e nada mais crônico... o laudo amador das polícias fechou os diagnósticos com 'insolação grave e desidratação'."
90100050-68 = "Todavia, o legista que afunda o bisturi choca contra as anomalias médicas. A biologia aponta termostatos limpos, compassos cardíacos imutáveis e... um padrão neurológico de espasmos letais na calçada... Os dados cospem na cara da tese do sol escaldante, a anomalia é forasteira."
90100050-69 = "Na costura fina, um fio conectava as comas: As testemunhas civis juravam por deus que fitavam e perseguiam um demônio na forma de um 'Espantalho Alvo e Branco' no escuro.#nA força Valkyrie gasta pneu no escuro para desvendar as entranhas místicas dessa aberração."
90100050-71 = "Mas a parede de concreto militar os freou... Apenas os civis defuntos viram os olhos da entidade...#nAs algemas policiais secaram. Zero pistas orgânicas nas mãos."
90100050-72 = "E como a fila de corpos nas macas não cessa, os canais de rádio e bocas fúteis criam as fantasias profanas. A praga mental culpa desde vudu sujo na rua até fúria de almas demoníacas..."
90100050-73 = "Vudu? Conta de fadas? O misticismo burro da sociedade e a saliva pra gerar fofoca alheia não têm fronteiras mesmo."
90100050-74 = "Essas correntes nojentas de desinformação cega só embaralham e destroem a nitidez do alvo pros radares táticos."
90100050-75 = "O diagnóstico é coeso e certeiro... Contudo o solo que pisamos é um tabuleiro deficiente de dados empíricos cruciais."
90100050-76 = "O sacrifício das horas é mandatório. Purificar as engrenagens e varrer cacos lógicos no asfalto é o caminho inadiável."
90100050-77 = "[s] \"Entendido, mas... qual é o mapa da infiltração urbana agora?\""
90100050-78 = "Espremer e sugar os peões cívicos nas ruas de perto."
90100050-79 = "A malha de espionagem engatilha uma tese simplória: forjar um NPC no fluxo dos bairros como um reles operário proletário temporário... E perfurar o escudo civil para que eles vomitem os laudos pra nós por conta própria."
90100050-80 = "[s] \"O teatro militar vai botar barraquinha civil de sushi e marmita pra vender inarizushi e seduzir elas de novo, é isso?\""
90100050-81 = "A logística alimentar de rua capotaria de insucesso no asfalto quente hoje. O chamariz nutricional necessita de mutação pra atrair os urubus civis.#nA venda de carne ensopada e grãos suaria ao sol. Abortamos o sushi."
90100050-82 = "A lupa tática e os relatórios batem que a última vítima orgânica pertencia aos quartéis esportivos de atletismo do Distrito de Gehenna."
90100050-83 = "Eles desgastam o solado neste asfalto cego e fluvial como rotina fixa. A ausência de fofoqueiros os imuniza pra suarem em paz..."
90100050-84 = "A inteligência escavou o esgoto cibernético, e os murais dizem que as solas deles sangram nessa pista na data de hoje."
90100050-85 = "A irmandade do time não engole que um parceiro tomba num dia desses sem deixar um buraco solto na história... As veias deles abrigam os fragmentos póstumos da nossa investigação."
90100050-86 = "[s] \"……Faz todo sentido do mundo.\""
90100050-87 = "Atenção FOX4 na linha. Minhas condolências em assassinar o flerte no ouvido, porém--"
90100050-88 = "Os radares suam. As iscas civis rasgam o horizonte pro cerco de alvo principal."
90100050-92 = "Permissão letal acesa. FOX2, estale os dedos e atire."
90100050-93 = "Comandos engatilhados~"
90100050-100 = "Bate um, puxa dois, bate um, puxa dois!"
90100050-101 = "Não afoga os pulmões na marcha! Afina o passo na cantoria!"
90100050-105 = "Oooopa~ Com licença..."
90100050-106 = "SAI, SAI DA PISTA, TÁ ENGASGANDO O REVEZAMENTO!"
90100050-107 = "Perdão esbarrar nos suores do treinamento da equipe... O mercado cospe os líquidos táticos fresquinhos de reidratação 'Hyper-Ade'.#nQuerem regar a garganta num desses?"
90100050-108 = "HÃ?! O quê?! Bebida comercial? Tá atirando panfleto pra morder dinheiro nas vielas agora, caixeiro viajante?!"
90100050-109 = "Sem cifrões no trato, o galão é amostra cega corporativa de promoção! Se os músculos aceitarem, mande pra goela seca!"
90100050-110 = "Nenhum almoço orgânico é de graça na rua... tem rato nisso."
90100050-111 = "Heheheh. O boca-a-boca urbano ainda não abraçou a patente...#nMas essa química engarrafada é ouro forjado nas tubulações restritas dos laboratórios da Indústria Kozuka."
90100050-112 = "O marketing militar cimentou faixas de luz e promotores fúteis no asfalto pra vender...#nPorém a rede social e a fofoca suja dos ratos de asfalto é o que escraviza o mercado hoje."
90100050-113 = "O protocolo é banhar as bocas esportivas secas e sedentas da sua patrulha na fonte... e se o delírio elétrico aprovar nas línguas, a retribuição se paga em lamber as solas da corporação vomitando as avaliações perfeitas na internet."
90100050-114 = "Como a caderneta bélica alerta... quando o passo e os calcanhares suam fúria, as glândulas sangram suor e a represa de minerais drena os ossos... e injetar fluidos sintéticos ultra-osmóticos de hipervelocidade no trato intestinal restaura o motor. A patente desse 'Hyper-Ade' chuta as concorrentes diluindo matrizes elétricas no teto celular para esmagar os limites――"
90100050-115 = "T-TÁ LEGAL, PARA A BOCA! O sermão de feirante já moeu o ouvido e cimentou a prova, o seu patrão não te paga pra babar nos pedestres.#nVira o galão, eu mastigo essa farsa."
90100050-116 = "É, a garganta já ardia e sangrava deserto mesmo, pau dentro."
90100050-121 = "Ou o meu cérebro ferveu ou o líquido tem veneno dos anjos...#nAs artérias parecem entornadas com gelo e óleo novo da cabeça aos pés numa sugada só..."
90100050-122 = "O bagulho derreteu nas paredes intestinais e sumiu nos poros em milissegundos..."
90100050-123 = "É a força divina na garrafa! Inocular oxigênio mineral em terras mortas ou caldeirões ferventes, restaurando a carne do soldado na lama sem choro é a maldição abençoada deste 'Hyper-Ade'!!"
90100050-124 = "Os canos do suprimento estão lacrados e o galão tá na reserva alta... a repetição dos copos tá livre e sedenta por vocês."
90100050-125 = "Milagres assim injetando energia na bunda? Abre alas, eu afundo a minha também..."
90100050-126 = "Nessa onda eu nado também! Racha a cota e manda pro copo!!"
90100050-130 = "A porra dos rótulos de biologia mágica daquilo... não bate no meu log de conhecimento militar tático de soros de nutrição, caramba."
90100050-131 = "Os laudos da Kurumi atestariam com os olhos vendados.#nEla catou o lixo das 'Rações Químicas Hidrolíticas' que as Forças SRT jogavam no prato de trincheira... cortou o racionamento aquático da receita original e super-saturou os cristais a um grau de estourar neurônio em 1.5 da dosagem."
90100050-132 = "Pera? O mijo químico cítrico com sabor metálico e enjoativo das missões...? Elas cultuam o lixo azedo e artificial como ambrosia divina e bebem rindo...?"
90100050-133 = "O carisma tático corporativo dessa espiã renderia montanhas de sangue pra fechar os caixas no submundo como capitalista enganadora."
90100050-134 = "（A isca triturou a muralha e a armadura paranoica das civis caiu por terra... a infiltração operou 100% de letalidade.）"
90100050-136 = "……Bebemos da bondade militar civil até entupir a garganta. O pedágio pra lavar as almas com a sua patente é despejar palavras doces na web e só?"
90100050-137 = "Custo nulo nas veias da gratidão. Mastigue um texto lisonjeiro e vomite as notas nas redes midiáticas para engordar a bolha social da corporação e tudo se resolve na paz de Deus."
90100050-138 = "Deixa os teclados suarem nas minhas costas! Eu garanto incendiar até a roda de marginais da praça pra comprar e engolir seus frascos!"
90100050-143 = "……Aliás, falando em 'Murmúrios e Fofocas'."
90100050-144 = "Nas vielas periféricas desse bairro corria uma fumaça de que alunas da farda de atletismo mastigaram o asfalto em estado de cadáver nesse mesmo rio... o cérebro das senhoritas absorveu e filtra a informação disso?"
90100050-148 = "Hein?! A Tama-chan? Por que diabo a caixeira puxaria a laje morta dess――"
90100050-149 = "……De onde escorre esse interesse sujo no corpo dela?"
90100050-150 = "A-Ah, aborta a pauta, eu não ostento nenhuma curiosidade pervertida em cima de sangue orgânico e tragédias macabras alheias."
90100050-151 = "O asfalto anda minado de surtos psiquiátricos fúnebres de cadáveres caindo feito formiga por essa redondeza e meu esqueleto só ansiava precaver o próprio lombo de emboscadas, entende...?"
90100050-152 = "…………"
90100050-153 = "Vaza. Nenhuma palavra vaza daqui e eu lavo as mãos mortas pro lado de fora."
90100050-154 = "Os jargões das secretarias atestam pra Deus e o mundo que 'foi o sol que matou o juízo de insolação' com cravos na pedra, não atestam?!"
90100050-155 = "Ignorantes arrotam sobre poças de sangue do escuro e acham bonito..."
90100050-156 = "C-Calma as fuzilarias de ressentimento, a minha--"
90100050-160 = "O cálice tava suculento. Morre aí."
90100050-167 = "Uugh... Abatida nos fronts diplomáticos..."
90100050-168 = "O dedo cutucou o nervo em chamas exposto e a operação colapsou legal."
90100050-169 = "Aqui rádio FOX2... O sangue não derramou liso, pauta morta na espionagem e falhas na pescaria da rua."
90100050-170 = "Descarte a autoflagelação de desempenho. Assaltos frontais com amizades não desarticulam esquadrões repletos de segredos blindados fáce――"
90100050-174 = "Sinal mudo, FOX2. Radares de calor marcam uma assinatura biológica forasteira pisando e rasgando no campo."
90100050-181 = "Com licença... A garrafa mágica com o elixir de sais corporativos ainda molha a caneca da galera de fora?"
90100050-182 = "P-Polímeros ativos em máxima eficiência! Deseja banhar as entranhas?!"
90100050-187 = "Dou meu corpo pelo copo. Os rótulos dessa corporação fugiram do meu HD mental e as faíscas da dúvida pinicaram na cabeça."
90100050-191 = "Humm... o atrito metálico do líquido no fundo da gengiva ferve bizarro. Puxa a ficha criminal do esqueleto e acorda do coma celular.#nVou forçar a pança da Kirara a entornar essa química nas missões também, amei."
90100050-192 = "Rompendo o assunto banal... A moldura e estética da sua epiderme parecem alienígenas parasitando estas calçadas empoeiradas. De que reduto de muros de Academia as suas pernas imigraram hoje?"
90100050-193 = "A-Absolvido o ponto! As minhas paredes originárias descansam os pilares a quilômetros daqui... ahm, das alas do pátio privado... da Academia Hyacinth..."
90100050-194 = "Hmm... a pronúncia roça nas cascas perdidas das fofocas orgânicas cerebrais..."
90100050-195 = "Aborta o tema tático e dane-se de onde você rasteja. Apague a pólvora fria que as histéricas do esporte gospem contra você no chão.#nA matilha de perdedoras ferveu a raiva por conta do abate letal da rodada ali nas sarjetas."
90100050-196 = "O abate fatal... as fofocas atestam que fato exato?"
90100050-197 = "O enterro de coma onde a cadete do esquadrão despencou de nariz e desmaiou fria nos escombros na vala na esquina sem responder aos socos de reanimação."
90100050-198 = "O sangue dessa tese morta inflou sua ganância fofoqueira, assume a capa?"
90100050-199 = "M-Minha inocência repudia, eu juro e blindo as engrena――"
90100050-200 = "As dobras mentirosas nas veias do seu rosto piscam pra caramba. 'As fábulas do sangue me instigam na loucura investigativa'."
90100050-201 = "A sua boca mente mal pra cacete e as entranhas delatam fetiches sádicos pela desgraça na rádio corredor, garota."
90100050-206 = "Aahaha... A camuflagem da carcaça fracassa nas mentiras perante o olho cínico alheio assim tão rápido, eh?"
90100050-208 = "As chuteiras em Gehenna estão prontas pra derramar suor na guerra de carnificina que escolherá os recrutas vitais pro Nacional de Atletismo Federal. E a morta de coma que capotou no piche era a deusa máxima escalada como favorita imbatível pro posto."
90100050-209 = "As cartilhas juravam que ela estúprava e sugava a gasolina da própria saúde forçando corridas clandestinas solitárias sem fôlego sob os sóis escaldantes pra massacrar todas as perdedoras nos cumes das arquibancadas."
90100050-210 = "Com a biologia esturricando, o senso comum vomitou que ela havia quebrado os pulmões pra fumaça de calor. A culpa seria do sol."
90100050-212 = "……Eis a brecha da charada de que o sol era puro verniz pra mortificar a farsa do coma."
90100050-213 = "Na veia. As correntes e teclados fúteis das redes espalharam. Os laboratórios não acusaram falência cardíaca pelo oxigênio seco quente ou falta de óleo orgânico no tecido.#nA junta legista da corporação de pronto socorro e faculdade de medicina atestou, a falsidade da insolação foi sepultada."
90100050-214 = "E com isso... se o cérebro não pifou de sol e a carne tá zerada... Por que desgraça a [ruby=・   ・   ・   ・   ・   ・]D e u s a  P r e d a d o r a[/ruby] afundou em sono de presunto fúnebre?#nA tese suja explodiu pros chifres das parceiras: 'Sabotagem invejosa e Praga mística vinda de macumbas que as coitadas submissas plantaram contra ela'."
90100050-215 = "Ahh... então por isso as armas vocais de ressentimento sacaram os gatilhos daquelas alunas e cuspiram sangue contra a forasteira..."
90100050-216 = "Dizimar e limpar fileiras de cadetes predatórias no pódio alivia e liberta vagas, ok. Mas aturar balas nas costas atestando que você envenenou as artérias dos parças no covil... azeda a aura até de cão sarnento fúnebre, sacou?"
90100050-217 = "Pode chover chumbo e desgraça anárquica no asfalto infernal com essas psicopatas de Gehenna que nem suam pro caos social.#nMas se atirar a tese caluniosa de assassinas venenosas pra sujar e manchar o próprio núcleo nas praças federais... Até Gehenna lateja o orgulho perante isso."
90100050-218 = "Inquestionável. Os versos e adágios mortos atestam: se a milícia grita correntes de calúnias de falsidade cega na sua garganta até virar 'Fato Absoluto'... o defunto sadio sucumbe fuzilado pelo stress antes do chumbo."
90100050-219 = "E sem a boca anestesiada lá no soro pra revidar e vomitar laudos, e se as escusas viram mentiras no ar. Elas engolem o pão do inferno diário na calçada e se submetem até o silêncio triturar."
90100050-223 = "……Sussurros fúnebres sem autoria e lendas correntes urbanas, no fim das contas."
90100050-224 = "Correntes de rádio morto, murmúrios invisíveis no lixo e no ouvido sujo alheio... A força dos vermes sociais vomitando a saliva na escuridão me simulam com perfeição as leis destrutivas de abismos naturais da física."
90100050-225 = "Colocar barricadas na correnteza é fútil; sangrar e forçar contra o maremoto arrasta o corpo e dissemina os pedaços das baixas pra litorais apocalípticos distantes esmagando e estraçalhando inocentes alheios com facilidade cega."
90100050-226 = "Afundar no alvo principal dos boatos sem autoria dita o terror de lutar esmurrando um paredão sem rosto contra um tsunami invisível da podridão midiática cega, eu imagino."
90100050-227 = "Aboletar e ceder as engrenagens aos ventos cegos das águas pra devorar e aceitar a derrota nas encostas amargas sem ranger ossos pode figurar com uma artimanha barata pra sair com as calças soltas... mas..."
90100050-228 = "A fundação das engrenagens dita nossa lei: não nos calçamos com motores nulos escravos e apáticos que só boiam na lixeira das ruas frias."
90100050-229 = "Cravar os punhos, travar as remadas ensanguentadas rompendo a foice dos moinhos d'água mortais rasgando a tormenta...#n...É o único percurso violento tático que limpa e arranca os mortos pro paraíso final sem trair os trilhos da verdade."
90100050-234 = "Uou... Puta lábia poética tática de guerra de veteranos do exército. Sobrou o que das missões?"
90100050-235 = "A marcha da biologia clama que no fim o solo de ossos no necrotério não absolveu ninguem da foice infernal suja e correntes dos párias sussurrando calúnias de lendas e boatos cegos nas suas costas."
90100050-236 = "Hahaha, o carisma insano me seduz. A ideologia maluca arranca até sorrisos do tédio."
90100050-237 = "O destino pode engolir e emparelhar nossos crachás de volta num beco aleatório.#nSe a biologia conceder autorizações sociais orgânicas, podemos linkar e emparelhar IPs de perfis clandestinos no MomoTalk pra um alô tático futuro?"
90100050-238 = "A chancela e as canetas são aprovadas e outorgadas nas redes, espere aí."
90100050-243 = "Aliança cimentada e o link espelhado do IP cruzado na roda.#nVou chutar os radares e vazar, feche a guarda contra as mutações letais nas fornalhas solares, ciao!"
90100050-249 = "Uma anomalia de civis exalando uma estética cegante de purpurina e energia estelar cegante nas calçadas embaça o óculos e cega as íris opacas nas ruas cinzas do quartel..."
90100050-250 = "Confirmado e testemunhado. Todavia, eu lanço interrogatório às burrices lógicas amadoras agora mesmo, FOX2. O link social que forneceu da caderneta foi mascarado de IP fantasma, né?! Sem senhas puras nas vielas!"
90100050-251 = "Os escudos e firewalls de protocolos cravam zero pânico. Eu vinculei e atestei máscaras sujas descartáveis com ciclo letal de vaporização completa em cronômetro de 24 horas fixos pro zero celular. Puf, poeira de cinzas digitais."
90100050-252 = "Trombar as garotas em esquinas mansas da periferia longe do massacre abria brechas de cimentar panelinhas... Todavia... As leis operacionais paramilitares me acorrentam. Abortar amizades fúteis civis no fogo aberto."
