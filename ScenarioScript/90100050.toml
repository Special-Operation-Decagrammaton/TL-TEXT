[translation]
90100050-1 = "Episódio 5: Investigação"
90100050-3 = "Agora são 10:30, horário padrão de Kivotos."
90100050-4 = "A partir deste momento, o FOX Squad iniciará a investigação da 'Operação Rastreamento de Roa'."
90100050-5 = "Relatório de cada membro."
90100050-9 = "Aqui é FOX4. Estou observando os movimentos do alvo no Ponto Oscar."
90100050-10 = "Por enquanto, nenhum sinal de anormalidade."
90100050-11 = "Mas... tem um problema bem chato aqui no Ponto Oscar."
90100050-12 = "Pode ser mais específica?"
90100050-13 = "Tá muito quente... estou suando sem nem me mexer. #nO verão ainda não chegou, chegou!?"
90100050-14 = "Se eu ficar coberta com essa rede de camuflagem sob o sol escaldante, vou acabar derretendo~"
90100050-15 = "Parece que a temperatura deste ano está mais alta que a dos anos anteriores."
90100050-16 = "Vou procurar um ponto na sombra em seguida. Sinto muito, mas desta vez..."
90100050-20 = "FOX4, pare de reclamar. Antigamente você aguentava lugares muito mais quentes que este, não aguentava?"
90100050-21 = "Será que você ficou mole depois que foi para o Departamento Correcional?"
90100050-22 = "FOX3, pare de dar sermão no canal da operação. Mesmo que eu esteja treinada, calor é calor."
90100050-23 = "Se eu estivesse usando só uma camisola por baixo como alguém que eu conheço, seria melhor, mas..."
90100050-24 = "Eu estou usando as peças certas, sim!?"
90100050-28 = "...FOX3, continue o relatório."
90100050-29 = "A-aqui é a FOX3. Bem, eu também estou usando as peças certas..."
90100050-30 = "FOX3. Não precisa levar as piadas da FOX4 a sério."
90100050-31 = "É, você tem razão. Ugh..."
90100050-35 = "Aqui é a FOX3. O dispositivo de coleta está operando no Ponto Papa."
90100050-36 = "Após cruzar o número de IDs de dispositivos coletados com o número de alvos no Ponto Oscar, #nestimamos que não haja ninguém identificável num raio de 500 metros."
90100050-37 = "Se eu detectar sinais de anormalidade ou terminais adicionais na área de vigilância, farei um relatório extra."
90100050-38 = "FOX1, entendido."
90100050-42 = "Por fim, FOX2..."
90100050-48 = "Aqui também está tudo pronto."
90100050-49 = "Suprimentos suficientes, camuflagem perfeita..."
90100050-50 = "Assim que eu confirmar a aproximação do alvo, começarei a coleta de informações conforme o procedimento."
90100050-51 = "Ótimo. Então, a partir de agora..."
90100050-52 = "[ns1] \"Vocês estão falando de coisas bem sérias...\"\n[ns2] \"O que vocês pretendem fazer agora?\""
90100050-55 = "Sensei [USERNAME]."
90100050-56 = "Após o término da operação, faremos uma reunião de relatório com a sua presença. #nEu deveria ter dito que não havia problema em não nos acompanhar."
90100050-57 = "Há algo que o preocupe?"
90100050-58 = "[s3] \"É a primeira operação conjunta do FOX Squad com o SCHALE!\"\n[s4] \"Eu queria ver o trabalho da Yukino de perto.\""
90100050-61 = "...Entendo."
90100050-62 = "Então, vamos começar. A partir de agora, faremos o briefing."
90100050-63 = "O objetivo principal desta Conco... quer dizer, desta 'Operação Rastreamento de Roa', #né entender a totalidade dos incidentes que vêm ocorrendo com frequência aqui, nos arredores da Estação Shirounagi."
90100050-64 = "[s] \"O que está acontecendo aqui...?\""
90100050-65 = "Desde o mês passado, temos tido uma série de incidentes onde estudantes são encontradas inconscientes. #nExatamente desde que a Presidente do Conselho Estudantil Geral retornou."
90100050-67 = "A maioria das vítimas foi encontrada ao meio-dia, #ne como não foram encontrados ferimentos externos além de arranhões, inicialmente suspeitou-se de insolação."
90100050-68 = "No entanto, como o pulso e a temperatura corporal das vítimas estão normais, e muitas apresentam convulsões fortes, #noutras possibilidades estão sendo consideradas."
90100050-69 = "Além disso, há um testemunho comum de que elas estavam perseguindo um 'espantalho branco' pouco antes, #ne atualmente a Academia de Polícia Valkyrie está investigando a identidade desse espantalho."
90100050-71 = "Mas parece que ninguém além das vítimas viu esse espantalho branco... #ne a investigação está difícil."
90100050-72 = "À medida que o número de vítimas aumenta, boatos sobre maldições de fantasmas ou espíritos malignos... #nestão se espalhando por aí..."
90100050-73 = "Não existe essa coisa de fantasma, né? #nAs pessoas só estão falando o que querem."
90100050-74 = "Quando espalham boatos de forma irresponsável, o contorno do incidente acaba ficando distorcido."
90100050-75 = "Concordo com essa opinião, mas... no momento, temos poucas informações para julgar."
90100050-76 = "Não temos escolha a não ser dedicar tempo para reexaminar o caso e coletar evidências."
90100050-77 = "[s] \"Então, o que vamos fazer agora?\""
90100050-78 = "Primeiro, vamos interrogar as pessoas envolvidas."
90100050-79 = "Para que falem naturalmente, vou me disfarçar de funcionária de meio período e puxar assunto."
90100050-80 = "[s] \"Desta vez você vai vender sushi de inari de novo?\""
90100050-81 = "Mudei o cardápio para atrair melhor a atenção do alvo. #nAfinal, com esse calor, seria difícil vender aquilo."
90100050-82 = "Pelo que parece, a vítima mais recente é uma atleta do clube de atletismo de Gehenna."
90100050-83 = "O clube de atletismo de Gehenna parece treinar bastante nesta passarela. #nDeve ser fácil correr aqui porque não passa muita gente."
90100050-84 = "Verifiquei as redes sociais e parece que hoje também tem treino agendado."
90100050-85 = "Se forem do mesmo clube, talvez saibam algo sobre o que aconteceu logo antes da vítima desmaiar."
90100050-86 = "[s] \"Entendo...\""
90100050-87 = "Aqui é FOX4. Desculpe interromper a conversa agradável, mas..."
90100050-88 = "O alvo está se aproximando do ponto."
90100050-92 = "Então, FOX2, com você."
90100050-93 = "Pode deixar~"
90100050-100 = "Um, dois, um, dois!"
90100050-101 = "Não percam o ritmo da respiração! Acompanhem a contagem!"
90100050-105 = "Com licença..."
90100050-106 = "Ei, sai, sai da frente!"
90100050-107 = "Desculpe interromper o treino... Gostariam de experimentar o novo isotônico \"Hyper Aid\"?"
90100050-108 = "Hã? Quê? Isotônico? Do nada? O que é isso, venda forçada!?"
90100050-109 = "Não, não! Estamos apenas distribuindo amostras. Se quiserem, fiquem à vontade!"
90100050-110 = "Tem algo estranho nisso..."
90100050-111 = "Fufu. Talvez ainda não seja muito conhecido... #nMas na verdade, é um novo produto da Kozuka Pharmaceutical."
90100050-112 = "Estamos fazendo anúncios e eventos promocionais, mas... #nno mundo de hoje, o boca a boca é o que importa."
90100050-113 = "Por isso, queria que vocês do clube de atletismo experimentassem. Se gostarem, agradeceríamos se pudessem recomendar para outras pessoas."
90100050-114 = "Como vocês já devem saber, após exercícios intensos, os eletrólitos são perdidos junto com o suor... então o melhor é repor com um isotônico de absorção rápida. #nEste \"Hyper Aid\" contém uma concentração de eletrólitos maior que a dos produtos concorrentes, então..."
90100050-115 = "Tá, tá, entendi. Já deu para ver que você está falando sério. #nAcho que vou experimentar."
90100050-116 = "Bom, estou com sede mesmo, então por que não?"
90100050-121 = "Será por causa do calor? #nSinto que minha sede passou mais rápido que o normal..."
90100050-122 = "É como se tivesse sido absorvido no instante em que bebi..."
90100050-123 = "Exato! Absorver os eletrólitos necessários em qualquer ambiente é o ponto forte deste \"Hyper Aid\"!"
90100050-124 = "Trouxe bastante, então podem repetir se quiserem."
90100050-125 = "É tão bom assim? Então eu também quero..."
90100050-126 = "Eu também! Eu também quero beber!"
90100050-130 = "O que é aquilo? Nem eu conheço..."
90100050-131 = "Kurumi, você com certeza já bebeu isso. #nÉ aquela bebida em pó que distribuíam na SRT, diluída com 1,5 vezes a quantidade recomendada."
90100050-132 = "Hã? Aquela limonada barata? Elas estão tão felizes por causa disso...?"
90100050-133 = "Acho que aquela garota teria sucesso nas vendas, não só na SRT."
90100050-134 = "(Consegui baixar a guarda delas...)"
90100050-136 = "...Obrigada pela bebida. Como posso retribuir?"
90100050-137 = "Não foi nada. Se puderem, ficaria muito feliz se postassem uma opinião sincera nas redes sociais."
90100050-138 = "Pode deixar! Vou recomendar para todo mundo para que a fama se espalhe!"
90100050-143 = "...Falando em \"fama\", lembrei de uma coisa."
90100050-144 = "Vocês já ouviram falar que, há pouco tempo, uma integrante do clube de atletismo desmaiou aqui perto?"
90100050-148 = "Hã? Da Tama-chan? Por que você está perguntando sobre isso..."
90100050-149 = "...Por que quer saber disso?"
90100050-150 = "Ah, não tem nenhum motivo especial."
90100050-151 = "É que parece que tem acontecido muitos incidentes parecidos por aqui ultimamente, então pensei em tomar cuidado..."
90100050-152 = "............"
90100050-153 = "Não temos nada para falar sobre isso."
90100050-154 = "De qualquer forma, vão dizer que foi insolação, não é?"
90100050-155 = "Sem saber de nada..."
90100050-156 = "A-ah, por acaso..."
90100050-160 = "Obrigada pela bebida."
90100050-167 = "Ah... que fracasso..."
90100050-168 = "Parece que tocamos na ferida."
90100050-169 = "Aqui é FOX2... desculpe, parece que falhei."
90100050-170 = "Tudo bem. Eu não esperava que fossem receptivos desde o início..."
90100050-174 = "Espere, FOX2. Tem outra pessoa se aproximando."
90100050-181 = "Com licença... essa bebida, ainda estão distribuindo?"
90100050-182 = "C-claro. Gostaria de uma?"
90100050-187 = "Obrigada. É uma marca que não conheço, fiquei curiosa."
90100050-191 = "Hmm... tem um sabor bem peculiar. Acho que é a primeira vez que sinto algo assim.#nVou contar para a Kirara depois."
90100050-192 = "Mas, você não tem um rosto comum por aqui. Veio de outra escola?"
90100050-193 = "S-sim! Fica um pouco longe daqui... é da... Academia Privada Hyacinth."
90100050-194 = "Hmm... acho que já ouvi falar..."
90100050-195 = "Bom, deixa pra lá. Não ligue muito para o que as meninas do clube de atletismo disseram antes.#nElas estão um pouco tensas por causa daquele assunto."
90100050-196 = "Aquele assunto, você diz..."
90100050-197 = "O caso de uma das integrantes que foi encontrada inconsciente."
90100050-198 = "Você está interessada nesse incidente, não está?"
90100050-199 = "Não, eu não..."
90100050-200 = "Está escrito na sua cara. \"Estou morrendo de curiosidade sobre os boatos\"."

90100050-201 = "Você também parece gostar bastante de uma fofoca, hein?"
90100050-206 = "Ahaha... ficou tão óbvio assim?"
90100050-208 = "O clube de atletismo de Gehenna terá a seletiva para o campeonato nacional em breve.#nA garota que desmaiou era uma das favoritas."
90100050-209 = "Dizem que ela se esforçava tanto que até treinava sozinha nos dias de folga."
90100050-210 = "Por isso, quando a encontraram desmaiada, todos pensaram que ela tinha forçado demais e sofrido uma insolação, mas..."
90100050-212 = "...então não foi insolação."
90100050-213 = "Exato. Já está espalhado pelas redes sociais, não havia nada de errado com o corpo dela.#nO Departamento de Medicina de Emergência de Gehenna confirmou, então não acho que seja boato."
90100050-214 = "Mas aí a questão é: por que ela desmaiou?#nComeçaram a surgir boatos de que \"outras integrantes ficaram com inveja e a amaldiçoaram\" ou que \"fizeram algo contra ela\"."

90100050-215 = "Ah... então foi por isso aquela reação."
90100050-216 = "Pode até diminuir a concorrência pelas vagas, mas é chato ouvir esse tipo de coisa, né?"
90100050-217 = "Muitos aqui em Gehenna são do tipo que não ligam para a opinião alheia.#nMas mesmo para os alunos de Gehenna, boatos ruins incomodam."
90100050-218 = "É verdade. Dizem que \"mil dedos apontados para alguém podem matá-lo sem que ele esteja doente\"."

90100050-219 = "Bem, como a própria pessoa não pode responder...#né uma pena para a garota do clube de atletismo, mas só nos resta esperar que os boatos diminuam."
90100050-223 = "...Boatos, é?"
90100050-224 = "Rumores, conversas ao vento... sinto que histórias que passam de pessoa para pessoa são frequentemente comparadas a fenômenos naturais."
90100050-225 = "Não param mesmo que você tente impedi-los, e quanto mais você resiste, mais eles fluem para lugares inesperados, espalhando danos pelo caminho."
90100050-226 = "Para quem está envolvido, deve ser como enfrentar uma onda gigantesca."
90100050-227 = "Deixar-se levar pela onda e aceitar o fluxo pode ser uma opção, mas..."
90100050-228 = "Nós não somos barcos sem vontade própria."
90100050-229 = "Se não segurarmos o remo e avançarmos, mesmo contra a correnteza...#ncreio que não chegaremos ao destino correto."
90100050-234 = "Isso é por experiência própria?"
90100050-235 = "Não existe quase ninguém que tenha vivido e nunca tenha sido o centro de um boato..."
90100050-236 = "Fufu, interessante."
90100050-237 = "Se quiser, podemos trocar contatos no MomoTalk? Talvez a gente se veja de novo."
90100050-238 = "Claro. Só um momento, por favor."
90100050-243 = "Certo. Então, nos falamos depois. Cuidado com o calor."
90100050-249 = "Que aluna radiante, não?"
90100050-250 = "Pois é. Mas FOX2, você não passou seu contato real, passou?"
90100050-251 = "Relaxa. É um que expira em 24 horas."
90100050-252 = "Se tivéssemos nos conhecido em outro lugar, talvez pudéssemos ter sido amigos... mas agora estamos em missão."
90100050-256 = "Aqui é FOX2. Confirmo o fim da operação. Já estou voltando."
90100050-258 = "Próximo episódio: Verdades e Mentiras"
