[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
90100050-1 = "Episódio 5: Investigação de Campo"
90100050-3 = "10h30, horário de Kivotos."
90100050-4 = "A FOX Squad inicia a investigação civil da 'Operação Caça às Lores'."
90100050-5 = "Atenção, relatem posições."
90100050-9 = "Aqui FOX4. Observando civis no Ponto Oscar."
90100050-10 = "Nenhuma anomalia por enquanto."
90100050-11 = "Só tem um probleminha logístico aqui."
90100050-12 = "Descreva."
90100050-13 = "Calor da peste! Estou suando só de ficar parada.#nCadê o verão que não chegou ainda?!"
90100050-14 = "Ficar coberta com tecido de camuflagem debaixo do sol vai derreter a gente antes da luta~"
90100050-15 = "As temperaturas estão acima da média este ano."
90100050-16 = "Vou tentar achar um ponto com sombra. Até lá――"
90100050-20 = "Pare de reclamar, FOX4. Já enfrentamos desertos piores."
90100050-21 = "Ou a prisão amoleceu seus ossos?"
90100050-22 = "Cala a boca, FOX3. O canal não é para lição de moral. Calor dói e pronto!"
90100050-23 = "É fácil falar para quem usa só uma regata de baixo――"
90100050-24 = "EU ESTOU USANDO SUTIÃ DIREITO!!"
90100050-28 = "……FOX3, continue."
90100050-29 = "C-Canal ativo. E eu vou registrar que estava usando sutiã de――"
90100050-30 = "Aborta isso. Não esquenta com as provocações da FOX4."
90100050-31 = "C-Certo... ugh..."
90100050-35 = "FOX3 de volta. Dispositivos de coleta de IMSI no Ponto Papa funcionando."
90100050-36 = "Cruzando os dados com os civis no Ponto Oscar...#nNum raio de 500m, nenhum civil não identificado no perímetro."
90100050-37 = "Se captar algo de anormal, aciono o alerta."
90100050-38 = "Entendido, FOX1."
90100050-42 = "FOX2, fala você――"
90100050-48 = "Meu teatro de operações também está montado!"
90100050-49 = "Disfarce civil limpo, suprimentos prontos..."
90100050-50 = "Quando os alvos aparecerem, começa a pescaria de informações."
90100050-51 = "Ótimo. Então vamos――"
90100050-52 = "[ns1] \"Uau... o papo de vocês parece filme de espionagem.\"\n[ns2] \"E como é que vão puxar assunto com os civis?\""
90100050-55 = "Sensei [USERNAME]."
90100050-56 = "O combinado era que o senhor só receberia o relatório final.#nNão precisava vir sofrer o calor conosco."
90100050-57 = "Desconfia de algo na nossa atuação?"
90100050-58 = "[s3] \"Nada disso. É que essa é a primeira operação conjunta da Schale com a FOX!\"\n[s4] \"Ficar só no escritório é chato, quero ver o talento de vocês ao vivo.\""
90100050-61 = "……Entendido."
90100050-62 = "Vou retomar o briefing."
90100050-63 = "O objetivo da 'Operação Caça às Lores' é:#nLevantar todas as informações sobre os incidentes perto da Estação Shirounagi."
90100050-64 = "[s] \"O que aconteceu lá?\""
90100050-65 = "Desde o mês passado, há relatos de pessoas encontradas desmaiadas.#nOs incidentes coincidem com o retorno da Presidente."
90100050-67 = "Estatisticamente, as vítimas são encontradas ao meio-dia. Como só tinham arranhões, a polícia diagnosticou como 'insolação grave'."
90100050-68 = "Mas exames mais detalhados mostram que os sinais vitais estão normais, e há um padrão de convulsões estranho.#nA hipótese de insolação foi descartada."
90100050-69 = "Além disso, as vítimas relatam ter visto um 'espantalho branco'.#nA Valkyrie está investigando."
90100050-71 = "Mas só as vítimas viram o tal espantalho...#nEntão estão sem pistas."
90100050-72 = "E como os casos aumentam, os boatos se espalham. Tem quem fale em maldição, vodu, etc."
90100050-73 = "Vodu? Bobagem. As pessoas adoram criar fofoca."
90100050-74 = "Esses boatos só atrapalham a investigação."
90100050-75 = "Concordo, mas ainda temos poucos dados confiáveis."
90100050-76 = "Vamos ter que ir a campo."
90100050-77 = "[s] \"Certo, e como vai ser a abordagem?\""
90100050-78 = "Vamos nos passar por civis comuns e conversar com pessoas próximas às vítimas."
90100050-79 = "Nos disfarçar de funcionários temporários e tirar informações naturalmente."
90100050-80 = "[s] \"Vão vender inarizushi de novo?\""
90100050-81 = "Não, com esse calor seria inviável.#nMudamos o chamariz."
90100050-82 = "A última vítima é da equipe de atletismo de Gehenna."
90100050-83 = "Eles treinam frequentemente na orla daqui, pois há pouca gente."
90100050-84 = "Pelos posts, eles devem treinar hoje."
90100050-85 = "Os colegas devem saber de algo que a vítima viu."
90100050-86 = "[s] \"……Faz sentido.\""
90100050-87 = "Atenção, FOX4. Desculpa cortar a conversa, mas――"
90100050-88 = "Os alvos estão chegando."
90100050-92 = "FOX2, pode começar."
90100050-93 = "Deixa comigo~"
90100050-100 = "Bate um, puxa dois, bate um, puxa dois!"
90100050-101 = "Mantém o ritmo, não perde o fôlego!"
90100050-105 = "Com licençaaaa~"
90100050-106 = "SAI DA PISTA, TÁ ATRAPALHANDO O TREINO!"
90100050-107 = "Desculpem a interrupção. Eu estou oferecendo amostras grátis do novo isotônico 'Hyper-Ade'.#nQuerem experimentar?"
90100050-108 = "Hã?! O quê?! Vendedor? Vai fazer propaganda aqui?"
90100050-109 = "É de graça, pessoal! Promoção da empresa! Se estiverem com sede, aceitem!"
90100050-110 = "Coisa de graça assim... deve ter alguma pegadinha."
90100050-111 = "Hehe. Ainda é pouco conhecida...#nMas essa bebida é produzida pela renomada Indústria Kozuka."
90100050-112 = "Fazemos propaganda nas ruas também, mas o boca a boca é o que mais vende."
90100050-113 = "Por isso quero que vocês provem. Se gostarem, me ajudem divulgando."
90100050-114 = "Como vocês devem saber, depois de exercícios pesados, perdemos eletrólitos.#nEsse 'Hyper-Ade' tem uma alta concentração de sais minerais, garantindo――"
90100050-115 = "TÁ BOM, JÁ DEU! Não precisa do sermão.#nVamos provar sim."
90100050-116 = "É, a sede tá grande mesmo. Bora."
90100050-121 = "Ou é o calor, ou essa bebida tem algo especial...#nMe hidratei muito mais rápido que o normal."
90100050-122 = "Parece que entrou direto nas células."
90100050-123 = "Esse é o poder do Hyper-Ade! Hidratação rápida em qualquer ambiente!"
90100050-124 = "Trouxe bastante, podem repetir."
90100050-125 = "É tão bom assim? Então me dá um também..."
90100050-126 = "Eu também quero!"
90100050-130 = "Nunca ouvi falar desse produto..."
90100050-131 = "Claro que já tomou. Lembra do suco em pó da SRT que a gente misturava com 1,5x de água? É a mesma coisa."
90100050-132 = "Hã? Aquele suco barato de limão? E elas gostaram daquilo?!"
90100050-133 = "Ela teria sido uma ótima vendedora."
90100050-134 = "（O disfarce funcionou, baixaram a guarda.）"
90100050-136 = "……Obrigada. Como faço para agradecer?"
90100050-137 = "De nada. Se puder, poste uma opinião sincera nas redes sociais."
90100050-138 = "Deixa comigo! Vou espalhar a palavra por toda a praça!"
90100050-143 = "……Aliás, falando em 'fofoca'."
90100050-144 = "Ouvi dizer que uma aluna do atletismo desmaiou por aqui. Alguém sabe de algo?"
90100050-148 = "Hã? A Tama-chan? Por que você está perguntando isso?"
90100050-149 = "……Por que se interessa por isso?"
90100050-150 = "Ah, nada de especial. É que..."
90100050-151 = "Têm acontecido casos parecidos na região. Queria saber para me prevenir."
90100050-152 = "…………"
90100050-153 = "Melhor não tocar nesse assunto."
90100050-154 = "Vão dizer que foi insolação, como sempre."
90100050-155 = "Ninguém sabe de nada, só querem fofocar..."
90100050-156 = "E-Ei, calma, eu só――"
90100050-160 = "Valeu pela bebida."
90100050-167 = "Ugh... que droga. Foi mal."
90100050-168 = "Mexeu com a ferida aberta delas, né?"
90100050-169 = "FOX2 aqui... falha na abordagem."
90100050-170 = "A culpa não foi sua. Nem sempre se consegue――"
90100050-174 = "Alerta, FOX2. Nova assinatura biológica se aproximando."
90100050-181 = "Com licença... ainda estão distribuindo a bebida?"
90100050-182 = "C-Claro! Gostaria de experimentar?"
90100050-187 = "Obrigada. Nunca vi essa marca. Fiquei curiosa."
90100050-191 = "Humm... sabor diferente. Gostei.#nVou recomendar para as minhas amigas."
90100050-192 = "Falando nisso, você não é daqui, né? De qual escola você é?"
90100050-193 = "A-Ah, sim. Eu sou... da Academia Hyacinth..."
90100050-194 = "Hmm... acho que já ouvi falar..."
90100050-195 = "Bom, não importa. Não leva a sério o que as atletas disseram. Elas estão meio estressadas com o caso."
90100050-196 = "Que caso?"
90100050-197 = "A menina que desmaiou."
90100050-198 = "Você quer saber sobre isso, não quer?"
90100050-199 = "N-Não, eu só――"
90100050-200 = "Está escrito na sua cara. 'Adoro saber de fofocas'."
90100050-201 = "Você também é uma fofoqueira de carteirinha, hein."
90100050-206 = "Ahaha... é tão óbvio assim?"
90100050-208 = "Gehenna vai ter a seletiva para o nacional. A menina era uma das favoritas."
90100050-209 = "Dizem que ela treinava até nos fins de semana, sozinha."
90100050-210 = "Quando desmaiaram, todo mundo achou que foi insolação."
90100050-212 = "……Não foi insolação, foi?"
90100050-213 = "Não. Os exames não acusaram nada de errado.#nA faculdade de medicina de Gehenna já confirmou."
90100050-214 = "Aí surgiram teorias: sabotagem, inveja, até macumba."
90100050-215 = "Ah... por isso a reação delas."
90100050-216 = "Perder uma concorrente é ruim, mas ser acusada de envenenar a colega é pior ainda."
90100050-217 = "O pessoal de Gehenna geralmente não liga para o que os outros pensam. Mas acusação falsa desse tipo... doi."
90100050-218 = "Pois é. 'A voz do povo é a voz de Deus', né."
90100050-219 = "Enquanto a vítima não acorda, as fofocas não param."
90100050-223 = "……Fofocas..."
90100050-224 = "É como as ondas do mar. Não dá para controlar."
90100050-225 = "Ir contra elas só piora."
90100050-226 = "Para quem está no olho do furacão, deve ser desesperador."
90100050-227 = "Deixar-se levar pelas ondas também é uma opção..."
90100050-228 = "Mas nós não somos barcos à deriva."
90100050-229 = "Melhor remar contra a corrente e chegar ao destino certo."
90100050-234 = "Uau... uma verdadeira filósofa."
90100050-235 = "No fim, ninguém escapa das fofocas né."
90100050-236 = "Haha, interessante."
90100050-237 = "Vamos trocar contato no MomoTalk? Quem sabe a gente se esbarra de novo."
90100050-238 = "Claro. Aqui está."
90100050-243 = "Pronto. Depois mando mensagem. Se cuida no calor."
90100050-249 = "Que garota estranha... tão brilhante."
90100050-250 = "É... mas FOX2, você não passou o seu contato real, né?"
90100050-251 = "Tranquilo. É descartável, some em 24 horas."
90100050-252 = "Se fosse fora da operação, até viraria amiga. Mas agora não."
90100050-256 = "FOX2 aqui. Terminando o teatro. Voltando para a base."
90100050-258 = "Próximo Episódio: Verdades e Mentiras"