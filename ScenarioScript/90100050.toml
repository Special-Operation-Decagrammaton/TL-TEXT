[translation]
90100050-1 = "Episode 5;Inquiries"
90100050-3 = "The current time is 10:30 Kivotos Standard Time."
90100050-4 = "As of this moment, FOX Platoon will begin inquiries for the 'Roar Tracking Operation'."
90100050-5 = "Report, everyone."
90100050-9 = "This is FOX4. Currently observing the target's movements at Point Oscar."
90100050-10 = "No signs of anything unusual so far."
90100050-11 = "Though... there is one very trivial problem at Point Oscar."
90100050-12 = "Specifically?"
90100050-13 = "It's so hot... I'm sweating even though I'm not moving. #nIsn't summer still a while away!?"
90100050-14 = "I'm going to melt if I stay under this camouflage netting in direct sunlight~"
90100050-15 = "The temperature seems higher this year than in previous years."
90100050-16 = "I'll look for a shaded point next. My apologies, but for now—"
90100050-20 = "FOX4, no complaining. You used to be able to endure even hotter places, didn't you?"
90100050-21 = "Have you gone soft at the Correctional Bureau?"
90100050-22 = "FOX3, don't preach on the operation channel. Even if I'm trained, hot is hot."
90100050-23 = "It would be better if I were only wearing a camisole as underwear like someone else—"
90100050-24 = "I am wearing proper undergarments, thank you very much!?"
90100050-28 = "...FOX3, continue your report."
90100050-29 = "T-this is FOX3. Um, I am also wearing proper—"
90100050-30 = "FOX3. You don't need to take FOX4's jokes seriously."
90100050-31 = "R-right. Ugh..."
90100050-35 = "This is FOX3. I am currently operating the IMSI catcher at Point Papa."
90100050-36 = "After cross-referencing the number of collected device IDs with the number of targets at Point Oscar, #nI estimate there are no identifiable people within a 500-meter radius."
90100050-37 = "I will report again if I confirm any signs of abnormality or additional terminals within the surveillance area."
90100050-38 = "FOX1, acknowledged."
90100050-42 = "Finally, FOX2—"
90100050-48 = "I'm ready on this end, too."
90100050-49 = "Supplies are sufficient, and the disguise is perfect..."
90100050-50 = "Once I confirm the target is approaching, I'll begin gathering information according to the procedure."
90100050-51 = "Good. Then, from here on—"
90100050-52 = "[ns1] \"There's some crazy talk flying around...\"\n[ns2] \"What are you planning to do?\""
90100050-55 = "[USERNAME]-sensei."
90100050-56 = "After the operation, we plan to hold a debriefing session with you as well. #nI believe I told you that it was not necessary for you to accompany us."
90100050-57 = "Is there something you are concerned about?"
90100050-58 = "[s3] \"Because this is the first joint operation between FOX Platoon and Schale!\"\n[s4] \"I wanted to see Yukino in action firsthand.\""
90100050-61 = "...I see."
90100050-62 = "Then, once again. We will now begin the briefing."
90100050-63 = "The primary objective of this 'Roar Tracking Operation'—not 'conco'—is to #nfully grasp the scope of the incidents occurring frequently around here, the Shirounagi Station area."
90100050-64 = "[s] \"What's happening here...?\""
90100050-65 = "Since last month, there has been a series of incidents where students have been found unconscious. #nIt started right around the time the General Student Council President returned."
90100050-67 = "Most of the victims were found at noon, #nand since no external injuries other than scrapes were found, heatstroke was initially suspected."
90100050-68 = "However, because the victims' pulses and body temperatures were normal, and many cases involved strong convulsions, #nother possibilities are being considered."
90100050-69 = "Also, there is a common testimony that they were chasing a 'white scarecrow' right before it happened, #nand the Valkyrie Police School is currently investigating the identity of the scarecrow."
90100050-71 = "But it seems no one other than the victims has seen the white scarecrow... #nso the investigation is struggling."
90100050-72 = "As the number of victims increases, rumors about ghost curses or evil spirits... #nhave been spreading as well..."
90100050-73 = "There's no way ghosts exist, right? #nEveryone is just saying whatever they want."
90100050-74 = "When people spread rumors irresponsibly, the outline of the case gets blurred."
90100050-75 = "I agree with that sentiment, but... currently, there is too little information to judge."
90100050-76 = "We have no choice but to take our time to re-examine the case and gather evidence."
90100050-77 = "[s] \"So, what are you going to do now?\""
90100050-78 = "First, we will conduct inquiries with the people involved."
90100050-79 = "To get them to talk naturally, we will disguise ourselves as part-timers to bring up the topic."
90100050-80 = "[s] \"Are you going to sell inari sushi again?\""
90100050-81 = "We changed the menu to be more appealing to the target. #nIt would be difficult in this heat, after all."
90100050-82 = "The most recent victim is said to be an athlete from the Gehenna Track and Field Club."
90100050-83 = "The Gehenna Track and Field Club seems to practice on this promenade often. #nIt's probably easy to run on since there's little foot traffic."
90100050-84 = "After checking their social media, it seems they have a practice scheduled for today as well."
90100050-85 = "If they are fellow club members, they might know something about what happened right before the victim collapsed."
90100050-86 = "[s] \"I see...\""
90100050-87 = "This is FOX4. Sorry to interrupt the pleasant conversation, but—"
90100050-88 = "The target is approaching the point."
90100050-92 = "Then FOX2, if you would."
90100050-93 = "Leave it to me~"
90100050-100 = "One, two, one, two!"
90100050-101 = "Don't break your rhythm! Keep up with the count!"
90100050-105 = "Um—"
90100050-106 = "Hey, you're in the way, in the way!"
90100050-107 = "Sorry to interrupt your practice... would you like to try our new sports drink, 'Hyper Aid'?"
90100050-108 = "Huh? What? A sports drink? Out of nowhere? What is this, a hard sell!?"
90100050-109 = "No, we're just handing out samples. Please, feel free!"
90100050-110 = "Something's fishy..."
90100050-111 = "Hehe. It's not very well known yet, but... #nactually, it's a new product from Kozuka Pharmaceutical."
90100050-112 = "We've been running ads and promotional events, but... #nin this day and age, word of mouth is important."
90100050-113 = "So, I'd like the Track and Field Club members to try it. If you like it, I'd appreciate it if you could help us spread the word."
90100050-114 = "As you probably already know, electrolytes are lost along with sweat after intense exercise, so... replenishing them with a fast-absorbing sports drink is best. #nThis 'Hyper Aid' contains a higher concentration of electrolytes than other companies' products, so—"
90100050-115 = "O-okay, okay. I get that you're serious. #nI guess I'll try some."
90100050-116 = "Well, I am thirsty, so why not."
90100050-121 = "Is it because it's hot? #nIt feels like my thirst is quenched faster than usual..."
90100050-122 = "It's like it soaks in the moment I drink it..."
90100050-123 = "Exactly! The strength of this 'Hyper Aid' is that it ensures the necessary electrolytes are absorbed in any environment!"
90100050-124 = "I brought plenty, so there are refills too."
90100050-125 = "It's that effective? Then I'll have some too..."
90100050-126 = "Me too! I want some too!"
90100050-130 = "What is that? I've never heard of it either..."
90100050-131 = "Kurumi, you've definitely had it before. #nIt's that powdered drink that was distributed at SRT, mixed at 1.5 times the recommended amount."
90100050-132 = "Huh? That cheap lemonade? They're that happy about it...?"
90100050-133 = "I think she would have been successful in sales, not just SRT."
90100050-134 = "(Did we succeed in lowering their guard...)"
90100050-136 = "...Thanks for the drink. What should I do to thank you?"
90100050-137 = "You're very welcome. If you'd like, I'd be happy if you could post your honest impressions on social media."
90100050-138 = "Leave it to me! I'll recommend it everywhere so the rumor spreads!"
90100050-143 = "...Come to think of it, that reminds me of a 'rumor'."
90100050-144 = "Have you ever heard the story about a track and field member who collapsed near here a while ago...?"
90100050-148 = "Hm? You mean Tama-chan? Why are you asking about that—"
90100050-149 = "...Why are you asking about that?"
90100050-150 = "Oh, there's no special reason."
90100050-151 = "It seems there have been many similar incidents around here lately, so I thought I'd be careful..."
90100050-152 = "............"
90100050-153 = "There's nothing we can tell you."
90100050-154 = "You're just going to say it was heatstroke, right?"
90100050-155 = "You don't know anything..."
90100050-156 = "U-um, by any chance—"
90100050-160 = "Thanks for the drink."
90100050-167 = "Sigh... that was a failure..."
90100050-168 = "Looks like we touched a nerve."
90100050-169 = "This is FOX2... sorry, it seems I failed."
90100050-170 = "It's fine. I didn't expect them to be friendly from the start—"
90100050-174 = "Wait, FOX2. Someone else is approaching."
90100050-181 = "Um... are you still handing out those drinks?"
90100050-182 = "O-of course. Would you like one?"
90100050-187 = "Thanks. It's an unknown brand, so I was curious."
90100050-191 = "Hmm... it has a unique flavor. I might be experiencing this for the first time. #nI'll tell Kirara about it later."
90100050-192 = "Still, you're a face I don't see around here. Did you come from another school?"
90100050-193 = "Y-yes! I'm from a bit further away... um, from Private Hyacinth Academy..."
90100050-194 = "Hmm... I feel like I've heard that name somewhere..."
90100050-195 = "Oh well. Don't worry too much about what those track and field girls were saying earlier. #nThey've been a bit on edge because of that incident."
90100050-196 = "By 'that incident', you mean..."
90100050-197 = "The one where one of their members was found unconscious."
90100050-198 = "You're curious about that case, aren't you?"
90100050-199 = "No, I'm not particularly—"
90100050-200 = "It's written all over your face. 'I can't help but be curious about the rumors'."
90100050-201 = "You seem to be quite the gossip lover yourself."
90100050-206 = "Ahaha... was it that obvious?"
90100050-208 = "The Gehenna Track and Field Club has their national tournament selection trials coming up soon. #nThe girl who collapsed was a strong candidate, too."
90100050-209 = "I heard she was working so hard that she'd even go running alone on her days off."
90100050-210 = "So when she was found collapsed, everyone thought she just pushed herself too hard and got heatstroke, but..."
90100050-212 = "...So it wasn't heatstroke."
90100050-213 = "Right. It's already spread on social media, but there was nothing wrong with her body. #nGehenna's Emergency Medicine Department confirmed it, so I don't think it's a hoax."
90100050-214 = "But then the question becomes, why did a strong candidate collapse? #nThere are even rumors going around like 'other members were jealous and cursed her' or 'they harassed her'."
90100050-215 = "Ah... so that's why they reacted like that."
90100050-216 = "Maybe the number of rivals for the regular spot will decrease, but it feels bad to be told things like that, right?"
90100050-217 = "There are many students who do things at their own pace and don't care what others think. #nEven Gehenna students who are talked about like that still care about bad rumors."
90100050-218 = "That's true. As they say, 'a thousand fingers pointing at you can kill you without a disease'."
90100050-219 = "Well, the person involved can't answer for herself. #nIt's a pity for the track and field girl, but we have no choice but to wait for the rumors to die down."
90100050-223 = "...Rumors, huh."
90100050-224 = "Hearsay, word of mouth... I feel like stories passed from person to person are often compared to natural phenomena."
90100050-225 = "They don't stop even if you try to stop them, and the more you resist, the more they flow to unexpected places and cause further damage."
90100050-226 = "From the perspective of those involved, it must feel like facing a giant wave."
90100050-227 = "Surrendering yourself to the wave and accepting it as it flows might be one way to handle it, but..."
90100050-228 = "We are not ships without a will."
90100050-229 = "I believe that if we don't grab the oars and push forward, even against the waves, #nwe won't be able to reach the correct destination."
90100050-234 = "Is that from experience?"
90100050-235 = "There's hardly anyone who has lived and never been the subject of a rumor..."
90100050-236 = "Hehe, that's interesting."
90100050-237 = "If you'd like, why don't we exchange MomoTalk accounts? We might meet again."
90100050-238 = "Of course. Please, give me a moment."
90100050-243 = "Alright. Then, I'll contact you again. Take care in this heat."
90100050-249 = "That was quite a sparkling student."
90100050-250 = "Yeah. But FOX2, you didn't give her your real account, did you?"
90100050-251 = "Don't worry. It's one that deletes itself after 24 hours."
90100050-252 = "If we had met in a different place, we might have become friends, but... we're on an operation right now."
90100050-256 = "This is FOX2. Operation confirmed complete. I'll be back soon."
90100050-258 = "Next Episode;Truth and Lies"