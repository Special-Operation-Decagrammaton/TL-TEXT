[translation]
10037060-1 = "Episódio 6; O bambu na neve não se curva"
10037060-3 = "[ns] \"Que vista incrível...\""
10037060-4 = "Fufu, este bosque de bambus é uma obra-prima, não acha?"
10037060-5 = "Dependendo da época, também é possível colher brotos de bambu."
10037060-6 = "Brotos de bambu...?"
10037060-7 = "São os brotos jovens do bambu. #nEles são conhecidos por sua textura doce e macia. São usados em diversos pratos."
10037060-8 = "Deveriam ter sido usados na comida da Associação Genbu ontem também..."
10037060-9 = "Ah! Aquele amarelo e fino! Estava muito saboroso!"
10037060-10 = "Hmph, os brotos de bambu de Shanhaijing são de qualidade superior. #nDizem até que são bons o suficiente para servir no café da manhã."
10037060-12 = "Fico feliz em vê-la bem hoje."
10037060-13 = "Peço desculpas pelo ocorrido ontem. Sinto muito por ter causado um desconforto à Secretária-Geral Cherino. #nAceite minhas sinceras desculpas."
10037060-14 = "Hm? Do que está falando, Mestra Kisaki?"
10037060-15 = "Apesar de ser a anfitriã da reunião, falhei em oferecer a hospitalidade adequada aos convidados. #nSinto muito."
10037060-21 = "M-Mestra...!"
10037060-23 = "Ah, você ainda estava preocupada com isso?"
10037060-24 = "Já que estamos aqui, vou declarar isso agora."
10037060-30 = "Eu não dou a mínima para essas coisas triviais!"
10037060-35 = "Como esperado da Presidente Cherino!"
10037060-37 = "Hu, hum..."
10037060-38 = "(Deixando de lado o quanto disso é verdade, isso deve bastar. Felizmente, parece que não ofendi a Secretária-Geral.)"
10037060-39 = "Agradeço pelo coração generoso da Secretária-Geral. #nDiga-me, conseguiu dormir bem ontem?"
10037060-40 = "Sim, foi um sono maravilhoso."
10037060-41 = "Mas... sinto um cheiro que nunca senti antes..."
10037060-42 = "Fufu, está falando deste aroma? A Comissária Marina tem um bom faro. #nEste é um incenso medicinal preparado pelo Clube de Pesquisa de Alquimia."
10037060-43 = "Ele tem o efeito de curar o cansaço do corpo e da mente... Espero que seja do agrado de vocês..."
10037060-44 = "Hmm... não sei bem, entendo e não entendo ao mesmo tempo..."
10037060-45 = "Bem, não importa. Já que se deram ao trabalho de vir até o bosque de bambus, vou mostrar algo bom."
10037060-46 = "Algo bom, você diz?"
10037060-48 = "— O que a Mestra chama de \"algo bom\"...? Ah!"
10037060-49 = "— É a atração principal do bosque de bambus."
10037060-50 = "Hmph, pode criar expectativas. É \"aquilo\" que todos adoram!"
10037060-51 = "Bem, vamos lá."
10037060-56 = "A-aquilo é... não pode ser...!!"
10037060-57 = "O que achou? Não são muito fofos?"
10037060-62 = "É um panda!!"
10037060-63 = "Comissária Marina, se falar tão alto, o panda pode se assustar e fugir..."
10037060-64 = "Ah, é verdade!"
10037060-66 = "Eles não são tão ágeis assim."
10037060-67 = "(Na verdade, eu vi um panda filhote na cela no dia em que cheguei em Shanhaijing...)"
10037060-68 = "(Parece melhor não mencionar isso agora.)"
10037060-69 = "Mesmo olhando de novo, aquele padrão preto e branco é misterioso..."
10037060-70 = "Hm? Você já viu pandas antes?"
10037060-71 = "S-sim, vi em materiais e fotos. #nA Comissária Marina, em especial, gosta de qualquer tipo de urso."
10037060-72 = "Fufu, entendo. Eles também são ursos, afinal."
10037060-74 = "Falando nisso, dizem que pandas só comem bambu..."
10037060-75 = "Sim. Além disso, eles são tão seletivos que escolhem apenas certos tipos de bambu."
10037060-76 = "Passam o dia todo apenas comendo e dormindo..."
10037060-77 = "[s] \"Que bom... como eu queria uma vida dessas!\""
10037060-78 = "P-Professor?"
10037060-79 = "P-por que sinto uma escuridão profunda vindo de você agora...?"
10037060-80 = "……Pandas são adoráveis. Não concorda?"
10037060-82 = "Sim! Só de olhar para eles assim……!"
10037060-86 = "Sinto que meu coração fica tão calmo……!"
10037060-87 = "Fufu, aproveite à vontade. #nPode chegar um pouco mais perto, se quiser."
10037060-91 = "Sério!?"
10037060-92 = "Mina, guie-nos. #nSe forem eles, já devem estar acostumados com as pessoas até certo ponto."
10037060-94 = "Sim, Mestra."
10037060-98 = "Então, vamos nos aproximar com cautela."
10037060-99 = "É perigoso chegar muito perto, então... vamos manter uma certa distância……."
10037060-110 = "Bem, Sensei—"
10037060-114 = "……!?"
10037060-119 = "(De repente, meu corpo……!)"
10037060-120 = "(Minha respiração…… está difícil. Minha cabeça…… está pesada…… minhas forças……)"
10037060-121 = "(Por que, logo agora…… neste momento……?)"
10037060-122 = "[ns] \"K-Kisaki!? Você está bem!?\""
10037060-128 = "(A voz do Sensei está…… distante. Será que nos afastamos?)"
10037060-129 = "(Ou será que……)"
10037060-137 = "……Sensei."
10037060-138 = "Já é…… noite? Está tudo tão escuro……."
10037060-139 = "[ns] (……!)"
10037060-141 = "[ns] \"…………Sim. O sol já se pôs…….\""
10037060-143 = "……."
10037060-144 = "…………Entendo, é mesmo."
10037060-145 = "……."
10037060-146 = "Sensei, tenho um pedido a lhe fazer."
10037060-147 = "Poderia chamar a Saya, do Clube de Pesquisa de Alquimia……?"
10037060-149 = "[ns] \"A Saya……?\""
10037060-150 = "Sim…… agora, só ela pode……."
10037060-151 = "E também…… por favor, cuide da Secretária-Geral Cherino e do pessoal de Red Winter……."
10037060-152 = "Poderia guiá-los até o Rokkaku, junto com a Mina……?"
10037060-153 = "[ns1] \"Sim…… deixe comigo.\"\n[ns2] \"Mas…… já é noite, não é……?\""
10037060-154 = "……Fufu."
10037060-155 = "……Fufu."
10037060-156 = "O Sensei é, de fato, muito gentil……."
10037060-157 = "Mas…… não há necessidade de se dar ao trabalho de concordar comigo…… até esse ponto……."
10037060-163 = "……Mestra Kisaki, sinto muito."
10037060-164 = "(……? Já chegamos……?)"
10037060-165 = "Mas, como a Mestra pediu para eu ser direta, #nesta que vos fala não tem escolha a não ser responder honestamente……."
10037060-169 = "(Não…… isso é uma memória daquela época……)"
10037060-172 = "Por isso, quero que ouça com atenção."
10037060-173 = "De agora em diante, o tempo que a Mestra conseguirá se mover durante o dia será extremamente limitado."
10037060-174 = "(Ah…… naquele dia, você disse exatamente isso……)"
10037060-175 = "Mesmo que não seja em todo o Rokkaku, pelo menos queime incenso medicinal no seu quarto. #nMesmo que o efeito seja fraco, pode ser útil……."
10037060-176 = "Além disso, tome este remédio todas as manhãs a partir de agora. Não pode esquecer nem por um único dia."
10037060-177 = "Outros métodos……? Hmm……"
10037060-178 = "Recomendo que faça alongamentos todos os dias. #nPor exemplo, ginástica. Ao fazer o sangue circular pelo corpo todo, talvez as coisas melhorem um pouco……."
10037060-179 = "O que eu disse, quero que cumpra rigorosamente."
10037060-180 = "Eu também…… não quero perder a Mestra deste jeito."
10037060-182 = "(No entanto, é estranho.)"
10037060-183 = "(Eu deveria ter tomado o remédio corretamente esta manhã……)"
10037060-184 = "（……）"
10037060-188 = "（Isso significa que……）"
