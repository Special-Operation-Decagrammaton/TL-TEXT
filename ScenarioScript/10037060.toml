[translation]
10037060-1 = "第6話;雪中の竹は曲がらず"
10037060-3 = "[ns] \"すごい光景だね……。\""
10037060-4 = "ふふ、ここの竹林は圧巻じゃろう？"
10037060-5 = "時期によっては、タケノコを収穫することもできるのじゃが。"
10037060-6 = "タケノコ……？"
10037060-7 = "竹の若芽のことじゃ。#n甘くて柔らかい食感が特徴での。様々な料理に使われておる。"
10037060-8 = "昨日の玄武商会の料理でも使われていたはずじゃが……。"
10037060-9 = "ああ！あの黄色で薄いアレか！香ばしかったな！"
10037060-10 = "フッ、山海経のタケノコは特に上質だからな。#n朝食に出しても良いと言われるほどだ。"
10037060-12 = "今日はお元気そうでなによりです。"
10037060-13 = "昨日は失礼した。チェリノ書記長も不愉快な思いをさせてしまったの。#nここに謝罪を。"
10037060-14 = "ん？何のことだ、キサキ門主。"
10037060-15 = "交流会の主催であるというのに、客人のもてなしを怠ってしまったからの。#nすまなかった。"
10037060-21 = "も、門主様……！"
10037060-23 = "ああ、まだそんなこと気にしてたのか。"
10037060-24 = "せっかくだし、ここで宣言しておくか。"
10037060-30 = "おいらは、そんな些細なこと気にも留めておらん！"
10037060-35 = "流石です、チェリノ会長！"
10037060-37 = "ふ、ふむ……。"
10037060-38 = "（どこまでが真意なのかはさておいて、これで良かろう。幸い、書記長の気分を害してはいないようじゃ）"
10037060-39 = "書記長の寛大な心に感謝を。#nして、昨日はよく眠れたかの？"
10037060-40 = "ええ、とても素晴らしい寝心地でした。"
10037060-41 = "しかし……なんだか嗅いだことがない匂いがするような……？"
10037060-42 = "ふふ、この香のことかの。マリナ委員長は鼻が利くようじゃな。#nこれは、錬丹術研究会に調合してもらった[ruby=こうやく]香薬[/ruby]じゃ。"
10037060-43 = "心身の疲れを癒す効果があっての……[ruby=そなた]其方[/ruby]らに合えば良いのじゃが……。"
10037060-44 = "うーん……よく、分かるような、分からないような……。"
10037060-45 = "まあ良い。せっかく竹林まで足を運んでくれたのじゃ。良いものを見せてやろう。"
10037060-46 = "良いもの、ですか？"
10037060-48 = "――門主様の言う「良いもの」だと……？あ！"
10037060-49 = "――竹林の名物じゃ。"
10037060-50 = "フッ、期待していいぞ。皆が好きな「あれ」だからな！"
10037060-51 = "さて、行こうかの。"
10037060-56 = "あ、あれは……まさか……！！"
10037060-57 = "どうだ？とても可愛いだろう？"
10037060-62 = "パンダだ！！"
10037060-63 = "マリナ委員長、あまり大きな声を出すと、パンダが驚いて逃げてしまうかもしれませんよ……？"
10037060-64 = "はっ、そうだった！"
10037060-66 = "あやつらはそこまで機敏ではないからの。"
10037060-67 = "（実は山海経に着いた日に牢屋で幼いパンダを見てはいるのですが……）"
10037060-68 = "（その話は……今はしない方がよさそうですね）"
10037060-69 = "改めて見ても、あの白黒の模様は不思議だなぁ……。"
10037060-70 = "ん？パンダを見たことがあるのか？"
10037060-71 = "は、はい、資料や写真などで見たことがあります。#n特にマリナ委員長は、熊なら種類を選ばず好んでおりまして。"
10037060-72 = "ふふ、そうか。あやつらも熊じゃからのう。"
10037060-74 = "そういえば、パンダは竹しか食べないと……。"
10037060-75 = "うむ。その上、食べる竹を選り好みするほど偏食での。"
10037060-76 = "一日中ずっと、食っちゃ寝を繰り返すばかりでな……"
10037060-77 = "[s] \"いいなぁ……そんな生活羨ましいっ！\""
10037060-78 = "せ、先生？"
10037060-79 = "な、なんだか今、深い闇を感じたような……。"
10037060-80 = "……パンダは可愛い。そうじゃろう？"
10037060-82 = "はい！こうやって見ているだけで……！"
10037060-86 = "なんだか、心が落ち着くような気が……！"
10037060-87 = "ふふ、存分に楽しんでくれ。#nもう少し近づいても良いぞ？"
10037060-91 = "本当ですか！？"
10037060-92 = "ミナ、案内を頼む。#nあやつらなら、ある程度は人に慣れておるはずじゃ。"
10037060-94 = "はい、門主様。"
10037060-98 = "では、慎重に近づいてみるとしようか。"
10037060-99 = "あまり近づくと危ないし……距離をとっていけば……。"
10037060-110 = "さて、先生――"
10037060-114 = "……っ！？！？"
10037060-119 = "（いきなり、身体が……！）"
10037060-120 = "（呼吸が……苦しい。頭が……重い……力が……）"
10037060-121 = "（よりによって、何故……今……？）"
10037060-122 = "[ns] \"き、キサキ！？大丈夫！？\""
10037060-128 = "（先生の声が……遠い。距離が離れておるのか？）"
10037060-129 = "（それとも……）"
10037060-137 = "……先生。"
10037060-138 = "もう……夜かえ？真っ暗じゃ……。"
10037060-139 = "[ns] （……！）"
10037060-141 = "[ns] \"…………うん。もう、日が暮れてるよ……。\""
10037060-143 = "……。"
10037060-144 = "…………そう、じゃったか。"
10037060-145 = "……。"
10037060-146 = "先生、頼みが、あるのじゃ。"
10037060-147 = "錬丹術研究会のサヤを……呼んでくれぬか。"
10037060-149 = "[ns] \"サヤを……？\""
10037060-150 = "ああ……今は、それしか……。"
10037060-151 = "それと……チェリノ書記長と、レッドウィンターの一行を……頼むぞ……。"
10037060-152 = "ミナと一緒に……六和閣まで、案内してくれぬか……。"
10037060-153 = "[ns1] \"うん……私に任せて。\"\n[ns2] \"でも……もう、夜なのに……？\""
10037060-154 = "……ふふ。"
10037060-155 = "……ふふ。"
10037060-156 = "先生は、やはり、親切じゃのう……。"
10037060-157 = "じゃが……そこまでして…[ruby=わらわ]…妾に[/ruby]、話を合わせる、必要は……ないのじゃぞ……。"
10037060-163 = "……キサキ門主、申し訳ないのだ。"
10037060-164 = "（……？もう着いたのか……？）"
10037060-165 = "でも、門主がはっきり述べるようにと言うから、#nぼく様は素直に答えるしかないのだ……。"
10037060-169 = "（いいや……これは、あの時の記憶……）"
10037060-172 = "だから、よく聞いてほしいのだ。"
10037060-173 = "門主はこれから……一日において動ける時間が極端に少なくなる。"
10037060-174 = "（ああ……あの日、其方はそう言っておった……）"
10037060-175 = "六和閣中まではいかなくても、せめて私室くらいには[ruby=こうやく]香薬[/ruby]を焚いておくのだ。#n効果は薄くても、少しは役に立つかもしれないのだ……。"
10037060-176 = "それと、これからは毎朝この薬を服用するのだ。一日たりとも忘れてはダメなのだ。"
10037060-177 = "他の方法……？うーん……"
10037060-178 = "毎日ストレッチするのをオススメするのだ。#nたとえば、体操とか。全身に血を巡らせることで、多少はマシになるかもしれないから……。"
10037060-179 = "ぼく様の言ったこと、必ず守ってほしいのだ。"
10037060-180 = "ぼく様も……このまま、門主を失いたくないのだ。"
10037060-182 = "（しかし、妙じゃな）"
10037060-183 = "（今朝もちゃんと薬を飲んだはずなのに……）"
10037060-184 = "（……）"
10037060-188 = "（ということは……）"
