[translation]
208-1 = "The show must go on."
208-3 = "Dizem que em outra área deste parque de diversões, havia um Boneco que realizava shows de mágica."
208-4 = "Ele apresentava vários truques diante de uma grande plateia e era muito popular, mas..."
208-5 = "――Será que ele ainda continua fazendo isso agora?"
208-10 = "……Ah, entendo."
208-11 = "Aquele mágico que se manifestou através da Mimesis parece continuar com o show, mesmo agora que não há mais público."
208-12 = "Sim, é verdade――será que o público é realmente necessário?#nSerá que existe algum significado em uma arte que atinge seu ápice sem nunca ser observada?"
208-13 = "Popularidade e artisticidade.#nSerá que a 'arte popular', onde esses dois extremos se fundem, pode realmente existir?"
208-14 = "É exatamente isso!!"
208-15 = "……Fufufu. Bem, tudo bem.#nSe fosse o Maestro ou o Black Suit, talvez tivessem encontrado outro motivo, mas..."
208-20 = "Eu apenas direi o seguinte."
208-21 = "Mesmo que seja uma performance sem público... mesmo que seja uma arte que nunca será observada――"
208-22 = "――O Show precisa continuar!"
208-23 = "É exatamente isso!!!"
208-24 = "――É isso que eu digo."
