[translation]
208-1 = "The show must go on."
208-3 = "この遊園地の別の区域には、マジックショーを行っていたアミューズドールがいたそうです。"
208-4 = "大勢の観客の前で様々なトリックを披露し、人気を博していましたが……。"
208-5 = "――果たして今はどうなのでしょうね？"
208-10 = "……ああ、なるほど。"
208-11 = "[ruby=ミメシス]複製[/ruby]で顕現したあのマジシャンは、観客がいなくなった今もなお、ショーを続けているようですね。"
208-12 = "ええ、そうですね――果たして観客は必要なのでしょうか？#n観測される事のない芸術が至る境地に意味はあるのでしょうか？"
208-13 = "大衆性と芸術性。#n対極にあるこれらが融合した”大衆芸術”は――成立するのでしょうか？"
208-14 = "そういうこったぁ！！"
208-15 = "……ふふふ。まぁ、いいでしょう。#nマエストロや黒服であれば、また別の理由を見出せたかもしれませんが…… "
208-20 = "私はただ、こう告げるだけです。"
208-21 = "例え観客のいないパフォーマンスであっても……観測される事のない芸術だとしても――"
208-22 = "――[ruby=The show must go on]ショーは継続されるべき[/ruby]。 "
208-23 = "そういうこったぁ！！！"
208-24 = "――であると。"
