[translation]
2003205-1 = "Preparação da Operação"
2003205-2 = "（Como terminei o trabalho mais cedo do que o esperado, fui até a sala do Departamento de Investigação de Fenômenos Estranhos）"
2003205-3 = "[ns] \"Eimi, você está aí?\""
2003205-4 = "Hmm..."
2003205-5 = "[s] \"Eimi?\""
2003205-6 = "Ah, Sensei?"
2003205-7 = "Espere um pouco, já vou."
2003205-12 = "Você disse que estaria ocupado hoje, então achei que não viria."
2003205-16 = "[ns] \"Eimi... por que você está de roupa de banho...?\""
2003205-17 = "Isso?"
2003205-18 = "Hum..."
2003205-19 = "Porque eu gosto?"
2003205-20 = "Não se preocupe. #nEu também estou usando as roupas que o Sensei comprou para mim."
2003205-21 = "Mas, realmente, usar uma jaqueta acolchoada dentro de casa é quente."
2003205-22 = "Vou tirar isso..."
2003205-26 = "[ns] \"Ei, Eimi! Falando nisso, aconteceu alguma coisa hoje?\""
2003205-27 = "Ah... eu estava fazendo um ventilador para o Mar de Gelo."
2003205-28 = "Eu pensei em levar um ventilador portátil, mas... a chefe me disse para manter as mãos aquecidas..."
2003205-29 = "Então, tentei criar uma ferramenta que gera vento enquanto aquece as mãos."
2003205-30 = "Sensei, quer testar? Quero ouvir sua opinião."
2003205-31 = "[s] \"Claro.\""
2003205-32 = "Aqui, pode usar."
2003205-37 = "[ns] \"O que é isso...?\""
2003205-38 = "Você estica o braço assim..."
2003205-39 = "E gira com a palma da mão..."
2003205-43 = "Ele gira como uma hélice e cria vento."
2003205-44 = "Assim, dá para sentir o vento enquanto aquece as mãos."
2003205-45 = "[s] \"É verdade!\""
2003205-46 = "É uma das minhas melhores criações."
2003205-47 = "O problema é que, se usar por muito tempo, o braço dói e o vento não é tão forte."
2003205-51 = "Se usarmos em dupla, podemos revezar, então tudo bem...?"
2003205-52 = "Verdade. Com o Sensei, tudo se resolve."
2003205-54 = "Hum... começou a ficar quente. #nEstou toda suada por dentro da jaqueta."
2003205-55 = "Vou tirar por enquanto..."
2003205-56 = "[s] \"Espere um pouco!\""
2003205-57 = "O que foi?"
2003205-58 = "Essa jaqueta não serve apenas para o frio, ela foi pensada para combinar com o resto da roupa, não foi...?"
2003205-59 = "Uma moda híbrida que combina roupas frescas com roupas quentes...?"
2003205-60 = "Mesmo que você diga que o equilíbrio vai ser arruinado se eu tirar a jaqueta... está calor, sabe?"
2003205-61 = "[s] \"A moda exige sacrifícios!\""
2003205-63 = "[ns1] \"Já sei, quer que eu abaixe a temperatura da sala?\"\n[ns2] \"Para servir de treino para aguentar o frio do Mar de Gelo.\""
2003205-66 = "Hã? Ah... entendi."
2003205-68 = "（Coloquei o ar-condicionado na temperatura mais baixa para que a Eimi continuasse usando a jaqueta）"
2003205-72 = "（...Como resultado, acabei pegando um resfriado）"
