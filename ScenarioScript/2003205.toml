[translation]
2003205-1 = "作戦準備"
2003205-2 = "（予想よりも早く仕事が片付いたため、特異現象捜査部の部室に向かった）"
2003205-3 = "[ns] \"エイミ、いる？\""
2003205-4 = "うーん……"
2003205-5 = "[s] \"エイミ？\""
2003205-6 = "あれ、先生？"
2003205-7 = "待ってて、すぐ行く。"
2003205-12 = "今日は忙しいって言ってたから、来ないと思ってた。"
2003205-16 = "[ns] \"エイミ……どうして水着なの……？\""
2003205-17 = "これ？"
2003205-18 = "ん……"
2003205-19 = "気に入ってるから？"
2003205-20 = "心配しないで。#n先生が買ってくれた服もちゃんと着てる。"
2003205-21 = "でも、やっぱり室内でダウンジャケットは暑いね。"
2003205-22 = "これは脱いで……"
2003205-26 = "[ns] \"え、エイミ！そういえば、今日は何かあったの？\""
2003205-27 = "ああ……氷海用の扇風機を作ってたんだ。"
2003205-28 = "携帯用の扇風機を持っていこうと思ったんだけど……部長に手は温めておくように言われて……"
2003205-29 = "それで手を温めながら風を起こす道具を作ってみた。"
2003205-30 = "先生も使ってみる？感想を聞かせて。"
2003205-31 = "[s] \"もちろん。\""
2003205-32 = "はい、使ってみて。"
2003205-37 = "[ns] \"これは……？\""
2003205-38 = "こうやって腕を伸ばして……"
2003205-39 = "手のひらで回すと……"
2003205-43 = "プロペラみたいに回転して、風を起こすの。"
2003205-44 = "これなら風を感じながら手を温められる。"
2003205-45 = "[s] \"本当だ！\""
2003205-46 = "自信作だよ。"
2003205-47 = "ただ、ずっと使ってると腕が痛くなるし、風もあんまり強くないのが問題。"
2003205-51 = "二人で使えば、交代できるし大丈夫……？"
2003205-52 = "たしかに。やっぱり先生と一緒なら、何でも解決できるね。"
2003205-54 = "うーん……暑くなってきた。#nジャケットの中が汗でびしょびしょ。"
2003205-55 = "とりあえず脱いで……"
2003205-56 = "[s] \"ちょっと待った！\""
2003205-57 = "どうしたの？"
2003205-58 = "このジャケットは防寒対策だけじゃなくて、洋服の組み合わせも考えられてるって……？"
2003205-59 = "涼しい服と暖かい服を組み合わせた、ハイブリッドなファッション……？"
2003205-60 = "ジャケットを脱ぐとバランスが崩れるって言われても……暑いよ？"
2003205-61 = "[s] \"オシャレは我慢が大事だから！\""
2003205-63 = "[ns1] \"そうだ、室温を下げようか？\"\n[ns2] \"氷海の寒さに耐える訓練も兼ねて。\""
2003205-66 = "え？うん……分かった。"
2003205-68 = "（エイミにジャケットを着てもらうために、エアコンの温度を一番低くした）"
2003205-72 = "（……その影響で、自分が風邪を引いてしまった）"
