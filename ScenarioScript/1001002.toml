[translation]
1001002-1 = "Esteira"
1001002-2 = "Kivotos - Ruas"
1001002-3 = "（Esperando por Shiroko no seu percurso de corrida matinal）"
1001002-5 = "Hum."
1001002-6 = "Sensei, esperou muito?"
1001002-7 = "[s] \"Não, acabei de chegar.\""
1001002-8 = "……Entendi."
1001002-9 = "É uma sensação estranha encontrar o Sensei na rua assim."
1001002-10 = "De certa forma, me faz lembrar de quando nos conhecemos pela primeira vez……."
1001002-11 = "Sinto que coisas boas acontecem quando me exercito."
1001002-12 = "[s] \"Você gosta de se exercitar, Shiroko?\""
1001002-13 = "Hum……."
1001002-14 = "Começar o dia suando um pouco me faz sentir bem."
1001002-15 = "……."
1001002-16 = "Ah, claro, depois do exercício eu tomo um banho na escola, mas……."
1001002-17 = "Hum……."
1001002-18 = "Se não se importar, Sensei, quer vir correr comigo amanhã de manhã?"
1001002-19 = "[s1] \"Correr de manhã é um pouco...\"\n[s2] \"Vou ficar exausto o dia todo, então vou recusar...\""
1001002-20 = "Hum, talvez você tenha razão. Vamos pensar sobre exercícios outra hora. ……Bem, hoje nós íamos ao supermercado fazer compras, não é?"
1001002-21 = "Hum, talvez você tenha razão. Vamos pensar sobre exercícios outra hora. ……Bem, hoje nós íamos ao supermercado fazer compras, não é?"
1001002-22 = "Ah, o supermercado fica ali."
1001002-23 = "É logo ali, então não chega a ser uma corrida, mas vamos dar uma trotada até lá."
1001002-25 = "[s] Seguir Shiroko."
1001002-27 = "（1 hora depois）"
1001002-32 = "……."
1001002-33 = "[s] \"Haa…… haa…… haa……\""
1001002-34 = "Hum……."
1001002-35 = "Eu estava esperando porque não vi você quando olhei para trás……."
1001002-36 = "Acho que fui rápido demais…… desculpe."
1001002-37 = "Costumam dizer que eu olho demais para frente e esqueço de olhar ao redor……."
1001002-38 = "[s3] \"……Onde fica o supermercado?\"\n[s4] \"Já corremos por uma hora...\""
1001002-39 = "Hum……."
1001002-40 = "Hum……."
1001002-41 = "Estamos na metade do caminho?"
1001002-42 = "[s] \"Na metade!?\""
1001002-43 = "Se corrermos por mais uma hora, chegaremos lá. Desta vez vou correr um pouco mais devagar, vamos juntos, Sensei."
1001002-45 = "[s] \"E-espere!\""
1001002-47 = "（Decidi parar a Shiroko que estava correndo e caminhar com ela）"
1001002-48 = "（A partir daí, caminhamos por cerca de 2 horas）"
1001002-50 = "Finalmente chegamos. Este é o supermercado."
1001002-51 = "……Hum?"
1001002-52 = "Sensei…… você está bem? Está com uma aparência pálida……."
1001002-53 = "[s] \"Quão longe isso fica daquele lugar onde nos encontramos?\""
1001002-54 = "Hum, uns 15km……?"
1001002-55 = "É uma distância perfeita para passar na volta da minha corrida matinal."
1001002-56 = "Na verdade, pensei em ir a uma loja de conveniência bem mais longe, mas como o Sensei está comigo hoje, escolhi um lugar mais perto."
1001002-57 = "Dá para ir sem precisar de transporte, não dá?"
1001002-58 = "Ah…… não pode deitar ainda, Sensei. Ainda temos que caminhar 15km na volta……."
1001002-59 = "[s] \"Pode me matar logo...\""
1001002-60 = "H-hum……."
