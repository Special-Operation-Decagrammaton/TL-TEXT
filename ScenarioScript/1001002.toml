[translation]
1001002-1 = "ランニングマシン"
1001002-2 = "キヴォトス・街路"
1001002-3 = "（シロコの朝のランニングコースで、シロコを待っていた）"
1001002-5 = "ん。"
1001002-6 = "先生、待った？"
1001002-7 = "[s] \"ううん、ちょうど今到着したところ。\""
1001002-8 = "……そっか。"
1001002-9 = "こうやって道で先生に会うと、なんだか変な感じだね。"
1001002-10 = "なんとなく先生に初めて会った時のことも思い出すし……。"
1001002-11 = "運動をしてると、よく良いことが起こる気がする。"
1001002-12 = "[s] \"シロコは運動が好きなんだね？\""
1001002-13 = "んー……。"
1001002-14 = "朝から汗を流して一日を始めると気分がいいからね。"
1001002-15 = "……。"
1001002-16 = "あ、もちろん運動した後は、学校でシャワーを浴びるけど……。"
1001002-17 = "うーんと……。"
1001002-18 = "良かったら、先生も明日から、私と一緒に朝のランニングしない？"
1001002-19 = "[s1] \"朝からランニングはちょっと……\"\n[s2] \"一日中ヘトヘトになりそうだから遠慮するね……。\""
1001002-20 = "んー、まあそうかも。運動のことはまた今度考えよっか。……さて、今日はスーパーへショッピングに行くんだったね。"
1001002-21 = "んー、まあそうかも。運動のことはまた今度考えよっか。……さて、今日はスーパーへショッピングに行くんだったね。"
1001002-22 = "あ、スーパーはあっちにあるよ。"
1001002-23 = "すぐそこだから、ランニングってほどでもないけど、軽く走って行こうか。"
1001002-25 = "[s] シロコの後を追う。"
1001002-27 = "（1時間後）"
1001002-32 = "……。"
1001002-33 = "[s] \"ハア……ハア……ハア……\""
1001002-34 = "ふむ……。"
1001002-35 = "振り返っても見えないなって思って待ってたんだけど……。"
1001002-36 = "私がちょっと速すぎたね……ごめん。"
1001002-37 = "周りを見ないで前だけ見すぎって、よく言われる……。"
1001002-38 = "[s3] \"……スーパーはどこ？\"\n[s4] \"1時間も走ったのに……。\""
1001002-39 = "うーん……。"
1001002-40 = "うーん……。"
1001002-41 = "これで半分ぐらい？"
1001002-42 = "[s] \"半分！？\""
1001002-43 = "あと1時間くらい走れば着くよ。今度は少しゆっくり走るから、一緒に行こう、先生。"
1001002-45 = "[s] \"ま、待って！\""
1001002-47 = "（走っていくシロコを止めて、一緒に歩くことにした）"
1001002-48 = "（そこから、約2時間歩いた）"
1001002-50 = "やっと到着。ここが例のスーパーだよ。"
1001002-51 = "……うん？"
1001002-52 = "先生……大丈夫？顔色が悪いけど……。"
1001002-53 = "[s] \"ここって、あの約束の場所からどれぐらい離れてたの？\""
1001002-54 = "うーん、15kmぐらい……？"
1001002-55 = "朝ランニングしてから帰り道に寄るのに、ちょうどいい距離なんだよね。"
1001002-56 = "本当はもっと遠く離れたコンビニに行こうとも思ったけど、今日は先生もいるから近場を選んだの。"
1001002-57 = "これぐらいだったら案外乗り物無しで行けるでしょ？"
1001002-58 = "あ……まだ横になっちゃダメ、先生。帰りもまた15km歩かなきゃいけないから……。 "
1001002-59 = "[s] \"もういっそ殺して……。\""
1001002-60 = "う、うーん……。"
