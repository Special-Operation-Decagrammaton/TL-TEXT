[translation]
1902-1 = "嵐を呼ぶ突発の会計監査"
1902-2 = "風紀委員会・大会議室"
1902-3 = "……以上が、来月に予定している戦術訓練の計画案です。"
1902-4 = "ふむ……[ruby=パンデモニウム・ソサエティー]我々万魔殿が提[/ruby]案した計画が、影も形も無いようだが？"
1902-5 = "……こちらの方が合理的だと判断いたしましたので。"
1902-6 = "この訓練で使用する予算案については既に提出済みです。内容は今回の計画案と照らし合わせても問題ないかと思いますので、そちら側でご確認いただいて、本決定にできればと。"
1902-7 = "……ああ、そういえば届いていたな。目は通した。確かに問題は無い。"
1902-8 = "では――"
1902-9 = "しかし却下だ。"
1902-10 = "……はい？ですが今、問題は無い、と……。"
1902-11 = "ああ、確かに問題は無い。"
1902-12 = "ではなぜ……"
1902-13 = "それでも却下だ。"
1902-14 = "……何か不備や要望があれば、調整いたしますが？"
1902-15 = "キキキッ……！無駄だ、どう書類を調整したところで、結果は変わらない。"
1902-16 = "……どういうことでしょう？"
1902-17 = "仕方ない、説明してやろう。前々から思っていたのだ……風紀委員会の予算周りについては、もっと精査が必要だと。"
1902-18 = "書類がいくら整っていようと、実際にはどこで着服されているか、変な使い方をされているか分かったものではない。そうだろう？"
1902-19 = "（あなたがそれを言いますか……！？誰よりもゲヘナの予算を浪費しているあなたが！？）"
1902-20 = "ふぅ。では、どうすれば……？"
1902-21 = "ちょうど良い機会だ、風紀委員会。仕方ないから我々が会計監査をしようじゃないか。"
1902-22 = "ちょっ、ちょっと待ってください、急にそんな……！"
1902-23 = "仕方あるまい。最近は風紀委員会に、色々と怪しい動きがあると聞いているしな？"
1902-24 = "例えば、風紀委員長でもないどこかの行政官が、独断で兵力を運用した……とか。"
1902-25 = "……っ！"
1902-26 = "キシシシシシ……！何だ、良い顔ができるじゃないか！"
1902-27 = "（普段こちらからの情報なんて全部無視してるのに、こういうところだけ抜け目ない……！）"
1902-28 = "キキキキッ……！何度でも言ってやろう、[ruby=あまう]天雨[/ruby]アコ。万魔殿を出し抜こうなど、所詮は無駄な足搔きだとなぁ！"
1902-29 = "本当に困ったタヌキですね……！"
1902-30 = "（どうやら誤解があるようですので、それも合わせて少し検討させていただきましょうか）"
1902-31 = "あらっ、思ったことと言おうとしたことが逆に……。"
1902-32 = "……ま、まぁ良い。"
1902-34 = "精々念入りに、首でも洗って楽しみにしてるがいい！今度こそ徹底的に思い知らせてくれるわ！キキキキ、キャハハハハハ！！！"
1902-39 = "全く……！"
1902-43 = "イロハ、仕事だ。"
1902-44 = "……お呼びでしょうか、マコト先輩。"
1902-45 = "お前に、風紀委員会への会計監査を命じる！キキキキ……やつらの腹の底を、全て暴いてやれ！"
1902-46 = "あの気に入らない鼻をへし折り、我々万魔殿の恐ろしさを思い知らせてやるのだ！"
1902-47 = "……めんどくさ。"
1902-48 = "い、イロハ……？今、なんて……？"
1902-49 = "はあ、分かりました。仕事なら仕方ありません。で、会計監査ですか？"
1902-50 = "そうだ！やってしまえ、徹底的に風紀委員会を叩きのめせ！"
1902-51 = "叩きのめすも何も、ただの監査ですよね。"
1902-52 = "キシシシシシ……風紀委員会め、今度こそその心をへし折って、二度と我々を舐めるなんて真似ができないように――"
1902-53 = "はいはいそうですか。"
1902-54 = "た、頼むから、せめて最後まで話を聞いてくれ……。"
1902-56 = "……というわけで、監査をしに来たよ！"
1902-57 = "はぁ……。"
1902-58 = "せっかくマコト先輩が任せてくれたことだから、イブキ頑張るね！"
1902-61 = "えっ、今から！？"
1902-62 = "こんな、訓練が目の前に迫っている状況で……。"
1902-63 = "アコちゃんこれどういうこと！？よりによって委員長がいない、こんなタイミングで……！"
1902-66 = "くっ……！"
1902-67 = "諦めてください。万魔殿の上層部直々の指示ですので。"
1902-68 = "……まあ構いません。どちらにせよ杜撰な管理をしているつもりはありませんし、探られたところで痛くも痒くもありませんから。"
1902-69 = "むしろこの機に、これ以上無いくらい完全な身の潔白を証明して、今後は変な脅しなんてできないようにして差し上げましょう。"
1902-70 = "さぁ、やるのでしたら存分にどうぞ！"
1902-71 = "アコちゃん、自信満々なのは良いけど……。"
1902-72 = "行政官がこういうテンションの時は、逆に不安です。"
1902-75 = "では遠慮なく。"
1902-76 = "まず最初は……"
1902-77 = "……風紀委員会の本部ですね。"
1902-79 = "ゲヘナ風紀委員会本部・廊下"
1902-80 = "……廊下に見るところなんてあるのか？"
1902-81 = "……なるほど。"
1902-82 = "な、何だよ……。"
1902-86 = "万魔殿が配布している新聞、掲示されてませんね。"
1902-87 = "減点です。"
1902-88 = "はいっ！？"
1902-89 = "何それ、知らないんだけど！？"
1902-90 = "……はあ。"
1902-92 = "万魔殿が定期的に配布している新聞は、どの建物の掲示板にも必ず貼られていなくてはなりません。校則で決められています。"
1902-93 = "そんな校則があったのか！？"
1902-94 = "まあ、つい先々月にマコト先輩が発議したばかりの校則ですので、まだ現場には情報が届いていないかもしれませんが。"
1902-95 = "……それでも校則は校則なので。"
1902-96 = "それはもう暴挙じゃんか！？"
1902-97 = "戦術訓練の予算はまず、こちらに割り当てるべきですね。そういう形で予算使用の予定を書き換えておきます。"
1902-98 = "予算の名目は「掲示板の整備」とかにしておきましょうか。"
1902-99 = "くうっ……！"
1902-101 = "では次です。"
1902-103 = "ゲヘナ風紀委員会本部・2F休憩室"
1902-104 = "こちらが、普段風紀委員会で使っている休憩室です、が……ここまで調査するんですか？"
1902-105 = "そうですね。校則で決められている備品が揃っているか、賞味期限切れの物などが放置されていないか……"
1902-106 = "そういう部分の調査になります。それらを誤魔化すことで、数値の粉飾に繋げることもできますから。"
1902-107 = "そういうことでしたらきちんと管理していますから、心配ありません！"
1902-108 = "ねえねえイロハ先輩。"
1902-109 = "イブキ？どうかしましたか？"
1902-110 = "この休憩室、ココアは無いの？"
1902-113 = "なるほど……ありませんね。これは減点です。お客さんに対するおもてなしの準備がなっていません。こちらにも予算を割くべきでしょう。"
1902-115 = "はぁっ！？ココアで減点！？"
1902-117 = "いつどんなお客さんが来るかは分かりません、様々な好みに合わせて品を揃えておくのは当然のこと……。"
1902-118 = "といった感じで、「何でも良いからいちゃもんを付けてこい」とマコト先輩に言われてますので。"
1902-119 = "それ、この場で言っちゃって良いことなのか！？"
1902-120 = "まあ、では聞かなかったことにしてください。はぁ、どうしてそもそも私がこんなことを……。"
1902-121 = "では次……。"
1902-124 = "……。"
1902-126 = "（その後もイロハは無情にも、徹底的にいちゃもんをつけ、風紀委員会の予算を次々と削減したり用途を変更していった……）"
1902-128 = "これも、あれも、それも……。"
1902-129 = "削減、変更、削減、変更、削除、削減です。"
1902-130 = "……！"
1902-131 = "酷いですね……。"
1902-132 = "いくら何でも無茶苦茶だろ！？途中からもう論理が飛躍しまくってるし！"
1902-133 = "そう言われましても、私はただの公務員みたいなものなので。"
1902-134 = "あなた方に対して個人的な敵意はありませんが、これも仕事ですから……。"
1902-140 = "（そうして、約3時間に渡る会計監査（？）が繰り広げられ……）"
1902-142 = "そういうわけで……諸々確認した結果、戦術訓練の予算における約95%は削減、あるいは環境整備など別の予算に割り当てられるべきですね。"
1902-143 = "ああもう無茶苦茶だよ！そんなのもう訓練にならないじゃんか！？"
1902-144 = "これがまかり通ってしまうと、次の戦術訓練は……。"
1902-145 = "さて、残りは……"
1902-149 = "ふんふん～るんるん～♪"
1902-150 = "あっ、イブキ！そこ、前っ……！"
1902-156 = "イブキっ！"
1902-157 = "い、痛い……うぅ……。"
1902-158 = "大丈夫ですかイブキ！？どこか怪我は！？"
1902-159 = "なんか今、ものすごい派手に転んだけど……大丈夫か？"
1902-160 = "ひぐっ、うぅ……ぐすっ……な、泣かないもん……大丈夫……。"
1902-164 = "……来年度の予算はゼロですね。"
1902-166 = "はぁ！？急にどうして！"
1902-167 = "一応聞きますが、理由は……。"
1902-168 = "イブキを泣かせたから。"
1902-169 = "もう無茶苦茶ってレベルじゃないぞ！？"
1902-170 = "イブキを泣かせるなんて、許しません。"
1902-171 = "うぅ……あっ、それ、マコト先輩がいつも言ってる台詞だ！"
1902-172 = "でも今のは別に私たちのせいじゃ……！これくらい物が置いてあるのは普通のことだろ！？"
1902-173 = "私たちが来ると知っていたのですから、あらかじめ片付けることはできたはずです。それにもし、イブキがこうして怪我をしたことが、マコト先輩に知られたら……。"
1902-174 = "「配慮が足りない、そのせいでこちらの大切な人員に被害が出た」とカンカンに怒り、来年度の予算がどうこうのレベルでは済まないでしょう。"
1902-175 = "これくらいで済んで良かったと思ってください。"
1902-176 = "横暴だぁ！！"
1902-177 = "さて、では後は……。"
1902-180 = "キキッ、キャハハハハハ！よくやったぞイロハ！素晴らしい！"
1902-181 = "……。"
1902-182 = "これで分かっただろう、アコ行政官？万魔殿が本気を出したらどうなるのか！"
1902-183 = "くっ……。"
1902-184 = "キシシシッ！そろそろ無意味な抵抗は止めて、理解したらどうだ？"
1902-185 = "お前たち風紀委員会なんか、我々万魔殿の下っ端に過ぎないのだということを！"
1902-186 = "この事実をきちんと受け止め、噛みしめ！"
1902-187 = "まるで子犬のように我々の前でお腹を見せて、服従するが良い！！キキッ、キャハハハハハハッ！"
1902-188 = "……あの。これ、ただの会計監査なんですが。"
1902-189 = "予算の再分配案は一応作りましたが、これを正式に処理するためには行政的な手続きが必要で、それができないとただの案に過ぎないですし……って、聞いてないですね。"
1902-191 = "といったことが、先ほどありまして……。"
1902-192 = "（ちらっ……）"
1902-193 = "……そう。"
1902-194 = "はぁ、あのタヌキたちめ……できるだけ会いたくなかったけど、仕方ない。"
1902-195 = "い、委員長……？"
1902-196 = "もしかして……？"
1902-199 = "ちょっと行ってくる。"
1902-203 = "（その後銃声が響き渡り、万魔殿の本部が突然の爆発音と共に一部崩壊した、と言われているものの……）"
1902-204 = "（それはまた別のお話……）"
1902-205 = "嵐を呼ぶ突発の会計監査"
