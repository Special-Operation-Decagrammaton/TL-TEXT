[translation]
1902-1 = "A auditoria repentina que traz a tempestade"
1902-2 = "Comitê de Disciplina - Grande Sala de Reuniões"
1902-3 = "……Este é o plano de treinamento tático agendado para o próximo mês."
1902-4 = "Hum... parece que o plano proposto por nós, a Pandemonium Society, não tem nem sombra nem forma, não é?"
1902-5 = "……Julgamos que este aqui é mais racional."
1902-6 = "A proposta orçamentária para este treinamento já foi enviada. Acredito que o conteúdo não apresenta problemas ao ser comparado com o plano atual, então gostaria que vocês verificassem e aprovassem."
1902-7 = "……Ah, agora que você mencionou, chegou mesmo. Eu dei uma olhada. De fato, não há problemas."
1902-8 = "Então――"
1902-9 = "Mas está rejeitado."
1902-10 = "……Como? Mas você acabou de dizer que não há problemas……"
1902-11 = "Ah, de fato, não há problemas."
1902-12 = "Então por que……"
1902-13 = "Mesmo assim, está rejeitado."
1902-14 = "……Se houver alguma falha ou exigência, posso fazer ajustes, mas?"
1902-15 = "Kikiki……! É inútil, não importa como ajuste os documentos, o resultado não mudará."
1902-16 = "……O que quer dizer com isso?"
1902-17 = "Não tem jeito, vou explicar. Eu pensava nisso há algum tempo…… que a gestão orçamentária do Comitê de Disciplina precisa de um escrutínio maior."
1902-18 = "Não importa o quão organizados estejam os documentos, não dá para saber onde o dinheiro está sendo desviado ou se está sendo usado de forma estranha na prática. Não é?"
1902-19 = "（É você quem está dizendo isso……!? Você, que desperdiça o orçamento de Gehenna mais do que qualquer um!?）"
1902-20 = "Ufa. Então, o que devemos fazer……?"
1902-21 = "É uma ótima oportunidade, Comitê de Disciplina. Já que não tem jeito, vamos fazer uma auditoria contábil."
1902-22 = "Es-espere um pouco, de repente assim……!"
1902-23 = "Não há o que fazer. Ouvi dizer que, ultimamente, o Comitê de Disciplina tem tido vários movimentos suspeitos, não é?"
1902-24 = "Por exemplo, uma certa oficial administrativa que nem é a presidente do Comitê de Disciplina, operou forças militares por conta própria…… e coisas do tipo."
1902-25 = "……!"
1902-26 = "Kishishishishi……! O que foi, você consegue fazer uma cara boa, não é?"
1902-27 = "（Normalmente ignora todas as informações que enviamos, mas nessas horas é astuta……!）"
1902-28 = "Kikikiki……! Direi quantas vezes for preciso, Amau Ako. Tentar passar a perna na Pandemonium Society é, no fim das contas, um esforço inútil!"
1902-29 = "Você é um tanuki realmente problemático……!"
1902-30 = "（Parece que há um mal-entendido, então vamos considerar isso também）"
1902-31 = "Ora, o que eu pensei e o que eu ia dizer saíram ao contrário……"
1902-32 = "……B-bem, não importa."
1902-34 = "Prepare-se bem, lave o pescoço e aguarde ansiosamente! Desta vez, farei você aprender a lição completamente! Kikiki, Kyahahahahaha!!!"
1902-39 = "Francamente……!"
1902-43 = "Iroha, é trabalho."
1902-44 = "……Você me chamou, Makoto-senpai?"
1902-45 = "Eu te ordeno a realizar uma auditoria contábil no Comitê de Disciplina! Kikiki…… exponha tudo o que eles escondem no fundo do poço!"
1902-46 = "Quebre aquele nariz arrogante e faça-os sentir o medo da nossa Pandemonium Society!"
1902-47 = "……Que incômodo."
1902-48 = "I-Iroha……? O que você disse agora……?"
1902-49 = "Ah, entendi. Se é trabalho, não tem jeito. Então, auditoria contábil?"
1902-50 = "Isso! Faça isso, esmague o Comitê de Disciplina completamente!"
1902-51 = "Esmagar ou não, é apenas uma auditoria, não é?"
1902-52 = "Kishishishishi…… Comitê de Disciplina, desta vez vou quebrar o espírito de vocês para que nunca mais ousem nos subestimar――"
1902-53 = "Sim, sim, é isso mesmo."
1902-54 = "P-por favor, pelo menos me escute até o fim……"
1902-56 = "……E é por isso que viemos fazer a auditoria!"
1902-57 = "Haa……"
1902-58 = "Já que a Makoto-senpai confiou isso a mim, eu, Ibuki, vou me esforçar!"
1902-61 = "Hã, agora mesmo!?"
1902-62 = "Em uma situação como esta, com o treinamento batendo à porta..."
1902-63 = "Ako-chan, o que significa isso!? Logo agora, justamente quando a presidente não está...!"
1902-66 = "Grr...!"
1902-67 = "Por favor, desista. São instruções diretas da alta cúpula do Pandemônio."
1902-68 = "...Bem, não me importo. De qualquer forma, não pretendo manter uma gestão desleixada, e não me dói nem me incomoda que investiguem."
1902-69 = "Pelo contrário, aproveitarei esta oportunidade para provar minha inocência de forma absoluta, para que não possam mais me ameaçar com coisas absurdas no futuro."
1902-70 = "Vamos, se é isso que vão fazer, fiquem à vontade!"
1902-71 = "Ako-chan, é bom ter confiança, mas..."
1902-72 = "Quando a oficial administrativa fica com esse tom, eu é que fico preocupada."
1902-75 = "Então, sem cerimônias."
1902-76 = "Primeiro, começaremos por..."
1902-77 = "...o quartel-general do Comitê de Disciplina."
1902-79 = "Quartel-General do Comitê de Disciplina de Gehenna - Corredor"
1902-80 = "...Tem algo para ver num corredor?"
1902-81 = "...Entendo."
1902-82 = "O-o que foi..."
1902-86 = "O jornal distribuído pelo Pandemônio não está afixado aqui."
1902-87 = "Ponto negativo."
1902-88 = "Hã!?"
1902-89 = "O que é isso? Eu nem sabia disso!?"
1902-90 = "...Haa."
1902-92 = "O jornal distribuído periodicamente pelo Pandemônio deve estar obrigatoriamente afixado em todos os quadros de avisos dos edifícios. Está determinado pelo regulamento escolar."
1902-93 = "Existia um regulamento desses!?"
1902-94 = "Bem, é um regulamento que a veterana Makoto propôs apenas no mês retrasado, então talvez a informação ainda não tenha chegado ao pessoal da linha de frente."
1902-95 = "...Ainda assim, regulamento é regulamento."
1902-96 = "Isso não é um abuso de poder!?"
1902-97 = "O orçamento para o treinamento tático deve ser realocado para cá primeiro. Vou alterar o planejamento do uso do orçamento dessa forma."
1902-98 = "Vamos colocar o nome do orçamento como 'Manutenção de quadros de avisos', talvez?"
1902-99 = "Grrr...!"
1902-101 = "Então, o próximo."
1902-103 = "Quartel-General do Comitê de Disciplina de Gehenna - Sala de Descanso do 2º Andar"
1902-104 = "Esta é a sala de descanso que usamos normalmente no Comitê de Disciplina, mas... você vai investigar até aqui?"
1902-105 = "Sim. Vou verificar se os equipamentos exigidos pelo regulamento estão presentes, se não há itens com prazo de validade vencido deixados por aí..."
1902-106 = "É esse tipo de investigação. Ao encobrir essas coisas, é possível manipular os números."
1902-107 = "Se é assim, nós mantemos tudo em ordem, então não precisa se preocupar!"
1902-108 = "Ei, ei, veterana Iroha."
1902-109 = "Ibuki? Aconteceu alguma coisa?"
1902-110 = "Nesta sala de descanso, não tem chocolate quente?"
1902-113 = "Entendo... realmente não tem. Isso é um ponto negativo. A preparação para receber visitantes não está adequada. Deveríamos destinar orçamento para isso também."
1902-115 = "Hã!? Ponto negativo por causa de chocolate quente!?"
1902-117 = "Não sabemos quando ou que tipo de visitante virá; é natural ter produtos disponíveis para atender a vários gostos..."
1902-118 = "Dito isso, a veterana Makoto me disse: 'Arrume qualquer desculpa, não importa o que seja'."
1902-119 = "Você pode falar isso abertamente aqui!?"
1902-120 = "Bem, então finja que não ouviu. Haa, por que eu tive que fazer isso mesmo..."
1902-121 = "Então, o próximo..."
1902-124 = "..."
1902-126 = "(Depois disso, Iroha, impiedosamente, continuou a encontrar falhas, reduzindo o orçamento do Comitê de Disciplina e alterando o uso das verbas, uma após a outra...)"
1902-128 = "Isso também, aquilo também, aquilo outro também..."
1902-129 = "Redução, alteração, redução, alteração, exclusão, redução."
1902-130 = "...!"
1902-131 = "Isso é terrível..."
1902-132 = "Isso não faz o menor sentido! A lógica começou a se perder completamente no meio do caminho!"
1902-133 = "Mesmo que diga isso, eu sou praticamente apenas uma funcionária pública."
1902-134 = "Não tenho nenhuma hostilidade pessoal contra vocês, mas isso também é trabalho..."
1902-140 = "（E assim, uma auditoria contábil (?) de cerca de 3 horas se desenrolou...）"
1902-142 = "Sendo assim... após verificar tudo, cerca de 95% do orçamento de treinamento tático deve ser cortado ou realocado para outros orçamentos, como manutenção do ambiente."
1902-143 = "Ah, chega, isso é um absurdo! Desse jeito não dá nem para treinar!"
1902-144 = "Se isso for aprovado, o próximo treinamento tático será..."
1902-145 = "Bem, o que resta é..."
1902-149 = "Hum hum~ La la~♪"
1902-150 = "Ah, Ibuki! Ali, na frente...!"
1902-156 = "Ibuki!"
1902-157 = "Ai, dói... uuu..."
1902-158 = "Você está bem, Ibuki!? Se machucou em algum lugar?"
1902-159 = "Você caiu de um jeito bem feio agora há pouco... está tudo bem?"
1902-160 = "Hic, uuu... snif... e-eu não vou chorar... estou bem..."
1902-164 = "...O orçamento do próximo ano será zero."
1902-166 = "Hã!? Por que de repente!?"
1902-167 = "Vou perguntar por educação, mas qual é o motivo..."
1902-168 = "Porque você fez a Ibuki chorar."
1902-169 = "Isso já passou do nível do absurdo!"
1902-170 = "Não vou perdoar quem faz a Ibuki chorar."
1902-171 = "Uuu... ah, essa é a frase que a Makoto-senpai sempre diz!"
1902-172 = "Mas agora não foi nossa culpa...! É normal ter coisas espalhadas por aqui, não é!?"
1902-173 = "Vocês sabiam que viríamos, então deveriam ter arrumado tudo com antecedência. Além disso, se a Makoto-senpai souber que a Ibuki se machucou assim..."
1902-174 = "Ela vai ficar furiosa, dizendo que 'faltou consideração e, por causa disso, um membro importante da nossa equipe se feriu', e o problema não vai se limitar apenas ao orçamento do próximo ano."
1902-175 = "Considerem-se sortudos por ter terminado apenas nisso."
1902-176 = "Isso é tirania!!"
1902-177 = "Bem, então o resto..."
1902-180 = "Kiki, kyahahahaha! Muito bem, Iroha! Magnífico!"
1902-181 = "..."
1902-182 = "Agora você entendeu, Administradora Ako? O que acontece quando o Pandemonium leva as coisas a sério!"
1902-183 = "Droga..."
1902-184 = "Kishishishi! Já não está na hora de parar com essa resistência inútil e entender a situação?"
1902-185 = "Que vocês, do Comitê Disciplinar, não passam de subordinados do nosso Pandemonium!"
1902-186 = "Aceitem esse fato e reflitam sobre ele!"
1902-187 = "Mostrem a barriga como cachorrinhos na nossa frente e se submetam!! Kiki, kyahahahahaha!"
1902-188 = "...Com licença. Isso é apenas uma auditoria contábil."
1902-189 = "Eu até fiz uma proposta de redistribuição orçamentária, mas para processá-la formalmente são necessários trâmites administrativos, e sem isso é apenas uma proposta... ah, você não está ouvindo, né."
1902-191 = "Foi isso que aconteceu há pouco..."
1902-192 = "（Olhadinha...）"
1902-193 = "...Entendo."
1902-194 = "Haa, aqueles tanukis... eu queria evitar encontrá-los o máximo possível, mas não tem jeito."
1902-195 = "P-Presidente...?"
1902-196 = "Será que...?"
1902-199 = "Vou ali rapidinho."
1902-203 = "（Dizem que, depois disso, sons de tiros ecoaram e a sede do Pandemonium desabou parcialmente junto com uma explosão repentina, mas...）"
1902-204 = "（Essa é uma outra história...）"
1902-205 = "A Auditoria Contábil Repentina que Trouxe a Tempestade"
