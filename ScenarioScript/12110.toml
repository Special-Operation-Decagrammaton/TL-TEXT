[translation]
12110-1 = "Episódio 11; Batalha Perdida"
12110-2 = "(Risca, risca...)"
12110-3 = "Presidente, sobre isso... até quando eu preciso escrever...?"
12110-4 = "...Estamos na ducentésima página, mais ou menos. Você não disse que escreveria 1000 páginas por conta própria?"
12110-5 = "Isso foi, bem, uma metáfora para mostrar o quanto estou arrependida..."
12110-6 = "Mova as mãos em vez da boca."
12110-7 = "E-eu farei o meu melhor..."
12110-8 = "(Risca, risca...)"
12110-9 = "Falando nisso..."
12110-12 = "Aquela pessoa de Abydos, a Hoshino, você a conhece?"
12110-13 = "Não, foi a primeira vez que nos vimos pessoalmente."
12110-14 = "Entendo. É que você falou como se a conhecesse muito bem..."
12110-15 = "..."
12110-16 = "...Hoshino."
12110-17 = "Uma elite de verdade, chamada de 'gênio'. Nas análises do departamento de inteligência de dois anos atrás, ela estava listada como uma das ameaças potenciais para Gehenna."
12110-18 = "Nossa... não parecia nem um pouco com isso..."
12110-21 = "Ela tem uma aura bem relaxada, por assim dizer..."
12110-23 = "Ako, não se deve julgar as pessoas pela aparência."
12110-24 = "...Mas, de fato, a aura dela estava bem diferente de dois anos atrás."
12110-25 = "Originalmente, ela era do tipo bastante beligerante, especialista em táticas agressivas... tinha uma impressão rude e afiada."
12110-26 = "...Bem, deixando isso de lado."
12110-27 = "Naquela hora, se tivéssemos continuado a lutar, a maior parte do Comitê de Disciplina teria ficado incapacitada. Por causa da sua precipitação, Ako."
12110-28 = "Além disso, o 'Schale' também estava lá. Os danos poderiam ter sido ainda mais graves."
12110-29 = "Eu deveria ter feito uma análise de força de combate adequada, mas esse tipo de informação..."
12110-30 = "...Bem. Um dia, os relatórios de atividades simplesmente pararam."
12110-31 = "Afinal, é uma escola pequena, talvez o departamento de inteligência tenha parado de considerá-la uma ameaça."
12110-32 = "Se quiser saber os detalhes, tente vasculhar os arquivos antigos do departamento de inteligência."
12110-36 = "Ainda assim, Takanashi Hoshino... pensar que ela ainda permaneceu em Abydos sem ir embora..."
12110-37 = "Por que será...?"
12110-39 = "A pessoa com quem Abydos tem uma dívida..."
12110-40 = "Da... Kaiser Corporation..."
12110-42 = "Para apresentar com precisão, sou diretor da Kaiser Corporation, Kaiser Loan e Kaiser Construction."
12110-43 = "Atualmente, também atuo como Diretor Representante da Kaiser PMC."
12110-44 = "Não importa, mas em resumo, você é o culpado que enganou e explorou a escola Abydos, certo?"
12110-45 = "...Ho."
12110-46 = "É isso mesmo! Você é o culpado que enviou a Gangue dos Capacetes e a Loja de Conveniência para nos fazer sofrer até agora, não é!?"
12110-47 = "Hum...?"
12110-48 = "Por sua causa, nós... Abydos...!!"
12110-49 = "Ora, ora... é essa a primeira coisa que você diz?"
12110-50 = "Invadiram propriedade privada por conta própria, atacaram meus bondosos funcionários da PMC e destruíram as instalações..."
12110-51 = "...Hehe, interessante."
12110-53 = "Mas é melhor tomar cuidado com o modo como fala. Este é um local onde a Kaiser PMC conduz negócios legalmente. Primeiro, vocês deveriam entender que estão invadindo ilegalmente a propriedade privada de uma empresa."
12110-54 = "...!"
12110-55 = "...!"
12110-56 = "Bem, voltando ao assunto... sobre as terras do Distrito Autônomo de Abydos, eu realmente as comprei."
12110-57 = "E daí? Tudo foi uma transação legal, e todos os registros existem devidamente."
12110-58 = "Poderia parar de falar como se estivéssemos fazendo algo ilegal? Vocês não vieram aqui apenas para provocar, vieram?"
12110-59 = "Vieram aqui porque ficaram curiosos sobre o que estamos fazendo? Querem saber o motivo de termos comprado as terras de Abydos?"
12110-60 = "Se for isso, eu lhes direi: estamos procurando por um tesouro que dizem estar enterrado em algum lugar de Abydos."
12110-61 = "...!"
12110-62 = "……Esse tipo de conversa fiada, acha mesmo que vamos acreditar?!"
12110-63 = "Faz sentido. Se fosse esse o caso, não haveria explicação para o poderio militar desta PMC."
12110-64 = "Esse exército está aqui para ocupar nosso distrito à força. Não é isso?"
12110-67 = "……."
12110-68 = "Centenas de tanques, centenas de soldados de elite. Centenas de toneladas de pólvora e munição."
12110-69 = "Acha mesmo que preparariam tudo isso apenas por causa de uma escola com apenas cinco alunas?"
12110-70 = "Não seja ridícula. Isso é apenas uma precaução caso algum grupo tente interferir na nossa busca por tesouros. Nada mais que isso, não foi preparado para vocês."
12110-71 = "Vocês não passam de um incômodo, posso lidar com vocês a qualquer momento, da forma que eu quiser... Por exemplo, assim."
12110-73 = "……Sou eu…… Isso, pode prosseguir."
12110-74 = "O-o que...? Esse telefonema repentino... E o que significa \"prosseguir\"?"

12110-75 = "Tenho notícias infelizes. Parece que a classificação de crédito da escola de vocês caiu."
12110-78 = "(Trim, trim...)"
12110-79 = "……?"
12110-81 = "Aqui é a Kaiser Loan. A partir deste momento, estamos rebaixando a classificação de crédito de Abydos para o nível mais baixo."
12110-82 = "！？"
12110-83 = "Ajustamos a taxa de juros variável para um aumento de 3000%. Com todas as taxas aplicadas, o valor dos juros a partir do próximo mês será de 91,3 milhões de ienes."
12110-84 = "Pedimos que continuem realizando os pagamentos dentro do prazo."
12110-85 = "O quê!? Espera, por que de repente...!?"
12110-87 = "No-noventa milhões de ienes!?"
12110-88 = "……Hehe, hehehe."
12110-89 = "Agora entenderam? De quem é a mão que segura a corda no pescoço de vocês."
12110-90 = "……!"
12110-91 = "Ei, isso é mentira, né!? Tá falando sério!?"
12110-92 = "……."
12110-93 = "Ah, estou falando muito sério. Mas só isso talvez não tenha graça o suficiente..."
12110-94 = "Que tal assim: vamos pedir um depósito de garantia referente à dívida de 900 milhões de ienes. Quero que depositem 300 milhões de ienes na Kaiser Loan dentro de uma semana."
12110-95 = "Precisam me provar que conseguem pagar a dívida mesmo com essa taxa de juros."
12110-96 = "Não pode ser...!"
12110-97 = "……."
12110-98 = "Não temos como conseguir esse dinheiro... Já estamos no limite só para pagar os juros..."
12110-100 = "Então, por que não desistem da escola e vão embora?"
12110-101 = "！！"
12110-102 = "Peçam transferência e saiam. Isso resolveria tudo. Afinal, a dívida não é de vocês pessoalmente."
12110-103 = "É uma dívida que a escola deve assumir. Não há necessidade de vocês carregarem esse fardo, não é?"
12110-104 = "Isso... isso é impossível, não podemos fazer algo assim!"
12110-105 = "É isso mesmo, a escola é nossa!! Não tem como a gente abandonar tudo!"
12110-106 = "Abydos é a nossa escola, é a nossa cidade."
12110-108 = "Então, o que vão fazer? Têm alguma outra ideia melhor?"
12110-109 = "……Pessoal, vamos embora."
12110-110 = "Hoshino-senpai...!?"
12110-111 = "……Não adianta discutir mais aqui, só estamos sendo feitas de bobas."
12110-112 = "Ora... Vice-presidente do conselho estudantil, você parece ser bem esperta."
12110-113 = "……Ah, lembrei. Daquela presidente do conselho estudantil completamente idiota que vivia com você."
12110-114 = "……."
12110-115 = "Bem, conto com o depósito de garantia e o pagamento do próximo mês. Voltem sempre, clientes."
12110-116 = "Fufu, fuahahahaha...!!"
12110-117 = "Foi um tempo até que agradável. Vamos, escoltem as clientes até a saída."
12110-122 = "……."
12110-124 = "Próximo episódio: Alguns segredos"
