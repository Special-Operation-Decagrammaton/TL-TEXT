[translation]
12110-1 = "第11話;負け戦"
12110-2 = "（カリカリ……）"
12110-3 = "委員長、その……これは、いつまで書けば良いのでしょうか……？"
12110-4 = "……今200枚目くらいでしょう。自分で1000枚書くって言ってなかった？"
12110-5 = "それはその、それくらい反省していますという比喩でして……。"
12110-6 = "口より手を動かしなさい。"
12110-7 = "が、頑張ります……。"
12110-8 = "（カリカリ……）"
12110-9 = "そういえば……"
12110-12 = "あのアビドスのホシノという方は、お知り合いなのですか？"
12110-13 = "いや、実際に会ったのは初めて。"
12110-14 = "そうでしたか。どことなく、よく知っている方のように話されていたので……。"
12110-15 = "……。"
12110-16 = "……[ruby=たかなし]小鳥遊[/ruby]ホシノ。"
12110-17 = "「天才」と呼ばれた、本物のエリート。2年前の情報部の分析では、ゲヘナにとっての潜在脅威の一つとしてリストアップされていた。"
12110-18 = "何と……全くそういった感じには見えませんでしたが……。"
12110-21 = "だいぶこう、のんびりした雰囲気と言いますか……。"
12110-23 = "アコ、外見で相手を判断するものじゃない。"
12110-24 = "……でもたしかに、2年前とはずいぶん空気が違った。"
12110-25 = "元々は攻撃的戦術を得意とした、かなり好戦的なタイプで……荒っぽくて、鋭い印象だったのだけれど。"
12110-26 = "……まあ、それはさておき。"
12110-27 = "あの時、あのまま戦っていたらきっと、風紀委員の大半が戦闘不能になったはず。アコ、あなたの早とちりでね。"
12110-28 = "それに加えて、あの場には「シャーレ」もいた。被害はそれ以上に深刻になっていたかもしれない。"
12110-29 = "戦力の分析はしっかりと行ったはずだったのですが、そういった情報は……。"
12110-30 = "……まあ。ある日突然、活動報告も途切れたからね。"
12110-31 = "なにしろ小さい学校だし、情報部も途中から脅威とはみなさなかったのかもしれない。"
12110-32 = "詳しいことが知りたければ、情報部の昔の資料でも漁ってみることね。"
12110-36 = "それにしても、小鳥遊ホシノ……未だにアビドスを離れないで残っていたなんて……。"
12110-37 = "一体なぜ……？"
12110-39 = "アビドスが、借金をしている相手……。"
12110-40 = "か、カイザーコーポレーションの……。"
12110-42 = "正確に紹介すると、カイザーコーポレーション、カイザーローン、そしてカイザーコンストラクションの理事だ。"
12110-43 = "今は、カイザーPMCの代表取締役も務めている。"
12110-44 = "それはどうでもいいけど、要はあなたがアビドス高校を騙して、搾取した張本人ってことで良い？"
12110-45 = "……ほう。"
12110-46 = "そうよ！ヘルメット団と便利屋を仕向けて、ここまで私たちをずっと苦しませてきた犯人があんたってことなんでしょ！？"
12110-47 = "ふむ……？"
12110-48 = "あんたのせいで私たちは……アビドスは……！！"
12110-49 = "やれやれ……最初に出てくる言葉がそれか。"
12110-50 = "勝手に私有地へと侵入し、善良なる我がPMC職員たちを攻撃し、施設を散々破壊しておいて……"
12110-51 = "……くくっ、面白い。"
12110-53 = "だが、口の利き方には気を付けた方が良い。ここはカイザーPMCが合法的に事業を営んでいる場所。まず君たちは今、企業の私有地に対し不法侵入しているのだということを理解するべきだ。"
12110-54 = "……！"
12110-55 = "……っ！"
12110-56 = "さて話を戻そうか……アビドス自治区の土地だったか、確かに買ったとも。"
12110-57 = "だからどうした？全ては合法的な取引、記録も全てしっかりと存在している。"
12110-58 = "まるで、私たちが不法な行為でもしているかのような言い方は止めてもらおうか。わざわざ挑発をしに来たわけではないのだろう？"
12110-59 = "ここに来たのは、私たちがここで何をしているのか気になったからか？どうしてアビドスの土地を買ったのか、その理由が知りたいのか？"
12110-60 = "それならば教えてやろう、私たちはアビドスのどこかに埋められているという、宝物を探しているのだ。"
12110-61 = "……！"
12110-62 = "……そんなでまかせ、信じるわけないでしょ！！"
12110-63 = "それはそう。もしそうだとすると、このPMCの兵力について説明がつかない。"
12110-64 = "この兵力は、私たちの自治区を武力で占拠するため。違う？"
12110-67 = "……。"
12110-68 = "数百両もの戦車、数百名もの選ばれし兵士たち。数百トンもの火薬に弾薬。"
12110-69 = "たった5人しかいない学校のために、これほどの用意をするとでも？"
12110-70 = "冗談じゃない。あくまでこれは、どこかの集団に宝探しを妨害された時のためのもの。ただそれだけだ、君たちのために用意したものではない。"
12110-71 = "君たち程度、いつでも、どうとでもできるのだよ……例えばそう、こういう風にな。"
12110-73 = "……私だ……そうだ、進めろ。"
12110-74 = "な、何……？急に電話……それに「進行」って、何のこと？"
12110-75 = "残念なお知らせだ。どうやら、君たちの学校の信用が落ちてしまったそうだよ。"
12110-78 = "（プルルルー）"
12110-79 = "……？"
12110-81 = "こちらカイザーローンです。現時点を持ちまして、アビドスの信用評価を最低ランクに下げさせていただきます。"
12110-82 = "！？"
12110-83 = "変動金利を3000％上昇させる形で調整。それらを諸々適用した上で、来月以降の利子の金額は9130万円でございます。"
12110-84 = "それでは引き続き、期限までにお支払いをお願いいたします。"
12110-85 = "はい！？ちょ、ちょっとそんな急にどうして……！？"
12110-87 = "きゅ、9000万円！？"
12110-88 = "……くっくっくっ。"
12110-89 = "これで分かったかな。君たちの首にかけられた紐が今、誰の手にあるのか。"
12110-90 = "……！"
12110-91 = "ちょっ、嘘でしょ！？本気で言ってんの！？"
12110-92 = "……。"
12110-93 = "ああ、本気だとも。しかしこれだけでは面白みに欠けるか……。"
12110-94 = "そうだな、9億円の借金に対する保証金でも貰っておくとしよう。一週間以内に、我がカイザーローンに3億円を預託してもらおうか。"
12110-95 = "この利率でも借金返済ができるということを、証明してもらわねばな。"
12110-96 = "そんな……！"
12110-97 = "……っ。"
12110-98 = "そんなお金、用意できるはずが……今、利子だけでも精一杯なのに……。"
12110-100 = "ならば、学校を諦めて去ったらどうだ？"
12110-101 = "！！"
12110-102 = "自主退学して、転校でもすれば良い。それで全て解決するだろう、そもそも君たち個人の借金ではない。"
12110-103 = "学校が責任を取るべきお金だ。何も君たちが進んで背負う必要は無いのではないか？"
12110-104 = "そ、そんなこと、できるわけないじゃないですか！"
12110-105 = "そうよ、私たちの学校なんだから！！見捨てられるわけないでしょ！"
12110-106 = "アビドスは私たちの学校で、私たちの街。"
12110-108 = "ならばどうする？他に何か、良い手でも？"
12110-109 = "……みんな、帰ろう。"
12110-110 = "ホシノ先輩……！？"
12110-111 = "……これ以上ここで言い争っても意味が無い、弄ばれるだけ。"
12110-112 = "ほう……副生徒会長、さすがに君は賢そうだな。"
12110-113 = "……ああ、思い出したよ。賢そうな君と一緒にいた、あの全くもってバカな生徒会長のこともな。"
12110-114 = "……。"
12110-115 = "では、保証金と来月以降の返済についてはよろしく頼むよ。お客様。"
12110-116 = "ふふっ、ふははははは……！！"
12110-117 = "存外悪くない時間だったな。さあ、お客様を入り口まで案内してさしあげろ。"
12110-122 = "……。"
12110-124 = "次回;幾つかの秘密"
