[translation]
1005502-1 = "さりげなく"
1005502-4 = "（レッドウィンター連邦学園での業務を終え、227号特別クラスがある旧校舎へと向かった）"
1005502-12 = "（かなり辺鄙な場所に位置していることもあり、到着した頃には日が暮れていた）"
1005502-16 = "……足音？"
1005502-20 = "……あっ。"
1005502-27 = "何だ、先生か。こんなところにどうしたの、それもこんな時間に。"
1005502-28 = "……え？"
1005502-29 = "約束？……ああ、この間の。覚えててくれたんだ。"
1005502-33 = "ほら、中に入ったら？外はこんなに寒いけど、中はだいぶマシだから。"
1005502-42 = "自分で言うのもなんだけど、本当に来てくれるとは思わなかったよ。びっくりした。"
1005502-43 = "こんな日に限って、私しかいないけど……ありがとね。"
1005502-44 = "私は、薪を探しに行ってもらってる間のお留守番で。"
1005502-45 = "[s1] \"そっか、気にしないで。大した用事があったわけじゃないから。\"\n[s2] \"じゃあ、ひとりでここに？退屈じゃなかった？\""
1005502-46 = "大した用事はない……その言い方、逆に気になるね？"
1005502-47 = "まあ退屈じゃないと言えば嘘だけど……少なくとも今は、先生が来てくれたし？"
1005502-48 = "ま、そんな冗談はさておき……"
1005502-49 = "本当に、ご馳走してあげられるものが無くて申し訳ないんだけど……"
1005502-58 = "とりあえず喉は乾いただろうし、飲む？"
1005502-59 = "[s3] \"ありがたくもらうね。\"\n[s4] お礼を言って飲む。"
1005502-61 = "`"
1005502-69 = "[ns5] 強烈な違和感と共に噴き出した。\n[ns6] \"絶対水じゃないよね、これ！？\""
1005502-71 = "あー、勿体ない。大事なウォ……命の水が。"
1005502-73 = "まあまあ。急に関係無い話をするけど、「ウォッカ」の語源って「水」らしいよ？"
1005502-74 = "いやいや、騙してはいないって。私はそれが何なのか一言も言ってないし。"
1005502-75 = "それに、先生が飲んだところで問題にはならないでしょ？"
1005502-76 = "……？"
1005502-77 = "仮にお酒だとしたら、生徒の前で飲むわけにはいかない？"
1005502-78 = "なるほど、そう来たか……。"
1005502-82 = "……先例ができちゃったね、ってことでどう？"
1005502-83 = "[s7] \"ダメなものはダメかなぁ……。\"\n[s8] \"できれば、普通の水をもらえると……。\""
1005502-84 = "んー、ごめん。普通に水をあげたいのはやまやまなんだけど……。"
1005502-85 = "んー、ごめん。普通に水をあげたいのはやまやまなんだけど……。"
1005502-86 = "私としても、意地悪だけで渡したわけじゃなくて。"
1005502-87 = "今、ここの電気全部落ちててね。冷蔵庫も故障しちゃって……#nそのせいで、飲み物も凍っちゃってたんだ。"
1005502-88 = "液体は軒並みダメだったんだけど、「とある度数の高い飲み物」だけは無事でさ。"
1005502-89 = "その点、やっぱり優れた飲み物だと思わない？"
1005502-90 = "極限の状況でも喉の渇きを潤し、寒い場所では体温の調節、そして怪我をした時には消毒薬としても活躍……"
1005502-91 = "場合によっては火をつけて燃料としても使える、万能の液体。"
1005502-92 = "[s] \"まあ、それはそうかもだけど……。\""
1005502-93 = "何だかそんなことを話してたら、喉が渇いてきたな……。"
1005502-94 = "でも氷を食べたら低温やけどになるかもだし、残るは……。"
1005502-95 = "……ま、一口ぐらい大丈夫か。"
1005502-99 = "さて――"
1005502-100 = "[s9] \"いやいやいやいや。\"\n[s10] 「ボトル」を取り上げる。"
1005502-107 = "先生？"
1005502-108 = "どうしたの急に、先生も飲みたい？"
1005502-115 = "な、なにしてるの……！？"
1005502-116 = "燃料として使えば、凍ったほかの飲み物を溶かせる……？"
1005502-117 = "うーん……。"
1005502-118 = "確かに、それも手だけど……。"
1005502-119 = "……………………。"
1005502-120 = "[s11] \"すごい残念そう……。\"\n[s12] \"申し訳ないけど、ダメなものはダメ……。\""
1005502-121 = "……うん、まあ良いか。"
1005502-122 = "……うん、まあ良いか。"
1005502-123 = "……。"
1005502-125 = "……まあ、そうだよね。"
1005502-129 = "（その後無事に飲み物を溶かすことができて、シグレとゆったり過ごしたのだった）"
