[translation]
901010400110-7 = "Aqui FOX1. FOX2, conseguiu entrar na área-alvo?"
901010400110-8 = "FOX2, acabei de entrar no Ponto Alfa. Sem problemas até agora. Vou continuar a operação."
901010400110-14 = "Aqui FOX3. Chegamos ao Ponto Sierra com FOX4. Visibilidade da área de operação está boa. Aqui também tudo certo."
901010400110-15 = "Mas deu um frio na barriga quando a FOX2 quase foi barrada no posto de controle..."
901010400110-16 = "FOX2 foi incrível. Dava pra acreditar que ela era uma entregadora de verdade."
901010400110-18 = "Fufu, é porque estou levando a sério, no espírito de entregadora da \"FOX EATS\"."
901010400110-19 = "... Então, FOX1. Quem é o primeiro alvo?"
901010400110-20 = "O desaparecido na área de operação – no Porto Kanezaki – é um jovem chamado \"Miyaguchi\", que trabalhava num barco de pesca de caranguejo."
901010400110-21 = "Parece que era novato, gastava muito, tinha boca suja e vivia brigando com os outros. Dizem que também estava endividado."
901010400110-22 = "Dívida, confusão... me identifico demais."
901010400110-23 = "Quando você começa a mexer com agiota, fica difícil voltar à vida normal, sabe... Cuidado vocês também."
901010400110-24 = "FOX4, ouviu?"
901010400110-25 = "Hã...? Do nada eu?"
901010400110-26 = "Você às vezes paga fiado quando recebe munição, né. Outro dia mesmo encomendou uma proteção de mão cara e esqueceu de pagar –"
901010400110-30 = "E-ei, isso foi há muito tempo!"
901010400110-31 = "Hum~, depois você me conta direitinho, FOX3."
901010400110-32 = "Agora não é hora pra isso, né? Vamos, foco na operação."
901010400110-34 = "Bem dito, FOX2. Continuo a explicação."
901010400110-36 = "... É mesmo. Depois a gente conversa."
901010400110-37 = "Ugh..."
901010400110-39 = "Segundo os colegas pescadores... Miyaguchi sumiu há uma semana, depois de desembarcar do barco."
901010400110-40 = "A bagagem ficou no barco, literalmente só a pessoa desapareceu."
901010400110-41 = "Quem viu ele desembarcar também foi outro pescador?"
901010400110-42 = "Isso. Por isso, os próprios pescadores também são suspeitos."
901010400110-43 = "Se aproximem com cuidado. Não levantem suspeitas."
901010400110-44 = "Pode deixar."
901010400110-45 = "E aí... onde estão os pescadores?"
901010400110-47 = "Tem um barco de pesca de caranguejo atracado no cais 3."
901010400110-48 = "Nesse horário, devem estar por ali organizando os petrechos."
901010400110-49 = "Sim, vou lá."