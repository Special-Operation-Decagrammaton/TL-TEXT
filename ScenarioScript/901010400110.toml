[translation]
901010400110-7 = "This is FOX1. FOX2, have you reached the target area?"
901010400110-8 = "FOX2 here, just entered Point Alpha. No issues so far. Proceeding with the operation."
901010400110-14 = "This is FOX3. FOX4 and I have arrived at Point Sierra. Visibility in the operation area is good. No problems on our end either."
901010400110-15 = "I was on edge when FOX2 almost got caught at the checkpoint earlier, though..."
901010400110-16 = "FOX2 was amazing. I would've believed she was a real bento delivery person."
901010400110-18 = "Heh, I'm approaching this mission with the mindset of a 'FOX EATS' delivery driver, after all."
901010400110-19 = "...So, FOX1. Who is our first target?"
901010400110-20 = "The target is a young man named 'Miyaguchi' who worked on a crab fishing boat and recently went missing in the operation area—Kanezaki Port."
901010400110-21 = "He was a newcomer, but apparently had a bad temper and a loose tongue, often getting into fights with those around him. Rumor has it he was also in debt."
901010400110-22 = "Debt and arguments... that sounds all too familiar."
901010400110-23 = "Once you get involved with loan sharks, it's impossible to return to a normal life... Everyone, be careful out there."
901010400110-24 = "FOX4, did you hear that?"
901010400110-25 = "Hm...? Why are you bringing me up all of a sudden?"
901010400110-26 = "You sometimes put your ammo orders on a tab, don't you? Just the other day, you ordered an expensive handguard and forgot to pay for it—"
901010400110-30 = "W-wait, when was that!?"
901010400110-31 = "Hmm, tell me more about that later, FOX3."
901010400110-32 = "Now isn't the time for that, is it? Come on, we need to focus on the mission."
901010400110-34 = "That's right, FOX2. I'll continue the briefing."
901010400110-36 = "...Sure. Let's talk about it later."
901010400110-37 = "Ugh..."
901010400110-39 = "According to his fellow fishermen... Miyaguchi disappeared after getting off the docked fishing boat a week ago."
901010400110-40 = "His belongings were left on the boat, and he literally vanished into thin air."
901010400110-41 = "Was he only seen getting off the boat by the other fishermen?"
901010400110-42 = "Yes. That's why we're also looking at the fishermen as suspects in this disappearance case."
901010400110-43 = "Approach with extreme caution. Don't let them get suspicious."
901010400110-44 = "Don't worry, leave it to me."
901010400110-45 = "So... where are the fishermen now?"
901010400110-47 = "There's a crab fishing boat docked at Pier 3."
901010400110-48 = "At this hour, they should be around there organizing their fishing gear, right?"
901010400110-49 = "Got it, I'm heading out."