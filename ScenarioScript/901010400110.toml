[translation]#[Texto Final. - Filipe 05/07.]
901010400110-7 = "Aqui FOX1.#nFOX2, conseguiu entrar na área alvo?"
901010400110-8 = "FOX2, acabei de entrar no ponto Alfa.#nPor enquanto sem problemas. Vou continuar a operação."
901010400110-14 = "Aqui FOX3. Cheguei ao ponto Sierra com a FOX4.#nA visibilidade da área está boa. Aqui também tá tranquilo."
901010400110-15 = "Mas quase tive um treco quando a FOX2 quase foi pega no portão."
901010400110-16 = "A FOX2 foi muito bem, até parecia uma entregadora de verdade."
901010400110-18 = "Fufu, é porque eu entro no personagem de entregadora do 'FOX EATS'."
901010400110-19 = "……Então, FOX1.#nQuem é o primeiro alvo?"
901010400110-20 = "Na área da operação – porto de Kanezaki – o último desaparecido foi um jovem chamado 'Miyaguchi', que trabalhava num barco de pesca de caranguejo."
901010400110-21 = "Parece que era novato, mas gastava muito e tinha boca suja, vivia brigando.#nDizem que também tinha dívidas."
901010400110-22 = "Dívida e confusão…… me lembra demais certas coisas."
901010400110-23 = "Quando a gente se mete com agiota, é difícil voltar à vida normal……#nTodo mundo toma cuidado."
901010400110-24 = "FOX4, ouviu?"
901010400110-25 = "Hã……? Por que eu?"
901010400110-26 = "Você às vezes paga munição parcelado, né.#nOutro dia pediu um guarda-mão caro e esqueceu de pagar――"
901010400110-30 = "Ei, ei, que história é essa!?"
901010400110-31 = "Hmm~ depois você me conta direitinho, FOX3."
901010400110-32 = "Agora não é hora pra isso, né?#nVamos focar na operação."
901010400110-34 = "Isso mesmo, FOX2. Continuando a explicação."
901010400110-36 = "……É. Depois a gente conversa."
901010400110-37 = "Uu……"
901010400110-39 = "Segundo os colegas pescadores…… o Miyaguchi desembarcou do barco há uma semana e sumiu."
901010400110-40 = "As bagagens ficaram no barco, literalmente só ele desapareceu."
901010400110-41 = "Quem viu ele desembarcar foram só os colegas?"
901010400110-42 = "Sim. Por isso os pescadores também são considerados suspeitos."
901010400110-43 = "Aproximem-se com cuidado.#nNão levantem suspeitas."
901010400110-44 = "Tranquilo, deixa comigo."
901010400110-45 = "E aí…… onde estão os pescadores?"
901010400110-47 = "No píer 3, onde está o barco de pesca de caranguejo."
901010400110-48 = "Nesse horário, devem estar arrumando os equipamentos."
901010400110-49 = "Sim, vou lá."