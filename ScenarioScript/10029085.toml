[translation]
10029085-1 = "第8話;思い出は、心のなかに"
10029085-13 = "まだ、かしら……？"
10029085-14 = "こんなこと、言いたくないけどぉ……#nそろそろ精神力の限界かしらぁ。"
10029085-15 = "[ruby=しょくほう]   食蜂…[/ruby]…！？"
10029085-16 = "あと少し……！"
10029085-17 = "……これで、終わりだ！"
10029085-18 = "よし、チップも組み込んだし、これで大丈夫なはず。#nあとは起動させるだけだよ。"
10029085-19 = "皆さん、お待たせしました！#nそれでは……"
10029085-20 = "起動します！！"
10029085-25 = "……！"
10029085-26 = "……！！"
10029085-27 = "……！！"
10029085-28 = "……！"
10029085-29 = "[ns1] \"動いた……！\"\n[ns2] \"さっきとは音が違う……！\""
10029085-33 = "……！？"
10029085-34 = "な、何だコレは……！？また光が……！！"
10029085-35 = "……はっ！？"
10029085-41 = "……なっ、何が起きっ……！？"
10029085-47 = "うわあああっ……！？"
10029085-53 = "も、もしかして……！！"
10029085-54 = "……成功したね。#n「施設」が順番に、元の場所へ戻してる。"
10029085-55 = "これで、3人とも帰れるよ。"
10029085-56 = "……良かった。#n私たち、本当に成功したの？"
10029085-57 = "ふふっ、そうだね。#n正直、可能性は[ruby=ごぶごぶ]五分五分[/ruby]だったが……"
10029085-58 = "どんな仕事も、締切がなくては捗りませんからね！#n時間知覚の影響でしょう！！"
10029085-59 = "ちなみに時間知覚というは、人の感覚器官や脳の働きによって心理的時間が異なる知覚機能のことで、単に五感を頼りとする知覚とは異なり、様々な情報を……"
10029085-61 = "じゃあ、今度こそ終わりなのね？#nそろそろ私たちも……"
10029085-62 = "何も身体に異変はありませんけど……"
10029085-64 = "……説明を聞いてください！？"
10029085-66 = "すぐに順番がやってくるさ。"
10029085-67 = "うん、何も問題はない。#n[ruby=みこと]美琴[/ruby]たちは最初に飛ばされてきたから、帰りは最後なんだと思う。"
10029085-68 = "部長が言ってた通り、ここに来る直前の状態に戻ると思うよ。#n記憶はもちろん……"
10029085-69 = "その銃も。"
10029085-70 = "……あ。"
10029085-71 = "これ……やっぱり持って帰れないんですね？"
10029085-72 = "うん。飛ばされた時に持ってなかった物は、ここに残るよ。"
10029085-73 = "ん～、そうですか……。"
10029085-74 = "……ちょっと、残念です。#n記念に持っていけたらなって思ったんですけどね。"
10029085-75 = "前にも言ったはず。ここで起きた出来事は、3人のなかで無かったことになる。#n記憶も証拠も、何も残らないの。"
10029085-76 = "本来、そっちの世界とは異なる軸にあるから。"
10029085-77 = "はは……そう、ですね……。"
10029085-81 = "……でも。"
10029085-82 = "皆さんと出会えて良かったです！"
10029085-83 = "……。"
10029085-84 = "……そう？"
10029085-85 = "たとえ記憶が消えてしまったとしても、ここに来た意味まで失われるわけではありませんから。それに、皆さんの記憶には残ると思いますし……"
10029085-86 = "……あたし達と過ごした時間が、皆さんにとっても良い思い出だったのか自信はないですけど！はは、はははっ……！"
10029085-87 = "……あっ！"
10029085-88 = "そうだ。最後にお願いがあるんですけど……"
10029085-94 = "……これは。"
10029085-95 = "預かっておいてください……"
10029085-96 = "また会える、その日まで！"
10029085-97 = "……うん。"
10029085-98 = "[s3] \"責任をもって預かるよ。\"\n[s4] \"だから大丈夫、安心して。\""
10029085-101 = "先生……"
10029085-102 = "……！！"
10029085-103 = "ありがとうございます、先生！！"
10029085-107 = "あんまり効率的とは思えないけど……[ruby=るいこ]涙子[/ruby]の言いたいことも、少しは分かるかも。これは預かっておくね。"
10029085-108 = "ありがとう、[ruby=いずみもと]和泉元[/ruby]さん！！"
10029085-109 = "[ruby=みさか]御坂[/ruby]さんと食蜂さんも！#nここに置いてかれちゃうくらいなら、預かってもらいませんか！"
10029085-110 = "そしたら異世界にあたし達の痕跡が残るんですよ！"
10029085-112 = "気持ちは分かるけど、荷物を押しつけてるみたいね……"
10029085-113 = "……う～ん。"
10029085-114 = "まぁ、これくらいならそこまで迷惑にならないか。"
10029085-115 = "そうねぇ。#nいつもより穏やかな時間だったし、私も悪くなかったわぁ。"
10029085-116 = "……最後は、ちょ～っと疲れちゃったけどぉ。"
10029085-122 = "……うーん。"
10029085-123 = "記憶も証拠も残らないけど、意味はある……んだね。"
10029085-124 = "[s5] \"私も、そう思いたい。\"\n[s6] \"合理で説明できるものが全てじゃないからね。\""
10029085-127 = "……やっぱり、まだ全部は理解できないけど。"
10029085-128 = "でも、先生がそう言うなら、いつか分かる日が来るのかも。"
10029085-129 = "そんな可能性を信じて……"
10029085-130 = "この銃は、大切に保管しておくよ。"
10029085-131 = "……ふふっ、お任せしました！"
10029085-132 = "それじゃあ……"
10029085-133 = "あっ、光が……"
10029085-134 = "[s7] \"もう、順番が……。\"\n[s8] \"これでお別れだね。\""
10029085-137 = "ふふっ、あっという間でしたね！"
10029085-138 = "エンジニア部の皆さんも！本当にありがとうございました！！"
10029085-144 = "……本当に、本当に！"
10029085-145 = "楽しかったです！！"
10029085-151 = "それじゃ、私も失礼するわぁ。"
10029085-157 = "……みんな、ありがとう。"
10029085-158 = "[s9] \"元気でね、御坂。\"\n[s10] \"気をつけて帰ってね。\""
10029085-167 = "……みんな、行ってしまったね。"
10029085-168 = "さっきまでの騒がしさが嘘みたい。"
10029085-169 = "ここにはもう私たちと「施設」しか残ってないし……夢だったのかと思うくらい。"
10029085-170 = "声がよく響きますね！#nこれは本当に現実なのか、まだ実感が湧きません！"
10029085-172 = "そうだ。帰る前に「施設」の原理を調べ……"
10029085-178 = "……む？"
10029085-180 = "この音は……"
10029085-181 = "[s11] \"いま変な音が……。\"\n[s12] \"何かおかしい音がしなかった？\""
10029085-184 = "……あ。"
10029085-185 = "「施設」が暴走してるのかも。#nこのままじゃ、爆発で建物が崩壊する。"
10029085-186 = "なるほど。急に何度も「転移」を行ったせいで、「施設」に負荷が……"
10029085-187 = "……待ってくれ、エイミ。今なんて……"
10029085-188 = "ばく、はつ……？"
10029085-189 = "ほう、かい……？"
10029085-190 = "[s13] \"……えっ？\"\n[s14] \"……マズい！\""
10029085-193 = "うん、すぐに脱出しないと。"
10029085-194 = "……「施設」を使っての脱出？"
10029085-195 = "いや、今は元の場所に戻す設定になってるから、#nすぐには切り替えられないよ。"
10029085-196 = "急ごう、みんな付いてきて。"
10029085-197 = "さっきまでお別れの挨拶をしてましたよね！？#nまさか、こんな慌ただしく脱出する羽目になるとは！！"
10029085-198 = "[s15] \"まあ、3人は無事に帰れたから……。\"\n[s16] \"みんな、走るよ！！\""
10029085-201 = "ひいいいぃ！！！"
10029085-214 = "（その後、どうにか無事「施設」から脱出したが……）"
10029085-218 = "（ミレニアムに戻った瞬間、疲労[ruby=こんぱい]困憊[/ruby]で倒れ込んでしまった）"
10029085-222 = "……ふふ。"
10029085-223 = "楽しませていただきましたよ。#nまさか、このような事象が観測できるとは……"
10029085-224 = "ミレニアムの廃墟には、一体どれほど大きな秘密が隠されているのか、ますます気になりますね。"
10029085-225 = "必ずや、私の手で明らかにしてみせましょう♪"
10029085-227 = "とある科学の青春記録"
