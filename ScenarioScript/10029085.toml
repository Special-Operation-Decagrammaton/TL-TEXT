[translation]
10029085-1 = "Episódio 8; Memórias, dentro do coração"
10029085-13 = "Ainda não...?"
10029085-14 = "Eu não queria dizer isso, mas...#nAcho que meu limite de força mental está chegando."
10029085-15 = "Shokuhou...!?"
10029085-16 = "Só mais um pouco...!"
10029085-17 = "......É o fim!"
10029085-18 = "Certo, o chip foi instalado, então deve estar tudo bem agora.#nSó falta ligar."
10029085-19 = "Pessoal, obrigado por esperarem!#nEntão..."
10029085-20 = "Iniciando a ativação!!"
10029085-25 = "......!"
10029085-26 = "......!!"
10029085-27 = "......!!"
10029085-28 = "......!"
10029085-29 = "[ns1] \"Funcionou...!\"\n[ns2] \"O som está diferente de antes...!\""
10029085-33 = "......!?"
10029085-34 = "O-o que é isso...!? A luz de novo...!!"
10029085-35 = "......Ah!?"
10029085-41 = "......O-o que está acontecendo...!?"
10029085-47 = "Aaaaaah...!?"
10029085-53 = "S-será que...!!"
10029085-54 = "......Funcionou. A \"instalação\" está devolvendo cada uma para o seu lugar original."
10029085-55 = "Com isso, as três poderão voltar."
10029085-56 = "......Que bom.#nNós realmente conseguimos?"
10029085-57 = "Hehe, pois é.#nPara ser sincera, as chances eram de cinquenta por cento, mas..."
10029085-58 = "Nenhum trabalho progride sem um prazo! Deve ser por causa da percepção do tempo!!"
10029085-59 = "Aliás, a percepção do tempo é uma função perceptiva onde o tempo psicológico difere dependendo do funcionamento dos órgãos sensoriais e do cérebro humano, e ao contrário da percepção que depende apenas dos cinco sentidos, ela utiliza várias informações..."
10029085-61 = "Então, é o fim desta vez?#nJá está na hora de nós..."
10029085-62 = "Não sinto nenhuma mudança no meu corpo, mas..."
10029085-64 = "......Por favor, escutem a explicação!?"
10029085-66 = "A vez de vocês chegará logo."
10029085-67 = "Sim, não há problema algum.#nComo a Mikoto e as outras foram as primeiras a serem trazidas, acho que serão as últimas a voltar."
10029085-68 = "Como a chefe disse, acho que vocês voltarão ao estado em que estavam logo antes de virem para cá.#nIncluindo as memórias, é claro..."
10029085-69 = "E essa arma também."
10029085-70 = "......Ah."
10029085-71 = "Então... não dá para levar isso de volta, né?"
10029085-72 = "Sim. As coisas que vocês não tinham quando foram trazidas ficarão aqui."
10029085-73 = "Hum, entendo..."
10029085-74 = "......É uma pena.#nEu queria levar como lembrança."
10029085-75 = "Eu já disse antes. O que aconteceu aqui deixará de existir para as três.#nNem memórias, nem provas, nada restará."
10029085-76 = "Originalmente, isso existe em um eixo diferente do mundo de vocês."
10029085-77 = "Haha... é verdade, né..."
10029085-81 = "......Mas."
10029085-82 = "Fico feliz por ter conhecido vocês!"
10029085-83 = "......"
10029085-84 = "......É mesmo?"
10029085-85 = "Mesmo que as memórias desapareçam, o significado de terem vindo aqui não será perdido. Além disso, acho que ficará na memória de vocês..."
10029085-86 = "......Não tenho certeza se o tempo que passaram conosco foi uma boa lembrança para vocês também! Haha, hahaha...!"
10029085-87 = "......Ah!"
10029085-88 = "É verdade. Tenho um último pedido..."
10029085-94 = "......Isto é."
10029085-95 = "Por favor, guarde isso para mim..."
10029085-96 = "Até o dia em que pudermos nos encontrar novamente!"
10029085-97 = "……Sim."
10029085-98 = "[s3] \"Eu guardarei com responsabilidade.\"\n[s4] \"Então não se preocupe, fique tranquila.\""
10029085-101 = "Sensei……"
10029085-102 = "……！！"
10029085-103 = "Muito obrigada, Sensei！！"
10029085-107 = "Não acho que seja muito eficiente, mas…… talvez eu entenda um pouco do que Ruiko quer dizer. Vou guardar isso."
10029085-108 = "Obrigada, Izumimoto-san！！"
10029085-109 = "Misaka-san e Shokuhou-san também! #nJá que vamos ser deixadas aqui, por que não guardam isso para nós?"
10029085-110 = "Assim, nossos rastros permanecerão neste outro mundo!"
10029085-112 = "Entendo o sentimento, mas parece que estamos empurrando nossa bagagem para vocês……"
10029085-113 = "……Hmm."
10029085-114 = "Bem, se for só isso, não deve causar tanto incômodo."
10029085-115 = "É verdade. #nFoi um tempo mais calmo do que o habitual, e para mim não foi nada mal."
10029085-116 = "……Embora, no final, eu tenha ficado um pouquiiinho cansada."
10029085-122 = "……Hmm."
10029085-123 = "Não restam memórias nem provas, mas ainda assim tem um significado…… né."
10029085-124 = "[s5] \"Eu também quero acreditar nisso.\"\n[s6] \"Nem tudo pode ser explicado pela lógica, afinal.\""
10029085-127 = "……Realmente, ainda não consigo entender tudo."
10029085-128 = "Mas, se o Sensei diz isso, talvez chegue o dia em que eu entenda."
10029085-129 = "Acreditando nessa possibilidade……"
10029085-130 = "Vou guardar esta arma com muito cuidado."
10029085-131 = "……Fufu, deixo com você!"
10029085-132 = "Então……"
10029085-133 = "Ah, a luz……"
10029085-134 = "[s7] \"Já chegou a hora……\"\n[s8] \"É hora de nos despedirmos.\""
10029085-137 = "Fufu, passou num piscar de olhos!"
10029085-138 = "Pessoal do Departamento de Engenharia também! Muito obrigada mesmo！！"
10029085-144 = "……De verdade, de verdade!"
10029085-145 = "Foi muito divertido！！"
10029085-151 = "Bem, então eu também já vou indo."
10029085-157 = "……Pessoal, obrigada."
10029085-158 = "[s9] \"Fique bem, Misaka.\"\n[s10] \"Volte com cuidado.\""
10029085-167 = "……Todos foram embora, né."
10029085-168 = "Parece mentira que estava tão barulhento até agora."
10029085-169 = "Não sobrou nada aqui além de nós e da \"instalação\"…… chega a parecer que foi um sonho."
10029085-170 = "A voz ecoa bastante aqui! #nNão consigo acreditar se isso foi real ou não!"
10029085-172 = "É verdade. Antes de voltar, vou investigar o princípio da \"instalação\"……"
10029085-178 = "……Hm?"
10029085-180 = "Esse som é……"
10029085-181 = "[s11] \"Ouvi um som estranho agora……\"\n[s12] \"Não ouviu um som estranho?\""
10029085-184 = "……Ah."
10029085-185 = "A \"instalação\" pode estar em colapso. #nSe continuar assim, a explosão vai derrubar o prédio."
10029085-186 = "Entendo. Por causa das \"transferências\" repetidas e repentinas, a \"instalação\" sofreu uma sobrecarga……"
10029085-187 = "……Espere, Eimi. O que você disse agora……"
10029085-188 = "Explo... são……?"
10029085-189 = "Colap... so……?"
10029085-190 = "[s13] \"……Hã?\"\n[s14] \"……Isso é ruim!\""
10029085-193 = "Sim, precisamos sair daqui imediatamente."
10029085-194 = "……Usar as \"instalações\" para escapar?"
10029085-195 = "Não, agora elas estão configuradas para retornar ao local original, então não consigo mudar isso imediatamente."
10029085-196 = "Vamos nos apressar, todos me sigam."
10029085-197 = "Nós estávamos nos despedindo até agora pouco, não estávamos!?#nQuem diria que acabaríamos tendo que escapar com tanta pressa!!"
10029085-198 = "[s15] \"Bem, as três conseguiram voltar em segurança, então...\"\n[s16] \"Pessoal, vamos correr!!\""
10029085-201 = "Aaaaaah!!!"
10029085-214 = "（Depois disso, de alguma forma conseguimos escapar das \"instalações\" em segurança...）"
10029085-218 = "（No momento em que voltamos para Millennium, desabamos de exaustão）"
10029085-222 = "……Fufu."
10029085-223 = "Vocês me divertiram bastante.#nQuem diria que eu conseguiria observar um fenômeno como este..."
10029085-224 = "Fico cada vez mais curiosa sobre que tipo de segredo grandioso está escondido nas ruínas de Millennium."
10029085-225 = "Com certeza, eu mesma irei revelá-lo♪"
10029085-227 = "Um registro da juventude científica"
