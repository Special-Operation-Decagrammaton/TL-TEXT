[translation]
13310-1 = "Episódio 31; A única verdade (1)"
13310-3 = "（……Meu corpo não se move）"
13310-5 = "Fique deitada aí. #nVocê perdeu."
13310-6 = "（É assim que termina, de verdade...?）"
13310-13 = "Por quê? "
13310-14 = "Por que se meter nos problemas de Abydos...?"
13310-15 = "Porque o Sensei me pediu. #nEle disse para eu te impedir, Hoshino."
13310-16 = "……Além disso, eu não sou uma estranha nisso."
13310-17 = "……."
13310-18 = "Porque eu preciso destruir cada um dos legados do Imperador do Trovão."
13310-19 = "A tirana de Gehenna... o Imperador do Trovão?"
13310-20 = "O presente de despedida dela colocou Kivotos em perigo inúmeras vezes."
13310-21 = "……Eu nunca imaginei que existisse um em Abydos, no entanto."
13310-22 = "Entendi... Então a presidente do Comitê Disciplinar também está atrás do canhão ferroviário."
13310-23 = "Mas aquilo foi a Kaiser que—"
13310-24 = "Vai dar tudo certo, se o Sensei estiver aqui."
13310-25 = "Você também sabe disso, não sabe?"
13310-27 = "……."
13310-28 = "Não ouse dizer que não sabia!"
13310-29 = "“Com certeza, vai dar tudo certo”."
13310-33 = "O Sensei e as garotas de Abydos devem ter dito isso também."
13310-34 = "Assim como foi para mim..."
13310-35 = "……."
13310-36 = "Mesmo assim, você não parou... ou melhor, não conseguiu parar."
13310-38 = "Porque a Yume estava lá."
13310-39 = "……."
13310-40 = "Você queria proteger a vontade dela, não queria? #nPresumindo que ela tentava recuperar os direitos da ferrovia para destruir o canhão ferroviário."
13310-41 = "Mas isso está errado."
13310-42 = "Para começar, ela nem deveria saber da existência dele. #nNem eu nem Makoto, que estávamos atrás do legado do Imperador do Trovão desde aquela época, sabíamos."
13310-43 = "……."
13310-44 = "A “Ferrovia Trans-Deserto” foi a prova de que o conselho estudantil de Abydos e a Nephthys #ntentaram revitalizar o distrito autônomo juntas. Por isso, ela só queria preservá-la."
13310-45 = "Porque isso também era parte de Abydos. #nSem se preocupar com lucros, sabe."
13310-47 = "E, a caminho de um banco nos arredores do distrito para depositar o saldo restante... #nela sofreu um acidente inesperado."
13310-52 = "A vendedora “Saint Nephthys” e a compradora “Conselho Estudantil de Abydos”... #ncedem os direitos de uso das instalações da Ferrovia Trans-Deserto por 1 milhão de ienes... #ne a segunda parte promete pagar 10 mil ienes imediatamente como parte do contrato."
13310-54 = "Sim. Confirmamos o pagamento da entrada do contrato, mas #no saldo restante ainda não foi quitado."
13310-56 = "Como você sabe disso?"
13310-60 = "……A morte da presidente do conselho estudantil de Abydos foi um incidente grande demais."
13310-61 = "Grande o suficiente para fazer o departamento de inteligência de Gehenna se mover, sabe."
13310-63 = "Aquilo foi um acidente, Takanashi Hoshino."
13310-64 = "Não foi culpa de ninguém. #nSe é que precisa de um culpado, foi culpa de um desastre natural."
13310-65 = "Portanto, você não precisa carregar essa responsabilidade."
13310-66 = "……O que você sabe sobre mim?"
13310-67 = "Além disso, a veterana Yume, como presidente..."
13310-68 = "……."
13310-69 = "Eu sei de muita coisa. #nAfinal, fui eu quem investigou a morte de Kuchinashi Yume."
13310-70 = "Foi você...?"
13310-71 = "Desde aquela época, você era mais forte que qualquer um."
13310-72 = "Não seria estranho o departamento de inteligência te monitorar, seria?"
13310-74 = "Mas, justamente por isso, você não conseguiu pedir ajuda."
13310-75 = "Não existem muitas pessoas mais fortes que você."
13310-76 = "「一人で守らなきゃいけない」……。"
13310-77 = "Claro, não estou dizendo que esse pensamento esteja errado."
13310-79 = "Até o fim, você não fugiu e permaneceu em Abydos."
13310-80 = "……No fim das contas, você é mais forte do que eu."
13310-81 = "Isso só prova o quanto existem coisas que você quer proteger."
13310-82 = "……Coisas, que eu quero proteger."
13310-84 = "Mas o que você está fazendo?!"
13310-87 = "Estávamos esperando por você, o Horus do Amanhecer..."
13310-88 = "Não, era Hoshino, não é? Peço perdão pela gafe."
13310-90 = "……Ei, cara de terno preto, o que você quer desta vez?"
13310-91 = "……Hehehe, é verdade."
13310-92 = "Ainda não tínhamos decidido como me chamar, não é?"
13310-94 = "\"Terno Preto\"?…… Tudo bem. #nDe agora em diante, me apresentarei assim."
13310-95 = "……?"
13310-98 = "Já estou ciente da situação."
13310-99 = "Agora que a presidente do conselho estudantil se foi, você, como vice-presidente, vai assumir o pagamento da dívida, é isso? Hoshino?"
13310-100 = "Ou talvez…… você aceite a minha proposta?"
13310-101 = "Não tenho interesse."
13310-102 = "……Por quê? #nNão deveria haver motivo para você permanecer em Abydos."
13310-105 = "Abandone a escola de Abydos e junte-se à nossa organização…… Se você aceitar essa condição, #nnós arcaremos com quase metade da dívida que Abydos carrega agora."
13310-106 = "Hehe, hehehehe…… Vamos lá, quero ouvir sua resposta. #nSe for um sim, assine aqui."
13310-108 = "……Eu já disse várias vezes que recuso."
13310-109 = "……Por quê?"
13310-110 = "Poderia me dizer o motivo?"
13310-112 = "……Eu, para que fim."
13310-113 = "Mesmo assim, não posso deixar o canhão ferroviário de lado……"
13310-114 = "O Sensei e os outros vão parar o canhão ferroviário."
13310-120 = "Uoooooooooooooh!"
13310-121 = "Uooh."
13310-125 = "Estamos quase alcançando o canhão ferroviário!"
13310-126 = "……Digo, aquilo não é perigoso demais?"
13310-127 = "É exatamente por isso que precisamos pará-lo! #nShiroko-chan, Ayane-chan, Serika-chan, preparem-se para saltar!"
13310-128 = "Hum, entendido."
13310-129 = "M-mas não está rápido demais?"
13310-131 = "Sensei, detectei uma quantidade imensa de energia vindo do canhão ferroviário!"
13310-132 = "Detecção. O Habitante do Subsolo está se aproximando de Hoshino."
13310-133 = "Estou tentando interferir, mas como eles estão em um estado de coexistência, não consigo fazer mais do que isso……!"
13310-134 = "[s1] \"Entendido!\"\n[s2] \"Temos que dar um jeito de parar isso……!\""
13310-139 = "Impacto em 5 segundos!"
13310-140 = "Lá vou eu! #nEstão prontas?"
13310-141 = "Que desperdício de canhão ferroviário."
13310-146 = "Lá vou eu!"
13310-148 = "Hum!"
13310-150 = "Uwaaaaaah!"
13310-158 = "Próximo episódio: A Única Verdade (2)"
