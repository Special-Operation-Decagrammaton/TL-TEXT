[translation]
13310-1 = "第31話;唯一の真実（１）"
13310-3 = "（……体が動かない）"
13310-5 = "そのまま横になってなさい。#nあなたの負けよ。"
13310-6 = "（これで、本当に終わり……？）"
13310-13 = "どうして？ "
13310-14 = "アビドスの問題に、首を突っ込んでくるなんて……。"
13310-15 = "先生に頼まれたから。#n[ruby=たかなし]小鳥遊[/ruby]ホシノを止めてほしい、って。"
13310-16 = "……それに、私も無関係じゃない。"
13310-17 = "……。"
13310-18 = "雷帝の遺産を、私はひとつ残らず破壊しなくちゃいけないから。"
13310-19 = "ゲヘナの暴君……雷帝？ "
13310-20 = "彼女の置き土産は、何度もキヴォトスを危険に晒してきた。"
13310-21 = "……まさか、アビドスにも存在するとは思わなかったけど。"
13310-22 = "そっか……風紀委員長ちゃんも列車砲を狙ってるんだね。"
13310-23 = "でも、アレはカイザーが――"
13310-24 = "何とかなるわ、先生がいれば。"
13310-25 = "それくらい、あなたも分かってるでしょう？"
13310-27 = "……。"
13310-28 = "分からなかったとは言わせないわ！"
13310-29 = "「きっと、何とかなる」。"
13310-33 = "先生も、アビドスの子たちも、言っていたはずよ。"
13310-34 = "私にとっても、そうだったように……。"
13310-35 = "……。"
13310-36 = "それでも、あなたは止まらなかった……いや、止まれなかった。"
13310-38 = "[ruby=くちなし]梔子[/ruby]ユメがいたから。"
13310-39 = "……。"
13310-40 = "彼女の意志を守りたい、と思ったのでしょう？#n鉄道の権利を取り戻そうとしていたのは、列車砲を破壊するためだと決めつけて。"
13310-41 = "でも、それは違う。"
13310-42 = "そもそも彼女は、存在自体知らなかったはず。#n当時から雷帝の遺産を追っていた、私とマコトでさえ知らなかった。"
13310-43 = "……。"
13310-44 = "「砂漠横断鉄道」は、アビドス生徒会とネフティスが#n共同で自治区を復興させようとした証。だから、残したいと思っただけ。"
13310-45 = "これもアビドスの一部だから、と。#n採算なんて気にせずに、ね。"
13310-47 = "そして残金を振り込むために、自治区の外れにある銀行へ向かう途中の砂漠で……#n不慮の事故に遭った。"
13310-52 = "売主「セイント・ネフティス」と買主「アビドス生徒会」は……#n砂漠横断鉄道の施設使用権を100万円で売り渡し……#n乙は契約金の一部として1万円を即時に支払うことを約束する。 "
13310-54 = "ええ。契約金の支払いまでは確認できましたが、#nまだ残金が納められておりません。"
13310-56 = "どうして、それを知ってるの？"
13310-60 = "……アビドス生徒会長の死は、それだけ大きな事件だったから。"
13310-61 = "それこそ、ゲヘナの情報部が動くくらいには、ね。"
13310-63 = "アレは事故よ、小鳥遊ホシノ。"
13310-64 = "誰のせいでもない。#n強いて言うのなら、天変地異のせい。"
13310-65 = "だから、あなたが責任を感じる必要はないの。"
13310-66 = "……私の何を知ってるわけ？"
13310-67 = "それに、ユメ先輩は会長として……。"
13310-68 = "……。"
13310-69 = "知ってるわ、色々と。#nだって、梔子ユメの死を調べたのは、私だもの。"
13310-70 = "君が……？"
13310-71 = "当時から、あなたは誰よりも強かった。"
13310-72 = "情報部がマークしていても、おかしくないでしょう？"
13310-74 = "けど、だからこそ助けを求められなかった。"
13310-75 = "あなたより強い人は、そうそういないし。"
13310-76 = "「一人で守らなくちゃいけない」……。"
13310-77 = "もちろん、その考えが間違っているとは言わないけれど。"
13310-79 = "最後まで、あなたは逃げずにアビドスに残った。"
13310-80 = "……やっぱり、私よりも強い。"
13310-81 = "それだけ、守りたいものがある証拠ね。"
13310-82 = "……守りたい、もの。"
13310-84 = "もう、何やってるんですか！"
13310-87 = "お待ちしておりましたよ、暁のホル……"
13310-88 = "いや、ホシノさんでしたね。これは失礼。"
13310-90 = "……黒服の人、今度は何の用なのさ？"
13310-91 = "……クックックッ、そうでした。"
13310-92 = "まだ[ruby=ここ]キヴォトス[/ruby]での呼び名が決まっていませんでしたね。"
13310-94 = "「黒服」ですか……良いでしょう。#n今後はそのように名乗るとします。"
13310-95 = "……？"
13310-98 = "話は聞いております。 "
13310-99 = "生徒会長がいない今、副会長であるあなたが借金を返していく、ということでよろしいでしょうか？[ruby=たかなし]小鳥遊[/ruby]ホシノさん？"
13310-100 = "それとも……私の提案を受け入れますか？"
13310-101 = "興味ないね。"
13310-102 = "……なぜ？#nあなたがアビドスに残る理由はないはずです。"
13310-105 = "アビドス高校を退学し、私共の企業に所属する……その条件を呑んでいただければ、#n今アビドスが背負っている借金の半分近くをこちらで負担しましょう。"
13310-106 = "ククッ、ククククッ……さあ、答えを聞きましょう。#nもしイエスならば、こちらにサインを。"
13310-108 = "……何度も言ったはずだよ、断るって。"
13310-109 = "……どうして？"
13310-110 = "理由をお聞かせ願えますか？"
13310-112 = "……私は、何のために。"
13310-113 = "それでも、列車砲を放置するわけには……。"
13310-114 = "列車砲は、先生たちが止めてくれるはずだわ。"
13310-120 = "うおおおおおおおおおっ！"
13310-121 = "うおー。"
13310-125 = "もう少しで列車砲に追いつきます！"
13310-126 = "……って、さすがにアレはヤバくない？"
13310-127 = "だからこそ、止めなくてはいけません！#nシロコちゃん、アヤネちゃん、セリカちゃん、飛び乗る準備を！"
13310-128 = "ん、分かった。"
13310-129 = "に、にしても速すぎない？"
13310-131 = "先生、列車砲からものすごいエネルギー量を検知しました！"
13310-132 = "検知。地下生活者がホシノさんに接近しています。"
13310-133 = "妨害を試みていますが、状態の共存下にあるため、これ以上は……！"
13310-134 = "[s1] \"分かった！\"\n[s2] \"何とかして止めないと……！\""
13310-139 = "衝突、5秒前！"
13310-140 = "行くよ！#n準備オッケー？"
13310-141 = "列車砲、もったいなーい。"
13310-146 = "行きます！"
13310-148 = "ん！"
13310-150 = "うわあああっ！"
13310-158 = "次回;唯一の真実（２）"
