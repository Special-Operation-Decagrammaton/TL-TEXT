[translation]
10044080-1 = "Episódio 8; O que deve ser feito"
10044080-2 = "……。"
10044080-3 = "A-ah, desculpe... isso... está tudo bem mesmo...?"
10044080-4 = "O que foi?"
10044080-5 = "A-a carga... nós a trouxemos até aqui, mas..."
10044080-6 = "E daí?"
10044080-7 = "N-não... não acha que isso é estranho de qualquer jeito...?"
10044080-8 = "Ah, chega! Se não sabe, fale logo de uma vez!"
10044080-12 = "P-por isso... eu acho estranho transportar objetos de valor em um trem de carga..."
10044080-13 = "Não é tão estranho assim, não acha?"
10044080-14 = "C-claro que é! Se fossem materiais, tudo bem, mas são objetos de valor!?"
10044080-15 = "Além disso, as informações sobre o conteúdo foram ocultadas..."
10044080-16 = "É que ninguém me contou o que tinha dentro, só isso!"
10044080-17 = "T-talvez até isso tenha sido planejado...!"
10044080-19 = "E-eu fico pensando... e se tudo isso for parte de alguma conspiração...?"
10044080-24 = "Pahyahya! Você não está lendo mangá demais, não?"
10044080-26 = "E-eu gosto de mangás, é verdade, mas...!"
10044080-27 = "Pense bem! #nErro no sistema de partida, reportagem do Canal Chronos, o grupo que nos atacou..."
10044080-28 = "V-você acha mesmo que tudo isso é... coincidência?"
10044080-29 = "Se eles estivessem planejando algo, não seria um método muito complicado?"
10044080-30 = "E-e se isso também for apenas uma camuflagem...?"
10044080-36 = "N-nós fomos usadas direitinho..."
10044080-37 = "Parece que obras de arte também são usadas para lavagem de dinheiro..."
10044080-38 = "Acho que já ouvi falar disso!"
10044080-39 = "S-será que não fomos envolvidas em uma conspiração enorme...?"
10044080-40 = "O-o que você acha, Sensei?"
10044080-41 = "[s1] \"Talvez seja suspeito...\"\n[s2] \"Hmm, não sei dizer...\""
10044080-44 = "A-além disso, aquela gangue de motoqueiros também é estranha... eles nos perseguiram o tempo todo..."
10044080-45 = "P-por mais que digam que é por causa da pizza... d-deve ter algo por trás disso, com certeza...!"
10044080-46 = "Talvez eles sejam fãs da Hikari!"
10044080-47 = "Não tem como ser isso..."
10044080-48 = "[ns] \"O que você quer fazer, Aoba?\""
10044080-49 = "……。"
10044080-50 = "N-não é que eu queira fazer algo específico, mas..."
10044080-51 = "É só que estou preocupada... talvez isso seja usado para algo ruim..."
10044080-52 = "Se for esse o caso... nós, que estamos transportando, também seremos responsabilizadas..."
10044080-53 = "……Se é realmente correto transportar isso."
10044080-54 = "Eu só... não sei mais o que pensar..."
10044080-58 = "Talvez a Aoba tenha razão, mas..."
10044080-59 = "Isso não tem nada a ver com o que nós temos que fazer, tem?"
10044080-60 = "Eh...?"
10044080-61 = "Aceitar a carga e levá-la até o destino."
10044080-62 = "Simples, não é?"
10044080-63 = "I-isso é..."
10044080-65 = "Não é só sobre transportar, sabe?"
10044080-66 = "Depois que aceitamos, é sobre fazer o trabalho direito."
10044080-67 = "Levar o que nos foi confiado até o destino. #nEsse é o trabalho de nós, da Highlander, que controlamos a ferrovia, e é a nossa \"responsabilidade\"."
10044080-69 = "Responsabilidade..."
10044080-70 = "Ignore o que não importa."
10044080-71 = "Ficar pensando só dá estresse."
10044080-72 = "Ugh... eu não quero ouvir isso logo de quem é a causa do meu estresse..."
10044080-73 = "..."
10044080-74 = "M-mas... graças a isso, eu me acalmei um pouco..."
10044080-75 = "Pahyahya! Viu só? Eu disse que tudo ia dar certo!"
10044080-76 = "Esse seu jeito de não pensar nas consequências é algo que eu até gostaria de aprender..."
10044080-78 = "[ns3] \"Acho que assumir a responsabilidade final é o papel de um adulto.\"\n[ns4] \"Ter senso de responsabilidade é importante, né.\""
10044080-82 = "[ns5] \"Se você pensou por conta própria e chegou a esse resultado,\"\n[ns6] \"como seu sensei, vou te apoiar com tudo.\""
10044080-85 = "Pahyahya! Com o apoio do Sensei, eu me sinto invencível!"
10044080-86 = "Sensei, líder de torcida?"
10044080-87 = "V-você respeita as escolhas dos alunos, não é..."
10044080-91 = "Haa... é verdade. Não adianta nada ficar preocupada aqui agora..."
10044080-92 = "P-primeiro de tudo, terminar a missão de transporte é a prioridade, então..."
10044080-93 = "[s] \"Quando terminarmos a entrega, vamos conferir juntos.\""
10044080-94 = "S-sim..."
10044080-95 = "D-desculpe por... ter te envolvido nas minhas conversas inúteis..."
10044080-96 = "[s] \"Não foi inútil. Fico feliz por ter ouvido o que você tinha a dizer, Aoba.\""
10044080-97 = "É-é mesmo...?"
10044080-98 = "Obrigada, Sensei..."
10044080-99 = "..."
10044080-103 = "A-ainda tem algo...?"
10044080-104 = "Não, é que... acho que estamos indo rápido demais."
10044080-105 = "Hã? ...Espere, vou verificar."
10044080-112 = "..."
10044080-113 = "A velocidade está acima do limite...?"
10044080-115 = "Limite removido?"
10044080-116 = "N-não, isso não deveria estar acontecendo... vou reduzir a velocidade..."
10044080-121 = "Hã?"
10044080-126 = "...Hã?"
10044080-128 = "O que houve?"
10044080-130 = "O freio não está funcionando..."
10044080-131 = "Hã?"
10044080-132 = "Hã?"
10044080-134 = "[ns] \"...Hã?\""
