[translation]
10044080-1 = "第8話;やるべきこと"
10044080-2 = "……。"
10044080-3 = "あ、あの……これ……大丈夫なんですか……？"
10044080-4 = "なにがー？"
10044080-5 = "つ、積荷ですよ……ここまで運んできちゃいましたけど……。"
10044080-6 = "だからー？"
10044080-7 = "い、いや……どう考えても変じゃないですか……。"
10044080-8 = "もーっ！分かんないからはっきり言えって！"
10044080-12 = "で、ですから……貴重品を貨物列車で輸送するのっておかしいと思うんですけど……。"
10044080-13 = "おかしいってほどじゃなくない？"
10044080-14 = "だ、だって！資材ならともかく、貴重品ですよ！？"
10044080-15 = "それに、中身の情報は伏せられてるわけですし……。"
10044080-16 = "中身はー聞いてなかっただけだよー？"
10044080-17 = "も、もしかしたらそれも見越したうえで……！"
10044080-19 = "ぜ、全部がなにかの陰謀だったらどうしようって……思っちゃって……。"
10044080-24 = "パヒャヒャッ！マンガの読みすぎじゃん？"
10044080-26 = "た、たしかにマンガは好きですけど……！"
10044080-27 = "考えてみてください！#n発車システムのエラー、クロノスチャンネルの報道、襲ってくる集団……。"
10044080-28 = "こ、これが全部……偶然だと思いますか？"
10044080-29 = "狙ってるんだとしたら、やり方が回りくどくない？"
10044080-30 = "そ、それもカモフラージュのためだとすれば……？"
10044080-36 = "わ、私たちはまんまと利用されて……。"
10044080-37 = "び、美術品はマネーロンダリングにも使われるみたいですし……。"
10044080-38 = "聞いたことあるかもー？"
10044080-39 = "や、やっぱり何かとても大きな陰謀に巻き込まれたんじゃ……。"
10044080-40 = "せ、先生はどう思いますか？"
10044080-41 = "[s1] \"怪しい、かも……？\"\n[s2] \"うーん、どうかな……。\""
10044080-44 = "そ、それに、あの暴走族も変です……ずっと私たちを追ってきて……。"
10044080-45 = "ぴ、ピザの恨みと言うわりには……き、きっと何か裏があるに決まっています……！"
10044080-46 = "ヒカリたちのファンかもよー？"
10044080-47 = "そんなわけないじゃないですか……。"
10044080-48 = "[ns] \"アオバはどうしたいの？\""
10044080-49 = "……。"
10044080-50 = "べ、別にだからどうしたいってわけじゃないですけど……。"
10044080-51 = "た、ただ心配で……もしかしたら、悪いことに使われるかもしれませんし……。"
10044080-52 = "そうだったとしたら……これを運んでいる私たちも、責任を問われると思います……。"
10044080-53 = "……これを運ぶのが、果たして正しいのか。"
10044080-54 = "分からなくなってしまってる……だけです……。"
10044080-58 = "もしかしたらアオバの言う通りかもしれないけど――"
10044080-59 = "私らの「やるべきこと」には関係なくない？"
10044080-60 = "え……？"
10044080-61 = "荷物を引き受けて、目的地まで運ぶ。"
10044080-62 = "シンプルじゃん？"
10044080-63 = "そ、それは……。"
10044080-65 = "ただ運ぶって話じゃないよー？"
10044080-66 = "引き受けた以上は、ちゃんとやるって話ー。"
10044080-67 = "預かったものを、ちゃんと目的地まで持っていく。#nそれが鉄道を司る私らハイランダーの仕事で、「責任」だからね。"
10044080-69 = "責任……。"
10044080-70 = "余計なことは無視ー。"
10044080-71 = "考えるだけでストレスー。"
10044080-72 = "ううっ……わ、私のストレスの元凶に言われたくないです……。"
10044080-73 = "……。"
10044080-74 = "で、でも……おかげで少し落ち着きました……。"
10044080-75 = "パヒャヒャッ！でしょ？なんとかなるって！"
10044080-76 = "そういう後先考えないのは、むしろ見習いたいくらいですけど……。"
10044080-78 = "[ns3] \"最後に責任を取るのは大人の役目だと思うけど。\"\n[ns4] \"責任感があるのは大事だよね。\""
10044080-82 = "[ns5] \"自分で考えてその結果に至ったのなら、\"\n[ns6] \"先生として全力で応援するね。\""
10044080-85 = "パヒャヒャッ！先生の応援があるなら百人力だ！"
10044080-86 = "先生ー、応援団ー？"
10044080-87 = "せ、生徒の選択を尊重するんですね……。"
10044080-91 = "はぁ……たしかに。ここで心配してても、意味ないですよね……。"
10044080-92 = "と、とりあえず、輸送任務を終わらせるのが先、ですから……。"
10044080-93 = "[s] \"届け終わったら一緒に確認してみよっか。\""
10044080-94 = "は、はい……。"
10044080-95 = "そ、その……私の無駄話に付き合わせてすみませんでした……。"
10044080-96 = "[s] \"無駄なんかじゃないよ。アオバの言葉を聞けてよかった。\""
10044080-97 = "そ、そう……ですか……。"
10044080-98 = "ありがとうございます、先生……。"
10044080-99 = "……。"
10044080-103 = "ま、まだ何か……？"
10044080-104 = "いや、スピード出過ぎかな、って。"
10044080-105 = "えっ？……ちょっと、確認してみます。"
10044080-112 = "……。"
10044080-113 = "制限速度より、速くなってる……？"
10044080-115 = "リミット解除ー？"
10044080-116 = "い、いえ、そんなはずは……いったん速度を落として……。"
10044080-121 = "え？"
10044080-126 = "……ええ？"
10044080-128 = "どしたのー？"
10044080-130 = "ブレーキが効かないんですけど……。"
10044080-131 = "え？"
10044080-132 = "え？"
10044080-134 = "[ns] \"……ええ？\""
