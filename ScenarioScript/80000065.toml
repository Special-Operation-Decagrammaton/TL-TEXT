[translation]
80000065-1 = "Como uma empregada"
80000065-6 = "……Ora, então você estava aqui mesmo, Mestre."
80000065-7 = "Como você não estava no escritório, acabei te procurando um pouco."
80000065-8 = "……Fufu. Sim, hoje é Dia dos Namorados, afinal."
80000065-9 = "Preparei algo singelo para o Mestre, que sempre se esforça tanto por nós."
80000065-10 = "Bem, dentro desta bolsa……"
80000065-14 = "……Mestre?"
80000065-15 = "Aconteceu alguma coisa?"
80000065-16 = "……Nervoso? Por que estaria?"
80000065-17 = "……Uma bomba?"
80000065-22 = "Ah, entendo……."
80000065-23 = "Não, eu que peço desculpas. É por causa do meu comportamento habitual, suponho……."
80000065-24 = "Por mais que eu seja quem sou, não tiraria uma bomba em um dia como este."
80000065-25 = "Bem, é verdade que costumo carregar C4 e várias outras coisas nesta bolsa, mas……."
80000065-26 = "Isso é algo para eu refletir. Pelo menos de agora em diante, tentarei evitar fazer isso na frente do Mestre."
80000065-27 = "Portanto, não se preocupe. Desta forma, eu devidamente……"
80000065-32 = "Também trouxe o chocolate."
80000065-33 = "[s1] \"Ah, por acaso é feito à mão……?\"\n[s2] \"Feito pela Akane?\""
80000065-34 = "Fufu, você percebeu."
80000065-35 = "Fufu, você percebeu."
80000065-36 = "Sim, é isso mesmo. Ultimamente, tenho mostrado apenas minhas atividades como agente, mas…… embora pareça, eu também sou uma empregada de verdade."
80000065-37 = "Como empregada, isso é uma habilidade básica. E, originalmente, eu também gosto de fazer doces."
80000065-38 = "Por isso, gosto bastante de dias como este. Mais uma vez, ofereço isto ao Mestre……"
80000065-39 = "[s] \"……Akane?\""
80000065-40 = "Não, não que isso seja ruim, mas……"
80000065-41 = "Hoje, mais do que empregada e Mestre…… talvez eu me sinta apenas como uma aluna para o seu professor."
80000065-42 = "……Mesmo assim, você aceitaria?"
80000065-43 = "[s3] \"Claro.\"\n[s4] \"Porque a Akane também é uma aluna muito importante para mim.\""
80000065-44 = "Ora, ora……."
80000065-45 = "Ora, ora……."
80000065-46 = "Fufu. Achei que levaria um pouco mais de tempo para ouvir essas palavras……."
80000065-47 = "Como esperado. De certa forma, sou eu quem acabo ficando envergonhada."
80000065-48 = "……Muito obrigada, Professor."
80000065-49 = "Por favor, continue contando comigo daqui para frente, está bem?"
80000065-51 = "(Depois disso, passei um tempo elegante com a Akane, comendo os chocolates juntos)"
80000065-56 = "(O chocolate que a Akane fez era incrivelmente delicioso, não perdendo para nenhum produto de luxo)"
