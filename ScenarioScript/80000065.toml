[translation]
80000065-1 = "メイドらしく"
80000065-6 = "……あら、やはりこちらにいらっしゃいましたか。ご主人様。"
80000065-7 = "オフィスの方にはいらっしゃらなかったので、少しだけ探してしまいました。"
80000065-8 = "……ふふっ。はい、今日はバレンタインデーですからね。"
80000065-9 = "いつも私たちのために頑張ってくださるご主人様のために、ささやかながらご用意いたしました。"
80000065-10 = "えっと、この鞄の中に……"
80000065-14 = "……ご主人様？"
80000065-15 = "どうかされましたか？"
80000065-16 = "……緊張？どうしてです？"
80000065-17 = "……爆弾？"
80000065-22 = "ああ、なるほど……。"
80000065-23 = "いえ、こちらこそすみません。私の普段の行いのせいですね……。"
80000065-24 = "いくら私でも、このような日に爆弾は取り出しません。"
80000065-25 = "まあ確かに、普段からこの鞄にはC4など色々と入れていますが……。"
80000065-26 = "これは反省ですね。せめて今後は、ご主人様の前では少々控えるようにします。"
80000065-27 = "ですので、ご心配なさらなず。こうしてきちんと……"
80000065-32 = "チョコも、持ってきていますから。"
80000065-33 = "[s1] \"あ、もしかして手作り……？\"\n[s2] \"アカネお手製の？\""
80000065-34 = "ふふっ、気が付いてくださいましたか。"
80000065-35 = "ふふっ、気が付いてくださいましたか。"
80000065-36 = "はい、そうです。特に最近は、エージェントとしての活動ばかり見せてしまっていましたが……こう見えて私は、れっきとしたメイドさんでもありますから。"
80000065-37 = "メイドとして、これくらいは基本的な素養です。もともと私は、お菓子作りも好きですし。"
80000065-38 = "ですので、こういった日も結構好きなんです。あらためてこれをご主人様に……"
80000065-39 = "[s] \"……アカネ？\""
80000065-40 = "いえ、それだけでも悪くは無いのですが……"
80000065-41 = "今日はメイドとご主人様というより……ただ一人の生徒から、先生へ。そういった気分かもしれません。"
80000065-42 = "……それでも、受け取っていただけますか？"
80000065-43 = "[s3] \"もちろん。\"\n[s4] \"アカネは、私の大事な生徒でもあるから。\""
80000065-44 = "あらあら……。"
80000065-45 = "あらあら……。"
80000065-46 = "ふふっ。その言葉を聞かせてくださるまで、もう少し時間がかかるかと思っていましたが……。"
80000065-47 = "流石ですね。何だか逆に、私の方が照れてしまいます。"
80000065-48 = "……ありがとうございます、先生。"
80000065-49 = "これからもぜひ、よろしくお願いしますね？"
80000065-51 = "（その後アカネと一緒に、チョコレートを二人で食べながら優雅な時間を過ごした）"
80000065-56 = "（アカネが作ったチョコレートはどんな高級品にも劣らないほど、すごく美味しかった）"
