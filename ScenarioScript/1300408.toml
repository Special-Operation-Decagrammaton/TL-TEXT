[translation]
1300408-1 = "健康になりましょう"
1300408-2 = "アビドス高等学校・グラウンド"
1300408-3 = "あ、来ましたか、先生！"
1300408-4 = "はいこれ、ダンベルです。"
1300408-5 = "えーっと、どれどれ……5kgが20個、10kgが10個、20kgが5個……。"
1300408-6 = "……はい？こんなにいっぱいあるとは知らなかった、ですか？"
1300408-7 = "あれ……そういえばシロコちゃんも同じことを言ってたような……。"
1300408-8 = "うーん……私、買い過ぎたのでしょうか。ダンベルというものが普通どれぐらい必要なのかあまり知らなくて……。"
1300408-9 = "5kgのやつ一個でいいんですか？な、なるほど……。"
1300408-10 = "それでは残りは、学校の体育館に置いておきますね。"
1300408-11 = "今はほとんど使われてないですが……いつか学校が元通りになった時にでも、使われるといいですね。"
