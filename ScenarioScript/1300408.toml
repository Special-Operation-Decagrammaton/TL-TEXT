[translation]
1300408-1 = "Vamos ficar saudáveis"
1300408-2 = "Escola de Ensino Médio Abydos - Campo"
1300408-3 = "Ah, você chegou, Sensei!"
1300408-4 = "Aqui está, são os halteres."
1300408-5 = "Hum, vejamos... 20 de 5kg, 10 de 10kg, 5 de 20kg..."
1300408-6 = "...Sim? Você não sabia que tinha tantos assim?"
1300408-7 = "Ué... agora que você mencionou, a Shiroko-chan disse a mesma coisa..."
1300408-8 = "Hmm... será que eu comprei demais? Eu não sabia muito bem quantos halteres são necessários normalmente..."
1300408-9 = "Um de 5kg já é o suficiente? E-entendo..."
1300408-10 = "Então vou deixar o restante no ginásio da escola."
1300408-11 = "Quase não é usado agora, mas... seria bom se fosse usado quando a escola voltar ao normal algum dia."
