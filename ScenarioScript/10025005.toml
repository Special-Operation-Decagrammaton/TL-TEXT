[translation]
10025005-1 = "プロローグ;消えたエビ"
10025005-2 = "子ウサギ公園"
10025005-6 = "あつーい……"
10025005-7 = "そうですね……"
10025005-8 = "溶けちゃいそう……"
10025005-13 = "現在時刻、1305……キャンプRABBITの地表面温度、35℃……"
10025005-18 = "前に持ち運んだポータブルクーラーは？#nたしかパソコンの冷却に回してたよね？"
10025005-19 = "……先日の暴風雨で故障してしまいました。"
10025005-20 = "うう……やっぱり、こうなると思ってた……"
10025005-22 = "このまま、陸に打ち上げられたヒトデみたいにカラカラになっちゃうんだ……"
10025005-28 = "不審者、及び異常なし。引き続き警戒態勢を維持す――"
10025005-35 = "あぁあああっ！！あっつくてもう無理！！"
10025005-36 = "さっきからうるさい！文句ばかり言うな！"
10025005-37 = "みんなして急にどうしたんだ……暑いのは今日に限った話じゃないだろ。"
10025005-38 = "というかモエ……#nお前は普段からよく火を扱ってるんだから、これくらい我慢できるだろ。"
10025005-39 = "夏の熱気と爆弾のソレは違うでしょ！？"
10025005-40 = "いくら私が火力を愛してるとはいえ、茹でられるのは勘弁……。"
10025005-41 = "まあ、この破滅的な状況も捉えようによっては悪くないけど……はぁ、はぁ……！"
10025005-42 = "ったく、初めての夏じゃあるまいし……大げさすぎないか。"
10025005-43 = "雑念を振り払えば、火の中だって涼しさを感じられるはずだ。#nこう、心を落ち着かせて――"
10025005-48 = "…………いや、暑いな。"
10025005-49 = "サキ。これ以上、陽に当たっていても体力を奪われるだけです。#nひとまず日陰で過ごしましょう。"
10025005-50 = "……了解。引き続き、警戒を怠らないようにする。"
10025005-61 = "はぁ……テントの中も機械の熱がひどいし、どっちもどっちじゃない？"
10025005-62 = "だから夏は嫌いなんだよねぇ……冬は逆に排熱で暖まれるからいいんだけどさ。"
10025005-63 = "うん……私も冬の方が好きかな……"
10025005-64 = "見通しの良い狙撃ポイントは、開けた場所が多いから……"
10025005-65 = "狙撃用の擬態服を着ると、オーブンの中にいるみたいで……つらい。"
10025005-67 = "……私も夏場はよく汗をかきますし、少し苦手です。"
10025005-68 = "それに冷蔵庫がない今のような状況下では、食糧もダメになりやすいので。"
10025005-70 = "うんうん。"
10025005-71 = "コンビニでもらった廃棄弁当がすぐダメになっちゃって、次にもらえるまで半日くらいご飯抜きだったし。"
10025005-73 = "1日しか経っていなかったのに、酸っぱい臭いがしましたね……。"
10025005-75 = "焼肉弁当を4つも捨てる羽目になったな……あれは辛かった。"
10025005-76 = "やっぱり、夏は苦手……。"
10025005-77 = "全然関係ないけどさ……最近エビの入った弁当、見た？"
10025005-78 = "廃棄弁当でたまに見かける、エビのバジルサンドがお気に入りだったんだけど……"
10025005-80 = "そうですね……他の魚介類は今まで通り見かけますが、エビだけないような……"
10025005-81 = "考えてみると不思議だな。季節が物流に影響を及ぼす事もないだろうし……#n今の時代は交通も整備されてるわけで。"
10025005-82 = "それ用のトラックには保冷設備が整ってるし、産地から工場まで、工場から納品先までのルートは決まってる。"
10025005-83 = "しかもエビは水揚げしてから船上で冷凍して、そのまま箱詰めまで行う業者が多い。"
10025005-84 = "船上で瞬間冷凍されたエビは、「生エビより新鮮」と洋食店の料理人が口を揃えて絶賛するほどだ。"
10025005-85 = "……なんであんたは、そこまでエビに詳しいの？#nSRTに入学する前は、エビ漁船で働いてたり？"
10025005-86 = "スキューバダイビングの実習中に、教官から聞いたんだよ。"
10025005-88 = "でも、たしかに……モエちゃんの言う通り最近D.U.でエビを見かけなくなったね。"
10025005-89 = "それに昨日、市内のスーパーで「エビ品切れ」って張り紙を見たよ。"
10025005-90 = "他の魚介類も不足しているならともかく、エビの流通にだけ問題があるのは……#nなんだか怪しいですね。"
10025005-91 = "D.U.で流通するはずだったエビに、どこかの犯罪組織が目をつけたのでは――"
10025005-93 = "エビだけを狙う犯罪組織……？#nいったい何の狙いがあるんだ？"
10025005-94 = "私はエビ好きだけど、流通量を操作してまで相場を吊り上げるくらいなら、最初からカニや牡蠣を狙うでしょ。"
10025005-95 = "詳細は分からないけど、キヴォトスでよくあるトラブルのひとつだろうねぇ。"
10025005-96 = "たとえば……満足のいかない品質だったらトラックごと爆破する美食家集団の仕業、#nとかね。"
10025005-97 = "いや。……本当にそんなヤツがいたら、よくあるトラブルで片付かないだろ。"
10025005-99 = "……そうですね。きっと、私の考え過ぎだと思います。"
10025005-100 = "この頃いろんなことがあったせいで、少し神経質になっているのかもしれません。"
10025005-106 = "[ns1] \"みんな、大丈夫？\"\n[ns2] \"今日はいつにも増して暑いね。\""
10025005-110 = "お、誰かと思ったら先生か。"
10025005-111 = "こんな暑い日にどうしたんだ？"
10025005-115 = "[ns3] \"近くに用事があったから、みんなの様子が気になって。\"\n[ns4] \"ついアイスを買いすぎちゃって。\""
10025005-121 = "[ns] \"よかったら、一緒に食べてくれない？\""
10025005-123 = "はい！！！"
10025005-130 = "あぁぁ……生き返ったぁ。"
10025005-131 = "やっぱり夏はアイスを食べるに限るな！"
10025005-132 = "冷たいアイスがじんわり身体に染みて……なんだか冷蔵庫に入った気分……。"
10025005-138 = "先生、ありがとうございます。みんな、この暑さに参っていたところで……"
10025005-139 = "本当に助かりました。"
10025005-140 = "[s] \"喜んでもらえて良かった。\""
10025005-144 = "[ns5] \"……D.U.でエビを見かけなくなったってどういうことだろう？\"\n[ns6] \"何があったんだろう……？\""
10025005-147 = "あ……その、まだ決定的な証拠があるわけではないのですが……"
10025005-148 = "ただ、近頃コンビニ弁当にエビが入っていないような気がして。"
10025005-157 = "[ns] \"そういえば、私も最近エビを食べてないかも。\""
10025005-159 = "先生もですか？一時的に水揚げ量が減っているだけかもしれませんし、#n不審な動きを掴んでいるわけではありませんが……"
10025005-160 = "それに、誰かがエビの流通に関与して不正に利益を得ていたとしても……"
10025005-161 = "それは連邦生徒会やヴァルキューレが対応すべきであって、私たちSRTが対処する問題ではないかと。"
10025005-162 = "そういや、D.U.に流通しているエビは、ほとんどが[ruby=かねさきこう]鐘崎港[/ruby]近くの[ruby=やとうら]夜戸浦[/ruby]村で水揚げされてるんだよね？"
10025005-163 = "ああ。水産物に特化した物流会社「レッド・フック・エクスプレス」の工場が、#nあの村にあると聞いてる。"
10025005-164 = "昔は小さな漁村だったが、巨大な水産加工場ができてから出荷量が増加し……#n今では、D.U.全域にエビを供給するまでになったのだとか。"
10025005-168 = "……漁村に、海かぁ。"
10025005-172 = "うっ……涼しいイメージを思い浮かべても、この暑さで現実に戻されちゃう。"
10025005-173 = "皆さんが最後に海に行ったのは、いつでしたか？"
10025005-175 = "私はSRT以来だな。"
10025005-176 = "海洋訓練の実習で行ったきりだ。#n海を楽しむ暇なんて、ほとんどなかったが……。"
10025005-177 = "正式に学園が復活しないと、海に行くのは難しそうだよね……。"
10025005-178 = "ああ。SRT特殊学園が復活するまでは、この公園を離れるつもりはないからな。"
10025005-179 = "作戦であれば別だが、遊びで行くのは……な。"
10025005-180 = "[s] \"今からみんなで海に行くのはどうかな？\""
10025005-181 = "……先生、今の話を聞いてたか？"
10025005-182 = "特別な理由がない限り、ここを離れるわけにはいかないと言っただろう？"
10025005-183 = "市民の安全を守るためにどんな状況でも迅速に出動できるようにしなければならない#nSRTの生徒が、呑気に海で遊んでると知られたらどうするんだ。"
10025005-184 = "[s] \"大丈夫、これは遊ぶためじゃないからね。\""
10025005-185 = "じゃあ、どういう理由で……？"
10025005-186 = "[s] \"最近エビを見かけないのは、私も気になっていたからね。\""
10025005-190 = "[ns7] \"それなら、現地で確認した方が早いんじゃないかな。\"\n[ns8] \"直接漁村に行って、エビの行方を調査するのはどうかな？\""
10025005-193 = "エビの行方を調べに、海へ……？"
10025005-194 = "……先生の意見も、一理あると思います。"
10025005-195 = "問題解決のために、現地で調査するのも特殊部隊の任務のひとつ。"
10025005-196 = "身分を明かしてはわからないこともあるでしょうから、隠したほうが良さそうですね。以前、FOX小隊の先輩方は、観光客に扮していたようです。"
10025005-197 = "ただ……先ほどもお伝えしたように情報がほとんどないので、これは私たちの出る幕なのか判断がつきません。"
10025005-198 = "実際は、単に漁獲量が落ちていたり、工場の設備トラブルという可能性も……"
10025005-199 = "[s9] \"その時は……\"\n[s10] \"たまには海で楽しむのもいいよね。\""
10025005-206 = "……やはり、先生は優しいですね。"
10025005-207 = "任務でもない限り、私たちが公園を長期間空けることはないでしょうから。#nお気遣い、感謝します。"
10025005-208 = "ですが、任務である以上、真剣に取り組むつもりです。"
10025005-209 = "総員、すぐに着替えを用意してください。"
10025005-210 = "現地住民から正しい情報を得るためには、怪しまれてはなりません。#nつまり、一般の観光客に溶け込む必要があります。"
10025005-211 = "……皆さん、よろしいでしょうか？"
10025005-213 = "了解！"
10025005-215 = "では、これより夜戸浦村に潜入、及びエビの行方調査――"
10025005-216 = "シュリンプ・トラップ作戦を開始します！"
10025005-219 = "#video;10025"
