[translation]
10025005-1 = "Prólogo; O Camarão Desaparecido"
10025005-2 = "Parque dos Coelhinhos"
10025005-6 = "Tá tão quente..."
10025005-7 = "Pois é..."
10025005-8 = "Sinto que vou derreter..."
10025005-13 = "Hora atual, 13:05... Temperatura da superfície do solo no Acampamento RABBIT, 35°C..."
10025005-18 = "E aquele ar-condicionado portátil que trouxemos antes?#nVocê não tinha usado ele pra resfriar o computador?"
10025005-19 = "...Ele quebrou durante a tempestade de uns dias atrás."
10025005-20 = "Ai, ai... Eu sabia que isso ia acontecer..."
10025005-22 = "Vou acabar ficando seca que nem uma estrela-do-mar jogada na areia..."
10025005-28 = "Sem suspeitos ou anomalias. Continuarei mantendo o estado de alerta—"
10025005-35 = "Aaaah!! Tá quente demais, não aguento mais!!"
10025005-36 = "Para de reclamar! Você tá fazendo barulho faz tempo!"
10025005-37 = "O que deu em todo mundo de repente... Não é como se estivesse quente só hoje."
10025005-38 = "E aliás, Moe...#nVocê lida com fogo o tempo todo, deveria estar acostumada com isso."
10025005-39 = "O calor do verão e o calor das bombas são coisas diferentes, sabia!?"
10025005-40 = "Por mais que eu ame o poder de fogo, ser cozinhada viva já é demais..."
10025005-41 = "Bom, dependendo de como você olha, essa situação catastrófica até que não é tão ruim... haa, haa...!"
10025005-42 = "Fala sério, não é como se fosse o primeiro verão de vocês... não estão exagerando?"
10025005-43 = "Se você limpar sua mente, deveria conseguir sentir frescor até no meio do fogo.#nAssim, acalmando o coração—"
10025005-48 = "............É, tá quente mesmo."
10025005-49 = "Saki. Ficar exposta ao sol só vai drenar nossa energia.#nVamos passar um tempo na sombra por enquanto."
10025005-50 = "...Entendido. Continuarei mantendo a vigilância."
10025005-61 = "Haa... o calor das máquinas dentro da barraca também é terrível, não dá na mesma?"
10025005-62 = "É por isso que eu odeio o verão... No inverno, pelo menos o calor residual ajuda a esquentar, então é bom."
10025005-63 = "É... eu também prefiro o inverno..."
10025005-64 = "Como os pontos de sniper com boa visibilidade costumam ser lugares abertos..."
10025005-65 = "Usar a roupa de camuflagem pra sniper é como ficar dentro de um forno... é sofrido."
10025005-67 = "...Eu também suo muito no verão, então não gosto muito."
10025005-68 = "Além disso, em situações como a nossa, sem geladeira, a comida estraga muito fácil."
10025005-70 = "Pois é, pois é."
10025005-71 = "Aquelas marmitas descartadas que a gente pegou na loja de conveniência estragaram rápido, e ficamos meio dia sem comer até conseguir outras."
10025005-73 = "Só tinha passado um dia e já estavam com um cheiro azedo..."
10025005-75 = "Tivemos que jogar fora quatro marmitas de churrasco... Aquilo foi doloroso."
10025005-76 = "Definitivamente, odeio o verão..."
10025005-77 = "Não tem nada a ver com isso, mas... vocês viram alguma marmita com camarão ultimamente?"
10025005-78 = "Eu adorava aquele sanduíche de camarão com manjericão que a gente via de vez em quando nas marmitas descartadas..."
10025005-80 = "É verdade... continuamos vendo outros frutos do mar, mas parece que só o camarão sumiu..."
10025005-81 = "Pensando bem, é estranho. A estação não deveria afetar a logística...#nE hoje em dia o transporte é bem estruturado."
10025005-82 = "Os caminhões de transporte têm equipamentos de refrigeração, e as rotas da produção até a fábrica, e da fábrica até o destino, são fixas."
10025005-83 = "Além disso, muitos fornecedores congelam o camarão no próprio barco logo após a pesca e já embalam tudo lá mesmo."
10025005-84 = "Dizem que o camarão congelado instantaneamente no barco é 'mais fresco que o camarão vivo', e até chefs de cozinha ocidental elogiam isso."
10025005-85 = "...Por que você entende tanto de camarão?#nVocê trabalhava em um barco pesqueiro antes de entrar na SRT?"
10025005-86 = "Ouvi isso do instrutor durante o treinamento de mergulho."
10025005-88 = "Mas, realmente... como a Moe disse, ultimamente não temos visto camarão em D.U."
10025005-89 = "E ontem, vi um aviso de 'camarão esgotado' no supermercado da cidade."
10025005-90 = "Se outros frutos do mar estivessem em falta, tudo bem, mas ter um problema só na distribuição de camarão é...#nmeio suspeito."
10025005-91 = "Será que alguma organização criminosa está de olho no camarão que deveria ser distribuído em D.U.—"
10025005-93 = "Uma organização criminosa que só quer camarão...?#nQual seria o objetivo deles?"
10025005-94 = "Eu gosto de camarão, mas se fosse pra manipular o mercado e subir os preços, eles teriam escolhido caranguejos ou ostras, não é?"
10025005-95 = "Não sei os detalhes, mas deve ser um daqueles problemas comuns aqui em Kivotos."
10025005-96 = "Por exemplo... o grupo de gourmets que explode caminhões inteiros se a qualidade não for satisfatória, por exemplo."
10025005-97 = "Não. ...Se realmente existisse alguém assim, não seria classificado como um problema comum."
10025005-99 = "...É verdade. Com certeza estou pensando demais nisso."
10025005-100 = "Talvez eu esteja um pouco nervosa por causa de tudo o que aconteceu ultimamente."
10025005-106 = "[ns1] \"Pessoal, tudo bem?\"\n[ns2] \"Está mais quente do que nunca hoje, não é?\""
10025005-110 = "Oh, quem diria, é o Sensei."
10025005-111 = "O que faz aqui num dia tão quente?"
10025005-115 = "[ns3] \"Eu tinha um assunto por perto e fiquei preocupado com vocês.\"\n[ns4] \"Acabei comprando sorvete demais.\""
10025005-121 = "[ns] \"Se não se importarem, querem comer comigo?\""
10025005-123 = "Sim!!!"
10025005-130 = "Ahhh... voltei à vida."
10025005-131 = "Não tem nada melhor do que tomar sorvete no verão!"
10025005-132 = "O sorvete gelado se espalhando pelo corpo... sinto como se tivesse entrado numa geladeira..."
10025005-138 = "Sensei, muito obrigada. Estávamos todas sofrendo com esse calor..."
10025005-139 = "Isso realmente nos salvou."
10025005-140 = "[s] \"Fico feliz que tenham gostado.\""
10025005-144 = "[ns5] \"...O que será que significa o fato de não estarmos mais vendo camarões em D.U.?\"\n[ns6] \"O que será que aconteceu...?\""
10025005-147 = "Ah... bem, ainda não temos nenhuma prova definitiva, mas..."
10025005-148 = "É só que, ultimamente, sinto que não tem camarão nas marmitas de conveniência."
10025005-157 = "[ns] \"Pensando bem, acho que eu também não tenho comido camarão ultimamente.\""
10025005-159 = "Você também, Sensei? Pode ser apenas uma queda temporária na quantidade de pesca, e não temos nenhuma evidência de atividades suspeitas, mas..."
10025005-160 = "Além disso, mesmo que alguém estivesse interferindo na distribuição de camarão para obter lucros ilícitos..."
10025005-161 = "Isso seria algo para o Conselho Estudantil Geral ou a Valkyrie resolverem, não um problema para nós da SRT."
10025005-162 = "Falando nisso, a maior parte do camarão distribuído em D.U. é pescado na vila de Yateura, perto do Porto Kanesaki, não é?"
10025005-163 = "Sim. Ouvi dizer que a fábrica da \"Red Hook Express\", uma empresa de logística especializada em frutos do mar, fica naquela vila."
10025005-164 = "Antigamente era uma pequena vila de pescadores, mas depois que construíram uma enorme fábrica de processamento de frutos do mar, o volume de exportação aumentou... e dizem que agora eles fornecem camarão para toda D.U."
10025005-168 = "...Uma vila de pescadores, o mar, hein."
10025005-172 = "Ugh... mesmo tentando imaginar algo refrescante, esse calor me traz de volta à realidade."
10025005-173 = "Quando foi a última vez que vocês foram à praia?"
10025005-175 = "Para mim, foi desde a SRT."
10025005-176 = "Foi durante o treinamento prático de operações marítimas. Não tive quase tempo nenhum para aproveitar o mar..."
10025005-177 = "Se a academia não for oficialmente reaberta, vai ser difícil ir à praia, né..."
10025005-178 = "Sim. Até que a Academia Especial SRT seja reaberta, não pretendo sair deste parque."
10025005-179 = "Se fosse uma missão, seria outra história, mas ir por diversão é... complicado."
10025005-180 = "[s] \"Que tal irmos todos à praia agora?\""
10025005-181 = "...Sensei, você ouviu o que eu acabei de dizer?"
10025005-182 = "Eu disse que não podemos sair daqui a menos que haja um motivo especial, não disse?"
10025005-183 = "O que as pessoas pensariam se soubessem que alunas da SRT, que devem estar prontas para agir rapidamente em qualquer situação para proteger a segurança dos cidadãos, estão brincando despreocupadamente na praia?"
10025005-184 = "[s] \"Não se preocupe, não é para brincar.\""
10025005-185 = "Então, por qual motivo seria...?"
10025005-186 = "[s] \"Eu também estava preocupado com o fato de não estarmos vendo camarões ultimamente.\""
10025005-190 = "[ns7] \"Nesse caso, não seria mais rápido verificar no local?\"\n[ns8] \"Que tal irmos direto à vila de pescadores investigar o paradeiro dos camarões?\""
10025005-193 = "Ir ao mar para investigar o paradeiro dos camarões...?"
10025005-194 = "...Acho que a opinião do Sensei tem fundamento."
10025005-195 = "Investigar no local para resolver problemas também é uma das missões de uma unidade especial."
10025005-196 = "Como há coisas que não descobriremos se revelarmos nossa identidade, seria melhor nos disfarçarmos. Pelo que parece, as veteranas do Esquadrão FOX se disfarçaram de turistas anteriormente."
10025005-197 = "Mas... como mencionei antes, quase não temos informações, então não sei se cabe a nós lidar com isso."
10025005-198 = "Na verdade, pode ser apenas uma queda na pesca ou um problema técnico na fábrica..."
10025005-199 = "[s9] \"Nesse caso...\"\n[s10] \"De vez em quando, aproveitar a praia também é bom.\""
10025005-206 = "……Como esperado, o Sensei é gentil."
10025005-207 = "A menos que seja uma missão, não costumamos deixar o parque por muito tempo. #nAgradeço pela sua preocupação."
10025005-208 = "Mas, como se trata de uma missão, pretendo levá-la a sério."
10025005-209 = "Atenção, todos, preparem seus trajes imediatamente."
10025005-210 = "Para obter informações precisas dos moradores locais, não podemos levantar suspeitas. #nOu seja, precisamos nos misturar aos turistas comuns."
10025005-211 = "……Estão todos prontos?"
10025005-213 = "Entendido!"
10025005-215 = "Então, a partir de agora, iniciaremos a infiltração na Vila Yotoura e a investigação sobre o paradeiro dos camarões—"
10025005-216 = "Operação Armadilha de Camarão, iniciada!"
10025005-219 = "#video;10025"
