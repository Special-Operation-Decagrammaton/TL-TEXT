[translation]
10035075-2 = "Ah! Não fuja!"
10035075-8 = "Eles fugiram para dentro da piscina..."
10035075-9 = "Precisamos persegui-los rapidamente. Podem causar outro tumulto!"
10035075-10 = "Sim! Vou drenar a água da piscina agora mesmo!"
10035075-11 = "Sem água, eles não terão onde se esconder!"
10035075-12 = "Aí é só mirar e capturar...!"
10035075-13 = "[s] \"Obrigado. Conto com vocês.\""
10035075-14 = "Peço desculpas pelo comportamento de há pouco..."
10035075-15 = "Quem diria que realmente havia um crocodilo... #nNão faço ideia de como ele entrou."
10035075-16 = "De qualquer forma, iniciaremos a operação de captura imediatamente."
10035075-17 = "Os seguranças daqui já são o suficiente. #nNão há necessidade de incomodar o pessoal da Valkyrie."
10035075-18 = "Por favor, descansem na área interna."
10035075-19 = "Então, vamos aceitar a oferta~."
10035075-20 = "Mas ainda é perigoso, não é? Podemos mesmo deixar com eles?"
10035075-24 = "Vamos deixar a operação de captura com os seguranças do parque aquático."
10035075-25 = "Mas...!"
10035075-26 = "Kirino, nós somos salva-vidas."
10035075-27 = "Precisamos proteger a segurança dos clientes. #nAgora, há algo mais importante do que capturar o crocodilo mecânico."
10035075-28 = "...O culpado por este incidente deve estar na área interna."
10035075-30 = "O culpado por este incidente, você diz!?"
10035075-31 = "Eu sabia, é isso mesmo."
10035075-32 = "Eh...? De quem você está falando?"
10035075-33 = "[s] \"Acho que já entendi.\""
10035075-34 = "P-por favor, me conte também!"
10035075-38 = "Certo. Com esse nível de água, dá para ir!"
10035075-39 = "Iniciem a operação de captura! Encontrem-no a todo custo!"
10035075-40 = "Francamente! Acontecer algo assim logo no dia da inauguração!"
10035075-41 = "Não sei se é um crocodilo mecânico ou o que for, mas...! Eu não vou perdoar...!"
10035075-42 = "Isto é...! Proprietário, venha aqui!"
10035075-43 = "O que foi!? Um crocodilo?"
10035075-47 = "Não é um crocodilo, mas veja isto..."
10035075-48 = "Não é o ralo? O que tem ele...?"
10035075-49 = "Não pode ser...! Isso é...!?"
10035075-50 = "Sim. A grade de ferro foi rompida e há um buraco enorme!"
10035075-51 = "É grande o suficiente para aquele crocodilo entrar e sair!"
10035075-52 = "Então ele entrou por aqui!"
10035075-53 = "Não parece haver sinais de que ele tenha saído. Isso significa que...!"
10035075-54 = "O crocodilo ainda está dentro do parque aquático! Encontrem-no!"
10035075-56 = "Sim, senhor!"
