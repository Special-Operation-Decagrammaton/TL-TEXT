[translation]
10035075-2 = "あっ！逃げるな！"
10035075-8 = "プールのなかに逃げられたか……。"
10035075-9 = "はやく追わなければ。また騒ぎを起こしかねない！"
10035075-10 = "ええ！今すぐプールの水を抜きます！"
10035075-11 = "水がなくなれば、隠れる場所もなくなるでしょう！"
10035075-12 = "そこを狙って、捕獲すれば……！"
10035075-13 = "[s] \"ありがとう。お願いします。\""
10035075-14 = "先ほどは、大変失礼しました……。"
10035075-15 = "まさか本当にワニがいたとは……。#n一体どこから入ってきたのやら。"
10035075-16 = "とにかく、すぐに捕獲作戦を開始します。"
10035075-17 = "ここはもう警備員だけで十分です。#nヴァルキューレの方々のお手を煩わせることはありません。"
10035075-18 = "どうぞ、屋内でお休みください。"
10035075-19 = "んじゃ、お言葉に甘えて～。"
10035075-20 = "でも、まだ危険ですよね。お任せして良いのでしょうか？"
10035075-24 = "捕獲作戦はウォーターパークの警備員に任せよう。"
10035075-25 = "しかし……！"
10035075-26 = "キリノ、私たちはライフセーバーだ。"
10035075-27 = "利用客の安全を守らなければならない。#n今はメカワニを捕獲するよりも重要なことがある。"
10035075-28 = "……この事件の犯人は屋内にいるはずだ。"
10035075-30 = "この事件の犯人が、ですか！？"
10035075-31 = "やっぱり、そうだよねー。"
10035075-32 = "え……？誰のことなんですか？"
10035075-33 = "[s] \"何となく分かったかも。\""
10035075-34 = "ほ、本官にも教えてください！"
10035075-38 = "よし。この水位なら行けるぞ！"
10035075-39 = "捕縛作戦を開始する！必ず見つけ出せ！"
10035075-40 = "まったく！オープン初日に、こんなことになるなんて！"
10035075-41 = "メカワニだかなんだか知らないが！絶対に許さんっ……！"
10035075-42 = "これは……！オーナー、来てください！"
10035075-43 = "なんだ！？ワニか？"
10035075-47 = "ワニではありませんが、こちらに……。"
10035075-48 = "排水口じゃないか。これが何か……？"
10035075-49 = "まさか……！これは！？"
10035075-50 = "はい。鉄網が破られて、大きな穴が空いています！"
10035075-51 = "あのワニが出入りするのに、十分な大きさかと！"
10035075-52 = "やつはここを通って、侵入したのか！"
10035075-53 = "脱出した痕跡はないようだな。ということは……！"
10035075-54 = "ワニはまだウォーターパーク内にいる！探し出せ！"
10035075-56 = "はいっ！"
