[translation]
11040-2 = "Episódio 4; Circunstâncias do comitê"
11040-3 = "Força Tarefa/Sala de Aula"
11040-4 = "bem vindo de volta. Obrigado a todos pelo seu trabalho duro."
11040-5 = "Estou em casa."
11040-6 = "Ayane-chan, a operadora também está cansada."
11040-7 = "A questão urgente relativa ao Grupo de Capacetes Katakata foi resolvida. #nAcho que posso respirar agora."
11040-8 = "Concordo. Agora você pode se concentrar em questões importantes."
11040-9 = "Sim! Graças a você, agora posso trabalhar para pagar minha dívida com todas as minhas forças e sem preocupações!"
11040-10 = "Obrigado, senhor! Nunca esquecerei esse favor!"
11040-12 = "[ns] \"O que é o pagamento da dívida?\""
11040-13 = "...Ah, uau!"
11040-14 = "Isso é..."
11040-15 = "Ah, espere! ! Ayane-chan, não mais!"
11040-16 = "...!"
11040-17 = "Está tudo bem, Celica-chan. Não é algo para esconder."
11040-18 = "Bem, não é algo que você deva se preocupar em falar!"
11040-19 = "Não é como se eu tivesse cometido um crime, certo? Além disso, o sensei é um adulto que nos ajudou, certo?"
11040-20 = "Hoshino-senpai está certo. Celica, acho que você pode confiar na sua Senseia."
11040-21 = "Bem, isso é verdade, mas afinal até o sensei é um estranho!"
11040-22 = "É verdade que pode não ser um problema que um sensei consiga resolver rapidamente. #nMas os únicos adultos que vão ouvir esse problema são os Senseies, não são?"
11040-23 = "Se você confessar seus problemas, talvez consiga encontrar uma solução? #nOu tem jeito melhor, Celica-chan?"
11040-24 = "Uh, uh..."
11040-25 = "Mas, ele é um adulto que acabou de chegar! Nunca antes os adultos se preocuparam tanto com o que acontece nesta escola! ?"
11040-26 = "Temos lidado com os problemas desta escola sozinhos! Mas agora, um adulto está enfiando a cabeça..."
11040-27 = "Eu não aprovo! !"
11040-29 = "Celica-chan! ?"
11040-30 = "Vou dar uma olhada."
11040-33 = "……."
11040-34 = "Bem, para explicar de forma simples... esta escola tem dívidas. #nBem, é uma história comum."
11040-35 = "Mas o problema é o valor... é cerca de 900 milhões de ienes."
11040-36 = "...962,35 milhões de ienes."
11040-37 = "Abydos... não, é o valor que nós, o “Comitê de Tarefas”, temos que reembolsar."
11040-38 = "Se este valor não for reembolsado, a escola será transferida para o banco e será forçada a fechar a escola."
11040-39 = "Porém, a chance de realmente pagar é próxima de 0%...#nA maioria dos alunos desistiu, abandonou esta escola e cidade e foi embora..."
11040-40 = "E fomos os únicos que sobraram."
11040-41 = "Na verdade, é tudo por causa desta dívida que as escolas estão prestes a fechar, os estudantes estão a desaparecer e as ruas estão a transformar-se em cidades fantasmas."
11040-42 = "[s] Peça uma explicação da situação."
11040-43 = "Foi por isso que você decidiu fazer o empréstimo? isso é……."
11040-45 = "Décadas atrás, ocorreu uma tempestade de areia no deserto nos arredores deste distrito escolar."
11040-46 = "Tempestades de areia têm ocorrido com frequência nesta área há algum tempo, mas a escala das tempestades de areia naquela época era inimaginável."
11040-47 = "Em todo o distrito escolar estava enterrado em areia e, mesmo depois de a tempestade de areia ter passado, a areia continuou a acumular-se."
11040-48 = "Para superar o desastre natural, nossa escola não teve escolha senão investir uma grande quantia de dinheiro..."
11040-49 = "Contudo, é difícil encontrar um banco disposto a emprestar uma grande quantia de dinheiro a uma escola numa zona tão rural."
11040-51 = "No final, não tive escolha senão confiar em instituições financeiras sem escrúpulos."
11040-52 = "……sim. No início, acho que foi uma boa ideia pagar rapidamente."
11040-53 = "No entanto, tempestades de areia continuaram a ocorrer em maior escala todos os anos... Os esforços da escola foram em vão e a situação no distrito escolar continuou a deteriorar-se além do controle..."
11040-54 = "...E no final, mais de metade de Abydos foi engolida pela areia e transformada num deserto, e a dívida aumentou rapidamente..."
11040-55 = "……."
11040-56 = "……."
11040-57 = "Estamos fazendo o possível para pagar os juros mensais por conta própria... #nEstamos ficando sem munição e suprimentos."
11040-58 = "A razão pela qual Celica está tão nervosa é porque ninguém enfrentou esse problema de maneira adequada até agora. Sensei, você é a primeira pessoa que me ouviu."

11040-59 = "...Bem, é uma história tão chata."
11040-60 = "Então, graças ao sensei, o incômodo problema da Brigada de Capacetes foi resolvido, então a partir de agora posso dedicar todos os meus esforços para saldar minha dívida."
11040-61 = "Se você se tornar conselheiro deste comitê, não precisará se preocupar com dívidas. #nEu apreciaria se você apenas me ouvisse."
11040-62 = "Concordo. A Senseia já me deu força suficiente. #nNão posso causar mais problemas."
11040-65 = "[ns1] Como membro da força-tarefa, ele diz que fará o melhor possível juntos. \n[ns2] Ele diz que não abandonará a força-tarefa e retornará."
11040-66 = "Bem, isso é..."
11040-67 = "Bem, isso é..."
11040-68 = "Ah, sim! Obrigado, senhor!"
11040-69 = "Ei, o sensei também é estranho. Eu não posso acreditar que vou entrar em uma situação tão problemática."
11040-70 = "Que bom...que uma \"placa de Petri\" possa ser uma fonte de força. Agora podemos ter #nhope também, certo?"

11040-71 = "Concordo. Pode haver um vislumbre de esperança."
11040-73 = "……."
11040-74 = "... Tch."
11040-80 = "Celica-chan... eu me pergunto onde ela está..."
11040-82 = "Próxima vez; O dia comum de Celica"
