[translation]
11040-2 = "Episódio 4;O predicamento da Força-Tarefa"
11040-3 = "Sala da Força-Tarefa Hipotecária"
11040-4 = "Bem vindo de volta. Obrigada a todas pelo seu trabalho."
11040-5 = "Estou em casa~"
11040-6 = "Obrigada Ayane, você também."
11040-7 = "A questão da Gangue do Capacete Kata=Kata foi resolvida. #nAcho que tudo vai dar certo agora."
11040-8 = "Concordo. Agora podemos se concentrar em questões mais importantes."
11040-9 = "Sim! Graças ao Sensei, agora podemos trabalhar para pagar a dívida com tudo e sem preocupações!"
11040-10 = "Obrigado, Sensei! Nunca esquecereremos esse favor!"
11040-12 = "[ns] \"Dívida?\""
11040-13 = "...Aah!"
11040-14 = "Isso é..."
11040-15 = "Ah, espere! Ayane-chan, não fale!"
11040-16 = "...!"
11040-17 = "Porque não Serika-chan? Não é como se fosse um segredo."
11040-18 = "Não significa que devemos contar pra qualquer um!"
11040-19 = "Não é como se tivessemos cometido um crime. Além disso, o Sensei é um adulto que nos ajudou."
11040-20 = "Hoshino-senpai está certa. Serika, acho que você pode confiar no Sensei."
11040-21 = "Eu sei, mas o Sensei ainda é um estranho."
11040-22 = "Não estou falando que o Sensei vai resolver esse problema sozinho. #nMas ele é o único adulto a quem podemos recorrer."
11040-23 = "Se confessarmos nossos problemas, talvez consigamos encontrar uma solução? #nOu você tem um jeito melhor, Serika-chan?"
11040-24 = "Uh, uh..."
11040-25 = "Mas o Sensei acabou de chegar aqui! Porque um adulto se preocuparia tanto com oos nossos problemas!?"
11040-26 = "Temos lidado com os problemas desta escola sozinhos! Mas agora, um adulto está enfiando a cabeça..."
11040-27 = "Eu não aceito!"
11040-29 = "Serika-chan!?"
11040-30 = "Vou ir falar com ela."
11040-33 = "..."
11040-34 = "Bem, para explicar de forma simples... esta escola tem dívidas com uma empresa de enpréstimos #nÉ um desafio, mas nada fora do normal."
11040-35 = "Mas o problema é o valor... é cerca de 900 milhões de ienes."
11040-36 = "...962,350,000 ienes para ser mais exata."
11040-37 = "Este é o valor que Abydos—não. A Força-Tarefa Hipotecária, tem que pagar."
11040-38 = "Se este valor não for pago, a escola será hipotecada para a empresa e será forçada a fechar."
11040-39 = "Porém, a chance de realmente pagar essa dívida é zero... #nPor isso a maioria das alunas abandonaram esta escola e cidade..."
11040-40 = "E fomos as únicas que sobraram."
11040-41 = "NE tudo por causa desta dívida que a escola está prestes a fechar, as estudantes indo embora #ne a cidade se transformando em uma cidade fantasma."
11040-42 = "[s] Pedir uma explicação do que aconteceu."
11040-43 = "Quer dizer a razão de termos feito o empréstimo?"
11040-45 = "Alguns anos atrás, ocorreu uma tempestade de areia no deserto nos arredores deste distrito escolar."
11040-46 = "Tempestades de areia são comuns em Abydos, mas a escala dessa tempestade de areia foi inimaginável."
11040-47 = "Algumas áreas estavam completamente enterradas em areia, e mesmo depois da tempestade de areia ter passado, a areia continuou acumulando."
11040-48 = "Para superar o desastre natural, nossa escola não teve escolha senão investir uma grande quantia de fundos..."
11040-49 = "Contudo, não tinha um banco disposto a emprestar uma quantia tão grande de dinheiro."
11040-51 = "No final, não tivemos escolha senão recorrer a agiotas..."
11040-52 = "Sim. No início, a escola planejava pagar rapidamente."
11040-53 = "No entanto, tempestades de areia continuaram a ocorrer em maior escala todos os anos... Os esforços da escola foram em vão e a situação no distrito escolar continuou a deteriorar além do controle..."
11040-54 = "...E no final, mais de metade de Abydos foi engolida pela areia e transformada num deserto, e a dívida aumenta rapidamente..."
11040-55 = "..."
11040-56 = "..."
11040-57 = "Estamos fazendo o possível para pagar os juros mensais... #nNão temos dinheiro para munição e suprimentos"
11040-58 = "A razão pela qual Serika está tão nervosa é porque ninguém se importou com o nosso problema até agora. Sensei, você é a primeira pessoa que nos ouviu."
11040-59 = "...Bem, é uma história bem chata."
11040-60 = "Então, graças ao Sensei, a Gangue do Capacete foi embora, então a partir de agora podemos nos dedicar para saldar a dívida."
11040-61 = "Mesmo que se você se tornar conselheiro desse clube, não precisará se preocupar com a dívida. #nEu aprecio você ter ouvido a nossa história."
11040-62 = "Não estamos tentando te pressionar. #Você já nos ajudou o suficiente."
11040-65 = "[ns1] Como membro da Força-Tarefa, darei o meu melhor. \n[ns2] Nós estamos juntos nessa, não irei abandoná-las."
11040-66 = "Você não precisa dizer tudo isso..."
11040-67 = "Você não precisa dizer tudo isso..."
11040-68 = "...Mas o agradeço mesmo assim, Sensei."
11040-69 = "Olha o Sensei sendo nobre. Vai realmente insistir em ajudar..."
11040-70 = "Estou aliviada... Tenho esperança agora que alguém de \"Schale\" está nos ajudando."
11040-71 = "Verdade. As coisas estão melhorando, pelo menos."
11040-73 = "..."
11040-74 = "Tch."
11040-80 = "Serika-chan... eu me pergunto onde ela está..."
11040-82 = "Próximo Episódio;Um dia comum na vida de Serika"