[translation]
10039160-1 = "Epílogo 8: Lutador de Comida de Rua!"
10039160-3 = "（Enquanto caminhava pelo Carnaval, recebi um pedido de ajuda de uma aluna.）"
10039160-13 = "……É essa a situação."
10039160-14 = "[s1] \"Entendi……。\"\n[s2] \"Você confia no sabor, mas os clientes não aparecem, né?\""
10039160-17 = "……Sim, é exatamente isso."
10039160-18 = "A degustação foi muito elogiada, e……."
10039160-19 = "Não consigo entender onde está o problema……."
10039160-20 = "[s3] \"Não sou um especialista em restaurantes, mas……。\"\n[s4] \"Vou pensar em alguma solução para você.\""
10039160-25 = "Muito obrigada, Sensei!"
10039160-26 = "Nós também continuaremos pensando em algo!"
10039160-29 = "（Por enquanto, vamos dar uma olhada nas barracas.）"
10039160-32 = "[ns5] \"Querem experimentar um yakisoba?!\"\n[ns6] \"Está uma delícia!\""
10039160-37 = "（Enquanto pensava em uma solução……）"
10039160-42 = "Este lugar não é incrível?"
10039160-43 = "Com certeza!"
10039160-44 = "Vamos tirar uma foto!"
10039160-45 = "[s] \"……。\""
10039160-50 = "[ns7] \"Com licença.\"\n[ns8] \"Querem que eu tire a foto para vocês?\""
10039160-55 = "Ah, ela se ofereceu para tirar!"
10039160-56 = "Sério?"
10039160-62 = "Então, por favor!"
10039160-63 = "[ns] \"Ficou bom assim?\""
10039160-78 = "（Enquanto ajudava os turistas a tirar fotos……）"
10039160-84 = "（Vi uma aluna familiar passando.）"
10039160-88 = "[ns] \"……Haruna!?\""
10039160-91 = "（Que sorte encontrá-la aqui!）"
10039160-92 = "（Se é ela, que já saboreou tantas iguarias……）"
10039160-93 = "（Talvez ela tenha alguma ideia!）"
10039160-99 = "（Corri para seguir Haruna.）"
10039160-108 = "[ns] \"……Haruna!\""
10039160-112 = "……Ora."
10039160-115 = "É o Sensei!"
10039160-116 = "Que surpresa encontrar você aqui★"
10039160-117 = "O Sensei também veio comer alguma coisa?"
10039160-118 = "[s] \"Sim, e vocês?\""
10039160-120 = "Fufu…… Falando no Carnaval de Trinity, falamos de comida de rua."
10039160-121 = "Naturalmente, nós do Clube de Pesquisa Gastronômica não poderíamos deixar passar."
10039160-122 = "Viemos ver com nossos próprios olhos a batalha acirrada entre as barracas."
10039160-127 = "……Pela sua expressão, aconteceu algum problema?"
10039160-128 = "[s] \"Na verdade……。\""
10039160-133 = "（Expliquei a situação e pedi ajuda.）"
10039160-136 = "Entendo……."
10039160-137 = "Se é esse o caso, pode deixar conosco."
10039160-138 = "Chegou a hora do Clube de Pesquisa Gastronômica brilhar."
10039160-141 = "Sim, a pessoa certa para o trabalho!"
10039160-142 = "Se o assunto é barraca de comida, é minha especialidade!"
10039160-143 = "Fufu, parece que seremos úteis★"
10039160-144 = "Mal posso esperar para começar a comer!"
10039160-145 = "[s] \"Só por precaução, eu preciso perguntar……。\""
10039160-151 = "[ns] \"Vocês não pretendem explodir a barraca, né……?\""
10039160-152 = "Ora, eu não tinha pensado nisso até esse ponto, mas..."
10039160-156 = "Se servirem uma comida que não vale a pena, deveriam pagar o preço correspondente. #nMas não pretendo julgar severamente as barracas dos alunos."
10039160-157 = "Isso mesmo! #nNós só queremos comer uma comida deliciosa!"
10039160-158 = "[s9] \"Que alívio...\" \n[s10] \"Poderia ter se transformado em um grande problema...\""
10039160-161 = "Fufu. #nO tempo e o lugar não importam. #nO que é importante é o respeito pela comida."
10039160-166 = "...Mas, pelos alunos que estão ansiosos pelo dia de hoje, #nvamos nos esforçar."
10039160-167 = "[s] \"Obrigado!\""
10039160-170 = "..."
10039160-180 = "..."
10039160-182 = "Se, Sensei... quem são estas pessoas?"
10039160-183 = "[s] \"Das pessoas que conheço, elas são as que mais entendem de culinária.\""
10039160-185 = "[ns] \"...Talvez.\""
10039160-190 = "São pessoas de Gehenna, será que é seguro..."
10039160-194 = "Espere! #nEssas pessoas não são aquele famoso grupo terrorista de Gehenna!?"
10039160-195 = "Hã?"
10039160-202 = "Se, será que..."
10039160-203 = "...O Clube de Pesquisa Gastronômica!?"
10039160-204 = "Aquelas que invadiram a Trinity sem permissão e roubaram o \"Atum Dourado\" do aquário...!"
10039160-205 = "Aquelas que explodiram inúmeros restaurantes no distrito D.U....!"
10039160-207 = "Ora, vocês nos conhecem bem."
10039160-208 = "Fufu, parece que vai ser rápido ★"
10039160-209 = "Deixem a gente comer logo!"
10039160-211 = "Se, Sensei!?"
10039160-212 = "[s11] \"Está tudo bem, confie em mim aqui.\" \n[s12] \"Hoje elas estão seguras.\""
10039160-215 = "Já me contaram a situação."
10039160-216 = "No caminho, encontrei alguns pontos problemáticos."
10039160-217 = "Provavelmente, será possível resolver."
10039160-222 = "Parece algo profissional..."
10039160-223 = "Primeiro, vamos começar verificando a comida."
10039160-224 = "Ouvi dizer que vocês têm confiança no sabor, mas..."
10039160-225 = "O, o sabor... não é ruim, eu acho."
10039160-227 = "Sendo assim, vamos julgar de forma objetiva."
10039160-228 = "Pois temos confiança de que somos as que mais entendem de gastronomia em Kivotos."
10039160-229 = "Isso! #nSomos rigorosas quando o assunto é sabor!"
10039160-230 = "A Izumi está dizendo isso...?"
10039160-232 = "Se não houver problemas com o sabor, daremos alguns conselhos simples."
10039160-234 = "Sim... por favor, esperem um pouco."
10039160-239 = "Fufu, estou ansiosa~"
10039160-240 = "Controle a quantidade que vai comer. #nNão pode comer tudo."
10039160-244 = "Primeiro, começando por este yakisoba..."
10039160-249 = "Bem..."
10039160-258 = "[ns] \"Com o nervosismo, meu estômago...\""
10039160-264 = "Muito bem, está aprovado."
10039160-269 = "E, eu consegui!"
10039160-270 = "Mas por que estou me sentindo aliviada..."
10039160-272 = "Não diria que é uma iguaria, mas para uma barraca de rua, está muito bom. #nComo o Sensei disse, parece que não há problemas com o sabor."
10039160-274 = "Sendo assim..."
10039160-275 = "O que exatamente é o problema...?"
10039160-277 = "Fufu, isso é..."
10039160-278 = "Isso é...!?"
10039160-282 = "Junko, poderia nos dar uma explicação?"
10039160-284 = "Deixa comigo!"
10039160-288 = "Primeiro, acho que o problema está na divulgação."
10039160-289 = "O sabor é bom, mas tem poucos clientes..."
10039160-290 = "Ou seja, o motivo é que os clientes não sabem que a barraca existe."
10039160-292 = "E-entendo..."
10039160-293 = "Até lojas famosas investem pesado em propaganda hoje em dia."
10039160-294 = "Então, qual seria a forma mais eficaz de divulgar?"
10039160-295 = "Para barracas como esta, usar as redes sociais é especialmente bom!"
10039160-296 = "Muitas alunas ficam de olho nas redes sociais, afinal."
10039160-300 = "Para que apareça na busca pelo Carnaval de Trinity, coloque o nome da loja e hashtags! #n"
10039160-305 = "Redes sociais, hashtags...!"
10039160-307 = "Também é importante incentivar as pessoas que visitam a loja a postarem avaliações nas redes sociais. #n"
10039160-308 = "Por exemplo...?"
10039160-309 = "Algo como: se postar uma avaliação, ganha uma bebida grátis."
10039160-310 = "E-entendo..."
10039160-311 = "[s] \"Ela parece até uma especialista...\""
10039160-316 = "Certo, então vamos fazer exatamente como ela disse!"
10039160-317 = "Primeiro, vamos postar nas redes sociais!"
10039160-322 = "Fufu... então, vamos ver como vocês se saem."
10039160-329 = "Tem tantas barracas aqui."
10039160-330 = "Dizem que aquele yakisoba ali é muito bom. #nVamos lá!"
10039160-331 = "Boa ideia! #nCom licença, dois yakisobas, por favor!"
10039160-336 = "Bem-vindos, já vou preparar!"
10039160-338 = "Hum, e as bebidas..."
10039160-343 = "Estamos com uma promoção: se postar uma avaliação nas redes sociais, a bebida é grátis!"
10039160-348 = "Ah, é mesmo?"
10039160-349 = "Então acho que vou postar."
10039160-351 = "Muito obrigada!"
10039160-355 = "Com licença, um milho assado, por favor!"
10039160-359 = "Sim, já sai!"
10039160-368 = "Oito espetinhos de frango, metade ao molho e metade no sal, por favor!"
10039160-370 = "Vai demorar um pouquinho, tudo bem?"
10039160-375 = "[ns] \"Tantos clientes assim...!\""
10039160-376 = "Foi uma ótima ideia focar no horário do almoço."
10039160-377 = "Pesquisei por 'Carnaval' e está cheio de comentários sobre as barracas!"
10039160-378 = "Afinal, mesmo sendo uma barraca improvisada, o sabor estava no ponto."
10039160-380 = "Eu queria ter comido o takoyaki com chocolate e ameixa em conserva..."
10039160-381 = "Mas este aqui também é gostoso!"
10039160-382 = "[s] \"Incrível, Clube de Pesquisa Gastronômica!\""
10039160-384 = "Fufu, é o resultado esperado."
10039160-385 = "Isso é moleza!"
10039160-386 = "Capaz de os ingredientes que preparamos acabarem antes da hora ★"
10039160-387 = "Que tal darmos uma volta nas outras barracas agora?"
10039160-388 = "Sim! #nJá estou morrendo de fome!"
10039160-389 = "[s] \"Certo, hoje é por minha conta, podem comer o quanto quiserem!\""
10039160-393 = "Ora... o que acabou de dizer é verdade?"
10039160-397 = "[ns] (Verifica a carteira apressadamente...)"
10039160-398 = "Ufufu... não se preocupe, Sensei. #nHoje vou pegar leve com você."
10039160-399 = "[s] \"S-sério mesmo...?\""
10039160-401 = "(A barraca foi um grande sucesso)"
10039160-405 = "(Parece que a fama se espalhou como 'a loja que o Clube de Pesquisa Gourmet não explodiu'...)"
