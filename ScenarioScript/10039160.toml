[translation]
10039160-1 = "後日談その8;ストリートグルメファイター！"
10039160-3 = "（謝肉祭を見て回っていると、ある生徒から相談を受けた）"
10039160-13 = "……といった状況なんです。"
10039160-14 = "[s1] \"つまり……。\"\n[s2] \"味に自信はあるけど、お客さんが来ないんだね。\""
10039160-17 = "……はい、そうなんです。"
10039160-18 = "試食会でも評判でしたし……。"
10039160-19 = "どこに問題があるのか、よく分からず……。"
10039160-20 = "[s3] \"飲食店に詳しいわけじゃないけど……。\"\n[s4] \"何か方法を考えてみるね。\""
10039160-25 = "ありがとうございます、先生！"
10039160-26 = "私たちも、引き続き考えてみます！"
10039160-29 = "（ひとまず、模擬店の様子を見てみよう）"
10039160-32 = "[ns5] \"焼きそばいかがですか～！\"\n[ns6] \"美味しいですよ～！\""
10039160-37 = "（解決策を考えていると……）"
10039160-42 = "ここ、めっちゃ良くない？"
10039160-43 = "それ！"
10039160-44 = "写真撮ろ～！"
10039160-45 = "[s] \"……。\""
10039160-50 = "[ns7] \"すみません。\"\n[ns8] \"良ければ撮りましょうか？\""
10039160-55 = "お、撮ってくれるって！"
10039160-56 = "ほんと？"
10039160-62 = "じゃあ、お願いしまーす！"
10039160-63 = "[ns] \"これで大丈夫ですか？\""
10039160-78 = "（観光客の写真撮影を手伝っていたところ……）"
10039160-84 = "（見慣れた生徒が歩いていた）"
10039160-88 = "[ns] \"……ハルナ！？\""
10039160-91 = "（ちょうど良いところに！）"
10039160-92 = "（数々の美食を堪能してきた彼女なら……）"
10039160-93 = "（何かアイデアがあるかもしれない！）"
10039160-99 = "（急いでハルナの後ろ姿を追いかけた）"
10039160-108 = "[ns] \"……ハルナ！\""
10039160-112 = "……あら。"
10039160-115 = "先生だ！"
10039160-116 = "こんなところでお会いするなんて★"
10039160-117 = "先生も何か食べに来たの？"
10039160-118 = "[s] \"うん、みんなは？\""
10039160-120 = "ふふ……トリニティの[ruby=カーニバル]謝肉祭[/ruby]といえば、ストリートグルメ。"
10039160-121 = "当然、私たち美食研究会が見逃すはずありませんわ。"
10039160-122 = "屋台同士の熱い戦いを、この目で見るために。"
10039160-127 = "……その様子、何か問題でも起きたのでしょうか？"
10039160-128 = "[s] \"実は……。\""
10039160-133 = "（事情を説明し、助けを求めた）"
10039160-136 = "なるほど……。"
10039160-137 = "そういうことでしたら、お任せください。"
10039160-138 = "私たち、美食研究会の出番ですね。"
10039160-141 = "うん、まさに適任！"
10039160-142 = "屋台なら、私の専門分野ね！"
10039160-143 = "ふふっ、お役に立てそうですね★"
10039160-144 = "今から食べるのが楽しみ！"
10039160-145 = "[s] \"念のために聞いておきたいんだけど……。\""
10039160-151 = "[ns] \"お店を爆破するつもりはないよね……？\""
10039160-152 = "あら、そこまで考えておりませんでしたが……。"
10039160-156 = "取るに足らない料理を出したのなら、それ相応の対価を支払うべきでしょう。#nですが、生徒による出し物を厳しく判定する気はないですわ。"
10039160-157 = "そうそう！#n私たちは、ただ美味しい料理が食べたいだけよ！"
10039160-158 = "[s9] \"良かった……。\"\n[s10] \"大問題に発展しかねないからね……。\""
10039160-161 = "ふふっ。#n時と場所は関係ありませんわ。#n大切なのは、食に対する敬意。"
10039160-166 = "……ですが、今日を楽しみにしている生徒のためにも、#n努力いたしましょう。"
10039160-167 = "[s] \"ありがとう！\""
10039160-170 = "……。"
10039160-180 = "……。"
10039160-182 = "せ、先生……こちらの方々は？"
10039160-183 = "[s] \"私が知るなかで、料理に一番詳しい人たちだよ。\""
10039160-185 = "[ns] \"……たぶん。\""
10039160-190 = "ゲヘナの人たちだけど、大丈夫かな……。"
10039160-194 = "待って！#nこの人たち、あの有名なゲヘナのテロリスト集団じゃない！？"
10039160-195 = "えっ？"
10039160-202 = "も、もしかして……。"
10039160-203 = "……美食研究会！？"
10039160-204 = "トリニティに無断侵入して、#nアクアリウムの「ゴールドマグロ」を奪い取った、あの……！"
10039160-205 = "D.U.地区で数多の飲食店を爆破したという、あの……！"
10039160-207 = "あら、よくご存知ですね。"
10039160-208 = "ふふ、話は早そうです★"
10039160-209 = "早く食べさせて！"
10039160-211 = "せ、先生！？"
10039160-212 = "[s11] \"大丈夫、ここは私を信じて。\"\n[s12] \"今日の彼女たちは安全だよ。\""
10039160-215 = "事情は聞かせていただきましたわ。"
10039160-216 = "道中で、いくつか問題点を見つけました。"
10039160-217 = "おそらく、解決できるはずです。"
10039160-222 = "本格的に見える……。"
10039160-223 = "まずは、料理のチェックから行ないましょう。"
10039160-224 = "味には自信があると伺いましたが……。"
10039160-225 = "あ、味は……悪くない、はずです。"
10039160-227 = "でしたら、私たちが客観的に判断しましょうか。"
10039160-228 = "美食に関しては、キヴォトスで一番詳しい自信がありますので。"
10039160-229 = "うん！#n味に関しては厳しいんだから！"
10039160-230 = "イズミがそれ言うの……？"
10039160-232 = "味に問題がなければ、簡単に助言をいたしましょう。"
10039160-234 = "はい……ちょっと待っていてください。"
10039160-239 = "ふふっ、楽しみですね～。"
10039160-240 = "食べる量、調整してよね。#n全部食べちゃダメだから。"
10039160-244 = "まず、この焼きそばから……。"
10039160-249 = "さて……。"
10039160-258 = "[ns] \"緊張で、胃が……。\""
10039160-264 = "良いでしょう、合格です。"
10039160-269 = "や、やったぁ！"
10039160-270 = "って、なんでホッとしてるんだろ……。"
10039160-272 = "美食とまで言いませんが、屋台のなかでは上出来でしょう。#n先生が仰る通り、味には問題なさそうですね。"
10039160-274 = "それなら……。"
10039160-275 = "いったい何が問題ですか……？"
10039160-277 = "ふふ、それは……。"
10039160-278 = "それは……！？"
10039160-282 = "ジュンコさん、説明をお願いできますか？"
10039160-284 = "任せて！"
10039160-288 = "まず、宣伝に問題があると思うの。"
10039160-289 = "味は良いけど、お客さんが少ない……。"
10039160-290 = "つまり、お客さんがお店の存在を知らないのが原因よ。"
10039160-292 = "な、なるほど……。"
10039160-293 = "最近は有名店だって宣伝に力を入れるくらいだし。"
10039160-294 = "では、どうやって宣伝するのが効果的でしょうか？"
10039160-295 = "こういう屋台は、SNSを利用するのが特に良いわ！"
10039160-296 = "生徒はSNSを見てる人が多いからね。"
10039160-300 = "トリニティ謝肉祭で検索して引っかかるように、#nお店の名前とハッシュタグをつけるのよ！"
10039160-305 = "SNS、ハッシュタグ……！"
10039160-307 = "お店を訪れた人たちが、#nSNSで口コミを投稿するように誘導するのも大事ですよ～。"
10039160-308 = "例えば……？"
10039160-309 = "口コミを投稿すればドリンク無料、とかですね。"
10039160-310 = "な、なるほど……。"
10039160-311 = "[s] \"まるで専門家みたいだ……。\""
10039160-316 = "よし、じゃあ言われた通りにやってみよう！"
10039160-317 = "まずはSNSに投稿から！"
10039160-322 = "ふふっ……では、お手並み拝見といきましょうか。"
10039160-329 = "模擬店、こんなにあるんだね。"
10039160-330 = "あそこの焼きそば、美味しいって話題なんだって。#n行ってみようよ！"
10039160-331 = "良いね！#nすみませーん、焼きそば二つ！"
10039160-336 = "いらっしゃいませ、すぐにご用意します！"
10039160-338 = "えーっと、飲み物は……。"
10039160-343 = "ただ今、SNSに口コミを登録するとドリンク無料キャンペーンを実施しています！"
10039160-348 = "え、そうなの？"
10039160-349 = "じゃあ、投稿しようかな。"
10039160-351 = "ありがとうございます！"
10039160-355 = "すみません、焼きとうもろこしお願いします！"
10039160-359 = "はい、すぐに！"
10039160-368 = "焼き鳥を八本、タレと塩を半分ずつお願いします！"
10039160-370 = "少々お時間頂きますが、よろしいでしょうか？"
10039160-375 = "[ns] \"こんなにお客さんが……！\""
10039160-376 = "お昼時を狙って正解でしたわ。"
10039160-377 = "謝肉祭って検索したら、屋台の話題でいっぱいだよ！"
10039160-378 = "模擬店とはいえ、味は良い線でしたから。"
10039160-380 = "私はチョコレートと梅干し入りのたこ焼きが食べたかったのに……。"
10039160-381 = "でも、これも美味しいね！"
10039160-382 = "[s] \"すごいよ、美食研究会！\""
10039160-384 = "ふふ、当然の結果ですわ。"
10039160-385 = "これくらい簡単よ！"
10039160-386 = "準備していた食材が足りなくなるかもしれませんね★"
10039160-387 = "そろそろ、私たちも屋台を回りましょうか？"
10039160-388 = "うん！#nもうお腹ペコペコ！"
10039160-389 = "[s] \"よし、今日は先生の奢りで好きなだけ食べて！\""
10039160-393 = "あら……今のお言葉、本当でしょうか？"
10039160-397 = "[ns] （慌てて財布を確認する……）"
10039160-398 = "うふふっ……大丈夫ですよ、先生。#n今日は手加減しますから。"
10039160-399 = "[s] \"ほ、本当に……？\""
10039160-401 = "（屋台は大盛況だった）"
10039160-405 = "（「美食研究会が爆破しなかった店」として、口コミが広まったらしい……）"
