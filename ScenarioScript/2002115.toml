[translation]
2002115-1 = "Um assunto importante, um item importante"
2002115-2 = "Eu disse que tinha um assunto importante, mas..."
2002115-3 = "Pode ser algo diferente para o Sensei, então..."
2002115-4 = "Fiquei pensando se não estou te causando problemas de novo."
2002115-5 = "[s1] \"Não, se é um assunto importante para a Hanae...\"\n[s2] \"É um assunto importante para mim também.\""
2002115-8 = "......S-sério mesmo?"
2002115-9 = "Hehehe. Obrigada, Sensei!"
2002115-10 = "Então, sobre esse assunto importante..."
2002115-14 = "É encher este saco com presentes!"
2002115-15 = "Já distribuí quase tudo, e agora restam poucos."
2002115-16 = "Mas, pode ser que ainda existam outras pessoas esperando por presentes!#nPensando nisso..."
2002115-17 = "Achei que ainda deveria continuar!"
2002115-18 = "Claro, fiquei feliz em distribuir muitos presentes e ver que todos ficaram contentes, mas!"
2002115-19 = "[s3] (Se ela já distribuiu tanto assim...)\n[s4] (Achei que a Hanae já tinha se esforçado o suficiente...)"
2002115-25 = "Então, Sensei! Vamos comprar presentes juntos!"
2002115-32 = "Ah, Sensei! Tem algo que parece perfeito aqui! Dê uma olhada!"
2002115-33 = "[s] \"...Equipamentos de treino?\""
2002115-34 = "Sim! Dizem que a saúde é o nosso bem mais precioso, então não acha que é um presente maravilhoso?"
2002115-38 = "Halteres, rolo abdominal...#nAh, e também tem um conjunto com suplemento de colágeno bom para a pele e polivitamínicos!"
2002115-39 = "Com licença! Quero tudo, de ponta a ponta!"
2002115-44 = "Sensei, Sensei! Tem algo que parece bom aqui também! Veja!"
2002115-45 = "[s] \"Isso é um massageador, né...?\""
2002115-46 = "Sim! É útil para recuperar a fadiga e dizem que melhora a circulação sanguínea também."
2002115-47 = "Tem até acessórios para pontos de pressão e suplementos para auxiliar no sono!"
2002115-48 = "Este suplemento de auxílio ao sono com melatonina diz que o efeito é máximo se tomado 2 horas antes de dormir!"
2002115-49 = "[s] \"Estou começando a ficar preocupado...\""
2002115-53 = "Hã? O que houve de repente, Sensei?"
2002115-57 = "[ns] \"Precisávamos mesmo vir até um lugar desses!?\""
2002115-58 = "O que está dizendo, Sensei?#nPresentes são para todo mundo, não são?"
2002115-59 = "Ou seja, devemos comprar várias coisas para que muitas pessoas fiquem felizes!"
2002115-63 = "Vejamos... Ah! É isto!#nArtemísia para moxabustão, conjunto de ventosas, adesivos de desintoxicação para os pés, chinelos de massagem..."
2002115-64 = "Uau, tem até um suporte que relaxa as articulações com corrente elétrica fraca, um alongador de pescoço e um tapete térmico de infravermelho!"
2002115-65 = "Valer a pena ter vindo até aqui! Sensei!"
2002115-66 = "[s] \"Ah, será que... tinha mesmo!?\""
2002115-69 = "[ns] \"Isso aqui já é demais...\""
2002115-70 = "Não, Sensei!#nSeguindo o exemplo do Papai Noel que distribui presentes para todas as crianças boazinhas..."
2002115-71 = "Nós também devemos fazer tudo o que estiver ao nosso alcance!"
2002115-75 = "Vejamos... O que seria bom para presente..."
2002115-79 = "......Achei!#nGerador de água com hidrogênio, cacto artificial que absorve ondas eletromagnéticas, suco detox..."
2002115-80 = "Também tem uma motosserra!"
2002115-81 = "[s] \"Por que até uma motosserra!?\""
2002115-82 = "Hã? Motosserras são normais, não são?"
2002115-88 = "Ei, ei."
2002115-97 = "Ouvi boatos de que tem alguém comprando todos os produtos de saúde ultimamente..."
2002115-98 = "Por acaso eram vocês? ...Ei, não ensinaram a vocês que não se deve atrapalhar o negócio dos outros!?"
2002115-100 = "......Hã? Nós só estamos comprando o que está à venda na loja, não é?"
2002115-102 = "Cala a boca! É exatamente isso que é o problema!"
2002115-103 = "Por causa de vocês, meu plano de comprar tudo no Natal para revender mais caro foi por água abaixo!"
2002115-104 = "[s] \"Isso sim é que é errado, não é!?\""
2002115-105 = "Ah é? Tá querendo dar sermão na gente, é!?"
2002115-112 = "Tsc!"
2002115-114 = "Vou garantir que você nunca mais ouse falar comigo desse jeito!"
2002115-121 = "Além de atrapalhar a missão do Papai Noel de levar saúde e felicidade a todos..."
2002115-128 = "Você ainda tenta usar isso para o mal! Que horror!"
2002115-129 = "Crianças más não ganham presentes do Papai Noel!"
2002115-134 = "Papai Noel? Hah! Você ainda acredita nessas coisas?"
2002115-135 = "Ei, espera. Essa aí não parece ser perigosa...?"
2002115-137 = "Mas não se preocupe! #nEu vou transformar vocês em \"crianças boas\"!"
2002115-147 = "(E assim, Hanae transformou os delinquentes em \"crianças boas\" com uma velocidade surpreendente...)"
2002115-150 = "(...deixando dois presentes para trás e indo embora do local.)"
2002115-155 = "Sensei! Olhe! Finalmente o saco de presentes foi restaurado!"
2002115-160 = "Hehe. Com isso, poderei levar saúde e felicidade a todos!"
2002115-164 = "[ns] \"S-sim. É verdade...\""
2002115-166 = "(O sorriso inocente de Hanae era...)"
2002115-167 = "(...tão puro que, sem querer, purificava o coração de quem via.)"
