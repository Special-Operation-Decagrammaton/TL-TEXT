[translation]
2002115-1 = "大事な用、大切な物"
2002115-2 = "大事な用があるとは言いましたが……"
2002115-3 = "先生にとっては違うかもしれないので……"
2002115-4 = "またご迷惑をかけてるんじゃないかと思って。"
2002115-5 = "[s1] \"ううん、ハナエにとって大事な用なら……\"\n[s2] \"私にとっても大事な用だよ。\""
2002115-8 = "……ほ、本当ですか？"
2002115-9 = "えへへ。ありがとうございます、先生！"
2002115-10 = "それで、大事な用とは――"
2002115-14 = "この袋にプレゼントを詰めることです！"
2002115-15 = "ほとんど配り終えて、もう残りが少なくなってしまいました。"
2002115-16 = "でも、プレゼントを待っている人が他にもいるかもしれない！#nそう考えたら……"
2002115-17 = "まだやるべきだと思ったんです！"
2002115-18 = "もちろん、プレゼントをたくさん配って、みなさんに喜んでもらえたのは嬉しかったんですけど！"
2002115-19 = "[s3] （そこまで配ったなら……）\n[s4] （もうハナエは十分頑張ったと思ったが……）"
2002115-25 = "それじゃ、先生！一緒にプレゼントを買いに行きましょう！"
2002115-32 = "あ、先生！ちょうど良さそうな物があります！見てください！"
2002115-33 = "[s] \"……トレーニング器具？\""
2002115-34 = "はい！身体が資本という言葉もあるくらいですし、素敵なプレゼントだと思いませんか？"
2002115-38 = "ダンベルに腹筋ローラー……#nあ、肌に良いコラーゲンサプリに総合ビタミン剤までセットになっています！"
2002115-39 = "すみません！ここからここまで全部ください！"
2002115-44 = "先生、先生！ここにも良さそうな物が！見てください！"
2002115-45 = "[s] \"マッサージ機、だよね……？\""
2002115-46 = "はい！疲労回復にも役立ちますし、血液循環も良くなるらしいですよ。"
2002115-47 = "ツボ押しグッズや睡眠サポートサプリまでありますね！"
2002115-48 = "このメラトニン成分が含まれた睡眠サポートサプリは、寝る2時間前に服用すると効果が最大になると書かれています！"
2002115-49 = "[s] \"なんだか不安になってきたけど……\""
2002115-53 = "えっ？急にどうしたんですか、先生？"
2002115-57 = "[ns] \"こんな場所まで来る必要あるの！？\""
2002115-58 = "何を言ってるんですか、先生。#nプレゼントはみんなのための物なんですよ？"
2002115-59 = "つまり、たくさんの人に喜んでもらえるよう色々な物を買うべきなんです！"
2002115-63 = "どれどれ……あ！これです！#nお灸に使うよもぎにカッピングセット、足裏樹液シート、マッサージスリッパ……"
2002115-64 = "わっ、微弱な電流で関節をほぐすサポーターやネックストレッチャー、遠赤外線のヒートマットも！"
2002115-65 = "ここまで来た甲斐がありましたね！先生！"
2002115-66 = "[s] \"あ、あった……のかな！？\""
2002115-69 = "[ns] \"ここは流石に……\""
2002115-70 = "いいえ、先生！#n良い子のみんなにプレゼントを配るサンタさんを見習って――"
2002115-71 = "私たちも、できる限りのことをするべきです！"
2002115-75 = "どれどれ……プレゼントに良さそうな物は……"
2002115-79 = "……ありました！#n水素水製造機に電磁波を吸収する人工サボテン、デトックスジュース……"
2002115-80 = "チェーンソーもありますよ！"
2002115-81 = "[s] \"どうしてチェーンソーまで！？\""
2002115-82 = "え？チェーンソーは普通ですよね？"
2002115-88 = "おいおい。"
2002115-97 = "ここ最近、健康グッズを買い占めてる奴が居るって噂を聞いたが……"
2002115-98 = "もしかして、おめぇらだったのか？……なぁ、人の商売を邪魔しちゃダメだって教わらなかったのか！？"
2002115-100 = "……へ？私たちは、お店で売られている物を購入しているだけですよ？"
2002115-102 = "うるせぇな！それが問題だっつってんだよ！"
2002115-103 = "おめぇらのせいで、クリスマスに商品を買い占めて高く売りつける計画が台無しになっちまったじゃねぇか！"
2002115-104 = "[s] \"それこそダメだよね！？\""
2002115-105 = "あぁ？うちらに説教するつもりかよ！"
2002115-112 = "チッ！"
2002115-114 = "二度とそんな舐めた口を利けないようにしてやる！"
2002115-121 = "みなさんに健康と幸せを送るサンタさん[ruby=こころざし]の志を[/ruby]邪魔するどころか……"
2002115-128 = "それを悪用しようとするなんて！酷いです！"
2002115-129 = "悪い子はサンタさんにプレゼントをもらえませんよ！"
2002115-134 = "サンタさんだぁ？はっ！んなもん、まだ信じてんのかよ――"
2002115-135 = "おいっ、待て。コイツ、なんかヤバそうじゃないか……？"
2002115-137 = "でも大丈夫です！#n私がみなさんを「良い子」にしてあげますから！"
2002115-147 = "（そうしてハナエは、驚きの速さでチンピラたちを「良い子」にしてから……）"
2002115-150 = "（……二人分のプレゼントを残し、その場を後にした）"
2002115-155 = "先生！見てください！ようやくプレゼント袋が復活しました！"
2002115-160 = "えへへ。これで、みなさんに健康と幸せを届けられます！"
2002115-164 = "[ns] \"う、うん。そうだね……\""
2002115-166 = "（無邪気に笑うハナエの姿は――）"
2002115-167 = "（思わず心が浄化されるほど純粋だった）"
