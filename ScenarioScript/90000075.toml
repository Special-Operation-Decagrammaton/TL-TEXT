[translation]
90000075-2 = "皆さん、ご無事でしょうか……。"
90000075-3 = "びっくりした……部長、あれは一体？"
90000075-4 = "……私も初めて見ました。あの姿は……おそらく……。"
90000075-5 = "今まで知らなかった、新しいデカグラマトンの「預言者」……のようですね。"
90000075-6 = "やっぱりね。急に出てくるからびっくりした。"
90000075-7 = "ええ……ですが、幸い大きな被害もなく退却することができました。……他の預言者たちと違って、非常に変わった動きをしていましたね。"
90000075-8 = "うん。まるで私たちを止めようとしてるみたいだった。"
90000075-9 = "……ということは。"
90000075-10 = "本当にあの場所にデカグラマトンが存在するのでしょうか？あの「預言者」はデカグラマトンを守るために、私たちの前に……？"
90000075-11 = "うーん……。"
90000075-12 = "まぁ、それは直接確認すれば分かることです。"
90000075-13 = "もしかしたら、私たちの任務は既に新しい局面に移っているのかもしれません。"
90000075-14 = "あの預言者が守っている水没地区に、私たちが見てはいけない何者かが存在しているのか、どうか。"
90000075-15 = "直接、この目で確認してみることにしましょう。"
90000075-17 = "……これから、ちょっと大変になるね。"
90000075-18 = "ええ。次の任務は、あの廃墟。その水没地区の調査です。"
90000075-19 = "「預言者」が私たちの前に立ちはだかってくるとは思いますが……この程度、私の名にかけて乗り越えてみせましょう。"
90000075-21 = "次回;捜索作戦"
