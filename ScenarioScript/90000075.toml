[translation]
90000075-2 = "Pessoal, vocês estão bem...?"
90000075-3 = "Que susto... Chefe, o que foi aquilo?"
90000075-4 = "...Eu também vi pela primeira vez. Aquela forma... provavelmente..."
90000075-5 = "Parece ser um novo 'Profeta' de Decagrammaton que não conhecíamos até agora..."
90000075-6 = "Eu sabia. Apareceu do nada, que susto."
90000075-7 = "Sim... mas, felizmente, conseguimos recuar sem grandes danos. ...Diferente dos outros Profetas, ele se moveu de uma forma muito estranha."
90000075-8 = "É. Parecia que ele estava tentando nos impedir."
90000075-9 = "...Isso significa que."
90000075-10 = "Será que Decagrammaton realmente existe naquele lugar? Aquele 'Profeta' apareceu na nossa frente para proteger Decagrammaton...?"
90000075-11 = "Hmm..."
90000075-12 = "Bem, isso é algo que saberemos se verificarmos pessoalmente."
90000075-13 = "Talvez a nossa missão já tenha entrado em uma nova fase."
90000075-14 = "Se existe algo que não deveríamos ver na área submersa que aquele Profeta está protegendo, ou não."
90000075-15 = "Vamos verificar isso com nossos próprios olhos."
90000075-17 = "...As coisas vão ficar um pouco difíceis a partir de agora."
90000075-18 = "Sim. A próxima missão é naquelas ruínas. A investigação daquela área submersa."
90000075-19 = "Imagino que o 'Profeta' vá ficar no nosso caminho, mas... superarei isso, custe o que custar, em nome da minha reputação."
90000075-21 = "Próximo episódio: Operação de Busca"
