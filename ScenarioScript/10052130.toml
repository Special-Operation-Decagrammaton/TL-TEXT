[translation]
10052130-1 = "Yesod: Purificador de poder que controla a fundação"

10052130-4 = "Estou em posição."

10052130-5 = "Vou subir em cima disso."

10052130-6 = "……."

10052130-7 = "Como devemos chamar isso?"

10052130-8 = "Hmm... parede?"

10052130-9 = "sim. Acho que esse é o nome mais adequado."

10052130-10 = "Esse profeta foi Yesod."

10052130-13 = "Assim que chegamos, eles nos deram uma recepção calorosa."

10052130-14 = "Consegui derrotá-lo uma vez, mas..."

10052130-17 = "...Literalmente, parecia um guardião revestido de ferro."

10052130-18 = "[ruby=path]Path[/ruby] e o apelido são completamente diferentes."

10052130-19 = "O que foi?"

10052130-20 = "O caminho é “a verdade que caminha em direção à conclusão”."

10052130-21 = "Outro nome é “Purificador do poder que controla a base”."

10052130-22 = "...Você se lembra de tudo isso?"

10052130-23 = "Porque não havia mais nada a fazer."

10052130-24 = "foto……?"

10052130-25 = "...Desculpe, isso foi uma gafe. #nPessoal, há muito o que fazer."

10052130-26 = "Você disse isso de novo reflexivamente. #nPode ser bom para Toki aprender a ler um pouco mais a atmosfera."

10052130-27 = "Entendo, terei cuidado de agora em diante. #nE é verdade que fiz uma piada por reflexo."

10052130-28 = "...Porque é assustador."

10052130-29 = "...Você acha que Toki também é assustador?"

10052130-30 = "E quanto a Amy?"

10052130-34 = "Estou com medo também."

10052130-35 = "Todo mundo pensa em mim..."

10052130-36 = "nós..."

10052130-37 = "Você pode pensar que há algo diferente nesse aluno, mas..."

10052130-38 = "Porque parece o mesmo."

10052130-39 = "Não quero que as coisas sejam problemáticas e quero ser preguiçoso."

10052130-40 = "Se possível, gostaria de assistir ao vídeo ao vivo enquanto como batata frita com meu professor."

10052130-41 = "Vídeo ao vivo?"

10052130-42 = "Atualmente estou procurando um hobby."

10052130-43 = "É chamado de hobby (provisório). Sim."

10052130-44 = "...Kakkokari?"

10052130-45 = "sim. No momento estou um pouco interessado em vídeos ao vivo, mas isso pode mudar em breve."

10052130-46 = "Você tem algum outro hobby (provisório)?"

10052130-47 = "Hmm, afinal é um jogo. É divertido brincar com Alice. #nAlém disso, existem alguns quadrinhos também."

10052130-48 = "Depois de tentar várias coisas, percebi uma coisa. #nO prazer inclui um certo grau de irracionalidade e ineficiência."

10052130-49 = "Mangá e jogos... entendo."

10052130-50 = "Eu particularmente não gosto de lutar também. #nSe houver uma maneira mais eficiente de resolver o problema, seria melhor."

10052130-51 = "Eu gostaria que todos pudessem se dar bem."

10052130-52 = "Eu gostaria que fosse assim nesta situação também..."

10052130-53 = "Estou com medo agora. #nSe acontecer alguma coisa e eu achar que eu e meu professor não poderemos ver amanhã..."

10052130-54 = "Só isso já faz meu coração doer."

10052130-55 = "EU?"

10052130-56 = "Ela está tão preocupada quanto eu e minha professora."

10052130-57 = "...Você está falando sério?"

10052130-58 = "Estou brincando. Não há altos ou baixos na vida humana."

10052130-59 = "……obrigado."

10052130-60 = "Não quero que ninguém se machuque."

10052130-61 = "Quero que todas as pessoas que vivem hoje estejam livres do sofrimento."

10052130-62 = "Isso... não é um pouco difícil?"

10052130-63 = "Portanto, estou orando pela segurança de todos, pelo menos daqueles que estão ao nosso alcance. #nEste mundo está cheio de coisas assustadoras."

10052130-64 = "Já é difícil ser o gerente geral, mas recentemente fui até o presidente..."

10052130-65 = "...Eu também estou muito... preocupado com a professora."

10052130-66 = "Bem, acho que deveria trancá-la no abrigo especial da Millennium."

10052130-67 = "Esta pode ser a forma mais eficiente de garantir a segurança dos professores."

10052130-68 = "Você está planejando entrar em guerra contra Kivotos?"

10052130-69 = "Isso é bom. Se você quiser, estarei orgulhosamente na linha de frente."

10052130-70 = "...É uma piada."

10052130-71 = "Eu também estou brincando."

10052130-72 = "Não sei se Toki é uma piada ou verdade..."

10052130-73 = "é assim mesmo. Porém, graças a você, aprendi uma coisa."

10052130-74 = "Isto porque é uma situação perigosa e difícil."

10052130-75 = "Deveríamos fazer piadas ativamente e rir de histórias triviais."

10052130-76 = "...Caso contrário, eu não seria capaz de suportar."

10052130-77 = "Então, o trabalho habitual do Toki é uma extensão disso?"

10052130-78 = "Não, só estou dizendo o que me veio à mente."

10052130-79 = "...Realmente se parece com o Toki."

10052130-88 = "Toki, Amy, vocês podem me ouvir? Os preparativos aqui estão completos. #nEu combinarei os movimentos, então cabe a você decidir quando entrar correndo."

10052130-89 = "O fim está finalmente à vista. Foi um caminho bastante longo, mas..."

10052130-90 = "Este é o último profeta, certo?"

10052130-91 = "Para ser exato, ainda restam dois. Com Netzak do próprio Continente Steel――"

10052130-92 = "Malchut…."

10052130-93 = "Uuuu... Será que podemos derrotá-lo...?"

10052130-94 = "Está tudo bem, Yuzu! Todos nós ganhamos novas armas e armaduras! #nKei também subiu muito de nível!"

10052130-95 = "Sim... acho que está melhor do que antes. #nConsegui utilizar o poder do profeta até certo ponto."

10052130-98 = "Parece que chegou a hora."

10052130-99 = "sim."

10052130-104 = "Eu irei em frente. Desta vez serei a ponta de lança."

10052130-105 = "As armas são mais leves que o normal, o que é bom."

10052130-108 = "[ruby=Operação Chuva de Aço]Operação Chuva de Aço[/ruby]――"

10052130-109 = "Certifique-se de manter a atenção de Yesod até que todos desçam."

10052130-112 = "Amy forneceu apoio de fogo pela retaguarda."

10052130-113 = "Com essa estratégia, essa é a maneira mais eficiente de usá-la."

10052130-114 = "Muito obrigado. Fique seguro."

10052130-115 = "Boa sorte."

10052130-118 = "Um para o outro."

