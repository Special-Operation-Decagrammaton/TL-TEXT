[translation]
90000050-1 = "Episódio 6; \"Coleta de Dados (5) Ruínas\""
90000050-2 = "Ruínas? Onde fica isso?"
90000050-3 = "Ora, você é surpreendentemente desinformada, Eimi."
90000050-4 = "As \"Ruínas\" referem-se a uma região desconhecida perto do Distrito Autônomo de Millennium, que foi declarada proibida pelo Conselho Estudantil Geral. Dizem que são chamadas assim por serem uma cidade abandonada e deixada de lado por muito tempo."
90000050-5 = "Nada foi revelado sobre a origem ou a verdadeira natureza daquela cidade. É uma área onde a própria pesquisa e investigação são proibidas, então..."
90000050-6 = "Entendi... É a primeira vez que ouço falar disso. A presidente Rio nunca me contou nada parecido."
90000050-7 = "...Bem, existe a possibilidade de a Rio não ter mencionado. Aquela pessoa não conta a ninguém o que ela realmente considera importante."
90000050-8 = "A Rio é muito apegada às \"Ruínas\". É de se esperar de uma \"Big Sister\" que gosta de monopolizar informações..."
90000050-9 = "No entanto, mesmo assim, rumores sobre as \"Ruínas\" estão se espalhando secretamente entre os estudantes de Millennium."
90000050-10 = "Sensei, você também não saberia algo sobre aquele lugar?"
90000050-11 = "[s1] \"Bem, só um pouco.\"\n[s2] \"Hmm, será?\""
90000050-14 = "A Alice é..."
90000050-18 = "...Não, vamos deixar esse assunto de lado. Não tem relação com a missão atual."
90000050-23 = "...Falaremos sobre isso em outra oportunidade."
90000050-25 = "Bem... pode-se dizer que as \"Ruínas\" de Millennium são como as \"Catacumbas\" de Trinity ou o \"Abismo\" no vulcão Hinomu de Gehenna."
90000050-26 = "Um dos territórios inexplorados de Kivotos, cuja extensão total não foi compreendida..."
90000050-27 = "É apenas uma possibilidade, mas penso que este lugar seja uma espécie de esgoto onde se acumula tudo o que foi esquecido por Kivotos."
90000050-30 = "Esgoto... fossa séptica... A Himari-senpai adora escolher esse tipo de palavra, né?"
90000050-31 = "Poderia parar com esse olhar de quem quer dizer \"por que você gosta de coisas sujas?\"? É uma metáfora, uma metáfora. Por favor, não manche minha imagem de pureza."
90000050-32 = "Se é uma metáfora, acho que poderia usar outras palavras."
90000050-33 = "É que, Eimi. No mundo, existem..."
90000050-34 = "[s] \"...Vamos voltar ao assunto principal.\""
90000050-35 = "...Sim."
90000050-36 = "O assunto desviou de novo. Isso é tudo culpa da chefe."
90000050-37 = "Admito que sou uma mulher cheia de pecados, mas... desta vez a culpa é definitivamente da Eimi. O Sensei também está prestando atenção, então vamos deixar por isso mesmo."
90000050-38 = "Não deixe por isso mesmo. ...De qualquer forma, o próximo alvo está nessas \"Ruínas\"?"
90000050-39 = "Sim. Acredito que o quarto profeta, \"Chesed\", esteja em algum lugar das ruínas."
90000050-40 = "\"Chesed\", é..."
90000050-42 = "Decagrammaton transformou a IA de controle de produção de uma fábrica de armamentos em seu próprio profeta, obtendo assim um exército infinito."
90000050-43 = "Ou seja, \"Chesed\" é a própria \"fábrica de armamentos\" que produz o exército de Decagrammaton."
90000050-44 = "Pode-se considerar que \"Chesed\" é o Decagrammaton... a principal força de combate daquele exército."
90000050-46 = "No entanto, as ruínas são vastas demais. É quase impossível encontrar a localização da \"fábrica de armamentos\" lá dentro... então, primeiro, vamos começar coletando informações."
90000050-47 = "Então, os soldados de Decagrammaton que provavelmente estão nas ruínas são o próximo alvo, certo?"
90000050-48 = "Sim. Coletaremos dados desses soldados para determinar a localização de \"Chesed\"."
90000050-49 = "Entendido."
90000050-50 = "Já garanti o caminho para as ruínas. Vamos entrar por lá e começar a missão."
90000050-51 = "Então vamos partir."
