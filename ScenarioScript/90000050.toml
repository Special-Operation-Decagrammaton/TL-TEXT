[translation]
90000050-1 = "第6話;「データ収集（５）廃墟」"
90000050-2 = "廃墟？それってどこにあるの？"
90000050-3 = "あら、意外と疎いのですね、エイミ。"
90000050-4 = "「廃墟」はミレニアム自治区の近くにあるものの、連邦生徒会によって立入禁止となった未知の地域を指しています。捨てられてしまい、長い間放置された都市だからそう呼ばれているのだとか。"
90000050-5 = "その都市の起源や正体については何も明らかになっていません。研究や調査そのものが禁止された地域ですので……。"
90000050-6 = "そうなんだ……初めて聞いた。そんな話、リオ会長も教えてくれなかったし。"
90000050-7 = "……まぁ、リオなら言わない可能性はありますね。あの人、自分が本当に重要だと思うことは誰にも教えたりしませんから。"
90000050-8 = "リオは「廃墟」にとても執着しているので。さすが、情報を独占したがるビッグシスターらしいと言いますか……。"
90000050-9 = "ですが、それでも「廃墟」に対する噂はミレニアム生徒の間で密かに広がっている状態です。"
90000050-10 = "先生もあの場所に関して、ご存知なのではないでしょうか？"
90000050-11 = "[s1] \"まぁ、ちょっとだけね。\"\n[s2] \"うーん、どうだろう？\""
90000050-14 = "アリスは……。"
90000050-18 = "……いえ、この話はやめておきましょう。今の任務と関係ありませんし。"
90000050-23 = "……この話は、また次の機会に。"
90000050-25 = "さて……ミレニアムの「廃墟」は言うなれば、トリニティの「カタコンベ」や、ゲヘナのヒノム火山にある「アビス」のようなものだと言えるでしょう。"
90000050-26 = "その全容が把握されていない、キヴォトスの未開の地の一つ……。"
90000050-27 = "可能性の話ですが。ここは、キヴォトスから忘れ去られたものが集積される……ある種の下水道のような場所なのではないかと思っております。"
90000050-30 = "下水道……浄化槽……ヒマリ先輩ってそういう言葉選び好きだよね。"
90000050-31 = "その「なんで汚いものが好きなの？」とでも言いたげな視線をやめていただけませんか？比喩ですよ、比喩。私の清楚なイメージを汚さないでください。"
90000050-32 = "比喩なら他の単語でもいいと思うけど。"
90000050-33 = "それはですね、エイミ。世の中には……。"
90000050-34 = "[s] \"……本題に戻ろっか。\""
90000050-35 = "……はい。"
90000050-36 = "また話が逸れちゃった。これも全部、部長のせいだよ。"
90000050-37 = "私が罪深い女であることは認めますが……今回は絶対にエイミのせいですよ。先生も注意していますし、適当にそういう事にします。"
90000050-38 = "適当にそういう事にしないで。……とにかく、その「廃墟」に次のターゲットがいるの？"
90000050-39 = "はい。4番目の預言者、「ケセド」が廃墟のどこかにいると思います。"
90000050-40 = "「ケセド」か……。"
90000050-42 = "デカグラマトンは軍需工場の生産コントロールAIを自身の預言者とし、無限の兵力を手に入れたのです。"
90000050-43 = "つまり、「ケセド」はデカグラマトンの軍団を生産する「軍需工場」そのもの。"
90000050-44 = "「ケセド」こそ、デカグラマトン……その軍団の主戦力と思っていいでしょう。"
90000050-46 = "ですが、廃墟はあまりにも広大です。あの中で「軍需工場」の位置を探すことは不可能に近い……なのでまずは、情報収集から始めましょう。"
90000050-47 = "つまり、廃墟にいるであろうデカグラマトンの兵隊が次のターゲットなんだね？"
90000050-48 = "はい。その兵からデータを収集し、「ケセド」の位置を割り出します。"
90000050-49 = "わかった。"
90000050-50 = "廃墟に向かう道は既に確保しました。そこから進入して任務を始めるとしましょう。"
90000050-51 = "それじゃあ出発しようか。"
