[translation]
2600303-1 = "O anjo que desceu na calada da noite"
2600303-2 = "（Foi um dia tão ocupado que minha cabeça estava girando）"
2600303-3 = "（Enquanto processava uma quantidade de trabalho que me faria morrer se acumulasse mais, fiz todas as minhas refeições na mesa）"
2600303-5 = "（No meio disso, perdi a consciência de repente. Não me lembro exatamente que horas eram）"
2600303-6 = "（Só sei que devia ser tarde da noite）"
2600303-7 = "……Hum hum, hum hum hum, hum hum~♪"
2600303-8 = "[s] \"……？\""
2600303-11 = "Hum hum…… Ah."
2600303-12 = "……Acordou, Sensei?"
2600303-13 = "Poxa, eu bem que avisei…… trabalhar até o corpo não aguentar mais."
2600303-14 = "Sua consciência está clara? Sou eu, Serina."
2600303-15 = "Por que estou aqui?…… Eu não disse? Que estaria ao seu lado não importa onde ou quando."
2600303-16 = "Teria sido melhor se tivesse me contatado um pouco antes…… mas você desmaiou de repente, então não tem jeito."
2600303-18 = "Ah, não se mova! A toalha vai cair, então fique em repouso."
2600303-19 = "Coloquei compressas especiais no seu pescoço, braços e lombar."
2600303-20 = "Quando chegar a hora, eu mesma vou retirá-las, então, por favor, não faça nada e descanse, está bem?"
2600303-21 = "[s1] \"Foi você quem fez tudo isso, Serina?\"\n[s2] \"Eu não acordei mesmo com tudo isso sendo feito…….\""
2600303-22 = "Sim. Você dormiu profundamente o tempo todo, fiquei até preocupada porque não dava sinal de que ia acordar."
2600303-23 = "Sim. Você dormiu profundamente o tempo todo, fiquei até preocupada porque não dava sinal de que ia acordar."
2600303-24 = "Mesmo colocando uma toalha molhada na sua testa, tirando sua roupa para colocar as compressas…… você não acordou de jeito nenhum."
2600303-25 = "……Isso mostra o quanto de cansaço você acumulou, entende?"
2600303-26 = "Por isso eu disse tantas vezes para não se sobrecarregar…… não consigo acreditar que você não me ouviu até chegar a esse ponto."
2600303-27 = "Pacientes que não ouvem a enfermeira são os mais problemáticos, sabe? Embora eu ainda não seja uma enfermeira oficial……."
2600303-28 = "Poxa, se você não aprender a lição depois dessa, eu vou ficar realmente brava, viu?"
2600303-29 = "……Sim? Talvez você não tenha acordado porque o toque da Serina é gentil demais……?"
2600303-30 = "A-ai, meu Deus! Não é hora para dizer essas coisas!"
2600303-32 = "É que…… você é o Sensei, então ser gentil é o natural, por assim dizer……."
2600303-34 = "N-não é nada! Foi só um pensamento em voz alta, não ligue."
2600303-35 = "Será que você está tentando desviar o foco da minha raiva, Sensei……?"
2600303-36 = "Sensei…… se continuar agindo como um paciente rebelde, vou te dar uma injeção bem dolorida de propósito."
2600303-37 = "[s3] \"Desculpe, eu estava errado.\"\n[s4] \"Hii! Injeção não, injeção não……!\""
2600303-41 = "……Ufa. Eu só disse aquilo por dizer, foi uma brincadeira."
2600303-42 = "Além disso, eu entendo. Não é que você tenha feito algo errado, é que você está tão ocupado que não tinha como evitar."
2600303-43 = "Você não deve ter trabalhado até tarde porque queria…… forçando-se até perder a consciência."
2600303-44 = "Mas, no fim, você sempre tenta fazer o que precisa ser feito. Afinal, você é um adulto, Sensei."
2600303-45 = "Por isso, o mínimo que posso fazer é…… cuidar de você aqui ao seu lado, já que é só isso que está ao meu alcance……."
2600303-46 = "……"
2600303-47 = "Mas, pensando pelo lado positivo, assim eu posso conversar com você e ver seu rosto enquanto dorme……."
2600303-48 = "Talvez não seja algo tão ruim…… é como um privilégio só meu……."
2600303-49 = "……Ah, está na hora de tirar as compressas. Fique parado aí."
2600303-52 = "Pronto…… hum……."
2600303-53 = "Bem, na hora de colocar eu estava tão concentrada que nem notei…… mas, olhando agora, é um pouco vergonhoso ver seu corpo assim……."
2600303-54 = "E, mesmo sendo um tratamento, tocar em você, é que……."
2600303-55 = "Bem, como estou com vergonha, eu agradeceria muito se você pudesse dormir de novo……."
2600303-56 = "Bom, você acabou de acordar, não deve conseguir dormir agora…… não se preocupe, tenho um bom método para esses momentos."
2600303-57 = "Se eu fizer carinho assim, você vai dormir rapidinho. Assim……"
2600303-58 = "Fufu. Você disse que meu toque era gentil, não disse? Já que disse isso, não tem direito de recusar, Sensei?"
2600303-59 = "Vamos, relaxe os músculos, deixe o corpo todo leve……."
2600303-60 = "Você está ficando com sono…… suas pálpebras estão pesando……."
2600303-61 = "Na testa, na cabeça, nas bochechas, no pescoço. Vou ficar fazendo carinho assim, tá bom~……"
2600303-63 = "(Como se fosse mágica, minhas pálpebras estão ficando realmente pesadas)"
2600303-65 = "(E então, quando acordei algum tempo depois, Serina, a toalha molhada e até a compressa tinham desaparecido)"
2600303-66 = "(Como se nada daquilo tivesse acontecido desde o início... Será que ela realmente esteve aqui?)"
2600303-67 = "(Talvez eu estivesse tão cansado que sonhei com isso... Cheguei a pensar nisso)"
2600303-69 = "(...Espere)"
2600303-70 = "(O sistema de segurança do Schale deveria estar ativado naquele horário)"
2600303-71 = "(Se a Serina realmente esteve aqui...)"
2600303-72 = "(...Como, exatamente, ela conseguiu?)"
