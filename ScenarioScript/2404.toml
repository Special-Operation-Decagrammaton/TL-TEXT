[translation]
2404-1 = "夜は短し、走れよ乙女（2）"
2404-11 = "ススススッ……！"
2404-13 = "こそこそ……。"
2404-15 = "シュタタタタタッ！"
2404-16 = "[s1] \"カエデ……？\"\n[s2] \"……何でそんな派手な動きをしてるの？\""
2404-17 = "しっ！先生、静かに！"
2404-18 = "しっ！先生、静かに！"
2404-19 = "私は今、影の中を駆け抜ける忍びの者……。"
2404-20 = "今こそミクリと一緒にやってた、忍者ごっこの成果を見せる時！"
2404-21 = "あっ、先生！そこ踏んじゃダメ！"
2404-22 = "[s] \"え、罠！？\""
2404-23 = "そこの線からはみ出たらアウトだから！"
2404-24 = "その外側は海！サメがうようよしてるから、落ちたらゲームオーバーなの！"
2404-25 = "あ、でもずっと線を踏んでるからってセーフってわけじゃなくて。"
2404-26 = "10秒以上同じところにいたら足場が落ちるってことになってるから、気を付けて！"
2404-27 = "[s3] \"小さい頃によくやるやつ……！\"\n[s4] \"それ今守らないとダメ！？\""
2404-28 = "ふふっ、これくらい修行部としては朝飯前だよ？"
2404-29 = "ふふっ、これくらい修行部としては朝飯前だよ？"
2404-30 = "先生はまだまだアマ、アマ……アマツナだね！"
2404-31 = "[s5] \"ちょっと美味しそうだね。\"\n[s6] \"「アマチュア」だね。\""
2404-32 = "あっ、マズい！このままだと先輩たちを見失っちゃう！早く行こ、先生！"
2404-33 = "あっ、マズい！このままだと先輩たちを見失っちゃう！早く行こ、先生！"
2404-34 = "とりゃーっ！"
2404-37 = "[ns] \"そんなにはしゃぐとバレちゃうよ……？\""
2404-47 = "今の先輩たち……なんかすごく大事な話をしてた感じがする！"
2404-48 = "[s7] \"そうなの？\"\n[s8] \"いつもの雑談って感じだったけど……？\""
2404-49 = "だって先生！こんな良い感じの場所で、こうして……"
2404-50 = "だって先生！こんな良い感じの場所で、こうして……"
2404-51 = "街並みを見渡しながら、二人で……"
2404-52 = "はっ！どうしよう先生、私分かっちゃったかも！？"
2404-53 = "[s] \"……？\""
2404-54 = "ツバキ先輩とミモリ先輩……二人で展望台から街を眺めて、大事そうな話をするなんて、これはつまり……！"
2404-55 = "……お互いに、内に秘めた決意を確かめ合ってたのかもしれない！！"
2404-56 = "[s] \"……？？\""
2404-57 = "「この街に蔓延る悪党たちは、私たちが倒さないといけない……」"
2404-58 = "「はい。大変ですが、私たちの手でこの街を守りましょう……！」"
2404-59 = "……みたいな！"
2404-60 = "ニチアサのヒーローアニメとかで、そういうの見たことある！"
2404-61 = "[s] \"？？？\""
2404-62 = "でもそれなら余計に、どうして私を置いて二人だけで！？"
2404-63 = "……もっともっと調べないと！きっと他にも何か、隠された秘密が……！"
2404-64 = "[s] \"カエデ、やっぱり二人に直接――\""
2404-65 = "真実は、私が突き止めてみせる！シュバババッ！！"
2404-71 = "さっきここにいたけど、先輩たちはここで何を……！？"
2404-75 = "[ns9] \"……野良猫？\"\n[ns10] \"もしかして二人は、この子たちを……。\""
2404-76 = "マスコット！？"
2404-77 = "マスコット！？"
2404-78 = "[s] \"……え？\""
2404-79 = "修行部のイメージアップのために、この子たちをマスコットにしようとして！？"
2404-80 = "こんな、こんな……！うぅ……！"
2404-83 = "な、なに！？そんなに可愛くすり寄ってきても、懐柔なんてされないんだから……！"
2404-84 = "そもそも修行部のマスコットは私なのに！私じゃダメなの！？何が足りないの！？"
2404-85 = "うわあぁん！！ツバキ先輩、ミモリ先輩～～！"
2404-88 = "[ns] \"カエデ、待って……！\""
2404-90 = "（その後もカエデと一緒にツバキとミモリを尾行しながら、百鬼夜行のあちこちを歩き回った）"
2404-91 = "（歩き回ったのだけれど……）"
2404-92 = "先輩たちが通ったこの場所には、一体どんな秘密が……！？"
2404-93 = "何だろう、何かちょっと変な匂いが……くんくん、くんくん……！"
2404-94 = "……ふにゃっ！？"
2404-97 = "私の天才的で超人的な頭脳から導かれた推理によると……！"
2404-98 = "この辺に何か秘密があるはず！"
2404-99 = "……！"
2404-100 = "……！！"
2404-103 = "（カエデがあちこちに突っ込んでいっては、自分から勝手に痛い目に遭うのを繰り返し……）"
2404-104 = "（そして……）"
2404-106 = "[ns] \"あれ、見失っちゃった……？\""
2404-107 = "うぅ……ツバキ先輩、ミモリ先輩……。"
2404-108 = "私を置いて、一体どこに……それに、一体何を……。"
2404-109 = "ぐすっ……。"
2404-110 = "[s] \"カエデ、今日は一旦帰らない……？\""
2404-111 = "……ダメ。"
2404-112 = "これじゃ、私、私……。"
2404-113 = "もしかしたら、本当に――"
2404-117 = "……ん？"
2404-118 = "どこ見てんだごるぁ！"
2404-119 = "ごるぁっ！"
2404-121 = "え、あ、えっと……"
2404-122 = "[s] \"ねえ、ちょっと。\""
2404-124 = "部外者は引っ込んでな！"
2404-125 = "なっ！"
2404-126 = "こちとらさっき「ツチノコの抜け殻」だって言うからワクワクして大量に買ってみたら、全部セミの抜け殻だったからイライラしてんだ！！"
2404-127 = "してんだっ！"
2404-128 = "[s] \"それはちょっと同情する。\""
2404-129 = "そんな時にぶつかってきやがって、何なんだてめぇは！"
2404-130 = "てめぇはっ！"
2404-132 = "うわあぁぁぁん！？"
2404-133 = "ちょっと。"
2404-134 = "何をしてるんですか！"
2404-136 = "あん、誰だてめぇら！"
2404-137 = "てめぇらっ！"
2404-141 = "ツバキ先輩、ミモリ先輩……！？"
2404-142 = "私たちの後輩に何してるの？"
2404-143 = "もし手を出すつもりでしたら、許しませんよ。"
2404-144 = "はっ、だから何だってんだ！文句があんならかかってきな！"
2404-145 = "きなっ！"
2404-153 = "くそっ、覚えてろよっ！？"
2404-156 = "うぇぇぇぇぇぇん！"
2404-160 = "う……うっ……"
2404-161 = "[s] \"……う？\""
2404-162 = "うわああぁぁぁんっ！！！ツバキ先輩っ、ミモリ先輩っ……！"
2404-168 = "もう大丈夫、ちゃんと追い払ったから。"
2404-169 = "先生まで……一体どうしてこちらに？"
2404-170 = "[s] \"それは、えっと……。\""
2404-171 = "私に隠れて先輩たちが何かしてるから、それを知ろうと思って……！"
2404-172 = "……ん？"
2404-173 = "……はい？"
2404-175 = "（二人にざっくりとした経緯を説明した）"
2404-177 = "それって……。"
2404-178 = "えっと、それは……。"
2404-179 = "街を見下ろしながら、二人で決意を固めてたんでしょ！？私を差し置いて！"
2404-180 = "あそこの展望台は、設備点検のために立ち寄ったの。"
2404-181 = "何か壊れていないか、危険なまま放置されている設備は無いか、夜に百鬼夜行のあちこちを見て回っているんです。"
2404-182 = "[s] \"偉いね……。\""
2404-183 = "そ、それじゃあ、あの猫たちは！？"
2404-184 = "あの野良猫たち、修行部の新しいマスコットなんでしょ！？私よりあの猫たちの方が可愛いの！？"
2404-185 = "あの子たちには、いつも餌をあげてるの。"
2404-186 = "はい。毎晩ご飯をあげながら、具合の悪くなった子がいないかどうか確認しているんです。"
2404-187 = "え、じゃ、じゃあ……じゃあどうして、私のことを置いていったの？"
2404-188 = "わ、私がまだ、全然頼りないから……！？"
2404-189 = "それは……。"
2404-190 = "カエデちゃん、その答えはカエデちゃんも知ってるはずですよ。"
2404-191 = "……？"
2404-192 = "前に、「一緒に夜のパトロール行く？」って聞いた時……"
2404-193 = "「眠いから先輩たちだけで」って言ったのは、カエデちゃんですよね？"
2404-194 = "……。"
2404-196 = "……あれ？"
2404-197 = "[s] \"忘れてたんだ……。\""
2404-198 = "いくら部活動とはいえ、強制するものでもないから。"
2404-199 = "毎晩活動するのはやはり大変ですし。"
2404-200 = "まあ私はこの時間帯の方が強いっていうか、眼が冴えてるって言うか。うん、絶好調！"
2404-201 = "ツバキちゃんは夜型ですもんね、ふふっ。"
2404-202 = "[s] \"確かに、普段より溌溂としてるっていうか……。\""
2404-203 = "た、確かに言われてみれば、いつかそんなことを自分で言ったような、気も……？"
2404-204 = "うん、ちゃんとカエデがそう言ってたよ。"
2404-205 = "ですが、まさかこんなことになるなんて……ごめんなさい。"
2404-206 = "ひとりで、寂しい思いをさせてしまいましたね……。"
2404-207 = "うん、ごめんね。じゃああらためて、カエデが良ければだけど……一緒に夜のパトロール、行く？"
2404-208 = "……！"
2404-209 = "い、行きたい！……け、けど、でもやっぱり、夜は眠くなっちゃうかもだし……えっと、どうしよう……？"
2404-210 = "……ふふっ。"
2404-211 = "カエデちゃんらしいですね。"
2404-212 = "[s] \"とにかく、誤解が解けて良かった。\""
2404-213 = "う、うん！良かったー、やっぱり先輩たちは私のこと大事に思ってくれてたんだね……！"
2404-214 = "えへ、えへへっ……！"
2404-215 = "ところで、カエデちゃん？"
2404-216 = "ん？なあに、ミモリ先輩？"
2404-217 = "カエデちゃんがこうして夜に、あまり眠そうな気配も無く、外出しているということは……。"
2404-218 = "まさかとは思いますがカエデちゃん、コーヒーを飲んだりしましたか……？"
2404-219 = "……。"
2404-220 = "……ピュ～、ピュ～♪"
2404-221 = "カエデちゃん……ただでさえ夜更かしをしがちなのですから、コーヒーはダメと言いましたよね？また体内時計が崩れて、辛くなってしまうのはカエデちゃんなんですよ！？"
2404-222 = "ご、ごめんなさいっ！"
2404-224 = "先生も同罪です！"
2404-225 = "[s] \"私がそそのかしたわけじゃないのに！？\""
2404-227 = "さあ、今からお説教の時間ですよ！"
2404-228 = "これはしょうがないね～。"
2404-229 = "うわあぁぁぁ～ん！"
2404-231 = "（そうして誤解も解けて、修行部の絆はより深まった（？）のだった）"
2404-232 = "（めでたしめでたし）"
2404-233 = "全然めでたしじゃないよ～！"
2404-234 = "夜は短し、走れよ乙女"
