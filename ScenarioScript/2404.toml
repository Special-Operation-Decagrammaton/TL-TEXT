[translation]
2404-1 = "A noite é curta, corra, donzela (2)"
2404-11 = "Sussussu...!"
2404-13 = "Sorrateiramente..."
2404-15 = "Shutatatata!"
2404-16 = "[s1] \"Kaede...?\"\n[s2] \"...Por que você está se movendo de um jeito tão chamativo?\""
2404-17 = "Shiu! Sensei, silêncio!"
2404-18 = "Shiu! Sensei, silêncio!"
2404-19 = "Eu sou uma ninja que atravessa as sombras agora..."
2404-20 = "Este é o momento de mostrar os resultados da brincadeira de ninja que eu fazia com a Mikuri!"
2404-21 = "Ah, Sensei! Não pise aí!"
2404-22 = "[s] \"Hã, uma armadilha!?\""
2404-23 = "Se sair da linha, você perde!"
2404-24 = "O lado de fora é o mar! Está cheio de tubarões, então se cair, é game over!"
2404-25 = "Ah, mas não é porque você está pisando na linha que está a salvo."
2404-26 = "Se ficar mais de 10 segundos no mesmo lugar, o chão cai, então cuidado!"
2404-27 = "[s3] \"Isso é algo que a gente faz muito quando criança...!\"\n[s4] \"A gente realmente precisa seguir isso agora!?\""
2404-28 = "Fufu, para o Clube de Treinamento, isso é moleza, sabe?"
2404-29 = "Fufu, para o Clube de Treinamento, isso é moleza, sabe?"
2404-30 = "Sensei, você ainda é um amador, amador... amatsuna!"
2404-31 = "[s5] \"Parece um pouco saboroso.\"\n[s6] \"É 'amador', né?\""
2404-32 = "Ah, droga! Se continuar assim, vou perder as veteranas de vista! Vamos logo, Sensei!"
2404-33 = "Ah, droga! Se continuar assim, vou perder as veteranas de vista! Vamos logo, Sensei!"
2404-34 = "Toryaa!"
2404-37 = "[ns] \"Se ficar tão animada assim, vão acabar te descobrindo...?\""
2404-47 = "As veteranas de agora há pouco... pareciam estar conversando sobre algo muito importante!"
2404-48 = "[s7] \"Sério?\"\n[s8] \"Parecia uma conversa casual como sempre...\""
2404-49 = "Mas Sensei! Em um lugar tão bom assim, e desse jeito..."
2404-50 = "Mas Sensei! Em um lugar tão bom assim, e desse jeito..."
2404-51 = "Olhando a paisagem da cidade, as duas..."
2404-52 = "Ah! O que eu faço, Sensei? Acho que eu entendi tudo!"
2404-53 = "[s] \"...?\""
2404-54 = "Tsubaki-senpai e Mimori-senpai... as duas olhando a cidade do observatório e tendo uma conversa séria, isso significa que...!"
2404-55 = "...Talvez elas estivessem confirmando a determinação que guardam em seus corações!!"
2404-56 = "[s] \"...??\""
2404-57 = "\"Os vilões que infestam esta cidade... nós precisamos derrotá-los...\""
2404-58 = "\"Sim. Será difícil, mas vamos proteger esta cidade com nossas próprias mãos...!\""
2404-59 = "...Algo assim!"
2404-60 = "Eu já vi isso em animes de heróis que passam de manhã!"
2404-61 = "[s] \"???\""
2404-62 = "Mas se for isso, por que me deixaram para trás e foram só as duas!?"
2404-63 = "...Preciso investigar muito mais! Com certeza há algum outro segredo escondido...!"
2404-64 = "[s] \"Kaede, talvez seja melhor perguntar diretamente para elas--\""
2404-65 = "Eu vou descobrir a verdade! Shubababa!!"
2404-71 = "Elas estavam aqui agora há pouco, o que as veteranas estavam fazendo aqui...!?"
2404-75 = "[ns9] \"...Gatos de rua?\"\n[ns10] \"Será que as duas estavam...\""
2404-76 = "Mascotes!?"
2404-77 = "Mascotes!?"
2404-78 = "[s] \"...Hã?\""
2404-79 = "Para melhorar a imagem do Clube de Treinamento, elas estavam tentando transformar esses bichinhos em mascotes!?"
2404-80 = "Isso, isso...! Uuu...!"
2404-83 = "Q-que isso!? Mesmo que você tente me conquistar sendo tão fofa assim, eu não vou ceder...!"
2404-84 = "Além do mais, a mascote do Clube de Treinamento sou eu! Eu não sou boa o suficiente!? O que está faltando em mim!?"
2404-85 = "Waaaaah!! Tsubaki-senpai, Mimori-senpai~~!"
2404-88 = "[ns] \"Kaede, espere...!\""
2404-90 = "（Depois disso, continuei seguindo a Tsubaki e a Mimori junto com a Kaede, andando por toda parte em Hyakkiyako）"
2404-91 = "（Nós andamos por toda parte, mas...）"
2404-92 = "Que tipo de segredo será que existe neste lugar por onde as senpais passaram...!?"
2404-93 = "O que será isso? Tem um cheiro um pouco estranho... snif, snif...!"
2404-94 = "......Funya!?"
2404-97 = "De acordo com a dedução do meu cérebro genial e sobre-humano...!"
2404-98 = "Deve haver algum segredo por aqui!"
2404-99 = "......!"
2404-100 = "......!!"
2404-103 = "（A Kaede continuava se metendo em lugares e se machucando sozinha repetidamente...）"
2404-104 = "（E então...）"
2404-106 = "[ns] \"Ué, perdi elas de vista...?\""
2404-107 = "Uuu... Tsubaki-senpai, Mimori-senpai..."
2404-108 = "Me deixaram para trás, para onde será que foram... e além disso, o que será que elas estão fazendo..."
2404-109 = "Snif..."
2404-110 = "[s] \"Kaede, não deveríamos ir para casa por hoje?\""
2404-111 = "......Não."
2404-112 = "Se for assim, eu, eu..."
2404-113 = "Talvez, de verdade..."
2404-117 = "......Hm?"
2404-118 = "Para onde você está olhando, hein!?"
2404-119 = "Ei, você!"
2404-121 = "Ah, é, bem..."
2404-122 = "[s] \"Ei, espere um pouco.\""
2404-124 = "Forasteiros, caiam fora!"
2404-125 = "O quê!"
2404-126 = "Eu comprei um monte disso porque me disseram que era uma \"casca de Tsuchinoko\" e fiquei todo empolgado, mas eram todas cascas de cigarra, então estou muito irritado agora!!"
2404-127 = "Muito irritado mesmo!"
2404-128 = "[s] \"Até que dá para entender a frustração.\""
2404-129 = "E você vem esbarrar em mim bem nessa hora, quem você pensa que é!?"
2404-130 = "Quem você pensa que é!?"
2404-132 = "Waaaaah!?"
2404-133 = "Ei."
2404-134 = "O que vocês estão fazendo!"
2404-136 = "Ah, quem são vocês!"
2404-137 = "Quem são vocês!"
2404-141 = "Tsubaki-senpai, Mimori-senpai...!?"
2404-142 = "O que vocês estão fazendo com a nossa kohai?"
2404-143 = "Se pretendem machucá-la, eu não vou perdoar."
2404-144 = "Hah, e daí! Se tem alguma reclamação, venha para cima!"
2404-145 = "Venha para cima!"
2404-153 = "Droga, me aguarde!"
2404-156 = "Waaaaaaah!"
2404-160 = "U... ugh..."
2404-161 = "[s] \"...Ué?\""
2404-162 = "Waaaaaaah!!! Tsubaki-senpai, Mimori-senpai...!"
2404-168 = "Já está tudo bem, eu já os espantei."
2404-169 = "Até o Sensei... Por que exatamente você está aqui?"
2404-170 = "[s] \"Bem, é que...\""
2404-171 = "Vocês estavam fazendo algo escondido de mim, então eu queria descobrir o que era...!"
2404-172 = "……Hm?"
2404-173 = "……Sim?"
2404-175 = "（Expliquei a situação geral para as duas）"
2404-177 = "Isso é..."
2404-178 = "Bem, isso é..."
2404-179 = "Vocês estavam lá em cima, olhando a cidade e tomando uma decisão juntas, não estavam!? Me deixando de fora!"
2404-180 = "Aquele observatório, nós passamos por lá para fazer uma inspeção nos equipamentos."
2404-181 = "Estamos dando uma volta por Hyakkiyako à noite para ver se algo quebrou ou se há algum equipamento perigoso deixado sem manutenção."
2404-182 = "[s] \"Que admiráveis...\""
2404-183 = "E-então, e quanto àqueles gatos!?"
2404-184 = "Aqueles gatos de rua, eles são os novos mascotes do Clube de Treinamento, não são!? Vocês acham eles mais fofos do que eu!?"
2404-185 = "Nós sempre damos comida para eles."
2404-186 = "Sim. Enquanto damos comida toda noite, verificamos se algum deles está doente."
2404-187 = "Ah, e-então... então por que vocês me deixaram para trás?"
2404-188 = "É-é porque eu ainda não sou confiável o suficiente...!?"
2404-189 = "Isso é..."
2404-190 = "Kaede-chan, você mesma deveria saber a resposta para isso."
2404-191 = "……?"
2404-192 = "Da última vez que perguntei: \"Quer vir na patrulha noturna com a gente?\"..."
2404-193 = "Foi você quem disse: \"Estou com sono, podem ir só vocês\", não foi, Kaede-chan?"
2404-194 = "……."
2404-196 = "……Ué?"
2404-197 = "[s] \"Ela tinha esquecido...\""
2404-198 = "Mesmo sendo uma atividade de clube, não é algo que forçamos ninguém a fazer."
2404-199 = "Afinal, é bem cansativo sair toda noite."
2404-200 = "Bem, eu funciono melhor nesse horário, ou melhor, meus olhos ficam bem abertos. Sim, estou no meu auge!"
2404-201 = "A Tsubaki-chan é noturna, né, fufu."
2404-202 = "[s] \"De fato, ela parece até mais animada que o normal...\""
2404-203 = "P-pensando bem, agora que você falou, acho que me lembro de ter dito algo assim..."
2404-204 = "Sim, a Kaede disse isso mesmo."
2404-205 = "Mas eu nunca imaginei que as coisas chegariam a esse ponto... Me desculpe."
2404-206 = "Eu acabei te deixando sozinha e fazendo você se sentir solitária..."
2404-207 = "Sim, me desculpe. Então, recomeçando, se você quiser, Kaede... quer vir na patrulha noturna com a gente?"
2404-208 = "……!"
2404-209 = "E-eu quero! ...M-mas, pensando bem, talvez eu fique com sono à noite... e agora, o que eu faço...?"
2404-210 = "……Fufu."
2404-211 = "Isso é bem a cara da Kaede-chan."
2404-212 = "[s] \"De qualquer forma, fico feliz que o mal-entendido tenha sido resolvido.\""
2404-213 = "S-sim! Que bom, no fim das contas as veteranas ainda se importam comigo...!"
2404-214 = "Ehehe, ehehe...!"
2404-215 = "A propósito, Kaede-chan?"
2404-216 = "Hm? O que foi, Mimori-senpai?"
2404-217 = "O fato de você estar aqui fora à noite, sem parecer nem um pouco sonolenta, significa que..."
2404-218 = "Não quero nem pensar, mas Kaede-chan, por acaso você tomou café...?"
2404-219 = "……."
2404-220 = "……Piu~, piu~♪"
2404-221 = "Kaede-chan... eu já não disse que café não é permitido, especialmente porque você já tem o hábito de ficar acordada até tarde? Se o seu relógio biológico desregular de novo, quem vai sofrer é você, Kaede-chan!"
2404-222 = "De-desculpe!"
2404-224 = "Sensei, você é cúmplice!"
2404-225 = "[s] \"Mas eu não incentivei nada disso!?\""
2404-227 = "Muito bem, agora é hora da bronca!"
2404-228 = "Bom, não tem jeito, né~."
2404-229 = "Waaaaaah!"
2404-231 = "(E assim, o mal-entendido foi resolvido e os laços do Clube de Treinamento se fortaleceram (talvez?))"
2404-232 = "(E viveram felizes para sempre)"
2404-233 = "Não tem nada de feliz nisso!"
2404-234 = "A noite é curta, corra, donzela"
