[translation]
2002202-1 = "フウカの願い事"
2002202-2 = "ゲヘナ学園・学生食堂"
2002202-6 = "ふぅ……今日も疲れた……。"
2002202-7 = "……って、先生！？"
2002202-12 = "ど、どうかされましたか？どうしてここに……。"
2002202-13 = "[s1] \"フウカを待ってたんだ。お疲れ様。\"\n[s2] \"フウカたんに会いたくて。\""
2002202-16 = "わ、私……ですか？"
2002202-17 = "え、ええと、何か用事でもありましたか？"
2002202-18 = "私さっき給食部の仕事が終わったばかりで、汗かいてますし……。"
2002202-19 = "髪も直せてないですし、せめて着替えてから……それに……。"
2002202-20 = "[s] \"いつも頑張っているフウカを労いたいなと思って。\""
2002202-21 = "えっ……！？"
2002202-22 = "そ、そんな、お気持ちはありがたいですが、えっと……！"
2002202-23 = "あ、あわわ、どうしよう、いったい何をすれば……！？"
2002202-24 = "[s] \"だ、大丈夫だよ。落ち着いて、フウカ。\""
2002202-26 = "先生、次からは事前にご連絡いただけると……私の心臓の問題で……。"
2002202-27 = "え、びっくりさせたかった……？"
2002202-28 = "もう……先生はそうやって、時々意地悪になるんですから。"
2002202-29 = "この後、ですか？いえ、特に予定はありませんが……。"
2002202-30 = "[s] \"じゃあ、少し街に出てみない？\""
2002202-31 = "は、はい！？"
2002202-35 = "こ、これってもしかしてデート……？普通の格好なのに……！"
2002202-36 = "うぅ、いつもこの格好ばっかりのせいで、こういう時に……！"
2002202-37 = "[s] \"あ、疲れてたら無理にとは――\""
2002202-38 = "い、いえ！ただその、格好がと言いますか……。"
2002202-39 = "そんなこと気にしなくていい、ですか？うぅ……。"
2002202-40 = "で、でしたら……えっと、是非……！"
2002202-42 = "市内"
2002202-43 = "（フウカと一緒に市内へとやって来た）"
2002202-48 = "すごい、人がたくさんですね……。"
2002202-49 = "こういう時期だから、当然と言えば当然かもしれませんが……。"
2002202-50 = "そういえば私、いつもは給食部の仕事で大型マートに立ち寄るくらいで……。"
2002202-51 = "最近はあまり、お出かけしてなかったかもしれません。"
2002202-52 = "だからでしょうか……。"
2002202-53 = "普段目にしている景色なのに、どこか新鮮です。"
2002202-54 = "[s] \"それは良かった。ところで、お腹は空いてる？\""
2002202-55 = "え？あ、はい！"
2002202-56 = "そういえば、今日は連休前の時間割だったので……"
2002202-57 = "お昼以降、何も食べて――"
2002202-62 = "い、いえ、これはその……！"
2002202-63 = "[s] \"お腹空いたし、何か食べに行こっか。\""
2002202-64 = "そ、そうですね……！"
2002202-68 = "（フウカと一緒に食べ歩きすることに決めた）"
2002202-70 = "商店街"
2002202-75 = "わあっ。先生、見てください。このアスパラの肉巻き！"
2002202-76 = "色々なトッピングがありますね。海苔にチーズ、マヨネーズ……。"
2002202-77 = "先生はどれにしますか？"
2002202-79 = "先生、ローマッセですよ！"
2002202-80 = "この形、豚……でしょうか？"
2002202-81 = "程よい甘さとアーモンドの香りが良いですよね。"
2002202-83 = "あ、オリーボーレン！"
2002202-84 = "先生はご存知ですか？生地にフルーツを混ぜるお菓子で……"
2002202-85 = "揚げたては、特に美味しいんですよ！"
2002202-87 = "あ、甘いものが続いてしまいましたね……。"
2002202-88 = "あ、おでん……ちょうど良いタイミングですね。"
2002202-89 = "じゃんけんで勝ったら、もうひとつ具がもらえるそうです。行きましょう！"
2002202-91 = "お腹いっぱいです……。"
2002202-92 = "[s] \"ちょっと食べすぎちゃったね……。\""
2002202-93 = "ですが色々と食べたおかげで、インスピレーションも湧きました。"
2002202-94 = "特に肉巻きが美味しかったですね。"
2002202-95 = "あのピリ辛のタレ、どうやったら再現できるんだろう……？"
2002202-96 = "野菜炒めと一緒に出すと、相性良さそうですよね。"
2002202-97 = "……？ここでも給食部のことを考えるとは思わなかった、ですか？"
2002202-98 = "あはは……クセ、と言うんでしょうか？職業病みたいなものかもしれません。"
2002202-99 = "[s] \"フウカはがんばり屋さんだね。\""
2002202-100 = "そう、でしょうか……？自分ではよく分かりませんが……。"
2002202-101 = "それぞれ方向性は違っても、みんな好きなことがあると思うので……。"
2002202-102 = "私だけが特別ではないと思います、きっと。"
2002202-103 = "ただやるからには、全力でやっておきたいなと。"
2002202-104 = "[ns] \"少しでも休んでもらえればと思ったけど……。\""
2002202-106 = "[ns] \"もしかしておせっかいだったかな？\""
2002202-107 = "い、いえそんな！#nどこに行っても考えてしまうのは私のせいで……！"
2002202-108 = "おせっかいだなんて、そんなことは……。"
2002202-109 = "年末年始でお休みですので、気分転換も必要だと自分でも思いますし……！"
2002202-110 = "[s] \"そっか。年末年始と言えば、新年のお願い事は決めた？\""
2002202-111 = "そういえば、まだ考えていませんでした。"
2002202-112 = "ううん、どうしましょう……あらためてお願いするとなると……。"
2002202-113 = "もし本当に叶うのなら……。"
2002202-117 = "一つだけ、無いことも無いのですが……。"
2002202-118 = "その、一日だけでもいいので……平穏な日常を過ごしたいです。"
2002202-120 = "本当に、心から……。"
