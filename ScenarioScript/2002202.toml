[translation]
2002202-1 = "O Desejo de Fuuka"
2002202-2 = "Gehenna Academy - Refeitório Estudantil"
2002202-6 = "Ufa... estou exausta hoje..."
2002202-7 = "...Espere, Sensei!?"
2002202-12 = "A-aconteceu alguma coisa? Por que você está aqui..."
2002202-13 = "[s1] \"Eu estava esperando pela Fuuka. Bom trabalho.\"\n[s2] \"Eu queria ver a Fuuka-tan.\""
2002202-16 = "E-eu...?"
2002202-17 = "E-ei, você veio por algum motivo específico?"
2002202-18 = "Eu acabei de terminar o trabalho no Clube de Merenda, estou toda suada..."
2002202-19 = "Meu cabelo está bagunçado, eu deveria pelo menos ter me trocado... e além disso..."
2002202-20 = "[s] \"Eu só queria recompensar a Fuuka por todo o seu esforço.\""
2002202-21 = "Hã...!?"
2002202-22 = "N-não, eu agradeço o sentimento, mas, bem...!"
2002202-23 = "Ah, meu Deus, o que eu faço... o que eu deveria fazer...!?"
2002202-24 = "[s] \"T-tá tudo bem. Acalme-se, Fuuka.\""
2002202-26 = "Sensei, da próxima vez, por favor, me avise antes... é pelo bem do meu coração..."
2002202-27 = "Hã, você queria me surpreender...?"
2002202-28 = "Poxa... Sensei, você gosta de ser maldoso às vezes."
2002202-29 = "Depois disso? Não, não tenho planos específicos, mas..."
2002202-30 = "[s] \"Então, que tal darmos uma volta na cidade?\""
2002202-31 = "H-hã!?"
2002202-35 = "I-isso seria, por acaso, um encontro...? E eu estou com essa roupa comum...!"
2002202-36 = "Ai, ai, por causa dessa roupa de sempre, nessas horas eu fico assim...!"
2002202-37 = "[s] \"Ah, se estiver cansada, não precisa se forçar--\""
2002202-38 = "N-não! É só que, sobre a minha roupa..."
2002202-39 = "Você diz que não preciso me preocupar com isso? Ah..."
2002202-40 = "B-bem, então... eu adoraria...!"
2002202-42 = "Centro da cidade"
2002202-43 = "(Vim para o centro da cidade com a Fuuka)"
2002202-48 = "Nossa, quanta gente..."
2002202-49 = "Como é essa época do ano, talvez seja normal..."
2002202-50 = "Pensando bem, eu só costumo ir ao supermercado grande por causa do trabalho no Clube de Merenda..."
2002202-51 = "Acho que não tenho saído muito ultimamente."
2002202-52 = "Será por isso...?"
2002202-53 = "Mesmo sendo uma paisagem que vejo sempre, parece algo novo."
2002202-54 = "[s] \"Que bom. Aliás, você está com fome?\""
2002202-55 = "Hã? Ah, sim!"
2002202-56 = "Falando nisso, hoje o horário foi reduzido por causa do feriado..."
2002202-57 = "Eu não como nada desde o almoço--"
2002202-62 = "N-não, isso é, bem...!"
2002202-63 = "[s] \"Estou com fome, vamos comer alguma coisa.\""
2002202-64 = "C-certo...!"
2002202-68 = "(Decidimos comer algo enquanto caminhamos com a Fuuka)"
2002202-70 = "Rua comercial"
2002202-75 = "Uau. Sensei, olhe só. Esse aspargo enrolado na carne!"
2002202-76 = "Tem vários tipos de cobertura. Alga, queijo, maionese..."
2002202-77 = "Qual você vai escolher, Sensei?"
2002202-79 = "Sensei, é um marzipã!"
2002202-80 = "Esse formato, será que é um porquinho...?"
2002202-81 = "A doçura na medida certa com o aroma de amêndoas é muito bom, né."
2002202-83 = "Ah, oliebollen!"
2002202-84 = "Você conhece, Sensei? É um doce feito com massa misturada com frutas..."
2002202-85 = "Recém-frito, fica especialmente delicioso!"
2002202-87 = "Ah, acabei comendo doces em sequência, não é..."
2002202-88 = "Ah, oden... chegou na hora certa."
2002202-89 = "Dizem que se ganharmos no pedra-papel-tesoura, ganhamos mais um ingrediente. Vamos lá!"
2002202-91 = "Estou cheia..."
2002202-92 = "[s] \"Acho que comemos um pouco demais...\""
2002202-93 = "Mas, graças a tudo o que comi, me veio uma inspiração."
2002202-94 = "O enroladinho de carne estava particularmente delicioso."
2002202-95 = "Como será que dá para reproduzir aquele molho levemente picante...?"
2002202-96 = "Acho que combinaria muito bem se servido com legumes refogados."
2002202-97 = "...? Você não esperava que eu pensasse no Clube da Merenda até aqui, é?"
2002202-98 = "Ahaha... será que é um hábito? Talvez seja uma espécie de deformação profissional."
2002202-99 = "[s] \"A Fuuka é muito esforçada.\""
2002202-100 = "Você acha...? Eu mesma não sei dizer ao certo..."
2002202-101 = "Acho que todo mundo tem algo que gosta, mesmo que as direções sejam diferentes..."
2002202-102 = "Não acho que eu seja especial, com certeza."
2002202-103 = "É só que, já que vou fazer, quero fazer com todo o meu esforço."
2002202-104 = "[ns] \"Eu queria que você descansasse um pouco, mas...\""
2002202-106 = "[ns] \"Será que fui intrometido?\""
2002202-107 = "N-não, de jeito nenhum! #nA culpa de eu ficar pensando nisso em qualquer lugar é minha...!"
2002202-108 = "Dizer que foi intromissão, não é nada disso..."
2002202-109 = "Como estamos no recesso de fim de ano, eu mesma acho que preciso mudar um pouco de ares...!"
2002202-110 = "[s] \"Entendi. Falando em fim de ano, já decidiu seu pedido para o Ano Novo?\""
2002202-111 = "Agora que você mencionou, eu ainda não tinha pensado nisso."
2002202-112 = "Hmm, o que será... se for para pedir algo seriamente..."
2002202-113 = "Se realmente pudesse se realizar..."
2002202-117 = "Eu tenho um, na verdade..."
2002202-118 = "Bem, só por um dia que seja... eu gostaria de viver um cotidiano tranquilo."
2002202-120 = "De verdade, do fundo do coração..."
