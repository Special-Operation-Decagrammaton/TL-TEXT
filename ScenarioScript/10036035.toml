[translation]
10036035-13 = "Próximo."
10036035-14 = "Não vou permitir que atrapalhem o festival."
10036035-16 = "Esses caras... eles não são comuns...!"
10036035-17 = "E-e agora? Vamos fugir?"
10036035-18 = "Não, temos que levar o DJ..."
10036035-20 = "Não vou deixar que façam isso."
10036035-22 = "Droga, recuar por enquanto!"
10036035-26 = "Ei, não me deixem para trás!"
10036035-31 = "……Acabou?"
10036035-36 = "Sim, confirmei a retirada dos inimigos..."
10036035-37 = "[s] \"Por que as delinquentes estavam aqui...\""
10036035-38 = "Quem sabe? Acho que só estavam fazendo barulho como sempre."
10036035-44 = "De qualquer forma, ainda bem que não levaram ele."
10036035-45 = "Ngh!"
10036035-46 = "Desculpe pela espera, DJ."
10036035-50 = "Puf!"
10036035-51 = "Então, continuando o assunto."
10036035-52 = "……Por que você me ajudou?"
10036035-53 = "Eu tinha certeza de que vocês eram inimigos..."
10036035-54 = "Não... foi apenas um pequeno mal-entendido."
10036035-55 = "Você estava agindo de forma desagradável enquanto preparava o palco, então eu só fiquei brava."
10036035-56 = "Você foi egocêntrico, arrogante e tratou mal as pessoas."
10036035-62 = "É, é isso mesmo... por favor, não faça mais coisas horríveis..."
10036035-63 = "Nada de exigências irracionais ou insultos."
10036035-64 = "É, você tem razão..."
10036035-65 = "Eu estava errado."
10036035-66 = "É verdade que, com a fama, acabei me deixando levar."
10036035-67 = "[s] \"Ele pediu desculpas tão fácil assim!?\""
10036035-68 = "Depois de passar por esse perigo, lembrei do motivo pelo qual quis ser DJ..."
10036035-69 = "Eu não quero passar por aquele sofrimento de novo..."
10036035-70 = "Certo, então pode ir."
10036035-71 = "Já chega?"
10036035-72 = "Sim, quero acreditar em você."
10036035-73 = "Não viemos aqui para brigar."
10036035-74 = "……Se a Atsuko diz isso."
10036035-75 = "Obrigado por me proteger daqueles caras, agradeço."
10036035-80 = "……Bem, acho que está resolvido."
10036035-81 = "Aquele cara deve cumprir a promessa."
10036035-84 = "Ufa..."
10036035-85 = "O próximo é a mesa de som."
10036035-89 = "Jomae-san!"
10036035-90 = "Você voltou. #nComo instruído, a configuração está――"
10036035-91 = "O-obrigada..."
10036035-92 = "A-ah, é verdade. Por que não descansa um pouco? #nVocê está trabalhando sem parar, não está?"
10036035-93 = "Tudo bem...?"
10036035-94 = "Você não é do tipo que se preocupa com os mínimos detalhes...?"
10036035-95 = "Aconteceu alguma coisa?"
10036035-96 = "É verdade, mas..."
10036035-97 = "Na verdade, agora pouco――"
10036035-101 = "[ns] \"DJ!\""
10036035-102 = "Hii, você é...!"
10036035-103 = "[s] \"Você não deveria descansar um pouco também, DJ?\""
10036035-104 = "C-c-certo!#nCom licença!"
10036035-108 = "Sensei, o que houve?"
10036035-109 = "Você está tão ofegante..."
10036035-110 = "[s3] \"Eu vi a Saori de longe e acabei vindo correndo.\"\n[s4] (Ainda bem que cheguei a tempo...!)"
10036035-113 = "Por acaso..."
10036035-114 = "Aconteceu alguma coisa com o pessoal!?"
10036035-115 = "[s] \"Está tudo bem, a Atsuko e os outros estão aproveitando o festival.\""
10036035-116 = "Entendo, fico aliviado então."
10036035-117 = "Pode esperar ansiosamente pelo palco do DJ no evento principal."
10036035-118 = "Eu também me esforcei bastante nos preparativos."
10036035-119 = "[s] \"Tem algo que eu possa fazer para ajudar?\""
10036035-120 = "Por enquanto..."
10036035-124 = "...Ah, desculpe.#nNão leve a mal!"
