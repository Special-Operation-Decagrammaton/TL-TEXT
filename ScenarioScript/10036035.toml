[translation]
10036035-13 = "次。"
10036035-14 = "お祭りの邪魔は、許さない。"
10036035-16 = "こいつら、タダ者じゃねぇ……！"
10036035-17 = "ど、どうするよ。逃げるか？"
10036035-18 = "いや、DJを連れて行かないと……。"
10036035-20 = "そうはさせない。"
10036035-22 = "くそっ、とりあえず撤退だ！"
10036035-26 = "お、置いていくな！"
10036035-31 = "……これで終わり？"
10036035-36 = "はい、敵の撤退を確認しました……。"
10036035-37 = "[s] \"どうしてスケバンが……。\""
10036035-38 = "さぁ？いつもみたいに騒いでるだけだと思うけど。"
10036035-44 = "とりあえず、こいつを連れて行かれなくて良かった。"
10036035-45 = "んぐっ！"
10036035-46 = "待たせてごめんね、DJさん。"
10036035-50 = "ぷはあっ！"
10036035-51 = "それで、話の続きだけど。"
10036035-52 = "……なぜ私を助けた？"
10036035-53 = "てっきり敵なんだとばっかり……。"
10036035-54 = "違う……ちょっとしたすれ違い。"
10036035-55 = "あなたがステージの準備中、#n嫌な態度を取ってたから怒っただけ。"
10036035-56 = "自己中心的だし、高圧的だし、人に当たりすぎ。"
10036035-62 = "そ、そうです……ひどいことは、もうしないでください……。"
10036035-63 = "理不尽な要求や暴言はダメ。"
10036035-64 = "そう、だな……。"
10036035-65 = "私が悪かった。"
10036035-66 = "人気が出て、調子に乗っていたのは事実だ。"
10036035-67 = "[s] \"すんなり謝るんだ！？\""
10036035-68 = "危ない目に遭って、DJを志した理由を思い出したんだ……。"
10036035-69 = "もう、あんな苦労は……。"
10036035-70 = "うん、じゃあ行って良いよ。"
10036035-71 = "もう良いの？"
10036035-72 = "うん、信じてあげたい。"
10036035-73 = "喧嘩をするために来たわけじゃないから。"
10036035-74 = "……アツコがそう言うなら。"
10036035-75 = "あいつらから守ってくれて助かった、感謝する。"
10036035-80 = "……とりあえず、解決かな。"
10036035-81 = "あの人は、約束を守ってくれるはず。"
10036035-84 = "ふぅ……。"
10036035-85 = "次は、ターンテーブルか。"
10036035-89 = "じょ[ruby=じょうまえ]、錠前さ[/ruby]ん！"
10036035-90 = "戻ってきたか。#n指示通り、セッティングは――"
10036035-91 = "あ、ありがとう……。"
10036035-92 = "そ、そうだ。少し休んだらどうだ？#nずっと働いてくれてるだろ？"
10036035-93 = "良いのか……？"
10036035-94 = "細かい部分にまで、こだわりがあるんじゃ……。"
10036035-95 = "何か、あったのか？"
10036035-96 = "それはそうなんだが……。"
10036035-97 = "実は、さっき――"
10036035-101 = "[ns] \"DJさん！\""
10036035-102 = "ひっ、あなたは……！"
10036035-103 = "[s] \"DJさんも少し休憩したらどうですか？\""
10036035-104 = "そそそ、そうですね！#n失礼します！"
10036035-108 = "先生、どうしたんだ？"
10036035-109 = "そんな息を切らして……。"
10036035-110 = "[s3] \"遠くからサオリを見かけて、つい。\"\n[s4] （ギリギリ間に合って良かった……！）"
10036035-113 = "もしかして……。"
10036035-114 = "みんなに何かあったのか！？"
10036035-115 = "[s] \"大丈夫、アツコたちはお祭りを楽しんでるよ。\""
10036035-116 = "そうか、なら安心だ。"
10036035-117 = "メインイベントのDJステージにも期待していてくれ。"
10036035-118 = "私も準備を頑張ってきたからな。"
10036035-119 = "[s] \"何かできることはないかな？\""
10036035-120 = "今のところは……。"
10036035-124 = "……あっ、すまない。#n気を悪くしないでくれ！"
