[translation]
63010-1 = "Episódio 1: Nosso ódio"
63010-3 = "Sinceramente... estou um pouco surpresa. #nQuem diria que o Sensei apareceria aqui em Porta-Pasis."
63010-4 = "[s] \"Quando um aluno desaparece de repente, é natural ir procurá-lo.\""
63010-5 = "...Você é muito prestativo, não é?"
63010-6 = "Não seria melhor simplesmente deixar para lá os alunos que somem sem dizer nada?"
63010-7 = "[s] \"...Se um aluno falta sem aviso, eu fico preocupado.\""
63010-8 = "...Para começar, não me lembro de ter pedido qualquer aula."
63010-9 = "[s1] \"Por que você acha que um aluno é um aluno?\"\n[s2] \"Eu acredito que eles são alunos porque frequentam a escola e estudam.\""
63010-14 = "[ns] \"Eles são alunos justamente porque aprendem.\""
63010-15 = "Mas isso é... um estudo definido pelos critérios do Sensei, não é?"
63010-16 = "Arius tem o seu próprio jeito de fazer as coisas."
63010-17 = "Você pretende negar a nossa vontade... e nos forçar a estudar o jeito da Trinity?"
63010-21 = "...Vai dizer que \"não tem essa intenção\"?"
63010-22 = "Fufu. Mesmo que não diga, eu entendo perfeitamente."
63010-23 = "A atual eu, bem... parece ter se tornado capaz de entender esse tipo de coisa."
63010-24 = "Pelo menos — sobre o que aconteceu na filial de Arius."
63010-25 = "Bem, deixando isso de lado. #nFilial de Arius. Eu não gosto muito desse nome."
63010-26 = "Afinal... isso implica que somos uma escola que pertence a algum lugar, não é?"
63010-27 = "Então, aqui vai uma pergunta."
63010-29 = "Por que, naquele dia —"
63010-39 = "Aquele dia em que a Trinity, pela primeira vez em centenas de anos... pisou em Arius sem permissão."
63010-40 = "Aquele dia em que Mika Misono, Beatrice e... o Esquadrão decidiram o nosso destino por conta própria."
63010-41 = "Aquele dia em que, na sombra disso... nós, as outras alunas de Arius, perdemos até a capacidade de escolher o nosso próprio caminho."
63010-43 = "Por que o Sensei... foi tão carinhoso com a Mika Misono e o Esquadrão, mas —"
63010-44 = "Não estendeu a mão da mesma forma para nós, as outras alunas de Arius?"
63010-46 = "[ns] \"Isso é...\""
63010-48 = "(Naquele momento, lembrei-me da conversa que tivemos logo após \"aquele dia\")"
63010-50 = "É muito doloroso dizer isso, mas —"
63010-51 = "Gostaria que o Sensei se afastasse dos assuntos da filial de Arius."
63010-52 = "Originalmente, este é um problema que a Trinity deve resolver por conta própria."
63010-53 = "Ainda assim... acabamos precisando da ajuda do Sensei, e não tenho palavras para expressar minha vergonha."
63010-54 = "Como representante temporária da facção Pater —"
63010-55 = "E como representante temporária da facção Sanctus —"
63010-59 = "Peço desculpas do fundo do meu coração."
63010-60 = "...Peço perdão novamente. Esqueci de explicar. #nA representante da facção Pater ainda é a Mika, mas —"
63010-61 = "Ela terá que se afastar da linha de frente por um tempo. #nComo o Sensei sabe, a audiência foi interrompida."
63010-62 = "O mesmo vale para a Seia."
63010-63 = "Embora ela tenha participado da batalha de defesa de Arius, ainda não está totalmente recuperada. #nEla planeja continuar em repouso por um tempo."
63010-64 = "Portanto, pode considerar as nossas palavras, como representantes temporárias, como o consenso das facções Pater e Sanctus."
63010-65 = "Ou talvez... a facção Filius, liderada pela Nagisa, possa ter uma opinião diferente."
63010-66 = "Mas as decisões do Tea Party são tomadas por maioria de votos."
63010-67 = "Sendo um assunto tão importante, as opiniões minoritárias deveriam ser respeitadas, mas... isso não é suficiente para anular a maioria."
63010-68 = "Por isso... Sensei. Por favor, apenas observe o nosso futuro."
63010-69 = "Deixe-nos resolver os nossos problemas por conta própria."
63010-70 = "Claro, se o Sensei agisse —"
63010-71 = "Talvez tudo fosse resolvido muito mais rápido e de uma forma melhor."
63010-72 = "Mas, se dependermos totalmente dos adultos... as alunas perderão a oportunidade de crescer."
63010-74 = "...Então era isso."
63010-78 = "[ns] \"!?\""
63010-79 = "Fufu, não fique tão surpreso."
63010-80 = "Eu não disse que entendia mais ou menos?"
63010-81 = "Mas... o Sensei não está confiando um pouco demais?#nNos alunos — e, além disso, na alta cúpula da Trinity."
63010-82 = "Os representantes temporários das facções Sanctus e Pater, respectivamente."
63010-83 = "Alunos que assumiram esses cargos assim que os representantes deixaram suas funções."
63010-84 = "Você realmente acha que eles conseguiram fazer isso sem nenhum apoio por trás?"
63010-85 = "Aquele lugar é... um ambiente onde, a qualquer momento, as pessoas estão prontas para passar a perna umas nas outras."
63010-87 = "De qualquer forma, eu entendi. Se as circunstâncias são essas, o Sensei não tem uma grande responsabilidade —#nna verdade, talvez nem tenha responsabilidade alguma."
63010-88 = "Bem, o fato de que, desde aquele dia, Arius continuou no meio do inferno não mudou."
63010-89 = "[s] \"……。\""
63010-90 = "Acho que seria melhor ter cuidado daqui para frente."
63010-91 = "Na posição do Sensei, mesmo que houvesse alunos se aproximando com más intenções...#nseria difícil escapar dessas armadilhas, não é?"
63010-92 = "Na verdade, o Sensei deixou isso passar despercebido."
63010-93 = "Uma criança que restou em Arius, reunindo coragem para dar um passo no mundo exterior —"
63010-94 = "Pode acabar não se adaptando a lugar nenhum, incapaz de suportar os olhares ao redor... e, no fim, desistir, pensando que \"Arius só pode viver do jeito de Arius\"."
63010-95 = "Que não há lugar para Arius em nenhum lugar deste mundo.#nFerida profundamente, ela pode ser forçada a voltar para Arius."
63010-96 = "Eu deixei passar essa possibilidade."
63010-97 = "Como resultado da escolha de — pasmem — confiar na alta cúpula da Trinity.#n...Há algo de errado nisso?"
63010-98 = "Ou será que... você estava tão ocupado com outras escolas que#nnem sequer pensou em Arius desde o início?"
63010-99 = "[s] \"……。\""
63010-100 = "O presente é uma construção baseada no passado.#nTodo passado não é irrelevante para o presente."
63010-101 = "...Passado é passado. O ódio do passado não tem relação com quem vive o presente. Algumas pessoas diriam isso."
63010-102 = "Mas eu, de forma alguma, posso concordar com essa opinião."
63010-103 = "Como resultado do passado, existe o Arius de hoje...#ne agora, neste momento, Arius está amarrado e acorrentado."
63010-105 = "O Sensei disse, não disse?"
63010-106 = "Que alunos são aqueles que frequentam a escola e estudam."
63010-107 = "Sendo assim, eu responderei desta forma."
63010-109 = "Porta Pacis — tudo o que está registrado aqui é o nosso \"estudo\"."
63010-110 = "Se o dever principal de um aluno é \"estudar\"... então acho que agi corretamente."
63010-111 = "Pois vim até aqui para cumprir esse dever."
63010-112 = "Se o Sensei disser: \"Isso não é estudo\"."
63010-113 = "Eu gostaria de perguntar:#nÉ a postura de um educador fazer distinções ou julgar o que é um estudo superior ou inferior?"
63010-115 = "O castigo é algo que é herdado."
63010-116 = "Apenas esse fato — todos devem reconhecer."
63010-118 = "Desfrutar apenas dos \"benefícios\" do passado e não carregar o \"castigo\".#n...Isso não pode ser permitido."
63010-119 = "Se dizem que não vão carregar o \"castigo\", então tudo o que o passado deixou —"
63010-120 = "Conhecimento, sabedoria, bens, todos os direitos e poderes também — deveriam ser recusados, assim como o \"castigo\"."
63010-121 = "...Escolher apenas o que quer?"
63010-122 = "Para nós de Arius, isso não passa de uma arrogância que causa náuseas."
63010-125 = "Naquele dia, o Sensei decidiu respeitar os métodos da Trinity...#ne por isso, não interferiu em Arius."
63010-126 = "Eu não perdoo um Sensei assim.#nPorque não posso perdoar alguém que não tem pecados."
63010-127 = "Mas, em troca... quero que reconheçam a liberdade de Arius de viver do \"jeito de Arius\"."
63010-128 = "Assim como a Trinity tinha os métodos da Trinity."
63010-129 = "Você não vai dizer que respeita um lado e não reconhece o outro, vai?"
63010-130 = "[s] \"……。\""
63010-131 = "Nós de Arius... não nos adaptamos."
63010-132 = "O mundo exterior pode ser atraente.#nMas não havia lugar para nós de Arius lá."
63010-133 = "Na verdade, há muitas crianças que voltaram por não conseguirem se adaptar."
63010-134 = "Por isso, eu as acolhi e mostrei o caminho a seguir do jeito de Arius."
63010-135 = "Não precisamos de exames nem de estudos.#nNós de Arius viveremos do jeito de Arius."
63010-136 = "Por isso... eu lhe peço."
63010-137 = "Leve o esquadrão e vá embora de Arius."
63010-138 = "Se fizer isso, prometo que nunca farei mal a você, Sensei, ou ao esquadrão."
63010-139 = "Quanto aos \"Anjos do Apocalipse\"..."
63010-140 = "……"
63010-141 = "Nós cuidaremos disso por aqui."
63010-142 = "Pelo menos, eu posso garantir que lidarei com o \"Anjo Trombetista\"."
63010-143 = "[s] \"O 'Anjo Trombetista'... ?\""
63010-144 = "Ora, ao ouvir esse nome, você também tem alguma ideia do que seja, Sensei?"
63010-145 = "Como esperado. Quando se trata de seus alunos, você é muito perspicaz."
63010-146 = "Sendo assim, acredito que também entenderá o nosso desejo."
63010-147 = "[s] \"……\""
63010-151 = "Vamos, a saída é por ali."
63010-152 = "E as integrantes do esquadrão que estão esperando atrás, venham também."
63010-156 = "E então..."
63010-157 = "Nunca mais visitem este lugar."
63010-158 = "……Até aqui, bom trabalho."
63010-162 = "Subaru. Você disse que esse era o jeito de Arius, não foi?"
63010-166 = "……Saori."
63010-167 = "Se tem algo que esqueceu de dizer, pode falar."
63010-168 = "Seria um incômodo se usasse isso como desculpa para voltar."
63010-169 = "Não é algo que eu esqueci de dizer... Há uma coisa que eu quero perguntar."
63010-170 = "Esse jeito de Arius que você mencionou..."
63010-174 = "O que existe... no fim dele?"
63010-175 = "……!"
63010-177 = "Próximo episódio: Mesmo assim"
