[translation]
33095-2 = "Haa, haa... haa..."
33095-3 = "Ugh..."
33095-7 = "[ns] \"Hina!!\""
33095-12 = "A presidente do Comitê de Disciplina de Gehenna finalmente caiu."
33095-13 = "Fi-finalmente...? Deve ter doído muito, como ela conseguiu chegar até aqui com esse ferimento..."
33095-14 = "..."
33095-15 = "As figuras principais de Trinity e Gehenna foram eliminadas. Só resta você, Sensei do Schale."
33095-16 = "[s] \"...Vocês são o Esquadrão Arius?\""
33095-17 = "..."
33095-18 = "Huu..."
33095-19 = "Ehehe..."
33095-20 = "..."
33095-24 = "...Ah, sim. Nós somos o \"Esquadrão Arius\". Finalmente nos encontramos, Sensei."
33095-25 = "[s] \"...!\""
33095-26 = "Ouvi dizer que a Azusa esteve sob seus cuidados. Planejo ir vê-la agora mesmo."
33095-27 = "...Nós, em nome de Trinity, assinamos o tratado nesta \"Antiga Basílica da Penitência\"."
33095-28 = "..."
33095-29 = "[s] \"...O que isso significa?\""
33095-30 = "Significa que nós, o \"Esquadrão Arius\", nos tornamos a nova força armada que protege o tratado em nome do paraíso... a \"Organização do Tratado do Éden\"."
33095-31 = "[s] \"!?\""
33095-32 = "Isso era originalmente nosso dever. Por direito, era um privilégio que deveríamos ter exercido desde a Primeira Conferência Geral."
33095-33 = "Mas Trinity pisoteou isso. Eles nos definiram como a causa dos conflitos, ou seja, como \"alvos de supressão\", e nos oprimiram impiedosamente."
33095-34 = "...De agora em diante, o \"Esquadrão Arius\" exercerá sua autoridade como Organização do Tratado do Éden e redefinirá os \"alvos de supressão\"."
33095-35 = "Gehenna e Trinity. Essas duas escolas são os elementos de conflito que violam o Tratado do Éden e são alvos de supressão que devem ser eliminados."
33095-36 = "[s] \"Isso significa que...\""
33095-37 = "Apagaremos Trinity e Gehenna de Kivotos. Literalmente."
33095-44 = "...Junto com os guardiões dos preceitos deste tratado."
33095-45 = "Vocês confirmarão o ressentimento acumulado por centenas de anos desde a Primeira Conferência Geral... a nossa vingança."
33095-46 = "...Mas antes disso, vamos cuidar de você."
33095-50 = "[ns] \"(O cano da arma...)\""
33095-51 = "Sensei do Schale... Ela disse que você seria o maior obstáculo para o plano."
33095-54 = "Aaaaaaaah!!!"
33095-60 = "...! Você ainda consegue se mover, Hina Sorasaki!"
33095-61 = "Sena! Aqui!!"
33095-65 = "Uma ambulância...!?"
33095-74 = "Sensei! Dê-me a mão!"
33095-78 = "Não vou deixar você escapar!!"
33095-82 = "Vo-você ainda tem tanta força assim..."
33095-89 = "...Eles escaparam."
33095-90 = "Bem, não importa. Fomos atrapalhados por Hina Sorasaki, mas a bala atingiu o alvo."
33095-91 = "Ele é alguém de fora de Kivotos. O halo deve quebrar... ou melhor, ele deveria morrer."
33095-92 = "Mas, vendo aquela cena... aquele Sensei é uma existência tão importante assim?"
33095-93 = "..."
33095-94 = "\"Se aquela pessoa não estivesse lá, tudo teria saído conforme o plano\"...? É, é isso mesmo, Hime-chan? Ah, \"e a Azusa também certamente...\"?"
33095-95 = "..."
33095-98 = "[ns] \"(Minha barriga está quente...)\""
33095-99 = "Ouça com atenção, Sensei, você foi baleado."
33095-100 = "Milagrosamente, os órgãos vitais foram poupados, mas não posso ignorar esse sangramento."
33095-101 = "Vou começar os primeiros socorros agora. Se doer, pode gritar."
33095-102 = "Não vou deixar você morrer. Afinal, eu sou do Departamento de Medicina de Emergência."
33095-106 = "[ns] \"（Minha consciência está... nublada...）\""
33095-108 = "……。"
33095-109 = "……Então você aparece aqui."
33095-110 = "Quem diria que você daria as caras... Você poderia ter simplesmente fugido."
33095-111 = "Hehe, faz tempo, não é..."
33095-117 = "Haah, haah, haah……."
33095-118 = "……Como se sente, Azusa?"
33095-119 = "Por que, por que..."
33095-120 = "Eu não disse? Não há lugar para você, nem na Trinity, nem no Schale."
33095-121 = "Não existe lugar neste mundo que aceite pessoas como nós, que somos \"assassinas\"."
33095-122 = "Por que você fez isso com o Sensei...!"
33095-123 = "Mesmo que pareça existir um lugar assim, tudo desaparece como uma ilusão... exatamente como aquele tal de \"Sensei\"."
33095-124 = "……Tudo é inútil. Então por que você continua lutando, Shirasu Azusa?"
33095-125 = "SAORI!!!!"
33095-132 = "Ainda está embriagada por um sonho doce... Não tem jeito, vou te ajudar."
33095-133 = "Vou te fazer acordar desse sonho, quantas vezes forem necessárias."
33095-134 = "Venha."
33095-138 = "[ns] \"Onde é que estou...\""
33095-139 = "……Prazer em conhecê-lo, Sensei."
33095-140 = "Meu nome é Yurizono Seia."
33095-141 = "E este lugar é o seu sonho... ou talvez, o meu sonho."
33095-142 = "[s] \"Seia...\""
33095-143 = "Opa, será que não é um \"prazer em conhecê-lo\"?"
33095-144 = "Peço perdão. Para mim, neste momento, o fluxo do tempo está um pouco distorcido."
33095-145 = "Mas Sensei, o que importa não é isso, e sim o fato de que você e eu estamos nos encontrando aqui."
33095-150 = "Muito bem... então, vamos começar a desvendar esta história."
33095-152 = "Próximo episódio: Mentiras Doces"
