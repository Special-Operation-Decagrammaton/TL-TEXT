[translation]
33095-2 = "Haa, haa…… haa……"
33095-3 = "Gh……"
33095-7 = "[ns] \"Hina!!\""
33095-12 = "A presidente do Comitê Disciplinar de Gehenna enfim caiu."
33095-13 = "E-enfim, né…… deve ter doído, né; como é que, com aqueles ferimentos, ela chegou até aqui……."
33095-14 = "……."
33095-15 = "As figuras principais de Trinity e Gehenna foram todas despachadas. Agora só resta você, Sensei da Schale."
33095-16 = "[s] \"……Vocês são o Squad de Arius?\""
33095-17 = "……."
33095-18 = "Ufa……."
33095-19 = "Ehehe……."
33095-20 = "……."
33095-24 = "……Sim, isso mesmo. Nós somos o \"Squad de Arius\". Enfim nos encontramos, Sensei."
33095-25 = "[s] \"……!\""
33095-26 = "Ouvi dizer que você cuidou da Azusa. Ela, eu já vou visitar daqui a pouco."
33095-27 = "……Nós, no lugar de Trinity, assinamos o tratado nesta \"Antiga Catedral da Comunhão\"."
33095-28 = "……."
33095-29 = "[s] \"……O que isso quer dizer?\""
33095-30 = "Quer dizer que nós, o \"Squad de Arius\", nos tornamos o novo grupo militar que guarda o tratado em nome do paraíso…… a \"Organização do Tratado do Éden\"."
33095-31 = "[s] \"!?\""
33095-32 = "Isto era, de origem, o nosso dever. Um direito natural que, no Primeiro Concílio, já deveria ter sido exercido por nós."
33095-33 = "Mas Trinity o pisoteou. Definiu-nos como a causa dos conflitos, ou seja, como \"alvo de supressão\", e nos reprimiu por completo."
33095-34 = "……De agora em diante, o \"Squad de Arius\" exerce a autoridade da Organização do Tratado do Éden e redefine o \"alvo de supressão\"."
33095-35 = "Gehenna, e Trinity. São justamente essas duas academias o elemento de conflito que contraria o Tratado do Éden, o alvo de supressão a ser eliminado."
33095-36 = "[s] \"Isso quer dizer, então……\""
33095-37 = "Apagar Trinity e Gehenna de Kivotos. Literalmente."
33095-44 = "……Junto com os guardiões dos preceitos deste tratado."
33095-45 = "Vocês vão constatar o rancor acumulado por séculos desde o Primeiro Concílio…… o nosso ódio."
33095-46 = "……Mas, antes disso, vamos processar você."
33095-50 = "[ns] \"（O cano da arma……）\""
33095-51 = "Sensei da Schale…… porque ela disse que você seria o maior obstáculo do plano."
33095-54 = "Aaaaaah!!!"
33095-60 = "……Gh! Ainda consegue se mexer, Hina Sorasaki!"
33095-61 = "Sena! Aqui!!"
33095-65 = "Uma ambulância……!?"
33095-74 = "Sensei! A mão!"
33095-78 = "Não vão escapar!!"
33095-82 = "A-ainda tem essa força……."
33095-89 = "……Escaparam."
33095-90 = "Bom, tanto faz. A Hina Sorasaki atrapalhou, mas a bala acertou."
33095-91 = "Aquele é alguém de fora de Kivotos. A aureola quebra…… não; ele deve morrer."
33095-92 = "Mas, aquela cena…… aquele Sensei é uma existência tão importante assim?"
33095-93 = "……."
33095-94 = "\"Se não fosse aquela pessoa, tudo teria saído conforme o plano\"……? É-é isso, Hime? Hã, \"e a Azusa também, com certeza\"……?"
33095-95 = "……."
33095-98 = "[ns] \"（Minha barriga queima……）\""
33095-99 = "Escute bem, Sensei: o senhor foi baleado."
33095-100 = "Milagrosamente, escapou dos pontos vitais, mas este sangramento não pode ser ignorado."
33095-101 = "Vou iniciar os primeiros socorros. Se doer, pode gritar."
33095-102 = "Não vou deixar o senhor morrer. Afinal, eu sou do Departamento de Medicina de Emergência."
33095-106 = "[ns] \"（A consciência, enevoada……）\""
33095-108 = "……."
33095-109 = "……Então é aqui que você aparece."
33095-110 = "Quem diria que você fosse dar as caras…… podia ter fugido direto, viu."
33095-111 = "Ehehe, há quanto tempo, né……"
33095-117 = "Haa, haa, haa……."
33095-118 = "……E aí, Azusa?"
33095-119 = "Por que, por quê……"
33095-120 = "Foi exatamente como eu disse, não foi? Nem em Trinity, nem na Schale; não há lugar pra você."
33095-121 = "Um lugar que acolha \"assassinas\" como nós não existe neste mundo."
33095-122 = "Por que, o Sensei……!"
33095-123 = "Mesmo que pareça existir um lugar assim, tudo se desfaz num sopro…… como aquele tal de \"Sensei\" de agora há pouco."
33095-124 = "……Tudo é inútil. E, mesmo assim, por que você luta, Azusa Shirasu?"
33095-125 = "Saoriii!!!!"
33095-132 = "Ainda embriagada num sonho doce…… não tem jeito, deixa eu te ajudar."
33095-133 = "Quantas vezes for preciso, eu te acordo desse sonho."
33095-134 = "Vem."
33095-138 = "[ns] \"Onde é…… isto.\""
33095-139 = "……Primeira vez, será, Sensei?"
33095-140 = "O meu nome é Seia Yurizono."
33095-141 = "E aqui é dentro do seu sonho…… ou, quem sabe, dentro do meu."
33095-142 = "[s] \"Seia……\""
33095-143 = "Opa; será que, no fim, não é a \"primeira vez\"?"
33095-144 = "Perdão. Pra mim, agora, o fluxo do tempo está um tantinho torcido."
33095-145 = "Mas, Sensei, o importante não é isso, e sim que eu e você estamos podendo nos encontrar assim."
33095-150 = "Muito bem…… então, vamos desenrolar a história."
33095-152 = "Próximo Episódio;A Doce Mentira"
