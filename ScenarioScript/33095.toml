[translation]
33095-2 = "*Haa, haa... haa...*"
33095-3 = "Guh..."
33095-7 = "[ns] \"Hina!!\""
33095-12 = "A Presidente do Comitê Disciplinar de Gehenna finalmente caiu."
33095-13 = "F-Finalmente...? Deve ter doído muito, como ela conseguiu chegar até aqui com esse ferimento..."
33095-14 = "......"
33095-15 = "As figuras principais da Trinity e de Gehenna já foram eliminadas. Só resta você, Sensei da Schale."
33095-16 = "[s] \"...Vocês são o Esquadrão Arius?\""
33095-17 = "......"
33095-18 = "Ufa......"
33095-19 = "Ehehe......"
33095-20 = "......"
33095-24 = "......Ah, é isso mesmo. Nós somos o 'Esquadrão Arius'. Finalmente nos encontramos, Sensei."
33095-25 = "[s] \"......!\""
33095-26 = "Ouvi dizer que a Azusa esteve sob seus cuidados. Pretendo ir vê-la agora mesmo."
33095-27 = "......Nós assinamos o tratado no 'Antigo Tabernáculo da Comunhão' no lugar da Trinity."
33095-28 = "......"
33095-29 = "[s] \"...O que isso significa?\""
33095-30 = "Significa que nós, o 'Esquadrão Arius', nos tornamos o novo grupo armado que protege o tratado em nome do Paraíso... a 'Organização do Tratado do Éden'."
33095-31 = "[s] \"!?\""
33095-32 = "Isso era originalmente nossa obrigação. Por direito, era o privilégio que deveríamos ter exercido desde o Primeiro Concílio."
33095-33 = "Mas a Trinity pisou nisso. Eles nos definiram como a causa do conflito, ou seja, como um 'alvo de supressão', e nos oprimiram sistematicamente."
33095-34 = "......De agora em diante, o 'Esquadrão Arius' exercerá a autoridade como Organização do Tratado do Éden e redefinirá os 'alvos de supressão'."
33095-35 = "Gehenna e Trinity. Essas duas academias são os elementos de conflito que violam o Tratado do Éden e devem ser eliminadas."
33095-36 = "[s] \"Isso significa que...\""
33095-37 = "Vamos apagar Trinity e Gehenna de Kivotos. Literalmente."
33095-44 = "......Junto com os guardiões dos mandamentos deste tratado."
33095-45 = "Vocês vão confirmar o ressentimento... o nosso ódio, que vem se acumulando por centenas de anos desde o Primeiro Concílio."
33095-46 = "......Mas antes disso, acho que vou cuidar de você."
33095-50 = "[ns] \"(A boca da arma...)\""
33095-51 = "Sensei da Schale... ela disse que você provavelmente seria o maior obstáculo para o plano."
33095-54 = "Aaaaaaaah!!!"
33095-60 = "......! Você ainda consegue se mover, Hina Sorasaki!"
33095-61 = "Sena! Por aqui!!"
33095-65 = "Uma ambulância...!?"
33095-74 = "Sensei! Dê-me a mão!"
33095-78 = "Não vou deixar vocês escaparem!!"
33095-82 = "V-Você ainda tem forças para isso..."
33095-89 = "......Eles escaparam."
33095-90 = "Bom, não importa. Fui atrapalhada pela Hina Sorasaki, mas a bala atingiu."
33095-91 = "Aquilo é algo de fora de Kivotos. O halo deve ter sido destruído... não, ele vai morrer."
33095-92 = "Mas, vendo aquela reação... esse Sensei é uma existência tão importante assim?"
33095-93 = "......"
33095-94 = "'Se aquele homem não estivesse lá, tudo teria saído como planejado'...? S-Sério, Princesa? Ei, 'e a Azusa com certeza também...'?"
33095-95 = "......"
33095-98 = "[ns] \"(Minha barriga está queimando...)\""
33095-99 = "Por favor, preste atenção, Sensei. Você foi baleado."
33095-100 = "Milagrosamente, não atingiu nenhum ponto vital, mas não posso ignorar esse sangramento."
33095-101 = "Vou começar os primeiros socorros agora. Se doer, por favor, pode gritar."
33095-102 = "Não vou deixar você morrer. Afinal, eu sou do Departamento de Medicina de Emergência."
33095-106 = "[ns] \"(Minha consciência está ficando nublada...)\""
33095-108 = "......"
33095-109 = "......Então você apareceu."
33095-110 = "Não acredito que você deu as caras... Podia ter fugido enquanto dava tempo."
33095-111 = "Ehehe, faz tempo, não é..."
33095-117 = "*Haa, haa, haa*..."
33095-118 = "......Como é, Azusa?"
33095-119 = "Por que, por que..."
33095-120 = "Eu não disse? Não existe lugar para você na Trinity, nem na Schale."
33095-121 = "Não existe lugar neste mundo que aceite pessoas como nós, 'assassinas'."
33095-122 = "Por que você fez isso com o Sensei...!?"
33095-123 = "Mesmo que pareça existir um lugar assim, tudo desaparece como uma ilusão... exatamente como esse tal de 'Sensei' agora pouco."
33095-124 = "......Tudo é em vão. Por que você ainda insiste em lutar, Azusa Shirasu?"
33095-125 = "Saoriiiiiiiiii!!!!"
33095-132 = "Você ainda está bêbada de sonhos ingênuos... não tem jeito, vou te ajudar."
33095-133 = "Vou te acordar desse sonho quantas vezes for preciso."
33095-134 = "Venha."
33095-138 = "[ns] \"Onde é que...\""
33095-139 = "......É um prazer te conhecer, Sensei."
33095-140 = "Meu nome é Seia Yurizono."
33095-141 = "E aqui é dentro do seu sonho... ou talvez dentro do meu."
33095-142 = "[s] \"Seia...\""
33095-143 = "Ops, será que não é um 'prazer te conhecer'?"
33095-144 = "Perdoe-me. Para a mim de agora, o fluxo do tempo está um pouco distorcido."
33095-145 = "Mas Sensei, o importante não é isso, e sim o fato de que você e eu estamos nos encontrando assim."
33095-150 = "Bem... então, vamos começar a desenrolar essa história."
33095-152 = "Próximo Episódio; Doce Mentira"