[translation]
10042005-1 = "Prólogo; O feriado de alguém é o dia útil de outro"
10042005-2 = "Academia Gehenna - Pátio da Escola"
10042005-3 = "……."
10042005-4 = "Não acredito!!"
10042005-5 = "O trabalho no Departamento de Refeições está de folga...!"
10042005-6 = "É, é a realidade, né...?"
10042005-7 = "Espero que não seja um sonho...!"
10042005-11 = "Ai... é realidade mesmo..."
10042005-15 = "Finalmente uma folga... ah! Preciso avisar o Sensei."
10042005-16 = "Será que recebi uma resposta da mensagem que mandei ontem, dizendo que talvez eu tivesse folga...?"
10042005-17 = "Deixa eu dar uma olhada..."
10042005-18 = "“Parabéns pela folga!”"
10042005-19 = "“Aproveite para descansar um pouco hoje.”"
10042005-20 = "“Espero que você aproveite ao máximo fazendo o que quiser.”"
10042005-21 = "……O Sensei é mesmo gentil."
10042005-22 = "Mas, falando em aproveitar, o que eu deveria fazer...?"
10042005-23 = "……Hmm."
10042005-24 = "Será que tem algo interessante se eu sair?"
10042005-25 = "Já que estou de folga, vou visitar lugares que não costumo ir."
10042005-26 = "Ah? Senpai, bom dia!"
10042005-27 = "Bom dia! Escuta, Juri, acabei de receber uma mensagem do Sensei me parabenizando pela folga."
10042005-28 = "Uau, sério? Que bom, Senpai!"
10042005-29 = "Ah? Juri, você estava fazendo algum bico?"
10042005-30 = "Na verdade, comecei a trabalhar como garçonete em um café aqui perto."
10042005-31 = "No seu dia de folga...?"
10042005-32 = "Eu acho que você deveria descansar, Juri...?"
10042005-33 = "Não se preocupe, Senpai. Eu gosto desse trabalho."
10042005-34 = "Mesmo eu não sendo boa na cozinha, servir os pratos me faz sentir como se estivessem saboreando algo que eu mesma fiz..."
10042005-35 = "Eu me sinto muito feliz!"
10042005-36 = "Juri……."
10042005-37 = "Entendi... então, estarei torcendo por você."
10042005-38 = "Obrigada! Aliás, para onde a Senpai vai?"
10042005-39 = "Hmm, não decidi para onde ir ainda."
10042005-40 = "Só saí de casa por sair. Não é sempre que tenho um dia assim..."
10042005-41 = "Tenho várias opções em mente. Shopping, estádio, museu... ah, talvez um karaokê também seja legal!"
10042005-42 = "Bem, não vou conseguir ir em todos."
10042005-43 = "Vou tentar visitar vários lugares enquanto tiver tempo."
10042005-44 = "Entendo..."
10042005-49 = "(Realmente, nunca vi a Fuuka-senpai descansando...)"
10042005-54 = "Estarei torcendo secretamente para que hoje seja o melhor dia de folga da sua vida!"
10042005-55 = "Obrigada, Juri, bom trabalho no seu bico também."
10042005-56 = "Sim! Vá com cuidado, Senpai!"
10042005-57 = "Estou indo!"
10042005-61 = "Eu também preciso ir. Hoje, tenho que garantir que não vou depender da Senpai para nada."
10042005-62 = "Não importa o que aconteça, vou resolver tudo sozinha! Observe, Fuuka-senpai!"
10042005-64 = "Café de Panquecas nos arredores de Gehenna"
10042005-66 = "Uma panqueca de morango. Ah, com cobertura de manteiga!"
10042005-67 = "Certo, pedido anotado!"
10042005-68 = "Para mim, uma panqueca de chocolate com cobertura de creme de café."
10042005-69 = "Com certeza. O que deseja para beber?"
10042005-70 = "Hmm... será que vai dar certo?"
10042005-71 = "Ei, que tal pedirmos o combo de bebida?"
10042005-72 = "（Vou seguir o manual aqui...）"
10042005-73 = "As panquecas são bem doces e a porção é grande, então..."
10042005-74 = "Se acompanhá-las com um chá ou café, ficarão ainda mais saborosas...#nO que acha, gostaria de experimentar?"
10042005-75 = "Hmm... então, vamos pedir?"
10042005-76 = "Não é uma boa ideia?#nAcho que seria mais gostoso intercalar com outro sabor."
10042005-77 = "Então, eu vou querer um chá."
10042005-78 = "Eu quero um café gelado!"
10042005-79 = "Sim, compreendido.#nAlém disso, temos um parfait por tempo limitado disponível."
10042005-80 = "Parfait..."
10042005-81 = "É delicioso.#nEu mesma costumo pedir quando venho aqui no meu tempo livre."
10042005-82 = "Então vamos pedir!#nDois, por favor!"
10042005-83 = "Compreendido, por favor, aguarde um momento!"
10042005-86 = "Foi um ótimo atendimento. Obrigado."
10042005-87 = "Sério?#nMuito obrigada, hehe..."
10042005-88 = "Sim. Quase queria que você trabalhasse como funcionária fixa, e não como temporária."
10042005-89 = "O-obrigada pelo elogio, mas eu também tenho meu trabalho no Clube de Merenda..."
10042005-90 = "É verdade... Eu já tinha ouvido boatos, mas o Clube de Merenda de Gehenna é incrível, hein."
10042005-91 = "É, é mesmo...?"
10042005-92 = "Preparar merenda para aquele tanto de gente todo dia... e ainda com tanto cuidado, né?#nE essa habilidade de atendimento... que desperdício."
10042005-93 = "M-muito obrigada!#nFico lisonjeada que pensem assim de nós..."
10042005-94 = "Ouvi dizer que às vezes aparecem monstros estranhos por lá...#nMas isso deve ser mentira, né?"
10042005-95 = "S-sim!#nC-c-claro que é!"
10042005-96 = "Bom, conto com você para o resto da tarde.#nGraças a você, as vendas de hoje estão indo muito bem!"
10042005-97 = "Se continuar assim..."
10042005-102 = "！?"
10042005-103 = "！?"
10042005-104 = "O que foi isso!?"
10042005-105 = "Veio do estoque...!"
10042005-107 = "Estoque do café"
10042005-108 = "P-pessoal, vocês estão bem!?"
10042005-109 = "U-ugh..."
10042005-110 = "Fui testar o maçarico novo para o crème brûlée e ele soltou fogo..."
10042005-111 = "...ugh."
10042005-112 = "Ela desmaiou!"
10042005-116 = "I-isso é um problema grave!"
10042005-117 = "Por que o maçarico explodiu!?"
10042005-118 = "Ih, droga... eu derrubei pólvora ali agorinha."
10042005-119 = "O quê!? Isso é perigoso!"
10042005-120 = "Precisa mesmo limpar?"
10042005-121 = "É óbvio que sim!!"
10042005-122 = "Ahaha, desculpinha."
10042005-123 = "Francamente... você deveria aprender com a Juri..."
10042005-124 = "A-ahaha..."
10042005-128 = "（Já que a cozinheira não pode se mexer, o que eu faço...）"
10042005-130 = "Com licença!#nAs panquecas que pedimos, ainda não saíram?"
10042005-131 = "Suco de toranja demora tanto assim para ficar pronto...?"
10042005-132 = "Mesmo que esteja cheio, não está demorando demais...?"
10042005-133 = "Pois é...#nVim por causa das recomendações, mas estou decepcionada."
10042005-136 = "G-Gerente!#nOs clientes estão reclamando...!"
10042005-137 = "O-O que eu devo fazer...?"
10042005-138 = "Juri, sinto muito... vou te dar um bônus, então—"
10042005-139 = "Por favor, faça panquecas!"
10042005-140 = "Hã!?"
10042005-141 = "(...Eu, fazer panquecas!?)"
10042005-142 = "D-Desculpe...!"
10042005-143 = "Eu não sei cozinhar!"
10042005-144 = "Como assim?#nVocê não é do Clube de Merenda?"
10042005-145 = "...!"
10042005-146 = "Sim, mas..."
10042005-147 = "A receita é simples.#nJá temos a massa pronta, é só assar."
10042005-148 = "Não tem muitos acompanhamentos... Por favor, eu te imploro!"
10042005-149 = "M-Mas..."
10042005-150 = "Não é uma questão de..."
10042005-151 = "...Sinto muito por te pressionar."
10042005-155 = "Já sei, você poderia chamar a presidente no lugar?#nA Fuuka Aikiyo, não é...?"
10042005-157 = "Hã!? A veterana Fuuka, você diz!?"
10042005-158 = "Como o Clube de Merenda está de folga hoje, ela não está no turno?"
10042005-159 = "Bem, eu presumo que ela também esteja de folga..."
10042005-160 = "Vou pagar o dobro... não, o triplo do salário por hora, será que ela não poderia nos dar uma mãozinha?"
10042005-161 = "!!!!"
10042005-162 = "(Chamar a veterana aqui?)"
10042005-164 = "(O pouco tempo de folga que ela tem...)"
10042005-165 = "(...Eu não posso atrapalhar ela.)"
10042005-166 = "(A veterana sempre se esforça tanto pelo Clube de Merenda...)"
10042005-168 = "(Então, pelo menos hoje...!)"
10042005-169 = "Se for difícil para você, Juri, eu mesmo posso entrar em contato..."
10042005-170 = "Gerente, eu farei isso!"
10042005-171 = "Hã...?"
10042005-173 = "Claro, seria uma grande ajuda se você pudesse fazer, mas..."
10042005-174 = "Tem certeza de que está tudo bem...?"
10042005-175 = "B-Bem... a veterana Fuuka tem planos hoje, então..."
10042005-176 = "Eu vou dar um jeito nisso!"
10042005-177 = "Talvez, até eu consiga...!"
10042005-178 = "É só assar, sabe...?"
10042005-179 = "Bem, se você puder fazer, seria de grande ajuda.#nObrigado, Juri."
10042005-181 = "Cozinha do Café"
10042005-182 = "P-Puxa..."
10042005-188 = "(Sinceramente, estou um pouco assustada...)"
10042005-189 = "(Não tinha problema falhar durante os treinos, mas...)"
10042005-190 = "(Desta vez é diferente. Minha comida vai ser servida aos clientes...)"
10042005-191 = "(Eu tenho vontade de aprender a cozinhar de verdade algum dia, mas...)"
10042005-192 = "Ei, quando as panquecas vão chegar...?"
10042005-196 = "Os ingredientes estão todos aqui..."
10042005-197 = "Na verdade... estou com medo."
10042005-198 = "Mas eu não posso atrapalhar a veterana!"
10042005-203 = "(Por favor)"
10042005-204 = "(Atenda às minhas preces)"
10042005-205 = "(...Só desta vez já basta)"
10042005-206 = "（Por favor, me ajude...）"
10042005-207 = "（Para que eu possa proteger o descanso do Senpai!）"
10042005-208 = "U-Ushimaki Juri!"
10042005-209 = "E-estou indo!!!"
10042005-214 = "Ué...?"
10042005-215 = "Surpreendentemente, não é tão ruim assim...?"
