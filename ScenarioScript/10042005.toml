[translation]
10042005-1 = "プロローグ;誰かの休日は誰かの平日"
10042005-2 = "ゲヘナ学園・校庭"
10042005-3 = "……。"
10042005-4 = "信じられない！！"
10042005-5 = "給食部の仕事がお休みだなんて……！"
10042005-6 = "げ、現実だよね……？"
10042005-7 = "どうか夢じゃありませんように……！"
10042005-11 = "痛っ……やっぱ現実だ……。"
10042005-15 = "ついにお休みが……あ！先生に伝えないと。"
10042005-16 = "昨日、もしかしたら休みになるかもって送ったメッセージの返信、きてるかな……。"
10042005-17 = "ちょっと見てみよ……。"
10042005-18 = "「お休みおめでとう！」"
10042005-19 = "「今日一日くらいは、ゆっくり遊んでね」"
10042005-20 = "「やりたいことを目一杯楽しんでほしいな」"
10042005-21 = "……やっぱり先生は優しいな。"
10042005-22 = "でも、遊ぶっていっても何すれば良いんだろう……。"
10042005-23 = "……うーん。"
10042005-24 = "外に出てみたら何かあるかな？"
10042005-25 = "せっかくだから、普段行かないところに行ってみよう。"
10042005-26 = "あれ？#n先輩、おはようございます！"
10042005-27 = "おはよう！聞いてジュリ、さっき先生からお休みおめでとうのメッセージをもらったの。"
10042005-28 = "わぁ、本当ですか？#n良かったですね！"
10042005-29 = "あれ？ジュリってバイトとかしてたっけ？"
10042005-30 = "実は、近くのカフェでウェイトレスをすることになったんです。"
10042005-31 = "せっかくのお休みの日に……？"
10042005-32 = "ジュリも休んだほうがいいと思うけど……？"
10042005-33 = "気にしないでください、先輩。#n私、このお仕事が楽しいんです。"
10042005-34 = "お料理がダメな私でも、料理を提供することで自分が作ったものを味わっていただけてる気持ちになれて……。"
10042005-35 = "私、とても幸せなんです！"
10042005-36 = "ジュリ……。"
10042005-37 = "そっか……じゃあ、応援してるね。"
10042005-38 = "ありがとうございます！#nところで、先輩はどちらに？"
10042005-39 = "うーん、行き先は特に決まってないの。"
10042005-40 = "とりあえず外に出てみた感じ。こういう日ってあんまりないし……。"
10042005-41 = "行き先の候補はたくさんあるんだけどね。#nショッピングモール、スタジアム、美術館……あ、カラオケとかもいいかも！"
10042005-42 = "まぁ、全部周ることはできないんだけど。"
10042005-43 = "時間の許す限り、色々行ってみるつもり。"
10042005-44 = "なるほど……。"
10042005-49 = "（たしかに、フウカ先輩が休んでいるところ、見たことありません……）"
10042005-54 = "今日が最高の休日になるよう、陰ながら応援していますね！"
10042005-55 = "うん、ジュリもバイト頑張ってね。"
10042005-56 = "はい！いってらっしゃい、先輩！"
10042005-57 = "いってきます！"
10042005-61 = "私もそろそろ行かないと。#n今日は、絶対に先輩を頼らないようにしなきゃ。"
10042005-62 = "何が起きようと必ず自分で解決してみせます！#n見ていてくださいね、フウカ先輩！"
10042005-64 = "ゲヘナ近郊のパンケーキカフェ"
10042005-66 = "イチゴパンケーキひとつ。#nあっ、バタートッピングで！"
10042005-67 = "はい、ご注文承りました！"
10042005-68 = "私はチョコパンケーキにコーヒークリームトッピングで。"
10042005-69 = "かしこまりました。#nお飲み物はどうされますか？"
10042005-70 = "うーん……大丈夫かな？"
10042005-71 = "えー、ドリンクセットにしない？"
10042005-72 = "（ここはマニュアル通りに……）"
10042005-73 = "パンケーキはとても甘く、量が多いので――"
10042005-74 = "紅茶かコーヒーをお供にすれば、さらに美味しく召し上がれるのですが……#nよろしければいかがでしょう？"
10042005-75 = "うーん……じゃあ、頼んでみる？"
10042005-76 = "良いんじゃない？#n別の味挟んだほうが美味しくなりそうだし。"
10042005-77 = "それじゃあ、私は紅茶で。"
10042005-78 = "私はアイスコーヒー！"
10042005-79 = "はい、かしこまりました。#nまた、当店では期間限定パフェもご用意しております。"
10042005-80 = "パフェ……。"
10042005-81 = "美味しいですよ。#n私もプライベートでよく注文するんです。"
10042005-82 = "じゃあ頼んじゃおうよ！#n2つお願いします！"
10042005-83 = "かしこまりました、少々お待ちください！"
10042005-86 = "良い接客だったよ。ありがとう。"
10042005-87 = "本当ですか？#nありがとうございます、えへへ……。"
10042005-88 = "ああ。臨時じゃなくてメインスタッフとして働いてほしいくらいだよ。"
10042005-89 = "お、お気持ちは嬉しいのですが、私には給食部のお仕事もありますので……。"
10042005-90 = "そうだよなぁ……いやぁ噂には聞いたことあったけど、ゲヘナの給食部はすごいんだね。"
10042005-91 = "そ、そんなに、ですか……？"
10042005-92 = "あの人数の給食を毎日……しかも丁寧に作ってるんだろう？#nそれにこの接客能力……惜しいなぁ。"
10042005-93 = "あ、ありがとうございます！#nそんな風に伝わっているなんて……恐縮です。"
10042005-94 = "たまに変なモンスターが出ることもあるって聞いたけど……#n流石にデマだよな？"
10042005-95 = "は、はい！#nも、もも、もちろんです！"
10042005-96 = "まぁ、午後もよろしく頼むよ。#nおかげで今日の売上も順調だ！"
10042005-97 = "このままいけば――"
10042005-102 = "！？"
10042005-103 = "！？"
10042005-104 = "一体何が！？"
10042005-105 = "倉庫からだ……！"
10042005-107 = "カフェの倉庫"
10042005-108 = "み、皆さん大丈夫ですか！？"
10042005-109 = "う、うぅ……。"
10042005-110 = "ブリュレ用のバーナーの新しいヤツ、火が出るか試したら……。"
10042005-111 = "……うっ。"
10042005-112 = "気絶してしまいました！"
10042005-116 = "こ、こりゃあ大変だ！"
10042005-117 = "どうしてバーナーで爆発が！？"
10042005-118 = "やば……さっき火薬こぼしちゃったんだよね。"
10042005-119 = "はぁ！？危ないだろう！"
10042005-120 = "やっぱ掃除しなきゃダメ？"
10042005-121 = "当たり前だろ！！"
10042005-122 = "あははっ、ごめんなさ～い。"
10042005-123 = "まったく……ジュリさんを見習ってほしいよ……。"
10042005-124 = "あ、あはは……。"
10042005-128 = "（調理師さんが動けない以上、どうすれば……）"
10042005-130 = "すいませ～ん！#n注文したパンケーキ、まだですか～？"
10042005-131 = "グレープフルーツジュースって、こんなに時間かかるっけ……？"
10042005-132 = "いくら混んでるからって、遅くない……？"
10042005-133 = "ほんと……。#n口コミ見て来たのに、ガッカリ。"
10042005-136 = "て、店長！#nお客様から不満の声が……！"
10042005-137 = "ど、どうすれば……。"
10042005-138 = "ジュリさん、すまない……臨時手当を出すから――"
10042005-139 = "頼む、パンケーキを作ってくれ！"
10042005-140 = "はい！？"
10042005-141 = "（……私が、パンケーキを！？）"
10042005-142 = "ご、ごめんなさい……！"
10042005-143 = "私、料理ができないんです！"
10042005-144 = "どういうことだ？#nジュリさんは給食部なんだろう？"
10042005-145 = "……！"
10042005-146 = "そう、ですが……。"
10042005-147 = "レシピは単純だ。#n生地もストックがあるから、後は焼くだけ。"
10042005-148 = "トッピングもそう多くない……頼む、この通り！"
10042005-149 = "で、ですが……。"
10042005-150 = "そういう問題では……。"
10042005-151 = "……無理を言ってすまなかったね。"
10042005-155 = "そうだ、代わりに部長さん呼んでもらえるかな？#n[ruby=あいきよ]愛清[/ruby]フウカさんだったか……？"
10042005-157 = "えっ！？フウカ先輩を、ですか！？"
10042005-158 = "今日は給食部が休みだからシフトに入ってくれてるんだろう？"
10042005-159 = "なら、彼女も休みだと思っているのだが……。"
10042005-160 = "時給は通常の2倍……いや3倍払うから、何とか力添えしてもらえないだろうか？"
10042005-161 = "！！！！"
10042005-162 = "（ここで、先輩を？）"
10042005-164 = "（ほとんどないお休みを……）"
10042005-165 = "（……邪魔するわけにはいきません）"
10042005-166 = "（先輩は、いつも給食部のために頑張ってくれてます……）"
10042005-168 = "（だから、せめて今日だけでも……！）"
10042005-169 = "ジュリさんが言いづらいなら、私から連絡しても……。"
10042005-170 = "店長、私がやりますっ！"
10042005-171 = "えっ……？"
10042005-173 = "もちろん、ジュリさんがやってくれるなら助かるが……。"
10042005-174 = "本当に大丈夫なのか……？"
10042005-175 = "え、えっと……フウカ先輩、今日はご予定があるので……。"
10042005-176 = "ここは私が何とかします！"
10042005-177 = "もしかしたら、私でも……！"
10042005-178 = "ただ焼くだけだよ……？"
10042005-179 = "まあ、お願いできるなら助かるよ。#nありがとう、ジュリさん。"
10042005-181 = "カフェのキッチン"
10042005-182 = "ふ、ふぅ……。"
10042005-188 = "（正直、ちょっと怖いです……）"
10042005-189 = "（いくら失敗しても練習なら問題ありませんでしたが……）"
10042005-190 = "（今回はそうもいきません。私の料理が、お客様の口に……）"
10042005-191 = "（いつか、ちゃんとした料理が作れるようになりたい気持ちはありますが……）"
10042005-192 = "ねえ、パンケーキいつ来るの……？"
10042005-196 = "食材は、すべて揃ってる……。"
10042005-197 = "本当は……怖いです。"
10042005-198 = "でも、先輩の邪魔をするわけにはいきません！"
10042005-203 = "（お願いします）"
10042005-204 = "（私の祈りを聞き届けてください）"
10042005-205 = "（……今回限りで構いません）"
10042005-206 = "（私を、助けてください……）"
10042005-207 = "（先輩のお休みを、守れるように！）"
10042005-208 = "う、[ruby=うしまき]牛牧[/ruby]ジュリ！"
10042005-209 = "い、いきます！！！"
10042005-214 = "あれ……？"
10042005-215 = "意外と、悪くないような……？"
10042005-217 = "#video;10042"
