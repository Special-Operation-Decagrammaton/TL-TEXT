[translation]
10034160-1 = "3日前：必滅者"
10034160-3 = "うっ……！"
10034160-4 = "……アイリ、どうしたの？"
10034160-5 = "だ、大丈夫。ちょっと肩が痛かっただけで……えへへ。"
10034160-6 = "大丈夫なわけないでしょ。疲れてるんじゃない？"
10034160-7 = "……はぁ、私も疲れたわ。ずっと同じ姿勢だとキツイわよね。"
10034160-9 = "ヨシミは普段運動してないからでしょ。"
10034160-10 = "余計なお世話！あんた人のこと言えんの！？"
10034160-11 = "全然平気だけど。"
10034160-12 = "ど、どうしてそんな体力あるわけ！？"
10034160-14 = "身のほど[ruby=わきま]を弁え[/ruby]たまえ、か弱き者たちよ！"
10034160-15 = "なにせ我々の体は、恐怖の怪猫キャスパリーグとは違って弱――"
10034160-22 = "それ！やめてって言ったよね！"
10034160-23 = "ひ、人は誰しも表現の自由を持ってて……！"
10034160-24 = "この権利は誰にも……"
10034160-28 = "のわっ！？"
10034160-41 = "……とりあえず始めようか、ヨシミちゃん。"
10034160-42 = "……うん。"
