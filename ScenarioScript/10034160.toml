[translation]
10034160-1 = "3 dias atrás: O Destruidor"
10034160-3 = "Ugh...!"
10034160-4 = "......Airi, o que houve?"
10034160-5 = "E-está tudo bem. É só que meu ombro doeu um pouco... hehe."
10034160-6 = "Não tem como estar tudo bem. Você não está cansada?"
10034160-7 = "......Ah, eu também estou cansada. Ficar na mesma posição por tanto tempo é difícil, né."
10034160-9 = "É porque você não se exercita normalmente, Yoshimi."
10034160-10 = "Não se meta! Como se você pudesse falar alguma coisa!?"
10034160-11 = "Eu estou perfeitamente bem."
10034160-12 = "C-como você tem tanta energia!?"
10034160-14 = "Conheçam o seu lugar, seres frágeis!"
10034160-15 = "Afinal, nossos corpos, ao contrário do terrível gato monstro Cath Palug, são fracos——"
10034160-22 = "Isso! Eu disse para parar com isso!"
10034160-23 = "A-as pessoas têm liberdade de expressão..."
10034160-24 = "Esse direito ninguém pode..."
10034160-28 = "Opa!?"
10034160-41 = "......De qualquer forma, vamos começar, Yoshimi-chan."
10034160-42 = "......Sim."
