[translation]
1002602-1 = "支援要請"
1002602-2 = "（適度に急いで、ネルの部屋を訪れた）"
1002602-8 = "（中にいたネルは、まだ着方が分からないまま変な怪物みたいになっていた）"
1002602-9 = "何だこれ意味わかんねぇ、誰だこんな服考えたやつ……。"
1002602-10 = "ん。"
1002602-11 = "ああ、来たか。"
1002602-12 = "[s] \"……？\""
1002602-13 = "……え？"
1002602-17 = "はぁっ！？先生！？"
1002602-18 = "何で！？どうして先生がここに！？"
1002602-19 = "いやおかしいだろ、何でいるんだよ！？"
1002602-20 = "……は？"
1002602-21 = "あたしが呼んだから？んなわけねーだろ！？"
1002602-22 = "[s1] \"写真も送ってくれたのに。\"\n[s2] モモトークの画面を見せる。"
1002602-28 = "いや嘘つけよ、騙されねーぞあたしは……。"
1002602-30 = "えぇ……。"
1002602-31 = "送ってんじゃん……。"
1002602-32 = "くっそまた宛先間違えた！？"
1002602-33 = "いや今回は色々見えにくかったせいで……！"
1002602-34 = "っていうか写真！消せ！なんだそれダセェ！！"
1002602-35 = "は？大丈夫？大丈夫じゃねーのはあたしの方だっ！！"
1002602-36 = "そんな写真、誰かに見られたら……。"
1002602-37 = "……ん？何だ？"
1002602-38 = "は？バニーガールの着方なら知ってる？"
1002602-39 = "……？"
1002602-40 = "え、は？何で？"
1002602-41 = "どうして知ってんだよ、着たことあんのか？"
1002602-42 = "[s3] \"いつか必要になるかなって。\"\n[s4] \"一般教養。\""
1002602-43 = "……？"
1002602-44 = "……？"
1002602-45 = "はっ、まあ何だって良いや。結果的に助かりそうだしな。"
1002602-46 = "じゃあとりあえず、一回これは脱いで……。"
1002602-47 = "……あん？どした、先生？"
1002602-48 = "待って？やり方だけ先に教えるから自分で？"
1002602-49 = "……あんでだよ？"
1002602-50 = "まあ別に良いけど――"
1002602-52 = "あ。"
1002602-53 = "あー……まあ、そりゃ、そうか……。"
1002602-54 = "OK、じゃあ教えてくれ。外で待っててくれれば、終わり次第呼ぶからよ。"
1002602-55 = "[s] 全部の手順を伝えた後、部屋を一旦出る。"
1002602-61 = "（そうしてしばらく、ネルの着替えを待った）"
1002602-65 = "……おい、もう良いぞ先生。"
1002602-72 = "ほーん、なるほどな。こういう風に着れば良いわけか。"
1002602-73 = "見た目はなんか変な気もするが……やっぱメイド服より動きやすい気もすんな。"
1002602-74 = "まさかまた先生に誤送信するとは思わなかったけど、結果オーライってな。ははっ。"
1002602-75 = "うーん……ただ、この靴だけは慣れる気がしねーな……。"
1002602-76 = "ハイヒール、って言うんだったか？"
1002602-81 = "なんか踵とか、あちこちが痛ぇ……。"
1002602-82 = "これ、履き方合ってんのか？"
1002602-83 = "……まじか。ってことは街中のやつは、これで平然と歩いてんのか？"
1002602-84 = "すげぇ、よく歩けんなこんなので……。"
1002602-85 = "まあ、とにかく助かった。"
1002602-91 = "サンキュな。"
1002602-92 = "……ん？"
1002602-93 = "必要な時はいつでも連絡してほしい？"
1002602-94 = "ついでに写真もくれると嬉しい……？てめっ――"
1002602-95 = "……くくっ。"
1002602-96 = "ははっ！あー、何をそんな真面目な顔で……やっぱ変なやつだな。"
1002602-97 = "……気が向いた時だけな。"
