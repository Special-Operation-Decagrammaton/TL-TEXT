[translation]
1002602-1 = "Pedido de ajuda"
1002602-2 = "（Caminhei apressado até o quarto da Neru）"
1002602-8 = "（Neru estava lá dentro, parecendo um monstro estranho por não saber como vestir aquilo）"
1002602-9 = "Que droga é essa? Não entendo nada, quem foi o idiota que inventou essa roupa...?"
1002602-10 = "Hmm."
1002602-11 = "Ah, você veio."
1002602-12 = "[s] \"……？\""
1002602-13 = "……Eh?"
1002602-17 = "Hã!? Sensei!?"
1002602-18 = "Por que!? Por que você está aqui!?"
1002602-19 = "Não, isso não faz sentido, por que você está aqui!?"
1002602-20 = "……Hã?"
1002602-21 = "Porque eu te chamei? Nem ferrando, tá doido!?"
1002602-22 = "[s1] \"Você até me mandou uma foto.\"\n[s2] Mostro a tela do Momotalk."
1002602-28 = "Não, para de mentir, eu não vou cair nessa..."
1002602-30 = "Eh..."
1002602-31 = "Eu mandei mesmo..."
1002602-32 = "Droga, mandei para a pessoa errada de novo!?"
1002602-33 = "Não, é que dessa vez estava difícil de ver as coisas...!"
1002602-34 = "Quer saber, apaga essa foto! Que coisa ridícula!!"
1002602-35 = "Hã? Tudo bem? Quem não está nada bem aqui sou eu!!"
1002602-36 = "Se alguém vir uma foto dessas..."
1002602-37 = "……Hmm? O que foi?"
1002602-38 = "Hã? Você sabe como vestir uma roupa de coelhinha?"
1002602-39 = "……?"
1002602-40 = "Eh, hã? Por quê?"
1002602-41 = "Como você sabe disso? Já vestiu uma antes?"
1002602-42 = "[s3] \"Pensei que poderia ser útil um dia.\"\n[s4] \"Conhecimento geral.\""
1002602-43 = "……?"
1002602-44 = "……?"
1002602-45 = "Ah, tanto faz. No fim das contas, vai ser útil."
1002602-46 = "Então, primeiro, vou tirar isso..."
1002602-47 = "……Hã? O que foi, Sensei?"
1002602-48 = "Espera? Você vai só me ensinar como fazer e eu mesma tenho que vestir?"
1002602-49 = "……Por que?"
1002602-50 = "Bom, tudo bem, eu acho――"
1002602-52 = "Ah."
1002602-53 = "Ah... bom, é, faz sentido..."
1002602-54 = "OK, então me ensina. Fica esperando lá fora, eu te chamo quando terminar."
1002602-55 = "[s] Depois de explicar todos os passos, saio do quarto por um momento."
1002602-61 = "（E assim, esperei um pouco enquanto a Neru se trocava）"
1002602-65 = "……Ei, já pode entrar, Sensei."
1002602-72 = "Hmm, entendi. Então é assim que se veste."
1002602-73 = "A aparência é um pouco estranha, mas... acho que é mais fácil de se mover do que com a roupa de empregada."
1002602-74 = "Quem diria que eu mandaria a mensagem errada para o Sensei de novo, mas no fim deu tudo certo. Haha."
1002602-75 = "Hmm... mas não acho que vou me acostumar com esses sapatos..."
1002602-76 = "Salto alto, era esse o nome?"
1002602-81 = "Meus calcanhares e várias outras partes estão doendo..."
1002602-82 = "Será que estou usando do jeito certo?"
1002602-83 = "……Sério? Então as pessoas na rua andam com isso normalmente?"
1002602-84 = "Caramba, como você consegue andar com isso...?"
1002602-85 = "Bem, de qualquer forma, obrigado pela ajuda."
1002602-91 = "Valeu."
1002602-92 = "……Hm?"
1002602-93 = "Quer que eu entre em contato sempre que precisar?"
1002602-94 = "E ainda por cima quer que eu te mande fotos...? Você é um..."
1002602-95 = "……Hehe."
1002602-96 = "Hahaha! Ah, por que você está com essa cara tão séria...? Você é mesmo um sujeito estranho."
1002602-97 = "……Só quando eu estiver a fim."
