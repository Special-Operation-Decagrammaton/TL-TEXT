[translation]
3602-1 = "おかしなノスタルジー（２）"
3602-3 = "（早速翌日、作戦は決行された）"
3602-4 = "（ナギサは相変わらず上の空だった）"
3602-9 = "（ブウウーーン）"
3602-10 = "私を……どこに連れていくおつもり、ですか……？"
3602-11 = "ナギちゃんが喜びそうな場所だよ☆"
3602-12 = "私が……喜ぶ……？"
3602-13 = "山海経高級中学校の外れに、有名な紅茶専門店があるらしい。"
3602-14 = "今は、そこに向かっている。"
3602-15 = "セイアちゃん！？#nもーっ、何でネタバレしちゃうかなぁ～"
3602-16 = "心身を休めるための外出だ。#n変に気を揉ませては可哀想だろう。"
3602-18 = "心身を休める……。"
3602-19 = "それなら……寮にいれば事足りるのですが……。"
3602-20 = "ナギちゃん、寮でも書類いじってるの知ってるんだから！"
3602-21 = "今日くらいは何もかも忘れてお休みしよう？"
3602-22 = "いい香りの紅茶と一緒に、ね？"
3602-23 = "紅茶……。"
3602-26 = "さぁ、到着だ。"
3602-32 = "わあ！ここで紅茶を作ってるんだ？"
3602-33 = "ようこそおいで下さいました。#n見学会の準備は整っております。"
3602-34 = "まずは紅茶を作る過程を見学いただき、#nその後、試飲と茶葉のブレンド体験のお時間とさせていただきます。"
3602-35 = "私共にしか取り扱いの無い茶葉もご用意しておりますので、どうぞご期待ください！"
3602-36 = "ナギちゃん、行こ行こっ！"
3602-43 = "……。"
3602-44 = "最初にこちらをご覧ください。"
3602-45 = "紅茶を作るためにはまず、茶葉を乾燥させる必要があります。#nそのため――"
3602-57 = "（店主の案内で、紅茶の生産工程を見て回った）"
3602-58 = "（店主は話し上手で、見学は和気あいあいと進んでいく）"
3602-59 = "（……しかし、それでもナギサの元気は戻らなかった）"
3602-61 = "では、ブレンド体験に移りましょう。"
3602-62 = "紅茶は、一種類の茶葉で作ることも可能ですが、様々な種類の茶葉を使ったり、フルーツ、香辛料を加えることもできます。"
3602-63 = "では、こちらのカゴにある材料から見ていきましょうか。"
3602-64 = "それぞれ、香りを嗅ぎ比べてみてください。"
3602-65 = "……。"
3602-69 = "すぅ……。"
3602-70 = "……。"
3602-71 = "いかがです？良い香りでしょう？"
3602-72 = "……ふふっ。"
3602-78 = "えっ！？"
3602-79 = "ナギサ！？"
3602-80 = "大丈夫！？"
3602-81 = "カゴに顔を突っ込んじゃダメだよ！"
3602-83 = "……。"
3602-84 = "ううぅ……。"
3602-85 = "もう、イヤぁ……。"
3602-86 = "私……茶葉になって……。"
3602-87 = "熱い湯に入れられて……。"
3602-88 = "そのまま、溶け出して……。"
3602-89 = "ナギ[ruby=ちゃ]茶[/ruby]ん！？"
3602-90 = "ナギちゃん、壊れちゃった！！"
3602-91 = "ミカ、落ち着くんだ。"
3602-92 = "店主、済まない。#nこのカゴごとすべて会計に加えて貰いたい。"
3602-93 = "あっ、ええ……！#nはい、承知しました。"
3602-95 = "（こうしてナギサの香りが足された茶葉を購入し、三人は紅茶専門店を後にした）"
