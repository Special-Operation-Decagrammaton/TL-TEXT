[translation]
3602-1 = "Nostalgia estranha (2)"
3602-3 = "(Logo no dia seguinte, a operação foi colocada em prática)"
3602-4 = "(Nagisa continuava com a cabeça nas nuvens)"
3602-9 = "(Vruuum)"
3602-10 = "Onde... você pretende me levar...?"
3602-11 = "A um lugar que a Nagi-chan vai adorar! ☆"
3602-12 = "Eu... adorar...?"
3602-13 = "Dizem que há uma famosa casa de chás nos arredores da Escola de Shanhaijing."
3602-14 = "Estamos indo para lá agora."
3602-15 = "Seia-chan!? #nPoxa, por que você teve que dar spoiler assim~"
3602-16 = "É um passeio para descansar o corpo e a mente. #nSeria uma pena deixá-la preocupada à toa."
3602-18 = "Descansar o corpo e a mente..."
3602-19 = "Se for esse o caso... bastaria eu ficar no dormitório..."
3602-20 = "Nagi-chan, eu sei que você fica mexendo em documentos até no dormitório!"
3602-21 = "Que tal esquecer de tudo e descansar pelo menos hoje?"
3602-22 = "Junto com um chá de aroma delicioso, sabe?"
3602-23 = "Chá..."
3602-26 = "Muito bem, chegamos."
3602-32 = "Uau! É aqui que vocês fazem o chá?"
3602-33 = "Sejam muito bem-vindas. #nOs preparativos para o tour estão prontos."
3602-34 = "Primeiro, vocês observarão o processo de produção do chá e, #ndepois, teremos um momento para degustação e experiência de mistura de folhas."
3602-35 = "Temos folhas de chá exclusivas que só nós comercializamos, então, por favor, aguardem!"
3602-36 = "Nagi-chan, vamos, vamos!"
3602-43 = "..."
3602-44 = "Primeiro, observem isto."
3602-45 = "Para fazer o chá, primeiro é necessário secar as folhas. #nPor isso――"
3602-57 = "(Sob a orientação do dono da loja, percorremos o processo de produção do chá)"
3602-58 = "(O dono é um bom conversador e o tour segue de forma amigável)"
3602-59 = "(...No entanto, mesmo assim, a energia de Nagisa não retornou)"
3602-61 = "Bem, vamos passar para a experiência de mistura."
3602-62 = "O chá pode ser feito com apenas um tipo de folha, mas também é possível usar vários tipos, ou adicionar frutas e especiarias."
3602-63 = "Então, vamos dar uma olhada nos ingredientes que estão nesta cesta."
3602-64 = "Por favor, sintam o aroma de cada um e comparem."
3602-65 = "..."
3602-69 = "Sniff..."
3602-70 = "..."
3602-71 = "O que acharam? Um aroma maravilhoso, não é?"
3602-72 = "...Fufu."
3602-78 = "Hã!?"
3602-79 = "Nagisa!?"
3602-80 = "Você está bem!?"
3602-81 = "Não pode enfiar o rosto na cesta!"
3602-83 = "..."
3602-84 = "Uuuu..."
3602-85 = "Chega, não quero mais..."
3602-86 = "Eu... virei uma folha de chá..."
3602-87 = "Fui colocada em água quente..."
3602-88 = "E simplesmente me dissolvi..."
3602-89 = "Nagi-chan!?"
3602-90 = "Nagi-chan, você pifou!!"
3602-91 = "Mika, acalme-se."
3602-92 = "Dono da loja, peço desculpas. #nPor favor, adicione tudo o que está nesta cesta à conta."
3602-93 = "Ah, sim...! #nCerto, compreendido."
3602-95 = "(Dessa forma, após comprarem as folhas de chá com o aroma de Nagisa adicionado, os três deixaram a loja de chás.)"
