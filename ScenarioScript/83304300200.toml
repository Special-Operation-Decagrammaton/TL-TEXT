[translation]
83304300200-9 = "ああもう！あっちもこっちもゴミだらけじゃないか！"
83304300200-15 = "イオリ、何をしてるの？"
83304300200-16 = "あ、委員長！見てくれ、この床に散らばった大量のチラシを！"
83304300200-17 = "万魔殿の奴ら……今度は変な内容のチラシをあちこちにバラ撒いたみたいなんだ。"
83304300200-18 = "訓練直前とはいえ、放ってはおけないから回収したよ。"
83304300200-19 = "……それとチラシを撒く時に騒ぎがあったらしいけど、よくは分からなかった。"
83304300200-20 = "何でもマコト議長が暴れようとしているところを、メンバーと先生が止めたんだとか。"
83304300200-21 = "……よく分からないけれど、先生も先生で相変わらず大変ね。"
83304300200-22 = "たしかにあなたの言う通り、風紀委員会として放っておくわけにはいかない。"
83304300200-26 = "まだ訓練開始まで少し時間が残ってるし……"
83304300200-31 = "みんなで片付けちゃいましょう。"
83304300200-33 = "よし、張り切っていこう！"
