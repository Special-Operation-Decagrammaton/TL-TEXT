[translation]
83304300200-9 = "Ah, droga! Está cheio de lixo por todos os lados!"
83304300200-15 = "Iori, o que você está fazendo?"
83304300200-16 = "Ah, Presidente! Olhe só, essa quantidade enorme de panfletos espalhados pelo chão!"
83304300200-17 = "Aqueles caras do Pandemonium... parece que espalharam panfletos com conteúdos estranhos por toda parte desta vez."
83304300200-18 = "Mesmo sendo pouco antes do treino, não pude ignorar, então recolhi tudo."
83304300200-19 = "...E parece que houve uma confusão quando espalharam os panfletos, mas não entendi muito bem os detalhes."
83304300200-20 = "Dizem que a Presidente Makoto estava tentando causar um tumulto, mas os membros e o Sensei a impediram."
83304300200-21 = "...Não entendo muito bem, mas o Sensei continua passando por poucas e boas, como sempre."
83304300200-22 = "Você tem razão, como Comitê Disciplinar, não podemos simplesmente ignorar isso."
83304300200-26 = "Ainda temos um pouco de tempo antes do início do treino, então..."
83304300200-31 = "Vamos limpar tudo juntas."
83304300200-33 = "Certo, vamos dar o nosso melhor!"
