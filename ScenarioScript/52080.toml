[translation]
52080-1 = "Episódio 8: Pesadelo"
52080-7 = "……Nas minhas memórias, Ayame era uma garota brilhante e calorosa, como o sol da manhã."
52080-8 = "A presidente do Hyakkiyako, que nunca fazia cara feia para nenhum pedido."
52080-9 = "Aquele sorriso trazia paz a todos."
52080-13 = "Falta gente nas barracas do festival? Deixa comigo!#nMoro sozinha há muito tempo, então estou acostumada a cozinhar."
52080-17 = "Dizem que o Grupo Chimi está causando confusão em frente ao Observatório Kamiki?#nQue crianças problemáticas. Vou dar uma passada lá!"
52080-22 = "Se perdeu da sua irmã mais velha?#n……Tudo bem, tudo bem, eu vou procurar por você!#nSeja uma boa menina e espere aqui."
52080-28 = "Todos, quando precisavam de algo, procuravam a Ayame e confiavam nela."
52080-29 = "Mesmo para pedidos que fariam outros franzirem a testa, Ayame sempre sorria e..."
52080-33 = "Presidente Ayame! Contamos com a sua orientação no treino de hoje também!"
52080-39 = "Senpai Ayame. Sobre o slogan do próximo festival, estamos sem ideias..."
52080-40 = "Desculpe incomodar, Ayame-chan, mas você poderia cuidar da loja no fim de semana...?#nA pessoa que viria acabou ficando doente..."
52080-46 = "Sim! Deixa comigo!"
52080-49 = "Apesar disso, quanto a mim... eu mal conseguia acompanhar a Ayame."
52080-50 = "Sempre que eu batia em uma parede, as lágrimas caíam sem permissão.#nNunca venci a Ayame em nenhuma disputa."
52080-51 = "Toda vez que eu via a Ayame sendo tão requisitada por todos...#nPalavras que eu não conseguia dizer em voz alta ecoavam no meu coração."
52080-56 = "Sem a Ayame, não consigo fazer nada. É impossível."
52080-57 = "Porque eu não sou a Ayame."
52080-58 = "Porque a única que tem as qualificações para ser a presidente do Hyakkiyako é a Ayame."
52080-61 = "Mas a Ayame percebia meus sentimentos e, #nsempre com um sorriso brilhante, estendia a mão para mim."
52080-70 = "Está tudo bem, Nagusa."
52080-71 = "Porque eu sou..."
52080-79 = "Eu... nunca considerei você uma amiga."
52080-83 = "……!"
52080-88 = "Haa, haa... de novo, esse sonho..."
52080-89 = "Por que esse pesadelo continua..."
52080-94 = "……Já acordou?"
52080-95 = "Parece que você tem dificuldade para dormir quando muda de travesseiro, Nagusa-chan."
52080-103 = "……Yabuki Shuro."
52080-104 = "Sim, sim. Sou eu mesma."
52080-105 = "Que destino curioso nos encontrarmos aqui de novo, não é?"
52080-106 = "……Não, espere, foi a Nagusa-chan quem se meteu nisso, não foi?"
52080-111 = "Por que você se deu ao trabalho de vir a esta terra onde monstros vagam?"
52080-112 = "Será que você tem a esperança tola...#nde que talvez possa encontrar sua amiga de infância de novo?"
52080-113 = "……Isso é o que eu deveria perguntar."
52080-114 = "O que você está fazendo aqui?#nAs Histórias dos Cem Fantasmas encontradas nesta área são obra sua?"
52080-115 = "Quem sabe? Histórias de fantasmas não podem ter spoilers."
52080-116 = "Eu queria ter lhe dado um pesadelo do qual não pudesse acordar como saudação de reencontro...#nmas já que você acordou, não há o que fazer."
52080-117 = "Vou transformar esse pesadelo em realidade para você."
52080-139 = "Ahaha!#nEntão, usar o \"Hyakuren\" naquela hora não foi sorte!"
52080-140 = "Não me diga...#nVocê ainda acha que pode se tornar a líder do Hyakkiyako no lugar da Ayame...?"
52080-141 = "Não é sobre conseguir ou não."
52080-142 = "Para proteger a todos, eu farei isso.#n...Mesmo que seja apenas fingindo ser a presidente."
52080-146 = "Heh, que história bonita."
52080-147 = "Mas... por mais forte que você tenha se tornado, não consegue fazer o trabalho de duas pessoas, consegue?"
52080-148 = "Quanto tempo você acha que vai aguentar o medo que continua te atacando?"
52080-159 = "Vamos lá, que comece a abertura de uma nova história? Ihihi!"
