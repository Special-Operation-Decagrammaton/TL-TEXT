[translation]
2003002-1 = "先生、お手伝いしますわ"
2003002-3 = "こちらの選手、熱中症です！すみませんが手を貸して下さい！"
2003002-4 = "[s] \"熱中症……熱中症の手当てはどうすれば……！？\""
2003002-5 = "ここに氷嚢があります。選手の首に当てて冷やしてください！あと、脇の下や太い血管が通っているところに冷やしたタオルを！"
2003002-6 = "[s] \"わかった！ありがとう！\""
2003002-11 = "忙しそうですわね、先生？"
2003002-12 = "[s] \"あっ！こんにちは、ハルナ。\""
2003002-13 = "ええ、こんにちは。#nところで、どうしてこちら？"
2003002-14 = "[s] \"見ての通り、応急処置を手伝ってるんだ。\""
2003002-15 = "ふむ……ですが、先生は医療スタッフではありませんよね？"
2003002-16 = "[s] \"そうなんだけど、人手が足りないみたいで。\""
2003002-20 = "なるほど……。"
2003002-21 = "でしたら私も、予定を変更することにいたしましょう。"
2003002-25 = "[ns] \"え？どういうこと？\""
2003002-30 = "先生のお仕事が落ち着くまで私も同行する、という意味です。"
2003002-31 = "[s] \"えっ、と……？\""
2003002-34 = "ううっ……胃もたれがひどい……。"
2003002-35 = "これじゃあ午後の試合は……。"
2003002-36 = "大丈夫ですわ。こちらを召し上がってください。"
2003002-40 = "少し濃いめに入れた梅茶です。#n梅には消化を助ける作用がありますから、きっと楽になると思いますわ。"
2003002-41 = "あ、ありがとうございます……。"
2003002-45 = "……あっ。"
2003002-46 = "少し治まってきた気が……。#nこれなら試合も大丈夫そうです！"
2003002-48 = "はぁ……はぁ……。"
2003002-49 = "中距離走はやっぱり、キツいな……。#n水……水が欲しい……。"
2003002-51 = "どうぞ、スポーツドリンクです。#n水より吸収が早いので、水分補給はこちらをオススメしますわ。"
2003002-52 = "さっぱりとした甘さですので、運動後に最適です。"
2003002-53 = "で、では、遠慮無く……！"
2003002-57 = "ごくごくごく……"
2003002-58 = "ぷはーっ！#n美味しい！生き返るーっ！！"
2003002-60 = "ううっ、急にめまいが……。"
2003002-61 = "頭が痛い……手の震えも止まらないし……どうし……よ……"
2003002-66 = "これは……低血糖ですわね。"
2003002-67 = "たしかアレがここに……よし。#n少し、日陰に移動しましょう。"
2003002-72 = "さあ、ブドウ糖のキャンディです。召し上がれますか？"
2003002-77 = "んん……はぁ……。#nなんだか、楽になってきました……ありがとうございます……。"
2003002-84 = "[ns1] \"ハルナ、すごい！\"\n[ns2] \"こういうこともできたんだね！\""
2003002-87 = "美食の道を歩む者として、これくらい当然の事です。"
2003002-88 = "ひとまず、皆さんの応急処置は終わりましたね。"
2003002-89 = "[s3] \"うん、本当に助かった。\"\n[s4] \"進行委員のみんなもありがとうって言ってたよ。\""
2003002-92 = "いえいえ、大したことではありませんわ。#nこれでようやく――"
2003002-93 = "先生と大運動会の真の美食を探求できるのですから！"
2003002-97 = "[ns] \"……まさか、最初からそのつもりで？\""
2003002-98 = "さて、どうでしょう。"
2003002-99 = "ですが……どのような感情があったとしても、人助けには変わりないでしょう？"
2003002-100 = "少なくとも私は、自分の行動において、恥ずべき点などありませんもの。"
2003002-101 = "[s5] \"まあ、たしかに……。\"\n[s6] \"やらない善よりやる偽善って言うからね。\""
2003002-104 = "ふふっ、理解していただけて嬉しいですわ。"
2003002-105 = "[s] \"それで、何をするの？\""
2003002-106 = "もちろん、"
2003002-107 = "屋台グルメツアーですわ！"
2003002-108 = "大運動会は、普段味わえない様々な美食を楽しめる祭典ですから。"
2003002-109 = "先生のお時間は確保できたわけですし……"
2003002-110 = "もちろんご一緒、してくださりますよね？先生。"
2003002-114 = "[ns7] \"うん、楽しそう。\"\n[ns8] \"屋台の案内はお願いしてもいいんだよね？\""
2003002-117 = "ええ、お任せください。すでにルートも決めておりますわ。"
2003002-118 = "では参りましょうか。#n今日は先生も、美食研究会の名誉サポーターですのよ？"
2003002-119 = "[s] \"はい！よろしくお願いします、会長！\""
2003002-124 = "（ハルナと一緒に屋台を回り、様々な「美食」をお腹いっぱい味わった）"
