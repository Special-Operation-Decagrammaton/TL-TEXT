[translation]
2003002-1 = "Professor, eu vou ajudar."
2003002-3 = "Este atleta está com insolação! Desculpe, mas preciso de ajuda!"
2003002-4 = "[s] \"Insolação... O que devo fazer para tratar insolação...!?\""
2003002-5 = "Aqui está uma bolsa de gelo. Por favor, coloque no pescoço do atleta para resfriar! E use toalhas geladas nas axilas e onde passam os vasos sanguíneos principais!"
2003002-6 = "[s] \"Entendido! Obrigado!\""
2003002-11 = "Parece ocupado, não é, Professor?"
2003002-12 = "[s] \"Ah! Olá, Haruna.\""
2003002-13 = "Sim, olá. #nMas, por que está aqui?"
2003002-14 = "[s] \"Como pode ver, estou ajudando com os primeiros socorros.\""
2003002-15 = "Hum... mas o Professor não é da equipe médica, certo?"
2003002-16 = "[s] \"É verdade, mas parece que falta gente.\""
2003002-20 = "Entendo..."
2003002-21 = "Nesse caso, eu também mudarei meus planos."
2003002-25 = "[ns] \"Eh? O que quer dizer?\""
2003002-30 = "Significa que vou acompanhá-lo até que o seu trabalho se acalme."
2003002-31 = "[s] \"Eh, bem...?\""
2003002-34 = "Ugh... que dor de estômago terrível..."
2003002-35 = "Desse jeito, a competição da tarde..."
2003002-36 = "Está tudo bem. Por favor, tome isto."
2003002-40 = "É um chá de ameixa preparado um pouco mais forte. #nA ameixa ajuda na digestão, então tenho certeza de que se sentirá melhor."
2003002-41 = "Ah, muito obrigado..."
2003002-45 = "...Ah."
2003002-46 = "Sinto que melhorou um pouco... #nAssim, acho que conseguirei competir!"
2003002-48 = "Haa... haa..."
2003002-49 = "Corridas de média distância são realmente exaustivas... #nÁgua... preciso de água..."
2003002-51 = "Aqui, uma bebida esportiva. #nComo é absorvida mais rápido que a água, recomendo esta para a hidratação."
2003002-52 = "Tem um dulçor refrescante, sendo ideal após o exercício."
2003002-53 = "E-então, sem cerimônia..."
2003002-57 = "Gole, gole, gole..."
2003002-58 = "Ahhh! #nQue delícia! Sinto que voltei à vida!!"
2003002-60 = "Ugh, uma tontura repentina..."
2003002-61 = "Minha cabeça dói... minhas mãos não param de tremer... o que eu... faço..."
2003002-66 = "Isso é... hipoglicemia."
2003002-67 = "Se bem me lembro, aquilo está aqui... Certo. #nVamos nos mover para a sombra."
2003002-72 = "Aqui, uma bala de glicose. Consegue comer?"
2003002-77 = "Hmm... haa... #nSinto que estou melhorando... muito obrigada..."
2003002-84 = "[ns1] \"Haruna, incrível!\"\n[ns2] \"Eu não sabia que você sabia fazer isso!\""
2003002-87 = "Como alguém que trilha o caminho da gastronomia, isso é o mínimo que se espera."
2003002-88 = "Por ora, os primeiros socorros de todos foram concluídos."
2003002-89 = "[s3] \"Sim, você realmente ajudou muito.\"\n[s4] \"O pessoal do comitê organizador também pediu para agradecer.\""
2003002-92 = "Não há de quê, não foi nada demais. #nCom isso, finalmente..."
2003002-93 = "Poderemos explorar a verdadeira gastronomia do Grande Festival Esportivo com o Professor!"
2003002-97 = "[ns] \"...Não me diga que era essa a sua intenção desde o início?\""
2003002-98 = "Ora, quem sabe?"
2003002-99 = "Mas... independentemente de quais sentimentos eu tenha, não deixa de ser uma boa ação, certo?"
2003002-100 = "Pelo menos eu não vejo nada de vergonhoso nas minhas ações."
2003002-101 = "[s5] \"Bem, é verdade...\"\n[s6] \"Dizem que é melhor uma hipocrisia que faz o bem do que uma bondade que não faz nada.\""
2003002-104 = "Fufu, fico feliz que tenha entendido."
2003002-105 = "[s] \"Então, o que vamos fazer?\""
2003002-106 = "Naturalmente,"
2003002-107 = "É um tour gastronômico pelas barracas!"
2003002-108 = "A Grande Competição Esportiva é um festival onde podemos saborear várias iguarias que não costumamos comer no dia a dia."
2003002-109 = "Já que conseguimos garantir o tempo do Sensei..."
2003002-110 = "É claro que você virá comigo, não é? Sensei."
2003002-114 = "[ns7] \"Sim, parece divertido.\"\n[ns8] \"Posso contar com você para me guiar pelas barracas, certo?\""
2003002-117 = "Sim, pode deixar comigo. Já planejei até a rota."
2003002-118 = "Então, vamos nessa? #nHoje, o Sensei também é um apoiador honorário do Clube de Pesquisa Gastronômica!"
2003002-119 = "[s] \"Sim! Conto com você, presidente!\""
2003002-124 = "(Passei pelas barracas com Haruna e saboreamos várias \"iguarias\" até ficarmos de barriga cheia)"
