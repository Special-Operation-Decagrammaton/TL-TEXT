[translation]
52090-1 = "第9話;百花繚乱の委員長"
52090-2 = "エビス分校学生寮・宴会場"
52090-6 = "ん～っ、美味しい！"
52090-7 = "久しぶりの温かい食事はいいねぇ～！芯からあったまるよ！"
52090-8 = "ごめん、もう一杯おかわりしていい？"
52090-12 = "もちろんです！"
52090-13 = "ありがと！できればお味噌汁も……！"
52090-24 = "みんなどうしたの？幽霊でも見たような顔して……。"
52090-29 = "いや、幽霊じゃないんだろうけど……。"
52090-30 = "ここにいるのが、びっくりっていうか……。"
52090-31 = "……アヤメ委員長、無事でよかったよ。"
52090-32 = "でも、百花繚乱の参謀としてこれは聞かせて。#n……今まで、どこで何をしていたの？"
52090-33 = "前から掴み所がない人だとは思ってたよ。#nけど……あなたがいきなり雲隠れしたことで、#n百花繚乱は解散寸前だった。"
52090-34 = "正直、「委員長」と呼んでいいのか疑問に思ってる。"
52090-35 = "なにか言い訳があるなら、聞くけど？"
52090-37 = "……キキョウは変わらないね。"
52090-41 = "百花繚乱の委員長の責任を放棄した……#nそのことについて、私が弁解できることはない。"
52090-42 = "特に、突然委員長代理をすることになったナグサ……#n本当にごめんなさい。辛かったよね？寂しかったよね？"
52090-46 = "ううん、私はアヤメが帰ってきてくれただけでじゅうぶ――"
52090-47 = "ナグサ先輩、静かにして。"
52090-53 = "私が知りたいのは、あなたが突然姿を消した理由。"
52090-54 = "それと、ナグサ先輩の右腕のことも。"
52090-58 = "……少し長くなるけど、いいかな？"
52090-59 = "ええ、もちろん。"
52090-60 = "先輩への誤解が解けるのでしたら、どれだけかかっても大丈夫ですわ。"
52090-61 = "1年生のユカリ……だったよね？ありがとう。"
52090-62 = "……まず、話の前に一つ聞かせて。"
52090-63 = "百花繚乱の「委員長」の資格って、何かな？"
52090-64 = "はいはーいっ！身共知っていますの！"
52090-65 = "先代の委員長との継承戦で勝利すると、資格を得ることができますの！"
52090-66 = "ふふっ、よく知ってるね。でも、それだけじゃないんだよ？"
52090-70 = "継承戦の勝者が得られるのは「委員長の肩書き」じゃない。#n大預言者クズノハから引き継がれる「資格の証」の方だね。"
52090-71 = "つまり、継承戦は「百蓮」を継承する儀式なんだよ。"
52090-72 = "だから、百花繚乱の委員長なら、#n「百蓮」を手足のように扱えないとね。"
52090-73 = "でも……それならなおさら、#nアヤメ以上に委員長にふさわしい生徒なんて……。"
52090-74 = "射撃の腕だって、アヤメに並ぶ子は……。"
52090-75 = "人が相手、ならね。"
52090-81 = "……何を相手にしてたんだよ、委員長は？"
52090-87 = "百花繚乱を離れる数日前、私はいつも通り百鬼夜行を見て回ってた。"
52090-97 = "祭りの後だからか街には人ひとり居なかった。#nしかもなぜか、この日だけは街の灯りが不規則にチカチカしてて。"
52090-101 = "そんな中で見回りを続けて、橋に差し掛かった時――#n向かい側に、一人の生徒が立っていたんだ。"
52090-111 = "明るい金色の髪と紫色の瞳。#nそして、白い制服に水色の羽織……。"
52090-112 = "彼女は、私と同じ姿をしていたの。"
52090-113 = "「ソレ」は顔まで私と同じだった。まるで、鏡でも見てるみたいに。"
52090-114 = "姿形は同じでも、いや、同じだからこそ――#n「ソレ」が私とは違う存在だって、直感で悟った。"
52090-123 = "「ソレ」は私を見て――待ってたと言わんばかりに、笑顔を見せた。"
52090-124 = "この手の存在に、普通の銃弾は通じない。"
52090-128 = "でも、私の手には「百蓮」があった。#n委員長になって初めて、怪異相手に銃口を向けたの。"
52090-142 = "でも……効果はなかった。"
52090-143 = "「ソレ」は、撃たれる前と変わらない様子で近づいてきて……。"
52090-156 = "……そのまま、夜闇に溶けていった。"
52090-157 = "あれは、一夜の夢だった……そう片づけることもできたかもしれない。#nでも、あのときの私には無理だった。"
52090-160 = "「どうして百蓮が通じなかったのだろう」"
52090-161 = "「私には資格がない？それとも、百蓮は偽物？」"
52090-162 = "「そもそも、大預言者クズノハ様は……実在するの？」"
52090-165 = "不安に押しつぶされそうだった私は、クズノハ様を一目見るために、黄昏の寺院があったと伝えられる大雪原に向かった。"
52090-166 = "馬鹿みたいだよね。でも……そうでもしないと自分を許せそうになかったんだ。"
52090-167 = "そして私は……失敗した。"
52090-168 = "見つけたのは「黄昏の寺院」らしき廃墟だけ。"
52090-169 = "結局クズノハ様は、私の前に姿を現さなかった。"
52090-175 = "……話はそれで全部？"
52090-176 = "うん。"
52090-177 = "まだ大事な話が残っているでしょう？"
52090-178 = "ナグサ先輩の腕のこと……それに、花鳥風月部と消えたときに言った言葉。"
52090-179 = "ナグサの腕……？"
52090-180 = "あっ……その包帯、どうしたの？ケガでもした？"
52090-185 = "これは……。"
52090-186 = "アヤメ、覚えてないの？私と大雪原で会ったんだよ？"
52090-187 = "ナグサが大雪原に……？あのときは、すごい吹雪だったから……。"
52090-188 = "…………。"
52090-189 = "本当に覚えてないのか？"
52090-190 = "ナグサ先輩の手を振り払って「友達だと思ったことなんてない」って……。"
52090-195 = "そんなことしないよ！"
52090-202 = "ご、ごめん……。"
52090-203 = "でも、そんなこと、私が言うわけないよ。いつだって、ナグサは大事な友達。"
52090-204 = "聞き間違えたんじゃない？それか、人違いとか……。"
52090-205 = "そ、そうだよね……？アヤメはそんなこと絶対……。"
52090-206 = "いくらナグサ先輩が納得しても、私は信じたわけじゃない。"
52090-207 = "私の知るアヤメ委員長も、絶対にそんなことは言わない……でも、あなたがいない間、いろいろなことがあった。"
52090-208 = "何も言わずに姿を消した委員長と、百鬼夜行の危機に立ち向かった副委員長……私は後者を信じる。"
52090-209 = "これまで通りに付き合いたいのなら、雪原であったことを全部話して。"
52090-211 = "先輩……。"
52090-215 = "分かったよ。ま、最初から隠すつもりなんてないし！"
52090-216 = "でも、ご飯食べ終わってからでもいい？"
52090-217 = "残すとバチが当たっちゃうからね！"
52090-219 = "次回;不完全な記憶"
