[translation]
52090-1 = "Episódio 9; A Presidente da Hyakkaryouran"
52090-2 = "Salão de Banquete do Dormitório Estudantil da Filial Ebisu"
52090-6 = "Hmm~, que delícia!"
52090-7 = "Nada como uma refeição quente depois de tanto tempo! Aquece até a alma!"
52090-8 = "Desculpa, posso repetir?"
52090-12 = "Com certeza!"
52090-13 = "Obrigada! Se possível, também um pouco de sopa de missô...!"
52090-24 = "Pessoal, por que essas caras? Parece que viram um fantasma..."
52090-29 = "Não, não é um fantasma..."
52090-30 = "É só que... é um choque ver você aqui..."
52090-31 = "......Presidente Ayame, fico feliz que esteja bem."
52090-32 = "Mas, como estrategista da Hyakkaryouran, preciso perguntar isto. #n ......Onde você estava e o que estava fazendo todo esse tempo?"
52090-33 = "Sempre achei que você fosse uma pessoa difícil de entender, mas... #n com você desaparecendo de repente, a Hyakkaryouran ficou à beira da dissolução."
52090-34 = "Sinceramente, estou me perguntando se ainda posso te chamar de 'Presidente'."
52090-35 = "Se tiver alguma desculpa, estou ouvindo."
52090-37 = "......Você não mudou nada, Kikyou."
52090-41 = "Eu abandonei minha responsabilidade como presidente da Hyakkaryouran... #n não há desculpas que eu possa dar sobre isso."
52090-42 = "Especialmente para você, Nagusa, que teve que assumir como presidente interina de repente... #n sinto muito mesmo. Foi difícil, não foi? Você se sentiu sozinha, né?"
52090-46 = "Não, não, só de ter você de volta já me basta――"
52090-47 = "Nagusa-senpai, fique quieta."
52090-53 = "O que eu quero saber é por que você desapareceu de repente."
52090-54 = "E também sobre o braço direito da Nagusa-senpai."
52090-58 = "......Vai ser um pouco longo, tudo bem?"
52090-59 = "Sim, claro."
52090-60 = "Se isso esclarecer o mal-entendido com a senpai, não importa o tempo que leve."
52090-61 = "Yukari, aluna do 1º ano... né? Obrigada."
52090-62 = "......Antes de começar, deixem-me perguntar uma coisa."
52090-63 = "O que é necessário para ser 'Presidente' da Hyakkaryouran?"
52090-64 = "Sim, sim! Eu sei!"
52090-65 = "Se vencer a Batalha de Sucessão contra a presidente anterior, você obtém a qualificação!"
52090-66 = "Fufu, você sabe bem. Mas não é só isso, sabe?"
52090-70 = "O que o vencedor da Batalha de Sucessão recebe não é o 'título de presidente'. #n É a 'Prova de Qualificação' herdada da Grande Profeta Kuzunoha."
52090-71 = "Ou seja, a Batalha de Sucessão é o ritual para herdar a 'Hyakuren'."
52090-72 = "Por isso, como presidente da Hyakkaryouran, você precisa ser capaz de manejar a 'Hyakuren' como se fosse seu próprio membro."
52090-73 = "Mas... se for assim, então mais do que nunca, #n não há aluna mais adequada para ser presidente que você, Ayame..."
52090-74 = "Mesmo na pontaria, ninguém se compara a você..."
52090-75 = "Se o oponente for humano, sim."
52090-81 = "......Contra quem você estava lutando, presidente?"
52090-87 = "Alguns dias antes de deixar a Hyakkaryouran, eu estava patrulhando Hyakkiyako como sempre."
52090-97 = "Talvez por causa do fim do festival, não havia uma única pessoa na rua. #n Além disso, por algum motivo, apenas naquele dia, as luzes da cidade piscavam de forma irregular."
52090-101 = "Enquanto continuava minha patrulha e cheguei a uma ponte―― #n havia um aluno parado do outro lado."
52090-111 = "Cabelos loiros brilhantes e olhos violetas. #n E um uniforme branco com um haori azul-claro......"
52090-112 = "Ela tinha a mesma aparência que eu."
52090-113 = "'Aquilo' era idêntico a mim até no rosto. Era como se eu estivesse me olhando num espelho."
52090-114 = "Embora a aparência fosse igual, não, justamente por ser igual―― #n meu instinto me disse que 'Aquilo' era uma existência diferente de mim."
52090-123 = "'Aquilo' me olhou e―― como se estivesse esperando por mim, sorriu."
52090-124 = "Balas normais não funcionam contra esse tipo de existência."
52090-128 = "Mas eu tinha a 'Hyakuren' em mãos. #n Pela primeira vez desde que me tornei presidente, apontei minha arma para uma assombração."
52090-142 = "Mas...... não teve efeito."
52090-143 = "'Aquilo' se aproximou sem nenhuma mudança em relação a antes de ser atingida......"
52090-156 = "......E então, dissolveu-se na escuridão da noite."
52090-157 = "Poderia ter sido apenas um sonho de uma noite... eu poderia ter deixado para lá. #n Mas, naquela época, eu não conseguia."
52090-160 = "'Por que a Hyakuren não funcionou?'"
52090-161 = "'Eu não tenho a qualificação? Ou será que a Hyakuren é falsa?'"
52090-162 = "'Para começar, será que a Grande Profeta Kuzunoha... realmente existe?'"
52090-165 = "Consumida pela ansiedade, fui ao Grande Campo de Neve, onde dizem que ficava o Templo do Crepúsculo, para tentar ver Kuzunoha-sama com meus próprios olhos."
52090-166 = "Parece estúpido, eu sei. Mas... eu não conseguia me perdoar sem fazer algo."
52090-167 = "E então... eu falhei."
52090-168 = "Tudo o que encontrei foram ruínas que pareciam ser o 'Templo do Crepúsculo'."
52090-169 = "No fim, Kuzunoha-sama não apareceu diante de mim."
52090-175 = "......A história termina aí?"
52090-176 = "Sim."
52090-177 = "Ainda resta uma parte importante, não é?"
52090-178 = "Sobre o braço da Nagusa-senpai... e as palavras que você disse quando desapareceu com o Clube das Flores, Pássaros, Vento e Lua."
52090-179 = "Braço da Nagusa......?"
52090-180 = "Ah...... o que aconteceu com essa bandagem? Você se machucou?"
52090-185 = "Isso é......"
52090-186 = "Ayame, você não lembra? Nos encontramos no Grande Campo de Neve, lembra?"
52090-187 = "Nagusa estava no Grande Campo de Neve...? Naquela época, estava uma nevasca tão forte..."
52090-188 = "......"
52090-189 = "Você realmente não lembra?"
52090-190 = "Você afastou a mão da Nagusa e disse 'nunca te considerei minha amiga'......"
52090-195 = "Eu nunca diria isso!"
52090-202 = "De, desculpa......"
52090-203 = "Mas eu jamais diria algo assim. A Nagusa sempre foi uma amiga importante para mim."
52090-204 = "Você não ouviu errado? Ou talvez tenha se enganado de pessoa..."
52090-205 = "É, verdade, né...? A Ayame nunca diria algo assim..."
52090-206 = "Por mais que a Nagusa-senpai esteja convencida, eu não estou acreditando."
52090-207 = "A presidente Ayame que eu conheço nunca diria algo assim... mas muitas coisas aconteceram enquanto você estava fora."
52090-208 = "A presidente que desapareceu sem dizer nada e a vice-presidente que enfrentou a crise de Hyakkiyako... Eu acredito na segunda."
52090-209 = "Se quer que as coisas voltem ao normal, conte tudo o que aconteceu no campo de neve."
52090-211 = "Senpai......"
52090-215 = "Entendi. Bem, eu não tinha intenção de esconder nada desde o início!"
52090-216 = "Mas tudo bem se contarmos depois que terminarmos de comer?"
52090-217 = "Deixar comida sobrando dá azar, não dá?"
52090-219 = "Próximo Episódio; Memórias Incompletas"

