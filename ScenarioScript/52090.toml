[translation]
52090-1 = "Episódio 9: A Presidente do Comitê Hyakkaryouran"
52090-2 = "Dormitório da Filial Ebisu - Salão de Banquetes"
52090-6 = "Hummm, que delícia!"
52090-7 = "É muito bom comer uma refeição quente depois de tanto tempo! Aquece até a alma!"
52090-8 = "Desculpe, posso repetir o prato?"
52090-12 = "Com certeza!"
52090-13 = "Obrigada! Se possível, um missoshiru também...!"
52090-24 = "O que houve com vocês? Estão com cara de quem viu um fantasma..."
52090-29 = "Bem, não acho que seja um fantasma, mas..."
52090-30 = "É que é um choque ver você aqui..."
52090-31 = "...Presidente Ayame, fico feliz que esteja a salvo."
52090-32 = "Mas, como estrategista do Hyakkaryouran, preciso te perguntar isso. #n...Onde você esteve e o que estava fazendo esse tempo todo?"
52090-33 = "Eu sempre soube que você era uma pessoa difícil de entender. #nMas... por causa do seu desaparecimento repentino, #no Hyakkaryouran quase foi dissolvido."
52090-34 = "Sinceramente, estou em dúvida se ainda posso te chamar de 'Presidente'."
52090-35 = "Se tiver alguma desculpa, estou ouvindo."
52090-37 = "...A Kikyou continua a mesma."
52090-41 = "Eu abandonei a responsabilidade de ser a Presidente do Hyakkaryouran... #nNão há nada que eu possa dizer para me justificar sobre isso."
52090-42 = "Especialmente para Nagusa, que teve que assumir como presidente interina de repente... #nSinto muito, de verdade. Deve ter sido difícil, não é? Deve ter se sentido sozinha, não é?"
52090-46 = "Não, para mim, só de você ter voltado já é o suficien—"
52090-47 = "Nagusa-senpai, fique quieta."
52090-53 = "O que eu quero saber é o motivo de você ter desaparecido de repente."
52090-54 = "E também sobre o braço direito da Nagusa-senpai."
52090-58 = "...Vai ser uma história um pouco longa, tudo bem?"
52090-59 = "Sim, claro."
52090-60 = "Se isso esclarecer os mal-entendidos sobre a senpai, não importa quanto tempo leve."
52090-61 = "Yukari, do primeiro ano... certo? Obrigada."
52090-62 = "...Primeiro, antes de começarmos, me deixem perguntar uma coisa."
52090-63 = "O que é, exatamente, a qualificação para ser a 'Presidente' do Hyakkaryouran?"
52090-64 = "Sim, sim! Eu sei disso!"
52090-65 = "Você obtém a qualificação ao vencer a batalha de sucessão contra a presidente anterior!"
52090-66 = "Fufu, você sabe bem. Mas não é só isso, sabe?"
52090-70 = "O que o vencedor da batalha de sucessão ganha não é apenas o 'título de presidente'. #nÉ a 'Prova de Qualificação' herdada da Grande Profetisa Kuzunoha."
52090-71 = "Ou seja, a batalha de sucessão é um ritual para herdar a 'Hyakuren'."
52090-72 = "Por isso, como Presidente do Hyakkaryouran, #né preciso ser capaz de manejar a 'Hyakuren' como se fosse uma extensão do próprio corpo."
52090-73 = "Mas... se é assim, então, #nmais do que ninguém, não há aluna mais adequada para ser presidente do que a Ayame..."
52090-74 = "Até mesmo na pontaria, não há ninguém que se compare a ela..."
52090-75 = "Isso, se o oponente for humano."
52090-81 = "...O que você estava enfrentando, Presidente?"
52090-87 = "Alguns dias antes de deixar o Hyakkaryouran, eu estava fazendo minha ronda habitual por Hyakkiyako."
52090-97 = "Talvez por ser logo após o festival, não havia uma alma viva nas ruas. #nAlém disso, por algum motivo, apenas naquele dia, as luzes da cidade piscavam de forma irregular."
52090-101 = "Enquanto continuava a ronda, ao chegar na ponte— #nvi uma aluna parada do outro lado."
52090-111 = "Cabelos loiros brilhantes e olhos roxos. #nE um uniforme branco com um haori azul-claro..."
52090-112 = "Ela tinha exatamente a mesma aparência que eu."
52090-113 = "Aquilo tinha até o meu rosto. Era como se eu estivesse olhando para um espelho."
52090-114 = "Mesmo com a aparência idêntica, ou melhor, justamente por ser idêntica— #npercebi por intuição que aquilo era uma existência diferente de mim."
52090-123 = "Aquilo olhou para mim e, como se estivesse esperando por mim, abriu um sorriso."
52090-124 = "Balas comuns não funcionam contra esse tipo de existência."
52090-128 = "Mas eu tinha a 'Hyakuren' em minhas mãos. #nPela primeira vez desde que me tornei presidente, apontei minha arma para uma entidade sobrenatural."
52090-142 = "Mas... não teve efeito nenhum."
52090-143 = "Aquilo continuou se aproximando, sem mudar nada em relação a antes de ser atingido..."
52090-156 = "……E assim, ela se dissolveu na escuridão da noite."
52090-157 = "Poderia ter sido apenas um sonho de uma noite... eu poderia ter deixado por isso mesmo. #nMas, para mim, naquela época, isso era impossível."
52090-160 = "“Por que o Hyakuren não funcionou?”"
52090-161 = "“Eu não tenho as qualificações? Ou será que o Hyakuren era falso?”"
52090-162 = "“Para começo de conversa, a Grande Profetisa Kuzunoha... ela realmente existe?”"
52090-165 = "Quase sendo esmagada pela ansiedade, fui até a grande planície nevada onde dizem que o Templo do Crepúsculo existia, apenas para ver a Srta. Kuzunoha com meus próprios olhos."
52090-166 = "É uma tolice, eu sei. Mas... se eu não fizesse isso, não conseguiria me perdoar."
52090-167 = "E então eu... falhei."
52090-168 = "O que encontrei foram apenas ruínas que pareciam ser o “Templo do Crepúsculo”."
52090-169 = "No fim, a Srta. Kuzunoha não apareceu diante de mim."
52090-175 = "……É só isso?"
52090-176 = "Sim."
52090-177 = "Ainda falta a parte mais importante, não é?"
52090-178 = "Sobre o braço da Nagusa-senpai... e as palavras que você disse quando desapareceu com o Clube Kacho Fugetsu."
52090-179 = "O braço da Nagusa...?"
52090-180 = "Ah... o que houve com essa bandagem? Você se machucou?"
52090-185 = "Isto é..."
52090-186 = "Ayame, você não se lembra? Você me encontrou na grande planície nevada, lembra?"
52090-187 = "A Nagusa na planície nevada...? Naquela época, havia uma nevasca terrível, então..."
52090-188 = "…………."
52090-189 = "Você realmente não se lembra?"
52090-190 = "De quando você afastou a mão da Nagusa-senpai e disse: “Nunca pensei em você como uma amiga”..."
52090-195 = "Eu nunca faria uma coisa dessas!"
52090-202 = "D-desculpe..."
52090-203 = "Mas eu jamais diria algo assim. A Nagusa sempre foi uma amiga muito importante para mim."
52090-204 = "Você não ouviu errado? Ou talvez tenha se confundido com outra pessoa..."
52090-205 = "É, é isso mesmo, não é...? A Ayame jamais faria algo assim..."
52090-206 = "Mesmo que a Nagusa-senpai aceite isso, eu não estou convencida."
52090-207 = "A presidente Ayame que eu conheço jamais diria algo assim... mas, enquanto você esteve fora, muitas coisas aconteceram."
52090-208 = "A presidente que desapareceu sem dizer nada e a vice-presidente que enfrentou a crise de Hyakkiyako... eu escolho acreditar na segunda."
52090-209 = "Se você quer que as coisas voltem a ser como eram, conte-me tudo o que aconteceu na planície nevada."
52090-211 = "Senpai..."
52090-215 = "Entendi. Bem, eu não tinha a intenção de esconder nada desde o início!"
52090-216 = "Mas podemos conversar depois que eu terminar de comer?"
52090-217 = "É um desperdício deixar comida no prato, sabe!"
52090-219 = "Próximo episódio: Memórias Incompletas"
