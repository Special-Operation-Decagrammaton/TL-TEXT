[translation]
10028025-9 = "はぁ、はぁ……はぁ……"
10028025-10 = "えっと、先生……"
10028025-11 = "これって……アレっすよね……"
10028025-12 = "そんなつもりじゃ、なかったっすけど……これって……"
10028025-13 = "[s1] \"仕方なかったとはいえ……\"\n[s2] \"乗務員と戦っちゃったね……\""
10028025-19 = "……はは。"
10028025-20 = "乗る列車を間違えた挙げ句、トラブルまで……"
10028025-21 = "どんどんダメな方向に進んでるっすね、コレ。#n……申し訳ないです、先生。"
10028025-22 = "……気にしなくて大丈夫、っすか？"
10028025-23 = "気持ちは嬉しいっすけど、私的にはちょっとあんまり……"
10028025-24 = "今回はなんとかなったけど、これで分かってもらえるとは思えないし……#nむしろ乗務員を敵に回しちゃったような……"
10028025-25 = "おい、こっちだ！！"
10028025-26 = "奴らに逃げ場はない！囲め！！"
10028025-43 = "やっぱこうなるっすよね……ははっ。"
10028025-47 = "んー……"
10028025-48 = "さすがにこれ以上やり合うのは無理があるっすね……先生の身も危ないんで。"
10028025-49 = "とりあえず、ここは大人しく拘束されるしかないっす。"
10028025-50 = "後はゲヘナに着いてから話し合いましょう。#n上手くいくかは分からないっすけど。"
10028025-51 = "[s3] \"それじゃあカバンは……。\"\n[s4] \"見た感じ、協力してくれなさそうだけど……\""
10028025-54 = "まあ、私もそれは不安っすけど……他に方法がないっすから。"
10028025-55 = "こんな時こそ、なるべく穏便に済ませないと……"
10028025-69 = "……ん？"
10028025-70 = "これ、何の音っすか……？"
10028025-81 = "……ん？何だ？おい、調べるぞ。"
10028025-82 = "ここじゃないな……後ろの車両か？"
10028025-83 = "後ろ？後ろってたしか……"
10028025-102 = "……「護送車両」じゃ？"
10028025-103 = "……！！！！！"
10028025-104 = "ちょっ、待っ――"
10028025-109 = "ゴホッ……！げほっげほっ、げほっ…！"
10028025-110 = "……こ、今度は爆発！？一体どうなってるんすか、この列車！？"
10028025-111 = "せ、先生……！大丈夫っすか、先生！？"
10028025-117 = "……怪我はないっすか？"
10028025-118 = "[s5] \"うん、大丈夫。\"\n[s6] \"イチカが守ってくれたから助かったよ、ありがとう。\""
10028025-121 = "ふぅ……良かった。"
10028025-122 = "というか……「護送車両」って言ってたのに、何で爆発が……？"
10028025-126 = "後ろの車両は、連結が外れて横転したっぽいし……"
10028025-127 = "私たちを捕えようとした車掌も一緒に……#nまぁ、助かったと言えば助かったっすけど。"
10028025-128 = "ふむ……おかしいぞ。いや、こんなものか？"
10028025-129 = "護送車両の連結がきれいに外れる目算だったが……なぜだ？"
10028025-133 = "……？人の声がするっすね。"
10028025-137 = "爆薬が足りなかったのか……？いや、そんなはずはない。#n……さてはこいつら、装甲を強化したな！"
10028025-138 = "ハハッ！何だ、思ったより頭を使うじゃないか。#n気に入ったぞ！ハーハッハッハッハ！"
10028025-139 = "[s7] \"この笑い方……\"\n[s8] \"聞き覚えが……\""
10028025-142 = "ん……おやおや？"
10028025-143 = "もしやと思ったが……本当に先生じゃあないか！"
10028025-150 = "これはこれは……まさかこんな場所で会うとは！"
10028025-151 = "今日は素晴らしい一日だな……ああ、とても気に入った！#nハーハッハッハッハ！"
10028025-152 = "フッ。となれば、自己紹介は不要だな。"
10028025-157 = "あなたは……？"
10028025-158 = "[s9] \"カスミ！？\"\n[s10] \"何でこんなところに……！？\""
10028025-161 = "先生の、知り合いっすか……？"
10028025-162 = "あれ……"
10028025-163 = "かすみ……かすみ……どっかで聞いたことあるような。"
10028025-164 = "ん～、もうギブアップか？もうちょっと頑張ってもらいたかったぞ。"
10028025-165 = "もうちょっと元気よくいこうじゃないか！#nせっかく劇的な出会いを果たしたんだ……フッフッフ。"
10028025-166 = "かすみ……カスミ……あ。"
10028025-167 = "[ruby=きぬがわ]鬼怒川[/ruby]、カスミ……？"
10028025-171 = "……ゲヘナの指名手配犯じゃないっすか。"
10028025-173 = "ハーハッハッハッハ！気付いてもらえるとはな！#n有名人にでもなったみたいで、気分がいいぞ！感謝する！！"
10028025-174 = "そ、それは何よりっす……はは。"
10028025-175 = "ならば、やはり自己紹介は不要だな。#n……で、それよりもだ。"
10028025-176 = "先生は何用で、わざわざこんな僻地に？"
10028025-182 = "それもこんな可愛らしい、トリニティのお嬢ちゃんと？"
