[translation]
10028025-9 = "Haa, haa... haa..."
10028025-10 = "Ei, Sensei..."
10028025-11 = "Isso é... aquilo, né..."
10028025-12 = "Eu não tinha a intenção de que fosse assim, mas... isso é..."
10028025-13 = "[s1] \"Embora não houvesse outra escolha...\"\n[s2] \"Nós acabamos lutando contra os tripulantes...\""
10028025-19 = "...Haha."
10028025-20 = "Além de pegar o trem errado, ainda nos metemos em problemas..."
10028025-21 = "As coisas estão indo de mal a pior, né. #n...Sinto muito, Sensei."
10028025-22 = "...Não precisa se preocupar, está bem?"
10028025-23 = "Eu agradeço o sentimento, mas, pessoalmente, não acho que seja o ideal..."
10028025-24 = "Desta vez conseguimos dar um jeito, mas não acho que eles vão entender... #nNa verdade, parece que transformamos os tripulantes em nossos inimigos..."
10028025-25 = "Ei, é por aqui!!"
10028025-26 = "Eles não têm para onde fugir! Cerquem-nos!!"
10028025-43 = "É, acabou acontecendo isso mesmo... haha."
10028025-47 = "Hmm..."
10028025-48 = "Realmente não dá para continuar lutando... a segurança do Sensei está em risco."
10028025-49 = "Por enquanto, não temos escolha a não ser nos deixar prender pacificamente."
10028025-50 = "Depois conversamos quando chegarmos em Gehenna. #nNão sei se vai dar certo, mas..."
10028025-51 = "[s3] \"E quanto à mala...\"\n[s4] \"Pelo visto, eles não parecem dispostos a cooperar...\""
10028025-54 = "Bem, eu também estou preocupada com isso, mas... não temos outra opção."
10028025-55 = "É nessas horas que precisamos resolver as coisas da forma mais pacífica possível..."
10028025-69 = "...Hm?"
10028025-70 = "Que barulho é esse...?"
10028025-81 = "...Hm? O que foi? Ei, vamos investigar."
10028025-82 = "Não é aqui... será que é no vagão de trás?"
10028025-83 = "Atrás? Atrás, se não me engano..."
10028025-102 = "...Não é o \"vagão de escolta\"?"
10028025-103 = "...!!!!!"
10028025-104 = "Ei, espere—"
10028025-109 = "Cof...! Cof, cof, cof...!"
10028025-110 = "...E-e agora uma explosão!? O que está acontecendo com este trem!?"
10028025-111 = "S-Sensei...! Você está bem, Sensei!?"
10028025-117 = "...Você se machucou?"
10028025-118 = "[s5] \"Sim, estou bem.\"\n[s6] \"Graças a você que me protegeu, Ichika, estou salvo. Obrigado.\""
10028025-121 = "Ufa... que bom."
10028025-122 = "Digo... disseram que era um \"vagão de escolta\", então por que a explosão...?"
10028025-126 = "Parece que o vagão de trás se soltou do engate e tombou..."
10028025-127 = "E o condutor que tentou nos capturar também estava lá... #nBem, se é que podemos dizer que tivemos sorte."
10028025-128 = "Hum... estranho. Ou será que era para ser assim?"
10028025-129 = "O plano era soltar o engate do vagão de escolta perfeitamente... mas por quê?"
10028025-133 = "...? Estou ouvindo vozes."
10028025-137 = "Faltou explosivo...? Não, não pode ser. #n...Será que eles reforçaram a blindagem!?"
10028025-138 = "Haha! Ora, ora, vocês são mais espertos do que eu pensava. #nGostei disso! Hahaha!"
10028025-139 = "[s7] \"Essa risada...\"\n[s8] \"Eu me lembro dela...\""
10028025-142 = "Hm... ora, ora?"
10028025-143 = "Eu achei que pudesse ser, mas... é realmente o Sensei!"
10028025-150 = "Isso é... quem diria que nos encontraríamos em um lugar como este!"
10028025-151 = "Hoje é um dia maravilhoso... ah, eu adorei! #nHahaha!"
10028025-152 = "Hum. Sendo assim, não precisamos de apresentações."
10028025-157 = "Quem é você...?"
10028025-158 = "[s9] \"Kasumi!?\"\n[s10] \"Por que você está em um lugar como este...!?\""
10028025-161 = "Sensei, você a conhece...?"
10028025-162 = "Hmm..."
10028025-163 = "Kasumi... Kasumi... Acho que já ouvi esse nome em algum lugar."
10028025-164 = "Hmm, já vai desistir? Eu esperava que você se esforçasse um pouco mais."
10028025-165 = "Vamos lá, anime-se um pouco!#nJá que tivemos um encontro tão dramático... Hehehe."
10028025-166 = "Kasumi... Kasumi... Ah."
10028025-167 = "Kinugawa Kasumi...?"
10028025-171 = "...Ela não é uma criminosa procurada de Gehenna?"
10028025-173 = "Hahahaha! Fico feliz que tenha notado!#nÉ como se eu fosse uma celebridade, sinto-me muito bem! Agradeço a você!!"
10028025-174 = "I-isso é bom, suponho... haha."
10028025-175 = "Sendo assim, apresentações são desnecessárias.#n...Mas, deixando isso de lado."
10028025-176 = "Sensei, o que o traz a um lugar tão remoto?"
10028025-182 = "E ainda por cima acompanhado de uma garotinha tão adorável da Trinity?"
