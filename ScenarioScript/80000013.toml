[translation]
80000013-1 = "チョコレートの海"
80000013-2 = "（ホシノと一緒に市内のパトロール中、小さな海洋博物館を発見した）"
80000013-3 = "（ホシノが静かに目をキラキラさせていたので、博物館に入ってしばらく見て回ってから出てきた）"
80000013-5 = "D.U.・海洋博物館前"
80000013-6 = "まさか、こんなところに海洋博物館があったなんてね～。"
80000013-7 = "規模はそんなに大きくないけど、久しぶりに色んな魚が見られて楽しかった。"
80000013-8 = "それにほとんど誰もいなくて、ゆっくりお魚が見られたしね。うへへ。"
80000013-9 = "[s] \"楽しかったならよかった。\""
80000013-10 = "うん。あっ……あれ、売店？"
80000013-14 = "先生、見て！この海洋博物館で展示中の魚モチーフのチョコレートセットだって！"
80000013-18 = "これはヒトデで、これはフグ……"
80000013-23 = "これは鯨かな？お～、可愛い！"
80000013-24 = "……あれ？でもこの水族館にたしか鯨はいなかったよね？"
80000013-25 = "どうして鯨の型のチョコレートが入ってるんだろう……。"
80000013-26 = "[s1] \"何はともあれ鯨は可愛いから、とか？\"\n[s2] \"会社的な都合とか……？\""
80000013-27 = "まあ確かに……先生の言う通り、鯨は可愛い生き物だからね。"
80000013-28 = "こういう可愛いチョコレートを作るなら絶対に欠かせないよね。うへ。"
80000013-29 = "うへ、そっかー……。"
80000013-30 = "このおじさんにはそういうの、よく分からないなー……。"
80000013-31 = "まあとにかく、これぐらいは記念に買っても良いかな。"
80000013-36 = "さっ、先生。もらって。"
80000013-37 = "先生にも記念に一個あげるね。"
80000013-38 = "[s] \"鯨の……これ貰っても良いの？\""
80000013-39 = "うん、貰ってもらって。"
80000013-40 = "悲しいことに味はみんな同じだから、お腹の中に入ったら関係ないって。うへへ。"
80000013-41 = "もちろん鯨の型の記念品に一番愛着がわくのは事実だけど……"
80000013-42 = "だからこそ、先生に貰ってほしい。"
