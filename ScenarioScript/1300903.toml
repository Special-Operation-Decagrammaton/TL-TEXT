[translation]
1300903-1 = "Método de Treinamento da Tsubaki: Edição de Equipamentos"
1300903-3 = "[ns1] \"Então, eu vi a mensagem e vim...\n[ns2] \"Qual é a situação?\""
1300903-4 = "Isso aqui..."
1300903-5 = "Isso aqui..."
1300903-8 = "(O que a Tsubaki me mostrou era um travesseiro esfarrapado, quase sem enchimento nenhum)"
1300903-9 = "[s] \"...Um travesseiro?\""
1300903-10 = "Não é, Sensei. Não é um travesseiro, é um equipamento do Clube de Treinamento. É um item de treino legítimo."
1300903-11 = "Eu usei ele o tempo todo até agora. Mas ontem à noite, durante a patrulha, eu acabei balançando ele com um pouco de força demais..."
1300903-12 = "Eu guardava ele dentro do meu escudo, mas acabou ficando nesse estado..."
1300903-13 = "[s] \"Você sempre guardava ele dentro do escudo...\""
1300903-14 = "A gente tem que manter o equipamento de treino sempre por perto, não tem?"
1300903-15 = "Por isso, Sensei, eu queria comprar um novo."
1300903-16 = "Você pode vir comigo comprar? Por favor?"
1300903-17 = "[s] \"Sim, tudo bem.\""
1300903-18 = "Hehe, obrigada, Sensei!"
1300903-20 = "Supermercado Ponpoko de Hyakkiyako"
1300903-22 = "[ns] \"Falando nisso, que tipo de travesseiro você pretende comprar?\""
1300903-23 = "Sensei. Não é um travesseiro, é um equipamento de treino."
1300903-24 = "Já que estamos aqui, quero ouvir a sua opinião sobre qual seria o melhor."
1300903-25 = "O mundo dos equipamentos de treino é profundo, sabe?"
1300903-26 = "Travesseiros de madeira são duros e dividem opiniões, mas quando você se acostuma, é tão confortável que não dá mais para largar."
1300903-27 = "Os de plumas te levam direto para o mundo dos sonhos no momento em que você encosta a cabeça..."
1300903-28 = "Os de espuma com memória são difíceis de descartar pela estabilidade, já que me apoiam da mesma forma em qualquer lugar e a qualquer momento."
1300903-29 = "[s] \"A Tsubaki, que geralmente é tão relaxada, está tão empenhada...\""
1300903-30 = "Bem, eu sou a presidente do Clube de Treinamento, né...?"
1300903-31 = "Para me dedicar ao treinamento de verdade, não posso escolher meu equipamento de qualquer jeito."
1300903-32 = "Vamos lá, vamos dar mais uma volta pela loja."
1300903-34 = "(Enquanto caminhava pela loja com a Tsubaki, continuei procurando por...)"
1300903-35 = "(...que tipo de equipamento de treino seria bom.)"
1300903-38 = "[ns3] \"O que acha deste? Dizem que é um travesseiro de látex de baixa resiliência,\"\n[ns4] \"algo nunca visto antes, que alivia o cansaço do pescoço.\""
1300903-39 = "Hmm, não é ruim, mas..."
1300903-40 = "Hmm, não é ruim, mas..."
1300903-41 = "[s] \"Não é ruim, mas?\""
1300903-42 = "Talvez seja um pouco... comum demais?"
1300903-43 = "O que você acha, Sensei? Acha que devo decidir por este?"
1300903-44 = "[s] \"Nessas horas, talvez seja bom definir prioridades.\""
1300903-45 = "Prioridades...?"
1300903-46 = "[s5] \"O que é mais importante no seu treinamento, Tsubaki?\"\n[s6] \"E o que você mais busca nele?\""
1300903-47 = "O que é mais importante e o que eu mais busco..."
1300903-48 = "O que é mais importante e o que eu mais busco..."
1300903-49 = "...Entendi."
1300903-50 = "...Depois de ouvir isso, acho que entendi um pouco."
1300903-51 = "Bem... eu sou a presidente do Clube de Treinamento."
1300903-52 = "Por isso, sinto que preciso me esforçar mais no treino para ser um exemplo para os outros membros..."
1300903-53 = "Então, quero fazer um treinamento que faça jus a isso."
1300903-54 = "[s] \"...Então é isso que é importante para você.\""
1300903-55 = "Sim, por isso, em vez de continuar levando as coisas de um jeito relaxado..."
1300903-56 = "Talvez seja melhor ter um espírito mais desafiador e tentar algo ousado que nunca fiz antes...?"
1300903-57 = "[s] \"Um desafio ousado... o que quer dizer com isso?\""
1300903-58 = "Em vez de um equipamento comum..."
1300903-62 = "Por exemplo... olha, Sensei. O que acha disto? Um equipamento de treinamento do tipo que você abraça para dormir."
1300903-63 = "[s] \"Um equipamento de treinamento do tipo que você abraça para dormir?\""
1300903-64 = "Sim, embora eu ache o tamanho um pouco exagerado."
1300903-65 = "Hm? Aqui, nos detalhes, diz: \"Incluímos a ilustração de corpo inteiro de sua preferência\"..."
1300903-66 = "Hmm? Por que um travesseiro... quer dizer, um equipamento de treinamento, precisaria disso...?"
1300903-67 = "[s] \"V-vamos escolher outro!\""
1300903-68 = "Não é bom o suficiente?"
1300903-69 = "Ah, tem este aqui também, Sensei."
1300903-70 = "Um equipamento de treinamento com \"SIM\" escrito na frente e \"NÃO\" atrás."
1300903-71 = "[s] \"Tsubaki, isso é...!\""
1300903-73 = "Tcharam. Olha, Sensei. Sensei, você está se esforçando no treinamento?"
1300903-74 = "[s7] \"...S-sim!\"\n[s8] \"Não! Não!\""
1300903-75 = "...? Sensei, você parece estar suando muito, está tudo bem?"
1300903-76 = "...? Sensei, você parece estar suando muito, está tudo bem?"
1300903-77 = "É um travesseiro popular entre recém-casados? Hmm~?"
1300903-79 = "Ah, Sensei, Sensei. Olha só este travesseiro. Diz que é um travesseiro Peroro para usar como armadilha em combate."
1300903-80 = "[s] \"Você já nem chama mais de equipamento de treinamento, está chamando de travesseiro mesmo, não é!?\""
1300903-82 = "Sensei, olhe este aqui também."
1300903-84 = "Ah, Sensei, este aqui também."
1300903-86 = "(Por um tempo, continuei procurando por vários equipamentos de treinamento... ou melhor, travesseiros, com a Tsubaki)"
1300903-88 = "[ns] \"Acabou ficando tarde sem a gente decidir nada.\""
1300903-89 = "É, verdade... bocejo, hum..."
1300903-90 = "[s9] \"Tsubaki, você parece com sono.\"\n[s10] \"O que acha de descansarmos um pouco aqui?\""
1300903-91 = "Sim, então, vou aceitar sua gentileza..."
1300903-92 = "Sim, então, vou aceitar sua gentileza..."
1300903-93 = "[s] \"Ei? Aquela... T-Tsubaki?\""
1300903-97 = "[s] \"Ei... Tsubaki-chan?\""
1300903-98 = "Hum... mumu..."
1300903-99 = "...Assim, usando o colo do Sensei como travesseiro,"
1300903-100 = "Acho que entendi..."
1300903-101 = "O melhor travesseiro estava bem aqui perto, né..."
1300903-103 = "[s] \"A-alô?\""
1300903-104 = "..."
1300903-105 = "[s] \"Tsubaki-chan...?\""
1300903-107 = "Zzz..."
1300903-109 = "(Depois disso, o sol se pôs e a Tsubaki não acordou até que minhas pernas ficassem dormentes)"
