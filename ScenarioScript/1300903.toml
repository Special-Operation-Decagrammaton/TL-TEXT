[translation]
1300903-1 = "ツバキの修行法：道具編"
1300903-3 = "[ns1] \"で、メッセージを見て来たんだけど……。\"\n[ns2] \"どういう状況？\""
1300903-4 = "これ……。"
1300903-5 = "これ……。"
1300903-8 = "（ツバキが見せてくれたのは、ボロボロになってほとんど綿が抜けてしまった枕だった）"
1300903-9 = "[s] \"……枕？\""
1300903-10 = "違うよ、先生。枕じゃなくて私たち修行部の備品。れっきとした修行道具だよ。"
1300903-11 = "今までずっと使ってたのに。昨日の夜、パトロールをした時にちょっと激しく振り回しちゃって……。"
1300903-12 = "盾の中に入れてたんだけど、こんなにボロボロになっちゃった……。"
1300903-13 = "[s] \"いつも盾の中で保管してたんだ……。\""
1300903-14 = "修行道具は、肌身離さず持ってないといけないでしょ？"
1300903-15 = "だから先生、新しいのを買いたくって。"
1300903-16 = "一緒に、買いに行ってくれない？ね？"
1300903-17 = "[s] \"うん、いいよ。\""
1300903-18 = "ふふっ、ありがと～先生～。"
1300903-20 = "百鬼夜行の大型スーパー・ぽんぽこ"
1300903-22 = "[ns] \"そういえば、どんな枕を買う予定なの？\""
1300903-23 = "先生。枕じゃなくて、修行道具。"
1300903-24 = "せっかくだから、どういうのがいいのか、先生の意見も聞きたいな。"
1300903-25 = "修行道具の世界は深遠だからね～。"
1300903-26 = "木の枕は硬いし好き嫌いが分かれるけど、これがまた慣れるとすごく気持ちよくて、手放せなくなるんだ～。"
1300903-27 = "羽毛のは頭を乗せた瞬間に、夢の国に行けるし……。"
1300903-28 = "形状記憶のやつは、どんな場所、どんな時でも同じように私を支えてくれるその安定感で捨てがたいな～。"
1300903-29 = "[s] \"普段はのんびり屋さんのツバキが、こんなに熱心に……。\""
1300903-30 = "うーん、修行部の部長だし……？"
1300903-31 = "しっかり修行に精進するためにも、道具選びをいい加減にするわけにはいかないからね～。"
1300903-32 = "さあ、もっと売り場を回ってみよう。"
1300903-34 = "（しばらくツバキと一緒に売り場を回りながら、枕……ではなく）"
1300903-35 = "（どんな修行道具が良さそうか、探し続けた）"
1300903-38 = "[ns3] \"これはどう？首の疲れを癒してくれる、\"\n[ns4] \"今までに無かった低反発ラテックス枕だって。\""
1300903-39 = "うーん、確かに悪くないけど……。"
1300903-40 = "うーん、確かに悪くないけど……。"
1300903-41 = "[s] \"悪くないけど？\""
1300903-42 = "ちょっと……無難かも？"
1300903-43 = "先生はどう？これに決めちゃっていいと思う？"
1300903-44 = "[s] \"こういう時は、優先順位をつけるのが良いかも。\""
1300903-45 = "優先順位……？"
1300903-46 = "[s5] \"ツバキの修行で、一番大事なことは何か。\"\n[s6] \"それから、ツバキが一番求めていることは何か。\""
1300903-47 = "一番大事なことと、一番求めていること……。"
1300903-48 = "一番大事なことと、一番求めていること……。"
1300903-49 = "……うん。"
1300903-50 = "……それを聞いて、ちょっと分かったかも。"
1300903-51 = "えっと……私は、修行部の部長。"
1300903-52 = "だから、部員たちの模範になるためにも、もっと頑張って修行をしなきゃいけない、って思ってる……。"
1300903-53 = "だから、それに恥じない修行がしたい。"
1300903-54 = "[s] \"……それが、大事なことなんだね。\""
1300903-55 = "うん、だからこのままただ気楽に過ごすよりも……。"
1300903-56 = "もっと挑戦する意識をもって、今までになかったような大胆な挑戦をしてみるのが良いかも……？"
1300903-57 = "[s] \"大胆な挑戦……というと？\""
1300903-58 = "普通の道具じゃなくて……。"
1300903-62 = "例えば……ほら、先生。これはどう？抱いて寝るタイプの修行道具。"
1300903-63 = "[s] \"抱いて寝るタイプの修行道具？\""
1300903-64 = "うん、ちょっと大きいのが気になるけど。"
1300903-65 = "ん？ここ、詳細欄に「ご希望の全身イラストをお入れします」って書いてある……。"
1300903-66 = "んー？枕……じゃなくて、修行道具にどうしてこういうのが必要なんだろ……？"
1300903-67 = "[s] \"べ、別のにしよう！\""
1300903-68 = "イマイチかな？"
1300903-69 = "あ、こんなのもあるよ、先生。"
1300903-70 = "表にYES、裏にNOって書かれた修行道具。"
1300903-71 = "[s] \"ツバキ、それは……！\""
1300903-73 = "じゃん。ほら、先生。先生は修行を頑張っていますか？"
1300903-74 = "[s7] \"……イ、イエス！\"\n[s8] \"ノー！ノー！\""
1300903-75 = "……？先生、なんだかものすごく汗かいてるみたいだけど、大丈夫？"
1300903-76 = "……？先生、なんだかものすごく汗かいてるみたいだけど、大丈夫？"
1300903-77 = "新婚夫婦の間で人気の枕、なの？へえ～？"
1300903-79 = "あっ、先生先生。見て、この枕。戦闘で使う、トラップ用ペロロ枕だって。"
1300903-80 = "[s] \"もう修行道具じゃなくて、完全に枕って呼んでない！？\""
1300903-82 = "先生、こっちも見て。"
1300903-84 = "あっ、先生、これもこれも。"
1300903-86 = "（しばらくそうして、ツバキと色々な修行道具……じゃなくて、枕を探し回った）"
1300903-88 = "[ns] \"決めきれないまま、暗くなっちゃったね。\""
1300903-89 = "うん、そうだね……ふあぁ、ん……。"
1300903-90 = "[s9] \"ツバキ、眠そうだね。\"\n[s10] \"どうしよっか、ここでちょっと休んでいく？\""
1300903-91 = "うん、それじゃあ、お言葉に甘えて……。"
1300903-92 = "うん、それじゃあ、お言葉に甘えて……。"
1300903-93 = "[s] \"えっ？あの……つ、ツバキ？\""
1300903-97 = "[s] \"あの……ツバキちゃーん？\""
1300903-98 = "んー……むにゃむにゃ。"
1300903-99 = "……こうして、先生に膝枕をしてもらって、"
1300903-100 = "分かっちゃったかも……。"
1300903-101 = "最高の枕は、すぐ近くにあったんだ、ね……。"
1300903-103 = "[s] \"あ、あのー？\""
1300903-104 = "……。"
1300903-105 = "[s] \"ツバキちゃーん……？\""
1300903-107 = "ぐぅ……。"
1300903-109 = "（その後、日が沈んで両足が痺れるまで、ツバキは起きなかった）"
