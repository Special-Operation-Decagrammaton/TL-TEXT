[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
1014503-1 = "Tirando a Coroa"
1014503-2 = "Olá, Sensei!!"
1014503-3 = "[s1] \"Kisaki!?\"\n[s2] \"Kiki!?\""
1014503-4 = "Kisaki...? A Kiki não sabe quem é essa pessoa!"
1014503-5 = "Sim! É a Kiki!"
1014503-6 = "Hoje eu decidi incorporar o espírito da Kiki!"
1014503-7 = "[s] \"Entendi... Conto com você.\""
1014503-8 = "A Kiki tá muuuito feliz de ver o Sensei hoje!"
1014503-9 = "Do que a gente vai brincar primeiro!?"
1014503-10 = "É uma chance muito rara! Se a gente não se divertir até o limite, a gente vai perder muito!"
1014503-11 = "[s] \"E o que a Kiki quer fazer?\""
1014503-12 = "Então――"
1014503-13 = "A Kiki quer brincar na água!!"
1014503-15 = "Uaaahh~~! O rio~~!!"
1014503-16 = "Eh? Nadar...?"
1014503-17 = "Ehrr... a Kiki não é muito boa em nadar!\nEntão――"
1014503-18 = "Você vai ficar coladinho do meu lado, não vai?"
1014503-19 = "[s] \"U-Uhum...!\""
1014503-20 = "Yaaay!"
1014503-29 = "(E então eu fiquei vigiando e protegendo a Kiki enquanto ela se divertia na água)"
1014503-30 = "(Até que... de repente...!)"
1014503-32 = "[ns] \"...Kiki?\""
1014503-34 = "[ns] (A Kiki sumiu!!)"
1014503-36 = "Eiii! Você abaixou a guarda!!"
1014503-42 = "[ns] \"Pffhh!!?\""
1014503-43 = "Ahahaha! Consegui!"
1014503-44 = "A Kiki pode não ser boa em nadar, mas sou craque em mergulhar!\nToma essa, toma essa!"
1014503-45 = "[s] \"Sua danadinha~~!\""
1014503-46 = "Kyaa~! O Sensei vai engolir a Kiki~!"
1014503-48 = "(Eu a capturei pelos braços e a coloquei em cima dos meus ombros)"
1014503-53 = "Uaaah! Tô no alto!"
1014503-54 = "Sensei! Brinca de 'joga pro alto' comigo!"
1014503-55 = "Ué, você não sabe o que é?"
1014503-56 = "Você pega a Kiki... joga com toda a força lá pro céu, e me pega de volta!"
1014503-57 = "Não pode porque é perigoso...?\nUgh... Poxa, tá bom..."
1014503-58 = "Certo... a Kiki entendeu..."
1014503-60 = "Muito bem... devagarinho..."
1014503-64 = "Sensei! Peguei um peixinho!"
1014503-66 = "(Um pequeno peixe prateado estava nadando na piscininha que a Kiki fez com as mãos juntas)"
1014503-68 = "Ahaha! Fica fazendo cócegas!"
1014503-69 = "Acho que a Kiki consegue entender o sentimento de quem quer cuidar de um peixinho agora!"
1014503-70 = "Mas, eu não posso levar ele pra casa, então..."
1014503-71 = "Tchauzinho, até a próxima."
1014503-75 = "Uau, ele sumiu rapidinho!"
1014503-76 = "Ah, kuh, fufu... Achei que a minha perna tava coçando, mas tem um monte deles aqui em volta!"
1014503-77 = "Tomem cuidado, viu, peixinhos~\nSenão a Kiki vai acabar pegando vocês que nem aquele outro de agora há pouco!"
1014503-78 = "Mas você vai soltar eles de novo de qualquer jeito, né? Foi o que o Sensei disse?\nSim, mas é claro!"
1014503-80 = "Sensei, Sensei, parece que a gente pode alugar bicicletas aqui!"
1014503-81 = "A Kiki... queria andar juntinho na mesma bicicleta com o Sensei.\n......Não pode?"
1014503-82 = "[s] \"Me parece ótimo. Fazer um pouco de exercício também é bom.\""
1014503-83 = "Yaaay! Vamos rodar por aí pra ver as coisas!"
1014503-85 = "Ah, Sensei! Tem um monte de crianças brincando com água lá na frente!"
1014503-86 = "Aquela ali não tá olhando pra gente?"
1014503-87 = "Será que eles querem que a gente brinque junto? Se for assim, então vou atacar primeiro――!"
1014503-91 = "Kyaah!?"
1014503-92 = "M-Mas o que foi isso..."
1014503-96 = "Então isso é uma declaração de guerra, né!?"
1014503-97 = "O que foi? Tá com medinho, tá com medinho?"
1014503-98 = "Se não gostou, então vem com tudo pra cima de mim!"
1014503-99 = "Sensei..."
1014503-100 = "[s] \"Kiki.\""
1014503-104 = "[ns] \"Pode acabar com eles!!\""
1014503-105 = "......!"
1014503-106 = "Pode deixar comigo!"
1014503-110 = "Hah, é muito rápido!? Então vocês querem entrar num combate a curta distância, é isso!"
1014503-111 = "Preparem-se, hein~!"
1014503-112 = "Gostei da atitude! Podem vir com tudo!"
1014503-114 = "(......A Kiki estava se divertindo loucamente)"
1014503-115 = "(E antes que eu percebesse, ela já tinha virado a líder absoluta do grupinho das crianças)"
1014503-118 = "O que a Kiki faz agora... Eu quero comer isso, e isso, e aquilo ali também."
1014503-119 = "Mas eu não posso comprar todos eles... O meu estômago não é tão grande.\nDizem que a gente recebe um castigo divino se deixar comida sobrando no prato..."
1014503-120 = "[s] \"Pode comprar, o que sobrar eu engulo tudo pra você.\""
1014503-121 = "Sério? Então a Kiki vai acabar comprando tudinho mesmo, hein!?"
1014503-122 = "Sensei, vamos nessa!!"
1014503-124 = "(Demos a volta nas barraquinhas, e a Kiki comprou uma montanha literal de doces e petiscos)"
1014503-125 = "(Mas a história de eu ter precisado tomar um antiácido forte mais tarde fica pra outra hora)"
1014503-127 = "Fuuu~... Estou perfeitamente satisfeita!"
1014503-128 = "A Kiki nunca, nunquinha vai esquecer do dia de hoje!"
1014503-129 = "[s] \"Que bom que você se divertiu tanto.\""
1014503-130 = "Muito obrigada por ter brincado com a Kiki hoje!"
1014503-131 = "E também..."
1014503-132 = "......"
1014503-136 = "Eu também acabei presenciando uma faceta sua\nque não conhecia, Sensei."
1014503-137 = "E você estava esplendidamente adorável, sabe?"
1014503-138 = "[ns] \"......!?!?!\""
1014503-140 = "[ns] \"Kisaki!?\""
1014503-141 = "Kisaki? De quem você tá falando? A Kiki não faz ideia de quem seja!"
1014503-142 = "É por isso que a Kiki vai――"
1014503-146 = "Ué......?"
1014503-151 = "[ns] \"!?!?\""
1014503-154 = "(Peguei a Kisaki nos braços às pressas e corri em direção ao quarto do hotel)"
1014503-158 = "......Perdoe as minhas atitudes, Sensei."
1014503-159 = "Parece que acabei exagerando e perdendo a linha."
1014503-160 = "[s] \"Você está bem mesmo...?\""
1014503-161 = "Não se preocupe tanto. Eu sei muito bem os limites do meu próprio corpo."
1014503-162 = "Porém... acho que essa é a nossa deixa para encerrar por hoje."
1014503-163 = "[s] \"Você jura que está tudo bem?\""
1014503-164 = "As minhas palavras são tão dignas de dúvida aos seus olhos?"
1014503-165 = "Umu? Quer saber se tem algo que você pode fazer por mim?"
1014503-166 = "Hmm, deixe-me ver..."
1014503-170 = "A Kiki acha que, se o Sensei ficar aqui do meu ladinho... vou conseguir dormir profundamente..."
1014503-171 = "[s] \"Pode deixar.\""
1014503-172 = "Muito obrigada...... Sensei."
1014503-174 = "(E então eu fiquei vigiando, segurando a mão da Kisaki――)"
1014503-175 = "(Não, da Kiki... até ela finalmente adormecer de vez)"