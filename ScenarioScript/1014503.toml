[translation]
1014503-1 = "タガを外して"
1014503-2 = "こんにちは、先生！！"
1014503-3 = "[s1] \"キサキ！？\"\n[s2] \"キキ！？\""
1014503-4 = "キサキ……？キキよく分かんないです！"
1014503-5 = "はい！キキです！"
1014503-6 = "今日はキキの気分なんです！"
1014503-7 = "[s] \"そっか……よろしくね。\""
1014503-8 = "キキ、先生に会えてすごく嬉しいです！"
1014503-9 = "今日は何して遊びましょうか！"
1014503-10 = "滅多にない機会！楽しまないと損ですよね！"
1014503-11 = "[s] \"キキは何がしたい？\""
1014503-12 = "じゃあ――"
1014503-13 = "水遊びがしたいです！！"
1014503-15 = "わあ～～！川だ～！！"
1014503-16 = "えっ？水泳、ですか……？"
1014503-17 = "えぇっと……キキ、泳ぐのは苦手です！#nだから――"
1014503-18 = "傍に居てくれますよね？"
1014503-19 = "[s] \"う、うん……！\""
1014503-20 = "わーい！"
1014503-29 = "（そうしてキキの楽しそうな姿を見守った）"
1014503-30 = "（と、その時……！）"
1014503-32 = "[ns] \"……キキ？\""
1014503-34 = "[ns] （キキがいない！！）"
1014503-36 = "えいっ！隙ありっ！！"
1014503-42 = "[ns] \"ぶはっ！！？\""
1014503-43 = "あはははっ！やりました！"
1014503-44 = "キキ、泳ぐのは苦手でも潜るのは得意なんです！#nうりゃっ、うりゃっ！"
1014503-45 = "[s] \"こいつぅ～～！\""
1014503-46 = "きゃ～！先生に食べられちゃいます～！"
1014503-48 = "（キキを捕まえて肩車をしてあげた）"
1014503-53 = "わー！たかーい！"
1014503-54 = "先生！「たかいたかい」してください！"
1014503-55 = "え、知らないんですか？"
1014503-56 = "キキを持ち上げて……空に向かって思いっきり投げたら、キャッチです！"
1014503-57 = "危ないからダメ……？#nう……でも……。"
1014503-58 = "はい……分かりました……。"
1014503-60 = "よし……そーっと……。"
1014503-64 = "先生！メダカを捕まえました！"
1014503-66 = "（キキが手で作ったお皿の中を、メダカが泳ぎ回っていた）"
1014503-68 = "あははっ！くすぐったい！"
1014503-69 = "メダカを飼う人の気持ち、キキも分かる気がします！"
1014503-70 = "ですが、連れて帰るわけにはいかないので……。"
1014503-71 = "バイバイ、またね。"
1014503-75 = "わあ、もう見えなくなっちゃいました！"
1014503-76 = "あっ、くふっ、ふふっ……脚がくすぐったいと思ったら、他にもいっぱい居ました！"
1014503-77 = "みんな気をつけるんだよ～？#nさっきの子みたいに、キキが捕まえちゃうかも！"
1014503-78 = "それでもまた逃がしてあげるんでしょ？ですか？#nはいっ、もちろんです！"
1014503-80 = "先生先生、ここで自転車を借りられるみたいです！"
1014503-81 = "キキ……先生と一緒に乗りたいです。#n……ダメですか？"
1014503-82 = "[s] \"いいね、健康にもよさそうだ。\""
1014503-83 = "わーい！いろんなところ見に行きましょう！"
1014503-85 = "あっ、先生！あっちで子どもが水遊びをしてます！"
1014503-86 = "あの子、こっち見てない？"
1014503-87 = "混ざりたいのかな？そんなら、こっちから――！"
1014503-91 = "きゃあっ！？"
1014503-92 = "こ、これは……。"
1014503-96 = "宣戦布告ですね！？"
1014503-97 = "ビビった？ビビった？"
1014503-98 = "悔しかったらかかっておいでー！"
1014503-99 = "先生……。"
1014503-100 = "[s] \"キキ。\""
1014503-104 = "[ns] \"頑張れ！！\""
1014503-105 = "……！"
1014503-106 = "はいっ！"
1014503-110 = "はっ、速い！？接近戦に持ち込もうってのか！"
1014503-111 = "覚悟してくださいね～！"
1014503-112 = "気に入ったぁ！かかってきな！"
1014503-114 = "（……キキは楽しそうに遊んでいた）"
1014503-115 = "（そしていつの間にか、グループをまとめ上げていた）"
1014503-118 = "どうしましょう……キキ、あれもこれも食べたいです。"
1014503-119 = "でも、全部買うわけには……キキ、そんなに食べれません。#n食べ物を残したら罰が当たるって……。"
1014503-120 = "[s] \"残ったら私が食べてあげるよ。\""
1014503-121 = "本当ですか？それなら本当に全部買っちゃいますよ！？"
1014503-122 = "先生、行きましょう！！"
1014503-124 = "（商店を回って、キキはおやつを山盛り買った）"
1014503-125 = "（後で胃薬が必要になったのは別の話である）"
1014503-127 = "ふぅ～……大満足！"
1014503-128 = "キキ、今日のことは絶対に忘れません！"
1014503-129 = "[s] \"それはよかった。\""
1014503-130 = "今日はキキと遊んでくれてありがとうございます！"
1014503-131 = "それと……。"
1014503-132 = "……。"
1014503-136 = "妾の知らぬ、其方の様子も見れたからの。"
1014503-137 = "なかなかに可愛らしかったぞ？"
1014503-138 = "[ns] \"……！？！？\""
1014503-140 = "[ns] \"キサキ！？\""
1014503-141 = "キサキ？誰のことですか？キキよく分かりません！"
1014503-142 = "だからキキ――"
1014503-146 = "あれ……？"
1014503-151 = "[ns] \"！？！？\""
1014503-154 = "（急いでキサキを抱えて部屋に移動した）"
1014503-158 = "……すまないの、先生。"
1014503-159 = "つい羽目を外しすぎたようじゃ。"
1014503-160 = "[s] \"大丈夫なんだよね……？\""
1014503-161 = "そう心配するな。自分のことはある程度分かっておる。"
1014503-162 = "ただ……今日はここらで仕舞いじゃな。"
1014503-163 = "[s] \"本当……なんだよね？\""
1014503-164 = "妾の言葉はそれほどに信用ならないかえ？"
1014503-165 = "うむ？先生にできることか？"
1014503-166 = "そうじゃの……。"
1014503-170 = "キキ、先生が傍にいてくれたら、よく眠れそうです……。"
1014503-171 = "[s] \"分かった。\""
1014503-172 = "ありがとうございます……先生。"
1014503-174 = "（そうしてキサキ――）"
1014503-175 = "（いや、キキが眠りにつくまで手を握って見守った）"
