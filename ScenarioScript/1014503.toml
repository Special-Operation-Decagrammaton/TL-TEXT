[translation]
1014503-1 = "Letting loose"
1014503-2 = "Hello, Sensei!!"
1014503-3 = "[s1] \"Kisaki!?\"\n[s2] \"Kiki!?\""
1014503-4 = "Kisaki...? I don't really know who that is!"
1014503-5 = "Yes! I'm Kiki!"
1014503-6 = "I'm in the mood to be Kiki today!"
1014503-7 = "[s] \"I see... nice to meet you.\""
1014503-8 = "Kiki is so happy to see you, Sensei!"
1014503-9 = "What should we play today?"
1014503-10 = "It's a rare opportunity! It would be a waste not to enjoy it, right?"
1014503-11 = "[s] \"What do you want to do, Kiki?\""
1014503-12 = "Then—"
1014503-13 = "I want to play in the water!!"
1014503-15 = "Wow~! A river~!!"
1014503-16 = "Huh? Swimming, you say...?"
1014503-17 = "Um... Kiki isn't very good at swimming!#nSo—"
1014503-18 = "You'll stay by my side, right?"
1014503-19 = "[s] \"Y-yeah...!\""
1014503-20 = "Yay!"
1014503-29 = "(And so, I watched over Kiki as she had fun.)"
1014503-30 = "(And then, at that moment...!)"
1014503-32 = "[ns] \"...Kiki?\""
1014503-34 = "[ns] (Kiki is gone!!)"
1014503-36 = "Take that! Wide open!!"
1014503-42 = "[ns] \"Gah!!?\""
1014503-43 = "Ahahaha! I did it!"
1014503-44 = "Kiki might be bad at swimming, but I'm great at diving!#nTake that, take that!"
1014503-45 = "[s] \"You little...!\""
1014503-46 = "Eek~! Sensei is going to eat me up~!"
1014503-48 = "(I caught Kiki and gave her a piggyback ride.)"
1014503-53 = "Whoa! So high!"
1014503-54 = "Sensei! Give me a 'toss-up'!"
1014503-55 = "Huh, you don't know what that is?"
1014503-56 = "You lift me up... and throw me toward the sky, then catch me!"
1014503-57 = "It's dangerous, so no...?#nUgh... but..."
1014503-58 = "Okay... I understand..."
1014503-60 = "Alright... very carefully..."
1014503-64 = "Sensei! I caught a medaka!"
1014503-66 = "(A medaka was swimming around in the bowl Kiki made with her hands.)"
1014503-68 = "Ahaha! That tickles!"
1014503-69 = "I think I understand how people who keep medaka feel!"
1014503-70 = "But, I can't take it home with me, so..."
1014503-71 = "Bye-bye, see you later."
1014503-75 = "Wow, it's already out of sight!"
1014503-76 = "Oh, heh, hehe... I thought my legs were ticklish, but there were tons more!"
1014503-77 = "You all better be careful, okay?#nKiki might catch you just like that one!"
1014503-78 = "But you'll let them go again, right?#nYes, of course!"
1014503-80 = "Sensei, Sensei, it looks like we can rent bicycles here!"
1014503-81 = "Kiki... wants to ride with you, Sensei.#n...Is that not allowed?"
1014503-82 = "[s] \"Sounds good, it seems healthy too.\""
1014503-83 = "Yay! Let's go see all sorts of places!"
1014503-85 = "Oh, Sensei! There are kids playing in the water over there!"
1014503-86 = "Isn't that kid looking at us?"
1014503-87 = "Do they want to join in? If so, let's—!"
1014503-91 = "Eek!?"
1014503-92 = "W-what is this..."
1014503-96 = "A declaration of war, is it!?"
1014503-97 = "Scared? Are you scared?"
1014503-98 = "If you're frustrated, come and get me!"
1014503-99 = "Sensei..."
1014503-100 = "[s] \"Kiki.\""
1014503-104 = "[ns] \"Go for it!!\""
1014503-105 = "...!"
1014503-106 = "Yes!"
1014503-110 = "Hah, so fast!? Are you trying to close the distance!"
1014503-111 = "Prepare yourself~!"
1014503-112 = "I like it! Come at me!"
1014503-114 = "(...Kiki was playing happily.)"
1014503-115 = "(And before I knew it, she had gathered the whole group together.)"
1014503-118 = "What should I do... Kiki wants to eat this and that."
1014503-119 = "But I can't buy everything... I can't eat that much.#nThey say it's bad luck to leave food behind..."
1014503-120 = "[s] \"If there's any left, I'll eat it for you.\""
1014503-121 = "Really? In that case, I'm going to buy everything!!"
1014503-122 = "Sensei, let's go!!"
1014503-124 = "(We went around the shops, and Kiki bought a mountain of snacks.)"
1014503-125 = "(The fact that I needed stomach medicine later is another story.)"
1014503-127 = "Phew... so satisfied!"
1014503-128 = "Kiki will never forget today!"
1014503-129 = "[s] \"I'm glad to hear that.\""
1014503-130 = "Thank you for playing with Kiki today!"
1014503-131 = "And also..."
1014503-132 = "..."
1014503-136 = "I got to see a side of you that I wasn't aware of."
1014503-137 = "It was quite adorable, wasn't it?"
1014503-138 = "[ns] \"...!?!?\""
1014503-140 = "[ns] \"Kisaki!?\""
1014503-141 = "Kisaki? Who is that? I don't know who you're talking about!"
1014503-142 = "So Kiki—"
1014503-146 = "Huh...?"
1014503-151 = "[ns] \"!?!?\""
1014503-154 = "(I hurriedly carried Kisaki to the room.)"
1014503-158 = "...My apologies, Sensei."
1014503-159 = "It seems I let myself get a bit too carried away."
1014503-160 = "[s] \"You're alright, right...?\""
1014503-161 = "Don't worry so much. I know my own limits to an extent."
1014503-162 = "However... I think it's time to call it a day."
1014503-163 = "[s] \"Are you... really sure?\""
1014503-164 = "Is my word that untrustworthy to you?"
1014503-165 = "Hmm? Is there something you can do for me, Sensei?"
1014503-166 = "Well then..."
1014503-170 = "Kiki thinks she could sleep well if you stayed by my side, Sensei..."
1014503-171 = "[s] \"Understood.\""
1014503-172 = "Thank you... Sensei."
1014503-174 = "(And so, I held Kisaki's hand—)"
1014503-175 = "(Or rather, I held Kiki's hand and watched over her until she fell asleep.)"