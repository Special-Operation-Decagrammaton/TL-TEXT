[translation]
1007906-1 = "máquina de venda automática"

1007906-2 = "(Corri para o parque depois de receber um pedido urgente de ajuda.)"

1007906-10 = "[ns1] \"...????\"\n[ns2] Vá na direção do som."

1007906-21 = "...Hmm, já."

1007906-22 = "Por que temos que permitir que as máquinas de venda automática levem nosso dinheiro, mesmo neste mundo?"

1007906-23 = "Agora que cheguei até aqui, me pergunto se há algo errado comigo...?"

1007906-24 = "Não, isso é impossível. Não importa como você olhe, as máquinas de venda automática são ruins."

1007906-25 = "[s3] \"Misaka?\"\n[s4] \"O que há de errado em chutar a máquina de venda automática!?\""

1007906-28 = "...Ah, Senseia."

1007906-29 = "Eu vi algo constrangedor..."

1007906-30 = "……sim? Ah, isso mesmo, esse cara."

1007906-31 = "Quando tentei comprar uma bebida em uma máquina de venda automática, eles pegaram meu dinheiro novamente."

1007906-32 = "Não... dizer “de novo” não é um pouco diferente?"

1007906-33 = "...Ah, a Senseia não sabe."

1007906-34 = "A máquina de venda automática na Academy City muitas vezes leva meu dinheiro. #nMuitas vezes só acontece quando tento comprar..."

1007906-35 = "Mas eu realmente não entendo porque... talvez eles não gostem de mim."

1007906-36 = "Achei que Kivotos ficaria bem, mas..."

1007906-37 = "Infelizmente, este é o caso."

1007906-38 = "……sim? Não, nem sempre."

1007906-39 = "Se isso sempre acontecer, seria mais fácil descobrir a causa."

1007906-40 = "[s5] \"Você sempre se mete em problemas.\"\n[s6] \"...Não parece que seja problema de mais ninguém.\""

1007906-43 = "De qualquer forma, esse é o motivo. #nAli, isso fará com que o suco escorra."

1007906-44 = "Sabe, costumam dizer que se você bater vai sarar, né?"

1007906-45 = "...O que o torna diferente da imagem?"

1007906-46 = "Ah, é isso mesmo."

1007906-50 = "Você achou que poderia resolvê-lo controlando-o com eletricidade?"

1007906-51 = "...Não importa quanta habilidade você tenha, você não a usará para algo assim."

1007906-52 = "Se eu colocar eletricidade em uma máquina de venda automática, há uma boa chance de ela quebrar, e se eu fizer com que ela quebre todas as vezes, as pessoas descobrirão que a culpa é minha."

1007906-53 = "Além disso, não é mais rápido chutar?"

1007906-54 = "……sim?"

1007906-55 = "É errado chutar propriedade pública?"

1007906-56 = "O-o que!"

1007906-57 = "De repente, traga a verdade!"

1007906-58 = "Mas... é exatamente como a Senseia disse. #nEsta não é a nossa cidade universitária."

1007906-59 = "……foto?"

1007906-60 = "A localização não importa...?"

1007906-61 = "Suspiro... Nunca esperei que ele dissesse algo tão típico de um Sensei."

1007906-62 = "[s7] \"Bem, ainda sou Sensei.\"\n[s8] \"Você não esqueceu minha posição...?\""

1007906-68 = "……um."

1007906-69 = "Ah, isso mesmo."

1007906-70 = "Talvez..."

1007906-71 = "Talvez seja melhor não ligar para o Sensei...?"

1007906-72 = "……não. #nA culpa foi minha, me desculpe."

1007906-73 = "[s9] Entre em contato com a associação gestora do parque. \n[s10] Entre em contato com as informações de contato publicadas na máquina de venda automática."

1007906-79 = "(Depois que a máquina de venda automática foi consertada, recebi o dinheiro de volta e comprei o suco novamente.)"

1007906-81 = "É revigorante ter alguém chamado para consertar alguma coisa."

1007906-82 = "...É isso que deveria ser? Ah, isso mesmo."

1007906-83 = "Bem, isso mesmo... Às vezes o Sensei fala como um Sensei."

1007906-84 = "Mas graças a você consegui comprar um pouco de suco. Obrigado, senhor."

1007906-85 = "……sim?"

1007906-86 = "Eu entendo. De agora em diante, farei perguntas corretamente sem chutar você."

1007906-87 = "...Ainda estou refletindo sobre isso."

1007906-89 = "Fiquei um pouco envergonhado porque gritaram comigo por algo que é normal para um ser humano..."

