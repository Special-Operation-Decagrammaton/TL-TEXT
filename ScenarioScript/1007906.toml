[translation]
1007906-1 = "自動販売機"
1007906-2 = "（急ぎの救援要請を受けて、公園まで走った）"
1007906-10 = "[ns1] \"……？？？\"\n[ns2] 音がした方へ向かう。"
1007906-21 = "……んん、もう。"
1007906-22 = "どうしてこっちの世界でも、自販機にお金を飲まれなきゃいけないわけ？"
1007906-23 = "ここまで来ると、私になにか問題があるのかしら……？"
1007906-24 = "いやいや、あり得ないでしょ。どう考えても自販機が悪いわね。"
1007906-25 = "[s3] \"御坂？\"\n[s4] \"自販機を蹴ってどうしたの！？\""
1007906-28 = "……あっ、先生。"
1007906-29 = "恥ずかしいところを見られちゃったわね……"
1007906-30 = "……ん？あぁ、そうなの、コイツよ。"
1007906-31 = "自販機で飲み物を買おうとしたら、「また」お金を飲まれちゃったの。"
1007906-32 = "いや……「また」って言うのは、ちょっと違うか。"
1007906-33 = "……ああ、先生は知らないわよね。"
1007906-34 = "向こうの学園都市にある自販機が、よく私のお金を飲んじゃうのよ。#n私が買おうとする時だけよく起こってね……"
1007906-35 = "でも、理由はよく分からなくて……もしかしたら、嫌われてるのかもね。"
1007906-36 = "キヴォトスなら大丈夫だと思ったんだけど……"
1007906-37 = "残念ながら、この通り。"
1007906-38 = "……ん？いや、毎回ってわけじゃないわ。"
1007906-39 = "いっそ必ず発生するんだったら、原因も調べやすいんだけど。"
1007906-40 = "[s5] \"よくトラブルに巻き込まれるんだね。\"\n[s6] \"……他人事には思えないような。\""
1007906-43 = "とにかく、そういう理由なのよ。#nあっちでは、これでジュースが落ちてくるから。"
1007906-44 = "ほら、叩けば直るってよく言うでしょう？"
1007906-45 = "……イメージとは違うって、何が？"
1007906-46 = "ああ、そういうことね。"
1007906-50 = "電気で操作して解決すると思ったの？"
1007906-51 = "……いくら能力があるからって、こんなことにまで使わないわよ。"
1007906-52 = "自販機に電気を流したら壊れる可能性が高いし、毎度のようにそれで故障させてたら、私の仕業だってバレるでしょ。"
1007906-53 = "それに、蹴った方が早いじゃない？"
1007906-54 = "……ん？"
1007906-55 = "公共の物を蹴るのは良くないって……？"
1007906-56 = "な、何よ！"
1007906-57 = "急に正論なんて持ち出して！"
1007906-58 = "でも……たしかに先生の言う通りね。#nここは私たちの学園都市じゃないし。"
1007906-59 = "……え？"
1007906-60 = "場所は関係ない……？"
1007906-61 = "はあ……まさか、そんな先生らしいことを言うとは。"
1007906-62 = "[s7] \"まあ、これでも先生だからね。\"\n[s8] \"私の立場、忘れてない……？\""
1007906-68 = "……あ。"
1007906-69 = "そ、そうだったわね。"
1007906-70 = "もしかして……"
1007906-71 = "先生を呼ばない方が良かったり……？"
1007906-72 = "……いや。#nこれに関しては私が悪かったわ、ごめんなさい。"
1007906-73 = "[s9] 公園の管理組合に連絡する。\n[s10] 自販機に貼ってある連絡先に問い合わせる。"
1007906-79 = "（自販機の修理が終わってから、飲み込まれたお金を返してもらいジュースを買い直した）"
1007906-81 = "人を呼んで直してもらうのは新鮮ね。"
1007906-82 = "……本来は、これが当然？そ、そうよね。"
1007906-83 = "まぁ、そうよね……先生ってたまに先生みたいな事いうのね。"
1007906-84 = "でも、おかげでジュースはちゃんと買えたもの。ありがとう、先生。"
1007906-85 = "……ん？"
1007906-86 = "分かってるわ。今度からは、蹴らずにちゃんと問い合わせるから。"
1007906-87 = "……これでも、ちゃんと反省してるのよ。"
1007906-89 = "人として当たり前のことで怒られて、ちょっと恥ずかしくなったわ……。"
