[translation]
34100-1 = "Episódio 10; Rumo ao Distrito Autônomo de Arius (2)"
34100-2 = "……A partir daqui, passaremos pela passagem subterrânea para entrar na entrada das catacumbas."
34100-3 = "Mas…… pelo que vimos agora há pouco, parece que \"ela\" também sabe que usaremos este caminho."
34100-4 = "……É. Provavelmente ela já deve ter preparado algo."
34100-5 = "Bem, é algo que se deduz pensando um pouco."
34100-6 = "Afinal, é uma entrada que qualquer aluna de Arius conhece."
34100-7 = "E-então, o que faremos?"
34100-8 = "Dito isso, não há rotas alternativas e, obviamente, não temos tempo para procurar outras entradas."
34100-14 = "Vamos forçar a passagem."
34100-15 = "……É verdade. De qualquer forma, tanto eles quanto nós pensamos da mesma maneira. Mas nós temos o Sensei do \"Schale\" conosco."
34100-16 = "Hehe…… é, verdade. Conto com você……."
34100-17 = "[s] \"Ah, s-sim. Digo o mesmo……?\""
34100-21 = "Soldados de elite treinados devem estar esperando logo à frente."
34100-22 = "Nós iremos na frente. Sensei, siga-nos por trás assim que a segurança estiver garantida."
34100-23 = "Será uma batalha difícil, mas se passarmos por aqui, entraremos no Distrito Autônomo de Arius."
34100-24 = "Vamos."
