[translation]
34100-1 = "Episódio 10;Rumo ao Distrito de Arius (2)"
34100-2 = "……Daqui, atravessamos a passagem subterrânea e entramos na entrada das catacumbas."
34100-3 = "Mas…… pela cena de agora há pouco, \"ela\" também parece saber que a gente usaria esta passagem."
34100-4 = "……Sim. Provavelmente, há algo preparado."
34100-5 = "Bom, pensando um pouco, é óbvio."
34100-6 = "Aliás, é uma entrada que qualquer aluna de Arius conhece."
34100-7 = "E-então, o que fazemos?"
34100-8 = "Dito isso, não há rota alternativa, e, claro, também não há tempo pra procurar outra entrada."
34100-14 = "Rompemos à força."
34100-15 = "……Pois é. De todo jeito, o pensamento de lá e o nosso é o mesmo. Mas nós temos o Sensei da \"Schale\"."
34100-16 = "Hehe…… é-é verdade. Contamos com o senhor……."
34100-17 = "[s] \"H-hã, sim. Eu que conto com vocês……?\""
34100-21 = "Adiante deve haver soldados de elite treinados à espera."
34100-22 = "Nós vamos à frente. Sensei, quando a segurança estiver garantida, venha atrás."
34100-23 = "Vai ser uma batalha dura, mas, rompendo aqui, entramos no distrito autônomo de Arius."
34100-24 = "Vamos."
