[translation]
34100-1 = "Episódio 10; Para o Distrito Autônomo de Arius (2)"
34100-2 = "......Através desta passagem subterrânea, chegaremos à entrada das catacumbas."
34100-3 = "Mas... pelo que vimos agora há pouco, parece que 'ela' também sabe que usaremos esta rota."
34100-4 = "......Sim. É provável que já estejam preparadas."
34100-5 = "Bem, pensando um pouco, é meio óbvio."
34100-6 = "Afinal de contas, qualquer aluna de Arius conhece essa entrada."
34100-7 = "E-Então, o que vamos fazer?"
34100-8 = "Mesmo sabendo disso, não há rotas alternativas, e obviamente não temos tempo para procurar outra entrada."
34100-14 = "Vamos avançar à força."
34100-15 = "......Pois é. De qualquer forma, tanto elas quanto nós estamos pensando a mesma coisa. Mas nós temos o Sensei da 'Schale'."
34100-16 = "Hehe... É-É verdade. Contamos com você..."
34100-17 = "[s] \"A-Ah, sim. Eu que conto com vocês...?\""
34100-21 = "Daqui para frente, tropas de elite bem treinadas devem estar à nossa espera."
34100-22 = "Nós iremos na linha de frente. Sensei, siga-nos pela retaguarda assim que a sua segurança estiver garantida."
34100-23 = "Será uma batalha difícil, mas se passarmos por aqui, poderemos entrar no distrito autônomo de Arius."
34100-24 = "Vamos."