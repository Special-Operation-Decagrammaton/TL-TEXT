[translation]
42225-6 = "Ugh…!!"
42225-10 = "(A onda de choque da explosão… o detonador escorregou da mão dela…!)"
42225-16 = "[ns1] \"……Peguei.\"\n[ns2] \"O detonador da bomba está na minha mão!!\""
42225-19 = "Entendido!"
42225-20 = "Onde os seus olhos estão vagando, Comandante Tsukiyuki?!"
42225-22 = "O combate é aqui!!"
42225-37 = "Aaargh…!!"
42225-41 = "A sua guarda continua cheia de buracos. Se isso fosse um teste de aptidão da SRT, você teria perdido pontos por baixar a arma."
42225-45 = "……Se estivéssemos numa prova, a senhora teria razão."
42225-46 = "Porém, o asfalto sangrento da vida real não obedece a folhas de prova…"
42225-47 = "No mundo real… no final das contas, a dor não importa. A Justiça Eterna sempre esmaga a escuridão!"
42225-48 = "No mundo real, a justiça sempre vence…?!"
42225-49 = "Se a matemática do mundo fosse tão simples e pura, nós não estaríamos nessa merda de apocalipse agora."
42225-50 = "A realidade é um monstro cruel… que esmaga as expectativas de quem sonha demais."
42225-55 = "FOXTROT…!"
42225-60 = "(O estampido sônico… ela vai puxar o pino de uma flashbang――!)"
42225-62 = "……Haaa!!"
42225-71 = "……Você tinha razão, Veterana."
42225-72 = "Largar a doutrina, jogar o corpo pra frente e amassar sua cara com a testa antes de tentar recuar cortou meu tempo de reação na metade. Foi fatal."
42225-76 = "Largue a arma e ajoelhe-se, FOX1."
42225-77 = "Haaah…"
42225-78 = "Apesar de você ser uma cadete genial e orgulhosa… por que, logo hoje, você se recusou a engolir a minha verdade?"
42225-79 = "……Do que a senhora está falando?"
42225-85 = "Eu avisei que se vocês cruzassem a porta, eu torraria todos nós nessa sala com o fogo nuclear."
42225-86 = "E as minhas palavras nunca são blefes vazios."
42225-87 = "A minha alma estava completamente conformada em virar cinzas e afundar com este silo hoje… Mas você…"
42225-88 = "Qual foi o cálculo imbecil na sua cabeça que justificou você continuar avançando, mesmo sabendo que a morte era 100% certa?!"
42225-93 = "O meu cálculo… foi a fé de que a senhora jamais seria capaz de fuzilar a vida das suas próprias cadetes, Veterana."
42225-94 = "A senhora mesma cuspiu que estava disposta a sujar as mãos de sangue e genocídio… exclusivamente para forjar um asfalto limpo para a próxima geração da SRT caminhar."
42225-95 = "Alguém que afundou no niilismo da realidade, cedeu a alma e arriscou a própria carne… só pra apostar as fichas no futuro…"
42225-96 = "Jamais teria estômago para apertar o botão que reduziria as crianças daquele mesmo Futuro a pó."
42225-101 = "……Eu espalhei sangue na sua frente. Tentei arrancar a venda dos seus olhos para as ilusões doces e joguei a crueldade do mundo na sua cara."
42225-102 = "Eu martelei na sua cabeça repetidas vezes que, no tabuleiro, uma Vitória Suja e Imunda vale mil vezes mais que uma Derrota Heroica e Honorável…"
42225-103 = "Mas no fim… a sua fé em mim foi mais forte que o terror?"
42225-104 = "A senhora me deu as melhores lições que carrego comigo."
42225-107 = "A senhora disse: 'A Justiça da SRT é um pilar de aço. Ela não flerta com a sujeira e não curva as costas, não importa qual monstro encare'――"
42225-108 = "Mesmo que as lâminas da realidade cortem a nossa carne, a poeira esconda a nossa farda, e a nossa luz se apague nas trevas…"
42225-111 = "A essência inquebrável do valor e do significado da Justiça jamais vai apodrecer."
42225-112 = "O Esquadrão FOX sempre foi a materialização cravada de todos os nossos sonhos e o futuro que nós queríamos alcançar."
42225-115 = "Se nós, as calouras, não confiássemos no brilho cego daquele Futuro Inatingível… nunca teríamos empunhado um fuzil em primeiro lugar."
42225-117 = "Então… por favor, largue essa covardia. Pare de tentar fugir pras trevas e volte a marchar na nossa frente, sob a luz do sol.#n――Yukino-senpai."
42225-122 = "Eu… Eu curvei as minhas costas pro escuro por tempo demais."
42225-123 = "A engenharia doentia desta Academia… Nos forjou para carregar canhões e responsabilidades morais muito além do que a nossa alma aguenta."
42225-124 = "Quando o farol da Presidente Desaparecida se apagou, o caos engoliu Kivotos. Nós passamos noites em claro, sangrando e matando pra achar alguém digno de vestir essa Coroa de Responsabilidade e segurar o nosso fuzil…"
42225-125 = "Se nós apenas tivéssemos soltado o fuzil no chão… a guerra teria acabado em silêncio. Mas nós fomos orgulhosas. Apegadas à miragem e ao poder do nome 'SRT' que as lendas pintaram em nós, e nós nos recusamos a soltar as garras."
42225-126 = "E o preço da nossa ganância foi o inferno que vivemos hoje. Ver as correntes do passado esmagarem o futuro… o Destino ama ironias mórbidas."
42225-130 = "Comandante Tsukiyuki. O meu sangue e o peso dos meus pecados não podem ser perdoados. Esta ogiva termobárica… deve cumprir o seu propósito de destruição aqui e agora."
42225-131 = "Essa chama nuclear deve afundar os fantasmas sujos da velha SRT e derreter os erros do meu passado neste abismo… para sempre."
42225-132 = "Por isso… eu suplico a você como cadete. Pegue a sua tropa, fuja daqui e viva."
42225-134 = "Veterana Yukino…!"
42225-139 = "[ns] \"……Yukino. Até mesmo pra nós, adultos que já calejaram o osso, engolir a bala e abraçar certas consequências é algo insuportável e doloroso.\""
42225-141 = "[ns] \"Mas usar a própria morte como desculpa pra fugir do acerto de contas é a pior ofensa à responsabilidade que existe.\""
42225-144 = "……Professor da Schale."
42225-145 = "A sua retórica moral não se aplica ao nosso pesadelo. O senhor não entende e nunca entenderá o vazio que nós carregamos."
42225-146 = "O senhor é o pilar inquebrável. O senhor é um Adulto Completo, com ombros largos para engolir qualquer calamidade e assumir toda a Responsabilidade do mundo sem piscar."
42225-147 = "Diga-me a verdade nua e crua. Se as montanhas desabassem sobre os seus ombros e o fardo sangrento superasse o limite da sua carne…"
42225-148 = "Se o senhor esbarrasse no ponto de ruptura letal… que caminho covarde o grande Professor escolheria para si?"
42225-152 = "[ns] \"……Eu apenas vou dormir. E esperar pacientemente pelo raiar do Sol de Amanhã.\""
42225-153 = "……Esperar… pelo Amanhã?"
42225-154 = "Você é um lunático? Se o ponteiro girar e a meia-noite chegar, e o amanhã nascer… que porra de milagre vai mudar?!"
42225-155 = "A carnificina será repetida amanhã. A natureza humana não muda, a sujeira não se apaga. O apocalipse não tira férias!"
42225-156 = "Nós somos ferramentas genocidas falhas. Armas com rachaduras no cano e lâminas quebradas. O ferro velho é o nosso destino inevitável. Por que prolongar a dor?!"
42225-157 = "[ns3] \"Vocês não são lâminas quebradas, Yukino. Vocês são Crianças.\"\n[ns4] \"E as crianças crescem a cada passo… se você errar hoje, você tentará e fará melhor amanhã.\""
42225-160 = "Tentar e fazer melhor…?"
42225-161 = "……O senhor tem a audácia esquizofrênica de afirmar que assassinas sujas como nós merecem um 'Amanhã' para tentar de novo?"
42225-162 = "[s] \"Mas é claro que sim. Vocês ainda têm uma vida inteira pela frente.\""
42225-167 = "[ns5] \"Se o caminho virar um labirinto escuro… vocês engolem o orgulho, abaixam a cabeça e aprendem do zero…\"\n[ns6] \"Se a carga no ombro for esmagadora… vocês estendem as mãos calejadas para as pessoas que amam…\"\n[ns7] \"E quando o osso ameaçar quebrar no frio… vocês escoram os corpos umas nas outras e marcham juntas…\""
42225-171 = "[ns8] \"Comam as pedras do chão, aprendam, cresçam com a dor, e virem Adultas Fortes um dia.\"\n[ns9] \"E apenas quando esse dia mágico chegar, e a coroa couber perfeitamente na cabeça de vocês… vocês pegarão essa tal Responsabilidade do chão com orgulho.\""
42225-175 = "Quando nós virarmos… Adultas…?"
42225-179 = "……Entendo."
42225-187 = "Aiiii!! Aquela psicopata da Saki meteu outro tiro na boca do meu estômago de propósito!!#nA garota atirou pra doer! Eu te odeio!"
42225-188 = "A culpa não é minha! Eu te avisei quinhentas vezes que usar colete balístico pesado com placa de titânio no peito salvaria a sua vida no CQB, sua tapada."
42225-189 = "Mas as placas de titânio são grossas! Elas apertam os meus peitos e cortam o meu fôlego na corrida!"
42225-190 = "……E você reclama, sendo que a sua tábua reta não tem volume nenhum pra amassar…"
42225-191 = "CALA A BOCA, SUA CEGA!!"
42225-196 = "……Parece que a poeira baixou e o nosso império de sangue virou pó de vez, hein, FOX1."
42225-197 = "……É. A parede quebrou. A missão está morta."
42225-198 = "……Os boatos urbanos não mentiram, Comandante. Aquele Professor da Schale é um adulto com cérebro disfuncional e problemático."
42225-199 = "Você tem razão. Ele é o lunático mais doente e admirável de Kivotos…"
42225-205 = "……Mas, no fundo da minha alma manchada… o simples fato de saber que o mundo abriga uma espécie de 'Adulto' caloroso e idiota como ele…#nme permite fechar os olhos cansados e dizer adeus a esse longo e violento 'Hoje' em paz."
42225-213 = "O jogo virou e a vitória moral e bélica é de vocês, Comandante Tsukiyuki."
42225-214 = "O Esquadrão FOX abaixa as armas e rende-se incondicionalmente."
42225-215 = "……Tudo o que nós queríamos era não enxergar que estávamos correndo cegas pro buraco. E a rebelião ingênua de ontem de vocês era a luz…"
42225-217 = "――Peguem em armas. Lutem contra o inferno que a vida lançar contra vocês."
42225-219 = "Próximo Episódio: O Fim do Golpe"