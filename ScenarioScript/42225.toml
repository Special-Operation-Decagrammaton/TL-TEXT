[translation]
42225-6 = "Ugh……"
42225-10 = "（O impacto da explosão fez o detonador...）"
42225-16 = "[ns1] \"……Te peguei.\"\n[ns2] \"Eu garanti o detonador!\""
42225-19 = "Entendido!"
42225-20 = "Para onde está olhando, capitã do esquadrão Tsukiyuki?"
42225-22 = "O seu oponente está aqui!"
42225-37 = "Ugh……!"
42225-41 = "Como sempre, cheia de aberturas. Se fosse um exame da SRT, isso seria motivo de perda de pontos."
42225-45 = "……Se fosse um exame, suponho que sim."
42225-46 = "Mas aqui não é um campo de provas, é a realidade……"
42225-47 = "E na realidade — não importa a situação, a justiça sempre vence!"
42225-48 = "Na realidade, não importa a situação, a justiça sempre vence……?"
42225-49 = "Se a lógica do mundo fosse tão simples assim, o problema não teria chegado a esse ponto."
42225-50 = "A realidade sempre…… trai as expectativas."
42225-55 = "FOXTROT……"
42225-60 = "（Esse som, será que ela usou uma granada de luz――）"
42225-62 = "……Haa!"
42225-71 = "……Como a senpai disse."
42225-72 = "Se eu tivesse empurrado com a cabeça antes de puxar a mão, teria acelerado meu tempo de reação em 0,5 segundos."
42225-76 = "Por favor, desarme-se, FOX1."
42225-77 = "Haa……"
42225-78 = "Você era uma kouhai tão boa, por que não acredita nas minhas palavras desta vez?"
42225-79 = "……O que quer dizer com isso?"
42225-85 = "A ameaça de detonar a ogiva ao entrar na sala de operações."
42225-86 = "Aquilo não era apenas um blefe."
42225-87 = "Eu estava realmente preparada para descartar minha vida ao ficar aqui……"
42225-88 = "O que exatamente você estava pensando ao forçar essa operação?"
42225-93 = "Eu acreditei que a senpai jamais escolheria nos abandonar."
42225-94 = "Você disse antes que tentar reviver a Academia Especial SRT, mesmo sujando as próprias mãos, era por causa de nós, suas kouhais……"
42225-95 = "Alguém que tem uma visão resignada da realidade e aposta tudo no futuro — alguém capaz de descartar até a própria vida……"
42225-96 = "Não consigo acreditar que abandonaria as kouhais que carregarão o amanhã da SRT."
42225-101 = "……Eu acordei vocês dos sonhos doces que tinham e ensinei sobre a escuridão da sociedade."
42225-102 = "Enfatizei repetidamente que uma vitória vil é melhor do que uma derrota honrosa."
42225-103 = "Mesmo assim…… você acredita em mim?"
42225-104 = "A senpai disse antes, não disse?"
42225-107 = "Que a justiça da SRT nunca vacila, em nenhuma situação……"
42225-108 = "Mesmo que ela acabe coberta pela poeira da realidade sombria e perca o brilho que emitia por conta própria……"
42225-111 = "O valor e o significado inerentes à justiça nunca desbotarão."
42225-112 = "Vocês, senpais, eram nossos sonhos e nosso futuro."
42225-115 = "Se eu não pudesse acreditar no futuro…… eu não teria escolhido este caminho."
42225-117 = "Por isso…… não fuja, caminhe à nossa frente. #n――Yukino-senpai."
42225-122 = "Eu…… dei voltas demais."
42225-123 = "Nós éramos uma organização projetada desde o início para exercer um poder maior do que a responsabilidade que podíamos carregar."
42225-124 = "Desde que a Presidente do Conselho Federal desapareceu, estivemos procurando alguém para assumir a responsabilidade desse poder."
42225-125 = "Se tivéssemos simplesmente deixado para lá, tudo teria se resolvido…… mas nós nos apegamos ao nome da autoridade herdada de outros e não conseguimos soltar esse poder."
42225-126 = "E no fim, o que enfrentamos foi a sombra do passado…… que ironia do destino."
42225-130 = "Capitã do esquadrão Tsukiyuki. Infelizmente — esta ogiva precisa ser detonada aqui."
42225-131 = "Para enterrar a responsabilidade do passado, junto com a antiga SRT, neste abismo……"
42225-132 = "Por isso…… eu te peço, afaste-se daqui."
42225-134 = "Senpai……!"
42225-139 = "[ns] \"……Às vezes, até os adultos têm momentos em que é difícil aceitar a responsabilidade.\""
42225-141 = "[ns] \"Mas não podemos fugir dela.\""
42225-144 = "……Professor [USERNAME]."
42225-145 = "O senhor provavelmente não consegue nos entender."
42225-146 = "Pois o senhor é um adulto capaz de carregar tudo: seu próprio poder e suas responsabilidades."
42225-147 = "Se o senhor se deparasse com uma responsabilidade que não consegue carregar, assim como nós……"
42225-148 = "O que o senhor escolheria fazer?"
42225-152 = "[ns] \"……Eu esperaria pelo amanhã.\""
42225-153 = "……O amanhã?"
42225-154 = "Mesmo que o amanhã chegue…… o que exatamente isso mudaria?"
42225-155 = "Os erros se repetirão e o resultado não mudará em nada."
42225-156 = "Uma arma que não serve mais ao seu propósito deve ser descartada, é o natural."
42225-157 = "[ns3] \"Mas vocês não são armas, são alunas.\"\n[ns4] \"Por isso, da próxima vez, vocês podem fazer melhor.\""
42225-160 = "Próxima vez……?"
42225-161 = "Professor, o senhor acha que existe uma próxima vez para nós?"
42225-162 = "[s] \"Com certeza.\""
42225-167 = "[ns5] \"Se houver algo que não entendem, basta aprender……\"\n[ns6] \"Se estiverem em apuros, estendam a mão……\"\n[ns7] \"Quando for difícil, apoiem umas às outras……\""
42225-171 = "[ns8] \"Cresçam dessa forma e, quando se tornarem adultas.\"\n[ns9] \"Só então, vocês poderão assumir a responsabilidade.\""
42225-175 = "Quando nos tornarmos adultas……"
42225-179 = "……Então nós…… não éramos adultas, afinal."
42225-187 = "Ai, ai…… Saki, aquela ali atirou na minha barriga de novo!#nDessa vez foi de propósito, com certeza! Ah, qual é!"
42225-188 = "Eu te disse para colocar pelo menos uma placa balística no peito."
42225-189 = "Mas, se eu usar uma placa durante a operação, meu peito fica apertado e eu não consigo respirar……"
42225-190 = "……Como se você tivesse algo tão grande assim."
42225-191 = "Cala a boca!"
42225-196 = "……No fim, falhamos, FOX 1."
42225-197 = "……É, falhamos."
42225-198 = "……Como diziam os boatos, ele era um adulto estranho."
42225-199 = "É verdade. Um adulto realmente estranho……"
42225-205 = "……Mas, se existem adultos assim……#nacho que posso terminar o \"hoje\" com tranquilidade."
42225-213 = "Nós perdemos, Capitã do Esquadrão Tsukiyuki."
42225-214 = "O Esquadrão FOX se rende."
42225-215 = "……Que as nós de ontem não fizemos a escolha errada――"
42225-217 = "――por favor, provem isso com as próprias mãos."
42225-219 = "Próximo episódio: O Golpe de Estado Fracassado"
