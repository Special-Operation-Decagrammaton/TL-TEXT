[translation]
1600306-1 = "Perseguindo o brilho"
1600306-2 = "（O lugar que Suzumi me indicou era um parque de diversões deserto em Trinity.）"
1600306-3 = "（Como já era tarde da noite, não havia mais ninguém por perto, e apenas os brinquedos continuavam funcionando.）"
1600306-4 = "Ah, Sensei. Por aqui."
1600306-5 = "Obrigada por vir mesmo estando tão ocupado. E ainda por cima, a uma hora tão tardia..."
1600306-6 = "[s1] \"Não, não se preocupe com isso.\"\n[s2] \"A propósito, por que me chamou hoje?\""
1600306-7 = "Bem, como escrevi no MomoTalk, não é nada muito importante, mas..."
1600306-8 = "Bem, como escrevi no MomoTalk, não é nada muito importante, mas..."
1600306-9 = "É que..."
1600306-10 = "[s] \"……？\""
1600306-11 = "……As estrelas."
1600306-12 = "Eu queria lhe mostrar as estrelas."
1600306-13 = "[s3] \"……Eh?\"\n[s4] \"Estrelas……?\""
1600306-14 = "D-desculpe, eu sei que foi repentino……"
1600306-15 = "D-desculpe, eu sei que foi repentino……"
1600306-16 = "Deve ser um incômodo ser chamado assim de repente."
1600306-17 = "Se você tiver algum compromisso, podemos deixar para outra hora……"
1600306-21 = "Ah, i-isso é um alívio……"
1600306-22 = "O motivo, você pergunta?"
1600306-23 = "Também não é nada muito importante……"
1600306-24 = "É só que eu queria mostrar para você também, Sensei."
1600306-31 = "Este parque de diversões……"
1600306-32 = "Este é o lugar onde termino minhas patrulhas todos os dias."
1600306-33 = "Antigamente, as delinquentes costumavam vir muito aqui, mas……"
1600306-34 = "Parece que ultimamente elas se mudaram para outros lugares."
1600306-35 = "……E assim."
1600306-36 = "Comecei a me apoiar no corrimão e observar o céu."
1600306-37 = "Com o tempo, pensei que se fosse para um lugar mais alto, conseguiria ver melhor……"
1600306-38 = "Pensei em subir na roda-gigante."
1600306-39 = "Mas……"
1600306-40 = "No fim, pensei que seria melhor não ir sozinha…… e acabei pensando nessas coisas."
1600306-41 = "[s] \"Entendo, então foi por isso que me convidou?\""
1600306-42 = "Colocando em palavras, soa como um motivo infantil…… sinto muito."
1600306-43 = "Eh, agora mesmo……?"
1600306-44 = "Ah, s-sim, é verdade……?"
1600306-48 = "Não, não é nada."
1600306-49 = "Peço desculpas. Vamos, Sensei."
1600306-53 = "Então, por aqui."
1600306-54 = "[s] Seguir Suzumi."
1600306-60 = "（Caminhei ao lado de Suzumi em direção à roda-gigante.）"
1600306-68 = "Lembrei-me do que conversamos antes."
1600306-69 = "Eu disse que seria bom se pudéssemos conversar de uma forma mais tranquila, mas……"
1600306-70 = "Pensando bem……"
1600306-71 = "Isso já se tornou realidade, não é?"
1600306-75 = "Peço desculpas,"
1600306-83 = "Lá vou eu dizendo coisas estranhas de repente de novo."
1600306-84 = "……Então, vamos?"
1600306-87 = "[wa:1200]― ……É lindo, não é?"
1600306-90 = "[wa:1200]― Daqui,"
1600306-92 = "[wa:500]― parece que dá até para [wa:200]alcançar[wa:200] as estrelas."
1600306-95 = "[wa:1200]― Ultimamente, [wa:1200]tenho conseguido [wa:300]passar,"
1600306-97 = "[wa:500]― momentos de [wa:500]tranquilidade [wa:300]assim..."
1600306-100 = "[wa:1200]― ...Talvez [wa:900]desde que conheci [wa:500]o Sensei."
1600306-103 = "[wa:2800]― ...Sensei."
1600306-106 = "[wa:1100]― Se não se importar, [wa:700]de agora em diante,"
1600306-108 = "[wa:900]― poderia [wa:600]ficar [wa:300]ao meu lado?"
1600306-111 = "[wa:1300]― Eu [wa:200]sempre,"
1600306-113 = "[wa:200]― acabo dizendo [wa:1300]coisas sem importância, mas..."
1600306-116 = "[wa:1800]― Mesmo assim, [wa:400]um dia [wa:1900]eu também..."
1600306-118 = "[wa:1300]― ...Sim, [wa:1600]um dia, [wa:1500]com certeza."
1600306-121 = "Espero conseguir transmitir isso da maneira certa."
