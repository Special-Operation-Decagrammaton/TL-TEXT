[translation]
1600306-1 = "輝きを追いかけて"
1600306-2 = "（スズミが教えてくれた場所は、トリニティにある閑散とした遊園地だった）"
1600306-3 = "（既に夜遅い時間ということもあり、他にお客さんもいない状態で、乗り物だけが動き続けていた）"
1600306-4 = "あ、先生。こちらです。"
1600306-5 = "お忙しい中お越しいただきありがとうございます。それに、こんな遅い時間になってしまい……"
1600306-6 = "[s1] \"ううん、気にしないで。\"\n[s2] \"ところで今日はどうしたの？\""
1600306-7 = "その、モモトークで書かせていただいた通り、特に大した用事ではないのですが……。"
1600306-8 = "その、モモトークで書かせていただいた通り、特に大した用事ではないのですが……。"
1600306-9 = "その……。"
1600306-10 = "[s] \"……？\""
1600306-11 = "……星を。"
1600306-12 = "星を、お見せしたいなと。"
1600306-13 = "[s3] \"……え？\"\n[s4] \"星……？\""
1600306-14 = "す、すみません、唐突だとは思ったのですが……。"
1600306-15 = "す、すみません、唐突だとは思ったのですが……。"
1600306-16 = "急な話で困ってしまいますよね。"
1600306-17 = "その、用事がありましたら今からでも全然……"
1600306-21 = "あ、そ、それは良かったです……"
1600306-22 = "理由、ですか？"
1600306-23 = "それも、大した理由ではないのですが……。"
1600306-24 = "ただ、先生にもお見せしたいなと思ったのです。"
1600306-31 = "この遊園地……"
1600306-32 = "ここは私が、毎日パトロールの終着点にしているところなのです。"
1600306-33 = "以前はスケバンの方々なども、よくいらっしゃったのですが……。"
1600306-34 = "最近は、他の場所に移られてしまったようですね。"
1600306-35 = "……こうして。"
1600306-36 = "手すりに寄りかかって、空を眺めるようになりました。"
1600306-37 = "そのうち、もっと高いところに行けばよく見えるだろうかと思い……。"
1600306-38 = "観覧車に乗ろうかと、そう思ったのですが。"
1600306-39 = "その……。"
1600306-40 = "やはり、ひとりで乗るよりは……などと、そういったことを想ってしまいまして。"
1600306-41 = "[s] \"なるほど、それで誘ってくれたってこと？\""
1600306-42 = "言葉にすると、子どもっぽい理由でしたね……なんだかすみません。"
1600306-43 = "え、今すぐ……？"
1600306-44 = "あ、そ、そうですね……？"
1600306-48 = "いえ、何でもありません。"
1600306-49 = "失礼しました。行きましょうか、先生。"
1600306-53 = "では、こちらへ。"
1600306-54 = "[s] スズミについて行く。"
1600306-60 = "（そうやってスズミと並んで歩きながら観覧車の方に向かった）"
1600306-68 = "以前、お話していたことを思い出しました。"
1600306-69 = "もっとゆったりとした形で言葉を交わせれば良いのに、と。そんなことを言いましたが……。"
1600306-70 = "よく考えたら……"
1600306-71 = "すでに、叶っていますね。"
1600306-75 = "失礼しました、"
1600306-83 = "また急に変なことを。"
1600306-84 = "……では、行きましょうか。"
1600306-87 = "[wa:1200]― ……綺麗ですね。"
1600306-90 = "[wa:1200]― ここからなら、"
1600306-92 = "[wa:500]― 星が[wa:200]掴めて[wa:200]しまいそうです。"
1600306-95 = "[wa:1200]― ここ最近は[wa:1200]こうして[wa:300]ゆっくりと、"
1600306-97 = "[wa:500]― 落ち着いた時間も[wa:500]過ごす[wa:300]ことができて……。"
1600306-100 = "[wa:1200]― ……先生と[wa:900]出会った頃から、[wa:500]かもしれません。"
1600306-103 = "[wa:2800]― ……先生。"
1600306-106 = "[wa:1100]― よろしければ[wa:700]これからも、"
1600306-108 = "[wa:900]― 一緒に[wa:600]居ていただけ[wa:300]ますでしょうか。"
1600306-111 = "[wa:1300]― 私は[wa:200]いつも、"
1600306-113 = "[wa:200]― つまらないことばかり[wa:1300]口にしてしまうかもしれませんが……。"
1600306-116 = "[wa:1800]― それでも[wa:400]いつかは[wa:1900]私も……。"
1600306-118 = "[wa:1300]― ……はい[wa:1600]いつか[wa:1500]きっと。"
1600306-121 = "きちんと、伝えられればと。"
