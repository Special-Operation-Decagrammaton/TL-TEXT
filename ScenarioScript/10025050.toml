[translation]
10025050-1 = "Episódio 5; Terror Desconhecido"
10025050-11 = "Tsc... esses aí não parecem ser amadores."
10025050-12 = "Mas, no fim das contas, são peixes presos na rede. Uma vez nela, não conseguirão escapar."
10025050-13 = "Ei, Kumagai. Chame o pessoal do Píer 3 também!"
10025050-14 = "Como ainda não zarparam, todos devem estar por lá."
10025050-19 = "Ugh... um atrás do outro, quanta gente...!"
10025050-20 = "Mesmo com poder de fogo superior, se continuar assim, seremos cercadas de novo...!"
10025050-21 = "Droga... tem muita cobertura e a linha de tiro está... se ganharem tempo, os reforços vão chegar!"
10025050-22 = "RABBIT 1, o que faremos? Nossas munições estão acabando."
10025050-24 = "............"
10025050-27 = "(A estratégia padrão contra quem usa cobertura é atacar de cima, mas isso causaria danos às instalações ao redor...)"
10025050-28 = "(Mas, se este vilarejo realmente for um lugar onde realizam rituais estranhos para adorar entidades suspeitas...)"
10025050-29 = "(Não preciso me preocupar com danos colaterais...)"
10025050-34 = "RABBIT 3, ainda tem munição explosiva HE-AB?"
10025050-35 = "Sim. Prevendo situações como esta, guardei algumas."
10025050-36 = "Vamos detonar as granadas HE no ar para forçar os inimigos a saírem da cobertura."
10025050-37 = "Coordenadas alvo são—"
10025050-44 = "[ns] \"Pessoal, esperem um pouco!\""
10025050-45 = "Essa voz é..."
10025050-46 = "...Professor [USERNAME]?"
10025050-53 = "Ah... problemas logo de manhã de novo? Vocês não aprendem mesmo..."
10025050-54 = "Eu disse tantas vezes para nos avisarem caso algo acontecesse com pessoas de fora... Se as reclamações chegarem direto à alta cúpula, quem sofre somos nós, sabia?"
10025050-56 = "Humpf, é só um controle de pragas, por que tanto drama?"
10025050-58 = "Vai levar 10 minutos. Não me importo que assistam, mas não atrapalhem."
10025050-59 = "Ah!? Quem está chamando quem de praga...!?"
10025050-65 = "[ns] \"Parece que houve um mal-entendido.\""
10025050-66 = "...Mal-entendido?"
10025050-67 = "Vocês invadiram a cozinha dos outros para roubar peixe, não foi? Onde isso é um mal-entendido?"
10025050-68 = "Cozinha...?"
10025050-69 = "Onde é que isso é uma cozinha, com esses peixes podres espalhados!?"
10025050-70 = "Eu já disse, isso não é peixe podre—!"
10025050-71 = "[s] \"É 'Kusaya', não é?\""
10025050-72 = "Kusa... ya...?"
10025050-74 = "É feito usando peixes como o carapau,"
10025050-75 = "Embora seja pouco conhecido em D.U., é o segundo maior produto local do vilarejo de Yatoura, depois do camarão."
10025050-76 = "Por causa do cheiro forte, nós mesmas ainda não tivemos coragem de provar... haha."
10025050-77 = "Já faz tanto tempo que estão aqui e ainda não conseguem comer... é por isso que gente de fora é assim."
10025050-78 = "Todo mundo tem suas preferências, não tem!?"
10025050-85 = "...Saber o que é Kusaya é impressionante."
10025050-86 = "Como a produção de Kusaya é limitada, não deve haver muitas lojas que vendam isso em D.U."
10025050-87 = "[s1] \"Tenho alunas que são obcecadas por gastronomia por perto...\"\n[s2] \"Aconteceram várias coisas e acabei tendo contato com isso...\""
10025050-91 = "M-mas, ainda há pontos suspeitos!"
10025050-92 = "Pessoas que se machucam ao sair para pescar, o vilarejo sendo engolido pela escuridão... como explica isso?"
10025050-94 = "Pessoas feridas... o vilarejo na escuridão...?"
10025050-95 = "Ah, você fala dos postes de luz quebrados."
10025050-96 = "A maresia danificou a fiação e os postes de luz de toda essa área pararam de funcionar..."
10025050-97 = "Por isso, quando o sol se põe, fica uma escuridão total, mal dá para ver onde pisa."
10025050-98 = "Um pescador novato que preparava o barco antes do amanhecer tropeçou. Deve ser disso que você está falando."
10025050-99 = "Como isso causa acidentes diretamente, pedimos várias vezes à sede que enviassem pessoal para consertar..."
10025050-100 = "Mas, alegando falta de mão de obra, deixaram tudo abandonado há um mês."
10025050-102 = "Não é como se a terra fosse afundar ou criaturas misteriosas fossem atacar das profundezas escuras do oceano...#nQue alívio..."
10025050-104 = "E vocês, com que propósito se aproximaram deste lugar?"
10025050-105 = "Estávamos passeando pela orla quando vimos uma silhueta suspeita e decidimos segui-la."
10025050-106 = "Embora estivesse com equipamento de pesca, não parecia ser um morador da vila, então pensamos que talvez estivesse fazendo algo ilícito..."
10025050-110 = "Ah, aquele ali."
10025050-111 = "Ultimamente, tem aparecido alguém insistindo para que eu ensine a pescar."
10025050-112 = "É uma pessoa um pouco peculiar, mas parece ter a licença de pesca em dia...#nNão precisa se preocupar com isso."
10025050-113 = "[s3] \"Embora tenha sido um mal-entendido, pedimos desculpas pelo transtorno.\"\n[s4] \"Por favor, deixe-me pedir desculpas em nome da minha aluna.\""
10025050-119 = "…Por hoje, vou deixar passar."
10025050-120 = "Tenho que sair antes que o sol nasça.#nJá está na hora de fazer a inspeção antes de zarpar."
10025050-121 = "Se eu perder tempo com bobagens e deixar o camarão escapar, aí sim é que vou virar motivo de piada na vila."
10025050-122 = "Entendo... Vou me preparar."
10025050-129 = "[ns] \"Para vocês, foi um julgamento precipitado bem incomum, não foi?\""
10025050-130 = "…Peço perdão."
10025050-131 = "Nós, que deveríamos avaliar a situação e evitar conflitos desnecessários, acabamos agindo de forma a provocar um combate...#nFoi uma falha minha."
10025050-132 = "Tentei manter a calma, mas acabei me concentrando demais no combate à minha frente..."
10025050-133 = "…E presumi que esta vila era suspeita."
10025050-134 = "Não, eu também. Até o combate começar, #nacheguei a pensar que era apenas uma história inventada pelos moradores..."
10025050-135 = "Fui enganada pelo mau cheiro e, sem perceber, acabei acreditando que aquela lenda era real."
10025050-136 = "D-desculpa...#nComo eu fiquei falando de coisas agourentas o tempo todo, acabei afetando o julgamento de vocês..."
10025050-137 = "Se eu soubesse que terminaria assim, deveria ter ficado quieta..."
10025050-139 = "Pessoal, mesmo que neguem com palavras, lá no fundo todos estavam pensando a mesma coisa."
10025050-140 = "Isso não é culpa da Miyu, é responsabilidade de todas nós."
10025050-142 = "…Pensando com calma, por que será que cheguei a essa conclusão?"
10025050-143 = "Tanto as luzes quanto os peixes secos, por olhar com desconfiança, acabei tomando uma decisão errada."
10025050-144 = "Ficamos completamente distraídas com as lendas e oferendas da vila..."
10025050-145 = "Será que existe um motivo para isso?"
10025050-146 = "Será que existe mesmo algo nesta vila que confunde as pessoas?"
10025050-147 = "[s] \"Não seria por causa do excesso de informações?\""
10025050-148 = "Excesso de informações... é?"
10025050-149 = "De fato, nesta missão, ouvimos muitas lendas da vila durante a fase de investigação."
10025050-150 = "Era para termos focado apenas nos detalhes da investigação, mas por algum motivo, acabamos acumulando apenas histórias sobre crenças e lendas, o que deve ter sido a causa."
10025050-151 = "O relatório do primeiro dia também focou no conteúdo sobre os \"Profundos\", parecia mais um trabalho de campo do que uma investigação da SRT, né?"
10025050-152 = "Mas eu... as palavras daquela pessoa da empresa de navegação durante o dia... me deixam preocupada..."
10025050-153 = "Ainda não consigo parar de pensar no que ela disse..."
10025050-155 = "Eu sabia, racionalmente, que preconceitos errados atrapalham o julgamento correto, mas..."
10025050-156 = "[s] \"Além disso, não pode ser o cansaço do dia a dia?\""
10025050-158 = "Cansaço... você não está subestimando a gente?"
10025050-159 = "Nós, que sobrevivemos ao treinamento rigoroso da Academia Especial SRT, acha mesmo que cometeríamos erros por causa disso?"
10025050-160 = "[s] \"Mesmo que o corpo esteja bem, talvez a mente esteja cansada.\""
10025050-161 = "Cansaço mental...?"
10025050-162 = "[s5] \"A SRT está sempre se jogando em batalhas...\"\n[s6] \"Não temos muito tempo para descansar e ficar tranquilas, né.\""
10025050-165 = "Pois é. Originalmente, os seres humanos agem de acordo com seus instintos, afinal."
10025050-166 = "Até mesmo grandes incidentes que colocam todo o Kivotos em perigo, às vezes, começam apenas por desejos inocentes."
10025050-167 = "…Isso é só você, Moe."
10025050-168 = "Não é bem assim, sabe? Se soubessem com que facilidade as pessoas lá de cima tomam decisões...#nTodos ficariam surpresos, eu acho? ...Hehehe."
10025050-169 = "[s7] \"Era a sombra da cobra na taça, né?\"\n[s8] \"Talvez seja melhor relaxar um pouco e encarar a vila de outra forma.\""
10025050-173 = "No entanto... seria um problema se realmente houvesse uma cobra na taça."
10025050-174 = "Como membros da Academia Especial SRT, não podemos ignorar tais fatores de risco."
10025050-175 = "Se há uma cobra na taça ou se é apenas uma sombra...#nNão existe uma boa maneira de confirmar isso?"
10025050-176 = "[s] \"Quando suas dúvidas forem esclarecidas, acho que você vai entender.\""
10025050-177 = "…………。"
10025050-178 = "[s] \"De qualquer forma, vamos descansar um pouco primeiro.\""
10025050-182 = "[ns9] \"Já que estamos na praia, temos que aproveitar agora!\"\n[ns10] \"Vamos esquecer aquela coisa das profundezas por enquanto!\""
10025050-185 = "……Entendido."
10025050-186 = "Então, a operação noturna de hoje termina aqui."
10025050-187 = "……Pessoal, obrigado pelo trabalho duro até tarde."
10025050-189 = "Obrigado pelo trabalho duro!"
