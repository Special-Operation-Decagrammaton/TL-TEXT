[translation]
10025050-1 = "第5話;未知の恐怖"
10025050-11 = "チッ……こやつら、素人ではなさそうじゃな。"
10025050-12 = "しかし、所詮は捕らわれた魚。網にかかれば逃れることはできまい。"
10025050-13 = "おい、[ruby=くまがい]熊谷[/ruby]。#n第3埠頭の奴らも呼んでこい！"
10025050-14 = "まだ出港前だから、全員揃っとるはずじゃろ。"
10025050-19 = "うぅ……次から次に、人が……！"
10025050-20 = "火力では上回っていても、このままじゃまた包囲されて……！"
10025050-21 = "くそっ……遮蔽物が多くて射線が……このまま時間を稼がれると増援が来る！"
10025050-22 = "RABBIT1、どうする？#n銃弾も残り少ないぞ。"
10025050-24 = "…………。"
10025050-27 = "（遮蔽物を使う相手は空から切り崩すのが正攻法だけど、#nそれじゃ周辺施設にまで被害が……）"
10025050-28 = "（でも、もしこの村が本当に怪しい存在を崇拝するような、得体の知れない儀式を行っている場所だとしたら……） "
10025050-29 = "（被害を考慮する必要はない……）"
10025050-34 = "RABBIT3、HE-AB空中爆発弾は残ってますか？"
10025050-35 = "うん。こんな事態も想定して、何発か残してあるよ。"
10025050-36 = "HE弾を空中で炸裂させて、遮蔽物に隠れている敵を動かします。"
10025050-37 = "指定座標は――"
10025050-44 = "[ns] \"みんな、ちょっと待って！\""
10025050-45 = "この声は……"
10025050-46 = "……[USERNAME]先生？"
10025050-53 = "はぁ……また朝からトラブルですか？#n懲りない方たちですね……"
10025050-54 = "外部の方と何かあったときは、私たちにご一報くださいと、あれほど申したじゃないですか……苦情がいきなり上層部に飛ぶと、大変なのは私たちなんですよ？"
10025050-56 = "ふんっ、たかだかネズミ駆除で何を大げさな。"
10025050-58 = "10分で済む。見てるのは構わんが、邪魔だけはするなよ。"
10025050-59 = "はぁ！？誰が誰を駆除するって……！？"
10025050-65 = "[ns] \"どうやら、誤解があったようです。\""
10025050-66 = "……誤解だと？"
10025050-67 = "人さまの調理場に忍び込んで、魚を盗もうとしてたじゃろ？#nこれのどこが誤解だと言うんだ。"
10025050-68 = "調理場……？"
10025050-69 = "腐敗した魚を並べてるコレのどこが調理場なんだ！？"
10025050-70 = "じゃから、これは腐った魚ではなく――！"
10025050-71 = "[s] \"「くさや」ですね。\""
10025050-72 = "くさ、や……？"
10025050-74 = "アジなどを用いて作られる、"
10025050-75 = "D.U.ではほとんど知られていませんが、[ruby=やとうら]夜戸浦[/ruby]村ではエビに次ぐ特産品です。"
10025050-76 = "強烈な臭いのせいで、私たちもまだ手を出せてませんけどね……はは。"
10025050-77 = "ここに来て随分と経ったのに、まだ食べれないなんて……これだから余所モンは。"
10025050-78 = "好き嫌いのひとつやふたつ、誰だってあるでしょう！？"
10025050-85 = "……くさやを知ってるとは、大したもんだ。"
10025050-86 = "くさやは卸す数を絞っとるから、D.U.でも取扱店は少ないだろうに。"
10025050-87 = "[s1] \"美食に目がない生徒が周りにいるもので……\"\n[s2] \"いろいろあって、接する機会が……\""
10025050-91 = "で、でも、怪しい点はまだあるぞ！？"
10025050-92 = "漁に出た人が怪我をするだとか、村が闇に飲み込まれるだとか……#nそれは一体どう説明するんだ？"
10025050-94 = "怪我人……村が闇に……？"
10025050-95 = "ああ、街灯が故障した件ですね。"
10025050-96 = "海風で電線がやられたのか、この辺り一帯の街灯がダメになったんですよ……"
10025050-97 = "それで、日が落ちたら足元も見えないくらいの真っ暗闇になるんです。"
10025050-98 = "日の出前に出港準備をしてた新米漁師が、転んでな。おおかたソレのことだろう。"
10025050-99 = "このままでは事故に直結するので、#n早く修理する人員を送ってほしいと何度も本部に要請しましたが……"
10025050-100 = "人手不足を理由に、1か月も放置されているんですよ。"
10025050-102 = "陸が沈んだり、真っ暗な海底から謎の生き物が襲ってくるわけじゃないんだ……#nよかったぁ……"
10025050-104 = "そういうお前さんたちは、何の目的でこの場所に近づいたんだ？"
10025050-105 = "海辺を散歩していたところ、怪しい人影を見つけたので後を追いました。"
10025050-106 = "釣り具を持っていたものの、村の住民には思えなかったので、何か不正を働いているのではないかと思い……"
10025050-110 = "ああ、あやつか。"
10025050-111 = "最近、釣りを教えてほしいとせがむ者がおってな。"
10025050-112 = "少し変わったやつだが、釣りの許可証はしっかり持っておるようじゃし……#nあまり気にせんで構わん。"
10025050-113 = "[s3] \"誤解だったとはいえ、ご迷惑をかけてしまいました。\"\n[s4] \"生徒の代わりに謝らせてください。\""
10025050-119 = "……今日のところは、見逃してやろう。"
10025050-120 = "日が昇る前には出んといけんからの。#nそろそろ出港前の点検をする時間だ。"
10025050-121 = "つまらんことに時間を割いて肝心のエビを逃せば、それこそ村の笑い者になるわい。"
10025050-122 = "そうですね……準備してきます。"
10025050-129 = "[ns] \"みんなにしては、珍しい早とちりだったね。\""
10025050-130 = "……申し訳ありません。"
10025050-131 = "状況を見極め、不要な衝突を防ぐはずの私たちが、自ら戦闘を招くような行動を……#n私の失態です。"
10025050-132 = "冷静さを失わないように注意していましたが、目の前の戦闘に集中するあまり……"
10025050-133 = "……この村は怪しいと決めつけてしまいました。"
10025050-134 = "いや、それは私も同じだ。いざ戦闘が始まるまでは、#n住民の作り話だと思っていたが……"
10025050-135 = "悪臭に惑わされて、いつの間にかあの伝説も本物だと信じ込んでしまった。"
10025050-136 = "ご、ごめん……#n私がずっと不吉なことばかり言ってたから、みんなの判断を鈍らせちゃって……"
10025050-137 = "こうなると分かってたら、静かにしていればよかった……"
10025050-139 = "みんな、口では否定してても、どこか頭では同じことを考えてたんだよ。"
10025050-140 = "これはミユのせいじゃなくて、みんなの責任だから。"
10025050-142 = "……落ち着いて考えれば、私はどうしてあんな考えに至ったのだろう、と。"
10025050-143 = "灯りのことも、干物のことも、変に疑いの目で見ていたせいで、誤った判断を下してしまいました。"
10025050-144 = "私たちはすっかり、村の伝説や供物に気を取られるばかり……"
10025050-145 = "これにも理由があるのでしょうか？"
10025050-146 = "もしかして、この村には本当に人を惑わす[ruby=・   ・]何か[/ruby]が存在するのでしょうか？"
10025050-147 = "[s] \"情報が多すぎたせい、じゃないかな？\""
10025050-148 = "情報過多……ですか。"
10025050-149 = "たしかに今回の任務では、聞き込みの段階で村の伝説をたくさん耳にしたな。"
10025050-150 = "本来なら調査内容の話だけで済むはずなのに、何故か信仰や伝説に関する話ばかりが集まってしまったのも原因だったんだろうな。"
10025050-151 = "1日目の報告書も「深きもの」に関する内容が中心で、SRTの調査というよりフィールドワークみたいだったねぇ。"
10025050-152 = "でも私は……昼の、海運会社の人の言葉が……気になるような……"
10025050-153 = "まだ、あの人の言葉がぐるぐるしてて……"
10025050-155 = "誤った先入観が、正しい判断を邪魔すると頭では分かっていたのですが……"
10025050-156 = "[s] \"あとは、日頃の疲れもあるんじゃないかな？\""
10025050-158 = "疲れって……私たちのことを見くびってないか？"
10025050-159 = "SRT特殊学園の過酷な訓練を耐え抜いた私たちが、そんな事でヘマをするとでも？"
10025050-160 = "[s] \"身体は元気でも、精神は疲れてるのかもしれないね。\""
10025050-161 = "精神の疲れ……？"
10025050-162 = "[s5] \"SRTは常に戦いへ身を投じてるから……\"\n[s6] \"落ち着いて過ごせる時間は少ないよね。\""
10025050-165 = "そうだねぇ。本来、人間は本能のままに動くものだからね。"
10025050-166 = "キヴォトス全体を危険に巻き込む大事件だって、最初はただの無邪気な欲望がきっかけだったりするし。"
10025050-167 = "……それはモエだけだろ。"
10025050-168 = "そうでもないよ？上の人が、どれくらい簡単に物事を決めてるのか知ったら……#nみんな、ビックリすると思うよ？……くひひっ。"
10025050-169 = "[s7] \"[ruby=はいちゅう]杯中[/ruby]の[ruby=だえい]蛇影[/ruby]、だったね。\"\n[s8] \"もっと肩の力を抜いて、村と向き合ってみた方がいいかもね。\""
10025050-173 = "しかし……本当に杯の中に蛇がいたら大変ですね。"
10025050-174 = "SRT特殊学園の一員として、そのような危険要因を放置するわけにはいきません。"
10025050-175 = "杯の中には蛇がいるのか、それとも影なのか……#n確認する良い方法はないでしょうか？"
10025050-176 = "[s] \"疑問が解消されたら、分かってくるんじゃないかな。\""
10025050-177 = "…………。"
10025050-178 = "[s] \"何はともあれ、まずは休もうか。\""
10025050-182 = "[ns9] \"せっかくの海だし、今は楽しまなくちゃ！\"\n[ns10] \"深きなんとかさんは、いったん忘れよう！\""
10025050-185 = "……分かりました。"
10025050-186 = "では、本日の夜間作戦はこれにて終了とします。"
10025050-187 = "……皆さん、遅くまでお疲れ様でした。"
10025050-189 = "お疲れ様でした！"
