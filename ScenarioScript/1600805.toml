[translation]
1600805-1 = "怠けがちな警察官の張り込み"
1600805-2 = "ブラックマーケット・武器の取引所前"
1600805-5 = "先生、遅い！"
1600805-6 = "こうしてる間に犯人が逃げたらどうするわけ？"
1600805-7 = "張り込みでは1分1秒が命取り！"
1600805-8 = "[s] \"フブキが意欲的だ……！\""
1600805-9 = "何か問題でもある？これでもヴァルキューレ警察学校の生徒なんだから、犯人を捕まえないとって気持ちは持ってて当然。"
1600805-10 = "犯人がいつ現れるかも分からないんだから、だるいとか疲れたとか言ってられない！"
1600805-11 = "[s] \"いつも言ってたような……？\""
1600805-12 = "それはまあ、えっと……。"
1600805-13 = "ほ、ほらとにかく！細かいことは気にしない、今大切なのは犯人を逮捕することでしょ。"
1600805-14 = "[s] \"ところで、犯人の特徴とかは？\""
1600805-15 = "特徴？"
1600805-16 = "えーっと……"
1600805-17 = "多分……怪しいスーツ、とか？"
1600805-18 = "[s1] \"「多分」！？\"\n[s2] \"結構な数いるような……？\""
1600805-19 = "大丈夫大丈夫、張り込みで大事なのは見た目じゃないよ。服装は変わってるかもだし、対象を逃さない持久力を持って挑まないと。"
1600805-20 = "大丈夫大丈夫、張り込みで大事なのは見た目じゃないよ。服装は変わってるかもだし、対象を逃さない持久力を持って挑まないと。"
1600805-21 = "っていうわけでその持久力を維持するために、必要な物があるの。"
1600805-22 = "それは私が取ってくるから、先生はここで待ってて。"
1600805-29 = "先生、お待たせ。"
1600805-30 = "[s] \"ううん。ところでその手に持ってる箱は……？\""
1600805-31 = "見て分かるでしょ、「マスタードーナッツ」のボックスセットだよ。"
1600805-32 = "今日は先生も一緒だから、特別に2箱！"
1600805-33 = "長時間張り込みなんかしてると、糖分とかカフェインが必要になるからね。そういう事情もあって、張り込みの時はこういう経費が幾らでも落ちるわけ。"
1600805-34 = "それにこうしてる間は電源を切っておいても許されるから……のんびりドーナッツを楽しむには、最高の状況！"
1600805-35 = "[s] \"それが目的だったと……。\""
1600805-36 = "ほら先生、もうちょっとこっちに来て。"
1600805-37 = "ドーナッツを置くスペースが無いから。"
1600805-38 = "ふふっ、さて。じゃあ張り込みを始めるとしよっか？"
1600805-41 = "[wa:450]― あぁー……[wa:1800]これぞ[wa:500]天国……"
1600805-44 = "[wa:200]― 温かい[wa:500]ボンネットの[wa:800]上で、[wa:2000]ドーナッツに[wa:700]コーヒー……"
1600805-46 = "[wa:100]― いやぁ、[wa:1500]張り込み[wa:500]最高！"
1600805-49 = "[ns] \"そこまで寛いでて大丈夫……？\""
1600805-50 = "[wa:500]― あ、[wa:1300]先生。[wa:2000]ちゃんと[wa:300]周りを警戒しておいてよ。"
1600805-52 = "― こうしてる[wa:500]間にも、[wa:1800]犯人が[wa:500]通り過ぎるかもしれないし。"
1600805-55 = "[wa:1000]― （はむっ、[wa:1000]モグ[wa:600]モグ……）"
1600805-58 = "[wa:1700]― やっぱり [wa:1000]コーヒーと[wa:400]一緒に食べるなら、"
1600805-60 = "― オールドファッションが[wa:1000]至高……[wa:1600]ふふっ。"
1600805-63 = "[wa:250]― ん？[wa:1150]どうしたの、[wa:500]先生？"
1600805-65 = "― ……[wa:950]ドーナッツ[wa:300]食べたい？"
1600805-68 = "いやぁー、結局犯人は現れなかったね。"
1600805-69 = "[s] \"もしいたとしても、見逃した気も……。\""
1600805-70 = "それは無いから大丈夫！たとえ目線はドーナッツに注がれてても、私の鋭い第六感はずっと周囲に向けられてたから。"
1600805-71 = "今日は見つからなかったし仕方ない。犯人を捕まえるために、また明日も張り込みをしないと。"
1600805-72 = "次回は砂糖たっぷりの、グレーズド・ドーナッツにしよっと！"
1600805-73 = "[s] \"やっぱり目的そっちだよね……？\""
