[translation]
1600805-1 = "A espreita de uma policial preguiçosa"
1600805-2 = "Mercado Negro, em frente à loja de armas"
1600805-5 = "Professor, você está atrasado!"
1600805-6 = "O que a gente faz se o criminoso fugir enquanto esperamos?"
1600805-7 = "Em uma espreita, cada segundo é crucial!"
1600805-8 = "[s] \"A Fubuki está motivada...!\""
1600805-9 = "Algum problema com isso? Eu sou uma aluna da Academia de Polícia Valkyrie, então é natural que eu tenha vontade de capturar criminosos."
1600805-10 = "Como não sabemos quando o criminoso vai aparecer, não posso ficar dizendo que estou cansada ou com preguiça!"
1600805-11 = "[s] \"Você não costuma dizer isso sempre...?\""
1600805-12 = "Isso é... bem, sabe como é..."
1600805-13 = "E-ei, esquece isso! Não se preocupe com detalhes, o que importa agora é prender o criminoso."
1600805-14 = "[s] \"A propósito, quais são as características do criminoso?\""
1600805-15 = "Características?"
1600805-16 = "Bem..."
1600805-17 = "Talvez... um terno suspeito, talvez?"
1600805-18 = "[s1] \"'Talvez'!?\"\n[s2] \"Não tem um monte de gente assim...?\""
1600805-19 = "Tudo bem, tudo bem. O que importa na espreita não é a aparência. As roupas podem mudar, então precisamos ter resistência para não deixar o alvo escapar."
1600805-20 = "Tudo bem, tudo bem. O que importa na espreita não é a aparência. As roupas podem mudar, então precisamos ter resistência para não deixar o alvo escapar."
1600805-21 = "Por isso, preciso de algumas coisas para manter essa resistência."
1600805-22 = "Eu vou buscar, então o professor pode esperar aqui."
1600805-29 = "Professor, desculpe a demora."
1600805-30 = "[s] \"Tudo bem. A propósito, o que é essa caixa que você está segurando...?\""
1600805-31 = "Dá para ver, não dá? É um conjunto de caixas da 'Master Donuts'."
1600805-32 = "Como o professor está aqui hoje, trouxe duas caixas especialmente!"
1600805-33 = "Quando ficamos de espreita por muito tempo, precisamos de açúcar e cafeína. Por causa disso, despesas como essa são sempre reembolsadas."
1600805-34 = "Além disso, enquanto estamos aqui, podemos desligar o rádio... é a situação perfeita para curtir uns donuts com calma!"
1600805-35 = "[s] \"Então esse era o objetivo...\""
1600805-36 = "Ei, professor, chegue um pouco mais para cá."
1600805-37 = "Não tem espaço para colocar os donuts."
1600805-38 = "Fufu, bem. Então, vamos começar a espreita?"
1600805-41 = "[wa:450]— Ah... [wa:1800] isso sim é [wa:500] o paraíso..."
1600805-44 = "[wa:200]— Em cima do [wa:500] capô quente, [wa:800] com [wa:2000] donuts e [wa:700] café..."
1600805-46 = "[wa:100]— Nossa, [wa:1500] espreita [wa:500] é o máximo!"
1600805-49 = "[ns] \"Você está tão relaxada, tem certeza que está tudo bem...?\""
1600805-50 = "[wa:500]— Ah, [wa:1300] professor. [wa:2000] Fique de olho [wa:300] nos arredores para mim."
1600805-52 = "— Enquanto fazemos isso, [wa:500] o criminoso [wa:1800] pode acabar [wa:500] passando por aqui."
1600805-55 = "[wa:1000]— (Nhac, [wa:1000] mastigando [wa:600] mastigando...)"
1600805-58 = "[wa:1700]— Realmente, [wa:1000] se for para comer com [wa:400] café,"
1600805-60 = "— o Old Fashioned é [wa:1000] supremo... [wa:1600] fufu."
1600805-63 = "[wa:250]— Hm? [wa:1150] O que foi, [wa:500] professor?"
1600805-65 = "— ... [wa:950] quer um [wa:300] donut?"
1600805-68 = "Nossa, no fim das contas o criminoso não apareceu."
1600805-69 = "[s] \"Mesmo se tivesse aparecido, acho que teríamos deixado passar...\""
1600805-70 = "Isso não vai acontecer, pode ficar tranquilo! Mesmo que meus olhos estivessem nos donuts, meu sexto sentido aguçado estava focado nos arredores o tempo todo."
1600805-71 = "Não encontramos nada hoje, mas não tem problema. Para capturar o criminoso, vamos ter que fazer outra espreita amanhã."
1600805-72 = "Da próxima vez, vou escolher um donut glaceado, bem cheio de açúcar!"
1600805-73 = "[s] \"O objetivo é esse mesmo, né...?\""
