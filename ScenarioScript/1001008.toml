[translation]
1001008-1 = "都市部見学"
1001008-2 = "アビドス付近の通り"
1001008-4 = "（通りすがりのシロコを偶然発見した）"
1001008-5 = "午後1時30分……カイザーコンビニの納品用トラック到着。重い物から順に積載開始……。"
1001008-6 = "店員が外に出ると、倉庫に死角が発生する。"
1001008-7 = "この時に裏口を使って建物に突入すれば……#n場合によっては車両を用意しておくのも考えて……。"
1001008-8 = "うーん……そもそもこの区域は、流動人口が多すぎる。最適な時間帯についてはもう少し考える必要があるかも。"
1001008-9 = "よし、次の区域に移動。"
1001008-11 = "[s] シロコの様子が怪しい……後をつけてみよう。"
1001008-13 = "別の通り"
1001008-15 = "（やはりシロコが身を隠したまま、高架道路を注視している）"
1001008-16 = "午後2時10分……コーキ電気のあのトラックの運転手は、毎日この時間になるとKVハイウェイの高架道路の下に車を止めて昼寝をする。"
1001008-17 = "この時にトラックの荷台に乗り込むことができれば……簡単に本社の建物の中に……。"
1001008-18 = "うーん……でも、このトラックはすぐに外郭道路に乗って5時間ノンストップで走るから、食べ物を準備しておかないといけないかも……。"
1001008-19 = "ん、次の区域に移動しよう。"
1001008-21 = "[s] やっぱり怪しい……引き続き後をつけてみよう。"
1001008-23 = "ある建物の屋上"
1001008-25 = "（シロコはまた身を隠したまま、地域の銀行を見下ろしている）"
1001008-26 = "午後3時ジャスト。警備が厳しいけど……警備員が交代される時だけは死角もできるはず。"
1001008-27 = "業務を引き継ぐこの5分間で正門の警備員たちを制圧できれば、金庫までは一瀉千里に……。"
1001008-30 = "[s] \"何をしてるの……？\""
1001008-31 = "（ビクッ！？）"
1001008-32 = "……。"
1001008-33 = "せ、先生！？"
1001008-34 = "うーん……あの……だから……。"
1001008-35 = "えっと……うーん……なんて説明すればいいのかな、これ……。"
1001008-36 = "[s] \"ダメです。\""
1001008-37 = "……。"
1001008-38 = "やっぱり銀行を強盗するのはダメか……。"
1001008-39 = "[s] \"犯罪はダメ。\""
1001008-40 = "……バレなければ……。"
1001008-41 = "[s] \"ダメ。\""
1001008-42 = "ん……ごめん。分かった……。"
1001008-43 = "うーん……言い訳ではないけど、本当にやるつもりっていうより、これは趣味みたいなもので……。"
1001008-44 = "……。"
1001008-45 = "……ごめん。"
1001008-47 = "（シロコは少しだけ落ち込んだ様子だった）"
