[translation]
1001008-1 = "Visita à área urbana"
1001008-2 = "Rua perto de Abydos"
1001008-4 = "(Você encontrou Shiroko passando por acaso)"
1001008-5 = "13:30... O caminhão de entregas da Kaiser Convenience chegou. Começando a carregar os itens mais pesados primeiro..."
1001008-6 = "Quando o funcionário sai, cria-se um ponto cego no armazém."
1001008-7 = "Se eu entrar no prédio pela porta dos fundos nesse momento... #nTalvez seja bom considerar preparar um veículo também..."
1001008-8 = "Hmm... Para começar, essa área tem um fluxo de pessoas muito alto. Talvez eu precise pensar um pouco mais sobre o horário ideal."
1001008-9 = "Certo, indo para a próxima área."
1001008-11 = "[s] A Shiroko está agindo de forma suspeita... Vou segui-la."
1001008-13 = "Outra rua"
1001008-15 = "(Como esperado, Shiroko está escondida, observando o viaduto)"
1001008-16 = "14:10... O motorista daquele caminhão da Koki Electric para o carro embaixo do viaduto da rodovia KV para tirar uma soneca todo dia nesse horário."
1001008-17 = "Se eu conseguir subir na carroceria do caminhão nesse momento... posso entrar facilmente no prédio da sede..."
1001008-18 = "Hmm... Mas esse caminhão pega a estrada de contorno logo em seguida e dirige por 5 horas sem parar, então talvez eu precise preparar comida..."
1001008-19 = "Hm, vamos para a próxima área."
1001008-21 = "[s] Ela está suspeita mesmo... Vou continuar seguindo-a."
1001008-23 = "Telhado de um prédio"
1001008-25 = "(Shiroko está escondida novamente, observando o banco da região)"
1001008-26 = "15:00 em ponto. A segurança é rigorosa, mas... deve haver um ponto cego quando os guardas trocam de turno."
1001008-27 = "Se eu conseguir subjugar os guardas do portão principal durante esses 5 minutos de troca de turno, o caminho até o cofre será direto..."
1001008-30 = "[s] \"O que você está fazendo...?\""
1001008-31 = "(Assustada!?)"
1001008-32 = "..."
1001008-33 = "Se-Sensei!?"
1001008-34 = "Hmm... aquilo... então..."
1001008-35 = "Bem... hum... como eu deveria explicar isso..."
1001008-36 = "[s] \"Não pode.\""
1001008-37 = "..."
1001008-38 = "Então, assaltar o banco não pode mesmo..."
1001008-39 = "[s] \"Crime não é permitido.\""
1001008-40 = "...Se ninguém descobrir..."
1001008-41 = "[s] \"Não.\""
1001008-42 = "Hm... desculpa. Entendi..."
1001008-43 = "Hmm... não é uma desculpa, mas, em vez de realmente pretender fazer isso, é mais como um hobby..."
1001008-44 = "..."
1001008-45 = "...Desculpa."
1001008-47 = "(Shiroko parecia um pouco desanimada)"
