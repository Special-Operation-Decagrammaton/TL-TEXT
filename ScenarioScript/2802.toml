[translation]
2802-1 = "227号特別クラスの嘆願書（２）"
2802-5 = "「チョコミント解放戦線」の嘆願書"
2802-6 = "「227号特別クラスの生徒たちは、とても可哀想です。なぜなら、最高に美味しい食べ物であるチョコミントを食べる機会が無いからです。」"
2802-7 = "「よって、227号特別クラスには大量のチョコミントを支給するべきです。それ以外のことはどうでも良いけど。」"
2802-12 = "「唐揚げにレモンを反対する革命家たちの集まり」の嘆願書"
2802-13 = "「227号特別クラスの生徒たちは、真っ当な権利が保障されていません。補給品もろくに届かず、たまに肉が食べられたとしても、冷たくてパサパサの唐揚げを食べているそうです。」"
2802-14 = "「そもそも、『唐揚げ』って表現がちょっとおかしいと思う。私の地域では、揚げた鶏肉のことは『ザンギ』って呼んでた。だからこの部活の名前は『ザンギにレモンをかけることを許さない革命家集団」に変えるべきだと思う」"
2802-15 = "「唐揚げは唐揚げ、崇高な名前です。竜田揚げなども同じこと、他の表現は許されません」"
2802-16 = "「じゃあザンタレのことは何て呼ぶの？からタレ？」"
2802-17 = "「レモンが許されないのに、どうしてタレが許されると思った！さてはお前スパイだな！？」"
2802-18 = "どうしてこの人たちは、嘆願書で喧嘩を……。"
2802-19 = "それに旧校舎は「チョコミント」とか「唐揚げ」とかそんな贅沢言ってられないのに！勝手に自分たちの主張を盛り込んでるし！"
2802-20 = "まあ、仕方ないよ。レッドウィンター連邦学園の生徒たちは大体、自分たちがこだわる分野以外には全く興味が無いんだし……。"
2802-21 = "うぅ、こうなったらもう自分たちで反省文を書くしか……でも、そもそも「第三者が書く方が効果がある」って始めた話だったのに……。"
2802-24 = "あ。久しぶりだね、227号特別クラスの同志諸君！"
2802-26 = "み、ミノリさん？旧校舎に何のご用で……？"
2802-27 = "わ、私たち、今は別に工事の費用を滞納したり、工務部の権利を侵害したりしてませんが……！？"
2802-28 = "……我々だって、いつもストライキばかりしてるわけじゃないぞ？"
2802-29 = "まあ、一から説明しよう。工務部はレッドウィンターの土木関係を一手に引き受けていることもあってな。学園中の噂も自然と集まってくるんだ。"
2802-30 = "そこで何やら、かつて共に革命を目指した同志でもある227号クラスがあちこちに助けを求めている……と、小耳に挟んでな。"
2802-31 = "あ、ありがとうございます……ですが今の私たちに必要なのは、土木関係のお力ではなく「事務局に出す嘆願書」でして……。"
2802-32 = "227号特別クラスの悲惨な境遇を訴えるため、「知識解放戦線」などあちこちの部活に頼んでみたのですが……あまり良い文章を貰えなくって。"
2802-33 = "そういうことなら、あたしの専門分野だ！"
2802-34 = "良い工事は労働者の団結から。労働者の団結は良い演説から。そして良い演説は、良い文章から生まれるものだからな！"
2802-35 = "な、なるほど……？えっと、では一度ミノリさんにお願いしてみても良いでしょうか……？"
2802-36 = "うん、ちょっと待っててくれ！"
2802-41 = "「'旧校舎で生活している227号特別クラスの生徒たちは、過酷な寒さの中で、劣悪な寝具と暖房施設によって苦しんでいます。」"
2802-43 = "「これは彼女らの過ちを考慮しても、あまりにも危険な環境と言えます。ですので227号特別クラスの生徒たちへ恩赦を与え、すぐに本校舎に復帰させることを希望します。」"
2802-44 = "あっ……ちゃ、ちゃんとした文章……。"
2802-45 = "何だ、意外そうだな。あたしは作文の試験では、満点以外取ったことないんだぞ。"
2802-46 = "対象と目的が明確なら、そこに向けて積み上げるのは難しくない。"
2802-47 = "あとはちょっとした美辞麗句を添えて、読み手の興味が引けたら完璧！"
2802-48 = "あ、ありがとうございます！この嘆願書ならきっと事務局の幹部たちも、私たちがどれだけ過酷な環境で耐え忍んでいるのかを分かってくれるはずです！"
2802-49 = "こんなすぐに完璧な嘆願書を書けるだなんて、流石は工務部の部長！"
2802-51 = "確かに良い文章なんだけど……今さらながらこれ、チェリノ会長は読んでくれるのかな？"
2802-52 = "「めんどくさい！」って投げ捨てて、一文字も目を通さない可能性とか……。"
2802-54 = "そ、それは確かに……あの無責任のちびっ子には十分あり得る話……。"
2802-55 = "何か手紙を読まずにはいられなくなるような、そういうアイデアが無いと……。"
2802-57 = "あ、それなら良い方法があるよ。"
2802-59 = "封筒のところに、こうやって書き加えて……"
2802-61 = "な、なるほど！これなら確かに、誰でもまず開けてみようという気になるかもしれません！"
2802-64 = "それから送り主を誤解しないように、こういう文章を付け加えて……"
2802-66 = "わぁ、良いですね！これで完璧です！"
2802-67 = "あとはこの嘆願書が無事に事務局に届いて、私たちの苦労が伝われば……"
2802-68 = "私たち、すぐにでも本校舎に戻れるかも……！？"
2802-70 = "（1週間後、レッドウィンター事務局内チェリノ実務室）"
2802-71 = "書記長、定期報告のお時間です。"
2802-72 = "今週も学園内の様々な部活から、チェリノ会長宛てにお手紙が届いております。"
2802-73 = "ふふん、まあ内容なんて読むまでも無いな。"
2802-74 = "手紙にはきっと、おいらの偉大さと髭とを称賛する内容で溢れているのだろう？"
2802-75 = "えっと、試しに幾つか読み上げますと……。"
2802-76 = "「チョコミントの味も分からないチビに会長の資格など無い」「偽物の髭はいい加減外せ」「独裁に明け暮れるチビめ、そろそろ目を覚ませ」……といった内容です。"
2802-77 = "な、なにぃ！？"
2802-78 = "い、いくら手紙とはいえ、このおいらと髭の権威を真正面から否定するとは！"
2802-79 = "トモエ！届いた手紙を全部こっちに！そんなことを書いた輩は、全員地の果てまで追いかけて粛清だ！"
2802-87 = "……うん？なんだこの汚い手紙は。封筒に何か、赤い字で書いてあるが……"
2802-89 = "……「この手紙を読まないと呪われる」？"
2802-90 = "と、トモエ……！？ど、どうしよう？この手紙を読まないと、おいら呪われちゃう……！？"
2802-91 = "気にしないでください、それはおそらく「不幸の手紙」です。"
2802-92 = "「不幸の手紙」……？"
2802-93 = "はい。恐ろしげなことをたくさん書いて、たくさんの人を経由して回させる迷信の一種で、最近生徒たちの間で流行っているようです。"
2802-94 = "おそらくその手紙の中にも、色んな怖い話が書かれてると思いますが……つまりは「嘘のお話」です。"
2802-95 = "……そ、そうか。確かに何だか、怖いことがたくさん書かれているな。"
2802-96 = "旧校舎で何やら、過酷な環境と劣悪な寝具で苦しんでいるという凄惨な内容が……。"
2802-97 = "嘘とはいえ、恐ろしい話だな……何か引っかかる気もするが……。"
2802-98 = "……トモエ秘書室長。今日のお昼寝の時間は、そばにいてもらうぞ？"
2802-99 = "も、もちろん決して、怖いからとかでは無い！ただその、えっと……"
2802-100 = "もちろんです、チェリノ会長。このトモエ、会長が眠るまでずっとそばで見守っております。"
2802-101 = "その不幸の手紙は、私の方で処理しますね？あ、もうそこのペチカで燃やしてしまいましょうか。"
2802-103 = "うむ、それが良いな。"
2802-112 = "さあ、では気を取り直して次の仕事に――"
2802-113 = "そうして227号特別クラスのための嘆願書は、一握りの灰になって消えてしまったのだった……。"
2802-114 = "227号特別クラスの嘆願書"
