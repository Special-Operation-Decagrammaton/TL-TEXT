[translation]
2802-1 = "Petição da Classe Especial 227 (2)"
2802-5 = "Petição da 'Frente de Libertação de Choco-Menta'"
2802-6 = "“As alunas da Classe Especial 227 são muito dignas de pena. Isso porque elas não têm a oportunidade de comer a comida mais deliciosa do mundo: o choco-menta.”"
2802-7 = "“Portanto, a Classe Especial 227 deve receber um suprimento massivo de choco-menta. O resto não importa muito, na verdade.”"
2802-12 = "Petição do 'Grupo de Revolucionários Contra o Limão no Frango Frito'"
2802-13 = "“As alunas da Classe Especial 227 não têm seus direitos básicos garantidos. Os suprimentos mal chegam e, quando conseguem comer carne, dizem que é um frango frito frio e seco.”"
2802-14 = "“Para começar, acho que o termo 'frango frito' está um pouco errado. Na minha região, chamávamos o frango frito de 'Zangi'. Por isso, acho que o nome deste clube deveria ser mudado para 'Grupo de Revolucionários que Não Permitem Limão no Zangi'."
2802-15 = "“Frango frito é frango frito, é um nome sublime. O mesmo vale para o Tatsuta-age, outros termos não são permitidos.”"
2802-16 = "“Então, como você chama o Zantare? Frango com molho?”"
2802-17 = "“Se o limão não é permitido, por que você achou que o molho seria?! Você é um espião, não é?!”"
2802-18 = "Por que essas pessoas estão brigando em uma petição...?"
2802-19 = "Além disso, no prédio antigo, não temos o luxo de discutir sobre 'choco-menta' ou 'frango frito'! Elas estão colocando suas próprias opiniões sem mais nem menos!"
2802-20 = "Bem, não tem jeito. As alunas da Academia Federal Red Winter geralmente não têm interesse em nada além do que elas mesmas defendem..."
2802-21 = "Ugh, se as coisas continuarem assim, teremos que escrever a carta de desculpas nós mesmas... Mas, para começo de conversa, a ideia era que 'seria mais eficaz se um terceiro escrevesse'..."
2802-24 = "Ah. Quanto tempo, camaradas da Classe Especial 227!"
2802-26 = "Mi-Minori-san? O que faz no prédio antigo...?"
2802-27 = "N-Nós não estamos atrasando o pagamento das obras nem infringindo os direitos do Departamento de Obras agora, estamos...!?"
2802-28 = "…Nós não vivemos apenas fazendo greves, sabia?"
2802-29 = "Bem, vou explicar desde o início. Como o Departamento de Obras cuida de toda a engenharia civil de Red Winter, os boatos de toda a academia acabam chegando até nós naturalmente."
2802-30 = "Ouvi dizer que a Classe 227, camaradas que um dia buscaram a revolução conosco, estava pedindo ajuda por toda parte..."
2802-31 = "Ah, muito obrigada... Mas o que precisamos agora não é de ajuda com engenharia civil, e sim de uma 'petição para enviar à Secretaria'..."
2802-32 = "Tentamos pedir a vários clubes, como a 'Frente de Libertação do Conhecimento', para expor a situação miserável da Classe Especial 227, mas... não conseguimos textos muito bons."
2802-33 = "Se é esse o caso, essa é a minha especialidade!"
2802-34 = "Uma boa obra nasce da união dos trabalhadores. A união dos trabalhadores nasce de um bom discurso. E um bom discurso nasce de um bom texto!"
2802-35 = "E-Entendo...? Bem, então, poderíamos pedir à Minori-san para escrever para nós...?"
2802-36 = "Sim, esperem um pouco!"
2802-41 = "“As alunas da Classe Especial 227, que vivem no prédio antigo, sofrem com o frio intenso, roupas de cama precárias e instalações de aquecimento inadequadas.”"
2802-43 = "“Mesmo considerando seus erros, este é um ambiente perigoso demais. Portanto, esperamos que seja concedido um perdão às alunas da Classe Especial 227 e que elas possam retornar imediatamente ao prédio principal.”"
2802-44 = "Ah... u-um texto de verdade..."
2802-45 = "O que foi? Parece surpresa. Eu nunca tirei nada menos que nota máxima em testes de redação."
2802-46 = "Se o alvo e o objetivo estão claros, não é difícil construir o argumento em direção a eles."
2802-47 = "Depois, é só adicionar um pouco de retórica para atrair o interesse do leitor e pronto!"
2802-48 = "Ah, muito obrigada! Com esta petição, os executivos da Secretaria certamente entenderão o quão severo é o ambiente que estamos suportando!"
2802-49 = "Conseguir escrever uma petição perfeita tão rápido, como esperado da chefe do Departamento de Obras!"
2802-51 = "É um texto muito bom, mas... agora que parei para pensar, será que a Presidente Cherino vai ler isso?"
2802-52 = "Existe a possibilidade de ela dizer 'Que chato!' e jogar fora sem ler uma única palavra..."
2802-54 = "I-Isso é verdade... Sendo aquela pirralha irresponsável, é bem possível..."
2802-55 = "Precisamos de uma ideia que a obrigue a ler a carta..."
2802-57 = "Ah, nesse caso, tenho uma boa ideia."
2802-59 = "Se escrevermos assim no envelope..."
2802-61 = "E-Entendi! Com isso, certamente qualquer um sentiria vontade de abrir para ver!"
2802-64 = "E para não haver mal-entendidos sobre quem enviou, vamos adicionar este texto..."
2802-66 = "Uau, que ótimo! Agora está perfeito!"
2802-67 = "Agora, se esta petição chegar à Secretaria em segurança e nosso sofrimento for transmitido..."
2802-68 = "Talvez possamos voltar ao prédio principal logo...!"
2802-70 = "(Uma semana depois, Gabinete da Cherino na Secretaria de Red Winter)"
2802-71 = "Secretária, é hora do relatório periódico."
2802-72 = "Esta semana também chegaram cartas de vários clubes da academia endereçadas à Presidente Cherino."
2802-73 = "Hmph, nem preciso ler o conteúdo."
2802-74 = "As cartas devem estar transbordando de elogios à minha grandeza e ao meu bigode, não é?"
2802-75 = "Bem, vou ler alguns deles para testar..."
2802-76 = "'Uma tampinha que não sabe nem o gosto de menta com chocolate não tem資格 para ser presidente', 'Tire logo esse bigode falso', 'Sua tampinha ditadora, é hora de acordar'... e coisas do tipo."
2802-77 = "O-o quê!?"
2802-78 = "M-mesmo sendo apenas cartas, como ousam desafiar a autoridade deste bigode e a minha diretamente!"
2802-79 = "Tomoe! Traga todas as cartas que chegaram aqui! Vou perseguir cada um desses sujeitos até o fim do mundo e expurgá-los!"
2802-87 = "...Hm? O que é essa carta suja? Tem algo escrito em vermelho no envelope..."
2802-89 = "...'Você será amaldiçoado se não ler esta carta'?"
2802-90 = "T-Tomoe...!? O-o que eu faço? Se eu não ler esta carta, vou ser amaldiçoado...!?"
2802-91 = "Não se preocupe, isso provavelmente é uma 'corrente de azar'."
2802-92 = "'Corrente de azar'...?"
2802-93 = "Sim. É um tipo de superstição que escreve coisas assustadoras e circula entre muitas pessoas; parece que está na moda entre os alunos ultimamente."
2802-94 = "Provavelmente há várias histórias assustadoras escritas dentro dessa carta também, mas... no fim das contas, são apenas 'mentiras'."
2802-95 = "...E-entendo. Realmente, tem muitas coisas assustadoras escritas aqui."
2802-96 = "Diz que estão sofrendo no prédio antigo com um ambiente cruel e roupas de cama precárias, um conteúdo terrível..."
2802-97 = "Mesmo sendo mentira, é uma história assustadora... Sinto que tem algo estranho nisso..."
2802-98 = "...Chefe de Gabinete Tomoe. Na hora da minha soneca hoje, quero que fique ao meu lado, entendeu?"
2802-99 = "N-não é que eu esteja com medo, claro! É só que, bem..."
2802-100 = "Com certeza, Presidente Cherino. Eu, Tomoe, ficarei ao seu lado vigiando até que a senhora adormeça."
2802-101 = "Eu cuidarei dessa corrente de azar, tudo bem? Ah, vamos queimá-la naquela lareira ali mesmo."
2802-103 = "Hum, isso é uma boa ideia."
2802-112 = "Muito bem, vamos retomar o trabalho..."
2802-113 = "E assim, a petição para a Classe Especial 227 se transformou em um punhado de cinzas e desapareceu..."
2802-114 = "Petição da Classe Especial 227"
