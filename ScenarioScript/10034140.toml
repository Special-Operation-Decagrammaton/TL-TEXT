[translation]
10034140-1 = "5日前：ポジションチェンジ"
10034140-3 = "……これくらいにしとくー？"
10034140-4 = "ふぅ……上達してるような、してないような……。"
10034140-5 = "成長の最中、それを感じるのは難しい……って言われてるね。"
10034140-6 = "でも心配する必要は無いよ、練習計画は完璧だし。"
10034140-8 = "そのまま行けば、きっとたどり着けるさ……あの空の向こうまで。"
10034140-9 = "褒められてるはずなのに、何かムカつくわね。"
10034140-10 = "っていうか、あんたはどの立場から言ってるのよ。"
10034140-11 = "なにおう。"
10034140-12 = "私だって、日々上達してる！"
10034140-13 = "はいはい、まあ確かにそうね。"
10034140-15 = "……いつも通りだね。"
10034140-16 = "そういえばアイリ、そろそろ交代する？"
10034140-17 = "ずっと私の番だったし。"
10034140-18 = "はい、どうぞ。"
10034140-19 = "ありがと、カズサちゃん。"
10034140-20 = "じゃあ、演奏見ててね。何か気になったら教えて！"
10034140-21 = "うん、了解。"
