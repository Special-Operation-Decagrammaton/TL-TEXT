[translation]
12070-1 = "第7話;アビドス砂漠へ（２）"
12070-3 = "ここから先が、捨てられた砂漠……。"
12070-4 = "砂だらけの市街地に行ったことはありましたが、ここから先は私も初めてです……。"
12070-5 = "いや～、久しぶりだねえこの景色も。"
12070-6 = "先輩は、ここに来たことあるの？"
12070-7 = "うん、前に生徒会の仕事で何度かね～。"
12070-8 = "もう少し進めばそこにはなんと、かつてアビドスの砂祭りが開かれていたオアシスが！"
12070-9 = "え、オアシス？こんなところに？"
12070-10 = "うん、まあ今はもう全部干上がっちゃったんだけどね～。元々はそんじょそこらの湖より広くって、船を浮かべられるくらいだったとか。"
12070-11 = "ま、私も実際に見たことはないんだけど～。"
12070-12 = "砂祭り……私も聞いたことある。アビドスでは有名なお祭りで、すごい数の人が集まるって。"
12070-13 = "そうそう、別の学校からもそのお祭り見たさに人が来るくらいだったからね。ま、砂漠化が進み始めるより何十年も前のことだけど。"
12070-14 = "へえ、今となってはこんな光景になっちゃってるけど、ここでそんなすごいお祭りが……？"
12070-15 = "前までは、この辺りも結構住みやすい場所だったらしいよ～。その時はこんな砂埃もなかったし。ところでアヤネちゃん、まだ目的地は遠そう？"
12070-17 = "ゲヘナの風紀委員長が言っていたセクターまでは、もう少し時間がかかりそうです。"
12070-18 = "見たところ、この辺りは特に何も無さそうですが……。"
12070-19 = "とりあえず、引き続き警戒しつつ前進してください。"
