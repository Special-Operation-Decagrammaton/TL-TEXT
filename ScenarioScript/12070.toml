[translation]
12070-1 = "Episódio 7: Rumo ao Deserto de Abydos (2)"
12070-3 = "Daqui em diante é o deserto abandonado..."
12070-4 = "Eu já fui a áreas urbanas cheias de areia, mas daqui para frente é a primeira vez para mim também..."
12070-5 = "Ah, faz tempo que não vejo essa paisagem."
12070-6 = "Senpai, você já esteve aqui antes?"
12070-7 = "Sim, algumas vezes por causa do trabalho no conselho estudantil."
12070-8 = "Se avançarmos um pouco mais, encontraremos o oásis onde o Festival de Areia de Abydos costumava ser realizado!"
12070-9 = "Hã, um oásis? Aqui?"
12070-10 = "Sim, bem, agora ele secou completamente. Dizem que, originalmente, era maior que qualquer lago comum, a ponto de conseguirem flutuar barcos nele."
12070-11 = "Bom, eu mesma nunca cheguei a ver pessoalmente."
12070-12 = "Festival de Areia... Eu já ouvi falar. É um festival famoso em Abydos, dizem que atraía uma quantidade enorme de pessoas."
12070-13 = "Isso mesmo, vinha gente até de outras escolas só para ver o festival. Mas isso foi décadas antes da desertificação começar."
12070-14 = "Nossa, hoje em dia está assim, mas pensar que um festival tão incrível acontecia aqui...?"
12070-15 = "Dizem que, antigamente, essa região era um lugar bem habitável. Naquela época, não havia toda essa poeira. Aliás, Ayane-chan, ainda falta muito para o destino?"
12070-17 = "Ainda levará algum tempo até chegarmos ao setor mencionado pela presidente do Comitê Disciplinar de Gehenna."
12070-18 = "Pelo que vejo, não parece haver nada de especial por aqui..."
12070-19 = "Por enquanto, continuem avançando enquanto mantêm a vigilância."
