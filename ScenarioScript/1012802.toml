[translation]
1012802-1 = "残骸から見えるもの"
1012802-2 = "（翌日、仕事を終えてシャーレに戻るころ――）"
1012802-9 = "[ns] \"！？\""
1012802-11 = "[ns] \"なにごと！？\""
1012802-13 = "ほぉ……フィナーレは爆発で……。"
1012802-14 = "奥が深い。#n言葉では説明できない「何か」を、炎と煙で伝えたのか……。"
1012802-15 = "でもなぜ、こんな形で？"
1012802-16 = "パフォーマンスアート……なんでしょうね。"
1012802-18 = "[ns] \"パフォーマンスアート……？\""
1012802-20 = "（現場に近づいてみると……）"
1012802-21 = "（壊れたテレビやモニター、ラジオ、カメラなどの残骸が散らばっていた）"
1012802-22 = "（そして、その中心には……）"
1012802-24 = "あ、先生！"
1012802-25 = "[s] \"フユ、これは……？\""
1012802-26 = "あ、この残骸ですか？"
1012802-27 = "そうですね、ざっくり言えば……。"
1012802-28 = "静止したオブジェ、あるいはダンス、歌、スピーチ……。"
1012802-29 = "そういった既存概念では規定できない――"
1012802-30 = "秘儀を体現する際の芸術的苦悩……とでも言いましょうか。"
1012802-31 = "[s] \"……うん？\""
1012802-32 = "えっと……つまり、メディアアートのパフォーマンスをしていたんです。"
1012802-33 = "[s] \"なるほど……！\""
1012802-37 = "[ns] \"じゃあ、モモトークで言ってた外出って……。\""
1012802-38 = "ええ。このために外出許可をいただきました。"
1012802-39 = "……もちろん、ちょっとした[ruby=・   ・]副業[/ruby]の予定もありますが。"
1012802-40 = "私が追求する芸術には、お金がかかりますからね。"
1012802-41 = "電子機器や、それらを改造するための工具も……。"
1012802-42 = "[s] \"だから特殊交易部の活動をしてるんだね。\""
1012802-43 = "そうとも言えます。#n理由はそれだけではありませんが……。"
1012802-44 = "しかし、残念です。#nちょうどパフォーマンスが終わった頃にいらっしゃるとは。"
1012802-45 = "今回の公演は、かなり心血を注いで企画したものだったんですよ。"
1012802-46 = "内容は――"
1012802-47 = "ふふ、口で説明するものではないですね。"
1012802-48 = "言語化できないものを表現するためのパフォーマンスですから。"
1012802-49 = "目で見ていただくのが一番かと。#n説明しては、面白みにかけてしまいますので。"
1012802-50 = "[s] \"なるほど……。\""
1012802-51 = "そうだ、イメージしてみてはどうでしょう？"
1012802-52 = "ここに散らばっている残骸一つひとつの位置や形状、#n公演後の観客の反応――"
1012802-53 = "それらの情報から、私のパフォーマンスを想像するんです。"
1012802-54 = "もしかしたら――新たな芸術の可能性を見出せるかもしれませんよ？"
1012802-55 = "[s] \"芸術って難しいんだね……。\""
1012802-56 = "とはいえ、そうですね。#nやはり一番は……。"
1012802-57 = "最前列で、直接観ることでしょうか。ふふ。"
1012802-58 = "それか――どうでしょう？#n私と一緒にパフォーマンスをしてみるというのは。"
1012802-59 = "[s] \"次は公演時間に間に合うようにするね！\""
1012802-60 = "はは！そうきましたか！"
1012802-61 = "まあ、いいでしょう。大切なのは……。"
1012802-62 = "またお会いできる、ということです。"
1012802-63 = "では、今日はこの辺で！"
1012802-64 = "私はまだ後片づけがありますので、先生はお先にどうぞ！"
1012802-65 = "……先生も手伝ってくださるんですか？"
1012802-66 = "わざわざそんな……。"
1012802-67 = "[s1] \"残骸を片づけながら、想像してみたくてね。\"\n[s2] \"この公演で、作家が伝えたかったことを。\""
1012802-70 = "先生……。"
1012802-71 = "[s] \"べ、別に手伝うわけじゃないんだからねっ！\""
1012802-72 = "ぷはっ！"
1012802-73 = "なんですか、今の……わかりました。"
1012802-74 = "ありがとうございます、先生。"
1012802-76 = "（その後、フユと一緒にパフォーマンスの後片づけをした）"
