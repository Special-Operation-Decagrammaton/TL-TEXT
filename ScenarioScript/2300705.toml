[translation]
2300705-1 = "Presentes e garotas"
2300705-2 = "Desculpe a espera, Sensei."
2300705-3 = "Sinto muito, a limpeza acabou demorando mais do que o esperado..."
2300705-4 = "Então, podemos ir?"
2300705-6 = "Ué, Sensei? Aconteceu alguma coisa?"
2300705-7 = "[s] \"Só por precaução, posso saber para onde vamos...?\""
2300705-8 = "Ah, perdão. Agora que você mencionou, eu não tinha contado, não é?"
2300705-9 = "É um shopping que fica logo aqui perto."
2300705-10 = "É um lugar comum, que está funcionando normalmente e tem bastante gente."
2300705-11 = "[s] \"Entendi, então vamos lá.\""
2300705-12 = "Ahaha..."
2300705-13 = "Ultimamente, talvez eu tenha exagerado nas brincadeiras... não esperava que você ficasse tão alerta assim..."
2300705-14 = "Como posso dizer, bem..."
2300705-15 = "Quando olho para o Sensei, sinto uma vontade incontrolável de pregar peças..."
2300705-16 = "Não, isso também é uma desculpa, eu sei."
2300705-17 = "Me desculpe, Sensei."
2300705-18 = "De agora em diante, tentarei ao máximo não te deixar em apuros..."
2300705-19 = "[s] \"Não, não, eu encaro isso como a forma da Hanako demonstrar carinho.\""
2300705-20 = "...Você interpreta de uma forma bem generosa, não é?"
2300705-21 = "...Fufu."
2300705-22 = "Então, como forma de pedir desculpas... que tal irmos escolher um presente para você também?"
2300705-23 = "[s1] \"Não precisa se preocupar tanto assim.\"\n[s2] \"Só a intenção já me deixa feliz.\""
2300705-24 = "É, você tem razão..."
2300705-25 = "É, você tem razão..."
2300705-26 = "Pensei que um par de meias não seria um fardo emocional para você..."
2300705-27 = "Dizem que para recuperar a confiança perdida, é preciso dez vezes mais esforço, não é?"
2300705-28 = "Talvez já seja tarde demais..."
2300705-29 = "Mesmo que tenha sido uma brincadeira, eu te deixei em apuros... por ter me acomodado nessa relação e continuado a fazer esse tipo de coisa..."
2300705-30 = "É natural que as coisas tenham chegado a esse ponto... Sinto muito, Sensei."
2300705-31 = "Bem, por hoje é só..."
2300705-32 = "[s] \"Não, não, não! Bem... se forem apenas meias, eu aceito com prazer!\""
2300705-33 = "..."
2300705-34 = "[s] \"Vamos, para o shopping.\""
2300705-36 = "...Como esperado, você é muito gentil, Sensei."
2300705-37 = "Fufu. Então, vamos?"
2300705-39 = "(Chegamos à loja de roupas)"
2300705-40 = "Sensei, o que acha deste aqui?"
2300705-41 = "Não acha essa estampa muito interessante?"
2300705-42 = "Hmm, mas já que estamos aqui..."
2300705-43 = "Estas meias brancas com esta estampa. Parece uma boa escolha. Aliás, Sensei, que tipo você costuma usar?"
2300705-44 = "[s3] \"Eu gosto bastante de estampas chamativas.\"\n[s4] \"Eu também costumo usar esses modelos mais comuns.\""
2300705-45 = "Entendo, é mesmo?"
2300705-46 = "Entendo, é mesmo?"
2300705-47 = "O de hoje... bem, serve."
2300705-48 = "Este aqui é para eu usar... por enquanto vou comprar isto, então espere um pouco, por favor."
2300705-49 = "[s] \"...?\""
2300705-53 = "Poderia registrar a compra, por favor?"
2300705-54 = "Sim, o total deu 1.000 ienes. É para presente? Gostaria que eu embrulhasse?"
2300705-55 = "Não, é para uso próprio, pode deixar assim mesmo."
2300705-56 = "Ah, se não for incômodo, eu gostaria de sair usando elas. Poderia me emprestar o provador?"
2300705-57 = "Sim, aqui está. Fica ali, veja."
2300705-58 = "Vou ali rapidinho, Sensei."
2300705-60 = "[s] \"………？？？\""
2300705-64 = "Voltei."
2300705-65 = "Ah, você poderia embrulhar isto aqui para mim?"
2300705-66 = "Hã?"
2300705-67 = "Bem..."
2300705-69 = "Você quer dizer... as meias que a cliente estava usando?"
2300705-70 = "Sim, por favor."
2300705-71 = "Vou dar de presente para este Sensei aqui, então use um papel de embrulho bem fofo."
2300705-72 = "[s] \"Espera um pouco!!??\""
2300705-73 = "Aconteceu alguma coisa?"
2300705-74 = "Você não disse agorinha que ficaria feliz em receber meias?"
2300705-75 = "……"
2300705-76 = "…………"
2300705-77 = "[s] \"Não é isso! É uma longa história, mas definitivamente não é isso!\""
2300705-79 = "[s] \"Não me olhe desse jeito!? É um mal-entendido!\""
2300705-80 = "Bem, será que meias não são o suficiente para você...?"
2300705-81 = "Quer dizer... hum, isso exigiria um pouco de coragem da minha parte também..."
2300705-82 = "Diga-me... onde fica a loja de lingerie mais próxima daqui?"
2300705-83 = "…………"
2300705-84 = "[s] \"Peço mil desculpas!!\""
2300705-86 = "(Levei a Hanako e fugi do shopping em velocidade máxima)"
