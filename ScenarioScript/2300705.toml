[translation]
2300705-1 = "贈り物と女の子"
2300705-2 = "お待たせしました、先生。"
2300705-3 = "すみません、掃除が長引いてしまって……。"
2300705-4 = "では、行きましょうか？"
2300705-6 = "あれ、先生？どうかされましたか？"
2300705-7 = "[s] \"念のために、行き先を聞いても……？\""
2300705-8 = "あら、すみません。そういえば伝えていませんでしたね。"
2300705-9 = "ここからすぐのショッピングモールですよ。"
2300705-10 = "普通の営業をしているところで、人もたくさんいるところです。"
2300705-11 = "[s] \"うん、じゃあ行こっか。\""
2300705-12 = "あはは……。"
2300705-13 = "このところ、いたずらが過ぎたかもしれませんね……まさかここまで警戒されてしまうとは……。"
2300705-14 = "何と言えば良いのでしょう、その……。"
2300705-15 = "先生を見ていると、無性にいたずらがしたくなってしまって……。"
2300705-16 = "いえ、これも言い訳ですね。"
2300705-17 = "ごめんなさい、先生。"
2300705-18 = "今後はできるだけ、困らせないようにしますので……。"
2300705-19 = "[s] \"ううん、ハナコなりの親愛表現だと思ってるから。\""
2300705-20 = "……ずいぶんと、好意的に捉えてくださるんですね？"
2300705-21 = "……ふふっ。"
2300705-22 = "では、謝罪の意味も兼ねてということで……先生へのプレゼント選びも、一緒にしに行きましょうか？"
2300705-23 = "[s1] \"そんなに気にしないでも大丈夫だよ。\"\n[s2] \"気持ちだけでも嬉しい。\""
2300705-24 = "そう、ですよね……。"
2300705-25 = "そう、ですよね……。"
2300705-26 = "靴下くらいでしたら、気持ち的に負担にはならないかなと思ったのですが……。"
2300705-27 = "失った信頼を回復するには、10倍の努力が必要と言いますもんね……。"
2300705-28 = "もう、遅すぎたのかもしれません……。"
2300705-29 = "冗談とはいえ、先生を困らせてしまって……この関係性に甘んじて、私がいつまでもああいうことばかりしてしまったせいで……。"
2300705-30 = "こうなるのも当然のことです……すみません、先生。"
2300705-31 = "それでは、今日はこれで……。"
2300705-32 = "[s] \"いやいやいや！えっと……靴下ぐらいなら喜んで！\""
2300705-33 = "……。"
2300705-34 = "[s] \"行こう、ショッピングモール。\""
2300705-36 = "……やっぱり、先生は優しいですね。"
2300705-37 = "ふふっ。では、行きましょうか。"
2300705-39 = "（洋服屋さんに着いた）"
2300705-40 = "先生、こちらはいかがですか？"
2300705-41 = "この柄、すごく面白いと思いません？"
2300705-42 = "うーん、ですがせっかくならやはり……"
2300705-43 = "白の、この柄の靴下。これが良さそうです。ちなみに先生は、普段どういうのを履かれるのですか？"
2300705-44 = "[s3] \"私は結構、派手な柄とかも好きかな。\"\n[s4] \"私もそういう、普通のやつが多いかな。\""
2300705-45 = "なるほど、そうでしたか。"
2300705-46 = "なるほど、そうでしたか。"
2300705-47 = "今日のは……まあ良いでしょう。"
2300705-48 = "こちらは私が履くものですし……とりあえずこれを買ってきますので、ちょっと待っていてください。"
2300705-49 = "[s] \"……？\""
2300705-53 = "こちら、お会計をお願いします。"
2300705-54 = "はい、では合計で1,000円です。こちらはプレゼント用でしょうか？お包みいたしますか？"
2300705-55 = "いえ、自分用ですのでそのままで。"
2300705-56 = "あ、よろしければ履いて帰りたいのですが、試着室をお借りしても良いですか？"
2300705-57 = "はい、どうぞ。あちらにありますので。"
2300705-58 = "ちょっと行ってきますね、先生。"
2300705-60 = "[s] \"………？？？\""
2300705-64 = "ただいま戻りました。"
2300705-65 = "あ、こちらは包んでいただけますか？"
2300705-66 = "え？"
2300705-67 = "えっと……"
2300705-69 = "お客様が元々履かれていた方の靴下を、ですか？"
2300705-70 = "はい、お願いします。"
2300705-71 = "こちらの先生にプレゼントしますので、可愛い包み紙で。"
2300705-72 = "[s] \"ちょっと待って！！？？\""
2300705-73 = "どうかしましたか？"
2300705-74 = "靴下なら喜んで貰うって、先ほど仰ってませんでした？"
2300705-75 = "……。"
2300705-76 = "…………。"
2300705-77 = "[s] \"違うんです！話すと長いんですがとにかく違うんです！\""
2300705-79 = "[s] \"そんな目で見ないでください！？誤解なんです！\""
2300705-80 = "えっと、もしかして靴下では満足できないということでしょうか……？"
2300705-81 = "つまり……うーん、それはちょっと私も、覚悟が必要なのですが……。"
2300705-82 = "あの……ここから一番近いランジェリーショップはどちらでしょう？"
2300705-83 = "…………。"
2300705-84 = "[s] \"失礼しましたあぁぁーー！！\""
2300705-86 = "（ハナコを連れて、全速力でショッピングモールを脱出した）"
