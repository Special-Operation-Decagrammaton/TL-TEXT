[translation]
63050-1 = "Episódio 5: A Gaita daquele dia"
63050-3 = "Isto, a gaita... Parecia que você a tinha deixado cair, Senpai, então eu a peguei..."
63050-7 = "Ah, mas não é como se eu quisesse que você tocasse agora mesmo...!"
63050-8 = "Você deve estar passando por muita coisa agora, afinal...!"
63050-9 = "Mas, algum dia... como naquela época..."
63050-10 = "Eu gostaria de ouvir você tocar, Senpai..."
63050-11 = "Ah... ah..."
63050-12 = "(Não era esse o desfecho que eu desejava)"
63050-13 = "(Não posso desviar o olhar da responsabilidade)"
63050-14 = "(Embora isso seja algo natural)"
63050-19 = "Desapareceu...!?"
63050-20 = "Senpai!"
63050-21 = "Vamos procurar. Ela não deve conseguir sair da Escola Filial de Arius."
63050-29 = "[ns] \"Alô? O que houve?\""
63050-30 = "Um anjo... um terceiro anjo apareceu!"
63050-31 = "M-mas... como eu explico isso... Bem, bem, quando eu achei que o terceiro tinha aparecido, os dois que estavam lá antes desapareceram!"
63050-32 = "Parecia até que eles foram absorvidos pelo terceiro anjo..."
63050-33 = "Mas, mais do que isso! Dentro do anjo, dava para ver algo como uma pessoa..."
63050-34 = "Talvez você não acredite em mim, mas... é idêntico ao Subaru-senpai!"
63050-35 = "Sensei!"
63050-36 = "[ns] \"É o Subaru!\""
63050-40 = "[ns] \"Obrigado, pessoal! Entrem em contato se algo mais acontecer!\""
63050-41 = "Sim!"
63050-47 = "(...)"
63050-49 = "(Embora o céu que vejo daqui esteja tão nublado)"
63050-50 = "(Se bem me lembro, o céu que vi nas memórias da Saori era...)"
63050-53 = "Entendo."
63050-54 = "Saori."
63050-55 = "O céu que você via... era uma visão como esta?"
63050-57 = "(A paisagem de Arius era sempre a mesma)"
63050-58 = "(E nós, que vivíamos lá, éramos iguais)"
63050-60 = "(Um lugar onde tudo acaba indo parar, se acumulando e sendo esquecido)"
63050-61 = "(Arius certamente era um lugar assim)"
63050-62 = "(Mesmo que não fosse, antes que percebêssemos, acabou se tornando assim)"
63050-64 = "(O mundo isolou Arius e, por fim, escolheu esquecê-la)"
63050-65 = "(Não, talvez até isso seja uma avaliação benevolente demais)"
63050-66 = "(Pois o mundo é arrogante, egoísta e avança sem hesitação em direções imprevisíveis)"
63050-67 = "(...Enquanto descarta facilmente as coisas incômodas ou que estão no caminho)"
63050-69 = "(Sendo assim... Quem se lembrará daqueles que foram esquecidos?)"
63050-70 = "(Quem se lembrará das vozes que não foram ouvidas?)"
63050-72 = "Senpai, Senpai! Toque a gaita!"
63050-73 = "Tocar gaita sozinho, mergulhado em sentimentalismo nas ruínas..."
63050-74 = "Isso parece um pouco... exagerado, não acha?"
63050-78 = "Ei, eu também..."
63050-82 = "[log=스바루]Pare...[/log]"
63050-85 = "Faz tempo, afinal..."
63050-89 = "[log=스바루]...Por favor. Pare com isso.[/log]"
63050-93 = "Sua música... eu quero ouvir."
63050-97 = "[log=스바루]!!![/log]"
63050-101 = "[log=스바루]!?!?[/log]"
63050-108 = "Você está arrependida?"
63050-109 = "Ats... ko..."
63050-110 = "Está tudo bem. Nós também éramos assim."
63050-111 = "Mas, a Arius..."
63050-112 = "...O que a Trinity fez com a Arius...!"
63050-113 = "Sim, é verdade."
63050-114 = "Mas, isso é outra história."
63050-115 = "Não é um pouco injusto que a senpai esteja sofrendo por causa disso agora?"
63050-116 = "...Você se lembra destas palavras?"
63050-117 = "『Chutar contra os aguilhões só trará ferimentos a si mesmo』"
63050-118 = "...!"
63050-119 = "Vamos fazer isso juntas."
63050-120 = "Não carregue tudo sozinha."
63050-121 = "Agora... depois de tudo?"
63050-122 = "Sim. Mesmo assim—"
63050-123 = "Se você falar a verdade, o Sensei certamente vai te ajudar."
63050-124 = "...!"
63050-125 = "Ah, mas talvez a gente precise passar um tempo no Departamento Correcional... então, contamos com você nesse meio tempo, tá?"
63050-126 = "..."
63050-127 = "Não... isso não pode. Algo assim..."
63050-128 = "Eu não posso fazer isso."
63050-129 = "Eu."
63050-130 = "Nós."
63050-131 = "A Arius ainda... não está convencida."
63050-132 = "Como você disse, este lugar acabou se tornando \"esse tipo de lugar\"."

63050-133 = "Não permitirei que enterrem tudo sem qualquer condenação ou julgamento."
63050-134 = "Isso não passa de uma profanação contra aqueles que viveram na Arius!"
63050-135 = "Não era bem essa a minha intenção..."
63050-136 = "Você já está sendo consumida por si mesma, não é?#nDesse jeito, nenhuma palavra vai te alcançar."
63050-137 = "Mas está tudo bem. Nós também éramos assim.#nE a Arius sabe... o que fazer em momentos como este."
63050-138 = "...?"
63050-139 = "Vamos lá."
63050-140 = "Vamos conversar ao estilo da Arius."
63050-143 = "Atsuko? Você está bem?#nVocê estava fazendo um gesto como se estivesse rezando..."
63050-144 = "Sim. Só estava... conversando um pouco."
63050-146 = "Conversando...?"
63050-147 = "E, isso significa... que é esse tipo de coisa...?"
63050-148 = "Sim, é exatamente isso."
63050-149 = "Então, Sensei."
63050-150 = "[s] \"Sim.\""
63050-151 = "Vamos acordar a senpai que ainda está presa em seu sonho."
63050-152 = "Do jeito que a Arius faz."
63050-153 = "[s] \"O que eu devo fazer?\""
63050-154 = "O de sempre. Aquilo que só o Sensei pode fazer."
63050-155 = "Miya, você vai ajudar também?"
63050-159 = "...Com certeza."
63050-160 = "Pela senpai, eu farei qualquer coisa!"
