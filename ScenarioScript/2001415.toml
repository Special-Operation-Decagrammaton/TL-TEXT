[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
2001415-1 = "A Coelha e o Livro Sagrado <Militar>" 
2001415-2 = "（O livro da Saki estava esquecido em cima da mesa.）" 
2001415-6 = "Sensei, você viu o meu livro por aí?" 
2001415-7 = "Eu procurei o parque inteiro e não achei em lugar nenhum..." 
2001415-8 = "[s] \"É esse aqui?\"" 
2001415-12 = "Aaah, esse mesmo!" 
2001415-13 = "Eu estava rodando igual tonta atrás dele!" 
2001415-14 = "[s] \"Que livro é esse?\"" 
2001415-15 = "Fufu, tente não se assustar, ok?" 
2001415-16 = "Este não é um livro qualquer." 
2001415-17 = "――Dê uma olhada nisto!" 
2001415-22 = "Incrível, não é?" 
2001415-23 = "[ns] \"Parece só um livro perfeitamente normal...?\"" 
2001415-24 = "Q-Que absurdo... Este é o manual de operações distribuído para todas as alunas da SRT!" 
2001415-25 = "Nele estão escritos os requisitos básicos exigidos pela SRT e os fundamentos da nossa estratégia militar――" 
2001415-26 = "É um tesouro que não deve sair das portas da academia.\nBem, não me importo que você o veja, Sensei, mas..." 
2001415-27 = "[s] \"Tá cheio de anotações e post-its em todo lugar...\"" 
2001415-28 = "Pois é. Eu li e reli esse manual um milhão de vezes antes da nossa cerimônia de admissão." 
2001415-29 = "E até hoje eu tiro um tempinho pra revisar tudo de novo sempre que posso." 
2001415-30 = "[s] \"'Ao se locomover pela academia em grupo, devem marchar em sincronia', é o que tá escrito aqui.\"" 
2001415-31 = "Essa é uma das regras clássicas da escola." 
2001415-32 = "Mesmo hoje, virou um hábito meu observar e alinhar o passo com quem tá andando comigo." 
2001415-33 = "Eu costumava levar muita bronca por causa disso naquela época..." 
2001415-34 = "[s] \"Mas, no outro dia, você estava andando normalmente, não?\"" 
2001415-35 = "Ah, você quer dizer quando fomos atravessar a ponte?" 
2001415-36 = "[s] \"Pensando bem, acho que foi lá mesmo.\"" 
2001415-37 = "Fufun, esse também é um dos ensinamentos que o manual ensina." 
2001415-38 = "Se a frequência natural de oscilação da ponte e o ritmo da marcha dos soldados se alinharem..." 
2001415-39 = "Isso pode causar uma ressonância perigosíssima e fazer pontes suspensas antigas desabarem totalmente." 
2001415-40 = "E aí! Os ensinamentos da SRT não deixam nenhum ponto cego, não é?" 
2001415-41 = "[s1] \"Um detalhe desses pode derrubar uma ponte inteira!?\"\n[s2] \"Isso é impressionante!\"" 
2001415-44 = "Quer ler um pouco mais, Sensei?" 
2001415-48 = "[ns3] \"Opa, tem alguma coisa escrita nas anotações do fundo...\"\n[ns4] \"Deixe-me ver... 'Uma pessoa que se diz ser o Sensei da Schale apareceu.'\"" 
2001415-51 = "O-O qu... !?" 
2001415-52 = "（...Naquela época, eu usava essas páginas como diário!）" 
2001415-53 = "[s] \"'Não se pode confiar em adultos.'\"" 
2001415-54 = "I-Isso é... isso é coisa do passado!" 
2001415-55 = "......Espera aí, você tá lendo isso muito a sério!" 
2001415-56 = "[s] \"'Parece ser uma pessoa gentil, mas com certeza tem segundas intenções.'\"" 
2001415-57 = "P-Para de ler isso! Devolve aqui, anda logo!" 
2001415-58 = "[s] \"'Mas... talvez ele seja realmente uma pessoa boa.'\"" 
2001415-59 = "NÃO LEIAAA!!" 
2001415-63 = "（Quando acordei, a Saki já tinha ido embora, e...）" 
2001415-64 = "（Havia 'Idiota!' escrito na minha bochecha com a letra dela.）" 