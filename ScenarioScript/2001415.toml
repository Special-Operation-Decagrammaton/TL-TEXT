[translation]
2001415-1 = "ウサギと聖＜軍事＞書"
2001415-2 = "（サキの本が、テーブルの上にあった）"
2001415-6 = "先生、本はあったか？"
2001415-7 = "公園中を探しても見当たらなくて……。"
2001415-8 = "[s] \"これ？\""
2001415-12 = "ああ、それだ！"
2001415-13 = "そいつを探してたんだ！"
2001415-14 = "[s] \"何の本なの？\""
2001415-15 = "ふふ、驚くなよ？"
2001415-16 = "これはただの本ではないんだ。"
2001415-17 = "――ここを見てくれ！"
2001415-22 = "すごいだろう？"
2001415-23 = "[ns] \"普通の本に見えるけど……？\""
2001415-24 = "なっ……これは、SRTの生徒に配られる教範なんだぞ！"
2001415-25 = "SRTで求められる基本事項や戦術の基礎が書かれた――"
2001415-26 = "門外不出の一冊だ。#nまぁ、先生なら見ても構わないけど……。"
2001415-27 = "[s] \"メモと付箋がぎっしり……。\""
2001415-28 = "ああ。入学式までに読み込んでいたからな。"
2001415-29 = "その後も、時間を見つけては復習している。"
2001415-30 = "[s] \"「校内を複数人で移動する際は、歩調を合わせること」って書いてあるね。\""
2001415-31 = "それは代表的な校則だな。"
2001415-32 = "今でも、相手の歩調を見るのが癖になっている。"
2001415-33 = "あの頃はよく叱られたな……。"
2001415-34 = "[s] \"でもこの前、普通に歩いてなかった？\""
2001415-35 = "ああ、橋を渡るときだろう？"
2001415-36 = "[s] \"そういえばそうだったかも。\""
2001415-37 = "ふふん、それも教範からの教えだ。"
2001415-38 = "橋の固有振動数と、行軍の歩調が合うと……"
2001415-39 = "共振を起こし、設計の古い吊り橋などは崩れる可能性がある。"
2001415-40 = "どうだ！SRTの教えは抜かりがないだろう？"
2001415-41 = "[s1] \"そんなことで橋が！？\"\n[s2] \"すごいね！\""
2001415-44 = "先生も読むか？"
2001415-48 = "[ns3] \"あれ、後ろのメモ欄になにか書いてある……\"\n[ns4] \"どれどれ……「シャーレの先生という人が来た」\""
2001415-51 = "なっ……！？"
2001415-52 = "（……当時は日記代わりにしていたんだった！）"
2001415-53 = "[s] \"「大人は信用できない」\""
2001415-54 = "そ、それは……昔の話で！"
2001415-55 = "……って、じっくり読みすぎだろ！"
2001415-56 = "[s] \"「優しそうだけど、絶対に下心がある」\""
2001415-57 = "や、やめろ！返せってば！"
2001415-58 = "[s] \"「でも……本当に良い人かも」\""
2001415-59 = "読むな！！"
2001415-63 = "（目を覚ますと、サキは消えており……）"
2001415-64 = "（頬にサキの字で「バカ！」と書かれていた）"
