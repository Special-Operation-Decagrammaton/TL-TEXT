[translation]
2001415-1 = "O Coelho e o Livro Sagrado Militar"
2001415-2 = "（O livro da Saki estava em cima da mesa）"
2001415-6 = "Sensei, encontrou o livro?"
2001415-7 = "Procurei pelo parque todo e não achei..."
2001415-8 = "[s] \"Este aqui?\""
2001415-12 = "Ah, é esse mesmo!"
2001415-13 = "Era esse que eu estava procurando!"
2001415-14 = "[s] \"Que livro é esse?\""
2001415-15 = "Hehe, não se surpreenda, tá?"
2001415-16 = "Este não é um livro comum."
2001415-17 = "— Olhe só aqui!"
2001415-22 = "Incrível, não é?"
2001415-23 = "[ns] \"Parece um livro normal para mim...\""
2001415-24 = "O quê... Isso é um manual distribuído aos alunos da SRT!"
2001415-25 = "Contém os fundamentos e as bases táticas exigidas na SRT—"
2001415-26 = "É um exemplar que não pode sair da escola. #nBem, não me importo que você veja, Sensei..."
2001415-27 = "[s] \"Está cheio de anotações e marcadores...\""
2001415-28 = "Sim. Eu li tudo antes da cerimônia de entrada."
2001415-29 = "Desde então, sempre que encontro um tempo, eu reviso."
2001415-30 = "[s] \"Diz aqui: 'Ao se deslocar pela escola em grupo, mantenha o passo'.\""
2001415-31 = "Essa é uma regra escolar clássica."
2001415-32 = "Até hoje, virou um hábito observar o passo dos outros."
2001415-33 = "Naquela época, eu levava bronca direto por causa disso..."
2001415-34 = "[s] \"Mas da última vez, você não estava andando normalmente?\""
2001415-35 = "Ah, você diz quando atravessamos a ponte?"
2001415-36 = "[s] \"Agora que você falou, acho que sim.\""
2001415-37 = "Hehe, isso também é um ensinamento do manual."
2001415-38 = "Se a frequência natural da ponte coincidir com o passo da marcha..."
2001415-39 = "Pode causar ressonância, e pontes suspensas com projetos antigos podem desabar."
2001415-40 = "E então! Os ensinamentos da SRT não falham, né?"
2001415-41 = "[s1] \"Uma ponte pode cair por causa disso!?\"\n[s2] \"Impressionante!\""
2001415-44 = "Quer ler também, Sensei?"
2001415-48 = "[ns3] \"Ué, tem algo escrito no campo de notas atrás...\"\n[ns4] \"Deixa ver... 'Um tal de Sensei do Schale apareceu'\""
2001415-51 = "O quê...!?"
2001415-52 = "（...Naquela época, eu usava isso como diário!）"
2001415-53 = "[s] \"'Não se pode confiar em adultos'\""
2001415-54 = "Is-isso é... coisa do passado!"
2001415-55 = "...Quer dizer, você está lendo com muita atenção!"
2001415-56 = "[s] \"'Parece gentil, mas com certeza tem segundas intenções'\""
2001415-57 = "Pa-pare com isso! Me devolve!"
2001415-58 = "[s] \"'Mas... talvez ele seja uma pessoa realmente boa'\""
2001415-59 = "Não leia!!"
2001415-63 = "（Ao acordar, Saki havia desaparecido...）"
2001415-64 = "（E na minha bochecha estava escrito 'Idiota!' com a letra da Saki）"
