[translation]
10016120-1 = "Epílogo parte 2; Arco do Esquadrão RABBIT"
10016120-4 = "……Aqui é RABBIT 1. Horário atual, 19:30. #nConfirmamos que os alunos do Millennium recolheram os suprimentos e equipamentos da Grande Competição Esportiva."
10016120-5 = "Em seguida, confirmamos a desativação do tanque disfarçado de robô de torcida que foi trazido para o local — conhecido como 'Destruidor Burguês'."
10016120-6 = "Além disso, todos os outros robôs cuja segurança não foi confirmada já foram recolhidos por alunos que parecem estar ligados ao 'Veritas'."
10016120-11 = "A-aqui é RABBIT 4…… #nEncontrei o Departamento de Engenharia fazendo uma manifestação nos arredores do estádio atlético……"
10016120-12 = "Eles estavam discutindo com os alunos da Valkyrie exigindo uma 'semana de trabalho de 4 dias', mas…… #nComo o público diminuiu, o ímpeto deles está enfraquecendo……"
10016120-13 = "Parece que eles perceberam que não faz sentido continuar com a manifestação aqui……"
10016120-18 = "Aqui é RABBIT 2. Patrulha da área das arquibancadas concluída após a saída do público. #nNão há explosivos ou itens suspeitos altamente inflamáveis."
10016120-19 = "Graças aos espectadores que levaram seu próprio lixo embora. #nNem precisei verificar muito."
10016120-24 = "Aqui é RABBIT 3. Dei uma olhada nos prontuários eletrônicos do posto médico. #nFelizmente, parece que não houve feridos graves."
10016120-25 = "As reações nas redes sociais também são majoritariamente positivas…… #nIsso não significa que podemos dizer que foi um grande sucesso?"
10016120-27 = "Podemos considerar que todos os fatores de risco dentro do estádio atlético foram eliminados."
10016120-32 = "……Missão cumprida!"
10016120-36 = "Pessoal, muito obrigada pelo trabalho duro……"
10016120-37 = "Bem, o desempenho geral da Academia SRT foi o último lugar, mas…… fufu."
10016120-38 = "Droga…… se não tivéssemos batido no tanque naquela hora, teríamos conseguido pelo menos uma vitória……"
10016120-39 = "De novo com esse assunto?"
10016120-40 = "Se for falar disso, e a 'Corrida de Objetos'? #nSe você tivesse lido as regras direito, não teria sido desclassificada."
10016120-41 = "C-cala a boca! #nNão quero ouvir isso de quem trouxe fósforo branco para o estádio!"
10016120-42 = "Nós…… só temos quatro pessoas……"
10016120-44 = "O número de competições em que podíamos participar era pequeno…… #nEntão, não é inevitável que tenhamos ficado em último……?"
10016120-45 = "Mas ouvi dizer que a escola Abydos, que só tem 5 alunos no total, ficou com um desempenho mediano, sabia?"
10016120-49 = "Hmm…… no fim das contas, acho que vou colocar a culpa na Saki."
10016120-50 = "Ei!"
10016120-54 = "Não há necessidade de se preocupar com isso."
10016120-55 = "Já estamos operando há mais de 24 horas. #nEstávamos em desvantagem tanto mental quanto fisicamente."
10016120-56 = "Além disso, graças ao fato de termos rastreado o paradeiro das peças militares levadas para o Millennium, conseguimos agir rapidamente sem entrar em pânico quando o tanque enlouqueceu."
10016120-57 = "Acima de tudo…… conseguimos alcançar nosso objetivo principal, que é 'proteger a segurança dos cidadãos'."
10016120-58 = "……Pode não ficar registrado nos arquivos, mas com certeza ficará na memória de alguém."
10016120-59 = "……Então, acho que está bom assim."
10016120-60 = "Embora eu ache que não deveria pensar assim durante uma operação……"
10016120-61 = "A operação de hoje foi um pouco mais……"
10016120-62 = "Um pouco……?"
10016120-64 = "……Um pouco divertida."
10016120-68 = "I-isso é estranho, não é……? #nA SRT, que protege a segurança dos cidadãos, se divertindo em uma operação……"
10016120-69 = "Uuu…… no fim das contas, sou uma inútil que não é digna da Academia SRT――"
10016120-70 = "……Não, eu entendo esse sentimento."
10016120-71 = "Graças ao fato de termos competido com várias escolas e suado a camisa pela primeira vez em muito tempo, percebi algo novamente."
10016120-72 = "Que é para isso que protegemos a cidade."
10016120-78 = "Ah, não…… veja bem! Às vezes é mais fácil entender as coisas na prática do que lendo manuais, não é? É difícil sentir o propósito da SRT às vezes……"
10016120-79 = "Foi uma boa oportunidade para sentir na pele o significado da existência da SRT, por assim dizer……"
10016120-80 = "Saki-chan……"
10016120-84 = "Eu também me diverti nesta Grande Competição Esportiva."
10016120-85 = "Pude acessar dados que normalmente não consigo……"
10016120-86 = "E também uma pequena renda extra……"
10016120-87 = "Você se divertiu demais!"
10016120-91 = "Foi um dia agitado, mas também foi um dia valioso em que pude ver os sorrisos de todos de perto."
10016120-92 = "Como membros da SRT, vamos valorizar o cotidiano de hoje e continuar lutando pela justiça――"
10016120-96 = "……."
10016120-97 = "Falando nisso, não comemos nada hoje……"
10016120-98 = "Eu nem tive tempo de procurar por marmitas descartadas..."
10016120-99 = "Eu só comi um pão doce na corrida de pão..."
10016120-100 = "……Agora há pouco, vi estudantes de Gehenna indo em direção ao campo central com pinças e ingredientes..."
10016120-101 = "Será que elas vão fazer um churrasco...?"
10016120-102 = "Sobre o campo central... a fogueira do 'Festival Noturno' deve estar acontecendo lá."
10016120-103 = "Não ouvi nada sobre um churrasco, mas..."
10016120-108 = "Pode ser que algum problema aconteça... vamos lá dar uma olhada."
10016120-109 = "É, você tem razão! Muita gente reunida mexendo com fogo, é melhor prevenir do que remediar!"
10016120-110 = "……Não que eu esteja de olho nas sobras do churrasco, claro!"
10016120-111 = "Sinto que os meios e os fins acabaram se invertendo..."
10016120-116 = "……Muito bem, a missão da Operação Crescente está reiniciada!"
10016120-117 = "Entendido!"
