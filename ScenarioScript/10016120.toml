[translation]
10016120-1 = "後日談その2;RABBIT小隊編"
10016120-4 = "……こちらRABBIT1。現在時刻は1930。#nミレニアムの生徒が大運動会の備品、及び機材の回収を確認。"
10016120-5 = "続いて、応援ロボットに偽装し会場内に持ち込まれた戦車――通称「ブルジョアクラッシャー」の機能停止も確認しました。"
10016120-6 = "その他、安全性が確認されていないロボットも、「ヴェリタス」の関係者と思しき生徒により全て回収済みです。"
10016120-11 = "こ、こちら、RABBIT4……#nアスレチックスタジアムの郊外で、デモを起こしてる工務部を発見……"
10016120-12 = "「週休4日制」を主張して、ヴァルキューレの生徒と言い争いをしてたけど……#n観客が減って、勢いが弱まってる……"
10016120-13 = "ここでデモを続けても、意味がないことに気づいたみたい……"
10016120-18 = "こちらRABBIT2。観客の帰宅が済んだ観覧席エリアのパトロールを完了した。#n爆発物や引火性の高い不審物は無し。"
10016120-19 = "観客がゴミを持ち帰ってくれたおかげだ。#nこれなら見るまでもなかったな。"
10016120-24 = "こちらRABBIT3。救護所の電子カルテを調べてみたよ。#n幸い、重症者はいなかったみたい。"
10016120-25 = "SNSの反応も好意的なものが多いし……#nこれなら大成功って言ってもいいんじゃないの？"
10016120-27 = "アスレチックスタジアム内の危険因子は、すべて取り除かれたと判断して良いでしょう。"
10016120-32 = "……ミッションクリアです！"
10016120-36 = "みんな、本当にお疲れ様……"
10016120-37 = "まあ、SRT特殊学園の総合成績は最下位だったけどね……ふふ。"
10016120-38 = "くっ……あのとき戦車にぶつからなければ1勝はできたのに……"
10016120-39 = "またその話？"
10016120-40 = "それを言うなら、「借り物競争」は？#n規則をちゃんと読んでたら、失格にならずに済んだでしょ。"
10016120-41 = "う、うるさいな！#n競技場に白リン弾を持ってくるやつに言われたくない！"
10016120-42 = "私たち……4人しかいないから……"
10016120-44 = "参加できる競技の数が少なかったし……#n最下位になっちゃったのも、仕方ないんじゃないかな……？"
10016120-45 = "でも、アビドス高校ってとこは、全生徒5人しかいないのに真ん中くらいの成績だったらしいよ？"
10016120-49 = "うーん……やっぱり、ここはサキのせいにしとこっか。"
10016120-50 = "おいっ！"
10016120-54 = "気にする必要はありませんよ。"
10016120-55 = "私たちは、すでに24時間以上作戦を継続している状態です。#n精神的にも体力的にも、不利な状態でしたから。"
10016120-56 = "それに、ミレニアムに持ち込まれた軍用パーツの行方を追いかけたおかげで、戦車が暴れても慌てず速やかに動けました。"
10016120-57 = "何より……「市民の安全を守る」という一番の目標は達成できましたので。"
10016120-58 = "……記録には残らないかもしれませんが、きっと誰かの記憶には残ってくれるはず。"
10016120-59 = "……なら、良しとするか。"
10016120-60 = "作戦なのに、こんなこと思っちゃダメだと思うんだけど……"
10016120-61 = "今回の作戦は、いつもよりちょっと……"
10016120-62 = "ちょっと……？"
10016120-64 = "……ちょっと、楽しかったな。"
10016120-68 = "お、おかしいよね……？#n市民の安全を守るSRTが、作戦を楽しむなんて……"
10016120-69 = "うぅ……やっぱり、私はSRT特殊学園に[ruby=ふさわ]相応[/ruby]しくない役立たずで――"
10016120-70 = "……いや、その気持ちは私も分かるぞ。"
10016120-71 = "久しぶりに色々な学園と競い合って汗をかいたおかげで、あらためて実感した。"
10016120-72 = "私たちは、このために街を守っているんだなぁって。"
10016120-78 = "あっ、いや……ほら！教範で読むよりも実際にやってみたほうが理解しやすいこともあるだろう？SRTの目的も、時たま実感しづらいし……"
10016120-79 = "SRTの存在意義を肌で感じる、良い機会になったというか……"
10016120-80 = "サキちゃん……"
10016120-84 = "私も今回の大運動会、楽しかったよ。"
10016120-85 = "普段は触れられないデータにもアクセスできたし……"
10016120-86 = "ちょっとした臨時収入も……"
10016120-87 = "お前は楽しみすぎだ！"
10016120-91 = "目まぐるしい1日でしたが、皆さんの笑顔を近くで見られた貴重な1日でもありましたね。"
10016120-92 = "SRTの隊員として、今日という日常を大切に、これからも正義のために――"
10016120-96 = "……。"
10016120-97 = "そういや、今日は何も食べてなかったね……"
10016120-98 = "廃棄弁当を探す暇もなかったから……"
10016120-99 = "「パン食い競争」でアンパンを食べたぐらいだな……"
10016120-100 = "……さっき、ゲヘナ生がトングと食材を持って中央フィールドに向かってたけど……"
10016120-101 = "バーベキューでもするのかな……？"
10016120-102 = "中央フィールドでしたら……「後夜祭」のキャンプファイヤーが行われているはずです。"
10016120-103 = "バーベキューを行うというのは聞いていませんが……"
10016120-108 = "何か問題が発生するかもしれません……様子を見に行きましょう。"
10016120-109 = "そ、そうだよな！大人数で集まって火を扱うんだ、用心するに越したことはない！"
10016120-110 = "……バーベキューの残りを狙ってるわけじゃないけどね！"
10016120-111 = "なんか、手段と目的が入れ替わってるような気も……"
10016120-116 = "……それでは、三日月作戦ミッションリスタートです！"
10016120-117 = "了解！"
