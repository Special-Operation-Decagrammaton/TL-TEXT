[translation]
1601603-1 = "理由がなくたって"
1601603-2 = "（仕事終わりに、買い物をしていると……）"
1601603-8 = "まさか、こんなところでお会いできるとは。"
1601603-12 = "[ns1] \"この声は……。\"\n[ns2] \"……ミネ？\""
1601603-18 = "先生もお仕事中ですか？"
1601603-19 = "私は救護騎士団の用事がありまして。#n同じ方向でしたら、途中まで一緒に行きましょう。"
1601603-23 = "どうしました、先生？"
1601603-24 = "……ああ、衣装のことですか。"
1601603-29 = "説明しておりませんでしたね。"
1601603-30 = "今日は「救護」の一環でライブをする予定なのです。"
1601603-31 = "それゆえ、このようにアイドルの衣装を着ております。"
1601603-32 = "[s3] \"大変だね。\"\n[s4] \"頑張ってるんだね。\""
1601603-35 = "ふふっ。#nこれくらい、何ともありません。"
1601603-39 = "では、行きましょうか。"
1601603-46 = "（……数日後）"
1601603-52 = "（仕事のつながりで、レストランにやってきた）"
1601603-58 = "……ん？"
1601603-64 = "またお会いするとは、驚きました。"
1601603-65 = "もちろん、私としては嬉しい限りですが……ふふっ。"
1601603-66 = "[s5] \"ここでもライブをするの？\"\n[s6] \"今日もアイドル衣装なんだね。\""
1601603-69 = "……あっ、今回はライブのためではありません。"
1601603-70 = "ここの料理が美味しいと聞きまして、食事に来た次第です。"
1601603-71 = "衣装を着ている理由は……。"
1601603-76 = "…………。"
1601603-77 = "……ど、ドレスコードです。"
1601603-78 = "場の雰囲気に合うよう選びました。"
1601603-79 = "[s7] （場の雰囲気に……？）\n[s8] （今の間はなんだろう……）"
1601603-82 = "せ、先生もお約束があるでしょうし、そろそろ失礼いたします。"
1601603-83 = "では……！"
1601603-89 = "（その後も、町でアイドル姿のミネと会う度に……）"
1601603-100 = "（……なぜか毎回、変な言い訳を聞かされた）"
1601603-106 = "（とある夜勤の日）"
1601603-112 = "（眠気を覚ますためにコンビニへ向かったところ……）"
1601603-121 = "……あら、先生。"
1601603-122 = "こんな時間まで、お疲れ様です。"
1601603-123 = "いつも私たち生徒のために、ありがとうございます。"
1601603-124 = "ですが、たまにはゆっくり……。"
1601603-129 = "……あっ。"
1601603-130 = "こ、これは……。"
1601603-131 = "えっとですね……。"
1601603-132 = "[s9] \"ミネ、待って。\"\n[s10] \"理由がなくたって……。\""
1601603-137 = "いえ、先生……！"
1601603-138 = "その、なんと言えば……。"
1601603-142 = "ふ、普段着なのです！#n今の私は、救護騎士団の団長ではなく……。"
1601603-143 = "……っ！"
1601603-144 = "これでは、私がいつもアイドル衣装を着ていると思われて……。"
1601603-145 = "誤解です、先生！"
1601603-150 = "……今、何か言いましたか？"
1601603-151 = "大丈夫、とは……？"
1601603-152 = "[s11] \"ミネが可愛いものを好きなのは知ってるよ。\"\n[s12] \"自分の好きな格好をするのに、理由はいらないよ。\""
1601603-155 = "そ、そうでした……。"
1601603-156 = "先生には、お伝えしておりましたね。"
1601603-161 = "……先生？"
1601603-162 = "お、お待ちください。"
1601603-169 = "もしかして……。"
1601603-170 = "レストランで会った時から、気づいていたのですか？"
1601603-171 = "……なるほど。"
1601603-176 = "先生……。"
1601603-182 = "[ns13] \"……ミネさん！？\"\n[ns14] \"ち、近くない……？\""
1601603-185 = "私の気持ちが分かっていたのなら……。"
1601603-187 = "……もっと、早く言ってください。"
