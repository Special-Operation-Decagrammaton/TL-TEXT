[translation]
1601603-1 = "Mesmo sem um motivo"
1601603-2 = "（Depois do trabalho, enquanto fazia compras...）"
1601603-8 = "Ora, que surpresa encontrar você por aqui."
1601603-12 = "[ns1] \"Essa voz...\"\n[ns2] \"...Mine?\""
1601603-18 = "Professor, você também está trabalhando?"
1601603-19 = "Eu tenho alguns assuntos da Brigada de Socorro para tratar. #nSe estiver indo para o mesmo lado, vamos juntos até uma parte do caminho."
1601603-23 = "O que houve, Professor?"
1601603-24 = "...Ah, está falando do meu traje?"
1601603-29 = "Eu não cheguei a explicar, não é?"
1601603-30 = "Hoje, planejo fazer uma apresentação como parte das nossas atividades de \"socorro\"."
1601603-31 = "Por isso, estou vestida com este traje de idol."
1601603-32 = "[s3] \"Deve ser difícil.\"\n[s4] \"Você está se esforçando bastante.\""
1601603-35 = "Fufu. #nIsso não é nada para mim."
1601603-39 = "Então, vamos?"
1601603-46 = "（...Alguns dias depois）"
1601603-52 = "（Vim a um restaurante por conta de contatos de trabalho）"
1601603-58 = "...Hm?"
1601603-64 = "Que surpresa encontrar você de novo."
1601603-65 = "Claro, para mim é um prazer, mas... fufu."
1601603-66 = "[s5] \"Vai fazer um show aqui também?\"\n[s6] \"Está com o traje de idol de novo hoje.\""
1601603-69 = "...Ah, desta vez não é por causa de um show."
1601603-70 = "Ouvi dizer que a comida aqui é deliciosa, então vim jantar."
1601603-71 = "O motivo de eu estar usando este traje é..."
1601603-76 = "............"
1601603-77 = "...É, é o código de vestimenta."
1601603-78 = "Escolhi para combinar com a atmosfera do local."
1601603-79 = "[s7] （Atmosfera do local...?）\n[s8] （O que foi essa pausa agora há pouco...?）"
1601603-82 = "P-Professor, você deve ter seus compromissos, então vou me retirar."
1601603-83 = "Até mais...!"
1601603-89 = "（Depois disso, toda vez que encontrava a Mine na cidade vestida de idol...）"
1601603-100 = "（...Por algum motivo, ela sempre me dava uma desculpa estranha）"
1601603-106 = "（Em uma noite de plantão）"
1601603-112 = "（Fui à loja de conveniência para espantar o sono e...）"
1601603-121 = "...Ora, Professor."
1601603-122 = "Trabalhando até essa hora, bom trabalho."
1601603-123 = "Obrigada por sempre cuidar de nós, alunas."
1601603-124 = "Mas, de vez em quando, descanse um pouco..."
1601603-129 = "...Ah."
1601603-130 = "I-Isso é..."
1601603-131 = "Bem, é que..."
1601603-132 = "[s9] \"Mine, espere.\"\n[s10] \"Mesmo sem um motivo...\""
1601603-137 = "Não, Professor...!"
1601603-138 = "Como posso dizer..."
1601603-142 = "É, é minha roupa casual! #nNeste momento, eu não sou a capitã da Brigada de Socorro..."
1601603-143 = "...!"
1601603-144 = "Desse jeito, você vai pensar que eu sempre uso roupas de idol..."
1601603-145 = "É um mal-entendido, Professor!"
1601603-150 = "...Você disse alguma coisa agora?"
1601603-151 = "Como assim, \"tudo bem\"...?"
1601603-152 = "[s11] \"Eu sei que você gosta de coisas fofas.\"\n[s12] \"Não precisa de um motivo para usar as roupas que você gosta.\""
1601603-155 = "A-ah, é verdade..."
1601603-156 = "Eu já tinha mencionado isso ao Sensei, não é?"
1601603-161 = "......Sensei?"
1601603-162 = "E-espere um pouco."
1601603-169 = "Será que..."
1601603-170 = "Você já sabia desde quando nos encontramos no restaurante?"
1601603-171 = "......Entendo."
1601603-176 = "Sensei..."
1601603-182 = "[ns13] \"......Mine!?\"\n[ns14] \"N-não está muito perto...?\""
1601603-185 = "Se você já sabia o que eu sentia..."
1601603-187 = "......Deveria ter me dito antes."
