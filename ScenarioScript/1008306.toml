[translation]
1008306-1 = "Abra seu coração"

1008306-6 = "[ns] \"Como me disseram, vim para a sala de arbitragem...\""

1008306-11 = "Estarei esperando no armazém dos fundos."

1008306-13 = "[ns] \"Havia um armazém nos fundos.\""

1008306-16 = "(Quando passei pela lateral e dei a volta pelos fundos, imediatamente encontrei um prédio que parecia um armazém.)"

1008306-20 = "[ns] \"Kikyou, você pode entrar?\""

1008306-27 = "[wa:500]― [log=키쿄]間に合ったね。[wa:1450]先生。[/log]"
1008306-29 = "― [log=키쿄]Ainda assim, [wa:1300]uma cara estúpida. [/registro]"

1008306-32 = "[ns] \"Kikyo tem uma atmosfera diferente hoje.\""

1008306-33 = "[wa:550]― [log=키쿄]まあね……[wa:1650]ある人が言ってたんだ。[/log]"
1008306-36 = "― [log=키쿄]Fazer uma pausa é tão bom quanto [wa:1750]trabalhar[/log]"

1008306-38 = "[wa:100]― [log=키쿄]いや、[wa:1000]それ以上に大事だ、[wa:1550]って。[/log]"
1008306-41 = "[wa:250]― [log=키쿄]ふふ、[wa:1650]優秀な参謀は、[/log]"
1008306-43 = "- [log=키쿄]Lembro-me bem das máximas de outras pessoas [wa:900]. [/registro]"

1008306-46 = "[wa:500]― [log=키쿄]みて、[wa:1300]先生にオススメしたい本、[/log]"
1008306-48 = "― [log=키쿄]Existem tantos. [/registro]"

1008306-51 = "― [log=키쿄]Ah, [wa:850]Antes disso...[/log]"

1008306-53 = "― [log=키쿄]Você poderia limpar meu quarto e [wa:1300]me dar uma xícara de chá verde, [wa:1500]? [/registro]"

1008306-56 = "― [log=키쿄]Você mesmo disse, certo? [/registro]"

1008306-58 = "― [log=키쿄]Você não vai dizer não, certo? [/registro]"

1008306-61 = "[ns] \"Claro!\""

1008306-62 = "[wa:950]― [log=키쿄]そうだ……[wa:1450]あんたってそういう人だった……[/log]"
1008306-64 = "― [log=키쿄]Eu sabia disso. [/registro]"

1008306-67 = "― [log=키쿄]Bem, eu acho. [/registro]"

1008306-69 = "[wa:100]― [log=키쿄]桐生キキョウは、[wa:1550]せっかくの機会を[wa:1000]棒に振る真似はしない。[/log]"
1008306-72 = "― [log=키쿄]Vou mimar você de todo o coração, então[/log]"

1008306-74 = "[wa:200]― [log=키쿄]覚悟しててね……[wa:2150]ふふ。[/log]"
1008306-77 = "(E então, fiquei até tarde com Kikyou, que tinha uma expressão diferente no rosto do normal.)"

