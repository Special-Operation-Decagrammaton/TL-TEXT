[translation]
1008306-1 = "こころ開いて"
1008306-6 = "[ns] \"言われた通り、調停室に来たけど……\""
1008306-11 = "裏の倉庫で待ってるから。"
1008306-13 = "[ns] \"裏に倉庫なんてあったんだ。\""
1008306-16 = "（横を抜けて裏に回ると、すぐに倉庫らしき建物が見つかった）"
1008306-20 = "[ns] \"キキョウ、入るよ？\""
1008306-27 = "[wa:500]― [log=키쿄]間に合ったね。[wa:1450]先生。[/log]"
1008306-29 = "― [log=키쿄]相変わらず、[wa:1300]間抜けな顔。[/log]"
1008306-32 = "[ns] \"今日のキキョウは、何だか雰囲気が違うね。\""
1008306-33 = "[wa:550]― [log=키쿄]まあね……[wa:1650]ある人が言ってたんだ。[/log]"
1008306-36 = "― [log=키쿄]休息を取る事は、[wa:1750]働くのと同じぐらい、[/log]"
1008306-38 = "[wa:100]― [log=키쿄]いや、[wa:1000]それ以上に大事だ、[wa:1550]って。[/log]"
1008306-41 = "[wa:250]― [log=키쿄]ふふ、[wa:1650]優秀な参謀は、[/log]"
1008306-43 = "― [log=키쿄]他人の金言も[wa:900]ちゃんと覚えているんだよ。[/log]"
1008306-46 = "[wa:500]― [log=키쿄]みて、[wa:1300]先生にオススメしたい本、[/log]"
1008306-48 = "― [log=키쿄]こんなにたくさんあるの。[/log]"
1008306-51 = "― [log=키쿄]あ、[wa:850]その前に……[/log]"
1008306-53 = "― [log=키쿄]部屋の掃除と、 [wa:1300]緑茶を一杯、[wa:1500]お願いできるかな。[/log]"
1008306-56 = "― [log=키쿄]自分で言いだしたことでしょう？[/log]"
1008306-58 = "― [log=키쿄]断ったりしないよね？[/log]"
1008306-61 = "[ns] \"もちろんだよ！\""
1008306-62 = "[wa:950]― [log=키쿄]そうだ……[wa:1450]あんたってそういう人だった……[/log]"
1008306-64 = "― [log=키쿄]知ってたけど。[/log]"
1008306-67 = "― [log=키쿄]まぁいっか。[/log]"
1008306-69 = "[wa:100]― [log=키쿄]桐生キキョウは、[wa:1550]せっかくの機会を[wa:1000]棒に振る真似はしない。[/log]"
1008306-72 = "― [log=키쿄]全身全霊で甘えるから、[/log]"
1008306-74 = "[wa:200]― [log=키쿄]覚悟しててね……[wa:2150]ふふ。[/log]"
1008306-77 = "（そうして、いつもとは違う表情を浮かべるキキョウと遅くまで過ごした）"
