[translation]
1001006-1 = "Metrô"
1001006-2 = "D.U. - Estação de Metrô"
1001006-5 = "Ah, Sensei."
1001006-6 = "[s] \"Shiroko? O que está fazendo aqui?\""
1001006-8 = "Ah, sim. Assuntos pessoais..."
1001006-9 = "Quer saber que tipo de assunto?"
1001006-10 = "Estou planejando um passeio de bicicleta mais longo que o habitual. Começando com uns 400km, para aquecer."
1001006-11 = "Por isso vim um pouco mais longe, para verificar o trajeto."
1001006-12 = "Hm? Se não é longe demais?"
1001006-13 = "Hmm... se eu estiver preparada para virar a noite pedalando, consigo terminar em 24 horas."
1001006-14 = "Você estava voltando para casa agora, Sensei?"
1001006-15 = "Hm? Tem assuntos em Abydos?"
1001006-16 = "Ah, sim, entendo..."
1001006-17 = "Pensando bem, é o metrô que você usa para ir trabalhar, né? Como eu vim para D.U., pensei que talvez pudéssemos nos encontrar."
1001006-18 = "...Hm, não que eu estivesse planejando isso, mas nos encontramos."
1001006-19 = "..."
1001006-20 = "É, foi coincidência."
1001006-21 = "..."
1001006-22 = "[s] \"...Já que nos encontramos por acaso, quer voltar comigo?\""
1001006-23 = "Hm..."
1001006-25 = "(Voltei com a Shiroko de metrô até a Estação Central de Abydos)"
