[translation]
1001006-1 = "地下鉄"
1001006-2 = "D.U.・地下鉄駅"
1001006-5 = "あ、先生。"
1001006-6 = "[s] \"シロコ？ここで何してるの？\""
1001006-8 = "ああ、うん。個人的な用事で……。"
1001006-9 = "どんな用事かって？"
1001006-10 = "いつもより長距離のライディングを計画してるの。まずは軽く400kmぐらい。"
1001006-11 = "だからちょっと遠くまで出てきて、コースをチェックしてるの。"
1001006-12 = "うん？遠すぎじゃないかって？"
1001006-13 = "うーん……徹夜を覚悟して走れば、24時間内に走り切ることはできる。"
1001006-14 = "先生は今から帰るとこだったの？"
1001006-15 = "うん？アビドスに用事があって？"
1001006-16 = "ああ、うん、そうなんだ……。"
1001006-17 = "そういえば先生が出勤に使う地下鉄だったね。D.U.に来ることになって、もしかしたら会えるかなと思ったけど。"
1001006-18 = "……ん、別に狙ってたわけじゃないんだけど、会えたね。"
1001006-19 = "……。"
1001006-20 = "その、偶然だから。"
1001006-21 = "……。"
1001006-22 = "[s] \"……じゃあ、偶然会ったんだし、一緒に帰ろうか？\""
1001006-23 = "ん……。"
1001006-25 = "（シロコと一緒に地下鉄でアビドス中央駅まで帰った）"
