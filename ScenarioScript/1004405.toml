[translation]
1004405-1 = "Uma estrela brilhando sobre a areia"
1004405-2 = "（Não conseguindo dormir muito bem, saí um pouco para pegar um ar）"
1004405-5 = "（Talvez por todos estarem dormindo, apenas o som dos insetos ecoa no silêncio da noite）"
1004405-9 = "[ns1] \"Tem alguém acordado...?\"\n[ns2] Caminho em direção ao som."
1004405-15 = "Eu suspeitava que fosse você, mas era mesmo o Sensei."
1004405-16 = "[s3] \"Ah, eu sabia.\"\n[s4] \"Essa voz...!\""
1004405-22 = "Fufufu. Eu queria te surpreender, então estava me escondendo♡"
1004405-23 = "O que faz aqui a essa hora da noite?"
1004405-24 = "Tem algum assunto...?"
1004405-25 = "[s5] \"Eu vim seguindo a Nonomi.\"\n[s6] \"Eu não conseguia dormir, então vim pegar um ar.\""
1004405-26 = "Hmm... entendo."
1004405-27 = "Hmm... entendo."
1004405-28 = "Fufu. Na verdade, eu também não estava conseguindo dormir."
1004405-32 = "……Já que estamos aqui... que tal caminharmos um pouco juntos?"
1004405-37 = "Hmm..."
1004405-38 = "……Sim, sim."
1004405-39 = "[s7] \"……Nonomi?\"\n[s8] \"O que houve?\""
1004405-44 = "Não... não é nada."
1004405-45 = "É só que... eu estava pensando sobre o motivo de não conseguir dormir."
1004405-46 = "Como posso dizer... é um pouco desperdício, talvez."
1004405-47 = "Se eu dormir agora, quando acordar já será amanhã, não é?"
1004405-48 = "Sinto que, se isso acontecer, o dia precioso que podemos passar aqui vai desaparecendo aos poucos..."
1004405-49 = "Sério, tem sido tão divertido desde que chegamos aqui. Por isso, conforme o dia de ir embora se aproxima, esse sentimento de melancolia fica mais forte..."
1004405-50 = "Estou falando sem nexo, né? Ahaha..."
1004405-51 = "……Ué?"
1004405-52 = "Sensei, para onde você vai...?"
1004405-53 = "Algo que quer me mostrar...?"
1004405-54 = "Mas ali só tem o mar..."
1004405-55 = "Já está tarde, talvez devêssemos voltar..."
1004405-56 = "……Hmm?"
1004405-57 = "O Sensei é o responsável, então está tudo bem... entendi."
1004405-61 = "……É verdade, você tem razão."
1004405-67 = "Entendido! Nonomi vai seguir o responsável☆"
1004405-72 = "……Chegamos!"
1004405-76 = "Uau... que sensação boa..."
1004405-77 = "Como não há luzes por perto... as estrelas estão lindas."
1004405-81 = "……Sensei?"
1004405-82 = "[s] \"……Nonomi.\""
1004405-84 = "[ns9] \"Olhe para o outro lado.\"\n[ns10] \"Tem estrelas aqui também.\""
1004405-88 = "…………?"
1004405-93 = "…………!!!"
1004405-96 = "[wa:900]— Olhe, Sensei! [wa:1700]Está brilhando!"
1004405-98 = "— O mar parece [wa:1000]um céu estrelado!"
1004405-101 = "— Foi por isso que"
1004405-103 = "— você me trouxe [wa:750]aqui?"
1004405-106 = "[wa:750]— Agora que penso nisso,"
1004405-108 = "— acho que estava [wa:950]escrito no panfleto."
1004405-111 = "— Que \"quando anoitece, [wa:1100]o plâncton brilha, [wa:1800]como estrelas\"..."
1004405-113 = "— É realmente [wa:1600]lindo."
1004405-116 = "[ns11] \"Se sentiu um pouco melhor?\"\n[ns12] \"Aquele sentimento de melancolia diminuiu um pouco?\""
1004405-117 = "[wa:3300]― ……hehe, [wa:1600]quem sabe, não é?"
1004405-118 = "[wa:3300]― ……hehe, [wa:1600]quem sabe, não é?"
1004405-121 = "― Brincadeira, [wa:1250] é só uma piada."
1004405-123 = "― Acho que vou conseguir [wa:650] dormir tranquilamente esta noite."
1004405-126 = "[wa:700]― Muito obrigada, [wa:1150] Sensei……"
1004405-128 = "[wa:50]― Foi, [wa:1000] de verdade, um dia como um sonho."
1004405-131 = "[wa:50]― Eu…… [wa:1350] fico feliz por ter [wa:500] vindo aqui."
1004405-134 = "[wa:1000]― Mas, [wa:1400] só mais um pouquinho……"
1004405-136 = "― ……só mais um pouquinho, [wa:1900] fique comigo."
