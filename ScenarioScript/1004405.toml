[translation]
1004405-1 = "砂上に輝く星"
1004405-2 = "（あまり寝付けず、少し風に当たろうと外に出た）"
1004405-5 = "（みんな寝ているからか、夜のしじまに虫の鳴き声だけが響いている）"
1004405-9 = "[ns1] \"誰か起きてるのかな……？\"\n[ns2] 音がした方に歩いていく。"
1004405-15 = "もしかしてと思っていましたが、やっぱり先生でしたか。"
1004405-16 = "[s3] \"あっ、やっぱり。\"\n[s4] \"この声は……！\""
1004405-22 = "ふふふ。びっくりさせようと思って、隠れてました♡"
1004405-23 = "こんな夜中にどうされました？"
1004405-24 = "何かご用事が……？"
1004405-25 = "[s5] \"ノノミについてきたんだ。\"\n[s6] \"眠れなくて、風に当たりにきたんだ。\""
1004405-26 = "ふぅん……そうなんですか。"
1004405-27 = "ふぅん……そうなんですか。"
1004405-28 = "ふふっ。実は私もなかなか眠れなくて。"
1004405-32 = "……せっかくですし……少し一緒に歩きませんか？"
1004405-37 = "う～ん……。"
1004405-38 = "……うんうん。"
1004405-39 = "[s7] \"……ノノミ？\"\n[s8] \"どうしたの？\""
1004405-44 = "いえ……何でもありません。"
1004405-45 = "ただ……眠れない理由について考えていました。"
1004405-46 = "なんというか……少しもったいないというか。"
1004405-47 = "このまま寝て、起きたらもう明日になっちゃうでしょ？"
1004405-48 = "そうしたら、ここに居られる大切な一日がどんどん消えて無くなってしまう気がして……。"
1004405-49 = "本当に、ここに来てからは楽しいんです。だから、帰る日が近づくにつれて、切ない気持ちが強くなってしまって……"
1004405-50 = "自分で話してて、まとまりがないですね。あはは……。"
1004405-51 = "……あれ？"
1004405-52 = "先生、どちらへ……？"
1004405-53 = "見せたいもの……？"
1004405-54 = "でもそっちには海しか……"
1004405-55 = "夜も遅いですし、そろそろ戻ったほうが……。"
1004405-56 = "……うん？"
1004405-57 = "先生が保護者だから大丈夫……ですか。"
1004405-61 = "……確かにそうですね。"
1004405-67 = "分かりました！ノノミ、保護者についていきます☆"
1004405-72 = "……とうちゃ～く！"
1004405-76 = "わぁ……気持ちいい……。"
1004405-77 = "周囲に灯りもないから……星が綺麗に見えますね。"
1004405-81 = "……先生？"
1004405-82 = "[s] \"……ノノミ。\""
1004405-84 = "[ns9] \"反対の方を見てみて。\"\n[ns10] \"こっちにも星があるよ。\""
1004405-88 = "…………？"
1004405-93 = "…………！！！"
1004405-96 = "[wa:900]― 見てください、先生！[wa:1700]光ってます！"
1004405-98 = "― 海がまるで[wa:1000]星空みたいです！"
1004405-101 = "― このために、"
1004405-103 = "― 私をここに連れてきて[wa:750]くださったんですか？"
1004405-106 = "[wa:750]― そういえば、"
1004405-108 = "― パンフレットにも[wa:950]書いてあったような気がします。"
1004405-111 = "― 「夜になると[wa:1100]プランクトンが光って、[wa:1800]星のように輝く」って……"
1004405-113 = "― 本当に、[wa:1600]綺麗ですね。"
1004405-116 = "[ns11] \"ちょっとは元気出た？\"\n[ns12] \"切ない気持ち、少しは消えた？\""
1004405-117 = "[wa:3300]― ……ふふっ、[wa:1600]どうでしょうね～？"
1004405-118 = "[wa:3300]― ……ふふっ、[wa:1600]どうでしょうね～？"
1004405-121 = "― なんて、[wa:1250]冗談です。"
1004405-123 = "― 今夜は気持ちよく[wa:650]眠れそうです。"
1004405-126 = "[wa:700]― ありがとうございます、[wa:1150]先生……"
1004405-128 = "[wa:50]― 本当に、[wa:1000]夢のような一日でした。"
1004405-131 = "[wa:50]― 私……[wa:1350]ここに来られて[wa:500]よかったです。"
1004405-134 = "[wa:1000]― ですが、[wa:1400]もう少しだけ……。"
1004405-136 = "― ……ほんの少しだけ、[wa:1900]一緒にいてください。"
