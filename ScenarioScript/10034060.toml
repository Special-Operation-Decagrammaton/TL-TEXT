[translation]
10034060-1 = "Episódio 6; Qualificação"
10034060-3 = "（……Tarde da noite）"
10034060-10 = "[ns1] \"……Então você estava aqui.\"\n[ns2] \"Eu te procurei, Airi.\""
10034060-13 = "……Eh, Sensei?"
10034060-14 = "Po-por que você está aqui……?"
10034060-15 = "……Você esteve me procurando esse tempo todo?"
10034060-16 = "Ah…… desculpe, eu esqueci de abrir o MomoTalk……."
10034060-17 = "O pessoal disse alguma coisa?"
10034060-18 = "……Um assunto importante?"
10034060-19 = "……?"
10034060-20 = "……Para mim?"
10034060-21 = "[s3] \"Você está procurando a Tsumugi, não é?\"\n[s4] \"Eu fiquei preocupado com você, Airi.\""
10034060-24 = "……Ah."
10034060-28 = "……É verdade."
10034060-29 = "O Sensei sabe de tudo, não é……."
10034060-30 = "……Você veio aqui para me convencer a voltar?"
10034060-31 = "E por isso, a essa hora da noite……."
10034060-32 = "……Sinto muito por causar problemas de novo."
10034060-33 = "[s5] \"Airi, você não precisa se desculpar.\"\n[s6] \"Não pretendo te forçar a voltar, então fique tranquila.\""
10034060-36 = "……É verdade?"
10034060-37 = "……Sensei, você realmente entende tudo, não é."
10034060-38 = "Mas agora, não importa o que me digam, eu não consigo voltar."
10034060-39 = "Isso é um problema meu."
10034060-40 = "As outras…… as outras realmente não têm culpa de nada."
10034060-41 = "Mesmo comigo assim, elas são sempre tão gentis comigo……#nPara mim, elas são amigas preciosas."
10034060-42 = "……Por isso, por isso que……."
10034060-43 = "Não posso mais causar problemas. #nNão quero mais ser um peso para elas."
10034060-44 = "Ainda dá tempo. #nSe pedirmos para a Tsumugi assumir agora…… #nEla conseguirá fazer a apresentação ser um sucesso."
10034060-49 = "Então, me descul……pe."
10034060-50 = "Obrigada por vir até aqui, mas……."
10034060-51 = "Eu……, não consigo mais…… não consigo……!"
10034060-52 = "Fui eu que…… propus isso…… mas!"
10034060-53 = "……Eu não sirvo para nada……."
10034060-54 = "……Eu sou um desastre……!"
10034060-55 = "……Desculpe. Desculpe, Sensei."
10034060-59 = "[ns7] \"Pode me contar o que está sentindo, Airi?\"\n[ns8] \"……O que aconteceu e com o que você está preocupada?\""
10034060-62 = "…………."
10034060-63 = "……Dois capítulos."
10034060-64 = "Estou dois capítulos atrás das outras no livro de partituras."
10034060-65 = "……Como eu erro logo de cara, não consigo tocar a música toda até o fim."
10034060-66 = "Mesmo que elas estejam se esforçando por minha causa……."
10034060-67 = "Mesmo praticando até tarde, meus dedos não me obedecem……."
10034060-71 = "Eu……."
10034060-72 = "Fui eu quem propôs, mas……."
10034060-73 = "[s9] \"……Entendo.\"\n[s10] \"Você estava sofrendo sozinha esse tempo todo, né?\""
10034060-76 = "……Sim."
10034060-77 = "Quando eu fico desanimada……."
10034060-78 = "……Elas sempre me encorajam muito."
10034060-80 = "「Está tudo bem, você vai conseguir logo logo」."
10034060-81 = "「É só relaxar os ombros」……."
10034060-82 = "Dizer que \"nós cobrimos você\" é..."
10034060-84 = "Eu sei, eu sei que elas dizem isso de coração."
10034060-85 = "Mas eu continuo pensando nas piores coisas..."
10034060-86 = "Na minha cabeça, uma outra versão de mim fica sussurrando."
10034060-88 = "...\"Como você pode ser tão inútil?\""
10034060-89 = "\"Será que você não está com preguiça?\"..."
10034060-90 = "\"Logo, logo todas vão se cansar de você e ir embora\"..."
10034060-92 = "Uma vez que minha mente começa a focar no lado negativo..."
10034060-96 = "...eu já não consigo entender mais nada."
10034060-98 = "\"Por que vocês não entendem como eu me sinto?\""
10034060-99 = "\"Por que vocês dizem coisas tão irresponsáveis?\""
10034060-103 = "\"Na verdade...\""
10034060-104 = "\"Eu não faço falta nenhuma...\""
10034060-106 = "Eu percebi na hora que isso não era verdade."
10034060-110 = "Na verdade, eu detesto pensar desse jeito."
10034060-111 = "Detesto tanto que não aguento mais."
10034060-112 = "Mesmo assim, na minha cabeça, existe uma parte de mim que pensa mal delas..."
10034060-113 = "A Natsu, a Yoshimi, a Kazusa também..."
10034060-115 = "Eu sei que elas não pensam assim."
10034060-116 = "Todas elas são minhas amigas preciosas..."
10034060-117 = "Mas, mesmo assim..."
10034060-118 = "Por que eu continuo pensando no pior?..."
10034060-119 = "Isso provavelmente é porque... eu sou egoísta. #nSó penso em mim mesma, tentando me proteger o tempo todo..."
10034060-120 = "Se eu continuar aqui, só vou acabar machucando todo mundo."
10034060-121 = "Então, pensei que seria melhor eu desaparecer antes disso."
10034060-125 = "...O que será que deu errado?"
10034060-126 = "A Kazusa é legal e confiável, #na Yoshimi é fofa e cheia de iniciativa."
10034060-127 = "A Natsu tem tanto conhecimento e um mundo próprio, mas..."
10034060-128 = "...Só eu não tenho nada."
10034060-129 = "Mesmo depois de começar a banda, eu fui a única que ficou para trás..."
10034060-130 = "...Por que eu não consigo fazer nada?"
10034060-131 = "Por que, por que eu..."
10034060-132 = "...sou uma pessoa tão inútil?"
10034060-136 = "[ns11] \"…………。\"\n[ns12] \"……Airi.\""
10034060-139 = "[ns13] \"……Posso te pedir uma coisa?\"\n[ns14] \"……O que a Airi está vendo agora?\""
10034060-142 = "...Sensei?"
10034060-146 = "...Ah, me desculpe."
10034060-147 = "Ué, não é o meu, é o telefone do Sensei que..."
10034060-151 = "[ns15] \"Este número...\"\n[ns16] \"……Comitê Executivo do Carnaval?\""
10034060-155 = "...Desculpe pelo horário. #nEstou falando com o Sensei do Schale?"
10034060-156 = "É que, na verdade..."
10034060-158 = "Nós detivemos três alunas..."
