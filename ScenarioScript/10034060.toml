[translation]
10034060-1 = "第6話;資格"
10034060-3 = "（……深夜）"
10034060-10 = "[ns1] \"……ここにいたんだね。\"\n[ns2] \"探したよ、アイリ。\""
10034060-13 = "……えっ、先生？"
10034060-14 = "ど、どうして、ここに……？"
10034060-15 = "……ずっと、私を探してたんですか？"
10034060-16 = "あっ……すみません、モモトーク開くの忘れてて……。"
10034060-17 = "みんな、何か言ってましたか？"
10034060-18 = "……大事な話？"
10034060-19 = "……？"
10034060-20 = "……私に、ですか？"
10034060-21 = "[s3] \"ツムギを探してるんだよね？\"\n[s4] \"アイリのことが心配になって。\""
10034060-24 = "……あ。"
10034060-28 = "……そう、でした。"
10034060-29 = "先生は、全部知ってますもんね……。"
10034060-30 = "……私を説得して、連れ戻すために来たんですか？"
10034060-31 = "そのために、こんな時間まで……。"
10034060-32 = "……また迷惑をかけて、ごめんなさい。"
10034060-33 = "[s5] \"アイリが謝る必要は無いよ。\"\n[s6] \"無理に連れ戻す気も無いから安心して。\""
10034060-36 = "……本当、ですか？"
10034060-37 = "……先生は、本当に色々とお見通しなんですね。"
10034060-38 = "ですが今は、何を言われても戻れそうにありません。"
10034060-39 = "これは、私の問題なんです。"
10034060-40 = "みんなは……みんなは本当に、悪くなくて。"
10034060-41 = "こんな私に対しても、いつも優しいみんな……#n私にとって、大切な友達。"
10034060-42 = "……だから、だからっ。"
10034060-43 = "これ以上、迷惑はかけられません。#nもう足を引っ張るのは嫌なんです。"
10034060-44 = "まだ間に合います。#n今からでもツムギさんに代わってもらえば……。#n彼女なら、演奏を成功させてくれます。"
10034060-49 = "なので、ごめんな……さい。"
10034060-50 = "せっかく来て……もらい、ましたが……っ。"
10034060-51 = "私は……っ、もう……もう……っ！"
10034060-52 = "自分で……っ、言い出したこと……っなのに！"
10034060-53 = "……全然、ダメで……。"
10034060-54 = "……ダメダメ、でぇっ……！"
10034060-55 = "……ごめんなさい。ごめんなさい、先生。"
10034060-59 = "[ns7] \"アイリの気持ち、聞かせてもらえる？\"\n[ns8] \"……何があって、どう悩んでるのか。\""
10034060-62 = "…………。"
10034060-63 = "……二章分。"
10034060-64 = "みんなより二章分も、教本が遅れてるんです。"
10034060-65 = "……私がすぐミスしちゃうから、最後まで通しで演奏もできなくて。"
10034060-66 = "私のために、付き合ってくれてるのに……。"
10034060-67 = "遅くまで練習しても、指が言うことを聞いてくれないし……。"
10034060-71 = "私が……。"
10034060-72 = "私が、言い出したのに……。"
10034060-73 = "[s9] \"……うん。\"\n[s10] \"ずっと一人で悩んでたんだね。\""
10034060-76 = "……はい。"
10034060-77 = "私が落ち込んでいると……。"
10034060-78 = "……みんな、たくさん励ましてくれました。"
10034060-80 = "「大丈夫、すぐできるようになるよ」。"
10034060-81 = "「肩の力を抜けばいいのよ」……。"
10034060-82 = "「私たちがカバーするから」って……。"
10034060-84 = "分かってるんです、本心でそう言ってくれてるって。"
10034060-85 = "でも、どんどん悪い方に考えちゃって……。"
10034060-86 = "頭の中で、もう一人の私が囁いてくるんです。"
10034060-88 = "……「こんなことすらできないなんて」。"
10034060-89 = "「やる気がないんじゃないの？」……。"
10034060-90 = "「みんな、そのうち嫌気が差していなくなるよ」……。"
10034060-92 = "一度でも、悪い方へ悪い方へと意識が向いたら……。"
10034060-96 = "……もう、自分でも何も分からなくなっちゃいました。"
10034060-98 = "「どうして、私の気持ちが分からないの？」。"
10034060-99 = "「どうして、そんな無責任なこと言うの？」。"
10034060-103 = "「本当は……」。"
10034060-104 = "「私なんて、いなくてもいいんだ……」。"
10034060-106 = "そんなことない、なんてことはすぐに気づいてました。"
10034060-110 = "むしろそんなことを考えてしまう自分が嫌で。"
10034060-111 = "嫌で嫌で堪らなくて。"
10034060-112 = "なのに頭の中では、みんなのことを悪く思ってる自分がいて……。"
10034060-113 = "ナツちゃんも、ヨシミちゃんも、カズサちゃんも……。"
10034060-115 = "そんな風には思ってないって、分かってます。"
10034060-116 = "みんな、私の大切な友達だから……。"
10034060-117 = "なのに、それなのに……。"
10034060-118 = "なんで、悪い方に考えちゃうんだろう……。"
10034060-119 = "これも多分……私が、自分勝手だからなんです。#n自分のことだけ考えて、自分のことばっかり守ろうとして……。"
10034060-120 = "このまま一緒にいても、みんなを傷つけるだけです。"
10034060-121 = "なら、その前にいなくなれば良いんじゃないかなって。"
10034060-125 = "……何がダメだったんでしょうね。"
10034060-126 = "カズサちゃんはカッコよくて頼りがいがあって、#nヨシミちゃんは可愛くて行動力があります。"
10034060-127 = "ナツちゃんはいろんな知識があって、自分だけの世界を持ってるのに……。"
10034060-128 = "……私だけ、何にも無い。"
10034060-129 = "バンドを始めてからも、自分だけ置いてかれて……。"
10034060-130 = "……どうして、私には何もできないんだろう。"
10034060-131 = "どうして、どうして私は……。"
10034060-132 = "……こんなにダメな子なんでしょうか？"
10034060-136 = "[ns11] \"…………。\"\n[ns12] \"……アイリ。\""
10034060-139 = "[ns13] \"……ちょっとだけ、いいかな？\"\n[ns14] \"……今のアイリには何が見えてる？\""
10034060-142 = "……先生？"
10034060-146 = "……あ、ごめんなさい。"
10034060-147 = "あれ、私じゃなくて、先生の電話が……。"
10034060-151 = "[ns15] \"この番号……。\"\n[ns16] \"……謝肉祭の運営委員会？\""
10034060-155 = "……夜分遅くに失礼いたします。#nシャーレの先生で間違いありませんか？"
10034060-156 = "そのですね、実は……。"
10034060-158 = "生徒3名の身柄を、拘束していまして……。"
