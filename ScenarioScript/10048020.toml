[translation]
10048020-1 = "第2話;聞いてあげます"
10048020-2 = "特殊交易部の寮内"
10048020-5 = "[ns] \"だっ、誰を……いや、何を埋めたの！？\""
10048020-6 = "わーっ！#nそ、そういうのじゃないんです！"
10048020-7 = "種まき！種まきのことだよね、リッちゃん？"
10048020-8 = "そそ！種まき終わりっ！"
10048020-9 = "ミヨちゃんの言った通り、ちゃんと「植えて」きたよ！"
10048020-10 = "う、うん！お疲れさま。"
10048020-11 = "リッちゃん、おつかれー。"
10048020-12 = "ありがと！"
10048020-13 = "あれ？そこにいるのは……。"
10048020-14 = "[s] \"はじめまして。シャーレの先生です。\""
10048020-15 = "はじめまして！ボク、[ruby=うすば]薄葉[/ruby]リツ！"
10048020-16 = "趣味も特技も、彫刻と交易！"
10048020-17 = "もちろん専攻は、彫刻！"
10048020-18 = "[s] \"よ、よろしく！\""
10048020-19 = "そういえば、先生のことニュースで見たよ。 "
10048020-20 = "裸で野原を全力ダッシュしたんでしょ？"
10048020-21 = "[s] \"ま、間違ってはないけど……っ！\""
10048020-22 = "ああいうの、ワイルドハントの外でもやっていいんだ！"
10048020-23 = "[s] \"ワイルドハントの中ならいいの……？\""
10048020-24 = "えっと、あくまでパフォーマンスの一つとしてなら許されている、といいますか……。"
10048020-25 = "先生、着る服ないの？"
10048020-26 = "ボクのあげよっか？"
10048020-27 = "[s] \"気持ちだけ……受け取っておくよ……。\""
10048020-28 = "そうだ、種まきが終わったならちょうどいいね。"
10048020-29 = "リッちゃん。#nその場所案内してくれない？"
10048020-30 = "ん？いいけど、なんで？"
10048020-31 = "先生に、特殊交易部の活動を見せてあげたくてね。"
10048020-32 = "見学ってこと？"
10048020-33 = "面白そうだね！"
10048020-38 = "でもいいの？"
10048020-39 = "ミヨちゃん、情報が漏れるの気にしてなかったっけ？"
10048020-40 = "ふふっ、リッちゃん……先生は「大人」なんだよ。"
10048020-41 = "大人は……味方にすると、たくさんお金を落としてくれるらしいんだよ？"
10048020-42 = "だからこうやって信用させてしまえば……。"
10048020-43 = "[s] \"あのー、全部聞こえてるけど……。\""
10048020-45 = "はあ……何言ってるんですか……。"
10048020-46 = "……とにかく。ご案内します、先生。"
10048020-50 = "行くよ、みんな。"
10048020-52 = "ワイルドハント・空き地"
10048020-56 = "最初の種まきポイント、とーちゃく！"
10048020-57 = "[s] \"ところで……「種まき」ってなに？\""
10048020-58 = "し、品物を依頼人に届けること……です。"
10048020-59 = "指定の場所に私たちが品物を「まいて」、#n後で依頼人が「収穫」する――"
10048020-60 = "だから、種まきです。"
10048020-61 = "ここだと埋めた場所は……あの彫刻像の下ですね。"
10048020-62 = "しっ……来た来た。"
10048020-71 = "あった……！"
10048020-72 = "おお……ついに！#n私の心を満たす、最後のピースが……！！"
10048020-73 = "今回の依頼品って何だったっけ？"
10048020-74 = "ナパーム弾味のフライドチキンです。"
10048020-75 = "[s] \"……そんなものが依頼されるんだ？\""
10048020-80 = "飲食物の持ち込み基準は、とても厳しいですから。"
10048020-81 = "その上、外出許可もなかなか下りないので自由に外食さえできません。"
10048020-82 = "そこで、私たちの出番というわけです。"
10048020-83 = "では、次の地点へ行きましょうか。"
10048020-85 = "ワイルドハントのどこかの森"
10048020-86 = "（ここでは、木の[ruby=うろ]洞[/ruby]が指定の場所だった）"
10048020-93 = "みっけ！"
10048020-94 = "これで、やっと完成できる……！"
10048020-95 = "あの方はとあるメーカーの絵の具を探していました。"
10048020-96 = "ワイルドハントでは持ち込み禁止となった絵の具です。"
10048020-97 = "[s] \"何で禁止になったの？\""
10048020-98 = "殺虫剤の成分が入っており、健康に害を及ぼす危険がある……とか。"
10048020-100 = "（他にも種まきポイントを見て回った）"
10048020-101 = "（実際に確認していくと……）"
10048020-102 = "（言葉から想像していたような危険な品物はなかった）"
10048020-104 = "ワイルドハント・空き地"
10048020-105 = "（見学が終わり、すこし休むことにした）"
10048020-106 = "これでしゅーりょー！今日はもう扉を閉める時間だね！"
10048020-107 = "どうでした？先生。 "
10048020-108 = "私たちの部活動は。"
10048020-109 = "[s1] \"実際に自分の目で見てみると……。\"\n[s2] \"思っていたより平和というか……。\""
10048020-112 = "ふふ……今日見ていただいたのは、活動のほんの一部ですけどね。"
10048020-113 = "実際はこれよりも、はるかに膨大な数のルートや受け渡し方法があります。"
10048020-114 = "それ、自慢することです？"
10048020-115 = "もちろん！"
10048020-116 = "あれ……なんだか、浮かない顔をしてるね。"
10048020-117 = "今日見せたのは、全部ミヨの「作品」なのに。"
10048020-118 = "[s] \"作品……？\""
10048020-119 = "ちょっと……！"
10048020-120 = "何十種類もの受け渡し方法と、貿易ルート……#n寮監隊と出くわしたときのシナリオも――"
10048020-121 = "全部ミヨが書いてくれたんですよ。"
10048020-122 = "うぅっ……。"
10048020-123 = "恥ずかしいからやめて……！"
10048020-124 = "ミヨは伊達に部長を務めていないんですよ。"
10048020-125 = "私たち特殊交易部の目標を定め、作戦立案を行うブレーン……。"
10048020-126 = "それが私たちの部長、ミヨです。"
10048020-127 = "わーっ！"
10048020-128 = "いい加減受け入れようよ。"
10048020-129 = "ミヨは……貿易の要なんだから！"
10048020-130 = "そーそー！ミヨちゃんの作戦に穴はないからね！ "
10048020-131 = "リッちゃんまで……！"
10048020-135 = "――ということで、またミヨの力を借りたいんだけど。"
10048020-137 = "……？"
10048020-138 = "今度は何？"
10048020-139 = "ふふっ……。 "
10048020-140 = "実は、結構デカい依頼が入ってね。"
10048020-141 = "なんと報酬は――"
10048020-142 = "却下。"
10048020-143 = "まだ話してないのに！？"
10048020-144 = "フユがデカいって言うのなら、とんでもない依頼にきまっています……！"
10048020-148 = "まあ……そうかもしれないけど。"
10048020-149 = "でも、結局受けることになると思うよ。"
10048020-150 = "依頼内容とは別に、もう一つデカい話があるんだ。"
10048020-151 = "……？"
10048020-152 = "実は――"
10048020-154 = "「キューティーベリー[ruby=はちなな]87[/ruby]」が売りに出てる。"
10048020-155 = "……！？"
10048020-156 = "ま、まだ誰にも買われてないですよね！？"
10048020-157 = "うん。ほら、このフリマサイトを見て。"
10048020-162 = "[ns] \"キューティーベリー87って？\""
10048020-163 = "いわゆる、「呪われし傑作」です。"
10048020-164 = "あまりにも時代を先取りしすぎたせいで消費者に匙を投げられた――#n市場から姿を消した悲運の名機……！"
10048020-165 = "まぁ、ただの古いタイプライターなんですけどね。"
10048020-166 = "はぁ！？"
10048020-167 = "[s] \"これをずっと探してたの？\""
10048020-171 = "はい、そうなんです。"
10048020-173 = "趣味はタイプライター収集……。"
10048020-175 = "[ns] \"なるほど……。\""
10048020-176 = "見れば見るほど、あんまり売れなかったのも分かる気がするんですけどね。"
10048020-177 = "なんで指向性の対人地雷をタイプライターにつけたんだか。"
10048020-178 = "カッコイイからって投石機を使うあんたが言います……？"
10048020-179 = "ははっ。\nでも、キューティーベリー87……欲しいんだよね？"
10048020-180 = "それで、どこからお金を出すんです？"
10048020-181 = "何で私の懐事情が分かるんですか。"
10048020-182 = "表紙を見ただけで、中身が分かる本ってあるじゃん？"
10048020-183 = "は？予想を裏切る展開かもしれないじゃないですか……。"
10048020-184 = "この場合は違うと思うけどね。"
10048020-188 = "……ふん。"
10048020-189 = "認めればいいじゃん。#nキューティーベリーが欲しいけどお金がない、って。 "
10048020-190 = "でも、今回の依頼が成功すれば……。"
10048020-191 = "あれを5台買ってもおつりが来ると思うよ。"
10048020-192 = "……。"
10048020-196 = "……分かった。"
10048020-197 = "……依頼の内容、聞いてあげます。"
