[translation]
10048020-1 = "Episódio 2; Eu vou te ouvir"
10048020-2 = "Dormitório do Departamento de Comércio Especial"
10048020-5 = "[ns] \"Q-quem... não, o que você enterrou!?\""
10048020-6 = "Uaaah! N-não é nada disso!"
10048020-7 = "Semear! É sobre semear, né, Ritsu?"
10048020-8 = "Isso mesmo! Semeadura concluída!"
10048020-9 = "Como a Miyo-chan disse, nós terminamos de \"plantar\" direitinho!"
10048020-10 = "Ah, sim! Bom trabalho."
10048020-11 = "Ritsu, bom trabalho."
10048020-12 = "Obrigada!"
10048020-13 = "Ué? Quem está ali..."
10048020-14 = "[s] \"Muito prazer. Sou o Sensei do Schale.\""
10048020-15 = "Muito prazer! Eu sou Ritsu Usuha!"
10048020-16 = "Meus hobbies e talentos são escultura e comércio!"
10048020-17 = "Claro, minha especialidade é escultura!"
10048020-18 = "[s] \"P-prazer em conhecê-la!\""
10048020-19 = "Falando nisso, vi o Sensei no noticiário."
10048020-20 = "Você correu a toda velocidade pelo campo sem roupa, né?"
10048020-21 = "[s] \"B-bem, não está errado, mas...!!\""
10048020-22 = "Dá para fazer esse tipo de coisa fora de Wildhunt também!"
10048020-23 = "[s] \"Então, dentro de Wildhunt é permitido...?\""
10048020-24 = "Bem, digamos que é tolerado contanto que seja parte de uma performance..."
10048020-25 = "Sensei, você não tem roupas para vestir?"
10048020-26 = "Quer que eu te empreste as minhas?"
10048020-27 = "[s] \"Vou apenas aceitar a intenção...\""
10048020-28 = "Ah, é verdade, se a semeadura terminou, então é uma boa hora."
10048020-29 = "Ritsu. Você poderia nos mostrar o local?"
10048020-30 = "Hm? Tudo bem, mas por quê?"
10048020-31 = "Quero mostrar ao Sensei as atividades do Departamento de Comércio Especial."
10048020-32 = "Uma visita guiada?"
10048020-33 = "Parece divertido!"
10048020-38 = "Mas tudo bem?"
10048020-39 = "Miyo-chan, você não estava preocupada com o vazamento de informações?"
10048020-40 = "Fufu, Ritsu... o Sensei é um \"adulto\", sabe?"
10048020-41 = "Dizem que, quando você conquista um adulto, ele gasta muito dinheiro, né?"
10048020-42 = "Então, se ganharmos a confiança dele assim..."
10048020-43 = "[s] \"Ei, eu estou ouvindo tudo, sabia...\""
10048020-45 = "Ah... o que você está dizendo..."
10048020-46 = "...De qualquer forma. Vamos te guiar, Sensei."
10048020-50 = "Vamos, pessoal."
10048020-52 = "Terreno baldio de Wildhunt"
10048020-56 = "Primeiro ponto de semeadura, chegamos!"
10048020-57 = "[s] \"A propósito... o que é \"semear\"?\""
10048020-58 = "É... entregar mercadorias para o cliente."
10048020-59 = "Nós \"semeamos\" a mercadoria no local designado, e depois o cliente \"colhe\"—"
10048020-60 = "Por isso, chamamos de semeadura."
10048020-61 = "Aqui, o local onde enterramos foi... debaixo daquela estátua."
10048020-62 = "Psiu... lá vem ele."
10048020-71 = "Encontrei...!"
10048020-72 = "Oh... finalmente! A peça que faltava para preencher meu coração...!!"
10048020-73 = "Qual era mesmo o item do pedido desta vez?"
10048020-74 = "É frango frito com sabor de napalm."
10048020-75 = "[s] \"……Esse tipo de coisa é encomendada?\""
10048020-80 = "Os critérios para trazer comida e bebida são muito rigorosos, afinal."
10048020-81 = "Além disso, a permissão para sair é difícil de conseguir, então nem podemos comer fora livremente."
10048020-82 = "É aí que nós entramos em cena."
10048020-83 = "Bem, vamos para o próximo local?"
10048020-85 = "Alguma floresta em Wild Hunt"
10048020-86 = "(Aqui, o local designado era o oco de uma árvore)"
10048020-93 = "Achei!"
10048020-94 = "Com isso, finalmente vou conseguir terminar……!"
10048020-95 = "Aquela pessoa estava procurando por tintas de uma certa marca."
10048020-96 = "São tintas que foram proibidas de entrar em Wild Hunt."
10048020-97 = "[s] \"Por que foram proibidas?\""
10048020-98 = "Dizem que contêm ingredientes de inseticida e que há risco de prejudicar a saúde…… ou algo assim."
10048020-100 = "(Também visitamos outros pontos de entrega)"
10048020-101 = "(Ao verificar na prática……)"
10048020-102 = "(Não havia itens perigosos como eu imaginava pelas palavras)"
10048020-104 = "Terreno baldio de Wild Hunt"
10048020-105 = "(A visita terminou e decidimos descansar um pouco)"
10048020-106 = "E é isso! Já está na hora de fechar as portas por hoje!"
10048020-107 = "O que achou, Sensei?"
10048020-108 = "Das nossas atividades de clube."
10048020-109 = "[s1] \"Vendo com meus próprios olhos…….\"\n[s2] \"É mais pacífico do que eu pensava…….\""
10048020-112 = "Fufu…… o que você viu hoje é apenas uma pequena parte das nossas atividades."
10048020-113 = "Na verdade, existem rotas e métodos de entrega muito mais vastos do que isso."
10048020-114 = "Isso é algo para se gabar?"
10048020-115 = "Claro!"
10048020-116 = "Ué…… você parece um pouco desanimada."
10048020-117 = "Sendo que tudo o que mostramos hoje são as \"obras\" da Miyo."
10048020-118 = "[s] \"Obras……?\""
10048020-119 = "Ei……!"
10048020-120 = "Dezenas de métodos de entrega e rotas comerciais…… e até cenários para quando encontramos a Equipe de Monitoramento do Dormitório――"
10048020-121 = "Tudo isso foi escrito pela Miyo."
10048020-122 = "Ugh……."
10048020-123 = "É vergonhoso, pare com isso……!"
10048020-124 = "A Miyo não é presidente por acaso."
10048020-125 = "Ela é o cérebro que define os objetivos do nosso Clube de Comércio Especial e elabora as estratégias……."
10048020-126 = "Essa é a nossa presidente, Miyo."
10048020-127 = "Ahhh!"
10048020-128 = "Aceite logo de uma vez."
10048020-129 = "A Miyo é…… o pilar do nosso comércio!"
10048020-130 = "Isso mesmo! Não tem falhas nas estratégias da Miyo!"
10048020-131 = "Até você, Ricchan……!"
10048020-135 = "――Então, eu queria pedir a ajuda da Miyo novamente."
10048020-137 = "……?"
10048020-138 = "O que é desta vez?"
10048020-139 = "Fufu……."
10048020-140 = "Na verdade, recebemos um pedido bem grande."
10048020-141 = "E a recompensa é――"
10048020-142 = "Rejeitado."
10048020-143 = "Mas eu nem comecei a falar ainda!?"
10048020-144 = "Se a Fuyu diz que é algo grande, com certeza é um pedido absurdo...!"
10048020-148 = "Bem... talvez seja."
10048020-149 = "Mas, no fim das contas, acho que você vai acabar aceitando."
10048020-150 = "Além do conteúdo do pedido, tem outro assunto importante."
10048020-151 = "……？"
10048020-152 = "Na verdade—"
10048020-154 = "A \"Cutie Berry 87\" está à venda."
10048020-155 = "……！？"
10048020-156 = "A-ainda não foi comprada por ninguém, né!?"
10048020-157 = "Sim. Olha, dá uma olhada neste site de vendas."
10048020-162 = "[ns] \"O que é a Cutie Berry 87?\""
10048020-163 = "É o que chamam de \"obra-prima amaldiçoada\"."
10048020-164 = "Por estar tão à frente do seu tempo, os consumidores a ignoraram—#nfoi uma máquina lendária e infeliz que desapareceu do mercado...!"
10048020-165 = "Bem, é só uma máquina de escrever antiga, na verdade."
10048020-166 = "Hã!?"
10048020-167 = "[s] \"Você estava procurando por isso esse tempo todo?\""
10048020-171 = "Sim, exatamente."
10048020-173 = "Seu hobby é colecionar máquinas de escrever..."
10048020-175 = "[ns] \"Entendi...\""
10048020-176 = "Quanto mais eu olho, mais entendo por que não vendeu muito."
10048020-177 = "Por que diabos colocaram uma mina antipessoal direcional em uma máquina de escrever?"
10048020-178 = "Você está mesmo dizendo isso, sendo que usa uma catapulta só porque acha legal...?"
10048020-179 = "Haha.\nMas, Cutie Berry 87... você quer, não quer?"
10048020-180 = "E de onde você vai tirar o dinheiro?"
10048020-181 = "Como você sabe da minha situação financeira?"
10048020-182 = "Sabe, existem livros que você só precisa olhar a capa para saber o conteúdo, não é?"
10048020-183 = "Hã? Pode ser que o conteúdo surpreenda as expectativas..."
10048020-184 = "Acho que não é o caso aqui."
10048020-188 = "……Humpf."
10048020-189 = "Admita logo.#nVocê quer a Cutie Berry, mas não tem dinheiro."
10048020-190 = "Mas, se este pedido for um sucesso..."
10048020-191 = "Acho que vai sobrar troco mesmo depois de comprar cinco delas."
10048020-192 = "……"
10048020-196 = "……Entendido."
10048020-197 = "……Vou ouvir o conteúdo do pedido."
