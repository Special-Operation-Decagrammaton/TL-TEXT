[translation]
10050040-1 = "Episódio 4; Operações Secretas"
10050040-3 = "Muito bem, vamos dar o nosso melhor hoje também!"
10050040-9 = "Sinto que tem algumas pessoas aqui que não vi ontem..."
10050040-10 = "Ah... é verdade. Os uniformes são pretos e a atmosfera parece um pouco diferente também."
10050040-19 = "Além disso... parece que todos estão evitando elas..."
10050040-20 = "Não sei se essa comparação é apropriada, mas... parece como nós quando a Secretaria aparece."
10050040-21 = "Bem, não entendo muito sobre o lado da Trinity, mas vamos cuidar do nosso trabalho."
10050040-22 = "Vamos lucrar bastante hoje também!"
10050040-28 = "Vocês duas, vocês estavam aqui!"
10050040-35 = "Ora, aconteceu alguma coisa...?"
10050040-36 = "Psiu! #nFalem baixo e venham comigo."
10050040-37 = "Hmm? O que será que houve...?"
10050040-42 = "Algum ginásio"
10050040-43 = "Haa... haa... por que tanta pressa...?"
10050040-44 = "Onde estamos? E por que nos trouxe aqui...?"
10050040-45 = "Vocês vão entender já já."
10050040-46 = "Pessoal! Eu as trouxe! Já está tudo bem!"
10050040-54 = "O que é isso...?"
10050040-55 = "Se não for incômodo, poderia nos explicar?"
10050040-56 = "Sim. Primeiro, sobre aquelas pessoas de uniforme preto..."
10050040-57 = "Elas são o Comitê de Justiça. #nUma espécie de comitê disciplinar que protege a ordem em Trinity."
10050040-58 = "Dizem as más línguas que a presidente do Comitê de Justiça é tão poderosa que consegue esmagar qualquer um."
10050040-59 = "Se você adicionar o fato de que elas fazem acusações absurdas, elas parecem a Secretaria da Red Winter."
10050040-60 = "Por que pessoas assim estariam aqui hoje...?"
10050040-61 = "Bem... é porque vocês duas foram marcadas pelo Comitê de Justiça."
10050040-62 = "Nós...?"
10050040-63 = "Se perguntar o porquê, temos muitos motivos para suspeitar..."
10050040-64 = "Não sei os detalhes, mas... parece que esta manhã vocês se tornaram alvos oficiais de investigação."
10050040-68 = "Não é como se tivessem avisado alunas comuns como nós, mas..."
10050040-69 = "Podemos assumir que quase todo o Comitê de Justiça está procurando por vocês."
10050040-70 = "Ao que parece, não é só o Comitê de Justiça, há rumores de que o #nTea Party também está envolvido..."
10050040-71 = "Tea Party...?"
10050040-72 = "Bem, o Tea Party é..."
10050040-74 = "E-espera... quer dizer que o conselho estudantil de Trinity, que governa através de um triunvirato, está atrás de nós...?"
10050040-75 = "...Então a Presidente Cherino nos colocou na lista de procurados."
10050040-76 = "Não... se fosse só a Presidente Cherino, haveria umas 100 formas de escapar..."
10050040-77 = "É por isso que eu disse que outros distritos autônomos são perigosos...!"
10050040-78 = "Não, Takane... ainda temos uma chance."
10050040-79 = "Ainda não fomos entregues ao Comitê de Justiça."
10050040-80 = "Será mesmo...?"
10050040-81 = "Se vocês forem encontradas... provavelmente serão expulsas imediatamente."
10050040-82 = "E o dinheiro das vendas também pode ser confiscado."
10050040-83 = "Isso seria um problema, não seria isso uma repressão à atividade econômica?"
10050040-84 = "E provavelmente todos os livros que compraram de vocês também..."
10050040-85 = "Isso não pode acontecer! Isso é repressão à atividade cultural!"
10050040-86 = "Fiquem tranquilas. Foi por isso que pedi para vocês virem."
10050040-87 = "Falando nisso, onde estamos...?"
10050040-88 = "Boa pergunta, aqui é..."
10050040-89 = "O 'Esconderijo da Senhorita'!"
10050040-90 = "Ela mesma se chamou de senhorita."
10050040-91 = "P-Presidente! Por favor, não diga coisas desnecessárias!"
10050040-92 = "Este é um ginásio que não costuma ser usado."
10050040-93 = "Por isso, acho que conseguiremos escapar dos olhos do Comitê de Justiça por um tempo."
10050040-94 = "E então... aqui só estão reunidas as pessoas que têm a determinação de manter o segredo até o fim."
10050040-98 = "Pensar que existem tantos segredos e conflitos dentro da mesma escola... A Academia Trinity é um lugar assustador..."
10050040-99 = "Embora soe como autodepreciação vindo de nós..."
10050040-100 = "No entanto, isso também pode ser visto como uma oportunidade."
10050040-101 = "Quanto mais uma cultura é reprimida, mais lucrativa ela se torna! A repressão cultural pode ser considerada uma espécie de medalha!"
10050040-102 = "Se uma cena comum é censurada, o fato de ter sido censurada vira propaganda, e as vendas podem aumentar várias vezes!"
10050040-103 = "Falando em medalhas... lembrei-me da Medalha do Bigode."
10050040-104 = "Não estou falando de algo apenas simbólico como isso..."
10050040-105 = "De qualquer forma, entendi o que vocês querem dizer."
10050040-106 = "Sim, agradeço por terem preparado este local."
10050040-107 = "Então, vamos dar início à... 'Feira de Vendas' de hoje!"
10050040-111 = "Agora que o ambiente está preparado..."
10050040-112 = "Vamos para o próximo passo, Takane. Mufufu."
10050040-113 = "...Ei, será que precisamos mesmo fazer isso?"
10050040-114 = "Claro. Tudo isso também faz parte do marketing."
10050040-115 = "Só de imaginar, sinto que vou morrer de vergonha..."
10050040-116 = "Que tal pensar assim? #nTudo é pela promoção das atividades culturais!"
10050040-117 = "Ugh... T-tudo bem, Presidente..."
10050040-124 = "Koharu! Faz tempo que não nos vemos, né?"
10050040-125 = "S-sim... é verdade... #nMas, por que tem tanta gente aqui? Aconteceu alguma coisa?"
10050040-126 = "Bem, é que... parece que tem uns livros suspeitos circulando por aí..."
10050040-127 = "Me pediram para investigar a origem dos livros, o volume de circulação e o impacto que estão causando em Trinity."
10050040-128 = "Oficialmente, é sob o pretexto de ajudar o Comitê da Biblioteca, mas..."
10050040-129 = "Dizem que é uma ordem direta do Tea Party..."
10050040-130 = "O-o Tea Party!? É um assunto dessa magnitude!?"
10050040-131 = "Dito isso, nós também não sabemos os detalhes."
10050040-132 = "Sabe, acho que já ouvi falar desse livro também..."
10050040-133 = "Sério!? Tem alguma pista...!"
10050040-134 = "N-não, na verdade, foi só por um instante..."
10050040-135 = "Entendi... Se descobrir alguma coisa, me avise, tá?"
10050040-136 = "É a primeira vez desde que entrei no comitê que investigo algo e não encontro nada..."
10050040-137 = "C-claro, ainda sou do primeiro ano, então acho que tenho pouca experiência..."
10050040-138 = "Mas sinto como se houvesse um encobrimento em escala organizacional."
10050040-139 = "S-sim, eu também vou investigar... Então você ainda não tem pistas?"
10050040-140 = "Por enquanto, consegui algumas cópias de amostra do volume 1 e do volume 2..."
10050040-141 = "C-como eles são!? P-posso dar uma olhada?"
10050040-142 = "Bem, sendo a Koharu... e como outras pessoas já sabem..."
10050040-143 = "Sim, aqui está."
10050040-144 = "Obrigada. Deixa eu ver..."
10050040-148 = "Kyaa!?"
10050040-153 = "K-Koharu!? Koharu!?!?"
10050040-155 = "I-isso é... bem, sério. Não estou vendo porque quero ver."
10050040-156 = "É puramente para ajudar todo mundo, juro!"
10050040-157 = "...Não tem outras amostras?"
10050040-158 = "É que não consegui encontrar mais nada..."
10050040-159 = "Se precisar, pode levar essa. Ainda tenho mais."
10050040-160 = "O-obrigada... Então, se aparecer mais alguma coisa... pode me mostrar?"
10050040-161 = "E-eu também vou me esforçar para investigar, de qualquer forma!"
10050040-162 = "Sim. Conto com você."
10050040-163 = "S-sim. Vou dar o meu melhor...!"
10050040-167 = "……."
10050040-172 = "N-não tem nenhum significado profundo nisso...! Eu sou uma elite do Comitê de Justiça... e vou continuar sendo!"
10050040-173 = "M-mas enfim... o que vamos fazer com isso?"
10050040-174 = "Se bem me lembro, disseram que o Comitê de Justiça e o Comitê de Biblioteca estão colaborando, então..."
10050040-176 = "Sala do Comitê de Justiça"
10050040-177 = "Ufa..."
10050040-178 = "[s] \"O que houve?\""
10050040-179 = "Sensei. Peço desculpas, acabei mostrando um lado meu nada elegante."
10050040-180 = "Não consegui encontrar muitas pistas..."
10050040-181 = "O que me preocupa um pouco é que as alunas não estão sendo muito cooperativas."
10050040-182 = "Mesmo quando pergunto sobre a situação, elas só dizem que \"não sabem\" ou tentam desviar do assunto."
10050040-183 = "Cheguei até a pensar em algo assim... será que as minhas colegas puras de Trinity..."
10050040-184 = "Estariam sendo influenciadas pela aura misteriosa que emana daquele livro...? Algo assim."
10050040-185 = "[s] \"Acho que você está pensando demais...\""
10050040-186 = "É verdade, né? Talvez eu tenha começado a pensar de forma estranha por ouvir apenas informações internas."
10050040-187 = "Acho melhor eu me manter ativa. Vou fazer uma ronda."
10050040-191 = "Olá, Sensei. Como estão as coisas por aí? Ué? Onde está a Mashiro?"
10050040-192 = "Ah... ela foi fazer uma ronda? A Mashiro sempre se esforça muito, não é?"
10050040-193 = "Se você tivesse chegado um pouco mais tarde... eu consegui uma amostra da continuação do livro."
10050040-194 = "[s] \"Sério?\""
10050040-195 = "Sim. Gostaria de dar uma olhada?"
10050040-201 = "[ns] \"...Ué?\""
10050040-203 = "[ns1] (Eu já não vi isso em algum lugar...?)\n[ns2] (Esse desenvolvimento, esses personagens...)"
10050040-206 = "Aconteceu alguma coisa, Sensei?"
10050040-207 = "Não é nada?"
10050040-208 = "……."
10050040-209 = "Entendo. Se é assim, tudo bem..."
