[translation]
33040-1 = "Episódio 4; Depois disso"
33040-3 = "KIEEEEEEEEEEEE!!!"
33040-4 = "（DOGOOOON!!! ZUDOOOOON!!!!）"
33040-5 = "Tsurugi-senpai, você está em ótima forma hoje."
33040-6 = "……Para ser sincera, eu estava cansada por causa das missões seguidas, mas vendo isso na minha frente, não posso me dar ao luxo de reclamar."
33040-7 = "Eu também preciso seguir o exemplo da senpai e me esforçar mais!"
33040-11 = "Hasumi-senpai, e aí. Algum tempo atrás, alguém roubou um dos tanques que estavam na escola..."
33040-12 = "O que você disse……!?"
33040-13 = "Estamos com falta de pessoal, então preciso que você venha... Uau, ela está fazendo um drift incrível!? Que técnica!"
33040-14 = "Eu estou um pouco ocupada agora, mas... bem, a Koharu ainda está na escola..."
33040-15 = "Não, a Koharu está de licença por causa de um resfriado, não é..."
33040-16 = "Além disso, a Koharu-san ainda pertence ao Clube de Estudos Suplementares. Sendo assim, senpai, eu vou lá!"
33040-17 = "GYAHAHAHAHAHAHAHA!"
33040-18 = "Bem, parece que podemos deixar isso com a Tsurugi... Eu vou junto também!"
33040-30 = "A-ah, Hanako-san...?"
33040-34 = "Sim, o que houve, Hinata-san?"
33040-38 = "Hum, parece que tem algo encostando nas minhas costas...?"
33040-40 = "Pois é, que situação complicada, não é? ♡"
33040-41 = "Auuu..."
33040-43 = "Hum, Hanako-san? Aconteceu algo de ruim...?"
33040-44 = "Não, não, nada aconteceu. É só que, bem na hora que eu queria sair, me pediram um favor, e agora estou presa há dias fazendo esse trabalho «importante» de organizar documentos. Bem, nem todos estavam juntos, então... não há problema algum. ♡"
33040-45 = "Uu, desculpe... A Hanako-san está me dando medo..."
33040-49 = "Pandemonium Society - Salão de Assembleias"
33040-50 = "Kikiki! Então você é o professor do «Schale»!"
33040-51 = "Entendo, isso é inesperado! Chega a ser divertido! Kikikiki!"
33040-52 = "[s] \"Hum... Olá. Você é a presidente do conselho estudantil de Gehenna...?\""
33040-53 = "Kiki, é isso mesmo."
33040-54 = "Oferecer cooperação a mim, Makoto, a presidente da Pandemonium Society, é uma decisão nada mal."
33040-55 = "[s] \"……Eh?\""
33040-56 = "Kikikiki... «Schale» e «Pandemonium Society». Se esses dois unirem forças, o Comitê Disciplinar de Gehenna seria facilmente destruído. É uma decisão perfeitamente lógica."
33040-57 = "Os cálculos foram concluídos, agora vamos executar o plano imediatamente...!"
33040-58 = "……Com licença. Esse tipo de conversa é melhor ter quando a outra parte não estiver ouvindo, não acha?"
33040-59 = "Makoto-senpai... Por favor, não distorça as coisas."
33040-60 = "O professor do «Schale» veio nos ver apenas por uma questão formal. Ele também participará do Tratado do Éden."
33040-61 = "……Então, e a cooperação conosco?"
33040-62 = "Não tem como isso acontecer. Afinal, acabamos de nos conhecer hoje, não é?"
33040-63 = "……."
33040-64 = "……Pff, entendo. Já vejo."
33040-65 = "Bem, vamos deixar a diversão para depois."
33040-66 = "Certo, vamos embora, Iroha."
33040-70 = "Sim? Já podemos ir?"
33040-72 = "Haa..."
33040-73 = "[s] \"Ako, você tem passado bem?\""
33040-74 = "Isso é..."
33040-75 = "Mais ou menos, eu diria..."
33040-76 = "Mas foi uma surpresa saber que o professor participaria do Tratado do Éden."
33040-77 = "Isso significa que depois daqui você vai para Trinity...?"
33040-78 = "[s] \"Eu passei em Trinity antes de vir para cá.\""
33040-79 = "O quê, quando foi que...!?"
33040-80 = "Como oficial administrativa do Comitê Disciplinar, como pude deixar passar uma informação tão importante...!?"
33040-81 = "Por mais ocupada que eu estivesse com os preparativos do tratado, não acredito que não consegui monitorar as ações do Sensei..."
33040-82 = "[s] \"Ako, acalme-se...\""
33040-83 = "……Ufa."
33040-84 = "A Presidente também me disse outro dia que eu deveria me acalmar um pouco..."
33040-85 = "[s] \"A Hina está trabalhando agora?\""
33040-86 = "A Presidente está fora de Gehenna resolvendo alguns assuntos no momento..."
33040-87 = "Como sempre, ela tem dias muito ocupados... Embora eu ache que o trabalho da Presidente diminuirá depois que o Tratado de Eden for assinado..."
33040-88 = "……."
33040-89 = "De qualquer forma, os assuntos do Sensei terminaram, certo? A saída é por ali—"
33040-95 = "……Despedir-se."
33040-96 = "P-Presidente?"
33040-97 = "Você não deveria estar em uma viagem de negócios até amanhã...?"
33040-98 = "Terminei mais cedo do que esperava. Bom trabalho para você também, Ako. Pode descansar, eu mesma vou acompanhá-lo."
33040-99 = "Ah, sim..."
33040-100 = "Vamos, Sensei."
33040-102 = "Ufa..."
33040-103 = "……Então, Sensei. As coisas em Trinity se acalmaram?"
33040-104 = "[s1] \"Ainda não, tenho uma montanha de coisas para resolver...\"\n[s2] \"Planejo fazer várias coisas depois que o Tratado de Eden terminar...\""
33040-105 = "Entendo... Isso significa que você ainda está guardando várias coisas que nem me contou."
33040-106 = "Entendo... Isso significa que você ainda está guardando várias coisas que nem me contou."
33040-107 = "Se o que você me disse naquela época era realmente tudo, não deveria ter sobrado nada, certo?"
33040-108 = "……Não estou te culpando por \"não ter contado tudo\". Já é complicado o suficiente com Abydos, e tratando-se de Trinity... deve ter sido muito complexo, e você deve ter tido suas próprias razões e preocupações..."
33040-109 = "[s] \"B-bem... mas sobre a festa na piscina, expliquei tudo exatamente como aconteceu.\""
33040-110 = "N-não é disso que estou falando!"
33040-111 = "Ah, meu Deus..."
33040-112 = "……Bem, de qualquer forma."
33040-113 = "Existem vários pontos de vista, e a verdade pode mudar dependendo de como você olha para ela... Foi o que você disse naquela época."
33040-114 = "Mesmo que o \"traidor de Trinity\" seja encontrado, isso é apenas a verdade sob um ponto de vista específico... É difícil julgar tudo apenas com isso."
33040-115 = "Não aceitar apenas as informações, mas continuar buscando outras verdades sob diferentes perspectivas e continuar se esforçando. Porque isso é..."
33040-116 = "……."
33040-120 = "……Essas garotas confiam em você, Sensei."
33040-121 = "[s] \"Eu também confio na Hina.\""
33040-122 = "Ah! Por que disse isso de repente...!"
33040-123 = "E além disso, você já tinha dito isso antes!"
33040-124 = "Francamente..."
33040-126 = "Tome cuidado no caminho de volta."
33040-127 = "[ns] \"...Por acaso, você ainda não contou para a Ako sobre a aposentadoria?\""
33040-129 = "……Pois é."
33040-130 = "Ninguém além de você sabe ainda. Embora a Ako talvez já tenha percebido algo."
33040-131 = "Dizer que vou me aposentar não é algo tão grandioso assim. É só que estou um pouco cansada e quero descansar..."
33040-132 = "……Vamos parar de falar disso. Não é um assunto tão importante."
33040-133 = "……Então, nos vemos na cerimônia de assinatura."
33040-134 = "[s] \"Sim, obrigado. Hina.\""
33040-137 = "E então, o tempo continuou a passar..."
33040-138 = "O dia da cerimônia de assinatura do Tratado de Eden chegou."
33040-143 = "Próximo episódio: Cerimônia de Assinatura do Tratado de Eden (1)"
