[translation]
33040-1 = "Episódio 4; E Depois"
33040-3 = "Kieeeeeeeeeee!!!"
33040-4 = "(DOGOOOON!!! ZUDOOOOON!!!!)"
33040-5 = "Tsurugi-senpai, você está voando hoje, hein."
33040-6 = "...Sinceramente, estou exausta de tanto fazer missão, mas vendo algo assim na minha frente, não dá para reclamar."
33040-7 = "Vou me inspirar na senpai e me esforçar também!"
33040-11 = "Hasumi-senpai, e aí. Alguém aí roubou um tanque que estava no estoque da escola..."
33040-12 = "Como é que é...!?"
33040-13 = "Preciso de ajuda, tem pouca gente aqui... Opa, olha só o drift que ela está fazendo!? Que técnica!"
33040-14 = "A gente está numa correria danada... mas espere, a Koharu ainda está na escola...?"
33040-15 = "Não, espere, a Koharu está de folga por causa do resfriado..."
33040-16 = "Bom, a Koharu ainda faz parte do Clube de Reposição. Então, senpai, deixa que eu vou lá!"
33040-17 = "Gyahahahaha!!!"
33040-18 = "Bom, acho que dá para deixar com a Tsurugi... eu vou junto!"
33040-30 = "A-ah, Hanako-san...?"
33040-34 = "Sim, aconteceu alguma coisa, Hinata-san?"
33040-38 = "Ah, é que... parece que tem alguma coisa batendo nas minhas costas...?"
33040-40 = "Pois é, né? Situação complicada...♡"
33040-41 = "Auuu..."
33040-43 = "Err, Hanako-san? Está acontecendo algo de ruim...?"
33040-44 = "Não, não, nada mesmo. É só que, justamente quando eu queria sair, me pedem um favor desses, e eu fico presa há dias fazendo esse trabalho 'importante' de organizar arquivos. Bom, nem todo mundo está junto nessa... mas não tem problema nenhum♡"
33040-45 = "Ugh, me desculpe... a Hanako-san está me dando medo..."
33040-49 = "Parlamento de Gehenna"
33040-50 = "Kikiki! Você é o Sensei da Schale!?"
33040-51 = "Entendi, isso é inesperado! É quase divertido, até! Kikikikiki!"
33040-52 = "[s] \"Err... olá. Você é a presidente de Gehenna...?\""
33040-53 = "Kiki, ah, sou eu mesma."
33040-54 = "Você fez bem em vir oferecer cooperação à Sua Majestade Makoto, presidente do Parlamento."
33040-55 = "[s] \"...Hã?\""
33040-56 = "Kikikiki... Se a 'Schale' e o 'Parlamento' unirem forças, a gente acaba com o Comitê Disciplinar de Gehenna num piscar de olhos. É uma decisão puramente lógica."
33040-57 = "Cálculos finalizados, vamos executar o plano agora mesmo...!"
33040-58 = "...Ei. É melhor ter essas conversas quando a outra parte não estiver ouvindo, sabia?"
33040-59 = "Makoto-senpai... para de distorcer as coisas desse jeito."
33040-60 = "O Sensei da Schale veio aqui só por uma formalidade. Ele também vai comparecer ao Tratado do Éden."
33040-61 = "...Então, sem cooperação com a gente?"
33040-62 = "Claro que não, né? A gente acabou de se conhecer hoje, sabia?"
33040-64 = "...Bom, vamos deixar a diversão para depois."
33040-65 = "Certo, vamos embora, Iroha."
33040-70 = "Hã? Já deu?"
33040-72 = "Haa......"
33040-73 = "[s] \"Akko, tudo bem por aí?\""
33040-75 = "Mais ou menos, eu acho..."
33040-76 = "Mas foi uma surpresa ver o senhor comparecer ao Tratado do Éden."
33040-77 = "Isso quer dizer que depois daqui você vai para a Trinity...?"
33040-78 = "[s] \"Acabei de vir de lá para cá, na verdade.\""
33040-79 = "Como é que é, quando foi que... !?"
33040-80 = "Como é que eu, a administradora do Comitê, deixei passar uma informação tão importante...!?"
33040-81 = "Eu ando ocupada com os preparativos do tratado, mas não ter rastreado os passos do Sensei é inaceitável..."
33040-82 = "[s] \"Akko, calma...\""
33040-84 = "A presidente também me disse isso outro dia, que era melhor eu me acalmar..."
33040-85 = "[s] \"A Hina está trabalhando?\""
33040-86 = "A presidente está fora de Gehenna a serviço agora..."
33040-87 = "Como sempre, ela vive ocupada... acho que o trabalho dela vai diminuir depois que o Tratado do Éden for assinado..."
33040-89 = "Enfim, o senhor terminou o que precisava, né? A saída é por ali――"
33040-95 = "...Eu vou te levar."
33040-96 = "P-Presidente?"
33040-97 = "Você não estava em viagem até amanhã...?"
33040-98 = "Terminei mais rápido do que pensei. Akko, bom trabalho, pode descansar, eu levo ele."
33040-99 = "Ah, s-sim..."
33040-102 = "Haa......"
33040-103 = "...Então, Sensei. As coisas na Trinity se acalmaram?"
33040-104 = "[s1] \"Ainda tenho um monte de coisa que preciso resolver...\"\n[s2] \"Planejo fazer várias coisas depois que o Tratado do Éden acabar...\""
33040-105 = "Entendi... então você tem mais um monte de coisa pendente que não me contou."
33040-106 = "Entendi... então você tem mais um monte de coisa pendente que não me contou."
33040-107 = "Se tudo o que você me disse naquela hora era verdade, não tem como isso já ter acabado, né?"
33040-108 = "...Não que eu esteja te cobrando por 'não ter contado tudo'. É sobre a Trinity, um lugar super complicado, e você deve ter tido suas razões e coisas para pensar..."
33040-109 = "[s] \"B-Bom... mas sobre a festa na piscina, expliquei tudo como foi.\""
33040-110 = "D-Disso não importa!"
33040-112 = "...Mas enfim."
33040-113 = "Existem muitos pontos de vista, e a verdade pode mudar dependendo de como você olha... foi o que você disse na época."
33040-114 = "Mesmo se o 'traidor da Trinity' for encontrado, isso é apenas a verdade sob um ponto de vista específico... é difícil julgar tudo apenas por isso."
33040-115 = "Sem engolir informações sem filtrar, procurando outras verdades sob vários ângulos, continuar se esforçando no que você pode fazer. Porque isso é..."
33040-120 = "...Essas garotas confiam no Sensei, né."
33040-121 = "[s] \"Eu também confio na Hina.\""
33040-122 = "Cê! Por que isso de repente...!"
33040-123 = "E eu já ouvi isso antes!"
33040-126 = "Cuidado no caminho de volta."
33040-127 = "[ns] \"...Será que, por acaso, você ainda não contou para a Akko sobre a aposentadoria?\""
33040-129 = "...Pois é."
33040-130 = "Ninguém além do Sensei sabe. A Akko deve ter desconfiado de algo, mas..."
33040-131 = "Dizer que vou me aposentar não é nada tão grandioso assim. Só estou um pouco cansada e quero descansar..."
33040-132 = "...Vamos parar de falar disso. Não é algo tão importante."
33040-133 = "...Então, nos vemos na cerimônia."
33040-134 = "[s] \"Sim, obrigado. Hina.\""
33040-137 = "E o tempo continuou fluindo..."
33040-138 = "O dia da cerimônia de assinatura do Tratado do Éden chegou."
33040-143 = "Próximo Episódio; Cerimônia de Assinatura do Tratado do Éden (1)"