[translation]
33040-1 = "Episódio 4;E Então"
33040-3 = "Kieeeeeeeeh!!!"
33040-4 = "(BUUUM!!! CABRUUUM!!!!)"
33040-5 = "Veterana Tsurugi, hoje você tá em plena forma, hein."
33040-6 = "……Sinceramente, com tanta missão seguida, o cansaço bateu; mas, vendo uma cena dessas na minha frente, não dá pra reclamar."
33040-7 = "Eu também tenho que seguir o exemplo da veterana e me esforçar mais!"
33040-11 = "Veterana Hasumi, e aíí. Agora há pouco, um alguém aí roubou o tanque que era material da escola."
33040-12 = "Como é que é……!?"
33040-13 = "Tá faltando gente, então queria que você viesse…… uou, tá dando um drift absurdo!? Que técnica!"
33040-14 = "Agora a gente tá na correria, mas…… é que, a Koharu ainda tá na escola……."
33040-15 = "Não, a Koharu tá de repouso, gripada, né……."
33040-16 = "Aliás, a Koharu ainda pertence ao Clube de Aulas de Reforço, viu. Sendo assim, veterana, eu vou!"
33040-17 = "Gyahahahahahahaha!"
33040-18 = "Bom, aqui parece que dá pra deixar com a Tsurugi…… eu também vou junto!"
33040-30 = "É-é que, Hanako……?"
33040-34 = "Sim, o que foi, Hinata?"
33040-38 = "É que, parece que tem alguma coisa encostando nas minhas costas……?"
33040-40 = "Pois é, que situação, né♡"
33040-41 = "Auu……."
33040-43 = "É que, Hanako? Tá acontecendo algo difícil……?"
33040-44 = "Não, não, nada. Só me pediram um favor justo na hora em que eu queria sair, e há dias estou dedicada à \"importantíssima\" ajuda de organizar documentos. Bom, não éramos todas juntas…… então não há problema nenhum♡"
33040-45 = "Uu, desculpa…… a Hanako tá assustadora……."
33040-49 = "Pandemonium - Plenário"
33040-50 = "Kikikiki! Você é o Sensei da \"Schale\"!"
33040-51 = "Sei, isto foi imprevisto! A ponto de ser até divertido! Kikikikiki!"
33040-52 = "[s] \"É que…… olá. Você é a presidente do conselho estudantil de Gehenna……?\""
33040-53 = "Kiki, sim, sou eu."
33040-54 = "Vir oferecer cooperação a esta grandiosa Makoto, presidente do Pandemonium; nada mau como decisão."
33040-55 = "[s] \"……Hã?\""
33040-56 = "Kikikiki…… a \"Schale\" e o \"Pandemonium\". Se esses dois juntarem forças, um mero Comitê Disciplinar de Gehenna a gente quebra fácil. É uma decisão perfeitamente lógica, dá pra dizer."
33040-57 = "O cálculo está completo; vamos executar o plano imediatamente……!"
33040-58 = "……Ei. Esse tipo de conversa é melhor fazer onde a outra parte não esteja, viu?"
33040-59 = "Veterana Makoto…… não distorça a conversa pra um lado estranho."
33040-60 = "Este Sensei da \"Schale\" só veio nos ver por uma questão formal. Ele também vai participar do Tratado do Éden."
33040-61 = "……Então, e a cooperação com a gente?"
33040-62 = "Claro que não vai rolar. Aliás, vocês se conheceram hoje, agora, viu?"
33040-63 = "……."
33040-64 = "……Hunf, sei. Entendi."
33040-65 = "Bom, vou guardar a diversão pra depois."
33040-66 = "Certo, vamos voltar, Iroha."
33040-70 = "Hã? Já pode?"
33040-72 = "Haa……."
33040-73 = "[s] \"Ako, você também, tudo bem?\""
33040-74 = "Isso é……."
33040-75 = "Mais ou menos, digamos……."
33040-76 = "Mas foi uma surpresa: o Sensei participar do Tratado do Éden."
33040-77 = "Isso quer dizer que, depois disto, o senhor vai a Trinity……?"
33040-78 = "[s] \"Eu fui a Trinity agora há pouco, e acabei de chegar aqui.\""
33040-79 = "Quê, quando foi que……!?"
33040-80 = "Eu, a administradora do Comitê Disciplinar, deixei passar uma informação tão importante……!?"
33040-81 = "Por mais que a preparação do tratado esteja corrida, não estar a par dos movimentos do Sensei……."
33040-82 = "[s] \"Ako, calma…….\""
33040-83 = "……Ufa."
33040-84 = "A presidente também me disse isso outro dia: que é melhor eu me acalmar um pouco……."
33040-85 = "[s] \"A Hina tá trabalhando agora?\""
33040-86 = "A presidente está fora de Gehenna a serviço……."
33040-87 = "Como sempre, dias atarefados…… quando o Tratado do Éden for assinado, acho que o trabalho da presidente também diminui, mas……."
33040-88 = "……."
33040-89 = "Enfim, o assunto do Sensei já terminou, né. A saída é por ali――"
33040-95 = "……Eu acompanho."
33040-96 = "P-presidente?"
33040-97 = "A viagem não era até amanhã……?"
33040-98 = "Resolvi mais rápido do que eu esperava. Ako, bom trabalho; eu levo ele, pode descansar."
33040-99 = "Ah, sim……."
33040-100 = "Vem, Sensei."
33040-102 = "Ufa……."
33040-103 = "……E aí, Sensei. A questão de Trinity se acalmou?"
33040-104 = "[s1] \"Ainda tem uma montanha de coisa que eu quero resolver……\"\n[s2] \"Depois que o Tratado do Éden acabar, pretendo fazer mais um monte de coisa……\""
33040-105 = "Sei…… ou seja, você tá carregando de novo um monte de coisa que nem pra mim contou."
33040-106 = "Sei…… ou seja, você tá carregando de novo um monte de coisa que nem pra mim contou."
33040-107 = "Se o que você me disse naquela hora fosse mesmo tudo, não tem como ainda não ter acabado, você não acha?"
33040-108 = "……Não é que eu esteja cobrando \"por que você não contou tudo\". Se fosse Abydos, vá lá, mas é coisa de Trinity. É complicado à beça, e você também devia ter suas próprias considerações e circunstâncias……."
33040-109 = "[s] \"B-bom…… mas o caso da festa de maiô foi tudo exatamente como eu expliquei.\""
33040-110 = "I-isso não interessa!"
33040-111 = "Ai, francamente……."
33040-112 = "……Bom, enfim."
33040-113 = "Há vários pontos de vista, e, dependendo do jeito de ver, a verdade pode mudar…… naquela hora, você disse isso."
33040-114 = "Mesmo que o \"traidor de Trinity\" fosse encontrado, isso não passaria de uma verdade sob um ponto de vista específico…… julgar tudo só com isso é difícil."
33040-115 = "Sem engolir só as informações, buscando também outras verdades por vários ângulos, e continuando a fazer o esforço que está ao seu alcance. Porque isso é……"
33040-116 = "……."
33040-120 = "……Essas meninas têm a confiança do Sensei, né."
33040-121 = "[s] \"Na Hina eu também confio.\""
33040-122 = "Gh! Do nada, o quê……!"
33040-123 = "E isso eu já ouvi antes!"
33040-124 = "Francamente……."
33040-126 = "Cuidado no caminho de volta."
33040-127 = "[ns] \"……Só uma pergunta: você ainda não contou pra Ako sobre a aposentadoria?\""
33040-129 = "……Pois é."
33040-130 = "Fora o Sensei, ninguém sabe ainda. A Ako talvez já tenha percebido por alto."
33040-131 = "Falar em aposentadoria também não é nada tão dramático. É só que eu cansei um pouco e quero descansar……."
33040-132 = "……Vamos parar com esse assunto. Nem é algo tão importante."
33040-133 = "……Então, até a cerimônia de assinatura."
33040-134 = "[s] \"Sim, obrigado, Hina.\""
33040-137 = "E, então, o tempo voltou a correr……"
33040-138 = "e chega o dia da cerimônia de assinatura do Tratado do Éden."
33040-143 = "Próximo Episódio;A Cerimônia de Assinatura do Tratado do Éden (1)"
