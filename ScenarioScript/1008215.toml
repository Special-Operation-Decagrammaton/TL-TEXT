[translation]
1008215-1 = "青春の白いリボン"
1008215-2 = "（待ち合わせの時間ピッタリに到着した）"
1008215-8 = "お、アタシも今ついたとこだよ！"
1008215-9 = "さすが師匠だ！"
1008215-10 = "それじゃあ今日は、ここをゆっくり見て回ろっか。"
1008215-14 = "おっ、あれいいなあ。"
1008215-19 = "ほら、あのひょっとこのお面……。"
1008215-20 = "……師匠がつけたら面白そう。"
1008215-26 = "あははっ！変な顔！"
1008215-27 = "ついでにこの風呂敷を頭に巻いたら――"
1008215-31 = "あはははっ！最高……！"
1008215-32 = "すみません、これくださいー！"
1008215-33 = "まいど！カップル割はないんだけど、巾着袋おまけしとくよ！"
1008215-34 = "か、カップル！？いやアタシたちは……。"
1008215-35 = "[s1] \"師匠と弟子の――\"\n[s2] \"禁断のカップル……か。なるほどね。\""
1008215-38 = "いや先生もつっこんでよ！？"
1008215-39 = "というか、そのお面被っていうセリフじゃなくない！？"
1008215-40 = "[s3] \"ふふふ。レンゲは欲しいものある？\"\n[s4] \"せっかくだし、私もプレゼントしたいんだ……。\""
1008215-43 = "わ、わかったから、その変な笑い方はやめてくれ！"
1008215-44 = "なんだか微笑ましいですね……。"
1008215-45 = "ああ、これが青春……！"
1008215-49 = "[ns] \"そういえば……。\""
1008215-51 = "[ns5] \"レンゲって白いリボンがお気に入りみたいだけど。\"\n[ns6] \"他の色も着けたりするの？\""
1008215-54 = "リボン……？"
1008215-55 = "あぁ、これか。"
1008215-56 = "[s] \"なにか青春のこだわりがあるのかなって。\""
1008215-57 = "うーん、こだわりというほどじゃないんだけど……。"
1008215-58 = "……師弟関係だからな。この際秘密はなしだ！"
1008215-59 = "アタシが好きな青春小説の主人公が――"
1008215-60 = "こういう白いリボンをしてたんだ。"
1008215-61 = "一見ただのリボンなんだけど、主人公にとっては特別で……。"
1008215-62 = "彼女の青春に深く結びついているんだ。"
1008215-63 = "それが、読んでていいな……って思ったから、アタシも真似をしてみたんだ。"
1008215-64 = "[s] \"じゃあ、同じデザインのリボンをプレゼントするよ！\""
1008215-65 = "そういうことでしたら……。"
1008215-66 = "こちらなどいかがでしょうか！"
1008215-67 = "聞いてたのかよ！"
1008215-72 = "[ns] \"よし、決めた！\""
1008215-75 = "でも、本当にいいのかな……。"
1008215-76 = "これを師匠から受け取ったらその……。"
1008215-77 = "[s] \"別のデザインがよかった？\""
1008215-78 = "ち、違う！もらうのはめちゃくちゃ嬉しいんだけど……！"
1008215-79 = "そ、その……。"
1008215-80 = "でしたら、ぜひ受け取ってあげてください……！"
1008215-81 = "あーーーもうっ！"
1008215-82 = "わかった。あ、ありがとう先生……大事にする……。"
1008215-83 = "[s] \"小説の主人公くらい？\""
1008215-84 = "……！この話はもう終わり！"
1008215-90 = "さ、さあて……買い物も楽しんだし、きょ、今日の青春活動はここまでにしよっか！"
1008215-94 = "り、リボンありがとう！じゃ、また！"
1008215-98 = "[ns] \"……行ってしまった。\""
1008215-99 = "あの子が話していた青春小説の内容……。"
1008215-103 = "ご存じなさそうですね。"
1008215-104 = "店頭に立ってると、よくこんな場面に出くわしますよ。ははは。"
1008215-105 = "実はですね、あの白いリボン……。"
1008215-107 = "（商店の主人から、リボンの意味について教えてもらった）"
1008215-109 = "どうしよう……。"
1008215-110 = "もらっちゃった……。"
1008215-114 = "主人公が――"
1008215-118 = "恋人から初めてもらったリボン……！"
1008215-119 = "まさか、こんなことになるなんて……。"
1008215-120 = "師匠、あの小説読んでたりするのかな……？"
1008215-121 = "それともただのいたずら？"
1008215-122 = "でも、もし……。"
1008215-127 = "あーもうっ！何でこんなことに……！"
1008215-131 = "[ns] \"レンゲ、入ってもいいかな？\""
1008215-133 = "！？い、いいけど……。"
1008215-137 = "[ns] \"ここにいると思った。\""
1008215-138 = "な、何か気になることでもあったか……？"
1008215-139 = "[s] \"あのリボン、小説の展開だとあの後……。\""
1008215-140 = "師匠！？"
1008215-141 = "やっぱり、知ってたのか？"
1008215-142 = "[s7] \"おっと……何のことかな？\"\n[s8] \"私は何も聞いてないよ。ふふふ。\""
1008215-145 = "絶対嘘だ！"
1008215-146 = "[s] \"……でも、小説のシーンを再現するのも、青春活動かなって。\""
1008215-147 = "……！！"
1008215-148 = "た、確かに……！"
1008215-149 = "う、ううっ！い、嫌じゃないけど……！"
1008215-150 = "じゃ、じゃあ……リボン、つけてもらおうかな。"
1008215-151 = "でも、これ以上からかうのは禁止だからね……！"
1008215-158 = "（その後、レンゲにリボンをつけ、二人だけの青春を楽しんだ）"
