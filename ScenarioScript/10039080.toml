[translation]
10039080-1 = "Epílogo; Carnaval de Trinity"
10039080-11 = "#video;11010"
10039080-15 = "……Então você veio até aqui, Sensei."
10039080-19 = "[ns] \"……Mari?\""
10039080-20 = "Fufu. Mesmo usando uma máscara, você me reconheceu imediatamente, Sensei."
10039080-21 = "Então……."
10039080-22 = "……Com licença por um momento."
10039080-28 = "[ns1] \"Ah.\"\n[ns2] \"Tudo bem se você tirar isso?\""
10039080-31 = "Sim, estamos sozinhos agora."
10039080-32 = "Além disso……."
10039080-33 = "……Eu queria conversar olhando para o seu rosto."
10039080-34 = "Sensei……."
10039080-35 = "Desde quando você sabia?"
10039080-36 = "Foi desde que comecei a estudar para ser uma idol……?"
10039080-37 = "Ou talvez……."
10039080-41 = "……?"
10039080-42 = "……Como eu pensei, você sabia desde o começo, não é, Sensei?"
10039080-43 = "Isso……."
10039080-44 = "……Eu estava tão na cara assim?"
10039080-45 = "[s3] \"É que você parecia estar se divertindo tanto.\"\n[s4] \"Não precisa ficar envergonhada.\""
10039080-48 = "Uuu……."
10039080-49 = "Mesmo que você diga isso……."
10039080-50 = "Claro, fico feliz que tenha se preocupado comigo, mas…… uuu."
10039080-54 = "……."
10039080-55 = "Sensei, na verdade, eu queria lhe contar uma coisa."
10039080-56 = "……Passei momentos muito divertidos nesta última semana. Até eu mesma me surpreendi."
10039080-57 = "Graças à Sakurako-sama, à Comandante Mine, a você, Sensei, e a todos que colaboraram."
10039080-58 = "Deixe-me agradecer novamente. ……Muito obrigada, de verdade."
10039080-59 = "……Com este Carnaval, eu percebi uma coisa."
10039080-60 = "Que, ao passar tempo com você, Sensei, partes de mim que eu nem conhecia acabam aparecendo."
10039080-61 = "Por isso, estou um pouco preocupada, por assim dizer……."
10039080-62 = "[s5] \"Preocupada?\"\n[s6] \"Na verdade, não seria algo bom?\""
10039080-65 = "Talvez seja, mas……."
10039080-66 = "Sinto como se estivesse me tornando dependente de você……."
10039080-67 = "Se meus sentimentos crescerem mais do que isso……."
10039080-68 = "……Eu sou uma irmã da igreja, afinal."
10039080-69 = "Eh?"
10039080-70 = "……Na verdade, você está dizendo que eu posso ser ainda mais dependente?"
10039080-74 = "……Fufu."
10039080-75 = "……Fufufu."
10039080-76 = "[ns7] \"……Mari?\"\n[ns8] \"……Eu te incomodei?\""
10039080-79 = "……Ah."
10039080-80 = "Não, me desculpe."
10039080-81 = "É que eu senti que, se fosse você, Sensei, diria exatamente isso."
10039080-82 = "Acabei fazendo uma pergunta um pouco traiçoeira, não é?"
10039080-83 = "……Fufu."
10039080-84 = "Talvez eu tenha me tornado uma garota má."
10039080-85 = "Mas……."
10039080-86 = "Não para mais ninguém, apenas……."
10039080-91 = "……Se for na sua frente, Sensei."
10039080-92 = "Ah, vocês dois, então estavam aqui."
10039080-93 = "Eu estava procurando por vocês."
10039080-98 = "[ns9] \"……！？\"\n[ns10] \"E-essa máscara é……?\""
10039080-101 = "Fufu, será que combina comigo?#nParece que esse tipo de design está na moda agora."
10039080-102 = "O pessoal da Sisterhood e da Unidade de Socorro que fez para mim."
10039080-103 = "Pode parecer uma brincadeira, mas……."
10039080-104 = "Acho que isso só mostra o quanto nos tornamos próximos."
10039080-105 = "……De fato, você tem razão."
10039080-106 = "Tudo isso também……."
10039080-107 = "Sim, graças à Mari e aos outros."
10039080-113 = "Mais uma vez, muito obrigada pela colaboração."
10039080-114 = "Eu também, em nome da Unidade de Socorro, gostaria de agradecer."
10039080-116 = "Sakurako-sama, Comandante Mine……."
10039080-117 = "[ns11] \"Vocês duas também fizeram um ótimo trabalho.\"\n[ns12] \"Foi uma apresentação incrível.\""
10039080-120 = "Fufu, fico muito feliz em ouvir isso."
10039080-121 = "……Ah, quase me esqueci."
10039080-122 = "……?"
10039080-123 = "Na verdade, eu queria pedir a permissão da Mari."
10039080-130 = "Eu gostaria de mostrar a todos as fotos maravilhosas da Mari, mas……."
10039080-131 = "[ns13] \"……É a Mari idol!\"\n[ns14] \"Mostra mais!\""
10039080-134 = "Fufu.#nEu imaginei que diriam isso, então tirei várias fotos."
10039080-135 = "Realmente, seria um desperdício não deixar que outras pessoas vissem isso――"
10039080-141 = "……O que houve, Mari?"
10039080-142 = "Não precisa ficar tão apressada, as fotos não vão fugir."
10039080-143 = "Fufu, esta aqui ficou especialmente adorável."
10039080-144 = "…………."
10039080-150 = "……!"
10039080-151 = "……！？"
10039080-152 = "[ns15] \"N-não pode ser……!\"\n[ns16] \"Mari!?\""
10039080-155 = "……As fotos acabaram aqui?"
10039080-156 = "N-não, na gaveta da sala de trabalho também tem……."
10039080-157 = "……Entendo."
10039080-158 = "Sakurako-sama."
10039080-163 = "……Por favor, descarte todas elas, está bem?"
10039080-164 = "S-sim……!?"
10039080-165 = "Por que descartar fotos tão adoráveis da Mari!?"
10039080-166 = "……Bem, Sakurako-san."
10039080-167 = "É melhor fazer como a Mari pediu……."
10039080-169 = "……Sakurako-sama."
10039080-170 = "Você me promete?"
10039080-171 = "Promete que……."
10039080-176 = "Promete que vai descartá-las, por favor?"
10039080-177 = "……S-sim!"
10039080-178 = "V-vou fazer isso agora mesmo……!"
10039080-185 = "Eu também achei que as fotos ficaram ótimas, e#na Sakurako-san não fez por mal……."
10039080-186 = "……De qualquer forma, bom trabalho a todos."
10039080-187 = "Bem, já vou indo."
10039080-192 = "……Mari-san, e Sensei.#nMais uma vez, agradeço do fundo do meu coração."
10039080-197 = "[ns17] \"Você vai mesmo descartar tudo……?\"\n[ns18] \"Mas elas são tão fofas…….\""
10039080-200 = "Ah, Sensei, até você……."
10039080-201 = "A minha versão idol termina hoje."
10039080-202 = "A partir de amanhã, voltarei a ser uma irmã."
10039080-203 = "Não é que eu tenha enjoado das atividades de idol, mas..."
10039080-204 = "Eu precisava colocar um ponto final em algum momento."
10039080-205 = "……Vou trancar essa minha parte egoísta."
10039080-209 = "Como uma forma de compensação, talvez..."
10039080-215 = "[ns19] \"……O que é isso?\"\n[ns20] \"Você guardou apenas uma?\""
10039080-218 = "……Sim."
10039080-219 = "O Sensei sempre cuidou tão bem de mim, então..."
10039080-220 = "……É um pouco vergonhoso, mas se isso for te deixar feliz."
10039080-224 = "Vou te entregar... delicadamente. Por favor, veja em segredo, está bem...?"
10039080-233 = "……É um segredo só entre o Sensei e eu."
10039080-234 = "Serenade Promenade"
