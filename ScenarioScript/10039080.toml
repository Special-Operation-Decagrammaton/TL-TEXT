[translation]
10039080-1 = "エピローグ;トリニティ[ruby=カーニバル]謝肉祭[/ruby]"
10039080-11 = "#video;11010"
10039080-15 = "……ここにいらしたのですか、先生。"
10039080-19 = "[ns] \"……マリー？\""
10039080-20 = "ふふっ。#n仮面を被っていても、先生はすぐに気づいてくださるのですね。"
10039080-21 = "では……。"
10039080-22 = "……少し、失礼します。"
10039080-28 = "[ns1] \"えっ。\"\n[ns2] \"それ、外しても良いの？\""
10039080-31 = "はい、今は二人きりですし。"
10039080-32 = "それに……。"
10039080-33 = "……顔を見て、お話したかったので。"
10039080-34 = "先生……。"
10039080-35 = "いつから気づいていたのですか？"
10039080-36 = "アイドルの勉強を始めた時からなのか……。"
10039080-37 = "それとも……。"
10039080-41 = "……？"
10039080-42 = "……やっぱり、最初から先生は分かっていたんですね。"
10039080-43 = "その……。"
10039080-44 = "……私、そんなに分かりやすかったでしょうか？"
10039080-45 = "[s3] \"それだけ楽しそうだったからね。\"\n[s4] \"恥ずかしがる必要はないよ。\""
10039080-48 = "うぅ……。"
10039080-49 = "そう言われましても……。"
10039080-50 = "もちろん、気にかけてくださったのは嬉しいですが……うぅ。"
10039080-54 = "……。"
10039080-55 = "先生、実はお話がありまして。"
10039080-56 = "……この一週間、とても楽しい時間を過ごせました。自分でも驚くほどに。"
10039080-57 = "サクラコ様やミネ団長、それに先生や協力してくださった方たちのおかげです。"
10039080-58 = "あらためてお礼を言わせてください。#n……本当に、ありがとうございました。"
10039080-59 = "……今回の謝肉祭で、私は気づいたのです。"
10039080-60 = "先生と一緒に過ごしていると、#n自分でさえ知らなかった部分が見えてくることに。"
10039080-61 = "なので、少し心配と言いますか……。"
10039080-62 = "[s5] \"心配？\"\n[s6] \"むしろ、良いんじゃないのかな？\""
10039080-65 = "そうかも、しれませんが……。"
10039080-66 = "ずっと、甘えているような……。"
10039080-67 = "これ以上、気持ちが大きくなってしまっては……。"
10039080-68 = "……私は、シスターですから。"
10039080-69 = "えっ？"
10039080-70 = "……むしろ、もっと甘えて良い、と？"
10039080-74 = "……ふふ。"
10039080-75 = "……ふふふっ。"
10039080-76 = "[ns7] \"……マリー？\"\n[ns8] \"……嫌だった？\""
10039080-79 = "……あっ。"
10039080-80 = "いえ、すみません。"
10039080-81 = "先生なら、そう言ってくださるような気がしたので。"
10039080-82 = "少し、ズルい聞き方をしてしまいましたね。"
10039080-83 = "……ふふっ。"
10039080-84 = "私、悪い子になってしまったのかもしれません。"
10039080-85 = "ですが……。"
10039080-86 = "ほかの誰でもなく……。"
10039080-91 = "……先生の前でなら。"
10039080-92 = "お二人とも、こちらにいらしたのですね。"
10039080-93 = "探しましたよ。"
10039080-98 = "[ns9] \"……！？\"\n[ns10] \"そ、その仮面は……？\""
10039080-101 = "ふふ、似合っているでしょうか？#n今はこういったデザインが流行なのですね。"
10039080-102 = "シスターフッドと救護騎士団の皆さんが作ってくれたのです。"
10039080-103 = "ふざけて見えるかもしれませんが……。"
10039080-104 = "それだけ親しくなったということでしょう。"
10039080-105 = "……たしかに、仰る通りですね。"
10039080-106 = "これも全部……。"
10039080-107 = "ええ、マリーたちのおかげです。"
10039080-113 = "あらためて、ご協力ありがとうございました。"
10039080-114 = "私も救護騎士団の名をもって、お礼申し上げます。"
10039080-116 = "サクラコ様、ミネ団長……。"
10039080-117 = "[ns11] \"二人もお疲れ様。\"\n[ns12] \"すごく良い舞台だったよ。\""
10039080-120 = "ふふ、でしたら何よりです。"
10039080-121 = "……あっ、忘れるところでした。"
10039080-122 = "……？"
10039080-123 = "実は、マリーに許可をもらおうと思いまして。"
10039080-130 = "マリーの素敵な写真を皆さんにもお見せしたいのですが……。"
10039080-131 = "[ns13] \"……アイドルのマリーだ！\"\n[ns14] \"もっと見せて！\""
10039080-134 = "ふふっ。#nそう仰ると思い、たくさん撮影しておきました。"
10039080-135 = "やはり、これは色々な方に見ていただかなくては、もったいな――"
10039080-141 = "……どうされましたか、マリー？"
10039080-142 = "そう焦らずとも、写真は逃げませんよ。"
10039080-143 = "ふふ、この一枚は特に可愛らしいですね。"
10039080-144 = "…………。"
10039080-150 = "……！"
10039080-151 = "……！？"
10039080-152 = "[ns15] \"そ、そんな……！\"\n[ns16] \"マリー！？\""
10039080-155 = "……写真は、これで全部でしょうか。"
10039080-156 = "い、いえ、執務室の引き出しにも……。"
10039080-157 = "……そうですか。"
10039080-158 = "サクラコ様。"
10039080-163 = "……全て、処分してくださいね？"
10039080-164 = "は、はい……！？"
10039080-165 = "こんなにも可愛いマリーの写真を、どうして処分するのですか！？"
10039080-166 = "……その、サクラコさん。"
10039080-167 = "ここはマリーさんの言う通りに……。"
10039080-169 = "……サクラコ様。"
10039080-170 = "約束、してくださりますか？"
10039080-171 = "必ず……。"
10039080-176 = "必ず、処分してくださいね？"
10039080-177 = "……は、はい！"
10039080-178 = "い、今すぐに……！"
10039080-185 = "私もよく撮れていると思いましたし、#nサクラコさんも悪気があるわけでは……。"
10039080-186 = "……とにかく、お疲れ様でした。"
10039080-187 = "では、そろそろ私も失礼いたします。"
10039080-192 = "……マリーさん、それに先生。#nあらためて、心から感謝申し上げます。"
10039080-197 = "[ns17] \"本当に処分しちゃうの……？\"\n[ns18] \"可愛いのに……。\""
10039080-200 = "もう、先生まで……。"
10039080-201 = "アイドルの私は、今日で最後です。"
10039080-202 = "明日から、またシスターに戻ります。"
10039080-203 = "アイドル活動が嫌になったとかではなく……。"
10039080-204 = "どこかで区切りはつけないといけませんから。"
10039080-205 = "……わがままな私に、蓋をします。"
10039080-209 = "代わりと言っては何ですが……。"
10039080-215 = "[ns19] \"……これは？\"\n[ns20] \"一枚だけ残してたの？\""
10039080-218 = "……はい。"
10039080-219 = "先生には、いつもお世話になっていますし……。"
10039080-220 = "……恥ずかしいですが、喜んでいただけるのなら。"
10039080-224 = "そっと……差し上げます。こっそり見てくださいね……？"
10039080-233 = "……先生と私だけの秘密ですよ。"
10039080-234 = "Serenade Promenade"
