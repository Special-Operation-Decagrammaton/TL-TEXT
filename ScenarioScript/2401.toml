[translation]
2401-1 = "修行部の紹介動画を撮ろう！（１）"
2401-2 = "修行部"
2401-3 = "それは、それぞれに目標を持った百鬼夜行の美少女たちが一堂に会し……"
2401-4 = "自らを鍛え、目標に向けて修行を重ねていく部活である！"
2401-5 = "ある者は、究極に気持ち良い睡眠のために……"
2401-6 = "またある者は、誰よりも完璧な大和撫子になるために……"
2401-7 = "またある者は、これがもうすっごく元気で可愛くって～！"
2401-8 = "そばにいるだけでマイナスイオンを感じられそうな、修行部のマスコットみたいな女の子なんだけどー！"
2401-9 = "そんな女の子が世界で一番素敵なレディーになるために、日々修行をしているところがこの部活、修行部なの！"
2401-10 = "どう？聞いてるだけでワクワクしてくる、夢のような部活じゃない？"
2401-11 = "今日はそんな、修行部のことを紹介してあげるね！"
2401-12 = "……"
2401-13 = "……ううーん、なんか違う！"
2401-14 = "カットカット、もう一回！！"
2401-16 = "何だろ、なーんか思ってたのと違う。"
2401-17 = "私が想像してたのはもっと爽やかで、なんかこうキラキラした……"
2401-18 = "ちょっと見ただけで思わず「これは入部するしか！」って叫びたくなるような……"
2401-19 = "[s] \"カエデ？こんなところで何してるの？\""
2401-20 = "うわあっ！？"
2401-21 = "びっくりしたぁ……って、先生！？"
2401-22 = "ん、これ？何してたのって？"
2401-23 = "えへへっ、聞いて驚かないでよ！"
2401-24 = "私は今、"
2401-25 = "修行部の広報動画を撮ってたの！"
2401-26 = "今度、百鬼夜行連合学院で開催される「部活動紹介コンテスト」があってね！"
2401-27 = "[s1] \"部活動紹介の？\"\n[s2] \"コンテスト……？\""
2401-28 = "うん！それぞれ自分たちの部活を紹介する動画を撮って、どれが良かったかを競うコンテスト！"
2401-29 = "うん！それぞれ自分たちの部活を紹介する動画を撮って、どれが良かったかを競うコンテスト！"
2401-30 = "百鬼夜行では、こういうコンテストとか大会とかがよく開かれるの。"
2401-31 = "多分普段から部活同士で衝突したりすることも多いから、代わりにこういうので勝敗をつけさせようとしてるんだと思う。"
2401-32 = "[s] \"ちょっと物騒な背景だね……。\""
2401-33 = "どんな形であれ勝負ごとなら、負けるわけにはいかない！"
2401-34 = "世はまさにコンテスト戦国時代！"
2401-35 = "この前の「百鬼夜行・カルタ最強決定戦」では、陰陽部に一位を持って行かれちゃったんだよね。"
2401-36 = "今度こそ、そうはさせないんだから！"
2401-37 = "それに、修行部はよく色んなところから「変わり者集団」って言われてるけど……。"
2401-38 = "コンテストで勝てるくらいの動画が撮れれば、きっとその誤解も払拭できるはず！"
2401-39 = "[s] \"誤解……？\""
2401-40 = "そうそう、誤解なの！"
2401-41 = "修行部が本当はどれだけ素敵なところなのか、そろそろ私が一肌脱いでちゃーんと知らせてあげないとね。"
2401-42 = "それに優勝して賞金をもらえたら、そのお金で伝説のゴールデンヘラクレスカブトムシを……"
2401-43 = "じゃなくて！"
2401-44 = "……しゅ、修行部の活動資金に、うん。"
2401-45 = "きっとこういう活動も、素敵なレディーにまた一歩近づくための糧になるはずだし！"
2401-46 = "まさに一石二鳥！一挙両得！この手際の美しさ、もうすでに誰から見ても素敵なレディーと言っても過言じゃないはず！"
2401-47 = "[s] \"そ、そっか……応援してるね。\""
2401-48 = "うん、ありがと先生！優勝したら美味しいもの奢ってあげるね！"
2401-50 = "あっ。"
2401-51 = "でも、ちょっとだけ引っかかってることがあって……。"
2401-52 = "動画、作ってみようとしたはいいんだけど、なかなか「これだっ！」って感じにならなくて……何かが足りないっていうか……。"
2401-53 = "もちろん、私みたいな超絶可愛い修行部のマスコットがリポーターとして登場してるんだし、"
2401-54 = "その時点で優勝するのはもう当たり前なんだけど……。"
2401-55 = "[s] \"ものすごい自信だ……。\""
2401-56 = "でも、何て言うのかな。もうちょっとこう、ビビッ！と来るような、おおっ！ってなるような、いまいち決定打に欠けてるような気がしてて……。"
2401-57 = "先生はどう思う？"
2401-58 = "[s3] \"んー……単なる部活紹介にとどまらない何かをするとか。\"\n[s4] \"例えば、実際に活動の様子を紹介するのとかはどう？\""
2401-59 = "単なる部活の紹介にとどまらず……"
2401-60 = "単なる部活の紹介にとどまらず……"
2401-61 = "普段どんな活動をしてるのか、それを見せるってこと？"
2401-62 = "あ、体験入部の動画版って感じ？"
2401-63 = "……うーん、んー……んんんんん……！"
2401-64 = "採用！微塵も隙の無いナイスなアイディア！"
2401-65 = "さっすが先生！！"
2401-66 = "私の心にグッと来るアイデアを、こんなに簡単に……。"
2401-67 = "これはもうただの大人じゃなくて、「超ハイパー大人」って言っても過言じゃないね！"
2401-68 = "[s] \"……ありがとう？\""
2401-69 = "よし、じゃあ善は急げ！さっそく撮ってくるね！先生、バイバ～イ！"
2401-73 = "[ns] \"うん、空回りしない程度に頑張ってー……って、遅いか。\""
