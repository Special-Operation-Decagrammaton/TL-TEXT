[translation]
2401-1 = "Vamos gravar um vídeo de apresentação do Clube de Treinamento! (1)"
2401-2 = "Clube de Treinamento"
2401-3 = "É um clube onde garotas de Hyakkiyako, cada uma com seus próprios objetivos, se reúnem..."
2401-4 = "Para treinar a si mesmas e se dedicarem ao aprimoramento em busca de seus objetivos!"
2401-5 = "Algumas, para alcançar o sono mais confortável do mundo..."
2401-6 = "Outras, para se tornarem a dama japonesa mais perfeita de todas..."
2401-7 = "E outras, que são tão cheias de energia e adoráveis!"
2401-8 = "É uma garota que parece o mascote do Clube de Treinamento, que só de estar perto já faz você sentir energias positivas!"
2401-9 = "E é nesse clube, o Clube de Treinamento, que essa garota treina todos os dias para se tornar a dama mais maravilhosa do mundo!"
2401-10 = "O que achou? Não é um clube dos sonhos que te deixa empolgado só de ouvir?"
2401-11 = "Hoje, vou apresentar o Clube de Treinamento para você!"
2401-12 = "……"
2401-13 = "……Ugh, tem algo errado!"
2401-14 = "Corta, corta! Mais uma vez!!"
2401-16 = "Não sei, parece diferente do que eu imaginava."
2401-17 = "O que eu imaginei era algo mais refrescante, algo brilhante..."
2401-18 = "Algo que, só de olhar, faria você querer gritar: 'Eu preciso entrar nesse clube!'"
2401-19 = "[s] \"Kaede? O que está fazendo aqui?\""
2401-20 = "Uwaaa!?"
2401-21 = "Que susto... Espera, Sensei!?"
2401-22 = "Hm, isso? O que eu estava fazendo?"
2401-23 = "Hehehe, ouça e não se surpreenda!"
2401-24 = "Eu estou..."
2401-25 = "Gravando um vídeo promocional do Clube de Treinamento!"
2401-26 = "Vai ter um 'Concurso de Apresentação de Clubes' na Academia Hyakkiyako em breve!"
2401-27 = "[s1] \"Apresentação de clubes?\"\n[s2] \"Um concurso...?\""
2401-28 = "Isso! É um concurso onde cada clube grava um vídeo apresentando suas atividades e competimos para ver qual é o melhor!"
2401-29 = "Isso! É um concurso onde cada clube grava um vídeo apresentando suas atividades e competimos para ver qual é o melhor!"
2401-30 = "Em Hyakkiyako, concursos e torneios como esse acontecem com frequência."
2401-31 = "Acho que é porque os clubes vivem entrando em conflito, então tentam resolver as coisas através dessas competições."
2401-32 = "[s] \"É um histórico um pouco perigoso...\""
2401-33 = "Não importa a forma, se é uma competição, não podemos perder!"
2401-34 = "O mundo está na era dos concursos!"
2401-35 = "No último 'Torneio de Karuta de Hyakkiyako', o Clube Yin-Yang levou o primeiro lugar."
2401-36 = "Desta vez, não vou deixar isso acontecer!"
2401-37 = "Além disso, o Clube de Treinamento é frequentemente chamado de 'grupo de excêntricos' por aí..."
2401-38 = "Se conseguirmos gravar um vídeo bom o suficiente para vencer o concurso, com certeza vamos acabar com esse mal-entendido!"
2401-39 = "[s] \"Mal-entendido...?\""
2401-40 = "Isso mesmo, é um mal-entendido!"
2401-41 = "Já está na hora de eu tomar uma atitude e mostrar para todos como o Clube de Treinamento é um lugar maravilhoso."
2401-42 = "E se ganharmos o prêmio em dinheiro, com esse dinheiro eu vou comprar o lendário besouro Hércules dourado..."
2401-43 = "Não, espera!"
2401-44 = "...Para o fundo de atividades do Clube de Treinamento, sim."
2401-45 = "Com certeza, esse tipo de atividade também servirá como um passo a mais para me tornar uma dama maravilhosa!"
2401-46 = "Matar dois coelhos com uma cajadada só! Com essa eficiência, não é exagero dizer que já sou uma dama maravilhosa aos olhos de qualquer um!"
2401-47 = "[s] \"E-entendi... Estou torcendo por você.\""
2401-48 = "Sim, obrigada, Sensei! Se eu ganhar, vou te pagar algo delicioso!"
2401-50 = "Ah."
2401-51 = "Mas tem uma coisa que está me incomodando..."
2401-52 = "Tentei fazer o vídeo, mas não consigo sentir que 'é isso!'. É como se estivesse faltando alguma coisa..."
2401-53 = "Claro, já que uma mascote super adorável do Clube de Treinamento como eu está aparecendo como repórter,"
2401-54 = "a vitória já é garantida desde o início, mas..."
2401-55 = "[s] \"Que confiança incrível...\""
2401-56 = "Mas, como posso dizer? Sinto que falta aquele toque especial, algo que cause um impacto, sabe? Aquele golpe de mestre..."
2401-57 = "O que você acha, Sensei?"
2401-58 = "[s3] \"Hmm... talvez fazer algo que vá além de uma simples apresentação do clube.\"\n[s4] \"Por exemplo, que tal mostrar como são as atividades na prática?\""
2401-59 = "Ir além de uma simples apresentação do clube..."
2401-60 = "Ir além de uma simples apresentação do clube..."
2401-61 = "Quer dizer, mostrar como são as nossas atividades diárias?"
2401-62 = "Ah, tipo uma versão em vídeo de uma aula experimental?"
2401-63 = "......Hmm, hum... hummmmmmm...!"
2401-64 = "Aprovado! Uma ideia excelente e sem falhas!"
2401-65 = "Como esperado do Sensei!!"
2401-66 = "Você teve uma ideia que me tocou profundamente com tanta facilidade..."
2401-67 = "Não é exagero dizer que você não é apenas um adulto comum, mas um \"Super Hiper Adulto\"!"
2401-68 = "[s] \"...Obrigado?\""
2401-69 = "Certo, então não vamos perder tempo! Vou gravar agora mesmo! Tchauzinho, Sensei!"
2401-73 = "[ns] \"É, boa sorte para não acabar exagerando... embora eu ache que já seja tarde demais.\""
