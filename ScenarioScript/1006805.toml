1006805-123 = "Para ser sincero, achei que não teria mais o que fazer no meio do dia, mas foi muito mais do que eu esperava!"
1006805-124 = "Não consigo acreditar como o tempo voa rápido! Como foi seu sensei #n......?"
1006805-125 = "[\"Foi muito divertido. \"\"\n[s14] \"Realmente, já é tão tarde. Passou tão rápido. \"\n[s14] \"É verdade, já faz tanto tempo.\"\"\n1006805-128 = \"Ehehe ......\"\n1006805-132 = \"Na verdade, ...... que ......\"\n1006805-133 = \"Tive um ótimo dia, mas há algo que está me incomodando ......#n há muito tempo ......\"\n1006805-134 = \"Tanto a cafeteria quanto o fliperama ......#n Eu ia ensinar o sensei, mas você já sabe ......\"\n1006805-135 = \"Quando cheguei ao parque de diversões, fui conduzido de um lado para o outro e ......\"\n1006805-136 = \"Não, é fácil quando você pensa sobre isso. Como #n professora interage com muito mais alunos do que apenas eu, é natural que ela conheça lugares diferentes ......\"\n1006805-137 = \"O site ...... realmente ...... durante todo o dia de hoje.\"\n1006805-138 = \"Eu estava ficando ansioso para ver se o sensei tinha gostado. ......\"\n1006805-139 = \"Acho que desperdicei o tempo precioso de outro sensei. ......\"\n1006805-140 = \"...... frequentemente. #\"Se eu fizer isso, eles ficarão felizes!\" e depois sair do controle. ......\"\n1006805-141 = \"Portanto, ......, desculpe-me se também impus meus sentimentos ao sensei de .......\"\n1006805-145 = \"[ns15] \"Você tornou meu dia muito divertido hoje. \"\n[ns16] \"Obrigado por tornar meu dia tão maravilhoso. \"\n[ns16] \"Obrigado.\""

