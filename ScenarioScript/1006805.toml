[translation]
1006805-1 = "ありがとう、レイサ"
1006805-2 = "（レイサとの待ち合わせで、トリニティに向かった）"
1006805-4 = "トリニティ通り"
1006805-13 = "先生～～～！！！"
1006805-14 = "[ns1]（聞き慣れた声がする）\n[ns2] 振り返る。"
1006805-21 = "……先生！！！"
1006805-27 = "ううっ……止まりきれませんでした、すみません！"
1006805-28 = "[s3] \"大丈夫だよ、元気そうで良かった。\"\n[s4] \"次はちゃんと受け止めるよ！\""
1006805-31 = "えへへ……"
1006805-32 = "……あっ、また甘えちゃうところでした……！あぶないあぶない！"
1006805-33 = "今日は恩返しの日です！#nいつもアドバイスをくださる先生に、心ばかりのお礼を尽くさせていただきます！"
1006805-34 = "言いましたよね？#nとびっきり素敵な一日にして差し上げます、と！！"
1006805-35 = "今日のためにお金を貯めたんです！#nふふん、支払いは全て私にお任せください！！"
1006805-36 = "……え？"
1006805-37 = "……その必要はない、ですか？#nい、いえ……ですが、それではお礼に……"
1006805-38 = "その……気にする必要はない、と言われても……"
1006805-42 = "と、とにかく行きましょう！#nプランをしっかり練ってきましたので！時間を無駄にはできません！"
1006805-47 = "ふふ、ご案内しますね！どれも私イチオシの場所ですよ～！"
1006805-51 = "[ns] レイサについていく。"
1006805-53 = "トリニティ・商店街"
1006805-54 = "じゃーん！まずはここです！"
1006805-55 = "ほんっと～にすごいんですよ！#nこの商店街は、トリニティの中でもスイーツのラインナップが豊富で！"
1006805-56 = "新作スイーツを探すなら、ここが一番です！#n角を曲がった先には、あの有名な「カフェ・ミルフィーユ」もありますよ！！"
1006805-57 = "あ、私は友達に連れて行ってもらって、知ったばっかりなんですけどね、あはは……"
1006805-58 = "「カフェ・ミルフィーユ」、先生は行ったことありますか？"
1006805-59 = "[s5] \"大体どんな所かは知ってるよ。\"\n[s6] \"うん、何回か食べたことあるよ。\""
1006805-62 = "お、おお……！さすが先生！！"
1006805-63 = "それでは、行ってみましょう！"
1006805-70 = "ゲームセンター"
1006805-71 = "じゃじゃーん！次はここ！！ゲームセンターです！"
1006805-72 = "ここは一日中いても飽きないくらい、とっても楽しい場所なんですよ！"
1006805-76 = "ペロロキャッチャーもありますし……ヒットガールズのアーケードも！"
1006805-77 = "あ、こう見えても私、意外とヒットガールズの才能があるんです！#nまだ初心者ですが、そこそこ勝ってるんです！"
1006805-78 = "さあ先生！どこから回りますか？"
1006805-79 = "[s7] \"ペロロ様のクレーンゲームが気になる！\"\n[s8] \"ヒットガールズなら私も負けないよ！\""
1006805-82 = "……！！"
1006805-83 = "すぐ行きましょう！！！"
1006805-88 = "遊園地"
1006805-89 = "今度は遊園地！#n……ちょっと人は少ないですが、その分アトラクション周り放題ですね！"
1006805-90 = "友達と行ったことがあるのは、少し離れた大きい遊園地のほうなので……"
1006805-91 = "実はここには初めて来ました！#nパトロール中にスズミさんから紹介してもらった場所なんです！"
1006805-92 = "ん～！何から乗りましょう？#n並ばなくてもいいのは嬉しいのですが……いっぱいあって悩みますね！"
1006805-93 = "[s9] \"観覧車から見る景色が綺麗だったよ！\"\n[s10] \"メリーゴーランドが可愛かった！\""
1006805-96 = "……！#nなるほど！！それでは……！！"
1006805-100 = "……ん？"
1006805-101 = "ふーむ、むむむ……"
1006805-102 = "[s11] \"……レイサ？\"\n[s12] \"どうしたの？\""
1006805-105 = "あっ、いえっ！何でもありませんので！#nあはは……！"
1006805-109 = "行きましょう！！うおおおおお～～～っ！！"
1006805-116 = "遊び場"
1006805-121 = "あ～、楽しかったです！"
1006805-122 = "朝から先生の予定を空けていただいて、本当にありがとうございました……！"
1006805-123 = "正直、途中でやる事なくなってしまうかと思ったのですが、思った以上に盛りだくさんでしたね！"
1006805-124 = "時間が経つのがこんなに早いなんて！！#n……先生はいかがでしたか？"
1006805-125 = "[s13] \"すごく楽しかったよ。\"\n[s14] \"本当だ、もうこんな時間なんだね。あっという間だ。\""
1006805-128 = "えへへ……"
1006805-132 = "実は……その……"
1006805-133 = "今日一日、すごく楽しかった、ですけど……#nずっと気になっている事があって……"
1006805-134 = "カフェも、ゲーセンも……#n私が先生に教えるつもりだったのですが、既にご存知で……"
1006805-135 = "遊園地に至っては、私が案内されてしまい……"
1006805-136 = "いえ、考えてみたら簡単な事です。#n先生は、私以外にもたくさんの生徒と交流があるのですから、いろんな場所を知っているのは当然で……"
1006805-137 = "その……今日一日、本当に……"
1006805-138 = "先生に、楽しんでいただけたのか、不安になってきてしまって……"
1006805-139 = "また先生の貴重な時間を、無駄にしてしまったんじゃないか、と……"
1006805-140 = "……よくあるんです。#n「こうしたら喜んでくれるはず！」って勝手に思い込んで、空回りしちゃうこと……"
1006805-141 = "ですから……先生にも自分の気持ちを押し付けてしまっていたら……ごめんなさい。"
1006805-145 = "[ns15] \"今日はとても楽しい一日だったね。\"\n[ns16] \"とびっきり素敵な一日にしてもらったよ、ありがとう。\""
1006805-148 = "……え？#nでも、先生……"
1006805-149 = "[ns17] \"2人で来たのは初めてだから。\"\n[ns18] \"レイサの好きなもの知る事ができて、大切な時間だったよ。\""
1006805-152 = "[ns] \"また遊びに来ようね、レイサ。\""
1006805-156 = "先生……"
1006805-157 = "…………"
1006805-158 = "……はい！！！"
