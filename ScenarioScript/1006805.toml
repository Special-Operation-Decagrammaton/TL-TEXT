1006805-28 = "[s3] \"Estou bem, fico feliz em ver que você está bem. \"\n[s4] \"Vou aceitar melhor da próxima vez! \"\"\n[s4] \"Eu vou aguentar da próxima vez!\"\"\n1006805-31 = \"Ehehe ......\"\n1006805-32 = \"...... Oh, eu estava prestes a mimá-lo novamente. ...... Oh, não, não, não!\"\n1006805-33 = \"Hoje é o dia de retribuir! #Gostaríamos de agradecer a todos os professores que sempre nos dão os melhores conselhos!\"\n1006805-34 = \"Eu disse a você, não disse? Vou tornar seu dia #n muito especial!\"\n1006805-35 = \"Guardei meu dinheiro para hoje! #n Hmmm, eu cuidarei de todos os pagamentos!\"\n1006805-36 = \"...... O quê?\"\n1006805-37 = \"...... não há necessidade disso, não é mesmo? #nSim, não. ...... mas obrigado por isso. ......\"\n1006805-38 = \"Isso ...... não precisa se preocupar com isso, mesmo que lhe digam ......\"\n1006805-42 = \"E, de qualquer forma, vamos lá! Nós nos certificamos de que temos um plano #n! Não podemos perder tempo!\"\n1006805-47 = \"Hmm, eu lhe mostrarei os lugares! Todos esses são meus lugares favoritos!\"\n1006805-51 = \"[Siga Reisa.\"\n1006805-53 = \"Galeria de compras Trinity\"\n1006805-54 = \"Então! Antes de mais nada, aqui está!\"\n1006805-55 = \"É realmente - é incrível! #nEsta rua comercial tem a melhor variedade de doces em Trinity!\"\n1006805-56 = \"Este é o melhor lugar para encontrar novos doces! Logo após a esquina nº 1 está o famoso Café Millefeuille!\"\n1006805-57 = \"Ah, só fiquei sabendo disso quando um amigo me levou lá, haha. ......\"\n1006805-58 = \"\"Café Millefeuille\", você já esteve lá, sensei?\"\n1006805-59 = \"[s5] \"Eu sei mais ou menos como é o lugar. \"\n[s6] \"Sim, já comi lá algumas vezes. \"\n[s6] \"Sim, já comi lá algumas vezes.\""

