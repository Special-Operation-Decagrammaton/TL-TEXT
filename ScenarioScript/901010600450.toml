[translation]
901010600450-7 = "Resumindo as informações sobre a Família Carpaccio, que faz a segurança do portão principal do Porto Kanezaki..."
901010600450-8 = "A Família Carpaccio é conhecida por se envolver em vários tipos de caso por aqui."
901010600450-9 = "Parece que, assim como a Família Riborita com quem já enfrentamos, eles têm uma hierarquia rígida e assumem todo tipo de trabalho sujo."
901010600450-10 = "Bem, não é muito diferente de uma gangue de sukeban de maior porte."
901010600450-11 = "Parece que os membros que atuam por aqui trabalham direito na segurança para ganhar dinheiro."
901010600450-12 = "Hã, mas os juros são altos, né? Isso não é ilegal?"
901010600450-16 = "Verifiquei, e não ultrapassam a taxa de juros estipulada pelo Conselho Estudantil Geral. Tecnicamente, é legal."
901010600450-17 = "O problema é a cobrança –"
901010600450-22 = "Dizem que boa parte das pessoas que pegaram dinheiro emprestado com a Família Carpaccio acabou desaparecendo por causa das cobranças."
901010600450-23 = "Não houve relatos de violência, mas deve ter havido pressão psicológica."
901010600450-24 = "Hmm, parece que estamos começando a entender."
901010600450-25 = "A razão para tantos desaparecimentos na região..."
901010600450-33 = "A razão para tantos desaparecimentos na região...\n[as1] Foi por causa do caranguejo monstro.\n[as2] Descobriram um portal para outro mundo.\n[as3] Não conseguiram pagar as dívidas."
901010600450-37 = "Não falamos nada sobre caranguejo monstro."
901010600450-38 = "Sensei, o senhor estava prestando atenção?"
901010600450-39 = "Tente de novo."
901010600450-47 = "Ah, eu li um mangá com essa história outro dia."
901010600450-48 = "Uma história de reencarnação através de um portal para outro mundo –"
901010600450-52 = "Tem hora para essas coisas?!"
901010600450-62 = "... Faz sentido."
901010600450-63 = "A Família Carpaccio emprestava dinheiro a juros altos para quem estava apertado no porto e depois cobrava. Quem não aguentava, fugia."
901010600450-64 = "Aliás, a época em que os desaparecimentos começaram coincide com o início das atividades financeiras da Família Carpaccio."
901010600450-65 = "Então o ser humano é mais assustador do que fantasma, hein."