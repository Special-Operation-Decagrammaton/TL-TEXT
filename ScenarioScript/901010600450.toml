[translation]
901010600450-7 = "Summarizing the information on the Carpaccio Family, who are in charge of security at the main gate of Kanezaki Port..."
901010600450-8 = "It seems the Carpaccio Family is an organization famous around here for causing all sorts of trouble."
901010600450-9 = "Like the Ribollita Family we dealt with before, they apparently take on all kinds of dirty work backed by a strict hierarchy."
901010600450-10 = "Well, they're not much different from a large-scale group of delinquents, though."
901010600450-11 = "The family members operating near here seem to be earning money by doing their security jobs seriously."
901010600450-12 = "Wait, but the interest rates are high, right? Isn't that illegal?"
901010600450-16 = "I checked, and it doesn't seem to exceed the interest rates set by the General Student Council. #nTechnically, it's legal."
901010600450-17 = "The problem is how they collect the debts—"
901010600450-22 = "There's talk that a significant number of people who borrowed money from the Carpaccio Family near here went missing after being hounded for repayment."
901010600450-23 = "There were no reports of violent acts, but they were likely being pressured."
901010600450-24 = "Hmm, I feel like I'm starting to see a lead."
901010600450-25 = "The reason so many people went missing in this area is..."
901010600450-33 = "The reason so many people went missing in this area is...\n[as1] Because they were attacked by a monster crab.\n[as2] Because they discovered a gate connected to another world.\n[as3] Because they couldn't pay back their debts."
901010600450-37 = "I haven't said a single word about a monster crab."
901010600450-38 = "Sensei, were you actually listening to what we were saying?"
901010600450-39 = "Try thinking about it again."
901010600450-47 = "Oh, I saw a manga with that premise the other day."
901010600450-48 = "The one where you get reincarnated if you pass through a gate connected to another world—"
901010600450-52 = "Wait, is now really the time to be talking about that!?"
901010600450-62 = "…That makes sense."
901010600450-63 = "The Carpaccio Family was lending money at high interest rates to people in financial trouble around the port—and then hounding them for repayment. I think some people couldn't take it and ran away."
901010600450-64 = "In fact, there isn't much of a gap between the time people started going missing around Kanezaki Port and the time the Carpaccio Family started their financial business in earnest."
901010600450-65 = "I guess humans really are scarier than ghosts after all."