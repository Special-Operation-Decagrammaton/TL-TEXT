[translation]#[Texto Final. - Filipe 05/07.]
901010600450-7 = "Organizando as informações sobre a Família Carpaccio, que faz a segurança do portão principal do porto de Kanezaki……"
901010600450-8 = "A Família Carpaccio é conhecida na região por se envolver em vários casos."
901010600450-9 = "Igual à Família Ribolita que a gente enfrentou uma vez, eles têm uma hierarquia rígida e aceitam todo tipo de serviço sujo."
901010600450-10 = "Bom, não são muito diferentes de uma gangue de rua maior, né."
901010600450-11 = "Parece que os membros que atuam por aqui trabalham sério na segurança pra ganhar dinheiro."
901010600450-12 = "Ué, mas os juros são altos, né? Isso não é ilegal?"
901010600450-16 = "Confirmei, não ultrapassa a taxa estabelecida pelo Conselho Estudantil Geral.#nÉ legal, tecnicamente."
901010600450-17 = "O problema é a forma de cobrança――"
901010600450-22 = "Dizem que várias pessoas que pegaram dinheiro com a Família Carpaccio foram pressionadas pela cobrança e desapareceram."
901010600450-23 = "Não houve relato de violência física, mas deviam ter sofrido pressão psicológica."
901010600450-24 = "Hmm, acho que tô começando a ver uma luz."
901010600450-25 = "O motivo de tanta gente ter desaparecido na região é……"
901010600450-33 = "O motivo de tanta gente ter desaparecido na região é……\n[as1] Por causa do ataque do caranguejo monstro.\n[as2] Porque encontraram um portal pra outro mundo.\n[as3] Porque não pagaram as dívidas."
901010600450-37 = "Mas a gente não falou nada sobre caranguejo monstro."
901010600450-38 = "Sensei, você prestou atenção na conversa?"
901010600450-39 = "Pensa de novo."
901010600450-47 = "Ah, uma vez eu li um mangá com essa história."
901010600450-48 = "Passava por um portal e reencarnava em outro mundo――"
901010600450-52 = "Mas agora não é hora de falar disso!?"
901010600450-62 = "……Faz sentido."
901010600450-63 = "A Família Carpaccio emprestava dinheiro a juros altos pra quem tava precisando no porto – e cobrava. Alguns não aguentavam e fugiam."
901010600450-64 = "O período em que os desaparecimentos começaram coincide com o início das atividades financeiras da Família Carpaccio."
901010600450-65 = "No fim, fantasma não assusta tanto quanto humano, né."