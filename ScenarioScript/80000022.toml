[translation]
80000022-1 = "世の中をもっと甘く！"
80000022-2 = "シャーレ・オフィス"
80000022-3 = "その、先生……今日はその、バレンタインデーじゃん……？"
80000022-4 = "だから、先生に渡したいものがあるんだけど……"
80000022-5 = "その、ちょっと恥ずかしいから、目を瞑っててくれない？"
80000022-6 = "[s] 目をつぶる。"
80000022-8 = "（あたしが良いよっていうまで、絶対に目を開けちゃダメだよ？）"
80000022-9 = "（それからその、ちょっとだけ口を開けてくれる？）"
80000022-10 = "（じゃあ、えっと……）"
80000022-15 = "あははははっ！大成功！"
80000022-16 = "ふふっ、まんまと引っ掛かったね、先生。"
80000022-17 = "[s1] \"これ本当に大丈夫なやつ！？\"\n[s2] \"口の中にスプレーって流石に駄目では！？\""
80000022-18 = "あっ、心配しないで。"
80000022-19 = "あっ、心配しないで。"
80000022-20 = "今のは流石に絵を描くやつじゃないよ、食用のチョコレートを噴射するやつ。"
80000022-25 = "バレンタインデーのチョコを見てたら偶然発見して、インスピレーションがね！"
80000022-26 = "いくらヴェリタスと言っても世紀末の暴走族じゃないんだし、先生の口の中に急にスプレーは撒かないって。"
80000022-27 = "[s] \"確かに、よく味わうと甘いかも。\""
80000022-28 = "ふふっ、ごめんね？いたずらに付き合ってくれたお礼……ってわけじゃないけど、これ先生にも一つあげる。"
80000022-29 = "本来は、チョコレートでコーティングする時とかに使うらしいよ。"
80000022-30 = "せっかくバレンタインデーだし、今日はこれでグラフィティやってみようかな？"
80000022-31 = "ほら、街の壁から甘いチョコの香りがしたら、世の中はもっと良い感じになりそうじゃない？"
80000022-32 = "先生も何か甘くしたいものがあったら、使ってみて！"
80000022-36 = "……あ、先生はもちろん分かってると思うけど、生徒に直接かけちゃダメだからね？"
80000022-37 = "それはちょっと、色々あれだし……誰かにやったりはしないでよ？"
