[translation]
80000022-1 = "Deixar o mundo mais doce!"
80000022-2 = "Escritório do Schale"
80000022-3 = "Ei, Sensei... hoje é, tipo, Dia dos Namorados, né...?"
80000022-4 = "Então, eu tenho uma coisa para te dar..."
80000022-5 = "É que... eu estou um pouco envergonhada, então pode fechar os olhos?"
80000022-6 = "[s] Fechar os olhos."
80000022-8 = "(Não abra os olhos de jeito nenhum até eu dizer que pode, entendeu?)"
80000022-9 = "(E também... pode abrir um pouquinho a boca?)"
80000022-10 = "(Então, bem...)"
80000022-15 = "Ahahahaha! Sucesso total!"
80000022-16 = "Hehe, você caiu direitinho, Sensei."
80000022-17 = "[s1] \"Isso é realmente seguro!?\"\n[s2] \"Não é um pouco demais borrifar spray na boca de alguém!?\""
80000022-18 = "Ah, não se preocupe."
80000022-19 = "Ah, não se preocupe."
80000022-20 = "Aquilo não era tinta, é um spray de chocolate comestível."
80000022-25 = "Eu vi isso enquanto olhava os chocolates de Dia dos Namorados e tive uma inspiração!"
80000022-26 = "Mesmo sendo da Veritas, não somos uma gangue de motoqueiros do fim do mundo, eu não sairia borrifando spray na boca do Sensei do nada."
80000022-27 = "[s] \"É verdade, se prestar atenção, até que é doce.\""
80000022-28 = "Hehe, desculpa, tá? Não é exatamente um agradecimento por ter entrado na brincadeira, mas toma, um para você também."
80000022-29 = "Dizem que originalmente é usado para cobrir coisas com chocolate."
80000022-30 = "Já que é Dia dos Namorados, que tal fazermos um grafite com isso hoje?"
80000022-31 = "Olha só, se as paredes da cidade tiverem cheiro de chocolate doce, o mundo não parece que vai ficar um lugar melhor?"
80000022-32 = "Se tiver algo que você queira deixar mais doce, Sensei, pode usar também!"
80000022-36 = "...Ah, Sensei, imagino que você saiba, mas não pode sair borrifando isso nas alunas, viu?"
80000022-37 = "Isso seria um pouco... complicado, então não faça isso com ninguém, tá?"
