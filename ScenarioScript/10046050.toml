[translation]
10046050-1 = "Episódio 5: O que não foi visto e o que não se olhou"
10046050-6 = "――Por isso, todo gato é capaz de sorrir."
10046050-10 = "Seia-san, está ouvindo?"
10046050-11 = "Ugh... preparar um chá logo após a refeição..."
10046050-12 = "O que está dizendo? A hora do chá é indispensável. #nMesmo que seja logo após um churrasco."
10046050-14 = "Tem toda razão."
10046050-19 = "Não imaginei que eu fosse a minoria."
10046050-20 = "O chá também ajuda na digestão. #nVamos, aceita mais uma xícara?"
10046050-21 = "Vou preparar. Espere um momento."
10046050-26 = "……."
10046050-27 = "……！"
10046050-31 = "Nagisa-sama? Aconteceu algo?"
10046050-35 = "N-não. Nada não. O gosto é algo pessoal, afinal."
10046050-36 = "……A diversidade deve ser respeitada."
10046050-37 = "……Houve algum problema com o modo como preparei meu chá com leite?"
10046050-38 = "Não, não tive a intenção de criticar, mas..."
10046050-39 = "É que eu coloco o leite primeiro e o chá depois."
10046050-44 = "Ah."
10046050-45 = "……Fiquei surpresa."
10046050-46 = "Não esperava que a Nagisa-sama dissesse algo assim."
10046050-47 = "Claro que eu também coloco o leite primeiro quando uso folhas de chá de baixa qualidade."
10046050-51 = "Mas estas folhas são um chá nobre, trazido diretamente das plantações de Shanhaijing. #nÉ um item de primeira classe, que dá até pena de misturar com leite...!"
10046050-52 = "Para não perder o aroma, despejo o chá pelas bordas da xícara――#ne adiciono o leite na temperatura ideal lentamente."
10046050-53 = "――Este é o limite do que posso aceitar."
10046050-54 = "Há algum erro no meu pensamento?"
10046050-56 = "Ah."
10046050-57 = "Não existe uma resposta certa para como apreciar o chá. #nDa mesma forma, não pretendo afirmar que existe um jeito correto de prepará-lo."
10046050-58 = "Como a Hasumi-san disse, colocar o chá primeiro ajuda a preservar o aroma."
10046050-59 = "Porém, o protagonista do \"chá com leite\" não é apenas o chá."
10046050-60 = "Você não está subestimando demais o papel do leite?"
10046050-64 = "O sabor e a cremosidade do leite. #nA reação química que ocorre na fusão do leite com o chá."
10046050-65 = "É com tudo isso que o chá com leite se torna completo."
10046050-66 = "Você quer dizer que a identidade do chá com leite supera o sabor e o aroma originais das folhas...?"
10046050-67 = "Não é apenas um chá com leite. #nIsto é um \"chá da tarde\"."
10046050-68 = "Vai além do domínio do sabor, é um costume... não, não seria exagero chamar de cultura..."
10046050-69 = "Ignorar todos esses rituais e valorizar apenas o \"chá\"――#nque sentido isso teria?"
10046050-72 = "…………."
10046050-73 = "…………."
10046050-80 = "[ns1] \"Ei, Mika.\"\n[ns2] \"É sempre assim?\""
10046050-83 = "Ai, meu Deus... até eu fico com vergonha..."
10046050-84 = "A Nagi-chan, logo na frente do Sensei..."
10046050-85 = "Desculpe por isso. #nA Hasumi-senpai também não costuma ser assim..."
10046050-86 = "Será que, quando o assunto é chá e a Nagisa-sama está envolvida, #nexiste algo que ela simplesmente não consegue ceder?"
10046050-90 = "……No fim, começou mesmo."
10046050-91 = "Um ponto de discórdia que não encontra solução desde a fundação da Academia Trinity. #nUm tópico que não deve ser mencionado descuidadamente."
10046050-92 = "「O chá com leite deve levar o leite primeiro ou o chá primeiro...！」"
10046050-93 = "…………."
10046050-94 = "…………."
10046050-99 = "Pelo visto, chegar a um consenso será difícil."
10046050-100 = "Sim, se continuarmos assim, seremos linhas paralelas para sempre."
10046050-101 = "――Seia!"
10046050-102 = "――Senhorita Seia!"
10046050-107 = "Mi, Mika... ajude-me..."
10046050-111 = "Ah, desculpa, Seia! Estou um pouco ocupada!"
10046050-119 = "A Seia vai concordar com a minha opinião, não vai?"
10046050-120 = "Não, aqui vamos decidir pelo sabor de forma justa!#nEu confio no paladar da Senhorita Seia!"
10046050-125 = "Ah, nossa..."
10046050-131 = "Haa... desculpa."
10046050-132 = "A Nagi sempre foi teimosa com coisas bobas desde antigamente..."
10046050-133 = "Enfim! Vamos aproveitar esse momento para preparar a próxima etapa!"
10046050-134 = "Conto com você, Sensei!"
10046050-135 = "Você também, Ichika!"
10046050-140 = "Eh, eu também!? E-eu vou dar o meu melhor!"
10046050-141 = "Poxa, não precisa ficar tão tensa assim~#nSó temos um ano de diferença, afinal!"
10046050-142 = "Ah, será que... você se sente desconfortável perto de mim?"
10046050-143 = "Ah, não! Não é nada disso...!"
10046050-144 = "[s3] \"A preocupação da Mika não é infundada, né?\"\n[s4] \"A Ichika é surpreendentemente tímida, né?\""
10046050-147 = "Haha... é a primeira vez que me chamam de tímida."
10046050-148 = "Aliás, qual é o próximo compromisso...?"
10046050-149 = "Hmm... por enquanto, verificar o iate, talvez?"
10046050-150 = "Ah, aquele que está ancorado na margem?"
10046050-151 = "Isso mesmo! É um pouco diferente do plano original, mas... brincar no mar ao pôr do sol não é nada mal, né!"
10046050-152 = "Como não usamos há um tempo, estou um pouco preocupada.#nMas acho que deve estar tudo bem."
10046050-153 = "...Não é alugado?"
10046050-154 = "Aquele também é propriedade do Tea Party."
10046050-155 = "Mas nem a Nagi nem eu temos esse tipo de hobby.#nE como a Seia tem o dela, no fim ninguém usa."
10046050-157 = "Vocês vivem em mundos diferentes..."
10046050-158 = "Ahaha... é um pouco fora da realidade, né?"
10046050-159 = "Eu também achava que era normal antes, mas...#nUltimamente, comecei a perceber que talvez seja um pouco estranho..."
10046050-163 = "Ah! Isso é segredo, tá?"
10046050-164 = "A Nagi e a Seia ficam pegando no meu pé sobre a dignidade do Tea Party e tudo mais."
10046050-165 = "Haha... deve ser difícil."
10046050-173 = "Sim, pelo que parece, não há problemas!"
10046050-174 = "Só falta o motor ligar para ficar perfeito, mas――"
10046050-182 = "...Ué?"
10046050-183 = "Po, por que!?"
10046050-184 = "Hmm... o motor está funcionando, então não parece estar quebrado."
10046050-185 = "Será que tem algo enroscado na hélice...?"
10046050-186 = "Vou dar uma olhada."
10046050-193 = "Ah~ eu sabia."
10046050-194 = "Descobriu algo?"
10046050-195 = "Ah, sim. Tem lixo enroscado na hélice."
10046050-196 = "Se tirar isso, resolve?"
10046050-197 = "Provavelmente. Se tivesse algo como um bastão longo, ajudaria..."
10046050-198 = "Por que você mesma não tira?"
10046050-199 = "Não, isso é..."
10046050-200 = "Bem... pensando no tempo que levaria para achar uma ferramenta, acho que é melhor assim.#nDe qualquer forma, já estou de roupa de banho..."
10046050-201 = "Pode deixar, eu cuido disso!#nApesar da aparência, sou muito boa com limpeza!"
10046050-202 = "Hã?"
10046050-212 = "Mi, Mika!?"
10046050-214 = "Uau, que frio!"
10046050-219 = "Bem, o parafuso está... ah, é uma sacola plástica. Ichika-chan, você tem bons olhos."
10046050-220 = "...Ah, muito obrigada. Bem, de certa forma... é surpreendente."
10046050-221 = "Espera, até isso! Deixe que eu cuido dessas coisas!"
10046050-223 = "Eh? Tudo bem, tudo bem. Já que estou aqui mesmo!"
10046050-224 = "Mas a sacola plástica está toda suja de óleo..."
10046050-226 = "Eu quero fazer o que eu mesma consigo. Você já me ajudou o suficiente."
10046050-230 = "............"
10046050-240 = "Problema do motor resolvido! Bom trabalho para as duas☆"
10046050-241 = "Não, não. Eu não fiz nada."
10046050-242 = "Não diga isso. Eu sozinha não teria percebido o motivo de o motor não ligar."
10046050-243 = "Vamos continuar assim!"
10046050-244 = "Sim! Pode deixar comigo!"
10046050-249 = "............"
10046050-250 = "Mika-sama... suas unhas ficaram todas estragadas..."
10046050-252 = "(Depois disso, inspecionaram as instalações juntas)"
10046050-258 = "Cof, cof! Quanta poeira!"
10046050-259 = "Parece que vai ser uma faxina pesada. Mika-sama, deixe que eu..."
10046050-260 = "Se fizermos juntas, terminamos rápido!"
10046050-265 = "Eh!? S-sim! ...Espera, Mika-sama! Na sua cabeça! Tem uma teia de aranha!"
10046050-266 = "Hã? Kyaa!?"
10046050-279 = "(Apesar da bagunça, a limpeza avançou...)"
10046050-284 = "Ficou brilhando!"
10046050-289 = "Nossa, conseguimos terminar a tempo."
10046050-290 = "Quanto à Nagisa-sama, parece que não aconteceu nada por enquanto também."
10046050-291 = "Sim. Tudo graças a vocês duas! Obrigada!"
10046050-292 = "E também..."
10046050-296 = "...Desculpa."
10046050-300 = "Sim?"
10046050-301 = "[s5] \"Mika?\"\n[s6] \"Aconteceu alguma coisa?\""
10046050-306 = "Não, não é sobre mim."
10046050-307 = "A gente veio até a praia, mas vocês acabaram presas nos meus caprichos e nem conseguiram se divertir muito, né?"
10046050-308 = "Eu disse que conseguiria sozinha, mas acabei sendo ajudada o tempo todo..."
10046050-309 = "Acho que se vocês não estivessem aqui, eu não teria conseguido chegar até aqui."
10046050-310 = "Então, obrigada. E também... desculpa."
10046050-311 = "N-não, levante a cabeça! Se alguém vir a gente..."
10046050-312 = "Além disso, sou eu quem deveria pedir desculpas... Acho que eu tinha um pouco de preconceito sobre a Mika-sama..."
10046050-313 = "Hm? Disse alguma coisa?"
10046050-317 = "N-não! Não é nada!"
10046050-318 = "Vamos, vamos terminar logo a inspeção da casa de veraneio!"
10046050-319 = "Sim! Como verificamos de manhã, provavelmente não há problemas..."
10046050-324 = "O-o que é isso...!? O chão... está tremendo...!?"
10046050-328 = "[ns7] \"Um terremoto!?\"\n[ns8] (Cobre as duas com o corpo)"
10046050-346 = "Mika-sama! Sensei! Vocês estão bem?"
10046050-352 = "Sim, estou bem. Sensei também... que bom que está a salvo. Obrigada por me proteger... ehehe."
10046050-353 = "Mas, aquele terremoto de agora..."
10046050-354 = "Eh?"
10046050-358 = "............?"
10046050-359 = "O qu—"
10046050-361 = "...O que significa isso!?!?"
