[translation]
10046050-1 = "第5話;見えなかったモノと見てなかったモノ"
10046050-6 = "――それゆえ、どの猫も、笑うことができるのです。"
10046050-10 = "セイアさん、聞いていますか？"
10046050-11 = "うっ……食後すぐにティータイムを設けるとは……。"
10046050-12 = "何をおっしゃるのですか？ティータイムは欠かせません。#nそれがたとえバーベキューの後だとしても。"
10046050-14 = "ごもっともです。"
10046050-19 = "まさか私が少数派とは思うまいよ。"
10046050-20 = "紅茶には消化を助ける効果もありますから。#nさあ、もう一杯いかがですか？"
10046050-21 = "ご用意します。少々お待ちを。"
10046050-26 = "……。"
10046050-27 = "……！"
10046050-31 = "ナギサ様？どうかされましたか？"
10046050-35 = "い、いえ。なんでもありません。好みはそれぞれですから。"
10046050-36 = "……多様性は、尊重しなければ。"
10046050-37 = "……私のミルクティーの作り方に問題でもありましたか？"
10046050-38 = "いえ、非難の意図はなかったのですが……。"
10046050-39 = "私は先にミルクを入れ、後から紅茶を入れるものですから。"
10046050-44 = "あ。"
10046050-45 = "……驚きました。"
10046050-46 = "ナギサ様がそのようなことをおっしゃるなんて。"
10046050-47 = "もちろん私も、質の悪い茶葉を使う場合には、先にミルクを入れます。"
10046050-51 = "ですがこの茶葉は、山海経の茶園から直接仕入れた銘茶。#nミルクを入れることさえためらわれる一級品なのです……！"
10046050-52 = "香りを逃がさないよう紅茶をグラスの内側に沿わせて注ぎ――#n適温のミルクをゆっくりと入れる。"
10046050-53 = "――これが、妥協できるギリギリのラインです。"
10046050-54 = "私の考えに、誤りでも？"
10046050-56 = "あ。"
10046050-57 = "お茶の楽しみ方に正解はありません。#n同様に、正しい淹れ方があると主張するつもりもありません。"
10046050-58 = "ハスミさんのおっしゃる通り、先に紅茶を入れたほうが香りを留めやすくなるでしょう。"
10046050-59 = "しかし「ミルクティー」の主役は紅茶だけではありません。"
10046050-60 = "ミルクの役割を、あまりにも過小評価しているのではありませんか？"
10046050-64 = "ミルクの風味とクリーミーさ。#nミルクと紅茶の融合で生じる化学変化。"
10046050-65 = "それらすべてを以って完成されるのが、ミルクティーなのです。"
10046050-66 = "ミルクティーのアイデンティティーは、茶葉本来の味と風味に勝る……#nそうおっしゃりたいのですね？"
10046050-67 = "ただのミルクティーではありません。#nこれは「アフタヌーンティー」です。"
10046050-68 = "味わいの領域を超えて、一つの慣習……いいえ、文化と言っても過言ではない……。"
10046050-69 = "それらの作法をすべて無視して「お茶」だけをありがたがる行為に――#n一体何の意味があると？"
10046050-72 = "…………。"
10046050-73 = "…………。"
10046050-80 = "[ns1] \"ねえ、ミカ。\"\n[ns2] \"いつもこんな感じなの？\""
10046050-83 = "もう……こっちが恥ずかしくなっちゃうよ……。"
10046050-84 = "ナギちゃんってば、先生の前なのに……。"
10046050-85 = "なんか、すみません。#nハスミ先輩も普段はあんな感じじゃないんすけど……。"
10046050-86 = "紅茶にお詳しいナギサ様が相手だと、#nやっぱり譲れない何かがあるんすかね？"
10046050-90 = "……結局、始まってしまったか。"
10046050-91 = "トリニティ総合学園の開校以来、未だ決着を見ない論点。#n不用意に口にしてはならない話題。"
10046050-92 = "「[ruby=証明不可能な問題]ミルクティーはミルクが先か、紅茶が先か……！[/ruby]」"
10046050-93 = "…………。"
10046050-94 = "…………。"
10046050-99 = "どうやら、合意に至るのは難しいようですね。"
10046050-100 = "ええ、このままでは、私たちは永遠に平行線のまま。"
10046050-101 = "――セイアさん！"
10046050-102 = "――セイア様！"
10046050-107 = "み、ミカ……助けを……。"
10046050-111 = "あ、ごめん、セイアちゃん！ちょっと忙しくて！"
10046050-119 = "セイアさんは私の意見に賛同してくれますよね？"
10046050-120 = "いいえ、ここは公平に味で勝負です！#nセイア様の味覚なら信用できますので！"
10046050-125 = "っ、嗚呼……。"
10046050-131 = "はぁ……ごめんね。"
10046050-132 = "ナギちゃんって昔から変なところで頑固でさ……。"
10046050-133 = "とにかく！このタイミングを活かして、次の準備をやっちゃうよ！"
10046050-134 = "よろしくね、先生！"
10046050-135 = "イチカちゃんも！"
10046050-140 = "え、私もっすか！？が、頑張るっす！"
10046050-141 = "もーっ、そんな堅くならなくていいのに～#n一学年しか違わないんだしさ！"
10046050-142 = "あっ、もしかして……私と一緒にいると、気まずい？"
10046050-143 = "あ、いえ！そういうわけじゃ……！"
10046050-144 = "[s3] \"ミカの不安は杞憂じゃないかな。\"\n[s4] \"イチカは意外と人見知りだもんね。\""
10046050-147 = "はは……人見知りとか、初めて言われたっす。"
10046050-148 = "ところで、次のスケジュールは……？"
10046050-149 = "うーん……とりあえず、ヨットの点検かな？"
10046050-150 = "あぁ、岸にとめてあるやつっすね？"
10046050-151 = "そうそう！最初の計画とは少し違うけど……でも、夕暮れの海で遊ぶのも悪くないよね！"
10046050-152 = "しばらく使ってなかったから、ちょっと心配なんだよね。#nたぶん大丈夫だとは思うんだけど。"
10046050-153 = "……レンタルじゃないんすか？"
10046050-154 = "あれもティーパーティーの所有物なんだ。"
10046050-155 = "でも、ナギちゃんも私もそういう趣味はないし。#nセイアちゃんは自分のを持ってるから、結局誰も使わなくってさ。"
10046050-157 = "住む世界が違いすぎるっす……。"
10046050-158 = "あはは……ちょっと、アレだもんね？"
10046050-159 = "私も前までは普通だって思ってたけど……#n最近、ちょっとおかしいぞ？って分かってきたというか……。"
10046050-163 = "あ！これ内緒ね？"
10046050-164 = "ティーパーティーの品位がーとか、ナギちゃんもセイアちゃんもうるさいからさ。"
10046050-165 = "はは……大変っすね。"
10046050-173 = "うん、見た感じ問題はなさそうだね！"
10046050-174 = "あとはエンジンがかかれば完璧なんだけど――"
10046050-182 = "……あれ？"
10046050-183 = "ど、どうして！？"
10046050-184 = "うーん……一応エンジンが動いてはいるんで、壊れてはなさそうっすね。"
10046050-185 = "スクリューに何か絡まってるとか……？"
10046050-186 = "ちょっと見てみるっす。"
10046050-193 = "あぁ～やっぱり。"
10046050-194 = "何か分かった？"
10046050-195 = "あ、はい。スクリューにゴミが絡まってるっすね。"
10046050-196 = "それが無くなればいいの？"
10046050-197 = "おそらくは。なんか長い棒みたいのがあればいいんすけど……。"
10046050-198 = "自分で取っちゃえばよくない？"
10046050-199 = "いや、それは……。"
10046050-200 = "まあ……道具を探す時間を考えたら、そのほうがいいか。#nどうせ水着だし……。"
10046050-201 = "いいよ、大丈夫！私やっちゃうから！#nこう見えて掃除には自信あるんだ！"
10046050-202 = "へ？"
10046050-212 = "み、ミカ様！？"
10046050-214 = "わあっ、冷たっ！"
10046050-219 = "えっと、スクリューは……あ、ビニール袋だ。#nイチカちゃん目いいね。"
10046050-220 = "……あ、ありがとうございます。#nえと、なんというか……意外っすね。"
10046050-221 = "って、そんなことまで！そういうのは私がやるっすから！"
10046050-223 = "え？いいのいいの。どうせついでだもん！"
10046050-224 = "でもビニール袋、油まみれなのに……。"
10046050-226 = "自分でできることは自分でやりたいんだ。#nもう十分助けてもらってるし。"
10046050-230 = "…………。"
10046050-240 = "エンジン問題解決ー！二人とも、お疲れ様☆"
10046050-241 = "いえいえ。私は何もしてないっすよ。"
10046050-242 = "そんなことないよ。私一人じゃエンジンがかからない理由に気づけなかったもん。"
10046050-243 = "この調子でどんどんいこ！"
10046050-244 = "はい！任せてくださいっす！"
10046050-249 = "…………。"
10046050-250 = "ミカ様……せっかくのネイルがぐちゃぐちゃに……。"
10046050-252 = "（その後、二人と一緒に施設の点検を行った）"
10046050-258 = "けほっ、けほっ！すっごいホコリ！"
10046050-259 = "これは大掃除になりそうっすね。#nミカ様、ここは私が――"
10046050-260 = "二人でやればすぐだよ！"
10046050-265 = "え！？は、はいっ！#n……って、ミカ様！頭！クモの巣！"
10046050-266 = "へっ？きゃあっ！？"
10046050-279 = "（ドタバタながら掃除は進み……）"
10046050-284 = "ピッカピカになった～！"
10046050-289 = "いやぁ～なんとか間に合ったっすね。"
10046050-290 = "ナギサ様のほうも、今のところ何もなさそうですし。"
10046050-291 = "うん。全部二人のおかげだよ！ありがとう！"
10046050-292 = "それと……。"
10046050-296 = "……ごめんね。"
10046050-300 = "はい？"
10046050-301 = "[s5] \"ミカ？\"\n[s6] \"何かあったの？\""
10046050-306 = "ううん。私のことじゃなくってさ。"
10046050-307 = "せっかく海まで来たのに、私のワガママに付き合わされてあんまり遊べなかったじゃん？"
10046050-308 = "一人で大丈夫って大口叩いておいて、助けられてばっかでさ……。"
10046050-309 = "みんながいてくれなかったら、ここまでたどり着けなかったと思うんだ。"
10046050-310 = "だから、ありがとう。#nそれと……ごめんね。"
10046050-311 = "や、頭を上げてください！誰かに見られたら……！"
10046050-312 = "それに、私が謝りたいくらいで……#nミカ様のこと、少し誤解していたかも……。"
10046050-313 = "うん？なにか言った？"
10046050-317 = "い、いえ！なんでもないっす！"
10046050-318 = "はっ、早く別荘の点検済ませるっすよ！"
10046050-319 = "うん！#n一応、午前中に確認してるから、たぶん問題は――"
10046050-324 = "なっ、なに……！？#n地面が……揺れてる……！？"
10046050-328 = "[ns7] \"地震！？\"\n[ns8] （二人に覆いかぶさる）"
10046050-346 = "ミカ様！先生！大丈夫っすか？"
10046050-352 = "うん、大丈夫。先生も……無事でよかった。#nありがとね、守ってくれて……えへへ。"
10046050-353 = "でも、さっきの地震は――"
10046050-354 = "え？"
10046050-358 = "…………？"
10046050-359 = "ど――"
10046050-361 = "……どういうこと！？！？"
