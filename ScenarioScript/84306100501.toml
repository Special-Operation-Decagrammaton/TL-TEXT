[translation]
84306100501-6 = "ちなみにその銃は実用に耐えうるのかい？"
84306100501-7 = "そもそも完成させるのが難しいと思うわ。よほど特異な何かが起きない限り。"
84306100501-8 = "完成しているように見えるのだが……。"
84306100501-9 = "開発は、ここがスタートラインなのよ。安定化というゴールに辿り着くために、多くの時間と技術が必要となる。"
84306100501-10 = "そして、これを安定化できる技術は、私の知る限りまだ開発されていないわ。"
84306100501-11 = "ならばなぜこれを展示に……？"
84306100501-12 = "投資家を探すためでしょうね。"
84306100501-13 = "完成の見込みが薄いというのに？科学者はもっと堅実なものだと思っていたが。"
84306100501-14 = "いえ、最も科学者らしいわ。"
84306100501-15 = "覚えておいてちょうだい。"
84306100501-16 = "理性的な科学者というのはごく一部よ。皆、理性的であろうと努力しているだけ。"
84306100501-18 = "そう、なのだね……。"
