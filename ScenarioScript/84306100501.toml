[translation]
84306100501-6 = "A propósito, essa arma é capaz de ser usada na prática?"
84306100501-7 = "Para começar, acho difícil que ela seja concluída. A menos que algo muito peculiar aconteça."
84306100501-8 = "Mas parece estar concluída..."
84306100501-9 = "O desenvolvimento começa aqui. É preciso muito tempo e tecnologia para chegar ao objetivo da estabilização."
84306100501-10 = "E, até onde eu sei, a tecnologia para estabilizar isso ainda não foi desenvolvida."
84306100501-11 = "Então, por que exibir isso...?"
84306100501-12 = "Para encontrar investidores, suponho."
84306100501-13 = "Mesmo com poucas chances de conclusão? Eu achava que cientistas fossem mais sensatos."
84306100501-14 = "Não, isso é o que há de mais científico."
84306100501-15 = "Lembre-se disso."
84306100501-16 = "Cientistas racionais são uma minoria. Todos apenas se esforçam para tentar ser racionais."
84306100501-18 = "Entendo, é assim mesmo..."
