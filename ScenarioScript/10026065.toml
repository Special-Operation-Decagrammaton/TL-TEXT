[translation]
10026065-7 = "ふぅ……"
10026065-8 = "意外と大変ではありませんでしたね！これで、みなさんの邪魔をせずに……"
10026065-9 = "先生、顔色が優れませんが……"
10026065-10 = "も、もしかしてお怪我を！？#n全て防いだはずなのに……そんな！"
10026065-11 = "……あ、怪我ではないんですね？ほっ……安心しました……。"
10026065-12 = "先生が怪我をされてたら、みなさんに顔向けできないところでした。"
10026065-19 = "あれ、この足音は……？"
10026065-20 = "な、何事ですか！？爆発音が聞こえてきたんですけど……！"
10026065-21 = "せ、先生……！それにヒナタさんも……！"
10026065-23 = "お2人とも無事のようですね。やっぱり、先ほどの音は……"
10026065-24 = "えっと……お、音ですか？"
10026065-25 = "そ、その……これはですね！えーっと……！"
10026065-26 = "……はっ。"
10026065-27 = "な、何もありませんでしたよ！#n皆さん、どうされました？"
10026065-28 = "調査をされていたはずですよね……？#nこうしている場合では……"
10026065-29 = "……どういうことでしょう？#n中にいても、何十発と聞こえてきましたが……"
10026065-30 = "私には話せない、ということですか……？"
10026065-31 = "[s1] \"本当に何でもないよ！\"\n[s2] \"ウイたちは、気にせずに調査を続けてね！\""
10026065-34 = "……？それはどういう……"
10026065-38 = "……ふふっ、なるほど。"
10026065-39 = "私たちの思い過ごしのようですね。#nさあ、戻って続きに取り掛かるとしましょうか？"
10026065-40 = "……？？？？？？？？"
10026065-41 = "ハナコさんまで、急にどうしたんですか？#nもしかして、何か企んでいるのでは……。"
10026065-42 = "まあまあ、先生も何でもないと仰っているじゃないですか♪#nもし何かあれば、連絡してきますよ。さあ、戻って調査を続けましょう。"
10026065-43 = "いえ、あの……その前に、本当に何もなかったのか確認してからでも――"
10026065-45 = "コ・ゼ・キ・先・輩？"
10026065-46 = "ひ、ひぃっ……！？"
10026065-47 = "わ、分かりましたよ、もう！#n戻ればいいんでしょう？"
10026065-48 = "そ、それでは戻りますが……何かあれば、いつでも連絡を……。"
10026065-53 = "……ふふっ♡"
10026065-54 = "[s] \"ありがとう、ハナコ。\""
10026065-55 = "あら、何のことでしょう？"
10026065-56 = "それでは私たちも戻りましょうか、コハルちゃん？"
10026065-57 = "え、えっ……？あ、う……うん……。"
10026065-62 = "[ns3] \"誤魔化すには大きすぎたね。\"\n[ns4] \"後でハナコにお礼を言わないと。\""
10026065-65 = "あ、あはは……そうですね。#nウイさんにも、トリニティに戻ったら謝ろうと思います。"
10026065-66 = "……これで、良かったのでしょうか？"
10026065-67 = "その……悪気がないとはいえ、隠し事をしてしまったのには変わりありませんし……"
10026065-68 = "シスターとして、許されぬことを……"
10026065-69 = "[s5] \"大丈夫、私も共犯だから。\"\n[s6] \"秘密ができちゃったね。\""
10026065-75 = "……ふふ。ありがとうございます、先生。"
10026065-76 = "そう言っていただいて、心が軽くなりました。"
10026065-77 = "では、お言葉に甘えて……"
10026065-81 = "私たちだけの秘密ですね。"
10026065-83 = "（その後、ヒナタと荷物番をしながら少し休憩をとった）"
