[translation]
10026065-7 = "Ufa..."
10026065-8 = "Não foi tão difícil quanto eu pensava! Com isso, não atrapalharei mais vocês..."
10026065-9 = "Sensei, você não parece estar bem..."
10026065-10 = "V-você se machucou!? #nEu deveria ter bloqueado tudo... não pode ser!"
10026065-11 = "...Ah, não foi um ferimento? Ufa... que alívio..."
10026065-12 = "Se o Sensei tivesse se machucado, eu não saberia como encarar as outras."
10026065-19 = "Ué, que passos são esses...?"
10026065-20 = "O-o que aconteceu!? Eu ouvi sons de explosão..."
10026065-21 = "S-Sensei...! E a Hinata também...!"
10026065-23 = "Parece que vocês dois estão bem. Como eu suspeitava, aquele som de agora há pouco..."
10026065-24 = "Bem... s-som?"
10026065-25 = "B-bem... é que... sabe como é...!"
10026065-26 = "...Ah."
10026065-27 = "N-não aconteceu nada! #nPessoal, por que estão aqui?"
10026065-28 = "Vocês deveriam estar investigando, não deveriam...? #nNão é hora para ficarmos parados aqui..."
10026065-29 = "...O que isso significa? #nMesmo lá dentro, ouvimos dezenas de estrondos..."
10026065-30 = "Quer dizer que não pode me contar...?"
10026065-31 = "[s1] \"Não aconteceu nada mesmo!\"\n[s2] \"Ui, continuem a investigação sem se preocupar!\""
10026065-34 = "...? O que quer dizer com isso..."
10026065-38 = "...Fufu, entendo."
10026065-39 = "Parece que foi apenas impressão nossa. #nVamos voltar e continuar com o trabalho?"
10026065-40 = "......????????"
10026065-41 = "Hanako, por que você mudou de repente? #nSerá que você está planejando alguma coisa..."
10026065-42 = "Ora, ora, o Sensei não disse que não foi nada? ♪ #nSe acontecer algo, entraremos em contato. Vamos, voltem para a investigação."
10026065-43 = "Não, espere... antes disso, não deveríamos confirmar se realmente não aconteceu nada—"
10026065-45 = "Ko-ze-ki-senpai?"
10026065-46 = "I-iiih...!"
10026065-47 = "T-tá bom, eu já entendi! #nÉ só voltar, né?"
10026065-48 = "E-então estamos voltando, mas... se precisar de algo, entre em contato..."
10026065-53 = "...Fufu♡"
10026065-54 = "[s] \"Obrigado, Hanako.\""
10026065-55 = "Ora, do que está falando?"
10026065-56 = "Então, vamos voltar também, Koharu-chan?"
10026065-57 = "Eh, eh...? Ah, hum... tá..."
10026065-62 = "[ns3] \"Foi barulhento demais para esconder.\"\n[ns4] \"Preciso agradecer à Hanako depois.\""
10026065-65 = "Ah, ahaha... é verdade. #nQuando voltarmos para Trinity, vou pedir desculpas à Ui também."
10026065-66 = "...Será que isso foi o certo a se fazer?"
10026065-67 = "Digo... mesmo que não tenha sido por mal, ainda assim escondemos a verdade..."
10026065-68 = "Como uma irmã, algo que não deveria ser perdoado..."
10026065-69 = "[s5] \"Está tudo bem, eu também sou cúmplice.\"\n[s6] \"Agora temos um segredo.\""
10026065-75 = "...Fufu. Obrigada, Sensei."
10026065-76 = "Ouvir isso me deixou mais aliviada."
10026065-77 = "Então, aceitarei suas palavras..."
10026065-81 = "É um segredo só nosso."
10026065-83 = "(Depois disso, tirei um tempo para descansar enquanto vigiava a bagagem com a Hinata)"
