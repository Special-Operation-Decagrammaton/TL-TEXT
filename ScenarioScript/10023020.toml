[translation]
10023020-1 = "Episódio 2: Vamos começar a \"limpeza\""
10023020-2 = "（Chegou a hora marcada com a Momoi e as outras...）"
10023020-3 = "（Ao olhar ao redor...）"
10023020-4 = "Ei, Sensei!"
10023020-5 = "[s] \"Olá, Momo...i...?\""
10023020-6 = "Tcharam! É um uniforme de empregada!"
10023020-7 = "O que achou? É fofo, né?"
10023020-8 = "Combina comigo, não combina?"
10023020-9 = "Então, pode soltar o verbo e me dizer o que achou!"
10023020-10 = "[s1] \"Ah, ah... Eu acho que...\"\n[s2] \"Eu nasci para este dia...!\""
10023020-11 = "S-sério...? Ehe, ehehe. #nFico até um pouco envergonhada quando você elogia tanto assim."
10023020-12 = "S-sério...? Ehe, ehehe. #nFico até um pouco envergonhada quando você elogia tanto assim."
10023020-13 = "Haa, haa...! Irmã, não saia correndo assim de repente! #nAlém disso, você estava reclamando o tempo todo que era difícil de se mover com isso... o que aconteceu?"
10023020-14 = "Fufun! É que eu queria que o Sensei visse logo!"
10023020-15 = "Desculpe pela demora, Sensei."
10023020-16 = "[s] \"Não se preocupe. Midori, você também está fofa, combina muito com você.\""
10023020-17 = "V-você acha...? #nAh, obrigada. Ehehe..."
10023020-18 = "Vem, Yuzu, venha também!"
10023020-19 = "Ah, s-sim..."
10023020-20 = "O que... você acha, Sensei? #nUuu... essa saia não está rodada demais...?"
10023020-21 = "[s] \"Combina muito com você, Yuzu... está incrível!\""
10023020-22 = "S-Sensei!?"
10023020-23 = "Ah, i-isso...! Auuu!"
10023020-28 = "Agora é a vez da Alice!"
10023020-29 = "......Ué? Cadê a Alice?"
10023020-30 = "Alice-chan? O que houve?"
10023020-32 = "Ainda é cedo demais para a Alice usar isso! O uniforme de empregada... o uniforme de empregada..."
10023020-33 = "É o uniforme da Neru-senpai! Não serve para a Alice!"
10023020-35 = "Poxa... eu tentei convencer ela de todo jeito para vir até aqui..."
10023020-36 = "A Alice-chan está assim faz um tempo..."
10023020-37 = "[s] \"Ainda é cedo demais para um uniforme de empregada...?\""
10023020-38 = "É que... ela diz que ainda não consegue se mover como o pessoal da C&C..."
10023020-39 = "Por isso, ela parece estar relutante em vestir..."
10023020-40 = "Alice, não existe essa de cedo ou tarde para usar uma roupa! #nNada começa se você não tentar!"
10023020-42 = "Mas, a Alice..."
10023020-43 = "[s3] \"Todo herói sempre enfrentou desafios sem medo.\"\n[s4] \"Então, Alice, que tal dar um passo à frente e continuar sua aventura?\""
10023020-44 = "Uuu... é verdade, mas..."
10023020-45 = "Uuu... é verdade, mas..."
10023020-46 = "......Entendido."
10023020-47 = "――A Alice é uma heroína, afinal!"
10023020-50 = "Uwaa..."
10023020-51 = "Será que realmente combina comigo...!"
10023020-52 = "[s] \"Sim, combina muito! Está tudo bem!\""
10023020-53 = "......"
10023020-54 = "A Alice continua sendo a Alice...?"
10023020-55 = "Mesmo vestindo um uniforme de empregada...?"
10023020-58 = "Com certeza!"
10023020-62 = "Pessoal... muito obrigada."
10023020-66 = "Não importa a aparência, a Alice continua sendo a Alice...! "
10023020-68 = "Alice, viu só como você consegue quando tenta!"
10023020-70 = "Você foi ótima, Alice."
10023020-72 = "Alice... você se esforçou muito..."
10023020-76 = "[ns] \"Você se esforçou muito, Alice.\""
10023020-79 = "(Todos aplaudiram a Alice)"
10023020-80 = "(E assim, o Clube de Desenvolvimento de Jogos teve seu final feliz—)"
10023020-82 = "(—ou melhor, ainda era cedo demais para isso!)"
10023020-84 = "[ns] \"Falando nisso, o codinome de todas é 00, né?\""
10023020-85 = "O uniforme de empregada que o Sensei pegou emprestado, pelo tamanho, só serviu o da Neru-senpai."
10023020-86 = "Os da Yuzu e da Alice parecem ser reservas de tamanhos diferentes da Neru-senpai. #nPorque tinha um bilhete dizendo: \"Por favor, usem estes quando crescerem\"."
10023020-90 = "O reserva de tamanho diferente, como a Midori disse, até serviu em mim, mas..."
10023020-91 = "O resto ficou tudo largo demais! #nEspecialmente o uniforme da Karin-senpai, era enorme!"
10023020-92 = "Bom, mas agora estamos prontas! #nFufu, o Sensei também viu todas nós de uniforme de empregada!"
10023020-93 = "Sim! O início da aventura!"
10023020-94 = "Mesmo que o Sensei esteja vindo com a gente, será que vai dar certo..."
10023020-95 = "Uuu... quero voltar para o meu armário..."
10023020-97 = "(E assim, a aventura (?) das heroínas começou—)"
10023020-99 = "..."
10023020-100 = "..."
10023020-104 = "..."
10023020-105 = "？"
10023020-109 = "[ns] \"...É uma mansão maior do que eu imaginava.\""
10023020-110 = "N-não seria melhor recusar agora mesmo!?"
10023020-111 = "...Depois de termos chegado até aqui?"
10023020-118 = "Ué, Yuzu? #n...Yuzu!?"
10023020-124 = "Sejam bem-vindas. Estávamos esperando por vocês."
10023020-125 = "Fico grato por terem vindo exatamente no horário combinado..."
10023020-127 = "(Midori... olha, é aquela pessoa ali)"
10023020-128 = "V-você é... hum, o cliente...?"
10023020-133 = "[ns5] \"Ouvi dizer que era um trabalho de 'limpeza'...\"\n[ns6] \"Poderia nos dar os detalhes?\""
10023020-134 = "Entendo, querem ir direto ao ponto. #nPeço mil desculpas por interromper sua agenda lotada."
10023020-135 = "Entendo, querem ir direto ao ponto. #nPeço mil desculpas por interromper sua agenda lotada."
10023020-136 = "Eu trabalho como negociante de arte... gerencio itens comprados de colecionadores e os coloco em circulação novamente através de leilões, fazendo o chamado mercado secundário."
10023020-137 = "E, no próximo leilão, uma obra muito valiosa será exibida... #nPor isso, gostaria de pedir a escolta dos participantes e a segurança das obras de arte."
10023020-138 = "E-espera um pouco!? #nNós ouvimos que o trabalho era de \"limpeza\"...!?"
10023020-139 = "Como eu disse, eu mencionei \"limpeza\". Mas a \"limpeza\" na C&C se refere às atividades como agentes, não é? \"Pequena Tirana\"... ou melhor, a líder da C&C, Neru Mikamo."
10023020-140 = "(E-era isso mesmo!?)"
10023020-141 = "(Como eu ia saber disso, irmã!?)"
10023020-142 = "(O-o que eu faço...!? O que eu faço, o que eu faço, o que eu faço...!)"
10023020-143 = "(Calma, por enquanto! ...Temos que superar essa situação agora!)"
10023020-144 = "S-sim! De fato, é exatamente isso!"
10023020-145 = "[s] \"Se tivesse nos dado os detalhes antes, poderíamos ter nos preparado melhor...\""
10023020-147 = "Peço desculpas por esse ponto. #nMas, as integrantes da C&C são agentes secretas..."
10023020-148 = "Achei que falar sobre assuntos delicados em público poderia causar mal-entendidos desnecessários. #nE julguei que seria difícil encontrar um momento para conversar dentro do prazo limitado."
10023020-149 = "De qualquer forma... agradeço por terem se dado ao trabalho de vir até a mansão. #nJá que nos encontramos assim, deve ser obra do destino..."
10023020-150 = "Tenho um pequeno pedido: gostaria de ver com meus próprios olhos a habilidade da C&C, da qual tanto ouvi falar."
10023020-153 = "!!!"
10023020-155 = "Dizem que as integrantes da C&C possuem habilidades especiais em suas respectivas áreas."
10023020-156 = "Claro, não seria tão ousado a ponto de pedir que mostrem tudo. #nAfinal, o verdadeiro talento de vocês só é demonstrado no local da \"limpeza\"..."
10023020-157 = "Mas não vejo problema em ver uma pequena amostra dessa habilidade."
10023020-158 = "(Vamos contar a verdade logo, irmã!)"
10023020-159 = "(Espere, Midori! Se fizermos isso, a Neru-senpai vai acabar com a gente! Eles acham que somos da C&C, lembra!?)"
10023020-160 = "(Então você está dizendo que nós mesmas podemos resolver esse pedido...!?)"
10023020-161 = "(Exatamente. Vamos resolver isso com as nossas próprias forças.)"
10023020-165 = "Muito bem, quem de vocês irá me mostrar primeiro?"
10023020-171 = "Aris, entendi! Isso é um evento de mudança de classe!#nAris vai mudar de classe para empregada da C&C!"
10023020-172 = "Aris-chan!?"
10023020-173 = "Aris!?"
10023020-174 = "A classe da Aris é..."
10023020-181 = "..."
10023020-187 = "..."
10023020-194 = "...!"
10023020-199 = "...!!!"
10023020-212 = "O papel da Aris hoje é... atacante de alvo único do tipo luz..."
10023020-213 = "Aris vai atirar naquela pequena rocha que está longe agora!"
10023020-214 = "Haaaaaa...!"
10023020-215 = "Luz!"
10023020-217 = "(BOOOOM!)"
10023020-219 = "O-Oh...! Uma rocha tão pequena e tão distante, com apenas um golpe...!"
10023020-220 = "Essa é a habilidade da lendária atiradora que nunca erra o alvo...!"
10023020-221 = "A propósito, ouvi dizer que atiradores não devem se destacar para não revelar sua posição, mas...?"
10023020-222 = "T-Tudo bem! Podemos neutralizar o alvo de longe com um único disparo!"
10023020-223 = "I-Isso mesmo! Se não houver testemunhas, não há problema nenhum!"
10023020-224 = "Hum... se as senhoritas da C&C dizem isso..."
10023020-225 = "Por enquanto, obrigado. #nEstou curioso sobre as funções das outras também..."
10023020-226 = "E quanto a você, que está quieta desde agora...?"
10023020-230 = "Hii!?"
10023020-233 = "(O que eu faço, o que eu faço, o que eu faço, o que eu faço...!)"
10023020-234 = "(Yuzu, calma! Pense no que você pode fazer!)"
10023020-235 = "(A Yuzu-chan costuma se esconder no armário, se eu puder usar isso...)"
10023020-236 = "(...Já sei!)"
10023020-237 = "(O-O quê!?)"
10023020-238 = "(Venha aqui!)"
10023020-240 = "Hum... disseram que levaria alguns minutos para se preparar e saíram, mas... onde vocês foram parar?"
10023020-244 = "...Hm?"
10023020-247 = "Essa caixa não estava aqui até agora... #nNão parece ter nenhum mecanismo especial. Senhoritas da C&C...?"
10023020-262 = "Não se mova, por favor..."
10023020-263 = "Uooooh!?"
10023020-265 = "Ora, ora, você me surpreendeu. #nNunca imaginei que conseguiria apagar sua presença e surgir atrás de mim."
10023020-266 = "Falando nisso... ouvi dizer que na C&C existe uma infiltrada com uma sorte incrível, que aparece na frente de todos sem que percebam."
10023020-267 = "Deve ser muito difícil realizar missões com um corpo pequeno. #nNão... na verdade, deve ser exatamente isso que você usa para se infiltrar."
10023020-268 = "S-Sim... é... isso mesmo..."
10023020-269 = "Então, a próxima... vejamos. #nOuvi dizer que existe uma estrategista que analisa o campo de batalha com calma e lidera a todas..."
10023020-270 = "Seria você?"
10023020-271 = "Sim? Ah... sim. #nEu sou a estrategista..."
10023020-272 = "E resta apenas..."
10023020-273 = "..."
10023020-274 = "..."
10023020-275 = "O-O quê! Se tem algo a dizer, diga logo!"
10023020-276 = "Não, peço perdão."
10023020-278 = "\"Pequena Tirana\" — sua presença faz jus à fama, estou verdadeiramente impressionado."
10023020-279 = "O-o que você quer dizer com isso!?"
10023020-281 = "[ns7] \"Para uma mansão deste tamanho...\"\n[ns8] \"Deveria haver um sistema de segurança... por que solicitaram a C&C...?\""
10023020-284 = "De fato, o sistema de segurança da mansão é impecável."
10023020-285 = "No entanto, a razão pela qual contatamos vocês da C&C é..."
10023020-289 = "Porque recebemos uma carta de aviso—#ndaquele \"Ladrão Fantasma da Benevolência\"...!"
10023020-294 = "...\"Ladrão Fantasma da Benevolência\"?"
