[translation]
10023020-1 = "第2話;「お掃除」を始めましょう"
10023020-2 = "（モモイたちと約束をした時間になり……）"
10023020-3 = "（周囲に視線を向けると――）"
10023020-4 = "やっほー、先生！"
10023020-5 = "[s] \"こんにちは、モモ……イ……？\""
10023020-6 = "じゃーん、メイド服だよ！"
10023020-7 = "どう、どう？可愛いよね？"
10023020-8 = "似合うでしょ？"
10023020-9 = "では、はりきって感想をどうぞ！"
10023020-10 = "[s1] \"あ、ああ……私はきっと……\"\n[s2] \"この日のために生まれてきたんだね……！\""
10023020-11 = "ほ、本当……？えへっ、えへへ。#nそんなに喜ばれると……ちょっと、照れるかも。"
10023020-12 = "ほ、本当……？えへっ、えへへ。#nそんなに喜ばれると……ちょっと、照れるかも。"
10023020-13 = "はあ、はあ……！もう、お姉ちゃん、急に走らないで！#nそれに、さっきまで動きにくいって、散々文句を言ってたのに……どうしたの？"
10023020-14 = "ふっふーん！先生に早く見てもらおうと思って！"
10023020-15 = "お待たせしてしまってすみません、先生。"
10023020-16 = "[s] \"気にしないで。ミドリも可愛いね、よく似合ってる。"
10023020-17 = "そ、そう……ですか？#nあ、ありがとうございます。えへへ……"
10023020-18 = "ほら、ユズもおいで！"
10023020-19 = "あっ、う、うん……"
10023020-20 = "どう……でしょう、先生？#nうぅ……このスカート、ひらひらしすぎじゃ……？"
10023020-21 = "[s] \"とても似合っているよ、ユズ……最高だよ！\""
10023020-22 = "せ、先生！？"
10023020-23 = "あ、そ、その……！あうう！"
10023020-28 = "次はアリス！"
10023020-29 = "……って、あれ？アリスは？"
10023020-30 = "アリスちゃん？どうしたの？"
10023020-32 = "やっぱりアリスにはまだ早いです！メイド服……メイド服は……"
10023020-33 = "ネル先輩の服です！アリスには無理です！"
10023020-35 = "あちゃ……なんとか説得して、ここまで来てくれたんだけど……"
10023020-36 = "アリスちゃん、ずっとこんな調子で……"
10023020-37 = "[s] \"メイド服はまだ早い……？\""
10023020-38 = "その……C&Cの皆さんのような動きが、まだできないから、と……"
10023020-39 = "だから、自分で着るのは抵抗があるみたいで……"
10023020-40 = "アリス、衣装を着るのに早いも遅いもないんだよ！#n着てみないと何も始まらないんだから！"
10023020-42 = "ですが、アリスは……"
10023020-43 = "[s3] \"どんな勇者も、恐れずに挑戦してきたよね。\"\n[s4] \"だから、アリスも一歩踏み出して、冒険を進めてみよう？\""
10023020-44 = "うぅ……たしかに、そうですが……"
10023020-45 = "うぅ……たしかに、そうですが……"
10023020-46 = "……分かりました。"
10023020-47 = "――アリスは、勇者ですから！"
10023020-50 = "うわぁーん……"
10023020-51 = "本当に、似合っているのでしょうか……！"
10023020-52 = "[s] \"うん、とっても似合ってるよ！大丈夫！\""
10023020-53 = "……"
10023020-54 = "アリスはアリス、ですか……？"
10023020-55 = "メイド服を、着ていても……？"
10023020-58 = "もちろん！"
10023020-62 = "みんな……ありがとう、ございます。"
10023020-66 = "どんな姿でも、アリスはアリスなんですね……！"
10023020-68 = "アリス、やればできるじゃん！"
10023020-70 = "偉いよ、アリスちゃん。"
10023020-72 = "アリスちゃん……頑張ったね……"
10023020-76 = "[ns] \"よく頑張ったね、アリス。\""
10023020-79 = "（みんなでアリスに拍手を送った）"
10023020-80 = "（そうしてゲーム開発部はハッピーエンドを迎え――）"
10023020-82 = "（――るにはまだ早かった！）"
10023020-84 = "[ns] \"そういえば、全員コールサインはダブルオーなんだね。\""
10023020-85 = "先生が借りてきてくれたメイド服、サイズ的にネル先輩のしか合わなかったんだ。"
10023020-86 = "ユズちゃんとアリスちゃんの分は、ネル先輩のサイズ違いの予備みたいです。#n「背が伸びたら、こちらをお使いください」というメモが挟まっていたので。"
10023020-90 = "サイズ違いの予備は、ミドリが言った通り、わたしでも着られましたが……"
10023020-91 = "あとは全部、ブカブカでした！#n特にカリン先輩のメイド服は、ものすごく大きかったです！"
10023020-92 = "まぁでも、これで準備は万端だね！#nふふっ、みんなのメイド服姿も先生にちゃんと見てもらったし！"
10023020-93 = "はい！冒険の始まりです！"
10023020-94 = "先生がついてきてくださるとはいえ、大丈夫かな……"
10023020-95 = "うぅ……ロッカーに帰りたい……"
10023020-97 = "（そうして、勇者たちの冒険（？）が始まった――）"
10023020-99 = "……"
10023020-100 = "……"
10023020-104 = "……"
10023020-105 = "？"
10023020-109 = "[ns] \"……想像以上に大きなお屋敷だね。\""
10023020-110 = "い、今からでも断った方が良いんじゃないかな！？"
10023020-111 = "……ここまで来たのに？"
10023020-118 = "えっ、ユズちゃん？#n……ユズちゃん！？"
10023020-124 = "ようこそ、皆様。お待ちしておりました。"
10023020-125 = "約束の刻限通りにお越しいただけるとは……感謝申し上げます。"
10023020-127 = "（ミドリ……ほら、この人だよ）"
10023020-128 = "あ、あなたが……その、依頼主さんですか……？"
10023020-133 = "[ns5] \"「お掃除」の依頼だと伺いましたが……\"\n[ns6] \"詳細を教えていただけますか？\""
10023020-134 = "なるほど、早速本題に入ってほしい、と。#nお忙しい中、これはこれは大変失礼を。"
10023020-135 = "なるほど、早速本題に入ってほしい、と。#nお忙しい中、これはこれは大変失礼を。"
10023020-136 = "私は美術商を営んでおりまして……コレクターから買い取った品を管理し、オークションを通して再度流通させる、[ruby=いわゆる]所謂[/ruby]セカンダリーをしております。"
10023020-137 = "そこで、次のオークションに、とても貴重な作品が並ぶ予定でして……#n参加者の護衛と美術品の警備をお願いしたく。"
10023020-138 = "ちょ、ちょっと待って！？#n私たちは「お掃除」の仕事って聞いたんだけど……！？"
10023020-139 = "仰る通り、私は「お掃除」と申しました。ですがC&Cにおける「お掃除」とは、エージェントとしての活動を指す――そうでしょう？「リトルタイラント」――いえ、C&Cのリーダー、[ruby=みかも]美甘[/ruby]ネル様。"
10023020-140 = "（そ、そうだったの！？）"
10023020-141 = "（私が知ってるわけないでしょ、お姉ちゃん！）"
10023020-142 = "（ど、どうしよう……！？どうしよう、どうしよう、どうしよう……！）"
10023020-143 = "（とりあえず落ち着いて！……今はこの状況を乗り切らないと！）"
10023020-144 = "は、はい！たしかに、その通りではありますが！"
10023020-145 = "[s] \"事前に詳細を教えてくだされば、まだこちらの準備も……\""
10023020-147 = "その点に関しては、失礼いたしました。#nですが、C&Cの皆様は、秘密エージェント……"
10023020-148 = "公衆の面前で込み入った話をしては、余計な誤解を招くのでは無いか、と。#n限られた期間で、話し合いの場を設けるのも難しいと判断した次第です。"
10023020-149 = "ともあれ……屋敷までご足労いただき感謝いたします。#nこうして私たちが出会えたのも何かの縁ではございますし……"
10023020-150 = "ほんのお願いなのですが、噂に聞くC&Cの実力を直接お目にかかりたく存じます。"
10023020-153 = "！！！"
10023020-155 = "なんでも、C&Cの皆様は、それぞれの分野で特別な実力をお持ちとか。"
10023020-156 = "もちろん、全てを披露してほしいなどと、図々しいことは申しません。#n皆様の本当の実力は、「お掃除」の現場でこそ発揮されるものでしょうから……"
10023020-157 = "しかし、その実力の一端を見せていただく分には問題ないかと。"
10023020-158 = "（やっぱり本当の事を話そうよ、お姉ちゃん！）"
10023020-159 = "（待って、ミドリ！そんな事したらネル先輩に殺されちゃう！今の私たちはC&Cだと思われてるんだよ！？）"
10023020-160 = "（じゃあ、私たちで依頼をなんとかできるっていうの……！？）"
10023020-161 = "（そうだよ。ここは、私たちの力で何とかしよう）"
10023020-165 = "さて、どなたからお見せいただけるのでしょう？"
10023020-171 = "アリス、分かりました！これは転職イベントですね！#nアリスはC&Cのメイドにジョブチェンジします！"
10023020-172 = "アリスちゃん！？"
10023020-173 = "アリス！？"
10023020-174 = "アリスのクラスは……"
10023020-181 = "……"
10023020-187 = "……"
10023020-194 = "……！"
10023020-199 = "……！！！"
10023020-212 = "今日のアリスの役割は……光属性の単体アタッカー……"
10023020-213 = "アリスは、今から遠くに見えるあの小さな岩を狙撃します！"
10023020-214 = "ハアアアァッッ……！"
10023020-215 = "光よ！"
10023020-217 = "（ドカアアァァン！）"
10023020-219 = "お、おお……！あんなにも遠くの小さな岩を、一撃で……！"
10023020-220 = "これが噂に聞く、どんな標的も必ず命中させる狙撃手の実力……！"
10023020-221 = "ところで狙撃手とは、位置がバレないよう目立ってはいけないと聞きましたが……？"
10023020-222 = "だ、大丈夫です！遠くから一撃で制圧できますから！"
10023020-223 = "そ、そう！目撃者が居なければ何も問題なし！"
10023020-224 = "ふうむ……C&Cの方がそう仰るのなら……"
10023020-225 = "ひとまず、ありがとうございました。#n他の方の担当も気になるのですが……"
10023020-226 = "そちらの先ほどから静かにしている方は……？"
10023020-230 = "ひっ！？"
10023020-233 = "（どうしよう、どうしよう、どうしよう、どうしよう……！）"
10023020-234 = "（ユズ、大丈夫！ユズにできる事を考えよう！）"
10023020-235 = "（ユズちゃんは普段、ロッカーに隠れてるから、それを活かせたら……）"
10023020-236 = "（……そうだ！）"
10023020-237 = "（な、なに！？）"
10023020-238 = "（こっちきて！）"
10023020-240 = "ふむ……準備に数分かかるとの事で席を外しておりましたが……皆様は一体どちらに？"
10023020-244 = "……ん？"
10023020-247 = "こんな箱、先ほどまで無かったはずですが……#n何か仕掛けがあるようにも見えませんね。C&Cの皆様……？"
10023020-262 = "動かないで、ください……"
10023020-263 = "うおおおっ！？"
10023020-265 = "これはこれは、驚かされました。#nまさか気配を消して私の背後をとるとは。"
10023020-266 = "そういえば……C&Cにはものすごい強運の持ち主で、いつの間にやら目の前に現れる潜入員が居ると聞いたことも。"
10023020-267 = "小さな体で任務をこなすのは、さぞかし大変でしょう。#nいや……むしろ、それを潜入に活かしている、という事なのでしょうね。"
10023020-268 = "は、はいぃ……そう、です……"
10023020-269 = "では次……そうですね。#n冷静に戦況を把握し、皆をまとめる参謀が居るとも聞いておりますが……"
10023020-270 = "それは、貴女の事でしょうか？"
10023020-271 = "はい？えっと……はい。#n私が、参謀……"
10023020-272 = "そして残るは……"
10023020-273 = "……"
10023020-274 = "……"
10023020-275 = "な、なに！言いたい事があるなら早く言って！"
10023020-276 = "いえ、失礼。"
10023020-278 = "「リトルタイラント」――噂に違わぬその風格、改めて感服いたしました。"
10023020-279 = "ど、どういうことーー！？"
10023020-281 = "[ns7] \"この規模の屋敷であれば……\"\n[ns8] \"防犯システムがあるはずですが……なぜC&Cに依頼を……？\""
10023020-284 = "たしかに、屋敷の防犯システムは万全です。"
10023020-285 = "ですが、それでもC&Cの皆様にご連絡差し上げたのは……"
10023020-289 = "予告状が届いたからです――#nあの「慈愛の怪盗」から……！"
10023020-294 = "……「慈愛の怪盗」？"
