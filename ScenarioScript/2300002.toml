[translation]
2300002-1 = "Doces no lugar do almoço"
2300002-2 = "Schale - Escritório"
2300002-4 = "（Ao retornar do trabalho externo, encontrei uma pilha de documentos sobre a mesa do escritório da Schale）"
2300002-5 = "（No fim das contas, comecei a organizar os documentos na mesa sem nem conseguir almoçar）"
2300002-8 = "Sensei, você está aí?"
2300002-12 = "Ah, olá, Sensei!"
2300002-13 = "Você parecia ocupado da última vez, está tudo bem?"
2300002-14 = "[s1] \"Ahaha, bem, de alguma forma...\"\n[s2] Fico olhando para a mesa sem conseguir dizer nada."
2300002-15 = "Uau, isso tudo são documentos de trabalho...?"
2300002-16 = "Uau, isso tudo são documentos de trabalho...?"
2300002-17 = "Ser adulto deve ser difícil..."
2300002-18 = "Ah, é verdade! Sensei, você já almoçou?"
2300002-19 = "Ainda não? Que bom que o timing foi perfeito."
2300002-20 = "Fufufu..."
2300002-21 = "Eu estava preparada para algo assim, então comprei doces para você, Sensei!"
2300002-22 = "Justo hoje, lançaram os novos produtos da \"Café Mille-Feuille\"!"
2300002-23 = "Eu queria comer com você, então acabei comprando vários."
2300002-25 = "Tcharam!"
2300002-26 = "（Da bolsa da Airi, vários cupcakes de formatos diferentes começaram a transbordar）"
2300002-27 = "Estes são os novos cupcakes!"
2300002-28 = "O que achou? Parecem deliciosos, não parecem?"
2300002-29 = "Sim, aqui está! Este é de sabor framboesa!"
2300002-30 = "Eu experimentei um pouquinho na degustação e estava maravilhoso!"
2300002-31 = "Esse equilíbrio agridoce da framboesa é algo que não se encontra em qualquer lugar...!"
2300002-33 = "E este aqui é de banana!"
2300002-34 = "Não tinha degustação deste, mas achei as cores tão fofas que acabei comprando!"
2300002-35 = "E tem este também...!"
2300002-37 = "Sabor chocolate com menta!"
2300002-38 = "Este não é um lançamento, já estava no cardápio há algum tempo, mas..."
2300002-39 = "É o meu favorito! Assim que bati o olho, não resisti e quis comer."
2300002-40 = "A doçura do chocolate com a refrescância da menta é irresistível...!"
2300002-41 = "Ahhh..."
2300002-42 = "[s3] \"...Airi?\"\n[s4] \"Você viajou para outro mundo? Está tudo bem?\""
2300002-43 = "......Ah!?"
2300002-44 = "......Ah!?"
2300002-45 = "Ahahahaha... desculpe, eu acabei me perdendo nos pensamentos..."
2300002-46 = "Bem, então, por qual você quer começar?"
2300002-48 = "（Depois disso, enquanto comia os cupcakes com a Airi, ela me explicou sobre cada um dos sabores）"
2300002-49 = "（Decidi recarregar as energias hoje e deixar para lidar com a pilha de documentos em outro momento）"
