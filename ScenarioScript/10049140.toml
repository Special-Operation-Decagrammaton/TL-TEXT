[translation]
10049140-1 = "Epílogo parte 4; O nascimento da executiva do mal"
10049140-2 = "[log]3 dias atrás[/log]"
10049140-4 = "Esta aqui, com esta."
10049140-5 = "Esta aqui... fica aqui."
10049140-6 = "Ufa... com isso, a organização dos livros restaurados está concluída por enquanto."
10049140-7 = "Este lugar é confortável a esta hora porque não tem ninguém, mas..."
10049140-8 = "Bem, hora de voltar para a biblioteca..."
10049140-9 = "Garota mágica... executiva do mal..."
10049140-10 = "A garota mágica protege a paz do mundo..."
10049140-11 = "Hii—"
10049140-12 = "Hieee..."
10049140-16 = "A executiva do mal é a vilã..."
10049140-17 = "(O que é isso... é a Shimiko?)"
10049140-18 = "(O que ela está fazendo a esta hora... a organização dos livros doados não deveria ter terminado?)"
10049140-19 = "A executiva do mal... condena a garota mágica..."
10049140-20 = "!?"
10049140-21 = "(C-condena...? Executiva do mal...?)"
10049140-22 = "(O que aconteceu com a Shimiko...?)"
10049140-23 = "(O melhor seria deixar esse tipo de coisa para lá, mas...)"
10049140-24 = "(Sendo a Shimiko... acho que vou observar um pouco mais...)"
10049140-28 = "(Um carrinho cheio de mangás...?)"
10049140-29 = "(A Shimiko já deve ter lido quase todos os livros... por que agora?)"
10049140-30 = "(E, por baixo, tem pelo menos 200 volumes...)"
10049140-34 = "...Murmúrios."
10049140-35 = "Murmúrios... murmúrios..."
10049140-36 = "(O olhar dela está assustador...!)"
10049140-37 = "(Ela não leva nem um minuto para terminar um volume...)"
10049140-38 = "(Eu sabia que ela conseguia ler rápido, mas... não imaginava que fosse tanto.)"
10049140-39 = "(Os livros que ela trouxe... são todos sobre garotas mágicas...? É o interesse recente dela...?)"
10049140-41 = "...Murmúrios... vou explodir... esta cidade inteira..."
10049140-42 = "...Muito bem."
10049140-46 = "(Muito bem!? O que!?)"
10049140-47 = "(...Olhando bem, tem outras coisas além de mangás de garotas mágicas...)"
10049140-48 = "('Psicologia do Crime Moderno'... 'Técnicas de Agitação de Massas'... 'Prática de Confecção de Roupas Nível 2'...!?)"
10049140-49 = "(Qual será o critério dela...?)"
10049140-53 = "(No fim, acabei vigiando até ela terminar de ler tudo...)"
10049140-54 = "(Agora ela vai para... a sala audiovisual?)"
10049140-55 = "(Tantos animes de garotas mágicas...)"
10049140-56 = "(Quando se trata de vídeo, não dá para ler rápido como nos livros, né...?)"
10049140-61 = "(Ah, começou.)"
10049140-62 = "(Bem... vou dar um jeito nisso.)"
10049140-63 = "(Talvez tenha sido uma descoberta nova ver a Shimiko interessada nesse tipo de obra.)"
10049140-64 = "(Hora de voltar para a biblioteca...)"
10049140-68 = "?"
10049140-69 = "(...Velocidade acelerada?)"
10049140-74 = "Hie..."
10049140-75 = "(Q-o que...? Por que está acelerando cada vez mais...?)"
10049140-82 = "(30 vezes a velocidade!?)"
10049140-83 = "(Isso não é normal!?)"
10049140-84 = "(Um episódio inteiro em apenas 50 segundos...)"
10049140-85 = "（O conteúdo não entra na minha cabeça de jeito nenhum...）"
10049140-86 = "（E ainda por cima, o piscar da tela está fazendo meus olhos...）"
10049140-87 = "（Vou voltar para casa e perguntar amanhã...）"
10049140-92 = "……。"
10049140-93 = "……。"
10049140-95 = "……。"
10049140-96 = "Já é de manhã... No fim das contas, fiquei tão preocupada que não consegui dormir nada..."
10049140-97 = "Será que a Shimiko já foi embora?"
10049140-98 = "……Preciso verificar."
10049140-100 = "……。"
10049140-101 = "（Ela ainda está aqui!?）"
10049140-102 = "（Por 8 horas, o tempo todo...?）"
10049140-103 = "（Passou a noite em claro assistindo a quase 600 episódios!?）"
10049140-104 = "（O-o que eu deveria fazer...）"
10049140-105 = "Hmph, é só isso?"
10049140-106 = "（Shimiko!?）"
10049140-107 = "Finalmente, chegou a hora de obter o véu da escuridão."
10049140-108 = "（Escuridão...? O-o que ela disse?）"
10049140-110 = "0"
10049140-112 = "（Não dá para deixar passar disso... Eu não queria me intrometer, mas...!）"
10049140-113 = "（Tenho que parar a Shimiko. Depois pergunto o que está acontecendo.）"
10049140-114 = "（Não tenho escolha, mesmo que eu tenha que fazê-la desmaiar...）"
10049140-117 = "（O que é isso agora...?）"
10049140-118 = "（Aquilo é... uma cortina blackout e um piso vinílico preto?）"
10049140-119 = "（O que ela está fazendo com os materiais de reparo da biblioteca...?）"
10049140-120 = "（Será que... ela passou a noite fazendo trabalhos de reparo...?）"
10049140-121 = "（Não é como se ela tivesse assistido anime a noite toda...）"
10049140-122 = "（Bem, se for isso... então eu também...）"
10049140-126 = "（Ela... cortou com uma tesoura?）"
10049140-127 = "Hã?"
10049140-128 = "（Ela cortou a cortina e o piso... e está costurando...?）"
10049140-132 = "？？？"
10049140-137 = "（A-aquilo é...!）"
10049140-140 = "（Não, sério, o que é isso!?）"
10049140-141 = "（A-a Shimiko não faria uma coisa dessas...）"
10049140-142 = "（Isso, com certeza a Shimiko só está tendo um pesadelo.）"
10049140-143 = "（Eu realmente preciso acordá-la...）"
10049140-147 = "Eek—"
10049140-148 = "Quem está aí!!"
10049140-150 = "Aaaah!!!"
10049140-156 = "……。"
10049140-157 = "Hmm... será que eu deveria projetar mais a voz?"
10049140-158 = "Se eu for uma executiva do mal..."
10049140-159 = "Ahem... ah, ah!"
10049140-160 = "QUEM ESTÁ AÍ!!!"
