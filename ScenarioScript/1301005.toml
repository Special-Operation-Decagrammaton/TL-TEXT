[translation]
1301005-1 = "人間計算機"
1301005-2 = "シャーレ・執務室"
1301005-3 = "先生、お話は伺いました。先週、チンピラたちの武器庫を制圧して、備品を色々と回収されたそうですね？"
1301005-4 = "武器庫を丸ごと奪われた形ですし、チンピラたちもしばらくは暴れられないでしょう。お疲れ様でした。"
1301005-5 = "……どうしてそんなに暗い表情をされてるのですか？回収した備品に、何か問題でも？"
1301005-6 = "え？備品に問題はないけど、在庫リストに問題が？それはどういうことです？"
1301005-7 = "[s] 回収した備品の在庫リストをユウカに渡す。"
1301005-8 = "どれどれ……戦車用ガソリンが200ガロン、TNTが600ポンド、0.3インチの弾丸が……。"
1301005-9 = "古い武器だからか、ほとんどがトリニティ総合学園で過去使われていたような、昔の単位で記載されてますね。"
1301005-10 = "回収した備品の単位が今の単位と一致してないから、帳簿が整理できない……？"
1301005-11 = "その上、在庫リストが手書きで作成されてるからパソコンで処理ができない……ですか？"
1301005-12 = "なんだ、単純な計算仕事じゃないですか。これぐらい、暗算でもそれほど時間かかりませんよ。"
1301005-13 = "これぐらいの量でしたら、30分もあれば終わりそうですが……。"
1301005-14 = "ん？信じられないようでしたら、一度やって見せましょうか？"
1301005-15 = "それでは、ちょっと待っていてくださいね。"
1301005-17 = "終わりました。現在の標準規格単位に合わせた上で、在庫リストもあらためて全部整理してあります。"
1301005-18 = "正確に割り切れない場合は、誤差の範囲内になる形で四捨五入しましたので、下に付けておいた注釈を参照してください。"
1301005-19 = "[s] \"本当にたったの30分で、あの長いリストを……。\""
1301005-20 = "ふふっ。私の実力、ようやくお分かりになりましたか？"
1301005-21 = "どれほど複雑な数式でも、ミレニアムの会計である私の手に掛かれば一瞬で処理できてしまうんですよ。"
1301005-22 = "[s] \"じゃあもしかして、これも整理できる？\""
1301005-23 = "この書類は……もしかして……！？"
1301005-24 = "先生っっ！！この書類、連邦生徒会に提出しなくちゃいけないシャーレの定期報告書じゃないですか！"
1301005-25 = "しかも、3か月分も溜めて！"
1301005-26 = "いくら私が計算が得意だからって、やりたくない面倒な仕事を人に押し付けるのはダメです！これは先生がご自分で処理してください！"
1301005-28 = "……そんな目で見つめても、ダメなものはダメです！"
1301005-30 = "……。"
1301005-31 = "……はあ、仕方ないですね。#n本当に少し、お手伝いするだけですよ？"
1301005-32 = "こうやって何度も先生を甘やかすのは、良くないのですが……。"
1301005-33 = "先生も遊んでいないで、早く他の書類から整理してください。……ほら、ペンが止まってますよ！"
1301005-35 = "その後、ユウカと仲良く帳簿を整理したりした。"
