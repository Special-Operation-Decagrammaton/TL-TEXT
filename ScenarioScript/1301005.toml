[translation]
1301005-1 = "Calculadora Humana"
1301005-2 = "Schale - Escritório"
1301005-3 = "Sensei, ouvi falar sobre o ocorrido. Soube que você dominou o arsenal daqueles delinquentes na semana passada e recuperou vários suprimentos, não foi?"
1301005-4 = "Basicamente, você tomou o arsenal inteiro deles, então eles não devem causar problemas por um bom tempo. Bom trabalho."
1301005-5 = "……Por que você está com essa expressão tão sombria? Há algum problema com os suprimentos que você recuperou?"
1301005-6 = "Hã? Os suprimentos não têm problemas, mas a lista de inventário tem? O que você quer dizer com isso?"
1301005-7 = "[s] Entrega a lista de inventário dos suprimentos recuperados para Yuuka."
1301005-8 = "Deixe-me ver…… 200 galões de gasolina para tanques, 600 libras de TNT, munição de 0,3 polegadas……."
1301005-9 = "Talvez por serem armas antigas, a maioria está registrada em unidades de medida obsoletas, como as que eram usadas na Academia Trinity antigamente."
1301005-10 = "Então, como as unidades dos suprimentos recuperados não coincidem com as atuais, você não consegue organizar o registro……?"
1301005-11 = "Além disso, como a lista de inventário foi feita à mão, não dá para processar no computador…… é isso?"
1301005-12 = "Ora, isso é apenas um trabalho simples de cálculo. Não levaria muito tempo nem mesmo fazendo de cabeça."
1301005-13 = "Com essa quantidade, acho que terminaria em uns 30 minutos……."
1301005-14 = "Hm? Se não acredita, quer que eu demonstre?"
1301005-15 = "Então, espere um pouco, por favor."
1301005-17 = "Terminei. Ajustei tudo para as unidades padrão atuais e organizei a lista de inventário inteira novamente."
1301005-18 = "Nos casos em que não era possível dividir exatamente, fiz o arredondamento dentro da margem de erro, então consulte as notas que deixei abaixo."
1301005-19 = "[s] \"Você realmente organizou aquela lista enorme em apenas 30 minutos…….\""
1301005-20 = "Fufu. Finalmente percebeu do que sou capaz?"
1301005-21 = "Não importa quão complexa seja a equação, se cair nas mãos de mim, a contadora do Millennium, eu resolvo em um instante."
1301005-22 = "[s] \"Então, por acaso, você consegue organizar isto também?\""
1301005-23 = "Este documento é…… não pode ser……!?"
1301005-24 = "Sensei!! Este documento não é o relatório periódico do Schale que precisa ser enviado ao Conselho Estudantil Geral?!"
1301005-25 = "E ainda por cima, acumulou três meses de relatórios!"
1301005-26 = "Não importa o quanto eu seja boa com cálculos, não é certo empurrar um trabalho chato que você não quer fazer para os outros! Você mesmo deve cuidar disso, sensei!"
1301005-28 = "……Não adianta me olhar desse jeito, o que é não, é não!"
1301005-30 = "……."
1301005-31 = "……Ah, não tem jeito. #nEu só vou ajudar um pouquinho, está bem?"
1301005-32 = "Não é bom ficar mimando o sensei desse jeito, mas……."
1301005-33 = "Sensei, pare de brincar e organize logo os outros documentos. ……Ei, sua caneta parou!"
1301005-35 = "Depois disso, passei um tempo organizando os registros junto com a Yuuka."
