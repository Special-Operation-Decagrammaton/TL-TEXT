[translation]
10030060-1 = "第6話;ココロのチキンスープ"
10030060-4 = "……鍋、沸騰してきた。"
10030060-5 = "いい匂いがします……"
10030060-7 = "これ何？いつの間に準備してたの？"
10030060-8 = "スープだけ先にね。少し時間がかかるから。"
10030060-9 = "どれどれ……っと。"
10030060-15 = "あれ？鍋に昆布とキノコしか入ってない。"
10030060-16 = "さっき持ってきた物に、鶏肉も入ってなかった？"
10030060-17 = "もう少し待って。まだ肉の番じゃない。"
10030060-22 = "出汁をとる間に手羽先と鶏肉を一口サイズに切ったら、串に刺す……"
10030060-26 = "そしたら肉の皮をカリッとなるまで焼いて――"
10030060-28 = "火、強くない？このままじゃ焦げそうだけど……。"
10030060-29 = "大丈夫。皮だけサッと焼けばいいから。"
10030060-30 = "皮の脂を溶かし終えたら、そのまま鍋に入れて出汁にうまみを足す。"
10030060-31 = "肉の旨みが取れた頃に野菜を入れて、もうひと煮立ちさせれば完成。 "
10030060-32 = "[s1] \"鶏肉と野菜の透き通ったスープの鍋……\"\n[s2] \"水炊き、かな？\""
10030060-35 = "そう、正解。"
10030060-36 = "水炊き……？"
10030060-37 = "鶏肉をメインにした、野菜と煮込んで作る鍋料理だよ。"
10030060-38 = "前にD.U.外郭にある通信社に訪問したんだけど、偶然食べることがあって。それで気に入ってひとりでも作って食べるようになったんだ。"
10030060-39 = "普段外に出ないみんなが慣れない山登りをしたら絶対疲れるでしょ？それに、寒いからみんなとキャンプをするなら、温かいスープがあったらいいかなと思って。"
10030060-40 = "たしかにちょっと寒くなってきたし……スープで温まりたくなるかも。チヒロ先輩、ナイス！"
10030060-42 = "本当に良い匂い……"
10030060-43 = "……何だかお腹が空いてきました。"
10030060-50 = "野菜に火が通ったみたいだし……そろそろ食べよっか。"
10030060-67 = "まずはスープから。その後、鶏肉をどうぞ。"
10030060-71 = "はぁ……あったまる……"
10030060-72 = "外で食べているからか、いつもより美味しく感じる気がします……"
10030060-73 = "この手羽、噛めば嚙むほど肉汁が溢れて、おいしい……！！"
10030060-74 = "[s] \"すごく美味しい！チヒロは料理上手なんだね。\""
10030060-75 = "ふふっ、みんな気に入ってくれたみたいで良かった。"
10030060-76 = "実は外で作るのは初めてだから、ちょっと不安だったんだけど。"
10030060-77 = "学校近くの専門店で食べるよりもおいしいかも……。"
10030060-78 = "それはちょっと大袈裟。でも、口にあったみたいならよかった。"
10030060-82 = "それじゃ、具材もよそうね。#n豆腐にキノコ、ニンジン、っと……"
10030060-83 = "あははっ！これ見て！このちょっと大きさが揃ってないニンジン、コタマ先輩が切ったやつじゃない？"
10030060-84 = "うっ……わ、私じゃありません。"
10030060-85 = "私が切ったのは、こっちの可愛い星型の……"
10030060-86 = "ふふ、味は悪くないよ。野菜にスープがよく染みてる。"
10030060-87 = "[s] \"冷えた身体が温まるね。\""
10030060-91 = "あれ？もう無くなっちゃった？"
10030060-92 = "気づいたらスープだけに……"
10030060-93 = "お腹は満たされましたが……少し寂しく思います。"
10030060-95 = "大丈夫、まだ最後の食材が残ってるよ。"
10030060-101 = "食材？野菜はさっき入れたのが全部だよね？"
10030060-105 = "うん。でも、まだまだスープは残ってるから……#n最後はうどんで締めないとね。"
10030060-106 = "あっ……締めのうどん！"
10030060-107 = "それに今日は大晦日だし、年越しうどんってことで。"
10030060-108 = "年越しそばを食べないのも、ちょっと寂しいでしょ？"
10030060-109 = "コレならうどんと合うから、ちょうどいいと思って。"
10030060-111 = "そういえば、去年は年越しそばを食べてないような……"
10030060-112 = "いつも大晦日は、食事をする余裕がありませんでした。"
10030060-113 = "「東の平原地帯」で戦ってると、ご飯を食べてる暇なんて無いんだよね……"
10030060-115 = "あんた達は本当に、相変わらずなんだから……"
10030060-119 = "……もう良さそうだね、伸びる前に食べよっか。"
10030060-126 = "……ん～、これもすっごく美味しい！"
10030060-128 = "まさか外で、こんなに美味しい料理を食べられるとは思わなかった。"
10030060-129 = "お腹以外のところまで満たされた気がします……"
10030060-130 = "[s] \"やっぱり締めはうどんだよね！\""
10030060-132 = "あ、食べ終わったらカップをちょうだい。ゴミはまとめちゃうから。"
10030060-133 = "匂いに釣られて動物が寄ってくるかもしれないから、すぐに片付けないと。"
10030060-137 = "……やっぱり食後もゆっくりはできないかぁ。"
10030060-138 = "このまま時間が止まったらいいのに……"
10030060-140 = "それはダメ！ネットも無い場所でずっと過ごすなんて無理！"
10030060-148 = "（みんなと締めのうどんまで食べて、楽しい夕食の時間を過ごした）"
10030060-155 = "（後片付けを終えて、たき火の前でぼーっとしていると……）"
10030060-162 = "先生……？"
10030060-168 = "まだ起きてたんだね。"
10030060-169 = "[s3] \"あ、ハレ。\"\n[s4] \"ハレも起きてたんだね。\""
10030060-172 = "うん。テントに戻ってから横になったんだけど……"
10030060-173 = "何だか眠れなくて。"
10030060-174 = "マキは「いつもと枕が違うから寝れない」って言ってたのに、すぐ寝落ちしてた。"
10030060-175 = "久しぶりの外出で疲れてたんじゃないかな。"
10030060-176 = "……そういえば、他のみんなを見てない？"
10030060-177 = "[s] \"明日も早いから、チヒロはテントに戻るって言ってたよ。\""
10030060-183 = "[ns] \"……もう一人は、すぐそこに。\""
10030060-188 = "ぎくっ……"
10030060-189 = "[s] \"コタマ、そろそろ出ておいで。\""
10030060-191 = "ぐ……バレないと思ったのですが。"
10030060-196 = "……コタマ先輩？いつからそこに居たの？"
10030060-197 = "……かなり前から。"
10030060-198 = "ここに隠れていれば、先生とハレの内緒話を聴けるのではないかと思い……"
10030060-199 = "どんな期待を……！？"
10030060-203 = "[ns5] \"遅い時間だからコーヒーはアレだけど……\"\n[ns6] \"今日はココアでもどうかな？\""
10030060-208 = "うん、飲みたい。"
10030060-209 = "私も頂きます。"
10030060-213 = "寒いからかな、いつもより甘く感じる。"
10030060-214 = "疲れた身体に染み渡る糖分は格別ですね。"
10030060-215 = "うん、今日は大変だったからね……"
10030060-216 = "[s] \"二人とも、キャンプはどうだった？\""
10030060-217 = "んー、どうだろう。"
10030060-218 = "色々あったけど、一言で言えば……"
10030060-222 = "……あんまりだったかな。"
10030060-224 = "疲れました……"
10030060-225 = "[s] \"即答！？\""
10030060-227 = "だって、寝る場所の準備も料理も大変で……"
10030060-228 = "それに寒いし……椅子は硬いし……"
10030060-229 = "ネットも繋がらず……電子機器も使えない……"
10030060-230 = "今日は一日中、エナドリを飲めなかったし……"
10030060-231 = "あ……でも、さっき食べたスープは美味しかったです。"
10030060-232 = "たしかに美味しかったけど……"
10030060-233 = "準備だけじゃなくて片付けもあるって考えたら、それだけのためにキャンプは……"
10030060-234 = "ヴェリタスが求めるのは真理であって、美食ではありませんから。"
10030060-235 = "[s7] \"やっぱり、合う合わないはあるよね。\"\n[s8] \"休日の過ごし方は人それぞれだもんね。\""
10030060-240 = "でも……"
10030060-245 = "思ってたより、悪くなかった。"
10030060-246 = "いつもより刺激が少ないからか、目の前の時間に集中できた。"
10030060-247 = "年越しの花火も、街を埋め尽くす人混みの映像も見られなかったけど……"
10030060-248 = "静かな環境で過ごしたからこそ、1年の終わりをじっくり振り返れたと思う。"
10030060-253 = "……1年、終わっちゃった。"
10030060-255 = "鐘の音もカウントダウンも聞こえない年越し……ちょっと不思議ですね。"
10030060-259 = "あけましておめでとう、先生。"
10030060-260 = "今年もよろしくお願いします、先生。"
10030060-261 = "[s] \"あけましておめでとう。私の方こそ、今年もよろしくね。\""
10030060-265 = "……ふあぁ。"
10030060-266 = "それじゃあ私たちは先に戻るね、先生。"
10030060-267 = "初日の出を見に行く前に、少しでも寝ておかないと。"
10030060-268 = "先生も、ゆっくり休んでください。"
10030060-269 = "[s] \"うん、おやすみ。\""
10030060-275 = "（たき火が消えるまで炎を見守ってから、テントに戻り仮眠を取った）"
