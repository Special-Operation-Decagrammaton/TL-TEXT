[translation]
10030060-1 = "Episódio 6: Sopa de galinha para a alma"
10030060-4 = "……A panela começou a ferver."
10030060-5 = "Que cheiro bom……"
10030060-7 = "O que é isso? Quando você preparou tudo isso?"
10030060-8 = "Só o caldo por enquanto. Vai levar um tempinho."
10030060-9 = "Vejamos…… pronto."
10030060-15 = "Ué? Só tem alga e cogumelos na panela."
10030060-16 = "A carne de frango que trouxemos não estava no que você pegou?"
10030060-17 = "Espere um pouco. Ainda não é a vez da carne."
10030060-22 = "Enquanto o caldo cozinha, corto as asas e o peito de frango em pedaços pequenos e coloco nos espetos……"
10030060-26 = "Depois, douro a pele da carne até ficar crocante――"
10030060-28 = "O fogo não está muito alto? Vai acabar queimando desse jeito……"
10030060-29 = "Está tudo bem. Só preciso dourar a pele rapidamente."
10030060-30 = "Depois que a gordura da pele derreter, coloco direto na panela para dar mais sabor ao caldo."
10030060-31 = "Quando o sabor da carne estiver no caldo, adiciono os vegetais e deixo ferver mais um pouco. Pronto."
10030060-32 = "[s1] \"Uma panela de sopa clara de frango com vegetais……\"\n[s2] \"É um Mizutaki, não é?\""
10030060-35 = "Isso, acertou."
10030060-36 = "Mizutaki……?"
10030060-37 = "É um prato cozido feito com frango como ingrediente principal e vegetais."
10030060-38 = "Visitei uma agência de notícias nos arredores de D.U. um tempo atrás e acabei provando por acaso. Gostei tanto que comecei a fazer para comer sozinha."
10030060-39 = "Vocês que não costumam sair, devem ficar exaustas depois de uma trilha, né? E como está frio, pensei que seria bom ter uma sopa quentinha para o nosso acampamento."
10030060-40 = "Realmente, começou a esfriar um pouco…… uma sopa para aquecer seria ótimo. Mandou bem, Chihiro-senpai!"
10030060-42 = "Que cheiro maravilhoso……"
10030060-43 = "……Sinto que estou ficando com fome."
10030060-50 = "Parece que os vegetais já cozinharam…… vamos comer?"
10030060-67 = "Primeiro, tomem o caldo. Depois, podem pegar o frango."
10030060-71 = "Ah…… que quentinho……"
10030060-72 = "Talvez por estarmos comendo ao ar livre, sinto que está mais gostoso que o normal……"
10030060-73 = "Essa asa de frango, quanto mais mastigo, mais suculenta fica, que delícia……!!"
10030060-74 = "[s] \"Muito bom! Você é ótima na cozinha, Chihiro.\""
10030060-75 = "Fufu, fico feliz que tenham gostado."
10030060-76 = "Na verdade, é a primeira vez que cozinho ao ar livre, então estava um pouco preocupada."
10030060-77 = "Talvez esteja até melhor do que o que comemos no restaurante perto da escola……"
10030060-78 = "Aí você exagerou. Mas fico feliz que tenha agradado ao seu paladar."
10030060-82 = "Então, vou servir os ingredientes. #nTofu, cogumelos, cenoura, pronto……"
10030060-83 = "Ahaha! Olhem só! Essa cenoura que não está cortada do mesmo tamanho, não foi a Kotama-senpai que cortou?"
10030060-84 = "Ugh…… n-não fui eu."
10030060-85 = "O que eu cortei foram essas em formato de estrela, bem fofas……"
10030060-86 = "Fufu, o sabor não está ruim. O caldo pegou bem nos vegetais."
10030060-87 = "[s] \"Isso aquece o corpo que estava gelado.\""
10030060-91 = "Ué? Já acabou?"
10030060-92 = "Quando vi, só sobrou o caldo……"
10030060-93 = "Já estou satisfeita, mas…… sinto um pouco de tristeza."
10030060-95 = "Está tudo bem, ainda temos o ingrediente final."
10030060-101 = "Ingrediente? Os vegetais que colocamos antes não eram todos?"
10030060-105 = "Sim. Mas ainda sobrou bastante caldo…… #npara finalizar, precisamos de um udon."
10030060-106 = "Ah…… o udon de encerramento!"
10030060-107 = "E como hoje é véspera de Ano Novo, vamos considerar como um udon de passagem de ano."
10030060-108 = "Seria meio triste não comer nada para celebrar a virada, né?"
10030060-109 = "Achei que combinaria perfeitamente com o udon."
10030060-111 = "Falando nisso, acho que não comi o macarrão da virada no ano passado..."
10030060-112 = "Na véspera de Ano Novo, nunca tive tempo para fazer uma refeição com calma."
10030060-113 = "Quando estamos lutando nas \"Planícies do Leste\", não sobra tempo nem para comer..."
10030060-115 = "Vocês realmente não mudam nunca..."
10030060-119 = "……Acho que já está bom, vamos comer antes que fique mole."
10030060-126 = "……Hmm, isso também está muito gostoso!"
10030060-128 = "Nunca imaginei que pudesse comer uma comida tão boa ao ar livre."
10030060-129 = "Sinto que não apenas minha barriga, mas tudo em mim foi preenchido..."
10030060-130 = "[s] \"Nada melhor do que um udon para encerrar, não é!\""
10030060-132 = "Ah, me dê o copo quando terminar. Vou juntar o lixo."
10030060-133 = "Animais podem ser atraídos pelo cheiro, então precisamos limpar logo."
10030060-137 = "……Pelo visto, nem depois de comer podemos descansar, né."
10030060-138 = "Queria que o tempo parasse aqui mesmo..."
10030060-140 = "Isso nem pensar! Não conseguiria passar o tempo todo em um lugar sem internet!"
10030060-148 = "（Comi o udon de encerramento com todas e tivemos um jantar muito divertido）"
10030060-155 = "（Depois de terminar a limpeza, fiquei olhando para a fogueira, distraída...）"
10030060-162 = "Sensei...?"
10030060-168 = "Você ainda estava acordado."
10030060-169 = "[s3] \"Ah, Hare.\"\n[s4] \"Você também estava acordada, Hare.\""
10030060-172 = "Sim. Eu até me deitei quando voltei para a barraca, mas..."
10030060-173 = "Não consegui dormir de jeito nenhum."
10030060-174 = "A Maki disse que \"não conseguia dormir porque o travesseiro era diferente\", mas apagou na hora."
10030060-175 = "Acho que ela estava cansada por causa do passeio, já que faz tempo que não saímos."
10030060-176 = "……Falando nisso, você não viu as outras?"
10030060-177 = "[s] \"A Chihiro disse que ia voltar para a barraca porque amanhã o dia começa cedo.\""
10030060-183 = "[ns] \"……E a outra está bem ali.\""
10030060-188 = "Ai..."
10030060-189 = "[s] \"Kotama, pode sair daí.\""
10030060-191 = "Droga... achei que não seria descoberta."
10030060-196 = "……Kotama-senpai? Desde quando você estava aí?"
10030060-197 = "……Desde bem antes."
10030060-198 = "Pensei que, se ficasse escondida aqui, talvez conseguisse ouvir as conversas secretas do Sensei e da Hare..."
10030060-199 = "Que tipo de expectativa é essa...!?"
10030060-203 = "[ns5] \"Já está tarde, então café não é uma boa...\"\n[ns6] \"Que tal um chocolate quente hoje?\""
10030060-208 = "Sim, eu quero."
10030060-209 = "Eu também aceito."
10030060-213 = "Deve ser por causa do frio, parece mais doce que o normal."
10030060-214 = "Esse açúcar entrando no corpo cansado é algo especial."
10030060-215 = "Pois é, hoje foi um dia difícil, afinal..."
10030060-216 = "[s] \"Como foi o acampamento para vocês duas?\""
10030060-217 = "Hmm, o que dizer..."
10030060-218 = "Aconteceram várias coisas, mas em uma palavra..."
10030060-222 = "……Não foi lá essas coisas."
10030060-224 = "Estou exausta..."
10030060-225 = "[s] \"Resposta imediata!?\""
10030060-227 = "É que preparar o lugar para dormir e a comida foi muito trabalhoso..."
10030060-228 = "Além disso, está frio... e as cadeiras são duras..."
10030060-229 = "Não tem internet... e não dá para usar aparelhos eletrônicos..."
10030060-230 = "Hoje eu não consegui tomar energético o dia todo..."
10030060-231 = "Ah... mas a sopa que comemos agora pouco estava gostosa."
10030060-232 = "Com certeza estava delicioso, mas..."
10030060-233 = "Pensando que não é só a preparação, mas também a limpeza, acampar só por causa disso é..."
10030060-234 = "O que a Veritas busca é a verdade, não a gastronomia."
10030060-235 = "[s7] \"É, cada um tem o seu gosto, né?\"\n[s8] \"Afinal, cada um passa o feriado do seu jeito.\""
10030060-240 = "Mas..."
10030060-245 = "Foi menos pior do que eu pensava."
10030060-246 = "Talvez por ter menos estímulos que o habitual, consegui me concentrar no momento presente."
10030060-247 = "Não vi os fogos de artifício da virada, nem as imagens da multidão lotando a cidade, mas..."
10030060-248 = "Acho que foi justamente por passar em um ambiente silencioso que consegui refletir com calma sobre o fim do ano."
10030060-253 = "...O ano acabou."
10030060-255 = "Uma virada de ano sem ouvir o som dos sinos ou a contagem regressiva... é um pouco estranho, não é?"
10030060-259 = "Feliz ano novo, Sensei."
10030060-260 = "Conto com você este ano também, Sensei."
10030060-261 = "[s] \"Feliz ano novo. Eu que agradeço, conto com você também.\""
10030060-265 = "...Bocejo."
10030060-266 = "Então nós vamos voltar primeiro, Sensei."
10030060-267 = "Precisamos dormir um pouco antes de ir ver o primeiro nascer do sol do ano."
10030060-268 = "Sensei, descanse bem também."
10030060-269 = "[s] \"Sim, boa noite.\""
10030060-275 = "(Fiquei observando as chamas até a fogueira apagar, depois voltei para a barraca para tirar um cochilo)"
