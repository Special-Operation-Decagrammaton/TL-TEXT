[translation]
80000033-1 = "小さくても甘い一歩"
80000033-2 = "（バレンタインデー当日、ハスミから正義実現委員会の教室に寄ってほしいと連絡が来た）"
80000033-6 = "はい、どうぞ。開いてますので。"
80000033-7 = "[s] \"失礼しまーす……。\""
80000033-12 = "正義実現委員会・教室"
80000033-13 = "あっ、先生でしたか。早かったですね、ありがとうございます。"
80000033-14 = "[s] \"うん、急ぎめの用事がって聞いたから。\""
80000033-15 = "あぁ、確かにそう書いてしまいましたね……。"
80000033-16 = "[s] \"ハスミがそう言うのは珍しいなって思いつつ。\""
80000033-17 = "それは、その……実際緊急の問題かと言いますと、そうではないのですが……。"
80000033-18 = "……いえ、見方によっては十分に深刻で重大な事ではあるものの……。"
80000033-19 = "[s] \"……？\""
80000033-20 = "その、今日お呼びしたのはですね……。"
80000033-21 = "これです。"
80000033-25 = "[ns1] \"すごい量のチョコレート……。\"\n[ns2] \"この量、どうしたの……？\""
80000033-26 = "「正義実現委員会」宛のチョコレートです、トリニティの他の生徒たちからの。"
80000033-27 = "「正義実現委員会」宛のチョコレートです、トリニティの他の生徒たちからの。"
80000033-28 = "[s] \"こんなにたくさん……。\""
80000033-29 = "自分で言うのも少々恥ずかしいのですが……。"
80000033-30 = "日頃の正義実現委員会の活躍で助けられたからと、時々感謝のプレゼントが贈られてくることがあるのです。"
80000033-31 = "それが結構バレンタインに集約されることも多く……私個人の名前宛てで頂いたものだけを、選り分けた上でもこれです。"
80000033-32 = "[s] \"すごい人気だ……！\""
80000033-33 = "照れてしまいますね……"
80000033-34 = "確かに一緒に添えられた手紙に、尊敬や感謝の気持ちを書いてくださってはいましたが……。"
80000033-35 = "あくまで委員会としての役目であって、特に見返りを求めていたわけではないものの。"
80000033-36 = "こういった物を頂けるのは、純粋に嬉しいなと思います。"
80000033-37 = "[s] \"そうだね。ところで、急ぎの用事っていうのは……？\""
80000033-38 = "はい、ここからが本題です。こうしてお送りいただいたことは大変ありがたいのですが……。"
80000033-39 = "その、量が……。"
80000033-40 = "私ひとりでは少々無茶な量ですし、その、健康的にと言いましょうか、カロリーが……"
80000033-41 = "と、とにかく！まさか捨てるわけにもいきませんし、量が多いのでよろしければ先生もご一緒にということです。"
80000033-42 = "[s] \"それはちょっと……。\""
80000033-43 = "……え？"
80000033-47 = "あ、いえ、すみません。やはり突然無茶なお願いでしたでしょうか……。"
80000033-48 = "[s] \"あ、ううん。そういう意味じゃなくて……。\""
80000033-49 = "えっと……？"
80000033-50 = "[s3] \"これはみんなが、ハスミのために送ってくれたものだから。\"\n[s4] \"それを私が頂くわけにはいかないかなって。\""
80000033-51 = "な、なるほど……そういうことでしたか。"
80000033-52 = "な、なるほど……そういうことでしたか。"
80000033-53 = "確かに、私宛に送ってくださったわけですし……。"
80000033-54 = "そうですね、その通りかもしれません。"
80000033-55 = "ではやはり、このチョコレートの山は制覇させていただくとしましょう！"
80000033-56 = "それはもう、喜んで！ダイエット5日目ですが、もうそのようなことは言ってられません……！"
80000033-57 = "[s] （そう聞くと、それはそれで心配……）"
80000033-58 = "ふふっ……先生のおかげで、迷いは消えました。"
80000033-59 = "その、"
80000033-60 = "お礼というわけではありませんが……。"
80000033-65 = "[ns] \"これは……？\""
80000033-66 = "私から先生に、尊敬の気持ちを込めて。"
80000033-67 = "やや小さめではありますが、その分カロリーも控えめです。しかし、気持ちはこもっていますので。"
80000033-68 = "受け取っていただけますか？"
80000033-69 = "[s] \"ありがとう、美味しく頂くね。\""
80000033-70 = "はい。ではせっかくですし、ここで食べていかれませんか？"
80000033-75 = "（そうやってハスミと一緒に、ちょっとした贅沢なティータイムを過ごした）"
