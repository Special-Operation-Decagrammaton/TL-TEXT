[translation]
80000033-1 = "Um passo pequeno, mas doce"
80000033-2 = "（No dia de São Valentim, recebi uma mensagem de Hasumi pedindo para eu passar na sala do Comitê de Justiça）"
80000033-6 = "Sim, pode entrar. Está aberto."
80000033-7 = "[s] \"Com licença...\""
80000033-12 = "Sala do Comitê de Justiça"
80000033-13 = "Ah, era você, Sensei. Que rápido, obrigada."
80000033-14 = "[s] \"Sim, ouvi dizer que era um assunto urgente.\""
80000033-15 = "Ah, é verdade, eu escrevi isso mesmo..."
80000033-16 = "[s] \"Fiquei surpreso, já que não é comum a Hasumi dizer algo assim.\""
80000033-17 = "Bem, sobre isso... se é um problema de emergência real, na verdade não é..."
80000033-18 = "...Não, dependendo do ponto de vista, é algo bastante sério e importante, mas..."
80000033-19 = "[s] \"...?\""
80000033-20 = "Bem, eu chamei você hoje porque..."
80000033-21 = "É isto."
80000033-25 = "[ns1] \"Que quantidade enorme de chocolate...\"\n[ns2] \"Como você conseguiu tudo isso...?\""
80000033-26 = "São chocolates endereçados ao \"Comitê de Justiça\", enviados pelas outras alunas de Trinity."
80000033-27 = "São chocolates endereçados ao \"Comitê de Justiça\", enviados pelas outras alunas de Trinity."
80000033-28 = "[s] \"Tantos assim...\""
80000033-29 = "É um pouco embaraçoso dizer isso eu mesma..."
80000033-30 = "Como o Comitê de Justiça ajuda a todos no dia a dia, às vezes recebemos presentes de agradecimento."
80000033-31 = "E isso acaba se concentrando bastante no dia de São Valentim... Mesmo separando apenas os que foram endereçados pessoalmente a mim, ainda é essa quantidade."
80000033-32 = "[s] \"Você é muito popular...!\""
80000033-33 = "Isso me deixa sem jeito..."
80000033-34 = "É verdade que nas cartas que acompanhavam os presentes, elas escreveram palavras de respeito e gratidão..."
80000033-35 = "Embora seja apenas o meu dever como parte do comitê e eu não espere nada em troca."
80000033-36 = "Fico genuinamente feliz em receber essas coisas."
80000033-37 = "[s] \"Entendo. Mas, qual era o assunto urgente...?\""
80000033-38 = "Sim, aqui está o ponto principal. Sou muito grata por terem me enviado tudo isso, mas..."
80000033-39 = "A quantidade é..."
80000033-40 = "É um pouco impossível para mim comer tudo sozinha e, bem, pensando na saúde, ou melhor, nas calorias..."
80000033-41 = "E-enfim! Não posso simplesmente jogar fora, e como é muita coisa, pensei que talvez você pudesse me ajudar, Sensei."
80000033-42 = "[s] \"Isso é um pouco...\""
80000033-43 = "...Eh?"
80000033-47 = "Ah, não, me desculpe. Foi um pedido repentino e absurdo, não foi..."
80000033-48 = "[s] \"Ah, não, não é isso...\""
80000033-49 = "Hum...?"
80000033-50 = "[s3] \"É que todos enviaram isso para a Hasumi.\"\n[s4] \"Não acho que seria certo eu aceitar.\""
80000033-51 = "Ah, entendo... era isso."
80000033-52 = "Ah, entendo... era isso."
80000033-53 = "De fato, eles enviaram para mim..."
80000033-54 = "É verdade, você tem razão."
80000033-55 = "Então, vou encarar essa montanha de chocolates sozinha!"
80000033-56 = "Com muito prazer! Já estou no quinto dia de dieta, mas não dá mais para pensar nisso...!"
80000033-57 = "[s] （Ouvindo isso, fico preocupado...）"
80000033-58 = "Fufu... Graças a você, Sensei, minha hesitação desapareceu."
80000033-59 = "E, bem,"
80000033-60 = "Não é exatamente um agradecimento, mas..."
80000033-65 = "[ns] \"Isto é...?\""
80000033-66 = "De mim para você, Sensei, com todo o meu respeito."
80000033-67 = "É um pouco pequeno, mas por isso mesmo tem menos calorias. Ainda assim, coloquei todo o meu carinho nele."
80000033-68 = "Você poderia aceitar isto?"
80000033-69 = "[s] \"Obrigado, vou aproveitar bastante.\""
80000033-70 = "Sim. Já que estamos aqui, por que não aproveita para comer um pouco?"
80000033-75 = "（Dessa forma, passei um momento de luxo durante o chá com a Hasumi）"
