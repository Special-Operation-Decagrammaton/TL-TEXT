[translation]
51085-4 = "く、くそっ……！！"
51085-5 = "い、今に見てろよ百花繚乱め！！"
51085-14 = "ふんっ！私たちを甘くみるとこうなるんだから！"
51085-15 = "[s] \"みんな大丈夫？怪我は無い？\""
51085-16 = "わ、私は大丈夫です。カエデちゃんとツバキちゃんは……？"
51085-17 = "うん！全然平気！"
51085-18 = "私もだいじょうぶ～"
51085-20 = "ふふっ。身共も無事ですの！ "
51085-21 = "修行部の皆様の流れるような連携……すごかったです！ "
51085-22 = "そして――流石はレンゲ先輩！#n素晴らしいご活躍ですわ！"
51085-27 = "あれ？"
51085-31 = "…………ユカリ？"
51085-33 = "次回;[ruby=ふわ]不破[/ruby]レンゲ"
