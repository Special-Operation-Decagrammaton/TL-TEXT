[translation]
33240-1 = "Episódio 24: O ódio de quem"
33240-2 = "Ugh, ah..."
33240-3 = "Azusa..."
33240-7 = "Haah, haah, haah..."
33240-12 = "[ns] \"Azusa!\""
33240-13 = "Sensei..."
33240-16 = "..."
33240-17 = "Atsuko..."
33240-18 = "Cof! Princesa, por que você não fugiu..."
33240-19 = "Nós perdemos, Azusa."
33240-23 = "N-não, Princesa! Se você falar, ela vai..."
33240-24 = "Está tudo bem, já acabou tudo."
33240-25 = "Além disso, de qualquer forma, ela não pretendia me deixar viva. Então, está tudo bem."
33240-26 = "...?"
33240-27 = "Vamos parar com isso, Saori."
33240-28 = "...Parar?"
33240-29 = "Você quer dizer voltar para Arius...? Mesmo se voltarmos, só seremos mortas..."
33240-30 = "Então vamos fugir, juntas."
33240-31 = "Fugir..."
33240-32 = "Sim."
33240-33 = "A Azusa me ensinou."
33240-34 = "Isso que carregamos desde sempre... não é o nosso ódio."
33240-35 = "Nós aprendemos esse ódio. E desde então, acreditamos que ele era nosso."
33240-36 = "...A Azusa certamente percebeu isso, não foi?"
33240-37 = "..."
33240-38 = "A Azusa aprendeu muitas coisas e adquiriu várias experiências..."
33240-39 = "Você encontrou bons adultos, Azusa."
33240-40 = "E encontrou o lugar onde deveria estar..."
33240-41 = "Por isso, Saori."
33240-42 = "...Vamos fugir."
33240-43 = "Deste lugar, de Arius."
33240-44 = "Desse ódio que foi plantado em nós, que nem deveria ser nosso."
33240-45 = "Fugir, isso é tão..."
33240-48 = "Maravilhoso..."
33240-49 = "Inteligência e dignidade, cortesia e convicção, e a experiência e sabedoria cultivadas..."
33240-50 = "Como esperado, se for você..."
33240-51 = "Com certeza entenderá o meu \"Sublime\"...!"
33240-54 = "I-isso é..."
33240-55 = "...Não pode ser."
33240-56 = "Aquela \"doutrina\" foi completada...?"
33240-57 = "[s] (Isso é...)"
33240-58 = "Isso está em outro nível..."
33240-59 = "O que significa isso..."
33240-64 = "S-Sensei. Isso é..."
33240-65 = "Droga, precisamos fugir...!"
33240-66 = "[s] \"...Parece que isso é trapaça.\""
33240-67 = "Sensei...?"
33240-68 = "[ns1] \"Eu queria terminar sem precisar usar isso...\"\n[ns2] Saca o cartão de adulto."
33240-73 = "Oh, ohhhhh...!"
33240-74 = "Entendo, aquele é o tal \"cartão\"...!"
33240-75 = "Um poder obtido ao custo da vida e do tempo... algo tão misterioso que nem nós conseguimos compreender sua origem ou seus limites...!!"
33240-76 = "Ah, como será que Golconda chamaria isso... Ele certamente teria me ensinado alguma expressão de ordem superior..."
33240-77 = "Mostre-me, Sensei. O preço que você pagou..."
33240-78 = "E o brilho daquilo que você obteve através disso...!"
33240-83 = "Responda à minha obra com tudo o que você tem!"
