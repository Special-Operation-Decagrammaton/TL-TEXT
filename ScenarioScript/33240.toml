[translation]
33240-1 = "Episódio 24; De Quem é o Ódio"
33240-2 = "Ugh, guh..."
33240-3 = "Azu... sa..."
33240-7 = "*Haa, haa, haa*..."
33240-12 = "[ns] \"Azusa!\""
33240-13 = "Sensei..."
33240-16 = "......"
33240-17 = "Atsuko..."
33240-18 = "*Cof!* Princesa, por que você não fugiu..."
33240-19 = "Nós perdemos, Azusa."
33240-23 = "N-Não, Princesa! Se você falar, ela vai――"
33240-24 = "Está tudo bem, afinal, já acabou."
33240-25 = "Além disso, de qualquer forma, ela nunca teve a intenção de me deixar viver. Então, tudo bem."
33240-26 = "......?"
33240-27 = "Vamos parar com isso, Saori."
33240-28 = "...Parar?"
33240-29 = "Você quer dizer voltar para Arius...? Mesmo voltando, nós só seremos mortas..."
33240-30 = "Então vamos fugir, juntas."
33240-31 = "Fugir..."
33240-32 = "Sim."
33240-33 = "A Azusa me ensinou."
33240-34 = "Isto que carregamos desde não sei quando... não é o nosso ódio."
33240-35 = "Nós aprendemos esse ódio. E desde então, vivemos acreditando que ele era nosso."
33240-36 = "......A Azusa certamente percebeu isso, não é?"
33240-37 = "......"
33240-38 = "A Azusa aprendeu muitas coisas e ganhou várias experiências..."
33240-39 = "Você encontrou um bom adulto, não foi, Azusa."
33240-40 = "E encontrou o lugar onde deveria estar..."
33240-41 = "Então, Saori."
33240-42 = "......Vamos fugir."
33240-43 = "Deste lugar, de Arius."
33240-44 = "Desse ódio que foi plantado em nós sem percebermos, e que não deveria ser nosso."
33240-45 = "Fugir, isso é... impossível..."
33240-48 = "Maravilhoso..."
33240-49 = "Inteligência e dignidade, cortesia e crenças, além da experiência e sabedoria que foram cultivadas..."
33240-50 = "Como esperado, você..."
33240-51 = "...Com certeza compreenderá o meu 'Sublime'!"
33240-54 = "I-Isso é..."
33240-55 = "...Não pode ser."
33240-56 = "Aquele 'dogma'... foi concluído...?"
33240-57 = "[s] (Isto é...)"
33240-58 = "Isso está em outro nível..."
33240-59 = "O que significa isso..."
33240-64 = "S-Sensei. Isso é..."
33240-65 = "Merda, precisamos fugir...!"
33240-66 = "[s] \"...Ao que parece, isso é contra as regras.\""
33240-67 = "Sensei...?"
33240-68 = "[ns1] \"Eu queria que terminasse sem precisar usar isso...\"\n[ns2] Saca o Cartão Adulto."
33240-73 = "Oh, ohhhhh...!"
33240-74 = "Entendo, aquele é o tal 'cartão'...!"
33240-75 = "O poder que pode ser obtido usando a vida e o tempo como preço... algo misterioso cuja origem e limites nem nós conseguimos compreender...!!"
33240-76 = "Ah, como Golconda o chamaria... Será que ele teria me ensinado alguma expressão de ordem superior...?"
33240-77 = "Mostre-me, Sensei. O preço que você tem pago..."
33240-78 = "O brilho daquilo que você obteve assim...!"
33240-83 = "Responda à minha obra com todo o seu poder!"