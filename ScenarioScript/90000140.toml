[translation]
90000140-1 = "Episódio 15; Geleira (1)"
90000140-4 = "[ns] \"Chegamos...\""
90000140-8 = "Sim, chegamos."
90000140-9 = "A temperatura está baixa, mas felizmente não há vento, então não há problemas para operar.#nAinda é um frio suportável."
90000140-10 = "O que você está dizendo?#nEstá frio o suficiente, não acha? O mar está congelado!"
90000140-11 = "[s] \"Você está bem protegida contra o frio, Himari.\""
90000140-12 = "Sim. Para uma bela garota doente e pura como eu, o frio é o maior inimigo. Sim, é o meu arqui-inimigo."
90000140-13 = "Estou usando duas camadas do meu traje térmico modificado, então estou preparada.#nNão consigo me mover com muita agilidade, mas é melhor do que passar frio..."
90000140-14 = "Ei~"
90000140-20 = "Meu corpo parece um pouco mais leve que o normal. Talvez seja por causa do frescor."
90000140-30 = "Minha condição está excelente."
90000140-31 = "Eimi... pode parecer tarde para perguntar, mas você não sente que algo está estranho?"
90000140-32 = "Hm? Do que você está falando?"
90000140-41 = "Ah, sobre este visual?"
90000140-42 = "Foi o Sensei quem escolheu para mim. Não é legal?"
90000140-43 = "......Sensei......?"
90000140-44 = "Sensei?"
90000140-45 = "[s1] \"Explicar vai levar tempo, mas...\"\n[s2] \"Bem... é mais ou menos isso... eu acho.\""
90000140-48 = "......Entendo.#nBem, eu não me importo."
90000140-49 = "A felicidade dos meus companheiros é a minha felicidade. Aprendi que se o resultado é bom, tudo está bem."
90000140-50 = "......Entendo."
90000140-51 = "......Haa, bem, já que chegamos até aqui, não há o que fazer.#nVamos nos concentrar na missão."
90000140-52 = "Reiterando. Viemos até aqui rastreando o sinal do Decagrammaton.#nA missão é simples. Investigar este local minuciosamente e verificar se há anomalias."
90000140-53 = "Enquanto vocês duas vasculham os arredores, eu e o Sensei encontraremos um local seguro para estabelecer o acampamento base. Tudo bem?"
90000140-54 = "Entendido."
90000140-55 = "Sim, senhora."
