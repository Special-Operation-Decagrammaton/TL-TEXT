[translation]
13365-3 = "――今！"
13365-9 = "……っ！"
13365-10 = "何この熱さ！"
13365-13 = "先生、熱気は私が何とかします！"
13365-14 = "それよりも、「セトの憤怒」の様子が……急いでください！"
13365-18 = "[ns] ホシノに手を伸ばす。"
13365-21 = "……先生、どうだった？"
13365-22 = "[s] \"私じゃダメだ……！\""
13365-26 = "[ns1] \"[ruby=ひと]他人[/ruby]の死や苦しみは、そう簡単に理解できない……！\"\n[ns2] \"……たとえ、大人であっても！\""
13365-30 = "[ns] \"けど、みんなだったらきっと……！\""
13365-33 = "……これは、対策委員会にしかできない。"
13365-34 = "[ns] \"君もだよ、シロコ！\""
13365-38 = "ん、あなたもアビドスでしょ。#n一緒にホシノ先輩を助けて。"
13365-39 = "……覆面水着団の一員として。"
13365-45 = "そういう意味じゃないから！#nシロコ先輩が調子に乗るじゃない！"
13365-52 = "やっぱりこの人、シロコ先輩だわ……。"
13365-53 = "急いで！"
13365-58 = "[ns3] \"みんな、頼んだよ！\"\n[ns4] \"ホシノに、伝えよう！\""
13365-62 = "次回;伝えなければならないこと"
