[translation]
10016080-1 = "Episódio 8; Encontro casual"
10016080-2 = "（A situação agitada se acalma...）"
10016080-3 = "Haa, haa...#nConfirmo que o tanque... não, o robô de apoio foi desativado."
10016080-4 = "Destruí completamente as lagartas e o motor, então acho que ele não vai mais causar problemas."
10016080-8 = "Também garantimos a custódia dos alunos delinquentes que estavam fugindo."
10016080-9 = "Felizmente, não houve alunos que aproveitaram a confusão para iniciar um motim."
10016080-10 = "Os atletas também conseguiram evacuar em segurança.#nOs feridos foram levados para a base médica conjunta há pouco."
10016080-12 = "Pelo menos evitamos o pior cenário.#nBom trabalho a todos."
10016080-13 = "Embora faça parte do trabalho, nunca imaginei que lutaria lado a lado com alunos de outra escola..."
10016080-14 = "Alguma reclamação?"
10016080-15 = "Não... na verdade, é uma experiência rara, então é revigorante."
10016080-16 = "Eu já tinha uma noção da capacidade de Trinity, mas#na capacidade de processamento de dados de Millennium superou minhas expectativas."
10016080-17 = "Analisar instantaneamente os dados coletados no local e identificar os pontos fracos do oponente.#nComo esperado, os membros do conselho estudantil não estão para brincadeira."
10016080-18 = "E-eu não esperava ser elogiada tão de repente..."
10016080-20 = "Bem, o robô que causou a confusão também foi feito por Millennium."
10016080-21 = "Ugh... m-mas a tecnologia em si não tem culpa, certo?"
10016080-22 = "É verdade que a invenção do Clube de Engenharia tinha funções desnecessárias, mas#na culpa é de quem causou a confusão—"
10016080-23 = "C-calma, Yuuka-san.#nNão estou dizendo que a responsabilidade é de Millennium."
10016080-24 = "Cof, cof... analisar dados não é algo tão difícil assim.#nComo tesoureira do Seminar, isso é o mínimo que posso fazer."
10016080-25 = "Na verdade, fiquei surpresa com a precisão do tiro da vice-presidente Hasumi..."
10016080-26 = "Acertar o canhão em movimento sem nem usar a mira...#nQue tipo de técnica você usou?"
10016080-27 = "Bem... eu diria que foi intuição."
10016080-28 = "É um sentido que desenvolvi naturalmente enquanto trabalhava no Comitê de Justiça, então é difícil explicar com palavras..."
10016080-29 = "...Essa história de intuição me deixa curiosa."
10016080-30 = "Da próxima vez, você poderia deixar que eu filme seu tiro com os dispositivos de medição de Millennium?"
10016080-31 = "Sim, sem problemas."
10016080-32 = "[s] \"Bom trabalho a todos\""
10016080-33 = "Ah, Sensei. Obrigado pelo apoio."
10016080-34 = "[s1] \"Se quiserem, que tal irmos comer um parfait?\"\n[s2] \"Bom trabalho. Vou pagar algo para vocês nas barracas.\""
10016080-35 = "É uma oferta gentil, mas parece que a base médica conjunta está precisando de ajuda...#nVou ajudar no resgate dos feridos. Por favor, aproveitem sem mim."
10016080-36 = "É uma oferta gentil, mas parece que a base médica conjunta está precisando de ajuda...#nVou ajudar no resgate dos feridos. Por favor, aproveitem sem mim."
10016080-37 = "Eu também não estou com apetite agora... vou descansar um pouco na sala de descanso."
10016080-38 = "Eu vou para a sala de espera dos atletas de Gehenna.#nQuero verificar a condição da presidente Hina antes do revezamento final."
10016080-42 = "..."
10016080-43 = "[s] \"E você, Hasumi?\""
10016080-44 = "Parfait... parfait...#nE-eu também vou recusar."
10016080-45 = "Diferente das outras, não tenho nenhum compromisso, mas#npensei em dar uma volta pelo estádio para mudar de ares."
10016080-46 = "[s3] \"Então por que não participa de uma competição?\"\n[s4] \"Seria uma nova experiência e certamente seria divertido.\""
10016080-47 = "Eu... participar de uma competição?"
10016080-48 = "Eu... participar de uma competição?"
10016080-49 = "...Como eu disse antes, participar de competições não é o meu papel."
10016080-50 = "Para contribuir com a vitória de Trinity... e para garantir o sucesso do festival de hoje, é mais racional deixar isso para alunas com habilidades físicas superiores, como a Tsurugi."
10016080-51 = "Para mim, basta poder apoiar o esforço de vocês por trás."
10016080-52 = "[s] \"Mas...\""
10016080-53 = "Com licença, então."
10016080-60 = "Fufun! Aquele momento em que tirei o chapéu no final foi revigorante!"
10016080-61 = "Grrr... se eu não tivesse perdido o equilíbrio, eu teria vencido...!"
10016080-62 = "Na próxima eu vou vencer e ganhar o MVP!#nGuarde bem isso!"
10016080-63 = "Fufu, pode vir quando quiser!"
10016080-68 = "De alguma forma, todos parecem... muito felizes."
10016080-69 = "（Não, aproveitar é o natural. Afinal, hoje é um festival, e é uma ocasião especial）"
10016080-70 = "（O Sensei me disse para participar das competições também, mas...）"
10016080-71 = "（No entanto, eu não deveria estar me divertindo. Atrás da paz, sempre existe o trabalho de alguém）"
10016080-72 = "（Isso não está certo... Ainda falta tempo para o encerramento, é cedo demais para baixar a guarda）"
10016080-78 = "Ugh... O que vamos fazer? #nA final é logo agora, e a nossa chefe desmaiou com uma dor de barriga..."
10016080-79 = "Ai! Eu avisei que aquele takoyaki parecia suspeito!"
10016080-80 = "O vendedor disse que só colocou polvo comum, mas um polvo que se mexe daquele jeito mesmo depois de frito, não tem como ser normal!"
10016080-81 = "Brilha, brilha~ takoyaki~... redondinho~ takoyaki~..."
10016080-82 = "Talvez eu consiga escrever um haikai maravilhoso~."
10016080-83 = "S-será que existe algo que eu possa fazer...?"
10016080-84 = "Eu não tenho muitas amizades... O que faremos com o cavaleiro...?"
10016080-85 = "Hum, bem, somos quatro, mas..."
10016080-87 = "Aquela aluna ali... se não me engano, é de Hyakkiyako..."
10016080-88 = "É verdade, a próxima é a final da batalha de cavalaria. #nSe não me engano, é Hyakkiyako contra Millennium..."
10016080-89 = "No momento, Millennium está em primeiro lugar no geral, então se Hyakkiyako fizer uma boa luta aqui, #nseria de grande ajuda para frear a liderança isolada de Millennium..."
10016080-90 = "Então, que tal a Tsukuyo-dono assumir o lugar de cavaleira no lugar da chefe!"
10016080-91 = "I-isso é impossível..."
10016080-92 = "Se alguém como eu virar cavaleira, acho que o equilíbrio da cavalaria não vai ficar bom..."
10016080-93 = "Sendo assim, deixe a função de cavaleira com a Izuna!"
10016080-94 = "Hã!? Se for assim, agora é o meu braço que não vai alcançar!"
10016080-96 = "Polvo dentro do pote. #nSonhando com uma intoxicação alimentar..."
10016080-100 = "Pelo visto, Millennium vai ganhar..."
10016080-101 = "É uma pena, mas não é uma batalha de Trinity, então só nos resta observar..."
10016080-103 = "Ugh, será que não existe nenhuma boa ideia?"
10016080-104 = "Se a Izuna tivesse uma estratégia brilhante como a do estrategista Kai-bei, que aparece em 'Os 77 Ninjas Solitários Errantes'..."
10016080-105 = "Ugh... D-desculpe..."
10016080-106 = "Uma integrante inútil que só é grande e não serve para nada como eu ter sobrado..."
10016080-107 = "Só por eu ser alta... desculpe..."
10016080-112 = "――Por que a altura seria um problema?"
10016080-113 = "V-você é...?"
10016080-115 = "（E-ela é grande...!）"
10016080-116 = "Eu pretendia ficar apenas ouvindo, mas não posso deixar passar o que acabei de ouvir."
10016080-117 = "Pessoal, vocês conhecem as regras da batalha de cavalaria?"
10016080-118 = "Claro que sim!"
10016080-119 = "É uma competição onde três pessoas formam um cavalo, um cavaleiro monta em cima, e eles tentam roubar os chapéus uns dos outros, né."
10016080-120 = "Exatamente. A vitória na batalha de cavalaria é decidida por quem consegue roubar o chapéu do oponente mais rápido."
10016080-121 = "Ou seja... a altura acaba sendo uma vantagem. #nSe você for mais alto que a cavalaria do oponente, pode roubar o chapéu de cima para baixo unilateralmente."
10016080-122 = "Essa altura que você tanto se preocupa, na verdade, pode ser um ponto forte na batalha de cavalaria!"
10016080-124 = "É-é mesmo...!"
10016080-126 = "Mas se a Tsukuyo-chan virar o cavalo, a altura dela não vai combinar com a nossa."
10016080-127 = "Hum, vamos precisar de um degrau."
10016080-128 = "......As alunas que sustentam os lados da cavalaria não precisam necessariamente ter a mesma altura."
10016080-129 = "Porque, ao colocar um degrau sob os pés das alunas mais baixas, é possível igualar a altura."
10016080-131 = "Um degrau...? #nMas assim não dá para se mover, né?"
10016080-132 = "Nas regras da batalha de cavalaria, não diz que é obrigatório se mover. #nAs pessoas se movem apenas porque ficar parado torna você um alvo fácil."
10016080-133 = "Isso... ao preparar um degrau alto, a menos que o oponente seja muito alto, eles não conseguirão nos atacar――"
10016080-134 = "A fortaleza suprema estará completa!"
10016080-135 = "E-entendi... então é só construir uma cidadela!"
10016080-137 = "Criar uma estratégia tão brilhante em tão pouco tempo..."
10016080-138 = "É exatamente como o estrategista Kai-bei, que impediu um grande exército enquanto mantinha suas orelhas pretas em pé no episódio 108 de 'Os 77 Ninjas Solitários Errantes'!"
10016080-139 = "Muito obrigada! Senhor Kaibee!"
10016080-140 = "Eu sou a Hasumi, mas..."
10016080-141 = "Perdão, senhorita Hasumi!#nPor favor, nos empreste sua sabedoria!"
10016080-142 = "Sa-sabedoria?"
10016080-143 = "Desde que nossa chefe caiu, temos vagado sem rumo como ronins que perderam seu mestre."
10016080-144 = "E foi então que a senhorita Hasumi apareceu!#nPor favor, eu lhe imploro!"
10016080-146 = "Isso mesmo! Se uma dama maravilhosa da Trinity nos ajudar, sinto que podemos vencer!"
10016080-147 = "Uma tarde quente, a garota de asas negras, o destino agindo..."
10016080-148 = "Eu também... peço que nos ajude...!"
10016080-153 = "...Não tem jeito, não é?"
10016080-154 = "De qualquer forma, eu já estava descansando, e se Hyakkiyako vencer, será positivo para a Trinity também..."
10016080-155 = "Sendo assim, vou dar uma mãozinha."
