[translation]
10016080-1 = "第8話;偶然の縁"
10016080-2 = "（騒がしい状況が一段落し……）"
10016080-3 = "はぁ、はぁ……。#n戦車……じゃなかった、応援ロボットの機能停止を確認。"
10016080-4 = "カタピラとエンジンを完全に破壊したから、もう暴れる事はないと思うわ。"
10016080-8 = "逃げていた不良生徒の身柄も確保しました。"
10016080-9 = "幸い、この騒動に便乗して、暴動を起こすような生徒はいませんでしたね。"
10016080-10 = "選手たちも無事に避難できています。#n怪我をされた方は、さきほど合同医療本部へ搬送されました。"
10016080-12 = "ひとまず最悪の事態は避けられたわね。#nみんな、お疲れさま。"
10016080-13 = "業務の一環とはいえ、まさか他校の生徒と肩を並べて戦うことになるとは……。"
10016080-14 = "なにか不満でも？"
10016080-15 = "いえ……むしろ滅多にない経験ですから、新鮮ですね。"
10016080-16 = "トリニティの実力はある程度把握していましたが、#nミレニアムの情報処理能力は想像以上でした。"
10016080-17 = "現場で収集したデータを瞬時に分析し、相手の弱点を見極めるとは。#nやはり[ruby=セミナー]生徒会[/ruby]役員は伊達じゃありませんね。"
10016080-18 = "そっ、そんな急に褒められると……。"
10016080-20 = "まあ、騒動の発端となったロボットもミレニアムが作ったものですが。"
10016080-21 = "うっ……で、でも技術に罪はないでしょう？"
10016080-22 = "エンジニア部の発明品が不要な機能まで搭載していたのは事実だけど、#n悪いのは騒動を起こした――"
10016080-23 = "お、落ち着いてください、ユウカさん。#nミレニアムの責任と言っているわけではありませんから。"
10016080-24 = "こほん……データの分析くらい、そこまで難しいものでもないわ。#nセミナーの会計だもの、これくらいできるわよ。"
10016080-25 = "むしろ、ハスミ副委員長の精密な射撃に驚いたくらい……。"
10016080-26 = "スコープも使わずに動く砲身を正確に撃ち抜くなんて……#n一体どういう技を使ったの？"
10016080-27 = "そうですね……直感、とでも言いましょうか。"
10016080-28 = "正義実現委員会として活動する中で自然と身についた感覚なので、言葉での説明は難しいですね……。"
10016080-29 = "……その直感って言い方が気になるわね。"
10016080-30 = "今度、ミレニアムの測定装置で射撃の様子を撮影させてくれない？"
10016080-31 = "はい、構いませんよ。"
10016080-32 = "[s] \"みんな、お疲れさま\""
10016080-33 = "あ、先生。支援ありがとうございました。"
10016080-34 = "[s1] \"よかったら、みんなでパフェでも食べない？\"\n[s2] \"お疲れさま。屋台で何かご馳走するよ。\""
10016080-35 = "嬉しいお話なのですが、合同医療本部の手が足りていないようで……。#n私は負傷者の救護に向かいますね。皆さんで食べてきてください。"
10016080-36 = "嬉しいお話なのですが、合同医療本部の手が足りていないようで……。#n私は負傷者の救護に向かいますね。皆さんで食べてきてください。"
10016080-37 = "私も今は食欲がなくて……少し休憩室で休んできますね。"
10016080-38 = "私はゲヘナの選手控え室に向かいます。#n最後のリレー前に、ヒナ委員長のコンディションを確認しておきたいですから。"
10016080-42 = "……"
10016080-43 = "[s] \"ハスミは？\""
10016080-44 = "パフェ……パフェ……。#nわ、私も遠慮しておきます。"
10016080-45 = "他の方と違って、何か予定があるわけではありませんが、#n気分転換を兼ねて競技場を見回ってこようかと。"
10016080-46 = "[s3] \"それなら競技に参加してみたら？\"\n[s4] \"新しい経験になるし、きっと楽しいよ。\""
10016080-47 = "私が……競技に？"
10016080-48 = "私が……競技に？"
10016080-49 = "……先ほども申し上げましたが、競技に参加するのは私の役目ではありません。"
10016080-50 = "トリニティの優勝に貢献するため……それに今日のお祭りを成功させるためにも、私よりツルギのような身体能力が優れた生徒に任せたほうが合理的です。"
10016080-51 = "私は後ろから皆さんの頑張りを支えられたら、それで十分です。"
10016080-52 = "[s] \"でも……。\""
10016080-53 = "それでは、失礼いたします。"
10016080-60 = "ふっふーん！最後に私が帽子を取った瞬間は爽快だったわ！"
10016080-61 = "ぐぬぬ……体勢を崩しさえしなければ、私が勝ってたはずなのに……！"
10016080-62 = "次こそ私が勝ってMVPを頂くから！#n覚えておくことね！"
10016080-63 = "ふふっ、いつでもかかってきなさい！"
10016080-68 = "なんだか皆さん……とても楽しそうですね。"
10016080-69 = "（いえ、楽しむのは当たり前ですね。今日はせっかくのお祭りですから）"
10016080-70 = "（先生は私にも競技に参加するようおっしゃっていましたが……）"
10016080-71 = "（しかし、私まで楽しんでいてはなりません。平和の影には、いつも誰かの働きがあるものですから）"
10016080-72 = "（いけませんね……まだ閉会まで時間はありますし、気を緩めるのは早いです）"
10016080-78 = "うぅ……どうしましょう。#nこれから決勝戦だというのに、部長が腹痛で倒れてしまうとは……。"
10016080-79 = "もう！だからあのたこ焼きはなんか怪しいって言ったのに！"
10016080-80 = "お店の人はただのタコを入れただけって言ってたけど、焼き上がってるのにあんなうにょうにょ動くタコ、どう考えてもおかしいよ！"
10016080-81 = "きらきら～たこやき～……まんまる～たこやき～……。"
10016080-82 = "素敵な俳句が詠めるかも～。"
10016080-83 = "わ、私にできることはありますでしょうか……。"
10016080-84 = "そんなに交友関係が広くないので……騎手、どうしましょう……。"
10016080-85 = "うーん、一応4人ではありますが……"
10016080-87 = "あちらの生徒……たしか百鬼夜行の……。"
10016080-88 = "そうでした、次は騎馬戦の決勝ですね。#nたしか、百鬼夜行とミレニアムの……。"
10016080-89 = "現時点の総合1位はミレニアムですし、ここで百鬼夜行に善戦していただいて、#nミレニアムの独走状態にブレーキをかけてくれると助かるのですが……。"
10016080-90 = "それでは、部長の代わりにツクヨ殿が騎手を務めるのはどうでしょう！"
10016080-91 = "む、無理ですよぉ……。"
10016080-92 = "私みたいなのが騎手になったら、騎馬のバランスがうまく取れないと思います……。"
10016080-93 = "でしたらイズナに騎手をお任せください！"
10016080-94 = "えっ！？それだと今度は私の腕が届かないよー！"
10016080-96 = "つぼの中のタコ。 #n食中毒の夢を見る……"
10016080-100 = "あの様子ではミレニアムが勝つでしょうね……。"
10016080-101 = "残念ですが、トリニティの戦いではありませんし、見守る事しか……。"
10016080-103 = "うぅ、何か良い案はないでしょうか？"
10016080-104 = "イズナが『彷徨う孤独な忍者77人組』に出てくる策士・甲斐兵衛のような優れた秘策を持っていれば……。"
10016080-105 = "うぅっ……ご、ごめんなさい……。"
10016080-106 = "私みたいな無駄に大きいだけで役に立たない部員が残ってしまって……。"
10016080-107 = "私の背が高いばっかりに……ごめんなさい……。"
10016080-112 = "――背の高さが、なぜ問題になるのでしょうか？"
10016080-113 = "あ、あなたは……？"
10016080-115 = "（お、大きい……！）"
10016080-116 = "黙って聞いていようと思っていましたが、今の言葉は聞き流せません。"
10016080-117 = "皆さん、騎馬戦のルールはご存知ですか？"
10016080-118 = "そりゃもちろん！"
10016080-119 = "3人で作った騎馬の上に騎手を乗せて、帽子を奪い合う競技だよね。"
10016080-120 = "そうです。騎馬戦の勝敗は、いかに素早く相手の帽子を奪えるかで決します。"
10016080-121 = "そう……つまり、背の高さが有利に働くのです。#n相手の騎馬より高ければ、上から一方的に帽子を奪えますから。"
10016080-122 = "気にされていた背の高さですが、むしろ騎馬戦では長所足り得るのです！"
10016080-124 = "そ、そうなんですね……！"
10016080-126 = "でもツクヨちゃんが騎馬になったら、私たちと身長が合わないよ。"
10016080-127 = "う～ん、踏み台が必要だねぇ。"
10016080-128 = "……騎馬の左右を支える生徒が、必ずしも同じ身長である必要はありません。"
10016080-129 = "なぜなら、身長が低い生徒の足元に踏み台を置くことで、高さを均等にできるからです。"
10016080-131 = "踏み台を……？#nでもそれだと動けないですよ？"
10016080-132 = "騎馬戦のルールに、必ずしも動かなければならないというものはありません。#nじっとしていると狙われやすいので動いているだけです。"
10016080-133 = "そう……高さのある踏み台を用意することで、よほどの高さでもない限りこちらを攻撃することできませんから――"
10016080-134 = "最強の砦が完成するのです！"
10016080-135 = "な、なるほど……いっそのこと城塞を築いてしまえばいいんですね！"
10016080-137 = "この短時間でこんなにも見事な作戦を立てるなんて……"
10016080-138 = "まるで『彷徨う孤独な忍者77人組』108話で黒い耳をつんと立たせながら大軍を阻止していた策士・甲斐兵衛の姿、そのものですね！"
10016080-139 = "ありがとうございます！甲斐兵衛殿！"
10016080-140 = "私はハスミですが……。"
10016080-141 = "失礼しました、ハスミ殿！#nイズナたちに知恵をお貸しください！"
10016080-142 = "ち、知恵ですか？"
10016080-143 = "部長が倒れてしまってからというもの、私たちは主を失った浪人のように当てもなくさまよっていました。"
10016080-144 = "そんなところに現れたのがハスミ殿なんです！#nどうかお願いします！"
10016080-146 = "うんうん！トリニティの素敵なレディーが助けてくれたら、私たち勝てそうだね！"
10016080-147 = "暑い午後～、黒翼の少女、何かの縁……。"
10016080-148 = "わ、私からも、お願いします……！"
10016080-153 = "……仕方ありませんね。"
10016080-154 = "どうせ休んでいたところですし、百鬼夜行が勝てばトリニティにとってもプラスですから……"
10016080-155 = "ここは一つ、手を貸すとしましょう。"
