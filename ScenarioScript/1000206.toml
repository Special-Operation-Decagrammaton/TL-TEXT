[translation]
1000206-1 = "A verdadeira gastronomia"
1000206-2 = "Distrito periférico de D.U."
1000206-3 = "Ora, Sensei?"
1000206-4 = "Quem diria que nos encontraríamos por acaso aqui novamente."
1000206-5 = "Você também estava passeando calmamente por aí hoje?"
1000206-6 = "Fufu, então somos dois. Fico feliz e, ao mesmo tempo, aliviada."
1000206-7 = "[s] \"O que a Haruna estava fazendo?\""
1000206-8 = "Eu estava caminhando por aí em busca de novos restaurantes deliciosos."
1000206-9 = "Fui a um lugar que estava sendo chamado de uma nova promessa nas redes sociais, mas..."
1000206-10 = "Estava muito longe das minhas expectativas..."
1000206-11 = "[s] \"Não me diga que você explodiu o restaurante de novo?\""
1000206-12 = "Ufufu... mesmo eu não faria algo assim todas as vezes."
1000206-13 = "...Mas, ultimamente, tenho pensado um pouco mais sobre o ato de comer..."
1000206-14 = "[s] \"Você parece estar preocupada com várias coisas.\""
1000206-15 = "...Fufu, obrigada pelas suas palavras gentis."
1000206-16 = "Já que nos encontramos, você se importaria de caminhar um pouco comigo até em casa?"
1000206-17 = "[s] \"Claro.\""
1000206-21 = "(Enquanto caminhava conversando sobre comida com a Haruna,)"
1000206-22 = "(avistei uma loja de taiyaki)"
1000206-23 = "[s] \"Quer comer um taiyaki?\""
1000206-24 = "...Taiyaki, é?"
1000206-25 = "...Ufufu. Sim, por favor, Sensei."
1000206-27 = "Muito obrigada!"
1000206-29 = "...Fufu."
1000206-32 = "― Ufufu, [wa:2000] poder voltar para casa assim juntos,"
1000206-34 = "― e ainda compramos tantos taiyakis."
1000206-37 = "― Você acha que taiyaki é um pouco simples demais, [wa:2500] é isso?"
1000206-40 = "[wa:300]― Não... [wa:1300] para mim, [wa:1500] este é o momento mais luxuoso de todos."
1000206-43 = "― Então, [wa:1000] Sensei. [wa:1000] Vou lhe dar isto."
1000206-45 = "― ...Não. [wa:1300] Tem que ser um \"ahhh\". [wa:500]"
1000206-48 = "[ns] \"Ahhh.\""
1000206-49 = "― Comer a comida favorita, [wa:2500] com a pessoa favorita."
1000206-52 = "― Isso sim é, verdadeiramente..."
1000206-55 = "[ns] \"Isso é um pouco constrangedor...\""
1000206-56 = "― Hm? [wa:1300] Essa expressão, [wa:1200] aconteceu alguma coisa?"
1000206-59 = "― Ufufu. [wa:1500] Eu não desgosto [wa:1500] desse tipo de reação, sabe."
1000206-62 = "― Você perguntou se eu não estou com frio, [wa:1500] é isso?"
1000206-65 = "― Não, [wa:1000] estou aquecida. [wa:1800] De verdade."
1000206-68 = "(Voltei para casa dividindo um taiyaki com a Haruna)"
