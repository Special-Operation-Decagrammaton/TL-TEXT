[translation]
1000206-1 = "真の美食"
1000206-2 = "D.U.外郭地区"
1000206-3 = "あら、先生？"
1000206-4 = "こんなところでまた偶然お会いできるだなんて。"
1000206-5 = "今日もまた、のんびりとあちこちを歩いていらしたのですか？"
1000206-6 = "ふふ、でしたら私も同じです。嬉しくもありつつ、ホッとしますわね。"
1000206-7 = "[s] \"ハルナは何をしてたの？\""
1000206-8 = "私は新たな美味しいお店の開拓のために、あちこちを歩き回っていました。"
1000206-9 = "SNSで期待の新参と称されていたお店に行ってみたのですが……。"
1000206-10 = "あまりにも私の期待とは違っていまして……。"
1000206-11 = "[s] \"まさか、またお店を爆破させたの？\""
1000206-12 = "うふふ……いくら私でも毎回そんなことはいたしませんわ。"
1000206-13 = "……ですが、最近なんだか、食べることに対して少し、考えることが増えてきてしまって……。"
1000206-14 = "[s] \"色々と悩んでるんだね。\""
1000206-15 = "……ふふ、優しいお言葉ありがとうございます。"
1000206-16 = "せっかく先生とお会いできたことですし、お家の方まで少し一緒に歩いてもよろしいでしょうか？"
1000206-17 = "[s] \"もちろん。\""
1000206-21 = "（ハルナとあれこれ食べ物の話をしながら歩いていたら、）"
1000206-22 = "（たい焼きのお店が目に入った）"
1000206-23 = "[s] \"たい焼き、食べる？\""
1000206-24 = "……たい焼き、ですか。"
1000206-25 = "……うふふ。はい、お願いします、先生。"
1000206-27 = "どうも、ありがとうございます！"
1000206-29 = "……ふふ。"
1000206-32 = "― うふふ、[wa:2000]こうやって一緒に帰宅できるだなんて、"
1000206-34 = "― たい焼きもこんなにたくさん買ってしまいましたし。"
1000206-37 = "― たい焼きだと少し質素じゃないか、[wa:2500]ですって？"
1000206-40 = "[wa:300]― いいえ……[wa:1300]私にとっては[wa:1500]最高に贅沢な瞬間ですわ。"
1000206-43 = "― では、[wa:1000]先生。[wa:1000]これをさしあげますわ。"
1000206-45 = "― ……いいえ。[wa:1300]あーん、[wa:500]でなくては。"
1000206-48 = "[ns] \"あーん。\""
1000206-49 = "― 一番好きな御方と一緒に、[wa:2500]一番好きな食べ物を頂く。"
1000206-52 = "― これぞ正しく……。"
1000206-55 = "[ns] \"なんだか恥ずかしいな……。\""
1000206-56 = "― うん？[wa:1300]その表情、[wa:1200]どうかなさいまして？"
1000206-59 = "― うふふっ。[wa:1500]そのような反応も、[wa:1500]嫌いではありませんが。"
1000206-62 = "― 寒くないか、[wa:1500]ですって？"
1000206-65 = "― いいえ、[wa:1000]暖かいですわよ。[wa:1800]本当に。"
1000206-68 = "（ハルナと仲良くたい焼きを分けて食べながら、家に帰った）"
