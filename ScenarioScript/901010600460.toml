[translation]
901010600460-6 = "Então, organizando o que conversamos até agora..."
901010600460-7 = "O pescador desaparecido no porto estava endividado."
901010600460-8 = "Ele saiu do porto de trem no dia do incidente."
901010600460-9 = "Assim como o pescador, muitos cidadãos pediram dinheiro emprestado à Família Carpaccio."
901010600460-10 = "Finalmente vamos entender o caso dos desaparecimentos."
901010600460-11 = "Os desaparecidos na região do Porto Kanezaki eram, na verdade, devedores da Família Carpaccio."
901010600460-12 = "Mas alguns que não conseguiam pagar planejaram uma fuga – e fugiram."
901010600460-13 = "Por isso parecia que tinham desaparecido."
901010600460-14 = "Desta vez, concordo com a FOX4."
901010600460-15 = "Não há outra explicação para o sumiço das pessoas."
901010600460-16 = "Com tantos boatos e especulações, parecia um caso sinistro... mas na verdade era mais simples do que pensávamos."
901010600460-17 = "Vamos reportar as informações coletadas ao Conselho Estudantil Geral e solicitar ao Departamento Financeiro que verifique se houve irregularidades nas relações de dívida."
901010600460-18 = "[s] \"Será que o caso terminou?\""
901010600460-19 = "Sim, por enquanto sim, mas..."
901010600460-20 = "..."
901010600460-24 = "Preocupada com alguma coisa?"
901010600460-25 = "Não, só acho que deixamos passar algo importante."
901010600460-26 = "[s] \"Alguma coisa te incomoda?\""
901010600460-27 = "Não há erros nas informações coletadas."
901010600460-28 = "Claras e fáceis de entender... todas apontam para uma única conclusão."
901010600460-29 = "Por isso mesmo, me parece que alguém propositalmente nos guiou para essa resposta."
901010600460-30 = "E além disso... se este caso foi apenas por causa de dívidas."
901010600460-31 = "Por que o \"Caranguejo do Tambor\" apareceu tantas vezes nos boatos?"
901010600460-32 = "Se alguém está espalhando boatos de propósito, deve haver uma razão –"
901010600460-34 = "Isso... não é porque as pessoas se interessam por coisas chamativas?"
901010600460-35 = "Se for polêmico, viraliza rapidinho nas redes sociais."
901010600460-36 = "Procurar sentido num meme não é perda de tempo?"
901010600460-37 = "Aquele pássaro branco e feio, não é nem fofo e tem um monte de produto vendendo, né?"
901010600460-39 = "Isso é..."
901010600460-44 = "[ns] \"Pessoal, que tal irmos ao porto de novo amanhã?\""
901010600460-50 = "Hmm? O senhor também quer investigar alguma coisa, Sensei?"
901010600460-51 = "[s] \"Não, não é investigação...\""
901010600460-55 = "[ns1] \"Depois de ouvir os relatos, fiquei com vontade de ir ao porto.\"\n[ns2] \"Dizem que tem uns restaurantes gostosos por lá.\""
901010600460-61 = "É mesmo... o \"Aida Suisan\", que visitamos no primeiro dia, parece ser um achado."
901010600460-62 = "Depois que saiu a recomendação, todo dia postam avaliações."
901010600460-63 = "[s3] \"Então, que tal a gente tomar café da manhã lá amanhã?\"\n[s4] \"Não se preocupem com dinheiro, o Sensei paga!\""
901010600460-68 = "M-mas não podemos abusar da boa vontade do Sensei –"
901010600460-69 = "Ah! Pode isso? Bom, não tenho motivo para recusar."
901010600460-70 = "Para nos prepararmos para situações extremas, o manual da SRT diz que devemos adquirir alimentos localmente sempre que possível."
901010600460-71 = "Acho que isso não significa depender dos outros..."
901010600460-72 = "Bem, eu também vou. Durante a missão não deu para aproveitar a gastronomia do porto."
901010600460-76 = "Uh... então, sem querer abusar."
901010600460-77 = "[s] \"Yukino.\""
901010600460-82 = "Sim? O que foi?"
901010600460-83 = "[s5] \"... Você quer verificar alguma coisa no porto, não é?\"\n[s6] \"Amanhã, vamos dar uma outra olhada, ver se tem algo estranho.\""
901010600460-88 = "... Obrigada. O senhor é muito perspicaz."
901010600460-89 = "Ter sensibilidade para o sofrimento alheio é o mesmo que andar por um caminho de espinhos."
901010600460-90 = "[s] \"...Hã?\""
901010600460-91 = "Não, nada não."
901010600460-97 = "Equipe FOX, bom trabalho."
901010600460-98 = "Até amanhã de manhã, cada um tem tempo livre."
901010600460-101 = "Entendido!"