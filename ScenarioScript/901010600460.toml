[translation]#[Texto Final. - Filipe 05/07.]
901010600460-6 = "Então, organizando o que falamos até agora……"
901010600460-7 = "O pescador desaparecido estava endividado e sendo pressionado."
901010600460-8 = "No dia do ocorrido, ele pegou um trem e saiu do porto."
901010600460-9 = "Assim como ele, muitos cidadãos pegaram dinheiro com a Família Carpaccio."
901010600460-10 = "Finalmente acho que vamos entender esse caso de desaparecimento."
901010600460-11 = "Os desaparecidos da região do porto de Kanezaki eram, na verdade, devedores da Família Carpaccio."
901010600460-12 = "Mas alguns, sem condições de pagar, planejaram uma fuga escondida―― e fugiram."
901010600460-13 = "Por isso parecia que tinham desaparecido."
901010600460-14 = "Dessa vez eu concordo com a FOX4."
901010600460-15 = "Não há outra razão ou jeito de alguém sumir."
901010600460-16 = "Com tantos boatos e suposições, parecia um caso sinistro, mas na verdade era mais simples do que imaginávamos."
901010600460-17 = "Vamos reportar as informações ao Conselho Estudantil Geral e pedir à Sala de Finanças que verifique se houve irregularidades nas cobranças."
901010600460-18 = "[s] \"Então o caso acabou?\""
901010600460-19 = "Sim, por enquanto…… mas……"
901010600460-20 = "……"
901010600460-24 = "Tem alguma coisa te preocupando?"
901010600460-25 = "É que sinto que deixei passar algo importante."
901010600460-26 = "[s] \"Tem algo te incomodando?\""
901010600460-27 = "As informações que coletamos não têm erro."
901010600460-28 = "Tudo é claro e direto…… todas as pistas levam a uma única conclusão."
901010600460-29 = "E é por isso que parece que alguém propositalmente nos guiou até essa resposta."
901010600460-30 = "Além disso…… se esse caso for só dívida,"
901010600460-31 = "por que o 'Caranguejo do Tambor' apareceu tantas vezes no boato?"
901010600460-32 = "Se alguém espalhou o boato de propósito, deve haver um motivo――"
901010600460-34 = "……Não é porque é um assunto que chama a atenção?"
901010600460-35 = "Assunto polêmico viraliza fácil nas redes."
901010600460-36 = "É igual procurar significado em meme – não tem lógica."
901010600460-37 = "Aquele passarinho branco esquisito nem é fofo e tem um monte de produto, né? Deve vender."
901010600460-39 = "Isso……"
901010600460-44 = "[ns] \"Gente, que tal a gente ir ao porto de novo amanhã?\""
901010600460-50 = "Hmm? Sensei, você também quer investigar alguma coisa?"
901010600460-51 = "[s] \"Não, não é investigação não……\""
901010600460-55 = "[ns1] \"Depois de ouvir vocês, fiquei com vontade de conhecer o porto.\"\n[ns2] \"Dizem que tem umas lojas bem gostosas por lá.\""
901010600460-61 = "É verdade…… aquela 'Pescados Akita' que a gente visitou no primeiro dia parece ser uma joia escondida."
901010600460-62 = "Depois que saiu na boca do povo, todo dia tem avaliação nova."
901010600460-63 = "[s3] \"Então que tal tomar café da manhã lá amanhã?\"\n[s4] \"Não se preocupem com dinheiro, é por minha conta!\""
901010600460-68 = "M-Mas não podemos ficar devendo ao Sensei――"
901010600460-69 = "Ó! Se é de graça, não tem motivo pra recusar!"
901010600460-70 = "No manual da SRT diz: 'em situações extremas, priorize o suprimento local' – não é?"
901010600460-71 = "Acho que isso não significa 'dê um jeito de ser bancado'……"
901010600460-72 = "Bom, eu também vou. Não deu pra curtir a gastronomia do porto direito durante a missão."
901010600460-76 = "Uu…… então vou aceitar."
901010600460-77 = "[s] \"Yukino.\""
901010600460-82 = "Sim? O que foi?"
901010600460-83 = "[s5] \"……Você quer confirmar uma coisa no porto, né?\"\n[s6] \"Amanhã vamos dar mais uma olhada pra ver se tem algo estranho.\""
901010600460-88 = "……Obrigada. Sensei é muito perspicaz."
901010600460-89 = "Ser sensível à dor dos outros é o mesmo que andar por um caminho espinhoso."
901010600460-90 = "[s] \"……Hã?\""
901010600460-91 = "Não, nada não."
901010600460-97 = "Esquadrão FOX, bom trabalho."
901010600460-98 = "Então, tempo livre até amanhã de manhã."
901010600460-101 = "Entendido!"