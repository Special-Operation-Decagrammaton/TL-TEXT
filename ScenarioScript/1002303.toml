[translation]
1002303-1 = "とある風紀委員の弱点"
1002303-2 = "（イオリのモモトークのことが気になって、こっそり後をつけてみた）"
1002303-7 = "……ふぅ、誰にも見られてないよな？"
1002303-8 = "よりによって、先生に送っちゃうなんて……。"
1002303-10 = "……そろそろ時間か。"
1002303-15 = "[ns] イオリの後をついて行く。"
1002303-19 = "ふふっ、いらっしゃい。お待ちしておりましたよ。"
1002303-20 = "……約束のブツは？"
1002303-21 = "もちろん、しっかりとこちらに。"
1002303-22 = "しかし意外ですね。血も涙も無いと言われるあのゲヘナ風紀委員のスペシャリストが、こんな形で取引を要請してくるだなんて……ふふふっ。"
1002303-23 = "し、仕方ないだろ！普通に「それ」を買おうとして、誰かに見られるのも嫌だし……。"
1002303-24 = "……対価はちゃんと渡す、秘密は守れよ？"
1002303-25 = "もちろんです。顧客の情報を漏らしたとあっては、我々の信用にも関わってしまうのでね。"
1002303-26 = "では、こちらを……。"
1002303-31 = "……ああ、悪くない。"
1002303-32 = "じゃあ、お代を――"
1002303-33 = "[s] \"……何を買ってるの？\""
1002303-34 = "うわっ！？せ、せせせ、先生！？"
1002303-35 = "ど、どうしてこんな場所に先生が……？"
1002303-36 = "[s] \"どうしても気になって、ついてきちゃった。\""
1002303-38 = "なっ……！つまり、私のことをずっと尾行して……！？"
1002303-39 = "このっ、ヘンタイ！死ね！痴漢！"
1002303-40 = "[s] \"でも、何かイオリが良くないことに巻き込まれてるかと思って……。\""
1002303-41 = "べ、別に良くないものではありません……！"
1002303-42 = "これはただの――"
1002303-43 = "ちょっ、待て！顧客情報だろそれは！？厳守しろって！"
1002303-44 = "先生には言うな！"
1002303-45 = "ですが怪しいモノを取り扱ってると思われたら、我々もそうですが、イオリさんも困るのでは……？"
1002303-46 = "……どちらにせよ、いつまでも隠しておけるものではないじゃないですか。"
1002303-47 = "それは、そうだけど……。"
1002303-48 = "[s] \"何だったとしても怒らないから、正直に言ってほしいな。\""
1002303-52 = "…………き輪。"
1002303-53 = "[s] \"……え？\""
1002303-54 = "……浮き輪。"
1002303-55 = "[s] \"…………え？\""
1002303-59 = "絶対に聞こえてるだろ！？浮き輪だよ！泳げないやつが使うあの浮き輪！！"
1002303-60 = "ああもうっ！先生には一番バレたくなかったのに！"
1002303-61 = "[s] \"それってつまり、もしかして……。\""
1002303-62 = "ああそうだよ、泳げないの！！"
1002303-63 = "風紀委員会の活動が忙しくて、しょっちゅう水泳の授業を休んでたこともあって……。"
1002303-64 = "とはいえ、規則違反者が海に逃げ込んだりした時に「泳げない」なんて言ってられないから……。"
1002303-65 = "それで、こっそり浮き輪を買って泳ぐ練習をしようと思ってたのに……。"
1002303-66 = "くそっ、よりにもよって先生にバレるなんて……。"
1002303-67 = "[s] \"私がその練習、付き合おうか？\""
1002303-68 = "え？どうして先生が……？"
1002303-69 = "……どうせ、何かいやらしいことでも考えてるんだろ？騙されないからな。"
1002303-70 = "[s] \"ひとりで練習するより効率良いんじゃないかなって思って。\""
1002303-71 = "確かに、それはそうだけど……。"
1002303-74 = "（考えてみたら、もうバレちゃったんだから先生には隠す必要も無いし……）"
1002303-75 = "（それで、みんなの前で恥をかかずに済むなら……）"
1002303-78 = "……分かった、じゃあお願い。"
1002303-79 = "……でも、もし変なとこ触ったらその場で撃つから。"
1002303-80 = "[s] \"善処するね。\""
1002303-81 = "「善処」じゃダメなんだって！絶っ対触るなよ！？"
1002303-83 = "その後、イオリと一緒に深夜の海に行って、しっかり教えてあげた。"
