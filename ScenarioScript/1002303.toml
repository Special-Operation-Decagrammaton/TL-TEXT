[translation]
1002303-1 = "O ponto fraco de uma certa Comitê de Disciplina"
1002303-2 = "（Fiquei curiosa sobre o MomoTalk da Iori e decidi segui-la secretamente）"
1002303-7 = "……Ufa, ninguém está me vendo, né?"
1002303-8 = "Logo para o Sensei que eu fui enviar aquilo……."
1002303-10 = "……Está quase na hora."
1002303-15 = "[ns] Seguir a Iori."
1002303-19 = "Fufu, seja bem-vindo. Estávamos esperando por você."
1002303-20 = "……E o item prometido?"
1002303-21 = "Claro, está bem aqui."
1002303-22 = "Mas é surpreendente. A especialista do Comitê de Disciplina de Gehenna, conhecida por não ter sangue nem piedade, pedindo uma transação desta forma…… fufufu."
1002303-23 = "C-cala a boca! Eu não quero que ninguém me veja comprando \"isso\" normalmente……."
1002303-24 = "……Vou pagar o preço, mantenha segredo, entendeu?"
1002303-25 = "Com certeza. Se vazarmos informações de clientes, nossa credibilidade estará em jogo."
1002303-26 = "Então, aqui está……."
1002303-31 = "……Ah, não é ruim."
1002303-32 = "Então, o pagamento――"
1002303-33 = "[s] \"……O que você está comprando?\""
1002303-34 = "O quê!? S-s-s-sensei!?"
1002303-35 = "P-por que o Sensei está em um lugar como este……?"
1002303-36 = "[s] \"Eu fiquei muito curioso, então acabei te seguindo.\""
1002303-38 = "Não……! Então você estava me seguindo esse tempo todo……!?"
1002303-39 = "Seu pervertido! Morra! Assediador!"
1002303-40 = "[s] \"Mas eu pensei que talvez a Iori estivesse envolvida em algo ruim…….\""
1002303-41 = "N-não é nada ruim……!"
1002303-42 = "Isso é apenas――"
1002303-43 = "Ei, espera! Isso é informação de cliente, não é!? Mantenha o sigilo!"
1002303-44 = "Não conte ao Sensei!"
1002303-45 = "Mas se pensarem que estamos lidando com itens suspeitos, não seria um problema tanto para nós quanto para a senhorita Iori……?"
1002303-46 = "……De qualquer forma, não é algo que você possa esconder para sempre."
1002303-47 = "Isso é verdade, mas……."
1002303-48 = "[s] \"Seja o que for, eu não vou ficar bravo, então por favor, me diga a verdade.\""
1002303-52 = "…………Bóia."
1002303-53 = "[s] \"……Hã?\""
1002303-54 = "……Uma bóia."
1002303-55 = "[s] \"…………Hã?\""
1002303-59 = "Você ouviu perfeitamente, né!? É uma bóia! Aquela bóia que quem não sabe nadar usa!!"
1002303-60 = "Ah, droga! Eu não queria que o Sensei soubesse disso de jeito nenhum!"
1002303-61 = "[s] \"Então isso significa que, por acaso…….\""
1002303-62 = "Ah, é isso mesmo, eu não sei nadar!!"
1002303-63 = "As atividades do Comitê de Disciplina são muito ocupadas, e eu sempre faltava nas aulas de natação……."
1002303-64 = "Dito isso, quando alguém que viola as regras foge para o mar, eu não posso simplesmente dizer que \"não sei nadar\"……."
1002303-65 = "Por isso, eu ia comprar uma bóia escondida para praticar natação……."
1002303-66 = "Droga, logo o Sensei tinha que descobrir……."
1002303-67 = "[s] \"Quer que eu te acompanhe nesse treino?\""
1002303-68 = "Hã? Por que o Sensei……?"
1002303-69 = "……Você deve estar pensando em algo indecente, né? Não vou cair nessa."
1002303-70 = "[s] \"Achei que seria mais eficiente do que praticar sozinha.\""
1002303-71 = "De fato, isso é verdade, mas……."
1002303-74 = "（Pensando bem, já que ele descobriu, não preciso mais esconder do Sensei……）"
1002303-75 = "（E se isso me poupar de passar vergonha na frente de todo mundo……）"
1002303-78 = "……Entendido, então eu aceito."
1002303-79 = "……Mas, se você tocar em algum lugar estranho, eu atiro em você na hora."
1002303-80 = "[s] \"Farei o meu melhor.\""
1002303-81 = "Não pode ser \"fazer o melhor\"! Não ouse tocar em nada, entendeu!?"
1002303-83 = "Depois disso, fui com a Iori até a praia no meio da noite e ensinei tudo direitinho para ela."
