[translation]
80000096-1 = "全力で道を探す少女"
80000096-2 = "（日中、仕事に集中していると……）"
80000096-6 = "[ns1] \"……宅配便？\"\n[ns2] \"ミレニアムから？\""
80000096-16 = "[log=코유키]「……先生へ」[/log]"
80000096-19 = "[log=코유키]「今までセミナーの仕事や、その他いつもご協力くださりありがとうございます」[/log]"
80000096-22 = "[log=코유키]「どうかお早めに召し上がって、素敵なバレンタインデーをお過ごしください」[/log]"
80000096-25 = "[log=코유키]「日頃の感謝を込めて、セミナーのコユキより」[/log]"
80000096-30 = "[ns3] \"なんだか怪しいような……\"\n[ns4] チョコレートを半分に割ってみる。"
80000096-33 = "[ns5] \"……チョコレートの中に紙が！？\"\n[ns6] \"あっ、なるほど……\""
80000096-36 = "「……嬉しいです」"
80000096-37 = "「この紙を見つけたということは、無事に私のメッセージが先輩の目をくぐり抜けたのでしょう」"
80000096-38 = "「先生。私は今、反省部屋で捕まっています。どうしても助けが必要なんです」"
80000096-39 = "「先輩の監視から逃れられる時間とルートを書いておきました」"
80000096-40 = "「……先生」"
80000096-41 = "「……どうかお助けください！！」"
80000096-42 = "「もう！これが！最後の！希望なんです！！」"
80000096-43 = "「……こんな可哀想な生徒を見捨てたりなんかしませんよね？切実なる願いを込めて、コユキ」"
80000096-48 = "ぷはぁ～！にははははは！！これが外の空気、自由な世界……！！"
80000096-49 = "はああぁ～～～もうほんと……"
80000096-50 = "今回ばっかりは全部おしまいだと思いましたよ……！"
80000096-51 = "でも[ruby=くろさき]黒崎[/ruby]コユキは、そう簡単には諦めません！いつだって全力で道を探していますから！"
80000096-52 = "何度も救ってくださりありがとうございます、先生。"
80000096-53 = "[s7] \"コユキ、反省は……？\"\n[s8] \"ならトラブルを起こさなければいいのに……\""
80000096-54 = "……？？？#n反省したから出してほしい、なんて言いましたっけ？"
80000096-55 = "にはは！変なこといいますねぇ～！"
80000096-56 = "……あ！"
80000096-57 = "そういえば、チョコレートはどうしました？#nちゃんと食べてくれましたか？"
80000096-58 = "……美味しかったですか！？良かったです！#n一生懸命作った甲斐がありましたよ、気持ち的にも、機能的にも！"
80000096-59 = "[s9] \"……ん？一生懸命？\"\n[s10] \"あれはコユキの手作りなの？\""
80000096-62 = "……え？"
80000096-63 = "はい、そうですよ？"
80000096-64 = "……んん？"
80000096-65 = "なんで、わざわざ手作りにしたのかって？"
80000096-69 = "ど、どうしてそんなことを聞くんですか！#nき、機能的だからですよ！？"
80000096-70 = "そ、そう！中に手紙を隠さないといけないじゃないですか！#nだからです、はい！"
80000096-71 = "[s11] \"あ、ああ～！だよね、そうだよね！\"\n[s12] \"さすがコユキ、すごいね！\""
80000096-74 = "ふ、ふふ……！先生は理解が早くて助かりますよ！！"
80000096-75 = "……に・は・は・は・は～！#nそれにしても、この方法は完璧ですね？"
80000096-76 = "誰かに知られでもしない限り、バレないと思いますし……"
80000096-77 = "これからも、ねえ……先生？"
80000096-81 = "……これからも、ずっと[ruby=・   ・   ・]仲良く[/ruby]してくださいよ～？にはっ！"
80000096-83 = "（その後、コユキと一緒にミレニアムの建物を出た）"
80000096-84 = "（もちろん、全てセミナーの耳に筒抜けだったため、二度と同じ方法は使えなくなったのだが……）"
