[translation]
80000096-1 = "A garota que busca um caminho com todas as forças"
80000096-2 = "（Durante o dia, enquanto estou concentrado no trabalho...）"
80000096-6 = "[ns1] \"……Uma entrega?\"\n[ns2] \"Da Millennium?\""
80000096-16 = "[log=코유키]「……Para o Sensei」[/log]"
80000096-19 = "[log=코유키]「Obrigada por sempre colaborar com o trabalho do Seminar e com todo o resto」[/log]"
80000096-22 = "[log=코유키]「Por favor, coma logo e tenha um ótimo Dia dos Namorados」[/log]"
80000096-25 = "[log=코유키]「Com gratidão pelo dia a dia, da Koyuki do Seminar」[/log]"
80000096-30 = "[ns3] \"Parece meio suspeito...\"\n[ns4] Parto o chocolate ao meio."
80000096-33 = "[ns5] \"……Tem um papel dentro do chocolate!?\"\n[ns6] \"Ah, entendi...\""
80000096-36 = "「……Fico feliz」"
80000096-37 = "「Se você encontrou este papel, significa que minha mensagem conseguiu passar despercebida pelos olhos da senpai」"
80000096-38 = "「Sensei. Estou presa na sala de reflexão agora. Preciso desesperadamente da sua ajuda」"
80000096-39 = "「Escrevi o horário e a rota para escapar da vigilância da senpai」"
80000096-40 = "「……Sensei」"
80000096-41 = "「……Por favor, me ajude!!」"
80000096-42 = "「Sério! Essa é a minha! Última! Esperança!!」"
80000096-43 = "「……Você não vai abandonar uma aluna tão coitada, vai? Com um pedido desesperado, Koyuki」"
80000096-48 = "Ahhh! Ni-hahahaha!! Isso é o ar lá fora, o mundo da liberdade...!!"
80000096-49 = "Ahhh~~~ sério mesmo..."
80000096-50 = "Dessa vez eu achei que tinha acabado tudo...!"
80000096-51 = "Mas a Kurosaki Koyuki não desiste tão fácil! Porque eu sempre busco um caminho com todas as minhas forças!"
80000096-52 = "Obrigada por me salvar tantas vezes, Sensei."
80000096-53 = "[s7] \"Koyuki, e a reflexão...?\"\n[s8] \"Se não quer ficar presa, era só não causar problemas...\""
80000096-54 = "……???#nEu disse que queria sair porque refleti sobre meus atos?"
80000096-55 = "Ni-ha! Você diz cada coisa estranha!"
80000096-56 = "……Ah!"
80000096-57 = "Falando nisso, o que você fez com o chocolate?#nVocê comeu direitinho?"
80000096-58 = "……Estava gostoso!? Que bom!#nValew a pena ter feito com tanto esforço, tanto pelo sentimento quanto pela funcionalidade!"
80000096-59 = "[s9] \"……Hm? Com esforço?\"\n[s10] \"Aquilo foi feito à mão pela Koyuki?\""
80000096-62 = "……Eh?"
80000096-63 = "Sim, foi, por quê?"
80000096-64 = "……Hmm?"
80000096-65 = "Por que você está perguntando por que eu fiz à mão?"
80000096-69 = "Po-por que você pergunta uma coisa dessas!#nPo-porque é funcional, oras!?"
80000096-70 = "Is-isso mesmo! Eu precisava esconder a carta lá dentro, não precisava?#nPor isso, sim!"
80000096-71 = "[s11] \"Ah, ahhh! É verdade, tem razão!\"\n[s12] \"Como esperado da Koyuki, incrível!\""
80000096-74 = "He-hehe...! É uma ajuda ter um Sensei que entende as coisas rápido!!"
80000096-75 = "……Ni-ha-ha-ha-ha~!#nMas falando nisso, esse método é perfeito, né?"
80000096-76 = "A menos que alguém descubra, acho que não vão desconfiar..."
80000096-77 = "De agora em diante também, né... Sensei?"
80000096-81 = "……Continue sendo meu amigo para sempre, tá bom? Ni-ha!"
80000096-83 = "（Depois disso, saí do prédio da Millennium junto com a Koyuki）"
80000096-84 = "（Claro, como tudo chegou aos ouvidos do Seminar, ela nunca mais pôde usar o mesmo método...）"
