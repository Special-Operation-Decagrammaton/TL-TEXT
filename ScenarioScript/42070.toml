[translation]
42070-1 = "Episódio 7: Golpe de Estado"
42070-2 = "(Algumas horas antes da Transmissão Nacional de Emergência… Conselho Estudantil Geral ―― Sala de Conferências)"
42070-5 = "……O próximo ponto na pauta de hoje é a deliberação de penalidades corporativas. Foco na megacorporação Kaiser e em sua diretoria, que aproveitaram o vácuo de poder durante a crise para instigar um levante armado e tentar usurpar a autoridade central do Conselho Estudantil."
42070-6 = "Em circunstâncias normais, este julgamento já teria sido executado como prioridade máxima assim que o Comitê de Administração retomou as rédeas da cidade…"
42070-7 = "……No entanto, devido à magnitude dos danos que a crise infligiu à infraestrutura de telecomunicações e logística do Distrito D.U., nós redirecionamos todos os recursos para a reconstrução urgente e salvaguarda da população, deixando o julgamento da Kaiser temporariamente em hiato."
42070-11 = "……Agradeço o panorama da situação."
42070-12 = "Como foi exposto, a Kaiser Corporation lucrou com o pânico geral. Eles não apenas lideraram um exército privado contra as portas do Conselho Estudantil, como sequestraram a autoridade sistêmica da Torre Sanctum.#nO objetivo final deles era despertar e controlar uma relíquia bélica de obliteração em massa que eles mesmos desenterraram em escavações ilegais."
42070-13 = "Se não fosse pela intervenção milagrosa do Professor da Schale e pela bravura das lideranças dos Comitês de cada academia, o banho de sangue teria sido incalculável…"
42070-14 = "……Se o plano da Kaiser não tivesse sido frustrado, estaríamos chorando sobre as cinzas não apenas do Conselho, mas da própria Kivotos."
42070-15 = "Toda essa audácia militar só foi possível porque a Kaiser Corporation é um monopólio nojento e inchado que controla desde os caixas de supermercado até a indústria bélica.#nEles têm poder demais, e usaram isso contra nós."
42070-16 = "Para garantir que o nosso solo nunca mais seja pisado por tropas corporativas,#nA punição para a Kaiser e sua cúpula diretiva deve ser a aniquilação fiscal e judicial absoluta."
42070-20 = "Um momento. Eu não nego os fatos de que a Kaiser engatrilhou um exército privado contra as nossas janelas…"
42070-21 = "No entanto, a invasão e o sequestro da Torre Sanctum só ocorreram com tanta facilidade porque a Oficial Nanagami Rin, em uma crise de incompetência paranoica, convocou um Comitê de Contingência não autorizado, o que afundou o Conselho em uma burocracia caótica e cegou as nossas defesas."
42070-23 = "I-Isso é uma falácia! A Oficial Rin acionou a contingência, sim, mas ligar isso diretamente à facilidade da invasão armada é um salto lógico desonesto…"
42070-24 = "Se ela é inocente, então como você explica os depoimentos perturbadores de testemunhas oculares que juram ter visto a Oficial Rin operando o maquinário de guerra antigo que a Kaiser havia desenterrado?"
42070-25 = "……E se a Oficial Rin for uma traidora? E se o vácuo de poder foi criado intencionalmente por ela para facilitar o cerco da Kaiser?"
42070-26 = "Q-Que calúnia doentia… Isso não faz o menor sentido…"
42070-27 = "……Eu compreendo que, como eu estava no epicentro do furacão, o meu nome levante as piores suspeitas na mente de vocês."
42070-28 = "Por isso, quando as medidas punitivas contra a Kaiser forem aprovadas nesta sala e a investigação criminal iniciar, eu juro por minha honra que cooperarei com total transparência a qualquer interrogatório."
42070-30 = "Ei, Aoi-senpai… essa tortura ainda vai demorar?#nA gente tá preso nessa cadeira há horas e eu tô morrendo de fome…"
42070-31 = "Respire fundo. Ainda temos três tópicos cabeludos pra desatar nessa pauta."
42070-32 = "Começamos há exatamente 8 horas, 32 minutos e 15 segundos…#nComparado às maratonas de guerra do Escritório de Defesa, essa reuniãozinha tá parecendo um spa."
42070-33 = "Engole o choro e morde aquele Onigiri que distribuíram no intervalo pra matar a fome."
42070-35 = "Onigiri…? Ninguém botou nenhum Onigiri na minha mesa…"
42070-37 = "Aliás, voltando à pauta… não foi a própria Oficial Rin quem rasgou a constituição e entregou poderes supra-legais nas mãos do Professor da Schale?"
42070-38 = "Por mais que o tal 'bloco de notas' que a Presidente supostamente deixou para trás ditasse essa maluquice,#nnós não temos um laudo pericial que comprove a veracidade daquele papel sujo. Pode ser tudo uma farsa."
42070-39 = "……Eu garanto a vocês, aquela caligrafia apressada pertencia à Presidente sem sombra de dúvidas."
42070-40 = "E se essa paranoia desconfia até da minha palavra, podemos solicitar uma perícia criminal forense para validar a tint――"
42070-41 = "Oficial Administrativa Chefe! A burocracia existe para manter a ordem, não para ser rasgada e justificada depois!"
42070-42 = "Você pode ostentar a coroa de Presidente Interina, mas atropelar e ignorar o consenso do Comitê de Administração em prol dos seus achismos é um crime institucional que não podemos mais tolerar!"
42070-43 = "A minha gestão sempre se norteou pela legalidade estrita dos manuais… as emergências exigiram sacrifícios…"
42070-45 = "Ei, Sumomo…#nVocê por acaso ganhou um Onigiri e comeu escondido…?"
42070-46 = "Fuaaah~… minha cabeça tá tombando de sono… a última coisa que eu quero é mastigar… Zzz…"
42070-47 = "Eu não tô perguntando se você quer, eu tô perguntando se você pegou a minha cota…"
42070-49 = "E mais um ponto vital: vocês esquecem que a Kaiser Corporation é a artéria financeira e estrutural de Kivotos."
42070-50 = "Kaiser Industry, Kaiser Construction, Kaiser Convenience…#nSe nós enforcarmos a holding com multas assassinas e congelamento de bens, a economia de Kivotos vai colapsar e teremos uma pandemia de desempregados nas ruas amanhã."
42070-51 = "O caos social resultante dessa punição cega seria incontrolável.#E quando as massas famintas marcharem com tochas para a porta do Conselho, quem de vocês vai botar a cara a tapa?!"
42070-52 = "……Considerando a teia venenosa que a Kaiser teceu na nossa infraestrutura,#ntalvez um acordo de multas bilionárias e sanções silenciosas seja o caminho mais pragmático…"
42070-54 = "Pst… Momoka…"
42070-55 = "Pode tirar o olho gordo, que esse pacote de batatas sabor ovas picantes é todinho meu. Não divido."
42070-56 = "Se o seu estômago tá roncando tão alto, mastiga a droga do Onigiri que a logística entregou em cada mesa.#n(Croc… croc…)"
42070-58 = "MAS EU TÔ DIZENDO QUE NENHUM ONIGIRI CHEGOU NA MINHA MESA, CARAMBA!!"
42070-62 = "……Parece que a exaustão minou a civilidade desta mesa e não chegaremos a um consenso lúcido hoje."
42070-63 = "Oficial Chefe. Eu proponho que suspendamos a sessão e retomemos as lâminas em uma data futura.#nO clima esquentou, e os ânimos dos conselheiros precisam esfriar para que a razão volte a operar."
42070-64 = "……Estou de acordo."
42070-65 = "Declaro a sessão de hoje suspensa por exaustão de pauta.#nO debate será retomado amanhã às primeiras horas."
42070-66 = "Obrigada pelo esforço e pela resistência de todas."
42070-74 = "Haaah…"
42070-75 = "Eu sabia que o peso dessa cadeira seria esmagador… mas isso foi um linchamento…"
42070-79 = "Um excelente trabalho resistindo na linha de frente hoje, Oficial Chefe."
42070-80 = "Ah, Diretora do Escritório de Defesa."
42070-81 = "Eu também agradeço o seu empenho e sua mediação incansável."
42070-82 = "Você ficou para trás no plenário vazio… algum problema urgente na sua jurisdição?"
42070-83 = "Não, a papelada está em dia. Só vim jogar conversa fora e ver se você ainda estava inteira.#nA matilha estava sedenta por sangue na votação agora há pouco, não é?"
42070-84 = "Não há por que exagerar. Faz parte do ofício."
42070-85 = "……Mas eu confesso que as posturas das executivas do comitê me dão dor de cabeça."
42070-86 = "Aquela sala existe para o choque de ideias produtivas… mas parece mais um berçário onde cada uma só quer gritar as próprias vontades e foder o coleguinha."
42070-87 = "A tarefa ingrata de filtrar esse egoísmo infantil e amarrar tudo em uma decisão que não quebre a cidade recai nos seus ombros, Rin.#nEu sinto a sua dor. É um trabalho muito ingrato."
42070-88 = "É o preço da liderança. E eu confesso que parte desse caos é fruto das minhas hesitações no passado."
42070-89 = "Eu vou ter que dobrar a espinha e gastar saliva até persuadir o conselho executivo, um por um."
42070-90 = "……Me perdoe a ousadia, Rin, mas por que você ainda se curva pedindo migalhas de consentimento a essas conselheiras?"
42070-91 = "O seu crachá diz 'Oficial Administrativa Chefe', mas você está sentada no Trono. Você é a Presidente Interina absoluta."
42070-93 = "Se você usasse a coroa de Presidente e enfiasse as ordens goela abaixo dessa burocracia inútil, a máquina de Kivotos não seria tão lenta.#nPor que você reluta em esmagá-las com a sua autoridade?"
42070-94 = "Autoridade absoluta… a 'Coroa'…"
42070-95 = "Isso não é uma ferramenta mágica, Diretora. É um cálice envenenado."
42070-96 = "Usar a força da cadeira para esmagar a oposição parece eficiente a curto prazo, mas é uma ditadura que quebra o espírito do governo e destrói quem está no topo."
42070-97 = "Eu não posso fuzilar institucionalmente quem não concorda com as minhas ideias. A lei não me permite ser um tirano."
42070-98 = "E sendo perfeitamente franca com você… eu carrego uma síndrome de impostora esmagadora todos os dias.#nEu não acho que estou preenchendo os sapatos da Presidente como deveria…"
42070-99 = "Haaah…"
42070-101 = "……Você tem toda a razão. Depois de ouvir essa filosofia fraca e covarde da sua boca, eu tenho a absoluta certeza.#nVocê não tem as garras e a frieza necessárias para ser a Presidente."
42070-105 = "……O quê?"
42070-106 = "……Shiranui. O que significa esse ataque gratuito e rasteiro?"
42070-109 = "Significa que o meu estômago embrulha toda vez que olho pra você bancando a santa humilde e incompetente, Rin."
42070-110 = "Você é uma burocrata sem talento, sem visão de futuro e sem estômago. E ainda assim… aquela maldita Presidente escolheu encher você de favores e cegamente confiar o mundo às suas mãos trêmulas."
42070-111 = "Você senta no trono mais alto do mundo, e a sua atitude é fazer 'assembleias de rodinha' pra ouvir a opinião de choronas inúteis? Isso é patético."
42070-112 = "Democracia é uma mentira que serve pra alimentar parasitas e travar o progresso. Ficar alisando ego de covardes não conserta o mundo."
42070-113 = "Kivotos não precisa de uma babá que chora no canto. Kivotos exige um 'Monstro'. Alguém com punhos de aço disposto a quebrar ossos e instaurar a ordem no caos."
42070-114 = "……Lave a boca antes de falar da Presidente.#nA líder dessa cidade ainda está desaparecida, Diretora Shiranui."
42070-115 = "E o meu juramento de sangue é aquecer e blindar o trono dela das cobras venenosas até que ela retorne."
42070-117 = "Fufu… Que lindo conto de fadas heroico e ingênuo."
42070-118 = "Mas sabe o que eu desenterrei nos porões gélidos da Schale outro dia? Um tesourinho que destrói completamente o seu teatrinho moral."
42070-120 = "Olhe para este documento selado. É uma carta de sucessão confidencial… assinada com o sangue e a letra da própria Presidente Desaparecida."
42070-121 = "Uma carta de sucessão… da Presidente…?!"
42070-122 = "Leia com os próprios olhos. A tinta negra deixa explícito: Em caso de ausência extrema ou catástrofe sistêmica, as rédeas absolutas da Presidência Interina e o controle militar da cidade não devem ser entregues ao cargo de Oficial Administrativa… mas sim, e exclusivamente, à cadeira do Escritório de Defesa."
42070-123 = "Traduzindo a papelada pro seu cérebro chocado: o 'Trono' que você usurpou ilegalmente…#nnunca pertenceu a você, Rin.#nEle sempre foi desenhado para ser entregue à Shiranui Kaya."
42070-124 = "Isso… isso é um delírio criminoso e esquizofrênico…"
42070-125 = "……Mas não é curioso e fascinante que um documento que apaga o seu poder e te transforma numa criminosa…#nestivesse apodrecendo tão convenientemente em um cofre na Schale?"
42070-126 = "Vamos revisar os fatos. Quando a Presidente evaporou do mapa, a única, a absolutamente ÚNICA pessoa no mundo com senhas e acesso irrestrito aos cofres da Schale para plantar essa sujeira…"
42070-127 = "E a única criatura viva em Kivotos que se beneficiaria absurdamente da ocultação dessa carta… era você, Nanagami Rin."
42070-128 = "……Você acha que forjar uma carta barata e plantar isso como prova me intimida?#nOnde estão as provas forenses de que essa tinta saiu da caneta da Presidente?!"
42070-129 = "Eu exijo uma auditoria criminal dessa fraude e uma perícia de grafologia imediata!#nSe isso for falso, você vai apodrecer na cadeia por alt――"
42070-130 = "Ooh, mas é claro, a justiça cega e os trâmites periciais são vitais. Transparência acima de tudo.#nExatamente como nós confiamos cegamente naquele seu 'bilhetinho apressado' que deu superpoderes à Schale, lembra?"
42070-131 = "A questão é muito mais venenosa, Rin. Depois de tantas crises, escândalos e mortes sob a sua gestão caótica…#nVocê acha mesmo que o Comitê Executivo e os abutres da imprensa vão acreditar na sua palavra sobre a minha?"
42070-132 = "……Sua víbora."
42070-137 = "Oficial Administrativa Nanagami Rin. Pelos crimes de ocultação de provas presidenciais, alta traição e prevaricação institucional severa, você está sob prisão cautelar."
42070-138 = "Com base no Artigo 78 da Carta Magna do Conselho Executivo, sua imunidade parlamentar está revogada,#ne você será destituída de todos os seus poderes e removida fisicamente do cargo até que os interrogatórios sejam concluídos."
42070-139 = "Se a carta é um milagre real ou uma ficção, o tempo e os peritos dirão. Mas o fato inegável hoje é…#no trono está vazio de novo, e Kivotos clama por uma líder de verdade."
42070-140 = "……Foi você. A crise, as greves, o vazamento de informações da SRT, o boicote na Schale…#nCada peça podre foi minuciosamente calculada pela sua facção, não foi?!"
42070-141 = "Aproveite bem a cadeira suja de sangue que você roubou. Porque no segundo em que a Presidente pisar naquela porta, o seu teatrinho criminoso vai ser desmascarado e fuzilado."
42070-142 = "Fufu… a sua Presidente vai chegar e elogiar o 'Monstro' que teve colhões de varrer a lama que a incompetentemente passiva Rin acumulou durante meses."
42070-143 = "……"
42070-144 = "Seguranças, por favor. Escoltem a nossa ex-Oficial Chefe até a sua nova 'residência de detenção' com toda a brutalidade e o respeito que uma traidora merece.#nE, pelo amor de Deus, confisquem os eletrônicos e isolem as comunicações dela."
42070-145 = "Às ordens, Senhora Diretora!"
42070-154 = "Boa tarde… Diretora de Recursos Humanos. Os parasitas que marcharam para bater panela na porta do nosso prédio já foram contidos e direcionados, como ensaiado?"
42070-155 = "Ah, Diretora Shiranui. Seu timing é perfeito."
42070-156 = "O circo de horrores lá fora tá pegando fogo exatamente como a gente orquestrou. Bastou usar a indignação burra das massas sobre o lixo não recolhido e os acidentes nos trens para inflamar os protestos. As ruas tão cheias de bestas gritando."
42070-157 = "E o mais engraçado é que eu tinha reservado uma verba suja pra contratar manifestantes profissionais e baderneiros.#nMas as ovelhinhas tão com tanto ódio gratuito da Presidente Interina que tão vandalizando e gritando de graça pra gente!"
42070-158 = "Fufu… ovelhas burras que trabalham de graça são os meus peões favoritos.#nE elas dão um toque de credibilidade espetacular à nossa revolta fabricada."
42070-159 = "E os 'vazamentos confidenciais' anonimamente distribuídos pelo Escritório de Defesa foram a faísca perfeita pro barril de pólvora."
42070-160 = "Embora eu confesse que a precisão assustadora daqueles dossiês de acidentes e esquemas me causou calafrios…#nA menos que os espiões estivessem literalmente nas cenas dos crimes causando os problemas, é impossível obter laudos tão rápidos… Que bruxaria você usou?"
42070-161 = "……Saber como a salsicha é feita não faz a mínima diferença para o seu pagamento. Foco na execução do plano."
42070-162 = "T-Tudo bem… não precisa apontar a arma pra mim, eu não vi e não ouvi nada."
42070-163 = "O que importa é que temos uma horda armada acampada no portão, queimando fotos da Nanagami Rin. O barulho e o terror nas janelas é tão alto que até os conselheiros neutros vão votar a favor da guilhotina só pra poderem ir pra casa em paz."
42070-164 = "Quando o Voto de Desconfiança for puxado da gaveta daqui a pouco, o linchamento da Rin vai ser unânime e sem volta."
42070-165 = "Perfeito… Um trabalho limpo e mercenário. Eu agradeço.#nContinue jogando lenha na fogueira lá fora e garanta que ninguém apague o ódio delas."
42070-171 = "Heine, atualização de status. O manifesto diplomático fraudado para a Associação Desportiva foi despachado para os canais de mídia?"
42070-172 = "Missão cumprida e carimbada! O torpedo sujo foi enviado nos segundos exatos em que a burocracia do conselho adormeceu!"
42070-176 = "Aaaa… bem, 'segundos exatos' é modo de dizer, né…"
42070-177 = "O meu bucho tava roncando no limite da inanição, então eu tive que fazer uma parada tática obrigatória no refeitório pra mandar um panelão de curry pra dentro antes de hackear os servidores…"
42070-178 = "……Os detalhes repugnantes da sua dieta de porco são irrelevantes. Me dê os resultados políticos."
42070-179 = "A poção venenosa que você pingou fez efeito nos aliados dela?"
42070-180 = "E como! Quando a galera viu o laudo falso 'provando' que a Nanagami Rin falsificou orçamentos pra superfaturar as próprias mordomias, a revolta foi imediata.#nA nossa guilda não tolera roubo e corrupção sistêmica."
42070-181 = "Aliás, aquele boato suculento de que o atentado bomba do Esquadrão FOX na Torre do Conselho foi obra secreta encomendada pela própria Rin para justificar a matança e fechar a SRT… é tudo verdade mesmo, né?!#nA mulher é um monstro!"
42070-182 = "Pura verdade, um poço de maldade sem limites. ――Suas tarefas foram concluídas, estou encerrando as comunic――"
42070-183 = "Ei, espera aí! Sabe aquela cadela mascarada da FOX que veio me entregar os 'documentos vazados'?! A mulher não tem alma!#nEu tentei bater de frente e testar a força dela e ela deslocou o meu ombro com uma chave de braço sádica que estalou meus ossos!#nA SRT ensina tortura imobilizadora nos currículos ou o quê?!"
42070-184 = "……"
42070-185 = "Argh… eu devia ter pedido arrego assim que meus dedos ficaram dormentes…#nMeu ombro ainda tá fisgando agulhadas de dor malditas…"
42070-186 = "……Eu avisei que estava encerrando as comunicações, sua abominação tagarela."
42070-187 = "Eita, pera pera pera! Mudando o foco! Alguém descobriu quem foi a desgraçada que furtou o meu onigiri de pimenta do ref――"
42070-191 = "……O tabuleiro está perfeitamente limpo.#nCom as peças que eu armei e as mentiras pingando como ácido, o linchamento político de Nanagami Rin não tem salvação."
42070-192 = "E para o último prego no caixão do regime fracassado…"
42070-197 = "……Diretora? Acionamos a contingência midiática?"
42070-198 = "Sim, absolutamente… Preparar a Rede Nacional para a Transmissão de Emergência."
42070-199 = "Contate os chacais da Kronos e monopolizem todos os satélites dos distritos agora mesmo.#nAs ovelhas precisam ver com nitidez a cara do seu novo deus da salvação."
42070-200 = "……A votação interna do Voto de Desconfiança será uma mera formalidade carimbada em sangue e covardia.#nA vitória já foi escrita pelas minhas mãos."
42070-201 = "Providenciem os arranjos funerários da gestão da Rin."
42070-202 = "……E, escutem com muita atenção.#nComo o ápice do meu triunfo exige um convidado de honra para ver o espetáculo de perto… lavem o chão e preparem o banquete na sala de recepção."
42070-203 = "Às ordens. O nome no convite de honra é――"
42070-206 = "――O famoso Professor da Schale."
42070-208 = "Próximo Episódio: Uma Nova Liderança Interina"