[translation]
42070-1 = "Episódio 7; Golpe de Estado"
42070-2 = "（Algumas horas antes do anúncio da declaração de emergência…… Conselho Estudantil Geral — Sala de Reuniões）"
42070-5 = "……A próxima pauta é decidir a punição para a #nKaiser Corporation e sua diretoria, que tentaram tomar o poder do Conselho Estudantil Geral ao incitar uma rebelião durante a crise."
42070-6 = "Normalmente, isso deveria ter sido tratado como prioridade máxima #nassim que o Comitê Administrativo fosse normalizado, mas……."
42070-7 = "……Devido aos eventos anteriores, muitas das instalações de comunicação e logística de D.U. foram destruídas, #ne priorizamos a restauração de D.U. para a segurança e conveniência dos cidadãos, #npor isso a discussão deste caso foi adiada."
42070-11 = "……Obrigada."
42070-12 = "Como foi explicado agora, durante os eventos anteriores, a Kaiser Corporation #nliderou soldados para atacar o Conselho Estudantil Geral. Eles tomaram o controle da Torre Sanctum e #ntentaram usar sua capacidade para operar armas superantigas que eles mesmos escavaram."
42070-13 = "Felizmente, com a cooperação do Sensei do Schale e dos membros dos conselhos estudantis de cada distrito autônomo, #npudemos evitar que a situação piorasse, mas……."
42070-14 = "……Se não tivéssemos conseguido detê-los, não apenas o Conselho Estudantil Geral, #nmas o próprio Kivotos poderia ter entrado em colapso."
42070-15 = "Acredita-se que esses eventos ocorreram porque a Kaiser Corporation é uma megacorporação #ncapaz de controlar desde a indústria de defesa até a logística."
42070-16 = "Para garantir que tal situação nunca mais ocorra, #ndeveríamos aplicar o nível máximo de punição à Kaiser Corporation e à sua diretoria."
42070-20 = "Espere um pouco. É verdade que a Kaiser Corporation mobilizou soldados particulares para ocupar o Conselho Estudantil Geral à força, mas……."
42070-21 = "Eles só conseguiram entrar na Torre Sanctum tão facilmente porque a Administradora Rin abriu o Comitê de Contramedidas de Emergência por conta própria, o que não contribuiu para mergulhar o Conselho Estudantil Geral no caos?"
42070-23 = "Ma-mas, a Rin-senpai abriu o Comitê de Contramedidas de Emergência, mas dizer que isso foi o fator direto……"
42070-24 = "Então, como você explica o testemunho de que a Administradora Rin estava a bordo da arma superantiga escavada pela Kaiser Corporation?"
42070-25 = "……Na verdade, não existe a possibilidade de a Administradora Rin estar mancomunada com a Kaiser Corporation?"
42070-26 = "Que-que absurdo……."
42070-27 = "……É perfeitamente compreensível que vocês suspeitem de mim, já que sou uma das partes envolvidas no incidente."
42070-28 = "Assim que a moção sobre este caso for aprovada e a investigação contra a Kaiser Corporation começar, prometo que cooperarei de forma sincera."
42070-30 = "Ei, Aoi-senpai…… essa reunião ainda não vai acabar? #nNós nem almoçamos ainda."
42070-31 = "Ainda não, ainda restam cerca de três pautas, não é?"
42070-32 = "Já se passaram exatamente 8 horas, 32 minutos e 15 segundos desde o início…… #nEsse tipo de reunião maratona é normal no Gabinete de Defesa, não é?"
42070-33 = "Se contente com o onigiri que recebeu agora há pouco."
42070-35 = "A gente recebeu onigiri……?"
42070-37 = "Além disso, não foi a Administradora Rin quem concedeu poderes extrajudiciais ao Sensei do Schale?"
42070-38 = "Mesmo que o bilhete deixado pela Presidente do Conselho Estudantil Geral contivesse \"aquele\" conteúdo, #nnós nem sequer conseguimos verificar se é autêntico."
42070-39 = "……Não há dúvidas de que foi a Presidente do Conselho Estudantil Geral quem deixou o bilhete."
42070-40 = "Se for necessário, podemos verificar a autenticidade através de uma perícia grafotécnica——"
42070-41 = "Administradora-Chefe, as coisas têm uma ordem a ser seguida!"
42070-42 = "Mesmo sendo a representante da Presidente do Conselho Estudantil Geral, #nnão podemos ignorar suas ações que desrespeitam as decisões do Comitê Administrativo!"
42070-43 = "Eu sempre resolvo os problemas com base em procedimentos e regras, mas……."
42070-45 = "Ei, Sumomo. #nVocê recebeu algum onigiri?"
42070-46 = "Yaaawn…… estou com tanto sono que nem consigo comer onigiri……"
42070-47 = "Não, não é o seu, é a minha parte que……."
42070-49 = "Além disso, a Kaiser Corporation é uma das maiores empresas de Kivotos."
42070-50 = "Kaiser Industry, Kaiser Construction, Kaiser Convenience…… #nSe essas empresas pararem suas atividades, Kivotos ficará cheia de desempregados."
42070-51 = "Se isso acontecer, um caos sem precedentes é inevitável. #nQuem assumirá a responsabilidade por isso?"
42070-52 = "……Considerando a influência da Kaiser Corporation, #nserá que não poderíamos resolver apenas com a cobrança de multas……."
42070-54 = "Ei, Momoka……."
42070-55 = "Não adianta me olhar assim, não vou te dar esse salgadinho sabor mentaiko."
42070-56 = "Se está com fome, por que não come o onigiri que foi distribuído? (Croc, croc)"
42070-58 = "Não, eu já disse que não recebi onigiri nenhum!?"
42070-62 = "……Parece que será difícil continuar a discussão por mais tempo."
42070-63 = "Administradora-Chefe. Que tal encerrarmos por hoje e retomarmos em outro dia? #nAcho que todos vocês também precisam de um tempo para pensar."
42070-64 = "……Entendido."
42070-65 = "Vamos encerrar a sessão por hoje. #nA continuação será amanhã."
42070-66 = "Bom trabalho a todos."
42070-74 = "Ufa……."
42070-75 = "Eu já esperava, mas é mais difícil do que pensei……."
42070-79 = "Bom trabalho, Administradora-Chefe."
42070-80 = "Ah, Chefe da Sala de Defesa."
42070-81 = "Obrigada pelo seu trabalho também."
42070-82 = "Vir até aqui pessoalmente... você precisa de algo de mim?"
42070-83 = "Não, é apenas uma conversa casual. #nDe qualquer forma, o que aconteceu há pouco foi realmente difícil..."
42070-84 = "Não, não foi nada disso."
42070-85 = "...Os membros do conselho são realmente um problema."
42070-86 = "Deveria ser um lugar para debates, mas todos eles só querem falar o que pensam..."
42070-87 = "Eu imagino o quanto você, como Administradora-Chefe, deve estar sofrendo por ter que considerar a opinião de todos."
42070-88 = "Não há o que fazer. Chegamos a esse ponto por minha responsabilidade também."
42070-89 = "Não temos escolha a não ser convencer os membros do conselho aos poucos, com o tempo."
42070-90 = "...Será mesmo necessário buscar o consentimento dos membros do conselho?"
42070-91 = "Você é a Administradora-Chefe da Sala de Assuntos Gerais, mas também é a substituta da Presidente do Conselho Estudantil Geral."
42070-93 = "Se você usasse a autoridade de substituta da Presidente para dar ordens aos membros do conselho, #nnão conseguiria realizar o trabalho sem tantas complicações?"
42070-94 = "Autoridade, é..."
42070-95 = "Isso é como um cálice envenenado, Chefe da Sala de Defesa."
42070-96 = "Pode até ser um trunfo conveniente, mas quanto mais você o usa, mais destrói a si mesma."
42070-97 = "Não posso simplesmente usar minha autoridade para suprimir os outros só porque eles têm opiniões diferentes das minhas."
42070-98 = "Além disso, eu mesma... não tenho confiança de que estou exercendo as funções de substituta perfeitamente..."
42070-99 = "Haa..."
42070-101 = "...Como eu pensava, você não tem as qualificações para ser a substituta da Presidente do Conselho Estudantil Geral."
42070-105 = "............"
42070-106 = "...Chefe da Sala de Defesa, o que é isso?"
42070-109 = "Rin, eu sempre achei você um estorvo."
42070-110 = "Você não tem um pingo de habilidade, mas monopolizou a confiança da Presidente do Conselho Estudantil Geral..."
42070-111 = "E mesmo depois de se tornar a substituta, você ainda tenta avançar as coisas coletando opiniões ao seu redor..."
42070-112 = "Com esse tipo de política de massas, nada será resolvido."
42070-113 = "Kivotos deveria ser comandada por um super-humano."
42070-114 = "...A Presidente do Conselho Estudantil Geral ainda está desaparecida, Chefe Shiranui."
42070-115 = "E o papel da Administradora-Chefe é proteger o lugar dela."
42070-117 = "Fufu, será mesmo?"
42070-118 = "Na verdade, naquele dia, descobri algo interessante no subsolo do Schale."
42070-120 = "Isto é... a carta escondida da Presidente do Conselho Estudantil Geral."
42070-121 = "A carta... da Presidente do Conselho Estudantil Geral...?"
42070-122 = "Sim. De acordo com esta carta, quando algo acontecesse, a Presidente pretendia solicitar as funções de substituta à Chefe da Sala de Defesa, e não à Administradora."
42070-123 = "Ou seja, a pessoa que deveria ser a substituta da Presidente do Conselho Estudantil Geral não é você, mas sim eu."
42070-124 = "O que isso significa, afinal..."
42070-125 = "...A propósito, por que uma carta tão importante estava escondida no porão do Schale?"
42070-126 = "Na época em que a Presidente desapareceu, a única pessoa com autoridade para entrar e sair do Schale era você, Nanagami Rin."
42070-127 = "E a pessoa que mais se beneficia ao esconder esta carta também é... você."
42070-128 = "...Você tem provas de que isso foi escrito pela Presidente do Conselho Estudantil Geral?"
42070-129 = "Exijo uma perícia caligráfica. #nSe foi a própria Presidente quem criou, a assinatura também..."
42070-130 = "Claro, confirmar a autenticidade é importante. #nComo aquele memorando deixado na sala da Presidente."
42070-131 = "Mas... quantas pessoas no Conselho Estudantil Geral atual ainda restam que acreditariam nas suas palavras?"
42070-132 = "...Não pode ser."
42070-137 = "Administradora Nanagami Rin, estou prendendo você preventivamente sob suspeita de destruição de documentos públicos e abuso de autoridade."
42070-138 = "Com base no Artigo 78 do Regulamento dos Membros do Conselho Estudantil Geral, #nsuas funções como substituta da Presidente estão suspensas até que a investigação seja concluída."
42070-139 = "Independente da autenticidade da carta... #nprecisamos de uma nova substituta da Presidente do Conselho Estudantil Geral por enquanto, não é?"
42070-140 = "...Tudo isso foi planejado por você?"
42070-141 = "Quando a Presidente do Conselho Estudantil Geral retornar, tudo virá à tona."
42070-142 = "Fufu, não seria você quem seria culpada por ter deixado a situação chegar a esse ponto?"
42070-143 = "………。"
42070-144 = "Então, por favor, escoltem a Administradora-Chefe com cuidado. #nAh, e continuem monitorando-a depois disso."
42070-145 = "Sim, Chefe do Gabinete de Defesa!"
42070-154 = "Olá... Chefe do Gabinete de Recursos Humanos. A manifestação que está ocorrendo ao redor do prédio do Conselho Estudantil Geral está sendo controlada com sucesso?"
42070-155 = "Ah, Chefe do Gabinete de Defesa. Veio na hora certa."
42070-156 = "A manifestação está indo bem por enquanto. Quando convocamos os manifestantes usando como motivo os acidentes nas instalações públicas e a resposta incompetente do Gabinete de Tráfego e do Gabinete de Mediação, muitas pessoas apareceram."
42070-157 = "No início, eu pretendia contratá-los com dinheiro, mas #npor algum motivo, eles simplesmente assumiram o controle e começaram a agir por conta própria..."
42070-158 = "Hum, como esperado das alunas da minha antiga escola. Elas são bem espertas."
42070-159 = "Além disso, as informações que você enviou também foram úteis."
42070-160 = "No entanto, parecia haver muitas informações ali que só poderiam ser conhecidas por quem estava no local do acidente... Como exatamente você as obteve?"
42070-161 = "……Essas informações são necessárias para a manifestação?"
42070-162 = "Não... não são necessárias, mas..."
42070-163 = "Bem, não importa. De qualquer forma, há tantas alunas protestando na frente do prédio. Mesmo os funcionários neutros que não se interessam por disputas de facções vão acabar com uma má impressão da Administradora Rin."
42070-164 = "Se houver uma moção de desconfiança, muitos votarão a favor sem dizer nada..."
42070-165 = "Entendo... Bom trabalho. #nContinue com o controle da manifestação, por favor."
42070-171 = "Heine, como ficou o documento oficial que deveria ser enviado à Associação de Educação Física?"
42070-172 = "Como você pediu, enviei logo após o término da reunião!"
42070-176 = "Ah... bem, falando estritamente, não foi logo depois..."
42070-177 = "Eu estava com tanta fome que acabei comendo no refeitório depois que a reunião terminou..."
42070-178 = "……Não há necessidade de relatar detalhes tão triviais."
42070-179 = "E então, como estão as coisas por aí?"
42070-180 = "Quando ouviram que a Administradora Rin falsificou documentos oficiais para benefício próprio, #ntodos ficaram desapontados. Aqui somos rigorosos com má conduta e manipulação de informações."
42070-181 = "Falando nisso, é verdade que o ataque do FOX Squad ao Conselho Estudantil Geral da última vez #nfoi ordenado pela Administradora Rin? #nEntão foi por isso que ela estava com pressa para fechar o Colégio Especial SRT..."
42070-182 = "Sim, é verdade. Bem, o assunto era apenas esse—"
42070-183 = "Aquela raposa realmente não teve piedade. #nQuando tentei resistir, ela aplicou uma chave de braço em mim! #nEles ensinam técnicas de articulação no Colégio Especial SRT?"
42070-184 = "………。"
42070-185 = "Ugh, eu deveria ter batido naquela hora... #nMeu ombro ainda dói de quando ela me pegou..."
42070-186 = "……Heine, vou desligar."
42070-187 = "Ah, espere, espere. Quem foi que pegou meu bolinho de arroz de antes—"
42070-191 = "……Nesse ritmo, não haverá preocupações de que a moção de desconfiança seja rejeitada."
42070-192 = "Então, por último..."
42070-197 = "……Protocolo?"
42070-198 = "Sim, isso mesmo... Preparem-se para o anúncio da declaração de emergência imediatamente."
42070-199 = "Por favor, entrem em contato com o Canal Chronos e as emissoras de cada distrito o quanto antes. #nJá que levará tempo para preparar o equipamento de filmagem."
42070-200 = "……A moção de desconfiança terminará rapidamente. #nO resultado já está praticamente decidido."
42070-201 = "Então, prepare-se com isso em mente."
42070-202 = "……Ah, e mais uma coisa, estamos esperando a visita de um convidado muito importante, #nentão, por favor, preparem a recepção."
42070-203 = "Sim, o nome é—"
42070-206 = "——Sensei(a) [USERNAME]."
42070-208 = "Próximo episódio: O Novo Substituto"
