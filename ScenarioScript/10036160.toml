10036160-38 = "私も、思い出に残る物が良いと思う。"
10036160-39 = "え、えへへ。#nじゃあ、みんなで撮りましょう……！"
10036160-40 = "こ、こちらへ……！"
10036160-49 = "記念写真か……。"
10036160-50 = "何かポーズを取るべきか？"
