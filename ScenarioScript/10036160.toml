[translation]
10036160-1 = "Como o esquadrão guarda suas memórias"
10036160-3 = "Finalmente...!"
10036160-4 = "Com isso..."
10036160-5 = "Sério mesmo...!"
10036160-6 = "Concluímos...!"
10036160-11 = "Parabéns!"
10036160-12 = "Vocês são os primeiros a completar o nível avançado!"
10036160-13 = "Vamos, escolham o prêmio que quiserem!"
10036160-14 = "Será que é a última edição da revista?"
10036160-15 = "Parabéns, Hiyori."
10036160-16 = "E-eu posso escolher mesmo!?"
10036160-17 = "Começamos isso por sua causa, Hiyori."
10036160-18 = "E-entendo. Então..."
10036160-22 = "E-eu vou querer tirar uma foto impressa...!"
10036160-26 = "Não prefere a última edição da revista?"
10036160-27 = "Não precisa se preocupar com a gente."
10036160-28 = "E-eu realmente quero isso..."
10036160-29 = "Revistas sempre lançam edições novas, mas..."
10036160-30 = "Talvez não tenhamos outra chance de tirar fotos juntas..."
10036160-31 = "Além disso, o Sensei sempre me dá revistas de vez em quando... hehe."
10036160-32 = "Você só pede para ele comprar para você..."
10036160-33 = "Hiyori..."
10036160-37 = "...É verdade, a Hiyori tem razão."
10036160-38 = "Eu também acho que algo que guarde uma memória é melhor."
10036160-39 = "E-hehe. Então, vamos tirar uma foto juntas...!"
10036160-40 = "P-por aqui...!"
10036160-49 = "Uma foto comemorativa, hein..."
10036160-50 = "Devo fazer alguma pose?"
10036160-51 = "Tudo bem, pode ser normal."
10036160-52 = "Fufu, sorriam. Sa-chan, Misaki também."
10036160-54 = "Então, vou tirar!"
10036160-55 = "3, 2, 1!"
10036160-64 = "Aqui estão as fotos para cada uma!"
10036160-68 = "...Nossa, ficou bem boa."
10036160-69 = "Todas estão sorrindo."
10036160-70 = "Sim, todas parecem felizes..."
10036160-71 = "Obrigada, Hiyori."
10036160-72 = "E-hehe..."
10036160-73 = "Então, para onde vamos agora?"
10036160-74 = "Agora?"
10036160-75 = "Sim. Tem muitas coisas que quero aproveitar com todas vocês."
10036160-76 = "Isso é só o começo, Sa-chan."
10036160-78 = "É-é verdade! Porque ainda tem muita coisa que quero fazer!"
10036160-79 = "Misaki, você também, né?"
10036160-80 = "F-façam o que quiserem."
10036160-82 = "Ah... acho que não tem problema aproveitar um pouco mais hoje."
