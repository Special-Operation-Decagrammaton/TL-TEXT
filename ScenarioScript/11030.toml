[translation]
11030-1 = "Episódio 3;Ser um Adulto é Incrível!"
11030-2 = "Sala do clube da Força-Tarefa Hipotecária"
11030-3 = "Nossa, nunca pensei que ganharíamos. A Gangue do Capacete parecia determinada."
11030-4 = "Hoshino-senpai... Se não tivessemos ganhado #na escola viraria um esconderijo para delinquentes..."
11030-5 = "A orientação do Sensei nos ajudou muito. Foi completamente diferente de quando era só nós."
11030-6 = "Este é o poder de um adulto...#nA forma de que você utilizou recursos e munição. Adultos são incríveis."
11030-7 = "Parece até que você tem um crush, Shiroko-chan. #nAgora que acabou posso voltar a dormir?."
11030-8 = "Pare de provocar a Shiroko desse jeito, Hoshino-senpai! #nE você já não dormiu o suficiente?"
11030-9 = "Eita, parece que alguém tá levando uma bronca!"
11030-10 = "Haha... Nós deviamos nos introduzir, Sensei."
11030-11 = "Somos da Força-Tarefa Hipotecária de Abydos."
11030-12 = "Sou Ayane, aluna do primeiro ano, secretaria e operadora da força-tarefa."
11030-13 = "Esta é a Serika, também do primeiro ano."
11030-14 = "Oi."
11030-15 = "Nonomi-senpai e Shiroko-senpai são estudantes do segundo ano."
11030-16 = "Oie, Sensei!"
11030-17 = "Nos vimos antes."
11030-18 = "...Ah, não é como se eu estivesse tentando soar especial."
11030-19 = "E esta é a presidente."
11030-20 = "Hoshino, uma veterana do terceiro ano."
11030-21 = "Prazer em conhecê-lo, Sensei."
11030-22 = "Como você pode ver, nossa escola está em crise...#nEntão solicitamos o apoio de Schale, e você nos ajudar a superar a crise, Sensei."
11030-23 = "Se não fosse por você, a escola teria sido capturada, nem tenho palavras para te agradecer..."
11030-24 = "[s] Perguntar o propósito da Força-Tarefa Hipotecária."
11030-25 = "Deixe-me explicar. O objetivo da Força-Tarefa Hipotecária é restaurar Abydos à sua antiga glória."
11030-26 = "Yeah! Nós somos o único clube na escola composta por todos as alunas!#nQuero dizer, somos as únicas cinco alunas da escola."
11030-27 = "As outras estudantes transferiram para outras escolas, ou abandonaram a escola, ou sairam da cidade."
11030-28 = "Com a escola nesse estado, cidadãs da Cidade Acadêmica foram embora.#nE agora temos que lidar com bandidas, como a Gangue do Capacete Kata-Kata."
11030-29 = "Atualmente é difícil protegermos a escola sozinhas. É uma situação precária..."
11030-30 = "Se não tivéssemos recebido o apoio de Schale... desta vez, teríamos perdido tudo."
11030-31 = "Sério. Os suprimentos tinham acabado.#nVocê apareceu na hora perfeita, Sensei."
11030-32 = "Yeah, yeah! Agora não precisamos mais nos preocupar com a Gangue do Capacete. O poder de um adulto é incrível☆"
11030-33 = "Não, é só questão de tempo até elas voltarem a nos atacar."
11030-34 = "Ah, provavelmente. Elas são tão persistentes."
11030-35 = "Quem sabe até quando isso vai durar?#nNós temos muitos outros problemas além da Gangue do Capacete..."
11030-38 = "Eu tenho um plano."
11030-39 = "Huh!? Hoshino-senpai com um plano!?"
11030-40 = "Impossível...!?"
11030-41 = "Eu sei que estou ficando velha, mas sinto um pouco magoada com essa reação toda.#nAté um Oji-san faz as coisas direito de vez em quando."
11030-42 = "...Então, qual é o seu plano?"
11030-43 = "A Gangue do Capacete deve atacar novamente em alguns dias."
11030-45 = "Então, pensei em aproveitar esse momento e atacar o posto avançado delas. Elas provavelmente estão mais exaustas agora."
11030-46 = "A-Agora?"
11030-47 = "Sim, agora. Com o Sensei aqui, podemos resolver isso logo."
11030-48 = "Verdade. O posto avançado da Gangue do Capacete fica a cerca de 30km daqui, então acho que devemos partir agora."
11030-49 = "Sou a favor. Não creio que elas sequer sonham que haveria um contra-ataque neste momento."
11030-50 = "Bem, isso é verdade... O que acha, Sensei?"
11030-51 = "[s] \"Eu concordo.\""
11030-54 = "Ótimo, agora que recebemos a aprovação do Sensei, vamos."
11030-55 = "Vamos aproveitar essa oportunidade."
11030-56 = "Okey! Vamos!"
11030-58 = "Estão na área onde dizem que fica o esconderijo da Gangue do Capacete Kata-Kata."
11030-59 = "Multiplos sinais inimigos foram detectados num raio de 15km."
11030-60 = "O inimigo provavelmente está ciente da sua chegada.#nNão baixe a guarda!"