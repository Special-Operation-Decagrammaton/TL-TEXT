[translation]
11030-1 = "Episódio 3: O poder dos adultos é incrível!"

11030-2 = "Força Tarefa/Sala de Aula"

11030-3 = "Nossa, nunca pensei que fosse ganhar. Parecia que a Equipe Capacete também estava muito preparada para isso."

11030-4 = "Nunca pensei que venceria, Hoshino-senpai...#nSe eu não vencer, a escola vai virar um esconderijo para delinquentes..."

11030-5 = "A orientação do professor foi boa. Foi completamente diferente de quando éramos só nós."

11030-6 = "Este é o poder dos adultos...#nUma tremenda quantidade de recursos e equipamentos, e até comando de batalha. Os adultos são incríveis."

11030-7 = "Eu estive sozinho até agora, Shiroko-chan. #nGraças ao papai voltando para casa, mamãe pode dormir profundamente."

11030-8 = "Não, não, pare de fazer piadas estranhas! Professor, você terá problemas! #nE o presidente dorme lá o tempo todo!"

11030-9 = "Sim, isso é tão triste."

11030-10 = "Ahaha... estou um pouco atrasado, mas gostaria de cumprimentá-lo novamente, Sensei."

11030-11 = "Somos a Força-Tarefa de Abydos."

11030-12 = "Sou Ayane, aluna do primeiro ano responsável pela secretaria e operadora do comitê..."

11030-13 = "Esta também é uma Celica de 1 ano."

11030-14 = "Obrigado."

11030-15 = "Nonomi-senpai e Shiroko-senpai são estudantes do segundo ano."

11030-16 = "Muito obrigado, professor."

11030-17 = "A primeira pessoa que conheci na beira da estrada fui eu."

11030-18 = "...Ah, não é como se eu estivesse montando."

11030-19 = "E este é o presidente,"

11030-20 = "Sou Hoshino, um veterano do terceiro ano."

11030-21 = "Prazer em conhecê-lo, professor."

11030-22 = "Como vocês podem ver, nossa escola está em crise...#nEntão solicitamos o apoio da Placa de Petri, e veio a professora, que nos ajudou a superar a crise."

11030-23 = "Se não fosse pela professora, a escola poderia ter sido assumida pelas pessoas de antes, e não tenho como agradecer o suficiente..."

11030-24 = "[s] Pergunte o que é a força-tarefa."

11030-25 = "Isso mesmo, deixe-me explicar. A força-tarefa é um clube de voluntários que se reúne para reviver Abydos."

11030-26 = "Yeah, yeah! É a única atividade do clube na escola composta por todos os alunos! #n Embora haja todos os alunos na escola, somos apenas cinco."

11030-27 = "Outros estudantes transferiram escolas, abandonaram a escola e deixaram a cidade."

11030-28 = "Como a escola é assim, a maioria dos residentes da Cidade Acadêmica desapareceu e a escola está sendo atacada por bandidos de terceira categoria, como a Gangue do Capacete Katakata."

11030-29 = "Atualmente é difícil protegermos a escola sozinhos. Como estudante atual, isso é constrangedor, mas..."

11030-30 = "Se não tivéssemos recebido o apoio da Placa de Petri... desta vez, teríamos perdido tudo."

11030-31 = "Certo. Os suprimentos estavam acabando, então eu estava realmente preparado. Você apareceu em uma hora muito boa, senhor."

11030-32 = "Yeah, yeah! A Brigada de Capacetes não existe mais. O poder dos adultos é incrível☆"

11030-33 = "No entanto, eles não são o tipo de pessoa que impediria um ataque."

11030-34 = "Ah, certamente. Eles são tão persistentes, não são?"

11030-35 = "Quanto tempo teremos para continuar esta guerra de desgaste? #nMesmo tendo muitos problemas além da Brigada de Capacetes..."

11030-38 = "Então, decidi fazer um pequeno plano."

11030-39 = "Huh! ? Hoshino-senpai! ?"

11030-40 = "Sem chance...! ?"

11030-41 = "Bem, não importa o quanto eu reaja, sinto-me um pouco magoado com essa reação. #nAté os tios fazem as coisas direito de vez em quando."

11030-42 = "...Então, qual é o seu plano?"

11030-43 = "O Team Helmet deve atacar novamente em alguns dias. #nEste ciclo já dura há algum tempo."

11030-45 = "Então, pensei em aproveitar esse momento e atacar o posto avançado deles. Eles provavelmente estão mais exaustos agora."

11030-46 = "E-é agora?"

11030-47 = "sim. Agora que tenho um professor, posso resolver coisas problemáticas, como reabastecer suprimentos."

11030-48 = "Eu vejo. O posto avançado do Team Helmet fica a cerca de 30 km daqui, então acho que devemos partir agora."

11030-49 = "Eu acho que é bom. Não creio que eles sequer sonhassem que haveria um contra-ataque neste momento."

11030-50 = "Bem, isso é verdade... e você, professor?"

11030-51 = "[s] Eu concordo."

11030-54 = "Tudo bem, agora que recebi a aprovação do professor, vou continuar e fazer isso."

11030-55 = "Isso significa que você tem que se apressar."

11030-56 = "Sim ~ Bem, então, Shuppatsu!"

11030-58 = "Entramos na área onde dizem que fica o esconderijo da Gangue de Capacetes Kataka."

11030-59 = "Muitos sinais inimigos foram detectados num raio de 15 km."

11030-60 = "O inimigo provavelmente está ciente da sua chegada. #nAgora é hora de usar sua força!"

