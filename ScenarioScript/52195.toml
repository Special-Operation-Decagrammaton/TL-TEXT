[translation]
52195-9 = "Já estamos andando há meio dia, e..."
52195-10 = "Só tem neve e rochas por aqui! Tem certeza de que é por aqui mesmo!?"
52195-11 = "……Está correto."
52195-12 = "A neve está mais profunda do que daquela vez, mas este toco de árvore, o caminho que leva ao templo... eu me lembro."
52195-13 = "Este é o Templo do Crepúsculo."
52195-14 = "Chegamos?"
52195-15 = "Senpai, mas este lugar... não parece ter ninguém aqui..."
52195-16 = "……Parece que está em ruínas há muito tempo."
52195-17 = "Haha... Ahahahaha!"
52195-18 = "Nagusa-chan, o que exatamente você está planejando?"
52195-19 = "Me trazer para um lugar em ruínas como este..."
52195-20 = "Você estava se divertindo me vendo te seguir feito uma boba, não estava?"
52195-21 = "Ou será que... você acha que tem alguma chance de vencer se lutarmos aqui?"
52195-22 = "Sinceramente... estou muito, muito decepcionada!"
52195-23 = "Não sei que tipo de truque você estava planejando, mas tudo, absolutamente tudo, é inútil!"
52195-24 = "Vocês vão ter um sono eterno aqui, afinal...!"
52195-25 = "Finalmente revelou sua verdadeira face...!"
52195-26 = "Não vamos ser derrotados tão facilmente!"
52195-30 = "Não, é aqui mesmo. Eu não menti."
52195-35 = "Foi aqui que recebi uma carta endereçada ao Sensei de uma garota que se autodenominava Kuzunoha."
52195-36 = "Quando vim aqui antes, as cerejeiras estavam em plena floração — e um belo caminho se estendia à frente."
52195-37 = "Que história absurda..."
52195-38 = "Se eu usar as palavras dela, o Crepúsculo é um lugar onde toda a realidade perde o sentido."
52195-39 = "Lá dentro, é um mundo onde as flores de cerejeira da primavera e os lírios-aranha do outono florescem ao mesmo tempo. Não seria estranho se o passado e o presente estivessem entrelaçados."
52195-41 = "Quando o crepúsculo vago se espalha pelo céu..."
52195-43 = "Trocando palavras entre o sol poente e a escuridão da noite..."
52195-45 = "O nome dela é..."
52195-51 = "Comitê de Mediação de Conflitos Hyakkiyako — Primeira Presidente, Kuzunoha."
52195-54 = "Ué? Até agora pouco eram ruínas caindo aos pedaços..."
52195-55 = "As flores de cerejeira estão desabrochando..."
52195-63 = "Pensei que estivesse barulhento demais, seriam visitantes...? Espero que não sejam convidados indesejados."
52195-64 = "O nome dela é..."
52195-65 = "……Comitê de Mediação de Conflitos Hyakkiyako, Presidente Interina, Goryou Nagusa."
52195-66 = "Como você pediu, trouxe o Sensei do Schale."
52195-73 = "Fufu... Quem diria que nos encontraríamos novamente, minha querida kouhai."
52195-75 = "Próximo episódio: A Verdadeira Forma"
