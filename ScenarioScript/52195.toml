[translation]
52195-9 = "Já faz meio dia que estamos andando......"
52195-10 = "Só tem neve e pedras! Você tem certeza que é por aqui!?"
52195-11 = "......Sim, está certo."
52195-12 = "A neve está mais funda do que naquela época, mas este toco de árvore, o caminho que leva ao templo...... eu me lembro."
52195-13 = "Este é o Templo do Crepúsculo."
52195-14 = "Chegamos?"
52195-15 = "Senpai, mas aqui...... não parece ter ninguém......"
52195-16 = "......Parece que está em ruínas há muito tempo."
52195-17 = "Haha...... Ahahahaha!"
52195-18 = "Nagusa-chan, o que você pretende com isso?"
52195-19 = "Me trazer até essa ruína......"
52195-20 = "Você estava se divertindo me vendo te seguir feito uma boba?"
52195-21 = "Ou será que...... você acha que tem alguma chance de vitória lutando aqui?"
52195-22 = "Sério...... eu estou muuuito decepcionada!"
52195-23 = "Não sei que tipo de truque você planejou, mas tudo, absolutamente tudo, é inútil!"
52195-24 = "Vocês vão dormir para sempre aqui......!"
52195-25 = "Finalmente mostrou sua verdadeira face......!"
52195-26 = "Não vamos ser derrotadas sem lutar!"
52195-30 = "Não, é aqui mesmo. Eu não menti."
52195-35 = "Foi aqui que recebi uma carta endereçada ao Sensei de uma garota que se intitulava Kuzunoha."
52195-36 = "Quando vim aqui antes, as cerejeiras estavam em plena floração―― um caminho lindo se estendia à frente."
52195-37 = "Que história absurda――"
52195-38 = "Pegando emprestado as palavras dela, o Crepúsculo é o lugar onde toda a realidade perde o significado."
52195-39 = "Lá dentro, é um mundo onde as cerejeiras da primavera e os lírios-aranha do outono florescem ao mesmo tempo. #n Mesmo que o passado e o presente se cruzassem lá, não seria estranho."
52195-41 = "Quando o crepúsculo vago tinge o céu――"
52195-43 = "Trocamos palavras entre o sol poente e a escuridão da noite――"
52195-45 = "O nome dela é――"
52195-51 = "Comitê de Mediação de Conflitos Hyakkaryouran―― primeira presidente, Kuzunoha."
52195-54 = "Ué? Até agora pouco eram ruínas em frangalhos, mas......"
52195-55 = "As flores de cerejeira estão desabrochando......"
52195-63 = "Pensei que estivesse barulhento demais, seriam visitantes......? #n Espero que não sejam visitantes indesejados."
52195-64 = "O nome dela é――"
52195-65 = "......Comitê de Mediação de Conflitos Hyakkaryouran, presidente interina, Nagusa Goryou."
52195-66 = "Como você desejava, trouxe o Sensei da Schale."
52195-73 = "Fufu...... quem diria que nos encontraríamos de novo, minha adorável sucessora."
52195-75 = "Próximo Episódio; A Verdadeira Forma"

