[translation]
52195-9 = "もう半日も歩いているのに……。"
52195-10 = "雪と岩しかないじゃないですかぁ！本当にこっちなんですぅ！？"
52195-11 = "……合ってるよ。"
52195-12 = "あの時よりも雪が深いけど、この切り株も、寺院に続く道も……覚えてる。"
52195-13 = "ここが、黄昏の寺院だよ。"
52195-14 = "着いたのか？"
52195-15 = "先輩、でもここは……人がいるようには……。"
52195-16 = "……もうずっと前から朽ち果ててるように見えるけど。"
52195-17 = "ははっ……アハハハッ！"
52195-18 = "ナグサちゃん、一体なんのつもりですかぁ？"
52195-19 = "こんな廃墟に手前を連れてきて……。"
52195-20 = "のこのこくっついてくる手前を見て、面白がっていたんですかぁ？"
52195-21 = "それとも……ここで戦えば、勝算があるとでも？"
52195-22 = "本当に……ほんっとうにガッカリですぅ！"
52195-23 = "どんな小細工を考えてたのかは知りませんが、全部ぜぇんぶ、無駄ですよぉ？"
52195-24 = "[ruby=てめぇ]手前[/ruby]らはここで、永遠の眠りにつくんですからねぇ……！"
52195-25 = "ついに本性を出したね……！"
52195-26 = "大人しくやられるかよ！"
52195-30 = "いや、ここだよ。嘘なんて吐いてない。"
52195-35 = "私はここでクズノハと名乗る少女から先生宛ての手紙を受け取った。"
52195-36 = "以前ここに来た時は桜が満開で――美しい道が続いていた。"
52195-37 = "そんなバカな話――"
52195-38 = "彼女の言葉を借りるなら、黄昏は現実の全てが意味を失う場所。"
52195-39 = "あの中は、春の桜と秋の彼岸花が同時に咲いている世界。#n[ruby=むかし]過去[/ruby]と[ruby=いま]現在[/ruby]が交わっていたとしても、不思議じゃない。"
52195-41 = "おぼろげな夕闇が、空に染み渡るとき――"
52195-43 = "沈む陽と夜闇の[ruby=はざま]間[/ruby]で言葉を交わす――"
52195-45 = "其の名は――"
52195-51 = "百花繚乱紛争調停委員会――初代委員長クズノハ。"
52195-54 = "あれ？さっきまでボロボロの廃墟だったのに……。"
52195-55 = "桜の花が、咲いておりますの……。"
52195-63 = "やけに騒がしいと思うたら、客人かの……？#n招かれざる客でないと良いのじゃが。"
52195-64 = "かの名は――"
52195-65 = "……百花繚乱紛争調停委員会、委員長代理の御稜ナグサ。"
52195-66 = "あなたの希望通り、シャーレの先生を連れてきたよ。"
52195-73 = "ふふ……また会えるとはのう、かわいい後輩や。"
52195-75 = "次回;本当の姿"
