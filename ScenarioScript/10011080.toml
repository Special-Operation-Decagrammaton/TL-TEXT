[translation]
10011080-1 = "第8話;せき止めていたもの"
10011080-3 = "[ns] \"中止って……。\""
10011080-4 = "遅まきながら状況は把握しました。"
10011080-5 = "よりによってこの交流会で、こんなことが起こるだなんて……"
10011080-6 = "どうしてこのタイミングまで誘拐の件についての連絡が無かったのか、お伺いしたいところではありますが……。"
10011080-7 = "うっ……そ、それは……！"
10011080-8 = "それについては一旦、不問といたします。色々と頑張ってくださったような感じもありますし。"
10011080-9 = "しかしこの件は、一旦ここまでです。"
10011080-10 = "手を引いて、という、ことですか……？"
10011080-11 = "はい。幸いにも、逃走中の「魑魅一座・気まぐれ流」の現在地は把握できています。"
10011080-12 = "百花繚乱も召集済みです。以後は陰陽部の方で受け持ちますので、"
10011080-13 = "それでは……"
10011080-18 = "ま、待ってください！"
10011080-25 = "そうです、まだ公演が、失敗したわけでは……！"
10011080-26 = "みんなで、力を合わせて、ここまで来たんです。あとは魑魅一座さえ、捕まえられれば……！"
10011080-28 = "その心意気は結構ですが……それは本当に、全員の総意なのですか？"
10011080-29 = "肝心な方だけは、何も口にされてない気がしますが。"
10011080-30 = "……！"
10011080-34 = "……ふう。"
10011080-35 = "外部的にはまだ公演が続いてることになっていますが、"
10011080-36 = "正直に申し上げます。"
10011080-37 = "すでに公演は失敗です。"
10011080-38 = "その後始末を、正式な部活でもない忍術研究部の皆さんに任せるわけにはいかないのです。"
10011080-39 = "ですから、ここで手を引いてください。"
10011080-40 = "正式な部活になる方法でしたら、"
10011080-41 = "他にもあるでしょう。"
10011080-42 = "うっ……！"
10011080-48 = "……カホの、言う通りかもしれない。"
10011080-49 = "部長……？"
10011080-50 = "……。"
10011080-52 = "[ns] \"ミチル……。\""
10011080-53 = "最初から、全部私のワガママのせいだった。私が欲張ったせいで……。"
10011080-54 = "ごめん、みんな……カホも、先生殿も……。"
10011080-55 = "こんなことに巻き込んで……。"
10011080-60 = "私のせいであの子も……イブキも、泣いてるかもしれない。"
10011080-61 = "私が、バカなことを考えたせいで……"
10011080-63 = "だから、ここでもう終わ――"
10011080-64 = "……ダメです！"
10011080-69 = "カホさんの、仰ることは……間違ってないかも、しれません。"
10011080-70 = "私には、分からないことばっかりです……まだ、忍者のことも、今回のことも……。"
10011080-71 = "申請書の件も……どうしてそれを、私や、イズナちゃんに言ってもらえなかったのかも……。"
10011080-72 = "私はただ、身体が大きいだけだから……できないことだらけで、分からないことだらけです！"
10011080-73 = "ツクヨ……。"
10011080-74 = "ですがそんなの、今はどうでも良いんです……！だって、私たち、約束したじゃないですか……！"
10011080-75 = "約束……？"
10011080-76 = "イブキちゃんに、怖がらないでって――"
10011080-77 = "「何があっても絶対助けに行く」って！"
10011080-84 = "……！"
10011080-85 = "忍者の鉄則その参！「忍者とは、一度交わした約束は――"
10011080-86 = "――必ず守るもの」、です！"
10011080-87 = "だから、先生……！"
10011080-88 = "[s] \"うん。\""
10011080-89 = "引き下がれない、と……仕方ありませんね。"
10011080-90 = "ならばこちらも、実力行使とさせていただきます。"
