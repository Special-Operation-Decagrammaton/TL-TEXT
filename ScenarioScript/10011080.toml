[translation]
10011080-1 = "Episódio 8; O que estava contido"
10011080-3 = "[ns] \"Cancelado...?\""
10011080-4 = "Embora um pouco tarde, compreendi a situação."
10011080-5 = "Que algo assim acontecesse justamente neste evento de intercâmbio..."
10011080-6 = "Eu gostaria de perguntar por que não fomos informados sobre o sequestro até este momento, mas..."
10011080-7 = "Ugh... i-isso é...!"
10011080-8 = "Deixaremos isso de lado por enquanto. Parece que vocês se esforçaram bastante, de qualquer forma."
10011080-9 = "No entanto, este caso termina aqui."
10011080-10 = "Você quer dizer... que devemos nos retirar?"
10011080-11 = "Sim. Felizmente, já localizamos o paradeiro do \"Grupo Chimi - Estilo Caprichoso\" que está em fuga."
10011080-12 = "O Hyakkiyako Ryoran já foi convocado. De agora em diante, o Departamento Yin-Yang cuidará disso, então..."
10011080-13 = "Sendo assim..."
10011080-18 = "E-espere, por favor!"
10011080-25 = "Isso mesmo, a apresentação ainda não fracassou...!"
10011080-26 = "Todos nós unimos forças e chegamos até aqui. Só precisamos capturar o Grupo Chimi...!"
10011080-28 = "Admiro sua determinação, mas... isso é realmente o consenso de todos?"
10011080-29 = "Sinto que a pessoa mais importante não disse nada."
10011080-30 = "……！"
10011080-34 = "……Ufa."
10011080-35 = "Externamente, a apresentação ainda está acontecendo, mas..."
10011080-36 = "Serei honesta."
10011080-37 = "A apresentação já é um fracasso."
10011080-38 = "Não posso deixar que o Clube de Pesquisa Ninja, que nem é um clube oficial, cuide das consequências disso."
10011080-39 = "Portanto, retirem-se agora."
10011080-40 = "Se vocês querem se tornar um clube oficial,"
10011080-41 = "existem outros meios para isso."
10011080-42 = "Ugh...!"
10011080-48 = "……Talvez a Kaho esteja certa."
10011080-49 = "Presidente...?"
10011080-50 = "……."
10011080-52 = "[ns] \"Michiru...\""
10011080-53 = "Desde o início, tudo foi culpa do meu egoísmo. Por eu ter sido gananciosa..."
10011080-54 = "Desculpem, pessoal... Kaho, Sensei..."
10011080-55 = "Por envolver vocês nisso..."
10011080-60 = "Por minha causa, aquela criança também... Ibuki pode estar chorando agora."
10011080-61 = "Por eu ter pensado em algo tão estúpido..."
10011080-63 = "Por isso, vamos terminar aqui—"
10011080-64 = "……Não pode!"
10011080-69 = "O que a Kaho-san disse... talvez não esteja errado."
10011080-70 = "Eu não entendo nada... ainda não entendo sobre os ninjas, nem sobre o que aconteceu desta vez..."
10011080-71 = "Sobre o formulário de inscrição também... por que não nos contaram, a mim ou à Izuna-chan..."
10011080-72 = "Eu só tenho um corpo grande... então estou cheia de coisas que não consigo fazer e coisas que não entendo!"
10011080-73 = "Tsukuyo..."
10011080-74 = "Mas isso não importa agora...! Porque nós fizemos uma promessa, não fizemos...!"
10011080-75 = "Uma promessa...?"
10011080-76 = "Dizer para a Ibuki-chan não ter medo—"
10011080-77 = "\"Não importa o que aconteça, nós vamos te salvar\"!"
10011080-84 = "……!"
10011080-85 = "Regra de ouro dos ninjas, número três! \"Um ninja, uma vez que faz uma promessa—"
10011080-86 = "—deve sempre cumpri-la!\""
10011080-87 = "Por isso, Sensei...!"
10011080-88 = "[s] \"Sim.\""
10011080-89 = "Então você não vai recuar... não tem jeito, não é?"
10011080-90 = "Nesse caso, terei que recorrer ao uso da força."
