[translation]
1008205-1 = "青春の定番：幼馴染"
1008205-5 = "[ns] \"これで一段落……\""
1008205-12 = "[ns] \"そろそろ寝ようかな。\""
1008205-20 = "（いつも通り、シャーレの仕事を終えた頃……）"
1008205-21 = "[ns] \"明日はレンゲが来るから、早起きしないと。\""
1008205-43 = "[ns] （んん、もう朝……？）"
1008205-47 = "（疲れのせいか、すぐには起き上がれない）"
1008205-52 = "[ns] （……んん……あと5分……）"
1008205-58 = "ふぅ、よし……"
1008205-62 = "おはよう！朝だぞ！あ～さ～！"
1008205-68 = "こら！いつまで寝てるつもりだ？"
1008205-75 = "[ns] \"う、うわっ！？\""
1008205-78 = "[ns] \"れ、レンゲ！？\""
1008205-79 = "やっと起きたな。"
1008205-80 = "幼馴染たる者、こうやって起こしに来るのは……"
1008205-81 = "当然の「義務」だろ？"
1008205-82 = "[s] \"……へ？\""
1008205-84 = "（ちょっと混乱したが、顔を洗って冷静になった）"
1008205-86 = "この前、モモトークで言ったよな？"
1008205-87 = "青春の定番といえば、「アレ」は欠かせないって。"
1008205-88 = "そう……つまり、幼馴染だ！"
1008205-89 = "[s1] \"……でも、レンゲと私は幼馴染じゃないよね……？\"\n[s2] \"今さらなんだけど、前提に無理があるのでは……？\""
1008205-92 = "まったく先生は困ったもんだ！"
1008205-93 = "それなら逆にアタシが聞きたい。#n先生が思う幼馴染を教えてくれ。"
1008205-94 = "幼馴染になるには、何か条件があるのか？"
1008205-95 = "答えはノーだ！"
1008205-99 = "幼馴染とは、そのまま「幼い頃からの友人」のこと。"
1008205-100 = "未来と比べたら今は幼いんだから、さっき知り合ったばかりでも幼馴染になろうと思えば幼馴染になれる！"
1008205-101 = "だからアタシたちは、間違いなく幼馴染だ！"
1008205-102 = "大事なのは、この先に続いている未来なんだから！"
1008205-103 = "[s] \"合っているような、合っていないような……それで？\""
1008205-104 = "細かいことは気にしない！"
1008205-105 = "だから決めたんだ、先生……いや、師匠！"
1008205-106 = "今日の「青春活動」は「幼馴染大作戦」にすると！"
1008205-107 = "それじゃあ、まず最初の「目覚まし」イベントはクリアしたから……"
1008205-111 = "次だ！師匠！"
1008205-112 = "[s] \"う、うん……\""
1008205-114 = "（いまいち状況が飲み込めなかったが、こうして今日もレンゲとの青春活動が始まった）"
1008205-116 = "師匠、次のイベントを始めよう。"
1008205-117 = "その名も、「登校」だ！"
1008205-118 = "幼馴染の二人は、一緒に登校しながら他愛ない話をするらしい。"
1008205-119 = "[s] \"どこ情報……？\""
1008205-120 = "もちろん「恋よ鯉」の小説で読んだシチュエーションだ。"
1008205-121 = "[s] \"やっぱり……！\""
1008205-122 = "それじゃ、さっそく行ってみよう、師匠！"
1008205-131 = "……なんか違う。"
1008205-132 = "[s] \"どうしたの？\""
1008205-133 = "師匠！こうして一緒に歩いてるだけで……幼馴染イベントって言えるものかな？"
1008205-134 = "もっとこう、甘酸っぱい感じの……"
1008205-135 = "ああもう、一体何が足りないんだ……？"
1008205-136 = "[s3] \"よく分からないけど、お喋りとか？\"\n[s4] \"何気ない会話こそ重要なんじゃない？\""
1008205-141 = "なるほど！たしかに！"
1008205-142 = "ずっと一緒だからこそ、分かり合っていて……"
1008205-143 = "どんな会話でも、自然と笑顔になるようなものに違いない！"
1008205-144 = "さすが師匠！それが足りなかったんだね！"
1008205-145 = "……歩きながら、何気ない会話を……"
1008205-146 = "よし。"
1008205-147 = "じゃあ、まずはアタシから話題を振ってみる。"
1008205-149 = "昨日、テレビで見たんだけど……"
1008205-150 = "[s] \"うん。\""
1008205-151 = "百鬼夜行南地区にある裏山でチュパカブラが目撃されたみたいで……"
1008205-152 = "チュパカブラ……"
1008205-153 = "きっと捕まえたら大ニュースだよ！"
1008205-157 = "[ns] \"どうしてチュパカブラの話題を！？\""
1008205-158 = "え？ダメ、だったかな……？"
1008205-159 = "……なるほど。スポーツやドラマの話が定番、と。"
1008205-160 = "う～ん。でも、そういうのはあんまり見なくて……"
1008205-161 = "やっぱ、チュパカブラの方が面白くないか？#n商店街のマスコットキャラクターみたいな可愛さがあると思うんだけど……"
1008205-162 = "面白さの方向性……？"
1008205-163 = "う～ん、幼馴染の会話……思っていた以上に難しいかもしれない。"
1008205-164 = "ま！仕方ない、ここまでにしておこう！"
1008205-165 = "でも大丈夫！まだ時間はあるからね！"
1008205-168 = "次のイベントは、これ！"
1008205-169 = "「苦手科目を教え合う」！"
1008205-170 = "[s] \"たしかに定番かも。漫画でよく見るね。\""
1008205-171 = "ああ、そうだろう？"
1008205-172 = "それで先生には何を教えようかと思って……"
1008205-173 = "アタシに教えられるとしたら、やっぱこれかなって。"
1008205-177 = "すぅ――"
1008205-178 = "はぁ――姿勢を低くして、片足を半歩前に。"
1008205-179 = "[s] \"……えっと、レンゲさん？\""
1008205-183 = "ああ、安心してくれ、先生。"
1008205-184 = "今日は百花繚乱に代々受け継がれてきた、あらゆるトラブルの「対処法」を先生に伝授する。"
1008205-185 = "突然の銃撃戦や迫りくる問題児の嵐、敵陣で孤立したときに星を読んで逃げる方法まで。"
1008205-186 = "全てをマスターするには、3年くらいかかるけど……"
1008205-187 = "教えるのには自信があるよ。"
1008205-188 = "これでも百花繚乱の切り込み隊長だからね。#n先生が1年でマスターできるよう、徹底的に叩き込んでいく！"
1008205-189 = "[s] \"……レンゲに教わる内容としては正解かもしれないけどね！？\""
1008205-190 = "それじゃ……"
1008205-195 = "いくぞ！！"
1008205-200 = "（その後も一緒に様々な「幼馴染イベント」を試していった）"
1008205-204 = "（放課後、帰り道に寄り道をして屋台でおやつを食べたり……）"
1008205-208 = "（カラオケで点数対決をしたり……）"
1008205-214 = "（デパートで買い物を楽しんだり……）"
1008205-220 = "（そうして、楽しく遊んでいると――）"
1008205-225 = "（いつの間にか日が暮れていた）"
1008205-229 = "今日は一気に色んなイベントをやったね！"
1008205-230 = "これはもう「幼馴染イベント」をコンプリートしたと言っても過言じゃない！"
1008205-231 = "[s] （今日の内容は「幼馴染イベント」というよりも……）"
1008205-232 = "でも、師匠……"
1008205-233 = "真の幼馴染イベントは、まだこれからだ。"
1008205-234 = "[s] \"真の幼馴染イベント？\""
1008205-235 = "……ふぅ。"
1008205-236 = "幼馴染と普通の友達の間には、大きな壁がある。"
1008205-237 = "クラスの友達以上の付き合いの長さと……"
1008205-238 = "決して崩れない絆で結ばれているのが幼馴染だ。"
1008205-239 = "[s] \"それにしては、今日は普通の感じだったような。\""
1008205-243 = "と、とにかくアタシが言いたいのは、その……！"
1008205-244 = "ここまで来た以上……やるしかないと思うんだ。"
1008205-245 = "最後に「名前を呼んで別れる」イベントを！"
1008205-246 = "[s] \"名前……？\""
1008205-247 = "……ああ。今からアタシは、師匠の名前を呼ぶ！"
1008205-248 = "覚悟するんだ、師匠！"
1008205-249 = "[s] \"はっ、はい！\""
1008205-250 = "えっと、その……"
1008205-251 = "……！"
1008205-252 = "[USERNAME]………………き、今日は楽しかったよ。"
1008205-253 = "[s] \"私も楽しかったよ、レンゲ。\""
1008205-257 = "ほ、本当か！？"
1008205-258 = "振り回しすぎたんじゃないかって心配してたけど……"
1008205-259 = "よ、良かったぁ……"
1008205-260 = "で、でも……やっぱり、下の名前で呼ぶのって照れくさいな……！"
1008205-261 = "幼馴染も一筋縄ではいかないというか。"
1008205-265 = "とりあえず、今日のところは……"
1008205-267 = "[ns5] \"これって幼馴染イベントじゃなくて……\"\n[ns6] \"カップルのデートみたいだったね。\""
1008205-274 = "は？"
1008205-280 = "わっ、わわわわわっ！"
1008205-281 = "な、ななっ、何を言ってるんだ！師匠！？"
1008205-282 = "[s] \"え！？何か変なこと言ったかな！？\""
1008205-283 = "今日のこれは、そういうんじゃなくて……！"
1008205-284 = "そ、そういうのは……そういうのは！"
1008205-285 = "まだ早くないか……？うぅ……っ！"
1008205-291 = "[ns] \"あ……行っちゃった。\""
