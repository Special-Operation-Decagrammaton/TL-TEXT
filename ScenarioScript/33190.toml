[translation]
33190-1 = "Episódio 19;A Nossa História"
33190-4 = "Haa, haa……."
33190-5 = "Gh……"
33190-10 = "……Por que, Azusa."
33190-11 = "Por que lutar a esse ponto? Que sentido há nisso? O que você está tentando provar?"
33190-12 = "Lembre-se: tudo é――"
33190-16 = "……Mesmo que seja vão, eu decidi lutar."
33190-17 = "Que sentido há nisso!!!"
33190-24 = "Gh……!!"
33190-30 = "……!?"
33190-31 = "……."
33190-32 = "Hifu…mi……?"
33190-34 = "Reforços, né…… são 4; não, atrás vem mais……."
33190-35 = "Aquilo é……."
33190-43 = "……Quem é você?"
33190-44 = "Uma aluna comum de Trinity."
33190-45 = "Hifumi, não pode…… por que você veio num lugar destes……."
33190-46 = "Aqui não é lugar pra alguém comum como você vir……."
33190-47 = "……."
33190-48 = "……Sim; de fato, eu sou comum e ordinária."
33190-49 = "Que aquela figura de máscara de gás que você mostrou outro dia é a verdadeira Azusa; isso eu também compreendi."
33190-50 = "E que essa Azusa, na verdade, vive num mundo fora do meu alcance…… que era isso que você queria dizer, eu também entendi."
33190-51 = "Hifumi……?"
33190-52 = "Mas!!!"
33190-53 = "Você está cometendo um grande erro, Azusa!!!"
33190-54 = "……!?"
33190-55 = "Aqui e agora, eu vou mostrar a minha verdadeira forma!!!"
33190-56 = "A minha verdadeira identidade é……"
33190-60 = "a líder do \"Bando dos Maiôs Mascarados\", Faust!!"
33190-62 = "……Hã?"
33190-63 = "Olha só que apavorante! Mesmo lado a lado com a Azusa, não perco em nada no quesito sinistro! Deve até ter gente que diga que este lado aqui é mais assustador!"
33190-64 = "H-Hifumi……?"
33190-66 = "……."
33190-67 = "……!?"
33190-68 = "……."
33190-70 = "Hifumi, o que é que você――"
33190-71 = "Por isso!!"
33190-75 = "Por isso, essa história de estarmos em mundos diferentes não existe!"
33190-76 = "……."
33190-77 = "Somos iguais! Dá até pra estar uma do lado da outra!"
33190-78 = "Então não diga que os mundos são diferentes, que não dá pra ficarmos juntas…… não diga uma coisa dessas!"
33190-79 = "Mesmo rejeitada, eu vou até pertinho de você! Eu……!"
33190-80 = "……Eu vou estar do lado da Azusa!"
33190-81 = "Assim, ó, num lugar onde dá pra tocar……!"
33190-82 = "Hifumi……"
33190-83 = "Mas, mesmo que você diga uma mentira dessas por mim……"
33190-84 = "Quem disse que é mentira!?"
33190-91 = "Ié~, parece que chegamos numa parte importante, né?"
33190-93 = "Aquelas máscaras, não me diga que……!?"
33190-94 = "!?"
33190-95 = "Gh!?"
33190-99 = "Olho por olho, dente por dente. Sem piedade, solitárias,#ntrilhando a terra assombrada como quem trilha o próprio caminho……"
33190-100 = "Hm; esse é o nosso lema."
33190-101 = "Normalmente atuamos como idols, mas somos um grupo que, quando a noite cai, tem o bico de derrotar os malvados♧"
33190-102 = "Isso não é o nosso lema, tá!? E não inventa caracterização estranha!"
33190-103 = "Por ordem da líder do Bando dos Maiôs Mascarados, a senhorita Faust, nos reunimos!"
33190-104 = "……!?"
33190-105 = "H-hã!?"
33190-106 = "E-eles existiam de verdade……?"
33190-107 = "Aquelas ali……."
33190-108 = "……Não sei. Sem dados detalhados."
33190-109 = "O-o Bando dos Maiôs Mascarados…… eu achava que não passava de boato, mas existia mesmo……."
33190-110 = "……Líder, elas ficam aí com esse sorriso bobo, mas é melhor ter cuidado. No mínimo, quem subestimar vai se dar mal."
33190-111 = "……."
33190-116 = "O que vocês tão pensando, tentando fazer a nossa líder chorar~? Ei, vocês aí?"
33190-117 = "Não sei quem são, mas tô nem aí, viu? A nossa Faust, quando fica brava, dá medo."
33190-118 = "Afinal, a Faust é praticamente quem, no fim, derrotou o alto escalão da Kaiser Corporation♧"
33190-119 = "Ela consegue até assaltar o banco do mercado negro. Como quem toma café da manhã."
33190-120 = "E, outro dia mesmo, ela mandou a Kaiser PMC pelos ares com um bombardeio!"
33190-121 = "Isso, ela é apavorante, viu~? Não é exagero dizer que é uma catástrofe viva e ambulante; é tipo a chefona que domina o submundo."
33190-122 = "Sim; essa é a Faust."
33190-128 = "Faust! Faust!! Faust!!!"
33190-133 = "……."
33190-134 = "Aah, a Faust tirou o saco de papel!?"
33190-138 = "Ah~, no fim, deve ter batido a vergonha, né……?"
33190-142 = "E-e a gente que entrou na sua onda!"
33190-143 = "Eu não tenho vergonha nenhuma, viu."
33190-144 = "Veterana Shiroko, você também, para de pose e tira logo!"
33190-148 = "Hm……."
33190-149 = "B-bom, enfim, reforçando……."
33190-150 = "O Comitê de Contramedidas, desta vez, veio ajudar a Hifumi!!"
33190-152 = "Muito obrigada, pessoal do Comitê de Contramedidas……."
33190-164 = "Hihihihihihi……."
33190-165 = "O Comitê de Realização da Justiça veio ajudar."
33190-166 = "P-presidente, os ferimentos……?"
33190-167 = "Sararam por completo."
33190-168 = "C-como esperado!"
33190-169 = "Eu não sou tão resistente quanto a Tsurugi, então ainda não; mas, ainda assim, devo servir pra alguma coisa. Afinal, eu prometi que ajudaria."
33190-174 = "Aquilo de outro dia, vocês me pagam……! Não pensem que voltam inteiras!"
33190-175 = "……E a presidente?"
33190-176 = "……."
33190-182 = "Gh, Sensei……."
33190-183 = "Você estava bem…… que bom……."
33190-184 = "Como você chegou aqui……? Bom, tratando-se de você, nem pergunto mais……."
33190-185 = "[s] \"Hina…….\""
33190-186 = "Eu…… já……."
33190-187 = "Desculpa, Sensei…… pra mim, já não dá mais."
33190-188 = "Eu já era…… então…… desculpa te decepcionar, mas……."
33190-189 = "Agora, quero que você volte…… pode considerar que eu já me aposentei……."
33190-190 = "[ns] \"……Hina.\""
33190-192 = "[ns] \"Não é isso. Eu vim aqui te agradecer.\""
33190-193 = "A-agradecer……? Por quê……."
33190-194 = "Se for por ter salvado você, não precisa se importar……."
33190-195 = "Aquilo era, óbvio, o que eu devia fazer; e, além disso, naquela hora eu……."
33190-196 = "[s1] \"Não. É um 'obrigado por sempre se esforçar tanto'.\"\n[s2] \"Eu queria te dizer logo que você já não precisa se esforçar além da conta.\""
33190-197 = "……Gh!"
33190-198 = "……Gh!"
33190-199 = "[s] \"Porque a Hina sempre se esforçou.\""
33190-200 = "……."
33190-201 = "[s] \"Era isso que eu queria dizer. Então descansa; o resto, eu dou um jeito.\""
33190-202 = "E-espera, como assim, dar um jeito……."
33190-203 = "Mas, eu……."
33190-204 = "Eu……."
33190-205 = "……."
33190-206 = "Eu…… não consigo ser como a Hoshino Takanashi……."
33190-207 = "[s] \"……A Hoshino?\""
33190-208 = "Eu não sou uma pessoa forte…… como aquela vice-presidente de Abydos……."
33190-209 = "A presidente do conselho estudantil de Abydos…… quem encontrou o corpo dela foi a Hoshino Takanashi. Sendo que devia ser alguém muito, muito importante pra ela……."
33190-210 = "Mesmo depois de provar todo aquele sofrimento, ela ainda luta em Abydos…… eu não consigo fazer isso……."
33190-211 = "Eu não consigo ser forte a esse ponto…… naquele instante, eu já……."
33190-212 = "[s] \"Hina…….\""
33190-213 = "Eu também me esforcei!!"
33190-214 = "Sempre me esforcei, sempre tentei dar um jeito……."
33190-215 = "Mesmo sem ser compreendida, ainda assim……."
33190-216 = "Mas eu, na hora mais importante……."
33190-217 = "Você é injusto, Sensei…… naquele instante, eu já tinha quebrado…… e aí você vem e diz uma coisa dessas……."
33190-218 = "Eu também, como a Hoshino Takanashi, como o Clube de Aulas de Reforço……"
33190-219 = "eu queria a sua atenção, queria ser elogiada!!"
33190-220 = "[s] \"…………\""
33190-221 = "……Ah."
33190-222 = "D-desculpa…… isso agora foi, é que……."
33190-223 = "[s] \"Hina, me desculpa de verdade!\""
33190-224 = "!?"
33190-225 = "[s3] \"Hina, da próxima, vamos fazer aula de reforço também!\"\n[s4] \"E, se a nota for boa, claro, eu vou te elogiar um monte!\""
33190-226 = "……."
33190-227 = "……."
33190-228 = "Hã, não, minhas notas já são boas de origem…… eu tiro quase sempre nota máxima……."
33190-229 = "[s] \"Ou, então, que tal uma festa de maiô!? Eu preparo agora mesmo!\""
33190-230 = "É que, isso também não……."
33190-231 = "……."
33190-232 = "……Haa."
33190-233 = "Ufu……."
33190-234 = "……Aliás, Sensei, você não tem, na verdade, um favor pra me pedir?"
33190-235 = "[s] \"Mas, pensando que a Hina se aposentou……\""
33190-236 = "……Aquilo foi só da boca pra fora. Eu só quis, um pouquinho, me fazer de mimada com todo mundo."
33190-238 = "Vamos, Sensei."
33190-242 = "Presidente……!"
33190-243 = "……Desculpa a demora, Ako. Que bom que vocês também estão bem."
33190-244 = "Não…… sim!!"
33190-248 = "A preparação está pronta, né. Vamos aguardar as ordens do Sensei."
33190-250 = "Fomos cercadas, né……."
33190-251 = "Isso não tá meio complicado, Líder?"
33190-252 = "Que me importa. Diante do \"Conselho dos Santos de Justina\", que se multiplica ao infinito, é tudo igualmente sem sentido."
33190-253 = "……Aliás, veio a calhar. Não só à Azusa; anunciem a todos os presentes."
33190-254 = "A verdade deste mundo…… que, neste mundo repleto de instinto assassino e ódio, todo esforço é inútil."
33190-255 = "Que lutar não tem sentido nenhum; que tudo é inútil!!"
33190-259 = "……."
33190-260 = "[s] Assente."
33190-261 = "Hifumi……."
33190-262 = "Azusa, eu estou agora muito brava. Muito mesmo."
33190-263 = "……."
33190-264 = "Mas…… mais do que isso, que bom que você está bem."
33190-265 = "Eu estava muito brava, mas, pensando bem, a culpa não é sua, Azusa. Por isso, eu já não estou mais brava."
33190-266 = "Hifumi……."
33190-270 = "Mas, com aquelas pessoas ali, eu ainda estou brava."
33190-271 = "Instinto assassino, ódio…… que isso é a verdade deste mundo……"
33190-272 = "Elas impuseram isso e ficaram repetindo que tudo é vão, mas……"
33190-273 = "ainda assim, eu……!"
33190-276 = "Hifumi"
33190-277 = "[7cd0ff]Clube de Aulas de Reforço[-]"
33190-278 = "Eu não quero que a Azusa vire uma assassina……."
33190-281 = "Hifumi"
33190-282 = "[7cd0ff]Clube de Aulas de Reforço[-]"
33190-283 = "Uma história tão sombria e melancólica assim,[wa:2300] eu não quero."
33190-286 = "Hifumi"
33190-287 = "[7cd0ff]Clube de Aulas de Reforço[-]"
33190-288 = "Mesmo que digam que isso é a verdade,[wa:2000] que é a essência deste mundo,[wa:2300] eu não gosto!"
33190-291 = "Hifumi"
33190-292 = "[7cd0ff]Clube de Aulas de Reforço[-]"
33190-293 = "Eu tenho as coisas de que eu gosto!"
33190-297 = "Hifumi"
33190-298 = "[7cd0ff]Clube de Aulas de Reforço[-]"
33190-299 = "Eu sou comum, sem grande personalidade, mas…… daquilo de que eu gosto, eu não abro mão de jeito nenhum!"
33190-303 = "Hifumi"
33190-304 = "[7cd0ff]Clube de Aulas de Reforço[-]"
33190-305 = "Superar as adversidades com amizade,"
33190-309 = "Hifumi"
33190-310 = "[7cd0ff]Clube de Aulas de Reforço[-]"
33190-311 = "o esforço ser devidamente recompensado,"
33190-315 = "Hifumi"
33190-316 = "[7cd0ff]Clube de Aulas de Reforço[-]"
33190-317 = "consolar nas horas difíceis, consolar-se entre amigas……!"
33190-321 = "Hifumi"
33190-322 = "[7cd0ff]Clube de Aulas de Reforço[-]"
33190-323 = "Mesmo que haja sofrimento…… que todos, no fim, possam sorrir!"
33190-327 = "Hifumi"
33190-328 = "[7cd0ff]Clube de Aulas de Reforço[-]"
33190-329 = "É desse final feliz[wa:1200] que eu gosto!!"
33190-333 = "Hifumi"
33190-334 = "[7cd0ff]Clube de Aulas de Reforço[-]"
33190-335 = "Digam o que disserem,[wa:1200] eu vou repetir quantas vezes for preciso!"
33190-338 = "Hifumi"
33190-339 = "[7cd0ff]Clube de Aulas de Reforço[-]"
33190-340 = "A história que nós desenhamos, somos nós que decidimos!"
33190-345 = "Hifumi"
33190-346 = "[7cd0ff]Clube de Aulas de Reforço[-]"
33190-347 = "Eu não vou deixar acabar;[wa:1500] a gente ainda vai continuar!"
33190-350 = "Hifumi"
33190-351 = "[7cd0ff]Clube de Aulas de Reforço[-]"
33190-352 = "A nossa história……"
33190-355 = "Hifumi"
33190-356 = "[7cd0ff]Clube de Aulas de Reforço[-]"
33190-357 = "a nossa,"
33190-361 = "a nossa história de juventude!!"
33190-364 = "Blue Archive"
33190-371 = "Ah, as nuvens de chuva……."
33190-372 = "Manipulação do clima……? Não, isto é……."
33190-373 = "U-um milagre, é……?"
33190-374 = "Gh, milagre não existe! Que é isto……!"
33190-375 = "Não me diga que o preceito……?"
33190-378 = "[ns] \"Eu declaro, aqui e agora.\""
33190-380 = "[ns] \"Nós somos a nova Organização do Tratado do Éden.\""
33190-381 = "Q-quê……!?"
33190-383 = "Não pode ser……"
33190-384 = "Isto é o Tratado do Éden…… Sensei, você……"
33190-385 = "O tratado que, originalmente, seria criado pela presidente do Conselho Estudantil Geral……"
33190-386 = "e a \"Schale\", o órgão extralegal que essa mesma presidente fundou……"
33190-387 = "Não me diga que a \"Schale\" substitui a presidente do Conselho Estudantil Geral? Não; ele torceu de modo que se pudesse interpretar assim……?"
33190-388 = "Igual…… à Arius……."
33190-389 = "Os sujeitos do tratado — Gehenna, o Tea Party, o Comitê de Realização da Justiça e o Comitê Disciplinar — reunidos……"
33190-390 = "na ruína onde um dia se ergueu a catedral antiga……"
33190-391 = "no lugar da presidente do Conselho Estudantil Geral, proponente do tratado, o Sensei……"
33190-392 = "reproduziu a promessa que carrega o nome do paraíso……?"
33190-393 = "……."
33190-394 = "Torcer o contrato, distorcê-lo, forjar o resultado desejado……"
33190-395 = "Ao \"jeito dos adultos\", com o \"jeito dos adultos\", é……"
33190-397 = "……Líder, o controle do Justina tá estranho."
33190-398 = "!!"
33190-411 = "E-estão em pânico, né…… o preceito é ajudar a Organização do Tratado do Éden; mas, agora, existem duas ETO……."
33190-412 = "Gh, que me importa!!!!"
33190-413 = "Final feliz!? Não me façam rir! Acham que, com essas palavras, o mundo muda!?"
33190-414 = "Acham que, só com isso, este ódio, este mundo de desconfiança muda!? Que conversa de sonho é essa……!"
33190-415 = "[s] \"Porque ajudar o sonho dos alunos…… ajudar a realizá-lo é o dever de um adulto.\""
33190-416 = "……Gh!"
33190-417 = "[s5] \"Eu acredito no sonho que os alunos desejam, e o sustento.\"\n[s6] \"O sonho que os próprios alunos desejam do fundo do coração.\""
