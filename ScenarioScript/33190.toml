[translation]
33190-1 = "Episódio 19; Nossa História"
33190-4 = "*Haa, haa*..."
33190-5 = "Ugh..."
33190-10 = "......Por que, Azusa."
33190-11 = "Por que você luta tanto? Qual o sentido nisso? O que está tentando provar?"
33190-12 = "Lembre-se, tudo é――"
33190-16 = "......Mesmo que seja em vão, eu decidi lutar."
33190-17 = "E qual o sentido nisso!!!"
33190-24 = "Guh...!!"
33190-30 = "......!?"
33190-31 = "......"
33190-32 = "Hifu... mi...?"
33190-34 = "Reforços, hein... São quatro, não, há mais atrás..."
33190-35 = "Aquilo é..."
33190-43 = "......Quem é você?"
33190-44 = "Apenas uma aluna normal da Trinity."
33190-45 = "Hifumi, não... Por que você está num lugar desses..."
33190-46 = "Aqui não é lugar para uma pessoa normal como você, Hifumi..."
33190-47 = "......"
33190-48 = "......Sim, é verdade que eu sou normal e comum."
33190-49 = "Aquele seu visual de máscara de gás que me mostrou outro dia é a verdadeira Azusa-chan. Eu também entendi isso."
33190-50 = "Que a verdadeira Azusa-chan vive em um mundo inalcançável para alguém como eu... Eu entendi que era isso que você queria dizer."
33190-51 = "Hifumi...?"
33190-52 = "MAS!!!"
33190-53 = "Você está cometendo um grande erro, Azusa-chan!!!"
33190-54 = "......!?"
33190-55 = "Aqui e agora, eu vou mostrar a minha verdadeira forma!!!"
33190-56 = "A minha verdadeira identidade é..."
33190-60 = "Faust, a líder da 'Gangue dos Mascarados de Biquíni'!!"
33190-62 = "......Hã?"
33190-63 = "Olhem bem para essa aparência aterrorizante! Mesmo ao lado da Azusa-chan, não deixo a desejar no quesito intimidação! Tem gente que diria que isso aqui é até mais assustador!"
33190-64 = "H-Hifumi...?"
33190-66 = "......"
33190-67 = "......!?"
33190-68 = "......"
33190-70 = "Hifumi, o que diabos..."
33190-71 = "É por isso!!"
33190-75 = "É por isso que não vivemos em mundos diferentes!"
33190-76 = "......"
33190-77 = "Somos iguais! E podemos ficar lado a lado!"
33190-78 = "Então, por favor... não diga que nossos mundos são diferentes, ou que não podemos ficar juntas!"
33190-79 = "Mesmo que você me rejeite, eu vou até você! Eu...!"
33190-80 = "......Eu vou ficar ao seu lado, Azusa-chan!"
33190-81 = "Assim, bem onde você pode me tocar...!"
33190-82 = "Hifumi..."
33190-83 = "Mas, mesmo que você conte essa mentira por mim..."
33190-84 = "E quem disse que é mentira!?"
33190-91 = "Ora ora~, parece que chegamos na melhor parte, não é?"
33190-93 = "Aquelas máscaras... Não me digam que...!?"
33190-94 = "!?"
33190-95 = "!?"
33190-99 = "Olho por olho, dente por dente. De forma impiedosa, isolada, trilhamos o submundo como se fosse nosso..."
33190-100 = "Nn, esse é o nosso lema."
33190-101 = "Normalmente trabalhamos como idols, mas à noite fazemos bico como um grupo que derrota vilões♧"
33190-102 = "Esse não é o nosso lema coisa nenhuma!? E não inventa essas histórias esquisitas!"
33190-103 = "Nós nos reunimos aqui sob as ordens da Faust-san, a líder da Gangue dos Mascarados de Biquíni!"
33190-104 = "......!?"
33190-105 = "H-Hã!?"
33190-106 = "E-Elas realmente existem...?"
33190-107 = "Aquelas lá são..."
33190-108 = "......Não sei. Não há dados detalhados."
33190-109 = "A G-Gangue dos Mascarados de Biquíni... Achei que fossem apenas um boato, mas elas são reais..."
33190-110 = "......Líder, elas podem parecer bobas, mas é melhor tomar cuidado. Se as subestimarmos, vamos acabar nos dando mal."
33190-111 = "......"
33190-116 = "Por que vocês estão tentando fazer a nossa líder chorar~? Ei, vocês aí?"
33190-117 = "Não sei quem vocês são, mas já vou avisando, viu? A nossa Faust-san é assustadora quando fica brava."
33190-118 = "Afinal, no fim das contas, a Faust-chan praticamente derrotou um executivo da Kaiser Corporation♧"
33190-119 = "Pode até assaltar bancos no Mercado Negro. Moleza."
33190-120 = "E outro dia mesmo, ela explodiu a Kaiser PMC com um bombardeio de artilharia!"
33190-121 = "Isso aí, ela é assustadora, sabia~? Não seria exagero chamá-la de calamidade viva, ela é praticamente a chefona que governa o submundo."
33190-122 = "Nn, essa é a Faust."
33190-128 = "Faust! Faust!! Faust!!!"
33190-133 = "......"
33190-134 = "Aah, a Faust-chan tirou o saco de papel da cabeça!?"
33190-138 = "Aaah, acho que a vergonha bateu, né~...?"
33190-142 = "A-A gente até que entrou na brincadeira!"
33190-143 = "Eu não tô com vergonha de nada."
33190-144 = "Shiroko-senpai, pare de agir como se estivesse com a razão e tire isso logo!"
33190-148 = "Nn..."
33190-149 = "B-Bom, de qualquer forma, falando sério agora..."
33190-150 = "O Comitê de Contramedidas veio ajudar a Hifumi-san desta vez!!"
33190-152 = "Muito obrigada, pessoal do Comitê de Contramedidas..."
33190-164 = "Hihihihihihi..."
33190-165 = "Comitê de Realização da Justiça, viemos para o resgate."
33190-166 = "P-Presidente, os seus ferimentos...?"
33190-167 = "Estou totalmente curada."
33190-168 = "C-Como esperado!"
33190-169 = "Eu não sou tão resistente quanto a Tsurugi, então ainda estou machucada... mas ainda serei de alguma utilidade. Eu prometi que ajudaria."
33190-174 = "Como ousam depois do que fizeram...! Não achem que vão voltar inteiras para casa!"
33190-175 = "......E a Presidente?"
33190-176 = "......"
33190-182 = "Agh, Sensei..."
33190-183 = "Você está são e salvo... que bom..."
33190-184 = "Como você chegou aqui...? Bom, vindo do Sensei, não é mais surpresa..."
33190-185 = "[s] \"Hina...\""
33190-186 = "Eu... não aguento mais..."
33190-187 = "Desculpa, Sensei... eu não consigo mais."
33190-188 = "Eu não dou mais conta... então... me desculpe por decepcioná-lo..."
33190-189 = "Eu só quero ir para casa agora... Por favor, pode considerar que eu me aposentei..."
33190-190 = "[ns] \"...Hina.\""
33190-192 = "[ns] \"Não é isso. Eu vim aqui para te agradecer.\""
33190-193 = "A-Agradecer...? Pelo quê..."
33190-194 = "Se é por eu ter ajudado o Sensei, não precisa se preocupar..."
33190-195 = "Era o mínimo que eu deveria fazer, e além disso, naquela hora eu..."
33190-196 = "[s1] \"Não. Era para dizer: 'Obrigado por sempre se esforçar tanto'.\"\n[s2] \"Eu queria ter te dito isso antes, que você não precisa mais se cobrar tanto.\""
33190-197 = "......!"
33190-198 = "......!"
33190-199 = "[s] \"A Hina sempre fez o seu melhor.\""
33190-200 = "......"
33190-201 = "[s] \"Era isso que eu queria te dizer. Então, descanse, eu cuido do resto.\""
33190-202 = "E-Espera, cuidar do resto..."
33190-203 = "Mas, eu..."
33190-204 = "Eu..."
33190-205 = "......"
33190-206 = "Eu... não consigo ser como a Hoshino Takanashi..."
33190-207 = "[s] \"...Hoshino?\""
33190-208 = "Eu não sou uma pessoa forte... como a Vice-Presidente de Abydos..."
33190-209 = "A Presidente de Abydos... foi a Hoshino Takanashi quem encontrou o corpo dela. Alguém que deve ter sido tão, tão importante para ela..."
33190-210 = "E mesmo depois de passar por tanto sofrimento, ela ainda continua lutando por Abydos... Eu não conseguiria fazer isso..."
33190-211 = "Eu não consigo ser tão forte assim... Naquele momento, eu já tinha..."
33190-212 = "[s] \"Hina...\""
33190-213 = "Eu também me esforcei!!"
33190-214 = "Sempre me esforçando, tentando resolver as coisas..."
33190-215 = "Mesmo que não me entendessem, ainda assim..."
33190-216 = "Mas, na hora que mais importava, eu..."
33190-217 = "Você não joga limpo, Sensei... Naquele momento, eu já tinha desistido... e mesmo assim você me diz uma coisa dessas..."
33190-218 = "Assim como a Hoshino Takanashi e as meninas do Clube de Reposição..."
33190-219 = "Eu também queria que o Sensei cuidasse de mim, queria que me elogiasse!!"
33190-220 = "[s] \"............\""
33190-221 = "......Ah."
33190-222 = "D-Desculpe... O que eu acabei de falar foi, tipo..."
33190-223 = "[s] \"Hina, me desculpa mesmo!\""
33190-224 = "!?"
33190-225 = "[s3] \"Da próxima vez, você também fará aulas de reposição comigo!\"\n[s4] \"E se as suas notas forem boas, claro, eu vou te elogiar de montão!\""
33190-226 = "......"
33190-227 = "......"
33190-228 = "Hã? Não, minhas notas já são boas de qualquer jeito... Eu tiro nota máxima na maioria..."
33190-229 = "[s] \"Ou quem sabe a gente faça uma festa na piscina!? Eu posso preparar tudo agora mesmo!\""
33190-230 = "Hum, também não precisa chegar a tanto..."
33190-231 = "......"
33190-232 = "......Haa."
33190-233 = "Fufu..."
33190-234 = "......Mudando de assunto, Sensei, você não tem algo a me pedir na verdade?"
33190-235 = "[s] \"Sim, mas pensando que a Hina se aposentou...\""
33190-236 = "......Eu só disse isso da boca pra fora. Só queria ser mimada um pouco por todo mundo."
33190-238 = "Vamos lá, Sensei."
33190-242 = "Presidente...!"
33190-243 = "......Desculpe a demora, Akko. Que bom que estão todas bem."
33190-244 = "De forma alguma... Sim, senhora!!"
33190-248 = "Estamos prontas. Vamos aguardar as ordens do Sensei."
33190-250 = "Fomos cercadas, não é...?"
33190-251 = "A situação tá meio complicada agora, né, Líder?"
33190-252 = "E eu com isso. Diante da 'Sociedade dos Santos Justina' que se multiplica infinitamente, elas são todas inúteis."
33190-253 = "......Na verdade, isso é perfeito. Não só para a Azusa, mas vamos mostrar a todos aqui."
33190-254 = "A verdade deste mundo... Mostrar que, num mundo cheio de ódio e intenções assassinas, qualquer esforço é em vão."
33190-255 = "Que resistir não tem sentido, que tudo é inútil!!"
33190-259 = "......"
33190-260 = "[s] Assente."
33190-261 = "Hifumi..."
33190-262 = "Azusa-chan, eu estou muito brava agora. Mas muito mesmo."
33190-263 = "......"
33190-264 = "Mas... mais do que isso, que bom que você está bem."
33190-265 = "Eu estava brava de verdade, mas parando pra pensar, isso não é culpa sua, Azusa-chan. Então, já passou."
33190-266 = "Hifumi..."
33190-270 = "Porém, ainda estou brava com aquelas ali."
33190-271 = "Falando de intenção assassina, de ódio... dizendo que essa é a verdade do mundo..."
33190-272 = "Forçando isso em você, repetindo o tempo todo que tudo é inútil..."
33190-273 = "Mesmo assim, eu...!"
33190-276 = "Hifumi"
33190-277 = "[7cd0ff]Clube de Reposição[-]"
33190-278 = "Eu me recuso a deixar a Azusa-chan se tornar uma assassina..."
33190-281 = "Hifumi"
33190-282 = "[7cd0ff]Clube de Reposição[-]"
33190-283 = "Eu odeio[wa:2300] histórias sombrias e deprimentes."
33190-286 = "Hifumi"
33190-287 = "[7cd0ff]Clube de Reposição[-]"
33190-288 = "Mesmo que digam que essa é a verdade,[wa:2000] que essa é a natureza do mundo,[wa:2300] eu não gosto disso!"
33190-291 = "Hifumi"
33190-292 = "[7cd0ff]Clube de Reposição[-]"
33190-293 = "Há coisas que eu amo!"
33190-297 = "Hifumi"
33190-298 = "[7cd0ff]Clube de Reposição[-]"
33190-299 = "Pode ser que eu seja comum e sem grandes talentos... mas eu não abro mão das coisas que eu amo, jamais!"
33190-303 = "Hifumi"
33190-304 = "[7cd0ff]Clube de Reposição[-]"
33190-305 = "Superar as dificuldades com a amizade"
33190-309 = "Hifumi"
33190-310 = "[7cd0ff]Clube de Reposição[-]"
33190-311 = "Onde o esforço é devidamente recompensado"
33190-315 = "Hifumi"
33190-316 = "[7cd0ff]Clube de Reposição[-]"
33190-317 = "Consolar nos momentos difíceis, e encontrar conforto com os amigos...!"
33190-321 = "Hifumi"
33190-322 = "[7cd0ff]Clube de Reposição[-]"
33190-323 = "Onde, por maior que seja a dor... todos possam terminar com um sorriso no rosto!"
33190-327 = "Hifumi"
33190-328 = "[7cd0ff]Clube de Reposição[-]"
33190-329 = "É por esse tipo de final feliz[wa:1200] que eu sou apaixonada!!"
33190-333 = "Hifumi"
33190-334 = "[7cd0ff]Clube de Reposição[-]"
33190-335 = "Não importa o que digam,[wa:1200] eu vou repetir quantas vezes for necessário!"
33190-338 = "Hifumi"
33190-339 = "[7cd0ff]Clube de Reposição[-]"
33190-340 = "Somos nós quem decidimos a história que vamos escrever!"
33190-345 = "Hifumi"
33190-346 = "[7cd0ff]Clube de Reposição[-]"
33190-347 = "Não vou deixar que acabe aqui,[wa:1500] nós vamos continuar!"
33190-350 = "Hifumi"
33190-351 = "[7cd0ff]Clube de Reposição[-]"
33190-352 = "A nossa história..."
33190-355 = "Hifumi"
33190-356 = "[7cd0ff]Clube de Reposição[-]"
33190-357 = "A nossa..."
33190-361 = "A NOSSA HISTÓRIA DE JUVENTUDE!!"
33190-364 = "Blue Archive"
33190-371 = "Ah, as nuvens de chuva..."
33190-372 = "Manipulação climática...? Não, isso é..."
33190-373 = "M-Milagre...?"
33190-374 = "Milagres não existem! O que é isso...!"
33190-375 = "Será que os mandamentos...?"
33190-378 = "[ns] \"Eu declaro aqui e agora.\""
33190-380 = "[ns] \"Nós somos a nova Organização do Tratado do Éden.\""
33190-381 = "O quê...!?"
33190-383 = "Não pode ser..."
33190-384 = "Este é o Tratado do Éden... Sensei, você..."
33190-385 = "Um tratado que originalmente deveria ter sido feito pela Presidente do Conselho Federal..."
33190-386 = "E a 'Schale', a organização extrajudicial fundada por essa mesma Presidente..."
33190-387 = "Acha mesmo que a 'Schale' atua como representante da Presidente? Não, ele distorceu tudo para que pudesse ser interpretado assim...?"
33190-388 = "O mesmo... que a Arius fez."
33190-389 = "Os sujeitos do tratado, Gehenna, Tea Party, o Comitê de Realização da Justiça e o Comitê Disciplinar estão todos reunidos..."
33190-390 = "Nas ruínas de onde antes ficava o Tabernáculo..."
33190-391 = "O Sensei, no lugar da Presidente do Conselho Federal, a idealizadora do tratado..."
33190-392 = "Recriou a promessa que leva o nome do paraíso...?"
33190-393 = "......"
33190-394 = "Distorcendo o contrato, manipulando as regras e forjando o resultado desejado..."
33190-395 = "Enfrentando o método dos 'adultos' usando o método dos 'adultos', é..."
33190-397 = "...Líder, o controle sobre a Justina está agindo de forma estranha."
33190-398 = "!!"
33190-411 = "E-Elas estão confusas... O mandamento é proteger a Organização do Tratado do Éden, mas agora existem duas ETOs..."
33190-412 = "Ugh, eu não dou a mínima!!!!"
33190-413 = "Final feliz!? Não brinca comigo! Acha mesmo que palavras assim vão mudar o mundo!?"
33190-414 = "Acha que só isso vai mudar esse ódio, esse mundo de desconfiança!? Que conversinha de conto de fadas...!"
33190-415 = "[s] \"Ajudar a realizar os sonhos das alunas... essa é a obrigação de um adulto.\""
33190-416 = "......!"
33190-417 = "[s5] \"Eu acredito nos sonhos que minhas alunas desejam e os apoio.\"\n[s6] \"Os sonhos que as próprias alunas desejam do fundo de seus corações.\""