[translation]
33190-1 = "Episódio 19: Nossa História"
33190-4 = "Haa, haa..."
33190-5 = "Ugh..."
33190-10 = "...Por que, Azusa?"
33190-11 = "Por que lutar tanto assim? Que sentido há nisso? O que você está tentando provar?"
33190-12 = "Lembre-se, tudo é..."
33190-16 = "...Mesmo que seja em vão, eu decidi lutar."
33190-17 = "Que sentido há nisso!!!"
33190-24 = "Guh...!!"
33190-30 = "...!?"
33190-31 = "..."
33190-32 = "Hifumi...?"
33190-34 = "Reforços, hein... São 4, não, tem mais deles atrás..."
33190-35 = "Aquilo é..."
33190-43 = "...Quem é você?"
33190-44 = "Sou apenas uma aluna comum da Trinity."
33190-45 = "Hifumi, não... Por que você está em um lugar como este..."
33190-46 = "Este não é um lugar para pessoas comuns como você, Hifumi..."
33190-47 = "..."
33190-48 = "...Sim, é verdade que sou comum e medíocre."
33190-49 = "Eu entendi que aquela máscara de gás que você me mostrou outro dia é a verdadeira Azusa-chan."
33190-50 = "E entendi que você quer dizer que, sendo assim, a verdadeira Azusa-chan vive em um mundo que alguém como eu jamais poderia alcançar..."
33190-51 = "Hifumi...?"
33190-52 = "Mas!!!"
33190-53 = "Azusa-chan, você está cometendo um grande erro!!!"
33190-54 = "...!?"
33190-55 = "Vou mostrar minha verdadeira forma aqui e agora!!!"
33190-56 = "Minha verdadeira identidade é..."
33190-60 = "A líder do 'Esquadrão de Biquíni Mascarado', Faust!!"
33190-62 = "...Hã?"
33190-63 = "Olhe só, que assustador! Mesmo ao lado da Azusa-chan, não fico nem um pouco atrás em termos de sinistralidade, certo? Com certeza tem gente que acharia isso aqui ainda mais assustador!"
33190-64 = "Hi, Hifumi...?"
33190-66 = "..."
33190-67 = "...!?"
33190-68 = "..."
33190-70 = "Hifumi, o que diabos você está..."
33190-71 = "É por isso!!"
33190-75 = "É por isso que não existe essa história de estarmos em mundos diferentes!"
33190-76 = "..."
33190-77 = "Somos iguais! Podemos estar lado a lado!"
33190-78 = "Então, por favor, não diga que nossos mundos são diferentes, ou que não podemos ficar juntas..."
33190-79 = "Mesmo que você me rejeite, eu vou me aproximar! Eu..."
33190-80 = "...Eu estarei ao seu lado, Azusa-chan!"
33190-81 = "Bem aqui, onde posso te tocar...!"
33190-82 = "Hifumi..."
33190-83 = "Mas, mesmo que você diga essas mentiras por mim..."
33190-84 = "Quem disse que é mentira!?"
33190-91 = "Ei, parece que chegamos em um momento importante, não é?"
33190-93 = "Aquela máscara, não pode ser...!?"
33190-94 = "!?"
33190-95 = "¡¿!?"
33190-99 = "Olho por olho, dente por dente. Sem piedade, isolados, #nseguindo o meu próprio caminho..."
33190-100 = "Sim, esse é o nosso lema."
33190-101 = "Nós trabalhamos como idols durante o dia, mas à noite, somos um grupo que faz bicos derrotando vilões ♧"
33190-102 = "Isso não é nosso lema, não!? E para de inventar essas histórias estranhas!"
33190-103 = "Por ordens de Faust, a líder do Esquadrão de Máscaras de Natação, nós nos reunimos!"
33190-104 = "……!?"
33190-105 = "Hã, o quê!?"
33190-106 = "E-eles realmente existem...?"
33190-107 = "Aqueles ali são..."
33190-108 = "……Não sei. Não há dados detalhados."
33190-109 = "O-o Esquadrão de Máscaras de Natação... achei que fossem apenas boatos, mas eles realmente existem..."
33190-110 = "……Líder, eles parecem estar brincando, mas é melhor tomar cuidado. Se subestimá-los, vai acabar se dando mal."
33190-111 = "……."
33190-116 = "O que vocês estão tentando fazer, fazendo a nossa líder chorar? Ei, vocês aí?"
33190-117 = "Não sei quem vocês são, mas não sabem com quem estão lidando, né? A Faust-san fica assustadora quando está brava."
33190-118 = "Afinal, a Faust-chan acabou derrotando até os executivos da Kaiser Corporation, sabe? ♧"
33190-119 = "A gente consegue até assaltar bancos no mercado negro. É como tomar café da manhã."
33190-120 = "E ainda por cima, outro dia a gente explodiu a Kaiser PMC com artilharia!"
33190-121 = "É isso mesmo, é assustador, né? Não é exagero dizer que ela é um desastre vivo, como uma chefona que domina o submundo."
33190-122 = "Sim, essa é a Faust."
33190-128 = "Faust! Faust!! Faust!!!"
33190-133 = "……."
33190-134 = "Ah, a Faust-chan tirou o saco de papel da cabeça!?"
33190-138 = "Ah~, será que ela ficou com vergonha...?"
33190-142 = "E-eu até entrei na brincadeira, poxa!"
33190-143 = "Eu não estou com vergonha de nada."
33190-144 = "Shiroko-senpai, não fique aí parada, tire o seu também!"
33190-148 = "Hum..."
33190-149 = "B-bem, de qualquer forma, voltando ao assunto..."
33190-150 = "Comitê de Contramedidas, viemos ajudar a Hifumi-san agora!!"
33190-152 = "Muito obrigada, pessoal do Comitê de Contramedidas..."
33190-164 = "Hihihihihihi..."
33190-165 = "Comitê de Justiça, viemos prestar auxílio."
33190-166 = "P-Presidente, e os seus ferimentos...?"
33190-167 = "Estou totalmente curada."
33190-168 = "C-como esperado!"
33190-169 = "Eu não sou tão resistente quanto a Tsurugi, então ainda não estou 100%... mas ainda assim, devo ser útil. Prometi que ajudaria."
33190-174 = "Depois do que fizeram da última vez...! Não pensem que vão sair daqui vivos!"
33190-175 = "……E a Presidente?"
33190-176 = "……."
33190-182 = "Ah, Sensei..."
33190-183 = "Você está bem... que bom..."
33190-184 = "Como você chegou aqui...? Bem, vindo do Sensei, não deveria ser surpresa..."
33190-185 = "[s] \"Hina...\""
33190-186 = "Eu... não consigo mais..."
33190-187 = "Desculpe, Sensei... para mim, já deu."
33190-188 = "Eu não aguento mais... então... sinto muito por te decepcionar..."
33190-189 = "Por favor, vá embora agora... considere que eu já me aposentei..."
33190-190 = "[ns] \"...Hina.\""
33190-192 = "[ns] \"Não é isso. Eu vim aqui para te agradecer.\""
33190-193 = "A-agradecer...? Por quê...?"
33190-194 = "Se for sobre você ter me salvado, não precisa se preocupar com isso..."
33190-195 = "Isso é algo que eu deveria ter feito, e além disso, naquela hora eu..."
33190-196 = "[s1] \"Não. Eu só queria dizer obrigado por sempre se esforçar tanto.\"\n[s2] \"Eu queria ter te dito logo que você não precisa se esforçar tanto assim.\""
33190-197 = "……!"
33190-198 = "……!"
33190-199 = "[s] \"Porque a Hina sempre se esforçou muito.\""
33190-200 = "……."
33190-201 = "[s] \"Eu queria dizer isso. Então descanse, eu cuido do resto.\""
33190-202 = "E-espere, como assim 'cuidar do resto'..."
33190-203 = "Mas eu..."
33190-204 = "Eu..."
33190-205 = "……."
33190-206 = "Eu... não consigo ser como a Hoshino..."
33190-207 = "[s] \"……Hoshino?\""
33190-208 = "Eu não sou uma pessoa forte... como a vice-presidente de Abydos..."
33190-209 = "A presidente do conselho estudantil de Abydos... foi Takanashi Hoshino quem encontrou o corpo dela. Ela deveria ser uma pessoa extremamente, extremamente importante para ela..."
33190-210 = "Mesmo tendo passado por tanto sofrimento, ela ainda continua lutando em Abydos... Eu não conseguiria fazer algo assim..."
33190-211 = "Eu não consigo ser tão forte... Naquele momento, eu já..."
33190-212 = "[s] \"Hina...\""
33190-213 = "Eu também me esforcei!!"
33190-214 = "Sempre me esforçando, tentando dar um jeito em tudo..."
33190-215 = "Mesmo que ninguém entendesse, ainda assim..."
33190-216 = "Mas, nos momentos cruciais, eu..."
33190-217 = "Sensei, você é injusto... Naquele momento eu já não aguentava mais... e mesmo assim, você diz essas coisas..."
33190-218 = "Eu também queria, assim como a Takanashi Hoshino ou o Clube de Reforço..."
33190-219 = "Eu queria que você me desse atenção, eu queria ser elogiada!!"
33190-220 = "[s] \"………….\""
33190-221 = "……Ah."
33190-222 = "D-desculpe... o que eu acabei de dizer, é que..."
33190-223 = "[s] \"Hina, me desculpe de verdade!\""
33190-224 = "！？"
33190-225 = "[s3] \"Hina, vamos ter uma aula de reforço também!\"\n[s4] \"E se você tirar uma nota boa, é claro que vou te elogiar bastante!\""
33190-226 = "……."
33190-227 = "……."
33190-228 = "Ei, não, eu já tiro notas boas... na verdade, eu sempre tiro nota máxima..."
33190-229 = "[s] \"Ou então, quer fazer uma festa na piscina!? Eu preparo tudo agora mesmo!\""
33190-230 = "Bem, isso também não é..."
33190-231 = "……."
33190-232 = "……Haa."
33190-233 = "Fufu..."
33190-234 = "……A propósito, Sensei, na verdade você não tem algo para me pedir?"
33190-235 = "[s] \"Mas, pensando que a Hina se aposentou...\""
33190-236 = "……Isso foi só algo que eu disse. Eu só queria, por um momento, ser mimada por todos."
33190-238 = "Vamos, Sensei."
33190-242 = "Presidente...!"
33190-243 = "……Desculpe pela espera, Ako. Fico feliz que todos estejam bem."
33190-244 = "Não... sim!!"
33190-248 = "Vocês estão prontas, certo? Vamos aguardar as instruções do Sensei."
33190-250 = "Fomos cercadas, não é mesmo..."
33190-251 = "Isso não está um pouco difícil, líder?"
33190-252 = "Não me importa. Diante da \"Irmandade de Justina\" que se multiplica infinitamente, tudo é igualmente inútil."

33190-253 = "...Na verdade, é conveniente. Avise não apenas a Azusa, mas a todos aqui."
33190-254 = "A verdade deste mundo... que neste mundo cheio de intenção assassina e ódio, todo esforço é em vão."
33190-255 = "Que não faz sentido algum tentar lutar, que tudo é inútil!!"
33190-259 = "..."
33190-260 = "[s] Assente com a cabeça."
33190-261 = "Hifumi..."
33190-262 = "Azusa-chan, eu estou muito brava agora. Muito mesmo."
33190-263 = "..."
33190-264 = "Mas... acima de tudo, fico feliz que você esteja a salvo."
33190-265 = "Eu estava muito brava, mas pensando bem, a culpa não é da Azusa-chan. Por isso, não estou mais brava."
33190-266 = "Hifumi..."
33190-270 = "Mas, em relação àquelas pessoas, eu ainda estou brava."
33190-271 = "Intenção assassina, ódio... dizer que isso é a verdade deste mundo..."
33190-272 = "Ficar forçando isso e dizendo que tudo é vazio..."
33190-273 = "Mesmo assim, eu...!"
33190-276 = "Hifumi"
33190-277 = "[7cd0ff]Clube de Reforço[-]"
33190-278 = "Eu não quero que a Azusa-chan se torne uma assassina..."
33190-281 = "Hifumi"
33190-282 = "[7cd0ff]Clube de Reforço[-]"
33190-283 = "Esse tipo de história sombria e melancólica, [wa:2300] eu não gosto."
33190-286 = "Hifumi"
33190-287 = "[7cd0ff]Clube de Reforço[-]"
33190-288 = "Mesmo que digam que essa é a verdade, [wa:2000] ou a essência deste mundo, [wa:2300] eu não gosto disso!"
33190-291 = "Hifumi"
33190-292 = "[7cd0ff]Clube de Reforço[-]"
33190-293 = "Eu tenho coisas que eu amo!"
33190-297 = "Hifumi"
33190-298 = "[7cd0ff]Clube de Reforço[-]"
33190-299 = "Eu sou uma pessoa comum, sem grandes talentos... mas sobre as coisas que eu amo, eu não abro mão de jeito nenhum!"
33190-303 = "Hifumi"
33190-304 = "[7cd0ff]Clube de Reforço[-]"
33190-305 = "Superar as dificuldades com a amizade,"
33190-309 = "Hifumi"
33190-310 = "[7cd0ff]Clube de Reforço[-]"
33190-311 = "o esforço ser devidamente recompensado,"
33190-315 = "Hifumi"
33190-316 = "[7cd0ff]Clube de Reforço[-]"
33190-317 = "consolar quem está triste e apoiar os amigos...!"
33190-321 = "Hifumi"
33190-322 = "[7cd0ff]Clube de Reforço[-]"
33190-323 = "Mesmo que haja sofrimento... que todos, no final, possam sorrir!"
33190-327 = "Hifumi"
33190-328 = "[7cd0ff]Clube de Reforço[-]"
33190-329 = "Esse tipo de final feliz, [wa:1200] eu adoro!!"
33190-333 = "Hifumi"
33190-334 = "[7cd0ff]Clube de Reforço[-]"
33190-335 = "Não importa o que digam, [wa:1200] eu continuarei dizendo isso quantas vezes for preciso!"
33190-338 = "Hifumi"
33190-339 = "[7cd0ff]Clube de Reforço[-]"
33190-340 = "A história que escrevemos, nós é que decidimos!"
33190-345 = "Hifumi"
33190-346 = "[7cd0ff]Clube de Reforço[-]"
33190-347 = "Não vou deixar que termine, [wa:1500] vamos continuar por muito mais tempo!"
33190-350 = "Hifumi"
33190-351 = "[7cd0ff]Clube de Reforço[-]"
33190-352 = "A nossa história..."
33190-355 = "Hifumi"
33190-356 = "[7cd0ff]Clube de Reforço[-]"
33190-357 = "A nossa,"
33190-361 = "A nossa história de juventude!!"
33190-364 = "Blue Archive"
33190-371 = "Ah, nuvens de chuva..."
33190-372 = "Manipulação climática...? Não, isso é..."
33190-373 = "U-um milagre, será...?"
33190-374 = "Não, milagres não existem! O que é isso...!"
33190-375 = "Será que os preceitos...?"
33190-378 = "[ns] \"Declaro aqui.\""
33190-380 = "[ns] \"Nós somos o novo.\""
33190-381 = "O quê...!?"
33190-383 = "Não pode ser..."
33190-384 = "Isso é o Tratado do Éden... Sensei, você..."
33190-385 = "Originalmente, era um tratado que a Presidente do Conselho Estudantil Federal deveria criar..."
33190-386 = "E o Schale, a organização extrajudicial estabelecida por essa mesma Presidente..."
33190-387 = "Será que o Schale está agindo como substituto da Presidente? Não, ele distorceu as regras para que pudesse ser interpretado assim...?"
33190-388 = "É igual ao de Arius..."
33190-389 = "Gehenna, o Tea Party, o Comitê de Justiça e o Comitê Disciplinar, os principais envolvidos no tratado, reunidos..."
33190-390 = "Nas ruínas onde ficava a antiga catedral..."
33190-391 = "No lugar da Presidente do Conselho Estudantil Federal, a idealizadora do tratado, o Sensei..."
33190-392 = "Recriou a promessa que leva o nome do paraíso...?"
33190-393 = "..."
33190-394 = "Distorcer, deturpar o contrato e forjar o resultado desejado..."
33190-395 = "Então é assim... combater o jeito dos \"adultos\" com o próprio jeito dos \"adultos\"..."
33190-397 = "...Líder, o controle das Justina está instável."
33190-398 = "!!"
33190-411 = "E-está uma confusão... o preceito é ajudar, mas agora existem dois ETOs..."
33190-412 = "Cala a boca, não me importa!!!!"
33190-413 = "Final feliz, é!? Não me faça rir! Acha mesmo que o mundo muda com palavras assim!?"
33190-414 = "Acha que só isso vai mudar esse ódio, esse mundo de desconfiança!? Que conversa sonhadora é essa...!"
33190-415 = "[s] \"Ajudar a realizar os sonhos das alunas... é o dever de um adulto.\""
33190-416 = "...!"
33190-417 = "[s5] \"Eu acredito nos sonhos que as alunas desejam e os apoio.\"\n[s6] \"Os sonhos que as próprias alunas desejam do fundo do coração.\""
