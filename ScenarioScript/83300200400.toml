[translation]
83300200400-7 = "かなりの量だけど……"
83300200400-12 = "お肉や牛乳、卵、小麦粉……定番の食材ね。"
83300200400-17 = "お菓子に使う材料が多いような……バレンタインデーだからかしら。"
83300200400-18 = "それにしても、この量の食材を一度のパーティーで……？"
83300200400-26 = "明細書の名前は……"
83300200400-28 = "「パンデモニウム・ソサエティー」……"
83300200400-32 = "給食部にパーティーの準備を依頼するだなんて……それも、数日前になってから突然。"
83300200400-33 = "マコト、何を企んでいるの？"
83300200400-34 = "……アコと話をしておかないと。"
