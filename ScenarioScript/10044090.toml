10044090-163 = "[log]Parada bem-sucedida[/log]"
10044090-169 = "P-parou...?#nConseguimos... nós conseguimos...!!"
10044090-170 = "Missão cumprida."
10044090-171 = "Pahyahya! Deu tudo certo!!"
10044090-173 = "[ns] \"Pessoal... alguém se machucou?\""
10044090-174 = "S-sim... estou bem...!"
10044090-175 = "Sem problemas!"
10044090-176 = "Hikari protegeu o Sensei, viu? Me elogia, me elogia!"
10044090-179 = "Eh, o que eu faço agora...?"
10044090-180 = "Err, pessoal, vocês estão bem...?"
10044090-181 = "Pahyahya! Claro! Operação pontual! Transporte seguro! Perfeito, não é?"
10044090-182 = "Seguro... perfeito...?"
10044090-183 = "Está em um estado terrível, no entanto..."
10044090-184 = "B-bem... uma chegada é uma chegada, né... haha..."
10044090-185 = "Por enquanto, vou buscar os documentos necessários para o procedimento, então, por favor, aguardem um momento."
10044090-190 = "S-se eu conseguir a assinatura do cliente com isso, tudo acaba, certo...?"
10044090-191 = "Um sucesso total."
10044090-192 = "Ah, eu gostaria que vocês pensassem na limpeza também..."
10044090-193 = "Ah, que droga... será que vou levar bronca...? Por que a minha vida é assim..."
10044090-195 = "Hahaha! Bom trabalho no serviço!!"
10044090-196 = "Hm?"
10044090-200 = "Valerá a pena ter ficado de tocaia."
10044090-201 = "Como esperado da Highlander. Chegaram bem na hora!"
10044090-202 = "Mas o que foi aquilo agora há pouco?"
10044090-203 = "Será que aquilo é o estilo Highlander...?"
10044090-204 = "Silêncio! #nEi, vocês aí. Ainda não se esqueceram da gente, né?"
10044090-209 = "Fãs da Hikari e das outras?"
10044090-210 = "Claro que não! #nNós somos a Federação de Transportadores de Kivotos... ou, abreviando, a União de Corrida Vrum-Vrum!"
10044090-212 = "C-como vocês chegaram a essa abreviação...?"
10044090-213 = "Somos a organização que vai dominar o setor de entregas de Kivotos... e, eventualmente, chegar ao topo da distribuição!"
10044090-214 = "Uau! Que ambição enorme! Estou empolgada!"
10044090-216 = "E o que isso tem a ver com a gente?"
10044090-217 = "Como ousam roubar o nosso trabalho!"
10044090-218 = "Por causa de vocês, nossos planos foram por água abaixo!"
10044090-219 = "R-roubar...?"
10044090-220 = "A carga desse trem era para ser entregue por nós, originalmente."
10044090-221 = "Mas, por causa de vocês que roubaram o serviço...!"
10044090-222 = "N-nós não fizemos nada disso..."
10044090-223 = "N-nós apenas fizemos o trabalho que nos foi pedido..."
10044090-225 = "Ah? Tá tirando com a nossa cara!?"
10044090-231 = "Não é culpa de vocês que nem conseguem entregar uma pizza direito?"
10044090-232 = "C-cala a boca! Esquece isso, deixem a carga aí e caiam fora logo!"
10044090-234 = "Como colegas que atuam no setor de entregas... reconheço a técnica que usaram para chegar até aqui."
10044090-235 = "Mas quem vai fazer a entrega final somos nós, a 'União de Corrida Vrum-Vrum'!!"
10044090-236 = "S-só dizem coisas sem sentido..."
10044090-237 = "Mostra o poder secreto do Sensei."
10044090-238 = "Se apertar aqui, você se transforma? Ei, ei."
10044090-239 = "[s5] \"Eu adoraria ter um poder desses...\"\n[s6] \"Uau! Hikari! Isso faz cócegas...!\""
10044090-243 = "Ei... vocês estão zombando da gente!?"
10044090-244 = "A sensação de ver todo o esforço que você acumulou ir por água abaixo..."
10044090-246 = "Vamos fazer vocês sentirem o mesmo!"
