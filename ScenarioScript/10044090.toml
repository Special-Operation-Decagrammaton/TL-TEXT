[translation]
10044090-1 = "第9話;活路を開く一手"
10044090-5 = "アオバ、どうする？"
10044090-7 = "ええっ！？わ、私に聞かれましても……。"
10044090-8 = "ヒカリたちは運転専門ー。"
10044090-9 = "か、肝心な時に使えな――"
10044090-10 = "じゃなくて……！わ、私だってこの状況じゃ……！"
10044090-11 = "ひ、非常ブレーキなら……こっちもダメ……。"
10044090-12 = "さ、さっきの戦闘で壊れた……？"
10044090-13 = "つんだー？"
10044090-14 = "このままだとノンストップ激走コースかな？"
10044090-15 = "終点まで突っ走っちゃったら――もう届けるどころじゃないかも？"
10044090-16 = "結局任務は大失敗ってわけ！パヒャヒャッ！"
10044090-17 = "ぜんいん、懲戒処分ー。"
10044090-19 = "う、上から言われた通りに仕事しに来て……。"
10044090-20 = "や、やっとの思いでここまで来たのに……。"
10044090-21 = "うう……最初から引き受けるんじゃなかった！#n幹部連中と関わって良かったことなんて一度もなかったじゃないですか！？"
10044090-22 = "過去の自分をぶん殴ってやりたいですけどっ！！"
10044090-23 = "ちょ、ちょっとでも期待したら……やっぱり裏切られるんだ……。"
10044090-24 = "でも、でも……ここまで来てこんなの……あんまりですけど……。"
10044090-25 = "[ns1] \"落ち着いて解決策を探そう。\"\n[ns2] \"まだ助かる方法があるかもしれない。\""
10044090-28 = "せんせー、ビルにクモの糸発射したらとまるかなー？"
10044090-29 = "[s] \"それでは止まらないかな……。\""
10044090-30 = "じゃあー、線路に降りて全身で止めてみるとかー？"
10044090-31 = "[s] \"それも、できないかなぁ……。\""
10044090-32 = "万策尽きたー。"
10044090-33 = "ほ、他に……他にできることは……。"
10044090-34 = "な、何か使えそうなものは持ってませんか？"
10044090-35 = "私、チョコバーあるよ。あとで食べようと思ってたやつ。"
10044090-36 = "ま、真面目に考えて欲しいんですけど……！"
10044090-37 = "か、貨物……は論外だし……手持ちの工具と……。"
10044090-38 = "銃と銃弾は……使ったところでどうにも……。"
10044090-39 = "あ、あとは……あとは…さっき誰かが落としていった爆弾も――"
10044090-40 = "……。"
10044090-41 = "い、いや、まさか……いける？"
10044090-42 = "爆弾！"
10044090-43 = "[s] \"いいアイデアが浮かんだみたいだね。\""
10044090-44 = "あ、あるかもしれません……助かる方法……！"
10044090-45 = "おぉー。"
10044090-46 = "なになに？"
10044090-47 = "ぶ、ブレーキは、摩擦で速度を落とす仕組みです。"
10044090-48 = "つ、つまり別の方法で、摩擦さえ大きくしてやればいいんです。"
10044090-49 = "できるのー？"
10044090-50 = "あ、あるんですよ。"
10044090-52 = "こ、この状況からでもやれる方法が……！"
10044090-57 = "しばらくして……"
10044090-60 = "駅見えたよー。"
10044090-61 = "じゅ、準備はいいですか……！"
10044090-62 = "いつでも！"
10044090-63 = "スタンバイー。"
10044090-65 = "も、もしこれでもダメだったら……。"
10044090-66 = "[ns3] \"ふ、不安ではあるけど、私はアオバを信じるよ！\"\n[ns4] \"これしかないんだよね！？\""
10044090-69 = "は、はい……！余計なことは……無視！"
10044090-71 = "そろそろ着く時間だけど――"
10044090-76 = "あれかな？"
10044090-77 = "……。"
10044090-78 = "え……ちょっとスピード出し過ぎじゃない……？"
10044090-79 = "これ、止まれる……？"
10044090-81 = "予測地点、つうかー。"
10044090-82 = "合図して！！"
10044090-84 = "3……。"
10044090-85 = "2……。"
10044090-86 = "……1。"
10044090-88 = "少し前のこと――"
10044090-95 = "こ、この爆弾を使うんです。"
10044090-99 = "どこにー？"
10044090-103 = "……れ、列車の車輪を爆破します。"
10044090-109 = "車輪がなくなると、摩擦力が上がるんです……当たり前のこと、ですけど……。"
10044090-110 = "ん……つまり？"
10044090-111 = "摩擦係数ーオーバードライブー。"
10044090-112 = "そ、その通りです……！"
10044090-113 = "こ、これなら確実に停車[ruby=・]は[/ruby]できます……。"
10044090-114 = "も、もちろん列車も線路も大変なことにはなりますけど……。"
10044090-115 = "で、でも、もうこれしか――！！"
10044090-116 = "パヒャヒャッ、すっごいハチャメチャだけど――"
10044090-120 = "いいよ！乗った！！"
10044090-121 = "[ns] \"みんなのことを信じるよ！？\""
10044090-122 = "い、今できる最善ですから……。"
10044090-123 = "列車は修理すればいいし、線路もまた敷けばいいからさ！"
10044090-124 = "プライオリティー。"
10044090-127 = "今ですっ！！"
10044090-134 = "う、うわああーっ！！"
10044090-135 = "先生ー掴まってー。"
10044090-136 = "パヒャヒャッ！！順調にスピード落ちてるよ！"
10044090-137 = "こ、このまま……このまま……。"
10044090-138 = "だ、大丈夫……止まって……止まって……！"
10044090-139 = "[ns] \"うわああっ……！！\""
10044090-141 = "[log]駅まで100M[/log]"
10044090-145 = "[log]50M[/log]"
10044090-149 = "[log]30M[/log]"
10044090-153 = "[log]15M[/log]"
10044090-157 = "[log]5M[/log]"
10044090-159 = "[log]ハイランダー貨物列車停止位置まで0M[/log]"
10044090-163 = "[log]停車成功[/log]"
10044090-169 = "と、止まった……？#nやった……やりましたよ……！！"
10044090-170 = "任務完了ー。"
10044090-171 = "パヒャヒャッ！なんとかなったね！！"
10044090-173 = "[ns] \"みんな……怪我はない？\""
10044090-174 = "は、はい……大丈夫です……！"
10044090-175 = "問題なーし！"
10044090-176 = "ヒカリ、先生守ったよー？褒めて褒めてー。"
10044090-179 = "えー、これどうしよう……。"
10044090-180 = "えっと、皆さん大丈夫ですか……？"
10044090-181 = "パヒャヒャッ、もちろん！定時運行！安全輸送！完璧っしょ？"
10044090-182 = "安全……完璧……？"
10044090-183 = "酷い有様ですが……。"
10044090-184 = "ま、まあ……到着は到着ですね……はは……。"
10044090-185 = "とりあえず、手続きに必要な書類を持ってきますので、少々お待ちください。"
10044090-190 = "こ、これで依頼人のサインをもらえば、すべて終わりですよね……？"
10044090-191 = "だいせーこー。"
10044090-192 = "あ、後始末のことも考えて欲しいんですけど……。"
10044090-193 = "はぁ、やだなぁ……怒られるのかなぁ……どうして私の人生はこう……。"
10044090-195 = "ハハハッ！お勤めご苦労！！"
10044090-196 = "ん？"
10044090-200 = "待ち伏せした甲斐があったぜ。"
10044090-201 = "流石はハイランダー。時間ぴったりだったな！"
10044090-202 = "てかさっきの何だったんだ？"
10044090-203 = "あれがハイランダー式なのか……？"
10044090-204 = "静かに！#nおい、お前ら。うちらのこと、まだ忘れてないよな？"
10044090-209 = "ヒカリたちのファンー？"
10044090-210 = "んなわけねぇだろ！#nうちらはキヴォトス・トランスポーター連盟……略して、ブロロロ疾走連合だ！"
10044090-212 = "ど、どう略せばそうなるんですか……？"
10044090-213 = "キヴォトスの配送業を掌握し……いずれは流通のトップに立つ組織だ！"
10044090-214 = "くぅ～っ！でっけぇ野望！滾るぜ！"
10044090-216 = "で、それがなんだって言うのさ？"
10044090-217 = "よくもうちらの仕事を横取りしやがったな！"
10044090-218 = "お前らのせいで予定が台無しになっちまったんだよ！"
10044090-219 = "よ、横取り……？"
10044090-220 = "その列車の積荷は、元々うちらが運ぶはずだったんだ。"
10044090-221 = "なのにお前らが横取りしたせいで……！"
10044090-222 = "べ、別にそんなことしてないんですけど……。"
10044090-223 = "わ、私たちは言われた仕事をしただけですし……。"
10044090-225 = "あぁ？ナメてんのか！？"
10044090-231 = "ピザすらまともに運べないのが悪いんじゃん？"
10044090-232 = "う、うるせぇ！いいから、その積荷を置いて、お前らはとっとと帰りな！"
10044090-234 = "配送業に身を置く同志として……ここまで運んだ技術は認めよう。"
10044090-235 = "だが、最後に届けるのは――うちら「ブロロロ疾走連合」だぜ！！"
10044090-236 = "し、支離滅裂なことばっかり……。"
10044090-237 = "秘密の先生パワー見せてー。"
10044090-238 = "ここ押せば変身するのー？えいっ、えいっー。"
10044090-239 = "[s5] \"そんな能力があれば嬉しいけど……。\"\n[s6] \"わっ！ヒカリ！くすぐったいよ……！\""
10044090-243 = "おい……馬鹿にしてんのか！？"
10044090-244 = "積み上げた努力が、目の前で水の泡になる気持ち――"
10044090-246 = "お前らにも味わわせてやる！"
