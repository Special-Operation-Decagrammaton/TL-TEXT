[translation]
10044090-1 = "Episódio 9: Um movimento para abrir caminho"
10044090-5 = "Aoba, o que faremos?"
10044090-7 = "Hã!? V-você está perguntando para mim...?"
10044090-8 = "Hikari e as outras são especialistas em direção..."
10044090-9 = "I-inúteis no momento crucial..."
10044090-10 = "Não é isso...! E-eu também, nessa situação...!"
10044090-11 = "O-o freio de emergência... também não funciona..."
10044090-12 = "S-será que quebrou na batalha de agora pouco...?"
10044090-13 = "Estamos ferradas?"
10044090-14 = "Será que vamos seguir nesse curso de alta velocidade sem parar?"
10044090-15 = "Se a gente for direto até a estação final... talvez nem consigamos fazer a entrega?"
10044090-16 = "No fim, a missão vai ser um fracasso total! Pahyaha!"
10044090-17 = "Todas nós, punição disciplinar."
10044090-19 = "N-nós viemos fazer o trabalho como os superiores mandaram..."
10044090-20 = "E-e depois de tanto esforço para chegar até aqui..."
10044090-21 = "Uuu... Eu não deveria ter aceitado isso desde o começo! Não teve uma única vez que me dei bem me envolvendo com o pessoal da diretoria, não é!?"
10044090-22 = "Eu queria voltar no tempo e dar um soco na minha versão do passado!!"
10044090-23 = "S-se a gente cria qualquer expectativa... no fim, acabamos traídas..."
10044090-24 = "Mas, mas... chegar até aqui e acontecer isso... é demais..."
10044090-25 = "[ns1] \"Vamos nos acalmar e procurar uma solução.\"\n[ns2] \"Talvez ainda exista um jeito de nos salvar.\""
10044090-28 = "Sensei, será que se a gente disparar teias de aranha no prédio, ele para?"
10044090-29 = "[s] \"Acho que isso não seria o suficiente para parar...\""
10044090-30 = "Então, que tal descer nos trilhos e tentar parar com o corpo todo?"
10044090-31 = "[s] \"Isso também não seria possível...\""
10044090-32 = "Acabaram as opções."
10044090-33 = "A-alguma outra... alguma outra coisa que possamos fazer..."
10044090-34 = "V-vocês não têm nada que possa ser útil?"
10044090-35 = "Eu tenho uma barra de chocolate. Aquela que eu ia comer depois."
10044090-36 = "P-por favor, levem isso a sério...!"
10044090-37 = "A-a carga... está fora de questão... e com as ferramentas que temos..."
10044090-38 = "As armas e munições... não adiantariam de nada se usássemos..."
10044090-39 = "Ah, e também... também... aquela bomba que alguém deixou cair agora pouco..."
10044090-40 = "..."
10044090-41 = "N-não, espera... será que dá?"
10044090-42 = "Uma bomba!"
10044090-43 = "[s] \"Parece que você teve uma boa ideia.\""
10044090-44 = "T-talvez exista... um jeito de nos salvar...!"
10044090-45 = "Ohhh."
10044090-46 = "O que foi, o que foi?"
10044090-47 = "O-o freio funciona reduzindo a velocidade através do atrito."
10044090-48 = "E-em outras palavras, só precisamos aumentar o atrito de alguma outra forma."
10044090-49 = "Dá para fazer?"
10044090-50 = "D-dá sim."
10044090-52 = "M-mesmo nessa situação, existe um jeito de fazer isso...!"
10044090-57 = "Algum tempo depois..."
10044090-60 = "Dá para ver a estação."
10044090-61 = "E-estão prontas...!"
10044090-62 = "Sempre!"
10044090-63 = "Em espera."
10044090-65 = "S-se mesmo assim não funcionar..."
10044090-66 = "[ns3] \"E-estou nervosa, mas eu confio na Aoba!\"\n[ns4] \"Não temos outra escolha, né!?\""
10044090-69 = "S-sim...! O resto... não importa!"
10044090-71 = "Já está quase na hora de chegar, mas..."
10044090-76 = "É ali?"
10044090-77 = "……"
10044090-78 = "Ei... não estamos indo rápido demais...?"
10044090-79 = "Dá para parar isso...?"
10044090-81 = "Ponto de previsão, chegando."
10044090-82 = "Dê o sinal!!"
10044090-84 = "3..."
10044090-85 = "2..."
10044090-86 = "...1."
10044090-88 = "Um pouco antes disso..."
10044090-95 = "N-nós vamos usar esta bomba."
10044090-99 = "Onde?"
10044090-103 = "...V-vamos explodir as rodas do trem."
10044090-109 = "Se as rodas sumirem, a força de atrito vai aumentar... é óbvio, mas..."
10044090-110 = "Hmm... ou seja?"
10044090-111 = "Coeficiente de atrito - Overdrive."
10044090-112 = "E-exatamente...!"
10044090-113 = "C-com isso, com certeza conseguiremos parar..."
10044090-114 = "C-claro que o trem e os trilhos vão ficar em um estado terrível, mas..."
10044090-115 = "M-mas, não temos outra opção agora--!!"
10044090-116 = "Pahyahya, é uma loucura total, mas..."
10044090-120 = "Tudo bem! Eu topo!!"
10044090-121 = "[ns] \"Eu confio em todos vocês!?\""
10044090-122 = "É-é o melhor que podemos fazer agora..."
10044090-123 = "O trem pode ser consertado e os trilhos podem ser colocados de novo!"
10044090-124 = "Prioridade."
10044090-127 = "Agora!!"
10044090-134 = "A-aaaaah!!"
10044090-135 = "Sensei, segure-se."
10044090-136 = "Pahyahya!! A velocidade está caindo como planejado!"
10044090-137 = "C-continue assim... continue assim..."
10044090-138 = "D-dá certo... pare... pare...!"
10044090-139 = "[ns] \"Aaaah...!!\""
10044090-141 = "[log]100M até a estação[/log]"
10044090-145 = "[log]50M[/log]"
10044090-149 = "[log]30M[/log]"
10044090-153 = "[log]15M[/log]"
10044090-157 = "[log]5M[/log]"
