[translation]
10010130-1 = "第13話;イット・サーヴズ・ユー・ライト（３）"
10010130-15 = "「七転八倒団」、戦力はそれほどでも……いえ、相当弱いです！"
10010130-16 = "なら、どうしてこんな時間がかかっているのですか！"
10010130-17 = "わ、分かりません、敵が多いわけではないのですが……。"
10010130-22 = "良く見えませんが、多分裏側で治療がされてるような……ですがこの復帰スピード、普通こんなに多くの衛生兵がいるはずが……！？"
10010130-23 = "みなさん、目標に惑わされないでください！あまり離れてはいけません！"
10010130-24 = "私たちの目的はあくまで、ここ一帯の警護です！誘い出されないように！"
10010130-26 = "はいっ！！"
10010130-36 = "これは、一体……？"
10010130-37 = "どうしてあの方々が、ここを攻撃して……！？？"
10010130-41 = "……？この音は、車の……いえ、トラック……？"
10010130-46 = "さあ、そこのみなさん！何だか騒がしい中ですが、少々お耳をこちらへ！"
10010130-50 = "あ、あなたは……！"
10010130-51 = "こんな時だからこそ、落ち着くためにもケーキはいかがでしょうか！"
10010130-52 = "ただのケーキではありません、あの限定商品「ミラクル5000」です！今日だけは何と、無料でお配りしてしまいます！"
10010130-53 = "今ここにいるみなさんが全員食べたとしても、十分余るはずの量です。さあ、いかがですか！？"
10010130-55 = "ど、どうかご遠慮なさらずー！もしかすると明日からはまた、限定商品になってしまうかもしれませんのでー！"
10010130-56 = "もちろん、すっごく美味しいですよー！"
10010130-58 = "ほ、放課後スイーツ部のみなさんまで……！？"
10010130-59 = "……これ、本当に行けるのかな。ここにいるのって、結構偉い人たちなんでしょ？"
10010130-60 = "いくら限定の「ミラクル5000」だからって、私たちみたいに――"
10010130-65 = "く、ください！ずっと食べたかったんです！"
10010130-66 = "えぇい、どきなさい！私が先です！普段であれば、お金を積んでも中々食べられないあの「ミラクル5000」……！"
10010130-67 = "ちょっと、割り込みしないでください！マナーを守って！"
10010130-68 = "「ミラクル5000」とマナーと、どっちが大事なんですか！？"
10010130-72 = "めっちゃ食いついてるじゃん。"
10010130-73 = "ほら、さっさと手伝うわよ。"
10010130-75 = "……。"
10010130-76 = "結局誰も彼も同じ……でもそれは決して、悪いことじゃない。"
10010130-77 = "美味しい食べ物を食べる、それは人生そのものと言っても過言じゃない。そして何より、後悔は先に立たず！"
10010130-78 = "ちょっとナツ、さりげなく逃げようとしないで。"
10010130-79 = "ああもう、良いから早く来なさいよ！お客さん来てるんだから！！"
10010130-80 = "はーい……。"
10010130-82 = "なっ、何なんですかこの状況は……！"
10010130-83 = "み、「ミラクル5000」……私だって、一度も食べたことないというのに……！"
10010130-84 = "で、ですが私には、私の役割が……。"
10010130-88 = "（……）"
10010130-89 = "[s1] \"せっかくだし、行ってきたら？\"\n[s2] \"何かあったら、私がどうにかするから。\""
10010130-90 = "こ、この声……？"
10010130-91 = "こ、この声……？"
10010130-92 = "……！"
10010130-93 = "せ、先生！？"
10010130-96 = "報告します！「七転八倒団」、総員の退却を確認しました！こちら側の被害は軽微！"
10010130-97 = "今からでしたら、追撃できそうですが……どうしますか？"
10010130-98 = "いえ、やめておきましょう。繰り返しになりますが、私たちの今日の任務は「会場の警備」です。"
10010130-99 = "会場側からも、特に通信連絡などは無いようですし……。"
10010130-100 = "防衛成功です、詳しい調査はまた後にしましょう。"
10010130-101 = "それでは総員、元の位置へ。"
10010130-102 = "はいっ！！"
10010130-107 = "い、いなくなっちゃいました……。"
10010130-108 = "さっきまでの銃撃戦が嘘みたいに……あれは一体……？"
10010130-112 = "……？"
10010130-113 = "……あれ？"
10010130-114 = "せ、先生……？"
10010130-118 = "ど、どうして先生がここに……！？古書館にいらっしゃったのでは……？"
10010130-119 = "……はい？"
10010130-120 = "想像以上に重かった……？"
10010130-121 = "[s3] \"……これ、お願いしても良い？\"\n[s4] 手に持っていたものをヒナタに渡す。"
10010130-122 = "……あ、はい。"
10010130-123 = "……あ、はい。"
10010130-124 = "それはもちろんですが、えっと……。"
10010130-125 = "あれ、これは……？"
10010130-126 = "カーマ、スートラ……？"
10010130-127 = "どうしてこれが、先生の手に……？"
10010130-128 = "経典の入れ物に、入っていたはず……。"
10010130-129 = "……？？？？"
10010130-134 = "みなさんお静かに！何だか変なことになってしまいましたが、式典を再開します。"
10010130-135 = "重要な席なのですから、お口周りのケーキは拭いてください！"
10010130-139 = "ふぅ……では、あらためまして。"
10010130-141 = "えっと、つまり……。"
10010130-142 = "[s] \"うん。\""
10010130-143 = "せ、先生……。"
10010130-144 = "[s] \"……間に合って良かった。\""
10010130-148 = "……！！！！"
10010130-150 = "公開します、こちらが――"
10010130-158 = "公会議を通じて解釈された、古代の経典……その第4次注釈が入った物です！"
