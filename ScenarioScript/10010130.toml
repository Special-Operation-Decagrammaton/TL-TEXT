[translation]
10010130-1 = "Episódio 13; It Serves You Right (3)"
10010130-15 = "O 'Grupo Sete Quedas e Oito Levantamentos', o poder de fogo deles não é lá essas coisas... não, eles são bem fracos!"
10010130-16 = "Então, por que está levando tanto tempo?!"
10010130-17 = "E-eu não sei, não é como se houvesse muitos inimigos, mas..."
10010130-22 = "Não consigo ver direito, mas parece que estão sendo tratados nos bastidores... mas essa velocidade de recuperação, não deveria haver tantos médicos aqui...!?"
10010130-23 = "Pessoal, não se deixem distrair pelo alvo! Não se afastem muito!"
10010130-24 = "Nosso objetivo é, acima de tudo, a segurança desta área! Não se deixem atrair!"
10010130-26 = "Sim!!"
10010130-36 = "O que é isso...?"
10010130-37 = "Por que aquelas pessoas estão atacando aqui...!??"
10010130-41 = "...? Esse som é de um carro... não, um caminhão...?"
10010130-46 = "Muito bem, pessoal! Sei que está uma confusão, mas prestem atenção aqui por um momento!"
10010130-50 = "V-você é..."
10010130-51 = "Justamente por ser um momento como este, que tal um bolo para se acalmarem!"
10010130-52 = "Não é um bolo qualquer, é o produto de edição limitada 'Miracle 5000'! Só hoje, estamos distribuindo de graça!"
10010130-53 = "Mesmo que todos aqui comam, ainda deve sobrar bastante. Então, o que me dizem!?"
10010130-55 = "P-por favor, não se acanhem! Pode ser que a partir de amanhã ele volte a ser um produto de edição limitada!"
10010130-56 = "Claro, é uma delícia!"
10010130-58 = "A-até o Clube de Doces do Pós-Escola está aqui...!?"
10010130-59 = "...Será que isso vai dar certo? As pessoas que estão aqui são bem importantes, não são?"
10010130-60 = "Mesmo sendo o 'Miracle 5000' limitado, para pessoas como nós—"
10010130-65 = "P-por favor, me dê um! Eu queria comer isso há muito tempo!"
10010130-66 = "Ei, saia da frente! Eu cheguei primeiro! Aquele 'Miracle 5000' que, normalmente, nem com dinheiro se consegue comprar...!"
10010130-67 = "Ei, não fure a fila! Tenha modos!"
10010130-68 = "O que é mais importante, o 'Miracle 5000' ou os modos!?"
10010130-72 = "Eles morderam a isca direitinho."
10010130-73 = "Vamos, ajude logo."
10010130-75 = "..."
10010130-76 = "No fim, todos são iguais... mas isso não é necessariamente algo ruim."
10010130-77 = "Comer algo delicioso, não é exagero dizer que isso é a própria vida. E acima de tudo, o arrependimento não traz nada de volta!"
10010130-78 = "Ei, Natsu, não tente escapar de fininho."
10010130-79 = "Ah, chega, venha logo! Os clientes estão esperando!!"
10010130-80 = "Tá bom..."
10010130-82 = "Q-que situação é essa...!"
10010130-83 = "O, o 'Miracle 5000'... mesmo eu, nunca comi um..."
10010130-84 = "M-mas eu tenho o meu papel a cumprir..."
10010130-88 = "(...)"
10010130-89 = "[s1] \"Já que está aí, por que não vai?\"\n[s2] \"Se acontecer alguma coisa, eu dou um jeito.\""
10010130-90 = "E-essa voz...?"
10010130-91 = "E-essa voz...?"
10010130-92 = "...!"
10010130-93 = "P-Professor!?"
10010130-96 = "Relatando! O 'Grupo Sete Quedas e Oito Levantamentos' recuou completamente! Nossas baixas foram mínimas!"
10010130-97 = "Podemos persegui-los agora, o que deseja fazer?"
10010130-98 = "Não, vamos deixar para lá. Como eu disse antes, nossa missão hoje é a 'segurança do local'."
10010130-99 = "E parece que não houve nenhum contato da organização do evento..."
10010130-100 = "Defesa bem-sucedida. Deixaremos as investigações detalhadas para depois."
10010130-101 = "Todos, retornem às suas posições."
10010130-102 = "Sim!!"
10010130-107 = "E-eles foram embora..."
10010130-108 = "É como se o tiroteio de agora há pouco fosse mentira... O que foi aquilo...?"
10010130-112 = "……？"
10010130-113 = "……Ué?"
10010130-114 = "P-Professor...?"
10010130-118 = "P-Por que o Professor está aqui...!? Você não deveria estar na biblioteca...?"
10010130-119 = "……Sim?"
10010130-120 = "Foi mais pesado do que imaginava...?"
10010130-121 = "[s3] \"……Pode ficar com isso para mim?\"\n[s4] Entrego o que estava segurando para Hinata."
10010130-122 = "……Ah, sim."
10010130-123 = "……Ah, sim."
10010130-124 = "Isso é claro, mas, bem..."
10010130-125 = "Ué, isso é...?"
10010130-126 = "Kama Sutra...?"
10010130-127 = "Por que isso está nas mãos do Professor...?"
10010130-128 = "Deveria estar dentro do estojo das escrituras..."
10010130-129 = "……？？？？"
10010130-134 = "Pessoal, silêncio! As coisas ficaram um pouco estranhas, mas vamos retomar a cerimônia."
10010130-135 = "É uma ocasião importante, então limpem o bolo do rosto!"
10010130-139 = "Ufa... Bem, recomeçando."
10010130-141 = "Bem, ou seja..."
10010130-142 = "[s] \"Sim.\""
10010130-143 = "P-Professor..."
10010130-144 = "[s] \"……Que bom que cheguei a tempo.\""
10010130-148 = "……！！！！"
10010130-150 = "Vou revelar, aqui está..."
10010130-158 = "As escrituras antigas interpretadas pelo Concílio... Esta é a versão com o quarto comentário!"
