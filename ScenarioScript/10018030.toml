[translation]
10018030-1 = "第3話;これで勝ったと思うなよ！"
10018030-2 = "はぁ、はぁ……！お前ら、いったい何なんだよ！"
10018030-3 = "それについては、私がお答えいたしましょう。"
10018030-4 = "我々は美食の極意を求めて旅する孤独な巡礼者。EAT or DIE。"
10018030-6 = "おいしいものを食べるためであれば、どんな苦難も乗り越えてみせる――それが私たち、ゲヘナの美食研究会ですわ。"
10018030-12 = "美食研究会だって！？嘘だろ！？"
10018030-13 = "食べ物のためなら火の海にだって飛び込むとかいう、ヤバい連中じゃん！？"
10018030-15 = "！？"
10018030-17 = "いや、違うって。"
10018030-18 = "火の海だって食べ尽くすって話だよ！"
10018030-25 = "それならブラックホールの胃袋を持つって話も納得だな……。"
10018030-27 = "！？"
10018030-29 = "食べ過ぎの呪いで、肝心な時に食べられないみたいな話も聞いたような。"
10018030-35 = "というか、"
10018030-36 = "どうしてそんなテロリスト集団の美食研究会がスズメ亭なんかにいるんだ？"
10018030-37 = "何よ、テロリストだなんて！失礼しちゃう！"
10018030-38 = "私たちはただグルメ巡りをしているだけなんだから！#n途中でたまに問題が起こるだけよ！"
10018030-39 = "美食研究会には良心の欠片もないって噂はどうやら本当のようだな。#n恐ろしい連中め……。"
10018030-40 = "とにかく！お前たちがあたしらの邪魔をする権利はないからな！"
10018030-41 = "そうだ、そうだ！もう女将は契約書にサインしてるんだからな！"
10018030-42 = "あたしらは約束の期日が近づいてる事を伝えに来ただけなんだけど？"
10018030-43 = "一体、どこが問題だって言うんだ？"
10018030-44 = "だよね？あたしたちは親切心で、確認に来てあげたんだから！"
10018030-46 = "面白いことを仰いますね。"
10018030-47 = "何故、親切だと自負しているのにヘルメットで顔を隠し、店主を脅しているのでしょう？"
10018030-48 = "な、何か文句でもあるのかよ！"
10018030-49 = "それに――なぜ、スズメ亭とニャオフードのトラブルに、グルメヘルメット団が介入してくるのですか？"
10018030-50 = "ニャオフードとグルメヘルメット団の間に、何らかの関係があるのでしょうか？"
10018030-54 = "えっ……もしかしてあたしら、やらかした？"
10018030-55 = "や、やっちまった……まずい、これが上層部に知られたらあたしらは……！"
10018030-56 = "いや、まだ大丈夫だ。目撃者がいなけりゃ何も問題ない。"
10018030-57 = "そうか！誰も見てなかったことにすればいいのか！"
10018030-58 = "いよいよ現実を受け入れることさえできなくなったようですわね。"
10018030-59 = "先ほどから私たちに指一本触れられなかったというのに……一体、何を言っているのでしょう？"
10018030-60 = "へっへっへ。急に態度変えたのには、それ相応の理由があるってことだ！"
10018030-61 = "理由……？"
10018030-62 = "そうだ！お前たち、今度こそ無事でいられると思うなよ！"
10018030-71 = "急にどうしたんだ？緊急の呼び出しなんて驚いたぞ。"
10018030-72 = "呼ばれたから来たけど……早く片付けて帰ろうよ。"
10018030-74 = "なるほど、"
10018030-75 = "増員ですか……。"
10018030-77 = "ようやく自分の立場を理解したのか？"
10018030-78 = "でも遅かったな！#nグルメヘルメット団に歯向かったらどうなるのか思い知るといい！"
10018030-80 = "いいえ――"
10018030-81 = "理解したのは、あなた方も美食を汚すような方々と一緒だということですわ！"
