[translation]
10018030-1 = "Episódio 3; Não pense que venceu só com isso!"
10018030-2 = "Haa, haa...! Quem diabos são vocês?!"
10018030-3 = "Sobre isso, eu mesma responderei."
10018030-4 = "Somos peregrinas solitárias em busca da essência da gastronomia. EAT or DIE."
10018030-6 = "Para comer algo delicioso, superaremos qualquer dificuldade — essas somos nós, o Clube de Pesquisa Gastronômica de Gehenna."
10018030-12 = "Clube de Pesquisa Gastronômica?! Tá brincando, né?!"
10018030-13 = "Não são aquelas malucas que dizem que pulariam num mar de fogo por causa de comida?!"
10018030-15 = "!?"
10018030-17 = "Não, não é isso."
10018030-18 = "A história é que a gente devora até o mar de fogo!"
10018030-25 = "Então faz sentido dizerem que têm estômagos de buraco negro..."
10018030-27 = "!?"
10018030-29 = "Ouvi dizer que, por causa da maldição da gula, elas não conseguem comer quando é mais importante."
10018030-35 = "Dito isso,"
10018030-36 = "Por que um grupo terrorista como o Clube de Pesquisa Gastronômica está no Suzume-tei?"
10018030-37 = "Como assim, terroristas?! Que falta de educação!"
10018030-38 = "Nós só estamos fazendo um tour gastronômico! #nProblemas só acontecem de vez em quando no caminho!"
10018030-39 = "Parece que o boato de que o Clube de Pesquisa Gastronômica não tem um pingo de consciência é verdade. #nQue gente assustadora..."
10018030-40 = "Enfim! Vocês não têm o direito de atrapalhar a gente!"
10018030-41 = "É isso aí! A dona do restaurante já assinou o contrato!"
10018030-42 = "A gente só veio avisar que o prazo do acordo está chegando, sabe?"
10018030-43 = "Onde é que está o problema nisso?"
10018030-44 = "Viu só? A gente veio confirmar por pura bondade!"
10018030-46 = "Que coisa interessante a se dizer."
10018030-47 = "Se se orgulham de serem gentis, por que escondem o rosto com capacetes e ameaçam a dona do estabelecimento?"
10018030-48 = "A-algum problema com isso?!"
10018030-49 = "E além disso — por que o Grupo Gourmet de Capacetes está se intrometendo nos problemas entre o Suzume-tei e a Nyao Food?"
10018030-50 = "Existe alguma relação entre a Nyao Food e o Grupo Gourmet de Capacetes?"
10018030-54 = "Eita... será que a gente fez besteira?"
10018030-55 = "A-a gente fez besteira... droga, se a chefia souber disso, a gente tá..."
10018030-56 = "Não, ainda dá tempo. Se não tiver testemunhas, não tem problema nenhum."
10018030-57 = "É isso! É só fingir que ninguém viu nada!"
10018030-58 = "Parece que vocês finalmente perderam a capacidade de aceitar a realidade."
10018030-59 = "Mesmo sem terem conseguido nos tocar com um dedo sequer desde agora... do que exatamente vocês estão falando?"
10018030-60 = "Hehehe. Se a gente mudou de atitude de repente, é porque tem um motivo!"
10018030-61 = "Motivo...?"
10018030-62 = "Isso mesmo! Não pensem que vão sair ilesas desta vez!"
10018030-71 = "O que houve de repente? Fiquei surpreso com o chamado de emergência."
10018030-72 = "Vim porque me chamaram, mas... vamos acabar logo com isso e ir embora."
10018030-74 = "Entendo,"
10018030-75 = "Reforços, é..."
10018030-77 = "Finalmente entenderam a situação de vocês?"
10018030-78 = "Mas é tarde demais! #nPreparem-se para ver o que acontece com quem desafia o Grupo Gourmet de Capacetes!"
10018030-80 = "Não —"
10018030-81 = "O que eu entendi é que vocês são iguais a essas pessoas que mancham a gastronomia!"
