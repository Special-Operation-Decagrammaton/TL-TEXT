[translation]
1000509-1 = "Aquário!"
1000509-2 = "Aquário - Entrada"
1000509-3 = "Uhee, então este é o aquário."
1000509-4 = "Como sou do interior, não estou acostumada com lugares assim."
1000509-5 = "Olha só, peguei um panfleto também."
1000509-6 = "Tem o pavilhão dos peixes tropicais, o dos peixes de águas profundas e até um lugar para alimentar os animais!"
1000509-7 = "Ah, tem show de golfinhos e... o pavilhão dos pinguins. Deve ser bem frio lá dentro, né?"
1000509-8 = "Olha isso, Sensei! É um túnel subaquático!"
1000509-9 = "Dizem que tem até tubarão-baleia! Será que é tipo uma baleia...?"
1000509-10 = "Será que dá para ver tudo em um dia só...? Hmm, vou ter que me esforçar."
1000509-11 = "Bom, por onde vamos começar?"
1000509-13 = "(Passamos pelo pavilhão dos peixes tropicais, o de águas profundas e chegamos ao túnel subaquático)"
1000509-16 = "― Aquilo é o que chamam de baleia?"
1000509-20 = "― Uau~[wa:2300] incrível.[wa:1500] É a primeira vez que vejo algo assim."
1000509-23 = "― Olha lá! [wa:1000] Um peixinho! [wa:1200] Ahahaha, [wa:500] que fofo!"
1000509-26 = "― ……"
1000509-29 = "― Será que tudo bem eu me divertir tanto[wa:2000] sozinha...?"
1000509-32 = "― É uma preocupação desnecessária, você diz?[wa:5000] ...Será?"
1000509-35 = "(Depois disso, caminhamos por todo o aquário, visitando o local de alimentação, o pavilhão das águas-vivas, o das tartarugas marinhas e até a loja de lembrancinhas, nos divertindo muito)"
1000509-37 = "……Foi divertido."
1000509-38 = "A experiência de alimentar o peixe-pescador foi muito interessante, né? A boca dele era enorme."
1000509-39 = "As águas-vivas bioluminescentes também foram legais, embora a luz tenha me deixado um pouco tonta."
1000509-40 = "O túnel subaquático também era grande e incrível... Ufa."
1000509-41 = "Acabei comprando um monte de lembrancinhas também, uhehehe."
1000509-42 = "Como brinquei até ficar exausta, acho que se eu chegar em casa e cair na cama, vou dormir por 24 horas seguidas."
1000509-43 = "[s1] \"Não pode se atrasar, hein.\"\n[s2] \"Você precisa ir para a escola.\""
1000509-44 = "Uhehe. Vou me esforçar para conseguir, Sensei!"
1000509-45 = "Uhehe. Vou me esforçar para conseguir, Sensei!"
1000509-46 = "Bom, então já está na hora de ir? É uma pena que ainda tenha lugares que não vimos, mesmo andando o dia todo."
1000509-47 = "Bem, é só se esforçar e vir de novo na próxima. Né?"
1000509-48 = "[s3] \"É verdade.\"\n[s4] \"Vamos voltar outro dia.\""
1000509-51 = "Uhe. Na próxima eu que vou te convidar, pode ficar na expectativa, Sensei!"
1000509-53 = "(Embora estivesse um pouco cansada, voltei para casa junto com uma Hoshino que parecia muito feliz)"
