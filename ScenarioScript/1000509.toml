[translation]
1000509-1 = "アクアリウム！"
1000509-2 = "アクアリウム・入口"
1000509-3 = "うへー、ここがアクアリウムかあ。"
1000509-4 = "おじさんは田舎者だから、こういうところは見慣れないなあ。"
1000509-5 = "これ見て、パンフレットももらったよ。"
1000509-6 = "熱帯魚館に深海魚館、エサやりの体験館もあるみたい！"
1000509-7 = "へえ、イルカショーもあるし……ペンギン館もある。ここはきっと寒いんだよね？"
1000509-8 = "これ見て、先生！海のトンネルだって！"
1000509-9 = "ジンベイザメもいるんだって！鯨みたいなものかな……?"
1000509-10 = "今日一日で全部見れるのかな……うーん、頑張らないと。"
1000509-11 = "さて、どこから行ってみる？"
1000509-13 = "（熱帯魚館、深海魚館を通って海のトンネルに到着した）"
1000509-16 = "― あれが鯨ってやつなの？"
1000509-20 = "― へえ～[wa:2300]すごい。[wa:1500]こんなところ初めて。"
1000509-23 = "― あれ見て！[wa:1000]お魚だ！[wa:1200]あははは、[wa:500]カワイイ！"
1000509-26 = "― ……。"
1000509-29 = "― 私一人[wa:2000]こんなに楽しんでていいのかな……。"
1000509-32 = "― 余計な心配だって？[wa:5000]……そうかな？"
1000509-35 = "（その後エサやり体験館、クラゲ館、ウミガメ館、グッズショップまで、アクアリウムのあっちこっちを歩き回りたくさん遊んだ）"
1000509-37 = "……楽しかった。"
1000509-38 = "アンコウのエサやり体験、めちゃくちゃ面白かったね。すっごい大きい口だった。"
1000509-39 = "夜光クラゲも、光でちょっとめまいがしたけどカッコよかったし。"
1000509-40 = "海のトンネルも大きくてすごかった……ふう。"
1000509-41 = "記念品もこんなにたくさん買っちゃったし、うへへへ。"
1000509-42 = "ヘトヘトになるまで遊んだから、もう家に帰ったらそのまま倒れて24時間は寝れちゃいそう。"
1000509-43 = "[s1] \"寝坊はダメだよ。\"\n[s2] \"学校は行かないとね。\""
1000509-44 = "うへへ。それはなんとか頑張ってみるよ、先生！"
1000509-45 = "うへへ。それはなんとか頑張ってみるよ、先生！"
1000509-46 = "さて、じゃあそろそろ帰る？一日歩き回ったのにまだ見てないところがあるなんて、なんだか残念だけど。"
1000509-47 = "まあ、頑張ってまた次も来たらいいし。ね？"
1000509-48 = "[s3] \"そうだね。\"\n[s4] \"また来よう。\""
1000509-51 = "うへ。次はおじさんが招待するから、期待しててもいいよ、先生！"
1000509-53 = "（少し疲れたけど、楽しそうなホシノと一緒に帰った）"
