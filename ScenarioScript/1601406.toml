[translation]
1601406-1 = "Estudando com a Ibuki!"
1601406-2 = "（Recebi um contato da Ibuki e fui até o Pandemonium）"
1601406-7 = "Ah! Sensei! Obrigada por vir!"
1601406-8 = "Eu estava te esperando!"
1601406-9 = "[s1] \"Você encontrou o que queria fazer?\"\n[s2] \"Você encontrou o que gosta de fazer?\""
1601406-12 = "Desde a última vez que fomos a vários lugares juntos, fiquei pensando nisso o tempo todo."
1601406-13 = "Tudo foi tão divertido que eu não conseguia decidir qual escolher..."
1601406-14 = "Eu quero ser policial, quero ser cozinheira, quero ser comandante de tanque..."
1601406-15 = "E então, Sensei!"
1601406-16 = "Enquanto eu pensava, o seu rosto veio à minha mente!"
1601406-17 = "[s] \"Eu...?\""
1601406-18 = "Sim! O Sensei entende como a Ibuki se sente, não é?"
1601406-19 = "Você transformou a Schale em um parque de diversões!"
1601406-20 = "Você me mostrou vários trabalhos que eu queria fazer!"
1601406-21 = "Por isso..."
1601406-22 = "Eu pensei que, um dia, também quero ser uma Sensei!"
1601406-23 = "[s] \"A Ibuki quer ser uma Sensei... Sim, tenho certeza de que você será uma ótima Senseia.\""
1601406-24 = "Hehehe, é verdade?"
1601406-25 = "E tem mais, tem uma coisa que eu quero te mostrar!"
1601406-26 = "Eu te convidei hoje justamente por causa disso!"
1601406-27 = "[s] \"O que você vai me mostrar?\""
1601406-28 = "Por aqui, por aqui!"
1601406-31 = "Bem-vindo à aula de matemática da Ibuki!"
1601406-34 = "[wa:900]― [log=이부키]Hoje,[wa:790] a Ibuki é a Senseia![/log]"
1601406-35 = "[wa:3000]― [log=이부키]Agora...[wa:1390] vamos ter uma aula de matemática![/log]"
1601406-38 = "[wa:800]― [log=이부키]Eu,[wa:640] em matemática,[wa:480] sou muito confiante![/log]"
1601406-41 = "― [log=이부키]Ontem,[wa:260] tirei nota 100 no teste,[/log]"
1601406-42 = "[wa:1360]― [log=이부키]e ganhei uma estrelinha![/log]"
1601406-45 = "[ns] \"Incrível! Como esperado da Senseia Ibuki!\""
1601406-46 = "[wa:800]― [log=이부키]Hehehe...[wa:1630] Então,[wa:340] Sensei...[/log]"
1601406-47 = "[wa:1410]― [log=이부키]Aqui vai uma pergunta[wa:1310] da Senseia Ibuki![/log]"
1601406-50 = "[wa:200]― [log=이부키]Aqui![wa:530] Temos 2 sorvetes e,[/log]"
1601406-51 = "[wa:1290]― [log=이부키]1 pudim.[/log]"
1601406-54 = "― [log=이부키]Quantos temos[wa:250] no total~?[/log]"
1601406-57 = "[ns] \"No total, são 3...?\""
1601406-58 = "[wa:1200]― [log=이부키]Errado![wa:580] Que pena![/log]"
1601406-59 = "[wa:1990]― [log=이부키]A res[wa:540]pos[wa:310]ta é...[/log]"
1601406-62 = "[ns] \"A resposta é...?\""
1601406-63 = "[wa:900]― [log=이부키]\"Se tivermos 3 doces,[wa:2270] é uma felicidade enorme!\"[wa:2610]![/log]"
1601406-66 = "― [log=이부키]Ah![wa:820] Depois de comer,[/log]"
1601406-67 = "[wa:1230]― [log=이부키]não se esqueça de escovar os dentes![/log]"
1601406-70 = "― [log=이부키]A Ibuki,[wa:1170] 3 vezes ao dia,[/log]"
1601406-71 = "[wa:1190]― [log=이부키]escova os dentes[wa:200] direitinho![/log]"
1601406-75 = "O que achou da aula da Ibuki?"
1601406-76 = "[s] \"Foi uma aula muito divertida!\""
1601406-77 = "Hehehe, é verdade mesmo?"
1601406-78 = "Um dia, a Ibuki..."
1601406-79 = "Quer ser uma adulta como o Sensei!"
1601406-80 = "[s] \"Se for você, Ibuki, com certeza conseguirá.\""
1601406-81 = "Hehehe!"
1601406-82 = "Obrigada! Sensei!"
1601406-92 = "A Ibuki vai se esforçar muuuito!"
1601406-94 = "（Depois disso, continuei assistindo às aulas da Senseia Ibuki na pequena sala por mais um tempo）"
