[translation]
1601406-1 = "イブキとお勉強！"
1601406-2 = "（イブキから連絡をもらい、万魔殿に向かった）"
1601406-7 = "あっ！先生！来てくれてありがとう！"
1601406-8 = "待ってたよ！"
1601406-9 = "[s1] \"やりたいことが見つかったの？\"\n[s2] \"好きなことが見つかったの？\""
1601406-12 = "この前、先生といろんなところに行ってから、ずーっと考えてたの。"
1601406-13 = "ぜーんぶ楽しかったから、どれにしようって……でもイブキ、選べなかった。"
1601406-14 = "お巡りさんにもなりたいし、コックさんにもなりたいし、戦車長にもなりたい……"
1601406-15 = "それでね、先生！"
1601406-16 = "考えてたら先生の顔が浮かんだの！"
1601406-17 = "[s] \"私……？\""
1601406-18 = "うん！先生はイブキの気持ちを分かってくれるでしょ？"
1601406-19 = "シャーレを遊園地にしてくれたり！"
1601406-20 = "イブキのやりたいお仕事、いろいろ見せてくれたよね！"
1601406-21 = "だから……"
1601406-22 = "イブキも、いつか先生になりたいって思ったの！"
1601406-23 = "[s] \"イブキが、先生に……うん、きっといい先生になると思う。\""
1601406-24 = "えへへ、本当？"
1601406-25 = "それでそれで、先生に見せたいものがあって！"
1601406-26 = "今日は、そのために先生を招待したんだよ！"
1601406-27 = "[s] \"何を見せてくれるの？\""
1601406-28 = "こっちこっち！"
1601406-31 = "イブキの算数教室へようこそ！"
1601406-34 = "[wa:900]― [log=이부키]今日は[wa:790]イブキが先生だよ！[/log]"
1601406-35 = "[wa:3000]― [log=이부키]今から……[wa:1390]さんすうの授業をします！[/log]"
1601406-38 = "[wa:800]― [log=이부키]イブキ、[wa:640]さんすうは[wa:480]自信あるんだ！[/log]"
1601406-41 = "― [log=이부키]昨日、[wa:260]テストで100点とってね、[/log]"
1601406-42 = "[wa:1360]― [log=이부키]はなまるもらったの！[/log]"
1601406-45 = "[ns] \"すごい！さすがイブキ先生！\""
1601406-46 = "[wa:800]― [log=이부키]えへへっ……[wa:1630]じゃあ、[wa:340]先生に……[/log]"
1601406-47 = "[wa:1410]― [log=이부키]イブキ先生から[wa:1310]問題です！[/log]"
1601406-50 = "[wa:200]― [log=이부키]ここに！[wa:530]アイスクリーム2コと、[/log]"
1601406-51 = "[wa:1290]― [log=이부키]プリン1コがあります。[/log]"
1601406-54 = "― [log=이부키]全部で[wa:250]何個でしょうか〜？[/log]"
1601406-57 = "[ns] \"合計で、3コ……？\""
1601406-58 = "[wa:1200]― [log=이부키]ぶぶー！[wa:580]残念！[/log]"
1601406-59 = "[wa:1990]― [log=이부키]正[wa:540]解[wa:310]は～……[/log]"
1601406-62 = "[ns] \"正解は……？\""
1601406-63 = "[wa:900]― [log=이부키]「おやつが3コもあったら[wa:2270]すっごく幸せ～」[wa:2610]だよ！[/log]"
1601406-66 = "― [log=이부키]あっ！[wa:820]食べたあとは、[/log]"
1601406-67 = "[wa:1230]― [log=이부키]歯みがきを忘れないでね！[/log]"
1601406-70 = "― [log=이부키]イブキはね、[wa:1170]毎日3回、[/log]"
1601406-71 = "[wa:1190]― [log=이부키]ちゃんと[wa:200]歯みがきをしてるんだよ！[/log]"
1601406-75 = "イブキの授業、どうだった？"
1601406-76 = "[s] \"楽しい授業だったよ！\""
1601406-77 = "えへへ、本当に～？"
1601406-78 = "イブキ、いつかね……"
1601406-79 = "先生みたいな大人になりたいな！"
1601406-80 = "[s] \"イブキなら、きっとなれるよ。\""
1601406-81 = "えへへっ！"
1601406-82 = "ありがとう！先生！"
1601406-92 = "イブキ、い～っぱい頑張るね！"
1601406-94 = "（その後もしばらく、小さな教室でイブキ先生の授業を受けた）"
