[translation]
11007-2 = "Vou deixar o resto para você."
11007-5 = "Você está fugindo! ? Eu vou perseguir você!"
11007-6 = "Não, não aja sem entusiasmo. Nosso objetivo é simplesmente recuperar a placa de Petri."
11007-7 = "Você deve continuar em frente até chegar ao prédio da placa de Petri."
11007-8 = "...Sim, tudo bem. Não é nosso trabalho persegui-lo."
11007-9 = "Pode ser uma armadilha."
11007-10 = "sim. Priorize a retomada do prédio. Vamos continuar assim e seguir em frente."
