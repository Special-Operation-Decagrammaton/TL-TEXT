[translation]
11007-2 = "Vou deixar o resto para você."
11007-5 = "Ela está fugindo!? Atrás dela!"
11007-6 = "Não, não aja sem pensar. Nosso objetivo é simplesmente recuperar Schale."
11007-7 = "Devemos continuar em frente até chegar a Schale."
11007-8 = "...Tudo bem. Não é nosso trabalho capturá-la."
11007-9 = "Além de que pode ser uma armadilha."
11007-10 = "Exato. Priorize a retomada do prédio. Vamos continuar."
