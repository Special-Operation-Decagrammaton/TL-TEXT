[translation]
1012208-1 = "いつかの私へ"
1012208-2 = "[ns] \"この辺りかな……。\""
1012208-4 = "先生～こっちこっち！"
1012208-5 = "あはは、急だったのにありがとう！"
1012208-6 = "どうしても、見てほしかったんだ……。"
1012208-7 = "[s] \"すごく気になってきたよ。\""
1012208-8 = "ちょっと歩くけど、平気かな。"
1012208-9 = "ここから少し離れてるんだよね。"
1012208-10 = "夜の散歩、好き？"
1012208-11 = "へへ、よかった。"
1012208-12 = "じゃ……。"
1012208-17 = "行こっか。"
1012208-19 = "（そうして、ミカと一緒に夜の浜辺を散歩した）"
1012208-22 = "あ、そういえば……。"
1012208-23 = "……。"
1012208-24 = "この前は迷惑かけちゃってごめんね。"
1012208-25 = "[s] \"うん？\""
1012208-26 = "私、寝ちゃったでしょ？#nそれでその……部屋までおんぶ……してもらっちゃって……。"
1012208-27 = "[s1] \"気にしないで。ちょっと大変だったけど。\"\n[s2] \"羽みたいに軽かったよ。大丈夫。\""
1012208-28 = "えっ、嘘！"
1012208-29 = "重かっ……たかな……？"
1012208-30 = "え、冗談？"
1012208-31 = "も～バカバカ！信じちゃったじゃん！"
1012208-32 = "……まあ、寝た私が悪いんだけど。"
1012208-33 = "えっ、ほ、ほんとに？"
1012208-34 = "そ、そっか。軽かったなら、いいけど……。"
1012208-35 = "あ、いや……そうじゃなくて……。"
1012208-36 = "はぁ……ごめんね。"
1012208-37 = "また先生に、迷惑かけちゃった。"
1012208-38 = "許してくれるの……？#nえ……もう大人の真似をしないなら？"
1012208-39 = "はい……もうしません。"
1012208-40 = "無理にあんなことしなくても――"
1012208-41 = "素直に話せばいいって、教えてもらったからね。"
1012208-42 = "[ns] \"もうすっきりした？\""
1012208-44 = "うーん、どうなんだろ……？"
1012208-45 = "あの後もずっと考えてるけど……。"
1012208-49 = "あ、もう着くよ。"
1012208-50 = "すぐそこだから。"
1012208-51 = "こっちこっち……！"
1012208-57 = "[ns] \"すごい……！！\""
1012208-58 = "でしょ～？"
1012208-59 = "一人で散歩してたら、たまたま見つけちゃったの！"
1012208-60 = "すっごい景色だよね☆"
1012208-61 = "ふふっ、先生にも見てもらえてよかった。"
1012208-62 = "早く！ここ座って座って！"
1012208-70 = "はぁ……。"
1012208-71 = "こうしてると、悩み事もどこか飛んでいっちゃうね。"
1012208-72 = "あ……。"
1012208-73 = "せ、先生！あっち……！"
1012208-74 = "[ns] \"あれは……！？\""
1012208-79 = "うわあ……流れ星があんなに……。"
1012208-80 = "本当に、綺麗……。"
1012208-81 = "[ns] \"ありがとね、ミカ。\""
1012208-82 = "えっ？？"
1012208-83 = "[ns3] \"ミカのおかげで――\"\n[ns4] \"こんなに素敵な景色が見られたから。\""
1012208-86 = "……。"
1012208-89 = "[wa:860]― [log=미카 수영복]ねぇ、[wa:570]先生。[/log]"
1012208-91 = "― [log=미카 수영복]私……[wa:2620]この景色を[wa:1030]先生と[wa:680]見られて[wa:1980]よかった。[/log]"
1012208-94 = "[wa:2060]― [log=미카 수영복]心配事も――[/log]"
1012208-96 = "― [log=미카 수영복]将来の悩みも――[wa:80] [/log]"
1012208-99 = "― [log=미카 수영복]不安も――[wa:2250]まだ、[wa:1630]残ってる。[/log]"
1012208-102 = "[wa:550]― [log=미카 수영복]でも……。[/log]"
1012208-104 = "― [log=미카 수영복]こんな星空を[wa:1090]見ちゃったらさ。[/log]"
1012208-107 = "― [log=미카 수영복]……全部、[wa:1630]ちっぽけな[wa:720]ことなんじゃないかな[wa:1610]って。[/log]"
1012208-109 = "― [log=미카 수영복]そんな気がするんだ。[/log]"
1012208-112 = "[wa:920]― [log=미카 수영복]先生、[wa:1400]言ってくれたよね。[/log]"
1012208-115 = "― [log=미카 수영복]今、[wa:1850]この瞬間が、[wa:3560]これからも[wa:1000]ずっ[wa:1030]と……。[/log]"
1012208-117 = "― [log=미카 수영복]私を支えてくれる、[wa:2230]って。[/log]"
1012208-120 = "[wa:530]― [log=미카 수영복]だから……。[/log]"
1012208-122 = "― [log=미카 수영복]私も、[wa:2930]幸せになるよ。[/log]"
1012208-126 = "……。"
1012208-127 = "い、言っちゃったよお～……。"
1012208-128 = "[ns] \"ミカは、幸せになれるよ。\""
1012208-132 = "[ns] \"そう信じてる。\""
1012208-133 = "そ、そんな……。"
1012208-134 = "先生……すぐ恥ずかしいこと言うんだから……。"
1012208-139 = "ありがとね。"
1012208-140 = "私、幸せになるよ。"
1012208-141 = "だから、手伝ってくれると……嬉しいな？"
1012208-142 = "[s5] \"うん、もちろん。\"\n[s6] \"ずっと、いつだって見守ってるよ。\""
1012208-145 = "あはは、また真顔でそんなこと言って☆"
1012208-146 = "……。"
1012208-150 = "先生は、ちょっと変なとこもあるけど……優しいよね。"
1012208-154 = "ああ～、先生と来れてよかった。"
1012208-159 = "ずっとここにいたら、悪い子になっちゃうし……。"
1012208-160 = "そろそろ行こっか☆"
1012208-164 = "[ns] \"ん？今なんて……。\""
1012208-165 = "あははっ、早く帰ろ☆"
1012208-167 = "（ミカと一緒に浜辺を歩いて帰った）"
1012208-173 = "（帰り道も、ミカはずっと笑顔ではしゃいでいて――）"
1012208-174 = "（少しだけ、幸せそうに見えた）"
