[translation]
1012208-1 = "Para mim algum dia"

1012208-2 = "[ns] \"Talvez por aqui...\""

1012208-4 = "Professor ~ Aqui, aqui!"

1012208-5 = "Haha, obrigado por ser tão repentino!"

1012208-6 = "Eu realmente queria que você visse..."

1012208-7 = "[s] \"Estou muito curioso.\""

1012208-8 = "É uma pequena caminhada, mas acho que está tudo bem."

1012208-9 = "É um pouco longe daqui."

1012208-10 = "Você gosta de caminhar à noite?"

1012208-11 = "Hehe, bom."

1012208-12 = "bem……."

1012208-17 = "Vamos?"

1012208-19 = "(Depois dei um passeio na praia à noite com Mika.)"

1012208-22 = "Ah, agora que penso nisso..."

1012208-23 = "……."

1012208-24 = "Desculpe por incomodar você outro dia."

1012208-25 = "[s] \"Sim?\""

1012208-26 = "Eu adormeci, certo? #nEntão... eu fiz ela me carregar nas costas para o meu quarto..."

1012208-27 = "[s1] \"Não se preocupe. Foi um pouco difícil.\"\n[s2] \"Foi leve como uma pena. Está tudo bem.""

1012208-28 = "Ah, isso é mentira!"

1012208-29 = "É pesado... talvez...?"

1012208-30 = "O que, você está brincando?"

1012208-31 = "Muito estúpido! Eu acreditei!"

1012208-32 = "...Bem, foi minha culpa por dormir."

1012208-33 = "Huh? Realmente?"

1012208-34 = "Oh, eu vejo. Tudo bem se fosse mais leve..."

1012208-35 = "Ah, não... não é isso..."

1012208-36 = "Suspiro... desculpe."

1012208-37 = "Eu causei problemas para o professor novamente."

1012208-38 = "Você vai me perdoar...? #nE...se você não imitar mais os adultos?"

1012208-39 = "Sim...não farei isso de novo."

1012208-40 = "Mesmo que você não se force a fazer isso..."

1012208-41 = "Você me ensinou que basta ser honesto."

1012208-42 = "[ns] \"Você já está se sentindo revigorado?\""

1012208-44 = "Hmm, eu me pergunto...?"

1012208-45 = "Tenho pensado nisso desde então..."

1012208-49 = "Ah, estou quase lá."

1012208-50 = "Porque está bem aí."

1012208-51 = "Aqui, aqui…!"

1012208-57 = "[ns] \"Incrível...!!\""

1012208-58 = "Certo?"

1012208-59 = "Acontece que eu o encontrei quando estava andando sozinho!"

1012208-60 = "Essa é uma vista incrível☆"

1012208-61 = "Hehe, que bom que a professora também viu."

1012208-62 = "rapidamente! Senta aqui, senta!"

1012208-70 = "Suspirar..."

1012208-71 = "Se você fizer isso, suas preocupações irão embora."

1012208-72 = "um……."

1012208-73 = "Ei, professor! Lá...!"

1012208-74 = "[ns] \"Isso é...!?\""

1012208-79 = "Uau... tantas estrelas cadentes..."

1012208-80 = "Realmente lindo..."

1012208-81 = "[ns] \"Obrigado, Mika.\""

1012208-82 = "Huh? ?"

1012208-83 = "[ns3] \"Obrigado a Mika――\"\n[ns4] \"Porque pudemos ver um cenário tão maravilhoso.\""

1012208-86 = "……."

1012208-89 = "[wa:860]― [log=미카 수영복]Ei, [wa:570]Sensei. [/registro]"

1012208-91 = "― [log=미카 수영복]Eu...[wa:2620]Fiquei [wa:1980] feliz em ver esse cenário com o [wa:1030] professor [wa:680]. [/registro]"

1012208-94 = "[wa:2060]― [log=미카 수영복]Preocupações―[/log]"

1012208-96 = "― [log=미카 수영복]Preocupações futuras também――[wa:80] [/log]"

1012208-99 = "― [log=미카 수영복] Ansiedade também - [wa:2250] Ainda resta [wa:1630]. [/registro]"

1012208-102 = "[wa:550]― [log=미카 수영복]Mas... [/log]"

1012208-104 = "― [log=미카 수영복]Eu gostaria de poder ver um céu estrelado como este [wa:1090]. [/registro]"

1012208-107 = "― [log=미카 수영복]...Acho que é tudo [wa:1630]pequeno[wa:720][wa:1610]. [/registro]"

1012208-109 = "― [log=미카 수영복]É assim que me sinto. [/registro]"

1012208-112 = "[wa:920]― [log=미카 수영복]Sensei, [wa:1400] você me contou. [/registro]"

1012208-115 = "― [log=미카 수영복]Agora, [wa:1850]neste momento, [wa:3560]de agora em diante, [wa:1000]para sempre [wa:1030]... [/log]"

1012208-117 = "― [log=미카 수영복]Você me apoia, [wa:2230]. [/registro]"

1012208-120 = "[wa:530]― [log=미카 수영복]Então... [/log]"

1012208-122 = "― [log=미카 수영복]Eu também ficarei [wa:2930] feliz. [/registro]"

1012208-126 = "……."

1012208-127 = "Eu-eu disse isso..."

1012208-128 = "[ns] \"Mika ficará feliz.\""

1012208-132 = "[ns] \"Acredito que sim.""

1012208-133 = "Ah, é isso..."

1012208-134 = "Professor...você sempre vai falar coisas constrangedoras..."

1012208-139 = "Obrigado."

1012208-140 = "Eu ficarei feliz."

1012208-141 = "Então, eu ficaria feliz se você pudesse me ajudar?"

1012208-142 = "[s5] \"Sim, claro.\"\n[s6] \"Estarei sempre cuidando de você.""

1012208-145 = "Haha, diga isso de novo com uma cara séria☆"

1012208-146 = "……."

1012208-150 = "O professor pode ser um pouco estranho, mas é gentil."

1012208-154 = "Ah, que bom que vim com você, professor."

1012208-159 = "Se eu ficar aqui para sempre, vou me tornar uma garota má..."

1012208-160 = "Vamos logo ☆"

1012208-164 = "[ns] \"Hmm? Agora...\""

1012208-165 = "Ahaha, apresse-se e vá para casa ☆"

1012208-167 = "(Voltei pela praia com Mika)"

1012208-173 = "(Mesmo no caminho para casa, Mika estava sorrindo e se divertindo...)"

1012208-174 = "(Ele parecia um pouco feliz)"

