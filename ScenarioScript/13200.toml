[translation]
13200-1 = "Episódio 20; Caça ao Tesouro"
13200-4 = "……。"
13200-8 = "Senpai Hoshino!"
13200-9 = "Onde está o Presidente……？"
13200-12 = "Hmph……。"
13200-17 = "……。"
13200-20 = "Um helicóptero……！？"
13200-25 = "……！"
13200-27 = "Foi por pouco."
13200-28 = "Agora, o canhão ferroviário é meu."
13200-31 = "Suou, onde está aquilo?"
13200-32 = "Aqui."
13200-37 = "Q-quando foi que você pegou meu cartão……！"
13200-38 = "É necessário para entrar no \"Vale do Conselho Estudantil\"."
13200-40 = "Vale do Conselho Estudantil……？"
13200-41 = "Sim. Pelo visto, é necessária a autorização do Grupo Nephthys para chegar lá."
13200-42 = "Eu gostaria de levar o próprio dono, mas #ninfelizmente isso não foi possível."
13200-44 = "……Mas com este cartão, não há problema."
13200-45 = "O canhão ferroviário está localizado nesse \"Vale do Conselho Estudantil\"……？"
13200-46 = "Não me diga que vocês pretendem vir atrás de mim?"
13200-47 = "Considerando o valor estratégico, técnico e histórico do \"Canhão Ferroviário Shem-ha\"——"
13200-48 = "Seu valor chega a aproximadamente 80 bilhões de ienes!"
13200-49 = "O-oitenta bilhões……！？"
13200-50 = "I-isso é um absurdo!"
13200-52 = "Se causarem um único arranhão no canhão, #nexigirei o pagamento de uma indenização altíssima."
13200-53 = "Vocês estão preparadas para isso?"
13200-56 = "Pois é. Até que a indenização seja paga, farei a Hoshino trabalhar para mim. #nTenho certeza de que o Kuro-fuku ficará satisfeito."
13200-57 = "……Ou preferem lutar seguindo as leis? #nNão me importo de ser seu oponente."
13200-60 = "Quando vocês se formarem, torturarei os novos alunos. #nIsso, é claro, se Abydos tiver algum futuro. #nHAHAHAHAHA!"
13200-65 = "……Hm?"
13200-66 = "O que houve, Suou?"
13200-72 = "O quê……."
13200-73 = "U-UOOOOOOOH!?"
13200-79 = "Presidente!?"
13200-88 = "Guaaaah!"
13200-92 = "Eles estão brigando entre si……！？"
13200-93 = "……！"
13200-94 = "Hã, o que está acontecendo!?"
13200-95 = "O que diabos é isso……."
13200-100 = "Gu……."
13200-101 = "Ugh……！"
13200-105 = "Presidente!"
13200-106 = "Você está ferido!?"
13200-107 = "Ugh…… tosse, tosse."
13200-111 = "R-rápido, entrem em contato com a sede!"
13200-113 = "……Takanashi Hoshino. #nVocê sabe onde fica o Vale do Conselho Estudantil, não sabe?"
13200-114 = "Se quiser parar o canhão ferroviário, venha até lá."
13200-116 = "Quem é você……."
13200-117 = "Se não vier, eu mesmo operarei o canhão."
13200-121 = "……。"
13200-122 = "Onde será que fica...?"
13200-123 = "Eu também não sei."
13200-127 = "(O Vale do Conselho Estudantil...)"
13200-128 = "(Isso mesmo, Setor 35-9!)"
13200-130 = "Acho que é tudo a mesma coisa."
13200-131 = "Mesmo que houvesse itens de exibição valiosos, o antigo Conselho Estudantil já deve ter vendido tudo há muito tempo."
13200-134 = "Antigamente, o Conselho Estudantil de Abydos construiu um pavilhão de exposições no deserto. #nEsse lugar é o Vale do Conselho Estudantil."
13200-135 = "Entendi, estava escondido lá."
13200-141 = "Espere, Hoshino-senpai!"
13200-146 = "É isso mesmo, senpai!"
13200-147 = "Por favor, espere, precisamos conversar!"
13200-148 = "Hoshino-senpai!"
13200-149 = "A Nonomi-senpai foi salva!"
13200-151 = "E o Conselho Estudantil de Abydos não precisou ser dissolvido."
13200-152 = "Exatamente, por isso, por favor, acalme-se! #nVamos pensar em um plano juntas!"
13200-153 = "……Desculpe."
13200-154 = "¡?"
13200-155 = "Hoshino-senpai……."
13200-156 = "[s] \"Hoshino, espere.\""
13200-158 = "Se eu estiver no Comitê de Contramedidas, não poderei destruir o canhão ferroviário."
13200-159 = "……!"
13200-160 = "……Eu não sou do Comitê de Contramedidas. #nEu sou do Conselho Estudantil de Abydos."
13200-161 = "Isso não é mais verdade!"
13200-162 = "O Comitê de Contramedidas é o Conselho Estudantil de Abydos—"
13200-164 = "——Já que o contrato não pôde ser mantido, essa decisão não tem mais significado."
13200-165 = "O Comitê de Contramedidas não deve se envolver neste problema."
13200-166 = "……!"
13200-167 = "Isso precisa ser um ato isolado cometido por Takanashi Hoshino, que se autodenomina membro do Conselho Estudantil."
13200-171 = "[ns] \"Espere, Hoshino!\""
13200-177 = "Kya!?"
13200-185 = "Desculpe, Shiroko-chan."
13200-195 = "Droga!"
13200-196 = "O canhão ferroviário não pode ficar em Abydos."
13200-197 = "Por isso, eu vou destruí-lo. #nPara proteger o futuro das minhas queridas kouhais."
13200-198 = "……Obrigada por tentar proteger as memórias que você passou com a Yume-senpai."
13200-203 = "Hoshino-senpai!!"
13200-209 = "F-falta pouco!"
13200-210 = "Argh…… vamos sair de Abydos rapidamente."
13200-211 = "……Além disso, convoque todos os funcionários do Grupo Kaiser."
13200-212 = "T-todos os funcionários!?"
13200-214 = "Isso mesmo!"
13200-215 = "Kaiser Industry."
13200-216 = "Kaiser Loan."
13200-217 = "Kaiser Construction."
13200-218 = "Kaiser Convenience."
13200-219 = "Kaiser PMC."
13200-220 = "Com todas as forças da nossa empresa, vamos para uma batalha total……!"
13200-221 = "Batalha total……!"
13200-222 = "O alvo é o Vale do Conselho Estudantil……! #nEntendido? Cof, cof……!"
13200-223 = "Obtenham aquele canhão ferroviário a qualquer custo!"
13200-224 = "E-entendido!"
13200-230 = "……。"
13200-231 = "Hoshino-senpai……。"
13200-232 = "……。"
13200-239 = "……。"
13200-245 = "Próximo episódio: A Segunda Perseguição"
