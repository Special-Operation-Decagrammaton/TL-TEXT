[translation]
13200-1 = "第20話;宝探し"
13200-4 = "……。"
13200-8 = "ホシノ先輩！"
13200-9 = "プレジデントはどこに……？"
13200-12 = "ふっ……。"
13200-17 = "……。"
13200-20 = "ヘリ……！？"
13200-25 = "……っ！"
13200-27 = "惜しかったな。"
13200-28 = "これで列車砲は私の物だ。"
13200-31 = "スオウ君、例の物は？"
13200-32 = "ここに。"
13200-37 = "い、いつの間に私のカードを……！"
13200-38 = "「生徒会の谷」に行くためには、これが必要だからな。"
13200-40 = "生徒会の谷……？"
13200-41 = "ああ。そこへ行くには、どうやらネフティスグループの権限が必要らしい。"
13200-42 = "本人を連れていきたいところだが、#n生憎とそれは叶わなかった。"
13200-44 = "……しかし、このカードさえあれば問題ない。"
13200-45 = "列車砲は「生徒会の谷」という場所にあるのですか……？"
13200-46 = "まさか、君たちも来ようとでも？"
13200-47 = "「列車砲シェマタ」は戦略的価値や技術的価値、歴史的価値を考慮すると――"
13200-48 = "その価値は、約800億円にも[ruby=のぼ]上[/ruby]る！"
13200-49 = "は、800億円……！？"
13200-50 = "で、デタラメに決まってるわ！"
13200-52 = "もし列車砲に傷ひとつでも付けたら、#n多額の賠償金を支払ってもらおう。"
13200-53 = "それだけの覚悟はあるのか？"
13200-56 = "そうだな。賠償金の支払いが済むまで、ホシノ君には働いてもらおう。#nきっと、黒服も喜ぶはずだ。"
13200-57 = "……それとも、法に則って戦うかね？#n相手になってやっても構わないぞ。"
13200-60 = "君たちが卒業したら、今度は新入生をいたぶってやろう。#nもっとも、アビドスに未来があるとしたらの話だがな。#nハッハッハッハッハ！"
13200-65 = "……ん？"
13200-66 = "どうした、スオウ君？"
13200-72 = "なっ……。"
13200-73 = "う、うおおおおおっ！？"
13200-79 = "プレジデント！？"
13200-88 = "ぐああぁぁっ！"
13200-92 = "仲間割れでしょうか……！？"
13200-93 = "……！"
13200-94 = "えっ、どういうこと！？"
13200-95 = "いったい、これは……。"
13200-100 = "ぐ……。"
13200-101 = "うっ……！"
13200-105 = "プレジデント！"
13200-106 = "お怪我は！？"
13200-107 = "うっ……げほっ、げほっ。"
13200-111 = "い、急いで本社に連絡を！"
13200-113 = "……[ruby=たかなし]小鳥遊[/ruby]ホシノ。#n生徒会の谷がどこを指しているのか、あんたなら知っているだろう？"
13200-114 = "列車砲を止めたいのなら、そこに来い。"
13200-116 = "君は……。"
13200-117 = "もし来なければ、列車砲は私が動かす。"
13200-121 = "……。"
13200-122 = "どこなのでしょうか……？"
13200-123 = "私も知らないわ。"
13200-127 = "（生徒会の谷……）"
13200-128 = "（そうだ、セクター35-9！）"
13200-130 = "どこも同じだと思いますよ。"
13200-131 = "高価な展示品があったとしても、とっくに前生徒会が売り払ってますから。"
13200-134 = "かつてアビドス生徒会が、砂漠に展示館を建てたんだ。#nその場所が、生徒会の谷。"
13200-135 = "そっか、あそこに隠されてたんだ。"
13200-141 = "待って、ホシノ先輩！"
13200-146 = "そうよ、先輩！"
13200-147 = "待ってください、話があるんです！"
13200-148 = "ホシノ先輩！"
13200-149 = "ノノミ先輩は助かったんです！"
13200-151 = "アビドス生徒会もなくならずに済んだ。"
13200-152 = "そうです、だから落ち着いてください！#nみんなで作戦を考えましょう！"
13200-153 = "……ごめんね。"
13200-154 = "っ！？"
13200-155 = "ホシノ先輩……。"
13200-156 = "[s] \"ホシノ、待って。\""
13200-158 = "私が対策委員会にいたら、列車砲を破壊できなくなる。"
13200-159 = "……！"
13200-160 = "……私は対策委員会じゃない。#nアビドス生徒会なんだ。"
13200-161 = "もう違います！"
13200-162 = "対策委員会は、アビドス生徒――"
13200-164 = "――契約を継続できなかった以上、その決定に意味はなくなる。"
13200-165 = "この問題に、対策委員会は関わるべきじゃない。"
13200-166 = "……！"
13200-167 = "これは生徒会を自称している小鳥遊ホシノによる、#n独断の犯行じゃないといけないんだ。"
13200-171 = "[ns] \"待って、ホシノ！\""
13200-177 = "きゃっ！？"
13200-185 = "ごめん、シロコちゃん。"
13200-195 = "くっ！"
13200-196 = "列車砲は、アビドスにあっちゃいけないんだ。"
13200-197 = "だから、私が壊す。#n可愛い後輩たちの、未来を守るために。"
13200-198 = "……ユメ先輩と過ごした思い出を守ろうとしてくれて、ありがとう。"
13200-203 = "ホシノ先輩！！"
13200-209 = "も、もう少しです！"
13200-210 = "ぐっ……早くアビドスから離れるぞ。"
13200-211 = "……それと、カイザーグループの全社員を招集しろ。"
13200-212 = "ぜ、全社員ですか！？"
13200-214 = "そうだ！"
13200-215 = "カイザー・インダストリー。"
13200-216 = "カイザーローン。"
13200-217 = "カイザーコンストラクション。"
13200-218 = "カイザーコンビニエンス。"
13200-219 = "カイザーPMC。"
13200-220 = "我が社の全勢力をもって、総力戦に臨むのだ……！"
13200-221 = "総力戦……！"
13200-222 = "目標は生徒会の谷だ……！#n良いか、ごほっごほっ……！"
13200-223 = "必ずや、列車砲を手に入れろ！"
13200-224 = "しょ、承知しました！"
13200-230 = "……。"
13200-231 = "ホシノ先輩……。"
13200-232 = "……。"
13200-239 = "……。"
13200-245 = "次回;二度目の追跡"
