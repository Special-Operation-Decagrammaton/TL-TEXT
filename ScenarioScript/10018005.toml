[translation]
10018005-1 = "Prólogo; A Crise do Restaurante Suzume"
10018005-4 = "Como estava o sabor?"
10018005-9 = "Sim, estava muito saboroso."
10018005-10 = "(Embora eu tenha dito isso, o sabor ainda deixa um pouco a desejar...)"
10018005-11 = "(Ainda há espaço para melhorias...)"
10018005-12 = "Acima de tudo, gostei muito do \"Ozoni\" do menu de Ano Novo."
10018005-13 = "O ponto do mochi estava perfeito, e a forma como ele inchou lindamente me fez aproveitar a atmosfera de Ano Novo..."
10018005-14 = "Os outros pratos, como o harumaki e os cozidos, também tinham um sabor delicado."
10018005-15 = "Todos eram pratos clássicos, mas é justamente por isso que a qualidade real do sabor se destaca."
10018005-20 = "Eu achei o peixe grelhado o melhor!"
10018005-21 = "A pele crocante de tão bem grelhada e o equilíbrio com o interior, que estava bem temperado, foram sublimes."
10018005-22 = "A porção deixou um pouco a desejar, mas fora isso, estou muito satisfeita~"
10018005-23 = "Qual seria a quantidade que satisfaz a Akari, afinal de contas...?"
10018005-24 = "Estava uma delícia!"
10018005-25 = "Mas, mas, sinto que ficaria ainda melhor se colocássemos curry em pó ou xarope!"
10018005-26 = "Acho que isso não combina nem um pouco!?"
10018005-31 = "Dona, a conta, por favor."
10018005-32 = "A conta, certo. Muito obrigada. #nFico muito feliz que os últimos clientes tenham aproveitado a refeição."
10018005-36 = "Últimos, como assim...?"
10018005-37 = "Sinto muito, mas o Restaurante Suzume vai fechar as portas em breve."
10018005-42 = "Ah?"
10018005-43 = "Hã?"
10018005-44 = "Eeeeh!? Está tão gostoso, por que!?"
10018005-51 = "Que pena. Logo agora que achei um restaurante tão maravilhoso."
10018005-52 = "Né! E olha que era um lugar realmente bom~ #nSinto que poderia comer qualquer coisa do menu daquele lugar!"
10018005-53 = "Isso não é sempre...?"
10018005-54 = "Falando nisso, Junko-san, você também não estava emocionada com o sabor da comida?"
10018005-58 = "Bem, isso é..."
10018005-59 = "É que eu não me lembro de quando foi a última vez que consegui comer algo gostoso com calma."
10018005-60 = "Sempre que eu tentava comer algo bom, um incidente acontecia, não é?"
10018005-61 = "Acho que isso é só com você, Junko-san★"
10018005-62 = "Ah, por que sempre acontece só comigo!"
10018005-63 = "Espero que a gente encontre outro restaurante parecido~"
10018005-64 = "É aquela sensação de decepção de quando você encontra um baú do tesouro, mas ele está vazio..."
10018005-65 = "Entendo perfeitamente essa comparação. #nPorque, sem perceber, a comida sumiu do prato."
10018005-72 = "Não, não devemos desistir tão facilmente."
10018005-77 = "Hm? O que quer dizer com não desistir? #nTem algo que possamos fazer?"
10018005-78 = "Pois é... Se soubéssemos um pouco antes, talvez pudéssemos ter feito alguma propaganda."
10018005-79 = "Mas só ficar olhando enquanto ele desaparece é... um pouco triste."
10018005-81 = "Eu tenho um plano."
10018005-82 = "Ufufu..."
10018005-83 = "Deixem isso comigo."
10018005-86 = "#video;10018"
