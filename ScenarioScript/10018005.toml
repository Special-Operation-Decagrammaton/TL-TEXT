[translation]
10018005-1 = "プロローグ;スズメ亭の危機"
10018005-4 = "お味はいかがでしたか？"
10018005-9 = "ええ、良いお味でしたわ。"
10018005-10 = "（と申し上げましたが、味としては少し惜しいですわね……）"
10018005-11 = "（まだ、良くなる余地が残されている……）"
10018005-12 = "なにより、お正月メニューの「お雑煮」がとても気に入りました。"
10018005-13 = "お餅の焼き加減もちょうど良く、美しい膨らみ方がお正月の雰囲気を楽しませてくれて……。"
10018005-14 = "その他の春巻きや煮物も、繊細な味わいでしたね。"
10018005-15 = "どれも定番の品ではありましたが、だからこそ純粋な味の良し悪しが出るものです。"
10018005-20 = "私は焼き魚が良かったと思うわ！"
10018005-21 = "こんがり焼かれてカリッとした皮と、味がしっかりと染み込んだ中身のバランスが絶妙で。"
10018005-22 = "量が少し物足りませんでしたが、それ以外は大満足です～"
10018005-23 = "アカリが満足する量って、いったいどんくらいなのよ……。"
10018005-24 = "おいしかったねー！"
10018005-25 = "でもでも、カレー粉とかシロップをかけたらもっとおいしくなる気がする！"
10018005-26 = "それはちょっとないと思うわよ！？"
10018005-31 = "女将さん、お会計をお願いいたします。"
10018005-32 = "お会計ですね、ありがとうございます。#n最後のお客さんに楽しんでお食事していただいて、うれしい限りです。"
10018005-36 = "最後、とは……？"
10018005-37 = "すみませんね、スズメ食堂はもうすぐ店を畳むんです。"
10018005-42 = "あら？"
10018005-43 = "えっ？"
10018005-44 = "えええっ！？こんなに美味しいのになんで！？"
10018005-51 = "残念ですね。せっかく素敵なお店を見つけたと思ったのに。"
10018005-52 = "ね！本当にいいお店だったのに～。#n私、あのお店のメニューならいくらでも食べられちゃう気がする！"
10018005-53 = "それはいつものことじゃないの……？"
10018005-54 = "そういうジュンコさんも、お店の味に感激してませんでした？"
10018005-58 = "まぁ、それは……"
10018005-59 = "だって、落ち着いておいしいものを食べられたのなんて、#nいつぶりか分からないんだもの。"
10018005-60 = "おいしいものを食べようとしてるときに限って、事件が起きてたじゃない。"
10018005-61 = "それはジュンコさんだけのような気がしますけどね★"
10018005-62 = "もう、なんでいっつも私だけ！"
10018005-63 = "また似たようなお店が見つかるといいねぇ～。"
10018005-64 = "せっかく見つけた宝箱の中身がなかったみたいなガッカリ感……。"
10018005-65 = "その例えはすごく分かります。#nいつの間にかお皿から料理がなくなっていましたから。"
10018005-72 = "いいえ、そう簡単に諦めてはなりませんわ。"
10018005-77 = "ん？諦めないってどういうこと？#n私たちにできることなんてあるの？"
10018005-78 = "そうですねぇ……もう少し早く知っていたら、宣伝とかできたかもしれませんが。"
10018005-79 = "でも、なくなってしまうのを眺めることしかできないのは……ちょっと悲しいかも。"
10018005-81 = "私に考えがありますわ。"
10018005-82 = "うふふっ……"
10018005-83 = "ここはお任せください。"
10018005-86 = "#video;10018"
