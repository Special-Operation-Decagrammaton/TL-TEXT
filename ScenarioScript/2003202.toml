[translation]
2003202-1 = "ファッション特訓編"
2003202-6 = "先生、今日もありがとう。"
2003202-7 = "これ？ファッション誌だよ。"
2003202-8 = "私に似合う服が知りたくて。"
2003202-9 = "アドバイスをもらって、参考にするの。"
2003202-10 = "こういうのなんて言うんだっけ、PDCAサイクル？"
2003202-11 = "[s1] \"……ちょっと違うような？\"\n[s2] \"私で良ければ喜んで。\""
2003202-14 = "ありがとう、じゃあ始めよっか。"
2003202-15 = "一番気になったのは、これ。"
2003202-20 = "せっかくだし、普段は着ない系統もいいかなと思って。#n「ファッション界の新たな風」だって。"
2003202-21 = "[s] \"……私服にしては派手すぎるんじゃないかな？\""
2003202-22 = "うーん……良いと思ったんだけど。"
2003202-23 = "じゃあ、これは？"
2003202-27 = "フォーマルなオフィスコーデなんだけど……そのままだと面白くないから、あえてスカートは無しで。#nこっちの方が意外性があるかなって。"
2003202-28 = "布の面積が少なすぎる……？#nだからニーソックスを履こうと思ってて……"
2003202-29 = "え？それがダメなの？"
2003202-30 = "あ、じゃあネクタイを結ぶとか……？"
2003202-32 = "（エイミと二人で「服」を選ぶ時間はしばらく続いて……）"
2003202-34 = "これはレトロ？って言うみたい。"
2003202-35 = "もう古いの？#nファッションには流行があるの？"
2003202-36 = "ん……難しいね。"
2003202-38 = "じゃあ、これはどうかな？"
2003202-42 = "大事な「勝負」の日に着ると、絶対うまくいくんだって。"
2003202-46 = "「アバンギャルド」……って言うらしいよ。"
2003202-47 = "[s] \"これ、本当にファッション誌なの……？\""
2003202-49 = "（エイミが持ってきた雑誌は、流行ではなく芸術寄りのもので……）"
2003202-50 = "（どれも前衛的で尖っているものばかりだった）"
2003202-52 = "これが最先端のだって聞いて持ってきたのに……"
2003202-53 = "……。"
2003202-54 = "[s] \"エイミ。\""
2003202-56 = "[ns3] \"今度、二人で買い物に行こう。\"\n[ns4] \"一緒に選ぼうか。\""
2003202-59 = "そうだね。"
2003202-60 = "うん、そうしよう。"
2003202-61 = "[s] \"ところで、さっきからどれも水着に見えるんだけど……\""
2003202-62 = "そうだよ？#n水着を探してたの。"
2003202-63 = "水着も「服」だよ？"
2003202-64 = "[s5] \"それはそうだけど……！\"\n[s6] \"今度こそちゃんとした服を買うのかと思ったら……！\""
2003202-67 = "水着も「服」でしょ？#n先生の言ってる意味、よく分からない。"
2003202-69 = "（そうして、エイミと水着を買いに行く約束をし――）"
2003202-70 = "（ショッピングの予行練習として、エイミは雑誌から水着を選んだが、どれもやや前衛的なものだった）"
