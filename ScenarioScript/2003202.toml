[translation]
2003202-1 = "Treino Especial de Moda"
2003202-6 = "Professor, obrigado por hoje também."
2003202-7 = "Isso? É uma revista de moda."
2003202-8 = "Quero saber quais roupas combinam comigo."
2003202-9 = "Vou pedir conselhos e usar como referência."
2003202-10 = "Como é que se chama isso mesmo, ciclo PDCA?"
2003202-11 = "[s1] \"……Acho que não é bem assim?\"\n[s2] \"Se eu puder ajudar, ficarei feliz.\""
2003202-14 = "Obrigada, então vamos começar."
2003202-15 = "A que mais me chamou a atenção foi esta."
2003202-20 = "Já que estamos nisso, pensei que seria bom tentar um estilo que não costumo usar. #nDiz aqui: \"Um novo sopro no mundo da moda\"."
2003202-21 = "[s] \"……Não é chamativo demais para usar no dia a dia?\""
2003202-22 = "Hum…… eu achei que era bom."
2003202-23 = "Então, e esta?"
2003202-27 = "É um conjunto formal de escritório, mas…… como seria sem graça do jeito que está, decidi tirar a saia. #nAchei que isso traria um elemento de surpresa."
2003202-28 = "A área de tecido é pequena demais……? #nPor isso pensei em usar meias 7/8……"
2003202-29 = "Hã? Isso não pode?"
2003202-30 = "Ah, então talvez amarrar uma gravata……?"
2003202-32 = "（O tempo que passei com Eimi escolhendo \"roupas\" continuou por um tempo……）"
2003202-34 = "Parece que chamam isso de retrô."
2003202-35 = "Já é antigo? #nA moda tem tendências?"
2003202-36 = "Hum…… é difícil, né."
2003202-38 = "Então, o que acha desta?"
2003202-42 = "Dizem que se você usar isso em um dia de \"decisão\" importante, tudo dá certo."
2003202-46 = "Parece que chamam de \"vanguarda\"."
2003202-47 = "[s] \"Isso é realmente uma revista de moda……?\""
2003202-49 = "（A revista que Eimi trouxe não era sobre tendências, mas sim voltada para a arte……）"
2003202-50 = "（Todas as peças eram vanguardistas e excêntricas）"
2003202-52 = "Eu trouxe porque ouvi dizer que isso era o que há de mais moderno……"
2003202-53 = "……."
2003202-54 = "[s] \"Eimi.\""
2003202-56 = "[ns3] \"Vamos fazer compras juntos da próxima vez.\"\n[ns4] \"Vamos escolher juntos.\""
2003202-59 = "É verdade."
2003202-60 = "Sim, vamos fazer isso."
2003202-61 = "[s] \"Aliás, desde agora pouco, todas elas parecem roupas de banho……\""
2003202-62 = "Sim, e daí? #nEu estava procurando roupas de banho."
2003202-63 = "Roupas de banho também são \"roupas\", não são?"
2003202-64 = "[s5] \"Isso é verdade, mas……!\"\n[s6] \"Eu pensei que desta vez compraríamos roupas de verdade……!\""
2003202-67 = "Roupas de banho também são \"roupas\", né? #nNão entendo bem o que o professor quer dizer."
2003202-69 = "（E assim, fiz a promessa de ir comprar roupas de banho com a Eimi――）"
2003202-70 = "（Como um treino para as compras, Eimi escolheu roupas de banho da revista, mas todas eram um tanto vanguardistas）"
