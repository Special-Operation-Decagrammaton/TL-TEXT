[translation]
1013302-1 = "O que é um robô empregada?"

1013302-2 = "(Estou preocupado se o Rio está arrumando seu quarto corretamente...)"

1013302-3 = "(decidi dar uma olhada)"

1013302-10 = "Sensei? Você precisa de alguma coisa?"

1013302-11 = "[ns1] \"...Ah?\"\n[ns2] \"Ah...!!\""

1013302-14 = "...?"

1013302-15 = "[ns3] \"O quarto é lindo...!\"\n[ns4] \"Você consegue se tentar!\""

1013302-18 = "Ah, você veio aqui porque estava preocupado com isso."

1013302-19 = "Estou bem agora. Tenho um filho que vai me ajudar a limpar. #nComo é uma boa oportunidade, vou apresentá-la a você――"

1013302-20 = "Cara vanguardista encarregado das tarefas domésticas."

1013302-25 = "Mantive o modelo básico igual, mas modifiquei-o para poder fazer todo tipo de tarefas domésticas."

1013302-26 = "O que você acha? Mas acho que não é um resultado ruim."

1013302-27 = "[ns] \"Eu não estava limpando sozinho...\""

1013302-30 = "Fui eu quem criou esse cara vanguardista? #nAcho que é a mesma coisa que eu limpar."

1013302-31 = "Posso dizer com segurança que esta tentativa foi um grande sucesso."

1013302-32 = "Mesmo se eu voltar para a escola, estou pensando em deixar Avant Garde-kun fazer o trabalho doméstico."

1013302-33 = "Se tudo correr bem, não seria uma má ideia produzi-lo em massa e popularizá-lo."

1013302-34 = "[s] \"Nesse caso, um robô empregada normal seria melhor!\""

1013302-35 = "Empregada robô...?"

1013302-36 = "Eu me pergunto se ele estava se referindo a um robô que ajuda nas tarefas domésticas."

1013302-37 = "Nesse caso, as condições estão resolvidas."

1013302-38 = "Avant-garde-kun também pode ser chamado de robô empregada."

1013302-39 = "sim? Falta algum elemento?"

1013302-40 = "...Ah, isso mesmo. Esqueci algo importante."

1013302-41 = "Eu não a vesti com roupa de empregada."

1013302-42 = "Na versão oficial, vamos espalhar a notícia vestindo-a com uma fantasia de empregada doméstica."

1013302-43 = "[s] \"Você quer que eu reconsidere isso!?\""

1013302-44 = "Eu não sei por quê."

1013302-45 = "Não seria possível ter todos os elementos se você a vestisse com uma fantasia de empregada doméstica?"

1013302-46 = "[s] \"Quero que você preste mais atenção na sua aparência!\""

1013302-50 = "Você poderia explicar com um pouco mais de detalhes?"

1013302-51 = "Qual é o seu “robô empregada doméstica” ideal?"

1013302-52 = "[s] \"Tão fofo e charmoso!\""

1013302-53 = "Avant-garde-kun também... acho ele fofo e charmoso..."

1013302-54 = "[s] \"Aparência limpa e elegante!\""

1013302-55 = "Avant-garde-kun também... dependendo de como você olha para isso, ou algo assim."

1013302-56 = "[s] \"Uma pessoa confiável que pode fazer qualquer coisa!\""

1013302-57 = "Avant-garde-kun... não é a mesma coisa?"

1013302-58 = "[s] \"...E uma linda roupa de empregada!\""

1013302-59 = "Acho que já falamos sobre a fantasia de empregada, mas..."

1013302-60 = "Porém, nesse aspecto, a Avant Garde ainda leva vantagem."

1013302-61 = "Por exemplo, as crianças do C&C também usam roupas de empregada doméstica. #nNo entanto, eles não são robôs, portanto não são \"robôs domésticos\"."

1013302-62 = "Mesmo se você vestir Alice, ela não se tornará uma “empregada robô”. #nEssa criança é um humano, não um robô."

1013302-63 = "No entanto, Avant Garde é um verdadeiro robô."

1013302-64 = "Se você vestir a ajudante doméstica Avant Garde com uma roupa de empregada..."

1013302-65 = "Um maravilhoso robô empregada."

1013302-66 = "[s] (Ei, estou começando a me sentir assim... mas...!)"

1013302-67 = "...Parece que ainda há uma discrepância de entendimento."

1013302-68 = "Nunca pensei que as opiniões fossem tão divididas."

1013302-69 = "Se você não consegue encontrar uma solução entre duas pessoas, reúna mais opiniões."

1013302-70 = "Por enquanto, vou mostrar a todos o Avant Garde-kun com roupa de empregada doméstica."

1013302-71 = "Roupas de empregada e robôs..."

1013302-72 = "Combinado, torna-se um robô doméstico."

1013302-73 = "Todos deveriam ser forçados a admitir esse fato."

1013302-74 = "[s] \"Onde você vai conseguir a roupa de empregada...?\""

1013302-75 = "Eu me pergunto se Toki tem um sobressalente."

1013302-76 = "[s] \"O tamanho definitivamente não cabe...!!\""

1013302-77 = "Nesse momento, modificarei o Avant Garde-kun para caber no tamanho das roupas."

1013302-78 = "De qualquer forma, vou pegar emprestada uma fantasia de empregada agora."

1013302-79 = "Bem...mais sobre isso mais tarde."

1013302-83 = "[ns] \"Rio, você está falando sério...\""

1013302-85 = "(Eu me pergunto qual será o resultado...)"

