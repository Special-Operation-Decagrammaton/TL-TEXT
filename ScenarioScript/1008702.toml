[translation]
1008702-1 = "Eu não posso perder de qualquer maneira!"

1008702-2 = "(Fui para a Geena por enquanto, sem saber por quê.)"

1008702-13 = "Comissão Disciplinar/Gabinete Administrativo"

1008702-16 = "Está tarde! !"

1008702-17 = "[s] \"...Faz apenas 5 minutos.\""

1008702-22 = "falta……"

1008702-27 = "Mesmo assim, você me fez esperar, então estou atrasado!"

1008702-28 = "[s] \"Entendo.\""

1008702-29 = "Quantas vezes você acha que eu verifiquei meu relógio?"

1008702-30 = "Repetidamente até o Sensei chegar!"

1008702-34 = "...Bem, cheguei na hora, então vou te perdoar desta vez."

1008702-38 = "[ns1] (eu realmente não entendo...)\n[ns2] (ainda bem que é o de sempre)"

1008702-43 = "[ns] \"Você pode me dizer o que aconteceu?\""

1008702-46 = "Os caras do Nuki têm um problema! !"

1008702-47 = "Você conhece a história da festa organizada pelo Manmaden? #nParece que eles vão adicionar mais orçamento e expandir a escala."

1008702-48 = "Esse é o plano que recebi de lá..."

1008702-49 = "[s] \"Hmm...\""

1008702-50 = "Veja este conteúdo malicioso!"

1008702-54 = "Especialmente aqui! ``Comparecemos com vestidos de noite caros, mas os funcionários do governo comparecem com seus habituais trapos indignos''!"

1008702-55 = "Que parte desta roupa está tão desgastada? ? #nTotalmente, deixe-me dizer..."

1008702-56 = "[s3] \"………….\"\n[s4] \"Ah, acalme-se...?\""

1008702-57 = "Eu sou Ako Amae! Se você pensa que sempre será atacado por esse tipo de truque, você está enganado!"

1008702-58 = "Eu sou Ako Amae! Se você pensa que sempre será atacado por esse tipo de truque, você está enganado!"

1008702-59 = "Eu mantive um fundo secreto em antecipação a tal situação."

1008702-60 = "[s] \"Um fundo secreto...\""

1008702-61 = "Isto é guerra! #nVou à festa com um vestido tão lindo quanto aqueles cachorros-guaxinim!"

1008702-62 = "Preciso fazer você perceber a diferença de status mais uma vez."

1008702-63 = "Você entende a gravidade da situação, senhor?"

1008702-64 = "[s] \"Hum... Então, você tem algo a ver comigo, certo?\""

1008702-68 = "Claro!"

1008702-69 = "Preciso que a Senseia escolha um vestido que combine comigo!"

1008702-73 = "[ns] \"Eu...?\""

1008702-74 = "Então, que diabos?"

1008702-75 = "Quem escolhe...?"

1008702-76 = "[s] \"Não tenho que escolher o vestido que gosto...?\""

1008702-80 = "……sim?"

1008702-85 = "O que você está falando? #nVocê quer que eu escolha uma roupa tão importante sozinha...?"

1008702-86 = "Não é muito duro? #n Mesmo que eu esteja muito preocupado com isso, você não sabe de nada e quer que eu faça o que eu quiser...?"

1008702-87 = "[s] \"Ah, não, isso...\""

1008702-88 = "O Sensei é um aliado de Tenmaden? ? #nO que eu faria se alguém zombasse do vestido que escolhi! ?"

1008702-89 = "Tenho que pedir ao meu Sensei para decidir as cores e desenhos que combinam comigo!"

1008702-90 = "[s] \"Hum... sim, eu entendo.\""

1008702-95 = "Vamos começar."

1008702-99 = "Este é um catálogo de vestidos."

1008702-100 = "Escolha o vestido que mais combina comigo!"

1008702-102 = "(Assim começou a seleção do vestido de Ako)"

1008702-106 = "Vamos começar com a cor. Sensei, que cor você acha que combina comigo?"

1008702-107 = "[s5] \"Em termos da imagem de Ako...\"\n[s6] \"Afinal, acho que o azul é melhor.\""

1008702-110 = "……Eu vejo. #nO Sensei gosta de azul...Vou usar isso como referência."

1008702-111 = "[s] \"Gosto da cor, ou melhor, fica bem na Ako...\""

1008702-115 = "o que? Qual é a opinião apropriada?"

1008702-116 = "Esta é a sua opinião, então seja mais claro! #n Do Sensei! Escolha o que você gosta!"

1008702-117 = "[s] \"...Sim, sim.\""

1008702-120 = "Qual é o design? Do que você gosta?"

1008702-121 = "[s7] \"Que tal um design ousado?\"\n[s8] \"Que tal um design que pareça maduro?\"\n[s9] \"Que tal um design que chame a atenção no local?\""

1008702-125 = "Então, algo assim..."

1008702-132 = "Agora, isso não é muito ousado?"

1008702-133 = "Certamente, acho que isso será capaz de silenciar os cães-guaxinim..."

1008702-134 = "Bem, isso é preocupante..."

1008702-140 = "...Então você gosta de roupas que perturbem a moral pública assim, não é?"

1008702-144 = "[ns] \"...Eh?\""

1008702-145 = "Você quer que eu use isso...? #nComo funcionário administrativo do comitê de moral pública, rejeito!"

1008702-146 = "Foi um erro confiar no Sensei! #nNão tem como você ficar assim!"

1008702-147 = "Isso é o suficiente! A opinião do #nSensei não é confiável! Escolha você mesmo!"

1008702-148 = "[s] \"É um mal-entendido!\""

1008702-149 = "Onde está o mal-entendido?"

1008702-150 = "foto? O que você disse anteriormente é diferente?"

1008702-154 = "Eu mesmo sei disso!"

1008702-156 = "(Deixei Ako, que estava agitado e com pressa por algum motivo, e voltei para a placa de Petri.)"

