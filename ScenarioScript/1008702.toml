[translation]
1008702-1 = "とにかく負けられません！"
1008702-2 = "（訳も分からぬまま、ひとまずゲヘナへ向かった）"
1008702-13 = "風紀委員会・行政官室"
1008702-16 = "遅いじゃないですか！！"
1008702-17 = "[s] \"……まだ5分前なんだけど。\""
1008702-22 = "あら……"
1008702-27 = "それでも私を待たせたんですから遅刻です！"
1008702-28 = "[s] \"そ、そっか。\""
1008702-29 = "私が時計を何回確認したと思っているんですか！"
1008702-30 = "先生が到着されるまで、何回も何回も！"
1008702-34 = "……まあ、時間通りなので今回は許しましょう。"
1008702-38 = "[ns1]（よく分からないけど……）\n[ns2]（いつものアコで良かった）"
1008702-43 = "[ns] \"何があったのか聞かせてくれる？\""
1008702-46 = "[ruby=パンデモニウム・ソサエティー]また万魔殿のタ[/ruby]ヌキどもが問題を！！"
1008702-47 = "万魔殿が主催するパーティーの話はご存知ですか？#nまた予算を追加して、規模を大きくするようです。"
1008702-48 = "これが、あちらから届いた計画書なのですが……"
1008702-49 = "[s] \"ふむ……\""
1008702-50 = "見てください、この悪意に満ちた内容を！"
1008702-54 = "特にここ！「我々は高価なイブニングドレスで出席するが、行政官はいつもの品性の無いボロ切れで出席するように」だなんて！"
1008702-55 = "この服のどこがボロ切れなんですか！？#nまったく、言わせておけば……"
1008702-56 = "[s3] \"…………。\"\n[s4] \"お、落ち着いて……？\""
1008702-57 = "私、天雨アコが！こんな悪巧みにやられっぱなしだと思ったら大間違いです！"
1008702-58 = "私、天雨アコが！こんな悪巧みにやられっぱなしだと思ったら大間違いです！"
1008702-59 = "こういった事態も想定して、秘密資金を蓄えてあります。"
1008702-60 = "[s] \"秘密資金って……\""
1008702-61 = "これは戦争です！#nあのタヌキどもに負けないくらい綺麗なドレスでパーティーに出席します！"
1008702-62 = "今一度、格の違いを実感させなければ。"
1008702-63 = "事の重大さが分かりましたか、先生？"
1008702-64 = "[s] \"えっと……それで、私に何か用事があるんだよね？\""
1008702-68 = "もちろんです！"
1008702-69 = "先生には、私に似合うドレスを選んでいただかないと！"
1008702-73 = "[ns] \"私が……？\""
1008702-74 = "じゃあ一体、"
1008702-75 = "誰が選ぶんですか……？"
1008702-76 = "[s] \"自分で気に入ったドレスを選ばなくていいの……？\""
1008702-80 = "……はい？"
1008702-85 = "何を言ってるんですか？#nこんなにも重要な服選びを、私一人で行えと……？"
1008702-86 = "酷すぎはしませんか？#n私がこれだけ悩んでいるというのに、知ったことじゃない、勝手にしろと……？"
1008702-87 = "[s] \"あ、いや、その……\""
1008702-88 = "先生は万魔殿の味方なんですか！？#nもしも私が自分で選んだドレスをバカにされたら、どうするんですか！？"
1008702-89 = "私に似合う色も、デザインも、先生に決めてもらわないと困ります！"
1008702-90 = "[s] \"えっと……はい、分かりました。\""
1008702-95 = "では、始めましょう。"
1008702-99 = "こちらがドレスのカタログです。"
1008702-100 = "ここから私に似合うドレスを選んでください！"
1008702-102 = "（こうして、アコのドレス選びが始まった）"
1008702-106 = "まずは色からです。先生は何色が私に似合うと思いますか？"
1008702-107 = "[s5] \"アコのイメージ的に……\"\n[s6] \"やっぱり、青系がいいんじゃないかな？\""
1008702-110 = "……なるほど。#n先生は青がお好き、と……参考にします。"
1008702-111 = "[s] \"私が好きというか、アコに似合いそうな色を……\""
1008702-115 = "何ですか？その適当な意見は。"
1008702-116 = "ご自身の意見なんですから、もっとはっきり言ってください！#n先生の！好みを！"
1008702-117 = "[s] \"……は、はい。\""
1008702-120 = "デザインは？どういったのがお好きですか？"
1008702-121 = "[s7] \"大胆なデザインはどうかな？\"\n[s8] \"大人っぽく見えるデザインはどうかな？\"\n[s9] \"会場で目を惹くようなデザインはどうかな？\""
1008702-125 = "となると、これとかですか……"
1008702-132 = "さ、流石に大胆すぎるのでは？"
1008702-133 = "たしかに、これならタヌキどもを黙らせられると思いますが……"
1008702-134 = "な、悩ましいですね……"
1008702-140 = "……って、先生はこういった風紀を乱すような服がお好きなんですね？"
1008702-144 = "[ns] \"……えっ？\""
1008702-145 = "これを私に着せたいんですか……？#n風紀委員の行政官として、却下します！"
1008702-146 = "先生を信じたのが間違いでした！#nこんな格好できるわけないじゃないですか！"
1008702-147 = "もういいです！#n先生の意見は当てになりません！自分で選びます！"
1008702-148 = "[s] \"ご、誤解だよ！\""
1008702-149 = "どこが誤解なんですか！"
1008702-150 = "え？さっきと言ってることが違う？"
1008702-154 = "そんなこと、自分でも分かってます！"
1008702-156 = "（何故か慌ててソワソワするアコを後にして、シャーレに戻った）"
