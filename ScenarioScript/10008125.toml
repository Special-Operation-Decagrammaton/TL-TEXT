[translation]
10008125-3 = "Hahahaha! Como esperado, não deu certo!"
10008125-4 = "Hum! Parece que o ajuste da máquina ainda não foi o suficiente!"
10008125-5 = "Red! Da próxima vez, vamos mudar mais o desempenho e a potência!"
10008125-10 = "……Eu penso nisso toda vez, mas será que sou a única que está levando isso a sério? Vocês não estão sempre brincando? Hein?"
10008125-11 = "A propósito, Red. O período do contrato está quase acabando, vocês vão renovar?"
