10008125-13 = "Bem, de qualquer forma, vamos recuar por enquanto!"
10008125-14 = "Mas isso não é o fim! Nossa batalha ainda vai continuar!"
10008125-16 = "Os trilhos que continuam girando, eventualmente…… levarão ao futuro da justiça!"
10008125-17 = "Esquadrão do Sushi Giratório Infinito, Kaitenger, saindo de cena!"
10008125-23 = "Isso significa que, no final……"
10008125-24 = "N-nosso dinheiro foi todo pelo ralo!? Não pode ser, não é!?"
10008125-25 = "A-Aru-sama! E-eu estou bem! Se for sobre o dinheiro, eu ganho mais!"
10008125-26 = "Ah, francamente……."
10008125-28 = "Ahaha! No fim das contas, acabou desse jeito mesmo!"
10008125-29 = "……Eu já posso ir para casa?"
10008125-30 = "[s] \"Bem…… bom trabalho.\""
10008125-32 = "(A grande confusão do primeiro dia do ano chegou ao fim assim)"
