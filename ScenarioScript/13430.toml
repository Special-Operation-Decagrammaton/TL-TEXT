[translation]
13430-1 = "第43話;エピローグ（２）"
13430-3 = "ありがとうございました、またお待ちしています！"
13430-9 = "……あっ、いらっしゃいませ！"
13430-10 = "二名様ですね、こちらに名前を記入してお待ちください！"
13430-11 = "セリカちゃん、これも頼めるかな？"
13430-12 = "はい、すぐ行きます！"
13430-17 = "[ns] \"忙しそうだね、セリカ。\""
13430-18 = "最近、人が増えた気がする。"
13430-19 = "新しいお店もできてきましたし。"
13430-20 = "うんうん！#nとっても良いことだと思います！"
13430-25 = "けど、その分トラブルは増えるからねぇ。#nふあぁ……おかげで寝不足だよ。"
13430-26 = "まぁ、今のところそこまでじゃないけどさ。"
13430-27 = "ドロボーだ！"
13430-32 = "おいっ、[ruby=ど]退[/ruby]け！"
13430-36 = "だ、誰か捕まえてください！"
13430-38 = "行ってくる！"
13430-43 = "あっ、ラーメンが伸びる前に戻ってきてよねー！？"
13430-44 = "シロコちゃん……！"
13430-45 = "へーきへーき。#n最近のシロコちゃんは、ますます強くなったからね。"
13430-49 = "[ns] \"……。\""
13430-50 = "先生、どうかしましたか……？"
13430-51 = "[s] \"私も行ってくるよ。\""
13430-52 = "あっ、はい。"
13430-54 = "ひひっ、ここまで来ちまえば……。"
13430-61 = "……。"
13430-68 = "[ns] \"シロコ！\""
13430-69 = "先生……？"
13430-70 = "……気づかれた。"
13430-72 = "……。"
13430-75 = "……ん、私は持ち主に届けてくる。"
13430-76 = "大丈夫、逃げないから。"
13430-77 = "私の動きは、あなたにお見通しみたいだし。"
13430-78 = "先生……。"
13430-79 = "[s] \"いってらっしゃい。私はこっちのシロコと少し話があるから。\""
13430-85 = "（……）"
13430-90 = "……久しぶり、でもないか。"
13430-91 = "[s] \"ずっとアビドス自治区にいたの？\""
13430-92 = "うん……知ってる場所は、ここくらいだから。"
13430-93 = "いろんな空き家を転々としてた。"
13430-94 = "意外と水も電気も使えるところが多いから。"
13430-95 = "[s] \"食事は困ったりしてない？\""
13430-96 = "廃品を回収してお金に変えてるから、大丈夫。#nこうやって自警団としての活動もしてるし……"
13430-97 = "……一人は慣れてる。"
13430-109 = "[ns1] \"よかったら、一緒にラーメンを食べない？\"\n[ns2] \"みんなも心配してるよ。\""
13430-115 = "……いや、大丈夫。"
13430-116 = "みんなに合わせる顔が……。"
13430-117 = "[s] \"そっか。それなら今度でも大丈夫だよ。\""
13430-118 = "……。"
13430-119 = "聞かないの？"
13430-120 = "[s] \"……何のこと？\""
13430-121 = "私に何が起こったのか。"
13430-122 = "疑問なら、いくらでもあるはず。"
13430-123 = "[s] \"ある程度分かってるよ。\""
13430-124 = "……ん。"
13430-125 = "[s] \"それに、また苦しめちゃうんじゃないかと思って。\""
13430-129 = "……ありがとう。"
13430-130 = "でも、私はもう大丈夫。"
13430-131 = "……ホシノ先輩が、どうして反転した状態から戻ってこられたのか。"
13430-132 = "[s] \"……。\""
13430-133 = "たぶん、まだ不完全な状態だったからじゃないかと思う。"
13430-134 = "それに、先輩は自身の本質の一部を棄てたから……"
13430-135 = "……だから、前に進めたんだと思う。"
13430-138 = "「色彩」によって反転した者を元に戻す方法など、存在せぬ。"
13430-139 = "其れは――死者が生き返らないのと同様に。#nこの世界の絶対的なルールである。"
13430-140 = "だがそれでも……助けたい者が居ると申すのなら――妾を訪ねてくりゃれ。"
13430-143 = "[ns] \"亡くなった人は、生き返らない。\""
13430-149 = "[ns3] （クズノハを追うのは、もうやめよう……）\n[ns4] \"……だから、シロコの力になりたいんだ。\""
13430-153 = "でも、私がここにいたら大きな[ruby=ひず]歪[/ruby]みができてしまう。#n「シロコ」は一つの世界に一人だけしか存在できない……。"
13430-154 = "[s] \"私が何とかするよ。\""
13430-158 = "……ふふっ。"
13430-159 = "[s] \"シロコ……？\""
13430-160 = "前にも聞いたなって。"
13430-161 = "うん。ここは……[ruby=せんせい]大人[/ruby]が守ってくれてる場所だから。"
13430-165 = "やっぱり、先生は先生だね……。"
13430-166 = "……それもそうだよね、私があの子であるように。"
13430-167 = "[s] \"私が[ruby=・]私[/ruby]であるように。\""
13430-168 = "ん……先生は、いつだって私たちを助けてくれた。#n同じような状況で、同じ選択をして……。"
13430-172 = "[ns] \"……これ、渡しておくよ。\""
13430-179 = "スマートフォン……？"
13430-180 = "……懐かしい。"
13430-181 = "[s] \"[ruby=・   ・]また[/ruby]、いつでも連絡して。私の、手の届くところで。\""
13430-185 = "……ん。"
13430-186 = "そろそろ行くよ、先生。"
13430-187 = "また連絡する。"
13430-196 = "[ns] \"シロコ！\""
13430-198 = "[ns] \"……大丈夫だよ。ちゃんと君は変わってる。\""
13430-199 = "……？"
13430-200 = "[s5] \"みんな、変わっていけるから。\"\n[s6] \"たとえ、一歩一歩は小さかったとしても。\""
13430-206 = "……うん、分かってる。"
13430-209 = "……この苦しみも、幸せも、私の人生にとってどれも大切なもの。"
13430-210 = "……だから。"
13430-213 = "……きっと、大丈夫。"
13430-216 = "#videons2;11008"
13430-219 = "目視できる距離まで来ました！"
13430-220 = "分かってるわ！"
13430-227 = "前に戦った時は、砂漠の真ん中でしたね！"
13430-228 = "ですが、あの時は色彩で――"
13430-229 = "要するに、放っておいたらアビドスがめちゃくちゃになるんでしょ！？"
13430-230 = "ん、制圧する。"
13430-231 = "側面に回り込みましょう。#n私も援護するので、攻撃の準備を！"
13430-232 = "了解。"
13430-233 = "突撃です～☆"
13430-234 = "それより、ホシノ先輩はどこなの！？"
13430-235 = "……えっ？"
13430-236 = "とっくに着いてるよ。"
13430-237 = "えっ、いつの間に！？"
13430-238 = "みんなも早く～。#nおじさん、もう歳だからそんなに待てないよ？"
13430-239 = "ん、すぐ行く。"
13430-242 = "先輩、お待たせ！"
13430-243 = "あっ……！？"
13430-246 = "遅かったね。"
13430-248 = "……！"
13430-249 = "あなたは……。"
13430-250 = "もう一人のシロコ先輩！#n……助けに来てくれたのよね？"
13430-251 = "ん、今回だけ。"
13430-252 = "とりあえず、今は目の前のあいつに集中しよっか。"
13430-253 = "それじゃあ、作戦Bで。"
13430-259 = "……って、何よそれ。"
13430-260 = "うんうん！#nセリカちゃんも早く準備してください～☆"
13430-261 = "遊んでいる場合じゃありません！#nビナーがこちらに気づいたようです！"
13430-262 = "アヤネちゃんも遊んでるじゃない……。"
13430-266 = "う、うーん……。"
13430-267 = "シロコ先輩、どうしたの？"
13430-271 = "この覆面はあげないよ。#n大切なものだから。"
13430-276 = "よし、それじゃ……。"
13430-289 = "ホシノ"
13430-290 = "[7cd0ff]対策委員会[-]"
13430-291 = "[log=호시노]アビドス、行くよ！[/log]"
