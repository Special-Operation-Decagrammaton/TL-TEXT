[translation]
13430-1 = "Episódio 43; Epílogo (2)"
13430-3 = "Muito obrigada, volte sempre!"
13430-9 = "……Ah, bem-vindo!"
13430-10 = "São duas pessoas, certo? Por favor, escrevam seus nomes aqui e aguardem!"
13430-11 = "Serika-chan, pode me ajudar com isso também?"
13430-12 = "Sim, já vou!"
13430-17 = "[ns] \"Parece que você está ocupada, Serika.\""
13430-18 = "Sinto que o número de pessoas aumentou ultimamente."
13430-19 = "E lojas novas também começaram a abrir."
13430-20 = "Sim, sim!#nAcho que isso é algo muito bom!"
13430-25 = "Mas, por outro lado, os problemas também aumentam.#nUaaah... por causa disso, estou com falta de sono."
13430-26 = "Bem, por enquanto não está tão ruim assim."
13430-27 = "É um ladrão!"
13430-32 = "Ei, saia da frente!"
13430-36 = "A-alguém, por favor, pegue ele!"
13430-38 = "Já volto!"
13430-43 = "Ah, volte antes que o lámen fique mole, hein!?"
13430-44 = "Shiroko-chan……!"
13430-45 = "Tá tudo bem, tá tudo bem.#nA Shiroko-chan de agora ficou ainda mais forte."
13430-49 = "[ns] \"…….\""
13430-50 = "Sensei, aconteceu alguma coisa……?"
13430-51 = "[s] \"Eu também vou lá.\""
13430-52 = "Ah, sim."
13430-54 = "Hehe, se eu chegar até aqui……."
13430-61 = "……."
13430-68 = "[ns] \"Shiroko!\""
13430-69 = "Sensei……?"
13430-70 = "……Percebeu."
13430-72 = "……."
13430-75 = "……Hum, eu vou devolver isso ao dono."
13430-76 = "Não se preocupe, eu não vou fugir."
13430-77 = "Parece que você já previu meus movimentos."
13430-78 = "Sensei……."
13430-79 = "[s] \"Vá em frente. Eu tenho um assunto para tratar com a Shiroko daqui.\""
13430-85 = "（……）"
13430-90 = "……Faz tempo, ou talvez não."
13430-91 = "[s] \"Você ficou no Distrito Autônomo de Abydos esse tempo todo?\""
13430-92 = "Sim…… porque este é o único lugar que eu conheço."
13430-93 = "Fiquei perambulando por várias casas abandonadas."
13430-94 = "Surpreendentemente, muitas delas ainda têm água e eletricidade."
13430-95 = "[s] \"Você não está passando dificuldades com a comida?\""
13430-96 = "Eu recolho sucata e troco por dinheiro, então estou bem.#nE também continuo fazendo minhas atividades como comitê de vigilância……"
13430-97 = "……Já estou acostumada a ficar sozinha."
13430-109 = "[ns1] \"Se quiser, por que não comemos um lámen juntos?\"\n[ns2] \"Todos também estão preocupados com você.\""
13430-115 = "……Não, está tudo bem."
13430-116 = "Eu não tenho coragem de encarar todo mundo……."
13430-117 = "[s] \"Entendo. Nesse caso, podemos deixar para uma próxima vez.\""
13430-118 = "……."
13430-119 = "Você não vai perguntar?"
13430-120 = "[s] \"……Perguntar sobre o quê?\""
13430-121 = "O que aconteceu comigo?"
13430-122 = "Se você tem dúvidas, deve ter várias."
13430-123 = "[s] \"Eu entendo até certo ponto.\""
13430-124 = "……Hmm."
13430-125 = "[s] \"Além disso, fiquei com medo de acabar te machucando de novo.\""
13430-129 = "……Obrigada."
13430-130 = "Mas eu já estou bem."
13430-131 = "……Sobre como a Hoshino-senpai conseguiu voltar depois de ter sido invertida."
13430-132 = "[s] \"…….\""
13430-133 = "Acho que talvez seja porque ela ainda estava em um estado incompleto."
13430-134 = "E também, porque a senpai descartou uma parte da sua própria essência……"
13430-135 = "……Por isso, acho que ela conseguiu seguir em frente."
13430-138 = "Não existe método para reverter alguém que foi invertido pelo \"Cromatismo\"."
13430-139 = "Isso é――assim como os mortos não retornam à vida. #nÉ uma regra absoluta deste mundo."
13430-140 = "Mas, ainda assim…… se você diz que há alguém que deseja salvar―― venha me visitar."
13430-143 = "[ns] \"Pessoas que se foram não voltam à vida.\""
13430-149 = "[ns3] (Vou parar de perseguir a Kuzunoha……)\n[ns4] \"……Por isso, quero ser útil para a Shiroko.\""
13430-153 = "Mas, se eu ficar aqui, uma grande distorção será criada. #nSó pode existir uma \"Shiroko\" em cada mundo……."
13430-154 = "[s] \"Eu darei um jeito.\""
13430-158 = "……Fufu."
13430-159 = "[s] \"Shiroko……?\""
13430-160 = "É que eu já ouvi isso antes."
13430-161 = "Sim. Porque este é um lugar que o adulto protege."
13430-165 = "Como esperado, o Sensei é sempre o Sensei……."
13430-166 = "……Isso também é verdade, assim como eu sou aquela criança."
13430-167 = "[s] \"Assim como eu sou eu.\""
13430-168 = "Hmm…… O Sensei sempre nos ajudou. #nEm situações parecidas, fazendo as mesmas escolhas……."
13430-172 = "[ns] \"……Tome, guarde isto.\""
13430-179 = "Um smartphone……?"
13430-180 = "……Que nostálgico."
13430-181 = "[s] \"Entre em contato comigo a qualquer momento. Onde quer que eu esteja ao seu alcance.\""
13430-185 = "……Hmm."
13430-186 = "Já está na hora de ir, Sensei."
13430-187 = "Entrarei em contato novamente."
13430-196 = "[ns] \"Shiroko!\""
13430-198 = "[ns] \"……Está tudo bem. Você realmente mudou.\""
13430-199 = "……?"
13430-200 = "[s5] \"Porque todos nós podemos mudar.\"\n[s6] \"Mesmo que cada passo seja pequeno.\""
13430-206 = "……Sim, eu sei."
13430-209 = "……Tanto esse sofrimento quanto a felicidade são coisas preciosas na minha vida."
13430-210 = "……Por isso."
13430-213 = "……Com certeza, vai ficar tudo bem."
13430-216 = "#videons2;11008"
13430-219 = "Chegamos a uma distância visual!"
13430-220 = "Eu sei!"
13430-227 = "Da última vez que lutamos, foi no meio do deserto!"
13430-228 = "Mas, naquela época, foi por causa do Cromatismo――"
13430-229 = "Resumindo, se deixarmos como está, Abydos vai ser destruída, certo!?"
13430-230 = "Hmm, vou subjugar."
13430-231 = "Vamos flanquear. #nEu também darei suporte, preparem-se para atacar!"
13430-232 = "Entendido."
13430-233 = "Hora de atacar~☆"
13430-234 = "Mas antes, onde está a Hoshino-senpai!?"
13430-235 = "……Hã?"
13430-236 = "Eu já cheguei faz tempo."
13430-237 = "Hã, desde quando!?"
13430-238 = "Vamos logo, pessoal~.#nEsta velha aqui já não tem mais paciência para esperar tanto."
13430-239 = "Hum, já estou indo."
13430-242 = "Senpai, desculpe a demora!"
13430-243 = "Ah……!?"
13430-246 = "Vocês demoraram."
13430-248 = "……!"
13430-249 = "Você é……"
13430-250 = "A outra Shiroko-senpai!#n……Você veio nos ajudar, não foi?"
13430-251 = "Hum, só desta vez."
13430-252 = "De qualquer forma, vamos focar naquele ali na nossa frente agora."
13430-253 = "Então, vamos com o plano B."
13430-259 = "……E o que seria isso?"
13430-260 = "Sim, sim!#nSerika-chan, prepare-se logo também~☆"
13430-261 = "Não é hora de brincar!#nO Binah parece ter notado a nossa presença!"
13430-262 = "Ayane-chan, você também está brincando……"
13430-266 = "U-um……"
13430-267 = "Shiroko-senpai, o que houve?"
13430-271 = "Eu não vou te dar esta máscara.#nEla é muito importante para mim."
13430-276 = "Muito bem, então……"
13430-289 = "Hoshino"
13430-290 = "[7cd0ff]Comitê de Contramedidas[-]"
13430-291 = "[log=호시노]Abydos, vamos nessa![/log]"
