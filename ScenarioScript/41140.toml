[translation]
41140-1 = "Episódio 14; Troca"
41140-2 = "Moe, você tem alguma ideia boa?"
41140-3 = "Ma-mas, no momento, nós não temos dinheiro nem conta bancária..."
41140-4 = "...Dito isso, foi você quem gastou munição de forma extravagante logo de cara."
41140-6 = "Não, não, não! Aquilo foi no momento certo, era necessário!"
41140-7 = "De qualquer forma, não é porque não temos dinheiro que não podemos nos reabastecer."
41140-8 = "[s] \"Não vai me dizer que vamos assaltar um banco...\""
41140-9 = "Hã? O que você está dizendo?"
41140-10 = "A SRT, que deveria proteger a segurança dos cidadãos, jamais faria um assalto a banco."
41140-11 = "Nós não teríamos uma ideia tão maluca assim."
41140-12 = "O que eu quero dizer é..."
41140-14 = "Simplesmente, troca!"
41140-15 = "Bem, de certa forma é a origem de tudo, um método de negociação clássico."
41140-16 = "Nós entregamos itens valiosos que temos e, em troca, recebemos armas e munições!"
41140-18 = "Falando em \"itens valiosos que temos\"..."
41140-19 = "...Marmita de churrasco? Embora o prazo de validade já tenha vencido..."
41140-20 = "Ninguém compraria isso. Se forçar muito, talvez aquela \"Loja de Conveniência\"."
41140-21 = "Não é isso, estou falando daquela enorme quantidade de mísseis e bombas."
41140-22 = "Mesmo que tenham ficado submersos e estragado, o valor deles não caiu para zero."
41140-23 = "É de partir o coração, mas seria melhor se eles fossem para um dono que possa cuidar melhor deles."
41140-24 = "[s] \"Entendi...?\""
41140-26 = "Mas será que eles comprariam? Mesmo sendo itens caros originalmente, eles estão quase quebrados ou enferrujados..."
41140-27 = "Bem, deixe essa parte comigo. Eu tenho contatos."
41140-28 = "Por exemplo, vejamos..."
41140-29 = "A \"Kaiser Industry\", que lida com armas no mercado negro. Lá, a demanda por armas usadas por mercenários é constante."
41140-30 = "Lá, com certeza alguém encontrará algum uso para esses mísseis enferrujados."
41140-31 = "E em troca, basta pegarmos armas de qualidade razoável do Grupo Kaiser!"
41140-32 = "Nossa, essa foi uma ideia sensata vinda de você, Moe."
41140-33 = "Você está se sentindo bem? Será que foi aquela marmita de napolitana de ontem que te fez mal?"
41140-34 = "Cala a boca!"
41140-38 = "Bem, de qualquer forma, vou ligar para o escritório deles."
41140-45 = "Sim, aqui é a \"Kaiser Industry\", fornecedora de armas de alta qualidade. Como posso ajudar?"
41140-46 = "Ei, ei, quanto tempo!"
41140-47 = "Sou eu, eu mesma. A responsável pelo suprimento da Academia SRT que comprou várias coisas antes."
41140-48 = "Ah, a VVIP daquela época...!"
41140-49 = "Quanto tempo!"
41140-50 = "Desta vez, você precisa de novos mísseis?"
41140-51 = "Ou houve algum problema com as bombas de fragmentação que comprou anteriormente...?"
41140-52 = "...Moe, quando foi que você comprou essas coisas?"
41140-53 = "Ah, isso... não foi com o dinheiro da academia, sabe?"
41140-54 = "Eram bombas para uso pessoal! Paguei do meu bolso, então não tem problema!"
41140-55 = "[s] \"O que é isso de 'bombas para uso pessoal'...\""
41140-56 = "E-enfim..."
41140-57 = "Hoje não estou ligando para comprar, mas sim para vender."
41140-58 = "Vender... você diz? Basicamente, nossa loja não costuma..."
41140-59 = "Dito isso, não podemos recusar sem nem ouvir. Poderia nos contar do que se trata?"
41140-60 = "É que, na verdade, tenho em mãos vários equipamentos de luxo que não se encontram em lojas de conveniência."
41140-61 = "Mísseis antiaéreos guiados, granadas de fragmentação com potência ajustável, foguetes antitanque com controle remoto..."
41140-62 = "O-o que... você vai vender tudo isso?"
41140-63 = "Sim, bem, eles estão um pouco enferrujados, mas... acho que deve estar tudo bem."
41140-64 = "[s] \"……Um pouco?\""
41140-65 = "（Professor, cala a boca!!）"
41140-66 = "Se for algo tão específico assim, acredito que haja demanda de sobra..."
41140-67 = "Sim, aceitarei com prazer."
41140-68 = "A propósito, sobre o pagamento, podemos usar a mesma transferência bancária de antes?"
41140-69 = "Ah, na verdade, essa conta não está mais funcionando..."
41140-70 = "Que tal fazermos o pagamento em mercadoria, em vez de dinheiro?"
41140-71 = "Mercadoria... você quer dizer?"
41140-72 = "Pode ser algo mais barato, mas eu queria uma arma de alto poder de fogo."
41140-73 = "Bombas termobáricas, fósforo branco... ah, ah...!"
41140-77 = "S-sinto muito, mas... no momento, estamos sem estoque de armas..."
41140-78 = "...Ué, mas vocês sempre têm um monte, não têm? Tudo?"
41140-79 = "Sim... na verdade, outro dia, um cliente anônimo comprou tudo."
41140-80 = "O quê... eles pretendem começar uma guerra em Kivotos?"
41140-81 = "Quem compraria uma quantidade dessas..."
41140-82 = "Isso, infelizmente, não posso responder..."
41140-83 = "Sinto muito, mas essas são informações confidenciais dos nossos clientes..."
41140-84 = "B-bem, faz sentido..."
41140-85 = "Então, infelizmente, vamos considerar que esta negociação não aconteceu..."
41140-86 = "Se precisar de algo mais, entre em contato a qualquer momento!"
41140-91 = "Q-que situação sem sentido é essa... quer dizer, meus planos foram por água abaixo..."
41140-93 = "Aliás, Moe, desde quando você se tornou uma VVIP da Kaiser Industry?"
41140-94 = "Pensando bem, havia vários cálculos que não batiam, mas não me diga que..."
41140-95 = "Moe-chan... presa por peculato...?"
41140-97 = "I-isso não é hora de falar sobre isso, não é!?"
41140-98 = "Por enquanto, o reabastecimento é mais importante...!"
41140-99 = "B-bem, a Kaiser Industry não é o único contato! Em leilões de usados, deve ter compradores de sobra!"
41140-100 = "Tem gente que compra esse tipo de coisa em leilão?"
41140-101 = "Não subestime! Nos leilões de hoje em dia, você encontra de tudo, desde armas e munições até equipamentos de hackeamento e até vegetais!"
41140-102 = "Com certeza, agora mesmo, deve ter chegado uma mensagem pedindo para comprar bombas――"
41140-108 = "...Uau, chegou mesmo."
41140-110 = "Próximo episódio: Uma derrota pequena, porém certa"
