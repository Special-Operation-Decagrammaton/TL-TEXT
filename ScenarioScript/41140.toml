[translation]
41140-1 = "Episódio 14;Escambo Bélico"
41140-2 = "Moe, você realmente tem um plano na manga?"
41140-3 = "M-Mas a nossa situação atual é zero dinheiro, zero crédito e zero contas ativas……"
41140-4 = "……E se a gente tá lisa, a culpa é sua, que torrou toda a nossa munição de bobeira lá no porto."
41140-6 = "Qualé, vai jogar na cara?! Aquilo lá foi \"fogo de supressão tático\"! Foi estritamente necessário!"
41140-7 = "Mas enfim, relaxa o pelo. A gente não precisa de dinheiro sujo do governo pra encher o arsenal."
41140-8 = "[s] \"Não me diga que você quer assaltar um banco……\""
41140-9 = "Hã? Mas de onde cê tira essas besteiras, Sensei?"
41140-10 = "Nós somos cadetes da SRT, o bastião da justiça. Assalto a banco é atividade de plebeu."
41140-11 = "Eu não sou tão pancada das ideias assim."
41140-12 = "O meu plano de mestre é……"
41140-14 = "O bom e velho Escambo!"
41140-15 = "Pode ser um método jurássico, mas o mercado negro adora."
41140-16 = "A gente pega os nossos \"itens raros e valiosos\", passa pra frente, e em troca eles entopem a gente de munição e arma nova!"
41140-18 = "Mas o que nós temos de \"raro e valioso\" sobrando……?"
41140-19 = "……Uma marmita de bife vencida, serve?"
41140-20 = "Quem em sã consciência vai comprar lixo vencido? Só se for pra vender pra aqueles malucos da \"FeliSem\"."
41140-21 = "Óbvio que eu não tô falando de lixo, tô falando da nossa montanha de mísseis e explosivos!"
41140-22 = "Beleza, eles tomaram um banho de lama e tão afogados, mas isso não quer dizer que eles perderam 100% do valor de mercado."
41140-23 = "Dói o coração me separar dos meus bebês, mas é melhor eles irem pra uma família que vai fazer eles explodirem do que apodrecerem no mato com a gente."
41140-24 = "[s] \"A sua lógica é fascinante…… e assustadora.\""
41140-26 = "Mas quem compraria lixo militar enferrujado? Eles podem até ser de ponta, mas a maioria tá com os circuitos fritados ou com a carcaça oxidada……"
41140-27 = "Aí é que entra o meu networking! Deixa com a mamãe aqui."
41140-28 = "Deixa eu ver…… Pra quem eu ligo……"
41140-29 = "Ah, a \"Kaiser Industry\", os tubarões das armas no Mercado Negro! Tem sempre uns mercenários lá chorando por armamento pesado usado."
41140-30 = "Com certeza vai ter algum psicopata lá que vai ver o brilho desses meus bebês enferrujados."
41140-31 = "Aí a gente repassa a sucata pra eles, e eles pagam a gente com armas novinhas do catálogo da Kaiser!"
41140-32 = "Nossa, pra uma doida por explosivos, isso foi bem lúcido."
41140-33 = "Cê tá se sentindo bem, Moe? Vai ver aquela marmita de macarrão de ontem te deu uma infecção cerebral."
41140-34 = "CALA A BOCA, SAKI!!"
41140-38 = "Bora logo pro que interessa. Vou bater um fio pro escritório de vendas deles."
41140-45 = "Olá, você ligou para a Kaiser Industry, fornecedora de soluções balísticas e letais de alta performance. Como posso lhe ser útil?"
41140-46 = "E aí, chefia, beleza? Quanto tempo!"
41140-47 = "Sou eu, a cliente VIP. A chefe de suprimentos da Academia Especial SRT."
41140-48 = "Ah, m-mas é claro! A nossa adorada cliente VVIP……!"
41140-49 = "É uma honra inestimável voltar a ouvir a sua voz!"
41140-50 = "A senhorita deseja um novo lote de mísseis termobáricos esta noite?"
41140-51 = "Ou por acaso as bombas de fragmentação da sua última compra apresentaram algum defeito de fábrica……?"
41140-52 = "……Peraí. Moe, desde quando você faz esse tipo de compra?!"
41140-53 = "A-Ah, relaxa Miyako! O dinheiro não saiu do caixa da escola!"
41140-54 = "Foram compras \"pessoais\"! Do meu próprio bolso! Sem crime de responsabilidade!"
41140-55 = "[s] \"O conceito de \"bombas de fragmentação para uso pessoal\" me dá calafrios……\""
41140-56 = "I-Ignora eles, foco no negócio……"
41140-57 = "Hoje eu não tô ligando pra esvaziar o catálogo de vocês, eu quero repassar uma mercadoria."
41140-58 = "Repassar……? A senhora quer vender para nós? Infelizmente, a nossa política padrão de recompra é bem restrita……"
41140-59 = "Porém, tratando-se da nossa cliente VVIP, eu cometeria uma heresia se desligasse na sua cara. O que a senhorita tem a nos oferecer?"
41140-60 = "É o seguinte: eu tô com um arsenal de ponta que você não acha na esquina."
41140-61 = "Mísseis terra-ar teleguiados, granadas cluster com timer ajustável, e de quebra, uns lança-foguetes anti-tanque com controle remoto……"
41140-62 = "M-Minha nossa…… A senhorita está disposta a se desfazer dessas obras de arte?"
41140-63 = "Pois é. Eles tão com uma…… leve ferrugem superficial e umas marquinhas de lama, mas explodem que é uma maravilha."
41140-64 = "[s] \"……Leve ferrugem?\""
41140-65 = "（Cala a boca e não atrapalha a venda, Sensei!!）"
41140-66 = "Compreendo. Artigos de nicho militares como esses, mesmo que \"usados\", são extremamente cobiçados no submundo……"
41140-67 = "Será um prazer fechar negócio com a senhorita."
41140-68 = "Para o pagamento, podemos fazer a transferência bancária para a mesma conta oculta de sempre?"
41140-69 = "Aah, sobre isso…… Essa conta tá meio \"congelada\" no momento……"
41140-70 = "Que tal a gente fechar no escambo? Ao invés de dinheiro, você me paga em mercadoria?"
41140-71 = "Em mercadoria……? E o que a senhorita teria em mente?"
41140-72 = "Eu não tô exigindo luxo, pode ser material de segunda linha, mas eu preciso de algo com impacto bruto."
41140-73 = "Umas bombas termobáricas, munição de fósforo branco…… Haaah…… Haaah…… só de pensar me dá calor……!"
41140-77 = "E-Eu peço mil desculpas, senhorita Moe…… Mas neste exato momento, o nosso estoque bélico está completamente zerado……"
41140-78 = "……Oi? Zerado? Vocês nadavam em armamento pesado, como assim zerou?!"
41140-79 = "É que…… bem…… Um cliente anônimo fez a rapa no nosso inventário ontem."
41140-80 = "Cê tá brincando…… Alguém tá querendo começar a Terceira Guerra Mundial em Kivotos?!"
41140-81 = "Quem é o louco que compra um catálogo inteiro assim?"
41140-82 = "I-Isso eu infelizmente não posso divulgar sob hipótese alguma……"
41140-83 = "Cláusula de confidencialidade e proteção do cliente, espero que a senhora entenda……"
41140-84 = "É, tá bom, sigilo do mercado negro, eu entendo……"
41140-85 = "Sendo assim, o nosso negócio melou. Fica pra próxima."
41140-86 = "Nós que agradecemos a preferência! Estaremos aguardando ansiosamente o seu próximo pedido letal!"
41140-91 = "Que droga de coincidência bizarra é essa…… Quem rapa um estoque bélico do nada? Enfim, o plano A foi pro buraco."
41140-93 = "Vem cá, Moe. Como e quando você virou cliente VIP do submundo da Kaiser Industry?!"
41140-94 = "Sabe que sempre teve uns furos bizarros nas planilhas do orçamento da SRT…… Não me diga que……"
41140-95 = "Moe-chan…… V-Você vai ser preta por corrupção e desvio de verba militar……?"
41140-97 = "O-O foco não é esse agora, galera! A gente tem que lavar a roupa suja depois!"
41140-98 = "A sobrevivência da tropa vem em primeiro lugar!"
41140-99 = "E outra, a Kaiser não é o único mercado do mundo! A internet tá cheia de leilões clandestinos, os compradores babam por isso aqui!"
41140-100 = "Você acha mesmo que um doido na internet vai comprar armamento de guerra afogado no meio da madrugada?"
41140-101 = "Cê que pensa! Os leilões da deep web têm de tudo: de pendrive hackeado até hortifruti orgânico! As pessoas compram qualquer loucura!"
41140-102 = "Pode apostar, a minha caixa de mensagens vai lotar de notificações implorando por um míssilzinho daqui a cinco segun――"
41140-108 = "……Caramba, não é que pingou mensagem mesmo."
41140-110 = "Próximo Episódio;Uma Derrota Discreta, mas Dolorosa"