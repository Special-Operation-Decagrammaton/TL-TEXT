[translation]
41140-1 = "Episódio 14: Escambo"
41140-2 = "Moe, você tem algum plano bom?"
41140-3 = "M-mas do jeito que estamos, sem dinheiro nem conta…"
41140-4 = "…Aliás, quem desperdiçou munição à toa foi você, logo no começo."
41140-6 = "Não, não, não! É que naquele momento era necessário!"
41140-7 = "De qualquer forma, não é porque não temos dinheiro que não podemos reabastecer."
41140-8 = "[s] \"Não me diga que vai assaltar um banco…\""
41140-9 = "Hã? Do que está falando?"
41140-10 = "A SRT, que deveria proteger os cidadãos, jamais cometeria um assalto a banco."
41140-11 = "Não tenha ideias tão malucas."
41140-12 = "O que quero dizer é…"
41140-14 = "Escambo!"
41140-15 = "É meio que o básico, um método de troca clássico."
41140-16 = "Nós damos coisas valiosas que temos e, em troca, recebemos armas e munição!"
41140-18 = "'Coisas valiosas que temos'… como o quê?"
41140-19 = "…Bentô de churrasco? Já venceu, mas…"
41140-20 = "Ninguém vai querer comprar isso. No máximo aquela 'FeliSem'."
41140-21 = "Não é isso, são os mísseis e as bombas."
41140-22 = "Mesmo estragados pela água, o valor não zerou."
41140-23 = "É uma pena, mas é melhor que tenham um dono melhor."
41140-24 = "[s] \"Entendo…?\""
41140-26 = "Mas será que vão comprar? Originalmente eram caros, mas agora estão praticamente quebrados ou enferrujados…"
41140-27 = "Deixa isso comigo. Tenho meus contatos."
41140-28 = "Por exemplo…"
41140-29 = "A 'Kaiser Industry', que vende armas no Mercado Negro. Lá sempre há demanda por armas usadas de mercenários."
41140-30 = "Com certeza vai ter alguém interessado até nesses mísseis enferrujados."
41140-31 = "E em troca, a gente pega armas de qualidade razoável do Grupo Kaiser!"
41140-32 = "Nossa, Moe, até que você teve uma ideia decente."
41140-33 = "Está se sentindo bem? Será que teve uma intoxicação alimentar com aquele macarrão napolitano de ontem?"
41140-34 = "Cala a boca!"
41140-38 = "De qualquer forma, vamos ligar para o escritório comercial."
41140-45 = "Sim, aqui é a 'Kaiser Industry', oferecemos armas da mais alta qualidade. Em que posso ajudá-lo?"
41140-46 = "Olá, olá! Quanto tempo!"
41140-47 = "Sou eu, a responsável pelos suprimentos da SRT, que já comprou várias coisas com vocês."
41140-48 = "A-ah, a V-VIP daquela época…?!"
41140-49 = "Há quanto tempo!"
41140-50 = "Veio atrás de novos mísseis?"
41140-51 = "Ou houve algum problema com as bombas de fragmentação que comprou antes…?"
41140-52 = "…Moe, quando foi que você fez essas compras?"
41140-53 = "Bem, não era dinheiro da escola, tá?"
41140-54 = "Eram bombas de uso pessoal! Paguei do meu bolso, então tudo bem!"
41140-55 = "[s] \"O que seria uma 'bomba de uso pessoal'…?\""
41140-56 = "E-enfim…"
41140-57 = "Hoje não liguei para comprar, mas para vender."
41140-58 = "Vender…? Aqui, basicamente, não fazemos compras…"
41140-59 = "Mas não posso recusar sem ouvir. Pode me contar?"
41140-60 = "É que eu tenho aqui uns equipamentos de alto nível que não se acha em loja de conveniência."
41140-61 = "Mísseis antiaéreos guiados, granadas de fragmentação de potência ajustável, foguetes anticarro de controle remoto…"
41140-62 = "O-o quê…?! E vai vender tudo isso?"
41140-63 = "Sim, estão um pouco enferrujados… mas acho que dá para usar."
41140-64 = "[s] \"…Um pouco?\""
41140-65 = "(Professor, cala a boca!)"
41140-66 = "Se são itens tão especiais, certamente haverá demanda…"
41140-67 = "Sim, será um prazer comprá-los."
41140-68 = "Quanto ao pagamento, pode ser na mesma conta de antes?"
41140-69 = "Ah, é que essa conta não está mais funcionando…"
41140-70 = "Que tal pagar em espécie?"
41140-71 = "Em espécie… como assim?"
41140-72 = "Uns mais simples, mas potentes."
41140-73 = "Bombas termobáricas, fósforo branco… haaah, haaah…!"
41140-77 = "N-na verdade, me desculpe… mas nossos estoques de armas estão zerados no momento…"
41140-78 = "…Hã? Tem tanta arma sempre, e acabou tudo?"
41140-79 = "Sim… um cliente anônimo comprou tudo outro dia."
41140-80 = "O quê… Vai ter uma guerra em Kivotos?"
41140-81 = "Quem compraria tudo isso…"
41140-82 = "Isso, infelizmente, não posso revelar…"
41140-83 = "Desculpe, é sigilo de cliente…"
41140-84 = "Bem, é compreensível…"
41140-85 = "Então, que pena, vamos esquecer este negócio…"
41140-86 = "Se precisar de mais alguma coisa, é só nos contatar!"
41140-91 = "Que situação sem sentido… quer dizer, não deu certo…"
41140-93 = "Aliás, Moe, quando foi que você virou VVIP da Kaiser Industry?"
41140-94 = "Falando nisso, havia várias contas que não batiam… por acaso…"
41140-95 = "Moe-chan… por apropriação indébita…?"
41140-97 = "N-não é hora de falar disso, né?!"
41140-98 = "Por enquanto, o que importa são os suprimentos…!"
41140-99 = "B-Bem, a 'Kaiser Industry' não é meu único contato! Em leilões de usados, certamente haverá compradores!"
41140-100 = "Existe alguém que compraria essas coisas num leilão?"
41140-101 = "Não subestime! Em leilões hoje em dia, dá para comprar de tudo, de armas e munições a equipamentos de hacking e até vegetais!"
41140-102 = "Com certeza, mensagens pedindo para comprar bombas vão aparecer――"
41140-108 = "…Nossa, é verdade."
41140-110 = "Próximo Episódio: Uma Derrota Pequena e Certa"