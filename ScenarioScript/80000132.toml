[translation]
80000132-1 = "Recarga de mana para o Mestre"
80000132-2 = "（Esta manhã, recebi uma mensagem da Eri...）"
80000132-5 = "Mestre! Você vai vir à academia hoje, não vai?"
80000132-6 = "Na verdade, tenho algo para lhe contar!"
80000132-7 = "Nyu-fufu! Então, vamos nos encontrar em um lugar secreto!"
80000132-9 = "（...E assim, cheguei a um terreno baldio na Academia de Artes Wild Hunt）"
80000132-12 = "Terreno baldio deserto"
80000132-14 = "Ah, Mestre!#nVocê foi rápido!"
80000132-15 = "[s] \"Por que me chamou em um lugar como este?\""
80000132-16 = "...Porque aqui, a ressonância de mana pode ser maximizada."
80000132-17 = "Onde há outras pessoas, bem... a energia mágica acaba interferindo..."
80000132-18 = "[s] \"...? Você queria me ver a sós?\""
80000132-19 = "S-sim, é isso!"
80000132-20 = "Como esperado do Mestre, você é perspicaz."
80000132-21 = Então, já que estamos a sós...!"
80000132-22 = "...Posso tirar, não posso?"
80000132-23 = "[s] \"...Hã!?\""
80000132-24 = "Quero que você veja a minha determinação, Mestre."
80000132-25 = "...Aaaah!!!"
80000132-30 = "Kyaaaa...!"
80000132-39 = "M-mesmo sendo pelo Mestre, fazer isso ao ar livre... é, bem, é vergonhoso."
80000132-40 = "[s] \"...Eh?\""
80000132-41 = "D-desculpe, é estranho, não é! Eu sei disso, mas...!"
80000132-42 = "Para mim, é quase a mesma coisa que ficar nua..."
80000132-43 = "Quando pratiquei na frente do pessoal do Clube de Pesquisa Oculta, eu estava bem, mas..."
80000132-44 = "[s] \"N-não é vergonhoso na frente delas?\""
80000132-45 = "Bem, nós tomamos banho juntas e tudo mais..."
80000132-46 = "Então, tirar o chapéu não é nada demais..."
80000132-47 = "É a mesma coisa, por assim dizer..."
80000132-48 = "...!?#nAh, não, não que isso signifique algo a mais!"
80000132-49 = "[s] \"N-não se force! Já pode colocar de volta.\""
80000132-50 = "M-mas eu tomei uma decisão para vir até aqui...!"
80000132-51 = "Este visual é o ideal para um compartilhamento de mana eficiente..."
80000132-52 = "..."
80000132-53 = "E-está tudo bem, eu consigo fazer isso direito...!"
80000132-54 = "Fuu..."
80000132-55 = "E-então, Mestre!"
80000132-60 = "Coloquei bastante do meu mana..."
80000132-61 = "Desta vez, tentei criar usando meu próprio poder, sem depender do chapéu..."
80000132-62 = "Por isso, achei que não seria bom continuar usando o chapéu...!"
80000132-63 = "...M-Mestre?"
80000132-64 = "[s] \"Incrível, só de olhar para esse chocolate, sinto minhas forças voltarem...!\""
80000132-65 = "V-verdade?"
80000132-66 = "E-então, hum..."
80000132-67 = "Posso te dar na boca...?"
80000132-68 = "[s] \"...Entendi, é uma recarga de mana!\""
80000132-69 = "S-sim!"
80000132-70 = "Essa capacidade de compreensão... como esperado do Mestre, você é incrível!"
80000132-71 = "Chegar perto sem o chapéu exige coragem, mas..."
80000132-72 = "Suuu... haaa...#nV-vou começar, está bem?"
80000132-73 = "[s] \"A qualquer momento!\""
80000132-74 = "Então...!"
80000132-75 = "Primeiro, o chocolate de estrela..."
80000132-80 = "O-o que achou?"
80000132-85 = "[ns] \"Incrível, está estalando na boca!\""
80000132-86 = "Ehehe... eu adicionei balas explosivas!"
80000132-87 = "Se comer quando estiver com sono, seus olhos vão abrir na hora!"
80000132-88 = "[s] \"Qual é o sabor do chocolate de coração?\""
80000132-89 = "Isso é... uma surpresa para depois que você comer."
80000132-90 = "E-então, por favor...!"
80000132-94 = "[ns] \"I-isso é...?\""
80000132-95 = "(Doce... e com um leve toque ácido?)"
80000132-96 = "(É como se minha mana estivesse se recuperando...!)"
80000132-97 = "O-o que achou?"
80000132-98 = "Eu adicionei várias vitaminas."
80000132-99 = "É um chocolate, mas também funciona como um suplemento nutricional."
80000132-100 = "...Mestre, você está sempre tão ocupado."
80000132-101 = "Ouvi dizer que muitas vezes você trabalha até tarde sem nem conseguir fazer uma refeição..."
80000132-102 = "Ugh, só de pensar nisso, fico um pouco triste..."
80000132-103 = "Por isso, nessas noites...#npor favor, coma este chocolate enquanto pensa em mim!"
80000132-104 = "Com certeza, a mana vai fluir de volta para você!"
80000132-105 = "[s1] \"O carinho da Eri está me tocando...\"\n[s2] \"Quero comer tudo agora mesmo!\""
80000132-108 = "N-não pode comer demais, viu!?"
80000132-109 = "Repor mana em excesso também não faz bem."
80000132-110 = "[ns] \"Com certeza, vou tomar cuidado.\""
80000132-112 = "[ns] \"Eri, você não quer comer comigo?\""
80000132-115 = "U-uma recarga de mana reversa do Mestre...!?"
80000132-116 = "É verdade, se fizermos uma carga mútua, o efeito deve ser mais que o dobro!"
80000132-117 = "Então... por favor, Mestre!"
80000132-119 = "(Depois disso, passei um tempo repleto de magia junto com a Eri)"
