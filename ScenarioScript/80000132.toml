[translation]
80000132-1 = "Carga de Mana para Mestre"

80000132-2 = "(Eri me contatou esta manhã――)"

80000132-5 = "Mestre! Você vem para a escola hoje, certo?"

80000132-6 = "Na verdade, tenho uma coisa que quero te contar!"

80000132-7 = "Nyufufu! Vejo você em um local secreto!"

80000132-9 = "(...e então eles chegaram ao terreno baldio da Wild Hunt Art Academy)"

80000132-12 = "terreno baldio deserto"

80000132-14 = "Ah, mestre! #nIsso foi rápido!"

80000132-15 = "[s] \"Qual o sentido de chamar você para um lugar como este?\""

80000132-16 = "...Aqui você pode maximizar a ressonância da mana."

80000132-17 = "Em lugares onde há pessoas, esse... poder mágico irá interferir..."

80000132-18 = "[s] \"...?Então você queria se encontrar sozinho?\""

80000132-19 = "Isso mesmo!"

80000132-20 = "Como esperado de um mestre, ele é muito perspicaz."

80000132-21 = "Então, somos só nós dois...!"

80000132-22 = "...Não há problema em tirar a roupa, certo?"

80000132-23 = "[s] \"...Hmm!?\""

80000132-24 = "Quero que o Mestre veja minha determinação."

80000132-25 = "...Sim! ! !"

80000132-30 = "Eiaaaaah...!"

80000132-39 = "Não, mesmo que seja pelo bem do mestre, é lá fora... bem, é muito constrangedor."

80000132-40 = "[s] \"...Hein?\""

80000132-41 = "Desculpe, isso é estranho! Eu sei, mas...!"

80000132-42 = "Para mim não é tão diferente de estar nu..."

80000132-43 = "Quando pratiquei na frente de todos em Okaken, fiquei bem, mas..."

80000132-44 = "[s] \"Você não fica com vergonha na frente de todo mundo?\""

80000132-45 = "Bom, vamos tomar banho juntos..."

80000132-46 = "Então, mesmo que eu tire o chapéu..."

80000132-47 = "Eu diria a mesma coisa..."

80000132-48 = "...! ? #nAh, não, isso não significa que eu não me importe!"

80000132-49 = "[s] \"M-não se esforce demais! Não há problema em usá-lo agora.\""

80000132-50 = "Mas eu também já me decidi...!"

80000132-51 = "Esta roupa é perfeita para um compartilhamento eficiente de mana..."

80000132-52 = "……."

80000132-53 = "Não, está tudo bem, eu posso fazer isso direito...!"

80000132-54 = "Ufa..."

80000132-55 = "Pois bem, mestre!"

80000132-60 = "Minha mana... eu coloquei bastante."

80000132-61 = "Dessa vez não contei com chapéu e tentei fazer eu mesma..."

80000132-62 = "Então pensei que talvez não fosse uma boa ideia manter o chapéu...!"

80000132-63 = "...Bem, Mestre?"

80000132-64 = "[s] \"Nossa, esses chocolates me dão força só de olhar...!\""

80000132-65 = "Ah, é verdade?"

80000132-66 = "Então, então..."

80000132-67 = "Tudo bem se eu disser \"Ah\"...! ?"

80000132-68 = "[s] \"...Entendo, é uma carga de mana!\""

80000132-69 = "Ah, sim!"

80000132-70 = "Essa compreensão... Mestre é incrível!"

80000132-71 = "Bem, você precisa estar preparado para abordá-los sem chapéu..."

80000132-72 = "Entããão...suspiro...#nE-eu vou?"

80000132-73 = "[s] \"A qualquer hora!\""

80000132-74 = "Pois bem...!"

80000132-75 = "Em primeiro lugar, o chocolate estrela...!"

80000132-80 = "C-como...?"

80000132-85 = "[ns] \"すごい、パチパチ弾けてる！\""
80000132-86 = "Hehehe... adicionei rebuçados!"

80000132-87 = "Se você comer quando estiver com sono, seus olhos ficarão mais brilhantes!"

80000132-88 = "[s] \"Qual é o sabor do chocolate coração?\""

80000132-89 = "É algo que você pode desfrutar depois de comer."

80000132-90 = "Então, aqui está...!"

80000132-94 = "[ns] \"I-isso é...!?\""

80000132-95 = "(Doce... só um pouco azedo?)"

80000132-96 = "(Parece que sua mana está se recuperando...!)"

80000132-97 = "O que você acha?"

80000132-98 = "色々とビタミンを入れてみました。"
80000132-99 = "É chocolate e suplemento nutricional."

80000132-100 = "...O Mestre está sempre ocupado."

80000132-101 = "Ouvi dizer que tem muitos dias que eles trabalham até tarde sem nem comer..."

80000132-102 = "Ugh, fico meio triste só de pensar nisso..."

80000132-103 = "Então, nessas noites...#nPor favor, coma esse chocolate enquanto se lembra de mim!"

80000132-104 = "Tenho certeza que a mana fluirá!"

80000132-105 = "[s1] \"エリの気持ちが染みていく……。\"\n[s2] \"今すぐ全部食べたい！\""
80000132-108 = "Não é bom comer demais! ?"

80000132-109 = "O suprimento excessivo de mana também não é bom."

80000132-110 = "[ns] \"Claro, terei cuidado.\""

80000132-112 = "[ns] \"Você gostaria de comer comigo também, Eli?\""

80000132-115 = "Bem, inverta o fornecimento de mana do mestre...! ?"

80000132-116 = "É verdade que se vocês cobrarem um ao outro, o efeito será mais que o dobro!"

80000132-117 = "Bem... por favor, Mestre!"

80000132-119 = "(Depois disso, passei um tempo mágico com Eli.)"

