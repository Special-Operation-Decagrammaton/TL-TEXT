[translation]
102030-1 = "第3話;作戦準備（１）"
102030-2 = "第1サンクトゥム"
102030-3 = "アビドス砂漠エリア"
102030-5 = "第1サンクトゥムの作戦担当、奥空アヤネです。"
102030-6 = "皆さん、指定地点に到着しましたか？#n第1部隊、応答願います。"
102030-10 = "大丈夫よアヤネちゃん。準備は終わってるわ。"
102030-11 = "うんうん！待機中です☆"
102030-13 = "応答ありがとうございます！#nホシノ先輩はどうですか？"
102030-15 = "うん、おじさんも大丈夫。"
102030-16 = "あれが――「虚妄のサンクトゥム」なんだね？"
102030-17 = "はい。#n……そして、「ビナー」をこちらに引きつけなければ、アレを破壊する事ができません。"
102030-19 = "「囮」役は私たち便利屋がやるわ。いいわね？"
102030-20 = "は、はい！！壊れた列車を暴走させて、命を散らせばいいんですよね！？わ、分かりました！一生懸命死にます！！"
102030-21 = "あはは！！ハルカちゃん、相変わらずだね～"
102030-22 = "いや、死んだらダメでしょ……#n第2部隊はビナーを引きつけたら、第1部隊と合流して対象を挟撃するよ。"
102030-23 = "列車の上に乗って移動するから、いかに怪我をしないかが大事。"
102030-24 = "ええ。一番危険なポジションは、私たち便利屋68に任せてちょうだい。#nそれがハードボイルドというものだもの。"
102030-25 = "くふふっ、すっごい楽しそう！ジェットコースターみた～い！"
102030-26 = "そうそう。列車は最後に破壊するつもりだけど……"
102030-27 = "文句はあるかしら？"
102030-31 = "それについては、お気になさらないでください。#nどうせ今は使われていませんから……"
102030-33 = "それに――あの列車こそが、アビドスの衰退に拍車をかけたきっかけですし……"
102030-34 = "それが、世界を救うお役に立てるのなら……"
102030-35 = "これ以上嬉しいことはないです。"
102030-36 = "ノノミ先輩……"
102030-37 = "まさか、"
102030-38 = "この列車がネフティスグループの――"
102030-42 = "はいはい、昔話はその辺にして……#nこっちは準備オッケーだよ～"
102030-44 = "はい！「シャーレコントロール」0号、応答願います！#n第1サンクトゥムはスタンバイ完了です！"
102030-46 = "はい、確認しました。#nマキさん、そちらはどうですか？"
102030-49 = "問題ないよ！あ、でも1個だけ注意。"
102030-50 = "ビナーのレーザーには絶対触らないでね！"
102030-51 = "岩を一瞬で消しちゃうくらいの超高温レーザーなんだって。"
102030-56 = "第2サンクトゥムの方はいかがですか？"
102030-58 = "第2虚妄のサンクトゥム"
102030-59 = "ミレニアム郊外の閉鎖地域"
102030-61 = "うん。こちら、第2サンクトゥムの作戦担当､[ruby=いずみもと]和泉元[/ruby]エイミ｡"
102030-62 = "今から、軍需工場にいるケセドと交戦する予定。"
102030-63 = "工場の正面で、ケセドが生み出した兵と戦う部隊と――"
102030-64 = "上空から工場内部に入り込むパラシュート隊が待機中。あと――"
102030-65 = "状況了解しました。ありがとうございます。#nパラシュート部隊のメンバーはどなたに決まりました？"
102030-66 = "それが……ちょっとトラブルが起きちゃって。"
102030-67 = "……といいますと？"
102030-69 = "あ？てめぇ、話聞いてんのか？"
102030-70 = "きひひっ……"
102030-71 = "きひひひ……"
102030-72 = "ええと……"
102030-73 = "その……困ったっす…… "
102030-74 = "C&Cのダブルオーと正義実現委員会の委員長が、お互い譲らなくて。"
102030-75 = "……。"
102030-77 = "リーダー、そろそろ時間が……#n今はこんな事をしている場合では……"
102030-78 = "わーってる！#nだがなぁ、こいつが先にケンカ吹っ掛けてきてんだよ。"
102030-82 = "はぁ……。#nあの……すみません、そちらもどうか宥めていただけますと……"
102030-83 = "すみません、それは難しいっす。#nあの状態のツルギ先輩は誰にも止められなくて……"
102030-84 = "で、なんでケンカしてるの～？#n[ruby=・   ・   ・]強い方[/ruby]が正面を担当すればいいんじゃない？"
102030-85 = "あ、アスナ先輩それは……！！"
102030-86 = "あ……終わった。"
102030-92 = "……おい、表出ろ。#n白黒つけようじゃねぇか。"
102030-96 = "……けけ、きひゃひゃひゃひゃひゃ！"
102030-100 = "わぁ！ケンカだ～！！#n面白そ～！見にいこーっと！"
102030-104 = "はぁ……結局こうなるのか……。"
102030-105 = "私たちも行きましょうか。"
102030-110 = "あー……"
102030-111 = "……仕方ないっすね。"
102030-118 = "エイミさん？#nそちらで一体何が――"
102030-119 = "……ケンカしに行っちゃった。"
102030-120 = "……。"
102030-129 = "正義実現委員会の委員長さん、すっごいね～！"
102030-130 = "近接戦でリーダーと互角の人……初めて見た。"
102030-131 = "ツルギ――彼女は、「トリニティの戦略兵器」と呼ばれるほどの方ですから。"
102030-133 = "お、すごいっすね～#nツルギ先輩に怯まない人、久しぶりに見たっす。"
102030-141 = "くひひっ……"
102030-142 = "きえええぇぇぇぇぇぇっ！！！"
102030-147 = "はははっ！#nいいぞ、次はこいつだ！"
102030-160 = "あははは！リーダー、楽しそう～！"
102030-161 = "最近色々あったから、ストレスが溜まってたんだな。"
102030-162 = "ツルギ先輩も今日はテンション高めっすね～"
102030-164 = "ははっ！悪くねぇ。でもこんなもんで終わりじゃねぇよな？#nそれとも、傷が痛むか？"
102030-166 = "きひひ……傷なんて――"
102030-167 = "――全部治ってる。"
102030-168 = "……ははっ！流石。#nそう来なくっちゃなぁ！！"
102030-169 = "きえええええええぇぇぇっ！！"
102030-170 = "ちょっと、二人とも何してるのよ！！"
102030-173 = "あっ……ユウカ……"
102030-174 = "チーム分けで、ケンカなんかして……#nあなた達、一体いま何年生？ "
102030-175 = "すみません、皆さん。#nユウカちゃんなら止めてくれると思いまして……"
102030-176 = "……"
102030-177 = "ちっ、せっかく面白い展開になってきたってのによぉ……"
102030-179 = "え～？でもでも、誰が一番強いか決めないとチームが分けられないよ？"
102030-180 = "一体、何を言ってるの……？"
102030-181 = "もう……そこの二人！"
102030-182 = "あぁ？"
102030-183 = "？"
102030-184 = "じゃんけんして！今すぐ！"
102030-188 = "はぁ！？そんなんで決められっかよ！"
102030-189 = "こっちは時間が無いのよ。#nこのままじゃ計画が失敗してしまうわ。"
102030-190 = "チッ……分かったよ。"
102030-196 = "んじゃ……じゃん――"
102030-197 = "――けん、"
102030-198 = "――ぽん！！"
102030-200 = "……。"
102030-201 = "決まりだね。"
102030-203 = "モモイ！ミドリ！ユズ！緊急クエストです！#nダンジョン攻略ですよ！"
102030-204 = "アリス、しーっ！#n重要な作戦みたいだから、声を落として……！"
102030-205 = "お姉ちゃん……だ、大丈夫かな？"
102030-206 = "う、うん多分、大丈夫だよ……#n先生が「ここに最強のチームが集まる」って言ってたし……"
102030-207 = "はい！アリスも聞きました！今回はとっても強い仲間たちと一緒に戦います！だから、大丈夫です！ "
102030-208 = "とっても強い仲間……"
102030-209 = "えっと、一つは特殊部隊って言ってたよね？ "
102030-216 = "ここがスランピアか？#n思ったよりも不気味な雰囲気だな。"
102030-217 = "RABBIT小隊、目標地点に到着。#n本隊と合流しました。"
102030-219 = "き、来た！SRTだ……！"
102030-220 = "こ、こんにちは……よろしくお願いします。"
102030-222 = "今日はよろしくお願いします、皆さん。"
102030-223 = "そして、RABBIT3とRABBIT4は位置の報告を。"
102030-224 = "RABBIT3、現在空中支援のスタンバイ完了。命令待機中～。#nミユ、そっちはどう？"
102030-225 = "RABBIT4、し、視界不良……風も南東向きで35ノット……あまりいい環境ではないかな……"
102030-226 = "で、でも……狙撃に大きな影響はないよ……"
102030-232 = "これ、台風級の風速だけど……。"
102030-234 = "き、来た！とっても強い仲間その2……！#nゲヘナ風紀委員長、[ruby=そらさき]空崎[/ruby]ヒナ……！"
102030-235 = "よ、よろしくお願いします……！"
102030-237 = "狙撃手、目標との距離はどれくらい？"
102030-238 = "は、はい！？わ、私ですか？#nあ……えっと、ここから約950mほどです……"
102030-239 = "銃は何を？"
102030-240 = "RABBIT39式、狙撃用ライフルです……！#n弾丸は7.62mmx53mmRを使っていて……装弾数は5発、じゅ、銃番号は――"
102030-242 = "あの……"
102030-244 = "……申し訳ない、問い詰める意図はなかった。"
102030-245 = "有効射程の倍の距離、そしてこの悪条件下で狙撃が可能だなんて――流石だね。"
102030-246 = "は、はい……？ええっと、そう、でしょうか？"
102030-247 = "うああ……あ、ありがとうございます……！？"
102030-248 = "ミユは1980m離れた距離からも、狙撃を成功させたことがあります。 "
102030-249 = "……そう。一目見ただけで、想像できる。#nこれからも成長するだろうね。"
102030-250 = "先生が大変な時にRABBIT小隊を頼ったこと……#nそして、シャーレ奪還を共に遂行した事も……嘘じゃなさそう。"
102030-252 = "ま、まぁ、別に大したことじゃないけどな。"
102030-253 = "それと――"
102030-257 = "あなたが、噂の[ruby=てんどう]天童[/ruby]アリス……"
102030-258 = "（ミレニアムで起きた、例の事件の……）"
102030-263 = "パンパカパーン！レベルカンストのガチ勢が仲間になりました！！"
102030-264 = "……。"
102030-265 = "わわっ！あ、アリス！？"
102030-266 = "ご、ごめんなさい！#nアリスちゃん、時々変なことを言うんです……"
102030-267 = "アリス、ゲヘナの風紀委員長の話、先生から聞いたことがあります！"
102030-269 = "……先生が私のことを？"
102030-270 = "（ひそひそ）ゲヘナの風紀委員長は、すっごく怖い人で……気に入らない人は容赦なく消すっていう噂を聞いたことがあるのに……。"
102030-271 = "（ひそひそ）こ、怖い……も、もしかしたら怒られちゃうかも……。"
102030-272 = "先生は、風紀委員長はとっても良い人だって言っていました！#nそれから――"
102030-273 = "そ、そうだっけ……？"
102030-274 = "先生が？"
102030-278 = "……それから？"
102030-279 = "それから……頼りにしてる一人だと言っていました！#nすっごく頼もしい、と！"
102030-280 = "なので、アリスは風紀委員長とパーティーを組めて光栄です！とても嬉しいです！"
102030-281 = "……えっと。"
102030-285 = "……いや、何でもない。 "
102030-286 = "第3サンクトゥム、スタンバイ完了。RABBIT小隊及びゲーム開発部が待機中。#n作戦担当、確認願う。"
102030-287 = "そういえば、今回の作戦担当は――"
102030-292 = "だ、第3サンクトゥム、作戦担当……は、[ruby=はなおか]花岡[/ruby]ユズ、です……"
102030-293 = "ど、どうして私が……うう。"
102030-294 = "ユズちゃん、頑張って！ "
102030-295 = "そうだよ！これはユズにしかできない作戦だよ！"
102030-297 = "確認いたしました。#nユズさん、よろしくお願いいたします。 "
102030-299 = "は、はい……うう……。"
102030-301 = "次回;作戦準備（２）"
