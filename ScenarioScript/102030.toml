[translation]
102030-1 = "Episódio 3; Preparações para a Operação (1)"
102030-2 = "1º Sanctum"
102030-3 = "Área do Deserto de Abydos"
102030-5 = "Aqui é a responsável pela operação do 1º Sanctum, Okusora Ayane."
102030-6 = "Pessoal, já chegaram ao ponto designado?#n1º Esquadrão, por favor, respondam."
102030-10 = "Está tudo certo, Ayane-chan. Os preparativos já foram concluídos."
102030-11 = "Uhum, uhum! Estamos de prontidão☆"
102030-13 = "Obrigada por responderem!#nE a Hoshino-senpai, como está?"
102030-15 = "Uhum, o tio aqui também tá de boa."
102030-16 = "Aquilo ali é o――\"Sanctum Falso\", né?"
102030-17 = "Sim.#n……E nós não conseguiremos destruí-lo se não atrairmos o \"Binah\" para cá."
102030-19 = "O papel de \"isca\" ficará com a gente da Faz-Tudo. Tudo bem para vocês?"
102030-20 = "S-Sim!! É só fazer um trem quebrado sair dos trilhos e sacrificar a minha vida, não é!? E-Entendido! Vou dar o meu melhor para morrer!!"
102030-21 = "Ahaha!! A Haruka-chan continua a mesma de sempre~"
102030-22 = "Não, não é pra você morrer……#nAssim que o 2º Esquadrão atrair o Binah, ele vai se encontrar com o 1º Esquadrão para fazermos um ataque em pinça no alvo."
102030-23 = "Como vamos nos mover em cima do trem, o mais importante é tentar não se machucar."
102030-24 = "Isso mesmo. Deixem a posição mais perigosa para nós da Faz-Tudo 68.#nAfinal, é isso que significa ser \"hard-boiled\"."
102030-25 = "Kufufu, parece ser superdivertido! Que nem uma montanha-russa~!"
102030-26 = "Isso aí. E a gente planeja destruir o trem no final, mas……"
102030-27 = "Alguma objeção?"
102030-31 = "Não se preocupem com isso.#nEle já não está sendo usado de qualquer forma……"
102030-33 = "Além do mais――aquele trem foi o estopim que acelerou o declínio de Abydos……"
102030-34 = "Se ele puder ser útil para salvar o mundo……"
102030-35 = "Eu não poderia estar mais feliz."
102030-36 = "Nonomi-senpai……"
102030-37 = "Não me diga que,"
102030-38 = "esse trem pertence ao Grupo Nephthys――"
102030-42 = "Tá bom, tá bom, chega de histórias do passado……#nNós já estamos prontas por aqui~"
102030-44 = "Sim! Aqui é o \"Controle Schale\" 0, na escuta!#nO 1º Sanctum está de prontidão!"
102030-46 = "Certo, confirmado.#nMaki-san, como estão as coisas por aí?"
102030-49 = "Sem problemas! Ah, mas só um aviso."
102030-50 = "Não encostem no laser do Binah de jeito nenhum!"
102030-51 = "Disseram que é um laser com uma temperatura tão alta que consegue desintegrar rochas num piscar de olhos."
102030-56 = "Como estão as coisas no 2º Sanctum?"
102030-58 = "2º Sanctum Falso"
102030-59 = "Área restrita nos subúrbios da Millennium"
102030-61 = "Uhum. Aqui é a responsável pela operação do 2º Sanctum, Izumimoto Eimi."
102030-62 = "Daqui a pouco, nós vamos entrar em combate com o Chesed, que está na fábrica de munições."
102030-63 = "Teremos um esquadrão lutando contra as tropas criadas pelo Chesed na entrada da fábrica e――"
102030-64 = "Uma equipe de paraquedistas está de prontidão para invadir o interior da fábrica pelo céu. Além disso――"
102030-65 = "Situação compreendida. Muito obrigada.#nQuem foram as escolhidas para a equipe de paraquedistas?"
102030-66 = "É que…… rolou um pequeno probleminha."
102030-67 = "……Como assim?"
102030-69 = "Ah? Você tá me escutando, sua cretina?"
102030-70 = "Kihihi……"
102030-71 = "Kihihihi……"
102030-72 = "Err……"
102030-73 = "Pois é…… complicou…… "
102030-74 = "A Duplo O da C&C e a Presidente do Comitê de Justiça não querem ceder o lugar uma para a outra."
102030-75 = "……。"
102030-77 = "Líder, já está quase na hora……#nAgora não é o momento para fazer esse tipo de coisa……"
102030-78 = "Eu sei disso!#nMas essa idiota aqui foi quem começou a arrumar briga comigo."
102030-82 = "Haa…….#nCom licença…… vocês não poderiam tentar acalmá-la também……?"
102030-83 = "Foi mal, mas isso é meio difícil.#nNinguém consegue parar a Tsurugi-senpai quando ela fica desse jeito……"
102030-84 = "Ué, e por que elas tão brigando~?#nNão é só deixar a mais forte ficar com a linha de frente?"
102030-85 = "A-Asuna-senpai, isso é……!!"
102030-86 = "Ah…… já era."
102030-92 = "……Ei, vamo lá pra fora.#nVamos ver quem é a melhor de uma vez por todas."
102030-96 = "……Keke, kihyahyahyahyahya!"
102030-100 = "Uau! É uma briga~!!#nParece divertido~! Vou lá dar uma olhada!"
102030-104 = "Haa…… No fim, ia acabar terminando nisso……"
102030-105 = "Vamos indo também?"
102030-110 = "Ahh……"
102030-111 = "……Não tem o que fazer."
102030-118 = "Eimi-san?#nO que diabos está acontecendo por aí――"
102030-119 = "……Elas foram brigar."
102030-120 = "……。"
102030-129 = "A Presidente do Comitê de Justiça é incrível, né~!"
102030-130 = "Alguém que consegue lutar de igual pra igual com a líder no combate corpo a corpo…… É a primeira vez que eu vejo."
102030-131 = "Tsurugi――Afinal, ela é conhecida como a \"Arma Estratégica de Trinity\"."
102030-133 = "Uau, incrível mesmo~#nFazia um tempão que eu não via alguém que não se intimida com a Tsurugi-senpai."
102030-141 = "Kuhihi……"
102030-142 = "Kieeeeeeeehhh!!!"
102030-147 = "Hahaha!#nIsso aí, agora toma essa!"
102030-160 = "Ahahaha! A líder parece tá se divertindo muito~!"
102030-161 = "Como rolaram muitas coisas recentemente, ela devia estar acumulando muito estresse."
102030-162 = "A Tsurugi-senpai também tá bem empolgada hoje~"
102030-164 = "Haha! Nada mau. Mas não vai me dizer que acabou por aí, né?#nOu será que o seu machucado tá doendo?"
102030-166 = "Kihihi…… Um machucado desses――"
102030-167 = "――Já curou faz tempo."
102030-168 = "……Haha! Era de se esperar.#nSe não fosse assim nem ia ter graça!!"
102030-169 = "Kieeeeeeeeeeehhhhh!!"
102030-170 = "Ei, o que vocês duas estão fazendo!!"
102030-173 = "Ah…… Yuuka……"
102030-174 = "Arrumando briga só pra decidir os times……#nPor acaso em que série vocês acham que estão? "
102030-175 = "Me desculpem, pessoal.#nImaginei que a Yuuka-chan conseguiria impedi-las……"
102030-176 = "……"
102030-177 = "Tsc, e eu aqui achando que as coisas tavam ficando interessantes……"
102030-179 = "Ué~? Mas, mas se a gente não decidir quem é a mais forte, não vai dar pra dividir os times, sabia?"
102030-180 = "Do que você está falando……?"
102030-181 = "Ai, ai…… Vocês duas aí!"
102030-182 = "Hã?"
102030-183 = "？"
102030-184 = "Tirem no pedra, papel e tesoura! Agora mesmo!"
102030-188 = "Hã!? Acha mesmo que eu vou decidir as coisas assim!?"
102030-189 = "Nós não temos tempo pra isso.#nSe continuarmos assim, o plano vai fracassar."
102030-190 = "Tsc…… Tá bom."
102030-196 = "Então bora…… Pe――"
102030-197 = "――dra, papel,"
102030-198 = "――tesoura!!"
102030-200 = "……。"
102030-201 = "Está decidido."
102030-203 = "Momoi! Midori! Yuzu! Uma quest de emergência!#nNós vamos fazer a limpa numa dungeon!"
102030-204 = "Aris, shhh!#nParece ser uma operação importante, então fala mais baixo……!"
102030-205 = "Mana…… V-Você acha que vai ficar tudo bem?"
102030-206 = "S-Sim, acho que vai ficar tudo bem, sim……#nO Sensei disse que \"a equipe mais forte iria se reunir aqui\"……"
102030-207 = "Sim! A Aris também ouviu! Dessa vez nós vamos lutar ao lado de companheiros muito fortes! Então, vai ficar tudo bem! "
102030-208 = "Companheiros muito fortes……"
102030-209 = "Err, disseram que um deles era de um esquadrão das Forças Especiais, não foi? "
102030-216 = "Então aqui é Slumpia?#nTem uma atmosfera bem mais sinistra do que eu imaginava."
102030-217 = "Esquadrão RABBIT, chegamos ao local designado.#nNos encontramos com o esquadrão principal."
102030-219 = "C-Chegaram! É a SRT……!"
102030-220 = "O-Olá…… Contamos com vocês."
102030-222 = "Contamos com a colaboração de todas hoje."
102030-223 = "E RABBIT3 e RABBIT4, por favor, relatem suas posições."
102030-224 = "RABBIT3, o suporte aéreo já está de prontidão. Aguardando ordens~.#nMiyu, como estão as coisas por aí?"
102030-225 = "RABBIT4. V-Visibilidade ruim…… Os ventos estão soprando para sudeste a 35 nós…… Acho que as condições não são das melhores……"
102030-226 = "M-Mas…… não vai afetar muito os meus tiros……"
102030-232 = "Essa velocidade do vento tá no nível de um tufão, mas beleza……"
102030-234 = "C-Chegou! A segunda companheira muito forte……!#nA Presidente do Comitê Disciplinar da Gehenna, Sorasaki Hina……!"
102030-235 = "C-Contamos com você……!"
102030-237 = "Atiradora de elite, qual a distância do alvo?"
102030-238 = "S-Sim!? E-Eu?#nAh…… err, fica a uns 950 metros daqui……"
102030-239 = "Qual arma está usando?"
102030-240 = "Um rifle de precisão RABBIT Type 39……!#nUsa munição 7.62x53mmR…… tem capacidade para 5 tiros, e-e o número de série é――"
102030-242 = "Licença……"
102030-244 = "……Sinto muito, não era minha intenção pressionar você."
102030-245 = "Ser capaz de atirar com precisão nessas condições terríveis e no dobro da distância de alcance efetivo da arma――Como esperado de você."
102030-246 = "S-Sério……? Err, você acha mesmo?"
102030-247 = "Uwaa…… m-muito obrigada……!?"
102030-248 = "A Miyu já acertou tiros precisos até mesmo a 1980 metros de distância. "
102030-249 = "……Entendo. Só de olhar pra ela dá pra imaginar.#nTenho certeza que você vai crescer ainda mais daqui pra frente."
102030-250 = "Parece que não era mentira que o Sensei pediu a ajuda do Esquadrão RABBIT durante aquela crise toda……#nE muito menos que vocês realizaram a operação de retomada da Schale ao lado dele."
102030-252 = "B-Bom, não foi grande coisa não, mas beleza."
102030-253 = "E além disso――"
102030-257 = "Você é a famosa Tendou Aris……"
102030-258 = "（Aquele incidente que aconteceu na Millennium……）"
102030-263 = "Tcharam! Uma pro player de nível máximo entrou para a equipe!!"
102030-264 = "……。"
102030-265 = "Uwah! A-Aris!?"
102030-266 = "M-Me desculpe!#nA Aris-chan fala umas coisas meio esquisitas de vez em quando……"
102030-267 = "A Aris já ouviu o Sensei falando sobre a Presidente do Comitê Disciplinar da Gehenna!"
102030-269 = "……O Sensei falou sobre mim?"
102030-270 = "（Sussurro）Eu ouvi rumores de que a Presidente do Comitê Disciplinar da Gehenna é uma pessoa super assustadora…… e que ela elimina qualquer um que a desagrade sem piedade, mas……"
102030-271 = "（Sussurro）Q-Que medo…… a gente deve acabar levando uma bronca dela……"
102030-272 = "O Sensei disse que a Presidente do Comitê Disciplinar é uma pessoa muito boa!#nE além disso――"
102030-273 = "E-Ele disse é……?"
102030-274 = "O Sensei disse?"
102030-278 = "……E além disso?"
102030-279 = "Além disso…… Ele disse que você é uma das alunas em quem ele mais confia!#nQue você é super confiável!"
102030-280 = "Por isso, a Aris tem a honra de formar um grupo com a Presidente do Comitê Disciplinar! Estou muito feliz!"
102030-281 = "……Err."
102030-285 = "……Não, deixa pra lá. "
102030-286 = "3º Sanctum, de prontidão. Esquadrão RABBIT e o Departamento de Desenvolvimento de Jogos aguardam ordens.#nResponsável pela operação, por favor, confirme."
102030-287 = "Por falar nisso, a responsável pela operação de hoje é――"
102030-292 = "A-Aqui é a responsável pela operação do 3º Sanctum…… Hanaoka Yuzu……"
102030-293 = "P-Por que teve que ser eu…… Uuu."
102030-294 = "Boa sorte, Yuzu-chan! "
102030-295 = "É isso aí! Essa é uma operação que só a Yuzu consegue guiar!"
102030-297 = "Confirmação recebida.#nContamos com as suas ordens, Yuzu-san. "
102030-299 = "S-Sim…… Uuu……."
102030-301 = "Próximo episódio; Preparações para a Operação (2)"