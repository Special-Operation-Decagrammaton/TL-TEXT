[translation]
34230-1 = "Episódio 23; Kyrie Pelas Garotas (1)"
34230-12 = "Haa... haa..."
34230-13 = "Ugh... dói... tô exausta... #nAh, cara, tô toda machucada..."
34230-18 = "Mas... eu ainda aguento."
34230-30 = "……"
34230-34 = "Isso aqui é... a sala do coral?"
34230-38 = "Um órgão e... partituras..."
34230-42 = "Tem até um gramofone... #n...Ah, é verdade. Afinal, Arius também deve ter tido as mesmas aulas que a gente."
34230-47 = "...Não tá funcionando. #nBem, faz tanto tempo que ninguém usa, não dá pra evitar."
34230-48 = "……"
34230-56 = "Haa..."
34230-57 = "Quando a Koharu-chan se jogou pra me salvar... ela foi tão legal."
34230-58 = "A Koharu-chan parecia uma princesa de conto de fadas. #nE então o Sensei apareceu para salvá-la... Eu também amo histórias assim."
34230-59 = "A princesa em apuros sendo resgatada pela pessoa predestinada... Um conto de fadas assim."
34230-60 = "É meio infantil, mas cheio de sonhos... tão maravilhoso que faz o coração bater mais forte..."
34230-61 = "...Eu também queria ser a protagonista de uma história dessas."
34230-62 = "Mas eu sei... eu não tenho o direito de querer algo assim."
34230-63 = "Histórias em que a 'bruxa' tem um final feliz não existem em lugar nenhum deste mundo."
34230-64 = "Saori... eu queria que você sentisse a mesma dor que eu sofri. #nEu achava que, se não fosse assim, seria muito injusto."
34230-65 = "Mas... é..."
34230-66 = "Assim como eu, vocês também queriam ser salvas."
34230-67 = "Vocês também... queriam ser felizes."
34230-68 = "Eu entendo o motivo de você querer salvar a Atsuko..."
34230-69 = "Mesmo você, que enganou e levou tantas pessoas ao desespero... #nSe bem no final, você conseguisse salvar pelo menos alguém..."
34230-70 = "Isso já seria o suficiente para redimir a sua vida cheia de dor... #n...Foi isso que você pensou, não foi?"
34230-71 = "Eu te entendo... Aconteceu a mesma coisa comigo e com a Seia-chan."
34230-76 = "Então... Arius Squad."
34230-80 = "Eu vou orar por vocês."
34230-81 = "Para que, algum dia..."
34230-82 = "Algum dia, a dor de vocês seja curada—"
34230-83 = "Assim como eu anseio por uma chance de recomeçar—"
34230-84 = "Para que vocês tenham um futuro... tenham uma nova chance—"
34230-85 = "Por isso, eu..."
34230-86 = "—Eu perdoo vocês."
34230-87 = "Afinal, esse com certeza é um final bem melhor do que sermos todos igualmente infelizes."
34230-97 = "—Mesmo que vocês salvem a Atsuko, o futuro de vocês com certeza será cheio de dificuldades."
34230-98 = "Talvez sejam caçadas pelo resto da vida... #nTalvez tenham uma vida miserável, sem nem poder andar à luz do dia."
34230-99 = "Mas, ainda assim..."
34230-100 = "Se vocês acreditam que existe pelo menos um fio de esperança no futuro de vocês—"
34230-101 = "Ao salvar a Atsuko, espero que vocês salvem a si mesmas também."
34230-102 = "Pra mim já é tarde demais... mas vocês ainda têm tempo, não têm?"
34230-103 = "Além do mais... o Sensei está ajudando vocês, então tenho certeza de que vai dar tudo certo..."
34230-104 = "Que haja felicidade no caminho de vocês—"
34230-106 = "E que sejam muito abençoadas—"
34230-111 = "...Ué?"
34230-116 = "Ahaha, não tava quebrado?"
34230-120 = "Essa é... a música que clama por misericórdia."
34230-121 = "Não que eu goste dessa música em particular, mas..."
34230-122 = "Acho que combina, é."
34230-137 = "Aha☆ Por que tanta pressa?"
34230-138 = "Vocês não vão passar. #nO que tem lá na frente é o palco onde a protagonista vai lutar pela salvação."
34230-139 = "Isso não é permitido para vilões como a gente."
34230-140 = "Vai lá, Sensei... Salve aquelas garotas."
34230-144 = "Eu seguro as pontas por aqui."
34230-153 = "— [i]Kyrie[/i]"
34230-155 = "[i]Eleison[/i]"
34230-168 = "Próximo Episódio; Kyrie Pelas Garotas (2)"