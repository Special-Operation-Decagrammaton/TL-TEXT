[translation]
34230-1 = "Episódio 23;Kyrie para as Garotas (1)"
34230-12 = "Haa…… haa……."
34230-13 = "Uu…… dói…… cansei………#nAh, já tô toda ralada……"
34230-18 = "Mas…… ainda dá."
34230-30 = "……."
34230-34 = "Aqui é…… a sala do coral?"
34230-38 = "Um órgão e…… partituras……"
34230-42 = "Até um gramofone…….#n……Ah, sei, faz sentido; a Arius também devia ter as mesmas aulas que a gente."
34230-47 = "……Não funciona, é.#nBom, parece que ficou muito tempo sem uso; fazer o quê."
34230-48 = "……."
34230-56 = "Haa……."
34230-57 = "Quando a Koharu se jogou na frente pra me salvar…… foi tão bonito."
34230-58 = "A Koharu parecia a princesa de uma história.#nO Sensei apareceu e salvou…… eu também gosto desse tipo de história."
34230-59 = "A pessoa do destino salvando a princesa encurralada――um conto de fadas assim."
34230-60 = "Infantil, cheio de sonho…… lindo, de fazer o coração bater forte……"
34230-61 = "……Eu também queria ser a protagonista de uma história dessas."
34230-62 = "Mas eu sei――eu não tenho esse direito."
34230-63 = "Uma história em que a \"bruxa\" ganha um final feliz não existe em lugar nenhum deste mundo."
34230-64 = "Saori…… eu queria que você sentisse a dor que eu senti.#nAchava que, sem isso, seria injusto."
34230-65 = "Mas…… pois é……"
34230-66 = "vocês também, como eu, queriam ser salvas, né."
34230-67 = "Vocês também…… queriam ser felizes, né."
34230-68 = "O motivo de você querer salvar a Atsuko, eu também entendo……."
34230-69 = "Mesmo você, que enganou tanta gente e a empurrou pro desespero……#nse, no fim de tudo, conseguisse salvar alguém……"
34230-70 = "a sua vida, cheia só de sofrimento, já se pagaria só com isso……#n……foi o que você pensou, não foi?"
34230-71 = "Eu entendo――porque comigo e com a Seia é igual."
34230-76 = "Por isso…… Squad de Arius."
34230-80 = "Eu vou rezar por vocês, tá."
34230-81 = "Que um dia……"
34230-82 = "que um dia o sofrimento de vocês se cure――"
34230-83 = "assim como se anseia por uma chance de recomeço――"
34230-84 = "que vocês tenham um futuro…… uma próxima oportunidade――"
34230-85 = "Por isso, eu……"
34230-86 = "――eu perdoo vocês."
34230-87 = "Porque isso deve ser um desfecho bem melhor do que sermos, igualmente, infelizes."
34230-97 = "――Mesmo que salvem a Atsuko, o futuro de vocês, com certeza, vai ser cheio de adversidade."
34230-98 = "Talvez sejam perseguidas a vida toda……#ntalvez virem uma vida miserável, sem poder andar à luz do dia."
34230-99 = "Mas, ainda assim……"
34230-100 = "se vocês acreditarem que há, nem que seja um único fio de luz no futuro de vocês――"
34230-101 = "então, salvando a Atsuko, salvem também a si mesmas."
34230-102 = "Pra mim já é tarde, mas…… pra vocês ainda resta tempo, não resta?"
34230-103 = "Além disso…… o Sensei tá ajudando, então, com certeza, vai dar tudo certo……."
34230-104 = "Que no caminho de vocês haja ventura――"
34230-106 = "que haja bênçãos――"
34230-111 = "……Ué?"
34230-116 = "Ahaha, não tava quebrado?"
34230-120 = "Esta é…… a canção que pede piedade."
34230-121 = "Não que eu goste desta canção, mas……"
34230-122 = "pois é, sim."
34230-137 = "Aha☆ Que pressa toda é essa?"
34230-138 = "Vocês não passam.#nAdiante fica o palco do protagonista, que trava a batalha da salvação."
34230-139 = "Pra vilãs como nós, não é permitido."
34230-140 = "Vamos, Sensei――salva aquelas meninas."
34230-144 = "Aqui, eu seguro."
34230-153 = "― [i]Kyrie[/i]"
34230-155 = "[i]Eleison[/i]"
34230-168 = "Próximo Episódio;Kyrie para as Garotas (2)"
