[translation]
34230-1 = "Episódio 23; Kyrie para as garotas (1)"
34230-12 = "Haa... haa..."
34230-13 = "Ugh... dói... estou tão cansada...#nAh, droga, estou cheia de ferimentos..."
34230-18 = "Mas... ainda estou bem."
34230-30 = "..."
34230-34 = "Este lugar é... a sala do coral?"
34230-38 = "Um órgão e... partituras..."
34230-42 = "Até um gramofone...#n...Entendi, é verdade, a Arius também deveria ter as mesmas aulas que nós."
34230-47 = "...Não funciona, né?#nBem, não parece ter sido usado por muito tempo, então não tem jeito."
34230-48 = "..."
34230-56 = "Haa..."
34230-57 = "Quando a Koharu-chan se colocou em perigo para me salvar... foi tão legal."
34230-58 = "A Koharu-chan parecia uma princesa de contos de fadas.#nO Sensei apareceu e a salvou... Eu também gosto desse tipo de história."
34230-59 = "Uma princesa em apuros sendo salva por sua alma gêmea — esse tipo de conto de fadas."
34230-60 = "Infantil, cheio de sonhos... maravilhoso, faz o coração palpitar..."
34230-61 = "...Eu também queria ser a protagonista de uma história assim."
34230-62 = "Mas eu sei — eu não tenho esse direito."
34230-63 = "Não existe lugar nenhum neste mundo onde uma \"bruxa\" tenha um final feliz."
34230-64 = "Saori... eu queria que você sentisse a dor que eu senti.#nEu achava que, se não fosse assim, seria injusto."
34230-65 = "Mas... é verdade..."
34230-66 = "Assim como eu, vocês também queriam ser salvas, não é?"
34230-67 = "Vocês também... queriam ser felizes, não é?"
34230-68 = "Eu entendo o motivo de você querer salvar a Atsuko..."
34230-69 = "Mesmo você, que enganou tantas pessoas e as levou ao desespero...#nSe, no final de tudo, você puder salvar alguém..."
34230-70 = "Sua vida cheia de sofrimento seria recompensada apenas por isso...#n...Foi isso que você pensou, não foi?"
34230-71 = "Eu entendo — eu e a Seia-chan somos iguais."
34230-76 = "Por isso... Esquadrão Arius."
34230-80 = "Eu vou rezar por vocês."
34230-81 = "Algum dia..."
34230-82 = "Algum dia, que a dor de vocês seja curada..."
34230-83 = "Assim como desejo pela chance de recomeçar..."
34230-84 = "Que vocês tenham um futuro... uma próxima oportunidade..."
34230-85 = "Por isso, eu..."
34230-86 = "— Eu perdoo vocês."
34230-87 = "Porque esse seria um final melhor do que ambos sermos infelizes de forma igual."
34230-97 = "— Mesmo que salvem a Atsuko, o futuro de vocês certamente será cheio de dificuldades."
34230-98 = "Talvez sejam perseguidas para sempre...#npode ser uma vida miserável onde não poderão andar sob a luz do dia."
34230-99 = "Mas, ainda assim..."
34230-100 = "Se vocês acreditam que, no futuro de vocês, existe pelo menos um raio de luz..."
34230-101 = "Ao salvar a Atsuko, vocês deveriam salvar a si mesmas também."
34230-102 = "Para mim já é tarde demais, mas... vocês ainda têm tempo, não têm?"
34230-103 = "Além disso... o Sensei está ajudando, então com certeza vai dar tudo certo..."
34230-104 = "Que a felicidade esteja no caminho de vocês..."
34230-106 = "Que a bênção esteja com vocês..."
34230-111 = "...Ué?"
34230-116 = "Ahaha, não estava quebrado?"
34230-120 = "Esta é... uma canção que pede por misericórdia."
34230-121 = "Não é que eu goste dessa música, mas..."
34230-122 = "É, isso mesmo."
34230-137 = "Ahaha☆ Por que está com tanta pressa?"
34230-138 = "Vocês não podem passar.#nO que está adiante é o palco do protagonista, onde a batalha pela salvação se desenrola."
34230-139 = "Isso não é permitido para vilões como nós."
34230-140 = "Vamos, Sensei — salve aquelas crianças."
34230-144 = "Eu vou segurar as pontas aqui."
34230-153 = "— [i]Kyrie[/i]"
34230-155 = "[i]Eleison[/i]"
34230-168 = "Próximo episódio: Kyrie para as garotas (2)"
