[translation]
10007010-1 = "Episódio 1: Ninguém me pediu permissão"
10007010-2 = "Academia Red Winter - Gabinete da Presidente"
10007010-4 = "Mnham, mnham..."
10007010-5 = "Castella... leite de morango, leite de banana..."
10007010-6 = "Hehe... tudo meu..."
10007010-9 = "[ns1] Sacudir os ombros gentilmente.\n[ns2] Cutucar as bochechas macias."
10007010-13 = "Hmm...?"
10007010-18 = "...Q-quem é?! Quem ousa interromper meu cochilo?!"
10007010-22 = "Ah, é você, camarada. Quanto tempo."
10007010-23 = "Mas que falta de educação, interromper meu precioso tempo de descanso!"
10007010-24 = "Pela autoridade deste bigode..."
10007010-28 = "Ué? Cadê meu bigode...?"
10007010-29 = "T-Tomoe! Traga logo meu bigode reserva!"
10007010-35 = "...Não aconteceu nada de estranho. Não é, Tomoe?"
10007010-36 = "Como desejar, Secretária-Geral."
10007010-37 = "D-de qualquer forma! Vir me visitar justamente no momento em que este corpo precisa de sono..."
10007010-38 = "O que há de errado com o seu senso de tempo, camarada?"
10007010-39 = "Presidente Cherino, a hora do cochilo acabou há uma hora..."
10007010-40 = "S-sério? Quando foi que isso..."
10007010-41 = "Isso... não é como se eu tivesse dormido demais nem nada disso..."
10007010-42 = "Ugh! A culpa de tudo isso é do terremoto!"
10007010-43 = "[s] \"Terremoto?\""
10007010-44 = "Sim. Tem havido terremotos frequentes em Red Winter, o que é bem raro."
10007010-45 = "Ontem à noite, no momento em que fui dormir, o prédio começou a balançar de repente...!"
10007010-46 = "Balançou tanto que fiquei preocupada se o prédio ia desabar e não consegui dormir..."
10007010-47 = "[s] \"Sinto muito, que bom que você está bem.\""
10007010-48 = "Sim, foi terrível. Se pudesse, eu expurgaria esse terremoto."
10007010-49 = "...Mas, camarada, por que veio a Red Winter de repente?"
10007010-50 = "[s3] \"Ouvi dizer que abriram uma nova fonte termal em Red Winter.\"\n[s4] \"Queria dar uma olhada.\""
10007010-51 = "...Fonte termal? Aqui na Academia Red Winter?"
10007010-52 = "...Fonte termal? Aqui na Academia Red Winter?"
10007010-53 = "Hahaha! Você diz cada coisa, camarada."
10007010-54 = "Na Academia Red Winter, temos neve e gelo, mas não fontes termais! Não está confundindo com a Academia Gehenna?"
10007010-55 = "Não é, Tomoe?"
10007010-56 = "Bem, na verdade... recentemente, uma fonte termal surgiu aqui na Academia Red Winter."
10007010-57 = "O-o quê? Uma fonte termal em Red Winter? Onde?"
10007010-58 = "Perto do antigo prédio escolar, onde ficam os alunos da classe especial."
10007010-59 = "Dizem que descobriram uma fonte natural e construíram um resort termal lá."
10007010-60 = "O quê...?! Como é que eu, a presidente do conselho estudantil da Academia Red Winter, não fui informada de algo tão importante?!"
10007010-61 = "Eu relatei na reunião regular da semana passada, mas a presidente parecia cansada e dormiu durante todo o tempo..."
10007010-62 = "Ugh, não quero ouvir isso! Se eu estava dormindo, deveria ter me reportado novamente quando eu acordasse!"
10007010-63 = "Além disso, construir novas instalações na Academia Red Winter sem a minha permissão é um absurdo!"
10007010-64 = "E logo no antigo prédio escolar... aquele lugar é para reflexão, eles não deveriam estar se divertindo lá..."
10007010-65 = "Isso não é um castigo!"
10007010-66 = "Todos que ignoram minhas ordens serão expurgados!"
10007010-67 = "Muito bem, vamos partir... mas antes, o meu tanque exclusivo, o \"Expurgador nº 1\", já está pronto?"
10007010-68 = "Sim. A pintura foi finalizada na semana passada, está tudo pronto."
10007010-69 = "Hehe, ótimo."
10007010-70 = "Já que estamos nisso, vou levar o \"Expurgador nº 1\" até o antigo prédio escolar. Preciso dar um susto naqueles alunos atrevidos da classe especial!"
10007010-71 = "[s] \"Expurgador nº 1...?\""
10007010-72 = "Sim. O 'Purificador nº 1' é um tanque exclusivo, feito especialmente apenas para mim."
10007010-73 = "Desenhei um bigode gigante na blindagem para que minha autoridade possa ser reconhecida mesmo de longe. Além disso, instalei uma pá enorme na frente para remover qualquer obstáculo que bloqueie o caminho da Secretaria..."
10007010-74 = "Com este 'Purificador nº 1', não importa o quão resistentes sejam as barricadas que o pessoal do Departamento de Obras construa, serei capaz de removê-las num piscar de olhos!"
10007010-75 = "Estava em produção há muito tempo, então veio a calhar. Não sei que tipo de resort de águas termais miserável aquele pessoal da classe especial construiu, mas vou purificá-los literalmente com este 'Purificador nº 1'!"
10007010-77 = "Muito bem, é hora da purificação!"
