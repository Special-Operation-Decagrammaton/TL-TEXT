[translation]
10007010-1 = "第1話;無許可でなんて聞いてない"
10007010-2 = "レッドウィンター連邦学園・会長執務室"
10007010-4 = "むにゃむにゃ……。"
10007010-5 = "カステラ……イチゴミルク、バナナミルク……。"
10007010-6 = "うへへ……ぜんぶおいらのもの……。"
10007010-9 = "[ns1] 肩を優しく揺する。\n[ns2] 柔らかそうなほっぺたを突いてみる。"
10007010-13 = "んんっ……？"
10007010-18 = "……だ、誰だっ！？おいらの昼寝を邪魔するのは！"
10007010-22 = "って何だ、カムラッドか。久しぶりだな。"
10007010-23 = "しかしおいらの大切な昼寝の時間を邪魔するとは、なんと無礼な！"
10007010-24 = "この髭の権威にかけて……"
10007010-28 = "あれ？おいらの髭が……！？"
10007010-29 = "と、トモエ！早く予備のお髭持ってきて！"
10007010-35 = "……何も変なことなど起きていない。そうだな、トモエ？"
10007010-36 = "仰る通りです、書記長。"
10007010-37 = "と、とにかく！この身が睡眠を必要としている、重要で大切な時間帯に訪れるとは……"
10007010-38 = "カムラッドの時間感覚は、いったいどうなっているんだ？"
10007010-39 = "チェリノ会長、お昼寝の時間はもう一時間前に終わっております……。"
10007010-40 = "そ、そうだったのか？いつの間に……。"
10007010-41 = "その……これはおいらが寝坊をしたとかそういうわけじゃなくて……。"
10007010-42 = "ううっ！それもこれも全部地震のせいだ！"
10007010-43 = "[s] \"地震？\""
10007010-44 = "うむ。レッドウィンターでは珍しく、地震が頻発していてな。"
10007010-45 = "昨夜も寝ようとした瞬間に、急に建物が揺れ始めて……！"
10007010-46 = "あまりにも揺れるものだから、建物が壊れるんじゃないかと心配で眠れなくって……。"
10007010-47 = "[s] \"それは大変だったね、無事で良かった。\""
10007010-48 = "うむ、とても大変だった。できることなら地震を粛清したいぐらいだ。"
10007010-49 = "……ところでカムラッドは、どうして突然レッドウィンターに？"
10007010-50 = "[s3] \"レッドウィンターに、新しく温泉ができたって聞いて。\"\n[s4] \"ちょっと見てみたいなって思って。\""
10007010-51 = "……温泉？このレッドウィンター連邦学園に？"
10007010-52 = "……温泉？このレッドウィンター連邦学園に？"
10007010-53 = "ははは！カムラッドは面白いことを言うな。"
10007010-54 = "レッドウィンター連邦学園には、雪と氷はあっても温泉は無い！ゲヘナ学園と間違えたんじゃないか？"
10007010-55 = "なあ、トモエ？"
10007010-56 = "あの、それが……実はこの前、レッドウィンター連邦学園にも温泉ができまして。"
10007010-57 = "なっ、なんだと？レッドウィンター連邦学園に温泉が？どこに？"
10007010-58 = "特別クラスの生徒たちがいる、旧校舎周辺です。"
10007010-59 = "急に源泉が発見されて、そこに温泉郷を建てたのだとか。"
10007010-60 = "なっ……！そんな重大なことを、どうしてレッドウィンター連邦学園の生徒会長であるこのおいらが知らされていないんだ！？"
10007010-61 = "先週の定例会議でご報告させていただきましたが、その時の会長はお疲れのようで、ずっと眠っていらしたので……。"
10007010-62 = "ううっ、そんな話は聞きたくない！おいらが寝ていたのだったら、起きてから再度報告をするべきだろう！"
10007010-63 = "そもそもこのレッドウィンター連邦学園において、おいらの許可も無しに新しい施設を作るだなんて言語道断！"
10007010-64 = "それもよりにもよって、旧校舎か……反省させるための場所なのに、それでは楽しめてしまうではないか……。"
10007010-65 = "これでは罰にならない！"
10007010-66 = "おいらの命令を無視するやつらは全員粛清だ！"
10007010-67 = "よし、では出発……の前にそういえば、おいら専用の戦車「粛清君1号」は完成したのか？"
10007010-68 = "はい。先週塗装作業を終えまして、無事に。"
10007010-69 = "ふふ、よし。"
10007010-70 = "せっかくだから「粛清君1号」を連れて、旧校舎へ向かうとしよう。生意気な特別クラスのやつらを、驚かせてやらねばな！"
10007010-71 = "[s] \"「粛清君1号」……？\""
10007010-72 = "うむ。「粛清君1号」はおいらのためだけに特別に作られた、専用の戦車だ。"
10007010-73 = "装甲には巨大なひげを描くことで、おいらの権威を遠くからでも見分けられるようにしてある。さらに正面には大きなシャベルを付けることで、事務局の行く手を阻む障害物を取り除くことができる……。"
10007010-74 = "この「粛清君1号」さえあれば、たとえ工務部のやつらがいくら堅固なバリケードを築こうとも、あっという間に撤去できるはず！"
10007010-75 = "ずっと製作中だったのだがちょうど良かった。特別クラスのやつらがどんな貧相な温泉郷を建設したのかは知らないが、この「粛清君1号」で文字通り粛清してやろう！"
10007010-77 = "さあ、粛清の時間だ！"
