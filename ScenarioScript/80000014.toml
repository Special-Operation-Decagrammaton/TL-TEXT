[translation]
80000014-1 = "意図してないプレゼント"
80000014-2 = "シャーレ・オフィス"
80000014-5 = "おはようございます、先生。"
80000014-6 = "シャーレに来るまでの電車が遅延してて……少し遅れてしまいました、すみません……。"
80000014-7 = "[s] \"ううん、5分くらい全然気にしないで。\""
80000014-8 = "そうだ、来るときに急いで買ったのですが……。"
80000014-13 = "チョコレートです、どうぞ召し上がってください。"
80000014-14 = "[s] \"これって……。\""
80000014-15 = "先生にはいつもお世話になっておりますので。"
80000014-16 = "それにこの前、最近はいくら寝ても疲れがとれないとおっしゃってましたよね？"
80000014-17 = "チョコレートに含まれるカフェインなどの成分は、疲労回復に効果があるそうなので。忙しい時などにどうぞ。"
80000014-18 = "今日は何故か駅前にチョコレートがたくさん売られてて、先生のことを思い出して買ったのですが……今思うとどうして……"
80000014-19 = "……え？バレンタイン……？"
80000014-20 = "あ、そういえば今日はバレンタインデー……では、今私がお渡ししたチョコレートはバレンタインチョコ……"
80000014-21 = "え、えっと、これは、だから、そういう気持ちでお渡ししたのではなくて……！"
80000014-22 = "いえ、先生にそんな気持ちがないと言うのは嘘になりますが……じゃなくて！"
80000014-23 = "これはその、無意識と言いますか……！"
80000014-24 = "も、もちろんそういう意味で受け取っていただいても問題は無いと言いますか、それはそれで嬉しいのですが……"
80000014-25 = "も、もし対策委員会のみんなにこの事実が知られたら……。"
80000014-26 = "きっと「へぇ～、アヤネちゃんはそうやっておとなしい感じでいて、朝から当番のタイミングを狙ったりする子だったんだ～。やるねぇ～？」みたいな視線で……"
80000014-27 = "も、もちろん先生が秘密にしてくださるのであれば……いや、話されてもそれはそれで……？"
80000014-29 = "（その後も慌てるアヤネを何とか落ち着かせながら、のんびりとチョコレートを食べた。）"
