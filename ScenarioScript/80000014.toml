[translation]
80000014-1 = "Presente não intencional"
80000014-2 = "Escritório do Schale"
80000014-5 = "Bom dia, Sensei."
80000014-6 = "O trem que eu peguei para vir ao Schale atrasou... acabei chegando um pouco tarde, me desculpe..."
80000014-7 = "[s] \"Não se preocupe, cinco minutos não são nada.\""
80000014-8 = "Ah, é verdade, eu comprei isso às pressas no caminho para cá..."
80000014-13 = "São chocolates, por favor, aceite."
80000014-14 = "[s] \"Isso é...\""
80000014-15 = "É que o senhor sempre cuida tão bem de mim, Sensei."
80000014-16 = "Além disso, da última vez, você disse que não estava conseguindo descansar direito, não importa o quanto dormisse, não é?"
80000014-17 = "Dizem que a cafeína e outros componentes do chocolate ajudam na recuperação da fadiga. Por favor, coma quando estiver ocupado."
80000014-18 = "Hoje, por algum motivo, estavam vendendo muitos chocolates na frente da estação, e eu lembrei do senhor e comprei... mas agora que penso nisso, por que será..."
80000014-19 = "...Hã? Dia dos Namorados...?"
80000014-20 = "Ah, agora que você mencionou, hoje é Dia dos Namorados... Então, o chocolate que eu acabei de te dar é um chocolate de Dia dos Namorados..."
80000014-21 = "E-espera, isso é, por isso, eu não te dei com essa intenção...!"
80000014-22 = "Não, dizer que não tenho sentimentos assim pelo Sensei seria mentira, mas... não é isso!"
80000014-23 = "Isso foi, como posso dizer, inconsciente...!"
80000014-24 = "C-claro, não teria problema se você aceitasse com esse significado, e na verdade eu ficaria feliz, mas..."
80000014-25 = "S-se o pessoal do Comitê de Contramedidas descobrisse isso..."
80000014-26 = "Com certeza elas me olhariam com aquele ar de: 'Heeeh~, então a Ayane-chan, com esse jeitinho quieto, é do tipo que aproveita o turno da manhã para agir, hein? Nada mal~'..."
80000014-27 = "C-claro, se o Sensei mantiver segredo... não, mas se você contar, isso também..."
80000014-29 = "(Depois disso, enquanto tentava acalmar a Ayane que estava em pânico, comi o chocolate calmamente.)"
