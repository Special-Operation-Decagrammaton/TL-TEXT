[translation]
1010506-1 = "踏み出す勇気"
1010506-2 = "（仕事を終えてから、トリニティの聖堂を訪れた）"
1010506-8 = "[ns1] \"マリー、お待たせ。\"\n[ns2] \"入っても良いのかな……？\""
1010506-11 = "……先生。"
1010506-12 = "お忙しいところ、ありがとうございます。"
1010506-13 = "急にアイドルの衣装でお迎えして……。"
1010506-14 = "……驚かせてしまったでしょうか？"
1010506-15 = "ですが……。"
1010506-16 = "ステージに立つ以上、この格好でいなくてはいけませんから。"
1010506-17 = "……あっ、心配なさらないでください。"
1010506-18 = "ほかの方は、いらっしゃいませんよ。"
1010506-19 = "ここにいるのは、私たちだけです。"
1010506-20 = "……先生。"
1010506-21 = "いつも気にかけてくださる優しさに、私は……。"
1010506-22 = "……よろしければ、受け取っていただけませんか？"
1010506-23 = "こうして、今の私があるのは……。"
1010506-24 = "先生のおかげですから。"
1010506-25 = "……私はただのシスターに過ぎません。"
1010506-26 = "なので、お返しといっても祈りを捧げるくらいしかできませんでした。"
1010506-27 = "……今までは。"
1010506-28 = "アイドルでいられる期間は、一時的なものだと分かっています。"
1010506-29 = "ですから、皆さんに協力していただいて、この場を設けたのです。"
1010506-30 = "私がアイドルとして歌を歌うことが、人のための行為になり得るのでしたら……"
1010506-31 = "それならば……。"
1010506-32 = "……お祈り以外のお返しが、先生にできると思いまして。"
1010506-33 = "[s3] \"それで、今日はステージを……。\"\n[s4] \"シークレットライブだね。\""
1010506-36 = "……ふふっ。"
1010506-37 = "はい、その通りです。"
1010506-38 = "この気持ちをどうやって伝えようか悩みましたが……。"
1010506-39 = "私なりに、精一杯の感謝を込めて歌を届けようと思います。"
1010506-40 = "お話はここまでにして……。"
1010506-41 = "先生のためだけに、歌わせてください。"
1010506-42 = "シスターのマリーではなく……。"
1010506-46 = "……アイドルのマリーとして。"
1010506-48 = "（その後、二人きりの聖堂でマリーのライブを楽しんだ）"
1010506-49 = "（独り占めするのがもったいないくらい、最高のステージだった）"
1010506-52 = "（ライブが終わってから、マリーを部屋まで送ることにした）"
1010506-53 = "わ、わざわざ送っていただく必要は……。"
1010506-54 = "先生も早く帰って、お休みになってください。"
1010506-55 = "私は大丈夫ですから。"
1010506-56 = "いつもの道ですし、心配いりませんよ。"
1010506-57 = "それに、そこまで気を遣っていただいては……。"
1010506-58 = "先生にとって、生徒を見送るのは当たり前かもしれませんが……。"
1010506-59 = "……あっ。"
1010506-60 = "そう、ですね……。"
1010506-64 = "……ふふっ。"
1010506-65 = "[s5] \"マリー？\"\n[s6] \"どうしたの？\""
1010506-68 = "ごめんなさい、つい···…。"
1010506-69 = "先生のお気持ちが、少し分かった気がします。"
1010506-70 = "私が先生のことを考えているように、#n先生は私のことを考えてくださっているんですよね。"
1010506-71 = "……うっかりしていました。"
1010506-72 = "……。"
1010506-73 = "……ですが、気づけて良かったです。"
1010506-74 = "今日は勇気を出して正解でした。"
1010506-75 = "先生には、いつも教わってばかりですね。"
1010506-76 = "アイドルとして過ごした時間は、とても貴重な思い出になりました。"
1010506-77 = "私なりに、最後までやりきれたと思います。"
1010506-78 = "明日からは、またシスターとして皆さんのお役に立てるよう頑張りますね。"
1010506-79 = "[s7] \"マリーはえらいね。\"\n[s8] \"お疲れ様、マリー。\""
1010506-82 = "ふふっ。"
1010506-83 = "あらためて……本当にありがとうございました、先生。"
1010506-84 = "それから……。"
1010506-85 = "……いつもの私も、お願いします。"
