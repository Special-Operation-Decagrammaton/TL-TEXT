1010506-65 = "[Mary? \"\n[s6] \"O que há de errado? \"\"\n[s6]\"\n[s7]\"What's wrong?\"\"\n1010506-68 = \"Desculpe-me, eu estava apenas...\"\n1010506-69 = \"Acho que entendo um pouco mais sobre como você se sente.\"\n1010506-70 = \"Sei que os Senseies do #n estão pensando em mim, assim como eu estou pensando neles.\"\n1010506-71 = \"...... inadvertidamente.\"\n1010506-72 = \".......\"\n1010506-73 = \"......, mas estou feliz por ter notado.\"\n1010506-74 = \"Você estava certo em ser corajoso hoje.\"\n1010506-75 = \"Seus Senseies estão sempre lhe ensinando.\"\n1010506-76 = \"O tempo passado como ídolo foi uma lembrança muito preciosa.\"\n1010506-77 = \"À minha maneira, acho que consegui chegar ao fim.\"\n1010506-78 = \"Amanhã, tentarei fazer o melhor possível para servi-los novamente como irmã.\"\n1010506-79 = \"[s7] \"Marie é uma boa garota. \"\n[s8] \"Bom trabalho, Marie. \"\n[s8] \"Bom trabalho, Marie.\""

