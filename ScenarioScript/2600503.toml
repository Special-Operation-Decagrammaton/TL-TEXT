[translation]
2600503-1 = "マカロンチャレンジ"
2600503-2 = "あ、来たね、先生。まずはここに呼んだ理由を話そうかと思ったけど、来る途中に看板を見たんじゃない？"
2600503-3 = "そう、このカフェで毎年開催される有名なイベント……。"
2600503-4 = "「マカロン大食いチャレンジ」！！！"
2600503-5 = "わざわざ説明は要らないわよね。文字通り、一番多くマカロンを食べたチームが勝ちっていうイベントよ。"
2600503-6 = "参加したチームは、みんなマカロンがタダで食べられるわ。リタイアとか、負けたりしない限りはね。"
2600503-7 = "え、リタイアしたら？それはもちろん、食べた分のマカロンの代金をきっちり払うのよ。つまり、最終的にタダで食べられるチームは一つだけ！"
2600503-8 = "毎年倒れて病院に運ばれる人が出るくらい、危険なイベントよ。"
2600503-9 = "だからこそ私たちはここに遊びに来たんじゃない、本気で戦うために来たの。分かった？"
2600503-10 = "え、ああ、もちろん私たちが負けたら、私が先生の分も含めてマカロン代を払うわ。"
2600503-11 = "でも大丈夫。私が支払うのは今日じゃない、何故なら私たちは負けないもの！"
2600503-12 = "先生は大人でしょう？大人なんだから、私たち学生よりずっと食べられるはず。私より身体大きいし！"
2600503-13 = "そういう問題じゃない？うるさいわね、何で始める前から弱音を吐いてるのよ。"
2600503-14 = "ほらっ、始まるわよ！とりあえずマカロンを掻き集めるわ！"
2600503-16 = "（そうして始まった、マカロン大食いチャレンジ）"
2600503-17 = "（しかしヨシミの期待とは裏腹に、7個目を食べているところでもう気持ち悪くなってきた）"
2600503-19 = "う、ううっ……そろそろ辛いかも……。ううん、まだ食べられるんだから……。"
2600503-20 = "先生？さっきから動きが止まってるわよ？"
2600503-21 = "[s1] \"もう無理……いっそ殺して、楽にして……。\"\n[s2] \"こんな戦い、最初から間違ってたんだ……。\""
2600503-22 = "な、なに言ってるの！？大人のくせにたったこれだけで！？"
2600503-23 = "（予想外……！でも、私ももうキツイかも……このままじゃ……！）"
2600503-24 = "頑張りなさいよ先生！まだやれるでしょ！せめて20個は食べてもらわないと！"
2600503-25 = "ここで諦められるわけないでしょ！？今までいくら分食べてると思ってるの！？"
2600503-26 = "ほら、横になって！！口だけ開けておきなさい！私が食べさせてあげるから！"
2600503-28 = "逃げるな！口開けてってば！ほら！"
2600503-29 = "[s]（必死に抵抗する）"
2600503-30 = "む、無駄なことを……！……ぬぬぬぬ……あっ――"
2600503-31 = "待っ、バランスっ……！あっ、うわあぁっ！？"
2600503-33 = "ドサッ、バタン！"
2600503-35 = "……うっ、いたたた……お尻から落ちた……。"
2600503-36 = "下に何か敷いてあって良かったわ……先生、大丈夫？"
2600503-37 = "……あれ？先生？どこに行ったのよ？"
2600503-38 = "[s] \"……。\""
2600503-39 = "……。"
2600503-40 = "……っ！！！"
2600503-41 = "な、な、ななな、なんでそこにいるの！変態！"
2600503-42 = "ど、どきなさいよ早く！ってどくのは私！？じゃなくてどっちでもいいからっ！！いつまでそこに、んぁっ……！"
2600503-43 = "……う、うあああっ！！もう知らない！バカ！！死ね、死んじゃえ！！！！！ああああああああっ！！！"
2600503-45 = "（その直後、錯乱したヨシミは信じられないスピードで、テーブルの上のマカロンを全部飲み込んで逃げていった）"
2600503-46 = "（そしてヨシミの記録を超えた人がいなかったため、私たちが食べたマカロンは全部タダになった）"
