[translation]
2600503-1 = "Desafio do Macaron"
2600503-2 = "Ah, você chegou, Sensei. Eu ia explicar o motivo de ter te chamado aqui, mas você viu a placa no caminho, não viu?"
2600503-3 = "Isso mesmo, aquele evento famoso que acontece todo ano neste café..."
2600503-4 = "O \"Desafio de Comer Macarons\"!!!"
2600503-5 = "Não preciso nem explicar, né? Literalmente, o time que comer mais macarons vence o evento."
2600503-6 = "Todos os times participantes podem comer macarons de graça. Isso, claro, se não desistirem ou perderem."
2600503-7 = "Ah, e se desistir? Bem, obviamente você terá que pagar o valor exato dos macarons que comeu. Ou seja, apenas um time vai conseguir comer de graça no final!"
2600503-8 = "É um evento tão perigoso que todo ano tem gente que desmaia e vai parar no hospital."
2600503-9 = "É por isso que não viemos aqui para brincar, viemos para lutar a sério. Entendeu?"
2600503-10 = "Ah, claro, se perdermos, eu pagarei a conta dos macarons, incluindo a sua parte, Sensei."
2600503-11 = "Mas não se preocupe. Eu não vou pagar hoje, porque nós não vamos perder!"
2600503-12 = "Você é um adulto, não é? Sendo adulto, deveria conseguir comer muito mais que nós, estudantes. Você é bem maior que eu!"
2600503-13 = "Não é esse o problema? Que chata, por que está reclamando antes mesmo de começar?"
2600503-14 = "Vamos, vai começar! Por enquanto, vamos juntar o máximo de macarons que pudermos!"
2600503-16 = "(E assim começou o Desafio de Comer Macarons)"
2600503-17 = "(Porém, ao contrário das expectativas de Yoshimi, ela já começou a se sentir mal ao comer o sétimo)"
2600503-19 = "U-ugh... acho que não aguento mais... Não, eu ainda consigo comer..."
2600503-20 = "Sensei? Você parou de se mexer faz um tempo, por quê?"
2600503-21 = "[s1] \"Não dá mais... prefiro morrer, acaba logo com isso...\"\n[s2] \"Essa batalha estava errada desde o começo...\""
2600503-22 = "O-o que você está dizendo!? Sendo um adulto, vai desistir por tão pouco!?"
2600503-23 = "(Inesperado...! Mas eu também estou no meu limite... se continuar assim...!)"
2600503-24 = "Se esforce, Sensei! Você ainda consegue! Pelo menos coma uns 20!"
2600503-25 = "Não podemos desistir aqui, né!? Já pensou no quanto a gente já comeu!?"
2600503-26 = "Anda, deite-se!! Só abra a boca! Eu vou te dar na boca!"
2600503-28 = "Não fuja! Eu disse para abrir a boca! Vamos!"
2600503-29 = "[s](Resiste desesperadamente)"
2600503-30 = "I-inútil...! ...Nnnnn... Ah—"
2600503-31 = "Espera, o equilíbrio...! Ah, uwaaa!?"
2600503-33 = "Ploft, baque!"
2600503-35 = "...Ugh, ai ai ai... caí de bumbum..."
2600503-36 = "Ainda bem que tinha algo forrado no chão... Sensei, você está bem?"
2600503-37 = "...Ué? Sensei? Onde você foi?"
2600503-38 = "[s] \"...\""
2600503-39 = "..."
2600503-40 = "...!!!"
2600503-41 = "P-p-p-por que você está aí!? Pervertido!"
2600503-42 = "S-saia logo daí! Quer dizer, eu que tenho que sair!? Não, tanto faz, saia logo!! Até quando você vai ficar aí, nnn...!"
2600503-43 = "...U-uaaaa!! Já chega! Idiota!! Morra, morra logo!!!!!! Aaaaaaaaah!!!"
2600503-45 = "(Logo depois, uma Yoshimi em pânico engoliu todos os macarons da mesa com uma velocidade inacreditável e fugiu)"
2600503-46 = "(E como ninguém superou o recorde de Yoshimi, todos os macarons que comemos saíram de graça)"
