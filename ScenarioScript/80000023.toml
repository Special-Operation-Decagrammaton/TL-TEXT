[translation]
80000023-1 = "Bombardeio Romântico"
80000023-2 = "Departamento de Engenharia - Oficina"
80000023-3 = "（Recebi uma mensagem da Hibiki e fui visitar o Departamento de Engenharia）"
80000023-4 = "Ah, bem-vindo, Sensei."
80000023-5 = "Obrigada por vir, mesmo eu tendo chamado de repente. Na verdade, eu queria te mostrar uma nova invenção."
80000023-6 = "Isto."
80000023-8 = "[s1] \"Isso é...\"\n[s2] \"...uma bala de canhão?\""
80000023-9 = "Sim. É do mesmo calibre de 60mm que eu uso normalmente."
80000023-10 = "Sim. É do mesmo calibre de 60mm que eu uso normalmente."
80000023-11 = "Mas, dentro dela, não tem pólvora."
80000023-12 = "Isso mesmo, tem chocolate."
80000023-13 = "[s] \"Entendi?\""
80000023-14 = "Sim. Sendo mais precisa, são grãos de cacau e vários outros ingredientes."
80000023-15 = "Quando essa bala é disparada, o calor e o impacto iniciam a torra e a moagem dos grãos de cacau. Com a rotação da bala, eles vão se misturando com os outros ingredientes..."
80000023-16 = "A ideia é que, no momento do impacto, ela crie um pântano de chocolate fresquinho. Originalmente, recebi esse pedido para um evento de Dia dos Namorados, mas..."
80000023-17 = "[s] \"Isso é impressionante...\""
80000023-18 = "Sim. Pensei que, já que íamos fazer, seria melhor em uma escala que todos pudessem aproveitar. Então, por conta própria, fiz algumas modificações para aumentar a potência."
80000023-19 = "Só que ainda tem um problema..."
80000023-20 = "Como acabei de desenvolver, ainda não testei a potência em um cenário real."
80000023-21 = "Então, posso disparar isso contra o Schale?"
80000023-22 = "Achei que, se as paredes do Schale ficassem cobertas de chocolate, todo mundo ia achar romântico e ficar feliz."
80000023-23 = "[s] \"Isso não é perigoso demais...!?\""
80000023-24 = "Hmm, entendi..."
80000023-25 = "É verdade, se eu errasse e acertasse você, Sensei, seria um ferimento grave, diferente de nós..."
80000023-26 = "Então, que tal a gente conversar e usar a fonte da praça da Trinity?"
80000023-27 = "Se chocolate começasse a jorrar da fonte de sempre, acho que o pessoal da Trinity ia adorar."
80000023-28 = "[s3] \"Isso também é perigoso...\"\n[s4] \"Isso não causaria um problema entre as escolas...?\""
80000023-29 = "Entendi... Que pena."
80000023-30 = "Entendi... Que pena."
80000023-31 = "Então, esse chocolate da bala de canhão é para você, Sensei."
80000023-36 = "Se de repente sentir vontade de comer chocolate, lembre-se de mim e desta bala de canhão."
80000023-37 = "Quanto ao sabor... bem, a potência eu garanto."
