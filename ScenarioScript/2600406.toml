[translation]
2600406-1 = "何度も何度も"
2600406-2 = "（図書館に着いた途端、シミコが珍しくロビーの方まで出てきていた）"
2600406-3 = "あ、先生！お待ちしておりました！"
2600406-4 = "え？"
2600406-5 = "あ、その、先生がいらっしゃると分かっていたので、ついここまで……。"
2600406-6 = "……め、珍しい、ですかね？ま、まあ確かにほとんど中で本を読んでるか、整理してるかですが……。"
2600406-7 = "ま、"
2600406-8 = "まあそういうイメージが付いてしまったということでしょうか。"
2600406-12 = "……ふふっ。"
2600406-14 = "私が本を好きなのは、本当のことです。"
2600406-15 = "ですが考え方によっては、本を読むだけなら図書館でなくても問題はありません。"
2600406-16 = "それでも私がこうして、司書として毎日のように図書館にいるのは……。"
2600406-17 = "まさに、こういう瞬間のためなんです。"
2600406-18 = "[s1] \"……？\"\n[s2] \"こういう瞬間？\""
2600406-19 = "はい。ですからこうして、その瞬間を迎えられて。それもまさかの先生からだなんて、心が躍ってしまいます。"
2600406-20 = "はい。ですからこうして、その瞬間を迎えられて。それもまさかの先生からだなんて、心が躍ってしまいます。"
2600406-21 = "司書として、必要な方にお望みの本を探す……これが私にとっては、醍醐味みたいなものなんです。"
2600406-22 = "先生がわざわざそう言ってくださったということは、きっと入手困難な本なのではとも思いますし。"
2600406-23 = "ネットでの検索などは、きっと既に済まされてますよね？"
2600406-24 = "[s3] \"うん、ご明察。\"\n[s4] \"検索に引っ掛からなくてね……。\""
2600406-25 = "ふふっ、やはりそうでしたか。"
2600406-26 = "ふふっ、やはりそうでしたか。"
2600406-27 = "大抵のものは電書化されてしまい、「図書館に来る」という行為そのものがもう、珍しくなってきてしまいましたが……。"
2600406-28 = "それでも、ネットで全てが代替できるわけでもありません。"
2600406-29 = "探すのに技術が必要なのはもちろん、時間や人数の問題でもし「それ」に誰も触れていなければ、アクセスはできませんから。"
2600406-30 = "紙の中にだけ眠っているものも、まだたくさんあるので……そういう時こそ図書館、そして司書の出番です！それを一緒に探し出してみせます！"
2600406-31 = "それに……。"
2600406-35 = "[ns5] \"……それに？\"\n[ns6] \"……シミコ？\""
2600406-36 = "……いえ、お気になさらず。さあ、早速探すとしましょうか！"
2600406-37 = "……いえ、お気になさらず。さあ、早速探すとしましょうか！"
2600406-38 = "きちんと分類も整頓もしているのですが、何せ蔵書量が凄いので。"
2600406-45 = "ところで、お探しの本の特徴などは……？"
2600406-46 = "なるほど……でしたら、まずはこちらへ！"
2600406-50 = "[ns] シミコについて行く。"
2600406-54 = "（シミコに連れられるような形で、どんどん図書館の奥へと入っていった）"
2600406-55 = "（もともと大きな図書館ということもあり、分類が判明してもかなりの棚の数が存在する）"
2600406-56 = "（そこからは一つひとつ探すしかないため、時間をかけて本棚を物色していき……）"
2600406-57 = "（結構な時間が経った頃……）"
2600406-61 = "（ついに、探していた本が見つかった）"
2600406-62 = "[s] 本の背表紙に手をかける。"
2600406-67 = "（……抜けない）"
2600406-68 = "……？"
2600406-69 = "[s] \"……？\""
2600406-72 = "[wa:1250]― [log=시미코]えっと……[wa:2300]ぐ、[wa:880]偶然ですね。[/log]"
2600406-73 = "[wa:1785]― [log=시미코]まさか[wa:650]ぴったり同じタイミングで……。[/log]"
2600406-76 = "― [log=시미코]先に見つけて、[/log]"
2600406-77 = "[wa:1170]― [log=시미코]先生に[wa:815]ご報告したかったのですが……。[/log]"
2600406-80 = "― [log=시미코]……[wa:300]いえ。[/log]"
2600406-81 = "[wa:800]― [log=시미코]先に手をかけたのは[wa:1250]私かもしれません……[wa:1890]よね？[/log]"
2600406-84 = "― [log=시미코]うーん、[wa:1925]どうしましょう。[/log]"
2600406-85 = "[wa:1955]― [log=시미코]どうしてもと仰るのなら、[wa:1690]譲っても良いのですが……。[/log]"
2600406-88 = "― [log=시미코]……[wa:400]なんて、[wa:1160]冗談です。[/log]"
2600406-91 = "― [log=시미코]貸し出し記録を付けて、[wa:1595]すぐお渡しします。[/log]"
2600406-92 = "[wa:2260]― [log=시미코]無事に見つかって[wa:720]何よりです。[/log]"
2600406-95 = "[wa:1050]― [log=시미코]どうでしたか？[wa:2000]図書館でのこういった時間も……[/log]"
2600406-96 = "[wa:2730]― [log=시미코]何だか[wa:800]楽しくありません？[/log]"
2600406-99 = "― [log=시미코]他では[wa:525]味わえない良さと[wa:920]言いますか、[/log]"
2600406-100 = "[wa:2020]― [log=시미코]この場所ならではと[wa:890]言いますか……。[/log]"
2600406-103 = "[wa:400]― [log=시미코]……[wa:500]ですので、[wa:1290]ぜひこれからも。[/log]"
2600406-104 = "[wa:2450]― [log=시미코]お好きなタイミングで[wa:900]ここに来てください。[/log]"
2600406-107 = "― [log=시미코]……[wa:500]私、[wa:1150]待ってますから！[/log]"
2600406-110 = "（その後もシミコと一緒に他の本を見て回りつつ、感謝を伝えた後、借りた本を持ってシャーレへと戻った）"
