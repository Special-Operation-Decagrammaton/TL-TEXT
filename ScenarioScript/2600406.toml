[translation]
2600406-1 = "Várias e várias vezes"
2600406-2 = "（Assim que cheguei à biblioteca, Shimiko, de forma incomum, veio até o saguão）"
2600406-3 = "Ah, Sensei! Eu estava esperando por você!"
2600406-4 = "Hã?"
2600406-5 = "Ah, bem, eu sabia que o Sensei viria, então acabei vindo até aqui..."
2600406-6 = "......É, incomum, não é? B-bem, é verdade que eu quase sempre fico lá dentro lendo ou organizando os livros, mas..."
2600406-7 = "B-bem,"
2600406-8 = "será que essa imagem acabou ficando associada a mim?"
2600406-12 = "......Fufu."
2600406-14 = "É verdade que eu amo livros."
2600406-15 = "Mas, dependendo do ponto de vista, não há problema em ler livros fora da biblioteca."
2600406-16 = "Ainda assim, o motivo de eu estar aqui todos os dias como bibliotecária é..."
2600406-17 = "exatamente por momentos como este."
2600406-18 = "[s1] \"......?\"\n[s2] \"Momentos como este?\""
2600406-19 = "Sim. Por isso, poder vivenciar esse momento... e ainda por cima vindo do Sensei, meu coração dispara."
2600406-20 = "Sim. Por isso, poder vivenciar esse momento... e ainda por cima vindo do Sensei, meu coração dispara."
2600406-21 = "Como bibliotecária, encontrar o livro desejado para quem precisa... isso é o que há de melhor para mim."
2600406-22 = "Como o Sensei fez questão de vir pessoalmente, imagino que seja um livro difícil de encontrar."
2600406-23 = "Você já deve ter tentado pesquisar na internet, não é?"
2600406-24 = "[s3] \"Sim, você acertou.\"\n[s4] \"Não apareceu em nenhuma busca...\""
2600406-25 = "Fufu, eu imaginei que fosse isso."
2600406-26 = "Fufu, eu imaginei que fosse isso."
2600406-27 = "A maioria das coisas já foi digitalizada, e o ato de \"vir à biblioteca\" tornou-se algo raro, mas..."
2600406-28 = "ainda assim, a internet não consegue substituir tudo."
2600406-29 = "Além de ser necessária uma técnica para encontrar, se ninguém tiver tocado naquele assunto, seja por tempo ou falta de pessoas, não há como acessar."
2600406-30 = "Ainda existem muitas coisas que dormem apenas no papel... e é nessas horas que a biblioteca e a bibliotecária entram em ação! Vamos encontrar isso juntos!"
2600406-31 = "Além disso..."
2600406-35 = "[ns5] \"......Além disso?\"\n[ns6] \"......Shimiko?\""
2600406-36 = "......Não, não se preocupe. Vamos, vamos começar a procurar!"
2600406-37 = "......Não, não se preocupe. Vamos, vamos começar a procurar!"
2600406-38 = "Eu mantenho tudo classificado e organizado, mas o acervo é imenso, afinal."
2600406-45 = "A propósito, quais são as características do livro que você procura...?"
2600406-46 = "Entendo... nesse caso, venha por aqui primeiro!"
2600406-50 = "[ns] Seguir a Shimiko."
2600406-54 = "（Sendo guiado pela Shimiko, entramos cada vez mais fundo na biblioteca）"
2600406-55 = "（Como é uma biblioteca grande, mesmo sabendo a classificação, existem inúmeras estantes）"
2600406-56 = "（Como não há outra forma a não ser procurar uma por uma, passamos um bom tempo vasculhando as estantes...）"
2600406-57 = "（Depois de um bom tempo...）"
2600406-61 = "（Finalmente, o livro procurado foi encontrado）"
2600406-62 = "[s] Colocar a mão na lombada do livro."
2600406-67 = "（......Não sai）"
2600406-68 = "......?"
2600406-69 = "[s] \"......?\""
2600406-72 = "[wa:1250]― [log=시미코]Bem...[wa:2300] q-que[wa:880] coincidência.[/log]"
2600406-73 = "[wa:1785]― [log=시미코]Quem diria que[wa:650] seria exatamente no mesmo momento...[/log]"
2600406-76 = "― [log=시미코]Eu queria ter encontrado antes,[/log]"
2600406-77 = "[wa:1170]― [log=시미코]e ter[wa:815] avisado o Sensei...[/log]"
2600406-80 = "― [log=시미코]......[wa:300]Não.[/log]"
2600406-81 = "[wa:800]― [log=시미코]Talvez tenha sido eu[wa:1250] quem tocou primeiro...[wa:1890] não é?[/log]"
2600406-84 = "― [log=시미코]Hmm,[wa:1925] o que faremos?[/log]"
2600406-85 = "[wa:1955]― [log=시미코]Se você insiste tanto, [wa:1690]eu posso ceder, mas...[/log]"
2600406-88 = "― [log=시미코]……[wa:400]estou [wa:1160]brincando.[/log]"
2600406-91 = "― [log=시미코]Vou registrar o empréstimo e [wa:1595]te entrego agora mesmo.[/log]"
2600406-92 = "[wa:2260]― [log=시미코]Fico feliz que tenha [wa:720]encontrado.[/log]"
2600406-95 = "[wa:1050]― [log=시미코]Como foi? [wa:2000]Passar um tempo assim na biblioteca...[/log]"
2600406-96 = "[wa:2730]― [log=시미코]Não é de certa forma [wa:800]divertido?[/log]"
2600406-99 = "― [log=시미코]É um charme que não se encontra [wa:525]em outros lugares, [wa:920]ou talvez,[/log]"
2600406-100 = "[wa:2020]― [log=시미코]algo único deste lugar, [wa:890]eu diria...[/log]"
2600406-103 = "[wa:400]― [log=시미코]……[wa:500]por isso, [wa:1290]espero que continue vindo.[/log]"
2600406-104 = "[wa:2450]― [log=시미코]Sinta-se à vontade para [wa:900]vir aqui quando quiser.[/log]"
2600406-107 = "― [log=시미코]……[wa:500]eu [wa:1150]estarei esperando![/log]"
2600406-110 = "(Depois disso, continuei olhando outros livros com a Shimiko e, após agradecer, voltei para o Schale com o livro emprestado)"
