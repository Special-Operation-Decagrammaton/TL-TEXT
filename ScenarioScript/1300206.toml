[translation]
1300206-1 = "O orgulho de uma gourmet"
1300206-2 = "Restaurante chinês nos arredores da Academia Gehenna"
1300206-3 = "Após terminar o trabalho na Academia Gehenna, parei em um restaurante chinês no caminho de volta e encontrei Akari por acaso."
1300206-4 = "Ah, Sensei. Que coincidência, veio almoçar?"
1300206-5 = "Sim, eu também. Este restaurante tem um desafio de comilança onde você pode comer bastante Mapo Tofu."
1300206-6 = "Se não se importar, Sensei, gostaria de aceitar o desafio comigo?"
1300206-7 = "Ah, um Mapo Tofu normal já é o suficiente... é?#nMas esse prato super servido de Mapo Tofu é uma obra-prima..."
1300206-8 = "Bem, não tem jeito. Então, vamos pedir."
1300206-9 = "Um Mapo Tofu normal e um do menu de desafio, por favor."
1300206-10 = "Com certeza. O prato do desafio, posso entregar para esta pessoa aqui?"
1300206-11 = "Não, é para mim.#nPode não parecer, mas tenho confiança na minha capacidade de comer muito!"
1300206-12 = "Fufu, entendo, que entusiasmo. Mas saiba que o nosso Mapo Tofu não é para qualquer um..."
1300206-13 = "Espere um momento, trarei em breve."
1300206-15 = "(Aquele atendente deu um sorriso meio sinistro... será que foi impressão minha?)"
1300206-17 = "Desculpe a demora. Aqui está o Mapo Tofu do pedido e o do menu de desafio."
1300206-18 = "Se conseguir comer esses 10 pratos de Mapo Tofu em 30 minutos, a conta sai de graça. Dentro do tempo limite, pode pedir quantas repetições quiser."
1300206-19 = "...Então, bom apetite."
1300206-20 = "Ah, esse cheiro apimentado é tão bom...#nParece delicioso!"
1300206-21 = "Então, vamos comer!"
1300206-22 = "[s] \"Vamos comer.\""
1300206-24 = "...Hm? Que estranho... o Mapo Tofu daqui não tinha esse gosto..."
1300206-25 = "Sensei. Posso provar um pouco do seu Mapo Tofu?"
1300206-26 = "[s] Dividi o meu Mapo Tofu com ela."
1300206-27 = "Mastigando... Entendo... Então é isso.#nFico um pouco decepcionada que ainda existam lugares que usam métodos tão covardes."
1300206-28 = "[s] \"O que houve?\""
1300206-29 = "Comparei o sabor do seu com o meu, e este do desafio é claramente mais apimentado. Tem uma quantidade anormal de tempero. Provavelmente para garantir que ninguém vença o desafio."
1300206-30 = "As pessoas esquecem porque eu como de tudo, mas também sou membro do Clube de Pesquisa Gourmet. Posso até gostar de pratos doces, mas não sou nada 'doce' com a culinária."
1300206-31 = "Não importa se é um desafio de comilança, existe uma linha que quem trabalha com comida deve respeitar. E essa atitude... cruzou essa linha."
1300206-32 = "Quem brinca com comida deve arcar com as consequências... não acha?"
1300206-34 = "...Estava delicioso!#nPode me trazer mais uma porção deste Mapo Tofu?"
1300206-35 = "(I-Inacreditável! Não faz nem 10 minutos que ela começou e já terminou?)"
1300206-36 = "(E olha que aquele prato equivale a 10 porções normais!?)"
1300206-37 = "Com licença, pode vir aqui?#nPor favor, me traga mais um Mapo Tofu do menu de desafio!"
1300206-38 = "A-ah, cliente... você já completou o desafio, que tal parar por aqui...?"
1300206-39 = "O que está dizendo? Você mesmo disse no começo que 'dentro do tempo limite, pode pedir quantas repetições quiser', não foi?"
1300206-40 = "Já que é um desafio, não é justo que ambos sigamos as regras estabelecidas desde o início?"
1300206-41 = "Mesmo com o desafio contendo uma quantidade absurda de tempero que ninguém conseguiria comer normalmente, eu comi sem reclamar... não concorda?"
1300206-42 = "D-desculpe! Não precisa pagar a conta de vocês, então... por favor, por favor, me perdoe...!"
1300206-43 = "Não. Eu vim a este restaurante porque queria comer muito Mapo Tofu, não porque queria ouvir pedidos de desculpas."
1300206-45 = "Vamos, traga logo outro prato!"
1300206-47 = "Depois disso, Akari quebrou o recorde do restaurante por uma margem enorme, devorando 60 porções de Mapo Tofu em 30 minutos..."
