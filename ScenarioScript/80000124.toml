[translation]
80000124-1 = "Armadilha agridoce"
80000124-2 = "（Enquanto caminhava pelos corredores da Trinity durante o trabalho...）"
80000124-6 = "[ns1] \"……Seia?\"\n[ns2] Verifico a mensagem."
80000124-9 = "Ouvi dizer que você veio à Trinity."
80000124-10 = "Não me avisar de nada... que falta de consideração, não acha?"
80000124-11 = "Ah, sim. #n... Estou no meu quarto agora."
80000124-12 = "O resto... depende de você, Sensei."
80000124-17 = "――Estou ciente de que seu trabalho de hoje terminou agora há pouco."
80000124-18 = "Você sabe o que precisa fazer, não sabe?"
80000124-23 = "[ns3] \"I-isso é assustador...\"\n[ns4] Fui direto para o quarto da Seia."
80000124-27 = "……Bem-vindo."
80000124-28 = "Há um motivo para eu ter feito você vir até aqui, justamente hoje."
80000124-29 = "Ora, não vai demorar muito, eu garanto."
80000124-34 = "Preparei isto para você, Sensei."
80000124-35 = "Já que você está bem aqui na minha frente――"
80000124-36 = "Poderia provar um pouco? #nQuero ver a sua reação."
80000124-40 = "[ns5] \"O que é este papel...?\"\n[ns6] \"Tem um campo para assinatura...\""
80000124-43 = "……Ah."
80000124-44 = "Isso é do momento da compra."
80000124-45 = "Já que estamos aqui, poderia assinar como prova de que recebeu?"
80000124-46 = "Fique tranquilo. O pagamento já foi feito."
80000124-51 = "[ns7] \"Espere... este recibo...\"\n[ns8] \"Não tem o nome do produto escrito?\""
80000124-54 = "……Parece que demorou um pouco para perceber."
80000124-55 = "Sinto muito. Não é algo que eu comprei."
80000124-56 = "Exatamente―― tudo não passa de uma ilusão criada por mim."
80000124-57 = "Neste recibo em branco, você, Sensei, colocou sua assinatura."
80000124-58 = "Ou seja, agora posso exigir qualquer coisa de você."
80000124-59 = "……Fufu, você está com uma cara de quem não entende o que isso significa."
80000124-60 = "Embora você provavelmente já tenha percebido――"
80000124-61 = "Neste quarto, minhas palavras são a lei."
80000124-62 = "Você caiu direto na armadilha, Sensei."
80000124-66 = "Bem. Aceitarei sua assinatura com gratidão."
80000124-67 = "Afinal, já entreguei o chocolate."
80000124-68 = "……Ah."
80000124-69 = "Dizer que \"não demoraria muito\" também foi uma ficção."
80000124-70 = "Então, Sensei..."
80000124-75 = "Poderia saborear até a última mordida bem aqui na minha frente...?"
80000124-77 = "（Depois disso, Seia observou enquanto eu devorava a \"armadilha\", parecendo um tanto satisfeita...）"
80000124-78 = "（Ela se despediu dizendo: \"Você não vai ser mesquinho a ponto de se vingar, vai?\"）"
