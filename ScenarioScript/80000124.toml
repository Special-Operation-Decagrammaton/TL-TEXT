[translation]
80000124-1 = "甘く苦い罠"
80000124-2 = "（仕事で訪れたトリニティの廊下を歩いていると……）"
80000124-6 = "[ns1] \"……セイア？\"\n[ns2] メッセージを確認する。"
80000124-9 = "トリニティに来ているそうだね。"
80000124-10 = "なんの連絡もよこさないとは、水くさいじゃないか。"
80000124-11 = "ああ、そうだ。#n……私は今、部屋にいてね。"
80000124-12 = "あとは……先生次第というわけだよ。"
80000124-17 = "――今日の業務が、先ほど終了したことは把握している。"
80000124-18 = "取るべき行動は――分かっているだろうね？"
80000124-23 = "[ns3] \"こ、怖い……。\"\n[ns4] そのまま、セイアの部屋に向かった。"
80000124-27 = "……ようこそ。"
80000124-28 = "今日という日に、こうしてわざわざ呼び寄せたのには理由がある。"
80000124-29 = "なに、そう時間はかからないとも。"
80000124-34 = "先生にこちらを用意した。"
80000124-35 = "せっかく目の前にいるのだから――"
80000124-36 = "少し、味見をしてみてくれないか？#n反応を覚えていたくてね。"
80000124-40 = "[ns5] \"この紙は……？\"\n[ns6] \"署名欄があるけど……。\""
80000124-43 = "……ああ。"
80000124-44 = "それは購入したときのものだね。"
80000124-45 = "せっかくだから、受け取った証としてサインをしてもらっていいかな？"
80000124-46 = "安心してくれ。既に支払いは済ませている。"
80000124-51 = "[ns7] \"あれ……この伝票……。\"\n[ns8] \"品名が書いてないよ？\""
80000124-54 = "……気が付くのが少し遅かったようだね。"
80000124-55 = "済まない。購入したわけではないのだよ。"
80000124-56 = "そう――すべては私の手によって生み出された虚像。"
80000124-57 = "この白紙の伝票に、先生はサインをした。"
80000124-58 = "つまり、私は先生にどんなことでも要求できるわけだ。"
80000124-59 = "……ふふ、どういうことか分からないという顔をしているね。"
80000124-60 = "既に気付いているだろうけれど――"
80000124-61 = "この部屋において、私の言葉は法と同じ。"
80000124-62 = "先生は、みすみすトラバサミに手を入れてしまったのだよ。"
80000124-66 = "さて。先生のサインはありがたく頂戴するとしよう。"
80000124-67 = "チョコレートも渡せたことだからね。"
80000124-68 = "……ああ。"
80000124-69 = "「そう時間はかからない」と言ったのも虚構だよ。"
80000124-70 = "それでは先生……"
80000124-75 = "最後の一口まで、私の目の前で味わっていってくれるかな……？"
80000124-77 = "（その後セイアは、「罠」を平らげる姿をどこか満足そうに見届け……）"
80000124-78 = "（「仕返しなんて大人気ないことはしないだろう？」と言いながら、見送ってくれた）"
