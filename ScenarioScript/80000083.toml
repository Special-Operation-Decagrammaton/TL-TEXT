[translation]
80000083-1 = "Uma gerente intermediária sem brechas"
80000083-2 = "Loja de Departamentos de Gehenna"
80000083-4 = "(No dia dos namorados, recebi um contato da Iroha)"
80000083-5 = "(Ela disse que precisava de ajuda com um trabalho do Pandemônio, então fui até o local combinado, mas...)"
80000083-6 = "[ns1] \"...Por que estamos em uma loja de departamentos?\"\n[ns2] \"Não era para ajudar com o trabalho do Pandemônio?\""
80000083-7 = "Não há nada de estranho nisso. Para nós, do Pandemônio, o \"Dia dos Namorados\" é como um evento anual de rotina..."
80000083-8 = "Não há nada de estranho nisso. Para nós, do Pandemônio, o \"Dia dos Namorados\" é como um evento anual de rotina..."
80000083-9 = "Bem, resumindo, é o dia de dar presentes do Pandemônio para várias pessoas e clubes. #nEssa tarefa também está sob minha responsabilidade."
80000083-10 = "Como você pode ver pelo que acabei de dizer, não acha que é um trabalho com cara de gerência intermediária?"
80000083-11 = "[s] \"Entendi... Como sempre, deve ser difícil.\""
80000083-12 = "Bem, se fosse apenas preparar os presentes, tudo bem."
80000083-13 = "Receber ordens para isso também é... algo que consigo aceitar, por pouco. Afinal, sou uma gerente intermediária."
80000083-14 = "Só que..."
80000083-15 = "[s] \"...Só que?\""
80000083-16 = "O conteúdo das ordens da Presidente Makoto é algo como: \"Encontre chocolates tão amargos que façam o pessoal do Comitê de Disciplina chorar!\""
80000083-17 = "Ou \"Também quero chocolates que explodam ao morder!\", coisas desse tipo..."
80000083-18 = "...Não parece um pouco ridículo?"
80000083-19 = "Digo, esse tipo de ordem... ela não acha que é estúpido quando diz essas coisas?"
80000083-20 = "[s] \"Você pode dizer isso, considerando sua posição...?\""
80000083-21 = "Bem, eu digo isso para ela o tempo todo."
80000083-22 = "Além disso, ela me pede para repor mantimentos pessoais, buscar chocolates em formato de busto feitos por fornecedores de Red Winter..."
80000083-23 = "Nossa, o que será que estou fazendo no Dia dos Namorados..."
80000083-24 = "[s3] \"As angústias de uma gerente intermediária...\"\n[s4] \"I-Iroha, você também passa por maus bocados...\""
80000083-25 = "Bem, a conversa se estendeu, mas... de qualquer forma, foi por isso que chamei você, Sensei."
80000083-26 = "Bem, a conversa se estendeu, mas... de qualquer forma, foi por isso que chamei você, Sensei."
80000083-27 = "[s] \"Entendi a situação, mas será que minha opinião vai ajudar em algo...?\""
80000083-28 = "É claro que sim, precisamos escolher chocolates que façam o pessoal do Comitê de Disciplina chorar."
80000083-29 = "[s] \"E que tipo de opinião você quer que eu dê para isso!?\""
80000083-30 = "Não, não, o que eu preciso é de você, Sensei."
80000083-31 = "Se eu disser que foi o Sensei quem escolheu, com certeza eles não vão reclamar, certo?"
80000083-32 = "Então, com a sua ajuda, devo conseguir superar essas exigências absurdas."
80000083-33 = "[s] \"V-você é uma estrategista...\""
80000083-34 = "Bem, é por isso que..."
80000083-38 = "Como alguém que também sofre muito, você vai me acompanhar, não vai? Sensei?"
80000083-39 = "[s] \"Bem, se for algo estranho demais, posso ter problemas depois... Então, fico feliz em acompanhar.\""
80000083-44 = "(Assim, as compras com a Iroha terminaram...)"
80000083-46 = "Sim, conseguimos comprar tudo o que era necessário."
80000083-47 = "Ainda assim, quem diria que o Sensei escolheria aquilo... Fufu. Uma bola curva e tanto... com tantas travessuras misturadas que até eu fiquei surpresa."
80000083-48 = "Será que o pessoal do Comitê de Disciplina vai ficar bem...?"
80000083-49 = "[s5] \"Por que você está falando como se eu tivesse escolhido algo estranho!?\"\n[s6] \"Ficar bem? Aquilo é algo normal, não é!?\""
80000083-50 = "Bem, na verdade, foi uma escolha sensata e nada interessante. É bem a sua cara, Sensei."
80000083-51 = "Bem, na verdade, foi uma escolha sensata e nada interessante. É bem a sua cara, Sensei."
80000083-52 = "...Eu sabia que você faria isso, Sensei."
80000083-53 = "[s] \"Faria isso...?\""
80000083-54 = "Não, não é nada. Graças a você, terminamos sem problemas."
80000083-55 = "Obrigada por vir em um dia como hoje, Sensei."
80000083-56 = "Então, vamos voltar?"
80000083-57 = "[s7] \"Sim, vamos.\"\n[s8] \"Falando nisso, Iroha, hoje é...\""
80000083-58 = "...Sério?"
80000083-59 = "[s9] \"...Eh?\""
80000083-60 = "Estou perguntando se você tem certeza disso."
80000083-61 = "Você me chamou para sair no Dia dos Namorados, não foi?#n...Você tem certeza de que está tudo bem?"
80000083-62 = "[s10] \"Isso é, bem...\""
80000083-63 = "...Bem, desta vez vou deixar passar.#nNão seria legal da minha parte te provocar demais em um dia tão especial como o Dia dos Namorados."
80000083-64 = "...Fufu. Aconteceu alguma coisa, Sensei?"
80000083-65 = "Hoje... hoje é o Dia dos Namorados, não é?#nE então? Tem algo que está te incomodando?"
80000083-66 = "[s11] \"Incomodando, não é bem a palavra... b-bem, vamos voltar logo?\""
80000083-67 = "Que trapaça, você vai fugir depois de ter chegado até aqui?"
80000083-68 = "Eu te guiei tão bem até aqui, você não está sendo nada honesto, sabia?#nPor que está agindo com tanta timidez comigo?"
80000083-69 = "[s12] \"Não, é que...\""
80000083-70 = "...Bem, vou parar com as brincadeiras por aqui.#nAcho que já está na hora de atender às suas expectativas, não é?"
80000083-71 = "Aqui, pegue."
80000083-76 = "[ns] \"Isso é...\""
80000083-77 = "Sim, é feito à mão. Vamos, Sensei, pegue."
80000083-82 = "[ns] \"O-obrigado...\""
80000083-84 = "[ns] \"...I-Iroha-san? Por que você está segurando na boca e fechando os olhos...?\""
80000083-85 = "......"
80000083-90 = "Essa é a minha fala, sabia? Por que você não come logo?"
80000083-91 = "[s] \"Não, não, não, não!\""
80000083-92 = "...Então você não quer aceitar o meu presente?"
80000083-93 = "Eu preparei isso especialmente para você, e você não vai aceitar meus sentimentos?"
80000083-94 = "[s] \"Não, eu quero muito aceitar, mas isso é pedir demais...!\""
80000083-95 = "............"
80000083-96 = "...Pfft."
80000083-97 = "[s] \"...?\""
80000083-98 = "Fufu... É brincadeira, eu passei dos limites. Aqui, pegue."
80000083-102 = "Certifique-se de saborear com calma quando voltar para o Schale."
80000083-103 = "[s] \"Ah, sim. Obrigado.\""
80000083-104 = "Bem, então vamos voltar de verdade agora."
80000083-111 = "Ah, eu também coloquei aquele que eu estava segurando na boca junto com os outros."
80000083-112 = "Depois que experimentar, me mande uma mensagem no MomoTalk dizendo qual deles você acha que era."
80000083-113 = "Até mais."
80000083-117 = "[ns] \"...Sério mesmo!?\""
80000083-119 = "(O chocolate da Iroha era tão delicioso que parecia penetrar em todo o meu corpo, que estava exausto de tanto ser provocado)"
