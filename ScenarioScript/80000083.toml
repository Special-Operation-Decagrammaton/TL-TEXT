[translation]
80000083-1 = "隙のない中間管理者"
80000083-2 = "ゲヘナ・デパート"
80000083-4 = "（バレンタインデー当日、イロハから連絡をもらった）"
80000083-5 = "（なにやら万魔殿の仕事で手伝いをしてほしいとのことで、約束した場所へと向かったのだが……）"
80000083-6 = "[ns1] \"……どうしてデパートに？\"\n[ns2] \"万魔殿の仕事の手伝い……じゃなかったっけ？\""
80000083-7 = "何もおかしくありませんよ。私たち万魔殿にとっての「バレンタインデー」は、一種の恒例行事のようなものでして……"
80000083-8 = "何もおかしくありませんよ。私たち万魔殿にとっての「バレンタインデー」は、一種の恒例行事のようなものでして……"
80000083-9 = "まあつまるところ、色んな人やら部活やらに、万魔殿からのプレゼントを贈る日ですね。#nその業務についても、私の担当でして。"
80000083-10 = "ここまで聞いて分かる通り、いかにも中間管理職っぽい仕事だと思いません？"
80000083-11 = "[s] \"そっか……相変わらず大変だね。\""
80000083-12 = "まあ、プレゼントを用意するだけなら別に良いんですよ。"
80000083-13 = "それを指示されるのもまあ……辛うじて納得できないわけでもありません。中間管理職ですし。"
80000083-14 = "ただ……"
80000083-15 = "[s] \"……ただ？"
80000083-16 = "マコト議長の指示の中身が、「風紀委員会の連中が泣くほど辛いチョコレートを探せ！」とか"
80000083-17 = "「嚙んだら爆発するチョコレートもだ！」とか、そういうのでして……"
80000083-18 = "……何だかこう、バカバカしくなってきません？"
80000083-19 = "というかこういう命令……自分で言ってて、バカっぽいと思わないんですかね？"
80000083-20 = "[s] \"それ、立場的に言っちゃって良いの……？\""
80000083-21 = "いやまあ、普段から本人に言ってますし。"
80000083-22 = "その上、ついでにプライベートの食料を補充しろだの、レッドウィンターの業者に作らせた胸像チョコを受け取ってこいだの……"
80000083-23 = "全く、バレンタインデーの日に私は何をしてるんだか……。"
80000083-24 = "[s3] \"中間管理職の苦悩……。\"\n[s4] \"い、イロハも大変なんだね……。\""
80000083-25 = "まあ、話が長くなりましたが……とにかく、そんなこんなで先生をお呼びしたわけです。"
80000083-26 = "まあ、話が長くなりましたが……とにかく、そんなこんなで先生をお呼びしたわけです。"
80000083-27 = "[s] \"状況は理解できたけど、私の意見で助けになるかな……？\""
80000083-28 = "それは勿論、風紀委員会の面々が泣くようなチョコを選ばないとですし。"
80000083-29 = "[s] \"そのためにどんな意見を出せと！？\""
80000083-30 = "いえいえ、必要なのは意見よりも先生自身ですよ。"
80000083-31 = "先生が選んだと言えば、きっと何の文句も言わないでしょう？"
80000083-32 = "なので先生の助けがあれば、あの無理難題も上手いこと乗り切れるはずです。"
80000083-33 = "[s] \"け、計略家だ……。\""
80000083-34 = "まあ、そういうことなので……。"
80000083-38 = "苦労が多い者同士、付き合ってくれますよね。先生？"
80000083-39 = "[s] \"まあ、あまりにも変なものだと後で困るし……付き合うこと自体は、喜んで。\""
80000083-44 = "（そうして、イロハとの買い物もひと段落し……）"
80000083-46 = "はい、必要なものはすべて買えましたね。"
80000083-47 = "それにしても、まさか先生がアレを選ぶだなんて……ふふっ。とびっきりの変化球……悪戯が混み過ぎていて、私ですらちょっとビックリです。"
80000083-48 = "果たして風紀委員会の面々は、無事でいられますかね……？"
80000083-49 = "[s5] \"まるで私が「変なのを選んだ」みたいな言い方！？\"\n[s6] \"無事も何も、あれ普通の物だよね！？\""
80000083-50 = "ま、確かに実際のところは、面白くもない真っ当な選択でしたね。先生らしいと思います。"
80000083-51 = "ま、確かに実際のところは、面白くもない真っ当な選択でしたね。先生らしいと思います。"
80000083-52 = "……先生なら、そうすると思ってましたけど。"
80000083-53 = "[s] \"そうする……？\""
80000083-54 = "いえ、何でもありません。おかげさまで、無事に終わりました。"
80000083-55 = "こんな日にわざわざありがとうございます、先生。"
80000083-56 = "では、帰りましょうか？"
80000083-57 = "[s7] \"うん、そうだね。\"\n[s8] \"そういえばイロハ、今日ってその……\""
80000083-58 = "……本当に？"
80000083-59 = "[s9] \"……え？\""
80000083-60 = "本当に良いのか、と言っているんです。"
80000083-61 = "バレンタインデーの日に、先生を呼び出したんですよ？#n……本当に、それで良いんですか？"
80000083-62 = "[s10] \"それって、その……\""
80000083-63 = "……まあ、今回は良いでしょう。#nせっかくのバレンタインデーに、いじめ過ぎるのもアレですし。"
80000083-64 = "……ふふっ。どうかしましたか、先生？"
80000083-65 = "今日……今日はバレンタインデーですね？#nそれで？何か気になることでも？"
80000083-66 = "[s11] \"気になること、っていうか……と、とりあえず帰ろうか。\""
80000083-67 = "ズルいですね、そこまで来ておいて逃げるんですか？"
80000083-68 = "こんなに綺麗に誘導してあげたのに、素直ではありませんねぇ？#n私相手に、何を恥ずかしがっているんですか？"
80000083-69 = "[s12] \"いや、だって……。\""
80000083-70 = "……まあ、悪戯はこれくらいにしてあげます。#nそろそろ、先生の期待に応えてあげるとしましょうか？"
80000083-71 = "はい、どうぞ。"
80000083-76 = "[ns] \"これって……\""
80000083-77 = "はい、手作りですよ。さあ、先生、どうぞ。"
80000083-82 = "[ns] \"あ、ありが――\""
80000083-84 = "[ns] \"……い、イロハさん？　どうして口に咥えて、目を閉じているのでしょう……？\""
80000083-85 = "……。"
80000083-90 = "それはこひらの台詞でふよ？ろうして食べないんれす？"
80000083-91 = "[s] \"いやいやいやいや！\""
80000083-92 = "……私からのプレゼントは受け取れない、と？"
80000083-93 = "わざわざ先生のために用意したのに、この気持ちを受け取ってくれないんですか？"
80000083-94 = "[s] \"いや、受け取りたい気持ちは山々なんだけど、それは流石に……！\""
80000083-95 = "…………。"
80000083-96 = "……ぷっ。"
80000083-97 = "[s] \"……？\""
80000083-98 = "ふふっ……冗談ですよ、悪ふざけが過ぎましたね。はい、どうぞ。"
80000083-102 = "ぜひシャーレに戻ってから、ゆっくり味わってください。"
80000083-103 = "[s] \"あ、うん。ありがとう。\""
80000083-104 = "さて、ではあらためて帰りましょうか。"
80000083-111 = "ああ。先ほど咥えていたのも、中に入れておきましたので。"
80000083-112 = "食べてみて、何番目がそれだと思ったか……後でモモトーク、送ってくださいね。"
80000083-113 = "それでは。"
80000083-117 = "[ns] \"……本当に！？\""
80000083-119 = "（翻弄されっぱなしの身体に染み渡るほど、イロハのチョコは美味しかった）"
