[translation]
10016060-1 = "Episódio 6; Cooperação (1)"
10016060-4 = "Haa, haa... parece que não está por aqui."
10016060-5 = "Mashiro, ela estava em outras áreas?"
10016060-6 = "Estou observando os arredores da arena do topo da torre de iluminação agora, mas não vi nenhuma aluna suspeita."
10016060-7 = "Pedi para as alunas que estão na arena coletarem depoimentos, mas os relatos estão muito confusos..."
10016060-8 = "No fim, não conseguimos confirmar para onde a aluna em questão foi."
10016060-9 = "[s] \"Kirino, você se lembra da aparência daquela aluna?\""
10016060-11 = "Aparência, é... bem, hum..."
10016060-12 = "Cabelo curto, uniforme de educação física... e acho que estava usando tênis..."
10016060-13 = "Bom, com essa descrição é impossível achar, né?#nÉ o Festival Esportivo, todo mundo está vestido quase igual."
10016060-14 = "Não tinha nada de especial, então nem achei que fosse suspeita.#nAcabei apagando da memória."
10016060-15 = "Uuu... sinto muito. Eu deveria ter observado com mais atenção..."
10016060-19 = "Não, só de ter nos reportado sobre essa aluna já é de grande ajuda."
10016060-24 = "（...Mas é frustrante não ter pessoal suficiente agora.）"
10016060-25 = "（Se fosse em Trinity, eu teria mobilizado todas as alunas e a encontraríamos num instante...）"
10016060-26 = "......Algum problema?"
10016060-27 = "Essa voz é..."
10016060-34 = "Representantes de Gehenna, Trinity e Millennium reunidas de uma vez só...#nQue combinação estranha, não é?"
10016060-35 = "Como assim combinação estranha! Não nos trate como um conjunto sem permissão!"
10016060-36 = "Eu também não pretendo formar dupla com você...#nDispenso ser tratada como aliada dessa mulher yokai."
10016060-37 = "Quem você chamou de mulher yokai!?"
10016060-38 = "Ahaha... pessoal, por favor, se acalmem."
10016060-40 = "O que as três estão fazendo aqui...?"
10016060-41 = "É que... voltando da enfermaria, encontramos vocês duas descansando amigavelmente no banco..."
10016060-42 = "Estávamos a caminho do café para uma pausa."
10016060-43 = "Hasumi-san, você parece preocupada... aconteceu algo?"
10016060-44 = "Não, não é nada demais."
10016060-45 = "Soubemos por estas duas que uma aluna foi vista levando equipamentos usados nas competições."
10016060-46 = "É apenas uma suposição, mas pensei que talvez alguém estivesse mexendo nos equipamentos com más intenções..."
10016060-48 = "Hein!? Isso não é um problema sério!?"
10016060-49 = "É, é mesmo?"
10016060-50 = "Você tem noção de quanto custam os equipamentos usados nas competições!?#nSe roubarem tudo isso, qual seria o prejuízo..."
10016060-51 = "Além disso, não é exagero dizer que os equipamentos desta vez concentram a tecnologia da Millennium...#nExiste a possibilidade de serem usados para o mal."
10016060-52 = "No mês passado, houve um incidente em que uma aluna delinquente de Gehenna roubou um robô de limpeza da Millennium e saiu causando destruição com um lança-chamas acoplado."
10016060-53 = "Mesmo sendo um robô de limpeza comum, causou danos imensos a ponto de dizimar um pelotão do Comitê de Disciplina... se usarem equipamentos com tecnologia avançada, imagine o tamanho do estrago..."
10016060-54 = "......Acho que aquele robô de limpeza já veio com o lança-chamas de fábrica..."
10016060-55 = "De qualquer forma. Não temos tempo, vamos começar a agir."
10016060-56 = "Yuuka-san. Todos os equipamentos possuem etiquetas eletrônicas, certo?"
10016060-57 = "Verifique a lista de equipamentos que não foram devolvidos após o fim das partidas e o horário de término das competições em que foram usados."
10016060-58 = "Eu vou verificar os registros de entrada e saída das instalações principais e organizar a lista de alunas que se aproximaram da pista no horário correspondente."
10016060-59 = "I-isso eu já estou fazendo, nem precisava pedir!"
10016060-65 = "......Suspeito."
10016060-66 = "Com que segundas intenções uma aluna de Gehenna estaria nos ajudando?"
10016060-67 = "Hã...?"
10016060-68 = "Não estamos fazendo esse trabalho todo só para ajudar as alunas de Trinity, sabe?"
10016060-69 = "Eu também sou do comitê executivo do Festival Kourin.#nSó quero evitar que incidentes atrapalhem a gestão da escola Gehenna."
10016060-70 = "Seria um incômodo se a aluna que causou o incidente fosse de Gehenna e nos cobrassem uma indenização."
10016060-71 = "Isso não vale para você também?"
10016060-72 = "......Por enquanto, vou acreditar nas suas palavras."
10016060-74 = "Então, vamos perguntar por aqui se alguém viu alguma aluna suspeita."
10016060-75 = "Marie, por favor, vamos juntas."
10016060-76 = "S-sim!"
10016060-80 = "……Então, você testemunhou uma aluna carregando caixas de suprimentos em direção à saída do subsolo?"
10016060-81 = "Isso. Ela parecia estar carregando uma caixa cheia de blocos de ferro com muita dificuldade, mas recusou ajuda, então achei estranho."
10016060-82 = "Fiquei preocupado que ela pudesse se machucar, então a segui de longe para ter certeza."
10016060-83 = "Organizei a lista e a quantidade dos suprimentos que não foram devolvidos após o fim das competições."
10016060-84 = "Caixas com bolas de arremesso de peso, barreiras da corrida com obstáculos e muito mais…… tem bastante coisa."
10016060-85 = "Após o término das competições, as alunas que entraram e saíram da arena sem serem atletas são as seguintes."
10016060-86 = "Kirino, você reconhece alguém nesta lista?"
10016060-87 = "Ah, foi essa pessoa quem levou os suprimentos!"
10016060-89 = "Resumindo a situação e as evidências……#nacredita-se que a aluna nesta foto levou os suprimentos para a entrada do subsolo da arena."
10016060-90 = "……A entrada do subsolo do Estádio Atlético?"
10016060-91 = "É um lugar que não é usado atualmente porque o espaço é muito apertado……#nPor que levar suprimentos para um lugar desses?"
10016060-92 = "Isso é algo que descobriremos perguntando diretamente ao culpado."
10016060-93 = "Vamos, é melhor irmos logo antes que isso se torne um problema maior."
10016060-95 = "Festival Esportivo de Kivotos…… o evento esportivo mais quente de Kivotos, realizado a cada dois anos."
10016060-96 = "Se você se destacar neste festival, que atrai a atenção de toda a mídia, poderá se tornar uma heroína na história da sua escola ou deixar uma mensagem no coração das alunas mais novas."
10016060-97 = "Isso significa que……"
10016060-101 = "Se fizermos uma manifestação aqui, o impacto será enorme!"
10016060-102 = "Mas chefe…… neste Estádio Atlético, além do Comitê Disciplinar de cada escola, #naté alunas da Escola de Polícia Valkyrie estão presentes……"
10016060-103 = "Se fizermos uma manifestação como de costume, não seremos reprimidas imediatamente pelo Comitê Executivo?"
10016060-104 = "Não precisa se preocupar com isso. Se as câmeras da Escola Chronos estiverem focadas em nós, o Comitê Executivo não poderá agir de forma imprudente."
10016060-105 = "Além disso, como ocupamos a entrada do subsolo do estádio, eles não poderão usar métodos violentos como bombas."
10016060-106 = "Eles não conseguirão romper nossa barricada e serão forçados a negociar!"
10016060-107 = "Como esperado da chefe. Que plano brilhante!"
10016060-108 = "Então, aproveitando esse ímpeto, vamos conquistar nosso desejo de uma política de 4 dias de folga por semana――"
10016060-110 = "……Foi por esse motivo que vocês usaram esses suprimentos como barricada?"
10016060-112 = "O-o comitê executivo…… desde quando vocês estão aí……!?"
10016060-113 = "Como vocês sabiam que estávamos aqui!?"
10016060-115 = "Se uma aluna que não é atleta carrega suprimentos pela arena, é natural que chame a atenção."
10016060-116 = "Como os suprimentos desta vez deveriam ser transportados por robôs, é ainda mais suspeito ver alguém carregando-os……"
10016060-117 = "E-eu não tinha pensado nesse ponto cego……"
10016060-118 = "A propósito, o que é isso de 4 dias de folga por semana?"
10016060-119 = "Trabalhar 4 dias já é uma coisa, mas trabalhar apenas 3 dias……#nnão são folgas demais?"
10016060-120 = "C-cala a boca! Quantas pessoas no mundo você acha que realmente gostam de trabalhar!?"
10016060-121 = "Se o Conselho Estudantil Federal existe pelas alunas, deveria garantir pelo menos 4 dias de folga por semana como regra comum!"
10016060-122 = "[s] \"Isso mesmo!\""
10016060-123 = "Sensei, por favor, não concorde com esse sofisma. Você é um adulto, não é?"
10016060-124 = "Ehem…… de qualquer forma.#nNão posso perdoar atos que tentem atrapalhar o \"Festival Esportivo de Kivotos\"."
10016060-125 = "Se devolverem os suprimentos agora e se retirarem pacificamente, não cobrarei responsabilidades……#nmas se algo acontecer depois, cobrarei os custos do reparo!"
10016060-126 = "Você acha mesmo que esse tipo de ameaça funciona com a gente?"
10016060-127 = "Para o caso de vocês decidirem usar medidas extremas, #nnós também preparamos nossas próprias contramedidas……"
10016060-133 = "……Nós trouxemos o tanque que estava estacionado do lado de fora da arena também!"
10016060-134 = "[s1] \"Um tanque……?\"\n[s2] \"Ah, aquilo provavelmente não é um tanque――\""
10016060-135 = "Hã? Se isso não é um tanque, então o que é?"
10016060-136 = "Hã? Se isso não é um tanque, então o que é?"
10016060-137 = "Existe algo com lagartas, blindagem de ferro e um canhão que não seja um tanque?"
10016060-138 = "[s3] (Pensando bem, é verdade……)\n[s4] (Não dá para negar……)"
10016060-139 = "Além disso, nós temos a barricada."
10016060-140 = "Além disso, nós temos a barricada."
10016060-141 = "Esta barricada sólida, feita de vigas de aço e madeira, não cairá a menos que o Comitê Disciplinar de Gehenna e o Comitê de Justiça de Trinity se unam contra nós—"
10016060-147 = "……Ainda tem mais alguma coisa?"
10016060-149 = "Ch-chefe…… o que a gente faz? O Comitê Disciplinar, o Comitê de Justiça e o Seminar estão todos juntos aqui……?"
10016060-150 = "N-não tenha medo! Nós temos um tanque, lembra?!"
10016060-151 = "Mesmo que sejam membros do conselho estudantil, eles não estão em grande número. Se usarmos nosso poder de fogo, temos chance de vencer!"
10016060-152 = "Muito bem……"
10016060-153 = "Vá, \"Destruidor de Burgueses\"!"
10016060-154 = "[s] \"Eles inventaram outro nome novo…….\""
