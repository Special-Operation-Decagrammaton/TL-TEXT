[translation]
10016060-1 = "第6話;協力（１）"
10016060-4 = "はぁ、はぁ……こちらにはいないようですね。"
10016060-5 = "マシロ、他の区域にはいましたか？"
10016060-6 = "現在照明棟の上から競技場周辺を見ていますが、不審な生徒の姿はありません。"
10016060-7 = "競技場にいる部員に目撃証言を集めてもらいましたが、陳述が混在していて……"
10016060-8 = "結局、問題の生徒がどこに行ったのかは確認できませんでした。"
10016060-9 = "[s] \"キリノ、その生徒の印象って覚えてる？\""
10016060-11 = "印象、ですか……え、ええと……"
10016060-12 = "短く揃えたショートカットで……体操着姿で……運動靴を履いていたような……"
10016060-13 = "まあこの程度じゃ見つかりっこないよね～。#n大運動会だもん、みんな似たような格好してるし。"
10016060-14 = "特徴という特徴なかったし、怪しいと思わなかったもん。#nそのまま記憶から消しちゃった。"
10016060-15 = "うぅ……すみません。本官がもっと注意深く観察するべきだったのに……。"
10016060-19 = "いえ、その生徒の事を報告してくださっただけでも、十分助かっています。"
10016060-24 = "（……ですが、今は人手が足りないのが歯がゆいところ）"
10016060-25 = "（ここがトリニティだったら、部員を総動員してすぐに見つけられたのに……）"
10016060-26 = "……何か問題でも？"
10016060-27 = "この声は……"
10016060-34 = "ゲヘナとトリニティ、ミレニアムの役員が一気に集まるなんて……#nなんだか妙な組み合わせだねぇ。"
10016060-35 = "妙な組み合わせって何よ！人を勝手にセット扱いしないでくれる！？"
10016060-36 = "私もあなたと組むつもりはありませんが……#nこんな妖怪女の仲間扱いされるのは遠慮します。"
10016060-37 = "誰が妖怪女ですって！？"
10016060-38 = "あはは……皆さん、落ち着いてください。"
10016060-40 = "お三方は一体何用ですか……？"
10016060-41 = "それが……救護室から戻る途中、ベンチで仲良く横になっているお二人を発見しまして……"
10016060-42 = "休憩のため、カフェへ向かうところだったのです。"
10016060-43 = "ハスミさんこそ、浮かない表情をされていますが……何かお困り事が？"
10016060-44 = "いいえ、大したことではありません。"
10016060-45 = "こちらのお二方から、競技に使われる備品を持ち出す生徒を見たと伺いまして。"
10016060-46 = "まだ推測に過ぎませんが……もしかしたら悪意を持って試合の備品に手を出しているのではないかと思いまして……"
10016060-48 = "え！？かなりの大事じゃない！"
10016060-49 = "そ、そうですか？"
10016060-50 = "競技に使われる備品が全部でいくらだと思ってるの！#nそれを盗んでいったとしたら一体いくらの損害が……"
10016060-51 = "しかも今回の備品はミレニアムの技術を集約したといっても過言ではありません……#n悪用される可能性だってあります。"
10016060-52 = "先月もゲヘナの不良生徒がミレニアムから盗んだ掃除ロボットに火炎放射器をつけて暴れ回るといった事件がありました。"
10016060-53 = "普通の清掃ロボットでさえも風紀委員会の一個中隊が壊滅するほどの莫大な被害が発生したというのに……技術が集約された備品を悪用するとなるとどれほどの被害が起こるのか……。"
10016060-54 = "……その掃除ロボット、たぶん最初から火炎放射器はついてたと思うけど……"
10016060-55 = "とにかく。時間もないですし、対応を始めましょう。"
10016060-56 = "ユウカさん。全ての備品には電子タグがついていますよね？"
10016060-57 = "試合終了後も返却されていない備品の一覧と、#nそれらが使用された試合の終了時間を確認してください。"
10016060-58 = "私は主要施設の入出記録を確認し、該当時間帯にトラックに接近した生徒の名簿を整理します。"
10016060-59 = "そ、そんな事、言われなくてもやってるわよ！"
10016060-65 = "……怪しいですね。"
10016060-66 = "ゲヘナの生徒が、一体どんな下心で私たちを助けているのですか？"
10016060-67 = "はぁ……？"
10016060-68 = "トリニティの生徒を助けるために、こんな面倒な事をやってるわけじゃないですよ？"
10016060-69 = "私だって晄輪大祭の実行委員です。#n事件が起きてゲヘナ学園の運営に支障が生じる事を防ぎたいだけです。"
10016060-70 = "もし、事件を起こした生徒がゲヘナ出身で、私たちに損害賠償が請求される事になったら面倒ですからね。"
10016060-71 = "それはあなたも同じじゃないんですか？"
10016060-72 = "……とりあえず、その言葉を信じる事にしましょう。"
10016060-74 = "それでは、私たちはこの周辺で怪しい生徒を見ていないか聞き込みをしますね。"
10016060-75 = "マリーさん、一緒にお願いします。"
10016060-76 = "は、はいっ！"
10016060-80 = "……それで、備品箱を持った生徒が地下出口方面に向かうのを目撃したのですか？"
10016060-81 = "ああ。鉄の塊がいっぱい入った箱を重そうに持ってるのに、手助けはいらないって断るから変だと思ってたんだ。"
10016060-82 = "怪我するんじゃないかと心配で、後ろから見守ってたから間違いないよ。"
10016060-83 = "試合終了後に返却されていない備品のリストと数量を整理したわよ。"
10016060-84 = "砲丸投げの砲丸が入った箱や障害物競走のハードルなどなど……かなりあるわね。"
10016060-85 = "試合が行われた後、選手ではないのに競技場に出入りした生徒は次の通りです。"
10016060-86 = "キリノさん、この中に思い当たる顔はありますか？"
10016060-87 = "あっ、備品を持ち出していたのはこの人です！"
10016060-89 = "状況と証拠をまとめますと……#nこの写真の生徒が競技場の地下出入口に備品を持ち出していると考えられますね。"
10016060-90 = "……アスレチックスタジアムの地下出入口？"
10016060-91 = "スペースが狭いから今は使われていない場所なのに……#nどうしてそんなところに備品を？"
10016060-92 = "それは犯人に直接聞けば分かることです。"
10016060-93 = "さあ、面倒なことになる前に早く行きましょう。"
10016060-95 = "晄輪大祭……2年ごとに行われるキヴォトスで最も熱いスポーツの祭典。"
10016060-96 = "すべてのメディアが注目するこの祭典で活躍すれば、学園の歴史に残る英雄になることも、後輩たちの心にメッセージを残すこともできる。"
10016060-97 = "それはつまり……"
10016060-101 = "ここでデモを行えば、その影響力も大きいはず！"
10016060-102 = "しかしボス……このアスレチックスタジアムには各学園の風紀委員会はもちろん、#nヴァルキューレ警察学校の生徒までいますけど……"
10016060-103 = "普段のようにデモをしたら、実行委員会にすぐ鎮圧されるのではないでしょうか？"
10016060-104 = "それは心配しなくてもいいよ。クロノススクールのカメラが私たちに注目しているのなら、実行委員会も下手に押さえつけたりはできないだろうし。"
10016060-105 = "それに、スタジアムの地下出入口を陣取った以上、爆弾のような手荒な手段を使えないだろうからね。"
10016060-106 = "相手は私たちのバリケードを突破できずに交渉を試みるはず！"
10016060-107 = "さすがボス。立派な策ですね！"
10016060-108 = "それじゃあこの勢いに乗って、私たちの悲願だった週休4日政策を――"
10016060-110 = "……そんな理由でこの備品をバリケードに使ったわけ？"
10016060-112 = "じ、実行委員が……いつの間に……！？"
10016060-113 = "私たちがここにいるとなんで分かったの！？"
10016060-115 = "選手でもない生徒が競技場で備品を運んでいたら、当然目につきます。"
10016060-116 = "今回の備品はロボットが運ぶのですから、人が運んでいたら尚更……"
10016060-117 = "そ、そんな盲点があったなんて……"
10016060-118 = "ところで、何ですか週休4日って？"
10016060-119 = "週4労働ならともかく、週3労働って……#n休日が多すぎませんか？"
10016060-120 = "う、うるさい！働くのが好きな人なんて世の中にどれだけいるっていうのよ！"
10016060-121 = "生徒のための連邦生徒会なら、共通校則で最低でも週休4日は保証してよ！"
10016060-122 = "[s] \"そうだそうだ！\""
10016060-123 = "先生、詭弁に相槌を打たないでください。大人ですよね？"
10016060-124 = "こほん……とにかく。#n「晄輪大祭」を邪魔しようとする行為は許せないわ。"
10016060-125 = "今からでも備品を返して素直に退いてくれるなら責任は問わないけど……#n後で何か問題が起きたら修理費用を請求するからね！"
10016060-126 = "そんな脅迫が私たちに効くとでも？"
10016060-127 = "万が一、相手が強硬手段に出た場合に備えて#nこちらも対抗手段を用意してあるわ……"
10016060-133 = "……競技場の外に駐車されてた戦車も一緒に持ってきてるのよ！"
10016060-134 = "[s1] \"戦車……？\"\n[s2] \"あ、それは多分戦車じゃなくて――\""
10016060-135 = "ん？これが戦車じゃなければ何だっていうの？"
10016060-136 = "ん？これが戦車じゃなければ何だっていうの？"
10016060-137 = "カタピラと鉄甲、それに機関砲がついてる物って戦車以外にあるの？"
10016060-138 = "[s3] （言われてみれば確かにそうだね……）\n[s4] （否定できない……）"
10016060-139 = "それに私たちにはバリケードがあるからね。"
10016060-140 = "それに私たちにはバリケードがあるからね。"
10016060-141 = "鉄骨と木造で積み上げたこの強固なバリケードは、#nゲヘナ風紀委員会とトリニティ正義実現委員会が徒党を組んでこない限り――"
10016060-147 = "……まだ何かあります？"
10016060-149 = "ぼ、ボス……どうしましょう？#n風紀委員会と正義実現委員会とセミナーが一緒にいるんですけど……？"
10016060-150 = "こ、怖がらないの！私たちには戦車があるんだから！"
10016060-151 = "生徒会役員が相手だとしても数は多くない。火力で押し通せば勝算はある！"
10016060-152 = "よし……"
10016060-153 = "行け、「ブルジョアクラッシャー」！"
10016060-154 = "[s] \"また新しい名前がついちゃった……。\""
