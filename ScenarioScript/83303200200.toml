[translation]
83303200200-6 = "あ、ヒナっちだ。"
83303200200-7 = "やっぱり来ると思ってた。"
83303200200-8 = "……まあ、こんな状況だしね。"
83303200200-14 = "話は聞いてる。大量のマコト像が設置されたとか。"
83303200200-15 = "あ～それね！めっちゃ置いてあんの！ウケるよね、あははっ！"
83303200200-16 = "ここに来るまでにも何体か……"
83303200200-17 = "そうらしいね。"
83303200200-18 = "万魔殿の議長が問題児を集めて、いろんなとこに設置してるんだって。"
83303200200-19 = "SNSでもめっちゃバズっててさ～"
83303200200-20 = "私とエリカちゃんも、その投稿見て来てみたんだよね！"
83303200200-22 = "はぁ……"
83303200200-23 = "状況は理解した。"
83303200200-24 = "……関わった問題児を全員捕らえる。"
83303200200-25 = "あははっ！頑張れ～ヒナっち～"
