[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1602006-1 = "A Roupa de Camuflagem de uma Sniper" 
1602006-2 = "Cidade Corgi - Entrada" 
1602006-5 = "Ah, Sensei. Aqui, aqui.\n" 
1602006-6 = "Acho que por ser a primeira vez que nos encontramos lá fora,\né uma sensação um pouco esquisita." 
1602006-7 = "Não estou te atrapalhando em pleno dia de folga, né?" 
1602006-8 = "Você parece ter estado bem ocupado durante toda a semana, Sensei..." 
1602006-9 = "[s1] \"Na verdade, eu já estava\nquerendo sair para fazer umas compras.\"\n[s2] \"E fiquei curioso para ver\ncomo são as roupas de camuflagem da SRT.\"" 
1602006-12 = "……Ué? Nunca viu antes?" 
1602006-13 = "[s3] \"Eu já vi roupas de camuflagem usadas por outras alunas, mas――\"\n[s4] \"Nunca vi uma loja especializada em vender\nroupas de camuflagem antes.\"" 
1602006-16 = "Ah, mas...\nA loja que a gente vai agora――" 
1602006-17 = "Não é uma loja militar, é uma loja de roupas normal." 
1602006-18 = "Para se 'camuflar' no meio da cidade,\né muito mais eficaz simplesmente modificar roupas normais~" 
1602006-19 = "Eu planejava usar os vales-presente que ganhamos na última operação." 
1602006-20 = "Fufu. Que cores será que funcionam\npara uma maior variedade de situações~" 
1602006-21 = "[s5] \"Sabe, quando penso em camuflagem,\neu lembro daquelas roupas felpudas parecendo moitas...\"\n[s6] \"Vocês usam aquilo na cidade também?\"" 
1602006-24 = "Aah, os Ghillie Suits?" 
1602006-25 = "Aquilo tem uma estrutura de malha.\nPara missões no mato, a gente entrelaça panos verdes e marrons ou folhas secas na malha――" 
1602006-26 = "Já em ambientes urbanos cheios de outdoors coloridos,\na gente propositalmente usa retalhos com cores berrantes." 
1602006-27 = "E para não chamar atenção no meio da multidão,\nàs vezes montamos com partes de uniformes escolares que não usamos mais..." 
1602006-28 = "Mas agora que a nossa academia foi fechada,\nos nossos uniformes são artigos de luxo, sabe..." 
1602006-29 = "Faz um bom tempo que eu\nnão monto um Ghillie Suit, aliás." 
1602006-30 = "[s] \"...Dá bastante\ntrabalho, não é?\"" 
1602006-31 = "É claro que dá. A nossa preparação para qualquer operação\nprecisa ser absolutamente impecável." 
1602006-32 = "Enfim, vamos dar uma olhada." 
1602006-38 = "Hmm, essa roupa aqui é muito chamativa." 
1602006-39 = "Essa estampa aqui atrai muito a atenção..." 
1602006-40 = "Opa, essa aqui é boa.\nCombina perfeitamente com a cor do meu cabelo." 
1602006-41 = "E aí? Como ficou?" 
1602006-42 = "[s7] \"Sim...\"\n[s8] \"Ficou ótimo...\"" 
1602006-45 = "Hã? Que reação seca." 
1602006-46 = "……É, acho que roupas com esses babados soltinhos\nnão combinam muito comigo, né.\n" 
1602006-47 = "Fazer o quê.\nVou de algo mais seguro, como um jeans ou veludo cotelê――" 
1602006-48 = "[s9] \"N-Não foi isso que eu quis dizer!\"\n[s10] \"Eu realmente achei que ficou lindo em você, mas...\"" 
1602006-51 = "Então, qual o problema?" 
1602006-52 = "[s] \"É um desperdício cortar uma\nroupa tão bonita para fazer camuflagem.\"" 
1602006-53 = "Hã?" 
1602006-54 = "O que você quer dizer com isso..." 
1602006-59 = "Sensei, não me diga\nque você entendeu tudo errado?" 
1602006-60 = "As 'roupas de camuflagem' que viemos comprar hoje\nsão só roupas civis para usar durante infiltrações." 
1602006-61 = "Se a gente andar por aí com uniformes de uma escola\nque a maioria das pessoas nem conhece, vai chamar muita atenção, né?" 
1602006-62 = "Então, é uma 'camuflagem' no sentido de disfarce para infiltração.\nNão é pra me transformar numa moita ambulante." 
1602006-63 = "Por mais que eu coloque a missão em primeiro lugar,\neu não vou sair rasgando roupas normais assim de graça." 
1602006-64 = "[ns] \"Ah, que alívio\nque eu entendi errado...\"" 
1602006-66 = "[ns11] \"É que, se você realmente precisasse de panos rasgados――\"\n[ns12] \"Eu estava prestes a oferecer as minhas roupas velhas.\"" 
1602006-69 = "Opa, essa até que é uma boa ideia." 
1602006-70 = "Posso retirar o que eu acabei de falar?" 
1602006-71 = "[s] \"Não pode, não.\"" 
1602006-72 = "Puxa,\nera brincadeira~" 
1602006-77 = "E então, o que acha dessa aqui?" 
1602006-78 = "[s] \"Acho que gostei mais\ndaquela que você vestiu primeiro.\"" 
1602006-79 = "Heh, você tem preferências bem claras,\nnão é mesmo?" 
1602006-80 = "Tudo bem, então eu levo aquela~" 
1602006-82 = "（Depois disso, eu e a Otogi passamos um bom tempo experimentando\nvárias roupas diferentes e nos divertimos bastante.）" 