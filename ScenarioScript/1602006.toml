[translation]
1602006-1 = "A Certain Sniper's Camouflage"
1602006-2 = "Corgi Town - Entrance"
1602006-5 = "Oh, Sensei. Over here, over here."
1602006-6 = "Since this is our first time meeting up outside, it feels kind of strange."
1602006-7 = "I'm not ruining your precious day off, am I?"
1602006-8 = "It seems like you've been busy all week, Sensei..."
1602006-9 = "[s1] \"I was actually in the mood for some shopping myself.\"\n[s2] \"Plus, I'm curious about what SRT's camouflage clothing looks like.\""
1602006-12 = "...Huh? Have you never seen it before?"
1602006-13 = "[s3] \"I've seen the camouflage other students wear, but—\"\n[s4] \"I've never seen a specialty store for camouflage clothing before.\""
1602006-16 = "Ah, but... the place we're going to now is—"
1602006-17 = "It's not a military specialty shop, just a normal clothing store."
1602006-18 = "For \"camouflage\" in the city, it's actually more effective to modify normal clothes."
1602006-19 = "I figured I'd use the gift vouchers I got from the last operation."
1602006-20 = "Hehe. I wonder which colors are the most versatile~"
1602006-21 = "[s5] \"When I think of camouflage, I think of those shaggy-looking ones...\"\n[s6] \"Can you use that kind of clothing in the city too?\""
1602006-24 = "Ah, you mean a ghillie suit?"
1602006-25 = "Since those have a mesh framework, for operations in the bushes we weave in #ngreen and brown cloth or fallen leaves—"
1602006-26 = "And for city operations where there are many primary-colored billboards, we #nintentionally use brightly colored cloth."
1602006-27 = "We also make them out of old school uniforms so we don't stand out in crowds, #nbut..."
1602006-28 = "Now that the academy is closed, uniforms are precious..."
1602006-29 = "Yeah, I haven't made a ghillie suit in a while."
1602006-30 = "[s] \"...It takes quite a bit of effort, doesn't it.\""
1602006-31 = "Well, of course. Preparation for an operation must always be perfect."
1602006-32 = "Well then, let's go take a look."
1602006-38 = "Hmm, the color of these clothes is too flashy."
1602006-39 = "This one's pattern stands out too much..."
1602006-40 = "Oh, this one might be good. It perfectly matches my hair color."
1602006-41 = "How is it? Does it suit me?"
1602006-42 = "[s7] \"Yeah...\"\n[s8] \"Looks good...\""
1602006-45 = "Eh? What a weak reaction."
1602006-46 = "...I guess these kinds of fluffy clothes just don't suit me."
1602006-47 = "It can't be helped. I'll go with a safe denim or corduroy—"
1602006-48 = "[s9] \"T-That's not what I meant!\"\n[s10] \"I honestly thought it looked really good on you, but...\""
1602006-51 = "Then why?"
1602006-52 = "[s] \"It would be a waste to turn this into camouflage clothing.\""
1602006-53 = "Eh?"
1602006-54 = "What do you mean by that..."
1602006-59 = "Sensei, are you perhaps misunderstanding something?"
1602006-60 = "The \"camouflage\" I came to buy today is civilian clothing to wear during #ninfiltrations."
1602006-61 = "If I walk around in an unfamiliar uniform, I'll stand out, right?"
1602006-62 = "It's \"camouflage\" in that sense; it's not a disguise meant to drop my presence to #nzero."
1602006-63 = "No matter how much I focus on operations, I wouldn't go tearing up my normal #nclothes."
1602006-64 = "[ns] \"I'm glad it was just a misunderstanding...\""
1602006-66 = "[ns11] \"If you really needed fabric to tear up—\"\n[ns12] \"I was thinking of giving you my old clothes that I don't wear anymore.\""
1602006-69 = "Ah, that might actually be a good idea."
1602006-70 = "Can I take back what I just said?"
1602006-71 = "[s] \"No.\""
1602006-72 = "Tch, I was just joking."
1602006-77 = "Anyway, how about this outfit?"
1602006-78 = "[s] \"I think I like the one you were wearing earlier better.\""
1602006-79 = "Oh, you have surprisingly clear preferences."
1602006-80 = "Okay. Then I'll wear this one~"
1602006-82 = "(After that, I spent a fun time trying out various clothes with Otogi.)"