[translation]
1602006-1 = "A Sniper's Camouflage"
1602006-2 = "Corgi Town - Entrance"
1602006-5 = "Oh, Sensei. Over here, over here.\r\n"
1602006-6 = "It feels a bit strange, since this is our first time meeting up outside."
1602006-7 = "I hope I'm not interrupting your day off?"
1602006-8 = "You seemed really busy all week, Sensei..."
1602006-9 = "[s1] \"I was actually in the mood for some shopping anyway.\"\r\n[s2] \"And I'm curious to see what kind of SRT camouflage you're looking for.\""
1602006-12 = "…Huh? Haven't you seen it before?"
1602006-13 = "[s3] \"I've seen the camouflage uniforms other students wear, but—\"\r\n[s4] \"I've never actually seen a store that specializes in them.\""
1602006-16 = "Oh, but… the place we're going to—"
1602006-17 = "It's not a military specialty shop, just a regular clothing store."
1602006-18 = "For \"camouflage\" in the city, it's actually more effective to modify regular clothes."
1602006-19 = "I figured I'd use the gift certificate I got from that last operation."
1602006-20 = "Hehe. I wonder which colors are the most versatile~"
1602006-21 = "[s5] \"When you say camouflage, I think of that shaggy stuff...\"\r\n[s6] \"Can you use those kinds of clothes in the city too?\""
1602006-24 = "Oh, you mean a ghillie suit?"
1602006-25 = "Those have a mesh frame, so for operations in the brush, you weave in green or brown fabric and fallen leaves—"
1602006-26 = "For operations in the city, where there are lots of bright advertising billboards, you might use flashy-colored fabric instead."
1602006-27 = "I've even made them out of old uniforms so I wouldn't stand out in a crowd, but..."
1602006-28 = "Now that the academy is closed, uniforms are pretty precious..."
1602006-29 = "Yeah, I don't think I've made a ghillie suit in a while."
1602006-30 = "[s] \"...That sounds like a lot of work.\""
1602006-31 = "Well, yeah. You have to be perfectly prepared for any operation."
1602006-32 = "Anyway, let's go take a look."
1602006-38 = "Hmm, this one's color is too flashy."
1602006-39 = "And this one's pattern stands out too much..."
1602006-40 = "Oh, this might be good. It matches my hair color perfectly."
1602006-41 = "How is it? Does it suit me?"
1602006-42 = "[s7] \"Yeah...\"\r\n[s8] \"It looks good...\""
1602006-45 = "Huh? That's a weak reaction."
1602006-46 = "…I guess fluffy clothes like this don't really suit me after all.\r\n"
1602006-47 = "Can't be helped. I'll just go with some safe denim or corduroy—"
1602006-48 = "[s9] \"T-that's not what I meant!\"\r\n[s10] \"I really did think it looked good on you...\""
1602006-51 = "Then why?"
1602006-52 = "[s] \"It would be a waste to use that to make a camouflage suit.\""
1602006-53 = "Huh?"
1602006-54 = "What do you mean by that..."
1602006-59 = "Sensei, are you misunderstanding something?"
1602006-60 = "The \"camouflage\" I came to buy today is just civilian clothes for infiltration."
1602006-61 = "It's pretty obvious if I walk around in an unfamiliar uniform, right?"
1602006-62 = "It's \"camouflage\" in that sense, not some zero-presence disguise."
1602006-63 = "Just because I'm operation-focused doesn't mean I'd go around tearing up my own clothes."
1602006-64 = "[ns] \"I'm glad it was just a misunderstanding...\""
1602006-66 = "[ns11] \"If you really need fabric to tear up—\"\n[ns12] \"I was thinking I could give you some of my old clothes.\""
1602006-69 = "Oh, that might be a good idea."
1602006-70 = "Can I take back what I said earlier?"
1602006-71 = "[s] \"No.\""
1602006-72 = "Geez, I was just joking."
1602006-77 = "So, how about this one?"
1602006-78 = "[s] \"I think I liked the one you were wearing before better.\""
1602006-79 = "Heh, you've got surprisingly clear preferences, don't you?"
1602006-80 = "Okay. Then I'll wear this one~"
1602006-82 = "(After that, I spent a fun time trying on various clothes with Otogi.)"