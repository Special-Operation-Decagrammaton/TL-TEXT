[translation]
1602006-1 = "O traje de camuflagem de uma atiradora"
1602006-2 = "Corgi Town - Entrada"
1602006-5 = "Ah, Sensei. Por aqui, por aqui.\r\n"
1602006-6 = "É a primeira vez que marcamos de nos encontrar fora da escola, então me sinto um pouco estranha."
1602006-7 = "Não estou atrapalhando seu dia de folga, estou?"
1602006-8 = "Parece que você esteve muito ocupado esta semana, Sensei..."
1602006-9 = "[s1] \"Eu também estava com vontade de fazer umas compras.\"\r\n[s2] \"E estou curiosa para ver como são os trajes de camuflagem da SRT.\""
1602006-12 = "...Ué? Você nunca viu?"
1602006-13 = "[s3] \"Eu já vi os trajes de camuflagem que as outras alunas usam, mas--\"\r\n[s4] \"Nunca vi uma loja especializada em trajes de camuflagem.\""
1602006-16 = "Ah, mas... ir agora para..."
1602006-17 = "Não é uma loja militar, é uma loja de roupas comum."
1602006-18 = "Para se camuflar na cidade, é mais eficaz modificar roupas comuns."
1602006-19 = "Pensei em usar o vale-presente que ganhei na última missão."
1602006-20 = "Hehe. Qual será a cor mais versátil, hein?"
1602006-21 = "[s5] \"Quando penso em traje de camuflagem, lembro daquele todo peludo...\"\r\n[s6] \"Esse tipo de roupa também serve para a cidade?\""
1602006-24 = "Ah, você fala do traje ghillie?"
1602006-25 = "Como ele tem uma estrutura de rede, em missões no mato a gente trança tecidos verdes, marrons ou folhas secas nele--"
1602006-26 = "Já em missões na cidade, onde há muitos anúncios coloridos, a gente usa tecidos de cores chamativas de propósito."
1602006-27 = "Às vezes usamos uniformes antigos para não chamar atenção no meio da multidão, mas..."
1602006-28 = "Agora que a escola foi fechada, uniformes são valiosos..."
1602006-29 = "Ah, acho que faz tempo que não faço um traje ghillie."
1602006-30 = "[s] \"...Parece dar bastante trabalho.\""
1602006-31 = "Claro que dá. A preparação para a missão precisa ser sempre perfeita."
1602006-32 = "Então, vamos dar uma olhada."
1602006-38 = "Hmm, essa roupa tem cores muito chamativas."
1602006-39 = "Essa aqui tem uma estampa que se destaca demais..."
1602006-40 = "Oh, essa pode ser boa. Combina perfeitamente com a cor do meu cabelo."
1602006-41 = "O que acha? Combina comigo?"
1602006-42 = "[s7] \"Sim...\"\r\n[s8] \"Ficou ótimo...\""
1602006-45 = "Hã? Que reação sem graça."
1602006-46 = "...Afinal, roupas fofas assim não combinam comigo, né?\r\n"
1602006-47 = "Não tem jeito. Vou ficar com um jeans ou veludo cotelê básico--"
1602006-48 = "[s9] \"N-não é isso que eu quis dizer!\"\r\n[s10] \"Eu achei que combinou muito bem com você...\""
1602006-51 = "Então, por que?"
1602006-52 = "[s] \"É um desperdício usar isso para fazer um traje de camuflagem.\""
1602006-53 = "Hã?"
1602006-54 = "O que você quer dizer com..."
1602006-59 = "Sensei, será que você entendeu errado?"
1602006-60 = "O \"traje de camuflagem\" que vim comprar hoje é uma roupa casual para usar em infiltrações."
1602006-61 = "Se eu andar por aí com um uniforme que ninguém conhece, vou chamar atenção, né?"
1602006-62 = "É um \"traje de camuflagem\" nesse sentido, não uma camuflagem de invisibilidade total."
1602006-63 = "Por mais que eu priorize as missões, eu não sairia rasgando minhas roupas casuais."
1602006-64 = "[ns] \"Fico aliviado que tenha sido um mal-entendido...\""
1602006-66 = "[ns11] \"Se você realmente precisa de um tecido para rasgar--\"\n[ns12] \"Pensei em te dar algumas das minhas roupas que não uso mais.\""
1602006-69 = "Ah, essa é uma boa ideia."
1602006-70 = "Posso cancelar o que eu disse agora há pouco?"
1602006-71 = "[s] \"Não pode.\""
1602006-72 = "Poxa, era só uma brincadeira."
1602006-77 = "E então, o que acha desta roupa?"
1602006-78 = "[s] \"Eu prefiro a que você estava usando antes.\""
1602006-79 = "Humm, você tem gostos bem definidos, hein."
1602006-80 = "Ok. Então, vamos vestir este aqui~"
1602006-82 = "(Depois disso, passei um tempo divertido experimentando várias roupas com a Otogi)"
