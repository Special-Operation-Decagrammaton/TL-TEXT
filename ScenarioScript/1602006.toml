[translation]
1602006-1 = "ある狙撃手の迷彩服"
1602006-2 = "コーギータウン・入口"
1602006-5 = "あ、先生。こっちこっち。\r\n"
1602006-6 = "外で待ち合わせするのは初めてだからか、なんか不思議な気分。"
1602006-7 = "せっかくの休み、邪魔しちゃってない？"
1602006-8 = "先生、今週はずっと忙しかったみたいだし……。"
1602006-9 = "[s1] \"ちょうど私もショッピングをしたい気分だから。\"\r\n[s2] \"SRTの迷彩服が、どんなものかも気になるし。\""
1602006-12 = "……あれ？見たことなかったっけ？"
1602006-13 = "[s3] \"他の生徒が着ている迷彩服は、見たことはあるけど――\"\r\n[s4] \"迷彩服専門店は、一度も見たことがなくて。\""
1602006-16 = "あ、でも……今から行くのって――"
1602006-17 = "ミリタリー専門じゃなくて普通のアパレルショップだよ。"
1602006-18 = "街中での「迷彩服」は、普通の服を改造するほうが効果的なんだぁ。"
1602006-19 = "この前の作戦でもらった商品券使おうと思って。"
1602006-20 = "ふふ。幅広く使える色は、どれかな～"
1602006-21 = "[s5] \"迷彩服と言って思い出す、あのモジャモジャの……。\"\r\n[s6] \"そういう服も、街中で使えるの？\""
1602006-24 = "あぁ、ギリースーツのこと？"
1602006-25 = "あれは網目の骨組みがあるから、茂みの中の作戦では緑や茶色の布や落ち葉を編みこんだり――"
1602006-26 = "原色の広告看板が多い街中の作戦では、あえて派手な色の布を使ったり。"
1602006-27 = "人混みでも目立たないように、使わなくなった制服で作ったりもするけど……。"
1602006-28 = "学園が閉鎖された今、制服って貴重だからなぁ……。"
1602006-29 = "ああ、しばらくギリースーツ作ってないかも。"
1602006-30 = "[s] \"……結構手間がかかるんだね。\""
1602006-31 = "そりゃそうだよ。作戦の準備は、いつでも完璧じゃなきゃね。"
1602006-32 = "んじゃ見に行こっか。"
1602006-38 = "うーん、この服は色が派手過ぎる。"
1602006-39 = "こっちは柄が目立つし……。"
1602006-40 = "お、これはいいかも。髪の色にぴったり。"
1602006-41 = "どう？似合う？"
1602006-42 = "[s7] \"うん……。\"\r\n[s8] \"いいね……。\""
1602006-45 = "え？リアクション、薄っ。"
1602006-46 = "……やっぱり、こういうフワフワした服は、私に合わないかなぁ。\r\n"
1602006-47 = "しょうがない。無難なデニムかコーデュロイで――"
1602006-48 = "[s9] \"そ、そういう意味じゃないんだ！\"\r\n[s10] \"本当によく似合ってると思ったんだけど……。\""
1602006-51 = "なら、どうして？"
1602006-52 = "[s] \"これで迷彩服を作るには、もったいないよ。\""
1602006-53 = "え？"
1602006-54 = "それって、どういう……。"
1602006-59 = "先生、もしかして勘違いしてる？"
1602006-60 = "今日買いに来た「迷彩服」は、潜入の時に着る私服だよ。"
1602006-61 = "見慣れない制服で歩いてたら目立つでしょ？"
1602006-62 = "そういう意味での「迷彩服」で、存在感ゼロレベルの偽装じゃないよ。"
1602006-63 = "いくら私が作戦重視だからって、私服を破いたりしないよ。"
1602006-64 = "[ns] \"勘違いなら良かった……。\""
1602006-66 = "[ns11] \"本当に引き裂く生地が必要なら――\"\n[ns12] \"着なくなった私の服をあげようかなって思って。\""
1602006-69 = "あ、それはいいアイデアかも。"
1602006-70 = "さっき言ったこと、取り消してもいい？"
1602006-71 = "[s] \"ダメです。\""
1602006-72 = "ちぇ、冗談なのに。"
1602006-77 = "んで、この服はどう？"
1602006-78 = "[s] \"私は、さっき着ていたほうが好きかな。\""
1602006-79 = "へぇ、意外と好みがはっきりしてるんだねぇ。"
1602006-80 = "オッケー。じゃあ、こっち着よ～"
1602006-82 = "（その後、オトギと一緒にいろんな服を試しながら楽しい時間を過ごした）"
