[translation]
104040-1 = "第4話;抵抗（３）"
104040-2 = "まずい、「抑制」時間の減少がまた加速してる……！"
104040-3 = "先程よりも速いです……！"
104040-4 = "4分58秒……4分11秒……3分19秒……！#nちょ、ちょっと速すぎない！？"
104040-9 = "残り、60秒――！！"
104040-10 = "加速している、ということは……"
104040-11 = "……トキ！！"
104040-14 = "はぁ……はぁ……"
104040-15 = "くっ……！"
104040-24 = "はぁ、はぁ……。"
104040-29 = "「箱舟」との連結さえ解除できれば、抑制状態を維持できる……#n早くしないと……トキが……！！"
104040-30 = "到着したわよ！#n今、「セキュリティシステム」の前！！"
104040-31 = "美食研究会……お願いします！！"
104040-32 = "さあ皆さん、セキュリティシステムの「解除装置」を破壊してくださいな！"
104040-33 = "ホシノ先輩、今です！！"
104040-34 = "ゲーム開発部、今よ……！"
104040-37 = "了解～、待ってました！"
104040-38 = "はい！東側の解除装置、破壊完了です☆"
104040-41 = "光よ――――！"
104040-46 = "に、西側の解除装置も、破壊完了です……！"
104040-51 = "うふふっ、セキュリティシステムが開きました。"
104040-52 = "わわっ、アレを壊せばいいんだよね？"
104040-53 = "急ぐわよ！！これ、5秒で閉まっちゃうんだからね！？"
104040-54 = "では、フィナーレをお願いします、アカリさん。"
104040-55 = "ふふっ。ついにドッカ～ン★をする時間ですね。"
104040-56 = "急いで……！#n時間がもう――"
104040-57 = "「多次元解釈」の抑制終了まで残り、9秒……！"
104040-58 = "うう……。"
104040-59 = "早く……！"
104040-63 = "装填完了、 照準合わせます……！"
104040-64 = "スペシャルな一発、行きます！"
104040-65 = "……残り7秒！"
104040-73 = "きた！端末、破壊！！"
104040-74 = "熱いうちに召し上がれ～"
104040-75 = "うああ、熱すぎるよ～！？"
104040-76 = "連結を解除して！！"
104040-77 = "……1秒！！"
104040-78 = "連結、解除！！"
104040-85 = "連結解除、承認！！"
104040-86 = "……！#n「抑制」が安定化したわ！！"
104040-90 = "……。"
104040-98 = "……どう、なったのでしょうか？"
104040-99 = "い、イケた？"
104040-100 = "……はい。成功しました。"
104040-101 = "やったわ！！連結解除、完了よ！！！"
104040-102 = "ふぅ……。"
104040-103 = "はぁ……。"
104040-104 = "ひゃー……10年くらい、寿命縮んだ……。"
104040-110 = "次回;安易な解"
