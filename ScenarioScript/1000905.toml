[translation]
1000905-1 = "ついつい"
1000905-4 = "（イズミと待ち合わせて、ラーメン屋に向かう途中）"
1000905-5 = "今日はっ、どんなメニューを～選ぼっかな～？"
1000905-6 = "イチゴジャムは何にでも～合～うから～それはもちろんとして～♪"
1000905-7 = "豚骨～、醬油～、味噌バターも捨てがたいな～！ルンルン～♪"
1000905-9 = "ニャ～。"
1000905-11 = "あっ、猫ちゃんだ。"
1000905-12 = "ニャオーン……。"
1000905-13 = "わ、可愛い～。"
1000905-14 = "この子、ずっとほっぺをこすりつけてくる～、なんでだろ？"
1000905-15 = "[s] \"多分、お腹が空いてるんじゃないかな。\""
1000905-16 = "なるほど、あなたもお腹が空いてるの～？じゃあ……あ、私、今何も持ってなかった……。"
1000905-17 = "[s] \"任せて。\""
1000905-19 = "……猫用おやつの「にゅ～る」？"
1000905-20 = "ニャッ、ニャッ、ニャーー。"
1000905-21 = "[s] \"どうぞ。\""
1000905-24 = "ペロペロペロ……。"
1000905-27 = "あっ、食べた食べた。すっごく美味しそうに食べるね～？"
1000905-28 = "ニャー。"
1000905-29 = "ニャーニャー。"
1000905-30 = "他の子たちも集まってきたよ！先生すごい！"
1000905-31 = "[s] \"みんな、これが好きなのかもね。\""
1000905-32 = "おー……。"
1000905-33 = "ペロペロ……。"
1000905-34 = "ペロペロペロ……。"
1000905-35 = "ペロペロペロペロ……！"
1000905-36 = "……（じーっ）。"
1000905-37 = "[s] \"イズミもあげてみる？……イズミ？\""
1000905-38 = "ペロペロペロペロ……！"
1000905-39 = "……じゅるり。"
1000905-40 = "[s] \"イズミ！？えっと、もしかして……。\""
1000905-41 = "うぅっ、もう耐えられないっ！はむっ！"
1000905-42 = "[s1] \"ちょっ、イズミそれ猫用のおやつ！\"\n[s2] \"なんで食べてるの！？\""
1000905-43 = "あっ、そ、その、これは……！"
1000905-44 = "あっ、そ、その、これは……！"
1000905-50 = "― ね、[wa:500]猫ちゃんたちが"
1000905-52 = "― あまりにも[wa:500]美味しそうに[wa:500]食べてたから、[wa:650]つい……！"
1000905-55 = "― って、[wa:200]ふえええっ？！[wa:750]ま、[wa:250]待って！"
1000905-57 = "― 引っ掻かないで～！"
1000905-60 = "― 何でぇ～！？[wa:700]猫ちゃんたちが[wa:600]襲ってくる～！"
1000905-63 = "[ns3] \"おやつを横取りされたら怒るのは当然だよ！\"\n[ns4] \"そもそもそれ、人の食べ物じゃないよ！？\""
1000905-64 = "― だ、[wa:500]だって！[wa:500]すごく[wa:250]美味しそうだったんだもん！"
1000905-65 = "― だ、[wa:500]だって！[wa:500]すごく[wa:250]美味しそうだったんだもん！"
1000905-68 = "― そ、[wa:300]それに！[wa:850]私、[wa:500]美食研究会の[wa:750]一員だし！"
1000905-70 = "― 気になったものは[wa:800]まず食べてみないと！"
1000905-73 = "[ns] \"猫のおやつもその範疇なんだ……。\""
1000905-74 = "[wa:650]― おまけにこれ[wa:1350]「ツナ味」、[wa:850]「高級」って[wa:800]書いてあるし……！"
1000905-77 = "― こんな良いものを"
1000905-79 = "― あなたたちだけで[wa:500]食べるなんて[wa:400]許せない！"
1000905-82 = "[wa:100]― 美味しいものは、[wa:950]一緒に分け合って食べないと！"
1000905-85 = "― あ[wa:250]痛！[wa:650]だ、[wa:300]だから[wa:300]ごめんってば！"
1000905-87 = "[wa:100]― でも、[wa:900]もう[wa:350]食べちゃったものは[wa:950]仕方ないよね……？"
1000905-90 = "― ふええ！[wa:650]噛まないで～！"
1000905-93 = "（その後もしばらくイズミは猫たちと揉め続け、「にゅ～る」を3つほどあげた辺りでようやく許してもらえた）"
