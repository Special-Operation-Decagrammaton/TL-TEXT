[translation]
1000905-1 = "Sem querer"
1000905-4 = "（A caminho da loja de lámen, encontrando a Izumi）"
1000905-5 = "Hoje, qual será o menu que eu vou escolher~?"
1000905-6 = "Geleia de morango combina com tudo, então isso é obrigatório, claro~♪"
1000905-7 = "Tonkotsu, shoyu, manteiga com missô... é difícil escolher! La la la~♪"
1000905-9 = "Miau."
1000905-11 = "Ah, um gatinho."
1000905-12 = "Miau..."
1000905-13 = "Ah, que fofo~."
1000905-14 = "Esse gatinho não para de esfregar a bochecha em mim... por que será?"
1000905-15 = "[s] \"Talvez ele esteja com fome.\""
1000905-16 = "Entendi, você também está com fome~? Então... ah, eu não trouxe nada comigo agora..."
1000905-17 = "[s] \"Deixa comigo.\""
1000905-19 = "...Petisco para gatos, 'Nyuuru'?"
1000905-20 = "Miau, miau, miauuu."
1000905-21 = "[s] \"Aqui está.\""
1000905-24 = "Lamber, lamber, lamber..."
1000905-27 = "Ah, ele comeu. Ele parece estar achando muito gostoso, né?"
1000905-28 = "Miau."
1000905-29 = "Miau, miau."
1000905-30 = "Outros gatinhos também se reuniram! Sensei, você é incrível!"
1000905-31 = "[s] \"Talvez eles gostem disso.\""
1000905-32 = "Oh..."
1000905-33 = "Lamber..."
1000905-34 = "Lamber, lamber..."
1000905-35 = "Lamber, lamber, lamber...!"
1000905-36 = "...(encarando)."
1000905-37 = "[s] \"Izumi, quer dar um pouco também? ...Izumi?\""
1000905-38 = "Lamber, lamber, lamber, lamber...!"
1000905-39 = "...Glup."
1000905-40 = "[s] \"Izumi!? Espera, será que...\""
1000905-41 = "Ugh, não aguento mais! Nhac!"
1000905-42 = "[s1] \"Ei, Izumi, isso é petisco de gato!\"\n[s2] \"Por que você está comendo isso!?\""
1000905-43 = "Ah, b-bem, isso é...!"
1000905-44 = "Ah, b-bem, isso é...!"
1000905-50 = "― É que, [wa:500] os gatinhos"
1000905-52 = "― estavam comendo de um jeito [wa:500] tão gostoso, [wa:650] que eu acabei...!"
1000905-55 = "― Quer dizer, [wa:200] eitaaa?! [wa:750] E-espera!"
1000905-57 = "― Não me arranhem~!"
1000905-60 = "― Por queee~?! [wa:700] Os gatinhos [wa:600] estão me atacando~!"
1000905-63 = "[ns3] \"É claro que eles vão ficar bravos se você roubar o petisco deles!\"\n[ns4] \"E, para começo de conversa, isso não é comida de gente!\""
1000905-64 = "― M-mas! [wa:500] Parecia [wa:500] tão [wa:250] gostoso!"
1000905-65 = "― M-mas! [wa:500] Parecia [wa:500] tão [wa:250] gostoso!"
1000905-68 = "― A-além disso! [wa:850] Eu sou [wa:500] um membro do [wa:750] Clube de Pesquisa Gourmet!"
1000905-70 = "― Se algo me desperta curiosidade, [wa:800] eu preciso provar!"
1000905-73 = "[ns] \"Então petisco de gato também entra nessa categoria...\""
1000905-74 = "[wa:650] ― E ainda por cima, [wa:1350] está escrito [wa:850] 'sabor atum' e [wa:800] 'premium'...!"
1000905-77 = "― Como vocês podem comer"
1000905-79 = "― uma coisa tão boa [wa:500] sozinhos, [wa:400] isso não é justo!"
1000905-82 = "[wa:100] ― Coisas gostosas [wa:950] devem ser compartilhadas!"
1000905-85 = "― A[wa:250]i! [wa:650]E, [wa:300]eu já disse [wa:300]que sinto muito!"
1000905-87 = "[wa:100]― Mas, [wa:900]não tem como [wa:350]voltar atrás depois de [wa:950]ter comido, né...?"
1000905-90 = "― Uééé! [wa:650]Não me morda~!"
1000905-93 = "(Depois disso, Izumi continuou discutindo com os gatos por um tempo, e só foi perdoada quando deu a eles uns três \"Nyur\".)"
