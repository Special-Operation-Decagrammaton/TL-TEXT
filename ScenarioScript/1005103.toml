[translation]
1005103-1 = "Mass Games de Paixão"
1005103-2 = "Millennium - Campo nº 12"
1005103-3 = "（Cheguei ao campo indicado pela Utaha）"
1005103-8 = "Bom trabalho, Sensei."
1005103-9 = "Obrigada por vir hoje, mesmo sendo um pedido de última hora."
1005103-10 = "[s]\"Ouvi dizer que você estava se esforçando, Utaha.\""
1005103-11 = "Ah. Recebi um pedido repentino para criar robôs de torcida. Fiquei surpresa no início, mas..."
1005103-12 = "Eu achava que grupos de torcida serviam apenas para eventos esportivos... mas descobri que há muitas pessoas que precisam do poder da torcida em qualquer situação.#n"
1005103-13 = "Desde alunos se preparando para a eleição do conselho estudantil, até o dono de uma loja de ramen preocupado com as vendas..."
1005103-14 = "Que grupos de torcida pudessem ser úteis no cotidiano, longe das competições... eu não conseguia entender no começo."
1005103-15 = "Mas percebi que este cotidiano, aparentemente pacífico, é um campo de batalha para alguém.#n――E que há muitas pessoas que precisam de torcida para lutar lá."
1005103-16 = "Bem, mesmo que eu não entenda o conteúdo, o lema do nosso Clube de Engenharia é dar o nosso melhor em qualquer pedido que recebemos!"
1005103-17 = "Bem, está na hora de revelar os robôs de torcida."
1005103-18 = "[s1]\"Falando nisso, por que no campo...?\"\n[s2]\"Por que esse uniforme escolar...?\""
1005103-19 = "...Claro, seria mais fácil na oficina.#nNão precisaríamos carregar os equipamentos e, se algo desse errado, poderíamos consertar na hora."
1005103-20 = "Mas, já que é uma \"torcida\", achei que o campo teria uma atmosfera melhor."
1005103-21 = "Hehe... Falando em torcida, pensamos logo em grupos de torcida.#n――Ou seja, uniforme escolar, não é?"
1005103-22 = "Além disso, eu lavei o uniforme hoje..."
1005103-23 = "Dizer que uma torcida é satisfatória é um problema difícil de quantificar, já que envolve sentimentos."
1005103-24 = "Por isso, quero que você, Sensei, me diga o que sentiu como espectador."
1005103-25 = "[s3]\"Isso está ficando interessante.\"\n[s4]\"Que tipo de torcida você vai mostrar?\""
1005103-26 = "Hehe... Você pediu para o Clube de Engenharia, afinal.#nUma torcida comum não teria graça, certo?"
1005103-27 = "Hehe... Você pediu para o Clube de Engenharia, afinal.#nUma torcida comum não teria graça, certo?"
1005103-28 = "Então, vasculhando as estantes da biblioteca de Millennium,#ndescobri um estilo de torcida que quase não é mais usado."
1005103-29 = "É o... Mass Games."
1005103-30 = "[s]\"Mass Games?\""
1005103-31 = "Mass Games é uma performance de grupo.#nCada pessoa atua como um pixel, levantando cartões coloridos para formar uma grande imagem."
1005103-32 = "Geralmente, usavam apenas cores sólidas para formar letras ou desenhos. Mas, com a coordenação de um grupo de torcida experiente, é um método cheio de possibilidades, capaz até de criar animações ao virar os painéis."
1005103-33 = "No entanto, ouvi dizer que foi descartado por ser menos eficiente que painéis eletrônicos e ter um custo humano muito alto."
1005103-34 = "...Segundo os livros, a última vez que foi realizado foi há 10 anos.#nDizem que era feito na Academia Red Winter, mas os alunos se rebelaram, fizeram um golpe de estado e o evento foi encerrado."
1005103-35 = "[s]\"...Não sabia que tinha acontecido isso.\""
1005103-36 = "Ah... Mas com a capacidade técnica do Clube de Engenharia, isso não importa."
1005103-42 = "Eu queria mostrar ao Sensei um Mass Games de Millennium, onde os robôs ganham vida."
1005103-43 = "Vamos, Sensei. A arquibancada é por ali!"
1005103-46 = "[wa:1050]― Rah! [wa:750]Rah! [wa:900]Millennium!"
1005103-49 = "― Vamos! Vamos! [wa:550]Vencer! Vencer! [wa:650]Millennium!"
1005103-52 = "[wa:200]― Hehe... [wa:1100]O que achou, [wa:650]Sensei?"
1005103-54 = "― Não acha que é uma visão incrível?"
1005103-57 = "― Neste Mass Games, [wa:1000]estamos usando robôs"
1005103-59 = "― equipados com [wa:750]dispositivos Bluetooth de última geração,"
1005103-62 = "― então, não importa o quão complexa seja a coreografia,"
1005103-64 = "― podemos [wa:300]executá-la com perfeição."
1005103-67 = "[wa:100]― ...Hm?"
1005103-69 = "― Se é para usar máquinas [wa:950]na performance,"
1005103-72 = "― não seria mais eficiente"
1005103-74 = "― instalar um telão?"
1005103-77 = "[wa:850]― Sensei, [wa:1150]pare com esse papo sem romance."
1005103-79 = "― A visão de painéis analógicos [wa:650]se movendo em uníssono para completar a imagem,"
1005103-82 = "― tem um impacto e uma emoção"
1005103-84 = "― que um telão jamais conseguiria [wa:1250]superar."
1005103-87 = "[wa:800]― Originalmente, [wa:700] o romance que nos proporciona momentos de tirar o fôlego,"
1005103-89 = "― É algo que está [wa:450] muito longe da \"eficiência\", não é?"
1005103-92 = "……Finalmente, vamos mostrar ao Sensei a última funcionalidade."
1005103-93 = "Afinal, o ponto alto de um show de mosaico humano é a animação que muda de expressão durante a performance."
1005103-94 = "Como era feito manualmente, era inevitável que o tempo ficasse desalinhado, por isso era algo que acompanhava apenas músicas de torcida lentas."
1005103-95 = "No entanto, se sincronizarmos usando a mais recente tecnologia sem fio, teoricamente podemos transmitir imagens a 60 quadros por segundo."
1005103-99 = "Muito bem, então…… lá vamos nós!"
1005103-109 = "……Ué? Explodir logo no primeiro quadro……"
1005103-110 = "Será que a durabilidade das articulações não aguentou o movimento na velocidade do som……?"
1005103-111 = "Preparei tudo com tanto esforço…… que pena."
1005103-112 = "[s]\"Mas foi um experimento divertido, não foi?\""
1005103-113 = "……É verdade. Como foi divertido, vamos ficar satisfeitos com isso."
1005103-114 = "Graças a isso, hoje foi uma ótima oportunidade para testar o algoritmo de controle simultâneo de robôs utilizando tecnologia sem fio."
1005103-115 = "Um mestre talentoso aprende mais com o fracasso do que com o sucesso, afinal."
1005103-116 = "O problema é o impacto nas articulações…… onde será que devo modificar……"
1005103-117 = "Será que resolveria se eu limitasse a exibição da imagem a 30 quadros?"
1005103-121 = "[ns]\"O problema não é a quantidade de quadros, né……?\""
