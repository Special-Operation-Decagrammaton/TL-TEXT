[translation]
1005103-1 = "情熱のマスゲーム"
1005103-2 = "ミレニアム・第12グラウンド"
1005103-3 = "（ウタハに指定されたグラウンドに到着）"
1005103-8 = "お疲れさま、先生。"
1005103-9 = "急なお願いだったのに、今日も来てくれてありがとう。"
1005103-10 = "[s]\"ウタハが頑張ってると聞いたからね。\""
1005103-11 = "ああ。急に応援ロボットの制作依頼が舞い込んできてね。最初は私も驚いたのだが……。"
1005103-12 = "応援団というのは、競技の応援をしてこそだと思っていたのだけど……#nシーンを問わずに応援の力を必要とする者が大勢いると分かったのさ。"
1005103-13 = "会長選挙を控えた生徒から、売上に悩むラーメン屋の大将まで……。"
1005103-14 = "競技から離れた日常で応援団が活躍できるだなんて……最初は理解できなかった。"
1005103-15 = "でも、この一見平和な日常も、誰かにとっての戦場であるのだと気づいたんだ。#n――そこで戦うために応援して欲しい人がこんなにもいるのだと。"
1005103-16 = "いや、たとえ内容が理解できなかったとしても、受けた依頼には全力で取り組むのが、私たちエンジニア部のモットーだ！"
1005103-17 = "さあ、そろそろ応援ロボットのお披露目をしようか。"
1005103-18 = "[s1]\"そういえば、どうしてグラウンドに……？\"\n[s2]\"どうして学ランを……？\""
1005103-19 = "……もちろん、作業室の方が楽だよ。#n機材を運ぶ必要もないし、問題が起きてもすぐに修理できるからね。"
1005103-20 = "けれど仮にも「応援」なのだから、グラウンドのほうが雰囲気があると思ったのさ。"
1005103-21 = "ふふっ……応援といえば応援団。#n――つまり、学ランだろう？"
1005103-22 = "それに、今日は学ランを洗ってきたから……。"
1005103-23 = "満足のいく応援といっても、感性が関わる領域だから数値化が難しい問題だ。"
1005103-24 = "そこで先生には、観客として感じたことを教えてほしい。"
1005103-25 = "[s3]\"面白くなってきたね。\"\n[s4]\"どんな応援を見せてくれるの？\""
1005103-26 = "ふふ……わざわざエンジニア部に依頼しているんだ。#nありきたりの応援では面白くないだろう？"
1005103-27 = "ふふ……わざわざエンジニア部に依頼しているんだ。#nありきたりの応援では面白くないだろう？"
1005103-28 = "そこで、ミレニアムの書架を漁っていたら、#n今はあまり使われなくなってしまった応援スタイルを知ったんだ。"
1005103-29 = "それが……マスゲームさ。"
1005103-30 = "[s]\"マスゲーム？\""
1005103-31 = "マスゲームというのは、集団演技のことでね。#n各々がマスとして色付きのカードを掲げて、大きな一つの絵を描くパフォーマンスなんだ。"
1005103-32 = "一般的には単色で文字や絵を表現する程度だった。#nだが、熟練の応援団の連携をもってすれば、様々な色彩やボードをめくるアニメーションの表現も可能という、可能性に満ちた手法なのだよ。"
1005103-33 = "しかし、電光掲示板と比べて非効率的で、ヒューマンコストの高さから淘汰されてしまったと聞く。"
1005103-34 = "……本によると、10年前に行われたのが最後だ。#nレッドウィンター連邦学園で行われていたものの、生徒が反発してクーデターを起こしてしまい、幕を閉じたのだとか。"
1005103-35 = "[s]\"……そんなことがあったんだ。\""
1005103-36 = "ああ……でも、エンジニア部の技術力をもってすれば関係ないよ。"
1005103-42 = "ロボットたちが躍動するミレニアムのマスゲームを、先生に見せたくてね。"
1005103-43 = "さあ、先生。観客席はあちらだよ！"
1005103-46 = "[wa:1050]― フレー！[wa:750]フレー！[wa:900]ミレニアム！"
1005103-49 = "― 行け！行け！[wa:550]勝て！勝て！[wa:650]ミレニアム！"
1005103-52 = "[wa:200]― ふふ…… [wa:1100]どうだい、[wa:650]先生？"
1005103-54 = "― すごい光景だと思わないか？"
1005103-57 = "― このマスゲームには、[wa:1000]新型ブルートゥース装置を"
1005103-59 = "― 搭載したロボットを[wa:750]使用しているから、"
1005103-62 = "― どんなに複雑な振付でも"
1005103-64 = "― 完璧に[wa:300]演出することができるんだ。"
1005103-67 = "[wa:100]― ……うん？"
1005103-69 = "― 演出に機械を[wa:950]使用するぐらいなら、"
1005103-72 = "― スクリーンを設置したほうが"
1005103-74 = "― 効率的なのではないのかって？"
1005103-77 = "[wa:850]― 先生、[wa:1150]ロマンのない話は辞めたまえ。"
1005103-79 = "― アナログのパネルが[wa:650]一斉に動いて完成される光景には、"
1005103-82 = "― スクリーンとは"
1005103-84 = "― 比べ物にならないほどの[wa:1250]迫力と感動があるんだよ。"
1005103-87 = "[wa:800]― 元来、[wa:700]胸高鳴る瞬間を与えるロマンは、"
1005103-89 = "― 「効率」とは[wa:450]程遠いものだからね。"
1005103-92 = "……いよいよ、先生に最後の機能を見てもらおう。"
1005103-93 = "何と言ってもマスゲームの醍醐味は、演技の過程で表現を変えるアニメーションにある。"
1005103-94 = "従来は人の手で行う以上、どうしてもタイミングがズレてしまうから、ゆっくりとした応援歌に合わせるものだった。"
1005103-95 = "しかし、最新の無線技術を利用して同期すれば、理論上1秒に60フレームで映像を送り出せる。"
1005103-99 = "よし、それでは……行くぞ！"
1005103-109 = "……あれ？1フレーム目で爆発してしまうとは。"
1005103-110 = "音速で動くとなると、関節の耐久度に難があったのか……。"
1005103-111 = "せっかく用意したのに……残念だ。"
1005103-112 = "[s]\"でも、楽しい実験だったね。\""
1005103-113 = "……そうだね。楽しかったから、これで満足としよう。"
1005103-114 = "おかげで今日は、無線技術を活用したロボットの同時制御アルゴリズムを試す良い機会になったよ。"
1005103-115 = "優秀なマイスターは、成功よりも失敗から学びを得ていくものだからね。"
1005103-116 = "問題は関節にかかる衝撃……どこを改造するか……"
1005103-117 = "映像の表示回数を30フレームに抑えれば解決できるだろうか？"
1005103-121 = "[ns]\"フレーム数の問題じゃなくない……？\""
