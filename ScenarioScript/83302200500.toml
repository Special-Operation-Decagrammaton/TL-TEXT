[translation]
83302200500-6 = "うわあああん！助けてくださってありがとうございます、ヒナさん～！"
83302200500-12 = "とりあえず「怪物」は倒したけど……"
83302200500-13 = "いったい何があったの？"
83302200500-14 = "えっと……それがですね……"
83302200500-15 = "その……"
83302200500-16 = "フウカ先輩が連れ去られてしまって……！"
83302200500-17 = "「私が帰るまで待ってて」と言われたんですが……"
83302200500-18 = "万魔殿に料理を納品する日まで時間が無かったので……"
83302200500-19 = "納品日を守れなかったら、それを理由にまた給食部の予算が削られるんじゃないかと思い……！"
83302200500-20 = "ジュリ、落ち着いて。話を整理させてもらえる？"
83302200500-27 = "ジュリの話をまとめると……"
83302200500-28 = "よりにもよって、料理の納品日目前で……"
83302200500-29 = "くすん……はい。"
83302200500-30 = "フウカが美食研究会に誘拐されてしまった、と。"
83302200500-31 = "……はぁ、何度目かしら。"
83302200500-32 = "くすん。はい、そうです……"
83302200500-33 = "けど、どうにか納品日に間に合わせようと思って、ジュリが一人で頑張ったのね。"
83302200500-34 = "それで温泉開発部の部長に、給食部の地下水にすごい効果があると聞いて……"
83302200500-35 = "温泉卵を作るために使ったら……"
83302200500-36 = "あの「怪物」が誕生した、という流れで合ってる？"
83302200500-38 = "ううっ……くすん……はい、そうです……！全部、私のせいで……！"
83302200500-39 = "（マコトがおかしくなった原因は、ジュリの作った料理を食べたから、か……）"
83302200500-40 = "うわあぁぁん～！すみません！ヒナさん～！フウカ先輩～！"
83302200500-41 = "いや、ジュリが謝る必要は無い。"
83302200500-42 = "多少の問題はあったけど、あなたなりに頑張ろうとしたのでしょう？"
83302200500-43 = "ヒナさん……！"
83302200500-44 = "……でも、そうね。フウカが誘拐されたままじゃ私も困る。"
83302200500-45 = "話してくれて助かったわ。すぐフウカを助けに行くから、心配しないで。"
83302200500-46 = "はい！ありがとうございます！お願いします、ヒナさん！"
