[translation]
1000805-1 = "ネルのお見舞い"
1000805-2 = "シャーレ・先生の部屋"
1000805-3 = "（風邪を引いてしまって、全然動けない）"
1000805-4 = "（当番の生徒か病院に連絡しないと……と思ったその時）"
1000805-5 = "（ピンポ～ン）"
1000805-6 = "……？"
1000805-7 = "[s1] ″どちら様ですか？″\n[s2] 無視する。"
1000805-8 = "（ドゴオオォォ――ン！！）"
1000805-9 = "（ドゴオオォォ――ン！！）"
1000805-10 = "……！！？"
1000805-11 = "（ドアが爆発した）"
1000805-15 = "へっ、やっぱりここにいたか。"
1000805-17 = "よお、先生。"
1000805-18 = "体調悪いんだって？噂を聞いてきたぜ！"
1000805-20 = "[ns3] ″いったいどうして分かったの？″\n[ns4] ″学校はどうしたの？出席日数危ないんでしょ？″"
1000805-21 = "ああ、そんなくだらないことは気にするな。"
1000805-22 = "ああ、そんなくだらないことは気にするな。"
1000805-23 = "まあ出席日数はちょっと危ねえけど……。"
1000805-24 = "先生が体調崩してるのに、呑気に学校に行けるはずねぇだろ。"
1000805-25 = "それより、ほら。薬と食料。"
1000805-26 = "言っただろ、借りは返すって。"
1000805-27 = "今日がまさにその日だ！"
1000805-29 = "ははっ、先生。風邪引くなんて、気合が足りねぇな。"
1000805-30 = "……あ？ちょっと前までそっちも風邪引いてたでしょ、って？"
1000805-31 = "なんだそりゃ、覚えてねぇな。"
1000805-32 = "まあ、とにかくその、安心しろ。"
1000805-33 = "気合が足りねぇなら、あたしがどんどん注入してやる！"
1000805-34 = "[s5] \"不安。\"\n[s6] \"お願いだから、病院に行かせてほしい。\""
1000805-35 = "あぁん？不安がってんじゃねぇよ、あたしを信じろ。"
1000805-36 = "あぁん？不安がってんじゃねぇよ、あたしを信じろ。"
1000805-37 = "あたしはメイド部の部長だぞ、その意味が分かるか？"
1000805-38 = "つまり、メイドとしてのあたしの能力も、ミレニアム最強だ。"
1000805-39 = "看病もまたメイドの心得の一つだからな。"
1000805-40 = "心配すんな、看病には慣れ……てはいねぇけど、頭ん中のイメージトレーニングで一回やってみたことあっから。"
1000805-41 = "[s7] \"イメージトレーニング……？\"\n[s8] \"……一回？\""
1000805-42 = "さて、とりあえずおかゆでも作ってみるか。"
1000805-43 = "さて、とりあえずおかゆでも作ってみるか。"
1000805-44 = "[s] 不安……。"
1000805-46 = "（30分後）"
1000805-47 = "よっし！完成！"
1000805-48 = "待たせたな！"
1000805-49 = "これぞ[ruby=みかも]美甘[/ruby]ネル特製、「気合注入粥」、だっ！"
1000805-50 = "これさえあれば風邪なんか一発！"
1000805-51 = "[s] \"赤い液体が沸騰してるけど？\""
1000805-52 = "ははっ！特製ラー油をたっぷり入れたからな！"
1000805-53 = "心配すんな。カロリーだけは保証する。"
1000805-54 = "[s] \"味と健康の部分も保証して……。\""
1000805-55 = "あぁん！？文句言ってんじゃねぇ！好き嫌いは子供のすることだ！#n先生はもう大人だろうが！"
1000805-56 = "いつか同じのを食べたうちの部員も、一口食べたら嬉しくて踊り狂ったくらいだったから、心配するな。"
1000805-57 = "[s9] 食べる。\n[s10] 食べる！\n[s11] 食べ……る……？"
1000805-58 = "（他の選択肢は存在しなかった）"
1000805-59 = "（他の選択肢は存在しなかった）"
1000805-60 = "（他の選択肢は存在しなかった）"
1000805-61 = "（ごっくん）"
1000805-62 = "……？"
1000805-63 = "[s12] ″美味しい！？″\n[s13] 踊る。"
1000805-64 = "はは！どうだ！な！？美味いだろ！？"
1000805-65 = "はは！どうだ！な！？美味いだろ！？"
1000805-66 = "メイド部の部長はダテじゃねぇからな。"
1000805-68 = "辛いおかゆを食べて、汗をいっぱいかいたら、風邪はすぐに治った。"
