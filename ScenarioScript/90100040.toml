[translation]#[Texto Final. - Filipe 05/07.]
90100040-1 = "Episódio 4: A Nova Base de Operações"
90100040-2 = "Corredor subterrâneo da Schale"
90100040-5 = "Beleza, viemos junto com o Sensei\nde volta pra Schale, mas……"
90100040-6 = "que lugar…… é esse?"
90100040-11 = "Eu nem sabia que existia uma área dessas."
90100040-12 = "Pois é. Da outra vez a gente veio pela rota\nmais curta até o alvo, então……"
90100040-13 = "[s1] \"Foi mal, tá meio escuro, né?\"\n[s2] \"É um subsolo pouco usado…… aguentem só mais um pouquinho.\""
90100040-16 = "Estamos acostumadas a lugares escuros\npelas operações."
90100040-17 = "Mas esta escada…… até onde ela vai?#nNão sabia que o subsolo da Schale\nera tão profundo."
90100040-18 = "[s] \"Nunca desci até aqui, então também não sei direito……\""
90100040-21 = "[ns] \"Cabe até tanque aqui embaixo, deve ter mais de 3 andares.\""
90100040-22 = "A ponto de nem o Sensei conhecer……#nQue estrutura é essa que a Schale tem?"
90100040-23 = "Devíamos ter feito um mapa detalhado\nna última infiltração……"
90100040-24 = "A gente só não teve tempo de conferir,\nné……?#nO Sensei vive ocupado."
90100040-25 = "……Ah, isso me lembra um negócio\nque eu vi nas redes sociais."
90100040-26 = "Que bem no fundo do subsolo da Schale tem\numa sala secreta aonde nem as alunas de\nplantão podem chegar perto,#ne que aluna que desobedece o Sensei é\ntrancada lá e recebe Castigo toda noite――"
90100040-27 = "Fácil de vigiar, difícil de escapar. Para\ninterrogar prisioneiros, o subsolo da\nSchale seria ideal."
90100040-28 = "Isso não é exagero demais?#nE ainda esse \"Castigo\"……"
90100040-29 = "Não, pera. Vai que esse boato…… é real."
90100040-30 = "Uma aluna de Gehenna me contou uma vez,\nquando a gente colhia informações\nna cidade."
90100040-31 = "Que no armário pessoal do Sensei tem\ncoleira, algema e roupa de enfermeira."
90100040-32 = "Quê……"
90100040-33 = "Se esse boato for verdade, temos um problema\nurgente pra resolver."
90100040-37 = "Q-Qual?"
90100040-38 = "……O sutiã com enchimento da FOX3\npode ser descoberto pelo Sensei."
90100040-39 = "Parece que o Sensei ainda não notou. Pela\nhonra da FOX3, é melhor batermos em\nretirada agora――"
90100040-40 = "P-Por que EU entrei nessa história?!"
90100040-41 = "Oho…… quer dizer que o enchimento\nvocê não nega?"
90100040-42 = "……FOX3, FOX4. Nós temos com o Sensei\n[USERNAME] uma dívida impagável."
90100040-43 = "Se algo nos for exigido, recusar e fugir\nseria contra qualquer princípio."
90100040-44 = "……Perto disso, a situação íntima da Kurumi\né um problema irrisório."
90100040-45 = "Ei!! Yukino!!"
90100040-49 = "[ns3] \"Que animação aí atrás……\"\n[ns4] \"Sobre o que estão falando?\""
90100040-53 = "N-Nada…… não é nada, não."
90100040-54 = "É a primeira saída em muito tempo,\nacho que deu uma empolgada nelas."
90100040-55 = "[s] \"Ah, então tá……\""
90100040-59 = "[ns] \"Prontinho, chegamos.\""
90100040-63 = "Isto é……"
90100040-65 = "[ns5] \"O QG de operações do Esquadrão FOX!\"\n[ns6] \"Arrumei às pressas, então ainda tá meio bagunçado……\""
90100040-68 = "Q-Que sala impressionante. Existir um lugar\nassim no subsolo da Schale……"
90100040-69 = "Estrutura à prova de explosão,\naté servidor independente……"
90100040-70 = "Com tudo isso, dá pra montar operações do\nmesmo porte de quando a Academia\nSRT existia."
90100040-71 = "Sensei, que lugar é este……"
90100040-72 = "[s7] \"Uma sala de servidores antiga, fora de uso.\"\n[s8] \"Eu também não conhecia até a Presidente do Conselho me contar.\""
90100040-77 = "[ns9] \"Então nenhuma aluna de plantão deve saber daqui.\"\n[ns10] \"Podem usar sem medo, pra manutenção ou descanso.\""
90100040-81 = "……Foi a Presidente do Conselho\nquem providenciou."
90100040-82 = "Montar uma base provisória onde nenhum aluno\ncomum entra, e caçar o fenômeno anômalo\nque ameaça Kivotos……"
90100040-83 = "De fato, para receber o apoio do Sensei\nlonge dos olhos dos alunos,#nficar no subsolo da Schale é\na melhor opção."
90100040-84 = "Ainda assim, ocupar o espaço do Sensei\ncom a nossa operação…… me deixa\num tanto encabulada."
90100040-89 = "[ns] \"A operação não é só de vocês.\""
90100040-90 = "……Como assim?"
90100040-91 = "[s11] \"A SRT resolve os 'problemas de Kivotos', não é?\"\n[s12] \"Então esta operação é por toda a Kivotos.\""
90100040-97 = "Há tempos eu queria perguntar……"
90100040-98 = "Os alunos não costumam te chamar\nde \"suspeito\"?"
90100040-99 = "[s] \"Já rolou algumas vezes……?\""
90100040-100 = "Se há uma carne apetitosa exposta de forma\ntão evidente, alguns animais\nficam desconfiados."
90100040-101 = "Uma presa que aparece na sua frente sem\nte custar esforço algum#né quase sempre uma armadilha."
90100040-102 = "Mas, quando se descobre que não há mal\nalgum―― que é um banquete preparado\nsó para você……"
90100040-103 = "aí um simples \"adulto esquisito\"\njá não dá conta de te definir."
90100040-104 = "[s] \"Ué? Eu falei algo estranho?\""
90100040-105 = "……Não, não se preocupe."
90100040-106 = "Em nome do Esquadrão FOX―― mais uma vez,\nagradeço pelo apoio irrestrito."
90100040-107 = "A Yukino é muuuito dura, né.#nNão precisava falar desse jeito\ntodo engomado."
90100040-108 = "Mas agradecer é importante, viu?"
90100040-109 = "Fufu, pensar que teremos uma operação\ndepois de tanto tempo…… já tô formigando."
90100040-113 = "Pois bem. Iniciando o planejamento\ne a coleta de informa――"
90100040-114 = "[s] \"Não vão escolher o nome da operação?\""
90100040-115 = "……Andávamos simplificando isso ultimamente.\nAcabei me esquecendo."
90100040-116 = "Nesse caso, para celebrar o retorno do\nEsquadrão FOX, que tal \"Operação Raposinha Fofinha Kon-Kon\"――"
90100040-117 = "Não, não e não. Esse nome é infantil demais\naté pra você."
90100040-118 = "É. Não precisa inventar; simples como\nsempre, que tal?"
90100040-122 = "Eu entendo a vontade, mas…… dessa vez é\nmelhor um nome autoexplicativo, né?"
90100040-123 = "Tipo…… é uma operação pra rastrear o\n\"Lore\", então \"Operação A Caça às \"Lores\"……"
90100040-124 = "Sem objeções!"
90100040-129 = "…………"
90100040-130 = "[s] \"……A Operação Operações Kon-Kon fica pra uma próxima, tá?\""
90100040-131 = "……Entendido."
90100040-135 = "Pois bem―― iniciando a \"Operação A Caça às \"Lores\"."
90100040-137 = "Próximo Episódio: Coleta de Informações"