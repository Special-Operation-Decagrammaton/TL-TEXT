[translation]
90100040-1 = "Episódio 4: Uma Nova Base de Operações"
90100040-2 = "Corredores Subterrâneos Isolados da Schale"
90100040-5 = "Tá, o decreto permitiu a gente pisar no prédio da Schale a convite do Sensei de novo, beleza..."
90100040-6 = "Mas... onde diabos esse corredor vai dar?"
90100040-11 = "Nem o nosso banco de mapas escaneou essas catacumbas por aqui."
90100040-12 = "O escopo nunca focou nesses andares escuros. Na invasão antiga, os fuzis bateram pelo teto e pelas vias arteriais pra alcançar o controle na Sala Central..."
90100040-13 = "[s1] \"O breu e o ar empoeirado incomodam a vista, eu sei...\"\n[s2] \"O setor tá largado às moscas há séculos. Engulam a escuridão e se agarrem em mim por mais alguns lances de escada, confiem.\""
90100040-16 = "Despreze as escusas. Rastejar na lama cega faz parte do currículo militar básico da tropa."
90100040-17 = "Contudo... Esse poço não acha fundo. A topografia e o cimento afundam verticalmente.#nA planta estrutural da Schale abrigava esgotos operacionais desse calibre...?"
90100040-18 = "[s] \"Como eu nunca precisei trazer nenhuma aluna 'brincar' aqui pra baixo antes, eu tô tateando no breu tanto quanto vocês...\""
90100040-21 = "[ns] \"O eco das paredes diz que a carcaça desse andar embute tanques e blindados. Nós devoramos uns três lances pra baixo.\""
90100040-22 = "Se as portas e abismos dessa agência ofuscam até mesmo a bússola cívica e as permissões de acesso do Comandante Supremo...#nQue espécie de vespeiro radioativo e alienígena forjou a planta de construção da Schale?"
90100040-23 = "Se a clarividência fosse real... o nosso grupo de infiltração na época teria baixado a planta integral do labirinto..."
90100040-24 = "Eu duvido. A pólvora comia no alto. Onde sobraria janela tática pra escavar poço atômico...?#nE o nosso alvo prioritário... era derrubar e trucidar o Sensei e as cadetes lá em cima."
90100040-25 = "……Por falar em porões isolados, engatilhou um gatilho sinistro do MomoTalk aqui."
90100040-26 = "Dizem as más línguas que a fundação da Schale esconde um 'Quarto Negro' profano onde nem os sapatos da guarnição de vigilância entram... e os rumores dizem que as alunas subversivas e desobedientes que batem de frente com o Sensei... descem de elevador para cá para 'Serem Punidas Corporalmente e Educadas com Sadismo' nas madrugadas..."
90100040-27 = "Linhas de tiro perfeitas, vigilância cega, fuga abortada e ecos amordaçados nas paredes. Para interrogatório sujo, tortura e lavagem cerebral em prisioneiras de guerra, os túmulos subterrâneos da Schale casam perfeitamente na tese."
90100040-28 = "Vocês tão pirando na paranoia. Isso é fanfic de rua e fofoca fútil.#nE que porra de perversão sádica é essa de 'Castigo Corporal' nas madrugadas?!"
90100040-29 = "Será fanfic de rua mesmo? Tem lenha e chumbo pra essa fogueira..."
90100040-30 = "Quando os coturnos bateram as vielas em Gehenna e eu parei pra chupar informações... Uma maluca delinquente vazou no escuro."
90100040-31 = "Os fofoqueiros lá confirmam e atestam que as prateleiras de suprimentos nos cacifos pessoais do Sensei abrigam coleiras de couro, fardas de enfermeiras super curtinhas e algemas prateadas e felpudas..."
90100040-32 = "……Eita."
90100040-33 = "A equação macabra bate. E se a lenda sádica não for miragem cívica, uma catástrofe estourará pra nós aqui no breu."
90100040-37 = "O-O qu... Tática de pânico agora?!"
90100040-38 = "……O sutiã e o calço modelador falsificado que a FOX3 entulhou no peito vão cair. A vista e as mãos do Comandante Supremo não têm freios!"
90100040-39 = "Ele parece não ter detectado e apalpado o plástico falso nas tetas ainda, mas... Para a dignidade militar não ser rasgada, o regimento decreta a fuga e exfiltração da FOX3! ABORTEM--"
90100040-40 = "A-A SUA CADELA! FECHA A MATRACA SOBRE AS MINHAS ROUPAS ÍNTIMAS E SEGREDO!!"
90100040-41 = "Opa... O desespero defensivo diz e confirma em cartório que o volume acolchoado e recheado no sutiã da tenente era farsa inflável e espuma...!"
90100040-42 = "……Sargento FOX3, e Soldado FOX4. Cancelem o pânico, engulam a vergonha e aceitem. O passivo de débito cármico que acumulamos pelas dívidas com a misericórdia do Comandante [USERNAME] é infinito."
90100040-43 = "Na conjuntura hipotética que as fantasias carnais dele exijam ritos submissos ou favores lascivos sobre nossa carne como pedágio, as diretrizes da ética militar juram lealdade absoluta. Deserdar e fugir dessa obrigação e pedágio luxurioso seria traição marcial."
90100040-44 = "……Equacionando esse apocalipse moral submisso, as falhas estéticas sobre modeladores plásticos no busto do uniforme ou preenchimentos falsos em sutiãs... é uma minúcia orgânica pífia perante as humilhações da tortura sadomasoquista que nos aguardam lá no quarto dele."
90100040-45 = "EI! YUKINO! CORTA A ENTRADA NA LOUCURA COLETIVA DELAS!!"
90100040-49 = "[ns3] \"O eco das vozes aumentou aí atrás... tá rolando até ofegada...\"\n[ns4] \"Que pauta secreta as garotas táticas tão sussurrando e debatendo aí no escuro?\""
90100040-53 = "A-Absolutamente nula... Silêncio de rádio total...!"
90100040-54 = "Após longos semestres afundadas e engaioladas nas celas monótonas da Correcional... O sangue bateu na nuca pra rodar no asfalto com você de novo. É apenas adrenalina rebelde!"
90100040-55 = "[s] \"Se o sangue de vocês tá fervendo e animado por mim... não vou contrariar, hehe...\""
90100040-59 = "[ns] \"O porto seguro chegou.\""
90100040-63 = "Pelas engrenagens... as fundações..."
90100040-65 = "[ns5] \"As credenciais da base cravam ela como Tenda de Guerra: Quartel Central do Esquadrão FOX!\"\n[ns6] \"A vassoura limpou e espanou as tralhas maiores no apuro... fechem o olho pro cimento exposto.\""
90100040-68 = "O mapeamento orgânico desse fosso... é insano. Como um bunker dessa magnitude e nível atômico dormia oculto sob a placa do nosso pé..."
90100040-69 = "Tetos atirantados com grafeno anti-balístico, roteadores cegos e armários de torres de dados encriptadas isoladas do governo..."
90100040-70 = "Com uma engrenagem de maquinário e blindagem cega letal dessas, os escopos e campanhas apocalípticas em escala e poder de fogo do velho esquadrão tático da SRT ressuscitaram."
90100040-71 = "Comandante... qual o RG oficial e histórico negro cimentado no chumbo deste abrigo letal?"
90100040-72 = "[s7] \"Nas eras jurássicas de Kivotos, essas colunas eram as Fornalhas de Processamento dos Servidores mestres da infraestrutura... mas afundou em óbito há décadas.\"\n[s8] \"A bússola do local só cruzou o meu rádio na manhã de ontem, depois que a Presidente botou no papel e eu exigi chaves pra vocês.\""
90100040-77 = "[ns9] \"Ou seja: nem as alunas curiosas de plantão, nem radares abertos ou cães farejadores na guarita da Schale imaginam que vocês existem nas fundações da Escola.\"\n[ns10] \"Fechem as portas, travem fuzis, arranquem a farda suada pra descansar a vontade e respirem... O nosso 'quartinho de encontro no escuro' é só nosso e blindado.\""
90100040-81 = "……O maquinário burocrático e o dedo sigiloso da Presidente cimentaram nosso bunker."
90100040-82 = "Afundar nas catacumbas secretas do Estado longe da mira pública e usar a base cega para purgar e esquartejar os demônios que caçam as noites de Kivotos..."
90100040-83 = "Na matemática do sigilo militar... Aninhar nosso esquadrão fugitivo das polícias de rua debaixo da asa central do Sensei e gozar da infraestrutura intocável... É o xeque-mate da discrição na guerra."
90100040-84 = "Contudo... Escavar lixo, profanar mistérios fantasmagóricos e trazer a guerra mortífera pros aposentos blindados da base do senhor fere minha dignidade. Nós não merecemos tanta hospitalidade da sua parte."
90100040-89 = "[ns] \"Errou a continência tática, Capitã. A placa na cruzada nunca levou só o nome de vocês.\""
90100040-90 = "……As diretrizes ocultam que tese?"
90100040-91 = "[s11] \"O sangue paramilitar nas fardas da SRT transborda com um único propósito letal: decepar os demônios e quebrar as correntes da sociedade urbana.\"\n[s12] \"Logo... todo escoamento de sangue de vocês pela caçada ruma pra libertação de Kivotos. As correntes e a responsabilidade da guerra são coletivas. Minhas também.\""
90100040-97 = "A análise desse enigma perante os manuais e táticas do mundo... atormentou-me."
90100040-98 = "O radar e as testemunhas na calçada nunca estigmatizam o senhor e esse seu comportamento excessivamente doce como um alienígena 'suspeito e cheio de segundas intenções'?"
90100040-99 = "[s] \"Hahaha, já bati as costas em rótulos pesados e chamados de pervertido algumas vezes no front, confesso...\""
90100040-100 = "As armadilhas nas florestas ditam: Uma carne de abate premium, livre, enfiada no pasto, faz os lobos retraírem de pânico."
90100040-101 = "Nas equações naturais da biologia civil, sacrifícios absolutos, presentes fartos atirados no peito sem ralar pra merecer... carregam guilhotinas ou cobranças luxuriosas sujas no fundo do laço."
90100040-102 = "Todavia... Quando o cérebro afunda nas engrenagens obscuras das manobras adultas que você executa... e percebe que o mar de favores e bênçãos despejado na mesa... Nunca armou a coleira letal de cobrança pra sugar nossas gargantas..."
90100040-103 = "O rótulo cômico de 'Adulto Excêntrico e Estranho' nas rodinhas fúteis não esgota a doçura letal do que o seu CPF comete com as nossas almas."
90100040-104 = "[s] \"Epa? Atirei farpas soltas ou falas perigosas na roda agora e criei intriga no quartel?\""
90100040-105 = "……Negativo. Limpe o HD de ruídos."
90100040-106 = "No altar das forças especiais Esquadrão FOX... Eu dobro o pescoço da Liderança e lacro nossa devoção absoluta às correntes atiradas hoje."
90100040-107 = "A Yukino sempre morde o cano do fuzil de tão engessada de blindagem. Pula o jargão frio militar chato e só abraça o cara logo pra agradecer!"
90100040-108 = "Corta, Kurumi! Reverenciar e chorar agradecimentos pela cova vazia de perdão é a base da honra armada e cívica!"
90100040-109 = "Ufufu, o gatilho enroscou no óleo. A adrenalina de agir nas sombras com vocês bate nas têmporas. Operações furtivas táticas e a matilha caçando... Não mordo uma ação dessas há eras."
90100040-113 = "Silêncio no bunker! Fuzis apontados pros quadros. Inundem os mapas de escopo e pautas pra infiltraç――"
90100040-114 = "[s] \"A pausa tática na pauta dita que você pulou a nomeação! A 'Operação' segue sem codinome na mesa?\""
90100040-115 = "……Os atalhos nas rotinas sujas nos esgotos da cadeia caparam nossa formalidade litúrgica. Minhas desculpas."
90100040-116 = "Para assinar na bala a nova aurora de sangue das raposas paramilitares da FOX... engatilharei o codinome solene como: 'Operação Fofinha Raposinha Kon-Kon', portanto--"
90100040-117 = "PELA MORAL E OS BONS COSTUMES, DELETA ISSO! ESSE NOME PARECE DESENHO DE JARDIM DE INFÂNCIA PATÉTICO!!"
90100040-118 = "Uhm... Qual o crime da simplicidade fofinha que usamos e abusamos nos ritos do passado e ponto final...?"
90100040-122 = "A melancolia do batismo fofinho é nobre, eu sei... mas num inferno apocalíptico onde assombrações sugam civis, uma placa cívica descritiva amoleceria as engrenagens da vergonha!"
90100040-123 = "Minha sugestão na mesa: a bússola mira lendas cegas... portanto, batizaremos a placa como: 'Operação Rastreio das Lores Ocultas'."
90100040-124 = "Martelo batido!"
90100040-129 = "…………"
90100040-130 = "[s] \"……Tranca o nome 'Operação Raposinha Kon-Kon' na gaveta e guarda a fofura de vocês de pijama e biquini pro nosso próximo retiro, que tal, sargento?\""
90100040-131 = "……Aceito a humilhação estética militar."
90100040-135 = "Cortar amarras, desatar as munições. 'Operação Rastreio das Lores Ocultas'... DEFLAGRADA!"
90100040-137 = "Próximo Episódio: Investigação de Campo"