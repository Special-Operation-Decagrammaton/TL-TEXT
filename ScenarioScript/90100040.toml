[translation]
90100040-1 = "Episode 4;A New Base"
90100040-2 = "Schale's Underground Corridor"
90100040-5 = "I mean, it's fine that we came back to Schale with Sensei, but..."
90100040-6 = "Where... are we?"
90100040-11 = "I had no idea this area even existed."
90100040-12 = "True. Before, we always moved along the shortest route to secure our objectives..."
90100040-13 = "[s1] \"Sorry, it's a bit dark, isn't it?\"\n[s2] \"This is an underground section we don't use very often... just bear with it for a little longer.\""
90100040-16 = "Based on my operational experience, I am accustomed to dark environments."
90100040-17 = "However, these stairs... how far do they go down? #nI had no idea Schale's basement was this deep."
90100040-18 = "[s] \"I've never been down here myself, so I'm not entirely sure...\""
90100040-21 = "[ns] \"It's big enough to store tanks, so I'd guess it's at least three stories deep.\""
90100040-22 = "To think even Sensei doesn't know the full extent... #nJust what kind of structure is Schale, anyway?"
90100040-23 = "Should I have made a detailed map during our last infiltration...?"
90100040-24 = "Maybe you just didn't have the time to check...? #nSensei is a busy person, after all."
90100040-25 = "...Come to think of it, I saw something on social media a while back."
90100040-26 = "They say there's a secret room deep under Schale that even the students on duty can't approach, #nand that students who defy Sensei get locked in there to receive 'punishment' night after night—"
90100040-27 = "Easy to monitor, difficult to escape. If one were to interrogate prisoners, Schale's basement would be ideal."
90100040-28 = "Isn't that a bit of an exaggeration? #nAnd 'punishment'..."
90100040-29 = "No, that rumor might actually be true."
90100040-30 = "When I was gathering intel in the city before, a Gehenna student told me."
90100040-31 = "That Sensei's personal locker contains things like collars, handcuffs, and a nurse's uniform."
90100040-32 = "Huh...?"
90100040-33 = "If that rumor is true, there's a problem we need to think about immediately."
90100040-37 = "W-what is it?"
90100040-38 = "...Sensei might find out about the padded undergarments FOX3 is wearing."
90100040-39 = "Sensei doesn't seem to have noticed yet, but for the sake of FOX3's honor, we should retreat right now—"
90100040-40 = "H-hey, why are you bringing me into this!"
90100040-41 = "Oh? So you're not denying that you're padding them?"
90100040-42 = "...FOX3, FOX4. We owe a debt to Sensei [USERNAME] that we can never fully repay."
90100040-43 = "Even if something were to be demanded of us, it would be against our principles to refuse and run away."
90100040-44 = "...Considering that, Kurumi's undergarment situation is a trivial matter."
90100040-45 = "Hey! Yukino!!"
90100040-49 = "[ns3] \"You guys have been noisy for a while now...\"\n[ns4] \"What are you talking about?\""
90100040-53 = "N-no... it's nothing."
90100040-54 = "We haven't been outside in a long time, so I think we're just a bit excited."
90100040-55 = "[s] \"If you say so...\""
90100040-59 = "[ns] \"Alright, we're here.\""
90100040-63 = "This is..."
90100040-65 = "[ns5] \"It's FOX Squad's operational headquarters!\"\n[ns6] \"We cleaned it up in a hurry, so it's a bit messy, but...\""
90100040-68 = "W-what an incredible room. I never imagined such a place existed under Schale..."
90100040-69 = "It's blast-proof and has its own independent server..."
90100040-70 = "With this setup, we could carry out operations on the same scale as when we were at SRT Special Academy."
90100040-71 = "Sensei, what exactly is this place...?"
90100040-72 = "[s7] \"It's an old server room that isn't used anymore.\"\n[s8] \"I didn't even know about it until the General Student Council President told me.\""
90100040-77 = "[ns9] \"So, none of the students on duty should know about it.\"\n[ns10] \"Feel free to use this place for maintenance or to take a break.\""
90100040-81 = "...So the General Student Council President arranged this for us."
90100040-82 = "Establishing a temporary base in a place where ordinary students cannot enter to track the anomalies threatening Kivotos..."
90100040-83 = "Indeed, if we are to receive support from Sensei while avoiding the eyes of other students, #nstaying in Schale's basement is the best option."
90100040-84 = "That said, I feel a bit guilty about using Sensei's space for our operations."
90100040-89 = "[ns] \"It's not just your operation.\""
90100040-90 = "...What do you mean by that?"
90100040-91 = "[s11] \"SRT is an organization that solves 'problems in Kivotos,' right?\"\n[s12] \"So this operation is for the sake of everyone in Kivotos.\""
90100040-97 = "I've been thinking about this for a while..."
90100040-98 = "Don't other students think you're 'suspicious'?"
90100040-99 = "[s] \"I think I've heard that a few times...?\""
90100040-100 = "If delicious meat is left out in the open, even a beast will be wary."
90100040-101 = "Prey that appears conveniently without any effort being spent to catch it #nis usually a trap."
90100040-102 = "But if they were to find out that it's actually completely harmless—a luxurious feast prepared solely for their benefit..."
90100040-103 = "The label of 'eccentric adult' wouldn't be enough to describe you."
90100040-104 = "[s] \"Huh? Did I say something strange?\""
90100040-105 = "...No, please, pay it no mind."
90100040-106 = "On behalf of FOX Squad—once again, I would like to express our gratitude for your generous support."
90100040-107 = "Yukino, you're so stiff. #nYou don't have to be so formal about it."
90100040-108 = "But it's important to express gratitude."
90100040-109 = "Hehe, thinking that we're finally back on a mission makes me feel all restless."
90100040-113 = "Then, we shall begin the operation and intelligence gathering—"
90100040-114 = "[s] \"Don't we need to decide on an operation name?\""
90100040-115 = "...We've been simplifying things lately, so I had forgotten."
90100040-116 = "In that case, since it's a special occasion, how about we commemorate the restart of FOX Squad with 'Operation Knock-Knock'—"
90100040-117 = "No way, that name is way too childish."
90100040-118 = "Yeah. Why not keep it simple like we always do?"
90100040-122 = "I understand how you feel, but... wouldn't it be better to have something easy to understand this time?"
90100040-123 = "For example, since we're tracking 'Roar,' how about 'Operation Roar Tracking'..."
90100040-124 = "No objections!"
90100040-129 = "............"
90100040-130 = "[s] \"...Maybe we can use 'Operation Knock-Knock' somewhere else later?\""
90100040-131 = "...Understood."
90100040-135 = "Then—'Operation Roar Tracking' begins."
90100040-137 = "Next Episode;Inquiries"