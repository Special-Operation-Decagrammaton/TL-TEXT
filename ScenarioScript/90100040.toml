[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
90100040-1 = "Episódio 4: Uma Nova Base de Operações"
90100040-2 = "Corredores Subterrâneos Isolados do Subsolo da Schale."
90100040-5 = "Tá, o decreto permitiu a gente pisar no prédio da Schale a convite do Sensei de novo, beleza..."
90100040-6 = "Mas... onde diabos esse corredor vai dar?"
90100040-11 = "Nem o nosso banco de mapas escaneou essas catacumbas por aqui."
90100040-12 = "Na invasão anterior, a gente foi pela rota mais curta, pelo andar de cima..."
90100040-13 = "[s1] \"Desculpa a escuridão.\"\n[s2] \"Esse setor está abandonado há anos. Só mais alguns lances de escada, confiem em mim.\""
90100040-16 = "Não se preocupe. Estamos acostumadas."
90100040-17 = "Mas... esse poço não acaba. Até onde vai isso?#nA Schale tinha um subsolo tão profundo assim?"
90100040-18 = "[s] \"Nunca precisei trazer nenhuma aluna para brincar aqui antes, estou tão perdido quanto vocês...\""
90100040-21 = "[ns] \"Pelo eco, devem ter tanques blindados aqui. Já descemos umas três lajes.\""
90100040-22 = "Se até o Sensei não sabe de tudo que tem aqui...#nO que exatamente é a Schale?"
90100040-23 = "Se a gente tivesse mais tempo na invasão, talvez tivesse mapeado..."
90100040-24 = "Duvido. A gente estava ocupado com o ataque lá em cima.#nE o alvo era derrubar o Sensei e as cadetes."
90100040-25 = "……Por falar em subsolo, lembrei de um boato do MomoTalk."
90100040-26 = "Dizem que a Schale tem um 'Quarto Negro' no subsolo, onde ninguém entra. E que alunas que desafiam o Sensei... descem de elevador para serem 'punidas' de madrugada."
90100040-27 = "Linha de tiro perfeita, sem vigilância, fácil para interrogatório e lavagem cerebral. Faz sentido."
90100040-28 = "Vocês estão viajando. Isso é boato besta.#nE que história é essa de 'castigo corporal' de madrugada?!"
90100040-29 = "Será que é boato mesmo? Tem muito fogo nessa fumaça..."
90100040-30 = "Quando eu estava fazendo missões em Gehenna, uma delinquente me contou."
90100040-31 = "Os armários pessoais do Sensei têm coleiras de couro, roupas de enfermeira super curtas e algemas felpudas..."
90100040-32 = "……Eita."
90100040-33 = "Se o boato for verdade, a gente pode estar em perigo aqui no escuro."
90100040-37 = "O-O qu... Tática de pânico agora?!"
90100040-38 = "……O sutiã com enchimento que a FOX3 usa pode ser descoberto. O Sensei pode ver ou tocar sem querer!"
90100040-39 = "Ele ainda não percebeu, mas... para preservar a honra militar, FOX3 deve recuar! ABORTAR――"
90100040-40 = "C-CALA A BOCA! NÃO FALA DA MINHA ROUPA ÍNTIMA!! É SEGREDO!!"
90100040-41 = "Opa... pela reação, o enchimento do sutiã da tenente é fake mesmo...!"
90100040-42 = "……FOX3, FOX4. Parem com isso. Nossa dívida com o Sensei é infinita."
90100040-43 = "Mesmo que ele nos peça algo, recusar e fugir seria contra a razão."
90100040-44 = "……Diante disso, o tamanho dos seios da Kurumi é um detalhe insignificante."
90100040-45 = "EI! YUKINO! NÃO INCENTIVE ESSA LOUCURA!!"
90100040-49 = "[ns3] \"O eco das vozes está estranho... estão falando o quê?\"\n[ns4] \"Tem algum problema secreto?\""
90100040-53 = "N-Nada não! Silêncio total!"
90100040-54 = "Depois de tanto tempo presas, estamos só um pouco agitadas de voltar à ativa com você."
90100040-55 = "[s] \"Se a animação é por minha causa, então ótimo...\""
90100040-59 = "[ns] \"Chegamos.\""
90100040-63 = "Caramba... que estrutura..."
90100040-65 = "[ns5] \"A base está credenciada como Quartel-General do Esquadrão FOX!\"\n[ns6] \"A gente limpou o grosso, mas ignora o cimento quebrado.\""
90100040-68 = "Esse lugar é insano. Como um bunker desse tamanho estava escondido da gente?"
90100040-69 = "Teto com grafeno antibalístico, roteadores criptografados, servidores isolados do governo..."
90100040-70 = "Com essa estrutura, a gente consegue operar no mesmo nível de antes."
90100040-71 = "Sensei... o que era este lugar antes?"
90100040-72 = "[s7] \"Na 'pré-história' de Kivotos, isso aqui era um servidor central da infraestrutura... mas foi desativado há décadas.\"\n[s8] \"Só soube da existência disso ontem, quando a Presidente me passou as chaves.\""
90100040-77 = "[ns9] \"Ou seja, ninguém na Schale sabe que vocês estão aqui.\"\n[ns10] \"Pode ficar à vontade. Nosso 'quartinho secreto' é só nosso.\""
90100040-81 = "……A Presidente preparou tudo isso para nós."
90100040-82 = "Operar no subsolo, longe dos olhos do público, e caçar o que ameaça Kivotos..."
90100040-83 = "Para um esquadrão foragido da polícia, estar sob as asas do Sensei é o cenário ideal."
90100040-84 = "Mas usar o seu espaço como base de guerra me deixa com peso na consciência. Não merecemos tanta bondade."
90100040-89 = "[ns] \"Errado, capitã. A missão nunca foi só de vocês.\""
90100040-90 = "……Como assim?"
90100040-91 = "[s11] \"O sangue da SRT corre com um só propósito: cortar os males de Kivotos.\"\n[s12] \"Então o que vocês fizerem é por Kivotos. A responsabilidade é de todos. Minha também.\""
90100040-97 = "Sempre me perguntei..."
90100040-98 = "O senhor nunca se preocupa em ser mal interpretado por essa doçura excessiva?"
90100040-99 = "[s] \"Hahaha, já fui chamado de pervertido algumas vezes sim, confesso...\""
90100040-100 = "Na natureza, uma carne premium largada no pasto faz os lobos desconfiarem."
90100040-101 = "Porque sacrifícios tão grandes dados de graça geralmente vêm com armadilhas."
90100040-102 = "Mas quando a gente descobre que não há armadilha... que é só generosidade pura..."
90100040-103 = "O rótulo de 'adulto excêntrico' não é suficiente. É algo maior."
90100040-104 = "[s] \"Falei besteira de novo e criei um clima estranho?\""
90100040-105 = "……Negativo. Ignore."
90100040-106 = "Em nome do Esquadrão FOX, aceito a sua ajuda e devo lealdade."
90100040-107 = "Ai, Yukino, para com esse discurso engessado. Abraça logo o cara!"
90100040-108 = "Kurumi, pare. Agradecer por um perdão tão grande é questão de honra militar!"
90100040-109 = "Ufufu, até que enfim vamos para a ação. Faz tempo que não sinto essa adrenalina."
90100040-113 = "Silêncio no bunker! Vamos começar a operaç――"
90100040-114 = "[s] \"Espera aí, cadê o nome da operação?\""
90100040-115 = "……Perdão. Com a correria, esqueci a formalidade."
90100040-116 = "Para marcar o novo começo do Esquadrão FOX, batizo esta operação de: \"Operação Fofinha Raposinha Kon-Kon\"."
90100040-117 = "PELO AMOR DE DEUS, TIRA ISSO! ESSE NOME É MUITO INFANTIL!!"
90100040-118 = "Ué, o que tem de errado com um nome simples e fofo?"
90100040-122 = "Eu até gosto de nomes fofos, mas para uma operação de caça a \"coisas\", um nome sério seria melhor."
90100040-123 = "Que tal \"Operação Caça às 'Lores'\"?"
90100040-124 = "Aprovado!"
90100040-129 = "…………"
90100040-130 = "[s] \"……Guardem o nome fofo para um encontro de pijama, que tal?\""
90100040-131 = "……Aceito a derrota."
90100040-135 = "Então, \"Operação Caça às 'Lores'\"... INICIADA!"
90100040-137 = "Próximo Episódio: Investigação de Campo"