[translation]
90100040-1 = "Episódio 4; Nova Base"
90100040-2 = "Corredor Subterrâneo do Schale"
90100040-5 = "É bom que eu tenha vindo com o Sensei de volta ao Schale, mas..."
90100040-6 = "Onde... é aqui?"
90100040-11 = "Eu não fazia ideia de que existia uma área dessas."
90100040-12 = "Pois é. Antes, a gente sempre usava a rota mais curta para garantir os objetivos, então..."
90100040-13 = "[s1] \"Desculpem, está um pouco escuro, né?\"\n[s2] \"É uma seção subterrânea que não usamos muito... aguentem só mais um pouco.\""
90100040-16 = "Pela minha experiência em operações, estou acostumada com lugares escuros."
90100040-17 = "Mas esta escadaria... até onde ela vai?#nEu não sabia que o subsolo do Schale era tão profundo."
90100040-18 = "[s] \"Eu também não sei muito bem, já que nunca desci até aqui...\""
90100040-21 = "[ns] \"Dá até para guardar tanques aqui, então acho que tem pelo menos uns três andares de profundidade.\""
90100040-22 = "Nem o Sensei sabe ao certo...#nQue tipo de estrutura é o Schale, afinal?"
90100040-23 = "Será que eu deveria ter feito um mapa detalhado na última vez que nos infiltramos aqui?..."
90100040-24 = "Acho que você só não teve tempo de verificar, não é?#nO Sensei é muito ocupado."
90100040-25 = "Falando nisso, vi uma coisa nas redes sociais um tempo atrás."
90100040-26 = "Dizem que nas profundezas do Schale existe uma sala secreta onde nem as alunas de plantão podem entrar, e que as alunas que desobedecem o Sensei são trancadas lá para receberem punições noite após noite..."
90100040-27 = "Fácil de vigiar e difícil de escapar. Se for para interrogar prisioneiros, o subsolo do Schale seria o lugar ideal."
90100040-28 = "Isso não é exagero demais?#nE essa história de \"punição\"..."
90100040-29 = "Não sei, talvez esse boato... seja verdade."
90100040-30 = "Quando eu estava investigando na cidade, uma aluna de Gehenna me contou."
90100040-31 = "Que no armário pessoal do Sensei tem coleiras, algemas e até uniforme de enfermeira."
90100040-32 = "Ah..."
90100040-33 = "Se esse boato for verdade, temos um problema urgente para resolver."
90100040-37 = "O-o quê?"
90100040-38 = "...O enchimento que a FOX3 usa pode acabar sendo descoberto pelo Sensei."
90100040-39 = "O Sensei parece não ter notado, mas pelo bem da honra da FOX3, deveríamos recuar agora mesmo—"
90100040-40 = "Ei, por que você está falando de mim?!"
90100040-41 = "Ora... então você não nega que está usando enchimento?"
90100040-42 = "...FOX3, FOX4. Nós temos uma dívida de gratidão com o Sensei [USERNAME] que nunca poderemos pagar."
90100040-43 = "Mesmo que ele nos pedisse algo, recusar e fugir seria contra os nossos princípios."
90100040-44 = "...Pensando bem, a situação das roupas íntimas da Kurumi é um problema irrelevante."
90100040-45 = "Ei! Yukino!!"
90100040-49 = "[ns3] \"Vocês estão barulhentas desde agora a pouco...\"\n[ns4] \"Sobre o que estão falando?\""
90100040-53 = "N-não, não é nada."
90100040-54 = "É que faz tempo que não saímos, então estamos um pouco animadas."
90100040-55 = "[s] \"Se é assim, tudo bem...\""
90100040-59 = "[ns] \"Pronto, chegamos.\""
90100040-63 = "Isto é..."
90100040-65 = "[ns5] \"É o da Equipe FOX!\"\n[ns6] \"Nós arrumamos às pressas, então está um pouco bagunçado, mas...\""
90100040-68 = "I-incrível. Eu não acredito que existia um lugar desses no subsolo do Schale..."
90100040-69 = "Tem proteção contra explosões e até um servidor independente..."
90100040-70 = "Com tudo isso, parece que dá para realizar operações na mesma escala de quando estávamos na SRT."
90100040-71 = "Sensei, o que é exatamente este lugar..."
90100040-72 = "[s7] \"É uma antiga sala de servidores que não está sendo usada.\"\n[s8] \"Eu mesmo não sabia até a Presidente do Conselho Federal me contar.\""
90100040-77 = "[ns9] \"Por isso, nenhuma das alunas de plantão deve saber disso.\"\n[ns10] \"Podem usar este lugar para manutenção ou descanso sem preocupações.\""
90100040-81 = "...Então foi a Presidente do Conselho Federal quem providenciou isso."
90100040-82 = "Estabelecer uma base temporária em um local onde alunas comuns não podem entrar para investigar fenômenos anômalos que ameaçam Kivotos..."
90100040-83 = "De fato, se quisermos evitar os olhos das outras alunas e receber o suporte do Sensei, ficar no subsolo do Schale é a melhor opção."
90100040-84 = "Ainda assim, sinto-me um pouco desconfortável em ocupar o espaço do Sensei com as nossas operações."
90100040-89 = "[ns] \"Não são apenas as operações de vocês.\""
90100040-90 = "……E isso significa?"
90100040-91 = "[s11] \"A SRT é uma organização que resolve os 'problemas de Kivotos', não é?\"\n[s12] \"Por isso, esta operação é para o bem de todos em Kivotos.\""
90100040-97 = "Eu pensava nisso há algum tempo, mas..."
90100040-98 = "As alunas não dizem que o senhor é 'suspeito'?"
90100040-99 = "[s] \"Acho que já ouvi isso algumas vezes...?\""
90100040-100 = "Se houver uma carne deliciosa deixada à mostra, até mesmo uma fera ficaria alerta."
90100040-101 = "Uma presa que aparece convenientemente na sua frente sem que você tenha feito esforço algum...#nna maioria das vezes, é uma armadilha."
90100040-102 = "Mas, se elas descobrirem que, na verdade, não há perigo algum — que é um banquete luxuoso preparado apenas para elas..."
90100040-103 = "A avaliação de 'adulto estranho' não será o suficiente para descrevê-lo."
90100040-104 = "[s] \"Ué? Eu disse algo estranho?\""
90100040-105 = "……Não, não se preocupe com isso."
90100040-106 = "Em nome do Esquadrão FOX — mais uma vez, agradeço pelo seu apoio incondicional."
90100040-107 = "A Yukino é tão rígida. #nNão precisava falar de um jeito tão formal assim."
90100040-108 = "Mas é importante expressar gratidão."
90100040-109 = "Hehe, só de pensar que é nossa primeira operação em muito tempo, sinto um frio na barriga."
90100040-113 = "Então, a partir de agora, daremos início à operação e à coleta de informações—"
90100040-114 = "[s] \"Não precisamos dar um nome para a operação?\""
90100040-115 = "……Ultimamente temos simplificado as coisas, então acabei esquecendo."
90100040-116 = "Já que é uma ocasião especial, que tal celebrarmos o reinício do Esquadrão FOX com a 'Operação Toc-Toc'—"
90100040-117 = "Não, não, esse nome é infantil demais, não acha?"
90100040-118 = "Concordo. Por que não mantemos simples, como sempre fazemos?"
90100040-122 = "Eu entendo o sentimento, mas... desta vez, não seria melhor algo mais direto?"
90100040-123 = "Por exemplo, como estamos rastreando o 'Roa', que tal 'Operação Rastreamento de Roa'..."
90100040-124 = "Sem objeções!"
90100040-129 = "…………"
90100040-130 = "[s] \"……Que tal usarmos a 'Operação Toc-Toc' em outra oportunidade?\""
90100040-131 = "……Entendido."
90100040-135 = "Então — iniciaremos a 'Operação Rastreamento de Roa'."
90100040-137 = "Próximo; Investigação"
