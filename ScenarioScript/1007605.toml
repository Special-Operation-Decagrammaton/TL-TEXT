[translation]
1007605-1 = "É isso, é isso"

1007605-2 = "(Ele vai para a sala de espera onde Kotori está descansando.)"

1007605-6 = "(Estava tão quieto que pensei que estava no lugar errado...)"

1007605-7 = "Ah, senhor..."

1007605-8 = "Aqui está..."

1007605-9 = "[s1] \"...Kotori?\"\n[s2] Aproxime-se da direção da voz."

1007605-15 = "Ahaha...nunca pensei que nos encontraríamos assim..."

1007605-16 = "Bem... não é como se nada em particular tivesse acontecido..."

1007605-17 = "Porém... devido ao aumento repentino da minha atividade...#nEu me senti um pouco tonto..."

1007605-18 = "……."

1007605-19 = "...Bem..."

1007605-20 = "...A propósito, mas..."

1007605-21 = "...\"Tonto\"...."

1007605-22 = "...Isso mesmo...#nPercepção parcial, equilíbrio anormal..."

1007605-23 = "[s3] \"Por favor, explique esta situação...!?\"\n[s4] \"Agora que chegamos até aqui, é incrível...\""

1007605-26 = "Ah, haha... é verdade..."

1007605-27 = "Por hábito...pensei que tinha que te contar..."

1007605-28 = "Mas agora... até eu acho..."

1007605-32 = "[ns] \".......\""

1007605-34 = "[ns5] \"Tontura é uma anormalidade parcial de percepção e equilíbrio. \"\n[ns6] \"Sensação de que você está se movendo mesmo que não esteja realmente se movendo. \"\n[ns7] \"As causas são síndrome de hiperventilação, estresse, anemia e hipoglicemia... \""

1007605-38 = "...?"

1007605-39 = "Hum...S-Sensei...? O que aconteceu...?"

1007605-40 = "É como se você estivesse dizendo o que eu estava tentando dizer..."

1007605-41 = "[s8] \"Acho que Kotori ficará mais calma assim.\"\n[s9] \"Kotori não terá que explicar, certo?\""

1007605-46 = "Ah, ahaha…."

1007605-47 = "Eu vejo……."

1007605-48 = "...É estranho, não é?"

1007605-49 = "O que posso dizer..."

1007605-50 = "Ao ouvir a história da Senseia, senti-me calmo."

1007605-51 = "Para me tranquilizar... #nA Senseia é muito gentil..."

1007605-52 = "Além disso... você pode ver tudo o que estou pensando..."

1007605-53 = "Nunca pensei que seria tão fácil..."

1007605-54 = "...Ehehe."

1007605-55 = "……Sensei……."

1007605-56 = "Sou sempre grato ao meu Sensei..."

1007605-57 = "...Hum..."

1007605-58 = "Hum..."

1007605-59 = "[ns10] Coloque uma toalha fria na testa de Kotori enquanto ela dorme. \n[ns11] Coloque Kotori em uma posição confortável para dormir."

1007605-64 = "(Depois, passei algum tempo ao lado de Kotori)"

1007605-65 = "(Quando Kotori acordou, ela havia recuperado sua energia habitual.)"

