[translation]
1007605-1 = "それはそれ、これはこれ"
1007605-2 = "（コトリが休んでいる控え室へと向かった）"
1007605-6 = "（あまりに静かで、場所を間違えたかとも思ったが……）"
1007605-7 = "あ、せ、先生……。"
1007605-8 = "こっち、です……。"
1007605-9 = "[s1] \"……コトリ？\"\n[s2] 声がした方に近づく。"
1007605-15 = "あはは……まさか、こんな形でお会いする事になるとは思っていませんでした……。"
1007605-16 = "その……特に何かあったわけでは、ないのですが……。"
1007605-17 = "ただ……急激に活動量が増えたことで……#n少しめまいがしてしまって……"
1007605-18 = "……。"
1007605-19 = "……え、っと……。"
1007605-20 = "……ちなみに、ですが……。"
1007605-21 = "……「めまい」……。"
1007605-22 = "……というのは、ですね……#n部分的な知覚、平衡感覚の異常……"
1007605-23 = "[s3] \"この状況でも説明を……！？\"\n[s4] \"ここまでくると、逆にすごい……。\""
1007605-26 = "あ、あはは……本当、ですね……"
1007605-27 = "クセでつい……お伝えしないと、と思い……"
1007605-28 = "けど今のは……自分でも、さすがに……と思います……。"
1007605-32 = "[ns] \"………。\""
1007605-34 = "[ns5] \"「めまい」とは、部分的な知覚および平衡感覚の異常。\"\n[ns6] \"実際は動いていないのに、動いているような感覚が生じること。\"\n[ns7] \"原因は過換気症候群、ストレス、貧血、低血糖……。\""
1007605-38 = "……？"
1007605-39 = "えっと……せ、先生……？どうしたんですか……？"
1007605-40 = "私が言おうとしたことを、代わりに言ってくださっているような……。"
1007605-41 = "[s8] \"その方が、コトリも落ち着くかなって。\"\n[s9] \"コトリが説明しなくて済むでしょう？\""
1007605-46 = "あ、あはは……。"
1007605-47 = "なるほど……。"
1007605-48 = "……不思議、ですね……。"
1007605-49 = "なんというか……。"
1007605-50 = "先生の話を聞いていると、心が落ち着いてきました……。"
1007605-51 = "私を安心させるために、なんて……。#n先生は本当に、優しいですね……。"
1007605-52 = "それに……私の思ってることも、全部お見通しで……。"
1007605-53 = "こんなに楽になるなんて、思ってもみませんでした……。"
1007605-54 = "……えへへ。"
1007605-55 = "……先生……。"
1007605-56 = "先生には……いつも、感謝しています……。"
1007605-57 = "……んん……。"
1007605-58 = "むにゃ……。"
1007605-59 = "[ns10] 眠るコトリの額に冷やしたタオルをおく。\n[ns11] コトリを寝やすい姿勢にする。"
1007605-64 = "（その後、コトリのそばで時間を過ごした）"
1007605-65 = "（目覚めたコトリは、いつもの元気を取り戻していた）"
