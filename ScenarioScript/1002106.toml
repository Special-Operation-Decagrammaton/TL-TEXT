[translation]
1002106-1 = "Um momento luxuoso"
1002106-2 = "Ah, Sensei. Você chegou mais cedo do que eu esperava."
1002106-3 = "[s] \"Desculpe a demora. Não tem mais ninguém por aqui, né?\""
1002106-4 = "É verdade, o mar está calmo."
1002106-5 = "Até pouco tempo atrás tinha turistas, mas... parece que todos voltaram para as pousadas."
1002106-6 = "……Hm? Ah, é verdade, fui eu que te chamei."
1002106-7 = "……Bem, como eu deveria dizer isso?"
1002106-8 = "Se eu tivesse que dizer algo, seria que... não tem nada aqui."
1002106-9 = "[s1] \"……?\"\n[s2] \"O que você quer dizer com isso...?\""
1002106-10 = "É difícil explicar, mas é exatamente o que as palavras dizem."
1002106-11 = "É difícil explicar, mas é exatamente o que as palavras dizem."
1002106-12 = "Em um lugar com uma vista tão aberta, sem nenhum preparo, sem nenhum objetivo, apenas sentados aqui assim..."
1002106-13 = "É só isso. Não tem nada, e nada está acontecendo."
1002106-14 = "……E isso, é uma sensação estranha."
1002106-15 = "[s3] \"……Isso é bom. De verdade.\"\n[s4] \"……É um momento luxuoso e maravilhoso, não é?\""
1002106-16 = "……Sim."
1002106-17 = "……Sim."
1002106-18 = "É verdade, acho que é exatamente isso."
1002106-19 = "……Ainda bem que você está aqui, Sensei."
1002106-20 = "O Sensei me ensina tantas coisas."
1002106-21 = "……É um momento luxuoso, de verdade."
1002106-22 = "……"
1002106-23 = "Fico feliz por ter vindo aqui. Foi pouco tempo, mas aprendi muitas coisas."
1002106-24 = "Desde que conheci o Sensei, tem sido sempre assim."
1002106-25 = "Eu, assim..."
1002106-26 = "……Não, esquece."
1002106-27 = "Não é nada, não se preocupe."
1002106-28 = "Desculpe te chamar de repente. Estou sempre tomando o seu tempo."
1002106-29 = "É que eu só queria te contar isso, desse jeito."
1002106-30 = "[s] \"Não, eu fico feliz só de ouvir isso vindo de você, Azusa.\""
1002106-31 = "……Entendo."
1002106-32 = "……Você continua sendo uma pessoa estranha."
1002106-35 = "É um luxo, mas... eu queria que esse momento durasse o máximo possível..."
