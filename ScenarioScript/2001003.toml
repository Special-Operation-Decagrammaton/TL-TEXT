[translation]
2001003-1 = "Capítulo de Treinamento e Limpeza"
2001003-2 = "Schale - Área Residencial"
2001003-3 = "（Ao terminar o trabalho e retornar à área residencial, Nodoka estava esperando novamente, vestida como uma gerente de estância termal）"
2001003-4 = "Bem-vindo de volta, Sensei."
2001003-5 = "Obrigada por todo o seu trabalho duro neste dia frio."
2001003-6 = "Se desejar, o banho já está preparado, então..."
2001003-10 = "[ns] \"Bem...\""
2001003-11 = "Como eu disse antes, vim para treinar!"
2001003-12 = "Então, *cof cof*. Recomeçando..."
2001003-13 = "Pode parecer repetitivo, mas o que é necessário para uma estância termal de primeira classe são boas fontes termais e bons banhos."
2001003-14 = "Por isso, hoje, em preparação para quando a Estância Termal 227 for revivida, decidi fazer um treinamento de limpeza de banheiros."
2001003-15 = "[s] \"Mas não tem fontes termais no Schale...?\""
2001003-16 = "Sim, eu sei disso, é claro. Eu observo cada detalhe sobre o Sensei, afinal."
2001003-17 = "Mesmo sem fontes termais, o Schale tem um banheiro grande o suficiente para todos usarem, não tem?"
2001003-18 = "Hoje, tratei esse banheiro como se fosse a Estância Termal 227 e limpei tudo com muito esforço!"
2001003-19 = "Limpei o chão minuciosamente e reabasteci os shampoos que estavam quase acabando..."
2001003-20 = "[s] \"Ah, obrigado. Mas, na verdade...\""
2001003-21 = "Ah, o sais de banho que o Sensei tem usado ultimamente são aqueles efervescentes da empresa Poko-Poko, certo? De lavanda."
2001003-22 = "Pensei que você gostaria de usar em um dia cansativo como hoje, então já deixei preparado."
2001003-23 = "Como achei que o aroma poderia evaporar se eu dissolvesse na água antes, ainda não coloquei, então por favor, use o que deixei bem ao lado da banheira!"
2001003-24 = "[s] \"Ei, Nodoka?\""
2001003-25 = "Deixei a temperatura da água em 40 graus, está bom para você? Pela tendência dos seus banhos neste horário, você sempre costuma aliviar o cansaço com essa temperatura mais alta."
2001003-26 = "Calculei o tempo e comecei a encher a banheira um pouco antes, então deve estar na temperatura perfeita agora."
2001003-27 = "Vamos, vamos! Agora troque de roupa e entre no banho! Eu estarei bem aqui por perto, observando... quer dizer, vigiando! Ah, ah...!"
2001003-28 = "[s1] \"Nodoka, posso te perguntar uma coisa?\"\n[s2] \"Hoje, por causa de uma obra, a água quente não deveria estar funcionando...\""
2001003-33 = "......Eh!?"
2001003-34 = "É-é verdade, enquanto limpava, achei que a água estava saindo fria o tempo todo, mas..."
2001003-35 = "O-o que eu faço... Na verdade, durante a limpeza, eu acabei me sujando toda de fuligem..."
2001003-36 = "[s] \"Bem, bom trabalho...\""
2001003-37 = "Uuu, e eu que estava esperando o Sensei entrar no banho primeiro..."
2001003-38 = "Eu queria aproveitar a água que sobrasse depois que o Sensei saísse do banho..."
2001003-39 = "Eu achei que hoje daria certo... que desânimo."
2001003-40 = "Diga, Sensei. Existe algum outro lugar por aqui onde possamos tomar banho...?"
2001003-42 = "No fim, encontramos um banho público perto do Schale e fomos juntos."
2001003-43 = "Para animar a Nodoka, que estava desanimada, comprei um leite com café para ela depois do banho."
