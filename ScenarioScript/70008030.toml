[translation]
70008030-1 = "Aqueles que não se prendem a nada (3)"
70008030-2 = "Bem, parece que todos já chegaram, então..."
70008030-3 = "Declaro aberto o... Encontro da Trupe Chimi!"
70008030-13 = "(Nossa... tem tanta gente famosa da Trupe Chimi por aqui...)"
70008030-14 = "(Será que eu... deveria estar aqui mesmo...?)"
70008030-15 = "Murmúrios..."
70008030-16 = "Ei, não é aquela ali?"
70008030-17 = "Sério mesmo? Esse ano vai ser caótico..."
70008030-18 = "(Caramba, que tipo de gente perigosa veio parar aqui!?)"
70008030-23 = "Aquela ali é realmente da Trupe Chimi...?"
70008030-24 = "Ouvi dizer que fora de Hyakkiyako existem pessoas com esse visual..."
70008030-29 = "Pessoal! Silêncio, por favor!!"
70008030-33 = "Sei que têm muito o que conversar, mas... por favor, evitem conversas paralelas."
70008030-37 = "...Bem, vamos ao que interessa."
70008030-38 = "Ultimamente, temos sido ignorados por Hyakkiyako — vocês não acham?"
70008030-39 = "É verdade... ninguém tem medo da gente."
70008030-40 = "E ainda reiniciaram o Festival da Árvore Sagrada por conta própria..."
70008030-41 = "É isso mesmo! Estão nos fazendo de bobos!"
70008030-42 = "Sim, sim. Eu entendo perfeitamente o sentimento de vocês..."
70008030-43 = "Felizmente, no último Festival da Árvore Sagrada, graças à atuação de Arata, da Escola de Rua, evitamos passar vergonha."
70008030-44 = "Hã, eu!? #n... B-bem, é verdade! O Festival da Árvore Sagrada é de Hyakkiyako... ou seja, é o nosso festival, né?"
70008030-45 = "Não dava para deixar eles atrapalharem... #nBom... só me lembro de ter levado uma bronca enorme do Departamento Yin-Yang e do Hyakka Ryoran..."
70008030-46 = "O que pertence a Hyakkiyako é, por definição, da Trupe Chimi! #nO que há de errado em proteger o que é nosso?!"
70008030-47 = "O Hyakka Ryoran não passa de um grupo sem fundamento que só fala! #nA Trupe Chimi é a verdadeira personificação de Hyakkiyako! Somos os guardiões da tradição!"
70008030-48 = "Isso! Muito bem dito!"
70008030-49 = "É isso aí!"
70008030-50 = "(É isso! Essa é a Trupe Chimi! Nós protegemos a tradição de Hyakkiyako!)"
70008030-51 = "Até agora respeitamos o Departamento Yin-Yang, mas... não precisamos mais disso!"
70008030-52 = "A data será no próximo festival. Nós vamos... declarar guerra ao Hyakka Ryoran!"
70008030-54 = "(...Hã?)"
70008030-55 = "Uooo! Mostrem do que somos capazes!!"
70008030-56 = "Pessoal, agora é a hora de agir!"
70008030-57 = "O Hyakka Ryoran deve se espalhar pela cidade para manter a ordem. #nNós vamos nos infiltrar fingindo ser turistas e... quando surgir a chance, atacaremos todos de uma vez!"
70008030-58 = "Vamos nessa!"
70008030-59 = "Vamos recuperar nosso festival! Não importa se são turistas ou quem quer que seja, não me interessa!"
70008030-60 = "Não, isso... não está errado?"
70008030-61 = "...Quem disse isso?"
70008030-67 = "Ah, ei! Não empurra! #n... Bem, fui eu."
70008030-68 = "...Arata. #nVocê, que foi quem mais se opôs ao reinício do Festival da Árvore Sagrada... por que?"
70008030-69 = "É que uma coisa é uma coisa, outra coisa é outra coisa...!"
70008030-70 = "Não, é que... claro, derrotar o pessoal do Hyakka Ryoran é uma boa, mas..."
70008030-71 = "O festival desta vez não tem nada de errado, tem? #nO que vai acontecer com as pessoas que não têm nada a ver com isso ou com quem se esforçou tanto pelo festival?"
70008030-72 = "Então você está dizendo que nós estamos errados!? #nNós também temos um pouco de culpa, mas mesmo assim!"
70008030-73 = "O plano já começou. Está querendo pular fora agora!?"
70008030-74 = "Arata, estou decepcionado. Achei que você fosse alguém que carregaria o nosso futuro..."
70008030-75 = "Já que você sabe o conteúdo da nossa reunião... não podemos deixar você ir embora assim."
70008030-76 = "Uau! Não cheguem perto! A-alguém...!"
70008030-81 = "Eu ouvi tudo o que vocês disseram!"
70008030-85 = "Esse plano... Izuna irá impedi-lo!"
70008030-87 = "Uma ninja!?"
70008030-88 = "Então o boato de que o Departamento de Yin-Yang estava treinando ninjas era verdade!!"
70008030-90 = "Nyahaha! Você tem bom olho para reconhecer o valor de um ninja, não é?♪"
70008030-91 = "Não existe nada tão interessante... digo, um desenrolar tão bom quanto este."
70008030-92 = "O que significa isso, Amachi Niya...!?#nAquele Departamento de Yin-Yang pretende quebrar a neutralidade?"
70008030-93 = "Ora, não sei do que você está falando...#nUma kouhai fofa estava apenas dando um passeio... e acabou se perdendo em uma reunião misteriosa~"
70008030-94 = "Você realmente acha que uma mentira dessas vai colar...?"
70008030-95 = "Não, de qualquer forma, já é tarde demais.#nSe o Grupo Chimi se unir, nem mesmo o Departamento de Yin-Yang ou o Hyakkiyako Ryoran conseguirão..."
70008030-96 = "Sim, sim, eu entendo~"
70008030-97 = "Cães vadios não são problema se forem um ou dois.#nMas quando eles se reúnem em bando, torna-se um incômodo..."
70008030-98 = "Haa! Ninjutsu estilo Izuna! Técnica do Pen-Pen!"
70008030-99 = "Guaaaa, dói! Vai acabar saindo!"
70008030-100 = "Por que estão tendo tanta dificuldade contra uma única pessoa!#nAcabem logo com isso— Guaaa! Dói!"
70008030-101 = "Como eu disse, eles são fofos antes de se reunirem em bando~ Nyahaha! Então, vou indo na frente~"
70008030-105 = "Amachi Niyaaaaa!!!"
70008030-106 = "Líder! É uma emergência! O Hyakkiyako Ryoran invadiu o local!"
70008030-108 = "Depois dos ninjas, agora o Hyakkiyako Ryoran!?"
70008030-112 = "Fu-fujam!"
70008030-120 = "Ca-calma! Estamos em maior número! Se nos coordenarmos, ainda temos uma chance de vencer...!"
70008030-121 = "Chefe dos vilões, encontrada! Prepare-se...!"
70008030-122 = "Ai!! Uwaaaan! E olha que eu me dei ao trabalho de reunir todo mundo!"
70008030-123 = "Não quero mais saber de nada!"
70008030-135 = "Haa, haa... consegui escapar..."
70008030-136 = "Eu só queria ser uma pessoa digna do Grupo Chimi! Por que as coisas terminaram assim..."
70008030-137 = "Líder do Grupo Chimi, estilo de rua...#nArata... o que você está tentando fazer...?"
70008030-138 = "Droga... essa máscara...!"
70008030-139 = "Ei, você aí."
70008030-140 = "Essa voz..."
70008030-141 = "Ah, é a irmã mais velha que me emprestou a máscara—"
70008030-142 = "Emprestou? Você não quer dizer que roubou?"
70008030-143 = "Como membro do Grupo Capacete, você não pode perder seu capacete! ...Sério, ainda bem que eu tinha um reserva."
70008030-144 = "Meu precioso capacete, ele está bem, não está?"
70008030-145 = "Foi mal por ter roubado... aqui está."
70008030-150 = "Ah, valeu. Nossa, você devolveu sem nem reclamar."
70008030-155 = "Haa...#nEu estava pensando em me vingar se te encontrasse, mas—"
70008030-156 = "Depois de ver como você está deprimido, perdi a vontade. #nO que aconteceu?"
70008030-157 = "Não é algo que vá mudar só de falar."
70008030-158 = "Você não sabe disso. Às vezes, só de falar as coisas, a gente se sente mais leve."
70008030-159 = "...O que você acha que define o Grupo Chimi...?"
70008030-160 = "Grupo Chimi? O que é isso?"
70008030-161 = "Pois é..."
70008030-167 = "Não sei o que é esse Grupo Chimi, mas vocês vivem nesta cidade, certo?"
70008030-168 = "Então, por que não aproveitam a vida normalmente?"
70008030-169 = "Aproveitar... normalmente... é?"
70008030-170 = "Estudos, clubes, essas coisas são um saco, né?"
70008030-171 = "Bom, é..."
70008030-172 = "Faça o que você quer fazer e não faça o que não quer. É só isso."
70008030-173 = "Bem... talvez você tenha razão..."
70008030-174 = "Mas, deixando isso de lado—"
70008030-175 = "Eu preciso receber pelo meu capacete que foi roubado... digo, emprestado."
70008030-176 = "O quê!? Não tenho dinheiro nem ferrando!"
70008030-177 = "Escute até o final!#nSe você me guiar por Hyakkiyako, consideraremos isso resolvido."
70008030-178 = "É a minha primeira vez aqui... e eu não pesquisei nada sobre o lugar."
70008030-179 = "Sério? Então você ainda nem foi ao Observatório da Árvore Sagrada?"
70008030-180 = "Árvore Sagrada? Você quer dizer aquela árvore enorme?"
70008030-181 = "Aquele é um ponto obrigatório em Hyakkiyako!"
70008030-182 = "Não tem jeito. Deixe a guia de Hyakkiyako por minha conta!"
70008030-183 = "Você se recupera rápido, hein."
70008030-184 = "Não temos tempo a perder! Vamos logo!"
70008030-185 = "Primeiro, o observatório!#nÉ lindo depois que o sol se põe, mas a vista antes disso também é espetacular!!"
70008030-186 = "Ei, não me deixa para trás!"
70008030-188 = "Talvez Arata, que busca novas diversões todos os dias, seja quem melhor representa a Trupe Chimi."
70008030-189 = "Ninguém se lembra agora, mas... antigamente, esse termo se referia àqueles que não se prendiam a nada. Esse termo é... a 'Trupe Chimi'."
70008030-190 = "Aqueles que não se prendem a nada"
