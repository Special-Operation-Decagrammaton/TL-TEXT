[translation]#[Texto Final. - Filipe 08/07.]
70008030-1 = "Aqueles Que Não se Prendem a Nada (3)"
70008030-2 = "Bem, parece que todos estão aqui――"
70008030-3 = "declaro aberta a…… Noite da Trupe Fantasma!"
70008030-13 = "(Uau…… ali…… e ali…… só líderes famosas da Trupe Fantasma……)"
70008030-14 = "(Será que eu deveria estar aqui……?)"
70008030-15 = "Murmúrio……"
70008030-16 = "Ei, não é aquela?"
70008030-17 = "Sério…… este ano vai ser pesado……"
70008030-18 = "(Eita, que tipos perigosos estão aqui?)"
70008030-23 = "Aquela ali é mesmo da Trupe Fantasma?"
70008030-24 = "Dizem que fora de Hyakkiyako tem gente que se veste assim……"
70008030-29 = "Pessoal! Silêncio!"
70008030-33 = "Sei que temos muito a conversar, mas…… peço que evitem conversas paralelas."
70008030-37 = "……Então, vamos ao que interessa."
70008030-38 = "Ultimamente, estamos sendo ignorados por Hyakkiyako – não acham?"
70008030-39 = "É mesmo…… ninguém tem medo da gente."
70008030-40 = "E reabriram o Festival da Árvore Sagrada sem permissão."
70008030-41 = "Exato! Estão nos desprezando!"
70008030-42 = "Sim, sim. Entendo perfeitamente seus sentimentos."
70008030-43 = "Felizmente―― no Festival passado, a atuação de Arata, do Grupo de Rua, nos salvou da vergonha."
70008030-44 = "Hã, eu?…… É-é! O Festival da Árvore Sagrada é de Hyakkiyako―― quer dizer, nosso festival!"
70008030-45 = "Não podia deixar atrapalharem……#n……mas só lembro de ter levado uma bronca do Clube Yin-Yang e das Cem Flores……"
70008030-46 = "O que é de Hyakkiyako é nosso! Não há mal em proteger o que é nosso!"
70008030-47 = "As Cem Flores são apenas um grupo de falastrões! Nós somos os verdadeiros guardiões da tradição!"
70008030-48 = "Oh! Bem dito!"
70008030-49 = "Isso! Isso!"
70008030-50 = "(Isso! Isso é a Trupe Fantasma! Nós protegemos a tradição!)"
70008030-51 = "Até agora toleramos o Clube Yin-Yang, mas não é mais necessário!"
70008030-52 = "Na data do próximo festival, vamos declarar guerra às Cem Flores!"
70008030-54 = "(……Hã?)"
70008030-55 = "Uôô! Vamos dar uma lição neles!"
70008030-56 = "É hora de agir!"
70008030-57 = "As Cem Flores devem estar espalhadas pela cidade para manter a ordem.#nVamos nos disfarçar de turistas…… e atacar de surpresa!"
70008030-58 = "Vamos nessa!"
70008030-59 = "Vamos recuperar nosso festival! Turistas ou não, não importa!"
70008030-60 = "Não, isso…… não é certo?"
70008030-61 = "……Quem falou isso?"
70008030-67 = "Ah, ei! Não me empurrem!#n……Sou eu."
70008030-68 = "……Arata.#nVocê, que mais se opôs à reabertura do Festival…… por quê?"
70008030-69 = "Isso é outra coisa……!"
70008030-70 = "Não, quer dizer…… claro, derrotar as Cem Flores é bom……"
70008030-71 = "Mas o festival atual não tem problema, né?#nPor que envolver pessoas que não têm nada a ver ou que se esforçaram pelo festival?"
70008030-72 = "Então a culpa é nossa!? Nós também temos nossa parcela!"
70008030-73 = "O plano já começou. Você quer se sair?"
70008030-74 = "Arata, estou decepcionado. Achava que você lideraria nosso futuro……"
70008030-75 = "Agora que você sabe do plano…… não podemos deixar você ir."
70008030-76 = "Ei! Não chega perto! Alguém……!"
70008030-81 = "Ouvi tudo!"
70008030-85 = "Esse plano―― Izuna vai impedir!"
70008030-87 = "Uma ninja!?"
70008030-88 = "Então era verdade que o Clube Yin-Yang treina ninjas!"
70008030-90 = "Nyahaha! Que bom que reconhecem o valor das ninjas♪"
70008030-91 = "Não existe situação melhor que essa, né."
70008030-92 = "O que isso significa, Amachi Niya……?#nO Clube Yin-Yang vai quebrar a neutralidade?"
70008030-93 = "Ora, não sei do que você fala.#nUma kouhai fofa estava passeando…… e acabou se perdendo nesta reunião estranha~"
70008030-94 = "Você acha que essa mentira cola?"
70008030-95 = "Não importa, já é tarde.#nSe a Trupe Fantasma se unir, nem o Clube Yin-Yang nem as Cem Flores――"
70008030-96 = "Sim, sim, eu sei~"
70008030-97 = "Cachorros de rua, um ou dois não são problema.#nMas quando se juntam, complica……"
70008030-98 = "Hah! Técnica Ninja Izuna! Arte do Tapa!"
70008030-99 = "Ahhh, dói! Saiu!"
70008030-100 = "Por que estão com dificuldade com uma só!#nAcabem com ela―― ahhh! Dói!"
70008030-101 = "Então, antes de se juntarem, são fofinhos~ nyahaha! Até mais~"
70008030-105 = "Amachi Niyyyyyya!"
70008030-106 = "Líder! As Cem Flores invadiram!"
70008030-108 = "Depois da ninja, as Cem Flores?"
70008030-112 = "Fo-fujam!"
70008030-120 = "C-calma! Somos em mais número! Se nos unirmos――"
70008030-121 = "Achei o chefão! Prepare-se!"
70008030-122 = "Dói!! Aaaah! Reuni todo mundo pra isso!"
70008030-123 = "Não vou mais cuidar de vocês!"
70008030-135 = "Haa, haa…… escapamos……"
70008030-136 = "Eu só queria ser uma pessoa digna da Trupe Fantasma! Por que isso……"
70008030-137 = "Líder do Grupo de Rua……#nArata…… o que você quer?"
70008030-138 = "Ah…… essa máscara――"
70008030-139 = "Ei, você aí."
70008030-140 = "Essa voz……"
70008030-141 = "Ah, a moça que me emprestou a máscara――"
70008030-142 = "Emprestou? Foi roubada, né?"
70008030-143 = "Membro do Grupo do Capacete não pode ficar sem capacete!…… ainda bem que tinha um reserva."
70008030-144 = "Meu capacete precioso está intacto?"
70008030-145 = "Foi mal ter roubado…… toma."
70008030-150 = "Ah, obrigado. Que bom, devolveu de boa."
70008030-155 = "Haa……#n……pensei em me vingar quando encontrasse――"
70008030-156 = "Mas vendo você tão abatida, perdi a vontade.#nO que aconteceu?"
70008030-157 = "Não adianta falar."
70008030-158 = "Como sabe? Às vezes, só de falar já alivia."
70008030-159 = "……O que é ser da Trupe Fantasma?"
70008030-160 = "Trupe Fantasma? O que é isso?"
70008030-161 = "É o que eu pensei……"
70008030-167 = "Não sei o que é Trupe Fantasma, mas você mora nesta cidade, né?"
70008030-168 = "Então, por que não só se divertir?"
70008030-169 = "Só…… se divertir……"
70008030-170 = "Estudar, clube, é chato, né?"
70008030-171 = "Bom, é……"
70008030-172 = "Faça o que quer, e não faça o que não quer. Só isso."
70008030-173 = "Talvez…… seja isso mesmo……"
70008030-174 = "Mas, já que estamos――"
70008030-175 = "Você roubou…… digo, pediu emprestado meu capacete, então tem que pagar."
70008030-176 = "Hã!? Não tenho dinheiro!"
70008030-177 = "Escuta até o fim!#nSe me guiar por Hyakkiyako, a dívida está quitada."
70008030-178 = "É minha primeira vez aqui, e não pesquisei nada."
70008030-179 = "Hã, então você ainda não foi ao mirante da árvore sagrada?"
70008030-180 = "Árvore sagrada? Aquela árvore gigante?"
70008030-181 = "É parada obrigatória em Hyakkiyako!"
70008030-182 = "Não tem jeito. Deixa o guia comigo!"
70008030-183 = "Você se recupera rápido."
70008030-184 = "Não dá pra ficar parada! Vamos!"
70008030-185 = "Primeiro o mirante!#nÉ bonito tanto ao pôr do sol quanto durante o dia!"
70008030-186 = "Ei, espera!"
70008030-188 = "Talvez Arata, que busca novas diversões todos os dias, seja a mais digna da Trupe Fantasma."
70008030-189 = "Ninguém mais lembra, mas…… antigamente, essa palavra se referia a 'aqueles que não se prendem a nada' – e essa palavra é 'Trupe Fantasma'."
70008030-190 = "Aqueles Que Não se Prendem a Nada"