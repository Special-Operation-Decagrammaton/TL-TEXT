[translation]
2001906-1 = "Case4. Secretária por um dia, em espera"
2001906-7 = "（O trabalho, que não parece diminuir nem um pouco, já está em cerca de 30% restante...）"
2001906-11 = "（Estiquei as costas para aliviar a tensão dos ombros）"
2001906-15 = "[ns] \"Alguém poderia me trazer uma xícara de café...?\""
2001906-19 = "Cuidado, está um pouco quente, mestre."
2001906-23 = "（No momento em que murmurei isso, o café apareceu de repente）"
2001906-24 = "[ns] \"Desculpe, obrigado.\""
2001906-30 = "（É um café puro, sem açúcar ou leite...）"
2001906-31 = "（O equilíbrio entre o amargor e a acidez é exatamente como eu gosto）"
2001906-32 = "（Foi uma xícara maravilhosa que espantou meu sono e meu cansaço）"
2001906-37 = "Como estava, mestre?"
2001906-38 = "[s] \"Foi uma xícara sublime.\""
2001906-39 = "Fufu. Fico feliz em ter sido útil."
2001906-40 = "[s] \"Sou sempre grato a você, Akane.\""
2001906-41 = "Muito obrigada."
2001906-42 = "Com essas palavras, eu..."
2001906-46 = "[ns] \"Hm, espere...?\""
2001906-49 = "[ns] \"Akaneeeeeeeeeee!?!?\""
2001906-52 = "Sim, sou eu, a coelhinha Akane, pronta para servir você a qualquer momento, mestre?"
2001906-53 = "Pulo, pulo."
2001906-56 = "Fufu... Não achei que você ficaria tão surpreso."
2001906-57 = "Ouvi dizer que o mestre estava trabalhando a noite toda."
2001906-58 = "Então, pensei que adoraria ser útil..."
2001906-59 = "Decidi acompanhar você hoje como sua secretária coelhinha!"
2001906-60 = "Pode me pedir qualquer coisa, mestre!"
2001906-61 = "De corpo e alma, estou preparada!"
2001906-65 = "[ns1] \"Eu agradeço, mas...\"\n[ns2] \"Sinto que você tem estado assim ultimamente, você gosta desse visual?\""
2001906-68 = "Eh, bem?"
2001906-69 = "Ah... o que eu deveria dizer."
2001906-70 = "......Entendo. Não posso culpá-lo por pensar assim."
2001906-71 = "Ultimamente, sempre que encontro o mestre, estou vestida de coelhinha..."
2001906-72 = "O motivo, você pergunta..."
2001906-73 = "Uu, é um pouco embaraçoso dizer isso da minha própria boca."
2001906-74 = "[s] \"Por acaso, você gosta de coelhos?\""
2001906-75 = "Não, não é nada disso."
2001906-76 = "É só que, bem... eu queria que o mestre..."
2001906-77 = "Me olhasse..."
2001906-78 = "[s] \"Será que você queria que eu visse seu traje de coelhinha...?\""
2001906-82 = "C-como você adivinhou?"
2001906-83 = "Auu. Eu não esperava que essas palavras saíssem da boca do mestre..."
2001906-84 = "......Não consigo mais esconder, não é?"
2001906-85 = "Sim... é... a resposta correta."
2001906-86 = "[s] \"Você não precisa se preocupar com isso.\""
2001906-90 = "Sendo o mestre, eu sabia que diria isso."
2001906-91 = "Muito obrigada, mestre."
2001906-92 = "Mas eu... como alguém que serve ao mestre, queria mostrar um novo lado meu."
2001906-93 = "[s] \"E por isso se vestiu de coelhinha?\""
2001906-94 = "Sim... a abordagem pode ser diferente, mas o serviço continua sendo o mesmo."
2001906-95 = "Ficou estranho...? Não foi do seu agrado?"
2001906-96 = "[s3] \"Estranho? De jeito nenhum.\"\n[s4] \"Você estava muito fofa!\""
2001906-101 = "……Muito obrigada, Mestre."
2001906-102 = "Eu deveria estar satisfeita apenas por ser útil ao senhor, mas..."
2001906-103 = "[s] \"Não importa a aparência, Akane continua sendo a Akane.\""
2001906-104 = "É... será mesmo?"
2001906-110 = "Será que posso ter um pouco mais de confiança?"
2001906-113 = "[wa:1000]— Peço perdão……"
2001906-115 = "— Ter esse tipo de pensamento, [wa:1500] como uma empregada, [wa:1150] é inaceitável."
2001906-118 = "— Eu... [wa:1250] tinha perdido a confiança."
2001906-121 = "[wa:1200]— O Mestre [wa:1700] sempre carrega tantas coisas [wa:1000] nas costas,"
2001906-123 = "— e ainda assim, [wa:1100] sorri dizendo que está tudo bem."
2001906-126 = "[wa:1000]— Eu... [wa:1150] não consegui de forma alguma,"
2001906-128 = "— carregar esse fardo [wa:650] em seu lugar……"
2001906-131 = "[wa:950]— Mas, [wa:1250] com as palavras do Mestre,"
2001906-133 = "— sinto que posso [wa:350] seguir em frente novamente."
2001906-136 = "[wa:750]— De agora em diante,"
2001906-138 = "— embora eu ainda seja inexperiente, [wa:1700] por favor, [wa:1250] continue contando comigo."
2001906-141 = "— Mestre."
2001906-144 = "Então, vamos voltar ao trabalho?"
2001906-145 = "Limpeza, lavanderia, culinária, preparar o lanche ou até organizar documentos complicados,"
2001906-146 = "por favor, peça o que desejar!"
2001906-147 = "Vou mostrar ao Sensei a competência de uma empregada da C&C."
2001906-148 = "Pulo, pulo!"
2001906-150 = "（Depois disso, enquanto recebia vários serviços da Akane, terminei o trabalho de papelada durante a noite toda）"
