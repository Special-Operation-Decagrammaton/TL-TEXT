[translation]
2001906-1 = "Case4. 一日秘書、待機中です"
2001906-7 = "（一向に減る気がしない仕事も、残り3割といったところで……）"
2001906-11 = "（凝り固まった肩をほぐそうと、背筋を伸ばした）"
2001906-15 = "[ns] \"誰か一杯でいいから、コーヒーを入れてくれないかな……。\""
2001906-19 = "少し熱いのでお気を付けください、ご主人様。"
2001906-23 = "（そうつぶやいた瞬間、突然コーヒーが出てきた）"
2001906-24 = "[ns] \"悪いね、ありがとう。\""
2001906-30 = "（砂糖も牛乳もなしのブラックだけど……）"
2001906-31 = "（苦味と酸味の調和した私好みの口当たりだ）"
2001906-32 = "（眠気も疲れも吹き飛ぶ素晴らしい一杯だった）"
2001906-37 = "いかがでしたか、ご主人様？"
2001906-38 = "[s] \"至高の一杯だったよ。\""
2001906-39 = "ふふっ。お役に立てて、私もうれしいです。"
2001906-40 = "[s] \"アカネにはいつも感謝しているよ。\""
2001906-41 = "ありがとうございます。"
2001906-42 = "そのお言葉で、私は……"
2001906-46 = "[ns] \"ん、あれ……？\""
2001906-49 = "[ns] \"アカネぇぇぇぇぇぇぇぇ！？！？\""
2001906-52 = "はい、ご主人様のために、いつでもご奉仕するバニーガールのアカネですよ？"
2001906-53 = "ぴょんぴょん。"
2001906-56 = "ふふっ……そこまで驚かれるとは思いませんでした。"
2001906-57 = "ご主人様が徹夜で仕事をされていると聞きまして。"
2001906-58 = "そこでぜひお役に立ちたいと思い……"
2001906-59 = "本日はご主人様のバニーガール秘書としてお付きすることにいたしました！"
2001906-60 = "何でもおっしゃってください、ご主人様！"
2001906-61 = "身も心も、覚悟はできていますので！"
2001906-65 = "[ns1] \"ありがたくはあるんだけど……。\"\n[ns2] \"最近、ずっとその姿な気がするけど、気に入ってるの？\""
2001906-68 = "え、ええと？"
2001906-69 = "ああ……どうしたものでしょう。"
2001906-70 = "……そう、ですね。そう思われても仕方ありませんね。"
2001906-71 = "最近はご主人様と会う時、いつもバニーガールでしたし……。"
2001906-72 = "理由、ですか……。"
2001906-73 = "うぅ、私の口から申し上げるのは、少々恥ずかしいですね。"
2001906-74 = "[s] \"もしかして、ウサギが好きとか？\""
2001906-75 = "いえ、そういうわけではないんです。"
2001906-76 = "ただ、その……ご主人様に私のことを……"
2001906-77 = "見て、いただきたく、て……"
2001906-78 = "[s] \"もしかして、私にバニー姿を見てほしかった、とか……？\""
2001906-82 = "ど、どうして分かったんですか？"
2001906-83 = "あうぅ。まさかご主人様の口からそのような言葉が出るなんて……。"
2001906-84 = "……もうこれ以上は隠せません……よね？"
2001906-85 = "はい……せ、正解……です。"
2001906-86 = "[s] \"そんなこと、気にしなくて大丈夫だよ。\""
2001906-90 = "ご主人様なら、そうおっしゃってくださいますよね。"
2001906-91 = "ありがとうございます、ご主人様。"
2001906-92 = "ですが私は……ご主人様にご奉仕する者として、新たな一面をお見せしたかったんです。"
2001906-93 = "[s] \"それでバニーガールに？\""
2001906-94 = "はい……方向性こそ違うかもしれませんが、ご奉仕には変わりはありませんから。"
2001906-95 = "変でしたか……？お気に召しませんでしたか？"
2001906-96 = "[s3] \"変だなんて、とんでもない。\"\n[s4] \"とても可愛かったよ！"
2001906-101 = "……ありがとうございます、ご主人様。"
2001906-102 = "ご主人様のお役に立てる、それだけで私は十分だったはずなのに……。"
2001906-103 = "[s] \"どんな格好でも、アカネはアカネだよ。\""
2001906-104 = "そう……なんでしょうか？"
2001906-110 = "もう少し、自信を持ってもいいでしょうか？"
2001906-113 = "[wa:1000]― 申し訳ございません……"
2001906-115 = "― こんな考え、[wa:1500]メイドとしては[wa:1150]失格のはずなのに。"
2001906-118 = "― 私……[wa:1250]自信をなくしておりました。"
2001906-121 = "[wa:1200]― ご主人様は[wa:1700]いつも多くのものを[wa:1000]背負っていて、"
2001906-123 = "― それなのに[wa:1100]大丈夫だと笑っていて。"
2001906-126 = "[wa:1000]― 私は……[wa:1150]全然その重荷を、"
2001906-128 = "― 代わりに持って[wa:650]差し上げられず……。"
2001906-131 = "[wa:950]― ですが、[wa:1250]ご主人様のお言葉で、"
2001906-133 = "― 再び[wa:350]前を向けそうです。"
2001906-136 = "[wa:750]― これからも、"
2001906-138 = "― ふつつかものですが[wa:1700]何卒[wa:1250]よろしくお願いいたします。"
2001906-141 = "― ご主人様。"
2001906-144 = "それでは、お仕事に戻りましょうか？"
2001906-145 = "掃除、洗濯、料理、おやつの用意や面倒な書類整理まで、"
2001906-146 = "何なりとお申し付けください！"
2001906-147 = "C&Cのメイドの有能さを、先生にお見せいたします。"
2001906-148 = "ぴょんぴょん！"
2001906-150 = "（その後、アカネから様々なご奉仕を受けながら、徹夜で書類仕事を終わらせた）"
