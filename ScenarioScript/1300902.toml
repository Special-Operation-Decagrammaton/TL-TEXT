[translation]
1300902-1 = "Treino de cochilo hoje também"
1300902-2 = "（Ao chegar no local combinado com Tsubaki, vi uma multidão em um canto）"
1300902-3 = "[ns] \"Será que aconteceu alguma coisa?\""
1300902-6 = "（Ao me aproximar, vi Tsubaki no meio da multidão, dormindo em pé）"
1300902-7 = "Nham, nham... Zzz..."
1300902-8 = "（Ao ver Tsubaki assim, as pessoas ao redor começaram a cochichar）"
1300902-9 = "Ei, olha só. Será que aquela pessoa é..."
1300902-10 = "A Bela Adormecida de Hyakkiyako!"
1300902-11 = "Bela Adormecida? Não pode ser..."
1300902-12 = "Aquela que dizem ser a profissional do sono, que ninguém consegue superar quando o assunto é dormir!?"
1300902-13 = "[s1] \"Bela Adormecida...?\"\n[s2] \"Profissional do sono...?\""
1300902-14 = "Falando nisso, eu vi uma vez."
1300902-15 = "Falando nisso, eu vi uma vez."
1300902-16 = "A Bela Adormecida montando um quebra-cabeça enquanto dormia profundamente!"
1300902-17 = "[s] \"Quebra-cabeça...?\""
1300902-18 = "Ah, qual é, isso não é nada demais."
1300902-19 = "Eu vi a Bela Adormecida construindo uma torre de cartas enquanto cochilava!"
1300902-20 = "[s] \"Torre de cartas...?\""
1300902-21 = "Tsc, tsc, isso nem é um episódio tão impressionante! O que eu vi a Bela Adormecida fazer foi...!"
1300902-23 = "（Depois disso, os comentários entusiasmados das pessoas não paravam）"
1300902-24 = "（Eu não sabia, mas parece que Tsubaki é uma celebridade em Hyakkiyako）"
1300902-27 = "[ns] \"Bem, de qualquer forma, vou falar com ela...\""
1300902-28 = "Finalmente te achamos! Da Comissão de Treino de Hyakkiyako!!"
1300902-31 = "Aqui, aqui, chefe!"
1300902-32 = "Ouvimos dizer que tinha uma aluna dormindo na beira da estrada, e quando vi, pensei que fosse..."
1300902-33 = "Era você mesma, a presidente da Comissão de Treino...!"
1300902-35 = "Zzz..."
1300902-36 = "Não ouse dizer que esqueceu de nós!"
1300902-37 = "Nham..."
1300902-38 = "Zzz..."
1300902-39 = "Ela está nos ignorando!?"
1300902-40 = "Chefe, parece que essa insolente nem está nos ouvindo!"
1300902-41 = "Grr, chega!"
1300902-42 = "Da última vez, você atrapalhou nossa expressão artística de revolta contra a sociedade na rua!"
1300902-43 = "Bom, pra falar a verdade, era só pichação. Né, chefe?"
1300902-44 = "C-cala a boca!"
1300902-45 = "Agora que ela está dormindo, é nossa chance! Ataquem!"
1300902-46 = "Ihuuu!!"
1300902-48 = "As balas estão indo em direção à Bela Adormecida...!"
1300902-49 = "Cuidado!"
1300902-50 = "[s] \"Tsubaki...!?\""
1300902-52 = "...Zzz."
1300902-54 = "Droga, nem no meio de uma chuva de balas ela acorda! Será que desviar disso não é nada para ela?!"
1300902-55 = "Chefe, isso não é o suficiente! Vamos usar algo maior!"
1300902-56 = "Certo, toma isso! Granada!"
1300902-58 = "[ns] \"Tsubaki! Cuidado...!\""
1300902-63 = "Hahaha! E aí, conseguimos!?"
1300902-64 = "Ah, chefe... essa frase é..."
1300902-68 = "E-essa garota...! Ela desviou de todos os meus ataques enquanto dormia!?"
1300902-69 = "E-ela é um monstro ainda pior do que diziam. Chefe, o que a gente faz?!"
1300902-71 = "I-Incrível!"
1300902-72 = "Essa é a Bela Adormecida de Hyakkiyako!"
1300902-73 = "Olhem só, a expressão de triunfo da princesa!"
1300902-74 = "Fuaa, hmm... zzz..."
1300902-75 = "Ela está declarando vitória em alto e bom som enquanto dorme!"
1300902-76 = "(Foi uma cena um tanto quanto impressionante, de várias formas)"
1300902-78 = "Tsc, se é assim então...!"
1300902-79 = "[s] \"Ei, podem me dar licença um segundo?\""
1300902-80 = "V-você é o Sensei do Schale!?"
1300902-81 = "Ah, não!? Se envolver com o Schale só traz problemas, chefe!"
1300902-82 = "Droga, n-não tem jeito! Recuada estratégica!"
1300902-85 = "(Assim que chamei, as duas fugiram)"
1300902-86 = "(...Bem, tanto faz)"
1300902-88 = "[ns] \"Tsubaki, você está bem?\""
1300902-89 = "Hm? Não sei quem você pensa que é, mas não é chamando assim que a Bela Adormecida vai acordar tão fácil..."
1300902-90 = "Fuaa... hm? Essa voz..."
1300902-91 = "...Ah, Sensei."
1300902-92 = "A Bela Adormecida que nem acordou com toda aquela confusão!"
1300902-93 = "Acordou só de ser chamada!?"
1300902-94 = "[s] \"Eu vim porque você me mandou uma mensagem... o que está fazendo?\""
1300902-95 = "Hm? Eu só estava tirando uma soneca enquanto esperava o Sensei...?"
1300902-96 = "Falando nisso, o sol está tão quentinho hoje..."
1300902-97 = "Até agora há pouco, sinto que estava tendo um sonho muito divertido..."
1300902-98 = "[s] \"...Entendi.\""
1300902-99 = "O vento está tão agradável, é o clima perfeito para dormir... não, para treinar."
1300902-100 = "O Sensei também acha, não acha...? Fuaa..."
1300902-101 = "[s] \"Talvez...\""
1300902-102 = "Então, Sensei, como prometido, vou te mostrar um exemplo do meu treino."
1300902-103 = "Vamos para algum lugar apropriado..."
1300902-104 = "[s3] \"Não, está tudo bem.\"\n[s4] \"Eu já vi, foi incrível.\""
1300902-105 = "Hm? Você já viu...?"
1300902-106 = "Hm? Você já viu...?"
1300902-107 = "Hmm... então, o que eu faço? Eu chamei o Sensei justamente para te mostrar como treinar..."
1300902-108 = "Que problema..."
1300902-109 = "[s] \"Já que estamos aqui, vamos almoçar juntos então.\""
1300902-110 = "Almoçar...?"
1300902-111 = "Fufu. Acordar e encontrar o Sensei logo de cara, e ainda almoçar juntos."
1300902-112 = "Parece até que estou vivendo um sonho feliz."
1300902-113 = "Sim, é verdade. Então, Sensei, vamos..."
1300902-115 = "...Zzz."
1300902-116 = "[s] \"...Não, não, Tsubaki, não pode dormir de novo, Tsubaki!?\""
1300902-119 = "(Depois disso, mudamos de lugar para almoçar com a Tsubaki)"
1300902-120 = "(Enquanto comíamos, a Tsubaki continuou fazendo seu 'treino' (?) o tempo todo)"
