[translation]
1300902-1 = "今日も頑張ってうとうと修行"
1300902-2 = "（ツバキとの約束場所に着くと、片隅に人混みが見えた）"
1300902-3 = "[ns] \"何かあったのかな？\""
1300902-6 = "（近づいてみると、その人混みの真ん中に、立ったまま寝ているツバキがいた）"
1300902-7 = "むにゃむにゃ……ぐぅ……。"
1300902-8 = "（そんなツバキを見て、周囲がざわつき始めた）"
1300902-9 = "おい、見ろ。あの人はもしかして……。"
1300902-10 = "百鬼夜行の眠り姫だ！"
1300902-11 = "眠り姫って、まさか……。"
1300902-12 = "あの、寝ることに関しては誰も敵わないと言われる、眠りのプロの！？"
1300902-13 = "[s1] \"眠り姫……？\"\n[s2] \"眠りのプロ……？\""
1300902-14 = "そう言えば私、この前見てしまったんだ。"
1300902-15 = "そう言えば私、この前見てしまったんだ。"
1300902-16 = "眠り姫がすやすや眠ったまま、ジクソーパズルをしているところを！"
1300902-17 = "[s] \"ジクソーパズル……？\""
1300902-18 = "やれやれ、それぐらい驚くことじゃないよ。"
1300902-19 = "私なんか、眠り姫がうつらうつらと寝ぼけながら、トランプでタワーを作ってるところを見たんだから！"
1300902-20 = "[s] \"トランプでタワー……？\""
1300902-21 = "ちっちっちっ、それくらい大したエピソードじゃないな！私が見た眠り姫なんて……！"
1300902-23 = "（その後も、人々の熱い声は止まらなかった）"
1300902-24 = "（知らなかったけれど、どうやらツバキは百鬼夜行の有名人のようだった）"
1300902-27 = "[ns] \"えっと、とりあえず話しかけようか……。\""
1300902-28 = "やっと見つけた！百鬼夜行の修行部の！！"
1300902-31 = "ここ、ここです姉御！"
1300902-32 = "道端で寝てる生徒がいると聞いて、もしかしてと思ったら……。"
1300902-33 = "やはりお前だったか、修行部の部長……！"
1300902-35 = "ぐぅ……。"
1300902-36 = "まさか、私たちのことを忘れたとは言わせないぞ！"
1300902-37 = "むにゃ……。"
1300902-38 = "ぐぅ……。"
1300902-39 = "無視か！？"
1300902-40 = "姉御、こいつ生意気にも聞く耳持たないようですぜ！"
1300902-41 = "くうっ、もういい！"
1300902-42 = "この前は夜道で、社会への怒りを表現した私たちの芸術行為を、よくも邪魔してくれたな！"
1300902-43 = "まあぶっちゃけ落書きでしたけど。ね、姉御！"
1300902-44 = "う、うるさい！"
1300902-45 = "やつが眠ってる今がチャンスだ！やれ！"
1300902-46 = "いやっほ～ぅ！！"
1300902-48 = "銃弾が眠り姫に……！"
1300902-49 = "あ、危ない！"
1300902-50 = "[s] \"ツバキ……！？\""
1300902-52 = "……ぐぅ。"
1300902-54 = "ぐっ、銃弾の雨の中でも眠りから覚めないとは！これを避けるぐらい大したことないということか！"
1300902-55 = "姉御、これじゃ足りません！もっとデカいやつを！"
1300902-56 = "よしっ、くらえ！手榴弾！"
1300902-58 = "[ns] \"ツバキ！危ない……！ \""
1300902-63 = "はーっはっは！どうだ、やったか！？"
1300902-64 = "あっ、姉御……その台詞は……！"
1300902-68 = "こ、こいつ……！寝ながら私の攻撃を全部かわしただと！？"
1300902-69 = "き、聞いてた以上の怪物ですよ。姉御、どうしましょう？！"
1300902-71 = "す、すごい！"
1300902-72 = "これが百鬼夜行の眠り姫！"
1300902-73 = "見ろ、姫のあの勝ち誇った表情を！"
1300902-74 = "ふぁあ、んん……ぐぅー……。"
1300902-75 = "寝言で高らかに勝利を宣言しているぞ！"
1300902-76 = "（なんだか色々とすごい光景だった）"
1300902-78 = "ちっ、こうなったら……！"
1300902-79 = "[s] \"あの、ちょっといいかな？\""
1300902-80 = "あ、あなたは、シャーレの先生！？"
1300902-81 = "うわっ！？シャーレと絡むと面倒なことになりますよ姉御！"
1300902-82 = "くっ、し、仕方ない！戦略的撤退だ！"
1300902-85 = "（声をかけるや否や、二人は逃げてしまった）"
1300902-86 = "（……まあいいか）"
1300902-88 = "[ns] \"ツバキ、大丈夫？\""
1300902-89 = "うん？ちょっと、どこのどなただか知らないが、そんな風に呼びかけたところで眠り姫が簡単に目を覚ますはずが……。"
1300902-90 = "ふあぁ……ん？この、声……。"
1300902-91 = "……あ、先生。"
1300902-92 = "あの騒ぎの中でも起きなかった眠り姫が！"
1300902-93 = "呼ばれてすぐに起きただと！？"
1300902-94 = "[s] \"メッセージをくれたから来たんだけど……何してるの？\""
1300902-95 = "んー？先生を待ちながら、ちょっと寝てただけだよ……？"
1300902-96 = "そう言えば、今日は日差しもぽかぽかで……。"
1300902-97 = "さっきまでなんだか、すごく楽しい夢を見てた気がする……。"
1300902-98 = "[s] \"……そっかあ。\""
1300902-99 = "風もこんなに気持ち良いし、寝るのに……ううん、修行するのにぴったりの天気だね。"
1300902-100 = "先生も、そう思うでしょ……？ふあぅ……。"
1300902-101 = "[s] \"そうかも……？\""
1300902-102 = "それじゃあ先生、約束通り、私が修行のお手本を見せてあげる。"
1300902-103 = "どこか適当な場所に……。"
1300902-104 = "[s3] \"ううん、大丈夫。\"\n[s4] \"もう見せてもらったよ、すごかった。\""
1300902-105 = "ん？もう見た……？"
1300902-106 = "ん？もう見た……？"
1300902-107 = "うーん……じゃあ、どうしよう。修行のやり方を見せてあげようと思って、先生を呼んだのに……。"
1300902-108 = "困った……。"
1300902-109 = "[s] \"それならせっかくだし、一緒にお昼でも食べよう。\""
1300902-110 = "お昼……？"
1300902-111 = "ふふっ。起きてすぐに先生に会えて、そのままお昼だなんて。"
1300902-112 = "まるで幸せな夢でも見てるみたい。"
1300902-113 = "うん、そうだね。じゃあ、先生、そしたら……。"
1300902-115 = "……ぐぅ。"
1300902-116 = "[s] \"……いやいやツバキ、また寝ちゃダメだって、ツバキ！？\""
1300902-119 = "（その後ツバキとお昼を食べるために場所を移した）"
1300902-120 = "（お昼を食べてる間も、しょっちゅうツバキは修行（？）していた）"
