[translation]
204-1 = "Doutrina Ancestral"
204-5 = "O chamado 'Sublime' possui dois aspectos... um é o 'Mistério', que é impossível de alcançar. E o outro é o 'Terror' irreversível."
204-6 = "Para usar uma analogia, é como os dois lados de uma moeda; o 'Mistério' e o 'Terror' são inseparáveis um do outro."
204-7 = "No entanto, assim como uma moeda lançada ao ar acaba mostrando apenas um dos lados, o 'Sublime' também se manifesta dessa forma."
204-8 = "O 'Mistério' e o 'Terror'. A essência deles é a mesma, mas nós, como forma do 'Sublime', só conseguimos observar um desses dois lados."
204-9 = "Bem, embora eu tenha dito isso... é embaraçoso admitir, mas, na verdade, nós não compreendíamos isso de verdade. Em suma, nós falhamos."
204-10 = "Nós não conseguimos obter o 'Mistério', e, além disso, nem sequer conseguimos alcançá-lo de forma adequada."
204-12 = "A única coisa que conseguimos nos aproximar foi o 'Terror', e, além disso, era apenas uma cópia."
204-13 = "Bem, como alguém que apoia o conceito de simulacro, considero que a distinção entre 'original' e 'cópia' não tem sentido, mas..."
204-15 = "No fim das contas, não era algo que pudéssemos manipular... essa é a minha conclusão por enquanto."
204-16 = "Pode haver colegas que não concordem com essa conclusão, mas não cabe a mim interferir no julgamento de cada um."
204-17 = "De qualquer forma, tivemos que pensar em outro método."
204-18 = "Foi então que voltamos nossos olhos para a doutrina ancestral selada sob Trinity. Embora seja diferente do 'Sublime', o 'Mistério' e o 'Terror' ali ocultos possuem partes que se assemelham em outro sentido, ou seja, como conceito..."
204-19 = "......Perdão."
204-20 = "Talvez eu tenha falado algo entediante. Desculpe, Sensei."
204-21 = "Em suma... eu queria apresentar a você este pequeno sucesso."
204-22 = "Afinal, aquela doutrina finalmente se encarnou, e está prestes a ser provado que sua vontade, assim como no céu, também se concretiza na terra."
204-25 = "Um anjo artificial e monstro divino que nós criamos."
204-26 = "Permita-me apresentar. Esta é a doutrina encarnada que lidera a 'Comunhão dos Santos'..."
204-27 = "Pegando emprestado o nome relacionado àquela doutrina ancestral, nós o chamamos de 'Hieronymus'."
204-28 = "Portanto, deixe-me declarar... talvez pareça um pouco vanguardista, mas como também sou um artista, espero que me perdoe."
204-29 = "......Ah. Aquele bem-aventurado foi finalmente canonizado, tornou-se um santo e, como prova disso, está prestes a realizar um milagre..."
204-30 = "Vamos, Sensei... por favor, por favor, prepare-se para aplaudir mais uma vez."
