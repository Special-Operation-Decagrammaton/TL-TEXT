[translation]
204-1 = "太古の教義"
204-5 = "いわゆる「崇高」というものは、二つの側面を持っている……ひとつは、到底たどり着くことの叶わない「神秘」。そしてもうひとつは、不可逆の「恐怖」。"
204-6 = "例えるならばそう、それはまるでコインの両面のように、「神秘」と「恐怖」とは互いに切り離すことができないものなのだ。"
204-7 = "しかし宙に投げられたコインが最終的にはどちらか一方の面を見せるのと同じように、「崇高」もまたそのような形で顕現する。"
204-8 = "「神秘」、そして「恐怖」。これらの本質は同じだが、私たちは「崇高」の形として、その二つの内の一面しか観測することができない。"
204-9 = "と、まあ語ってはみたものの……お恥ずかしい話だが実のところ、私たちはそれを真に理解できていたわけではなかった。つまり[ruby=ゲマトリア]私たち[/ruby]は、失敗したのだ。"
204-10 = "私たちは「神秘」を手にすることはできず、それどころか真っ当に手が届くことすらなかった。"
204-12 = "私たちが近づくことができたのは「恐怖」だけであり、その上それは[ruby=ミメシス]複製[/ruby]されたものに過ぎなかったのだ。"
204-13 = "まあシミュラクラの概念を支持する私としては、「原本」や「複製」といった区分は無意味だと考えているものの……。"
204-15 = "結局のところ、私たちに扱える代物ではなかった……というのが、今のところの私の結論だ。"
204-16 = "この結論に同意しない同志もいるだろうが、その各々の判断については私が関与すべきものではなかろう。"
204-17 = "とにかく、私たちはまた別のやり方を考えねばならなかった。"
204-18 = "そこで私たちは、トリニティの地下に封印されし太古の教義に目を向けた。「崇高」とは違うものの、そこに秘められた「神秘」、そして「恐怖」はまた別の意味で似ているような部分があり、つまり概念としては――"
204-19 = "……失礼。"
204-20 = "退屈な話をしてしまったかもしれないな。すまない、先生。"
204-21 = "つまり……私はそなたに、この小さな成功を紹介したかったのだ。"
204-22 = "なにせその教義はついに受肉し、その意志が天と同様に、地においても結実することが証明されようとしているのだから。"
204-25 = "[ruby=ゲマトリア]私たち[/ruby]が作り出した、人工の天使にして、神性の怪物。"
204-26 = "紹介しよう。こちらが[ruby=Communio Sanctorum]「聖徒の交わり」[/ruby]を率いる、受肉せし教義……。"
204-27 = "その太古の教義に関わる名を借りて、私たちは「ヒエロニムス」と呼んでいる。"
204-28 = "ゆえに、こう宣言させてもらおう……もしかしたら少々前衛的だと思われるかもしれないが、私は芸術家でもあるのでそこは許してほしい。"
204-29 = "……嗚呼。かの福者はついに列聖され、聖人となり、その証として奇跡を起こさんとせん……"
204-30 = "さあ、先生……どうか、どうか今一度、喝采の準備を。"
