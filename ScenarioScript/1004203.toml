[translation]
1004203-1 = "Escola no meio da noite"
1004203-2 = "Telhado do prédio principal de uma certa escola"
1004203-3 = "Bom dia, Sensei."
1004203-4 = "[s1] \"Bom dia.\"\n[s2] \"Bom dia, embora já seja noite...\""
1004203-5 = "Cumprimentar é importante."
1004203-6 = "Cumprimentar é importante."
1004203-7 = "[s] \"Com certeza. Aliás, onde estamos...\""
1004203-8 = "Eu encontrei este lugar outro dia."
1004203-9 = "[s] \"Entendo...?\""
1004203-10 = "A porta ali está aberta, então podemos entrar no prédio por aqui."
1004203-11 = "Vamos lá."
1004203-15 = "[ns3] \"E-espera, Atsuko!\"\n[ns4] \"Entrar sem permissão é...!\""
1004203-16 = "……Incrível. Sensei, venha logo."
1004203-17 = "……Incrível. Sensei, venha logo."
1004203-18 = "[ns] Decido seguir ela por enquanto."
1004203-23 = "É incrível. Então as outras escolas são assim."
1004203-24 = "Aquela ali é a sala de aula?"
1004203-28 = "[ns5] \"E-espera!\"\n[ns6] Corro atrás dela."
1004203-31 = "……."
1004203-32 = "Então é assim que é, né..."
1004203-33 = "[s] \"Atsuko, não podemos entrar na escola sem permissão.\""
1004203-34 = "……Por que?"
1004203-35 = "Não é como se eu estivesse tentando causar problemas."
1004203-36 = "……Mas eu entendo. Se formos descobertos, provavelmente vamos levar uma bronca..."
1004203-37 = "Vou sair daqui em pouco tempo, então tudo bem, né?"
1004203-38 = "[ns7] \"……É, acho que sim.\"\n[ns8] \"Só um pouquinho, viu?\""
1004203-39 = "……Sim!"
1004203-40 = "……Sim!"
1004203-47 = "(Atsuko sentou na carteira da frente.)"
1004203-48 = "Sensei, uma pergunta."
1004203-49 = "[s] \"……Uma pergunta?\""
1004203-50 = "Durante a aula, surgiu uma dúvida."
1004203-51 = "[s9] (Ah... então é brincadeira de escolinha)\n[s10] \"Sim. Pode perguntar, Atsuko.\""
1004203-52 = "Como é que se fazem as crianças?"
1004203-53 = "Como é que se fazem as crianças?"
1004203-54 = "[s] \"…….\""
1004203-55 = "……Brincadeira. Sensei, não precisa ficar tão confuso."
1004203-59 = "Então, vamos para outro lugar."
1004203-61 = "Aqui é o auditório?"
1004203-62 = "Será que esses assentos ficam todos cheios de alunos?"
1004203-63 = "Deve ser uma cena bem animada, né."
1004203-65 = "Aqui deve ser o chuveiro."
1004203-66 = "É divertido tomar banho todo mundo junto, né? Eu gosto."
1004203-67 = "Quando eu estava em Arius... o momento de tomar banho com todo mundo era o que eu mais gostava."
1004203-68 = "Então, vamos para o próximo lugar."
1004203-70 = "Aqui é a sala do clube, eu acho."
1004203-71 = "Clube de Pesquisa de Pedrinhas... será que eles colecionam pedras? ...Hehe, existem clubes assim também."
1004203-72 = "Entendi... existem tantos clubes quanto existem hobbies, né."
1004203-73 = "[s] \"E qual é o seu hobby, Atsuko?\""
1004203-74 = "Hobby...?"
1004203-75 = "Eu..."
1004203-79 = "Ah, fui descoberta!"
1004203-80 = "[s] \"Vamos fugir!\""
1004203-84 = "(Levei Atsuko e saímos apressados da escola.)"
1004203-86 = "……Fufu. Foi por pouco, não é?"
1004203-87 = "Mas... foi divertido sentir essa adrenalina. Né?"
1004203-88 = "[s] \"Haa...\""
1004203-89 = "Obrigada por atender ao meu capricho, Sensei."
1004203-90 = "Por hoje é só. Então, até mais."
