[translation]
10046040-1 = "Episódio 4: O que se obtém após a negociação"
10046040-2 = "Não conheço os detalhes da situação, mas..."
10046040-3 = "Você disse que precisava de ingredientes para um churrasco. #nE que, além disso, precisava deles agora mesmo, já prontos para serem grelhados... foi isso, não foi?"
10046040-7 = "I-Isso mesmo! É isso!"
10046040-8 = "O Sensei disse que talvez vocês tivessem..."
10046040-9 = "Eu me pergunto o porquê, mas... já que é o Sensei quem está pedindo."
10046040-14 = "Dito isso, que tipo de situação faz com que você precise disso tão de repente?"
10046040-15 = "Hã? Isso nunca acontece com você? #nAquele momento em que você pensa: 'Preciso disso agora, não tem outro jeito!'"
10046040-16 = "Isso é motivo suficiente para pedir ajuda a alunas de outra escola?"
10046040-17 = "O Tea Party não é um grupo importante? #nImaginei que, se ordenassem aos subordinados, eles trariam tudo imediatamente."
10046040-18 = "Tea Party...? #nSignifica que vocês podem comer chá e biscoitos a qualquer hora!? Que inveja!"
10046040-19 = "Não, não é bem assim... ou será que é...?"
10046040-24 = "De qualquer forma."
10046040-25 = "Por acaso, temos um conjunto completo de churrasco aqui. #nE quanto à qualidade, não há do que reclamar."
10046040-26 = "[s1] \"Sério mesmo!?\"\n[s2] \"Eu nem achei que fosse dar certo!\""
10046040-29 = "Hã!? É o Sensei quem está surpreso?"
10046040-30 = "Mas que bom que parece que vai dar certo! #nAgora só falta a negociação!"
10046040-31 = "Haruna, de Gehenna, certo?"
10046040-32 = "Você poderia nos ceder esse conjunto de churrasco?"
10046040-33 = "Ah, claro que não estou pedindo de graça! #nEu vou pagar o valor justo. Pode pedir o preço que quiser—"
10046040-37 = "Quer dizer, eu não tenho tanto dinheiro assim, mas..."
10046040-38 = "Vou fazer o meu melhor!"
10046040-39 = "Já que é o Tea Party quem está pedindo, tenho certeza de que será um excelente negócio."
10046040-40 = "Então...!"
10046040-41 = "No entanto, eu recuso."
10046040-42 = "Por quê!?"
10046040-43 = "Nós somos gourmets. O valor da gastronomia e a experiência que ela proporciona... #nIsso não tem preço."
10046040-44 = "Tentar trocar isso por dinheiro... #nEssa ideia simplória chega a ser um insulto."
10046040-46 = "......Como eu imaginei."
10046040-50 = "Mika-sama. Deixe o resto conosco."
10046040-51 = "Hasumi-senpai... espere um pouco."
10046040-52 = "Se conversarmos direito—"
10046040-61 = "......Não, não vai dar. #nDe qualquer forma, não há como conversar com elas."
10046040-62 = "Desta vez, o Sensei também tem culpa."
10046040-63 = "[s3] \"Hã?\"\n[s4] \"Eu também?\""
10046040-66 = "Logo de todas as pessoas... pedir ajuda justamente ao Clube de Pesquisa Gourmet."
10046040-67 = "Você não sabe dos inúmeros incidentes que elas causaram no distrito autônomo de Trinity?"
10046040-68 = "E ainda por cima, trazê-las até a presença da Mika-sama—"
10046040-69 = "[s5] \"E-Elas não são tão perigosas quanto a Hasumi pensa...\"\n[s6] \"E-Eu não acho que elas sejam tão perigosas assim... mas...!\""
10046040-74 = "Você não entende que elas representam um perigo!?"
10046040-75 = "A negociação está encerrada. Agora mesmo...!"
10046040-77 = "E-Espere!"
10046040-83 = "Espere, Hasumi-chan."
10046040-88 = "Por que não conversamos só mais um pouco? #nTalvez a gente consiga encontrar um meio-termo."
10046040-89 = "Se causarmos um alvoroço aqui, acho que as coisas vão ficar ainda piores."
10046040-90 = "Se a Nagi-chan e a Seia-chan descobrirem, veja só... #nPor isso, por favor."
10046040-91 = "Só hoje, eu quero que tudo termine sem problemas."
10046040-96 = "Mika-sama..."
10046040-100 = "Entendido."
10046040-101 = "No entanto, se eu julgar que há qualquer perigo... #nEu irei intervir."
10046040-102 = "Sim, obrigada!"
10046040-108 = "Digo, Haruna?"
10046040-109 = "Desculpa pelo que aconteceu agora há pouco. #nEu não levei em consideração o que você estava sentindo."
10046040-110 = "Fufu, não se preocupe. É algo que acontece com frequência."
10046040-111 = "Na verdade, admiro sinceramente a sua postura de tentar compreender."
10046040-112 = "Obrigada. #nDigo... a gastronomia não é sobre dinheiro, né?"
10046040-113 = "Então, que tal fazermos assim? #nSe você ceder agora, eu te dou um conjunto de churrasco melhor depois!"
10046040-114 = "Entendo, uma troca direta... é isso que propõe."
10046040-115 = "Gastronomia por gastronomia —"
10046040-116 = "Sim, não é uma má ideia."
10046040-117 = "E-então...!"
10046040-118 = "Eu gostaria de levar em conta os seus sentimentos e ceder o máximo possível, mas..."
10046040-119 = "Ainda assim, terei que recusar."
10046040-123 = "Parecia que ia dar certo!"
10046040-124 = "Para mim, também é uma decisão difícil. #nA proposta da Mika é, em si, uma discussão sobre gastronomia."
10046040-125 = "— Por quanto tempo dura a felicidade de comer algo delicioso?"
10046040-126 = "Uma semana? Um dia? Uma hora? #nNão. O brilho intenso dura apenas aquele instante."
10046040-127 = "Em contrapartida, não há fim para a preparação necessária para tornar a gastronomia o que ela é — #ne o tempo gasto é, naturalmente, irreversível."
10046040-128 = "Ou seja — a gastronomia é o ato de sacrificar um tempo imenso para saborear uma felicidade efêmera. #n...É assim que eu defino."
10046040-129 = "Portanto, terei que recusar a proposta da Mika."
10046040-130 = "Nós nos preparamos para fazer o churrasco agora. #nAcho que isso já é motivo suficiente para recusar."
10046040-137 = "Eh... ou seja, o que isso significa? #nVocê fala de um jeito parecido com a Seia-chan."
10046040-141 = "Negociações encerradas, então. #nDeixe comigo, Mika-sama."
10046040-142 = "Hasumi-chan!?"
10046040-143 = "Como eu disse antes, o "senso comum" não funciona com o pessoal de Gehenna."
10046040-144 = "Especialmente com o Clube de Pesquisa Gastronômica. É perda de tempo tentar conversar."
10046040-149 = "Ora, isso é algo que não posso deixar passar~"
10046040-150 = "É isso mesmo! Não acha que está exagerando um pouco!?"
10046040-152 = "Por que não reflete sobre o seu próprio comportamento!?"
10046040-153 = "Compromisso? Nem pensar!"
10046040-155 = "Ora, essa frase serve para vocês também."
10046040-156 = "Não há espaço para concessões no caminho da gastronomia. #nE isso vale para este churrasco também."
10046040-157 = "Ichika!"
10046040-161 = "Sim!"
10046040-163 = "E-esperem! Pessoal, se acalmem!"
10046040-165 = "Não precisa se preocupar. Isso também faz parte da negociação."
10046040-166 = "O método apenas mudou de palavras para balas."
10046040-167 = "Bem, é exatamente isso."
10046040-172 = "[ns7] \"Ah~ no fim das contas, acabou assim.\"\n[ns8] \"Teria sido bom se pudéssemos resolver na conversa...\""
10046040-180 = "— Espere um momento."
10046040-187 = "Poderia me responder uma última coisa?"
10046040-188 = "Mika-san."
10046040-192 = "Eh, eu?"
10046040-193 = "Por que você insiste tanto nesse churrasco?"
10046040-194 = "Não me parece o tipo de pessoa que segue o caminho da gastronomia com tanta dedicação..."
10046040-195 = "Parece haver um motivo muito importante para esse seu \"tem que ser agora, de qualquer jeito\"..."
10046040-199 = "I-isso é..."
10046040-205 = "...Eu tenho uma amiga que é muito preocupada."
10046040-206 = "Ela é do tipo que fica ansiosa se qualquer coisa sai do planejado."
10046040-207 = "Por exemplo, se o cardápio do almoço for diferente do esperado — #nela já começa a pensar que algo deu errado e fica imaginando mil coisas..."
10046040-208 = "Sério, ela tem uma personalidade complicada, não é?"
10046040-209 = "Ela é uma amiga muito importante, mas eu não consigo ser de muita ajuda..."
10046040-210 = "Não, na verdade, ela só causa problemas e vive me dando trabalho."
10046040-211 = "Por isso, eu só queria que ela pudesse descansar tranquilamente hoje, sem se preocupar com nada."
10046040-212 = "……Embora pareça que não vai ser possível."
10046040-217 = "Entendo... Então essa é a situação..."
10046040-218 = "Mas, mesmo assim..."
10046040-223 = "Ei."
10046040-224 = "A gente não pode dar isso para ela?"
10046040-225 = "Izumi...?"
10046040-226 = "Coisas gostosas ficam ainda mais saborosas quando comemos com alegria, não é?"
10046040-227 = "Mas, depois de ouvir o que você disse...#nEu acho que não conseguiria comer isso com gosto."
10046040-229 = "Eu concordo."
10046040-230 = "Até você, Junko...?"
10046040-231 = "É que... eu não consigo ignorar isso."
10046040-232 = "E não é como se tivesse que ser um churrasco obrigatoriamente, né?"
10046040-233 = "……Além disso, a gente só ficou sabendo que era um churrasco agora há pouco."
10046040-234 = "Entendo. E quanto a você, Akari..."
10046040-238 = "Ora, foi uma pergunta boba?"
10046040-243 = "Como esperado da Haruna. Você me conhece muito bem★"
10046040-244 = "……Entendi a opinião de todas vocês."
10046040-245 = "Muito bem. Eu vou ceder isso a vocês."
10046040-250 = "Sério!?"
10046040-251 = "Pode mesmo!?"
10046040-252 = "[s] \"Hã!?\""
10046040-256 = "P-pessoal? O que vocês pensam de mim?"
10046040-257 = "Ei, quer que a gente responda com sinceridade?"
10046040-258 = "Não... já chega, por favor..."
10046040-262 = "Claro que exigirei uma compensação."
10046040-263 = "Será uma troca por ingredientes de qualidade superior, afinal."
10046040-264 = "Certo, obrigada! Eu vou trazer, pode deixar!"
10046040-265 = "Então, por favor, leve isto."
10046040-271 = "Conseguimos! Vamos voltar logo para—"
10046040-276 = "……."
10046040-280 = "Hã?"
10046040-281 = "[s9] \"O que houve?\"\n[s10] \"Algum problema com os ingredientes?\""
10046040-284 = "Este conjunto... da caixa ao conteúdo, tudo...#nÉ exatamente o mesmo que eu tinha preparado..."
10046040-290 = "Ah, droga."
10046040-291 = "Já era, acabou."
10046040-296 = "Ou seja, quem atacou o caminhão desde o início foi o Clube de Pesquisa Gastronômica...?"
10046040-301 = "As negociações falharam, como esperado!!!"
10046040-302 = "Senhorita Mika! Suas ordens!!"
10046040-303 = "…………."
10046040-308 = "(Ah, acho que não vai dar. Não tenho mais motivos para impedir...)"
10046040-309 = "(Ela estava se segurando por causa da amiga, mas a Mika é naturalmente radical)"
10046040-310 = "(O confronto parece inevitável agora...)"
10046040-311 = "(Vou pensar em como relatar isso para a Nagisa-sama)"
10046040-316 = "……Que bom. Fico feliz que tenha sido encontrado em segurança."
10046040-323 = "Desculpe, Hasumi-chan. Você poderia deixar passar dessa vez?#n……Por favor."
10046040-324 = "……Como é?"
10046040-325 = "Eu entendo perfeitamente como você se sente. #nMas eu quero voltar antes que fique muito tarde."
10046040-326 = "……A senhorita Mika está realmente bem com isso?"
10046040-327 = "Sim. Porque agora existem coisas mais importantes."
10046040-332 = "…………."
10046040-334 = "E-eu não entendi muito bem, mas será que escapamos por pouco?"
10046040-335 = "Senti como se tivesse encontrado a presidente do Comitê Disciplinar……."
10046040-337 = "Fufu…… fufufu……."
10046040-338 = "Parece que a sorte sorriu para nós."
10046040-339 = "Será que é porque temos agido corretamente?"
10046040-341 = "Como você consegue dizer uma coisa dessas……."
10046040-343 = "A amizade é algo realmente maravilhoso, não é?★"
10046040-346 = "Será que já está tarde demais para o almoço?"
10046040-347 = "Hmm…… mesmo se nos apressarmos, acho que vai dar umas 15h."
10046040-348 = "Nós cuidaremos dos preparativos, então a senhorita Mika pode ir até as duas……!"
10046040-349 = "Obrigada! Então, conto com vocês!"
10046040-358 = "U-ugugu……!"
10046040-359 = "Nagisa, você está colocando força demais desde agora."
10046040-360 = "Você precisa relaxar mais o corpo. #nHm…… pelo visto, é difícil explicar apenas com palavras."
10046040-361 = "Veja, é aqui. Estique um pouco mais aqui――"
10046040-366 = "Ai……!?"
10046040-370 = "V-você pretende quebrar meus ossos!?"
10046040-371 = "Não está exagerando um pouco……?"
10046040-376 = "Ora, Sensei. Mika também está aqui."
10046040-377 = "[s11] \"O que estão fazendo?\"\n[s12] \"Parece divertido.\""
10046040-380 = "Ioga. É um hobby meu."
10046040-381 = "A Seia-san me convidou para participar……."
10046040-382 = "Eu não esperava que ela fosse aceitar tão prontamente."
10046040-383 = "Falando nisso, os preparativos para o almoço estão indo bem? #nSenti um cheiro muito bom vindo de lá."
10046040-387 = "Ah~ talvez demore um pouco. Acabamos de começar a assar."
10046040-388 = "Desculpe por fazer vocês esperarem."
10046040-389 = "O almoço era um churrasco, não era? #nEu não achei que levaria tanto tempo para preparar……."
10046040-393 = "――Ah."
10046040-399 = "Então, poderia preparar o chá?"
10046040-400 = "……Eh?"
10046040-401 = "Pelo visto, quando terminarmos de comer, já será hora do chá da tarde."
10046040-402 = "A-ah, espera?"
10046040-407 = "Conto com os preparativos, viu."
