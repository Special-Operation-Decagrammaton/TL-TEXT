[translation]
10046040-1 = "第4話;交渉の先、手にするモノ"
10046040-2 = "詳しい事情は存じませんが……。"
10046040-3 = "バーベキューの食材が必要になった。#nそれも、今すぐ、焼く準備まで整った状態で……というお話でしたね？"
10046040-7 = "う、うん！そうなの！"
10046040-8 = "あなた達なら持ってるかもしれない……って先生が。"
10046040-9 = "なんで？とは思うけど……先生の言うことだし。"
10046040-14 = "というか、急に必要になるってどんな状況？"
10046040-15 = "え～？たまにない？#n今はこれじゃないとダメ！みたいな時。"
10046040-16 = "それ、わざわざ他学園の生徒にまで頼むほどのこと？"
10046040-17 = "ティーパーティーって、偉いんでしょ？#n部下に命令すればすぐ持ってきてくれそうなのに。"
10046040-18 = "ティーパーティー……？#nいつでもお茶とクッキーが食べられるってこと！？いいなぁ～！"
10046040-19 = "いや、そんなわけ……あるかも……？"
10046040-24 = "ともかく。"
10046040-25 = "ちょうどここに、バーベキューセットが一式。#n質に関しても申し分ありません。"
10046040-26 = "[s1] \"え、本当に！？\"\n[s2] \"ダメ元だったのに！\""
10046040-29 = "えっ！？先生が驚くとこ！？"
10046040-30 = "でもなんとかなりそうで良かった！#nこれであとは交渉だけだね！"
10046040-31 = "ゲヘナの……ハルナちゃん、だっけ。"
10046040-32 = "そのバーベキューセット、譲ってくれないかな？"
10046040-33 = "あ、もちろんタダってわけじゃないよ！#nお金ならちゃんと払うから。言い値で――"
10046040-37 = "って、そんなに余裕はないんだけど……。"
10046040-38 = "でも、できる限り頑張るから！"
10046040-39 = "他でもないティーパーティーの方がおっしゃるのですから。#nさぞや良い取引になるのでしょう。"
10046040-40 = "じゃあ……！"
10046040-41 = "ですが、お断りします。"
10046040-42 = "どうして！？"
10046040-43 = "私たちは美食家です。美食の価値と、そこから得られる経験。#nそれはまさにプライスレス。"
10046040-44 = "それを金銭で引き換えようだなんて……#nその安直な発想は、侮辱にさえ思えるほど。"
10046040-46 = "……やはり。"
10046040-50 = "ミカ様。ここからは私たちにお任せください。"
10046040-51 = "ハスミ先輩……ちょっと待ってほしいっす。"
10046040-52 = "ちゃんと話し合えば――"
10046040-61 = "……いや、ダメっすね。#nどうせ、話にならないっすよ。"
10046040-62 = "今回ばかりは、先生にも非があります。"
10046040-63 = "[s3] \"え？\"\n[s4] \"私も？\""
10046040-66 = "よりによって――頼む相手が美食研究会だなんて。"
10046040-67 = "あの者がトリニティ自治区で起こした数々の事件を、ご存じないのですか？"
10046040-68 = "あまつさえ、ミカ様の前に連れて来るなど――"
10046040-69 = "[s5] \"は、ハスミが思うほど危険な……。\"\n[s6] \"き、危険な子たちじゃ、ない……とは思うけど……！\""
10046040-74 = "危険性があることは理解しているのではありませんか！"
10046040-75 = "やはり交渉中断です。今すぐ……！"
10046040-77 = "ま、待って！"
10046040-83 = "待って、ハスミちゃん。"
10046040-88 = "もうちょっとだけ話してみない？#nもしかしたら妥協点が見つかるかもしれないし。"
10046040-89 = "ここで騒ぎを起こしたら、もっと大変なことになると思う。"
10046040-90 = "ナギちゃんとセイアちゃんに気づかれたら、ほら……。#nだから、お願い。"
10046040-91 = "今日だけは、何事もなく終わらせたい。"
10046040-96 = "ミカ様……。"
10046040-100 = "分かりました。"
10046040-101 = "ただし、少しでも危険だと判断した場合は――#n介入させていただきます。"
10046040-102 = "うん、ありがとう！"
10046040-108 = "その、ハルナちゃん？"
10046040-109 = "さっきはごめんね。#nハルナちゃんの気持ち、ちゃんと考えてなくて。"
10046040-110 = "ふふ、構いませんわ。よくあることですので。"
10046040-111 = "むしろ、理解しようとする姿勢には、素直に感服するくらいですわ。"
10046040-112 = "ありがとう。#nその……美食はお金じゃないんだよね？"
10046040-113 = "だったら、こうするのはどう？#n今譲ってくれたら、後でもっと良いバーベキューセットをあげる！"
10046040-114 = "なるほど、物々交換……ということですわね。"
10046040-115 = "美食には美食を――"
10046040-116 = "ええ、悪くありません。"
10046040-117 = "じゃ、じゃあ……！"
10046040-118 = "ここはお気持ちを汲んで、できる限り譲歩したいところですが……。"
10046040-119 = "やはり、お断りします。"
10046040-123 = "いける流れだったじゃん！"
10046040-124 = "私にとっても苦渋の決断なのです。#nミカさんの提案は、美食の議論そのものですから。"
10046040-125 = "――美味しいものを食べた時の幸せは、どれほど続くのか。"
10046040-126 = "一週間？一日？一時間？#nいいえ。ひと際輝くのは、その瞬間だけ。"
10046040-127 = "対して、美食を美食たらしめるための仕込みに果ては無く――#n費やされた時間は当然、不可逆です。"
10046040-128 = "即ち――美食とは、刹那の幸せを味わうために、膨大な時間を犠牲にする行為である。#n……私はそう定義しておりますわ。"
10046040-129 = "ですので、ミカさんの提案はお断りさせていただきます。"
10046040-130 = "私たちは、[ruby=・]今[/ruby]バーベキューをするために準備してきたのですから。#nそれだけで、断る理由としては十分かと。"
10046040-137 = "え……つまり、どういう意味？#nなんかセイアちゃんみたいなこと言うんだね。"
10046040-141 = "交渉決裂、ですね。#nここはお任せください、ミカ様。"
10046040-142 = "ハスミちゃん！？"
10046040-143 = "先ほども申し上げたとおり、ゲヘナ相手に「常識」は通じません。"
10046040-144 = "美食研究会なら尚のこと。話し合うだけ無駄です。"
10046040-149 = "あら、それは聞き捨てならないですね～"
10046040-150 = "そうよ！ちょっと言いすぎじゃない！？"
10046040-152 = "日頃の行いを振り返ったらいかがですか！？"
10046040-153 = "妥協など、言語道断！"
10046040-155 = "あら、それはこちらの台詞ですわ。"
10046040-156 = "美食の道に妥協などありません。#nそれはこのバーベキューも同じこと。"
10046040-157 = "イチカ！"
10046040-161 = "はいっす！"
10046040-163 = "ま、待って！みんな落ち着いて！"
10046040-165 = "ご心配には及びません。これも交渉です。"
10046040-166 = "その手段が、言葉から銃弾に変わっただけのこと。"
10046040-167 = "まあ、そういうことっすね。"
10046040-172 = "[ns7] \"あ～結局こうなっちゃうのか。\"\n[ns8] \"言葉で交渉できると良かったけど……。\""
10046040-180 = "――お待ちください。"
10046040-187 = "最後に、一つお伺いしても？"
10046040-188 = "ミカさん。"
10046040-192 = "え、私？"
10046040-193 = "なぜ、そこまでバーベキューにこだわるのですか？"
10046040-194 = "こだわりを持ち、美食の道を歩む方とは思えませんし……。"
10046040-195 = "「今すぐ、どうしても」という部分に……#nやんごとない理由がおありのようにお見受けしますが。"
10046040-199 = "そ、それは……。"
10046040-205 = "……心配性の友達がいてね。"
10046040-206 = "ちょっとでも計画からずれると、不安になっちゃう子でさ。"
10046040-207 = "例えば、お昼のメニューが予定と違ったら――#nそれだけで何かトラブルがあったのかってあれこれ考えだしちゃうような……。"
10046040-208 = "ほんと、面倒な性格だよね？"
10046040-209 = "本当に大切な友達なんだけど、私じゃ力になれなくて……。"
10046040-210 = "ううん、むしろトラブルばっか起こして、迷惑かけっぱなしでさ。"
10046040-211 = "だから今日だけでも、何も気にせずゆっくり休ませてあげたかったんだ。"
10046040-212 = "……ちょっと、できそうにないんだけどね。"
10046040-217 = "なるほど……そのような事情が……。"
10046040-218 = "ですが、だからといって……。"
10046040-223 = "ねえ。"
10046040-224 = "これ、あげちゃダメかな？"
10046040-225 = "イズミさん……？"
10046040-226 = "美味しいものってさ、楽しく食べたらもっと美味しくなるでしょ？"
10046040-227 = "でも、今の話聞いちゃったら……#n私、これ食べてもあんまり美味しくないと思うんだ。"
10046040-229 = "私も賛成。"
10046040-230 = "ジュンコさんまで……？"
10046040-231 = "なんか……ほっとけないっていうか。"
10046040-232 = "バーベキューじゃないと絶対ダメってわけでもないし？"
10046040-233 = "……そもそもバーベキューだって知ったのも、ついさっきだったし。"
10046040-234 = "なるほど。ではアカリさんは……。"
10046040-238 = "あら、愚問でしたか？"
10046040-243 = "さすがハルナ。私のことよく分かってますね★"
10046040-244 = "……皆さんのご意見は分かりました。"
10046040-245 = "いいでしょう。これは、あなたにお譲りします。"
10046040-250 = "ほんと！？"
10046040-251 = "いいの！？"
10046040-252 = "[s] \"え！？\""
10046040-256 = "み、皆さん？私のことを何だと思っているのですか？"
10046040-257 = "え、正直に言ったほうがいい？"
10046040-258 = "いえ……もう十分ですわ……。"
10046040-262 = "もちろん対価はいただきます。"
10046040-263 = "より上質な食材との物々交換――ですから。"
10046040-264 = "うん、ありがとう！ちゃんと持ってくるね！"
10046040-265 = "では、こちらをお持ちください。"
10046040-271 = "やった！早く戻って――"
10046040-276 = "……。"
10046040-280 = "え？"
10046040-281 = "[s9] \"どうしたの？\"\n[s10] \"食材に何か問題が？\""
10046040-284 = "このセット……箱から中身まで全部――#n私が用意してたものと同じ……。"
10046040-290 = "あーあ。"
10046040-291 = "終わりっすね、これ。"
10046040-296 = "つまり、そもそもトラックを襲ったのが美食研究会だったと……？"
10046040-301 = "やはり交渉決裂です！！！"
10046040-302 = "ミカ様！ご命令を！！"
10046040-303 = "…………。"
10046040-308 = "（あ、これダメかも。もう止める理由もないし……）"
10046040-309 = "（友達想いで抑えてはいたけど、ミカ様は元々強硬派）"
10046040-310 = "（もう衝突は避けられないだろうし……）"
10046040-311 = "（ナギサ様にどう報告するか考えとくか）"
10046040-316 = "……よかった。無事に見つかって。"
10046040-323 = "ごめん、ハスミちゃん。今回は見逃してあげてくれる？#n……お願い。"
10046040-324 = "……はい？"
10046040-325 = "気持ちはよく分かるよ。#nでも、あんまり遅くなっちゃう前に戻りたいの。"
10046040-326 = "……ミカ様はそれで良いのですか？"
10046040-327 = "うん。今はもっと大事なことがあるからね。"
10046040-332 = "…………。"
10046040-334 = "よ、よく分かんないけど命拾いした？"
10046040-335 = "風紀委員長に会ったみたいな気分だったよ……。"
10046040-337 = "ふふ……ふふふっ……。"
10046040-338 = "どうやら幸運が転がり込んだようです。"
10046040-339 = "日頃の行いが良いからでしょうか。"
10046040-341 = "よくそんなこと言えるわね……。"
10046040-343 = "友情って本当に素晴らしいですよね★"
10046040-346 = "やっぱりお昼には遅すぎるかな？"
10046040-347 = "うーん……急いでも15時ぐらいになりそうっすね。"
10046040-348 = "準備は私たちが進めておきますので、ミカ様はお二人のほうへ……！"
10046040-349 = "ありがとう！じゃあ、お願いね！"
10046040-358 = "う、うぐぐっ……！"
10046040-359 = "ナギサ、さっきから力が入りすぎだ。"
10046040-360 = "もっと身体の緊張を解いてやらねば。#nふむ……やはり言葉では難しいか。"
10046040-361 = "ほら、ここだ。ここをもう少し伸ばして――"
10046040-366 = "痛っ……！？"
10046040-370 = "ほ、骨を折るつもりですか！？"
10046040-371 = "大げさすぎないかい……？"
10046040-376 = "おや、先生。ミカも一緒か。"
10046040-377 = "[s11] \"何してるの？\"\n[s12] \"楽しそうだね。\""
10046040-380 = "ヨガだよ。私の趣味でね。"
10046040-381 = "セイアさんが誘ってくださって……。"
10046040-382 = "まさか、素直につきあってくれるとは思わなかったよ。"
10046040-383 = "そういえば、昼餉の支度は順調かい？#n何やらいい香りがしてきたが。"
10046040-387 = "あ～ちょっと時間かかっちゃうかも。いま焼き始めたところなんだ。"
10046040-388 = "待たせちゃってごめんね。"
10046040-389 = "お昼はたしかバーベキューでしたよね？#n準備にそれほど時間はかからないと思いますが……。"
10046040-393 = "――あ。"
10046040-399 = "では、紅茶の準備をお願いしても？"
10046040-400 = "……え？"
10046040-401 = "この分だと、食事を終えた頃には午後のティータイムになるでしょうから。"
10046040-402 = "あ、あれ？"
10046040-407 = "ご準備、お願いしますね。"
