[translation]
201030-1 = "Episódio 3; Gambito da Rainha"
201030-2 = "Sala de visitas do Bloco A da Instalação de Detenção Especial, Departamento Correcional"
201030-4 = "Prisioneira número 1192. Você tem uma visita."
201030-10 = "Quem poderia ser a esta hora..."
201030-11 = "O que deseja, representante da presidente do conselho estudantil?#nE ainda por cima, usando roupas civis?"
201030-15 = "E o Sensei do Schale também está aqui... está querendo se gabar?"
201030-16 = "Não é isso. Por que vocês insistem em tirar essas conclusões?"
201030-17 = "Vim apenas ver como você está. Embora eu também tenha algumas perguntas."
201030-18 = "Haa..."
201030-19 = "Não poderia ter resolvido isso por um representante ou por escrito?"
201030-20 = "O trabalho de representante da presidente do conselho estudantil deve ser ocupado.#nVir até o Departamento Correcional só para isso..."
201030-21 = "Não precisa se preocupar. Tirei o dia de folga hoje."
201030-22 = "Já deixei tudo encaminhado. Não deve haver grandes problemas."
201030-23 = "..."
201030-24 = "Você é idiota? Vir ver o rosto de um inimigo no seu dia de folga?"
201030-25 = "Ou será que veio aqui para zombar de mim?"
201030-26 = "Não vou forçar. Podemos tratar disso por escrito em outro momento, se preferir."
201030-30 = "E-espere. Eu não disse que não queria! Não vá embora assim!"
201030-31 = "C-cof... Eu também estava à toa mesmo.#nJá que você se deu ao trabalho de vir, posso reservar um pouco do meu tempo."
201030-32 = "[s] \"Você também fica ocupada no Departamento Correcional?\""
201030-33 = "C-claro. De manhã eu faço jogging..."
201030-34 = "Depois, leio livros para desenvolver uma liderança superior..."
201030-35 = "Bem, depois de comer, eu, sabe..."
201030-39 = "...Sim, é isso mesmo. Não tenho nada em particular para fazer."
201030-40 = "Aqui tem poucas opções de lazer. E não tem muita gente com quem conversar."
201030-41 = "Sou grata por terem separado a instalação do Esquadrão FOX, mas#nnão poder ver mais ninguém... não é praticamente uma solitária?"
201030-42 = "Não recebo notícias do mundo exterior e ninguém vem me visitar...!"
201030-43 = "Ah, não é como se eu estivesse feliz por vocês terem vindo me visitar, viu!?"
201030-44 = "[s] \"Você estava se sentindo sozinha, não é...\""
201030-46 = "...Felizmente, parece que sua saúde está em dia."
201030-47 = "Naturalmente. Como alguém que um dia estará no topo, se eu perdesse a saúde por causa de um simples fracasso, não poderia ser chamada de \"super-humana\", não é?"
201030-48 = "Agora estou detida no Departamento Correcional, mas um dia vou realizar um golpe de estado com sucesso e#nretomar o meu lugar!"
201030-49 = "...Eu já pensava isso antes, mas admiro muito essa sua confiança."
201030-50 = "Sem se importar com o olhar dos outros, sem se deixar abater pela derrota.#nEssa sua vontade de tentar repetidamente é uma das suas virtudes."
201030-51 = "Graças a isso, nunca consegui ganhar de você nos jogos."
201030-55 = "...Já que estamos aqui, que tal uma partida de xadrez?"
201030-62 = "Torre h8, xeque."
201030-63 = "Bispo h3."
201030-64 = "Cavalo g6."
201030-65 = "Torre f7, xeque."
201030-66 = "Rei h6."
201030-67 = "Rainha g6, xeque."
201030-71 = "...Eu desisto."
201030-72 = "Como sempre, sua habilidade continua intacta. Eu não sou páreo para você."
201030-74 = "Eu pratiquei muito aqui. Acho que melhorei mais do que antes."
201030-78 = "...O xadrez é tão simples, por que será que naquela época eu não consegui vencer?"
201030-82 = "Haa..."
201030-83 = "Q-que cara é essa! Eu disse algo estranho?"
201030-84 = "Você ainda não entendeu."
201030-85 = "Por mais que você tenha táticas superiores, a realidade não funciona como um tabuleiro de xadrez."
201030-86 = "Nem você, nem seus subordinados são super-humanos."
201030-87 = "As pessoas não são peças de xadrez. Quanto mais você tenta controlá-las perfeitamente, mais elas fogem do seu controle."
201030-88 = "Para os meros mortais que não conseguiram se tornar super-humanos, manter o status quo é o melhor caminho."
201030-89 = "Está sugerindo que você seria capaz?"
201030-90 = "Não. Eu também não sou uma super-humana."
201030-91 = "A única pessoa que conheço capaz de controlar as pessoas perfeitamente... como se fossem peças de xadrez, é ela."
201030-95 = "……Sim. Se fosse ela, teria conseguido."
201030-96 = "Não, ela nem precisaria provar suas habilidades. #nOs alunos de Kivotos depositavam total confiança nela."
201030-97 = "Desde que ela desapareceu, eu…… tenho seguido seus passos todo esse tempo."
201030-98 = "Como compensar sua ausência? #nO que é preciso realizar para se tornar um super-humano?"
201030-99 = "Investiguei todos os registros e tentei usar o que ela deixou para trás, mas……"
201030-100 = "No fim, acabei nesta situação."
201030-101 = "Quando todo o território de Kivotos entrou em caos e colapso funcional――"
201030-102 = "O que foi que você ordenou que o Esquadrão FOX trouxesse do porão do Schale?"
201030-103 = "……."
201030-104 = "Se precisar que eu peça para os outros se retirarem, posso fazer isso usando minha autoridade como substituta."
201030-108 = "Não, não há necessidade disso."
201030-109 = "Mesmo que a verdadeira natureza daquilo seja revelada, não mudará muita coisa."
201030-113 = "O que o Esquadrão FOX trouxe do porão do Schale foi um simples smartwatch."
201030-114 = "……Não, seria mais correto dizer que foi algo que só parecia ser isso."
201030-115 = "O que quer dizer com isso?"
201030-116 = "Desde o desaparecimento da Presidente do Conselho Estudantil Federal, investiguei secretamente o que ela deixou para trás."
201030-117 = "A maioria eram itens comuns, como conjuntos de chá e materiais escolares. #nNo entanto, entre eles, havia coisas que pareciam ser artefatos poderosos. #nCoisas como o que permitiria transferir a autoridade de controle da Torre Sanctum."
201030-118 = "Sim, estou falando da 'Caixa de Shittim', que o Sensei do Schale possui."
201030-119 = "Se existia um artefato capaz de controlar a infraestrutura de Kivotos com uma mão, #npensei que talvez existissem outros equivalentes... ou até mais poderosos."
201030-120 = "E finalmente, descobri que um artefato equivalente à 'Caixa de Shittim' estava guardado dentro da Arca no porão do Schale."
201030-121 = "O nome dele é―― 'Cajado de Sharkade'."
201030-122 = "De acordo com os registros da Presidente do Conselho Estudantil Federal, ele possui a habilidade de revelar a verdade."
201030-123 = "[s] \"Cajado de Sharkade……?\""
201030-124 = "Então você realmente sabia, Sensei."
201030-125 = "[s1] \"Não, não sei os detalhes, mas……\"\n[s2] \"Sinto como se já tivesse ouvido esse nome em algum lugar……\""
201030-128 = "……Que decepção, perdi meu tempo criando expectativas."
201030-129 = "No fim, não entendi o que significava 'revelar a verdade'. #nAinda assim, ordenei que o Esquadrão FOX o recuperasse."
201030-130 = "Se o 'Cajado de Sharkade' fosse realmente um artefato equivalente à 'Caixa de Shittim', #nseria possível não apenas realizar o golpe de estado, mas também assumir o controle do Conselho Estudantil Federal."
201030-131 = "……Mas o 'Cajado de Sharkade' real não passava de um simples smartwatch."
201030-132 = "Tentei investigá-lo de várias formas, mas não descobri nada…… #nQuando o golpe de estado aconteceu, eu já tinha até esquecido da existência dele."
201030-133 = "O 'Cajado de Sharkade' foi devolvido à Arca e está guardado no depósito do Conselho Estudantil Federal. #nAcho que ainda deve estar lá, a menos que alguém tenha mexido."
201030-134 = "[s] \"Por que será que o Cajado de Sharkade não reagiu?\""
201030-135 = "Quem sabe……"
201030-136 = "Talvez exista um método de uso correto, ou talvez eu não tenha tido a capacidade necessária para manipulá-lo……"
201030-137 = "Ou talvez…… os registros da Presidente do Conselho Estudantil Federal estivessem simplesmente errados."
201030-138 = "Dito isso, se for o Sensei [USERNAME], que consegue manipular a Caixa de Shittim, #ntalvez você consiga enxergar o seu verdadeiro valor."
201030-139 = "……Assim que eu retornar, vou procurar pela Arca."
201030-140 = "[s] \"No fim das contas, acabou virando trabalho……\""
201030-141 = "Não se preocupe. Eu estava aproveitando bastante."
201030-142 = "Comer algo nostálgico e jogar xadrez com uma velha amiga…… #nSão coisas que não consigo fazer no dia a dia."
201030-146 = "……Agora, preciso valorizar este descanso."
201030-147 = "Kaya. Se não se importar, poderíamos jogar mais uma partida? #nQuero ter a chance de me vingar da anterior."
201030-148 = "Bem, se for xadrez, quantas vezes quiser……"
201030-149 = "Não vou pegar leve, viu."
201030-153 = "Um movimento... peão para d4."
201030-154 = "Peão d5."
201030-155 = "……Administradora."
201030-156 = "Pela sua personalidade, imagino que não esteja muito animada, mas—"
201030-157 = "Para avançar o meio de jogo de forma eficiente, #n um gambito sacrificando um peão não é uma má ideia."
201030-158 = "Peão c4."
201030-162 = "……Peão e6. Eu recuso."
201030-164 = "Próximo episódio: Nostalgia cor de céu"
