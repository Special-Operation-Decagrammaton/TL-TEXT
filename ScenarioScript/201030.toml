[translation]#[Texto Final. mas eventualmente pode haver alterações na formatação de texto. - Filipe 03/07.]
201030-1 = "Episódio 3: Gambito da Rainha"
201030-2 = "Agência Correcional - Sala de Visitas do Bloco A de Contenção Especial"
201030-4 = "Detenta número 1192. Visita."
201030-10 = "Quem seria a essa hora……?"
201030-11 = "O que deseja, Presidente interina\ndo Conselho Estudantil Geral?#nE ainda por cima à paisana."
201030-15 = "E acompanhada do Sensei da Schale……\nveio se exibir?"
201030-16 = "Não. Por que todo mundo insiste\nem chegar a essa conclusão?"
201030-17 = "Só vim ver como você está.\nE tenho algumas perguntas."
201030-18 = "Haa……"
201030-19 = "Não dava pra mandar um representante\nou uma carta?"
201030-20 = "A Presidente interina deve viver ocupada.#nSe deslocar até a Agência Correcional――"
201030-21 = "Não se preocupe. Hoje estou de folga."
201030-22 = "Deixei tudo encaminhado.\nNão haverá grandes problemas."
201030-23 = "……"
201030-24 = "Usar sua preciosa folga pra vir ver a cara\nde uma inimiga…… você é idiota?"
201030-25 = "Ou veio só pra zombar de mim?"
201030-26 = "Não vou insistir. Podemos retomar\noutro dia, por escrito."
201030-30 = "E-Espere! Eu não disse que não!\nNão vá embora decidindo sozinha!"
201030-31 = "C-Cof…… acontece que eu estava mesmo\nà toa agora, entende?#nJá que se deu ao trabalho de vir,\nposso arranjar um tempinho."
201030-32 = "[s] \"Na Agência Correcional também se fica ocupada?\""
201030-33 = "C-Claro que sim. De manhã, corrida……"
201030-34 = "Depois leio livros para desenvolver\numa liderança de excelência……"
201030-35 = "E-Então, depois do almoço, hã……"
201030-39 = "……Tá, é isso mesmo. Não tenho\nnada pra fazer."
201030-40 = "Aqui tem pouco entretenimento.\nE quase ninguém pra conversar."
201030-41 = "Agradeço por me alojarem separada\ndo Esquadrão FOX, mas……#nnão poder ver mais ninguém――\nisso é praticamente uma solitária, não?"
201030-42 = "Nenhuma notícia de fora chega,\nninguém aparece pra visitar……!"
201030-43 = "A-Ah, mas não pensem que fiquei feliz\ncom a visita de vocês, tá?!"
201030-44 = "[s] \"Você tava era carente……\""
201030-46 = "……Felizmente, sua saúde parece em ordem."
201030-47 = "Óbvio. Quem um dia estará no topo não pode\nadoecer por causa de um mero fracasso,\nou não mereceria o título de \"super-humana\"."
201030-48 = "Hoje estou presa na Agência Correcional,\nmas um dia farei outro golpe de estado,#ne aí vou recuperar o meu posto!"
201030-49 = "……Sempre achei que essa sua confiança,\nao menos, merece nota alta."
201030-50 = "Sem ligar pros olhares alheios, sem se\nabater com derrotas.#nEssa vontade de tentar sempre de novo\né uma das suas qualidades."
201030-51 = "Tanto que, nos jogos, nunca fechei\no placar na sua frente."
201030-55 = "……Aproveitando, que tal uma partida\nde xadrez?"
201030-62 = "Torre h8. Xeque."
201030-63 = "Bispo h3."
201030-64 = "Cavalo g6."
201030-65 = "Torre f7. Xeque."
201030-66 = "Rei h6."
201030-67 = "Dama g6. Xeque."
201030-71 = "……Eu desisto."
201030-72 = "Sua habilidade segue intacta.\nNão sou páreo pra você."
201030-74 = "Eu treinei o tempo todo aqui. Devo ter\nmelhorado em relação a antes, não?"
201030-78 = "……Se no xadrez é tão fácil, por que\nnaquela hora eu não consegui vencer?"
201030-82 = "Haa……"
201030-83 = "Q-Que cara é essa?! Eu disse algo estranho?"
201030-84 = "Você ainda não entendeu."
201030-85 = "Por melhor que seja a sua tática,\na realidade não se move como um tabuleiro."
201030-86 = "Nem você, nem os seus subordinados\nsão super-humanos."
201030-87 = "Pessoas não são peças. Quanto mais se\ntenta controlá-las por completo,\nmais fora de controle elas ficam."
201030-88 = "Para nós, comuns, que não conseguimos ser\nsuper-humanos, manter as coisas como estão\né a melhor opção."
201030-89 = "Está dizendo que VOCÊ conseguiria?"
201030-90 = "Não. Eu também não sou uma super-humana."
201030-91 = "Alguém capaz de controlar pessoas\nà perfeição, como se fossem peças……\naté onde sei, só existe ela."
201030-95 = "……Pois é. \"Ela\" teria conseguido."
201030-96 = "Não…… ela sequer precisaria provar\na própria capacidade.#nAfinal, os alunos de Kivotos confiavam\nplenamente nela."
201030-97 = "Desde que ela desapareceu, eu……\nnunca deixei de correr atrás dela."
201030-98 = "Como compensar a ausência dela?#nO que é preciso realizar para\nse tornar super-humana?"
201030-99 = "Vasculhei todos os registros, usei tudo\no que ela deixou para trás, mas……"
201030-100 = "No fim, deu nisso."
201030-101 = "Quando Kivotos inteira mergulhou no caos\ne parou de funcionar――"
201030-102 = "O que era aquilo que você ordenou que o\nEsquadrão FOX trouxesse do porão da Schale?"
201030-103 = "……"
201030-104 = "Se precisar de privacidade, posso\nrequisitá-la como Presidente interina."
201030-108 = "Não, não é necessário."
201030-109 = "Revelar o que aquilo era não vai\nmudar grande coisa."
201030-113 = "O que o Esquadrão FOX trouxe do porão da\nSchale foi um simples smartwatch."
201030-114 = "……Não. O mais correto seria dizer:\nalgo que só conseguia parecer isso."
201030-115 = "Como assim?"
201030-116 = "Após o sumiço da Presidente, investiguei\nem segredo o que ela deixou para trás."
201030-117 = "A maioria era coisa banal: jogos de chá,\nmaterial escolar e afins.#nMas entre elas havia algo semelhante\na um poderoso artefato anômalo.#nDo tipo capaz de transferir o controle\nda Torre Sanctum."
201030-118 = "Sim, falo daquela que está com o Sensei\nda Schale―― a \"Caixa de Shittim\"."
201030-119 = "Se existe um artefato anômalo que controla\ncom uma mão a infraestrutura de Kivotos,#npoderia haver outro equivalente……\nnão, até mais poderoso que ele."
201030-120 = "E enfim descobri: um artefato anômalo à\naltura da \"Caixa de Shittim\" estava guardado#ndentro da arca sagrada do porão da Schale."
201030-121 = "Seu nome―― \"Cajado de Shaked\"."
201030-122 = "Segundo os registros da Presidente,\nele possui o poder de enxergar a verdade."
201030-123 = "[s] \"Cajado de Shaked……?\""
201030-124 = "Então o Sensei conhecia, como eu suspeitava."
201030-125 = "[s1] \"Não, não sei os detalhes……\"\n[s2] \"Só tenho a impressão de já ter ouvido isso……\""
201030-128 = "……Grande coisa. Criei expectativa à toa."
201030-129 = "No fim, nunca descobri o que significava\n\"enxergar a verdade\".#nMesmo assim, ordenei que o Esquadrão FOX\no recuperasse."
201030-130 = "Se o \"Cajado de Shaked\" fosse mesmo um\nartefato anômalo como a \"Caixa de Shittim\",#neu teria como dar o golpe e até dominar\no Conselho Estudantil Geral."
201030-131 = "……Mas o \"Cajado de Shaked\" real não\npassava de um simples smartwatch."
201030-132 = "Examinei por todos os meios, sem\ndescobrir nada……#nQuando dei o golpe, já tinha esquecido\ncompletamente da existência dele."
201030-133 = "O \"Cajado de Shaked\" voltou pra arca\nsagrada, no depósito do Conselho.#nSe ninguém mexeu, deve continuar lá."
201030-134 = "[s] \"Por que será que o Cajado de Shaked não reagiu?\""
201030-135 = "Sei lá……"
201030-136 = "Talvez exista um jeito certo de usar,\ntalvez me faltasse capacidade……"
201030-137 = "Ou talvez…… os registros da Presidente\nestivessem simplesmente errados."
201030-138 = "De qualquer forma, você usa a Caixa de\nShittim, Sensei [USERNAME].#nTalvez consiga enxergar o valor\nverdadeiro dele."
201030-139 = "……Assim que voltar,\nvou procurar a arca sagrada."
201030-140 = "[s] \"No fim, virou trabalho de novo……\""
201030-141 = "Não se preocupe. Aproveitei muito bem o dia."
201030-142 = "Comer o sabor das lembranças, jogar xadrez\ncom essa velha amiga de quem não me livro……#nSão coisas que normalmente\neu não poderia fazer."
201030-146 = "……Por ora, devo dar valor a este descanso."
201030-147 = "Kaya. Se não se importa, que tal\nmais uma partida?#nVou tirar minha revanche\nda partida de agora."
201030-148 = "Ora, se for xadrez, quantas quiser……"
201030-149 = "Não vou pegar leve, viu?"
201030-153 = "Primeiro lance…… peão em d4."
201030-154 = "Peão d5."
201030-155 = "……Administradora."
201030-156 = "Com a sua personalidade, sei que não vai\nse animar com a ideia, mas――"
201030-157 = "Para avançar o meio-jogo com eficiência,#num gambito, oferecendo o peão,\nnão é nada mau."
201030-158 = "Peão c4."
201030-162 = "……Peão e6. Vou recusar a oferta."
201030-164 = "Próximo Episódio: Saudade Azul-Celeste"