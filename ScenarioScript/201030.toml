[translation]
201030-1 = "Эпизод 3;Ферзевый гамбит"
201030-2 = "Исправительное бюро, здание А специального изолятора, комната свиданий"
201030-4 = "Заключённая 1192. К вам посетитель."
201030-10 = "Кого это принесло в такой час..."
201030-11 = "Что вам нужно, исполняющая обязанности Президента Студенческого Совета? #nДа ещё и в гражданской одежде."
201030-15 = "И Сенсей из Шале с вами... Пришли злорадствовать?"
201030-16 = "Нет. Почему все всегда сразу приходят к такому выводу?"
201030-17 = "Я просто пришла проведать тебя. Хотя у меня действительно есть несколько вопросов."
201030-18 = "Ха-а..."
201030-19 = "Не могла просто прислать заместителя или письменный запрос?"
201030-20 = "Исполняющая обязанности Президента должна быть занята. #nЧтобы так заморачиваться и ехать в Исправительное бюро —"
201030-21 = "Не беспокойся обо мне. Я взяла выходной."
201030-22 = "Я уже передала свои обязанности. Никаких серьёзных проблем не ожидаю."
201030-23 = "..."
201030-24 = "Ты дура? Припереться сюда в свой выходной только ради того, чтобы посмотреть на лицо своего врага?"
201030-25 = "Или ты пришла поиздеваться надо мной?"
201030-26 = "Я не стану тебя заставлять. Может, разберёмся с этим в письменной форме позже?"
201030-30 = "П-погоди. Я не говорила, что не хочу разговаривать! Не уходи вот так сама по себе!"
201030-31 = "Кхм-кхм... Я всё равно просто убивала время. #nРаз уж ты проделала такой путь, полагаю, я могу уделить немного времени."
201030-32 = "[s] «Ты занята даже в Исправительном бюро?»"
201030-33 = "К-конечно. По утрам я бегаю..."
201030-34 = "После этого читаю книги, чтобы развивать в себе качества выдающегося лидера..."
201030-35 = "Эм, а после еды, ну..."
201030-39 = "...Да, всё верно. Мне особо нечем заняться."
201030-40 = "Здесь мало развлечений. И мало с кем можно поговорить."
201030-41 = "Я благодарна, что они отделили меня от отряда FOX, но #nто, что нельзя ни с кем видеться — разве это не одиночное заключение, по сути?"
201030-42 = "Никаких новостей снаружи, и никто не приходит навестить...!"
201030-43 = "Ой, да не то чтобы я рада, что вы пришли меня проведать или вроде того!"
201030-44 = "[s] «Тебе было одиноко, верно...»"
201030-46 = "...К счастью, проблем со здоровьем у тебя, похоже, нет."
201030-47 = "Естественно. Как человек, который однажды встанет на вершине, если бы я потеряла здоровье из-за одной неудачи, могла бы я действительно называться \"сверхчеловеком\"?"
201030-48 = "Пусть сейчас меня и отправили в Исправительное бюро, но однажды я снова устраню переворот #nи верну себе это кресло!"
201030-49 = "...Я уже некоторое время думаю об этом, но я высоко ценю твою уверенность."
201030-50 = "Не обращать внимания на чужие взгляды, не увязать в поражении. #nЭто желание пытаться снова и снова — одна из твоих сильных сторон."
201030-51 = "Благодаря этому мне так и не удалось добиться побед в играх против тебя."
201030-55 = "...Раз уж мы здесь, как насчёт партии в шахматы?"
201030-62 = "Ладья h8, шах."
201030-63 = "Слон h3."
201030-64 = "Конь g6."
201030-65 = "Ладья f7, шах."
201030-66 = "Король h6."
201030-67 = "Ферзь g6, шах."
201030-71 = "...Я сдаюсь."
201030-72 = "Твоё мастерство остро как никогда. Я тебе не соперник."
201030-74 = "Я всё это время здесь практиковалась. Думаю, я стала играть лучше, чем раньше."
201030-78 = "...Шахматы так просты, так почему же я тогда не смогла победить?"
201030-82 = "Ха-а..."
201030-83 = "Ч-что это за взгляд! Я сказала что-то странное?"
201030-84 = "Ты до сих пор не понимаешь."
201030-85 = " Какими бы превосходными ни были твои тактики, реальность не движется как шахматная доска."
201030-86 = "Потому что ни ты, ни твои подчинённые не являетесь сверхлюдьми."
201030-87 = "Люди — не пешки. Чем больше ты пытаешься полностью их контролировать, тем сильнее они ускользают из-под твоего контроля."
201030-88 = "Для обычного человека, который не смог стать сверхчеловеком, сохранение статус-кво — лучший путь."
201030-89 = "Хочешь сказать, у тебя бы получилось?"
201030-90 = "Нет. Я тоже не сверхчеловек."
201030-91 = "Сверхчеловек, который может идеально контролировать людей... как пешек... насколько мне известно, только она была способна на это."
201030-95 = "...Да. \"Она\" могла бы это сделать."
201030-96 = "Нет, ей бы даже не пришлось доказывать свои способности. #nСтуденты Кивотоса питали к ней абсолютное доверие."
201030-97 = "С тех пор как она пропала, я... преследовала её тень."
201030-98 = "Как мне компенсировать её отсутствие? #nЧего я должна достичь, чтобы стать сверхчеловеком?"
201030-99 = "Я перерыла все записи и пыталась использовать то, что она оставила после себя, но..."
201030-100 = "В итоге я оказалась здесь."
201030-101 = "Когда весь Кивотос был в хаосе и погружался в упадок —"
201030-102 = "Что именно ты приказала отряду FOX забрать из подвала Шале?"
201030-103 = "..."
201030-104 = "Если нужно освободить комнату, я могу потребовать этого, пользуясь своими полномочиями исполняющей обязанности Президента."
201030-108 = "Нет, в этом нет необходимости."
201030-109 = " Даже если правда об этой вещи откроется, это мало что изменит."
201030-113 = "То, что отряд FOX вынес из подвала Шале, было всего лишь обычными смарт-часами."
201030-114 = "...Нет, пожалуй, точнее будет сказать, что это была вещь, которую можно было воспринимать только так."
201030-115 = "Что ты имеешь в виду?"
201030-116 = "С момента исчезновения Президента Студенческого Совета я тайно расследовала то, что она оставила после себя."
201030-117 = "Большая часть вещей была обычными предметами вроде чайных сервизов и школьных принадлежностей. #nОднако были и вещи, похожие на могущественные артефакты не из нашего мира. #nНапример, полномочия по передаче управления Башней Святилища."
201030-118 = "Да, я говорю о \"Сундуке Шиттима\", которым владеет Сенсей из Шале."
201030-119 = "Если существовал артефакт, способный одной рукой контролировать инфраструктуру Кивотоса, я подумала, что должно быть что-то равноценное... или, возможно, даже более могущественное."
201030-120 = "И наконец я обнаружила, что артефакт, эквивалентный \"Сундуку Шиттима\", хранился внутри Ковчега в подвале Шале."
201030-121 = "Его название — \"Посох Шакада\"."
201030-122 = "Согласно записям Президента Студенческого Совета, он обладает способностью видеть истину насквозь."
201030-123 = "[s] «Посох Шакада...?»"
201030-124 = "Значит, вы знали о нём, Сенсей."
201030-125 = "[s1] «Нет, я не знаю подробностей...»\n[s2] «Мне кажется, я уже слышал это имя где-то раньше...»"
201030-128 = "...Какая, какая трата моих ожиданий."
201030-129 = "В конце концов я так и не поняла, что значит \"видеть истину насквозь\". #nДаже при этом я приказала отряду FOX забрать его."
201030-130 = "Если бы \"Посох Шакада\" действительно был артефактом, эквивалентным \"Сундуку Шиттима\", #nя могла бы не только устроить переворот, но и захватить контроль над Генеральным Студенческим Советом."
201030-131 = "...Но настоящий \"Посох Шакада\" выглядел как простые смарт-часы."
201030-132 = "Я пыталась исследовать его различными способами, но ничего не узнала... #nК тому времени, как я устроила переворот, я совершенно забыла о его существовании."
201030-133 = "\"Посох Шакада\" был возвращён в Ковчег и хранится на складе Генерального Студенческого Совета. #nЕсли никто к нему не прикасался, полагаю, он всё ещё там."
201030-134 = "[s] «Почему Посох Шакада не отреагировал?»"
201030-135 = "Кто знает..."
201030-136 = "Возможно, есть правильный способ его использования, или, может быть, мне просто не хватило способностей, чтобы с ним совладать..."
201030-137 = "Или... возможно, записи Президента Студенческого Совета были просто ошибочными."
201030-138 = "Однако, если это вы, Сенсей, кто может обращаться с Сундуком Шиттима, #nвы, возможно, сможете увидеть его истинную ценность."
201030-139 = "...Я поищу Ковчег, как только вернусь."
201030-140 = "[s] «В конце концов всё свелось к работе...»"
201030-141 = "Не беспокойтесь об этом. Я отлично провела время."
201030-142 = "Поесть ностальгической еды и сыграть в шахматы со старой знакомой... #nЭто то, чего я не смогла бы сделать иначе."
201030-146 = "...А пока я должна дорожить этим отдыхом."
201030-147 = "Кайя. Если ты не против, сыграешь со мной ещё партию? #nЯ бы хотела взять реванш за прошлый раз."
201030-148 = "Ну, если это шахматы, я могу играть сколько угодно..."
201030-149 = "Я не буду поддаваться."
201030-153 = "Мой ход... Пешка на d4."
201030-154 = "Пешка d5."
201030-155 = "...Администратор."
201030-156 = "Я знаю, что это не в вашем стиле, но —"
201030-157 = "Чтобы эффективно развить миттельшпиль, #nгамбит с жертвой пешки — не самая плохая идея."
201030-158 = "Пешка c4."
201030-162 = "...Пешка e6. Я отклоняю."
201030-164 = "Следующий эпизод;Небесно-голубая ностальгия"