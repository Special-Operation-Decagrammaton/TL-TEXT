[translation]
201030-1 = "Episode 3;Queen's Gambit"
201030-2 = "Correction Bureau, Special Detention Facility Building A, Visitation Room"
201030-4 = "Prisoner 1192. You have a visitor."
201030-10 = "Who could it be at this hour..."
201030-11 = "What do you want, Acting Student Council President?#nAnd in civilian clothes, no less."
201030-15 = "And Sensei from Schale is with you... are you here to gloat?"
201030-16 = "No. Why does everyone always jump to that conclusion?"
201030-17 = "I just came to check on you. Though I do have some questions."
201030-18 = "Haa..."
201030-19 = "Couldn't you have just sent a deputy or a written request?"
201030-20 = "The Acting President must be busy. #nTo go out of your way to come to the Correction Bureau—"
201030-21 = "Don't worry about me. I've taken the day off."
201030-22 = "I've already handed over my duties. I don't expect any major issues."
201030-23 = "..."
201030-24 = "Are you an idiot? Coming all the way here on your day off just to see the face of your enemy?"
201030-25 = "Or did you come to mock me?"
201030-26 = "I won't force you. Shall we handle this via written correspondence at a later date?"
201030-30 = "W-wait. I didn't say I didn't want to talk! Don't just leave on your own!"
201030-31 = "A-ahem... I was just killing time anyway?#nSince you went through the trouble of coming here, I suppose I can spare a little time."
201030-32 = "[s] \"Are you busy even in the Correction Bureau?\""
201030-33 = "O-of course. I go jogging in the morning..."
201030-34 = "After that, I read books to cultivate superior leadership..."
201030-35 = "Um, and after meals, well..."
201030-39 = "...Yes, that's right. I don't really have anything to do."
201030-40 = "There's little entertainment here. And not many people to talk to."
201030-41 = "I'm grateful they separated the facility from FOX Platoon, but#nnot being able to meet anyone else—isn't this basically solitary confinement?"
201030-42 = "No news from the outside, and no one comes to visit...!"
201030-43 = "Oh, it's not like I'm happy that you guys came to visit or anything!?"
201030-44 = "[s] \"You were lonely, weren't you...\""
201030-46 = "...Fortunately, you don't seem to have any health issues."
201030-47 = "Naturally. As someone who will stand at the top one day, if I were to lose my health over a single failure, could I really be called a 'superhuman'?"
201030-48 = "I may be sent to the Correction Bureau now, but one day I will succeed in a coup again,#nand I will take that seat back!"
201030-49 = "...I've thought this for a while, but I do highly value that confidence of yours."
201030-50 = "Not caring about the eyes of others, not getting bogged down by defeat.#nThat will to keep trying again and again is one of your strengths."
201030-51 = "Thanks to that, I've never managed to get a winning record against you in games."
201030-55 = "...Since we're here, how about a game of chess?"
201030-62 = "Rook h8, check."
201030-63 = "Bishop h3."
201030-64 = "Knight g6."
201030-65 = "Rook f7, check."
201030-66 = "King h6."
201030-67 = "Queen g6, check."
201030-71 = "...I resign."
201030-72 = "Your skills are as sharp as ever. I'm no match for you."
201030-74 = "I've been practicing here the whole time. I think I've gotten better than before."
201030-78 = "...Chess is so simple, so why couldn't I win back then?"
201030-82 = "Haa..."
201030-83 = "W-what's with that look! Did I say something strange?"
201030-84 = "You still don't understand."
201030-85 = "No matter how superior your tactics are, reality does not move like a chessboard."
201030-86 = "Because neither you, nor your subordinates, are superhumans."
201030-87 = "People are not pawns. The more you try to control them perfectly, the more they slip out of your control."
201030-88 = "For an ordinary person who couldn't become a superhuman, maintaining the status quo is the best path."
201030-89 = "Are you saying you could have done it?"
201030-90 = "No. I am not a superhuman either."
201030-91 = "A superhuman who can control people perfectly... like pawns... as far as I know, only she could do that."
201030-95 = "...Yes. 'She' could have done it."
201030-96 = "No, she wouldn't even have needed to prove her abilities.#nThe students of Kivotos placed their absolute trust in her."
201030-97 = "Ever since she went missing, I... have been chasing her shadow."
201030-98 = "How can I compensate for her absence?#nWhat must I accomplish to become a superhuman?"
201030-99 = "I searched through every record and tried using what she left behind, but..."
201030-100 = "In the end, I ended up like this."
201030-101 = "When all of Kivotos was in chaos and falling into dysfunction—"
201030-102 = "What was it that you ordered FOX Platoon to retrieve from the Schale basement?"
201030-103 = "..."
201030-104 = "If you need the room cleared, I can request it using my authority as Acting President."
201030-108 = "No, that won't be necessary."
201030-109 = "Even if the truth about that thing is revealed, it won't change much."
201030-113 = "What FOX Platoon brought back from the Schale basement was just an ordinary smartwatch."
201030-114 = "...No, perhaps it would be more accurate to say that it was something that could only be perceived as such."
201030-115 = "What do you mean?"
201030-116 = "Since the Student Council President's disappearance, I have been secretly investigating what she left behind."
201030-117 = "Most of it was just ordinary items like tea sets and school supplies.#nHowever, there were some things that were like powerful out-of-place artifacts.#nThings like the authority to transfer control of the Sanctum Tower."
201030-118 = "Yes, I'm talking about the 'Shittim Chest' that Sensei from Schale possesses."
201030-119 = "If an out-of-place artifact capable of controlling Kivotos' infrastructure with one hand existed, I thought there might be something equivalent... or perhaps even more powerful."
201030-120 = "And finally, I discovered that an artifact equivalent to the 'Shittim Chest' was stored inside the Ark in the Schale basement."
201030-121 = "Its name was—the 'Staff of Shackade'."
201030-122 = "According to the Student Council President's records, it possesses the ability to see through the truth."
201030-123 = "[s] \"The Staff of Shackade...?\""
201030-124 = "So you did know about it, Sensei."
201030-125 = "[s1] \"No, I don't know the details...\"\n[s2] \"I feel like I've heard that name somewhere before...\""
201030-128 = "...What, what a waste of my expectations."
201030-129 = "In the end, I never figured out what 'seeing through the truth' meant.#nEven so, I ordered FOX Platoon to retrieve it."
201030-130 = "If the 'Staff of Shackade' was truly an artifact equivalent to the 'Shittim Chest',#nI could have not only staged a coup, but seized control of the General Student Council as well."
201030-131 = "...But the actual 'Staff of Shackade' looked like nothing more than a simple smartwatch."
201030-132 = "I tried investigating it through various means, but I learned nothing...#nBy the time I staged the coup, I had completely forgotten about its existence."
201030-133 = "The 'Staff of Shackade' was returned to the Ark and is stored in the General Student Council warehouse.#nUnless someone has touched it, I believe it's still there."
201030-134 = "[s] \"Why didn't the Staff of Shackade react?\""
201030-135 = "Who knows..."
201030-136 = "Perhaps there is a correct way to use it, or perhaps I simply lacked the ability to handle it..."
201030-137 = "Or... perhaps the Student Council President's records were simply wrong."
201030-138 = "However, if it's you, Sensei, who can handle the Shittim Chest,#nyou might be able to see its true value."
201030-139 = "...I'll search for the Ark as soon as I return."
201030-140 = "[s] \"In the end, it turned into work...\""
201030-141 = "Don't worry about it. I was enjoying myself properly."
201030-142 = "Eating nostalgic food and playing chess with an old acquaintance...#nThese are things I wouldn't be able to do otherwise."
201030-146 = "...For now, I must cherish this rest."
201030-147 = "Kaya. If you don't mind, would you play another game with me?#nI'd like to get my revenge for the last one."
201030-148 = "Well, if it's chess, I can play as much as you like..."
201030-149 = "I won't go easy on you."
201030-153 = "My move is... Pawn to d4."
201030-154 = "Pawn d5."
201030-155 = "...Administrator."
201030-156 = "I know this isn't your style, but—"
201030-157 = "To advance the middlegame efficiently,#na gambit where you sacrifice a pawn isn't a bad idea."
201030-158 = "Pawn c4."
201030-162 = "...Pawn e6. I decline."
201030-164 = "Next Episode;Sky-Blue Nostalgia"