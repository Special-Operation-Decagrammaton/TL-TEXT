[translation]
201030-1 = "Episódio 3: O Gambito da Rainha"
201030-2 = "Departamento Correcional - Sala de Visitas do Pavilhão de Segurança Máxima A"
201030-4 = "Detenta 1192. Visita autorizada."
201030-10 = "Eu devia imaginar quem me chamaria a esta hora..."
201030-11 = "A que devo a honra da sua visita, Presidente Interina?#nE ainda por cima trajada com roupas de civil."
201030-15 = "Trazendo o Sensei da Schale a tiracolo... Veio ostentar a sua vitória cívica na minha cara?"
201030-16 = "A sua dedução é equivocada. Por que a sua mente sempre conecta fatos banais a disputas políticas ou exibições de ego?"
201030-17 = "Eu vim apenas averiguar as suas condições orgânicas. E possuo algumas indagações."
201030-18 = "Haaah..."
201030-19 = "Poderia ter despachado um inquérito de papel por um mensageiro."
201030-20 = "A cadeira de Presidente Interina dita uma rotina insana. Desperdiçar as horas pisando pessoalmente no Departamento Correcional――"
201030-21 = "Poupar-lhe-ei da falsa empatia. Os meus superiores forçaram-me a tirar o sábado de folga para reabilitação."
201030-22 = "Os laudos estão em boas mãos. Nenhuma crise burocrática colapsará."
201030-23 = "……"
201030-24 = "Rasgar um dia de folga raríssimo pra vir encarar a cara de uma inimiga política... Você sofre de algum tipo de lesão cerebral?"
201030-25 = "Ou a vontade de esfregar a minha miséria na minha cara é tão doentia assim?"
201030-26 = "Como avisei, não imporei a minha presença por coerção. Despacharei as minhas perguntas burocráticas via ofício amanhã, se desejar."
201030-30 = "E-Espera aí, não vire as costas! Eu não disse que não queria conversar! Sente aí e pare de agir por conta própria!"
201030-31 = "Cof, cof... A verdade é que a letargia desta cela estava corroendo meus ossos. Já que você teve o trabalho cívico de marchar até aqui, eu dedico alguns minutos do meu tempo carcerário."
201030-32 = "[s] \"A sua vida na prisão é ocupada?\""
201030-33 = "Ó-Óbvio que é. Corridas forçadas na alvorada matinal..."
201030-34 = "Estudos de teses intelectuais e literatura avançada para refinar minhas qualidades como Líder de Estado..."
201030-35 = "E... hum... depois das refeições, ahm..."
201030-39 = "……É. A rotina aqui é um marasmo fútil absoluto."
201030-40 = "O entretenimento e os estímulos lógicos são precários. E as cordas vocais atrofiam pela escassez de mentes equivalentes para debate."
201030-41 = "A logística de separar a minha cela do pavilhão do Esquadrão FOX nos poupou desgastes morais desnecessários, é verdade, mas... O isolamento auditivo sem pares intelectuais transformou isso numa solitária."
201030-42 = "O rádio só cospe ruído do asfalto, os jornais da política não passam pelas grades e o corredor de visitas só ecoa fantasmas...!"
201030-43 = "A-Ah, deixo registrado aos autos que não estou minimamente alegre ou reconfortada por ver o rosto de vocês aqui!!"
201030-44 = "[s] \"Você estava morrendo de solidão, não tava...\""
201030-46 = "……Os meus laudos visuais confirmam que a sua biologia não sofreu nenhum baque irreversível."
201030-47 = "Isso é axiomático. Um líder destinado a empunhar o cajado do Übermensch jamais adoeceria mentalmente por causa de uma mera fratura no tabuleiro de xadrez."
201030-48 = "O meu corpo apodrece momentaneamente na cadeia, sim, mas eu reescreverei a doutrina do Golpe e ascenderei à Coroa novamente um dia!"
201030-49 = "……Eu reprovo as suas táticas suicidas, mas eu invejo a imunidade de aço do seu ego perante o colapso."
201030-50 = "Sua capacidade anômala de ignorar a humilhação cívica e não recuar as fileiras diante da catástrofe... sempre foi o seu ativo orgânico mais contundente."
201030-51 = "E foi justamente essa persistência irracional que me impediu de cravar um placar majoritário absoluto contra você nas simulações de estratégia e nos tabuleiros do passado."
201030-55 = "……Já que os relógios andam devagar hoje, que tal uma partida saudosista de Xadrez?"
201030-62 = "Torre pra H8. Xeque."
201030-63 = "Bispo pra H3."
201030-64 = "Cavalo pra G6."
201030-65 = "Torre F7. Xeque duplo."
201030-66 = "Rei para H6."
201030-67 = "Rainha recua para G6. Xeque."
201030-71 = "……Você cravou a vitória."
201030-72 = "A engrenagem letal da sua leitura no tabuleiro não enferrujou. A minha estratégia foi estrangulada de forma irreparável."
201030-74 = "A falta de estímulos na masmorra me forçou a debater aberturas na minha cabeça por meses. Os meus cálculos de projeção se lapidaram."
201030-78 = "……Se no tabuleiro abstrato de madeira eu manipulo a matemática com tamanha fluidez... por que a minha estratégia ruiu de forma tão miserável no asfalto da vida real?"
201030-82 = "Haaah..."
201030-83 = "O-O que significa essa face de compaixão nojenta?! A minha métrica ofendeu seus ouvidos?"
201030-84 = "Você cometeu crimes hediondos, caiu em desgraça, e as suas engrenagens ainda não processaram a falha elementar do seu sistema."
201030-85 = "Não importa o calibre da pureza ou a precisão matemática da sua estratégia no papel, a vida orgânica e as emoções do asfalto não obedecem a quadrantes de madeira."
201030-86 = "As suas alunas e os seus mercenários não eram Übermensch robóticos operando cálculos cegos."
201030-87 = "Seres humanos quebram. Eles não são peças de chumbo. E a física social ensina que quanto mais você aperta as correntes da ditadura e do controle cego... mais rápido o tecido estilhaça nas suas mãos."
201030-88 = "As pessoas medíocres de carne e osso, que nasceram sem a imutabilidade do Übermensch, deveriam se contentar em sustentar o status quo vivo... em vez de tentar arrombar a história sozinhas."
201030-89 = "E a grande Oficial Rin por acaso possuía imunidade genética a essa fraqueza mortal?!"
201030-90 = "A resposta é não. Eu assumo a minha casca mortal; eu também não porto os genes de Übermensch."
201030-91 = "Manipular o caos humano como se fossem engrenagens submissas... Forjar o amanhã através de uma teia divina e impecável... Na história de Kivotos, a única Übermensch orgânica capaz desse fardo era Ela."
201030-95 = "……Sim. A Presidente possuía a divindade para tal."
201030-96 = "E o seu magnetismo sequer exigia o derramamento de sangue coercitivo ou a prova matemática de que ela era intocável.#nA fé que a sociedade de Kivotos depositava nela calava qualquer oposição cívica."
201030-97 = "Desde o desaparecimento dela... O meu currículo de vida se resumiu a rastejar seguindo os passos frios que ela deixou."
201030-98 = "Dissecando arquivos para tentar achar a resposta: Como eu supro o Vácuo de Deus?#nQuantas noites sem dormir custa para uma mera Administradora transmutar a alma num Übermensch?"
201030-99 = "Eu minerei os laudos sagrados. Desenterrei arquivos e apetrechos confidenciais dela com garras de desespero..."
201030-100 = "E, após tudo, o asfalto sangrou com o Golpe e o Conselho ruiu no lamaçal em que estamos."
201030-101 = "No epicentro daquela noite apocalíptica, quando a infraestrutura de Kivotos sucumbiu no breu elétrico total e a guerra tomou as ruas――"
201030-102 = "Qual era o artefato místico que você ordenou ao Esquadrão FOX que roubasse dos abismos do porão da Schale?"
201030-103 = "……"
201030-104 = "Se as paredes desta cela não possuírem blindagem de silêncio, eu uso a caneta da Presidência Interina para esvaziar o andar de guardas e selar o áudio local."
201030-108 = "Cancele os decretos paranoicos. Isso é inútil."
201030-109 = "A verdadeira identidade dessa anomalia já não desequilibra o tabuleiro global."
201030-113 = "O artefato que as raposas extraíram do sarcófago da Schale... transparecia visualmente como um mero smartwatch comercial mundano."
201030-114 = "……Corrigindo os laudos: Ele operava visualmente daquela forma aos [ruby=・   ・   ・   ・   ・   ・   ・   ・]nossos olhos incapazes[/ruby]."
201030-115 = "Qual a implicação real dessa frase enigmática?"
201030-116 = "Quando o sumiço da Presidente engatilhou o caos, eu assumi a mineração clandestina do espólio intocável que ela não levou."
201030-117 = "No escopo maciço, eram bugigangas fúteis: xícaras finas, cadernos encardidos, canetas sujas...#nMas no cerne das caixas, havia fragmentos de tecnologia mística anômala classificados como OOPArts.#nEquipamentos profanos com poder de root para, quem sabe, curvar os selos absolutos da Sanctum Tower ao meu dedo."
201030-118 = "O artefato mestre que valida e outorga as patentes divinas ao Sensei da Schale―― a 'Caixa de Shittim'."
201030-119 = "A minha teoria biológica deduziu que, se um OOPArt tão apocalíptico permitia ditar a água e a energia de Kivotos com uma mão...#nO espólio oculto dela abrigaria um item emparelhado ou, teoricamente, até superior."
201030-120 = "O meu desespero logístico filtrou os dados até rastrear um artefato selado com classe equiparável à Caixa de Shittim.#nEle adormecia dentro de um 'Cofre Arcaico' impenetrável nas raízes esquecidas dos porões da Schale."
201030-121 = "A alcunha do equipamento era―― 'O Cajado de Sharkade'."
201030-122 = "Os manuscritos póstumos da Presidente Desaparecida juravam que os sensores do artefato 'possuíam o Olho da Clarividência para rasgar ilusões'."
201030-123 = "[s] \"Cajado de Sharkade...?!\""
201030-124 = "Pelo espasmo vocal, os registros da sua memória acusaram o golpe, Sensei."
201030-125 = "[s1] \"Não... o meu cérebro não tem o manual técnico da peça...\"\n[s2] \"É só que o som dessas palavras ressoou como um delírio que me assombrou ultimamente...\""
201030-128 = "……Tsc. A minha empolgação em colher inteligência se esvaiu em lixo."
201030-129 = "Na teoria burocrática e linguística, a metáfora de 'rasgar ilusões e ler a verdade nua' extrapolava o meu campo de visão técnica.#nNo entanto, a cegueira não freou os meus instintos, e forcei a FOX a roubar a Arca."
201030-130 = "Se o 'Cajado de Sharkade' fosse, de fato, a Contra-Arma da Caixa de Shittim...#nA coroa e a supremacia não só do Golpe de Estado, mas o esmagamento de toda a infraestrutura do Conselho Estudantil cairia em minhas mãos em horas."
201030-131 = "……Porém... as varreduras visuais não apresentaram milagres. A carcaça exibia-se como um reles relógio pulsante de pulso. Plástico fútil."
201030-132 = "As perícias laboratoriais engasgaram. Os peritos desistiram.#nA falha ofuscou o interesse e eu joguei as memórias desse lixo pra fora do escopo mental quando o Golpe de Estado de fato deflagrou."
201030-133 = "Ordenei o re-empacotamento no 'Cofre Arcaico' e lacrei os contêineres nas entranhas do almoxarifado do Conselho Estudantil.#nSalvo furtos internos não notificados, a poeira ainda assenta sobre ele."
201030-134 = "[s] \"Por que a biometria ou os motores do Cajado de Sharkade rechaçaram a sua existência e ficaram mortos na sua mão?\""
201030-135 = "A lógica nega respostas exatas."
201030-136 = "Havia um software não documentado? Ou a radiação de Übermensch nas minhas células não bateu a cota para destravar os ícones do relógio...?"
201030-137 = "Ou, caindo na triste realidade material... o manual rabiscado da Presidente era poético e a ferramenta era fútil desde a fundação."
201030-138 = "Entretanto, já que os vetores do seu corpo orgânico possuem ligações umbilicais com a Caixa de Shittim...#nA ótica biológica do Sensei pode forçar os ponteiros daquele pulso místico a operarem."
201030-139 = "……Assim que minhas botas pisarem no asfalto do prédio central, ordenarei as varreduras no Almoxarifado para desenterrar a Arca."
201030-140 = "[s] \"E o que era pra ser um final de semana de folga acabou gerando um inquérito investigativo...\""
201030-141 = "Concordo em discordar. Os meus laudos cerebrais assinalam níveis aceitáveis de prazer."
201030-142 = "Mastigar uma refeição oleosa do passado e debater táticas cruéis no tabuleiro de xadrez com um fantasma de velha data...#nA carga burocrática convencional não abriria buracos na agenda para frivolidades tão valiosas."
201030-146 = "……O silêncio civil exige ser honrado, e eu beberei dele até a última gota hoje."
201030-147 = "Kaya. Se o medo da derrota em série não corromper o seu raciocínio, eu desafio o seu tabuleiro mais uma vez.#nReivindicarei o sangue da partida que me tomastes minutos atrás."
201030-148 = "Hmph... Se for pra fuzilar a sua moral num jogo de mesa abstrato, eu não contarei os minutos."
201030-149 = "A misericórdia não será enviada ao tabuleiro."
201030-153 = "Iniciarei com agressão de fronteira... Peão para D4."
201030-154 = "Espelho e bloqueio maciço. Peão pra D5."
201030-155 = "……Rin."
201030-156 = "Eu detenho os relatórios das suas muralhas psicológicas metódicas e sei que o conservadorismo cego não deixará que você acate os meus conselhos, mas――"
201030-157 = "Para triturar o controle do meio-jogo e ceifar a eficiência, o 'Gambito' de sacrificar soldados menores de forma fria no tabuleiro sangrento do xadrez... nunca falha."
201030-158 = "Peão avança para C4. A isca está cimentada."
201030-162 = "……Peão recusa e protege a lateral para E6. O seu derramamento e o seu sacrifício de carne serão negados pela minha ética."
201030-164 = "Próximo Episódio: Nostalgia Azul Celeste"