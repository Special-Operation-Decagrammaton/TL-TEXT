[translation]
1300806-1 = "遅い悟り"
1300806-2 = "（セリカと一緒に夜遅くまで道を掃除した）"
1300806-4 = "はあ……今日も疲れた……。"
1300806-5 = "[s1] \"お疲れ様。\"\n[s2] \"今日はなかなかハードだったね。\""
1300806-6 = "そうね。ゴミ箱がひっくり返った時は本当に天を仰いだわ……。"
1300806-7 = "そうね。ゴミ箱がひっくり返った時は本当に天を仰いだわ……。"
1300806-8 = "うーん……。"
1300806-12 = "（毎日毎日こうやって先生と一緒にアルバイト……）"
1300806-13 = "（……これで良いのかな？）"
1300806-14 = "（いや……まあ私は一緒にこうしてるだけで楽しい、けど……）"
1300806-15 = "（今日みたいにゴミを拾ったり落葉を掃いたり、そうやってる内に一日が終わっちゃうのはちょっと……）"
1300806-17 = "（たまにはもうちょっと、違うことをやったほうがいい……のかな？えっと、例えば……）"
1300806-18 = "（で、デート……とか）"
1300806-20 = "……。"
1300806-21 = "ばっ、バカ！！バカ！！"
1300806-22 = "[s3] \"……ん？\"\n[s4] \"……理由は分からないけどごめん。\""
1300806-23 = "ば、バカ！先生！もう行くから！"
1300806-24 = "ば、バカ！先生！もう行くから！"
1300806-26 = "（なぜか怒られてしまった）"
