[translation]
1202-1 = "Maid&Made（１）"
1202-5 = "……あれ、"
1202-6 = "誰もいないの？"
1202-10 = "あ、ドア開いてる。"
1202-11 = "入るわよ？"
1202-17 = "C&Cの部室"
1202-20 = "あら、いるなら返事してくれれば良かったのに。"
1202-24 = "あっ……。"
1202-25 = "「あっ」って、もしかして私、本当にどこに行っても歓迎されないのかしら……？立場上仕方ないのだけど……。"
1202-26 = "ああいや、すまない。そういう意味ではなくって、ただ急な来訪で驚いてというか……。"
1202-30 = "あら、ユウカ。"
1202-31 = "今日は何か、"
1202-32 = "依頼でも？"
1202-33 = "もし任務の件でしたら、ちょっと今はネル先輩が不在で……何か伝言でもしておきますか？"
1202-34 = "ううん、大丈夫よ。今日来たのは任務じゃなくて……"
1202-35 = "いや、捉えようによっては任務かもだけど……。"
1202-36 = "普段の任務とは別で、お願いしたいことがあって。"
1202-37 = "お願いしたいこと……？珍しいな、どういう内容？"
1202-38 = "うーん、何て言ったら良いのかしら……。"
1202-39 = "依頼であっても任務ではない……うん、やっぱり「お願いしたいこと」っていう表現が、一番合ってるかもしれない。"
1202-40 = "ますます分からなくなってきたな……。"
1202-41 = "依頼であっても任務ではない……"
1202-42 = "なるほど、何だか複雑そうなお話ですね？"
1202-43 = "あ、いやその、本当に大したことじゃないの。"
1202-44 = "今、お祭りを開く準備が進んでるのは知ってるわよね？"
1202-45 = "ああ、電気街の話か。"
1202-46 = "そういえば生徒たちが主催でお祭りをするとか、どこかで聞いたような気がする。"
1202-47 = "そう。"
1202-48 = "それでお祭りとして盛り上げるために、色んなコンセプトのカフェを開こうとしてるのだけど……。"
1202-49 = "……だけど？"
1202-50 = "だけど……"
1202-51 = "結局その、ミレニアムの生徒たちが大半だから……。"
1202-52 = "「色んなコンセプト」も何も、変に偏ってるって言うか……。"
1202-53 = "ああ、なるほど……ふふっ、だいたい分かりました。"
1202-54 = "コーディング体験とか、工学実験とか……どれもこれも、お客さんが集まりそうにないものばっかりで。"
1202-55 = "百鬼夜行やトリニティのお祭りは相当盛り上がるのに、どうしてうちの学園はこう……。"
1202-56 = "それで、不安に思った電気街の方からセミナーに連絡があったの。何か代案があった方が良いんじゃないかって……。"
1202-57 = "ここまでセミナーの管轄なのかしらって気持ちはさておき、とりあえずミレニアム自治区内の話ではあるから、何もしないわけにもいかなくて……。"
1202-58 = "な、なるほど……。"
1202-59 = "お話は分かりました。ただ、どうしてそれで私たちのところに……？"
1202-60 = "それは、"
1202-61 = "その……。"
1202-70 = "C&C、同時にメイド部である皆さんを見込んで、お願いしたいのですが……。"
1202-75 = "どうして急に敬語に……。"
1202-76 = "な、何だか嫌な予感が……。"
1202-77 = "それ、れっきとしたメイド服よね？"
1202-78 = "偽装で、色んな機能もあるとしても、メイド服であることに変わりは無いわよね？"
1202-79 = "それに、今までその格好のままメイドカフェに潜入したことも何度かあるわよね？"
1202-80 = "まあ、それはそうですね……？"
1202-81 = "そ、そんなこともあったな……。"
1202-82 = "だからその、一週間で良いから、この間の埋め合わせとかそういうものだと思って……"
1202-87 = "C&Cでメイドカフェ、やってくれないかしら……？"
1202-89 = "（１時間後……）"
1202-94 = "はあぁぁぁっ！？"
1202-95 = "メイドカフェ！？何言ってんだバカ！？意味分かんねぇ！！"
1202-96 = "普段メイド服着てるからって、本物のメイドだとでも思われてんのか！？"
1202-97 = "それはまあ、普段からメイド服を着てたら普通はメイドだと思われるでしょうけど……。"
1202-98 = "でも、それは逆に良いことでもある。"
1202-99 = "メイドとしてのイメージを植え付けることに成功してるわけだから。"
1202-100 = "ざっけんな！却下だ却下！"
1202-101 = "セミナーんとこ行って今すぐ断ってこい！"
1202-102 = "いえ、実はその……。"
1202-103 = "……？"
1202-104 = "んだよ、はっきり言え。ってかさっさと行ってこい。"
1202-105 = "もうすでに依頼は受諾した。"
1202-106 = "セミナー側で、すでに諸々の予算も組んでくれたらしい。"
1202-107 = "それにもう引き下がれない。契約のサインもしたから、もし取り消したら色々と問題になる。"
1202-111 = "……は？"
1202-112 = "え、はぁ？何で今回に限って契約？どうして急にそんなしっかりしてんだよ……？"
1202-113 = "……ってか待て。おい、なんだよサインって。"
1202-114 = "あたしサインしてねぇぞ！？どういうことだ！？"
1202-115 = "私がやっておいたよ！！"
1202-120 = "……。"
1202-121 = "……。"
1202-122 = "……え？なになに？"
1202-123 = "どうかした？サインはちゃんとしたよ！"
1202-127 = "てんめっ……！"
1202-128 = "いや、まぁ、そうか……。"
1202-129 = "……そう、ですね。"
1202-130 = "ネル先輩が不在の時はアスナ先輩が決める……そういうルールでしたので……。"
1202-131 = "はぁぁぁ……ったくよぉ……。"
1202-132 = "え、サインしちゃダメだった？"
1202-133 = "どうして？"
1202-134 = "すっごい面白そうだったよ！それに、売り上げも一部貰えるんでしょ？部長も一緒にやろ、メイドカフェ！"
1202-139 = "やるかバカ！"
1202-140 = "ってか何も面白くねぇよ！？"
1202-141 = "そんなことないよ、きっと楽しいって！"
1202-147 = "ネル先輩、諦めよう。こうなったらもうアスナ先輩はてこでも動かない。"
1202-148 = "そうですね、取り合えずやることは決定として、その先のことを考えた方が良さそうです。"
1202-153 = "はぁ……。"
1202-154 = "ったく……てめぇらはいつもいつもそうやって、面倒ごとをっ！！！"
