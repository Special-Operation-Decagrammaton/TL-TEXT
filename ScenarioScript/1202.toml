[translation]
1202-1 = "Empregada doméstica e feita (1)"
1202-5 = "...Que..."
1202-6 = "Não há ninguém?"
1202-10 = "Ah, a porta está aberta."
1202-11 = "Devo entrar?"
1202-17 = "Sala do clube C&C"
1202-20 = "Oh, eu gostaria que você tivesse respondido se estivesse lá."
1202-24 = "Ah..."
1202-25 = "“Oh”, pensei, “Talvez eu realmente não seja bem-vindo em qualquer lugar que eu vá…?” Não posso evitar devido à minha posição, mas..."
1202-26 = "Ah, não, me desculpe. Não quero dizer isso, só fiquei surpreso com a visita repentina dele..."
1202-30 = "Ah, Yuuka."
1202-31 = "O que é hoje?"
1202-32 = "Até mesmo um pedido?"
1202-33 = "Se for uma missão, Nell-senpai não está disponível no momento...Gostaria de deixar uma mensagem?"
1202-34 = "Não, está tudo bem. Eu não vim em missão hoje..."
1202-35 = "Bem, dependendo de como você olha para isso, pode ser uma missão..."
1202-36 = "Além dos meus deveres habituais, tenho algo a pedir-lhe."
1202-37 = "O que você quer perguntar...? Isso é incomum, do que se trata?"
1202-38 = "うーん、何て言ったら良いのかしら……。"
1202-39 = "Mesmo que seja um pedido, não é uma missão... Pois é, a expressão “Gostaria de te perguntar” pode ser a mais adequada."
1202-40 = "Está ficando cada vez mais confuso..."
1202-41 = "Mesmo que seja um pedido, não é uma missão..."
1202-42 = "Entendo, parece uma história complicada, não é?"
1202-43 = "Oh, não, realmente não é grande coisa."
1202-44 = "Eu sei que estão em andamento os preparativos para a realização de um festival, certo?"
1202-45 = "Ah, você está falando sobre Electric Town?"
1202-46 = "Pensando bem, sinto que ouvi em algum lugar que os estudantes estão organizando um festival."
1202-47 = "sim."
1202-48 = "Então, estou tentando abrir cafés com vários conceitos para deixar o festival mais emocionante..."
1202-49 = "...mas?"
1202-50 = "Mas..."
1202-51 = "Afinal, a maioria dos alunos são alunos do Millennium..."
1202-52 = "Você poderia dizer que os \"vários conceitos\" são todos estranhamente tendenciosos..."
1202-53 = "Ah, entendo... hehe, eu entendo."
1202-54 = "Experiências de codificação, experimentos de engenharia, etc... todos dificilmente atrairão clientes."
1202-55 = "O Hyakki Night Parade e o Trinity Festival são bastante emocionantes, então por que nossa escola é assim...?"
1202-56 = "それで、不安に思った電気街の方からセミナーに連絡があったの。何か代案があった方が良いんじゃないかって……。"
1202-57 = "Deixando de lado as minhas dúvidas se isto é da competência do seminário, visto que se trata de um assunto da Região Autónoma do Milénio, não posso fazer nada a respeito..."
1202-58 = "Eu vejo..."
1202-59 = "Eu entendo a história. No entanto, por que você veio até nós...?"
1202-60 = "isso é,"
1202-61 = "o……."
1202-70 = "Gostaria de fazer um pedido em antecipação à C&C e a todos vocês que também fazem parte do clube de empregadas..."
1202-75 = "Por que você de repente usou linguagem honorífica?"
1202-76 = "Estou com uma sensação um tanto desagradável..."
1202-77 = "Essa é uma roupa de empregada adequada, certo?"
1202-78 = "Mesmo que seja um disfarce e tenha diversas funções, ainda é uma fantasia de empregada, certo?"
1202-79 = "Além disso, já entrei furtivamente em um Maid Café usando essa roupa algumas vezes, certo?"
1202-80 = "Bem, isso é verdade...?"
1202-81 = "Bom, isso também aconteceu..."
1202-82 = "Então, pensei que seria uma boa ideia compensar esse tempo, mesmo que fosse apenas por uma semana..."
1202-87 = "Eu me pergunto se a C&C poderia abrir um Maid Café...?"
1202-89 = "(1 hora depois...)"
1202-94 = "Haaaaaaaaa! ?"
1202-95 = "Café da empregada! ? O que você está dizendo, idiota? ? Eu não entendo! !"
1202-96 = "As pessoas acham que sou uma empregada de verdade só porque costumo usar roupa de empregada? ?"
1202-97 = "Bem, se você usa uma roupa de empregada regularmente, as pessoas provavelmente pensariam que você é uma empregada doméstica..."
1202-98 = "Mas por outro lado, também é uma coisa boa."
1202-99 = "Isso ocorre porque ela conseguiu incutir uma imagem de si mesma como empregada doméstica."
1202-100 = "Não se deixe enganar! Rejeitado! Rejeitado!"
1202-101 = "Vá para o seminário e diga não agora mesmo!"
1202-102 = "Não, na verdade..."
1202-103 = "...?"
1202-104 = "Sim, diga claramente. Apresse-se e vá."
1202-105 = "O pedido já foi aceito."
1202-106 = "Parece que a parte do seminário já elaborou vários orçamentos."
1202-107 = "Não posso mais desistir disso. Eu assinei o contrato, então se eu cancelar vai ter muitos problemas."
1202-111 = "……dentes?"
1202-112 = "Huh? Huh? Por que o contrato só desta vez? Por que você está tão firme de repente...?"
1202-113 = "Espere... Ei, o que é um sinal?"
1202-114 = "Eu não assinei! ? O que você quer dizer! ?"
1202-115 = "Eu consegui! !"
1202-120 = "……."
1202-121 = "……."
1202-122 = "……foto? O quê?"
1202-123 = "O que está errado? A assinatura estava correta!"
1202-127 = "Tenme...!"
1202-128 = "Não, bem, entendo..."
1202-129 = "……Concordo."
1202-130 = "Quando Nell-senpai estava ausente, Asuna-senpai tomava as decisões... essa era a regra..."
1202-131 = "Haaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa..."
1202-132 = "O quê, você não deveria ter assinado?"
1202-133 = "Por que?"
1202-134 = "Parecia muito interessante! Além disso, você ganha uma parte das vendas, certo? Diretor, vamos fazer isso juntos, Maid Cafe!"
1202-139 = "Faça isso, seu idiota!"
1202-140 = "Não há nada de interessante nisso! ?"
1202-141 = "Na verdade não, é definitivamente divertido!"
1202-147 = "Nell-senpai, desista. Se isso acontecer, Asuna-senpai não conseguirá mais se mover."
1202-148 = "Bem, acho que seria melhor decidir o que fazer e pensar no futuro."
1202-153 = "Suspirar..."
1202-154 = "Então... eles estão sempre fazendo isso e causando problemas! ! !"
