[translation]
34170-1 = "Episódio 17; Confronto"
34170-2 = "[ns] \"Mika!! Pare!!\""
34170-4 = "......Desculpe, Sensei.#nEu não posso."
34170-5 = "Ei, Saori.#nVocê não tem tempo, né? Não deveria se apressar?"
34170-6 = "......"
34170-7 = "Até o nascer do sol... resta apenas uma hora."
34170-8 = "Ahhh... Eu tive tanto trabalho em separar você dele... Mas já que o Sensei tá aqui,#neu não tenho mais o que fazer."
34170-9 = "Mas... será que você consegue aguentar?"
34170-10 = "――Se você conseguir segurar as pontas até lá, você vence, Saori."
34170-11 = "......"
34170-12 = "......Mas que cara é essa.#nAconteceu algo divertido? Ou será que você desistiu?"
34170-13 = "......Não, eu apenas me lembrei de algo do passado."
34170-17 = "......"
34170-22 = "Sensei!! Não venha para cá!!"
34170-23 = "......!!"
34170-25 = "......"
34170-26 = "!?"
34170-28 = "Não temos tempo... Vá direto até onde a Atsuko está!"
34170-29 = "......Cuide bem da Princesa por mim."
34170-30 = "L-Líder...!"
34170-31 = "[s] \"............!!\""
34170-32 = "......O que a Líder disse é verdade."
34170-33 = "Nós não temos tempo de procurar um caminho que nem sabemos se existe."
34170-34 = "E além disso, mesmo se acharmos――vai ser tarde demais."
34170-35 = "......"
34170-36 = "A Líder no estado atual dela não é párea para a Mika.#nÉ um milagre se ela conseguir aguentar até a gente chegar lá."
34170-37 = "M-Mas..."
34170-38 = "É por isso... que é melhor irmos logo salvar a Princesa.#nLembre-se do motivo pelo qual viemos até aqui."
34170-39 = "[s] \"............\""
34170-40 = "Sensei, a decisão final é sua..."
34170-41 = "Por mais que a Mika pareça saber o que está fazendo..."
34170-42 = "Acha que o Sensei consegue convencer uma mulher daquelas?"
34170-43 = "[s] \"............Eu vou...\""
34170-46 = "[ns1] Cumprir o meu objetivo.\n[ns2] Me apressar."
34170-55 = "......"
34170-56 = "Puxa... O Sensei se foi afinal."
34170-57 = "Que bom pra você, Saori.#nCom certeza a sua princesinha vai ser salva."
34170-58 = "Mika... Era isso que você queria desde o começo?"
34170-59 = "O que eu queria...?"
34170-60 = "O que era que eu queria mesmo...#nAh, claro... Sim. Alcançar meu objetivo, sabe?"
34170-61 = "......"
34170-62 = "......Mas, não é como se eu tivesse você como alvo ou algo assim."
34170-63 = "Para ser sincera, poderia ser qualquer um."
34170-67 = "Na verdade... Eu até pensei por um instante... se o Sensei ficasse aqui, seria muito bom..."
34170-68 = "......Bem, mas acho que pedir isso já é demais, né."
34170-69 = "......"
34170-70 = "Poxa... Será que dá pra parar de me olhar assim?"
34170-71 = "A Seia-chan vivia me dizendo que 'eu sou impulsiva e não penso em nada'.#nEu sei muito bem disso, mas... não acha cruel dizer isso na cara da pessoa?"
34170-75 = "......É.#nComo eu pensei, era isso que eu mais desejava, acho."
34170-76 = "――Ver você, a pessoa que mais odeio, aqui na minha frente."
34170-77 = "......"
34170-78 = "E, de qualquer forma... o que o Sensei fez indo salvar a sua aluna é o certo.#nAfinal, superar todas as dificuldades e todos serem felizes no final... Essa é a trajetória do final feliz."
34170-79 = "E nós duas, que acumulamos tantos pecados――Vamos acabar nossa história aqui."
34170-80 = "......"
34170-81 = "Sendo assim――Saori, que tal darmos um fim nessa nossa história de vez?"
34170-82 = "Não fique aí calada, diga alguma coisa.#nEssa é a cena onde a 'Bruxa' executa a 'Cão de Caça', sabe? Não tem nada a dizer?"
34170-83 = "Como 'Eu não aceito isso' ou 'As suas tragédias são culpa das suas próprias escolhas'...#nNão vai arrumar nenhuma desculpa?"
34170-84 = "......Não, eu aceito isso."
34170-94 = "Granadas!?#nNão... bombas de fumaça...? Mas o que..."
34170-99 = "A... aiaiai..."
34170-100 = "É uma arma proibida cuja produção não é mais permitida.#nElas eram jogadas aos montes nos campos de treinamento da Arius."
34170-101 = "Ah, sério☆#nComo se eu me importasse?"
34170-108 = "Guh...!?"
34170-109 = "――Eu entendi os cuidados que devo tomar ao te enfrentar."
34170-115 = "......Guh."
34170-116 = "Mika... eu não nego o seu ódio."
34170-117 = "O fato de você não ter um futuro feliz, de ter perdido tudo e de ter ficado sozinha... A causa disso tudo sou eu."
34170-118 = "Se esse for o caso, eu irei responder a esse seu ódio."
34170-126 = "......Interessante, sim."
34170-127 = "Guerra de guerrilha, então?#nBom, considerando o terreno daqui, é o mais adequado."
34170-128 = "E além disso... essas aí são granadas termobáricas, né? Ahaha☆#nVocê trouxe o suficiente? Não ache que você dá conta de mim com tão pouco, ok?"
34170-129 = "......Com isso, tudo bem."
34170-130 = "Sendo assim, eu vou lutar a sério contra você... resista com tudo o que tem!#n――Apesar de que pra você tudo é vaidade."
34170-131 = "Entendido――Sendo assim, eu irei lutar até o fim."
34170-132 = "Hum... Então não me entedie, tá?"
34170-149 = "Que espetáculo divertido. Aprofundar o inferno uma da outra dessa forma...#nMika, você realmente é a minha musa."
34170-150 = "O contato com os outros é um inferno... e o fato de elas se odiarem uma à outra, nada mais é do que uma prova da sua própria existência."
34170-151 = "Se comparar com aquele paraíso que não pôde ser provado, isso aqui é muito mais claro.#n――Você não concorda, Seia?"
34170-152 = "......"
34170-153 = "Parece que você ainda não desistiu."
34170-154 = "......Você quer voltar para a Trinity?#nMas sabe, não será tão fácil escapar das frestas do sonho."
34170-155 = "Afinal, você se envolveu no 'Ritual'.#nÉ o mesmo que botar a cabeça para fora da janela que liga Kivotos ao que há lá fora."
34170-156 = "Sim... a sua existência deve ter se destacado como uma lamparina no meio da escuridão para 'aquilo'."
34170-157 = "......Tudo culpa 'daquilo', não é?"
34170-158 = "A exposição 'daquilo' inverteu o seu sublime em terror――e os princípios subjacentes começaram a controlá-la."
34170-159 = "Que instigante... o que será de você agora.#nNenhum de nós tem ideia do que vai acontecer."
34170-160 = "Até porque, nenhum de nós sabe nada sobre 'aquilo'."
34170-161 = "Ininterpretável, ininteligível, incomunicável――Uma luz agourenta que apenas chega.#nUm conceito incompreensível com o qual não se pode se comunicar, e que não possui propósitos..."
34170-162 = "O nosso maior arqui-inimigo na Gematria..."
34170-164 = "Nós o chamamos de 'Cores'."
34170-167 = "......Hum. Aquele ali também está quase pronto."
34170-168 = "Sim, você percebeu?#nExato――esse é o meu trunfo, que foi preparado para dar conta da 'Schale'."
34170-173 = "A maior santa da Sociedade dos Santos――Barbara."
34170-174 = "Se ela for concluída conforme o planejado... com certeza será muito mais forte do que a série de anjos artificiais... fufu."
34170-175 = "O Maestro pode até dizer que não há estética neste método, mas..."
34170-176 = "Uma 'arma' tem sua própria beleza funcional."
34170-177 = "Que cara será que o Maestro vai fazer quando ver isso... ah, verdade, ele não pode fazer nenhuma expressão facial."
34170-178 = "A questão é, será que a Schale e o Esquadrão conseguirão passar por essa 'arma' e chegar até mim?"
34170-182 = "Fufu――Tudo se resume a destinos inadiáveis, Seia."
34170-183 = "Por que não assistimos e acompanhamos o desenrolar dessas provas de existência vindas do inferno comigo?"
34170-188 = "Haa... haa..."
34170-189 = "Eu... não desistirei, Beatrice.#nEm algum lugar... em algum lugar... deve haver uma maneira de superar essa situação..."
34170-190 = "Eu devo encontrar um jeito... de escapar daqui... o mais rápido possível..."
34170-191 = "Eu não posso continuar presa neste devaneio para sempre..."
34170-192 = "Afinal... Eu ainda tenho coisas... que preciso fazer..."
34170-194 = "Próximo Episódio; O Nosso Outro Lado"