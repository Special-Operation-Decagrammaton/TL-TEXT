[translation]
34170-1 = "Episódio 17; Confronto"
34170-2 = "[ns] \"Mika!! Pare com isso!!\""
34170-4 = "……Sinto muito, Sensei. #nIsso não é possível."
34170-5 = "Ei, Saori. #nNão estamos sem tempo? Não precisa se apressar?"
34170-6 = "……."
34170-7 = "Até o nascer do sol…… falta uma hora, não é?"
34170-8 = "Ah, puxa…… foi um esforço e tanto separar vocês, mas…… se o Sensei chegou aqui, #nnão há mais nada que eu possa fazer."
34170-9 = "Mas, quanto tempo será que isso vai levar, hein?"
34170-10 = "――Se você conseguir aguentar até lá, a vitória é sua, Saori."
34170-11 = "……."
34170-12 = "……O que é essa expressão? #nAconteceu algo divertido? Ou você desistiu?"
34170-13 = "……Não, só me lembrei de coisas do passado."
34170-17 = "……."
34170-22 = "Não venha!! Sensei!!"
34170-23 = "……!!"
34170-25 = "……."
34170-26 = "!?"
34170-28 = "Não temos tempo…… vá direto para onde a Atsuko está!"
34170-29 = "……Cuide da Princesa."
34170-30 = "L-Líder……!"
34170-31 = "[s] \"…………!!\""
34170-32 = "……A Líder está certa."
34170-33 = "Não temos tempo para procurar um caminho que nem sabemos se existe."
34170-34 = "Além disso, mesmo que encontrássemos o caminho――seria tarde demais."
34170-35 = "……."
34170-36 = "A Líder atual não consegue enfrentar a Mika. #nÉ duvidoso até se ela conseguiria aguentar até chegarmos."
34170-37 = "M-Mas……."
34170-38 = "Por isso…… o certo é ir salvar a Princesa agora. #nLembre-se do motivo pelo qual estamos aqui."
34170-39 = "[s] \"………….\""
34170-40 = "Deixarei a decisão final com o Sensei……"
34170-41 = "Além disso, parece que a Mika tem consciência do que está fazendo, mas……"
34170-42 = "Você acha que o Sensei consegue convencer aquela mulher?"
34170-43 = "[s] \"…………Eu.\""
34170-46 = "[ns1] Cumprir o objetivo.\n[ns2] Apressar-se."
34170-55 = "……."
34170-56 = "Ah, puxa…… no fim das contas, o Sensei foi embora."
34170-57 = "Que bom para você, Saori. #nTenho certeza de que sua princesa será salva."
34170-58 = "Mika…… era isso que você desejava?"
34170-59 = "O que eu desejava……?"
34170-60 = "O que era mesmo que eu desejava…… #nAh, sim…… é verdade. Alcançar o objetivo, algo assim?"
34170-61 = "……."
34170-62 = "……Mas, eu não estava mirando especificamente em você."
34170-63 = "Para ser sincera, qualquer um servia."
34170-67 = "Na verdade…… eu até pensei que seria bom se o Sensei ficasse aqui."
34170-68 = "……Bem, acho que isso é pedir demais."
34170-69 = "……."
34170-70 = "Ei…… pode parar de me olhar assim?"
34170-71 = "A Seia-chan sempre me diz que sou \"impulsiva e não penso em nada\". #nEu mesma sei disso, mas…… não é um pouco cruel? Dizer isso na cara da pessoa? Sério?"
34170-75 = "……Sim. #nNo fim, acho que era isso que eu mais desejava."
34170-76 = "――Que você, a pessoa que eu mais odeio, estivesse aqui na minha frente."
34170-77 = "……。"
34170-78 = "Além disso, Sensei... é o certo a se fazer, ir salvar os alunos. #nNo final, superar todas as dificuldades e alcançar a felicidade com todos — é em direção a esse final feliz que devemos ir."
34170-79 = "E nós, que acumulamos inúmeros atos malignos — chegamos ao nosso fim aqui."
34170-80 = "……。"
34170-81 = "Então... vamos chegar ao nosso fim logo, Saori."
34170-82 = "Por que não diz algo em vez de ficar calada? #nÉ a cena em que a 'Bruxa' executa o 'Cão de Caça', não é? Não tem nada que queira deixar dito?"
34170-83 = "Não quer dar desculpas como 'não consigo aceitar' ou 'seu infortúnio é merecido'?"
34170-84 = "……Não, eu aceito."
34170-94 = "Granada!? #nNão... uma cortina de fumaça...? O que é isso?"
34170-99 = "Ai... ai ai..."
34170-100 = "É uma arma cuja produção foi proibida. #nEstava descartada aos montes nos campos de treinamento de Arius."
34170-101 = "É mesmo? ☆ #nNão que eu tenha interesse, sabe?"
34170-108 = "Droga...!?"
34170-109 = "— Entendi os pontos de atenção ao lidar com você."
34170-115 = "……Ugh."
34170-116 = "Mika... eu não nego o seu ódio."
34170-117 = "O fato de que um futuro feliz não virá para você, de que tudo lhe foi tirado, e de que você ficou sozinha... a causa sou eu."
34170-118 = "Sendo assim, eu responderei a esse ódio."
34170-126 = "……Interessante, sim."
34170-127 = "Vai usar táticas de guerrilha? #nBem, considerando este terreno, essa deve ser a melhor opção."
34170-128 = "Além disso... isso é uma granada termobárica, né? Ahaha ☆ #nVocê preparou o suficiente? Não pense que pode me enfrentar com apenas uma pequena quantidade, viu?"
34170-129 = "……Com isso, sim."
34170-130 = "Vou te enfrentar de verdade agora... tente resistir com força total, tá? #n— Embora, para você, tudo deva ser vazio."
34170-131 = "Entendo — então, vou lutar até o fim."
34170-132 = "Hee... não me deixe entediada, certo?"
34170-149 = "Um espetáculo interessante. Aprofundar o inferno um do outro dessa forma... #nMika, você é realmente minha musa."
34170-150 = "O contato com o outro é o inferno... ao se odiarem, eles nada mais fazem do que provar sua própria existência."
34170-151 = "Comparado a um paraíso que não pode ser provado, isto é muito mais claro. #n— Não acha, Seia?"
34170-152 = "……。"
34170-153 = "Parece que você ainda não desistiu."
34170-154 = "……Quer voltar para Trinity? #nMas não será fácil escapar das frestas do sonho."
34170-155 = "Você foi envolvida no 'ritual', afinal. #nÉ como se tivesse colocado o rosto na janela que dá para o exterior de Kivotos."
34170-156 = "Sim... sua existência deve ter se destacado como uma luz brilhando na escuridão."
34170-157 = "……Por causa d' 'Aquilo', não é?"
34170-158 = "Seu mistério, exposto a 'Aquilo', foi invertido em terror — e o princípio do lado oculto começou a dominá-la."
34170-159 = "É curioso... o que acontecerá com você daqui para frente. #nNós também não sabemos de nada."
34170-160 = "Pois, sobre 'Aquilo', somos completamente ignorantes."
34170-161 = "Não interpretado, não compreendido, não comunicado — uma luz sinistra que apenas chega. #nUm conceito incompreensível que não pode ser objetivo nem comunicado..."
34170-162 = "Nosso maior inimigo como Gematria..."
34170-164 = "Nós o chamamos de 'Cores'."
34170-167 = "………Hum. Aquilo também está quase completo."
34170-168 = "Sim, percebeu? #nIsso mesmo — é o meu trunfo preparado para enfrentar o 'Schale'."
34170-173 = "A maior santa do Conselho de Estudantes — Barbara."
34170-174 = "Se ela for concluída conforme o planejado... deve ser mais poderosa que aquela série de anjos artificiais... fufu."
34170-175 = "Como Maestro diz, pode não haver estética neste método, mas..."
34170-176 = "Uma 'arma' tem sua própria beleza funcional."
34170-177 = "Como será que o Maestro reagirá a isso... ah, ele não consegue fazer expressões, não é?"
34170-178 = "Será que o Schale e o Squad conseguirão romper a 'arma' e chegar até mim?"
34170-182 = "Fufu — tudo é um destino inevitável, Seia."
34170-183 = "Por que não observamos o desfecho da prova de existência deste inferno e a minha?"
34170-188 = "Haa... haa..."
34170-189 = "Eu... não posso desistir, Beatrice. #nDeve haver... deve haver algum método para romper esta situação em algum lugar..."
34170-190 = "Preciso encontrar um jeito de sair daqui... o mais rápido possível..."
34170-191 = "Não posso ficar presa neste devaneio para sempre..."
34170-192 = "Ah... pois eu ainda tenho... coisas que preciso realizar..."
34170-194 = "Próximo episódio: A outra nós"
