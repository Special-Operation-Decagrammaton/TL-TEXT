[translation]
34170-1 = "Episódio 17;Confronto"
34170-2 = "[ns] \"Mika!! Para!!\""
34170-4 = "……Desculpa, Sensei.#nIsso eu não posso fazer."
34170-5 = "Ei, Saori.#nVocê tá sem tempo, né? Não precisa correr?"
34170-6 = "……."
34170-7 = "Até o nascer do sol…… falta 1 hora, é."
34170-8 = "Aah…… eu me dei ao trabalho de separar vocês, mas……#nse o Sensei chegou até aqui, já não sobra mais nada que eu possa fazer, né."
34170-9 = "Mas, será que quanto tempo isso vai levar?"
34170-10 = "――Se você aguentar até lá, a vitória é sua, Saori."
34170-11 = "……."
34170-12 = "……Que cara é essa?#nAconteceu algo divertido? Ou você desistiu?"
34170-13 = "……Não; só me lembrei de coisas antigas."
34170-17 = "……."
34170-22 = "Não venha!! Sensei!!"
34170-23 = "……!!"
34170-25 = "……."
34170-26 = "!?"
34170-28 = "Não há tempo…… siga direto até a Atsuko!"
34170-29 = "……A Hime, eu conto com você."
34170-30 = "L-Líder……!"
34170-31 = "[s] \"…………!!\""
34170-32 = "……É como a Líder diz."
34170-33 = "Não há tempo pra procurar um caminho que nem se sabe se existe."
34170-34 = "E, mesmo que a gente achasse um caminho――seria tarde demais."
34170-35 = "……."
34170-36 = "A Líder de agora não tem como enfrentar a Mika.#nSe ela aguenta até a gente chegar, isso já é duvidoso."
34170-37 = "M-mas……."
34170-38 = "Por isso…… seguir e salvar a Hime é o certo.#nLembra pra que a gente está aqui."
34170-39 = "[s] \"…………\""
34170-40 = "A decisão final fica com o Sensei……"
34170-41 = "E a Mika parece ter consciência do que está fazendo……"
34170-42 = "uma mulher assim, você consegue convencer?"
34170-43 = "[s] \"…………Eu.\""
34170-46 = "[ns1] Cumpre o objetivo.\n[ns2] Apressa-se."
34170-55 = "……."
34170-56 = "Aah…… no fim, o Sensei foi, né."
34170-57 = "Que bom pra você, Saori.#nA sua princesa, com certeza, vai ser salva."
34170-58 = "Mika…… era isto que você desejava?"
34170-59 = "O que eu desejava……?"
34170-60 = "O que era mesmo que eu desejava……#nAh, sim…… é. Objetivo cumprido, tipo isso?"
34170-61 = "……."
34170-62 = "……Mas não é que eu estivesse mirando em você."
34170-63 = "Falando com sinceridade, qualquer uma servia."
34170-67 = "Aliás…… eu até cheguei a pensar…… \"tomara que o Sensei fique aqui\"……."
34170-68 = "……Bom, isso era querer demais, eu acho."
34170-69 = "……."
34170-70 = "Ai…… dá pra não me olhar com esses olhos?"
34170-71 = "A Seia vive me dizendo: \"impulsiva e que não pensa em nada\".#nEu sei disso, mas…… não é maldade? Falar isso na cara?"
34170-75 = "……Sim.#nNo fim, o que eu mais desejava era isto, talvez."
34170-76 = "――Você, a quem eu mais odeio, aqui, na minha frente."
34170-77 = "……."
34170-78 = "E o Sensei…… ir salvar os alunos é o certo.#nSuperar todas as adversidades e, no fim, todo mundo ser feliz――seguir rumo a esse final feliz."
34170-79 = "E nós, que acumulamos tantas maldades――chegamos aqui ao nosso desfecho."
34170-80 = "……."
34170-81 = "Então――vamos ao nosso desfecho, Saori."
34170-82 = "Em vez de ficar calada, diz alguma coisa?#nÉ a cena em que a \"bruxa\" executa o \"cão de caça\", viu? Não tem nada que queira deixar dito?"
34170-83 = "\"Eu não aceito\", \"a sua desgraça é culpa sua\"……#nnão vai nem se justificar?"
34170-84 = "……Não; eu aceito."
34170-94 = "Granada!?#nNão…… cortina de fumaça……? Que é isto?"
34170-99 = "Ai…… ai, ai……."
34170-100 = "É uma arma cuja produção hoje é proibida.#nHavia um monte largado no campo de treinamento de Arius."
34170-101 = "Ah é☆#nNão que me interesse, viu?"
34170-108 = "Gh……!?"
34170-109 = "――Já entendi os pontos de atenção pra te enfrentar."
34170-115 = "……Uh."
34170-116 = "Mika…… eu não nego o seu ódio."
34170-117 = "Que um futuro feliz não vem pra você, que tudo te foi roubado, que você ficou sozinha…… a causa sou eu."
34170-118 = "Então, eu respondo a esse ódio."
34170-126 = "……Interessante, sim."
34170-127 = "Vai de guerrilha, é?#nBom, considerando este terreno, é o melhor mesmo."
34170-128 = "E…… isso é granada termobárica, né? Ahaha☆#nTrouxe bastante? Não pense que, com pouquinho, dá conta de mim, viu?"
34170-129 = "……Assim, sim."
34170-130 = "Agora eu vou te enfrentar de verdade…… resiste com tudo, tá?#n――Embora, pra você, tudo seja algo vão."
34170-131 = "Sei――então, vou lutar até o fim."
34170-132 = "Hmm…… não me deixa entediada, hein?"
34170-149 = "Que espetáculo interessante. Aprofundarem, assim, o inferno uma da outra……#nMika, você é mesmo a minha musa."
34170-150 = "O contato com o outro é o inferno…… odiando-se mutuamente, elas nada mais fazem que provar a existência disso."
34170-151 = "Comparado ao paraíso que não se pode provar, isto é muito mais nítido.#n――Não acha, Seia?"
34170-152 = "……."
34170-153 = "Pelo visto, você ainda não desistiu."
34170-154 = "……Quer voltar pra Trinity?#nMas escapar da fresta do sonho não deve ser fácil."
34170-155 = "Afinal, você foi envolvida no \"ritual\".#nÉ como se tivesse posto o rosto na janela que dá pro exterior de Kivotos."
34170-156 = "Sim…… a sua existência deve ter chamado atenção como uma chama flutuando na escuridão."
34170-157 = "……Aos olhos \"DAQUILO\", sabe."
34170-158 = "O seu mistério, exposto \"ÀQUILO\", foi invertido em terror――e o princípio do avesso começou a te dominar."
34170-159 = "Fico curiosa…… o que será de você daqui pra frente.#nNem nós sabemos."
34170-160 = "Porque, sobre \"AQUILO\", nós somos completamente ignorantes."
34170-161 = "Não se interpreta, não se compreende, não se comunica――uma luz agourenta que apenas chega.#nUma noção incompreensível, sem propósito nem diálogo possível……."
34170-162 = "O maior arqui-inimigo de nós, da Gematria……."
34170-164 = "Nós o chamamos de \"Cor\"."
34170-167 = "………Hum. Aquilo também está com a conclusão à vista."
34170-168 = "Sim, percebeu?#nIsso――a minha carta na manga, preparada pra enfrentar a \"Schale\"."
34170-173 = "A mais grandiosa santa do Conselho dos Santos――Bárbara."
34170-174 = "Quando ela se completar como previsto…… há de ser mais poderosa que aquela série de anjos artificiais…… ufu."
34170-175 = "Como diz o Maestro, talvez não haja estética neste método, mas……"
34170-176 = "uma \"arma\" tem a beleza funcional que cabe a uma arma."
34170-177 = "Que cara será que o Maestro vai fazer nessa hora…… ah, ele nem consegue fazer expressões."
34170-178 = "Será que a Schale e o Squad conseguem atravessar a \"arma\" e chegar até mim?"
34170-182 = "Ufu――tudo é um destino contra o qual não se pode lutar, Seia."
34170-183 = "Testemunhemos, eu e você, o rumo desta prova de existência do inferno."
34170-188 = "Haa…… haa……."
34170-189 = "Eu…… não posso desistir, Beatrice.#nEm algum lugar…… em algum lugar…… deve haver um meio de romper esta situação……."
34170-190 = "O quanto antes, um jeito de sair daqui…… eu preciso encontrar……."
34170-191 = "Não posso ficar presa pra sempre neste devaneio……."
34170-192 = "Ah…… porque a mim…… ainda restam coisas a fazer……."
34170-194 = "Próximo Episódio;As Outras Nós"
