[translation]
1600903-1 = "忍者少女は止められない"
1600903-2 = "（ちょうど正午になった頃――）"
1600903-6 = "[ns] \"今のうちにお昼ご飯でも食べておこうか……\""
1600903-8 = "[ns] \"あとは3分待つだけ……\""
1600903-10 = "（そうして、おとなしくカップ麵の出来上がりを待っていた時……）"
1600903-18 = "待たせたな先生殿！ミチル、見参！！"
1600903-22 = "[ns1] \"あれ、早いね。\"\n[ns2] \"午後に来るって言ってなかった？\""
1600903-23 = "忍者というのは常に意表を突くものだよ、先生殿！"
1600903-24 = "忍者というのは常に意表を突くものだよ、先生殿！"
1600903-25 = "どう、今の私すごく忍者っぽくない！？"
1600903-26 = "[s] \"そう、かも……？\""
1600903-27 = "うわぁ、微妙な反応！ちょっと傷つく！忍者は繊細なんだよ！？"
1600903-28 = "[s] \"忍者という生き物、難しい……！\""
1600903-29 = "あはっ、「取扱注意」のシールを貼っておいた方が良いかもね！"
1600903-30 = "ってあれ、先生殿。今日のお昼もカップ麵？"
1600903-31 = "そんなにカップ麵ばかり食べていたら、いつか後悔するよ？"
1600903-32 = "[s] \"後悔……？\""
1600903-33 = "そうそう。栄養バランスが崩れて身体に悪いし、口内炎ができやすくなっちゃうよ？"
1600903-34 = "それに、寝つきも悪くなるし……。"
1600903-35 = "一度そうなっちゃうと、一晩中インターネットの海を泳いで忍者を見下すやつらとレスバを繰り広げたり、意味も無く色んなチャンネルの動画を見たり……"
1600903-36 = "睡眠の質がドッと下がって、朝になって後悔することになるんだよ？"
1600903-37 = "だからインスタント食品は、忍者にとってタブーと言っても過言ではない！"
1600903-38 = "[s3] \"カップ麵、恐ろしい……。\"\n[s4] \"何だかものすごくディテールが細かい感想だね。\""
1600903-39 = "ま、経験談なんだけど。もう今朝は眠いのなんのって……。"
1600903-40 = "ま、経験談なんだけど。もう今朝は眠いのなんのって……。"
1600903-41 = "[s] \"タブーじゃなかったの！？\""
1600903-42 = "細かいことは気にしない！"
1600903-43 = "とにかくお昼を食べてるってことは……もうお仕事は終わったってことだよね！？"
1600903-44 = "[s] \"いや、実はまだ全然……\""
1600903-45 = "私が今日なぜ予告までして現れたのか、理由を話してしんぜよう。"
1600903-46 = "……あれ、まだの方が良いかな。なんかこう、趣が足りない？もう少し引っ張った方が良い？"
1600903-47 = "危うく忘れるところだった……忍者にとって大事なのはテンポ、雰囲気、話術、"
1600903-48 = "そしてアンブッシュ！"
1600903-49 = "[s] \"最後のは違う気がする！\""
1600903-50 = "ちょっと待っててねー、先生殿。少し頭を整理をするから。"
1600903-51 = "うーん……"
1600903-52 = "むむむむむっ……。"
1600903-53 = "とりあえず深呼吸、すーーーーーーーーーーーーっ……"
1600903-54 = "……ゲホッ！ゲホ、ゲホッ！！"
1600903-55 = "[s] \"……大丈夫？\""
1600903-56 = "い、今のは無し！ノーカン！えっと……とりあえず頭の整理は付いたよ。"
1600903-57 = "先生殿……どうか、驚かないで聞いてほしい。"
1600903-58 = "今まで秘密にしてきたんだけど……。"
1600903-59 = "実は、私……影に生きる忍者たちの組織、「忍術研究部」の部長だったのでござる。"
1600903-60 = "今まで隠していて、申し訳ない……！"
1600903-61 = "[s5] \"ところでミチル、さっき「一晩中インターネット」って言ってたけど……。\"\n[s6] \"なっ！？今まで全く気付かなかった……！\""
1600903-62 = "話の流れを急に曲げられた！？"
1600903-63 = "「近所に住んでる可愛い子が、実は伝説の組織のリーダー」みたいな熱い展開だったのに！？"
1600903-64 = "[s7] \"それはよく分からないけど……一晩中ネットって、宿題は大丈夫？\""
1600903-65 = "ぐっ、誤魔化されてくれない……！"
1600903-66 = "宿題は、えーっと……やったような、やってないような、シュレディンガー……。"
1600903-67 = "と、とにかく閑話休題！！とにかく何でこんな話をしてるかって言うと……"
1600903-68 = "ふふっ、そこで乗ってくれるとは流石先生殿！"
1600903-69 = "もう中忍の卵と言っても良いかもね！胸を張っても良いよ！"
1600903-70 = "[s8] \"う、うん……お、恐れ入ります？\""
1600903-71 = "それでね、今やろうとしたのは「近所に住んでる可愛い子が、実は伝説の組織のリーダー」みたいな展開なんだけど。"
1600903-72 = "何で私が急にこんなことを言い出したかっていうと……。"
1600903-73 = "この間の続きで、動画作りの話なの！最近の動画には「コンセプト」が求められるの。"
1600903-74 = "その上で短めの動画とかが、再生数が伸びやすいんだって！"
1600903-75 = "昨日徹夜して、色んなコンセプトの動画を見て……"
1600903-76 = "あ、ちょっとだけ宿題もやったけど！"
1600903-77 = "とにかく、「少女忍法帖ミチルっち」でもそういう動画を撮りたいなって！"
1600903-78 = "[s] \"先に一回寝た方が良いんじゃ……。\""
1600903-79 = "大丈夫大丈夫！あ、もちろん先生殿の設定も決めてあるよ！"
1600903-80 = "先生殿は、「近所に住んでる可愛い女の子を見守る……と思いきや、密かに監視をしてた敵対する忍者組織のメンバー」っていう設定ね！"
1600903-81 = "日常から一転、組織間で繰り広げられる忍者同士の戦い……昨日は一緒に歩いていたのに、今は戦わなくてはいけない運命……！"
1600903-82 = "しかし心配ご無用！"
1600903-83 = "幾多の修羅場を乗り越えた末に、なんと二人は……！？"
1600903-84 = "と、まあエンディングは秘密だけど。ふふっ……このコンテンツが成功すれば、「少女忍法帖ミチルっち」のチャンネル登録者数も跳ね上がるはず！"
1600903-85 = "[s] \"が、頑張って……！\""
1600903-86 = "さ、とにかく始めよう先生殿！"
1600903-87 = "[s] \"あの、ミチル、その前にお昼ご飯を……。\""
1600903-92 = "ほらほら、忍者は待ってくれないよ！目指せ、チャンネル登録者数100名！"
1600903-94 = "（そうやってミチルに連れられ、忍者コンテンツを撮るため外へと出かけることになり……）"
1600903-95 = "（今回もカップ麵は、驚くほど伸びてしまった）"
