[translation]
1600903-1 = "A garota ninja é imparável"
1600903-2 = "（Por volta do meio-dia――）"
1600903-6 = "[ns] \"Vou aproveitar para almoçar agora...\""
1600903-8 = "[ns] \"Só preciso esperar 3 minutos...\""
1600903-10 = "（E assim, enquanto esperava pacientemente pelo miojo ficar pronto...）"
1600903-18 = "Desculpe a demora, Sensei! Michiru, apresentando-se!!"
1600903-22 = "[ns1] \"Ué, que rápido.\"\n[ns2] \"Você não disse que viria à tarde?\""
1600903-23 = "Um ninja sempre pega os outros de surpresa, Sensei!"
1600903-24 = "Um ninja sempre pega os outros de surpresa, Sensei!"
1600903-25 = "E então, não estou parecendo muito uma ninja agora!?"
1600903-26 = "[s] \"Talvez... seja?\""
1600903-27 = "Nossa, que reação sem graça! Isso fere um pouco! Ninjas são sensíveis, sabia!?"
1600903-28 = "[s] \"Seres como ninjas são complicados...!\""
1600903-29 = "Ah, talvez fosse melhor colar um adesivo de \"Cuidado ao manusear\" em mim!"
1600903-30 = "Mas diga, Sensei. Almoçando miojo de novo hoje?"
1600903-31 = "Se continuar comendo tanto miojo assim, um dia você vai se arrepender, viu?"
1600903-32 = "[s] \"Arrepender...?\""
1600903-33 = "Pois é. O equilíbrio nutricional vai pro espaço, faz mal pro corpo e é fácil ter aftas, sabe?"
1600903-34 = "Além disso, você começa a ter dificuldade para dormir..."
1600903-35 = "Uma vez que isso acontece, você passa a noite inteira navegando no mar da internet, discutindo com gente que menospreza ninjas, ou assistindo a vídeos de canais aleatórios sem motivo nenhum..."
1600903-36 = "A qualidade do seu sono despenca e você acaba se arrependendo de manhã, entende?"
1600903-37 = "Por isso, comida instantânea é praticamente um tabu para um ninja!"
1600903-38 = "[s3] \"Miojo, que assustador...\".\n[s4] \"Que observação detalhada, hein.\""
1600903-39 = "Bem, é por experiência própria. Eu estava com um sono hoje de manhã..."
1600903-40 = "Bem, é por experiência própria. Eu estava com um sono hoje de manhã..."
1600903-41 = "[s] \"Não era um tabu!?\""
1600903-42 = "Não se preocupe com detalhes!"
1600903-43 = "De qualquer forma, se você está almoçando... significa que o trabalho já acabou, né!?"
1600903-44 = "[s] \"Não, na verdade ainda nem começou...\""
1600903-45 = "Vou lhe contar o motivo de eu ter aparecido hoje, até mesmo avisando antes."
1600903-46 = "...Ué, será que é melhor esperar mais? Falta um pouco de estilo? Devo fazer um suspense maior?"
1600903-47 = "Quase esqueci... O que é importante para um ninja é o ritmo, a atmosfera, a oratória,"
1600903-48 = "e a emboscada!"
1600903-49 = "[s] \"Acho que a última não tem nada a ver!\""
1600903-50 = "Espere um pouco, Sensei. Vou organizar meus pensamentos."
1600903-51 = "Hum..."
1600903-52 = "Hummm..."
1600903-53 = "Primeiro, uma respiração profunda, suuuuuuuuuuuuu..."
1600903-54 = "...Tosse! Tosse, tosse!!"
1600903-55 = "[s] \"...Você está bem?\""
1600903-56 = "I-isso não aconteceu! Esqueça! Bem... já organizei meus pensamentos."
1600903-57 = "Sensei... por favor, ouça sem se surpreender."
1600903-58 = "Eu mantive isso em segredo até agora, mas..."
1600903-59 = "Na verdade, eu... sou a presidente do \"Clube de Pesquisa de Ninjutsu\", a organização dos ninjas que vivem nas sombras."
1600903-60 = "Sinto muito por ter escondido isso até agora...!"
1600903-61 = "[s5] \"A propósito, Michiru, você disse \"a noite inteira na internet\" agora pouco...\".\n[s6] \"O quê!? Eu não tinha notado nada até agora...!\""
1600903-62 = "O rumo da conversa mudou de repente!?"
1600903-63 = "Era para ser um desenvolvimento emocionante, tipo \"a garota fofa que mora perto é, na verdade, a líder de uma organização lendária\"!?"
1600903-64 = "[s7] \"Não entendo muito bem isso, mas... a noite inteira na internet, e o dever de casa, como fica?\""
1600903-65 = "Droga, não caiu na minha conversa...!"
1600903-66 = "O dever de casa, bem... eu acho que fiz, ou talvez não, é um Schrödinger..."
1600903-67 = "E-enfim, mudando de assunto! O motivo de eu estar falando sobre isso é..."
1600903-68 = "Hehe, como esperado do Sensei, você entrou na brincadeira!"
1600903-69 = "Talvez eu já possa te chamar de aprendiz de Chunin! Pode estufar o peito de orgulho!"
1600903-70 = "[s8] \"S-sim... m-muito obrigado?\""
1600903-71 = "Então, o que eu ia tentar fazer agora é aquele tipo de enredo de \"a garota fofa que mora na vizinhança é, na verdade, a líder de uma organização lendária\"."
1600903-72 = "O motivo de eu ter começado a falar disso de repente é..."
1600903-73 = "É sobre a continuação da criação de vídeos de antes! Os vídeos de hoje em dia exigem um \"conceito\"."
1600903-74 = "Dizem que vídeos mais curtos com esse tipo de conceito costumam ter mais visualizações!"
1600903-75 = "Passei a noite em claro ontem assistindo a vídeos com vários conceitos..."
1600903-76 = "Ah, eu também fiz um pouquinho do dever de casa!"
1600903-77 = "Enfim, eu quero gravar um vídeo assim para o \"Diário Ninja da Michiru-chi\"!"
1600903-78 = "[s] \"Não seria melhor você dormir um pouco primeiro...?\""
1600903-79 = "Está tudo bem, tudo bem! Ah, é claro que eu já defini o papel do Sensei também!"
1600903-80 = "O papel do Sensei é: \"Aquele que parece estar apenas cuidando da garota fofa que mora na vizinhança... mas que, na verdade, é um membro de uma organização ninja inimiga que a vigiava secretamente\"!"
1600903-81 = "Uma mudança repentina do cotidiano para uma batalha entre ninjas de organizações rivais... Ontem vocês caminhavam juntos, mas agora estão destinados a lutar um contra o outro...!"
1600903-82 = "Mas não se preocupe!"
1600903-83 = "Depois de superarem inúmeras situações perigosas, os dois acabam...!?"
1600903-84 = "Bem, o final é segredo. Hehe... se esse conteúdo for um sucesso, o número de inscritos no canal \"Diário Ninja da Michiru-chi\" vai disparar!"
1600903-85 = "[s] \"B-boa sorte...!\""
1600903-86 = "Certo, vamos começar logo, Sensei!"
1600903-87 = "[s] \"Ei, Michiru, antes disso, o almoço...\""
1600903-92 = "Vamos, vamos, os ninjas não esperam por ninguém! Rumo aos 100 inscritos no canal!"
1600903-94 = "(Assim, sendo arrastado pela Michiru, acabei saincendo para gravar o conteúdo ninja...)"
1600903-95 = "(Desta vez também, o macarrão instantâneo ficou incrivelmente empapado)"
