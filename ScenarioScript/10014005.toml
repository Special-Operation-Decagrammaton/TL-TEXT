[translation]
10014005-1 = "Prólogo; Algo que quero discutir com o Sensei"
10014005-5 = "……Alô?"
10014005-6 = "Ah, realmente funcionou."
10014005-7 = "Então…… Sensei, você está no Schale agora?"
10014005-8 = "[s1] \"Ué, essa voz é……?\"\n[s2] \"Por acaso é alguém do Clube de Doces depois da aula……?\""
10014005-13 = "……Ah, desculpa. Liguei e nem te cumprimentei. #nSinto muito."
10014005-14 = "Sou aluna do primeiro ano da Academia Trinity. #nSou a Kyoyama Kazusa, do Clube de Doces depois da aula."
10014005-15 = "Ah…… bem, é que……"
10014005-16 = "Haa…… como eu deveria dizer isso……."
10014005-17 = "Sensei, você tem um tempo? #nSe puder…… podemos nos encontrar agora?"
10014005-18 = "O lugar é…… perto da passagem de nível. #nVou tirar uma foto e te enviar."
10014005-19 = "[s3] \"De repente, a sós!?\"\n[s4] \"Tudo bem, mas…… o que houve?\""
10014005-23 = "……Hmm. #nAcho que comecei a entender o que todo mundo dizia."
10014005-24 = "Bem, diferente de certas pessoas, eu entendo uma piada."
10014005-25 = "Hmm…… bem, não é nada tão importante, mas……."
10014005-26 = "É que…… eu tenho algo para discutir com o Sensei."
10014005-27 = "Mas, como nunca pedi conselhos antes, não sabia como fazer……."
10014005-28 = "Então…… por enquanto, entrei em contato assim."
10014005-29 = "……É isso."
10014005-30 = "Se eu fiz algo estranho, ou se você estiver ocupado…… me desculpe."
10014005-31 = "[s5] \"Obrigado por me ligar.\"\n[s6] \"Ajudar os alunos é o meu trabalho, não se preocupe.\""
10014005-32 = "S-sério?"
10014005-33 = "S-sério?"
10014005-34 = "……Que bom."
10014005-35 = "Obrigada, Sensei. #nFiquei um pouco mais aliviada em ouvir isso."
10014005-36 = "Mas, como eu nunca entrei em contato antes, pedir ajuda só nessas horas…… #nme deixa um pouco desconfortável……."
10014005-37 = "Como compensação, deixe-me pagar uma bebida para você. #nAssim eu me sinto mais à vontade também."
10014005-38 = "……Hm?"
10014005-39 = "Ah…… sobre o que eu quero discutir?"
10014005-40 = "Hmm…… é verdade…… acho que o Sensei deveria estar ciente da situação também……."
10014005-41 = "Bem…… é que…… resumindo……."
10014005-42 = "Eu…… ultimamente……."
10014005-44 = "Parece que estou sendo perseguida por um stalker."
10014005-46 = "#video;10014"
