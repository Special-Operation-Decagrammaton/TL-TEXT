[translation]
10014005-1 = "プロローグ;先生に相談したいこと"
10014005-5 = "……もしもし？"
10014005-6 = "あ、本当に繋がるんだ。"
10014005-7 = "その……先生、今シャーレにいる？"
10014005-8 = "[s1] \"あれ、この声は……？\"\n[s2] \"もしかして放課後スイーツ部の……？\""
10014005-13 = "……あ、ごめん。自分からかけておいて挨拶してなかったね。#nすみません。"
10014005-14 = "トリニティ総合学園1年生。#n放課後スイーツ部の[ruby=きょうやま]杏山[/ruby]カズサです。"
10014005-15 = "あー……えっと、その……"
10014005-16 = "はぁ……これどう言えばいいんだろ……。"
10014005-17 = "先生、時間大丈夫？#nよかったらちょっと……今から会える？"
10014005-18 = "場所は……踏切のあたり。#n写真撮って送るね。"
10014005-19 = "[s3] \"急に二人きりに！？\"\n[s4] \"いいけど……どうしたの？\""
10014005-23 = "……ふぅん。#nみんなが言ってた事、ちょっと分かってきたかも。"
10014005-24 = "まぁ、誰かさんと違って、私は冗談が通じる方だけどさ。"
10014005-25 = "んー……まぁ、そんな大したことじゃないんだけど……。"
10014005-26 = "その……先生に相談したいことがあって。"
10014005-27 = "でも、今まで相談とかした事なかったから、どうすればいいか分からなくて……。"
10014005-28 = "それで……とりあえずこうして連絡したの。"
10014005-29 = "……その。"
10014005-30 = "何かやり方がおかしかったり、先生が忙しいとかだったら……すみません。"
10014005-31 = "[s5] \"電話してくれてありがとう。\"\n[s6] \"生徒を助けるのが私の仕事だから気にしないで。\""
10014005-32 = "そ、そう？"
10014005-33 = "そ、そう？"
10014005-34 = "……よかった。"
10014005-35 = "ありがとう先生。#nそう言ってくれて、少し安心した。"
10014005-36 = "でも、今まであんまり連絡してこなかったのに、こういう時だけ頼るのは……#nちょっと嫌だから……。"
10014005-37 = "代わりといっては何だけど、飲み物くらいは奢らせて。#nそっちの方が私も気が楽だし。"
10014005-38 = "……ん？"
10014005-39 = "ああ……相談内容？"
10014005-40 = "うーん……そうだね……先生も事態を把握しておいたほうがいいだろうし……。"
10014005-41 = "まぁ……その……簡単にいうと……。"
10014005-42 = "私……最近……。"
10014005-44 = "ストーカー……されてるみたいで。"
10014005-46 = "#video;10014"
