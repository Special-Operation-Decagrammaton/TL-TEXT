[translation]
1003605-1 = "Dentro do arbusto"
1003605-2 = "Interior da Catedral de Trinity"
1003605-3 = "（Imaginando Hinata se esforçando, e pensando que ela ainda poderia estar por aqui, decidi dar uma passada na catedral de Trinity.）"
1003605-4 = "（Dentro do espaço amplo, não há sinal de nenhum aluno.）"
1003605-8 = "（Em um canto, vi uma porta entreaberta.）"
1003605-9 = "[s1] （Sinto um certo déjà vu...）\n[s2] Abrir a porta e entrar."
1003605-15 = "Parque atrás da Catedral de Trinity"
1003605-16 = "（O outro lado dá para os fundos da catedral, e um parque espaçoso surgiu diante dos meus olhos.）"
1003605-17 = "（Em um canto do parque, vejo Hinata cuidando das árvores.）"
1003605-18 = "Fun-fu-fun~, fun-fun-fu~n♪"
1003605-19 = "……？"
1003605-20 = "Ué, Sensei...?"
1003605-21 = "[s] \"Hinata, bom dia.\""
1003605-22 = "Ah, sim! Bom dia..."
1003605-23 = "……？"
1003605-24 = "Se-Sensei, por que você está aqui...? Normalmente, pessoas de fora não podem entrar nesta área..."
1003605-25 = "……。"
1003605-26 = "Além disso, sinto um certo déjà vu..."
1003605-27 = "I-isso não é coisa da minha cabeça... é?"
1003605-28 = "[s3] \"Sim, concordo.\"\n[s4] \"De qualquer forma, eu fechei a porta, então está tudo bem agora.\""
1003605-29 = "E-eu sabia! Deixei a porta aberta de novo...!"
1003605-30 = "E-eu sabia! Deixei a porta aberta de novo...!"
1003605-31 = "Ugh, cometi o mesmo erro de novo..."
1003605-32 = "[s5] \"Bem, essas coisas acontecem.\"\n[s6] Consolar Hinata."
1003605-33 = "Por que eu sou assim..."
1003605-34 = "Por que eu sou assim..."
1003605-35 = "Ah, falando nisso, obrigado por fechar a porta para mim."
1003605-36 = "Sempre acabo sendo salva pelo Sensei..."
1003605-37 = "Sério, não sei como agradecer..."
1003605-38 = "……Ah, sim. Como eu havia avisado, estava cuidando da manutenção do parque."
1003605-39 = "……? Bem, sim. Esta área também é minha responsabilidade."
1003605-40 = "Não é só dentro da catedral, meu papel inclui várias coisas ao redor..."
1003605-41 = "Ah, mas não se preocupe! Tenho me esforçado para descansar mais do que antes."
1003605-42 = "Quando tenho muito trabalho, peço ajuda para outras pessoas... Sinto que, comparado a antes, estou muito mais... tranquila."
1003605-43 = "……É graças ao Sensei e a todos vocês."
1003605-44 = "O trabalho de hoje não era nada demais, por isso estou sozinha."
1003605-45 = "Sinto que meu coração está em paz. Talvez eu tenha mudado um pouco...!"
1003605-46 = "Então, hum..."
1003605-52 = "……！？"
1003605-53 = "[s7] \"……Ah. Não é bom eu estar aqui.\"\n[s8] Esconder-se rapidamente no arbusto próximo."
1003605-61 = "Irmã Hinata? Está por aí?"
1003605-62 = "Ué, ela deveria ter vindo para cá..."
1003605-63 = "Pois é, ouvimos a voz dela agorinha..."
1003605-64 = "Hum, para onde será que ela foi...?"
1003605-66 = "Hum..."
1003605-67 = "I-isso é um problema. Não esperava que alguém viesse aqui a esta hora..."
1003605-68 = "E-então, Sensei..."
1003605-69 = "Este arbusto é mais apertado do que parece..."
1003605-73 = "……? Algo se moveu...?"
1003605-74 = "S-sério...?"
1003605-75 = "A-ah, fomos descobertos...!?"
1003605-76 = "[s9] \"...Pensando bem, a Hinata não precisava ter se escondido, né?\"\n[s10] \"Acho que só eu precisava me esconder...?\""
1003605-77 = "..."
1003605-78 = "..."
1003605-79 = "...Ué?"
1003605-80 = "V-verdade, você tem razão..."
1003605-81 = "Como eu pensei, ouvi uma voz vindo daquele arbusto..."
1003605-82 = "Ugh, eles estão vindo para cá mesmo...!"
1003605-83 = "B-bem, vou sair logo daqui então!?"
1003605-89 = "B-boa tarde...!"
1003605-90 = "A-aconteceu alguma coisa...?"
1003605-91 = "I-Irmã Hinata, por que você estava dentro do arbusto...?"
1003605-92 = "Ah, é que... eu achei aquela planta um pouco interessante, hehe..."
1003605-93 = "A-ah, entendo..."
1003605-94 = "A-a propósito, o que você deseja!? Tem algo em que eu possa ajudar...!?"
1003605-95 = "P-pode pedir qualquer coisa! Onde é? Para onde eu devo ir? Vamos agora mesmo!!"
1003605-96 = "Ah, então, por favor..."
1003605-97 = "Na verdade, precisamos mudar a posição das estantes na catedral e eu gostaria de pedir sua ajuda..."
1003605-98 = "E-entendido! Pode deixar comigo, claro! Se eu puder ajudar, farei o quanto for preciso!"
1003605-103 = "(...)"
1003605-104 = "[ns] \"...\""
1003605-106 = "[ns] Decidi ir embora antes que me notassem."
1003605-108 = "(Saí silenciosamente do parque e voltei para o Schale)"
