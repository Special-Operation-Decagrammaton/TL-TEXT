[translation]
1003605-1 = "茂みの中で"
1003605-2 = "トリニティ聖堂内部"
1003605-3 = "（ヒナタが頑張る姿を想像しながら、まだこっちにいるかもしれないと思い、一旦トリニティの聖堂に立ち寄った）"
1003605-4 = "（広々とした空間の中、生徒たちの姿は見当たらない）"
1003605-8 = "（片隅の方に、ほんの少しだけ開いた扉が見えた）"
1003605-9 = "[s1] （なんだかデジャヴが……）\n[s2] 扉を開けて入ってみる。"
1003605-15 = "トリニティ聖堂裏側の公園"
1003605-16 = "（向こう側は聖堂の裏手に繋がっており、広い公園が目に飛び込んできた）"
1003605-17 = "（その公園の一角で、木の手入れをしているであろうヒナタの姿が見える）"
1003605-18 = "ふんふふん～、ふんふんふ～ん♪"
1003605-19 = "……？"
1003605-20 = "あれ、先生……？"
1003605-21 = "[s] \"ヒナタ、おはよう。\""
1003605-22 = "あ、はい！おはようございま……"
1003605-23 = "……？"
1003605-24 = "せ、先生、どうしてここに……？ここは普通、内部の方以外は入って来られない場所なのですが……。"
1003605-25 = "……。"
1003605-26 = "それに何だか、デジャヴと言いますか……。"
1003605-27 = "き、気のせい……ではない、ですよね？"
1003605-28 = "[s3] \"うん、同感。\"\n[s4] \"とりあえず扉は閉めてきたから、今は大丈夫。\""
1003605-29 = "や、やっぱりそうですよね！？また私、扉を開けっ放しのまま……！"
1003605-30 = "や、やっぱりそうですよね！？また私、扉を開けっ放しのまま……！"
1003605-31 = "うぅ、またしても同じミスを……。"
1003605-32 = "[s5] \"まあ、そういうこともあるよ。\"\n[s6] ヒナタを慰める。"
1003605-33 = "どうして私はこう……。"
1003605-34 = "どうして私はこう……。"
1003605-35 = "あ、そういえば扉を閉めてくださったんですよね、ありがとうございます。"
1003605-36 = "いっつも先生に助けられてばっかりです……。"
1003605-37 = "本当に、どうお礼をすれば良いのか……。"
1003605-38 = "……あ、はい。連絡させていただいた通り、公園の管理のお仕事をしていました。"
1003605-39 = "……？えっと、そうですね。ここも私の担当です。"
1003605-40 = "聖堂の中だけではなくって、周囲の諸々を含めての役割……という感じでして。"
1003605-41 = "あ、ですがご心配なく！以前より、ちゃんと休むようにはなりましたから。"
1003605-42 = "仕事が多い時には、他の方に頼んだりもしますし……以前よりずっと、こう……気持ちが楽になりました。"
1003605-43 = "……先生と、みなさんのおかげです。"
1003605-44 = "今日の作業は本当に大したことではなかったので、それでひとりなんです。"
1003605-45 = "こう、心が落ち着いたと言いますか。私も少し、変われた感じがするかもです……！"
1003605-46 = "それで、あの……"
1003605-52 = "……！？"
1003605-53 = "[s7] \"……あ。私ここにいるとマズいんだった。\"\n[s8] 素早く付近の茂みに隠れる。"
1003605-61 = "シスターヒナタ？いらっしゃいませんかー？"
1003605-62 = "あれ、こちらに来ていたはずですが……？"
1003605-63 = "そうですね、先ほど声も聞こえてましたし……。"
1003605-64 = "えっと、どこに行かれたのでしょうか……？"
1003605-66 = "えっと……。"
1003605-67 = "こ、困りましたね。まさかこの時間に、ここを訪れる方がいらっしゃるとは……。"
1003605-68 = "そ、その、先生……。"
1003605-69 = "この茂み、思ったよりも狭くて……。"
1003605-73 = "……？何か動いたような……？"
1003605-74 = "そ、そうでしたか……？"
1003605-75 = "ば、バレてしまいました……！？"
1003605-76 = "[s9] \"……よく考えると、ヒナタは隠れなくても良いのでは？\"\n[s10] \"私だけ隠れれば良かったような……？\""
1003605-77 = "……。"
1003605-78 = "……。"
1003605-79 = "……あれ？"
1003605-80 = "た、確かにそうですね……。"
1003605-81 = "やはり、そこの茂みから声が……。"
1003605-82 = "うぅ、やっぱりこちらの方に……！"
1003605-83 = "と、とりあえず出ますね！？"
1003605-89 = "ご、ごきげんよう……！"
1003605-90 = "ど、どうかされましたか……？"
1003605-91 = "し、シスターヒナタ、どうして茂みの中から……？"
1003605-92 = "えっと、ちょっと気になる草だったので、えへへ……。"
1003605-93 = "そ、そうでしたか……。"
1003605-94 = "とっ、ところでどんなご用件ですか！？何か私にお手伝いできることが……！？"
1003605-95 = "な、何でも大丈夫ですよ！どこですか？どこに行けば良いでしょうか？今すぐ行きましょう！！"
1003605-96 = "えっと、それではぜひ……。"
1003605-97 = "実は、聖堂の本棚の位置を変えなくてはならなくて、お手伝いをお願いしたく……。"
1003605-98 = "な、なるほど！もちろんお任せください！私でよければいくらでも！"
1003605-103 = "（……）"
1003605-104 = "[ns] \"……。\""
1003605-106 = "[ns] とりあえず、バレないように帰ることにした。"
1003605-108 = "（静かに公園を抜け出し、シャーレへと戻った）"
