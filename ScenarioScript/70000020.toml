[translation]#[Texto Final. - Filipe 08/07.]
70000020-1 = "Encontro Suspeito (2)"
70000020-2 = "(――E assim, o intercâmbio entre o gabinete de Red Winter e o Pandemônio começou)"
70000020-6 = "Kikiki! Viu isso, presidente?#nDesta vez, o índice de aprovação do nosso Pandemônio bateu um novo recorde negativo!"
70000020-15 = "(Makoto-senpai…… tá tentando recuperar o prestígio que perdeu, se esforçando muito)"
70000020-16 = "Parece que você não entendeu nada, né?#nVou te explicar."
70000020-17 = "A maioria das alunas não entende nada de política!#nOu seja, é mais fácil controlar as pessoas quando elas não pensam sobre política do que quando pensam!"
70000020-18 = "Essa taxa de participação de 3,8% prova que nosso poder é inabalável!"
70000020-20 = "Que besteira, presidente.#nCom um plano tão frágil desses, você vai acabar tropeçando nos próprios pés."
70000020-21 = "Tomoe, diga aí qual foi a taxa de participação da última eleição geral de Red Winter."
70000020-22 = "300%, presidente."
70000020-24 = "Q-quê!?"
70000020-25 = "Entendeu agora, presidente?#nEm matéria de números, quanto maior, melhor!"
70000020-26 = "Se querem competir com a Academia Federal Red Winter, é melhor ter esse nível de apoio!"
70000020-27 = "M-mas que horror!!#nPerder até em índice de aprovação……"
70000020-28 = "………………"
70000020-33 = "Argh, estou sendo menosprezada……!?#nEu, a presidente do Pandemônio, a Makoto-sama……!!"
70000020-34 = "……Já que seu plano falhou, não temos mais motivos pra ficar aqui, né?#nVamos, senpai. Hora de ir."
70000020-35 = "A-ainda não!#nIr embora depois de ser humilhada por Red Winter…… eu nunca aceitaria isso……"
70000020-36 = "……Hã?"
70000020-43 = "I-isso é……"
70000020-45 = "Hmm. Percebeu, presidente."
70000020-50 = "S-secretária-geral……?"
70000020-57 = "É um retrato que simboliza minha autoridade."
70000020-58 = "Você ficou encantado com minha figura imponente, não foi?#nDá vontade de prestar homenagem, não dá?"
70000020-59 = "Não, nem um pouco……"
70000020-63 = "(Mas dá pra chamar isso de 'ela mesma'?)"
70000020-64 = "(Pra começar, o gênero é diferente……)"
70000020-67 = "Parece que você não tem olho pra arte."
70000020-68 = "Pintura é o básico da propaganda.#nE o presidente do Pandemônio não sabe disso……"
70000020-69 = "Hahaha, o futuro de Gehenna é sombrio!"
70000020-70 = "O que foi?"
70000020-71 = "Senpai…… se você brigar aqui, tudo vai por água abaixo."
70000020-72 = "Primeiro, se acalme.#nVocê vai acabar mostrando como é mesquinha."
70000020-74 = "Hmm. Não se ofenda com piadinhas, presidente."
70000020-75 = "Mesmo que você seja mesquinha, uma presidente tão grandiosa quanto eu não se importa com isso!"
70000020-76 = "Já que estamos aqui, que tal fazermos uma lembrancinha para marcar a amizade entre Gehenna e Red Winter?"
70000020-77 = "Isso mesmo…… qual é a sua convicção, ou seu lema, presidente?"
70000020-83 = "Convicção…… lema……?"
70000020-84 = "Makoto-senpai, você não falou isso antes?"
70000020-85 = "Naquela vez que comeu o pudim da geladeira……"
70000020-88 = "Hã? Pudim?"
70000020-89 = "Kikikiki.#nAh, sim, eu comi."
70000020-90 = "E daí? Achou que eu ia me desculpar?"
70000020-91 = "Não é questão de desculpa……"
70000020-92 = "Sabendo como a Makoto-senpai é, nem me surpreendo."
70000020-93 = "Kikikiki. Presta atenção, Iroha. No dicionário da Makoto-sama não existe arrependimento nem remorso."
70000020-94 = "Uma presidente do Pandemônio não precisa dessas coisas, não é mesmo?"
70000020-95 = "Esta Hanuma Makoto――"
70000020-96 = "Nunca me arrependo de nada!"
70000020-97 = "Ah, sim……"
70000020-99 = "……Hmm, digno de uma presidente do Pandemônio."
70000020-100 = "Comer o pudim dos outros assim……#nque cara de pau. Admirável, Makoto."
70000020-101 = "É, gostei de você!"
70000020-102 = "Tomoe, chame o melhor artesão de Red Winter!"
70000020-103 = "Sim, secretária-geral."
70000020-104 = "Vamos dar a você um presente à altura de sua figura corajosa!"
70000020-106 = "(Como essa conversa chegou até aqui……)"
70000020-108 = "(Alguns dias depois, no portão de Gehenna)"
70000020-114 = "……Ako, isso é?"
70000020-115 = "Parece que o Pandemônio recebeu uma estátua de Red Winter……"
70000020-116 = "Essa é a Makoto…… né?"
70000020-121 = "………………"
70000020-128 = "(A estátua com o punho erguido para o céu desapareceu sem deixar vestígios, ao som do disparo da Destruidora)"
70000020-129 = "Relatório de Patrulha de Red Winter – Pandemônio"
70000020-141 = "Tcharã! É a Ibuki!"
70000020-142 = "Bom dia!#nFufun, plim plim~♪"
70000020-143 = "……!"
70000020-144 = "I-Ibuki…… é que……"
70000020-145 = "E-espera, Ibuki……!"
70000020-147 = "Ué……?#nCadê o pudim da Ibuki……?"
70000020-148 = "Ibuki…… não pode comer pudim? Ibuki foi uma garota má?"
70000020-149 = "Claro que não.#nA culpa é toda……"
70000020-150 = "I-Ibuuukiiii! Fui eu! Eu errei!!#nSem saber que era seu pudim, eu…… fui eu queee——!!!"
70000020-151 = "Desculpa, Ibukiiii——!!! Por favor, me perdoa!!!"
70000020-152 = "Haa……"