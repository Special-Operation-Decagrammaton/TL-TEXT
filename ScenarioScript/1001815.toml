[translation]
1001815-1 = "Memórias brilhantes"
1001815-2 = "（Eu e Yuzu estávamos conversando sobre revistas antigas de jogos, mas...）"
1001815-3 = "（Quando percebi, já estávamos organizando a estante e, no fim, limpando toda a sala do clube）"
1001815-5 = "Sala do Clube de Desenvolvimento de Jogos"
1001815-6 = "Eu só queria verificar o conteúdo da revista, mas..."
1001815-7 = "Sem perceber, chegamos a esse ponto...#nDesculpe por te envolver nisso..."
1001815-8 = "[s] \"Tudo bem, eu tinha tempo livre mesmo.\""
1001815-12 = "[ns] \"Mas, nossa, que quantidade enorme de jogos.\""
1001815-13 = "S-sim..."
1001815-14 = "Fomos colecionando como material de referência para o desenvolvimento de jogos e, quando vi..."
1001815-15 = "A maioria são jogos de consoles antigos, mas..."
1001815-20 = "[ns] \"...Hm?\""
1001815-21 = "A-aconteceu alguma coisa?"
1001815-22 = "[ns1] \"O que é isso...?\"\n[ns2] \"Um disco de jogo?\""
1001815-25 = "...?"
1001815-26 = "Tem algo escrito na capa?"
1001815-27 = "[s] \"...Está escrito 'Yuzu'.\""
1001815-28 = "E-eh?#nM-meu nome...!?"
1001815-29 = "O-o que será..."
1001815-30 = "...Ah."
1001815-31 = "[s3] \"Se você não se lembra...\"\n[s4] \"Então, vamos verificar no computador--\""
1001815-34 = "E-espere um pouco, por favor!"
1001815-35 = "Eu verifico primeiro...!"
1001815-36 = "[s] \"A-aconteceu alguma coisa?\""
1001815-37 = "Isso é, bem..."
1001815-38 = "N-não sei o que tem dentro..."
1001815-39 = "Uuu, se eu ao menos me lembrasse..."
1001815-43 = "D-desculpe, é que...#nEnquanto eu verifico, você poderia esperar fora da sala do clube...?"
1001815-44 = "[s] \"Vou ficar de costas, tudo bem?\""
1001815-45 = "N-não pode...!"
1001815-48 = "（Fui expulso da sala do clube）"
1001815-50 = "（10 minutos depois...）"
1001815-51 = "D-desculpe pela espera..."
1001815-52 = "...Já está tudo bem."
1001815-54 = "D-desculpe por agora há pouco..."
1001815-55 = "[s5] \"Sem problemas, pode ser algo pessoal.\"\n[s6] \"A propósito, o que era...?\""
1001815-58 = "N-não era nada tão urgente assim."
1001815-59 = "Embora fosse algo importante..."
1001815-60 = "[s] \"Algo importante?\""
1001815-61 = "Era o primeiro jogo que fiz...#no disco mestre dourado de 'Tales Saga Chronicle Prototype'."
1001815-62 = "...Sobre o disco mestre dourado?"
1001815-63 = "Ah, desculpe..."
1001815-64 = "Bem... chamamos o disco mestre que contém a versão final de 'Golden Master'."
1001815-65 = "Antigamente, ao fabricar discos de vinil,#ncolavam folhas de ouro no disco para aumentar a durabilidade--"
1001815-66 = "Por isso, a versão mestre que contém a versão final do jogo#npassou a ser chamada de 'Golden Master'."
1001815-67 = "Claro que hoje em dia não usamos folhas de ouro..."
1001815-68 = "Antes de subir 'Tales Saga Chronicle Prototype' na rede...#nfoi este disco que usei para copiar os dados pela última vez."
1001815-69 = "Naquela época, só de olhar para ele eu sentia pavor... e tentei desesperadamente escondê-lo no fundo da caixa..."
1001815-70 = "Hoje em dia... eu até tinha esquecido da existência dele."
1001815-71 = "[s] \"...Está tudo bem agora?\""
1001815-72 = "……Sim."
1001815-73 = "Não é que eu tenha me acostumado com as críticas e os comentários maldosos……"
1001815-74 = "Mas, mais do que isso…… eu criei muitas lembranças boas."
1001815-75 = "O fato de os membros atuais terem se reunido também foi graças à publicação do protótipo."
1001815-76 = "Se eu não tivesse criado o jogo, acho que não teria passado por dias tão brilhantes e radiantes como estes……"
1001815-77 = "Por isso, agora, sinto que posso encarar este disco…… de frente."
1001815-78 = "[s7] \"……Entendo.\"\n[s8] \"Então se tornou uma lembrança preciosa, não é?\""
1001815-81 = "……Sim, é a minha única lembrança gloriosa."
1001815-82 = "Sensei, você nunca jogou o protótipo de 'Tales Saga Chronicle', certo?"
1001815-83 = "Se não se importar…… gostaria de jogar?"
1001815-84 = "[s] \"Posso mesmo!?\""
1001815-85 = "Então, vamos começar……"
1001815-90 = "Ah, ahaha…… não está otimizado, então está lento……"
1001815-94 = "Erro!? P-por que……"
1001815-95 = "<Aviso: Carga anormal detectada na CPU>"
1001815-96 = "<Escaneando…… Dados desconhecidos confirmados>"
1001815-97 = "<Deletando a parte correspondente>"
1001815-98 = "N-não apague as minhas lembranças――!"
1001815-100 = "(Graças à rápida intervenção de Yuzu, os dados não foram apagados……)"
1001815-101 = "(A jogatina de 'Tales Saga Chronicle: Prototype' ficou para uma próxima oportunidade……)"
