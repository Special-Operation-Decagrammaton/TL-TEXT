[translation]
10046150-3 = "Iahô☆"
10046150-4 = "Mika-sama!?"
10046150-5 = "Ouvi dizer que, como a Nagi-chan abriu a praia particular para o público, a Ichika-chan acabou ficando sobrecarregada..."
10046150-6 = "Então vim ajudar!"
10046150-10 = "……Ué, achei que você ficaria feliz."
10046150-11 = "Será que fiz algo desnecessário de novo...?"
10046150-12 = "N-não! De jeito nenhum!"
10046150-13 = "É só que... eu fiquei um pouco surpresa."
10046150-14 = "É mesmo? Que bom."
10046150-15 = "Mas, Mika-sama, você não precisa se preocupar em descansar?"
10046150-16 = "Hã? Por quê?"
10046150-17 = "Como assim por quê... patrulhar pode ser perigoso, sabe..."
10046150-18 = "……Por acaso você está preocupada comigo?"
10046150-19 = "Bem, sim... Patrulhar é importante, mas garantir a segurança de todos do Tea Party é a prioridade."
10046150-20 = "Então não tem problema!"
10046150-21 = "Apesar da aparência, eu sou bem forte!"
10046150-22 = "Ahaha... mas a patrulha serve justamente para evitar que precisemos lutar..."
10046150-23 = "Ehh~?#nO Tea Party não pode ajudar?"
10046150-27 = "……Hmm, então que tal fazermos assim?"
10046150-28 = "Vamos dizer que é apenas uma amiga da Ichika-chan ajudando."
10046150-29 = "……Não dá no mesmo?"
10046150-30 = "Ah! Você também acha?"
10046150-31 = "Haha, não acredito..."
10046150-32 = "……Não tem jeito, né."
10046150-33 = "Oh? Então isso significa...?"
10046150-34 = "Vou aceitar sua oferta, então."
10046150-35 = "Eba! Conto com você, Ichika-chan!"
