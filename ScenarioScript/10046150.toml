[translation]
10046150-3 = "やっほー☆"
10046150-4 = "ミカ様！？"
10046150-5 = "ナギちゃんがプライベートビーチの一般開放なんてするから、イチカちゃんが大変になっちゃったって聞いて――"
10046150-6 = "手伝いに来ちゃった！"
10046150-10 = "……あれ、喜んでくれると思ったのに。"
10046150-11 = "私、また余計なことしちゃった……？"
10046150-12 = "い、いえ！そんなことないっす！"
10046150-13 = "ただ……ちょっとびっくりしただけで。"
10046150-14 = "そう？よかったぁ。"
10046150-15 = "でも、ミカ様は休んでて大丈夫っすよ。"
10046150-16 = "えっ？どうして？"
10046150-17 = "どうしてもなにも……パトロールは危ないこともあるっすから……。"
10046150-18 = "……もしかして心配してくれるの？"
10046150-19 = "まあ、はい……パトロールも重要ですが、それ以上にティーパーティーの皆さんの安全確保が第一っすから。"
10046150-20 = "それなら大丈夫！"
10046150-21 = "私、こう見えて結構強いんだ！"
10046150-22 = "あはは……そもそも戦わないでもらうためのパトロールなんすけど……。"
10046150-23 = "えぇ～？#nティーパーティーは手伝っちゃダメなの？"
10046150-27 = "……んー、じゃあこうするのはどうかな？"
10046150-28 = "あくまで、[ruby=・]イ[/ruby][ruby=・]チ[/ruby][ruby=・]カ[/ruby][ruby=・]ち[/ruby][ruby=・]ゃ[/ruby][ruby=・]ん[/ruby][ruby=・]の[/ruby][ruby=・]友[/ruby][ruby=・]達[/ruby]が手伝ってるってことで。"
10046150-29 = "……同じじゃないっすか？"
10046150-30 = "あはっ！やっぱりそう思う？"
10046150-31 = "ははっ、なんすかもう……。"
10046150-32 = "……仕方ないっすね。"
10046150-33 = "おぉっ？それじゃあ……？"
10046150-34 = "お言葉に甘えさせてもらうっす。"
10046150-35 = "やったぁ！よろしくね、イチカちゃん！"
