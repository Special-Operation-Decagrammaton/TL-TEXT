[translation]
10037090-1 = "Episódio 9; Uma corrida, subindo a montanha"
10037090-4 = "――Em nome da tradição de Shanhaijing, eu denuncio a líder da Genryumon, Kisaki Ryuge!"
10037090-13 = "……！"
10037090-23 = "E-ei, espera!? Até eu...!?"
10037090-24 = "Cherino-chan, por favor, recue...!"
10037090-25 = "Ei, ei! Nós somos visitantes! O que vocês pretendem fazer, afinal!"
10037090-31 = "…Vocês me cercaram, Kaguya."
10037090-36 = "Líder!?"
10037090-38 = "Espere, Genryumon! Pergunte a si mesma!"
10037090-39 = "O que você está tentando proteger: a líder Kisaki ou Shanhaijing!"
10037090-41 = "……O que quer dizer com isso, Chefe Kaguya!"
10037090-43 = "Se vocês têm olhos e ouvidos, devem saber!#nA Genryumon é, originalmente, a organização que herda e protege as tradições de Shanhaijing!"
10037090-44 = "Mas, será que Kisaki, a líder, é realmente uma pessoa digna de proteger Shanhaijing!"
10037090-45 = "Talvez até agora fosse!#nNaquela época, a líder Kisaki era uma pessoa respeitada por todos!"
10037090-46 = "Mas e agora?#nA líder Kisaki do passado e a líder Kisaki de hoje são realmente a mesma pessoa!"
10037090-47 = "Eu não acho! Olhem! As \"mudanças\" que a atual líder Kisaki trouxe para Shanhaijing!"
10037090-52 = "Hã? N-nós...!?"
10037090-54 = "De fato... quem convidou as alunas de Red Winter para Shanhaijing foi..."
10037090-55 = "Foi a nossa líder, não foi...?"
10037090-56 = "Se essa líder não pretende proteger Shanhaijing, então...?"
10037090-58 = "Pelo visto, a Genryumon não vai se mover."
10037090-59 = "Eu esperava que concordassem com a denúncia da líder, mas parece que chegamos ao fim da linha..."
10037090-61 = "Não, isso já é o suficiente."
10037090-62 = "Acima de tudo, nosso objetivo é guiar a líder, que cometeu um erro, de volta ao caminho correto."
10037090-63 = "Isso também é... por lealdade."
10037090-64 = "Jamais se esqueçam. Não estamos nos rebelando.#nApenas demonstrando nossa lealdade."
10037090-65 = "Líder! Fuja logo! Aqui é perigoso!"
10037090-67 = "Fufu, mesmo em um momento como este, você se preocupa comigo, Saya."
10037090-68 = "Mas... se eu sair daqui, para onde exatamente eu deveria ir?"
10037090-69 = "O líder de uma organização é, essencialmente, como um sacrifício oferecido aos céus."
10037090-75 = "……O que proteger: a líder ou Shanhaijing, é..."
10037090-76 = "Hmph, isso já está decidido desde o início!"
10037090-87 = "Quem se aproximar da líder — não importa quantos sejam, eu, Mina da Guarda Real, não permitirei!"
10037090-92 = "Mina...?#nVocê também deveria fugir..."
10037090-93 = "……Você acha que eu seria capaz de fugir e deixar a líder para trás?"
10037090-97 = "Mesmo que isso signifique tornar Shanhaijing nossa inimiga, eu a protegerei até o fim."
10037090-102 = "Bela expressão, Chefe Executiva Mina."
10037090-108 = "O que é isso...?"
10037090-113 = "Eu não pretendia interferir nos assuntos de outra escola, mas..."
10037090-114 = "Não posso deixar que apenas a Chefe Executiva Mina diga falas tão legais!"
10037090-115 = "……M-Marina, a presidente do comitê?"
10037090-116 = "A líder cuidou de nós em várias ocasiões."
10037090-117 = "Retribuir o que recebemos é o que dita a razão!"
