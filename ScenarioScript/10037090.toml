[translation]
10037090-1 = "第9話;一走り、山を登りて"
10037090-4 = "――山海経の伝統の名のもと、玄龍門の門主、[ruby=りゅうげ]竜華[/ruby]キサキを糾弾するっ！"
10037090-13 = "……！"
10037090-23 = "え、ええ！？おいらまで……！？"
10037090-24 = "チェリノちゃん、後ろに下がってください……！"
10037090-25 = "お、おい！私たちは訪問客だぞ！一体何をするつもりだ！"
10037090-31 = "…[ruby=わらわ]…妾を[/ruby]包囲したのか、カグヤ。"
10037090-36 = "門主様！？"
10037090-38 = "待ちなさい、玄龍門！自らに問うがよい！"
10037090-39 = "貴殿が守ろうとするのは、キサキ門主なのか、山海経なのか！"
10037090-41 = "……何が言いたい、カグヤ部長！"
10037090-43 = "貴殿らに目と耳があるのなら分かるだろう！#n玄龍門は本来、山海経の伝統を継承し守る組織だ！"
10037090-44 = "だが、その門主であるキサキは、果たして山海経を守護するに相応しい人物だろうか！"
10037090-45 = "今まではそうだったかもしれない！#nあの時のキサキ門主は、皆から尊敬される人物であった！"
10037090-46 = "しかし今はどうだ？#n過去のキサキ門主と、今のキサキ門主は果たして同一人物であろうか！"
10037090-47 = "[ruby=わたし]私は[/ruby]そう思わぬ！見よ！今のキサキ門主が山海経にもたらした「変化」を！"
10037090-52 = "えっ？お、おいらたち……！？"
10037090-54 = "たしかに……レッドウィンターの生徒を山海経に招待したのって……。"
10037090-55 = "うちらの門主様だな……？"
10037090-56 = "その門主が、山海経を守ろうとしないのであれば……？"
10037090-58 = "やはり、玄龍門は動いてくれないのですね。"
10037090-59 = "門主の糾弾に同意してくれると思っていたのでしたが、どうやらこれまでのようです……。"
10037090-61 = "いや、これなら十分。"
10037090-62 = "なにより、私たちの目標は過ちを犯した門主様を、正しい道へと案内すること。"
10037090-63 = "これもまた……忠義の為である。"
10037090-64 = "[ruby=ゆめゆめ]努々[/ruby]忘れるな。私たちは反旗を翻すのではない。#n忠義を示すだけだ。"
10037090-65 = "門主！早く逃げるのだ！ここは危ないのだ！"
10037090-67 = "ふふ、[ruby=そなた]其方[/ruby]はこういう時でさえ、妾を心配してくれるのじゃな、サヤ。"
10037090-68 = "じゃが……此処を離れて、一体何処に行けば良いのじゃ？"
10037090-69 = "組織の長とは本来、天に捧げられる生贄のようなものじゃ。"
10037090-75 = "……守ろうとするのは、門主様か山海経か、か……。"
10037090-76 = "フッ、そんなもの最初から決まってる！"
10037090-87 = "門主様に近づく者はーーこの[ruby=このえ]近衛[/ruby]ミナが何人だろうと許さん！"
10037090-92 = "ミナ……？#n其方も逃げた方が……。"
10037090-93 = "……門主様を置いて逃げるだなんて、私にできるとお思いですか？"
10037090-97 = "山海経を敵に回してでも、最後までお守りいたします。"
10037090-102 = "いい表情だ、ミナ執行部長。"
10037090-108 = "なんだ……？"
10037090-113 = "他学園の事情に干渉するつもりはなかったが……。"
10037090-114 = "ミナ執行部長にだけ、カッコイイ台詞を言わせるわけにはいかないからな！"
10037090-115 = "……ま、マリナ委員長？"
10037090-116 = "門主様には色々と世話になった。"
10037090-117 = "もらった分は返すのが、道理というものだからな！"
