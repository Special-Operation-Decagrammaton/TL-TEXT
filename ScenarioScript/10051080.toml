[translation]
10051080-1 = "Episódio 8; Em seus respectivos lugares"
10051080-2 = "Local de sessão de fotos"
10051080-4 = "(Hieee... faz quanto tempo desde a última pausa...)"
10051080-5 = "(Estou exausta...)"
10051080-6 = "(A sessão de fotos... não vejo um fim para isso...)"
10051080-7 = "(A iluminação é tão forte que parece perfurar minha pele... e os sapatos são bonitos, mas meus pés doem de tanto usá-los...)"
10051080-8 = "(E acima de tudo, essa maquiagem... está tão pesada que minha pele não consegue respirar...)"
10051080-9 = "(Quando será que... eu poderei voltar...?)"
10051080-17 = "Como estão as coisas?"
10051080-18 = "Sim!?"
10051080-19 = "...Hum, fico feliz em saber que está tudo correndo bem."
10051080-20 = "Eh? Não, é que... sério, será que estou fazendo isso direito...?"
10051080-21 = "Eu só estou fazendo o que me pediram..."
10051080-22 = "Se você está conseguindo acompanhar, isso já é o suficiente."
10051080-23 = "Se estou conseguindo acompanhar, então..."
10051080-24 = "Ei, mas..."
10051080-25 = "Hum?"
10051080-26 = "É que... eu já posso... ir embora?"
10051080-27 = "Ir embora? Para onde?"
10051080-28 = "...Para aquele lugar chamado Clube de Ninjas ou algo assim?"
10051080-29 = "Sim, é o Clube de Pesquisa Ninjutsu..."
10051080-30 = "Ou seja, você quer voltar para onde estava antes, é isso?"
10051080-31 = "Na verdade, eu queria te perguntar: que tipo de pessoa você era lá?"
10051080-32 = "Eh...?"
10051080-33 = "Lá, quem era você? Que valor você tinha? O que te davam?"
10051080-34 = "Is-isso é..."
10051080-38 = "Olhe para isto. É a foto que tirei de você hoje."
10051080-39 = "...!"
10051080-40 = "O que acha? Mesmo que alguém não tenha senso estético, todos diriam a mesma coisa."
10051080-41 = "— Que você é linda."
10051080-42 = "..."
10051080-43 = "Tsukuyo. Você é a melhor modelo para nós."
10051080-44 = "E é exatamente por isso que você deve estar aqui.#nO seu verdadeiro valor brilha neste lugar."
10051080-48 = "Isso é... eu só estou te levando para um lugar onde o verdadeiro valor dessas roupas pode ser extraído!"
10051080-51 = "O verdadeiro... valor..."
10051080-52 = "Claro, a escolha é sua.#nFicar em um lugar \"confortável\" ou em um lugar onde você possa \"demonstrar seu verdadeiro valor\"."

10051080-53 = "Is-isso é..."
10051080-54 = "Além disso, já estou planejando um desfile de moda com você como a atração principal."
10051080-55 = "Eeeh!?"
10051080-56 = "O local será o Distrito de Hyakkiyako. Está planejado para ser um desfile comemorativo de Ano Novo."
10051080-57 = "Em um evento tão grande... eu...?"
10051080-58 = "Naturalmente. Não existe modelo mais adequada que você."
10051080-59 = "De qualquer forma, lembre-se disso. Vou seguir com o cronograma contando com isso."
10051080-63 = "Ei, espere, bem, é que...!"
10051080-70 = "Shine Cat-sama, sua refeição chegou."
10051080-71 = "...Finalmente chegou? Por que demorou tanto?"
10051080-72 = "Peço perdão. Disseram que, no caminho da entrega, foram atacados pelo Grupo Chimi..."
10051080-73 = "Francamente, essas alunas delinquentes de hoje em dia..."
10051080-74 = "Mas... não acha estranho? Não parece que ultimamente só as entregas para mim estão sendo atacadas?"
10051080-75 = "Sim, a frequência é tal que parece haver algo intencional por trás..."
10051080-76 = "Bem, tanto faz. Talvez eu só esteja sendo neurótica demais."
10051080-77 = "Então, qual é o cardápio de hoje?"
10051080-78 = "Lámen, arroz frito e guioza."
10051080-79 = "Ótimo. Depois de tanto esforço, precisamos recarregar as energias. Vamos lá."
10051080-85 = "Tsukuyo. Sua refeição está preparada na sala ao lado."
10051080-86 = "Eh...?"
10051080-87 = "Não fique tão surpresa. #nVocê também é uma modelo agora, então restrições alimentares são naturais."
10051080-88 = "Preparei macarrão de konjac zero calorias e salada, coma isso. #nNão precisa nos seguir."
10051080-89 = "Eh!? #nMas agorinha mesmo você disse que \"se eu conseguisse acompanhar, não teria problema\"...!"

10051080-90 = "Eu não disse para me seguir em momentos como este, disse!?"
10051080-91 = "Bom, aproveite sua refeição."
10051080-92 = "E então, qual lámen você reservou para mim?"
10051080-93 = "O de sempre. Preparei com macarrão fino, sem gordura e pouco apimentado."
10051080-94 = "Perfeito."
10051080-95 = "E-espere, por favor!?"
10051080-100 = "Local de filmagem do álbum de fotos"
10051080-101 = "Uuuu..."
10051080-102 = "Isso é cruel demais... #nJantar apenas macarrão de konjac e salada..."
10051080-103 = "E eles estão comendo lámen, arroz frito e até guioza..."
10051080-104 = "Além disso... não me devolveram o celular que confiscaram..."
10051080-105 = "..."
10051080-106 = "Lámen... eu quero comer..."
10051080-107 = "Junto com a chefe... com a Izuna-chan... e com o Sensei..."
10051080-108 = "Com macarrão bem grosso, cobertura de gordura suína e finalizado com óleo de pimenta..."
10051080-109 = "Porque, para um ninja, o lámen é assim..."
10051080-110 = "..."
10051080-116 = "Modelo... ou ninja..."
10051080-117 = "Será que eu realmente... levo mais jeito para ser modelo...?"
10051080-118 = "Será que me tornar uma modelo vai me fazer ser uma \"pessoa valiosa\"...?"

10051080-119 = "Será que... no Clube de Pesquisa Ninjutsu, eu era uma existência sem valor...?"
10051080-121 = "Uuu... eu não sei..."
10051080-122 = "Alguém... por favor, me dê uma resposta..."
10051080-124 = "Loja de lámen em um local de Hyakkiyako"
10051080-126 = "(Algumas horas depois, após a filmagem, visitei a loja de lámen com Michiru e Izuna)"
10051080-130 = "Ahhh... esse aroma rico de tonkotsu..."
10051080-131 = "Como esperado, nada melhor que um lámen depois de uma sessão de fotos."
10051080-132 = "A Izuna concorda! Nin-nin!"
10051080-133 = "[s] \"Hoje é por minha conta, então podem comer sem preocupações.\""
10051080-134 = "Sério!? Fufu, nesse caso, vou pedir algo um pouco mais luxuoso que o de costume!"
10051080-135 = "Chefe, um pedido, por favor!"
10051080-136 = "Sim, o que vai ser?"
10051080-137 = "Quatro lámens e uma porção de guioza."
10051080-138 = "E as coberturas do lámen serão..."
10051080-139 = "Macarrão bem grosso, cobertura de gordura suína e finalizado com óleo de pimenta. Correto?"
10051080-140 = "Eh, como você sabe disso!?"
10051080-141 = "Haha! É que vocês, ninjas, pedem sempre a mesma coisa!"
10051080-142 = "Da última vez, vocês expulsaram uns clientes problemáticos, não foi? #nComo agradecimento, transformei isso em um novo item do menu chamado \"Refeição Ninja\"!"

10051080-143 = "De agora em diante, basta pedir pela \"Refeição Ninja\" que está tudo certo!"

10051080-145 = "Ma-mas que incrível...!"
10051080-146 = "Será que o mundo finalmente começou a reconhecer os ninjas...!"
10051080-147 = "A propósito, a outra pessoa que sempre vinha com vocês vai se atrasar? #nNão estou vendo ela por aqui..."
10051080-148 = "Hã? Do que você está falando—"
10051080-149 = "Ah, é verdade... A Tsukuyo não está aqui agora..."
10051080-150 = "Chefe! Por favor, mude o pedido de 4 ramens para 3!"
10051080-152 = "Certo, entendido!"
10051080-157 = "Parece que eu pedi a parte da Tsukuyo por puro hábito..."
10051080-158 = "Eu também não tinha percebido, Izuna..."
10051080-159 = "Eu queria tanto ver a Tsukuyo..."
10051080-160 = "Ah! Falando nisso!"
10051080-161 = "Chefe! Você viu isso?"
10051080-162 = "Hm? O quê?"
10051080-163 = "Acabaram de postar um vídeo da Tsukuyo-dono!"
10051080-164 = "……!"
10051080-165 = "Vamos assistir juntas!"
10051080-166 = "Sim!"
10051080-171 = "（E assim, Michiru e Izuna ficaram assistindo ao vídeo da Tsukuyo por um tempo）"
10051080-173 = "……."
10051080-174 = "Incrível... #nEu não sabia que a Tsukuyo tinha um lado tão ousado."
10051080-175 = "E olha o número de visualizações desse vídeo..."
10051080-179 = "Ei, espera um pouco? #nEsse número de visualizações está certo mesmo!?"
10051080-180 = "Eu não estou vendo errado, estou?"
10051080-181 = "Faz só alguns minutos que foi postado e já tem tudo isso de visualizações!?"
10051080-182 = "Só esse vídeo já superou o total de visualizações do nosso canal inteiro..."
10051080-183 = "……."
10051080-184 = "Parece até... algo que aconteceu em outro mundo..."
10051080-185 = "Outro mundo, é..."
10051080-192 = "……."
10051080-193 = "Ei, Izuna."
10051080-194 = "Sim, o que foi?"
10051080-195 = "Será que a Tsukuyo... não tem mais intenção... de voltar...?"
10051080-196 = "Hein!?"
10051080-197 = "Aqui, desculpem a espera!"
10051080-198 = "Por favor, aproveitem a refeição!"
10051080-202 = "Eu estava esperando por isso, o \"Combo Ninja\"...!"
10051080-203 = "Ei, Chefe... sobre o que você disse antes..."
10051080-204 = "Por enquanto, vamos comer! #nEsquece... o que eu disse antes!"
10051080-206 = "Itadakimasu!"
10051080-207 = "Sim... i-itadakimasu!"
10051080-209 = "（Depois disso, nada de especial aconteceu, elas comeram o ramen e foram embora）"
10051080-210 = "（Mas, alguns dias depois...）"
10051080-217 = "Ah, Mestre...!"
10051080-218 = "[s] \"O que houve?\""
10051080-219 = "Bem... é que..."
10051080-220 = "A Chefe... o comportamento da Chefe está estranho...!"
