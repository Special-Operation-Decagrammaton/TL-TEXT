[translation]
10042080-1 = "第8話;結実"
10042080-2 = "……。"
10042080-3 = "……やった？"
10042080-4 = "そのセリフは、少しマズいですね……。"
10042080-8 = "私が様子を見てくる！"
10042080-9 = "先生はそこで待機してて！"
10042080-13 = "どうぞ、私の後ろへ！"
10042080-15 = "う、うぅ……。"
10042080-16 = "給食部員を一人発見！#n次は……。"
10042080-18 = "……。"
10042080-19 = "ネバネバまみれになって気絶したアコちゃんを発見。#nそれと……。"
10042080-25 = "さっきまで、あんなに大きかったのに……。"
10042080-30 = "元の大きさに戻った個体を発見。"
10042080-34 = "[ns] \"イオリ、それ危ないんじゃ！？\""
10042080-35 = "大丈夫、もう動きは止まってるし。"
10042080-36 = "たぶん……気絶してる。"
10042080-38 = "……。"
10042080-39 = "……。"
10042080-40 = "あ、アコちゃん？#nその……。"
10042080-41 = "なにも言わないでください！#nあんな醜態を晒すなんて……！"
10042080-42 = "わ、分かったよ。"
10042080-43 = "よくも……よくもやってくれましたね！"
10042080-44 = "巻きついた挙げ句、ネバネバをかけて……うぇえ……まだ口の中気持ち悪い。"
10042080-45 = "あ、あんなものに汚されてしまうなんて……もう、私……。"
10042080-46 = "[s1] \"あ、アコ？大丈夫……？\"\n[s2] \"あれはただのパンケーキソースだから……。\""
10042080-49 = "先生は黙っていてくださいっ！"
10042080-50 = "アレに復讐しなければ――"
10042080-51 = "アコちゃん、危ない！"
10042080-57 = "――んうっ！？！？"
10042080-58 = "んうぅっ！？！？んぬぅーっ！？"
10042080-59 = "[ns3] \"うわっ！アコの顔に飛びかかった……！\"\n[ns4] \"イオリの時と同じ……！？\""
10042080-65 = "うっ、なんだかデジャブ……。"
10042080-66 = "……あのソース、味が最悪だったんだよな。"
10042080-70 = "大人しくなった……？"
10042080-71 = "パンちゃん……。"
10042080-72 = "今まで色んなことがありましたね……。"
10042080-73 = "私のミスで皆さんに迷惑をかけて、どうすれば良いか悩んでいましたが……。"
10042080-74 = "パンちゃんが無事元の姿に戻って、良かったです！"
10042080-75 = "……うん、そうだね。"
10042080-76 = "じゃあ……。"
10042080-85 = "ああっ！？"
10042080-86 = "[ns5] \"フウカがパンちゃんを……！\"\n[ns6] \"ゴミ箱に捨てた！？\""
10042080-89 = "地面を駆けずり回った食べ物なんて不衛生だからね。#n廃棄しないと。"
10042080-90 = "そ、それは……そうですが！"
10042080-91 = "なるほど、正論ですね。"
10042080-92 = "…………。"
10042080-94 = "これで……すべて終わったんですよね？"
10042080-95 = "……たぶん。"
10042080-96 = "はぁ、もうコリゴリだよ……。"
10042080-100 = "[ns] \"すごい一日だったね……。\""
10042080-101 = "これで、終わり……！？#nいえ、私は絶対に許しません！！！"
10042080-102 = "アコちゃん、復活したの？"
10042080-103 = "一度も死んでませんけど！？#nそれで、パンちゃんというのはどちらに！？"
10042080-104 = "あ……パンちゃんでしたら、ゴミ箱に。#nもう完全に動かなくなりました。"
10042080-105 = "……。"
10042080-106 = "ま、まあ、それなら良いのですが……。"
10042080-107 = "……この鬱憤を、一体どう晴らせば？"
10042080-108 = "[s7] \"アコ、ソースで服が……。\"\n[s8] \"まずは、シャワーを浴びようか……？\""
10042080-111 = "！！！！！"
10042080-113 = "あぁ、もう！最悪ですっ！！！！"
10042080-117 = "[log]こうして、ゲヘナ学園を賑わせたパンちゃん事件は、数々の騒動を巻き起こした後、終息した。[/log]"
10042080-120 = "[log]……ゲヘナ生の間では「些細なハプニング」と呼ばれたり、呼ばれなかったりするらしい。[/log]"
10042080-123 = "[log]数日後[/log]"
10042080-127 = "ゲヘナ学園・厨房"
10042080-128 = "ジュリ、玉ねぎは？"
10042080-129 = "はい！こちらに！"
10042080-130 = "ありがとう！#n炒めている間に、ジャガイモとニンジンもお願い！"
10042080-131 = "ジャガイモは水にさらしてアク抜きもしますか？"
10042080-132 = "うん、お願い！#n今日のメニューは肉じゃがだからね！"
10042080-134 = "ゲヘナ学園・学生食堂"
10042080-135 = "この肉じゃが、なんか味薄くない？"
10042080-136 = "牛だと思ってたのに、豚かぁ……。"
10042080-137 = "私、しらたき入ってるの好きなのになぁ……。"
10042080-138 = "漬物、もっとないの？#n少ないんだけど。"
10042080-139 = "今日のランチは「肉じゃが」なのですね。"
10042080-140 = "肉じゃがには様々な家庭の流派が存在するもの。#n肉は何を使っているのか、しらたきやサツマイモは入れるのか――"
10042080-141 = "さあ、フウカさんの流派を――拝見するとしましょう。"
10042080-142 = "ちょっ、何でハルナまでいるのよー！！！"
10042080-144 = "はぁ、今日もなんとか乗り切った……。"
10042080-145 = "お疲れ様でした、先輩。"
10042080-146 = "本当に、いつも大変だよね。#n手間がかかる割に時間が全然足りなくて……。"
10042080-147 = "どれだけ頑張ってもみんな分かってくれないし……！"
10042080-148 = "ごめんなさい、先輩。#n私がもっとお役に立てていれば……。"
10042080-149 = "ううん、そんなことないよ。#nジュリがいてくれてるから成り立ってるんだよ。"
10042080-150 = "……私一人じゃ、給食部の運営なんて無理。"
10042080-151 = "そう言っていただけると嬉しいのですが……戦力外通告みたいで少し悲しいです。"
10042080-156 = "[ns] \"ジュリ、フウカ！お疲れ様！\""
10042080-157 = "あ、先生！"
10042080-158 = "先生、それは……？"
10042080-159 = "ジュースの差し入れ、ですか？"
10042080-160 = "……ありがとうございます、嬉しいです。"
10042080-161 = "あ、私コップを持ってきますね！"
10042080-162 = "ジュリ、一緒に食べるお菓子でも……。"
10042080-167 = "……。"
10042080-168 = "あの……先輩、先生。"
10042080-169 = "その……お菓子なら、私が用意したものがありまして……。"
10042080-170 = "あっ！も、もちろん、全然断っても大丈夫です！#n怖かったり不安だったりするでしょうから……。"
10042080-171 = "ジュリが用意したもの？"
10042080-172 = "……。"
10042080-173 = "そう言われると気になるんだけど、見せてもらえる？"
10042080-174 = "[s] \"見てみたいな！\""
10042080-175 = "うう……本当にいいんですか？"
10042080-176 = "……少々お待ちください！"
10042080-188 = "わあ！すごく美味しそう！"
10042080-189 = "[ns] \"これ、ジュリが作ったの？\""
10042080-190 = "えへへ……はい。#nあの後、カフェで色々教わって……。"
10042080-191 = "たくさん練習して、ついに完成させたんです。"
10042080-192 = "よろしければ……食べてくださりますか？"
10042080-193 = "……。"
10042080-197 = "先生？"
10042080-198 = "[s] \"うん、一緒に食べよう！\""
10042080-199 = "ほら、ジュリも。"
10042080-200 = "あ、ありがとうございます！"
10042080-201 = "本当に、嬉しいです……。"
10042080-203 = "（その後、みんなで一緒にジュリのパンケーキを食べた）"
10042080-204 = "（普通のパンケーキと少し違う味だったけど……）"
10042080-205 = "（そこには、ジュリの真心と……）"
10042080-206 = "（たしかな「愛情」が込められていた）"
10042080-209 = "パンデミック・ハザード～奇跡の一枚～"
