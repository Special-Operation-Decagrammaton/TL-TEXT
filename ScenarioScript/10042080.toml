[translation]
10042080-1 = "Episódio 8: Frutificação"
10042080-2 = "……。"
10042080-3 = "……Conseguimos?"
10042080-4 = "Essa fala é um pouco perigosa, sabia……."
10042080-8 = "Eu vou verificar a situação!"
10042080-9 = "Sensei, fique aí esperando!"
10042080-13 = "Por favor, venha atrás de mim!"
10042080-15 = "U-uuh……."
10042080-16 = "Encontrei um membro do Clube de Merenda!#nO próximo é……."
10042080-18 = "……。"
10042080-19 = "Encontrei a Ako-chan desmaiada e coberta de gosma.#nE também……."
10042080-25 = "Até agora há pouco, era tão grande……."
10042080-30 = "Encontrei o espécime que voltou ao tamanho original."
10042080-34 = "[ns] \"Iori, isso não é perigoso!?\""
10042080-35 = "Está tudo bem, ele já parou de se mover."
10042080-36 = "Provavelmente…… está desmaiado."
10042080-38 = "……。"
10042080-39 = "……。"
10042080-40 = "A-Ako-chan?#nSobre isso……."
10042080-41 = "Não diga nada!#nPassar por uma humilhação dessas……!"
10042080-42 = "T-tá bom, entendi."
10042080-43 = "Como você pôde…… como você pôde fazer isso comigo!"
10042080-44 = "Primeiro me enrolou, depois me cobriu de gosma…… ugh…… ainda sinto um gosto horrível na boca."
10042080-45 = "S-ser sujada por uma coisa daquelas…… eu não posso mais……."
10042080-46 = "[s1] \"A-Ako? Você está bem……?\"\n[s2] \"Aquilo era só calda de panqueca…….\""
10042080-49 = "Sensei, fique quieto!"
10042080-50 = "Eu preciso me vingar daquilo――"
10042080-51 = "Ako-chan, cuidado!"
10042080-57 = "――Nghhh!?!?"
10042080-58 = "Nghhh!?!? Nnuuuuh!?"
10042080-59 = "[ns3] \"Uau! Pulou direto na cara da Ako……!\"\n[ns4] \"É igualzinho ao que aconteceu com a Iori……!?\""
10042080-65 = "Ugh, que sensação de déjà vu……."
10042080-66 = "……Aquele molho tinha um gosto horrível, né."
10042080-70 = "Ele se acalmou……?"
10042080-71 = "Pan-chan……."
10042080-72 = "Passamos por tanta coisa até agora……."
10042080-73 = "Eu estava preocupada sobre o que fazer depois de causar tantos problemas a todos por causa do meu erro, mas……."
10042080-74 = "Fico feliz que o Pan-chan tenha voltado ao normal!"
10042080-75 = "……É, você tem razão."
10042080-76 = "Então……."
10042080-85 = "Ahhh!?"
10042080-86 = "[ns5] \"A Fuuka jogou o Pan-chan……!\"\n[ns6] \"No lixo!?\""
10042080-89 = "Comida que se arrastou pelo chão não é higiênica.#nPreciso descartar."
10042080-90 = "I-isso…… é verdade, mas!"
10042080-91 = "Entendo, um argumento lógico."
10042080-92 = "…………。"
10042080-94 = "Com isso…… tudo acabou, certo?"
10042080-95 = "……Provavelmente."
10042080-96 = "Ah, chega, não aguento mais isso……."
10042080-100 = "[ns] \"Que dia incrível, não é…….\""
10042080-101 = "Isso é tudo...!?#nNão, eu não vou perdoar isso de jeito nenhum!!!"
10042080-102 = "Ako-chan, você ressuscitou?"
10042080-103 = "Eu não morri em momento algum, sabia!?#nE então, onde está o Pan-chan!?"
10042080-104 = "Ah... o Pan-chan está na lixeira.#nEle parou de se mexer completamente."
10042080-105 = "……。"
10042080-106 = "B-bem, se é assim, tudo bem, mas..."
10042080-107 = "……Como eu deveria aliviar essa frustração?"
10042080-108 = "[s7] \"Ako, seu uniforme está sujo de molho...\"\n[s8] \"Que tal tomar um banho primeiro...?\""
10042080-111 = "！！！！！"
10042080-113 = "Ah, chega! Isso é o pior de tudo!!!!"
10042080-117 = "[log]Assim, o incidente do Pan-chan, que agitou a Academia Gehenna, chegou ao fim após causar inúmeras confusões.[/log]"
10042080-120 = "[log]……Dizem que, entre os alunos de Gehenna, isso é chamado de \"um pequeno incidente\", ou talvez não.[/log]"
10042080-123 = "[log]Alguns dias depois[/log]"
10042080-127 = "Academia Gehenna - Cozinha"
10042080-128 = "Juri, e as cebolas?"
10042080-129 = "Sim! Aqui estão!"
10042080-130 = "Obrigada!#nEnquanto refoga, por favor, prepare as batatas e as cenouras também!"
10042080-131 = "Devo deixar as batatas de molho na água para tirar o amargor?"
10042080-132 = "Sim, por favor!#nO cardápio de hoje é Nikujaga!"
10042080-134 = "Academia Gehenna - Refeitório Estudantil"
10042080-135 = "Esse Nikujaga não está meio sem gosto?"
10042080-136 = "Eu achei que fosse carne bovina, mas é suína..."
10042080-137 = "Eu gosto quando tem shirataki..."
10042080-138 = "Não tem mais picles?#nTem muito pouco."
10042080-139 = "Então o almoço de hoje é \"Nikujaga\"."
10042080-140 = "O Nikujaga possui várias escolas de pensamento domésticas. Que tipo de carne é usada, se leva shirataki ou batata-doce――"
10042080-141 = "Vamos ver... a escola de culinária da Fuuka-san."
10042080-142 = "Ei, por que a Haruna está aqui também!!!"
10042080-144 = "Ah, consegui sobreviver a mais um dia..."
10042080-145 = "Bom trabalho, senpai."
10042080-146 = "É, sempre é muito difícil, né?#nDá muito trabalho e o tempo nunca é suficiente..."
10042080-147 = "Não importa o quanto eu me esforce, ninguém entende...!"
10042080-148 = "Desculpe, senpai.#nSe eu pudesse ser mais útil..."
10042080-149 = "Não, não é isso.#nO departamento de merenda só funciona porque você está aqui, Juri."
10042080-150 = "……Sozinha, eu não conseguiria administrar nada."
10042080-151 = "Fico feliz em ouvir isso, mas... soa como um aviso de demissão, o que me deixa um pouco triste."
10042080-156 = "[ns] \"Juri, Fuuka! Bom trabalho!\""
10042080-157 = "Ah, Sensei!"
10042080-158 = "Sensei, isso é...?"
10042080-159 = "Suco de presente?"
10042080-160 = "……Muito obrigada, fico feliz."
10042080-161 = "Ah, vou buscar copos!"
10042080-162 = "Juri, talvez algum doce para acompanhar..."
10042080-167 = "……。"
10042080-168 = "Aquele... senpai, Sensei."
10042080-169 = "Bem... se for sobre doces, eu preparei algo..."
10042080-170 = "Ah! C-claro, se quiserem recusar, não tem problema nenhum!#nImagino que devam estar com medo ou receosos..."
10042080-171 = "Algo que a Juri preparou?"
10042080-172 = "……。"
10042080-173 = "Agora que você disse, fiquei curioso. Pode nos mostrar?"
10042080-174 = "[s] \"Eu adoraria ver!\""
10042080-175 = "Uuu... Tem certeza mesmo?"
10042080-176 = "...Por favor, espere um pouco!"
10042080-188 = "Uau! Parece delicioso!"
10042080-189 = "[ns] \"Foi você quem fez isso, Juri?\""
10042080-190 = "Hehehe... Sim. #nDepois daquilo, aprendi várias coisas no café..."
10042080-191 = "Pratiquei bastante e finalmente consegui terminar."
10042080-192 = "Se não se importar... poderia comer um pouco?"
10042080-193 = "..."
10042080-197 = "Sensei?"
10042080-198 = "[s] \"Claro, vamos comer juntos!\""
10042080-199 = "Aqui, Juri, você também."
10042080-200 = "Ah, muito obrigada!"
10042080-201 = "Estou muito, muito feliz..."
10042080-203 = "(Depois disso, todos comeram as panquecas da Juri juntos)"
10042080-204 = "(O sabor era um pouco diferente das panquecas comuns, mas...)"
10042080-205 = "(Nelas, estavam contidos a sinceridade da Juri e...)"
10042080-206 = "(um verdadeiro \"carinho\" especial)"
