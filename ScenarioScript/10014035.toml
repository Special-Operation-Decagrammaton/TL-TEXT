[translation]
10014035-2 = "（その日の夕方）"
10014035-3 = "……あれ、早く来てたんだ。#nお待たせして申し訳ないです。"
10014035-4 = "[s1] \"いま来たとこだから気にしないで。\"\n[s2] \"のんびりしてるのが好きだから大丈夫。\""
10014035-5 = "まあ、そう言ってくれるのはありがたいけど……"
10014035-6 = "まあ、そう言ってくれるのはありがたいけど……"
10014035-11 = "いつもそう言ってくれるから、逆に本当に大丈夫なのか分からなくなるね……。"
10014035-12 = "……冗談だよ。#nどちらでもありがたいという事実には変わりはないし。"
10014035-13 = "それで、用件は？#n何かいい解決方法でもあった？"
10014035-14 = "……[ruby=うざわ]宇沢[/ruby]？"
10014035-15 = "あいつがどうしたの？#nもしかして、また先生に何かしたの？"
10014035-16 = "……ん？"
10014035-17 = "直接話したこと？私が？#n急にどうしたのさ……"
10014035-18 = "正直、話したことなんかないよ。#nあんな風に突っかかってくるのに、会話なんか無理だよね。"
10014035-19 = "それにあいつ見てると何か……#n決闘とか言ってるくせに、それを楽しんでるっていうか。"
10014035-20 = "それがあまりにも昔のまますぎて……見てると疲れるっていうか。"
10014035-21 = "……ところでそれがどうしたの？"
10014035-22 = "……？"
10014035-23 = "もうちょっと分かったら話す……？#nそう……。"
10014035-24 = "……ん？"
10014035-25 = "っていうかもしかして、先生あいつに会った？"
10014035-26 = "……そう。"
10014035-27 = "あいつ、何か言ってた？"
10014035-28 = "[s3] \"……うん、色々。\"\n[s4] 聞いた話を全部話す。"
10014035-33 = "……。"
10014035-34 = "……？"
10014035-36 = "……。"
10014035-37 = "………。"
10014035-38 = "………………。"
10014035-39 = "[s5] \"……カズサ、大丈夫？\"\n[s6] \"もう頭あげた方が……。\""
10014035-40 = "……はぁ……すーっ……。#nはぁ……。"
10014035-41 = "……はぁ……すーっ……。#nはぁ……。"
10014035-42 = "ご、ごめん。先生……ちょっと……。#nもうちょっとだけ、頭を冷やしてもいいかな……。"
10014035-43 = "本当に……。#n本当にそう言ってたの……？"
10014035-44 = "不良の神話……獣のオーラ……"
10014035-48 = "キャスパリーグ……？"
10014035-49 = "[s7] \"独特のネーミングセンスだよね。\"\n[s8] \"もしかして、そのあだ名が恥ずかしかったり？\""
10014035-50 = "いや正気……？#n先生、もしかしてからかってる？"
10014035-51 = "あったり前でしょ！！！"
10014035-52 = "もう最悪！ほんっともう！！#nあいつ、マジでそんなこと言ったの！？"
10014035-53 = "あいつ、マジでいつまであんな事言ってんのよ！？#n恥ずかしくないワケ！？"
10014035-54 = "ねえ、その場に他の人いたりした？#nまさか……他にも聞いた人いたの？"
10014035-55 = "い、いない？いないよね？お願いだからいないって言って、先生！#n先生しか聞いてないって！ねぇ、お願い……！！"
10014035-59 = "……ああ……そう。"
10014035-60 = "他の自警団と……倒れていたスケバン……？#n結構な人が聞いたんだね……？"
10014035-61 = "……え？#n放課後スイーツ部のみんなも……？なんで？"
10014035-62 = "[s9] \"それは私の不手際で……。\"\n[s10] \"本当に申し訳ありませんでした。\""
10014035-63 = "……ふふ……。"
10014035-64 = "……ふふ……。"
10014035-65 = "ふふ……はは……。#n噂が広がっちゃうな～……もう一生フードかぶって生きないとね♪"
10014035-66 = "[s11] \"カズサ……。\"\n[s12] \"カズサが壊れた……。\""
10014035-67 = "くそ……マジ最悪……。"
10014035-68 = "くそ……マジ最悪……。"
10014035-69 = "ううっ……もう恥ずかしすぎて、生きていけない……。"
10014035-70 = "もう終わり……私は一生、厨二病患者としてレッテルを貼られるんだ……。"
10014035-71 = "……え？"
10014035-72 = "別にそう悲観するほどの事じゃない、って？"
10014035-73 = "……先生。"
10014035-74 = "先生も宇沢に感化されちゃったかもしれないけど……。"
10014035-75 = "普通に考えてみてよ。#nキャスパリーグだのなんだの言ったって、結局はただのスケバン。"
10014035-76 = "ただ喧嘩が強いだけの子どもだったっていうだけ。#n別にすごくなんてない。"
10014035-77 = "世間を知らない、分別のない子ども……。"
10014035-78 = "……そう。#nそれなのに自分の事を特別だなんて思っていた、過去の自分が余計恥ずかしいの。"
10014035-79 = "だからもう忘れたいんだ……。#nあの時の全てを消してしまいたい。"
10014035-80 = "私さ。ある時、急に目が覚めて悟ったんだ……#nいくら格好つけたって、傍から見たらただ幼稚で情けないだけっていう事に。"
10014035-81 = "先生は優しいから気遣ってくれるけど……。#n残念ながら私はそんな気休めで楽になるほどバカじゃないんだ。"
10014035-82 = "言ったでしょ？#n誰だって、忘れたい過去の一つや二つ持ってるものだって。"
10014035-83 = "[s13] \"忘れたい過去……か。\"\n[s14] \"蓋をしたいんだね、カズサは。\""
10014035-84 = "……はあ。"
10014035-85 = "……はあ。"
10014035-86 = "まぁ、そういう事。#nでもよかった。先生が宇沢に上手く説明してくれたって話だし……。"
10014035-87 = "今後も少しずつ説得すれば聞いてくれるかな。#nちょっとその道のりが大変だろうけど。"
10014035-88 = "まぁ、結局は必要になる事だし……割り切らないとね。"
10014035-92 = "……ふぅ。"
10014035-93 = "……なんだっていいけど……。#n早く終わってほしいな。"
