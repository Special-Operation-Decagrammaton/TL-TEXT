[translation]
10014035-2 = "(Naquela tarde)"
10014035-3 = "……Ah, você chegou cedo. #nPeço desculpas por fazer você esperar."
10014035-4 = "[s1] \"Acabei de chegar, não se preocupe.\" \n[s2] \"Eu gosto de levar as coisas com calma, então está tudo bem.\""
10014035-5 = "Bem, agradeço por dizer isso, mas……"
10014035-6 = "Bem, agradeço por dizer isso, mas……"
10014035-11 = "Você sempre diz isso, então, na verdade, começo a ficar na dúvida se está tudo bem mesmo……."
10014035-12 = "……É brincadeira. #nDe qualquer forma, o fato de eu ser grata não muda."
10014035-13 = "Então, qual é o assunto? #nVocê encontrou alguma boa solução?"
10014035-14 = "……Uzawa?"
10014035-15 = "O que tem ela? #nPor acaso ela fez algo com você de novo, Sensei?"
10014035-16 = "……Hm?"
10014035-17 = "Coisas que conversamos diretamente? Eu? #nPor que a pergunta de repente……"
10014035-18 = "Sinceramente, nunca conversamos. #nEla vem para cima daquele jeito, é impossível conversar com alguém assim."
10014035-19 = "Além disso, quando olho para ela, sinto que…… #nela diz que quer um duelo, mas parece que está se divertindo com isso."
10014035-20 = "Isso é tão antiquado que…… me cansa só de olhar."
10014035-21 = "……Mas por que você está perguntando isso?"
10014035-22 = "……?"
10014035-23 = "Você vai me contar quando entender melhor……? #nEntendo……."
10014035-24 = "……Hm?"
10014035-25 = "Ou melhor, por acaso você encontrou com ela, Sensei?"
10014035-26 = "……Entendo."
10014035-27 = "Ela disse alguma coisa?"
10014035-28 = "[s3] \"……Sim, várias coisas.\" \n[s4] Contar tudo o que ouviu."
10014035-33 = "……."
10014035-34 = "……?"
10014035-36 = "……."
10014035-37 = "……."
10014035-38 = "………………."
10014035-39 = "[s5] \"……Kazusa, você está bem?\" \n[s6] \"É melhor você levantar a cabeça…….\""
10014035-40 = "……Haa…… suuu…… #nHaa……."
10014035-41 = "……Haa…… suuu…… #nHaa……."
10014035-42 = "De, desculpa. Sensei…… só um pouco…… #nPosso esfriar a cabeça por mais um instante……?"
10014035-43 = "Sério…… #nEla disse isso mesmo……?"
10014035-44 = "O mito da delinquente…… a aura da fera……"
10014035-48 = "Cath Palug……?"
10014035-49 = "[s7] \"É um senso de nomenclatura bem único, né.\" \n[s8] \"Por acaso você tem vergonha desse apelido?\""
10014035-50 = "Você está falando sério……? #nSensei, você está me zoando?"
10014035-51 = "Claro que tenho vergonha!!!"
10014035-52 = "Que horror! Sério mesmo!! #nEla disse isso de verdade!?"
10014035-53 = "Até quando ela vai ficar falando essas coisas!? #nEla não tem vergonha na cara não!?"
10014035-54 = "Ei, tinha mais alguém por perto? #nNão me diga…… que mais alguém ouviu isso?"
10014035-55 = "Nã, não tinha? Não tinha, né? Por favor, diz que não tinha, Sensei! #nDiz que só você ouviu! Por favor……!!"
10014035-59 = "……Ah…… entendi."
10014035-60 = "O resto do comitê disciplinar…… e as delinquentes que estavam caídas……? #nBastante gente ouviu, então……?"
10014035-61 = "……Hein? #nO pessoal do Clube de Doces depois da aula também……? Por quê?"
10014035-62 = "[s9] \"Isso foi por um descuido meu…….\" \n[s10] \"Peço mil desculpas.\""
10014035-63 = "……Fufu……."
10014035-64 = "……Fufu……."
10014035-65 = "Fufu…… haha…… #nO boato vai se espalhar…… vou ter que viver de capuz pelo resto da vida♪"
10014035-66 = "[s11] \"Kazusa…….\" \n[s12] \"A Kazusa quebrou…….\""
10014035-67 = "Droga... que pesadelo..."
10014035-68 = "Droga... que pesadelo..."
10014035-69 = "Ugh... estou tão envergonhada que não consigo nem encarar a vida..."
10014035-70 = "Acabou... vou ficar marcada como uma doente por chuunibyou para o resto da vida..."
10014035-71 = "……Hã?"
10014035-72 = "Diz que não é algo tão trágico assim?"
10014035-73 = "……Sensei."
10014035-74 = "Talvez você também tenha sido influenciado pela Uzawa, mas..."
10014035-75 = "Pense bem. Não importa o quanto falem de Cath Palug ou qualquer outra coisa, no fim, não passa de uma delinquente."
10014035-76 = "Só uma criança que era boa de briga. Não tem nada de especial nisso."
10014035-77 = "Uma criança sem noção, que não conhece o mundo..."
10014035-78 = "……É. E é por isso que sinto tanta vergonha do meu passado, por ter achado que eu era especial."
10014035-79 = "Por isso eu quero esquecer... Quero apagar tudo daquela época."
10014035-80 = "Sabe, uma hora eu simplesmente acordei e percebi... que não importa o quanto eu tentasse parecer legal, para quem via de fora, eu era só uma criança patética."
10014035-81 = "Você é gentil e tenta me consolar, mas... infelizmente, eu não sou boba o suficiente para me sentir melhor com palavras vazias."
10014035-82 = "Eu não disse? Todo mundo tem um ou dois passados que gostaria de esquecer."
10014035-83 = "[s13] \"Um passado que quer esquecer... entendo.\"\n[s14] \"Você quer esconder isso, não é, Kazusa?\""
10014035-84 = "……Haa."
10014035-85 = "……Haa."
10014035-86 = "Bem, é isso. Mas fico feliz que você tenha conseguido explicar tudo para a Uzawa..."
10014035-87 = "Será que se continuarmos convencendo ela aos poucos, ela vai ouvir? Vai ser um caminho longo, imagino."
10014035-88 = "Bem, no fim das contas é algo necessário... preciso aceitar isso."
10014035-92 = "……Ufa."
10014035-93 = "……Tanto faz... Só quero que isso acabe logo."
