[translation]#[Não revisado] - Filipe 09/06/26
2005806-1 = "Conselho de Erika"
2005806-2 = "..."
2005806-3 = "[ns] \"Olá, Erika.\""
2005806-7 = "Obrigada por vir, professor..."
2005806-8 = "Não esperava que você viesse tão rápido... pode ficar um tempo?"
2005806-9 = "Você disse 'achei estranho a Erika pedir conselho' ...?"
2005806-10 = "... É, talvez. Normalmente não peço conselhos mesmo."
2005806-14 = "Eu acho você... confiável. Alguém em quem posso confiar."
2005806-15 = "... Que cara é essa. Parece feliz."
2005806-16 = "E-ei, enfim! É isso."
2005806-17 = "Fiquei pensando várias coisas enquanto esperava..."
2005806-18 = "Ainda não consegui organizar direito... então posso falar besteira."
2005806-19 = "[s] \"Tudo bem, sem pressa.\""
2005806-20 = "Hum..."
2005806-24 = "Hmm..."
2005806-25 = "... Isso já vinha me incomodando há um tempo."
2005806-26 = "Eu gosto de sair com todo mundo."
2005806-27 = "Gosto de conversar, ir ao karaokê, fazer compras."
2005806-28 = "Mas... sabe como é?"
2005806-29 = "Às vezes..."
2005806-30 = "A conversa... fica vazia."
2005806-31 = "Ah, não me entenda mal. Não é culpa das minhas amigas. É coisa minha, sabe?"
2005806-32 = "Não é que eu não goste de estar com elas. Até gosto, é divertido."
2005806-33 = "Mas como dizer..."
2005806-34 = "Por exemplo. Quando a gente está conversando, alguém conta uma piada legal."
2005806-35 = "Na hora, eu penso 'se fosse eu, diria isso ou aquilo'..."
2005806-36 = "Mas não sai da boca."
2005806-37 = "Não sei explicar direito... é como se não tivesse energia para falar."
2005806-38 = "Não é que não tenha energia nenhuma..."
2005806-39 = "[ns] \"Isso talvez...\""
2005806-41 = "[ns] \"... seja cansaço.\""
2005806-42 = "Cansaço...?"
2005806-43 = "[s1] \"A quantidade de energia que a gente tem é limitada.\"\n[s2] \"Você deve ter gasto toda a sua, por isso está cansada.\""
2005806-46 = "Dá para gastar assim? Não me lembro de ter feito tanto esforço."
2005806-47 = "'Se divertir também gasta energia' ...?"
2005806-48 = "'Encontrar pessoas também consome energia' ...?"
2005806-49 = "[s3] \"Nessas horas, é bom tirar um tempo para si mesma.\"\n[s4] \"Tipo um 'período de recarga'.\""
2005806-52 = "Recarga... Estou tão cansada assim?"
2005806-53 = "Nunca tinha pensado nisso."
2005806-54 = "É divertido encontrar as pessoas, e quando tenho compromisso, sinto que o dia foi produtivo."
2005806-55 = "..."
2005806-56 = "Ah... será que é isso?"
2005806-57 = "Uau... entendi."
2005806-58 = "Foi um choque agora."
2005806-59 = "É isso mesmo..."
2005806-60 = "Então eu... preciso de um tempo sozinha."
2005806-61 = "[ns] \"Acho que você gosta de ficar sozinha também.\""
2005806-62 = "S-sério?"
2005806-63 = "[s] \"A gente se encontra bastante quando você está sozinha, né?\""
2005806-64 = "Ah... é verdade."
2005806-65 = "[s5] \"E quando a gente se encontra, você não parece triste.\"\n[s6] \"Parecia até estar se divertindo, na verdade.\""
2005806-71 = "É mesmo..."
2005806-72 = "Tem muita coisa que só dá para fazer sozinha."
2005806-73 = "Por isso... tenho lugares que só vou quando estou sozinha."
2005806-74 = "[s] \"Tipo uma base secreta, só sua?\""
2005806-75 = "Base secreta..."
2005806-76 = "[s] \"Todo mundo precisa de uma base secreta.\""
2005806-77 = "É, pode ser..."
2005806-78 = "Ir para lá me acalmava... acho que agora fez sentido."
2005806-79 = "Até hoje, eu achava que era uma pessoa extrovertida..."
2005806-80 = "Não era... que susto."
2005806-81 = "[s7] \"Extrovertida ou introvertida...\"\n[s8] \"Acho que não tem muito a ver. Não é uma coisa tão preto no branco.\""
2005806-84 = "... É mesmo. Não existe só um lado."
2005806-85 = "Não importa o ângulo, eu sou eu."
2005806-86 = "A que gosta de estar com os amigos sou eu. A que gosta de ficar sozinha também."
2005806-87 = "[ns9] \"É importante manter os relacionamentos, mas...\"\n[ns10] \"ficar se forçando e se cansar não é legal.\"\n[ns11] \"Acho que os seus amigos não querem que você se esforce tanto.\""
2005806-92 = "[ns] \"O importante é agir naturalmente, como a Erika, não?\""
2005806-93 = "Essa resposta foi bem de professor. De vez em quando você diz coisas certas."
2005806-94 = "[s] \"Sou adulto, quer dizer!\""
2005806-95 = "Que bom que te pedi conselho. Ufa, me sinto mais leve!"
2005806-96 = "Acho que aprendi um pouco mais sobre mim mesma."
2005806-97 = "Foi um susto descobrir que eu não era como imaginava... mas... não é de todo mal."
2005806-98 = "[s12] \"Se tiver mais alguma preocupação, me fala.\"\n[s13] \"Pode me procurar sempre! Use e abuse.\""
2005806-104 = "Usar é uma palavra meio forte, né. Eu nunca pensei assim."
2005806-105 = "Não, eu entendi o que você quis dizer..."
2005806-106 = "Dizer desse jeito, algumas alunas podem se magoar, sabe."
2005806-107 = "[s] \"Ah, foi mal. Errei na escolha das palavras.\""
2005806-108 = "Bem, fica combinado que você vai me ouvir de novo."
2005806-113 = "Combinado?"
2005806-114 = "[s] \"Sim, combinado.\""
2005806-115 = "Tá, então, dedo enrolado."
2005806-119 = "..."
2005806-120 = "A sua mão é quentinha mesmo."
2005806-121 = "[s] \"A sua é macia.\""
2005806-125 = "Ahaha, lá vem você de novo."
2005806-127 = "(Depois que ouviu o desabafo de Erika, ainda conversaram amenidades por um tempo)"