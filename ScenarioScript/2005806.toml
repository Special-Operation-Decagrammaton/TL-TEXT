[translation]
2005806-1 = "Erika and Consultation"
2005806-2 = "..."
2005806-3 = "[ns] \"Hello, Erika.\""
2005806-7 = "Thanks for coming, Sensei..."
2005806-8 = "I didn't think we'd be able to meet this soon... Do you have time?"
2005806-9 = "\"I thought it was rare for Erika to want to talk about something\"...?"
2005806-10 = "...Well, maybe so. #nI don't really consult people about my worries."
2005806-14 = "I thought you were... someone I can rely on, or rather, someone it's okay to #nrely on, Sensei."
2005806-15 = "...What's with that look? You seem happy."
2005806-16 = "W-Well! Anyway, that's how it is."
2005806-17 = "I thought about a lot of things while I was waiting..."
2005806-18 = "I haven't quite organized my thoughts yet, so... my words might come out a bit #nweird."
2005806-19 = "[s] \"That's fine, take your time.\""
2005806-20 = "Yeah..."
2005806-24 = "Mmmm..."
2005806-25 = "...Um, I've kinda been thinking about this for a while."
2005806-26 = "I like hanging out with everyone, you know."
2005806-27 = "I like chatting together, going to karaoke, and going shopping too."
2005806-28 = "But, you know... somehow."
2005806-29 = "Sometimes... you know."
2005806-30 = "The conversation... just cuts off."
2005806-31 = "Ah, don't misunderstand. It's not my friends' fault or anything. #nIt's my problem, I guess."
2005806-32 = "I don't hate being with my friends at all, really. #nIt's fun when we're together."
2005806-33 = "But somehow..."
2005806-34 = "For example, when we're all chatting, let's say someone says something funny, #nokay?"
2005806-35 = "At that time, I thought in my head, \"If it were the usual me, I probably would have said this\"..."
2005806-36 = "But it just doesn't come out of my mouth."
2005806-37 = "I don't really know how to put it. #nIt feels like I don't have the energy to speak?"
2005806-38 = "Well, it's not like my energy is at zero, but..."
2005806-39 = "[ns] \"That's probably...\""
2005806-41 = "[ns] \"Aren't you feeling tired?\""
2005806-42 = "Am I tired...?"
2005806-43 = "[s1] \"The amount of energy we have is limited after all.\"\n[s2] \"And since you used it all up, maybe that's why you're tired.\""
2005806-46 = "Does it really run out...? #nI don't feel like I've been pushing myself too hard."
2005806-47 = "\"Even playing requires stamina\"...?"
2005806-48 = "\"Meeting people requires energy too\"...?"
2005806-49 = "[s3] \"In those times, it might be good to take some time for yourself.\"\n[s4] \"Like a 'recharging period'.\""
2005806-52 = "Recharging... Am I really that tired...?"
2005806-53 = "I've never really thought that I needed time like that, but..."
2005806-54 = "Meeting everyone is fun, and on days when I have plans, I feel like it was a #nfulfilling day."
2005806-55 = "..."
2005806-56 = "Ah...? #nCould that be what you mean...?"
2005806-57 = "Wow... I see."
2005806-58 = "I'm a little shocked."
2005806-59 = "Maybe that's it..."
2005806-60 = "I'm the type of person who needs a time to be alone..."
2005806-61 = "[ns] \"I think you probably like having time to yourself as well, Erika.\""
2005806-62 = "I-Is that so?"
2005806-63 = "[s] \"We often meet when you're alone, don't we?\""
2005806-64 = "Ah... yeah, you're right."
2005806-65 = "[s5] \"When we met, you didn't look lonely at all, Erika.\"\n[s6] \"You actually looked pretty happy.\""
2005806-71 = "Yeah..."
2005806-72 = "There are a lot of things you can only do when you're alone."
2005806-73 = "Maybe that's why...? #nThere are places I go alone too."
2005806-74 = "[s] \"Like your own secret hideout?\""
2005806-75 = "Secret hideout..."
2005806-76 = "[s] \"Everyone needs their own secret hideout.\""
2005806-77 = "Maybe so..."
2005806-78 = "I always felt more relaxed when I went there... #nI feel like things are finally connecting for me."
2005806-79 = "Up until now, I always thought I was a sociable person..."
2005806-80 = "I guess I was wrong... It's kind of a shock..."
2005806-81 = "[s7] \"Whether you're sociable or not.\"\n[s8] \"I don't think it really matters. It's not like you can draw a clear line between them...\""
2005806-84 = "...Yeah. It's not like I only have one side to me."
2005806-85 = "No matter what angle you look from, I am me..."
2005806-86 = "The me who likes hanging out with friends is me. The me who likes spending time alone is also me."
2005806-87 = "[ns9] \"Maintaining relationships is important,\"\n[ns10] \"But forcing yourself to be like others and getting tired isn't right.\"\n[ns11] \"I'm sure your friends wouldn't want you to push yourself either.\""
2005806-92 = "[ns] \"The important thing is to be yourself, don't you think?\""
2005806-93 = "That sounded very much like you just now. You say good things every now and #nthen."
2005806-94 = "[s] \"Because I'm an adult!\""
2005806-95 = "I'm glad I talked to you. #nAh, I feel so much better!"
2005806-96 = "I feel like I got to know myself a little better."
2005806-97 = "I was surprised that I was different from what I thought... yeah. #nI don't think this is bad either."
2005806-98 = "[s12] \"Let me know if you have any other worries.\"\n[s13] \"I'll listen anytime! Feel free to use me.\""
2005806-104 = "\"Use\" might not be the right word. #nI've never thought of it that way, you know?"
2005806-105 = "Well, I understand what you mean, Sensei..."
2005806-106 = "I think some students would feel hurt if you said it like that."
2005806-107 = "[s] \"Ah, sorry. I worded that poorly.\""
2005806-108 = "Well, it just means you'll listen to my problems next time too."
2005806-113 = "It's a promise, right?"
2005806-114 = "[s] \"Yeah. It's a promise.\""
2005806-115 = "Alright, pinky promise."
2005806-119 = "..."
2005806-120 = "As I thought, your hands are warm, Sensei."
2005806-121 = "[s] \"Your hands are soft as always, Erika.\""
2005806-125 = "Hahah, There you go again."
2005806-127 = "(After listening to Erika's concerns, we continue chatting for a while.)"