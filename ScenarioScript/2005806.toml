[translation]
2005806-1 = "エリカの相談"
2005806-2 = "……。"
2005806-3 = "[ns] \"こんにちは、エリカ。\""
2005806-7 = "来てくれてありがと、先生……。"
2005806-8 = "こんなすぐに会えると思わなかった……時間大丈夫？"
2005806-9 = "「エリカが相談なんて珍しいと思って」……？"
2005806-10 = "……まあ、そうかも。#nあんまり悩み相談とかしないし。"
2005806-14 = "先生は……頼りになるっていうか、頼っても大丈夫な人だと思ってて。"
2005806-15 = "……なにその顔。嬉しそう。"
2005806-16 = "ま、まあ！とにかくそういうことだから。"
2005806-17 = "待ってる間に色々考えたんだけど……。"
2005806-18 = "ちょっとまだうまくまとまってないから……言葉が変かも。"
2005806-19 = "[s] \"いいよ、ゆっくりで。\""
2005806-20 = "うん……。"
2005806-24 = "ん～～っ……。"
2005806-25 = "……その、前からなんとなく思ってたんだけど。"
2005806-26 = "私、みんなと遊ぶのが好きなんだけどさ。"
2005806-27 = "一緒におしゃべりしたりカラオケ行ったり、ショッピングに行くのも好き。"
2005806-28 = "でもね……なんか。"
2005806-29 = "たまに……さ。"
2005806-30 = "会話が……途切れちゃうんだよね。"
2005806-31 = "あ、誤解しないでね。友達が悪いとかそういうのじゃなくて。#n私の問題っていうか。"
2005806-32 = "友達といること自体は全然嫌じゃないの、本当に。#n一緒にいると楽しいし。"
2005806-33 = "でもなんというか……。"
2005806-34 = "例えば。みんなでおしゃべりをしている時、誰かが面白いことを言ったとするじゃん？"
2005806-35 = "その時、「普段の私だったらこういうこと言っただろうなぁ」と頭では思うんだけど……。"
2005806-36 = "口から出てこなかったりするんだよね。"
2005806-37 = "どういえばいいのかちょっと分からないんだけど。#n言葉を口にする気力がない？って感じ。"
2005806-38 = "いや本当に気力がゼロってわけではないんだけど……。"
2005806-39 = "[ns] \"それ、たぶん……。\""
2005806-41 = "[ns] \"疲れてるんじゃない？\""
2005806-42 = "疲れてるのかな……？"
2005806-43 = "[s1] \"エネルギーの量は決まってるからね。\"\n[s2] \"それを使い切ったから、疲れたんじゃないかな。\""
2005806-46 = "使い切ることって、あるのかな……？#nあんまり無理したつもりはないんだけどね。"
2005806-47 = "「遊ぶのにも体力がいる」……？"
2005806-48 = "「誰かに会うことにもエネルギーが必要」……？"
2005806-49 = "[s3] \"そういう時は、一人の時間を持ってみるのもいいかもね。\"\n[s4] \"「充電期間」みたいな。\""
2005806-52 = "充電って……私そんなに、疲れてるのかな……？"
2005806-53 = "別にそんな時間、必要だなんて、考えたことなかったけど……。"
2005806-54 = "みんなに会うと楽しいし、約束がある日は充実した日だったなーって思うんだけど。"
2005806-55 = "……。"
2005806-56 = "あー……？#nもしかして、そういうこと……？"
2005806-57 = "うわぁー……そっか。"
2005806-58 = "いま、ちょっと衝撃だった。"
2005806-59 = "そういうことなのかも……。"
2005806-60 = "私って……一人の時間が必要なタイプだったんだ……。"
2005806-61 = "[ns] \"たぶん、エリカは一人の時間も好きなんだと思うよ。\""
2005806-62 = "そ、そうなのかな？"
2005806-63 = "[s] \"一人でいる時によく会うでしょ？\""
2005806-64 = "あー……たしかに、そうだね。"
2005806-65 = "[s5] \"会った時のエリカは、別に寂しそうじゃなかったし。\"\n[s6] \"結構楽しそうに見えたというか。\""
2005806-71 = "そうだね……。"
2005806-72 = "一人でいる時にしかできないことも多いからね。"
2005806-73 = "だからかな……？#n一人で行く場所もあるんだよね。"
2005806-74 = "[s] \"エリカだけの秘密基地みたいな？\""
2005806-75 = "秘密基地……。"
2005806-76 = "[s] \"人には自分だけの秘密基地が必要だから。\""
2005806-77 = "そうかも……。"
2005806-78 = "そこに行くと気が楽になったんだけど……#nなんかようやく繋がった感じがするかも。"
2005806-79 = "私今までずっと、自分は社交的な人間だと思ってた……。"
2005806-80 = "違ったんだなぁ……なんか、ちょっとショック……。"
2005806-81 = "[s7] \"社交的とか、そうじゃないとか。\"\n[s8] \"あんまり関係ないんじゃないかな。ハッキリ分けられるものじゃないし。\""
2005806-84 = "……そうだね。一面しかないわけじゃない、か。"
2005806-85 = "どんな角度で見ても自分は自分……。"
2005806-86 = "友達と遊ぶのが好きな私も私。一人の時間が好きな私も、私。"
2005806-87 = "[ns9] \"関係を維持するのも大事だけど、\"\n[ns10] \"無理して他人に合わせて疲れてしまうのは違うからね。\"\n[ns11] \"きっとエリカの友達だって、無理してほしいわけじゃないと思うよ。\""
2005806-92 = "[ns] \"大事なのは、エリカらしくすることじゃないかな？\""
2005806-93 = "今のちょっと先生っぽかった。たまにいいこと言うよね。"
2005806-94 = "[s] \"大人ですからね！\""
2005806-95 = "相談してよかったかも。#nあースッキリした！"
2005806-96 = "私、ちょっとは自分に詳しくなれた気がする。"
2005806-97 = "自分で思っていた自分と違ってビックリしたけど……うん。#nこれも悪くない気がする。"
2005806-98 = "[s12] \"また何か悩みがあったら言ってね。\"\n[s13] \"いつでも相談に乗るから！利用してね。\""
2005806-104 = "利用っていい方はちょっと違うかも。#n私、今まで一度もそんな風に思ったことないよ？"
2005806-105 = "いや、先生の言ってる意味は、分かるけどさ……。"
2005806-106 = "そういう風に言われたら、傷つく生徒もいると思う。"
2005806-107 = "[s] \"あっ、ごめん。言い方が悪かったね。\""
2005806-108 = "まあ、次も相談に乗ってくれるということで。"
2005806-113 = "約束ね？"
2005806-114 = "[s] \"うん、約束。\""
2005806-115 = "はいっ、指切った。"
2005806-119 = "……。"
2005806-120 = "やっぱ、先生の手あったかいね。"
2005806-121 = "[s] \"エリカの手もやっぱり柔らかいよ。\""
2005806-125 = "あははっ、また言ってる。"
2005806-127 = "（エリカの相談を聞いたあとも、しばらく雑談を楽しんだ）"
