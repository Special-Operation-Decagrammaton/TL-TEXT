[translation]
10026060-1 = "第6話;調査ポイントD「忘れ去られた灯台」"
10026060-3 = "よいしょっ……"
10026060-4 = "まずは、ひとつ……。"
10026060-5 = "ふぅ……灯台の中も、思っていたより物が多いですね。"
10026060-6 = "聖徒会の方が使っていたと聞いて、もう少し整理されていると思っていたのですが……"
10026060-7 = "あれ……？"
10026060-8 = "先生、どうかされましたか？#n他のみなさんと一緒に行動していたのでは……？"
10026060-9 = "[s1] \"ヒナタ一人じゃ大変だと思って……\"\n[s2] \"なにか力になれないかな？\""
10026060-12 = "そ、そんな……！大丈夫です。#nそこまで気を使っていただいては、申し訳ないですし……"
10026060-13 = "普段から物品の管理で慣れていますから、問題ありませんよ。"
10026060-14 = "で、ですが……先生の立場からしてみれば、危なっかしくて不安ですよね……。"
10026060-15 = "立場なんて関係なく、ですか……？"
10026060-16 = "……ふふ。"
10026060-17 = "そうですね。ここまで言ってくださっているのに、断るのも申し訳ないですし……"
10026060-18 = "お言葉に甘えて、手伝っていただいてもよろしいでしょうか？"
10026060-19 = "でも、大きい物は私にお任せくださいね。"
10026060-23 = "……それでは、お願いします。"
10026060-25 = "（その後、ヒナタと一緒に手がかりを灯台の外へ運び出した）"
10026060-26 = "ふぅ……今ので最後でしたね。"
10026060-27 = "みなさんは、まだ内部の調査を続けるみたいなので……#n私たちはここで待っていましょうか？"
10026060-28 = "本当にお疲れ様でした、先生。改めて、感謝いたします。"
10026060-32 = "……ん？いま、何か変な音がしませんでしたか……？"
10026060-39 = "……！"
10026060-40 = "やっぱり……ここにも！"
10026060-49 = "これは……完全に包囲されてしまいましたね。#nまさか、ここまで多いとは思いませんでした。"
10026060-50 = "……え？"
10026060-51 = "他の方々も呼んだ方が良さそう、ですか……？"
10026060-52 = "うーん……それは……"
10026060-56 = "[ns3] \"……ヒナタ？\"\n[ns4] \"どうかしたの？\""
10026060-59 = "あ、えっと……その、何名いらっしゃるのか確認してました。"
10026060-60 = "ウイさんたちには、なるべく調査に集中してほしくて……"
10026060-61 = "なので……私だけでなんとかならないかな……と。"
10026060-65 = "[ns] \"…………？？？\""
10026060-67 = "[ns5] \"えっ、1人で戦うってこと？\"\n[ns6] \"少なくとも数十人は居るよね……！？\""
10026060-70 = "そ、そうですが……"
10026060-71 = "聖堂では、色々ありますし……この程度の戦闘なら、日常的に……"
10026060-72 = "あれ、何かおかしかったでしょうか……？"
10026060-73 = "こ、これくらいの戦闘、よくありますよね！？"
10026060-78 = "……き、来ます！"
10026060-79 = "ここは私が食い止めます！先生、よろしければ……"
10026060-80 = "[s7] \"分かった、準備はいい？\"\n[s8] \"任せて、指揮は私が執るから。\""
10026060-83 = "……はい！"
10026060-87 = "ありがとうございます、先生！！"
