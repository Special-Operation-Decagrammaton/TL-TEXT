[translation]
10026060-1 = "Episódio 6; Ponto de Investigação D: \"O Farol Esquecido\""
10026060-3 = "Heave-ho..."
10026060-4 = "Primeiro, um..."
10026060-5 = "Ufa... Há mais coisas dentro deste farol do que eu imaginava."
10026060-6 = "Ouvi dizer que o pessoal do Conselho Estudantil o utilizava, então pensei que estaria um pouco mais organizado..."
10026060-7 = "Hm...?"
10026060-8 = "Sensei, aconteceu alguma coisa? #nVocê não deveria estar com os outros...?"
10026060-9 = "[s1] \"Achei que seria difícil para a Hinata fazer tudo sozinha...\"\n[s2] \"Posso ajudar em algo?\""
10026060-12 = "O-oh, não precisa...! Está tudo bem. #nSinto muito por incomodá-lo com algo assim..."
10026060-13 = "Estou acostumada a gerenciar suprimentos, então não há problema algum."
10026060-14 = "M-mas... do ponto de vista do Sensei, deve parecer perigoso e preocupante, não é...?"
10026060-15 = "Independente da minha posição, é isso...?"
10026060-16 = "...Hehe."
10026060-17 = "Entendo. Já que você insistiu tanto, seria indelicado recusar..."
10026060-18 = "Se não for pedir muito, poderia me ajudar?"
10026060-19 = "Mas, por favor, deixe as coisas pesadas comigo."
10026060-23 = "...Então, conto com você."
10026060-25 = "(Depois disso, levei as pistas para fora do farol junto com a Hinata)"
10026060-26 = "Ufa... Esse foi o último."
10026060-27 = "Parece que os outros ainda vão continuar a investigação lá dentro... #nDevemos esperar aqui?"
10026060-28 = "Muito obrigada pelo seu trabalho duro, Sensei. Agradeço novamente."
10026060-32 = "...Hm? Você não ouviu um barulho estranho agora pouco...?"
10026060-39 = "...!"
10026060-40 = "Como eu pensei... aqui também!"
10026060-49 = "Isso é... fomos completamente cercados. #nEu não esperava que houvesse tantos assim."
10026060-50 = "...Eh?"
10026060-51 = "Você acha que deveríamos chamar os outros...? "
10026060-52 = "Hmm... isso é..."
10026060-56 = "[ns3] \"...Hinata?\"\n[ns4] \"O que houve?\""
10026060-59 = "Ah, bem... é que eu estava verificando quantos inimigos há."
10026060-60 = "Eu queria que a Ui e os outros pudessem se concentrar na investigação..."
10026060-61 = "Por isso... pensei se eu não conseguiria dar conta sozinha..."
10026060-65 = "[ns] \"…………？？？\""
10026060-67 = "[ns5] \"Espera, você quer lutar sozinha?\"\n[ns6] \"Tem pelo menos umas dezenas deles, não tem...?\""
10026060-70 = "B-bem, sim, mas..."
10026060-71 = "Na catedral, acontecem muitas coisas... Esse nível de combate é algo cotidiano..."
10026060-72 = "Ah, eu disse algo estranho...?"
10026060-73 = "E-esse nível de combate é comum, não é!?"
10026060-78 = "...E-eles estão vindo!"
10026060-79 = "Eu vou segurá-los aqui! Sensei, se não se importar..."
10026060-80 = "[s7] \"Entendido, está pronta?\"\n[s8] \"Deixe comigo, eu cuidarei do comando.\""
10026060-83 = "...Sim!"
10026060-87 = "Muito obrigada, Sensei!!"
