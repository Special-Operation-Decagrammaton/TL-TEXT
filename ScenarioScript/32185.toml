[translation]
32185-2 = "......Sério, isso não tem a menor graça."
32185-3 = "......Por quê?"
32185-4 = "A Irmandade não mexeu um dedo quando a Seia-chan foi atacada... e logo agora elas resolvem intervir? É brincadeira."
32185-5 = "......Onde foi que eu calculei mal?"
32185-6 = "......Será que eu subestimei a Hanako-chan?"
32185-7 = "......"
32185-8 = "Não, eu sabia muito bem do que a 'Urawa Hanako' era capaz. Mas, não sei quando, ela tinha virado alguém inofensiva. A ponto de eu nem precisar colocar ela na equação."
32185-9 = "......Foi porque a Azusa-chan me traiu?"
32185-10 = "......"
32185-11 = "Não, a Azusa-chan era só uma marionete. Ela traindo ou não, o resultado final seria o mesmo."
32185-12 = "......A Hifumi-chan é só uma garota super normal, e a Koharu-chan é só uma bobinha, não é? Nenhuma delas faria diferença."
32185-13 = "Mas então... como é que eu fui perder...?"
32185-14 = "Onde foi que tudo saiu dos trilhos?"
32185-15 = "[s] \"......\""
32185-16 = "......Pensando bem, eu esqueci da maior variável de todas."
32185-17 = "O Sensei da Schale... é, pois é. Parando pra pensar, eu perdi no momento em que te trouxe pra cá."
32185-18 = "A Nagi-chan tava surtando com essa história de traidor, e eu pensei 'fazer o quê' e achei que seria a desculpa perfeita chamar a 'Schale'... ah, então foi aí."
32185-19 = "Nossa... não dou uma dentro mesmo..."
32185-20 = "Haa......"
32185-21 = "Mika-san, a Seia-chan..."
32185-22 = "......Eu não queria matar ela, de verdade. Tudo que eu disser agora vai soar como desculpa, mas..."
32185-23 = "Deve ter sido um acidente. A Seia-chan já tinha a saúde fraca, pra começo de conversa... e também..."
32185-24 = "......A Seia-chan está a salvo."
32185-25 = "......!?"
32185-26 = "A morte dela foi forjada esse tempo todo."
32185-27 = "Como não encontramos o culpado pelo ataque, achamos que, por segurança... era melhor ela ficar escondida fora da Trinity."
32185-28 = "A Seia-chan... tá salva...?"
32185-29 = "Sim. Ela ainda não acordou porque os ferimentos não cicatrizaram totalmente, mas... a Capitã dos Cavaleiros Hospitalários está ao lado dela protegendo-a neste exato momento."
32185-30 = "A Capitã Mine...?"
32185-31 = "Sim. E quem salvou a Seia-chan naquele dia foi..."
32185-32 = "......"
32185-33 = "......não, acho melhor deixar que ela mesma te conte depois."
32185-34 = "......Entendi. Ela tá viva, então..."
32185-35 = "......Graças a Deus."
32185-41 = "......Eu me rendo. Eu perdi."
32185-42 = "Parabéns, Clube de Reposição... e Sensei. Vou dar a vitória pra vocês."
32185-43 = "Eu não ligo mais, podem fazer o que quiserem comigo."
32185-44 = "......"
32185-45 = "......Azusa-chan. Você tem noção do que acabou de fazer e das consequências disso pro seu futuro, né?"
32185-46 = "Claro."
32185-47 = "......Você acha que a Trinity vai te proteger?"
32185-48 = "Você vai ser caçada pelo resto da vida. Não importa aonde você vá."
32185-49 = "......Será que um dia você vai conseguir dormir em paz de novo?"
32185-50 = "......E além disso, você acha que consegue fugir da Saori? Sendo de Arius, você com certeza conhece a frase, et omnia vanitas..."
32185-51 = "Eu sei. Mas mesmo assim, eu vou lutar com unhas e dentes até o fim. Até o último momento."
32185-55 = "......É, entendi."
32185-61 = "[ns] \"Mika......\""
32185-62 = "Sabe, eu não quero ouvir nada de você agora, Sensei..."
32185-63 = "Meu maior erro com certeza foi ter envolvido a Schale."
32185-64 = "É, mas..."
32185-66 = "[ns] \"Lógico, eu também tô do seu lado, Mika.\""
32185-69 = "......Quando eu escutei você falar isso, eu fiquei muito, muito feliz mesmo."
32185-70 = "Se, naquela hora, eu..."
32185-71 = "......Deixa pra lá, esquece."
32185-72 = "Tchauzinho, Sensei."
32185-79 = "Próximo Episódio; O 3º Exame Especial de Proficiência"