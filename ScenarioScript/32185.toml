[translation]
32185-2 = "……Que é isso, não tá com nada de brincadeira."
32185-3 = "……Por quê?"
32185-4 = "Mesmo quando a Seia foi atacada, ela não se moveu…… e, justo agora, a Sisterhood intervir, é brincadeira demais."
32185-5 = "……O que foi que eu calculei errado."
32185-6 = "……Foi por ter subestimado a Hanako?"
32185-7 = "……."
32185-8 = "Não; que a \"Hanako Urawa\" é uma existência fora do comum, eu sabia. Mas, em algum momento, ela virou uma existência inofensiva. A ponto de eu não precisar calculá-la como variável."
32185-9 = "……Foi porque a Azusa traiu?"
32185-10 = "……."
32185-11 = "Não; a Azusa era só uma marionete. Trair ou não trair, no resultado que eu queria, não fazia diferença nenhuma."
32185-12 = "……A Hifumi é só uma garota comum, e a Koharu é só uma tontinha, né? Não eram existências que virassem variável."
32185-13 = "E, mesmo assim, por que é que eu perco……."
32185-14 = "Onde foi que saiu do trilho."
32185-15 = "[s] \"……\""
32185-16 = "……Aliás, eu esqueci a maior variável de todas, né."
32185-17 = "O Sensei, da Schale…… sim, é isso. Pensando bem, com certeza, no instante em que eu te trouxe, eu já tinha perdido."
32185-18 = "Como a Nagi ficava fazendo alarde de que tinha um traidor, eu, \"não tem jeito\", achei que dava certinho e liguei pra \"Schale\"…… ah, foi ali, né."
32185-19 = "Ié…… não presto, eu……."
32185-20 = "Haa……."
32185-21 = "Mika, a Seia……."
32185-22 = "……De verdade, eu não tinha intenção de matar. Qualquer coisa que eu diga agora vira desculpa, mas……."
32185-23 = "Provavelmente foi acidente. A Seia, de origem, era fraca de saúde, e…… além disso……"
32185-24 = "……A Seia está bem."
32185-25 = "……!?"
32185-26 = "Esse tempo todo, foi tudo encenação."
32185-27 = "Como o culpado do ataque não foi encontrado, também pela segurança…… ela está escondida fora de Trinity."
32185-28 = "A Seia…… está bem……?"
32185-29 = "Sim. As feridas não saram e ela ainda não acordou, mas…… a comandante da Ordem dos Cavaleiros de Socorro, ainda agora, está bem ao lado dela, protegendo."
32185-30 = "A comandante Mine……?"
32185-31 = "Sim. E, naquela hora, quem salvou a Seia foi……"
32185-32 = "……."
32185-33 = "……Não, isto é melhor que venha direto da boca da própria pessoa."
32185-34 = "……Ah, sei. Então ela estava viva……."
32185-35 = "……Que bom."
32185-41 = "……Eu me rendo. Eu perdi."
32185-42 = "Parabéns, Clube de Aulas de Reforço…… e Sensei. Vou deixar registrado que a vitória é de vocês."
32185-43 = "Já tanto faz; comigo, façam o que quiserem."
32185-44 = "……."
32185-45 = "……Azusa. O que você está fazendo, e o que vai ser de você daqui pra frente por causa disso. Você sabe disso, né?"
32185-46 = "Claro."
32185-47 = "……Você acha que Trinity vai te proteger?"
32185-48 = "De agora em diante, você vai ser perseguida pra sempre. O tempo todo, aonde quer que vá."
32185-49 = "……Será que vai chegar um dia em que você durma tranquila?"
32185-50 = "……Além disso, você acha que vai conseguir escapar da Saori? Sendo da Arius, é claro que você sabe: et omnia vanitas……"
32185-51 = "Sim, eu sei. Ainda assim, eu vou lutar até o fim, até o último instante."
32185-55 = "……Sim, sei."
32185-61 = "[ns] \"Mika……\""
32185-62 = "Agora, do Sensei, eu não quero ouvir nada……."
32185-63 = "No fim, envolver a Schale foi o meu maior erro."
32185-64 = "Sim, mas……"
32185-66 = "[ns] \"Claro; também sou aliado da Mika.\""
32185-69 = "……Quando eu ouvi aquelas palavras, eu fiquei, de verdade, de verdade feliz."
32185-70 = "Naquela hora, se……"
32185-71 = "……Não, deixa pra lá, não é nada."
32185-72 = "Tchau, Sensei."
32185-79 = "Próximo Episódio;3º Exame Especial de Aptidão"
