[translation]
32185-2 = "……O que é isso? Isso não tem a menor graça."
32185-3 = "……Por quê?"
32185-4 = "Mesmo quando a Seia-chan foi atacada, eles não se moveram… que a Sisterhood intervenha exatamente agora, isso já passa dos limites da piada."
32185-5 = "……Onde foi que eu calculei errado?"
32185-6 = "……Foi por ter subestimado a Hanako-chan?"
32185-7 = "……."
32185-8 = "Não, eu sabia que a Urawa Hanako era uma existência absurda. Mas, em algum momento, ela se tornou inofensiva. A ponto de não precisar ser calculada como uma variável."
32185-9 = "……Foi porque a Azusa-chan me traiu?"
32185-10 = "……."
32185-11 = "Não, a Azusa-chan é apenas uma marionete. Traindo ou não, isso não mudava nada no resultado que eu desejava."
32185-12 = "……A Hifumi-chan é só uma garota comum, e a Koharu-chan é só uma boba, né? Elas não eram existências que pudessem se tornar variáveis."
32185-13 = "Mesmo assim, por que eu perdi……."
32185-14 = "Onde foi que as coisas saíram do trilho?"
32185-15 = "[s] \"……。\""
32185-16 = "……Falando nisso, eu esqueci da maior variável de todas."
32185-17 = "O Sensei do Schale… é, verdade. Pensando bem, com certeza, no momento em que eu trouxe você, eu já tinha perdido."
32185-18 = "A Nagi-chan ficou fazendo barulho sobre ter um traidor, então eu pensei: 'não tem jeito' e 'parece conveniente', e entrei em contato com o Schale… ah, foi naquela hora, né."
32185-19 = "Ai, ai… não dá, eu sou um desastre……."
32185-20 = "Haa……."
32185-21 = "Mika-san, a Seia-chan está……."
32185-22 = "……Eu realmente não tinha a intenção de matá-la. Não importa o que eu diga agora, vai soar como desculpa, mas……."
32185-23 = "Provavelmente foi um acidente. A Seia-chan já tinha a saúde frágil, e além disso……"
32185-24 = "……A Seia-chan está bem."
32185-25 = "……!?"
32185-26 = "Nós estivemos forjando a situação o tempo todo."
32185-27 = "Como não encontramos o culpado pelo ataque, e também por segurança… ela está se escondendo fora de Trinity."
32185-28 = "A Seia-chan… está bem……?"
32185-29 = "Sim. Os ferimentos não cicatrizaram e ela ainda não acordou, mas a líder da Divisão de Socorro está protegendo-a ao lado dela até agora."
32185-30 = "A Mine-danchou está……?"
32185-31 = "Sim. E naquela época, quem salvou a Seia-chan foi……"
32185-32 = "……."
32185-33 = "……Não, é melhor que isso venha da boca dela mesma."
32185-34 = "……Entendi. Ela estava viva……."
32185-35 = "……Que bom."
32185-41 = "……Eu me rendo. Eu perdi."
32185-42 = "Parabéns, Clube de Estudos Suplementares… e Sensei. Vou deixar que digam que vocês venceram."
32185-43 = "Tanto faz agora, façam o que quiserem comigo."
32185-44 = "……."
32185-45 = "……Azusa-chan. Você sabe o que está fazendo e quais serão as consequências disso daqui para frente, não sabe?"
32185-46 = "Com certeza."
32185-47 = "……Você acha mesmo que Trinity vai te proteger?"
32185-48 = "Você será perseguida para sempre a partir de agora. Não importa para onde vá."
32185-49 = "……Será que chegará o dia em que você poderá dormir tranquila?"
32185-50 = "……Além disso, você acha que consegue escapar da Saori? Se você é de Arius, com certeza sabe, et omnia vanitas……"
32185-51 = "Sim, eu sei. Mesmo assim, eu vou lutar até o fim, até o último momento."
32185-55 = "……É, entendi."
32185-61 = "[ns] \"Mika……。\""
32185-62 = "Agora eu não quero ouvir nada do Sensei……."
32185-63 = "No fim das contas, envolver o Schale foi o meu maior erro."
32185-64 = "É, mas……"
32185-66 = "[ns] \"Claro, eu também estou do lado da Mika.\""
32185-69 = "……Quando ouvi aquelas palavras, eu fiquei realmente, muito feliz."
32185-70 = "Naquela hora, se eu tivesse……"
32185-71 = "……Não, esquece, não é nada."
32185-72 = "Tchau, Sensei."
32185-79 = "Próximo episódio: 3º Exame Acadêmico Especial"
