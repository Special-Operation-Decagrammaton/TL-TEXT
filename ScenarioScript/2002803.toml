[translation]
2002803-1 = "Caminhando por onde não há estrada"
2002803-2 = "（Enquanto caminho perto da base para procurar a Hinata...）"
2002803-6 = "（Encontro a Hinata caminhando pela floresta carregando uma quantidade enorme de bagagem）"
2002803-10 = "Heave... isso vai ali..."
2002803-15 = "É bem mais leve do que eu pensava..."
2002803-16 = "E comparado à catedral, parece ter menos quantidade...?"
2002803-20 = "……Hm?"
2002803-24 = "……Uau!? P-Sensei...!?"
2002803-25 = "D-desde quando você está aí!?"
2002803-26 = "A-acabei de chegar..."
2002803-27 = "Entendo, foi isso então..."
2002803-28 = "Eh? Para me ajudar...?"
2002803-29 = "Não precisa! Eu disse agorinha que estava tudo bem!"
2002803-30 = "Outras pessoas também se ofereceram e foi difícil recusar, agora até você, Sensei..."
2002803-31 = "Desse jeito... por minha causa, acabei aumentando o trabalho de todo mundo..."
2002803-32 = "Eu sou tão inútil..."
2002803-33 = "[s1] \"Eu faço porque gosto, não se preocupe.\"\n[s2] \"Não seria justo deixar tudo nas mãos da Hinata.\""
2002803-36 = "Uuu... mesmo você dizendo isso..."
2002803-37 = "……Recusar agora seria falta de educação, não é?"
2002803-42 = "Então..."
2002803-43 = "Pode me ajudar, por favor?"
2002803-48 = "S-só as coisas leves, viu? Deixe as bagagens pesadas comigo."
2002803-49 = "Tudo bem?"
2002803-50 = "[s3] \"Entendido, tome cuidado para não se machucar, Hinata!\"\n[s4] \"Agora estou junto com a Hinata!\""
2002803-53 = "…………Fufu."
2002803-54 = "Fufu, fufufu..."
2002803-58 = "Desculpe. Fufu, acabei rindo sem querer..."
2002803-59 = "Não sei bem o porquê, mas de repente me senti feliz e..."
2002803-60 = "Isso também é gentileza sua, Sensei. Obrigada pela preocupação."
2002803-64 = "Bem, vamos indo? Já que você se deu ao trabalho de ajudar, seria contraproducente se demorássemos mais por causa disso."
2002803-65 = "Vou na frente."
2002803-66 = "……Heave!"
2002803-75 = "……Oh?"
2002803-76 = "[s5] \"Uma pedra enorme...\"\n[s6] \"Desse jeito, não vamos conseguir passar.\""
2002803-79 = "Para voltar à base, este deveria ser o caminho mais curto, mas..."
2002803-80 = "……Eh? Vamos dar a volta?"
2002803-81 = "Não,"
2002803-82 = "acho que não precisa."
2002803-83 = "Não parece que colocaram essa pedra aqui para bloquear o caminho, acho que consigo tirá-la."
2002803-84 = "[s] \"Ah, é mesmo...\""
2002803-88 = "[ns7] \"……O que você disse agora?\"\n[ns8] \"Vai fazer o quê?\""
2002803-91 = "Espere um pouco. Vou deixar a bagagem aqui... pronto."
2002803-96 = "Se for só isso, é só fazer assim... hnnn...!"
2002803-100 = "Hmph...! Heave... ho!"
2002803-109 = "……Ufa, agora não tem problema."
2002803-114 = "Desculpe a espera, vamos?"
2002803-118 = "[ns] \"…….\""
2002803-123 = "Oh, agora tem uma árvore caída bloqueando o caminho..."
2002803-127 = "Deve ter chegado ao fim de sua vida."
2002803-128 = "Parece difícil mover isso..."
2002803-129 = "……Hein? Desta vez vamos dar a volta?"
2002803-130 = "Fufu... É certamente uma boa ideia, mas sinto muito em fazer o Sensei caminhar tanto."
2002803-131 = "Hmm... O que devemos fazer?"
2002803-135 = "Ah, se fosse uma rocha talvez fosse difícil, mas se for uma árvore...?"
2002803-139 = "……Hmph!!"
2002803-148 = "[ns9] \"Uma árvore tão grossa, cortada ao meio tão facilmente...\"\n[ns10] \"………E-er, bem.\""
2002803-151 = "……Ufa! Não era tão dura quanto eu pensava. Tivemos sorte!"
2002803-152 = "Vamos, Sensei! Vamos lá. Falta pouco para chegarmos à base!"
2002803-156 = "……Hm?"
2002803-157 = "……Sensei? Por que está com essa cara? Aconteceu alguma coisa?"
2002803-158 = "[s] \"……Hinata.\""
2002803-159 = "S-sim...?"
2002803-165 = "[ns11] \"Eu sempre serei profundamente grato a você, Hinata.\"\n[ns12] \"S-se precisar de qualquer coisa, pode falar com o Sensei a qualquer momento.\""
2002803-170 = "E-er...?"
2002803-171 = "S-sim... muito... obrigada...?"
2002803-175 = "……？？？"
2002803-177 = "(Depois disso, voltei para a base junto com a Hinata, que estava com um ponto de interrogação flutuando sobre a cabeça.)"
2002803-178 = "(Senti que era melhor não mencionar o fato de que ela moveu uma rocha com as próprias mãos e partiu uma árvore ao meio como se fosse a coisa mais natural do mundo...)"
