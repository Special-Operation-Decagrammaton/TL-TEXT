[translation]
2002803-1 = "道なき道を"
2002803-2 = "（ヒナタを探すために、拠点近くを歩いていると……）"
2002803-6 = "（ものすごい量の荷物を抱えて、森を歩いているヒナタの姿を見つけた）"
2002803-10 = "よいしょ……これは、あっちに……。"
2002803-15 = "思ったよりも、ずっと軽いですね……"
2002803-16 = "それに、聖堂と比べて、量が少ないような……？"
2002803-20 = "……ん？"
2002803-24 = "……わっ！？せ、先生……！？"
2002803-25 = "い、いつの間に、いらっしゃったのですか！？"
2002803-26 = "き、来たばかり……"
2002803-27 = "なるほど、そうでしたか……。"
2002803-28 = "え？私の手伝いに……？"
2002803-29 = "そんな！大丈夫ですと、先ほどお伝えしたのに！"
2002803-30 = "他の方々にもお声がけいただいて、断るのが大変だったのに、先生まで……"
2002803-31 = "これでは……私のせいで、みなさんの仕事を増やしてしまっているような……"
2002803-32 = "私が不甲斐ないばかりに……"
2002803-33 = "[s1] \"好きでやってるから、気にしないで。\"\n[s2] \"ヒナタに任せっきりじゃ悪いし。\""
2002803-36 = "うぅ……そのように言っていただいてるのに……"
2002803-37 = "……これで断るのも、逆に失礼ですよね。"
2002803-42 = "それでは……"
2002803-43 = "お願いしても良いでしょうか？"
2002803-48 = "か、軽いものだけ、ですからね。重い荷物は、私にお任せください。"
2002803-49 = "よろしいですか？"
2002803-50 = "[s3] \"分かった、ヒナタも怪我しないようにね！\"\n[s4] \"これでヒナタと一緒だ！\""
2002803-53 = "…………ふふっ。"
2002803-54 = "ふふ、ふふふっ……。"
2002803-58 = "ごめんなさい。ふふ、思わず、笑ってしまいました……。"
2002803-59 = "よく分からないのですが、なんだか楽しくなってしまって、つい……。"
2002803-60 = "これも、先生の優しさですよね。お気遣い、ありがとうございます。"
2002803-64 = "では、そろそろ行きましょうか。せっかく先生が手伝ってくださるのに、かえって時間がかかるようでは本末転倒ですから。"
2002803-65 = "私が先に歩きますね。"
2002803-66 = "……よいしょ！"
2002803-75 = "……あら？"
2002803-76 = "[s5] \"大きな岩が……。\"\n[s6] \"これじゃあ、通れそうにないね。\""
2002803-79 = "拠点まで戻るには、この道を通るのが一番近いはずなのですが……"
2002803-80 = "……え？回り道をするのですか？"
2002803-81 = "いえ、"
2002803-82 = "その必要はないかと。"
2002803-83 = "道を塞ぐ目的で置かれた岩ではないようですし、これくらいなら退けられると思います。"
2002803-84 = "[s] \"ああ、そう……\""
2002803-88 = "[ns7] \"……今、なんて言ったの？\"\n[ns8] \"何をどうするって？\""
2002803-91 = "少々お待ちください。一度、荷物は置いて……と。"
2002803-96 = "この程度でしたら、こうして……んんっ……！"
2002803-100 = "ふっ……！よい……しょっと！"
2002803-109 = "……ふぅ、これで問題ありませんね。"
2002803-114 = "お待たせしました、行きましょうか。"
2002803-118 = "[ns] \"……。\""
2002803-123 = "あら、今度は倒木が道を塞いで……"
2002803-127 = "寿命を全うしたのでしょう。"
2002803-128 = "これを動かすのは、難しそうですね……"
2002803-129 = "……はい？今度こそ回り道ですか？"
2002803-130 = "ふふっ……たしかに良い案ですが、先生をそんなに歩かせるのは申し訳ないです。"
2002803-131 = "んー……どうしましょう？"
2002803-135 = "あっ、岩なら難しかったかもしれませんが、木だったら……？"
2002803-139 = "……ふんっ！！"
2002803-148 = "[ns9] \"あんな太い木が、こうもあっさり真っ二つに……。\"\n[ns10] \"………え、ええっと。\""
2002803-151 = "……ふぅ！思いのほか、硬くありませんでした。運が良かったですね！"
2002803-152 = "さあ、先生！行きましょう。拠点まで、あともう少しです！"
2002803-156 = "……ん？"
2002803-157 = "……先生？そんな顔をされて、どうかしましたか？"
2002803-158 = "[s] \"……ヒナタ。\""
2002803-159 = "は、はい……？"
2002803-165 = "[ns11] \"ヒナタには、いつも心から感謝してるよ。\"\n[ns12] \"な、何かあったら、いつでも先生に言ってね。\""
2002803-170 = "え、えっと……？"
2002803-171 = "は、はい……ありがとう……ございます……？"
2002803-175 = "……？？？"
2002803-177 = "（その後、頭の上にクエスチョンマークを浮かべたヒナタと一緒に、拠点へ戻った）"
2002803-178 = "（当然のように素手で岩を退かし、倒木を真っ二つにしたことには、触れない方が良い気がした……）"
