[translation]
2601002-1 = "O Atirador do Cais"
2601002-2 = "Cais da Vila de Pescadores"
2601002-3 = "（No dia seguinte, fui até o cais onde Miyu disse que estaria treinando.）"
2601002-4 = "（Havia vários pescadores, mas não consegui encontrar a Miyu.）"
2601002-5 = "……Ué?"
2601002-6 = "Sensei……?"
2601002-7 = "[s1] \"……Miyu?\"\n[s2] \"De onde vem essa voz, afinal……?\""
2601002-10 = "Estou aqui, Sensei…… na ponta do píer……."
2601002-11 = "Por aqui……."
2601002-14 = "[ns] \"Então você estava aí.\""
2601002-15 = "[wa:600]― [log=미유 수영복]Hehe, [wa:1200]nem o Sensei [wa:700]percebeu de imediato, [/log]"
2601002-17 = "[wa:100]― [log=미유 수영복]parece que foi [wa:500]perfeito desta vez também.[/log]"
2601002-20 = "[wa:1800]― [log=미유 수영복]Como dizem que para esconder uma árvore [wa:1000]deve-se estar na floresta……[/log]"
2601002-23 = "[wa:100]― [log=미유 수영복]Para me misturar [wa:900]entre os pescadores,[/log]"
2601002-25 = "― [log=미유 수영복]pescar é [wa:800]o mais natural.[/log]"
2601002-28 = "[wa:1700]― [log=미유 수영복]……As gaivotas e aves marinhas [wa:1300]ficam tentando pousar na minha cabeça,[/log]"
2601002-30 = "[wa:200]― [log=미유 수영복]o que é um pouco incômodo, mas……[/log]"
2601002-33 = "― [log=미유 수영복]esse tipo de coisa…… [wa:1700]eu já estou acostumada…….[/log]"
2601002-35 = "― [log=미유 수영복]Hehe, [wa:1600]hehehe……[/log]"
2601002-38 = "[wa:1800]― [log=미유 수영복]Como tinha [wa:500]equipamento de pesca aqui, [wa:1200]escolhi este lugar, mas[/log]"
2601002-40 = "[wa:100]― [log=미유 수영복]é um lugar perfeito [wa:1200]para se esconder, não é?[/log]"
2601002-43 = "― [log=미유 수영복]A vista também [wa:700]é boa, e[/log]"
2601002-45 = "― [log=미유 수영복]é ideal para [wa:1800]monitorar os arredores.[/log]"
2601002-48 = "― [log=미유 수영복]O vento é fresco, então [wa:2200]não está quente, e[/log]"
2601002-50 = "― [log=미유 수영복]também tem um [wa:500]chapéu de palha para o sol……[/log]"
2601002-53 = "[wa:1600]― [log=미유 수영복]E, [wa:1300]além disso…… [wa:2300]hoje……[/log]"
2601002-56 = "― [log=미유 수영복]o, [wa:1400]o, [wa:1700]Sensei também……[/log]"
2601002-58 = "― [log=미유 수영복]……está aqui perto.[/log]"
2601002-62 = "Uah……!?"
2601002-63 = "De, desculpe……!#nEu não sabia que você estava aí……!"
2601002-64 = "N-não, a culpa é minha por ter uma presença tão fraca……."
2601002-65 = "[s] \"Miyu, você está bem?\""
2601002-66 = "……Sim. Só me assustei com o barulho……"
2601002-67 = "Minha presença é tão fraca que até aqui os pescadores encostam o barco na minha frente……#ne as aves marinhas se reúnem ao meu redor, então……"
2601002-68 = "Eu não consigo me concentrar muito na pescaria……"
2601002-69 = "Mas, como é sempre assim, eu já estou acostumada…… hehe……."
2601002-70 = "[s5] \"P-pense pelo lado positivo!\"\n[s6] \"Como você está infiltrada, talvez seja até uma vantagem!\""
2601002-73 = "S-será mesmo……"
2601002-79 = "……Ué?"
2601002-80 = "……E-essa sensação……?"
2601002-81 = "[s7] \"Está puxando……!\"\n[s8] \"É uma fisgada! É uma fisgada, Miyu!\""
2601002-84 = "Ugh…… preciso girar a manivela rápido……!"
2601002-85 = "Ngh……!#nÉ, é mais pesado do que eu pensava…… uuu……!!"
2601002-86 = "Augh……!!"
2601002-95 = "P-pesquei…………?"
2601002-97 = "……I-isso é……"
2601002-101 = "[ns9] \"……É um peixe grande.\"\n[ns10] \"Isso…… não é enorme?\""
2601002-104 = "……É, é mesmo?"
2601002-105 = "Na verdade, não tenho muita experiência com pesca no mar, então não sei bem, mas――"
2601002-109 = "……!#nEi, ei! Aquela aluna pescou algo incrível!"
2601002-110 = "Que peixe enorme!#nComo você conseguiu pescar uma presa tão grande assim!?"
2601002-111 = "Ah... b-bem, eu não entendo muito sobre isso..."
2601002-112 = "Ainda assim, é algo muito estranho."
2601002-113 = "Esse peixe é muito cauteloso, ele sente a presença humana e foge..."
2601002-114 = "Por acaso, você seria uma pescadora famosa...?"
2601002-115 = "N-não... eu não sou nada disso..."
2601002-116 = "Eu sou apenas alguém com uma presença muito apagada..."
2601002-117 = "[s11] \"É incrível que você tenha pescado um peixe tão cauteloso...\"\n[s12] \"Miyu, você tem um talento incrível.\""
2601002-120 = "N-não é para tanto..."
2601002-121 = "Conseguir lançar a linha de pesca sem deixar que sintam sua presença, eu morro de inveja."
2601002-122 = "É um talento que eu daria tudo para ter..."
2601002-123 = "Você passou por algum tipo de treinamento especial?"
2601002-128 = "Bem... eu, tipo... ah..."
2601002-129 = "Uwaaaa..."
2601002-131 = "（Depois disso, tirei Miyu do cais, já que ela entrou em pânico com a enxurrada de perguntas dos outros pescadores）"
