[translation]
2601002-1 = "船着き場の狙撃手"
2601002-2 = "漁村の船着き場"
2601002-3 = "（翌日、ミユが訓練をしているという船着き場に足を運んだ）"
2601002-4 = "（釣り人は複数いたが、ミユの姿は見当たらなかった）"
2601002-5 = "……あれ？"
2601002-6 = "先生……？"
2601002-7 = "[s1] \"……ミユ？\"\n[s2] \"この声は、一体どこから……？\""
2601002-10 = "ここです、先生……桟橋の端っこに……。"
2601002-11 = "こっちです……。"
2601002-14 = "[ns] \"そこに居たんだね。\""
2601002-15 = "[wa:600]― [log=미유 수영복]ふふっ、[wa:1200]先生も[wa:700]すぐに気づかないなんて、[/log]"
2601002-17 = "[wa:100]― [log=미유 수영복]今回も[wa:500]完璧みたいです。[/log]"
2601002-20 = "[wa:1800]― [log=미유 수영복]木を隠すには[wa:1000]森の中と言うように……[/log]"
2601002-23 = "[wa:100]― [log=미유 수영복]釣り人の中に[wa:900]溶け込むには、[/log]"
2601002-25 = "― [log=미유 수영복]釣りをするのが[wa:800]自然ですから。[/log]"
2601002-28 = "[wa:1700]― [log=미유 수영복]……カモメや海鳥が[wa:1300]ずっと頭に乗ろうとするのは、[/log]"
2601002-30 = "[wa:200]― [log=미유 수영복]ちょっと困りますが……[/log]"
2601002-33 = "― [log=미유 수영복]こういうの……。[wa:1700]慣れてますから……。[/log]"
2601002-35 = "― [log=미유 수영복]ふふ、[wa:1600]ふふふ……[/log]"
2601002-38 = "[wa:1800]― [log=미유 수영복]ちょうど[wa:500]釣り道具があったから[wa:1200]ここにしましたが、[/log]"
2601002-40 = "[wa:100]― [log=미유 수영복]潜伏するには[wa:1200]ぴったりな場所ですね。[/log]"
2601002-43 = "― [log=미유 수영복]見晴らしも[wa:700]良いですし、[/log]"
2601002-45 = "― [log=미유 수영복]周辺を監視するのにも[wa:1800]最適。[/log]"
2601002-48 = "― [log=미유 수영복]風が涼しいから[wa:2200]暑くもなくて、[/log]"
2601002-50 = "― [log=미유 수영복]日よけの[wa:500]麦わら帽子もありますし……[/log]"
2601002-53 = "[wa:1600]― [log=미유 수영복]そ、[wa:1300]そして……[wa:2300]今日は……[/log]"
2601002-56 = "― [log=미유 수영복]せ、[wa:1400]せ、[wa:1700]先生も……[/log]"
2601002-58 = "― [log=미유 수영복]……そばにいますから。[/log]"
2601002-62 = "うひゃっ……！？"
2601002-63 = "ご、ごめん……！#nそこにいたなんて……！"
2601002-64 = "い、いえ……影が薄い私が悪いので……。"
2601002-65 = "[s] \"ミユ、大丈夫？\""
2601002-66 = "……はい。音に、びっくりしただけです……"
2601002-67 = "ここでも存在感が薄すぎて、漁師さんが私の前に船を寄せたり……#n海鳥が集まってきたりするので……"
2601002-68 = "釣りに、あまり集中できなくって……"
2601002-69 = "でも、いつものことなので、私は慣れてますし……ふふ……。"
2601002-70 = "[s5] \"ま、前向きに考えよう！\"\n[s6] \"潜入中だから、むしろプラスかも！\""
2601002-73 = "そ、そうでしょうか……"
2601002-79 = "……あれ？"
2601002-80 = "……こ、この感覚は……？"
2601002-81 = "[s7] \"引いてる……！\"\n[s8] \"アタリだ！アタリだよ、ミユ！\""
2601002-84 = "うっ……早くハンドルを回さないと……！"
2601002-85 = "んむっ……！#nお、思った以上に、重いぃ……ううっ……！！"
2601002-86 = "あうっ……！！"
2601002-95 = "つ、釣れた…………？"
2601002-97 = "……こ、これは……"
2601002-101 = "[ns9] \"……大物だ。\"\n[ns10] \"これ……かなり大きいんじゃ？\""
2601002-104 = "……そ、そうなんですか？"
2601002-105 = "実は、あまり海釣りの経験がないので、よく分からないのですが――"
2601002-109 = "……！#nお、おいっ！あの生徒さんがすごいのを釣ったぞ！"
2601002-110 = "すごい大物じゃないか！#nこんなにデカい獲物、どうやって釣ったんだい！？"
2601002-111 = "ええっと……わ、私、あまり詳しくはなくて……"
2601002-112 = "それにしても、不思議なものだ。"
2601002-113 = "その魚は警戒心が強いから、人の気配を察知して逃げるのだが……"
2601002-114 = "もしかして、有名な釣り人だったりするのかい……？"
2601002-115 = "い、いえ……私なんて……"
2601002-116 = "ただ影が薄いだけの存在ですから……"
2601002-117 = "[s11] \"警戒心の強い大物が釣れるなんて……\"\n[s12] \"ミユはすごい才能を持ってるね。\""
2601002-120 = "そ、そんな……"
2601002-121 = "人の気配を感じさせずに釣り糸を垂らせるなんて、羨ましい限りだよ。"
2601002-122 = "喉から手が出るくらい欲しい才能だ……"
2601002-123 = "何か特別な訓練でも受けたりしたのかい？"
2601002-128 = "えっと……私は、その……あの……"
2601002-129 = "ふええぇ……"
2601002-131 = "（その後、釣り人たちからの質問攻めでパニックになったミユを連れて、船着き場を抜け出した）"
