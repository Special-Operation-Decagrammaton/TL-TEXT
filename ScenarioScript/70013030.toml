[translation]
70013030-1 = "Uma erva daninha não floresce sozinha (3)"
70013030-2 = "Quanto tempo esperei por este dia."
70013030-3 = "É um reencontro do destino! Vocês vão desaparecer aqui!"
70013030-9 = "Kufufu. Depois daquela humilhação, ainda não aprenderam, hein?"
70013030-10 = "Se não, vou contar nos mínimos detalhes a vergonha que passaram naquele dia para os seus subordinados?"
70013030-11 = "C-cala boca! Nós deixamos vocês viverem, e é assim que nos pagam...!"
70013030-16 = "Não estava com medo de viralizar."
70013030-17 = "Se quiserem, posso fazer agora."
70013030-18 = "M-malditos...!"
70013030-19 = "Ei! Acabem com eles de uma vez!"
70013030-31 = "Fufu, que bom. Ótimo."
70013030-32 = "Reencontrar velhos inimigos e acabar com eles... Isso também é hard-boiled...!"
70013030-33 = "Pessoal, vão com tudo!"
70013030-34 = "Sim, Aru-sama! Vou dar o troco pelaquele dia...!"
70013030-35 = "Uwaaah! Morram! Morram todos...!"
70013030-42 = "Guh! V-vamos recuar! Aproximar é perigoso!"
70013030-44 = "Kufufu, que bonito, todos juntinhos."
70013030-45 = "Vamos, pronto para estourar?"
70013030-46 = "...!"
70013030-56 = "Gwaaah...!"
70013030-58 = "Kyaha! Que nem pipoca!"
70013030-59 = "O-o que estão fazendo! Acabem logo!"
70013030-65 = "... Teimosos."
70013030-66 = "Presidente. O custo do reparo vai aumentar, pode pagar?"
70013030-67 = "Não me importo! O importante é vencermos!"
70013030-68 = "A história é escrita pelos vencedores, afinal!"
70013030-69 = "Acho que não é bem assim..."
70013030-70 = "Concordo com a presidente... temos que vencer a qualquer custo."
70013030-80 = "Fufu, já deu para brincar. Se continuarem, só vai piorar para vocês."
70013030-81 = "Kufufu, desta vez vou tirar umas fotos engraçadas e depois a gente encerra!"
70013030-84 = "M-merda...!"
70013030-85 = "O que... o que fazer...!"
70013030-86 = "Aquilo...? Isso!"
70013030-94 = "E-eek! M-me ajudem...!"
70013030-95 = "Chega! Quer que aconteça alguma coisa com ela!?"
70013030-103 = "S-se quiserem eles de volta vivos... se rendam!"
70013030-104 = "Que covardia! Fazer reféns...!"
70013030-106 = "Vamos, abaixem as armas! Isso não é brincadeira!"
70013030-113 = "(Aah...!)"
70013030-114 = "(Mas se eu abaixar a arma aqui... os meus funcionários vão ficar em perigo!)"
70013030-115 = "(Por outro lado, se a gente continuar lutando... os reféns...) "
70013030-116 = "(Ahhhhh...!)"
70013030-123 = "..."
70013030-124 = "Mutsumi, tem um elevador de carga pequeno naquela cozinha."
70013030-125 = "Vai com a Haruka por ali."
70013030-126 = "Hã? E a Aru-chan e a Kayoko-chan?"
70013030-127 = "Acho que não tem jeito... vamos ter que nos render por enquanto."
70013030-128 = "Você conhece o jeito da presidente, né? Ela não vai abandonar os reféns."
70013030-129 = "Quer dizer que... você entendeu [ruby=·    ·    ·    ·    ·]o recado[/ruby]?"
70013030-130 = "... Depois a gente recua e toma outra atitude? Ok!"
70013030-131 = "Haruka-chan! Vamos!"
70013030-136 = "Como? P-para onde vamos!?"
70013030-137 = "Vem comigo! Agora só temos isso a fazer!"
70013030-138 = "A-Aru-sama...!"
70013030-140 = "I-isso! Deixem conosco!"
70013030-141 = "Abaixamos as armas como vocês pediram! Agora deixem os nossos funcionários irem!"
70013030-142 = "E-ei... vocês estão de brincadeira...?"
70013030-143 = "Agora! Rápido...!"
70013030-154 = "Ah... ah... ufa."
70013030-155 = "Haruka-chan, está bem?"
70013030-156 = "A-Aru-sama... Desculpa. Desculpa mesmo... abandonei a senhora..."
70013030-157 = "É... eu não mereço viver! É melhor eu morrer logo..."
70013030-158 = "O que está dizendo! Vamos nos unir e resgatar as duas!"
70013030-159 = "A gente já derrotou esses caras antes, então vai dar certo de novo!"
70013030-160 = "M-mas daquela vez eu..."
70013030-163 = "Ah...! Achei!"
70013030-168 = "E-eek..."
70013030-169 = "Por que está fugindo? Espera!"
70013030-170 = "M-mas... se eu me envolver...!"
70013030-171 = "Tudo bem..."
70013030-172 = "S-sim...?"
70013030-176 = "Não se preocupa! Aqueles que estavam te atormentando, já dei uma lição neles!"
70013030-177 = "Os mafiosos também vão se acalmar agora."
70013030-179 = "C-como..."
70013030-184 = "Kufufu, a gente capturou e tirou umas fotos bem constrangedoras! E também fizemos eles assinarem um termo de compromisso. Pode ficar tranquila."
70013030-185 = "Olha! Você também, venha aqui e peça desculpas!"
70013030-192 = "M-malditos...!"
70013030-193 = "D-desculpa! Nós nunca mais vamos aparecer na frente da Haruka-sama!"
70013030-194 = "Daqui para frente, vamos refletir sobre nossos erros e viver de forma digna...!"
70013030-196 = "A-aah..."
70013030-197 = "Fufufu, que achou? Viu só a nossa capacidade?"
70013030-198 = "Não pode ser... que fizeram tudo isso de graça..."
70013030-199 = "E-eu... o que posso fazer por vocês!?"
70013030-200 = "D-dinheiro? M-mas agora..."
70013030-201 = "Não quero pagamento nenhum. Isso não seria hard-boiled."
70013030-202 = "Hard... boiled?"
70013030-203 = "Isso. Uma vilã por dia! Implacável! Uma fora-da-lei hard-boiled! Esse é o nosso lema."
70013030-204 = "Te ajudamos como parte disso. Não foi pelo dinheiro."
70013030-205 = "Então... levanta."
70013030-206 = "Agora você está livre!"
70013030-207 = "...!!"
70013030-209 = "Naquela vez... eu só recebi ajuda."
70013030-210 = "Foi quando decidi dar tudo de mim para a Aru-sama."
70013030-211 = "Jurei que faria qualquer coisa por ela."
70013030-216 = "É isso! Por isso mesmo, a hora é agora!"
70013030-217 = "Temos que salvar a Aru-chan e a Kayoko-chan a qualquer custo!"
70013030-221 = "..."
70013030-222 = "... É mesmo."
70013030-223 = "Vou ajudar, Aru-sama."
70013030-224 = "Da mesma forma que a senhora... me ajudou naquele dia...!"