[translation]#[Texto Final. - Filipe 08/07.]
70013030-1 = "Erva Daninha Que Não Floresce Sozinha (3)"
70013030-2 = "Quanto tempo esperei por este dia."
70013030-3 = "Um reencontro fatídico! Vocês vão desaparecer aqui!"
70013030-9 = "Kufufu. Mesmo depois do que passou, ainda não aprendeu?"
70013030-10 = "Então vou contar na frente dos seus subordinados o que aconteceu."
70013030-11 = "Ca-cale-se! Eu tolerei vocês, e essa é a gratidão?"
70013030-16 = "Não é que você tivesse medo de viralizar."
70013030-17 = "Se quiser, faço agora."
70013030-18 = "Ahhh!"
70013030-19 = "Ei! Acabem com eles!"
70013030-31 = "Fufu, ótimo."
70013030-32 = "Reencontrar um velho inimigo e derrotá-lo com estilo. Isso é hard-boiled!"
70013030-33 = "Vamos com tudo!"
70013030-34 = "Sim, Al-sama! Vou dar o troco!"
70013030-35 = "AAAAAH! Morram!"
70013030-42 = "Ah! Recuem! É perigoso!"
70013030-44 = "Kufufu, que bom que se reuniram."
70013030-45 = "Prontos para explodir?"
70013030-46 = "……!"
70013030-56 = "Gah!"
70013030-58 = "Kyahaha! Igual pipoca!"
70013030-59 = "Por que estão demorando! Acabem logo!"
70013030-65 = "……Insistentes."
70013030-66 = "Presidente, o custo do reparo vai aumentar."
70013030-67 = "Não importa! Vamos vencer!"
70013030-68 = "A história é feita pelos vencedores!"
70013030-69 = "Acho que não é bem assim……"
70013030-70 = "Concordo com a presidente…… vencer a qualquer custo."
70013030-80 = "Fufu, hora de se render. Se continuar, só vai piorar."
70013030-81 = "Kufufu, depois de tirar mais algumas fotos, vamos acabar!"
70013030-84 = "Merda……!"
70013030-85 = "Tem que ter algo!"
70013030-86 = "Aquilo……? Sim!"
70013030-94 = "A-ajuda!"
70013030-95 = "Chega! Se ele se machucar, problema é seu!"
70013030-103 = "Se quiserem que eles saiam ilesos…… se rendam!"
70013030-104 = "Que covardia! Reféns……!"
70013030-106 = "Larguem as armas! Isso não é brincadeira!"
70013030-113 = "(Uu……!)"
70013030-114 = "(Se eu largar a arma…… as minhas funcionárias vão se machucar!)"
70013030-115 = "(Mas se continuarmos, os reféns……!)"
70013030-116 = "(Ahhh!)"
70013030-123 = "……"
70013030-124 = "Mutsuki, tem um elevador de serviço na cozinha."
70013030-125 = "Vá com a Haruka."
70013030-126 = "Hã? E vocês?"
70013030-127 = "Vamos ter que nos render."
70013030-128 = "Você conhece a presidente. Ela não abandona reféns."
70013030-129 = "Sabe o que isso significa?"
70013030-130 = "……Recuar e depois atacar? Ok!"
70013030-131 = "Haruka-chan! Vamos!"
70013030-136 = "Hã? Para onde?"
70013030-137 = "Vem! Só temos isso agora!"
70013030-138 = "A-Al-sama……!"
70013030-140 = "É-é! Deixa com a gente!"
70013030-141 = "Largamos as armas como você pediu! Agora deixe minhas funcionárias irem!"
70013030-142 = "Vo-vocês……!"
70013030-143 = "Agora! Rápido!"
70013030-154 = "Haa, haa……"
70013030-155 = "Haruka-chan, está bem?"
70013030-156 = "Al-sama…… desculpa. Desculpa mesmo. Fugir e deixar você……"
70013030-157 = "A-acho que não mereço viver! Devia morrer agora!"
70013030-158 = "O que está dizendo! Vamos nos unir para salvá-las!"
70013030-159 = "Já derrubamos ele antes, vamos conseguir de novo!"
70013030-160 = "M-mas daquela vez eu……"
70013030-163 = "Ah! Achei!"
70013030-168 = "A-ajuda……!"
70013030-169 = "Por que está fugindo? Espera!"
70013030-170 = "M-mas eu…… se me envolver……!"
70013030-171 = "Está tudo bem!"
70013030-172 = "S-sim?"
70013030-176 = "Não se preocupe! Quem te machucava já foi punido!"
70013030-177 = "A máfia também vai se acalmar."
70013030-179 = "C-como……"
70013030-184 = "Kufufu, peguei e tirei fotos constrangedoras!"
70013030-185 = "E fiz eles assinarem uma declaração, fique tranquila."
70013030-186 = "Vem aqui e pede desculpas!"
70013030-192 = "Ahhh!"
70013030-193 = "D-desculpe! Nunca mais vou aparecer na frente da Haruka-sama!"
70013030-194 = "Vou viver em profundo arrependimento!"
70013030-196 = "Ah…… ah……"
70013030-197 = "Fufufu, que tal nossa força?"
70013030-198 = "Isso não pode ser de graça……"
70013030-199 = "O que posso fazer por vocês?"
70013030-200 = "Dinheiro? Mas agora……"
70013030-201 = "Não quero recompensa. Isso não é hard-boiled."
70013030-202 = "Hard…… boiled?"
70013030-203 = "Sim. Um mal por dia! Impiedoso! Um fora-da-lei hard-boiled! Esse é o nosso lema."
70013030-204 = "Ajudar você também faz parte disso. Não é por dinheiro."
70013030-205 = "Então…… levante-se."
70013030-206 = "Você é livre agora!"
70013030-207 = "……!!"
70013030-209 = "Naquela vez, eu só fui ajudada."
70013030-210 = "Então decidi dar minha vida à Al-sama……"
70013030-211 = "Por Al-sama…… eu faria qualquer coisa……"
70013030-216 = "Exato! Agora é a hora!"
70013030-217 = "Vamos salvar Al-chan e Kayoko-chan!"
70013030-221 = "……"
70013030-222 = "……É verdade."
70013030-223 = "Vou ajudá-la, Al-sama."
70013030-224 = "Assim como Al-sama me ajudou!"