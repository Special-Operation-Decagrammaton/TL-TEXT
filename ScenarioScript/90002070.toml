[translation]
90002070-1 = "Episódio 7; Kei"
90002070-2 = "Kei? Por favor, acorde, Kei! #nEu não quero isso... Por favor, não deixe a Alice sozinha!"
90002070-3 = "Kei!!!!"
90002070-8 = "...Alice."
90002070-12 = "Kei!? A Alice está aqui! Por favor...!"
90002070-13 = "Desculpe, por favor, acalme-se..."
90002070-14 = "Eh...?"
90002070-15 = "Ahhh... estou tão cansada..."
90002070-16 = "Você está... bem?"
90002070-17 = "Não há problemas. É só que várias partes do meu corpo estão quebradas."
90002070-20 = "Eu vou examiná-la. Alice, pode me dar licença um instante?"
90002070-21 = "S-sim...!"
90002070-24 = "A consciência da Kei... não há anormalidades na sua vida."
90002070-25 = "Sério!? Kei... que bom...!"
90002070-26 = "No entanto, o corpo da Kei está quase no limite."
90002070-27 = "I-isso... o que podemos fazer a respeito...?"
90002070-28 = "Não é nada difícil. Basta fazer uma revisão geral no corpo dela e o problema estará resolvido."
90002070-29 = "Parece que o problema é estritamente relacionado ao hardware."
90002070-30 = "Q-que bom, Kei-chan..."
90002070-31 = "Espere um pouco. Isso significa que vocês pretendem consertar este corpo e continuar usando-o?"
90002070-32 = "Essa é a intenção... mas há algum problema com isso?"
90002070-36 = "..."
90002070-37 = "Eu tenho uma sugestão..."
90002070-38 = "Já que estamos nisso, vocês não poderiam me transferir para outro corpo?"
90002070-39 = "Mas, não temos nenhum corpo disponível que possa ser usado..."
90002070-40 = "Mas é claro que temos! Ali!"
90002070-41 = "Ali...?"
90002070-43 = "Por acaso, está falando daquele ali?"
90002070-44 = "Mas aquilo não foi feito pelo Decagrammaton...?"
90002070-45 = "Nós o analisamos e confirmamos que não há problemas."
90002070-46 = "Isso não é verdade. O que dissemos foi que não havia problemas, lembra?"
90002070-47 = "Exato. Eu disse que se transferíssemos o circuito de consciência, ela poderia se mover imediatamente, mas..."
90002070-48 = "Então! Por favor! Me usem!"
90002070-49 = "Não posso concordar. Nem sequer podemos prever o que vai acontecer. É perigoso demais..."
90002070-50 = "Além disso, não temos certeza se conseguiremos romper a segurança interna desse corpo."
90002070-51 = "Eu vou tentar fazer isso. #nComo eu disse antes, se tivermos tempo, devemos conseguir romper a segurança."
90002070-52 = "[s] \"Não acho que tenhamos tanto tempo assim...\""
90002070-53 = "Hum... não posso dizer que é impossível, mas considerando os riscos..."
90002070-57 = "Por que vocês desistem antes mesmo de tentar?!"
90002070-58 = "Vocês não vão saber se não tentarem, vão!?"
90002070-59 = "Oh, parece que você voltou ao seu estado normal."
90002070-60 = "Esse corpo foi feito com materiais do Continente de Aço, não foi?"
90002070-61 = "Se der certo, podemos até conseguir alguma pista!"
90002070-62 = "Mas, se falharmos..."
90002070-64 = "Por isso, parem de dizer apenas coisas negativas!"
90002070-65 = "Primeiro vamos tentar! Se não der certo, pensamos no que fazer depois!"
90002070-66 = "Não acha que está um pouco mais emotiva do que o normal...?"
90002070-67 = "A transferência de consciência em si já foi um sucesso. #nAfinal, eu já estava dentro de um chaveiro, não estava?"
90002070-73 = "Sim! A Alice ainda guarda como uma lembrança!"
90002070-74 = "Ah, sim. Obrigado. #nDe qualquer forma, o que eu quero dizer é..."
90002070-75 = "Já que funcionou da última vez, significa que vai dar certo desta vez também!"
90002070-76 = "Já perdi a conta de quantas vezes disse isso, mas...#nSe der errado, a gente pensa nisso na hora, não é!?"
90002070-77 = "Será que... você realmente detesta tanto esse corpo atual...?"
90002070-78 = "Se você não for me ouvir, então—"
90002070-79 = "Eu não vou dar nem mais um passo!!!"
90002070-88 = "Kei!?"
90002070-89 = "Droga... acabei me empolgando e meu corpo..."
90002070-91 = "[ns] \"...Por que não tentamos fazer o que a Kei quer?\""
90002070-92 = "Mas..."
90002070-93 = "Hã? Se é impossível?#nAcho que não... mas, ainda assim... envolve riscos."
90002070-94 = "Se possível, não quero adicionar mais variáveis do que já temos."
90002070-95 = "[s] \"Se tivermos sucesso, acho que também teremos algo a ganhar, não é?\""
90002070-96 = "É uma visão otimista, mas... de qualquer forma, é muito provável que aquele corpo tenha sido criado pelos engenheiros do Decagrammaton."
90002070-97 = "Além disso, o sistema de segurança quase certamente tem relação com a Kei.#nSe conseguirmos analisá-lo, com certeza será uma grande pista."
90002070-98 = "Também é possível nos prepararmos para uma falha conectando dispositivos de memória auxiliar adicionais."
90002070-99 = "Não acredito que haja um risco enorme em salvar a consciência da Kei, mas..."
90002070-100 = "O que me preocupa é a perda significativa de tempo."
90002070-101 = "O tempo para transferir a consciência para o novo corpo e o tempo para analisar a segurança—"
90002070-102 = "Com o tempo tão escasso, isso pode acabar sendo um desperdício."
90002070-103 = "[s] \"...\""
90002070-107 = "[ns] \"Mesmo assim, vamos tentar!\""
90002070-108 = "Sensei, você está falando sério!?"
90002070-109 = "Não, eu entendo o que você quer dizer.#nO retorno do sucesso é grande, e mesmo se falharmos, não perderemos a Kei. Mas..."
90002070-110 = "Existem variáveis demais..."
90002070-111 = "Hã...? Você quer atender ao pedido dela...?#nSensei, você é mesmo..."
90002070-112 = "..."
90002070-116 = "Entendido..."
90002070-117 = "Já que o Sensei insiste tanto, não tenho escolha.#nAfinal, ela também é uma kouhai querida."
90002070-118 = "Kei, conseguimos! Todos vão nos ajudar!"
90002070-119 = "Fufu, fufufu... Então, se insistirmos desesperadamente...#nAs coisas realmente funcionam, não é..."
90002070-120 = "Entendi! Então vou tentar fazer isso com a Yuuka da próxima vez!"
90002070-121 = "Acho que não vai dar certo..."
90002070-123 = "Vamos inserir ao mesmo tempo no 3. Um, dois—"
90002070-124 = "—três!"
90002070-131 = "...Kei?"
90002070-132 = "Eu também! Eu também quero ver!#nOh...!"
90002070-136 = "O funcionamento normal do corpo foi confirmado. Agora só falta..."
90002070-137 = "Kei. Você consegue nos reconhecer?"
90002070-140 = "[ns] \"...Kei?\""
90002070-143 = "...Sensei?"
90002070-144 = "Alice?"
90002070-146 = "KEI!!!"
90002070-152 = "Como esperado da Kei! Alice, eu acreditava em você!"
90002070-153 = "...Eu não disse? Que daria certo. Vocês são muito exagerados..."
90002070-154 = "[s] \"É porque era algo muito importante.\""
90002070-155 = "Se todos estivessem calmos, talvez eu me sentisse um pouco solitária, sabe?"
90002070-156 = "Não tem jeito. Vou fingir que estou calma, pelo menos eu."
90002070-157 = "Não, obrigado..."
90002070-159 = "Bem... prazer em conhecê-los novamente, eu sou a Kei."
90002070-160 = "Eu sou a Kei!"
90002070-161 = "Oh, agora sim você parece uma androide garota bonita!"
90002070-162 = "Sim. Acho que o design ficou bom."
90002070-163 = "Q-que bom para você... Kei-chan."
90002070-164 = "(Eu acho que o design anterior também não era ruim...)"
90002070-169 = "...Consigo andar com duas pernas e minha garganta não é um alto-falante."
90002070-170 = "Tenho cabelo, mãos, até dedos..."
90002070-174 = "...U-uuh."
90002070-175 = "Kei, parabéns. #nSinto muito por interromper esse momento emocionante, mas... você descobriu alguma coisa?"
90002070-176 = "Mesmo que não tenha descoberto nada, a Kei está feliz, e acho que isso já é o suficiente."
90002070-180 = "Depois de insistir tanto, se não tivesse nada, eu não conseguiria nem olhar na cara de vocês."
90002070-181 = "Felizmente, tenho muitas coisas para contar."
90002070-182 = "Vamos voltar para a nave de transporte por enquanto."
90002070-184 = "Próximo; Possibilidade"
