[translation]
80000126-1 = "Os Três Tesouros Sagrados"
80000126-4 = "Olá, Sensei!"
80000126-5 = "[s] \"Ei, Rei. O que houve?\""
80000126-6 = "É que, bem... hum..."
80000126-7 = "…………"
80000126-10 = "(Ugh... eu deveria estar preparada! Eu treinei tantas vezes...!)"
80000126-11 = "(Mas na frente do Sensei, a coragem simplesmente...!!)"
80000126-12 = "(Acho que o treino mental não serviu de nada... Hoje eu deveria apenas cumprimentar e ir embora—)"
80000126-13 = "(Não, não! De jeito nenhum, isso não!)"
80000126-16 = "[ns] \"Rei?\""
80000126-17 = "Ah...!"
80000126-18 = "Bem, é que... ah, é aquilo, sabe? Hoje é aquele dia, não é?"
80000126-19 = "[s] \"Aquele dia...?\""
80000126-20 = "Ah, v-vai...!"
80000126-21 = "É o Dia dos Namorados!"
80000126-22 = "D-desculpe!#nEu acabei falando alto demais... ugh."
80000126-23 = "E-então... e-eu tentei fazer isto..."
80000126-24 = "Ficaria muito feliz se você pudesse aceitar!"
80000126-25 = "(Você recebeu uma luva feita de chocolate)"
80000126-30 = "E-eu consegui fazer de algum jeito..."
80000126-31 = "[s1] \"Incrível, tem o formato de uma luva!\"\n[s2] \"Obrigado, vou comer com muito carinho.\""
80000126-36 = "!!!"
80000126-37 = "Não, eu que agradeço!"
80000126-38 = "...?#nAh, sobre este chocolate...?"
80000126-39 = "Como posso dizer..."
80000126-40 = "Dá para dizer que fui eu mesma quem fiz, de certa forma...?"
80000126-42 = "(Curioso, você decide perguntar mais detalhes)"
80000126-45 = "Esta luva... tem o mesmo molde da que eu usava antes."
80000126-46 = "Eu escaneei, processei os dados..."
80000126-47 = "E imprimi em uma impressora 3D."
80000126-48 = "Ou seja, eu não fiz o molde manualmente, mas..."
80000126-49 = "Pelo menos... o processamento final, eu mesma fiz."
80000126-50 = "Ah, mas derreter o chocolate e polir até ficar brilhante, isso fui eu...!"
80000126-51 = "Bem, se for só isso..."
80000126-52 = "Não sei se dá para chamar de feito à mão..."
80000126-53 = "[s3] \"Um chocolate com tanto esforço, muito obrigado mesmo.\"\n[s4] \"É um trabalho feito com as 'mãos' de verdade.\""
80000126-56 = "É mesmo...?"
80000126-57 = "Hehe..."
80000126-58 = "Ah, na verdade, tem mais isto aqui também!"
80000126-63 = "[ns] \"Um bastão e até uma bola...!\""
80000126-64 = "São os Três Tesouros Sagrados do beisebol!"
80000126-65 = "Mesmo que não possamos jogar de verdade, o clima está perfeito com isso!"
80000126-66 = "Vamos, Sensei, seja o arremessador...!"
80000126-67 = "A rebatedora Rei Nozomi, em posição de ataque... Rebateu!#nA bola passou por cima do interbases!!"
80000126-68 = "Rei Nozomi, que velocidade! Será que ela chega na segunda base!?#nOh, o arremessador Sensei está se aproximando!"
80000126-70 = "(Depois disso, os dois comeram os Três Tesouros Sagrados com gosto)"
80000126-71 = "(Rei, com as bochechas cheias de chocolate, passou o tempo todo falando sobre beisebol com os olhos brilhando)"
