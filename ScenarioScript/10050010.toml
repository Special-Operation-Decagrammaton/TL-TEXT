[translation]
10050010-1 = "Episódio 1; Para exibir, para guardar e para divulgar"
10050010-6 = " ……。"
10050010-7 = " ……。"
10050010-8 = "I-isso... isso está mesmo certo?"
10050010-9 = "Entrar na academia tão facilmente assim..."
10050010-10 = "Hum... eu esperava que houvesse postos de controle ou pelo menos um ou dois guardas vigiando. #nDesse jeito, nem dá para subornar ninguém, não é?"
10050010-11 = "……Você estava pensando nisso?"
10050010-12 = "Sim. Ao planejar, devemos sempre considerar o pior cenário possível."
10050010-13 = "Concordo com esse ponto, mas..."
10050010-14 = "É um pouco decepcionante, ou melhor... #nchega a ser difícil acreditar que é a realidade."
10050010-15 = "Mesmo que não seja a realidade, precisamos processar... ou melhor, distribuir este estoque."
10050010-16 = "Mesmo que seja um espaço virtual, pretendo levar bastante dinheiro virtual comigo!"
10050010-23 = "Oh? Olá. É a primeira vez que nos vemos... certo?"
10050010-24 = "O-o que faremos, Chefe!?"
10050010-25 = "……。"
10050010-26 = "Olá! Ora, será que isso é o destino? #nNós somos da Academia Federal Red Winter — isso mesmo! #nViemos fazer uma visita à Trinity!"
10050010-27 = "V-você pode mesmo dizer isso com tanta confiança!?"
10050010-28 = "Mantenha a calma, Takane. #nNa pior das hipóteses, só seremos expulsas da zona autônoma."
10050010-29 = "Não é muito melhor do que tentar esconder algo e acabar causando um mal-entendido?"
10050010-30 = "Oh, vieram de tão longe, da Red Winter! Entendo. Bem-vindas à Trinity. #nJá ouvi falar muito de vocês..."
10050010-31 = "Vocês sempre treinam enfrentando ursos ferozes no frio extremo, não é?"
10050010-32 = "D-do que exatamente você está falando...? Ursos?"
10050010-33 = "Ora, ora, apenas concorde com ela."
10050010-34 = "S-sim... é..."
10050010-35 = "Ficaram surpresas com a visita repentina?"
10050010-36 = "Não, de forma alguma. Por favor, fiquem à vontade para passear."
10050010-37 = "Ah, mas é verdade... dizem que a Trinity tem um lado fechado, mas..."
10050010-38 = "Nem todos pensam assim. Nós também estamos tentando mudar a cada dia."
10050010-39 = "Para sermos dignas do nome de uma das três grandes academias de Kivotos, estamos nos esforçando para interagir com pessoas de outras academias."
10050010-40 = "Entendo... a propósito, vocês gostam de livros?"
10050010-41 = "Livros...? Sim, um pouco como hobby. #nLeio escrituras durante o horário de oração."
10050010-42 = "Além disso, a biblioteca central da Trinity possui quase todos os livros publicados em Kivotos."
10050010-43 = "Hum, que ótima notícia! #nTenho um livro um tanto especial... não teriam interesse?"
10050010-48 = "O que acham, não gostariam de dar uma olhada? Algumas páginas já bastam."
10050010-49 = "Oh, podemos mesmo?"
10050010-50 = "Então, vou ler..."
10050010-55 = "I-isso é...!?"
10050010-56 = "Hawa-wa..."
10050010-62 = "C-chefe, o que você fez!?"
10050010-63 = "Eu é que queria saber..."
10050010-64 = "Primeiro, vamos acordá-la. #nAqui, tome este compota, é uma especialidade da 227."
10050010-65 = "Ugh...!? A-agora sim, obrigada. #nRecuperei a consciência... mas, sobre aquele livro..."
10050010-66 = "……。"
10050010-67 = "Como posso dizer... não que eu tenha detestado."
10050010-68 = "Na verdade, até gostei... mas, sabe..."
10050010-69 = "De várias formas, parece ser um estímulo forte demais..."
10050010-70 = "Hã? Isso é...?"
10050010-71 = "(Uau... será que na Trinity esse nível é considerado normal?)"
10050010-72 = "Entendo, é mesmo? De qualquer forma, não deveria haver nada problemático nele."
10050010-73 = "Não, não há cenas problemáticas descritas! #nNós fizemos a censura... quer dizer, a edição corretamente."
10050010-74 = "É, é mesmo... é verdade."
10050010-75 = "É justamente por isso que... a imaginação acaba fluindo mais, por assim dizer..."
10050010-76 = "O cliente tem um gosto muito refinado."
10050010-77 = "（Cliente...?）"
10050010-78 = "Como eu disse, um \"véu\" moderado é essencial para esse tipo de coisa."

10050010-79 = "…Criaturas como escritores tendem a perder o controle, sabe?#nSabem o básico, mas não entendem o todo."
10050010-80 = "Em uma história, o mais importante é o espaço para a imaginação!!"
10050010-81 = "É, é mesmo verdade!?"
10050010-82 = "Sim. Porque a imaginação humana não tem limites!"
10050010-83 = "Quanto mais espaço você deixa, mais o leitor fantasia sobre o que vem a seguir!"
10050010-84 = "P-pensando bem, é verdade...!"
10050010-85 = "…Você não disse \"censura\" agorinha pouco?"

10050010-86 = "Eu disse edição, não disse?"
10050010-87 = "Ah..."
10050010-88 = "Bem, eu fiz algo próximo da censura, mas foi por necessidade.#nA administração me obrigou, sabe como é."
10050010-89 = "Mas saiba de uma coisa, Takane.#nSe você quer vender algo... deve usar os obstáculos a seu favor!"
10050010-90 = "Ou seja, usar a censura como escudo para aumentar o valor comercial...?"
10050010-91 = "Exatamente. Assim, podemos dizer aos superiores que fizemos a censura como eles queriam."
10050010-92 = "E, do ponto de vista do consumidor, talvez eles consigam algo que os satisfaça, não é?"
10050010-93 = "Veja só. Este aqui é um ótimo exemplo!"
10050010-94 = "H-hawawa..."
10050010-98 = "..."
10050010-99 = "Como esperado da nossa chefe! Ela é realmente confiável nessas horas!"
10050010-100 = "A-ah... não tem a continuação desse livro?"
10050010-101 = "Claro que temos! Se não for incômodo, você poderia recomendar discretamente para seus amigos também?"
10050010-102 = "Hya...!?"
10050010-103 = "Livros são mídias com limitações físicas... é impossível que um único exemplar exista em dois lugares ao mesmo tempo."
10050010-104 = "Nesse sentido, que tal levar mais um?"
10050010-105 = "Faz sentido, mas... duas cópias da mesma coisa?"
10050010-107 = "Uma para você, e a outra para emprestar a um amigo."
10050010-108 = "Ao compartilhar a mesma cultura, é possível construir laços de amizade mais amplos e profundos."
10050010-109 = "É, verdade...!"
10050010-110 = "Aliás, tem certeza de que só isso basta?"
10050010-111 = "Livros se desgastam conforme são lidos e, um dia, acabam se estragando..."
10050010-112 = "Ah...!"
10050010-113 = "Para essas pessoas, também preparamos isto."
10050010-114 = "Para prevenir qualquer imprevisto, que tal levar mais um para guardar?"
10050010-115 = "Talvez você já saiba, mas é senso comum ter três cópias: uma para apreciar, uma para guardar e uma para divulgar."
10050010-116 = "（Eu não sabia que existia esse senso comum...!）"
10050010-117 = "M-mas, no fim das contas, isso significa comprar três livros iguais...?"
10050010-118 = "Para você, que pensa assim! Somente agora, na compra de três exemplares, você ganha 15% de desconto sobre o preço normal!"
10050010-119 = "Eu compro."
10050010-120 = "Obrigada pela preferência! Não deixe de recomendar aos seus amigos também."
10050010-126 = "E então, o que achou? Takane."
10050010-127 = "Bem, eu tenho várias coisas a dizer, mas..."
10050010-128 = "Como esperado, a chefe é incrível nessas horas."
10050010-129 = "Muito bem, muito bem. Mufufufufu."
10050010-133 = "Então... vamos tingir Trinity — de vez — com as nossas cores!"
10050010-135 = "…Ei, você sabe?#nAquilo que está na moda ultimamente..."
10050010-136 = "Acho que tem várias coisas, a qual você se refere?"
10050010-137 = "Bem..."
10050010-138 = "Ora, será que..."
10050010-139 = "Eu tenho a continuação... quer ler?"
10050010-140 = "Sim! Se não for incômodo, posso passar aí hoje?"
10050010-141 = "Claro...! #nFico feliz em ver que há mais pessoas com quem posso compartilhar a 'arte'!"
10050010-143 = "Será que esse tipo de coisa é aceitável...?"
10050010-144 = "...Você ficou desapontado?"
10050010-145 = "Não, a 'arte' é algo que traz alegria a todos."
10050010-146 = "Sim... então, entregarei meu corpo ao nome da irmã..."
10050010-155 = "Isto é...?"
10050010-156 = "Talvez não atenda às suas expectativas, mas imaginei: 'e se fosse esse o desenrolar?' e acabei escrevendo."
10050010-157 = "C-claro, sei que não chega nem aos pés da obra original..."
10050010-158 = "Obrigada, vou ler."
10050010-159 = "Muito obrigada!"
10050010-171 = "...Este chá é excelente."
10050010-172 = "Sim, desta vez eu me esforcei bastante."
10050010-177 = "Sim. O sabor e o aroma são maravilhosos. #nÉ um Earl Grey com base de Darjeeling, não é?"
10050010-178 = "O toque leve de moscatel e o aroma marcante de frutas cítricas são impressionantes. #nÉ a prova de que a bergamota está fresca."
10050010-179 = "Mais uma vez, obrigada por esta xícara maravilhosa."
10050010-180 = "Não há de quê! Fico feliz que tenha gostado."
10050010-183 = "Que paz... sim, realmente... #nÉ um momento revigorante..."
10050010-184 = "Seria ainda melhor se o Sensei estivesse aqui... não, não devo ser gananciosa."
10050010-186 = "Falando nisso, ouvi dizer que um livro interessante está fazendo sucesso em Trinity ultimamente."
10050010-187 = "Um livro interessante... sim, é verdade! Eu mesma acabei de conseguir um exemplar."
10050010-188 = "Ainda não li o conteúdo, mas parece que a reputação é muito boa."
10050010-189 = "Ora, que boa notícia."
10050010-190 = "Mas, há algo que me deixa um pouco intrigada..."
10050010-191 = "Quando o assunto é esse livro, algumas pessoas baixam a voz de repente ou se retiram da sala..."
10050010-192 = "Fufu. Com certeza elas estão estreitando seus laços. #nNão é algo bom?"
10050010-193 = "Já que o livro é tão interessante, elas devem ter muito o que conversar entre si."
10050010-194 = "É verdade, não é...? Eu também quero acreditar nisso."
10050010-195 = "Se não se importar, poderia me mostrar? #nEstou um pouco curiosa."
10050010-196 = "Sim, claro. Aqui está."
10050010-200 = "Obrigada. #nEntão, vamos ver..."
10050010-205 = "...?"
10050010-209 = "！？！？！？"
10050010-215 = "N-Nagisa-sama...? #nNagisa-sama——！？！？"
