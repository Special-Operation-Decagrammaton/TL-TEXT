[translation]
1602-1 = "給食部のドタバタ衛生管理評価（２）"
1602-2 = "まずは、個々人のチェックだ。"
1602-3 = "各自、手を出せ。"
1602-4 = "はい。"
1602-5 = "どうぞ。"
1602-6 = "衛生面なら自信あるよ！えっへん！"
1602-7 = "美味しく食べるためには、そういうのも大事だからね！"
1602-8 = "……っていうか、お前は給食部じゃないだろ。"
1602-9 = "まあいい。"
1602-11 = "ふむ、よし。全員問題はないな。"
1602-12 = "個人の衛生状態は良好、と。"
1602-13 = "次は……。"
1602-15 = "道具の清潔さ……良好。"
1602-16 = "テーブルや椅子、カーテンも清潔だな。"
1602-17 = "食材の賞味期限も……問題なし。"
1602-18 = "次……肝心の厨房か。"
1602-21 = "（ごくり）"
1602-23 = "（グツグツグツグツ……）"
1602-24 = "ん？あれは……？"
1602-25 = "ガタガタッ、ガタンッ、ゴトンッ……！"
1602-26 = "鍋がひとりでに動いてる！？"
1602-27 = "ジュリ、あれあなたが作ってた料理でしょ！？何をしたの！？"
1602-28 = "おそらく、料理が自我を持って暴走を始めたのかと……！"
1602-29 = "また！？"
1602-30 = "……また？"
1602-31 = "でも大丈夫です、先輩！"
1602-32 = "こんな状況になっても対応できるよう、訓練してきましたから！"
1602-33 = "衛生面と給食部の平和、そして皆さんの安全のために！"
1602-34 = "私、戦います！"
1602-35 = "イオリさんには負けません！"
1602-36 = "だからそれ何の話！？"
1602-44 = "うわわっ！料理が襲ってくる！？"
1602-45 = "そっか……私、考えたこともなかった。"
1602-46 = "料理は食べるものだとばかり……。"
1602-47 = "時には、逆に料理に食べられることもあるんだね……！"
1602-48 = "いや、普通無いだろ……。"
1602-49 = "それよりこれは、衛生問題なのか……？"
1602-50 = "……違う、よな？#n\nうーん……とりあえず一旦良好で……。"
1602-55 = "全点チェック完了……。"
1602-56 = "ちっ、満点だ。"
1602-57 = "えっへん！"
1602-58 = "いや、だからお前は給食部じゃなくて、美食研究会のメンバーだろ……？"
1602-59 = "でも、思ったより素直というか……。"
1602-60 = "別に私は相手を屈服させるために来たわけでも、粗探しに来たわけでもない。"
1602-61 = "ただ、衛生面のチェックをしに来ただけだ。"
1602-62 = "認めるよ、給食部の衛生面は何の問題も無い。"
1602-63 = "あ……。"
1602-64 = "良かった良かった！"
1602-67 = "でも、見直したよ給食部。"
1602-68 = "給食への熱意、完璧な衛生管理……。"
1602-69 = "美味しくないのはさておき、そういったところはちゃんとしてる。"
1602-70 = "思い知ったか～！"
1602-71 = "その「さておき」の部分が大事なんだけど！っていうか、だから何であなたは給食部サイドなの！？"
1602-72 = "この結果を見る限り、#n前回の評価が間違ってる線の方が濃厚だな。"
1602-73 = "これは再考する必要がある。"
1602-74 = "私、感銘を受けました。"
1602-75 = "速やかで公明正大な評価、これぞ風紀委員会！"
1602-76 = "今回の調査員が、イオリさんでよかったです！"
1602-77 = "……お世辞を言っても何も出ないぞ。"
1602-78 = "はあ、まあいい。とりあえず私はもう帰る。"
1602-82 = "（良かったぁ……無事に終わった、よね？）"
1602-83 = "ふう、喋りすぎたな……。"
1602-84 = "喉が渇いた……何か飲み物とかないか？"
1602-85 = "飲み物……お水でいい？"
1602-87 = "あっ、でしたらちょうど良いものがありますよ！"
1602-90 = "こちらどうぞ、グイっといってしまってください！"
1602-91 = "ん、オレンジジュースか？何にせよ、ありがたくいただく。"
1602-92 = "私も！私も飲みたい！"
1602-93 = "ふふっ、はい。まだまだありますのでどうぞ！"
1602-95 = "……ん？"
1602-96 = "給食部で、オレンジジュースの発注なんてしてた……？"
1602-97 = "あ、これは給食用ではなく。"
1602-98 = "私がおもてなしのために作った、生絞りのフルーツジュースです！"
1602-99 = "前回も調査員の方に差し上げたのと、同じものを！"
1602-100 = "……前回？"
1602-101 = "……。"
1602-103 = "前回給食部に来た調査員は、食中毒と診断された。"
1602-105 = "……！！"
1602-106 = "待っ、ストーーップ！"
1602-107 = "ごくっごくっ……ん？"
1602-108 = "……うっ！？"
1602-111 = "それだぁぁぁぁああああ！！"
1602-112 = "あらっ？イオリさん？疲れて寝てしまったのですか？"
1602-113 = "いくらなんでもここでは困ります、起きてくださ～い。"
1602-114 = "ど、どうしよう！？"
1602-115 = "このままじゃ、また評価が……！"
1602-116 = "ましてや今回は風紀委員だし、絶対前どころじゃない評価が……！#n給食部の予算がまた半分に……！？"
1602-117 = "……落ち着いてフウカ、まだ解決方法はあるはず……！"
1602-118 = "そ、そうだ！"
1602-119 = "他の風紀委員に見つかる前に、被害者をいなかったことにするとか……！"
1602-127 = "（ごくっ、ごくっ）"
1602-129 = "ぷはー、美味しい！"
1602-131 = "（結局どうにもならず、無事目が覚めたイオリから容赦なくFランクの評価をもらった）"
1602-132 = "給食部のドタバタ衛生管理評価"
