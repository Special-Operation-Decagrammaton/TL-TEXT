[translation]
1602-1 = "Avaliação de Higiene do Clube de Merenda (2)"
1602-2 = "Primeiro, a verificação individual."
1602-3 = "Cada uma, mostrem as mãos."
1602-4 = "Sim."
1602-5 = "Aqui está."
1602-6 = "Tenho confiança na minha higiene! Hmph!"
1602-7 = "Afinal, isso é importante para que a comida fique gostosa!"
1602-8 = "……Digo, você nem é do Clube de Merenda."
1602-9 = "Bem, tanto faz."
1602-11 = "Hum, certo. Nenhuma de vocês tem problemas."
1602-12 = "Estado de higiene individual, aprovado."
1602-13 = "O próximo é……."
1602-15 = "Limpeza dos utensílios…… aprovado."
1602-16 = "Mesas, cadeiras e cortinas também estão limpas."
1602-17 = "Data de validade dos ingredientes também…… sem problemas."
1602-18 = "Próximo…… a parte crucial, a cozinha."
1602-21 = "(Gole)"
1602-23 = "(Borbulhando, borbulhando……)"
1602-24 = "Hm? O que é aquilo……?"
1602-25 = "Chacoalhando, batendo, estrondando……!"
1602-26 = "A panela está se movendo sozinha!?"
1602-27 = "Juri, aquilo é o prato que você estava fazendo, não é!? O que você fez!?"
1602-28 = "Provavelmente, a comida ganhou consciência e começou a se rebelar……!"
1602-29 = "De novo!?"
1602-30 = "……De novo?"
1602-31 = "Mas não se preocupe, senpai!"
1602-32 = "Eu treinei para conseguir lidar com situações como esta!"
1602-33 = "Pela higiene, pela paz do Clube de Merenda e pela segurança de todos!"
1602-34 = "Eu vou lutar!"
1602-35 = "Não vou perder para a Iori!"
1602-36 = "Do que você está falando!?"
1602-44 = "Uwaaa! A comida está nos atacando!?"
1602-45 = "Entendi…… eu nunca tinha pensado nisso."
1602-46 = "Eu sempre achei que comida era algo para se comer……."
1602-47 = "Às vezes, a comida pode acabar comendo a gente……!"
1602-48 = "Não, isso não acontece normalmente……."
1602-49 = "Além disso, isso é mesmo um problema de higiene……?"
1602-50 = "……Não é, né?#n\nHum…… bem, por enquanto, vamos considerar aprovado……."
1602-55 = "Verificação completa……."
1602-56 = "Tsc, nota máxima."
1602-57 = "Hmph!"
1602-58 = "Não, eu já disse, você não é do Clube de Merenda, você é do Clube de Pesquisa Gourmet……?"
1602-59 = "Mas, você é mais honesta do que eu pensava……."
1602-60 = "Eu não vim aqui para subjugar ninguém, nem para procurar defeitos."
1602-61 = "Eu só vim para verificar a higiene."
1602-62 = "Admito, a higiene do Clube de Merenda não tem problema algum."
1602-63 = "Ah……."
1602-64 = "Que bom, que bom!"
1602-67 = "Mas, eu mudei minha opinião sobre o Clube de Merenda."
1602-68 = "O entusiasmo pela merenda, o controle de higiene impecável……."
1602-69 = "Deixando de lado o fato de não ser gostoso, pelo menos essas partes eles fazem direito."
1602-70 = "Viu só do que sou capaz?!"
1602-71 = "Mas essa parte que você 'deixou de lado' é a mais importante! E falando nisso, por que você está do lado do Clube de Merenda?!"
1602-72 = "Pelo que vejo deste resultado, #né bem mais provável que a avaliação anterior estivesse errada."
1602-73 = "Isso precisa ser repensado."
1602-74 = "Eu fiquei impressionada."
1602-75 = "Uma avaliação rápida e imparcial, isso sim é o Comitê Disciplinar!"
1602-76 = "Fico feliz que a investigadora desta vez tenha sido a Iori!"
1602-77 = "……Não adianta me bajular, não vai ganhar nada com isso."
1602-78 = "Haa, tanto faz. Por enquanto, eu já vou indo."
1602-82 = "(Que bom... terminou tudo bem, né?)"
1602-83 = "Ufa, falei demais..."
1602-84 = "Estou com sede... não tem nada para beber?"
1602-85 = "Algo para beber... água serve?"
1602-87 = "Ah, se for isso, tenho algo perfeito aqui!"
1602-90 = "Aqui, pode beber tudo de uma vez!"
1602-91 = "Hmm, suco de laranja? De qualquer forma, agradeço."
1602-92 = "Eu também! Eu também quero!"
1602-93 = "Fufu, aqui está. Ainda tem bastante, pode pegar!"
1602-95 = "……Hm?"
1602-96 = "O Clube de Merenda fez algum pedido de suco de laranja...?"
1602-97 = "Ah, isso não é para a merenda."
1602-98 = "É um suco de frutas espremido na hora que eu fiz para servir como cortesia!"
1602-99 = "É o mesmo que dei para o investigador da última vez!"
1602-100 = "……Última vez?"
1602-101 = "……."
1602-103 = "O investigador que veio ao Clube de Merenda da última vez foi diagnosticado com intoxicação alimentar."
1602-105 = "……！！"
1602-106 = "Espera, paaaara!"
1602-107 = "Glup, glup... hm?"
1602-108 = "……Ugh!?"
1602-111 = "É isso aííííííí!!"
1602-112 = "Ué? Iori-san? Você cansou e acabou dormindo?"
1602-113 = "Não pode dormir aqui, por favor, acorde."
1602-114 = "O-o que eu faço!?"
1602-115 = "Desse jeito, a avaliação vai ser de novo...!"
1602-116 = "E ainda por cima é alguém do Comitê Disciplinar, a avaliação vai ser pior do que nunca...! #nO orçamento do Clube de Merenda vai ser cortado pela metade de novo...!?"
1602-117 = "……Calma, Fuuka, ainda deve haver uma solução……!"
1602-118 = "I-isso mesmo!"
1602-119 = "Antes que outros membros do Comitê Disciplinar apareçam, talvez eu possa fingir que a vítima nunca existiu...!"
1602-127 = "(Glup, glup)"
1602-129 = "Ahhh, que delícia!"
1602-131 = "(No fim, nada pôde ser feito, e Iori, ao acordar, deu uma avaliação de nota F sem piedade)"
1602-132 = "A Avaliação de Higiene Caótica do Clube de Merenda"
