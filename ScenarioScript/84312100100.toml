[translation]
84312100100-5 = "結局……最後まで甘えてしまったわね。"
84312100100-6 = "おかげで大きな事故もなく、EXPOを終えることができた。ミレニアムを代表して、お礼を言わせて欲しい。"
84312100100-7 = "もう最終日か……深夜の潜入に呼ばれることも無くなるのだね。"
84312100100-8 = "言葉にするのは難しいが……。"
84312100100-9 = "少し……名残惜しささえ感じているよ。"
84312100100-13 = "あん？こんな面倒事、さっさと片付けた方が良いに決まってんだろ。"
84312100100-14 = "まぁ、後はもう帰るだけか？なら、こうやって話すのも最後かもな。"
84312100100-15 = "もう大きなトラブルが起きることも無いでしょうし。私も戻らなくては。"
84312100100-16 = "このまますぐ戻るつもりかい？イベントはまだ終わっていないだろうに。"
84312100100-17 = "終わったも同然よ。今日がEXPOの最終日。会場は順次閉鎖され、トリニティの生徒たちも帰っていく。"
84312100100-18 = "もはや危険要素足りうるものは、会場やキャンパスに存在しないと確認したわ。"
84312100100-19 = "（確認した……？）"
84312100100-20 = "何より……。"
84312100100-25 = "二人があれだけ頑張ってくれたのだから。"
84312100100-27 = "……リオ。"
84312100100-29 = "らしくねぇじゃんか、そんなこと言うなんてよ。少しは大人になったのか？"
84312100100-30 = "……何を言ってるの、貴女と私は同い年よ。"
84312100100-34 = "あー、まだまだ先は長そうだな。"
84312100100-35 = "んじゃ、あたしも帰るわ。先生に報告しなきゃだし。"
84312100100-36 = "先生には、事の顛末を報告しているのかしら。"
84312100100-37 = "まずかったか？"
84312100100-38 = "いえ、そういうわけではないのだけれど……。"
84312100100-39 = "お前はミレニアムのために頑張ったつもりだろうけど、一応、生徒間で起きた事件なんだから。先生に伝えて悪いことはねえだろ。"
84312100100-40 = "言ったところで何か変わるわけじゃねえし。"
84312100100-41 = "作戦が成功したのも、先生のお陰のようなものだからな。"
84312100100-43 = "……先生は今の状況も全て把握しているのだね。"
84312100100-44 = "後で、私からも少し話をしておこう。"
84312100100-45 = "荷物をまとめるのにも多少の時間が掛かるわ。何もないとは思うけれど……用があれば連絡してちょうだい。"
84312100100-46 = "それと、できれば先生に私のことはあまり……。"
84312100100-47 = "リオとはまたどこかで話す機会があるはず、と先生は言っていた。野暮はしないさ。"
84312100100-48 = "それより、どちらかといえば……。"
84312100100-49 = "なにかしら？"
84312100100-54 = "何かまだあんのか？"
84312100100-55 = "いや、ただの杞憂かもしれない。"
84312100100-56 = "私は挨拶も兼ねて、最後に一周見回ってこようと思うのだが……。"
84312100100-57 = "リオ。私が戻るまでは待っていてもらえないだろうか。"
84312100100-61 = "ええ。構わないわ。"
84312100100-62 = "では行ってくる。"
84312100100-63 = "ついてってやろうか？"
84312100100-64 = "大丈夫だ。もはやトラブルが起こることも無いのだろう。"
84312100100-65 = "……大丈夫さ。"
