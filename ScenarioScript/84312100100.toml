[translation]
84312100100-5 = "No fim das contas... acabei dependendo de você até o último momento."
84312100100-6 = "Graças a isso, conseguimos terminar a EXPO sem grandes acidentes. Em nome da Millennium, gostaria de lhe agradecer."
84312100100-7 = "Já é o último dia... não serei mais chamada para infiltrações na calada da noite, não é?"
84312100100-8 = "É difícil colocar em palavras, mas..."
84312100100-9 = "Sinto até um pouco... de nostalgia."
84312100100-13 = "Hã? É óbvio que é melhor resolver logo esse tipo de incômodo."
84312100100-14 = "Bem, só resta ir embora agora, né? Se for assim, talvez essa seja a última vez que conversamos."
84312100100-15 = "Não deve mais acontecer nenhum problema grave. Eu também preciso voltar."
84312100100-16 = "Pretende voltar agora mesmo? O evento ainda não terminou, não é?"
84312100100-17 = "É como se tivesse terminado. Hoje é o último dia da EXPO. O local será fechado gradualmente e as alunas da Trinity também estão indo embora."
84312100100-18 = "Confirmei que não existem mais elementos de risco no local ou no campus."
84312100100-19 = "(Confirmou... ?)"
84312100100-20 = "Acima de tudo..."
84312100100-25 = "Já que as duas se esforçaram tanto."
84312100100-27 = "...Rio."
84312100100-29 = "Não parece você falando assim. Será que você amadureceu um pouco?"
84312100100-30 = "...O que está dizendo? Você e eu temos a mesma idade."
84312100100-34 = "Ah, parece que ainda temos um longo caminho pela frente."
84312100100-35 = "Então, eu também vou indo. Preciso dar um relatório ao Sensei."
84312100100-36 = "Será que você contou ao Sensei sobre o desenrolar dos fatos?"
84312100100-37 = "Foi ruim fazer isso?"
84312100100-38 = "Não, não é bem isso, mas..."
84312100100-39 = "Você pode achar que se esforçou pela Millennium, mas, no fim das contas, foi um incidente entre alunas. Não tem nada de errado em contar ao Sensei."
84312100100-40 = "Não é como se algo fosse mudar só de falar."
84312100100-41 = "Afinal, o sucesso da operação foi praticamente graças ao Sensei."
84312100100-43 = "...O Sensei já está ciente de toda a situação atual, não é?"
84312100100-44 = "Depois, eu também falarei um pouco com ele."
84312100100-45 = "Levará um tempo para arrumar minhas coisas. Acho que não acontecerá nada, mas... se precisar de algo, entre em contato."
84312100100-46 = "E, se possível, não fale muito sobre mim para o Sensei..."
84312100100-47 = "O Sensei disse que certamente haverá outra oportunidade de conversar com a Rio. Não vou ser inconveniente."
84312100100-48 = "Mais do que isso, se for para dizer algo..."
84312100100-49 = "O que seria?"
84312100100-54 = "Ainda tem algo pendente?"
84312100100-55 = "Não, talvez seja apenas uma preocupação infundada."
84312100100-56 = "Vou dar uma última volta para verificar tudo, aproveitando para me despedir..."
84312100100-57 = "Rio. Você poderia me esperar até que eu volte?"
84312100100-61 = "Sim. Sem problemas."
84312100100-62 = "Então, já vou."
84312100100-63 = "Quer que eu vá com você?"
84312100100-64 = "Está tudo bem. Provavelmente não haverá mais nenhum problema."
84312100100-65 = "...Está tudo bem."
