[translation]
10042030-1 = "第3話;バイオハザード"
10042030-3 = "搬送準備、完了しました。"
10042030-4 = "お疲れ様です。"
10042030-5 = "あの、こんなことを言って良いのか分かりませんが……。"
10042030-6 = "カフェでさっき、アレを見かけました。"
10042030-7 = "アレ……？"
10042030-11 = "……ああ、例のモンスターですか。"
10042030-12 = "！？"
10042030-13 = "（そういえば、あの方……さっきいらっしゃっていた……！）"
10042030-14 = "詳しくお聞きしても？"
10042030-15 = "はい、友達とカフェにいたら……。"
10042030-16 = "緑のネバネバをまとった紫パンケーキが見えたんです。"
10042030-17 = "……緑と紫、ですね。"
10042030-18 = "一瞬だったから、うろ覚えですが……触手のようなものが生えてました。"
10042030-19 = "それがビュッて通り過ぎていったんです。"
10042030-20 = "うう……思い出すだけで気持ち悪い。"
10042030-21 = "なるほど……モンスターの行き先に心当たりはありますか？"
10042030-22 = "いえ、そこまでは。#nそもそも、こんなところまで来ているとも思っていなくて。"
10042030-23 = "分かりました。とりあえずこの死体……いえ、負傷者を搬送後、経過観察をお願いします。"
10042030-24 = "はい、部長。"
10042030-28 = "まだ状況は掴みきれていませんが……。"
10042030-29 = "確実に言えるのは――"
10042030-30 = "――私が来た以上、事態を見過ごすわけにはいきません。"
10042030-31 = "[s1] \"おお、カッコ良い。\"\n[s2] \"ドクターセナ、って呼んでも良い？\""
10042030-34 = "ドクター……？"
10042030-35 = "つまり、私を信頼してくださるのですね。"
10042030-36 = "ありがとうございます、嬉しいです。"
10042030-37 = "――この状況、個人的にも少し興味が湧いてきまして。"
10042030-38 = "少なくとも……不良を救急車に投げ込むよりは、そそられる事案です。"
10042030-39 = "それで……どうするのですか？"
10042030-40 = "そうですね……さしあたっては、痕跡を追いかけようかと。"
10042030-41 = "だ、大丈夫でしょうか……？#nすでに一人、やられてしまいましたが……。"
10042030-42 = "大丈夫です、そちらのほうが面白そうですし。"
10042030-44 = "え……？"
10042030-45 = "面白い……？"
10042030-46 = "はい、自分でも驚くほど。#n普段でしたら、事件を前に「面白い」なんて思うことはないのですが……。"
10042030-47 = "今は形容できない何かが、私の心を惹きつけているのです。"
10042030-48 = "[s3] \"イオリがあんな状態になってしまう事態だから……。\"\n[s4] \"対応策を練った方が良いんじゃないかな……？\""
10042030-51 = "ご安心ください。#nこう見えて楽し……失礼、真面目に臨んでおりますから。"
10042030-52 = "（一体どこが……）"
10042030-53 = "それでは、追跡を始めるとしましょう。#n先陣は私が。"
10042030-56 = "[ns] \"……すごい光景だね。\""
10042030-57 = "廊下にもネバネバが落ちてる……。"
10042030-58 = "量が少し多くなってきたような気がします……。"
10042030-59 = "チナツ、訂正を。#n少しではなく、明らかに増えています。"
10042030-60 = "量が増えたらどうなるんですか！？"
10042030-61 = "分かりません。#nそれを解明するために進んでいるのですから。"
10042030-62 = "……ますます気になってきますね。"
10042030-63 = "楽しんでる場合じゃないと思うけど……。"
10042030-64 = "う、うう……。"
10042030-65 = "……こっちから声が！"
10042030-66 = "なるほど。#n次の死体、それか手がかり……いえ、犠牲者でしょうか。"
10042030-71 = "せ、セナさん！？#nちょっと待ってください！"
10042030-81 = "う、うう……。"
10042030-85 = "[ns] \"だ、大丈夫？何があったの！？\""
10042030-86 = "あっちの教室から、変な音が聞こえて……。"
10042030-87 = "様子を見に行ったら……。"
10042030-93 = "[ns5] \"それは……。\"\n[ns6] \"フラグだ……！\""
10042030-96 = "先生は一体何のお話を……。"
10042030-97 = "フラグとは、立てたら回収するのがお約束。#n定番中の定番――つまり、テンプレという意味です。"
10042030-98 = "……この説明で、ご理解いただけたでしょうか。"
10042030-99 = "真面目にやってないってことは分かったわよ……。"
10042030-100 = "すみません。#n先輩は昔からこういうところがあって……。"
10042030-101 = "この状況はイオリの時と似ていますね。#n違いがあるとすれば――"
10042030-102 = "ネバネバの量が2倍に増えている点くらいでしょうか。"
10042030-104 = "そ、そんなに！？"
10042030-105 = "ネバネバ、あっちに続いてるみたい。"
10042030-106 = "教室のほうですね、行ってみましょう。"
10042030-113 = "こ、これは！？"
10042030-114 = "うわっ……。"
10042030-118 = "ネバネバの強度が増しています。#n少なくとも、人を壁に貼りつけられる程度には。"
10042030-119 = "もちろん――量も。"
10042030-123 = "ひとつ確認したいのですが、アレの大きさはどのくらいでしたか？"
10042030-124 = "え、えっと、普通のパンケーキサイズでした……。"
10042030-125 = "なるほど。#nでは皆さん……。"
10042030-126 = "この量のソースが、普通のパンケーキに使われていたと思いますか？"
10042030-127 = "[s] \"使われてないだろうね。\""
10042030-128 = "はい、先ほど廊下で見つけた死体……いえ、犠牲者に付着していたネバネバの量は、イオリの時よりも明らかに多くなっています。"
10042030-129 = "つまり――"
10042030-130 = "――アレは、成長しています。"
10042030-131 = "！！！"
10042030-132 = "[ns7] \"こんな短時間で……？\"\n[ns8] \"現実的に有り得ないんじゃ……？\""
10042030-135 = "……お言葉ですが、先生。"
10042030-136 = "そもそも、この状況そのものが非現実的だとは思いませんか？"
10042030-137 = "[s9] \"そ、それは……。\"\n[s10] \"否定できない……。\""
10042030-140 = "はい。#nこういう場面において、常識は通じません。"
10042030-141 = "理に適うか否かの問題ではありません。"
10042030-142 = "大切なのは、目の前で起きている事象を受け入れ……。"
10042030-143 = "変化を興味深く……いえ、注意深く観察し、備えることです。"
10042030-147 = "！！！"
10042030-148 = "近くの教室からですね。#n急ぎましょう。"
10042030-157 = "[ns] \"こ、これは……！？\""
10042030-158 = "ど、どうして、こんなことに……。"
10042030-159 = "ここまで来ると呆れを通り越して感心するわね……。"
10042030-163 = "私の推測が正しければ、アレは人を襲う度に成長しています。"
10042030-164 = "このまま放っておけば、ゲヘナ中が……。"
10042030-165 = "某企業の工場があったアライグマシティのようになってしまうかもしれません。"
10042030-166 = "アライグマシティ、ですか……？"
10042030-170 = "[ns11] \"アライグマシティって……？\"\n[ns12] \"それって、もしかして……。\""
10042030-171 = "……まさか、ご存じないのですか？"
10042030-172 = "正体不明の実験で、化け物が蔓延するようになった――"
10042030-173 = "――ゲームの都市を。"
10042030-174 = "先生はご存知なのですね。"
10042030-175 = "では、この先何が起こるのか――言わずとも分かるはずです。"
10042030-176 = "お伝えするタイミングを逃していましたが……。"
10042030-177 = "この現象について、以前小耳に挟んだことがあります。#nあのような個体の出現も、初めてではありません。"
10042030-178 = "もちろん、ここまで興味深い……失礼、凄まじいものだとは想像もしませんでしたが。"
10042030-179 = "し、知っていたんですか？#nあれを！？"
10042030-180 = "私も今日までは、ただの怪談や噂の類だと思っていました。"
10042030-181 = "巷で聞く「給食部には魔物が棲んでいる」――といったもののように。"
10042030-182 = "な、何の話！？#n根拠は！？"
10042030-183 = "あくまで、ただの噂です。#n噂に根拠などありません。"
10042030-184 = "とにかく、今のこの状況は――"
10042030-185 = "普段より、遥かに恐ろしく、規模の大きい事態だと推測しています。"
10042030-186 = "はいぃ！？"
10042030-187 = "[ns13] \"大規模……！？\"\n[ns14] \"恐ろしい……！？\""
10042030-190 = "はい。だからこそ、ここまで興味をそそられ――"
10042030-191 = "――いえ、恐ろしい問題を見て見ぬふりなどできません。"
10042030-192 = "そ、そんな……！"
10042030-193 = "私のせいでゲヘナの皆さんが……！"
10042030-194 = "……？#nいえ。そこまで深刻に考える必要はありませんよ。"
10042030-195 = "皆さん、ソースの味が不味すぎて気を失っているだけですから。"
10042030-196 = "この程度の事故など、2、3ヶ月に1回は起きていますので。"
10042030-197 = "温泉開発部や他のテロ団体に比べれば、さしたる問題ではないかと。"
10042030-198 = "そう言っていただけるとホッとしますが、それはそれで少し悲しいような……！？"
10042030-199 = "温泉開発部と比較されている時点で、かなりの一大事なんですが……。"
10042030-200 = "……はぁ。"
10042030-201 = "仕方ありません。#nこのカードは切りたくなかったのですが……。"
10042030-202 = "[s15] \"何か方法でもあるの？\"\n[s16] \"切りたくなかった……？\""
10042030-205 = "ええ……ですが、流石に使うしかないかと。"
10042030-206 = "もし、この[ruby=パンデモニウム・ソサエティー]件が万魔殿の耳[/ruby]に入ってしまえば――"
10042030-207 = "さらなる問題に発展してしまいますので。"
10042030-209 = "ゲヘナ学園・風紀委員会の教室"
10042030-212 = "何でしょうか。#nいま、手が離せないので要件はなるべく手短に――"
10042030-217 = "……はい？"
10042030-218 = "それは、どういう……。"
