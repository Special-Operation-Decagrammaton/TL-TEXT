[translation]
10042030-1 = "Episódio 3; Biohazard"
10042030-3 = "Preparativos para o transporte, concluídos."
10042030-4 = "Bom trabalho."
10042030-5 = "Hum, não sei se deveria dizer isso, mas..."
10042030-6 = "Eu vi aquilo no café agorinha."
10042030-7 = "Aquilo...?"
10042030-11 = "...Ah, aquele monstro, não é?"
10042030-12 = "！？"
10042030-13 = "(Pensando bem, aquela pessoa... ela estava lá agora pouco...!)"
10042030-14 = "Pode me dar mais detalhes?"
10042030-15 = "Sim, eu estava no café com um amigo quando..."
10042030-16 = "Vi uma panqueca roxa coberta por uma gosma verde."
10042030-17 = "...Verde e roxa, entendo."
10042030-18 = "Foi muito rápido, então não me lembro bem, mas... parecia ter tentáculos."
10042030-19 = "Passou voando por mim."
10042030-20 = "Ugh... só de lembrar já me sinto mal."
10042030-21 = "Entendo... você tem alguma ideia de para onde o monstro foi?"
10042030-22 = "Não, não faço ideia. #nPara começar, nem imaginei que ele chegaria até aqui."
10042030-23 = "Entendido. Por enquanto, após transportar este cadáver... digo, este ferido, por favor, mantenha-o em observação."
10042030-24 = "Sim, Chefe."
10042030-28 = "Ainda não entendi a situação por completo, mas..."
10042030-29 = "Uma coisa é certa:"
10042030-30 = "— Já que eu estou aqui, não posso simplesmente ignorar o que está acontecendo."
10042030-31 = "[s1] \"Uau, que legal.\"\n[s2] \"Posso te chamar de Doutora Sena?\""
10042030-34 = "Doutora...?"
10042030-35 = "Então você confia em mim, não é?"
10042030-36 = "Obrigada, fico feliz."
10042030-37 = "— Essa situação, pessoalmente, despertou um pouco do meu interesse."
10042030-38 = "Pelo menos... é um caso mais intrigante do que apenas jogar delinquentes na ambulância."
10042030-39 = "E então... o que vamos fazer?"
10042030-40 = "Bem... por enquanto, acho que vamos seguir os rastros."
10042030-41 = "V-você tem certeza...? #nJá tem uma pessoa que foi derrotada por isso..."
10042030-42 = "Não se preocupe, isso só torna as coisas mais interessantes."
10042030-44 = "Eh...?"
10042030-45 = "Interessante...?"
10042030-46 = "Sim, até eu mesma estou surpresa. #nNormalmente, eu não acharia um incidente "interessante", mas..."
10042030-47 = "Agora, algo que não consigo descrever está atraindo minha atenção."
10042030-48 = "[s3] \"É uma situação que deixou a Iori naquele estado...\"\n[s4] \"Não seria melhor traçarmos um plano de ação...?\""
10042030-51 = "Fique tranquila. #nEmbora pareça que estou me divertindo... perdão, estou levando isso muito a sério."
10042030-52 = "(Onde exatamente...)"
10042030-53 = "Então, vamos começar a perseguição. #nEu vou na frente."
10042030-56 = "[ns] \"...Que cena impressionante.\""
10042030-57 = "Tem gosma até no corredor..."
10042030-58 = "Sinto que a quantidade está aumentando um pouco..."
10042030-59 = "Chinatsu, corrija isso. #nNão é um pouco, está aumentando claramente."
10042030-60 = "O que acontece se a quantidade aumentar ainda mais!?"
10042030-61 = "Não sei. #nÉ justamente para descobrir isso que estamos avançando."
10042030-62 = "...Isso está ficando cada vez mais curioso."
10042030-63 = "Não acho que seja hora de se divertir..."
10042030-64 = "U-ugh..."
10042030-65 = "……Ouvi um som vindo dali!"
10042030-66 = "Entendo. #nO próximo cadáver, ou talvez uma pista... não, uma vítima, eu diria."
10042030-71 = "Se, Sena-san!? #nEspere um pouco!"
10042030-81 = "U, uuu..."
10042030-85 = "[ns] \"V, você está bem? O que aconteceu!?\""
10042030-86 = "Ouvi um barulho estranho vindo daquela sala de aula..."
10042030-87 = "Quando fui verificar o que era..."
10042030-93 = "[ns5] \"Isso é...\"\n[ns6] \"É um clichê...!\""
10042030-96 = "Sobre o que exatamente o Sensei está falando..."
10042030-97 = "Um clichê é algo que, uma vez estabelecido, precisa ser cumprido. #nÉ o básico do básico — ou seja, significa um padrão."
10042030-98 = "……Conseguiu entender com essa explicação?"
10042030-99 = "Já deu para perceber que você não está levando isso a sério..."
10042030-100 = "Sinto muito. #nO veterano sempre foi assim..."
10042030-101 = "Esta situação é parecida com a da Iori. #nSe houver alguma diferença —"
10042030-102 = "Seria o fato de que a quantidade de gosma dobrou."
10042030-104 = "T, tanto assim!?"
10042030-105 = "A gosma parece continuar naquela direção."
10042030-106 = "É em direção à sala de aula. Vamos lá."
10042030-113 = "I, isso é!?"
10042030-114 = "Ugh..."
10042030-118 = "A viscosidade da gosma aumentou. #nPelo menos o suficiente para prender uma pessoa na parede."
10042030-119 = "Claro — e a quantidade também."
10042030-123 = "Gostaria de confirmar uma coisa: qual era o tamanho daquilo?"
10042030-124 = "B-bem, era do tamanho de uma panqueca comum..."
10042030-125 = "Entendo. #nEntão, pessoal..."
10042030-126 = "Vocês acham que essa quantidade de calda seria usada em uma panqueca comum?"
10042030-127 = "[s] \"Acho que não.\""
10042030-128 = "Sim, a quantidade de gosma que estava grudada no cadáver — não, na vítima que encontramos no corredor — é claramente maior do que no caso da Iori."
10042030-129 = "Ou seja —"
10042030-130 = "— Aquilo está crescendo."
10042030-131 = "!!!"
10042030-132 = "[ns7] \"Em tão pouco tempo...?\"\n[ns8] \"Isso não é realisticamente impossível...?\""
10042030-135 = "……Com todo o respeito, Sensei."
10042030-136 = "Para começar, você não acha que esta situação em si já é irreal?"
10042030-137 = "[s9] \"I, isso é...\"\n[s10] \"Não posso negar...\""
10042030-140 = "Sim. #nNesse tipo de situação, o senso comum não se aplica."
10042030-141 = "Não é uma questão de ser lógico ou não."
10042030-142 = "O importante é aceitar o fenômeno que está acontecendo diante de nós..."
10042030-143 = "Observar as mudanças com interesse... não, com cautela, e estar preparado."
10042030-147 = "!!!"
10042030-148 = "É da sala de aula próxima. #nVamos nos apressar."
10042030-157 = "[ns] \"I, isso é...!?\""
10042030-158 = "P, por que as coisas chegaram a esse ponto..."
10042030-159 = "Chegar a esse nível vai além do choque, chega a ser impressionante..."
10042030-163 = "Se minha teoria estiver correta, aquilo cresce cada vez que ataca uma pessoa."
10042030-164 = "Se deixarmos como está, toda Gehenna..."
10042030-165 = "Pode acabar como a Raccoon City, onde ficava a fábrica de uma certa empresa."
10042030-166 = "Raccoon City, você diz...?"
10042030-170 = "[ns11] \"O que é Raccoon City...?\"\n[ns12] \"Será que isso é...\""
10042030-171 = "……Não me diga que vocês não sabem?"
10042030-172 = "Por causa de um experimento desconhecido, monstros começaram a se espalhar――"
10042030-173 = "――pela cidade do jogo."
10042030-174 = "Você já sabia disso, não é, Sensei?"
10042030-175 = "Então, você deve saber o que vai acontecer daqui para frente――mesmo sem eu dizer."
10042030-176 = "Eu perdi a oportunidade de te contar antes, mas..."
10042030-177 = "Eu já tinha ouvido falar sobre esse fenômeno anteriormente.#nO surgimento de espécimes como aquele não é a primeira vez."
10042030-178 = "Claro, eu não imaginava que seria tão interessante... perdão, tão terrível assim."
10042030-179 = "V-você sabia?#nSobre aquilo!?"
10042030-180 = "Até hoje, eu também pensava que não passava de lendas urbanas ou boatos."
10042030-181 = "Como aquele que dizem por aí: 'existem monstros vivendo no Clube de Merenda'."
10042030-182 = "Q-que história é essa!?#nQual a base disso!?"
10042030-183 = "É apenas um boato, nada mais.#nBoatos não têm fundamento."
10042030-184 = "De qualquer forma, a situação atual é――"
10042030-185 = "Eu presumo que seja algo muito mais assustador e de uma escala bem maior do que o habitual."
10042030-186 = "Hã!?"
10042030-187 = "[ns13] \"Em larga escala...!?\"\n[ns14] \"Assustador...!?\""
10042030-190 = "Sim. É justamente por isso que estou tão intrigada――"
10042030-191 = "――não, eu não posso simplesmente ignorar um problema tão terrível."
10042030-192 = "I-isso não pode ser...!"
10042030-193 = "Por minha causa, o pessoal de Gehenna está...!"
10042030-194 = "...?#nNão. Não precisa levar tão a sério."
10042030-195 = "Eles só desmaiaram porque o gosto do molho estava horrível demais."
10042030-196 = "Acidentes desse nível acontecem uma vez a cada dois ou três meses."
10042030-197 = "Comparado ao Clube de Desenvolvimento de Fontes Termais e outros grupos terroristas, não creio que seja um problema tão grande."
10042030-198 = "Fico aliviada em ouvir isso, mas, ao mesmo tempo, é um pouco triste...!?"
10042030-199 = "O fato de estarmos sendo comparados ao Clube de Desenvolvimento de Fontes Termais já mostra que é um grande problema..."
10042030-200 = "...Haa."
10042030-201 = "Não tem jeito.#nEu não queria usar esta carta, mas..."
10042030-202 = "[s15] \"Você tem algum método?\"\n[s16] \"Não queria usar...?\""
10042030-205 = "Sim... mas, infelizmente, não tenho outra escolha a não ser usá-la."
10042030-206 = "Se esse caso chegar aos ouvidos do Pandemonium Society――"
10042030-207 = "Isso acabará se transformando em um problema ainda maior."
10042030-209 = "Sala do Comitê Disciplinar da Academia Gehenna"
10042030-212 = "O que foi?#nEstou ocupada agora, então seja o mais breve possível――"
10042030-217 = "...Sim?"
10042030-218 = "O que você quer dizer com isso..."
