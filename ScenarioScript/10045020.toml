[translation]
10045020-1 = "Episódio 2; Primeira Rodada: Jogo de Sobrevivência com Armas de Água"
10045020-4 = "Empurrem! Primeiro, vamos esmagar o Hyakkiyako!"
10045020-5 = "Vou me vingar de tudo o que fizeram até agora!!"
10045020-9 = "Yukari! Estão quase te cercando, consegue se recuperar?"
10045020-13 = "Ai, ainda estou bem!"
10045020-14 = "Por que...? #nA estratégia deveria ter sido perfeita..."
10045020-15 = "No fim, eu não sirvo para nada... Só estou atrapalhando todo mundo..."
10045020-17 = "Ei, as duas, se recomponham!!"
10045020-19 = "10 minutos atrás..."
10045020-21 = "Uma praia com visibilidade para todos os lados..."
10045020-22 = "Todos vão tentar garantir um lugar para se esconder primeiro."
10045020-23 = "Por isso, acho que o melhor para nós é construir uma base na areia para resistir."
10045020-24 = "Então, eu cuidarei de ganhar tempo até lá!"
10045020-26 = "Meu estilo é partir para o ataque, mas... #nTudo bem, se a Kikyou diz, vamos fazer assim."
10045020-27 = "Decidido. Por onde começamos?"
10045020-29 = "...Onde foi que eu errei?"
10045020-30 = "Se tudo tivesse saído como o esperado, não teríamos caído nessa confusão."
10045020-34 = "Aaaah...!"
10045020-35 = "Ei! Aguente firme! #nVamos vencer juntos e ir comer doces, como prometemos—"
10045020-39 = "Aaaaaah...!"
10045020-40 = "Já eliminaram duas! Hyakkiyako... eu nunca vou perdoar vocês!!"
10045020-42 = "Isso é uma acusação falsa!!"
10045020-43 = "Por que só estão mirando na gente!?"
10045020-45 = "Pelo nosso bem, percam aqui logo!!"
10045020-46 = "Isso mesmo! Se eliminarmos os favoritos ao título, teremos uma chance!!"
10045020-47 = "Por causa de vocês, nosso fundo de atividades acabou... #nPrecisamos ganhar o prêmio de qualquer jeito!!"
10045020-49 = "Entendo o motivo de quererem vencer, mas..."
10045020-50 = "Isso é problema de vocês, não é?!"
10045020-54 = "Ah! Líder, cuidado...!!"
10045020-60 = "Aaaah...!!"
10045020-62 = "Droga...! N-não pode ser...!"
10045020-63 = "V-vocês, eu nunca vou perdoar!!"
10045020-64 = "Isso é o ciclo do ódio...! Esta é a tragédia do campo de batalha!"
10045020-65 = "Mas superar provações como essa também faz parte da juventude!"
10045020-66 = "A juventude não é tão sangrenta assim!"
10045020-71 = "Uma grande confusão logo no início! Parece que o pessoal do Hyakkiyako está sendo alvo! #nSerá que elas vão conseguir resistir a esse ataque feroz!?"
10045020-73 = "Vou ajudar~"
10045020-74 = "É verdade! É hora de retribuir os favores que nos fizeram!"
10045020-75 = "Fufu... então, vamos?"
10045020-80 = "Q-o que é isso!?"
10045020-81 = "A-aquilo é...!?"
10045020-85 = "O Clube de Pesquisa Ninjutsu veio reforçar...! Nin-nin!"
10045020-86 = "Eu não sou do Clube de Pesquisa Ninjutsu, mas..."
10045020-87 = "Vou lutar junto~"
10045020-89 = "Droga, não acredito que eles se juntaram a elas...!"
10045020-90 = "Não entrem em pânico! Estamos em maior número!! Cerquem e esmaguem elas!"
10045020-97 = "P-pessoal do Hyakkiyako! Nós também vamos ajudar!"
10045020-98 = "Foi por pouco tempo, mas... a Renge-chan é nossa colega de clube!"
10045020-100 = "Vocês!"
10045020-101 = "Droga... o que está acontecendo...!?"
10045020-102 = "Com isso, a situação se inverteu!"
10045020-103 = "Muito bem, pessoal, vamos lá! Vamos acabar com eles de uma vez por todas!!"
