[translation]
10045020-1 = "第2話;第一回戦：水鉄砲サバイバルゲーム"
10045020-4 = "押し込め！まずは百花繚乱から叩き潰せ！！"
10045020-5 = "これまでの分、たっぷり仕返ししてやる！！"
10045020-9 = "ユカリ！そっち抜かれそうだけど、持ち直せる？"
10045020-13 = "ま、まだ大丈夫ですの！"
10045020-14 = "どうして……？#n作戦は完璧だったはずなのに……。"
10045020-15 = "やっぱり私じゃダメなんだ……私じゃみんなの足を引っ張ってしまうばっかりで……。"
10045020-17 = "ちょっ、二人ともしっかりしてくれ！！"
10045020-19 = "10分前……。"
10045020-21 = "四方八方、見晴らしのいいビーチ……。"
10045020-22 = "まずはみんな隠れられる場所を確保しようとするはず。"
10045020-23 = "だから私たちも最初は、砂で陣地を作って凌ぐのが最善だと思う。"
10045020-24 = "では、それまでの時間は身共が稼ぎますの！"
10045020-26 = "アタシは突撃するのが性に合ってるけど……#nいいよ、キキョウが言うなら、それでいこう。"
10045020-27 = "決まりだね。何から始める？"
10045020-29 = "……どこで間違えたんだろう？"
10045020-30 = "予想通りなら、こんな乱戦にはならないはずだったのに。"
10045020-34 = "うわああっ……！"
10045020-35 = "おい！しっかりしろ！#n一緒に勝ち残って、スイーツ食べに行く約そ――"
10045020-39 = "うわああああっ……！"
10045020-40 = "もう二人やられた！百花繚乱め……絶対に許さないからな！！"
10045020-42 = "それは言いがかりですの！！"
10045020-43 = "何でアタシらばっか狙われるんだよ！？"
10045020-45 = "あたしらのために、ここで負けてくれ！！"
10045020-46 = "そうだそうだ！優勝候補を落とせば、私たちにもチャンスが生まれる！！"
10045020-47 = "お前らのせいで活動資金も底をついた……。#n絶対に優勝賞金を手に入れなきゃならないんだ！！"
10045020-49 = "優勝したい理由は分かったけど……。"
10045020-50 = "そんなの、自業自得だろ！！"
10045020-54 = "あっ！リーダー危ない……っ！！"
10045020-60 = "ぎゃああっ……！！"
10045020-62 = "くそっ……！そ、そんな……！"
10045020-63 = "お、お前ら、絶対許さないからな！！"
10045020-64 = "これが憎しみの連鎖……！これぞ戦場の悲哀！"
10045020-65 = "ですが、こんな試練を乗り越えるのも青春ですの！"
10045020-66 = "青春はそんなに血生臭くない！"
10045020-71 = "開幕早々大乱戦！百花繚乱の皆さんが狙われているようです！#nこの猛攻を耐え切れるのか〜っ！？"
10045020-73 = "助けよ～"
10045020-74 = "そうですね！これまでのご恩をお返しする時です！"
10045020-75 = "ふふっ……では、行きましょうか？"
10045020-80 = "な、何だ！？"
10045020-81 = "あ、あれはっ……！？"
10045020-85 = "忍術研究部、助太刀いたします……！ニンニン！"
10045020-86 = "私は忍術研究部ではないのですが……。"
10045020-87 = "一緒に戦うよ～"
10045020-89 = "くっ、あいつらが合流するなんて……！"
10045020-90 = "みんな慌てるな！数はこっちが多い！！囲んで押しつぶせ！"
10045020-97 = "ひ、百花繚乱の皆さん！私たちも力を貸します！"
10045020-98 = "短い間だったけど……レンゲちゃんは同じ部活の仲間だから！"
10045020-100 = "お前たち！"
10045020-101 = "くそっ……なんなんだよ……！？"
10045020-102 = "これで形勢逆転ですの！"
10045020-103 = "よーっし、みんな行くよ！一気に蹴散らしてやる！！"
