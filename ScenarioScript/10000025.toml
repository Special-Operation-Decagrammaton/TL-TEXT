[translation]
10000025-1 = "第2話;百鬼夜行の問題児たち"
10000025-3 = "きゃんっ！？"
10000025-4 = "[s] \"ちょっ、どうしてイズナがここに……！？\""
10000025-5 = "あれっ、先生！？"
10000025-6 = "そ、それはイズナの台詞です！どうして先生が私たちの邪魔を！？"
10000025-7 = "はっ！もしかして先生は、最初からイズナを誘い出すために近づいてきたのですか！？"
10000025-8 = "まさか、すべては仕組まれていた……！？"
10000025-9 = "イズナの夢を応援するって言ってくれたのに！本当は悪い大人だったんですか！？"
10000025-10 = "[s1] \"一体何が何やら……それより、イズナはどうして……？\"\n[s2] \"どうして魑魅一座と……？だって、イズナの夢は……。\""
10000025-11 = "い、イズナは忍びとして命令に従っているだけです！"
10000025-12 = "い、イズナは忍びとして命令に従っているだけです！"
10000025-14 = "[s] \"命令……？\""
10000025-18 = "どうよ！お祭り運営委員会を舐めないで！"
10000025-19 = "一網打尽、デス！"
10000025-20 = "くっ、強い！あいつら、なんか前よりも強くなってる……！？"
10000025-21 = "あそこにいる大人の指揮のせいっす、急にお祭り運営委員会の動きが変わったっす！"
10000025-22 = "くっ、イズナ殿！一旦戦略的撤退だ！"
10000025-23 = "せ、戦略的撤退……？ですがイズナは……。"
10000025-24 = "立派な忍者は引き際を弁えてるものだよ！何かの本で読んだ気がする！"
10000025-25 = "なるほど！そういうことであれば！"
10000025-26 = "先生……まさかイズナの夢を応援してくれた先生が立ちはだかるだなんて……。"
10000025-27 = "何という運命の悪戯……！"
10000025-28 = "ですがイズナは知っています！忍びの道を行くからには、こういったことも起こり得るのだと！"
10000025-29 = "ドラマで見ましたので！"
10000025-30 = "[s] \"……ドラマ？\""
10000025-31 = "望まぬ戦いに巻き込まれてしまうのもまた、忍者の[ruby=さだめ]宿命[/ruby]！"
10000025-32 = "先生、イズナは諦めません！"
10000025-33 = "次に相まみえる時はイズナ、今の三倍くらい強くなっているはずですので！では、ニンニン！"
10000025-35 = "（そしてイズナは一瞬で消え去っていった）"
10000025-37 = "ああもう、[ruby=・・]また[/ruby]！"
10000025-38 = "桜花祭が始まってからというものの、こうやって魑魅一座のやつらがあちこちで悪さをするんです！"
10000025-39 = "[s] \"魑魅一座……って、何者？\""
10000025-40 = "[ruby=すだまいちざ]魑魅一座[/ruby]・路上流。"
10000025-41 = "昔から百鬼夜行で、しょっちゅう問題を起こしているやつらデス！"
10000025-42 = "確かに以前から問題児だったとはいえ、こんなに組織的に動くようになったのは最近になってからな気が……。"
10000025-43 = "まるで、組織立って「百夜ノ春ノ桜花祭」を台無しにさせようとしてるっていうか……。"
10000025-44 = "何にせよ、任侠を志す者として放ってはおけマセン！"
10000025-45 = "ああもうっ！本当に何なのよっ！"
10000025-46 = "今までは何とか私たちだけで止められたけど……。"
10000025-47 = "なんか頻度も数も増えてる気がするし、このままだと……！"
10000025-48 = "このまま桜花祭がダメになったら、私たちがあちこちから責められるじゃない！たまったもんじゃないわよ！"
10000025-49 = "……。"
10000025-50 = "……えっと、"
10000025-51 = "な～んちゃって、シズコ怖いです～☆"
10000025-52 = "[s] \"どう反応すればいいのか……。\""
10000025-53 = "フィーナ、理解できマセン。どうして桜花祭を邪魔しようとするんデショウ？"
10000025-54 = "……知ったこっちゃあないが、色々と気に食わないんじゃないかい。"
10000025-55 = "あっ、会長！"
10000025-56 = "[s] シズコの視線の先に目をやる。"
10000025-57 = "どうも、百鬼夜行の商店街の会長だよ。"
10000025-58 = "いったい桜花祭の何が気に食わないんでしょうか……？"
10000025-59 = "さあね……ただ強いて言えば、今回はひとつ大きく変わったことがあるだろう。昔からこの「百夜ノ春ノ桜花祭」の最後には、伝統的に花火が打ち上げられていた。"
10000025-60 = "でも今回はちょっと違うんだろう？新たな試みだとかなんとか。"
10000025-61 = "はい……今回の桜花祭のために、特別に準備したものが。"
10000025-65 = "（テーブルの上に、何かの装置が置いてある）"
10000025-68 = "今回のお祭りのフィナーレのために、ミレニアムにお願いした特別な装置です。"
10000025-69 = "ホログラムで花火を再現する、specialでniceな機械だと聞きマシタ！"
10000025-70 = "お金のかかってそうな機械だな……まあ何にせよ、何かが変わるということを、誰しもが簡単に受け入れられるわけじゃない。"
10000025-71 = "それはそうですけど……それが理由で、桜花祭を邪魔するなんて……。"
10000025-72 = "私はただ「百夜ノ春ノ桜花祭」を、今まで以上に素敵なものにしたくって……。"
10000025-73 = "あくまで推測だ。それに儂だって今さら、このことを蒸し返したいわけじゃあない。ただ、気に食わんと思うやつらもいるだろうなって話だよ。学生がこんなに金を使って……ってな。"
10000025-74 = "はい……ですが、私たちも趣味や道楽だけでやってるわけじゃありません！"
10000025-75 = "全てはお祭り運営委員会の委員長として、桜花祭を素敵なものにするために！それだけは自信を持って言えます！"
10000025-76 = "ハイ！お祭りというのは、毎年どんどん楽しくなっていくべきデス！"
10000025-77 = "ふん、そうかい。じゃあそうなるように頑張りな。"
10000025-78 = "そうやってぶっきらぼうですが、会長はいつも手伝ってくれますし。今回の桜花祭でも、色々と心配してくれてますもんね。"
10000025-79 = "フィーナ知ってます！「ツンデレ」ってやつデスね！"
10000025-80 = "違うわい！……それで、どうするつもりなんだい？"
10000025-81 = "そろそろあいつらを止めないと、このままじゃ桜花祭がめちゃくちゃになっちまう。"
10000025-82 = "[s] \"他の人に助けを求めるっていうのは？\""
10000025-83 = "うーん……助けを求められる部活や委員会がゼロってわけじゃないんですけど……。"
10000025-84 = "どこもかしこも、真っ当に手伝ってくれるのかどうか……。"
10000025-85 = "[s] \"ええ……？\""
10000025-86 = "うーん、でも背に腹は代えられませんし……。"
10000025-87 = "心当たりはありますし、一度行ってみましょう。ただ……"
10000025-88 = "先生の力が必要です、協力してくれますよね？"
10000025-90 = "どこかの廃墟"
10000025-92 = "失敗の理由を聞かせてもらおうか、魑魅一座。"
10000025-93 = "今日中にはお祭りを中断させると約束したはずだが……？"
10000025-94 = "大金を払ってまで聞きたいのは、「できませんでした」なんて言葉じゃないぞ。"
10000025-95 = "そ、それはその……予想外の伏兵がいたというか。"
10000025-96 = "シャーレの先生に邪魔されたっす！あの人のせいっす！"
10000025-97 = "……シャーレの、先生？"
10000025-98 = "はい、先生です！"
10000025-99 = "……イズナ殿まで、何を言っている。"
10000025-100 = "以前、言っていましたよね。"
10000025-101 = "イズナが頑張って命令を遂行していけば、いつかはかっこいい忍者になれるって！"
10000025-102 = "イズナが生涯仕えるべき、運命の主君とも出会えるって！"
10000025-103 = "たしかに、そう言ったような気もするな……。"
10000025-104 = "イズナは正に、そんな主君に出会えたかもしれません！先生は強く、優しく、何よりイズナの夢を応援してくれました！"
10000025-105 = "ほう……それで？"
10000025-106 = "そんな先生が、何故か邪魔者たちと一緒にいました！どういうことなのでしょう？"
10000025-107 = "……はっ、まさか……！"
10000025-108 = "イズナ、分かりました！"
10000025-109 = "先生は……騙されているのではないでしょうか！"
10000025-110 = "それはどうでもいいが……イズナ殿もそう言うのなら、確かにその先生とやらは油断できない相手なのだろう。"
10000025-111 = "今回は大目に見よう、ただし額面通りの働きはきっちりしてもらうぞ。"
10000025-112 = "次こそ、このお祭りを中止にさせてやるよ！"
10000025-113 = "ご心配なく。イズナも、騙されてる先生を倒して、真実を教えてあげます！"
10000025-114 = "そ、そうか……。"
10000025-115 = "イズナが戦って勝てば、先生も目を覚ましてくれるはずです！"
10000025-116 = "そうか……まあいい。信じよう、イズナ殿。"
10000025-118 = "はい、お任せください！ニンニン！"
10000025-121 = "……あいつ、本当に大丈夫か？"
