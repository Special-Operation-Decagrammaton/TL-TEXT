[translation]
10000025-1 = "Episódio 2: As encrenqueiras de Hyakkiyako"
10000025-3 = "Ai!?"
10000025-4 = "[s] \"Ei, por que a Izuna está aqui...!?\""
10000025-5 = "Ah, Sensei!?"
10000025-6 = "E-essa é a minha fala! Por que o Sensei está atrapalhando a gente!?"
10000025-7 = "Ah! Será que o Sensei se aproximou de mim desde o início só para me atrair para uma armadilha!?"
10000025-8 = "Não pode ser, tudo isso foi planejado...!?"
10000025-9 = "Você disse que apoiava o meu sonho! Você é um adulto mau, na verdade!?"
10000025-10 = "[s1] \"Eu não estou entendendo nada... mas, Izuna, por que você...\"\n[s2] \"Por que você está com o Chimi Ichiza...? Afinal, o seu sonho é...\""
10000025-11 = "E-eu só estou seguindo ordens como uma ninja!"
10000025-12 = "E-eu só estou seguindo ordens como uma ninja!"
10000025-14 = "[s] \"Ordens...?\""
10000025-18 = "O que acharam! Não subestimem o Comitê de Operações do Festival!"
10000025-19 = "Capturadas de uma vez, é isso!"
10000025-20 = "Droga, elas são fortes! Elas estão mais fortes do que antes...!?"
10000025-21 = "É por causa daquele adulto dando ordens ali, os movimentos do Comitê de Operações do Festival mudaram de repente!"
10000025-22 = "Droga, Izuna-dono! Vamos fazer uma retirada estratégica!"
10000025-23 = "Re-retirada estratégica...? Mas eu..."
10000025-24 = "Uma ninja de verdade sabe a hora de recuar! Acho que li isso em algum livro!"
10000025-25 = "Entendo! Se é assim, então tudo bem!"
10000025-26 = "Sensei... quem diria que o Sensei, que apoiou o sonho da Izuna, acabaria ficando no meu caminho..."
10000025-27 = "Que crueldade do destino...!"
10000025-28 = "Mas a Izuna sabe! Que ao seguir o caminho do ninja, coisas assim podem acontecer!"
10000025-29 = "Eu vi isso num drama!"
10000025-30 = "[s] \"...Um drama?\""
10000025-31 = "Ser arrastada para batalhas indesejadas também é o destino de um ninja!"
10000025-32 = "Sensei, a Izuna não vai desistir!"
10000025-33 = "Da próxima vez que nos encontrarmos, a Izuna estará três vezes mais forte! Então, nin-nin!"
10000025-35 = "(E então, Izuna desapareceu num instante)"
10000025-37 = "Ah, droga, de novo!"
10000025-38 = "Desde que o Festival das Cerejeiras começou, esse pessoal da Trupe Chimi tem causado problemas por toda parte!"
10000025-39 = "[s] \"Trupe Chimi... quem são eles?\""
10000025-40 = "Trupe Chimi, Estilo de Rua."
10000025-41 = "Eles são encrenqueiros que vivem causando problemas em Hyakkiyako há muito tempo!"
10000025-42 = "Embora eles sempre tenham sido problemáticos, sinto que só começaram a agir de forma tão organizada recentemente..."
10000025-43 = "É como se estivessem agindo em conjunto para arruinar o \"Festival das Cerejeiras de Primavera de Hyakki\"..."
10000025-44 = "De qualquer forma, como alguém que aspira ao caminho da cavalaria, não posso deixar isso passar!"
10000025-45 = "Ah, droga! O que está acontecendo, afinal?!"
10000025-46 = "Até agora, conseguimos impedi-los por conta própria, mas..."
10000025-47 = "Sinto que a frequência e o número deles estão aumentando, e se continuar assim...!"
10000025-48 = "Se o Festival Ouka for arruinado desse jeito, nós seremos culpadas por todos os lados! Isso é inaceitável!"
10000025-49 = "……."
10000025-50 = "……Bem,"
10000025-51 = "Brincadeirinha, a Shizuko está com medo~☆"
10000025-52 = "[s] \"Como eu deveria reagir a isso…….\""
10000025-53 = "Fina, não consigo entender. Por que tentariam atrapalhar o Festival Ouka?"
10000025-54 = "……Não faço ideia, mas talvez haja várias coisas que não os agradam."
10000025-55 = "Ah, presidente!"
10000025-56 = "[s] Olho para onde Shizuko está olhando."
10000025-57 = "Olá, sou a presidente da associação comercial de Hyakkiyako."
10000025-58 = "O que exatamente poderia não agradar no Festival Ouka……?"
10000025-59 = "Quem sabe…… Mas, se for para apontar algo, houve uma grande mudança desta vez. Tradicionalmente, fogos de artifício sempre foram lançados no final deste \"Festival Ouka da Primavera de Hyakkiya\"."
10000025-60 = "Mas desta vez é um pouco diferente, não é? Algo sobre uma nova tentativa ou algo do tipo."
10000025-61 = "Sim…… Preparamos algo especial para o Festival Ouka desta vez."
10000025-65 = "(Há algum tipo de dispositivo colocado sobre a mesa)"
10000025-68 = "É um dispositivo especial que pedimos ao Millennium para o final do festival desta vez."
10000025-69 = "Ouvi dizer que é uma máquina especial e incrível que reproduz fogos de artifício com hologramas!"
10000025-70 = "Parece uma máquina que custou caro…… Bem, de qualquer forma, nem todo mundo aceita facilmente o fato de que as coisas estão mudando."
10000025-71 = "Isso é verdade, mas…… usar isso como motivo para atrapalhar o Festival Ouka……."
10000025-72 = "Eu só queria tornar o \"Festival Ouka da Primavera de Hyakkiya\" ainda mais maravilhoso do que nunca……."
10000025-73 = "É apenas uma suposição. Além disso, eu também não quero ficar remoendo isso agora. É só que, imagino que existam pessoas que não vão gostar. Pensando que estudantes estão gastando tanto dinheiro assim..."
10000025-74 = "Sim... mas nós não estamos fazendo isso apenas por hobby ou diversão!"
10000025-75 = "Como presidente do Comitê Organizador do Festival, tudo o que faço é para tornar o Festival Ouka algo maravilhoso! Disso eu posso dizer com confiança!"
10000025-76 = "Sim! Um festival deve ficar cada vez mais divertido a cada ano!"
10000025-77 = "Hum, é mesmo? Então se esforcem para que seja assim."
10000025-78 = "A presidente é sempre ríspida assim, mas ela sempre nos ajuda. Ela também está preocupada com várias coisas neste Festival Ouka, não é?"
10000025-79 = "A Fina sabe! É o que chamam de 'tsundere', né!"
10000025-80 = "Não é nada disso! ...Enfim, o que vocês pretendem fazer?"
10000025-81 = "Se não pararmos aqueles caras logo, o Festival Ouka vai acabar sendo arruinado."
10000025-82 = "[s] \"Que tal pedir ajuda para outras pessoas?\""
10000025-83 = "Hmm... não é como se não existissem clubes ou comitês para quem pudéssemos pedir ajuda..."
10000025-84 = "Mas não sei se todos eles ajudariam de forma honesta..."
10000025-85 = "[s] \"Sério...?\""
10000025-86 = "Hmm, mas não temos outra escolha..."
10000025-87 = "Eu tenho algumas ideias, vamos tentar ir lá. Só que..."
10000025-88 = "Precisamos da ajuda do Sensei, você vai colaborar, não vai?"
10000025-90 = "Alguma ruína"
10000025-92 = "Quero que me expliquem o motivo da falha, trupe Chimi."
10000025-93 = "Vocês prometeram que interromperiam o festival ainda hoje, não foi...?"
10000025-94 = "Não paguei uma fortuna para ouvir palavras como 'não conseguimos'."
10000025-95 = "I-Isso é porque... digamos que apareceu um oponente inesperado."
10000025-96 = "O Sensei do Schale atrapalhou a gente! A culpa é dele!"
10000025-97 = "……O Sensei, do Schale?"
10000025-98 = "Sim, o Sensei!"
10000025-99 = "……Até você, Izuna-dono, o que está dizendo?"
10000025-100 = "Você disse antes, não disse?"
10000025-101 = "Que se a Izuna se esforçasse para cumprir as ordens, um dia eu me tornaria uma ninja incrível!"
10000025-102 = "E que eu também encontraria o senhor do destino a quem a Izuna deveria servir por toda a vida!"
10000025-103 = "É verdade, acho que disse algo assim mesmo……."
10000025-104 = "A Izuna talvez tenha acabado de encontrar esse senhor! O Sensei é forte, gentil e, acima de tudo, apoiou o sonho da Izuna!"
10000025-105 = "Ho... e então?"
10000025-106 = "Por algum motivo, esse Sensei estava junto com os encrenqueiros! O que será que isso significa?"
10000025-107 = "……Ah, não pode ser……!"
10000025-108 = "Izuna, entendi!"
10000025-109 = "O Sensei…… ele deve estar sendo enganado!"
10000025-110 = "Isso não importa, mas…… se a Izuna-dono diz isso, então esse tal de Sensei deve ser um oponente que não podemos subestimar."
10000025-111 = "Vou deixar passar desta vez, mas exijo que você trabalhe exatamente como o esperado."
10000025-112 = "Na próxima, eu vou fazer esse festival ser cancelado!"
10000025-113 = "Não se preocupe. A Izuna vai derrotar o Sensei que está sendo enganado e contar a verdade para ele!"
10000025-114 = "E-Entendo……."
10000025-115 = "Se a Izuna lutar e vencer, o Sensei com certeza vai acordar!"
10000025-116 = "Entendo... Bem, tudo bem. Vou acreditar em você, Izuna-dono."
10000025-118 = "Sim, pode deixar comigo! Nin-nin!"
10000025-121 = "……Aquela ali, será que ela está realmente bem?"
