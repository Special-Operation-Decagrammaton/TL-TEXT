[translation]
2601502-1 = "ビジネス・サーファー"
2601502-2 = "（海辺を歩いていたら、イチカと遭遇した）"
2601502-8 = "先生？"
2601502-9 = "どうして海に……って、そういや来てたっすね。はは。"
2601502-10 = "私っすか？ええっと……。"
2601502-11 = "実は、うっかり仕事が全部終わっちゃって。いつもはバレない程度にゆるくやるんすけどね……。"
2601502-12 = "で、暇そうに見えるのもアレだし、ぶらぶらしてるっす。"
2601502-13 = "[s1] \"そういう日もあるんだね。\"\n[s2] \"私の仕事も、うっかり早めに終わればいいのに……！\""
2601502-16 = "おかげで先生に会えたんで、ラッキーかも。"
2601502-17 = "どこか行くとこっすか？"
2601502-18 = "流石にバカンス中も仕事なんて――"
2601502-22 = "……ありそうだから、聞きづらいっすけど。"
2601502-23 = "え……？おサボり共犯者になってほしい？"
2601502-24 = "あはは！いいっすよ。行きますか。"
2601502-28 = "どうしたんすか？先生？"
2601502-29 = "……「あなたもイケてるサーファーに！初心者向け講座」っすか。"
2601502-30 = "ちらっと聞いたんすけど、今日ここでサーフィン大会があるらしいんすよ。"
2601502-31 = "そのついでに、競技人口増やしたいってとこじゃないっすか？"
2601502-32 = "でも意外っす、先生ってサーフィンに興味が――"
2601502-33 = "……はい？"
2601502-34 = "私にやってほしいんすか？"
2601502-35 = "そういうのは間に合ってるっす！"
2601502-36 = "た、たしかに暇そうにはしてたっすけど、サーフィンなんて……。"
2601502-37 = "もっと明るくて、キラキラしてる子がやるやつっすよ？"
2601502-38 = "私なんて、絶対海に落っこちて終わりっす。"
2601502-39 = "……それも楽しい思い出になるっすか？"
2601502-43 = "……ふふ。"
2601502-44 = "先生がそこまで推すなら、しょうがないっすね。"
2601502-45 = "その代わり、やるなら一緒に！っすよ？"
2601502-46 = "[s] \"え！私も！？\""
2601502-47 = "言い出しっぺじゃないっすか！"
2601502-48 = "付き合ってもらうっすよ！大人のかっこいいとこ見るの、楽しみっす！"
2601502-50 = "（こうしてサーフィン教室に参加することになったが……）"
2601502-51 = "（イチカはすぐにコツを掴んだようで……）"
2601502-57 = "ん～……これで合ってるっすかね……？"
2601502-58 = "イチカちゃんすごいよ！実は経験者？"
2601502-59 = "えっ、言われた通りボードに立っただけなんすけど。"
2601502-60 = "立つだけで数日かかる子もいるのに、一発でテイクオフできるなんて……才能あるね！"
2601502-61 = "は、ははは……ありがとうございます。"
2601502-62 = "初日は基礎の動きだけやる予定だったけど、イチカちゃんなら応用編も行けるかな？"
2601502-63 = "どうなっても知らないっすよ～？"
2601502-65 = "（その後、イチカは瞬く間に波を乗りこなせるようになっていった）"
2601502-66 = "（そして……）"
2601502-70 = "んん……？"
2601502-71 = "……なんでこんなことに？"
2601502-75 = "次はトリニティ所属、[ruby=なかまさ]仲正[/ruby]イチカ選手です！なんと、大会直前の駆け込み参加だとか！"
2601502-76 = "イチカちゃん～頑張って～！"
2601502-77 = "[s3] \"頑張れ！イチカーっ！\"\n[s4] \"イチカちゃん！最高～！\""
2601502-80 = "はは……先生ってば、ノリノリじゃないすか。"
2601502-81 = "というか、エントリーするっていうの冗談じゃなかったなんて……。"
2601502-85 = "[ruby=なかまさ]仲正[/ruby]選手。大会に挑むいまのご心境は！"
2601502-86 = "……せいぜい海に落ちないよう、気をつけるっす～"
2601502-87 = "マイペースなコメントから、逆に余裕が感じられますね！"
2601502-88 = "……本心なんすけど。"
2601502-89 = "それじゃ……いってくるっす。"
2601502-96 = "おお！先ほどは謙遜していた仲正選手！かなりの実力者であることが窺えます！"
2601502-97 = "派手さこそないものの、基礎を抑えた手堅い動き！サーフィン歴はかなりのものか！？"
2601502-101 = "（イチカは上手に波を乗りこなしていたが、惜しくもトロフィーは逃してしまった)"
2601502-105 = "うーん残念、イチカちゃん！これからは、いろんなテクニックを覚えていこう。そしたら完璧だよ！"
2601502-106 = "はは、大げさっす。"
2601502-107 = "次は優勝しよう！……明日のプロサーファーは君だ！なんてね！"
2601502-108 = "あ～……お言葉は嬉しいんすけど、今は委員会に集中したいと思ってるんで。"
2601502-109 = "くぅ……惜しいなぁ……これ、私の名刺！気が変わったらいつでも連絡してね！"
2601502-113 = "……ふぅ。"
2601502-114 = "不思議っすね。数時間前まで、サーフィンなんて一生やらないもんだと思ってたんすけど。"
2601502-115 = "[s5] \"すごかったよ！イチカ！\"\n[s6] \"あとちょっとで優勝だった！\""
2601502-118 = "おだて上手っすね～#nちょっと練習したくらいで、優勝できるわけないっすよ。"
2601502-119 = "仮に私が優勝したら、他のみなさんが報われないし……。"
2601502-120 = "ちょうどいい結果だったんすよ。"
2601502-121 = "……考えすぎっすかね？"
2601502-122 = "そうかもっす。"
2601502-123 = "――でも、私が勝っても変な空気になってたし、これでいいんす。"
2601502-127 = "あ、もうこんな時間っすか……。"
2601502-128 = "おかげで楽しい暇つぶしになったっす！"
2601502-129 = "次に海に来たときも……うーん……。"
2601502-133 = "サーフィン……またやるんすかね……？分からないっす。"
2601502-135 = "（イチカは、なにやら思い悩みながら帰っていった）"
