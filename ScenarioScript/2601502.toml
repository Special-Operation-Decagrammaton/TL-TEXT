[translation]
2601502-1 = "Surfista de Negócios"
2601502-2 = "（Enquanto caminhava pela praia, encontrei a Ichika）"
2601502-8 = "Professor(a)?"
2601502-9 = "Por que você está na praia... ah, é verdade, você veio para cá, não foi? Haha."
2601502-10 = "Eu? Bem..."
2601502-11 = "Na verdade, acabei terminando todo o meu trabalho sem querer. Normalmente eu faço as coisas num ritmo mais relaxado para não dar na vista..."
2601502-12 = "E, bem, não quero parecer que estou à toa, então estou só dando uma volta."
2601502-13 = "[s1] \"Às vezes acontece.\"\n[s2] \"Quem dera meu trabalho terminasse cedo sem querer também...!\""
2601502-16 = "Graças a isso, acabei te encontrando, então talvez eu tenha tido sorte."
2601502-17 = "Você tem algum lugar para ir?"
2601502-18 = "Dificilmente você estaria trabalhando durante as férias, mas..."
2601502-22 = "...como é algo que parece possível, fica difícil perguntar."
2601502-23 = "Hã...? Você quer que eu seja sua cúmplice em matar o trabalho?"
2601502-24 = "Ahaha! Tudo bem. Vamos nessa."
2601502-28 = "O que houve? Professor(a)?"
2601502-29 = "...\"Torne-se um surfista incrível! Curso para iniciantes\", é?"
2601502-30 = "Ouvi por alto que vai ter uma competição de surfe aqui hoje."
2601502-31 = "Não é só uma desculpa para aumentar o número de competidores?"
2601502-32 = "Mas é surpreendente, não sabia que você tinha interesse em surfe..."
2601502-33 = "...Sim?"
2601502-34 = "Você quer que eu participe?"
2601502-35 = "Dispenso esse tipo de coisa!"
2601502-36 = "E-eu até parecia estar à toa, mas surfe é algo que..."
2601502-37 = "É algo para pessoas mais alegres e radiantes, não é?"
2601502-38 = "Eu com certeza só vou cair no mar e acabar por aí."
2601502-39 = "...Isso também seria uma lembrança divertida?"
2601502-43 = "...Fufu."
2601502-44 = "Se você insiste tanto, não tenho escolha."
2601502-45 = "Mas, em troca, se eu for, você vai comigo!"
2601502-46 = "[s] \"Ei! Eu também!?\""
2601502-47 = "Foi você quem sugeriu, não foi?"
2601502-48 = "Você vai me acompanhar! Estou ansiosa para ver o lado legal de um adulto!"
2601502-50 = "（Assim, acabamos participando da aula de surfe...）"
2601502-51 = "（Parece que a Ichika pegou o jeito rapidamente...）"
2601502-57 = "Hmm... será que é assim...?"
2601502-58 = "Ichika, você é incrível! Você já tinha experiência?"
2601502-59 = "Hã? Eu só subi na prancha como você disse."
2601502-60 = "Tem gente que leva dias só para conseguir ficar de pé, e você conseguiu de primeira... você tem talento!"
2601502-61 = "Ha, hahaha... muito obrigada."
2601502-62 = "Eu planejava fazer apenas movimentos básicos no primeiro dia, mas será que a Ichika consegue ir para o nível avançado?"
2601502-63 = "Não diga que eu não avisei se algo der errado, hein?"
2601502-65 = "（Depois disso, Ichika rapidamente aprendeu a dominar as ondas）"
2601502-66 = "（E então...）"
2601502-70 = "Hmm...?"
2601502-71 = "...Por que as coisas chegaram a esse ponto?"
2601502-75 = "A próxima é a competidora Ichika Nakamasa, da Trinity! Parece que ela se inscreveu de última hora, logo antes do torneio!"
2601502-76 = "Ichika! Boa sorte!"
2601502-77 = "[s3] \"Vai lá, Ichika!\"\n[s4] \"Ichika! Você é demais!\""
2601502-80 = "Haha... Professor(a), você está bem empolgado(a), hein."
2601502-81 = "E pensar que aquela história de se inscrever não era brincadeira..."
2601502-85 = "Competidora Nakamasa. Qual é o seu estado de espírito atual para o torneio!"
2601502-86 = "……No máximo, vou tomar cuidado para não cair no mar~"
2601502-87 = "Um comentário tão tranquilo que, pelo contrário, transmite confiança!"
2601502-88 = "……É o que eu sinto de verdade, na verdade."
2601502-89 = "Bem, então…… estou indo."
2601502-96 = "Oh! A competidora Nakamasa, que foi tão modesta agora há pouco! Dá para ver que ela é muito habilidosa!"
2601502-97 = "Embora não seja chamativo, seus movimentos são sólidos e fundamentados! Será que ela surfa há muito tempo!?"
2601502-101 = "(Ichika surfou as ondas muito bem, mas infelizmente não conseguiu levar o troféu)"
2601502-105 = "Hmm, que pena, Ichika-chan! De agora em diante, vamos aprender várias técnicas. Aí você ficará perfeita!"
2601502-106 = "Haha, você está exagerando."
2601502-107 = "Vamos vencer na próxima!…… Você será a surfista profissional de amanhã! Brincadeira!"
2601502-108 = "Ah…… agradeço as palavras, mas agora quero me concentrar no comitê."
2601502-109 = "Droga…… que pena…… aqui está o meu cartão! Se mudar de ideia, entre em contato comigo!"
2601502-113 = "……Ufa."
2601502-114 = "É estranho. Até algumas horas atrás, eu achava que nunca faria surfe na minha vida."
2601502-115 = "[s5] \"Você foi incrível! Ichika!\"\n[s6] \"Faltou pouco para vencer!\""
2601502-118 = "Você sabe como elogiar, hein~#nNão tem como vencer só de praticar um pouco."
2601502-119 = "Se eu tivesse vencido, o esforço dos outros não teria valido a pena……"
2601502-120 = "Foi um resultado na medida certa."
2601502-121 = "……Será que estou pensando demais?"
2601502-122 = "Talvez sim."
2601502-123 = "――Mas, se eu tivesse vencido, o clima teria ficado estranho, então está bom assim."
2601502-127 = "Ah, já é essa hora……"
2601502-128 = "Graças a isso, foi um passatempo divertido!"
2601502-129 = "Da próxima vez que eu vier ao mar…… hmm……"
2601502-133 = "Surfe…… será que vou fazer de novo……? Não sei."
2601502-135 = "(Ichika foi embora enquanto parecia pensativa sobre algo)"
