[translation]
2001605-1 = "狡猾なフロイライン"
2001605-2 = "（いつものようにシャーレで、やってもやっても終わらない仕事をしていた時……）"
2001605-8 = "どうも、生きてますか？"
2001605-9 = "[s] \"いらっしゃい、イロハ……何とかね……。\""
2001605-10 = "そうでしたか、結構ギリギリみたいですね。"
2001605-11 = "クマがすごいことになって、そのままでもホラー映画に出られそうな感じですが。"
2001605-12 = "[s] \"褒め言葉……ではないよね……？\""
2001605-13 = "（……反応がいつもより弱いですね）"
2001605-14 = "まあ、「苦労は買ってでもせよ」に特に反対はしませんので、そこに関与はしませんが。"
2001605-15 = "私がおとなしく、隣で仕事……もとい、サボることを全力でします。"
2001605-16 = "……。"
2001605-17 = "[s] \"うん、了解……何もできなくてごめんね……。\""
2001605-26 = "先生、大丈夫ですか？"
2001605-27 = "[s1] \"大丈夫、ちょっとめまいが来ただけで……。\"\n[s2] \"あ、コーヒーならポットにあるよ。\""
2001605-28 = "ふぅ……。"
2001605-29 = "ふぅ……。"
2001605-33 = "……。"
2001605-34 = "そこの机、借りますね。"
2001605-40 = "ふむ、これは……。"
2001605-44 = "うーん、良くないですね……。"
2001605-48 = "これは参りましたね～……。"
2001605-49 = "[s] \"……イロハ、どうしたの？\""
2001605-50 = "はい？"
2001605-51 = "いえ、お気になさらず。先日のメンテナンスの確認です。"
2001605-52 = "これでも戦車長なので、整備とかも担当していまして。"
2001605-53 = "まあ総合評価としては、Aくらいですかね……。"
2001605-54 = "[s] \"さすが、良さそうな結果だね。\""
2001605-55 = "いえ、一番上はSなので。つまりAというのは……"
2001605-56 = "万魔殿におけるトップレベルの優等生であり、最高の戦車長であり、「憧れのゲヘナ生ランキング2年生編」において常に300位圏を死守する私にとっては――"
2001605-57 = "[s] \"何ともコメントしがたい数字。\""
2001605-58 = "……先生？"
2001605-59 = "[s] \"流石はイロハ先輩！\""
2001605-60 = "言わされた感マシマシですね。"
2001605-61 = "とにかくこのAという結果は、私にとっては恥も良いところです。"
2001605-62 = "まだまだ未熟ということですね。"
2001605-63 = "ふむ、内容としては装備の老化の見落としと、あとは……。"
2001605-64 = "なるほどなるほど、めんどくさいですが……こうなっては仕方ありませんね。"
2001605-65 = "というわけで先生。困ってる生徒のために、少しだけ時間を貸していただけませんか？"
2001605-66 = "[s] \"えっと、今からの方が良さそう……？\""
2001605-67 = "はい、今です。これについては、万魔殿からシャーレへの正式な依頼だと思ってもらっても構いません。"
2001605-68 = "つまりゲヘナの優等生、そしてゲヘナの生徒会に借りを作っておくチャンスですよ？"
2001605-69 = "それでも、ダメですか？"
2001605-70 = "[s] \"まあ、そこは気にしないけど……とりあえず了解。\""
2001605-71 = "そうでしたか、では早速……"
2001605-72 = "ショッピング、行きましょうか。"
2001605-74 = "ゲヘナ自治区東・商店街"
2001605-78 = "さて、では最初に……"
2001605-79 = "こちらのお店です。"
2001605-80 = "[s] \"……ぬいぐるみ？\""
2001605-81 = "いらっしゃいませ、何かお探しのものはありますでしょうか？"
2001605-82 = "ああ、少々お待ちを。買い物リストがあるので。えっと……"
2001605-84 = "「リボンのついたクマのぬいぐるみver.ゲヘナ」をください。"
2001605-85 = "[s] \"……ん？\""
2001605-86 = "あ、お客さんラッキーですね！こちら限定版の商品なのですが、ちょうど昨日一つだけ入荷されたんですよ！"
2001605-87 = "ではそれを。あ、そのままで大丈夫です、プレゼント用ではないので。"
2001605-88 = "[s] \"えっと、イロハ……？\""
2001605-89 = "お買い上げありがとうございます！"
2001605-90 = "さあ、最初の目標はクリアです。次へ行きましょう。"
2001605-91 = "[s] \"……？\""
2001605-93 = "いらっしゃいませー。"
2001605-94 = "「ウェーブキャットの枕」、在庫はありますか？"
2001605-95 = "はい、それならこちらに……！"
2001605-96 = "ではそれを一つ。"
2001605-101 = "[ns] \"？？？\""
2001605-103 = "（その後もイロハは、あちこちのお店に向かっては次々に買い物を繰り返していった）"
2001605-104 = "この写真立てを。"
2001605-106 = "「ワサビ味ポテトチップス」を一つ。"
2001605-108 = "「恋よ鯉」さんの棚は、えっと……？"
2001605-110 = "「ふかふか座布団」ってまだ在庫あります？"
2001605-111 = "[ns] \"……？\""
2001605-113 = "（疑問ばかりが積もっていく中で、1時間ほど買い物を続けた後……）"
2001605-115 = "まあ、こんなものですかね。"
2001605-116 = "先生、わざわざお付き合いいただいてありがとうございました。"
2001605-117 = "おかげでリストにあったものはほとんど買えました。"
2001605-118 = "[s] \"えっと、戦車の装備を見に来たはずだったのでは……？\""
2001605-119 = "私はそんなこと、一言も言っていませんよ？"
2001605-120 = "そもそも普通の部品ならともかく、万魔殿の主力戦車の部品はその辺で簡単に買えるものではありません。"
2001605-121 = "そのための買い物でしたら、わざわざこういう商店街には来てませんよ。"
2001605-122 = "[s] \"じゃあ、今日の買い物は……\""
2001605-123 = "普通に私の買い物です。万魔殿の休憩スペース用の。"
2001605-124 = "私だけの休憩スペースがあるんですが、まあ逆に言うと誰かが補充してくれるようなところではないので。自分で買い物に来たんです。"
2001605-125 = "あとイブキが遊びに来た時のために、お菓子やおもちゃなども。"
2001605-126 = "[s] \"そ、そっかぁ……。\""
2001605-127 = "何ですか、その表情は？"
2001605-128 = "仕方ないじゃないですか。今日は何だかシャーレに来た瞬間から、全然覇気が無いわ、ツッコミも弱いわで……"
2001605-129 = "面白くないと言いますか、プライドが許さないと言いますか……。"
2001605-130 = "そんな状態で私だけサボるのもあれなので、おびき寄せてみたわけです。"
2001605-131 = "結果は大成功です、ふふっ。"
2001605-132 = "どうですか、忙しいのに……いえ、忙しいからこそサボってみた感想は？"
2001605-133 = "[s] \"イロハ……。\""
2001605-134 = "さて、そろそろ帰るとしましょうか。"
2001605-135 = "シャーレに戻ったらまずは、やり方の説明をしてください。中間管理職同志、困った時には助け合いということで。"
2001605-136 = "[s3] \"イロハ……。\"\n[s4] \"ありがとね。\""
2001605-137 = "……何に対しての感謝なんですか、それは。"
2001605-138 = "……何に対しての感謝なんですか、それは。"
2001605-139 = "ふふっ、さあ帰りましょう。"
2001605-141 = "（その後シャーレに戻ってからイロハに色々と手伝ってもらい、無事に仕事は片付いたのだった）"
