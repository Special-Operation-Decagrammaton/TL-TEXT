[translation]
2001605-1 = "Fräulein astuta"
2001605-2 = "（Como de costume, enquanto eu fazia um trabalho que parecia não ter fim no Schale...）"
2001605-8 = "Olá, ainda está vivo?"
2001605-9 = "[s] \"Bem-vinda, Iroha... De alguma forma, sim...\""
2001605-10 = "Entendo, parece que você está no seu limite."
2001605-11 = "Suas olheiras estão tão profundas que você poderia participar de um filme de terror sem precisar de maquiagem."
2001605-12 = "[s] \"Isso não soa como um elogio...\""
2001605-13 = "（...A reação dele está mais fraca que o normal）"
2001605-14 = "Bem, eu não sou contra o ditado \"quem procura, acha\", então não vou me intrometer nisso."
2001605-15 = "Eu vou ficar quietinha aqui do lado trabalhando... ou melhor, me esforçando ao máximo para não fazer nada."
2001605-16 = "..."
2001605-17 = "[s] \"Certo, entendi... Desculpe por não poder fazer nada...\""
2001605-26 = "Sensei, você está bem?"
2001605-27 = "[s1] \"Estou bem, só tive uma leve tontura...\"\n[s2] \"Ah, tem café na garrafa térmica.\""
2001605-28 = "Ufa..."
2001605-29 = "Ufa..."
2001605-33 = "..."
2001605-34 = "Vou usar essa mesa aqui, tudo bem?"
2001605-40 = "Hum, o que é isso..."
2001605-44 = "Hmm, isso não está bom..."
2001605-48 = "Isso é um problema..."
2001605-49 = "[s] \"...Iroha, o que houve?\""
2001605-50 = "Sim?"
2001605-51 = "Não, não se preocupe. É apenas a verificação da manutenção de outro dia."
2001605-52 = "Afinal, como comandante de tanque, também sou responsável pela manutenção."
2001605-53 = "Bem, a avaliação geral é um A, eu acho..."
2001605-54 = "[s] \"Como esperado, parece um bom resultado.\""
2001605-55 = "Não, o topo é S. Ou seja, um A é..."
2001605-56 = "Para mim, que sou uma aluna de elite de alto nível no Pandemonium, a melhor comandante de tanque e alguém que sempre mantém sua posição entre as 300 melhores no \"Ranking de Alunas de Gehenna que Todos Admiram - Edição do 2º Ano\"..."
2001605-57 = "[s] \"Um número difícil de comentar.\""
2001605-58 = "...Sensei?"
2001605-59 = "[s] \"Como esperado da veterana Iroha!\""
2001605-60 = "Isso soou como se tivessem te forçado a dizer."
2001605-61 = "De qualquer forma, esse resultado A é uma vergonha para mim."
2001605-62 = "Significa que ainda sou imatura."
2001605-63 = "Hum, o conteúdo mostra que deixei passar o desgaste dos equipamentos e, além disso..."
2001605-64 = "Entendo, entendo, é trabalhoso, mas não tem jeito."
2001605-65 = "Sendo assim, Sensei. Poderia me emprestar um pouco do seu tempo para uma aluna em apuros?"
2001605-66 = "[s] \"Err, seria melhor começar agora...?\""
2001605-67 = "Sim, agora. Pode considerar isso como um pedido oficial do Pandemonium para o Schale."
2001605-68 = "Ou seja, é a sua chance de ter uma dívida de gratidão com uma aluna de elite de Gehenna e com o conselho estudantil de Gehenna, não é?"
2001605-69 = "Mesmo assim, não pode?"
2001605-70 = "[s] \"Bem, eu não me importo com isso, mas... tudo bem, entendido.\""
2001605-71 = "Entendo, então vamos logo..."
2001605-72 = "Vamos às compras."
2001605-74 = "Distrito Leste de Gehenna - Área Comercial"
2001605-78 = "Bem, então primeiro..."
2001605-79 = "É nesta loja."
2001605-80 = "[s] \"...Bichos de pelúcia?\""
2001605-81 = "Bem-vindo, está procurando por algo em específico?"
2001605-82 = "Ah, espere um pouco. Tenho uma lista de compras aqui. Bem..."
2001605-84 = "Por favor, me dê o \"Urso de pelúcia com laço ver. Gehenna\"."
2001605-85 = "[s] \"...Hm?\""
2001605-86 = "Ah, que sorte a sua, cliente! Este é um produto de edição limitada, mas recebemos uma unidade ontem mesmo!"
2001605-87 = "Então, vou levar esse. Ah, pode deixar assim mesmo, não é para presente."
2001605-88 = "[s] \"Digo, Iroha...?\""
2001605-89 = "Obrigada pela compra!"
2001605-90 = "Muito bem, o primeiro objetivo foi concluído. Vamos para o próximo."
2001605-91 = "[s] \"...?\""
2001605-93 = "Bem-vindo."
2001605-94 = "Vocês têm o \"Travesseiro de Gato Ondulado\" em estoque?"
2001605-95 = "Sim, ele está bem aqui...!"
2001605-96 = "Então, vou levar um desses."
2001605-101 = "[ns] \"???\""
2001605-103 = "(Depois disso, Iroha continuou indo de loja em loja, fazendo compras uma atrás da outra)"
2001605-104 = "Vou levar este porta-retratos."
2001605-106 = "Um pacote de \"Batata frita sabor wasabi\"."
2001605-108 = "Onde fica a prateleira da \"Koi yo Koi\"...?"
2001605-110 = "Vocês ainda têm o \"Zabuton fofinho\" em estoque?"
2001605-111 = "[ns] \"...?\""
2001605-113 = "(Enquanto as dúvidas só aumentavam, após cerca de uma hora de compras...)"
2001605-115 = "Bem, acho que é isso."
2001605-116 = "Sensei, obrigada por me acompanhar até aqui."
2001605-117 = "Graças a você, consegui comprar quase tudo o que estava na lista."
2001605-118 = "[s] \"Digo, não deveríamos ter vindo ver peças para o tanque...?\""
2001605-119 = "Eu não disse uma única palavra sobre isso, sabia?"
2001605-120 = "Para começar, peças comuns são uma coisa, mas as peças do tanque principal do Pandemonium não são algo que se compra facilmente por aí."
2001605-121 = "Se fosse para comprar isso, eu não viria a um centro comercial como este."
2001605-122 = "[s] \"Então, as compras de hoje foram...\""
2001605-123 = "Apenas minhas compras pessoais. Para o espaço de descanso do Pandemonium."
2001605-124 = "Eu tenho um espaço de descanso só meu, mas, por outro lado, não é um lugar onde alguém venha repor as coisas, então vim comprar eu mesma."
2001605-125 = "E também comprei alguns doces e brinquedos para quando a Ibuki vier brincar."
2001605-126 = "[s] \"E-entendi...\""
2001605-127 = "O que é essa expressão?"
2001605-128 = "Não tem como evitar. Hoje, desde o momento em que cheguei no Schale, você estava sem energia nenhuma, seus comentários estavam fracos..."
2001605-129 = "Como posso dizer, não estava divertido, ou talvez meu orgulho não permitisse..."
2001605-130 = "Como não queria ficar de folga sozinha nesse estado, resolvi te atrair para cá."
2001605-131 = "O resultado foi um sucesso total, fufu."
2001605-132 = "O que achou? Qual a sensação de tirar uma folga, mesmo estando ocupado... ou melhor, justamente por estar ocupado?"
2001605-133 = "[s] \"Iroha...\""
2001605-134 = "Bem, acho que está na hora de voltarmos."
2001605-135 = "Quando voltarmos ao Schale, primeiro, me explique como fazer aquilo. Como colegas de cargos de gerência intermediária, devemos nos ajudar quando estivermos em apuros."
2001605-136 = "[s3] \"Iroha...\"\n[s4] \"Obrigado, viu.\""
2001605-137 = "...Pelo que exatamente você está agradecendo?"
2001605-138 = "...Pelo que exatamente você está agradecendo?"
2001605-139 = "Fufu, vamos voltar."
2001605-141 = "(Depois disso, ao retornar ao Schale, Iroha me ajudou com várias coisas e o trabalho foi concluído com sucesso)"
