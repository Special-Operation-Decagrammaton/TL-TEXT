[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1013509-1 = "O Crepúsculo Flutuante"
1013509-3 = "[ns] \"Seja bem-vinda à Schale!\""
1013509-4 = "Que exagero!"
1013509-5 = "……Para ser franca,\nessa não é a minha primeira vez aqui, sabia?"
1013509-6 = "[s] \"Mas eu vou ficar feliz\nindependentemente de quantas vezes você vier!\""
1013509-7 = "……。"
1013509-8 = "E-Eu não disse\nque não fico feliz de estar aqui……。"
1013509-12 = "Não pule em cima de mim de repente!\nEu vou atirar!!"
1013509-14 = "Voltando ao assunto.\nO escopo principal do trabalho da Schale\nnão deveria ser oferecer conselhos e atuar como mediadora?"
1013509-15 = "Essas são questões que os próprios envolvidos deveriam resolver\natravés de debates e dentro das regras.\nE mesmo assim, eles arrastam tudo isso até a Schale..."
1013509-16 = "Sem mencionar que, apesar de possíveis problemas de segurança cibernética,\nacho um absurdo continuar usando pilhas e pilhas de papel hoje em dia."
1013509-17 = "Claro que nenhuma rede possui\numa segurança cem por cento infalível."
1013509-18 = "Mas nesse caso, não seria apenas uma questão de\nminimizar o máximo possível\nas tarefas que exigem tamanha segurança...?"
1013509-19 = "[s] \"A atividade humana\né exatamente assim...\""
1013509-20 = "Mas se isso significa que você vai ficar esgotado,\nentão tudo isso perde o sentido, não é?!"
1013509-21 = "Eu não estaria reclamando se a quantidade de trabalho\nestivesse diminuindo,\nou, no mínimo, se mantivesse num nível aceitável."
1013509-22 = "Mas você já percebeu, não é?\nO seu trabalho nunca vai diminuir."
1013509-23 = "Muito pelo contrário.\nQuanto mais problemas a Schale resolver,\nmais problemas os outros vão jogar nas suas costas."
1013509-24 = "Sabe, Sensei...\no seu papel principal é o de educador, certo?"
1013509-25 = "Você fala isso e aquilo para as alunas,\nmas será que não acabou se esquecendo\ndo seu próprio dever fundamental?"
1013509-26 = "[s1] \"É, acho que sim...\"\n[s2] \"Desse jeito, acho que até me esqueci\ndo que eu deveria estar ensinando...\""
1013509-29 = "Você fala como se\nisso não fosse problema seu..."
1013509-30 = "Pronto,\nessa pilha de documentos está terminada."
1013509-31 = "Ei, não precisa ficar tão feliz assim...\nEu só fiz a minha obrigação\ncomo ajudante de turno..."
1013509-32 = "Kivotos é realmente\num lugar problemático."
1013509-33 = "As alunas fazem o que bem entendem.\nÉ por isso que absurdos sem sentido\nacontecem diariamente."
1013509-34 = "Embora alunas não passem\nde crianças, afinal."
1013509-35 = "É de se esperar que lhes falte o devido autocontrole\npara evitar esse tipo de coisa."
1013509-36 = "E é exatamente por isso que a construção civil\né o setor que mais lucra por aqui."
1013509-37 = "[s] \"Afinal, Kivotos é\numa cidade acadêmica...\""
1013509-38 = "Ainda assim,\né algo difícil de assistir em silêncio."
1013509-39 = "Infelizmente, os outros só notam que havia um problema\nquando alguém acaba desabando."
1013509-40 = "……Aqui, tome.\nSiga estes passos.\nSão os dados estatísticos."
1013509-41 = "De vez em quando,\nos números são capazes de provar qualquer coisa."
1013509-45 = "[ns] \"Kei-chan.\""
1013509-46 = "Sim?"
1013509-51 = "[ns] \"Eu te adoro!!\""
1013509-52 = "Pare de dizer idiotices\ne foque no trabalho!!"
1013509-58 = "[ns] \"Acho que vamos conseguir\nterminar por hoje...\""
1013509-61 = "……Você está bem?"
1013509-62 = "Eh?\nFicou cheio de energia de novo\nporque eu me preocupei com você...?"
1013509-63 = "Haa...\nQue desperdício de preocupação."
1013509-64 = "O quê? Jantar?\nNós dois juntos...?\nEh? E você ainda quer comprar uns acessórios...?"
1013509-65 = "Sensei, você não está esgotado...?\nVocê estava quase desmaiando de exaustão\nagorinha mesmo."
1013509-66 = "……Tem certeza?\nBem, se é assim.\nPor que não?"
1013509-67 = "……。"
1013509-68 = "Isso me lembra...\nquem é a ajudante de turno de amanhã?"
1013509-69 = "[s] \"Se eu me lembro bem...\""
1013509-73 = "[ns] \"Ué? Aparentemente o cronograma está vazio\npor causa de algum problema.\""
1013509-74 = "……E você vai\ndeixar isso passar?"
1013509-75 = "Você acha que está tudo bem\nse pedir para alguém vir só amanhã de manhã...?"
1013509-76 = "……。"
1013509-77 = "Nesse caso, que tal ser eu?"
1013509-78 = "[s] \"Eeeh?!\""
1013509-79 = "P-Por que a surpresa no rosto?!"
1013509-80 = "S-Se quer saber...!"
1013509-81 = "I-Isso mesmo! É para me acostumar com Kivotos,\npara ajudar a Schale com a documentação,\npara eu melhorar a minha capacidade de negociação interpessoal...!"
1013509-82 = "O orçamento estagnado do clube,\nas constantes questões sobre cargas de trabalho desequilibradas,\no futuro da Schale,\nsem mencionar as suas necessidades――e, e...!"
1013509-83 = "De qualquer forma!\nIsso serve tanto para treinamento\nquanto para experiência prática...!"
1013509-84 = "Isso significa que, no fim das contas,\nfoi uma dedução racional que beneficia tanto você quanto eu!\nDeveria me agradecer!"
1013509-85 = "[s] \"Dedução 'Racional'...\nVocê soa exatamente igual a...\""
1013509-86 = "！！"
1013509-87 = "A-Aquilo foi apenas uma maneira de falar...!\nUu... Q-Que humilhação...!"
1013509-88 = "O que importa é! Você concorda?!"
1013509-89 = "[s] \"Kei-chan.\""
1013509-90 = "O que foi agora?"
1013509-91 = "[s] \"Posso fazer carinho na sua cabeça...\nsó uma vez?\""
1013509-92 = "Se você sequer pensar nisso,\neu te mato e me mato logo em seguida!!"
1013509-94 = "Bom,\nfoi um ótimo trabalho hoje."
1013509-95 = "Afinal, sou eu que estarei de plantão amanhã\nde qualquer forma.\nO resto pode muito bem esperar."
1013509-96 = "……O que você está fazendo aí parado?\nVamos logo.\nNós vamos sair para comer\ne fazer as outras coisas que combinamos, não é?"
1013509-97 = "[s] \"Sim,\nsó um minutinho.\""
1013509-99 = "（Assim que eu tentei me levantar――）"
1013509-106 = "[ns] \"Eh...\""
1013509-107 = "Sensei……？"
1013509-108 = "O que aconteceu?"
1013509-113 = "[ns] \"……！\""
1013509-114 = "Sensei?"
1013509-119 = "Eh?\nEu fiquei borrada\nou pareci desaparecer...?"
1013509-120 = "Mas eu estive aqui o tempo todo,\nsabia...?"
1013509-121 = "……。"
1013509-122 = "Você definitivamente está esgotado.\nA visão é a primeira coisa que falha\nquando se está muito cansado."
1013509-123 = "É melhor não se forçar\ntanto hoje."
1013509-126 = "[wa:2180]― [log=케이 교복]Não se preocupe.[/log]"
1013509-127 = "[wa:2780]― [log=케이 교복]Eu não vou desaparecer. [/log]"
1013509-130 = "[wa:560]― [log=케이 교복]Na verdade, [wa:1320]é exatamente o oposto.[/log]"
1013509-131 = "[wa:2620]― [log=케이 교복]Eu pretendo [wa:1540]sobreviver usando [wa:1130]qualquer meio necessário.[wa:40] [/log]"
1013509-134 = "[wa:3530]― [log=케이 교복]Desde que o Sensei não abandone [wa:1250]este mundo.  [/log]"
1013509-135 = "[wa:3540]― [log=케이 교복]Eu também não desistirei, [wa:1990]vou lutar até o fim.  [/log]"
1013509-138 = "[wa:500]― [log=케이 교복]Então fique tranquilo... [wa:2360]Vai ficar tudo absolutamente [wa:1860]bem.  [/log]"
1013509-139 = "[wa:2320]― [log=케이 교복]Eu estarei sempre [wa:1730]aqui.[/log]"
1013509-142 = "[wa:2730]― [log=케이 교복]Isso fica só entre nós, ok...?[wa:2840] Eu――[/log]"
1013509-143 = "[wa:2740]― [log=케이 교복]Eu não odeio você,[wa:2280] Sensei.[/log]"
1013509-155 = "（Caminhando em um ritmo um pouco mais lento que o habitual,\neu acompanhei a Kei até a Millennium.）"
1013509-156 = "（Nós andamos mantendo uma certa distância\ne de uma forma desajeitada no começo, mas...）"
1013509-157 = "（Quando dei por mim,\naquela pequena mão estava segurando\no meu dedo mindinho firmemente.）"