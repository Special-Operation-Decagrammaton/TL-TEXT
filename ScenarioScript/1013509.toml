[translation]
1013509-1 = "crepúsculo fluindo"
1013509-3 = "[ns] \"Bem-vindo à placa de Petri!\""
1013509-4 = "Isso é um exagero!"
1013509-5 = "...Ou melhor, não é a primeira vez, certo?"
1013509-6 = "[s] \"Não importa quantas vezes eu esteja feliz!\"\"\n1013509-7 = \"…….\"\n1013509-8 = \"Não é como se eu também não estivesse feliz...\"\n1013509-12 = \"Não tente pular direto! Eu vou atirar! ?\"\n1013509-14 = \"A história em primeiro lugar. O trabalho da Placa de Petri não é mais propor opiniões e agir como intermediário?\"\n1013509-15 = \"Seria melhor que as partes envolvidas discutissem essas questões e as resolvessem dentro das regras. Mesmo sendo #n, eles se esforçaram para trazê-lo para a placa de Petri...\"\n1013509-16 = \"Também não acho que seja correto usar papel por questões de segurança.\"\n1013509-17 = \"É claro que nenhuma rede pode ter segurança perfeita.\"\n1013509-18 = \"Se for esse o caso, não seria uma boa ideia reduzir ao máximo o número de casos que exigem um nível de segurança mais alto...?\"\n1013509-19 = \"[s] \"É assim que os humanos funcionam...\"\"\n1013509-20 = \"Se o sensei estivesse exausto, ele não teria filhos?\"\n1013509-21 = \"Não reclamarei se conseguir menos trabalho ou pelo menos manter o status quo.\"\n1013509-22 = \"Mas você sabe o que? Não falta trabalho.\"\n1013509-23 = \"Na verdade, quanto mais problemas uma placa de Petri resolve, mais problemas as pessoas ao seu redor trazem.\"\n1013509-24 = \"Ou melhor, os Senseies são originalmente educadores, certo?\"\n1013509-25 = \"Ao dizer isso e aquilo aos seus alunos, você não se esquece do seu próprio dever?\"\n1013509-26 = \"[s1] \"Sim, isso mesmo...\"\n[s2] \"Com isso, você pode esquecer o que precisa ensinar...\"\"\n1013509-29 = \"É como se não fosse da conta de mais ninguém...\"\n1013509-30 = \"Assim que este documento estiver concluído.\"\n1013509-31 = \"Não, mesmo que eu estivesse tão satisfeito... eu só estava fazendo o que era esperado de mim no serviço...\"\n1013509-32 = \"Kivotos também é difícil.\"\n1013509-33 = \"Os alunos podem fazer o que quiserem. É por isso que coisas que não fazem sentido acontecem todos os dias.\"\n1013509-34 = \"No entanto, os alunos são crianças.\"\n1013509-35 = \"Bem, não pode ser ajudado que você não consiga se controlar.\"\n1013509-36 = \"É por isso que a indústria da construção é uma indústria estrela.\"\n1013509-37 = \"[s] \"Porque Kivotos é uma cidade universitária...\"\"\n1013509-38 = \"Mesmo assim, não consigo assistir.\"\n1013509-39 = \"Só depois que alguém desmaia é que as pessoas ao seu redor percebem isso.\"\n1013509-40 = \"...Sim, isso. #nPor favor, siga estas etapas. Estes são dados estatísticos.\"\n1013509-41 = \"Às vezes, os números provam tudo.\"\n1013509-45 = \"[ns] \"Kei-chan.\"\"\n1013509-46 = \"sim?\"\n1013509-51 = \"[ns] \"Eu adorei!!\"\"\n1013509-52 = \"Não diga nada estúpido e continue com seu trabalho! !\"\n1013509-58 = \"[ns] \"Parece que hoje vai acabar de alguma forma...\"\"\n1013509-61 = \"……OK?\"\n1013509-62 = \"Huh? Você se sentiu melhor depois de ficar preocupado comigo...?\"\n1013509-63 = \"Suspiro... perdi dinheiro por me preocupar.\"\n1013509-64 = \"sim? É jantar? junto……? #nO quê, você vai comprar alguns acessórios também...?\"\n1013509-65 = \"Sensei, você não está cansado...? #nEu quase caí agora há pouco.\"\n1013509-66 = \"...... Você está bem? #nBem, então. Vamos fazer isso?\"\n1013509-67 = \"…….\"\n1013509-68 = \"Aliás, quem estará de plantão amanhã?\"\n1013509-69 = \"[s] \"Tenho certeza...\"\"\n1013509-73 = \"[ns] \"Huh? Parece estar indeciso devido a algum tipo de problema.\"\"\n1013509-74 = \"...Tudo bem?\"\n1013509-75 = \"Tudo bem se eu ligar para você pela manhã...?\"\n1013509-76 = \"…….\"\n1013509-77 = \"Então por que você não faz isso por mim?\"\n1013509-78 = \"[s] \"Eh!?\"\"\n1013509-79 = \"Ei, por que você está fazendo essa cara?\"\n1013509-80 = \"Bem, se eu dissesse isso...!\"\n1013509-81 = \"Isso mesmo! Pelo meu treinamento de adaptação aos Kivotos, pela compreensão do negócio da Petri e pelo aprimoramento das habilidades de negociação interpessoal...!\"\n1013509-82 = \"Despesas do departamento que não devem aumentar, o problema de uma carga de trabalho cada vez mais desequilibrada, o futuro das placas de Petri, as questões diversas do sensei... e muito mais...!\"\n1013509-83 = \"de qualquer forma! Treinamento e prática para essas coisas...!\"\n1013509-84 = \"Em outras palavras, é uma decisão racional tanto para o sensei quanto para mim! Por favor, seja grato!\"\n1013509-85 = \"[s] \"'Razoável'... é como... \"\"\n1013509-86 = \"! !\"\n1013509-87 = \"Eu, o que acabei de dizer foi apenas um truque de palavras... Ugh, isso é uma humilhação...!\"\n1013509-88 = \"de qualquer forma! Muito legal!\"\n1013509-89 = \"[s] \"Kei-chan.\"\"\n1013509-90 = \"o que.\"\n1013509-91 = \"[s] \"Posso dar um tapinha na sua cabeça só uma vez...?\"\"\n1013509-92 = \"Se você fizer isso, eu vou te matar e te matar também! !\"\n1013509-94 = \"Pois bem, obrigado pelo seu trabalho duro.\"\n1013509-95 = \"Estarei de plantão amanhã de qualquer maneira. O resto pode ser feito amanhã.\"\n1013509-96 = \"...O que você está fazendo? Eu irei. #nVamos comer juntos e fazer outras coisas, certo?\"\n1013509-97 = \"[s] \"Sim, espere um minuto.\""

1013509-99 = "(Assim que eu estava prestes a me levantar――)"
1013509-106 = "[ns] \"Isso......\""
1013509-107 = "sensei……?"
1013509-108 = "O que está errado?"
1013509-113 = "[ns] \"...!\""
1013509-114 = "sensei?"
1013509-119 = "Huh? Fiquei nebuloso ou desapareci...?"
1013509-120 = "Eu estive aqui o tempo todo...?"
1013509-121 = "……."
1013509-122 = "Parece que você está cansado, afinal. #nQuando você fica cansado, sua visão é a primeira coisa a sofrer."
1013509-123 = "Provavelmente é melhor não se esforçar muito hoje."
1013509-126 = "[wa:2180]― [log=케이 교복]Não se preocupe. [/registro]"
1013509-127 = "[wa:2780]― [log=케이 교복]Eu nunca irei desaparecer. [/registro]"
1013509-130 = "[wa:560]― [log=케이 교복]Na verdade, [wa:1320]é o oposto. [/registro]"
1013509-131 = "[wa:2620]― [log=케이 교복]Eu farei [wa:1540] o que for preciso para sobreviver [wa:1130]. [wa:40] [/log]"
1013509-134 = "[wa:3530]― [log=케이 교복]Se você não abandonar este mundo [wa:1250].  [/registro]"
1013509-135 = "[wa:3540]― [log=케이 교복]Até o fim, [wa:1990]Eu nunca desistirei.  [/registro]"
1013509-138 = "[wa:500]― [log=케이 교복]Então está tudo bem...[wa:2360]Com certeza, [wa:1860]Está tudo bem.  [/registro]"
1013509-139 = "[wa:2320]― [log=케이 교복]Estou aqui desde sempre [wa:1730]. [/registro]"
1013509-142 = "[wa:2730]―― [log=케이 교복]Isso é apenas uma história...[wa:2840]Eu sou――[/log]"
1013509-143 = "[wa:2740]― [log=케이 교복]Eu não te odeio, [wa:2280]. [/registro]"
1013509-155 = "(Enviei Kei para o Millennium um pouco mais devagar que o normal.)"
1013509-156 = "(No começo eu andei a uma distância estranha...)"
1013509-157 = "(A próxima coisa que percebi foi que uma pequena mão segurava meu dedo mínimo.)"
