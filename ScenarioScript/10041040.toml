[translation]
10041040-1 = "Episódio 4; Posição e Ação"
10041040-4 = "Centro de fitness... o próximo lugar onde um problema vai ocorrer."
10041040-5 = "Entendido. Estou indo para lá agora."
10041040-9 = "Espere um pouco."
10041040-10 = "Quero pedir que você faça outra coisa. #nA Neru vai ao centro de fitness."
10041040-14 = "……？"
10041040-19 = "Hã? Eu?"
10041040-21 = "Por que? Vocês não deveriam ser vistas por outras pessoas, certo?"
10041040-22 = "É um lugar aberto e com muito movimento de pessoas."
10041040-26 = "Não seria essa a minha função?"
10041040-27 = "Porque é mais racional assim."
10041040-29 = "……Rio?"
10041040-31 = "Questões de segurança. É um motivo simples."
10041040-32 = "Segurança?"
10041040-36 = "Se meus cálculos estiverem corretos, eles ainda estão no centro de fitness realizando sabotagens."
10041040-37 = "Em suma... há uma grande possibilidade de um confronto."
10041040-38 = "Literalmente, é por motivos de segurança."
10041040-39 = "Não posso pedir isso a você, que não é uma aluna do Millennium e muito menos uma aluna comum."
10041040-40 = "Não... sendo direta, você não seria de muita ajuda."
10041040-46 = "……Então, é me proteger e me manter em um lugar seguro, é isso?"
10041040-47 = "Ei, Rio. Não está exagerando?"
10041040-48 = "……Entendo."
10041040-49 = "Aqui também sou tratado da mesma forma, pelo visto."
10041040-50 = "（……Aqui também?）"
10041040-52 = "Infelizmente, como isso pode se transformar em um problema diplomático, não posso ceder."
10041040-53 = "Se algo acontecer com você, isso se tornará um problema entre as academias."
10041040-54 = "Como alguém que ocupa um cargo, você não deveria entender isso?"
10041040-59 = "……."
10041040-60 = "Identificar o local, mas não ir até lá……"
10041040-61 = "É como se estivesse me deixando de castigo, eu diria."
10041040-62 = "Uma coisa não tem nada a ver com a outra."
10041040-63 = "Eu pedi para você procurar por coisas suspeitas, mas não pedi para você confrontá-las. Eu disse: 'Me avise se encontrar'."
10041040-64 = "……Entendo."
10041040-65 = "Agradeço pela cooperação. Mas o objetivo final não é para o seu benefício."
10041040-66 = "Achei que tinha entendido... se não pode aceitar isso, então terminamos por aqui."
10041040-71 = "……Não, eu entendi."
10041040-72 = "Parece que me precipitei novamente."
10041040-73 = "Não era algo pelo qual eu deveria ser teimoso... mas acabei sendo. Peço desculpas."
10041040-78 = "Seria de grande ajuda se você continuasse verificando as outras áreas."
10041040-79 = "Como antes, reporte todo o conteúdo da investigação para mim. #nEm qualquer situação, não tome nenhuma atitude sem as minhas instruções. Essa é a condição para a nossa cooperação."
10041040-80 = "……Ah. Entendido."
10041040-86 = "Haa……"
10041040-88 = "……Vou verificar a situação. Entrarei em contato se houver algo."
10041040-89 = "Sim. Eu também continuarei com a análise. Compartilharei assim que souber de algo."
10041040-90 = "……Ah."
10041040-91 = "Então, vou indo na frente."
10041040-96 = "Bem……"
10041040-97 = "……Preciso me apressar."
10041040-106 = "O que é isso?"
10041040-107 = "Estou analisando o chip que consegui no centro de dados."
10041040-108 = "Em vez de sair andando pelo local a esmo, não seria mais racional procurar por pistas aqui?"
10041040-109 = "……Hã?"
10041040-110 = "O que foi? Isso não é do seu feitio. Por acaso está se preocupando comigo?"
10041040-111 = "Não é nada disso."
10041040-112 = "Eu estou te elogiando, então aceite de bom grado, vai……."
10041040-116 = "Então você estava me elogiando?"
10041040-117 = "Ahhh…… francamente, você viu só."
