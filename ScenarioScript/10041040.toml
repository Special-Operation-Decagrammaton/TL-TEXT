[translation]
10041040-1 = "第4話;立場と行動"
10041040-4 = "フィットネスセンター……次に問題が起こる場所。"
10041040-5 = "わかった。すぐに向かう。"
10041040-9 = "待ってちょうだい。"
10041040-10 = "貴女には他の事をお願いしたいの。#nフィットネスセンターにはネルが行くわ。"
10041040-14 = "……？"
10041040-19 = "あん？あたし？"
10041040-21 = "何故だ？君たちは人目に付くわけにはいかないだろう。"
10041040-22 = "人の往来が激しく、開けた場所だ。"
10041040-26 = "それこそ、私の役目なのでは？"
10041040-27 = "その方が合理的だからよ。"
10041040-29 = "……リオ？"
10041040-31 = "安全上の問題。簡単な理由だわ。"
10041040-32 = "安全？"
10041040-36 = "計算が正しければ、向こうはまだフィットネスセンターで工作の最中。"
10041040-37 = "つまるところ……交戦する可能性も十分あり得るわ。"
10041040-38 = "文字通り、安全上の理由よ。"
10041040-39 = "ミレニアムの生徒でもなく、ましてや一般生徒でもない貴女には頼めない。"
10041040-40 = "いえ……言葉を選ばなければ、貴女では力にならないのよ。"
10041040-46 = "……だから、守って、安全なところに置いておく、か。"
10041040-47 = "おい、リオ。言いすぎじゃねーか？"
10041040-48 = "……そうか。"
10041040-49 = "ここでも、同じ扱いなのだね。"
10041040-50 = "（……ここでも？）"
10041040-52 = "残念ながら、これは外交問題に発展する懸念もある以上、こちらも譲歩することはできないの。"
10041040-53 = "万が一貴女に何かあったとき、それは学園同士の問題になってしまう。"
10041040-54 = "立場ある者ならば、それを理解しているのではなくて？"
10041040-59 = "……。"
10041040-60 = "場所の特定はするが、行ってはならない……。"
10041040-61 = "お預けを食らっているようなものだと思うがね。"
10041040-62 = "それとこれとは別の話よ。"
10041040-63 = "怪しい物を探して欲しいとは言ったけれど、それと向き合うことまでは依頼していないわ。「発見したら教えて欲しい」そう言ったのだから。"
10041040-64 = "……そうか。"
10041040-65 = "協力には感謝しているわ。でも、最終的なゴールは貴女のためのものじゃない。"
10041040-66 = "理解していると思ったけれど……もし呑めないと言うのなら、ここまでね。"
10041040-71 = "……いや、理解した。 "
10041040-72 = "また私が先走ってしまったようだ。"
10041040-73 = "意地を張る部分ではなかったが……つい。済まない。"
10041040-78 = "引き続き他の部分を当たってもらえると助かるわ。"
10041040-79 = "今までと同様、調査内容はすべて私に報告すること。#nどんな場合であっても私の指示以外の動きはしないこと。これが協力の条件よ。"
10041040-80 = "……ああ。わかった。"
10041040-86 = "はぁ……。"
10041040-88 = "……様子を確認して来よう。何かあれば連絡する。"
10041040-89 = "ええ。こちらも分析を進めるわ。分かり次第共有させてもらうわね。"
10041040-90 = "……ああ。"
10041040-91 = "では、先に失礼するよ。"
10041040-96 = "さて……"
10041040-97 = "……急がなくては。"
10041040-106 = "それは？"
10041040-107 = "データセンターで手に入れたチップを分析しているの。"
10041040-108 = "手当たり次第に会場を回るより、こちらで手掛かりを見つけた方が合理的でしょう？"
10041040-109 = "……へえ？"
10041040-110 = "なんだ？らしくねえじゃん。もしかして気にかけてやってんのか？"
10041040-111 = "そういう訳ではないわ。"
10041040-112 = "褒めてんだから素直に喜べよな……。"
10041040-116 = "褒めてたのね？"
10041040-117 = "はぁぁぁぁ……ったくお前はさぁ。"
