[translation]
1006603-1 = "メイドお勉強大作戦！"
1006603-2 = "（アリスの連絡を受けてゲーム開発部に向かうと……）"
1006603-8 = "ゲーム開発部・部室"
1006603-9 = "……あれ、先生？"
1006603-10 = "そんなに急いでどうしたのですか？"
1006603-11 = "[s1] \"その、どんな資料か不安で……。\"\n[s2] \"アリスを一人にさせちゃいけない気がして……。\""
1006603-14 = "そうなのですか？#n先生が心配するようなことはないと思うのですが……。"
1006603-15 = "でもアリス、先生と勉強できるのは嬉しいです！#n一緒に勉強すると、学習効果も高まるそうですから！"
1006603-19 = "アリスが見つけた資料は――"
1006603-28 = "パンパカパーン！これです！"
1006603-29 = "[s] \"こ、これは……！？\""
1006603-30 = "はい！色んなメイドさんが登場する動画です！"
1006603-31 = "これを見れば、アリスのメイドレベルが大きく上昇するに違いありません！"
1006603-32 = "いわゆる経験値アイテムのようなものです！"
1006603-33 = "「仮面のメイドレディー」、「マボロマティック」、「たちばなメイド隊」……。"
1006603-34 = "どれもオススメの動画だと聞きました！"
1006603-35 = "[s] \"待ってアリス、それどこ情報！？\""
1006603-36 = "インターネットです！"
1006603-37 = "インターネットはすごく便利です！検索したら何でも出てきますから！"
1006603-38 = "[s] \"なんだか危険な香りがするような……。\""
1006603-39 = "危険……？そんなことはないと思います！"
1006603-40 = "「感動のあまりに人生が変わりました」というレビューもついていましたし！"
1006603-41 = "[s] \"中にはそういう人もいるかもしれないけど……！\""
1006603-42 = "人生が変わるほど感動する作品だなんて……アリス、楽しみです！#n一体どんな内容なのでしょうか？"
1006603-43 = "……大丈夫です。万が一危険だとしても、#nアリスは見習い勇者――いえ、見習いメイド勇者です！#n自分の身は自分で守ってみせます！"
1006603-44 = "え？そういう意味ではない……？#nですが……うーん……#n先生が一緒にいますし……"
1006603-45 = "「生徒を助けるのは先生の義務」だと先生もよく言っています！#n何かあれば先生が助けてくれますよね？"
1006603-46 = "[s3] \"……そう言われたら……。\"\n[s4] \"何も言えない……。\""
1006603-49 = "えへへ。それでは改めて、パーティ結成です！"
1006603-50 = "パンパカパーン！先生が仲間になりました！"
1006603-51 = "さあ、クエスト開始です！"
1006603-53 = "（そうしてアリスと一緒に、「おすすめ」の動画を鑑賞し始めた……）"
1006603-55 = "……。"
1006603-56 = "[s] \"……。\""
1006603-57 = "…………。"
1006603-58 = "[s] \"アリス……？\""
1006603-59 = "………………。"
1006603-60 = "[ns] \"アーリースー！？\""
1006603-61 = "アリス、わかりました！"
1006603-62 = "[s] \"！？\""
1006603-63 = "なるほど……メイドとはこんなに奥深いのですね！"
1006603-64 = "メイドにジョブチェンジしたのであれば、先生の呼び方も変えなければ――"
1006603-65 = "ご主人さま！"
1006603-66 = "[s] \"そ、その呼び方は……。\""
1006603-67 = "そしてアリスがこれまで疑問に思っていたことも、#n実はメイドの[ruby=たしな] 嗜 [/ruby]みだったのですね！"
1006603-68 = "注文を間違えたり、何もないところで転んだり、#n料理に変わったソースをかけるのも――"
1006603-69 = "すべてご主人さまの心を癒やすサービスだったのですね！"
1006603-70 = "[s] \"違うから！そういうのじゃないから！\""
1006603-72 = "（アリスは次々と学んだ「[ruby=たしな] 嗜 [/ruby]み」について語っていった）"
1006603-73 = "（彼女の誤解を解くまで、かなりの時間を要した……）"
1006603-75 = "今日は収穫の多い一日でした。"
1006603-76 = "お陰でメイドレベルもかなりアップした気がします！"
1006603-77 = "[s] \"そう……それは……よかったね……。\""
1006603-78 = "先生？どうしたのですか？ "
1006603-79 = "なんだか、先生の元気がありません……"
1006603-80 = "もしかして……先生は楽しくなかったのですか……？"
1006603-81 = "[s5] \"ううん、そんなことないよ。\"\n[s6] \"次に勉強するときも、必ず呼んでほしいな。\""
1006603-84 = "そうですか？それならよかったです！"
1006603-85 = "……えへへ。#nやっぱりアリスは先生が好きです。"
1006603-86 = "これからもよろしくお願いしますね――"
1006603-87 = "ご主人さま！"
