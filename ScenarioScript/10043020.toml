[translation]
10043020-1 = "第2話;逆転したら起こしてください"
10043020-3 = "……スタジアムの熱気が増していますね。"
10043020-4 = "歓声がすごく大きくなっています。これほどの熱量で……。"
10043020-5 = "[s] \"スポーツ観戦は盛り上がるよね。\""
10043020-6 = "……そうですね。"
10043020-7 = "なんだか不思議な気持ちになります。"
10043020-11 = "[ns] \"どうして？\""
10043020-12 = "……少しトレーニング部の活動を思い出していまして。"
10043020-15 = "トレーニングは究極の個人競技です。"
10043020-16 = "運動や細かい食事管理など、日々努力をして、最高の結果を目指すもの。"
10043020-17 = "ある意味では、求道者と言い換えられるかもしれませんね。"
10043020-20 = "全てを自分一人の意志で行い――"
10043020-21 = "第三者が関わるとしたら、助言を受けるときくらいでしょうか。"
10043020-22 = "最終目標は、理想の体型を手に入れること。"
10043020-23 = "そのために、自分との試合を続けているんです。"
10043020-24 = "[s] \"奥が深い……！\""
10043020-25 = "ですが……。"
10043020-29 = "野球はそうはいきません。"
10043020-30 = "ボールを打って点を取り、その結果を競うと言えば簡単です。"
10043020-31 = "でも実際は、優秀な選手と監督、チームの結束力などが求められる……。"
10043020-32 = "……あらゆる要素が噛み合うことで、この競技は成り立っているのだと感じました。"
10043020-33 = "皆さんが熱狂するのも分かります。"
10043020-34 = "ただ――"
10043020-35 = "この観客席のみなさんは、果たして「熱狂」……しているのでしょうか？"
10043020-36 = "私たちの任務は、不審人物を見つけだし――"
10043020-37 = "その人物が犯人かを調査すること……ですが……。"
10043020-38 = "見たところ……。"
10043020-39 = "――全員、不審人物です。"
10043020-44 = "親愛なるブレーブスファンのみなさーん！"
10043020-45 = "今日は……スタジアムの皆さんの生の声を――"
10043020-52 = "邪魔よ！どいてくださいな！"
10043020-53 = "あの配信者、また来やがったよ！"
10043020-60 = "あいつ、絶対レイダースの回し者だろ！"
10043020-61 = "「ブレーブス敗北切り抜き」でも作ってんだろ！"
10043020-67 = "敗北しかしてないから仕方ないだろ……。"
10043020-72 = "なんでこんなに下手なの！？#n私がやった方がマシじゃない！？"
10043020-73 = "はぁ！？できるわけないだろ。"
10043020-79 = "……。"
10043020-80 = "ま、まあ……球場はいつもこうですよ……。"
10043020-81 = "[s] \"これは、一体……。\""
10043020-82 = "その、トレーナー……。"
10043020-83 = "私の知る「応援」とは、少々違うような……"
10043020-84 = "[s1] \"大切に思うからこそ、怒るんじゃないかな……。\"\n[s2] \"じゃないと、ここまで感情的にならないし……。\""
10043020-87 = "ですが、これでは……。"
10043020-91 = "みなさん、ブレーブスの勝利を祈って――"
10043020-93 = "は？勝てるわけねぇだろうが！"
10043020-94 = "あー……見てるだけでムカついてきた！"
10043020-100 = "ピッチャー！もういいよ！適当に投げろ！"
10043020-101 = "そうだそうだ！早く負けちまえ！"
10043020-102 = "こんな試合、応援するだけ無駄だ！"
10043020-108 = "すみません、通ります……。"
10043020-113 = "あれ？ドリンクの売り子か。#nなんか飲み物くれよ！"
10043020-114 = "そうだな、キンキンに冷えたやつあるか？"
10043020-119 = "どうぞ。"
10043020-126 = "ありがとよ。……ぺっ！#nな、なんだこのドロドロは……！"
10043020-127 = "普通は炭酸とかだろ！？"
10043020-129 = "こちら、プロテインシェイクです。"
10043020-130 = "消化不良を防ぐために乳糖と脂肪を取り除き――"
10043020-131 = "吸収の早いホエイプロテインを使用しています。"
10043020-132 = "アミノ酸とタンパク質が豊富で、体に良いですよ。"
10043020-133 = "ですが、一気飲みはお控えください。胃腸に負担がかかりますので。"
10043020-138 = "誰が球場でプロテインなんか飲むんだよ！"
10043020-139 = "てめえ、ちょっとツラ貸せや！"
10043020-144 = "……。"
10043020-145 = "ひときわ過激な野次を飛ばし――"
10043020-146 = "ひいきのチームの敗北を望むような言動……。"
10043020-147 = "その上、健康に良いプロテインを断るなんて……。"
10043020-152 = "……な、何ブツブツ言ってんだ！"
10043020-157 = "――トレーナー。"
10043020-158 = "このお二人が、犯人ですね？"
10043020-162 = "[ns] \"どうしてそうなるのー！？\""
10043020-163 = "この場の全員が興奮状態ですが――"
10043020-164 = "その中でも、この二人はとくに過激な発言が目立ちます。"
10043020-165 = "通話越しの犯人も、異常な言動が目立った。つまり――"
10043020-166 = "――この二人が犯人です！"
10043020-171 = "ごちゃごちゃ言いやがって……。"
10043020-172 = "ウチらに喧嘩売ったってことは、覚悟できてんだな！？"
10043020-177 = "では、トレーナー。"
10043020-178 = "身柄確保に移ります。"
10043020-179 = "[s] \"ほ、本当にいいのかな……！？\""
10043020-180 = "はい。私を信じてください！"
10043020-181 = "この二人は理性を失っているようですので……。"
10043020-182 = "頭を冷やしてあげる必要がありますね。"
10043020-183 = "[s] \"ぱ、パーソナルトレーニングの時間だ……！\""
10043020-187 = "運動で汗を流すことは、ストレス発散になりますから……。"
10043020-188 = "こういった場合にも、トレーニングは効果的です。"
10043020-190 = "わけわかんねえこと言いやがって！"
10043020-191 = "ただじゃおかないからな！"
