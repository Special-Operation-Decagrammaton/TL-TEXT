51095-35 = "Não..."
51095-40 = "Não tenho mais nada para falar."
51095-41 = "Yukari, como sua senpai, deixe-me te dar um conselho."
51095-42 = "Pare com essas coisas inúteis e é melhor aproveitar a sua juventude enquanto pode."
51095-43 = "Ficar se agarrando ao passado só vai fazer o tempo passar em vão."
