51095-20 = "M, mesmo assim... eu..."
51095-23 = "Com isso você entendeu, não é. Eu não vou voltar. "
51095-24 = "A Hyakkaryouran... #n Nós―― não podemos mais voltar a ser o que éramos."
51095-25 = "......"
51095-27 = "Mas não me entenda mal, Yukari."
