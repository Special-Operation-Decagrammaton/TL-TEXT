[translation]
51095-8 = "……！"
51095-14 = "[ns] \"Yukari, você está bem!?\""
51095-20 = "M-mesmo assim…… eu……"
51095-23 = "Agora você entendeu, não é? Eu não vou voltar."
51095-24 = "A Hyakkaryouran……#nNós―― não podemos mais voltar a ser como éramos antes."
51095-25 = "……。"
51095-27 = "Mas não me entenda mal, Yukari."
51095-28 = "Você é diferente de nós desde o início, não tem necessidade de voltar para a Hyakkaryouran."
51095-29 = "Não é?#nPorque você tem um lugar para onde voltar――"
51095-30 = "…………！"
51095-31 = "Ah……！"
51095-32 = "[s1] \"A Yukari veio até aqui porque acreditava que a Renge a ajudaria.\"\n[s2] \"Você não poderia ouvi-la só mais um pouco?\""
51095-35 = "Não……"
51095-40 = "Não tenho mais nada a dizer."
51095-41 = "Yukari, deixe-me te dar um conselho como sua veterana."
51095-42 = "Pare com essa perda de tempo e aproveite sua juventude enquanto pode."
51095-43 = "Ficar se agarrando ao passado só fará o tempo passar em vão."
51095-48 = "……Era só isso. Até mais."
51095-53 = "Re-Renge-chan! Por favor, espere!"
51095-54 = "Ahhh…… o-o que eu faço!?"
51095-55 = "……Sensei, nós vamos indo."
51095-56 = "[s] \"Sim, cuidem bem da Renge, pessoal.\""
51095-63 = "……Renge-senpai."
51095-65 = "（Yukari não conseguia sair do lugar, mesmo depois que Renge e o Clube de Treinamento desapareceram de vista）"
51095-67 = "Próximo episódio: Bochechas Vermelhas"
