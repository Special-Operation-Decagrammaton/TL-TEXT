[translation]
51095-8 = "……！"
51095-14 = "[ns] \"ユカリ、大丈夫！？\""
51095-20 = "そ、それでも……身共は……"
51095-23 = "これで分かっただろ。アタシは帰らない。 "
51095-24 = "百花繚乱は……#nアタシたちは――もう、元には戻れない。"
51095-25 = "……。"
51095-27 = "でも誤解しないでくれ、ユカリ。"
51095-28 = "あんたはそもそもアタシたちとは違うんだ、百花繚乱に帰る必要なんてない。"
51095-29 = "そうだろ？#nだって、お前には帰る場所が――"
51095-30 = "…………！"
51095-31 = "っ……！"
51095-32 = "[s1] \"ユカリは、レンゲなら助けてくれると信じてここに来たんだ。\"\n[s2] \"もう少しだけ、話を聞いてあげてくれないかな？\""
51095-35 = "いや……"
51095-40 = "これ以上、話すことはない。"
51095-41 = "ユカリ、先輩として一つ忠告させてくれ。"
51095-42 = "無駄なことはやめて、今のうちに青春を楽しんでおいた方がいい。"
51095-43 = "過去にしがみついていても、時間が無駄に過ぎるだけだ。"
51095-48 = "……話はそれだけ。じゃあな。"
51095-53 = "れ、レンゲちゃん！待ってください！"
51095-54 = "ああっ……ど、どうしようっ！？"
51095-55 = "……先生、私たちはこれで。 "
51095-56 = "[s] \"うん、みんなレンゲをよろしくね。\""
51095-63 = "……レンゲ先輩。"
51095-65 = "（ユカリは、レンゲと修行部の後ろ姿が見えなくなっても、その場から動けずにいた）"
51095-67 = "次回;赤い頬"
