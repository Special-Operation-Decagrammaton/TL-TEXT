[translation]
10030020-1 = "第2話;テント設営"
10030020-6 = "はい、到着。ここがミレニアムの「東アルプス」。"
10030020-7 = "今日はここ[ruby=ひがしだけさん]「東丈山」[/ruby]でキャンプするよ。"
10030020-8 = "明日は早朝に起きて、初日の出の時間に合わせて山頂に登る予定。#nみんな体力は温存しておいてね。"
10030020-9 = "[s1] \"ミレニアムの近くに、こんな美しい自然があるなんて……\"\n[s2] \"ミレニアムは都市化された地域ってイメージだから意外かも。\""
10030020-12 = "ミレニアムサイエンススクールの中心は先端技術が使われた建物が多いけど、他はそうでもないよ。"
10030020-13 = "自治区には「廃墟」みたいな未開発地区が、まだまだ存在する。"
10030020-14 = "ここはあんまり注目されてないけど、キャンプやトレッキングを楽しむにはもってこいなんだ。"
10030020-18 = "……冷たい風が気持ちいいね。"
10030020-19 = "みんな、気分はどう？#n新鮮な空気を吸って、心も身体もスッキリ――"
10030020-28 = "――してなさそうだね。"
10030020-29 = "予想はしてたけど、本当に全く電波が届かないなんて……"
10030020-30 = "しかも一番近いコンビニが30km先……どこでエナドリを買えば……"
10030020-31 = "すでに体力の半分を失いました……"
10030020-32 = "まだ着いたばっかりなのに……先が思いやられる。"
10030020-33 = "マキ、そこにある赤いポーチを取ってくれる？"
10030020-38 = "赤いポーチ……これ？"
10030020-44 = "うっ、重っ……何コレ？"
10030020-45 = "テント用のポール、野営をするんだからテントを張らないとね。"
10030020-46 = "それと、後ろにあるポーチも持ってきて。#nそこの荷物は全部テントの設営に使う道具だから。"
10030020-47 = "これ全部！？"
10030020-48 = "着いて早々、どうしてテントの設営を……"
10030020-49 = "安全で快適な部室があるのに、わざわざ野営をするなんて……#n非合理的な発想です。"
10030020-50 = "まあ、別にテントを張らなくてもいいんだけど……"
10030020-51 = "この時期に野宿はだいぶ寒いと思うけど、いいの？"
10030020-57 = "うっ……"
10030020-58 = "……仕方ありませんね。背に腹は代えられません。"
10030020-59 = "ねえ先輩……もっと簡単な設営方法ないの？"
10030020-60 = "ネットで見たんだけど、一瞬で設置できるテントもあったよ？"
10030020-62 = "ポップアップテントね。たしかに設置が簡単で、初心者に人気だけど……"
10030020-63 = "構造的にかさばるし、天井が低いからあんまり大人数向けじゃないかな。"
10030020-68 = "生地も薄いし……冬に使うのは難しいかも。"
10030020-69 = "それなら普通のテントを張った方が楽だよ。"
10030020-70 = "[s3] \"チヒロはキャンプに詳しいんだね。\"\n[s4] \"よくキャンプに行ったりするの？\""
10030020-73 = "ん－キャンプ場を巡るほどではないんだけど……"
10030020-74 = "夜通しで作業する日も多くて、そういう時用の寝袋を探してたら他のアウトドアグッズにも興味が出てきてね。"
10030020-75 = "仕事に余裕があるときは、郊外で日向ぼっこをしたりしてたんだ。"
10030020-77 = "日向ぼっこって、なんか……"
10030020-78 = "おばあちゃんみたい……"
10030020-85 = "……あ、あははっ！何も思ってないよ！？"
10030020-87 = "……とにかく。日が暮れる前にはテントを張りたいから、みんなも手伝って。"
10030020-88 = "一緒にやればすぐ終わるから、そんな顔しない。"
10030020-89 = "うっ……分かったよ。"
10030020-93 = "先輩。これ、こっちが表で合ってる？ "
10030020-94 = "うん、グランドシートの有無で座り心地も変わるし、底冷えも防止できるの。"
10030020-95 = "でもこれ、あんまり可愛くない……"
10030020-96 = "あくまで防寒対策だからね……？"
10030020-100 = "ねえ、副部長……この棒、折れたりしない？#nほ、本当に曲げていいんだよね……？"
10030020-101 = "大丈夫、もっと力を入れてもいいよ。"
10030020-102 = "でも……これ以上、曲げようとしても……んっ。"
10030020-107 = "わ、わっ……！マットが風で……！"
10030020-108 = "っ……！ここから手を離して、反対のペグが外れる方が面倒かな……"
10030020-112 = "私が押さえておくから、取ってきてもらえる？"
10030020-124 = "よし……後はロープを結んで、っと。"
10030020-129 = "これでテント設営は終わり、みんなお疲れ様。"
10030020-134 = "疲れた……"
10030020-135 = "体力が、もう底を尽きてしまいました……"
10030020-137 = "ここから力仕事はもうないから、夕方までみんな自由に休んでて。"
10030020-138 = "自由に休んで、って言われても……"
10030020-139 = "ネットもスマホも使えないのに、何をして過ごしたらいいのさ……"
10030020-140 = "ゲームもネットサーフィンもできないし、ふかふかのソファも無いんだよ？"
10030020-141 = "はぁ……他にも色々できるでしょ。"
10030020-142 = "この機会に、電子機器を使わないリフレッシュでもしてみたら？"
10030020-143 = "自然に囲まれてゆったりしてるだけでも、あっという間に時間は過ぎていくものだよ。"
10030020-149 = "ケチ……頑固……"
10030020-150 = "どこかに電波が飛んでるとこ、ないかな？"
10030020-151 = "高い場所なら電波をキャッチできるかもしれません。近くを散策してみましょう。"
10030020-156 = "せ、先輩。あたし達ちょっと散歩してくるね！"
10030020-158 = "うん、あんまり遠くに行かないようにね。"
10030020-167 = "ひとまず野営の準備はこれでいいかな。#n先生は何をするの？"
10030020-168 = "[s5] \"残ってる仕事を片付けようかな。\"\n[s6] \"念のため、紙の報告書を持ってきたんだ！\""
10030020-171 = "ダメ、今日は先生も仕事禁止。"
10030020-172 = "[s] \"……どうして？\""
10030020-173 = "今日くらいはゆっくり休んでほしいから。"
10030020-174 = "一年の最後くらい、先生も仕事を忘れて身体を休めよう？"
10030020-181 = "手持ち無沙汰なら、私の本を貸してあげるから。"
10030020-182 = "[s7] \"……『銃 可愛い 青春』？\"\n[s8] \"たしか、ずっと棚に置いてある本だよね。\""
10030020-185 = "こういう本って、普段はなかなか集中できなかったりするでしょう？"
10030020-186 = "でも、キャンプ場だったら意外と読書に集中できるんだ。"
10030020-194 = "それじゃ私も隣で本を読んでるから、何かあったら声かけてね。"
10030020-196 = "（そしてしばらくの間、チヒロとゆっくり読書を楽しんだ）"
