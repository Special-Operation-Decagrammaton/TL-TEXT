[translation]
10030020-1 = "Episódio 2; Montagem da barraca"
10030020-6 = "Sim, chegamos. Este é o \"Alpes Orientais\" de Millennium."
10030020-7 = "Hoje vamos acampar aqui no Monte Higashidake."
10030020-8 = "Planejamos acordar de madrugada amanhã e subir até o cume para ver o primeiro nascer do sol do ano. #nGuardem suas energias, pessoal."
10030020-9 = "[s1] \"Quem diria que existe uma natureza tão bela perto de Millennium...\"\n[s2] \"É surpreendente, já que Millennium tem uma imagem de região urbanizada.\""
10030020-12 = "O centro do Millennium Science School tem muitos prédios com tecnologia de ponta, mas o resto não é bem assim."
10030020-13 = "Na região autônoma, ainda existem muitas áreas subdesenvolvidas que parecem \"ruínas\"."
10030020-14 = "Ninguém presta muita atenção aqui, mas é um lugar perfeito para acampar e fazer trilhas."
10030020-18 = "……O vento frio é revigorante, não é?"
10030020-19 = "Como vocês estão se sentindo? #nRespirem o ar puro e deixem a mente e o corpo leves――"
10030020-28 = "――Parece que não estão muito bem."
10030020-29 = "Eu já esperava, mas não acredito que o sinal do celular não chega aqui de jeito nenhum..."
10030020-30 = "E a loja de conveniência mais próxima fica a 30km... Onde vou comprar meu energético..."
10030020-31 = "Já perdi metade da minha energia..."
10030020-32 = "Acabamos de chegar e já estou prevendo o que vem pela frente."
10030020-33 = "Maki, pode pegar aquela bolsa vermelha ali para mim?"
10030020-38 = "Bolsa vermelha... esta aqui?"
10030020-44 = "Ugh, que pesada... O que é isso?"
10030020-45 = "São as hastes da barraca. Já que vamos acampar, precisamos montar uma, né?"
10030020-46 = "E traga a bolsa que está atrás também. #nToda a bagagem ali contém as ferramentas para montar a barraca."
10030020-47 = "Tudo isso!?"
10030020-48 = "Por que temos que montar uma barraca logo que chegamos..."
10030020-49 = "Temos uma sala de clube segura e confortável, então fazer um acampamento ao ar livre... #nÉ uma ideia irracional."
10030020-50 = "Bem, não é como se vocês fossem obrigadas a montar a barraca..."
10030020-51 = "Mas acho que vai estar bem frio para dormir ao relento nesta época, tudo bem para vocês?"
10030020-57 = "Ugh..."
10030020-58 = "……Não tem jeito. Em situações desesperadoras, não há escolha."
10030020-59 = "Ei, senpai... não tem um jeito mais fácil de montar?"
10030020-60 = "Eu vi na internet que existem barracas que montam instantaneamente, sabia?"
10030020-62 = "Você fala das barracas pop-up. Elas são fáceis de montar e populares entre iniciantes, mas..."
10030020-63 = "Elas são volumosas por causa da estrutura e o teto é baixo, então não são ideais para muitas pessoas."
10030020-68 = "O tecido também é fino... pode ser difícil usá-las no inverno."
10030020-69 = "Nesse caso, é melhor montar uma barraca comum."
10030020-70 = "[s3] \"Chihiro, você entende bastante de acampamento, hein.\"\n[s4] \"Você costuma acampar com frequência?\""
10030020-73 = "Hmm, não diria que viajo por vários acampamentos, mas..."
10030020-74 = "Como trabalho muitas noites seguidas, comecei a procurar sacos de dormir para essas ocasiões e acabei me interessando por outros equipamentos de aventura."
10030020-75 = "Quando o trabalho estava tranquilo, eu costumava ir para os subúrbios tomar um sol."
10030020-77 = "Tomar sol, isso soa meio..."
10030020-78 = "Parece coisa de vovó..."
10030020-85 = "……Ah, ahaha! Não estou pensando em nada, juro!"
10030020-87 = "……De qualquer forma. Quero montar a barraca antes que escureça, então ajudem-me."
10030020-88 = "Se fizermos juntas, terminaremos rápido, então não façam essa cara."
10030020-89 = "Ugh... entendi."
10030020-93 = "Senpai. Este lado é a frente, certo?"
10030020-94 = "Sim, o uso da lona de solo muda o conforto ao sentar e também evita que o frio suba do chão."
10030020-95 = "Mas isso não é muito bonito..."
10030020-96 = "É apenas uma medida de proteção contra o frio, sabe...?"
10030020-100 = "Ei, vice-presidente... essa haste não vai quebrar? #nE-eu realmente posso dobrar assim...?"
10030020-101 = "Está tudo bem, pode colocar mais força."
10030020-102 = "Mas... mesmo tentando dobrar mais do que isso... hnn."
10030020-107 = "Ah, ah...! O tapete está voando com o vento...!"
10030020-108 = "Ah...! Se eu soltar aqui, vai ser pior se o outro gancho se soltar..."
10030020-112 = "Eu vou segurar aqui, você pode ir buscar para mim?"
10030020-124 = "Muito bem... agora é só amarrar a corda e pronto."
10030020-129 = "Com isso, a montagem da barraca terminou. Bom trabalho a todos."
10030020-134 = "Estou exausta..."
10030020-135 = "Minha energia chegou ao fundo do poço..."
10030020-137 = "Não teremos mais trabalhos pesados a partir de agora, então fiquem à vontade para descansar até o anoitecer."
10030020-138 = "Dizer para ficarmos à vontade é fácil, mas..."
10030020-139 = "Sem internet e sem celular, o que se supõe que devemos fazer para passar o tempo...?"
10030020-140 = "Não dá para jogar nem navegar na internet, e nem temos um sofá fofinho, sabe?"
10030020-141 = "Ah... vocês podem fazer várias outras coisas, não podem?"
10030020-142 = "Por que não aproveitam a oportunidade para relaxar sem usar aparelhos eletrônicos?"
10030020-143 = "Só de ficar cercado pela natureza e relaxar, o tempo passa num piscar de olhos."
10030020-149 = "Que chata... tão teimosa..."
10030020-150 = "Será que não tem nenhum lugar por perto que pegue sinal?"
10030020-151 = "Talvez consigamos captar sinal em um lugar mais alto. Vamos dar uma volta por perto."
10030020-156 = "Se, Senpai. Nós vamos dar uma voltinha, tá bom!"
10030020-158 = "Certo, só não vão muito longe, entenderam?"
10030020-167 = "Por enquanto, os preparativos para o acampamento estão prontos. #nO que você vai fazer, Sensei?"
10030020-168 = "[s5] \"Acho que vou terminar o trabalho que ficou pendente.\"\n[s6] \"Por precaução, eu trouxe relatórios em papel!\""
10030020-171 = "Nada disso, hoje o Sensei também está proibido de trabalhar."
10030020-172 = "[s] \"...Por quê?\""
10030020-173 = "Porque eu quero que você descanse um pouco hoje."
10030020-174 = "Pelo menos no final do ano, que tal o Sensei esquecer o trabalho e descansar o corpo?"
10030020-181 = "Se estiver sem nada para fazer, posso te emprestar o meu livro."
10030020-182 = "[s7] \"...『Armas, Fofura, Juventude』?\"\n[s8] \"Se não me engano, esse é o livro que fica sempre na estante, né?\""
10030020-185 = "Livros assim costumam ser difíceis de se concentrar no dia a dia, não é?"
10030020-186 = "Mas, em um acampamento, é surpreendentemente fácil se concentrar na leitura."
10030020-194 = "Então, eu vou ler meu livro aqui do lado, se precisar de algo, é só me chamar."
10030020-196 = "(E, por um tempo, aproveitei uma leitura tranquila com Chihiro)"
