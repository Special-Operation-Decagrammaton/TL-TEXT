[translation]
1012702-1 = "Escrito na prisão"

1012702-2 = "escritório de placa de petri"

1012702-3 = "(no dia seguinte)"

1012702-7 = "[ns] \"Por favor.\""

1012702-10 = "Ah, bom dia...."

1012702-11 = "[ruby=Sakurai]Sakurai[/ruby]Miyo, #nHoje ficarei encarregado de cuidar das placas de Petri."

1012702-12 = "[s1] \"Bem-vindo, Miyo.\"\n[s2] \"Bem-vindo à placa de Petri!\""

1012702-15 = "Obrigado por me convidar, Sensei."

1012702-16 = "Estou feliz por ter tido essa oportunidade preciosa de sair..."

1012702-17 = "Ufa... saindo pela primeira vez em muito tempo... me sentindo livre..."

1012702-18 = "[s] \"Acho que a Caçada Selvagem tem dificuldade em conseguir permissão para sair.\""

1012702-19 = "Sim. Principalmente para estudantes como eu, que se especializam em literatura..."

1012702-20 = "Em termos extremos, você pode até escrever um romance em confinamento solitário."

1012702-21 = "Na verdade, existem muitas obras-primas escritas na prisão."

1012702-22 = "...Não seria melhor eu confessar sobre o clube e ir para a cadeia?"

1012702-23 = "[s3] \"Então você quer uma mudança de ritmo...\"\n[s4] \"Então deixe comigo!\""

1012702-26 = "Huh?"

1012702-27 = "O que, professor? o que……! ?"

1012702-31 = "Placa de Petri/sala de descanso"

1012702-32 = "Isto é... o banheiro?"

1012702-33 = "Eh... posso escrever devagar...?"

1012702-34 = "Ah, e tudo que você puder comer doces e sucos! ?"

1012702-35 = "Mas, mesmo estando de plantão... Posso relaxar?"

1012702-36 = "O trabalho de um romancista é escrever...?"

1012702-37 = "Ah, isso é verdade, mas...."

1012702-38 = "[s5] \"Tem muitos doces...\"\n[s6] \"Não tenha pressa e concentre-se em escrever!\""

1012702-43 = "...Obrigado, Sensei."

1012702-45 = "(Saí da sala de descanso para fazer meu trabalho)"

1012702-47 = "Hum..."

1012702-48 = "Bem... esta é a cena da doença incurável do personagem principal..."

1012702-49 = "Isso mesmo, para romper a relação entre os dois... #nA outra organização mobilizou uma unidade de tanques..."

1012702-50 = "As linhas aqui são..."

1012702-54 = ""Ah! Por que o destino nos uniu...!""

1012702-55 = ""Não percam as esperanças! Ainda temos 200 foguetes antitanque...!""

1012702-56 = "Hehe... vamos fazer isso."

1012702-57 = "A próxima cena é..."

1012702-63 = "...Sensei, por que você está aqui?"

1012702-64 = "[s] \"Hum...eu trouxe alguns doces que ganhei de lembrança...\""

1012702-65 = "...Você ouviu isso?"

1012702-66 = "[s] \"Do que você está falando...?\""

1012702-67 = "Você ouviu isso?"

1012702-68 = "[s] \"...Só um pouco.\""

1012702-69 = "De onde você é?"

1012702-70 = "[s] \"...de uma doença incurável?\""

1012702-71 = "Não é desde o início...!"

1012702-72 = "Fuaaaaaaaa...!"

1012702-77 = "(Miyo corou e voou para fora da placa de Petri como o vento...)"

