[translation]
10027110-1 = "Episódio 11; Negociação Especial"
10027110-4 = "Academia Federal Red Winter - Montanha Nevada"
10027110-6 = "Aaah! Estou atrasada! Vou me atrasar!"
10027110-7 = "Mas, no fim das contas, deu tudo certo... Bom trabalho, Sensei..."
10027110-11 = "[ns] \"Minha intuição está dizendo... que isso é um mau presságio...!\""
10027110-12 = "Por que a mudança repentina, Sensei?"
10027110-13 = "Eh? Não há duas sem três?#nOra, não diga isso."
10027110-14 = "É verdade! Não foi apenas uma coincidência?"
10027110-22 = "Ouvi dizer que vocês estão fazendo um \"doujinshi\" na Frente de Libertação do Conhecimento!"
10027110-23 = "A Nodoka me disse que tinha uma boa ideia, então eu vim junto."
10027110-25 = "Não pode ser...?"
10027110-27 = "Eu não entendo muito bem o conteúdo do doujinshi, mas ouvi dizer que é algo raro e valioso!"
10027110-28 = "Se a gente conseguir isso e negociar com a Presidente Cherino, talvez a gente consiga um aquecedor, não acha?"
10027110-29 = "Shigure-chan! Não se acostume com a vida na Classe Especial 227!#nPrecisamos pensar em como sair dessa suspensão!"
10027110-30 = "De qualquer forma... a Presidente Cherino é muito gananciosa!#nSe outras pessoas dizem que algo é valioso, ela vai querer ter para si a qualquer custo."
10027110-31 = "Nós vamos usar esse lado da Presidente Cherino para sair da suspensão... e voltar a ter uma vida \"normal\", com aquecimento de verdade, sem insetos, com cobertores... e sem ursos famintos aparecendo..."
10027110-38 = "Não usem o doujinshi dos outros para esse tipo de coisa!"
