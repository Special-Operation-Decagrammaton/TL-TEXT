[translation]
84305100201-5 = "……ずいぶん協力的なのね。予想以上だわ。"
84305100201-6 = "この借りは、いつか返さないといけないわね。"
84305100201-7 = "不要だ。私こそ、君に助けられているのだから。"
84305100201-8 = "ごめんなさい。よく分からないわ。"
84305100201-9 = "私もまだ、言語化はできていないのだよ。"
84305100201-10 = "だが、考えるべき要件は別にある、そうだろう？"
84305100201-11 = "ったく、分かってんならさっさと行くぞ。"
84305100201-12 = "無駄な時間は苦手なんだ。"
