[translation]
1007602-1 = "準備を一緒に"
1007602-2 = "（早朝、がらんとしたスタジアムで備品をチェックしていると……）"
1007602-9 = "せんせ～～い！！"
1007602-10 = "お待たせしてすみません！可能な限り早く走ってきたのですが……！"
1007602-11 = "[s1] \"ゆっくりでもよかったのに。\"\n[s2] \"朝から元気いっぱいだね。\""
1007602-14 = "そ、そうですか！？あはっ、あははは……。"
1007602-15 = "しかし先生は日中忙しいでしょうし、狙うなら今かと思いまして！"
1007602-16 = "それでですね。「提案」というのは、#n今日という日に起こりうる様々な出来事への準備――"
1007602-17 = "――ずばり、ストレッチです！！"
1007602-21 = "……あれっ？リアクションが薄いですね。#nもしかして、もう終わらせてたり……？"
1007602-22 = "おおっ、まだですか？よかったです！"
1007602-23 = "選手でなくても今日は一日中動き回ると思いますので、#nストレッチはやっておいたほうがいいですよ！"
1007602-24 = "……え？"
1007602-25 = "そうですね……ちゃんとやらないと、予期せぬ負傷を招く可能性があります。#nそれを防止するという意味でも、事前に……。"
1007602-26 = "……あ！"
1007602-27 = "ちなみにストレッチとは、使用する筋肉を意図的に緊張、または#n弛緩させることで「回復性」と「弾力性」を向上させる運動の1つで、#nとあるスポーツ科学の論文によると……"
1007602-28 = "[s3] \"やろうやろう！ストレッチ大好き！\"\n[s4] \"今すぐはじめよう！わ～！楽しみ～！\""
1007602-31 = "おお！やる気に満ち溢れたその表情、いいですね！"
1007602-32 = "ですが、ストレッチはただ動けばいいというものではありません。#nちゃんとした手順を踏まないと効果が最大化できませんからね！"
1007602-33 = "ですが、先生はお忙しいので正しいストレッチを調べる時間も惜しいかと思います……#nなので、私がやり方を覚えてきました！"
1007602-34 = "先にやってみせますので、先生はそれを真似してくださいね！"
1007602-35 = "最初は……体を伸ばす運動から！"
1007602-36 = "まずは片足を上げて……。"
1007602-37 = "それから……こうやっ、て……。"
1007602-41 = "こ、こう……でしょうか……？"
1007602-46 = "[ns5] \"……コトリ？\"\n[ns6] （何をしているんだろう……？）"
1007602-49 = "あれっ……？えっと……？んん……？"
1007602-50 = "だからこれは……。"
1007602-51 = "……ふぇん！？"
1007602-54 = "[wa:1400]― [log=코토리 응원단ND]あっ、[wa:900]あれ……？[/log]"
1007602-56 = "― [log=코토리 응원단ND]む、[wa:1000]むむっ……[wa:1800]腕が……[wa:1600]届くはず、[wa:1800]なのに……？[/log]"
1007602-59 = "[wa:1700]― [log=코토리 응원단ND]そんな……！[/log]"
1007602-61 = "[wa:100]― [log=코토리 응원단ND]ここで、[wa:1200]力を[wa:800]グッと――！？[/log]"
1007602-64 = "― [log=코토리 응원단ND]いいいっ！？[/log]"
1007602-66 = "― [log=코토리 응원단ND]いっ、[wa:600]いたたたたたたた！！？[/log]"
1007602-69 = "[ns7] \"コトリ！？怪我しちゃうよ！\"\n[ns8] \"無理しなくて大丈夫だから……！\""
1007602-72 = "[wa:500]― [log=코토리 응원단ND]お、[wa:800]おかしいです……！[/log]"
1007602-74 = "― [log=코토리 응원단ND]調べた通りに、[wa:1300]やってるのに……！[/log]"
1007602-77 = "[wa:400]― [log=코토리 응원단ND]人によって[wa:700]差があるとは[wa:700]知ってましたが、[/log]"
1007602-79 = "― [log=코토리 응원단ND]ここまでとは……[/log]"
1007602-82 = "[wa:1500]― [log=코토리 응원단ND]も、[wa:900]もう一回……。[/log]"
1007602-84 = "[wa:100]― [log=코토리 응원단ND]っ……！？[wa:2000]いいい！[wa:900]いたたたたた！！[/log]"
1007602-87 = "[wa:200]― [log=코토리 응원단ND]も、[wa:1300]もう、[wa:900]ムリ……。[/log]"
1007602-89 = "― [log=코토리 응원단ND]ううう……[wa:3400]あ、[wa:1000]あの……[wa:1650]先生、[wa:1800]これは……[/log]"
1007602-92 = "[wa:1100]― [log=코토리 응원단ND]こんな姿を[wa:1100]見せるつもりじゃ……[/log]"
1007602-94 = "― [log=코토리 응원단ND]なかったんです……[/log]"
1007602-97 = "― [log=코토리 응원단ND]ダメダメな姿を……[wa:2200]見られて、[wa:1600]しまいました……[/log]"
1007602-99 = "[wa:200]― [log=코토리 응원단ND]うううう……。[/log]"
1007602-103 = "ご、ごめんなさい先生……。#n計画までは、その、完璧だったはずなのですが……。"
1007602-104 = "うう……これでは、ただ先生の時間を奪っただけです……。"
1007602-105 = "[s9] コトリの背中をゆっくり押す。\n[s10] \"手伝ってあげるから、力を抜いて。\""
1007602-108 = "せ、先生……！？"
1007602-109 = "り、理由はわかりませんが、#n何だかすごく恥ずかしくなってきたような……！？"
1007602-110 = "……え？"
1007602-111 = "ストレッチは人と一緒にやることが多い……？#n初心者は、特に……？"
1007602-112 = "そ、そうだったんですか！？そこまでは調べられていませんでした……。"
1007602-113 = "そ、そそ、それじゃあ……！"
1007602-114 = "よ、よろしくお願いします！！"
1007602-116 = "（その後、コトリと一緒にストレッチ[ruby=おこな]を行っ[/ruby]た）"
1007602-117 = "（終わった時には身体がほぐれ、動きやすくなっていた）"
