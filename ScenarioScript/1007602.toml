1007602-26 = "……um!"

1007602-27 = "A propósito, o alongamento é um tipo de exercício que melhora a “recuperação” e a “elasticidade”, tensionando ou relaxando intencionalmente os músculos em uso, e de acordo com um artigo científico do esporte..."

1007602-28 = "[s3] \"Vamos lá! Eu adoro alongamento!\"\n[s4] \"Vamos começar agora! Uau! Estou ansioso por isso!\""

1007602-31 = "oh! Essa expressão cheia de motivação é ótima!"

1007602-32 = "No entanto, alongar não envolve apenas mover-se. #nSe você não seguir os passos adequados, não conseguirá maximizar o efeito!"

1007602-33 = "Porém, como o Sensei está ocupado, acho uma pena que ele não tenha tempo de procurar o trecho correto...#n, então aprendi como fazer!"

1007602-34 = "Vou demonstrar primeiro, para que o Sensei possa imitá-lo!"

1007602-35 = "Primeiro...comece com exercícios para alongar o corpo!"

1007602-36 = "Primeiro, levante uma perna..."

1007602-37 = "E então... isso..."

