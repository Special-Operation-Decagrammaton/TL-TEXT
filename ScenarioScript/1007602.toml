1007602-11 = "[s1] \"Você poderia ter ido devagar.\"\n[s2] \"Você está cheio de energia desde a manhã.\""

1007602-14 = "Oh, eu vejo! ? Ahaha, ahahaha…."

1007602-15 = "No entanto, o Sensei provavelmente está ocupado durante o dia, então pensei que agora seria o melhor momento para começar!"

1007602-16 = "É isso. “Propostas” são preparativos para diversos eventos que podem ocorrer neste dia."

1007602-17 = "-É tudo uma questão de alongamento! !"

1007602-21 = "...Huh? A reação é fraca. #nもしかして、もう終わらせてたり……？"

1007602-22 = "Ah, você já está aí? Bom!"

