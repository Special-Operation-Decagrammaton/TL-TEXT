[translation]
13330-1 = "第33話;顕現"
13330-6 = "……。"
13330-9 = "ゆめ、せんぱ……。"
13330-12 = "[ns] \"いったい何が……！\""
13330-13 = "ホ、ホシノさんは……。"
13330-14 = "……存在が反転しました。 "
13330-15 = "もう、これでは……。"
13330-17 = "ほ、方法はないのでしょうか！？"
13330-21 = "……肯定。ありません。"
13330-22 = "[ns] \"……！？\""
13330-23 = "そ、そんな……！"
13330-24 = "死んでしまった人を、蘇らせるようなものです……。"
13330-25 = "[ns] \"ホシノ……！\""
13330-29 = "最初から、列車砲は餌に過ぎなかった。"
13330-30 = "真のターゲットは、あのキヴォトス最高の神秘。"
13330-31 = "六つ目の古則、「[ruby=ひう]非有[/ruby]の真実は真実であるか」――"
13330-32 = "いつか我々は死ぬ。#nそれは、定められし運命。"
13330-33 = "しかし、自分自身の死を人は認識できない。"
13330-34 = "ただ、他人の死を認識するだけ。#nゆえに、我々は死に対して理解が及ばぬ！"
13330-35 = "……だが、あの神秘からひとつの解を得た。"
13330-36 = "我々は、「死」と並びうる概念を知っていたのだ。"
13330-37 = "――「苦しみ」。"
13330-38 = "[ruby=おの]己[/ruby]が苦しみは他人に理解できないように、#n他人の苦しみを真に理解することも、また不可能。"
13330-39 = "……そう、これは苦しみによって反転した神秘。#n言わば、「恐怖」の顕現。"
13330-43 = "神聖の頂点に立ち、最も古く、最も偉大な神々の原点――「ホルス」よ。 "
13330-46 = "……それでも、止めなければなりません。"
13330-47 = "えっ？ "
13330-48 = "今のホシノさんは、恐怖へと反転しホルスになりました。"
13330-50 = "このままでは、本質に導かれ、世界を崩壊させていくでしょう。"
13330-51 = "……！"
13330-52 = "[ns] \"……！？\""
13330-59 = "……ん、ぱい。"
13330-60 = "ゆめ……せん、ぱい。"
13330-62 = "……！"
13330-63 = "……ホシノ先輩。"
13330-64 = "あ、アレがホシノ先輩なの……！？"
13330-65 = "何が起きて……。"
13330-69 = "[ns] \"ヒナ！\""
13330-73 = "せん、せ……。 "
13330-74 = "[s] \"ヒナ、大丈夫！？\""
13330-78 = "止められ、なかっ……。"
13330-83 = "[ns] \"……！\""
13330-88 = "先輩！"
13330-89 = "て……ちょう……。 "
13330-91 = "ホシノ先輩、しっかりして！ "
13330-99 = "きゃああっ！？"
13330-102 = "[ns] \"ホシノ――！\""
13330-103 = "……。"
13330-108 = "気をつけてください！#nあの攻撃は、私たちでも……！"
13330-109 = "先輩、手を！"
13330-120 = "[ns] （ダメだ……）"
13330-125 = "[ns] （私は何もできなかった……）"
13330-127 = "[ns] （……何も）"
13330-129 = "[ns1] （私には、死んだ人を蘇らせることも）\n[ns2] （過去を変えることも、できない）"
13330-133 = "[ns] （プラナ……私は、どうすれば、良かったんだろう）"
13330-136 = "オ、オオオオオ！ "
13330-137 = "オオオオオオオオオ――！"
13330-138 = "今度はあなたが！"
13330-139 = "そうか、ホルスの神格に応じて！"
13330-140 = "原初の神格ホルスの宿敵であり、#nこの世界の創造を巡り対立していた存在……。"
13330-141 = "「セトの[ruby=ふんぬ]憤怒[/ruby]」よ！"
13330-154 = "ルールを変える前のテクスチャーだが、良いだろう。"
13330-155 = "「セトの憤怒」と「暁のホルス」の激突。#nこれこそ、まさに世界創造の戦い！"
13330-156 = "早く、早く小生に見せてくれたまえ！#n語り継がれし神秘と恐怖の[ruby=ものがたり]神話[/ruby]を！"
13330-160 = "[ruby=ひう]非有[/ruby]の真実は真実であるか――"
13330-161 = "この不可解な問いに対して、あの神秘と恐怖は答えているのだ！"
13330-162 = "真実は常に観測されてきたが、#nそれらすべてを自らは経験できない。"
13330-163 = "それゆえ、我々が真実に至る日は来なかった。嗚呼ッ！そうだ！"
13330-164 = "この世界は滅びる。"
13330-165 = "他人の苦しみを理解できぬような存在は、#nもとより滅びゆく運命にあったのだ。"
13330-168 = "黒服よ、代わりに小生が叶えてやったぞ。"
13330-169 = "これこそが、貴様の見たかった光景――"
13330-173 = "――世界の滅亡だ！"
13330-177 = "状況確認。#n[USERNAME]先生、このままでは世界が滅びてしまいます。"
13330-178 = "[s] ホシノを止める手段はある？"
13330-179 = "回答。#n……ホシノさんのヘイローを破壊するしかありません。"
13330-185 = "[ns] それはダメだ。"
13330-186 = "いずれにせよ、ホルスとなったホシノさんを止めるには、#n対抗できるだけの力を持つ神聖がいなければ……。"
13330-187 = "[s] ……神聖。"
13330-188 = "ですが、そんな存在はここに……。"
13330-189 = "……「恐怖」に匹敵する「恐怖」。"
13330-190 = "[s] ダメだ、ホシノ……。"
13330-191 = "アロナ先輩。このままでは、先生が……。"
13330-196 = "ごほっ、ごほっ……シロコ先輩。"
13330-197 = "逃げ、ましょう……。"
13330-198 = "シロコちゃん……。"
13330-202 = "ゆめ、せんぱい……。"
13330-212 = "……。"
13330-213 = "私が弱いせいで、こうなった。"
13330-214 = "でも、分かった気がする。"
13330-215 = "今、ホシノ先輩を止められるのは私だけ。"
13330-216 = "アヤネも、セリカも、ノノミも、ホシノ先輩も……。"
13330-221 = "それに、先生も。絶対、助ける。"
13330-226 = "そのために、私はここに存在してるから。"
13330-232 = "「色彩」が観測されました！"
13330-233 = "ど、どうして……このタイミングで！？ "
13330-234 = "せ、先生！"
13330-235 = "確認。意識を失ってしまいました。#n脈拍、不安定。"
13330-237 = "先生の命が危険です、アロナ先輩……！"
13330-238 = "……！"
13330-242 = "私が、止めないと……！"
13330-248 = "私が。"
13330-272 = "……あの～。"
13330-273 = "そろそろ起きないと……。"
13330-274 = "[USERNAME]先生？"
13330-281 = "次回;謝罪"
