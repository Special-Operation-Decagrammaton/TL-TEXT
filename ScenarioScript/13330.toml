[translation]
13330-1 = "Episódio 33; Manifestação"
13330-6 = "……。"
13330-9 = "Yume, senpa..."
13330-12 = "[ns] \"O que diabos está...!\""
13330-13 = "A, a Hoshino-san..."
13330-14 = "……A existência dela foi invertida."
13330-15 = "Não pode ser, desse jeito..."
13330-17 = "N, não existe nenhum método!?"
13330-21 = "……Afirmativo. Não existe."
13330-22 = "[ns] \"……!?\""
13330-23 = "I, isso não pode ser...!"
13330-24 = "É como tentar trazer alguém que já morreu de volta à vida..."
13330-25 = "[ns] \"Hoshino...!\""
13330-29 = "Desde o início, o canhão ferroviário era apenas uma isca."
13330-30 = "O verdadeiro alvo era aquele, o maior mistério de Kivotos."
13330-31 = "O sexto princípio antigo, \"A verdade da não existência é uma verdade?\" —"
13330-32 = "Um dia, todos morreremos.#nEsse é o destino traçado."
13330-33 = "No entanto, ninguém consegue reconhecer a própria morte."
13330-34 = "Apenas reconhecemos a morte dos outros.#nPor isso, nossa compreensão sobre a morte é limitada!"
13330-35 = "……Mas, obtive uma resposta a partir daquele mistério."
13330-36 = "Nós conhecíamos um conceito que pode ser equiparado à \"morte\"."
13330-37 = "——\"Sofrimento\"."
13330-38 = "Assim como o seu próprio sofrimento não pode ser compreendido pelos outros,#ncompreender verdadeiramente o sofrimento alheio também é impossível."
13330-39 = "……Sim, este é um mistério invertido pelo sofrimento.#nPor assim dizer, a manifestação do \"medo\"."
13330-43 = "Aquela que está no ápice do sagrado, a origem dos deuses mais antigos e grandiosos — \"Hórus\"."
13330-46 = "……Mesmo assim, precisamos impedi-la."
13330-47 = "Hã?"
13330-48 = "A Hoshino-san de agora se inverteu em medo e se tornou Hórus."
13330-50 = "Se continuar assim, ela será guiada pela sua essência e levará o mundo ao colapso."
13330-51 = "……!"
13330-52 = "[ns] \"……!?\""
13330-59 = "……N, pai."
13330-60 = "Yume... sen, pai."
13330-62 = "……!"
13330-63 = "……Hoshino-senpai."
13330-64 = "A, aquela é a Hoshino-senpai...!?"
13330-65 = "O que aconteceu..."
13330-69 = "[ns] \"Hina!\""
13330-73 = "Sen, se... "
13330-74 = "[s] \"Hina, você está bem!?\""
13330-78 = "Não consegui... impedir..."
13330-83 = "[ns] \"……!\""
13330-88 = "Senpai!"
13330-89 = "Pre... sidente..."
13330-91 = "Hoshino-senpai, aguente firme!"
13330-99 = "Aaaah!?"
13330-102 = "[ns] \"Hoshino——!\""
13330-103 = "……."
13330-108 = "Cuidado!#nAquele ataque, nem nós conseguiríamos...!"
13330-109 = "Senpai, sua mão!"
13330-120 = "[ns] （Não pode ser……）"
13330-125 = "[ns] （Eu não consegui fazer nada……）"
13330-127 = "[ns] （……nada）"
13330-129 = "[ns1] （Eu não consigo ressuscitar os mortos,）\n[ns2] （nem mudar o passado.）"
13330-133 = "[ns] （Plana…… o que eu deveria ter feito?）"
13330-136 = "O, OOOOO! "
13330-137 = "OOOOOOOOOO――!"
13330-138 = "Desta vez é você!"
13330-139 = "Entendo, de acordo com a divindade de Hórus!"
13330-140 = "O arqui-inimigo da divindade primordial de Hórus, #nque se opôs a ele durante a criação deste mundo……."
13330-141 = "A \"Fúria de Set\"!"
13330-154 = "É uma textura de antes de eu mudar as regras, mas serve."
13330-155 = "O choque entre a \"Fúria de Set\" e o \"Hórus do Amanhecer\". #nIsso sim é uma batalha de criação de mundo!"
13330-156 = "Rápido, mostre logo para mim! #nO mito de mistério e terror que foi passado adiante!"
13330-160 = "A verdade da não-existência é uma verdade――"
13330-161 = "Diante dessa pergunta incompreensível, aquele mistério e terror estão respondendo!"
13330-162 = "A verdade sempre foi observada, mas #nnós mesmos não podemos experimentar tudo isso."
13330-163 = "Por isso, o dia em que alcançaríamos a verdade nunca chegou. Ah! É isso!"
13330-164 = "Este mundo vai perecer."
13330-165 = "Existências que não conseguem compreender o sofrimento alheio #nestavam destinadas a perecer desde o início."
13330-168 = "Kurokawa, eu realizei isso em seu lugar."
13330-169 = "Esta é a cena que você queria ver――"
13330-173 = "――A destruição do mundo!"
13330-177 = "Verificando situação. #nProfessor [USERNAME], se continuar assim, o mundo será destruído."
13330-178 = "[s] Existe alguma forma de parar a Hoshino?"
13330-179 = "Resposta. #n……Não há outra escolha a não ser destruir o halo da Hoshino-san."
13330-185 = "[ns] Isso não pode acontecer."
13330-186 = "De qualquer forma, para parar a Hoshino-san que se tornou Hórus, #nprecisaríamos de uma divindade com poder suficiente para enfrentá-la……."
13330-187 = "[s] ……Divindade."
13330-188 = "Mas tal existência não está aqui……."
13330-189 = "……Um \"terror\" que rivaliza com o \"terror\"."
13330-190 = "[s] Não faça isso, Hoshino……."
13330-191 = "Arona-senpai. Se continuar assim, o Sensei……."
13330-196 = "Cof, cof…… Shiroko-senpai."
13330-197 = "Vamos, fuja……."
13330-198 = "Shiroko-chan……."
13330-202 = "Yume, senpai……."
13330-212 = "……."
13330-213 = "Foi por eu ser fraca que as coisas chegaram a esse ponto."
13330-214 = "Mas acho que entendi."
13330-215 = "Agora, sou a única que pode parar a Hoshino-senpai."
13330-216 = "Ayane, Serika, Nonomi e a Hoshino-senpai……."
13330-221 = "E também o Sensei. Eu vou salvá-los, com certeza."
13330-226 = "Porque eu existo aqui para isso."
13330-232 = "O \"Colorido\" foi detectado!"
13330-233 = "Po-por que…… neste momento!?"
13330-234 = "Pro-Sensei!"
13330-235 = "Confirmação. Ele perdeu a consciência. #nPulso, instável."
13330-237 = "A vida do Sensei está em perigo, Arona-senpai……!"
13330-238 = "……!"
13330-242 = "Eu preciso... impedi-los!"
13330-248 = "Eu."
13330-272 = "......Com licença."
13330-273 = "Já está na hora de acordar..."
13330-274 = "Sensei [USERNAME]?"
13330-281 = "Próximo episódio; Desculpas"
