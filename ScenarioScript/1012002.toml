[translation]
1012002-1 = "1時間目「特別講義：手段」"
1012002-2 = "（ナツに教えてもらっていたカフェに到着した）"
1012002-7 = "お、先生、早いね。"
1012002-8 = "にひ、今日はこれを食べるよ。"
1012002-9 = "チョコバナナタルト。"
1012002-10 = "ここのは絶品なんだ。"
1012002-11 = "柔らかいバナナと、硬いチョコチップのハーモニーが絶妙で――"
1012002-12 = "それぞれ異なる甘さが生み出すシナジー。"
1012002-13 = "まさに、今日みたいな「チョコバナナ気分」にぴったりなスイーツだと言えよう。"
1012002-14 = "[s] \"チョコバナナ気分……？\""
1012002-15 = "ふふ、先生にはまだ早かったかな？"
1012002-16 = "……スイーツは、言葉じゃ表現しきれないんだよ。"
1012002-17 = "言葉の枠に押し込むには、情報が多すぎるからね。"
1012002-18 = "だから、もっと感覚的な話。"
1012002-19 = "ストレスが溜まると――"
1012002-20 = "――無性にスイーツが食べたくなる。"
1012002-21 = "うん？最近ストレスが溜まってるのかって？"
1012002-22 = "うーん……。"
1012002-23 = "どうだろ……？"
1012002-24 = "[s1] \"バンドのスケジュールをナツが管理してるんだっけ。\"\n[s2] \"それがストレスになってるんじゃないかな？\""
1012002-27 = "んーそれは違うかなぁ。"
1012002-28 = "みんな、私の計画について来てくれてるし。"
1012002-29 = "この程度じゃストレスにはならないよ。"
1012002-30 = "それこそ――"
1012002-31 = "「天然のメープルシロップでできたつらら」を食べたらお腹を壊して、限定パフェを食べ損ねる……。"
1012002-32 = "これくらいじゃないと。"
1012002-33 = "……ああ。でも、そっか。"
1012002-34 = "先生が私とスイーツを食べる理由にはなるのかな。"
1012002-35 = "それなら、無くても、あったほうがいいのかも？"
1012002-36 = "手段と目的が逆転することなんてたくさんあるんだし。"
1012002-38 = "（しばらくして、チョコバナナタルトが運ばれてきた）"
1012002-39 = "（「チョコバナナ気分」にぴったりな味だった）"
