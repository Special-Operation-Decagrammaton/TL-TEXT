[translation]
1012002-1 = "1ª hora “Aula Especial: Meios”"

1012002-2 = "(Eles chegaram ao café sobre o qual Natsu havia falado.)"

1012002-7 = "Oh, sensei, você chegou cedo."

1012002-8 = "Nihi, vou comer isso hoje."

1012002-9 = "Torta de banana com chocolate."

1012002-10 = "Os que estão aqui são primorosos."

1012002-11 = "A harmonia da banana macia com as gotas de chocolate duro é requintada."

1012002-12 = "Uma sinergia criada por cada doçura diferente."

1012002-13 = "Posso dizer que este é o doce perfeito para aqueles moods de “banana chocolate” como os de hoje."

1012002-14 = "[s] \"Sentindo-se como uma banana de chocolate...?\""

1012002-15 = "Hehe, é muito cedo para se tornar professor?"

1012002-16 = "...Os doces não podem ser totalmente expressos em palavras."

1012002-17 = "Há muita informação para colocar em palavras."

1012002-18 = "Então é uma história mais emocionante."

1012002-19 = "Quando o estresse se acumula..."

1012002-20 = "--Tenho vontade de comer doces."

1012002-21 = "Sim? Você tem se sentido estressado ultimamente?"

1012002-22 = "Hum..."

1012002-23 = "O que você acha...?"

1012002-24 = "[s1] \"Então Natsu é responsável pela agenda da banda.\"\n[s2] \"Não é isso que está te causando estresse?""

1012002-27 = "Hmm, acho que isso não é verdade."

1012002-28 = "Todos estão seguindo meu plano."

1012002-29 = "Não é tão estressante."

1012002-30 = "É isso--"

1012002-31 = "Se você comer “pingentes de gelo feitos com xarope de bordo natural”, você ficará enjoado e perderá o parfait de edição limitada."

1012002-32 = "Tem que ser tanto."

1012002-33 = "...... ah. Mas, eu vejo."

1012002-34 = "Gostaria de saber se isso será motivo para a professora comer doce comigo."

1012002-35 = "Nesse caso, talvez seja melhor ter mesmo que você não tenha?"

1012002-36 = "Existem muitos casos em que os meios e os fins são invertidos."

1012002-38 = "(Depois de um tempo, uma torta de chocolate e banana foi trazida.)"

1012002-39 = "(O sabor ficou perfeito para o “clima de chocolate e banana”)"

