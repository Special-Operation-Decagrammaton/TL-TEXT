[translation]
1003405-1 = "Treinamento de Noiva Parte 2: Limpeza"
1003405-2 = "Hyakkiyako - Antigo Prédio Escolar nº 18"
1003405-3 = "O local da limpeza é aqui."
1003405-4 = "[s] \"Está bem empoeirado, hein.\""
1003405-5 = "É um dos antigos prédios escolares de Hyakkiyako que não é usado há algum tempo."
1003405-6 = "Mas só porque não está sendo usado, não significa que podemos deixá-lo sujo."
1003405-7 = "Vamos limpar tudo e deixar brilhando."
1003405-8 = "[s] \"Falando nisso, limpar conta como treinamento?\""
1003405-9 = "Fufu, com certeza."
1003405-10 = "Como uma Yamato Nadeshiko..."
1003405-11 = "E para me tornar uma noiva maravilhosa, os conhecimentos que devo dominar incluem limpeza, culinária, lavagem de roupas, costura e muito mais...!"
1003405-12 = "O caminho deste treinamento é profundo e não tem fim!"
1003405-13 = "[s] \"Uau, o caminho para ser uma Yamato Nadeshiko é profundo mesmo...!\""
1003405-14 = "Sim, não é um caminho fácil. É por isso que treino todos os dias."
1003405-15 = "Fufu, então, vamos começar?"
1003405-27 = "(Assim, passei quase 3 horas limpando a sala de aula do antigo prédio com Mimori)"
1003405-30 = "[ns1] \"Chão limpo, janelas limpas, joguei fora 30 sacos de lixo...\n[ns2] \"Será que terminamos por aqui...?\""
1003405-31 = "Sim, terminamos uma boa parte, mas..."
1003405-32 = "Sim, terminamos uma boa parte, mas..."
1003405-33 = "Ainda falta um lugar importante."
1003405-34 = "[s] \"Um lugar importante?\""
1003405-35 = "Os trilhos da janela."
1003405-36 = "Limpamos o vidro, mas a poeira acumulada na moldura ainda não foi removida."
1003405-37 = "[s3] \"Como esperado, essa delicadeza de não deixar passar nem os mínimos detalhes...!\"\n[s4] \"Isso é ser uma Yamato Nadeshiko... ou seria uma sogra...?\""
1003405-38 = "Já preparei o que é necessário."
1003405-39 = "Já preparei o que é necessário."
1003405-40 = "Um borrifador, uma esponja de limpeza e hashis descartáveis."
1003405-41 = "Combinando isso, fazemos assim..."
1003405-44 = "(Esfregar, esfregar...)"
1003405-45 = "Veja, Sensei!"
1003405-46 = "Ficou tão limpo!"
1003405-47 = "[s] \"Uau, toda a sujeira antiga saiu completamente.\""
1003405-48 = "Foi um método que encontrei na internet,"
1003405-49 = "quando fica tão limpo assim, até a mente se sente renovada. Fufu."
1003405-50 = "Mas... ainda não acabou."
1003405-51 = "Por enquanto, só removemos a maior parte da sujeira da moldura."
1003405-52 = "Os cantos dos trilhos... onde a esponja não alcança, ainda não foram limpos."
1003405-53 = "[s] \"E-então, o que devemos fazer!? Sargento Mimori!\""
1003405-54 = "Que bom que perguntou, para momentos como este, usamos isto..."
1003405-55 = "Um \"pincel\" usado para pintura!"
1003405-56 = "[s] \"Um item inesperado!\""
1003405-57 = "Com as cerdas delicadas usadas nas aulas de arte,"
1003405-58 = "podemos limpar até o último cantinho!"
1003405-59 = "Não acha que parece uma sabedoria de Yamato Nadeshiko? Embora eu também tenha encontrado isso na internet!"
1003405-60 = "[s] \"Incrível! Sabedoria de Yamato Nadeshiko, feat. Internet!\""
1003405-64 = "(Esfregar, esfregar, esfregar...)"
1003405-65 = "Fufu, agora sim, a moldura da janela está terminada♪"
1003405-66 = "[s] \"Mimori, você parece estar se divertindo um pouco.\""
1003405-67 = "E-eu estava com uma cara tão feliz assim...?"
1003405-68 = "Ah, mas é verdade que, como resultado do esforço, ver os trilhos que estavam tão sujos ficarem limpos assim..."
1003405-69 = "Talvez exista uma sensação de dever cumprido, por assim dizer."
1003405-70 = "[s] \"Então você acha que limpar em si é divertido?\""
1003405-71 = "Sim, sinto que estou me acostumando cada vez mais com esse tipo de tarefa doméstica..."
1003405-72 = "Ah, mas quando limpo sozinha, não fico tão animada assim...?"
1003405-73 = "[s] \"É mesmo? Mas você parece estar se divertindo muito agora.\""
1003405-74 = "Bem, o motivo de eu estar tão feliz agora é, com certeza..."
1003405-75 = "[s] \"Com certeza...?\""
1003405-76 = "Fufu, não, não é nada."
1003405-77 = "Vamos lá, vamos terminar logo o resto dos lugares, Sensei!"
1003405-79 = "(Depois disso, passei quase duas horas limpando alegremente junto com Mimori)"
