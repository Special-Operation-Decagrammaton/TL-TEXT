[translation]
1003405-1 = "花嫁修行その２：お掃除編"
1003405-2 = "百鬼夜行・第18旧校舎"
1003405-3 = "お掃除の場所はこちらですね。"
1003405-4 = "[s] \"だいぶほこりまみれだね。\""
1003405-5 = "しばらく使われてない、百鬼夜行の旧校舎の一つですから。"
1003405-6 = "ですが使われていないからといって、汚れたまま放っておくわけにも行きません。"
1003405-7 = "キレイに掃除して、ピカピカにしましょう。"
1003405-8 = "[s] \"そういえば掃除って、修行になるの？\""
1003405-9 = "ふふっ、もちろんです。"
1003405-10 = "大和撫子として……。"
1003405-11 = "そして素敵な花嫁になるためにも、習得すべき心得と言えば、お掃除、お料理、お洗濯、お裁縫等々……！"
1003405-12 = "この修行の道は深く、終わりの見えないものなのです！"
1003405-13 = "[s] \"や、大和撫子への道は深いね……！\""
1003405-14 = "はいっ、決して簡単な道ではありません。だからこそ日々修行をするのです。"
1003405-15 = "ふふっ、では始めましょうか？"
1003405-27 = "（そうやってミモリと一緒に3時間近く、旧校舎の教室を掃除した）"
1003405-30 = "[ns1] \"床掃除OK、窓拭きOK、ゴミは30袋も捨てたし……。\"\n[ns2] \"これでだいたい終わったかな……？\""
1003405-31 = "はい、ある程度は終わりましたが……。"
1003405-32 = "はい、ある程度は終わりましたが……。"
1003405-33 = "まだ、大事な場所が残ってます。"
1003405-34 = "[s] \"大事な場所？\""
1003405-35 = "窓のサッシです。"
1003405-36 = "窓は拭きましたが、まだ枠の部分に溜まってるホコリは掃除できていません。"
1003405-37 = "[s3] \"さすが、細かい部分まで見逃さないその繊細さ……！\"\n[s4] \"これが大和撫子……っていうか、姑……？\""
1003405-38 = "必要なものはもう準備してあります。"
1003405-39 = "必要なものはもう準備してあります。"
1003405-40 = "霧吹きと掃除用のスポンジ、そして割り箸です。"
1003405-41 = "これを組み合わせて、こうやって……っ。"
1003405-44 = "（ゴシゴシ……）"
1003405-45 = "見てください先生！"
1003405-46 = "こんなにキレイになりました！"
1003405-47 = "[s] \"おおー、古い汚れが全部キレイに剥がれたね。\""
1003405-48 = "ネットで見つけた方法だったのですが、"
1003405-49 = "ここまでキレイになると、気持ちまですっきりしますね。ふふっ。"
1003405-50 = "ですが……まだです。"
1003405-51 = "今はまだ、窓枠のおおよその汚れが落ちた状態に過ぎません。"
1003405-52 = "サッシの角……スポンジが届かない隅っこの部分はまだお掃除できていません。"
1003405-53 = "[s] \"で、ではどうすればいいでしょうか！？ミモリ軍曹！\""
1003405-54 = "よくぞ聞いてくださいました、こういう時にはこちら……"
1003405-55 = "絵画に使う、「筆」です！"
1003405-56 = "[s] \"意外なアイテムが！\""
1003405-57 = "美術の授業などでも使われるこの繊細な筆先なら、"
1003405-58 = "隅の隅までキレイにお掃除ができるんです！"
1003405-59 = "まさに大和撫子の知恵っぽいと思いませんか！これもネットで見つけたのですけれど！"
1003405-60 = "[s] \"すごい！大和撫子の知恵、feat.インターネット！\""
1003405-64 = "（ごしごしごし……）"
1003405-65 = "ふふっ、これであらためて窓枠は終わりです♪"
1003405-66 = "[s] \"ミモリ、ちょっと楽しそうだね。\""
1003405-67 = "そ、そんなに楽しそうな顔、してましたでしょうか……？"
1003405-68 = "あ、でも確かに頑張った結果として、あんなに汚かったサッシがこうしてキレイになると、"
1003405-69 = "達成感、みたいなものはあるかもしれません。"
1003405-70 = "[s] \"掃除自体が楽しいって感じなんだね。\""
1003405-71 = "そうですね、こういった家事にどんどん慣れてきてるという実感もありますし……。"
1003405-72 = "あっ、でも、一人でお掃除をする時にはここまで浮かれたりしませんよ……？"
1003405-73 = "[s] \"そうなの？今はすごく楽しそうだけど。\""
1003405-74 = "その、私が今こんなに楽しいのはきっと……。"
1003405-75 = "[s] \"きっと……？\""
1003405-76 = "ふふっ、いえ、何でもありません。"
1003405-77 = "さあ、残りの場所もささっと終わらせてしまいましょう、先生！"
1003405-79 = "（その後も2時間近く、ミモリと一緒に楽しく掃除をした）"
