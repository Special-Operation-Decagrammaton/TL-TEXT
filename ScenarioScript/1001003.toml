[translation]
1001003-1 = "僅かな距離"
1001003-2 = "アビドス高等学校・近郊"
1001003-3 = "（シロコのことを待っていた先生）"
1001003-4 = "[s] \"そろそろシロコが来るはず……。\""
1001003-6 = "……あれ、先生？ここで何してるの？"
1001003-7 = "私がここでランニングをするって聞いて、エナジードリンクを渡しに……?"
1001003-8 = "う、うーん……あ、ありがたいんだけど、その……。"
1001003-9 = "[s] \"はい、どうぞ。\""
1001003-14 = "……。"
1001003-15 = "[s] \"……？\""
1001003-20 = "[s] \"……シロコ？\""
1001003-21 = "……うーん。"
1001003-22 = "……ごめん、えっと……。"
1001003-23 = "今、ランニングを終えた直後だから……べ、別に、そんな気にしてるわけではないけど……！"
1001003-24 = "ご、ごめん、先生……やっぱり、今は遠慮しておく。"
1001003-25 = "また、学校で。"
1001003-28 = "対策委員会・教室"
1001003-33 = "（シロコがさっきより気持ちよさそうな表情で現れた）"
1001003-34 = "やあ、先生。"
1001003-35 = "さっきのエナジードリンク？うん、ありがたくもらうね。"
1001003-41 = "……うん？"
1001003-42 = "さっきとは態度が違うって？えっと、それは……。"
1001003-43 = "う、うーーん……。"
1001003-44 = "それは……。"
1001003-45 = "な、なんでもない。"
1001003-49 = "[s] \"……！？\""
1001003-50 = "（そういえばシロコからふんわり石鹸の香りがしていた）"
1001003-51 = "（ミスをしたみたいだから、今度謝ることにしよう）"
