[translation]
1001003-1 = "Uma curta distância"
1001003-2 = "Arredores da Escola de Abydos"
1001003-3 = "(Sensei estava esperando por Shiroko)"
1001003-4 = "[s] \"A Shiroko deve estar chegando a qualquer momento...\""
1001003-6 = "……Ah, Sensei? O que está fazendo aqui?"
1001003-7 = "Você ouviu que eu ia correr por aqui e veio me trazer uma bebida energética...?"
1001003-8 = "U-uh... Ah, eu agradeço, mas, sabe..."
1001003-9 = "[s] \"Aqui, pode pegar.\""
1001003-14 = "……."
1001003-15 = "[s] \"……?\""
1001003-20 = "[s] \"……Shiroko?\""
1001003-21 = "……Hmm."
1001003-22 = "……Desculpe, é que..."
1001003-23 = "Eu acabei de terminar minha corrida, então... b-bem, não é como se eu estivesse me importando com isso, mas...!"
1001003-24 = "D-desculpe, Sensei... Acho melhor eu recusar por agora."
1001003-25 = "Nos vemos na escola."
1001003-28 = "Sala do Comitê de Contramedidas"
1001003-33 = "(Shiroko apareceu com uma expressão mais relaxada do que antes)"
1001003-34 = "Ei, Sensei."
1001003-35 = "Sobre aquela bebida energética de antes? Sim, eu aceito com prazer."
1001003-41 = "……Hm?"
1001003-42 = "Minha atitude está diferente de antes? Bem, isso é..."
1001003-43 = "U-uhhh..."
1001003-44 = "Isso é..."
1001003-45 = "N-não é nada."
1001003-49 = "[s] \"……!?\""
1001003-50 = "(Agora que parei para pensar, a Shiroko estava com um cheiro suave de sabonete)"
1001003-51 = "(Parece que cometi um erro, vou me desculpar depois)"
