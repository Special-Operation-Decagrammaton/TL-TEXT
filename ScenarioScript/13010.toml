[translation]
13010-1 = "Episódio 1: Prólogo"
13010-4 = "……É aqui."
13010-5 = "Expulso da Gematria e enterrado — meu irmão selado."
13010-7 = "Doloroso…… doloroso……."
13010-8 = "Sua penitência acaba aqui. #nDesperte, \"Habitante do Subsolo\"."
13010-9 = "……."
13010-10 = "……Essa voz."
13010-11 = "\"Viajante Anônimo\", é você……."
13010-12 = "Não — agora chame-me de \"Francis\"."
13010-13 = "Não importa quem seja…… por favor, não me incomode……"
13010-14 = "Seja qual for o motivo…… não tenho interesse…… hihi, hi……"
13010-15 = "Eu não quero mais……"
13010-18 = "— A Gematria foi aniquilada."
13010-19 = "……."
13010-20 = "O que isso significa……?"
13010-22 = "A Gematria não existe mais. Pode considerar como dissolvida ou desmantelada."
13010-23 = "……A causa é uma só."
13010-24 = "É por causa da existência do sensei [USERNAME] do Schale. Aquele indivíduo distorceu a causalidade e o gênero."
13010-25 = "Lidar com ele agora é……"
13010-26 = "Shh!…… Silêncio."
13010-31 = "Hum……."
13010-32 = "Entendo…… o \"RULE BOOK\" foi atualizado, não é?"
13010-40 = "Um novo mundo…… sim, eu sinto. #nEssa sensação de estranheza neste mundo……"
13010-41 = "Se o livro foi alterado e as regras mudaram, então isso significa…… que uma nova campanha começou……."
13010-42 = "É, é mesmo…… hihi, hi!…… Então o assunto muda."
13010-43 = "O, o próximo livro……! Que tipo de revelação ele trará para mim."
13010-44 = "Vejamos, vejamos…… [USERNAME], foi isso que disse……?"
13010-45 = "Este indivíduo é o chefe da campanha……?"
13010-46 = "O novo \"RULE BOOK\" é——"
13010-52 = "Cidade Acadêmica……"
13010-58 = "E, sensei?"
13010-60 = "N, nn……? I, isso! A dificuldade é m, muito maior do que eu pensava……!"
13010-64 = "M, mas, existe uma estratégia para tudo……! Vejamos, vejamos…… ponto cego, fraqueza…… defeito…… qualquer coisa serve……!"
13010-65 = "Não subestime aquele indivíduo, Habitante do Subsolo."
13010-69 = "Não me interessa como você percebe este mundo. #nMas, se continuar achando que isso é um jogo de tabuleiro ou algo do tipo, você nunca alcançará a vitória real."
13010-70 = "……."
13010-71 = "Eu lhe darei a resposta. Para vencer aquele indivíduo……"
13010-77 = "NÃO INTERFIRA!! SEU LIXO!!!!"
13010-82 = "Você, que nem sequer conhece a \"morte\"! É sério isso!?"
13010-83 = "Você consegue entender o meu sofrimento, a minha solidão…… o meu medo!!?"
13010-84 = "Não se meta, sendo apenas um Viajante Anônimo!! Esta é a minha campanha!!"
13010-85 = "O que importa é que tipo de revelação eu conseguirei através da penitência!!"
13010-86 = "Não ouse interferir nisso, seu maldito!!!!!"
13010-91 = "Não se intrometa na minha campanha——!!!"
13010-102 = "Ha…… ha……."
13010-103 = "Vitória……? #nPor que todos são tão obcecados por isso?"
13010-104 = "O resultado já está decidido!! #nTodos nós morreremos um dia, essa é a verdade imutável!"
13010-105 = "No fim, todos estão destinados à derrota…… não é isso que importa!!"
13010-106 = "Isso mesmo…… o que importa é o processo……! #nO que eu experimento e que tipo de revelação obtenho durante esse processo — é apenas nisso que reside o significado……"
13010-107 = "Vocês ousam se autodenominar buscadores da verdade da \"Gematria\"……? #nI, isso, o nome da Gematria……!!"
13010-108 = "O nome... será arruinado, não será――！？！！！"
13010-110 = "Haa... haa..."
13010-111 = "A-a-acalme-se... preciso me acalmar..."
13010-112 = "O que devo fazer a partir de agora... p-preciso decidir..."
13010-116 = "A Gematria... foi aniquilada?"
13010-117 = "Não―― a verdadeira Gematria sou eu."
13010-118 = "Eu preciso mostrar a verdadeira forma da Gematria..."
13010-119 = "Hehe, he... b-bem. Primeiro, preciso começar conhecendo este mundo... #nUm novo códice, uma nova campanha..."
13010-120 = "Ah, sim... Então, minha busca pelo caminho começará a partir daí."
13010-122 = "……Abydos."
13010-123 = "Aquele império onde os antigos 'Mistérios' nasceram... como será que eles estão representados neste códice desta vez..."
13010-125 = "Hehe, hehehe..."
13010-130 = "Por favor, divirta-me."
13010-136 = "Olha só, Hoshino-chan!"
13010-138 = "Dizem que o antigo conselho estudantil enterrou algo incrível no 'Grande Oásis' de Abydos!!"
13010-139 = "Algo incrível, você diz?"
13010-140 = "Isso! São fogos de artifício, mas parece que contêm minerais raros..."
13010-141 = "Dizem que usaram uma tecnologia onde, ao serem estimulados, geram faíscas de plasma que colorem o céu."
13010-142 = "Tem até fogos de artifício com esse formato aqui! Não é fofo?"
13010-146 = "Parece que eles planejavam usar em um festival, mas como não funcionaram direito, jogaram o que sobrou no lago."
13010-147 = "……Entendo."
13010-148 = "Incrível, né? Jogaram fora algo que continha minerais que custam mais de 1 milhão de ienes por 100g?"
13010-149 = "Como esperado do conselho estudantil de Abydos... só elas mesmo para usar colchonetes de ginástica feitos de penas..."
13010-150 = "Bastaria 1% disso para nós, podiam ter deixado para nós... buá."
13010-151 = "……Mas aquele oásis secou há muito tempo, não foi?"
13010-152 = "Sim, é verdade."
13010-153 = "Agora é só um deserto de areia, não deveria ter nada lá."
13010-154 = "Fufufu... Hoshino-chan, você ainda tem muito o que aprender!"
13010-155 = "Isso é uma história de quando o lago ainda existia, então foi há muito tempo, né?"
13010-156 = "Ou seja...?"
13010-157 = "Ou seja, esses fogos de artifício estão... sob o oásis seco――"
13010-158 = "Eles estão enterrados lá embaixo."
13010-162 = "Você quer dizer que existem minerais raros enterrados sob o 'Grande Oásis'?"
13010-163 = "Isso mesmo!"
13010-167 = "……Yume-senpai, você tem noção do que está dizendo?"
13010-169 = "Eh...? Bem..."
13010-173 = "Não temos tempo a perder! Vamos procurar agora mesmo!!"
13010-174 = "Isso!! Era exatamente isso que eu queria dizer! ...Caça ao tesouro, começar!"
13010-175 = "Uhehe, vamos lá, Senpai!!"
13010-176 = "Sim! Com isso, nós também seremos milionárias, Hoshino-chan!"
13010-187 = "Hoshino-chan... sabe..."
13010-188 = "Não diga mais nada! Eu também estou sentindo que algo está errado!"
13010-189 = "É verdade, né? Não sou só eu... será que deveríamos parar por aqui?"
13010-190 = "V-vamos nos esforçar só mais um pouco...!"
13010-191 = "……Desculpe, Hoshino-chan. Acho que chegamos num beco sem saída."
13010-192 = "G-grrr..."
13010-194 = "Ei, Hoshino-chan... onde será que a gente errou..."
13010-195 = "Desde que a Senpai trouxe esse plano estranho, não acha?"
13010-196 = "Buá... mas a Hoshino-chan também estava animada... a culpa é minha? É isso?"
13010-197 = "……I-isso eu também sei! Não precisa dizer!"
13010-202 = "Pensando bem, acho que nem precisava ter usado roupa de banho..."
13010-203 = "Você não estava pensando em nada, não é!? #nPor que você disse para usarmos isso!"
13010-204 = "Eh, é que... eu pensei que se cavássemos o chão, talvez água subterrânea pudesse jorrar com um estrondo..."
13010-205 = "Desde quando essa probabilidade sequer existia!?"
13010-207 = "E aí a desertificação seria resolvida, e viveríamos felizes para sempre..."
13010-208 = "Não tem como isso acontecer!"
13010-209 = "Hiiin..."
13010-211 = "Hmm... preciso escrever sobre o que aconteceu hoje como uma reflexão..."
13010-212 = "Ei, espere, Senpai, o que você está escrevendo..."
13010-213 = "Por favor, pare de registrar esse tipo de vexame!"
13010-214 = "Mas é um dever como presidente do conselho estudantil... e acho que será útil para a Hoshino-chan no futuro..."
13010-215 = "Isso só tem registros de fracassos! E quem iria querer um caderno tão surrado assim! Eu vou comprar um novo!"
13010-216 = "Hiiiin..."
13010-222 = "Sala do Comitê de Contramedidas"
13010-223 = "Bem, vamos começar a reunião regular do Comitê de Contramedidas de Abydos..."
13010-224 = "...embora eu gostaria de começar, falta uma pessoa."
13010-228 = "Sim, sim! É a pessoa de sempre, né~☆"
13010-229 = "Hmm, a Hoshino-senpai não está aqui."
13010-230 = "Onde ela foi dessa vez! Ela está tirando uma soneca em algum lugar de novo?"
13010-231 = "Ela estava dormindo na sala ao lado agorinha."
13010-232 = "Então você tem que ir buscá-la, Shiroko-senpai! A reunião vai começar!"
13010-233 = "U-uh... mas é difícil acordá-la..."
13010-234 = "Por que, ela estava dormindo com aquele sorriso bobo de novo?"
13010-235 = "A Shiroko-chan é muito mole com a Hoshino-senpai, né."
13010-236 = "Vou buscá-la agora."
13010-237 = "Ah, eu também vou! Shiroko-chan."
13010-242 = "Não precisavam ir as duas, né."
13010-243 = "Ahaha... é que todas vocês adoram a Hoshino-senpai..."
13010-246 = "Hoshino-senpai, a reunião vai começar."
13010-247 = "Sim, sim, já está na hora de acordar~☆"
13010-248 = "...Ué?"
13010-255 = "Hoshino-senpai?"
13010-261 = "Você já estava acordada."
13010-262 = "...Ah."
13010-263 = "É verdade... era a reunião, né."
13010-264 = "Uhe~ desculpem, desculpem. Acho que é porque já estou ficando velha, ando esquecida ultimamente."
13010-265 = "U-uh, sim."
13010-266 = "Ué? Não vai dizer algo como 'você não é tão velha assim!'?"
13010-267 = "Vamos, vamos, vamos lá. A Ayane-chan fica assustadora quando está brava, sabe."
13010-271 = "Espere, Senpai."
13010-275 = "..."
13010-282 = "[ns] \"Estão todas aqui?\""
13010-283 = "Sim. Como todas estão presentes, gostaria de começar a reunião."
13010-284 = "Primeiro, gostaria de compartilhar que houve movimentos estranhos ao redor do distrito autônomo de Abydos recentemente."
13010-285 = "Movimentos estranhos?"
13010-286 = "Aconteceu alguma coisa?"
13010-288 = "...Sim. Acho que ainda é apenas algo para ficarmos atentas, mas..."
13010-289 = "O que houve, Ayane-chan?"
13010-290 = "Primeiro... o ponto de partida é o Grupo Kaiser."
13010-292 = "Como todas sabem, a Kaiser Corporation estava realizando escavações no deserto de Abydos até pouco tempo atrás."
13010-293 = "Nós não sabíamos o que a Kaiser estava procurando lá, mas..."
13010-297 = "Bem... no fim das contas, ficou claro o que era, não ficou?"
13010-298 = "Embora tenha acabado tudo em pedaços..."
13010-300 = "Sim. No final, o 'Navio Principal de Utnapishtim' foi destruído na estratosfera, e seus destroços ou vestígios nem sequer puderam ser encontrados."
13010-301 = "E eu acho que, no momento em que o navio foi destruído, a Kaiser perdeu o motivo para ocupar o deserto de Abydos."
13010-302 = "A Kaiser foi se retirando gradualmente do deserto, e agora ele está praticamente em ruínas."
13010-304 = "Sim. Eu vi eles se retirando da área de escavação."
13010-305 = "Nossa, que alívio! Espero que eles nunca mais voltem!"
13010-306 = "Mas isso não significa que a dívida com a Kaiser desapareceu, né..."
13010-308 = "Sim... Como a Kaiser ainda detém a dívida de Abydos, nossa situação não mudou em nada..."
13010-310 = "O presidente da Kaiser Corporation parece estar mais interessado na Torre Sanctum, que está em reconstrução, do que no deserto de Abydos..."
13010-312 = "Mas é aqui que entra o ponto principal."
13010-313 = "O ponto principal..."
13010-314 = "Sim."
13010-315 = "O que houve, Ayane-chan?"
13010-317 = "Para resumir... o Grupo Kaiser está convertendo a dívida de Abydos em títulos e pretende vendê-los no mercado de títulos."
13010-318 = "Hã, títulos...?"
13010-322 = "Mercado de títulos...? O que, o que é isso?"
13010-323 = "Eles estão transformando o direito de receber a nossa dívida em valores mobiliários e..."
13010-324 = "...Em resumo, eles estão vendendo o direito de cobrar a nossa dívida para outras pessoas."
13010-325 = "E, então, o que vai acontecer!?"
13010-326 = "Como quem comprar os títulos passará a cobrar a dívida de Abydos..."
13010-327 = "Então vamos ter que pagar a dívida para outras pessoas? Isso é bom para nós?"
13010-329 = "Isso é..."
13010-330 = "Não, isso é impossível."
13010-331 = "Hoshino-senpai...?"
13010-332 = "Negociar títulos significa que há lucro a ser obtido."
13010-333 = "Mas comprar títulos de uma escola como a nossa, que pode desaparecer a qualquer momento, é um risco alto demais."
13010-334 = "Acho que ninguém compraria os títulos de uma escola onde só cinco pessoas estão pagando a dívida."
13010-336 = "..."
13010-337 = "Isso é... verdade, mas..."
13010-339 = "Pode ser visto como a Kaiser desistindo de nós, mas isso só se houver compradores."
13010-340 = "...Bem, talvez a intenção deles seja apenas vender barato e se livrar disso."
13010-341 = "E, então, o valor que temos que pagar vai diminuir?"
13010-342 = "Não, Serika-chan. Eles só estão vendendo o direito barato, isso não afeta o valor da nossa dívida."
13010-343 = "É como comprar o direito de receber 1 milhão de ienes por 900 mil, então o valor da nossa dívida continua o mesmo."
13010-344 = "J-já entendi, não precisa explicar mais, Shiroko-senpai!"
13010-345 = "Ah, sim... desculpe."
13010-349 = "Ayane-chan. Quanto da dívida a Kaiser transformou em títulos? Com certeza não foi tudo, né?"
13010-350 = "Sim. O valor anunciado até o momento é... cerca de 45% da dívida de Abydos que a Kaiser Corporation detém."
13010-351 = "Hum... entendo..."
13010-353 = "Ah... então, se nós comprarmos barato...!?"
13010-354 = "...É verdade! Por que não compramos nós mesmas!?"
13010-356 = "Sim. Eu queria consultar vocês sobre isso..."
13010-357 = "O que acham de usarmos nossas economias para comprar os títulos quando o mercado abrir?"
13010-358 = "Boa ideia, vamos fazer isso, Ayane-chan!"
13010-359 = "Primeiro, assim como no mercado de ações, vamos observar bem as oscilações..."
13010-360 = "Sim, então..."
13010-363 = "Ah, espere..."
13010-364 = "O que houve?"
13010-365 = "A-as nossas obrigações... estão disparando!"
13010-366 = "Di-disparando!?"
13010-372 = "200% do valor das obrigações... 300%... 450%!?#nA-alguém está comprando tudo em um ritmo frenético!!"
13010-373 = "Eh, eh...??"
13010-374 = "Quem, afinal, poderia estar..."
13010-375 = "É que... são tantos, que é difícil identificar..."
13010-380 = "...Esgotou."
13010-381 = "As obrigações de Abydos... estão esgotadas..."
13010-382 = "N-não pode ser..."
13010-383 = "P-primeiro... compartilhando o que descobrimos até agora..."
13010-384 = "Quem comprou todos os derivativos de Abydos foi..."
13010-388 = "— O Grupo Nephthys, pelo que parece..."
13010-389 = "..."
13010-390 = "...!?"
13010-391 = "..."
13010-393 = "...!!"
13010-394 = "[ns] \"............!!\""
13010-398 = "Muito bem... a estratégia está completa."
13010-399 = "Vamos começar, jogador... ou melhor, Sensei... Hehe, he."
13010-401 = "Neste jogo, nós vamos perceber o verdadeiro significado da morte."
13010-410 = "Capítulo 3 do Comitê de Contramedidas"
13010-412 = "Pegadas deixadas pelo sonho"
