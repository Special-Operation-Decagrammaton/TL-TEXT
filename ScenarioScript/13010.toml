[translation]
13010-1 = "第1話;プロローグ"
13010-4 = "……ここか。"
13010-5 = "[ruby=われわれ]ゲマトリア[/ruby]から追放され埋もれてしまった――封印されし同胞よ。"
13010-7 = "くるしい……くるしい……。"
13010-8 = "お前の苦行はこれで終わりだ。#n起きよ、「地下生活者」。"
13010-9 = "……。"
13010-10 = "……この声。"
13010-11 = "「匿名の行人」、貴方ですね……。 "
13010-12 = "いや――今は「フランシス」と呼べ。"
13010-13 = "なんだっていいのです……小生には、構わないでください…… "
13010-14 = "理由が何であれ……興味はありません……ヒヒッ、ヒ……"
13010-15 = "小生はこれ以上……"
13010-18 = "――ゲマトリアが壊滅した。"
13010-19 = "……。 "
13010-20 = "それはどういう……？"
13010-22 = "ゲマトリアはもう存在しない。解体、もしくは解散と見ていいだろう。"
13010-23 = "……原因は1つ。"
13010-24 = "シャーレの[USERNAME]先生という存在が居たからだ。あの者が、因果とジャンルを捻じ曲げた。 "
13010-25 = "今あの者を相手するのは――"
13010-26 = "しっ！……静かに。 "
13010-31 = "ふむ……。 "
13010-32 = "なるほど……[ruby=コデックス]「RULE BOOK」[/ruby]が更新されたのですね？"
13010-40 = "新しい世界……ええ、感じます。#nこの世界の異物感を……"
13010-41 = "書が変更されルールが変わったのなら、これは……また新しい[ruby=・   ・   ・   ・   ・   ・]キャンペーン[/ruby]が始まったということで……。"
13010-42 = "そ、そう、ですか……ヒヒッ、ヒ！……ならば話は変わります。 "
13010-43 = "こ、今度の書は……！小生に、どんな気付きを与えてくれるのでしょう。 "
13010-44 = "どれ、どれ……[USERNAME]と言いましたか……？ "
13010-45 = "この者が、キャンペーンのボス……？"
13010-46 = "新しい[ruby=コデックス]「RULE BOOK」[/ruby]は――"
13010-52 = "学園都市……"
13010-58 = "それに、先生？ "
13010-60 = "ン、ンン……？こ、これは！思ったよりも難易度がた、高いじゃありませんか……！"
13010-64 = "し、しかし、万物に攻略法は存在する……！どれ、どれ……盲点、弱点……欠点……何だっていい……！"
13010-65 = "あの者を見くびるな、地下生活者。 "
13010-69 = "お前がこの世界をどう認識しているかなど、興味はない。#nしかし、いつまでもボードゲームかなんかだと思っていては、正しい勝利にはたどり着けないだろう。"
13010-70 = "……。"
13010-71 = "私が答えを教えてやろう。あの者に勝利するためには……"
13010-77 = "邪魔をするなァアッ！！クズがッッ！！！！"
13010-82 = "「死」を知らない貴様ごときがア！ええッッ！？ "
13010-83 = "小生の苦しみ、孤独を……恐怖を、理解できるのかア！！？"
13010-84 = "匿名の行人のクセに出しゃばるなァッ！！これは小生のキャンペーン！！ "
13010-85 = "苦行を通じて、小生が、どんな気付きを得られるかがッ、それが重要なんだよォ！！"
13010-86 = "それを貴様がッ、邪魔をするんじゃねぇえッッ！！！！！"
13010-91 = "小生のキャンペーンに、割り込むなァ――！！！"
13010-102 = "ハァ……ハァ……。"
13010-103 = "勝利ィ……？#n何故にみな、そんなものに執着する？"
13010-104 = "結果はすでに決まっている！！#n我々はいつか死ぬ、それは不変の真理！ "
13010-105 = "結局はみな敗北する運命……大事なのはそれじゃねぇのさ！！"
13010-106 = "そうだ……大事なのは過程……！#nその過程で、小生が何を経験し、気付きを得られるか――ただそのことに意味がある……"
13010-107 = "貴様らごときが、「ゲマトリア」という崇高なる求道を名乗るぅ……？#nそ、そんなの、ゲマトリアの名が……！！"
13010-108 = "名が、廃るだろうが――！？！！！"
13010-110 = "ハァ……ハァ……"
13010-111 = "お、お、落ち着くのだ……落ち着かねば……"
13010-112 = "これから何をすべきか……き、決めなくては…… "
13010-116 = "ゲマトリアが……壊滅？"
13010-117 = "いや――本当のゲマトリアはこの小生。"
13010-118 = "小生が、ゲマトリアの真の姿を見せてやらねば……"
13010-119 = "ヒヒッ、ヒ……い、いいだろう。まずはこの世界を、知ることから始めなくては……#n新しいコデックス、新しいキャンペーン…… "
13010-120 = "アア、そう……。ならば小生の求道は[ruby=・   ・   ・   ・]そこから[/ruby]始めよう。"
13010-122 = "……アビドス。"
13010-123 = "太古の「神秘」らが誕生したあの帝国……果たして、今回のコデックスではどんな形になっているものか……"
13010-125 = "ヒヒッ、ヒヒッ……。"
13010-130 = "どうか、小生を愉しませてくださいね。"
13010-136 = "見て見て、ホシノちゃん！"
13010-138 = "昔の生徒会が、アビドスの「大オアシス」にすっごいものを埋めたらしいの！！"
13010-139 = "すごいもの、ですか？"
13010-140 = "そう！花火なんだけど、希少鉱物が入った花火らしくて……"
13010-141 = "これに刺激を与えると、プラズマになった火花が発生して空を彩る――っていう技術が使われてるんだって。"
13010-142 = "こ～んな形の花火もあるんだよっ！かわいいよね～！"
13010-146 = "元々はお祭りの時に使う予定だったらしいんだけど、なぜかうまく動かなくて余ったのを湖に捨てたんだって。"
13010-147 = "……なるほど。 "
13010-148 = "すごいよね、100gで100万円以上もする鉱物が入った物を捨てちゃうんだよ？"
13010-149 = "さすがはアビドス生徒会……羽毛の体操マットを使う方々なだけあるよね……。"
13010-150 = "その100分の1でいいから、私たちに残してくれてもよかったのに……ひぃん。"
13010-151 = "……でも、そのオアシスはとっくの前に干からびたじゃないですか。 "
13010-152 = "うん、そうなんだよね。"
13010-153 = "今はただの砂原で、そんなのどこにもなかったはず。"
13010-154 = "ふっふっふ……ホシノちゃんはまだまだだね！"
13010-155 = "これは湖があった頃の話だから、かなり昔のことでしょ？"
13010-156 = "つまり……？ "
13010-157 = "つまり、その花火は……干からびたオアシス――"
13010-158 = "あの下に存在するってこと。"
13010-162 = "「大オアシス」の下に希少鉱物が埋まってる、ってことですか？"
13010-163 = "そっ！ "
13010-167 = "……ユメ先輩は、自分がいま何を言っているのか分かってますか？"
13010-169 = "えっ……？その……。"
13010-173 = "こうしてる場合じゃないですよ！今すぐ探しに行きますよ！！"
13010-174 = "そう！！私もそれを言いたかったの！……お宝探し、スタートっ！ "
13010-175 = "うへへ、行きましょう先輩！！"
13010-176 = "うん！これで私たちも大富豪だよ、ホシノちゃん！ "
13010-187 = "ホシノちゃん……あのね……。"
13010-188 = "それ以上言わないでください！私も薄々感じてるんですから！"
13010-189 = "そうだよね？私だけじゃないよね……？そろそろ止めるべき？"
13010-190 = "も、もうちょっと頑張ってから……！ "
13010-191 = "……ごめんねホシノちゃん。これは詰んじゃったよー。"
13010-192 = "く、くうっ……。"
13010-194 = "ねえ、ホシノちゃん……私たち、どこから間違えたんだろ……。"
13010-195 = "先輩が変な計画を持ち込んだ時から、じゃないですかね。"
13010-196 = "ひぃん……ホシノちゃんも喜んでたのに……私のせい？そうなの？"
13010-197 = "……そ、それは私だって知ってますから！言わないでくださいよ！"
13010-202 = "今思えば、水着を着る必要もなかった気がするし……"
13010-203 = "やっぱ何も考えてなかったんですね！？#nなんで着ようって言ったんですか！"
13010-204 = "え、だってぇ……地面を掘ってたらドカーンって地下水が湧き出るかも、と思って…… "
13010-205 = "そもそもそんな確率、存在しました！？ "
13010-207 = "それで砂漠化も解決して、めでたしめでたし～って……"
13010-208 = "そんなわけないでしょ！"
13010-209 = "ひぃん……。 "
13010-211 = "んー……反省として今日の出来事を書いておかないと……。"
13010-212 = "ちょ、ちょっと先輩、何を書いて…… "
13010-213 = "こんな失態の記録とかやめてくださいよ！"
13010-214 = "でも、生徒会長としての義務というかさ……後々ホシノちゃんの役にも立つと思うし……"
13010-215 = "それ、失敗の記録しかないでしょ！というかそんなボロい手帳誰が貰うかっ！私は新しいヤツ買いますからね！"
13010-216 = "ひぃぃん……。"
13010-222 = "対策委員会・教室"
13010-223 = "それでは、アビドス対策委員会の定例会議を……"
13010-224 = "……始めたいところですが、1人見当たりませんね。 "
13010-228 = "うんうん！いつもの人ですね～☆"
13010-229 = "ん、ホシノ先輩がいない。"
13010-230 = "今度はどこに行ったのよ！またどっかで昼寝でもしてるの？"
13010-231 = "さっき、隣の教室で寝てたよ。"
13010-232 = "なら連れて来ないとでしょシロコ先輩！会議始まるんだから！"
13010-233 = "う、うん……でも、起こしづらくて……。"
13010-234 = "何でよ、またニヤニヤしながら寝てたから？ "
13010-235 = "シロコちゃんはホシノ先輩に甘いですからね。 "
13010-236 = "今連れてくる。 "
13010-237 = "あっ、私も行きます！シロコちゃん。"
13010-242 = "だからって二人して行かなくてもいいじゃない。 "
13010-243 = "あはは……みなさん、ホシノ先輩が大好きですからね……。"
13010-246 = "ホシノ先輩、会議始まるよ。"
13010-247 = "うんうん、そろそろ起きる時間ですよ～☆ "
13010-248 = "……あれ？"
13010-255 = "ホシノ先輩？"
13010-261 = "起きてたんだ。"
13010-262 = "……あっ。 "
13010-263 = "そうだ……会議だったよね。 "
13010-264 = "うへ～ごめんごめん。おじさんももう歳だからか、最近忘れっぽくて。 "
13010-265 = "う、うん。 "
13010-266 = "あれ？そんなに歳変わらないでしょ！とかいうツッコミはなし？"
13010-267 = "ほらほら、行くよ～。アヤネちゃん、怒ると怖いからね。 "
13010-271 = "待って先輩。"
13010-275 = "……。"
13010-282 = "[ns] \"みんな揃ってる？\""
13010-283 = "はい。それでは全員揃ったので、会議を始めたいと思います。"
13010-284 = "まず、この頃アビドス自治区周りで不自然な動向があったので、共有します。 "
13010-285 = "不自然な動向？"
13010-286 = "何かありましたか？"
13010-288 = "……はい。まだ要注意程度のことだとは思いますが……。"
13010-289 = "どうしたんですか、アヤネちゃん？"
13010-290 = "まず……発端は、カイザーグループです。"
13010-292 = "みなさんご存じの通り、カイザーコーポレーションは最近までアビドス砂漠で発掘を行なっていました。"
13010-293 = "カイザーがそこで何を探しているのか、私たちは分かっていませんでしたが……"
13010-297 = "まあ……結局そういうことだったって、明らかになったわね。 "
13010-298 = "バラバラになってしまいましたけどね……。"
13010-300 = "はい。結局「ウトナピシュティムの本船」は成層圏で破壊され、その残骸や痕跡は発見さえできませんでした。"
13010-301 = "そしてカイザーは、その船が破壊された時点でアビドス砂漠を占拠する理由がなくなったんだと思います。"
13010-302 = "カイザーは砂漠から徐々に撤退していき、今はもう廃墟同然です。"
13010-304 = "うん。発掘区域から撤退するのを見た。"
13010-305 = "本当スッキリしたんだからあれ！もう絶対二度と来ないでよね！"
13010-306 = "でも、カイザーへの借金がなくなったわけじゃないんですよね……。"
13010-308 = "はい……アビドスの借金自体はカイザーが握っているので、私たちの状況は何も変わりません……。"
13010-310 = "カイザーコーポレーションのプレジデントは、アビドス砂漠よりも再建中のサンクトゥムタワーに興味を持っているようですし……。"
13010-312 = "ですが、ここからが本題です。"
13010-313 = "本題……。 "
13010-314 = "うん。"
13010-315 = "どうしたんですか、アヤネちゃん？"
13010-317 = "結論から言いますと……カイザーグループは、アビドスの借金を債権に切り替え、債券市場に売ろうとしています。"
13010-318 = "えっ、債権ですか……？"
13010-322 = "債券市場……？って、な、何よそれ？"
13010-323 = "私たちから借金を受け取る権利を、有価証券にして――"
13010-324 = "……要は、私たちから借金を受け取る権利を他の人に売るってこと。"
13010-325 = "えっ、じゃあ何がどうなるの！？ "
13010-326 = "債権を買った人がアビドスから借金を受け取るので……"
13010-327 = "これから他の人に借金を返すってこと？それって私たちにとって吉なの？"
13010-329 = "それは……。"
13010-330 = "いや、それはあり得ない。"
13010-331 = "ホシノ先輩……？"
13010-332 = "債権を取引するってことは、利益を見出せるということ。"
13010-333 = "でも、こんな……いつ無くなってもおかしくない学校の債権を買い入れるなんて、ハイリスクでしかない。"
13010-334 = "5人で借金を返してるような学校の債権を買う人なんて居ないと思うよ。"
13010-336 = "……。 "
13010-337 = "それは……そうですが……。"
13010-339 = "カイザーが私たちから完全に手を引くとも捉えられるけど、それも買い手が居た場合の話。"
13010-340 = "……まあ、安く売り払っちゃおうっていう魂胆かもね。 "
13010-341 = "じゃ、じゃあ、私たちが返済する額も減るの？"
13010-342 = "ううん、セリカちゃん。権利を安く売るだけで、私たちの借金に影響はないよ。"
13010-343 = "100万円受け取る権利を90万円で買うってことだから、私たちの借金の額はそのまま。"
13010-344 = "そ、それ以上説明しなくても分かったから、シロコ先輩！ "
13010-345 = "う、うん……ごめん。"
13010-349 = "アヤネちゃん。カイザーはどのくらい債権に変えたんだろ？きっと全部ではないよね。"
13010-350 = "はい。現時点で公表された額は……カイザーコーポレーションが保有中の、アビドスの負債約45%です。"
13010-351 = "ふむ……なるほどね……。"
13010-353 = "あ……それなら私たちが安く買ってしまえば……！？"
13010-354 = "……そうね！？私たちが買っちゃえばいいじゃない！ "
13010-356 = "はい。私もその件でみなさんにご相談したいと思い…… "
13010-357 = "債券市場が開かれたら、私たちの貯蓄で買い入れるのはどうかなと。"
13010-358 = "いいね、やっちゃおうアヤネちゃん！"
13010-359 = "まずは株式市場同様、騰落をよく見て……。"
13010-360 = "はい、それでは――"
13010-363 = "あ、あれ……？"
13010-364 = "どうしたの？"
13010-365 = "わ、私たちの債券が……暴騰しています！"
13010-366 = "ぼ、暴騰！？"
13010-372 = "債券の額の200%……300%……450%！？#nだ、誰かがすごい勢いで買い占めてます！！"
13010-373 = "え、えっ……？？"
13010-374 = "いったい、誰が……！？"
13010-375 = "それが……すごい数で、特定は難しく……。 "
13010-380 = "……売り切れ、ました。 "
13010-381 = "アビドスの債権……完売です……。 "
13010-382 = "そ、そんな……。 "
13010-383 = "ま、まず……今分かったことを共有しますと……"
13010-384 = "アビドスの派生証券を買い占めたのは―― "
13010-388 = "――ネフティスグループ、だそうです……。 "
13010-389 = "……。"
13010-390 = "……！？"
13010-391 = "……。"
13010-393 = "……！！"
13010-394 = "[ns] \"…………！！\""
13010-398 = "さあ……攻略法が完成した。"
13010-399 = "始めようか、プレイヤー……いや、先生よ……ヒヒッ、ヒ。"
13010-401 = "我々は今回のゲームで、死の深意に気付くだろう。"
13010-410 = "対策委員会編3章"
13010-412 = "夢が残した足跡"
