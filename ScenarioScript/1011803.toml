[translation]
1011803-1 = "「可愛い」は意外なところに"
1011803-2 = "コンコーン。"
1011803-3 = "やっほ、先生。"
1011803-4 = "[s1] \"こんにちは、ノゾミ。\"\n[s2] \"面倒な話って？\""
1011803-7 = "んー、まぁ、そんな面倒ではないんだけど。#n見た方が早いよ。"
1011803-8 = "はい、これ。"
1011803-9 = "[s] \"これは……？\""
1011803-14 = "こいつは「シュッポ」。行政委員会の新しいマスコットなんだってさ。"
1011803-15 = "デザインコンテストで入賞したとかなんとか……。"
1011803-16 = "グッズがちょー余ってるし、あんま人気ないみたいだけど。"
1011803-17 = "[s] \"これを届けに来てくれたの？\""
1011803-18 = "こいつ、私らの制服着てるじゃん？"
1011803-19 = "学園の知名度アップのために、シャーレに持ってけって言われたんだよ。"
1011803-20 = "……って先生、もしかして気に入ったの？"
1011803-21 = "[s] \"可愛いもの、好きだからね。\""
1011803-22 = "へぇ？こういうのが好きなんだ？パヒャヒャッ。"
1011803-23 = "私はあんまピンと来ないんだよね。"
1011803-24 = "まわりで流行ってても、ふーんって感じ。"
1011803-25 = "そもそも、可愛いとか思ったことないかも？"
1011803-26 = "うーん、正直どっちでもいいというか？"
1011803-27 = "[s] \"なるほど……！\""
1011803-31 = "[ns] \"ちょっと待ってて！\""
1011803-36 = "[ns] \"これとかどう？\""
1011803-37 = "何これ。"
1011803-38 = "[s] \"この前取ったぬいぐるみ！\""
1011803-39 = "そうなんだ。"
1011803-43 = "[ns3] \"反応薄っ！\"\n[ns4] \"え、えっと……そうしたら……\""
1011803-49 = "[ns] \"これとかどう？\""
1011803-50 = "ちょっとグロくない？"
1011803-51 = "[ns5] \"こ、この大怪獣オルテガノスが！？！？\"\n[ns6] \"そんなっ……！！\""
1011803-54 = "先生はそういうのが好きなの？"
1011803-55 = "……他のみんなも？"
1011803-56 = "パヒャッ、わっかんないな～。"
1011803-57 = "[s] \"きっと、ノゾミが気になるものがあるはず……！\""
1011803-59 = "（その後もあらゆるキャラグッズを見せたが……）"
1011803-67 = "（どれもノゾミには響かないようだった……）"
1011803-70 = "[ns] \"こ、これなら……どう……？\""
1011803-72 = "くくっ！"
1011803-73 = "[ns7] \"おおっ。\"\n[ns8] \"気に入った？\""
1011803-76 = "ぷっ、くくっ……！そうじゃなくってさ。"
1011803-80 = "先生、大人のくせにさ……。"
1011803-81 = "超必死こいてるっしょ？"
1011803-82 = "それが……なんか……ぷぷっ。"
1011803-83 = "可愛かったかも。"
1011803-84 = "[ns] \"ええっ……！？\""
1011803-85 = "パヒャヒャッ！だってほんとにそうなんだもん！"
1011803-86 = "[ns] \"……。\""
1011803-88 = "（ちょっと恥ずかしくなり、背を向けた）"
1011803-89 = "ぷぷっ……あれー？先生照れちゃったのー？"
1011803-90 = "可愛いって言わせたかったんじゃないのぉ？"
1011803-96 = "えー、先生が可愛いんじゃダメぇ～？"
1011803-97 = "[s] \"うぎぎ……！\""
1011803-99 = "（ひとしきりからかった後、ノゾミは満足気に帰っていった）"
