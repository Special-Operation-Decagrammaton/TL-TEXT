[translation]
1011803-1 = "\"Fofo\" vem de lugares inesperados"

1011803-2 = "Concórnio."
1011803-3 = "Yaho, sensei."
1011803-4 = "[s1] \"Olá, Nozomi.\"\n[s2] \"Qual é o problema?\""
1011803-7 = "Hmm, bem, não é tão problemático. #nSeria mais rápido ver."
1011803-8 = "Sim, isso."
1011803-9 = "[s] \"Isso é...?\""
1011803-14 = "Este é \"Shuppo\". É o novo mascote do comitê administrativo."

1011803-15 = "Acho que ganhei um prêmio em um concurso de design ou algo assim..."
1011803-16 = "Tenho um pouco de mercadoria que sobrou e não parece ser muito popular."
1011803-17 = "[s] \"Você veio entregar isso?\""
1011803-18 = "Esse cara está usando nosso uniforme, certo?"
1011803-19 = "Pediram-me para colocá-lo em uma placa de Petri para aumentar a popularidade da escola."
1011803-20 = "...Você gostou, sensei?"
1011803-21 = "[s] \"Porque eu gosto de coisas fofas.\"\"\n1011803-22 = \"Huh? Você gosta desse tipo de coisa? Pahyaahah.\"\n1011803-23 = \"Eu realmente não entendo.\"\n1011803-24 = \"Mesmo que seja popular perto de você, é tipo, hmmm.\"\n1011803-25 = \"Talvez você nunca tenha se considerado fofo em primeiro lugar?\"\n1011803-26 = \"Hmm, honestamente, eu não me importo de qualquer maneira.\"\n1011803-27 = \"[s] \"Entendo...!\"\"\n1011803-31 = \"[ns] \"Espere um minuto!\""

1011803-36 = "[ns] \"Que tal isso?\""
1011803-37 = "O que é isso?"
1011803-38 = "[s] \"O bichinho de pelúcia que peguei outro dia!\""
1011803-39 = "Isso mesmo."
1011803-43 = "[ns3] \"A reação é fraca!\"\n[ns4] \"Uh, uh...então...\""
1011803-49 = "[ns] \"Que tal isso?\""
1011803-50 = "Não é um pouco nojento?"
1011803-51 = "[ns5] \"Esse monstro gigante Orteganos!?!?\"\n[ns6] \"É isso aí...!!\""
1011803-54 = "O sensei gosta disso?"
1011803-55 = "...e todos os outros?"
1011803-56 = "Pah, eu não sei."
1011803-57 = "[s] \"Deve haver algo em que Nozomi esteja interessado...!\""
1011803-59 = "(Depois disso, mostrei todos os tipos de bens de personagem...)"
1011803-67 = "(Nada disso pareceu ressoar em Nozomi...)"
1011803-70 = "[ns] \"C-que tal isso...?\""
1011803-72 = "Kuku!"
1011803-73 = "[ns7] \"Ah.\"\n[ns8] \"Você gostou?\""
1011803-76 = "Puu, kukku…! Não é isso."
1011803-80 = "Sensei, mesmo sendo adulto..."
1011803-81 = "Você está super desesperado, não está?"
1011803-82 = "Isso é... tipo... cachorrinho."
1011803-83 = "Pode ter sido fofo."
1011803-84 = "[ns] \"Eh...!?\""
1011803-85 = "Pahiahah! Porque realmente é!"
1011803-86 = "[ns] \"…….\""
1011803-88 = "(me senti um pouco envergonhado e me afastei)"
1011803-89 = "Pupu... Hein? Sensei, você está com vergonha?"
1011803-90 = "Você não quer que eu diga que você é fofo?"
1011803-96 = "Bem, não adianta se o sensei for fofo, certo?"
1011803-97 = "[s] \"Ugigi...!\""
1011803-99 = "(Depois de provocá-la por um tempo, Nozomi voltou para casa satisfeita.)"
