[translation]
1011205-1 = "思いがけない出会い"
1011205-3 = "（外仕事を終えた帰り道……）"
1011205-10 = "[ns] \"……。\""
1011205-14 = "（アスナのモモトークを思い出して、辺りを見回してしまう）"
1011205-18 = "[ns] \"いないか……。\""
1011205-24 = "[ns] \"……。\""
1011205-34 = "[ns] \"さすがに偶然も続かないか。\""
1011205-39 = "あっ、先生だ！"
1011205-40 = "[s] \"って、アスナ！？\""
1011205-41 = "わぁ、先生だ！#nまた会えたね！"
1011205-42 = "あははっ！#nもしかして運命じゃない？"
1011205-43 = "アスナ、何となくこっちに行けば先生に会える気がしたんだ！"
1011205-44 = "来てみたら、本当にいてビックリしたよ！"
1011205-45 = "[s] \"私も驚いたよ……。\""
1011205-46 = "えへへ、一緒だね。"
1011205-47 = "なになに、アスナの居場所を知るために紐でも結んでおきたい、って？"
1011205-48 = "あははっ、ワンちゃんみたい！"
1011205-49 = "[ns1] \"例え話だよ。\"\n[ns2] \"冗談だからね？\""
1011205-53 = "紐ならここにあるよ！"
1011205-58 = "[ns] \"そ、それは制服のリボンじゃないの……？\""
1011205-66 = "[wa:540]― [log=아스나 교복]じゃーん！[wa:1000]先生とアスナが、[wa:1170]繋がっちゃいました！[/log]"
1011205-69 = "[wa:40]― [log=아스나 교복]どう？[/log]"
1011205-71 = "― [log=아스나 교복]これなら[wa:230]どこにいるのか、[wa:750]分かるんじゃない？[/log]"
1011205-74 = "[wa:1900]― [log=아스나 교복]……どうしたの？[wa:1000]そんな顔して。[/log]"
1011205-77 = "― [log=아스나 교복]ん？[wa:1000]逆、[wa:790]だっけ？[wa:1210]私に巻いたほうが[wa:770]よかった？[/log]"
1011205-80 = "[ns3] \"そういう問題じゃ……。\"\n[ns4] \"犬の散歩みたいだね……。\""
1011205-81 = "[wa:830]― [log=아스나 교복]……あれ？[wa:1390]……あ、[wa:970]ああ！[wa:830]たしかに！[/log]"
1011205-82 = "[wa:830]― [log=아스나 교복]……あれ？[wa:1390]……あ、[wa:970]ああ！[wa:830]たしかに！[/log]"
1011205-85 = "― [log=아스나 교복]……あはっ、[wa:780]あははは！[wa:1190]ヘンなの！[/log]"
1011205-88 = "[wa:430]― [log=아스나 교복]これ、[wa:370]ほんとに…[/log]"
1011205-91 = "― [log=아스나 교복]ワンちゃんと[wa:500]散歩してるみたい！[/log]"
1011205-94 = "[wa:650]― [log=아스나 교복]じゃあ……[wa:1130]今の先生は、[wa:1610]アスナのワンちゃんだね？[/log]"
1011205-97 = "― [log=아스나 교복]アスナのワンちゃんは、[/log]"
1011205-99 = "― [log=아스나 교복]ワンワンって[wa:880]言えるかな？[/log]"
1011205-102 = "― [log=아스나 교복]ふふっ！[/log]"
1011205-104 = "― [log=아스나 교복]ちゃんと言えたら[wa:620]ご褒美あげるから、[wa:1380]ね？[/log]"
1011205-109 = "ふんふん～お散歩お散歩。"
1011205-113 = "[ns5] \"その、アスナ……。\"\n[ns6] \"悪いことをしてるわけじゃないんだけどさ……。\""
1011205-116 = "[ns] \"もし誰かに見られたら……。\""
1011205-117 = "あ、たしかに。"
1011205-121 = "誤解されちゃうか。"
1011205-122 = "[s] \"分かってくれて良かったよ。\""
1011205-123 = "うん、先生はワンちゃんじゃないもんね。"
1011205-124 = "じゃあ、散歩はおしまい～。"
1011205-128 = "あはは、楽しかったね！"
1011205-129 = "ならこのリボンも……。"
1011205-133 = "[ns] \"アスナ……？\""
1011205-137 = "えーっと、どうやって結ぶんだっけ？"
1011205-138 = "あはは、忘れちゃった！"
1011205-139 = "先生、結び方分かる？"
1011205-140 = "[s] \"もちろん知ってるよ。\""
1011205-141 = "なら、これ代わりに結んで！"
1011205-142 = "[s] \"えっ？\""
1011205-146 = "お願い！"
1011205-147 = "ほら、早く早く！"
1011205-150 = "[ns] \"う、動かないでね……？\""
1011205-153 = "（次から自分で結べるように、やり方も教えてあげた……）"
