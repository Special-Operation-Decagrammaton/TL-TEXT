[translation]
1011205-1 = "Um encontro inesperado"

1011205-3 = "(No caminho para casa depois do trabalho...)"

1011205-10 = "[ns] \"…….\""

1011205-14 = "(Lembrando-se do Momo Talk de Asuna, ela olha em volta)"

1011205-18 = "[ns] \"Não existe...\""

1011205-24 = "[ns] \"…….\""

1011205-34 = "[ns] \"A coincidência continua acontecendo.\""

1011205-39 = "Ah, é o Sensei!"

1011205-40 = "[s] \"O quê, Asuna!?\""

1011205-41 = "Uau, é o Sensei! #nVejo você de novo!"

1011205-42 = "Ahaha! #nTalvez seja o destino?"

1011205-43 = "Asuna, de alguma forma eu senti que se fosse por aqui, poderia encontrar o Sensei!"

1011205-44 = "Quando cheguei, fiquei surpreso que fosse real!"

1011205-45 = "[s] \"Eu também fiquei surpreso...\""

1011205-46 = "Ehehe, estou com você."

1011205-47 = "Por que, você quer amarrar um barbante em Asuna para descobrir onde ela está?"

1011205-48 = "Ahaha, parece um cachorro!"

1011205-49 = "[ns1] \"É uma analogia.\"\n[ns2] \"Você está brincando, certo?\""

1011205-53 = "A corda está aqui!"

1011205-58 = "[ns] \"E-Essa não é a fita do uniforme...?\""

1011205-66 = "[wa:540]― [log=아스나 교복]じゃーん！[wa:1000]先生とアスナが、[wa:1170]繋がっちゃいました！[/log]"
1011205-69 = "[wa:40]― [log=아스나 교복]どう？[/log]"
1011205-71 = "― [log=아스나 교복]Com isso, você pode [wa:230]saber onde está [wa:750], certo? [/registro]"

1011205-74 = "[wa:1900]― [log=아스나 교복]……どうしたの？[wa:1000]そんな顔して。[/log]"
1011205-77 = "― [log=아스나 교복]Hmm? [wa:1000] Foi o contrário, [wa:790]? [wa:1210]Foi melhor [wa:770] envolver-me com isso? [/registro]"

1011205-80 = "[ns3] \"Esse é o problema...\"\n[ns4] \"É como passear com o cachorro...\""

1011205-81 = "[wa:830]― [log=아스나 교복]……あれ？[wa:1390]……あ、[wa:970]ああ！[wa:830]たしかに！[/log]"
1011205-82 = "[wa:830]― [log=아스나 교복]……あれ？[wa:1390]……あ、[wa:970]ああ！[wa:830]たしかに！[/log]"
1011205-85 = "― [log=아스나 교복]...Aha, [wa:780]Ahahaha! [wa:1190]Isso é estranho! [/registro]"

1011205-88 = "[wa:430]― [log=아스나 교복]これ、[wa:370]ほんとに…[/log]"
1011205-91 = "― [log=아스나 교복]É como passear com seu cachorro [wa:500]! [/registro]"

1011205-94 = "[wa:650]― [log=아스나 교복]じゃあ……[wa:1130]今の先生は、[wa:1610]アスナのワンちゃんだね？[/log]"
1011205-97 = "― [log=아스나 교복]O cachorro da Asuna é[/log]"

1011205-99 = "― [log=아스나 교복]Você pode dizer wan wan [wa:880]? [/registro]"

1011205-102 = "― [log=아스나 교복]Hehe! [/registro]"

1011205-104 = "― [log=아스나 교복]Se você disser direito, eu recompensarei você [wa:620], [wa:1380], certo? [/registro]"

1011205-109 = "Hmph ~ Uma caminhada, uma caminhada."

1011205-113 = "[ns5] \"Hum, Asuna...\"\n[ns6] \"Não estou fazendo nada de ruim...\""

1011205-116 = "[ns] \"Se alguém me ver...\""

1011205-117 = "Ah, certamente."

1011205-121 = "Serei mal interpretado?"

1011205-122 = "[s] \"Que bom que você entendeu.\""

1011205-123 = "Sim, o Sensei não é um cachorro."

1011205-124 = "Pois bem, a caminhada acabou."

1011205-128 = "Haha, isso foi divertido!"

1011205-129 = "Então essa fita também..."

1011205-133 = "[ns] \"Asuna...?\""

1011205-137 = "Bem, como faço para amarrá-lo?"

1011205-138 = "Haha, esqueci!"

1011205-139 = "Sensei, você sabe amarrar?"

1011205-140 = "[s] \"Claro que sei.\""

1011205-141 = "Se sim, amarre isso!"

1011205-142 = "[s] \"Hein?\""

1011205-146 = "por favor!"

1011205-147 = "Vamos, apresse-se!"

1011205-150 = "[ns] \"Uh, não se mova...?\""

1011205-153 = "(Eu também ensinei como fazer para você mesmo amarrar na próxima vez...)"

