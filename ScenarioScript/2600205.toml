[translation]
2600205-1 = "O desejo de superar isso"
2600205-2 = "（Antes de ir ao refeitório, discutimos e decidimos o menu do que iríamos cozinhar）"
2600205-3 = "（O menu desta vez é sopa de missô com carne de porco）"
2600205-4 = "Ufa..."
2600205-5 = "[s] \"Está nervosa?\""
2600205-6 = "Talvez eu esteja... Toda vez que falho na cozinha, eu me pergunto qual seria a causa..."
2600205-7 = "Eu apenas ficava me debatendo sozinha, mas nunca tinha pensado em uma abordagem tão sólida como esta."
2600205-8 = "Mas, se estiver com o Sensei..."
2600205-9 = "Talvez eu consiga descobrir a causa e seguir em frente na culinária sem falhar mais!"
2600205-11 = "Então, primeiro, vamos começar preparando os ingredientes..."
2600205-12 = "[s] \"Espere, vamos confirmar algumas coisas antes de começar a cozinhar.\""
2600205-13 = "Confirmar, você diz?"
2600205-14 = "[s] \"Sim, pelo menos por hoje...\""
2600205-16 = "[s1] \"Não use utensílios que não estejam na receita.\"\n[s2] \"Não use ingredientes que não estejam na receita.\"\n[s3] \"Não tente métodos de preparo que não estejam na receita, ok?\""
2600205-17 = "En-entendido..."
2600205-18 = "En-entendido..."
2600205-19 = "En-entendido..."
2600205-20 = "Desta vez, o foco não é a eficiência, mas sim concentrar-se no experimento, certo?"
2600205-21 = "[s] \"Então você sempre fazia aquelas coisas por causa da eficiência...\""
2600205-22 = "Decidi seguir o Sensei desta vez."
2600205-23 = "Vou tentar fazer exatamente como está escrito na receita!"
2600205-25 = "（Como resultado de tentar fazer a sopa de porco com a Juri desse jeito...）"
2600205-28 = "Está pronto, Sensei!"
2600205-29 = "[s] \"Certo, bom trabalho. Então, vou começar a comer...\""
2600205-30 = "Gulp..."
2600205-38 = "[ns] \"I-isso é...!\""
2600205-39 = "Co-como está!?"
2600205-40 = "[s4] \"É azedo, salgado, doce e apimentado...?\"\n[s5] \"É a primeira vez que tomo uma sopa de porco assim...\""
2600205-41 = "Hã!?"
2600205-42 = "Hã!?"
2600205-43 = "Po-por que será...!?"
2600205-44 = "[s] \"Hmm... vamos mudar as condições!\""
2600205-45 = "（Desta vez, decidimos não usar os ingredientes que a Juri trouxe, mas sim ingredientes preparados do zero）"
2600205-46 = "Talvez o problema sejam os ingredientes que eu trouxe, então..."
2600205-47 = "Desta vez, usaremos o que o Sensei comprou... é isso, né?"
2600205-48 = "Então..."
2600205-49 = "Vou tentar fazer de novo!"
2600205-52 = "Es-está pronto!"
2600205-53 = "[s] \"Então, vou começar a comer...\""
2600205-60 = "Co-como está...?"
2600205-61 = "[s] \"É apimentado, doce, salgado e azedo...\""
2600205-62 = "Po-por que...!?"
2600205-63 = "[s] \"Próximo! Vamos mudar o método!\""
2600205-64 = "E-e agora, como faremos...!?"
2600205-65 = "（Desta vez, provamos o sabor durante o processo e fizemos ajustes enquanto cozinhávamos）"
2600205-66 = "[s] \"Com este método...!\""
2600205-70 = "[ns] \"Está extremamente salgado!?\""
2600205-71 = "（Baque!）"
2600205-72 = "[s] \"Próximo...!\""
2600205-73 = "（Desta vez, eu mesma comecei a preparar o prato e deixei a Juri finalizar）"
2600205-78 = "[ns] \"Idem.\""
2600205-80 = "（Depois disso, tentei várias vezes, mas a comida que a Juri fazia sempre ficava com um gosto estranho）"
2600205-81 = "（Mesmo seguindo a receita à risca, bastava a Juri colocar a concha na panela no último passo para o sabor se tornar algo inacreditável）"
2600205-82 = "[s] \"……Isso já é um milagre divino.\""
2600205-83 = "Uuu……."
2600205-84 = "Waaaaaah! Eu não fico feliz com milagres divinos!～"
2600205-85 = "Eu só, eu……."
2600205-86 = "Eu só queria conseguir cozinhar sem falhar!～"
2600205-87 = "[s] \"Hmm…….\""
2600205-88 = "Depois de tanto esforço……."
2600205-89 = "Depois de tanto esforço para o Sensei vir me ajudar, eu……."
2600205-90 = "Embora falhar seja algo comum para mim,"
2600205-91 = "hoje, mesmo com o Sensei aqui……."
2600205-92 = "Eu queria descobrir a causa,"
2600205-93 = "e mostrar para você que hoje eu finalmente conseguiria cozinhar direito……."
2600205-94 = "Snif…… desculpe, Sensei……."
2600205-95 = "[s] \"Não peça desculpas.\""
2600205-97 = "[s] \"Ainda é cedo para desistir.\""
2600205-98 = "……Sensei?"
2600205-99 = "[s] \"Vamos tentar de novo, bem devagar, desde o começo.\""
2600205-100 = "……?"
2600205-101 = "[s] \"Está tudo bem, se falharmos, faremos de novo.\""
2600205-103 = "[s6] \"Se algo está errado, vamos tentar outra coisa.\"\n[s7] \"Eu sei que a Juri sempre fez isso.\""
2600205-104 = "Sensei……."
2600205-105 = "Sensei……."
2600205-106 = "……."
2600205-107 = "Sensei……!"
2600205-108 = "[s] \"O-o que foi?\""
2600205-109 = "Não, o Sensei tem razão……!"
2600205-110 = "Eu…… acabei desabafando."
2600205-111 = "Afinal, eu faço parte do Clube de Merenda. Eu me esforcei muito até aqui, não posso desistir tão facilmente."
2600205-112 = "Pelo Sensei também……! Eu ainda consigo, sim!"
2600205-115 = "[s] \"Ah…… Juri?\""
2600205-116 = "Como eu pensei, a mão do Sensei……."
2600205-117 = "É muito quente."
2600205-118 = "Sensei, poderia segurar minha mão assim por mais um pouquinho?"
2600205-119 = "Recebendo energia assim, vou recomeçar do zero…… desta vez, quero revisar até a forma de segurar a faca."
2600205-120 = "Por favor, aguente mais um pouco esse meu capricho!"
2600205-122 = "（Depois disso, continuei tentando cozinhar com a Juri várias vezes）"
