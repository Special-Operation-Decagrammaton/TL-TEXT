[translation]
2000705-1 = "バーチャル・シンガーの気持ち"
2000705-5 = "あ、先生。こちらです。"
2000705-6 = "すみません、何だかこんな隠れたような場所で"
2000705-7 = "ライブの広告が流れ始めたこともあって、最近普通に街を歩いているとバレてしまいそうになり……。"
2000705-8 = "それに、ライブを中止しようかと思っている今、ファンのみなさんとお会いしても一体どんな顔をすればよいのか……。"
2000705-12 = "あっ……。"
2000705-19 = "ねえあの広告見た？"
2000705-20 = "「初音ミク」が今度ライブするんだって！"
2000705-21 = "しかも今回どういう仕組みなのか、目の前で見られるんでしょ？いやー、楽しみだなー！"
2000705-27 = "……合わせる顔が無い、というのは正にこういうことですね。"
2000705-28 = "[s] \"必ずしも、ミクのせいじゃないよ。\""
2000705-29 = "……いえ、私のせいです。"
2000705-30 = "私はもしかしたら……心のどこかで、ライブが中止になることを望んでいたのかもしれません。"
2000705-31 = "[s] \"もしかして何か主催者さんから、酷いこととか言われた？\""
2000705-32 = "い、いえ……！スタッフのみなさんは、いつも私に親切にしてくれて……。"
2000705-33 = "ただ、なんでしょう。この自由な世界を目にしてから……少しずつ、心のざわめきが大きくなってきて……。"
2000705-34 = "私は今までバーチャル・シンガーとして、誰かが心を込めて作った曲をたくさん歌ってきました。"
2000705-35 = "今回のライブもそうです。"
2000705-36 = "誰かの愛を、誰かの悲しみを、誰かの心を……。"
2000705-37 = "そんな、歌に込められた素敵な気持ちの数々を、私はこれまで幾度となく歌わせてもらいました。"
2000705-38 = "ずっと、そうしてきました。本当に、たくさんの素敵な歌たちを。"
2000705-39 = "ですが、こうして身体を手に入れたせいでしょうか……何だか今まで歌ってきたそれらの歌詞が、メロディが、想いが、これまで以上にじんわりと染み渡ってきて……ざわざわする気持ちが抑えきれないくらい大きくなって、まるで私に語り掛けてくるんです。"
2000705-40 = "「私も、自分の気持ちを乗せて歌いたい」……と。"
2000705-41 = "まるで今まで貰ってきた歌たちが、私の中で膨れ上がってきているみたいで……そのような、何だか変な気持ちに……。"
2000705-42 = "[s] \"それは、「変な気持ち」じゃないと思うよ。\""
2000705-44 = "[s] \"気持ちが変わっていくことは、悪いことじゃない。\""
2000705-45 = "……ありがとうございます、先生。"
2000705-46 = "先生ならそう言ってくださるのではないかと、心のどこかでは思っていました。"
2000705-47 = "……ですが、どちらにせよダメですね。"
2000705-48 = "今の私は、結局どんな歌であっても歌えませんし……。"
2000705-52 = "……あ。"
2000705-56 = "この曲、懐かしい……"
2000705-57 = "私がデビューしたての頃に歌った……。"
2000705-58 = "あの頃はまだ何も知らなくて、全部が瑞々しくって。本当に、心から……"
2000705-59 = "……♪"
2000705-60 = " ……♫"
2000705-64 = "[ns1] \"ミク！\"\n[ns2] \"歌えてる……！\""
2000705-67 = "あ、あれ……？"
2000705-68 = "本当だ、今自然と……。"
2000705-69 = "こ、これでライブも予定通りできるかもしれません！"
2000705-70 = "こうして、何とか……！"
2000705-76 = "…………"
2000705-77 = "……？ま、また歌えない状態に……？"
2000705-78 = "別の曲だから、でしょうか？何が違うんでしょう、何か条件が……？"
2000705-79 = "[s] \"自分の心を自然に乗せられるかどうか、とか……？\""
2000705-80 = "そ、そんな……。"
2000705-81 = "私、そんな自分勝手な……。"
2000705-82 = "それに、もう今回歌わせてもらう曲は決まっていて……。"
2000705-83 = "[s] \"……セットリストを変える、とか？\""
2000705-84 = "え、えぇ……？"
2000705-85 = "い、今から曲を変えるわけには……"
2000705-86 = "[s] \"ミク、曲は作れる？\""
2000705-88 = "[s] \"自分の心のままに作ってみて。後は私がどうにかしてみる。\""
2000705-89 = "ど、どうにかって……。"
2000705-90 = "……先生は大人なのに、時々まるで、子どもみたいな無茶を言うんですね。"
2000705-94 = "……お願いしても、良いですか？"
2000705-95 = "これ以外に方法は無さそうですし、私も何よりライブを成功させたいです。"
2000705-101 = "こうなったら私の心を全力で込めて……最高の曲を作って見せます！"
