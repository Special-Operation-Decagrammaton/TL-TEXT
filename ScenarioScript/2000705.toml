[translation]
2000705-1 = "Os sentimentos de uma cantora virtual"
2000705-5 = "Ah, Sensei. Por aqui."
2000705-6 = "Desculpe-me por nos encontrarmos em um lugar tão escondido como este."
2000705-7 = "Como os anúncios do show começaram a passar, ultimamente, se eu andar pela cidade normalmente, corro o risco de ser descoberta..."
2000705-8 = "Além disso, agora que estou pensando em cancelar o show, que cara eu deveria fazer ao encontrar os fãs...?"
2000705-12 = "Ah..."
2000705-19 = "Ei, você viu aquele anúncio?"
2000705-20 = "Disseram que a \"Hatsune Miku\" vai fazer um show em breve!"
2000705-21 = "E, pelo que parece, desta vez poderemos vê-la bem de perto, né? Nossa, estou tão animada!"
2000705-27 = "...Não ter cara para aparecer, é exatamente disso que se trata."
2000705-28 = "[s] \"Não é necessariamente culpa sua, Miku.\""
2000705-29 = "...Não, a culpa é minha."
2000705-30 = "Talvez eu... no fundo do meu coração, estivesse desejando que o show fosse cancelado."
2000705-31 = "[s] \"Por acaso os organizadores disseram algo terrível para você?\""
2000705-32 = "N-não...! O pessoal da equipe sempre foi muito gentil comigo..."
2000705-33 = "É só que, não sei bem... Desde que vi este mundo livre... pouco a pouco, a inquietação no meu coração foi crescendo..."
2000705-34 = "Até agora, como cantora virtual, cantei muitas músicas que alguém compôs com todo o coração."
2000705-35 = "Este show também é assim."
2000705-36 = "O amor de alguém, a tristeza de alguém, o coração de alguém..."
2000705-37 = "Eu tive a oportunidade de cantar inúmeras vezes esses sentimentos maravilhosos contidos nas músicas."
2000705-38 = "Sempre fiz isso. De verdade, muitas músicas maravilhosas."
2000705-39 = "Mas, será que é porque ganhei este corpo...? De alguma forma, as letras, as melodias e os sentimentos que cantei até agora estão penetrando em mim mais do que nunca... A inquietação cresceu tanto que não consigo mais contê-la, como se estivessem falando comigo."
2000705-40 = "\"Eu também quero cantar colocando meus próprios sentimentos\"... é isso."
2000705-41 = "É como se as músicas que recebi até hoje estivessem transbordando dentro de mim... e isso me causa um sentimento estranho..."
2000705-42 = "[s] \"Eu não acho que isso seja um 'sentimento estranho'.\""
2000705-44 = "[s] \"Não é algo ruim ter seus sentimentos mudando.\""
2000705-45 = "...Obrigada, Sensei."
2000705-46 = "No fundo, eu esperava que você dissesse isso."
2000705-47 = "...Mas, de qualquer forma, não adianta."
2000705-48 = "Do jeito que estou agora, não consigo cantar música nenhuma..."
2000705-52 = "...Ah."
2000705-56 = "Essa música, que nostálgica..."
2000705-57 = "Eu cantei quando tinha acabado de estrear..."
2000705-58 = "Naquela época, eu não sabia de nada, tudo era tão vívido. De verdade, do fundo do coração..."
2000705-59 = "...♪"
2000705-60 = " ...♫"
2000705-64 = "[ns1] \"Miku!\"\n[ns2] \"Você conseguiu cantar...!\""
2000705-67 = "Ah, espere..."
2000705-68 = "É verdade, agora, naturalmente..."
2000705-69 = "C-com isso, talvez o show possa acontecer como planejado!"
2000705-70 = "Dessa forma, de alguma maneira...!"
2000705-76 = "............"
2000705-77 = "...? D-de novo, não consigo cantar...?"
2000705-78 = "Será porque é outra música? O que há de diferente? Existe alguma condição...?"
2000705-79 = "[s] \"Será que é sobre conseguir colocar seus próprios sentimentos naturalmente...?\""
2000705-80 = "N-não pode ser..."
2000705-81 = "Eu, ser tão egoísta assim..."
2000705-82 = "Além disso, as músicas que vou cantar desta vez já estão decididas..."
2000705-83 = "[s] \"...Que tal mudar o setlist?\""
2000705-84 = "Hã, é...?"
2000705-85 = "N-não dá para mudar a música agora..."
2000705-86 = "[s] \"Miku, você consegue compor uma música?\""
2000705-88 = "[s] \"Tente compor seguindo o que seu coração mandar. Eu dou um jeito no resto.\""
2000705-89 = "D-dar um jeito, você diz..."
2000705-90 = "......Sensei, você é um adulto, mas às vezes diz coisas imprudentes como uma criança."
2000705-94 = "......Poderia me fazer esse favor?"
2000705-95 = "Não parece haver outro jeito, e acima de tudo, eu quero que este show seja um sucesso."
2000705-101 = "Já que chegamos a esse ponto, vou colocar todo o meu coração nisso... e mostrar que consigo criar a melhor música de todas!"
