[translation]
10038030-1 = "第3話;大人と子供、子供、子供。"
10038030-3 = "普段は賑やかな公園なのに……"
10038030-4 = "今はほとんど人がいませんね。寂しく感じます。"
10038030-5 = "京劇の練習をする人も、おやつを食べ歩く生徒の姿も……"
10038030-6 = "……"
10038030-10 = "あ、でも屋台はまだありますね！#n先生、私たちも何か食べましょう。私、エッグタルトが食べたいです！"
10038030-14 = "キキも！ちゃんと後で歯磨き頑張りますから！いいですよね？"
10038030-15 = "[s] \"う……うん、いいよ……。\""
10038030-17 = "ありがとうございます、先生！"
10038030-20 = "最近、桃源郷で「[ruby=クレープ]班戟[/ruby]」を売り始めたらしいんです！"
10038030-21 = "伝統に反するといって、3年生の……お姉さん……はあんまり食べようとしませんが……。"
10038030-22 = "でも一度食べたら、やみつきになるって噂なんです！"
10038030-23 = "「[ruby=クレープ]班戟[/ruby]」って何ですか？#nキキ、初めて聞きました。"
10038030-24 = "ふっふっふ……「[ruby=クレープ]班戟[/ruby]」はですね！"
10038030-29 = "薄い生地の中に生クリームとフルーツをたっぷり入れて固めたフルーツクリームケーキなんです！"
10038030-30 = "一番有名なのはマンゴーですが……抹茶、チョコレート、イチゴ……#n生地に合うものであればどんなものでもいれることができます！"
10038030-32 = "すごく美味しそうです……！"
10038030-33 = "先生！キキも食べてみたいです！"
10038030-34 = "[s] \"さっきエッグタルトを食べたばっかだよ……？\""
10038030-43 = "先生、お願い！お願い！"
10038030-44 = "濃厚な抹茶と一緒にいただいたら……絶対美味しいです！"
10038030-45 = "あま～い「[ruby=クレープ]班戟[/ruby]」を濃いめの抹茶で口直し……想像するだけで無限に食べられそう……！"
10038030-47 = "本当にダメですか……？#n先生、お願い！お願い！"
10038030-51 = "[ns] \"しょうがないなぁ……。\""
10038030-55 = "わーい！ありがとうございます！"
10038030-56 = "先生、大好き！"
10038030-60 = "だ、大丈夫ですか！？急にむせて……"
10038030-61 = "先生、大丈夫ですか？変なところに入っていませんか？"
10038030-62 = "[s] \"だ、大丈夫……。\""
10038030-67 = "食べてばかりなので、お散歩して消化しましょうか！"
10038030-68 = "いいですね！#nここはいつ来ても心が落ち着きますし、お散歩に最適です。"
10038030-69 = "パンダいるかな……あ、あそこにいますね！"
10038030-75 = "パンダって……近づいて大丈夫なんですか？#nパンダも熊ですし……"
10038030-76 = "大丈夫です！ここの子たちは人に慣れてるんですよ！"
10038030-80 = "特に竹が好きなので……これを渡してあげれば……！"
10038030-85 = "メエ？"
10038030-89 = "ウォン！"
10038030-90 = "ほら、美味しそうに食べてくれるんです！"
10038030-91 = "わぁ、いいですね！#nキキも！キキもやりたいです！"
10038030-92 = "[s] \"人に慣れてるとはいえ、あんまり近寄りすぎないようにね……。\""
10038030-94 = "は～い！"
10038030-98 = "ただいま～！"
10038030-99 = "ふあ……すごい楽しい一日でした。#nキキ、とっても満足です！"
10038030-100 = "本当ですか？それはよかったです！"
10038030-101 = "先生はどうでしたか？"
10038030-102 = "[s] \"生徒が満足したなら、よかった……。\""
10038030-103 = "むぅ……私たちは生徒じゃなくて園児ですよ？"
10038030-104 = "[s] \"2人が満足したなら、よかった……。\""
10038030-105 = "なんか先生疲れてませんか……？"
10038030-106 = "気にしなくてもいいと言われても……うーん……。"
10038030-114 = "あ、先生！梅花園へようこそ！今日、梅花園の子と遊んでくださったとお聞きしました！お疲れ様でした。"
10038030-118 = "あれ？君、しばらく見なかった子じゃない？#n隣の子は……？"
10038030-123 = "こ、この間、転校してきたキキちゃんです！#nシュンお姉ちゃんに面倒を見るよう頼まれて！"
10038030-127 = "こんにちは、ココナ教官！キキと言います。よろしくお願いします！"
10038030-132 = "……！"
10038030-133 = "先生、今の聞きましたか？私のこと、教官って……！"
10038030-143 = "なんですかその目は……！頭撫でないでください！"
10038030-144 = "もう、変なことずっと言って……世界が正常に動いている……ってなんですかそれ。"
10038030-149 = "わ、私、シュンお姉ちゃんを探してきますね！"
10038030-153 = "キキも一緒に行きます！"
10038030-158 = "ま、待って！シュン姉さんは……！"
10038030-162 = "うぅ、シュン姉さんどこに行っちゃったんだろ……今日一度も見かけてなくて……"
10038030-163 = "[s] \"シュンの事は……私に任せて。\""
10038030-164 = "先生が？それはとても楽……いえ、ありがたいですけど……。"
10038030-165 = "無理に先生がやる必要はないと思いますけど……うーん、今日の先生なんか変ですね。"
10038030-170 = "じゃあ、シュン姉さんのことはお願いしますね。#n私は他の園児の面倒を見ないといけないので。"
10038030-171 = "まあ、私は立派な梅花園の教官ですから！#nこれくらい当然できますが……！えっへん！"
10038030-174 = "ふう。バレても何もないとは思いますが、危ないところでした。#nココナちゃんは変なところで勘がいいですからね……"
10038030-175 = "ふむ……"
10038030-176 = "ふう……お忍びで抜け出すという目的は無事達成できたのう。皆、ご苦労じゃった。"
10038030-177 = "……ご満足いただけましたでしょうか、門主様？"
10038030-178 = "そうさな……"
10038030-183 = "キサキ……？"
10038030-191 = "！！？？"
10038030-192 = "初めまして！今日転校してきたキキって言います。#nどちらさまですか？"
10038030-196 = "……"
10038030-197 = "……"
10038030-198 = "キサキ……何してるの……？"
10038030-199 = "い、いえ……キキ、です……"
10038030-200 = "いや、それは無理があるよ。"
10038030-201 = "……"
10038030-202 = "ふむ。やはり其方の目は欺けないのう。"
10038030-203 = "……説明をお願いしてもいいかな？"
10038030-204 = "[s] \"そうだね……まずは場所を変えようか。\""
10038030-210 = "うん、人いないね。#n……ここなら、よっぽどの事がなければ声も聞こえないかな？"
10038030-211 = "もしも誰かが通りがかったとしても、先生が園児と一緒にいるだけにしか見えないし。"
10038030-212 = "だから、正直に話して。#nキサキ、一体何やってるの？"
10038030-214 = "……大したことではない。"
10038030-215 = "お忍びに最適な服を着ているだけじゃ。"
10038030-216 = "ああ、なるほどね。"
10038030-217 = "まあ、キサキがよくお忍びで山海経を歩き回ってることくらい知ってるけど……。"
10038030-218 = "別にその格好じゃなくても良くない？"
10038030-219 = "お忍びの格好は、様々な事情が考慮されて然るべきじゃ。今はこれが最適でな。"
10038030-220 = "まあ、いいや。キサキがそういうならそうなんだろうけど……#nほら、昔うちのメンバーに変装して商会に入ったこともあったでしょ？"
10038030-221 = "ふふ、覚えておるぞ。最初はうまくいくかと思ったのじゃが。"
10038030-222 = "でも、キサキ、料理が下手すぎてバレちゃったんだよね！"
10038030-223 = "まぁ、気づいたのがあたしでよかったよ。#n他の子にバレてたら政治問題に発展するところだったんだから。"
10038030-224 = "その時の借りは返したつもりじゃが。"
10038030-225 = "ああ、わかってるよ。#nちょっと懐かしくなっちゃってね。"
10038030-226 = "ところで、なぜ其方は梅花園に？"
10038030-227 = "あたし？今、月影祭の雲行きが怪しいじゃない？#nだから、余った月餅を子供たちに分けてあげようと思って。"
10038030-228 = "キサキも食べる？いくつか残ってるんだよね。"
10038030-229 = "月餅か……懐かしいのう。ありがたくいただくとしよう。"
10038030-230 = "先生もどう？玄武商会の月餅は美味しいよ。"
10038030-231 = "[s] \"じゃあ遠慮なく……。\""
10038030-239 = "（一口食べると、香ばしくて濃厚な味が口の中に広がった）"
10038030-241 = "（私たちはしばらく何も言わず、静かに月餅を食べた……）"
10038030-244 = "……昔を思い出すのう、妾たちが初めて月餅を作って食べた時のことじゃ。"
10038030-245 = "げっ、それまだ覚えてるんだ……？"
10038030-246 = "卵黄とクルミ、あんこが入った月餅じゃったのう。"
10038030-247 = "もう……そういうのは忘れてほしいんだけど……"
10038030-248 = "ふふっ、あまりにも強烈だったからのう。#nあんこからは少し焦げた味がしたし、卵黄は半熟で、クルミは粉々に砕けて食感が消えておった。"
10038030-249 = "月餅を型に入れたのはキミだったのに。"
10038030-250 = "ああ。そのせいであちこち壊れたり、形がつぶれたりもした。"
10038030-251 = "到底月餅とは言えない、そんなシロモノじゃったのう……。"
10038030-252 = "まあ、最初から完璧になんてできないよ。"
10038030-253 = "ああ、そうさな……。"
10038030-254 = "ふふ、今でも昨日の事のように覚えておるよ。"
10038030-255 = "……あたしも。#nあの頃からかな、料理人を目指すようになったのは。"
10038030-256 = "其方の望む姿にはなれたのか？"
10038030-257 = "どうだろう。まあまあ近づいているような気はするよ。#nキサキは？"
10038030-258 = "妾は……分からないな。#nなにせ、妾は一度たりとも自身の意志で門主になろうと思ったことがないからの。"
10038030-259 = "……"
10038030-260 = "……キサキは頑張ってると思うよ。"
10038030-261 = "まあ、商会が営業できてないから今月の売上が苦しいのはあるけどね。"
10038030-266 = "……すまぬ。"
10038030-267 = "いやいや、これは仕方ないでしょ。"
10038030-268 = "みんなある程度は蓄えがあるし、今月くらいなら大丈夫だよ。それに……。"
10038030-269 = "あたしがこんな風になっちゃったわけだし。"
10038030-270 = "……とは言っても、後でうちの子を[ruby=なだ]宥[/ruby]めるのはちょっと苦労しそうだけど。"
10038030-271 = "色々と苦労をかけるの。"
10038030-272 = "キサキほどじゃないよ。#nまあ、それに初心を忘れなければ、なんとかなると思ってるよ。"
10038030-273 = "初心、か……"
10038030-274 = "どうかしたの？"
10038030-275 = "いや……其方にはそういう芯があるのじゃろうな。"
10038030-276 = "しかし、妾にそのようなものがあるかと問われると……あまり自信がない。"
10038030-277 = "キサキ……"
10038030-278 = "[s] \"それはそれでいいんじゃないかな？\""
10038030-282 = "……どういう意味じゃ？"
10038030-283 = "[s1] \"だって、初心を忘れた時には問題が発生するものだけど、\"\n[s2] \"そもそもないのなら、忘れる心配もないんじゃない？\""
10038030-286 = "ふむ……そうさな。"
10038030-287 = "たしかに、元より存在しないものを忘れるのは難しい。ふふ、その通りじゃ。#n目から鱗が落ちたようじゃ。"
10038030-288 = "して、妾の振る舞いは先生からはどう映る？"
10038030-289 = "[s] \"……キサキが最善を尽くしていることは、私もよく知っているよ。\""
10038030-290 = "……そうか。"
10038030-291 = "しかし、最善を尽くしているだけでは儘ならぬことも多い。"
10038030-293 = "玄武商会でもたまに言う言葉だね。"
10038030-294 = "「一生懸命炒めてどうするの。上手く炒めないとね」って、"
10038030-295 = "うむ、その通り。#n例えば錬丹術研究会で多くの労力を費やしたとて、必ずしも妙薬の生成に成功するとは限らないように、な。"
10038030-296 = "あはは……あんまサヤをからかわないであげて。"
10038030-297 = "特定個人の話をしているつもりではなかったのじゃが……。"
10038030-302 = "（待て、錬丹術研究会じゃと……？）"
10038030-305 = "はい……内容の重さに比べて、生徒への影響はそこまで大きくないのですが、このような噂が広まっているということ自体が……"
10038030-308 = "（今、錬丹術研究会の会長は不在……）"
10038030-312 = "現錬丹術研究会長のサヤは素直に尋問に応じていますが、今のところ特に手がかりになるような証言はありませんでした。"
10038030-313 = "（「若返り現象」は錬丹術研究会と関係があると考えられている。であれば……）"
10038030-317 = "ちょ、ちょっと！濡れ衣なのだ！#n錬丹術研究会は今回の事態とは無関係なのだ！"
10038030-318 = "（視点を変えて考えるのじゃ。妾が山海経に戻ろうとした場合、まず障害になるのは……？）"
10038030-322 = "退学になった生徒が、何の手続きもなく母校に戻るのは難しい。"
10038030-323 = "まして、それがあの[ruby=しんたに]申谷[/ruby]カイであれば……なおさらじゃ。"
10038030-327 = "……！"
10038030-328 = "ちょっと、キサキ……どうしたの？"
10038030-329 = "見落としておった……今もっとも危険なのは錬丹術研究会じゃ！"
10038030-330 = "錬丹術研究会？どうして！？"
10038030-338 = "門主様？どうされましたか？"
10038030-339 = "ミナ。今すぐ錬丹術研究会がどんな状態なのか調べるのじゃ。"
10038030-340 = "……！そうでなくても、ちょうどそれを申し上げようとしたところです。錬丹術研究会からの急報です！"
