[translation]
10038030-1 = "Episódio 3; Adultos e crianças, crianças, crianças."
10038030-3 = "O parque costuma ser tão movimentado..."
10038030-4 = "Mas agora quase não tem ninguém. É um pouco solitário."
10038030-5 = "Não tem ninguém praticando ópera de Pequim, nem alunos comendo lanches enquanto caminham..."
10038030-6 = "……"
10038030-10 = "Ah, mas as barracas ainda estão aqui!#nSensei, vamos comer alguma coisa também. Eu quero comer uma torta de ovo!"
10038030-14 = "A Kiki também! Eu prometo que vou escovar os dentes direitinho depois! Pode ser?"
10038030-15 = "[s] \"Uh... tudo bem, pode ser...\""
10038030-17 = "Muito obrigada, Sensei!"
10038030-20 = "Parece que começaram a vender \"crepes\" em Taotie-kyo recentemente!"
10038030-21 = "Dizem que vai contra a tradição, então as alunas do terceiro ano... as veteranas... não querem comer muito..."
10038030-22 = "Mas dizem que, depois que você experimenta uma vez, fica viciado!"
10038030-23 = "O que é um \"crepe\"?#nA Kiki nunca ouviu falar."
10038030-24 = "Hehe... um \"crepe\" é o seguinte!"
10038030-29 = "É um bolo de creme com frutas, feito com uma massa fina recheada com bastante chantilly e frutas!"
10038030-30 = "O mais famoso é o de manga, mas... tem de matcha, chocolate, morango...#nVocê pode colocar qualquer coisa que combine com a massa!"
10038030-32 = "Parece muito gostoso...!"
10038030-33 = "Sensei! A Kiki também quer experimentar!"
10038030-34 = "[s] \"Mas você acabou de comer uma torta de ovo...?\""
10038030-43 = "Sensei, por favor! Por favor!"
10038030-44 = "Se comer junto com um matcha bem concentrado... com certeza vai ficar delicioso!"
10038030-45 = "Um \"crepe\" bem docinho seguido de um matcha amargo para limpar o paladar... só de imaginar, parece que dá para comer infinitamente...!"
10038030-47 = "Sério que não pode...?#nSensei, por favor! Por favor!"
10038030-51 = "[ns] \"Não tem jeito mesmo...\""
10038030-55 = "Eba! Muito obrigada!"
10038030-56 = "Sensei, eu te amo!"
10038030-60 = "V-você está bem!? Você engasgou de repente..."
10038030-61 = "Sensei, está tudo bem? Foi para o lugar errado?"
10038030-62 = "[s] \"E-estou bem...\""
10038030-67 = "Como comemos bastante, que tal darmos uma caminhada para fazer a digestão?"
10038030-68 = "Boa ideia!#nSempre que venho aqui, meu coração se acalma, é perfeito para um passeio."
10038030-69 = "Será que tem pandas... ah, ali tem um!"
10038030-75 = "Pandas... será que é seguro chegar perto?#nPandas também são ursos..."
10038030-76 = "Está tudo bem! Os daqui já estão acostumados com as pessoas!"
10038030-80 = "Eles gostam especialmente de bambu, então se a gente der isso para eles...!"
10038030-85 = "Mé?"
10038030-89 = "Au!"
10038030-90 = "Viu só, eles comem com tanto gosto!"
10038030-91 = "Uau, que legal!#nA Kiki também! A Kiki também quer fazer!"
10038030-92 = "[s] \"Mesmo que estejam acostumados, não cheguem perto demais, tá bom...\""
10038030-94 = "Tá bom!"
10038030-98 = "Chegamos!"
10038030-99 = "Ah... foi um dia muito divertido.#nA Kiki está muito satisfeita!"
10038030-100 = "Sério? Fico feliz em ouvir isso!"
10038030-101 = "E para você, Sensei?"
10038030-102 = "[s] \"Se as alunas estão satisfeitas, então está ótimo...\""
10038030-103 = "Hum... nós não somos alunas, somos crianças do jardim de infância, sabia?"
10038030-104 = "[s] \"Se as duas estão satisfeitas, então está ótimo...\""
10038030-105 = "O Sensei não parece estar um pouco cansado...?"
10038030-106 = "Mesmo que você diga que não precisa se preocupar... hum..."
10038030-114 = "Ah, Sensei! Bem-vindo ao Jardim das Ameixeiras! Ouvi dizer que você brincou com as crianças do Jardim hoje! Muito obrigada pelo seu trabalho duro."
10038030-118 = "Ué? Você não é aquela criança que eu não via há um tempo?#nE quem é a criança ao seu lado...?"
10038030-123 = "E-essa é a Kiki-chan, que se transferiu recentemente!#nA irmã Shun me pediu para cuidar dela!"
10038030-127 = "Olá, instrutora Kokona! Meu nome é Kiki. Prazer em conhecê-la!"
10038030-132 = "……!"
10038030-133 = "Sensei, você ouviu isso? Ela me chamou de instrutora...!"
10038030-143 = "Que olhar é esse...?! Não faça carinho na minha cabeça!"
10038030-144 = "Ai, chega de falar essas coisas estranhas... O que é isso de 'o mundo está funcionando normalmente'?"
10038030-149 = "V-vou procurar a irmã Shun agora mesmo!"
10038030-153 = "A Kiki vai junto!"
10038030-158 = "E-esperem! A irmã Shun está...!"
10038030-162 = "Ugh, para onde será que a irmã Shun foi... Não a vi nem uma vez hoje..."
10038030-163 = "[s] \"Deixe a Shun... comigo.\""
10038030-164 = "O Sensei? Isso seria um grande alívio... digo, eu agradeço, mas..."
10038030-165 = "Não acho que o Sensei precise se esforçar tanto... hum, o Sensei está meio estranho hoje."
10038030-170 = "Então, por favor, cuide da irmã Shun.#nEu preciso cuidar das outras crianças do jardim."
10038030-171 = "Afinal, eu sou uma instrutora exemplar do Jardim das Ameixeiras!#nFazer isso é o mínimo que se espera de mim...! Hmph!"
10038030-174 = "Ufa. Acho que não descobriram nada, mas foi por pouco.#nA Kokona tem uma intuição muito afiada para coisas estranhas..."
10038030-175 = "Hum..."
10038030-176 = "Ufa... O objetivo de sair escondida foi alcançado com sucesso. Bom trabalho a todos."
10038030-177 = "......Você está satisfeita, Líder?"
10038030-178 = "Pois é..."
10038030-183 = "Kisaki...?"
10038030-191 = "!!??"
10038030-192 = "Muito prazer! Meu nome é Kiki, me transferi hoje.#nQuem seria você?"
10038030-196 = "......"
10038030-197 = "......"
10038030-198 = "Kisaki... o que você está fazendo...?"
10038030-199 = "N-não... é a Kiki..."
10038030-200 = "Não, isso não cola."
10038030-201 = "......"
10038030-202 = "Hum. Como esperado, não dá para enganar o seu olhar."
10038030-203 = "......Pode me explicar o que está acontecendo?"
10038030-204 = "[s] \"Certo... primeiro, vamos mudar de lugar.\""
10038030-210 = "Certo, não tem ninguém aqui.#n...Aqui, a menos que aconteça algo muito grave, ninguém vai nos ouvir, né?"
10038030-211 = "E mesmo se alguém passar, só vai parecer que o Sensei está com uma criança."
10038030-212 = "Então, fale a verdade.#nKisaki, o que você está fazendo?"
10038030-214 = "......Não é nada demais."
10038030-215 = "Estou apenas usando roupas ideais para passar despercebida."
10038030-216 = "Ah, entendi."
10038030-217 = "Bom, eu sei que você costuma andar por Shanhaijing disfarçada de vez em quando..."
10038030-218 = "Mas não precisava ser desse jeito, precisava?"
10038030-219 = "O disfarce deve levar em conta várias circunstâncias. No momento, este é o ideal."
10038030-220 = "Bom, tanto faz. Se você diz, deve ser verdade...#nEi, você já não se disfarçou de um dos nossos membros para entrar na associação comercial antes?"
10038030-221 = "Hehe, eu me lembro disso. No começo, achei que daria certo."
10038030-222 = "Mas você é tão ruim na cozinha que acabou sendo descoberta, Kisaki!"
10038030-223 = "Bem, ainda bem que fui eu quem percebeu.#nSe outra pessoa tivesse descoberto, teria virado um problema político."
10038030-224 = "Acho que já paguei a dívida daquela época."
10038030-225 = "Ah, eu sei.#nÉ que eu lembrei disso e bateu uma nostalgia."
10038030-226 = "Aliás, por que você está no Jardim das Ameixeiras?"
10038030-227 = "Eu? Bem, o Festival do Luar está com um clima estranho, não está?#nPor isso, pensei em dividir os bolos lunares que sobraram com as crianças."
10038030-228 = "Kisaki, você quer um? Ainda sobraram alguns."
10038030-229 = "Bolos lunares... que nostálgico. Aceitarei com gratidão."
10038030-230 = "Sensei, você também quer? Os bolos lunares da Associação Xuanwu são deliciosos."
10038030-231 = "[s] \"Então, não vou recusar...\""
10038030-239 = "(Ao dar uma mordida, um sabor rico e aromático se espalhou pela minha boca.)"
10038030-241 = "(Nós ficamos em silêncio por um tempo, comendo os bolos lunares calmamente...)"
10038030-244 = "...Isso me lembra dos velhos tempos, quando nós fizemos e comemos bolos lunares pela primeira vez."
10038030-245 = "Eita, você ainda lembra disso...?"
10038030-246 = "Eram bolos lunares com gema de ovo, nozes e pasta de feijão doce, não eram?"
10038030-247 = "Ah, qual é... eu queria que você esquecesse essas coisas..."
10038030-248 = "Fufu, é que foi inesquecível.#nA pasta de feijão estava com um gosto de queimado, a gema estava mal cozida e as nozes estavam tão trituradas que a textura sumiu."
10038030-249 = "Mas foi você quem colocou os bolos lunares na forma, Kisaki."
10038030-250 = "Ah, é verdade. Por causa disso, eles quebraram em vários lugares e ficaram todos amassados."
10038030-251 = "Aquilo nem podia ser chamado de bolo lunar, que coisa, não é...?"
10038030-252 = "Bem, ninguém consegue ser perfeito logo de primeira."
10038030-253 = "Ah, é verdade..."
10038030-254 = "Fufu, lembro-me como se fosse ontem."
10038030-255 = "...Eu também.#nFoi a partir daquela época que comecei a almejar ser uma cozinheira, talvez?"
10038030-256 = "Você se tornou a pessoa que desejava ser?"
10038030-257 = "Quem sabe? Sinto que estou chegando perto.#nE você, Kisaki?"
10038030-258 = "Eu... não sei dizer.#nAfinal, eu nunca tive a intenção de me tornar a líder da associação por vontade própria."
10038030-259 = "..."
10038030-260 = "...Eu acho que você está se esforçando muito, Kisaki."
10038030-261 = "Bem, como a associação não está funcionando, as vendas deste mês estão difíceis, é verdade."
10038030-266 = "...Sinto muito."
10038030-267 = "Não, não, isso não é culpa sua."
10038030-268 = "Todos nós temos algumas economias, então este mês deve ficar tudo bem. Além disso..."
10038030-269 = "Foi eu quem acabei ficando assim."
10038030-270 = "...Dito isso, vai ser um pouco difícil acalmar as crianças depois."
10038030-271 = "Sinto muito por causar tantos problemas."
10038030-272 = "Não é nada comparado a você.#nBem, contanto que não esqueçamos nossas origens, acho que tudo vai dar certo."
10038030-273 = "Origens, é..."
10038030-274 = "Aconteceu alguma coisa?"
10038030-275 = "Não... é que você parece ter essa convicção firme."
10038030-276 = "Mas, se me perguntar se eu tenho algo assim... não tenho muita confiança."
10038030-277 = "Kisaki..."
10038030-278 = "[s] \"Isso não é algo bom, por acaso?\""
10038030-282 = "...O que quer dizer com isso?"
10038030-283 = "[s1] \"Porque, quando esquecemos nossas origens, problemas costumam surgir,\"\n[s2] \"mas se você nem as tem, não precisa se preocupar em esquecê-las, certo?\""
10038030-286 = "Hum... é verdade."
10038030-287 = "De fato, é difícil esquecer algo que nunca existiu. Fufu, você tem razão.#nSinto como se uma venda tivesse caído dos meus olhos."
10038030-288 = "Diga-me, como o meu comportamento parece aos olhos do Sensei?"
10038030-289 = "[s] \"...Eu sei muito bem que você está fazendo o seu melhor, Kisaki.\""
10038030-290 = "...Entendo."
10038030-291 = "No entanto, fazer o melhor nem sempre é o suficiente para resolver as coisas."
10038030-293 = "É algo que dizemos muito na Associação Xuanwu."
10038030-294 = "\"Não adianta apenas fritar com esforço. É preciso fritar com habilidade.\""
10038030-295 = "Hum, exatamente.#nPor exemplo, mesmo que se dedique muito esforço no Clube de Pesquisa de Alquimia, não significa que o sucesso na criação de um remédio milagroso seja garantido."
10038030-296 = "Ahaha... não provoque tanto a Saya."
10038030-297 = "Eu não tinha a intenção de falar de um indivíduo específico, mas..."
10038030-302 = "（Espere, o Clube de Pesquisa de Alquimia...?）"
10038030-305 = "Sim... Comparado à gravidade do conteúdo, o impacto sobre os alunos não é tão grande, mas o fato de tal boato estar se espalhando por si só é..."
10038030-308 = "（Agora, a presidente do Clube de Pesquisa de Alquimia está ausente...）"
10038030-312 = "A atual presidente do Clube de Pesquisa de Alquimia, Saya, está respondendo ao interrogatório honestamente, mas até agora não houve nenhum depoimento que sirva de pista."
10038030-313 = "（Acredita-se que o \"fenômeno de rejuvenescimento\" esteja relacionado ao Clube de Pesquisa de Alquimia. Se for esse o caso...）"

10038030-317 = "Ei, espere um pouco! Isso é uma acusação falsa!#nO Clube de Pesquisa de Alquimia não tem relação com esta situação!"
10038030-318 = "（Devo pensar mudando a perspectiva. Se eu tentasse voltar para Shanhaijing, qual seria o primeiro obstáculo...?）"
10038030-322 = "É difícil para uma aluna que foi expulsa retornar à sua antiga escola sem passar por nenhum procedimento."
10038030-323 = "E se for aquela Shintani Kai... então é ainda mais difícil."
10038030-327 = "……！"
10038030-328 = "Ei, Kisaki... o que houve?"
10038030-329 = "Eu deixei passar... o que é mais perigoso agora é o Clube de Pesquisa de Alquimia!"
10038030-330 = "Clube de Pesquisa de Alquimia? Por quê!?"
10038030-338 = "Mestra? O que houve?"
10038030-339 = "Mina. Investigue agora mesmo em que estado se encontra o Clube de Pesquisa de Alquimia."
10038030-340 = "……! Mesmo que não tivesse pedido, eu estava prestes a lhe dizer exatamente isso. É um relatório urgente do Clube de Pesquisa de Alquimia!"
