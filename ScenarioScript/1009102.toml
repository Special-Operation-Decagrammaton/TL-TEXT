[translation]
1009102-1 = "ボーカル練習"
1009102-2 = " （……カズサに捕まって、近くのカラオケに連れて行かれた）"
1009102-3 = "[ns1] \"責任って何かと思ったら。\"\n[ns2] \"歌の練習に付き合う、と……。\""
1009102-6 = "……じゃあ逆に、何だと思ってたの？"
1009102-7 = "経緯はともかく、放り投げたりしないよ。"
1009102-8 = "ま、どうせ誰かがやらなきゃなんだし。"
1009102-9 = "……ふふっ、別に偉いとかじゃないって。"
1009102-10 = "……え？いや、経験が無いって言うか……。"
1009102-11 = "バンドの「ボーカル」として歌うのは、流石にやったことないからさ。"
1009102-12 = "ステージに立つなんて、柄じゃないんだけどね。"
1009102-13 = "……。"
1009102-14 = "ま、とにかく付き合ってよ。"
1009102-15 = "私が歌うの、聞いてるだけで良いからさ。"
1009102-16 = "何か気になるようだったら、後で教えて。"
1009102-17 = "ん？あー……本番の曲はまだ決まってない、です。#nとりあえず、練習だけはしておこうかなって。"
1009102-18 = "……いやいやいや。"
1009102-19 = "ナツとかヨシミとかの前で歌ったら、どうなるかくらい分かるでしょ？"
1009102-20 = "それじゃ練習にならないじゃん？"
1009102-21 = "だからこうして、信頼できる先生に……"
1009102-26 = "……。"
1009102-27 = "信頼できるって、言って良いのかな……？"
1009102-28 = "[s3] \"……えぇっ！？\"\n[s4] \"そ、その表情は一体……？\""
1009102-31 = "でも先生って時々、すごい意地悪だし……。"
1009102-32 = "変なところで真面目かと思えば、急にふざけたりするから……。"
1009102-33 = "……もしかして、一人でやるべきだったのかな。"
1009102-34 = "……え？"
1009102-35 = "約束してくれる？絶対意地悪しない？"
1009102-36 = "んー……ほんとに？"
1009102-37 = "[s5] \"その辺りはちゃんと見極めるよ。\"\n[s6] \"空気はちゃんと読むよ……読める範囲で。\""
1009102-40 = "そ、そっか……。"
1009102-41 = "な、なんかごめんね。"
1009102-42 = "そこまで重い意味はなかったんだけど……。"
1009102-43 = "……先生、やっぱり変な人だね。"
1009102-44 = "まあ良いか、約束してくれたし。"
1009102-45 = "じゃあ私も、そろそろ本格的に……。"
1009102-46 = "……。"
1009102-47 = "……よろしくお願い、します。"
1009102-49 = "（その後、カズサの歌を沢山聞いた）"
1009102-50 = "（幾つかアドバイスはしたものの、カズサの歌はかなり上手だった）"
1009102-52 = "[ns7] \"すごいすごい！\"\n[ns8] \"こんなに上手なのに、心配ごとがあるの？\""
1009102-55 = "そ、そうかな……？大丈夫そう？"
1009102-56 = "先生、結構なんでも褒めるからなー……。#nそれは、お世辞じゃないやつ？"
1009102-57 = "……そっか、ありがと。"
1009102-58 = "ま、その表情を見ちゃったら仕方ないなぁ。"
1009102-62 = "信じても、良いんだよね？"
1009102-63 = "[s9] \"それはもちろん。\"\n[s10] \"あとは本番もリラックスして臨めれば完璧。\""
1009102-66 = "うん、ありがと。"
1009102-67 = "にしても、リラックスか……。"
1009102-68 = "ま、それは今後の課題ってことで。"
1009102-69 = "……じゃ、練習はここまでにしようかな。"
1009102-70 = "……ん、どしたの？"
1009102-71 = "何するのって……ここ、カラオケだよ？"
1009102-72 = "……そんなの決まってるでしょ。"
1009102-76 = "せっかくなんだし、楽しまないとね。"
1009102-77 = "[s11] \"……歌い足りない感じ？\"\n[s12] \"喉枯れない？大丈夫？\" "
1009102-80 = "……何、その反応？"
1009102-81 = "さっきまでのは練習、ここからは一緒にカラオケで遊ぶの。"
1009102-82 = "全然違うでしょ？"
1009102-83 = "それに、喉なら平気だって。"
1009102-89 = "ここまで来たんだから、最後まで付き合ってよ？"
1009102-90 = "まだまだ時間はあることだし……。"
1009102-91 = "それじゃあ一曲目、行こう！！"
1009102-96 = "ほらほら、先生も！"
1009102-97 = "（その後カズサは、長時間にわたって楽しそうに歌い続けた）"
1009102-101 = "（……何なら練習の時よりも、ずっと生き生きとしていた）"
