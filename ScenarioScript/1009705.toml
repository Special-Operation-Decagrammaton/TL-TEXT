[translation]
1009705-1 = "Logistics information"
1009705-3 = "（早朝、モエと一緒に海辺を散歩していると……）"
1009705-10 = "あれ、漁師のおじさんたちだ。"
1009705-11 = "おじさ～ん、今日はたくさん釣れた？"
1009705-16 = "……おっ、誰かと思ったら[ruby=かぜくら]風倉[/ruby]ちゃんか。"
1009705-17 = "うーん、いつもより釣れたんだが……。"
1009705-18 = "わっ、これシイラじゃん？#nしかも、倉庫に入り切らないほど！"
1009705-19 = "こんなにたくさん釣れるなんて、良かったじゃん！"
1009705-20 = "本来なら喜ばしいはずなんだが……。"
1009705-21 = "何か問題でもあったの？#nあんまり元気なさそうだけど……。"
1009705-22 = "それがな……。"
1009705-25 = "お魚の保管場所が足りないの？"
1009705-26 = "ああ。今まで水産物の加工と流通を請け負っていたレッド・フックエクスプレスが、しばらく営業を停止することになってな……。"
1009705-27 = "新しい取引先を探している間、#n出荷できる水産物の量には限界があるんだ。"
1009705-28 = "とはいえ、この量を村で消費するのも難しいし……。"
1009705-29 = "[s] \"そういった事情だったんですね。\""
1009705-30 = "けど、捨てるのももったいないし……。"
1009705-31 = "まあ、くさやにでもするとしよう。"
1009705-32 = "……くさや？"
1009705-33 = "ああ、この村で伝統的な塩漬け方法だ。#nくさやにすれば、最低でも1年は保存できる。"
1009705-34 = "それなら、何も問題ないんじゃないの？"
1009705-35 = "……売れないくさやを作ったら、在庫を抱えることには変わりない。"
1009705-36 = "村の者でも好き嫌いが分かれるくらいだからな。"
1009705-37 = "まったく、大漁で困る日が来るとは……。"
1009705-42 = "うーん、それなら私に良い案があるかも。"
1009705-43 = "ちょっと待ってて、おじさんたち。"
1009705-49 = "ここに商品名を追加すれば……よし！"
1009705-50 = "さあ、このアプリを使ってみて。"
1009705-51 = "な、何のアプリなんだ…？"
1009705-52 = "これは各地域の名産をPRできるアプリだよ。"
1009705-53 = "くさやの購入希望者がいたら、通知が来るようになってるの。"
1009705-54 = "いや～。#nいくら何でも、くさやを食べたいなんて人は……。"
1009705-60 = "＜この魚の塩漬け、AU値1000に近い臭いがするって本当ですか？＞"
1009705-61 = "＜グルメチャンネルで、くさやを食べるチャレンジを見て来ました！＞"
1009705-62 = "＜みんなから「お前には無理だ」と言われたので、食べてみたくなりました！＞"
1009705-63 = "＜チャレンジャーな友達にプレゼントしようと思ってます！＞"
1009705-64 = "＜臭みが強い海産物を前から食べてみたかったんです＞"
1009705-66 = "急に大量の注文が……。#n百、いや、千件以上の注文が！"
1009705-67 = "キヴォトスには、こんなにもくさやを食べたい人がいたなんて……。"
1009705-68 = "くひひっ……。#n好みは人それぞれ、って言うからね。"
1009705-69 = "キヴォトス全域を対象にすれば、#nくさやが好きな人もたくさんいるってこと。"
1009705-70 = "最近はユニークな食べ物に挑戦するのがネットで流行ってるし、#nもしかしたら……って思ったんだ。"
1009705-71 = "この注文数なら、今ある在庫も全部売れるんじゃないか？"
1009705-72 = "……よし！#nさっさと調理場に行って、くさやを作らなきゃな。#n助かったよ、風倉ちゃん！"
1009705-79 = "なに、先生。#nそんな目で見てさ……。"
1009705-80 = "[s1] \"モエを疑ってるわけじゃないけど……。\"\n[s2] \"少し驚いてさ。\""
1009705-83 = "私だって、何でも爆発で解決するわけじゃないよ。"
1009705-84 = "やって良い時と悪い時の区別くらいしてるんだから。"
1009705-85 = "……まあ、今回の件を手伝ったのは破滅させるためだけどね。"
1009705-86 = "[s] \"破滅……？\""
1009705-87 = "だって、これでくさやがキヴォトス全域に広まったら、#nあちこちからくさやの悪臭が漂うようになるでしょ？"
1009705-88 = "もし魅力にハマる人が続出したら……。"
1009705-89 = "ああっ、考えただけでゾクゾクする……！"
1009705-90 = "[s3] \"動機が不純だね……。\"\n[s4] \"……でも、良いことには違いないね。\""
1009705-95 = "[ns5] \"頑張ったモエには、あとで美味しいものをご馳走するよ。\"\n[ns6] \"何か食べたいのはある？\""
1009705-98 = "美味しいもの、か……。"
1009705-99 = "そういえば、この村には「くさや鍋」もあるんだって。"
1009705-100 = "くさや以上に強烈な臭いがするんだとか……。"
1009705-101 = "……先生、一緒に破滅の臭いを味わいにいかない？"
1009705-103 = "（その後、モエと一緒に漁村の食堂でくさや鍋を食べた）"
1009705-104 = "（味は美味しかったが、あまりにも強烈な臭いが口に残ってしまった……）"
