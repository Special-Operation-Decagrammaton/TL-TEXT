[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1009705-1 = "Informações Logísticas" 
1009705-3 = "（Enquanto dava um passeio na praia com a Moe bem cedo pela manhã...）" 
1009705-10 = "Olha lá, são os tios pescadores." 
1009705-11 = "Oooi~ Tio, a pescaria hoje rendeu?" 
1009705-16 = "......Opa, se não é a Kazekura-chan." 
1009705-17 = "Pois é, pescamos bem mais do que o normal hoje, mas..." 
1009705-18 = "Wow, isso é dourado-do-mar?\nE vocês pescaram tanto que nem cabe mais no armazém!" 
1009705-19 = "Vocês deveriam estar pulando de alegria com tanta fartura assim, não?" 
1009705-20 = "Normalmente, sim, a gente ficaria muito feliz, mas..." 
1009705-21 = "Qual foi o problema?\nVocê tá com uma cara de quem comeu e não gostou..." 
1009705-22 = "O negócio é o seguinte..." 
1009705-25 = "Falta lugar pra guardar tanto peixe?" 
1009705-26 = "É. A 'Red Hook Express', que cuidava do processamento e distribuição dos nossos frutos do mar, teve que suspender as operações por um tempo..." 
1009705-27 = "Até a gente conseguir fechar acordo com uma nova empresa, a quantidade de peixe que a gente consegue despachar tem um limite bem baixo." 
1009705-28 = "E é impossível o pessoal da nossa vila consumir toda essa quantidade de peixe antes que estrague..." 
1009705-29 = "[s] \"Nossa, que situação complicada.\"" 
1009705-30 = "Mas jogar tudo isso fora também é um puta desperdício..." 
1009705-31 = "Bem, acho que o único jeito vai ser transformar tudo em Kusaya." 
1009705-32 = "......Kusaya?" 
1009705-33 = "Sim, é um método tradicional de peixe seco fermentado e salgado aqui da nossa vila.\nSe fizermos Kusaya, podemos preservar a carne por pelo menos 1 ano." 
1009705-34 = "Ué, então não tem problema nenhum, né?" 
1009705-35 = "......A questão é que fazer Kusaya não adianta de nada se não tiver quem compre. Ia só virar estoque acumulado." 
1009705-36 = "Até mesmo aqui na vila, tem gente que odeia o sabor e o cheiro disso." 
1009705-37 = "Aiai, quem diria que eu veria o dia em que uma pescaria farta me traria tanta dor de cabeça..." 
1009705-42 = "Humm, sabe, eu acho que tenho uma boa ideia." 
1009705-43 = "Espera só um minutinho, tios." 
1009705-49 = "Se eu adicionar o nome do produto bem aqui... Beleza!" 
1009705-50 = "Pronto, tenta usar esse aplicativo aqui." 
1009705-51 = "Ué, aplicativo de quê...?" 
1009705-52 = "É um app feito pra promover produtos locais de várias regiões de Kivotos." 
1009705-53 = "Ele foi programado pra te mandar uma notificação direto no celular assim que alguém quiser comprar Kusaya." 
1009705-54 = "Ahahaha~.\nQual é, quem nesse mundo em sã consciência iria querer comer o nosso Kusaya..." 
1009705-60 = "＜É verdade que esse peixe salgado aí tem um cheiro que bate os 1000 na escala de Unidade de Alerta (AU)?＞" 
1009705-61 = "＜Eu vim aqui pelo desafio de comer Kusaya que eu vi no canal de culinária!＞" 
1009705-62 = "＜Todo mundo ficou me dizendo 'Cara, você nunca vai conseguir comer isso', agora eu tô morrendo de vontade de experimentar!＞" 
1009705-63 = "＜Eu vou comprar isso de presente de aniversário pro meu amigo que se acha o fodão dos desafios!＞" 
1009705-64 = "＜Eu sempre quis provar um fruto do mar com um cheiro pesadão e forte, manda pra cá!＞" 
1009705-66 = "U-Uma enxurrada de pedidos do nada...\nCem, não... tem mais de MIL pedidos!" 
1009705-67 = "Eu não imaginava que tinha tanta gente por Kivotos querendo comer Kusaya..." 
1009705-68 = "Kuhihi...\nComo diz o ditado, gosto não se discute." 
1009705-69 = "E se você olhar pra toda Kivotos,\né óbvio que ia encontrar uma penca de malucos que adoram Kusaya." 
1009705-70 = "Recentemente, comer coisas estranhas e desafiadoras virou moda na internet,\nentão eu imaginei que ia rolar um hype." 
1009705-71 = "Com esse volume de pedidos, o estoque de vocês vai esgotar num piscar de olhos, não é?" 
1009705-72 = "......Beleza!\nTemos que ir correndo pra cozinha preparar o Kusaya!\nVocê salvou a nossa pele, Kazekura-chan!" 
1009705-79 = "O que foi, Sensei.\nPor que tá me olhando assim...?" 
1009705-80 = "[s1] \"Não estou desconfiando de você, Moe, mas...\"\n[s2] \"Fiquei um pouco surpreso.\"" 
1009705-83 = "Qual é, eu também não resolvo os meus problemas só metendo bomba em tudo, sabe." 
1009705-84 = "Eu sei muito bem a hora certa de fazer as coisas e a hora de ficar de boa." 
1009705-85 = "......Mas, pra ser honesta, eu só ajudei eles porque eu queria espalhar um pouco de caos também." 
1009705-86 = "[s] \"Caos...?\"" 
1009705-87 = "Pensa bem. Se todo esse Kusaya podre e fedorento for enviado e espalhado por toda Kivotos,\no cheiro horrendo vai tomar conta de vários lugares, não vai?" 
1009705-88 = "E imagina o pandemônio se uma galera começar a ficar viciada nisso..." 
1009705-89 = "Aaah, só de imaginar o cheiro me dá calafrios...!" 
1009705-90 = "[s3] \"Esse motivo é bem impuro...\"\n[s4] \"...Mas de fato foi uma boa ação, não tenho o que dizer.\"" 
1009705-95 = "[ns5] \"Pelo seu bom trabalho, Moe, vou pagar uma comida bem gostosa pra você mais tarde.\"\n[ns6] \"O que você tá a fim de comer?\"" 
1009705-98 = "Uma comida gostosa, hein..." 
1009705-99 = "Ah, lembrei. Os tios pescadores disseram que a vila é famosa por um prato chamado 'Nabe de Kusaya' (Ensopado de Peixe Seco)." 
1009705-100 = "Ouvi dizer que tem um fedor mil vezes mais forte que o Kusaya normal..." 
1009705-101 = "......Sensei, quer vir saborear esse aroma da ruína e do apocalipse comigo?" 
1009705-103 = "（Depois disso, fomos juntos até a cantina da vila saborear o Nabe de Kusaya.）" 
1009705-104 = "（O gosto até que não era ruim, mas o cheiro monstruoso ficou entranhado na minha boca e demorou dias para sair...）" 