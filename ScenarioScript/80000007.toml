[translation]
80000007-1 = "最高の疲労回復剤"
80000007-2 = "シャーレ・オフィス"
80000007-3 = "（必死に業務を終え、当番のために訪れていたハナエのもとへ向かった。）"
80000007-7 = "先生、もしかして昨夜はまた徹夜ですか？"
80000007-8 = "徹夜は体に悪いって何度もお伝えしましたのに！"
80000007-9 = "[s1] \"ちょっと仕事が多くてね……。\"\n[s2] \"やむを得ず……。\""
80000007-10 = "ではそんな先生のために、疲れが取れる飲み物を用意してきます！"
80000007-11 = "ではそんな先生のために、疲れが取れる飲み物を用意してきます！"
80000007-12 = "先生はお席で少しでも目をつぶっててください。"
80000007-13 = "[s] \"さっきまでコーヒーはかなり飲んじゃって……。\""
80000007-14 = "いえいえ、ご安心ください！"
80000007-15 = "私がご用意する飲み物は、コーヒーよりももっとすごい効き目を持っていますので。"
80000007-19 = "[ns] \"ちょっと不安……。\""
80000007-25 = "（ハナエが何やら怪しげな、黒い液体の入ったコップを持ってきた……）"
80000007-26 = "お待たせしました～！ハナエ特製、カフェイン濃縮飲料です！"
80000007-27 = "これ一杯でなんと、普通のコーヒー200杯分のカフェインが！一口でパッと目が覚めること間違いなしです！"
80000007-28 = "[s] \"もはや身体に毒では！？\""
80000007-29 = "あれ？お気に召しませんでしたか？"
80000007-30 = "困りましたね。他にお持ちできるのは、コーヒーかホットチョコくらいしか……。"
80000007-31 = "[s] \"ホットチョコで十分ありがたいです……。\""
80000007-32 = "チョコレートはコーヒーよりカフェインの含有量が少ないですし、先生の目を覚ますことができないかもしれませんが……。"
80000007-33 = "ですが、先生がそうお望みであれば！任せてください！"
80000007-34 = "今すぐホットチョコを作って来ます！"
80000007-45 = "お待たせいたしました。ハナエ特製ホットチョコです！"
80000007-46 = "チョコレートの上に、可愛いウサギさんのマシュマロもたくさん入れましたよ！"
80000007-47 = "[s] ハナエのホットチョコを飲む。"
80000007-52 = "美味しいですか？それは何よりです！来る途中で見かけたのですが、チョコを買っておいて正解ですね！"
80000007-53 = "ですが、今日はどうしてあんなに道端でチョコを売っていたのでしょうか？"
80000007-54 = "……はい？バレンタインデー？"
80000007-55 = "あー……そ、そう言えばもうそんな時期ですね……うっかりしてました。"
80000007-56 = "偶然ですが、先生にチョコレートをお渡しすることができて良かったです。"
80000007-60 = "……私のチョコレート、最後までしっかり飲んでくださいね？"
