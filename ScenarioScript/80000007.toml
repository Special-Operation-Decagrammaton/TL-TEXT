[translation]
80000007-1 = "O melhor remédio para a fadiga"
80000007-2 = "Escritório do Schale"
80000007-3 = "（Terminei o trabalho desesperadamente e fui até onde Hanae, que estava lá para o seu turno, me esperava.）"
80000007-7 = "Sensei, por acaso você passou a noite em claro de novo?"
80000007-8 = "Eu já lhe disse várias vezes que ficar acordado a noite toda faz mal para a saúde!"
80000007-9 = "[s1] \"Eu tive um pouco de trabalho para fazer...\"\n[s2] \"Não tive escolha...\""
80000007-10 = "Então, para o Sensei, vou preparar uma bebida que vai tirar todo o seu cansaço!"
80000007-11 = "Então, para o Sensei, vou preparar uma bebida que vai tirar todo o seu cansaço!"
80000007-12 = "Sensei, por favor, feche os olhos e descanse um pouco na sua cadeira."
80000007-13 = "[s] \"Eu já tomei bastante café agora há pouco...\""
80000007-14 = "Não, não, pode ficar tranquilo!"
80000007-15 = "A bebida que vou preparar para você tem um efeito muito mais potente que o café."
80000007-19 = "[ns] \"Estou um pouco preocupado...\""
80000007-25 = "（Hanae trouxe um copo com um líquido preto de aparência suspeita...）"
80000007-26 = "Desculpe a demora! Aqui está a bebida concentrada de cafeína especial da Hanae!"
80000007-27 = "Com apenas um copo, você consome o equivalente a 200 xícaras de café! Com certeza você vai despertar num piscar de olhos!"
80000007-28 = "[s] \"Isso não é praticamente um veneno para o corpo!?\""
80000007-29 = "Ué? Não foi do seu agrado?"
80000007-30 = "Que complicado. As únicas outras opções que posso trazer são café ou chocolate quente..."
80000007-31 = "[s] \"O chocolate quente já seria mais do que suficiente...\""
80000007-32 = "O chocolate tem menos cafeína que o café, então talvez não consiga te manter acordado, mas..."
80000007-33 = "Mas, se é isso que o Sensei deseja! Pode deixar comigo!"
80000007-34 = "Vou preparar o chocolate quente agora mesmo!"
80000007-45 = "Desculpe a demora. Aqui está o chocolate quente especial da Hanae!"
80000007-46 = "Coloquei muitos marshmallows de coelhinho fofos por cima do chocolate também!"
80000007-47 = "[s] Beber o chocolate quente da Hanae."
80000007-52 = "Está gostoso? Fico muito feliz! Eu vi no caminho para cá, então foi uma boa ideia ter comprado o chocolate!"
80000007-53 = "Mas, por que será que estavam vendendo tanto chocolate na rua hoje?"
80000007-54 = "……Sim? Dia dos Namorados?"
80000007-55 = "Ah... é, agora que você falou, já é essa época do ano... eu tinha esquecido completamente."
80000007-56 = "Foi uma coincidência, mas fico feliz por ter conseguido te dar um chocolate, Sensei."
80000007-60 = "……Certifique-se de beber todo o meu chocolate até o fim, está bem?"
