[translation]
10032065-8 = "……ここか。"
10032065-9 = "……応援はまだか？思ったより遅いな。"
10032065-10 = "いや、愚痴を言っている場合じゃない。#nこうなれば、応援が駆けつけるまで依頼人を守るだけだ。"
10032065-11 = "幸い、ここの地形は作戦の遂行に適している。"
10032065-15 = "…………。"
10032065-16 = "便利屋68……"
10032065-17 = "もうたどり着いたのか……厄介な。"
10032065-18 = "[s1] \"追いついたよ、サオリ。\"\n[s2] \"カヨコの言った通りだね。\""
10032065-21 = "先生まで……"
10032065-28 = "……待って。"
10032065-29 = "アランチーノは一緒じゃなかったの？"
10032065-30 = "……それと、あなたが担いでいるその袋は何かしら。"
10032065-34 = "まさかと思うけど、もしかして……"
10032065-35 = "[s3] \"ドン・アランチーノを……\"\n[s4] \"袋の中に入れて運んだの……？\""
10032065-38 = "……？"
10032065-39 = "……そうだが、何か問題でも？"
10032065-44 = "…………？"
10032065-45 = "…………？"
10032065-50 = "[ns] \"…………？\""
10032065-55 = "た、たしかに良い方法かもしれませんが……"
10032065-56 = "あははははっ！何それ！大胆すぎる！！"
10032065-58 = "いや、良いわけないでしょ。完全にアウトだから。"
10032065-59 = "な、なんだ……？#nまるで私の行動がおかしいかのような口ぶりだが。"
10032065-60 = "それに先生は、なぜさっきから便利屋68と一緒に居るんだ？"
10032065-61 = "BDはどうなった？"
10032065-63 = "……冗談なのかしら？それとも本気で？"
10032065-64 = "たぶん、あっちはあっちで感覚がズレてるんだと思う……"
10032065-66 = "……ふむ。"
10032065-67 = "今はBDよりも優先するべきことができた、と……？#nそれはどういう……"
10032065-79 = "……！"
10032065-80 = "ちょうどいいタイミングだ。"
10032065-82 = "な、なに！？黒い車が次々と……！"
10032065-83 = "すっごい数だね？"
10032065-85 = "……遅かったか。"
10032065-86 = "わ、私が全部……！"
10032065-91 = "待って、ハルカ。まずは様子を見よう。"
10032065-92 = "たぶん、ボスの救出に来た主力……流石に数が多すぎる。"
10032065-100 = "みんな、よく来てくれた。依頼人はここに……"
10032065-106 = "動くな！すでに包囲されてる！！"
10032065-107 = "命が惜しけりゃ、大人しくボスを返せ！"
10032065-111 = "……なん、だと？"
10032065-112 = "[ns5] \"サオリを囲んだ……？\"\n[ns6] \"どうしてサオリに銃口を……？\""
10032065-115 = "何か誤解があるようだな。"
10032065-116 = "私はお前たちの敵ではない。"
10032065-117 = "こうして依頼人を連れてきたじゃないか。"
10032065-118 = "依頼人……？誰だ？何の話をしている！！"
10032065-119 = "誰って、それは……"
10032065-126 = "……この人だが？"
10032065-127 = "自分を護衛し、安全な場所まで連れて行くよう命じられた。"
10032065-128 = "…………？"
10032065-129 = "な……"
10032065-132 = "何をバカみたいなこと言ってんだ！！そう言われて信じろと！？"
10032065-134 = "……？"
10032065-135 = "……ああ、その通りだ。"
10032065-136 = "バカにするのも大概にしろ！"
10032065-137 = "嘘にも限度ってモンがあってだな！！"
10032065-139 = "どうしてこうなった……"
10032065-140 = "私は誰もバカになどしていない。"
10032065-141 = "そもそも、こちらの世界で私はまだ新人だ。#nベテランのお前たちをバカになどするわけないだろう？"
10032065-145 = "あいつ、さっきから何を言ってるんだ……？"
10032065-146 = "うちのボスをさらっておいて、言い訳しようってか！？"
10032065-148 = "さらう……？どういう意味だ？"
10032065-149 = "これは効率的に移動するための手段だ。#nおかげで、お前たちとも合流できたじゃないか。"
10032065-150 = "何か問題でもあるのか？"
10032065-152 = "……本気だったみたいね。"
10032065-154 = "…………。"
10032065-155 = "[s7] \"サオリなら、そう考えてもおかしくない……かな。\"\n[s8] \"効率とは、一体……\""
10032065-158 = "……うむ。"
10032065-159 = "困ったな、疑いが晴れそうもない。"
10032065-160 = "こうなった以上、本人に証言してもらおう。"
10032065-161 = "おい、起きろ。いつまで寝てるんだ。"
10032065-162 = "……おい。"
10032065-167 = "うっ、うぅぅ……"
10032065-168 = "こ、こいつ！今ボスを殴ったぞ！？"
10032065-170 = "……？？？"
10032065-171 = "いや、殴ってなどいない。起こそうとしただけだが……"
10032065-172 = "もう待てねぇ！どうせ相手は一人！全員構えろ！"
10032065-173 = "[ruby=や]殺[/ruby]っちまえ！！"
10032065-178 = "な、なぜだ！？どうしてそうなる！？"
10032065-182 = "……まさか！"
10032065-183 = "私はまた騙されたのか……！！"
10032065-184 = "うまく利用され、捨てられるだなんて……！！"
10032065-185 = "[s9] \"今回はちょっと違うような……\"\n[s10] \"サオリ、その……\""
10032065-190 = "……ふぅ。"
10032065-191 = "……ハルカ。"
10032065-192 = "は、はい！アル様！！"
10032065-193 = "……戦う準備をしなさい。錠前サオリに手を貸すわよ。"
10032065-194 = "は、はい！"
10032065-199 = "……はい？"
10032065-204 = "えっ？"
10032065-205 = "アルちゃん、今なんだって？手を貸すって……？"
10032065-206 = "……社長？"
10032065-207 = "あれ……あの人って、敵じゃなかったんですか……？"
10032065-208 = "あ、い、いえ！口答えをするつもりじゃ……！#nす、すぐに準備します！"
10032065-215 = "[ns11] \"……アル？\"\n[ns12] \"サオリを助けてくれるの？\""
10032065-218 = "……ふんっ。助けるだなんて、語弊があるわ。"
10032065-219 = "私は、ただ依頼を遂行するだけよ。だって、絶好のチャンスじゃない？"
10032065-220 = "まずは錠前サオリに協力してあの数を何とかしてから、ボスを連れ去る。#n呉越同舟といったところかしら？"
10032065-221 = "利益のためなら、誰とでも手を組む。それがハードボイルドの世界よ。"
10032065-222 = "協力なんて無いって、さっき言ってたような気がするけどね～"
10032065-223 = "べ、別に仲間になるわけじゃないし、細かいことは気にしないで！"
10032065-224 = "……それに、これはあくまでターゲットを確保するため！"
10032065-225 = "[s13] \"……ありがとう、アル。\"\n[s14] \"やっぱり頼もしいね。\""
10032065-230 = "……ふふ、前置きが長くなったわ。"
10032065-231 = "みんな……"
10032065-232 = "今度こそ行くわよ！！"
10032065-233 = "……突撃！！"
