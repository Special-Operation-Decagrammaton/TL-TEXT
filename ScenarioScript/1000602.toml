[translation]
1000602-1 = "O mal-entendido dela"
1000602-2 = "Kivotos - Distrito Comercial"
1000602-4 = "Deixei cair 100 ienes na frente da máquina de venda automática."
1000602-5 = "……A moeda rolou direto, passou por uma fresta e desapareceu no esgoto."
1000602-6 = "[s] Abrir a tampa, descer e procurar a moeda."
1000602-8 = "(Clang)"
1000602-11 = "……Ei, o que você está fazendo aí?"
1000602-16 = "……Sensei?"
1000602-17 = "[s] \"………。\""
1000602-18 = "………。"
1000602-19 = "[s] \"………。\""
1000602-20 = "Acho melhor avisar o Comitê Disciplinar que peguei o pervertido de quem todos falam……."
1000602-21 = "[s] \"É um mal-entendido.\""
1000602-22 = "Mal-entendido? Do que você está falando?"
1000602-23 = "Existe algum motivo para alguém se dar ao trabalho de abrir a tampa do bueiro e entrar lá dentro?"
1000602-24 = "Se existe, é porque você estava tentando se esconder no esgoto para olhar por baixo das saias das alunas, com certeza."
1000602-25 = "[s] Explicar a situação."
1000602-26 = "Entrou no esgoto para pegar uma moeda?"
1000602-27 = "……O Sensei do Schale está vivendo uma situação tão difícil a ponto de ter que entrar no esgoto por causa de uma moeda……."
1000602-28 = "Sensei, se quiser beber alguma coisa, eu pago para você."
1000602-29 = "Diz que não pode incomodar uma aluna?#nNão, tudo bem, são só 100 ienes."
1000602-30 = "De agora em diante, não entre no esgoto só porque deixou cair uma moeda."
1000602-31 = "Não é porque está sem dinheiro?#nEntão por que……."
1000602-32 = "[s1] \"Aqui é surpreendentemente fresco e agradável, sabe?\"\n[s2] \"Desta posição, dá para ver bem as pernas da Iori.\""
1000602-33 = "O-o que você está dizendo!?"
1000602-34 = "O-o que você está dizendo!?"
1000602-35 = "Pervertido, morra!!"
1000602-37 = "Depois disso, encontrei a moeda, mas fui mal interpretado pela Iori."
