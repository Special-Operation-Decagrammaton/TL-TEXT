[translation]
10027115-14 = "同人会場"
10027115-16 = "……。"
10027115-17 = "結局、間に合いませんでしたわね……「知識解放戦線」。"
10027115-18 = "ある程度予想はしておりましたが――奇跡は起こらないからこそ、奇跡と呼ぶもの。"
10027115-19 = "仕方がありません。評論家であり、会長として公平さは守るべきもの。"
10027115-20 = "いつかまた、別の機会に縁があることを願って、この辺りで……。"
10027115-25 = "待って！！！"
10027115-26 = "「知識解放戦線」、ただいま着きました！"
10027115-28 = "……バカな。#n本当に、時間内に原稿を完成させたというのですか！？"
10027115-30 = "そうだよ……受け取りなさい！"
10027115-35 = "これは、たしかに……！"
10027115-44 = "原稿は、たしかに頂きました。"
10027115-45 = "ですが、正直まだ信じられません……#n途中で何か違法な手段でも使ったのではありませんか？"
10027115-47 = "私たちを一体何だと思ってるの……"
10027115-53 = "[ns] \"みんな……本当に……一生懸命……頑張ったから……。\""
10027115-54 = "せ、先生！？ここで倒れるのは……！"
10027115-55 = "[s] \"大丈夫！まだいける！\""
10027115-56 = "……本当に大丈夫なのですよね？"
10027115-58 = "……先生が手伝ってくれなかったら……#nきっと、完成しなかったと思います。"
10027115-59 = "……ここまで来るだけでも、事務局に、工務部に……はあ……。"
10027115-61 = "事務局と工務部の名前がなぜここで出てくるのか理解できませんが、とにかく分かりました。"
10027115-62 = "そういえば……お二人は、ちゃんと仲直りできたのですね？"
10027115-64 = "そもそも、そんな深刻なケンカじゃなかったし。#nというか、元はと言えば……"
10027115-65 = "……メル先輩？"
10027115-66 = "……いや、うん。ごめん。#nちゃんと謝って仲直りしたよ……"
10027115-68 = "そうなのですね。まずは、おめでとうと言っておきましょうか。#n原稿の内容とクオリティに関しては……"
10027115-69 = "……。"
10027115-70 = "読まなくても、皆さんの姿を見れば十分察しがつきますわ。"
10027115-72 = "へん。また素直になれないパターンね。こういう時すっごく分かりやすいのよ、あんた。このメル様にできないとでも思った？ビックリした？感動した？"
10027115-73 = "流石はメルリー様……私の狭き視野では到底計り知れない、心の広い偉大なお方！……って、驚いてるんでしょう！？"
10027115-74 = "本当に、貴女という人は……！"
10027115-79 = "うわっ！？最後までそれ！？"
10027115-80 = "貴女もほんっとうに変わりませんわね！"
10027115-81 = "それ、こっちのセリフだけど！？"
10027115-83 = "少しは成長してくださいな！"
10027115-84 = "いや、私はいつでも成長中ですけど！？"
10027115-89 = "[ns1] \"ささ、ちゃんと原稿はできたよ。\"\n[ns2] \"あとは、タカネに見てもらうだけ。\""
10027115-93 = "……お二方が和解した時点で、状況は変わってしまったような気もしますが……"
10027115-94 = "手順は正しく踏まなければ。そして私も、評論家としての役目を全ういたします。"
10027115-95 = "それではメルリーさん。#n貴女の原稿、読ませていただきますわ。"
10027115-103 = "ストップ、ストーップ。タンマですよ。"
10027115-105 = "誰……？"
10027115-106 = "あら？"
10027115-112 = "いや～やりましたね、メル。#nメルならやってくれると信じてました。"
10027115-114 = "ヤクモ！？"
10027115-115 = "へ、編集長……いえ、部長！？"
