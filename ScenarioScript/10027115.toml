[translation]
10027115-14 = "Local do evento de doujin"
10027115-16 = "……。"
10027115-17 = "No fim, vocês não conseguiram chegar a tempo... \"Frente de Libertação do Conhecimento\"."
10027115-18 = "Eu já esperava por isso até certo ponto — milagres são chamados de milagres justamente porque não acontecem."
10027115-19 = "Não há o que fazer. Como crítica e presidente, devo manter a imparcialidade."
10027115-20 = "Espero que tenhamos outra oportunidade no futuro, então, por aqui..."
10027115-25 = "Espere!!!"
10027115-26 = "A \"Frente de Libertação do Conhecimento\" acabou de chegar!"
10027115-28 = "……Impossível. #nVocês realmente terminaram o manuscrito dentro do prazo!?"
10027115-30 = "É isso mesmo... pode pegar!"
10027115-35 = "Isso é, de fato...!"
10027115-44 = "Recebi o manuscrito."
10027115-45 = "Mas, honestamente, ainda não consigo acreditar... #nVocês não usaram algum método ilegal no caminho, usaram?"
10027115-47 = "O que você pensa que nós somos..."
10027115-53 = "[ns] \"Todo mundo... realmente... se esforçou... muito...\""
10027115-54 = "S-Sensei!? Desmaiar aqui não é...!"
10027115-55 = "[s] \"Tudo bem! Ainda consigo continuar!\""
10027115-56 = "……Você tem certeza de que está bem?"
10027115-58 = "……Se o Sensei não tivesse nos ajudado... #nTenho certeza de que não teríamos terminado."
10027115-59 = "……Só de chegar até aqui, passando pela secretaria, pelo departamento de obras... ah..."
10027115-61 = "Não entendo por que a secretaria e o departamento de obras foram mencionados aqui, mas, de qualquer forma, entendi."
10027115-62 = "Falando nisso... vocês duas conseguiram se reconciliar de verdade, não é?"
10027115-64 = "Para começo de conversa, nem foi uma briga tão séria assim. #nNa verdade, se formos ver a origem..."
10027115-65 = "……Senpai Meru?"
10027115-66 = "……Não, é. Desculpa. #nEu pedi desculpas direito e nos reconciliamos..."
10027115-68 = "Entendo. Primeiro, devo dizer parabéns. #nQuanto ao conteúdo e à qualidade do manuscrito..."
10027115-69 = "……。"
10027115-70 = "Mesmo sem ler, só de olhar para vocês, já consigo imaginar o resultado."
10027115-72 = "Humpf. Lá vem você sendo teimosa de novo. Você é tão previsível nessas horas. Achou que eu, a grande Meru, não conseguiria? Ficou surpresa? Ficou emocionada?"
10027115-73 = "Como esperado da grande Meru-sama... uma pessoa de coração tão vasto que minha visão limitada jamais poderia medir! ...Quer dizer, você está surpresa, não está!?"
10027115-74 = "Sinceramente, você é uma pessoa que..."
10027115-79 = "Ué!? Vai continuar com isso até o fim!?"
10027115-80 = "Você também não muda nada, hein!"
10027115-81 = "Isso é o que eu deveria dizer!?"
10027115-83 = "Cresça um pouco, por favor!"
10027115-84 = "Não, eu estou em constante crescimento, sabia!?"
10027115-89 = "[ns1] \"Pronto, o manuscrito está feito.\"\n[ns2] \"Agora só falta a Takane dar uma olhada.\""
10027115-93 = "……Sinto que a situação mudou desde o momento em que vocês duas se reconciliaram, mas..."
10027115-94 = "Os procedimentos devem ser seguidos corretamente. E eu cumprirei meu papel como crítica."
10027115-95 = "Então, Meru-san. #nPermita-me ler o seu manuscrito."
10027115-103 = "Parem, parem. Tempo, pessoal."
10027115-105 = "Quem é...?"
10027115-106 = "Ora?"
10027115-112 = "Nossa, vocês conseguiram, Meru. #nEu sabia que se fosse você, conseguiria."
10027115-114 = "Yakumo!?"
10027115-115 = "E-Editora-chefe... não, diretora!?"
