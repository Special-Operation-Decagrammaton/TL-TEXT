[translation]
10004030-1 = "第3話;ちょっとした仕返し"
10004030-2 = "梅花園の付近の公園"
10004030-3 = "到着です！"
10004030-4 = "[s1] \"ここって……。\"\n[s2] \"……公園？\""
10004030-5 = "はい、そうです。"
10004030-6 = "はい、そうです。"
10004030-7 = "梅花園の近くにある割には、あまり誰も来ないので、ゆっくり休みたい時なんかにピッタリなんです。"
10004030-8 = "私もお仕事の合間によく……"
10004030-9 = "いえ、シュンお姉ちゃんがここに来るのを、何度か見たことがあります！"
10004030-11 = "良い感じの場所がたくさんあるのですが、私のおすすめのポイントはここ！"
10004030-12 = "木で作られた、この椅子とテーブルです！"
10004030-13 = "座るとちょうどテーブルが良い位置にあって、胸を支えてくれるのですっごく楽なんです！"
10004030-14 = "肩こりが辛いときはよくここで――"
10004030-15 = "[s3] \"……胸？\"\n[s4] \"……肩こり？\""
10004030-18 = "あっ……え、えっとですね……。"
10004030-19 = "その、つまり……もしこの先成長して胸も大きくなれば、そうなるだろうなっていう……！"
10004030-20 = "将来性はものすっごいですので！"
10004030-21 = "[s5] \"それはそうだね。\"\n[s6] \"何だかそのセリフ、聞いたことあるような……？\""
10004030-22 = "と、とにかく！"
10004030-23 = "と、とにかく！"
10004030-24 = "せっかく公園に来たんですし、先生も遊びましょう！"
10004030-26 = "何にしますか？シーソーでも良いですし、あのバネがついた動物の乗り物も楽しそうですし……。"
10004030-27 = "あ、ブランコも良いですよね！"
10004030-28 = "以前からブランコに乗って、後ろから押してもらいたいと思ってたんです！先生、行きましょう！"
10004030-29 = "[s] \"えっと、シュンを探しに来たんじゃなかったっけ……？\""
10004030-30 = "あ、あぅ……。"
10004030-35 = "あれ、先生？この公園にいるなんて珍しいですね。"
10004030-36 = "こ、ココナちゃん……！？どうしてここに？"
10004030-37 = "えっと、そっちの子は？"
10004030-43 = "多分初めましてだと思うけど、梅花園に新しく来た子だったり？"
10004030-44 = "は、はいっ！そうでした！つい最近こちらに来た、シュエリンです！"
10004030-45 = "（もしかして、ココナちゃんも私が誰だか気づいてないのでしょうか……？）"
10004030-46 = "（良かったです。私だと分かった上で先ほどの場面を見られていたら、流石に恥ずかしいですからね……）"
10004030-47 = "（ですが、ちょっと寂しいですね。少し幼くなったとはいえ、妹に気が付いてもらえないというのは……）"
10004030-48 = "……何だかすごく親近感があるんだけど、私たちどこかで会ったことある？"
10004030-49 = "シュン姉さんに聞けば分かるかな……あ、そうそう。シュン姉さんがどこかに行っちゃったんですよ、先生。それでもしかしたらここに来てるかなって思いまして。"
10004030-50 = "[s] \"ココナも、シュンを探してたの？\""
10004030-51 = "はい、さっきから連絡が取れないんです。"
10004030-52 = "急にいなくなっちゃったので、シュン姉さんの分まで園児たちのおやつの準備をしなくちゃで、大変だったんですよ……。"
10004030-53 = "（そ、そのひまわり組のおやつの準備は、もともとココナちゃんの担当でしたよね……！？）"
10004030-54 = "確かに、最近のシュン姉さんはちょっと様子が変でしたが……。"
10004030-55 = "まあ多分、またいつもの悩みだと思います。"
10004030-56 = "どんどん歳を重ねてしまう、とか、お肌の調子が、とか……そんなこと気にしなくても良いのに。"
10004030-57 = "（「そんなこと」ではありません！一大事なんですよ！？）"
10004030-58 = "そもそも、日ごろ「最近体重が……」って言ってる傍から甘いものを食べてるし……こう考えると、結構シュン姉さんって子どもっぽいんですよね。"
10004030-59 = "もしかしたら今頃、どこかで甘いタンフールーでも食べながら、時間のことを忘れちゃってるだけなのかもしれません。"
10004030-60 = "（せ、先生の前で何てことを……！）"
10004030-61 = "（タンフールーの件は、確かに一部当たってはいますが……それでも、いくらココナちゃんとはいえ許せません！）"
10004030-62 = "……ココナちゃんも十分子どもっぽいですよ！人参なんて苦くて食べられないって、毎回こっそりよけてるじゃないですか！"
10004030-63 = "えっ、ど、どうしてあなたがそれを知ってるの？"
10004030-64 = "シュンお姉ちゃんが言ってました。ココナ教官は好き嫌いばっかりするから、まだまだ子どもなんですよって。"
10004030-65 = "うぅ……！どうしてシュン姉さん、子どもたちにそういうことを言っちゃったの……！？"
10004030-66 = "……こほん。えっとね、あなたはまだ小さいから分からないかもしれないけど、私はもう立派なレディーなの。"
10004030-67 = "レディーにはそれぞれの個性があって、私はたまたま「人参が苦手」っていう個性を持っちゃっただけで……。"
10004030-68 = "嘘です。本当のレディーは嫌いな食べ物もちゃんと食べられます。"
10004030-69 = "それに、「背を高くするためのばんざい体操」を毎朝やったりもしません！"
10004030-70 = "ど、どうしてそれを……！？他の人にバレないように、早朝にだけやるようにしてたのに……！"
10004030-71 = "ところであの体操、あんまり効果は無いと思いますよ。玄龍門のキサキ会長も以前やってましたが、結局意味無かったと言ってやめられてましたし。"
10004030-76 = "ですから好き嫌いばかりしてると、あとついでにお姉ちゃんの悪口を言っていると、ココナちゃんはいつまでもその身長のままです！"
10004030-81 = "うっ、ううぅぅっ……！"
10004030-82 = "あなたの顔、覚えたからね！覚えておきなさいよ！"
10004030-87 = "そうやって言う方ほど、大したことないんですよーだ！"
10004030-90 = "（な、何だか、心に浮かんでくるままに好き放題喋ってしまいましたが……スッキリしました！）"
10004030-91 = "（こんなに好き勝手できるなんて……この身体、結構悪くないですね！）"
10004030-92 = "[s] \"……シュエリン？\""
10004030-93 = "あ……。"
10004030-94 = "[s] \"お姉さんをあんまりからかっちゃダメだよ？\""
10004030-95 = "えっと、お姉さんは一応私の方なのですが……。"
10004030-96 = "ですが、確かに言い過ぎたかもしれません……。"
10004030-97 = "[s] \"今度ココナに会ったら、ちゃんと謝ろうね？\""
10004030-98 = "はーい。"
10004030-99 = "……。"
10004030-100 = "シュンお姉ちゃんはここにもいないみたいですし……別の場所に行きましょうか！"
10004030-104 = "[ns] \"ま、待ってシュエリン……！\""
