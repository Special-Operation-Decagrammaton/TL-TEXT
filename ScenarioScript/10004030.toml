[translation]
10004030-1 = "Episódio 3: Uma pequena vingança"
10004030-2 = "Parque perto do Jardim das Ameixeiras"
10004030-3 = "Chegamos!"
10004030-4 = "[s1] \"Isto é...\"\n[s2] \"...um parque?\""
10004030-5 = "Sim, exatamente."
10004030-6 = "Sim, exatamente."
10004030-7 = "Apesar de ser perto do Jardim das Ameixeiras, quase ninguém vem aqui, então é perfeito para quando quero descansar um pouco."
10004030-8 = "Eu também costumo vir aqui nos intervalos do trabalho..."
10004030-9 = "Não, eu já vi a irmã Shun vindo aqui várias vezes!"
10004030-11 = "Tem muitos lugares bons, mas o meu ponto favorito é este aqui!"
10004030-12 = "Esta mesa e cadeira feitas de madeira!"
10004030-13 = "Quando sento, a mesa fica na altura perfeita para apoiar o meu busto, o que é extremamente confortável!"
10004030-14 = "Quando a dor nos ombros aperta, eu costumo vir aqui..."
10004030-15 = "[s3] \"...Busto?\"\n[s4] \"...Dor nos ombros?\""
10004030-18 = "Ah... b-bem, é que..."
10004030-19 = "Sabe, é que... se eu crescer mais daqui para frente e meu busto aumentar, vai ser assim que vai ficar...!"
10004030-20 = "O potencial para o futuro é enorme!"
10004030-21 = "[s5] \"Faz sentido.\"\n[s6] \"Sinto que já ouvi essa frase antes...?\""
10004030-22 = "E-enfim!"
10004030-23 = "E-enfim!"
10004030-24 = "Já que viemos ao parque, vamos brincar, Sensei!"
10004030-26 = "O que vamos fazer? Pode ser na gangorra, ou aquele brinquedo de mola em formato de animal parece divertido..."
10004030-27 = "Ah, o balanço também é uma boa, não é?"
10004030-28 = "Sempre quis andar no balanço e ser empurrada por alguém! Vamos, Sensei!"
10004030-29 = "[s] \"Espera, a gente não veio aqui para procurar a Shun...?\""
10004030-30 = "Ah, ah..."
10004030-35 = "Ué, Sensei? É raro ver você neste parque."
10004030-36 = "K-Kokona...!? Por que você está aqui?"
10004030-37 = "E quem é essa menina aí?"
10004030-43 = "Acho que é a primeira vez que nos vemos, você é a nova aluna do Jardim das Ameixeiras?"
10004030-44 = "S-sim! Isso mesmo! Cheguei recentemente, meu nome é Xuelin!"
10004030-45 = "(Será que a Kokona também não percebeu quem eu sou...?)"
10004030-46 = "(Ainda bem. Se ela soubesse que sou eu e tivesse visto a cena de agora há pouco, eu morreria de vergonha...)"
10004030-47 = "(Mas, é um pouco triste. Mesmo que eu tenha ficado um pouco mais jovem, o fato de minha irmã não me reconhecer...)"
10004030-48 = "...Sinto uma familiaridade enorme, será que já nos vimos em algum lugar?"
10004030-49 = "Talvez a irmã Shun saiba... Ah, é verdade. A irmã Shun sumiu, Sensei. Por isso pensei que talvez ela estivesse aqui."
10004030-50 = "[s] \"Você também estava procurando a Shun, Kokona?\""
10004030-51 = "Sim, não consigo falar com ela faz um tempo."
10004030-52 = "Ela desapareceu de repente, e eu tive que preparar o lanche das crianças sozinha, foi um trabalhão..."
10004030-53 = "(E-essa tarefa de preparar o lanche do grupo Girassol não era originalmente sua, Kokona...!?)"
10004030-54 = "É verdade que a irmã Shun tem agido de forma estranha ultimamente..."
10004030-55 = "Mas provavelmente é só mais uma das preocupações de sempre dela."
10004030-56 = "Coisas como 'estou ficando velha', 'a pele não está boa'... ela não precisava se preocupar com isso."
10004030-57 = "('Não é 'coisa qualquer'! É um assunto muito sério, sabia!?)"
10004030-58 = "Para começar, ela vive dizendo que 'o peso aumentou' enquanto come doces... pensando bem, a irmã Shun é bem infantil."
10004030-59 = "Talvez ela esteja em algum lugar agora, comendo um tanghulu doce e esquecendo completamente das horas."
10004030-60 = "(C-como você ousa dizer isso na frente do Sensei...!)"
10004030-61 = "(Sobre o tanghulu, até que é verdade em partes... mas mesmo assim, não posso perdoar, nem vindo da Kokona!)"
10004030-62 = "...Você também é bem infantil, Kokona! Você sempre separa a cenoura do prato porque diz que é amarga, não é?"
10004030-63 = "Hã? C-como você sabe disso?"
10004030-64 = "A Shun-oneechan disse que a instrutora Kokona é muito mimada porque só come o que quer, então ela ainda é uma criança."
10004030-65 = "Ugh...! Por que a Shun-nee-san foi dizer essas coisas para as crianças...!?"
10004030-66 = "…Ahem. Bem, talvez você não entenda por ser pequena, mas eu já sou uma dama respeitável."
10004030-67 = "Cada dama tem sua própria personalidade, e eu só calhei de ter a personalidade de 'não gostar de cenouras'..."
10004030-68 = "Mentira. Uma dama de verdade consegue comer tudo o que não gosta."
10004030-69 = "Além disso, ela não faz 'exercícios de alongamento para crescer' toda manhã!"
10004030-70 = "C-como você sabe disso...!? Eu fazia bem cedo para ninguém descobrir...!"
10004030-71 = "Aliás, acho que esse exercício não tem muito efeito. A presidente Kisaki, da Genryumon, também fazia antes, mas acabou parando porque disse que não servia de nada."
10004030-76 = "Portanto, se você continuar sendo mimada com a comida e, além disso, falando mal da minha irmã, a Kokona-chan vai ficar com essa altura para sempre!"
10004030-81 = "Ugh, uuuuh...!"
10004030-82 = "Eu gravei o seu rosto! Pode esperar só!"
10004030-87 = "Quem fala assim é que não é grande coisa, bleh!"
10004030-90 = "(E-eu acabei falando tudo o que me veio à cabeça sem filtro... mas me sinto aliviada!)"
10004030-91 = "(Poder falar o que eu quiser assim... esse corpo não é nada mal!)"
10004030-92 = "[s] \"...Shuerin?\""
10004030-93 = "Ah..."
10004030-94 = "[s] \"Não deve provocar a sua irmã mais velha, entendeu?\""
10004030-95 = "Bem, tecnicamente a irmã mais velha sou eu..."
10004030-96 = "Mas, é verdade, talvez eu tenha exagerado..."
10004030-97 = "[s] \"Quando encontrar a Kokona da próxima vez, peça desculpas, está bem?\""
10004030-98 = "Tá bom."
10004030-99 = "..."
10004030-100 = "Parece que a Shun-oneechan também não está aqui... vamos para outro lugar!"
10004030-104 = "[ns] \"E-espere, Shuerin...!\""
