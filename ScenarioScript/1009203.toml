[translation]
1009203-1 = "アドバイス（？）"
1009203-4 = "（ヨシミの連絡を受けてカフェへと向かった）"
1009203-9 = "あ、先生！こっちこっち！"
1009203-15 = "（店の片隅で、紙を並べているヨシミが見えた）"
1009203-23 = "急にごめん。"
1009203-24 = "大丈夫だった？"
1009203-28 = "べ、別に絶対来てとは言ってないでしょ！？"
1009203-29 = "いや、来てくれたのは嬉しいけど……"
1009203-33 = "と、とにかく！"
1009203-34 = "いざデザイン始めてみたら、ちょっと行き詰まっちゃって……。"
1009203-35 = "先生、ちょっとアドバイスしてくれない？"
1009203-39 = "[ns1] \"そういうのは詳しくないけど、とりあえず……。\"\n[ns2] \"バンドのマークを描くんだよね？\""
1009203-40 = "……ん？"
1009203-41 = "何そのアイコン？"
1009203-42 = "……？"
1009203-43 = "……え？"
1009203-44 = "……？？"
1009203-45 = "え、もしかして何かすれ違ってる？"
1009203-46 = "バンドのロゴなら、後でやるけど……。"
1009203-50 = "[ns3] \"……え？\"\n[ns4] \"じゃあ今のこれは？\""
1009203-55 = "あ、説明してなかったわね。"
1009203-56 = "えっと、これなんだけど……。"
1009203-61 = "[ns] \"…………。\""
1009203-65 = "…………？"
1009203-66 = "[ns5] \"えっと「デザイン」ってつまり……。\"\n[ns6] \"自分のサイン……？\""
1009203-69 = "そうだけど、何か問題でもあるの？"
1009203-70 = "……え？"
1009203-71 = "何でって……？"
1009203-72 = "いや、当然でしょ？"
1009203-76 = "ほら、これからバンドやるわけだし。"
1009203-77 = "オープニングイベントにも出るんだから、沢山の人が見るわけで――"
1009203-78 = "演奏が上手くいけば、有名人になるわけじゃない？"
1009203-79 = "その時にサインが決まってなかったら困るでしょ？#nここまでで、何かおかしいとこあった？"
1009203-83 = "……え？合ってるわよね？"
1009203-84 = "何も、間違ってないわよね……？"
1009203-85 = "[s7] \"も、もちろん悪くは無いけど……。\"\n[s8] \"その、ほんのちょっとだけ気が早いかも……？\""
1009203-88 = "そ、そう……かしら……？"
1009203-92 = "え、待って。#nえっと……。"
1009203-93 = "そ、その……なんかそう言われたら急に……。"
1009203-94 = "……恥ずかしくなってきた、かも。"
1009203-98 = "……待って、先生。"
1009203-99 = "何も言わないで。そのまま黙ってて。#n絶対喋らないで。"
1009203-100 = "[s9] \"大丈夫、みんな通る道！\"\n[s10] \"みんなでサインの練習中だったり？\""
1009203-103 = "喋らないでって言ったでしょ！！！！！"
1009203-104 = "ああもうっ！！！"
1009203-108 = "はぁ……。"
1009203-113 = "[ns] 慰めようとする。"
1009203-118 = "動かないで！！！！じっとして！！！"
1009203-121 = "ほんと、最悪……。"
1009203-122 = "[s11] \"本当に気にしないで良いのに。\"\n[s12] \"そのサイン、私欲しいな。\""
1009203-125 = "もう良いから！！リップサービス本当にありがとうございましたぁ！！"
1009203-126 = "ほんと勘弁して！！"
1009203-127 = "良いじゃない、別に考えたって……。"
1009203-131 = "……なによ。"
1009203-132 = "え、これ……？"
1009203-133 = "……欲しいの？"
1009203-134 = "……そうすれば、慰めになるとでも思ってる？"
1009203-135 = "[s13] \"ううん、純粋に欲しいから。\"\n[s14] \"リップサービスなんかじゃないよ。\""
1009203-138 = "はぁ……。"
1009203-139 = "またそうやって……。"
1009203-140 = "そうやって言えば、私が機嫌直すって思ってるんでしょ？"
1009203-144 = "……別に良いわよ。"
1009203-148 = "はぁ、ムカつく！！"
1009203-149 = "機嫌直っちゃう私も、そういう先生も！"
1009203-150 = "……ま、今さらよね。"
1009203-154 = "それじゃ、一番良さげなのを……。"
1009203-159 = "失礼します、こちらお会計を。"
1009203-160 = "こちらにサインをお願いできますか？"
1009203-164 = "あ、はい。"
1009203-168 = "サイン、サイン……。"
1009203-173 = "……？"
1009203-179 = "……あ、間違えた。"
1009203-180 = "……？"
1009203-184 = "[ns15] \"あ、可愛い。\"\n[ns16] \"すごく良いと思う。\""
1009203-188 = "[ns] \"カッコいいね！\""
1009203-192 = "いや待って、これは……！！"
1009203-193 = "だめ、本当にダメ！！！"
1009203-194 = "その、これは違くて……。"
1009203-195 = "ほんとにダメなんだってば！！"
1009203-197 = "[ns17] \"ご、ごめん。\" \n[ns18] \"ここの支払いは私がするからね。\""
1009203-200 = "ああああああああああっ！！"
1009203-214 = "（……後で店員さんから怒られた）"
