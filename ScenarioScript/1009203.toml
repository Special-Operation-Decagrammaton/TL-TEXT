1009203-144 = "...Está tudo bem."

1009203-148 = "Ha, estou tão irritado! !"

1009203-149 = "Estou sempre de bom humor e meus professores também!"

1009203-150 = "...Bem, agora é tarde demais."

1009203-154 = "Pois bem, o melhor..."

1009203-159 = "Com licença, por favor pague a conta."

