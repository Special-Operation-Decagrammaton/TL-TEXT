[translation]
1009203-1 = "conselho(?)"

1009203-4 = "(Fui para o café depois de receber a ligação de Yoshimi)"

1009203-9 = "Ah, professora! Aqui, aqui!"

1009203-15 = "(Vi Yoshimi arrumando papéis em um canto da loja.)"

1009203-23 = "Sinto muito de repente."

