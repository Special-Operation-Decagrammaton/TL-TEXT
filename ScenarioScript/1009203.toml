1009203-28 = "B-Eu nunca disse que você deveria vir! ?"

1009203-29 = "Bem, estou feliz que você tenha vindo, mas..."

1009203-33 = "E de qualquer maneira!"

1009203-34 = "Quando comecei a desenhar, fiquei paralisado por um tempo..."

1009203-35 = "Professor, você poderia me dar alguns conselhos?"

1009203-39 = "[ns1] \"Não sei muito sobre isso, mas por enquanto...\"\n[ns2] \"Você está desenhando a marca da banda, certo?\""

1009203-40 = "……sim?"

1009203-41 = "O que é esse ícone?"

