1009203-43 = "……foto?"

1009203-44 = "...? ?"

1009203-45 = "Huh, talvez algo esteja errado?"

1009203-46 = "Se for o logotipo de uma banda, farei isso mais tarde..."

1009203-50 = "[ns3] \"...hein?\"\n[ns4] \"Então, e agora?\""

1009203-55 = "Ah, eu não expliquei isso."

1009203-56 = "Bom, é isso..."

1009203-61 = "[ns] \"………….\""

1009203-65 = "………?"

1009203-66 = "[ns5] \"Bem, o que você quer dizer com ``design''? \"\n[ns6] \"Minha assinatura...? \""

1009203-69 = "Sim, mas há algum problema?"

1009203-70 = "……foto?"

1009203-71 = "O que...?"

1009203-72 = "Não, claro, certo?"

1009203-76 = "Olha, estou começando uma banda agora."

1009203-77 = "Será no evento de abertura, então muita gente vai ver."

1009203-78 = "Se você jogar bem, não ficará famoso?"

1009203-79 = "Seria um problema se a assinatura não fosse decidida naquele momento, certo? #nVocê notou algo estranho até agora?"

1009203-83 = "……foto? Cabe, certo?"

1009203-84 = "Não há nada de errado com isso, certo...?"

1009203-85 = "[s7] \"Claro, não é ruim, mas...\"\n[s8] \"Bem, talvez você seja um pouco rápido demais...?\""

1009203-88 = "Eu-eu me pergunto...?"

1009203-92 = "Ah, espere. #nHum..."

1009203-93 = "Bem, quando você diz isso, de repente sinto..."

1009203-94 = "...Talvez eu esteja começando a me sentir envergonhado."

1009203-98 = "...Espere, professor."

1009203-99 = "Não diga nada. Apenas fique em silêncio. #nNunca fale."

1009203-100 = "[s9] \"Está tudo bem, todos estão a caminho!\"\n[s10] \"Vocês estão praticando autógrafos?\""

1009203-103 = "Eu disse para você não falar! ! ! ! !"

1009203-104 = "Ah, já! ! !"

1009203-108 = "Suspirar..."

1009203-113 = "[ns] Tente confortar."

1009203-118 = "Não se mova! ! ! ! Fique quieto! ! !"

1009203-121 = "Realmente, é o pior..."

1009203-122 = "[s11] \"Eu realmente não me importo.\"\n[s12] \"Eu quero aquele autógrafo.\""

1009203-125 = "Está bom agora! ! Muito obrigado pelo serviço da boca para fora! !"

1009203-126 = "Por favor, me dê um tempo! !"

1009203-127 = "Está tudo bem, eu nem pensei nisso..."

1009203-131 = "...O que?"

1009203-132 = "Ei, isso...?"

1009203-133 = "...Você quer isso?"

