[translation]
2002102-1 = "Criança boazinha? Criança malvada?"
2002102-2 = "Sensei, obrigado por esperar!"
2002102-3 = "[s] \"Bem-vinda, Hanae. Que traje incomum você está usando.\""
2002102-4 = "Sim, é uma roupa de Papai Noel!"
2002102-5 = "E já que estou vestida assim..."
2002102-6 = "Eu preciso cumprir com o meu dever como Papai Noel!"
2002102-7 = "[s1] \"É, é mesmo...?\"\n[s2] \"Se a Hanae diz que é assim...\""
2002102-8 = "E sobre o \"problema\" que mencionei no Momotalk..."
2002102-9 = "E sobre o \"problema\" que mencionei no Momotalk..."
2002102-10 = "Na verdade, tem uma relação direta com esta roupa."
2002102-11 = "[s3] \"Ora, ora.\"\n[s4] \"Fiquei curioso.\""
2002102-12 = "Então, antes de anunciar, vou respirar fundo..."
2002102-13 = "Então, antes de anunciar, vou respirar fundo..."
2002102-14 = "Eu... será que não sou capaz o suficiente para ser uma \"Papai Noel de verdade\"!?"
2002102-15 = "[s] \"Uma Papai Noel... de verdade?\""
2002102-16 = "Uma Papai Noel de verdade precisa, antes de tudo, distinguir rigorosamente quem é uma criança boazinha e quem é malvada!"
2002102-17 = "É algo muito importante relacionado aos presentes."
2002102-18 = "E também, preciso ser capaz de carregar coisas mais pesadas que o meu próprio peso com facilidade."
2002102-19 = "Afinal, o Papai Noel precisa carregar o saco de presentes e subir nos telhados."
2002102-20 = "E acima de tudo..."
2002102-21 = "Preciso ser capaz de voar a Mach 2!"
2002102-22 = "Só assim poderei entregar presentes por todo o Kivotos!"
2002102-24 = "(Eu ia dizer que ela deve estar entendendo algo errado, mas...)"
2002102-25 = "(Diante do sorriso inocente da Hanae, acabei ficando sem palavras.)"
2002102-27 = "……？"
2002102-28 = "Você está dizendo que, se não for a de verdade, não precisa ir tão longe...?"
2002102-29 = "Sensei! Esse tipo de pensamento é proibido!"
2002102-30 = "Não importa se é real ou não, já que estou vestida assim, preciso levar isso a sério!"
2002102-31 = "Para proteger os sonhos e as esperanças das crianças!"
2002102-32 = "[s5] \"Entendo...!\"\n[s6] \"Talvez você tenha razão...!\""
2002102-33 = "Você entendeu!"
2002102-34 = "Você entendeu!"
2002102-35 = "Bem, a situação é essa... o que você acha que eu deveria fazer, Sensei?"
2002102-36 = "[s] \"Hmm... Hanae, o que você quer fazer primeiro?\""
2002102-37 = "Primeiro, eu quero voar a Mach 2—"
2002102-38 = "[s7] \"Isso é um pouco...\"\n[s8] \"Vamos começar por outra coisa!\""
2002102-39 = "É mesmo? Eu queria tanto tentar..."
2002102-40 = "É mesmo? Eu queria tanto tentar..."
2002102-41 = "Então, podemos deixar a entrega dos presentes para depois..."
2002102-42 = "Talvez seja uma boa ideia aprender a distinguir crianças boas de crianças malvadas."
2002102-43 = "O que você acha que eu deveria fazer?"
2002102-44 = "[s9] \"Então, tente ouvir o que eu tenho a dizer.\"\n[s10] \"Que tal tentar descobrir se é mentira ou não?\""
2002102-45 = "Entendi, então vou julgar se é mentira ou não!"
2002102-46 = "Entendi, então vou julgar se é mentira ou não!"
2002102-47 = "Acho uma ótima ideia, afinal, às vezes tem crianças que mentem sem maldade!"
2002102-48 = "Estou ficando nervosa... então, pode começar quando quiser!"
2002102-49 = "[s] \"Na verdade, todo ano nessa época, eu pego um saco...\""
2002102-51 = "[ns] \"E saio voando a Mach 2, entregando presentes.\""
2002102-52 = "Sério!? Sensei, você parece mesmo um Papai Noel!"
2002102-53 = "Ah, é mentira? Mas, Sensei, você consegue fazer qualquer coisa..."
2002102-54 = "Eh, não é bem assim? Tem coisas que você não consegue fazer?"
2002102-55 = "A-ah, era isso então..."
2002102-56 = "[s] \"Guh, de repente uma dor de barriga e dor de cabeça!!\""
2002102-57 = "Isso é grave, preciso tratar imediatamente!#nDeite-se rápido!"
2002102-58 = "Bem, nessas horas, como li naquele livro...#nPrimeiro, queimar o ar para eliminar a energia maligna."
2002102-59 = "E se você aguentar enquanto leva chicotadas, vai sarar!"
2002102-60 = "[s] \"Será que isso realmente cura!?\""
2002102-62 = "(Depois disso, embora eu tenha tentado contar várias outras mentiras)"
2002102-63 = "(Percebi mais uma vez que a Hanae é uma menina muito boa, que acredita de verdade no que os outros dizem...)"
