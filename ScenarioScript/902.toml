[translation]
902-1 = "コクマー：王国を守りし古代の守護者"
902-2 = "お待ちしておりました、先生。"
902-3 = "事は一刻を争うので、手短にお伝えいたします。"
902-4 = "キヴォトス極地の火山に――正体不明の船が現れました。"
902-5 = "ええ――[ruby=・]船[/ruby]です。"
902-6 = "最初は何かの間違いではないかと耳を疑いましたが……"
902-7 = "その船は溶岩を登り――現在も火山の航海を続けています。"
902-8 = "同時に火山が急激に活性化し――噴火の兆候を確認しました。"
902-9 = "おそらく、船が噴火を誘発しているのではないか、と。"
902-10 = "……先生には詳細をお伝えします。#n実はこの調査の折、何者かによる介入がありまして。"
902-11 = "正体を特定するには至らなかったものの、その人物が残した言葉によって、ある程度事態を把握するに至りました。"
902-12 = "これが、その人物が残した言葉の一部です――"
902-13 = "「音にならない聖なる十の言葉」……「神聖な道である『[ruby=Path]パス[/ruby]』を拓く予言者」……と。"
902-14 = "現在、火山は噴火直前です。#nもはや一刻の猶予も残されておりません。"
902-15 = "過去の記録と火山の規模を基に計算したところ――噴火した場合、キヴォトス中に「火山の冬」が到来する恐れがあります。"
902-16 = "船が噴火を誘発しているのであれば、船を止めることで事態を収束できるのではないかと。"
902-17 = "先生には船の調査を――ひいては、噴火の阻止をお願いいたします。"
902-18 = "お気をつけください。現地には「ある対策」が施されているとのこと。#n船の名は――"
902-19 = "「[ruby=Chokmah]コクマ―[/ruby]」……異名、「王国を守りし古代の守護者」……。"
902-20 = "それの意味するところまでは、分かりかねますが……あるいは、先生であれば……"
902-21 = "どうか、よろしくお願いします。先生。"
