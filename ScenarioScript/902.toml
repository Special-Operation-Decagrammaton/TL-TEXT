[translation]
902-1 = "Chokmah: O antigo guardião que protege o reino"
902-2 = "Estávamos à sua espera, Sensei."
902-3 = "Como o tempo é essencial, serei breve."
902-4 = "Um navio de origem desconhecida apareceu no vulcão da região polar de Kivotos."
902-5 = "Sim, é exatamente isso."
902-6 = "A princípio, duvidei do que ouvi, achando que fosse um erro, mas..."
902-7 = "O navio está subindo a lava e, até o momento, continua navegando pelo vulcão."
902-8 = "Ao mesmo tempo, o vulcão tornou-se subitamente ativo e confirmamos sinais de uma erupção."
902-9 = "É provável que o navio esteja induzindo essa erupção."
902-10 = "……Vou lhe dar os detalhes, Sensei. #nNa verdade, durante esta investigação, houve uma interferência de alguém."
902-11 = "Embora não tenhamos conseguido identificar a identidade dessa pessoa, as palavras que ela deixou nos permitiram compreender a situação até certo ponto."
902-12 = "Estas são algumas das palavras que essa pessoa deixou para trás——"
902-13 = "“As dez palavras sagradas que não se tornam som”…… “O profeta que abre o ‘’, o caminho sagrado”……"
902-14 = "Atualmente, o vulcão está prestes a entrar em erupção. #nNão nos resta mais tempo."
902-15 = "Com base em registros passados e na escala do vulcão, calculamos que, se ele entrar em erupção, há o risco de um “inverno vulcânico” atingir todo o Kivotos."
902-16 = "Se o navio está induzindo a erupção, talvez possamos conter a situação parando-o."
902-17 = "Peço que o senhor investigue o navio e, consequentemente, impeça a erupção."
902-18 = "Tenha cuidado. Dizem que “certas contramedidas” foram aplicadas no local. #nO nome do navio é——"
902-19 = "“……”……seu epíteto, “O antigo guardião que protege o reino”……"
902-20 = "Não sei o que isso significa exatamente, mas…… talvez, se for o senhor, Sensei……"
902-21 = "Por favor, conto com você, Sensei."
