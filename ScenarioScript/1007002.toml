[translation]
1007002-1 = "第一印象"
1007002-2 = "シャーレ・執務室"
1007002-3 = "（時間通りに来ると言っていたはずだけど）"
1007002-7 = "（10分以上経過しても、音沙汰がない……）"
1007002-8 = "[ns1] \"何かあったのかな……？\"\n[ns2] \"電話してみよう。\""
1007002-12 = "[ns] \"……ん？\""
1007002-13 = "（着信音がドアの向こうから聞こえてきた）"
1007002-14 = "おわあっ！"
1007002-20 = "（大きな声まで聞こえたので、慌てて廊下に出てみると……）"
1007002-25 = "[ns] \"ミナ……？\""
1007002-26 = "しまった……私としたことが。"
1007002-27 = "こんなはずではなかったのだが……#nすまない、先生。"
1007002-28 = "約束の時間に遅れてしまったことも含めて、謝罪させてくれ。"
1007002-29 = "[s3] \"遅れたのは別にいいんだけど……\"\n[s4] \"そこで何してたの？\""
1007002-32 = "ふっ、そのことか。"
1007002-33 = "言葉にすれば単純な話ではあるが――だからこそ重要でもある。"
1007002-34 = "先生なら分かっていると思うが――#n最初というのは何よりも肝要だろう？"
1007002-35 = "最初に抱いた印象で、今後の関係性が決まってしまう。"
1007002-36 = "それは、まるでドミノの最初のブロックのように……#n1つ目が2つ目に、2つ目が3つ目に、と連鎖していくのと同じだ。"
1007002-37 = "[s] （時間を守る方が大切な気もするけど……）"
1007002-38 = "そこで、どうすればハードボイルドでクールに登場できるのか……"
1007002-39 = "何より、初のシャーレ当番に[ruby=ふさわ]相応[/ruby]しい登場を考えていた結果――"
1007002-40 = "……いつの間にか、約束の時間を過ぎてしまったようだ。"
1007002-41 = "やれやれ、何事も程々が一番という事だな……"
1007002-42 = "だが、先生。#n誰であろうと、こういった事には頭を悩ませたはずだ。"
1007002-43 = "意気揚々とキャンディーを咥えたまま、拳銃片手にドアを開けるのと……"
1007002-44 = "気配を消して[ruby=ひそ]密[/ruby]やかに、プロフェッショナルに潜入するのとでは、印象が大きく異なるだろう？"
1007002-45 = "先生なら、どちらを選んだろうか？#nいや……それを想像するのも、また一興だな。"
1007002-46 = "[s] \"あはは……今ので十分印象に残る登場だったよ……。\""
1007002-47 = "ふっ、先生に称賛されてしまうとはな。#n結果的に、これで正解だったか。"
1007002-56 = "[ns5] \"初めての当番だし……\"\n[ns6] \"何か質問とかある？\""
1007002-59 = "ああ、そのことなんだが……"
1007002-60 = "まずは、お互いの呼び方を決めなくてはな。"
1007002-61 = "[s] \"呼び方……？\""
1007002-62 = "相手をどのように呼ぶのか。#nそれは世間で思われているよりも、遥かに重要だと考えている。"
1007002-63 = "なぜなら、それは互いの関係性に直結するからだ。"
1007002-64 = "普通であれば、「先生」と呼ぶところだろうが――"
1007002-65 = "私は生憎、その程度の間柄に収まるつもりはない。"
1007002-66 = "私たちの関係は、他の生徒よりも特別なものであるべきだろう？"
1007002-67 = "フッ……そうは思わないか、先生。"
1007002-68 = "[s] \"……そ、そんな気がしてきたような？\""
1007002-69 = "おおっ、先生も同じ気持ちなんだな！嬉しいぞ！"
1007002-70 = "玄龍門の執行部長という肩書きではなく、私たちの絆を示せる呼び方……"
1007002-74 = "悩ましいな。すぐには浮かびそうもない。"
1007002-75 = "しかし、簡単にはたどり着けないからこそ、意味があるものだ。"
1007002-76 = "[s] （ここはミナに任せておこう……）"
1007002-77 = "……司令官？"
1007002-78 = "[s] \"シャーレは軍隊ではありません！\""
1007002-79 = "じゃあ……指揮官？"
1007002-80 = "[s] \"誤解を招きかねないから！\""
1007002-81 = "マスター？"
1007002-82 = "[s] \"あんまり変わってなくない！？\""
1007002-83 = "ドクター？"
1007002-84 = "[s] \"お医者さんでもないよ！\""
1007002-85 = "……カムラッド？"
1007002-88 = "[ns] \"たしかに、そう呼ばれることもあるけどね！？\""
1007002-95 = "（その後も一日中、お互いの呼び方を考え続けた）"
1007002-96 = "（当然ながら、当番の作業が進むことはなかった）"
1007002-97 = "（初日は軽い仕事だけだから、問題はなかったものの……）"
1007002-99 = "疲れたな……。"
1007002-100 = "[s] \"そうだね……。\""
1007002-101 = "一周回って「先生」に落ち着くだなんて……。"
1007002-102 = "先生も満足していないだろうが、今日のところは仕方ない。"
1007002-103 = "[s] \"「先生」で大丈夫だよ……。\""
1007002-104 = "そ、そうなのか？なら良いのだが……。"
1007002-106 = "（残った時間で、ミナと一緒に仕事を進めた）"
