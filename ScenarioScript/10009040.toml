[translation]
10009040-1 = "Episódio 4; Ataque Parte 4"
10009040-2 = "Como eu pensei, a tática de \"policial mau\" não funciona."
10009040-3 = "O que eu deveria aprender é sobre \"o vento norte e o sol\"... Vou tentar a tática de \"policial bom\"!"
10009040-4 = "Certo!"
10009040-10 = "Olá, Wakamo, peço desculpas pelo que aconteceu agora há pouco."
10009040-11 = "Eu também estava um pouco tenso... Já que é Dia dos Namorados, que tal alguns macarons como um pedido de desculpas?"
10009040-12 = "Vamos comer isso e nos acalmar..."
10009040-16 = "...Hã?"
10009040-21 = "E-ela sumiu...!? Para onde ela foi!?"
10009040-24 = "(Vou me recompor e fazer a patrulha com a Sena...)"
10009040-25 = "[s] \"...Espere um pouco.\""
10009040-26 = "Sim?"
10009040-27 = "[s] \"Sinto um pressentimento ruim...\""
10009040-35 = "Sensei!"
10009040-36 = "[s] \"Eu sabia que você viria!\""
10009040-42 = "Só mais um pouco, só mais um pouco... Em breve, com estas mãos...!"
