[translation]
10041005-1 = "プロローグ;ミレニアムEXPO"
10041005-6 = "まもなく到着のようだね。"
10041005-7 = "久方ぶりだ……会談の時以来だろうか。"
10041005-12 = "科学と技術の学び舎――"
10041005-13 = "……『ミレニアムサイエンススクール』。"
10041005-17 = "ここまで世話になった。#n礼を言わせてくれ。"
10041005-18 = "厄介をかけるのは本意ではないが……"
10041005-27 = "致し方ない。こうでもしないとナギサは私の外出を許さなかったと思うからね。"
10041005-28 = "あの時……君が来なければどうなっていたか。"
10041005-29 = "幸い、君の助力によって、私は踏み出すことができる。"
10041005-30 = "これは、私が自身に課す試練なのだよ。"
10041005-36 = "「[ruby=ゆりぞの]百合園[/ruby]セイア」は自分の足で立てるのだ、と――"
10041005-38 = "――「証明」するためのね。"
10041005-40 = "#video;10041"
