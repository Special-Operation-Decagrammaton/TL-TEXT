[translation]
10041005-1 = "Prólogo; Millennium EXPO"
10041005-6 = "Parece que chegaremos em breve."
10041005-7 = "Faz muito tempo... desde a nossa reunião, eu suponho."
10041005-12 = "O centro de aprendizado de ciência e tecnologia—"
10041005-13 = "...a 'Millennium Science School'."
10041005-17 = "Obrigada por cuidar de mim até aqui. #nDeixe-me expressar minha gratidão."
10041005-18 = "Não é minha intenção causar problemas, mas..."
10041005-27 = "Não há outra escolha. Acho que, se não fosse assim, Nagisa não teria permitido que eu saísse."
10041005-28 = "Naquela época... o que teria acontecido se você não tivesse vindo?"
10041005-29 = "Felizmente, com a sua ajuda, eu posso seguir em frente."
10041005-30 = "Esta é uma provação que imponho a mim mesma."
10041005-36 = "Que 'Seia Yurizono' pode caminhar com as próprias pernas—"
10041005-38 = "—para 'provar' isso."
10041005-40 = "#video;10041"
