[translation]
3303-1 = "Balançar com força total (3)"
3303-2 = "Distrito de Gehenna - Estádio do Segundo Time"
3303-4 = "Mais do que eu pensava..."
3303-5 = "Tem pouca gente assistindo."
3303-6 = "Sim. É segunda-feira, e é um jogo do segundo time, onde há muitos jogadores novatos."
3303-7 = "Se a Sumire-senpai não tivesse me chamado, eu teria ido embora direto..."
3303-8 = "...Mas, no fim das contas, o estádio é um lugar muito bom."
3303-9 = "Além disso, nos jogos do segundo time, o público não é tão tenso e a distância entre os jogadores e a arquibancada é bem curta."
3303-10 = "Tem até fãs que só gostam de curtir os jogos do segundo time no estádio."
3303-11 = "...Entendo, é mesmo?"
3303-12 = "Mas mudando de assunto, Rei-san, o que é isso na sua mão..."
3303-13 = "É um cachorro-quente, mas...?"
3303-14 = "Não pretendo impor um estilo de vida alimentar rigoroso. No entanto, alimentos processados com alto teor de gordura podem prejudicar a digestão e diminuir a eficácia do treinamento."
3303-15 = "Se estiver com fome, seria melhor comer uma barra de proteína, que tem menos carboidratos e fornece proteínas..."
3303-16 = "Já que viemos até o estádio de Gehenna, não tem como não comer este cachorro-quente especial de Inferno!"
3303-17 = "Ca-cachorro-quente de Inferno...?"
3303-18 = "Sim. No estádio, vendem comidas fáceis de comer enquanto assiste ao jogo."
3303-19 = "Tem muitos salgadinhos e bebidas, mas cada estádio também tem suas comidas típicas famosas..."
3303-20 = "Aqui, o popular é o 'Cachorro-quente de Inferno', que leva uma salsicha especial bem apimentada."
3303-21 = "Aproveitar a comida típica de cada escola também é um dos pontos altos de assistir a um jogo de beisebol!"
3303-23 = "Hum... se for só um cachorro-quente, não vejo problema, mas..."
3303-24 = "Ah, esqueci de colocar o molho de pimenta."
3303-28 = "Mas, pensando bem, só o sabor da salsicha já é bem apimentado, então assim mesmo..."
3303-29 = "Depois de comer essa salsicha apimentada, tomar um ginger ale de uma vez só é..."
3303-34 = "Ahhh, isso é o melhor!"
3303-36 = "Ah, senpai, se quiser comer alguma coisa, peça também! #nComo você tem cuidado de mim, hoje eu pago!"
3303-37 = "Então... eu vou querer um frango de salada."
3303-38 = "Não existe nada saudável como frango de salada na comida de estádio...?"
3303-44 = "...Parece que o jogo começou."
3303-45 = "É a primeira vez que assisto a um jogo de Gehenna, eles são fortes?"
3303-46 = "Hum, não diria que são fortes..."
3303-47 = "A capacidade física individual é alta, mas o trabalho em equipe é ruim, então..."
3303-48 = "Ainda assim, são muito mais fortes que o nosso clube de beisebol..."
3303-49 = "Ah, hoje é um dia especial para assistir ao jogo, então vamos focar na torcida!"
3303-53 = "Bate forte, Gehenna!!"
3303-57 = "Quem vai para o bastão é o segundo rebatedor da escola Gehenna. #n...Ele rebateu logo no primeiro arremesso!"
3303-58 = "Passou pela terceira base! ...Bateu no muro e voltou, o campista esquerdo pegou com a mão limpa! #nO corredor passa pela primeira base e vai para a segunda..."
3303-59 = "Boa devolução do campista esquerdo! O que vai acontecer...? #nO toque foi... fora!"
3303-60 = "Que pena, achei que seria uma rebatida dupla!"
3303-61 = "Para pisar na base sem ser tocado pela defesa..."
3303-62 = "Não pode simplesmente tirar o jogador da segunda base com um carrinho?"
3303-63 = "Claro que não pode, está louca?!"
3303-65 = "(Depois disso, apesar da torcida de Rei, o clube de beisebol de Gehenna acabou perdendo por pouco...)"
3303-68 = "...Se tivessem conseguido voltar para a base principal no final, teriam virado o jogo."
3303-69 = "Sim, foi uma pena."
3303-70 = "Se eu fosse a corredora, teria usado um encontrão de ombro para desequilibrar a defesa e fazer a bola cair da luva."
3303-71 = "Os rebatedores de Gehenna deveriam treinar mais os deltoides."
3303-72 = "Senpai... você sabe as regras do beisebol...?"
3303-73 = "De qualquer forma, fazia tempo que eu não assistia a um esporte com alguém, foi divertido."
3303-74 = "Treinar o corpo silenciosamente na academia é bom, mas ver os resultados do treinamento de vocês assim serviu de motivação para o futuro."
3303-75 = "……Hehe. Você realmente gosta de treinar, Senpai."
3303-76 = "Então... Rei-san."
3303-77 = "Conseguiu se lembrar da cena daquele último home run que você viu?"
3303-83 = "……Sim."
3303-84 = "Naquele dia, o estádio também não estava muito cheio."
3303-86 = "Os espectadores estavam comendo, tirando fotos dos jogadores ou procurando por novos talentos...#nCada um deveria estar lá por um motivo diferente, mas..."
3303-87 = "Ainda assim, no momento em que o home run aconteceu, todos esqueceram até de respirar e focaram no batedor."
3303-89 = "Claro, não consigo esquecer o arco que a bola desenhou no ar... mas, acima de tudo, a figura do batedor percorrendo o diamante, sendo o protagonista por aquele breve momento... era tão incrível..."
3303-90 = "Mas é engraçado, não é? Eu penso em home runs todos os dias, então por que será que esqueci daquela cena?"
3303-92 = "……Rei-san. No treinamento, definir um objetivo é fundamental."
3303-93 = "Treinar sem um propósito é apenas uma sucessão de sofrimentos.#nPerder tantos quilos, definir o corpo... qualquer coisa serve."
3303-94 = "Mas, se você ficar tão obcecada pelo objetivo a ponto de negligenciar o processo, o próprio objetivo acaba perdendo o brilho."
3303-95 = "Assim como o objetivo não é apenas reduzir o número na balança, você também não joga beisebol apenas para rebater home runs, certo?"
3303-96 = "Da mesma forma que o beisebol tem várias formas de diversão, o caminho para fortalecer o corpo também tem as suas."
3303-97 = "Então, que tal encarar o treinamento como uma jornada para aproveitar ainda mais o beisebol?"
3303-98 = "Rei-san, você continuará treinando comigo daqui para frente?"
3303-103 = "……Sim, Senpai!"
3303-107 = "Ginásio do Millennium"
3303-110 = "……Mas o que é isso!"
3303-112 = "Houve algum problema, Rei-san?"
3303-113 = "Essa máquina com algemas nos pés!?"
3303-114 = "Ah, essa é uma máquina de agachamento feita sob medida pelo Departamento de Engenharia."
3303-115 = "Ela possui um mecanismo que mantém os pés fixos até que o número de repetições definido seja concluído."
3303-116 = "Graças a isso, você consegue fazer agachamentos mantendo a postura correta e garante que o treino seja finalizado até o fim."
3303-117 = "Você não quis dizer que é impossível parar, em vez de garantir que eu termine!?"
3303-118 = "Além disso, fazer agachamentos não vai aumentar minha média de rebatidas, vai!?"
3303-119 = "O que está dizendo?#nSeja para arremessar ou para balançar o bastão, os músculos da parte inferior do corpo são essenciais."
3303-120 = "Para realizar uma transferência de peso suave, é necessário fortalecer o tronco.#nPrimeiro, o melhor é fortalecer bem as pernas e a lombar!"
3303-121 = "Já que estamos aqui, vamos fazer um treino focado na parte inferior do corpo hoje!"
3303-134 = "Vamos lá! Assim que terminarmos os agachamentos, o próximo passo será o avanço!"
3303-139 = "Ah, chega..."
3303-140 = "Quando o próximo torneio acabar, eu nunca mais volto aqui!"
3303-141 = "Balançar com força total"
