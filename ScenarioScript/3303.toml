[translation]
3303-1 = "全力で振り抜いて（３）"
3303-2 = "ゲヘナ自治区・二軍スタジアム"
3303-4 = "思った以上に……"
3303-5 = "観客が少ないですね。"
3303-6 = "はい。月曜日ですし、新人選手が多い二軍の試合ですから。"
3303-7 = "スミレ先輩に言われなければ、そのまま帰る予定でしたけど……"
3303-8 = "……やっぱり、球場はいいですね。"
3303-9 = "それに、二軍の試合は観客がピリピリしてないし、選手と観客席の距離が近いんですよ。"
3303-10 = "二軍戦だけは球場で楽しむファンも居るくらいで。"
3303-11 = "……そうなんですね。"
3303-12 = "それよりレイさん、その手に持ってるのは……"
3303-13 = "ホットドッグですが……？"
3303-14 = "厳しい食生活を押し付けるつもりはありません。ですが、脂質が多く含まれる加工食品は、消化を妨げトレーニングの効果を低下させる可能性が上がります。"
3303-15 = "もし、お腹が空いたのでしたら、炭水化物を抑えられて、タンパク質を摂取できるプロテインバーを食べた方が――"
3303-16 = "せっかくゲヘナのスタジアムまで来たのに、この特製[ruby=ごくえん]獄炎[/ruby]ホットドッグを食べないなんて、あり得ませんよ！？"
3303-17 = "ご、獄炎ホットドッグ……ですか？"
3303-18 = "はい。スタジアムでは、試合を見ながら手軽に食べられるフードが販売されてるんです。"
3303-19 = "スナック菓子やドリンクが多いですけど、スタジアムごとに名物の球場飯もあって……"
3303-20 = "ここだと、辛い特製ソーセージを挟んだ「獄炎ホットドッグ」が人気ですね。"
3303-21 = "各学園の球場飯を楽しむのも、野球観戦の醍醐味なんですよ！"
3303-23 = "うーん……ホットドッグの一つくらいでしたら、別に構いませんが……"
3303-24 = "あ、チリソースをかけ忘れちゃってた。"
3303-28 = "でも、やっぱりソーセージの味だけでも十分辛いし、このままでも……"
3303-29 = "この辛味の効いたソーセージを食べてから、ジンジャーエールを一気に飲むのが……"
3303-34 = "くぅ～～これが一番！"
3303-36 = "あ、先輩も食べたいものがあれば頼んでください！#nお世話になってるので、今日は自分が奢りますから！"
3303-37 = "では……サラダチキンを。"
3303-38 = "球場飯にサラダチキンなんてヘルシーなもの、ありませんよ……？"
3303-44 = "……試合が始まったようですね。"
3303-45 = "ゲヘナの試合を観戦するのは初めてなのですが、どのくらい強いのでしょうか？"
3303-46 = "うーん、決して強くはないですかね……"
3303-47 = "個人の身体能力は高いんですけど、チームワークが悪いので……"
3303-48 = "それでもウチの野球部よりは、ずっと強いんですが……"
3303-49 = "って、今日はせっかくの野球観戦なので応援に集中しましょう！"
3303-53 = "かっとばせーっ、ゲッヘーナ！！"
3303-57 = "打席に立つのは、ゲヘナ学園の2番バッター。#n……初球から打ちました！"
3303-58 = "三塁線、抜けたっ！……フェンスにワンバウンド、レフト素手で捕球！#nランナー、一塁を回って二塁に……"
3303-59 = "レフト、いい返球だ！これはどうなる……？#nタッチは……アウトッ！"
3303-60 = "惜しいっ、ツーベースかと思ったのに！"
3303-61 = "守備にタッチされずベースを踏むために……"
3303-62 = "セカンドの選手をスライディングで飛ばすのはダメなのですか？"
3303-63 = "ダメに決まってるじゃないですか！"
3303-65 = "（その後、レイの声援むなしく、ゲヘナ野球部は惜しくも負けてしまった……）"
3303-68 = "……最後、ホームに帰ってこられたら逆転できたのに。"
3303-69 = "はい、残念でしたね。"
3303-70 = "もし私がランナーでしたら、ショルダーチャージで守備のバランスを崩して、ボールをグラブから落とさせてました。"
3303-71 = "ゲヘナのバッターは、もっと三角筋を鍛えておくべきですね。"
3303-72 = "先輩……野球のルール、知ってますか……？"
3303-73 = "ともかく、誰かと一緒にスポーツ観戦をしたのは久しぶりで、楽しかったです。"
3303-74 = "ジムで黙々と身体を鍛えるのも良いですが、こうして皆さんの鍛えた成果を見ることで、今後のモチベーションにつながりました。"
3303-75 = "……ふふっ。先輩って本当に、トレーニングが好きなんですね。"
3303-76 = "それで……レイさん。"
3303-77 = "最後に見たホームランの情景は、思い出せましたか？"
3303-83 = "……はい。"
3303-84 = "あの日のスタジアムも、観客はそう多くありませんでした。"
3303-86 = "観客は球場飯を食べたり、選手の写真を撮ったり、有望な選手を探したり……#nそれぞれ別の目的で足を運んでいたはずですが……"
3303-87 = "それでもホームランが出た瞬間は、誰もが呼吸すら忘れてバッターに注目していました。"
3303-89 = "もちろん、ボールが勢いよく描いたアーチも忘れられませんが……何よりも、その時間だけは主役になってダイヤモンドを回るバッターの姿が……とてもカッコよくて……"
3303-90 = "けど、おかしな話ですよね。毎日ホームランのことばっかり考えているのに、どうしてあの日の光景を忘れていたのか……"
3303-92 = "……レイさん。トレーニングにおいて、目標を定めることは重要です。"
3303-93 = "目的の無いトレーニングは、苦痛の連続でしかありません。#n体重を何kg落としたい、身体を引き締めたいとか……何でも良いのです。"
3303-94 = "でも、目標に固執するあまり過程をおろそかにしては、せっかくの目標が色褪せてしまいます。"
3303-95 = "ただ体重計に表示される数値を減らすのが目的ではないように、レイさんもただホームランを打つために野球を続けているわけではないでしょう。"
3303-96 = "野球にもいろんな楽しさがあるように、身体を鍛える道のりにも楽しさがあるのです。"
3303-97 = "ですから、トレーニングを行なうのは、野球をさらに楽しむための旅路だと捉えてみるのはいかがですか？"
3303-98 = "レイさん、これからも一緒にトレーニングを続けてくれますか？"
3303-103 = "……はい、先輩っ！"
3303-107 = "ミレニアム・ジム"
3303-110 = "……って、これは何ですか！"
3303-112 = "何か問題でもありましたか、レイさん？"
3303-113 = "この足かせ付きのマシンですよ！？"
3303-114 = "ああ、それはエンジニア部の特注スクワットマシンです。"
3303-115 = "設定した回数が終わるまで、足が固定される仕組みになっています。"
3303-116 = "おかげで、正しい姿勢を保ちながらスクワットができますし、トレーニングを最後まで必ずやり遂げられるんですよ。"
3303-117 = "「やり遂げられる」じゃなくて「やめられない」の間違いではなくて！？"
3303-118 = "それに、スクワットをしても打率は上がりませんよね！？"
3303-119 = "何を言ってるんですか？#nボールを投げるにせよ、バットを振るにせよ、下半身の筋肉は重要です。"
3303-120 = "滑らかな体重移動を行なうためには、体幹を鍛える必要があります。#nまずは足腰をしっかり鍛えるのがベスト！"
3303-121 = "せっかくですし、今日は下半身に特化したトレーニングを行ないましょう！"
3303-134 = "さあ！スクワットが終わったら、次はランジが私たちを待っています！"
3303-139 = "もう……"
3303-140 = "今度の大会が終わったら、絶対に帰ってこないっ！"
3303-141 = "全力で振り抜いて"
