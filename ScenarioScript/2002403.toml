[translation]
2002403-1 = "A desordem na linguagem é a desordem da mente."
2002403-2 = "Terraço da Trinity"
2002403-3 = "（Enquanto conversavam sobre alguns assuntos relacionados ao Schale, Nagisa subitamente franziu a testa）"
2002403-4 = "Falando nisso, ultimamente tem aumentado o número de alunas que usam \"linguagem bárbara\" dentro da escola..."
2002403-5 = "[s] \"'Linguagem bárbara'?\""
2002403-6 = "Sim... vejo muitas formas de falar que carecem de refinamento e não são adequadas para as alunas da Trinity."
2002403-7 = "É louvável aprofundar laços com pessoas de outras escolas, mas é preciso manter um nível mínimo de etiqueta..."
2002403-8 = "Talvez seja hora de, como anfitriã do Chá das Cinco, criar um espaço para ensinar sobre boas maneiras..."
2002403-9 = "[s1] \"Entendo. Existe essa tendência?\"\n[s2] \"Pelo que vejo, sinto que muitas são bem educadas...\""
2002403-10 = "Claro, não são todas, é apenas uma parte das alunas, mas..."
2002403-11 = "Claro, não são todas, é apenas uma parte das alunas, mas..."
2002403-12 = "Mesmo assim, se deixarmos passar, isso se tornará um grande problema algum dia."
2002403-13 = "Como exemplos concretos..."
2002403-14 = "Por exemplo, \"usar abreviações em vez da linguagem correta\"."
2002403-15 = "[s] \"Palavras abreviadas?\""
2002403-16 = "Sim. Talvez pelo aumento da comunicação via MomoTalk, ultimamente tenho visto alunas que abreviam palavras e frases."
2002403-17 = "Como abreviar \"festa de aniversário\" para \"festaniver\" ou \"muito obrigado\" para \"valeu\", e, para piorar, não usam apenas no MomoTalk, mas também no dia a dia..."
2002403-18 = "...Outro dia ouvi o termo \"KY\", e quebrei muito a cabeça até entender o que significava. Chegando a esse ponto, é demais..."
2002403-19 = "[s] \"Ah, isso é bem comum, né?\""
2002403-20 = "Sensei, dizem que \"a desordem na linguagem é a desordem da mente\"."
2002403-21 = "Se menosprezarem a \"linguagem\" apenas por acharem que \"se a mensagem for entendida, está bom\", a qualidade da conversa cai, e a própria reputação da pessoa pode ser questionada."
2002403-22 = "Uma vez que se cria essa impressão, não é fácil apagá-la. E a impressão de cada indivíduo acaba se tornando a impressão da escola à qual pertence."
2002403-23 = "Se são alunas que frequentam a Trinity, quero que ajam com modéstia e consciência disso todos os dias."
2002403-24 = "...Além disso, vi alunas usando terminações estranhas como \"~pero\" ou usando uma linguagem violenta."
2002403-25 = "Como anfitriã do Chá das Cinco, não posso deixar isso passar."
2002403-26 = "[s] \"Nagisa, você nunca usa esse tipo de palavra às vezes?\""
2002403-27 = "Não. Eu sou alguém que deve servir de exemplo para as alunas. Tenho o dobro de cuidado com o que digo."
2002403-28 = "Sempre tento responder de forma calma e elegante, em qualquer situação. Raramente perco a compostura."
2002403-29 = "Sempre, como anfitriã do Chá das Cinco —"
2002403-33 = "Nagisa-sama! Desculpe interromper sua conversa...!"
2002403-34 = "Por que tanta pressa? O que houve?"
2002403-35 = "Bem, há algo que preciso relatar com urgência..."
2002403-36 = "É um relatório do Comitê de Realização da Justiça. Dizem que, ontem à noite, uma aluna estava caminhando pela fonte da praça da Trinity usando apenas traje de banho..."
2002403-38 = "O quê!?"
2002403-43 = "...Ehem."
2002403-44 = "...O pessoal do Comitê de Realização da Justiça não teria se confundido com um gato ou algo do tipo?"
2002403-45 = "Tratando-se de uma aluna da nossa escola, tal coisa..."
2002403-46 = "...Solicitarei ao Comitê de Realização da Justiça que reforce as patrulhas escolares mais uma vez. Obrigada pelo relatório."
2002403-47 = "[s] \"Nagisa, você ficou um pouco agitada?\""
2002403-48 = "...Houve algo que lhe chamou a atenção?"
2002403-49 = "Da minha parte, senti que estava tudo como sempre."
2002403-50 = "Repetindo, a desordem na linguagem é a desordem da mente. Ao responder de forma calma e elegante em qualquer situação, naturalmente..."
2002403-53 = "Nagisa-sama, é uma emergência! O Comitê da Biblioteca está usando uma quantidade enorme de bombas de gás lacrimogêneo porque uma aluna não devolveu o livro após o prazo!"
2002403-54 = "Com licença! Ocorreu uma disputa de facções no Clube de Cerimônia do Chá. Relatam que algumas alunas que insistem em \"não servir sanduíches de pepino com o chá!\" estão tentando jogar caixas de chá na piscina!"
2002403-55 = "Recebemos um relatório de que o pátio do terceiro prédio escolar foi totalmente queimado! Parece que, como resultado da tentativa do Comitê de Realização da Justiça de impedir o motim do Comitê da Biblioteca, o local virou um mar de chamas...!"
2002403-59 = "..."
2002403-60 = "Por que tudo isso, uma coisa atrás da outra..."
2002403-61 = "...Escutem bem. Esta é a Academia Trinity, que preza pela história e tradição."
2002403-62 = "Nem preciso dizer que a maioria de vocês tem consciência disso. Mas, se virem alguma aluna agindo de forma inadequada para esta escola, então..."
2002403-63 = "Eu mesma vou enfiar macarons na boca dela até que ela não consiga mais falar!"
2002403-64 = "[ns] \"………。\""
2002403-65 = "……。"
2002403-66 = "……Sensei. Bem, é que..."
2002403-67 = "O que aconteceu agora foi, tipo...!"
2002403-68 = "[s3] \"É compreensível quando as emoções ficam à flor da pele.\"\n[s4] \"Afinal, você também passa por muita coisa todo dia, Nagisa.\""
2002403-69 = "N-não é isso... é um mal-entendido! Eu sempre, em qualquer situação, permaneço calma e elegante...!"
2002403-70 = "N-não é isso... é um mal-entendido! Eu sempre, em qualquer situação, permaneço calma e elegante...!"
2002403-72 = "（Depois disso, continuamos a hora do chá por um tempo até que Nagisa se acalmasse）"
