[translation]
33110-1 = "Episódio 11;O Caos que Acelera (1)"
33110-2 = "Kyaaaah!?"
33110-3 = "Esperem, não se dispersem! Se saírem da academia……!"
33110-4 = "Isso mesmo, vão ser atacadas por Gehenna!"
33110-5 = "A-auu……."
33110-6 = "……A coisa ficou séria, né."
33110-14 = "Hanako, pessoal do Clube de Aulas de Reforço……!"
33110-15 = "M-Marie?"
33110-19 = "Marie! Você está bem……!"
33110-20 = "Na verdade, agora, uma parte dos radicais parece ter emitido, por conta própria, uma ordem de convocação de emergência……."
33110-21 = "Gh! Isso é……"
33110-22 = "……?"
33110-23 = "Hã, q-quê? Como assim?"
33110-24 = "Com a senhorita Sakurako ausente, quem pode comandar a Sisterhood e deter o descontrole das facções do Tea Party é, com certeza, só você, Hanako……."
33110-25 = "M-mas, agora……"
33110-26 = "Hanako……."
33110-27 = "Ah, você aí!"
33110-31 = "Você é membro do Comitê de Realização da Justiça…… né? Tá rolando a conversa de entrar em prontidão imediata, então corre pra sala do comitê!"
33110-32 = "Ah, e-eu também? M-mas……."
33110-33 = "Nem a presidente nem a vice estão à vista; depressa!"
33110-37 = "Ah, u, é que……."
33110-41 = "……Hanako, Koharu. Eu vou procurar a Azusa. Vocês duas, vão cada uma pro seu lugar."
33110-42 = "Hifumi……."
33110-43 = "M-mas……."
33110-44 = "Deste lado tá tudo bem; a Azusa, com certeza, vai voltar. Assim que eu encontrá-la, aviso na hora!"
33110-45 = "……E-entendi! Então, até mais tarde!"
33110-46 = "……Sim, entendido. Marie, vamos!"
33110-48 = "S-sim……!"
33110-51 = "……."
33110-52 = "O que foi que aconteceu, afinal…… Azusa……."
33110-54 = "O local do Tratado do Éden foi envolvido em chamas, e os arredores da catedral antiga estão, neste momento, num estado terrível!!"
33110-55 = "Que situação é esta, afinal――"
33110-56 = "……."
33110-57 = "……Nagi, eu falei um dia, né."
33110-58 = "A gente vive num mundo assim."
33110-59 = "Por isso……"
33110-60 = "……No fim, é como a Seia dizia. Isto, com certeza, é esse tipo de história."
33110-61 = "……."
33110-63 = "Perímetro externo - Viela na zona de combate"
33110-69 = "O local do Tratado do Éden foi envolvido em chamas, e os arredores da catedral antiga estão, neste momento, num estado terrível!!"
33110-70 = "As forças de reserva das duas academias, que aguardavam atrás da catedral antiga, avançam agora em direção a ela!"
33110-71 = "Daqui não dá pra ver, mas, se o combate entre as duas academias está em curso, só se ouvem os tiros e as explosões!"
33110-72 = "Sobre que situação é esta, afinal, as informações ainda não foram organizadas! O número de feridos e a escala dos danos também parecem ainda em apuração……"
33110-73 = "……Ah, plantão! Dizem que houve uma reunião de emergência em Trinity!"
33110-74 = "P-pelo visto, o Pandemonium de Gehenna está na mesma! Será que as duas academias estão preparando a declaração de estado de emergência……!?"
33110-80 = "Shinon, já não tá na hora de a gente recuar também!?"
33110-81 = "Pois é, veterana Mai! Desculpem, mas, depois de nos movermos pra um lugar mais seguro, continuamos a transmissão!"
33110-83 = "No fim, qual foi a causa da explosão!?"
33110-84 = "O paradeiro da senhorita Sakurako!? O número de feridos!? E o contato com a Nagisa, ainda não conseguiram!?"
33110-85 = "A presidente Tsurugi e a vice-presidente Hasumi seguem desaparecidas! Talvez por isso, quase não há resposta do Comitê de Realização da Justiça……!"
33110-86 = "E a ordem de convocação das irmãs!? Agora mesmo, nem que seja só a gente, a lei marcial……!"
33110-87 = "Relato de movimentação suspeita descoberta em alguma facção! Nas demais facções também, as figuras principais parecem estar começando a se reunir!"
33110-88 = "As irmãs que aguardavam atrás da catedral antiga estão, neste momento, em combate com a força de reserva de Gehenna! Aguardam instruções!"
33110-89 = "É-é a Hina Sorasaki! Com certeza é ela a origem de tudo!"
33110-94 = "Pessoal, acalmem-se!!"
33110-98 = "H-Hanako Urawa……?"
33110-99 = "……É um pedido da Sakurako. A partir de agora, vou me intrometer um pouquinho."
33110-100 = "C-como assim?"
33110-102 = "E-eu garanto! A Sakurako pediu: \"se algo me acontecer, que a Hanako, como substituta, assuma o comando da Sisterhood\"……!!"
33110-103 = "Q-quê…… mas, por mais que seja ordem da senhorita Sakurako, aqui há também gente das outras facções……."
33110-104 = "Não é hora pra esse tipo de conversa! Agora, com o Tea Party inteiro ausente, se a gente se despedaçar……"
33110-106 = "esta Trinity desmorona de verdade, entendem!?"
33110-107 = "……!!"
33110-108 = "O ponto fraco do triunvirato…… eu não imaginava que fosse se expor desta forma, mas……"
33110-109 = "como, de origem, é uma reunião de todo tipo de facção, o controle sob o Tea Party, agora, quase não funciona."
33110-110 = "Primeiro, organizar a situação e frear o descontrole de Trinity inteira. Essa é a prioridade máxima!"
33110-111 = "……Entendido. Se essa é a promessa com a senhorita Sakurako……."
33110-112 = "……Sim, sem objeção."
33110-113 = "Montem depressa a cadeia de comando; depois, parem os combates que ocorrem em cada ponto."
33110-114 = "E, em seguida, entrem na busca por feridos."
33110-115 = "Nesse processo, coletem informações da vizinhança, incluindo testemunhas precisas, e, a partir daí, vamos entender o que está acontecendo!"
33110-116 = "T-tumulto no Prédio 14! A facção Pater exige a decretação imediata da lei marcial e está marchando rumo à sede do Tea Party!!"
33110-117 = "Gh……! Contatem o Comitê de Realização da Justiça! Pelo canal de emergência pra ausência da Hasumi e da Tsurugi!"
33110-118 = "……Não; agora, até o Comitê de Realização da Justiça…… Quantas pessoas a Sisterhood consegue operar neste momento!?"
33110-121 = "(Me desculpe, Hifumi…… agir aqui talvez seja o máximo que eu consiga.)"
33110-122 = "(Azusa, Koharu, Sensei…… eu também vou dar tudo de mim. Por favor, por favor, fiquem bem……!)"
33110-124 = "Comitê de Realização da Justiça - Arredores da sala do clube"
33110-132 = "Chegou um pedido de apoio da administradora do Tea Party, pro Prédio 14!"
33110-133 = "M-mas até agora há pouco a ordem não era \"rumo à catedral antiga\"?"
33110-134 = "Da Sisterhood também chegou contato! O que a gente faz……?"
33110-136 = "Não é hora de obedecer a ordens de outras organizações! Antes de qualquer coisa, temos que salvar a veterana Hasumi e a veterana Tsurugi!"
33110-140 = "É-é que……"
33110-141 = "Também chegam contatos das integrantes destacadas por todo canto…… ai, francamente!"
33110-146 = "É que, deixa ver……."
33110-147 = "É que, eu, uu……."
33110-148 = "Ai, francamente…… por ora, cada uma pro seu posto! Você aí também! Não fica aí parada e vai fazer o seu trabalho de sempre!"
33110-152 = "Hã, e-e o meu posto era…………"
33110-153 = "a sala de gestão de itens apreendidos?"
33110-155 = "Trinity - Portão 5"
33110-158 = "P-por que um veículo de Gehenna aqui……!?"
33110-159 = "Ambulância? Só pode ser piada; você sabe a situação em que a gente tá!?"
33110-164 = "Chega! Vamos arrancar ela do banco do motorista e dar uma lição!!"
33110-169 = "Estou transportando um ferido; abram caminho, por favor. É uma emergência."
33110-170 = "P-por que, por um ferido logo de Gehenna……!!"
33110-171 = "……."
33110-173 = "Parem com isso!!"
33110-180 = "A Ordem dos Cavaleiros de Socorro……?"
33110-181 = "Por que, sabendo que há um ferido a bordo, vocês tentam atacar uma ambulância! Uma coisa dessas, esta Ordem dos Cavaleiros de Socorro não permite!!"
33110-182 = "Se vão atacar um ferido, antes disso enfrentem a gente. Francamente, que absurdo…… se a comandante Mine estivesse aqui, com certeza ficaria triste com esta cena."
33110-183 = "A-a comandante Mine……"
33110-185 = "Essa aí é a Mine do \"a Mine quebra e a Ordem conserta\", né!? Uma encrenqueira das brabas! Tenha dó!"
33110-186 = "N-não, a comandante não é encrenqueira; ela é só um pouquinho fora de época, digamos……."
33110-187 = "Tanto faz, aquela pessoa é louca!!"
33110-188 = "Veterana, por que tá dando efeito contrário……?"
33110-189 = "E-eu até sabia, mas…… a fama da comandante era ruim a esse ponto, né……."
33110-190 = "Ela vive dizendo \"mais que curar a ferida, deve-se remover a causa dela\"; será que é por isso……."
33110-196 = "Ah, peraí, s-saiam da frente! Se não obedecerem, eu aplico uma injeção, viu!?"
33110-197 = "Desculpem, vou lançar uma granada de luz!"
33110-199 = "Kyaaah! M-meus olhos……!?"
33110-200 = "Gh, o que……!?"
33110-201 = "Que foi isso, do nada……!?"
33110-205 = "Me desculpem pela brutalidade…… e por a situação ter chegado a isto……."
33110-206 = "D-da milícia……!"
33110-207 = "Suzumi!"
33110-208 = "Há quanto tempo. A Ordem dos Cavaleiros de Socorro já me ajudou várias vezes, né."
33110-209 = "Independentemente da academia, ferido é ferido…… não posso deixar que sejam brutalizados."
33110-213 = "A milícia…… aquela que, dependendo do caso, bate de frente até com o Comitê de Realização da Justiça……."
33110-214 = "Mais uma das perigosas……."
33110-215 = "……Não dá pra ficar nisso; vamos."
33110-219 = "Ufa…… parece que se acalmou, com esforço."
33110-220 = "M-muito obrigada, Suzumi. Graças a você, nos salvamos."
33110-224 = "Imagina. O que eu posso fazer é pouco, mas…… como milícia, o que dá pra fazer, tem que ser feito."
33110-225 = "……Opa?"
33110-226 = "Suzumi, Suzumi!! Enfim chegou a vez da nossa milícia, né!"
33110-227 = "A ace da milícia e ídola de todos, a \"Reisa\", vai, desta vez sim, junto com a Suzumi――"
33110-232 = "……Desculpa, tá tudo bem. Não liga. Então, eu vou dar mais uma ronda pra ver se não há outra situação complicada por aí."
33110-236 = "Ah, Suzumi!"
33110-237 = "Ela se foi…… continua sendo uma pessoa como o vento, né."
33110-238 = "……Agradeço a colaboração, pessoal da Ordem dos Cavaleiros de Socorro."
33110-239 = "Ah, sim! Pelo emblema, você é do \"Departamento de Medicina de Emergência\" de Gehenna…… né? Por que em Trinity……?"
33110-240 = "Lá dentro, um paciente de Trinity?"
33110-241 = "É o Sensei [USERNAME], da Schale."
33110-242 = "……Siim!?"
33110-243 = "O-o Sensei!?"
33110-244 = "Sim, ele foi baleado."
33110-248 = "Hãã!?"
33110-250 = "Próximo Episódio;O Caos que Acelera (2)"
