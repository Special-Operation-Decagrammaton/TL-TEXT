[translation]
33110-1 = "Episódio 11; Confusão Acelerada (1)"
33110-2 = "Kyaaaa!?"
33110-3 = "Esperem, não se separem! Se saírem da escola...!"
33110-4 = "É, seremos atacadas por Gehenna!"
33110-5 = "A-Auuu..."
33110-6 = "...As coisas ficaram feias."
33110-14 = "Hanako-san, pessoal do Clube de Reposição...!"
33110-15 = "M-Mari-san?"
33110-19 = "Mari-chan! Você está bem...!"
33110-20 = "A verdade é que parece que alguns radicais emitiram uma ordem de convocação de emergência por conta própria agora mesmo..."
33110-21 = "O quê! Isso é..."
33110-22 = "......?"
33110-23 = "Hã, o-o quê? Do que vocês estão falando?"
33110-24 = "Com a Sakurako-san ausente, a única pessoa que pode liderar a Irmandade e impedir que as facções da Tea Party saiam do controle é, com certeza, a Hanako-san..."
33110-25 = "M-Mas agora..."
33110-26 = "Hanako-san..."
33110-27 = "Ah, vocês aí!"
33110-31 = "Se não me engano, você é do Comitê de Realização da Justiça... certo? Estão falando de entrar em estado de prontidão imediata, então corra para a sede!"
33110-32 = "A-Ah, e-eu também? M-Mas..."
33110-33 = "A Presidente e a Vice-Presidente sumiram, anda logo!"
33110-37 = "A-Ahn, err..."
33110-41 = "...Hanako-chan, Koharu-chan. Eu vou procurar a Azusa-chan. Vocês duas, por favor, vão para os seus devidos lugares."
33110-42 = "Hifumi-chan..."
33110-43 = "M-Mas..."
33110-44 = "Vai ficar tudo bem por aqui, a Azusa-chan com certeza vai voltar. Se eu achar ela, ligo pra vocês na hora!"
33110-45 = "...T-Tá bom! A gente se vê depois, então!"
33110-46 = "...Certo, entendido. Mari-chan, vamos!"
33110-48 = "S-Sim...!"
33110-51 = "......"
33110-52 = "O que diabos aconteceu... Azusa-chan..."
33110-54 = "O local do Tratado do Éden está em chamas, e a situação ao redor do Antigo Tabernáculo é terrível!!"
33110-55 = "O que será que isso significa――"
33110-56 = "......"
33110-57 = "...Nagi-chan, eu te disse uma vez, não disse?"
33110-58 = "Nós vivemos num mundo assim."
33110-59 = "Então..."
33110-60 = "...Como a Seia-chan disse. Essa com certeza é esse tipo de história."
33110-61 = "......"
33110-63 = "Arredores - Beco na Área de Combate"
33110-69 = "O local do Tratado do Éden está em chamas, e a situação ao redor do Antigo Tabernáculo é terrível!!"
33110-70 = "As tropas de reserva de ambas as escolas que estavam aguardando atrás do Tabernáculo estão avançando em sua direção!"
33110-71 = "Daqui não dá pra ver, mas talvez as duas escolas já estejam em combate, só dá pra ouvir tiros e explosões!"
33110-72 = "As informações sobre essa situação ainda não estão claras! O número de feridos e a extensão dos danos ainda estão sendo investigados..."
33110-73 = "...Ah, notícia de última hora! Parece que uma reunião de emergência foi convocada na Trinity!"
33110-74 = "P-Parece que a mesma coisa aconteceu com o Pandemonium de Gehenna! Será que as duas escolas estão se preparando para declarar estado de emergência...!?"
33110-80 = "Sinon-chan, acho melhor a gente recuar também!?"
33110-81 = "Você tem razão, Mai-senpai! Desculpe, mas vamos continuar a transmissão assim que chegarmos a um lugar mais seguro!"
33110-83 = "No fim das contas, qual foi a causa da explosão!?"
33110-84 = "Onde está a Sakurako-sama!? Quantos feridos!? Ainda não conseguiram contato com a Nagisa-san!?"
33110-85 = "Dizem que a Presidente Tsurugi e a Vice-Presidente Hasumi ainda estão desaparecidas! Talvez por isso quase não tenhamos resposta do Comitê de Realização da Justiça...!"
33110-86 = "E a convocação das irmãs!? Vamos declarar lei marcial agora mesmo, só com a gente...!"
33110-87 = "Recebemos relatos de movimentações suspeitas em uma das facções! As outras facções também começaram a reunir seus líderes!"
33110-88 = "As irmãs que estavam aguardando atrás do Tabernáculo estão em combate com as forças de reserva de Gehenna! Estamos aguardando ordens!"
33110-89 = "É-É a Hina Sorasaki! Com certeza ela é a culpada!"
33110-94 = "Pessoal, por favor, acalmem-se!!"
33110-98 = "H-Hanako Urawa-san...?"
33110-99 = "...Foi um pedido da Sakurako-san. A partir de agora, vou me intrometer um pouco."
33110-100 = "C-Como assim?"
33110-102 = "E-Eu garanto! A Sakurako-san pediu: 'Se algo acontecer comigo, a Hanako-san assumirá o comando da Irmandade'...!!"
33110-103 = "Mas... por mais que seja uma ordem da Sakurako-sama, também há membros de outras facções aqui..."
33110-104 = "Não é hora de discutir isso! Com toda a Tea Party ausente, se a gente se separar..."
33110-106 = "A Trinity inteira vai acabar entrando em colapso!?"
33110-107 = "...!!"
33110-108 = "Eu não imaginava que a fraqueza do triunvirato seria exposta dessa forma..."
33110-109 = "Como várias facções já estavam se reunindo, a liderança da Tea Party quase não tem efeito agora."
33110-110 = "Primeiro, vamos organizar a situação e impedir que toda a Trinity perca o controle. Essa é a prioridade!"
33110-111 = "...Entendido. Se essa foi a promessa que fez com a Sakurako-sama..."
33110-112 = "...Sim, não temos objeções."
33110-113 = "Estabeleçam uma cadeia de comando imediatamente e, em seguida, parem os combates que estão acontecendo em vários lugares."
33110-114 = "Depois disso, iniciem a busca por feridos."
33110-115 = "Nesse processo, reúnam informações dos arredores, incluindo de testemunhas precisas, para entender o que está acontecendo!"
33110-116 = "C-Confusão no Prédio 14! A facção Pater está exigindo a declaração imediata de lei marcial e está marchando em direção à sede da Tea Party!!"
33110-117 = "...! Contatem o Comitê de Realização da Justiça! Usem o contato de emergência para quando a Hasumi-san e a Tsurugi-san estiverem ausentes!"
33110-118 = "...Não, agora até o Comitê de Realização da Justiça... Quantas pessoas a Irmandade tem disponíveis no momento!?"
33110-121 = "(Me desculpe, Hifumi-chan... Acho que vou ter que me concentrar em cuidar das coisas por aqui)"
33110-122 = "(Azusa-chan, Koharu-chan, Sensei... Eu também vou dar o meu melhor. Por favor, fiquem bem...!)"
33110-124 = "Arredores da Sede do Comitê de Realização da Justiça"
33110-132 = "Recebemos um pedido de apoio do administrador da Tea Party para o Prédio 14!"
33110-133 = "M-Mas a ordem até agora não era para 'ir em direção ao Tabernáculo'?"
33110-134 = "Também recebemos um contato da Irmandade! O que a gente faz...?"
33110-136 = "Não é hora de ouvir ordens de outras organizações! Antes de mais nada, precisamos resgatar a Hasumi-senpai e a Tsurugi-senpai!"
33110-140 = "A-Ahn..."
33110-141 = "Os membros despachados para vários lugares também estão entrando em contato... Ah, que saco!"
33110-146 = "A-Ahn, err..."
33110-147 = "Tipo, eu, ahn..."
33110-148 = "Ah, que droga... todo mundo para os seus postos! Você aí também! Pare de ficar parada aí e vá fazer o seu trabalho!"
33110-152 = "Hã, m-meu trabalho é..."
33110-153 = "A sala de gerenciamento de itens confiscados?"
33110-155 = "Trinity - Portão 5"
33110-158 = "P-Por que tem um veículo de Gehenna aqui...!?"
33110-159 = "Ambulância? Tá de brincadeira, você sabe em que situação a gente tá!?"
33110-164 = "Chega de papo, vamos arrancar elas do banco do motorista e mostrar com quem tão mexendo!!"
33110-169 = "Estamos transportando um ferido, por favor, abram caminho. É uma emergência."
33110-170 = "P-Por que a gente faria isso por um ferido de Gehenna...!!"
33110-171 = "......"
33110-173 = "Parem com isso!!"
33110-180 = "Cavaleiros Hospitalários...?"
33110-181 = "Por que vocês querem atacar uma ambulância sabendo que há um ferido nela!? Nós, Cavaleiros Hospitalários, não vamos permitir isso!!"
33110-182 = "Se querem atacar um ferido, terão que passar por nós primeiro. Mas que absurdo... se a Capitã Mine estivesse aqui, ela com certeza ficaria triste com essa situação."
33110-183 = "C-Capitã Mine..."
33110-185 = "Essa é aquela Mine que dizem 'a Mine destrói e os Cavaleiros curam', né!? Ela é uma encrenqueira da pesada! Para com essa palhaçada!"
33110-186 = "N-Não, a Capitã não é uma encrenqueira, ela só é um pouco, digamos, antiquada..."
33110-187 = "Tanto faz, aquela mulher é maluca!!"
33110-188 = "Senpai, por que isso tá tendo o efeito contrário...?"
33110-189 = "E-Eu sabia que sim, mas... a fama da Capitã é tão ruim assim...?"
33110-190 = "Ela costuma dizer que 'mais do que curar a ferida, é preciso eliminar a causa da ferida', será que é por causa disso...?"
33110-196 = "Ah, ei, s-saiam da frente! Se não obedecerem, vou aplicar uma injeção em vocês!?"
33110-197 = "Desculpem, lançando granada de luz!"
33110-199 = "Kyaaa! M-Meus olhos...!?"
33110-200 = "Ugh, o que é isso...!?"
33110-201 = "O que foi isso do nada...!?"
33110-205 = "Sinto muito pela atitude agressiva... e por termos chegado a essa situação..."
33110-206 = "D-Do Corpo de Vigilância...!"
33110-207 = "Suzumi-san!"
33110-208 = "Faz tempo que não nos vemos. Vocês, dos Cavaleiros Hospitalários, já cuidaram de mim várias vezes."
33110-209 = "Independentemente de qual escola pertencem, feridos são feridos... não posso deixar que façam mal a eles."
33110-213 = "Corpo de Vigilância... aquele grupo que às vezes até bate de frente com o Comitê de Realização da Justiça..."
33110-214 = "Outra doida..."
33110-215 = "...Não vale a pena, vamos embora."
33110-219 = "Ufa... parece que as coisas se acalmaram."
33110-220 = "A-Muito obrigada, Suzumi-san. Você nos salvou."
33110-224 = "Imagina. Há pouco que eu possa fazer, mas... como Corpo de Vigilância, preciso fazer o que está ao meu alcance."
33110-225 = "...Opa?"
33110-226 = "Suzumi-san, Suzumi-san!! Finalmente chegou a hora do nosso Corpo de Vigilância brilhar, né!"
33110-227 = "E desta vez, a idol e ás do Corpo de Vigilância, 'Reisa', estará com a Suzumi-san――"
33110-232 = "...Com licença, eu estou bem. Não se preocupem. Bem, vou dar uma volta para ver se não há mais nenhum problema ocorrendo."
33110-236 = "Ah, Suzumi-san!"
33110-237 = "Ela já foi... continua rápida como o vento."
33110-238 = "...Obrigada pela cooperação, pessoal dos Cavaleiros Hospitalários."
33110-239 = "Ah, sim! Pelo emblema, vocês são do 'Departamento de Medicina de Emergência' de Gehenna... certo? O que estão fazendo na Trinity...?"
33110-240 = "Tem algum paciente da Trinity aí dentro?"
33110-241 = "É o Sensei [USERNAME], da Schale."
33110-242 = "...O quê!?"
33110-243 = "O-O Sensei!?"
33110-244 = "Sim, ele levou um tiro."
33110-248 = "Hã!?"
33110-250 = "Próximo Episódio; Confusão Acelerada (2)"