[translation]
33110-1 = "Episódio 11; Caos Acelerado (1)"
33110-2 = "Aaaahhh!?"
33110-3 = "Esperem, não se dispersem! Se saírem da academia...!"
33110-4 = "É verdade, seremos atacados pela Gehenna!"
33110-5 = "A-auuu..."
33110-6 = "...As coisas estão ficando complicadas."
33110-14 = "Hanako-san, pessoal do Clube de Reforço...!"
33110-15 = "Ma-Marie-san?"
33110-19 = "Marie-chan! Você está bem...!"
33110-20 = "Na verdade, parece que alguns extremistas emitiram uma ordem de convocação de emergência por conta própria..."
33110-21 = "¡! Isso é..."
33110-22 = "...?"
33110-23 = "Hã, o-o quê? O que isso significa?"
33110-24 = "Com a ausência da Sakurako-san, a única que pode comandar a Sisterhood e impedir que as facções do Tea Party saiam do controle é, certamente, a Hanako-san..."
33110-25 = "Ma-mas agora..."
33110-26 = "Hanako-san..."
33110-27 = "Ah, ali!"
33110-31 = "Se não me engano, você é membro do Comitê de Justiça, certo? Recebemos ordens para entrar em prontidão imediata, então corra para a sala do clube!"
33110-32 = "Ah, e-eu também? Ma-mas..."
33110-33 = "Não conseguimos encontrar a presidente nem a vice-presidente, apresse-se!"
33110-37 = "A, u, bem..."
33110-41 = "...Hanako-chan, Koharu-chan. Eu vou procurar a Azusa-chan. Por favor, vão cada uma para seus respectivos lugares."
33110-42 = "Hifumi-chan..."
33110-43 = "Ma-mas..."
33110-44 = "Aqui ficarei bem, a Azusa-chan com certeza vai voltar. Assim que eu a encontrar, entro em contato!"
33110-45 = "...En-entendido! Então, nos vemos depois!"
33110-46 = "...Sim, compreendido. Marie-chan, vamos!"
33110-48 = "Si-sim...!"
33110-51 = "..."
33110-52 = "O que diabos aconteceu... Azusa-chan..."
33110-54 = "O local do Tratado de Eden está em chamas, e a situação ao redor da Antiga Catedral é terrível!!"
33110-55 = "Que tipo de situação é essa, afinal—"
33110-56 = "..."
33110-57 = "...Nagi-chan, eu te disse uma vez, não disse?"
33110-58 = "Nós vivemos em um mundo assim."
33110-59 = "Por isso..."
33110-60 = "...Como esperado, a Seia-chan estava certa. Isso provavelmente é esse tipo de história."
33110-61 = "..."
33110-63 = "Beco da área de combate, arredores"
33110-69 = "O local do Tratado de Eden está em chamas, e a situação ao redor da Antiga Catedral é terrível!!"
33110-70 = "As forças de reserva de ambas as academias que estavam de prontidão atrás da Antiga Catedral estão avançando!"
33110-71 = "Não consigo ver daqui, mas parece que o combate entre as duas academias começou; só consigo ouvir sons de tiros e explosões!"
33110-72 = "As informações sobre o que está acontecendo ainda não foram organizadas! O número de feridos e a escala dos danos ainda estão sendo investigados..."
33110-73 = "...Ah, plantão urgente! Recebemos a notícia de que uma reunião de emergência foi realizada em Trinity!"
33110-74 = "Pa-parece que o Pandemônio de Gehenna está fazendo o mesmo! Será que ambas as academias estão se preparando para declarar estado de emergência...!?"
33110-80 = "Sinon-chan, não seria melhor a gente recuar também!?"
33110-81 = "Você tem razão, Mai-senpai! Desculpe-nos, mas vamos nos mover para um lugar mais seguro e continuar a transmissão!"
33110-83 = "Afinal, qual é a causa da explosão!?"
33110-84 = "Onde está a Sakurako-sama!? Quantos feridos existem!? Ainda não conseguiram contato com a Nagisa-san!?"
33110-85 = "A presidente Tsurugi e a vice-presidente Hasumi continuam desaparecidas! Por causa disso, quase não há resposta do Comitê de Justiça...!"
33110-86 = "E a convocação das irmãs!? Agora mesmo, precisamos decretar lei marcial, nem que seja só nós..."
33110-87 = "Recebemos relatos de movimentos suspeitos em uma das facções! Parece que as figuras principais das outras facções também estão começando a se reunir!"
33110-88 = "As irmãs que estavam de prontidão na retaguarda da Antiga Basílica estão em combate com as forças de reserva de Gehenna agora! Elas aguardam ordens!"
33110-89 = "É, é a Hina Sorasaki! Com certeza ela deve ser a culpada por trás disso!"
33110-94 = "Pessoal, por favor, acalmem-se!!"
33110-98 = "U-Urawa Hanako...?"
33110-99 = "...É um pedido da Sakurako-san. A partir de agora, vou dar algumas ordens."
33110-100 = "O-o que você quer dizer com isso?"
33110-102 = "E-eu garanto! A Sakurako-san me pediu: 'Caso algo aconteça comigo, a Hanako-san deve assumir o comando da Sisterhood como minha substituta'...!!"
33110-103 = "O quê... Mas, mesmo que seja uma ordem da Sakurako-sama, há pessoas de outras facções aqui também..."
33110-104 = "Não é hora para se preocupar com isso! Agora que todos do Tea Party estão ausentes, se ficarmos divididos..."
33110-106 = "Esta Trinity vai acabar entrando em colapso, não vai!?"
33110-107 = "...!!"
33110-108 = "Não imaginei que a fraqueza do triunvirato seria exposta desta forma..."
33110-109 = "Como facções de todos os tipos já estavam reunidas aqui, o controle sob o Tea Party praticamente não existe mais."
33110-110 = "Primeiro, vamos estabilizar a situação e impedir que toda Trinity saia do controle. Essa é a prioridade máxima!"
33110-111 = "...Entendido. Se essa é a promessa feita à Sakurako-sama..."
33110-112 = "...Sim, não tenho objeções."
33110-113 = "Vamos construir rapidamente uma cadeia de comando e, em seguida, deter os combates que estão ocorrendo em vários locais."
33110-114 = "E depois, iniciem a busca pelos feridos."
33110-115 = "Nesse processo, coletem informações ao redor, incluindo relatos de testemunhas oculares, para entender o que está acontecendo!"
33110-116 = "H-há um tumulto no 14º prédio escolar! A facção Pater está exigindo a declaração imediata de lei marcial e estão indo em direção à sede do Tea Party!!"
33110-117 = "Droga...! Contatem o Comitê de Justiça! Usem o contato de emergência para quando a Hasumi-san e a Tsurugi-san estiverem ausentes!"
33110-118 = "...Não, o Comitê de Justiça também está... Quantas pessoas a Sisterhood tem disponíveis agora!?"
33110-121 = "(Desculpe, Hifumi-chan... Acho que estou fazendo o meu melhor aqui.)"
33110-122 = "(Azusa-chan, Koharu-chan, Sensei... Eu também darei o meu melhor. Por favor, por favor, fiquem bem...!)"
33110-124 = "Arredores da sala do Comitê de Justiça"
33110-132 = "Recebemos um pedido de apoio do administrador do Tea Party para o 14º prédio escolar!"
33110-133 = "M-mas até agora a ordem não era para ir em direção à Antiga Basílica?"
33110-134 = "Também recebemos contato da Sisterhood! O que devemos fazer...?"
33110-136 = "Não é hora de ouvir ordens de outras organizações! Antes de tudo, precisamos ajudar a Hasumi-senpai e a Tsurugi-senpai!"
33110-140 = "A-ah, com licença..."
33110-141 = "Também estou recebendo contatos dos membros espalhados por toda parte... Ah, droga!"
33110-146 = "Ah, bem..."
33110-147 = "É que, eu, ugh..."
33110-148 = "Ah, chega... Por enquanto, cada um para o seu posto! Você aí também! Não fique parado, vá fazer o seu trabalho!"
33110-152 = "Eh, m-meu posto é..."
33110-153 = "A sala de controle de itens apreendidos?"
33110-155 = "5º Portão de Trinity"
33110-158 = "P-por que um veículo de Gehenna está aqui...!?"
33110-159 = "Ambulância? Não brinca, você tem noção da situação atual!?"
33110-164 = "Já chega, vamos tirá-los do banco do motorista e ensinar uma lição a eles!!"
33110-169 = "Estamos transportando feridos, abram caminho. É uma emergência."
33110-170 = "P-por que, por causa de feridos de Gehenna..."
33110-171 = "..."
33110-173 = "Parem com isso!!"
33110-180 = "Esquadrão de Socorro...?"
33110-181 = "Como vocês podem tentar atacar uma ambulância sabendo que há feridos dentro!? O Esquadrão de Socorro não vai permitir tal coisa!!"
33110-182 = "Se vão atacar os feridos, terão que passar por nós primeiro. Sério, que absurdo... Se a Comandante Mine estivesse aqui, ela certamente ficaria triste com essa situação."
33110-183 = "C-Comandante Mine..."
33110-185 = "Essa é aquela Mine do 'a Mine quebra e a Cavalaria de Socorro conserta', né!? Ela é uma encrenqueira de marca maior! Não brinque com isso!"
33110-186 = "N-não, a comandante não é uma encrenqueira, é só que ela é um pouco... anacrônica, por assim dizer."
33110-187 = "Tanto faz, aquela mulher é louca!!"
33110-188 = "Senpai, por que está tendo o efeito contrário...?"
33110-189 = "E-eu sabia, mas... a reputação da comandante era tão ruim assim...?"
33110-190 = "Ela sempre diz que 'é melhor eliminar a causa do ferimento do que tratar a ferida', será que é por causa disso...?"
33110-196 = "Ah, espere, s-saia da frente! Se não me ouvir, vou ter que te dar uma injeção, viu!?"
33110-197 = "Desculpem, vou lançar uma granada de luz!"
33110-199 = "Aaaah! M-meus olhos...!?"
33110-200 = "Droga, o que é isso...!?"
33110-201 = "O que foi de repente...!?"
33110-205 = "Peço perdão pela abordagem bruta... e por termos chegado a essa situação..."
33110-206 = "D-da Brigada de Autodefesa...!"
33110-207 = "Suzumi-san!"
33110-208 = "Faz tempo. Já fui muito bem cuidada por vocês da Cavalaria de Socorro antes."
33110-209 = "Independente da escola, um ferido é um ferido... não posso deixar que tratem vocês de forma bruta."
33110-213 = "A Brigada de Autodefesa... aquela que, dependendo da situação, entra em conflito direto até com o Comitê de Justiça..."
33110-214 = "Lá vem gente perigosa de novo..."
33110-215 = "...Não tenho tempo para isso, vamos embora."
33110-219 = "Ufa... parece que as coisas se acalmaram."
33110-220 = "Ah, muito obrigada, Suzumi-san. Graças a você, nos salvamos."
33110-224 = "Não há de quê. Não posso fazer muito, mas... como parte da Brigada de Autodefesa, preciso fazer o que estiver ao meu alcance."
33110-225 = "...Opa?"
33110-226 = "Suzumi-san, Suzumi-san!! Finalmente chegou a vez da nossa Brigada de Autodefesa!"
33110-227 = "A ás da Brigada de Autodefesa e ídolo de todos, 'Reisa', desta vez vai junto com a Suzumi-san—"
33110-232 = "...Sinto muito, estou bem. Não se preocupe. Bem, vou dar uma volta para ver se não há mais nada acontecendo."
33110-236 = "Ah, Suzumi-san!"
33110-237 = "Ela foi embora... como sempre, ela é como o vento."
33110-238 = "...Agradeço a cooperação, pessoal da Cavalaria de Socorro."
33110-239 = "Ah, sim! Pelo emblema, vocês são do 'Departamento de Medicina de Emergência' de Gehenna... certo? Por que estão em Trinity...?"
33110-240 = "Tem algum paciente de Trinity aí dentro?"
33110-241 = "É o Sensei [USERNAME] do Schale."
33110-242 = "...O quê!?"
33110-243 = "O, o Sensei!?"
33110-244 = "Sim, ele foi atingido por um tiro."
33110-248 = "O quê!?"
33110-250 = "Próximo episódio: Caos Acelerado (2)"
