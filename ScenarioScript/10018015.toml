[translation]
10018015-8 = "A-ah, pode esperar só um pouco!"
10018015-9 = "Vocês vão pagar caro por terem se oposto ao nosso 'Grupo Gourmet Capacete', pode apostar!"
10018015-15 = "Que pessoas sem o menor pingo de classe, não é mesmo?"
10018015-19 = "Bem, agora que os incômodos se foram... podemos ouvir o que a proprietária tem a dizer?"
10018015-24 = "Agradeço a preocupação de vocês, mas continuar com este restaurante é..."
10018015-25 = "Como posso dizer... é difícil, não tenho outra escolha a não ser desistir."
10018015-26 = "[s] \"Com licença... se não for pedir muito, poderia nos contar os detalhes da situação?\""
10018015-27 = "Os detalhes, você diz..."
10018015-28 = "Bem... já está decidido que vamos fechar de qualquer forma..."
10018015-32 = "Se vocês já deram uma olhada no centro comercial, talvez já tenham percebido..."
10018015-33 = "Muitos estabelecimentos nesta área foram transformados em franquias."
10018015-35 = "(Então, como as grandes empresas passaram a oferecer um sabor padronizado a preços baixos, os restaurantes individuais não conseguiram competir...)"
10018015-36 = "(Como alguém que trilha o caminho da gastronomia, isso parte meu coração...)"
10018015-38 = "Eu até pensei em continuar competindo com os preços dessas franquias..."
10018015-39 = "Mas, infelizmente, um restaurante familiar como o meu não tem mais forças para isso..."
10018015-40 = "Além disso, ultimamente, parece que quando tudo vai mal, piora... #nUm novo problema surgiu..."
10018015-41 = "Um novo problema?"
10018015-42 = "Sim. Nós compramos nossos ingredientes de uma grande empresa alimentícia chamada 'Nyao Food', mas..."
10018015-43 = "Recentemente, a Nyao Food nos notificou sobre um reajuste de preços."
10018015-44 = "As franquias também compram ingredientes da Nyao Food, é claro..."
10018015-50 = "Espere um pouco!"
10018015-51 = "Então as franquias também aumentaram os preços, certo?"
10018015-52 = "Se o fornecedor é o mesmo, eles também deveriam ser forçados a aumentar os preços, não é?"
10018015-53 = "Hmm, não entendo muito bem, mas isso significa que o custo de vida subiu, né?"
10018015-55 = "Não, como as franquias estão sob o guarda-chuva da Nyao Food..."
10018015-56 = "Eles conseguem manter a faixa de preço original, compensando o aumento do custo de vida"
10018015-57 = "através da redução do aluguel dos espaços e outras medidas."
10018015-58 = "Que absurdo!"
10018015-59 = "O que eles esperam que os pequenos restaurantes façam?!"
10018015-60 = "Nesse caso... não lhe ofereceram a chance de transformar seu restaurante em uma franquia?"
10018015-61 = "Você é perspicaz. Como disse, representantes vieram aqui várias vezes."
10018015-62 = "Mas eu... eu queria proteger este restaurante que foi passado de geração em geração..."
10018015-63 = "Eu fui tola. Por insistir tanto no restaurante, acabei perdendo tudo —"
10018015-64 = "No começo, eu achava que preparar cada prato com cuidado era a melhor forma de retribuir aos clientes."
10018015-65 = "Mas o mundo não é tão gentil assim, não é?"
10018015-66 = "Desculpe-me por falar tanto. Ainda não parece real... #nMas, graças a vocês, consegui organizar um pouco meus sentimentos."
10018015-67 = "Muito obrigada. #nO fato de vocês terem comido aqui com tanto gosto outro dia também se tornou uma última boa lembrança."
10018015-73 = "Esse sentimento..."
10018015-74 = "Sim?"
10018015-75 = "Eu acho que entendo esse sentimento."
10018015-76 = "Cliente...?"
10018015-77 = "Não importa o quanto você se esforce pesquisando receitas,"
10018015-78 = "às vezes, por motivos que fogem do seu controle, você acaba nem conseguindo cozinhar!"
10018015-84 = "E mesmo que você não desista e tente cozinhar de novo,"
10018015-85 = "por culpa de terceiros, a comida que você fez é consumida sem que ninguém aprecie o sabor!"
10018015-86 = "Isso realmente aconteceu? Que história terrível! ★"
10018015-87 = "E olha que eu estava super animada para fazer uma comida deliciosa desta vez!"
10018015-88 = "Antes mesmo de começar, você sofre um desastre natural e nada dá certo!"
10018015-89 = "S-senpai!?"
10018015-90 = "E quando você finalmente acha que terminou, acontece isso!"
10018015-95 = "A comida sumia antes mesmo de ser servida!"
10018015-96 = "O que, o que, do que vocês estão falando?"
10018015-97 = "Me deixem participar também!"
10018015-98 = "C-cliente?"
10018015-99 = "Por favor, acalme-se. #nEu entendo muito bem como se sente, mas..."
10018015-104 = "Eu... vou ajudar."
10018015-106 = "Eh...?"
10018015-107 = "Com certeza deve haver um jeito. Vamos pensar todos juntos. #nNão podemos simplesmente desistir sem fazer nada."
10018015-108 = "Isso... você se oferecer para ajudar mesmo depois de ouvir minha história... não tenho palavras para agradecer."
10018015-109 = "Muito obrigada a todos vocês, de verdade..."
10018015-114 = "Ufufu."
10018015-115 = "As coisas se resolveram muito bem, não é? Agora está tudo certo."
10018015-116 = "[s] \"Será que está tudo bem mesmo...?\""
10018015-117 = "Ora... aconteceu alguma coisa?"
10018015-118 = "Parece que não há problemas... certo?"
10018015-119 = "Se é assim, então está tudo bem."
10018015-125 = "...Por que você está suspirando?"
