[translation]
10018015-8 = "お、覚えとけよ！"
10018015-9 = "あたしら「グルメヘルメット団」に逆らった落とし前は、あとでつけてもらうからな！"
10018015-15 = "上品さのかけらもないような方々でしたわね。"
10018015-19 = "それでは、邪魔者もいなくなりましたし……女将さんの話を伺いましょうか。"
10018015-24 = "お気持ちはありがたいのですが、やはりこの店を続けるのは……"
10018015-25 = "難しいと言いますか……断念せざるを得ないのです。"
10018015-26 = "[s] \"失礼ですが……よろしければ、詳しい事情をお伺いしても？\""
10018015-27 = "事情、ですか……。"
10018015-28 = "そうですね……どうせ閉店することは決まっていますから……。"
10018015-32 = "すでに商店街をご覧になったのであれば、お分かりかもしれませんが……"
10018015-33 = "この地域はフランチャイズ化していったお店が多いんです。"
10018015-35 = "（大手から一定の味が安価に提供されるようになり、個人経営のお店が立ち行かなくなったのですね……）"
10018015-36 = "（美食の道を歩む身として、非常に胸が痛むお話ですわ……）"
10018015-38 = "そうやってフランチャイズ化していったお店と価格競争を続けていく事も考えはしたのですが……"
10018015-39 = "やはり、うちのような個人経営のお店にはそんな体力は残っていなくて……。"
10018015-40 = "それにどうも最近、弱り目にたたり目というか……#n新たに別の問題も浮上しまして……。"
10018015-41 = "別の問題、ですか？"
10018015-42 = "ええ。うちは「ニャオフード」という大手食品会社から食材を仕入れているのですが……"
10018015-43 = "先日、ニャオフードから価格の改定を告げられたんです。"
10018015-44 = "ニャオフードから食材を仕入れているのは、フランチャイズ店も一緒ではありますが……。"
10018015-50 = "ちょっと待って！"
10018015-51 = "それならフランチャイズ店も値上げしたのよね？"
10018015-52 = "たしかに仕入れ先が同じなら、あちらも値上げせざるを得ませんよね。"
10018015-53 = "う～ん、あんまり分からないけど物価が上がったってことだよね？"
10018015-55 = "いえ、フランチャイズ店はニャオフードの傘下にあるので……"
10018015-56 = "物価が上昇した分、テナント料を引き下げるなどで、"
10018015-57 = "あちらは従来の価格帯を維持できているようなのです。"
10018015-58 = "何それひどい！"
10018015-59 = "小さなお店はどうしろっていうのよ！"
10018015-60 = "それなら……女将さんのお店にも、フランチャイズ化のお話が来たのではないでしょうか？"
10018015-61 = "鋭いですね。おっしゃる通り、何度も営業の方がいらっしゃいました。"
10018015-62 = "でも私は……やっぱり、代々受け継がれてきたこのお店を守りたくて……。"
10018015-63 = "自分が愚かでした。そうやってお店に固執した結果、失うことになるなんて――"
10018015-64 = "最初は、一品一品丁寧に作ることこそ、お客様にできる恩返しだと思っていました。"
10018015-65 = "ですが、世の中そんなに甘くはありませんね。"
10018015-66 = "長話になってごめんなさい。まだなんだか実感が湧かなくて……。#nでもおかげで、自分の気持ちが少し整理できました。"
10018015-67 = "ありがとうございます。#n先日おいしそうに食べてくださったことも、最後の良い思い出になりました。"
10018015-73 = "その気持ち……。"
10018015-74 = "はい？"
10018015-75 = "その気持ち、私も分かる気がします。"
10018015-76 = "お客様……？"
10018015-77 = "どんなに頑張って料理の研究をしても、"
10018015-78 = "自分ではどうしようもない理由で料理自体ができなくなってしまうとか！"
10018015-84 = "諦めずにもう一度料理を作っても、"
10018015-85 = "自分以外のせいで、作った料理がロクに味わわれず消費されるとか！"
10018015-86 = "そんなことがあったんですか？ひどい話ですね★"
10018015-87 = "今度こそおいしい料理にしようって意気込んだのに！"
10018015-88 = "料理にとりかかる前の段階で天変地異みたいな被害に遭って、何もうまくいかないとか！"
10018015-89 = "せ、先輩！？"
10018015-90 = "やっとの思いで完成したと思ったら！"
10018015-95 = "配膳前に料理がなくなってたり！"
10018015-96 = "なになに、なんの話をしてるの？"
10018015-97 = "私も入れて！"
10018015-98 = "お、お客様？"
10018015-99 = "落ち着いてください。#nそのお気持ちは私もよく分かりますが……。"
10018015-104 = "私が……手伝います。"
10018015-106 = "え……？"
10018015-107 = "きっと何か方法があるはずです。みんなで考えましょう。#n何もせずに諦めるわけにはいきません。"
10018015-108 = "その……私の話を聞いた上で手を貸してくださるなんて……感謝しかありません。"
10018015-109 = "本当に皆さん、ありがとう、ございます……。"
10018015-114 = "うふふ。"
10018015-115 = "お話がうまくまとまりましたね。これで全て良しですわ。"
10018015-116 = "[s] \"本当に大丈夫なのかな……？\""
10018015-117 = "あら……何かありました？"
10018015-118 = "問題なさそう……ですか。"
10018015-119 = "それなら大丈夫だというのに。"
10018015-125 = "……どうしてため息をついていらっしゃるのでしょうか？"
