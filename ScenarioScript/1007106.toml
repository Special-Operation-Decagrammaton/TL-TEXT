[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1007106-1 = "SRT, Iniciando Relatório" 
1007106-5 = "（……Por coincidência, acordei mais cedo do que de costume.）" 
1007106-6 = "（Como o horário era muito ruim para voltar a dormir, decidi dar uma caminhada de leve.）" 
1007106-11 = "[ns] Visto-me e saio da pousada." 
1007106-18 = "……Ué, Sensei?" 
1007106-19 = "[ns] \"Essa voz……\"" 
1007106-22 = "[wa:450]― [log=미야코 수영복]Bom dia.[/log]" 
1007106-25 = "― [log=미야코 수영복]O Sensei também [wa:1200]está dando um passeio matinal?[/log]" 
1007106-28 = "[wa:1000]― [log=미야코 수영복]Eu decidi dar [wa:850]um mergulho hoje,[/log]" 
1007106-30 = "― [log=미야코 수영복]Em vez do meu [wa:600]jogging de costume.[/log]" 
1007106-33 = "[wa:100]― [log=미야코 수영복]Afinal, já que viemos para a praia,[/log]" 
1007106-35 = "[wa:100]― [log=미야코 수영복]Achei que não teria [wa:500]problema em fazer [wa:1000]algo um pouco diferente do habitual.[/log]" 
1007106-38 = "[wa:1300]― [log=미야코 수영복]……Apenas me sinto [wa:670]um pouco envergonhada [wa:950]em deixar que me veja assim,[/log]" 
1007106-40 = "― [log=미야코 수영복]Tão [wa:500]cedo pela manhã.[/log]" 
1007106-43 = "[wa:1800]― [log=미야코 수영복]………Atchim![/log]" 
1007106-46 = "― [log=미야코 수영복]Parece que [wa:550]eu acabei [wa:870]ficando muito tempo por aqui……[/log]" 
1007106-48 = "― [log=미야코 수영복]Meu corpo [wa:380]começou a esfriar.[/log]" 
1007106-51 = "[ns] \"Tão cedo de manhã... A água está muito fria, você está bem?\"" 
1007106-52 = "[wa:2100]― [log=미야코 수영복]……Tem razão.[/log]" 
1007106-54 = "― [log=미야코 수영복]Dizem que coelhos [wa:370]não devem [wa:1280]entrar na água, mas……[/log]" 
1007106-57 = "― [log=미야코 수영복]Como pode ver, [wa:1250]eu não sou um coelho.[/log]" 
1007106-60 = "[ns] \"Todas do Esquadrão RABBIT são boas na natação?\"" 
1007106-61 = "Sim. Como alunas da Academia Especial SRT, devemos ser capazes de cumprir missões em qualquer ambiente." 
1007106-62 = "Podemos não ser perfeitas, mas todas nós dominamos as técnicas básicas de natação." 
1007106-63 = "E a natação causa menos impacto e estresse no corpo……" 
1007106-64 = "Por isso é muito adequada para o fortalecimento dos músculos do corpo todo――" 
1007106-69 = "I-Isso, veja bem……" 
1007106-70 = "A n-natação é um exercício de corpo inteiro que consome muita energia, então……" 
1007106-71 = "Seria melhor…… comer alguma coisa primeiro……" 
1007106-72 = "[s] \"No caminho para cá, vi um restaurante que abre desde o início da manhã.\"" 
1007106-76 = "[ns] \"Vamos comer juntos, Miyako.\"" 
1007106-80 = "……Sim, Sensei!" 
1007106-82 = "（Depois disso, andei de mãos dadas com a Miyako até o restaurante.）" 