[translation]
1007106-1 = "SRT、報告します"
1007106-5 = "（……偶然、いつもより早い時間に目が覚めた）"
1007106-6 = "（二度寝するには微妙な時間だったため、軽く散歩をすることにした）"
1007106-11 = "[ns] 着替えて宿の外に出る。"
1007106-18 = "……あれ、先生？"
1007106-19 = "[ns] \"この声は……\""
1007106-22 = "[wa:450]― [log=미야코 수영복]おはようございます。[/log]"
1007106-25 = "― [log=미야코 수영복]先生も、[wa:1200]朝の散歩ですか？[/log]"
1007106-28 = "[wa:1000]― [log=미야코 수영복]私はいつもの[wa:850]ジョギングの代わりに、[/log]"
1007106-30 = "― [log=미야코 수영복]ひと泳ぎしようと[wa:600]思いまして。[/log]"
1007106-33 = "[wa:100]― [log=미야코 수영복]せっかくの海ですから、[/log]"
1007106-35 = "[wa:100]― [log=미야코 수영복]普段とは[wa:500]違う事をするのも[wa:1000]悪くないかなと。[/log]"
1007106-38 = "[wa:1300]― [log=미야코 수영복]……早朝から[wa:670]このような姿を[wa:950]お見せしてしまって、[/log]"
1007106-40 = "― [log=미야코 수영복]少し、[wa:500]恥ずかしいです。[/log]"
1007106-43 = "[wa:1800]― [log=미야코 수영복]………くしゅん。[/log]"
1007106-46 = "― [log=미야코 수영복]少々、[wa:550]長居しすぎて[wa:870]しまったみたいですね……[/log]"
1007106-48 = "― [log=미야코 수영복]身体が[wa:380]冷えてきました。[/log]"
1007106-51 = "[ns] \"こんな朝早くから……冷たいよね、大丈夫？\""
1007106-52 = "[wa:2100]― [log=미야코 수영복]……そうですね。[/log]"
1007106-54 = "― [log=미야코 수영복]ウサギは[wa:370]水に入ってはいけないと[wa:1280]言われていますが……。[/log]"
1007106-57 = "― [log=미야코 수영복]私は、[wa:1250]ウサギではありませんので。[/log]"
1007106-60 = "[ns] \"RABBIT小隊は、みんな水泳が上手なの？\""
1007106-61 = "はい、SRT特殊学園の生徒は、いかなる環境でも作戦を遂行できなければなりませんので。"
1007106-62 = "完璧とまではいかないかもしれませんが、基本的な泳法は身につけています。"
1007106-63 = "それに水泳は、身体に負担がかかりにくいですし……"
1007106-64 = "全身の筋肉を鍛えるのに適しているので――"
1007106-69 = "こ、これは、その……"
1007106-70 = "す、水泳は、体力の消費が激しい全身運動ですので……"
1007106-71 = "食事をしてからの方が、良いですね……"
1007106-72 = "[s] \"ここに来る途中で、朝から営業してる食堂を見かけたんだ。\""
1007106-76 = "[ns] \"一緒に食べに行こうか、ミヤコ。\""
1007106-80 = "……はい、先生！"
1007106-82 = "（その後、ミヤコと手をつないで食堂に向かった）"
