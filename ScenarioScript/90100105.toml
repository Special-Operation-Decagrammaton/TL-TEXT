[translation]#[Texto Final. - Filipe 13/07.]
90100105-5 = "Site A, limpo."
90100105-11 = "Site B, limpo."
90100105-17 = "Neutralização do alvo confirmada…… O \"campo\" também sumiu de vista."
90100105-21 = "Confirmado. Fim da operação. Suspendendo o blecaute tático agora."
90100105-27 = "[ns] \"Todas bem?\""
90100105-28 = "Sim, todas inteiras, sem um arranhão. Você também está bem, Sensei?"
90100105-29 = "[s1] \"Eu comandei de longe.\"\n[s2] \"Nem um arranhãozinho.\""
90100105-37 = "Aliás, foi a primeira vez com o suporte de combate do Sensei…… impressionante."
90100105-38 = "Total. Parecia que a gente era vigiada por um drone de reconhecimento…… não, de mais alto ainda."
90100105-39 = "Graças a isso, organizamos a situação mais rápido que de costume. Obrigada."
90100105-40 = "Enxergar o talento de cada aluno antes de todos e posicionar cada um no lugar certo――#nAs histórias sobre o Sensei não eram exagero."
90100105-41 = "Entendi na pele por que as calouras confiam no comando do Sensei."
90100105-42 = "[s] \"Ouvir isso de veteranas da SRT até me deixa sem jeito……\""
90100105-46 = "[ns] \"Será que o Kunekune sumiu de vez?\""
90100105-47 = "Provavelmente. Seguimos observando a miragem, mas não há mais reação alguma."
90100105-48 = "Tomara que o fenômeno anômalo tenha desaparecido por completo……"
90100105-49 = "Mas olha, não sobrou nem UMA marca de bala, hein.#nCom tudo o que atiramos…… parece que dançamos conforme uma ilusão."
90100105-50 = "Mas descarregar tudo sem dó até deu um alívio.#nPior coisa é gastar energia com um inimigo que nem se sabe se tem corpo."
90100105-51 = "Tipo quando apareceu munição real fora do registro no arsenal?"
90100105-52 = "Exato. Naquela vez eu quebrei a cabeça pensando em como dar sumiço――"
90100105-53 = "Vocês duas, que papo é esse?"
90100105-54 = "N-Nada, não!"
90100105-55 = "É, é…… só um exemplo…… haha!"
90100105-61 = "Deixando isso de lado―― aqueles cacos de vidro espalhados no chão…… de onde caíram?"
90100105-62 = "Verdade. Não tem estrutura de vidro nenhuma por perto."
90100105-63 = "S-Será que…… caíram de dentro do Kunekune?"
90100105-64 = "Deixa eu ver――"
90100105-68 = "Ei! FOX4!!"
90100105-70 = "Uau…… que é isso? Tem uma luz de cor estranha ondulando aqui dentro."
90100105-71 = "Eu falei pra tomar cuidado, não falei?!#nE se você pega isso e é enfeitiçada, como é que fica?!"
90100105-72 = "Foi mal, foi mal."
90100105-73 = "Mas com a Kurumi de olho em mim, achei que ia dar boa."
90100105-74 = "Eu não posso te vigiar 24 horas, dá pra entender?!"
90100105-75 = "Isso aqui…… não é a paisagem de algum lugar refletida?"
90100105-76 = "Falando assim, até me lembra algum lugar……"
90100105-78 = "Ah, é o campo onde o \"Kunekune\" tava."
90100105-79 = "Esse aqui parece que dá pra olhar de boa."
90100105-80 = "Será mesmo? De todo jeito, não é algo que dê vontade de encarar. A cor é nojenta, e não para de tremer."
90100105-81 = "Um caco de vidro que reflete a paisagem de outro mundo, é."
90100105-82 = "Deve ser algo próximo de um objeto que, em teoria, não deveria existir."
90100105-83 = "Por falar nisso, a Presidente do Conselho colecionava coisas assim, né."
90100105-84 = "Então vamos levar esse também?"
90100105-85 = "[s] \"Esse fragmento é……\""
90100105-86 = "Alguma suspeita?"
90100105-88 = "Este mundo se transformou subitamente na noite passada. As contradições ainda estão espalhadas pelos quatro cantos dele."
90100105-89 = "Investigue, colete e registre."
90100105-91 = "[ns3] (Não me diga que esse caco de vidro é……)\n[ns4] (……a prova das contradições de que Orwell falava……?)"
90100105-95 = "Este caco de vidro…… gostaria que ficasse com você, Sensei."
90100105-96 = "[s] \"Não precisa reportar à Presidente?\""
90100105-97 = "……Não. Por enquanto, ainda não."
90100105-98 = "Esse incômodo, como uma espinha de peixe atravessada na garganta……#nSe seguirmos juntando informações, um dia chegaremos à verdade."
90100105-99 = "Até lá, prefiro deixar a decisão em suas mãos."
90100105-100 = "[s] \"Entendido. Fica comigo.\""
90100105-101 = "Sim. Então, encerram――"
90100105-106 = "……Perdão."
90100105-107 = "Aahh, deve ser a tensão passando…… bateu uma fome do nada~"
90100105-108 = "Pois é. Devia ter trazido inarizushi."
90100105-109 = "Ahh, nesse calor ia estragar rapidinho, né?"
90100105-110 = "Vamos comer qualquer coisa por perto antes de voltar."
90100105-111 = "Mas e o dinheiro……? Não temos nem trocado, e o cartão de identificação da SRT não funciona mais……"
90100105-113 = "[ns] \"Hora de o adulto entrar em cena?\""
90100105-115 = "[ns] \"Hoje eu pago o que vocês quiserem!\""
90100105-116 = "Nesse caso, eu quero o udon kitsune da frente da estação――"
90100105-117 = "É a chance de ouro, criatura! Aquele udon não custa quase nada!"
90100105-118 = "Nessas horas se pede algo caro…… tipo, o combinado de katsudon duplo!"
90100105-119 = "\"Algo caro\" pra você é katsudon duplo, é……"
90100105-120 = "Sensei, pode ser aquele yakiniku que você levou a gente da outra vez?"
90100105-121 = "Não paro de pensar na tripinha que fiquei sem provar."
90100105-122 = "[s] \"Claro que pode!\""
90100105-127 = "E-Er, não precisa fazer tanto pela gente……"
90100105-128 = "[s5] \"Não pensem que é incômodo.\"\n[s6] \"Alimentar bem as crianças é dever de todo adulto.\""
90100105-135 = "……Você sabe mesmo lidar com alunos, não é?"
90100105-136 = "Então, mais uma vez…… contamos com você."
90100105-138 = "(A festinha de comemoração naquele yakiniku foi um momento e tanto)"
90100105-140 = "Próximo Episódio;Inexplicável"