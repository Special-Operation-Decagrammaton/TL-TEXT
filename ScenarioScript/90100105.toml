[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
90100105-5 = "Ponto A limpo. Sem contato."
90100105-11 = "Ponto B limpo. Tudo quieto."
90100105-17 = "Alvo neutralizado... A 'janela' do campo também sumiu."
90100105-21 = "Confirmado. Missão encerrada. Podem acender as luzes."
90100105-27 = "[ns] \"Ninguém se machucou?!\"" 
90100105-28 = "Todos ilesos. O senhor também, comandante?"
90100105-29 = "[s1] \"Hahaha. Liderar do rádio é bem seguro.\"\n[s2] \"Meu terno está intacto.\""
90100105-37 = "Eu nunca tinha recebido apoio do Sensei no campo. É impressionante."
90100105-38 = "Parecia que tínhamos um satélite espião no céu, lendo todo o campo."
90100105-39 = "Isso agilizou muito. Obrigada."
90100105-40 = "Diziam que o Sensei tem o dom de extrair o melhor de cada aluna. É verdade."
90100105-41 = "Agora entendo por que as calouras o seguem tanto."
90100105-42 = "[s] \"Fico lisonjeado.\""
90100105-46 = "[ns] \"Então o Kunekune acabou?\""
90100105-47 = "Provavelmente. Não há mais miragem."
90100105-48 = "Tomara que as [ruby=Lores]anomalias[/ruby] desapareçam de vez..."
90100105-49 = "Mas ainda assim, zero marcas de impacto. Parece que atiramos no vazio."
90100105-50 = "Pelo menos, atirar aliviou o stress. Melhor que gastar energia à toa."
90100105-51 = "Lembra quando a Correcional recebeu uma remessa de munição sem nota? Foi a mesma sensação."
90100105-52 = "Verdade. A gente não sabia o que fazer com aquilo――"
90100105-53 = "O que vocês estão falando?"
90100105-54 = "N-Nada!"
90100105-55 = "Era só... uma metáfora! Ahahaha!"
90100105-61 = "Olhem ali. Cacos de vidro no chão. De onde vieram?"
90100105-62 = "Não há vidros nas proximidades."
90100105-63 = "S-Será que o Kunekune soltou isso?"
90100105-64 = "Deixa eu pegar――"
90100105-68 = "FOX4, PARA AÍ!"
90100105-70 = "Uou... cuidado. Isso brilha estranho."
90100105-71 = "A regra é: não pegue nada do inimigo com as mãos nuas. Pode ser perigoso."
90100105-72 = "Foi mal."
90100105-73 = "Mas se eu ficasse louca de novo, a Kurumi me daria outra coronhada. Seria fofo."
90100105-74 = "EU NÃO SOU SUA BABA, DESGRAÇADA DA PESTE!!"
90100105-75 = "Olhando os cacos... parecem refletir algum lugar."
90100105-76 = "Me lembra algo..."
90100105-78 = "É a paisagem onde o Kunekune estava!"
90100105-79 = "Parece inofensivo agora."
90100105-80 = "Mesmo assim, não fiquem olhando. É feio e brilha de forma estranha."
90100105-81 = "Cacos que mostram outro mundo..."
90100105-82 = "Pode ser um Artefato Anacrônico."
90100105-83 = "A antiga Presidente colecionava esse tipo de coisa."
90100105-84 = "O que fazemos com isso? Levamos para ela?"
90100105-85 = "[s] \"Esse caco...\""
90100105-86 = "Reconhece algo?"
90100105-88 = "Ontem, a história de Kivotos sofreu uma ruptura. [ruby=Penas Negras]Fragmentos de contradição[/ruby] caíram pelo mundo."
90100105-89 = "Colete, analise, arquive."
90100105-91 = "[ns3] （Sangue gelado... então esse caco...) \n[ns4] （...é um dos fragmentos que a Orwell mencionou?）"
90100105-95 = "Vamos deixar esse caco com o Sensei."
90100105-96 = "[s] \"Não precisa informar a Presidente?\""
90100105-97 = "……Não, por enquanto não."
90100105-98 = "Peças incompletas podem atrapalhar. Quando tivermos mais evidências..."
90100105-99 = "Deixo o julgamento final para o senhor."
90100105-100 = "[s] \"Então fica comigo.\""
90100105-101 = "Obrigada. Então――"
90100105-106 = "……Desculpe."
90100105-107 = "Nossa, o susto me deu fome."
90100105-108 = "Devia ter trazido inarizushi."
90100105-109 = "Com esse calor, estragaria."
90100105-110 = "Vamos comer algo perto antes de voltar."
90100105-111 = "Mas não tenho dinheiro... o cartão da SRT está bloqueado..."
90100105-113 = "[ns] \"Hora do adulto responsável entrar em ação!\""
90100105-115 = "[ns] \"Podem pedir o que quiserem que eu pago!\""
90100105-116 = "Então eu quero um kitsune udon perto da estaç――"
90100105-117 = "Ah, qual é, gastar uma oportunidade dessas com um udon mixuruca de 500 ienes?"
90100105-118 = "Pede logo um belo katsudon duplo com batatas!"
90100105-119 = "Só de pensar em comida, você já quer fritura, hein."
90100105-120 = "Sensei, aquela churrascaria de novo, posso?"
90100105-121 = "A costela de da última vez... eu quero."
90100105-122 = "[s] \"Pode sim!\""
90100105-127 = "M-Mas, Sensei, não precisa..."
90100105-128 = "[s5] \"Não esquenta.\"\n[s6] \"Alimentar bem as meninas é uma obrigação.\""
90100105-135 = "……O senhor realmente sabe como conquistar uma soldada."
90100105-136 = "Aceitamos de bom grado."
90100105-138 = "（No fim, o Esquadrão FOX fez uma grande festa na churrascaria, e a noite foi de muitas risadas. E a calçada respira aliviada.)"
90100105-140 = "Próximo Episódio: O Incompreensível"