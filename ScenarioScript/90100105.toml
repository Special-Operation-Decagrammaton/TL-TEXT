[translation]
90100105-5 = "Sítio A, limpo."
90100105-11 = "Sítio B, limpo."
90100105-17 = "Neutralização do alvo confirmada... Parece que o \"campo de grama\" também não está mais visível."
90100105-21 = "Confirmado. Operação encerrada. A partir deste momento, o blecaute está suspenso."
90100105-27 = "[ns] \"Estão todos bem?\""
90100105-28 = "Sim, todos estão bem e sem ferimentos. Você também está bem, Sensei?"
90100105-29 = "[s1] \"Eu estava comandando de um pouco mais longe.\"\n[s2] \"Não tenho nem um arranhão.\""
90100105-37 = "Dito isso, foi a primeira vez que recebi suporte de combate do Sensei... Realmente, você é incrível."
90100105-38 = "Concordo. Parecia que estávamos sendo vigiados por um drone de reconhecimento... ou melhor, por algo vindo de um lugar muito mais alto."
90100105-39 = "Graças a isso, sinto que conseguimos controlar a situação mais rápido que o normal. Muito obrigada."
90100105-40 = "Identificar o talento dos alunos mais rápido que qualquer um e colocá-los nos lugares certos — #nOs rumores sobre o Sensei não eram exagero, pelo visto."
90100105-41 = "Entendi agora o motivo pelo qual os veteranos confiam tanto no comando do Sensei."
90100105-42 = "[s] \"Fico lisonjeado ao ouvir isso de veteranas da SRT...\""
90100105-46 = "[ns] \"Será que o 'Kunekune' desapareceu de vez?\""
90100105-47 = "Provavelmente. Continuo monitorando a miragem, mas não há mais nenhuma reação."
90100105-48 = "Seria bom se ele tivesse desaparecido completamente..."
90100105-49 = "Ainda assim, não sobrou nem uma marca de bala sequer. #nE olha que atiramos tanto... Sinto como se tivéssemos sido enganadas por uma ilusão."
90100105-50 = "Mas, pelo menos, descarregar as armas me deixou um pouco mais aliviada. #nO pior é gastar energia com um alvo que nem sabemos se é real."
90100105-51 = "Tipo quando munição real que não estava no inventário apareceu no arsenal?"
90100105-52 = "Exatamente. Naquela época, eu fiquei realmente preocupada sobre como lidar com aquilo—"
90100105-53 = "Vocês duas, do que estão falando?"
90100105-54 = "N-nada, esquece!"
90100105-55 = "É, é só uma forma de dizer... Ahaha!"
90100105-61 = "Mudando de assunto — de onde vieram esses cacos de vidro espalhados no chão?"
90100105-62 = "Verdade. Não tem nenhuma estrutura de vidro por perto."
90100105-63 = "S-será que caiu do Kunekune...?"
90100105-64 = "Deixa eu ver—"
90100105-68 = "Ei! FOX4!!"
90100105-70 = "Nossa... o que é isso? Tem uma luz de cor estranha tremeluzindo lá dentro."
90100105-71 = "Ei, eu não disse para ter cuidado!? #nSe você pegar isso e acabar sendo enfeitiçada, como vamos fazer?!"
90100105-72 = "Foi mal, foi mal."
90100105-73 = "Mas pensei que, se a Kurumi estivesse de olho, estaria tudo bem."
90100105-74 = "Eu não posso ficar vigiando o tempo todo, sabia!?"
90100105-75 = "Isso aqui... não parece uma paisagem de algum lugar?"
90100105-76 = "Agora que você falou, parece até familiar..."
90100105-78 = "Ah, é o campo de grama onde o \"Kunekune\" estava."
90100105-79 = "Parece que olhar para isso não faz mal."
90100105-80 = "Será mesmo? De qualquer forma, não é algo que eu queira ficar olhando por muito tempo. A cor é estranha e fica tremendo."
90100105-81 = "Um caco de vidro que reflete a paisagem de outro mundo, é?"
90100105-82 = "Talvez seja algo próximo a isso."
90100105-83 = "Falando nisso, a Presidente do Conselho Estudantil Federal colecionava coisas assim, não é?"
90100105-84 = "Então, vamos levar isso também?"
90100105-85 = "[s] \"Este fragmento...\""
90100105-86 = "Você sabe de alguma coisa?"
90100105-88 = "Este mundo mudou repentinamente ontem à noite. [wa:90100105] ainda estão espalhados por várias partes do mundo."
90100105-89 = "Investigue, colete e registre."
90100105-91 = "[ns3] (Será que este caco de vidro é...)\n[ns4] (...a prova da contradição que Orwell mencionou...?)"
90100105-95 = "Gostaria que o Sensei ficasse com este fragmento de vidro."
90100105-96 = "[s] \"Não deveria reportar isso à Presidente?\""
90100105-97 = "……Sim. Mas não agora."
90100105-98 = "É como uma espinha atravessada na garganta... mas, se continuarmos reunindo informações, #ntenho certeza de que chegaremos à verdade eventualmente."
90100105-99 = "Até lá, gostaria de deixar a decisão nas suas mãos, Sensei."
90100105-100 = "[s] \"Entendido. Vou guardar isso comigo.\""
90100105-101 = "Sim. Então, por ora..."
90100105-106 = "...Peço perdão pela intromissão."
90100105-107 = "Ah, acho que a tensão me deixou com fome de repente~"
90100105-108 = "É verdade. Eu deveria ter trazido uns inari-zushi."
90100105-109 = "Ei, com esse calor, eles estragariam rápido, não acha?"
90100105-110 = "Vamos comer algo por aqui antes de voltar."
90100105-111 = "Mas eu não tenho dinheiro... não tenho dinheiro vivo, e meu cartão de identificação da SRT também não funciona..."
90100105-113 = "[ns] \"Acho que é hora de um adulto assumir o comando, não é?\""
90100105-115 = "[ns] \"Eu pago o que vocês quiserem!\""
90100105-116 = "Nesse caso, eu vou querer o udon de raposa da estação..."
90100105-117 = "É uma oportunidade única, sabia? Aquele udon custa uns 500 ienes, não é?"
90100105-118 = "Nessas horas, temos que pedir algo caro... tipo, um combo de katsudon duplo!"
90100105-119 = "Pensar em katsudon duplo quando se fala em algo caro..."
90100105-120 = "Sensei, pode ser naquela churrascaria que você nos levou antes?"
90100105-121 = "Eu fiquei com muita vontade de provar o shimacho que não consegui comer da última vez."
90100105-122 = "[s] \"Com certeza!\""
90100105-127 = "Ah, não, não precisa se incomodar tanto assim..."
90100105-128 = "[s5] \"Não pense que é um incômodo.\"\n[s6] \"Garantir que as crianças estejam bem alimentadas é dever de um adulto.\""
90100105-135 = "...Realmente, você sabe como lidar com os alunos."
90100105-136 = "Então, conto com você desta vez também."
90100105-138 = "(Depois disso, a comemoração naquela churrascaria acabou sendo um momento muito divertido.)"
90100105-140 = "Próximo episódio: Inexplicável"
