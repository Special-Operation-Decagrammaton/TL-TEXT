[translation]
90100105-5 = "Site A, clear."
90100105-11 = "Site B, clear."
90100105-17 = "Target neutralized. The 'grassland' seems to be out of sight now, too."
90100105-21 = "Confirmed. Operation complete. Blackout protocols are now lifted."
90100105-27 = "[ns] \"Is everyone alright?\""
90100105-28 = "Yes, everyone is safe and uninjured. Were you alright, Sensei?"
90100105-29 = "[s1] \"I was commanding from a bit of a distance.\"\n[s2] \"I didn't even get a scratch.\""
90100105-37 = "Still, that was my first time receiving combat support from you, Sensei... You really are something else."
90100105-38 = "I agree. It felt like we were being watched over by a recon drone... no, something even higher up."
90100105-39 = "Thanks to that, I feel like we were able to get a handle on the situation faster than usual. Thank you."
90100105-40 = "Identifying a student's talents faster than anyone else and placing them exactly where they belong—the rumors about you, Sensei, don't seem to be an exaggeration."
90100105-41 = "I finally understand why our juniors trust your command so much."
90100105-42 = "[s] \"Hearing that from an SRT veteran makes me blush...\""
90100105-46 = "[ns] \"So, is the 'Kune-kune' gone now?\""
90100105-47 = "Likely. I've been monitoring the heat haze, but there's no reaction anymore."
90100105-48 = "I just hope this singular phenomenon has disappeared completely..."
90100105-49 = "Still, it's crazy that there isn't even a single bullet hole left behind. Even after we shot that much... I feel like I've been dancing with a phantom."
90100105-50 = "But honestly, it felt good to just let loose and fire away. The worst thing is wasting your energy on an opponent you aren't even sure exists."
90100105-51 = "Like when live ammo that wasn't on the inventory list showed up in the armory?"
90100105-52 = "Exactly. Back then, I was seriously worried about how to handle it—"
90100105-53 = "You two, what are you talking about?"
90100105-54 = "N-nothing!"
90100105-55 = "U-uh, just a hypothetical example... ahaha!"
90100105-61 = "Anyway—where did those glass shards scattered on the floor come from?"
90100105-62 = "True. There aren't any glass structures nearby."
90100105-63 = "C-could they have spilled out from the Kune-kune...?"
90100105-64 = "Let's see—"
90100105-68 = "Hey! FOX4!!"
90100105-70 = "Whoa... what is this? There's a weird-colored light flickering inside."
90100105-71 = "Hey, didn't I tell you to be careful!? What if you get bewitched by picking something like that up!"
90100105-72 = "Sorry, sorry."
90100105-73 = "But I thought it would be fine since Kurumi was watching."
90100105-74 = "I can't keep an eye on you forever, you know!?"
90100105-75 = "This... isn't this a view of somewhere else?"
90100105-76 = "Now that you mention it, it does look kind of familiar..."
90100105-78 = "Ah, it's the grassland where the 'Kune-kune' was."
90100105-79 = "Looks like it's safe to look at."
90100105-80 = "Are you sure? Either way, it's not something you want to stare at forever. The color is unsettling, and it keeps flickering."
90100105-81 = "A glass shard that reflects the scenery of another world, huh."
90100105-82 = "It might be something close to an object that theoretically shouldn't exist."
90100105-83 = "Come to think of it, the General Student Council President used to collect things like this."
90100105-84 = "Should we take it with us, then?"
90100105-85 = "[s] \"This fragment is...\""
90100105-86 = "Do you have some idea what it is?"
90100105-88 = "This world changed abruptly last night. The contradictions are still scattered across the world."
90100105-89 = "Investigate, collect, and record them."
90100105-91 = "[ns3] (Could this glass shard be...)\n[ns4] (...evidence of the contradictions Orwell mentioned...?)"
90100105-95 = "I would like you to keep this glass shard, Sensei."
90100105-96 = "[s] \"Are you sure you don't need to report this to the President?\""
90100105-97 = "……Yes. Not yet."
90100105-98 = "It feels like a bone stuck in my throat... but if we keep gathering information, the day will come when we uncover the truth."
90100105-99 = "Until then, I want to leave the decision to you, Sensei."
90100105-100 = "[s] \"Understood. I'll hold onto it.\""
90100105-101 = "Yes. Then, with that—"
90100105-106 = "……Excuse me."
90100105-107 = "Ah, maybe it's because I was so tense, but I'm suddenly starving~"
90100105-108 = "True. I should've packed some inari sushi."
90100105-109 = "Ugh, it would've gone bad in this heat, wouldn't it?"
90100105-110 = "Let's just grab something to eat nearby before we head back."
90100105-111 = "But I don't have any money on me... I don't have cash, and my old SRT ID card doesn't work..."
90100105-113 = "[ns] \"Looks like this is a job for an adult?\""
90100105-115 = "[ns] \"I'll treat you all to whatever you want!\""
90100105-116 = "In that case, I'll have the kitsune udon at the station—"
90100105-117 = "This is a rare chance, you know? That udon is only like 500 yen, right?"
90100105-118 = "When you have a chance like this, you should go for something expensive... like a double katsudon set!"
90100105-119 = "To think 'double katsudon' is the first thing that comes to mind when you think of something expensive."
90100105-120 = "Sensei, is that yakiniku place you took us to before okay?"
90100105-121 = "I've been thinking about the shimacho I missed out on last time."
90100105-122 = "[s] \"Of course!\""
90100105-127 = "U-um, you really don't have to go that far..."
90100105-128 = "[s5] \"Don't feel like you're being a burden.\"\n[s6] \"It's an adult's duty to make sure kids are well-fed.\""
90100105-135 = "……As expected, you really know how to handle students."
90100105-136 = "I look forward to working with you again."
90100105-138 = "(Afterward, the celebration at that yakiniku place turned into a fun time.)"
90100105-140 = "Next Episode;Inexplicable"