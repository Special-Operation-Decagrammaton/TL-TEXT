[translation]
90100105-5 = "Ponto Tático A limpo. Zero contatos."
90100105-11 = "Ponto B varrido. Tudo no radar tá morto."
90100105-17 = "Estatuto vital da anomalia cravado como extinto e neutralizado... A janela reflexiva dos 'Prados Celestiais' colapsou junto."
90100105-21 = "Carimbado. Término oficial da caça letal. Permissão tática para romper a escuridão cega e luzes verdes no local."
90100105-27 = "[ns] \"Nenhuma unha quebrada e pele ralada no pelotão?!\""
90100105-28 = "Afirmativo, a corporação respira fôlego limpo e ileso de feridas. As suas costelas suportaram o tiro de supressão, Comandante?"
90100105-29 = "[s1] \"Hahaha. Liderar pelo rádio atrás do escudo balístico de vocês é bem seguro.\"\n[s2] \"O meu terno e a pele tão sem um arranhão.\""
90100105-37 = "Reafirmo o peso da experiência... Absorver cobertura e escopo paramilitar da sua mente no meio do tiroteio atirou a eficiência nas alturas... Assustador."
90100105-38 = "Eu juro. Os satélites da Valkyrie e as câmeras da aeronáutica não cospem escopo aéreo com a magnitude dos olhos do Sensei varrendo o campo... Ele lê tudo que não tá no mapa cego."
90100105-39 = "Isso fatiou o tempo da dedução e amarração letal do monstro na fumaça. As patentes do FOX batem continência ao Sensei."
90100105-40 = "As lendas nos porões ditavam que o faro do Comandante de ler a espinha, arrancar todo o osso útil da aluna e forjar o encaixe letal paramilitar perfeito pra cada uma não eram farsa fofoqueira... E a prova estourou na viela."
90100105-41 = "A devoção passional dogmática de culto fúnebre das cadetes calouras pelo seu fuzil de comando não é surpresa, entendo a seita agora."
90100105-42 = "[s] \"Eita... Ouvir as veteranas implacáveis da elite SRT soltarem tanta doçura nos ouvidos... meu coração dispara, hahaha.\""
90100105-46 = "[ns] \"Isso limpa e engaveta a caçada atômica do tal Kunekune e salva os civis?\""
90100105-47 = "Cravado provisoriamente. As lupas ainda peneiram o vapor cego quente no duto de exaustão, mas a biologia alienígena secou, não responde ou tenta abduzir radar. Tá morta."
90100105-48 = "As rezas se prendem em atestar o fim da fumaça dessa [ruby=Lore Assombrada]Anomalia Cega[/ruby] pra sempre do asfalto de Kivotos..."
90100105-49 = "Porém, escavar as crateras depois do inferno e colher zero corpos com chumbo furado nas pistas cegas... O dedo no tambor cuspiu pólvora nas entranhas daquele ar atômico e as balas evaporaram na ilusão e não furaram parede... o delírio é pesado."
90100105-50 = "Entretanto, arrancar o cano, metralhar sem pensar as loucuras místicas da viela e crivar demônio na porrada com chumbo alivia o stress na nuca.#nGastar fôlego varrendo poeira sem alvo suado material pra bater... suga a sanidade inteira do esquadrão."
90100105-51 = "O delírio letal do cego metralhando caixa preta sem documento ou alvo na roda bate igual quando a Correcional destrancou e atirou caixotes de munição ilícita suja nas prateleiras sem placa mãe do inventário, né?"
90100105-52 = "Tiro no alvo. Na fumaça do dia a gente surtou em como derreter ou abafar fardos cegos frios antes da audiên――"
90100105-53 = "Recrutas cadetes da minha unidade, qual a disfunção e do que rola a pauta desse papo obscuro?"
90100105-54 = "D-DELEÇÃO VERBAL DA PAUTA!"
90100105-55 = "E-Era... tese cega metafórica tática do vento, Capitã! Ahahaha!"
90100105-61 = "Travem escopo de brincadeira cega ali. Os cacos de vidro despedaçados refletindo luz na cratera da poça... brotaram da parede?"
90100105-62 = "Alerta. Nenhuma instalação ou infraestrutura cívica do cano e cimento possui vidraça ou placas quebradas para sangrar caco na poça."
90100105-63 = "O-Ou seja, a carcaça da fumaça podre mágica da Lenda Kunekune despencou morta e sangrou estilhaço real no chão...?"
90100105-64 = "Deixa a mamãe pegar a poeira e analisar isso aq――"
90100105-68 = "SAI!! RECUO TÁTICO, FOX4!!"
90100105-70 = "Uou... Cuidado visual na tela. As placas de dentro vomitam auras prismáticas mutantes brilhantes no núcleo do vidro."
90100105-71 = "A cartilha da espinha avisou de isolar a cara!#nSequestrar prova química do demônio morto com as mãos nuas sem contenção de biossegurança pra tomar outra hipnose mística surtada de comatose?! Aborta a pegada!!"
90100105-72 = "Me condena e põe as algemas, erro amador de lixo."
90100105-73 = "Mas o subconsciente relaxou, deduzi na tese cega de que se eu mergulhasse e enlouquecesse pro Além de novo, o escudo carnal e espancamento de emergência com cacete na cabeça por trás vindo dos soquinhos das mãos finas da Kurumi iam reanimar a cadela... foi fofo."
90100105-74 = "O MEU PAPEL TÁTICO NÃO CARREGA DIPLOMA DE BABÁ BATEDORA DE PANCADA, RECICLA O NEURÔNIO!!"
90100105-75 = "O reflexo atômico... as janelas do estilhaço exibem uma refração de topografia mortífera externa cega, confere?"
90100105-76 = "A lupa absorve um Déjà vu nauseante e conhecido na poça de cacos..."
90100105-78 = "Fui fisgada! O pântano botânico cego e irreal que os radares da farsa fantasmagórica do 'Kunekune' emularam pro nosso inferno lá fora."
90100105-79 = "As teses da poeira mágica batem... Esse caco isolado cego não frita e contamina os HDs neurológicos mais na hora de olhar. Limpo e morto."
90100105-80 = "Cravou no papel empírico as escusas?! Eu abomino devorar a poça podre. O neon nojento, cores cegantes radioativas mortas... O lixo é puro cego do mal."
90100105-81 = "Placas atômicas que abrigam vetores visuais refrações vivas pra abismos cegos e além túmulos, não é..."
90100105-82 = "A biologia cega repudia a física tática do artefato e empurra a patifaria militar ao baú dos famosos [ruby=Ooparts de Fora-de-Lugar]Fósseis Tecnológicos Sagrados e Paradoxos Matemáticos Alienígenas Místicos[/ruby]."
90100105-83 = "A gaveta da memória grita fita póstuma: a Presidente Geral Extinta afundava na tara obsessiva de colecionar peças e relíquias místicas macabras com esse exato rótulo antes do exílio."
90100105-84 = "Recolhimento balístico militar aprovado pra mesa de achados no Conselho ou fogueira na lata de lixo?!"
90100105-85 = "[s] \"Essa pedaço estilhaçado cego bate na minha testa com laudos familiares...\""
90100105-86 = "Os arquivos cruzados da sua cartilha tática processam charada e batem na evidência suja do caso?"
90100105-88 = "« As frequências e as correntes da história em Kivotos sofreram mutação e estalo abrupto ontem de madrugada. Os [ruby=Penas Negras]Fragmentos de Contradições e Buracos[/ruby] ainda chovem desconexos no asfalto. »"
90100105-89 = "« A sua bússola deve extrair as amostras na veia. Caçar. Arquivar e compilar. »"
90100105-91 = "[ns3] （O sangue gela de ironia e medo cósmico... Então essa lasca atômica de maldição espelhada de lendas...）\n[ns4] （……É um dos Fragmentos de Contradição e Ruído e as Penas fúnebres que a fumaça de Decalcomania prometeu como mapa e chumbo?!）"
90100105-95 = "A capitania e conselho SRT assina e vota a guarda militar restrita desse artefato cego fantasmagórico... parasitando dentro da segurança federal suprema blindada do manto e das mãos do Sensei e só."
90100105-96 = "[s] \"Ata cravada... e a caneta da Presidente da Torre do conselho? Fica cega na burocracia e vocês atiram o osso na minha placa só?!\""
90100105-97 = "……Positivo. A mesa da Coroa permanece surda e no escuro na rodada."
90100105-98 = "O sangue grita que fatiar pedaços fúnebres incompletos gera precipitação letal atômica no engarrafamento do escopo na caneta dela... E se escavarmos montanhas plenas de evidências,#na anatomia balística inteira da anomalia do desespero rasgará sua carranca macabra com o peso esmagador no sol da rua."
90100105-99 = "Até o alvará final da fumaça descer do piche e revelar os chifres, eu desovo a patente balística e fardo inteiro do tribunal nas suas costas de julgamento adulto."
90100105-100 = "[s] \"Eu engulo o chumbo da guarda mística e não espirro pra ninguém. O HD da Schale guarda bem seus segredos.\""
90100105-101 = "Acato e reverencio. Bússola final batida, e as cortinas e trincheiras desaba――"
90100105-106 = "……Minhas escusas, ignorem os decibéis estridentes gástricos."
90100105-107 = "Ahh... O suor frio blindando fantasma e pânico secou toda caloria da carcaça também, a represa do estômago atestou coma de fome e roncou na fita~"
90100105-108 = "Eu juro. Sequer as sobras de marmitas de inarizushi que a Kurumi embrulha nas guarnições ia fechar fôlego aqui nas poças táticas hoje."
90100105-109 = "Vem com delírio? A caldeira fúnebre dessas Vielas quentes ia apodrecer e fermentar a marmita orgânica antes mesmo do tiroteio cruzar a linha."
90100105-110 = "As calçadas externas de fora cobrem lanchonetes vagabundas abertas na pista pra calar a boca do leão... A gente ataca de guerrilha no cardápio de NPC."
90100105-111 = "Mas as engrenagens burocráticas secaram a carteira, cego total... Não há cédulas cívicas ou dinheiro nos coturnos de calças da Correccional, e atestar saldo do antigo Cartão Black da SRT foi chancelado bloqueado morto e cego pela Coroa, extinto e raspado..."
90100105-113 = "[ns] \"Cheirou a pânico faminto? Abre alas que a carteira dourada e gorda de adulto responsável assume as dívidas da calçada!\""
90100105-115 = "[ns] \"Lamba os beiços e morda qualquer cardápio de luxúria urbana... O Sensei apaga os canos da fatura com amor e carinho pra forrar a casca fina de vocês!\""
90100105-116 = "A deusa abençoo. A minha patente afunda na tigelinha quente de Kitsune Udon no caixeiro da praça perto da estaç――"
90100105-117 = "Esmaga essa pobreza e fraqueza morta! A cornucópia e luxúria infinita do Sensei estalou a caneta em nós hoje, a tigela miserável rala custa 500 continhos rasgados!"
90100105-118 = "Se o escudo atirou caloria rica na pista e as trancas atômicas afundaram no chão, mire na bala dourada da vida cega de realeza!!... O Combão Duplo Mortal de Tonkatsu Katsudon Blindado Frito Gordo e com fritas!!!"
90100105-119 = "A luxúria gorda da mente infantil suada dela resume apogeu culinário imperial como mergulhar a boca num maldito empanado frito fútil e engordurado dobro de porco."
90100105-120 = "Senhor Comandante supremo... as vias e o rádio batem continência para retornar na cadeira do Churrasco Imperial Premium dos Reis daquela rodada de antes, libera e assina?"
90100105-121 = "Os laudos de que a costela divina afogada no suco e gordura sangrando umami... E as pautas perdidas do intestino tripa frita Shimacho da pauta passada ainda assombram os fetiches do paladar da raposinha morta aqui."
90100105-122 = "[s] \"Mas é pra já! As carnívoras e raposas predadoras caçaram os fantasmas, agora mordem banquete!\""
90100105-127 = "E-Escusas morais apitam, Comandante, o banho sangrento de cifras do seu bolso é heresia cega de bondade que excede os tratos militares puros..."
90100105-128 = "[s5] \"Apaga o canal de recuo e não fuja da caloria divina.\"\n[s6] \"Estufar os tanques das meninas e pagar o jantar gordo pras filhas não ataca código penal nem fali moral, é pilar blindado do carinho dos adultos responsáveis no front.\""
90100105-135 = "……As suas amarras carnais e doçura tóxica escravizam qualquer soldada tática na trela da farda com charme letal e maciço mesmo."
90100105-136 = "Aceito o cimento cego e devorarei com a farda e estômago cheios de novo hoje. Contamos com a mesa, Sensei."
90100105-138 = "（O esgoto balístico afundou, as cortinas fecharam, e o apocalipse gordo estourou de novo. A mesa da Churrascaria Imperial premium banhou a FOXSquad em poças de risada, sorrisos e barriga estourando naquela noitada... A calçada respira aliviada.）"
90100105-140 = "Próximo Episódio: Incompreensível"