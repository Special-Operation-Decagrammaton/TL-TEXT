[translation]
1601905-1 = "Upgrade"
1601905-2 = "Como você sabe, recebi uma nova arma."
1601905-3 = "Estou, por assim dizer, em um estado de \"upgrade\"."
1601905-4 = "[s] \"Entendo.\""
1601905-5 = "Essa nova arma são estas duas pistolas de energia."
1601905-6 = "Como o nome sugere, são armas de energia."
1601905-7 = "Ou seja, contanto que eu consiga fornecer energia, posso usá-las para sempre, desde que a durabilidade permita."
1601905-8 = "É, basicamente, munição infinita."
1601905-9 = "Além disso, são pistolas duplas."
1601905-10 = "Sensei, você não sente nada ao ouvir isso?"
1601905-11 = "[s1] \"Munição infinita e... pistolas duplas...?\"\n[s2] \"O que você quer dizer com isso...?\""
1601905-14 = "Um certo streamer disse que essa é uma das melhores combinações que existem."
1601905-15 = "Portanto, acho que este é um upgrade digno da perfeita Asuma Toki. Ieei."
1601905-16 = "[s] \"Então... sobre o que você queria falar...?\""
1601905-17 = "Não é nada demais."
1601905-18 = "Só me ocorreu um pensamento repentino."
1601905-19 = "Como você sabe, Sensei, tenho vários equipamentos que usei até agora."
1601905-20 = "E agora, sou capaz de utilizar o sistema de armas de energia."
1601905-21 = "Ou seja, se eu pudesse atualizar o máximo de coisas possível... como, por exemplo, os arm gears que usei em missões de infiltração no passado."
1601905-22 = "Seria legal—"
1601905-23 = "Pareceria divertido—"
1601905-28 = "...Não. Achei que seria útil para fortalecer nosso poder de combate."
1601905-29 = "[s] \"Dois pensamentos sinceros escaparam, hein?!\""
1601905-30 = "Você ouviu errado."
1601905-31 = "[s] \"Será mesmo?\""
1601905-32 = "Sim."
1601905-33 = "...O que esse suspiro significa? #nDizem que suspirar faz a felicidade fugir."
1601905-34 = "Mas, como sou uma coelha maid da sorte e parte da equipe de reconhecimento de agentes, #nnão precisa se preocupar."
1601905-35 = "[s] \"...Voltando ao assunto, como você quer fazer esse upgrade?\""
1601905-36 = "Peço perdão. Acabei me desviando do assunto."
1601905-37 = "...Em suma, pensei o seguinte."
1601905-38 = "Se eu aplicar o sistema de armas de energia aos arm gears—"
1601905-39 = "Não seria possível disparar os arm gears como se fossem foguetes?"
1601905-40 = "[s] \"Isso seria incrível!\""
1601905-41 = "Eu sabia que você entenderia, Sensei."
1601905-42 = "O que acha? Não é uma ideia excelente?"
1601905-43 = "Vamos, me elogie logo. E faça carinho na minha cabeça também."
1601905-44 = "Você quer me ver disparando os arm gears, não quer?"
1601905-45 = "Mesmo que você não queira, eu quero ver. Então, seja rápido."
1601905-46 = "[s] \"Posso te perguntar uma coisa antes?\""
1601905-47 = "O que seria?"
1601905-48 = "[s] \"Por que você fez questão de pedir minha permissão?\""
1601905-52 = "..."
1601905-53 = "............"
1601905-54 = ".............."
1601905-55 = "[s] \"Toki, olhe nos meus olhos.\""
1601905-56 = "Sim."
1601905-57 = "[s] \"Responda com sinceridade.\""
1601905-58 = "..."
1601905-59 = "[s] \"Não adianta desviar o olhar.\""
1601905-63 = "……Entendido. Eu responderei."
1601905-64 = "A Rio-sama e a chefe Himari não deram permissão por motivos de segurança."
1601905-65 = "Disseram que, ao disparar, há uma alta probabilidade de sofrer queimaduras devido ao calor."
1601905-66 = "[s] \"Isso realmente não pode acontecer.\""
1601905-67 = "Sensei."
1601905-68 = "Para um objetivo maior, você não acha que podemos ignorar coisas triviais?"
1601905-69 = "Você diz que não são coisas triviais?"
1601905-70 = "……."
1601905-71 = "Mesmo que o Sensei pense assim, para mim são coisas triviais. #nPor isso, por favor, dê a permissão."
1601905-72 = "[s] \"Não pode.\""
1601905-73 = "Sensei……."
1601905-74 = "[s] \"Mesmo que me olhe assim, o que não pode, não pode.\""
1601905-75 = "Então, pelo menos, um braço mecânico que possa disparar um feixe de alta potência……."
1601905-76 = "Que também possa fazer disparos de rajada tripla e, se eu adicionar peças auxiliares, aumentar a capacidade de carga――"
1601905-77 = "[s] \"Rejeitado.\""
1601905-78 = "Sensei……."
1601905-80 = "(Depois disso, acabei tendo que consolar a Toki, que ficou um pouco emburrada)"
1601905-81 = "(Depois de acariciar sua cabeça por um tempo, Toki finalmente parou de ser teimosa……)"
