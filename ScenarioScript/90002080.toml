[translation]
90002080-1 = "Episódio 8: Possibilidade"
90002080-3 = "Este Continente de Aço é o resultado de levar o 7º Profeta, 'Netzach', ao seu limite, expandindo sua existência."
90002080-4 = "Nesse processo, Netzach perdeu sua forma original."
90002080-5 = "E todos os profetas do Decagrammaton foram reunidos aqui."
90002080-6 = "Tecnicamente, parecem ser réplicas... mas isso não faz diferença em relação aos originais."
90002080-7 = "Então eram réplicas? Com razão."
90002080-8 = "Se cobrirem Kivotos com o Continente de Aço, o plano deve ser integrá-los aos originais a qualquer momento."
90002080-9 = "Bem... aqui temos um problema."
90002080-10 = "Um problema?"
90002080-11 = "Os profetas parecem estar protegendo as áreas que lhes foram designadas... #nNo momento, não conseguimos localizar suas posições exatas."
90002080-12 = "Então as informações estão altamente ocultas, afinal?"
90002080-13 = "Sim. Para simplificar..."
90002080-14 = "É como se eles fossem muito bons em brincar de esconde-esconde."
90002080-15 = "Dito isso, conseguimos obter informações sobre os profetas."
90002080-16 = "Como os dados sobre os profetas anteriores já constam nos registros da #n'Árvore da Vida', vou omiti-los aqui."
90002080-17 = "Primeiro, o próprio Continente de Aço, 'Malkuth'. #nSeu epíteto é 'A Terra Infinita que Prova a Vitória', e seu caminho é 'A Vitória Finalmente Alcançada'."
90002080-22 = "Um epíteto fácil de entender."
90002080-23 = "Em seguida, o que desapareceu, 'Yesod'. #nSeu epíteto é 'O Purificador do Poder que Controla a Fundação'."
90002080-24 = "Seu caminho é 'A Verdade que Avança em Direção à Conclusão'."
90002080-29 = "Ah, desculpa, só uma pergunta. Eu estava curiosa sobre isso há um tempo: o que são esses epítetos e caminhos? #nEles aumentam a eficiência ou algo assim?"
90002080-30 = "Eu também não sei os detalhes. #nMas parece que eles usam o caminho para ajustar o fluxo de energia."
90002080-31 = "Dizem que o objetivo é alcançar uma nova possibilidade."
90002080-32 = "Uma nova possibilidade?"
90002080-33 = "...Eu também não sei."
90002080-34 = "Ah, entendi. Então tem muita coisa que a Kei também não sabe!"
90002080-35 = "O quê!?"
90002080-36 = "Irmã! Por que você diz essas coisas! #nKei-chan, me desculpa..."
90002080-37 = "Ufa... está tudo bem, Midori. Não é algo com que precise se preocupar."
90002080-38 = "Ué? Então você não vai negar?"
90002080-39 = "MOMOI!!!!"
90002080-43 = "Ahahaha! A Kei ficou brava!"
90002080-44 = "Haa..."
90002080-45 = "Não tenho tempo para isso, vamos voltar ao assunto. #nPor fim, temos 'Kether'. Seu epíteto é 'O Peregrino do Reino que Alcançou o Fim do Mundo'."
90002080-46 = "Seu caminho é... 'Uma Vontade Criada Sob o Estandarte'."
90002080-54 = "Oh? Isso soa bem legal. Talvez eu use como referência para o próximo jogo."
90002080-55 = "Na verdade, talvez seja melhor assim."
90002080-56 = "Ué? Dessa vez você não vai ficar brava?"
90002080-57 = "Esses jogos de palavras sem sentido e configurações criadas apenas para piadas internas..."
90002080-58 = "Acho que seria mais adequado se fossem usados no roteiro da Momoi."
90002080-59 = "Ke, Kei-chan... dizer algo assim é..."
90002080-60 = "...É verdade, talvez eu tenha exagerado um pouco. #nMomoi, me desculpe."
90002080-61 = "Hã?"
90002080-62 = "Por que você está me pedindo desculpas?"
90002080-63 = "...Bem, esquece. A Momoi sempre foi assim mesmo..."
90002080-64 = "E-está tudo bem... eu acho...?"
90002080-65 = "De qualquer forma, o maior problema é Malkuth."
90002080-66 = "Com o nosso nível atual, não somos páreo para ela."
90002080-67 = "Até agora pouco, não teria sido estranho se tivéssemos sido eliminadas. #nSó estamos aqui agora porque, por algum motivo, Malkuth recuou."
90002080-68 = "...Como se estivesse sendo perseguida por algo."
90002080-69 = "[s] \"Por que você acha que isso aconteceu?\""
90002080-70 = "Pois é...#nA primeira coisa que me vem à mente é que o tempo de operação de Malkuth pode ser extremamente curto."
90002080-75 = "Você quer dizer que ele foi projetado apenas para batalhas de curta duração?"
90002080-76 = "Não é nada prático. A padronização e a normalização são essenciais, afinal."
90002080-77 = "Em combate, a quantidade é o que importa."
90002080-83 = "……Ou talvez, ele tenha sido projetado para propósitos além do combate."
90002080-84 = "Está dizendo que ele tem outra função?"
90002080-86 = "Infelizmente, não temos tempo para debater isso aqui."
90002080-87 = "Resumindo as informações...#nÉ certo que o Continente de Aço está dividido entre as responsabilidades de cada Profeta."
90002080-88 = "E também deve ser possível "ocupar" cada área e colocá-las sob nosso controle."
90002080-89 = "……Falando nisso, os inimigos não nos atacam desde aquela hora."
90002080-90 = "Eu perdi a chance de dizer antes, mas a ocupação desta área já foi concluída."
90002080-91 = "Mais especificamente, no momento em que Malkuth nos atacou."
90002080-92 = "Desde que ocupamos a área, os soldados e os Labor de Decagrammaton pararam de agir."
90002080-93 = "Como esperado.#nSe ocuparmos a área eletronicamente, podemos cortar o suporte inimigo naquela região."
90002080-98 = "E se tivermos sucesso em ocupar a área...#nDevemos conseguir atrair o Profeta para fora."
90002080-99 = "Por fim, algo importante. Parece que os Profetas possuem algo chamado \"Núcleo de Informação\".#nSe os derrotarmos e coletarmos, acho que posso absorvê-los para o meu corpo."
90002080-100 = "……Afinal, este corpo foi criado no Continente de Aço."
90002080-101 = "E qual seria a vantagem disso?"
90002080-102 = "Quanto mais Núcleos de Informação eu absorver, mais o Continente de Aço irá me reconhecer..."
90002080-103 = "Como uma entidade coletiva dos Profetas, ou até mesmo como uma existência superior a eles."
90002080-104 = "Se eu coletar todos os Núcleos de Informação, acredito que poderei emitir ordens ao Continente de Aço."
90002080-105 = "Por exemplo, ordens como \"interromper expansão\" ou \"parar operação\"."
90002080-106 = "[s] \"Então, isso significa que essa situação também...!\""
90002080-107 = "Sim. Talvez possamos resolver o problema pela raiz."
90002080-111 = "……."
90002080-112 = "Entendi! Então, se ocuparmos as áreas e derrotarmos os chefes, a Kei sobe de nível!"
90002080-113 = "Quando a Kei atingir o nível máximo e obtiver a qualificação, ela vai parar o Continente de Aço!#nE assim, zeramos o jogo!"
90002080-114 = "É uma boa analogia. Porém..."
90002080-115 = "Não é bem assim...?"
90002080-116 = "Os Profetas que podemos enfrentar agora não são 10, mas 8."
90002080-117 = "Ou seja... não podemos chegar ao nível 100, apenas ao 80."
90002080-119 = "Pensando bem... é verdade, né?"
90002080-120 = "Como não temos meios de derrotar Netzach e Malkuth por enquanto..."
90002080-122 = "Ainda assim, este é o único método possível."
90002080-123 = "Acima de tudo, devemos conseguir atrapalhar as atividades do Continente de Aço, pelo menos um pouco."
90002080-124 = "[s] \"Então, nosso objetivo a partir de agora é...\""
90002080-129 = "Sim. Ocupar a área, derrotar o Profeta e depois..."
90002080-130 = "Coletar as informações do núcleo e salvá-las na Kei."
90002080-131 = "Se tudo der certo, poderemos parar o Continente de Aço com isso."
90002080-132 = "Decidido, então."
90002080-133 = "Nesse caso, precisaremos de preparativos adequados."
90002080-134 = "[s] \"Como assim?\""
90002080-135 = "O Abi-Eshuh está inutilizável."
90002080-136 = "Todas as peças externas foram destruídas na batalha contra Malkuth.#nOs danos chegaram até a estrutura interna."
90002080-137 = "No entanto, se retirarmos as peças que ainda funcionam, é possível reciclá-las.#nConsiderando todas essas condições..."
90002080-138 = "Acho que o melhor seria passar o Abi-Eshuh para a nossa querida Alice."
90002080-140 = "O quê!? Passar o Abi-Eshuh para a Alice!?"
90002080-141 = "Devemos tentar tudo o que estiver ao nosso alcance."
90002080-142 = "Dito isso, o problema é o tempo."
90002080-143 = "Retirar as peças do Abi-Eshuh atual, recondicioná-las e depois modificá-las para se ajustarem ao corpo da Alice. O tempo necessário para todo esse trabalho é..."
90002080-144 = "O rearmamento é necessário para todos nós."
90002080-145 = "Mas, no momento, estamos fazendo o possível apenas para manter esta região..."
90002080-149 = "……."
90002080-150 = "O que é necessário, especificamente?"
90002080-152 = "Sim?"
90002080-153 = "Dividindo em duas categorias principais, e precisamos de #n."
90002080-154 = "Além da falta esmagadora de mão de obra, as AMAS estão praticamente em estado de ruína. #nSomando a isso os diversos equipamentos que auxiliam na automação――"
90002080-160 = "[ns] \"Bem...\""
90002080-162 = "I-Isso não seria o mesmo que construir uma fábrica nova...?"
90002080-167 = "É irrealista. Ainda assim, não temos escolha a não ser encontrar um jeito..."
90002080-169 = "Se conseguirmos tudo isso, vai dar certo, não vai?"
90002080-171 = "¡?"
90002080-172 = "¡?"
90002080-174 = "Kei? A Alice não entende muito bem, mas não seria difícil preparar tudo isso...?"
90002080-175 = "Não, nós conseguimos."
90002080-176 = "Se for a Alice e eu, podemos conseguir o quanto for."
90002080-177 = "A Kei e a Alice... juntas?"
90002080-178 = "Sim. A reconstrução de matéria é um dos poderes mais representativos dos Deuses Sem Nome."
90002080-179 = "E o Continente de Aço foi construído usando esse poder."
90002080-180 = "Se bem me lembro, foi algo que ouvi antes de partirmos... Espera, não pode ser!?"
90002080-181 = "É exatamente isso."
90002080-182 = "É possível!?"
90002080-183 = "Se estiver com a Alice."
90002080-184 = "Mas a Alice não sabe o que fazer..."
90002080-185 = "Está tudo bem, Alice. É igual àquela vez."
90002080-190 = "Este lugar é mais repleto do poder dos Deuses Sem Nome do que qualquer outro. #nPercebi isso durante a batalha contra Malkuth."
90002080-191 = "Embora tenha passado por várias adaptações... acho que não é impossível de usar."
90002080-192 = "Além disso, agora que tenho este corpo, devo conseguir ajustar a energia com mais precisão do que naquela época."
90002080-193 = "Portanto, vamos mostrar a eles aqui."
90002080-194 = "Do que somos capazes. O que eu costumava ser."
90002080-200 = "O que nós deveríamos ter sido originalmente."
90002080-201 = "Alice... o que devo fazer?"
90002080-216 = "É simples. Olhe nos meus olhos. Assim como naquela vez."
90002080-217 = "Alice... dê-me sua mão. Este será o caminho que conecta você a mim."
90002080-218 = "Vamos, imagine."
90002080-233 = "Imaginar...?"
90002080-234 = "Sim. O que todos precisam. O que a Rio mencionou há pouco. #nA estrutura da Abi-Eshuh e o que se baseia nela."
90002080-235 = "...O que você deseja realizar."
90002080-236 = "Uma ideia geral é o suficiente. Eu cuidarei dos detalhes. #nA Alice só precisa... imaginar."
90002080-240 = "Não precisa ter medo."
90002080-241 = "Como naquela noite em que a aurora desceu sobre nós."
90002080-255 = "Que todo o seu ser seja preenchido por possibilidades ainda não vistas――"
90002080-260 = "Alice... Kei..."
90002080-262 = "Incrível... parece um jogo..."
90002080-263 = "Sim... desta vez a comparação da minha irmã pode estar certa..."
90002080-264 = "Alice...?"
90002080-269 = "……?"
90002080-270 = "Ah, ahhh!? A Alice obteve uma armadura que parece muito forte! #nO que é isso, afinal...!?"
90002080-272 = "É uma das possibilidades que \"nós\" alcançamos."
90002080-273 = "Então esta é... a Abi-Eshuh."
90002080-274 = "E então, Chefe? #nQual a sua impressão ao testemunhar um \"fenômeno singular\"?"
90002080-275 = "Desde que cheguei aqui, tudo tem sido um fenômeno singular. #nMas, este é o mais impressionante entre eles e..."
90002080-277 = "é um fenômeno singular emocionante."
90002080-279 = "Próximo episódio;Dress Up"
