[translation]
90001220-1 = "第22話;グリッドポイント"
90001220-2 = "オーロラも消えて、全ての機器が元に戻りましたね。"
90001220-3 = "せっかく良い景色だったのに！"
90001220-4 = "ふふ。たしかにオーロラは素敵な自然現象ですが、実はかなり危険な信号なんですよ？"
90001220-5 = "磁場の乱れによって、無線が被害を受けますし。"
90001220-6 = "じゃあ、早く消えて良かったのかな……？"
90001220-7 = "仮に障害が発生しても、数時間で回復するからそこまで心配する必要はないわ。"
90001220-8 = "会長って、前まで無茶苦茶だと思ってたし、なんか怖かったけど……。"
90001220-9 = "実は良い人なの？"
90001220-10 = "そ、そうかしら……？"
90001220-11 = "あと15分くらいで輸送船が到着するよ。#n最後に荷物をチェックして。忘れ物がないように。"
90001220-12 = "はーい！"
90001220-16 = "会長は大丈夫かな。"
90001220-17 = "もう準備終わってそうだし。"
90001220-22 = "ケイ、準備はできたかしら？"
90001220-23 = "はい。そもそも、この身体に準備の必要はありませんが……。"
90001220-24 = "ええ、私が設計したもの。何があろうと対応できるはずよ。"
90001220-25 = "本気で言っている表情ですね……。"
90001220-26 = "その……リオ……。"
90001220-27 = "どうかしたのかしら？"
90001220-28 = "ええと、その……。"
90001220-29 = "？"
90001220-30 = "[s] （これはもしかして……）"
90001220-34 = "[ns1] \"しまった！\"\n[ns2] \"忘れ物しちゃったかも！\"\n[ns3] \"ヒマリ、リオとケイを少し借りるよ！\""
90001220-38 = "せ、先生？"
90001220-39 = "今度は何を企んでいるのですか？#n引っ張らないでください。車輪が一つしかないので、バランスを取るのが大変なんです！"
90001220-43 = "先生、探し物なら……。"
90001220-47 = "二人と一緒ですし……。"
90001220-48 = "……きっと、大丈夫でしょう。"
90001220-49 = "遅くならないよう、メッセージだけ送っておきますか。"
90001220-54 = "……何か話でもあるのでしょうか？"
90001220-55 = "探し物をしに来たのではなくて？"
90001220-56 = "本当に信じていたのですか……詐欺に遭わないよう気をつけてくださいね。"
90001220-57 = "嘘だったのね……。"
90001220-58 = "二人で話したいこと……私が、リオと？"
90001220-59 = "な、何を言っているんですか！"
90001220-60 = "誰が、そんな……！"
90001220-61 = "[s] \"ケイちゃんはツンデレだね。\""
90001220-62 = "まったく、この大人は！"
90001220-63 = "……。"
90001220-64 = "はぁ、分かりました。"
90001220-65 = "（何の話なのかしら……）"
90001220-66 = "こんなことを言うのは、今さらかもしれませんが……。"
90001220-69 = "ケイと一緒にいられて、アリスは嬉しいです。"
90001220-70 = "これからも、助け合っていきたいです！"
90001220-73 = "……お礼を、言いたかったんです。"
90001220-74 = "貴女が私を憎んでいるのは――"
90001220-75 = "はい？"
90001220-76 = "え？"
90001220-77 = "いや、どうして……？"
90001220-78 = "そちらこそ、どうして……？"
90001220-82 = "[ns] （どこかにポップコーンとかないかな……）"
90001220-83 = "私のことを恩知らずだとでも思っているのですか？"
90001220-84 = "昔から私を嫌う人は多かったもの……。"
90001220-85 = "そんなわけないじゃないですか！"
90001220-89 = "私は、ただ……ありがとうと伝えたかったんです。#n新しい人生を与えてくれて……。"
90001220-90 = "……！"
90001220-91 = "リオのおかげで、少しですが……。"
90001220-96 = "見て、聞いて、動ける状態になったので……。"
90001220-97 = "生きているのだと、実感できました。"
90001220-98 = "……こんな身体では、ありますが。"
90001220-100 = "もしかして、怒らせてしまったかしら？"
90001220-101 = "あなたは本当に……！"
90001220-102 = "はぁ……わかりました。ちゃんと言葉にしなければならないのですね。"
90001220-103 = "ご、ごめんなさい……？"
90001220-108 = "[ns] \"ケイちゃん、ちょっと落ち着こう。\""
90001220-109 = "何回言えば分かるんですか、私はケイちゃんではありません！"
90001220-111 = "……。"
90001220-112 = "ケイ、私も貴女に言わなければならないことがあるわ。"
90001220-113 = "……謝らせてちょうだい。"
90001220-119 = "……どうして謝りたいと思ったのか、聞いても良いですか？"
90001220-120 = "アリスと貴女を……。"
90001220-121 = "私は……。"
90001220-122 = "もう気にしていません。"
90001220-123 = "……本当に？"
90001220-124 = "アリスがあなたを許したので。"
90001220-125 = "それに、いつまでもこういう話を続けていても仕方がないですから。"
90001220-126 = "これからは、もう少し自然に話せればと思います。"
90001220-127 = "分かったわ。"
90001220-128 = "……ありがとう。"
90001220-129 = "これで話したいことは終わりです。"
90001220-130 = "また変な空気になっても困りますから。"
90001220-131 = "そろそろ輸送船が到着する時間ですし、先に戻っています。"
90001220-136 = "リオ。"
90001220-137 = "ん？"
90001220-138 = "……命を吹き込んでくれて、ありがとうございます。"
90001220-139 = "……！"
90001220-146 = "（ケイがいなくなってからも、リオは動かなかった）"
90001220-147 = "（そっと、そばに寄った）"
90001220-151 = "先生……？"
90001220-152 = "その、ごめんなさい。#n今は、こっちを見ないでもらえると……。"
90001220-153 = "……少しだけ時間をちょうだい。"
90001220-154 = "[s] \"ハンカチ、使って。\""
90001220-155 = "……！"
90001220-156 = "ええ……。"
90001220-157 = "……ありがとう。"
90001220-159 = "（リオが落ち着くまで、隣で静かに待った）"
90001220-163 = "……ありがとう、先生。"
90001220-167 = "視界良好、乱流の兆しもありません。"
90001220-168 = "しかし、重大な問題が残っています。"
90001220-169 = "何ですか、トキ？"
90001220-170 = "……どこに向かえば良いのでしょうか？"
90001220-171 = "そこは心配しなくても大丈夫です。可愛い後輩のアリスに何か妙案があるそうなので。"
90001220-172 = "[s] \"いつの間にそんな話を……？\""
90001220-173 = "先生がケイとリオに忘れ物の「探索」を頼んだ時、アリスが私にこそっと話してくれたのです。"
90001220-175 = "パンパカパーン！#nここからはアリスのターンです！"
90001220-176 = "なるほど、それなら安心です。#nアリスも操縦席に座りますか？"
90001220-177 = "はい！#nケイも一緒で良いですか？"
90001220-178 = "問題ありません。揺れに気をつけて移動してください。"
90001220-186 = "[ns] \"それじゃあ、よろしくね！\""
90001220-187 = "何を言ってるのですか、先生。"
90001220-188 = "[s] \"えっ……？\""
90001220-189 = "先生も一緒に座るのです。"
90001220-190 = "[s] \"席が足りないんじゃないかな……？\""
90001220-191 = "私の膝の上が空いています、ぶい。"
90001220-198 = "（結局、トキの膝の上には座らず……）"
90001220-199 = "（指定された席におとなしく座った）"
90001220-201 = "このまま進んでください。"
90001220-202 = "ありがとうございます。#n方角だと、どちらになりますか？"
90001220-203 = "えっと……そうでした！"
90001220-204 = "進路を北北西にしてください！"
90001220-205 = "西北西ではなく……？"
90001220-206 = "……私が座標を指定します。"
90001220-211 = "ここに行けば問題ありません。"
90001220-212 = "ありがとうございます、ケイ。#nやはり、私の目に狂いはなかったようです。"
90001220-213 = "……嫌な予感がします。"
90001220-214 = "私はただ……。"
90001220-219 = "ケイが優しくて良い子だと言いたかっただけです。"
90001220-220 = "絶対、絶対、絶対、ぜーったい、違いますからね！？"
90001220-221 = "[s] \"ケイちゃんは本当に優しくて良い子だよね。\""
90001220-223 = "先生を殺して私も死にます！"
90001220-230 = "ケイ！？暴れてはいけません！"
90001220-231 = "そうですよ、ケイ。操縦席でのちょっとしたミスは、取り返しのつかない事故に繋がります。"
90001220-236 = "[ns] \"ケイちゃんは優しくて良い子だけど、たまに暴走するよね。\""
90001220-238 = "うわぁぁぁぁぁぁぁ！！！！！"
90001220-240 = "（そうして、ケイに恨みがましい目を向けられながら……）"
90001220-241 = "（私たちは、謎の施設に到着した）"
90001220-244 = "……敵のグリッドポイント到着を確認。"
90001220-245 = "本当に、ここまで来られたんですね……す、少しは認めざるを得ないかも。"
90001220-246 = "そうですね。他のすべての愚かな人間よりはマシだったということで。"
90001220-247 = "プランC……いや、プランDにする場合、ティファレトを鋼鉄大陸に後退させる案も視野にいれるよ。判断はアインに任せていい？"
90001220-248 = "は、はい！お任せください！"
90001220-249 = "それでは、始めましょう。"
90001220-253 = "ソフ曰く、歓迎パーティーは盛大に、とのことですから！"
90001220-255 = "次回;種子貯蔵庫"
