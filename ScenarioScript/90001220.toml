[translation]
90001220-1 = "Episódio 22; Ponto de Grade"
90001220-2 = "A aurora desapareceu e todos os equipamentos voltaram ao normal."
90001220-3 = "Mas era uma vista tão bonita!"
90001220-4 = "Fufu. De fato, a aurora é um fenômeno natural maravilhoso, mas, na verdade, é um sinal bastante perigoso, sabe?"
90001220-5 = "A perturbação no campo magnético causa danos às comunicações sem fio."
90001220-6 = "Então, talvez tenha sido bom que ela tenha desaparecido rápido...?"
90001220-7 = "Mesmo que ocorra uma falha, ela se recupera em poucas horas, então não há necessidade de se preocupar tanto."
90001220-8 = "Eu achava que a Presidente era irracional antes, e ela me dava um pouco de medo, mas..."
90001220-9 = "Ela é uma boa pessoa, na verdade?"
90001220-10 = "S-será mesmo...?"
90001220-11 = "O navio de transporte chegará em cerca de 15 minutos. #nVerifiquem a carga uma última vez. Certifiquem-se de que não esqueceram nada."
90001220-12 = "Certo!"
90001220-16 = "Será que a Presidente está bem?"
90001220-17 = "Parece que ela já terminou os preparativos."
90001220-22 = "Kei, você está pronta?"
90001220-23 = "Sim. Embora, para este corpo, não haja necessidade de preparativos..."
90001220-24 = "Sim, foi algo que eu projetei. Deve ser capaz de lidar com qualquer coisa."
90001220-25 = "Você diz isso com uma expressão de quem fala sério..."
90001220-26 = "Sobre isso... Rio..."
90001220-27 = "Aconteceu alguma coisa?"
90001220-28 = "Bem, é que..."
90001220-29 = "?"
90001220-30 = "[s] (Será que isso é...)"
90001220-34 = "[ns1] \"Droga!\"\n[ns2] \"Acho que esqueci algo!\"\n[ns3] \"Himari, vou pegar a Rio e a Kei emprestadas por um momento!\""
90001220-38 = "P-Sensei?"
90001220-39 = "O que você está planejando desta vez? #nNão me puxe. Como só tenho uma roda, é difícil manter o equilíbrio!"
90001220-43 = "Sensei, se for algo que você está procurando..."
90001220-47 = "Já que elas estão juntas..."
90001220-48 = "...Com certeza, ficará tudo bem."
90001220-49 = "Vou apenas enviar uma mensagem para que não se atrasem."
90001220-54 = "...Será que você tem algo para falar?"
90001220-55 = "Você não veio aqui para procurar algo?"
90001220-56 = "Você realmente acreditou nisso... Por favor, tome cuidado para não cair em golpes."
90001220-57 = "Então era mentira..."
90001220-58 = "Algo para conversarmos a sós... Eu, com a Rio?"
90001220-59 = "O-o que você está dizendo!"
90001220-60 = "Quem diria uma coisa dessas...!"
90001220-61 = "[s] \"A Kei-chan é uma tsundere, né.\""
90001220-62 = "Francamente, esse adulto!"
90001220-63 = "..."
90001220-64 = "Haa, entendi."
90001220-65 = "(Sobre o que será que é...)"
90001220-66 = "Pode parecer tarde demais para dizer isso, mas..."
90001220-69 = "A Alice está feliz por poder ficar com a Kei."
90001220-70 = "Quero continuar nos ajudando daqui para frente!"
90001220-73 = "...Eu queria lhe agradecer."
90001220-74 = "O fato de você me odiar é..."
90001220-75 = "Sim?"
90001220-76 = "Hã?"
90001220-77 = "Não, por que...?"
90001220-78 = "E quanto a você, por que...?"
90001220-82 = "[ns] (Será que não tem uma pipoca em algum lugar...)"
90001220-83 = "Você acha que eu sou uma ingrata?"
90001220-84 = "Sempre houve muitas pessoas que me odiaram, afinal..."
90001220-85 = "Não é nada disso!"
90001220-89 = "Eu só... queria te agradecer. Por ter me dado uma nova vida..."
90001220-90 = "……！"
90001220-91 = "Graças à Rio, mesmo que um pouco..."
90001220-96 = "Como agora consigo ver, ouvir e me mover..."
90001220-97 = "Pude sentir que estou viva."
90001220-98 = "...Mesmo que seja neste corpo."
90001220-100 = "Será que eu te deixei com raiva?"
90001220-101 = "Você é realmente...!"
90001220-102 = "Haa... entendi. Então eu preciso colocar em palavras, não é?"
90001220-103 = "D-desculpe...?"
90001220-108 = "[ns] \"Kei-chan, vamos nos acalmar um pouco.\""
90001220-109 = "Quantas vezes eu tenho que dizer que não sou a Kei-chan!"
90001220-111 = "……。"
90001220-112 = "Kei, eu também tenho algo que preciso te dizer."
90001220-113 = "...Deixe-me pedir desculpas."
90001220-119 = "...Posso perguntar por que você quis se desculpar?"
90001220-120 = "Por causa de Alice e você..."
90001220-121 = "Eu..."
90001220-122 = "Eu já não me importo mais com isso."
90001220-123 = "...Sério?"
90001220-124 = "Porque a Alice te perdoou."
90001220-125 = "Além disso, não adianta continuarmos falando sobre isso para sempre."
90001220-126 = "Espero que, daqui para frente, possamos conversar de forma mais natural."
90001220-127 = "Entendido."
90001220-128 = "...Obrigada."
90001220-129 = "Era só isso que eu queria dizer."
90001220-130 = "Não quero que o clima fique estranho de novo."
90001220-131 = "Já está quase na hora da nave de transporte chegar, então vou voltar primeiro."
90001220-136 = "Rio."
90001220-137 = "Hm?"
90001220-138 = "...Obrigada por ter soprado vida em mim."
90001220-139 = "……！"
90001220-146 = "(Mesmo depois que Kei foi embora, Rio não se moveu)"
90001220-147 = "(Aproximei-me silenciosamente)"
90001220-151 = "Sensei...?"
90001220-152 = "Bem, me desculpe. #nPoderia não olhar para cá agora...?"
90001220-153 = "...Me dê só um momento."
90001220-154 = "[s] \"Use o lenço.\""
90001220-155 = "……！"
90001220-156 = "Sim..."
90001220-157 = "...Obrigada."
90001220-159 = "(Esperei silenciosamente ao lado dela até que Rio se acalmasse)"
90001220-163 = "...Obrigada, Sensei."
90001220-167 = "Visibilidade boa, sem sinais de turbulência."
90001220-168 = "No entanto, um problema grave ainda permanece."
90001220-169 = "O que foi, Toki?"
90001220-170 = "……Para onde devemos ir?"
90001220-171 = "Não precisa se preocupar com isso. Parece que a nossa querida kouhai, Alice, tem um plano infalível."
90001220-172 = "[s] \"Desde quando vocês conversaram sobre isso……?\""
90001220-173 = "Quando o Sensei pediu para Kei e Rio ajudarem na \"busca\" pelo item perdido, a Alice me contou baixinho."
90001220-175 = "Tan-tan-taaan!#nA partir de agora, é a vez da Alice!"
90001220-176 = "Entendo, sendo assim, estou tranquila.#nAlice, você também vai sentar no assento do piloto?"
90001220-177 = "Sim!#nTudo bem se a Kei for junto?"
90001220-178 = "Sem problemas. Por favor, tome cuidado com as turbulências durante o trajeto."
90001220-186 = "[ns] \"Então, conto com vocês!\""
90001220-187 = "O que está dizendo, Sensei?"
90001220-188 = "[s] \"Hã……?\""
90001220-189 = "O Sensei também vai sentar junto."
90001220-190 = "[s] \"Não vai faltar lugar……?\""
90001220-191 = "O meu colo está livre, v-v."
90001220-198 = "(No fim, não sentei no colo da Toki……)"
90001220-199 = "(Sentei-me obedientemente no assento designado)"
90001220-201 = "Pode seguir em frente."
90001220-202 = "Obrigada.#nEm termos de direção, para onde seria?"
90001220-203 = "Ah…… é verdade!"
90001220-204 = "Por favor, defina o curso para Noroeste!"
90001220-205 = "Não seria Oeste-Noroeste……?"
90001220-206 = "……Eu vou especificar as coordenadas."
90001220-211 = "Se formos por aqui, não haverá problemas."
90001220-212 = "Obrigada, Kei.#nComo esperado, meu julgamento não falhou."
90001220-213 = "……Tenho um mau pressentimento."
90001220-214 = "Eu só estava……"
90001220-219 = "Eu só queria dizer que a Kei é uma menina gentil e bondosa."
90001220-220 = "Absolutamente, absolutamente, absolutamente, abso-lutamente não é isso, entendeu!?"
90001220-221 = "[s] \"A Kei-chan é realmente uma menina gentil e bondosa, né.\""
90001220-223 = "Vou matar o Sensei e depois me matar!"
90001220-230 = "Kei!? Você não pode ficar agitada assim!"
90001220-231 = "Exatamente, Kei. Um pequeno erro no assento do piloto pode levar a um acidente irreparável."
90001220-236 = "[ns] \"A Kei-chan é gentil e bondosa, mas às vezes ela perde o controle, né.\""
90001220-238 = "Uwaaaaaaaa!!!!!"
90001220-240 = "(E assim, enquanto recebia olhares de ressentimento da Kei……)"
90001220-241 = "(Chegamos a uma instalação misteriosa)"
90001220-244 = "……Confirmação de chegada ao ponto de grade inimigo."
90001220-245 = "Vocês realmente conseguiram chegar até aqui…… t-talvez eu tenha que admitir um pouco."
90001220-246 = "Pois é. Digamos que vocês foram melhores do que todos os outros humanos tolos."
90001220-247 = "Plano C…… não, se formos para o Plano D, vou considerar a ideia de recuar Tiphereth para o Continente de Aço. Posso deixar a decisão com Ein?"
90001220-248 = "S-sim! Pode deixar comigo!"
90001220-249 = "Então, vamos começar."
90001220-253 = "Como Soph disse, a festa de boas-vindas deve ser grandiosa!"
90001220-255 = "Próximo episódio: Banco de Sementes"
