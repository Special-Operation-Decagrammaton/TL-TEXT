[translation]
80000020-1 = "アリスのチョコレート"
80000020-2 = "シャーレ・オフィス"
80000020-3 = "先生。今日が何の日かご存知ですか？"
80000020-4 = "[s] \"……バレンタインデー？\""
80000020-5 = "はい、つまり今日はなんと……"
80000020-6 = "「チョコレート」のアイテムを消費することで、狩りの時にバフがかかる「レベル上げ」に最適な日です！"
80000020-7 = "[s] \"……そっか。\""
80000020-8 = "そうして高速成長するため、アリスもチョコレートを作りました。"
80000020-13 = "パンパカパーン！"
80000020-14 = "アリスは「手作りチョコレート」を手に入れた！知能が10上がった！"
80000020-15 = "[s] \"「手作りチョコレート」……？\""
80000020-16 = "はい、アリスが作ったチョコレートです。"
80000020-17 = "最初は経験値が足りず、何度も試行錯誤をしましたが……"
80000020-18 = "頼れるパーティーメンバーであるモモイの手助けもあり、何とか完成させることができました。"
80000020-19 = "先生はこのチョコレートのモデルが誰なのか、お気づきですか？"
80000020-20 = "[s1] \"……アリス？\"\n[s2] \"……私？\""
80000020-21 = "アリスはそんな感じではありません！"
80000020-22 = "確かに似ている部分もありますが……"
80000020-23 = "ブブー！違います！"
80000020-24 = "これはチョコレートで作った「スネイル」です。"
80000020-25 = "[s] \"……「スネイル」？\""
80000020-26 = "あれ？先生はスネイルをご存じないのですか？"
80000020-27 = "「スネイル」は「始まりの町」の近くに登場するゼリー状のモンスターで、ステータスが低いため初心者にも相手がしやすい最弱の敵です。"
80000020-28 = "ただし属性を持った一部のスネイルは、正しい属性の武器で攻略しなければ攻撃を全反射するという鬼仕様だったりします。"
80000020-29 = "[s] \"そ、そうなんだ……。\""
80000020-30 = "こんなにもスネイルそっくりなのに、もしかして先生は弱体化の呪いデバフがかかっているのでしょうか？"
80000020-31 = "このスネイルのチョコは先生に差し上げます。アリスは危機に陥った初心者に配慮できる、親切なプレイヤーですから。"
80000020-32 = "戦闘を始める前に、忘れずに摂取してくださいね？"
