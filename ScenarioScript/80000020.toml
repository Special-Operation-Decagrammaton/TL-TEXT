[translation]
80000020-1 = "Chocolate da Aris"
80000020-2 = "Escritório do Schale"
80000020-3 = "Sensei. Você sabe que dia é hoje?"
80000020-4 = "[s] \"……Dia dos Namorados?\""
80000020-5 = "Sim, o que significa que hoje é, na verdade..."
80000020-6 = "O dia perfeito para subir de nível, já que consumir o item \"Chocolate\" concede um bônus durante a caçada!"
80000020-7 = "[s] \"……Entendi.\""
80000020-8 = "E para crescer rapidamente, a Aris também fez chocolates."
80000020-13 = "Tcharam!"
80000020-14 = "Aris obteve \"Chocolate Artesanal\"! Inteligência aumentou em 10!"
80000020-15 = "[s] \"\"Chocolate Artesanal\"...?\""
80000020-16 = "Sim, é um chocolate que a Aris fez."
80000020-17 = "No começo, faltava experiência e eu tentei várias vezes, mas..."
80000020-18 = "Com a ajuda da Momoi, uma integrante confiável do grupo, consegui terminar."
80000020-19 = "Sensei, você percebeu em quem esse chocolate foi inspirado?"
80000020-20 = "[s1] \"……Na Aris?\"\n[s2] \"……Em mim?\""
80000020-21 = "A Aris não é assim!"
80000020-22 = "É verdade que tem algumas semelhanças, mas..."
80000020-23 = "Errado! Não é isso!"
80000020-24 = "Este é um \"Snail\" feito de chocolate."
80000020-25 = "[s] \"……\"Snail\"?\""
80000020-26 = "Ué? Sensei, você não conhece os Snails?"
80000020-27 = "Os \"Snails\" são monstros gelatinosos que aparecem perto da \"Cidade Inicial\". Como têm atributos baixos, são os inimigos mais fracos e fáceis de enfrentar para iniciantes."
80000020-28 = "No entanto, alguns Snails com atributos especiais possuem uma mecânica cruel: se você não usar a arma com o atributo correto, eles refletem todos os ataques."
80000020-29 = "[s] \"A-ah, entendi...\""
80000020-30 = "Mesmo sendo tão parecido com um Snail, será que o Sensei está sofrendo de um debuff de enfraquecimento?"
80000020-31 = "Vou dar este chocolate de Snail para você, Sensei. Afinal, a Aris é uma jogadora gentil que se preocupa com iniciantes em apuros."
80000020-32 = "Não se esqueça de consumi-lo antes de começar a batalha, está bem?"
