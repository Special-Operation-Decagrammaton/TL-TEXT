[translation]
21070-1 = "Episódio 7; Grande demais para ser chamada de arma"
21070-2 = "Millennium - Depto. de Desenvolvimento de Jogos"
21070-3 = "Na Millennium... não, todos os alunos de Kivotos têm suas próprias armas."
21070-4 = "Por isso, precisamos arranjar uma arma para a Aris também."
21070-5 = "Existem várias formas de conseguir uma, mas o lugar mais rápido para arranjar uma arma decente aqui na Millennium é..."
21070-6 = "......Acho que é no Clube de Engenharia."
21070-7 = "Clube de... Engenharia...?"
21070-8 = "Os especialistas que constroem e consertam máquinas são chamados de 'Meisters' aqui na Millennium."
21070-9 = "O Clube de Engenharia é um clube focado em hardware, onde muitos desses Meisters se reúnem."
21070-10 = "Como eles são especialistas em máquinas em geral, também são o clube responsável pelo conserto e modificação de armas."
21070-11 = "Acho que deve ter várias armas sem uso sobrando por lá."
21070-12 = "Sendo assim, vamos pra lá agora mesmo!"
21070-14 = "Clube de Engenharia - Oficina"
21070-15 = "......Entendo, já compreendi mais ou menos a situação."
21070-16 = "Vocês querem presentear a nova companheira de vocês com uma arma melhor... é isso."
21070-17 = "Sendo assim, vir ao Clube de Engenharia foi uma excelente escolha."
21070-18 = "A vitória ou a derrota na Millennium dependem fortemente da presença de excelentes engenheiros."
21070-19 = "Temos vários protótipos que criamos até agora guardados ali daquele lado."
21070-20 = "Podem levar o que quiserem dali, não me importo."
21070-21 = "Aee! Obrigada, veterana!"
21070-24 = "E aí... Sou a Hibiki, do 1º ano. Se quiserem, eu posso escolher algo bom pra vocês..."
21070-25 = "......O que acha desta, Aris?"
21070-27 = "Oh, uma pistola?"
21070-28 = "Olhando pra ela, é só um palpite... mas ela não deve ter muita experiência de combate..."
21070-29 = "Eu nego essas palavras. Aris já salvou a humanidade 27 vezes, travou 46 batalhas contra o exército do Rei Demônio e explorou mais de três dígitos de masmorras. A minha experiência é consideravelmente vasta."
21070-31 = "......"
21070-32 = "Isso é... impressionante..."
21070-33 = "De qualquer forma, você não parece ter muita experiência usando armas de fogo..."
21070-34 = "Pra alguém assim, uma pistola é o ideal... Esta é feita de plástico, então é leve e tem pouco recuo..."
21070-35 = "Nesse sentido, ela deve ser bem amigável para iniciantes... E, acima de tudo..."
21070-37 = "Esta arma está equipada com uma função que nunca existiu na história da Millennium."
21070-39 = "O-O que é isso?"
21070-40 = "Parece incrível antes mesmo de ouvir... Que tipo de função é essa?"
21070-41 = "É a função..."
21070-42 = "'Bluetooth'."
21070-43 = "......Eh?"
21070-44 = "Uma pistola que permite escutar música e até transferir arquivos via Bluetooth... Pelo que pesquisei, algo assim nunca existiu antes."
21070-45 = "......Claro, ela também tem a função Sumomo integrada. Você pode encostá-la nos painéis de transporte público para pagar as passagens."
21070-46 = "E como tem tecnologia NFC, dá até pra pagar as compras na loja de conveniência..."
21070-47 = "B-Bem, se parar pra pensar, acho que é incrível sim, mas..."
21070-48 = "Se você apontar uma pistola na loja de conveniência dizendo 'Vou pagar com isso', o atendente vai morrer de susto!"
21070-49 = "Ué, por falar nisso, onde a Aris-chan foi parar...? Aris-chan, Aris-chaaan?"
21070-50 = "......Ah, ela tá ali."
21070-51 = "......Aquilo é,"
21070-54 = "(*Encarando...*)"
21070-57 = "O que é isso...?"
21070-58 = "Fufufu... Você tem um ótimo olho para as coisas, cliente."
21070-59 = "E-Ehm...?"
21070-60 = "Se precisar de explicações, eu forneço as respostas a qualquer hora e em qualquer lugar! Sou a Meister do Clube de Engenharia, Kotori!"
21070-61 = "......?"
21070-62 = "Você é a Aris, certo? A quarta integrante do Departamento de Desenvolvimento de Jogos!"
21070-64 = "Ah, Kotori-chan, quanto tempo. Por sinal, o que é essa coisa gigante que a Aris-chan tá olhando?"
21070-67 = "Isso até parece um... 'Canhão'."
21070-68 = "Ótima pergunta, Midori. Isso foi construído consumindo cerca de 70% do orçamento do segundo semestre do Clube de Engenharia..."
21070-69 = "A obra ambiciosa do Clube de Engenharia, o 'Railgun para Encouraçados Espaciais'!"
21070-70 = "Encouraçados Espaciais... Lá vêm vocês com essas ideias absurdas de novo..."
21070-71 = "Da última vez, vocês não tinham tentado entrar em 'cold sleep', construído uma máquina de hibernação fazendo o maior alvoroço dizendo 'Nos vemos no futuro', e no final todas acabaram pegando um resfriado?"
21070-72 = "......Nós ainda usamos bastante aquele 'Expresso Direto para o Futuro'."
21070-73 = "......Bem, como uma geladeira, é claro. Como conseguimos enviar a nossa comida para um futuro mais distante, não foi um fracasso."
21070-74 = "O nome é exagerado demais pra utilidade que tem!"
21070-75 = "Voltando ao assunto, após construirmos helicópteros e robôs de uso geral, o Clube de Engenharia agora tem como meta o desenvolvimento de Encouraçados Espaciais!"
21070-76 = "E este Railgun é o primeiro passo para isso. Uma arma de munição real desenvolvida com o propósito de combate fora da atmosfera! Esta é, sem dúvida, uma tentativa inédita na história da Millennium!"
21070-77 = "Que maneiro... Fico empolgada só de ouvir!"
21070-78 = "Como esperado do Clube de Engenharia da Millennium! Dessa vez deu tudo certo, não é!?"
21070-79 = "Fufufu, mas é claro!"
21070-80 = "Era o que eu gostaria de dizer, mas o projeto está pausado no momento..."
21070-81 = "Eeeeh!? Por quê! Eu tava cheia de expectativas!"
21070-82 = "O que costuma puxar o tapete dos engenheiros em qualquer época nunca é a falta de imaginação ou de paixão, e sim a falta de orçamento..."
21070-83 = "Fazer apenas este Railgun já consumiu 70% do orçamento do semestre, então para construir o Encouraçado Espacial em si, sabe-se lá quantos milhares de vezes mais o orçamento precisaria ser..."
21070-84 = "Mas isso era algo que dava pra saber logo na fase de planejamento! Por que vocês levaram a construção desse Railgun até o fim!?"
21070-87 = "Que pergunta idiota, Momoi."
21070-88 = "......Porque Canhões de Feixe, são a essência do romance."
21070-89 = "(Acena)"
21070-90 = "Exatamente! Não conseguir compreender o fascínio de um Canhão de Feixe, é bem a sua cara mesmo, Momoi."
21070-91 = "Idiotas! São um bando de idiotas mesmo sendo super inteligentes!"
21070-93 = "O nome oficial desta arma, que recebeu toda a paixão do Clube de Engenharia, é..."
21070-94 = "'Espada de Luz: Supernova'!"
21070-95 = "Mais um nome absurdamente exagerado à toa..."
21070-96 = "......!"
21070-97 = "E-Espada de Luz...!?"
21070-98 = "O-Os olhos da Aris estão brilhando...!?"
21070-99 = "Uau, uaaau...!"
21070-100 = "Acho que é a primeira vez que vejo a Aris-chan tão empolgada assim."
21070-101 = "......Eu quero isso."
21070-102 = "......Eh?"
21070-104 = "Ó Grandes Artesãos de Aço, desejo obter o Sopro do Dragão."
21070-106 = "Hmmm, fico muito feliz que diga isso, mas..."
21070-107 = "Sinto muito, isso é algo que infelizmente não podemos negociar!"
21070-109 = "Por quê!? Vocês disseram que a gente podia levar qualquer coisa dessa sala!"
21070-110 = "......Isso tem um motivo."
21070-111 = "Motivo?"
21070-112 = "Por acaso, o meu nível atual não é o suficiente... Por favor, digam-me qual é o nível necessário para equipá-la!"
21070-113 = "Não, sinto muito, mas o problema não é esse..."
21070-114 = "O problema é muito mais realista."
21070-115 = "Entendi, é dinheiro..."
21070-116 = "Não se preocupe, Aris. Mesmo que eu tenha que vender o PlaySation da Midori..."
21070-117 = "......Também não é uma questão de dinheiro."
21070-118 = "Na vida real, não existe problema maior que o dinheiro!"
21070-119 = "Bem, concordo até certo ponto se estivermos falando sobre orçamentos de produção, mas..."
21070-120 = "......Esta arma é muito grande e pesada para ser usada como uma arma de fogo individual."
21070-122 = "Acredite, só o peso base dela passa dos 140kg! Além disso, se você somar a mira ótica e a bateria para realizar os disparos, o recuo instantâneo ultrapassa os 200kg!"
21070-124 = "......"
21070-125 = "Nós já estamos felizes por você ter achado ela legal. Obrigada. Se fosse possível carregá-la, eu adoraria poder entregá-la a você..."
21070-126 = "......?"
21070-127 = "......!"
21070-128 = "......Tu juras que não há um traço de falsidade nessas palavras?"
21070-129 = "Hm? O jeito que essa garota fala mudou de novo..."
21070-130 = "P-Provavelmente, acho que ela está perguntando se 'isso é sério'."
21070-131 = "Claro que eu não estou mentindo, mas... isso significa que você pretende levantar aquilo?"
21070-132 = "(Acena)"
21070-134 = "(Swoosh...)"
21070-135 = "Aquele que empunhar esta arma..."
21070-136 = "......Será o governante destas terras!"
21070-137 = "Fufufu, entendo. É uma determinação admirável!"
21070-139 = "(Hmpf)"
21070-140 = "Fuh...!"
21070-141 = "Acho melhor... não forçar a barra. Você não vai conseguir levantar a menos que use um guindast――"
21070-143 = "Nnnnnnnhhh...!"
21070-144 = "......Não pode ser."
21070-145 = "Eeeeh!?"
21070-146 = "(Nnggghhh――!)"
21070-147 = "......E-Ela levantou!"
21070-148 = "Mentira... não consigo acreditar..."
21070-149 = "Ehm, o botão é... será que o botão B é este aqui...?"
21070-150 = "E-Espera...!"
21070-152 = "......Luz!!!"
21070-155 = "(BOOOOOMMMM!)"
21070-156 = "Ahhhhhhh! O-O teto da nossa sala do clubeeee!?"
21070-157 = "......É incrível."
21070-158 = "Aris, vai equipar esta arma."
21070-159 = "N-Não acredito que ela realmente conseguiu usar... M-Mas falando nisso, sobre aquilo...! Por conta de problemas de orçamento e afins, se possível gostaríamos que levasse outra...!?"
21070-160 = "......Não,"
21070-161 = "Eu não me importo, pode levá-la."
21070-162 = "Utaha-senpai... Tem certeza disso?"
21070-163 = "Sim. De qualquer maneira, ninguém além dela seria capaz de usá-la."
21070-164 = "Hibiki, depois faça uma alça de ombro e um suporte de apoio para que a Aris possa carregá-la com mais facilidade."
21070-165 = "Entendido."
21070-166 = "......Pensando pelo lado positivo, fico feliz que agora poderemos coletar dados de combate real."
21070-167 = "Uau, acabamos ganhando uma arma monstruosa! Obrigada!"
21070-168 = "M-Muito obrigada!"
21070-169 = "Não, ainda é cedo para os agradecimentos."
21070-170 = "Eh?"
21070-172 = "Muito bem... Hibiki, poderia trazer à tona todos os drones e robôs que receberam solicitações de descarte recentemente?"
21070-173 = "......Sim."
21070-175 = "E-Ehm... Utaha-senpai? Sinto que o rumo dessa conversa tá meio estranho..."
21070-176 = "Por um acaso isso não seria o clássico padrão 'Não vou deixar vocês levarem essa arma tão fácil assim!'!?"
21070-177 = "Exatamente."
21070-178 = "Se vocês realmente quiserem levar essa arma com vocês..."
21070-181 = "Terão que nos derrotar primeiro!"
21070-182 = "!?"
21070-183 = "Eeeeh! Não brinca, por que isso, Utaha-senpai!?"
21070-184 = "T-Tudo isso só por causa de uma única arma...?"
21070-186 = "Se fosse qualquer outra arma, eu teria ficado feliz em dá-la a vocês..."
21070-187 = "Mas em relação a essa arma em específico, acho que precisarei de uma confirmação."
21070-188 = "C-Confirmação?"
21070-189 = "Não... acho que 'teste de qualificação' seria a palavra mais apropriada."
21070-190 = "Qualificação? Isso seria..."
21070-193 = "Drones de combate e robôs detectados à frente, confirmando reações hostis."
21070-194 = "Aí vêm eles!"
21070-195 = "Ah, fala sério!"