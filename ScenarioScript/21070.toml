[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21070-1 = "Episódio 7: Grande Demais para ser uma Arma de Fogo."
21070-2 = "Millennium · Clube de Desenvolvimento de Jogos"
21070-3 = "Os alunos da Millennium…… não, de toda Kivotos,\ncada um carrega a própria arma."
21070-4 = "Então a gente também precisa arranjar\numa arma pra Aris, né."
21070-5 = "Tem várias formas de conseguir, mas, aqui na\nMillennium, o lugar mais rápido pra arrumar\numa arma decente seria……"
21070-6 = "……o Clube de Engenharia, com certeza."
21070-7 = "Clube de…… Engenharia?"
21070-8 = "Os especialistas que constroem e consertam\nmáquinas, aqui na Millennium a gente chama\nde \"Meister\"."
21070-9 = "O Clube de Engenharia é onde se juntam um monte\ndesses Meister, um clube especializado em hardware."
21070-10 = "Além de manjarem de máquina em geral, é o clube\nque cuida de conserto e modificação de armas também."
21070-11 = "Então deve ter um monte de arma que não\nestá sendo usada sobrando por lá, eu acho."
21070-12 = "Sendo assim, bora dar uma passada lá já!"
21070-14 = "Clube de Engenharia · Oficina"
21070-15 = "……Entendi, captei a ideia geral."
21070-16 = "Querem presentear a nova companheira\ncom uma arma melhor…… é isso."
21070-17 = "Se é esse o caso, vir ao Clube de Engenharia\nfoi uma escolha e tanto."
21070-18 = "Aqui na Millennium, a vitória ou a derrota depende\nenormemente de ter, ou não, bons engenheiros."
21070-19 = "Ali daquele lado tem vários protótipos\nque a gente construiu até hoje."
21070-20 = "Pode levar qualquer um dos que estiverem ali,\nsem problema nenhum."
21070-21 = "Eba! Obrigada, veterana!"
21070-24 = "Oi…… sou a Hibiki, do 1º ano. Se quiser,\neu escolho alguma coisa boa pra você……"
21070-25 = "……Que tal esta aqui, Aris?"
21070-27 = "Ué, uma pistola?"
21070-28 = "Pelo visto, é só um palpite, mas……\nvocê não deve ter muita experiência\nde combate até agora……"
21070-29 = "Nego essa afirmação. Aris já salvou a humanidade\n27 vezes, travou 46 batalhas contra o exército do\nRei Demônio e explorou mais de uma centena de\nmasmorras. Em experiência, sou razoavelmente vasta."
21070-31 = "……"
21070-32 = "Isso é…… impressionante……"
21070-33 = "Enfim, experiência usando arma de fogo……\nparece que não tem muita."
21070-34 = "Pra esse tipo de pessoa, pistola é o ideal……\nesta é de plástico, então é leve\ne tem pouco recuo……"
21070-35 = "Nesse sentido também, deve ser bem amigável\npra iniciante…… e, acima de tudo……"
21070-37 = "Esta pistola tem embutido um recurso que, em toda\na história da Millennium, nunca existiu antes."
21070-39 = "Q-que recurso é esse?"
21070-40 = "Antes mesmo de você dizer já parece incrível……\nque recurso é, afinal?"
21070-41 = "É o seguinte……"
21070-42 = "o recurso de \"Bluetooth\"."
21070-43 = "……Hã?"
21070-44 = "Uma pistola capaz de, via Bluetooth, ouvir música\ne até transferir arquivos…… pelo que pesquisei,\numa coisa dessas nunca existiu até hoje."
21070-45 = "……E, claro, tem função Sumomo embutida.\nDá pra encostar no painel de IC do ponto\ne usar o transporte público."
21070-46 = "E ainda tem função NFC, então dá até\npra pagar com o ConveniPay……"
21070-47 = "I-incrível até que é, de certa forma, mas……"
21070-48 = "Se você apontar uma pistola na loja de conveniência\ndizendo \"vou pagar com isto\", o atendente\nvai surtar de medo!"
21070-49 = "Ué, aliás, cadê a Aris……? Aris, Aaaris?"
21070-50 = "……A-ali."
21070-51 = "……Aquilo ali é,"
21070-54 = "(Encarando fixamente……)"
21070-57 = "Isto é……?"
21070-58 = "Fufufu…… o cliente tem bom olho, hein."
21070-59 = "Ã-ãh……?"
21070-60 = "Se precisar de explicação, a resposta a qualquer\nhora e em qualquer lugar! Sou a Kotori,\nMeister do Clube de Engenharia!"
21070-61 = "……?"
21070-62 = "Você é a tal da Aris, né. A quarta membra\ndo Clube de Desenvolvimento de Jogos!"
21070-64 = "Ah, Kotori, quanto tempo. Aliás, essa coisa\ngrandona que a Aris tá olhando, o que é?"
21070-67 = "Parece…… tipo um \"canhão\", sei lá."
21070-68 = "Boa pergunta, Midori. Isto foi construído gastando\nuns 70% de todo o orçamento do segundo semestre\ndo Clube de Engenharia……"
21070-69 = "a obra ambiciosa do Clube de Engenharia:\no \"Railgun para Encouraçado Espacial\"!"
21070-70 = "Encouraçado espacial……? Lá vêm vocês\ncom mais uma loucura dessas……"
21070-71 = "Antes, vocês não tentaram entrar em criossono,\nfazendo aquele aparelho de hibernação dizendo\n\"vejo vocês no futuro\", e aí deu a maior confusão\ne todo mundo acabou pegando um resfriado?"
21070-72 = "……Aquele \"Expresso Direto pro Futuro\",\nainda hoje a gente usa bastante, sabia?"
21070-73 = "……Bom, como geladeira, no caso. Como agora dá\npra mandar comida pra um futuro ainda mais distante,\nnão foi bem um fracasso."
21070-74 = "Pro uso que tem, o nome é exagerado demais!"
21070-75 = "Voltando ao assunto, o Clube de Engenharia agora,\ndepois do helicóptero e do robô de trabalho de uso\ngeral, tem como meta desenvolver um encouraçado espacial!"
21070-76 = "Este railgun é o primeiro passo nisso. Uma arma de\nprojétil real, feita pra combate fora da atmosfera!\nNa história da Millennium, é, sem dúvida,\na primeira tentativa do gênero!"
21070-77 = "Que maneiro…… só de ouvir já me dá\num friozinho de empolgação!"
21070-78 = "Esse é o Clube de Engenharia da Millennium!\nDessa vez tá dando tudo certo, né!?"
21070-79 = "Fufufu, com certeza!"
21070-80 = "Era o que eu gostaria de dizer, mas\nno momento a gente teve que dar uma pausa……"
21070-81 = "Heeein!? Por quê! Eu tava com tanta esperança!"
21070-82 = "Como sempre, o que atrapalha os engenheiros nunca\nfoi, em época alguma, falta de imaginação ou de\npaixão, e sim o orçamento……"
21070-83 = "Só pra fazer este railgun já foram 70% do orçamento\ndo semestre; pra construir o encouraçado espacial em\nsi, sabe-se lá quantos milhares de vezes mais\norçamento vai custar……"
21070-84 = "Mas isso dá pra saber na fase de planejamento!\nPor que vocês foram até o fim e terminaram\neste railgun!?"
21070-87 = "Pergunta tola, Momoi."
21070-88 = "……Porque um canhão de raio é puro romance."
21070-89 = "(Acena que sim)"
21070-90 = "Exatamente! Não entender o charme de um canhão\nde raio…… ah, a Momoi é assim mesmo."
21070-91 = "São doidos! Tem um bando de gente inteligente\nque é doida varrida aqui!"
21070-93 = "O nome oficial desta arma, na qual foi despejada\ntoda a paixão do Clube de Engenharia, é……"
21070-94 = "\"Espada de Luz: Supernova\"!"
21070-95 = "Lá vem mais um nome inutilmente exagerado……"
21070-96 = "……!"
21070-97 = "E-espada de luz……!?"
21070-98 = "O-os olhos da Aris tão brilhando……!?"
21070-99 = "Uau, uaau……!"
21070-100 = "Acho que é a primeira vez que vejo\na Aris tão empolgada assim."
21070-101 = "……Isto, eu quero."
21070-102 = "……Hã?"
21070-104 = "Ó, grandioso artesão do aço,\neu desejo o sopro daquele dragão."
21070-106 = "Hmm, fico feliz que você diga isso, mas……"
21070-107 = "Sinto muito, mas esse é um pedido\nque eu não posso atender!"
21070-109 = "Por quê!? Você não disse que qualquer coisa\nnesta sala a gente podia levar!"
21070-110 = "……É que isso tem um motivo."
21070-111 = "Motivo?"
21070-112 = "Será que é porque o meu nível não é suficiente……\nme informe o nível necessário para equipá-la!"
21070-113 = "Não, foi mal, mas não é esse tipo de problema……"
21070-114 = "é um problema bem mais concreto."
21070-115 = "Ah, dinheiro né……"
21070-116 = "Não se preocupa, Aris. Eu vendo até o KivoStation\nda Midori se for preciso……"
21070-117 = "……Também não é problema de dinheiro."
21070-118 = "Não existe problema maior que dinheiro\nna vida real, ora!"
21070-119 = "Bom, no sentido de orçamento de produção,\naté concordo até certo ponto……"
21070-120 = "……Esta arma é grande e pesada demais\npra ser usada como armamento individual."
21070-122 = "Pois é, só o peso básico já passa de 140 kg!\nE, somando a mira óptica e a bateria, na hora\ndo disparo o recuo instantâneo passa de 200 kg!"
21070-124 = "……"
21070-125 = "Só de você ter dito que acha isto maneiro, a gente\njá fica feliz. Obrigada. Se desse pra levar, eu daria\nde verdade, mas……"
21070-126 = "……?"
21070-127 = "……!"
21070-128 = "……Tu… podes jurar que em tuas palavras\nnão há uma só sombra de mentira?"
21070-129 = "Hm? Essa garota, de novo com esse jeito\nde falar……"
21070-130 = "T-talvez, mas acho que ela tá perguntando\nse é \"verdade mesmo\"."
21070-131 = "Claro que não tô mentindo…… mas isso quer dizer\nque você pretende erguer aquilo ali?"
21070-132 = "(Acena que sim)"
21070-134 = "(Aproxima-se sem pressa……)"
21070-135 = "Aquela que sacar esta arma……"
21070-136 = "……há de se tornar a soberana destas terras!"
21070-137 = "Fufufu, entendo. O ânimo é admirável!"
21070-139 = "(Firme)"
21070-140 = "Hnf……!"
21070-141 = "Melhor não forçar……\nsem um guindaste, isso não levanta——"
21070-143 = "Hnnnnh……!"
21070-144 = "……Não pode ser."
21070-145 = "Heeein!?"
21070-146 = "(Grrrrr——!)"
21070-147 = "……E-ela levantou!"
21070-148 = "Mentira…… não dá pra acreditar……"
21070-149 = "Deixa ver, o botão é…… este aqui é o botão B……?"
21070-150 = "P-peraí……!"
21070-152 = "……Kh, surja, ó luz!!!"
21070-155 = "(KABÃÃÃÃÃM!)"
21070-156 = "Aaaaah! O-o teto da nossa sala do clubeee!?"
21070-157 = "……Magnífico."
21070-158 = "Aris vai equipar esta arma."
21070-159 = "S-sério que dá pra usar mesmo…… m-mas só essa,\nsabe, a-aquilo……! Por causa de orçamento e tudo,\nse possível eu queria pedir outra……!"
21070-160 = "……Não,"
21070-161 = "tudo bem, pode levar."
21070-162 = "Utaha…… tem certeza mesmo?"
21070-163 = "Sim. De um jeito ou de outro, ninguém\nalém dessa garota vai conseguir usá-la."
21070-164 = "Hibiki, depois faz uma alça de ombro e uma pegada\npra Aris conseguir carregar isso com mais facilidade."
21070-165 = "Pode deixar."
21070-166 = "……Olhando pelo lado bom, poder coletar dados\nde combate real até que é uma mão na roda."
21070-167 = "Uau, que arma absurda você ganhou! Obrigada!"
21070-168 = "M-muito obrigada!"
21070-169 = "Não, ainda é cedo pros agradecimentos."
21070-170 = "Hã?"
21070-172 = "Bem…… Hibiki, pode trazer todos os drones e robôs\nque a gente recebeu ordem de descartar outro dia?"
21070-173 = "……Tá."
21070-175 = "Hã…… Utaha? Sinto que o rumo da coisa\ntá ficando estranho……"
21070-176 = "Isso aqui não é, por acaso, aquele esquema de\n\"não vou deixar você levar a arma assim tão fácil!\"!?"
21070-177 = "Exatamente isso."
21070-178 = "Se você quer mesmo levar essa arma……"
21070-181 = "vai ter que nos derrotar primeiro!"
21070-182 = "!?"
21070-183 = "Heeein! Mas, Utaha, por quê!?"
21070-184 = "P-por causa de uma arma só, ir a esse ponto……?"
21070-186 = "Qualquer outra arma, eu entregaria com prazer……"
21070-187 = "mas, no caso dessa arma, achei que era\nnecessária uma confirmação."
21070-188 = "C-confirmação?"
21070-189 = "Não…… talvez \"qualificação\" seja\na palavra mais adequada."
21070-190 = "Qualificação? Isso quer dizer……"
21070-193 = "Drones e robôs de combate detectados à frente,\nconfirmada reação hostil."
21070-194 = "Lá vêm eles!"
21070-195 = "Ai, que saco!"