[translation]
21070-1 = "Episódio 7: Grande demais para ser chamada de arma"
21070-2 = "Departamento de Desenvolvimento de Jogos do Millennium"
21070-3 = "Millennium... bem, todos os alunos de Kivotos possuem suas próprias armas."
21070-4 = "Então, precisamos encontrar uma arma para a Alice também."
21070-5 = "Existem várias formas de conseguir uma, mas se formos falar do lugar mais rápido e garantido para conseguir uma arma de verdade aqui no Millennium..."
21070-6 = "Acho que seria o Departamento de Engenharia."
21070-7 = "Departamento de... Engenharia?"
21070-8 = "No Millennium, chamamos os especialistas que criam e consertam máquinas de 'Meisters'."
21070-9 = "O Departamento de Engenharia é um clube especializado em hardware, onde muitos desses Meisters se reúnem."
21070-10 = "Eles não só entendem tudo de máquinas, como também são responsáveis pelo conserto e modificação de armas."
21070-11 = "Provavelmente eles devem ter várias armas que não estão sendo usadas."
21070-12 = "Sendo assim, vamos logo até lá!"
21070-14 = "Sala de Trabalho do Departamento de Engenharia"
21070-15 = "...Entendi, acho que já compreendi a situação."
21070-16 = "Vocês querem presentear uma nova colega com uma arma melhor... é isso?"
21070-17 = "Se for esse o caso, vir ao Departamento de Engenharia foi uma escolha excelente."
21070-18 = "No Millennium, a vitória ou a derrota dependem muito da presença de engenheiros talentosos."
21070-19 = "Ali naquele canto, temos vários protótipos que criamos até hoje."
21070-20 = "Podem pegar o que quiserem de lá, não me importo."
21070-21 = "Oba! Obrigada, veterana!"
21070-24 = "Olá... eu sou a Hibiki, do primeiro ano. Se quiserem, eu posso escolher algo bom para você..."
21070-25 = "...O que acha disso, Alice?"
21070-27 = "Uau, uma pistola?"
21070-28 = "Pelo que parece, eu diria que... você provavelmente não tem muita experiência em combate..."
21070-29 = "Eu nego essa afirmação. Alice já salvou a humanidade 27 vezes, participou de 46 batalhas contra o exército do Rei Demônio e explorou mais de cem masmorras. Minha experiência é consideravelmente vasta."
21070-31 = "..."
21070-32 = "...Isso é incrível."
21070-33 = "De qualquer forma, parece que você não tem muita experiência com armas de fogo..."
21070-34 = "Para pessoas assim, uma pistola é o ideal... Como esta é feita de plástico, ela é leve e tem pouco recuo..."
21070-35 = "Nesse sentido, ela deve ser bem amigável para iniciantes... E, acima de tudo..."
21070-37 = "Esta arma possui uma função que nunca existiu na história do Millennium."
21070-39 = "O-o que é isso?"
21070-40 = "Parece incrível só de ouvir... Que tipo de função é essa?"
21070-41 = "É o seguinte..."
21070-42 = "A função 'Bluetooth'."
21070-43 = "...Hã?"
21070-44 = "Uma pistola que permite ouvir música e até transferir arquivos via Bluetooth... Pelo que pesquisei, algo assim nunca existiu antes."
21070-45 = "...Claro, também tem a função Sumomo. Você pode tocar no painel IC das catracas e usar o transporte público."
21070-46 = "E como também tem tecnologia NFC, dá até para pagar em lojas de conveniência..."
21070-47 = "É, se for para dizer que é incrível, até que é..."
21070-48 = "Mas se você apontar uma pistola para o atendente e disser 'quero pagar com isso', ele vai levar um susto!"
21070-49 = "Ué, falando nisso, onde a Alice foi parar...? Alice? Aliceee?"
21070-50 = "...Ah, ali."
21070-51 = "...Aquilo é,"
21070-54 = "(encarando fixamente...)"
21070-57 = "Isso é...?"
21070-58 = "Fufufu... Você tem um bom olho, cliente."
21070-59 = "E-ei, o que...?"
21070-60 = "Se precisar de uma explicação, estou pronta para responder a qualquer hora e em qualquer lugar! Eu sou Kotori, a Meister do Departamento de Engenharia!"
21070-61 = "...?"
21070-62 = "Você é a Alice, né? A quarta integrante do Departamento de Desenvolvimento de Jogos!"
21070-64 = "Ah, Kotori, quanto tempo. Aliás, o que é essa coisa grande que a Alice está olhando?"
21070-67 = "Parece... um 'canhão'."
21070-68 = "Boa pergunta, Midori. Isso foi feito usando quase 70% do orçamento do segundo semestre do Departamento de Engenharia..."
21070-69 = "É a obra ambiciosa do Departamento de Engenharia: um 'Canhão Eletromagnético para Encouraçados Espaciais'!"
21070-70 = "Encouraçado espacial...? Vocês estão fazendo coisas absurdas de novo..."
21070-71 = "Da última vez, vocês não tentaram fazer um criogenizador dizendo que iam 'se encontrar no futuro', causaram o maior alvoroço e acabaram todos resfriados?"
21070-72 = "...Aquele 'Expresso Direto para o Futuro'? Nós ainda usamos bastante."
21070-73 = "...Bom, como geladeira, pelo menos. Conseguimos enviar comida para um futuro bem distante, então não foi um fracasso."
21070-74 = "O nome é exagerado demais para o uso que vocês dão!"
21070-75 = "Voltando ao assunto, o Departamento de Engenharia agora tem como objetivo, após os helicópteros e robôs de trabalho multifuncionais, desenvolver um encouraçado espacial!"
21070-76 = "Este canhão eletromagnético é o primeiro passo. É uma arma de projéteis reais desenvolvida para combate fora da atmosfera! É uma tentativa inédita na história de Millennium!"
21070-77 = "Que legal... só de ouvir já fico empolgada!"
21070-78 = "Como esperado do Departamento de Engenharia de Millennium! Dessa vez vai dar certo, né!?"
21070-79 = "Fufufu, com certeza!"
21070-80 = "Eu gostaria de dizer isso, mas no momento estamos com o projeto pausado..."
21070-81 = "Eeeeh!? Por quê!? Eu estava tão animada!"
21070-82 = "Como sempre, o que atrapalha os engenheiros não é a falta de imaginação ou paixão, mas sim o orçamento..."
21070-83 = "Só para fazer este canhão gastamos 70% do orçamento do semestre, então imagine quanto custaria fazer o encouraçado inteiro..."
21070-84 = "Isso era óbvio desde o planejamento! Por que vocês terminaram de construir esse canhão então!?"
21070-87 = "Pergunta boba, Momoi."
21070-88 = "...Canhões de feixe são uma questão de romance."
21070-89 = "(Assente)"
21070-90 = "Exatamente! Não entender o charme de um canhão de feixe... a Momoi é assim mesmo."
21070-91 = "Que idiotas! Um grupo de gênios que são uns idiotas!"
21070-93 = "O nome oficial desta arma, na qual a paixão do Departamento de Engenharia foi derramada, é..."
21070-94 = "'Espada de Luz: Supernova'!"
21070-95 = "Outro nome desnecessariamente exagerado..."
21070-96 = "...!"
21070-97 = "Es-espada de luz...!?"
21070-98 = "A-a Alice está com os olhos brilhando...!?"
21070-99 = "Uau, uaaau...!"
21070-100 = "Talvez seja a primeira vez que vejo a Alice tão empolgada."
21070-101 = "...Eu quero isso."
21070-102 = "...Eh?"
21070-104 = "Grande artesã de aço, eu desejo o sopro daquele dragão."
21070-106 = "Hmm, fico feliz que diga isso, mas..."
21070-107 = "Sinto muito, mas isso é algo que não posso atender!"
21070-109 = "Por quê!? Você disse que podíamos pegar qualquer coisa que estivesse nesta sala!"
21070-110 = "...Existe um motivo."
21070-111 = "Motivo?"
21070-112 = "Será que é porque meu nível não é alto o suficiente...? Por favor, me diga o nível necessário para equipar!"
21070-113 = "Não, sinto muito, mas não é esse tipo de problema..."
21070-114 = "É um problema mais realista."
21070-115 = "Dinheiro, né..."
21070-116 = "Não se preocupe, Alice. Eu vendo o PlayStation da Midori se for preciso..."
21070-117 = "...Também não é um problema de dinheiro."
21070-118 = "Não existe problema maior que dinheiro na vida real!"
21070-119 = "Bem, em termos de orçamento de produção, concordo até certo ponto..."
21070-120 = "...Esta arma é grande e pesada demais para ser usada como uma arma individual."
21070-122 = "Nossa, só o peso básico é de mais de 140kg! E se adicionarmos a mira óptica e a bateria para disparar, o recuo momentâneo ultrapassa os 200kg!"
21070-124 = "……."
21070-125 = "Ficamos felizes só por você ter achado isso legal. Obrigado. Se você pudesse levar, nós realmente gostaríamos de te dar, mas……."
21070-126 = "……?"
21070-127 = "……!"
21070-128 = "……Tu, podes jurar que não há uma sombra de dúvida em tuas palavras?"
21070-129 = "Hm? Essa menina, o jeito dela de falar de novo……"
21070-130 = "Ta-talvez, mas acho que ela está perguntando se é verdade."
21070-131 = "Claro que não estou mentindo, mas…… isso significa que você pretende levantar aquilo?"
21070-132 = "(Acena com a cabeça)"
21070-134 = "(Desliza……)"
21070-135 = "Aquele que sacar esta arma……"
21070-136 = "……será o governante destas terras!"
21070-137 = "Fufufu, entendo. O entusiasmo é maravilhoso!"
21070-139 = "(Força)"
21070-140 = "Hmph……!"
21070-141 = "É melhor não se forçar…… não vai levantar a menos que use um guindaste――"
21070-143 = "Nnnnnnn……!"
21070-144 = "……Não pode ser."
21070-145 = "Eeeeh!?"
21070-146 = "(Gugugugugu――!)"
21070-147 = "……Le-levantou!"
21070-148 = "Mentira…… inacreditável……."
21070-149 = "Bem, o botão é…… este seria o botão B……?"
21070-150 = "Es-espere……!"
21070-152 = "……, Luz!!!"
21070-155 = "(BOOOOM!)"
21070-156 = "Aaaaaah! O, o teto da nossa sala do clube!?"
21070-157 = "……Incrível."
21070-158 = "Alice, vou equipar esta arma."
21070-159 = "Se-sério que você consegue usar…… ma-mas só isso, tipo……! Por questões de orçamento e outras coisas, se possível, eu gostaria que escolhesse outra……!"
21070-160 = "……Não,"
21070-161 = "Tudo bem, pode levar."
21070-162 = "Utaha-senpai…… tem certeza mesmo?"
21070-163 = "Sim. De qualquer forma, acho que ninguém além dela conseguiria usar."
21070-164 = "Hibiki, depois faça uma alça de ombro e uma empunhadura para que a Alice possa carregar com facilidade."
21070-165 = "Entendido."
21070-166 = "……Pensando pelo lado positivo, talvez seja bom poder coletar dados de combate reais."
21070-167 = "Uau, ganhamos uma arma incrível! Obrigado!"
21070-168 = "O-obrigada!"
21070-169 = "Não, ainda é cedo para agradecimentos."
21070-170 = "Eh?"
21070-172 = "Bem…… Hibiki, traga todos os drones e robôs que recebemos ordens de descartar anteriormente."
21070-173 = "……Sim."
21070-175 = "Bem…… Utaha-senpai? O desenrolar da situação parece estranho……."
21070-176 = "Isso não seria, por acaso, aquele padrão de \"Não vou deixar vocês levarem a arma tão facilmente!\"?"
21070-177 = "Exatamente."
21070-178 = "Se vocês realmente querem levar essa arma……"
21070-181 = "Terão que nos derrotar primeiro!"
21070-182 = "!?"
21070-183 = "Eeeeh! Não pode ser, Utaha-senpai, por que isso!?"
21070-184 = "P-por causa de uma única arma, chegar a esse ponto...?"
21070-186 = "Se fosse qualquer outra arma, eu teria entregado com prazer, mas..."
21070-187 = "Sobre essa arma, achei que seria necessária uma verificação."
21070-188 = "V-verificação?"
21070-189 = "Não... talvez seja mais apropriado chamar de 'qualificação'."
21070-190 = "Qualificação? Isso significa que..."
21070-193 = "Drones de combate e robôs detectados à frente, reação hostil confirmada."
21070-194 = "Eles estão vindo!"
21070-195 = "Ah, droga!"
