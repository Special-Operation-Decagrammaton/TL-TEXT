[translation]
2005103-1 = "Você é confiável, Reisa."
2005103-2 = "Sensei! Aqui!"
2005103-3 = "[s] \"Olá, Reisa!\""
2005103-4 = "Hehe, hoje é um dia perfeito para patrulhar!"
2005103-5 = "Aliás, Sensei, essa mochila grande é..."
2005103-6 = "[s1] \"É para coletar evidências!\"\n[s2] \"Vou patrulhar até que ela fique cheia!\""
2005103-9 = "Como esperado... o Sensei é o melhor!!"
2005103-10 = "Vamos começar a patrulha imediatamente!!"
2005103-13 = "Aquele é um chaveiro de acrílico de \"Maho-Liba\"!"
2005103-14 = "É a versão de roupas casuais que apareceu no episódio 11 da 3ª temporada!"
2005103-15 = "Sensei!"
2005103-16 = "[s] \"Sim! Precisamos garantir todos os modelos!\""
2005103-17 = "Entendido!"
2005103-19 = "Ah, agora tem uma pasta transparente!"
2005103-20 = "[s] \"É necessária para os estudos! Compre!\""
2005103-21 = "Uhehe~!"
2005103-22 = "Com licença..."
2005103-28 = "Poderia tirar uma foto comigo...?"
2005103-29 = "Hã!?"
2005103-30 = "Esse traje combina muito com você, se não se importar..."
2005103-31 = "Ah, u, uh... uaa..."
2005103-35 = "!?"
2005103-36 = "[s] \"Po, por favor, espere um momento...\""
2005103-38 = "Uh..."
2005103-39 = "[s] \"Reisa, você está bem?\""
2005103-40 = "Hehe... eu estou bem, Sensei."
2005103-41 = "Não me importo de tirar fotos com alguém, mas..."
2005103-42 = "Eu fico preocupada com a minha expressão e meus gestos..."
2005103-43 = "Por isso, até nas aulas de educação física eu fico com medo. #nFico ansiosa se meus movimentos estão estranhos..."
2005103-44 = "Uh... mas eu deveria ter explicado direito para aquela pessoa agora pouco..."
2005103-45 = "[s3] \"Reisa, você é uma garota mágica agora.\"\n[s4] \"Então, todas as poses que você fizer serão poses de garota mágica!\""
2005103-48 = "...!"
2005103-49 = "É verdade. #nGarotas mágicas e o Esquadrão de Vigilância da Justiça devem sempre agir com confiança!"
2005103-50 = "O Sensei é incrível mesmo!"
2005103-51 = "[s] \"Então, vamos retomar a patrulha!\""
2005103-52 = "Sim!"
2005103-62 = "Sensei, olhe."
2005103-63 = "O pôr do sol está muito bonito."
2005103-64 = "[s] \"Ah, é verdade.\""
2005103-65 = "Na verdade, hoje... eu só usei a patrulha como desculpa para me divertir..."
2005103-66 = "Fiquei muito feliz que o Sensei veio comigo."
2005103-67 = "Obrigada por sempre me acompanhar!"
2005103-68 = "[s5] \"A elite do Esquadrão de Vigilância protegeu a paz hoje também!\"\n[s6] \"Você fez todo mundo sorrir, não fez?\""
2005103-71 = "Hehe! Se for assim... #nO Sensei também é o superastro do Schale que faz todo mundo sorrir!"
2005103-72 = "[s] \"Certo! Vamos voltar ao Schale e analisar as evidências!\""
2005103-73 = "Sim!!"
2005103-75 = "(Depois disso, voltei ao Schale com a Reisa...)"
2005103-76 = "(Enquanto olhávamos os itens um por um, aproveitamos o clima do evento.)"
