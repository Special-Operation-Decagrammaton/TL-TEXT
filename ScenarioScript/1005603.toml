[translation]
1005603-1 = "マフラーのお礼"
1005603-6 = "（雪が降る日だった）"
1005603-10 = "シャーレ・執務室"
1005603-14 = "（仕事を終えてゴロゴロしようとしていたら、何だかいつもの気配がして……）"
1005603-18 = "[ns] \"……。\""
1005603-19 = "（がさごそ）"
1005603-24 = "[ns] \"……セリナ？\""
1005603-25 = "い、いえ違います！"
1005603-29 = "[ns1] \"そっか。セリナの声だけど。\"\n[ns2] \"ところでセリナの声の方は、そんなところで何を……？\""
1005603-40 = "うぅ……。"
1005603-41 = "バレてしまいましたか……。"
1005603-42 = "[s] \"それはまあ……。\""
1005603-43 = "うぅ、気合を入れてきたのですが……。"
1005603-44 = "気楽に来てほしい……？#nそ、それはちょっとまだ難しいと言いますか……。"
1005603-45 = "あの時いただいたマフラーのお礼も、#nちゃんとできてないですし……。"
1005603-46 = "[s] \"マフラーのことなら、全然気にしなくても……。\""
1005603-47 = "ダメです！せ、せっかく先生にいただいたんですから！"
1005603-48 = "先生が大丈夫と言ってくださっても、そうはいきません！"
1005603-49 = "ですので、きちんとお礼をさせてください！"
1005603-50 = "（セリナの勢いに押し切られてしまった)"
1005603-53 = "ふふっ♪"
1005603-54 = "というわけで、私が用意したプレゼントは！"
1005603-55 = "[s] \"プレゼントは～？\""
1005603-56 = "救護騎士団特注、トータル健康セットです！"
1005603-57 = "救急薬におしぼり、湿布から栄養剤まで！"
1005603-58 = "いつでも、どんな時でも、#nありとあらゆる事態に対処できるものです！"
1005603-59 = "[s] \"おお、本格的……。\""
1005603-60 = "先生にはこれくらい必要かと！"
1005603-61 = "先生は普段、ご自身のことを#n後回しにしてばっかりですし……。"
1005603-62 = "それでも、先生に健康でいて欲しくて……。"
1005603-63 = "[s] \"き、気をつけます……。\""
1005603-64 = "はい！よろしくお願いします！では続けて、こちらに横になってください。"
1005603-65 = "[s] \"……？\""
1005603-66 = "このトータル健康セットだけでは、完全ではありません。"
1005603-67 = "私のスペシャル指圧マッサージも合わせて受けてもらわないと。"
1005603-68 = "さあ、どうぞ横になってください。あ、上着も脱いでくださいね。"
1005603-69 = "遠慮なさらず、はい！"
1005603-70 = "処方と治療は、スピードが命なので！"
1005603-71 = "（セリナの圧に勝てず、言われるがままにソファにうつ伏せになった)"
1005603-73 = "それでは、指圧をはじめますね。"
1005603-81 = "この辺りとか、どうですか？あ、凝ってますねー。"
1005603-82 = "普段からストレッチとかしないとダメですよ？"
1005603-88 = "痛いのは指圧が効いている証拠です。#n強すぎないようにしますから、少しだけ我慢してください。"
1005603-89 = "いかがですか？……気持ち良いけど痛い？#n大丈夫です、そのうちただただ気持ち良くなるので！"
1005603-90 = "もうちょっとですからねー。#nここを、もう少し……！"
1005603-91 = "肩動かしちゃダメですよー。"
1005603-92 = "（その後、苦痛にもがきながら（？）セリナ特製指圧マッサージを受けた……)"
1005603-93 = "（施術中のセリナは、どこか楽しそうだった気がする）"
1005603-95 = "いかがですか、先生？#n少しはスッキリしましたか？"
1005603-96 = "[s] \"うん、身体が軽くなった気がする。\""
1005603-97 = "それは良かったです。#nこれからも疲れを感じたら、いつでも呼んでくださいね。"
1005603-98 = "遠慮しちゃだめですよ！"
1005603-99 = "[s] \"何だか相変わらず、セリナには色々と貰ってばっかりだね。\""
1005603-100 = "そんなことはありませんよ。#nそれに、先生には本当に元気でいてほしいので……。"
1005603-101 = "先生が健康でいてくれることが、私にとっても嬉しいことですから。"
