[translation]
101150-1 = "Episódio 15; A História que Afunda"
101150-2 = "Prontinho~#nInvasão no controle administrativo concluída. Primeiro, vou reconectar a rede de comunicação."
101150-3 = "Vou restaurar a rede de comunicação e o sistema administrativo de toda a D.U.~"
101150-4 = "M-Momoka-chan..."
101150-13 = "Beleza."
101150-17 = "……Ué?"
101150-21 = "Sensei, a comunicação foi restabelecida! "
101150-22 = "A-Awawa!? Que quantidade absurda de mensagens...!?"
101150-23 = "250 chamadas perdidas...!?"
101150-25 = "Sensei, onde você está agora...? Preciso discutir um assunto urgente com você. É sobre aquela profecia――"
101150-26 = "Sensei. Precisamos conversar sobre o item descoberto no distrito autônomo de Arius."
101150-27 = "Sensei, onde você tá agora? Fiquei te esperando no Comitê de Medidas de Emergência de hoje."
101150-28 = "……Sensei, você está bem?"
101150-29 = "Sensei! Acabei de saber sobre o Comitê de Medidas de Emergência. A Presidente desapareceu――#nVai levar um tempinho, mas estou indo pra aí, então me espere!"
101150-30 = "……O quê, lei marcial e bloqueio? Sensei, o que diabos está acontecendo!?"
101150-31 = "Sensei, estou com um pressentimento ruim... Mas você está a salvo, não é?"
101150-32 = "Ora, a energia caiu――? Sensei, aconteceu alguma coisa?"
101150-33 = "……Sensei, onde você está agora? "
101150-34 = "Será que, por minha causa... algo aconteceu com o Sensei..."
101150-35 = "Sensei... A Shiroko-senpai..."
101150-36 = "A Shiroko-chan desapareceu... Como isso foi acontecer..."
101150-37 = "Sensei, a Shiroko-chan... O que a gente faz..."
101150-38 = "A Shiroko-senpai sumiu!! Só deixou a bicicleta pra trás.#nQuando vir isso, entra em contato, por favor!"
101150-41 = "……O que é isso."
101150-44 = "M-Mas o que...!#nO que é isso, por toda Kivotos...?"
101150-46 = "……O que é aquilo? "
101150-47 = "Vamos recuar por enquanto. Verifiquem imediatamente o que está acontecendo."
101150-48 = "S-Sim, senhor!"
101150-49 = "……。"
101150-51 = "Guh…… Vocês…… "
101150-55 = "FOX 1, limpeza concluída por aqui. "
101150-56 = "FOX 2, Chefe de Defesa assegurada. Como estão as coisas, FOX 3?"
101150-57 = "Alvo assegurado por aqui também. Estamos saindo do prédio da Schale agora."
101150-58 = "Mas até que as nossas calouras mandam bem, hein~?#nLutarem quase de igual pra igual com as Forças Especiais da Kaiser."
101150-59 = "Acho que foi porque elas tiveram a ajuda da Schale."
101150-60 = "No fim das contas, o que é isso aqui?#nMandaram a gente pegar no subsolo da Schale, mas não disseram o que tem dentro."
101150-61 = "Acho que a Chefe de Defesa deve saber. Vou perguntar pra ela quando ela acordar."
101150-62 = "E o nosso plano~? O que a gente faz agora?"
101150-63 = "Vamos recuar primeiro. O ataque surpresa da Kaiser bagunçou os nossos planos."
101150-64 = "Entendido. Força aí~"
101150-68 = "……Acho que também devíamos recuar por enquanto."
101150-73 = "Sensei…… isso é……"
101150-81 = "Finalmente cheguei a uma compreensão――"
101150-84 = "Sensei, o seu poder não funciona mais."
101150-85 = "[s] \"Você é... o Golconda?\""
101150-86 = "Golconda não existe mais. Eu sou \"Francis\".#nAquele que, junto de Decalcomanie, agora o observa. Portanto, ouça com atenção a minha sentença final."
101150-87 = "Porque esta história se sustentava em um único gênero,#nvocê pôde ser o protagonista, \"Sensei\"."
101150-88 = "Por ser uma história, você era invencível.#n――Era esse o tipo de história."
101150-89 = "Porém, agora……"
101150-90 = "――Esta história foi subvertida."
101150-91 = "Contexto, estrutura, gênero, intenção, interpretação... Tudo foi destruído――"
101150-92 = "Seus significados se entrelaçaram, se misturaram e foram agitados――#nDesbotando até um ponto incontrolável."
101150-97 = "Sensei―― "
101150-98 = "É melhor esquecer toda a história que viveu até agora."
101150-99 = "Pois o que acontecerá com você de agora em diante,#njá não pode nem ser chamado de história――"
101150-100 = "Sem protagonistas, sem vilões, sem incidentes e sem conflitos――"
101150-101 = "Tudo será desconstruído e emaranhado――"
101150-102 = "Um mundo artificial... onde não há mais contexto, estrutura ou inevitabilidade."
101150-103 = "E assim――acabará perdendo o seu significado, tornando-se apenas um lugar de poderes descontrolados――#nUm mundo irracional e incompreensível."
101150-104 = "Ah, sim――afinal, este mundo sempre existiu dessa forma."
101150-105 = "Nós todos é que havíamos nos esquecido disso."
101150-107 = "Se isso――já não é mais uma história,#nentão você também não é mais ninguém."
101150-108 = "A história de juventude e academia chegou ao fim. "
101150-109 = "Em um gênero subvertido e desconstruído, o seu valor vacila, despenca e se torna igual a nada!"
101150-110 = "Portanto, vamos começar. Não uma história―― "
101150-111 = "[ns] \"Errado.\""
101150-113 = "[ns1] \"Mesmo que haja inimizades, traições, subversões... Mesmo que seja uma história afundando,\"\n[ns2] \"Mesmo que seja uma obra distorcida e indigna de ser chamada de história,\""
101150-116 = "[ns] \"Nada disso importa.\""
101150-118 = "[ns3] \"Pode desconstruir o gênero o quanto quiser.\"\n[ns4] \"Não ligo nem se aparecerem naves espaciais ou robôs gigantes.\""
101150-123 = "[ns] \"Porque não importa o futuro que nos aguarda, nós o superaremos.\""
101150-125 = "……。"
101150-126 = "Sendo assim, ficarei observando.#nSensei――não, Protagonista."
101150-127 = "Observe o desespero――a catástrofe se aproximando――e assim, o fim correndo em direção à sua conclusão!"
101150-132 = "S-Sensei…… O que foi isso agora……"
101150-133 = "[s] \"Arona, preciso que você entre em contato com todo mundo.\""
101150-134 = "Ah, sim! Mas \"todo mundo\", err, quer dizer... Com quem eu devo falar?"
101150-135 = "[s] \"Com 'todo mundo', por favor.\""
101150-155 = "……Entendo."
101150-156 = "Então o \"Chroma\" já havia entrado em contato com os \"Deuses Sem Nome\"... Isso foi uma falha terrível da minha parte."
101150-157 = "Ah, o outro lado do Deus Lobo――então era disso que se tratava. "
101150-158 = "O Deus da Morte que guia todos os seres vivos para a eternidade……"
101150-162 = "Esse era o outro lado do seu Mistério, o seu Terror."
101150-166 = "Sensei!!#nTerminei de enviar as mensagens para todas as alunas que você conhece!"
101150-167 = "Consegui enviar tudo, mas…… E agora……"
101150-168 = "[s5] \"Obrigado, Arona.\"\n[s6] \"Vai ficar tudo bem se superarmos isso juntos mais uma vez.\""
101150-172 = "――E com isso, todos os atores estão no palco."
101150-173 = "A partir de agora, nosso oponente será――#n――O Guia do \"Chroma\", atraído pelo Deus da Morte, \"Anubis\"."
101150-178 = "[ns] \"A partir de agora, é a vez da Schale.\""
101150-180 = "Final.;Continua no Capítulo 2"