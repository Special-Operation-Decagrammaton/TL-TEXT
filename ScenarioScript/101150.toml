[translation]
101150-1 = "Episódio 15; História de afundamento"
101150-2 = "Está feito~#nIntervenção com poder de controle administrativo concluída. Primeiro, vamos conectar a rede de comunicação."
101150-3 = "Restauraremos redes de comunicação e sistemas administrativos em todo o D.U."
101150-4 = "Além disso, Momoka-chan..."
101150-13 = "OK."
101150-17 = "...Huh?"
101150-21 = "Sensei, a comunicação foi restaurada!"
101150-22 = "Ah, uau! ? Uma enorme quantidade de mensagens...! ?"
101150-23 = "250 chamadas perdidas...! ?"
101150-25 = "Sensei, para que lado você está indo agora...? Há algo que gostaria de discutir urgentemente. Quanto à profecia..."
101150-26 = "sensei. Temos uma história para contar sobre os itens descobertos na Região Autônoma de Arius."
101150-27 = "Sensei, onde você está agora? Eu estava esperando pelo comitê de resposta a emergências de hoje."
101150-28 = "...Sensei, você está bem?"
101150-29 = "sensei! Acabei de saber sobre o comitê de resposta a emergências. O presidente se foi...#nVou precisar de um tempo, mas já vou a caminho, então, por favor, espere!"
101150-30 = "...O que, bloqueio da lei marcial? Sensei, o que diabos está acontecendo? ?"
101150-31 = "Sensei, estou com um mau pressentimento... Você está bem, certo?"
101150-32 = "Ah, faltou energia...? Sensei, o que há de errado?"
101150-33 = "...Sensei, onde você está agora?"
101150-34 = "Talvez seja por minha causa... a professora..."
101150-35 = "Sensei... Shiroko-senpai..."
101150-36 = "Shiroko-chan desapareceu... por que isso..."
101150-37 = "Professora, Shiroko-chan... o que deveríamos fazer..."
101150-38 = "Shiroko-senpai desapareceu! ! Apenas deixe a bicicleta para trás. #nSe você vir isso, entre em contato comigo imediatamente!"
101150-41 = "……isso é."
101150-44 = "O que...! #nO que é isso em Kivotos...?"
101150-46 = "...O que é aquilo?"
101150-47 = "Vou recuar por enquanto. Por favor, verifique o que está acontecendo imediatamente."
101150-48 = "Ah, sim!"
101150-49 = "……."
101150-51 = "Gah... vocês..."
101150-55 = "FOX1, processamento concluído."
101150-56 = "A FOX2 também protege o chefe do escritório de defesa. E quanto à FOX3?"
101150-57 = "Este objetivo também foi garantido. Estou saindo do prédio da placa de Petri."
101150-58 = "Porém, os juniores estão indo muito bem, não estão? #nEstá quase no mesmo nível do SOF de Kaiser."
101150-59 = "Acho que foi por causa da ajuda da placa de Petri."
101150-60 = "Afinal, o que é isso? #nDisseram-me para trazê-lo do porão da placa de Petri, mas não perguntei o que havia dentro."
101150-61 = "Acho que o chefe da defesa sabe. Vou te perguntar quando você acordar."
101150-62 = "Então, qual é o nosso plano? Eu me pergunto o que acontecerá a seguir."
101150-63 = "Vamos recuar primeiro. O ataque surpresa do Kaiser alterou os nossos planos."
101150-64 = "entendido. Boa sorte ~"
101150-68 = "...Devemos recuar por enquanto?"
101150-73 = "Sensei... isso é..."
101150-81 = "Finalmente cheguei a um entendimento..."
101150-84 = "Sensei, seu poder não funcionará mais."
101150-85 = "[s] \"Você é... Golconda?\""
101150-86 = "Golconda não existe mais. Eu sou \"Francisco\". #nUma nova pessoa para zelar por você junto com a Decalcomania. Portanto, ouçam a proclamação final."

101150-87 = "Como esta história tinha um gênero em mente, o #n ``sensei'' pôde ser o personagem principal."
101150-88 = "Você era invencível porque era uma história. #n――Esta foi uma história."
101150-89 = "Mas agora..."
101150-90 = "--Esta história foi revirada."
101150-91 = "Contexto, estrutura, gênero, intenção, interpretação... tudo é destruído..."
101150-92 = "Os significados estavam entrelaçados, misturados, agitados e desbotados além do controle."
101150-97 = "Sensei--"
101150-98 = "É melhor esquecer todas as histórias até agora."
101150-99 = "O que vai acontecer com você a partir de agora não será mais assim..."
101150-100 = "Não há protagonistas, vilões, incidentes ou conflitos..."
101150-101 = "Tudo está desmontado e entrelaçado..."
101150-102 = "Não há contexto, estrutura ou necessidade... é um mundo criado artificialmente."
101150-103 = "E então - no final, perde o significado, e o poder simplesmente enlouquece - para um mundo incompreensível e absurdo."
101150-104 = "Ah, isso mesmo – este mundo existiu assim desde o começo."
101150-105 = "Todos nós simplesmente esquecemos disso."
101150-107 = "Se isso não é mais uma história, então você não é mais ninguém."
101150-108 = "A história da escola e da juventude chegou ao fim."
101150-109 = "Em um gênero que foi derrubado e desmontado, seu valor será abalado, caído por terra e se tornará nada!"
101150-110 = "Mas vamos começar. Não é uma história..."
101150-111 = "[ns] \"Não.\""
101150-113 = "[ns1] \"Mesmo que seja uma história de inimigos, traições e sombras...\"\n[ns2] \"Mesmo que seja uma ficção que não merece ser chamada de história.\""
101150-116 = "[ns] \"Não importa.\"\"\n101150-118 = \"[ns3] \"Você pode desconstruir gêneros como quiser.\"\n[ns4] \"Não me importo se existem navios de guerra espaciais ou robôs gigantes.\""

101150-123 = "[ns] \"Não importa o que o futuro nos reserva, nós o superaremos.\"\"\n101150-125 = \"…….\"\n101150-126 = \"Se sim, vamos ficar de olho nisso. #nSensei ―― Não, ei.\"\n101150-127 = \"Desespero - uma catástrofe - e depois um final onde você corre em direção ao fim!\"\n101150-132 = \"Bem, sensei... o que está acontecendo agora...\"\n101150-133 = \"[s] \"Alona, ​​​​quero que todos entrem em contato.\""

101150-134 = "Ah, sim! Por \"todos\", quero dizer... quem devo contatar?"

101150-135 = "[s] \"Um pedido a todos. \""
101150-155 = "……Eu vejo."
101150-156 = "A “cor” veio depois que eu já tive contato com o “deus sem nome”... isso é completamente minha culpa."
101150-157 = "Ah, o outro lado do deus lobo era - era isso."
101150-158 = "Conduzindo todos os seres vivos à vida eterna..."
101150-162 = "Esse foi o outro lado do seu mistério."
101150-166 = "sensei! ! #n Entramos em contato com todos os alunos que conhecem o sensei!"
101150-167 = "De alguma forma, consegui entrar em contato com você, mas depois disso..."
101150-168 = "[s5] \"Obrigado, Alona.\"\n[s6] \"Enquanto passarmos esse tempo juntos, ficaremos bem.\""
101150-172 = "--Os atores agora estão reunidos."
101150-173 = "O oposto disso é a “cor” desenhada pelo deus da morte “Anúbis”."
101150-178 = "[ns] \"Agora é a vez da placa de Petri.\""
101150-180 = "Final.;Continua no Capítulo 2"
