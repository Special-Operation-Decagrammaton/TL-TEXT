[translation]
101150-1 = "第15話;沈みゆく物語"
101150-2 = "できたよ～#n行政制御権に介入完了。まずは通信網を繋げるね。"
101150-3 = "D.U.全域の通信網と行政システムを、復旧させちゃうよ～"
101150-4 = "も、モモカちゃん……。"
101150-13 = "よーし。"
101150-17 = "……あれ？"
101150-21 = "先生、通信が復旧しました！ "
101150-22 = "あ、あわわ！？すごい量のメッセージが……！？"
101150-23 = "不在着信250件…！？"
101150-25 = "先生、今、どちらに……？至急相談したい話がある。例の予言のことだが――"
101150-26 = "先生。アリウス自治区で発見された品について、お話があります。"
101150-27 = "先生、今どこにいるの？今日の非常対策委員会、待ってたんだけど。"
101150-28 = "……先生、ご無事でしょうか。"
101150-29 = "先生！非常対策委員会のこと、今知りました。会長が居なくなっちゃって――#n少々お時間をいただきますが、今から向かうので待っててください！"
101150-30 = "……なっ、戒厳令に封鎖？先生、一体なにが起きてるんですか！？"
101150-31 = "先生、なんだか嫌な予感がするのですが……先生はご無事ですよね？"
101150-32 = "あら、電源が消えて――？先生、どうかされたのですか？"
101150-33 = "……先生、今どちらにいらっしゃいますか？ "
101150-34 = "もしかして、私のせいで……先生の身に……"
101150-35 = "先生……シロコ先輩が……"
101150-36 = "シロコちゃんが、消えちゃった……どうして、こんな……"
101150-37 = "先生、シロコちゃんが……私たち、一体どうしたら……"
101150-38 = "シロコ先輩が消えたの！！自転車だけ残して。#nこれを見たらすぐに連絡して、お願い！"
101150-41 = "……これは。"
101150-44 = "なっ、何……！#nなにこれ、キヴォトス全域に……？"
101150-46 = "……あれは？ "
101150-47 = "一旦退くぞ。何が起きているのか至急確認しろ。"
101150-48 = "は、はい！"
101150-49 = "……。"
101150-51 = "ぐっ……お前ら…… "
101150-55 = "FOX1、こちら処理完了。 "
101150-56 = "FOX2、防衛室長も確保。FOX3はどう？"
101150-57 = "こちらも目標を確保。今シャーレの建物から出るところよ。"
101150-58 = "にしても後輩たち、なかなかやるね～？#nカイザーのSOFとほぼ互角だなんて。"
101150-59 = "シャーレの手助けがあったからじゃないかな。"
101150-60 = "結局これって何なの？#nシャーレの地下から持ってきてって言われたけど、中身は聞いてないんだけど。"
101150-61 = "防衛室長が知ってると思う。目を覚ましたら聞いてみるよ。"
101150-62 = "じゃあ私たちの計画は～？これからどうなるんだろ。"
101150-63 = "まずは退却しよう。カイザーの奇襲で予定が狂ってしまったからね。"
101150-64 = "了解。がんばって～"
101150-68 = "……私たちも一旦退却しようか。"
101150-73 = "先生……これは……"
101150-81 = "ようやく理解に至った――"
101150-84 = "先生、あなたの力は、これ以上作用しない。"
101150-85 = "[s] \"あなたは……ゴルコンダ？\""
101150-86 = "ゴルコンダはもう居ない。私は「フランシス」だ。#nデカルコマニーと共に、新たにお前を見守る者。従って、最後の宣告を傾聴せよ。"
101150-87 = "この物語は、一つのジャンルを掲げていたが故に、#n「先生」が主人公でいる事ができた。"
101150-88 = "物語であったから、あなたは無敵だった。#n――これは[ruby= ・    ・    ・    ・ ]そういう[/ruby]物語だった。"
101150-89 = "しかし今となっては……"
101150-90 = "――この物語は、覆された。"
101150-91 = "脈絡、構成、ジャンル、意図、解釈……すべてが破壊され――"
101150-92 = "その意味は絡み合い、混ざり、攪拌され――#n統制できない程に褪せてしまった。"
101150-97 = "先生よ―― "
101150-98 = "これまでの物語は全て忘れるが良い。"
101150-99 = "これからお前の身に起こることは、#n最早そのような[ruby=モノ]物語[/ruby]ですらないのだから――"
101150-100 = "主人公も、悪役も、事件も、葛藤も無く――"
101150-101 = "全てが分解され、縺れあい――"
101150-102 = "脈絡も、構成も、必然性も無くなってしまった……作為的に作られた世界。"
101150-103 = "そうして――果ては意味を失い、力が暴れ回るだけの――#n理解不能で不条理な世界へと。"
101150-104 = "嗚呼、そうだ――元より、この世界はそのように存在していた。"
101150-105 = "我々は皆、それを忘れていただけ。"
101150-107 = "これが――もう物語でなくなったとするならば、#nお前はもう何者でもない。"
101150-108 = "学園と青春の物語は、幕を下ろした。 "
101150-109 = "覆され、解体されてしまったジャンルで、お前の価値は揺らぎ、地に落ち、無に等しいものとなる！"
101150-110 = "しかして、始めるのだ。物語ではない―― "
101150-111 = "[ns] \"違う。\""
101150-113 = "[ns1] \"敵対し、裏切り、覆ってしまった……沈みゆく物語だとしても、\"\n[ns2] \"物語と呼ぶのに相応しくない、[ruby=いびつ]歪[/ruby]な創作だとしても、\""
101150-116 = "[ns] \"そんなことは、どうでもいいんだ。\""
101150-118 = "[ns3] \"ジャンルの解体なんて好きにすればいい。\"\n[ns4] \"宇宙戦艦や巨大ロボットが登場したって構わないんだよ。\""
101150-123 = "[ns] \"どんな未来であろうと、私たちは乗り越えていくのだから。\""
101150-125 = "……。"
101150-126 = "であれば、それを見守るとしよう。#n先生――いや、[ruby= ・   ・   ・ ]主人公[/ruby]よ。"
101150-127 = "絶望を――破局を迎え――そうして、結末へと走り出すエンディングを！"
101150-132 = "せ、先生……今のは……"
101150-133 = "[s] \"アロナ、みんなに連絡を取ってほしいんだ。\""
101150-134 = "あっ、はい！「みんな」とは、えっと、つまり……誰に連絡を？"
101150-135 = "[s] \"「みんな」に、お願い。\""
101150-155 = "……なるほど。"
101150-156 = "「色彩」は、すでに「名もなき神」と接触した後でしたか……これは完全に私の不手際です。"
101150-157 = "嗚呼、狼の神の裏側は――そういうことだったのですね。 "
101150-158 = "命あるすべてを常世へと導く、[ruby=アヌビス]死の神[/ruby]……"
101150-162 = "それがあなたの神秘の裏側、[ruby=terror]恐怖[/ruby]であった、と。"
101150-166 = "先生！！#n先生と面識のある生徒さん全員への連絡が終わりました！"
101150-167 = "なんとか、連絡はできましたが……この後は……"
101150-168 = "[s5] \"ありがとうね、アロナ。\"\n[s6] \"今回も、また一緒に乗り越えていけば大丈夫。\""
101150-172 = "――これで、役者は揃いました。"
101150-173 = "これより相対するは――#n――死の神「アヌビス」が引き寄せた、「色彩」の[ruby=きょうどうしゃ]嚮導者[/ruby]。"
101150-178 = "[ns] \"ここからは、シャーレの番だよ。\""
101150-180 = "Final.;To be Continued in Chapter 2"
