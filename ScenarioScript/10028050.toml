[translation]
10028050-1 = "Episódio 5: O Expresso para o Inferno"
10028050-10 = "Bem... é que, sabe."
10028050-11 = "Eu não quero nem acreditar, mas..."
10028050-12 = "Será que, por acaso..."
10028050-13 = "Será que o Sensei e a integrante do Comitê de Justiça da Trinity..."
10028050-14 = "Estão realmente pensando em 'negociar com terroristas'? Não, né? Diga que não!"
10028050-15 = "Hahahaha!! Iori-chan!"
10028050-16 = "Você sabe o que tem dentro desta mala?"
10028050-17 = "Isso aqui é... o 'Tesouro Escolar da Trinity', sabia?"
10028050-18 = "E não só isso..."
10028050-32 = "É algo capaz de influenciar a política daquela escola."
10028050-33 = "Hm...? O tesouro escolar da Trinity...?"
10028050-34 = "Por que algo assim estaria aqui..."
10028050-35 = "Vamos, vamos! Não precisa complicar tanto as coisas."
10028050-36 = "Já que chegamos a este ponto, vamos ser honestos uns com os outros! #nUm final esperançoso pode estar mais perto do que você imagina, não acha?"
10028050-37 = "Primeiro, a Iori quer parar o trem e capturar a tripulação e a gangue. Esse era o seu objetivo inicial, certo?"
10028050-38 = "Quanto a mim, não precisa ser hoje, precisa? #nNa verdade, você até gosta de me perseguir, não gosta?"
10028050-39 = "E a garota da Trinity só quer esta mala! #nÉ só pegar e descer na próxima estação."
10028050-40 = "E eu..."
10028050-41 = "Bem, se todos me ignorarem, eu simplesmente desapareço."
10028050-42 = "Então, resumindo! Não precisamos ficar aqui discutindo! #nNão concorda?"
10028050-43 = "Apenas finjam que não viram a minha presença neste trem por pura coincidência... É só isso!"
10028050-44 = "Não é perfeito? Não é como se fosse a primeira vez, né?"
10028050-45 = "Vocês também já deveriam entender como o mundo funciona."
10028050-46 = "Que tal, Iori? Vamos encerrar por aqui hoje."
10028050-47 = "Pensando bem..."
10028050-48 = "Não é uma proposta tão ruim, é?"
10028050-49 = "Não me faça rir!! Você acha mesmo que eu vou recuar tendo uma criminosa procurada bem na minha frente!?"
10028050-50 = "Além disso, o assunto da Trinity não tem nada a ver com o meu trabalho!! #nEu vou fazer o que precisa ser feito agora!!"
10028050-54 = "…………."
10028050-55 = "……Hmph."
10028050-56 = "[s1] \"……?\"\n[s2] \"Ichika……?\""
10028050-60 = "Ora, ora...?"
10028050-61 = "Isso não é apenas uma decisão arbitrária sua, Iori-chan? #nSuas chances de vitória são bem baixas, não são?"
10028050-62 = "Afinal, a mala está nas minhas mãos."
10028050-63 = "Ou seja, a garota da Trinity e o Sensei não têm escolha a não ser fazer o que eu digo. #nNão é, mocinha?"
10028050-64 = "…………."
10028050-65 = "Já chega, não me faça repetir a mesma coisa! #nEu disse que uma coisa é uma coisa, outra coisa é outra coisa!!"
10028050-66 = "Eu não estou te prendendo. #nEu só quero investigar a situação, por que está tão insatisfeita com isso!?"
10028050-67 = "…………."
10028050-68 = "Bem, observe. Veja que escolha aquela garota vai fazer... #nEla provavelmente vai atirar na Iori-chan para recuperar esta mala."
10028050-69 = "Não é? Do Comitê de Justiça... hum, como é mesmo?"
10028050-70 = "……Nika-chan?"
10028050-71 = "Não é verdade? Se o conteúdo disso quebrar, vai ser um problema, não vai?"
10028050-72 = "…………."
10028050-73 = "Ah, chega!! Você não para de falar dessa mala, mala, mala...!!!"
10028050-74 = "…………."
10028050-75 = "Tanta enrolação por causa de uma simples mala――"
10028050-86 = "……Oh?"
10028050-87 = "Haha...!"
10028050-88 = "Aha! Ahahahaha!!"
10028050-89 = "Hahahaha!!!"
10028050-90 = "Viu só? Eu não disse!?"
10028050-91 = "Iori-chan..."
10028050-92 = "Por que você insistiu em uma luta que não tinha como vencer?"
10028050-93 = "A minha vitória já estava na cara, francamente."
10028050-94 = "Enquanto eu estiver com a bolsa, você nunca vai—"
10028050-100 = "...Guh!?"
10028050-112 = "[ns] \"...Eh.\""
10028050-114 = "[ns] \"...!?!?!?\""
10028050-118 = "............Ah."
10028050-119 = "...Eu atirei."
10028050-120 = "...Haha."
10028050-121 = "...Eu perdi a cabeça e acabei fazendo. Desculpa!"
10028050-122 = "Hmm~"
10028050-126 = "...Ahaha!"
10028050-127 = "[ns3] \"I-Ichika!?!?!?\"\n[ns4] \"A-a bolsa...!!\""
10028050-130 = "Haha, é verdade... ela caiu!"
10028050-131 = "Mas bem..."
10028050-132 = "Já que aconteceu, não tem jeito. Vamos verificar o conteúdo depois."
10028050-133 = "Mas... acho que acabou, né."
10028050-134 = "Bem, já que chegamos a esse ponto..."
10028050-135 = "Não seria justo eu ir sozinha."
10028050-145 = "...Vamos todos para o inferno juntos."
10028050-154 = "Aha... ahaha...! AHAHAHAHAHAHAHA!!!!"
10028050-155 = "Q-que tipo de maluca é essa...! #n... A-aaaaahhh!!"
10028050-156 = "A-alguém pare ela!!"
10028050-157 = "Gyaaaa!!! Ela enlouqueceu!!!!!"
