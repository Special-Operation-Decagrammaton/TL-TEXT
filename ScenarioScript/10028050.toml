[translation]
10028050-1 = "第5話;地獄行き特急列車"
10028050-10 = "えっと……その、さ。"
10028050-11 = "まさかとは、思うけど……"
10028050-12 = "その、まさか……"
10028050-13 = "まさか先生とトリニティの正義実現委員が……"
10028050-14 = "「テロリストの交渉に応じる」なんてこと……ないよな？そうだよな？"
10028050-15 = "ハーハッハッハ！！イ～オ～リ～ちゃん！"
10028050-16 = "君はこのカバンの中身が何か知ってるかい？"
10028050-17 = "これは……「トリニティ学園の[ruby=こうほう]校宝[/ruby]」だぞ？"
10028050-18 = "それも……"
10028050-32 = "あの学園の政治に、影響を与えるほどの。"
10028050-33 = "ん……？トリニティの、校宝……？"
10028050-34 = "何でそんな代物がここに……"
10028050-35 = "さあさっ！だから、これ以上複雑に考えることないって。"
10028050-36 = "こうなったからには、みんな正直になろうじゃあないか！#n希望に満ちた結末は意外と近くにあるかもしれないぞ？"
10028050-37 = "まずイオリは、列車を止めて車内の乗務員やギャング団を捕まえたいはずだ。それが最初の目標だっただろう。"
10028050-38 = "私なんて、今日じゃなくてもいいだろう？#nいや、むしろ普段は私を追うのが楽しみなはずだ！"
10028050-39 = "で、トリニティのお嬢ちゃんはこのカバンだよな！#nこれを持って次の停車駅で降りればいいだけ。"
10028050-40 = "私は～……"
10028050-41 = "まあ、みんなが無視してくれれば勝手に消えるさ。"
10028050-42 = "だから要は！我々がここでゴタゴタする必要はないってことだ！#nそうだろう？"
10028050-43 = "偶然同じ列車に乗り合わせた私の存在に目をつむる……それだけのこと！"
10028050-44 = "完璧じゃないか？別に初めてでもないだろ？"
10028050-45 = "みんなも、ある程度世の仕組みも分かってるはずだろうに。"
10028050-46 = "どうだい、イオリ！今日はこの辺で解散といこうじゃないか。"
10028050-47 = "考えてみれば……"
10028050-48 = "そう悪い話じゃないと思うぞ？"
10028050-49 = "ふざけるな！！指名手配犯を目の前にして引き下がれると思うか！？"
10028050-50 = "それに、トリニティの件は私の仕事とは関係ない！！#n私は今、私のやるべきことをやる！！"
10028050-54 = "…………。"
10028050-55 = "……ふっ。"
10028050-56 = "[s1] \"……？\"\n[s2] \"イチカ……？\""
10028050-60 = "へぇ……？"
10028050-61 = "それこそ、イオリちゃんの独断じゃないのかい？#n勝ち目は薄いだろう？"
10028050-62 = "なんたって、カバンは私の手にある。"
10028050-63 = "つまりトリニティの子と先生は、私の言いなりになるしかない。#nなあ、そこのお嬢ちゃん？"
10028050-64 = "…………。"
10028050-65 = "だから、同じことを何回も言わせるな！#nそれはそれ、これはこれと言ってるだろ！！"
10028050-66 = "なにも監禁するわけじゃない。#n事情を調べたいだけだというのに、何がそんなに不満なんだよ！"
10028050-67 = "…………。"
10028050-68 = "まあ、見てみなって。あのお嬢ちゃんがどんな選択をするか……#nこのカバンを取り戻すためにイオリちゃんを撃つはずさ。"
10028050-69 = "なあ？正義実現委員の……ええと。"
10028050-70 = "……ニカちゃん？"
10028050-71 = "そうだろ？この中身、割れたらまずいんだろう？"
10028050-72 = "…………。"
10028050-73 = "あーーっもう！！さっきからカバン、カバン、カバンってもう……！！！"
10028050-74 = "…………。"
10028050-75 = "たかがカバン1つでぐだぐだと――"
10028050-86 = "……おっ？"
10028050-87 = "ハハッ……！"
10028050-88 = "あは！あはははっ！！"
10028050-89 = "ハーハッハッハッハ！！！"
10028050-90 = "ほら、だから言っただろう！？"
10028050-91 = "イオリちゃんよぉ～……"
10028050-92 = "何でわざわざ勝ち目のない勝負に出るのさ？"
10028050-93 = "こちらの勝ちは目に見えていたじゃないか～まったく。"
10028050-94 = "お嬢ちゃんは、こちらにカバンがある以上絶対――"
10028050-100 = "……ごふっ！？"
10028050-112 = "[ns] \"……えっ。\""
10028050-114 = "[ns] \"……！？！？！？\""
10028050-118 = "…………あ。"
10028050-119 = "……撃っちゃったっす。"
10028050-120 = "……ははっ。"
10028050-121 = "……カッとなって、つい。ごめんっす！"
10028050-122 = "ん～"
10028050-126 = "……あははっ！"
10028050-127 = "[ns3] \"イ、イチカ！？！？！？\"\n[ns4] \"カ、カバンが……！！\""
10028050-130 = "ははっ、そうっすね……落ちちゃったっす！"
10028050-131 = "でもまあ……"
10028050-132 = "やっちゃったもんは仕方ないっす。中身は後で確認しましょうか。"
10028050-133 = "けど……終わりっすね、たぶん。"
10028050-134 = "ま、こうなったからには……"
10028050-135 = "私だけってのもアレなんで。"
10028050-145 = "……全員で地獄に行くっすよ。"
10028050-154 = "あはっ……あはは……！アハハハハハハハッ！！！！"
10028050-155 = "な、何だアイツ……！#n……う、うわぁあああ！！"
10028050-156 = "だ、誰か止めろ！！"
10028050-157 = "ぎゃぁぁあっ！！！イカレてる！！！！！"
