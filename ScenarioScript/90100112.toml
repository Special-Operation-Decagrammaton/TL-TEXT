[translation]
90100112-3 = "Escritório Presidencial do Conselho Estudantil Geral"
90100112-5 = "Vossa Excelência. Escoltamos a Detenta Número 1192."
90100112-6 = "Cruze a barricada, por favor."
90100112-13 = "A marcha do tempo foi longa, Chefe de Defesa."
90100112-14 = "Correção dos laudos... Shiranui Kaya."
90100112-15 = "O seu rosto... Quem é você...?"
90100112-16 = "As matrizes analíticas de espionagem já preencheram meu HD com todo o holocausto que cruzou a cidade enquanto eu sangrava no vácuo."
90100112-17 = "O dossiê clama que você capitalizou na vala e na queda da Vice-Presidente Nanagami Rin e atirou um Golpe de Estado contra as engrenagens, confere?"
90100112-18 = "O núcleo patológico do apocalipse civil de Kivotos tem a minha cadeira como epicentro orgânico. Eu assumo a culpa.#nContudo, a sua rebelião armada por muito pouco não implodiu e obliterou a fundação do Conselho Estudantil inteiro."
90100112-19 = "É por este atrito balístico que, antes do Tribunal atirar o veredito e a guilhotina na sua cabeça, exijo o seu interrogatório verbal aqui na mesa."
90100112-20 = "Qual a justificativa paramilitar da sua patente focar o alvo e tentar usurpar a Coroa da Presidente Geral?"
90100112-24 = "………"
90100112-25 = "Cortando a sua pauta suja... O seu RG... Quem diabos é você?"
90100112-26 = "……Perdão?"
90100112-27 = "A minha anatomia e rosto... fugiram aos seus radares cognitivos na prisão?"
90100112-28 = "Radar de que inferno?! Nossas retinas e biologia nunca colidiram antes! Você é uma alienígena total aqui!"
90100112-29 = "Mais vital que esse show de horrores... Por que caralhos o seu corpo veste os mantos e os emblemas intocáveis da Presidente Geral?!#nAs fofocas blindam outra rebelião na torre... Você orquestrou um Golpe de Estado pra roubar a cadeira também?!"
90100112-33 = "As cartilhas diplomáticas exigem reinício. Permita-me injetar minha credencial do zero."
90100112-34 = "Eu represento o pilar máximo do Conselho Estudantil Geral que dita as rédeas bélicas e cíveis da Metrópole Acadêmica de Kivotos――"
90100112-35 = "QUE BLASFÊMIA MENTIROSA AS SUAS CORDAS VOCAIS ESTÃO VOMITANDO?!"
90100112-36 = "A MINHA [ruby=P r e s i d e n t e]Ü B E R M E N S C H[/ruby] NUNCA, JAMAIS FOI UMA FARSA DEFORMADA E PATÉTICA COMO VOCÊ!!"
90100112-40 = "A sua estética fúnebre pode até carregar [ruby=・]u[/ruby][ruby=・]m[/ruby][ruby=・]a[/ruby] [ruby=・]r[/ruby][ruby=・]é[/ruby][ruby=・]p[/ruby][ruby=・]l[/ruby][ruby=・]i[/ruby][ruby=・]c[/ruby][ruby=・]a[/ruby] [ruby=・]b[/ruby][ruby=・]a[/ruby][ruby=・]r[/ruby][ruby=・]a[/ruby][ruby=・]t[/ruby][ruby=・]a[/ruby] de imponência, mas botar a sua escória falsa na mesma balança e tentar emular a glória atômica d'Ela é asqueroso!"
90100112-41 = "A Autêntica e Genuína Presidente ditava uma aura infinitamente mais majestosa, divina, e mesmo assim acolhedora como o paraíso...#nEla podia ser uma pateta com a guarda aberta e cega de vez em quando, mas aquele eco cívico... aquele defeito a tornava Absoluta, Perfeita, um Monstro Intocável e Divino――"
90100112-42 = "Calada, delinquente golpista! Suas cordas ousam desferir blasfêmias puras assim na frente da face da Presidente Geral?!"
90100112-43 = "A sua patente militar também foi corrompida por essa impostora e prostituta do carma?!#nAs cartilhas, os laudos orgânicos, TUDO NELA GRITA MENTIRA!! A BIOLOGIA NÃO BATE!!"
90100112-44 = "Quando a matriz Suprema e Autêntica retornar ao trono pra valer... Essa farsa, o bastardo do Sensei da Schale, aquela cadela da Rin, TODOS VOCÊS VÃO PRO FUNDO DA VALA ENSANGUENTAD――"
90100112-51 = "GUEGH!!"
90100112-52 = "Minhas extremas escusas diplomáticas à mesa presidencial. O isolamento carcerário necrosou o cérebro da detenta num manicômio cego."
90100112-53 = "……Aborte as agressões nela. A fita do inquérito e sabatina de Shiranui Kaya ficará cimentada para a próxima rodada do relógio."
90100112-59 = "A COROA VAI SER MINHAAAA!! EU NÃO VOU ERRAR O TIRO E AFUNDAR NA PRÓXIMA VEEEEEZ――!!"
90100112-64 = "……As minhas matrizes estéticas e laudos orgânicos mudaram numa deformidade atômica tão absurda assim pros olhos vivos?"
90100112-66 = "Capítulo: O Rastreio das Lores Ocultas; Para ser continuado no Capítulo 2"