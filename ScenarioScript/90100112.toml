[translation]#[Texto Final. - Filipe 13/07.]
90100112-3 = "Gabinete da Presidente do Conselho Estudantil Geral"
90100112-5 = "Trouxe a prisioneira número 1192."
90100112-6 = "Pode entrar, por favor."
90100112-13 = "Há quanto tempo, Chefe de Defesa."
90100112-14 = "Não…… Shiranui Kaya."
90100112-15 = "Você é……"
90100112-16 = "Recebi todos os relatórios sobre o período da minha ausência."
90100112-17 = "Soube que aproveitou a queda da interina#nNanagami Rin para tentar um golpe de estado."
90100112-18 = "A causa original do caos em Kivotos fui eu, admito.#nAinda assim, seus atos quase destruíram o Conselho Estudantil Geral."
90100112-19 = "Por isso mesmo, antes do julgamento, quero ouvir o seu testemunho."
90100112-20 = "Por que você quis tomar o posto de Presidente do Conselho Estudantil Geral?"
90100112-24 = "………"
90100112-25 = "Pera…… quem é você?"
90100112-26 = "……Como disse?"
90100112-27 = "Você…… não sabe quem eu sou?"
90100112-28 = "Saber o quê? É a primeira vez que nos vemos."
90100112-29 = "Mais importante: por que está vestindo o uniforme da Presidente do Conselho?#nNão me diga que você também tentou um golpe――"
90100112-33 = "Então permita que eu me apresente novamente."
90100112-34 = "Sou a líder do Conselho Estudantil Geral, que administra a cidade acadêmica de Kivotos――"
90100112-35 = "Que absurdo é esse?!"
90100112-36 = "A MINHA super-humana não é nada disso!!"
90100112-40 = "Até você tem lá a sua classe, admito, mas não há nem comparação!"
90100112-41 = "A verdadeira Presidente do Conselho é mais elegante e, ainda assim, acolhedora……#nÀs vezes até parece avoada, mas isso só a deixa mais perfeita――"
90100112-42 = "Ei, você! Que jeito é esse de falar com a Presidente do Conselho?!"
90100112-43 = "Você também foi comprada por essa impostora?#nEstá tudo, TUDO diferente!!"
90100112-44 = "Quando a verdadeira voltar, você, o Sensei da Schale, a Rin…… ninguém vai escapar――"
90100112-51 = "Guéé!"
90100112-52 = "Perdão. A longa vida na prisão parece ter afetado a cabeça dela."
90100112-53 = "……Não. Vamos remarcar a conversa com a Kaya para outro dia."
90100112-59 = "Da próxima vez eu não vou falhaaaaar――!"
90100112-64 = "……Será que a minha imagem mudou tanto assim?"
90100112-66 = "Arco da A Caça às \"Lores\": Para ser continuado no Capítulo 2"