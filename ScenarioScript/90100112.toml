[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
90100112-3 = "Gabinete da Presidente do Conselho Estudantil"
90100112-5 = "Excelência, trouxemos a detenta número 1192."
90100112-6 = "Por favor, entre."
90100112-13 = "Quanto tempo, Chefe de Defesa."
90100112-14 = "Ou melhor... Shiranui Kaya."
90100112-15 = "Quem é você?"
90100112-16 = "Já fui informada de tudo o que aconteceu na minha ausência."
90100112-17 = "Dizem que você se aproveitou da queda da Vice-Presidente Nanagami Rin para tentar um golpe."
90100112-18 = "O caos em Kivotos começou por minha causa, mas sua rebelião quase destruiu o Conselho."
90100112-19 = "Por isso, antes do julgamento, quero ouvir sua versão."
90100112-20 = "Por que quis tomar o lugar da Presidente?"
90100112-24 = "………"
90100112-25 = "Antes de responder... quem é você?"
90100112-26 = "……Como?"
90100112-27 = "Não reconhece minha aparência?"
90100112-28 = "Nunca te vi na vida!"
90100112-29 = "Mais importante: por que está vestindo as roupas da Presidente?#nSerá que você também deu um golpe?"
90100112-33 = "Então me deixe me apresentar novamente."
90100112-34 = "Eu sou a líder do Conselho Estudantil de Kivotos――"
90100112-35 = "O que está dizendo?!"
90100112-36 = "A MINHA Presidente não é assim!"
90100112-40 = "Você até tem seus méritos, mas não chega aos pés dela."
90100112-41 = "A verdadeira Presidente era mais majestosa, mais divina, e ao mesmo tempo acolhedora...#nEla podia ser um pouco desligada às vezes, mas isso a tornava perfeita."
90100112-42 = "Cale a boca, golpista! Como ousa ofender a Presidente na frente dela?"
90100112-43 = "Você também foi corrompida por essa impostora?#nA aparência, a voz, tudo nela é falso!!"
90100112-44 = "Quando a verdadeira Presidente voltar... você, o Sensei da Schale, a Rin, todos vão pagar――"
90100112-51 = "GUEGH!!"
90100112-52 = "Desculpe, Excelência. A reclusão a deixou louca."
90100112-53 = "……Deixe-a. A audiência fica para outro dia."
90100112-59 = "A COROA SERÁ MINHA!! DA PRÓXIMA VEZ NÃO ERRAIREI――!!"
90100112-64 = "……Minha aparência mudou tanto assim?"
90100112-66 = "O Arco de Caça às Lores: Continua no Capítulo 2"