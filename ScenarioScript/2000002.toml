[translation]
2000002-1 = "Chame-me de Meister"
2000002-2 = "Schale - Escritório"
2000002-7 = "（O smartphone quebrou）"
2000002-8 = "[s1] Pedir para um profissional consertar.\n[s2] Desistir."
2000002-9 = "……Nenhuma das duas opções é boa, não é?"
2000002-10 = "……Nenhuma das duas opções é boa, não é?"
2000002-11 = "Bom dia, Sensei. #nEu estava por perto ajudando com um pedido do Conselho Estudantil Federal, então aproveitei para passar aqui."
2000002-12 = "Quer saber que tipo de pedido? Reparo e manutenção de máquinas."
2000002-13 = "Algumas das máquinas que o Conselho Estudantil Federal usa atualmente foram feitas pelo Millennium."
2000002-14 = "Claro, a maioria das outras máquinas do Conselho Estudantil Federal são coisas que nem nós sabemos exatamente o que são, mas..."
2000002-15 = "De qualquer forma, felizmente, o smartphone do Sensei parece ser um modelo comum."
2000002-16 = "Sendo assim, eu vou consertá-lo e, de quebra, fazer algumas melhorias."
2000002-18 = "Transformá-lo em algo mais do que apenas um smartphone."
2000002-20 = "O Clube de Engenharia, ao qual pertenço, é um lugar onde se reúnem estudantes do Millennium especializadas em hardware e na área de mecânica."
2000002-21 = "Nós nos referimos a nós mesmas como 'Meister' com muito orgulho."
2000002-22 = "Aliás, verifiquei a situação do seu smartphone, Sensei."
2000002-23 = "Parece que a placa principal estava sofrendo muita sobrecarga durante o processo de fornecimento de energia."
2000002-24 = "Trocar o capacitor seria o suficiente, mas..."
2000002-25 = "Acho que seria bom adicionar algumas melhorias além disso."
2000002-28 = "Para começar... que tal adicionarmos uma função de autodestruição?"
2000002-29 = "[s3] \"Que legal.\"\n[s4] \"……Por quê?\""
2000002-30 = "Não é? Então, vou preparar agora mesmo."
2000002-31 = "……Ah."
2000002-32 = "Falando nisso, as veteranas me proibiram de adicionar funções de autodestruição sem necessidade..."
2000002-33 = "Ah, nosso clube é tradicional, então ainda temos muitas pessoas conservadoras por lá."
2000002-34 = "Mas suponho que isso também seja um acúmulo do que foi confirmado através de longos períodos de tentativa, erro e verificação."
2000002-35 = "Desculpe, mas vamos deixar a função de autodestruição para uma próxima vez, depois que eu conseguir a permissão das veteranas."
2000002-36 = "Sensei, você pode estar pensando: #n'O que ela está pensando depois de ter acabado de consertar o celular?'"
2000002-37 = "Pense bem."
2000002-38 = "Diferente de outros aparelhos, o smartphone contém informações especiais."
2000002-39 = "Sim, informações pessoais."
2000002-40 = "Para protegê-las, instalar uma função de autodestruição para uma emergência é uma ideia extremamente racional."
2000002-41 = "Hm? Mas se ele se autodestruir, no fim das contas, não estaria protegido?"
2000002-42 = "Dependendo da situação, ele também poderia ser usado como uma granada de mão ou uma bomba relógio..."
2000002-43 = "É uma pena, mas não tem jeito."
2000002-45 = "Pronto, o conserto terminou."
2000002-46 = "……"
2000002-47 = "Bom... acho que não haverá problemas por um tempo."
2000002-48 = "Se o seu smartphone ou qualquer outro aparelho eletrônico quebrar novamente... chame por mim."
2000002-49 = "Eu sempre estarei disposta a ajudar."
