[translation]
10005030-1 = "Episódio 3: Interrogatório Impiedoso"
10005030-2 = "（Retornamos ao quarto de hóspedes que usamos como base e nos aproximamos da coelhinha, que ainda parece estar desmaiada）"
10005030-7 = "Hmm... hmmm...?"
10005030-9 = "¡Ai!? ¡Ai!?"
10005030-10 = "Minha boca está ardendo... espera, o quê...? O que é isso...?"
10005030-12 = "Ora, ora, você parece estar bem viva. Tem mais coragem do que aparenta, hein?"
10005030-13 = "De fato, parece que ela ainda tem energia suficiente para falar se a interrogarmos."
10005030-14 = "Não precisava começar a conversa falando em \"interrogatório\"..."
10005030-15 = "Não se preocupe tanto. Se responder às nossas perguntas, não faremos nada que doa."
10005030-17 = "É esse o tipo de coisa que se diz depois de desmaiar, amarrar e prender alguém!? Você já fez o suficiente, não acha!?"
10005030-18 = "E afinal, quem são vocês! Qual é o objetivo de vocês!"
10005030-19 = "Além disso, não pensem que vão sair impunes depois de fazerem isso! Vocês vão ver só, mais tarde..."
10005030-20 = "Ah é?"
10005030-21 = "Mais tarde... o quê? O que vai acontecer? Hein?"
10005030-22 = "Iiiih...!?"
10005030-23 = "S-se o objetivo é dinheiro, é inútil me ameaçar! Eu sou apenas uma simples segurança... não estou envolvida em nada disso!"
10005030-25 = "Entendo, bem, isso não é um grande problema."
10005030-26 = "Porque o nosso objetivo não é dinheiro."
10005030-27 = "Nós viemos aqui para procurar uma certa pessoa."
10005030-29 = "Procurar...? Quem exatamente...?"
10005030-30 = "Shiro..."
10005030-31 = "Não, quer dizer, Kurosaki Koyuki. Ela deve ter acabado de chegar neste navio, você não a conhece?"
10005030-32 = "Kurosaki Koyuki...?"
10005030-33 = "Nem pense em fingir que não sabe,"
10005030-34 = "é melhor para você."
10005030-35 = "Não, não, não!"
10005030-36 = "Eu realmente não a conheço! Não estou mentindo!"
10005030-37 = "Além disso, você tem ideia de quantos passageiros há neste navio!?"
10005030-38 = "São milhares, não tem como eu decorar o nome de cada um!"
10005030-39 = "Se você estiver mentindo, eu juro..."
10005030-40 = "Iiiih!"
10005030-41 = "É verdade, não, eu estou falando a verdade!"
10005030-42 = "[s1] \"Ela realmente parece não saber.\"\n[s2] \"Neru, acho que já chega, não acha?\""
10005030-43 = "Tsc...!"
10005030-44 = "Tsc...!"
10005030-45 = "Haa... você teve sorte."
10005030-46 = "Hoje já tive azar o suficiente... ugh..."
10005030-48 = "Entendo, então o que faremos... parece que ela não tem autoridade nenhuma."
10005030-49 = "Mesmo que capturemos outra pessoa, não parece que teremos a sorte de encontrar alguém que saiba o nome de todos os passageiros."
10005030-50 = "...Que problemático."
10005030-51 = "[s3] \"Em vez do nome, que tal a aparência?\"\n[s4] \"Ela é uma garota chamativa, talvez você a tenha visto.\""
10005030-52 = "De fato... faz sentido."
10005030-53 = "De fato... faz sentido."
10005030-54 = "Como esperado do Sensei, essa é uma grande possibilidade."
10005030-55 = "Não acho que ela consiga ficar quieta e comportada, ela deve ser alguém bem chamativa onde quer que esteja."
10005030-56 = "É isso. Espere um pouco."
10005030-57 = "Não tente nada engraçado. E vou repetir, se fingir que não sabe de novo..."
10005030-59 = "Iiiih...!?"
10005030-60 = "Em vez de ameaçar, vamos apenas mostrar a foto para ela."
10005030-64 = "É esta garota, o que me diz?"
10005030-65 = "Como ela gosta de ser barulhenta e chamativa, acho que você se lembraria dela se a visse uma vez."
10005030-66 = "É uma garota bem grosseira e leviana. Se você tem alguma lembrança de ter sido desrespeitado por alguém, pode ter sido ela."
10005030-70 = "……？"
10005030-71 = "Grosseira e leviana……."
10005030-75 = "……Ah."
10005030-76 = "……\"Ah\"?"
10005030-77 = "Hah……!"
10005030-78 = "Ei,"
10005030-79 = "Você acabou de dizer \"ah\", não foi?"
10005030-80 = "N-não, nada disso, foi impressão sua! Mesmo que eu soubesse de algo, não posso vazar informações de clientes!"
10005030-81 = "Haha, então você sabe mesmo, não é!!"
10005030-82 = "Pela reação, parece que sim."
10005030-83 = "Bem, agora só nos resta fazer com que você nos conte……."
10005030-88 = "……!"
10005030-89 = "P-pare com isso! Nada de violência! Não gosto de sentir dor!"
10005030-90 = "Muito bem, finalmente podemos começar."
10005030-91 = "Ah, não precisa confessar logo de cara. Isso não tem graça."
10005030-92 = "Tente aguentar firme, e culpe a si mesmo por isso. Quando estiver exausto, pode falar, ok?"
10005030-97 = "……Sensei."
10005030-98 = "[s5] \"Neru, tente não machucar ele.\"\n[s6] \"Por que não tenta convencer ele?\""
10005030-99 = "……Hã?"
10005030-100 = "……Hã?"
10005030-101 = "Não, espera, não foi você quem disse que deveríamos tirar informações dele, Sensei?"
10005030-102 = "Além disso, isso ainda é considerado pacífico."
10005030-103 = "E, na verdade, não existe outro jeito, né?"
10005030-104 = "Não temos tanto tempo assim, então vamos logo……"
10005030-105 = "……Espere."
10005030-106 = "Então, eu farei isso."
10005030-107 = "……Hein?"
10005030-108 = "……Eh?"
10005030-109 = "[s7] \"Karin?\"\n[s8] \"Você tem algum método melhor?\""
10005030-110 = "Sim, pensei nisso outro dia."
10005030-111 = "Sim, pensei nisso outro dia."
10005030-112 = "Deixe comigo, vou resolver isso com um sorriso."
10005030-113 = "Hã? Com um sorriso……?"
10005030-114 = "O que você quer dizer com isso?"
10005030-115 = "……Sensei, tudo bem?"
10005030-116 = "[s9] \"Se não for machucar, então vá em frente.\"\n[s10] \"Então vamos resolver com um sorriso.\""
10005030-117 = "Entendido."
10005030-118 = "Entendido."
10005030-123 = "O-o que é isso! O que você vai fazer!?"
10005030-125 = "N-não chegue perto!"
10005030-126 = "Não importa o que façam,"
10005030-127 = "eu não vou dizer uma palavra……!"
10005030-128 = "……."
10005030-129 = "……Nhiii!?"
10005030-132 = "O-o que você……! Nnh, ahya!?"
10005030-133 = "Ei, pare……! Ah, ei……!? N-não, não pode!"
10005030-134 = "Pare, eu imploro! Ahyahyahyahyahya!! Hii, iiii……!?"
10005030-135 = "Ah, não, não, não! Ah!? Nnn! Ei, hii, hiaa!?"
10005030-136 = "……Ainda não."
10005030-137 = "Fuhihihihihihihihi!? Ei, ali não...!? Ah, hau...!? Kaha, ahihahahahahahaha!!"
10005030-142 = "……Ora, ora."
10005030-143 = "Entendo, então existe esse método também."
10005030-144 = "Certamente, parece que dá para resolver com um sorriso, mas..."
10005030-145 = "O que você está fazendo..."
10005030-147 = "Ei, pare! Chega, não dá mais...! Ah, ahihahahahahahaha!!!"
10005030-148 = "……Se a voz ficar tão alta assim, vai ser um problema."
10005030-149 = "Não é bom que ouçam lá fora, então..."
10005030-153 = "Ha, ha, ha... Ei, o que é agora!? Ei, espere... Nnn! Nmumumu!?"
10005030-154 = "Certo, assim está bom."
10005030-155 = "……Ei."
10005030-156 = "Hum, Karin...?"
10005030-157 = "Nnn! Nnnn---!! Nn, mu, nnnn!!"
10005030-158 = "Nnu!?"
10005030-159 = "Nfufufufufufufu! Nnn, nnn---! Nn! Nnnnn!?"
10005030-160 = "Nmu, nnnnn---!? Nn, nnnn!!"
10005030-165 = "……Espere, espere, espere."
10005030-166 = "Não, não, por que você está tapando a boca dela durante um interrogatório? Qual é o objetivo disso?"
10005030-167 = "Isso já não seria outro tipo de violência...?"
10005030-168 = "E aliás..."
10005030-169 = "Tudo bem deixar ela assim? Ela não está quase desmaiando?"
10005030-171 = "É verdade, vamos parar por aqui."
10005030-172 = "Karin. Ei, Karin...?"
10005030-176 = "Karin... ela nem está ouvindo mais, está tão concentrada..."
10005030-177 = "Ah, no que ela está tão vidrada..."
10005030-181 = "Ei, Karin. Pare logo com isso, seus olhos estão ficando estranhos."
10005030-182 = "Nn, nnn...! Nnnnnnn---!? Nnn! Nmu! Nnnnn!?"
10005030-187 = "Nnnnn!? Nnn, nnnnn!? Nnnnn---!!!?"
10005030-188 = "Ei, Karin."
10005030-189 = "Karin!"
10005030-190 = "!?"
10005030-191 = "……Líder, me chamou?"
10005030-192 = "Claro que chamei, várias e várias vezes."
10005030-193 = "E o que você está fazendo, interrogando com a boca tapada? Assim não tem como extrair informação nenhuma."
10005030-194 = "Se ela desmaiar com isso—"
10005030-195 = "Ah, é verdade..."
10005030-199 = "Ora, será que ela já..."
10005030-200 = "[s] \"…….\""
10005030-204 = "Hum..."
10005030-205 = "Será que exagerei..."
