[translation]
10005030-1 = "第3話;無慈悲な尋問"
10005030-2 = "（拠点にしていた客室へと戻り、まだ気絶している様子のバニーガールへと近づく）"
10005030-7 = "んっ……んん……？"
10005030-9 = "っ！？痛っ！？"
10005030-10 = "口がひりひりする……って、え……？これは、どういう……？"
10005030-12 = "おお、割とピンピンしてるじゃねぇか。見た目より根性あんな？"
10005030-13 = "たしかに、尋問したら喋ってくださるくらいの余力はありそうですね。"
10005030-14 = "第一声で「尋問」とか言わなくても……。"
10005030-15 = "あんまり心配しないで。質問に答えてくれれば、何も痛いことはしない。"
10005030-17 = "気絶させて縛って監禁しておいて言う台詞かそれ！？もう十分してるじゃん！？"
10005030-18 = "っていうか何なんだあんたたちは！何が目的だ！"
10005030-19 = "そもそもこんなことをしておいて、ただで済むと思うなよ！あんたたちなんか、後でどうせ――"
10005030-20 = "あぁん？"
10005030-21 = "後でどうせ……何だ？どうなるってんだ？あん？"
10005030-22 = "ひっ……！？"
10005030-23 = "か、金が目的なら私を脅しても無駄だ！私はただの、一介の警備員で……そういうことには何も深く関与してない！"
10005030-25 = "そうでしたか、まあそれは大した問題ではありません。"
10005030-26 = "目的はお金ではありませんので。"
10005030-27 = "私たちは、とある人物を捜しに来たのです。"
10005030-29 = "捜しに……？一体誰を……？"
10005030-30 = "白……"
10005030-31 = "じゃなかった、[ruby=くろさき]黒崎[/ruby]コユキ。まだこの船に来たばかりのはずだ、知らないか？"
10005030-32 = "黒崎コユキ……？"
10005030-33 = "しらを切るなんてこと考えるんじゃねーぞ、"
10005030-34 = "その方が身のためだ。"
10005030-35 = "いやいやいや！"
10005030-36 = "本当に知らないんだって！嘘じゃない！"
10005030-37 = "そもそもこの船の乗客が、全体でどれだけいると思う！？"
10005030-38 = "数千を超えてるのに、そんな細かく名前なんて覚えてるわけないだろ！"
10005030-39 = "万が一嘘だったら、てめぇ……"
10005030-40 = "ひっ！"
10005030-41 = "本当だ、いや、本当なんです！"
10005030-42 = "[s1] \"本当に知らなさそうだね。\"\n[s2] \"ネル、その辺で良いんじゃない？\""
10005030-43 = "ちっ……！"
10005030-44 = "ちっ……！"
10005030-45 = "はぁ……てめぇ、運が良かったな。"
10005030-46 = "今日はもう十分運が悪いよ……うぅ……。"
10005030-48 = "なるほど、ではどうしましょう……この方には何の権限も無いみたいですし。"
10005030-49 = "別の方を捕まえても、乗客の名前をすべて把握している……なんて都合の良いことも無さそうです。"
10005030-50 = "……参ったな。"
10005030-51 = "[s3] \"名前じゃなくて、見た目は？\"\n[s4] \"目立つ子なんだし、見たことはあるかも。\""
10005030-52 = "たしかに……一理ある。"
10005030-53 = "たしかに……一理ある。"
10005030-54 = "さすが先生、その可能性は大きいな。"
10005030-55 = "静かにおとなしくしてるとは思えないし、どこにいても相当目立つ存在のはず。"
10005030-56 = "っつーわけだ。ちょっと待ってろ。"
10005030-57 = "余計な真似はすんなよ。それからもう一度言うが、知らねぇふりとかしやがったら……"
10005030-59 = "ひいっ……！？"
10005030-60 = "脅すより、とりあえずは見てもらいましょうか。"
10005030-64 = "この子です、いかがですか？"
10005030-65 = "うるさくて派手なことが好きなので、一度会ったら結構印象に残ると思いますが。"
10005030-66 = "結構失礼で、軽薄な子だ。何か無礼を働かれた記憶とかあったら、その子かもしれない。"
10005030-70 = "……？"
10005030-71 = "失礼で、軽薄な……。"
10005030-75 = "……あ。"
10005030-76 = "……「あ」？"
10005030-77 = "はっ……！"
10005030-78 = "おい、"
10005030-79 = "今「あ」って言ったよな？"
10005030-80 = "い、いや違う、気のせいだ！万が一知ってたとしても、顧客の情報を漏らすわけにはいかない！"
10005030-81 = "ははっ、やっぱり知ってんじゃねえか！！"
10005030-82 = "反応を見る限り、そのようですね。"
10005030-83 = "では、後は教えてもらうだけですが……。"
10005030-88 = "……っ！"
10005030-89 = "やっ、やめろ！暴力反対！痛いのは好きじゃない！"
10005030-90 = "さーて、ようやく始められんなー。"
10005030-91 = "あー、別にさっさとゲロる必要はねぇぞ。つまんねぇから。"
10005030-92 = "じっくり頑張れ、あとてめぇ自身を恨め。それでいて疲れたら吐け、OK？"
10005030-97 = "……先生。"
10005030-98 = "[s5] \"ネル、痛くない方法でね。\"\n[s6] \"頑張って説得してみたら？\""
10005030-99 = "……はぁ？"
10005030-100 = "……はぁ？"
10005030-101 = "いや、ってかこいつに話を聞こうって言ったのは先生じゃねぇか？"
10005030-102 = "それに、別にこれくらいならまだ平和的な方だ。"
10005030-103 = "そもそもそれ以外に、方法も何もねぇだろ？"
10005030-104 = "時間もそんなあるわけじゃねーし、さっさと……"
10005030-105 = "……待って。"
10005030-106 = "じゃあ、私がやる。"
10005030-107 = "……あん？"
10005030-108 = "……え？"
10005030-109 = "[s7] \"カリン？\"\n[s8] \"何か良い方法とかありそう？\""
10005030-110 = "うん、この間思いついたんだ。"
10005030-111 = "うん、この間思いついたんだ。"
10005030-112 = "任せて、笑顔で解決してみせるから。"
10005030-113 = "はぁ？笑顔で……？"
10005030-114 = "どういうことですか？"
10005030-115 = "……先生、良い？"
10005030-116 = "[s9] \"痛くないならぜひそれで。\"\n[s10] \"じゃあ笑顔で解決する方向で。\""
10005030-117 = "分かった。"
10005030-118 = "分かった。"
10005030-123 = "な、何だ！何をする気だ！？"
10005030-125 = "く、来るな！"
10005030-126 = "何をされたって、"
10005030-127 = "私はひと言も……！"
10005030-128 = "……。"
10005030-129 = "……んひっ！？"
10005030-132 = "な、何を……！んっ、あひゃっ！？"
10005030-133 = "ちょっ、やめっ……！あっ、ちょっ……！？だっ、ダメっ！"
10005030-134 = "やめっ、頼む！あひゃひゃひゃひゃひゃひゃ！！ひっ、いぃっ……！？"
10005030-135 = "あっ、ダメダメダメ！あっ！？んんっ！ちょっ、ひっ、ひぁっ！？"
10005030-136 = "……まだまだ。"
10005030-137 = "ふひひひひひひひひっ！？ちょっ、そこっ……！？あっ、はぅっ……！？かはっ、あひゃひゃひゃひゃひゃひゃ！！"
10005030-142 = "……あらあら。"
10005030-143 = "なるほど、そういうやり方もあるのですね。"
10005030-144 = "確かに、笑顔で解決できそうですが……。"
10005030-145 = "何してんだ……。"
10005030-147 = "やっ、やめっ！これ以上はもうっ……！あっ、あひゃひゃひゃひゃひゃひゃ！！！"
10005030-148 = "……ここまで声が大きくなると、マズいな。"
10005030-149 = "外に聞こえるのも良くないし、じゃあ……。"
10005030-153 = "はーっ、はーっ、はーっ……ちょっ、今度は何！？えっ、まっ……んんっ！んむむむっ！？"
10005030-154 = "うん、これで良いか。"
10005030-155 = "……おい。"
10005030-156 = "えっと、カリン……？"
10005030-157 = "んんっ！んんん－ーーっ！！んっ、むっ、んんん！！"
10005030-158 = "んぅっ！？"
10005030-159 = "んふふふふふふふふ！んんんっ、んんーーっ！んっ！んんんんっ！？"
10005030-160 = "んむっ、んんんんんーーっ！？んっ、んんんっ！！"
10005030-165 = "……待て待て待て。"
10005030-166 = "いやいや、何で尋問なのに口を塞いでんだよ。何が目的だよこれ。"
10005030-167 = "もうこれは別種の暴力なのでは……？"
10005030-168 = "っていうか……。"
10005030-169 = "放置してて大丈夫か？あいつもう気ぃ失いそうじゃねぇか？"
10005030-171 = "そうですね、そろそろ止めましょうか。"
10005030-172 = "カリン。あれ、カリン……？"
10005030-176 = "カリン……もう耳に入ってないですね、こんなに真剣に……。"
10005030-177 = "はぁ、何を夢中になってんだ……。"
10005030-181 = "おい、カリン。そろそろやめとけ、目が危なくなってんぞ。"
10005030-182 = "んっ、んんっ……！んんんんんんん－ーーっ！？んんっ！んむっ！んんんんっ！？"
10005030-187 = "んんんんんっ！？んんっ、んっんんんんっ！？んんんんーーーっ！！！？"
10005030-188 = "おい、カリン。"
10005030-189 = "カリン！"
10005030-190 = "っ！？"
10005030-191 = "……リーダー、呼んだ？"
10005030-192 = "呼んだっての、何度も何度も。"
10005030-193 = "ってか口塞いで尋問ってこれ、何やってんだよ、聞き出そうにも聞き出せねぇだろうが。"
10005030-194 = "これで気絶でもしたら――"
10005030-195 = "あ、確かに……。"
10005030-199 = "あら、これはもしかしてもう……。"
10005030-200 = "[s] \"……。\""
10005030-204 = "えっと……。"
10005030-205 = "やり過ぎたか……。"
