[translation]
2300403-1 = "Um bom artesão não culpa suas ferramentas?"
2300403-2 = "Distrito Central de Kivotos - Shopping Center"
2300403-3 = "Por recomendação da Utaha, vim ao shopping para comprar ferramentas."
2300403-4 = "É inacreditável que um prédio tão grande como o Schale não tenha nem uma ferramenta decente."
2300403-5 = "O Schale já é um alvo fácil para alunas problemáticas, então não seria bom se o Sensei conseguisse consertar pelo menos pequenas falhas nos equipamentos sozinho?"
2300403-6 = "Afinal, não dá para contar que sempre haverá um serviço de reparos ou alunas do Millennium por perto."
2300403-8 = "……Muito bem, então aqui é a seção de ferramentas."
2300403-9 = "Vamos lá, Sensei. Escolha uma ferramenta que lhe agrade. Eu lhe ensinarei os detalhes."
2300403-11 = "[ns] Pega uma multiferramenta de 1.000 ienes."
2300403-12 = "……Sensei, você está falando sério?"
2300403-13 = "Multiferramentas parecem baratas e úteis à primeira vista, mas, na verdade, a maioria delas não se encaixa com precisão nos padrões, então usá-las com frequência acabará danificando o maquinário."
2300403-14 = "A longo prazo, os custos de reparo vão subir e acabar saindo mais caro."
2300403-15 = "[s] Pede uma recomendação para a Utaha."
2300403-18 = "Minha recomendação seria esta: o conjunto de ferramentas premium para profissionais da \"Manaslu\"."
2300403-19 = "As ferramentas, afiadas através de um processo de fabricação com diamante, não se intimidam nem com a blindagem de um tanque, e a maleta resistente de titânio não sofre nada mesmo se for pega em uma explosão."
2300403-20 = "Com este conjunto, você deve ser capaz de lidar com qualquer problema que surja no Schale."
2300403-21 = "[s] \"Para um iniciante como eu, isso não é exagero...?\""
2300403-22 = "De jeito nenhum. Nunca é demais estar preparado."
2300403-23 = "Se um dia um tanque invadir o escritório do Schale, você pode acabar se arrependendo de não ter comprado, não acha?"
2300403-24 = "[s] \"Espera, o preço disso tem seis dígitos!?\""
2300403-25 = "Como eu disse antes, ferramentas baratas acabam custando mais caro em reparos depois."
2300403-26 = "Pense nisso como um investimento no futuro."
2300403-27 = "Dizem que um artesão não escolhe suas ferramentas, mas se você não escolher bem as ferramentas no início, nunca se tornará um artesão."
2300403-28 = "Vamos lá, Sensei, dê o primeiro passo no mundo dos mestres junto com este conjunto de ferramentas!"
2300403-30 = "No fim, comprei o conjunto de ferramentas conforme a recomendação da Utaha."
2300403-31 = "O valor que excedeu o orçamento original saiu do meu próprio bolso..."
