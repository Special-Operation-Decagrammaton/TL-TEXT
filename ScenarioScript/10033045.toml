[translation]
10033045-3 = "[ns] \"……というわけなんだけど。\""
10033045-4 = "うーん……こうなったら仕方ない！"
10033045-5 = "工芸品も動かなくなっちゃったってことは、#n水脈が無くなっちゃったのかもしれないし？"
10033045-6 = "くっ、一度撤退だ……！"
10033045-11 = "何とかなったみたいだね。"
10033045-12 = "解決解決ー♪"
10033045-13 = "お二人は、お客さんのはずなのに……#n申し訳ないです……。"
10033045-14 = "それから、本当にありがとうございます。"
10033045-15 = "あはっ、まぁ放っておくとあたしらも困るし？"
10033045-16 = "余計なお世話じゃなかった？"
10033045-17 = "と、とんでもないです……！#nむしろどうお礼をすれば良いものか……。"
10033045-18 = "堅いなぁ。#nガイドとお客さんである前に、あたしたち友達でしょ？"
10033045-19 = "と、友達……？"
10033045-20 = "あれ、違った？#nだってもう写真も撮ったし、連絡先も交換したし。"
10033045-21 = "……こういう子なんだよね。"
10033045-22 = "大丈夫、距離感しんどくない？"
10033045-23 = "い、いえ、そんなことは！#nむしろ恐縮と言いますか、何と言いますか……。"
10033045-24 = "光栄……いえ、嬉しい、です。"
10033045-25 = "じゃあ今後もよろしくね！#nはい、友情の握手！"
10033045-26 = "は、はい……！"
10033045-28 = "あ、良いなー！#n私も、私も混ぜて！"
10033045-32 = "一緒に苦難を乗り越えたのデスから、もう我々は「友」です！"
10033045-33 = "次のスケジュールが始まったら……起こして……ぐぅ……。"
10033045-34 = "ずっと思ってたけど……#nこっちはこっちで、不思議な子だらけだね。"
10033045-39 = "（でも、スケジュールの遅れはもう34分……）"
10033045-40 = "（こ、今度こそ巻き返しを……！）"
