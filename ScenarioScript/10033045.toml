[translation]
10033045-3 = "[ns] \"……foi basicamente isso que aconteceu.\""
10033045-4 = "Hmm... se as coisas chegaram a esse ponto, não tem jeito!"
10033045-5 = "Já que os artefatos pararam de funcionar, talvez a fonte de água tenha secado, não é?"
10033045-6 = "Droga, vamos recuar por enquanto...!"
10033045-11 = "Parece que conseguimos resolver."
10033045-12 = "Problema resolvido! ♪"
10033045-13 = "Vocês duas deveriam ser as clientes...#nSinto muito por isso..."
10033045-14 = "E, além disso, muito obrigada."
10033045-15 = "Ah, bem, se deixássemos como estava, nós também teríamos problemas, sabe?"
10033045-16 = "Não foi intromissão demais, foi?"
10033045-17 = "De, de jeito nenhum...!#nNa verdade, eu nem sei como agradecer..."
10033045-18 = "Não seja tão formal.#nAntes de sermos guia e clientes, nós somos amigas, não somos?"
10033045-19 = "A, amigas...?"
10033045-20 = "Ué, não somos?#nAfinal, já tiramos fotos e trocamos contatos."
10033045-21 = "……Ela é sempre assim."
10033045-22 = "Tudo bem, você não acha o jeito dela invasivo?"
10033045-23 = "N-não, de forma alguma!#nNa verdade, estou lisonjeada, ou melhor, como posso dizer..."
10033045-24 = "É uma honra... não, estou feliz, de verdade."
10033045-25 = "Então, conte comigo daqui para frente!#nVamos lá, um aperto de mão de amizade!"
10033045-26 = "S-sim...!"
10033045-28 = "Ah, que legal!#nEu também, eu também quero participar!"
10033045-32 = "Já que superamos as dificuldades juntas, agora somos \"amigas\"!"
10033045-33 = "Quando o próximo compromisso começar... me acorde... zzz..."
10033045-34 = "Eu já pensava nisso há um tempo, mas...#neste lugar também está cheio de gente estranha, né?"
10033045-39 = "（Mas o atraso na agenda já é de 34 minutos...）"
10033045-40 = "（D-desta vez eu preciso recuperar o tempo perdido...!）"
