[translation]
13410-1 = "第41話;残されたもの"
13410-3 = "アビドスのとある中学校"
13410-4 = "ねぇ見た？#n廃校、決まったらしいよ。"
13410-5 = "……私たち、どうなるんだろ。"
13410-6 = "出ていくしかないんじゃない？"
13410-7 = "でも、まだアビドス高校が……。"
13410-8 = "あそこも生徒会が解散したって。#n自治区ごと、おしまいでしょ。"
13410-9 = "ネフティスもいなくなったわけだし。"
13410-10 = "けど、あそこの令嬢は卒業まで残るって……。"
13410-11 = "その人、学校で見かけた記憶なくない？"
13410-12 = "いい加減、ほかの進路を考えたほうが良いでしょ。"
13410-19 = "……もう、日が昇る時間か？"
13410-20 = "くっ……。"
13410-21 = "私は、まだ何も……#nいや、何を……"
13410-22 = "何を、証明したかったんだろうな……。"
13410-29 = "おーい、かんとくかーん？"
13410-30 = "どこ行ったのー。"
13410-33 = "いったい何があったんですか！？"
13410-35 = "なぜ委員長がアビドスに？#nそれも治療中だなんて！？"
13410-36 = "[s] \"アコ、まずは落ち着いて……。\""
13410-37 = "落ち着いていられるわけがないでしょう！#nというか、先生のほうも大丈夫なんですか！？#n病院を抜け出したって聞きましたよ！"
13410-38 = "[s1] \"私は大丈夫だよ。\"\n[s2] \"ちょっと疲れが溜まってただけみたい。\""
13410-44 = "はぁ……委員長から事前に連絡はもらっていましたが、#nこんな事態になっているとは。"
13410-45 = "……それも、先生から助けを求められていたなんて。"
13410-46 = "委員長には、いつ連絡を？"
13410-47 = "[ns] \"それは……。\""
13410-52 = "[ns3] 集めた資料を整理する。\n[ns4] \"……これで準備は完了かな。\""
13410-58 = "待機中。先生、必要なものはありませんか？"
13410-59 = "[s] \"ありがとう、プラナ。アロナは？\""
13410-60 = "アロナ先輩なら、寝ています。寝坊助です。#n何か仕事があれば、私に命令をしてください。"
13410-61 = "[s5] \"それじゃあ……。\"\n[s6] プラナにいくつか頼み事をする。"
13410-65 = "[ns] \"列車砲にはゲヘナが関わってるみたいだし、ヒナに連絡してもらえる？\""
13410-67 = "理解。すぐに処理します。"
13410-70 = "とにかく、そこで待っていてくださいね！？"
13410-71 = "私もすぐ向かいますから！"
13410-75 = "自分から行く、ですか……？#nい、委員長、無理はなさらないで！"
13410-76 = "良いから待っていてください！#n先生、またご連絡します！"
13410-80 = "[ns] \"……どうやって謝ろうかな。\""
13410-83 = "あら、先生。#nこんなところにいたんですね。"
13410-84 = "[s] \"ノノミこそ、どこに行ってたの？\""
13410-85 = "コインランドリーです！#nこの格好で、ずっと過ごすわけにはいきませんから☆"
13410-86 = "ついでに風紀委員長さんのお洋服も洗ってきたのですが……#n大丈夫だったでしょうか？"
13410-87 = "[s] \"大丈夫だと思うよ。\""
13410-88 = "……そうですよね。#n噂よりも、ずっと優しそうな方ですし。"
13410-89 = "もうすぐ会議ですから、そろそろ行きましょう、先生？"
13410-90 = "[s] ノノミと教室に入る。"
13410-95 = "ふわふわのお洋服ですよ～！"
13410-96 = "ん……ありがとう、ノノミ。"
13410-97 = "すみません、ノノミ先輩。"
13410-98 = "いえいえ、洗濯物を入れたら、ボタンを押すだけですし☆"
13410-99 = "それに、これくらいの量なら一人で持てますから。"
13410-100 = "まぁ、私たちとしてはありがたいけど。"
13410-101 = "あれ、そういえばホシノ先輩は……？"
13410-102 = "保健室に向かいました。#nおそらく、風紀委員長さんも一緒かと。"
13410-106 = "えーっと……これは私ので……こっちはシロコ先輩のだよね？#nはい、持ってって。"
13410-107 = "う、うん。"
13410-108 = "どうしたの、先輩？"
13410-109 = "あっ……。"
13410-113 = "[ns] \"……………………。\""
13410-114 = "ちょっと先生！？#nなに生徒の洗濯物をジッと見てるのよ！"
13410-115 = "[s] \"えっ、私は何も……。\""
13410-116 = "本当にデリカシーがないんだからっ！#nシロコ先輩が恥ずかしがってるでしょ！"
13410-117 = "いや、別に……。"
13410-121 = "あっ、先生……。#n良かったら、ホシノ先輩たちを呼んできていただけませんか？"
13410-122 = "早く出てってよね！#nはい、行った行った！"
13410-123 = "[s] \"無罪を主張します……。\""
13410-128 = "[ns7] \"ヒナ、ホシノ。\"\n[ns8] \"入っても良いかな？\""
13410-133 = "……大丈夫、先生。"
13410-141 = "……。"
13410-142 = "[s] \"えっと……。\""
13410-143 = "[ruby=たかなし]小鳥遊[/ruby]ホシノが寝ちゃったから、動けなくて。"
13410-144 = "[s] \"うーん……。\""
13410-145 = "アコを待たせてるし、そろそろ帰りたいのだけど……。"
13410-146 = "[s] \"……もったいないような。\""
13410-147 = "もう、いいから手伝って……！"
13410-151 = "困っているヒナを助けるために、ホシノを起こした。"
13410-153 = "皆さん、準備は良いですか？"
13410-154 = "もちろんよ！"
13410-155 = "ん。"
13410-156 = "うんうん。全員、揃いましたね☆"
13410-157 = "ふわぁ……。"
13410-158 = "ところで、ホシノ先輩はずっとその格好でいるつもり？"
13410-159 = "うん、着替えるのも面倒だからね～。"
13410-160 = "あれ、ヒナちゃんは？"
13410-161 = "風紀委員長さんは、少し前にゲヘナへ帰りました。"
13410-162 = "えー、もう？"
13410-163 = "気づいたら帰ってたわね。"
13410-164 = "どこかの誰かさんと違って、それはもうテキパキと！"
13410-165 = "そっか……お礼、ちゃんと言いそびれちゃったな。"
13410-167 = "……お世話になったわ。"
13410-168 = "まだ、ホシノ先輩が……。"
13410-169 = "みんな、待ってると思うから。"
13410-170 = "列車砲のことを調べるために、また近いうち来るわ。"
13410-171 = "挨拶なら、その時でも大丈夫でしょう。"
13410-172 = "あの……。"
13410-177 = "助けていただき、ありがとうございます。"
13410-179 = "風紀委員長さんがいなかったら、ホシノ先輩を止められませんでした。"
13410-180 = "ん、助かった。"
13410-181 = "ホシノ先輩と戦った時の話、今度教えてね。"
13410-182 = "私も知りたい。"
13410-187 = "[ns] \"私からも……ありがとう、ヒナ。\""
13410-189 = "……そろそろ行くわ。"
13410-190 = "じゃあ、また会いましょう。"
13410-195 = "そんなあっさり行っちゃったんだ。"
13410-196 = "あっ……ホシノ先輩の服は、洗ってから返すと言っていました。"
13410-197 = "そのまま返してくれても良かったのに。"
13410-198 = "きちんとした方ですね。"
13410-199 = "なら、下着も洗って返してくれるのかな～？"
13410-200 = "いや、そういうのは直接本人に聞きなさいよ……。"
13410-201 = "というか、返してもらおうにも連絡先を知らないんだよね。"
13410-202 = "先生に聞けば良いじゃない、面倒くさがってるだけでしょ！"
13410-203 = "……うへ～。"
13410-204 = "ひとまず、会議を始める前に着替えてきてください。"
13410-205 = "おじさんはこのままで良いんだけどなぁ……。"
13410-207 = "もう、週末にリビングでダラダラしてるおじさんじゃない！"
13410-208 = "ふあぁ……仕方ないなぁ。"
13410-216 = "では、アビドス廃校対策委員会でもあり、#nアビドス生徒会でもある「対策委員会」の定例会議を始めます！"
13410-217 = "最初の議題は……。"
13410-218 = "待って、アヤネちゃん……みんなに話があるんだ。"
13410-219 = "……ホシノ先輩？"
13410-220 = "話……？"
13410-221 = "どうかしましたか？"
13410-222 = "次変なこと言ったら、今度こそタダじゃおかないからね、先輩。"
13410-223 = "こほん……。"
13410-224 = "ノノミちゃん、シロコちゃん、アヤネちゃん、セリカちゃん……そして先生。"
13410-225 = "あらためて、ちゃんと伝えておこうと思って……。"
13410-226 = "えっと……。"
13410-231 = "その……。"
13410-232 = "……みんな、ごめん。"
13410-233 = "あら、よく聞こえませんでしたね。#nシロコちゃんもそうですよね？"
13410-234 = "ん、何も。"
13410-235 = "……！"
13410-236 = "ねえ、ホシノ先輩。#n私も聞こえなかったんだよね。"
13410-237 = "[s] \"私もよく聞こえなかったな～。\""
13410-238 = "先生まで……。"
13410-239 = "だから……。"
13410-243 = "……みんな、本当にごめん！#n一度ならず二度までも……！"
13410-244 = "また一人で突っ走って……。"
13410-245 = "……心配も、迷惑もかけたよね。"
13410-249 = "……そうですね。"
13410-250 = "でも、こうして帰ってきてくれたじゃない！"
13410-251 = "ん、帰ってきてくれてよかった。"
13410-252 = "はい、そうです。"
13410-253 = "実は、記憶が曖昧なんだけど……。"
13410-254 = "……暗闇のなかで、みんなの声が聞こえたんだ。"
13410-261 = "アヤネちゃんとセリカちゃんが――"
13410-262 = "アイドルデビューするって！"
13410-263 = "えっ？"
13410-264 = "アイドル？"
13410-265 = "ええっ！？"
13410-266 = "な、何言ってるのよ！！"
13410-267 = "いや～、まさかセリカちゃんは約束を破ったりしないよね？"
13410-268 = "あ、アレは……勢いで言っちゃっただけというか！"
13410-269 = "セリカちゃん！？"
13410-270 = "だって、仕方ないじゃない！"
13410-271 = "うへ～。"
13410-273 = "今さらできないなんて言わないでよー？"
13410-274 = "いやいやいや……。"
13410-275 = "その時のプロデューサーは私に任せてください☆"
13410-276 = "アイドルだなんて……。"
13410-277 = "大丈夫だよ、本当にやるわけないって。"
13410-278 = "そ、そうだよね、セリカちゃん。"
13410-283 = "私が実現させてみせる。"
13410-284 = "お願いだから、シロコ先輩はおとなしくしてて……。"
13410-297 = "……ホシノ先輩。#nいつかユメ会長のこと、教えて。"
13410-301 = "そうね、私も聞きたいわ。"
13410-302 = "私も、お願いします。"
13410-303 = "うんうん、聞きたいです！"
13410-304 = "へえ、そっか～#nおじさんの手に汗握る冒険譚、みんな聞きたいんだねぇ。"
13410-305 = "じゃあ、まずは大オアシスを水着で探索した時の話をしようかな。"
13410-306 = "えっ、なんで水着！？"
13410-307 = "ふふふ、実はそこに秘密が――"
13410-311 = "[ns] \"ホシノ、もう大丈夫なの？\""
13410-312 = "……。"
13410-313 = "大丈夫、とは違うけどね。"
13410-316 = "ホシノ先輩……。"
13410-317 = "その苦しみを抱えて生きてくのは、つらいよね。"
13410-318 = "……毎日毎日、後悔を繰り返してばかりだよ。"
13410-319 = "でも、手を差し伸べてくれる子たちがいた。"
13410-320 = "あの時間があったおかげで、#nノノミちゃんやシロコちゃん、アヤネちゃん、セリカちゃん……#nそれと、もう一人のシロコちゃんにも会えたから。"
13410-321 = "……この苦しみも、幸せも、私の人生にとってどれも大切なもの。"
13410-322 = "だから……。"
13410-323 = "苦しんで、後悔して、立ち止まるんじゃなくて……前に進むべきなんだ。"
13410-326 = "……失った大切なものが、戻らなくても？"
13410-331 = "それを手放して良いの？"
13410-334 = "手放す必要は、ないんじゃないかな。"
13410-335 = "けど、いつまでも後ろを見てたら……。"
13410-336 = "みんなが差し伸べてくれた手を、握り返せないからね。"
13410-343 = "……だからさ。"
13410-344 = "だから、きっと……。"
13410-354 = "終わりだ……もう、終わりです。"
13410-355 = "まさか、こうなるとは……。"
13410-356 = "小生は、間違った場所に放り込まれただけ……。"
13410-357 = "……こんな世界は、ゲマトリアの小生にふさわしくありません。"
13410-361 = "ゲマトリア。"
13410-362 = "……！"
13410-370 = "ひっ、ヒィィイイイッ！？#n死の神が、どうしてここに……！？"
13410-371 = "ゲマトリアは全員倒したはずだけど、まだ残ってたんだ。"
13410-372 = "この光は……もしや、小生を追跡してきたのか？"
13410-373 = "あの者たちは、何を……？#nこの世界に、なんて存在を呼び寄せたのだ……！"
13410-374 = "死の秘密を求めているなら、私が手伝うよ。"
13410-375 = "ヒッ、ヒィイイイッ――！？"
13410-376 = "自分で体験すれば、すぐに分かるはず。"
13410-377 = "い、イヤだ、やめてくれッッ！"
13410-379 = "い、イヤだ、やめてくれッッ！"
13410-380 = "それだけは……！"
13410-383 = "……殺しはしない。"
13410-384 = "今日のところは、見逃す。"
13410-385 = "だから、早く消えて。#nあなたの地下へ――そして二度と戻ってこないで。"
13410-386 = "ただし……[ruby=ゆめゆめ]努々[/ruby]、忘れないように。"
13410-387 = "アビドスにいる……[ruby=アヌビス]「死の神」[/ruby]の存在を。"
13410-398 = "……くるしい。"
13410-399 = "ヒィッ……くるしい、くるしい。"
13410-402 = "くるしい……くるしい……。"
13410-403 = "くるしい……。"
13410-408 = "確認。#n地下生活者との接続が完全に途絶えました。"
13410-409 = "これで、もう二度と戻ってこられないはずです。"
13410-410 = "[s] \"お疲れ様、二人とも。\""
13410-411 = "先ほど、「色彩」の力も確認できなくなりました。"
13410-412 = "ですが、もう一人のシロコさんは――"
13410-413 = "――確認。#n[ruby=すなおおかみ]砂狼シ[/ruby]ロコさんとの接続が……。"
13410-414 = "……。"
13410-415 = "プラナちゃん……？"
13410-417 = "……切断されました。"
13410-418 = "えっ！？"
13410-419 = "[s] \"何があったの！？\""
13410-420 = "……それが、一方的に切られてしまいました。"
13410-424 = "探さないでほしい、ということでしょうか……？"
13410-427 = "アビドス砂漠"
13410-428 = "……。"
13410-442 = "次回;エピローグ（１）"
