[translation]
13410-1 = "Episódio 41; O que foi deixado para trás"
13410-3 = "Uma certa escola secundária em Abydos"
13410-4 = "Ei, você viu?#nParece que decidiram fechar a escola."
13410-5 = "……O que será de nós?"
13410-6 = "Não vamos ter que ir embora?"
13410-7 = "Mas a escola de ensino médio de Abydos ainda..."
13410-8 = "Disseram que o conselho estudantil de lá também se dissolveu.#nA região autônoma inteira já era, né?"
13410-9 = "A Nephthys também já se foi, afinal."
13410-10 = "Mas dizem que a senhorita de lá vai ficar até se formar..."
13410-11 = "Você não lembra de ter visto ela na escola?"
13410-12 = "É melhor você começar a pensar em outro caminho logo."
13410-19 = "……Já é hora do sol nascer?"
13410-20 = "Ugh……."
13410-21 = "Eu ainda não...#nNão, o que eu..."
13410-22 = "O que eu queria provar, afinal...?"
13410-29 = "Ei, Sensei?"
13410-30 = "Onde você foi?"
13410-33 = "O que diabos aconteceu!?"
13410-35 = "Por que a Presidente está em Abydos?#nE ainda por cima, em tratamento médico!?"
13410-36 = "[s] \"Ako, primeiro, acalme-se...\""
13410-37 = "Como eu poderia me acalmar!?#nE aliás, você também está bem, Sensei!?#nOuvi dizer que você fugiu do hospital!"
13410-38 = "[s1] \"Eu estou bem.\"\n[s2] \"Parece que eu só estava um pouco cansado.\""
13410-44 = "Haa... Eu recebi um aviso prévio da Presidente, mas#nnão imaginava que a situação estivesse assim."
13410-45 = "……E pensar que ela foi chamada pelo Sensei para ajudar."
13410-46 = "Quando você entrou em contato com a Presidente?"
13410-47 = "[ns] \"Isso é...\""
13410-52 = "[ns3] Organizar os documentos coletados.\n[ns4] \"……Pronto, a preparação está completa.\""
13410-58 = "Em espera. Sensei, precisa de algo?"
13410-59 = "[s] \"Obrigado, Plana. E a Arona?\""
13410-60 = "Arona-senpai está dormindo. Ela é uma dorminhoca.#nSe tiver algum trabalho, por favor, me dê as ordens."
13410-61 = "[s5] \"Então...\"\n[s6] Pedir algumas coisas para a Plana."
13410-65 = "[ns] \"Parece que Gehenna está envolvida no canhão ferroviário, pode entrar em contato com a Hina?\""
13410-67 = "Entendido. Processando agora mesmo."
13410-70 = "De qualquer forma, fique aí esperando, entendeu!?"
13410-71 = "Eu também estou indo agora mesmo!"
13410-75 = "Você mesma vai...?#nP-Presidente, não se esforce!"
13410-76 = "Não se preocupe, apenas espere!#nSensei, entrarei em contato novamente!"
13410-80 = "[ns] \"……Como será que eu peço desculpas?\""
13410-83 = "Ah, Sensei.#nVocê estava aqui."
13410-84 = "[s] \"Nonomi, onde você estava?\""
13410-85 = "Na lavanderia!#nNão dá para ficar usando a mesma roupa o tempo todo, né☆"
13410-86 = "Aproveitei e lavei as roupas da Presidente do Comitê Disciplinar também...#nSerá que tem problema?"
13410-87 = "[s] \"Acho que não tem problema.\""
13410-88 = "……É verdade.#nEla parece ser muito mais gentil do que dizem os boatos."
13410-89 = "A reunião vai começar em breve, vamos indo, Sensei?"
13410-90 = "[s] Entrar na sala de aula com a Nonomi."
13410-95 = "São roupas bem fofinhas!"
13410-96 = "Hum... Obrigada, Nonomi."
13410-97 = "Desculpe, Nonomi-senpai."
13410-98 = "Imagina, é só colocar as roupas e apertar o botão, né☆"
13410-99 = "Além disso, essa quantidade eu consigo carregar sozinha."
13410-100 = "Bem, para nós, isso é uma ajuda e tanto."
13410-101 = "Ah, falando nisso, onde está a Hoshino-senpai...?"
13410-102 = "Ela foi para a enfermaria.#nProvavelmente a presidente do Comitê Disciplinar também está com ela."
13410-106 = "Hum... isso aqui é meu... e isso é da Shiroko-senpai, certo?#nAqui, pode levar."
13410-107 = "Ah, sim."
13410-108 = "O que houve, senpai?"
13410-109 = "Ah..."
13410-113 = "[ns] \"……………………。\""
13410-114 = "Ei, Sensei!?#nPor que você está encarando as roupas de baixo das alunas?!"
13410-115 = "[s] \"Hã? Eu não estava fazendo nada...\""
13410-116 = "Você realmente não tem nenhum tato!#nA Shiroko-senpai está ficando envergonhada!"
13410-117 = "Não, na verdade..."
13410-121 = "Ah, Sensei...#nSe não for pedir muito, poderia ir chamar a Hoshino-senpai e as outras?"
13410-122 = "Saia logo daqui!#nVamos, vá embora!"
13410-123 = "[s] \"Declaro minha inocência...\""
13410-128 = "[ns7] \"Hina, Hoshino.\"\n[ns8] \"Posso entrar?\""
13410-133 = "……Tudo bem, Sensei."
13410-141 = "……。"
13410-142 = "[s] \"Bem...\""
13410-143 = "A Takanashi Hoshino acabou dormindo, então não consigo me mover."
13410-144 = "[s] \"Hum...\""
13410-145 = "Eu deixei a Ako esperando e já queria ir embora..."
13410-146 = "[s] \"……É um desperdício, de certa forma.\""
13410-147 = "Chega, pare de falar e me ajude logo...!"
13410-151 = "Para ajudar a Hina, que estava em apuros, acordei a Hoshino."
13410-153 = "Pessoal, estão todas prontas?"
13410-154 = "Com certeza!"
13410-155 = "Sim."
13410-156 = "Sim, sim. Todas reunidas, então☆"
13410-157 = "Uaaah..."
13410-158 = "Aliás, a Hoshino-senpai pretende ficar com essa roupa o tempo todo?"
13410-159 = "Sim, dá muito trabalho trocar de roupa, né~."
13410-160 = "Ué, e a Hina-chan?"
13410-161 = "A presidente do Comitê Disciplinar voltou para Gehenna há pouco tempo."
13410-162 = "Ah, já?"
13410-163 = "Quando percebi, ela já tinha ido embora."
13410-164 = "Diferente de certas pessoas, ela foi muito eficiente!"
13410-165 = "Entendi... acabei perdendo a chance de agradecer direito."
13410-167 = "……Obrigada pela ajuda."
13410-168 = "Ainda tem a Hoshino-senpai..."
13410-169 = "Acho que todas estão esperando."
13410-170 = "Voltarei em breve para investigar sobre o canhão ferroviário."
13410-171 = "Se for para cumprimentá-la, pode ser nessa ocasião."
13410-172 = "Ei..."
13410-177 = "Obrigada por nos ajudar."
13410-179 = "Se a presidente do Comitê Disciplinar não estivesse lá, não teríamos conseguido parar a Hoshino-senpai."
13410-180 = "Sim, foi uma grande ajuda."
13410-181 = "Depois me conte como foi lutar contra a Hoshino-senpai."
13410-182 = "Eu também quero saber."
13410-187 = "[ns] \"Eu também... obrigada, Hina.\""
13410-189 = "……Já está na hora de eu ir."
13410-190 = "Bem, nos vemos de novo."
13410-195 = "Ela foi embora tão rápido assim."
13410-196 = "Ah... ela disse que ia lavar as roupas da Hoshino-senpai antes de devolver."
13410-197 = "Ela podia ter devolvido do jeito que estava, né?"
13410-198 = "Ela é uma pessoa muito correta."
13410-199 = "Será que ela também vai lavar e devolver as roupas íntimas?"
13410-200 = "Ei, pergunte isso diretamente para ela..."
13410-201 = "Aliás, mesmo que a gente quisesse pegar de volta, não temos o contato dela."
13410-202 = "É só perguntar para o Sensei, você só está com preguiça, não é?"
13410-203 = "……Uhe~."
13410-204 = "Por enquanto, troque de roupa antes de começarmos a reunião."
13410-205 = "Mas o tiozinho aqui está bem assim..."
13410-207 = "Chega, você não é mais um tiozinho relaxando na sala de estar no fim de semana!"
13410-208 = "Fuah... não tem jeito, né."
13410-216 = "Então, vamos começar a reunião regular do \"Comitê de Contramedidas\", que também é o Comitê de Prevenção de Fechamento de Abydos e o Grêmio Estudantil de Abydos!"
13410-217 = "A primeira pauta é..."
13410-218 = "Espere, Ayane-chan... eu tenho algo para falar com todas."
13410-219 = "……Hoshino-senpai?"
13410-220 = "Algo para falar...?"
13410-221 = "Aconteceu alguma coisa?"
13410-222 = "Se disser algo estranho de novo, desta vez eu não vou deixar passar, senpai."
13410-223 = "Ehem..."
13410-224 = "Nonomi-chan, Shiroko-chan, Ayane-chan, Serika-chan... e Sensei."
13410-225 = "Eu queria aproveitar para dizer isso direito..."
13410-226 = "Bem..."
13410-231 = "É que..."
13410-232 = "……Pessoal, me desculpem."
13410-233 = "Ora, não deu para ouvir direito. #nShiroko-chan, você também não ouviu, né?"
13410-234 = "Hum, não ouvi nada."
13410-235 = "……!"
13410-236 = "Ei, Hoshino-senpai. #nEu também não ouvi nada."
13410-237 = "[s] \"Eu também não ouvi direito~.\""
13410-238 = "Até o Sensei..."
13410-239 = "Por isso..."
13410-243 = "……Pessoal, me desculpem de verdade! #nNão só uma, mas duas vezes...!"
13410-244 = "Eu saí correndo sozinha de novo..."
13410-245 = "……Eu causei preocupação e problemas para vocês, né."
13410-249 = "……Pois é."
13410-250 = "Mas você voltou para nós, não foi!"
13410-251 = "Hum, fico feliz que tenha voltado."
13410-252 = "Sim, é verdade."
13410-253 = "Na verdade, minhas memórias estão um pouco confusas, mas..."
13410-254 = "……Na escuridão, eu pude ouvir a voz de todas."
13410-261 = "A Ayane-chan e a Serika-chan..."
13410-262 = "Vão debutar como idols!"
13410-263 = "Hã?"
13410-264 = "Idols?"
13410-265 = "Eeeeh!?"
13410-266 = "Q-que é que você está dizendo!!"
13410-267 = "Ei, Serika-chan, você não vai quebrar a promessa, vai?"
13410-268 = "A-aquilo foi... eu só disse por impulso, sabe!"
13410-269 = "Serika-chan!?"
13410-270 = "É que, não tinha outro jeito!"
13410-271 = "Uhe~."
13410-273 = "Não vai dizer que não pode fazer isso agora, vai?"
13410-274 = "Não, não, não..."
13410-275 = "Pode deixar o produtor daquela época comigo☆"
13410-276 = "Idol, logo eu..."
13410-277 = "Tudo bem, não é como se fôssemos fazer isso de verdade."
13410-278 = "É-é verdade, né, Serika-chan."
13410-283 = "Eu farei isso se tornar realidade."
13410-284 = "Por favor, Shiroko-senpai, fique quieta..."
13410-297 = "...Hoshino-senpai.#nAlgum dia, me conte sobre a Presidente Yume."
13410-301 = "É verdade, eu também quero ouvir."
13410-302 = "Eu também, por favor."
13410-303 = "Sim, sim, eu quero ouvir!"
13410-304 = "Hee, entendi~#nEntão todas querem ouvir a aventura de tirar o fôlego do tio, né."
13410-305 = "Então, que tal começarmos com a história de quando explorei o Grande Oásis de roupa de banho?"
13410-306 = "Hã, por que de roupa de banho!?"
13410-307 = "Fufufu, na verdade, existe um segredo nisso—"
13410-311 = "[ns] \"Hoshino, você já está bem?\""
13410-312 = "..."
13410-313 = "Não é bem 'estar bem', sabe."
13410-316 = "Hoshino-senpai..."
13410-317 = "Deve ser difícil viver carregando esse sofrimento, né."
13410-318 = "...Todos os dias, eu só continuo me arrependendo."
13410-319 = "Mas, houve garotas que estenderam a mão para mim."
13410-320 = "Graças àquele tempo, eu pude conhecer a Nonomi-chan, a Shiroko-chan, a Ayane-chan, a Serika-chan...#ne também, a outra Shiroko-chan."
13410-321 = "...Tanto esse sofrimento quanto essa felicidade são coisas preciosas na minha vida."
13410-322 = "Por isso..."
13410-323 = "Em vez de sofrer, me arrepender e ficar parada... eu devo seguir em frente."
13410-326 = "...Mesmo que as coisas preciosas que você perdeu não voltem?"
13410-331 = "Você pode simplesmente abrir mão disso?"
13410-334 = "Acho que não preciso abrir mão."
13410-335 = "Mas, se ficar olhando para trás para sempre..."
13410-336 = "Não conseguirei segurar as mãos que todas estenderam para mim."
13410-343 = "...Por isso."
13410-344 = "Por isso, com certeza..."
13410-354 = "É o fim... acabou, acabou mesmo."
13410-355 = "Quem diria que terminaria assim..."
13410-356 = "Eu só fui jogado no lugar errado..."
13410-357 = "...Um mundo como este não é digno de mim, da Gematria."
13410-361 = "Gematria."
13410-362 = "...!"
13410-370 = "Hii, Hiiiii!?#nPor que o deus da morte está aqui...!?"
13410-371 = "Eu deveria ter derrotado todos da Gematria, mas ainda restava um."
13410-372 = "Essa luz... será que veio atrás de mim?"
13410-373 = "O que aqueles indivíduos fizeram...?#nQue tipo de existência eles trouxeram para este mundo...!"
13410-374 = "Se você está buscando os segredos da morte, eu posso te ajudar."
13410-375 = "Hii, hiiiiiii――!?"
13410-376 = "Se você experimentar por conta própria, entenderá rapidamente."
13410-377 = "N-não, pare, por favor!"
13410-379 = "N-não, pare, por favor!"
13410-380 = "Qualquer coisa, menos isso...!"
13410-383 = "...Eu não vou te matar."
13410-384 = "Por hoje, vou deixar você passar."
13410-385 = "Então, suma logo. #nPara o seu subsolo... e nunca mais volte."
13410-386 = "No entanto... jamais se esqueça."
13410-387 = "Da existência do \"Deus da Morte\" que está em Abydos."
13410-398 = "...Dói."
13410-399 = "Hii... dói, dói."
13410-402 = "Dói... dói..."
13410-403 = "Dói..."
13410-408 = "Confirmação. #nA conexão com o Habitante do Subsolo foi completamente interrompida."
13410-409 = "Com isso, ele não deve conseguir voltar nunca mais."
13410-410 = "[s] \"Bom trabalho, vocês duas.\""
13410-411 = "Há pouco, o poder do \"Cromatismo\" também não pôde mais ser detectado."
13410-412 = "Porém, a outra Shiroko..."
13410-413 = "――Confirmação. #nA conexão com a Sunaookami Shiroko foi..."
13410-414 = "..."
13410-415 = "Plana-chan...?"
13410-417 = "...Foi cortada."
13410-418 = "O quê!?"
13410-419 = "[s] \"O que aconteceu!?\""
13410-420 = "...Foi cortada unilateralmente."
13410-424 = "Será que ela não quer que a procuremos...?"
13410-427 = "Deserto de Abydos"
13410-428 = "..."
13410-442 = "Próximo episódio: Epílogo (1)"
