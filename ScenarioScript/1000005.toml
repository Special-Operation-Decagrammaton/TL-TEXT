[translation]
1000005-1 = "真のリーダー"
1000005-2 = "第8映画館前"
1000005-4 = "（約束の時間より20分早く来たのだけど、先に着いてるアルを発見した）"
1000005-5 = "ふふふ。出会ってすぐに、私が社長らしく余裕を見せて優雅にエスコートしたら、きっと先生もびっくりして……。"
1000005-8 = "[s] \"アル、待った？\""
1000005-9 = "ひゃっ！？び、びっくりした！"
1000005-10 = "せ、先生だったのね。気配もなく急に現れるから、驚いたわ……。"
1000005-11 = "[s] \"アル、すごい早く来てたんだね。\""
1000005-12 = "ふふふ、リーダーが怠けたら、従う部下たちも自然と怠けてしまうものでしょう？"
1000005-13 = "だから社長として、模範になるためにも、私はいつも率先して素早く動くだけよ。"
1000005-14 = "[s] \"アルは真面目だね。\""
1000005-15 = "うっ……そ、それはともかく……！"
1000005-16 = "今日こうやって待ち合わせした理由は、この映画を見るためよ。"
1000005-18 = "[s] \"『義理人情大戦争3～マフィアとヤクザの大運動会～』？\""
1000005-19 = "ふふふ、そう、アウトローたちのリアルな世界を描くことで好評な「義理人情戦争」シリーズの最新作。"
1000005-20 = "しかも今回の映画では、主人公が大運動会で前作の主人公たちを倒して、真のリーダーになっていく姿を描いてるらしいわ。"
1000005-21 = "これを見れば、リーダーとしての心得も学べるかもしれない。"
1000005-22 = "[s1] \"……そうかな？\"\n[s2] \"アルはその映画の熱狂的ファンなの？\""
1000005-23 = "なんか、反応がイマイチね。"
1000005-24 = "なんか、反応がイマイチね。"
1000005-25 = "果たして、映画を見た後でも先生はそんな余裕を見せていられるかしら？"
1000005-26 = "さあ、とにかく見に行きましょう、先生。"
1000005-29 = "（映画の内容は、迫力溢れるサスペンスと逆転劇の連続だった）"
1000005-36 = "（緊張感のあるアクション、感動と悲哀で手に汗握る展開、本当に時間が過ぎるのも忘れて見入ってしまった）"
1000005-38 = "先生！先生！どう、本当にすごかったでしょう？"
1000005-39 = "演技のディテールは言うまでもなく、内容も完璧ね！"
1000005-40 = "主人公が最後にあの選択をした時は、この私ですら驚きだったわ！"
1000005-41 = "[s3] \"まさかレモンと唐揚げ問題で、\"\n[s4] \"あんな選択をするなんて。\""
1000005-42 = "その後、唐揚げが爆発した時は、本当にどうなるかと思ったわ♪"
1000005-43 = "その後、唐揚げが爆発した時は、本当にどうなるかと思ったわ♪"
1000005-44 = "ふふふ、どんな苦難と逆境が押し寄せてきても、自分の道を貫き、最後まで守る。"
1000005-45 = "気に入ったわ。"
1000005-46 = "真のアウトロー、真のリーダーというのは、正にああいう姿を指すと思うの。"
1000005-47 = "[s] \"それに、最後まで絶対に仲間を見捨てることもなかった。\""
1000005-48 = "ええ、たとえわずらわしいルールを投げ捨てたアウトローだとしても、共にいることを誓った友達や仲間は絶対に見捨てない。"
1000005-49 = "リーダーとはどうあるべきか……世間ではみんな勝手にあれこれ言ってるけど。"
1000005-50 = "結局、大事な事を諦めないで最後まで貫くのが真のリーダーということね。"
1000005-51 = "私もいつか絶対に、そんなリーダーになってみせるわ。"
1000005-52 = "[s] \"アルならなれると思うよ。\""
1000005-53 = "うぇっ！？"
1000005-54 = "[s] \"ううん、もうなっているかもしれないね。\""
1000005-55 = "もう……先生は毎回、平気でそういうことを言うわよね。その上、唐突に。"
1000005-56 = "まあ、先生の話には何の根拠もないけれど。"
1000005-57 = "先生がそう言ってくれるだけで、本当にそんな気がするから不思議ね。"
1000005-58 = "ふふふ、まだまだ道は遠いと思うけど、いつかそうなれるように。"
1000005-59 = "これからもよろしくね。先生？"
