[translation]
1000005-1 = "A verdadeira líder"
1000005-2 = "Em frente ao 8º cinema"
1000005-4 = "（Cheguei 20 minutos antes do horário combinado, mas encontrei a Aru já esperando）"
1000005-5 = "Fufufu. Se eu mostrar a compostura de uma presidente logo de cara e fizer um convite elegante, o Sensei certamente ficará surpreso..."
1000005-8 = "[s] \"Aru, você esperou muito?\""
1000005-9 = "Hya!? V-você me assustou!"
1000005-10 = "Ah, era você, Sensei. Você apareceu do nada, sem fazer barulho, que susto..."
1000005-11 = "[s] \"Aru, você chegou bem cedo, hein.\""
1000005-12 = "Fufufu, se a líder for preguiçosa, os subordinados que a seguem naturalmente ficarão preguiçosos também, não é?"
1000005-13 = "Por isso, como presidente, eu sempre tomo a iniciativa de agir rápido para servir de exemplo."
1000005-14 = "[s] \"Aru, você é muito dedicada.\""
1000005-15 = "Ugh... B-bem, deixando isso de lado...!"
1000005-16 = "O motivo de termos marcado esse encontro hoje é para assistir a este filme."
1000005-18 = "[s] \"『Guerra de Lealdade e Humanidade 3: A Grande Competição Esportiva entre Máfia e Yakuza』?\""
1000005-19 = "Fufufu, isso mesmo. É o mais novo capítulo da série \"Guerra de Lealdade e Humanidade\", aclamada por retratar o mundo real dos fora da lei."
1000005-20 = "E parece que, neste filme, o protagonista derrota os protagonistas dos filmes anteriores em uma grande competição esportiva e se torna o verdadeiro líder."
1000005-21 = "Se eu assistir a isso, talvez eu possa aprender o que é preciso para ser uma líder."
1000005-22 = "[s1] \"...Será mesmo?\"\n[s2] \"Aru, você é uma fã fanática desse filme?\""
1000005-23 = "Sua reação não foi lá essas coisas, hein."
1000005-24 = "Sua reação não foi lá essas coisas, hein."
1000005-25 = "Será que você ainda vai conseguir manter essa calma depois de assistir ao filme, Sensei?"
1000005-26 = "Bem, de qualquer forma, vamos assistir, Sensei."
1000005-29 = "(O conteúdo do filme era uma sucessão de suspense intenso e reviravoltas.)"
1000005-36 = "(Ação tensa, um desenrolar emocionante e triste que me fez suar frio; eu realmente esqueci do tempo enquanto assistia.)"
1000005-38 = "Sensei! Sensei! E então, não foi realmente incrível?"
1000005-39 = "Sem falar nos detalhes da atuação, o conteúdo também foi perfeito!"
1000005-40 = "Quando o protagonista fez aquela escolha no final, até eu fiquei surpresa!"
1000005-41 = "[s3] \"Quem diria que por causa da questão do limão no frango frito,\"\n[s4] \"ele faria aquela escolha.\""
1000005-42 = "Depois, quando o frango frito explodiu, eu realmente não sabia o que ia acontecer♪"
1000005-43 = "Depois, quando o frango frito explodiu, eu realmente não sabia o que ia acontecer♪"
1000005-44 = "Fufufu, não importa quantas dificuldades e adversidades surjam, ele seguiu seu próprio caminho e protegeu tudo até o fim."
1000005-45 = "Eu gostei disso."
1000005-46 = "Acho que um verdadeiro fora da lei, um verdadeiro líder, é exatamente alguém assim."
1000005-47 = "[s] \"Além disso, ele nunca abandonou seus companheiros até o fim.\""
1000005-48 = "Sim, mesmo sendo um fora da lei que jogou fora as regras irritantes, ele nunca abandona os amigos e companheiros com quem jurou estar."
1000005-49 = "Como um líder deve ser... todo mundo por aí fica falando o que quer sobre isso."
1000005-50 = "No fim das contas, um verdadeiro líder é aquele que não desiste do que é importante e vai até o fim."
1000005-51 = "Eu também, um dia, com certeza vou me tornar uma líder assim."
1000005-52 = "[s] \"Eu acho que você consegue, Aru.\""
1000005-53 = "Hã!?"
1000005-54 = "[s] \"Não, talvez já tenha acontecido.\""
1000005-55 = "Sério... Sensei, você sempre diz essas coisas com tanta naturalidade. E do nada, ainda por cima."
1000005-56 = "Bem, não que o que você diz tenha qualquer fundamento."
1000005-57 = "É estranho, mas só de ouvir você dizer isso, sinto que realmente pode acontecer."
1000005-58 = "Hehehe, acho que ainda tenho um longo caminho pela frente, mas espero chegar lá um dia."
1000005-59 = "Conto com você daqui para frente, está bem? Sensei?"
