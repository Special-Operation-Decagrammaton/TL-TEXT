[translation]
1004905-1 = "バッドタイミング"
1004905-2 = "（今日は久々の休日）"
1004905-3 = "（ゆっくり寝た後、昼食を買うためにコンビニに向かった）"
1004905-11 = "…………。"
1004905-12 = "……！？"
1004905-13 = "[ns] \"……？\""
1004905-15 = "[ns1] \"何か人の気配が……。\"\n[ns2] 音がした方に移動する。"
1004905-21 = "……！！！"
1004905-22 = "（……避けられてる？）"
1004905-23 = "[ns3] ……心配なので追いかける。\n[ns4] \"どうしたんだろう……？\""
1004905-31 = "……！！あうっ……！！#nいたたた……"
1004905-32 = "[s] \"……カズサ？\""
1004905-35 = "[wa:300]― も、[wa:300]もしかして、"
1004905-37 = "― 最初から[wa:500]気づいてた……？"
1004905-40 = "― そっか……"
1004905-42 = "― まあ[wa:400]気づいてないわけが[wa:800]無いよね……。"
1004905-45 = "[wa:150]― いや[wa:300]別に、"
1004905-47 = "[wa:100]― 避けてたわけじゃ[wa:400]ないんだけど……。"
1004905-50 = "― ただちょっと……[wa:1400]その……"
1004905-52 = "― 今……[wa:1300]すっぴん、[wa:1000]だから……。"
1004905-55 = "[wa:1200]― あんまり、[wa:900]近づくのは[wa:900]ちょっと……！"
1004905-58 = "― っていうか先生、"
1004905-60 = "― そう言ってるのに[wa:500]近づかないで。"
1004905-63 = "[ns5] \"あまり気にしなくてもいいんじゃないかな？\"\n[ns6] \"別にいいんじゃないかな？\""
1004905-64 = "[wa:1000]― ……そ、[wa:300]そう？[wa:1700]……そうかな？"
1004905-65 = "[wa:1000]― ……そ、[wa:300]そう？[wa:1700]……そうかな？"
1004905-67 = "― まあ……[wa:1100]それなら[wa:800]良いんだけど……。"
1004905-70 = "[wa:500]― ……何、[wa:800]その反応。"
1004905-73 = "― なっ、[wa:400]何！？[wa:800]何でそんなに笑うのさ！？"
1004905-75 = "― ちょっと！！！"
1004905-78 = "はぁ……もういいよ。ここで怒っても私が疲れるだけだし。"
1004905-79 = "それで買い物は終わったの？#n終わってるなら早く行って。先生がいると選べないから……。"
1004905-80 = "……え？"
1004905-81 = "お店に入ってすぐにカズサを追いかけたから、まだ一つも買ってない……？"
1004905-82 = "……そ、そう。"
1004905-83 = "そう、ですか……は、はは……。"
1004905-84 = "ははは……。"
1004905-89 = "いい加減にしろー！！"
1004905-90 = "（……）"
1004905-91 = "（アルバイトの人にも怒られた）"
1004905-95 = "うう……恥ずかしくて死ぬかと思った……。"
1004905-96 = "先生のせいじゃん。"
1004905-97 = "……は？楽しかったって？"
1004905-98 = "本当ふざけないで。私にも我慢の限界ってのがあるんだけど。"
1004905-99 = "先生の前だから、私も自分なりに自分のイメージを気にしているんだよ。#n少しはそういう方面の配慮をしたらどう？"
1004905-100 = "はぁ……休日の真っ昼間から疲れた……"
1004905-101 = "……あと、話変わるけど。"
1004905-102 = "……さっき言ったこと、本当？"
1004905-103 = "[s7] \"なに？すっぴん？気にしてないってこと？\"\n[s8] \"そう言われるとちょっと気になってきたかも。\""
1004905-104 = "……うん。それ。"
1004905-105 = "まぁ、やっぱりちょっと気になるところはあるけど……"
1004905-106 = "……先生、いい加減しつこいのは嫌われますよ。"
1004905-107 = "はぁ……まぁいいや。先生の言うことだし、信じるよ。"
1004905-108 = "万が一でも、後で違うことをいうようなら……記憶を飛ばしてあげるから。"
1004905-109 = "じゃあ……用事も済んだし……"
1004905-113 = "……わ、私は先に行くから！せ、先生もよい一日を！！"
1004905-117 = "[ns] \"……。\""
1004905-118 = "（そうしてカズサを見送ってから、シャーレに戻った）"
