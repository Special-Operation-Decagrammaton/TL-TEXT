[translation]
1004905-1 = "Má hora"
1004905-2 = "（Hoje é meu primeiro dia de folga em muito tempo）"
1004905-3 = "（Depois de dormir bastante, fui à loja de conveniência comprar o almoço）"
1004905-11 = "…………。"
1004905-12 = "……！？"
1004905-13 = "[ns] \"……？\""
1004905-15 = "[ns1] \"Senti a presença de alguém……。\"\n[ns2] Ir na direção de onde veio o som."
1004905-21 = "……！！！"
1004905-22 = "（……Ela está me evitando?）"
1004905-23 = "[ns3] ……Estou preocupado, então vou atrás dela.\n[ns4] \"O que será que aconteceu……？\""
1004905-31 = "……！！Ai……！！#nAi, ai……"
1004905-32 = "[s] \"……Kazusa?\""
1004905-35 = "[wa:300]— V- [wa:300]você por acaso,"
1004905-37 = "— Já tinha [wa:500]percebido desde o começo……？"
1004905-40 = "— Entendi……"
1004905-42 = "— Bem, [wa:400]não tinha como você não [wa:800]perceber, né……。"
1004905-45 = "[wa:150]— Não, [wa:300]na verdade,"
1004905-47 = "[wa:100]— Não é que eu estivesse [wa:400]te evitando……。"
1004905-50 = "— É só que……[wa:1400]bem……"
1004905-52 = "— Eu estou……[wa:1300]sem maquiagem, [wa:1000]então……。"
1004905-55 = "[wa:1200]— Não é muito bom [wa:900]você chegar tão perto……！"
1004905-58 = "— Quer dizer, Sensei,"
1004905-60 = "— Eu já disse, [wa:500]não chegue perto."
1004905-63 = "[ns5] \"Acho que você não precisa se preocupar tanto com isso, não é?\"\n[ns6] \"Não tem problema, tem?\""
1004905-64 = "[wa:1000]— ……S- [wa:300]sério?[wa:1700]……Será?"
1004905-65 = "[wa:1000]— ……S- [wa:300]sério?[wa:1700]……Será?"
1004905-67 = "— Bem……[wa:1100]se é assim, [wa:800]tudo bem então……。"
1004905-70 = "[wa:500]— ……O que [wa:800]foi essa reação?"
1004905-73 = "— Quê, [wa:400]o quê！？[wa:800]Por que você está rindo tanto assim！？"
1004905-75 = "— Ei!!!"
1004905-78 = "Ah…… esquece. Não adianta eu ficar brava aqui, só vou acabar me cansando."
1004905-79 = "E então, você terminou suas compras?#nSe terminou, vá logo embora. Não consigo escolher nada com você aqui……."
1004905-80 = "……Hã?"
1004905-81 = "Como eu te segui assim que entrei na loja, eu ainda não comprei nada……?"
1004905-82 = "……S-sério."
1004905-83 = "É, entendo…… ha, haha……."
1004905-84 = "Hahaha……."
1004905-89 = "Já chega disso!!"
1004905-90 = "（……）"
1004905-91 = "（O atendente também ficou bravo com a gente）"
1004905-95 = "Ai, ai…… achei que ia morrer de vergonha……."
1004905-96 = "A culpa é toda sua, Sensei."
1004905-97 = "……Hã? Disse que foi divertido?"
1004905-98 = "Para de brincadeira. Eu também tenho meus limites, sabia?"
1004905-99 = "Como estou na frente do Sensei, eu tento cuidar da minha imagem, sabe?#nVocê não poderia ter um pouco mais de consideração com essas coisas?"
1004905-100 = "Ah…… que cansaço, logo no meio do dia de folga……"
1004905-101 = "……Ah, mudando de assunto."
1004905-102 = "……O que você disse agora há pouco, é verdade?"
1004905-103 = "[s7] \"O quê? Sobre estar sem maquiagem? Que você não se importa?\"\n[s8] \"Depois que você disse isso, comecei a ficar um pouco preocupado.\""
1004905-104 = "……É. Isso mesmo."
1004905-105 = "Bem, ainda tem algumas coisas que me deixam um pouco preocupada, mas..."
1004905-106 = "……Sensei, você vai acabar sendo odiado se continuar sendo tão insistente."
1004905-107 = "Haa... bem, tanto faz. Já que é você quem está dizendo, Sensei, eu vou acreditar."
1004905-108 = "Mas, se por um acaso você disser algo diferente depois... eu vou apagar a sua memória."
1004905-109 = "Então... já que terminamos o que tínhamos para fazer..."
1004905-113 = "……E-eu já vou indo! T-tenha um bom dia, Sensei!!"
1004905-117 = "[ns] \"…….\""
1004905-118 = "(Depois de ver Kazusa partir, voltei para o Schale)"
