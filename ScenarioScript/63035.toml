[translation]
63035-1 = "Episódio 3; O Anjo Trompetista"
63035-4 = "Droga...!"
63035-5 = "[ns] \"Saori!\""
63035-6 = "Irmã Saori!"
63035-7 = "Não é nada... é só um arranhão."
63035-8 = "Não parece que você está bem, mas... se a líder diz isso..."
63035-9 = "E agora, o que vamos fazer de verdade? Nunca conseguimos vencer \"coisas como aquela\"..."
63035-10 = "Além disso, desta vez é de outro nível."
63035-14 = "Hã...? O som de uma trombeta...?#nAh! É disso que você estava falando antes...!?"
63035-15 = "É isso mesmo!#nMas... o céu não está ficando escuro...?"
63035-17 = "Ainda é meio-dia...!?"
63035-18 = "O que está acontecendo...?"
63035-25 = "Quer dizer que de repente ficou de noite...!?"
63035-26 = "Isso... eu conheço! Está escrito nas escrituras...!"
63035-27 = "Um terço do sol, um terço da lua e um terço das estrelas foram atingidos, de modo que um terço deles escureceu—"
63035-28 = "Um terço do dia não brilhou, e a noite ficou da mesma forma.#n...Quer dizer!"
63035-34 = "De novo...!?"
63035-35 = "Essa é a sexta vez...!"
63035-36 = "Mas não é estranho? Por que está tocando de novo...?"
63035-37 = "Pois é... desse jeito, em vez de sete vezes, vai acabar sendo catorze trombetas...?"
63035-41 = "F-ficou escuro de repente... O que está acontecendo...?"
63035-42 = "Subaru! Pare! O que você está pensando!#nO que... aconteceu com você!"
63035-46 = "...Parece que ela não consegue ouvir a nossa voz."
63035-47 = "..."
63035-48 = "S-senpai...!"
63035-49 = "Subaru Senpai!!!"
63035-54 = "..."
63035-55 = "Por que...?"
63035-56 = "Até agora... onde você estava... por que está aqui...?"
63035-58 = "Essa garota esteve aqui o tempo todo."
63035-59 = "Neste lugar, junto com a gente."
63035-60 = "Por que você não percebeu? É porque..."
63035-61 = "Você não tentou olhar para ela."
63035-62 = "Não é, Subaru?"
63035-63 = "Não... agora ela se tornou um \"fenômeno\".#nDevo chamá-la de \"Anjo Trompetista\"?"
63035-64 = "Atsuko... você sabe de alguma coisa?"
63035-65 = "Até agora era apenas uma suposição, mas... com isso, tenho certeza."
63035-66 = "Vou explicar tudo na ordem certa."
63035-67 = "E mais uma coisa. Já que chegamos a esse ponto, vou deixar bem claro."
63035-68 = "Subaru.#nVocê não é a única \"Arius\" que existe."
63035-70 = "Próximo episódio; Sangue Real"
