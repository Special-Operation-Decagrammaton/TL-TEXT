[translation]
1001808-1 = "遊園地での約束"
1001808-2 = "遊園地・正門入口"
1001808-5 = "あ、先生。こちらです……！"
1001808-6 = "えへへ……着ぐるみ無しでこうやって先生と一緒に遊園地を歩くなんて、なんだか不思議な気分ですね……。"
1001808-7 = "今日のバイト……ですか？"
1001808-8 = "あ、はい、お休みを頂きました。"
1001808-9 = "それで、その……非番の時に使って、と頂いた、この遊園地のフリーパスが二枚ありまして……。わたしが働いてる場所に、あらためて先生を直接ご招待したくって。"
1001808-10 = "も、もしかして、迷惑でしたか……？"
1001808-11 = "[s] \"ううん、遊園地大好きだよ。\""
1001808-12 = "よかった……。#nもしかして、忙しい先生を誘ったらご迷惑なのではないのかと、ちょっと心配してました……。"
1001808-13 = "そ、それでは今日は、一緒に乗り物に乗ったりして、楽しく過ごしましょう……！"
1001808-14 = "[s] \"ユズはどの乗り物が好きなの？\""
1001808-15 = "せ、先生と一緒なら何でも良いのですが……その、ま、まだ人が怖くて……。"
1001808-16 = "で、できれば、周りに人があまりいない乗り物の方が……。"
1001808-17 = "[s1] \"じゃあ、観覧車に乗ろう。\"\n[s2] \"じゃあ、ジェットコースターに乗ろう。\""
1001808-18 = "あ、良いですね……！観覧車は人も少ないですし、高いところから遊園地を一望できますし……。"
1001808-20 = "こっちです、先生。ご案内します……！"
1001808-21 = "え、ジ、ジェットコースターですか？ジェットコースターは列も並びますし人もそれなりにいますし、な、何より怖いじゃないですか……！？"
1001808-22 = "せ、先生、待ってください！置いて行かないでください……っ！"
1001808-24 = "その後、ユズと楽しくアトラクションに乗ったりご飯を食べたりして過ごした。"
1001808-26 = "ふう……今日は楽しかったです、ありがとうございます。"
1001808-27 = "遊園地はいつ来ても楽しい場所ですが、今日は先生と一緒に来られて、今までに無いくらい楽しかったです。"
1001808-28 = "[s] \"私も楽しかったよ、ありがとね。\""
1001808-29 = "それで、あ、あの……"
1001808-30 = "帰ってしまう前に……先生にお渡ししたいプレゼントがありまして……。"
1001808-31 = "……プレゼントは、今日の遊園地のフリーパスじゃないの……ですか？"
1001808-32 = "ち、違います……！"
1001808-33 = "そ、そちらは……ただわたしが先生と一緒に遊びたくて、お願いしただけなんです……。"
1001808-34 = "部員のみんなには、それぞれ好きそうな物を買ってプレゼントしたのですが、大人である先生には何をプレゼントしようか、どれだけ考えても、いまいちピンと来なくって……悩みに悩んで、これを用意しました……。"
1001808-40 = "先生が使いたい時にいつでも使える……"
1001808-41 = "……「ユズのフリーパス」、です！"
1001808-45 = "[wa:1500]― 先生とじゃ[wa:550]なかったら……[wa:1500]できなかったと[wa:800]思います。"
1001808-48 = "[wa:1100]― みんなに[wa:750]プレゼントが[wa:500]できたのは、[wa:1350]先生の[wa:750]おかげです。"
1001808-51 = "[wa:1500]― 先生が[wa:520]助けてくれたように……"
1001808-53 = "― 先生に[wa:800]わたしが[wa:680]必要な瞬間が来たら、[wa:1820]何でも[wa:1000]言ってくださいね。"
1001808-56 = "[wa:500]― ……[wa:1300]必ず、[wa:1550]恩返しします。"
1001808-59 = "……ふふっ。喜んでいただけたのでしたら、良かったです。"
1001808-60 = "このフリーパスを使えば何でもユズにお願いできるの……ですか？#nは、はい、それはもちろん、恩返しなので……。"
1001808-61 = "な、なんで、も…………。"
1001808-62 = "な、何を考えていらっしゃるんですか……！？そ、そういうつもりでお渡ししたわけではなく、えっと……！"
1001808-63 = "た、確かにフリーパスですけど、その……！へ、変なことには絶対……！絶対に……！"
1001808-65 = "……。"
1001808-66 = "……だ、ダメ……ですからね……。"
