[translation]
1001808-1 = "Promessa no parque de diversões"
1001808-2 = "Parque de diversões - Entrada principal"
1001808-5 = "Ah, Sensei. Por aqui...!"
1001808-6 = "Hehe... É uma sensação estranha caminhar pelo parque de diversões com o Sensei assim, sem estar usando a fantasia..."
1001808-7 = "Sobre o meu trabalho de meio período...?"
1001808-8 = "Ah, sim, eu tirei o dia de folga."
1001808-9 = "Então, é que... eu recebi dois passes livres para este parque de diversões para usar quando estivesse de folga... e eu queria convidar o Sensei pessoalmente para o lugar onde eu trabalho."
1001808-10 = "S-será que isso foi um incômodo...?"
1001808-11 = "[s] \"Não, eu adoro parques de diversões.\""
1001808-12 = "Que bom... #nEu estava um pouco preocupada se seria um incômodo convidar o Sensei, que é tão ocupado..."
1001808-13 = "E-então, hoje, vamos nos divertir andando nos brinquedos juntos...!"
1001808-14 = "[s] \"Qual brinquedo você gosta, Yuzu?\""
1001808-15 = "S-se for com o Sensei, qualquer um serve, mas... é que... eu ainda tenho medo de muita gente..."
1001808-16 = "S-se possível, prefiro um brinquedo que não tenha tanta gente por perto..."
1001808-17 = "[s1] \"Então vamos na roda-gigante.\"\n[s2] \"Então vamos na montanha-russa.\""
1001808-18 = "Ah, boa ideia...! A roda-gigante tem menos gente e dá para ver o parque inteiro lá de cima..."
1001808-20 = "É por aqui, Sensei. Vou te guiar...!"
1001808-21 = "E-eh, m-montanha-russa? A fila da montanha-russa é grande, tem muita gente e, acima de tudo, é assustadora, não é...!?"
1001808-22 = "S-Sensei, espere! Não me deixe para trás...!"
1001808-24 = "Depois disso, passei o tempo me divertindo com a Yuzu nos brinquedos e comendo."
1001808-26 = "Ufa... Hoje foi divertido, obrigada."
1001808-27 = "O parque de diversões é um lugar divertido sempre que venho, mas hoje, por ter vindo com o Sensei, foi mais divertido do que nunca."
1001808-28 = "[s] \"Eu também me diverti, obrigado.\""
1001808-29 = "E então, a-ah..."
1001808-30 = "Antes de ir embora... eu tenho um presente para te entregar, Sensei..."
1001808-31 = "...O presente não é o passe livre do parque de hoje...?"
1001808-32 = "N-não é isso...!"
1001808-33 = "A-aquele... eu só pedi para vir porque queria brincar com o Sensei..."
1001808-34 = "Eu comprei presentes para as outras integrantes do clube, mas não sabia o que dar para o Sensei, que é um adulto. Pensei muito e não conseguia decidir... então, depois de muito refletir, preparei isto..."
1001808-40 = "Para o Sensei usar quando quiser..."
1001808-41 = "...É o \"Passe Livre da Yuzu\"!"
1001808-45 = "[wa:1500]― Se não fosse [wa:550]com o Sensei... [wa:1500]eu acho que não [wa:800]teria conseguido."
1001808-48 = "[wa:1100]― Eu só consegui [wa:750]dar presentes para todas [wa:500]graças [wa:1350]ao Sensei."
1001808-51 = "[wa:1500]― Assim como o Sensei [wa:520]me ajudou..."
1001808-53 = "― Se chegar um momento em que o Sensei [wa:800]precisar de mim, [wa:680]por favor, [wa:1820]me peça [wa:1000]qualquer coisa."
1001808-56 = "[wa:500]― ...[wa:1300]Eu certamente [wa:1550]vou retribuir o favor."
1001808-59 = "...Fufu. Fico feliz que tenha gostado."
1001808-60 = "Se eu usar este passe livre, posso pedir qualquer coisa para a Yuzu...? #nS-sim, claro, é para retribuir o favor..."
1001808-61 = "Q-qualquer, c-coisa..."
1001808-62 = "O-o que você está pensando...! E-eu não entreguei com essa intenção, quer dizer...!"
1001808-63 = "É, é um passe livre, mas...! C-coisas estranhas, nem pensar...! Absolutamente não...!"
1001808-65 = "..."
1001808-66 = "...N-não pode... tá bom...?"
