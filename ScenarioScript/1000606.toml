[translation]
1000606-1 = "Tratamento gentil"
1000606-2 = "Academia Gehenna - Enfermaria"
1000606-4 = "……"
1000606-5 = "[s] \"Iori, você está bem?\""
1000606-6 = "Ah! V-você me assustou. Achei que fosse outra pessoa, mas é o Sensei."
1000606-7 = "Se o ferimento é grave?#nAh, estou bem."
1000606-8 = "Como faço parte do Comitê Disciplinar, esse tipo de ferimento é comum. Não se preocupe."
1000606-9 = "Desinfetar?#nMuito pelo contrário, já terminei todo o tratamento antes mesmo de você chegar."
1000606-10 = "……"
1000606-11 = "Bem... é que, como não consigo alcançar minhas costas... não consegui enfaixar direito."
1000606-12 = "Se não se importar, poderia enfaixar para mim?"
1000606-13 = "Este uniforme é difícil de abrir e fechar nas costas... feche os olhos um pouco."
1000606-16 = "……Não pense em nada estranho."
1000606-22 = "Pronto, pode abrir os olhos."
1000606-25 = "[wa:500]— Por que[wa:500] essa cara? [wa:1500]Você não está pensando em nada estranho, está?"
1000606-28 = "[wa:500]— Até quando vai ficar olhando? [wa:1200]Anda logo."
1000606-31 = "— Nnn... [wa:1300]Ngh, [wa:1200]hau..."
1000606-33 = "— Se doeu? [wa:3000]Ge, [wa:500]uma integrante do Comitê Disciplinar de Gehenna [wa:1200]não sentiria dor por causa disso!"
1000606-36 = "— É só que... [wa:1000]foi um pouco [wa:1000]de cócegas."
1000606-39 = "[wa:500]— O que você está fazendo? [wa:1000]A bandagem vai soltar."
1000606-42 = "[wa:500]— Se for você, Sensei... [wa:2000]eu não me importo [wa:1200]que suas mãos me toquem."
1000606-44 = "— Termine [wa:1300]de fazer isso direito."
1000606-47 = "Depois disso, enfaixei o ferimento e a ajudei a arrumar a roupa."
1000606-49 = "……Obrigada por me ajudar."
1000606-50 = "Sempre achei que você fosse um adulto estranho, mas... você sabe ser sério quando precisa."
1000606-51 = "Disse que vai me ajudar da próxima vez que eu me machucar?"
1000606-52 = "Ba-boba! Eu não vou me machucar de propósito só para receber tratamento!"
1000606-57 = "Mas... se houver uma próxima vez, então... conto com você."
1000606-59 = "Iori saiu da enfermaria com uma expressão aliviada."
