[translation]
1000606-1 = "優しい治療"
1000606-2 = "ゲヘナ学園・保健室"
1000606-4 = "……"
1000606-5 = "[s] \"イオリ、大丈夫？\""
1000606-6 = "わっ！び、びっくりした。誰かと思ったら先生か。"
1000606-7 = "傷はひどくないかって？#nああ、大丈夫。"
1000606-8 = "風紀委員会の活動をしてると、これぐらいのケガはよくあることだから。気にしないで。"
1000606-9 = "消毒？#n消毒どころか、もう先生が来る前に治療は全部終わったよ。"
1000606-10 = "……。"
1000606-11 = "えっと……でも、背中に手が届かないせいで……ちゃんと包帯を巻けてなくて。"
1000606-12 = "もしよかったら、先生が代わりに包帯、巻いてくれないか？"
1000606-13 = "この制服、後ろ側の開け閉めが不便で……ちょっと目を閉じてて。"
1000606-16 = "……変なこと考えるなよ。"
1000606-22 = "うん、目、開けてもいい。"
1000606-25 = "[wa:500]― なに、[wa:500]その表情は。[wa:1500]変なこと考えてないよな？"
1000606-28 = "[wa:500]― いつまで見てるんだ？[wa:1200]早くして。"
1000606-31 = "― んんっ……[wa:1300]んぅっ、[wa:1200]はうっ……。"
1000606-33 = "― 痛かったか、って？[wa:3000]げ、[wa:500]ゲヘナの風紀委員が[wa:1200]これぐらいで痛がるはずないだろ！"
1000606-36 = "― ただ……[wa:1000]少し、[wa:1000]くすぐったかっただけ。"
1000606-39 = "[wa:500]― 何やってるんだ、[wa:1000]包帯がほつれる。"
1000606-42 = "[wa:500]― 先生だったら……[wa:2000]手が触れるぐらいなら[wa:1200]気にしないから。"
1000606-44 = "― ちゃんと、[wa:1300]最後までやって。"
1000606-47 = "その後、包帯を巻いて服を整えてあげた。"
1000606-49 = "……手伝ってくれて、ありがとう。"
1000606-50 = "いつもは変な大人だと思ってたけど……真面目な時は真面目なんだな。"
1000606-51 = "次に怪我した時もしてあげるから心配するな、って？"
1000606-52 = "ばっ、治療が受けたくてわざと怪我するわけないだろ！"
1000606-57 = "でも……もし次回があったら、その……よろしく。"
1000606-59 = "イオリはすっきりした顔で保健室から出て行った。"
