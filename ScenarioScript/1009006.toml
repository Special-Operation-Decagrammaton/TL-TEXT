[translation]
1009006-1 = "あなたのためのお祭り"
1009006-4 = "わぁ～！先生！"
1009006-5 = "[s1] \"あ、こんにちは。ウミカ。\"\n[s2] \"なんだか普段より……元気いっぱい、だね？\""
1009006-8 = "こんにちは、先生！#n元気そう……ですか？自分ではよくわかりませんが……。"
1009006-9 = "いつもよりテンションが高い、ですか？#nうーん……それは先生の気のせいじゃないですかね？えへへ。"
1009006-10 = "それで、今日こうして先生をお呼びした理由は――"
1009006-11 = "[s] \"理由は……！\""
1009006-12 = "まだ、秘密です～！"
1009006-13 = "[s] \"秘密かあ……。\""
1009006-14 = "そ、そんなにガッカリしないでください！"
1009006-15 = "あの……ですね、先生。"
1009006-16 = "今から……私は、音を立てないように裏口から外に出ます。"
1009006-17 = "先生は10数えたあと――"
1009006-18 = "ゆっくり、私についてきてください。いいですか？"
1009006-19 = "それでは……私は先に行きます！"
1009006-24 = "（ウミカは静かに裏口の方へ向かった……）"
1009006-28 = "（頭の中で10を数える……1、2、3……）"
1009006-32 = "[ns] （裏口に行く）"
1009006-38 = "[wa:830]― [log=우미카]お祭りへようこそ、[wa:1520]先生！[/log]"
1009006-41 = "[wa:250]― [log=우미카]えへへ。[wa:1390]どうですか？[/log]"
1009006-42 = "[wa:1520]― [log=우미카]今までずっと準備していたのは……[wa:2900]全部、[wa:1400]この瞬間のためでした！[/log]"
1009006-45 = "[wa:530]― [log=우미카]誰にも知らせてないし、[wa:1880]誰も招待していません。[/log]"
1009006-48 = "[wa:600]― [log=우미카]このお祭りは……[wa:2430]先生のためのものですから！[/log]"
1009006-51 = "[wa:370]― [log=우미카]他に誰もいない、[wa:2260]私と先生だけのお祭り……[/log]"
1009006-52 = "[wa:3120]― [log=우미카]ちょっと恥ずかしいですが……[wa:2880]気に入ってくれたら[wa:1710]嬉しいです！[/log]"
1009006-56 = "この前、仰ってましたよね。#nシャーレのお仕事で、なかなかお祭りに行く時間がないと……。"
1009006-57 = "[s] \"それで……このお祭りを準備してくれたの？\""
1009006-58 = "はい。シャーレのお仕事で、大きなお祭りを回る時間が取れなくても……#n先生ひとりのための小さなお祭りなら楽しんでもらえるんじゃないかって。"
1009006-59 = "時間的にもそうですが、これなら先生のお仕事の一環になりますし……。"
1009006-60 = "[s] \"「いいアイデア」ってこのことだったんだね。\""
1009006-61 = "えへへ、その通りです！"
1009006-62 = "先生！せっかくのお祭りですから、私がすみずみまでご案内します！"
1009006-63 = "まずは、この「せんせい団扇」からご覧ください！"
1009006-64 = "[s] \"う、うん……！たしかに書かれているね。「[USERNAME]」って……。\""
1009006-65 = "こちらには「せんせい串焼き」もあるんですよ！食べてみてください！"
1009006-66 = "[s] \"普通の串焼きじゃないんだね……？\""
1009006-67 = "もちろんです！こちらの串焼きはですね……。#nこれまで百夜堂で先生が注文したメニューを元に――"
1009006-68 = "先生のお好みのソースを厳選して！焼いたものなんですっ！"
1009006-69 = "次は「せんせいお好み焼き」を作りますね！#nお好み焼きは本来、自分の好みの具材を入れて焼くものですから――"
1009006-70 = "つまり、先生の好みの具材と焼き加減で作ったら……。#nそれが、「せんせいお好み焼き」になるってことなんです！"
1009006-71 = "[s] \"百夜堂で、好みを把握されてる！\""
1009006-72 = "えへへ。百夜堂のサービスを甘く見ちゃダメですからねっ！"
1009006-73 = "それに、先生のお写真を使った「せんせい綿菓子」や「せんせいヨーヨー釣り」、#n「せんせい射的」、ほかにも……！"
1009006-89 = "[ns] \"嬉しいけど、ちょっと照れるかも。\""
1009006-91 = "羽目を外しても大丈夫ですよ！ここには私たちふたりだけですから！#nあ、写真も撮ってみませんか？"
1009006-96 = "それに！最後にはとっても特別なメニューも用意してますよ！"
1009006-101 = "どうですか、先生？楽しんでいただけましたか？#n私が準備した「先生のためのお祭り」……。"
1009006-102 = "[s] \"ずっと記憶に残り続けると思う……。\""
1009006-103 = "ですよね、ですよね？"
1009006-107 = "とっても嬉しいです。私……準備している間もずっと楽しくて――"
1009006-108 = "私も、このお祭りのこと、ずっとずっと記憶に残ると思います……。"
1009006-109 = "[s3] \"……うん。特別な思い出になったね。\"\n[s4] \"ありがとう、ウミカ。今日のことは忘れないよ。\""
1009006-115 = "本当……ですか？"
1009006-116 = "えへへっ。でも……まだ終わりじゃないんですよ。"
1009006-117 = "「先生のためのお祭り」は、えっと、ほぼ終わりに近づきましたけど！#nまだ一大イベントが残っているんです！"
1009006-118 = "[s] \"まだ何か準備してくれてるの？\""
1009006-119 = "はい！空を見てください！先生。"
1009006-127 = "[ns] \"花火まで準備してくれてたんだ……。\""
1009006-128 = "はい！お祭りの締めは、やっぱり花火ですから！"
1009006-134 = "あの……先生？"
1009006-135 = "[s] \"うん？\""
1009006-137 = "花火……お隣に座って見ても、いいですか……？"
1009006-142 = "……ありがとうございます。えへへ……。"
1009006-146 = "（ウミカはそっと隣に腰を下ろした）"
1009006-147 = "（そうして肩を並べ、2人で打ち上げ花火を眺めた……）"
