[translation]
84303400200-5 = "A análise do jogo foi concluída."
84303400200-6 = "Encontrei vestígios de que o código foi alterado. É obra de um hacker habilidoso o suficiente para não ser notado pelo Departamento de Desenvolvimento de Jogos."
84303400200-7 = "Foi engenhosamente estruturado para causar o pior resultado possível, mantendo-se exatamente no limite das regras do código."
84303400200-8 = "Como o jogo já não era fácil por natureza, é o suficiente para ferir o coração de alguém."
84303400200-9 = "O horário em que o código foi alterado também coincide com as declarações delas. Pelo visto, o Departamento de Desenvolvimento de Jogos realmente não teve envolvimento."
84303400200-10 = "Vou investigar o jogo um pouco mais."
84303400200-11 = "Sinto que ainda posso encontrar algo."
