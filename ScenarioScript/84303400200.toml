[translation]
84303400200-5 = "ゲームの解析が完了したわ。"
84303400200-6 = "コードが改変された形跡を見つけたわ。ゲーム開発部では気づけない程度には腕の立つハッカーの犯行よ。"
84303400200-7 = "コードのルールに反さないギリギリのラインで最悪の結果が出るよう、巧妙に組まれている。"
84303400200-8 = "もともと難易度は低くないゲームだから、人の心を傷つけるには十分ね。"
84303400200-9 = "コードが改変された時間も、彼女たちの発言と一致する。やはりゲーム開発部は無関係だったようね。"
84303400200-10 = "もう少しゲームを調べてみるわ。"
84303400200-11 = "まだ何か見つかりそうな気がするの。"
