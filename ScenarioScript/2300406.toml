[translation]
2300406-1 = "Algo que não se pode mostrar"
2300406-2 = "Schale - Em frente ao estacionamento de bicicletas"
2300406-4 = "Ah... que droga. Parece que o motor foi completamente destruído."
2300406-5 = "Eu o deixei de lado por um tempo para os testes de condução autônoma, mas não esperava que quebrasse de forma tão espetacular..."
2300406-6 = "...Não quero nem pensar, mas, só porque não tem nada para consertar, Sensei, você não está..."
2300406-7 = "[s1] \"Eu não conseguiria vencer a Ra-chan!\"\n[s2] \"É um mal-entendido! Falsa acusação!\""
2300406-8 = "Hehe, é brincadeira. A menos que fosse uma força descomunal, seria impossível quebrar a Ra-chan."
2300406-9 = "Hehe, é brincadeira. A menos que fosse uma força descomunal, seria impossível quebrar a Ra-chan."
2300406-10 = "Dito isso, nesse estado, vai ser difícil levar a Ra-chan até o Millennium, então preciso consertar o básico por aqui..."
2300406-11 = "Sensei, poderia me emprestar um depósito vazio do Schale?#nEu trouxe as ferramentas, então só preciso que me ceda o espaço."
2300406-12 = "[s] \"Então, posso ficar aqui do lado vendo você consertar?\""
2300406-13 = "...Já que estou pedindo um favor, não posso recusar."
2300406-14 = "Ah, faça como quiser. Mas, em troca, mantenha uma distância segura, pois é perigoso."
2300406-15 = "[s] \"Entendido!\""
2300406-19 = "Eu e Utaha levamos a Ra-chan quebrada para o depósito."
2300406-22 = "[wa:1200]― [log=우타하]Vejamos... [wa:1500]hum, [wa:1000] o eixo está solto.[/log]"
2300406-24 = "[wa:100]― [log=우타하]Isso significa que [wa:700] o rolamento...[/log]"
2300406-27 = "― [log=우타하]É, [wa:800] talvez [wa:700] seja necessário [wa:800] trocar as peças.[/log]"
2300406-30 = "[wa:900]― [log=우타하]...Sensei, [wa:1500] isso é [wa:800] interessante de assistir?[/log]"
2300406-32 = "[wa:400]― [log=우타하]Se para o Sensei está tudo bem, [wa:1300] eu não me importo...[/log]"
2300406-35 = "[wa:800]― [log=우타하]Como envolve um certo perigo,[/log]"
2300406-37 = "― [log=우타하]eu recomendo que [wa:600] fique sentado ali enquanto observa...[/log]"
2300406-40 = "― [log=우타하]Por aqui [wa:600] há pedaços de metal afiados espalhados por toda parte,[/log]"
2300406-42 = "― [log=우타하]o cheiro de óleo é forte e, [wa:1500] além disso...[/log]"
2300406-45 = "― [log=우타하]seu rosto [wa:1000] vai ficar cheio de suor e fuligem, [wa:1300] então...[/log]"
2300406-48 = "[wa:1200]― [log=우타하]Não, [wa:900] esqueça... [wa:2000] ignore o que eu disse agora.[/log]"
2300406-51 = "[wa:100]― [log=우타하]...Entendo, [wa:700] como eu pensava.[/log]"
2300406-53 = "― [log=우타하]Falta óleo lubrificante e [wa:1300] o rolamento parece estar desgastado.[/log]"
2300406-56 = "[wa:100]― [log=우타하]Poderia pegar aquela chave inglesa [wa:1000] ali para mim?[/log]"
2300406-59 = "[wa:400]― [log=우타하]Ah... [wa:800] desculpe, [wa:1100] isso foi só,[/log]"
2300406-61 = "[wa:100]― [log=우타하]força do hábito, [wa:1000] acabei pedindo...[/log]"
2300406-64 = "[wa:100]― [log=우타하]...Ainda assim, é mais eficiente [wa:1600] ter alguém ajudando ao lado [wa:1400] e,[/log]"
2300406-66 = "[wa:100]― [log=우타하]não posso negar que [wa:1400] isso melhora o meu ânimo.[/log]"
2300406-69 = "― [log=우타하]Sensei, [wa:800] seu rosto vai ficar todo sujo de fuligem, mas...[/log]"
2300406-71 = "― [log=우타하]Poderia me ajudar?[/log]"
2300406-74 = "Em frente ao Schale"
2300406-75 = "Ufa... graças ao Sensei, o conserto terminou mais rápido do que eu esperava."
2300406-76 = "Se o Sensei não tivesse me ajudado, talvez eu não tivesse terminado nem a noite toda. Obrigado."
2300406-77 = "Hm? Então, da próxima vez, você quer vir ao Clube de Engenharia para me ver consertando as coisas... é isso?"
2300406-78 = "Hmm, isso é..."
2300406-79 = "Bem, não dá para ficar tentando manter a pose para sempre, não é?#nAh, tudo bem, pode vir."
2300406-80 = "Aliás, é melhor você lavar o rosto depois de mexer com máquinas."
2300406-81 = "O rosto do Sensei está cheio de fuligem agora, e está com uma cara bem engraçada."
2300406-82 = "Hehe. Então até mais, Sensei."
