[translation]
2300406-1 = "見せられないもの"
2300406-2 = "シャーレ・駐輪場前"
2300406-4 = "ああ……参ったね。エンジンが完全にやられてるようだ。"
2300406-5 = "自律走行試験のためにしばらく放置していたけれど、ここまで派手に故障するとは……。"
2300406-6 = "……まさかとは思うが、修理する物がないからといって、先生……。"
2300406-7 = "[s1] \"私じゃ雷ちゃんには勝てないよ！\"\n[s2] \"誤解！冤罪！\""
2300406-8 = "ふふ、冗談だよ。よっぽどの力でないと、雷ちゃんを壊すなんてことはできないからね。"
2300406-9 = "ふふ、冗談だよ。よっぽどの力でないと、雷ちゃんを壊すなんてことはできないからね。"
2300406-10 = "それにしても、この状態ではミレニアムまで雷ちゃんを連れて行くのも難しいし、この辺りで基礎的な部分を直さないと……。"
2300406-11 = "先生、シャーレの空いてる倉庫を貸してくれるかい？#n工具は持ってきたから場所だけ貸してもらえれば幸いだ。"
2300406-12 = "[s] \"じゃあ、隣で修理してるところを見ててもいい？\""
2300406-13 = "……場所を借りる立場で、断ることはできないな。"
2300406-14 = "ああ、好きにしてくれ。その代わり、危ないからちゃんと距離を取っておいてほしい。"
2300406-15 = "[s] \"分かった！\""
2300406-19 = "ウタハと二人で、壊れた雷ちゃんを倉庫に移した。"
2300406-22 = "[wa:1200]― [log=우타하]どれどれ……[wa:1500]ふむ、[wa:1000]軸周りが緩くなっているな。[/log]"
2300406-24 = "[wa:100]― [log=우타하]ということは、[wa:700]ベアリングが……。[/log]"
2300406-27 = "― [log=우타하]うん、[wa:800]もしかしたら[wa:700]部品の交換が[wa:800]必要かもしれないね。[/log]"
2300406-30 = "[wa:900]― [log=우타하]……先生、[wa:1500]これは、[wa:800]見ていて面白いかい？[/log]"
2300406-32 = "[wa:400]― [log=우타하]先生が良いのであれば、[wa:1300]別に構わないのだけど……。[/log]"
2300406-35 = "[wa:800]― [log=우타하]多少なりとも危険が伴うから、[/log]"
2300406-37 = "― [log=우타하]あっちの方で[wa:600]座りながら見るのをお勧めするが……。[/log]"
2300406-40 = "― [log=우타하]この辺りは[wa:600]鋭利な鉄くずがあちこちに散らばるし、[/log]"
2300406-42 = "― [log=우타하]油の匂いもひどいし、[wa:1500]それに……。[/log]"
2300406-45 = "― [log=우타하]顔が、[wa:1000]汗と煤だらけになる、[wa:1300]から……。[/log]"
2300406-48 = "[wa:1200]― [log=우타하]いや、[wa:900]何でもない……[wa:2000]今のは忘れてくれ。[/log]"
2300406-51 = "[wa:100]― [log=우타하]……なるほど、[wa:700]思った通り。[/log]"
2300406-53 = "― [log=우타하]潤滑油が足りなくて、[wa:1300]ベアリング部分が摩耗しているみたいだ。[/log]"
2300406-56 = "[wa:100]― [log=우타하]そっちにあるスパナ、[wa:1000]取ってくれるかい？[/log]"
2300406-59 = "[wa:400]― [log=우타하]あ……[wa:800]すまない、[wa:1100]今のはその、[/log]"
2300406-61 = "[wa:100]― [log=우타하]いつもの癖で[wa:1000]つい……。[/log]"
2300406-64 = "[wa:100]― [log=우타하]……とはいえやはり、[wa:1600]隣で誰かが手伝ってくれた方が[wa:1400]効率的だし、[/log]"
2300406-66 = "[wa:100]― [log=우타하]気分も高揚することは[wa:1400]否定できなさそうだ。[/log]"
2300406-69 = "― [log=우타하]先生も、[wa:800]顔が煤だらけになってしまうだろうけど……[/log]"
2300406-71 = "― [log=우타하]手伝ってくれるかい？[/log]"
2300406-74 = "シャーレ前"
2300406-75 = "ふう……先生のおかげで思ったより早く修理が終わったよ。"
2300406-76 = "先生が手伝ってくれなかったら、一晩中修理をしても終わらなかったかもしれない、ありがとう。"
2300406-77 = "ん？じゃあ次からまた修理する姿を見に、エンジニア部に来てもいいか……って？"
2300406-78 = "うーん、それは……。"
2300406-79 = "まあ、いつまでも格好つけたままというわけにもいかないだろうからね。#nああ、構わないよ。"
2300406-80 = "ところで、機械を触った後は顔を洗った方が良い。"
2300406-81 = "先生の顔が煤だらけで今、なかなか面白いことになっているからね。"
2300406-82 = "ふふっ。じゃあまた、先生。"
