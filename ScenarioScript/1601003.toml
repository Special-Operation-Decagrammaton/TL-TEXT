[translation]
1601003-1 = "マイスターの熱烈な応援"
1601003-4 = "シャーレ・オフィス"
1601003-8 = "（データを復旧するために、夜遅くまで作業していたところ……）"
1601003-16 = "[ns1] \"……？\"\n[ns2] \"……こんな時間に誰？\""
1601003-21 = "……えっと。"
1601003-27 = "……せ、先生。"
1601003-28 = "その……これは……。"
1601003-29 = "先生が……応援してほしいって、言ってたから……。"
1601003-30 = "[s] \"……だからチアリーダーの格好を？\""
1601003-31 = "うん……先生を応援するため、だから。"
1601003-32 = "働いてる人は、みんなその場に適した格好をするよね。"
1601003-33 = "暑い環境で働く人は放熱服を、粉塵が多い場所で働く人は防塵服が必要なのと一緒で……。"
1601003-34 = "……応援する人はチアリーダーの服を着る。簡単な原理だよ。"
1601003-35 = "[s] \"……これって大運動会の時に着てた衣装？\""
1601003-36 = "うん、そうだよ。"
1601003-37 = "私がコスプレ始めたての頃に作ったもので……正直クオリティに自信はないけど……。"
1601003-38 = "前も言ったみたいに、コスプレで大事なのはキャラクターになりきることだから。"
1601003-39 = "この前の大運動会の時は準備がほとんどできなかったから、ちゃんと頭を切り替えられなくて……"
1601003-40 = "でも先生を応援したい気持ちでいっぱいの今なら、本物のチアリーダーになれるはず。"
1601003-47 = "だから……そこで私の応援を見ててね。"
1601003-50 = "[wa:150]― フレー、[wa:1200]フレー……[wa:1250]先生！"
1601003-52 = "― 行け行け、[wa:1250]勝て勝て、[wa:1500]先生……"
1601003-55 = "[wa:200]― ん？"
1601003-57 = "― 何に勝つための[wa:1400]応援かって？"
1601003-60 = "― 何だろう……？"
1601003-63 = "― 先生を[wa:850]苦しめる[wa:900]業務、[wa:1050]とか。"
1601003-65 = "― 先生としての[wa:1050]責任[wa:1050]とか……？"
1601003-68 = "[wa:750]― 気がかりなら、"
1601003-70 = "― 応援のフレーズを[wa:1350]ちょっと[wa:400]変えようか……？"
1601003-73 = "[wa:750]― 頑張れ、[wa:1150]頑張れ……[wa:1100]先生！"
1601003-76 = "[wa:500]― （……なんだか[wa:1200]おかしい。\n"
1601003-79 = "― 先生、[wa:1300]元気になるどころか、"
1601003-81 = "― あんまり[wa:350]集中できて[wa:800]なさそうに[wa:650]見える）"
1601003-84 = "[wa:750]― （……もしかして[wa:1500]今の私、"
1601003-86 = "― 結構[wa:600]とんでもないことを[wa:650]しちゃってるのかも……？）"
1601003-91 = "……どうかな、先生。"
1601003-92 = "私の応援を見て、やる気は出た？"
1601003-96 = "……えっ、逆に集中力が落ちちゃった？"
1601003-97 = "ん……ごめん、それは想像できなかった。"
1601003-98 = "……たしかにデスク作業は画面を見る必要があるから、派手な応援は役に立たないね。"
1601003-99 = "チアリーダーは事務所で働くわけじゃないし……。"
1601003-100 = "先生を助けたくて準備したのに、邪魔しちゃうなんて……。"
1601003-101 = "もしかしたら私は、まだまだ真のマイスターにはなれないのかも……。"
1601003-102 = "[s] \"ヒビキの気持ちは十分伝わったよ。\""
1601003-106 = "[ns3] \"それに、疲労のせいで集中力が落ちてるだけだと思うよ。\"\n[ns4] \"……コーヒーを一杯お願いできるかな？\""
1601003-111 = "……それなら任せて。"
1601003-112 = "エンジニア部で徹夜する時は、よくコーヒーを淹れてるからね。"
1601003-116 = "じゃあ、まずはコーヒーの風味を最大限引き出すために、高圧抽出装置を作るところから……"
1601003-117 = "[s] \"……普通のコーヒーで大丈夫だよ。\""
1601003-118 = "……分かった。"
1601003-119 = "せめて熱烈な応援の気持ちを込めて、最高の一杯を淹れるね。"
1601003-121 = "（ヒビキの熱烈な応援のおかげで、予想より早く全てのデータを復旧できたが……)"
1601003-122 = "（深夜にチアリーダー姿の生徒と二人きりでいたという噂が広がり、しばらく市民から変な誤解を招いてしまった……) "
