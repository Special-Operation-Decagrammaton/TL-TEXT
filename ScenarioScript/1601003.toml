[translation]
1601003-1 = "O apoio caloroso da Meister"
1601003-4 = "Escritório do Schale"
1601003-8 = "（Enquanto trabalhava até tarde da noite para recuperar os dados...）"
1601003-16 = "[ns1] \"……？\"\n[ns2] \"……Quem está aí a essa hora?\""
1601003-21 = "……Ah, oi."
1601003-27 = "……Se, Sensei."
1601003-28 = "Sobre isso…… é que……."
1601003-29 = "Como você disse que queria ser apoiado, Sensei……."
1601003-30 = "[s] \"……Então, por isso essa roupa de líder de torcida?\""
1601003-31 = "Sim…… é para apoiar você, Sensei."
1601003-32 = "Quem trabalha usa roupas adequadas para a ocasião, não é?"
1601003-33 = "É como quem trabalha em ambientes quentes precisa de roupas térmicas, ou quem trabalha em locais com muita poeira precisa de roupas de proteção……."
1601003-34 = "……Quem apoia usa roupas de líder de torcida. É um princípio simples."
1601003-35 = "[s] \"……Essa é a roupa que você usou no Grande Festival Esportivo?\""
1601003-36 = "Sim, é essa mesma."
1601003-37 = "Foi uma das primeiras coisas que fiz quando comecei a fazer cosplay…… honestamente, não tenho muita confiança na qualidade……."
1601003-38 = "Como eu disse antes, o mais importante no cosplay é se tornar o personagem."
1601003-39 = "No último Grande Festival Esportivo, eu quase não tive tempo de me preparar, então não consegui entrar no personagem direito……"
1601003-40 = "Mas agora, com o coração cheio de vontade de te apoiar, Sensei, com certeza serei uma líder de torcida de verdade."
1601003-47 = "Então…… fique aí e veja o meu apoio."
1601003-50 = "[wa:150]― Vamos, [wa:1200]vamos…… [wa:1250]Sensei!"
1601003-52 = "― Vai, vai, [wa:1250]vença, vença, [wa:1500]Sensei……"
1601003-55 = "[wa:200]― Hm?"
1601003-57 = "― Quer saber para vencer o quê [wa:1400]eu estou torcendo?"
1601003-60 = "― O que será……?"
1601003-63 = "― Talvez contra o [wa:850]trabalho [wa:900]que te atormenta, [wa:1050]Sensei."
1601003-65 = "― Ou contra as [wa:1050]responsabilidades [wa:1050]de ser um Sensei……?"
1601003-68 = "[wa:750]― Se isso te preocupa,"
1601003-70 = "― Quer que eu [wa:1350]mude um pouco [wa:400]a frase de apoio……?"
1601003-73 = "[wa:750]― Força, [wa:1150]força…… [wa:1100]Sensei!"
1601003-76 = "[wa:500]― （……Tem algo [wa:1200]estranho.\n"
1601003-79 = "― Sensei, [wa:1300]em vez de ficar animado,"
1601003-81 = "― Parece que você [wa:350]não está conseguindo [wa:800]se concentrar [wa:650]nada）"
1601003-84 = "[wa:750]― （……Será que [wa:1500]agora,"
1601003-86 = "― Eu estou fazendo [wa:600]algo absurdo……?）"
1601003-91 = "……O que achou, Sensei?"
1601003-92 = "Vendo o meu apoio, você se sentiu motivado?"
1601003-96 = "……Ah, pelo contrário, sua concentração caiu?"
1601003-97 = "Hm…… desculpe, eu não tinha imaginado isso."
1601003-98 = "……É verdade, o trabalho de escritório exige olhar para a tela, então um apoio chamativo não ajuda muito."
1601003-99 = "Líderes de torcida não trabalham em escritórios, afinal……."
1601003-100 = "Eu queria te ajudar e me preparei para isso, mas acabei atrapalhando……."
1601003-101 = "Talvez eu ainda não consiga ser uma verdadeira Meister……."
1601003-102 = "[s] \"O sentimento da Hibiki foi muito bem recebido.\""
1601003-106 = "[ns3] \"Além disso, acho que minha concentração caiu apenas por causa do cansaço.\"\n[ns4] \"……Pode me trazer uma xícara de café?\""
1601003-111 = "……Pode deixar comigo."
1601003-112 = "Quando passamos a noite em claro no Clube de Engenharia, eu costumo fazer café."
1601003-116 = "Então, primeiro, para extrair o máximo de sabor do café, vou começar construindo um dispositivo de extração de alta pressão……"
1601003-117 = "[s] \"……Um café comum já serve.\""
1601003-118 = "……Entendido."
1601003-119 = "Pelo menos, vou preparar a melhor xícara possível, colocando todo o meu entusiasmo na torcida."
1601003-121 = "(Graças à torcida fervorosa da Hibiki, consegui recuperar todos os dados mais rápido do que o esperado, mas...)"
1601003-122 = "(O boato de que eu estava a sós com uma aluna vestida de líder de torcida no meio da madrugada se espalhou, e acabei atraindo alguns mal-entendidos estranhos dos cidadãos por um tempo...)"
