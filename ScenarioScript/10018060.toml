[translation]
10018060-1 = "Episódio 6; Esgotado? Não pode ser..."
10018060-2 = "（Para encontrar ingredientes, o grupo começou a percorrer o centro comercial que foi ocupado (?) pela Nyao Food）"
10018060-3 = "（Era um centro comercial comum, sem características marcantes）"
10018060-8 = "Este centro comercial está bem movimentado, não é?"
10018060-9 = "Bem, é fim de ano, então talvez seja natural."
10018060-10 = "De alguma forma, até nós acabamos ficando animadas, não é?"
10018060-11 = "[s] \"É verdade. Obrigado por se oferecerem para ajudar a escolher os ingredientes.\""
10018060-12 = "Não há de quê, é a nossa rotina diária no Clube de Merenda!"
10018060-13 = "Na verdade, é divertido fazer compras em um lugar diferente do habitual."
10018060-14 = "Ah, não que o trabalho no Clube de Merenda não seja divertido!"
10018060-15 = "Sempre que vejo a habilidade da senpai, fico impressionada e até fascinada..."
10018060-16 = "Eu mesma acabo ficando feliz."
10018060-17 = "Então, faça uma merenda mais gostosa!"
10018060-18 = "Eu sei que há vários motivos para isso, mas..."
10018060-19 = "É um fato que o sabor é ruim também★"
10018060-20 = "Uuu..."
10018060-21 = "É verdade. Como Clube de Merenda, sempre nos esforçamos para que fique gostoso, mas..."
10018060-22 = "[s] \"Izumi e Akari, obrigado por ajudarem também.\""
10018060-23 = "Sim! Eu também adoro olhar os ingredientes! Tudo parece tão gostoso!"
10018060-24 = "Mas só de olhar, dá vontade de comer... *glup*."
10018060-25 = "Eu só achei que seria preocupante se apenas a Juri estivesse trabalhando★"
10018060-26 = "Além disso, se for para carregar os ingredientes, é melhor ter mais gente."
10018060-27 = "[s] \"Fico aliviado em ouvir isso.\""
10018060-29 = "Então, vamos começar a escolher os ingredientes de verdade!"
10018060-30 = "Mesmo entre os ingredientes baratos, existem coisas deliciosas!"
10018060-35 = "Uau, este repolho parece ótimo."
10018060-39 = "A cor e o formato estão bonitos, e parece estar bem compacto por dentro."
10018060-40 = "Com licença, eu gostaria de comprar este repolho..."
10018060-41 = "Ah, sinto muito. Já esgotou."
10018060-42 = "Sim? Mas ainda tem muitos expostos aqui, não tem...?"
10018060-43 = "Recebi um contato e um pagamento agora pouco pedindo todo o estoque..."
10018060-44 = "M-mas... se for esse o caso, os outros ingredientes estão disponíveis, certo?"
10018060-45 = "Não, eles também não. Sinto muito."
10018060-46 = "Me desculpe... #nMas entenda que eu também tenho minhas circunstâncias..."
10018060-52 = "Hmm...?"
10018060-53 = "Não pode ser!"
10018060-57 = "Vamos dar uma olhada nas carnes agora."
10018060-61 = "...Esta carne de porco parece ótima!"
10018060-62 = "A cor está um vermelho bonito e a proporção de gordura não é um problema."
10018060-63 = "Já terminamos por hoje... precisa de alguma coisa?"
10018060-64 = "Ah, já?"
10018060-65 = "Toda a carne que preparamos para hoje foi vendida."
10018060-66 = "Será que... alguém fez um pagamento e reservou todo o estoque?"
10018060-67 = "Sim, você entendeu bem. Não me sinto muito bem com isso. Nunca aconteceu algo assim antes..."
10018060-68 = "Sinto muito. Da próxima vez trarei produtos melhores, então seria uma ajuda se você voltasse."
10018060-69 = "Sinto um cheiro suspeito no ar."
10018060-72 = "Também precisamos comprar molho de soja e saquê culinário, mas... estou com um mau pressentimento."
10018060-73 = "Como os temperos têm um prazo de validade longo, acho que deve haver algum estoque..."
10018060-74 = "Com licença. Gostaria de ver o molho de soja e o saquê culinário... ah, vocês também têm óleo de cozinha?"
10018060-75 = "É que pretendo fechar a loja até a próxima reposição."
10018060-79 = "Não pode ser... está esgotado?"
10018060-80 = "Sim, é isso mesmo. Sinto muito que tenha vindo até aqui para nada."
10018060-85 = "Uma vez tudo bem, mas acontecer a mesma coisa duas, três vezes...?"
10018060-86 = "Será que alguém está comprando tudo de propósito? Por quê?"
10018060-87 = "Isso é horrível!"
10018060-88 = "[s] \"Realmente, é estranho.\""
10018060-90 = "V-vamos nos recompor e procurar os próximos ingredientes!"
10018060-97 = "Estava tudo igual em todos os lugares..."
10018060-98 = "[s] \"Nem todos os produtos estavam esgotados, certo?\""
10018060-99 = "Sim, é verdade. Mas todos eles eram justamente os ingredientes que pretendíamos usar."
10018060-100 = "Com certeza estão tentando nos atrapalhar! Poxa, por quê?!"
10018060-104 = "É porque... vocês estão no nosso caminho."
10018060-109 = "[ns] \"Quem está aí?\""
10018060-116 = "Vocês se meteram onde não deviam."
10018060-117 = "Sei que não vão ouvir, mas vou deixar um aviso."
10018060-118 = "Se desistirem agora, não farei nada pior com vocês."
10018060-119 = "Nem preciso responder, mas por que está fazendo essa proposta?"
10018060-120 = "Seria um incômodo para ambos, não? Nós também estamos ocupados."
10018060-121 = "Mas, se fizermos isso, vocês vão fazer o que quiserem com o Suzume-tei, né? Isso não pode acontecer!"
10018060-122 = "Então, no fim das contas, vocês não pretendem ceder o restaurante..."
10018060-123 = "Bem, tudo bem."
10018060-124 = "Eu já esperava por essa resposta... Apareçam."
10018060-131 = "Uau! O que é isso agora!?"
10018060-132 = "Fufu, então é assim que vai ser."
10018060-134 = "A culpa é de vocês, então."
10018060-138 = "Preparem-se. Desta vez, a história é diferente."
