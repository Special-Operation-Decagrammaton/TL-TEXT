[translation]
10018060-1 = "第6話;売り切れですって？そんなわけ……"
10018060-2 = "（食材を探すため、ニャオフードに占領（？）された商店街を回ることになった一行）"
10018060-3 = "（そこは、これといった特徴のない、よくある商店街だった）"
10018060-8 = "ここの商店街は賑わってますね。"
10018060-9 = "年末年始ですから、当然かもしれませんが。"
10018060-10 = "なんだか私たちまで楽しくなってきますね？"
10018060-11 = "[s] \"そうだね。食材選びを引き受けてありがとう。\""
10018060-12 = "いえ、給食部では毎日の日課なので！"
10018060-13 = "むしろいつもと違うところでの買い物なので、楽しみですね。"
10018060-14 = "あっ、給食部の仕事が楽しくないということではないですよ！"
10018060-15 = "先輩の腕前を見てると、いつも感心することばかりで、惚れ惚れするというか……。"
10018060-16 = "私までうれしくなってくるんです。"
10018060-17 = "じゃあ、もっとおいしい給食を作ってよ！"
10018060-18 = "いろいろ心当たりはありますけど……"
10018060-19 = "味が悪いのも事実ですね★"
10018060-20 = "うう……。"
10018060-21 = "そうですね。給食部としては、いつもおいしくなるように頑張ってはいるのですが……。"
10018060-22 = "[s] \"イズミとアカリも、手伝ってくれてありがとう。\""
10018060-23 = "うん！食材を見るのも好きなんだ！どれもおいしそうだから！"
10018060-24 = "でも見てると食べたくなってくるね……ごくり。"
10018060-25 = "ジュリさんだけ仕事しているのがちょっと気になっただけですよ★"
10018060-26 = "それに食材を持ち帰るなら、人手は多いほうがいいですし。"
10018060-27 = "[s] \"そう言ってもらえると助かるよ。\""
10018060-29 = "それでは本格的に食材選びをしましょう！"
10018060-30 = "安い食材でも、おいしいものはありますよ！"
10018060-35 = "わぁ、このキャベツは良さそうです。"
10018060-39 = "色も形もきれいですし、ぎっしり中が詰まってそうですね。"
10018060-40 = "すみません、こちらのキャベツを買いたいのですが……。"
10018060-41 = "あぁ、悪いな。もう売り切れたんだ。"
10018060-42 = "はい？ですが、まだたくさん並んでいますよね……？"
10018060-43 = "さっき、在庫を全部くれって連絡と入金があったもんでね……。"
10018060-44 = "で、でも……それでしたら、他の食材は大丈夫ですよね？"
10018060-45 = "いや、そっちもなんだ。悪いね。"
10018060-46 = "申し訳ない……。#nただ、こっちにも事情があるってことを分かってくれ……。"
10018060-52 = "ふーん……？"
10018060-53 = "そんなのってないよ！"
10018060-57 = "今度はお肉を見てみましょうか。"
10018060-61 = "……こちらの豚肉が良さそうです！"
10018060-62 = "色もきれいな赤ですし、脂の割合も問題ありませんね。"
10018060-63 = "今日はもう終わったんだが……何か用かい？"
10018060-64 = "えっ、もうですか？"
10018060-65 = "今日用意した分のお肉が全部売れたんだ。"
10018060-66 = "もしかして……誰かに入金されて、在庫をすべて抑えられたということでしょうか？"
10018060-67 = "そう、よく分かったね。なんかすっきりしないんだけどな。こんなこと、今までなかったからさ……。"
10018060-68 = "すまないね。今度はもっといいものを仕入れるから、また来てくれると助かるよ。"
10018060-69 = "なんだか怪しい匂いがしますね。"
10018060-72 = "醤油と料理酒も買わないといけないのですが……嫌な予感がしますね。"
10018060-73 = "調味料は賞味期限が長いので、ある程度の在庫があると思いますが……。"
10018060-74 = "すみません。醤油と料理酒を見たいのですが……あ、サラダ油もありますか？"
10018060-75 = "それが次の仕入れまで、お店を休むつもりなんです。"
10018060-79 = "まさか……売り切れたのですか？"
10018060-80 = "はい、そうなんです。来ていただいたのに申し訳ありません。"
10018060-85 = "一度はまだしも、二度、三度と同じことが起きるって……？"
10018060-86 = "わざと誰かが買い占めてるってこと？なんで？"
10018060-87 = "ひどいよ！"
10018060-88 = "[s] \"確かに不自然だね。\""
10018060-90 = "き、気を取り直して次の食材を探しましょう！"
10018060-97 = "どこも一緒でした……。"
10018060-98 = "[s] \"全部の商品が売り切れてたわけじゃないよね。\""
10018060-99 = "そうですね。ですが、どれも私たちが使おうとしてる食材ばかりでした。"
10018060-100 = "きっと私たちの邪魔をしてるんだよ！もう、どうして！"
10018060-104 = "それは……お前らが目障りだからさ。"
10018060-109 = "[ns] \"誰だ？\""
10018060-116 = "お前らは深入りしすぎたんだ。"
10018060-117 = "言っても聞かないだろうが、忠告しておく。"
10018060-118 = "ここで手を引くなら、これ以上悪いようにはしない。"
10018060-119 = "答えるまでもないですが、どうしてそんな提案を？"
10018060-120 = "お互い面倒だろう？私たちも大変なんだ。"
10018060-121 = "でも、そしたらスズメ亭を好き勝手するんだよね？それはダメだよ！"
10018060-122 = "結局、店を譲る気はないってことだな……。"
10018060-123 = "まあ、いいだろう。"
10018060-124 = "その返事も予想してたからな。……出てこい。"
10018060-131 = "うわ！今度は何なの！？"
10018060-132 = "ふふっ、そういうことですね。"
10018060-134 = "お前たちが悪いんだからな。"
10018060-138 = "覚悟しろ。今回は一味違うぞ。"
