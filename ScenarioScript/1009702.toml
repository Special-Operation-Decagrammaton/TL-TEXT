[translation]
1009702-1 = "Explosive hazards"
1009702-2 = "（モエに連絡をもらい、海辺にやって来た）"
1009702-3 = "（すると、テントの下で退屈そうにあくびをしているモエがいた）"
1009702-7 = "ふぁああ……"
1009702-8 = "あ、先生。来てくれたんだ！"
1009702-9 = "くひひ、ずっと暇してたんだよね～。"
1009702-10 = "それじゃ、おしゃべりしよっか。"
1009702-11 = "[s] \"ほかのみんなはどうしたの？\""
1009702-12 = "作戦で出払ってるよ。"
1009702-13 = "私は後方支援できるように待機してるけど……。"
1009702-14 = "最近はみんな経験を積んできたおかげで、#n簡単な作戦なら出番がなくってさ。"
1009702-15 = "大体、ぼーっと座ってるだけでさぁ。"
1009702-16 = "[s] \"……それで話し相手を探してたんだね。\""
1009702-17 = "正解！"
1009702-18 = "いくら退屈でも、ここを離れるわけにはいかないし……。"
1009702-19 = "先生、暇かな～って思ったから、声をかけてみたってわけ。"
1009702-20 = "[s1] \"話し相手になるのは良いんだけど……。\"\n[s2] \"面白い話は特にないよ……？\""
1009702-23 = "いやいや、面白い話をする必要なんてないでしょ。"
1009702-24 = "ほら。#nたとえば最近、気になる生徒ができたとか――"
1009702-25 = "[s] （急にガールズトークが始まった……）"
1009702-26 = "それとも、気になる爆薬があるとか！#nはぁ、はぁ……。"
1009702-27 = "[s] （……ガールズトークはどこに？）"
1009702-35 = "あれ、ヴァルキューレの生徒じゃない？"
1009702-36 = "あそこの制式な水着って、なかなか露出度が高いよねぇ。"
1009702-37 = "制服が可愛いのは有名だけど、#n水着のデザインまでは可愛いとは知らなかったよ。"
1009702-38 = "[s] \"たしかに。\""
1009702-42 = "くひひっ……。"
1009702-43 = "先生、さっき視線がいやらしかったよ。"
1009702-44 = "水着姿の生徒をチラチラ見てたよね？"
1009702-45 = "[s3] \"……み、見てませんが？\"\n[s4] \"……か、勘違いじゃないかな？\""
1009702-48 = "別に否定しなくても良いのに。#nビキニの生徒がいたら、目が行くのは自然でしょ。"
1009702-49 = "ほら、ああいう水着姿を「破壊力が高い」って言うじゃない？"
1009702-50 = "巨大な爆発から目が離せないように、#n露出度の高い水着に視線が吸い寄せられるのはおかしくないよ。"
1009702-51 = "……あれ。#nそう考えると、ビキニ姿の人はみんな爆発が好きなのかも……？#nくひ、くひひっ……。"
1009702-52 = "[s] \"そ、それは違うような気が……。\""
1009702-56 = "[ns] \"仮にそうだとしたら、モエもビキニが好きってことだよね？\""
1009702-57 = "そりゃあ、もちろん！"
1009702-58 = "着ているだけで、破滅を感じられるからね！"
1009702-59 = "抵抗の大きい水中で体を動かしていると、#n水着がズレたり脱げることもあるよね。"
1009702-60 = "なのに、あんな小さい布切れだけで大事なところを隠すだなんて……。"
1009702-61 = "その不合理的かつ破滅的な状況を想像するだけで、#n我慢ができなくなるよ！"
1009702-62 = "はぁ、はぁ……！"
1009702-63 = "[s] \"と、とりあえず落ち着いて。\""
1009702-67 = "[ns5] \"だから、ラッシュガードを羽織ったりするんでしょ？\"\n[ns6] \"モエだって、上にパーカーを着てるし。\""
1009702-70 = "あぁ、これはね……。"
1009702-71 = "……パーカーの内側に、ある物を隠してるからなんだ。"
1009702-72 = "ビキニとは比較にならないほどの破壊力を持つ存在……。"
1009702-73 = "[s7] \"そ、そんなものが……。\"\n[s8] \"……まさか！？\""
1009702-76 = "ふふっ。#nたぶん、先生の想像通りで合ってるよ。"
1009702-77 = "このパーカーを脱いだら、#nみんな悲鳴を上げて混乱に陥るだろうね……。"
1009702-78 = "ああ、あぁ……想像しただけでもゾクゾクしてくる。"
1009702-79 = "ど、どうしよう先生？#n破滅的な未来を想像してたら、これを早く披露したくてたまらなくなってきちゃった！"
1009702-80 = "[s9] \"ちょっと待って！\"\n[s10] \"いったい何を隠し持ってるの！？\""
1009702-83 = "くひひっ……。#nまずは先生に見せてあげるよ。"
1009702-84 = "私から目を離さないでね。#nこのビキニよりも破壊力の高い……。"
1009702-90 = "C4爆弾だよ！"
1009702-94 = "[ns] \"……え？\""
1009702-96 = "ちょうど昨日、内緒で購入した爆薬が届いたのさ。"
1009702-97 = "この可愛らしいクォーターポンドブロックだけでも、#n戦車くらい軽く吹き飛ばせるんだよね。"
1009702-98 = "もしみんなにバレたら小うるさく言われそうだから、#n服の内側に隠してたんだけど……。"
1009702-99 = "どう、先生？#n破滅的な光景じゃない？"
1009702-100 = "上着の下には水着が待っているかと思えば、#nまさかこんなにも凶悪な物が隠されていると知った時の反応を想像したら……。#nはぁ、はぁ……！"
1009702-101 = "[s] \"……モエ。\""
1009702-102 = "ん？#nどうしたの、先生？"
1009702-107 = "きゅ、急にそんな怖い顔して……。"
1009702-108 = "[s] \"危険なので没収します。\""
1009702-109 = "なんでぇ～！？"
1009702-111 = "（その後、爆弾を没収してから、危険物の取り扱い方法を指導した）"
1009702-112 = "（……外で上着を捲り上げる行為も注意しておいた）"
