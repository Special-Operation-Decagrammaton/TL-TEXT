[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1009702-1 = "Perigos Explosivos" 
1009702-2 = "（Após receber uma mensagem da Moe, fui até a praia.）" 
1009702-3 = "（Ao chegar lá, vi a Moe embaixo de uma tenda, bocejando com cara de tédio.）" 
1009702-7 = "Fwaaah..." 
1009702-8 = "Ah, Sensei. Você veio!" 
1009702-9 = "Kuhihi, eu tava morrendo de tédio aqui~." 
1009702-10 = "Então, vamo bater um papinho." 
1009702-11 = "[s] \"Onde estão as outras meninas?\"" 
1009702-12 = "Saíram pra operação." 
1009702-13 = "Eu tô de prontidão pra dar suporte tático pela retaguarda, mas..." 
1009702-14 = "Ultimamente todo mundo ganhou bastante experiência, então...\nAcabo não tendo muito o que fazer nas operações mais simples." 
1009702-15 = "Quase sempre eu fico só sentada com cara de tacho." 
1009702-16 = "[s] \"……E foi por isso que você foi atrás de alguém para conversar.\"" 
1009702-17 = "Na mosca!" 
1009702-18 = "Não importa o quanto eu esteja entediada, não posso abandonar o meu posto..." 
1009702-19 = "Aí eu pensei 'Ah, o Sensei deve estar à toa~', então resolvi te chamar." 
1009702-20 = "[s1] \"Tudo bem eu fazer companhia para você, mas...\"\n[s2] \"Eu não tenho nenhum assunto muito interessante para falar, sabia?\"" 
1009702-23 = "Ah, qual é, não precisa ser nada interessante." 
1009702-24 = "Tipo. Manda aí...\nSe tem alguma aluna que andou chamando a sua atenção ultimamente, por exemplo――" 
1009702-25 = "[s] （E lá vamos nós para o papo de garotas de repente...）" 
1009702-26 = "Ou se tem algum explosivo novo que você tá interessado!\nHaa, haa..." 
1009702-27 = "[s] （...E lá se foi o papo de garotas.）" 
1009702-35 = "Ei, aquelas ali não são as alunas da Valkyrie?" 
1009702-36 = "Aquele traje de banho padrão delas expõe a pele pra caramba, né." 
1009702-37 = "O uniforme normal delas já é famoso por ser bonitinho,\nmas eu não sabia que o design dos trajes de banho era tão chamativo assim." 
1009702-38 = "[s] \"Realmente.\"" 
1009702-42 = "Kuhihi..." 
1009702-43 = "Sensei, você tava com um olhar bem tarado agora pouco, hein." 
1009702-44 = "Tava secando as alunas de biquíni, não tava?" 
1009702-45 = "[s3] \"...E-Eu não estava olhando pra nada!\"\n[s4] \"...T-Talvez você tenha se enganado?\"" 
1009702-48 = "Ah, não precisa se fazer de sonso.\nÉ normal os olhos irem direto pras alunas de biquíni, ué." 
1009702-49 = "Afinal de contas, o pessoal sempre diz que roupas de banho assim têm um 'alto poder de destruição', não é?" 
1009702-50 = "Da mesma forma que você não consegue tirar os olhos de uma explosão gigantesca,\nter a atenção roubada por um biquíni revelador faz todo sentido." 
1009702-51 = "...Pera aí.\nPensando por esse lado, será que todo mundo que usa biquíni ama explosões...?\nKuhi, kuhihi..." 
1009702-52 = "[s] \"A-Acho que essa lógica tá um pouquinho errada...\"" 
1009702-56 = "[ns] \"Mas seguindo a sua lógica, a Moe então deve amar biquínis também, não é?\"" 
1009702-57 = "Mas é claroooo!" 
1009702-58 = "Afinal de contas, só de usar um desses eu já consigo sentir a essência da destruição e da ruína!" 
1009702-59 = "Se você se mexe muito dentro da água com toda aquela resistência,\né muito fácil o biquíni escorregar ou sair do lugar, não é?" 
1009702-60 = "E mesmo assim, a gente confia num pedacinho minúsculo de pano pra esconder o que é mais importante..." 
1009702-61 = "Só de imaginar essa situação totalmente irracional e pronta para dar merda a qualquer segundo...\nEu perco totalmente a cabeça!" 
1009702-62 = "Haa, haa...!" 
1009702-63 = "[s] \"P-Pera aí, se acalma.\"" 
1009702-67 = "[ns5] \"Então é por isso que você está usando um moletom por cima?\"\n[ns6] \"A Moe mesmo não tirou esse casaco até agora.\"" 
1009702-70 = "Ahh, isso aqui..." 
1009702-71 = "...É porque eu tô escondendo uma coisinha por baixo do moletom." 
1009702-72 = "Algo com um poder destrutivo que um biquíni nem se compara..." 
1009702-73 = "[s7] \"A-Algo com um poder de destruição tão grande...\"\n[s8] \"...Não me diga que!?\"" 
1009702-76 = "Fufu.\nProvavelmente é exatamente o que você tá pensando, Sensei." 
1009702-77 = "Se eu tirar esse moletom agora...\nTodo mundo ia começar a gritar e a praia inteira ia mergulhar num caos absoluto..." 
1009702-78 = "Aah, aah... Só de imaginar eu já tô arrepiada." 
1009702-79 = "O-O que eu faço, Sensei?\nDe tanto imaginar um futuro totalmente caótico e em ruínas, eu tô morrendo de vontade de mostrar isso pra todo mundo logo!" 
1009702-80 = "[s9] \"Espera um pouco!\"\n[s10] \"O que diabos você tá escondendo aí embaixo!?\"" 
1009702-83 = "Kuhihi...\nVou deixar você ver primeiro, Sensei." 
1009702-84 = "Presta bem atenção em mim.\nIsso aqui tem um poder de destruição infinitamente maior que este biquíni..." 
1009702-90 = "É C4!" 
1009702-94 = "[ns] \"......Quê?\"" 
1009702-96 = "Os explosivos que eu comprei em segredo chegaram ontem mesmo, saca." 
1009702-97 = "Só com esses bloquinhos super fofos de um quarto de libra,\ndá pra mandar um tanque pelos ares brincando, sacou?" 
1009702-98 = "Se as meninas descobrissem, com certeza iam me encher o saco,\nentão eu deixei escondidinho debaixo da roupa, mas..." 
1009702-99 = "E aí, Sensei?\nÉ uma visão maravilhosamente caótica e destrutiva, não é?" 
1009702-100 = "Pensando que tinha apenas um biquíni debaixo do casaco,\nmas descobrindo que na verdade era uma arma de destruição brutal... imagina a cara de desespero das pessoas quando vissem isso!\nHaa, haa...!" 
1009702-101 = "[s] \"......Moe.\"" 
1009702-102 = "Hm?\nQual foi, Sensei?" 
1009702-107 = "A-Aí, por que cê tá com essa cara assustadora de repente..." 
1009702-108 = "[s] \"Como isso é extremamente perigoso, vou confiscar de você.\"" 
1009702-109 = "Por quuueeeee~?!" 
1009702-111 = "（Depois disso, confisquei a bomba de C4 e dei um longo sermão na Moe sobre o manuseio de materiais perigosos.）" 
1009702-112 = "（...Também avisei a ela para não ficar levantando a blusa em público.）" 