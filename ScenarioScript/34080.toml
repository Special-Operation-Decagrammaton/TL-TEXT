[translation]
34080-1 = "Episódio 8; 'Esquadrão Arius'"
34080-6 = "Oh...! V-Você!"
34080-14 = "G-Gah!"
34080-19 = "Hiyori, você está bem!?"
34080-25 = "L-Líder..."
34080-26 = "O que você está fazendo aqui..."
34080-27 = "[s] \"Ainda bem que você está a salvo, Hiyori.\""
34080-28 = "......"
34080-29 = "........................"
34080-30 = "......H-Hã!?"
34080-31 = "P-Por que o Sensei da Schale está junto da Líder...!?"
34080-32 = "Bem, isso..."
34080-33 = "A-A hora do julgamento divino finalmente chegou, não é? A-Afinal, é o meu fim..."
34080-34 = "Faz sentido... Se eu parar pra pensar, o Sensei deve querer nos capturar de volta da Arius... Ele deve querer nos punir com as próprias mãos..."
34080-35 = "Vocês vão nos prender e nos colocar naquele calabouço da Schale que todo mundo fala, não vão! Aquele lugar amaldiçoado onde dizem que dá pra ouvir o choro das garotas que desafiaram a Schale todas as noites..."
34080-36 = "[s] \"......\""
34080-37 = "Uwaaaaaaah! É o meu fim... E eu ainda tinha tantas coisas que queria fazer, tantas revistas que queria ler..."
34080-38 = "......"
34080-39 = "......Mesmo que seja isso, por que a Líder estaria com o Sensei? ...Ah, agora eu entendi."
34080-40 = "Hiyori..."
34080-41 = "A Líder está sendo ameaçada pelo Sensei da Schale, não é!? A Líder também teve uma vida cheia de sofrimento, que dó..."
34080-42 = "[s] \"Eu vim ajudar você, Hiyori.\""
34080-43 = "......"
34080-44 = "......Hã? M-Me ajudar...? M-Mas por quê?"
34080-45 = "P-Por acaso você perdeu a memória? Não sabe quem nós somos...?"
34080-46 = "O que o Sensei disse é verdade, Hiyori. O Sensei da 'Schale' veio nos ajudar."
34080-47 = "......!?"
34080-48 = "[s] \"Eu já ouvi sobre a situação. Vamos salvar a Atsuko juntos.\""
34080-54 = "É mesmo, a Princesa..."
34080-55 = "M-Mas será que nós conseguiremos... salvar a Princesa...?"
34080-56 = "E-Eu..."
34080-60 = "'Ela' me disse que se eu revelasse o esconderijo da Líder, facilitaria a minha volta para o distrito autônomo de Arius..."
34080-62 = "......!?"
34080-63 = "P-Porque eu sou apenas alguém que seguiu as ordens da Líder... E-Então eu teria circunstâncias atenuantes, sabe... hehe..."
34080-64 = "......Entendo."
34080-65 = "Se for o caso, faça isso."
34080-66 = "......Hã?"
34080-67 = "Diga a 'ela' onde estou e volte para o distrito autônomo."
34080-68 = "Assim, Hiyori, pelo menos você não terá de se envolver nessa confusão."
34080-69 = "C-Como é!? E-Eu..."
34080-70 = "Eu já sabia que um dia isso aconteceria. Você já fez muito me seguindo até aqui."
34080-71 = "Err, sabe... Eu já recusei a oferta..."
34080-75 = "......O-O que é essa sua atitude de ter compreensão com uma traidora? Você achou que eu fosse te trair tão fácil assim?"
34080-76 = "Para começo de conversa, nem sabemos se o que 'ela' disse é verdade... Além disso, já estamos todas no mesmo barco... De que adianta eu voltar para o distrito autônomo sozinha...?"
34080-77 = "E mais... Mesmo que só eu me salve, a Atsuko-chan..."
34080-78 = "E-Eu acho que se pudermos salvar a Atsuko-chan juntas... acho que é melhor assim..."
34080-82 = "Não é a mesma coisa para você, Líder? É por isso que você veio me salvar, não é?"
34080-86 = "......Sim, é verdade."
34080-87 = "Vamos discutir os detalhes quando todas estivermos juntas. Primeiro precisamos encontrar a Misaki."
34080-88 = "......Você tem razão. Talvez a Misaki-san consiga explicar essa situação um pouco melhor... Entendido."
34080-89 = "Eu tenho uma noção de onde a Misaki-san pode estar."
34080-90 = "Pois é... Provavelmente é lá."
34080-91 = "[s] \"Então, vamos partir agora mesmo.\""
34080-92 = "S-Sim...!"
34080-94 = "Uma ponte abandonada há muito tempo"
34080-96 = "......"
34080-97 = "Com essa altura..."
34080-98 = "[s] \"Que altura de dar tontura...\""
34080-99 = "E o rio lá embaixo deve ter mais de 5 metros de profundidade."
34080-101 = "A correnteza também é forte, então, se cair, é bem provável que afunde até o fundo."
34080-102 = "Misaki."
34080-103 = "M-Misaki-san..."
34080-104 = "A Líder e a Hiyori... e o Sensei da 'Schale'..."
34080-105 = "Entendi... Então foi isso que você escolheu, Líder."
34080-106 = "Eu não esperava por isso... E que o Sensei fosse aceitar isso..."
34080-107 = "De qualquer forma, foi algo inesperado."
34080-108 = "Mas, Sensei, você sabia?"
34080-109 = "Que se nós matarmos o 'Sensei', podemos voltar para o distrito autônomo de Arius."
34080-110 = "[s] \"......\""
34080-111 = "A Hiyori e a Líder aí também devem ter ouvido a mesma coisa. Não é verdade?"
34080-112 = "A p-proposta que eu recebi foi um pouco diferente, mas..."
34080-113 = "......Sim, me disseram isso. Que se eliminássemos o Sensei, eles perdoariam a nossa traição."
34080-114 = "......Sensei, como você pode confiar na gente sem saber se vamos puxar o gatilho pelas suas costas?"
34080-115 = "Ainda mais sabendo que foi ela quem tentou te matar antes?"
34080-116 = "......"
34080-117 = "[s] \"Se a Saori quisesse fazer isso, eu já não estaria aqui.\""
34080-118 = "......Entendi."
34080-119 = "Mas mesmo assim, eu não vou mudar de ideia."
34080-123 = "[ns] \"Misaki, é perigoso aí...!\""
34080-125 = "M-Misaki-san...?"
34080-126 = "É impossível salvar a Princesa."
34080-127 = "O que vocês vão fazer se infiltrando no distrito autônomo de Arius? Lutar contra todas as alunas da Arius para chegar até a Basílica onde a Princesa está? E antes do nascer do sol?"
34080-128 = "É provável que 'ela' tenha até preparado armas que nós desconhecemos."
34080-129 = "Mesmo com a ajuda de um adulto, é impossível para nós."
34080-130 = "E mesmo se nós conseguíssemos salvar a Atsuko, de que adiantaria?"
34080-131 = "Nós só continuaríamos a viver essa vida sem sentido e dolorosa... abandonadas neste mundo sem um lugar para voltar, sobrevivendo às custas de lixo e água suja, não é?"
34080-132 = "......"
34080-133 = "E estender essa vida cheia de dor da Princesa... Que valor há nisso?"
34080-134 = "'Tudo é em vão'. Essa é a única verdade que podemos aceitar."
34080-135 = "Não é, Líder?"
34080-136 = "......"
34080-137 = "Ou talvez, Sensei... sendo um adulto, você conheça a resposta para isso?"
34080-138 = "[s] \"Espera, não faz isso! Se você se mover mais...\""
34080-142 = "Cale a boca, Misaki."
34080-143 = "......"
34080-144 = "E então? Você quer dizer que está pronta para encontrar paz dessa sua vida cheia de dor? ――Você realmente acha que uma ameaça dessas funcionaria comigo?"
34080-145 = "......"
34080-146 = "Ouça bem, Misaki. Se você pular daí――"
34080-147 = "Eu vou pular logo em seguida."
34080-148 = "Não importa se você colocar pesos nas suas roupas. Não vai me levar muito tempo até te arrastar até a margem."
34080-149 = "No máximo 20 segundos. E mesmo se você perder a consciência, eu farei massagem cardíaca quantas vezes forem necessárias."
34080-150 = "Não importa o quanto você me ameace com isso, eu vou te manter viva."
34080-151 = "Você já tentou tantas vezes e nunca deu certo. Acha mesmo que vai conseguir dessa vez?"
34080-152 = "......"
34080-153 = "(......)"
34080-154 = "......Bom, acho que não."
34080-159 = "......Então, no fim das contas nós vamos salvar a Princesa."
34080-160 = "Entendido... se essa é a ordem da Líder, eu vou obedecer."
34080-161 = "Eu vou acompanhá-la até o fim mais uma vez, Líder."
34080-162 = "......Certo. Conto com você."
34080-163 = "Haaaa... Ainda bem que conseguimos resolver isso..."
34080-164 = "Agora que decidimos, precisamos nos apressar... Temos cerca de 90 minutos restantes. Precisamos chegar até a entrada antes disso."
34080-165 = "......Entendi. Uma hora e meia até a meia-noite... Vamos nos apressar."
34080-166 = "Eu explico no caminho... Vamos."
34080-167 = "......"
34080-168 = "S-Sim! Por aqui...!"
34080-169 = "[ns] \"Entendido.\""
34080-174 = "Próximo Episódio; Para o Distrito Autônomo de Arius (1)"