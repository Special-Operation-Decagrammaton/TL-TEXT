[translation]
34080-1 = "Episódio 8; \"Esquadrão Arius\""
34080-6 = "Oh...! V-você!"
34080-14 = "G-gah!"
34080-19 = "Hiyori, você está bem!?"
34080-25 = "L-líder..."
34080-26 = "Como você chegou aqui..."
34080-27 = "[s] \"Hiyori, que bom que você está a salvo.\""
34080-28 = "..."
34080-29 = "...................."
34080-30 = "...E-eh!?"
34080-31 = "O-o professor do Schale, por que você está com a líder...!?"
34080-32 = "Isso é porque..."
34080-33 = "F-finalmente chegou a hora da punição divina, não é? Sabia que era o meu fim..."
34080-34 = "É verdade... pensando bem, o professor quer nos levar de volta para Arius, não é? Já que você quer nos punir com suas próprias mãos..."
34080-35 = "Você vai nos capturar e nos jogar naquela masmorra que dizem existir no Schale! Aquele lugar infame onde dizem que se ouve os soluços das crianças que se rebelaram contra o Schale noite após noite..."
34080-36 = "[s] \"...\""
34080-37 = "Waaaaaah! É o meu fim... eu ainda tinha tantas coisas para fazer, tantas revistas para ler..."
34080-38 = "..."
34080-39 = "...Mesmo que fosse esse o caso, por que a líder estaria com o professor? ...Ah, entendi tudo agora."
34080-40 = "Hiyori..."
34080-41 = "A líder está sendo ameaçada pelo professor do Schale, não é!? A líder também tem uma vida cheia de sofrimento, que coitada..."
34080-42 = "[s] \"Vim para salvar a Hiyori.\""
34080-43 = "..."
34080-44 = "...Eh? V-você veio... me salvar? P-por quê?"
34080-45 = "V-você por acaso está com amnésia? Não sabe quem nós somos...?"
34080-46 = "O professor está certo, Hiyori. O professor do \"Schale\" está nos ajudando."
34080-47 = "...!?"
34080-48 = "[s] \"Ouvi sobre a situação. Vamos salvar a Atsuko juntos.\""
34080-54 = "É verdade, a Princesa..."
34080-55 = "S-será que nós realmente... conseguiremos salvar a Princesa...?"
34080-56 = "E-eu..."
34080-60 = "Disseram-me que se eu revelasse o paradeiro da líder, eles facilitariam o meu retorno ao Distrito Autônomo de Arius..."
34080-62 = "...!?"
34080-63 = "E-eu só segui as ordens da líder, então... disseram que eu teria circunstâncias atenuantes... hehe..."
34080-64 = "...Entendo."
34080-65 = "Se é assim, então faça isso."
34080-66 = "...Eh?"
34080-67 = "Conte a \"ela\" onde estou e volte para o Distrito Autônomo."
34080-68 = "Assim, Hiyori, pelo menos você não terá problemas."
34080-69 = "H-hein!? M-mas eu..."
34080-70 = "Eu sabia que um dia isso aconteceria. Você me acompanhou muito bem até agora."
34080-71 = "Bem, sobre isso... eu já recusei, na verdade..."
34080-75 = "...Q-que tipo de atitude é essa, de mostrar compreensão com uma traidora? Você acha que eu trairia vocês tão facilmente assim?"
34080-76 = "Além disso, nem sabemos se o que \"ela\" disse é verdade... e nós já estamos no mesmo barco, somos uma comunidade de destino... mesmo que eu voltasse sozinha para o Distrito, não faria sentido nenhum..."
34080-77 = "E também... mesmo que eu fosse salva, a Atsuko-chan..."
34080-78 = "E-eu também acho que seria melhor se pudéssemos salvar a Atsuko-chan... a Princesa... todas juntas..."
34080-82 = "Isso não vale para a líder também? Foi por isso que você veio me salvar, não foi?"
34080-86 = "...Ah, é verdade."
34080-87 = "Vamos deixar os detalhes para quando estivermos todos reunidos. Primeiro, precisamos encontrar a Misaki."
34080-88 = "...É verdade. A Misaki-san talvez consiga explicar essa situação um pouco melhor... Entendido."
34080-89 = "Eu tenho uma ideia de onde a Misaki possa estar."
34080-90 = "É... provavelmente é lá."
34080-91 = "[s] \"Então, vamos partir imediatamente.\""
34080-92 = "S-sim...!"
34080-94 = "Uma ponte abandonada há muito tempo"
34080-96 = "……."
34080-97 = "Aqui é..."
34080-98 = "[s] \"É uma altura de dar vertigem...\""
34080-99 = "Além disso, o rio lá embaixo tem mais de 5 metros de profundidade."
34080-101 = "A correnteza também é forte, então se cair, provavelmente vai direto para o fundo."
34080-102 = "Misaki."
34080-103 = "M-Misaki..."
34080-104 = "A líder, Hiyori... e o professor do Schale, é..."
34080-105 = "Entendi... então essa é a sua escolha, líder."
34080-106 = "Quem diria que a líder faria isso... e que o professor aceitaria..."
34080-107 = "De qualquer forma, foi inesperado."
34080-108 = "Mas professor, você sabia?"
34080-109 = "Se nós eliminarmos o \"professor\", podemos voltar para o Distrito Autônomo de Arius."
34080-110 = "[s] \"…….\""
34080-111 = "A Hiyori que está aí e a líder também devem ter ouvido a mesma coisa. Não é?"
34080-112 = "A-a proposta que eu recebi foi um pouco diferente, mas..."
34080-113 = "……Ah, foi isso que nos disseram. Que se eliminássemos o professor, nossa traição seria perdoada."
34080-114 = "……Você consegue confiar na gente, professor, mesmo sem saber quando vamos puxar o gatilho pelas suas costas?"
34080-115 = "E ainda por cima, sendo que eu sou a pessoa que já atirou em você antes?"
34080-116 = "……."
34080-117 = "[s] \"Se a Saori quisesse, eu já não estaria mais aqui há muito tempo.\""
34080-118 = "……Entendi."
34080-119 = "Mas, mesmo assim, eu não vou mudar."
34080-123 = "[ns] \"Misaki, isso é perigoso...!\""
34080-125 = "M-Misaki...?"
34080-126 = "É impossível salvar a Princesa."
34080-127 = "O que vocês vão fazer se entrarem no Distrito Autônomo de Arius? Vão lutar contra todos os alunos de Arius em três pessoas para chegar à basílica onde a Princesa está? E antes do amanhecer?"
34080-128 = "Provavelmente, \"ela\" preparou armas que nem nós conhecemos."
34080-129 = "Sozinhos, mesmo com a ajuda de um adulto, é impossível."
34080-130 = "E mesmo que conseguíssemos resgatar a Atsuko, qual seria o sentido disso?"
34080-131 = "Ficar abandonados neste mundo sem ter para onde voltar, vivendo apenas para beber água barrenta... essa vida sem sentido e dolorosa apenas continuaria, não é?"
34080-132 = "……."
34080-133 = "Prolongar a vida da Princesa, que só foi feita de sofrimento... isso tem algum valor?"
34080-134 = "\"Tudo é vaidade\", essa é a única verdade que podemos aceitar."
34080-135 = "Não é, líder?"
34080-136 = "……."
34080-137 = "Ou será que você, professor... sendo um adulto, conhece a resposta?"
34080-138 = "[s] \"Espere, é perigoso! Se você se mover mais um pouco...\""
34080-142 = "Cale a boca, Misaki."
34080-143 = "……."
34080-144 = "E então? Você quer que sua vida cheia de dor também encontre o descanso? Você realmente acha que esse tipo de ameaça funciona comigo?"
34080-145 = "……."
34080-146 = "Escute bem, Misaki. Se você pular daí..."
34080-147 = "Eu vou pular logo atrás de você."
34080-148 = "Não adianta colocar pesos dentro da roupa. Não vai demorar muito para eu te levar de volta para a margem."
34080-149 = "No máximo, 20 segundos. Mesmo que você perca a consciência, eu farei a ressuscitação cardiopulmonar quantas vezes forem necessárias."
34080-150 = "Não importa o quanto você tente me ameaçar, eu vou te manter vivo."
34080-151 = "Depois de tantas tentativas inúteis até agora, você realmente acha que desta vez vai conseguir?"
34080-152 = "……."
34080-153 = "（……）"
34080-154 = "……Bem, não tenho tanta confiança assim."
34080-159 = "……Então, no fim das contas, você vai salvar a princesa."
34080-160 = "Entendido…… se é uma ordem do líder, eu obedeço."
34080-161 = "Desta vez também estarei com você até o fim, líder."
34080-162 = "……Ah, conto com você."
34080-163 = "Ahhh…… que bom que deu tudo certo……."
34080-164 = "Já que decidimos, vamos nos apressar…… nos resta cerca de 90 minutos. Precisamos chegar à entrada até lá."
34080-165 = "……Entendo. Falta uma hora e meia para a meia-noite…… vamos nos apressar."
34080-166 = "Explico o resto no caminho…… vamos."
34080-167 = "……."
34080-168 = "S-sim! É por aqui……!"
34080-169 = "[ns] \"Entendido.\""
34080-174 = "Próximo episódio; Para o Distrito Autônomo de Arius (1)"
