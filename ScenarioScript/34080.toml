[translation]
34080-1 = "Episódio 8;O \"Squad de Arius\""
34080-6 = "O……! V-você é!"
34080-14 = "G-guah!"
34080-19 = "Hiyori, você tá bem!?"
34080-25 = "L-Líder……."
34080-26 = "Como você soube que eu tava aqui……."
34080-27 = "[s] \"Hiyori, que bom que você tá bem.\""
34080-28 = "……."
34080-29 = "…………………."
34080-30 = "……H-hãã!?"
34080-31 = "P-por que o Sensei da Schale tá junto com a Líder……!?"
34080-32 = "Isso é……."
34080-33 = "E-enfim chegou a hora do castigo divino, né? No fim, eu tô acabada mesmo……."
34080-34 = "Faz sentido…… pensando bem, o senhor quer nos arrancar da Arius, né…… deve querer nos punir com as próprias mãos……."
34080-35 = "Vai nos capturar e nos jogar naquela masmorra que dizem existir na Schale, né! Aquele lugar mal-assombrado de onde, noite após noite, se ouve o choro dos que desafiaram a Schale……."
34080-36 = "[s] \"…….\""
34080-37 = "Buáááá! Acabou…… sendo que eu ainda tinha tanta coisa pra fazer, tanta revista pra ler……."
34080-38 = "……."
34080-39 = "……E, supondo que seja isso, por que a Líder tá junto do Sensei? ……Ah, entendi completamente."
34080-40 = "Hiyori……."
34080-41 = "A Líder tá sendo ameaçada pelo Sensei da Schale, né!? A Líder também, com essa vida só de sofrimento, coitada……."
34080-42 = "[s] \"Eu vim te salvar, Hiyori.\""
34080-43 = "……."
34080-44 = "……Hã? A-a mim…… é? P-por quê?"
34080-45 = "N-não me diga que é amnésia? O senhor não sabe quem a gente é, é isso……?"
34080-46 = "É como o Sensei disse, Hiyori. O Sensei da \"Schale\" vai nos ajudar."
34080-47 = "……!?"
34080-48 = "[s] \"Eu já ouvi a história. Vamos salvar a Atsuko juntos.\""
34080-54 = "É, a Hime……."
34080-55 = "S-será que a gente consegue…… salvar a Hime……?"
34080-56 = "E-eu……."
34080-60 = "\"Ela\" me disse que, se eu contasse onde a Líder estava, facilitaria o meu retorno ao distrito autônomo de Arius……."
34080-62 = "……!?"
34080-63 = "Q-que eu era só alguém que obedecia às palavras da Líder…… que havia margem pra clemência, ela disse…… hehe……."
34080-64 = "……Sei."
34080-65 = "Então, faça isso."
34080-66 = "……Hã?"
34080-67 = "Conte a \"ela\" onde eu estou e volte direto pro distrito autônomo."
34080-68 = "Assim, Hiyori, ao menos você não se complica."
34080-69 = "S-sim!? E-eu……."
34080-70 = "Eu sabia que um dia isto chegaria. Você me acompanhou muito bem até aqui."
34080-71 = "É que, então…… eu já recusei, sabia……."
34080-75 = "……Q-que é esse movimento de compreensão com a traidora? Vocês achavam que eu trairia tão fácil assim?"
34080-76 = "Pra começo de conversa, nem se sabe se a palavra \"dela\" é verdade…… e, além disso, a gente já é tipo uma comunidade de destino no mesmo barco…… eu voltar sozinha pro distrito autônomo não teria sentido nenhum……."
34080-77 = "E, além disso…… mesmo que só eu me salvasse, a Atsuko……."
34080-78 = "E-eu também acho que, se der pra salvar a Atsuko…… a Hime, com todo mundo, é bem melhor assim……."
34080-82 = "E com a Líder não é a mesma coisa? Foi por isso que veio me salvar, né?"
34080-86 = "……Sim, é isso."
34080-87 = "Os detalhes ficam pra quando estivermos todas reunidas. Primeiro, temos que achar a Misaki."
34080-88 = "……Pois é. A Misaki talvez explique esta situação um pouco melhor……. Entendido."
34080-89 = "Onde a Misaki está, eu tenho uma vaga ideia."
34080-90 = "Pois é…… provavelmente é lá."
34080-91 = "[s] \"Então, vamos partir já.\""
34080-92 = "S-sim……!"
34080-94 = "Uma ponte abandonada há muito tempo"
34080-96 = "……."
34080-97 = "Aqui, então……."
34080-98 = "[s] \"Uma altura de dar vertigem…….\""
34080-99 = "E o rio embaixo é bem fundo."
34080-101 = "A correnteza também é rápida; quem cair não volta à tona fácil."
34080-102 = "Misaki."
34080-103 = "M-Misaki……."
34080-104 = "A Líder e a Hiyori…… e o Sensei da \"Schale\", é……."
34080-105 = "Sei…… então foi essa a sua escolha, Líder."
34080-106 = "Quem diria; logo a Líder…… e o Sensei também aceitou……."
34080-107 = "De todo jeito, foi imprevisto."
34080-108 = "Mas, Sensei, você sabe?"
34080-109 = "Se a gente der cabo do \"Sensei\", a gente pode voltar pro distrito autônomo de Arius."
34080-110 = "[s] \"…….\""
34080-111 = "A Hiyori aí e a Líder devem ter ouvido a mesma proposta. Né?"
34080-112 = "A-a proposta que eu recebi era um pouco diferente, mas……."
34080-113 = "……Sim, foi o que disseram. Que, se déssemos cabo do Sensei, a nossa traição seria perdoada."
34080-114 = "……Sem saber quando alguém pode puxar o gatilho pelas costas, você consegue confiar na gente, Sensei?"
34080-115 = "Ainda por cima sendo \"alguém que já atirou em você\"?"
34080-116 = "……."
34080-117 = "[s] \"Se a Saori quisesse isso, eu já não estaria inteiro faz tempo.\""
34080-118 = "……Sei."
34080-119 = "Mas, mesmo assim, eu não mudo."
34080-123 = "[ns] \"Misaki, aí é perigoso……!\""
34080-125 = "M-Misaki……?"
34080-126 = "Salvar a Hime é impossível."
34080-127 = "Infiltrar-se no distrito autônomo de Arius pra quê? Lutar em três pra chegar à Basílica onde a Hime está? Contra todas as alunas de Arius? E ainda antes de o sol nascer?"
34080-128 = "Provavelmente, \"ela\" preparou armas que nem a gente conhece."
34080-129 = "Só nós, por mais que haja a ajuda de um adulto, é impossível."
34080-130 = "E, supondo que a gente resgatasse a Atsuko, que sentido haveria nisso?"
34080-131 = "Largadas neste mundo sem um lugar pra voltar, vivendo de sorver água barrenta…… só ia continuar esta vida sem sentido e sofrida, né?"
34080-132 = "……."
34080-133 = "Esticar a vida da Hime, que sempre foi só sofrimento…… há valor nisso?"
34080-134 = "\"Tudo é vão.\" Só isso é a verdade que a gente consegue aceitar."
34080-135 = "Não é, Líder?"
34080-136 = "……."
34080-137 = "Ou será, Sensei…… que você, sendo adulto, conhece essa resposta?"
34080-138 = "[s] \"Espera, é perigoso! Se você se mexer mais……\""
34080-142 = "Cala a boca, Misaki."
34080-143 = "……."
34080-144 = "E aí? Você quer dizer que a sua vida, cheia de sofrimento, também quer chegar ao descanso?――Você acha mesmo que uma ameaça dessas funciona comigo?"
34080-145 = "……."
34080-146 = "Escuta bem, Misaki. Se você pular daí――"
34080-147 = "eu pulo atrás de você no mesmo instante."
34080-148 = "Esconder qualquer coisa na roupa também é inútil. Levar você até a margem não me toma tanto tempo."
34080-149 = "No máximo, 20 segundos. E, se você desmaiar, eu repito a reanimação quantas vezes for preciso."
34080-150 = "Por mais que você ameace assim, eu vou te manter viva."
34080-151 = "Todas as vezes até hoje foram inúteis; você acha que justo desta vez daria certo?"
34080-152 = "……."
34080-153 = "(……)"
34080-154 = "……Bom, confiança eu não tenho."
34080-159 = "……E aí, no fim, vamos salvar a Hime, né."
34080-160 = "Entendi…… se é ordem da Líder, eu obedeço."
34080-161 = "Desta vez também, eu te acompanho até o fim, Líder."
34080-162 = "……Sim, conto com você."
34080-163 = "Haaaa~~~…… que bom que deu certo de algum jeito……."
34080-164 = "Decidido isso, vamos nos apressar…… restam cerca de 90 minutos. Até lá, temos que chegar à entrada."
34080-165 = "……Sei. Uma hora e meia até a meia-noite…… vamos correr."
34080-166 = "A explicação eu dou no caminho…… vamos."
34080-167 = "……."
34080-168 = "S-sim! É por aqui……!"
34080-169 = "[ns] \"Entendido.\""
34080-174 = "Próximo Episódio;Rumo ao Distrito de Arius (1)"
