[translation]
21040-1 = "Episódio 4; Naquele dia, nós encontramos uma garota"
21040-2 = "???"
21040-3 = "Ué...?"
21040-4 = "Aqueles robôs pararam de nos perseguir de repente...?"
21040-5 = "Eles estavam vindo pra cima da gente com uma velocidade assustadora até entrarmos nesta fábrica."
21040-6 = "Não sei por que, mas o que importa é que demos muita sorteee, certo?"
21040-7 = "Certo não! Uwaaaah! Eu não aguento mais! Por que raios a gente tem que ser perseguida por robôs num lugar desses!"
21040-8 = "Calma, Midori. Enquanto estivermos vivas, os dias bons com certeza virão."
21040-9 = "Eu tô falando de hoje! Pra começar, a culpa disso tudo é sua, mana!!"
21040-10 = "Enfim... para que será que serve este lugar de verdade?"
21040-11 = "Será que o Conselho Estudantil Geral restringiu o acesso aqui por causa daqueles robôs?"
21040-12 = "Eu até tentei pensar que talvez aqueles robôs fossem armas secretas do Conselho Estudantil Geral para uso em emergências, mas..."
21040-13 = "Sinto que não é esse o caso... Então o que seria?"
21040-14 = "Hmmm, tem algo me incomodando... Sinto que estamos deixando passar algo importante, além disso..."
21040-15 = "Aproximação confirmada."
21040-16 = "E-Eh? O-O que é isso?"
21040-17 = "O som tá ecoando por toda a sala...?"
21040-18 = "Confirmando a identidade do alvo. Saiba Momoi: não possui credenciais."
21040-19 = "E-Eh!? Como ele sabe quem eu sou?"
21040-20 = "Confirmando a identidade do alvo. Saiba Midori: não possui credenciais."
21040-21 = "Meu nome também... o que diabos tá acontecendo...?"
21040-22 = "Confirmando a identidade do alvo... 'Sensei de [USERNAME]'."
21040-23 = "......"
21040-24 = "Ué?"
21040-25 = "Credenciais confirmadas, autorização de entrada concedida."
21040-26 = "Eehhh!?"
21040-27 = "Eh, como assim!? Quando foi que você virou amiguinho desse prédio, Sensei!?"
21040-28 = "O próprio Sensei parece estar bem confuso com isso..."
21040-29 = "Reconhecendo Saiba Momoi e Saiba Midori como 'alunas' do Sensei, concedendo credenciais às 'alunas' acompanhantes. Aprovado."
21040-30 = "Abrindo a porta inferior."
21040-31 = "......Porta inferior? Não é essa porta bem na nossa frente?"
21040-32 = "Pensando bem, inferior... não me diga que..."
21040-33 = "Claro que não. Não importa como olhe, isso é só o chão――"
21040-34 = "(Clank)"
21040-35 = "O-O chão sumi... estamos caíndo!?"
21040-36 = "Uwawawa!"
21040-39 = "Mana! Sensei! Kyaaaah!"
21040-41 = "......"
21040-44 = "Ughh......"
21040-45 = "Ué, mana? Sensei!?"
21040-46 = "Caramba, dessa vez eu achei mesmo que fosse morrer..."
21040-47 = "Você tá bem, mana? Ué, onde diabos o Sensei se meteu..."
21040-48 = "[s] \"B-Bem ahhhqui......\""
21040-49 = "Hyaah!? P-P-Por quê!? Por que você tá debaixo da gente!!?"
21040-50 = "Como assim por quê... Porque o Sensei serviu de almofada pra gente por reflexo quando caímos."
21040-51 = "Ah, d-desculpa... É que eu fiquei tão surpresa que por um instante achei que o Sensei tinha... 'esse tipo de fetiche'..."
21040-52 = "Não, eu acho melhor você pedir desculpas de novo pelo que acabou de falar..."
21040-53 = "Enfim, você tá bem, Sensei?"
21040-54 = "[s1] \"Claro, ainda bem que vocês duas estão bem.\"\n[s2] \"Sabe aquele ditado, dar um passo para trás para dar dois para frente...\""
21040-55 = "E-Enfim... Muito obrigada por nos salvar."
21040-56 = "E-Enfim... Muito obrigada por nos salvar."
21040-57 = "Parece que a gente não caiu tão fundo assim... Hm?"
21040-58 = "......"
21040-59 = "......Eh!?"
21040-60 = "Hm...? Que foi, mana...?"
21040-62 = "Eh......!?"
21040-69 = "U-Uma garota?"
21040-70 = "Será que ela... tá dormindo?"
21040-72 = "......Não há resposta, é só um cadáver."
21040-73 = "Para de fazer piadas de mau gosto! E não acho que seja um cadáver... Ei, olha só."
21040-74 = "Essa garota, ela não está machucada nem nada... Ela parece mais estar 'desligada', não acha?"
21040-75 = "Acha mesmo? É, agora que você mencionou, ela parece um pouco com um manequim. Deixa eu ver..."
21040-78 = "Uau, a pele dela é super macia e hidratada... Ué? Tem alguma coisa escrita aqui."
21040-79 = "......AL-IS......"
21040-80 = "......Al, is... A, L, I, S? Eu não sei como se lê, mas será que é o nome dela?"
21040-81 = "......Aris?"
21040-82 = "Espera aí, se você olhar bem, as letras não são todas do alfabeto... Isso não é um AL-1S?"
21040-83 = "Eh, você acha?"
21040-85 = "Quem diabos é essa garota... E que lugar é esse?"
21040-86 = "Não seria mais rápido perguntar a ela?"
21040-87 = "Seria ótimo se ela acordasse e falasse com a gente, mas... Por enquanto estou com pena de deixá-la assim, então que tal a gente colocar umas roupas nela?"
21040-88 = "Uau, não sabia que você tinha trazido roupas sobressalentes... Espera aí, essa calcinha é minha!"
21040-89 = "Não é não, essa é a minha. A carinha do gatinho é diferente."
21040-94 = "......Pronto. Acho que agora tá bom."
21040-95 = "(Beep, Beep beep)"
21040-96 = "Hm?"
21040-97 = "Q-Que barulho é esse!?"
21040-98 = "Parece um alarme... Será que tem algum robô por perto?"
21040-99 = "Não... Acho que o som veio 'dela'."
21040-100 = "Eh? N-Não me diga que..."
21040-102 = "Mudança de status e alvo com permissão de contato detectados. Desativando o modo de hibernação."
21040-106 = "......"
21040-107 = "Ela... abriu os olhos...?"
21040-109 = "......"
21040-111 = "Dificuldade na análise situacional."
21040-113 = "Iniciando tentativa de comunicação... Vocês poderiam me dar uma explicação?"
21040-114 = "E-Eh? E-Explicação? De que?"
21040-115 = "N-Nós é que queremos uma explicação! Quem é você? Que lugar é esse!?"
21040-117 = "Confirmando que o ego, a memória e o propósito desta unidade encontram-se em estado de perda. Não há dados."
21040-118 = "C-Como assim...? V-Você não vai atacar a gente do nada, né?"
21040-120 = "Afirmativo. Ao encontrar um alvo com permissão de contato, a intenção hostil desta unidade não é ativada."
21040-121 = "Uau, que incrível. Cidadãos robôs são comuns em Kivotos, mas é a primeira vez que vejo um robô que se parece tanto com a gente."
21040-124 = "Hmmm... O que nós fazemos, Sensei?"
21040-125 = "[s3] \"Você poderia explicar o que significa 'alvo com permissão de contato'?\"\n[s4] \"Quem é você? Onde estamos?\""
21040-127 = "Impossível responder. Presume-se que ocorreu uma reação primária no subconsciente desta unidade."
21040-129 = "Impossível responder. Presume-se que ocorreu uma reação primária no subconsciente desta unidade."
21040-131 = "Subconsciente... o que seria isso?"
21040-132 = "Hmmm..."
21040-133 = "O subsolo de uma fábrica, uma garota quase nua e ainda por cima com amnésia..."
21040-134 = "Fufu, acabei de ter uma ótima ideia."
21040-135 = "Olha... depois de tudo que você listou agora, eu só consigo pensar em coisas ruins..."
21040-140 = "???"
21040-142 = "Millennium - Depto. de Desenvolvimento de Jogos"
21040-145 = "???"
21040-147 = "Ei, espera aí!?"
21040-148 = "O que você pretende fazer trazendo essa garota para a sala do clube!"
21040-150 = "Ugh, não me enforca! T-Tô sufocando, *cof*, *cof*!"
21040-151 = "N-Não tinha o que fazer. Pra começo de conversa, não poderíamos deixá-la num lugar cheio daqueles robôs assustadores..."
21040-153 = "(*Munch, munch*)"
21040-154 = "Ahhh, não põe o meu controle de Wee na boca! Cospe! Cospe logo!"
21040-155 = "......No fim das contas, a gente não podia simplesmente deixá-la lá."
21040-157 = "Isso é verdade, mas..."
21040-158 = "Não acha melhor entrar em contato com o Conselho Estudantil Geral ou com a Valkyrie agora mesmo?"
21040-159 = "Isso é verdade, mas... Isso é para *depois*. Depois que terminarmos o que precisamos fazer."
21040-160 = "O que precisamos fazer?"
21040-161 = "Bem, antes de mais nada ela precisa de um nome. Acho que vou chamá-la de 'Aris'."
21040-164 = "......O nome desta unidade é 'Aris'. Por favor, confirmem."
21040-165 = "E-Espera um pouco! Esse não é o nome que você tirou da própria cabeça!? O certo não seria chamá-la de AL-1S?"
21040-166 = "Um nome longo assim é difícil de falar, sabe. O que achou, Aris? Gostou?"
21040-168 = "......"
21040-170 = "......Afirmativo."
21040-171 = "Esta unidade é, Aris."
21040-172 = "Ahaha! Viu só o meu talento para dar nomes!"
21040-173 = "Hmmm... se ela mesma gostou, então tudo bem."
21040-175 = "Beleza, então vamos para o próximo passo."
21040-177 = "Mana, no que diabos você está pensando...? Você sabe que isso não está no nível de 'peguei um gatinho na rua', não é!?"
21040-178 = "Acho que você é que deveria pensar direito, Midori."
21040-179 = "Para começar, por que nós nos arriscamos tanto para procurar a G.Bible mesmo?"
21040-180 = "Pra... poder criar um bom jogo e evitar que o clube seja fechado, não foi?"
21040-181 = "Isso mesmo, e esse é o nosso maior problema no momento."
21040-182 = "Nós queremos criar um jogo bom, mas salvar o clube é a prioridade máxima. E para isso, nós precisamos cumprir pelo menos uma das duas condições."
21040-183 = "Tentar ganhar o Millennium Prize é só uma das alternativas."
21040-184 = "Uma das alternativas...? Na verdade, só nos resta uma opção, né? Você mesma disse que 'aumentar o número de membros' era impossível..."
21040-185 = "......Ué?"
21040-186 = "M-Mana, eu duvido muito, mas por um acaso você..."
21040-187 = "Está pensando em disfarçar ela como uma aluna da Millennium e colocá-la no nosso clube...!?"
21040-189 = "Aris!"
21040-191 = "Junte-se ao nosso grupo!"
21040-193 = "(*Nhom nhom......*)"
21040-194 = "Ahhh! Não pode comer o meu 'Game Girls Advance SP'! Ele é o único console de 16 bits de Kivotos com uma resolução de 8K e uma CPU customizada de 8 núcleos e 16 threads, sabia!?"
21040-197 = "Ah, meu Deus..."
21040-199 = "S-Será que isso vai dar certo..."
21040-201 = "Próximo Episódio; Eu sou a Aris"