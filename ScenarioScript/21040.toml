[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21040-1 = "Episódio 4: Naquele Dia, Nós Conhecemos uma Garota."
21040-2 = "???"
21040-3 = "Ué……?"
21040-4 = "Aqueles robôs…… do nada\npararam de vir atrás da gente……?"
21040-5 = "Até a gente entrar nesta fábrica,\nvinham com uma fúria de dar medo."
21040-6 = "Não faço ideia do porquê, mas enfim……\nfoi sorte~, dá pra dizer assim?"
21040-7 = "Não dá, não! Buááá! Chega! Por que cargas\nd'água a gente tem que ficar sendo caçada\npor robô num lugar desses!"
21040-8 = "Calma, Midori. Enquanto a gente tá viva,\numa hora um dia bom aparece."
21040-9 = "Eu tô falando do dia de HOJE! E pra começar\na culpa é toda sua, mana!!"
21040-10 = "Enfim…… esse lugar aqui,\no que será que fazem nele de verdade."
21040-11 = "Será que o Conselho Estudantil Geral restringia\no acesso por causa daqueles robôs?"
21040-12 = "Cheguei a pensar que aqueles robôs fossem,\nsei lá, uma arma secreta que o Conselho Geral\nusa em emergências…… mas,"
21040-13 = "tenho a impressão de que não é nada disso……\no que será."
21040-14 = "Hmm, tem alguma coisa me incomodando……\ntipo que a gente deixou passar algo importante,\ne além disso……"
21040-15 = "Aproximação confirmada."
21040-16 = "Ãh, q-que foi?"
21040-17 = "Tem um som ecoando\npela sala inteira……?"
21040-18 = "Verificando a identidade do alvo.\nSaiba Momoi: sem autorização."
21040-19 = "H-hã!? Como é que ele sabe quem eu sou?"
21040-20 = "Verificando a identidade do alvo.\nSaiba Midori: sem autorização."
21040-21 = "De mim também…… mas como, afinal……?"
21040-22 = "Verificando a identidade do alvo……\n\"Sensei [USERNAME]\"."
21040-23 = "……"
21040-24 = "Ué?"
21040-25 = "Autorização confirmada.\nConcedendo permissão de entrada."
21040-26 = "Heeein!?"
21040-27 = "Hã, como assim!? Desde quando o Sensei\nficou de bem com este prédio!?"
21040-28 = "Mas o próprio Sensei também\nparece estar meio perdido……"
21040-29 = "Saiba Momoi e Saiba Midori reconhecidas como\n\"alunas\" do Sensei; concedendo autorização\ntambém às \"alunas\" que o acompanham. Aprovado."
21040-30 = "Abrindo a porta inferior."
21040-31 = "……Porta inferior? Não é esta porta\naqui na nossa frente?"
21040-32 = "Mais que isso, \"inferior\" será que é……"
21040-33 = "Que nada, não pode ser. Por qualquer ângulo\nque se olhe, isto aqui é só um chão comum——"
21040-34 = "(Clác!)"
21040-35 = "O-o chão sumiu…… a gente vai cair!?"
21040-36 = "Uaaah!"
21040-39 = "Mana! Sensei! Aaaaah!"
21040-41 = "……"
21040-44 = "Hmmm……"
21040-45 = "Ué, mana? Sensei!?"
21040-46 = "Aff, dessa vez eu achei mesmo\nque ia morrer……"
21040-47 = "Mana, você tá bem? Ué, e o Sensei,\nonde foi parar……?"
21040-48 = "[s] \"Bem aqui embaxo……\""
21040-49 = "Hyaaa!? P-p-por quê!? Por que o senhor\ntá embaixo da gente!!?"
21040-50 = "Por que…… ué, porque na hora da queda o Sensei\nse jogou na frente e virou o nosso colchão, né."
21040-51 = "Ah, m-me desculpa…… foi o susto, eu jurei\nque o Sensei tinha \"esse tipo de fetiche\"……"
21040-52 = "Olha, depois dessa frase agora, acho que\nvocê devia pedir desculpa mais uma vez……"
21040-53 = "Enfim, Sensei, tá tudo bem?"
21040-54 = "[s1] \"Claro. Ainda bem que vocês duas estão a salvo.\"\n[s2] \"Tem aquele ditado, né: 'às vezes a gente perde pra ganhar'……\""
21040-55 = "E-enfim…… muito obrigada\npor ter salvado a gente."
21040-56 = "E-enfim…… muito obrigada\npor ter salvado a gente."
21040-57 = "Parece que a gente não caiu lá tão fundo……\nhm?"
21040-58 = "……"
21040-59 = "……Hã!?"
21040-60 = "Hm……? Que foi, mana……?"
21040-62 = "Quê……!?"
21040-69 = "U-uma menina?"
21040-70 = "Essa garota…… será que tá dormindo?"
21040-72 = "……Não há resposta. Parece ser apenas\num cadáver."
21040-73 = "Não faz piada de mau gosto! E não é bem\num cadáver…… ei, olha só."
21040-74 = "Essa garota, não é tipo ferimento, não……\nnão dá a impressão de que ela tá meio que\n\"desligada da tomada\"?"
21040-75 = "Será? Agora que você falou, é verdade,\nela meio que parece um manequim. Deixa eu ver……"
21040-78 = "Nossa, a pele é macia e hidratada e tudo……\nué? Tem uma coisa escrita aqui."
21040-79 = "……AL-IS……"
21040-80 = "……Al, iss…… á, éle, i, ésse?\nNão sei bem como se lê, mas…… é o nome dela?"
21040-81 = "……Aris?"
21040-82 = "Peraí, olhando bem, não é tudo letra\nromana, não…… não é \"AL-1S\"?"
21040-83 = "Hã, é mesmo?"
21040-85 = "Quem será essa garota, afinal……\ne este lugar, o que diabos é?"
21040-86 = "Não é mais rápido perguntar pra ela?"
21040-87 = "Se ela acordar e quiser conversar, ótimo……\nmas, por ora, deixar ela assim é triste demais.\nVamos pelo menos vestir ela com alguma roupa."
21040-88 = "Nossa, você tinha trazido roupa reserva……\népa, essa é a MINHA calcinha!"
21040-89 = "Não é, não, essa é minha. A carinha\ndo gatinho é diferente, viu."
21040-94 = "……Pronto. Assim acho que tá bom."
21040-95 = "(Bip, bip-bip!)"
21040-96 = "Hm?"
21040-97 = "Q-que som é esse!?"
21040-98 = "Parece um alarme…… será que\ntem robô por perto?"
21040-99 = "Não…… eu senti que veio \"dela\"."
21040-100 = "Hã? N-não me diga……"
21040-102 = "Detectada alteração de estado e alvo com\npermissão de contato. Encerrando hibernação."
21040-106 = "……"
21040-107 = "E-ela acordou……?"
21040-109 = "……"
21040-111 = "Compreensão da situação: comprometida."
21040-113 = "Iniciando tentativa de diálogo……\nVocês poderiam me dar uma explicação?"
21040-114 = "Ã-ãh? E-explicação? Sobre o quê?"
21040-115 = "Q-quem aqui quer explicação somos nós!\nVocê é o quê? E este lugar, o que é, afinal!?"
21040-117 = "Confirmado: o ego, a memória e o propósito\ndesta unidade encontram-se em estado de perda.\nNão há dados."
21040-118 = "C-como assim……? V-você não vai sair\natacando a gente do nada, vai?"
21040-120 = "Afirmativo. Ao encontrar um alvo com permissão\nde contato, esta unidade não ativa intenção hostil."
21040-121 = "Uau, incrível. Robô cidadão tem aos montes\nem Kivotos, mas um robô tão parecido com a gente\neu nunca tinha visto."
21040-124 = "Hmm…… Sensei, o que a gente faz?"
21040-125 = "[s3] \"Pode me explicar o que significa 'alvo com permissão de contato'?\"\n[s4] \"Quem é você? Que lugar é este?\""
21040-127 = "Resposta impossível. Estima-se ter ocorrido\numa reação primária na consciência profunda\ndesta unidade."
21040-129 = "Resposta impossível. Estima-se ter ocorrido\numa reação primária na consciência profunda\ndesta unidade."
21040-131 = "Consciência profunda,\no que vem a ser isso……?"
21040-132 = "Hmmm……"
21040-133 = "Subsolo de uma fábrica, uma garota quase\npeladinha e, de bônus, sem memória……"
21040-134 = "Hehe, acabei de ter uma ótima ideia."
21040-135 = "Não…… dessa sequência de palavras aí,\nsó me vem coisa ruim à cabeça……"
21040-140 = "???"
21040-142 = "Millennium · Clube de Desenvolvimento de Jogos"
21040-145 = "???"
21040-147 = "Ei, peraí!?"
21040-148 = "Trazer essa garota até a sala do clube,\npra quê!?"
21040-150 = "Ai, para de me enforcar! Tô sufocando,\ncóf, cóf!"
21040-151 = "N-não tinha jeito, né. Pra começar, não dava\npra deixar ela largada num lugar cheio\ndaqueles robôs assustadores……"
21040-153 = "(Nhac, nhac)"
21040-154 = "Aaah, não põe o controle do meu Wee na boca!\nCospe! Cospe isso!"
21040-155 = "……Tá vendo, não dá mesmo\npra simplesmente largar ela."
21040-157 = "Isso é verdade, mas……"
21040-158 = "Mesmo agora, não seria melhor avisar o Conselho\nEstudantil Geral ou a Valkyrie, sei lá?"
21040-159 = "Isso é verdade, mas…… isso ainda não.\nSó depois que a gente terminar\no que tem pra fazer."
21040-160 = "O que a gente tem pra fazer?"
21040-161 = "Bom, antes de tudo ela precisa de um nome, né?\nAcho que vou chamar ela de \"Aris\"."
21040-164 = "……Designação desta unidade: \"Aris\".\nFavor confirmar."
21040-165 = "P-peraí! Esse é o nome que a mana leu de qualquer\njeito, né!? O certo não seria \"AL-1S\"?"
21040-166 = "Um nome desse tamanho é difícil de chamar.\nE aí, Aris? Gostou?"
21040-168 = "……"
21040-170 = "……Afirmativo."
21040-171 = "Esta unidade: Aris."
21040-172 = "Ahaha! Viram só o meu talento\npra dar nome!"
21040-173 = "Hmm…… se ela mesma gostou,\ntudo bem então."
21040-175 = "Bem, então bora pro próximo passo."
21040-177 = "Mana, o que exatamente você tá tramando……?\nIsso aqui não é tipo \"adotei um gatinho de rua\",\ntá ligada!?"
21040-178 = "Midori, é você quem devia pensar\ncom cuidado."
21040-179 = "Pra começar, qual era mesmo o motivo da gente\nter arriscado tudo atrás da G.Bible?"
21040-180 = "Era…… criar um bom jogo pra impedir\na dissolução do clube, né?"
21040-181 = "Isso. E esse é o problema mais importante agora."
21040-182 = "Eu quero criar um bom jogo, mas a prioridade\nmáxima é manter o clube. E pra isso, a gente\nprecisa cumprir uma de duas condições."
21040-183 = "Mirar o prêmio no Prêmio Millennium\né só uma dessas duas."
21040-184 = "Que \"só uma\" o quê, na real só existe um caminho\nmesmo, né? Você mesma disse: aumentar o número\nde membros pra além disso é impossível……"
21040-185 = "……Ué?"
21040-186 = "M-mana, não me diga que……"
21040-187 = "você tá querendo disfarçar essa garota de aluna\nda Millennium pra botar ela no nosso clube……!?"
21040-189 = "Aris!"
21040-191 = "Vem ser da nossa equipe!"
21040-193 = "(Crós, crós……)"
21040-194 = "Aaah! Não come o meu \"Game Girls Advance SP\"!\nÉ uma CPU customizada de 8 núcleos e 16 threads\ncom resolução 8K, o único console de 16 bits\nde toda a Kivotos, viu!?"
21040-197 = "Ai, que saco……"
21040-199 = "S-será que vai dar tudo certo……"
21040-201 = "Próximo episódio: Eu Sou a Aris."