[translation]
21040-1 = "Episódio 4; Naquele dia, nós conhecemos a garota"
21040-2 = "???"
21040-3 = "Ué...?"
21040-4 = "Aqueles robôs, eles pararam de nos perseguir de repente...?"
21040-5 = "Eles vieram com uma força assustadora até entrarmos nesta fábrica."
21040-6 = "Não sei o porquê, mas, de qualquer forma, que sorte, não é?"
21040-7 = "Nada de sorte! Waaaaah! Já chega! Por que diabos temos que ser perseguidas por robôs em um lugar como este!"
21040-8 = "Calma, Midori. Se estivermos vivas, dias melhores virão."
21040-9 = "Estou falando de hoje! E, para começo de conversa, a culpa é toda sua, irmã!!"
21040-10 = "De qualquer forma... o que será que fazem aqui, afinal?"
21040-11 = "Será que o Conselho Estudantil Federal restringiu o acesso por causa daqueles robôs?"
21040-12 = "Eu até pensei que aqueles robôs pudessem ser armas secretas que o Conselho Estudantil Federal usa em emergências, mas..."
21040-13 = "Não sinto que seja esse o caso... o que será que é?"
21040-14 = "Hmm, tem algo me incomodando... como se eu estivesse deixando passar algo importante, e além disso..."
21040-15 = "Aproximação confirmada."
21040-16 = "Ei, o, o que foi?"
21040-17 = "O som está ecoando por toda a sala...?"
21040-18 = "Confirmando identidade do alvo. Saiba Momoi, sem credenciais."
21040-19 = "Eh, eh!? Como você sabe quem eu sou?"
21040-20 = "Confirmando identidade do alvo. Saiba Midori, sem credenciais."
21040-21 = "Como você sabe sobre mim também... o que está acontecendo...?"
21040-22 = "Confirmando identidade do alvo... \"Professor [USERNAME]\"."
21040-23 = "……."
21040-24 = "Ué?"
21040-25 = "Credenciais confirmadas, autorização de entrada concedida."
21040-26 = "Eeeeh!?"
21040-27 = "Ei, o que significa isso!? Desde quando o Sensei ficou amigo deste prédio!?"
21040-28 = "O próprio Sensei parece confuso também, mas..."
21040-29 = "Saiba Momoi e Saiba Midori reconhecidas como \"alunas\" do Sensei. Credenciais concedidas às \"alunas\" acompanhantes. Aprovado."
21040-30 = "Abrindo a porta inferior."
21040-31 = "...Porta inferior? Não é a porta que está bem na nossa frente?"
21040-32 = "E mais, \"inferior\" quer dizer que, por acaso..."
21040-33 = "Não pode ser, né? De qualquer ângulo, isso é só o chão—"
21040-34 = "(Clang)"
21040-35 = "O, o chão sumiu... vamos cair!?"
21040-36 = "Waaaaah!"
21040-39 = "Irmã! Sensei! Aaaaah!"
21040-41 = "……"
21040-44 = "Hmm..."
21040-45 = "Ué, irmã? Sensei!?"
21040-46 = "Nossa, achei que a gente ia morrer de verdade..."
21040-47 = "Irmã, você está bem? Ué, onde será que o Sensei foi parar..."
21040-48 = "[s] \"Aqui embaixo...\""
21040-49 = "Hyaaa!? Po, por quê!? Por que você está embaixo da gente!!?"
21040-50 = "Por que, você pergunta... é porque, na hora da queda, o Sensei serviu de almofada para nós duas."
21040-51 = "Ah, me, me desculpe... eu levei um susto e achei que o Sensei tivesse \"esse tipo de hobby\"..."
21040-52 = "Não, acho que você deveria pedir desculpas de novo por esse comentário..."
21040-53 = "De qualquer forma, Sensei, você está bem?"
21040-54 = "[s1] \"Claro, o importante é que vocês duas estão bem.\"\n[s2] \"Existe um ditado que diz que para ganhar, às vezes é preciso perder...\""
21040-55 = "De, de qualquer forma... muito obrigada por nos salvar."
21040-56 = "E-enfim... obrigada por me ajudar."
21040-57 = "Não parece que caímos de um lugar tão profundo, mas... hã?"
21040-58 = "……"
21040-59 = "……Hã!?"
21040-60 = "Hum...? O que foi, irmã...?"
21040-62 = "Hã...!?"
21040-69 = "U-uma garota?"
21040-70 = "Será que ela... está dormindo?"
21040-72 = "……Não há resposta, parece apenas um cadáver."
21040-73 = "Não diga coisas tão insensíveis! E, além de não ser um cadáver... ei, olhe só."
21040-74 = "Essa garota, não parece que ela está ferida, mas sim que... está 'desligada'?"
21040-75 = "É mesmo? Agora que você mencionou, ela parece um manequim. Deixa eu ver..."
21040-78 = "Incrível, a pele dela é macia e suave... Ué? Tem algo escrito aqui."
21040-79 = "……AL-IS……"
21040-80 = "……Al-is... A, L, I, S? Não sei como se lê, mas será que é o nome dela?"
21040-81 = "……Alice?"
21040-82 = "Espere um pouco, olhando bem, não são apenas letras... não seria AL-1S?"
21040-83 = "Ah, é mesmo?"
21040-85 = "Quem será essa garota... e que lugar é este, afinal?"
21040-86 = "Não seria mais fácil perguntar para ela?"
21040-87 = "Se ela acordar e falar com a gente, seria ótimo... mas, por enquanto, é uma pena deixá-la assim, vamos vesti-la com alguma roupa."
21040-88 = "Nossa, você trouxe roupas extras... espera, essa é a minha calcinha!"
21040-89 = "Não é, essa é a minha. A expressão do gatinho é diferente, viu?"
21040-94 = "……Pronto. Acho que assim está bom."
21040-95 = "(Bip, bip-bip)"
21040-96 = "Hã?"
21040-97 = "Q-que som é esse!?"
21040-98 = "Parece um alarme... será que tem um robô por perto?"
21040-99 = "Não... tive a impressão de que veio dessa garota."
21040-100 = "Hã? N-não pode ser..."
21040-102 = "Mudança de estado e detecção de alvo com permissão de contato. Desativando modo de hibernação."
21040-106 = "……"
21040-107 = "Ela... ela acordou...?"
21040-109 = "……"
21040-111 = "Análise da situação, com dificuldades."
21040-113 = "Tentando comunicação... poderia nos dar uma explicação?"
21040-114 = "H-hã? E-explicação? Sobre o quê?"
21040-115 = "Q-quem precisa de explicações somos nós! Quem é você? O que é este lugar!?"
21040-117 = "Confirmado: ego, memória e propósito desta unidade estão em estado de desaparecimento. Sem dados disponíveis."
21040-118 = "O-o que isso significa...? V-você não vai nos atacar de repente, vai?"
21040-120 = "Afirmativo. Ao encontrar alvos com permissão de contato, esta unidade não manifesta intenção hostil."
21040-121 = "Uau, incrível. Robôs cidadãos são comuns em Kivotos, mas é a primeira vez que vejo um tão parecido com a gente."
21040-124 = "Hum... Sensei, o que faremos?"
21040-125 = "[s3] \"Pode nos explicar o que significa 'alvo com permissão de contato'?\"\n[s4] \"Quem é você? Onde estamos?\""
21040-127 = "Resposta indisponível. Estima-se que tenha ocorrido uma reação primária na consciência profunda desta unidade."
21040-129 = "Resposta indisponível. Estima-se que tenha ocorrido uma reação primária na consciência profunda desta unidade."
21040-131 = "Consciência profunda, o que é isso...?"
21040-132 = "Hum..."
21040-133 = "O subsolo de uma fábrica, uma garota quase nua e, para completar, amnésia..."
21040-134 = "Hehe, tive uma ideia."
21040-135 = "Não... com essa sequência de palavras, só consigo pensar em coisas ruins..."
21040-140 = "???"
21040-142 = "Departamento de Desenvolvimento de Jogos da Millennium"
21040-145 = "???"
21040-147 = "Ei, espera aí!"
21040-148 = "O que você está fazendo trazendo essa criança até a sala do clube?!"
21040-150 = "Ugh, pare de me enforcar! Estou sufocando, cof, cof!"
21040-151 = "N-não tinha escolha. Além disso, não dava para deixá-la naquele lugar cheio de robôs assustadores..."
21040-153 = "(Mastigando)"
21040-154 = "Ahhh, não coloque meu controle Wee na boca! Cospe isso! Cospe!"
21040-155 = "...No fim das contas, não podemos simplesmente deixá-la para trás, né?"
21040-157 = "Isso é verdade, mas..."
21040-158 = "Não seria melhor entrar em contato com o Conselho Estudantil Geral ou com a Valkyrie agora mesmo?"
21040-159 = "Isso é verdade, mas... ainda não. Só depois que terminarmos o que precisamos fazer."
21040-160 = "O que precisamos fazer?"
21040-161 = "Bem, primeiro de tudo, precisamos de um nome. Que tal chamá-la de 'Alice'?"
21040-164 = "...Designação da unidade, 'Alice'. Por favor, confirme."
21040-165 = "E-espera um pouco! Esse é um nome que a minha irmã inventou do nada, não é?! Se fosse o nome real, não seria AL-1S?"
21040-166 = "É muito longo e difícil de chamar. E então, Alice? Gostou?"
21040-168 = "..."
21040-170 = "...Afirmativo."
21040-171 = "Unidade, Alice."
21040-172 = "Ahaha! Viu só? O que achou do meu senso de nomeação?"
21040-173 = "Hum... se ela gostou, então tudo bem."
21040-175 = "Certo, então vamos para o próximo passo."
21040-177 = "Irmã, o que você está pensando...? Isso não é o mesmo que encontrar um gatinho na rua, sabia?!"
21040-178 = "Midori, pense bem sobre isso."
21040-179 = "Por que será que nós arriscamos nossas vidas para procurar a G.Bible, afinal?"
21040-180 = "Isso é... para criar um bom jogo e evitar que o clube seja fechado, não é?"
21040-181 = "Exato, esse é o problema mais importante agora."
21040-182 = "Queremos criar um bom jogo, mas a prioridade é manter o clube funcionando. E para isso, precisamos cumprir uma das duas condições."
21040-183 = "Ganhar o Millennium Prize é apenas uma delas."
21040-184 = "Como assim 'apenas'? Na verdade, só existe um método, não é? Foi você mesma quem disse, irmã, que não tem como 'aumentar o número de membros'..."
21040-185 = "...Ué?"
21040-186 = "I-irmã, não me diga que..."
21040-187 = "Você está tentando disfarçar essa criança como uma aluna da Millennium para colocá-la no nosso clube...?!"
21040-189 = "Alice!"
21040-191 = "Torne-se nossa companheira!"
21040-193 = "(Ranger...)"
21040-194 = "Ahhh! Não coma meu 'Game Girls Advance SP'! É o único console de 16-bit de Kivotos, com CPU customizada de 8 núcleos e 16 threads e resolução 8K, sabia?!"
21040-197 = "Ai, meu Deus..."
21040-199 = "S-será que isso vai dar certo..."
21040-201 = "Próximo episódio: Eu sou a Alice"
