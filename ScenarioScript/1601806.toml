[translation]
1601806-1 = "A gentileza da capitã"
1601806-2 = "Sensei. Você sempre vem correndo, não se cansa?"
1601806-3 = "O que você vai fazer se acabar caindo de verdade?"
1601806-4 = "[s] \"Não posso deixar uma aluna importante esperando, né!\""
1601806-5 = "(Aluna importante...)"
1601806-6 = "B-bem, não é como se fosse um assunto muito importante, de qualquer forma."
1601806-7 = "O tempo está bom, que tal darmos uma caminhada...?"
1601806-9 = "Aí, aquele cara. Ficou parado na nossa frente e disse:"
1601806-10 = "\"Capitã! Se quiser passar, vai ter que me derrotar primeiro!\""
1601806-11 = "Sério, eu queria que alguém tivesse visto aquilo!"
1601806-13 = "E também, quando meu capacete quebrou."
1601806-14 = "Aquele cara juntou dinheiro com todo mundo para consertar para mim, sabe?"
1601806-15 = "É por isso que ele também tem seu lado fofo!"
1601806-17 = "— E aí, ele voltou todo surrado."
1601806-18 = "Então eu disse: \"Onde eles estão agora? Vou acabar com eles\" —"
1601806-19 = "Hm? Aquilo é..."
1601806-20 = "[s] \"Um pato.\""
1601806-21 = "Um pato, hein... Eu nem sei direito a diferença entre um pato e um ganso..."
1601806-22 = "Aquele ali é bem legal, né."
1601806-23 = "Está levando seis filhotes."
1601806-24 = "[s1] \"Aqueles ali...\"\n[s2] \"Estão tentando passar por cima do ralo, né.\""
1601806-27 = "É verdade."
1601806-28 = "...Ah!! Os filhotes caíram!"
1601806-29 = "Poxa, eles ainda são tão pequenos! Precisam tomar cuidado!"
1601806-30 = "Ah, não tem jeito."
1601806-31 = "Sensei, me ajuda aqui um pouco."
1601806-40 = "[wa:1880]— [log=라브]Um, [wa:640]dois, [wa:810]três, [wa:740]quatro, [wa:810]cinco, [wa:780]seis. [wa:1300]Pronto![/log]"
1601806-42 = "— [log=라브]Estão todos os seis aqui, certinho![/log]"
1601806-45 = "— [log=라브]Escutem bem o que a mamãe diz,[/log]"
1601806-47 = "— [log=라브]vocês aí.[/log]"
1601806-50 = "[wa:1850]— [log=라브]Parece que a pata mãe também está bem agora.[/log]"
1601806-52 = "— [log=라브]Caso [wa:770]encerrado, [wa:1020]pronto![/log]"
1601806-55 = "[ns] \"A Rab não parece muito uma aluna comum.\""
1601806-56 = "[wa:700]— [log=라브]Q-q-q... [wa:590]que que você tá dizendo!![/log]"
1601806-58 = "— [log=라브]Professor, [wa:960]isso não é um pouco indelicado?[/log]"
1601806-61 = "— [log=라브]Hã? [wa:1580]...Ah!? [wa:2240]B-bem...[/log]"
1601806-64 = "[ns] \"Tipo, o jeito que você lidera o pessoal do Grupo do Capacete. É bem maduro, eu diria.\""
1601806-65 = "[wa:880]— [log=라브]A-ah! [wa:270]E-era isso que você queria dizer!?[/log]"
1601806-68 = "— [log=라브]C-claro! [wa:580]Eu sou a líder, afinal![/log]"
1601806-70 = "— [log=라브]Não seria nada se eu não conseguisse fazer nem isso![/log]"
1601806-73 = "[wa:1540]— [log=라브](O sensei, [wa:910]ele realmente só se expressou mal?)[/log]"
1601806-75 = "— [log=라브](Ou será que foi de propósito...?)[/log]"
1601806-78 = "— [log=라브](De qualquer jeito, isso me irrita!)[/log]"
1601806-80 = "— [log=라브](Se foi de propósito, irrita ainda mais!!)[/log]"
1601806-83 = "— [log=라브](Será que, [wa:1920]será que foi de propósito [wa:960]mesmo [wa:1120]...?)[/log]"
1601806-87 = "Pronto... #nAcho que aqui está bom."
1601806-88 = "Pessoal, tomem cuidado onde pisam, entenderam?"
1601806-89 = "Bem, então... onde foi que eu parei?"
1601806-90 = "A história de quando eu enfrentei as delinquentes em 3 contra 100 —"
1601806-91 = "[s] \"O capacete, você não se incomoda de usar ele o tempo todo?\""
1601806-95 = "[ns3] \"O lugar onde os patinhos caíram...\"\n[ns4] \"É um bueiro... né?\""
1601806-98 = "!!!"
1601806-99 = "Sensei, seu bobo!!"
1601806-104 = "(Love tira o capacete apressadamente e desaparece na distância...)"
