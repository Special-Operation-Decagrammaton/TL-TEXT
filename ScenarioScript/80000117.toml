[translation]
80000117-1 = "バレンタインもお祭り"
80000117-2 = "バレンタインデーですね、先生！"
80000117-3 = "[s] \"そ、そうだね……！\""
80000117-4 = "バレンタインは、チョコレートのお祭りといえるのではないでしょうか！"
80000117-5 = "[s] \"確かにそうかも……。\""
80000117-6 = "ドキドキしながらチョコを準備し……。"
80000117-7 = "当日は街が可愛いチョコで埋め尽くされて、みんなが幸せになる……。"
80000117-8 = "素晴らしいことだと思います。"
80000117-9 = "というわけで……ここはお祭りらしく、チョコ花火を打ち上げるのはどうでしょう！"
80000117-10 = "[s] \"チョコ花……火……！？\""
80000117-11 = "はい！"
80000117-12 = "チョコを詰めた花火を打ち上げて、辺り一面にチョコの雨を降らすんです！"
80000117-13 = "チョコを塗った手持ち花火で花火とチョコの香りの両方を楽しめるものとかもいいですね！"
80000117-14 = "[s] \"そ、それはどうだろうね……！\""
80000117-15 = "そうですか……。"
80000117-16 = "でもそうですね……今日は特に捻らなくても盛り上がっているような気がします。"
80000117-17 = "それに……。"
80000117-18 = "私も……。"
80000117-19 = "いつもお祭りのことだけを考えているわけではないんですよ？"
80000117-20 = "百夜堂ではバレンタインに合わせ、特別な商品を用意しているんです。"
80000117-21 = "和菓子とチョコをセットにして販売しておりまして――"
80000117-22 = "これが結構人気なんです。"
80000117-23 = "バレンタイン限定品としても、バレンタインを忘れていた人たちの受け皿としても機能しているみたいで――"
80000117-24 = "[s] \"百夜堂は商売上手だね……！\""
80000117-25 = "あ、あはは……それは社長のアイデアですよ！"
80000117-26 = "私にはそこまで思いつきませんでした。"
80000117-27 = "[s1] \"ウミカはまだ1年生でしょ？\"\n[s2] \"これからだよ！\""
80000117-30 = "はい！いつか私も社長のような経営者になり――"
80000117-31 = "キヴォトス中を巻き込んで……！"
80000117-32 = "すごく素敵な――"
80000117-36 = "――盛り上がるお祭りを催したいです！"
80000117-37 = "[s3] \"応援するよ！\"\n[s4] \"でも、花火はほどほどにね……！\""
80000117-40 = "ありがとうございます！"
80000117-41 = "そのためにも、一日一日を大事にしつつ、過ごしていきたいです！"
80000117-42 = "……その。"
80000117-43 = "そ、それでですね……？"
80000117-44 = "いつも……応援してくださる先生に……！"
80000117-45 = "ちゃんと……した……。"
80000117-46 = "……。"
80000117-47 = "……恩返しをしたいと思いまして！"
80000117-48 = "日頃色々していただいていることに比べたら、小さなものですが……。"
80000117-49 = "少しでも感謝の気持ちを伝えたくて……！"
80000117-50 = "どうか、受け取ってください！"
80000117-55 = "[ns] \"これは……神輿のチョコ？\""
80000117-56 = "えへへ……気づきましたか？"
80000117-57 = "お祭りと言えば、神輿ですよね！"
80000117-58 = "せっかくだし、私らしいチョコにしてみました！"
80000117-59 = "ちなみに、屋根も開きますよ！"
80000117-60 = "[s] \"すごく凝ってるね……！\""
80000117-61 = "そして、神輿の中には――"
80000117-62 = "私にとって……。"
80000117-63 = "特別なチョコを、入れています。"
80000117-64 = "……先生、ご存じですか？"
80000117-65 = "神輿は神様の乗り物だと言われています。"
80000117-66 = "お祭りが盛り上がる中――"
80000117-67 = "神様は神輿を通してみんなのもとを訪れて………"
80000117-68 = "私たちを見守ってくれているんです。"
80000117-69 = "なので、神輿の中には普通、[ruby=しんもつ]神物[/ruby]を入れておくものですが……"
80000117-70 = "そうしなかったのは、神輿の神様の役割が……"
80000117-71 = "先生みたいだな、と思ったからです。"
80000117-72 = "[s] \"え？私が？\""
80000117-73 = "は、はい。"
80000117-74 = "……先生は、いつも私たちを見守ってくれていますから。"
80000117-75 = "だから、想いを込めたチョコを……"
80000117-76 = "神物として納めています。"
80000117-77 = "せっかくですので……"
80000117-78 = "神輿の屋根を開けて……"
80000117-79 = "神物のチョコから召し上がっていただいてもいいでしょうか？"
80000117-80 = "食べる順番に、本当は意味なんてないのかもしれません……"
80000117-81 = "でも……"
80000117-82 = "[s5] \"ありがとう。\"\n[s6] \"ちょっと照れるけど、いただくね。\""
80000117-85 = "はい！"
80000117-86 = "わ、私はお茶でも淹れてきますので……！"
80000117-87 = "ごゆっくり召し上がってください！"
80000117-88 = "し、失礼します……！"
80000117-93 = "（顔を赤くしたままキッチンに入っていくウミカの背中を見つめながら……）"
80000117-94 = "（想いが込められた神物のチョコを、ゆっくりと手に取った）"
