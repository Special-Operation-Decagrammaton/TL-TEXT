[translation]
80000117-1 = "O Dia dos Namorados também é um festival"
80000117-2 = "É Dia dos Namorados, Sensei!"
80000117-3 = "[s] \"É, pois é...!\""
80000117-4 = "Não poderíamos dizer que o Dia dos Namorados é o festival do chocolate?"
80000117-5 = "[s] \"Talvez seja verdade...\""
80000117-6 = "Preparar chocolates com o coração acelerado..."
80000117-7 = "No dia, a cidade fica coberta de chocolates fofos e todos ficam felizes..."
80000117-8 = "Acho que é algo maravilhoso."
80000117-9 = "Sendo assim... como é um festival, que tal lançarmos fogos de artifício de chocolate!"
80000117-10 = "[s] \"Fogos de... artifício de chocolate...!?\""
80000117-11 = "Sim!"
80000117-12 = "Lançar fogos de artifício recheados de chocolate e fazer chover chocolate por toda parte!"
80000117-13 = "Também seria legal ter fogos de mão cobertos de chocolate para aproveitar tanto o aroma do chocolate quanto o dos fogos!"
80000117-14 = "[s] \"B-bem, não sei se isso daria certo...!\""
80000117-15 = "É mesmo..."
80000117-16 = "Mas é verdade... sinto que hoje já está bem animado sem precisar inventar muito."
80000117-17 = "Além disso..."
80000117-18 = "Eu também..."
80000117-19 = "Não penso apenas em festivais o tempo todo, sabe?"
80000117-20 = "Na Hyakkiyako, preparamos produtos especiais para o Dia dos Namorados."
80000117-21 = "Estamos vendendo um conjunto de doces japoneses com chocolate e..."
80000117-22 = "Isso é bem popular."
80000117-23 = "Parece que funciona tanto como um item de edição limitada quanto como uma salvação para quem esqueceu da data..."
80000117-24 = "[s] \"A Hyakkiyako é muito boa nos negócios...!\""
80000117-25 = "Ah, ahaha... essa foi ideia da presidente!"
80000117-26 = "Eu não teria pensado em algo assim."
80000117-27 = "[s1] \"A Umika ainda está no primeiro ano, né?\"\n[s2] \"Você ainda vai chegar lá!\""
80000117-30 = "Sim! Um dia eu também serei uma gestora como a presidente e..."
80000117-31 = "Envolverei todo o Kivotos...!"
80000117-32 = "Algo muito incrível..."
80000117-36 = "— quero organizar um festival muito animado!"
80000117-37 = "[s3] \"Eu te apoio!\"\n[s4] \"Mas, pegue leve com os fogos de artifício...!\""
80000117-40 = "Muito obrigada!"
80000117-41 = "Para isso, quero viver cada dia da melhor forma possível!"
80000117-42 = "..."
80000117-43 = "E, então..."
80000117-44 = "Para o Sensei, que sempre me apoia...!"
80000117-45 = "Algo... adequado..."
80000117-46 = "..."
80000117-47 = "...eu queria retribuir o favor!"
80000117-48 = "Comparado a tudo o que você faz por mim diariamente, é algo pequeno, mas..."
80000117-49 = "Eu queria expressar um pouco da minha gratidão...!"
80000117-50 = "Por favor, aceite!"
80000117-55 = "[ns] \"Isso é... um chocolate em formato de Mikoshi?\""
80000117-56 = "Ehehe... você percebeu?"
80000117-57 = "Falando em festival, não tem como não pensar em um Mikoshi!"
80000117-58 = "Já que era para ser algo especial, fiz um chocolate que tem tudo a ver comigo!"
80000117-59 = "Aliás, o telhado também abre!"
80000117-60 = "[s] \"É muito detalhado...!\""
80000117-61 = "E, dentro do Mikoshi..."
80000117-62 = "Para mim..."
80000117-63 = "Eu coloquei um chocolate especial."
80000117-64 = "……Professor, você sabia?"
80000117-65 = "Dizem que o Mikoshi é o veículo dos deuses."
80000117-66 = "Enquanto o festival está em seu auge—"
80000117-67 = "O deus visita a todos através do Mikoshi e..."
80000117-68 = "Fica nos observando."
80000117-69 = "Por isso, normalmente, coloca-se uma oferenda dentro do Mikoshi, mas..."
80000117-70 = "Eu não fiz isso porque achei que o papel do deus no Mikoshi..."
80000117-71 = "É parecido com o do Professor."
80000117-72 = "[s] \"Eh? Eu?\""
80000117-73 = "S-sim."
80000117-74 = "……Porque o Professor está sempre nos observando."
80000117-75 = "Por isso, o chocolate com meus sentimentos..."
80000117-76 = "Eu o guardei como uma oferenda."
80000117-77 = "Já que estamos aqui..."
80000117-78 = "Poderia abrir o teto do Mikoshi..."
80000117-79 = "E experimentar o chocolate que ofereci primeiro?"
80000117-80 = "Talvez não haja um significado real na ordem em que se come..."
80000117-81 = "Mas..."
80000117-82 = "[s5] \"Obrigado.\"\n[s6] \"Estou um pouco envergonhado, mas vou aceitar.\""
80000117-85 = "Sim!"
80000117-86 = "E-eu vou preparar um chá, então...!"
80000117-87 = "Por favor, coma com calma!"
80000117-88 = "C-com licença...!"
80000117-93 = "(Observando as costas de Umika enquanto ela entra na cozinha com o rosto corado...)"
80000117-94 = "(Peguei lentamente o chocolate que serviu de oferenda, carregado de sentimentos.)"
