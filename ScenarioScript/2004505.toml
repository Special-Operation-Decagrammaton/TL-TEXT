[translation]
2004505-1 = "Crônica do Guia Cavalheiresco"
2004505-2 = "（Chegamos rapidamente à Vila do Cinema）"
2004505-3 = "（Não foi muito difícil encontrar a Phina）"
2004505-7 = "Olá a todos, eu sou a Phina e serei a guia de vocês hoje."
2004505-8 = "O que vocês verão hoje é uma adaptação teatral da obra-prima do cinema, \"A Lenda do Nyan-Nyan Cavalheiresco\"."
2004505-9 = "Embora tenha sido lançado como uma obra de entretenimento, foi aclamado por seu tema afiado e direção delicada, ganhando inúmeros prêmios, e agora brilha intensamente no palco!"
2004505-10 = "É uma obra de esforço que utiliza criatividade dentro dos limites da encenação teatral para reproduzir fielmente várias cenas icônicas!"
2004505-11 = "Entendi."
2004505-12 = "Estou começando a ficar empolgado!"
2004505-13 = "Que explicação profissional!"
2004505-14 = "……Ver para crer! Por favor, aproveitem ao máximo a \"Lenda do Nyan-Nyan Cavalheiresco\", o orgulho de Hyakkiyako!"
2004505-18 = "[ns1] \"Phina, você está muito legal!\"\n[ns2] \"A Phina explicando tudo com calma também é maravilhosa!\""
2004505-23 = "Ah! Sensei!"
2004505-24 = "……Hehe. Que vergonha."
2004505-25 = "Na verdade, só de ver o título de uma história de cavalheirismo, meu coração já começa a arder……!"
2004505-26 = "Mas aprendi que, para guiar os clientes, a compostura também é importante!"
2004505-27 = "Por isso, hoje, estou agindo como um galã de filmes de cavalheirismo: silenciosa como a floresta e imóvel como a montanha!"
2004505-28 = "[s] \"Muito legal……!\""
2004505-29 = "Hehe…… Fico muito feliz em receber elogios do Sensei!"
2004505-30 = "Ah, vai começar em breve! Por favor, divirtam-se!"
2004505-32 = "（A peça começou e a plateia ficou em silêncio）"
2004505-33 = "（Em uma atmosfera solene, a história se desenrola……！）"
2004505-35 = "Hmm…… O que será que significa esse \"Sakazuki\" que eles mencionam tanto……"
2004505-36 = "O \"Sakazuki\" é um ritual importante no mundo do cavalheirismo para selar laços de sangue.#nAqueles dois estão prestes a selar um pacto de justiça."
2004505-37 = "Ah, então não é apenas um banquete……"
2004505-38 = "Obrigada pela explicação……!"
2004505-43 = "Com licença, guia. O que significa \"Dosu\"?"
2004505-44 = "Isso é……"
2004505-49 = "[ns3] （Ela está explicando com precisão para não atrapalhar a peça……） \n[ns4] （Phina, que trabalho maravilhoso!） "
2004505-53 = "Eu \"limpei a bagunça\" deles, e é assim que me tratam……!"
2004505-54 = "L-limpar a bagunça……?"
2004505-55 = "Significa consertar os erros dos outros!"
2004505-56 = "O quê!?"
2004505-57 = "Nyansuke se desculpou no lugar deles e assumiu a responsabilidade…… m-mas, ainda assim……!"
2004505-58 = "Ainda assim, abandoná-lo……#nNão importa onde esteja neste mundo, tal injustiça não será tolerada!"
2004505-59 = "O-obrigada por explicar……?"
2004505-61 = "（A história finalmente chega ao clímax——）"
2004505-63 = "Seu…… maldito……"
2004505-64 = "Você nos traiu, seu canalha!"
2004505-65 = "！？"
2004505-66 = "Nyansuke! É agora! Acabe com ele!!"
2004505-70 = "[ns5] \"Ei, Phina!?\"\n[ns6] \"V-você está falando muito alto……!\""
2004505-73 = "Não posso aceitar que alguém que segue a justiça perca!!"
2004505-77 = "[ns] （Droga…… será que os clientes ficaram assustados……！？）"
2004505-78 = "……O-o que começou agora?"
2004505-79 = "Estava tudo tão quieto, e de repente, no clímax……"
2004505-80 = "I-isso é…… já sei!"
2004505-81 = "É o \"teatro imersivo\", que está na moda……!"
2004505-85 = "Ah! A guia tomou a iniciativa para quem está vendo pela primeira vez……!"
2004505-86 = "Eu queria muito experimentar isso!"
2004505-87 = "Vai, Nyansuke! Não perde não!"
2004505-88 = "Vocês dois são "amantes de saquê", né! Acertem as contas logo!"
2004505-89 = "Isso! Nyansuke, vai! Força! É isso aí!!"
2004505-96 = "M-m-mil perdões!!"
2004505-97 = "Eu assisti à "Lenda dos Gatinhos Ninkyo" no palco e fiquei empolgada demais...!"
2004505-98 = "Assim eu não sirvo como guia... já estou deserdada!"
2004505-99 = "Como eu vou pagar por esse erro...? T-tenho que cortar meu dedo...?"
2004505-100 = "[s7] \"Feena, acalme-se um pouco...\"\n[s8] \"Se houve algum dano, eu assumirei a responsabilidade...\""
2004505-103 = "Hahaha! Nós já subimos em muitos palcos, mas é a primeira vez que um membro da plateia nos deixa impressionados, mocinha!"
2004505-104 = "Não se preocupe, parece que todo mundo se divertiu."
2004505-105 = "M-mas, por culpa da Feena, o palco que deveria ser..."
2004505-106 = "É verdade, foi um pouco diferente das apresentações de sempre."
2004505-107 = "Mas, esse tipo de coisa não é nada mal."
2004505-108 = "Me lembrou dos shows de heróis que eu fazia quando era jovem."
2004505-109 = "Sinto que ganhei energia de você e de todo o público."
2004505-110 = "Nunca imaginei que todos ficariam tão animados assim... Obrigado, mocinha."
2004505-111 = "Uuu... estou profundamente grata e emocionada...!"
2004505-116 = "Com licença... é possível tirar uma foto com os atores...?"
2004505-117 = "Foi super divertido, então eu queria muito tirar uma foto de recordação!"
2004505-118 = "Oh, seja muito bem-vinda! Que tal você também, mocinha?"
2004505-119 = "...A Feena também!?"
2004505-123 = "Vamos, não seja tímida!"
2004505-129 = "(Dessa forma, o palco chegou ao fim em segurança)"
2004505-130 = "(O dia terminou ao ver Feena, que, embora um pouco envergonhada, exibia uma expressão de alívio)"
