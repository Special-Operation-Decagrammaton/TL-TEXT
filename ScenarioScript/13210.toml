13210-124 = "Olha, veja aqui."
13210-125 = "\"Área Restrita do Deserto de Abydos, Setor 35-9\"?"
13210-126 = "Pelo menos, acho que a pista está aqui!"
13210-130 = "Haa..."
13210-131 = "Não vai dar, né...?"
13210-132 = "Francamente, Yume-senpai..."
13210-133 = "H-hau..."
