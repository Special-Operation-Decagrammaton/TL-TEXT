13210-184 = "Precisamos encontrar um jeito……."
13210-185 = "Primeiro, vamos atrás da Hoshino-senpai! #nEu não vou mais hesitar!"
13210-187 = "Mas mesmo que a gente vá atrás, não somos páreo para a Hoshino-senpai, né?"
13210-188 = "Hmm……."
13210-189 = "Sensei, não tem ninguém que possa nos ajudar?"
13210-190 = "Alguém tão forte quanto a Hoshino-senpai……."
13210-191 = "[s] \"Hmm…….\""
13210-193 = "É uma boa ideia, mas não acho que isso resolveria o problema fundamental."
13210-194 = "Sinto que, se um problema parecido acontecer de novo no futuro, #nela tentará resolver tudo sozinha, seguindo os passos da Presidente Yume."
13210-195 = "Temos que dar um jeito nisso nós mesmas."
13210-197 = "Então, decidido!"
13210-198 = "Hm."
13210-199 = "Partindo imediatamente……."
13210-200 = "……Espera, eu não sei onde fica."
13210-205 = "Hmm……."
13210-206 = "Parecia que a Hoshino-senpai sabia……."
13210-208 = "……Senhorita."
13210-209 = "……?"
13210-210 = "Aconteceu algo—"
13210-216 = "Por acaso o mordomo sabe onde fica!?"
13210-217 = "O Presidente disse: \"Área de Fechamento do Deserto de Abydos, Setor 35-9\"."
13210-218 = "Provavelmente se refere à região de deserto rochoso a cerca de 480 km daqui."
13210-223 = "Existe uma estação da ferrovia transdesértica lá."
13210-226 = "……Está aberta."
13210-237 = "……O sistema de controle está funcionando."
13210-238 = "Eu achei que fosse só sucata, mas……."
13210-242 = "Autoridade de administrador, \"Izayoi Nonomi\"……."
13210-243 = "Entendi."
13210-244 = "Só não estava sendo usado, mas as funções continuam intactas."
13210-245 = "Destino…… \"Vale do Conselho Estudantil\", pronto."
13210-246 = "O trem que partiu um pouco antes #nprovavelmente é o que aquela garota de tapa-olho pegou."
13210-247 = "Como será que faz para mover isso…… será que é aqui?"
13210-257 = "……Acertei."
13210-259 = "Parece apenas uma estação abandonada……."
13210-260 = "Na verdade, é uma estação de ramal que conecta ao \"Vale do Conselho Estudantil\"."
13210-261 = "Se usar o cartão da senhorita para acessar a autoridade, #nserá possível reiniciar o sistema do trem."
13210-262 = "Isso significa que……."
13210-263 = "Mordomo……."
13210-269 = "[ns] \"Muito obrigada.\""
13210-270 = "……De nada."
13210-271 = "Senhorita, peço mil perdões."
13210-272 = "……Mordomo."
13210-273 = "Por favor, apresse-se. #nA Hoshino e a Suou devem ter ido para lá."
13210-274 = "Sim……."
13210-275 = "A propósito…… quem é a Suou, afinal?"
13210-276 = "No início, pensei que ela fosse da Highlander. #nMas parece que ela também esteve ligada à Nephthys e a fundos de investimento privados, #ne por fim, achei que fosse da Kaiser, mas isso também foi uma traição……."
13210-277 = "Além disso, por que ela está de olho na Hoshino-senpai……."
13210-281 = "A Asagiri Suou era uma delinquente que vagava por aí sem pertencer a nenhuma escola específica."
13210-282 = "Quando estávamos procurando por um guarda-costas para a sua matrícula na Highlander, #nfoi quando soubemos da existência dela."
13210-283 = "Meu guarda-costas……?"
13210-284 = "Sim. Porém, como a senhorita se matriculou em Abydos, essa função deixou de existir. #nDepois disso, esqueci da existência dela por um tempo, mas……."
13210-285 = "Quando percebi, ela estava no cargo de supervisora."
13210-286 = "Entrei em contato com ela pela primeira vez em muito tempo por causa deste incidente."
13210-291 = "……Quem ela é de verdade e o que está pensando, #nisso nem eu sei dizer."
13210-292 = "Se formos ao Vale do Conselho Estudantil……."
13210-293 = "Sim, provavelmente. #nMas, para alcançá-las, teremos que usar o trem de alta velocidade."
13210-295 = "……Esse é o problema, não é?"
13210-296 = "O que faremos……."
13210-302 = "Pahyahya, parece que vocês precisam de uma mãozinha, né?"
13210-311 = "A heroína chegou."
13210-313 = "Vocês são……!"
13210-315 = "Vocês precisam de um trem de alta velocidade, né?"
13210-316 = "A-ah…… nós conhecemos bem a ferrovia que atravessa o deserto, #ne como vocês nos ajudaram antes……."
13210-317 = "Pois é. #nSobre trens, isso também tem a ver com a gente."
13210-318 = "É isso aí, somos as vítimas, afinal."
13210-319 = "A gente leva vocês!"
13210-321 = "Que prestativas!"
13210-322 = "Sim, sim☆ #nObrigada, pessoal da Highlander!"
13210-323 = "Hum, obrigada."
13210-325 = "Uou, vou fazer um drift nos trilhos duplos agora."
13210-326 = "Ahaha! #nÉ perigoso, então pega leve, tá?"
13210-328 = "E-está tudo bem mesmo? #nEm termos de segurança……."
13210-334 = "[ns] \"Obrigada, vocês três.\""
13210-335 = "Beleza, vamos nos preparar rapidinho!"
13210-343 = "Ei, estamos prontas!"
13210-344 = "Tudo certinho."
