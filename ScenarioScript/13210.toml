13210-351 = "Ahaha, só por precaução."
13210-352 = "Bom, acho que não vamos usar, provavelmente."
13210-353 = "Talvez."
13210-354 = "E-está tudo bem mesmo? #nÉ uma substância tóxica, tomem cuidado ao manusear……."
13210-356 = "Tá, tá, fica tranquila, Ayane-chan. #nVai dar tudo certo."
13210-357 = "Hum."
13210-359 = "Isso, chega de papo, subam logo!"
13210-364 = "T-tá bom…… entendi."
