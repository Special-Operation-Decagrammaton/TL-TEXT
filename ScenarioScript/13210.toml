13210-139 = "Hoshino-chan!"
13210-141 = "Desta vez vamos encontrar o tesouro!"
13210-146 = "E-espera, Hoshino-chan. #nVocê precisa trocar de roupa primeiro!"
13210-149 = "Ah!"
13210-160 = "Yume-senpai, não encontramos nada."
