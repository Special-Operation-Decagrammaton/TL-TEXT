13210-377 = "Uau~☆#nQue incrível!"
13210-378 = "Ué... por que tem cintos de segurança no trem?"
13210-380 = "Bem, montanhas-russas também têm, então não é estranho, né?"
13210-385 = "Sim, sim!#nParece que estou em uma atração!"
