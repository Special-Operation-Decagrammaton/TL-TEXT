13210-165 = "..."
13210-169 = "Área Restrita do Deserto de Abydos - Setor 35-9"
13210-171 = "……Não mudou nada."
13210-174 = "……Eu acho que ela está presa."
13210-175 = "Isso é……."
13210-176 = "Ou talvez, nós também estejamos……."
13210-177 = "Presas a algo……."
13210-178 = "Hmm……."
13210-179 = "[s] \"Presa, é?\""
13210-180 = "Mesmo assim, precisamos impedir a Hoshino-senpai."
13210-182 = "Concordo. #nSe destruirmos o trem blindado, a Kaiser vai exigir uma indenização astronômica."
