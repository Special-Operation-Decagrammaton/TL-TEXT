13210-24 = "..."
13210-25 = "Independentemente do resultado..."
13210-26 = "...Peço perdão."
13210-27 = "Desde que soube da existência do canhão ferroviário, #nminha cabeça só pensava nisso..."
13210-28 = "Pensando que, com aquilo, poderíamos recuperar a glória do passado."
13210-29 = "Que a Nephthys poderia retornar a Abydos..."
13210-30 = "Não tenho mais nada a dizer."
13210-31 = "..."
13210-32 = "Então, mordomo, cuide-se."
13210-33 = "O-onde a senhorita vai?!"
13210-34 = "Vou impedir a Hoshino-senpai."
13210-35 = "Se continuar assim, ela vai assumir sozinha a responsabilidade pela destruição do canhão #ne será expulsa."
13210-36 = "M-mas como...?"
13210-37 = "...Ainda não sei. Mas, se pensarmos juntos, com certeza dará certo."
13210-41 = "..."
13210-43 = "Eu não consegui impedi-la de novo. #nSe eu fosse mais forte..."
13210-44 = "Eu já disse que a culpa não é sua, Shiroko-senpai. #nA Hoshino-senpai é forte demais."
13210-45 = "...Anime-se, Shiroko-chan."
13210-46 = "..."
13210-47 = "Se continuar assim, a Hoshino-senpai vai desaparecer."
13210-48 = "Se ela testemunhar que tudo foi um ato isolado..."
13210-49 = "Abydos não será responsabilizada caso algum problema ocorra..."
13210-50 = "Ela estava agindo de um jeito estranho, não estava?"
13210-51 = "Não sei explicar, mas parecia que ela estava encurralada."
13210-52 = "Se fosse a senpai de sempre, ela teria pensado em uma solução com todos nós..."
13210-54 = "...É parecido com aquela época."
13210-59 = "A Hoshino-senpai parece acreditar que a destruição do canhão ferroviário foi a vontade da presidente Yume."
13210-60 = "Hã? A presidente Yume não teria dito algo assim, teria?"
13210-61 = "Sim. Mas a Hoshino-senpai diz: 'Se fosse a Yume-senpai, ela faria isso'."
13210-62 = "Por que..."
13210-64 = "Isso é apenas uma suposição minha, mas..."
13210-65 = "Provavelmente..."
13210-74 = "Hoje vamos fazer uma caça ao tesouro!"
13210-75 = "Ei, Hoshino-chan...?"
13210-81 = "Ah, Senpai. O que houve desta vez?"
13210-82 = "É que... quer dizer, por que você está assim, Hoshino-chan?"
13210-83 = "Isso é..."
13210-84 = "Será que você finalmente se confundiu e achou que era um peixinho...?"
13210-88 = "Não tem como ser isso!"
13210-89 = "Eu estava consertando o encanamento e acabei me molhando, então só troquei de roupa!"
13210-90 = "Ah, lá no pátio? #nEntão você estava consertando."
13210-91 = "Não, ainda não consegui consertar. #nÉ mais difícil do que eu pensava..."
13210-92 = "Fufu, então tem coisas que a Hoshino-chan não consegue fazer."
13210-93 = "Parece até o tiozinho desajeitado, é um pouco fofo."
13210-94 = "Isso, "
13210-95 = "mas o que houve com a caça ao tesouro?"
13210-97 = "Ah, é verdade. Olha só, Hoshino-chan!"
13210-101 = "Consegui uma informação incrível!"
13210-102 = "Eu já não consigo mais confiar no \"incrível\" da Senpai..."
13210-103 = "Desta vez é sério, acredite em mim!"
13210-104 = "Você não foi enganada de novo, foi?"
13210-105 = "O \"Vale do Conselho Estudantil\"...?"
13210-106 = "Dizem que existe um museu que a presidente do conselho estudantil de Abydos construiu antigamente!"
13210-107 = "Dizem que tem um monte de itens valiosos em exposição!"
