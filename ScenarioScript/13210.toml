[translation]
13210-1 = "Episódio 21; A Segunda Perseguição"
13210-2 = "Pessoal, vocês estão bem?"
13210-3 = "G-graças a vocês, estou salvo..."
13210-5 = "Não dá para continuar. Vamos desistir."
13210-6 = "Foi um erro tentar mexer com Abydos..."
13210-8 = "Eu nunca imaginei que as coisas terminariam assim..."
13210-9 = "Se eu não tivesse me envolvido desde o início..."
13210-11 = "O Presidente deve enviar reforços em breve. #nSe formos rápidos, talvez ainda hoje à tarde..."
13210-12 = "Por favor, fujam antes que Abydos se transforme em um campo de batalha."
13210-13 = "E-entendido..."
13210-16 = "Senhorita..."
