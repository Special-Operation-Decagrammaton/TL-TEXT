[translation]
13210-1 = "第21話;二度目の追跡"
13210-2 = "みんな、大丈夫？"
13210-3 = "お、おかげで助かりました……。"
13210-5 = "これ以上は無理です。手を引きましょう。"
13210-6 = "アビドスに手を出そうとしたのが間違っていたんだ……。"
13210-8 = "まさか、こうなるとは思いも……。"
13210-9 = "最初から関わっていなければ……。"
13210-11 = "プレジデントは、じきに兵力を送り込んでくるはずです。#n早ければ、今日の夕方にでも……。"
13210-12 = "アビドスが戦場と化す前に、皆さんは逃げてください。"
13210-13 = "わ、分かりました……。"
13210-16 = "お嬢様……。"
13210-17 = "執事さん、大丈夫ですか……？"
13210-18 = "わ、私はなんてことを……。"
13210-19 = "アビドスは、すぐ戦場になってしまうでしょう。"
13210-20 = "こんな、はずじゃ……。"
13210-21 = "分かっています、執事さん。"
13210-22 = "……お嬢様。"
13210-23 = "手段こそ違いましたが、#n執事さんもアビドスの復興を願っていたんですよね。"
13210-24 = "……。"
13210-25 = "結果はどうあれ……。"
13210-26 = "……申し訳、ありません。"
13210-27 = "列車砲の存在を知ってからというもの、#nそれで頭がいっぱいになってしまい……。"
13210-28 = "アレさえあれば、また過去の栄光を取り戻せる、と。"
13210-29 = "ネフティスは、再びアビドスに戻れるはずだ、と……。"
13210-30 = "私から言えることは、何もありません。"
13210-31 = "……。"
13210-32 = "では執事さん、お元気で。"
13210-33 = "ど、どこに行くのですか、お嬢様！"
13210-34 = "ホシノ先輩を止めに行きます。"
13210-35 = "このままでは、列車砲を破壊した責任を一人で負って、#n退学するつもりでしょうから。"
13210-36 = "し、しかしどうやって……？"
13210-37 = "……まだ、何も。ですが、みんなで考えれば、きっとうまくいきます。"
13210-41 = "……。"
13210-43 = "また止められなかった。#n私がもっと強かったら……。"
13210-44 = "だから、シロコ先輩のせいじゃないって。#nホシノ先輩が強すぎるんだよ。"
13210-45 = "……元気出してください、シロコちゃん。"
13210-46 = "……。"
13210-47 = "このままでは、ホシノ先輩がいなくなってしまいます。"
13210-48 = "すべて独断の犯行だと証言すれば……。"
13210-49 = "何か問題が発生した時、アビドスが責任を問われることはないから……。"
13210-50 = "ちょっと変だったわよね、先輩。"
13210-51 = "うまく言えないけど、追い詰められてるような。"
13210-52 = "いつもの先輩なら、みんなで解決策を考えてたはずなのに……。"
13210-54 = "……あの時と似てる。"
13210-59 = "ホシノ先輩は、列車砲の破壊をユメ会長の意志だと思っているみたいです。"
13210-60 = "えっ、ユメ会長はそんなこと言ってないはずよね？"
13210-61 = "うん。でも、ホシノ先輩は「ユメ先輩ならこうするはず」って。"
13210-62 = "どうして……。"
13210-64 = "これは、私の想像でしかありませんが……。"
13210-65 = "おそらく……。"
13210-74 = "今日は宝探しをするよ！"
13210-75 = "お～い、ホシノちゃん……？"
13210-81 = "あっ、先輩。今度はどうしたんですか？"
13210-82 = "それはね……って、ホシノちゃんこそどうしたの？"
13210-83 = "これは……。"
13210-84 = "もしかして、ついに自分のことをお魚さんだと勘違いしちゃったとか……。"
13210-88 = "そんなわけないじゃないですか！"
13210-89 = "水道の修理をしてたら濡れちゃったので、着替えただけです！"
13210-90 = "あっ、グラウンドのところ？#n直してくれたんだね。"
13210-91 = "いえ、まだ直せてません。#n思ったより難しくて……。"
13210-92 = "ふふっ、ホシノちゃんにもできないことがあるんだ。"
13210-93 = "不器用なおじさんみたいで、ちょっと可愛いね。"
13210-94 = "そ、"
13210-95 = "それより宝探しがどうしたんです？"
13210-97 = "あっ、そうなの。見て見て、ホシノちゃん！"
13210-101 = "すごい情報を手に入れたんだ！"
13210-102 = "先輩の言う「すごい」は、もう信用できないんですけど……。"
13210-103 = "今度こそ大丈夫だから、信じて！"
13210-104 = "また騙されてないですよね？"
13210-105 = "「生徒会の谷」……？"
13210-106 = "昔、アビドスの生徒会長が作った展示館があるらしいの！"
13210-107 = "貴重な物が、いーっぱい展示されてるんだって！"
13210-108 = "もし本当だとしても、#nとっくに売り払ったか盗まれてると思いますよ。"
13210-109 = "ふっふっふ、そう思うよね？"
13210-110 = "でもここは、一般に公開されてない秘密の場所にあるんだって。"
13210-112 = "つまり……。"
13210-113 = "学校が経営難で売っちゃってたら仕方ないけど、#n少なくとも盗まれてる可能性は少ないよ！"
13210-114 = "だから……探しに行こう、と？"
13210-115 = "うん！"
13210-116 = "……誰も場所を知らないのに、どうやって探すんですか？"
13210-117 = "ふふん！"
13210-118 = "昔の書類を漁ってたら、これを見つけたの！"
13210-119 = "……何ですか、これ。"
13210-123 = "黒く塗りつぶされてるところが多くて、全然読めませんけど。"
13210-124 = "ほら、ここ見て。"
13210-125 = "「アビドス砂漠閉鎖地区セクター35-9」？"
13210-126 = "少なくとも、ここに手がかりがあると思うの！"
13210-130 = "はぁ……。"
13210-131 = "ダメ、かな……？"
13210-132 = "まったく、ユメ先輩は……。"
13210-133 = "は、はぅ……。"
13210-138 = "なんでもっと早く言わないんですか！#nすぐ行きますよ！"
13210-139 = "ホシノちゃん！"
13210-141 = "今度こそお宝を見つけましょう！"
13210-146 = "ほ、ホシノちゃん待って。#n先に着替えないと！"
13210-149 = "あっ！"
13210-160 = "ユメ先輩、何も見つかりませんよ。"
13210-161 = "……こっちもハズレみたい、うぅ。"
13210-165 = "……。"
13210-169 = "アビドス砂漠閉鎖地区・セクター35-9"
13210-171 = "……変わらないな。"
13210-174 = "……囚われているんだと思います。"
13210-175 = "それって……。"
13210-176 = "あるいは、私たちもまた……。"
13210-177 = "何かに囚われているような……。"
13210-178 = "うーん……。"
13210-179 = "[s] \"囚われている、か。\""
13210-180 = "それでも、ホシノ先輩を止めないと。"
13210-182 = "そうですね。#n列車砲を破壊したら、カイザーは莫大な損害賠償を請求してくるでしょう。"
13210-183 = "このまま見過ごすわけにはいきません。"
13210-184 = "何か、方法を探さなくては……。"
13210-185 = "まずはホシノ先輩を追いかけましょう！#nもう、私は迷いません！"
13210-187 = "でも追いかけたところで、ホシノ先輩には敵わないじゃない。"
13210-188 = "うーん……。"
13210-189 = "先生、誰か助けてくれそうな人はいない？"
13210-190 = "ホシノ先輩並みに強い人で……。"
13210-191 = "[s] \"うーん……。\""
13210-193 = "良い案ですが、それでは根本的な解決にならないかと。"
13210-194 = "またいつか、似たような問題が起きた時も、#nユメ会長の背中を追って一人で解決しようとすると思うんです。"
13210-195 = "これは、私たちで何とかするしかありません。"
13210-197 = "じゃあ、決まりね！"
13210-198 = "ん。"
13210-199 = "すぐに出発……。"
13210-200 = "……って、場所が分からないんだったわ。"
13210-205 = "うーん……。"
13210-206 = "ホシノ先輩は知っているようでしたが……。"
13210-208 = "……お嬢様。"
13210-209 = "……？"
13210-210 = "どうかしま――"
13210-216 = "もしかして執事さんは、どこにあるのか知っているのですか！？"
13210-217 = "「アビドス砂漠閉鎖地区セクター35-9」と、プレジデントは言っていました。"
13210-218 = "おそらく、ここから480kmほど離れた岩石砂漠地帯のことでしょう。"
13210-223 = "そこには砂漠横断鉄道の駅があります。"
13210-226 = "……開いてる。"
13210-237 = "……管制システムが動いてる。"
13210-238 = "ただのガラクタだと思ってたけど……。"
13210-242 = "管理者権限、「[ruby=いざよい]十六夜[/ruby]ノノミ」……。"
13210-243 = "そっか。"
13210-244 = "ずっと使われてなかっただけで、機能はそのままだったんだ。"
13210-245 = "目的地は……「生徒会の谷」っと。"
13210-246 = "少し前に発車した電車は、#nあの眼帯ちゃんが乗っていったやつだろうね。"
13210-247 = "どうすれば動かせるんだろ……これかな。"
13210-257 = "……当たりだね。"
13210-259 = "ただの閉鎖された駅にも見えますが……。"
13210-260 = "実は「生徒会の谷」に繋がる分岐駅になっています。"
13210-261 = "お嬢様のカードを使って権限にアクセスすれば、#n列車のシステムを再起動できるはずです。"
13210-262 = "ということは……。"
13210-263 = "執事さん……。"
13210-269 = "[ns] \"ありがとうございます。\""
13210-270 = "……いえ。"
13210-271 = "お嬢様、本当に申し訳ありませんでした。"
13210-272 = "……執事さん。"
13210-273 = "どうか急いでください。#nホシノさんもスオウさんも、そこに向かったはずです。"
13210-274 = "はい……。"
13210-275 = "ところで……スオウさんは、いったい何者なのでしょうか？"
13210-276 = "最初はハイランダーの方だと思っていました。#nですが、ネフティスにも私募ファンドにも所属していたようで、#n最終的にはカイザーなのかと思えば、それも裏切り……。"
13210-277 = "そのうえ、どうしてホシノ先輩に目を……。"
13210-281 = "元[ruby=あさぎり]々朝霧ス[/ruby]オウは、特定の学園に所属せずふらついていた不良でした。"
13210-282 = "お嬢様のハイランダー進学に合わせて護衛を探していたところ、#n彼女の存在を知ったのです。"
13210-283 = "私の護衛ですか……？"
13210-284 = "はい。しかしお嬢様がアビドスに進学したため、その役目はなくなりました。#nその後、しばらく存在を忘れていましたが……。"
13210-285 = "気づけば、監督官の座に。"
13210-286 = "彼女とは、今回の一件で久しぶりに連絡を取ったのです。"
13210-291 = "……本当は何者なのか、何を考えているのか、#nそれは私にも分かりません。"
13210-292 = "生徒会の谷に行けば……。"
13210-293 = "はい、おそらく。#nですが、追いつくためには高速鉄道でも使用しなければなりません。"
13210-295 = "……そこが問題になってきますね。"
13210-296 = "どうすれば……。"
13210-302 = "パヒャヒャッ、何だか助けが必要そうじゃん？"
13210-311 = "ヒーローさんじょー。"
13210-313 = "あなたたちは……！"
13210-315 = "高速鉄道が必要なんでしょ？"
13210-316 = "あ、あの……私たちなら砂漠横断鉄道に詳しいですし、#n先ほどはお世話になりましたから……。"
13210-317 = "そうそう。#n鉄道のことなら、私たちにも関係あるし。"
13210-318 = "そーそー、被害者だしー。"
13210-319 = "連れてってやるよ！"
13210-321 = "気が利くじゃない！"
13210-322 = "うんうん☆#nありがとうございます、ハイランダーの皆さん！"
13210-323 = "ん、ありがとう。"
13210-325 = "うぉー、複線ドリフト決めちゃうよー。"
13210-326 = "あははっ！#n危ないからちょっとだけにしときなよ？"
13210-328 = "だ、大丈夫なんですかね？#n安全面的に……。"
13210-334 = "[ns] \"ありがとう、三人とも。\""
13210-335 = "よーし、ちゃっちゃと準備しちゃおうか！"
13210-343 = "おーい、準備できたよ！"
13210-344 = "ばっちーし。"
13210-346 = "もう乗って良いのね？"
13210-347 = "ま、待ってください。#nそれ、何を持ってるんですか？"
13210-348 = "ヒドラジーン。"
13210-349 = "えっ、ロケットの推進剤じゃないですか！"
13210-350 = "どうしてそんな危険な物を！？"
13210-351 = "あははっ、念のためっしょ。"
13210-352 = "ま、使わないと思うけどさー、たぶん。"
13210-353 = "メイビー。"
13210-354 = "だ、大丈夫なんですよね？#n毒物ですし、取り扱いには注意を……。"
13210-356 = "はいはい、大丈夫だってアヤネちゃん。#n何とかなるわよ。"
13210-357 = "ん。"
13210-359 = "そ、良いから乗った乗った！"
13210-364 = "は、はい……分かりました。"
13210-365 = "で、では皆さん……ご無事で。"
13210-367 = "それじゃ、事務官ちゃんは私らが帰ってくるまで隠れときなよ？#nパヒャヒャッ。"
13210-368 = "ゴーゴー。"
13210-376 = "どこに座りましょう？"
13210-377 = "わあ～☆#nすごいですね！"
13210-378 = "あれ……どうして列車にシートベルトが？"
13210-380 = "まあ、ジェットコースターにもあるし、変じゃないでしょ？"
13210-385 = "うんうん！#nアトラクションに乗ってる気分です！"
13210-391 = "全員乗ったぁ？"
13210-392 = "[s] \"乗ってるよ、運転よろしくね。\""
13210-393 = "しゅっぱーつ！"
13210-401 = "きゃああっ！？"
13210-403 = "うぉー。"
13210-404 = "この列車、こんなに速度出して良いんだっけ？"
13210-405 = "知らなーい。"
13210-406 = "パヒャヒャッ！#nま、気にしなくていっか。"
13210-413 = "あ、もしかしてピンチの気配ー？"
13210-414 = "列車の上に、カイザーPMCのヘリが来てるよー。"
13210-415 = "うわっ、"
13210-416 = "先頭車両を狙ってるんじゃないの？止めないとやばいっしょ！"
13210-418 = "了解、任せて。"
13210-419 = "[s] \"出番だね。\""
13210-420 = "……はい！#n私たちで阻止しましょう！"
