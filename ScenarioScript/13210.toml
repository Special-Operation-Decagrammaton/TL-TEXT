13210-109 = "Fufufu, você acha isso, né?"
13210-110 = "Mas dizem que este lugar fica em uma área secreta que não é aberta ao público."
13210-112 = "Ou seja..."
13210-113 = "Se a escola tivesse vendido por dificuldades financeiras, não teria jeito, mas #npelo menos as chances de ter sido roubado são pequenas!"
