[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1007203-1 = "Operação de Abastecimento Subaquático (2)" 
1007203-2 = "（Após receber a mensagem da Saki, fui até o cais anterior.）" 
1007203-6 = "Fufu, fufufu..." 
1007203-10 = "Ah, Sensei. Bem-vindo." 
1007203-11 = "[s] \"Você parece estar se divertindo bastante.\"" 
1007203-12 = "Hoje de manhã, enquanto eu ajudava a organizar um armazém antigo da vila, encontrei algo maravilhoso." 
1007203-13 = "Dá só uma olhada nisso..." 
1007203-18 = "Essa 'Mina de Estocagem' (Lunge Mine)!" 
1007203-19 = "[s] \"......Mina de, estocagem?\"" 
1007203-20 = "Ué Sensei, você não conhece isso?" 
1007203-24 = "Essa é uma arma antitanque que a Academia Combinada Hyakkiyako costumava usar antigamente. Trata-se de uma carga oca montada na ponta de uma haste longa. Você a aproxima do tanque inimigo, apunhala e ela explode." 
1007203-25 = "Como a operação é absurdamente simples e o custo de produção era baixo, dizem que foi muito utilizada na Era dos Estados Combatentes (Sengoku) da Hyakkiyako, um período de muitas guerras civis..." 
1007203-26 = "Mas, se aproximar de um tanque já era incrivelmente difícil por si só, então os resultados que ela alcançava não eram lá grandes coisas." 
1007203-27 = "No entanto, seu design bruto e direto ao ponto de 'apunhalar e explodir' ganhou uma popularidade enorme entre um certo grupo de maníacos por armas." 
1007203-28 = "Apesar de tudo, quem diria que uma arma tão preciosa como esta estaria mofando em um armazém de uma vila de pescadores..." 
1007203-29 = "Parece que o pessoal pretendia jogar fora de qualquer jeito, então eu ganhei de graça dos moradores... A sorte tá do meu lado hoje!" 
1007203-30 = "[s] \"Mas e aí, como você vai usar essa arma?\"" 
1007203-31 = "Você já ouviu falar num negócio chamado 'Bang Stick' (Lança-Dardo Explosivo)?" 
1007203-32 = "É uma arma no formato de um arpão que os mergulhadores usam.\nSe você a disparar debaixo d'água, é possível abater grandes animais marinhos como tubarões e baleias com um único golpe." 
1007203-33 = "O princípio de funcionamento dessa mina de estocagem é o mesmo do Bang Stick." 
1007203-34 = "[s] \"Não me diga que...\"" 
1007203-35 = "Isso mesmo! Eu vou usar essa mina para atordoar os peixes com o impacto da explosão!" 
1007203-36 = "Na última vez que mergulhei, vi um peixe gigante do tamanho de um tronco de árvore." 
1007203-37 = "Abater um monstro daquele tamanho com um arpão comum é muito difícil...\nMas, contando com a força da pólvora, o tamanho da presa não será problema." 
1007203-38 = "[s1] \"Será que isso vai dar certo...?\"\n[s2] \"Me parece ser muito perigoso...\"" 
1007203-41 = "Fica tranquilo. Lógico que eu vou ajustar a quantidade de explosivos para não exagerar." 
1007203-42 = "Eu já fiz incontáveis treinamentos de detonação subaquática.\nNão tem como uma operadora de elite da SRT não conseguir capturar um peixe!" 
1007203-47 = "......Então, tô indo lá!" 
1007203-57 = "（Um tempo se passou...）" 
1007203-62 = "BOOOM!" 
1007203-77 = "[ns] \"S-Saki... você está bem!?\"" 
1007203-78 = "Eu tô inteira, mas..." 
1007203-79 = "O peixe..." 
1007203-83 = "Ele foi engolido pela pressão da explosão e... virou mingau..." 
1007203-84 = "......Nesse estado, não sobrou nada pra comer, sobrou?" 
1007203-85 = "Qual diabos foi o problema!? Eu calculei a carga do explosivo perfeitamente...!" 
1007203-86 = "[s] \"Acho que a força bruta da arma ainda foi demais...\"" 
1007203-87 = "......Entendi.\nMesmo ajustando, essa arma foi originalmente projetada pra rasgar a armadura de aço de tanques de guerra..." 
1007203-88 = "Acho que foi um pequeno erro usá-la num peixe..." 
1007203-89 = "[s3] \"Se a sua intenção era apunhalar e estocar o peixe...\"\n[s4] \"Você não deveria ter usado só um arpão comum e de boa...?\"" 
1007203-94 = "Ngh...!" 
1007203-95 = "I-Isso é..." 
1007203-96 = "Com certeza... faz, muito sentido..." 
1007203-97 = "Se eu tivesse emprestado um arpão comum desde o início, nós dois teríamos peixe sobrando pro mês inteiro...\nE pensar que eu deixei escapar um detalhe tão óbvio e básico só porque me distraí com um equipamento exótico..." 
1007203-98 = "Como eu sou idiota...!!" 
1007203-100 = "（......Depois disso, levei a Saki desolada ao mercado de peixes e paguei uma tigela de arroz com frutos do mar (Kaisendon) para ela.）" 
1007203-101 = "（De início, a Saki parecia totalmente sem apetite, mas no fim ela não deixou sobrar nem um grão de arroz na tigela.）" 