[translation]
1007203-1 = "Operação de abastecimento subaquático (2)"

1007203-2 = "(Recebi uma ligação de Saki e fui para a doca anterior)"

1007203-6 = "Hehe, hehehe…."

1007203-10 = "Ah, professora. Bem-vindo."

1007203-11 = "[s] \"Parece que vai ser divertido.\""

1007203-12 = "Esta manhã eu estava ajudando a limpar um antigo armazém e encontrei algo incrível."

1007203-13 = "É isso..."

1007203-18 = "Esta carga de profundidade penetrante!"

1007203-19 = "[s] \"...Shitotsu, Bakurai?\""

1007203-20 = "O que, professor, você não sabe?"

1007203-24 = "Esta é uma arma antitanque usada pela Hyakki Yako Union Academy no passado, com uma bala explosiva em forma de presa na ponta de um bastão longo. Esmague-o contra o tanque do seu oponente de perto e faça-o explodir."

1007203-25 = "Parece que foi frequentemente usado em Hyakki Yako durante o caótico período Sengoku porque era fácil de operar e o custo era mantido baixo..."

1007203-26 = "Em primeiro lugar, foi difícil chegar perto do tanque, então eles não conseguiram muito."

1007203-27 = "Contudo, o design simples de “esfaquear e detonar” está ganhando popularidade entre um certo grupo de entusiastas."

1007203-28 = "Não, mas pensar que uma arma tão valiosa estava adormecida num armazém numa aldeia piscatória..."

1007203-29 = "Parece que eu estava planejando jogar fora, mas os moradores me deram de graça...Estou twittando sobre isso hoje!"

1007203-30 = "[s] \"Então, como você usa essa arma?\""

1007203-31 = "Você já ouviu falar em Bangstick?"

1007203-32 = "Uma arma em forma de arpão usada por mergulhadores. #nSe disparados debaixo d'água, criaturas grandes, como tubarões e baleias, podem ser mortas com um único tiro."

1007203-33 = "O princípio da carga de profundidade perfurante é o mesmo do bang stick."

1007203-34 = "[s] \"De jeito nenhum...\""

1007203-35 = "sim! Use esta carga perfurante de profundidade para atordoar os peixes com impacto!"

1007203-36 = "A última vez que mergulhei, vi um peixe do tamanho de um tronco."

1007203-37 = "É difícil derrubar um peixe tão grande com um arpão normal...#n, mas com o poder da pólvora, não importa o tamanho dele."

1007203-38 = "[s1] \"Vai funcionar...?\"\n[s2] \"Parece perigoso...\""

1007203-41 = "Tudo bem. Claro, a quantidade de explosivos será ajustada."

1007203-42 = "Já fiz treinamento explosivo subaquático inúmeras vezes. Não tem como o pessoal especial do #nSRT não pegar alguns peixes!"

1007203-47 = "...Bem, então vamos!"

1007203-57 = "(depois de um tempo......)"

1007203-62 = "Bum!"

1007203-77 = "[ns] \"S-Saki... você está bem!?\""

1007203-78 = "Estou bem, mas..."

1007203-79 = "O peixe..."

1007203-83 = "Apanhados na violência... despedaçados..."

1007203-84 = "...Você não pode comer assim."

1007203-85 = "Qual diabos era o problema? Mesmo que o cálculo dos explosivos tenha sido perfeito...!"

1007203-86 = "[s] \"Talvez o poder original da arma...\""

1007203-87 = "……Eu vejo. #nNão importa o quanto tenha sido ajustada, originalmente era uma arma fabricada para perfurar a blindagem de tanques..."

1007203-88 = "Foi um erro usá-lo para peixes?"

1007203-89 = "[s3] \"Se você quiser pescar...\"\n[s4] \"Não teria sido melhor usar um arpão normalmente...?\""

1007203-94 = "Não...!"

1007203-95 = "Isso é..."

1007203-96 = "Na verdade... sim, é verdade..."

1007203-97 = "Se eles tivessem emprestado um arpão desde o início, teriam pescado mais peixes do que os dois poderiam comer... #nEu estava tão distraído com o equipamento raro que esqueci o básico..."

1007203-98 = "Meu idiota...! !"

1007203-100 = "(...Mais tarde, levei uma Saki deprimida ao mercado de peixes e ofereci-lhe uma tigela de frutos do mar.)"

1007203-101 = "(Saki parecia não ter apetite no início, mas comeu cada grão de arroz perfeitamente.)"

