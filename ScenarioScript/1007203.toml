[translation]
1007203-1 = "水中補給作戦（２）"
1007203-2 = "（サキから連絡をもらい、この前の波止場へ向かった)"
1007203-6 = "ふふ、ふふふ……。"
1007203-10 = "あ、先生。いらっしゃい。"
1007203-11 = "[s] \"なんだか楽しそうだね。\""
1007203-12 = "今日の午前中、古い倉庫の片付けを手伝っていたら、すごい物を見つけたんだ。"
1007203-13 = "それはだな……"
1007203-18 = "この刺突爆雷だ！"
1007203-19 = "[s] \"……しとつ、ばくらい？\""
1007203-20 = "なんだ先生、知らないのか？"
1007203-24 = "これは昔、百鬼夜行連合学院が使っていた対戦車兵器で、長棒の先端に成形炸薬弾が取り付けられている。近距離から相手の戦車に突き刺して、爆発させるんだ。"
1007203-25 = "操作が簡単で、コストが抑えられるから、百鬼夜行では混乱続きの戦国時代によく使われていたらしいのだが……"
1007203-26 = "そもそも戦車に近づくのが難しくて、大した成果は得られなかったんだとか。"
1007203-27 = "だが、「刺して爆発させる」という単純明快な設計が、一定のマニア層から人気を集めている。"
1007203-28 = "いやしかし、こんな貴重な武器が、漁村の倉庫に眠っていたとは……"
1007203-29 = "捨てるつもりだったみたいで、住民からタダで譲ってもらえたし……今日はツイてるぞ！"
1007203-30 = "[s] \"それで、この武器をどう使うの？\""
1007203-31 = "バングスティック、って聞いたことはあるか？"
1007203-32 = "ダイバーたちが使う銛の形をした銃のことだ。#n水中で撃発させれば、サメやクジラのような大型生物も一発で仕留められる。"
1007203-33 = "刺突爆雷も、原理はバングスティックと一緒。"
1007203-34 = "[s] \"まさか……\""
1007203-35 = "そう！この刺突爆雷を使って、衝撃で魚を気絶させる！"
1007203-36 = "前に潜った時、丸太くらいの大きな魚を見かけたんだ。"
1007203-37 = "あれだけの大魚を普通の銛で仕留めるのは難しい……#nだが、火薬の力を借りれば、どんなサイズだろうと問題ない。"
1007203-38 = "[s1] \"うまくいくかな……？\"\n[s2] \"危ない気がするけど……\""
1007203-41 = "平気だ。もちろん、爆薬の量は調整する。"
1007203-42 = "水中下の爆発訓練なら、数えきれないほどやってきた。#nSRTの特殊要員に、魚が捕まえられないわけないだろう！"
1007203-47 = "……じゃあ、行ってくる！"
1007203-57 = "（しばらくして……）"
1007203-62 = "ドカーン！"
1007203-77 = "[ns] \"さ、サキ……大丈夫！？\""
1007203-78 = "私は大丈夫だけど……"
1007203-79 = "魚が……。"
1007203-83 = "暴圧に巻き込まれて……粉々に……。"
1007203-84 = "……このままじゃ、食べられないよな。"
1007203-85 = "いったい何が問題だったんだ？爆薬の計算は完璧だったのに……！"
1007203-86 = "[s] \"たぶん、武器本来の威力が……\""
1007203-87 = "……なるほど。#nいくら調整したとはいえ、本来は戦車の装甲を貫くために製造された武器だし……"
1007203-88 = "魚に使うのは間違いだったか……。"
1007203-89 = "[s3] \"魚を突くなら……\"\n[s4] \"普通に銛を使えば良かったんじゃ……？\""
1007203-94 = "んぐ……！"
1007203-95 = "そ、それは……"
1007203-96 = "たしかに……そう、だな……。"
1007203-97 = "最初から銛を借りてくれば、2人じゃ食べきれないほど魚を獲れていたはずなのに……#n珍しい装備に気を取られて、基本的な事を見落としていたなんて……"
1007203-98 = "私のバカ……！！"
1007203-100 = "（……その後、落ち込んだサキを魚市場に連れていき、海鮮丼をご馳走した）"
1007203-101 = "（サキは最初こそ食欲がなさそうに見えたが、米の一粒まで綺麗に完食した)"
