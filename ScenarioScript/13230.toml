[translation]
13230-1 = "Episódio 23; O Vale do Conselho Estudantil"
13230-3 = "……O canhão ferroviário Schemata."
13230-4 = "Mas, por que……."
13230-9 = "O emblema de Gehenna?"
13230-12 = "Além disso,"
13230-17 = "Isso parece quase……."
13230-19 = "Você quer dizer que parece uma fortaleza militar?"
13230-25 = "……Garota do tapa-olho."
13230-26 = "（Garota do tapa-olho……？）"
13230-27 = "No início não tinha essa aparência, mas……#nfoi completamente reformado anteriormente."
13230-30 = "Senhorita, isso está incorreto.#nO projeto de armas de guerra assimétricas só surgiu depois que o negócio ferroviário começou."
13230-31 = "Provavelmente, alguém deu a ideia ao Conselho Estudantil de Abydos."
13230-32 = "Quem faria uma coisa dessas……!"
13230-35 = "Tanto o Conselho Estudantil de Abydos quanto a Nephthys foram apenas manipulados por aquela pessoa."
13230-36 = "……Existe um mentor por trás disso?"
13230-37 = "Não, não é um mentor.#nAgora ela já se formou e deixou Kivotos."
13230-38 = "……Se formou?"
13230-39 = "Sim. Há dois anos, a tirana de Gehenna que mergulhou Kivotos no caos: a \"Imperatriz do Trovão\"."
13230-40 = "……Imperatriz do Trovão?"
13230-41 = "Ela era uma estrategista genial, inventora e, ao mesmo tempo, uma política.#nDizem que o Tratado de Eden, que a Presidente do Conselho Estudantil Geral estava preparando, na verdade, era uma estratégia criada por causa da Imperatriz do Trovão."
13230-42 = "Eu nunca ouvi falar disso."
13230-43 = "……Entendo, bem, não importa."
13230-44 = "De qualquer forma, o que deveria ser apenas um negócio ferroviário,#nse tornou uma semente de conflito pelas mãos da Imperatriz do Trovão."
13230-45 = "E por que essa Imperatriz do Trovão faria algo assim?"
13230-46 = "……Não sei."
13230-47 = "Não há como saber o que a Imperatriz do Trovão estava pensando."
13230-48 = "É inútil tentar entender a mente de um gênio."
13230-49 = "Pode ter sido apenas um capricho dela ter se aproximado de Abydos."
13230-50 = "Na verdade, parece que depois que o caso do canhão ferroviário foi interrompido, a Imperatriz do Trovão nem sequer se envolveu mais com Abydos."
13230-52 = "……."
13230-53 = "No fim, ela perdeu o poder rapidamente por causa de seus subordinados e seu governo de punho de ferro chegou ao fim.#nMas as invenções que ela deixou ainda permanecem em Kivotos."
13230-54 = "Todas elas são capazes de colocar Kivotos em perigo num instante.#n……Assim como o canhão ferroviário."
13230-55 = "Garota do tapa-olho, já chega, não é?#nO tio aqui não tem tempo para ficar ouvindo histórias do passado."
13230-56 = "（Tio……？）"
13230-57 = "Então, por que me chamou aqui?#nEssa tal de Imperatriz do Trovão tem alguma relação com a veterana Yume?"
13230-58 = "……Não, absolutamente nenhuma."
13230-59 = "Então, tem relação com o contrato?"
13230-60 = "……."
13230-61 = "A garota do tapa-olho é, na verdade, uma aluna de Gehenna e queria recuperar as invenções da Imperatriz do Trovão?"
13230-62 = "Quem é você?#nO que você quer?"
13230-63 = "……."
13230-64 = "Haa…… bem, tanto faz."
13230-68 = "A partir de agora, eu vou destruir o canhão ferroviário.#nImperatriz do Trovão, Gehenna, nada disso importa."
13230-69 = "Aquilo é algo que nega frontalmente a vontade da veterana Yume.#nPor isso, não posso deixar como está."
13230-70 = "Absolutamente…… isso mesmo, absolutamente."
13230-72 = "……Faça como quiser."
13230-73 = "Mas, para isso, primeiro você terá que tirar o cartão de mim."
13230-79 = "O cartão dourado da Nonomi……?"
13230-80 = "Para ativar o canhão ferroviário, este cartão é necessário.#nClaro, para destruí-lo também."
13230-89 = "Eu não respondi à sua pergunta anterior.#nMeu verdadeiro objetivo é você, Hoshino Takanashi."
13230-90 = "Se você quer destruir o trem, terá que me derrotar e pegar o cartão."
13230-91 = "……Então, quem é você?"
13230-92 = "Ah, eu também gostaria de saber disso."
13230-93 = "Uma andarilha sem escola, mercenária da Kaiser, capacho da Nephthys, uma estrangeira da Highlander…… e agente dupla de um fundo de investimento privado."
13230-94 = "Finalmente entendi o significado de ter percorrido esse longo caminho até aqui."
13230-98 = "Era para lutar contra você."
13230-99 = "Estou aqui para negar o medo e a loucura de Abydos."
13230-104 = "O que te faz levar isso tão a sério?#nEu quero saber o motivo."
13230-106 = "……Pois bem.#nSe você conseguir me derrotar, eu lhe direi onde está aquele caderno."
13230-110 = "……Parece que você só vai entender se sofrer um pouco."
13230-112 = "Hmph, agora sim você tem uma expressão decente."
13230-117 = "Então, vamos começar."
