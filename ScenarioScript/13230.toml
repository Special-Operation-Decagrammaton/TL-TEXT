[translation]
13230-1 = "第23話;生徒会の谷"
13230-3 = "……列車砲シェマタ。"
13230-4 = "でも、どうして……。"
13230-9 = "ゲヘナのエンブレムが？"
13230-12 = "それに、"
13230-17 = "これじゃあまるで……。"
13230-19 = "軍事要塞のようだ、とでも言いたいのか？"
13230-25 = "……眼帯ちゃん。"
13230-26 = "（眼帯ちゃん……？）"
13230-27 = "当初はこんな様相ではなかったが……#n以前、大きく作り替えられてな。"
13230-30 = "お嬢様、それは違います。#nあくまでも非対称戦力兵器計画は、#n鉄道事業が動き出してから話に出たものです。"
13230-31 = "おそらく、アビドス生徒会に入れ知恵をした者がいたのでしょう。"
13230-32 = "誰がそのようなことを……！"
13230-35 = "アビドス生徒会もネフティスも、あいつに踊らされただけだ。"
13230-36 = "……黒幕がいるの？"
13230-37 = "いや、黒幕ではない。#n今は卒業して、キヴォトスを離れているからな。"
13230-38 = "……卒業？"
13230-39 = "ああ。二年前、キヴォトスを混沌に陥れたゲヘナの暴君「雷帝」だ。"
13230-40 = "……雷帝？"
13230-41 = "天才戦略家でもあり発明家でもあると同時に、政治家でもあった。#n連邦生徒会長が準備していたエデン条約も、#n実は雷帝のために用意した奇策だったとか。"
13230-42 = "私は聞いたことないけど。"
13230-43 = "……そうか、まあ良い。"
13230-44 = "何はともあれ、単なる鉄道事業のはずが、#n雷帝の手によって紛争の種になった。"
13230-45 = "それで、その雷帝って人はどうしてそんなことを？"
13230-46 = "……分からない。"
13230-47 = "雷帝が何を考えているのかなど、知る由もない。"
13230-48 = "天才の考えをいくら探ろうとしたところで無駄だ。"
13230-49 = "アビドスに接近したのも、ただの気まぐれだったかもしれないからな。"
13230-50 = "事実、雷帝は列車砲の一件が中断されてから、#nアビドスと関わりすらしなかったらしい。"
13230-52 = "……。"
13230-53 = "結局、部下たちのせいですぐに失脚し、鉄拳政治は幕を閉じた。#nだが、彼女が残した発明品は、今もキヴォトスに残っている。"
13230-54 = "そのどれもが、キヴォトスを一瞬で危険に陥れるレベルの物。#n……列車砲のようにな。"
13230-55 = "眼帯ちゃん、もう良いかな？#nおじさん、昔話に付き合ってる暇はないんだ。"
13230-56 = "（おじさん……？）"
13230-57 = "それで、ここに呼んだ理由は？#nその雷帝って人は、ユメ先輩と関係があるの？"
13230-58 = "……いいや、まったく。"
13230-59 = "じゃあ、契約と関係してるとか？"
13230-60 = "……。"
13230-61 = "眼帯ちゃんが実はゲヘナの生徒で、#n雷帝の発明品を回収したかったとか？"
13230-62 = "君は何者なの？#n何が狙い？"
13230-63 = "……。"
13230-64 = "はぁ……まぁいっか。"
13230-68 = "これから私は、列車砲を破壊する。#n雷帝だとかゲヘナだとか、そんなのはどうだって良い。"
13230-69 = "あれはユメ先輩の意志を真っ向から否定する物。#nだから、放っておくわけにはいかない。"
13230-70 = "絶対……そう、絶対に。"
13230-72 = "……好きにしたら良い。"
13230-73 = "だが、そのためにはまず私からカードを奪わなくてはな。"
13230-79 = "ノノミちゃんのゴールドカード……？"
13230-80 = "列車砲を起動するには、このカードが必要だ。#nもちろん、破壊するためにも。"
13230-89 = "先ほどの質問に答えていなかったな。#n私の真の目的は、[ruby=たかなし]小鳥遊[/ruby]ホシノ――あんただ。"
13230-90 = "列車を破壊したいのなら、私を倒してカードを奪うが良い。"
13230-91 = "……それで、何者なの？"
13230-92 = "ああ、私もそれを知りたかったんだ。"
13230-93 = "学校に所属しない流れ者、カイザーの傭兵、ネフティスの使い走り、#nハイランダーの異邦人……そして、私募ファンドの二重スパイ。"
13230-94 = "回り道をしてここにたどり着いた意味が、ようやく分かった。"
13230-98 = "あんたと戦うためだったんだ。"
13230-99 = "アビドスの恐怖と狂気を否定するために、私はここにいる。"
13230-104 = "何がそこまであんたを本気にさせる？#n私は、その理由が知りたい。"
13230-106 = "……そうだな。#nもし私を倒せたら、あの手帳の在り処を教えてやろう。"
13230-110 = "……痛い目に遭わないと分からないみたいだね。"
13230-112 = "ふっ、良い顔になったな。"
13230-117 = "では、始めようか。"
