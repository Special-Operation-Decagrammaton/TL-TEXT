[translation]
1401-1 = "GUNS N' PEPPERS（１）"
1401-2 = "Departamento de Engenharia - Sala de Trabalho"
1401-5 = "Hmm... se eu deixar esse rolamento aqui embaixo, que está conectado ao eixo da unidade de acionamento, mais leve... talvez a velocidade..."
1401-7 = "...Ah. Já está na hora do almoço. #nSenpai Utaha! Vamos deixar a manutenção da parte do motor, que suja as mãos, para a tarde e ir almoçar!"
1401-8 = "Ah, é verdade. Pode esperar um pouco? Só preciso terminar esta solda... #nAssim que eu terminar, vamos à cantina almoçar."
1401-9 = "...Ufa. Estava tão concentrada na manutenção que nem percebi... meu macacão está todo preto e cheio de fuligem."
1401-10 = "É verdade... Ir à cantina desse jeito pode acabar incomodando as outras alunas. #n...Nesse caso, que tal pedirmos um delivery como ontem?"
1401-11 = "Acho uma ótima ideia! Eu estava justamente com vontade de comer algo gorduroso, tipo um fast-food cheio de presunto e queijo."
1401-12 = "Se formos pensar em um fast-food que tenha todos esses ingredientes, que não suje muito as mãos e que seja fácil de dividir entre várias pessoas..."
1401-14 = "Só pode ser pizza!"
1401-15 = "Concordo. Não há nada melhor que pizza para comer na sala de trabalho."
1401-16 = "Fufu. Vocês realmente não se cansam, né?"
1401-17 = "Bem, eu também estava com vontade de comer pizza. #nPodemos pedir a de sempre, de pepperoni com queijo?"
1401-20 = "Olá, aqui é a 'Kamehameha Pizza'! O pedido é uma pizza de pepperoni com queijo, correto?"
1401-21 = "Sim, por favor, deixe aqui em cima da mesa!"
1401-23 = "Aqui está. Obrigado pelo pedido!"
1401-25 = "Ah, esse aroma de queijo derretido... só de sentir o cheiro já me dá uma fome enorme."
1401-26 = "Vamos comer."
1401-29 = "Hum, pizza de pepperoni com queijo é realmente a melhor! #nO equilíbrio entre esse queijo aromático e o salgado do pepperoni é perfeito!"
1401-30 = "Eu também gosto da pizza de queijo simples... o sabor é mais leve e não fica enjoativo."
1401-31 = "Entendo. Eu, por outro lado, acho que quando tem muito queijo, fica um pouco gorduroso. #nKotori, você pode me passar o Chavasco?"
1401-32 = "Se for o Chavasco, não está dentro da caixa da pizza? Não estou vendo por aqui."
1401-33 = "Dentro da caixa só tem um monte de queijo ralado... parece que o entregador esqueceu."
1401-34 = "O quê!? Esquecer o Chavasco em uma pizza? Que erro grave!"
1401-35 = "Como castigo para esse entregador descuidado, vamos escrever uma avaliação negativa no aplicativo de entrega!"
1401-37 = "Calma, Kotori. Com uma agenda tão cheia, até nós acabamos perdendo uma ou duas peças de vez em quando, não é? Vamos relevar esse erro."
1401-38 = "Além disso, deve ter sobrado um pouco de Chavasco no armário da sala. É só ir buscar."
1401-43 = "Ué? Eu tinha certeza de que tinha deixado por aqui... para onde será que foi?"
1401-44 = "Como o armário está cheio de tralhas, será que alguém não acabou guardando enquanto pegava alguma ferramenta?"
1401-45 = "Pode ser... não tem jeito. Vamos ter que comer sem Chavasco desta vez."
1401-46 = "Será que não existe uma ferramenta prática para ter molhos como o Chavasco sempre à mão, não importa onde estejamos?"
1401-49 = "…………."
1401-50 = "Senpai. Como pedimos pizza com frequência, por que não tentamos criar um jeito de carregar o Chavasco sempre com a gente?"
1401-51 = "O Chavasco? Como assim?"
1401-52 = "Por exemplo... que tal modificar a arma que nós, alunas, carregamos para todo lado, para que ela possa disparar Chavasco!"
1401-54 = "...Você quer dizer que, só por causa da pizza, deveríamos fazer a arma disparar Chavasco em vez de balas?"
1401-55 = "Essa é uma ideia extremamente inútil e sem sentido."
1401-56 = "……."
1401-57 = "……."
1401-58 = "Certo, vamos começar a fabricar agora mesmo."
1401-59 = "(Assente)"
1401-61 = "Eu sabia! Imaginei que vocês iam gostar da ideia!"
1401-62 = "Muito bem, decidido isso, vamos começar pela engenharia reversa do frasco de Chavasco!"
1401-64 = "E assim, os membros do Departamento de Engenharia decidiram desenvolver uma arma com função de disparo de Chavasco por um motivo extremamente trivial..."
