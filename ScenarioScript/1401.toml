[translation]
1401-1 = "GUNS N' PEPPERS（１）"
1401-2 = "エンジニア部・作業室"
1401-5 = "うーん……駆動部の軸に繋がってるこの、下の方のベアリングを軽くすれば……多分速度が……。"
1401-7 = "……あれっ。もうお昼の時間ですね。#nウタハ先輩！手が汚れるエンジン部分の整備は午後に回して、お昼にしませんか！"
1401-8 = "ああ、そうだね。少し待ってくれないか、ここの溶接だけでも……。#nこの作業が終わったら、食堂にでも行ってお昼にしよう。"
1401-9 = "……ふぅ。整備に夢中で気が付かなかったけど……作業着があちこち真っ黒で、すすだらけ。"
1401-10 = "そうだね……。このような格好で食堂に行くと、他の生徒たちの迷惑になるかもしれないな。#n……となると、やはり昨日みたいにデリバリーでも頼むとしようか？"
1401-11 = "良いと思います！ちょうどハムやチーズがたくさん入った、脂っこいファストフードなんかが食べたかったところです。"
1401-12 = "そういう色々な材料を一度に味わえて、できるだけ手も汚さずに、複数人で簡単に分けあって食べられるファストフードといったら……。"
1401-14 = "やっぱり、ピザしかありませんね！"
1401-15 = "同意。やっぱり作業室で食べるのに、ピザに勝るものはない。"
1401-16 = "ふふっ。君たちも本当、飽きもせず好きだね。"
1401-17 = "まあ、私もちょうどピザが食べたい気分だった。#nいつものペパロニとチーズので良いかな？"
1401-20 = "こんにちは、「カメハメハピザ」です！ご注文はペパロニ＆チーズピザを一つでお間違いなかったでしょうか？"
1401-21 = "はい、こちらのテーブルの上にお願いします！"
1401-23 = "ではこちらに。ご注文ありがとうございました！"
1401-25 = "はあ、この濃厚なチーズの香り……もう匂いを嗅いだだけでお腹が空いてきますね～。"
1401-26 = "いただきます。"
1401-29 = "うん、やっぱりピザはペパロニ＆チーズが一番ですね！#nこの香り高いチーズと、ペパロニハムのしょっぱさのバランスが最高です！"
1401-30 = "私は普通のチーズピザも好き……あっさりとした味で、後味もくどくない。"
1401-31 = "そうなんだね。私はチーズが多いと、ちょっと脂っこく感じてしまうかな。#nコトリ、チャバスコをくれないかい？"
1401-32 = "チャバスコでしたら、ピザの箱の中に入ってませんか？こっちの方には無いですね。"
1401-33 = "箱の中はチーズの粉だけが大量に……どうやら配達員の人が忘れたみたい。"
1401-34 = "ええっ！？ピザなのにチャバスコを忘れるだなんて、なんて重大なミスを！"
1401-35 = "あの困った配達員へのお仕置きとして、配達アプリに抗議のレビューを書いておきましょうか！"
1401-37 = "落ち着こう、コトリ。忙しいスケジュールの中での仕事ともなれば、私たちだって一つや二つ部品を無くす事があるだろう？これぐらいのミスは許そうじゃないか。"
1401-38 = "それに、部室のロッカーの中に、以前の残りのチャバスコがあったはず。それを持ってくれば良いだけの話さ。"
1401-43 = "おや？確かこの辺りに置いたと記憶していたんだが……どこに行ってしまったんだろうか？"
1401-44 = "ロッカーなんてどれもガラクタだらけですから、誰かが工具を取り出す際に見つけて片づけてしまったのでは？"
1401-45 = "そうかもしれないな……仕方ない。今回はチャバスコ無しで食べるしかないな。"
1401-46 = "いつどこにいても、チャバスコとかのソース類をパッと取り出せる便利な道具ってないのかな……。"
1401-49 = "…………。"
1401-50 = "先輩。私たち結構ピザを頼むことが多いですし、いっそのことチャバスコを常に携帯できるようにしてみるのはどうですか？"
1401-51 = "チャバスコを？どうやってだい？"
1401-52 = "例えばですが……生徒なら肌身離さず持ち歩く銃を、チャバスコが噴射できるよう改造するとか！"
1401-54 = "……ピザのためだけに、銃から弾ではなく、チャバスコが出るようにしようってこと？"
1401-55 = "それは、実に意味のない、無益なアイデアだね。"
1401-56 = "……。"
1401-57 = "……。"
1401-58 = "よし、すぐに作ろう。"
1401-59 = "（こくり）"
1401-61 = "やっぱり！皆さんが好きそうな案だと思いました！"
1401-62 = "さて、そうと決まれば、チャバスコの容器のリバースエンジニアリングから始めましょう！"
1401-64 = "そうしてエンジニア部の部員たちは、非常にくだらない理由でチャバスコ噴射機能付きの銃を開発することになった……。"
