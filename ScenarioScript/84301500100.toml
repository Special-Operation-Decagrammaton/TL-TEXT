[translation]
84301500100-5 = "……なるほど。"
84301500100-6 = "これは、少なくともミレニアムの生徒が作ったものではないわ。"
84301500100-7 = "そこまで分かるものなのだね。"
84301500100-8 = "ええ。全生徒の手癖はすべて把握しているわ。#n私の知る限り、こんな作り方をする生徒はいない。"
84301500100-9 = "全生徒の手癖を把握しているのか……？"
84301500100-10 = "全生徒の好みや求めていることが分かれば、皆が満足する学園にできる。本気でそう思っていたもの。"
84301500100-11 = "……もちろん、それは間違いだと分かったのだけれど。"
84301500100-12 = "……誰もが失敗をする。肝要なのは、その後の身の振り方ではないかね。"
84301500100-13 = "いえ……私は。"
84301500100-14 = "私は、今のままではまだ、足りない……。"
84301500100-19 = "……そういえば、ネルの姿が見えないようだが。"
84301500100-20 = "彼女には別件にあたってもらっているわ。いずれ戻ってくるはずよ。"
84301500100-21 = "……チップの解析を進めるわね。少し待っていてちょうだい。"
