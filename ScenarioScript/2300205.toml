[translation]
2300205-1 = "Ginástica de Rádio"
2300205-2 = "Schale - Área Residencial"
2300205-3 = "Era um dia de folga, e eu estava pensando em voltar a dormir até o meio-dia, mas então..."
2300205-5 = "É hora da ginástica de rádio!"
2300205-6 = "Vamos lá, Sensei! Não fique na cama para sempre, levante-se!"
2300205-7 = "[s] \"É meu dia de folga, só mais um pouco...\""
2300205-8 = "Nada disso! Só porque é feriado, não significa que você pode ficar dormindo o dia todo; se continuar assim, um dia você não vai conseguir nem se levantar!"
2300205-9 = "Pode parecer um incômodo agora, mas depois que você começa a se mexer, acaba se tornando divertido, então...!"
2300205-11 = "...Se continuar sendo preguiçoso assim, vou ter que te dar uma injeção bem grossa, viu?"
2300205-12 = "[s] Pular da cama"
2300205-14 = "Muito bem, vamos começar a ginástica de rádio! #nNo ritmo... vamos lá!"
2300205-15 = "Primeiro, vamos começar com o exercício de alongamento! Um, dois, três, quatro!"
2300205-16 = "Esses movimentos preguiçosos não servem, Sensei! #nEstique os braços bem retos e levante-os com vontade!"
2300205-17 = "Se continuar assim, não vou te dar o carimbo de nota dez!"
2300205-18 = "Então, vamos começar de novo desde o início, um alongamento bem grande! Um, dois!"
2300205-20 = "E assim, fiz a ginástica de rádio com a Hanae, seguindo suas ordens."
