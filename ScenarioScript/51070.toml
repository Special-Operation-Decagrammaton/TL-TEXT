[translation]
51070-1 = "Episódio 7; Garota Juvenil(?) (1)"
51070-3 = "[ns] \"......O que ela quis dizer com 'juventude'?\""
51070-4 = "Hah! Pensando bem..."
51070-5 = "Já ouvi algo da Renge-senpai sobre isso antes."
51070-11 = "Falando nisso, Yukari, você disse que queria entrar no nosso comitê desde o ensino fundamental, né?"
51070-12 = "Sim!"
51070-13 = "'O encontro predestinado daquela noite foi o começo de tudo'... era isso, não era?"
51070-14 = "Quando ouvi pela primeira vez, pensei: 'Por que ela se daria ao trabalho de vir pra cá... que garota estranha...' Mas..."
51070-15 = "A Hyakkaryouran é um comitê maravilhoso que reúne a elite! Uma elite como eu não poderia escolher outro lugar além deste!"
51070-16 = "Bem, é verdade... Você realmente vinha aqui todos os dias desde o ensino fundamental... "
51070-17 = "E mesmo quando a Kikyou te enxotava, #n no dia seguinte lá estava você, como se nada tivesse acontecido."
51070-18 = "Acordar às 4 da manhã todo dia para treinar, depois tomar café e ir direto pras aulas... e treinar de novo depois da escola... #n O que tem de bom em um comitê assim?"
51070-20 = "Ainda assim, para mim, o tempo que passo me esforçando com a Renge-senpai e as outras senpais é muito divertido!"
51070-21 = "É... se você diz isso com tanta convicção, não posso discordar."
51070-22 = "Mas... você nunca pensou nisso nem uma vez?"
51070-24 = "......?"
51070-25 = "Uma juventude onde você passa o tempo com as amigas, além das atividades da Hyakkaryouran..."
51070-26 = "Nunca!"
51070-27 = "Uau, resposta imediata..."
51070-28 = "E quanto a você, Renge-senpai!? Gosta das atividades da Hyakkaryouran?"
51070-29 = "Bem... desde que eu e a Kikyou entramos, temos nos divertido à nossa maneira."
51070-30 = "E também fiz amizade com a Nagusa-senpai e você... não é que eu me arrependa, mas..."
51070-35 = "Mas, às vezes, sabe... eu gostaria de ter uma juventude comum."
51070-36 = "Às vezes me pego pensando nisso. #n Como posso dizer... participar de um clube cultural, algo assim?"
51070-42 = "――Naquela época, eu não compreendi bem aquelas palavras. "
51070-43 = "Mas, ao me lembrar da nossa conversa daquele dia... eu pensei."
51070-44 = "Talvez a Renge-senpai quisesse entrar para outro clube... #n Posso estar pensando demais, mas..."
51070-45 = "[s] \"Será que ela não tem apenas um fascínio pela 'juventude'?\""
51070-49 = "Hah...!? #n Era isso mesmo!?"
51070-50 = "Entendo... isso significa que a Renge-senpai está agora..."
51070-51 = "Como está escrito neste papel, em uma jornada para celebrar a juventude...!?"
51070-52 = "Não acredito que as palavras dela: 'Se é para aproveitar a juventude, clubes culturais são os melhores. Tem muito mais a ver com juventude do que a Hyakkaryouran cheirando a suor', iriam culminar nisso!"
51070-53 = "[s] \"Acho que já temos uma pista de para onde ela foi?\""
51070-54 = "Hmm... a Renge-senpai estava sempre na linha de frente para nos proteger..."
51070-55 = "E agora que a Nagusa-senpai não está aqui, e as atividades da Hyakkaryouran pararam... #n A paciência dela finalmente chegou ao limite..."
51070-59 = "E o seu desejo pela juventude explodiu! Deve ser isso!"
51070-60 = "Muito bem! Não temos tempo a perder! Vamos agora mesmo, Sensei!"
51070-66 = "Mas, ehm..."
51070-72 = "Para onde deveríamos ir? #n Não sei muito sobre os clubes culturais..."
51070-79 = "[ns] \"Aqui está, a Kaho preparou uma lista de clubes culturais para a gente.\""
51070-80 = "O Clube Yin-Yang fez uma lista para nós!?"
51070-81 = "I-Incrível!"
51070-82 = "Hah... é essa a autoridade da Schale que ouvi nos boatos, capaz de fazer até mesmo a presidente e a vice-presidente do Clube Yin-Yang respeitarem...? "
51070-83 = "Será que eu estou acompanhada de alguém extremamente perigoso!?"
51070-84 = "[s] \"N-Não é nada disso...\""
51070-85 = "Certo..."
51070-86 = "Vamos usar isso para encontrar a Renge-senpai!"
51070-88 = "Clube de Observação de Chlorella"
51070-90 = "O primeiro da lista é este aqui..."
51070-91 = "Então――"
51070-95 = "Com licença!"
51070-107 = "Por acaso, vieram fazer uma visita de observação?"
51070-108 = "......De novo?"
51070-109 = "[s] \"Olá. Bem, nós viemos――\""
51070-111 = "Sim! Viemos procurar a Renge-senpai!"
51070-113 = "Renge...?"
51070-114 = "Quem seria essa...?"
51070-116 = "A Renge-senpai é..."
51070-117 = "A Renge-senpai!"
51070-119 = "......Hã?"
51070-122 = "[ns] \"Yukari, primeiro você precisa descrever como ela é...\""
51070-123 = "Ah, verdade."
51070-124 = "Ehm, bem, a Renge-senpai é assim..."
51070-125 = "Ela diz coisas como 'Quem faltar no treino da manhã vai levar punição!'..."
51070-126 = "E me provoca quando eu tenho um grão de arroz grudado no rosto..."
51070-127 = "E apesar de ser assim, assim que encontra a Trupe Sudama causando problemas, ela vai correndo... é alguém que eu admiro profundamente..."
51070-132 = "Ehm... não entendi absolutamente nada."
51070-134 = "I, isso não é verdade...!?"
51070-135 = "[s1] \"O que a Yukari acabou de dizer foi...\"\n[s2] \"Sobre o que ela pensa da Renge, não como ela é fisicamente...\""
51070-138 = "U-Uhum... é verdade..."
51070-139 = "Bem... A Renge-senpai tem lindos cabelos ruivos e..."
51070-141 = "Cabelos ruivos?"
51070-142 = "[s] \"Acho que a nossa melhor aposta é procurar por conta própria――\""
51070-143 = "Se for de cabelos ruivos, será que não é aquela garota que veio fazer uma visita ao clube um tempo atrás?"
51070-149 = "Ah~... Aquela que estava usando um haori azul-claro?"
51070-151 = "Sim, é ela mesma! Então ela veio aqui mesmo!"
51070-152 = "Com certeza a Renge-senpai estaria agindo como a ás deste 'Clube de Observação de Chlorella' também...!"
51070-154 = "Bem... ela estava falando umas coisas meio sem sentido..."
51070-155 = "Como, 'Vamos dar o nosso melhor até de manhã, visando o torneio nacional! Primeiro, o treinamento físico!'..."
51070-156 = "Espera, tem torneio nacional de observação de Chlorella? "
51070-157 = "Acho que ela disse algo como, 'Ensinem-me a essência da observação de Chlorella! Começarei a me preparar agora para competir no nível nacional!'..."
51070-163 = "[ns] \"Hmm, pelo que parece...\""
51070-165 = "......Como esperado da Renge-senpai! Que desempenho formidável!"
51070-169 = "[ns] \"S, será que é um desempenho formidável mesmo!?\""
51070-170 = "A Renge-senpai não é de aceitar meios-termos!"
51070-171 = "E então... eu gostaria de saber, para onde a Renge-senpai foi...?"
51070-172 = "Ah, ela não está aqui."
51070-173 = "No final da visita ao clube, se bem me lembro..."
51070-180 = "Ugh... sinto muito!!"
51070-181 = "Durante a visita, eu só fiz perguntas e mais perguntas. #n Me desculpem por causar problemas."
51070-186 = "Não, não achamos que causou proble..."
51070-188 = "......Mas, graças a isso eu percebi."
51070-190 = "Hmm?"
51070-191 = "Diferente de vocês que observam a Chlorella com tanta seriedade, eu... estava fazendo as coisas pela metade, olhando apenas para a superfície."
51070-192 = "Comparada a vocês que dedicaram suas vidas a este clube, eu não chego nem aos seus pés."
51070-193 = "Não, nós não dedicamos nossas vidas..."
51070-194 = "Por isso, me desculpem!! Lamento muito, mas vou abrir mão da entrada oficial no clube. "
51070-195 = "Mas! Entendi muito bem a paixão de vocês. Por favor, deixem-me continuar apoiando a observação de Chlorella de vocês!"
51070-197 = "Se chegarem ao torneio nacional, eu com certeza irei torcer por vocês!"
51070-204 = "――E depois ela foi embora."
51070-205 = "Torneio nacional de observação de Chlorella..."
51070-206 = "Primeiro acho que devemos descobrir se isso existe, não?"
51070-208 = "......Entendi."
51070-209 = "Vocês sabem para onde ela pode ter ido?"
51070-210 = "Estamos tão ocupadas preparando nossa exposição pro 'Festival das Lanternas'..."
51070-211 = "E ela foi embora tão rápido que não sabemos de mais nada. Desculpe."
51070-214 = "[ns] \"Que pena, chegamos tarde demais.\""
51070-215 = "Sim. Mas descobrimos que a Renge-senpai está ativa nos clubes culturais, o que já é ótimo! #n Assim como eu esperava!"
51070-219 = "Parece que a nossa abordagem não está errada, vamos ao próximo clube!"
51070-221 = "Clube de Shogi Simultâneo"
51070-223 = "Uma garota de cabelos ruivos da Hyakkaryouran...?"
51070-224 = "Ah, sim. Lembro dela, ela também veio ao nosso clube."
51070-225 = "Era uma garota meio... peculiar."
51070-226 = "Durante a partida, num momento em que ela parecia estar com dificuldades, perguntei se ela queria pedir 'tempo'――"
51070-231 = "I, isso é... pena de mim...?"
51070-232 = "Ugh... Mas!!"
51070-233 = "Sim..."
51070-237 = "Nesse caso, xeque-mate."
51070-242 = "Eu perdi!!!"
51070-245 = "――E foi isso que aconteceu. #n Depois, ela disse algo como, 'Quero treinar minha mente, que vacilou por um instante', e depois de curvar-se várias vezes, foi embora."
51070-247 = "Isso é... um feito tão típico da Renge-senpai!"
51070-249 = "Clube de Fitness Rakugo"
51070-250 = "Ah, a Renge-san veio sim."
51070-251 = "Fiquei feliz quando ela disse, 'Meus sonhos de juventude cresceram!', enquanto escutava o nosso Rakugo..."
51070-252 = "Mas, estamos tão ocupados com os preparativos para o festival que não temos como receber novos membros no momento. #n Tivemos que recusá-la."
51070-254 = "Clube de Karuta de Batalha"
51070-255 = "Ah, claro, claro. Lembro de uma garota assim."
51070-256 = "Ela disse que queria ter batalhas intensas de Karuta da juventude."
51070-257 = "Bem, mas como o festival está perto, dissemos que não estamos aceitando novos membros..."
51070-264 = "(Depois disso, continuamos visitando os clubes na ordem da lista)"
51070-268 = "[ns] \"Que tal tomarmos um chá e descansarmos?\""
51070-272 = "Ah, muito obrigada..."
51070-273 = "(Visitamos vários clubes, mas não conseguimos encontrar a Renge)"
51070-274 = "Não imaginei que a Renge-senpai faria tantas visitas aos clubes..."
51070-275 = "Mesmo assim, a impressão que as pessoas têm da Renge-senpai é..."
51070-276 = "[s] \"É verdade, é um pouco crítica...\""
51070-277 = "Sim! É uma avaliação altamente crítica e muito positiva!"
51070-278 = "......Hã? Será que usei a palavra errada...? "
51070-279 = "Fufu, o que o senhor está dizendo! "
51070-280 = "As palavras mudam de significado de acordo com a interpretação!"
51070-281 = "O fato das pessoas não se esquecerem da Renge-senpai é a prova de que ela estava levando a juventude a sério!"
51070-282 = "A Renge-senpai sempre disse, desde os velhos tempos: 'O importante é ir até o fim sem fazer concessões!'"
51070-283 = "[s] \"Você admira muito a Renge, não é?\""
51070-284 = "Sim! Eu a admiro do fundo do meu coração!"
51070-285 = "Vejamos..."
51070-289 = "O próximo da lista é――"
51070-291 = "Sensei... acha-do!"
51070-300 = "[ns] \"Uwaa!?\""
51070-304 = "[ns] \"Kaede!?\""
51070-306 = "S-Sensei? O senhor está ferido!?"
51070-307 = "K-Kaede-chan!? Isso é perigoso, sabia!"
51070-308 = "Fuaa..."
51070-309 = "[s] \"A Kaede, a Mimori, a Tsubaki...?\""
51070-312 = "Próximo Episódio; Garota Juvenil(?) (2)"
