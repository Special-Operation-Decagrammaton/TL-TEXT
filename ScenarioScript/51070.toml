[translation]
51070-1 = "第7話;青春（？）少女（１）"
51070-3 = "[ns] \"……青春って、一体どういう意味なんだろう？\""
51070-4 = "ハッ！そういえば……"
51070-5 = "以前、レンゲ先輩から聞いたことがありますの。"
51070-11 = "そういやユカリ、お前たしか中学生の頃からウチに入りたいって言ってたよな。"
51070-12 = "ええ！"
51070-13 = "「あの夜の運命的な出会いがきっかけ」……だっけ？"
51070-14 = "初めて聞いたとき、なんでこんなとこにわざわざ……変なヤツって思ったけど……"
51070-15 = "百花繚乱はえり～とが集まった素晴らしい委員会！えり～とである[ruby=みども]身共[/ruby]には、ここしかないと決めておりましたの！"
51070-16 = "まあ、たしかに……お前は中学生の頃から本っ当に毎日…… "
51070-17 = "キキョウに追い返されたかと思いきや、#nケロッとして次の日も懲りずに来てたくらいだしなぁ。"
51070-18 = "毎朝4時起きで鍛錬、終わって朝飯食ったらすぐ授業……放課後も鍛錬……#nこんな委員会のどこがいいんだか。"
51070-20 = "それでも身共は、レンゲ先輩はもちろん他の先輩方と励む時間がとっても楽しいのです！"
51070-21 = "いやまぁ……そこまで言われちゃ何も言えないけどさ。"
51070-22 = "でも……一度くらい考えたことは無いのか？"
51070-24 = "……？"
51070-25 = "百花繚乱の活動以外で、友達と過ごす青春とか……"
51070-26 = "一度もありませんわ！"
51070-27 = "うわっ、即答かよ……"
51070-28 = "そんなレンゲ先輩はどうですの！百花繚乱の活動はお好きですか？"
51070-29 = "そうだな……アタシもキキョウと一緒に入ってから、何だかんだ楽しく過ごせてるよ。"
51070-30 = "ナグサ先輩やユカリともこうして仲良くなれたし……後悔してるわけじゃないんだけど……"
51070-35 = "でもたまには、こう……ありふれた青春を送れたらなーって。"
51070-36 = "ふと、考える時があるんだ。#nなんていうか……文化系みたいな？"
51070-42 = "――あの時は、その言葉をよく理解できませんでしたが。 "
51070-43 = "身共は、あの日の会話を思い出して……考えたのです。"
51070-44 = "もしかしたらレンゲ先輩は、他の部活動に入りたかったのではないか、と……#n身共の考え過ぎかもしれませんが……"
51070-45 = "[s] \"単に「青春」に憧れてるだけじゃない？\""
51070-49 = "ハッ……！？#nやはりそうなのですね！？"
51070-50 = "なるほど……つまり、レンゲ先輩は今……"
51070-51 = "この紙に書いてある通り、青春を謳歌する旅に……！？"
51070-52 = "「青春を送るなら、やっぱり文化系だ。汗くさい百花繚乱よりも、そっちの方がずっと青春っぽいからな」と言ってたのが、まさかそこに繋がるとは！"
51070-53 = "[s] \"出かけた先の検討がつきそうだね？\""
51070-54 = "むぅ……レンゲ先輩は、いつだって先陣を切って身共たちを守ってくださっていたのに……"
51070-55 = "ナグサ先輩が居なくなり、百花繚乱の活動が停止してしまった今……#nついに我慢が限界を迎え……"
51070-59 = "青春への欲望が爆発してしまったのです！きっとそうですの！"
51070-60 = "さ！こうしている場合ではありません！すぐに参りましょう、先生！"
51070-66 = "ですが、その……"
51070-72 = "どちらへ向かったら良いのでしょう？#n身共は文化部にあまり明るくなく……"
51070-79 = "[ns] \"はいこれ、カホが文化部のリストをまとめてくれたよ。\""
51070-80 = "陰陽部がりすとを作ってくださったのですか！？"
51070-81 = "す、すごいです！"
51070-82 = "ハッ……これが噂に聞く、陰陽部の部長や副部長さえも一目置くという、シャーレの権力……？ "
51070-83 = "身共、本当はとても危険なお方と居るのでしょうか！？"
51070-84 = "[s] \"そ、そんな事はないよ……\""
51070-85 = "さあ……"
51070-86 = "こちらをもとにレンゲ先輩を探しに行きましょう！"
51070-88 = "クロレラ観察部"
51070-90 = "りすとの一番上にあるのは、ここですね……"
51070-91 = "では――"
51070-95 = "失礼いたしますの！"
51070-107 = "もしかして、見学ですか？"
51070-108 = "……また？"
51070-109 = "[s] \"こんにちは。その、私たち――\""
51070-111 = "はい！レンゲ先輩を探しに来ましたの！"
51070-113 = "レンゲ……？"
51070-114 = "どなたのことでしょうか……？"
51070-116 = "レンゲ先輩は……"
51070-117 = "レンゲ先輩ですの！"
51070-119 = "……へ？"
51070-122 = "[ns] \"ユカリ、まずはレンゲの特徴を伝えないと……\""
51070-123 = "あっ、そうでしたの。"
51070-124 = "ええと、その、レンゲ先輩はですね……"
51070-125 = "「朝練をサボったヤツはペナルティだ！」と言ったり……"
51070-126 = "身共の顔に米粒がついていると、からかってきたり……"
51070-127 = "そんな方ですが、暴れている魑魅一座を見つけたら、すぐに駆けつける……そんな身共が尊敬してやまない……"
51070-132 = "ええと……さっぱり分からないんですが。"
51070-134 = "そ、そんなぁ……！？"
51070-135 = "[s1] \"今ユカリが伝えていたのは……\"\n[s2] \"ユカリがレンゲをどう思っているのか、だからね……\""
51070-138 = "う、ううん……たしかに仰る通りですの……"
51070-139 = "そうですね……レンゲ先輩は朱色の美しい髪と……"
51070-141 = "朱色の髪？"
51070-142 = "[s] \"やっぱり手当り次第に探すのは――\""
51070-143 = "朱色の髪なら、少し前に体験入部したあの子じゃないかな？"
51070-149 = "あ～……あの水色の羽織を着ていた？"
51070-151 = "ええ、そうですわ！やはりこちらに来ていたのですね！"
51070-152 = "レンゲ先輩ならきっと、この「クロレラ観察部」でもえーすとして活躍を……！"
51070-154 = "なんというか……ちょっとよく分からないこと言ってたよね……"
51070-155 = "「全国大会を目指して朝まで頑張るぞ！まずは体力作りから！」とか……"
51070-156 = "というか、クロレラ観察に全国大会ってあったっけ？ "
51070-157 = "「クロレラ観察の真髄を教えてくれ！全国でも活躍できるよう、今から準備を進めていく！」とか言ってたような……"
51070-163 = "[ns] \"うーん、話を聞いた感じ……\""
51070-165 = "……流石はレンゲ先輩！素晴らしいご活躍ですわ！"
51070-169 = "[ns] \"か、活躍してるかな！？\""
51070-170 = "レンゲ先輩は、決して妥協を許さないお方ですから！"
51070-171 = "それで……お聞きしたいのですが、レンゲ先輩は今どちらへ……？"
51070-172 = "あ、ここには居ませんよ。"
51070-173 = "体験入部が終わった日に、たしか……"
51070-180 = "くっ……すまない！！"
51070-181 = "体験入部の期間中、アタシは質問してばかりだったな。#n悪い、迷惑をかけてしまった。"
51070-186 = "いや、迷惑だとは思わ……"
51070-188 = "……でも、おかげで気がついたんだ。"
51070-190 = "ん？"
51070-191 = "真剣にクロレラを観察するあんた達と違って、自分は……中途半端で、上辺しか見れていなかった。"
51070-192 = "やっぱり、この部活に生涯を捧げてきたあんた達と比べたら、アタシは足元にすら及ばない。"
51070-193 = "いや、生涯を捧げてはいな……"
51070-194 = "だから、ごめん！！正式入部は……申し訳ないが見送らせてほしい。 "
51070-195 = "でも！あんた達の熱い気持ちはしかと受け取った。クロレラ観察をこれからも応援させてほしい！"
51070-197 = "全国大会に出場したら、必ず応援に行くから！"
51070-204 = "――と言って、どこかに行ったよ。"
51070-205 = "クロレラ観察の全国大会……"
51070-206 = "まずは存在するのか調べてみようかな？"
51070-208 = "……そうでしたか。"
51070-209 = "どちらへ向かったかご存じだったりしますの？"
51070-210 = "今は「燈籠祭」の出展準備で忙しいし……"
51070-211 = "すぐ居なくなっちゃったから、それ以上のことは分からなくって。ごめんね。"
51070-214 = "[ns] \"残念だけど一歩遅かったね。\""
51070-215 = "ええ。ですが、レンゲ先輩が文化部で活動していると分かったのは収穫ですの！#n身共の予想通りですわ！"
51070-219 = "方針は間違っていないようですし、次の部活へ参りましょう！"
51070-221 = "多面指し将棋部"
51070-223 = "百花繚乱の赤髪の子……？"
51070-224 = "ああ、思い出した。うちの部活にも来てたよ。"
51070-225 = "なんというか、変わった子だったなぁ。"
51070-226 = "対戦中、苦しそうな場面で「待った」をかけようか？と声をかけたら――"
51070-231 = "そ、それは……情けをかけられているのか……？"
51070-232 = "くっ……だが！！"
51070-233 = "そう……"
51070-237 = "それなら、はい王手。"
51070-242 = "参りましたっっっ！！！"
51070-245 = "――ということがあったんだ。#nその後「一瞬でも揺らいでしまった自分を鍛え直したい」と言って、何度も頭を下げてから帰っていったよ。"
51070-247 = "それは……なんというレンゲ先輩らしいご活躍！"
51070-249 = "フィットネス落語部"
51070-250 = "ああ。レンゲさんなら、来てたよ。"
51070-251 = "私たちの落語を聞きながら、「青春の夢が膨らんだ！」と言ってくれたのは嬉しかったけど……"
51070-252 = "お祭りの準備で忙しいから、今は新入部員を受け入れる余裕がなくてねぇ。#n入部は断っちゃったんだ。"
51070-254 = "かるたバトル部"
51070-255 = "ああ、そうだそうだ。そんな子も来てたね。"
51070-256 = "熱い青春かるたバトルに憧れてる、とか。"
51070-257 = "まあ、お祭りが近いから入部はお断りしたんだけど……"
51070-264 = "（その後も、リストの上から順に部活を訪ねていった）"
51070-268 = "[ns] \"お茶でも飲んで休もっか。\""
51070-272 = "あっ、ありがとうございます……"
51070-273 = "（かなりの数を回ったが、レンゲは見つけられなかった）"
51070-274 = "まさかレンゲ先輩が、これほど体験入部を重ねていたとは……"
51070-275 = "それにしても皆様、レンゲ先輩に対する印象が……"
51070-276 = "[s] \"そうだね、ちょっと辛辣な……\""
51070-277 = "ええ！とっても辛辣な高評価でしたわね！"
51070-278 = "……へっ？言葉の使い方が違う……？ "
51070-279 = "ふふっ、何を仰るのですか！ "
51070-280 = "言葉とは全て、捉え方一つで変わるもの！"
51070-281 = "皆様がレンゲ先輩のことを忘れずにいたのは、それだけ本気で青春に取り組んでいたからに他ありません！"
51070-282 = "レンゲ先輩は、昔からよく「妥協せずに最後までやる事が大切だよ！」と仰っていましたから。"
51070-283 = "[s] \"心からレンゲを尊敬しているんだね。\""
51070-284 = "はい！身共はレンゲ先輩を心から尊敬しておりますとも！"
51070-285 = "ええっと……"
51070-289 = "それでは次の行き先は――"
51070-291 = "先生……はっけーん！"
51070-300 = "[ns] \"わわっ！？\""
51070-304 = "[ns] \"カエデ！？\""
51070-306 = "せ、先生？お怪我はありませんか！？"
51070-307 = "か、カエデちゃん！？危ないじゃないですか！"
51070-308 = "ふあぁ……"
51070-309 = "[s] \"カエデにミモリ、ツバキ……？\""
51070-312 = "次回;青春（？）少女（２）"
