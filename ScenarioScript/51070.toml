[translation]
51070-1 = "Episódio 7; Juventude (?), Garota (1)"
51070-3 = "[ns] \"……O que será que a palavra 'juventude' significa, afinal?\""
51070-4 = "Ah! Falando nisso……"
51070-5 = "Eu ouvi sobre isso da Renge-senpai uma vez."
51070-11 = "Pensando bem, Yukari, você dizia que queria entrar para o nosso grupo desde que estava no ensino fundamental, não é?"
51070-12 = "Sim!"
51070-13 = "Algo como: 'Tudo começou com aquele encontro fatídico naquela noite', não era?"
51070-14 = "Quando ouvi pela primeira vez, pensei: 'Por que alguém viria até aqui de propósito? Que garota estranha'……"
51070-15 = "O Hyakkiyako Ryoran é um comitê maravilhoso que reúne a elite! Como eu sou da elite, decidi que este era o único lugar para mim!"
51070-16 = "Bem, é verdade…… Você realmente vinha todos os dias desde o ensino fundamental……"
51070-17 = "Mesmo sendo mandada embora pela Kikyou, você aparecia no dia seguinte como se nada tivesse acontecido, sem nem se abalar."
51070-18 = "Acordar às 4 da manhã para treinar, tomar café da manhã e ir direto para a aula…… Treinar depois da escola também……#nNão sei o que você vê de tão bom nesse comitê."
51070-20 = "Mesmo assim, eu acho o tempo que passo me esforçando com a Renge-senpai e as outras senpais muito divertido!"
51070-21 = "É, bem…… não tenho como rebater isso."
51070-22 = "Mas…… você nunca pensou, nem que fosse uma vez?"
51070-24 = "……?"
51070-25 = "Em viver uma juventude passando tempo com amigos fora das atividades do Hyakkiyako Ryoran……"
51070-26 = "Nunca pensei nisso!"
51070-27 = "Nossa, respondeu na lata……"
51070-28 = "E quanto à Renge-senpai? Você gosta das atividades do Hyakkiyako Ryoran?"
51070-29 = "Bem…… desde que entrei junto com a Kikyou, de um jeito ou de outro, tenho me divertido."
51070-30 = "Fiquei próxima da Nagusa-senpai e da Yukari também…… não é como se eu me arrependesse……"
51070-35 = "Mas, às vezes, eu penso: 'queria ter uma juventude comum'."
51070-36 = "De repente, me pego pensando nisso. #nComo posso dizer…… algo como um clube cultural?"
51070-42 = "――Naquela época, eu não entendi bem o que ela quis dizer."
51070-43 = "Eu me lembrei daquela conversa e…… fiquei pensando."
51070-44 = "Será que a Renge-senpai não queria ter entrado em outro tipo de clube? #nTalvez eu esteja pensando demais……"
51070-45 = "[s] \"Ela não está apenas desejando uma 'juventude'?\""
51070-49 = "Ah……!? #nEntão é isso mesmo!?"
51070-50 = "Entendo…… ou seja, a Renge-senpai agora……"
51070-51 = "Como está escrito neste papel, ela partiu em uma jornada para aproveitar a juventude……!?"
51070-52 = "Ela disse: 'Se for para viver a juventude, tem que ser em um clube cultural. É muito mais a cara da juventude do que o suado Hyakkiyako Ryoran'. Quem diria que isso levaria a isso!"
51070-53 = "[s] \"Acho que já temos uma ideia de para onde ela foi, não é?\""
51070-54 = "Hum…… a Renge-senpai sempre esteve na linha de frente nos protegendo……"
51070-55 = "Agora que a Nagusa-senpai se foi e as atividades do Hyakkiyako Ryoran foram suspensas…… #nFinalmente o limite da paciência dela chegou……"
51070-59 = "O desejo dela pela juventude explodiu! Com certeza é isso!"
51070-60 = "Vamos! Não temos tempo a perder! Vamos logo, Sensei!"
51070-66 = "Mas, hum……"
51070-72 = "Para onde devemos ir? #nEu não entendo muito sobre os clubes culturais……"
51070-79 = "[ns] \"Aqui, a Kaho preparou uma lista dos clubes culturais para nós.\""
51070-80 = "O Yin-Yang Club preparou uma lista para nós!?"
51070-81 = "I-isso é incrível!"
51070-82 = "Ah…… será que este é o famoso poder do Schale, que até o chefe e o vice-chefe do Yin-Yang Club respeitam……?"
51070-83 = "Será que estou andando com alguém realmente perigoso!?"
51070-84 = "[s] \"N-não é nada disso……\""
51070-85 = "Vamos……"
51070-86 = "Com base nisso, vamos procurar a Renge-senpai!"
51070-88 = "Clube de Observação de Clorela"
51070-90 = "O primeiro da lista é este aqui……"
51070-91 = "Então――"
51070-95 = "Com licença!"
51070-107 = "Por acaso, vocês vieram para uma visita?"
51070-108 = "……De novo?"
51070-109 = "[s] \"Olá. É que, nós――\""
51070-111 = "Sim! Viemos procurar pela Renge-senpai!"
51070-113 = "Renge……?"
51070-114 = "De quem você está falando……?"
51070-116 = "A Renge-senpai é……"
51070-117 = "É a Renge-senpai!"
51070-119 = "……Hã?"
51070-122 = "[ns] \"Yukari, primeiro você precisa descrever as características da Renge……\""
51070-123 = "Ah, é verdade."
51070-124 = "Bem, a Renge-senpai é……"
51070-125 = "Ela diz coisas como: \"Quem faltar ao treino matinal receberá uma punição!\"……"
51070-126 = "Ela vive me provocando, dizendo que tem um grão de arroz no meu rosto……"
51070-127 = "Ela é alguém assim, mas se encontrar o Chimi Ichiza causando confusão, ela corre imediatamente para ajudar…… É alguém que eu admiro profundamente……"
51070-132 = "Bem…… eu não entendi nada."
51070-134 = "N-não pode ser……!?"
51070-135 = "[s1] \"O que a Yukari acabou de dizer foi……\"\n[s2] \"O que a Yukari pensa sobre a Renge, não é……\""
51070-138 = "Ah, não…… você tem toda razão……"
51070-139 = "Bem…… a Renge-senpai tem um lindo cabelo cor de cinábrio e……"
51070-141 = "Cabelo cor de cinábrio?"
51070-142 = "[s] \"Eu disse que procurar aleatoriamente não ia――\""
51070-143 = "Se é alguém de cabelo cor de cinábrio, não seria aquela garota que veio fazer uma aula experimental um tempo atrás?"
51070-149 = "Ah…… aquela que estava usando um haori azul-claro?"
51070-151 = "Sim, é ela mesma! Então ela realmente veio para cá!"
51070-152 = "Se for a Renge-senpai, com certeza ela vai brilhar como a estrela deste \"Clube de Observação de Clorela\"……!"
51070-154 = "Como posso dizer…… ela estava falando umas coisas meio estranhas……"
51070-155 = "Coisas como: \"Vamos nos esforçar até de manhã visando o campeonato nacional! Primeiro, vamos trabalhar no condicionamento físico!\"……"
51070-156 = "Aliás, existe campeonato nacional de observação de clorela?"
51070-157 = "Ela dizia algo como: \"Me ensine a essência da observação de clorela! Vou me preparar agora para poder brilhar no campeonato nacional!\"……"
51070-163 = "[ns] \"Hmm, pelo que você contou……\""
51070-165 = "……Como esperado da Renge-senpai! Que atuação maravilhosa!"
51070-169 = "[ns] \"S-será que ela está mesmo brilhando!?\""
51070-170 = "A Renge-senpai é alguém que nunca aceita menos que a perfeição!"
51070-171 = "Então…… eu gostaria de perguntar, onde a Renge-senpai está agora……?"
51070-172 = "Ah, ela não está aqui."
51070-173 = "No dia em que a aula experimental terminou, se não me engano……"
51070-180 = "Droga…… me desculpem!!"
51070-181 = "Durante o período da aula experimental, eu só fiz perguntas. #nSinto muito, acabei causando problemas."
51070-186 = "Não, não acho que tenha causado problemas……"
51070-188 = "……Mas, graças a isso, eu percebi uma coisa."
51070-190 = "Hã?"
51070-191 = "Diferente de vocês, que observam a clorela com seriedade, eu…… estava sendo superficial e não via as coisas como deveria."
51070-192 = "Comparada a vocês, que dedicaram suas vidas a este clube, eu não chego nem aos pés."
51070-193 = "Não, nós não dedicamos nossas vidas……"
51070-194 = "Por isso, me desculpem!! Sinto muito, mas vou ter que recusar a entrada oficial no clube."
51070-195 = "Mas! Eu recebi todo o entusiasmo de vocês. Por favor, deixem-me continuar torcendo pela observação de clorela!"
51070-197 = "Quando vocês participarem do campeonato nacional, eu com certeza irei torcer por vocês!"
51070-204 = "――Foi o que ela disse antes de ir embora."
51070-205 = "Campeonato Nacional de Observação de Clorela..."
51070-206 = "Será que eu deveria verificar se isso realmente existe?"
51070-208 = "...Entendo."
51070-209 = "Você por acaso sabe para onde ela foi?"
51070-210 = "Estamos ocupados com os preparativos para o 'Festival das Lanternas' agora..."
51070-211 = "Ela foi embora tão rápido que não sei de mais nada. Sinto muito."
51070-214 = "[ns] \"Que pena, você chegou um pouco atrasada.\""
51070-215 = "Sim. Mas descobrir que a veterana Renge está participando de clubes culturais já é um ganho! Como eu esperava!"
51070-219 = "Parece que nossa estratégia não está errada, vamos para o próximo clube!"
51070-221 = "Clube de Shogi Simultâneo"
51070-223 = "Aquela garota de cabelo vermelho da Hyakkiyako...?"
51070-224 = "Ah, lembrei. Ela também veio ao nosso clube."
51070-225 = "Como posso dizer, ela era uma garota peculiar."
51070-226 = "Durante a partida, quando ela parecia estar em apuros, eu perguntei: 'Quer que eu espere um pouco?' e então—"
51070-231 = "I-isso é... ela estava sendo piedosa comigo...?"
51070-232 = "Droga... mas!!"
51070-233 = "Entendo..."
51070-237 = "Sendo assim, xeque."
51070-242 = "Eu me rendo!!!"
51070-245 = "—foi o que aconteceu. Depois disso, ela disse: 'Quero me treinar novamente por ter vacilado nem que fosse por um instante', e foi embora depois de se curvar várias vezes."
51070-247 = "Isso é... que atuação típica da veterana Renge!"
51070-249 = "Clube de Rakugo Fitness"
51070-250 = "Ah. Se é a Renge, ela veio aqui sim."
51070-251 = "Fiquei feliz por ela ter dito que 'seus sonhos de juventude floresceram' enquanto ouvia nosso Rakugo, mas..."
51070-252 = "Estamos ocupados com os preparativos do festival, então não temos espaço para novos membros agora. Tivemos que recusar a entrada dela."
51070-254 = "Clube de Batalha de Karuta"
51070-255 = "Ah, é verdade. Uma garota assim também veio aqui."
51070-256 = "Algo sobre admirar batalhas de Karuta cheias de juventude ardente."
51070-257 = "Bem, como o festival está próximo, recusamos a entrada dela..."
51070-264 = "(Depois disso, ela continuou visitando os clubes seguindo a lista)"
51070-268 = "[ns] \"Vamos beber um chá e descansar um pouco.\""
51070-272 = "Ah, muito obrigada..."
51070-273 = "(Visitamos um número considerável de lugares, mas não encontramos a Renge)"
51070-274 = "Quem diria que a veterana Renge tinha feito tantas aulas experimentais..."
51070-275 = "E, além disso, a impressão que todos têm da veterana Renge é..."
51070-276 = "[s] \"Pois é, um pouco ácida...\""
51070-277 = "Sim! Foi uma avaliação muito ácida e positiva!"
51070-278 = "...Hã? O uso das palavras está errado...?"
51070-279 = "Fufu, o que você está dizendo!"
51070-280 = "As palavras mudam dependendo de como você as interpreta!"
51070-281 = "O fato de todos se lembrarem da veterana Renge é prova de que ela se dedicou à juventude com toda a seriedade!"
51070-282 = "A veterana Renge sempre dizia: 'É importante fazer as coisas até o fim sem comprometer seus ideais!'"
51070-283 = "[s] \"Você realmente respeita a Renge do fundo do coração, não é?\""
51070-284 = "Sim! Eu respeito a veterana Renge do fundo do meu coração!"
51070-285 = "Bem..."
51070-289 = "Então, o próximo destino é—"
51070-291 = "Sensei... te encontrei!"
51070-300 = "[ns] \"Uau!?\""
51070-304 = "[ns] \"Kaede!?\""
51070-306 = "Se-Sensei? Você não se machucou!?"
51070-307 = "Ka, Kaede-chan!? Isso é perigoso!"
51070-308 = "Uaaah..."
51070-309 = "[s] \"Kaede, Mimori, Tsubaki...?\""
51070-312 = "Próximo episódio: Juventude (?) Garotas (2)"
