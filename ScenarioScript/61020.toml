[translation]
61020-1 = "Episódio 2; O Dever do Estudante"
61020-2 = "Há quanto tempo, Sensei!"
61020-3 = "Sinto que faz um bom tempo desde a última vez que nos vimos.#nSensei, você se lembra de mim?"
61020-4 = "Eu não me esqueceria do rosto nem da voz do Sensei. E, claro, nem da Hifumi."
61020-5 = "Memorizar as características físicas de um alvo é importante para a execução da missão."
61020-9 = "……Você não está confundindo o Sensei com um alvo de missão ou algo assim, está?"
61020-10 = "Ufufu, não acho que seja algo tão perigoso assim.#nEmbora ele possa ser o alvo de uma missão perigosa.#nPor exemplo…… uma aula de reforço noturna."
61020-11 = "A-aula de reforço noturna!? Do que você está falando!?#nCoisas indecentes são proibidas! Pena de morte!"
61020-12 = "Digo! Por que você sempre tenta levar a conversa para esse lado!?#nVocê não fica satisfeita se não transformar tudo em um assunto indecente!?"
61020-13 = "Ai, que vergonha♡"
61020-14 = "E nada de fazer sons estranhos também!"
61020-16 = "Ah, ahaha…… mas fico feliz por ter conseguido encontrar o Sensei agora.#nPorque ficarei ocupada a partir da semana que vem……."
61020-17 = "[s]\"Vai acontecer algo na semana que vem?\""
61020-18 = "Ué, o Sensei não sabe?"
61020-19 = "Em breve, teremos o Exame Geral de Trinity."
61020-20 = "Por isso, preciso começar a me preparar seriamente logo…… auuu……."
61020-21 = "[s]\"Exame Geral de Trinity?\""
61020-23 = "Sim♡ É um exame aplicado a todos os estudantes de Trinity……."
61020-24 = "Língua pátria, saúde, matemática e―― educação física.#nAlém de física e―― até educação física e saúde. Todas as matérias, todo o conteúdo, é――"
61020-25 = "Um exame que faz jus ao nome de \"Geral\"♡"
61020-26 = "Por que você enfatiza tanto a educação física e saúde!?#nNão, esquece, não precisa explicar."
61020-27 = "[s]\"Como ele é diferente de um exame comum?\""
61020-28 = "Eu também estava curioso sobre isso.#nAchei que já tinha entendido o básico sobre os exames através do exame acadêmico especial, mas……."
61020-29 = "Bem, é que…… as questões do Exame Geral de Trinity são criadas por uma instituição externa."
61020-30 = "Acho que o motivo era algo como imparcialidade? Objetividade? Algo assim?"
61020-34 = "Simplificando…… é para medir a capacidade acadêmica pura, removendo o viés de \"Trinity\"."
61020-35 = "Se criarmos as questões internamente, há o risco de haver tendências nas perguntas ou falta de objetividade na dificuldade."
61020-36 = "Embora seja um efeito secundário, o fato de música aplicada não cair na prova é uma pequena vantagem."
61020-37 = "Embora, na verdade, seja também uma resposta a uma pergunta do sistema interno: \"Como os criadores do exame devem abordar a aplicação da prova?\""
61020-38 = "[s]\"Ah…… entendi. Então é como um simulado externo…….\""
61020-39 = "Simulado…… externo? O que é isso?"
61020-40 = "Sinto que entendi, mas ao mesmo tempo não entendi……."
61020-42 = "Deixando o nome de lado, pela sua expressão, parece que o Sensei também não gosta muito de exames."
61020-44 = "Fufu, não deve haver muitas pessoas que gostam de exames.#nEu, é claro, também não."
61020-45 = "Ora, foi uma surpresa? Eu também sou apenas uma estudante comum do ensino médio."
61020-46 = "Comum……?"
61020-47 = "Mas, se for um \"exame prático de educação física e saúde\" com o Sensei……#nUfufu…… eu até ficaria feliz……♡"
61020-48 = "Você, fique quieta de uma vez!!"
61020-49 = "Não diga isso…… Koharu-chan, por que não se junta a nós?"
61020-54 = "Prática em três!? Coisas indecentes assim são proibidas! Pena de morte!!"
61020-55 = "Kyaa♡"
61020-56 = "Ahaha……."
61020-58 = "Entendo. Então, não há risco de ser reprovado neste exame."
61020-59 = "Como é um exame realizado por uma instituição externa, parece que não existe essa medida.#nMas isso não significa que podemos relaxar……."
61020-60 = "Se eu tirar uma nota horrível, vou virar motivo de piada, né?#nEu sou uma elite, então vou fazer direito!"
61020-61 = "Além disso, se as notas forem muito baixas, acabaremos tendo que fazer um \"reforço especial\"……."
61020-62 = "Se não há reprovação, por que é necessário fazer reforço?"
61020-63 = "É que, bem……#nOu seja, só significa que você não será expulso mesmo se o resultado for ruim……."
61020-64 = "Mas você precisa tirar uma nota acima de um certo nível no reexame."
61020-65 = "Ainda assim……#nNão deveriam haver aulas de reforço além do tempo determinado, mas……."
61020-66 = "Fufu. Se as notas forem ruins, significa que o precioso tempo depois da aula será roubado."
61020-68 = "[ns]\"Vamos nos esforçar para não ter que fazer aulas de reforço desta vez!\""
61020-69 = "Auu..."
61020-70 = "Ufufu. #nSe eu fosse a única a ficar sozinha na aula de reforço..."
61020-71 = "O sensei responsável... será que poderíamos pedir ao Sensei?"
61020-72 = "A sala de aula vazia depois da aula. O céu tingido de cor carmesim. #nA brisa da tarde entrando pela janela entreaberta. As cortinas balançando suavemente..."
61020-73 = "Eu me distraio e fico olhando para fora da janela. #nO Sensei se aproxima dizendo: \"Concentre-se\"."
61020-74 = "Nesse momento, o vento sopra... #nE na sala de aula, somos apenas eu e o Sensei... um mundo só nosso."
61020-80 = "Do outro lado da cortina... a distância entre as sombras dos dois diminui pouco a pouco..."
61020-81 = "A-awawawawa!?"
61020-82 = "?"
61020-83 = "!?!?!!!!"
61020-84 = "Proibido falar!!!!!"
61020-85 = "Ah, que isso~♡"
61020-90 = "[ns1] (Falando nisso...)\n[ns2] (Como será que as outras estão passando o tempo...)"
61020-94 = "[ns]\"Vocês continuam com as atividades da patrulha mesmo durante o período de provas?\""
61020-95 = "Sim! Nem os estudos, nem a paz da cidade podem ser negligenciados!"
61020-96 = "O equilíbrio é a vontade inabalável e o princípio de ação da nossa patrulha!"
61020-97 = "...Não é, Suzumi-san?"
61020-101 = "Bem, a patrulha não tem nenhum princípio especial, mas..."
61020-102 = "Estudar também é um dever dos alunos, então o que a Reisa-san disse não está errado."
61020-103 = "Eh? Você se sente aliviado ao me ver...? #nSensei, o que isso significa...?"
61020-104 = "Eu não entendo muito bem, mas... acho que é algo bom!"
61020-108 = "Uwa!? P-pensei que fosse outra pessoa, mas são a Shimiko e o Sensei... achei que fossem os de fora de novo... #nAlgum assunto...?"
61020-109 = "Eles vieram ver se você está se preparando para as provas. #nPresidente, você está estudando direito?"
61020-110 = "Provas desse nível, se for língua nacional, eu dou um jeito..."
61020-111 = "Desta vez é uma prova \"geral\". Matérias além de língua nacional também fazem parte."
61020-112 = "B-bem, como tudo está escrito nos livros... para mim, não deve ser um problema..."
61020-114 = "Matemática também?"
61020-115 = "Ugh, ah...!"
61020-116 = "Presidente, você diz isso, mas os livros que você lê são bem limitados, né..."
61020-117 = "U, uu..."
61020-119 = "[ns]\"Shimiko, você está bem com matemática?\""
61020-120 = "Eu? #nEu... bem, de alguma forma."
61020-121 = "Comparado ao terceiro ano, o conteúdo do primeiro não é difícil. #nSó de consolidar a base, a carga de estudo não é tão grande."
61020-122 = "...Invejável."
61020-125 = "Ah, Sensei. Bem-vindo. #nHum? ...Sim, é isso. Tínhamos combinado de estudar juntas, mas..."
61020-129 = "Escutem, aventureiros! #nPara aumentar a eficiência dos estudos, é indispensável ativar o cérebro!"
61020-130 = "Porém, nossos cérebros só aceitam um combustível de alta qualidade chamado \"glicose\"..."
61020-131 = "Portanto, agora! Comer doces é, sem dúvida, um dever!"
61020-132 = "Opa, a Natsu até que diz coisas sensatas às vezes! #nRealmente, se não comer algo doce, o cérebro não funciona."
61020-134 = "Elas ficam assim o tempo todo..."
61020-135 = "D-desculpe, Sensei. Mesmo você tendo vindo até aqui..."
61020-137 = "[ns]\"Fico aliviado que estejam como sempre.\""
61020-139 = "Não podemos relaxar nos cuidados médicos só porque é época de provas. #nÉ o princípio básico da Unidade de Socorro."
61020-140 = "Não, a prova em si pode ser considerada um \"socorro\"!"
61020-141 = "[s]\"Eh, o que isso significa...?\""
61020-142 = "Tanto as provas quanto o socorro são atos que ajudam as pessoas."
61020-143 = "Sem perder a essência disso e agindo com sinceridade, nosso \"espírito de socorro\" será provado."
61020-144 = "Por exemplo, ajudar os outros por boa vontade sem pedir nada em troca... isso é socorro."
61020-145 = "Corrigir um local onde há injustiça por meios físicos... isso também é um ato de socorro."
61020-146 = "Punir empresas inescrupulosas que cortam custos para maximizar lucros e produzem suprimentos médicos de baixa qualidade. Isso também é um ato de socorro."
61020-147 = "――Todos os caminhos levam ao socorro."
61020-148 = "Portanto, o exame também é, em suma, um ato de socorro!"
61020-150 = "Eh? O que é o socorro, você pergunta? Ahaha..."
61020-151 = "Seria esse o princípio mais importante para nós, o Esquadrão de Socorro?"
61020-152 = "Ué? Pensando bem, por que as técnicas médicas exclusivas de Trinity não estão no conteúdo do exame...?"
61020-153 = "E-Errado... talvez seja porque elas são inovadoras demais em vários sentidos... não é?"
61020-155 = "P-P-P-Sensei!? P-Por que você está aqui...!?"
61020-156 = "V-Veio ver como estão os estudos...? I-I-Isso é gratificante, mas...!"
61020-157 = "Hihi... Hyaha...!"
61020-158 = "...Tsurugi, por favor, acalme-se."
61020-159 = "A-Ah..."
61020-160 = "E-E então... muito... obrigada, Sensei... Por se preocupar com a gente assim..."
61020-162 = "[ns]\"Será que atrapalhei os estudos de vocês...?\""
61020-163 = "Não, de forma alguma. Nós estávamos justamente prestes a fazer uma pausa."
61020-164 = "Na verdade, nos últimos dias, fora o horário das refeições e das missões, todas nós estamos mergulhadas nos estudos."
61020-165 = "O Comitê de Justiça tende a ter pouco tempo para si mesmas, então..."
61020-170 = "Bem, mas não precisa se preocupar tanto assim. Nós realizamos nossas atividades cientes de que é assim que as coisas funcionam."
61020-171 = "Não importa quais dificuldades surjam, manter-se firme e seguir sua própria justiça――"
61020-172 = "Acredito que essa seja a essência do Comitê de Justiça."
61020-173 = "Fufu, isso é bem a cara da Mashiro! ...Bem, então, vamos voltar aos estudos. O próximo tópico é... \"A relatividade da moral e da ética\"."
61020-174 = "...Sinceramente, não consigo aceitar isso. Relatividade significa que muda dependendo das condições, certo? Mas... isso parece impossível..."
61020-175 = "Não é tão fácil traçar uma linha assim... Bem, se é difícil, o jeito é decorar primeiro. A lógica vem depois."
61020-177 = "...Por isso, decidimos reservar um tempo para nos reunirmos no Grande Auditório e estudarmos juntas."
61020-178 = "[s3]\"Será que não tem alunas que preferem estudar sozinhas...?\"\n[s4]\"Por vergonha, ou por não conseguirem se concentrar...\""
61020-181 = "Não há motivo para isso. \"Esforçar-se para não ter do que se envergonhar sob este céu\" é o lema da Sisterhood."
61020-182 = "Além disso, por que haveria vergonha em cumprir o \"dever do aluno\", que é o estudo?"
61020-183 = "Eu confio nas irmãs mais do que em qualquer outra pessoa em Trinity."
61020-184 = "Claro, também informei que, caso haja ansiedade ou hesitação, farei o possível para oferecer conveniências."
61020-185 = "Portanto, sintam-se à vontade para me consultar..."
61020-186 = "U-Uma entrevista individual com a Srta. Sakurako...?"
61020-191 = "Sim, exatamente. Isso também não é uma forma de benevolência que deve ser espalhada pelo mundo?"
61020-193 = "Pode até haver esse lado, mas..."
61020-195 = "(Depois disso, conseguimos convencer Sakurako――)"
61020-196 = "(Chegamos a um acordo onde as alunas que querem estudar com as outras ficam no Grande Auditório, e as que preferem estudar sozinhas ficam no dormitório.)"
61020-197 = "(Hinata e Mari se esforçaram muito para ajudar na persuasão...)"
61020-202 = "Ah, Sensei! Olá!"
61020-203 = "Exame...? É claro que vou me esforçar, né~"
61020-204 = "Eh? Se eu tirar uma nota boa, você vai me pagar algo gostoso!? É sério, hein? É uma promessa!"
61020-205 = "Beleza, vou levar esses estudos a sério!"
61020-206 = "Você não vai acabar dormindo depois de resolver só uma folha de exercícios de novo?"
61020-207 = "Naquela vez, você também estava dormindo comigo!"
61020-213 = "(Enquanto observava as alunas indo embora alegremente...)"
61020-214 = "(Duas alunas se aproximaram, como se estivessem sondando a situação discretamente.)"
61020-220 = "A-Ah, com licença, Sensei...?"
61020-221 = "Poderia nos dar um pouco do seu tempo...?"
61020-224 = "Próximo episódio: Dias como um sonho"
