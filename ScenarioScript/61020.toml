[translation]
61020-1 = "第2話;生徒の本分"
61020-2 = "お久しぶりです、先生！"
61020-3 = "だいぶ久しぶりにお会いした気がします。#n先生、私のことを覚えていますか？"
61020-4 = "私は先生の顔も耳も忘れていない。もちろん、ヒフミのもだ。"
61020-5 = "ターゲットの外見的特徴を記憶しておくことは、任務遂行において重要だからな。"
61020-9 = "……先生のこと、任務ターゲットかなにかと勘違いしてない？"
61020-10 = "うふふ、そんな物騒な話ではないと思いますよ。#nアブない任務のターゲットではあるかもしれませんが。#n例えば……夜の補習授業とか。"
61020-11 = "よ、夜の補習授業！？何いってんの！？#nエッチなのはダメ！死刑！"
61020-12 = "というか！なんでいっつも話をそっちに持っていこうとするわけ！？#nエッチな話にしないと気が済まないの！？"
61020-13 = "いやん♡"
61020-14 = "変な声出すのも禁止！"
61020-16 = "あ、あはは……でも、今のうちに先生とお会いできてよかったです。#n来週から忙しくなってしまいますので……。"
61020-17 = "[s]\"来週から何かあるの？\""
61020-18 = "あれ、先生知らないの？"
61020-19 = "もうすぐ、トリニティ総合試験なんです。"
61020-20 = "なのでそろそろ、本格的に準備を始めないといけなくて……あうぅ……。"
61020-21 = "[s]\"トリニティ総合試験？\""
61020-23 = "はい♡トリニティの全生徒を対象に行われる試験で……。"
61020-24 = "国語や保健、数学に――体育。#n他にも物理や――保健体育まで。全科目、全範囲が対象の――"
61020-25 = "まさに「総合」の名にふさわしい試験なんです♡"
61020-26 = "なんでそんなに保健体育を強調するの！？#nいや、別に説明しなくていいけど。"
61020-27 = "[s]\"普通の試験とどう違うの？\""
61020-28 = "それは私も気になっていた。#n試験については、特別学力試験である程度理解したつもりだが……。"
61020-29 = "えっとですね……トリニティ総合試験の問題は外部の機関が作成するんです。"
61020-30 = "たしか公正性？客観性？そんな感じの理由だったはず？"
61020-34 = "簡単に言えば……『トリニティ』という視点を抜いて、純粋な学力を測るためのものです。"
61020-35 = "内部で問題を作ると出題傾向に偏りがあったり、難易度の客観性に欠けたりする恐れがありますから。"
61020-36 = "副次的なものですが、応用音楽が出題範囲に入らない、というのはちょっとした利点ですね。"
61020-37 = "もっとも、「試験の作問者は、当該試験をどのように受けるべきか？」という内部システム的な問いへの回答でもあるのですが。"
61020-38 = "[s]\"あ……なるほど。外部模試ってことだね……。\""
61020-39 = "外部……模試？なにそれ？"
61020-40 = "なんか、分かるような分からないような……。"
61020-42 = "名称はさておき、その表情を見るに、先生も試験はあまり好きじゃないようだな。"
61020-44 = "ふふっ、試験が好きという方は、そう多くないでしょうね。#nもちろん、私も。"
61020-45 = "あら、意外でしたか？私も至って普通の女子高生ですから。"
61020-46 = "普通の……？"
61020-47 = "でも、先生との「保健体育の実技試験」でしたら……#nうふふ……むしろ喜んで……♡"
61020-48 = "あんたはもう黙ってて！！"
61020-49 = "そんなこと言わずに……コハルちゃんも一緒にいかがですか？"
61020-54 = "三人で実技！？そんなエッチなのはダメ！死刑！！"
61020-55 = "きゃあ♡"
61020-56 = "あはは……。"
61020-58 = "なるほど。今回の試験では、落第することはないんだな。"
61020-59 = "外部の機関が実施する試験なので、そういう措置はないみたいです。#nでも、手を抜いていいわけではなくて……。"
61020-60 = "ひどい点数を取ったら笑いものになるでしょ？#n私はエリートなんだから、ちゃんとするわよ！"
61020-61 = "それに、あまりにも成績が悪いと「特別補習」を受けることになっちゃいます……。"
61020-62 = "落第しないのに補習を受ける必要があるのか？"
61020-63 = "それは、えっと……#nつまり、試験の結果が悪くても退学にはならないというだけで……。"
61020-64 = "ちゃんと再試験で一定以上の点数を取らなければなりません。"
61020-65 = "とはいっても……#n決められた時間以上の補習授業は行われないはずですが。"
61020-66 = "ふふっ。成績が悪いと、貴重な放課後の時間が奪われてしまうというわけです。"
61020-68 = "[ns]\"今回は補習を受けなくて済むように頑張ろう！\""
61020-69 = "あうぅ……。"
61020-70 = "うふふ。#nもしも私だけ、一人寂しく補習対象になってしまったら――"
61020-71 = "担当教師は……先生にお願いしましょうか。"
61020-72 = "誰もいない放課後の教室。茜色に染まる空。#n半開きの窓から入る夕風。ひらひらと揺れるカーテン……。"
61020-73 = "つい気が散って、窓の外をぼーっと眺めてしまう私。#n先生は「集中しなさい」と言って近づいてくる。"
61020-74 = "その時、ちょうど風が吹いて……#n教室には私と先生……2人だけの世界に。"
61020-80 = "カーテンの向こう側……2人の影は、少しずつ距離が縮まっていき――"
61020-81 = "あ、あわわわわ！？"
61020-82 = "？"
61020-83 = "！？！？！！！！"
61020-84 = "しゃべるの禁止！！！！！"
61020-85 = "そんなぁ～♡"
61020-90 = "[ns1]（そういえば……）\n[ns2]（他の子は、どう過ごしているんだろう……）"
61020-94 = "[ns]\"試験期間中でも自警団の活動は続けるの？\""
61020-95 = "はい！勉強も、街の平和も、どちらも疎かにはできません！"
61020-96 = "両立こそが自警団の不屈の意志であり、行動理念ですから！"
61020-97 = "……ですよね？スズミさん！"
61020-101 = "えっと、自警団に特別な理念はないのですが……。"
61020-102 = "勉強も生徒の本分ですから、レイサさんの言っていることも間違いではありません。"
61020-103 = "え？私を見ると安心する……？#n先生、それはどういう意味でしょうか……？"
61020-104 = "私にはよく分かりませんが……たぶん、良いことだと思います！"
61020-108 = "うわっ！？だ、誰かと思えば、シミコと先生……てっきり、また外の方かと……。#nな、何か用事ですか……？"
61020-109 = "試験の準備をしているか、様子を見に来てくださったんです。#n委員長、ちゃんと勉強していますか？"
61020-110 = "試験程度、国語ならどうとでも……。"
61020-111 = "今回は「総合」試験ですから。国語以外の科目も試験の対象ですよ。"
61020-112 = "ほ、本にはすべてが書かれているので……私は別に、問題ない、はず……。"
61020-114 = "数学もですか？"
61020-115 = "うっ、あっ……！"
61020-116 = "委員長、なんだかんだ言って読む本が偏っていますからね……。"
61020-117 = "う、うぅ……。"
61020-119 = "[ns]\"シミコは数学大丈夫なの？\""
61020-120 = "私ですか？#n私は……まぁ、なんとか。"
61020-121 = "3年生に比べれば、1年生の内容は難しくありませんから。#n基礎固めをするだけで、勉強量は少なくて済むんです。"
61020-122 = "……ずるい。"
61020-125 = "あ、先生。いらっしゃい。#nうん？……うん、そう。みんなで勉強するって話だったんだけど……。"
61020-129 = "聞くがよい、冒険者たちよ！#n勉強の能率を上げるには、脳を活性化させることが必要不可欠！"
61020-130 = "だが、我々の脳は「ブドウ糖」という高級燃料しか受けつけない……。"
61020-131 = "故に今！我々がスイーツを食するのは、まさしく義務であると言えよう！"
61020-132 = "おっ、ナツもたまにはいいこと言うじゃん！#nやっぱ甘いもの食べないと頭回んないよね。"
61020-134 = "ずっとこんな調子なんだよね……。"
61020-135 = "す、すみません、先生。せっかく来てくださったのに……。"
61020-137 = "[ns]\"いつも通りで安心したかな。\""
61020-139 = "試験だからといって、救護の手を緩めるわけにはいきません。#n救護騎士団としての基本理念です。"
61020-140 = "いえ、[ruby=・   ・   ・   ・   ・   ・]試験そのもの[/ruby]が「救護」であると言えるでしょう！"
61020-141 = "[s]\"えっと、それってどういう意味……？\""
61020-142 = "試験も救護も、どちらも人々の助けとなる行いです。"
61020-143 = "その本質を見失わず、誠実に臨むことで――#n私たちの「救護の精神」は証明されるでしょう。"
61020-144 = "例えば、見返りを求めずに善意で他者を助ける行い――これは救護です。"
61020-145 = "不正のある場を、物理的手段をもって是正する――これもまた救護です。"
61020-146 = "利益追求のために原価を削り、質の低い医療品を作る悪徳企業を懲罰する。#nこれも救護なのです。"
61020-147 = "――すべての道は、救護に通ず。"
61020-148 = "従って試験もまた、すなわち救護なのです！"
61020-150 = "え？救護とは何か、ですか？あはは……。"
61020-151 = "私たち救護騎士団にとって一番大切な理念……でしょうか？"
61020-152 = "あれ？そういえば、どうしてトリニティ独自の医療技術は#n試験範囲になってないんでしょう……？"
61020-153 = "え、ええと……それは、色んな意味で斬新すぎるから……じゃないかな……。"
61020-155 = "せ、せせせ先生！？#nど、どうしてこちらに……！？"
61020-156 = "べ、勉強の様子を見に……？#nそ、そそ、それは嬉しい、ですが……！"
61020-157 = "ひひ……ひゃはっ……！"
61020-158 = "……ツルギ、落ち着いてください。"
61020-159 = "あ、ああ……。"
61020-160 = "そ、そのっ……ありがとう……ございます、先生……。#nこ、こうして、気にかけていただいて……。"
61020-162 = "[ns]\"勉強の邪魔しちゃったかな……。\""
61020-163 = "いえ、そんなことはありません。#nちょうど、休憩しようと思っていたところです。"
61020-164 = "実はここ数日、食事や任務の時間以外は、みんな勉強漬けでして。"
61020-165 = "正義実現委員会は、自分の時間が少なくなりがちなので……。"
61020-170 = "まあでも、そんなに心配しなくても大丈夫っすよ。#nそういうものだって理解した上で、私たちは活動してるっすから。"
61020-171 = "どんな困難があっても、揺るがずに自分の正義を貫くこと――"
61020-172 = "それが正義実現委員会の本質だと思っています。"
61020-173 = "ふふ、マシロらしいっすね！#n……んじゃ、そろそろ勉強に戻るっすよ。#n次は……「道徳と倫理の相対性」の部分っすね。"
61020-174 = "……やっぱり、ここは納得できないです。#n相対性ということは、条件で変わるということですよね？#nでも……それはあり得ないような……。"
61020-175 = "言うほど簡単に線を引けるわけじゃないんすよ……。#nまぁ難しいなら、まずは暗記っすね。理屈は後からついてくるっすから。"
61020-177 = "……ということで、大講堂に集まって共に学ぶ時間を設けることにしたのです。"
61020-178 = "[s3]\"ひとりで勉強したい子もいるんじゃないかな……？\"\n[s4]\"恥ずかしいとか、集中できないとか……。\""
61020-181 = "そんなことはありません。#n「この空の下、恥じること無きよう努力すること」こそ、シスターフッドの心得。"
61020-182 = "それに、勉学という「生徒の本分」を果たす行為に、どうして恥じらいが伴うのでしょうか。"
61020-183 = "私はトリニティの誰よりも、シスターの皆様を深く信頼しておりますから。"
61020-184 = "もちろん、不安やためらいがあるのでしたら、できる限りの便宜を図るともお伝えしております。"
61020-185 = "ですので「気軽に」相談していただければ……。"
61020-186 = "サ、サクラコ様との個人面談、ですか……。"
61020-191 = "ええ、そうです。#nこれもまた、世界へ広く届けるべき、慈愛のかたちではありませんか？"
61020-193 = "そういう側面も、たしかにあるかもしれませんが……。"
61020-195 = "（その後、サクラコをどうにか説得し――）"
61020-196 = "（みんなと一緒に勉強したい生徒は大講堂で。一人で勉強したい生徒は寮で自習するという妥協案に落ち着いた）"
61020-197 = "（説得は、ヒナタとマリーがとても頑張ってくれた……）"
61020-202 = "あっ、先生！こんにちは！"
61020-203 = "試験……？#nちゃんと頑張るに決まってるじゃないですか～"
61020-204 = "えっ？成績が良かったら美味しいものをご馳走してくれるんですか！？#n絶対ですよ？約束ですからねっ！"
61020-205 = "よーっし、本気で試験勉強しよっかな！"
61020-206 = "どうせまた、プリント1枚解いて寝るんじゃない？"
61020-207 = "あの時はあんたも一緒に寝てたでしょ！"
61020-213 = "（楽しげに去っていく生徒たちを見守っていると……）"
61020-214 = "（そっと様子を伺うように、2人の生徒が近づいてきた）"
61020-220 = "あ、あの、先生……？"
61020-221 = "少し、お時間いただけますか……？"
61020-224 = "次回;夢のような日々"
