[translation]
61020-1 = "Episódio 2; O Dever de um Aluno"
61020-2 = "Quanto tempo, Sensei!"
61020-3 = "Sinto que faz uma eternidade desde a última vez que nos vimos.#nSensei, você ainda se lembra de mim?"
61020-4 = "Eu não esqueci nem o seu rosto nem as suas orelhas, Sensei. E muito menos os da Hifumi, claro."
61020-5 = "Memorizar as características físicas de um alvo é crucial para concluir uma missão, sabe."
61020-9 = "...Você não tá confundindo o Sensei com um alvo de missão ou coisa do tipo, né?"
61020-10 = "Hehe, acho que não é nada tão perigoso assim.#nMas talvez ele seja o alvo de uma missão *perigosa* de outro jeito.#nTipo... uma aulinha de reforço à noite."
61020-11 = "A-Aula de reforço à noite!? Do que cê tá falando!?#nCoisas pervertidas são proibidas! Pena de morte!"
61020-12 = "Aliás! Por que você sempre leva a conversa pra esse lado!?#nSe não falar de safadeza você não sossega, é!?"
61020-13 = "Aiahn♡"
61020-14 = "Fazer vozinha estranha também é proibido!"
61020-16 = "A-Ahaha... Mas foi muito bom conseguir ver o Sensei agora.#nSemana que vem a coisa vai ficar corrida..."
61020-17 = "[s]\"Vai rolar alguma coisa semana que vem?\""
61020-18 = "Ué, Sensei, você não tá sabendo?"
61020-19 = "O Exame Geral de Trinity tá quase aí."
61020-20 = "Por causa disso a gente já tem que começar a focar de vez nos estudos... auuh..."
61020-21 = "[s]\"Exame Geral de Trinity?\""
61020-23 = "Isso mesmo♡ É uma prova que todas as alunas de Trinity fazem..."
61020-24 = "Cai Língua Nacional, Saúde, Matemática—e Educação Física.#nAlém de Física e—até Educação Física e Saúde. Cai absolutamente tudo—"
61020-25 = "É um exame que realmente faz jus ao nome de \"Geral\"♡"
61020-26 = "Por que cê tá dando tanta ênfase nessa parte de Saúde!?#nQuer dizer, não precisa nem explicar."
61020-27 = "[s]\"E qual a diferença disso pra uma prova normal?\""
61020-28 = "Também tava me perguntando isso.#nAchei que já tinha entendido a moral das provas com o Exame Especial de Proficiência, mas..."
61020-29 = "Então, é que... as questões do Exame Geral de Trinity são feitas por uma instituição de fora."
61020-30 = "Acho que era por causa de imparcialidade? Ou objetividade? Algum papo assim."
61020-34 = "Resumindo... é pra avaliar o nosso nível acadêmico puro, sem o viés de \"Trinity\"."
61020-35 = "Se as provas fossem feitas internamente, poderia ter algum favoritismo no conteúdo, ou a dificuldade não seria tão objetiva."
61020-36 = "Um bônus disso é que Música Aplicada não cai na prova, o que já é uma baita vantagem."
61020-37 = "Embora também seja uma resposta do sistema interno àquela famosa pergunta: \"Como as alunas deveriam se preparar para as provas dos professores da casa?\""
61020-38 = "[s]\"Ah... entendi. Tipo um simulado externo, então...\""
61020-39 = "Simulado... externo? Que que é isso?"
61020-40 = "Acho que entendi... mas não entendi..."
61020-42 = "Deixando os nomes de lado, pela sua cara, acho que o Sensei também não é muito fã de provas."
61020-44 = "Hehe, pouca gente curte fazer prova, né.#nNem eu, obviamente."
61020-45 = "Ué, achou estranho? Eu também sou só uma colegial normal, sabe."
61020-46 = "Normal...?"
61020-47 = "Mas, se fosse um \"exame prático de Educação Física e Saúde\" com o Sensei...#nHehe... aí eu faria com todo o prazer...♡"
61020-48 = "Cala a boca, vai!!"
61020-49 = "Não precisa ficar assim... que tal entrar nessa com a gente, Koharu-chan?"
61020-54 = "Exame prático a três!? Que safadeza é essa! Pena de morte!!"
61020-55 = "Aaaah♡"
61020-56 = "Ahaha..."
61020-58 = "Saquei. Então quer dizer que ninguém corre o risco de reprovar nesse exame."
61020-59 = "Como é uma prova de fora, parece que não tem punição de reprovação.#nMas isso não quer dizer que dá pra fazer de qualquer jeito..."
61020-60 = "Se a gente tirar nota baixa, vai virar piada, né?#nEu sou uma aluna de elite, então vou gabaritar essa parada!"
61020-61 = "Além disso, se a nota for ruim demais, a gente cai na \"Recuperação Especial\"..."
61020-62 = "Mas se não dá pra reprovar, pra que fazer recuperação?"
61020-63 = "Isso é, hum...#nQuer dizer, uma nota ruim não vai te causar uma expulsão, mas..."
61020-64 = "A gente ainda precisa tirar uma nota mínima na prova de recuperação."
61020-65 = "Dito isso...#nAs aulas de recuperação não devem passar do horário estipulado, pelo menos."
61020-66 = "Hehe. Basicamente, se for mal, a gente vai perder o nosso precioso tempo livre depois da aula."
61020-68 = "[ns]\"Vamos dar o nosso melhor pra não precisar de recuperação dessa vez!\""
61020-69 = "Auuh..."
61020-70 = "Hehe.#nSe só eu acabar pegando recuperação sozinha—"
61020-71 = "O Sensei poderia... ser o meu professor particular."
61020-72 = "Uma sala de aula vazia depois da escola. O céu cor de laranja.#nA brisa do entardecer entrando pela janela entreaberta. As cortinas balançando devagar..."
61020-73 = "Eu, com a cabeça nas nuvens, olhando pela janela.#nO Sensei se aproxima e sussurra: \"Preste atenção\"."
61020-74 = "Nesse exato momento, bate um vento...#nE na sala ficamos só eu e o Sensei... no nosso mundinho."
61020-80 = "Atrás das cortinas... a distância entre as nossas sombras vai diminuindo aos poucos—"
61020-81 = "A-Awaawaa!?"
61020-82 = "?"
61020-83 = "！？！？！！！！"
61020-84 = "PROIBIDO FALAR!!!!!"
61020-85 = "Ah, qual é~♡"
61020-90 = "[ns1]（Pensando bem...）\n[ns2]（Como será que as outras meninas tão lidando com isso...?）"
61020-94 = "[ns]\"A Vigilância Escolar vai continuar na ativa mesmo durante as provas?\""
61020-95 = "Com certeza! Não podemos negligenciar nem os estudos e nem a paz na cidade!"
61020-96 = "Dar conta dos dois é a força de vontade e a filosofia de ação da Vigilância!"
61020-97 = "...Né não, Suzumi-san!?"
61020-101 = "Er, não temos nenhuma filosofia mirabolante na Vigilância, mas..."
61020-102 = "Estudar é o dever de toda aluna, então a Reisa não tá de todo errada."
61020-103 = "Hã? Você se sente aliviado quando olha pra mim...?#nO que cê quer dizer com isso, Sensei...?"
61020-104 = "Eu não entendi muito bem... mas deve ser um elogio!"
61020-108 = "Eita!? Q-Que susto, eram só a Shimiko e o Sensei... Pensei que fosse gente de fora de novo...#nO-O que traz vocês aqui...?"
61020-109 = "O Sensei veio ver como a gente tá indo nos estudos.#nPresidente, você tá estudando direitinho?"
61020-110 = "Uma provinha dessas? Se for só Literatura, eu dou um jeito..."
61020-111 = "Mas dessa vez é um exame \"Geral\". Cai outras matérias também, não só Literatura."
61020-112 = "O-Os livros ensinam sobre tudo... então eu vou me virar de boa, acho..."
61020-114 = "Até em Matemática?"
61020-115 = "Urgh, ah...!"
61020-116 = "A senhora diz isso, Presidente, mas só lê o que tem vontade..."
61020-117 = "U-Uuh..."
61020-119 = "[ns]\"E a Shimiko, tá de boa em Matemática?\""
61020-120 = "Eu?#nAh... até que tô me virando."
61020-121 = "O conteúdo do primeiro ano não é lá essas coisas se comparar com o do terceiro.#nÉ só dar uma revisada no básico que tá tudo certo, nem precisa estudar tanto."
61020-122 = "...Que inveja."
61020-125 = "Ah, Sensei. E aí.#nHã? ...É, pois é. A gente ia estudar todo mundo junto, mas..."
61020-129 = "Ouçam com atenção, aventureiros!#nPara maximizar nosso aprendizado, é vital mantermos nossos cérebros a todo vapor!"
61020-130 = "Porém, nossos cérebros só aceitam um combustível de altíssima qualidade chamado \"glicose\"..."
61020-131 = "Portanto! Encher a cara de doces agora é, sem sombra de dúvida, o nosso dever!"
61020-132 = "Opa, até que a Natsu falou bonito agora!#nNão dá pra pensar direito sem um docinho no sangue, né."
61020-134 = "O clima tá assim desde que a gente começou..."
61020-135 = "D-Desculpe, Sensei. Você veio até aqui ver a gente e..."
61020-137 = "[ns]\"Fico até mais tranquilo vendo que vocês tão de boa como sempre.\""
61020-139 = "Não é porque estamos em semana de provas que vamos descuidar dos nossos deveres.#nEssa é a filosofia principal das Cavaleiras do Socorro."
61020-140 = "Na verdade, podemos dizer que a prova em si já é um ato de \"socorro\"!"
61020-141 = "[s]\"Er, o que você quer dizer com isso...?\""
61020-142 = "Tanto as provas quanto o socorro são ações que ajudam as pessoas."
61020-143 = "Se não perdermos essa essência de vista e formos sinceras nas nossas atitudes—#nO nosso \"espírito de socorro\" ficará evidente."
61020-144 = "Por exemplo, ajudar o próximo por bondade, sem esperar nada em troca—isso é socorro."
61020-145 = "Corrigir injustiças através de meios físicos—isso também é socorro."
61020-146 = "Punir corporações gananciosas que cortam gastos e produzem remédios porcarias só pelo lucro.#nIsso também é socorro."
61020-147 = "—Todos os caminhos levam ao socorro."
61020-148 = "Logo, as provas também são, sem sombra de dúvidas, socorro!"
61020-150 = "Hã? O que é socorro, você pergunta? Ahaha..."
61020-151 = "Acho que é... a filosofia mais importante pra nós das Cavaleiras do Socorro?"
61020-152 = "Ué? Falando nisso, por que as técnicas médicas exclusivas de Trinity#nnão caem na prova...?"
61020-153 = "E-Er... É que elas são, assim, bem inovadoras em vários sentidos... né...?"
61020-155 = "S-S-S-Sensei!?#nO-O que o senhor tá fazendo aqui...!?"
61020-156 = "V-Veio ver se tamo estudando...?#nI-I-Isso é... me deixa muito feliz, mas...!"
61020-157 = "Hihi... hyaha...!"
61020-158 = "...Tsurugi, dá uma segurada, por favor."
61020-159 = "A-Aah..."
61020-160 = "É-É... m-muito... obrigada, Sensei...#nP-Por se preocupar tanto com a gente..."
61020-162 = "[ns]\"Será que eu atrapalhei os estudos de vocês...?\""
61020-163 = "Imagina, não atrapalhou em nada.#nA gente já tava pensando em fazer uma pausa mesmo."
61020-164 = "Na verdade, de uns dias pra cá a gente não faz outra coisa além de estudar, tirando a hora de comer ou em missão."
61020-165 = "A gente do Comitê de Realização da Justiça raramente tem tempo livre pra gente mesmo..."
61020-170 = "Mas relaxa, não precisa se preocupar tanto com isso.#nA gente já trabalha sabendo muito bem como as coisas funcionam."
61020-171 = "Continuar firme com o próprio senso de justiça, não importa os perrengues—"
61020-172 = "Pra mim, essa é a verdadeira essência do Comitê de Realização da Justiça."
61020-173 = "Hehe, bem a sua cara falar isso, Mashiro!#n...Enfim, hora de voltar pros cadernos.#nAgora é a parte de... \"Relatividade da Moral e da Ética\"."
61020-174 = "...Ai, não consigo engolir isso.#nSe é relativo, quer dizer que as coisas podem mudar dependendo das circunstâncias, né?#nMas... isso não faz o menor sentido..."
61020-175 = "As coisas não são preto no branco desse jeito...#nMas se tiver difícil de entender, é só decorar tudo primeiro. A lógica você pega depois."
61020-177 = "...Sendo assim, decidimos nos reunir no auditório principal e dedicar um tempo para aprendermos juntas."
61020-178 = "[s3]\"Mas será que não tem umas meninas que preferem estudar sozinhas...?\"\n[s4]\"Por vergonha, ou por não conseguirem se concentrar...\""
61020-181 = "Que bobagem.#n\"Esforçar-se debaixo deste céu sem ter do que se envergonhar\" é justamente o lema da Irmandade."
61020-182 = "Além disso, qual seria o motivo para se envergonhar do ato de cumprir com o \"dever de um aluno\", que é estudar?"
61020-183 = "Eu confio nas nossas irmãs mais profundamente do que qualquer outra pessoa em Trinity."
61020-184 = "E, claro, já avisei que se alguma delas sentir hesitação ou ansiedade, nós daremos todo o suporte possível."
61020-185 = "Então, peço que elas fiquem \"à vontade\" para virem conversar comigo..."
61020-186 = "U-Uma conversa particular com a Sakurako-sama... é..."
61020-191 = "Sim, exatamente.#nIsso não seria também uma demonstração do amor que devemos espalhar pelo mundo?"
61020-193 = "Acho que até podemos enxergar por esse lado... mas..."
61020-195 = "（Depois disso, consegui convencer a Sakurako de alguma forma—）"
61020-196 = "（Chegamos num consenso: quem quisesse estudar em grupo ia pro auditório, e quem preferisse ficar sozinha ia estudar nos dormitórios.）"
61020-197 = "（A Hinata e a Mari suaram a camisa pra conseguir convencer ela...）"
61020-202 = "Ah, Sensei! Boa tarde!"
61020-203 = "As provas...?#nÉ claro que eu vou dar o meu melhor, né~"
61020-204 = "Que!? Você me paga um lanchão se eu for bem!?#nÉ sério? Já tá prometido, hein!"
61020-205 = "Bora lá então! Agora eu vou focar nessas provas pra valer!"
61020-206 = "Aposto que vai responder uma folha de exercício e capotar, que nem da outra vez."
61020-207 = "Mas você também dormiu junto naquele dia!"
61020-213 = "（Fiquei observando elas irem embora toda animadas, até que...）"
61020-214 = "（Duas estudantes se aproximaram de mansinho, espiando ao redor）"
61020-220 = "A-Ah... Sensei...?"
61020-221 = "O senhor teria um minutinho...?"
61020-224 = "Próximo Episódio; Dias de Sonho"