[translation]
10018100-1 = "第10話;運命の日"
10018100-9 = "視聴者の皆さん、こんにちは！"
10018100-10 = "今年一年、楽しく過ごせたでしょうか？#n新年を迎える準備はできましたか？"
10018100-11 = "クロノススクール報道部のアイドルリポーター！[ruby=かわる]川流[/ruby]シノンがお送りします！"
10018100-15 = "さて、この場所がどこかご存じでしょうか？"
10018100-16 = "もし、知らなくてもご安心を！"
10018100-18 = "私たち報道部も、ニュースを聞くまでは、よくある商店街だと思ってましたから！"
10018100-19 = "ところがですね……皆さん「ニャオモトフード」はご存知でしょうか？#n知らない方もいるかもしれないのでご説明しましょう！"
10018100-20 = "「ニャオモトフード」こと「ニャオフード」は、近年急速にキヴォトス全域で事業を拡大している食品会社です！"
10018100-21 = "今日、私たちはそのニャオフードが主催する「新春おせち対決」が行われるという情報を入手しました！"
10018100-22 = "拍手っ！パチパチパチ～！"
10018100-23 = "あっ、それとこの番組も「ニャオフード」の提供でお送りしています！#n特別なゲストもお招きしているので、ご紹介しましょう！"
10018100-24 = "「ニャオフード」の会長、ニャオモト・カンさんです！どうぞ～！"
10018100-31 = "ムッフフフ。皆さん、こんにちは。"
10018100-32 = "ニャオフードのニャオモト・カンです。#n本日はお集まりいただきありがとうございます。"
10018100-34 = "そして対する挑戦者の紹介です！"
10018100-35 = "ニャオフードのような大企業にも、味では決して負けません！"
10018100-36 = "そう、「スズメ亭」の女将です！"
10018100-42 = "こ、こんにちは……。どうぞよろしくお願いします。"
10018100-43 = "ルールは簡単です。ニャオフードとスズメ亭の女将は、"
10018100-44 = "それぞれ重箱100個分のおせちを作り、味を競い合うというものです。"
10018100-45 = "いよいよ今日が勝負の日ですが……いやいや、心配ですな。"
10018100-46 = "我々ニャオフードは最新の設備と豊富な従業員のおかげもあって、難なく用意できましたが……。"
10018100-47 = "手作業で調理を行うスズメ亭に、100個ものおせちを作れたのか心配ですねえ。"
10018100-49 = "挑戦者にまで気を使うとは、ニャオフードの会長は寛大なお心をお持ちですね！"
10018100-50 = "さあ、果たしてスズメ亭は100個ものおせちを用意できたのでしょうか？"
10018100-53 = "（ムッフフフ。できるわけなかろう）"
10018100-54 = "（妨害工作だってしているのだ。100個の重箱、およそ400人前のおせち料理を限られた時間で作れるものかね）"
10018100-55 = "（ああ、結果は見るまでもない。スズメ亭の女将がおせちを用意できずに恥をかき……）"
10018100-56 = "（そこで泣きつかれたところを寛大な心で許す私の姿が浮かぶ！）"
10018100-58 = "はい、お気遣いありがとうございます。"
10018100-59 = "おかげさまで無事に100個のおせちを用意できました。"
10018100-64 = "だにぃ！？"
10018100-66 = "おお、そうなんですね！ニャオフードのような機械がなくとも大量の料理を用意できるとは、流石は街で評判のスズメ亭です！"
10018100-67 = "今回はどのようにして大量のおせちを用意したのでしょうか！？"
10018100-68 = "本当にありがたいことに、手伝ってくださった方々がいるんです。"
10018100-69 = "ご紹介しますね。"
10018100-77 = "あ、こんにちは。ゲヘナ給食部の……[ruby=あいきよ]愛清[/ruby]フウカです。どうぞよろしくお願いします。"
10018100-78 = "ゲヘナ美食研究会の[ruby=くろだて]黒舘[/ruby]ハルナです。"
10018100-80 = "なんと！皆さん、注目してください！"
10018100-81 = "あのゲヘナの給食部と美食研究会です！"
10018100-82 = "この二つが手を取り合うなんて、何があったのでしょう！？#nこれは明日の天気は大荒れでしょうか！？"
10018100-83 = "スズメ亭が奮闘した裏には、このような協力関係があったということですね！"
10018100-84 = "私、川流シノン！ここで聞いていても本当のことなのか信じられません！"
10018100-86 = "（し、しかし……心配には及ばんな）"
10018100-87 = "（あれだけの量を短期間で、それも手作業で作るとなると味にバラつきが出るものだ）"
10018100-88 = "（全て機械に制御されて作られた我々の食品に敵うはずがないのだ）"
10018100-89 = "そろそろ実食の時間に移ります！"
10018100-90 = "今日は味には厳しいことで知られる商人会の皆さんの投票で勝負が決まります！"
10018100-94 = "あっ、私も頂いていいんですね？"
10018100-95 = "ありがとうございます！"
10018100-99 = "おせち料理か。久しぶりに食べるな……。"
10018100-100 = "おせちっておいしいんだけど、甘いものが多いし食べてると飽きるんだよね。"
10018100-101 = "そうだなぁ……。家で作るには手間がかかるし、労力に見合わなくてさ。"
10018100-108 = "待ってくれ、この味は……！？"
10018100-111 = "正直に言えば、私はおせちがあまり好きではないんだ。"
10018100-112 = "今の時代、いくらでもおいしい食べ物があるからね。でも重箱に詰められたおせちを見ると、お正月の気分になるよ。"
10018100-116 = "これがニャオフードのおせちか……"
10018100-121 = "もぐもぐ。まあ、こんなもんだよな。"
10018100-122 = "私はスズメ亭のほうから頂くとしよう。"
10018100-126 = "……ん？"
10018100-127 = "なあ、こっちも食べてみてくれ。"
10018100-129 = "実は私、きちんと重箱に入ったおせちは食べたことがないんです！これは楽しみですね！"
10018100-130 = "おぉ、ちょうど良かった。報道部に私たちの商人会の宣伝もお願いしたいのだが。"
10018100-131 = "私たちがここにいるだけで宣伝になるのではないでしょうか？"
10018100-132 = "そこに関しては、むしろ逆というか、なんというか……。"
10018100-137 = "あれ……おせちって甘いだけの具材が多いのかと思いましたが、こんなにも味わい深いんですね！"
10018100-138 = "感激しました！"
10018100-139 = "ほう……？"
10018100-140 = "それなら私もさっそく……。"
10018100-148 = "おおおおおおおおおおっ！？"
10018100-151 = "視聴者の皆さん、まだチャンネルはそのままですよ！"
10018100-152 = "ニャオフード主催で行われている新春おせち対決もいよいよクライマックス！"
10018100-153 = "いよいよ開票の時間です！"
10018100-158 = "（やれることはやった……後は結果を待つだけ）"
10018100-159 = "（結果を待つ必要などない。どう考えても私の勝利が揺らぐことはないのだ。ムッフフフ）"
10018100-164 = "これは！なんと、圧倒的な大差です！"
10018100-166 = "（勝利コメントを考えてこなかったな。まったく、勝ってしまうのも面倒なものだ）"
10018100-167 = "（適当に女将に優しい言葉をかけて……あとはイメージアップに謙虚な言葉を並べとけば……）"
10018100-168 = "（まあ、それはそれとして、約束は約束なのだがな）"
10018100-173 = "いったい誰が予想したでしょうか！"
10018100-174 = "勝ったのはスズメ亭です！"
10018100-176 = "そうか、そうか……ニャオフードが……"
10018100-180 = "だにぃ！？"
10018100-182 = "やりました！私たち、やりましたよ！！"
10018100-183 = "まさか……信じられません。"
10018100-184 = "皆さん、本当に本当にありがとうございます……！"
10018100-186 = "おい、こんなはずがない！何かの間違いだ！"
10018100-187 = "重箱100個だ、100個！人数換算なら400人前に相当する量だ！"
10018100-188 = "それだけの量をどうやっておいしく、一定の品質で作れるというのだ！"
10018100-189 = "我々の食品は全て機械に制御されて作られたというのに、どうして手作りのおせちに負けるというのだ！"
10018100-191 = "あまりにも考えが甘かったのではないでしょうか、会長？"
10018100-200 = "お、お前は！"
10018100-201 = "おせち料理はよく飽きると言いますよね。半分以上が甘い味付けの料理ですし。"
10018100-202 = "甘みの効用は、すぐ緩やかになるということです。"
10018100-203 = "ただでさえ甘さ一辺倒では飽きてしまうというのに、それを化学調味料で機械的に調理したのですから。"
10018100-204 = "少し味見すればお分かりでしょう？"
10018100-205 = "そ、それはお前たちも同じことだろう！"
10018100-207 = "いいえ、そこで後味に変化をつけようと考えました。"
10018100-208 = "ゴマやショウガ、糸切り唐辛子などを使って、単調な味に変化を加えるんです。"
10018100-209 = "それだけではありません。ニャオフードはコストカットのために質の低い食材を混ぜ、その分を化学調味料で補ったのでしょう？"
10018100-210 = "しかし、食材そのものが持つ品質は、どうやっても料理に出るものですから。"
10018100-212 = "それは食感や口当たりといったところに大きく関わりますわ！"
10018100-213 = "同じ椎茸を使っても、調理次第で味は大きく変わるのです！"
10018100-215 = "そもそもだな！"
10018100-216 = "どうやって400人分もの量をあれだけの時間で作れたというのだ！#n何か不正を働いたのではないか！？"
10018100-218 = "えっと……ジュリ？"
10018100-219 = "私たち給食部が一日に作る給食って、何人前くらいだっけ？"
10018100-220 = "4000人前です、先輩……。"
10018100-221 = "そうでした。私たちはそれを毎日のように作っていますから。"
10018100-222 = "加えて味に妥協は許さない私たち美食研究会が、砂糖ひとさじ、醤油一滴にまでこだわったのです。"
10018100-224 = "勝負が始まった時点で、私たちの勝利は決まったも同然でしたわ！"
10018100-229 = "本当に驚きの結果でしたね！"
10018100-230 = "それに加えて勝利の秘訣もお話いただきました！"
10018100-231 = "現場は熱く盛り上がっています！"
10018100-235 = "ええいっ、認めるものか！そんな結果がどうした！"
10018100-236 = "か、会長！？"
10018100-241 = "グルメヘルメット団！ニャオフード予備隊！行け、生意気なあいつらを懲らしめてやれ！"
10018100-248 = "結局、戦うことになるのか。"
10018100-254 = "これも仕事だから、あまり恨むなよ。"
10018100-259 = "恨むな、なんて……"
10018100-260 = "私たちに勝てると思っているのですか？"
10018100-261 = "あら★また面白いことになりましたね。"
10018100-262 = "あのおじさんを見たときから、こうなる気がしてたけどね。"
10018100-263 = "わあ、ここは私たちに任せてよ！"
10018100-265 = "なんとなんと！現場では新たな盛り上がりも見せています！"
10018100-266 = "ニャオフード、そしてキヴォトス最悪のテロリストとも呼ばれる美食研究会の対決です！"
10018100-267 = "現場から引き続き生放送でお送りします！"
10018100-268 = "チャンネルはそのままご覧ください！"
