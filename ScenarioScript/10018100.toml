[translation]
10018100-1 = "Episódio 10: O Dia do Destino"
10018100-9 = "Olá, espectadores!"
10018100-10 = "Como foi o ano de vocês?#nJá estão prontos para receber o Ano Novo?"
10018100-11 = "Aqui é a Shinon Kawaru, a repórter ídolo do Departamento de Imprensa da Chronos!"
10018100-15 = "Bem, vocês sabem onde estamos?"
10018100-16 = "Se não sabem, não se preocupem!"
10018100-18 = "Nós do Departamento de Imprensa também achávamos que era apenas uma rua comercial comum até ouvirmos a notícia!"
10018100-19 = "Mas vejam só... vocês conhecem a \"Nyaomoto Food\"?#nComo alguns podem não conhecer, vou explicar!"
10018100-20 = "A \"Nyaomoto Food\", ou \"Nyao Food\", é uma empresa alimentícia que tem expandido seus negócios rapidamente por todo o Kivotos nos últimos anos!"
10018100-21 = "Hoje, recebemos a informação de que o \"Duelo de Osechi de Ano Novo\", organizado pela Nyao Food, vai acontecer!"
10018100-22 = "Aplausos! Clap, clap, clap!"
10018100-23 = "Ah, e este programa também é oferecido pela \"Nyao Food\"!#nConvidamos um convidado especial, então vamos apresentá-lo!"
10018100-24 = "O presidente da \"Nyao Food\", Sr. Nyaomoto Kan! Por favor, venha!"
10018100-31 = "Mufufufu. Olá a todos."
10018100-32 = "Sou Nyaomoto Kan, da Nyao Food.#nObrigado por se reunirem aqui hoje."
10018100-34 = "E agora, a apresentação do desafiante!"
10018100-35 = "Mesmo contra uma grande empresa como a Nyao Food, não perderemos no sabor!"
10018100-36 = "Isso mesmo, a proprietária do \"Suzume-tei\"!"
10018100-42 = "O-olá... Prazer em conhecê-los."
10018100-43 = "As regras são simples. A Nyao Food e a proprietária do Suzume-tei,"
10018100-44 = "devem preparar 100 caixas de Osechi cada e competir pelo sabor."
10018100-45 = "Finalmente chegou o dia da competição, mas... bem, estou preocupado."
10018100-46 = "Nós da Nyao Food conseguimos preparar tudo sem problemas graças aos nossos equipamentos de ponta e funcionários abundantes..."
10018100-47 = "Fico preocupado se o Suzume-tei, que prepara tudo manualmente, conseguiu fazer 100 caixas de Osechi."
10018100-49 = "Preocupar-se até com o desafiante, o presidente da Nyao Food tem um coração generoso!"
10018100-50 = "Bem, será que o Suzume-tei conseguiu preparar as 100 caixas de Osechi?"
10018100-53 = "(Mufufufu. Impossível que tenham conseguido.)"
10018100-54 = "(Até fiz sabotagem. Como poderiam fazer 100 caixas, cerca de 400 porções de Osechi, em um tempo limitado?)"
10018100-55 = "(Ah, o resultado é óbvio. A proprietária do Suzume-tei vai passar vergonha por não conseguir preparar o Osechi...)"
10018100-56 = "(E então, quando ela vier chorando pedir ajuda, eu a perdoarei com meu coração generoso!)"
10018100-58 = "Sim, obrigada pela preocupação."
10018100-59 = "Graças a Deus, conseguimos preparar as 100 caixas de Osechi sem problemas."
10018100-64 = "O quê!?"
10018100-66 = "Oh, é mesmo! Conseguir preparar uma grande quantidade de comida sem as máquinas da Nyao Food, como esperado do famoso Suzume-tei!"
10018100-67 = "Como vocês conseguiram preparar tanto Osechi desta vez!?"
10018100-68 = "Sou muito grata, pois houve pessoas que nos ajudaram."
10018100-69 = "Vou apresentá-las."
10018100-77 = "Ah, olá. Sou Fuuka Akiyo, do Departamento de Merenda de Gehenna. Prazer em conhecê-los."
10018100-78 = "Sou Haruna Kurodate, do Clube de Pesquisa Gourmet de Gehenna."
10018100-80 = "Incrível! Todos, prestem atenção!"
10018100-81 = "São o Departamento de Merenda e o Clube de Pesquisa Gourmet de Gehenna!"
10018100-82 = "O que aconteceu para esses dois se unirem!?#nSerá que o tempo vai virar amanhã!?"
10018100-83 = "Então, por trás do esforço do Suzume-tei, havia essa relação de cooperação!"
10018100-84 = "Eu, Shinon Kawaru, não consigo acreditar mesmo ouvindo aqui agora!"
10018100-86 = "(M-mas... não há com o que se preocupar.)"
10018100-87 = "(Preparar aquela quantidade em pouco tempo e manualmente, o sabor certamente será inconsistente.)"
10018100-88 = "(Não há como vencer nossos produtos, que são todos controlados por máquinas.)"
10018100-89 = "Está na hora de começar a degustação!"
10018100-90 = "Hoje, a vitória será decidida pelos votos da Associação de Comerciantes, conhecidos por serem rigorosos com o sabor!"
10018100-94 = "Ah, eu também posso provar?"
10018100-95 = "Muito obrigado!"
10018100-99 = "Osechi, é? Faz tempo que não como isso..."
10018100-100 = "Osechi é gostoso, mas tem muita coisa doce e a gente acaba enjoando depois de um tempo."
10018100-101 = "Pois é... Dá muito trabalho fazer em casa e não compensa o esforço."
10018100-108 = "Espere um pouco, esse sabor é...!?"
10018100-111 = "Para ser sincera, eu não gosto muito de osechi."
10018100-112 = "Hoje em dia, existem tantas comidas gostosas por aí. Mas, quando vejo o osechi arrumado na caixa, sinto que o Ano Novo chegou."
10018100-116 = "Então este é o osechi da Nyao Food..."
10018100-121 = "Mastiga, mastiga. Bem, é o que se espera."
10018100-122 = "Acho que vou aceitar o do Suzume-tei."
10018100-126 = "...Hm?"
10018100-127 = "Ei, experimente este aqui também."
10018100-129 = "Na verdade, eu nunca comi um osechi servido em uma caixa tradicional! Estou muito animada!"
10018100-130 = "Ah, que bom. Eu gostaria de pedir ao departamento de imprensa para divulgar nossa associação comercial também."
10018100-131 = "Só de estarmos aqui, isso já não serve como propaganda?"
10018100-132 = "Sobre isso, é, na verdade, o contrário, ou melhor dizendo..."
10018100-137 = "Ué... eu achava que o osechi era composto apenas por ingredientes doces, mas é tão saboroso!"
10018100-138 = "Estou impressionada!"
10018100-139 = "Ora...?"
10018100-140 = "Nesse caso, eu também vou experimentar..."
10018100-148 = "Ooooooooooh!?"
10018100-151 = "Espectadores, não mudem de canal!"
10018100-152 = "O confronto de osechi de Ano Novo, organizado pela Nyao Food, está chegando ao clímax!"
10018100-153 = "Chegou a hora da contagem dos votos!"
10018100-158 = "(Fiz o que pude... agora é só esperar o resultado.)"
10018100-159 = "(Não preciso esperar. Não há como minha vitória ser abalada. Mufufufu.)"
10018100-164 = "Isso é incrível! Uma diferença esmagadora!"
10018100-166 = "(Não pensei em um discurso de vitória. Francamente, até vencer dá trabalho.)"
10018100-167 = "(Vou dizer algumas palavras gentis para a dona do restaurante... e depois usar um discurso humilde para melhorar minha imagem...)"
10018100-168 = "(Bem, deixando isso de lado, promessa é promessa.)"
10018100-173 = "Quem poderia imaginar!"
10018100-174 = "O vencedor é o Suzume-tei!"
10018100-176 = "Não pode ser... A Nyao Food..."
10018100-180 = "O quê!?"
10018100-182 = "Conseguimos! Nós conseguimos!!"
10018100-183 = "Não acredito... é inacreditável."
10018100-184 = "Pessoal, muito, muito obrigada...!"
10018100-186 = "Ei, isso não é possível! Deve haver algum erro!"
10018100-187 = "Eram 100 caixas! Isso equivale a 400 porções!"
10018100-188 = "Como é possível fazer tudo isso com tanta qualidade e sabor?!"
10018100-189 = "Nossos alimentos são todos controlados por máquinas, como podemos perder para um osechi feito à mão?!"
10018100-191 = "Sua visão não foi um pouco simplista demais, presidente?"
10018100-200 = "V-você!"
10018100-201 = "Dizem que as pessoas enjoam fácil de osechi, não é? Afinal, mais da metade dos pratos são doces."
10018100-202 = "O efeito do açúcar no paladar passa muito rápido."
10018100-203 = "Já é fácil enjoar de algo puramente doce, e vocês ainda prepararam tudo mecanicamente com temperos químicos."
10018100-204 = "Se provar um pouco, você entenderá, não é?"
10018100-205 = "I-isso vale para vocês também!"
10018100-207 = "Não, nós pensamos em como variar o sabor residual."
10018100-208 = "Usamos gergelim, gengibre, pimenta fatiada e outros ingredientes para quebrar a monotonia do sabor."
10018100-209 = "Não é só isso. A Nyaofood misturou ingredientes de baixa qualidade para cortar custos e compensou com temperos químicos, não foi?"
10018100-210 = "No entanto, a qualidade inerente dos ingredientes sempre acaba transparecendo na comida."
10018100-212 = "Isso afeta muito a textura e a sensação na boca!"
10018100-213 = "Mesmo usando o mesmo cogumelo shiitake, o sabor muda drasticamente dependendo do preparo!"
10018100-215 = "Além disso!"
10018100-216 = "Como vocês conseguiram preparar uma quantidade para 400 pessoas em tão pouco tempo!? Vocês não trapacearam, não é!?"
10018100-218 = "Err... Juri?"
10018100-219 = "Quantas refeições nós do Clube de Merenda preparamos por dia mesmo?"
10018100-220 = "4000 refeições, senpai..."
10018100-221 = "Ah, é verdade. Nós fazemos isso quase todos os dias."
10018100-222 = "Além disso, nós do Clube de Pesquisa Gastronômica, que não aceitamos compromissos com o sabor, fomos minuciosas até na última colher de açúcar e gota de molho de soja."
10018100-224 = "No momento em que a competição começou, nossa vitória já estava praticamente garantida!"
10018100-229 = "Foi um resultado realmente surpreendente!"
10018100-230 = "E elas ainda nos contaram o segredo da vitória!"
10018100-231 = "O local está pegando fogo!"
10018100-235 = "Droga, eu não aceito isso! E daí que o resultado foi esse!"
10018100-236 = "P-Presidente!?"
10018100-241 = "Grupo Gourmet de Capacetes! Reserva da Nyaofood! Vão, ensinem uma lição para esses insolentes!"
10018100-248 = "No fim, vamos ter que lutar mesmo."
10018100-254 = "Isso também é trabalho, então não nos culpem."
10018100-259 = "Não nos culpem, diz ele..."
10018100-260 = "Vocês realmente acham que podem nos vencer?"
10018100-261 = "Ora, ora★ As coisas ficaram interessantes de novo."
10018100-262 = "Eu já sentia que isso ia acontecer desde que vi aquele tiozinho."
10018100-263 = "Uau, deixem isso com a gente!"
10018100-265 = "Inacreditável! O local está vivenciando uma nova onda de agitação!"
10018100-266 = "É o confronto entre a Nyaofood e o Clube de Pesquisa Gastronômica, também conhecidas como as piores terroristas de Kivotos!"
10018100-267 = "Continuaremos transmitindo ao vivo do local!"
10018100-268 = "Não mudem de canal!"
