[translation]
90001150-1 = "第15話;雪合戦"
90001150-7 = "……以上が、これまでの状況です。"
90001150-8 = "何か質問はありますか？"
90001150-10 = "えっと、ハッカージョーク……とかじゃないよね？"
90001150-11 = "お姉ちゃん……。"
90001150-13 = "現実味がないのはとても分かりますが……。"
90001150-15 = "――これが事実よ。"
90001150-16 = "いま、私たちが直面している問題はあの時と同じ。"
90001150-17 = "多次元バリアを解除しなければ、全てが始まらない。"
90001150-22 = "[ns1] \"だから、みんなを呼んだんだ。\"\n[ns2] \"ごめんね。\""
90001150-25 = "[ns3] \"どうか、力を貸してほしいんだ。\"\n[ns4] \"このお礼は、いつか必ず。\""
90001150-30 = "仕方ないなぁ！#nそこまで先生に言われたら、やらないわけにはいかないよね！"
90001150-31 = "そ、そうですよ！#nそれに……そんなに頭を下げないでください！"
90001150-33 = "そ、そうするしかないんですよね……。"
90001150-35 = "……はい、理解しました。#nアリスのやるべきことも。"
90001150-44 = "アリスは、先生のためなら何でもします。"
90001150-45 = "ただ……。"
90001150-46 = "[s] \"ただ……？\""
90001150-51 = "いえ、大丈夫です。#n魔法も奇跡もありますから、きっと……。"
90001150-52 = "アリス……？"
90001150-53 = "……でも、アリスだけではダメです。足りません。"
90001150-58 = "どういうことでしょうか？"
90001150-59 = "あの日、アリスは「祝福された」光の剣を持ち上げました。"
90001150-60 = "ですが……。"
90001150-61 = "あれはアリスだけの力ではありません。"
90001150-66 = "――ケイが必要です。"
90001150-68 = "……？"
90001150-73 = "あっ！"
90001150-74 = "もしかして、あの時もケイちゃんがアリスちゃんのお願いを……？"
90001150-76 = "はい、ケイが手伝ってくれました。#nだから、祝福された光の剣を持ち上げられたのです。"
90001150-77 = "……。"
90001150-78 = "……どうしてアリスだけが残され、ケイがいなくなったのかは分かりません。"
90001150-79 = "ただ、同じように魔王の城を攻略するためにはケイの手助けが必要不可欠です。"
90001150-80 = "[s] \"でも、ケイは……。\""
90001150-81 = "……振り出しに戻ったわね。"
90001150-82 = "せめて、ケイに関する手がかりがあれば手が打てるのだけれども……。"
90001150-84 = "……部長。"
90001150-89 = "ええ、分かっております。"
90001150-91 = "お話しても、よろしいでしょうか？"
90001150-93 = "これは……研究倫理の問題です。"
90001150-94 = "ですが……そうですね。#n存在するものを、なかったことにはできませんから。"
90001150-95 = "……そうだね。"
90001150-100 = "分かりました、ヒマリ部長に従います。"
90001150-105 = "リオ。#n手がかりなら残っています。"
90001150-110 = "……どこに？"
90001150-111 = "ウトナピシュティムの[ruby=もとぶね]本船[/ruby]で、アトラ・ハシースの箱舟に突入したあの日――"
90001150-118 = "なるほど……アリスのキーホルダーにケイを移植した、と。"
90001150-120 = "……。"
90001150-121 = "「Kei」という名のセーブデータをUSBに移した――ただ、それだけです。"
90001150-122 = "あのデータはわずか2キロバイトでした。#nそもそもケイかどうかも分かりません。"
90001150-123 = "……それは本当に、自然発生したデータだったのかしら？"
90001150-129 = "リオ先輩？"
90001150-131 = "一体何を言っているのですか？"
90001150-132 = "……。"
90001150-133 = "糸口が掴めたわ。"
90001150-134 = "！？"
90001150-136 = "本当ですか！？"
90001150-137 = "[s] \"詳細を教えてもらえるかな。\""
90001150-140 = "私の推測が正しければ、そのデータ――"
90001150-141 = "2キロバイトのファイルが突破口になってくれるわ。"
90001150-142 = "ビット単位まで分析しましたが、中身は……。"
90001150-143 = "ええ、そうでしょうね。#n「一般的な技術」では解析できないもの。"
90001150-144 = "それで……どうアプローチするつもりなのです？"
90001150-145 = "それは――"
90001150-147 = "……ケイにもう一度会えるんですか！？"
90001150-152 = "落ち着いてください、アリス。#nまだ決まったわけでは……。"
90001150-153 = "リオ先輩、アリスは何をすれば良いですか？"
90001150-159 = "……ごめんなさい、少し先走ってしまったわね。#n実際のところ、確率で言えば、半々。"
90001150-160 = "いえ、それよりも低いかもしれない。#n一か八かの賭けのようなものよ。"
90001150-161 = "それに……失敗したら、残されていた2キロバイトのデータさえも消えてしまうかもしれない。"
90001150-163 = "それは……！"
90001150-165 = "アリス……。"
90001150-166 = "アリスちゃん……。"
90001150-167 = "……。"
90001150-169 = "今度こそ、ケイを失うかもしれないのですね……？"
90001150-170 = "……。"
90001150-171 = "責任が重たいかもしれないけれど……。"
90001150-172 = "貴女の選択に委ねられているわ。"
90001150-173 = "アリスは、ケイと……。"
90001150-179 = "（アリスと目線を合わせた）"
90001150-180 = "[ns] \"アリスはどうしたい？\""
90001150-184 = "アリスは……。"
90001150-185 = "でも、ケイのことを勝手に決めるのは……。"
90001150-186 = "[s] \"私たちには決められないけど……。\""
90001150-188 = "[ns5] \"他の誰でもない、アリスには……。\"\n[ns6] \"……その権利があると思うよ。\""
90001150-191 = "……！"
90001150-192 = "アリスは……。"
90001150-193 = "……アリスは、やっぱり。"
90001150-200 = "ケイに、会いたいです。"
90001150-203 = "もう一度、会いたいです。"
90001150-204 = "ケイならどうするか考えてみましたが……。"
90001150-205 = "見習い勇者のアリスには、よく分かりませんでした。"
90001150-206 = "もしかしたら、このまま放っておいてほしいのかもしれません。"
90001150-213 = "でも、アリスが残されたのは、きっと偶然じゃないと思います。"
90001150-214 = "だから……アリスが、決めます。"
90001150-218 = "ケイと、またお話がしたいです。"
90001150-219 = "今度は仲間として、友達として……一緒に過ごしたいです。"
90001150-220 = "ケイに何を言われたって構いません。"
90001150-221 = "……たとえ、永遠に失ってしまったとしても。#n絶対、リオ先輩のせいにはしません。"
90001150-222 = "アリスは、勇者失格です。"
90001150-223 = "自分勝手な都合でケイを振り回しています。#nリオ先輩にも、辛いことをお願いしています。"
90001150-224 = "……ごめんなさい、リオ先輩。"
90001150-226 = "いえ、私は……。"
90001150-228 = "先生、ごめんなさい。#nアリスは勇者になりたいと言いながら、こんなにも欲張りで……。"
90001150-229 = "[s] \"……。\""
90001150-230 = "それでも……。"
90001150-231 = "アリスは……。"
90001150-236 = "……。"
90001150-238 = "ケイを、お願いします。"
90001150-239 = "……！"
90001150-240 = "ええ、分かりました。#n可愛い後輩の頼みを断るわけにはいきません。"
90001150-241 = "すぐに始めましょう、リオ。#n「全知」の超天才病弱美少女の手を借りておいて、失敗なんて許しません。"
90001150-243 = "さっきも言った通り、成功確率は……。"
90001150-248 = "絶対に成功させます。#nできないとは言わせませんよ？"
90001150-252 = "……そうね。今は可能性の話をしている場合じゃなかったわ。"
90001150-254 = "アリスも……お手伝いしてもいいですか？"
90001150-259 = "アリス？"
90001150-260 = "急にどうしたのですか？"
90001150-261 = "残念だけれど……これはとても危険な工程なの。"
90001150-262 = "貴女を巻き込むわけには……。"
90001150-264 = "それでも、アリスは……。"
90001150-269 = "（ヒマリが突然、目配せをしてきた）"
90001150-270 = "（意図が分からなかったが、視線を追う内に察した）"
90001150-276 = "[ns] \"アリス、ゲーム開発部のみんな。\""
90001150-278 = "は、はい……？"
90001150-279 = "なんですか、先生？"
90001150-283 = "[ns] \"外で一緒に雪合戦でもしない？\""
90001150-285 = "えっ……今からですか？"
90001150-291 = "……良いよ、先生！"
90001150-292 = "それじゃ、私とアリスは先に行ってるね！"
90001150-297 = "お姉ちゃん、急にどうしたの！？"
90001150-298 = "も、モモイ？#nアリスはそんなことをしている場合では……！"
90001150-304 = "モモイ……待って！"
90001150-305 = "ありがとうございます、先生。"
90001150-306 = "[s] \"これくらい、いつでも任せて。\""
90001150-308 = "風邪にはお気をつけください。#nまあ、発熱した際には一日中おそばで看病しますが。"
90001150-309 = "……うん、悪くありませんね。"
90001150-310 = "どっちなの……。"
90001150-311 = "私にもよく分かりません。"
90001150-312 = "うーん……。"
90001150-318 = "[ns] \"おっ！やってるね！\""
90001150-326 = "ほら、次行くよ！ミドリ！"
90001150-327 = "冷たっ……もう、負けないから！"
90001150-330 = "モモイ、ミドリ……。"
90001150-331 = "どうして急に……？#nアリスは、まだ……。"
90001150-332 = "[s] \"アリス、大丈夫？\""
90001150-336 = "よく、分かりません。#nこういう時間も大切ですが、今は……。"
90001150-337 = "……ケイを。"
90001150-338 = "[s] \"今だからこそ、じゃないかな。\""
90001150-342 = "どういう意味ですか、先生？"
90001150-343 = "[s] \"ケイにも、こういう楽しい姿を見せたくない？\""
90001150-344 = "……。"
90001150-355 = "……そうですね。"
90001150-359 = "こんなに雪がいっぱいの場所があるなんて、思いもしませんでした。#nあれはペンギンでしょうか？"
90001150-360 = "モモイは氷河に着いたらすぐに凍ってしまうと言っていましたが、実際は全然違いました。"
90001150-361 = "ここも……素敵な場所です。"
90001150-362 = "[s7] \"それを伝えるためには……。\"\n[s8] \"アリスが楽しんでる姿を見せるのが良いんじゃないかな？\""
90001150-365 = "[ns] \"それに、必ず戻ってくるってアリスは信じてるよね。\""
90001150-369 = "ケイは、必ず……。"
90001150-373 = "……。"
90001150-374 = "そうですね、先生。#nアリスが間違っていました！"
90001150-375 = "世界がどれだけ素敵なのか伝えるためには……。"
90001150-376 = "まずは、アリスが詳しくないといけません！#nだから……。"
90001150-385 = "わあっ！？"
90001150-387 = "ミドリの雪玉が、アリスちゃんに……！"
90001150-393 = "アリス、分かりました。#nこれはモモイを狙うように見せかけて、アリスを攻撃する作戦ですね！"
90001150-399 = "アリスも負けませんよ！"
90001150-407 = "ぷわあっ！？"
90001150-408 = "あはは！今のめっちゃ面白……うぉわ！"
90001150-417 = "今度はアリスちゃんの雪玉がモモイに……。"
90001150-418 = "お！アリスもやる気になったんだね！？"
90001150-420 = "今のアリスは無敵モードです！#n手加減しませんよ！"
90001150-438 = "気づかれないように後ろを狙って……。"
90001150-444 = "[ns] \"じゃあ、私も参戦するよ！\""
90001150-450 = "うにゃっ！？！？"
90001150-451 = "きゃあっ！？！？"
90001150-452 = "うわっ！？！？"
90001150-456 = "ひ、ひぃっ！？#n先生……！？"
90001150-457 = "[ns9] \"みんな、油断したね！\"\n[ns10] \"この戦場において……！\"\n[ns11] \"よそ見なんて命取りだよ！\""
90001150-465 = "よーし、絶対負けないんだから！"
90001150-466 = "同じ手は何度もくらいません。#n先生、覚悟はできてますね？"
90001150-467 = "アリス、知っています！#nこれは「万人の万人に対する闘争」です！"
90001150-474 = "そうですね……この戦いの間は、全員敵です……！"
90001150-483 = "[ns] \"くっ、やられてたまるか！\""
90001150-484 = "わははは！"
90001150-485 = "私を捕まえてみてください、先生！"
90001150-487 = "連続技は回数を当てることが大事だと教わりました！"
90001150-493 = "わたしも少し、本気を出します……！"
90001150-499 = "（その後も、真剣な雪合戦は続いた）"
90001150-503 = "（あの時の私たちには、そういう時間が必要だった）"
90001150-507 = "（ゲーム開発部のみんなが楽しく遊んでいる様子を眺めながら）"
90001150-509 = "（バレないよう、こっそりベースに戻った）"
90001150-515 = "おかえりなさい、先生。#nまずは雪を落としましょう。#nお手伝いします。"
90001150-516 = "良いところに来たね、先生。#nちょうどストレージが揃ったところだよ。"
90001150-517 = "できるだけ多くの容量が必要だとリオ様が仰っていたので……。"
90001150-518 = "エイミと手分けして、使えそうなストレージを探していました。"
90001150-519 = "[s] \"じゃあ、これから……。\""
90001150-520 = "うん。"
90001150-521 = "先生も一緒に、ケイの復活を見守ってて。"
90001150-523 = "次回;呼ぶ声"
