[translation]
90001150-1 = "Episódio 15; Guerra de Bolas de Neve"
90001150-7 = "……Essa é a situação até o momento."
90001150-8 = "Alguma pergunta?"
90001150-10 = "Ei, isso não é... tipo uma piada de hacker, né?"
90001150-11 = "Irmãzinha……."
90001150-13 = "Eu entendo perfeitamente que parece irreal, mas……."
90001150-15 = "――Isso é um fato."
90001150-16 = "O problema que enfrentamos agora é o mesmo daquela época."
90001150-17 = "Se não desativarmos a barreira multidimensional, nada poderá começar."
90001150-22 = "[ns1] \"Por isso chamei todos vocês.\"\n[ns2] \"Me desculpem.\""
90001150-25 = "[ns3] \"Por favor, preciso da ajuda de vocês.\"\n[ns4] \"Eu retribuirei esse favor algum dia, eu prometo.\""
90001150-30 = "Não tem jeito!#nSe o Sensei pediu desse jeito, não tem como a gente recusar!"
90001150-31 = "I-isso mesmo!#nAlém disso…… por favor, não abaixe a cabeça desse jeito!"
90001150-33 = "É, não temos outra escolha, né……."
90001150-35 = "……Sim, eu entendo.#nO que a Alice precisa fazer também."
90001150-44 = "A Alice fará qualquer coisa pelo Sensei."
90001150-45 = "Só que……."
90001150-46 = "[s] \"Só que……?\""
90001150-51 = "Não, está tudo bem.#nComo existem magia e milagres, com certeza……."
90001150-52 = "Alice……?"
90001150-53 = "……Mas, só a Alice não é o suficiente. Falta algo."
90001150-58 = "O que você quer dizer com isso?"
90001150-59 = "Naquele dia, a Alice levantou a espada de luz \"abençoada\"."
90001150-60 = "Porém……."
90001150-61 = "Aquilo não foi apenas com a força da Alice."
90001150-66 = "――A Kei é necessária."
90001150-68 = "……?"
90001150-73 = "Ah!"
90001150-74 = "Será que, naquela época, a Kei-chan também atendeu ao pedido da Alice-chan……?"
90001150-76 = "Sim, a Kei me ajudou.#nPor isso, consegui levantar a espada de luz abençoada."
90001150-77 = "……."
90001150-78 = "……Eu não sei por que apenas a Alice foi deixada para trás e a Kei desapareceu."
90001150-79 = "Mas, para conquistar o castelo do Rei Demônio da mesma forma, a ajuda da Kei é indispensável."
90001150-80 = "[s] \"Mas, a Kei…….\""
90001150-81 = "……Voltamos à estaca zero, então."
90001150-82 = "Se pelo menos tivéssemos alguma pista sobre a Kei, poderíamos fazer algo……."
90001150-84 = "……Chefe."
90001150-89 = "Sim, eu entendo."
90001150-91 = "Posso falar sobre isso?"
90001150-93 = "Isso é…… uma questão de ética de pesquisa."
90001150-94 = "Mas…… bem.#nNão podemos fingir que algo que existe não existe."
90001150-95 = "……É verdade."
90001150-100 = "Entendido, seguirei a Chefe Himari."
90001150-105 = "Rio.#nSe for uma pista, ela ainda existe."
90001150-110 = "……Onde?"
90001150-111 = "Naquele dia, quando invadimos a Arca de Atra-Hasis com a nave principal de Utnapishtim――"
90001150-118 = "Entendo…… você transferiu a Kei para o chaveiro da Alice."
90001150-120 = "……."
90001150-121 = "Eu apenas movi um arquivo de salvamento chamado \"Kei\" para um USB―― foi só isso."
90001150-122 = "Aquele dado tinha apenas 2 kilobytes.#nNem sei se é realmente a Kei."
90001150-123 = "……Será que esses dados realmente surgiram de forma natural?"
90001150-129 = "Rio-senpai?"
90001150-131 = "Do que exatamente você está falando?"
90001150-132 = "……."
90001150-133 = "Eu encontrei uma pista."
90001150-134 = "!?"
90001150-136 = "É verdade!?"
90001150-137 = "[s] \"Pode nos dar os detalhes?\""
90001150-140 = "Se a minha suposição estiver correta, esses dados..."
90001150-141 = "Esse arquivo de 2 kilobytes será a nossa chave."
90001150-142 = "Eu analisei até o nível de bits, mas o conteúdo é……."
90001150-143 = "Sim, imagino que seja. #nÉ algo que não pode ser analisado com \"tecnologia convencional\"."
90001150-144 = "Então... como você pretende abordar isso?"
90001150-145 = "É que..."
90001150-147 = "……Eu poderei encontrar a Kei de novo!?"
90001150-152 = "Acalme-se, Alice. #nAinda não é algo garantido……."
90001150-153 = "Rio-senpai, o que a Alice deve fazer?"
90001150-159 = "……Desculpe, eu me adiantei um pouco. #nNa verdade, falando em probabilidades, é cinquenta por cento."
90001150-160 = "Não, talvez seja até menos que isso. #nÉ como uma aposta de tudo ou nada."
90001150-161 = "Além disso... se falharmos, até mesmo esses 2 kilobytes de dados que restaram podem desaparecer."
90001150-163 = "Isso é……!"
90001150-165 = "Alice……."
90001150-166 = "Alice-chan……."
90001150-167 = "……."
90001150-169 = "Desta vez, podemos acabar perdendo a Kei para sempre……?"
90001150-170 = "……."
90001150-171 = "Pode ser um peso enorme de carregar, mas……."
90001150-172 = "A decisão está nas suas mãos."
90001150-173 = "A Alice quer, com a Kei……."
90001150-179 = "(Olha nos olhos da Alice)"
90001150-180 = "[ns] \"O que você quer fazer, Alice?\""
90001150-184 = "A Alice……."
90001150-185 = "Mas, decidir isso pela Kei é……."
90001150-186 = "[s] \"Nós não podemos decidir por ela, mas…….\""
90001150-188 = "[ns5] \"Mais do que ninguém, Alice...\"\n[ns6] \"...eu acho que você tem esse direito.\""
90001150-191 = "……!"
90001150-192 = "A Alice……."
90001150-193 = "……A Alice, no fim das contas."
90001150-200 = "Eu quero encontrar a Kei."
90001150-203 = "Quero encontrá-la mais uma vez."
90001150-204 = "Tentei pensar no que a Kei faria, mas……."
90001150-205 = "Como uma heroína aprendiz, a Alice não conseguiu entender bem."
90001150-206 = "Talvez ela queira que a deixem em paz como está agora."
90001150-213 = "Mas eu não acho que foi coincidência a Alice ter sido a que restou."
90001150-214 = "Por isso... a Alice vai decidir."
90001150-218 = "Eu quero conversar com a Kei de novo."
90001150-219 = "Desta vez como companheiras, como amigas... quero passar o tempo com ela."
90001150-220 = "Não me importa o que a Kei disser."
90001150-221 = "……Mesmo que eu a perca para sempre. #nEu nunca vou culpar a Rio-senpai por isso."
90001150-222 = "A Alice é uma heroína fracassada."
90001150-223 = "Estou sobrecarregando a Kei por conveniência própria. #nTambém estou pedindo algo muito difícil para a Rio-senpai."
90001150-224 = "……Desculpe, Rio-senpai."
90001150-226 = "Não, eu……."
90001150-228 = "Sensei, me desculpe. #nAlice diz que quer ser uma heroína, mas estou sendo tão gananciosa……."
90001150-229 = "[s] \"…….\""
90001150-230 = "Mesmo assim……."
90001150-231 = "Alice……."
90001150-236 = "……."
90001150-238 = "Por favor, cuide da Kei."
90001150-239 = "……！"
90001150-240 = "Sim, eu entendi. #nNão posso recusar o pedido de uma kouhai tão adorável."
90001150-241 = "Vamos começar logo, Rio. #nNão vou permitir falhas depois de pedir ajuda à super gênio, onisciente e frágil garota."
90001150-243 = "Como eu disse antes, a probabilidade de sucesso é……."
90001150-248 = "Nós vamos conseguir. #nNão me diga que não é possível, entendeu?"
90001150-252 = "……É verdade. Agora não é hora de ficar falando sobre probabilidades."
90001150-254 = "Alice também…… posso ajudar?"
90001150-259 = "Alice?"
90001150-260 = "Por que de repente?"
90001150-261 = "Sinto muito, mas…… este é um processo muito perigoso."
90001150-262 = "Não posso deixar você se envolver……."
90001150-264 = "Mesmo assim, Alice……."
90001150-269 = "(Himari me deu um sinal de repente)"
90001150-270 = "(Não entendi a intenção, mas ao seguir o olhar dela, percebi)"
90001150-276 = "[ns] \"Alice, pessoal do Clube de Desenvolvimento de Jogos.\""
90001150-278 = "S-sim……?"
90001150-279 = "O que foi, Sensei?"
90001150-283 = "[ns] \"Que tal irmos lá fora brincar de guerra de bolas de neve?\""
90001150-285 = "Eh…… agora?"
90001150-291 = "……Tudo bem, Sensei!"
90001150-292 = "Então, eu e a Alice vamos na frente!"
90001150-297 = "Onee-chan, por que de repente!?"
90001150-298 = "M-Momoi? #nAlice, não é hora para esse tipo de coisa……!"
90001150-304 = "Momoi…… espere!"
90001150-305 = "Muito obrigada, Sensei."
90001150-306 = "[s] \"Pode deixar isso comigo, sempre que precisar.\""
90001150-308 = "Cuidado para não pegar um resfriado. #nBem, se você tiver febre, ficarei ao seu lado cuidando de você o dia todo."
90001150-309 = "……Hmm, não é uma má ideia."
90001150-310 = "Qual das duas é……."
90001150-311 = "Nem eu mesma sei ao certo."
90001150-312 = "Hmm……."
90001150-318 = "[ns] \"Oh! Estão se divertindo!\""
90001150-326 = "Olha só, lá vai a próxima! Midori!"
90001150-327 = "Que frio…… ah, eu não vou perder!"
90001150-330 = "Momoi, Midori……."
90001150-331 = "Por que de repente……? #nAlice ainda……."
90001150-332 = "[s] \"Alice, você está bem?\""
90001150-336 = "Eu não sei bem. #nMomentos como este são importantes, mas agora……."
90001150-337 = "……A Kei."
90001150-338 = "[s] \"Talvez seja justamente por isso que precisamos disso agora.\""
90001150-342 = "O que quer dizer com isso, Sensei?"
90001150-343 = "[s] \"Você não acha que seria bom mostrar esse lado divertido para a Kei também?\""
90001150-344 = "……."
90001150-355 = "……É verdade."
90001150-359 = "Eu nunca imaginei que existisse um lugar com tanta neve. #nAquilo é um pinguim?"
90001150-360 = "A Momoi disse que congelaríamos assim que chegássemos na geleira, mas na verdade foi bem diferente."
90001150-361 = "Este lugar também é... um lugar maravilhoso."
90001150-362 = "[s7] \"Para transmitir isso...\"\n[s8] \"Não seria bom mostrar para ela o quanto a Alice está se divertindo?\""
90001150-365 = "[ns] \"Além disso, a Alice acredita que ela certamente vai voltar, não é?\""
90001150-369 = "A Kei, certamente..."
90001150-373 = "……."
90001150-374 = "É verdade, Sensei. #nA Alice estava enganada!"
90001150-375 = "Para conseguir transmitir o quão maravilhoso o mundo é..."
90001150-376 = "Primeiro, a Alice precisa saber de tudo! #nPor isso..."
90001150-385 = "Ahhh!?"
90001150-387 = "A bola de neve da Midori, na Alice...!?"
90001150-393 = "Alice entendeu. #nIsso é uma estratégia para fingir que está mirando na Momoi, mas na verdade atacar a Alice!"
90001150-399 = "A Alice não vai perder!"
90001150-407 = "Puwaa!?"
90001150-408 = "Ahaha! Isso foi muito engraçado... Uou!"
90001150-417 = "Desta vez, a bola de neve da Alice foi na Momoi..."
90001150-418 = "Oh! Então a Alice também entrou no clima, hein!?"
90001150-420 = "A Alice agora está no modo invencível! #nNão vou pegar leve!"
90001150-438 = "Vou mirar nas costas sem que percebam..."
90001150-444 = "[ns] \"Então, eu também vou entrar na batalha!\""
90001150-450 = "Unya!?!?"
90001150-451 = "Kyaa!?!?"
90001150-452 = "Uwa!?!?"
90001150-456 = "H-hiii!? #nSensei...!?"
90001150-457 = "[ns9] \"Pessoal, vocês baixaram a guarda!\"\n[ns10] \"Neste campo de batalha...!\"\n[ns11] \"Distração é fatal!\""
90001150-465 = "Beleza, eu não vou perder de jeito nenhum!"
90001150-466 = "Não vou cair no mesmo truque duas vezes. #nSensei, está preparado?"
90001150-467 = "A Alice sabe! #nIsso é a \"guerra de todos contra todos\"!"
90001150-474 = "É verdade... durante esta batalha, todos são inimigos...!"
90001150-483 = "[ns] \"Droga, não vou ser derrotada assim!\""
90001150-484 = "Wahahaha!"
90001150-485 = "Tente me pegar, Sensei!"
90001150-487 = "Aprendi que, em combos, o importante é acertar o número de vezes!"
90001150-493 = "Eu também vou levar isso a sério agora...!"
90001150-499 = "(Depois disso, a séria guerra de bolas de neve continuou)"
90001150-503 = "(Para nós, naquele momento, aquele tempo era necessário)"
90001150-507 = "(Enquanto observava o pessoal do Departamento de Desenvolvimento de Jogos se divertindo)"
90001150-509 = "(Voltei para a base escondida para não ser notada)"
90001150-515 = "Bem-vindo de volta, Sensei. #nPrimeiro, vamos tirar essa neve. #nEu ajudo você."
90001150-516 = "Chegou na hora certa, Sensei. #nAcabamos de reunir os dispositivos de armazenamento."
90001150-517 = "Como a Rio-sama disse que precisaríamos da maior capacidade possível..."
90001150-518 = "Eu me dividi com a Eimi para procurar por dispositivos que pudessem ser usados."
90001150-519 = "[s] \"Então, a partir de agora...\""
90001150-520 = "Sim."
90001150-521 = "Sensei, fique aqui comigo para acompanhar o retorno da Kei."
90001150-523 = "Próximo episódio: Voz que Chama"
