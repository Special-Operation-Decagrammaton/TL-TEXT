[translation]
10054100-1 = "Episode 10;Sometimes It's Necessary"
10054100-2 = "The President is arriving!"
10054100-4 = "President...?"
10054100-5 = "The...?"
10054100-6 = "N-no way!?"
10054100-8 = "Yes, that way."
10054100-9 = "The President is here! Make way!"
10054100-10 = "Make way!"
10054100-12 = "[ns1] \"You are in the presence of the President!\"\n[ns2] \"Bow your heads at once!\""
10054100-17 = "Even Sensei... please, have mercy..."
10054100-18 = "If she's the President, does that mean she's from Shanhaijing...?"
10054100-19 = "Do not speak that name so lightly!"
10054100-20 = "Who is it this time!?"
10054100-26 = "Help the weak, crush the strong. Never forget a debt, and run headlong for justice!"
10054100-27 = "Follow the heavens and do what is right; that path is my chivalry!"
10054100-28 = "We are what the world calls Shanhaijing—the Genryumon!"
10054100-29 = "(Ooh! That was perfect...! That was incredibly cool!)"
10054100-30 = "...Wait, am I left out?"
10054100-31 = "I know them! They're those stubborn, inflexible idiots, right!? They don't even budge for money!"
10054100-32 = "Could it be that the small-fry adults got cocky because of them...?"
10054100-33 = "...Idiots...?"
10054100-34 = "Why are those Shanhaijing idiots here...?"
10054100-35 = "It's because you're all being too selfish!"
10054100-36 = "What did you say...?"
10054100-37 = "For starters, people are only people when they act like people."
10054100-38 = "If the kids at Plum Blossom Garden did the same thing, they would've gotten a spanking long ago!"
10054100-39 = "H-hey! You're just a kid yourself!"
10054100-40 = "Are you lumping me in with them!?"
10054100-41 = "Scolding you and teaching you manners! It's all for your own good!"
10054100-42 = "It's not like we enjoy doing this, you know?"
10054100-43 = "Then just leave us alone!"
10054100-44 = "If I did that, you'd just turn into bad kids! You're always causing trouble!"
10054100-45 = "We're just doing what we want...! Adults don't understand how kids feel!"
10054100-46 = "Adults were kids once too, you know?"
10054100-47 = "I'll say this now: you'd better stop while a scolding is all you get."
10054100-48 = "Once you become an adult, no one will bother to scold you anymore."
10054100-49 = "But I'm still a kid!?"
10054100-50 = "Youth is no excuse. Besides, you'll all be adults someday too."
10054100-51 = "Instructor Kokona. That is enough."
10054100-52 = "If they could understand just by being told, they wouldn't be children anymore."
10054100-53 = "This is just my personal opinion, but..."
10054100-54 = "Children who mature too quickly carry a corresponding amount of sorrow."
10054100-55 = "Therefore, scolding the Chick Group excessively here is—"
10054100-60 = "Cough...!"
10054100-65 = "[ns] \"Kisaki!?\""
10054100-66 = "President!?"
10054100-73 = "N-nobody move! If you move... I'll—"
10054100-77 = "H-hey... is this okay...?"
10054100-78 = "I have a feeling this is bad..."
10054100-82 = "Don't be scared! It's all... it's all the others' fault anyway!"
10054100-83 = "If it comes to this... I'll just dominate everything! Shanhaijing, everything, all of it!"
10054100-84 = "These kids..."
10054100-85 = "I held back because they were children, but... if they lay a hand on the President...!"
10054100-86 = "...Even if they are children, there is a line that must not be crossed. It seems I need to teach them that."
10054100-87 = "!?"
10054100-95 = "There are things that even children are not allowed to do."
10054100-96 = "Huh...?"
10054100-97 = "First, you must not cause trouble for others."
10054100-101 = "Aah!?"
10054100-102 = "Second, you must not use people for your own gain."
10054100-103 = "Ouch!"
10054100-104 = "If you don't build these habits now, you'll be in big trouble later."
10054100-105 = "I-I'm sorry! Please forgive me!!!"
10054100-107 = "...And you two as well."
10054100-113 = "Eek...!?"
10054100-114 = "Auu auu auu...!"
10054100-118 = "Even if your friends go down the wrong path, you must not follow them."
10054100-119 = "Waaaaah! My butt!!"
10054100-120 = "A true friend is someone who tells you when you're doing something wrong."
10054100-121 = "Ngh...! Eek...!"
10054100-122 = "Just because everyone is crossing on a red light doesn't mean it's safe. Even if everyone else is doing it, you should wait at a red light."
10054100-123 = "Auuuuuu...!!"
10054100-125 = "Do you understand?"
10054100-126 = "Ugh... uuu..."
10054100-127 = "Auuu..."
10054100-128 = "Sniff... uuu..."
10054100-129 = "President, are you alright?"
10054100-130 = "...Instructor Shun. Thank you for your help."
10054100-131 = "It's nothing. I was just surprised when you suddenly stumbled."
10054100-132 = "I am fine. Fufu... it seems I got a little too carried away."
10054100-138 = "[ns] \"Kisaki...\""
10054100-139 = "Sensei..."
10054100-140 = "...Fufu."
10054100-141 = "Let's talk properly, just the two of us, later."
10054100-142 = "You guys! How dare you... how dare you spank us!"
10054100-143 = "I will never forgive you!!!"
10054100-144 = "...Are you still saying that?"
10054100-145 = "Even after what Shun-nee did to you, you're still...!"
10054100-146 = "Well... I guess that can't be helped!"