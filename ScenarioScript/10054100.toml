[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10054100-1 = "Episódio 10: Aquilo que às vezes é necessário"
10054100-2 = "Abram alas para a Senhora Monshu."
10054100-4 = "Monshu...?"
10054100-5 = "Senhora...?"
10054100-6 = "N-Não me diga que!?"
10054100-8 = "É exatamente o que vocês estão pensando."
10054100-9 = "Abram aaaaalas para a Senhora Monshu!!!"
10054100-10 = "Abram aaaaalaaas!!"
10054100-12 = "[ns1] \"Estão diante da Senhora Monshu!\"\n[ns2] \"Abaixem as cabeças imediatamente!\""
10054100-17 = "Até você, Sensei... tenham piedade de mim..."
10054100-18 = "Monshu significa que ela é a... de Shanhaijing...?"
10054100-19 = "Não pronuncie esse nome de forma tão leviana!"
10054100-20 = "E quem é você agora!?"
10054100-26 = "Ajudar os fracos e punir os opressores! Nunca esquecer uma dívida de gratidão e correr sempre em nome da justiça!"
10054100-27 = "Seguir os desígnios dos céus e praticar a retidão, esse é o verdadeiro caminho da cavalaria!"
10054100-28 = "Nós somos a Shanhaijing... a Xuanlong Office!"
10054100-29 = "(Haaah~! Que pose perfeita...! Essa última fala foi épica demais!)"
10054100-30 = "......Ué, deixaram a gente de fora?"
10054100-31 = "Eu sei quem são! São aquele bando de idiotas cabeça-dura que não cedem por nada!?\nOuvi dizer que nem dinheiro compra elas!"
10054100-32 = "Não me diga que os adultos lixosos só criaram coragem por causa delas...?"
10054100-33 = "......Bando... de idiotas?"
10054100-34 = "O que o bando de idiotas de Shanhaijing tá fazendo num lugar como esse...?"
10054100-35 = "Isso tudo é culpa do egoísmo de vocês!"
10054100-36 = "O que você disse...?"
10054100-37 = "Para começar, as pessoas só são tratadas como pessoas quando agem como uma."
10054100-38 = "Se as crianças do Jardim da Flor de Ameixeira fizessem isso, já teriam levado umas boas palmadas!"
10054100-39 = "H-Hmph! Olha quem fala, você também é só uma pirralha!"
10054100-40 = "Não me comparem com vocês!"
10054100-41 = "Se damos broncas e tentamos disciplinar vocês, é tudo para o próprio bem de vocês!"
10054100-42 = "Acham mesmo que a gente faz isso porque gosta?"
10054100-43 = "Então deixem a gente em paz!"
10054100-44 = "Mas aí vocês vão crescer e virar crianças más!\nVocês só sabem causar problemas por onde passam!"
10054100-45 = "Nós só queremos fazer o que der na telha...!\nAdultos nunca vão entender os sentimentos das crianças!"
10054100-46 = "Os adultos também já foram crianças um dia, sabiam?"
10054100-47 = "Vou logo avisando, é melhor pararem enquanto um simples puxão de orelha resolve."
10054100-48 = "Quando vocês crescerem, ninguém mais vai ter paciência pra dar bronca, sabiam?"
10054100-49 = "Mas a gente ainda é criança!"
10054100-50 = "A juventude não é passe livre pra fazer o que quiser.\nAlém disso, um dia vocês também vão virar adultas."
10054100-51 = "Instrutora Kokona. Já é o suficiente."
10054100-52 = "Se elas fossem capazes de perceber o erro só com palavras, não seriam mais crianças."
10054100-53 = "Essa é apenas a minha humilde opinião, mas..."
10054100-54 = "Crianças que amadurecem cedo demais também carregam consigo muitas tristezas."
10054100-55 = "Portanto, repreender excessivamente a Gangue dos Passarinhos aqui seria――"
10054100-60 = "Cof...!"
10054100-65 = "[ns] \"Kisaki!?\""
10054100-66 = "Senhora Monshu!?"
10054100-73 = "N-Ninguém se mexe!\nSe derem mais um passo... eu vou atirar com isso aqui――"
10054100-77 = "E-Ei... você tem certeza disso...?"
10054100-78 = "Acho que a coisa ficou feia de verdade pro nosso lado..."
10054100-82 = "Não fiquem com medo! A culpa de tudo isso... é deles!"
10054100-83 = "Já que chegou a esse ponto... nós vamos dominar tudo!\nShanhaijing e tudo mais que tiver no caminho!"
10054100-84 = "Sua pirralha..."
10054100-85 = "Eu estava me segurando por vocês serem crianças... Mas levantar uma arma contra a Senhora Monshu é imperdoável...!"
10054100-86 = "......Mesmo sendo crianças, existe uma linha que não pode ser cruzada.\nParece que vou ter que ensiná-las exatamente onde ela fica."
10054100-87 = "!?"
10054100-95 = "Há coisas neste mundo que nem as crianças têm permissão para fazer."
10054100-96 = "Eh...?"
10054100-97 = "Primeiro: Não causem problemas para as outras pessoas."
10054100-101 = "Aaaah!?"
10054100-102 = "Segundo: Não usem os outros para o próprio benefício."
10054100-103 = "Ai, aiii, isso dóóói!"
10054100-104 = "Se não criarem bons hábitos agora, vocês sofrerão consequências terríveis no futuro."
10054100-105 = "D-Desculpa! Por favor, perdoaa a genteee!!!"
10054100-107 = "......Isso vale para vocês duas também."
10054100-113 = "Hiii!?"
10054100-114 = "Au, au, auuu...!"
10054100-118 = "Se uma amiga sair do caminho certo, não a sigam cegamente."
10054100-119 = "Uwaaaah! A minha bundinhaa!!"
10054100-120 = "O verdadeiro amigo é aquele que avisa quando você está fazendo algo errado."
10054100-121 = "Ngh...! Hiii...!"
10054100-122 = "Atravessar no sinal vermelho não se torna seguro só porque todo mundo está fazendo isso. Mesmo que todos vão, vocês devem esperar."
10054100-123 = "Auuuuuuu...!!"
10054100-125 = "Entenderam bem?"
10054100-126 = "Uh... Uuhuuuh..."
10054100-127 = "Auuuuuu..."
10054100-128 = "Snif... uuuuh..."
10054100-129 = "Senhora Monshu, você está bem?"
10054100-130 = "......Instrutora Shun. Eu lhe devo essa."
10054100-131 = "De forma alguma. Eu levei um grande susto quando a vi cambalear de repente."
10054100-132 = "Eu estou bem. Fufu... Parece que acabei me empolgando um pouco demais."
10054100-138 = "[ns] \"Kisaki...\""
10054100-139 = "Sensei..."
10054100-140 = "......Fufu."
10054100-141 = "Mais tarde, nós dois conversaremos com calma a sós."
10054100-142 = "Suas velhotas! Como... como ousam bater nas nossas bundas!"
10054100-143 = "Eu nunca vou perdoar vocês por isso!!!"
10054100-144 = "......Ainda vão insistir nisso?"
10054100-145 = "Mesmo depois da lição que a Irmãzona Shun deu, vocês ainda...!"
10054100-146 = "Bem... não tem muito o que fazer, não é!"