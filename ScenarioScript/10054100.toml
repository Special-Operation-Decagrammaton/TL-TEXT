[translation]
10054100-1 = "第10話;時には必要なもの"
10054100-2 = "門主様の、おなりです。"
10054100-4 = "門主……？"
10054100-5 = "様……？"
10054100-6 = "ま、まさか！？"
10054100-8 = "そのまさかだよ。"
10054100-9 = "門主様のー！おな～り～！！！"
10054100-10 = "おな～り～！！"
10054100-12 = "[ns1] \"門主様の御前だ！\"\n[ns2] \"早[ruby=こうべ]く首を[/ruby]垂れるがいい！\""
10054100-17 = "先生まで……堪忍してくりゃれ……。"
10054100-18 = "門主ということは、まさか、山海経の……？"
10054100-19 = "その名を軽々しく口にするな！"
10054100-20 = "今度は誰！？"
10054100-26 = "弱気を助け、強きをくじく。恩を忘れず、正義のためにひた走る！"
10054100-27 = "天に従い義を為せば、その道こそが我が任侠！"
10054100-28 = "世に言う我らは山海経――玄龍門だ！"
10054100-29 = "（くぅ～！決まった……！今のは最高にイカしたぞ！）"
10054100-30 = "……あれ、仲間外れ？"
10054100-31 = "知ってる！頭が固くて融通の利かないバカ連中でしょ！？#nお金でも動かないらしいじゃん！"
10054100-32 = "まさか、雑魚大人が生意気になったのはこいつらのせい……？"
10054100-33 = "……バカ……連中？"
10054100-34 = "なんで山海経のバカ連中がこんなとこに……？"
10054100-35 = "あなたたちが自分勝手すぎるからだよ！"
10054100-36 = "なんですって……？"
10054100-37 = "そもそもね、人は人らしい行動を見せてこそ、人なんだよ。"
10054100-38 = "梅花園の園児が同じことしたら、とっくにお尻ペンペンだったからね！"
10054100-39 = "ふ、ふん！あんただって子供のくせに！"
10054100-40 = "一緒にされてる！？"
10054100-41 = "叱るのも、しつけをするのも！全部あなたたちのためなの！"
10054100-42 = "私たちだって、やりたくてやってるわけじゃないんだよ？"
10054100-43 = "だったら放っといてよ！"
10054100-44 = "それじゃあ悪い子になっちゃうでしょ！#nあなたたちだって、トラブルばっか起こして！"
10054100-45 = "私たちは、やりたいことをするまでです……！#n大人には子供の気持ちなんて分からないんですよ！"
10054100-46 = "大人だって昔は子供だったんだよ？"
10054100-47 = "先に言っておくけど、叱られて済むうちにやめたほうがいいからね？"
10054100-48 = "大人になったら誰も叱ってくれなくなるんだよ？"
10054100-49 = "まだ子供なんだけど！？"
10054100-50 = "若さは免罪符にならないよ。#nそれに、あなたたちも、いつかは大人になるんだから。"
10054100-51 = "ココナ教官。もう十分じゃよ。"
10054100-52 = "言われて気づけるのなら、子供とは呼べないじゃろうて。"
10054100-53 = "これは妾の持論じゃが……。"
10054100-54 = "成熟しすぎた子は、その分、悲しみも抱えているものじゃ。"
10054100-55 = "故に、ここで雛鳥組を過度に叱責するのは――"
10054100-60 = "げほっ……！"
10054100-65 = "[ns] \"キサキ！？\""
10054100-66 = "門主様！？"
10054100-73 = "ぜ、全員動くな！#nもし動いたら……こいつを――"
10054100-77 = "ね、ねぇ……大丈夫なの……？"
10054100-78 = "少しマズいような気が……。"
10054100-82 = "ビビるな！全部……他のヤツらが悪いんだから！"
10054100-83 = "こうなったら……全部支配してやる！#n山海経だって、何だって、全部！"
10054100-84 = "こいつら……。"
10054100-85 = "子供だからと我慢していたが……門主様に手をかけるならば……！"
10054100-86 = "……子供とはいえ、越えてはならない一線があります。#nそれを教える必要があるみたいですね。"
10054100-87 = "！？"
10054100-95 = "子供にも許されないことはあるんですよ。"
10054100-96 = "えっ……？"
10054100-97 = "ひとつ、人様に迷惑をかけてはなりません。"
10054100-101 = "あーっ！？"
10054100-102 = "ふたつ。人を利益のために利用してはなりません。"
10054100-103 = "いったぁーい！"
10054100-104 = "今から習慣づけしないと、後で大変な目に遭いますよ。"
10054100-105 = "ご、ごめんなさい！許してぇぇ！！！"
10054100-107 = "……そこの2人も。"
10054100-113 = "ひぃっ……！？"
10054100-114 = "あうあうあう……！"
10054100-118 = "友達が道を踏み外しても、同調してはいけません。"
10054100-119 = "うわぁーん！お尻がぁ！！"
10054100-120 = "ダメなことはダメだと言ってあげるのが、本当の友達です。"
10054100-121 = "んぐっ……！ひぃっ……！"
10054100-122 = "赤信号はみんなで渡れば怖くないものではありません。みんな[ruby=・   ・]でも[/ruby]、赤信号なら待つべきなんです。"
10054100-123 = "あううぅぅぅぅ……！！"
10054100-125 = "分かりましたか？"
10054100-126 = "うっ……ううぅっ……。"
10054100-127 = "あうぅぅぅ……。"
10054100-128 = "ぐすっ……うぅぅ……。"
10054100-129 = "門主様、大丈夫ですか？"
10054100-130 = "……シュン教官か。世話になった。"
10054100-131 = "いいえ。急によろめいて、びっくりしました。"
10054100-132 = "大丈夫じゃ。ふふ……どうやら、少し浮かれすぎてしまったようじゃ。"
10054100-138 = "[ns] \"キサキ……。\""
10054100-139 = "先生……。"
10054100-140 = "……ふふ。"
10054100-141 = "あとで、二人きりでちゃんと話そう。"
10054100-142 = "あんたたち！よくも……よくもお尻を叩いたな！"
10054100-143 = "もう絶対に許さないからっ！！！"
10054100-144 = "……まだそんなこと言ってるの？"
10054100-145 = "シュン姉さんにあそこまでされたのに、まだ……！"
10054100-146 = "ま……これは仕方ないね！"
