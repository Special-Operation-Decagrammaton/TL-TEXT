[translation]
22080-1 = "Episódio 8: O Cotidiano Desmoronado"
22080-20 = "…………"
22080-21 = "[s] \"Momoi…….\""
22080-34 = "(——Momoi desmaiou)"
22080-35 = "(Naquele dia em que Aris perdeu o controle,)"
22080-36 = "(Momoi foi pega na confusão e perdeu a consciência.)"
22080-37 = "(Embora eu a tenha trazido às pressas para a enfermaria do Schale……)"
22080-38 = "(Já se passaram dois dias inteiros desde então,)"
22080-39 = "(e a consciência de Momoi ainda não retornou——)"
22080-47 = "(O robô misterioso que começou a se mover ao mesmo tempo que a perda de controle de Aris……… em um piscar de olhos, a sala do clube virou um mar de chamas……)"
22080-51 = "(Felizmente, graças à chegada da C&C, a situação se acalmou, mas……)"
22080-55 = "[ns] (O que foi aquilo com a Aris……)"
22080-56 = "(Só porque a situação se resolveu, não significa que tudo acabou. Aquele incidente deixou inúmeras dúvidas e cicatrizes.)"
22080-60 = "(Hare disse:)"
22080-61 = "('A causa do comportamento de Aris provavelmente foi o \"contato\" com aquele robô'.)"
22080-66 = "(Midori disse:)"
22080-67 = "('Naquele momento em que a atmosfera da Aris mudou,)"
22080-73 = "(o \"console de videogame\" que a Momoi estava segurando ligou de repente'.)"
22080-74 = "[ns] \"O console da Momoi…… se não me engano, veio das ruínas…….\""
22080-79 = "……"
22080-80 = "(Bip)"
22080-81 = "[Bem-vindo ao Sistema Divi:Sion. Por favor, insira o item que deseja pesquisar]"
22080-84 = "<Você é a AL-1S?>"
22080-87 = "[ns] \"Ruínas…… computador…… e então…… Sistema Divi:Sion…….\""
22080-88 = "(Qual seria o motivo da Aris ter perdido o controle? Qual a relação entre o robô e a Aris……?)"
22080-89 = "(O que era aquele console da Momoi que ligou de repente naquela hora……)"
22080-90 = "(Será que tem alguma relação com a pasta chamada <Key> que estava nas ruínas?)"
22080-91 = "[ns] \"Embora eu tenha verificado o console da Momoi…….\""
22080-95 = "(Ele nem sequer ligava. Como se tivesse sido assim desde o início——)"
22080-96 = "(Como se o conteúdo interno tivesse se tornado vazio——)"
22080-100 = "(Enquanto eu estava assim, sem encontrar nenhuma resposta, apenas com pensamentos girando na minha cabeça)"
22080-110 = "Sensei…… a Aris-chan……."
22080-117 = "Ah…… Sensei……"
22080-121 = "[ns] \"O que houve com a Aris?\""
22080-123 = "Bem…… a Aris-chan…… ainda……"
22080-124 = "não saiu da sala do clube."
22080-125 = "[s] \"……Entendo.\""
22080-126 = "Eu chamei por ela várias vezes, mas…… não teve jeito……."
22080-127 = "E-eu não sei o que fazer em um momento como este……"
22080-128 = "Snif……"
22080-129 = "[s] \"Está tudo bem.\""
22080-130 = "……Sensei?"
22080-131 = "…………！"
22080-132 = "[s] \"Está tudo bem. Deixe comigo.\""
22080-138 = "[ns] \"………Ufa.\""
22080-142 = "[ns] \"Aris, posso entrar um pouco?\""
22080-144 = "[ns] \"Vou entrar.\""
22080-148 = "[ns] \"Aris.\""
22080-150 = "[ns] \"……Você está bem?\""
22080-153 = "………………"
22080-154 = "[s] \"Ouvi dizer que você está trancada aqui sem nem comer nada.\""
22080-155 = "P-Professor……"
22080-156 = "[s] \"Todos estão preocupados com você. Vamos……?\""
22080-158 = "Alice não pode."
22080-159 = "[s] \"……Por que não?\""
22080-160 = "Alice…… por causa da…… Alice……"
22080-161 = "Por causa da…… Alice…… a Momoi se machucou……."
22080-162 = "[s] \"Alice…….\""
22080-163 = "Tudo isso…… foi a Alice quem fez."
22080-164 = "Por que as coisas estão assim…… nem a Alice…… sabe."
22080-165 = "Naquela hora…… algo……"
22080-166 = "É como se………#nÉ como se houvesse um \"arquivo de salvamento\" que a Alice desconhece dentro dela……"
22080-167 = "[s] \"……Ah.\""
22080-170 = "Não está nas memórias da Alice, mas…… é como se eu tivesse um \"arquivo de salvamento\"."
22080-171 = "Este corpo está reagindo."
22080-174 = "Se fosse para comparar, é como se eu pudesse avançar sem precisar de tutoriais ou explicações…… ou como se estivesse jogando um jogo que já joguei várias vezes……."
22080-176 = "……O corpo da Alice reagiu.#nEle se moveu."
22080-177 = "O que a Alice fez naquela hora…… eu não consigo me lembrar de nada, mas……."
22080-182 = "Ainda assim, uma coisa é certa…… a Alice…… a Alice…………"
22080-183 = "A Alice, a Momoi……!"
22080-184 = "[s] \"Alice, acalme-se……!\""
22080-185 = "Professor, o que a Alice…… o que a Alice deve fazer……!"
22080-186 = "Sim, você a machucou.#n――Essa é uma verdade da qual não se pode fugir."
22080-188 = "[ns] \"Quem……!?\""
22080-194 = "Professor!"
22080-195 = "A, a Presidente……!"
22080-202 = "Ah, como eu temia, as coisas acabaram acontecendo exatamente como eu previa."
22080-203 = "[s] \"Presidente……?\""
22080-204 = "――Você é o famoso professor do Schale?"
22080-205 = "……É extremamente lamentável que nosso encontro, que deveria ser memorável, tenha acontecido desta forma."
22080-206 = "Meu nome é Rio Tsukatsuki."
22080-207 = "Vim para contar a você…… e a elas……"
22080-211 = "A \"verdade\"."
22080-213 = "Próximo episódio: A Verdade Cruel (1)"
