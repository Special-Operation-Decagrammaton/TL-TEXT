[translation]
22080-1 = "Episódio 8; O Cotidiano que Desmoronou"
22080-20 = "............"
22080-21 = "[s] \"Momoi......\""
22080-34 = "(-- Momoi caiu)"
22080-35 = "(Naquele dia, quando a Aris perdeu o controle,)"
22080-36 = "(Momoi foi pega na confusão e perdeu a consciência.)"
22080-37 = "(Embora tenhamos levado Momoi apressadamente para a enfermaria da Schale...)"
22080-38 = "(Dois dias inteiros se passaram...)"
22080-39 = "(Mas a consciência de Momoi ainda não voltou――)"
22080-47 = "(Ao mesmo tempo em que a Aris perdeu o controle, robôs desconhecidos começaram a se mover... Em um piscar de olhos, a sala do clube virou um mar de chamas...)"
22080-51 = "(Felizmente, graças à chegada da C&C, a situação se acalmou, mas...)"
22080-55 = "[ns] (Que forma era aquela da Aris...)"
22080-56 = "(Só porque a situação foi contida, não significa que tudo acabou. Aquele incidente deixou para trás inúmeras dúvidas e cicatrizes.)"
22080-60 = "(A Hare disse:)"
22080-61 = "('A causa do comportamento da Aris provavelmente foi o 'contato' com aqueles robôs.')"
22080-66 = "(A Midori disse:)"
22080-67 = "('Naquele momento em que a atmosfera da Aris mudou,')"
22080-73 = "('O console de videogame que a Momoi estava segurando ligou de repente.')"
22080-74 = "[ns] \"O console da Momoi... Se não me engano, veio das ruínas...\""
22080-79 = "......"
22080-80 = "(Bip)"
22080-81 = "[Bem-vindo ao Divi:Sion System. Por favor, insira o item que deseja pesquisar.]"
22080-84 = "<Você é a AL-1S?>"
22080-87 = "[ns] \"Ruínas... Computador... E... Divi:Sion System......\""
22080-88 = "(Qual será o motivo de a Aris ter perdido o controle? Qual a conexão entre os robôs e a Aris...?)"
22080-89 = "(O que era aquele console da Momoi que ligou do nada naquela hora...)"
22080-90 = "(Será que tem alguma relação com a pasta chamada <Key> que estava nas ruínas?)"
22080-91 = "[ns] \"Eu tentei verificar o console da Momoi, mas...\""
22080-95 = "(Ele nem sequer ligou. Como se tivesse sido assim desde o começo――)"
22080-96 = "(Como se, por dentro, tivesse se tornado completamente vazio――)"
22080-100 = "(Enquanto eu estava perdido em pensamentos, sem encontrar nenhuma resposta)"
22080-110 = "Sensei... a Aris-chan..."
22080-117 = "Ah... Sensei..."
22080-121 = "[ns] \"O que houve com a Aris?\""
22080-123 = "Bem... a Aris-chan... ainda..."
22080-124 = "Ela não sai da sala do clube."
22080-125 = "[s] \"......Entendo.\""
22080-126 = "Eu chamei ela várias vezes, mas... não tem jeito..."
22080-127 = "E-Em uma hora dessas... eu não sei o que fazer..."
22080-128 = "Uuuh..."
22080-129 = "[s] \"Está tudo bem.\""
22080-130 = "......Sensei?"
22080-131 = "............!"
22080-132 = "[s] \"Está tudo bem. Deixe isso comigo.\""
22080-138 = "[ns] \"………Phew.\""
22080-142 = "[ns] \"Aris, posso entrar?\""
22080-144 = "[ns] \"Vou entrar.\""
22080-148 = "[ns] \"Aris.\""
22080-150 = "[ns] \"......Você está bem?\""
22080-153 = "............"
22080-154 = "[s] \"Ouvi dizer que você está trancada aqui sem nem comer nada.\""
22080-155 = "S-Sensei..."
22080-156 = "[s] \"Todo mundo está preocupado. Vamos lá...?\""
22080-158 = "A Aris... não pode."
22080-159 = "[s] \"......Por que não?\""
22080-160 = "A Aris... por culpa... da Aris..."
22080-161 = "Por culpa... da Aris... a Momoi se machucou..."
22080-162 = "[s] \"Aris......\""
22080-163 = "Tudo foi... a Aris quem fez."
22080-164 = "Por que isso aconteceu... nem a Aris... sabe."
22080-165 = "Naquela hora... algo..."
22080-166 = "Como se... #n Como se existisse um 'Save Data' que a Aris desconhece dentro da Aris..."
22080-167 = "[s] \"......Ah.\""
22080-170 = "Isso não está na memória da Aris, mas... é como se eu tivesse um 'Save Data' guardado."
22080-171 = "O meu corpo está reagindo."
22080-174 = "Para usar uma metáfora, sim, é como conseguir avançar mesmo sem tutoriais ou explicações... Ou como se estivesse jogando um jogo que já zerei várias vezes..."
22080-176 = "......O corpo da Aris, reagiu. #n Ele se moveu."
22080-177 = "O que a Aris fez naquela hora... eu não consigo me lembrar de nada..."
22080-182 = "Mesmo assim, uma coisa é certa... A Aris... A Aris............"
22080-183 = "A Aris, a Momoi...! "
22080-184 = "[s] \"Aris, acalme-se...!\""
22080-185 = "Sensei, a Aris... O que a Aris deve fazer...!"
22080-186 = "Sim, você a feriu. #n ――Essa é a verdade inegável."
22080-188 = "[ns] \"Quem...!?\""
22090-194 = "Sensei!"
22080-195 = "A-A Presidente...!"
22080-202 = "Ah, como esperado―― parece que aconteceu exatamente como eu temia."
22080-203 = "[s] \"Presidente...?\""
22080-204 = "――Então você é o famoso Sensei da Schale?"
22080-205 = "......É extremamente lamentável que o nosso primeiro encontro histórico tenha ocorrido dessa maneira."
22080-206 = "Meu nome é Rio Tsukatsuki."
22080-207 = "Vim ensinar a 'Verdade'..."
22080-211 = "Para você―― e para elas."
22080-213 = "Próximo Episódio; Verdade Cruel (1)"