[translation]
22080-1 = "第8話;崩れた日常"
22080-20 = "…………"
22080-21 = "[s] \"モモイ……。\""
22080-34 = "（――モモイが倒れた）"
22080-35 = "（アリスが暴走したあの日、）"
22080-36 = "（モモイは騒動に巻き込まれ、意識を失った。）"
22080-37 = "（急いでモモイをシャーレの医務室に連れてきたものの……）"
22080-38 = "（それからまる二日が経過しても、）"
22080-39 = "（モモイの意識はまだ戻らない――）"
22080-47 = "（アリスの暴走と同時に動き始めた正体不明のロボット………あっという間に部室は火の海となり……）"
22080-51 = "（幸い、駆けつけてくれたC&Cのおかげで、事態は落ち着いたが……）"
22080-55 = "[ns] （あのアリスの姿は一体……）"
22080-56 = "（状況が収束したからといって、すべてが終わったわけではない。あの事件は数々の疑問と傷痕を残していった）"
22080-60 = "（ハレは、）"
22080-61 = "（『アリスの行動は、あのロボットと「接触」したのが原因だろう』と）"
22080-66 = "（ミドリは、）"
22080-67 = "（『アリスの雰囲気が変わったあの時、）"
22080-73 = "（モモイが持っていた「ゲーム機」が急に起動した』と）"
22080-74 = "[ns] \"モモイのゲーム機は……たしか廃墟から……。\""
22080-79 = "……"
22080-80 = "（ピピッ）"
22080-81 = "［Divi:Sion Systemへ、ようこそお越しくださいました。お探しの項目を入力してください］"
22080-84 = "＜あなたはAL-1Sですか？＞"
22080-87 = "[ns] \"廃墟……コンピューター……そして……Divi:Sion System……。\""
22080-88 = "（アリスが暴走した理由は何だろう？ロボットとアリスの関係性は一体……？）"
22080-89 = "（あの時、急に起動したモモイのゲーム機は一体……）"
22080-90 = "（廃墟にあった＜Key＞というフォルダとなにか関係があるのだろうか？）"
22080-91 = "[ns] \"モモイのゲーム機を確認してみたものの……。\""
22080-95 = "（電源すら入らなかった。まるで元からそうであったかのように――）"
22080-96 = "（まるで、中身自体が空っぽになってしまったかのように――）"
22080-100 = "（そうやって何も答えが見つからないまま、思考だけが渦巻いていた時）"
22080-110 = "先生……アリスちゃんが……。"
22080-117 = "あ……先生……"
22080-121 = "[ns] \"アリスはどうしたの？\""
22080-123 = "その……アリスちゃんは……まだ……"
22080-124 = "部室から、出てきません。"
22080-125 = "[s] \"……そっか。\""
22080-126 = "何度も声をかけてみましたけど……どうにも……。"
22080-127 = "こ、こんな時……どうすればいいのか、分からなくて……"
22080-128 = "ううっ……"
22080-129 = "[s] \"大丈夫。\""
22080-130 = "……先生？"
22080-131 = "…………！"
22080-132 = "[s] \"大丈夫。ここは私に任せて。\""
22080-138 = "[ns] \"………ふう。\""
22080-142 = "[ns] \"アリス、ちょっと入ってもいいかな？\""
22080-144 = "[ns] \"入るよ。\""
22080-148 = "[ns] \"アリス。\""
22080-150 = "[ns] \"……大丈夫？\""
22080-153 = "………………"
22080-154 = "[s] \"ご飯も食べないでずっと篭ってるって聞いたよ。\""
22080-155 = "せ、先生……"
22080-156 = "[s] \"みんな心配してるよ。行こう……？\""
22080-158 = "アリスには、できません。"
22080-159 = "[s] \"……どうしてかな？\""
22080-160 = "アリスは……アリスの……せいで……"
22080-161 = "アリスの……せいで……モモイが怪我をしました……。"
22080-162 = "[s] \"アリス………。\""
22080-163 = "全部、アリスが……やったことです。"
22080-164 = "どうして、こうなってるのか……アリスにも……わかりません。"
22080-165 = "あの時……何かが……"
22080-166 = "まるで………#nまるでアリスの知らない「セーブデータ」が、アリスの中にあるかのような……"
22080-167 = "[s] \"……あ。\""
22080-170 = "アリスの記憶にはありませんが……まるで「セーブデータ」を持っているみたいです。"
22080-171 = "この身体が、反応しています。"
22080-174 = "例えるなら、そう、チュートリアルや説明が無くても進められるような……或いはまるで、何度もプレイしたことのあるゲームを遊んでいるかのような……。"
22080-176 = "……アリスの体が、反応しました。#n動きました。"
22080-177 = "あの時、アリスが何をしたのか……何も、思い出せませんが……。"
22080-182 = "それでもひとつ、確かなのは……アリスが……アリスが…………"
22080-183 = "アリスが、モモイを……！"
22080-184 = "[s] \"アリス、落ち着いて……！\""
22080-185 = "先生、アリスは……アリスは一体どうすれば……！"
22080-186 = "そう、貴女が怪我をさせた。#n――それは逃れられない真実。"
22080-188 = "[ns] \"誰……！？\""
22080-194 = "先生！"
22080-195 = "か、会長が……！"
22080-202 = "ああ、やはり――危惧していた通りになってしまったようね。"
22080-203 = "[s] \"会長……？\""
22080-204 = "――貴方が、噂のシャーレの先生？"
22080-205 = "……先生との記録的な出会いがこうなってしまったのは極めて残念だわ。"
22080-206 = "私の名は[ruby=つかつき]調月[/ruby]リオ。"
22080-207 = "貴方――そして、彼女たちに……"
22080-211 = "「真実」を教えにきたの。"
22080-213 = "次回;残酷な真実（１）"
