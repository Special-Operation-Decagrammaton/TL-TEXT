[translation]#[Texto Final. - Filipe 08/07.]
70014050-1 = "A Andança do Farmacêutico (5)"
70014050-2 = "……"
70014050-3 = "Um educador deve ouvir tudo o que o aluno diz?"
70014050-4 = "[s] \"Não tudo…… mas a maior parte.\""
70014050-5 = "Então tá bom."
70014050-6 = "Cumpra a promessa que fez comigo."
70014050-7 = "[s] \"Agora?\""
70014050-8 = "Sim."
70014050-9 = "Só precisa responder honestamente."
70014050-10 = "――Pra você, Sensei, que tipo de aluna eu sou?"
70014050-11 = "[s] \"Uma aluna muito…… muito problemática.\""
70014050-12 = "……Resposta rápida."
70014050-13 = "Hmm? Ah, quer saber o motivo?"
70014050-14 = "Eu nunca me importei com os outros.#nPor isso, nunca liguei pro que pensavam de mim."
70014050-15 = "……Pelo menos até recentemente."
70014050-16 = "Mas agora……"
70014050-17 = "……"
70014050-18 = "Incerteza é algo ruim."
70014050-19 = "Coisas imperfeitas, coisas que se desgastam…… e coisas que se deterioram dia após dia, tudo isso é igualmente ruim."
70014050-20 = "Quanto mais algo se distorce, mais incerteza aumenta."
70014050-21 = "Por isso, nós, humanos, devemos seguir em frente em busca da――#ntranscendência."
70014050-22 = "[s] \"A história do elixir?\""
70014050-23 = "Sim. Nada mais me interessava além disso."
70014050-24 = "Imortal significa aquele que supera os limites. E também aquele que está acima dos limites."
70014050-25 = "Já pensou nisso?"
70014050-27 = "Se os humanos que vivem na terra podem superar tudo,#nentão até onde podemos chegar?"
70014050-29 = "Essa pergunta é a razão fundamental que me levou a seguir esse caminho."
70014050-30 = "Eu sempre tentei explorar os seres humanos."
70014050-31 = "Acreditava que compreendia os outros até certo ponto."
70014050-32 = "……Mas, em algum momento…… comecei a não entender mais 'mim mesmo'."
70014050-33 = "[s] \"……Quando foi isso?\""
70014050-34 = "Para ser exato――"
70014050-38 = "[log]Eu quero que você não desista de si mesma. [/log]"
70014050-42 = "Naquele momento."
70014050-43 = "[s] \"……\""
70014050-44 = "Sensei. Quero saber o verdadeiro significado daquelas palavras."
70014050-45 = "O que você quis dizer com aquilo?"
70014050-46 = "[s] \"Kai.\""
70014050-47 = "……?"
70014050-48 = "[s] \"Eu tenho uma convicção.\""
70014050-49 = "Oh?"
70014050-50 = "[s1] \"Eu sempre quero ajudar vocês, alunos.\"\n[s2] \"Mas não consigo fazer isso sozinho.\""
70014050-54 = "O que você quer dizer com isso?"
70014050-55 = "Hmm…… então todo o protagonismo é do aluno……?"
70014050-59 = "……Que coisa interessante."
70014050-60 = "Não importa o que o aluno faça, o 'professor' não deve desistir dele até o fim, não é?"
70014050-61 = "Não é esse o chamado―― ideal do educador?"
70014050-62 = "[s] \"É. Mas isso é idealismo.\""
70014050-66 = "[ns3] \"Para um aluno que já decidiu recusar……\"\n[ns4] \"não há nada que eu possa fazer.\""
70014050-70 = "……Entendo."
70014050-71 = "Como um corpo quebrado que não reage a nenhum medicamento…… é isso?"
70014050-72 = "[s5] \"Mas eu tenho o dever de te guiar.\"\n[s6] \"Então, me dê uma chance.\""
70014050-77 = "[ns] \"Uma chance de eu te ensinar.\""
70014050-78 = "……"
70014050-79 = "Você conhece a expressão 'arrependimento amargo'?"
70014050-80 = "Significa se arrepender profundamente de algo que já não tem volta."
70014050-81 = "Palavras mornas.#nAssim como 'a natureza humana é inerentemente boa'."
70014050-82 = "Com uma atitude superficial, você não chega nem ao pé da montanha."
70014050-83 = "……Sempre pensei assim.#nMas……"
70014050-87 = "……Parece que aquele momento realmente me afetou."
70014050-88 = "Achei que não fosse grande coisa……"
70014050-89 = "Mas algo se rachou dentro de mim."
70014050-90 = "[s] \"Você se descreve como se fosse um objeto……?\""
70014050-91 = "No fundo, humanos e objetos não são tão diferentes."
70014050-92 = "O início da vida é só uma reação química. A existência humana é uma sombra escondida na memória."
70014050-93 = "A mente é faísca de neurônios. Alma não existe."
70014050-94 = "É por isso que podemos torcer e controlar o fluxo.#nA farmácia é um desses processos."
70014050-95 = "Para mim, humanos são apenas objetos."
70014050-96 = "……"
70014050-97 = "Dor e tristeza também são conceitos vagos. Eu até entendo, mas não ressoam em mim."
70014050-98 = "Dizem que choram pelos outros, mas#nnisso não há mais significado do que 'o corpo está derramando lágrimas'."
70014050-99 = "Entre as pessoas, existe uma distância que nunca pode ser totalmente transposta."
70014050-100 = "E eu achava que sentia essa distância mais do que ninguém."
70014050-101 = "[s] \"Por que você passou a pensar assim?\""
70014050-102 = "……Não sei."
70014050-106 = "Se eu soubesse a resposta, talvez pudesse aproveitar um pouco mais a 'vida normal'."
70014050-107 = "Analisando a mim mesmo…… provavelmente nasci assim."
70014050-108 = "Não, fui feito assim."
70014050-109 = "[s] \"Feito……?\""
70014050-110 = "É uma metáfora biológica.#nToda vida é uma criação feita de células."
70014050-112 = "E dentro disso, cada começo é diferente."
70014050-113 = "Então é natural que alguns não consigam entender os outros."
70014050-114 = "Pessoas que não captam intuitivamente os pensamentos, sentimentos e motivações alheios,#ne precisam analisar tudo teoricamente."
70014050-116 = "Talvez eu seja um caso mais extremo."
70014050-117 = "De qualquer forma, não há razão. Sou só assim."
70014050-118 = "A única coisa que posso dizer é que fui criado para ser ainda mais assim.#nMas isso é o processo, não o começo."
70014050-119 = "Eu não entendo o conceito de 'fazer o bem pelos outros'."
70014050-120 = "Até entendo o significado, mas não entendo por que alguém escolheria agir assim."
70014050-121 = "Afinal, leva tempo demais. É muito ineficiente."
70014050-122 = "[s] \"Por isso você usou a força para subjugar os outros?\""
70014050-123 = "Sim."
70014050-124 = "Simples e direto."
70014050-125 = "……Bom, era o que eu pensava.#nAgora…… sinto que perdi algo, mas não sei o quê."
70014050-126 = "Fazia tempo que não me sentia tão 'perdido'.#nPor isso――"
70014050-127 = "――fazer com que eu encontre a resposta.#nEssa vai ser a 'promessa' que você deve cumprir, Sensei."
70014050-128 = "[s] \"Então, que tal estudar?\""
70014050-132 = "Estudar?"