[translation]
70014050-1 = "The Apothecary's Wanderings (5)"
70014050-2 = "……."
70014050-3 = "As an educator, you're supposed to listen to whatever your students say, aren't you?"
70014050-4 = "[s] \"Not 'whatever,' but... mostly, yes.\""
70014050-5 = "That will suffice."
70014050-6 = "Fulfill the promise you made to me."
70014050-7 = "[s] \"Right now?\""
70014050-8 = "Yes."
70014050-9 = "You need only answer honestly."
70014050-10 = "—Sensei, what kind of student am I to you?"
70014050-11 = "[s] \"A very... very difficult problem child.\""
70014050-12 = "……An immediate answer."
70014050-13 = "Hm? Ah, you ask why?"
70014050-14 = "I have never cared for the thoughts of others. #nTherefore, I never cared how others perceived me."
70014050-15 = "……At least, until recently."
70014050-16 = "But now……."
70014050-17 = "……."
70014050-18 = "Uncertainty is evil."
70014050-19 = "Incomplete things, things that are whittled away... and by extension, things that break down day by day, are the same."
70014050-20 = "The more a formed object becomes distorted, the greater the uncertainty grows."
70014050-21 = "That is why we humans must move forward toward what lies beyond... #ntoward transcendence."
70014050-22 = "[s] \"Are you talking about the elixir?\""
70014050-23 = "Indeed. Nothing else has ever held my interest."
70014050-24 = "A celestial being is one who has surpassed their limits. It signifies one who stands above those limits."
70014050-25 = "Have you ever thought about it?"
70014050-27 = "If humans living on this earth could overcome everything, #njust how far could we reach?"
70014050-29 = "That question is the fundamental reason I threw myself into this pursuit."
70014050-30 = "I have spent my time continuing my research into humanity."
70014050-31 = "I took pride in the fact that I understood others to a certain extent."
70014050-32 = "……But at some point... I stopped understanding 'myself'."
70014050-33 = "[s] \"When... was that?\""
70014050-34 = "To be precise—"
70014050-38 = "[log]君が、君自身を諦めないでほしい。[/log]"
70014050-42 = "That very moment."
70014050-43 = "[s] \"…….\""
70014050-44 = "Sensei. I want to hear the true meaning of those words."
70014050-45 = "What did you intend when you said that to me?"
70014050-46 = "[s] \"Kai.\""
70014050-47 = "……?"
70014050-48 = "[s] \"I have my own beliefs.\""
70014050-49 = "Oh?"
70014050-50 = "[s1] \"I always want to be a source of strength for my students.\"\n[s2] \"But that is not something I can do alone.\""
70014050-54 = "What... does that mean?"
70014050-55 = "I see... so the student is the primary agent in all things...?"
70014050-59 = "……You say interesting things."
70014050-60 = "Regardless of how the student acts, isn't it the duty of a 'Sensei' to never give up on them until the end?"
70014050-61 = "Isn't that what is known as the ideal of an educator?"
70014050-62 = "[s] \"That's true. But it's just an ideal.\""
70014050-66 = "[ns3] \"For a student who has decided to refuse...\"\n[ns4] \"There is nothing I can do.\""
70014050-70 = "……I see."
70014050-71 = "Like a broken body that shows no reaction to any medicine... is that it?"
70014050-72 = "[s5] \"But I have an obligation to guide you.\"\n[s6] \"So, I want you to give me a chance.\""
70014050-77 = "[ns] \"A chance for me to teach you.\""
70014050-78 = "……."
70014050-79 = "Are you familiar with the phrase 'The Regret of Poison'?"
70014050-80 = "It means to deeply regret something that can no longer be undone."
70014050-81 = "It is a lukewarm sentiment. #nJust like saying 'human nature is inherently good'."
70014050-82 = "With such half-hearted feelings, one cannot even climb the foot of the mountain."
70014050-83 = "……Until now, I had always thought so. #nBut……."
70014050-87 = "……It seems that moment was indeed the problem."
70014050-88 = "I thought it was of no consequence, but……."
70014050-89 = "There must be a crack within me."
70014050-90 = "[s] \"You talk about yourself like you're an object...?\""
70014050-91 = "In the first place, there is no great difference between humans and objects."
70014050-92 = "The beginning of life is merely a chemical reaction, and human existence is but a shadow lurking in the data of memory."
70014050-93 = "The spirit is just a spark of nerve cells. There is no such thing as a soul."
70014050-94 = "That is precisely why it is possible to twist and control the flow. #nPharmacology is one such process."
70014050-95 = "To me, humans are nothing more than objects."
70014050-96 = "……."
70014050-97 = "Pain and sorrow are also concepts I do not understand well. I can comprehend them, but they do not resonate with my heart."
70014050-98 = "People say they shed tears for others, #nbut there is no meaning to that beyond 'the body is shedding tears'."
70014050-99 = "There is a distance between people that can never truly be bridged."
70014050-100 = "And I thought I felt that distance more than anyone else……."
70014050-101 = "[s] \"Why... did you come to think that way?\""
70014050-102 = "……Who knows."
70014050-106 = "If I knew that, perhaps I could have enjoyed a normal life."
70014050-107 = "As far as I have analyzed myself... I was likely born this way."
70014050-108 = "No, I was made this way."
70014050-109 = "[s] \"Made...?\""
70014050-110 = "It is a biological analogy. #nAll life is a creation made from cellular material."
70014050-112 = "Within that, there are individual differences in how one begins."
70014050-113 = "If so, there must be those who cannot understand others."
70014050-114 = "Those who cannot intuitively grasp the thoughts, emotions, and principles of others, #nand must analyze each one theoretically."
70014050-116 = "Perhaps I was just particularly prominent in that regard."
70014050-117 = "Regardless, there is no reason for it. I was simply that kind of human."
70014050-118 = "If I had to say one thing, perhaps being raised to make that trait stronger was a factor. #nEven so, that is just a process. Not the beginning."
70014050-119 = "I cannot understand the concept that 'kindness is not for others'."
70014050-120 = "I understand the meaning, but I do not understand why one would choose that action."
70014050-121 = "It takes too much time. It is far too inefficient."
70014050-122 = "[s] \"Is that why you've been using force to make people submit?\""
70014050-123 = "Yes."
70014050-124 = "It is simple and quick."
70014050-125 = "……Or so I thought. #nNow... I feel like I've missed something, but I don't know what it is."
70014050-126 = "It has been a long time since I felt this 'unknown'. #nTherefore—"
70014050-127 = "—Making me find the answer to this. #nLet that be the 'promise' you must fulfill, Sensei."
70014050-128 = "[s] \"Then, why don't we study it?\""
70014050-132 = "Study?"