[translation]
41120-1 = "Episódio 12: A fatura encharcada pela chuva"
41120-2 = "Conselho Estudantil Geral - Sala de Recepção"
41120-6 = "……O que é isso?"
41120-7 = "[s] \"Desculpe incomodar em um momento tão ocupado, mas eu queria que você desse uma olhada nisso, Rin…….\""
41120-8 = "“Proposta de reparo de instalações para o 'Parque dos Coelhinhos' que sofreu danos por inundação”, é isso……?"
41120-9 = "……Não tenho objeções quanto a reparar um parque usado pelos cidadãos, em si."
41120-10 = "Mas isso é algo necessário para as atividades do Schale?"
41120-11 = "[s] \"Não é bem isso, mas…….\""
41120-12 = "Então…… isso significa que é necessário para as alunas da SRT?"
41120-16 = "……O silêncio é a resposta correta."
41120-17 = "Ouvi sobre o assunto através da Kaya. As alunas da Academia Especial SRT que recusaram a transferência para a Valkyrie…… elas estão acampando no parque, e o Sensei está dando suporte a elas pelas sombras."
41120-18 = "Não estou aqui para dizer nada sobre isso. Afinal, o Schale é uma organização independente……."
41120-19 = "No entanto, falando da minha posição, não posso considerar correto que elas continuem no parque."
41120-20 = "[s] \"……Porque elas estão ocupando um parque que deveria ser usado por todos os cidadãos?\""
41120-21 = "Não. Aquele parque é um local remoto, onde quase ninguém vai."
41120-22 = "Na verdade, era um parque que já estava planejado para ser removido em breve."
41120-23 = "Mas, independentemente disso……"
41120-29 = "……É verdade que a SRT é uma organização especial, dotada de privilégios pela Presidente do Conselho Estudantil Geral para subjugar criminosos rapidamente."
41120-30 = "Contudo, tais privilégios só ganham valor através de propósitos corretos e métodos de operação adequados. Caso contrário, apenas atraem perigo."
41120-31 = "……Como o Sensei sabe, não são poucos os membros dentro do Conselho Estudantil Geral que temem o poder militar da SRT."
41120-32 = "Nessa situação, se houver movimentos para apoiá-las……"
41120-33 = "Haverá uma forte reação por parte do Comitê Administrativo."
41120-34 = "[s] \"A Rin não poderia tentar convencê-los……?\""
41120-38 = "Não farei isso."
41120-40 = "Depois disso, tentei encontrar outros membros do Conselho Estudantil Geral para pedir ajuda, mas……."
41120-41 = "……Quase todos não quiseram nem me ouvir."
41120-44 = "Departamento de Defesa - Escritório"
41120-46 = "……Entendo, então foi por isso que você veio até aqui."
41120-50 = "De qualquer forma, obrigado pelo seu trabalho duro. Aceita um chá?"
41120-51 = "……Fufu. Parece que você não tem esse luxo, não é?"
41120-52 = "Não, eu sei que o Schale está muito ocupado…… normalmente, eu adoraria conversar com mais calma."
41120-56 = "Para ser direta…… sinto muito, mas não parece que poderei ajudar com isso."
41120-57 = "Como um tratamento oficial, a Academia Especial SRT já é uma escola fechada……."
41120-58 = "Deixando de lado o nome, na prática, isso se tornaria uma forma de “o Conselho Estudantil Geral apoiar diretamente alunas de uma escola que não existe”. Isso seria difícil."
41120-59 = "Pensei se poderíamos dar um jeito usando o pretexto do parque…… mas, como esperado, parece difícil. Aquela região já estava planejada para redesenvolvimento, afinal……."
41120-60 = "O que posso fazer é, como mencionei antes, manter os dados de matrícula delas como estão……."
41120-61 = "Sinto muito por não poder ser de mais ajuda."
41120-62 = "[s1] \"Não, tudo bem. Eu que peço desculpas por incomodar mesmo estando ocupada.\"\n[s2] \"Só isso já ajuda muito, obrigado.\""
41120-67 = "……Sensei."
41120-68 = "Os dias que você passa com elas são divertidos?"
41120-69 = "[s] Acena com a cabeça."
41120-70 = "Isso é o que mais importa."
41120-76 = "Então, por favor, continue cuidando do RABBIT Squad."
41120-81 = "Ah……."
41120-82 = "[s] \"Faz tempo.\""
41120-83 = "……Que coincidência nos encontrarmos de novo."
41120-84 = "O Sensei também tem assuntos com a Chefe do Departamento de Defesa?"
41120-85 = "[s] \"Sim, e você, Kanna?\""
41120-86 = "Eu, bem……."
41120-87 = "Digamos que seja um assunto pessoal……."
41120-91 = "Peço desculpas por interrompê-la, até mais."
41120-99 = "Bom trabalho, eu estava esperando por você."
41120-103 = "Kanna, por favor, não fique tão tensa. Não chamei você aqui para te intimidar."
41120-104 = "É apenas uma verificação de progresso."
41120-108 = "Então, como está a construção da 'Cidade dos Coelhinhos'?"
41120-109 = "Bem, é que há muitas pessoas acampando nas redondezas..."
41120-110 = "O trabalho de remoção dos edifícios está um pouco atrasado..."
41120-111 = "......Sim?"
41120-115 = "Isso significa que a situação é a seguinte?"
41120-116 = "A Academia de Polícia Valkyrie, responsável pela segurança de Kivotos..."
41120-117 = "A elite do Departamento de Segurança Pública está tendo dificuldades para despejar andarilhos?"
41120-118 = "M-mas, veja bem, eles parecem estar armados com armas de fogo que não são nada comuns...!"
41120-119 = "Com o nosso armamento atual, está difícil de competir..."
41120-120 = "Além disso, aquelas alunas da SRT continuam permanecendo no parque, então..."
41120-121 = "Ora, então a culpa é minha?"
41120-122 = "P-perdão! Jamais diria algo assim...!"
41120-130 = "Kanna, eu adoro pessoas que têm senso de responsabilidade."
41120-131 = "Vamos cumprir nossas respectivas responsabilidades."
41120-132 = "Caso você acabe abandonando essa responsabilidade..."
41120-133 = "Eu não poderei dizer nada se você acabar como a SRT, entende?"
41120-135 = "......"
41120-136 = "Fufu, então deixe-me te dar um conselho."
41120-137 = "Kanna, você conhece a história das 'Três Flechas'?"
41120-138 = "Uma única flecha quebra facilmente. Mas se várias estiverem juntas, não é tão fácil assim quebrá-las."
41120-139 = "Se está difícil apenas para o Departamento de Segurança Pública, por que não chama 'pessoas com interesses em comum'?"
41120-140 = "Isso significa que..."
41120-141 = "Ora, é mais elegante não dizer essas coisas até o fim."
41120-142 = "S-sim..."
41120-143 = "Então, espero por notícias melhores na próxima vez."
41120-148 = "Ah... francamente, é triste ter tão poucas pessoas que trabalham de forma eficiente."
41120-149 = "Parece que não tenho sorte com as pessoas..."
41120-151 = "......Peço desculpas se não estou sendo útil."
41120-152 = "Não, não, não estou falando de você. Pelo contrário, você é a melhor parceira que eu poderia ter.♡"
41120-153 = "Bem, bem... eu nunca imaginei que o RABBIT Squad e o Sensei do Schale se tornariam tão próximos."
41120-154 = "Eu pensei que eles acabariam se ferindo e se afastando naturalmente..."
41120-155 = "Como um 'especialista', o que você acha dessa situação?"
41120-157 = "Saiu do que eu esperava, mas... não deveria ser algo tão surpreendente."
41120-158 = "Fufu... uma resposta tão entediante e típica de você, como sempre."
41120-163 = "......Preciso observar mais de perto."
41120-165 = "Próximo episódio: Oinari-san"
