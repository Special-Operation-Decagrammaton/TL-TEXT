[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 10/06.
41120-1 = "Episódio 12: Uma Fatura Encharcada"
41120-2 = "Conselho Estudantil Geral - Sala de Recepção"
41120-6 = "……O que significa isso?"
41120-7 = "[s] \"Desculpa atrapalhar, sei que você tá atolada, mas eu preciso que você dê uma olhada nisso, Rin-chan...\""
41120-8 = "Uma 'Proposta de orçamentação e reparo emergencial para a infraestrutura do Parque dos Coelhinhos'...?"
41120-9 = "……Em tese, não há motivo para eu me opor ao reparo de um parque utilizado pela comunidade."
41120-10 = "No entanto... Esse reparo possui alguma ligação direta com as atividades oficias da Schale?"
41120-11 = "[s] \"Oficialmente? Não, mas...\""
41120-12 = "Sendo assim... Isso seria uma manobra para beneficiar as alunas da SRT?"
41120-16 = "……O seu silêncio já é uma resposta afirmativa."
41120-17 = "A Kaya me passou o relatório completo. O esquadrão rebelde da SRT que recusou a transferência para a Valkyrie... Elas estão acampadas nesse parque, e o Sensei tem atuado como patrocinador silencioso delas."
41120-18 = "Eu não tenho intenção de policiar as suas atitudes. A Schale tem autonomia e liberdade operacional, afinal..."
41120-19 = "Mas da minha posição como Presidente interina, eu não posso fornecer recursos oficiais para incentivar que elas continuem ocupando aquele parque."
41120-20 = "[s] \"……Porque elas tão ocupando uma área de convivência dos cidadãos?\""
41120-21 = "Não. Aquele parque fica em uma região periférica, e a circulação de civis ali é quase nula."
41120-22 = "Para ser exata, ele já estava com ordem de demolição marcada para um futuro próximo."
41120-23 = "Mas, independente disso..."
41120-29 = "……A SRT era uma organização especial, munida de privilégios absolutos concedidos pela própria Presidente para suprimir criminosos com força letal imediata."
41120-30 = "Porém, privilégios desse nível só têm valor se houver um controle estrito e um propósito cristalino. Sem isso, a SRT se torna apenas uma bomba-relógio."
41120-31 = "……E como o senhor bem sabe, não são poucos os membros do Conselho Estudantil que sentem calafrios só de pensar no poder de fogo daquela academia."
41120-32 = "Se houver qualquer indício de que recursos oficiais estão sendo desviados para financiar um esquadrão rebelde e fortemente armado..."
41120-33 = "O Comitê de Administração cairá matando em cima de nós."
41120-34 = "[s] \"E se você tentar jogar um charme neles e dar uma convencida...?\""
41120-38 = "Isso está fora de cogitação."
41120-40 = "Depois disso, bati na porta de vários outros figurões do Conselho Estudantil tentando arrancar alguma ajuda..."
41120-41 = "……E como esperado, todas as portas foram fechadas na minha cara."
41120-44 = "Escritório de Defesa - Sala da Diretora"
41120-46 = "……Ah, compreendo. Então foi por isso que o senhor veio bater à minha porta."
41120-50 = "Imagino o seu cansaço, Sensei. Aceita uma xícara de chá para relaxar?"
41120-51 = "……Hehe. Pela sua expressão, vejo que não é hora para cortesias."
41120-52 = "Entendo perfeitamente que o tempo da Schale é precioso... Gostaria muito de conversar sem pressa, mas..."
41120-56 = "Indo direto ao ponto... Sinto muito, Sensei, mas as minhas mãos também estão atadas neste caso."
41120-57 = "Sob a ótica burocrática, a Academia Especial SRT é uma instituição falida e com as portas fechadas..."
41120-58 = "Se eu aprovar esse orçamento, a manchete amanhã seria: 'Conselho Estudantil repassa verba pública para sustentar exército de escola fantasma'. É politicamente inviável."
41120-59 = "Eu até ponderei se conseguiríamos camuflar o dinheiro sob o pretexto de 'revitalização do parque'... mas também é impossível. Toda aquela zona está marcada no plano diretor para desapropriação e reurbanização."
41120-60 = "O máximo que eu posso fazer pela sua causa é cumprir a minha palavra anterior e não apagar os registros acadêmicos daquelas meninas..."
41120-61 = "Lamento profundamente não poder ser mais útil."
41120-62 = "[s1] \"Não se preocupa. Eu que peço desculpas por te importunar no meio do seu expediente.\"\n[s2] \"O que você já tá fazendo por elas é o suficiente, obrigado mesmo, Kaya.\""
41120-67 = "……Sensei."
41120-68 = "O senhor tem se divertido nesses dias que tem passado com elas?"
41120-69 = "[s] (Eu aceno em confirmação.)"
41120-70 = "Fico imensamente feliz em ouvir isso."
41120-76 = "Então, peço que continue cuidando do nosso Esquadrão RABBIT por mim, está bem?"
41120-81 = "Ah..."
41120-82 = "[s] \"Olha só. Há quanto tempo.\""
41120-83 = "……Que coincidência."
41120-84 = "Veio despachar com a Chefe do Escritório de Defesa também?"
41120-85 = "[s] \"Aham. E você, Kanna? O que te traz aqui?\""
41120-86 = "Eu, ahm..."
41120-87 = "Digamos que seja um assunto de cunho... estritamente pessoal..."
41120-91 = "Sinto muito por tomar seu tempo. Com licença."
41120-99 = "Excelente trabalho, estava aguardando o seu retorno."
41120-103 = "Relaxe os ombros, Kanna. Não mandei chamá-la para uma sessão de tortura psicológica."
41120-104 = "É só um relatório de rotina."
41120-108 = "Diga-me, como anda o cronograma para o projeto da 'Vila dos Coelhinhos'?"
41120-109 = "A respeito disso... a área está infestada de moradores em situação de rua."
41120-110 = "Por conta da resistência deles, as obras de demolição estão bastante atrasadas..."
41120-111 = "……Perdão?"
41120-115 = "Corrija-me se eu estiver errada, mas..."
41120-116 = "A renomada Academia Valkyrie, guardiã da paz e da ordem em Kivotos..."
41120-117 = "Sua famigerada tropa de elite, o Escritório de Segurança Pública, não consegue expulsar um bando de mendigos?"
41120-118 = "M-Mas Senhora, eles estão utilizando um arsenal militar de última geração que não condiz com a realidade das ruas...!"
41120-119 = "Eles nos superam em poder de fogo... Estamos encurraladas..."
41120-120 = "E pra piorar o quadro, o esquadrão renegado da SRT continua entrincheirado naquele parque..."
41120-121 = "Ora, ora... Está insinuando que a culpa dessa incompetência é minha?"
41120-122 = "P-Perdão, Senhora! De forma alguma...!"
41120-130 = "Kanna. Sabe o que eu mais admiro em um parceiro? O senso de responsabilidade."
41120-131 = "Eu arco com os meus deveres, e você arca com os seus. Uma troca justa."
41120-132 = "Mas se você decidir jogar os seus fardos nas costas dos outros..."
41120-133 = "Se a Valkyrie acabar tendo o mesmo destino infeliz da SRT, não diga que eu não avisei."
41120-135 = "……"
41120-136 = "Hehe... Vamos lá, como sou piedosa, lhe darei uma pequena consultoria grátis."
41120-137 = "Já ouviu falar da fábula dos 'Três Gravetos', Kanna?"
41120-138 = "Um graveto sozinho quebra fácil. Mas se você juntar vários, a força deles é inquebrável."
41120-139 = "Se a Segurança Pública não dá conta do recado sozinha, por que não contrata terceiros com... 'interesses em comum'?"
41120-140 = "Você quer dizer... terceirizar o trabalho sujo pra..."
41120-141 = "Xiu. Guarde o final da frase para você. Mulheres sofisticadas não entregam tudo de bandeja."
41120-142 = "S-Sim, senhora..."
41120-143 = "Pois bem. Espero que no seu próximo relatório, você traga notícias que alegrem o meu dia."
41120-148 = "Haaah... Que desgastante. É um inferno estar rodeada de peões que não sabem se mexer no tabuleiro sem que eu segure a mão deles."
41120-149 = "Por que é tão difícil achar gente competente hoje em dia...?"
41120-151 = "……Perdão se deixei a desejar."
41120-152 = "Oh, não, não! Não estava me referindo a você. Pelo contrário, você é a minha lâmina mais afiada e minha parceira perfeita, sabia? ♡"
41120-153 = "Mas mudando de assunto... Quem diria que aquele professorzinho da Schale conseguiria domar as cadetes da RABBIT tão rápido..."
41120-154 = "Eu apostava que eles iam se matar e romper os laços naturalmente..."
41120-155 = "E você, como a minha 'Especialista', o que acha disso tudo?"
41120-157 = "É um desvio fora da curva estatística... mas não chega a ser uma anomalia."
41120-158 = "Hehehe... Continua seca, monossilábica e entediante como sempre. A sua marca registrada."
41120-163 = "……Acho que eu preciso analisar isso mais de perto."
41120-165 = "Próximo Episódio: Inarizushi"