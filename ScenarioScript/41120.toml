[translation]
41120-1 = "Episódio 12: A Fatura Encharcada"
41120-2 = "Conselho Estudantil – Sala de Recepção"
41120-6 = "……O que é isto?"
41120-7 = "[s] \"Desculpe pela interrupção, queria que a Rin desse uma olhada…\""
41120-8 = "'Proposta de reparo das instalações do 'Parque dos Coelhinhos', danificadas pela inundação'…"
41120-9 = "……Não tenho objeções ao reparo de um parque público."
41120-10 = "Mas isso é necessário para as atividades da Schale?"
41120-11 = "[s] \"Não exatamente…\""
41120-12 = "Então… é necessário para as alunas da SRT?"
41120-16 = "……O silêncio é a resposta certa."
41120-17 = "Fui informada pela Kaya. As alunas da SRT que se recusaram a ser transferidas para a Valkyrie estão acampadas no parque, e o senhor as apoia, ainda que discretamente."
41120-18 = "Não pretendo criticá-lo por isso. A Schale é uma organização livre…"
41120-19 = "Mas, pela minha posição, não posso aprovar que elas continuem no parque."
41120-20 = "[s] \"…Porque estão ocupando um parque público?\""
41120-21 = "Não. Aquele parque é remoto, quase ninguém o frequenta."
41120-22 = "Na verdade, já estava nos planos demoli-lo em breve."
41120-23 = "Mas, independentemente disso…"
41120-29 = "……De fato, a SRT foi uma organização especial, com privilégios concedidos pela Presidente para combater criminosos rapidamente."
41120-30 = "Mas tais privilégios só têm valor com propósito e método corretos. Do contrário, apenas trazem perigo."
41120-31 = "……Como o senhor sabe, há muitos membros do Conselho que temem o poderio da SRT."
41120-32 = "Se o senhor for visto apoiando-as…"
41120-33 = "A Administração certamente se oporá fortemente."
41120-34 = "[s] \"Você não podia interceder, Rin?\""
41120-38 = "Não."
41120-40 = "Depois disso, tentei pedir ajuda a outros membros do Conselho…"
41120-41 = "……Quase todos foram inúteis."
41120-44 = "Escritório de Defesa"
41120-46 = "……Entendo. Por isso veio aqui."
41120-50 = "Bom trabalho, de qualquer forma. Que tal um chá?"
41120-51 = "……Fufu. Parece que não tem tempo para isso."
41120-52 = "Não, sei que a Schale está ocupada… em outras circunstâncias, gostaria de conversar mais."
41120-56 = "Indo direto ao ponto… sinto muito, mas não poderei ajudar."
41120-57 = "Oficialmente, a SRT já foi fechada…"
41120-58 = "Ajudar alunas de uma escola que 'não existe' diretamente é complicado."
41120-59 = "Pensei em usar o parque como justificativa, mas também é difícil. Aquela área está destinada à revitalização…"
41120-60 = "O que posso fazer, como já disse, é manter os registros acadêmicos delas…"
41120-61 = "Desculpe não poder ajudar."
41120-62 = "[s1] \"Que nada. Desculpa pelo incômodo.\"\n[s2] \"Já é uma ajuda, obrigado.\""
41120-67 = "……Professor."
41120-68 = "Está gostando de passar o tempo com elas?"
41120-69 = "[s] Assinto."
41120-70 = "Que bom."
41120-76 = "Então, continue cuidando do Esquadrão RABBIT."
41120-81 = "Ah…"
41120-82 = "[s] \"Quanto tempo.\""
41120-83 = "……Que coincidência encontrá-lo novamente."
41120-84 = "O senhor também tem assunto com a Diretora do Escritório de Defesa?"
41120-85 = "[s] \"Sim, e você, Kanna?\""
41120-86 = "Eu… bem…"
41120-87 = "Digamos que é um assunto pessoal…"
41120-91 = "Desculpe a demora. Até logo."
41120-99 = "Bom trabalho, estava esperando."
41120-103 = "Kanna, não fique tão tensa. Não a chamei para maltratá-la."
41120-104 = "É apenas uma verificação do andamento."
41120-108 = "Então, como está a revitalização da 'Vila dos Coelhinhos'?"
41120-109 = "É que há muitos moradores de rua na área…"
41120-110 = "A demolição dos prédios está um pouco atrasada…"
41120-111 = "……Hã?"
41120-115 = "Quer dizer então que…"
41120-116 = "A Academia Valkyrie, responsável pela segurança de Kivotos…"
41120-117 = "Sua elite, o Bureau de Segurança, está com dificuldades para despejar andarilhos?"
41120-118 = "M-mas eles estão armados com armas de fogo incomuns…!"
41120-119 = "Nosso armamento não consegue competir…"
41120-120 = "Além disso, as alunas da SRT ainda estão no parque…"
41120-121 = "Ora, então a culpa é minha?"
41120-122 = "M-mil perdão! Não foi isso que quis dizer…!"
41120-130 = "Kanna, adoro pessoas responsáveis."
41120-131 = "Cada um de nós tem suas responsabilidades."
41120-132 = "Se, por acaso, o senhor abandonar a sua…"
41120-133 = "Mesmo que a SRT acabe como está, não terei o que dizer."
41120-135 = "……"
41120-136 = "Fufu, então vou dar um conselho."
41120-137 = "Conhece a história das 'três flechas'?"
41120-138 = "Uma flecha sozinha se quebra facilmente. Mas várias juntas são mais difíceis de quebrar."
41120-139 = "Se o Bureau sozinho não está dando conta, que tal chamar 'pessoas com interesses em comum'?"
41120-140 = "Isso quer dizer…"
41120-141 = "Ora, dizer tudo não é 'elegante'."
41120-142 = "S-Sim…"
41120-143 = "Então, espero notícias melhores na próxima vez."
41120-148 = "Haaah… é triste como há poucas pessoas confiáveis."
41120-149 = "Não tenho sorte com pessoal…"
41120-151 = "……Desculpe se não fui útil."
41120-152 = "Que nada, não é sobre o senhor. Pelo contrário, é meu melhor parceiro ♡"
41120-153 = "Ora, ora… não imaginava que o Esquadrão RABBIT e o Professor da Schale ficariam tão próximos."
41120-154 = "Achei que se machucariam mutuamente e se afastariam naturalmente…"
41120-155 = "Como 'especialista', o que acha dessa situação?"
41120-157 = "Fugiu da previsão, mas… não é surpreendente."
41120-158 = "Fufu… resposta monótona, bem típica sua."
41120-163 = "……Vou ter que observar mais de perto."
41120-165 = "Próximo Episódio: Inarizushi"