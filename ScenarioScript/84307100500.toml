[translation]
84307100500-6 = "Como esperado, foi num piscar de olhos. Exatamente como calculei. Nem mais rápido, nem mais devagar do que o previsto."
84307100500-7 = "Isso é um elogio?"
84307100500-8 = "Eu pretendia... que fosse um elogio."
84307100500-9 = "Se for para reformular de forma mais precisa... eu confio na sua capacidade de execução de missões. Eu previ que você lidaria com isso rapidamente desta vez também, e você cumpriu com perfeição."
84307100500-13 = "Ah... entendi, entendi."
84307100500-14 = "Vou aceitar esse elogio de bom grado."
84307100500-15 = "Bem, isso é bom, mas... quando entreguei aqueles caras... me perguntaram: 'Por que você está aqui?'."
84307100500-16 = "……E o que você respondeu?"
84307100500-17 = "Eu poderia ter preparado um álibi, se fosse necessário, mas..."
84307100500-18 = "Eu disse: 'É da minha conta, não é?'."
84307100500-19 = "E então?"
84307100500-20 = "Só isso. Foi só o que eu disse."
84307100500-24 = "……Entendo."
84307100500-25 = "E, posso continuar usando este equipamento por mais um tempo? É surpreendentemente bom."
84307100500-26 = "Finalmente estou me acostumando com ele."
84307100500-27 = "Sim. Pode usar como quiser."
84307100500-28 = "Então, conto com você para continuar, Neru."
84307100500-29 = "……No fim das contas, você também mudou um pouco, não é?"
84307100500-33 = "……Isso é..."
84307100500-34 = "Um elogio."
