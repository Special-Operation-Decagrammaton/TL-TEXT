[translation]
84307100500-6 = "やはり一瞬だったわね。計算通りよ。想定より早くも遅くもない。"
84307100500-7 = "それ、褒めてんのか？"
84307100500-8 = "褒めたつもり……だったのだけれど。"
84307100500-9 = "より丁寧に言い換えるのなら……私は貴女の任務遂行能力を信頼している。今回も迅速に処理してくれるだろう、と私は予測を立てて、貴女は完璧にこなした。"
84307100500-13 = "あー……分かった分かった。"
84307100500-14 = "そのお褒めの言葉、素直に受け取ってやるよ。"
84307100500-15 = "まあ、それは良いんだけどよ。奴らを引き渡した時……「君はなぜここに？」って聞かれてな。"
84307100500-16 = "……なんと返したの？"
84307100500-17 = "必要であれば、アリバイを用意するのだけれど――"
84307100500-18 = "「あたしの勝手だろ？」って。"
84307100500-19 = "それで？"
84307100500-20 = "終わりだよ。そんだけ。"
84307100500-24 = "……そう。"
84307100500-25 = "で、この装備、もう少し使っててもいいか？意外と良くてよ。"
84307100500-26 = "やっと手に馴染むようになってきたんだ。"
84307100500-27 = "ええ。好きに使ってもらって構わないわ。"
84307100500-28 = "では引き続きよろしく頼むわ、ネル。"
84307100500-29 = "……なんだかんだ、お前も変わってきたよな。"
84307100500-33 = "……それは。"
84307100500-34 = "褒めてんだよ。"
