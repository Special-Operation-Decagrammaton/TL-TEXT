13320-146 = "私が。"
13320-149 = "殺したんだ。"
13320-152 = "殺したんだ。"
13320-157 = "……この苦しみは、誰にも分かるはずない。"
13320-161 = "何も知らないくせに。"
13320-187 = "ウオオオオオオオオ――！"
13320-188 = "ついに、ついにやったぞ！"
13320-189 = "これこそが、古則の答え！"
13320-197 = "[ns] \"……！\""
13320-198 = "な、何が起きて……？"
13320-199 = "あっちで爆発が！#nっていうか、空が……。"
13320-200 = "……！"
13320-201 = "これは……。 "
13320-205 = "ぐっ……。"
13320-209 = "おい、しっかりしろって監督官！#n寝てる場合じゃないけど！？"
13320-210 = "むーりー、完全に伸びてるー。"
13320-215 = "先生……。"
13320-216 = "ひとまず、列車砲は停止できましたが、今度は何が……？"
13320-217 = "も、もはや列車砲どころじゃなさそうだけど！？"
13320-222 = "[ns] \"ホシノ、ヒナ……！\""
13320-232 = "次回;顕現"
