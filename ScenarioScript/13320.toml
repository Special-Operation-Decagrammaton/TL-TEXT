[translation]
13320-1 = "第32話;唯一の真実（２）"
13320-3 = "雷帝の遺産は厄介だろうけど……先生たちなら、何とかしてくれる。"
13320-4 = "[ruby=あさぎり]朝霧[/ruby]スオウの安全を確保したら、こっちに合流すると思う。#nそれまでおとなしく待ってることね。"
13320-5 = "……最初からこれで良かったって、#nあなたも分かっているんじゃないの？"
13320-9 = "……。"
13320-10 = "知ったような口ぶりだね、風紀委員長ちゃん。"
13320-12 = "でも、最初から絶対って言い切れた？"
13320-13 = "すべてが思い通りに行くわけがない。むしろ、思い通りに行かないことのほうが多い。"
13320-14 = "……。"
13320-15 = "亡くなった人は蘇らないし。"
13320-16 = "過去は変えられない。"
13320-17 = "ユメ先輩の死が、決し[ruby=くつがえ]て覆ら[/ruby]ないように。"
13320-18 = "それは……。"
13320-19 = "……どうして？"
13320-20 = "なんで、先輩が死ななくちゃいけなかったの？"
13320-21 = "一体どこから間違えちゃったんだろ……あんな最期になるなんて……。"
13320-22 = "……ねぇ、どうして？"
13320-23 = "（幻覚を見ている……？）"
13320-24 = "手帳、手帳は？"
13320-25 = "……？"
13320-30 = "どこ？"
13320-31 = "先輩が言う「あそこ」って？"
13320-32 = "いったい、あの手帳には何が書いてあるの？"
13320-33 = "……？"
13320-34 = "私はずっと、最後の言葉を知らないまま生きていくの……？"
13320-35 = "（……明らかに様子がおかしいわ） "
13320-37 = "オオッ……あと少し、あと少しだ！"
13320-38 = "邪魔者は、もういなくなった。"
13320-39 = "たとえ、手帳が見つかったとしても。"
13320-40 = "小鳥遊ホシノが、梔子ユメの死の真実を知る余地はない。"
13320-41 = "梔子ユメの死は、すでに遠い過去のもの！"
13320-42 = "「死」という絶対的な真実に、我々はたどり着けない。"
13320-43 = "それが不変の真理だからだ！"
13320-52 = "だが、たしかに小鳥遊ホシノはこの世界で死に最も迫った存在となった。#n――キヴォトス最高の神秘、暁に囚われし太陽の神よ！"
13320-53 = "あなたは6つ目の古則の答えへの手がかりとなる。"
13320-54 = "これほどまでの神聖が「死」に晒された時に、#n何が起きるのか見せてくれたまえ！"
13320-55 = "それが、勝利者たる小生に与えられし報酬だ！"
13320-57 = "あの手帳には、書いてあるはずなんだ。"
13320-58 = "（ええ……あなたは真実を知るべき存在です）"
13320-59 = "……そう。必ず、見つけないと。"
13320-60 = "（そこには、長らく欲してきた答えがあるでしょう）"
13320-61 = "ねえ、さっきから誰と会話を……？"
13320-64 = "もう付き合ってられません！#n生徒会は終わりです！"
13320-65 = "あの時、私が怒らなければ……。"
13320-68 = "見て見て、ホシノちゃん。リュックサック型の水筒だって！#n便利そうじゃない？"
13320-69 = "あの時、私が反対しなければ……。"
13320-72 = "そのためにも……まずは先輩、これを受け取ってください。"
13320-74 = "うん……？"
13320-75 = "あの時、私が生徒会に入らなければ……。"
13320-78 = "待って！"
13320-82 = "……ひんっ！？"
13320-90 = "あの時、私が手を差し出さなければ……。"
13320-93 = "住民の皆さん！"
13320-94 = "署名をお願いします！"
13320-95 = "……。"
13320-96 = "そもそも、私がいなければ――"
13320-97 = "――ユメ先輩は、死なずに済んだ。"
13320-105 = "……あぁ。"
13320-106 = "――やっぱり。"
13320-107 = "ユメ先輩を殺したのは――"
13320-110 = "――私だ。"
13320-115 = "私のせいだ。"
13320-116 = "私が殺したんだ。"
13320-125 = "私が、私が……私が。"
13320-129 = "私が。"
