[translation]
13320-1 = "Episódio 32; A Única Verdade (2)"
13320-3 = "O legado do Imperador do Trovão deve ser um problema, mas... se forem o Sensei e os outros, eles darão um jeito."
13320-4 = "Assim que garantirmos a segurança de Asagiri Suou, acho que ela se juntará a nós. #nAté lá, fique quieta e espere."
13320-5 = "……Você não acha, lá no fundo, que era melhor ter feito assim desde o começo?"
13320-9 = "……."
13320-10 = "Você fala como se soubesse de tudo, senhorita presidente do Comitê Disciplinar."
13320-12 = "Mas, você poderia ter afirmado com certeza desde o início?"
13320-13 = "Nem tudo sai como planejado. Na verdade, é mais comum que as coisas não saiam como queremos."
13320-14 = "……."
13320-15 = "Os mortos não ressuscitam."
13320-16 = "O passado não pode ser mudado."
13320-17 = "Assim como a morte da veterana Yume nunca poderá ser revertida."
13320-18 = "Isso é……."
13320-19 = "……Por quê?"
13320-20 = "Por que a veterana teve que morrer?"
13320-21 = "Onde foi que tudo deu errado... para acabar daquele jeito..."
13320-22 = "……Ei, por quê?"
13320-23 = "（Estou tendo alucinações...?）"
13320-24 = "O caderno, onde está o caderno?"
13320-25 = "……?"
13320-30 = "Onde?"
13320-31 = "O que a veterana quis dizer com \"lá\"?"
13320-32 = "Afinal, o que está escrito naquele caderno?"
13320-33 = "……?"
13320-34 = "Vou viver para sempre sem saber quais foram suas últimas palavras...?"
13320-35 = "（...Ela claramente não está bem.）"
13320-37 = "Oh... só mais um pouco, só mais um pouco!"
13320-38 = "Os obstáculos já se foram."
13320-39 = "Mesmo que o caderno seja encontrado."
13320-40 = "Não há margem para Takanashi Hoshino descobrir a verdade sobre a morte de Kuchinashi Yume."
13320-41 = "A morte de Kuchinashi Yume já é um passado distante!"
13320-42 = "Nós não podemos alcançar a verdade absoluta chamada \"morte\"."
13320-43 = "Pois essa é uma verdade imutável!"
13320-52 = "Mas, certamente, Takanashi Hoshino tornou-se a existência que mais se aproximou da morte neste mundo. #n—— Ó, o maior mistério de Kivotos, o deus do sol aprisionado no amanhecer!"
13320-53 = "Você é a pista para a resposta do sexto princípio antigo."
13320-54 = "Mostre-me o que acontece quando uma divindade tão sagrada é exposta à \"morte\"!"
13320-55 = "Essa é a recompensa dada a mim, o vitorioso!"
13320-57 = "Deveria estar escrito naquele caderno."
13320-58 = "（Sim... você é alguém que deve saber a verdade.）"
13320-59 = "……É verdade. Eu preciso encontrar, custe o que custar."
13320-60 = "（Lá, você encontrará a resposta que tanto desejou por tanto tempo.）"
13320-61 = "Ei, com quem você está conversando desde agora...?"
13320-64 = "Eu não aguento mais! #nO conselho estudantil acabou!"
13320-65 = "Se eu não tivesse ficado com raiva naquela época..."
13320-68 = "Olha só, Hoshino-chan. É uma garrafa de água em formato de mochila! #nNão parece útil?"
13320-69 = "Se eu não tivesse me oposto naquela época..."
13320-72 = "Para isso... primeiro, veterana, por favor, aceite isto."
13320-74 = "Hm...?"
13320-75 = "Se eu não tivesse entrado para o conselho estudantil naquela época..."
13320-78 = "Espere!"
13320-82 = "……Hii!?"
13320-90 = "Se eu não tivesse estendido a mão naquela hora..."
13320-93 = "Cidadãos!"
13320-94 = "Por favor, assinem a petição!"
13320-95 = "……."
13320-96 = "Para começo de conversa, se eu não estivesse lá—"
13320-97 = "—A Sempai Yume não teria morrido."
13320-105 = "……Ah."
13320-106 = "—Eu sabia."
13320-107 = "Quem matou a Sempai Yume foi—"
13320-110 = "—Eu."
13320-115 = "A culpa é minha."
13320-116 = "Fui eu que matei."
13320-125 = "Eu, eu... eu."
