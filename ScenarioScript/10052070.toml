10052070-71 = "……."
10052070-72 = "Não se preocupe, Himari-senpai. Nós o protegeremos."
10052070-73 = "Ah, irmã! ?"
10052070-74 = "Não podemos ficar parados assim, certo? #nNossos trajes enfatizam a segurança, para que possamos lidar com isso!"
10052070-75 = "Mesmo que todos estejam trabalhando duro, não podemos apenas nos divertir!"
10052070-76 = "Tanto Momoi quanto Midori deram o seu melhor em outras áreas, certo?"
10052070-77 = "Neste momento, a minha única função é permanecer na nave de transporte..."
