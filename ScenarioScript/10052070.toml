[translation]
10052070-1 = "Chesed: O Árbitro que condena com dor misericordiosa."
10052070-2 = "Hima, muuuuitooooooooooooooooo! !"
10052070-3 = "Tudo começou de novo. Irmã, não é hora de dizer coisas assim."
10052070-4 = "Porque somos os únicos que ficam em casa, certo? A professora também foi!"
10052070-5 = "Não estou aqui para brincar. Você esqueceu que está no meio do território inimigo?"
