[translation]
84304100600-5 = "Muito obrigada... você me salvou."
84304100600-6 = "É bom se esforçar nos treinos, mas tente manter seu próprio ritmo..."
84304100600-10 = "N-não é isso!"
84304100600-11 = "É verdade que eu tinha colocado uma configuração um pouco mais pesada, mas..."
84304100600-12 = "Originalmente não era tão rápido assim. A velocidade mudou sozinha no meio do caminho."
84304100600-13 = "Mudou sozinha...?"
84304100600-14 = "Não pode ser... Infelizmente, essa função não está instalada no aparelho."
84304100600-16 = "(Infelizmente?)"
84304100600-17 = "...Infelizmente?"
84304100600-18 = "Que estranho, será que houve algum tipo de defeito?"
84304100600-19 = "Hmm..."
84304100600-24 = "Tsc, eu achei que tinha dado certo..."
84304100600-25 = "Mas não foi quase um sucesso? Antes, não adiantou nada aumentar a intensidade. Ela se esforçou o suficiente."
84304100600-29 = "Hm...?"
84304100600-34 = "Será que é um problema com o alvo...? Se não fosse por aquela pessoa usando roupa de treino!"
84304100600-35 = "Pois é! Não importa o quanto a gente aumente a intensidade da máquina, ela dá conta de tudo!"
84304100600-36 = "Bom, fizemos o que nos pediram, vamos embora logo."
84304100600-37 = "Tudo bem? Não deveríamos ficar de olho até o fim?"
84304100600-38 = "Isso não estava no contrato, não é? Não temos obrigação de fazer nada além do combinado. Além disso, seria um problema se nos descobrissem aqui."
84304100600-39 = "É verdade..."
84304100600-40 = "Vamos, andando. Enquanto todos estão distraídos com aquela mulher grandalhona."
84304100600-41 = "Rápido."
84304100600-47 = "...Hã?"
84304100600-48 = "No fim das contas, era exatamente como você disse."
84304100600-52 = "Você ouviu a conversa agora pouco, né?"
84304100600-57 = "Sim, finalmente conseguimos pegar eles no flagra."
84304100600-58 = "É. Finalmente."
84304100600-59 = "Vamos atrás deles."
84304100600-60 = "Vou acabar logo com essa dor de cabeça."
