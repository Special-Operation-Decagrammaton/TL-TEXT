[translation]
84304100600-5 = "ありがとうございます……助かりました。"
84304100600-6 = "トレーニングを頑張るのは良いことですが、ご自分のペースを……。"
84304100600-10 = "ち、違います！"
84304100600-11 = "た、たしかに、ややキツめの設定にはしていましたが……"
84304100600-12 = "元々はこんなに速くありませんでした。途中から勝手に速度が変わって。"
84304100600-13 = "勝手にスピードが……？ "
84304100600-14 = "まさか……その機能は残念ながら搭載されていないのですが。"
84304100600-16 = "（残念ながら？）"
84304100600-17 = "……残念ながら？"
84304100600-18 = "おかしいですね、何か不具合でも起きたのでしょうか。"
84304100600-19 = "ふーん……。"
84304100600-24 = "チッ、成功したと思ったのに……。"
84304100600-25 = "でもほぼ成功じゃない？さっきはすごい強度にしても意味なかったじゃん。十分頑張ったって。"
84304100600-29 = "ん……？"
84304100600-34 = "ターゲットの問題か……？トレーニングの服を着てるあいつさえいなければ！"
84304100600-35 = "そうそう！あの人、いくらマシンの強度を上げても普通にこなすんだもん！"
84304100600-36 = "まあ、やれと言われたことはやったしそろそろ帰ろうぜ。"
84304100600-37 = "いいのかな？最後まで見守らなくて。"
84304100600-38 = "それは契約になかっただろ？契約外のことをしてやる義理もないし。というか、このままいてバレた時の方が面倒だ。"
84304100600-39 = "たしかに……。"
84304100600-40 = "ほら、行くよ。みんながあのデカい女に気を取られてるうちに。"
84304100600-41 = "早く。"
84304100600-47 = "……へぇ？"
84304100600-48 = "結局、お前の言った通りか。"
84304100600-52 = "今の会話、聞こえてたよな？"
84304100600-57 = "ええ、ようやく尻尾を掴んだようね。"
84304100600-58 = "ああ。やっとだ。"
84304100600-59 = "追うぞ。"
84304100600-60 = "こんな面倒事、さっさと終わらせてやる。"
