[translation]
84303100300-6 = "待たせたね。"
84303100300-7 = "どうかしたのかい？"
84303100300-8 = "不審な場所を見つけたの。調査に向かってもらえるかしら。"
84303100300-9 = "フィットネスセンターか？"
84303100300-13 = "……いや、違うな。そちらにはネルが向かうはず。どこか異なる、新しい場所か。"
84303100300-14 = "ええ。向かってくれるかしら。"
84303100300-15 = "私に、その資格があるのであれば、喜んで。"
84303100300-19 = "……済まない、特に深い意味があるわけではないから気にしないでくれ。目的地は？"
84303100300-20 = "気にしなくて大丈夫よ。ありがとう。#n向かってほしいのは……「ゲーム開発部」よ。"
84303100300-21 = "分析通りなら、そこで何か起きるはず。"
84303100300-22 = "すぐに出発しよう。"
84303100300-26 = "……リオ。"
84303100300-27 = "なにかしら。"
84303100300-28 = "その……。"
84303100300-29 = "礼を言う。"
84303100300-33 = "……お礼を言われるようなことではないと思うのだけれど。"
84303100300-34 = "……頼んだわ。"
