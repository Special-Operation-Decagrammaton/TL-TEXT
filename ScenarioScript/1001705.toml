[translation]
1001705-1 = "Cherino tem nove anos?"
1001705-2 = "Rua Comercial do Distrito 3 de Kivotos"
1001705-3 = "Você está atrasado, camarada!"
1001705-4 = "Fazer-me esperar merece uma sentença de cem anos de confinamento no prédio antigo da escola! É expurgo!"
1001705-5 = "……Mas!"
1001705-6 = "Como você vai me comprar um pudim hoje, vou te perdoar desta vez. Sinta-se honrado, camarada!"
1001705-7 = "Aliás, posso pedir o quanto eu quiser hoje? Posso pedir o maior pudim da loja?"
1001705-8 = "[s] \"Ah, sim, pode. Você comeu todo o seu pimentão, afinal.\""
1001705-9 = "Fufufu…… então, vou comer pudim até o limite do cartão do camarada ser atingido!"
1001705-10 = "Eu me esforcei muito, então mereço esse direito!"
1001705-14 = "Ham, nham nham……."
1001705-15 = "Ahhh…… o pudim daqui é realmente delicioso! Sinto que poderia comer sem parar!"
1001705-16 = "Claro, o pudim feito na cantina da Academia Red Winter também é bom, mas este aqui é..."
1001705-17 = "Muito bem, agora mais um……"
1001705-18 = "Paku, nham nham……."
1001705-21 = "Ora, que menina adorável. Veio com seus pais?"
1001705-22 = "O, o que você quer dizer com isso!?"
1001705-23 = "N-não, o camarada não é meu pai, é o Sensei! Não se engane!"
1001705-24 = "Ah, perdão. Você é uma aluna, então…… #nComo está sendo a escola primária?"
1001705-25 = "Es-escola primária!?"
1001705-26 = "Quantos anos você acha que eu tenho!? Eu sou a Presidente do Conselho Estudantil da Academia Red Winter, a Secretária-Geral, e a Cherino-sama responsável por todas as coisas importantes por aqui!"
1001705-27 = "Po-pode até ser que eu seja um pouco baixa, mas…… você não consegue sentir a aura de adulta que emana de todo o meu corpo!?"
1001705-28 = "Ah, é mesmo? Sinto muito! É que estamos fazendo um evento hoje, então acabei me confundindo."
1001705-29 = "Um evento……? Do que você está falando?"
1001705-30 = "Hoje é o aniversário de 10 anos da nossa loja. Por isso, estamos distribuindo biscoitos para crianças menores de 10 anos."
1001705-31 = "Bi-biscoitos?"
1001705-35 = "(Falando em biscoitos de Oiseau Brûlé, são iguarias artesanais de luxo…… e que normalmente não são vendidos, sendo itens raros difíceis de conseguir mesmo pagando…… e eles estão dando de graça?)"
1001705-36 = "(E, de acordo com Tomoe, que já comeu antes, eles são tão deliciosos quanto o pudim……)"
1001705-37 = "(Não posso deixar essa oportunidade escapar!)"
1001705-38 = "(Ma-mas, fingir ser uma criança por causa de biscoitos fere meu orgulho como Presidente do Conselho Estudantil da Red Winter…… o que eu devo fazer……?)"
1001705-40 = "(……Ah, que se dane!)"
1001705-42 = "Ha, haha! Nesse caso, eu também tenho o direito de receber esse biscoito. Vamos, passe o biscoito para cá."
1001705-43 = "Eh? Mas você não disse agora pouco que era a Presidente do Conselho Estudantil da Academia Red Winter……."
1001705-44 = "Is-isso é porque…… eu pulei séries!"
1001705-45 = "Sou um gênio que já resolvia equações diferenciais quando ainda estava aprendendo a engatinhar — pular direto para o ensino médio não é nada!"
1001705-46 = "Sendo assim, vou pegar meu biscoito!"
1001705-47 = "Mas……."
1001705-48 = "Po-por que você está hesitando? Eu não disse que tenho nove anos!?"
1001705-49 = "Eu quero o biscoito, biscoito!! Biscoito!!!"
1001705-52 = "……Aquela ali é a Presidente Cherino, não é? #nPor que ela está fazendo birra em um lugar desses?"
1001705-53 = "Eu já sabia que ela era infantil, mas vê-la em uma situação tão vergonhosa…… até eu me sinto envergonhada só de olhar."
1001705-54 = "É, eu não gostaria que ninguém soubesse que sou aluna da academia onde alguém assim é a presidente……."
1001705-55 = "…………."
1001705-56 = "Expurgo…… é expurgo……!"
1001705-58 = "Todos nesta loja, serão expurgados!!!"
1001705-63 = "Depois disso, consegui acalmar Cherino, que estava causando um alvoroço disparando balas para todo lado, e voltamos para a Academia Red Winter."
