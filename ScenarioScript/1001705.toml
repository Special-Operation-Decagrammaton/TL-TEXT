[translation]
1001705-1 = "チェリノは九歳？"
1001705-2 = "キヴォトス・3丁目商店街"
1001705-3 = "遅いぞ、カムラッド！"
1001705-4 = "おいらを待たせるなど、旧校舎に百年閉じ込める刑に値する！粛清だ！"
1001705-5 = "……しかし！"
1001705-6 = "今日はおいらにプリンを買ってくれるということだから、特別に許してやろう。光栄に思え、カムラッド！"
1001705-7 = "ところで、今日は好きなだけ頼んで良いのか？店で一番大きいプリンを頼んでも？"
1001705-8 = "[s] \"あ、うん、良いよ。ちゃんとピーマン食べられたもんね。\""
1001705-9 = "ふふふ……それでは、カムラッドのカードが限度額に達するまでプリンを食べるとしよう！"
1001705-10 = "おいらは頑張ったのだから、その資格があるのだ！"
1001705-14 = "はむっ、もぐもぐ……。"
1001705-15 = "はぁーっ……ここのプリンは本当に美味しいな！いくらでも飽きずに食べられそうだ！"
1001705-16 = "もちろんレッドウィンター連邦学園の食堂で作られるプリンも美味しいが、これはこれで……"
1001705-17 = "さあ、ではもう一つ……"
1001705-18 = "ぱくっ、もぐもぐ……。"
1001705-21 = "あら、可愛いお嬢さんですね。親御さんと一緒に来たの？"
1001705-22 = "ど、どういうことだ！？"
1001705-23 = "ち、違う、カムラッドはおいらの親ではなく、先生なのだ！勘違いするな！"
1001705-24 = "あらら、ごめんなさい。生徒さんだったのね……。#nどう、小学校は楽しい？"
1001705-25 = "しょ、小学校だと！？"
1001705-26 = "おいらをいったい何歳だと思っているのだ！おいらはレッドウィンター連邦学園の書記長であり、生徒会長であり、あれこれとすごいことを全て任されている、チェリノ様だぞ！"
1001705-27 = "た、確かに背は少し低いかもしれないが……この全身から漂う大人の雰囲気が感じられないのか！"
1001705-28 = "あらそうだったの、それはごめんなさいね！今日はイベントをやっているものだから、つい勘違いしてしまったわ。"
1001705-29 = "イベント……だと？それは何の話だ？"
1001705-30 = "今日はうちのお店が開店して10周年なの。それで、10歳未満の子供たちにクッキーを配るイベントをやっているのよ。"
1001705-31 = "ク、クッキー？"
1001705-35 = "（ルワゾー・ブッレのクッキーといえば手作りの高級品……しかも普段は売られていない、お金を払っても手に入れることが難しい貴重な品……それを、無料でくれるだと？）"
1001705-36 = "（しかも、以前に食べたことがあるトモエの話によると、プリンに次ぐ美味しさだとか……）"
1001705-37 = "（この機会を逃すわけにはいかない！）"
1001705-38 = "（し、しかし、クッキーのために子供のふりをするのは、レッドウィンターの生徒会長としてのプライドが……これは、どうすれば……？）"
1001705-40 = "（……ええいっ、知ったことか！）"
1001705-42 = "は、ははっ！それなら私にも、そのクッキーをもらう資格があるな。さあ、クッキーをこちらに。"
1001705-43 = "え？でもさっき確か、レッドウィンター連邦学園の生徒会長だって……。"
1001705-44 = "そ、それはだから……飛び級をしたんだ！"
1001705-45 = "ハイハイが出来るようになる頃には、すでに微分方程式を解いていたほどの天才だからな――高校への飛び級ぐらい、なんということはない！"
1001705-46 = "というわけで、クッキーをもらうとしよう！"
1001705-47 = "でも……。"
1001705-48 = "ど、どうして渋るんだ、おいらは九歳だと言っているではないか！"
1001705-49 = "クッキー欲しい、クッキー！！クッキー！！！"
1001705-52 = "……あそこにいらっしゃるの、チェリノ会長ですよね？#nどうしてこんなところで愚図ってらっしゃるんでしょうか？"
1001705-53 = "元々子供っぽい人だとは思っていましたが、あんな恥ずかしいお姿を……見ているこちらの方が恥ずかしくなってしまいますね。"
1001705-54 = "ええ、あんな方が生徒会長をしている学園の生徒だなんて、周りにバレたくないですね……。"
1001705-55 = "…………。"
1001705-56 = "粛清……粛清だ……っ！"
1001705-58 = "このお店にいるやつら、全員粛清だぁ！！！"
1001705-63 = "その後、銃弾をまき散らして暴れるチェリノをどうにか宥めて、レッドウィンター連邦学園に戻った。"
