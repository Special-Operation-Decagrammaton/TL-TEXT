10005005-5 = "……OK."
10005005-11 = "Golden Fleece - Sala de Máquinas"
10005005-14 = "……Sabe, não foi fácil demais?"
10005005-15 = "Infiltrar-se secretamente no navio de cruzeiro de outra escola……."
10005005-16 = "Foi minha primeira vez fazendo algo assim, mas fico feliz que tenha dado certo."
10005005-17 = "Ao que parece, ninguém percebeu nada ainda."
10005005-18 = "Fufu, parece que tudo está correndo sem problemas, não é?"
10005005-19 = "……Haa."
