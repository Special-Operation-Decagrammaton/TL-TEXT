[translation]
10005005-1 = "プロローグ;C&Cの新たな臨時メンバー"
10005005-3 = "……こちら問題無し。"
10005005-4 = "……私の方も、問題ありません。"
10005005-5 = "……OK。"
10005005-11 = "ゴールデンフリース号・機関室"
10005005-14 = "……なんか、あっけねえな？"
10005005-15 = "他の学校のクルーズ船に、こっそり乗り込む……。"
10005005-16 = "初めての体験だったけど、上手くいって良かった。"
10005005-17 = "どうやら、特にまだ気づかれた様子もありませんし。"
10005005-18 = "ふふっ、どうやら問題なく進んでいるみたいですね？"
10005005-19 = "……はぁ。"
10005005-20 = "そもそも「問題」って言うんなら、この依頼自体最初っから問題だらけだろうがよ……。"
10005005-21 = "あー、気に入らねぇー……。"
10005005-22 = "あの会計に従うのも、こうしてひそひそと隠れて動かなきゃなんねえのも……"
10005005-23 = "何より……！"
10005005-24 = "（ジロッ）"
10005005-25 = "[s1] \"よろしくね。\"\n[s2] \"どうしたの？\""
10005005-26 = "先生がこうして一緒に来てんのが一番意味分かんねぇ！？監視とか邪魔なだけだっての！"
10005005-27 = "先生がこうして一緒に来てんのが一番意味分かんねぇ！？監視とか邪魔なだけだっての！"
10005005-28 = "[s] \"うーん、まあ監視というか何と言うか……。\""
10005005-29 = "あはは……すみません、リーダーも決して「一緒なのが嫌」と言っているわけでは無いのですが……。"
10005005-30 = "まあ、セミナー側の都合でこうなっているわけですし……。"
10005005-31 = "今さら何を言っても仕方ない。先生が悪いわけでもないんだし。"
10005005-32 = "あーもうめんどくせぇ！"
10005005-33 = "こっちのやり方にいちいち口出してくんじゃねえよあいつ、勝手にさせろっての……！"
10005005-34 = "まあ、仕方ありませんね……。"
10005005-35 = "ふぅ……。"
10005005-36 = "まあ、何と言うか……。"
10005005-37 = "「発端は私たちのせいではない」と言ったら、嘘になるし……。"
10005005-39 = "（時間はさかのぼり、二日前……）"
10005005-42 = "……はい、こちらC&Cのアカネです。"
10005005-43 = "聞こえていますでしょうか？"
10005005-44 = "OK、聞こえてるわ。"
10005005-45 = "じゃあ本題なんだけど、はぁ……。"
10005005-46 = "ふふっ、いつも通りのご依頼ですか？"
10005005-47 = "そんなにため息をつきながら、依頼の話をしなくても……依頼は最終的にいつも達成してるじゃないですか？"
10005005-48 = "それは分かってるけど！だからこうしてまた依頼してるんだけど！問題はその後！！"
10005005-49 = "忘れたとは言わせないわよ、毎回誰が後始末をしているのか……「静かに処理して」って言ってるのに、毎度のごとく全然聞いてくれないじゃないの……。"
10005005-50 = "いつもいつも物を壊すわ、建物を吹っ飛ばすわ……請求書の額が毎回いくらになってるか分かってる！？"
10005005-51 = "ほんっと頭痛の種なのよね……先月も、本来の予算の6倍くらいかかってたし……それでもまあ、頼りにしてるというか、せざるを得ないというか……。"
10005005-52 = "……でもね、"
10005005-53 = "いつまでも頭を抱えてるだけの私じゃないわよ。"
10005005-54 = "……？それはどういう……？"
10005005-55 = "今回の依頼、ひとり同行者を付けてもらうわ。"
10005005-60 = "あなたたちが暴れ過ぎないように、ブレーキ役と言えば良いのかしら。まあ、あなたたちもよく知っているはずだから心配しないで。"
10005005-61 = "毎度のごとく膨れ上がる被害が、本当に仕方のないことなのか……その確認くらいは、させてもらわないとね？"
10005005-62 = "えっと、それは……？"
10005005-63 = "……あら？"
10005005-67 = "先生？"
10005005-69 = "あー、ったくやってらんねぇ……。"
10005005-70 = "まさか、こんなことになるとは……。"
10005005-71 = "ったく、ちっと物が壊れたり建物が崩れたくらいで何だよ……？"
10005005-72 = "依頼は達成できてるんだし、その後始末はあっちの役割だろうが。"
10005005-73 = "あー……なんか思い出したら腹立ってきた。わざと色々ぶっ壊しながら進むか？"
10005005-74 = "いや、リーダー流石にそれは……ここは、ミレニアムの領域外だし……。"
10005005-75 = "そうですよ、学校間のトラブルなんて無いに越したことはありません。"
10005005-76 = "んなことあたしの知ったことかよ……いざとなったら全部吹っ飛ばせば良いんだろ？"
10005005-77 = "とにかく大体のことはぶっ壊せば解決、それで終わり。"
10005005-78 = "[s3] \"ストップストップ。\"\n[s4] \"その前にもうちょっと頑張ってみない？\""
10005005-79 = "……あぁ？"
10005005-80 = "……あぁ？"
10005005-86 = "んだよ、何か文句でもあんのか？"
10005005-87 = "それとも先生は、あの会計の肩を持つつもりか？"
10005005-88 = "[s5] \"とにかくダメ。\"\n[s6] \"ネルはやろうと思えば静かにできるでしょ？\""
10005005-89 = "……はぁ？"
10005005-90 = "……はぁ？"
10005005-91 = "えぇ……。"
10005005-95 = "あ～……ったくなんでこう……ぐっ……あぁー……。"
10005005-96 = "……ああもう、分かった分かった！おとなしくやりゃあ良いんだろ……。"
10005005-97 = "あーもう、だからやってらんねぇんだっての……なんだこのやわっこい雰囲気はよぉ……。"
10005005-102 = "……おぉ。"
10005005-103 = "アカネ、すごいことが起きてる。"
10005005-104 = "そうですね、私も同じことを思っていました。このやり方でどう変わるのかと半信半疑でしたが……。"
10005005-105 = "ふふっ、こんなに話を素直に聞くリーダーは中々見られませんね。"
10005005-106 = "もしかして実際の狙いは監視というより、こうして抑制する方だったのでしょうか？"
10005005-107 = "るせぇなゴチャゴチャと、さっさと行くぞ！ああもう、むしゃくしゃする……。"
10005005-108 = "ふふっ。はい、確かにそろそろ動いた方が良さそうです。"
10005005-109 = "それでは先生、今日は特に戦闘にはならないと思いますが、よろしくお願いしますね。"
10005005-110 = "ああ、そういえばこちらの乗船証を先生にも。今回、私たちと一緒のグループとして招かれている方……という扱いになります。"
10005005-112 = "え、つまりご主人様は私たちと同じチームってこと？"
10005005-113 = "っていうことは実質的に、"
10005005-114 = "C&Cの新メンバーじゃん！！"
10005005-119 = "……？"
10005005-120 = "……はぁ？"
10005005-121 = "C&Cの新メンバー……先生が？"
10005005-122 = "まぁ、一時的にとはいえ、今日はそういうことになるかもしれないけれど……。"
10005005-123 = "ふふっ、確かにそうですね。"
10005005-124 = "では臨時ではありますが、新メンバーということで……同じチームのメンバーなら、仲良くしないといけませんね？"
10005005-126 = "というわけでリーダーも、ちゃんと仲良くしてくださいね。せっかく新メンバーの初陣なんですから、いつまでも不機嫌ではいけませんよ？"
10005005-127 = "いや別に、っていうか仲良くしろって言われたからってそれですぐ「じゃあ仲良くなりました」とかそういうもんじゃねぇだろ！"
10005005-128 = "あははっ、楽しくなってきたね？ほら、リーダーも笑顔笑顔！！"
10005005-129 = "ったく、るせぇなほんとに……。"
10005005-130 = "口ではこうは言ってるけど、今日のリーダーの表情は割と悪くない。むしろ楽しそうだ。"
10005005-131 = "るせぇって言ってんだろうが！あたしはなんも楽しくねぇっての！？"
10005005-132 = "[s7] \"私は結構ワクワクしてる。\"\n[s8] \"じゃああらためて、よろしくね。\""
10005005-135 = "だから……っ！"
10005005-136 = "……ああもうっ！！"
10005005-140 = "……はぁ。"
10005005-141 = "ったく、別に良いけどよ……。"
10005005-144 = "#video;10005"
