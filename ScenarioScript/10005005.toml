10005005-23 = "E acima de tudo……!"
10005005-24 = "(Olhar fixo)"
10005005-25 = "[s1] \"Conto com você.\"\n[s2] \"O que houve?\""
10005005-26 = "O que eu menos entendo é por que o Sensei teve que vir junto!? Ter alguém vigiando só atrapalha!"
10005005-27 = "O que eu menos entendo é por que o Sensei teve que vir junto!? Ter alguém vigiando só atrapalha!"
10005005-28 = "[s] \"Hmm, bem, não é exatamente uma vigilância, ou melhor…….\""
10005005-29 = "Ahaha…… sinto muito. A líder não quer dizer que \"não gosta da sua companhia\"……."
10005005-30 = "Bem, as circunstâncias do Seminar exigiram que fosse assim……."
10005005-31 = "Não adianta reclamar agora. Não é como se fosse culpa do Sensei."
10005005-32 = "Ah, que saco, que irritante!"
10005005-33 = "Não é para ela ficar dando palpite no nosso jeito de trabalhar, era para deixar a gente fazer do nosso jeito……!"
10005005-34 = "Bem, não tem jeito……."
10005005-35 = "Ufa……."
10005005-36 = "Bem, como posso dizer……."
10005005-37 = "Se eu dissesse que \"a culpa não é nossa\", estaria mentindo……."
10005005-39 = "(Voltando no tempo, dois dias atrás……)"
10005005-42 = "……Sim, aqui é a Akane da C&C."
10005005-43 = "Está me ouvindo?"
10005005-44 = "OK, estou ouvindo."
10005005-45 = "Então, sobre o assunto principal, haa……."
10005005-46 = "Fufu, é o pedido de sempre?"
10005005-47 = "Você não precisa suspirar tanto assim ao falar de um pedido…… No final, vocês sempre cumprem a missão, não é?"
10005005-48 = "Eu sei disso! É por isso que estou pedindo de novo! O problema é o que acontece depois!!"
10005005-49 = "Não me venha dizer que esqueceu quem tem que limpar a bagunça toda vez…… Eu peço para \"resolverem silenciosamente\", mas vocês nunca me ouvem……."
10005005-50 = "Sempre quebrando coisas, explodindo prédios…… Você tem noção de quanto custam as faturas que recebo toda vez!?"
10005005-51 = "É uma dor de cabeça constante…… Mês passado, custou seis vezes o orçamento original…… Mas, bem, eu confio em vocês, ou melhor, não tenho outra escolha……."
10005005-52 = "……Mas veja bem,"
10005005-53 = "Eu não sou do tipo que fica apenas de braços cruzados sofrendo."
10005005-54 = "……? O que você quer dizer com isso……?"
10005005-55 = "Para esta missão, vou enviar alguém para acompanhar vocês."
10005005-60 = "Alguém para servir de freio, para garantir que vocês não saiam destruindo tudo. Bem, vocês já conhecem essa pessoa, então não se preocupem."
10005005-61 = "Preciso confirmar se os danos que aumentam toda vez são realmente inevitáveis…… ou não, entende?"
10005005-62 = "Espere, isso é……?"
10005005-63 = "……Oh?"
10005005-67 = "Sensei?"
10005005-69 = "Ah, droga, não dá pra aguentar isso……."
10005005-70 = "Quem diria que as coisas chegariam a esse ponto..."
10005005-71 = "Fala sério, qual é o problema de ter quebrado algumas coisas ou derrubado um prédio...?"
10005005-72 = "A missão foi concluída, a limpeza é problema deles, não é?"
10005005-73 = "Ah... fiquei irritada só de lembrar. Quer saber? Vamos continuar quebrando tudo pelo caminho."
10005005-74 = "Não, líder, isso é demais... Além disso, estamos fora do território do Millennium..."
10005005-75 = "Exatamente, é melhor evitar problemas entre escolas."
10005005-76 = "E eu lá me importo com isso? Se as coisas ficarem feias, é só explodir tudo, não é?"
10005005-77 = "No fim das contas, quase tudo se resolve quebrando, e pronto."
10005005-78 = "[s3] \"Calma, calma.\"\n[s4] \"Por que não tenta se esforçar um pouco mais antes disso?\""
10005005-79 = "……Hã?"
10005005-80 = "……Hã?"
10005005-86 = "O que foi? Tem alguma reclamação?"
10005005-87 = "Ou será que o Sensei pretende ficar do lado daquela tesoureira?"
10005005-88 = "[s5] \"De jeito nenhum.\"\n[s6] \"Neru, você consegue ser discreta se quiser, não consegue?\""
10005005-89 = "……Hã?"
10005005-90 = "……Hã?"
10005005-91 = "Ah..."
10005005-95 = "Ah... droga, por que tem que ser assim... grr... ah..."
10005005-96 = "……Ah, quer saber, tá bom, tá bom! Eu faço do jeito certinho, satisfeito?"
10005005-97 = "Ah, que saco, é por isso que eu não aguento... que clima mais mole é esse...?"
10005005-102 = "……Oh."
10005005-103 = "Akane, algo incrível está acontecendo."
10005005-104 = "Pois é, eu estava pensando a mesma coisa. Eu estava cética sobre como isso mudaria as coisas, mas..."
10005005-105 = "Fufu, não é sempre que vemos a líder ouvir alguém tão obedientemente."
10005005-106 = "Será que o objetivo real não era apenas vigiar, mas sim contê-la dessa forma?"
10005005-107 = "Cala a boca, parem de resmungar e vamos logo! Ah, que raiva..."
10005005-108 = "Fufu. Sim, você tem razão, é melhor começarmos a nos mover."
10005005-109 = "Então, Sensei, não acho que teremos combate hoje, mas conto com você."
10005005-110 = "Ah, falando nisso, aqui está o seu cartão de embarque, Sensei. Você será tratado como alguém convidado para fazer parte do nosso grupo desta vez..."
10005005-112 = "Espera, então o Mestre está no mesmo time que a gente?"
10005005-113 = "Isso significa que, na prática,"
10005005-114 = "O Sensei é o novo membro da C&C!!"
10005005-119 = "……?"
10005005-120 = "……Hã?"
10005005-121 = "Novo membro da C&C... o Sensei?"
10005005-122 = "Bem, embora seja temporário, pode acabar sendo o caso hoje..."
10005005-123 = "Fufu, é verdade."
10005005-124 = "Então, mesmo que seja temporário, como novo membro... membros do mesmo time precisam se dar bem, não é?"
10005005-126 = "Então, líder, por favor, tente se dar bem com ele também. É a estreia do novo membro, não pode ficar de cara feia o tempo todo, né?"
10005005-127 = "Não é isso, quer dizer, só porque mandaram a gente se dar bem, não significa que eu vou dizer 'pronto, agora somos amigos' do nada!"
10005005-128 = "Ahaha, está ficando divertido, não está? Vamos, líder, abre um sorriso!"
10005005-129 = "Fala sério, cala a boca..."
10005005-130 = "Ela diz isso, mas a expressão da líder hoje não está nada mal. Na verdade, parece que ela está se divertindo."
10005005-131 = "Eu disse para calar a boca! Eu não estou me divertindo nada, entendeu!?"
