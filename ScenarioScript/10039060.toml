[translation]
10039060-1 = "第6話;頂上決戦"
10039060-11 = "……今の見た？"
10039060-12 = "すごいスピードだった……。"
10039060-13 = "……うん、カッコ良かったね。"
10039060-14 = "でも……。"
10039060-15 = "バイクに乗ってた人……。"
10039060-16 = "あれ、たぶん……。"
10039060-20 = "……シスターさん、だよね？"
10039060-23 = "（急いでマリーに言われた場所へ向かった）"
10039060-24 = "先生！"
10039060-29 = "[ns1] \"マリー！？\"\n[ns2] \"本当にバイクに……。\""
10039060-35 = "急にお呼び立てして、申し訳ありません……。"
10039060-36 = "……ですが、先生がいてくだされば、最悪の事態は免れるはずです。"
10039060-37 = "ヘルメットは、こちらをお使いください。"
10039060-38 = "[s3] \"分かった、ありがとう。\"\n[s4] バイクの後ろに座る。"
10039060-41 = "しっかりつかまってください、先生！"
10039060-42 = "……では、出発します！"
10039060-50 = "何かあるの？"
10039060-51 = "シスターフッドと救護騎士団が部の存続をかけて決闘するんだって！"
10039060-52 = "えっ、こんな時期に……？"
10039060-53 = "むしろ、今だからじゃない？"
10039060-54 = "え、えっと……どういうことなのでしょう？"
10039060-55 = "いきなり決闘だなんて……。"
10039060-56 = "……なるほど。#n謝肉祭の隙を狙ったのか。"
10039060-57 = "それに決闘なら、すぐに終わる。"
10039060-58 = "なに言ってるの！？#nおかしいわよ！"
10039060-60 = "たしかに、コハルちゃんの言う通りですが……。"
10039060-61 = "……些細な問題から決闘に発展してしまった可能性も否定できません。"
10039060-62 = "ただ話が食い違っているだけという線も考えられますが……。"
10039060-63 = "……ふふっ。#n楽しそうですし、そっとしておきましょうか。"
10039060-64 = "た、楽しそうって……。"
10039060-66 = "この騒ぎは、いったい……。"
10039060-67 = "サクラコ様は？"
10039060-68 = "何度も電話してますが、ずっと繋がりません……。"
10039060-69 = "モモトークも既読が付くだけですし……。"
10039060-70 = "本当に何かが起きて……？"
10039060-71 = "詳細は一部のメンバーにしか知らされていないとかでしょうか……。"
10039060-72 = "私たちとてサクラコ様の考えを、全て理解できているわけではないですから……。"
10039060-73 = "そうだとしても……。"
10039060-74 = "ええ、もし決闘になってしまったら……。"
10039060-75 = "勝ち目がないのでは！？#n相手はあのミネ団長なのですから！"
10039060-76 = "となれば……。"
10039060-77 = "私たちにできることを探さねばなりませんね。"
10039060-78 = "……！"
10039060-80 = "何がどうなっているんでしょう……。"
10039060-81 = "決闘だなんて……ミネ団長から何か聞いてます？"
10039060-82 = "いえ……私も初耳です……。"
10039060-83 = "団長のことですし、あり得ない話ではありませんが……これはいくらなんでも……。"
10039060-84 = "何か誤解があったような気がします……。"
10039060-91 = "わあぁぁ……！み、皆さん、落ち着いてください！"
10039060-92 = "私たちは戦いに来ているわけではないんですよ……！？"
10039060-96 = "……？"
10039060-97 = "あの方たちは……。"
10039060-102 = "……！"
10039060-103 = "……ナギサ様……！？"
10039060-110 = "ねぇ、ナギちゃん……？"
10039060-111 = "本当なの？"
10039060-112 = "いくら何でも、こんな日に争いを起こそうとするわけないじゃん。"
10039060-113 = "私たちが顔を出したら、余計にこじれるかもよ？"
10039060-115 = "……ミカさん。"
10039060-116 = "ティーパーティーは常に、ありとあらゆる事態に備えなければなりません。"
10039060-117 = "ミカさんには、あちらのシスターフッドと救護騎士団の兵力が見えないのですか？"
10039060-118 = "「決闘」と聞いてますが、#n我々ティーパーティーへ反旗を翻す計画をしている可能性もあります。"
10039060-119 = "これは、トリニティの内戦を招きかねない事案です。"
10039060-120 = "むしろ、こんな日だからこそ警戒すべきでした。"
10039060-121 = "いざとなったら、その時はミカさんが……。"
10039060-127 = "……わ、私！？"
10039060-128 = "え、なに？#n私が戦うの……？"
10039060-129 = "ナギちゃん本気？#nそのために連れてきたの！？"
10039060-130 = "全てはトリニティの安寧のためなのです！"
10039060-131 = "い、いやいや！"
10039060-132 = "私それ関係なくない！？#nそれに、まだ自粛中だし……。"
10039060-133 = "ねえ、ナギちゃん！#nお願いだから、もう少し冷静になろうよ！"
10039060-134 = "どうしよう、もう先生に連絡するしか……！"
10039060-140 = "……。"
10039060-141 = "……ついに現れましたね、当事者のお二人が。"
10039060-148 = "……時間通りですね、サクラコさん。"
10039060-149 = "結論は出せましたか？"
10039060-150 = "ええ。"
10039060-151 = "もちろんです。"
10039060-153 = "このような重大な場に遅れるはずが――"
10039060-159 = "それより、どうしたのでしょうか。"
10039060-160 = "この人の数は……。"
10039060-161 = "救護騎士団の皆さんも揃ってますね……。"
10039060-162 = "……何かあったのでしょうか？"
10039060-163 = "……どうやら、情報は正しかったようですね。"
10039060-168 = "サクラコさん、ミネ団長。"
10039060-170 = "……ナギサさん？"
10039060-171 = "謝肉祭でお忙しいはずの方が、どうしてここに……？"
10039060-173 = "この期に及んで白を切るとは……ずいぶんと侮られたものですね？"
10039060-175 = "……？"
10039060-176 = "……はい？"
10039060-178 = "ティーパーティーのホストとして、正式に問います。"
10039060-179 = "ここに集まっている理由をお答えください。"
10039060-180 = "……それは、「[ruby=カーニバル]謝肉祭[/ruby]運営委員長」でなく、#n「ティーパーティーのホスト」としての質問、ですか？"
10039060-181 = "はい、何か問題でも？"
10039060-182 = "……なるほど。"
10039060-183 = "お答えしましょう。"
10039060-187 = "――そちらとは関係ない話です。"
10039060-188 = "…………。"
10039060-189 = "…………！"
10039060-190 = "……ミカさん！"
10039060-191 = "ナギちゃん！？もうちょっと冷静になって！？"
10039060-192 = "も、もうちょっと話を……。"
10039060-193 = "ミカ！"
10039060-194 = "あ～っ！#nもう、ナギちゃんったら！"
10039060-195 = "うぅ……どうなっても知らないんだからね！！"
10039060-201 = "……？"
10039060-202 = "銃を構えて、どうしたのですか！？"
10039060-203 = "ティーパーティーは……ナギサ様は何をお考えで！？#nついに自暴自棄になってしまったのですか！？"
10039060-204 = "……ナギサ様がご乱心であるのなら、私が救護騎士団の団長として受けて立ちます。"
10039060-205 = "サクラコさん、準備を！"
10039060-207 = "……え？"
10039060-208 = "早く……！"
10039060-209 = "え、えぇ……！？"
10039060-210 = "どうしてこんなことに……！？"
10039060-211 = "最初からこれを狙っていたのですね、サクラコ様……！"
10039060-212 = "総員、戦闘準備！！"
10039060-219 = "戦闘態勢、用意！"
10039060-220 = "え、ええええええっ！？"
10039060-227 = "よくも、こんな日にクーデターを……！"
10039060-228 = "いいえ！#nこれは権力に対する抗議です！"
10039060-229 = "どうして、私は何も……！"
10039060-230 = "本当に知らないんだからね！"
10039060-232 = "[log=마리]お待ちください！[/log]"
10039060-245 = "……皆さん！"
10039060-250 = "どうか……。"
10039060-251 = "戦いをやめてください！！"
