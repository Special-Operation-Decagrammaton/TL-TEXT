[translation]
80000091-1 = "E a doçura também"
80000091-2 = "Ah, sim, Sensei."
80000091-3 = "Ultimamente, meus hobbies se expandiram."
80000091-4 = "[s1] \"Isso é bom, não é?\"\n[s2] \"Que tipo de hobby é?\""
80000091-5 = "É que..."
80000091-6 = "É que..."
80000091-7 = "Preparar coquetéis."
80000091-8 = "[s] \"Espera, Shigure-san!?\""
80000091-9 = "Não precisa ficar tão alarmado."
80000091-10 = "Claro que é sem álcool."
80000091-11 = "Mesmo estando suspensa, não tem como uma estudante beber álcool, né?#nFufu..."
80000091-12 = "[s] \"…….\""
80000091-13 = "……Esse é um olhar de desconfiança, hein."
80000091-14 = "Entendi. Então, vou preparar um coquetel novo especial para você."
80000091-15 = "Se o Sensei beber e confirmar, é a forma mais segura, certo?"
80000091-16 = "Espere um pouco."
80000091-18 = "（Dizendo isso, Shigure começou a preparar o coquetel com mãos experientes）"
80000091-25 = "……Desculpe a espera, Sensei."
80000091-30 = "É o \"Shigure Bitter Special\"."
80000091-31 = "[s] \"Bem...\""
80000091-32 = "Ah, o nome foi algo que inventei na hora, não se preocupe com isso."
80000091-33 = "Primeiro, quero que você prove um gole."
80000091-37 = "[ns] \"Realmente não tem álcool, ou melhor...\""
80000091-39 = "[ns3] \"Uma doçura na medida certa, com um retrogosto refrescante...!\"\n[ns4] \"Está muito gostoso!?\""
80000091-40 = "Viu só?"
80000091-41 = "Viu só?"
80000091-42 = "Tentei várias combinações para que o sabor ficasse refrescante."
80000091-43 = "Tenho confiança no sabor, embora tenha levado um tempo."
80000091-44 = "Fico feliz que o Sensei tenha gostado."
80000091-45 = "[s] \"Como você faz isso?\""
80000091-46 = "É uma receita que pesquisei bastante, então fico meio relutante em ensinar tão facilmente."
80000091-47 = "Hmm... eu não pretendia contar."
80000091-48 = "Bem, como é o Sensei, tudo bem.#nMas mantenha segredo dos outros, tá?"
80000091-49 = "O \"Shigure Bitter Special\" segue o mesmo preparo básico de um coquetel de chocolate."
80000091-50 = "Só que o segredo é misturar um pouco de chocolate amargo no final."
80000091-51 = "Isso equilibra a doçura e deixa o sabor mais refrescante."
80000091-52 = "O chocolate amargo, que seria amargo se comido puro, pode se tornar um coquetel delicioso dependendo de como você o trata."
80000091-53 = "[s] \"Incrível, Shigure...\""
80000091-54 = "Você acha?"
80000091-58 = "……Sensei, por que não tenta ser um bartender?"
80000091-59 = "[s] \"De repente? Por que isso?\""
80000091-60 = "O Sensei entende bem de todas as alunas, não entende?"
80000091-61 = "Não sei se \"tratar\" é a palavra certa... mas talvez seja colocar a pessoa certa no lugar certo. Ver todas ficarem mais animadas com os conselhos do Sensei,"
80000091-62 = "me faz pensar que é como preparar um coquetel."
80000091-63 = "Você até me fez perceber o valor do \"chocolate amargo\"."
80000091-68 = "De qualquer forma, isso é um agradecimento pelo dia a dia."
80000091-69 = "Conto com você daqui para frente, Sensei."
