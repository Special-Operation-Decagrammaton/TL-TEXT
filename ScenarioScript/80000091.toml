[translation]
80000091-1 = "甘さも"
80000091-2 = "そうそう、先生。"
80000091-3 = "最近、趣味の幅が広がったんだ。"
80000091-4 = "[s1] \"それは良いことだね。\"\n[s2] \"どんな趣味なの？\""
80000091-5 = "それは……"
80000091-6 = "それは……"
80000091-7 = "カクテル作り、だよ。"
80000091-8 = "[s] \"ちょっとシグレさん！？\""
80000091-9 = "そんなに慌てなくても。"
80000091-10 = "当然、ノンアルコールだよ。"
80000091-11 = "停学中とはいえ、学生がお酒を飲むわけないでしょ。#nふふっ……。"
80000091-12 = "[s] \"……。\""
80000091-13 = "……それは疑ってる目だね。"
80000091-14 = "分かった。じゃあ、とっておきの新作カクテルを作ってあげる。"
80000091-15 = "先生が飲んで確かめられれば、それが一番安心でしょ。"
80000091-16 = "ちょっと待っててね。"
80000091-18 = "（そう言ってシグレは、慣れた手付きでカクテルを作り始めた）"
80000091-25 = "……お待たせ、先生。"
80000091-30 = "「シグレ・ビタースペシャル」だよ。"
80000091-31 = "[s] \"えーっと……。\""
80000091-32 = "ああ、名前は思い付きだから気にしないで。"
80000091-33 = "まずは一口、味わってほしいな。"
80000091-37 = "[ns] \"確かにアルコール成分は入ってない、というか……\""
80000091-39 = "[ns3] \"ほど良い甘さに、サッパリとした後味……！\"\n[ns4] \"すごく美味しい！？\""
80000091-40 = "でしょ？"
80000091-41 = "でしょ？"
80000091-42 = "口当たりがサッパリするように、試行錯誤してみたの。"
80000091-43 = "味には自信があるよ、ちょっと時間はかかったけど。"
80000091-44 = "その分、先生も気に入ってくれたみたいで良かった。"
80000091-45 = "[s] \"これ、どうやって作ってるの？\""
80000091-46 = "頑張って研究したレシピだから、そんな簡単に教えるのも気が引けるなぁ。"
80000091-47 = "ん～……教えるつもりはなかったんだけど。"
80000091-48 = "まぁ、先生だし良いかな。#n他の人には内緒だからね？"
80000091-49 = "「シグレ・ビタースペシャル」は、基本的なチョコレートカクテルの作り方と同じだよ。"
80000091-50 = "ただ、最後にビターチョコレートを少しだけ混ぜるのがポイント。"
80000091-51 = "これが甘さを抑えて、さっぱりした味に整えてくれるの。"
80000091-52 = "普通に食べると苦いビターチョコレートも、扱い方によっては美味しいカクテルになるんだ。"
80000091-53 = "[s] \"すごいね、シグレ……。\""
80000091-54 = "そう、かな？"
80000091-58 = "……先生、試しにバーテンダーやってみたら？"
80000091-59 = "[s] \"それはまた急に、どうして？\""
80000091-60 = "先生は色んな生徒たちのことを、よく分かってるでしょ？"
80000091-61 = "「扱い方」って言うとアレだけど……適材適所って言うのかな。先生のアドバイスでみんなが生き生きとしていくさまは、"
80000091-62 = "何だかカクテル作りみたいだなって。"
80000091-63 = "「ビターチョコレート」の在り方にも、気づかせてくれたし。"
80000091-68 = "とにかくこれは、日頃のお礼ってことで。"
80000091-69 = "これからもよろしくね、先生。"
