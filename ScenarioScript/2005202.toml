[translation]
2005202-1 = "Infraestrutura"
2005202-2 = "Está frio hoje também, não é?"
2005202-3 = "Bem, é sempre assim, de qualquer forma."
2005202-4 = "[s] \"Precisávamos mesmo... vir até um lugar tão remoto?\""
2005202-5 = "Sim, com certeza."
2005202-6 = "Pode ser um pequeno passo para o Departamento de Publicações,"
2005202-7 = "mas será um grande passo para Red Winter!"
2005202-8 = "……Ou talvez seja, para este projeto."
2005202-9 = "[s] \"E o que seria exatamente...?\""
2005202-10 = "Ou seja... a instalação da rede de comunicação!"
2005202-14 = "Você está com uma cara de quem quer perguntar por que o Departamento de Publicações está fazendo isso, não é?"
2005202-15 = "Mufufu. De fato, a construção de linhas de comunicação é um serviço público."
2005202-16 = "Normalmente, a Secretaria de Red Winter deveria ser a responsável."
2005202-17 = "Bem, com aquela Secretaria, eles não conseguiriam começar a obra nem daqui a 100 anos."
2005202-18 = "[s] \"Então o Departamento de Publicações...\""
2005202-19 = "Como você imaginou."
2005202-20 = "Nós assumimos o trabalho no lugar da Secretaria."
2005202-21 = "[s1] \"Entendo...\"\n[s2] \"Então foi um pedido da Secretaria...\""
2005202-24 = "Sim, por isso não vou instalar todas as linhas de comunicação sozinha agora... ou melhor, não vou."
2005202-25 = "Só preciso do resultado final de que o equipamento foi instalado."
2005202-26 = "Ei, pessoal! É por aqui!"
2005202-34 = "É verdade que vocês vão pagar com pudim, né?"
2005202-35 = "Ouvi dizer que se terminarmos antes do prazo, ganhamos um \"Mors Especial\" de brinde, é verdade?"
2005202-37 = "Com certeza. O que é mais importante em uma relação de trabalho é a confiança."
2005202-38 = "Eu, Yakumo Aramaki, chefe do Departamento de Publicações, não faço um trabalho desleixado quando há dinheiro envolvido!"
2005202-42 = "……O que houve, Sensei? Você está com uma cara de surpreso."
2005202-43 = "[s3] \"Não é que... como a Yakumo contrata subcontratados de subcontratados--\"\n[s4] \"Eu achei que você ia reduzir a recompensa ao mínimo\"\n[s5] \"para maximizar o lucro do Departamento de Publicações...\""
2005202-47 = "Ora... que ofensa. Eu não sou um demônio, sabe?"
2005202-48 = "Bem, se alguém tentasse roubar meu pagamento, eu teria confiança de que poderia ser mais cruel que um demônio."
2005202-49 = "……Francamente, que pensamento amador, Sensei. Mufufu."
2005202-50 = "[s6] \"E-eu fui chamado de amador...\"\n[s7] \"Então, me conte o pensamento de um profissional!\""
2005202-53 = "Mufufu, é simples..."
2005202-54 = "Só é possível fazer negócios de verdade quando a infraestrutura é estabelecida a um custo baixo!"
2005202-55 = "Entende, Sensei? Se o custo de construção da infraestrutura aumenta, naturalmente essa despesa será cobrada do usuário de alguma forma."
2005202-56 = "Além disso, quem encomendou o serviço foi aquela Secretaria pão-dura."
2005202-57 = "Para começar, o orçamento que recebemos mal dá para cobrir a obra."
2005202-58 = "Mas, mesmo assim, repassar o custo extra para os usuários e explorá-los--"
2005202-59 = "Isso é olhar apenas para o lucro imediato... isso só levaria a perdas a longo prazo!"
2005202-60 = "Nesta sociedade hiperconectada onde todos estão ligados!#nAs linhas de comunicação são agora uma linha vital!"
2005202-61 = "Se privatizarmos essa linha vital, no final, todos seguirão o caminho da destruição!"
2005202-62 = "Por isso, o Departamento de Publicações não teme a perda a curto prazo--#ne, ao construir a infraestrutura de comunicação o mais barato possível!"
2005202-63 = "Negociar o direito de operação com a Secretaria é um negócio de longo prazo muito mais sensato."
2005202-64 = "Não é a propriedade, entende? É o direito de operação, o direito de operação.#nDisse duas vezes porque é importante."
2005202-65 = "[s] \"No fim das contas, o que você vai fazer...?\""
2005202-66 = "Bem, bem, apenas observe daqui em diante."
2005202-67 = "Mufufufu."
2005202-70 = "Finalmente... a conexão cabeada chegou ao dormitório!"
2005202-71 = "Agora não preciso mais usar aquele roteador portátil que é caro, lento e cai toda hora!"
2005202-76 = "A propósito, pessoal--"
2005202-77 = "Com uma internet barata, rápida e estável que não cai... o que vocês pretendem fazer?"
2005202-79 = "Hã? Agora que você falou..."
2005202-80 = "Acho que nunca tinha pensado nisso..."
2005202-81 = "Bem, bem, nesses casos, por que não começamos pelo que é divertido?"
2005202-82 = "Na plataforma gerenciada pelo nosso Departamento Editorial, você pode ler 100 capítulos de web novels de graça."
2005202-83 = "100 capítulos!?"
2005202-84 = "E ainda por cima de graça!?"
2005202-85 = "Sim. Após um certo período de tempo, outras obras são disponibilizadas gratuitamente também~"
2005202-86 = "Claro, se você fizer um pagamento, poderá ler os capítulos mais recentes antes de todo mundo e com garantia..."
2005202-87 = "Pagamento...?"
2005202-88 = "Mas se dá para ler 100 capítulos de graça, não tem por que pagar, né?"
2005202-92 = "(Hehehe... Todo mundo pensa assim no começo, não é...)"
2005202-93 = "[s](Yakumo... que criança assustadora...!)"
2005202-96 = "Ah! Li tudo!"
2005202-97 = "Próximo! Quero ler o próximo capítulo logo!"
2005202-98 = "Ora, ora, acalme-se. Como eu disse antes, se você fizer um pagamento..."
2005202-100 = "Já paguei! Li tudo o que dava para ler..."
2005202-101 = "Quando sai o próximo? Vou assinar o serviço! Deixa eu ler logo!"
2005202-102 = "!?"
2005202-103 = "Isso é surpreendente... Que velocidade de consumo de conteúdo impressionante."
2005202-104 = "Então... enquanto o capítulo mais recente não é liberado, que tal a versão em mangá desta novel?"
2005202-105 = "Acho que tem um charme diferente do texto, sabe~?"
2005202-106 = "Vou ler, vou ler!"
2005202-107 = "Ué, a parte gratuita do mangá é só de 10 capítulos...?"
2005202-108 = "Ah, por favor, entenda. Desenhar é um trabalho que exige muito esforço..."
2005202-109 = "Se não aguentar esperar a atualização, você também pode \"apoiar\" o autor diretamente com pagamentos adicionais, sabe?"

2005202-110 = "No mundo de hoje... no fim das contas, o que move as pessoas é o dinheiro, não é? Hehehe."
2005202-111 = "(Além disso, a plataforma de financiamento coletivo também é gerenciada pelo nosso Departamento Editorial, então ganhamos uma comissão e todos saem ganhando.)"
2005202-112 = "Isso é bom, mas... por que tem um limite de gastos?"
2005202-113 = "É verdade! A gente quer gastar sem restrições!"
2005202-114 = "Agradeço o entusiasmo, mas... o objetivo do nosso Departamento Editorial é tornar o tempo dos leitores divertido e enriquecedor."
2005202-115 = "Se a nossa plataforma causar problemas no dia a dia de vocês, seria contraproducente."
2005202-116 = "(...Se eu levar os consumidores à falência, o negócio a longo prazo não se sustenta, né~)"
2005202-117 = "Como conteúdo relacionado, acho que vocês também vão gostar disto. É um vídeo que nós preparamos..."
2005202-122 = "Puxa vida... isso é um problema..."
2005202-123 = "Hã? O quê? O que houve?"
2005202-124 = "...Com a velocidade atual da rede, não dá para ver vídeos em alta definição?"
2005202-125 = "Infelizmente parece que sim~ Não é que a secretaria não libera orçamento, mas... no entanto—"
2005202-126 = "O que acharam da experiência? Com mais web novels e web mangás..."
2005202-127 = "Para aproveitar vídeos em alta definição e todo o conteúdo, seria necessário um ambiente de rede mais rápido e estável..."
2005202-128 = "...É necessário, não é?"
2005202-134 = "É verdade!!"
2005202-135 = "A secretaria de novo... Certo! Vamos lá protestar!"
2005202-136 = "Vamos chamar o pessoal do dormitório também?"
2005202-137 = "Vamos avisar os outros dormitórios também!"
2005202-138 = "Hehehe. Já que vão fazer isso, poderiam fazer um pouquinho de propaganda da nossa plataforma também?"
2005202-139 = "Conteúdo só fica mais divertido quando compartilhado com todos."
2005202-140 = "Ah, pode deixar!"
2005202-141 = "Olha, tem até um fórum tipo rede social aqui! Vou escrever uma avaliação!"
2005202-142 = "Hehehe. Agradeço imensamente."
2005202-143 = "Para que possamos continuar oferecendo conteúdo de qualidade a todos, o Departamento Editorial de Red Winter gostaria de contar com o apoio contínuo de vocês~"
2005202-144 = "(Um terço do catálogo é conteúdo comprado barato de fora de Red Winter, mas enfim...)"
2005202-145 = "(Mesmo assim, em Red Winter, isso é tratado como novidade, então não deve ter problema. Mufufu.)"
2005202-147 = "(E assim, os alunos apelaram à secretaria para a instalação de uma conexão de alta velocidade—)"
2005202-148 = "(E os negócios do Departamento Editorial cresceram vigorosamente...!)"
2005202-154 = "Como resultado, parece que houve um pequeno dano às finanças da secretaria..."
2005202-155 = "Mas, pensando bem, a causa foi a negligência da própria secretaria, então o Departamento Editorial não tem culpa, não é?"
2005202-156 = "Mufufu!"
2005202-157 = "[s] \"Eu só estava pensando...\""
2005202-158 = "Sim?"
2005202-159 = "[s] \"Yakumo, você é uma garota assustadora...\""
2005202-160 = "O que está dizendo? Não existe aluna mais inofensiva do que eu, sabe? Mufufu."
