[translation]
13050-1 = "Episódio 5: Ferrovia Trans-Deserto"
13050-2 = "Entrada, seguida de uma pose de vitória!"
13050-3 = "Não está apertado aqui?#nOnde é que eu devo sentar?"
13050-8 = "……."
13050-10 = "Não fique andando por aí sem permissão.#nApenas sente-se."
13050-11 = "Se você ficar pulando na cadeira, eu vou ficar realmente brava."
13050-12 = "A-ah, com licença..."
13050-13 = "……Perdão. #nO Comitê de Contramedidas de Abydos é composto apenas por vocês?"
13050-26 = "……Contenha-se, Shiroko-senpai."
13050-27 = "……Hum."
13050-29 = "Sim, nós somos o Comitê de Contramedidas."
13050-30 = "Eu não esperava que vocês realmente viessem...#nEntão, o que vocês querem?"
13050-35 = "Eu desejo este doce."
13050-36 = "Abydos não serve nem chá para os convidados?"
13050-38 = "Ah... por favor, espere um momento."
13050-39 = "Não se incomode.#nO assunto será rápido."
13050-40 = "?"
13050-41 = "……Para começar, não há motivo para sermos bem-vindos aqui."
13050-42 = "Essas são as pessoas que lutaram contra a Kaiser para recuperar suas próprias terras."
13050-43 = "Eu avisei que havia a possibilidade de usarem força armada.#nSe vieram aqui como se fosse um passeio, é melhor irem embora agora."
13050-50 = "……."
13050-52 = "Embora, mesmo que vocês decidam usar força armada — quem vai vencer sou eu."
13050-60 = "Shiroko-senpai! Relaxe, relaxe!"
13050-66 = "Eu não estou, de forma alguma..."
13050-67 = "Não está, nada!#nVocê estava com uma cara de quem ia fazer alguma coisa a qualquer momento!"
13050-68 = "Hum..."
13050-72 = "[ns1] \"Então, sobre o assunto principal...\"\n[ns2] \"Você vai nos explicar sobre o que aconteceu antes, certo?\""
13050-75 = "Ah, eu vim hoje por causa disso."
13050-76 = "Você é o Sensei do Schale, certo?#nPeço desculpas pelo outro dia. Parece que houve uma falha na comunicação das informações."
13050-77 = "Eu não me importaria de explicar pessoalmente, mas... chamei outra pessoa."
13050-78 = "……Pode entrar."
13050-79 = "Cof, cof... Ufa, que situação. #nEspecialmente lá fora, a poeira do deserto está terrível..."
13050-80 = "Com certeza. #nVamos resolver isso logo e ir embora."
13050-81 = "Q-quem são esses caras?"
13050-82 = "Cuidado com o que diz.#nDeixe-me apresentar, estes são os novos credores de Abydos."
13050-83 = "Credores..."
13050-84 = "……Eh?#nQuer dizer que são cobradores de dívidas!?"
13050-85 = "Serika-chan, tente se expressar de um jeito melhor..."
13050-86 = "Ou seja, as pessoas que compraram os títulos de dívida..."
13050-87 = "[s] \"……Primeiro, vamos ouvir o que eles têm a dizer.\""
13050-88 = "Sim..."
13050-90 = "……."
13050-92 = "……Hah, vocês nos fizeram esperar bastante."
13050-93 = "Entendo, então esta é a sala do conselho estudantil de Abydos.#n……Quem diria que seria tão apertada."
13050-94 = "Muito prazer, nós somos os responsáveis pelo grupo que investiu neste projeto."
13050-95 = "Dentre eles, eu atuo como representante do grupo de credores.#nPor favor, prazer em conhecê-los."
13050-97 = "O-olá..."
13050-98 = "Quem comprou a dívida não foi a Nephthys?#nVocês não parecem nada com o pessoal da Nephthys."
13050-100 = "Sim, você está correta ao entender que a Nephthys adquiriu a dívida.#nComo resultado disso, garantimos os direitos da Ferrovia Trans-Deserto."
13050-101 = "No entanto, a Nephthys não forneceu todo o capital para a aquisição."
13050-102 = "――Dá para entender se eu chamar de fundo de investimento privado?"
13050-104 = "Fundo de investimento privado?"
13050-105 = "É um grupo que arrecada capital de um pequeno número de investidores para operar um negócio."
13050-107 = "Exatamente. #nAlém de nós, há outros que investiram neste projeto."
13050-108 = "A Associação de Leilões de Bens Apreendidos, a Gelatin Gummy Trading, a Tanuki Daisuki Industry, e por aí vai..."
13050-110 = "Só tem gente suspeita pelos nomes..."
13050-111 = "Ehem!"
13050-112 = "Não vou negar. #nOriginalmente, eu também lidava com produtos roubados no mercado negro."
13050-113 = "É justamente por isso que comprei os títulos em nome da Nephthys. #nNão posso me expor muito publicamente."
13050-114 = "……."
13050-115 = "O clima ficou estranho, não ficou?..."
13050-116 = "Isso, bem..."
13050-120 = "[ns3] \"Vocês têm algo que comprove que são credores?\"\n[ns4] \"Primeiro, deixe-nos verificar isso.\""
13050-123 = "……Estão duvidando de nós?"
13050-124 = "Isso é extremamente desagradável."
13050-125 = "Ora, vamos nos acalmar, pessoal. #nVamos manter uma conversa de adultos aqui――"
13050-127 = "……Essas pessoas são, sem dúvida, credoras."
13050-128 = "Quem é você...?"
13050-129 = "O, o mordomo...?"
13050-130 = "Nonomi-senpai, você o conhece?"
13050-131 = "Sim... Ele é um executivo do Grupo Nephthys e #nfoi quem cuidou de mim."
13050-133 = "Há quanto tempo, senhorita. #nPeço perdão por ter que cumprimentá-la desta forma."
13050-137 = "Para adquirir os títulos, contatamos vários investidores e levantamos o capital necessário."
13050-138 = "Aqui está uma cópia dos certificados. #n...Por favor, verifique."
13050-139 = "Ah, sim... Com licença."
13050-140 = "……Não há dúvidas. #nEssas pessoas realmente possuem os direitos."
13050-142 = "Estão satisfeitos agora?"
13050-143 = "Ou ainda têm algo a dizer?"
13050-144 = "[s] \"Não, só precisávamos confirmar.\""
13050-146 = "Qual é. #nNo fim das contas, eles eram cobradores de dívidas mesmo."
13050-147 = "Serika-chan, por isso que eu disse sobre o jeito de falar..."
13050-148 = "Fico feliz que as dúvidas tenham sido esclarecidas. #nEntão, vamos continuar a conversa."
13050-149 = "A razão pela qual viemos hoje é para discutir um assunto."
13050-150 = "Sobre a Ferrovia Trans-Deserto, é isso..."
13050-152 = "……."
13050-154 = "……Entendo. #nVocês já sabem bastante sobre a nossa situação, não é?"
13050-155 = "Já que chegamos a esse ponto, serei direto. #nNosso objetivo é obter todos os direitos da Ferrovia Trans-Deserto."
13050-160 = "……."
13050-161 = "Sim, foi para isso que o fundo de investimento privado foi criado."
13050-163 = "É por isso que pagamos tanto dinheiro para comprar os títulos da Kaiser."
13050-164 = "Pelo menos os direitos de desenvolvimento da ferrovia já são nossos. #nOu seja, não há problema algum nas ações da Academia Highlander."
13050-165 = "Isso, isso. Nós só começamos a obra depois de garantir os títulos. #nNão tem problema nenhum, né?"
13050-166 = "Yes, sem problemas."
13050-170 = "……Fique quieto um pouco."
13050-171 = "Aquilo... mas por que a Ferrovia Trans-Deserto..."
13050-172 = "Mordomo, o que isso significa?"
13050-173 = "Como devo explicar isso..."
13050-174 = "Entendo seus sentimentos, senhorita da Nephthys."
13050-175 = "Ouvir o nome da Ferrovia Trans-Deserto não deve trazer boas lembranças. #nAfinal, foi por causa dela que o declínio de Abydos se acelerou."
13050-176 = "……Por favor, me diga, mordomo! #nO que a Nephthys está pensando afinal!?"
13050-177 = "Aquilo, para começar, estava errado desde o início. #nConstruir uma infraestrutura de transporte gigantesca em um distrito autônomo que continua a se desertificar..."
13050-178 = "Abydos não é um ponto estratégico de transporte, e nem existem recursos subterrâneos aqui... #nExpandir uma rede de transporte em um lugar como este..."
13050-179 = "No fim, só acelerou o declínio de Abydos..."
13050-180 = "Por que você comprou isso de volta agora? #nDepois de investir tanto dinheiro...!"
13050-182 = "O que exatamente a Nephthys está tentando fazer!?"
13050-183 = "Acalme-se, Nonomi-chan."
13050-184 = "Nonomi-senpai..."
13050-188 = "...A conversa termina aqui?"
13050-189 = "Já posso propor a nossa pauta?"
13050-190 = "Ah, os que não são responsáveis poderiam se retirar?"
13050-191 = "Deixem apenas o conselho estudantil de Abydos aqui."
13050-192 = "Vamos, andem logo."
13050-193 = "Eu disse para não empurrar!"
13050-194 = "Não quero ir embora."
13050-198 = "Eu também me retiro, senhorita."
13050-203 = "E-então, quem é o representante do lado da Nephthys...!?"
13050-204 = "Como representante, colocaremos a supervisora Suou aqui."
13050-205 = "...Você está falando sério?"
13050-206 = "Claro. Atualmente, por contrato, você está empregada pela Nephthys."
13050-207 = "Pode considerar que ela é da Nephthys, assim como nós."
13050-208 = "Então, com licença. Tenho outros compromissos."
13050-212 = "..."
13050-217 = "Nossa, eu não entendo nada..."
13050-218 = "..."
13050-219 = "..."
13050-220 = "[s] \"...\""
13050-222 = "...Não me ouviu? #nEu disse para deixarem apenas o \"Conselho Estudantil de Abydos\". #nGostaria que todos, exceto a Takanashi Hoshino, se retirassem."
13050-224 = "Ei, nós também somos do conselho estudantil!"
13050-225 = "Nós, do Comitê de Contramedidas, somos a organização do conselho estudantil de Abydos agora! #nTemos até a aprovação do Sensei do Schale aqui presente!"
13050-226 = "[s] \"Ela está certa.\""
13050-227 = "...Entendo, é assim então."
13050-228 = "Mas isso é estranho...? #nConsta que apenas Hoshino-san pertence ao conselho estudantil de Abydos. #n...Então, existem duas organizações de conselho estudantil em Abydos?"
13050-229 = "I-isso é..."
13050-231 = "Ah... deve ser porque eu pertenço a ambos."
13050-232 = "O conselho estudantil de Abydos só mantém o nome por formalidade, o conselho atual é o \"Comitê de Contramedidas\", está correto."
13050-233 = "Entendi a situação. #nSe vocês são o conselho estudantil, para nós, tanto faz qual seja."
13050-234 = "Então, por favor, olhem isto."
13050-239 = "Isto é..."
13050-240 = "É um documento descoberto recentemente no armazém da Academia Highlander."
13050-242 = "A ex-presidente do conselho estudantil de Abydos... Kuchinashi Yume, a assinatura dela está aqui, não está?"
13050-248 = "...!"
13050-250 = "Próximo episódio: Contrato"
