[translation]
13050-1 = "第5話;砂漠横断鉄道"
13050-2 = "入場、からの勝利のポーズ！"
13050-3 = "ここ狭くない？#nどこに座れば良いのさ？"
13050-8 = "……。"
13050-10 = "勝手に動き回るな。#nいいから座れ。"
13050-11 = "イスで跳ねたりしたら本当に怒るぞ。"
13050-12 = "あ、あの……"
13050-13 = "……失礼した。#nアビドス対策委員会は、これで全員か？"
13050-26 = "……まだ抑えて、シロコ先輩。"
13050-27 = "……ん。"
13050-29 = "はい、私たちが対策委員会です。"
13050-30 = "まさか本当に来るとは思ってなかったけど……#nで、何の用かな？"
13050-35 = "このお菓子を所望するー。"
13050-36 = "アビドスってのは、客人にお茶も出さないわけ？"
13050-38 = "あっ……少々お待ちください。"
13050-39 = "お構いなく。#n話ならすぐに終わる。"
13050-40 = "？"
13050-41 = "……そもそも、我々が歓迎されるわけないだろう。"
13050-42 = "自分たちの土地を取り戻すために、カイザーとも戦ってきた連中だ。"
13050-43 = "武力行使に出てくる可能性もあると伝えているはず。#n遊び感覚で来たのなら、先に帰ってろ。"
13050-50 = "……。"
13050-52 = "もっとも、あんたたちが武力行使に出たところで――勝つのは私だがな。"
13050-60 = "シロコ先輩！リラックス、リラックス！"
13050-66 = "私は、別に……"
13050-67 = "別に、じゃないでしょ！#n今にも何かしでかしそうな顔してた！"
13050-68 = "ん……"
13050-72 = "[ns1] \"それで、本題なんだけど……\"\n[ns2] \"以前の件について説明してくれるんだよね？\""
13050-75 = "ああ、今日はそのために来た。"
13050-76 = "シャーレの先生、だな？#n先日は失礼した。情報の伝達に齟齬があったようだ。"
13050-77 = "私の口から説明しても構わないが……別の者を呼んでいる。"
13050-78 = "……入ってくれ。"
13050-79 = "けほっ、けほっ……ふぅ、参りましたね。#n特に外は、随分とひどい砂ぼこりだ……"
13050-80 = "全くです。#nさっさと用事を済ませて帰るとしましょう。"
13050-81 = "な、何なのこいつら？"
13050-82 = "言葉には気をつけた方が良い。#n紹介しよう、こちらがアビドスの新たな債権者だ。"
13050-83 = "債権者……"
13050-84 = "……え？#n借金取りってこと！？"
13050-85 = "セリカちゃん、もう少し言い方を……"
13050-86 = "つまり、債券を買収した方々……"
13050-87 = "[s] \"……まずは、話を聞いてみようか。\""
13050-88 = "はい……"
13050-90 = "……。"
13050-92 = "……はぁ、随分と待たせてくれましたね。"
13050-93 = "なるほど、これがアビドスの生徒会室ですか。#n……まさか、こんなにも狭いとは。"
13050-94 = "初めまして、私たちは今回の事業に投資した[ruby=・   ・]集団[/ruby]の責任者です。"
13050-95 = "その中でも私が、債権者団体の代表を務めております。#nどうぞ、以後お見知りおきを。"
13050-97 = "こ、こんにちは……"
13050-98 = "債権を買ったのはネフティスなのよね？#n全然ネフティスの人には見えないけど。"
13050-100 = "ええ、ネフティスが債権を買収したという認識については仰る通り。#nその結果として、砂漠横断鉄道の権利を確保したわけですから。"
13050-101 = "ただ買収資金の全てを、ネフティスが出したわけではありません。"
13050-102 = "――私募ファンド、と言って伝わるでしょうか？"
13050-104 = "私募ファンド？"
13050-105 = "少数の投資家から資金を募り、事業を運用するグループのことです。"
13050-107 = "その通り。#n我々以外にも、今回の事業に投資した者がおります。"
13050-108 = "押収品競売組合に、ゼラチングミ商事、タヌキダイスキ工業などなど……"
13050-110 = "名前からして怪しい奴らばっかじゃない……"
13050-111 = "こほん！"
13050-112 = "否定はしませんよ。#n元々は私も、ブラックマーケットで盗品を扱っていましたし。"
13050-113 = "だからこそ、ネフティスの名で債権を購入したのです。#nあまり表に顔を晒すわけにはいきませんから。"
13050-114 = "……。"
13050-115 = "雲行きが怪しくなってきたわね……"
13050-116 = "その、えっと……"
13050-120 = "[ns3] \"債権者だと証明できるものはありますか？\"\n[ns4] \"まずは、それを確認させてください。\""
13050-123 = "……私たちを疑っているのか？"
13050-124 = "不愉快極まりない話だ。"
13050-125 = "まあ皆さん、落ち着きましょうよ。#nここは大人の会話らしく――"
13050-127 = "……そちらの方々は、債権者で間違いございません。"
13050-128 = "どなたですか……？"
13050-129 = "し、執事さん……？"
13050-130 = "ノノミ先輩、知ってるの？"
13050-131 = "はい……ネフティスグループの幹部で、#n私の面倒を見てくださっていた方です。"
13050-133 = "お久しぶりです、お嬢様。#nこのような形でご挨拶することになってしまい、申し訳ありません。"
13050-137 = "私どもは債権を購入するにあたり、複数の投資家に声をかけて資金を調達いたしました。"
13050-138 = "こちらに証明書のコピーもございます。#n……ご確認を。"
13050-139 = "あ、はい……失礼します。"
13050-140 = "……間違いありません。#nこの方々は確かに、権利を持っています。"
13050-142 = "これで気は済みましたか？"
13050-143 = "それとも、まだ何か言いたいことでも？"
13050-144 = "[s] \"いえ、まずは確認さえできれば。\""
13050-146 = "なによ。#nやっぱ借金取りで合ってたんじゃない。"
13050-147 = "セリカちゃん、だから言い方……"
13050-148 = "疑問が氷解したようで何より。#nでは、話を続けるとしましょう。"
13050-149 = "私たちが今回来た理由は、とあるご相談のためです。"
13050-150 = "砂漠横断鉄道について、ですか……"
13050-152 = "……。"
13050-154 = "……なるほど。#nある程度はこちらの事情を把握しているのですね？"
13050-155 = "この際、はっきり申し上げましょう。#n私たちの目的は、砂漠横断鉄道の全権利を手に入れることです。"
13050-160 = "……。"
13050-161 = "ええ、そのために私募ファンドが生まれました。"
13050-163 = "だからこそあれだけのお金を出して、カイザーから債権を買ったのです。"
13050-164 = "少なくとも鉄道の開発権利は、既にこちらのもの。#nつまり、ハイランダー学園の行為には何の問題もありません。"
13050-165 = "そーそー。私たちが工事を始めたのは、債権を確保してからなんだし。#n何にも問題ないっしょ？"
13050-166 = "イエース、問題なーし。"
13050-170 = "……少し黙ってろ。"
13050-171 = "あの……でもどうして、砂漠横断鉄道を……"
13050-172 = "執事さん、どういうことなのですか？"
13050-173 = "なんと申し上げたら良いものか……"
13050-174 = "お気持ちは分かりますよ、ネフティスのご令嬢。"
13050-175 = "砂漠横断鉄道の名を聞いて、あまり良い気持ちではないでしょう。#nあれのせいで、アビドスの衰退は加速したのですから。"
13050-176 = "……教えてください、執事さん！#nネフティスは一体何を考えているんですか！？"
13050-177 = "あれはそもそも、最初から間違っていたんです。#n砂漠化が進み続ける自治区で、巨大な交通インフラを建設するなんて……"
13050-178 = "アビドスは交通の要所でもなく、地下資源だって存在しません……#nそんな場所に、交通網を広げたって……"
13050-179 = "結局、アビドスの衰退を早めただけで……"
13050-180 = "それをどうして、今になって買い戻したんですか？#nあんなにお金を投じてまで……！"
13050-182 = "一体ネフティスは、何をしようとしているんですか！？"
13050-183 = "落ち着いて、ノノミちゃん。"
13050-184 = "ノノミ先輩……"
13050-188 = "……お話は以上でしょうか。"
13050-189 = "そろそろ、こちらからの議題を提案しても？"
13050-190 = "あぁ、責任者以外の方はご退席願えますか？"
13050-191 = "アビドス生徒会の方だけ、残ってもらいましょう。"
13050-192 = "ほら、行くぞ。"
13050-193 = "押すなって言ってるだろ！？"
13050-194 = "帰りたくなーい。"
13050-198 = "私も失礼いたします、お嬢様。"
13050-203 = "で、ではネフティス側の代表は……！？"
13050-204 = "代理として、こちらのスオウ監督官を立てます。"
13050-205 = "……本気で言っているのか？"
13050-206 = "勿論。今のあなたは契約上、ネフティスに雇用されていますから。"
13050-207 = "彼女のことは、私どもと同じくネフティスの者だと思っていただければと。"
13050-208 = "では、失礼いたします。次の用事がありますので。"
13050-212 = "……。"
13050-217 = "もう、何がなんだか……"
13050-218 = "……。"
13050-219 = "……。"
13050-220 = "[s] \"……。\""
13050-222 = "……聞こえていませんでしたか？#n私は「アビドス生徒会」の方だけ残ってください、と言ったのです。#n[ruby=たかなし]小鳥遊[/ruby]ホシノさん以外の方には、ご退出願いたいのですが。"
13050-224 = "わっ、私たちも生徒会なんだけど！？"
13050-225 = "私たち対策委員会が、今のアビドスにおける生徒会組織です！#nここにいるシャーレの先生の承認も得ています！"
13050-226 = "[s] \"彼女の言う通りです。\""
13050-227 = "……なるほど、そうでしたか。"
13050-228 = "しかし、おかしいですね……？#nアビドス生徒会には、ホシノさんしか所属していないことになっています。#n……アビドスには二つの生徒会組織がある、と？"
13050-229 = "そ、それは……"
13050-231 = "あー……私がどっちにも所属してるからか。"
13050-232 = "アビドス生徒会は形骸的に名前が残ってるだけで、今の生徒会は「対策委員会」で合ってるよ。"
13050-233 = "事情は理解しました。#n生徒会であるのなら、我々としてはどちらでも構いません。"
13050-234 = "では、こちらをご覧ください。"
13050-239 = "これは……"
13050-240 = "先日、ハイランダー学園の倉庫から発見された書類です。"
13050-242 = "アビドスの前生徒会長……[ruby=くちなし]梔子[/ruby]ユメの名で、ここにサインがあるでしょう？"
13050-248 = "……！"
13050-250 = "次回;契約書"
