[translation]
2004605-1 = "大いに怒り、天地を覆す"
2004605-6 = "（結局、ニヤからの返信は来なかった）"
2004605-7 = "（居ても立っても居られず、シャーレを飛び出した）"
2004605-9 = "また魑魅一座の奴らが騒いでるってよ。"
2004605-10 = "こっちだって暇じゃないってのに……。"
2004605-11 = "金を出せって言われた奴がいるらしい。"
2004605-12 = "それじゃ強盗と変わらないじゃねぇか！#n問題児とはいえ、祭り好きなだけの連中だと思ってたんだがな……。"
2004605-14 = "（前よりもさらに荒れた通りを抜けて……）"
2004605-16 = "うわぁ〜ん！代わりの部室が見つからないよ〜！"
2004605-17 = "部室を交換してもいいって部活はあったけど……。"
2004605-18 = "どこも狭すぎて作品の置き場がないもんね……。"
2004605-19 = "もうおしまいだ〜！このままじゃ廃部になっちゃう……！"
2004605-20 = "泣かないでよ！私だって我慢してるんだから……！"
2004605-22 = "（部室の問題で悩む生徒たちを横目に……陰陽部の部室に向かった）"
2004605-24 = "あららぁ……街がそんなことに。事態は悪くなる一方ですねぇ……。"
2004605-25 = "え？予想してなかったのかって？"
2004605-26 = "にゃは～、それはちょ～っと私を買いかぶりすぎですよぉ。"
2004605-30 = "なんて……バレバレの嘘はこの辺にしておきましょか。"
2004605-31 = "たしかに、やろうと思えば商人会と魑魅一座を取り持つことなんて造作もないですし……。"
2004605-32 = "折り紙部が満足する条件で部室を交換してくれる部にも、心当たりはありますから。"
2004605-33 = "ぱぱーっと解決してしまえば早いんですけどね～"
2004605-34 = "解決[ruby=・   ・   ・]できる[/ruby]と[ruby=・   ・]する[/ruby]では意味が大きく違うんですよ。"
2004605-35 = "前にも話しましたが……陰陽部の役目は調和を保つこと。#n私たちが一度でも線を踏み越えたら最後……元には戻らない。"
2004605-36 = "まぁ、それはそれとして――"
2004605-37 = "少しぐらい騒ぎがあった方が面白いじゃないですか～？"
2004605-38 = "[s] \"……それで、さっき言ってた「大変なこと」って？\""
2004605-39 = "あぁ、やっぱり気になります～？"
2004605-40 = "いやぁ、騒ぎのおすそ分けをしようかな～って？"
2004605-44 = "……。"
2004605-45 = "[ns] \"ニヤさん、正座。\""
2004605-46 = "はい？"
2004605-47 = "[ns] \"今からお説教タイムです。\""
2004605-50 = "[wa:770]― [log=니야]にゃ、[wa:650]にゃはは……[/log]"
2004605-51 = "[wa:1640]― [log=니야]もしも～[wa:900]し、[wa:410]先生～？[/log]"
2004605-54 = "― [log=니야]あらあら、[wa:1230]怖い顔……。[/log]"
2004605-55 = "[wa:1940]― [log=니야]先生には似合いませんよぉ？[/log]"
2004605-58 = "[wa:1470]― [log=니야]もしかして……[wa:2000]本当に怒ってます？[/log]"
2004605-61 = "― [log=니야]いや、[wa:730]まぁ……[/log]"
2004605-62 = "[wa:1310]― [log=니야]分かっていますけど……[wa:2140]にゃは……。[/log]"
2004605-65 = "[wa:1780]― [log=니야]ええと……[wa:2050]はい……。[/log]"
2004605-66 = "[wa:1250]― [log=니야]……申し訳ありません。[/log]"
2004605-69 = "― [log=니야]でもほら、[wa:1160]なんといいますかぁ〜[/log]"
2004605-70 = "[wa:1910]― [log=니야]こちらにも[wa:1010]事情というものが[wa:1270]ありましてねぇ～？[/log]"
2004605-73 = "[wa:260]― [log=니야]にゃはっ！？[wa:1220]いえいえ！[/log]"
2004605-76 = "― [log=니야]滅相もない！[/log]"
2004605-77 = "[wa:1100]― [log=니야]反省していますとも！[wa:1570]ええ！[/log]"
2004605-80 = "[wa:1300]― [log=니야]ええ……[wa:930]心から反省しておりますので……[/log]"
2004605-81 = "[wa:2880]― [log=니야]どうか、[wa:1310]許してもらえませんか？[/log]"
2004605-84 = "（お説教はしばらく続いた）"
