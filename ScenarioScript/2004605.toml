[translation]
2004605-1 = "Fúria imensa, capaz de virar o mundo de cabeça para baixo"
2004605-6 = "（No fim, a resposta da Niya não chegou）"
2004605-7 = "（Sem conseguir ficar parado, saí correndo do Schale）"
2004605-9 = "Dizem que o pessoal do Grupo Chimi está causando de novo."
2004605-10 = "E olha que a gente não tem tempo para isso..."
2004605-11 = "Parece que tem gente sendo extorquida por dinheiro."
2004605-12 = "Isso não é nada diferente de um assalto! #nEmbora sejam problemáticos, eu achava que eles só gostavam de festivais..."
2004605-14 = "（Passando pelas ruas que estavam ainda mais caóticas do que antes...）"
2004605-16 = "Waaah! Não consigo encontrar uma sala de clube substituta!"
2004605-17 = "Até teve um clube que aceitou trocar de sala, mas..."
2004605-18 = "Todas são pequenas demais para guardar as obras, né..."
2004605-19 = "Já era! Desse jeito, o clube vai ser fechado...!"
2004605-20 = "Não chora! Eu também estou me segurando aqui...!"
2004605-22 = "（Olhando de relance para as alunas preocupadas com a sala do clube... segui em direção à sala do Clube de Yin e Yang）"
2004605-24 = "Ora, ora... a cidade chegou a esse ponto. A situação só piora, não é mesmo?"
2004605-25 = "Hã? Está perguntando se eu não previa isso?"
2004605-26 = "Nyaha~, você está me superestimando um pouco demais."
2004605-30 = "Bom... vamos parar com as mentiras óbvias por aqui."
2004605-31 = "De fato, se eu quisesse, seria fácil intermediar um acordo entre a Associação de Comerciantes e o Grupo Chimi..."
2004605-32 = "E também conheço clubes que trocariam de sala sob condições que satisfizessem o Clube de Origami."
2004605-33 = "Seria rápido resolver tudo num estalar de dedos, mas..."
2004605-34 = "Existe uma grande diferença entre poder resolver e realmente resolver."
2004605-35 = "Como eu disse antes... o papel do Clube de Yin e Yang é manter a harmonia. #nSe cruzarmos a linha uma única vez, não haverá volta."
2004605-36 = "Bem, deixando isso de lado—"
2004605-37 = "Não é mais interessante quando há um pouco de agitação por aí?"
2004605-38 = "[s] \"...Então, o que era aquela 'coisa grave' que você mencionou antes?\""
2004605-39 = "Ah, então você estava curioso, afinal?"
2004605-40 = "Não, é que eu pensei em compartilhar um pouco da agitação com você~"
2004605-44 = "..."
2004605-45 = "[ns] \"Niya, sente-se corretamente.\""
2004605-46 = "Sim?"
2004605-47 = "[ns] \"Agora é hora da bronca.\""
2004605-50 = "[wa:770]― [log=니야]Nya, [wa:650]nyahaha...[/log]"
2004605-51 = "[wa:1640]― [log=니야]Alô~ [wa:900]alô, [wa:410]Sensei~?[/log]"
2004605-54 = "― [log=니야]Ora, ora, [wa:1230]que cara assustadora...[/log]"
2004605-55 = "[wa:1940]― [log=니야]Não combina com você, Sensei.[/log]"
2004605-58 = "[wa:1470]― [log=니야]Por acaso... [wa:2000]você está realmente bravo?[/log]"
2004605-61 = "― [log=니야]Não, [wa:730]bem...[/log]"
2004605-62 = "[wa:1310]― [log=니야]Eu entendo, mas... [wa:2140]nyaha...[/log]"
2004605-65 = "[wa:1780]― [log=니야]Bem... [wa:2050]sim...[/log]"
2004605-66 = "[wa:1250]― [log=니야]...Peço perdão.[/log]"
2004605-69 = "― [log=니야]Mas veja bem, [wa:1160]como posso dizer...[/log]"
2004605-70 = "[wa:1910]― [log=니야]Eu também tenho [wa:1010]as minhas razões, [wa:1270]sabe?[/log]"
2004605-73 = "[wa:260]― [log=니야]Nyaha!? [wa:1220]Não, não![/log]"
2004605-76 = "― [log=니야]De jeito nenhum![/log]"
2004605-77 = "[wa:1100]― [log=니야]Estou arrependida! [wa:1570]Sim![/log]"
2004605-80 = "[wa:1300]― [log=니야]Sim... [wa:930]estou arrependida de coração, então...[/log]"
2004605-81 = "[wa:2880]― [log=니야]Por favor, [wa:1310]você não poderia me perdoar?[/log]"
2004605-84 = "（A bronca continuou por um bom tempo）"
