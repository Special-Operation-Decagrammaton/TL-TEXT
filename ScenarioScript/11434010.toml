[translation]
11434010-1 = "エンディング（ノーマル）;\"……振り返ってみると。\""
11434010-2 = "……なんてこともあったわね。"
11434010-3 = "……そろそろ、結果発表の時間じゃないの？"
11434010-4 = "ちょっと待ってね。すぐ確認……あれ、読み込みが……。"
11434010-5 = "……えっ。"
11434010-6 = "な、なに！？早く言いなさいよ！"
11434010-7 = "あはは……。"
11434010-11 = "……！"
11434010-13 = "……っ！"
11434010-14 = "み、みんな見て！！ここ、私たちの名前あるよ！！"
11434010-15 = "えっ、ほんと！？じゃあ入選したってこと！？"
11434010-16 = "本当に入選、しちゃうなんて……。"
11434010-17 = "これでダメだったら、それはシナリオが悪いね。"
11434010-18 = "また変なこと言ってる……。"
11434010-20 = "とにかく入選したなら、こうしてる場合じゃないよ。早く行かないと。"
11434010-21 = "……ナツちゃん、急にどうしたの？"
11434010-22 = "私たちの目的、忘れてないよね？"
11434010-27 = "……そうだった。今度こそ正々堂々と「侵入」できるわね。"
11434010-28 = "うん、確かに。"
11434010-30 = "え、えっと……侵入って言って良いのかな……？"
11434010-36 = "さあ……セムラを取りに行こう！！"
