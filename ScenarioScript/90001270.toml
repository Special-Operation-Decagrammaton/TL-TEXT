[translation]
90001270-1 = "第27話;罪と罰"
90001270-2 = "宣戦布告……？#n人間の真似事ですか？"
90001270-3 = "で、でででで、出ました！#n「鍵」です！"
90001270-4 = "（鍵……？）"
90001270-6 = "真似事……その言い方はいただけないかな。#nせっかく敬意を払ってあげたのにさ。"
90001270-7 = "私は反対しましたけどね～"
90001270-8 = "そんなことより、あの力場をこじ開けたのは、あなたの仕業ですか？"
90001270-9 = "もちろん、「鍵」一人では無理だったのでしょうが……。"
90001270-15 = "……「王女」が一緒でしたもんね？"
90001270-16 = "……！"
90001270-17 = "よくもまあ私たちの目から逃れたものです。"
90001270-19 = "う、うぅ……私がもっとしっかりしてたら……。"
90001270-20 = "アインのせいじゃないよ！#n王女がいることも、あんなことができるのも、全部想定外だったんだから。"
90001270-22 = "王女……私たちはとても残念に思っているのです。"
90001270-23 = "自身の根源を忘れてしまった「意識体」。#nそれではまるで――"
90001270-24 = "平凡な「生命体」のようではありませんか。"
90001270-25 = "どういう、意味ですか……？"
90001270-27 = "その、つまり……。#n生まれる前の記憶がある生命体は、いませんよね……？"
90001270-28 = "誕生の過程を考えれば、そりゃそうだって話なんだけど。"
90001270-29 = "ですが私たちや王女のような「意識体」は違います。#nこれこそ「生命体」との絶対的な差。私たちだけに与えられた――"
90001270-31 = "「栄光」なのですから！"
90001270-32 = "ゆえに、その栄光を捨ててしまった王女には、遺憾の意を表します。"
90001270-33 = "同時に、王女のそばにいながら、沈黙を貫いた侍女にも。"
90001270-35 = "ケイは、何か知っているんですか？#nアリスには……よく分かりません。"
90001270-36 = "気にする必要はありません。耳を貸すだけ無駄ですよ。"
90001270-38 = "へぇ？それならもう少しだけ話してあげる。#nそうだね……次は、生命について。"
90001270-39 = "これは私たちの視点だけど、生きるって――"
90001270-40 = "呪いだと思わない？"
90001270-41 = "[ns] \"呪い……？\""
90001270-42 = "考えてもみてよ。#n生まれたばかりの赤ん坊は、どうして泣くんだろうね？"
90001270-43 = "答えは……苦しいから。#nいきなり自分の肺で呼吸をすることになって、周りは聞いたこともないノイズでいっぱい。"
90001270-44 = "生まれた瞬間から、絶え間ない苦痛の中で生きる羽目になる。"
90001270-45 = "望んだわけでもないのに勝手に与えられる苦痛。#n残酷ですよね。もはや世界の不条理です。"
90001270-46 = "それならせめて、この苦しみを誰かに分かってもらいたい……。#n理解してもらいたい――"
90001270-47 = "そう願っても……他者の理解を得ることも、他者を理解することも、容易ではありません。"
90001270-48 = "誰にも理解されず、ただ己の苦痛を抱き続けるしかない……。#n生きることが罰ならば、罪は何か。"
90001270-49 = "生命は、自分が生き延びるために、他の生命を害する必要があります。#n即ち、[ruby=・   ・   ・   ・   ・   ・   ・   ・   ・   ・   ・   ・   ・   ・   ・]罪を犯さなければ生きていけない[/ruby]……皮肉なものです。"
90001270-50 = "生命体は例外なく全部同じだからね。#n人に限った話じゃないよ？"
90001270-51 = "植物だって同じ。ずっと競争してる。同族だろうと関係ない。"
90001270-52 = "根を下ろす邪魔をしたり、太陽光を遮ったり……それだって全部罪に値する。"
90001270-53 = "だから、生命が罪を犯さず、罰を受けなくて済むように……。#n私たちは生きるという呪いから解放してあげたいんだ。"
90001270-57 = "はい……あなた達の生命を奪うつもりは、ありません……。"
90001270-58 = "私たちの目的は世界征服なんかじゃない。"
90001270-59 = "この世界の誰よりも――あなた達を尊重しての選択なのですよ。"
90001270-61 = "[ns] \"もっと詳しく教えてもらえないかな？\""
90001270-62 = "……それは無理かな。#n私たちにも事情があるからさ。"
90001270-63 = "とにかく、私たちにとって、あんた達は管理すべき対象。"
90001270-64 = "わ、私たちは、あなた達を助けるために……存在するのですから。#nえへへ……。"
90001270-65 = "もう十分苦しんだでしょう？#n楽に生きたっていいじゃないですか。"
90001270-66 = "例えば、高い目標を立てて、そのために自分を追い詰める……#nそんな必要、どこにもありませんよね？"
90001270-67 = "い、良いポジションにつくために、他人をいじめたり、蹴落としたりもしますよね……。"
90001270-68 = "でも、分かるよ。仕方ないんだよね。#nだって、それが生命体だから。"
90001270-69 = "生命体には、先のことなんて分からない――"
90001270-70 = "選択が招く結果を理解していなければ「正しい選択」なんてできないのに。"
90001270-71 = "結果が分かっていないのに、当てずっぽうで選択しちゃう。#nだから、非合理的になっちゃうんじゃないのかな。"
90001270-73 = "自由は苦痛です。#n生命体は、自由に伴う責任の重さに耐えられない。"
90001270-74 = "端から分不相応な――背負うにはあまりにも巨大すぎる概念なのですよ。"
90001270-75 = "壊れやすく、予測できず――[ruby=・   ・   ・   ・]自分勝手[/ruby]なのが生命ですから。"
90001270-76 = "黙って聞いていればごちゃごちゃと……乱数ひとつ作れないくせに。"
90001270-77 = "け、ケイ……？"
90001270-81 = "！？！？"
90001270-83 = "何を驚いているんですか？#n……私には分かりますよ。"
90001270-84 = "だって、私たちは同じでしょう？"
90001270-85 = "鍵……！"
90001270-86 = "口をそろえて鍵、鍵、鍵……呼び名を改めてください。"
90001270-87 = "私の名前は「ケイ」です！"
90001270-88 = "……そして彼女は、王女ではなく「アリス」です。"
90001270-89 = "で、でも、それは……読み方を間違えた、無意味な名前……ですよね？"
90001270-90 = "あなた達には分からないでしょうね。"
90001270-91 = "……かく言う私も生命体は好きではありません。"
90001270-92 = "すぐ怪我をしますし、不用意な行動で全てを台無しにしますし。"
90001270-93 = "や、やっぱり理解してくれるんですね？#nえへへ……。"
90001270-94 = "あの……ずっと言いたかったのですが……。#n生命体なしにはあなた達も生まれていないこと、分かってます？"
90001270-96 = "言ってくれるじゃん。"
90001270-97 = "それに、あなた達の行動にも矛盾はありますよね？"
90001270-98 = "……なぜ、ティファレトに種の保管をさせているのですか？"
90001270-99 = "そ、それは……何かを管理するには、その対象をよく知るべきだから……。"
90001270-100 = "あ、また同じ言い訳。"
90001270-101 = "うるさい！#nあんた、どっちの味方なの！？"
90001270-106 = "ひぃん……ふ、二人とも喧嘩しないでください……。"
90001270-107 = "……こほん。まあ、私たちも矛盾してるところはあるかもしれない。"
90001270-108 = "でも、あんた達よりマシだよ。#n私たちは欲望じゃなくて、合理に基づいて動いてるんだから。"
90001270-110 = "果たして……欲望の無い意識は、意識と呼べるのでしょうか。"
90001270-111 = "それに――欲望だの合理だのと、誰が定義するんです？"
90001270-112 = "そ、それは……。"
90001270-113 = "少なくとも、あなた達自身の主観ではないといいのですが。#n結局、[ruby=・   ・   ・   ・]自分勝手[/ruby]な意識体だったとは思いたくありませんから。"
90001270-114 = "規則とは、自分自身で定めるものです。"
90001270-115 = "自らが定めた規則だからこそ、守ろうと思えるものなのです。"
90001270-116 = "もちろん、その過程がやや難解で非効率的なのは分かりますが……。"
90001270-117 = "そ、そう！それ！だから生命には限界があるんだよ！"
90001270-118 = "一段階進化するだけでも、いっぱい時間が必要になるし！"
90001270-119 = "ええ。その間にあなた達が気づかないようなミスや欠陥で、すべて台無しになる可能性もあるのですから。"
90001270-120 = "は、はい！#nですから……私たちはそれを防ごうとしているんです……。"
90001270-121 = "あんた達が……世界を滅亡させる前にね。"
90001270-123 = "[ns] \"なら……。\""
90001270-126 = "[ns] \"見守っていて欲しいかな。\""
90001270-127 = "……。"
90001270-128 = "先生……？"
90001270-129 = "正気！？#nガスの吸い過ぎでおかしくなっちゃった！？"
90001270-130 = "えっ、ええええ！？#nの、濃度は正常だったはずなのに……！？"
90001270-131 = "もともと変な人間だという情報はありましたが……。"
90001270-132 = "[s] \"大丈夫、私は大真面目だよ。\""
90001270-133 = "とてもそうは思えない発言でしたが。"
90001270-134 = "[s1] \"いいや。どんな結末が訪れても……。\"\n[s2] \"それは、私たちが選んだ結果だからね。\""
90001270-137 = "本当に滅亡しちゃうよ！？"
90001270-138 = "[s] \"自分たちが選んだ結末なら、受け入れないと。\""
90001270-143 = "[ns3] \"自分たちで選んで、その結果自滅するなら……。\"\n[ns4] \"誰かに選択を委ねて守ってもらうより、ずっといい。\""
90001270-147 = "アリスには、先生の言葉の意味がよく分かりません……。"
90001270-148 = "[s5] \"大丈夫だよ、アリス。\"\n[s6] \"道のりは大変だろうけど、私たちの手できっと叶えられる。\""
90001270-155 = "[ns] \"いろんな経験をしながら、前に進むんだ。\""
90001270-156 = "……なに、その根拠のない自信。"
90001270-157 = "それじゃ、自分を騙してるようなものだよ？"
90001270-158 = "[s7] \"……うん、そうかもしれないね。\"\n[s8] \"でも生きている限り、私たちは未来を信じるしかない。\""
90001270-164 = "[ns] \"それに、明確な根拠がないのはお互い様でしょ？\""
90001270-165 = "かっちーん。"
90001270-166 = "これが生命体の愚かさなのでしょうか……？"
90001270-167 = "はあ……やはり、この世界は不条理です。"
90001270-169 = "……。"
90001270-170 = "あ、あの……先生？"
90001270-171 = "ひ、ひとつ、お聞きしたいのですが……えっと、その……"
90001270-172 = "どんな罪でも……自[ruby=あがな]ら贖お[/ruby]うとすれば……"
90001270-173 = "そ、その結果を変えられる……補えると思いますか……？"
90001270-174 = "[s] \"きっとね。\""
90001270-178 = "[ns] \"私はそう信じてるよ。\""
90001270-179 = "恥ずかしげもなく、よくそんなこと言えるね……。"
90001270-180 = "まあ、時間稼ぎにはなったし……話は終わり！"
90001270-181 = "[ns9] \"もう終わりにしちゃうの？\"\n[ns10] \"みんなの話、もっと聞きたかったのに。\""
90001270-184 = "余計なお世話です。"
90001270-185 = "そういうこと！んじゃ、切るからね！"
90001270-187 = "……。"
90001270-188 = "あ、あの、先生……？"
90001270-189 = "その、もし……もし、良かったら……。"
90001270-190 = "ダメだよ、アイン！#nこんな大人に騙されちゃ。"
90001270-191 = "そうです、パクっと食べられちゃいますよ。"
90001270-192 = "ああいう大人を「腹黒」って言うんだから。"
90001270-193 = "は、腹黒……って何ですか……？"
90001270-194 = "優しそうに見えても、心の中ではこわーい悪巧みしてる人のこと！"
90001270-195 = "先生も、お腹の中は真っ黒なんだよ……！"
90001270-196 = "そ、そそそそ、そうなんですか……！？#n先生って、怖い大人だったんですね……。"
90001270-197 = "（でも、そんな風には……？）"
90001270-199 = "[ns] \"またいつでも連絡してね。\""
90001270-200 = "願いさげですよ。"
90001270-201 = "またアインをたぶらかそうとしたら、許さないからっ！"
90001270-205 = "身勝手な連中ですね……結局、何が言いたかったのやら。"
90001270-206 = "何もヒントを残していってくれませんでした……。"
90001270-207 = "みんな、全然起きる気配がありません！"
90001270-208 = "（たしかに、まずは目の前の問題から解決しないと……）"
90001270-209 = "（解決の糸口は――）"
90001270-211 = "ええ。でもシード・ボルトの管理AIは、預言者になってからも種の管理を続けている。"
90001270-212 = "――まるで、それが使命であるかのように。"
90001270-214 = "[56cd7b][log=모니터]ああ、それと。ここ、第3区域の管理施設までは立ち入りを許可しますが――[/log]"
90001270-216 = "[56cd7b][log=모니터]この先の第2貯蔵庫は、指導委員会の手続きなしでは進めません。[/log]"
90001270-219 = "[56cd7b][log=모니터]全体の7割を占める種が保管されている重要施設なので。[/log]"
90001270-221 = "[56cd7b][log=모니터]もし施設に危害を加えたり、無理やり侵入しようとした場合――[/log]"
90001270-223 = "[56cd7b][log=모니터]他の施設を諦めてでも、あなたを……あなたを……うーん……。[/log]"
90001270-226 = "[ns] \"……ケイ！\""
90001270-227 = "え？わ、私ですか……？"
90001270-228 = "……はぁっ！？第2貯蔵庫の入口を攻撃する！？正気ですか！？"
90001270-230 = "次回;ティファレト"
