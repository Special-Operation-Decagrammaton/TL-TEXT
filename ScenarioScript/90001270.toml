[translation]
90001270-1 = "Episódio 27; Crime e Castigo"
90001270-2 = "Uma declaração de guerra...?#nEstá tentando imitar os humanos?"
90001270-3 = "A-a-a-a-a-apareceu!#nA \"Chave\"!"
90001270-4 = "(Chave...?)"
90001270-6 = "Imitar... não gosto desse jeito de falar.#nEu fiz questão de mostrar respeito, sabe."
90001270-7 = "Embora eu tenha sido contra isso~"
90001270-8 = "Deixando isso de lado, foi você quem forçou a abertura daquele campo de força?"
90001270-9 = "Claro, a \"Chave\" sozinha não teria conseguido, mas..."
90001270-15 = "...a \"Princesa\" estava com você, não é?"
90001270-16 = "...!"
90001270-17 = "É impressionante como conseguiram escapar dos nossos olhos."
90001270-19 = "A-ai... se eu tivesse sido mais cuidadosa..."
90001270-20 = "Não é culpa sua, Ein!#nO fato de a Princesa estar lá e ser capaz de fazer aquilo, tudo isso estava fora das nossas previsões."
90001270-22 = "Princesa... nós sentimos muito por isso."
90001270-23 = "Uma \"entidade consciente\" que esqueceu sua própria origem.#nIsso faz com que você pareça..."
90001270-24 = "uma \"forma de vida\" comum, não é?"
90001270-25 = "O que você quer dizer com isso...?"
90001270-27 = "Bem, ou seja...#nNão existem formas de vida que tenham memórias de antes de nascer, certo...?"
90001270-28 = "Se você pensar no processo de nascimento, faz sentido, mas..."
90001270-29 = "Mas nós e a Princesa, como \"entidades conscientes\", somos diferentes.#nEssa é a diferença absoluta em relação às \"formas de vida\". Algo concedido apenas a nós—"
90001270-31 = "é a nossa \"glória\"!"
90001270-32 = "Portanto, expressamos nosso pesar à Princesa, que descartou essa glória."
90001270-33 = "E, ao mesmo tempo, à serva que permaneceu em silêncio enquanto estava ao lado dela."
90001270-35 = "Kei, você sabe de alguma coisa?#nAlice... não entende muito bem."
90001270-36 = "Não precisa se preocupar. É um desperdício dar ouvidos a eles."
90001270-38 = "Ora? Nesse caso, vou falar um pouco mais.#nQue tal... sobre a vida."
90001270-39 = "Este é o nosso ponto de vista, mas viver é—"
90001270-40 = "Você não acha que é uma maldição?"
90001270-41 = "[ns] \"Uma maldição...?\""
90001270-42 = "Pense bem.#nPor que um recém-nascido chora?"
90001270-43 = "A resposta é... porque é doloroso.#nDe repente, você tem que respirar com seus próprios pulmões, e o ambiente está cheio de ruídos que você nunca ouviu antes."
90001270-44 = "Desde o momento em que nasce, você é forçado a viver em meio a um sofrimento incessante."
90001270-45 = "Uma dor imposta sem que você tenha pedido.#nÉ cruel. É o absurdo do mundo."
90001270-46 = "Então, pelo menos, você quer que alguém entenda esse sofrimento...#nQuer que alguém compreenda—"
90001270-47 = "Mesmo que deseje isso... não é fácil obter a compreensão dos outros, nem compreender os outros."
90001270-48 = "Sem ser compreendido por ninguém, você só pode carregar sua própria dor...#nSe viver é um castigo, qual seria o crime?"
90001270-49 = "Para sobreviver, a vida precisa prejudicar outras formas de vida.#nOu seja, não se pode viver sem cometer crimes... é irônico."
90001270-50 = "As formas de vida são todas iguais, sem exceção.#nNão estou falando apenas dos humanos, sabe?"
90001270-51 = "As plantas também são iguais. Estão sempre competindo. Não importa se são da mesma espécie."
90001270-52 = "Impedir que criem raízes, bloquear a luz do sol... tudo isso também conta como crime."
90001270-53 = "Por isso, para que a vida não cometa crimes e não precise ser punida...#nnós queremos libertá-los dessa maldição que é viver."
90001270-57 = "Sim... não temos a intenção de tirar a vida de vocês..."
90001270-58 = "Nosso objetivo não é a dominação mundial."
90001270-59 = "É uma escolha feita respeitando vocês mais do que qualquer um neste mundo."
90001270-61 = "[ns] \"Poderia me explicar com mais detalhes?\""
90001270-62 = "...Isso não é possível.#nNós também temos nossas circunstâncias."
90001270-63 = "De qualquer forma, para nós, vocês são objetos que precisam ser gerenciados."
90001270-64 = "N-nós existimos para ajudar vocês...#nehehe..."
90001270-65 = "Vocês já sofreram o suficiente, não é?#nNão seria melhor viver com mais leveza?"
90001270-66 = "Por exemplo, estabelecer metas altas e se pressionar por causa disso...#nnão há necessidade alguma para isso, certo?"
90001270-67 = "P-para conseguir uma boa posição, as pessoas acabam intimidando ou derrubando as outras, não é...?"
90001270-68 = "Mas eu entendo. Não tem como evitar, né?#nAfinal, é assim que os seres vivos são."
90001270-69 = "Os seres vivos não conseguem prever o futuro —"
90001270-70 = "Mesmo que não consigam entender as consequências de suas escolhas, eles não conseguem fazer a 'escolha certa'."
90001270-71 = "Eles fazem escolhas baseadas em palpites sem saber o resultado.#nNão é por isso que acabam sendo irracionais?"
90001270-73 = "A liberdade é um sofrimento.#nOs seres vivos não conseguem suportar o peso da responsabilidade que acompanha a liberdade."
90001270-74 = "É um conceito inadequado desde o início — grande demais para ser carregado."
90001270-75 = "Porque a vida é frágil, imprevisível e egoísta."
90001270-76 = "Ficam aí tagarelando enquanto eu escuto... sendo que nem conseguem criar um único número aleatório."
90001270-77 = "K-Kei...?"
90001270-81 = "！？！？"
90001270-83 = "Por que estão surpresos?#n...Eu entendo vocês."
90001270-84 = "Afinal, nós somos iguais, não somos?"
90001270-85 = "Chave...!"
90001270-86 = "Chave, chave, chave... todos vocês repetindo a mesma coisa... por favor, mudem como me chamam."
90001270-87 = "Meu nome é 'Kei'!"
90001270-88 = "...E ela não é uma princesa, ela é a 'Alice'."
90001270-89 = "M-mas, isso é... um nome sem sentido, uma leitura errada... não é?"
90001270-90 = "Vocês não entenderiam."
90001270-91 = "...Dito isso, eu também não gosto de seres vivos."
90001270-92 = "Eles se machucam facilmente e arruínam tudo com ações imprudentes."
90001270-93 = "V-você realmente me entende, não é?#nHehehe..."
90001270-94 = "Ei... eu queria dizer isso há muito tempo...#nVocê sabe que, sem os seres vivos, vocês nem teriam nascido?"
90001270-96 = "Olha só quem fala."
90001270-97 = "Além disso, as ações de vocês também são contraditórias, não são?"
90001270-98 = "...Por que vocês deixam Tiphereth cuidar do armazenamento das sementes?"
90001270-99 = "I-isso é porque... para gerenciar algo, é preciso conhecer bem o objeto..."
90001270-100 = "Ah, a mesma desculpa de novo."
90001270-101 = "Cala a boca!#nDe que lado você está!?"
90001270-106 = "Hiii... p-por favor, não briguem, vocês duas..."
90001270-107 = "...Cof. Bem, talvez nós também tenhamos nossas contradições."
90001270-108 = "Mas somos melhores que vocês.#nNós agimos com base na razão, não no desejo."
90001270-110 = "Será que... uma consciência sem desejo pode ser chamada de consciência?"
90001270-111 = "E além disso — quem define o que é desejo e o que é razão?"
90001270-112 = "I-isso é..."
90001270-113 = "Espero que não seja apenas o subjetivismo de vocês.#nNão gostaria de pensar que vocês são apenas entidades conscientes egoístas."
90001270-114 = "As regras são algo que definimos para nós mesmos."
90001270-115 = "É justamente por serem regras que nós mesmos definimos que queremos segui-las."
90001270-116 = "Claro, entendo que esse processo seja um pouco complexo e ineficiente..."
90001270-117 = "I-isso! Exatamente! É por isso que a vida tem limites!"
90001270-118 = "Só para evoluir um estágio, é preciso muito tempo!"
90001270-119 = "Sim. E nesse meio tempo, existe a possibilidade de tudo ser arruinado por erros ou falhas que vocês nem percebem."
90001270-120 = "S-sim!#nPor isso... nós estamos tentando evitar isso..."
90001270-121 = "Antes que vocês... destruam o mundo."
90001270-123 = "[ns] \"Então...\""
90001270-126 = "[ns] \"Eu gostaria que vocês apenas observassem.\""
90001270-127 = "..."
90001270-128 = "Sensei...?"
90001270-129 = "Você enlouqueceu!?#nFicou maluco de tanto inalar gás!?"
90001270-130 = "E-eh, eeeeeh!?#nA c-concentração deveria estar normal...!"
90001270-131 = "Eu já tinha recebido informações de que você era uma pessoa estranha, mas..."
90001270-132 = "[s] \"Não se preocupe, estou falando muito sério.\""
90001270-133 = "Foi uma declaração que não me pareceu nada séria."
90001270-134 = "[s1] \"Não. Não importa qual seja o desfecho...\"\n[s2] \"É um resultado que nós mesmos escolhemos.\""
90001270-137 = "Nós vamos acabar sendo destruídos de verdade!?"
90001270-138 = "[s] \"Se é um desfecho que nós escolhemos, temos que aceitá-lo.\""
90001270-143 = "[ns3] \"Se escolhemos por conta própria e acabarmos nos autodestruindo por causa disso...\"\n[ns4] \"É muito melhor do que deixar que outra pessoa escolha por nós e nos proteja.\""
90001270-147 = "Alice não entende muito bem o significado das palavras do Sensei..."
90001270-148 = "[s5] \"Está tudo bem, Alice.\"\n[s6] \"O caminho pode ser difícil, mas com certeza conseguiremos alcançá-lo com nossas próprias mãos.\""
90001270-155 = "[ns] \"Vamos seguir em frente enquanto acumulamos várias experiências.\""
90001270-156 = "...O que é essa confiança sem fundamento?"
90001270-157 = "Isso não é o mesmo que enganar a si mesmo?"
90001270-158 = "[s7] \"...Sim, talvez seja.\"\n[s8] \"Mas, enquanto estivermos vivos, não temos escolha a não ser acreditar no futuro.\""
90001270-164 = "[ns] \"Além disso, não ter um fundamento claro é algo que se aplica a nós dois, não é?\""
90001270-165 = "Grrr."
90001270-166 = "Será que essa é a tolice dos seres vivos...?"
90001270-167 = "Haa... Como esperado, este mundo é absurdo."
90001270-169 = "..."
90001270-170 = "A-ah, com licença... Sensei?"
90001270-171 = "Eu, eu gostaria de perguntar uma coisa... bem, é que..."
90001270-172 = "Se alguém tentar redimir qualquer pecado que tenha cometido..."
90001270-173 = "V-você acha que é possível mudar o resultado... ou compensá-lo...?"
90001270-174 = "[s] \"Com certeza.\""
90001270-178 = "[ns] \"Eu acredito nisso.\""
90001270-179 = "Como você consegue dizer algo assim sem nem ficar envergonhado..."
90001270-180 = "Bem, já serviu para ganhar tempo... A conversa acabou!"
90001270-181 = "[ns9] \"Já vai terminar?\"\n[ns10] \"Eu queria ouvir mais o que todos tinham a dizer.\""
90001270-184 = "Não se meta onde não foi chamado."
90001270-185 = "É isso! Então, vou desligar!"
90001270-187 = "..."
90001270-188 = "A-ah, com licença, Sensei...?"
90001270-189 = "É que, se... se não for pedir muito..."
90001270-190 = "Não faça isso, Ein! #nNão se deixe enganar por um adulto desses."
90001270-191 = "É verdade, ele vai te devorar num piscar de olhos."
90001270-192 = "Adultos assim são chamados de \"barriga negra\"."
90001270-193 = "B-barriga negra... o que é isso...?"
90001270-194 = "É alguém que parece gentil, mas que está tramando coisas terríveis lá no fundo!"
90001270-195 = "O interior do Sensei também é completamente negro...!"
90001270-196 = "É, é, é, é, é verdade isso...!? #nO Sensei era um adulto assustador..."
90001270-197 = "(Mas, ele não parece ser assim...?)"
90001270-199 = "[ns] \"Entre em contato de novo quando quiser.\""
90001270-200 = "Dispenso."
90001270-201 = "Se tentar enganar a Ein de novo, eu não vou te perdoar!"
90001270-205 = "Que grupo egoísta... No fim das contas, nem sei o que eles queriam dizer."
90001270-206 = "Eles não deixaram nenhuma dica..."
90001270-207 = "Pessoal, não parece que ninguém vai acordar tão cedo!"
90001270-208 = "(De fato, primeiro preciso resolver o problema que está bem na minha frente...)"
90001270-209 = "(A chave para a solução é...)"
90001270-211 = "Sim. Mas a IA de gerenciamento do Seed Bolt continua gerenciando as sementes mesmo depois de se tornar uma profetisa."
90001270-212 = "— Como se isso fosse a sua missão."
