[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
2001806-1 = "Linha de Fase" 
2001806-2 = "（Ao ver a mensagem da Moe, saí correndo em direção ao Parque dos Coelhinhos.）" 
2001806-4 = "……Ué, Sensei?" 
2001806-5 = "Chegou bem mais rápido do que eu esperava. Não precisava ter vindo nessa pressa toda……" 
2001806-6 = "[s1] \"Haa, haa…… Parece que cheguei a tempo……\"\n[s2] \"As bombas estão seguras……?\"" 
2001806-7 = "As bombas tão guardadas ali ainda, mas……" 
2001806-8 = "As bombas tão guardadas ali ainda, mas……" 
2001806-9 = "……Ahh, entendi. Você também tava a fim de explodir algumas? " 
2001806-10 = "Temos um monte delas separadas por categorias, é só falar." 
2001806-11 = "Qual você quer detonar primeiro?\nGranadas de luz? Granadas de fumaça? Ou prefere mísseis……?" 
2001806-12 = "[s3] \"Eu não vim até aqui para explodir bombas……\"\n[s4] \"Vim porque estava com medo de você explodi-las……\"" 
2001806-13 = "……Ah. Então você veio correndo assim porque tava desconfiando de mim?" 
2001806-14 = "……Ah. Então você veio correndo assim porque tava desconfiando de mim?" 
2001806-15 = "Por mais que eu adore explosões, não sou estúpida a ponto de acender um fósforo durante a gestão de suprimentos." 
2001806-16 = "Posso não parecer, mas sou uma operadora e intendente exemplar da SRT.\nNão sou o tipo de mulher que torra os recursos da equipe sem pensar." 
2001806-17 = "……Bem, pelo menos dentro do que pode ser considerado 'bom senso' na medida do possível, saca?" 
2001806-18 = "[s] \"Agora sim estou ficando preocupado……\"" 
2001806-19 = "Mas de qualquer forma, que bom que você veio.\nEu tava justamente quebrando a cabeça sobre como arrumar todos esses suprimentos pesados." 
2001806-20 = "……O Sensei realmente aparece rapidinho sempre que alguma aluna tá com problemas, né." 
2001806-21 = "Posso não ter dito isso antes, mas eu valorizo muito isso em você." 
2001806-22 = "……E aí, bora começar?" 
2001806-28 = "Olha só…… As granadas de fragmentação de hoje em dia são construídas para explodir simultaneamente sem precisar de um detonador separado…… irado." 
2001806-29 = "O que quer dizer que…… apenas apertando esse botão, a gente consegue explodir todas as granadas juntas de uma vez……" 
2001806-30 = "[s] \"Espera aí, Moe. Não f――\"" 
2001806-31 = "……Melhor eu enrolar elas num plástico anti-estática e botar na caixa pra evitar disparos acidentais." 
2001806-32 = "Hm? Sensei, o que houve?\nIa dizer alguma coisa?" 
2001806-33 = "[s] \"Ah, não, deixa pra lá……\"" 
2001806-34 = "Kuhihi…… Sei." 
2001806-35 = "Bora continuar com a organização?" 
2001806-38 = "Isso aqui, é a nova bomba de Pulso Eletromagnético (EMP)? Ouvi dizer que o estrago que causa é imenso pro tamanho dela." 
2001806-39 = "Se a gente ativasse um brinquedinho desses por acidente……" 
2001806-40 = "Fufufu…… Todos os celulares e veículos na área iam pifar, e nós ficaríamos literalmente isolados no meio do centro da cidade……" 
2001806-41 = "[s] \"Calma aí, isso aí é――\"" 
2001806-45 = "Vou jogar isso dentro do cofre especial forrado com isolamento pra evitar qualquer acidente." 
2001806-46 = "……Ué? Sensei, por que tá aí parado de braços cruzados?" 
2001806-47 = "Se já terminou de arrumar o seu lado, vem logo me ajudar no meu." 
2001806-52 = "Aaah~ Finalmente terminamos…… Demorou bem mais do que eu imaginei." 
2001806-53 = "Se você não tivesse vindo dar uma mão, Sensei, eu não teria terminado ainda.\nValeu mesmo." 
2001806-54 = "[s5] \"Moe, tem algo te incomodando?\"\n[s6] \"Sinto que você está agindo diferente do normal……\"" 
2001806-55 = "Diferente do normal?" 
2001806-56 = "Diferente do normal?" 
2001806-57 = "Será? Pra mim tá tudo normal." 
2001806-58 = "É porque hoje eu vi um monte de botões perigosos e nem quis apertá-los?" 
2001806-59 = "Isso é, hmm……" 
2001806-60 = "……Talvez porque eu estava me segurando para fazer uma loucura ainda maior depois." 
2001806-61 = "[s] \"Loucura ainda maior?\"" 
2001806-62 = "Uhum. Pra ser sincera, isso tava martelando na minha cabeça tem um tempinho." 
2001806-63 = "Hoje as outras não estão por perto, somos só você e eu, Sensei……" 
2001806-64 = "Eu estava me forçando a engolir a vontade insana de fazer uma loucura daquelas, mas……" 
2001806-65 = "Como você tocou no assunto, acabou me lembrando de novo." 
2001806-66 = "Haa……" 
2001806-72 = "[wa:700]― Sensei……" 
2001806-74 = "― Existem vários [wa:1400]tipos de coisas no nosso mundo, não acha?" 
2001806-77 = "― Botões que não devemos apertar," 
2001806-79 = "― E linhas que nunca devem ser cruzadas." 
2001806-82 = "[wa:300]― Algumas delas, [wa:1300]se você as escolher uma única vez, não tem mais volta." 
2001806-84 = "― São coisas que só nos levam diretamente à mais pura ruína." 
2001806-87 = "[wa:700]― Se você errar um passo, é o fim." 
2001806-89 = "[wa:400]― Mas mesmo assim, [wa:900]há sempre uma chance de que isso possa [wa:1800]satisfazer totalmente os desejos do coração……" 
2001806-92 = "[wa:100]― Se algo assim surgisse," 
2001806-94 = "― O que você faria, Sensei?" 
2001806-97 = "[wa:400]― Eu sei muito bem que [wa:1200]essa pergunta é boba." 
2001806-99 = "― Afinal, você é uma pessoa muito certinha, Sensei." 
2001806-102 = "[wa:700]― Mas eu……" 
2001806-104 = "― Pode ser que eu acabe, [wa:1800]cruzando essa linha." 
2001806-107 = "― Porque o instante dessa ruína," 
2001806-109 = "[wa:300]― Também é uma [wa:600]chance de provar [wa:800]que eu sou eu mesma." 
2001806-112 = "[wa:600]― É por isso, [wa:1800]Sensei……" 
2001806-115 = "― Essa linha proibida……" 
2001806-117 = "[wa:100]― Por que você não tenta cruzar ela, [wa:1200]junto comigo?" 
2001806-120 = "Haa, haa……" 
2001806-121 = "Definitivamente não dá.\nNão consigo mais me segurar……" 
2001806-122 = "（A Moe se ergueu devagarinho, e quando se aproximou do meu rosto……）" 
2001806-123 = "（Rapidamente enfiou alguma coisa na minha boca.）" 
2001806-125 = "[ns7] \"M-Mas o que é isso……?\"\n[ns8] \"Tem um gosto extremamente doce……\"" 
2001806-126 = "Fufufu…… Tá estupidamente doce, né?" 
2001806-127 = "Fufufu…… Tá estupidamente doce, né?" 
2001806-128 = "É uma bala super concentrada de altíssima caloria que eu pedi junto com a munição desta vez." 
2001806-129 = "Normalmente elas são uns suplementos de energia rápida pra quando a gente tá morrendo de cansaço durante as operações.\nMas eu acabei me viciando no gosto e às vezes bate uma vontade absurda de comer." 
2001806-130 = "Comer coisas com um nível altíssimo de caloria como esse numa hora tão tarde da noite……\nIsso com certeza vai virar pura gordura no corpo num piscar de olhos……" 
2001806-131 = "Aah, esse sabor destrutivo e puramente pecaminoso…… eu acho que é isso que o torna ainda mais docinho……" 
2001806-132 = "[s9] \"Então a tal linha proibida que você queria cruzar era……\"\n[s10] \"Apenas comer balinhas antes de dormir……\"" 
2001806-133 = "Mas que cara é essa." 
2001806-134 = "Mas que cara é essa." 
2001806-135 = "Vai me dizer que achou que eu tava falando de 'cruzar a linha' num sentido mais safadinho?\nSensei…… eu não imaginava que você fosse esse tipo de adulto. Kuhihi……" 
2001806-136 = "Bem, não que eu não tenha a mínima curiosidade de saber como deve ser esse tipo de 'ruína'.\nMas eu tenho certeza de que depois eu estaria bem fodida pra resolver a situação, sabe." 
2001806-137 = "Eu amo causar um caos destrutivo por aí, mas eu também não sou de sair tomando atitudes imbecis sem medir as consequências." 
2001806-139 = "……Mas, você sabe que humanos são bichos inconstantes, né?" 
2001806-140 = "Então, talvez chegue o dia em que eu esqueça os perigos e resolva chutar o balde e cruzar de vez as linhas da sanidade de novo." 
2001806-141 = "Por isso, pega leve comigo quando essa hora chegar, tá? Sensei. Kuhihi……" 