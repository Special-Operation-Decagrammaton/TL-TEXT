[translation]
2001806-1 = "Linha de Fase"
2001806-2 = "（Ao ver o e-mail da Moe, corri até o Parque dos Coelhinhos）"
2001806-4 = "……Ué, Sensei?"
2001806-5 = "Chegou mais rápido do que eu pensava. Não precisava ter vindo com tanta pressa……."
2001806-6 = "[s1] \"Haa, haa…… parece que cheguei a tempo…….\"\n[s2] \"As bombas estão bem……?\""
2001806-7 = "As bombas ainda estão ali onde eu as deixei, mas……."
2001806-8 = "As bombas ainda estão ali onde eu as deixei, mas……."
2001806-9 = "……Ora, Sensei, você também queria explodir alguma coisa?"
2001806-10 = "Se for sobre bombas, tenho várias de tipos diferentes, pode pedir quando quiser."
2001806-11 = "Por qual quer começar?#nFlashbang? Bomba de fumaça? Ou talvez um míssil……?"
2001806-12 = "[s3] \"Não vim aqui para explodir nada…….\"\n[s4] \"Estava preocupado que a Moe fosse explodir tudo…….\""
2001806-13 = "……Ah, entendi. Veio com tanta pressa porque estava desconfiando de mim?"
2001806-14 = "……Ah, entendi. Veio com tanta pressa porque estava desconfiando de mim?"
2001806-15 = "Por mais que eu goste de explosões, não sou idiota a ponto de colocar fogo em tudo enquanto organizo o estoque."
2001806-16 = "Por mais que não pareça, sou uma operadora e responsável pelo suprimento da SRT. #nNão sou do tipo que desperdiça os equipamentos que todos usam sem pensar."
2001806-17 = "……Bem, dentro de um limite mínimo de \"senso comum\", é claro."
2001806-18 = "[s] \"Estou ficando cada vez mais preocupado…….\""
2001806-19 = "Bom, de qualquer forma, foi uma ajuda você ter vindo, Sensei. #nEu estava justamente pensando em como organizar esses suprimentos pesados."
2001806-20 = "……O Sensei realmente aparece sempre que um aluno está em apuros, né?"
2001806-21 = "Já disse isso antes, mas conto muito com você."
2001806-22 = "……Então, vamos começar?"
2001806-28 = "Hee…… as granadas de fragmentação de hoje em dia são projetadas para explodir simultaneamente sem precisar de um detonador separado…… incrível."
2001806-29 = "Isso significa que…… com este botão, eu poderia explodir todas as granadas que estão aqui……."
2001806-30 = "[s] \"Ei, Moe. Espere――\""
2001806-31 = "……Tenho que embrulhar uma por uma e colocar um dispositivo de remoção de eletricidade estática para não acioná-las por acidente."
2001806-32 = "Hm? Sensei, o que houve?#nQueria dizer alguma coisa?"
2001806-33 = "[s] \"Ah, não, nada…….\""
2001806-34 = "Kuhihi…… é mesmo?"
2001806-35 = "Então, vamos continuar a organização?"
2001806-38 = "Essa aqui é uma bomba EMP de novo modelo? É tão pequena, mas dizem que a potência é brutal."
2001806-39 = "Se alguém explodir um troço desses por acidente……"
2001806-40 = "Fufufu…… todos os celulares e veículos desta área parariam de funcionar, e ficaríamos literalmente isolados no centro da cidade……."
2001806-41 = "[s] \"Espere, isso é――\""
2001806-45 = "Vou guardar dentro de um cofre especial feito de material de blindagem, só por precaução."
2001806-46 = "……Hm? Sensei, o que está fazendo parado aí?"
2001806-47 = "Se já terminou de organizar aí, venha aqui me ajudar."
2001806-52 = "Ah~~ finalmente acabou…… demorou mais do que eu pensava."
2001806-53 = "Se o Sensei não tivesse me ajudado, talvez eu ainda não tivesse terminado. #nObrigada."
2001806-54 = "[s5] \"Moe, tem algo te preocupando?\"\n[s6] \"Você está um pouco diferente do habitual…….\""
2001806-55 = "Diferente do habitual?"
2001806-56 = "Diferente do habitual?"
2001806-57 = "Você acha? Eu acho que estou igual de sempre."
2001806-58 = "Diz isso porque hoje eu não tentei apertar nenhum botão perigoso?"
2001806-59 = "Isso é, hum……."
2001806-60 = "……Talvez seja porque eu estava me segurando para não fazer outras travessuras."
2001806-61 = "[s] \"Outras travessuras?\""
2001806-62 = "Sim. Na verdade, estou pensando nisso desde agora há pouco."
2001806-63 = "Hoje não tem mais ninguém da equipe, estamos só eu e o Sensei……."
2001806-64 = "Eu estava me esforçando para me controlar, com medo de acabar fazendo alguma besteira……."
2001806-65 = "Mas agora que você tocou no assunto, acabei me lembrando."
2001806-66 = "Haa..."
2001806-72 = "[wa:700]— Sensei..."
2001806-74 = "— Existem muitas coisas no mundo, não é?"
2001806-77 = "— Como botões que você não deveria apertar,"
2001806-79 = "— Ou limites que você não deveria ultrapassar."
2001806-82 = "[wa:300]— Algumas delas, [wa:1300] uma vez escolhidas, não têm volta,"
2001806-84 = "— E podem levar à ruína."
2001806-87 = "[wa:700]— Um passo em falso e é o fim,"
2001806-89 = "[wa:400]— Mas ainda assim, [wa:900] talvez isso possa satisfazer o meu coração... [wa:1800]"
2001806-92 = "[wa:100]— Nesses momentos,"
2001806-94 = "— O que você faria, Sensei?"
2001806-97 = "[wa:400]— Eu sei que é uma pergunta [wa:1200] sem sentido."
2001806-99 = "— Afinal, você é uma pessoa séria."
2001806-102 = "[wa:700]— Mas eu..."
2001806-104 = "— Talvez eu ultrapasse [wa:1800] esse limite."
2001806-107 = "— Porque esse momento de ruína,"
2001806-109 = "[wa:300]— É também uma oportunidade [wa:600] de provar [wa:800] quem eu sou."
2001806-112 = "[wa:600]— Por isso, [wa:1800] Sensei..."
2001806-115 = "— Esse limite..."
2001806-117 = "[wa:100]— Que tal ultrapassá-lo [wa:1200] comigo?"
2001806-120 = "Haa, haa..."
2001806-121 = "Não dá. #nEu não aguento mais..."
2001806-122 = "(Moe levanta-se lentamente, aproxima-se e...)"
2001806-123 = "(De repente, empurra algo dentro da sua boca)"
2001806-125 = "[ns7] \"I-isso é...?\"\n[ns8] \"Que doçura intensa...\""
2001806-126 = "Fufufu... É super doce, não é?"
2001806-127 = "Fufufu... É super doce, não é?"
2001806-128 = "É uma bala concentrada de altíssima caloria que encomendei junto com as munições."
2001806-129 = "Normalmente, é um suplemento de recuperação de fadiga para quando estou exausta durante as missões. #nMas essa doçura vicia, e às vezes dá vontade de comer."
2001806-130 = "E comer algo tão calórico a uma hora dessas... #nIsso vai acabar resultando em ganho de peso, né..."
2001806-131 = "Ah, esse sabor ruinoso e pecaminoso... Talvez seja por isso que parece ainda mais doce..."
2001806-132 = "[s9] \"Então o limite que você queria ultrapassar era...\"\n[s10] \"...comer uma bala?\""
2001806-133 = "O que é essa cara?"
2001806-134 = "O que é essa cara?"
2001806-135 = "Sensei, você por acaso achou que o limite que eu queria ultrapassar tinha outro significado? #nSensei... você tem esse seu lado, hein. Kuhihi..."
2001806-136 = "Bem, não é como se eu não tivesse interesse nesse tipo de ruína. #nMas aí sim as coisas ficariam sem volta."
2001806-137 = "Mesmo eu, que gosto da ruína, tenho capacidade de aprender com isso."
2001806-139 = "...Mas os humanos são criaturas convenientes, não são?"
2001806-140 = "Então, algum dia, talvez eu esqueça disso e ultrapasse o limite de novo."
2001806-141 = "Por isso, quando esse dia chegar, me perdoe, tá? Sensei. Kuhihi..."
