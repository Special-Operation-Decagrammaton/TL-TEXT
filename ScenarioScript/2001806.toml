[translation]
2001806-1 = "Phase Line"
2001806-2 = "（モエのメールを見て、子ウサギ公園に走ってきた）"
2001806-4 = "……あれ、先生？"
2001806-5 = "思ったより早かったね。そんなに急いで来る必要なかったのに……。"
2001806-6 = "[s1] \"ハア、ハァ……間に合ったみたいだね……。\"\n[s2] \"爆弾は大丈夫……？\""
2001806-7 = "爆弾ならまだあっちに置いてある状態だけど……。"
2001806-8 = "爆弾ならまだあっちに置いてある状態だけど……。"
2001806-9 = "……なーんだ、先生も爆発させたかったの？ "
2001806-10 = "爆弾なら種類別にいっぱいあるから、いつでも言ってね。"
2001806-11 = "どれからやってみる？#n閃光弾？煙幕弾？それともミサイル……？"
2001806-12 = "[s3] \"爆発させに来たわけじゃないよ……。\"\n[s4] \"モエが爆発させるんじゃないかと心配で……。\""
2001806-13 = "……なーんだ。私のことを疑ってたから、そんなに急いでたの？"
2001806-14 = "……なーんだ。私のことを疑ってたから、そんなに急いでたの？"
2001806-15 = "いくら私が爆発好きでも、物資の整理中に火をつけるほどのバカじゃないよ。"
2001806-16 = "こう見えても立派なSRTのオペレーター兼補給係だからね。#nみんなが使う備品を考えなしに浪費する女じゃないってこと。"
2001806-17 = "……まあ、最低限の「常識的な」範囲内ならね。"
2001806-18 = "[s] \"ますます不安になってきた……。\""
2001806-19 = "まあ、とにかく先生が来てくれて助かった。#nこの重たい物資をどうやって整理しようか悩んでたとこだったから。"
2001806-20 = "……先生は、生徒が困っているとき本当にいつでも来てくれるんだね。"
2001806-21 = "今更だけど、すごく頼りにしてる。"
2001806-22 = "……じゃあ、一緒に始めよっか？"
2001806-28 = "へぇ……最近の集束手榴弾は、雷管を別途でつけなくても同時爆発ができる設計なんだね……すごいじゃん。"
2001806-29 = "ということは……このボタンで、ここにある手榴弾をすべて爆破できるんだ……。"
2001806-30 = "[s] \"ちょっと、モエ。待っ――\""
2001806-31 = "……間違って作動しないように、1個ずつ包んで静電気除去装置を置いとかないと。"
2001806-32 = "ん？先生、どうしたの？#n何か言いたいことでもあった？"
2001806-33 = "[s] \"あ、いや、何も……。\""
2001806-34 = "くひひ……そうなんだ？ "
2001806-35 = "じゃあ、整理を続けよっか？"
2001806-38 = "これ、新型[ruby=電磁パルス]EMP[/ruby]爆弾？こんなに小さいけど、威力は凶悪なんだって。"
2001806-39 = "こんな代物を間違って爆発させたら……"
2001806-40 = "ふふふ……この一帯の携帯電話と車両はひとつ残らず故障、文字通り都心で孤立しちゃうんだろうな……。"
2001806-41 = "[s] \"待って、それは――\""
2001806-45 = "念のため遮蔽素材で作られた特殊金庫の中に保管しとこっと。"
2001806-46 = "……ん？先生、そこに立って何してるの？"
2001806-47 = "そっちの整理が終わったなら、こっち来て手伝って。"
2001806-52 = "あ～～やっと終わった……思ったよりかかったね。"
2001806-53 = "先生が手伝ってくれなかったら、まだ終わってなかったかも。#nありがとうね。"
2001806-54 = "[s5] \"モエ、何か悩み事でもある？\"\n[s6] \"いつもとなんか違うけど……。\""
2001806-55 = "いつもとなんか違う？"
2001806-56 = "いつもとなんか違う？"
2001806-57 = "そうかな？私は同じだと思うんだけど。"
2001806-58 = "今日は危険なボタンを見ても押そうとしなかったって？"
2001806-59 = "それは、んー……。"
2001806-60 = "……他にもっとやらかしたいことを、我慢してたからじゃないかな。"
2001806-61 = "[s] \"もっとやらかしたいこと？\""
2001806-62 = "うん。実はさっきからずっと気になってたの。"
2001806-63 = "今日は他の隊員もいないし、先生と二人きりだし……。"
2001806-64 = "なにかやらかしてしまいそうで、頑張って抑えていたんだけど……。"
2001806-65 = "先生がそう言うから、思い出しちゃった。"
2001806-66 = "はぁ……。"
2001806-72 = "[wa:700]― 先生……"
2001806-74 = "― 世の中には[wa:1400]色んなものがあるでしょ。"
2001806-77 = "― 押しちゃいけないボタンとか、"
2001806-79 = "― 超えちゃダメな一線とか。"
2001806-82 = "[wa:300]― 中には、[wa:1300]一度選んだら取り返しのつかない、"
2001806-84 = "― 破滅に繋がるようなものもある。"
2001806-87 = "[wa:700]― 一歩間違えたら終わり、"
2001806-89 = "[wa:400]― それでも[wa:900]自分の心を満足させられるかも[wa:1800]しれない……"
2001806-92 = "[wa:100]― そんな時、"
2001806-94 = "― 先生はどうする？"
2001806-97 = "[wa:400]― 無意味な質問だってことは[wa:1200]分かってるよ。"
2001806-99 = "― 先生は真面目だしね。"
2001806-102 = "[wa:700]― でも私は……"
2001806-104 = "― その一線を、[wa:1800]超えちゃうかもしれない。"
2001806-107 = "― だってその破滅の瞬間は、"
2001806-109 = "[wa:300]― 私自身を[wa:600]証明できる[wa:800]機会でもある。"
2001806-112 = "[wa:600]― だから、[wa:1800]先生……"
2001806-115 = "― その一線……"
2001806-117 = "[wa:100]― 私と一緒に、[wa:1200]超えてみない？"
2001806-120 = "はぁ、はぁ……。"
2001806-121 = "やっぱりダメ。#nもう我慢できない……。"
2001806-122 = "（モエはゆっくり体を起こし、近づいてくると……）"
2001806-123 = "（突然口の中に何かを押し込んだ）"
2001806-125 = "[ns7] \"こ、これは……？\"\n[ns8] \"なんか強烈な甘味が……。\""
2001806-126 = "ふふふ……すっごく甘いでしょ？"
2001806-127 = "ふふふ……すっごく甘いでしょ？"
2001806-128 = "今回弾薬と一緒に注文した、超高熱量の濃縮キャンディだよ。"
2001806-129 = "通常は作戦中とかクタクタに疲れた時とか用の疲労回復サプリなんだけど。#nこの甘さがクセになっちゃって、たまに食べたくなるんだよね。"
2001806-130 = "しかもこんな遅い時間に食べる高カロリーの食べ物なんて……#nそのまま体重増加に繋がっちゃうんだろうねぇ……。"
2001806-131 = "ああ、この破滅的で罪な味……だからかさらに甘く感じる……。"
2001806-132 = "[s9] \"超えようと言ってた一線って……。\"\n[s10] \"飴を舐めることだったんだ……。\""
2001806-133 = "なに、その顔。"
2001806-134 = "なに、その顔。"
2001806-135 = "まさか先生、私が超えたいと言った一線を別の意味だと思ってたの？#n先生ってば……意外とそういうとこあるんだね。くひひ……。"
2001806-136 = "まあ、その種の破滅に興味がないわけではないけど。#nそしたら本当に取り返しのつかない目に遭うだろうからね。"
2001806-137 = "破滅が好きな私だって、それくらいの学習能力はあるよ。"
2001806-139 = "……でも、人間って都合のいい生き物じゃない？"
2001806-140 = "だからいつかは今回のことも忘れて、また一線を超えちゃうかもしれない。"
2001806-141 = "だからその時は許してね？先生。くひひ……。"
