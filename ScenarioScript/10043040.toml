[translation]
10043040-1 = "Episódio 4; Encontro por acaso"
10043040-2 = "Está cheio de espectadores, hein."
10043040-3 = "Bem, é de se esperar, já que tem fãs dos Raiders aqui..."
10043040-4 = "Será que consigo encontrar..."
10043040-9 = "――Vai! Vai! Força!"
10043040-13 = "É bom ter uma torcida animada assim também."
10043040-14 = "A base de fãs dos Braves é, bem... um pouco... sabe como é..."
10043040-15 = "[s] \"Ué? Essa voz é...\""
10043040-16 = "Sensei?"
10043040-19 = "Força! Força! Vai nessa!"
10043040-23 = "O nome do time é... bem... de qualquer jeito!"
10043040-24 = "Voe até o outro lado do céu!"
10043040-30 = "Ué...?"
10043040-31 = "Sensei!!!"
10043040-35 = "Ehehe, que surpresa encontrar você aqui!"
10043040-36 = "[s] \"Uau, Hanae! Vamos nos acalmar um pouco!\""
10043040-37 = "……Sensei, quem é esta pessoa...?"
10043040-38 = "Olá! Sou Hanae Asagao, do 1º ano da Academia Trinity, pertencente ao Esquadrão de Socorro! 'Socorro onde o socorro for necessário'!"
10043040-39 = "[s] \"Você está animada como sempre!\""
10043040-40 = "Sim! Bem, e quem é essa pessoa?"
10043040-41 = "Eu sou..."
10043040-42 = "Ehem. Sou Rei Nomasa, do 1º ano da Millennium Science School. #nTecnicamente... sou do Clube de Treinamento."
10043040-43 = "――E também! Sou a rebatedora número 4 do time de beisebol da Millennium!"
10043040-44 = "Sério! ...Incrível!"
10043040-45 = "Hanae-san... você gosta de beisebol...!?"
10043040-46 = "Não, não entendo nada!"
10043040-47 = "A-ah, entendo..."
10043040-48 = "Falando nisso, será que os fãs de beisebol... costumam sofrer muito de dor de cabeça?"
10043040-49 = "Por algum motivo, muitos começam a sofrer durante as partidas... Sensei e Rei-san, tomem cuidado também!"
10043040-50 = "De acordo com um livro de medicina que estava na biblioteca antiga――"
10043040-51 = "A causa da dor de cabeça é o excesso de 'energia' ruim que flui para o cérebro!"
10043040-52 = "Se fizermos uma cirurgia de crânio e desinfetarmos o interior com vinagre――"
10043040-53 = "Parece que qualquer dor desaparece num piscar de olhos!"
10043040-54 = "[s] \"Isso, você definitivamente não pode fazer!\""
10043040-55 = "É mesmo? Se for outra causa... talvez seja a 'secreção excessiva de bile negra'..."
10043040-56 = "Nesse caso, é eficaz ferver sementes de Scutellaria e tomar com mel!"
10043040-57 = "(É a primeira vez que ouço falar desse tratamento...)"
10043040-58 = "(Como esperado de uma escola de elite, eles têm sua própria medicina estabelecida...)"
10043040-64 = "[ns] \"...A propósito, o que a Hanae estava fazendo?\""
10043040-65 = "Torcendo! Porque sou uma líder de torcida!"
10043040-66 = "Sensei, Rei-san! Olhem só!"
10043040-67 = "Força, força! Vamos lá!"
10043040-68 = "Pelo amanhã... rebata! Rebata!"
10043040-73 = "Eu não imaginava que você estava torcendo pelos Braves com tanta paixão..."
10043040-74 = "Com certeza, seus sentimentos chegaram aos jogadores!"
10043040-75 = "Muito obrigada! A propósito, o que são os 'Braves'?"
10043040-76 = "……E-ehhh!?"
10043040-77 = "O time que está jogando agora... sabe?"
10043040-78 = "Você não estava torcendo para eles ganharem dos rivais de longa data, os 'Abyssinian Raiders'...?"
10043040-79 = "Ah, é isso! Eu não fazia ideia!"
10043040-80 = "Eu só... me pediram para vir torcer, então..."
10043040-81 = "Eu vim para o estádio toda empolgada!"
10043040-82 = "É realmente só por isso?"
10043040-83 = "Sim!"
10043040-84 = "Se torcer puder dar coragem a alguém..."
10043040-85 = "Isso é a maior felicidade para mim!"
10043040-86 = "A líder com certeza..."
10043040-87 = "Diria que isso também é uma forma de socorro!"
10043040-88 = "Espero que ambos os times se mantenham bem até o fim da partida!"
10043040-89 = "[s] \"Sim. Com certeza é verdade.\""
10043040-90 = "Em meio a uma partida onde tantas emoções se misturam..."
10043040-91 = "Existir alguém tão pura assim..."
10043040-92 = "......Talvez, eu."
10043040-93 = "Talvez eu tenha perdido de vista algo importante..."
10043040-94 = "[s] \"Sinto que nós também fomos incentivados.\""
10043040-95 = "Ah, Hanae-san. Eu gostaria de perguntar uma coisa."
10043040-96 = "Você não viu ninguém suspeito no estádio?"
10043040-97 = "Por exemplo, alguém que esteja obcecado demais com o resultado."
10043040-102 = "Hmm... sinto muito! Não sei!"
10043040-104 = "Entendo, é..."
10043040-105 = "Pessoas assim devem estar espalhadas por toda a arquibancada..."
10043040-106 = "Ah... de onde será que devo começar a procurar pistas do culpado..."
10043040-107 = "?? Culpado...?"
10043040-108 = "Ah, não! É que aconteceram várias coisas..."
10043040-109 = "De qualquer forma... Hanae-san, obrigado por enviar energia a todos."
10043040-110 = "......Os Braves precisam muito desse apoio agora!"
10043040-111 = "......? Fico feliz em ter sido útil!"
10043040-116 = "Hanae-chan, poderia nos dar uma ajuda aqui também?"
10043040-120 = "Sim! Já estou indo!"
10043040-121 = "Então, Sensei! Rei-san! Com licença!"
10043040-125 = "[ns] \"Ela foi embora...\""
10043040-126 = "Uma pessoa cheia de energia. Pode parecer uma comparação estranha, mas..."
10043040-127 = "É como um home run que faz o estádio vibrar."
10043040-128 = "[s] \"Um home run?\""
10043040-129 = "......"
10043040-130 = "Sim. Eu considero o home run a joia do beisebol."
10043040-131 = "Há quem diga que rebatidas simples, que pressionam o arremessador e induzem erros, são melhores."
10043040-132 = "Mas..."
10043040-133 = "O home run garante 100% de pontuação, independentemente da situação do jogo."
10043040-134 = "Alguns até veem isso como a melhor jogada de equipe."
10043040-135 = "Não que eu não goste de analisar o beisebol por estatísticas e números. Mas..."
10043040-139 = "Para mim, o home run é especial..."
10043040-140 = "Como posso dizer? Não sei explicar bem... é sobre o poder que um home run transmite."
10043040-141 = "Para o time que está ganhando, é um vento a favor da vitória; e para o time que está perdendo, pode ser o gatilho para uma virada."
10043040-142 = "O arco que uma bola tão bela desenha..."
10043040-143 = "A sombra branca da bola voando para longe..."
10043040-144 = "E a figura do rebatedor cruzando o home plate com calma."
10043040-145 = "Tudo isso dá esperança a todos."
10043040-146 = "Por isso, eu achava que era algo difícil de se alcançar, mas..."
10043040-147 = "Pessoas como a Hanae-san certamente iluminam o ambiente só por estarem presentes."
10043040-148 = "……Se ao menos eu tivesse esse tipo de pureza também."
10043040-149 = "[s] \"Rei, você também não parece amar o beisebol de forma pura?\""
10043040-150 = "……Hmm."
10043040-151 = "É que, como é uma partida……"
10043040-152 = "Eu acabo pensando no resultado."
10043040-153 = "Como você sabe, o clube de beisebol da Millennium não é um time de elite."
10043040-154 = "Nós não conseguimos vencer nem a máquina de arremessos do Clube de Engenharia."
10043040-155 = "Ainda assim, eu amo beisebol."
10043040-156 = "Por isso mesmo, eu deveria aceitar qualquer resultado da partida, mas……"
10043040-157 = "Mas…… hehe, no fundo eu acabo querendo vencer."
10043040-158 = "Fazer uma partida da qual eu possa me orgulhar――"
10043040-159 = "――e gravar a vitória neste estádio."
10043040-160 = "Com certeza, todos aqui devem sentir o mesmo em relação aos Braves."
10043040-161 = "……Porque tem muita gente apaixonada aqui."
10043040-162 = "Nessas horas, seria bom se alguém desse um home run."
10043040-163 = "E se com isso pudéssemos vencer a partida…… quem dera."
10043040-168 = "Belo discurso."
10043040-169 = "A etiqueta para assistir aos jogos dos Braves é observar com carinho, não é?"
10043040-173 = "Q-quem é você!?"
10043040-174 = "Ah, o \"Nyorai dos Braves\"!"
10043040-175 = "Espera, aquele que assiste aos jogos dos Braves sorrindo há 20 anos…… é você!?"
10043040-177 = "Ho ho ho. Eu sou apenas um amante do beisebol."
10043040-178 = "Alguém como você……"
10043040-179 = "Beisebol é realmente incrível, não é!"
10043040-180 = "Mesmo pessoas que acabaram de se conhecer conseguem se entender rapidamente."
10043040-181 = "Ao ver a mesma cena, os sentimentos se tornam um só!"
10043040-182 = "Essa é a maravilha do beisebol…… não, do esporte!"
10043040-188 = "3 bolas e 1 strike…… ele rebateu! Uma bola alta para a segunda base!"
10043040-189 = "Ah, não……!"
10043040-190 = "Um erro lamentável aqui!"
10043040-191 = "Enquanto isso, o corredor chega tranquilamente ao home plate……!"
10043040-192 = "Um erro básico…… é difícil aceitar perder pontos assim."
10043040-195 = "……."
10043040-199 = "Seus inúteis! Vocês não merecem ser jogadores!"
10043040-200 = "Como é que vocês deixam passar uma bola dessas!!"
10043040-201 = "Desistam logo dessa partida!!!"
10043040-202 = "[s] \"Ué, não era para observar com carinho!?\""
10043040-206 = "……."
10043040-207 = "Sensei…… isso é……"
10043040-208 = "\"A paciência tem limites\", não é……."
