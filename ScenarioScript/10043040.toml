[translation]
10043040-1 = "第4話;偶然の出会い"
10043040-2 = "観客でいっぱいですね。"
10043040-3 = "レイダースのファンもいるから当然か……。"
10043040-4 = "探し出せるかな……。"
10043040-9 = "――いけ！いけ！がんばれーっ！"
10043040-13 = "華やかな応援団もいていいですね。"
10043040-14 = "ブレーブスのファン層は、その……ちょっと……あれなので……。"
10043040-15 = "[s] \"あれ？この声は……？\""
10043040-16 = "先生？"
10043040-19 = "フレー！フレー！がんばれー！"
10043040-23 = "チーム名は……えっと……と・に・か・く！"
10043040-24 = "空の向こうまで、飛んでけーっ！"
10043040-30 = "あれ……？"
10043040-31 = "先生！！！"
10043040-35 = "えへへ、ここでお会いできるなんて！"
10043040-36 = "[s] \"わっ、ハナエ！ちょっと落ち着こうか！\""
10043040-37 = "……先生、この方は……？"
10043040-38 = "こんにちは！トリニティ総合学園1年、救護騎士団所属[ruby=あさがお]朝顔[/ruby]ハナエです！『救護が必要な場に救護を』！"
10043040-39 = "[s] \"今日も元気だね！\""
10043040-40 = "はい！えっと、そちらの方は？"
10043040-41 = "私は――"
10043040-42 = "こほん。ミレニアムサイエンススクール1年、[ruby=のまさ]野正[/ruby]レイです。#n一応……トレーニング部です。"
10043040-43 = "――そして！ミレニアム野球部の4番バッターです！"
10043040-44 = "ええっ！……すごいです！"
10043040-45 = "ハナエさん……野球はお好きですか……！？"
10043040-46 = "いえ、わかりません！"
10043040-47 = "そ、そうですか……。"
10043040-48 = "そういえば、野球好きのみなさんって……頭痛持ちの方が多いのでしょうか？"
10043040-49 = "なぜか試合中に苦しみ出す方が多くて……先生やレイさんも気をつけてくださいね！"
10043040-50 = "古書館にあった医学書によると――"
10043040-51 = "頭痛の原因は、脳に流れ込んだ悪い「気」のせいなのだとか！"
10043040-52 = "開頭手術をして、中身をお酢で消毒しちゃえば――"
10043040-53 = "どんな痛みもポン！と治るらしいです！"
10043040-54 = "[s] \"それ、絶対にやっちゃだめだからね！？\""
10043040-55 = "そうですか？別の原因となると……「黒胆汁の過度な分泌」でしょうか……。"
10043040-56 = "それならタツナミソウの種を煎じて、蜂蜜と一緒に服用するのが有効です！"
10043040-57 = "（初めて聞く治療法だけど……）"
10043040-58 = "（さすが名門校、独自の医療が確立されているんですね……）"
10043040-64 = "[ns] \"……ところで、ハナエは何してたの？\""
10043040-65 = "応援です！チアガールなので！"
10043040-66 = "先生、レイさん！ご覧ください！"
10043040-67 = "頑張れ、頑張れ！ファイト！"
10043040-68 = "明日のためにー……打て！打て！"
10043040-73 = "ここまで情熱的にブレーブスを応援してくれていたとは……。"
10043040-74 = "きっと、選手陣にも想いが伝わってますよ！"
10043040-75 = "ありがとうございます！ところで、「ブレーブス」って何ですか？"
10043040-76 = "……え、ええーっ！？"
10043040-77 = "今試合中のチーム……ですよ？"
10043040-78 = "長年のライバル「アビシニアン・レイダース」に勝てるよう、応援してくれていたんじゃ……？"
10043040-79 = "そうなんですね！よく分かっていませんでした！"
10043040-80 = "私はただ、応援してほしいと言われたので……。"
10043040-81 = "ワクワクしながらスタジアムに来たんです！"
10043040-82 = "本当にそれだけなんですか？"
10043040-83 = "はい！"
10043040-84 = "応援することで、誰かが勇気を出せるのなら……。"
10043040-85 = "それが一番の幸せです！"
10043040-86 = "団長もきっと――"
10043040-87 = "これも一つの救護、と言ってくれるはずです！"
10043040-88 = "試合が終わるまで、どちらのチームにも元気でいてほしいですね！"
10043040-89 = "[s] \"うん。たしかにそうだね。\""
10043040-90 = "いろいろな感情が渦巻く試合の中で……。"
10043040-91 = "こんなにも純粋な方がいるだなんて……。"
10043040-92 = "……もしかしたら、私。"
10043040-93 = "なにか、大切なものを見失っていたのかもしれません……。"
10043040-94 = "[s] \"私たちも応援された気がするね。\""
10043040-95 = "そうだ、ハナエさん。一つ伺いたいのですが。"
10043040-96 = "スタジアムで、怪しい人を見かけませんでしたか？"
10043040-97 = "例えば、やけに勝敗にこだわる人とか。"
10043040-102 = "うーん……ごめんなさい！分かりません！"
10043040-104 = "そう、ですか……。"
10043040-105 = "そういう方は、観客席のあちこちにいそうですし……。"
10043040-106 = "はぁ……どこから犯人の手掛かりを掴めばいいのか……。"
10043040-107 = "？？犯人……？"
10043040-108 = "あ、いえ！色々ありまして……。"
10043040-109 = "とにかく……ハナエさん、みんなに元気を送ってくれてありがとうございます。"
10043040-110 = "……ブレーブスにはいま、そういった声が一番必要なので！"
10043040-111 = "……？お役に立てたようで嬉しいです！"
10043040-116 = "ハナエちゃん、こっちにもお願いしていいかな？"
10043040-120 = "はーい！今すぐ！"
10043040-121 = "それでは、先生！レイさん！失礼します！"
10043040-125 = "[ns] \"行ってしまった……。\""
10043040-126 = "元気な方ですね。変な例えかもしれませんが……。"
10043040-127 = "まるで、球場を沸かせるホームランのようです。"
10043040-128 = "[s] \"ホームラン？\""
10043040-129 = "……。"
10043040-130 = "ええ。私は、ホームランこそが野球の華だと思っていまして。"
10043040-131 = "ピッチャーを追い詰め、ミスを誘える安打のほうが、良いという人もいます。"
10043040-132 = "でも……。"
10043040-133 = "ホームランは試合の状況に関わらず、100％得点になるんです。"
10043040-134 = "中には、最高のチームプレイという見方もあるんですよ。"
10043040-135 = "統計や数字で野球を語ること自体は嫌いではありません。でも――"
10043040-139 = "私にとって、ホームランは特別で……。"
10043040-140 = "なんと言えばいいんでしょうね。うまく説明できないんですけど……ホームランが与える力、といいますか。"
10043040-141 = "勝っているチームにとっては勝利の追い風になりますし――負けているチームにとっては、これから巻き返せるというきっかけにもなり得る。"
10043040-142 = "そんな美しい球が描くアーチが――"
10043040-143 = "どこまでも飛んで行く、ボールの白い影が――"
10043040-144 = "――そして、悠々とホームベースを踏むバッターの姿が。"
10043040-145 = "みんなに希望を与えてくれるんです。"
10043040-146 = "だからこそ、手に入れるのが難しいものだと思っていたんですが……。"
10043040-147 = "ハナエさんのような人はきっと、いてくれるだけで周囲が明るくなりますね。"
10043040-148 = "……私にも、ああいう純粋さがあればなぁ。"
10043040-149 = "[s] \"レイも、純粋に野球が好きなように見えるよ？\""
10043040-150 = "……うーん。"
10043040-151 = "どうしても、試合なので……。"
10043040-152 = "勝敗を考えてしまうんです。"
10043040-153 = "ご存知の通り、私たちミレニアム野球部は強豪ではありません。"
10043040-154 = "エンジニア部のピッチングマシンにすら勝てませんから。"
10043040-155 = "それでも、私は野球が好きなんです。"
10043040-156 = "だからこそ、試合結果はどんなものであれ受け入れるべきなんですが……。"
10043040-157 = "でも……へへっ、やっぱり勝ちたくなっちゃいます。"
10043040-158 = "納得がいく試合をして――"
10043040-159 = "――勝利を、スタジアムに刻みたい。"
10043040-160 = "きっと、ここのみんなも、ブレーブスに対してそう思っているはずです。"
10043040-161 = "……熱い人が多いですから。"
10043040-162 = "こういうとき、誰かがホームランを打ってくれたらなぁ。"
10043040-163 = "それで、試合に勝てれば……なんて。"
10043040-168 = "いいこと言うねえ。"
10043040-169 = "ブレーブスの試合は、暖かく見守るのがマナーだよね。"
10043040-173 = "ど、どちら様ですか！？"
10043040-174 = "あっ、「ブレーブス如来様」！"
10043040-175 = "えっ、20年間、笑顔でブレーブス戦を見守っているという……あの！？"
10043040-177 = "ほっほっほっ。私はただの野球好きにすぎませんよ。"
10043040-178 = "そんな方が……。"
10043040-179 = "やっぱり野球はいいですね！"
10043040-180 = "初対面の人でも、すぐに打ち解けられますし。"
10043040-181 = "同じ光景を見て、気持ちが一つになる！"
10043040-182 = "これが野球……いえ、スポーツの素晴らしさですよ！"
10043040-188 = "3ボール1ストライクから……打った！セカンドフライ！"
10043040-189 = "あーっと……！"
10043040-190 = "ここで痛恨のエラー！"
10043040-191 = "その間にランナーは悠々とホームイン……！"
10043040-192 = "初歩的なミスですねぇ……これで失点するのはたまったもんじゃありません。"
10043040-195 = "……。"
10043040-199 = "この役立たずどもが！てめぇらは選手失格だ！"
10043040-200 = "捕球ミスとかありえねえだろ！！"
10043040-201 = "もうこんな試合やめちまえ！！！"
10043040-202 = "[s] \"あ、暖かく見守るんじゃ！？\""
10043040-206 = "……。"
10043040-207 = "先生……これは……"
10043040-208 = "「仏の顔も三度まで」ですね……。"
