[translation]
10036055-3 = "……Ufa."
10036055-5 = "O-o que eu deveria fazer……."
10036055-6 = "E-eu devo continuar assim mesmo?"
10036055-7 = "E-ehem!#nO vencedor desta vez é……!"
10036055-8 = "O Grupo Pata-Pata Helmet!"
10036055-10 = "（Quando a cortina de fumaça se dissipou, todos estavam caídos……）"
10036055-11 = "（O que foi que aconteceu……?）"
10036055-13 = "B-bem…… de qualquer forma, parabéns pela vitória?"
10036055-14 = "É diferente do que eu ouvi, mas……."
10036055-15 = "Bem, vai dar tudo certo!#nCerto, vamos fazer o levantamento!"
10036055-16 = "Oba!"
10036055-21 = "E-esperem!#nSe vocês levantarem ela desse jeito――"
10036055-31 = "Acho que já estamos longe o suficiente."
10036055-32 = "Ehehe…… a Saori-neesan não percebeu, né……?"
10036055-33 = "Pela cara dela, acho que ela não notou nada."
10036055-34 = "A Sa-chan nem deve saber que estávamos olhando."
10036055-35 = "[s1] \"É, verdade.\"\n[s2] （Ai, ai……）"
10036055-38 = "M-mas ela venceu, então com certeza deve estar feliz agora……!"
10036055-39 = "Na verdade, talvez ela esteja confusa."
10036055-40 = "Bem, isso também serve."
10036055-41 = "Acho que todas essas coisas no festival são experiências novas para a Sa-chan."
10036055-42 = "Espero que se torne uma lembrança feliz para ela."
10036055-43 = "……Eu teria ficado mais feliz se pudéssemos ter passado esse tempo juntas."
10036055-44 = "[s] \"……Atsuko.\""
10036055-49 = "……Por enquanto, isso já basta.#nObrigada, Sensei."
