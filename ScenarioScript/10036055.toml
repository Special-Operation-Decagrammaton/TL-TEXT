[translation]
10036055-3 = "……ふぅ。"
10036055-5 = "ど、どうすれば……。"
10036055-6 = "こ、このまま進行するのか？"
10036055-7 = "こ、こほん！#n今回の優勝者は……！"
10036055-8 = "パタパタヘルメット団です！"
10036055-10 = "（煙幕が晴れたら、全員倒れていた……）"
10036055-11 = "（これは、いったい……？）"
10036055-13 = "え、えっと……とりあえず、優勝おめでとう？"
10036055-14 = "聞いてた話と違うが……。"
10036055-15 = "まあ、何とかなるだろ！#nよし、胴上げといくか！"
10036055-16 = "おーっ！"
10036055-21 = "ま、待ってくれ！#nそんな風に持ち上げたら――"
10036055-31 = "ここまで離れたら大丈夫かな。"
10036055-32 = "えへへ……サオリ姉さんにはバレてないですよね……？"
10036055-33 = "あの顔は、まったく気づいてないと思う。"
10036055-34 = "サッちゃんは私たちが見てたなんて、知らないだろうね。"
10036055-35 = "[s1] \"そ、そうだね。\"\n[s2] （ギクッ……）"
10036055-38 = "で、でも優勝してますし、きっと今頃、喜んでいるはずです……！"
10036055-39 = "むしろ、戸惑ってるかも。"
10036055-40 = "ま、それで良いけど。"
10036055-41 = "このお祭りは、サッちゃんにとってどれも初めての経験だと思うから。"
10036055-42 = "楽しい思い出になってくれたら良いな。"
10036055-43 = "……一緒に過ごせたら、もっと嬉しかったけど。"
10036055-44 = "[s] \"……アツコ。\""
10036055-49 = "……今は、これで充分。#nありがとう、先生。"
