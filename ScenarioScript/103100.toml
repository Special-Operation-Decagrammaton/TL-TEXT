103100-169 = "Eu gostaria de experimentar aquele cara que vi no filme, onde ele suga o líquido que flutua no ar com um canudo."

103100-171 = "Estou realmente ansioso por isso★"

103100-173 = "É isso mesmo – comida espacial é comida especial preparada assumindo gravidade zero."

