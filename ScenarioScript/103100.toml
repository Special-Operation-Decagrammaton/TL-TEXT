103100-152 = "Espere! Espere! Há algo errado com o fluxo! ?"

103100-154 = "Hehe, pessoal, muito obrigado."

103100-155 = "Não, por que estou aqui? ?"

103100-156 = "Eu não entendo nada... O que é um navio de guerra espacial? ?"

103100-157 = "Entendo que eles estejam tentando fazer comida cedendo, mas...#nSe for esse o caso, então por que existe um Grupo de Pesquisa Gourmet se não há Juri?"

