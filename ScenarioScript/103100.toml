103100-131 = "E [ruby=Saiba]Saiwa[/ruby]Momoi, [ruby=Saiba]Saiwa[/ruby]Midori, [ruby=Hanaoka]Hanaoka[/ruby]Yuzu...Essas quatro pessoas apoiarão e emprestarão sua força na batalha de ocupação."

103100-132 = "Muito obrigado..."

103100-134 = "Suspiro... Não tem jeito, acho que devo cuidar disso."

