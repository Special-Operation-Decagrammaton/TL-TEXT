[translation]
103100-1 = "Episódio 10; Aos Confins do Céu"
103100-12 = "Sensei, tenho boas notícias."
103100-13 = "Acredite se quiser―― "
103100-14 = "Os trajes de operadora ficaram prontos a tempo."
103100-15 = "[s] \"Ooh...!?\""
103100-31 = "[ns] \"Então esses são os trajes de operadora!!\""
103100-33 = "Err... a gente precisa mesmo usar isso? "
103100-34 = "Ufufu♡ Recebemos um pedido muito forte de que as regras do gênero são absolutas para operadoras de naves espaciais..."
103100-36 = "E de quem foi esse pedido, hein."
103100-37 = "Err... eu tenho quase certeza de que a gente concluiu que isso não é uma nave de guerra espacial..."
103100-38 = "Haa... por que até eu..."
103100-39 = "Calma, calma, aceita que dói menos.#nA culpa é sua por ter decorado um manual dessa grossura e ter embarcado nessa nave, foi falta de sorte."
103100-41 = "Rin-senpai... esse casaco ficou ótimo em você."
103100-45 = "……Por que o design do meu é o único diferente?"
103100-46 = "[s] \"Ué, é porque você é a capitã, Rin! E capitã que é capitã tem que usar casaco longo!!\""
103100-47 = "Haa..."
103100-48 = "A-Ahaha... acho que não tem problema usar essa roupa por um tempinho..."
103100-49 = "Fufu... bom, quem está aqui vai assumir o papel importantíssimo de calcular e verificar a interpretação multidimensional."
103100-50 = "A propósito, este traje registra as condições físicas de quem o veste, como ondas cerebrais e pulsação――e também possui funções de suporte para evitar problemas na execução da missão."
103100-51 = "Além disso, ele é à prova de fogo, de explosões, de água, etc.――pensem nele como um \"equipamento exclusivo para operadoras\" super completão♪"
103100-53 = "……Não seria um \"controle remoto cheio de botões inúteis\"?"
103100-54 = "Pra que colocar função à prova d'água nisso...?#nTem alguma utilidade?"
103100-55 = "Calma lá♡ O nosso tempo é curto, então vamos deixar os detalhes pra lá e focar no que importa."
103100-57 = "……Tem razão. "
103100-64 = "A partir de agora, nós vamos embarcar na \"Nave Principal de Utnapishtim\" e invadir a \"Arca de Atrahasis\" que fica a 75.000m de altitude acima de Kivotos... "
103100-65 = "Vamos ocupar a Arca, neutralizar suas funções――e então, voltar em segurança para a superfície."
103100-66 = "Sendo assim, vou fazer a chamada――"
103100-71 = "Operadoras: Urawa Hanako, Amau Ako."
103100-75 = "Operadoras: Okusora Ayane, Hayase Yuuka."
103100-79 = "Operadoras: Onikata Kayoko, Akeboshi Himari."
103100-83 = "Operadoras: Yuragi Momoka, Iwabitsu Ayumu."
103100-87 = "……E eu, a responsável geral da \"Nave Principal de Utnapishtim\"――Nanagami Rin."
103100-88 = "[s] \"Conto com vocês, pessoal.\""
103100-89 = "Após a decolagem da \"Nave Principal de Utnapishtim\", o controle de tráfego aéreo e o suporte técnico em terra ficarão a cargo de――"
103100-94 = "Veritas, da Millennium Science School: Otose Kotama, Omagari Hare."
103100-98 = "Konuri Maki, Kagami Chihiro. E――"
103100-102 = "O Departamento de Engenharia: Nekozuka Hibiki, Shiraishi Utaha, Toyomi Kotori."
103100-104 = "Após a invasão à Arca, as responsáveis por dar suporte na batalha de ocupação contra ataques inimigos serão――"
103100-109 = "O Comitê de Medidas de Precaução de Abydos: Takanashi Hoshino, Kuromi Serika, Izayoi Nonomi."
103100-110 = "C-Contamos com vocês...! "
103100-111 = "Beleza~ Pode deixar com a gente. "
103100-112 = "Isso aí, preparativos perfeitos!"
103100-113 = "Uhum, uhum! Vamos todo mundo resgatar a Shiroko-chan☆"
103100-115 = "Sim. O pessoal do Comitê de Medidas de Precaução se voluntariou para capturar Sunaookami Shiroko."
103100-116 = "……E também,"
103100-123 = "A dona da railgun, a única arma desta nave atualmente: do Departamento de Desenvolvimento de Jogos, Tendou Aris――"
103100-131 = "E também Saiba Momoi, Saiba Midori e Hanaoka Yuzu... Essas quatro vão dar suporte na batalha de ocupação e nos emprestar sua força."
103100-132 = "C-Contamos com vocês..."
103100-134 = "Haa... não tem jeito, vou ter que cuidar dessas crianças."
103100-135 = "……Nada de agir com imprudência, ouviram bem? A segurança é a prioridade número um, ok? "
103100-137 = "E, por fim――"
103100-138 = "Hm~? Tem mais gente?"
103100-151 = "As responsáveis pelas refeições de todas: Aikiyo Fuuka, do Clube de Culinária de Gehenna, e... a Sociedade de Pesquisa Gourmet."
103100-152 = "Espera aí, espera aí! Tem alguma coisa muito errada nessa história!?"
103100-154 = "Ufufu, conto com vocês, pessoal."
103100-155 = "E por que diabos eu tô aqui!?"
103100-156 = "Eu não tô entendendo nada... Nave de guerra espacial, o quê!?"
103100-157 = "Até dá pra entender o fato de eu estar aqui pra cozinhar, mas...#nNesse caso, por que a Juri não tá aqui e a Sociedade de Pesquisa Gourmet tá? "
103100-158 = "Fufu... Isso não é óbvio?"
103100-159 = "A chance de comer uma refeição que só se experimentaria uma vez na vida――está bem diante dos nossos olhos."
103100-161 = "Uma vez na vida...?"
103100-162 = "Exatamente. O motivo pelo qual nós agimos é sempre o mesmo――"
103100-163 = "Para buscar a verdadeira gastronomia!"
103100-164 = "――Quão deliciosa deve ser uma refeição comida no espaço?"
103100-168 = "Isso aí~! Pode ser a nossa única chance de comer no espaço!"
103100-169 = "Sabe aqueles filmes onde o pessoal toma líquido flutuando com um canudinho? Quero muito tentar fazer isso."
103100-171 = "Tô muito animada pra isso★"
103100-173 = "Isso mesmo――A comida espacial é um prato especial, feito para ser consumido em gravidade zero. "
103100-174 = "Desde lidar com líquidos, até ambientes onde não dá para cozinhar, além do processo de esterilização para evitar intoxicação alimentar... É um gênero super complexo que exige muita atenção aos detalhes."
103100-175 = "Sendo assim... "
103100-180 = "A Fuuka-san está aqui por isso!!"
103100-185 = "Então, por que logo EU――!?"
103100-186 = "Para o caso de alguma emergência, até botamos o caminhão do Clube de Culinária a bordo★#nEntão, a gente não consegue se virar sem a Fuuka-san."
103100-187 = "Hã, até o caminhão do Clube de Culinária...!? D-Desde quando...!?"
103100-188 = "Tenha mais confiança em si mesma. Montanhas, rios... E agora o espaço, né? É uma experiência que quase ninguém consegue ter."
103100-189 = "Isso aí! Nunca vi um caminhão com tanta experiência de vida! Dessa vez é gravidade zero, hein!?"
103100-190 = "Ah... eu não quero esse tipo de experiência, não..."
103100-191 = "[s1] (............)\n[s2] (A gente nem vai chegar numa altitude de gravidade zero, mas acho melhor deixar isso em segredo...)"
103100-196 = "……Sensei, sobre a ativação da \"Nave Principal de Utnapishtim\"――#nOuvi dizer que originalmente ela é ativada através da Torre Sanctum."
103100-197 = "Acredito que essa seja a razão pela qual a Kaiser PMC tentou tomar o controle da Torre Sanctum logo após encontrarem esta nave."
103100-198 = "Agora que a Torre Sanctum foi destruída, a única pessoa que pode ativá-la#né o dono da \"Caixa de Shittim\"――você, Sensei."
103100-199 = "[s] \"Uhum, pode deixar comigo.\""
103100-200 = "Sim... Então, contamos com o senhor."
103100-202 = "……Sim. Com as minhas habilidades, é possível... ativar este Oopart."
103100-203 = "Mas... desta vez é diferente. Eu posso até ficar bem, mas... "
103100-204 = "O poder que reside neste Oopart... afetará o senhor, Sensei, que é o dono da \"Caixa de Shittim\"..."
103100-205 = "[s] \"Vai ficar tudo bem, Arona.\""
103100-206 = "S-Seu corpo é igual ao de uma pessoa normal, Sensei...！#nUm único tiro já te colocaria em risco de vida! "
103100-207 = "[s] \"Mas a Arona sempre me protegeu, não é?\" "
103100-208 = "M-Mas... isso é diferente... diferente de tudo que já enfrentamos..."
103100-212 = "Por favor, reconsidere, Sensei...#nNem mesmo eu consigo calcular o quão grande será o fardo em você..."
103100-214 = "……Mas antes, um aviso."
103100-215 = "No momento em que usar isso, o seu corpo――#nSofrerá danos irreversíveis, Sensei [USERNAME]."
103100-216 = "Jamais poderá voltar ao seu estado anterior.#n――Isso pode até mesmo levá-lo à morte. "
103100-217 = "――Mesmo assim, você quer prosseguir?"
103100-218 = "Mesmo que esse fim seja mais claro que a luz do dia?"
103100-223 = "[ns] \"Vai ficar tudo bem, Arona. Conto com você.\""
103100-227 = "P-Por que você iria tão longe――"
103100-229 = "……Por que você iria tão longe?"
103100-230 = "Não se pode fugir dessa aniquilação――#nIsso é um evento predestinado desde a antiguidade... Essa é a minha conclusão."
103100-231 = "Sim, Sunaookami Shiroko――é um desfecho que já havia sido decidido no momento em que ela passou a existir neste mundo."
103100-232 = "O tempo não é contínuo, apenas repete causas e efeitos pré-determinados―― "
103100-233 = "Nós――todas as existências, não passamos de peões descartáveis debaixo desse determinismo."
103100-234 = "……。"
103100-235 = "Se você quisesse impedir isso――"
103100-236 = "Você devia ter voltado ao passado e matado a garota... Kukuku."
103100-240 = "O senhor gabou-se de que eu jamais seria capaz de compreendê-lo... É. Mesmo agora, a sua existência é um completo mistério para mim. "
103100-241 = "Por que você acha que pode mudar um destino já traçado?#nPor que se joga de cabeça num futuro que só vai te levar à ruína?"
103100-242 = "……Vou perguntar mais uma vez. "
103100-247 = "……Por quê?"
103100-251 = "[ns] \"............\""
103100-253 = "[ns3] \"Como adulto――para proteger uma criança; e como Sensei, para proteger a minha aluna.\"\n[ns4] \"Para cumprir o meu dever como adulto――a minha responsabilidade como Sensei.\""
103100-257 = "Não importa que métodos tenha que usar...?"
103100-258 = "Não importa o preço que tenha que pagar?"
103100-259 = "[s5] \"Isso. Não importa o método,\"\n[s6] \"Não importa o preço que eu tenha que pagar.\""
103100-262 = "……。 "
103100-263 = "――Então você vai salvá-la, não vai? Sensei [USERNAME]."
103100-268 = "[ns] \"Vou, sim.\""
103100-271 = "……Sensei?"
103100-275 = "[ns] \"Rin, eu quero te perguntar uma coisa.\""
103100-276 = "……?#nSim, o que é?"
103100-277 = "[s] \"Sobre a 'Segunda Lei Antiga'.\""
103100-281 = "\"Através daquilo que não podemos compreender, seremos nós capazes de alcançar a compreensão de ( )?\"――Aquela pergunta que a Presidente dizia...? ...Sim. Eu me lembro."
103100-282 = "[s] \"...O que você respondeu naquela hora, Rin?\""
103100-283 = "Por que essa pergunta agora..."
103100-284 = "Não... naquela época, eu..."
103100-285 = "……。"
103100-290 = "……Rin-chan."
103100-295 = "Eu acho que a gente nunca, nunca vai conseguir se entender de verdade. "
103100-296 = "Pra você, Rin-chan, eu devo ser uma pessoa bem misteriosa e incompreensível――"
103100-297 = "E nós vamos ter que seguir por caminhos diferentes, sem nunca nos cruzarmos de verdade."
103100-298 = "E essa... é a verdadeira intenção deste mundo."
103100-300 = "……Mas, eu não ligo pra isso."
103100-301 = "Mesmo que sejamos existências que não podem se compreender,"
103100-302 = "Mesmo que fôssemos como um vento sem forma, que só passa pelos nossos dedos..."
103100-303 = "Que só passa pelos nossos dedos――eu não me importaria."
103100-305 = "É por isso que... eu adoro a frase que você completou, Rin-chan."
103100-306 = "Então, a resposta para aquela pergunta... eu vou guardar bem aqui comigo, tá bom?"
103100-307 = "É verdade... Nós,"
103100-312 = "Através daqueles que não podemos compreender, seremos nós capazes de alcançar a nossa própria compreensão?"
103100-319 = "――Eu poderia te dar a resposta... quando voltarmos pra superfície?"
103100-320 = "[s] \"Claro, já me basta. Obrigado.\""
103100-325 = "[ns] \"Então, bora decolar?\""
103100-333 = "[ns] Conecto a Caixa de Shittim ao dispositivo de ativação da Utnapishtim."
103100-339 = "Confirmação da ativação da energia principal!"
103100-348 = "Operação do sistema de controle principal, concluída...!!"
103100-349 = "Sistemas de comunicação de todas as áreas, sistemas de cálculo checados, tudo nos conformes――#nAté aqui, tudo batendo direitinho com o manual."
103100-358 = "Sistema de motores, ok."
103100-359 = "Verificação do sistema de interpretação multidimensional, ok.#nTudo pronto! "
103100-368 = "Checagem do sistema de tráfego aéreo, tudo pronto...#nBeleza! Tudo funcionando 100%!"
103100-369 = "Preparativos para decolagem concluídos! Aguardando ordens!"
103100-370 = "Sensei, por favor, dê o comando de decolagem...!"
103100-371 = "[ns7] \"Nave Principal de Utnapishtim, decolar!!\"\n[ns8] \"Nave de Guerra Espacial 'Utnapishtim', decolar!!\""
103100-381 = "A partir deste momento, a \"Nave Principal de Utnapishtim\"――inicia a decolagem!!"
103100-396 = "Subindo altitude... atualmente em 780 metros! "
103100-397 = "A ativação do sistema de interpretação multidimensional é pra agora, né?"
103100-399 = "Os cálculos já estão finalizados. Hanako-san, por favor."
103100-400 = "Cálculos finalizados... Ativando sistema de interpretação multidimensional!"
103100-406 = "[ns9] \".........!!!\"\n[ns10] (Dá pra sentir o impacto do choque no meu corpo...)"
103100-409 = "……Sensei?"
103100-410 = "S-Sensei? O senhor tá meio pálido. Tá se sentindo bem...?"
103100-411 = "Ué, você tá tremendo...?#nO que foi, Sensei...?"
103100-412 = "[s] \"Tô meio enjoado por causa do balanço...\""
103100-413 = "……Peço desculpas, aguente firme só mais um pouco. "
103100-414 = "Operação normal do sistema confirmada! "
103100-415 = "Neste exato momento, a nossa Nave Principal de Utnapishtim se tornou uma \"existência probabilística\", assim como a Arca."
103100-416 = "Hã, como assim?"
103100-417 = "Basicamente... é como se a gente estivesse existindo ao mesmo tempo em todos os universos onde a nossa existência é uma probabilidade."
103100-418 = "Isso, se a gente assumir que existem universos paralelos."
103100-419 = "Ahaha... só espero que não role nenhum paradoxo dimensional..."
103100-420 = "Tudo bem. Mesmo que role, a gente só vai ser reconhecida como um satélite qualquer."
103100-422 = "Fim de papo.#n――Por favor, definam a rota para o alvo!"
103100-423 = "Calculando a rota até a Arca, que se encontra a 75.000m de altitude... Configuração concluída."
103100-431 = "Uau~, tá tremendo pra caramba..."
103100-432 = "A-Aguente só mais um pouquinho, Sensei."
103100-434 = "Iniciando a aceleração em direção à \"Arca de Atrahasis\"."
103100-435 = "Eita, todo mundo se segura firme aí!#nSe a gente seguir o manual, essa belezinha vai atingir uma velocidade absurda!"
103100-437 = "Potência máxima... Acelerando!!"
103100-441 = "Bora, quero ver do que esse tal de \"Oopart\" é capaz."
103100-461 = "U-Uwaa!?"
103100-462 = "T-Tudo bem com você, Yuuka-san?"
103100-463 = "S-Sobrevivendo... "
103100-464 = "Que velocidade maluca... "
103100-467 = "O-O valor da flutuação da interpretação multidimensional está instável! Muito acima das expectativas!"
103100-469 = "……Não, esse nível ainda não ultrapassa o ponto crítico. Meus cálculos estão corretos."
103100-471 = "Mas, isso vai aumentar muito o dano à nave, não sei se o casco vai aguentar..."
103100-475 = "[ns] (Minha consciência, tá sumindo...)"
103100-477 = "[ns] (Meu corpo... não obedece...)"
103100-491 = "Por que você acha que pode mudar um destino já traçado?#nPor que se joga de cabeça num futuro que só vai te levar à ruína?"
103100-499 = "[ns] (Onde é aqui...)"
103100-501 = "[ns] (Essa sensação nostálgica... o que será isso...)"
103100-510 = "Próximo episódio; A História do Começo"