[translation]
103100-1 = "第10話;天上の遥か彼方へ"
103100-12 = "先生に、良いニュースがある。"
103100-13 = "なんと―― "
103100-14 = "オペレーターの衣装が、間に合ったよ。"
103100-15 = "[s] \"おお……！？\""
103100-31 = "[ns] \"これがオペレーターの衣装！！\""
103100-33 = "えっと……これって、本当に必要なの？ "
103100-34 = "うふふっ♡宇宙戦艦のオペレーターなら、ジャンルのルールは絶対、という強力な要請を受けまして……"
103100-36 = "誰の要請ですか、それ。"
103100-37 = "あの……これは宇宙戦艦ではない、という結論だった気がしますが……"
103100-38 = "はぁ……なんで私まで……"
103100-39 = "まあまあ、運命を受け入れなって。#nこーんな分厚いマニュアルを覚えられて、かつ、この船に乗ってたのが運の尽きだよ。"
103100-41 = "リン先輩……コート、お似合いです。"
103100-45 = "……なぜ、私だけデザインが違うのでしょうか。"
103100-46 = "[s] \"そりゃあ、リンは[ruby=キャプテン]船長[/ruby]だからね！ロングコートじゃなきゃ！！\""
103100-47 = "はぁ……。"
103100-48 = "あ、あはは……少しの間なら、この格好も悪くないと思います……"
103100-49 = "ふふ……さて、ここにいる方には多次元解釈を計算・検証する重要な役を担ってもらいます。"
103100-50 = "ちなみに、この衣装は着用者の脳波や脈拍など、身体のコンディションを記録し――更には、任務遂行に支障が出ないよう、サポートする機能も搭載しております。"
103100-51 = "他にも、防炎・防爆・防水などなど――様々な機能が盛りだくさんの、「オペレーター専用装備」だと思ってください♪"
103100-53 = "……「余計な機能しかないリモコン」ではなく？"
103100-54 = "これに防水機能を……？#n何か意味あるの？"
103100-55 = "まあまあ♡私たちには時間が無いのですから、細かいことは気にしないで、本題に移りましょう。"
103100-57 = "……そうですね。 "
103100-64 = "今から私たちは「ウトナピシュティムの本船」に乗り、キヴォトスの上空75,000mにある「アトラ・ハシースの箱舟」に突入…… "
103100-65 = "箱舟を占領し、機能を無力化――そして、無事地上に戻らなくてはなりません。"
103100-66 = "それでは、点呼をとります――"
103100-71 = "オペレーター、[ruby=うらわ]浦和[/ruby]ハナコ、[ruby=あまう]天雨[/ruby]アコ。"
103100-75 = "オペレーター、[ruby=おくそら]奥空[/ruby]アヤネ、[ruby=はやせ]早瀬[/ruby]ユウカ。"
103100-79 = "オペレーター、[ruby=おにかた]鬼方[/ruby]カヨコ、[ruby=あけぼし]明星[/ruby]ヒマリ。"
103100-83 = "オペレーター、[ruby=ゆらき]由良木[/ruby]モモカ、[ruby=いわびつ]岩櫃[/ruby]アユム。"
103100-87 = "……そして私「ウトナピシュティムの本船」の統括責任者――[ruby=なながみ]七神[/ruby]リンです。"
103100-88 = "[s] \"よろしくね、みんな。\""
103100-89 = "「ウトナピシュティムの本船」の発進後、地上で航空管制および技術支援を担当するのは――"
103100-94 = "ミレニアムサイエンススクールのヴェリタス、[ruby=おとせ]音瀬[/ruby]コタマ、[ruby=おまがり]小鈎[/ruby]ハレ。"
103100-98 = "[ruby=こぬり]小塗[/ruby]マキ、[ruby=かがみ]各務[/ruby]チヒロ。そして――"
103100-102 = "エンジニア部、[ruby=ねこづか]猫塚[/ruby]ヒビキ、[ruby=しらいし]白石[/ruby]ウタハ、[ruby=とよみ]豊見[/ruby]コトリ。"
103100-104 = "箱舟の突入後、襲撃に備え占領戦のサポートをするのは――"
103100-109 = "アビドス対策委員会の[ruby=たかなし]小鳥遊[/ruby]ホシノ、[ruby=くろみ]黒見[/ruby]セリカ、[ruby=いざよい]十六夜[/ruby]ノノミ。"
103100-110 = "よ、よろしくお願いします……！ "
103100-111 = "おっけ～任せなって。 "
103100-112 = "よし、準備は完璧！"
103100-113 = "うんうん！みんなでシロコちゃんを助けに行きますよ☆"
103100-115 = "はい。対策委員会の皆さ[ruby=すなおおかみ]んは、砂狼シロコ[/ruby]の確保をするという事で、志願してくださりました。"
103100-116 = "……そして、"
103100-123 = "現在、この船唯一の武装であるレールガンの所有者、ゲーム開発部の[ruby=てんどう]天童[/ruby]アリス――"
103100-131 = "そして、[ruby=さいば]才羽[/ruby]モモイ、[ruby=さいば]才羽[/ruby]ミドリ、[ruby=はなおか]花岡[/ruby]ユズ……こちらの4名が、占領戦のサポートおよび、力を貸してくれるとのことです。"
103100-132 = "よ、よろしくお願いします……"
103100-134 = "はぁ……しょうがない、私が面倒を見ればいいのね。"
103100-135 = "……絶対に無茶は禁物よ。安全が最優先だからね、いい？ "
103100-137 = "そして最後に――"
103100-138 = "ん～？まだいるの？"
103100-151 = "皆さんの食事を担当する、ゲヘナ給食部の[ruby=あいきよ]愛清[/ruby]フウカと……美食研究会。"
103100-152 = "まってまって！なんか流れおかしくない！？"
103100-154 = "うふふっ、皆さん、よろしくお願いしますね。"
103100-155 = "いや、なんで私がここにいるの！？"
103100-156 = "全然意味分かんない……宇宙戦艦って何！？"
103100-157 = "百歩譲って、料理を作るためっていうのは理解できるけど……#nそれなら、なんでジュリがいないのに美食研究会がいるのよ？ "
103100-158 = "ふふっ……そんなの、当然でしょう？"
103100-159 = "一生に一度、口にできるかどうかの料理を食べるチャンスが――目の前にあるからですわ。"
103100-161 = "一生に一度……？"
103100-162 = "ええ。私たちが動く理由はいつだって同じ――"
103100-163 = "美食を追求するためなのですから！"
103100-164 = "――宇宙で口にする食事は、どれほど美味なのでしょうね？"
103100-168 = "そうだよ～！宇宙でご飯食べる機会なんて、もう二度とないかもしれないじゃん！"
103100-169 = "映画で観た空中に浮かんでる液体をストローで吸うヤツ、やってみたいのよね。"
103100-171 = "と～っても楽しみです★"
103100-173 = "そう――宇宙食は、無重力状態を想定して作られる、特別な食べ物。 "
103100-174 = "液体類の取り扱いはもちろん、調理が不可能な環境、食中毒防止のための殺菌過程など……気を配らなければならないことがたくさんある、奥深いジャンルです。"
103100-175 = "であるが故に…… "
103100-180 = "フウカさんが、ここにいるのです！！"
103100-185 = "だから、何で私――！？"
103100-186 = "もしもの時に備えて、給食部のトラックも乗せておきました★#nなので、フウカさんがいないとダメなんです。"
103100-187 = "えっ、給食部のトラックまで……！？いっ、いつの間に……！？"
103100-188 = "もっと自信持ちなさいよ。山、川……そして今度は宇宙でしょ？なかなかそんな体験できないわよ。"
103100-189 = "そうそう！こんな経験豊富なトラック見たことないよ！今度は無重力だよ！？"
103100-190 = "いや……そんな経験、いらないから……"
103100-191 = "[s1] （…………）\n[s2] （無重力の高度までは行かないけど、それは内緒にしておこう……）"
103100-196 = "……先生、「ウトナピシュティムの本船」の起動に関してですが――#n本来はサンクトゥムタワーによって起動するのだと聞きました。"
103100-197 = "カイザーPMCがこの船を見つけた直後に、サンクトゥムタワーを掌握しようとした一連の流れも、その理由からでしょう。"
103100-198 = "サンクトゥムタワーが破壊された今、これを起動できるのは、#n「シッテムの箱」を所有している先生――あなただけです。"
103100-199 = "[s] \"うん、任せて。\""
103100-200 = "はい……では、よろしくお願いします。"
103100-202 = "……はい。私の能力でこのオーパーツを起動する事は……可能です。"
103100-203 = "でも……これは、今までとは異なります。私は大丈夫でも…… "
103100-204 = "このオーパーツに宿っている力は……「シッテムの箱」の所有者である先生に、影響を及ぼします……"
103100-205 = "[s] \"大丈夫だよ、アロナ。\""
103100-206 = "せ、先生の肉体は普通の人と変わりません……！#n銃弾1つで、危険な状況に陥るかもしれないんですよ！ "
103100-207 = "[s] \"でも、いつもアロナが守ってくれたよね。\" "
103100-208 = "で、でも、これは……今までとは違うんです……"
103100-212 = "もう一度考え直してください、先生……#nどれだけの負担がかかるのか、私でさえ把握できていないんです……"
103100-214 = "……その前に、一つ警告を。"
103100-215 = "[USERNAME]先生の肉体は、これを使用した瞬間――#n取り返しのつかない被害に遭うでしょう。"
103100-216 = "二度と、以前の状態に戻る事はできません。#n――死に至る事さえ、有り得るのです。 "
103100-217 = "――それでも、よろしいのですか？"
103100-218 = "その結末が、火を見るよりも明らかだとしても？"
103100-223 = "[ns] \"大丈夫だよ、アロナ。よろしくね。\""
103100-227 = "ど、どうしてそこまで――"
103100-229 = "……何故、そこまでするのですか？"
103100-230 = "この破滅を逃れることなどできません――#nこれは、古より定まっていた事象……それが私の結論です。"
103100-231 = "[ruby=すなおおかみ]そう、砂狼シロコ[/ruby]――彼女がこの世界に存在した瞬間から、決定された結末。"
103100-232 = "時間は連続する事なく、決まりきった因果を繰り返すのみ―― "
103100-233 = "我々――全ての存在は、そうした決定論の下にある布石でしかないのです。"
103100-234 = "……。"
103100-235 = "これを防ぎたいというのであれば――"
103100-236 = "あなたは、過去に戻って彼女を殺すべきでした……クックックッ。"
103100-240 = "あなたは、絶対に己を理解できないだろうと豪語しておりましたね……ええ。私は今もなお、あなたという存在を理解する事などできません。 "
103100-241 = "何故、既に定められた運命を変えられると考えるのですか？#n何故、破滅を迎える未来にあえて突き進むのでしょうか？"
103100-242 = "……今一度、お聞きします。 "
103100-247 = "……何故？と。"
103100-251 = "[ns] \"…………。\""
103100-253 = "[ns3] \"大人として――子供を守り、先生として生徒を守るため。\"\n[ns4] \"大人の責任――先生の義務を、果たすためだよ。\""
103100-257 = "それがどのような方法であろうと……"
103100-258 = "いかなる代償を支払うことになろうと？"
103100-259 = "[s5] \"そう。どんな方法だったとしても、\"\n[s6] \"いかなる代償を支払うことになったとしても。\""
103100-262 = "……。 "
103100-263 = "――生徒を、助けに行くのですね？[USERNAME]先生。"
103100-268 = "[ns] \"そうだよ。\""
103100-271 = "……先生？"
103100-275 = "[ns] \"リン、一つ聞きたいことがあるんだ。\""
103100-276 = "……？#nはい、どうぞ。"
103100-277 = "[s] \"「二つ目の古則」についてなんだけど。\""
103100-281 = "「理解できないものを通じて、理解を得ることができるのか」――連邦生徒会長が言っていた、あの質問ですか……？……はい。覚えております。"
103100-282 = "[s] \"……リンはその時、何と答えたの？\""
103100-283 = "なぜ、そのような質問を……"
103100-284 = "いえ……私はあの時、"
103100-285 = "……。"
103100-290 = "……リンちゃん。"
103100-295 = "きっと私たちは、永遠にお互いを理解する事なんて、できないと思う。 "
103100-296 = "リンちゃんにとっての私は、きっと理解ができない不思議な存在――"
103100-297 = "そして、私たちはお互いが交わらないまま――別々の道を歩むしかないんだと思うの。"
103100-298 = "それがきっと――この世界の真意なんだ。"
103100-300 = "……でも、それでも構わない。"
103100-301 = "たとえ、理解できない存在だったとしても、"
103100-302 = "お互いにとって、相手が実体のない風のような……"
103100-303 = "隙間を通り過ぎていく――そんな存在だったとしても構わないの。"
103100-305 = "だからこそ……私は、リンちゃんが完成させてくれた文が好きなんだ。"
103100-306 = "だからね、その質問の答えは……私が大事にしまっておくね。"
103100-307 = "そう……私たちは、"
103100-312 = "「理解できない[ruby=もの]他人[/ruby]を通じて、[ruby=たがい]己[/ruby]の理解を得ることができるのか」"
103100-319 = "――その答えは、地上に戻ってからでも……よろしいでしょうか？"
103100-320 = "[s] \"うん、それで十分だよ。ありがとう。\""
103100-325 = "[ns] \"それじゃあ、出発しよっか。\""
103100-333 = "[ns] ウトナピシュティムの起動装置にシッテムの箱を繋げる。"
103100-339 = "メインパワーの起動を確認しました！"
103100-348 = "メインコントロールシステムの稼働、完了……！！"
103100-349 = "各エリアの通信システム、演算システムのチェック、オールクリア――#nここまではマニュアル通り、ばっちりだね。"
103100-358 = "エンジンシステム、クリア。"
103100-359 = "多次元解釈システムのチェック、クリア。#nオールクリアです！ "
103100-368 = "管制システムチェック、オールクリア……#nよし！これで全部使えるわよ！"
103100-369 = "発進準備、完了！命令待機中です！"
103100-370 = "先生、発進の号令をお願いします……！"
103100-371 = "[ns7] \"ウトナピシュティムの本船、発進！！\"\n[ns8] \"宇宙戦艦「ウトナピシュティム」、発進！！\""
103100-381 = "これより「ウトナピシュティムの本船」――離陸します！！"
103100-396 = "高度上昇……現在、780m！ "
103100-397 = "多次元解釈システムの起動は今でいいのよね？"
103100-399 = "計算は終わりました。ハナコさん、お願いします。"
103100-400 = "計算完了……多次元解釈システム、起動します！"
103100-406 = "[ns9] \"…………！！！\"\n[ns10] （体に衝撃が伝わってくる……）"
103100-409 = "……先生？ "
103100-410 = "せ、先生？顔色があまり良くありません。大丈夫ですか……？"
103100-411 = "あれ、震えてない……？#nどうしたの、先生……？"
103100-412 = "[s] \"ちょっと乗り物酔いがね……\""
103100-413 = "……申し訳ありません、もう少しの辛抱です。 "
103100-414 = "システムの正常動作を確認！ "
103100-415 = "現在、私たちのウトナピシュティムの本船は、箱舟と同じ「確率的な存在」となりました。"
103100-416 = "えっと、どういうこと？"
103100-417 = "多分だけど……確率的に存在可能なあらゆる宇宙に、私たちが同時に存在する……って事だと思う。"
103100-418 = "並行宇宙というものがあれば、ですが。"
103100-419 = "あはは……次元パラドックスが発生しないといいのですが……"
103100-420 = "大丈夫。もしそうなったとしても、衛星の一つとしか認知されないはずよ。"
103100-422 = "雑談はそこまでに。#n――航路の目標設定をお願いします！"
103100-423 = "目標高度75,000mにある箱舟までの航路を計算……設定、完了。"
103100-431 = "わ～、めっちゃ揺れる……"
103100-432 = "も、もう少しだけ耐えてください、先生。"
103100-434 = "これより、「アトラ・ハシースの箱舟」に向かって加速します。"
103100-435 = "うわっ、みんなしっかり掴まってね！#nマニュアル通りなら、尋常じゃない速度が出るはずだから！"
103100-437 = "最大出力……加速します！！"
103100-441 = "さあ、「オーパーツ」の性能とやらをチェックさせてもらうわよ。"
103100-461 = "う、うひゃあっ！？"
103100-462 = "だ、大丈夫ですかユウカさん？"
103100-463 = "な、なんとか……。 "
103100-464 = "すごいスピード…… "
103100-467 = "た、多次元解釈の波動値が不安定です！予想を遥かに上回っています！"
103100-469 = "……いえ、この程度ではまだ臨界点を超えません。計算は正しいです。"
103100-471 = "ですが、船へのダメージは大きくなるので、船体が耐えられるかどうか……。"
103100-475 = "[ns] （意識が、遠のいて……）"
103100-477 = "[ns] （体が……言うことを聞かない……）"
103100-491 = "何故、既に定められた運命を変えられると考えるのですか？#n何故、破滅を迎える未来にあえて突き進むのでしょうか？"
103100-499 = "[ns] （ここは……）"
103100-501 = "[ns] （なんだか、懐かしい感覚がする……）"
103100-510 = "次回;はじまりの物語"
