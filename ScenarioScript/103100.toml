103100-1 = "Episódio 10; Muito além dos céus"

103100-12 = "Professor, tenho boas notícias."

103100-13 = "O que..."

103100-14 = "O traje do operador chegou a tempo."

103100-15 = "[s] \"Ah...!?\""

103100-31 = "[ns] \"Essa é a fantasia do operador!!\""

103100-33 = "えっと……これって、本当に必要なの？ "

103100-34 = "Hehehe ♡ Recebi um forte pedido de que se você é operador de navio de guerra espacial, deve seguir as regras do gênero..."

103100-36 = "Quem fez esse pedido?"

103100-37 = "Hum... acho que a conclusão foi que este não é um navio de guerra espacial..."

103100-38 = "Suspiro...por que eu..."

103100-39 = "Bem, apenas aceite seu destino. #nTive a sorte de poder memorizar um manual tão grosso e de estar neste navio."

103100-41 = "Rin-senpai... esse casaco combina com você."

103100-45 = "...Por que o design é diferente para mim?"

103100-46 = "[s] \"Bem, Rin é a [ruby=capitã]capitã[/ruby]! Ela tem que usar um casaco longo!!\""

103100-47 = "Suspirar..."

103100-48 = "Ah, haha... não acho que esse visual seja ruim por um tempo..."

103100-49 = "Hehe... Agora vou pedir às pessoas aqui que desempenhem um papel importante no cálculo e verificação de interpretações multidimensionais."

103100-50 = "A propósito, esse traje registra a condição física do usuário, como ondas cerebrais e pulsação - e também está equipado com uma função de suporte para que não seja prejudicado no cumprimento de sua missão."

103100-51 = "Além disso, existem muitas outras funções, como à prova de chamas, à prova de explosão, à prova d'água, etc. Pense nisso como "equipamento exclusivo para operadores"♪"

103100-53 = "...Em vez de "um controle remoto apenas com funções desnecessárias"?"

103100-54 = "Isso tem uma função à prova d'água...? #nIsso significa alguma coisa?"

103100-55 = "Bem, não temos muito tempo, então não vamos nos preocupar com os detalhes e vamos direto ao assunto."

103100-57 = "……Concordo."

103100-64 = "A partir de agora, embarcaremos no ``Navio Principal Utnapishtim'' e entraremos na ``Arca de Atla Hasith'' localizada a 75.000 metros acima de Kivotos..."

103100-65 = "Eles devem capturar a Arca, desativar suas funções e retornar em segurança à superfície."

103100-66 = "Agora, vamos fazer uma chamada..."

