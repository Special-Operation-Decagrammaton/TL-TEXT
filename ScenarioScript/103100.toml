103100-230 = "Não há como escapar desta destruição---#nEste é um fenômeno que está estabelecido desde os tempos antigos...Essa é a minha conclusão."

103100-231 = "[ruby=Sunao Okami]Sim, Shiroko, o Lobo da Areia[/ruby]――O final foi determinado a partir do momento em que ela existiu neste mundo."

