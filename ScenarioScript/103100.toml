103100-188 = "Seja mais confiante. Montanhas, rios... e agora espaço, certo? Eu realmente não consigo experimentar isso."

103100-189 = "oh sim! Nunca vi um caminhão tão experiente! Desta vez não tem peso! ?"

103100-190 = "Não... eu não preciso desse tipo de experiência..."

