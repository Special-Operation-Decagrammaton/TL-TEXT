103100-109 = "[ruby=Takanashi]Kotoriyu[/ruby]Hoshino, [ruby=Kuromi]Kuromi[/ruby]Celica, [ruby=Izayoi]Izayoi[/ruby]Nonomi da Força-Tarefa de Abydos."

103100-110 = "Muito obrigado...!"

103100-111 = "Ok, deixe comigo."

