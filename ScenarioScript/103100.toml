[translation]
103100-1 = "Episódio 10; Muito além dos céus"
103100-12 = "Sensei, tenho boas notícias."
103100-13 = "O que..."
103100-14 = "O traje do operador chegou a tempo."
103100-15 = "[s] \"Ah...!?\""
103100-31 = "[ns] \"Essa é a fantasia do operador!!\""
103100-33 = "Hum... isso é realmente necessário?"

103100-34 = "Hehehe ♡ Recebi um forte pedido de que se você é operador de navio de guerra espacial, deve seguir as regras do gênero..."
103100-36 = "Quem fez esse pedido?"
103100-37 = "Hum... acho que a conclusão foi que este não é um navio de guerra espacial..."
103100-38 = "Suspiro...por que eu..."
103100-39 = "Bem, apenas aceite seu destino. #nTive a sorte de poder memorizar um manual tão grosso e de estar neste navio."
103100-41 = "Rin-senpai... esse casaco combina com você."
103100-45 = "...Por que o design é diferente para mim?"
103100-46 = "[s] \"Bem, Rin é a capitã! Ela tem que usar um casaco longo!!\""
103100-47 = "Suspirar..."
103100-48 = "Ah, haha... não acho que esse visual seja ruim por um tempo..."
103100-49 = "Hehe... Agora vou pedir às pessoas aqui que desempenhem um papel importante no cálculo e verificação de interpretações multidimensionais."
103100-50 = "A propósito, esse traje registra a condição física do usuário, como ondas cerebrais e pulsação - e também está equipado com uma função de suporte para que não seja prejudicado no cumprimento de sua missão."
103100-51 = "Além disso, existem muitas outras funções, como à prova de chamas, à prova de explosão, à prova d'água, etc. Pense nisso como \"equipamento exclusivo para operadores\"♪"

103100-53 = "...Em vez de \"um controle remoto apenas com funções desnecessárias\"?"

103100-54 = "Isso tem uma função à prova d'água...? #nIsso significa alguma coisa?"
103100-55 = "Bem, não temos muito tempo, então não vamos nos preocupar com os detalhes e vamos direto ao assunto."
103100-57 = "……Concordo."
103100-64 = "A partir de agora, embarcaremos no ``Navio Principal Utnapishtim'' e entraremos na ``Arca de Atla Hasith'' localizada a 75.000 metros acima de Kivotos..."
103100-65 = "Eles devem capturar a Arca, desativar suas funções e retornar em segurança à superfície."
103100-66 = "Agora, vamos fazer uma chamada..."
103100-71 = "Operadores, UrawaHanako, AmauAko."
103100-75 = "Operadores, OkusoraAyane, HayaseYuka."
103100-79 = "Operador, OnikataKayoko, MyojoHimari."
103100-83 = "Operadores, YuragiMomoka, IwabisuAyumu."
103100-87 = "...E eu sou Rin, o gerente geral do navio de Utnapishtim."
103100-88 = "[s] \"Prazer em conhecê-los, pessoal.\""
103100-89 = "Após o lançamento do “navio principal do Utnapishtim”, o responsável pelo controle de tráfego aéreo e suporte técnico em terra é..."
103100-94 = "Veritas da Millennium Science School, OtoseKotama, KogagiHare."
103100-98 = "KonuriMaki, KagamiChihiro. e--"
103100-102 = "Clube de Engenheiros, NekozukaHibiki, ShiraishiUtaha, TomiKotori."
103100-104 = "Depois que a Arca entra, as pessoas que se preparam para o ataque e apoiam a batalha de ocupação são――"
103100-109 = "KotoriyuHoshino, KuromiCelica, IzayoiNonomi da Força-Tarefa de Abydos."
103100-110 = "Muito obrigado...!"
103100-111 = "Ok, deixe comigo."
103100-112 = "Ok, os preparativos estão completos!"
103100-113 = "Yeah, yeah! Vamos todos ajudar Shiroko-chan☆"
103100-115 = "sim. Todos na força-tarefa  se voluntariaram para nos ajudar a proteger o lobo da areia Shiroko."
103100-116 = "……e,"
103100-123 = "Atualmente, a proprietária da única arma deste navio, o canhão elétrico, é Alice, do departamento de desenvolvimento de jogos."
103100-131 = "E SaiwaMomoi, SaiwaMidori, HanaokaYuzu...Essas quatro pessoas apoiarão e emprestarão sua força na batalha de ocupação."
103100-132 = "Muito obrigado..."
103100-134 = "Suspiro... Não tem jeito, acho que devo cuidar disso."
103100-135 = "...É absolutamente proibido ser imprudente. Segurança é nossa prioridade, ok?"
103100-137 = "E finalmente..."
103100-138 = "Hum? Você ainda está aí?"
103100-151 = "AishiyoFuka do clube de merenda escolar Gehenna, que é responsável pelas refeições de todos... e do Grupo de Pesquisa Gourmet."
103100-152 = "Espere! Espere! Há algo errado com o fluxo! ?"
103100-154 = "Hehe, pessoal, muito obrigado."
103100-155 = "Não, por que estou aqui? ?"
103100-156 = "Eu não entendo nada... O que é um navio de guerra espacial? ?"
103100-157 = "Entendo que eles estejam tentando fazer comida cedendo, mas...#nSe for esse o caso, então por que existe um Grupo de Pesquisa Gourmet se não há Juri?"
103100-158 = "Hehe... isso é natural, não é?"
103100-159 = "Isso ocorre porque você tem uma chance única na vida de comer algo que nunca poderá provar."
103100-161 = "Uma vez na vida...?"
103100-162 = "Sim. A razão pela qual nos mudamos é sempre a mesma..."
103100-163 = "Afinal, é pela gastronomia!"
103100-164 = "--Quão deliciosa será a comida que você come no espaço?"
103100-168 = "Isso mesmo! Talvez nunca mais tenhamos a chance de comer no espaço!"
103100-169 = "Eu gostaria de experimentar aquele cara que vi no filme, onde ele suga o líquido que flutua no ar com um canudo."
103100-171 = "Estou realmente ansioso por isso★"
103100-173 = "É isso mesmo – comida espacial é comida especial preparada assumindo gravidade zero."
103100-174 = "Este é um gênero profundo com muitos aspectos a serem observados, como manuseio de líquidos, ambientes onde cozinhar é impossível e processos de esterilização para prevenir intoxicações alimentares."
103100-175 = "No entanto..."
103100-180 = "Fuuka-san está aqui! !"
103100-185 = "Então, por que eu ――! ?"
103100-186 = "Caso alguma coisa acontecesse, também coloquei o caminhão da merenda escolar a bordo★#n, então não seria possível sem Fuuka."
103100-187 = "Ei, até o caminhão da merenda escolar...! ? Bem, antes que eu percebesse...! ?"
103100-188 = "Seja mais confiante. Montanhas, rios... e agora espaço, certo? Eu realmente não consigo experimentar isso."
103100-189 = "oh sim! Nunca vi um caminhão tão experiente! Desta vez não tem peso! ?"
103100-190 = "Não... eu não preciso desse tipo de experiência..."
103100-191 = "[s1] (…………)\n[s2] (Não iremos para altitude de gravidade zero, mas vamos manter isso em segredo...)"
103100-196 = "……Senhor, em relação à ativação da “nave principal de Utnapishtim” ――#nOuvi dizer que ela foi originalmente ativada pela Torre do Santuário."
103100-197 = "Esta é provavelmente a razão pela qual o Kaiser PMC tentou assumir o controle da Torre Sanctum imediatamente após encontrar este navio."
103100-198 = "Agora que a Torre do Santuário foi destruída, a única pessoa que pode ativá-la é você, o sensei dono da #n \"Caixa de Shittim\"."

103100-199 = "[s] \"Sim, deixe comigo.\"\"\n103100-200 = \"Sim, muito obrigado.\"\n103100-202 = \"……sim. É possível ativar este Oopart com minha habilidade...\"\n103100-203 = \"Mas... isso é diferente. Mesmo que eu esteja bem...\"\n103100-204 = \"O poder que reside neste Opart... influencia o sensei que é o dono da \"Caixa de Shittim\"...\"\n103100-205 = \"[s] \"Está tudo bem, Alona.\""

103100-206 = "Pois bem, o corpo do sensei não é diferente do corpo de uma pessoa normal...! #nUma única bala pode colocar você em uma situação perigosa!"
103100-207 = "[s] \"Mas Alona sempre me protegeu.\""
103100-208 = "Mas, isso... é diferente de antes..."
103100-212 = "Por favor, pense novamente, senhor...#nNem eu entendo o quanto isso é um fardo..."
103100-214 = "...Antes disso, gostaria de avisar."
103100-215 = "[NOME DE USUÁRIO] Seu corpo sofrerá danos irreparáveis ​​no momento em que você usar isto."
103100-216 = "Você nunca poderá voltar a ser como era antes. #n――Até a morte é possível."
103100-217 = "--Isso ainda está bem?"
103100-218 = "Mesmo que o resultado seja mais claro do que observar o fogo?"
103100-223 = "[ns] \"Está tudo bem, Alona. Prazer em conhecê-la.\"\"\n103100-227 = \"P-por que você está tão...\"\n103100-229 = \"...Por que você vai tão longe?\"\n103100-230 = \"Não há como escapar desta destruição---#nEste é um fenômeno que está estabelecido desde os tempos antigos...Essa é a minha conclusão.\"\n103100-231 = \"Sim, Shiroko, o Lobo da Areia――O final foi determinado a partir do momento em que ela existiu neste mundo.\"\n103100-232 = \"O tempo não é contínuo, apenas repete causa e efeito rotineiros――\"\n103100-233 = \"Nós – durante toda a nossa existência – nada mais somos do que um trampolim sob tal determinismo.\"\n103100-234 = \"…….\"\n103100-235 = \"Se você quiser evitar isso...\"\n103100-236 = \"Você deveria ter voltado no tempo e matado ela...\"\n103100-240 = \"Você se gabou de que nunca seria capaz de se entender... Sim. Ainda não consigo entender sua existência.\"\n103100-241 = \"Por que você acha que pode mudar um destino que já foi decidido? #nPor que você se atreve a avançar em direção a um futuro que levará à destruição?\"\n103100-242 = \"...Deixe-me perguntar mais uma vez.\"\n103100-247 = \"……por que? e.\"\n103100-251 = \"[ns] \"………….\"\"\n103100-253 = \"[ns3] \"Como adulto - para proteger as crianças, e como sensei para proteger os alunos.\"\n[ns4] \"Como adulto - para cumprir meu dever como sensei.\""

103100-257 = "Não importa qual seja o método..."
103100-258 = "Não importa qual seja o custo?"
103100-259 = "[s5] \"Sim. De qualquer forma\"\n[s6] \"Não importa o custo.\""
103100-262 = "……."
103100-263 = "-Você vai ajudar os alunos, certo? [NOME DE USUÁRIO] Sensei."
103100-268 = "[ns] \"Isso mesmo.\"\"\n103100-271 = \"……sensei?\"\n103100-275 = \"[ns] \"Rin, há algo que eu gostaria de perguntar a você.\"\"\n103100-276 = \"...? #nSim, por favor.\"\n103100-277 = \"[s] \"É sobre a \"segunda regra antiga\". \"\"\n103100-281 = \"“É possível obter compreensão através de algo que é incompreensível?” - Essa é a pergunta que o presidente do Conselho Estudantil da Federação estava fazendo...? ……sim. Eu lembro.\"\n103100-282 = \"[s] \"...O que Rin respondeu naquela hora?\"\"\n103100-283 = \"Por que você faz essa pergunta...\"\n103100-284 = \"Não... eu estava naquela época.\"\n103100-285 = \"…….\"\n103100-290 = \"... Rin-chan.\"\n103100-295 = \"Não acho que seremos capazes de nos entender para sempre.\"\n103100-296 = \"Para Rin-chan, sou uma existência misteriosa que ela não consegue entender.\"\n103100-297 = \"E acho que não temos escolha a não ser seguir caminhos separados, sem nunca nos vermos.\"\n103100-298 = \"Esse deve ser o verdadeiro significado deste mundo.\"\n103100-300 = \"...Mas tudo bem.\"\n103100-301 = \"Mesmo que seja algo que você não consegue entender,\"\n103100-302 = \"Um para o outro, a outra pessoa é como um vento sem substância...\"\n103100-303 = \"Não me importa se é esse tipo de existência que passa pela lacuna.\"\n103100-305 = \"É por isso que... eu gosto das frases que Rin-chan completou.\"\n103100-306 = \"Então, a resposta a essa pergunta... vou mantê-la segura.\"\n103100-307 = \"Sim...estamos\"\n103100-312 = \"“É possível obter compreensão de de si mesmo através de outras pessoas que não conseguimos entender?”\"\n103100-319 = \"--É correto responder a essa pergunta mesmo depois de retornar ao solo?\"\n103100-320 = \"[s] \"Sim, já chega. Obrigado.\""

103100-325 = "[ns] \"Bem, então vamos embora.\""
