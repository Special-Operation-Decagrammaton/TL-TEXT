103100-411 = "Ah, você não está tremendo...? #nO que há de errado, sensei...?"
103100-412 = "[s] \"Estou um pouco enjoado...\""
103100-413 = "...me desculpe, terei que ser um pouco mais paciente."
103100-414 = "Verifique o funcionamento normal do sistema!"
103100-415 = "Agora, a nossa nave Utnapishtim tornou-se uma “entidade probabilística” como a Arca."
