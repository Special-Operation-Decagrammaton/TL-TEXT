103100-417 = "Talvez, mas... acho que significa que existimos simultaneamente em todos os universos que é possível existir ao mesmo tempo."
103100-418 = "Se ao menos existissem universos paralelos."
103100-419 = "Haha... espero que o paradoxo dimensional não ocorra..."
