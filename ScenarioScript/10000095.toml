[translation]
10000095-2 = "それでは、私たちはお祭り運営委員会として最後の準備があるので、一旦失礼しますね。きちんとしたお礼は、また後ほどさせてください。"
10000095-3 = "お頭！良い席でクライマックスを見届けてクダサイね！"
10000095-4 = "[s] \"うん、二人ともお疲れ様。\""
10000095-6 = "（お祭り運営委員会の二人を見送って、賑やかな街を歩く）"
10000095-8 = "もうすぐあの、ミレニアムと合作の花火が始まるって！"
10000095-9 = "遅れる前に早く行こう！"
10000095-11 = "[ns] 人々の流れに乗って、花火会場の方へと移動する。"
10000095-15 = "（花火が綺麗に見られる展望台は、多くの人で賑わっている）"
10000095-16 = "（そんな人混みの中でも、すぐに見つけることができた）"
10000095-18 = "ひ、人が多すぎて、イズナ、酸欠になりそうです～。"
10000095-19 = "[s] イズナのことを呼ぶ。"
10000095-20 = "あっ、この声は……！せんせ……いえ、主殿！"
10000095-23 = "（急に走ってきたイズナの勢いで、危うく倒れそうになった）"
10000095-24 = "主殿！イズナが見晴らしの良い場所を見つけておきましたので！"
10000095-26 = "あそこがちょうど……って、ああぁっ！すぐ人でいっぱいに！"
10000095-27 = "うわぁん！ど、どうしましょう！？さっきの場所も道も、全部塞がれてしまいました！"
10000095-28 = "（慌てるイズナを落ち着かせながら、この場所から見ることにした）"
10000095-29 = "[s] \"人混みの中でも見づらいし、ここで見ようか。\""
10000095-30 = "は、はい！えへへっ！"
10000095-32 = "あ、始まりました……！"
10000095-38 = "わあっ！素敵です！"
10000095-39 = "（そうしてイズナと二人でしばらくの間、空に咲き誇っては消えていく、儚くも美しい花火を眺めていた）"
10000095-41 = "（一瞬のようだった気もするし、長い時間見ていたような気もする）"
10000095-43 = "えへへっ、この景色……主殿と一緒に見られるだなんて……。"
10000095-44 = "……。"
10000095-45 = "主殿……その、イズナ、色々とご迷惑をおかけしてしまって申し訳ありません。"
10000095-46 = "イズナは、イズナは……。"
10000095-47 = "[s1] \"気にしないで、これでも先生だから。\"\n[s2] \"生徒にかけられる迷惑なら、いつでも大歓迎。\""
10000095-48 = "先生……。"
10000095-49 = "先生……。"
10000095-51 = "えへへっ……主殿！イズナ、ここに宣言します！"
10000095-52 = "先生は、主殿は、私の夢を応援してくださる方！"
10000095-53 = "これから先、イズナは主殿に忠誠を誓います！"
10000095-54 = "[s] \"そ、そっか。\""
10000095-55 = "ですので主殿！"
10000095-56 = "これからもイズナを、末永くよろしくお願いいたします！"
10000095-57 = "イズナはこれからも修行を続けて、主殿のために頑張っていきますので！"
10000095-60 = "ニンニン！えへへっ……！"
10000095-63 = "百鬼夜行・第38旧校舎"
10000095-67 = "（忍術研究部の部室）"
10000095-68 = "（入部希望者募集中！冷やかしお断り！）"
10000095-69 = "おお、ここが噂に聞いた忍術研究部……！"
10000095-70 = "忍術を研究する部活があるだなんて……イズナ、全然知りませんでした！"
10000095-71 = "ここで修行すれば、イズナも立派な忍者に……！"
10000095-73 = "……よし！"
10000095-76 = "失礼します……！"
10000095-79 = "終わり……？"
10000095-80 = "桜花爛漫お祭り騒ぎ！～空に徒花 地に忍び～"
