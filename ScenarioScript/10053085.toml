[translation]
10053085-3 = "……はっ！？"
10053085-4 = "ど、どうなったんだ？戦闘が始まったところまでは覚えているんだが……。\r\n"
10053085-8 = "戦闘が始まった瞬間にツルっと転んで、そのまま気絶してたよ。"
10053085-9 = "肝心な時に……まったく、面目ない。\r\n"
10053085-10 = "ということは……すべてレナ君が1人で倒してくれたということかな？"
10053085-11 = "いや、なんでそうなるの……。どう考えてもコノカでしょ。\r\n"
10053085-12 = "うん？冗談にしてはずいぶん辛辣だね。"
10053085-18 = "さてと～\r\n"
10053085-19 = "どうやってお仕置きしてやろっかな～？\r\n"
10053085-24 = "ま、待ってくれ！もう降参したじゃんか！#nまさか丸腰のヤツを殴るとか、そういうのじゃないよな！？\r\n\r\n\r\n\r\n\r\n\r\n"
10053085-25 = "何を寝ぼけたこと言ってんだ。殴るに決まってるだろうが。\r\n\r\n\r\n"
10053085-26 = "ヴァルキューレがそんなことしていいのかよ！？\r\n\r\n\r\n\r\n\r\n"
10053085-27 = "あんたらが相手なら問題無い。これだからヴァルキューレはやめられないんだ。\r\n\r\n\r\n"
10053085-28 = "今まで散々ちょっかいをかけられた分はこれでチャラにしといてやるよ。\r\n\r\n"
10053085-29 = "ま、待って！なに言ってんだよ？うちらは何もやってない！冤罪だ！！\r\n\r\n\r\n\r\n\r\n\r\n"
10053085-30 = "電話線切って、橋壊したの、あんたらだろ？\r\n\r\n"
10053085-31 = "あ……それはまぁ、そうなんだけど……。\r\n\r\n\r\n\r\n\r\n"
10053085-32 = "正直、戦車まで引っ張り出しておいて冤罪はないと思うけどな？\r\n\r\n\r\n\r\n\r\n"
10053085-33 = "お前はどっちの味方なんだよ！？\r\n\r\n\r\n\r\n\r\n"
10053085-34 = "コントか何かか？\r\n\r\n"
10053085-35 = "……レナ、魔法は存在しないんだっけ？今から、1つ見せてあげるよ。\r\n\r\n"
10053085-41 = "「本音しか言えなくなる魔法」ってやつだ。すっごい不思議なんだな、これが。"
10053085-51 = "ち、ちがっ……います！本当に！誓って嘘じゃないです！"
10053085-52 = "た、ただ、副局長をおびき出そうと思ってツチノコの噂を流したことは事実なんだけど――"
10053085-53 = "でも本当に……本当にそれ以外のことは何もしてない……です……。"
10053085-55 = "……ちょっと待て、今なんと言った？\r\n"
10053085-56 = "ツチノコの噂を流したのは君たちだと？"
10053085-58 = "は？なんだよ急に。お前誰だよ？\r\n\r\n\r\n"
10053085-60 = "ツチノコは……存在しないということなのか？\r\n"
10053085-62 = "そりゃそうだろ。ツチノコなんているわけねぇって。\r\n\r\n"
10053085-63 = "オカルト好きの副局長なら釣れると思って、噂を適当にでっち上げてネットにばらまいただけだよ。\r\n\r\n\r\n"
10053085-64 = "は！？やっていいことと悪いことがあるよねぇ！？\r\n\r\n\r\n"
10053085-65 = "だ、だけどよ！常識的に考えて、今どきツチノコなんか信じるやつ――\r\n\r\n\r\n\r\n"
10053085-66 = "でも「騙された方が悪い」は、典型的な加害者のセリフだよな。\r\n\r\n\r\n\r\n\r\n"
10053085-67 = "だから！お前さっきからどっちの味方なんだよ！？\r\n\r\n\r\n\r\n\r\n\r\n"
10053085-73 = "……。"
10053085-74 = "……そうか、ツチノコは最初から存在しなかったのか。\r\n"
10053085-75 = "ツバサ……？"
10053085-76 = "ツチノコ……宇宙人を見つけられたら、あのうるさい「セミナー」も……#nもう一度我が部を見直してくれるかもと思っていたんだ。\r\n"
10053085-77 = "そうすれば、またみんなで部活動ができるかもしれないって……。"
10053085-78 = "……。"
10053085-82 = "……いいや、大丈夫。こうなることも、ある程度は想定していた。\r\n"
10053085-83 = "ツチノコは発見できずとも、部を再建する手段は他にもある……うん！"
10053085-84 = "[s1] \"よし、今日もツチノコを探しに行こうか。\"\r\n[s2] \"もうすぐ夜が明けるし。\""
10053085-87 = "聞いていなかったのか？ツチノコは存在しないって……。\r\n"
10053085-92 = "うん、自分たちで流した噂だってはっきり言ってたね。"
10053085-93 = "あ、勘違いしないでよ？私は最初っからツチノコなんて信じてなかったから。\r\n"
10053085-94 = "……だから、私は何も変わってないんだよね。"
10053085-95 = "レナ君……。\r\n"
10053085-100 = "はぁ～……なんであたしの好きな展開をピンポイントで踏んでくるかなぁ。\r\n\r\n"
10053085-101 = "おい、あんたら。"
10053085-103 = "はいぃっ！？"
10053085-104 = "今日の件はなかったことにしてやる代わりに、少し手伝ってもらおうか。"
10053085-105 = "でも、ツチノコなんていないって――"
10053085-106 = "「人の言葉を理解できるようになる魔法」って右ストレートだっけ？左フックだったっけ？"
10053085-107 = "ひっ、ひいいぃぃっ！！わ、分かりました！！みんなツチノコ探すぞ！！#n山小屋の周りを片っ端から探すんだ！"
10053085-108 = "鱗一枚たりとも見逃すなよ！"
10053085-114 = "うーん……。"
10053085-115 = "でもやっぱり引っかかるんだよね……。\r\n"
10053085-116 = "[s3] \"どうかした？\"\r\n[s4] \"何か気になることでもあるの？\""
10053085-119 = "結局さ、写真に写ってた「白い影」って誰？"
10053085-120 = "え？電話線を切って逃げてるところが映り込んだんじゃないの？"
10053085-121 = "最初は私もそう思ってたけど……。"
10053085-122 = "白い服着てた子、いなかったよね。"
10053085-123 = "……え？\r\n"
10053085-127 = "な、なんなんですか！？あなた達！"
10053085-128 = "なんだコイツ。うちらが戦ってる間ずっと隠れてたのか？"
10053085-129 = "怪しすぎるだろ。"
10053085-131 = "[ns5] \"あれ、この声は……？\"\r\n[ns6] \"まさか……？\""
10053085-135 = "部長！？"
10053085-142 = "あ、あはは……。ど、どうも。お久しぶりです。"
10053085-143 = "[s7] \"ミライが……部長……？\"\r\n[s8] \"まさか、ツバサの所属してた部って……。\""
10053085-150 = "ああ、まだ言っていなかったな。"
10053085-151 = "吾輩は「疑似科学部」の部員だよ。正確に言うならば「元」部員なのだけどね……。"
10053085-152 = "先生もミライ部長と顔見知りだったとは。"
10053085-157 = "いやぁ～……知らないままの方が幸せだった気もしますけど……。\r\n\r\n"
10053085-158 = "疑似科学部？ミライ部長？どっかで聞いたことあるような……？"
10053085-159 = "あっ、えっと、一応、誤解がないよう先に言っておきますけど……。"
10053085-160 = "今回に限っては、本当に悪意とかないですから！"
10053085-161 = "いや、別に普段から悪意があったわけでもないんですけど……。"
10053085-163 = "あー、思い出した。手配書で見たことあるんだ。詐欺師だよな？"
10053085-165 = "なっ、なんて人聞きの悪い！#nまだ検証されてない分野の応用科学を商品化して販売しているだけの発明家です！"
10053085-166 = "ゲルマニウムブレスレットとか、磁気布団とかだっけ？"
10053085-167 = "うちの部の稼ぎ頭の商品ではありますけど……。"
10053085-168 = "うん、詐欺師だな。"
10053085-169 = "というか、あたし「疑似科学部」にまで恨み買ってたっけ？\r\n\r\n\r\n\r\n"
10053085-170 = "はい？何の話ですか？\r\n\r\n"
10053085-171 = "あんた、あたしに復讐しにここまで来たんじゃないのか？\r\n\r\n\r\n"
10053085-172 = "復讐？そんな一銭にもならない非効率的なこと、わざわざするわけないじゃないですか。\r\n"
10053085-173 = "もしかしてあなた、世界が自分を中心に回ってると思い込むタイプですか？#nそれ、誇大妄想の初期症状ですよ？\r\n\r\n"
10053085-174 = "……じゃあ何しに来たのさ？\r\n\r\n\r\n"
10053085-175 = "それは、その……トップシークレットと言いますか……。\r\n\r\n"
10053085-176 = "レナ、これからマジックが始まるよ～\r\n\r\n\r\n\r\n"
10053085-180 = "待ってください！何するつもりですか！ちょっ、近寄らないでください！#nしゃべります！話せばいいんでしょう！？話しますから！"
10053085-181 = "これだから体育会系は野蛮で苦手なんだよなぁ……。\r\n\r\n\r\n\r\n"
10053085-182 = "とにかくですね、厳密に言うと私も被害者なんですよ！\r\n\r\n"
10053085-183 = "ほぉ？\r\n\r\n\r\n\r\n"
10053085-184 = "その……これ、あの子には内緒にしておいてほしいんですけど……。\r\n\r\n"
10053085-188 = "よく知らない人たちとツバサが旅行に行く、とたまたま知り合いづてに聞いてしまいまして……。"
10053085-189 = "別に悪い意味じゃないんですけど、ツバサってちょっと極端じゃないですか。#n[ruby=・]ち[/ruby][ruby=・]ゃ[/ruby][ruby=・]ん[/ruby][ruby=・]と[/ruby][ruby=・]信[/ruby][ruby=・]じ[/ruby][ruby=・]て[/ruby][ruby=・]い[/ruby][ruby=・]る[/ruby]から、ちょっと社会性がないといいますか……。"
10053085-190 = "で、心配になって後をつけて来た、と。"
10053085-191 = "いや、私だってこんなド田舎に長居するつもりなんてなかったんですよ！？#n元気にやってるのを確認したらさっさと帰る予定で！\r\n"
10053085-192 = "なのにこの辺り一帯、電波がまともに入らないじゃないですか！"
10053085-193 = "帰ろうとしたら橋は壊れてるし！\r\n"
10053085-194 = "おまけに一緒に居る人がまさかヴァルキューレの人だったなんて！！"
10053085-195 = "私がどれだけ苦労したか分かりますか！？\r\n\r\n\r\n"
10053085-197 = "見事なまでの逆ギレ……。\r\n"
10053085-199 = "素直に顔出して助けてって言えばよかったんじゃ……？\r\n\r\n"
10053085-200 = "出来るわけないじゃないですか！これでも一応、部長なんですよ？#n尊敬される立場なんです！"
10053085-202 = "その台詞言ってる時点で、あんまり尊敬されてなさそうなんだけど……。\r\n"
10053085-203 = "で、結局あの写真に写ってた白い人影って……。"
10053085-204 = "写真？あぁ、おそらく私ですね。どれだけ驚いたと思ってるんですか。#nいきなり窓を開けて叫ぶだなんて、心臓に悪いですよ。"
10053085-205 = "なんていうか……拍子抜けもいいとこなんだけど。"
10053085-210 = "姐さん、この女どうします？縛っときます？"
10053085-211 = "え、ちょ、ちょっと待ってください！？"
10053085-212 = "お前、詐欺師なんだろ？しかも指名手配されてるって話だし。\r\n\r\n\r\n\r\n"
10053085-213 = "あなた達には人の心とかないんですか！？#nさっきのハートフルな話を聞いておいて、それでもそんなこと言うなんて！\r\n\r\n\r\n\r\n"
10053085-218 = "うーん……まぁ、放っときゃいいでしょ。\r\n"
10053085-219 = "あたし、そんなに真面目じゃないからね。#nそれに手配書の隅っこに載ってる雑魚の名前まで覚えてないし。#nそもそも、今は休暇中だし。"
10053085-220 = "部員が心配で後を追って来た部長？そんなの、名前までは覚えてないねぇ。\r\n"
10053085-221 = "[s] \"本当にいいの？\""
10053085-222 = "なに言ってんすか、いいわけないっすよ。規則通りなら即逮捕っすよ。\r\n"
10053085-224 = "うっ……！"
10053085-229 = "でもね。"
10053085-230 = "あたし、元から規則とか守らない質なんで。"
10053085-231 = "あ、これ姉御には内緒でお願いしますよ？"
10053085-232 = "見逃してくれるんですか？\r\n\r\n\r\n"
10053085-233 = "見逃す？まさか。あたしは何も見てなかったの。\r\n\r\n"
10053085-234 = "でも後で裏切ったりとか……。\r\n"
10053085-235 = "あのさぁ、まだこの話続けるの？もう少し察しろって。\r\n\r\n\r\n\r\n"
10053085-236 = "はい……すみませんでした……。\r\n\r\n\r\n"
10053085-239 = "あの、さっきからずいぶん長く話し込んでいたみたいだけど……。\r\n\r\n\r\n"
10053085-240 = "い、いえいえいえ！その、なんて言うかですね！\r\n\r\n"
10053085-241 = "あ、ツチノコ！実は私もツチノコを探しに来てまして！#nそれでしばらくこの山小屋に滞在しようかなって……。\r\n\r\n"
10053085-242 = "本当か！？じゃあまた前みたいに一緒に活動できるってこと！？\r\n\r\n\r\n"
10053085-243 = "そ、それはちょっと難しいといいますか……。#n何しろ私は逃亡生活ですし、疑似科学部も盛大に目をつけられてますし……。\r\n\r\n"
10053085-247 = "でも――\r\n"
10053085-248 = "たまにはこうやって顔くらいは出すかも知れないですね。\r\n"
10053085-253 = "……！\r\n"
10053085-254 = "……もしかしたら。\r\n"
10053085-255 = "ここまでツチノコを探してきた、この冒険そのものが――#n本当のツチノコだったのかもしれないね。"
10053085-260 = "え、まとめ方それでいいの……？\r\n\r\n"
