[translation]
10053085-3 = "...Ah! ?"

10053085-4 = "O que aconteceu? Lembro-me até o ponto onde a batalha começou... \r\n"

10053085-8 = "No momento em que a batalha começou, escorreguei e caí inconsciente."

10053085-9 = "Num momento crítico... é completamente vergonhoso. \r\n"

10053085-10 = "Isso significa que... Rena-kun derrotou tudo sozinha?"

10053085-11 = "Não, por que isso acontece... Não importa como você olhe, é Konoka. \r\n"

10053085-12 = "Sim? Isso é muito duro, embora seja uma piada."

10053085-18 = "Bem~\r\n"

10053085-19 = "Como devo puni-lo? \r\n"

10053085-24 = "Ah, espere! Você já se rendeu! #nNão é como se você fosse bater em alguém desarmado! ? \r\n\r\n\r\n\r\n\r\n\r\n"

10053085-25 = "O que você disse enquanto dormia? Tenho certeza que ele vai te dar um soco. \r\n\r\n\r\n"

10053085-26 = "Está tudo bem para Valquíria fazer algo assim? ? \r\n\r\n\r\n\r\n\r\n"

10053085-27 = "Se você é meu oponente, não há problema. É por isso que não consigo parar de jogar Valquíria. \r\n\r\n\r\n"

10053085-28 = "Vou deixar de lado todos os problemas que tive até agora. \r\n\r\n"

10053085-29 = "Ah, espere! O que você está falando? Não estamos fazendo nada! É uma falsa acusação! ! \r\n\r\n\r\n\r\n\r\n\r\n"

10053085-30 = "Foi você quem cortou as linhas telefônicas e destruiu a ponte, certo? \r\n\r\n"

10053085-31 = "Ah... bem, isso é verdade... \r\n\r\n\r\n\r\n\r\n"

10053085-32 = "Sinceramente, não creio que haja nenhuma falsa acusação em arrastar o tanque, certo? \r\n\r\n\r\n\r\n\r\n"

10053085-33 = "De que lado você está? ? \r\n\r\n\r\n\r\n\r\n"

10053085-34 = "É uma esquete ou algo assim? \r\n\r\n"

10053085-35 = "...Lena, magia não existe? Vou mostrar um para vocês agora. \r\n\r\n"

10053085-41 = "Chama-se “a magia de só ser capaz de dizer o que você realmente quer dizer”. Isso é realmente estranho."

10053085-51 = "Não, não... aí estou eu! Realmente! Juro que não estou mentindo!"

10053085-52 = "Bem, é verdade que espalhei rumores sobre Tsuchinoko na tentativa de atrair o vice-diretor..."

10053085-53 = "Mas sério... eu realmente não faço mais nada..."

10053085-55 = "...Espere um minuto, o que você acabou de dizer? \r\n"

10053085-56 = "Então foram vocês que espalharam os rumores sobre Tsuchinoko?"

10053085-58 = "dentes? O que aconteceu de repente? Quem é você? \r\n\r\n\r\n"

10053085-60 = "Isso significa que Tsuchinoko não existe? \r\n"

10053085-62 = "Isso mesmo. Não há como Tsuchinoko existir. \r\n\r\n"

10053085-63 = "Acabei de inventar um boato aleatório e espalhei na internet, pensando que conseguiria conversar com o vice-diretor que adora o ocultismo. \r\n\r\n\r\n"

10053085-64 = "dentes! ? Há coisas boas para fazer e coisas ruins para fazer! ? \r\n\r\n\r\n"

10053085-65 = "Mas, mas! Pessoas que pensam com bom senso e acreditam em Tsuchinoko hoje em dia ――\r\n\r\n\r\n\r\n"

10053085-66 = "Mas “É pior ser enganado” é uma frase típica de um perpetrador. \r\n\r\n\r\n\r\n\r\n"

10053085-67 = "é por isso! De que lado você está agora? ? \r\n\r\n\r\n\r\n\r\n\r\n"

10053085-73 = "……."

10053085-74 = "... Entendo, Tsuchinoko nunca existiu desde o início. \r\n"

10053085-75 = "Tsubasa...?"

10053085-76 = "Tsuchinoko...Eu estava pensando que se você pudesse encontrar o alienígena, talvez você pudesse dar uma segunda olhada naquele barulhento \"seminário\" em nosso clube. \r\n"

10053085-77 = "Se fizermos isso, talvez possamos todos fazer atividades do clube juntos novamente..."

10053085-78 = "……."

10053085-82 = "...Não, está tudo bem. Até certo ponto, eu esperava que isso acontecesse. \r\n"

10053085-83 = "Mesmo que Tsuchinoko não possa ser encontrado, existem outras maneiras de reconstruir o clube...Sim!"

10053085-84 = "[s1] \"Ok, vamos procurar Tsuchinoko novamente hoje.\"\r\n[s2] \"Está quase amanhecendo.\""

10053085-87 = "Você não ouviu? Tsuchinoko não existe... \r\n"

10053085-92 = "Sim, eles disseram claramente que era um boato que eles espalharam."

10053085-93 = "Ah, não me entenda mal, ok? Não acreditei em Tsuchinoko desde o início. \r\n"

10053085-94 = "...Então, nada mudou para mim."

10053085-95 = "Lena-kun.... \r\n"

10053085-100 = "Suspiro... me pergunto por que você está identificando meus desenvolvimentos favoritos. \r\n\r\n"

10053085-101 = "Ei, pessoal."

10053085-103 = "Sim! ?"

10053085-104 = "Em vez de fingir que hoje não aconteceu, gostaria que você me ajudasse um pouco."

10053085-105 = "Mas não existe Tsuchinoko..."

10053085-106 = "“A magia que permite entender as palavras de outras pessoas” é um direito direto? Foi um gancho de esquerda?"

10053085-107 = "Ei, ei! ! Ah, eu entendo! ! Vamos todos procurar Tsuchinoko! ! #n Pesquise em todos os lugares da cabana na montanha!"

10053085-108 = "Não perca uma única escala!"

10053085-114 = "Hum..."

10053085-115 = "Mas ainda estou preso... \r\n"

10053085-116 = "[s3] \"O que há de errado?\"\r\n[s4] \"Há algo que o preocupa?\""

10053085-119 = "Afinal, quem é a “sombra branca” da foto?"

10053085-120 = "foto? Não há uma foto dele cortando a linha telefônica e fugindo?"

10053085-121 = "No começo eu também pensei assim, mas..."

10053085-122 = "Não havia crianças vestindo roupas brancas."

10053085-123 = "……foto? \r\n"

10053085-127 = "O que é aquilo?! ? Vocês!"

10053085-128 = "O que é esse cara? Você estava se escondendo o tempo todo que estávamos brigando?"

10053085-129 = "Isso é muito suspeito."

10053085-131 = "[ns5] \"Hum, essa voz é...?\"\r\n[ns6] \"De jeito nenhum...?\""

10053085-135 = "Gerente! ?"

10053085-142 = "Ah, ahaha…. Olá. Já faz muito tempo."

10053085-143 = "[s7] \"Mirai é...o gerente...?\"\r\n[s8] \"Não acredito que este é o clube ao qual Tsubasa pertencia...\""

10053085-150 = "Ah, eu ainda não te contei."

10053085-151 = "Sou membro do ``clube da pseudociência''. Para ser mais preciso, ele é um \"antigo\" membro..."

10053085-152 = "A professora também conhecia o Diretor Mirai."

10053085-157 = "Bem...sinto que teria sido mais feliz se não soubesse... \r\n\r\n"

10053085-158 = "Clube de pseudociência? Diretor Mirai? Eu sinto que já ouvi isso em algum lugar...?"

10053085-159 = "Ah, hum, deixe-me dizer isso primeiro para que não haja mal-entendidos..."

10053085-160 = "Desta vez, eu realmente não tenho malícia!"

10053085-161 = "Não, não é como se eu tivesse alguma intenção maliciosa..."

10053085-163 = "Ah, eu lembrei. Eu vi isso na lista de procurados. Você é um golpista, certo?"

10053085-165 = "Que péssimo ouvinte! #nSou um inventor que comercializa e vende ciência aplicada em áreas que ainda não foram verificadas!"

10053085-166 = "É uma pulseira de germânio ou um futon magnético?"

10053085-167 = "É o que ganha mais no nosso departamento, mas..."

10053085-168 = "Sim, ele é um golpista."

10053085-169 = "Ou melhor, será que guardei rancor do “Clube da Pseudo Ciência”? \r\n\r\n\r\n\r\n"

10053085-170 = "sim? O que você está falando? \r\n\r\n"

10053085-171 = "Você veio até aqui para se vingar de mim, não foi? \r\n\r\n\r\n"

10053085-172 = "vingança? Não faz sentido fazer uma coisa tão ineficiente que não lhe renderá um centavo. \r\n"

10053085-173 = "Você é o tipo de pessoa que acredita que o mundo gira em torno de você? #nIsso não é um sintoma precoce de delírios de grandeza? \r\n\r\n"

10053085-174 = "...Então por que você veio aqui? \r\n\r\n\r\n"

10053085-175 = "É... ultra secreto, digamos...? \r\n\r\n"

10053085-176 = "Lena, a magia está prestes a começar~\r\n\r\n\r\n\r\n"

10053085-180 = "Por favor, aguarde! O que você vai fazer? Ei, por favor, não chegue perto de mim! #nVamos conversar! Acho que só precisamos conversar! ? Eu falo com você!"

10053085-181 = "É por isso que sou tão bárbaro e não sou bom em atletismo... \r\n\r\n\r\n\r\n"

10053085-182 = "Enfim, a rigor, também sou vítima! \r\n\r\n"

10053085-183 = "Huh? \r\n\r\n\r\n\r\n"

10053085-184 = "Hum... eu quero que você mantenha isso em segredo daquela garota... \r\n\r\n"

10053085-188 = "Acontece que ouvi de um conhecido que Tsubasa estava viajando com pessoas que eu não conhecia bem..."

10053085-189 = "Não quero dizer isso de maneira ruim, mas Tsubasa não é um pouco extremo? Por causa de #n, pode-se dizer que tenho um pouco de falta de habilidades sociais..."

10053085-190 = "Então, ele ficou preocupado e me seguiu."

10053085-191 = "Não, eu não tinha intenção de ficar tanto tempo numa área tão rural! ? #nEstou planejando ir para casa logo depois de ter certeza de que ela está bem! \r\n"

10053085-192 = "No entanto, você não consegue um bom sinal nesta área!"

10053085-193 = "Quando tentei voltar para casa, a ponte estava quebrada! \r\n"

10053085-194 = "Para piorar a situação, a pessoa com quem eu estava era na verdade uma Valquíria! !"

10053085-195 = "Você sabe o quanto eu trabalhei! ? \r\n\r\n\r\n"

10053085-197 = "Uma reversão impressionante... \r\n"

10053085-199 = "Não seria melhor se você simplesmente aparecesse e pedisse ajuda? \r\n\r\n"

10053085-200 = "Não há como você fazer isso! Afinal, você ainda é o gerente, certo? #nÉ uma posição respeitada!"

10053085-202 = "Quando ele disse essa frase, não parecia que estava sendo muito respeitado... \r\n"

10053085-203 = "Então, no final, aquela figura branca naquela foto..."

10053085-204 = "fotografia? Ah, provavelmente eu. Quão surpreso você acha que eu fiquei? #nFaz mal ao coração abrir a janela de repente e gritar."

10053085-205 = "Quero dizer... é bom poder pular o ritmo."

10053085-210 = "Irmã, o que devemos fazer com esta mulher? Devo amarrar você?"

10053085-211 = "Ei, espere um minuto! ?"

10053085-212 = "Você é um golpista? E dizem que ele é procurado. \r\n\r\n\r\n\r\n"

10053085-213 = "Vocês não têm um coração humano? ? #nMesmo depois de ouvir a história sincera que acabou de contar, você ainda diz coisas assim! \r\n\r\n\r\n\r\n"

10053085-218 = "Hmm... bem, acho que deveria deixar isso de lado. \r\n"

10053085-219 = "Eu não estou falando sério. #nAlém disso, nem me lembro do nome do filhote listado no canto da lista de procurados. #nEm primeiro lugar, estou de férias."

10053085-220 = "O gerente que veio atrás dos sócios do clube porque estava preocupado com eles? Eu nem lembro o nome. \r\n"

10053085-221 = "[s] \"Tem certeza?\""

10053085-222 = "O que você está falando? Não há nada de errado com isso. Se você seguir as regras, será preso imediatamente. \r\n"

10053085-224 = "Eca...!"

10053085-229 = "Mas."

10053085-230 = "Sempre fui alguém que não segue regras."

10053085-231 = "Ah, por favor, mantenha isso em segredo da sua irmã, ok?"

10053085-232 = "Você vai sentir falta? \r\n\r\n\r\n"

10053085-233 = "perder? Sem chance. Eu não vi nada. \r\n\r\n"

10053085-234 = "Mas ele pode me trair mais tarde... \r\n"

10053085-235 = "Bem, você ainda vai continuar falando sobre isso? Por favor, pense um pouco mais sobre isso. \r\n\r\n\r\n\r\n"

10053085-236 = "Sim...me desculpe... \r\n\r\n\r\n"

10053085-239 = "Hum, parece que já estamos conversando há algum tempo... \r\n\r\n\r\n"

10053085-240 = "Não, não, não! Bem, o que posso dizer! \r\n\r\n"

10053085-241 = "Ah, Tsuchinoko! Na verdade, eu também vim procurar Tsuchinoko! #nEntão pensei em ficar nesta cabana na montanha por um tempo... \r\n\r\n"

10053085-242 = "É verdade? ? Pois bem, podemos trabalhar juntos novamente como antes! ? \r\n\r\n\r\n"

10053085-243 = "Quer dizer, isso é um pouco difícil... #nAfinal, estou vivendo uma vida de fugitivo, e o Clube da Pseudo Ciência também está chamando muita atenção... \r\n\r\n"

10053085-247 = "Mas ――\r\n"

10053085-248 = "Eu poderia mostrar meu rosto assim de vez em quando. \r\n"

10053085-253 = "...! \r\n"

10053085-254 = "...Talvez. \r\n"

10053085-255 = "Esta aventura em que tenho procurado Tsuchinoko até agora pode ter sido a verdadeira Tsuchinoko."

10053085-260 = "Huh, é assim que você resume...? \r\n\r\n"

