[translation]
1007603-1 = "Como resultado"

1007603-2 = "(Eu estava ocupado limpando todo o trabalho administrativo que estava chegando...)"

1007603-4 = "Não, isso é estranho! Tenho certeza que entraremos em contato com você com antecedência se abrirmos um carro-cozinha #n deste lado do terreno...!"

1007603-5 = "Meu evento é um revezamento! ? #nDe jeito nenhum! Eu sou um saltador em distância!"

1007603-6 = "Que tal um delicioso yakitori? Agora é só..."

1007603-7 = "E daí? Até onde cheguei?"

1007603-8 = "Ah, uh... me desculpe... #nPerdi meu cartão vermelho... você tem um sobressalente...?"

1007603-9 = "O quê, isto não é um restaurante? Ei, vim conforme as instruções... #nEntão, onde devo comer?"

1007603-13 = "Obrigado pelo seu trabalho duro. Vim para trocar a eletricidade."

1007603-14 = "...O que, a data é diferente? Pois é, aconteceu hoje..."

1007603-16 = "(barulhento……)"

1007603-17 = "(Há tantas pessoas com quem tenho que lidar que não tenho tempo para fazer uma pausa...)"

1007603-18 = "[ns1] (T-Isso é... mais do que eu imaginava...)\n[ns2] (Eu estava preparado para isso, mas ainda é difícil...)"

1007603-21 = "Você está aqui, senhor!"

1007603-23 = "Huh, você não parece pálido por algum motivo? Aconteceu alguma coisa...?"

1007603-24 = "...Oh, é uma pausa!"

1007603-25 = "Certamente... é difícil sair daqui quando você tem que lidar com tanta coisa..."

1007603-26 = "Se sim, deixe-me ajudá-lo! #nSe é fácil, você consegue!"

1007603-27 = "Hehe. Apesar de parecer assim, gosto bastante de trabalhar com pessoas! Foi surpreendente?"

1007603-28 = "[s3] \"Sim, era isso que eu estava sentindo.\"\n[s4] \"Então, posso perguntar um momento?\""

1007603-29 = "Ehehe…."

1007603-30 = "De qualquer forma, fique à vontade para deixar isso comigo!"

1007603-31 = "Sim claro!"

1007603-32 = "Por favor, vá devagar!"

1007603-33 = "[ns] Vou fazer uma pausa."

1007603-35 = "(...... depois de um tempo)"

1007603-37 = "[ns5] \"Estou de volta, Kotori.\"\n[ns6] \"Obrigado pela sua ajuda.\""

1007603-41 = "[ns7] \"Huh...?\"\n[ns8] \"Ninguém......\""

1007603-44 = "Aaaaaaaaaaaaa! ?"

1007603-45 = "Ah, professora... #n, isso é... o que significa...! !"

1007603-46 = "Então... ah..."

1007603-51 = "……vinagre……."

1007603-52 = "desculpe……."

1007603-53 = "[s9] \"Eh, o que aconteceu!?\"\n[s10] \"Por que você está se desculpando!?\""

1007603-56 = "Bem, eu tentei o meu melhor para explicar do meu jeito..."

1007603-57 = "Por alguma razão, mesmo eu estando no meio da explicação, todos disseram: ``Entendo, parem agora!'' e foram embora..."

1007603-58 = "Ou parece que está resolvido... ou não..."

1007603-59 = "Aí, percebi isso mais tarde... #nEu estava deixando todo mundo desconfortável com meus hábitos habituais..."

1007603-60 = "Eca..."

1007603-61 = "Tentei ajudá-lo, mas falhei novamente. #nSinto muito...."

1007603-62 = "Só serei um incômodo se ficar mais tempo... Vou para casa agora..."

1007603-66 = "...?"

1007603-67 = "professor……? Por que você está assim...?"

1007603-68 = "[s11] \"Kotori! Fique aqui para sempre!\"\n[s12] \"Se você gosta de Kotori, quero que fique o tempo que quiser!!\""

1007603-71 = "Ah, sim! ? O que você quer dizer! ?"

1007603-72 = "Nossa, fui útil...! ? Mas mesmo sendo assim...?"

1007603-73 = "Bom, não consigo entender nada..."

1007603-74 = "...Sim! ?"

1007603-75 = "Mesmo até a minha próxima consulta... que diabos...?"

1007603-76 = "não! Claro, fico feliz em ouvir você dizer isso, mas...!"

1007603-77 = "Hum, hum, hum..."

1007603-78 = "...Então, vamos fazer isso."

1007603-79 = "Eu realmente não entendo, mas estou feliz em poder ajudar. #nAlém disso, desta vez não parece ser um gesto social!"

1007603-80 = "Bem, então――"

1007603-81 = "Continuarei dando o meu melhor! !"

1007603-83 = "(Depois, enquanto estava com Kotori, completei meu trabalho como se fosse invencível!)"

