[translation]
1007603-1 = "結果的には"
1007603-2 = "（押し寄せてきた運営業務を、無我夢中で片付けていたら……）"
1007603-4 = "いや、それはおかしいですよ！確かにグラウンドのこちら側へ#nキッチンカーを出店すると事前に連絡を……！"
1007603-5 = "私の参加種目がリレーになってる！？#nそんなはずありません！私は走り幅跳びの選手なのに！"
1007603-6 = "美味しい焼き鳥はいかがかな～？今ならたったの――"
1007603-7 = "って、あれ？私はどこまで来ちゃったんだろ？"
1007603-8 = "あ、あの……すみません……。#nレッドカードを無くしてしまって……予備はありますでしょうか……？"
1007603-9 = "えっ、ここって食堂じゃないの？ちぇっ、案内通りにきたのに……。#nじゃあご飯はどこで食べればいいんですか？"
1007603-13 = "お疲れ様でーす。電気交換に来ましたー"
1007603-14 = "……えっ、日付が違う？いや今日になってましたけど……。"
1007603-16 = "（ざわざわ……）"
1007603-17 = "（対応しないといけない人が多すぎて、休憩する暇もない……)"
1007603-18 = "[ns1] （こ、これは……想像以上だ……）\n[ns2] （覚悟はしていたけど、やっぱり大変だな……）"
1007603-21 = "ここにいらっしゃったんですね、先生！"
1007603-23 = "あれ、何だか顔色が悪いですよ？何かありましたか……？"
1007603-24 = "……ああ、休憩ですか！"
1007603-25 = "たしかに……これだけ対応が必要だと、なかなかここを離れられませんよね……。"
1007603-26 = "でしたら私が力になりましょう！#n簡単な事でしたらできますから！"
1007603-27 = "ふふん。こう見えても私、人の相手をするのは#n結構好きなんですよ！意外でした？"
1007603-28 = "[s3] \"うん、そんな気がしてたよ。\"\n[s4] \"じゃあ、少しの間お願いしてもいい？\""
1007603-29 = "えヘヘ……。"
1007603-30 = "とにかく、ここは安心して私に任せてください！"
1007603-31 = "はい、もちろんです！"
1007603-32 = "ゆっくり行ってきてくださいねー！"
1007603-33 = "[ns] 休憩に行ってくる。"
1007603-35 = "（……しばらくして）"
1007603-37 = "[ns5] \"ただいま、コトリ。\"\n[ns6] \"助かったよ、ありがとう。\""
1007603-41 = "[ns7] \"あれ……？\"\n[ns8] \"誰もいない……。\""
1007603-44 = "ああぁぁあああ！？"
1007603-45 = "あ、先生……。#nこ、これは、その……どういうことかと言いますと……！！"
1007603-46 = "だから……えっと……。"
1007603-51 = "……す……。"
1007603-52 = "すみません……。"
1007603-53 = "[s9] \"えっ、どうしたの！？\"\n[s10] \"なんで謝るの！？\""
1007603-56 = "じ、自分なりに、その、一生懸命説明したのですが……。"
1007603-57 = "どういうわけか皆さん、説明が途中なのに#n「わかったからもう止めて！」と言って帰ってしまい……。"
1007603-58 = "か、解決したような……してないような……。"
1007603-59 = "それから、後になって気付いたんです……。#nいつものクセで皆さんを不愉快にしてしまっていた事に……。"
1007603-60 = "うぅ……。"
1007603-61 = "お手伝いのつもりが、また失敗してしまいました。#n本当にすみません……。"
1007603-62 = "これ以上いても迷惑になるだけですし……もう帰りますね……。"
1007603-66 = "……？"
1007603-67 = "先生……？どうしてそんな顔を……。"
1007603-68 = "[s11] \"コトリ！ずっとここにいて！\"\n[s12] \"コトリがいいなら、いくらでもいてほしい！！\""
1007603-71 = "は、はいっ！？どういうことですか！？"
1007603-72 = "わ、私が役にたった……！？で、でもこんな状態なのに……？"
1007603-73 = "ぜ、全然理解できないのですが……。"
1007603-74 = "……えぇ！？"
1007603-75 = "次の予定まででも、なんて……一体どういう……？"
1007603-76 = "い、いえ！もちろん私としては、#nそう言っていただけるのは嬉しいのですけど……！"
1007603-77 = "ん、んん、んんんんん……。"
1007603-78 = "……で、では、そうします。"
1007603-79 = "よくわかりませんが、お役に立てるのは嬉しいので。#nそれに、今回は社交辞令でもないようですし！"
1007603-80 = "そ、それでは――"
1007603-81 = "引き続き頑張ります！！"
1007603-83 = "（その後、コトリと一緒にいる間は、無敵になったつもりで仕事を片付けた！）"
