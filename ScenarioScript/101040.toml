[translation]
101040-1 = "第4話;日常の亀裂（２）"
101040-2 = "アリウス自治区・某所"
101040-7 = "こ、こちらです……！見つけました！"
101040-11 = "サクラコ様、こちらに。"
101040-12 = "……なるほど、やはりここでしたか。"
101040-13 = "最後の聖徒会長が残した……「ユスティナ聖徒会の礼装」。"
101040-14 = "アリウスを弾圧しながらも、彼らの[ruby=エクソダス]トリニティ自治区外脱出[/ruby]を助け、復興を支援した、かの聖徒会長は――"
101040-15 = "後継者に渡るはずの礼装を……ここ、アリウス自治区に隠していたのですね。"
101040-16 = "……何故、これを手放したのですか？"
101040-17 = "後悔……それとも責任感ですか？#n……その後、ここで起きた悲劇を、あなたは――"
101040-18 = "――いえ、私がその理由を知る術はありませんね。"
101040-24 = "ユスティナ聖徒会の最後の意志は、シスターフッドの代表である私が……#n正当な継承権限をもって引き継ぎます。"
101040-25 = "……これ以上、ユスティナ聖徒会の権威が失墜するのを看過する事はできません。"
101040-32 = "さ、サクラコ様……！こちらに……！"
101040-33 = "分かりました。"
101040-35 = "こ、これを……。"
101040-36 = "これは……"
101040-39 = "……すぐにシスターフッドの司祭をここに。"
101040-40 = "は、はい……！"
101040-47 = "……。"
101040-48 = "アリウス自治区で、例のアレが起きていたとすれば……。"
101040-49 = "事態は思ったよりもずっと……深刻かもしれません。"
101040-51 = "トリニティ・議事堂"
101040-61 = "――では、[ruby=みたび]三度[/ruby]にわたって行われた本聴聞会により、ティーパーティーの[ruby=みその]聖園[/ruby]ミカに次の結論を下す。"
101040-62 = "……。"
101040-63 = "一つ、聖園ミカのティーパーティーとしての全権限を剥奪する。 "
101040-64 = "個人邸宅及び個人の活動費、特別校舎での授業など……#nティーパーティーとしてのすべての特権はこれより提供されない。"
101040-65 = "二つ、パテル分派内で行われた会議にて、#n聖園ミカのパテル分派における代表性について疑問が呈されたため、"
101040-66 = "パテル分派は固有の権限を行使し、新しい代表を選出する。#nただし、新しい代表が選出されるまでは聖園ミカの権限を維持する。"
101040-67 = "……。"
101040-68 = "三つ、聖園ミカの拘禁は現時間をもって終了とし、学業に復帰することを許可する。"
101040-69 = "ただし、己の立場を常に意識し、学業以外の自粛を求めるものとする。"
101040-70 = "以上、これが聴聞会によるトリニティ生の意見である。"
101040-75 = "聖園ミカ、異議があれば申し出るよう。"
101040-76 = "ううん、無いよ。"
101040-78 = "では最後に、何かあれば発言を。 "
101040-79 = "……。 "
101040-80 = "……与えられた機会に感謝し、決定に従います。"
101040-83 = "……では、これにて閉会。"
101040-90 = "補習授業部・教室"
101040-91 = "重大発表がある。"
101040-92 = "アズサちゃん……？"
101040-93 = "重大発表、ですか？"
101040-94 = "な、何？そんな怖い顔して……どうしたの。"
101040-98 = "みんなよく聞いてくれ。#nこの前、情報屋を通じて極秘情報を入手した……これは非常に重大な事件だ。"
101040-99 = "ご……極秘情報……？"
101040-100 = "情報屋？"
101040-101 = "重大な、事件……？"
101040-106 = "記録上にしか存在しない、伝説の――#n「ペロロジラ」のぬいぐるみがある場所を発見した。"
101040-107 = "……。"
101040-108 = "ペロロジラ……？"
101040-109 = "ああ。よく聞いてくれ、ペロロジラとは――"
101040-110 = "ペロロジラですか――！？ "
101040-111 = "アズサちゃん、それは本当ですか？ペロロジラのぬいぐるみって……輸送中に船が沈没してしまって、市場に流通される事がなかったという、伝説の……！？"
101040-112 = "その事件で、ぬいぐるみの下請け業者は破産してしまい……再販されることはなかったという、オーパーツみたいなものなのに！？#nそれが、存在してるってことですか！？"
101040-113 = "さすがですね、ヒフミちゃん。"
101040-114 = "ああ、さすがヒフミ。その通りだ。"
101040-115 = "今は消失してしまった商品だが……大量生産の前にデザイン監修用として作られたサンプルがあったとかで――"
101040-116 = "これまではコレクターの手に渡っていたのだが……最近、その内の1つが市場に出回ったそうだ。"
101040-117 = "な、なるほど……それなら確かに、あり得る話です。"
101040-118 = "で、ですが、それってお高いのでは……私の貯金じゃ……#nいえ、私たち4人のお金を合わせてもおそらく入手は難しいような…… "
101040-119 = "え！？私たち4人！？なんで！？"
101040-120 = "の、残された方法は……あ、あうう……#nやっぱり、手っ取り早いのは――"
101040-121 = "な、何でスマホを出すの？誰に連絡するつもり？#nやめて！とりあえずやめて！"
101040-122 = "あらあら♡ヒフミちゃん、本気の目をしていますね。"
101040-123 = "で、でも伝説のグッズを手に入れるためには……色々なものを犠牲にすることもやむなしでして……"
101040-124 = "何言ってんのヒフミ！しっかりして！！"
101040-128 = "いや……私はただ、一緒に見に行こうという話をしたかっただけなんだが…… "
101040-129 = "は、はい！？そ、そうだったんですか？#nあ、いえ、それが普通だとは……思いますが……"
101040-130 = "……必ず手に入れなければならないのか？"
101040-131 = "……分かった。ヒフミが望むのなら、そうしよう。"
101040-132 = "へっ！？"
101040-133 = "私はこの類の訓練は受けていないから、専門家に比べたら上手くないと思う……#nだが、なんとかなるはずだ。"
101040-134 = "え！？あ、いえ大丈夫ですアズサちゃん！#n私も目を覚ましたから、そこまでしなくても大丈夫です！ "
101040-135 = "……そ、そうか？"
101040-136 = "はい！見るだけで大丈夫です！#n伝説の「ペロロジラ」のぬいぐるみを見る事ができるなんて、幸せです！"
101040-137 = "そうか。なら、こうしてる時間がもったいないな。すぐに出発しよう。"
101040-144 = "はい！行きましょう！ "
101040-151 = "……。"
101040-152 = "うふふっ、いいですね。#n今日の補習はこれで■■ですね♡"
101040-157 = "……うう、何よそれ……。"
101040-158 = "ま、待って！置いてかないでよ！"
101040-166 = "怪しげな店"
101040-167 = "ここですか？"
101040-168 = "トリニティ郊外にこんな場所があったなんて…‥知りませんでした。"
101040-169 = "うぅ……私は何でここに……。"
101040-174 = "マスター、ここに例の物があると聞いた。"
101040-179 = "ふふ……やれやれ。あなたもまた、伝説の代物に惹かれてやってきたお客様ですか……"
101040-180 = "本来なら、一目見る事さえ叶わない逸品ですが……#nお客様方には、特別にお見せしましょう。"
101040-182 = "（ドキドキ）"
101040-183 = "（ごくり）"
101040-188 = "……！？"
101040-189 = "……あれ？#nこ、これは……"
101040-190 = "ふふふ、いかがでしょう？#nこれが、伝説のペロロジラ1/1000スケールぬいぐるみです！#n驚いて言葉も出ないでしょう？"
101040-191 = "これは……ペロロジラじゃない。"
101040-192 = "はい、これはペロロサウルスです。"
101040-193 = "な、何ですって！？"
101040-194 = "うーん……似たようなものじゃないんですか？"
101040-195 = "違います、全ッ然違います！"
101040-196 = "これだから素人は困る。"
101040-197 = "よく見てください！#nペロロジラは、もっとふくよかで、長い舌が特徴なんです。"
101040-201 = "そしてこれがペロロサウルス。#n服を着ているように見える、顔の描写がポイントです。"
101040-202 = "この2つは完全に異なるものだ。類似品ですらない。"
101040-204 = "そんな……！？#n闇市で大枚はたいて仕入れたのに、違うだと！？"
101040-206 = "トリニティ・第5ゲート"
101040-207 = "ペロロジラ……実物を見たかった……。"
101040-208 = "元気出してください、アズサちゃん……#nたとえペロロジラには会えなくても……私たちの心の中に生きています。"
101040-209 = "うふふ……お二人とも、元気を出してください。"
101040-210 = "あれ……？"
101040-213 = "聴聞会の判決を撤回せよ！ "
101040-214 = "裏切り者に情けなどいらない！"
101040-215 = "魔女を吊るし上げろ！！"
101040-219 = "み、皆さん発砲は禁止っす。空に向かって撃たないでください……#nあ、隣の人にも撃っちゃダメっす。"
101040-223 = "あれは……？"
101040-224 = "……聴聞会の判決に納得していない生徒たち、ですね。 "
101040-225 = "……なるほど。聖園ミカの処遇について反対する者か……。"
101040-226 = "もう何日目よ！まだ飽きないの？#nホントもういい加減にしてよね！"
101040-227 = "あう……でも、集会の自由というものもありまして……"
101040-228 = "……パテル分派代表の座が空席となり、その後に訪れる政治的混乱を利用しようとする勢力……"
101040-232 = "そして権威が失墜したティーパーティーの地位を狙う政治家…… "
101040-236 = "この状況を面白がり、便乗して石を投げる者……"
101040-237 = "ハナコちゃん……？"
101040-238 = "うふふ……結局、トリニティは毒蛇の巣窟という事です♡ "
101040-239 = "あ、あうう……。"
101040-240 = "……この先、ミカさんは険しい道を歩むでしょう。"
101040-242 = "た、たしかにやった事は悪いことかもしれないけど……#nなにもあんな風にしなくたって……"
101040-246 = "アズサちゃんは大丈夫ですか？"
101040-247 = "私は……"
101040-248 = "……ミカは、先生と一緒にアツコを助けたと聞いた。"
101040-249 = "それだけじゃない。#nサオリも、ヒヨリも、ミサキも――スクワッド全員を助けた、と。"
101040-250 = "……その事実がある以上、私がミカを憎む理由はない。"
101040-252 = "むしろ、こうして寄ってたかって一人を攻撃する状況の方が嫌だ。"
101040-253 = "だからといって、この人たちを攻撃しちゃダメですよ、アズサちゃん……。"
101040-254 = "分かってる……"
101040-255 = "……そうですね。#nここにいる方々も、アズサちゃんのような気持ちを持てたら良いのですが。"
101040-256 = "「赦しと慈悲を知らない私たちであったとしても――いつか救われる日が来るのでしょうか？」"
101040-257 = "それは私にも分からない。"
101040-258 = "だが、たとえどのような結末が待っていようと……"
101040-260 = "「努力しなければならない」……でしょ！"
101040-261 = "あら？コハルちゃん、よくご存じですね。"
101040-262 = "ま、まあね。アズサがいつも言ってるから覚えたの。"
101040-263 = "……ふふっ。さすがコハルちゃん、友達のことは知り尽くしているんですね♡"
101040-264 = "はっ！？わ、私は……！"
101040-265 = "ありがとう、コハル。私もコハルの事、もっと知りたい。"
101040-266 = "また今度、あの時みたいに一緒にお風呂に入ろう。"
101040-267 = "な、なっ……！？"
101040-268 = "あら♡私もそこに混ざっても？"
101040-269 = "あ、あんたはダメ！！あんたが混ざったら絶対変な事するでしょ！ダメ！禁止！"
101040-270 = "あ、あうぅ……。"
101040-277 = "結果を撤回しろ！あんな判決認めてなるものか！"
101040-278 = "裏切り者には罰を！"
101040-284 = "んん……一体、これは何事？"
101040-285 = "何これ！？アイリ、ちゃんと確認した？"
101040-286 = "えっ！？見てみるね……午後3時トリニティ第5裏門……#n限定ショコラアイスクリーム、先着100個販売……うん、ここで合ってるよ。"
101040-287 = "……アイスクリームトラックは見当たらないし、デモ中の生徒しかいないけど……"
101040-288 = "うーん……そうだ。#nそこのお嬢さんたち、ちょっと聞いてもいい？"
101040-289 = "何？あたしらの邪魔しないでほしいんだけど！"
101040-290 = "もしかして、あんたらミカの支持者！？"
101040-292 = "ミカ……？"
101040-293 = "支持……？"
101040-294 = "……何それ？"
101040-295 = "ミカ派じゃないならここで一緒にデモしない？#nあのムカつく聖園ミカが引きずり下ろされる様を見届けようよ！"
101040-296 = "あははっ！きっと胸がスカッとするよ！ "
101040-297 = "……理解した人ー？"
101040-298 = "（ふるふる）"
101040-299 = "（ふるふる）"
101040-300 = "あ、分かった！#n聖園ミカ様……！ティーパーティーの！"
101040-301 = "ティーパーティー？急にどうしたの？"
101040-302 = "今日はショコラアイスクリームじゃないの？"
101040-303 = "いや、そうじゃなくて……ティーパーティーは……"
101040-304 = "それって生徒会の？"
101040-305 = "え、どういうこと？ "
101040-306 = "カズサ、知ってた？"
101040-307 = "……いや。"
101040-308 = "やれやれ……学園のパンフレットも読んでないのかね君たちは。"
101040-309 = "うるさいナツ！あんたもどうせ、おやつタイムの事だと思ってた口でしょうが！"
101040-310 = "……。"
101040-311 = "図星じゃん。"
101040-312 = "と、とにかく！ "
101040-313 = "ティーパーティーには、ミカ様っていうすごく綺麗な人がいるんだけど……#nなんか、事件に巻き込まれちゃったらしくて……"
101040-314 = "ここ最近、デモも多いし……それが関係してるのかも？"
101040-315 = "そうなの……？ "
101040-316 = "あんま気にしたことなかったわ……"
101040-317 = "まぁ、あんまり生徒会に興味を持つ人はいないんじゃない？#n大体の人はこのデモもよく分かってないと思うし。"
101040-318 = "まぁね。だから、もっとたくさんの生徒に知ってもらうためにデモを起こしてるんじゃん！"
101040-319 = "そうそう！私も聖園ミカを見たことないけど、なんか面白そうだし！#nあはは！"
101040-325 = "……ところで、アイスクリームトラック見てない？#nここで限定販売の予定だったんだけど。"
101040-327 = "あ～、キッチンカーなら、デモの邪魔だから追い出したよ。"
101040-328 = "お、追い出した！？"
101040-329 = "その……どこに行ったかとか分かりますか？"
101040-330 = "そんなの知らないよ、ウザったいなぁ！#nデモに参加しないならどっか行って！邪魔！"
101040-334 = "きゃぁっ！？"
101040-339 = "……。"
101040-340 = "あ、ありがとう、カズサちゃん……。"
101040-341 = "ちょっとアンタ何よ！！"
101040-342 = "……君、うちのアイリを突き飛ばしたりした？"
101040-344 = "それなら何だって言うのよ？"
101040-345 = "……。"
101040-346 = "……。"
101040-347 = "あっ、私大丈夫だから……！カ、カズサちゃん、ナツちゃん、ヨシミちゃん！#n……そ、そんなに怒らなくても…… "
101040-348 = "カズサ。"
101040-349 = "うん。"
101040-350 = "人は糖分が不足すると、思考が明瞭にならないよね？"
101040-351 = "そうだね。"
101040-352 = "甘さとほろ苦さが共存するチョコレートは、まさに人生といえる……#nつまり、今から起こることは全部、チョコレートのせいなんだ。"
101040-353 = "どういうことか全然分かんないけど、チョコレートのせいね。分かった。"
101040-354 = "そういうこと……つまり――"
101040-361 = "……。"
101040-362 = "……。"
101040-363 = "……ん？"
101040-364 = "な、何……あんたら！"
101040-365 = "あ、あああ……。"
101040-366 = "うちのアイリに何すんのよ！！ "
101040-371 = "全部、チョコレートが悪い。"
101040-372 = "ただでさえ、うるさいのに、あんたらマナーもモラルもないの！？"
101040-373 = "よく見ておくんだ……これが糖分欠乏症に陥った、獣たちの危険性を証明したものだ、友よ。"
101040-374 = "み、みんな……！"
101040-375 = "あんた達何なのよ！"
101040-381 = "相手が増えたよ！ナツはあっちをお願い！"
101040-382 = "はいはい、任せて。"
101040-383 = "皆さん、デモ中に戦闘はダメっす……はぁ……終わった。"
101040-389 = "あ、あー聞こえますか。第5裏門で生徒たちのトラブル発生。#n至急支援を……いえ、いつものことなので3～4人くらいで……"
101040-393 = "た、戦わないでくださーい！"
101040-394 = "落ち着いてください！"
101040-396 = "ちっ、サツ――じゃなくて、正義実現委員会だよ！#nみんな走って！"
101040-401 = "逃げてアイリ！こっち！"
101040-402 = "あ、えっ、ちょっとみんな……！？"
101040-408 = "この戦いの果てには……そして私たちの未来には、一体何が待ち受けているのだろうか――それはおそらく、ショコラアイスクリームだろう。それでは……アディオス。"
101040-409 = "はやく走ってってば！"
101040-415 = "次回;日常の亀裂（３）"
