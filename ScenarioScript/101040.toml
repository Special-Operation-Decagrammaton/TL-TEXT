[translation]
101040-1 = "Episódio 4; Rachaduras no Cotidiano (2)"
101040-2 = "Em algum lugar do distrito autônomo de Arius"
101040-7 = "A-Aqui está...! Eu encontrei!"
101040-11 = "Por favor, por aqui, Sakurako-sama."
101040-12 = "......Entendo, estava aqui o tempo todo."
101040-13 = "Deixada pelo último líder da Sociedade dos Santos... 'O Manto Formal da Sociedade dos Santos Justina'."
101040-14 = "A líder da Sociedade dos Santos que outrora apoiou o Êxodo e a reconstrução de Arius, mesmo oprimindo-os na época――"
101040-15 = "Teria escondido o manto formal que deveria ter sido passado para o seu sucessor... aqui no distrito autônomo de Arius."
101040-16 = "......Mas por que será que ela os escondeu aqui?"
101040-17 = "Arrependimento... ou talvez um sentimento de responsabilidade?#n......E depois disso, será que as tragédias que ocorreram neste lugar, foram causadas por causa dela――"
101040-18 = "――Não, isso é algo que eu não tenho como saber."
101040-24 = "Eu, líder da Irmandade, e com a herança e autoridade que mereço...... irei levar adiante os últimos desejos da Sociedade dos Santos Justina."
101040-25 = "......Eu não vou permitir que a autoridade da Sociedade dos Santos Justina desmorone ainda mais."
101040-32 = "S-Sakurako-sama...! Tome isso...!"
101040-33 = "Entendido."
101040-35 = "A-Aqui está..."
101040-36 = "Isso é..."
101040-39 = "......Traga o Sacerdote da Irmandade até aqui, rápido."
101040-40 = "S-Sim...!"
101040-47 = "......"
101040-48 = "Se aquele incidente ocorreu no distrito autônomo de Arius..."
101040-49 = "A situação talvez seja muito mais grave... do que eu pensava."
101040-51 = "Trinity, Prédio do Conselho"
101040-61 = "――Portanto, com a terceira audiência sobre este caso, foi deliberado a seguinte decisão sobre a membra da Tea Party, Mika Misono."
101040-62 = "......"
101040-63 = "Primeiro, Mika Misono será destituída de todos os seus privilégios como membra da Tea Party."
101040-64 = "Direitos como a sua residência pessoal, orçamentos privados e o direito de assistir as aulas nas salas de aula especiais...#nTodos os privilégios como membra da Tea Party serão negados a partir deste momento."
101040-65 = "Segundo, após as discussões ocorridas em meio a facção Pater,#ndúvidas foram levantadas sobre a posição de Mika Misono em relação à liderança da facção Pater, logo,"
101040-66 = "A facção Pater exercerá seus direitos com as devidas autoridades e escolherá um novo líder.#nNo entanto, Mika Misono poderá manter seus privilégios até que um novo líder seja eleito."
101040-67 = "......"
101040-68 = "Terceiro, a prisão de Mika Misono terminará a partir deste momento, e ela está livre para retornar aos seus estudos."
101040-69 = "Todavia, espera-se que ela se comporte de forma exemplar e abstenha-se de qualquer coisa que fuja aos estudos."
101040-70 = "Com isso, essa é a opinião final dada pelas alunas da Trinity nesta audiência."
101040-75 = "Você tem alguma contestação, Mika Misono?"
101040-76 = "Não, nenhuma."
101040-78 = "Por fim, você pode dar o seu pronunciamento final se quiser."
101040-79 = "...... "
101040-80 = "......Obrigada por me permitirem a chance de falar; mas eu respeitarei a decisão."
101040-83 = "......Com isso, encerraremos a audiência."
101040-90 = "Sala do Clube de Reposição"
101040-91 = "Tenho um anúncio muito importante a fazer."
101040-92 = "Azusa-chan...?"
101040-93 = "Anúncio importante?"
101040-94 = "O-O que foi? É algo sério com essa cara... o que aconteceu."
101040-98 = "Ouçam com atenção. Um pouco mais cedo, consegui umas informações ultrassecretas do meu informante... isso é um incidente gravíssimo."
101040-99 = "In... Informações ultrassecretas...?"
101040-100 = "Informante?"
101040-101 = "Incidente, gravíssimo...?"
101040-106 = "Encontrei o lugar onde uma pelúcia de uma 'Perorozilla' que só existia nos registros, está localizada."
101040-107 = "......"
101040-108 = "Perorozilla...?"
101040-109 = "Sim. Pelo que eu soube, Perorozilla é――"
101040-110 = "P-Perorozilla――!? "
101040-111 = "A-Azusa-chan, isso é verdade mesmo? A lendária pelúcia do Perorozilla, cujo navio carregando-os afundou e assim nenhuma dessas pelúcias conseguiu chegar às lojas do mercado...!?"
101040-112 = "Até o fabricante de pelúcias terceirizado faliu por causa do incidente... e os estoques nunca foram repostos, por isso é como se fosse um OOPArts da vida real!?#nE isso existe mesmo no nosso mundo!?"
101040-113 = "Como o esperado de você, Hifumi-chan."
101040-114 = "Sim, como o esperado, Hifumi. Exatamente o que disse."
101040-115 = "Essa pelúcia é um produto que já desapareceu de nosso mercado... Mas parece que os modelos de amostra feitos para revisões do design da Perorozilla, que devia servir de exemplo para a produção em massa..."
101040-116 = "Tinham chegado às mãos de um colecionador por um longo tempo... mas eu soube que recentemente, um desses entrou no mercado negro."
101040-117 = "E-Entendo... Nesse caso, sim, parece crível."
101040-118 = "M-Mas, não seria extremamente caro... com as minhas economias...#nNão, até mesmo se as quatro de nós juntassemos tudo, acho que não ia dar... "
101040-119 = "Hã!? O que? As quatro? Por que!?"
101040-120 = "A, a nossa única forma de conseguir esse dinheiro... Au, auu...#nA forma mais rápida seria――"
101040-121 = "P-Por que cê tá puxando o celular? Pra quem você vai ligar?#nPara! Apenas para!"
101040-122 = "Puxa vida♡ Hifumi-chan tá com um olhar mortífero nos olhos."
101040-123 = "M-Mas, para ter em nossas mãos o lendário merchandise em questão... precisaremos estar prontas pra sacrificar certas coisas..."
101040-124 = "Masoquê Hifumi! Cai na real!!"
101040-128 = "Não... Eu só estava dizendo pra irmos todas ver aquilo... "
101040-129 = "H-Huh!? E-Entendi.#nA-Ah não, quer dizer, ver a pelúcia é a coisa normal a se fazer, mas..."
101040-130 = "......E tem mesmo a necessidade da gente comprar a pelúcia?"
101040-131 = "......Eu entendi. Se a Hifumi realmente quer, nós podemos fazer isso acontecer."
101040-132 = "Hã!?"
101040-133 = "Mesmo eu nunca tendo recebido treinamento em missões desse tipo, então aposto que ficarei pra trás dos especialistas...#nMas eu consigo dar meu jeitinho."
101040-134 = "O que!? N-Não, tudo bem Azusa-chan!#nEu também tô acordada agora, então não precisa se esforçar tanto! "
101040-135 = "......A-Ah, é mesmo?"
101040-136 = "Sim! Só de olhar já é o bastante!#nSó da gente ter a oportunidade de poder ver a lendária pelúcia do 'Perorozilla' na nossa frente com certeza trará pura benção e êxtase em nossos corações!"
101040-137 = "Certo. Não há tempo a perder. Vamos agora mesmo."
101040-144 = "Sim! Vamos!"
101040-151 = "......"
101040-152 = "Fufufu, esplêndido.#nParece que as atividades da reposição terminaram por hoje então♡"
101040-157 = "......Uuu, mas o que é tudo isso..."
101040-158 = "E-Espera! Não me deixem pra trás!"
101040-166 = "Uma Loja Suspeita"
101040-167 = "Aqui é o lugar?"
101040-168 = "Eu nem sabia que lugares como esse ficavam nos subúrbios da Trinity..."
101040-169 = "Uuu... Por que é que eu tô aqui..."
101040-174 = "Gerente, ouvi falar que vocês têm aquele item."
101040-179 = "Fufu... Vejam só. Vocês também são os clientes que vieram atrás do item que procuram..."
101040-180 = "Em tempos normais, ele é uma obra de arte que nenhum de vocês teriam a sorte de poder dar uma olhadinha...#nMas irei deixar que vejam especialmente essa belezura de obra de arte que é o Perorozilla."
101040-182 = "(Doki doki)"
101040-183 = "(Gulp)"
101040-188 = "......!?"
101040-189 = "......Hã?#nI-Isso é..."
101040-190 = "Fufufu, o que me dizem?#nEste é a lendária pelúcia da escala 1/1000 do Perorozilla!#nNão tem nem palavras do quão maravilhadas estão, né?"
101040-191 = "Isso não é... Perorozilla."
101040-192 = "Tem razão, isso aí é o Perorosaurus."
101040-193 = "Q-O que disse!?"
101040-194 = "Hummm... não seria a mesma coisa?"
101040-195 = "Claro que não! São completamente diferentes!"
101040-196 = "Novatos sempre arrumam jeito de dar problemas."
101040-197 = "Olhem bem para a pelúcia!#nPerorozilla é mais gordinho e é destacado pela longa língua pendurada."
101040-201 = "Enquanto o Perorosaurus é...#nA cara foi projetada para que parecesse estar usando roupas de dinossauros. Esse é o principal contraste."
101040-202 = "Eles são completamente diferentes. Nem se parecem em nada."
101040-204 = "Ah, fala sério!?#nVocê gastou uma fortuna para colocar essa coisa no mercado negro, e isso acaba não sendo a pelúcia certa!?"
101040-206 = "Trinity, 5º Portão"
101040-207 = "Perorozilla... eu queria poder ver de verdade com meus próprios olhos."
101040-208 = "Se anime, Azusa-chan...#nMesmo que nós não possamos ver a Perorozilla... Ela sempre viverá em nossos corações."
101040-209 = "Fufufu... O que me diz se nós todas relaxarmos juntas na cafeteria?"
101040-210 = "Huh...?"
101040-213 = "Reverta a decisão da audiência! "
101040-214 = "Traidores não merecem misericórdia!"
101040-215 = "Puna a Bruxa!"
101040-219 = "P-Pessoal, é estritamente proibido o uso de armas de fogo. Por favor, abstenham-se de atirar pro céu...#nE não atirem nas outras ao lado também."
101040-223 = "O que são aquelas...?"
101040-224 = "......Aparentemente, estudantes que não ficaram satisfeitas com o julgamento da audiência."
101040-225 = "......Entendi. Então elas são as que são contra o tratamento que vão dar à Mika Misono..."
101040-226 = "Há quantos dias já?! Será que nunca vão parar?#nFala sério, já deu o que tinha que dar!"
101040-227 = "Auu... M-mas, a gente precisa respeitar o direito de reunião delas..."
101040-228 = "......Como a líder de Pater deixou a sua cadeira livre, as forças políticas com certeza vão dar um jeitinho de usar o choque em seu favor..."
101040-232 = "Pior é que tem os políticos que ainda tem audácia de colocar a culpa na Tea Party por elas perderem sua autoridade..."
101040-236 = "E pra terminar de afundar as pessoas que só se aproveitam do momento, achando graça nisso..."
101040-237 = "Hanako-chan...?"
101040-238 = "Fufufu... Bom, como de costume. Trinity ainda é o covil de cobras venenosas que todos conhecemos♡ "
101040-239 = "A-Auu..."
101040-240 = "......Esse caminho não vai ser nada fácil pra Mika-san."
101040-242 = "P-Pode ser verdade que o que ela tenha feito foi terrível...#nMas também não precisava ir a tal ponto..."
101040-246 = "Você tá bem, Azusa-chan?"
101040-247 = "Eu tô..."
101040-248 = "......Fiquei sabendo que a Mika ajudou a resgatar a Atsuko junto com o Sensei."
101040-249 = "E não só isso.#nA Saori, a Hiyori, a Misaki――todas do Esquadrão, foram resgatadas."
101040-250 = "......Pelo fato disso ter sido verdade, eu não tenho motivo algum para odiar a Mika."
101040-252 = "Na verdade, me enoja ver as pessoas juntarem forças para atacar apenas uma pessoa assim."
101040-253 = "Apesar disso, você não devia ficar atacando-as assim, Azusa-chan..."
101040-254 = "Eu sei..."
101040-255 = "......Pois é.#nSeria tão maravilhoso se o restante dessas estudantes pudessem aceitar isso como a Azusa-chan faz."
101040-256 = "\"Mesmo não conhecendo o perdão e o perdão dos outros, haveria um momento no futuro em que seremos salvas?\""
101040-257 = "Eu também não sei isso."
101040-258 = "Mas, independente de como terminarmos..."
101040-260 = "Nós só precisamos continuar dando nosso melhor... certo!"
101040-261 = "Opa? Que interessante, Koharu-chan."
101040-262 = "N-Nossa. Eu só repeti o que a Azusa sempre me dizia pra que eu não esquecesse."
101040-263 = "......Fufu. A Koharu-chan conhece tão bem os amigos dela♡"
101040-264 = "Ha!? E-Eu...!"
101040-265 = "Obrigada, Koharu. Eu adoraria saber mais da Koharu também."
101040-266 = "Como daquela vez em que ficamos juntas dentro do banheiro."
101040-267 = "O-O-O quê...!?"
101040-268 = "Ai que maravilha♡ Será que eu posso entrar na brincadeira da próxima vez?"
101040-269 = "V-Você de jeito nenhum!! Se você se juntar, algo pervertido *com certeza* ia rolar! Nem pensar! Você tá barrada!"
101040-270 = "A-Auu..."
101040-277 = "Retirem os resultados! Nós nunca aprovaremos esse julgamento!"
101040-278 = "Punam as Traidoras!"
101040-284 = "Hmm... Mas o que tá acontecendo?"
101040-285 = "O que é isso!? Tem certeza que é isso, Airi?"
101040-286 = "Eh!? Bom, vou dar uma olhada e ver se... Perto das 3 da tarde, no 5º portão dos fundos de Trinity...#nUma sobremesa de sorvete de chocolate para as 100 primeiras estudantes em forma de vendas antecipadas... É, diz mesmo aqui."
101040-287 = "......Mas não tem nenhum caminhão de sorvete por perto, só essas estudantes protestando..."
101040-288 = "Humm... Ah!#nEi vocês, posso perguntar uma coisinha pra vocês?"
101040-289 = "O que foi? A gente só quer que não arrumem encrenca para não atrapalhar no nosso protesto!"
101040-290 = "A não ser que, vocês sejam partidárias da Mika!?"
101040-292 = "Mika...?"
101040-293 = "Partidária...?"
101040-294 = "......Que é isso?"
101040-295 = "Se vocês não são do lado da Mika, por que não juntam a nós no protesto?#nA gente vai trazer até de baixo daquela insuportável da Mika Misono que está rindo de nós agora mesmo!"
101040-296 = "Ahaha! Fazer protestos até que é ótimo pro estresse! "
101040-297 = "......Alguém tá entendendo alguma coisa?"
101040-298 = "(Acenam a cabeça negativamente)"
101040-299 = "(Acenam a cabeça negativamente)"
101040-300 = "Ah, entendi!#nMika Misono... A da Tea Party!"
101040-301 = "Tea Party? O que tem eles?"
101040-302 = "Hoje é o dia de comprar sorvete de chocolate, num é?"
101040-303 = "Mas, eu só pensei sobre isso... Que talvez a Tea Party..."
101040-304 = "É o Conselho Estudantil daqui?"
101040-305 = "Hã? Como assim? "
101040-306 = "Kazusa, você sabia?"
101040-307 = "......Nope."
101040-308 = "Oh, meu... Vocês duas podiam ao menos ter se dado ao trabalho de ter pelo menos lido o guia acadêmico do lugar que a gente estuda."
101040-309 = "Vê se cala a boca, Natsu! Cê não é tão santa pra falar o que eu tenho ou deixo de fazer se o assunto for nossa hora do lanche!"
101040-310 = "......"
101040-311 = "Na mosca."
101040-312 = "De todo modo! "
101040-313 = "A Mika que você tem na Tea Party, é uma pessoa com traços de beleza formidáveis, mas...#nParece que ela se meteu num caso bizarro..."
101040-314 = "Tem um monte de protesto ultimamente... Será que é por isso?"
101040-315 = "Sério...? "
101040-316 = "Eu nem sabia, de boas..."
101040-317 = "Bem, o Conselho Estudantil parece não dar a mínima pra o que as pessoas pensem delas também...#E a maioria de pessoas por aqui aposto que nem sabem do porquê de tá aqui pra começo de conversa."
101040-318 = "Pois é. É por isso que estamos protestando, pra poder alertar elas melhor!"
101040-319 = "É sim! Eu nunca vi a Mika Misono cara-a-cara, mas esse negócio com ela parece ter sido de estourar a barriga de rir!#nAhaha!"
101040-325 = "......Bom, e quanto o caminhão de sorvete, vocês o viram?#nAcontece que a gente tinha planejado dar uma chegada para o prêmio de edição limitada."
101040-327 = "A~h, um caminhão de comida de rua? A gente mandou ele pro olho da rua porque tava sendo um empecilho pra a gente."
101040-328 = "Vo... Vocês expulsaram o moço do caminhão!?"
101040-329 = "Uhm... Vocês sabem... por acaso onde ele pôde ter ido?"
101040-330 = "Olha só pra minha cara e vê se me importo? Vaza daqui!#nSe não se juntarem aos protestos vão pra casa de vocês! Ou debaixo da ponte se lá de onde diabos você quer ir, só saiam da minha frente!"
101040-334 = "Kyah!?"
101040-339 = "......"
101040-340 = "A-Ah, obrigada, Kazusa-chan..."
101040-341 = "Que cê pensa que você é!!"
101040-342 = "......Você, acabou de empurrar a Airi?"
101040-344 = "Isso não é lá da sua conta."
101040-345 = "......"
101040-346 = "......"
101040-347 = "Ah, Eu tô bem...! K-Kazusa-chan, Natsu-chan, Yoshimi-chan!#n...V-Vocês não precisam... se enfurecerem desse jeito..."
101040-348 = "Kazusa."
101040-349 = "Aham."
101040-350 = "Pessoas com menos açúcar no corpo, tendem a deixar o pensar lógico de lado e embaçado, não é mesmo?"
101040-351 = "Pois é."
101040-352 = "É a mistura do doce com o lado meio azedinho do chocolate no qual nós definimos o seu sabor como vida...#nEm outras palavras, tudo o que vai acontecer a partir de agora, é porque do chocolate."
101040-353 = "Isso num fez sentido para mim, mas o chocolate não faz mal e que nem essas idiotas que tentam achar quem o fez. Fato."
101040-354 = "Com tudo que isso dito e concluído...――"
101040-361 = "......"
101040-362 = "......"
101040-363 = "......Hum?"
101040-364 = "O q-que... você!!"
101040-365 = "A-Aah..."
101040-366 = "O que foi que cê acabou de fazer com a Airi!! "
101040-371 = "Tudo tem uma justificativa, o chocolate é uma delas."
101040-372 = "Vocês são tão incômodas e irritantes, que de verdade acho que as moralidades e maneiras já não valem de muita coisa para o que vejo no reflexo!?"
101040-373 = "Veja isso com seus olhos arregalados, meus camaradas... isso é como se fossem ver o quanto de perigo há numa alcateia sedenta de açúcar num nível bestial de ferocidade!"
101040-374 = "E-Ei...!"
101040-375 = "Quem você tá achando que é para falar assim comigo!"
101040-381 = "Pelo visto vão ter que ser na marra! A Natsu cuidará do outro lado pra nós!"
101040-382 = "É pra já. Pode deixar."
101040-383 = "Gente, lutas em protestos são estritamente proibidas, sabe... Haa... Tá tudo arruinado."
101040-389 = "Ah, ah- alô? Uma briga estourou entre as estudantes perto do 5º portão dos fundos.#nMudem as estratégias e procurem pedir r-reforços... não, é que tá rolando a mesma coisa lá, eu vou precisar de umas 3 a 4 na minha equipe..."
101040-393 = "P-Por favor, não entrem em combate!"
101040-394 = "Por favor, acalmem-se!"
101040-396 = "Tch! Ah, a polícia―― quer dizer, é as guardas do Comitê da Realização de Justiça!#nTodo mundo corre!"
101040-401 = "Vem com a gente, Airi! Por aqui!"
101040-402 = "A-Ah... E-Espera, ei, moças... !?"
101040-408 = "No fundo, nas profundezas da luta que vivemos... e em nossos futuros, o que nos espera mais à frente?――É muito provável que seja o tão aclamado sorvete de chocolate. Por ora, nos veremos em breve... *Adíos*."
101040-409 = "Anda, começa logo a se mexer e correr!"
101040-415 = "Próximo Episódio; Rachaduras no Cotidiano (3)"