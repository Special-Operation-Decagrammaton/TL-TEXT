[translation]
10023010-1 = "第1話;スーパーモモイトルネード！"
10023010-4 = "あっ！ミスった！"
10023010-5 = "落ち着いて、まだリカバー出来るよ！"
10023010-6 = "焦って強パンチしたって無駄無駄！#n見てから回避、余裕だよ！"
10023010-7 = "今こそ、あの必殺技を使うチャンス……！"
10023010-8 = "いっくよー！！！"
10023010-10 = "CD同時押しからの～！#nA、A、B、B、C、C、A、B、C、C、Cキャンセル！！！"
10023010-20 = "続けてっ！"
10023010-21 = "左、右、下！"
10023010-27 = "左、右、下プラスAB！"
10023010-36 = "――超必殺、スーパーモモイトルネード！！！"
10023010-51 = "（ドスッ！バタン！）"
10023010-52 = "「Player MOMORIA WIN！」"
10023010-55 = "はっはっはー！私の勝利だよ！"
10023010-56 = "長かった……本当に長い戦いだった……"
10023010-57 = "ミドリやユズ、アリス……そして先生にも負け続けてきた日々が……#nようやく報われる……"
10023010-58 = "もうそんな過去とはオサラバ！#nこれは後世に語り継がれる偉大な伝説の第一歩！"
10023010-59 = "そう、今日こそ「モモイ伝説」始まりの日！"
10023010-60 = "ねえ、今の子……もしかしてアレじゃない？"
10023010-61 = "まさか、噂の勝つまで続ける例の……？"
10023010-62 = "か、勝つまでじゃないもん！普段はそんなに……"
10023010-63 = "ほら、「勝つ」って言葉にすぐ反応したよ。"
10023010-64 = "噂通りだね……じゃあ、あの子が……"
10023010-65 = "えっ、もしかして私有名人だったり……！？"
10023010-66 = "「リトルタイラント」に違いない！"
10023010-70 = "ん……？"
10023010-71 = "誰、それ……？"
10023010-72 = "最近この辺のゲーセンで噂になってるよね！"
10023010-73 = "不利になったら、ひたすらレバガチャしてくるんだって！"
10023010-74 = "しかも自分が勝つまで再戦してくるし、離席しようとすると睨まれるとか……。#nでも台パンやリアルファイトはしないで、ちゃんとマナーは守ってるらしいよ。"
10023010-75 = "台パンもリアルファイトも普通はしないよ！？"
10023010-76 = "レバガチャは……"
10023010-77 = "それは……まあ、そうかもしれない……かな？"
10023010-78 = "ほらこれ……SNSに「リトルタイラントっぽい子が居る！」って投稿されてる！"
10023010-79 = "ホントだ……しかもここのゲーセンの写真だし、やっぱ本物だよね？"
10023010-80 = "え？え？#nな、何が起きてるの……？"
10023010-84 = "この人だかりは一体何なの！！！"
10023010-85 = "ほら、あれが「リトルタイラント」だって！"
10023010-86 = "は、早く行こう。#n目が合ったが最後、日が暮れても再戦要求され続けるって噂だよ……"
10023010-87 = "だから、その「リトルタイラント」って何！？"
10023010-88 = "私がそんな風に見えてたってこと！？#n私、ただの一般ゲーマーだよ！？"
10023010-89 = "おお、これはこれは……#nはじめまして、「リトルタイラント」様。"
10023010-93 = "だ、誰！？"
10023010-95 = "これは失礼。私は[ruby=どうだめいたろう]銅田明太郎[/ruby]と申します。#nどうぞ、お気軽に明太郎とお呼びください。"
10023010-96 = "早速ですが、「リトルタイラント」様。#n「あなた方」にお願いしたい依頼がございまして……。"
10023010-97 = "いや……そもそも私は……"
10023010-98 = "特別難しいものではありません。#nただの「お掃除」ですから……ね、簡単でしょう？"
10023010-99 = "お掃除……？"
10023010-100 = "ええ、「お掃除」です。#nもしや、ご都合が悪かったでしょうか？"
10023010-101 = "まあ、掃除くらいなら……でも、それなら誰でも良いんじゃないの？"
10023010-102 = "いえ、是非とも「リトルタイラント」様にお願いしたいのです。"
10023010-103 = "日時と場所は、"
10023010-104 = "こちらの封筒をご確認ください。"
10023010-105 = "ちょ、ちょっと待って！"
10023010-106 = "シッ、くれぐれもご内密に。それでは頼みましたよ。#n「リトルタイラント」様……"
10023010-108 = "いえ、C&Cの「[ruby=みかも]美甘[/ruby]ネル」様。"
10023010-114 = "……えっ！？"
10023010-116 = "……って事があったんだよね。"
10023010-117 = "……。"
10023010-121 = "……。"
10023010-122 = "？"
10023010-127 = "お姉ちゃん……"
10023010-128 = "な、何……？"
10023010-129 = "何でうちが、C&Cの依頼を受けなきゃいけないの？#nちゃんと「人違いです」って言った？"
10023010-130 = "わ、私だって言おうとしたんだよ！#nでも、一方的に話しかけられて、すぐどっか行っちゃったんだもん！"
10023010-134 = "アリス、分かりました！#nモモイが新しいクエストを受けたのですね！パンパカパーン！"
10023010-135 = "そ、それじゃあ……外に、出ないと……いけない……？"
10023010-137 = "ううっ……どうしよう！？#nごめんね、みんな……！"
10023010-138 = "あの時、私がはっきり断ってたら……うわーん！"
10023010-139 = "はあ……とりあえず、お姉ちゃん。#n依頼の内容が「掃除」っていうのは本当なの？"
10023010-140 = "うん、依頼してきた人が、何回も「掃除」って言ってたし。"
10023010-141 = "でも本当に「掃除」だったら……お姉ちゃんの言う通り、誰でも出来るはずだよね？"
10023010-142 = "なのに、わざわざC&Cに依頼するってことは、すごく広いお家とかなのかな……"
10023010-143 = "て、手伝ってくれるの、ミドリ！？"
10023010-144 = "……お姉ちゃん一人だと心配だからね。#nもう受けちゃったんだし、断って揉めるくらいなら、早く終わらせた方がいいし。"
10023010-145 = "だって、ネル先輩……C&Cのふりをして掃除するだけなんでしょ？"
10023010-146 = "うわ～～ん！#nお姉ちゃんは出来た妹を持って嬉しいよ！"
10023010-147 = "わ、分かったから離れて！"
10023010-151 = "掃除……外に……たくさんの人……知らない相手と、会話……#nうぅ、ううう……"
10023010-152 = "だ、大丈夫だよ、ユズ！#n私たちが一緒だから！"
10023010-153 = "怒り、破滅、腐食、絶望、虚脱……世界は今、破滅に向かって……"
10023010-154 = "「みんなでお掃除クエスト」ですね！"
10023010-155 = "そういうことだから、先生！手伝って！"
10023010-156 = "[s] \"え、私も！？\""
10023010-158 = "うん！先生が一緒に来てくれたら、私たちで届かないところも安心だし！"
10023010-159 = "依頼人に何か言われたら……臨時顧問ってことで！"
10023010-160 = "それに、そういう言い訳は、大人の先生なら上手かなって？"
10023010-161 = "[s] \"大人に対するモモイのイメージって……。\""
10023010-162 = "先生も一緒なんですか？それならアリスは何も怖くありません！#n士気が上昇した勇者は最強です！"
10023010-163 = "えっと……すみません……先生が一緒に居てくださると……#nわたしも少しは、勇気が出せそうです……。"
10023010-164 = "[s1] \"なら、一緒に頑張ろうか。\"\n[s2] \"生徒を見守るのは、先生の役割だからね。\""
10023010-165 = "やったー！ありがとう、先生！"
10023010-166 = "やったー！ありがとう、先生！"
10023010-167 = "それじゃあ、臨時顧問の先生に早速お願いがあるんだけど！"
10023010-168 = "[s3] \"どんなお願い？\"\n[s4] \"よし、何でも任せてよ！\""
10023010-169 = "メイド服を用意して！"
10023010-170 = "メイド服を用意して！"
10023010-171 = "[s] \"……え？\""
10023010-173 = "トキのオフィス"
10023010-175 = "[ns] \"……という事情がありまして。\""
10023010-176 = "そういうことでしたか、承知しました。"
10023010-177 = "[s] \"出来ればネルには内緒にしてもらえると……\""
10023010-178 = "私になら話しても大丈夫、と？"
10023010-179 = "[s] \"トキなら助けてくれると思って……ごめん。\""
10023010-180 = "……なるほど。"
10023010-181 = "ご安心ください。秘密はお守りいたしますので。"
10023010-182 = "[s] \"このお礼は、いつか必ず。\""
10023010-183 = "はい、楽しみにしております。"
