[translation]
10023010-1 = "Episódio 1; Super Momoi Tornado!"
10023010-4 = "Ah! Errei!"
10023010-5 = "Calma, ainda dá para recuperar!"
10023010-6 = "Não adianta nada se desesperar e usar um soco forte!#nEu vi o movimento e desviei, foi moleza!"
10023010-7 = "Agora é a hora de usar aquele golpe especial...!"
10023010-8 = "Lá vai!!!"
10023010-10 = "Apertando CD ao mesmo tempo e então...!#nA, A, B, B, C, C, A, B, C, C, C cancela!!!"
10023010-20 = "Continua!"
10023010-21 = "Esquerda, direita, baixo!"
10023010-27 = "Esquerda, direita, baixo mais AB!"
10023010-36 = "――Super Golpe, Super Momoi Tornado!!!"
10023010-51 = "（Pá! Tum!）"
10023010-52 = "「Player MOMORIA WIN！」"
10023010-55 = "Hahaha! Minha vitória!"
10023010-56 = "Foi longo... uma batalha realmente longa..."
10023010-57 = "Os dias em que continuei perdendo para a Midori, Yuzu, Alice... e até para o Sensei...#nfinalmente valeram a pena..."
10023010-58 = "Adeus ao passado!#nEste é o primeiro passo de uma grande lenda que será contada para as futuras gerações!"
10023010-59 = "Sim, hoje é o dia em que a \"Lenda da Momoi\" começa!"
10023010-60 = "Ei, aquela ali... não é ela?"
10023010-61 = "Não pode ser, aquela famosa que não para até ganhar...?"
10023010-62 = "E-eu não fico até ganhar! Normalmente eu não..."
10023010-63 = "Olha só, ela reagiu na hora à palavra \"ganhar\"."
10023010-64 = "É como dizem os boatos... então ela é..."
10023010-65 = "Hã? Será que eu sou uma celebridade...!?"
10023010-66 = "Com certeza é a \"Pequena Tirana\"!"
10023010-70 = "Hm...?"
10023010-71 = "Quem é essa...?"
10023010-72 = "Ela virou assunto nos fliperamas aqui da região ultimamente!"
10023010-73 = "Dizem que se ela fica em desvantagem, começa a apertar os botões freneticamente!"
10023010-74 = "E ela insiste na revanche até ganhar, e se você tentar sair, ela te encara...#nMas dizem que ela não dá soco na máquina nem briga de verdade, ela segue as regras de etiqueta."
10023010-75 = "Soco na máquina e briga de verdade são coisas que ninguém faz normalmente!?"
10023010-76 = "Apertar os botões freneticamente é..."
10023010-77 = "Isso... bem, talvez seja verdade...?"
10023010-78 = "Olha isso... postaram nas redes sociais: \"Tem uma garota que parece a Pequena Tirana aqui!\""
10023010-79 = "É verdade... e a foto é deste fliperama, então deve ser ela mesmo, né?"
10023010-80 = "Hã? Hã?#nO-o que está acontecendo...?"
10023010-84 = "O que é toda essa multidão!!!"
10023010-85 = "Olha, aquela é a \"Pequena Tirana\"!"
10023010-86 = "V-vamos embora logo.#nDizem que se você cruzar o olhar com ela, ela vai te pedir revanche até o sol se pôr..."
10023010-87 = "Por que vocês estão me chamando de \"Pequena Tirana\"!?"
10023010-88 = "Eu parecia ser esse tipo de pessoa!?#nEu sou só uma jogadora comum!?"
10023010-89 = "Ora, ora...#nPrazer em conhecê-la, \"Pequena Tirana\"."
10023010-93 = "Q-quem é você!?"
10023010-95 = "Perdoe a falta de educação. Meu nome é Meitarou Doudame.#nPor favor, sinta-se à vontade para me chamar de Meitarou."
10023010-96 = "Indo direto ao ponto, \"Pequena Tirana\".#nTenho um pedido para \"vocês\"..."
10023010-97 = "Não... antes de tudo, eu..."
10023010-98 = "Não é nada particularmente difícil.#nÉ apenas uma \"limpeza\"... veja bem, é simples, não é?"
10023010-99 = "Limpeza...?"
10023010-100 = "Sim, uma \"limpeza\".#nPor acaso, não é um bom momento para você?"
10023010-101 = "Bem, se for só uma limpeza... mas, nesse caso, qualquer um não serviria?"
10023010-102 = "Não, eu gostaria muito que a "Pequena Tirana" cuidasse disso."
10023010-103 = "Quanto à data, hora e local,"
10023010-104 = "por favor, verifique este envelope."
10023010-105 = "Ei, espere um pouco!"
10023010-106 = "Psiu, mantenha isso em segredo absoluto. Conto com você. #n"Pequena Tirana"..."
10023010-108 = "Não, a Neru Mikamo da C&C."
10023010-114 = "……Hã!?"
10023010-116 = "……Foi isso que aconteceu."
10023010-117 = "……."
10023010-121 = "……."
10023010-122 = "？"
10023010-127 = "Irmã..."
10023010-128 = "Q-que foi...?"
10023010-129 = "Por que a gente tem que aceitar um pedido da C&C? #nVocê disse claramente que era um engano?"
10023010-130 = "E-eu tentei dizer! #nMas a pessoa falou sem parar e foi embora rapidinho!"
10023010-134 = "Alice entendeu! #nMomoi aceitou uma nova missão! Pan-paka-pan!"
10023010-135 = "E-então... a gente vai ter que... sair...?"
10023010-137 = "Uuu... o que eu faço!? #nDesculpa, gente...!"
10023010-138 = "Se eu tivesse recusado na hora... buááá!"
10023010-139 = "Ai... enfim, irmã. #nÉ verdade que o conteúdo do pedido é "limpeza"?"
10023010-140 = "Sim, a pessoa que pediu falou "limpeza" várias vezes."
10023010-141 = "Mas se for só "limpeza"... como você disse, qualquer um deveria conseguir fazer, né?"
10023010-142 = "Mesmo assim, pedir especificamente para a C&C... será que é uma casa muito grande ou algo assim..."
10023010-143 = "V-você vai me ajudar, Midori!?"
10023010-144 = "……Fico preocupada se você for sozinha. #nJá que aceitamos, é melhor terminar logo do que recusar e criar confusão."
10023010-145 = "Afinal, é só limpar fingindo ser a Neru-senpai da C&C, né?"
10023010-146 = "Buááá! #nComo é bom ter uma irmã tão prestativa!"
10023010-147 = "J-já entendi, me solta!"
10023010-151 = "Limpeza... lá fora... muita gente... conversar com estranhos... #nUuu, uuuu..."
10023010-152 = "T-tá tudo bem, Yuzu! #nNós estamos com você!"
10023010-153 = "Ira, ruína, corrosão, desespero, colapso... o mundo está caminhando para a destruição..."
10023010-154 = "É a "Missão de Limpeza em Grupo"!"
10023010-155 = "É por isso, Sensei! Ajude a gente!"
10023010-156 = "[s] \"Ué, eu também!?\""
10023010-158 = "Sim! Se o Sensei vier com a gente, não precisaremos nos preocupar com os lugares que não alcançamos!"
10023010-159 = "Se o cliente perguntar alguma coisa... diremos que você é o consultor temporário!"
10023010-160 = "Além disso, um adulto como o Sensei deve ser bom com esse tipo de desculpa, né?"
10023010-161 = "[s] \"Essa é a imagem que a Momoi tem dos adultos...\""
10023010-162 = "O Sensei também vai? Então a Alice não tem medo de nada! #nUma heroína com o moral elevado é invencível!"
10023010-163 = "Bem... desculpe... se o Sensei estiver por perto... #neu também consigo criar um pouco de coragem..."
10023010-164 = "[s1] \"Então, vamos dar o nosso melhor juntos.\"\n[s2] \"Cuidar dos alunos é o papel do professor, afinal.\""
10023010-165 = "Eba! Obrigada, Sensei!"
10023010-166 = "Eba! Obrigada, Sensei!"
10023010-167 = "Então, já tenho um pedido para o nosso consultor temporário!"
10023010-168 = "[s3] \"Que pedido?\"\n[s4] \"Certo, pode deixar comigo!\""
10023010-169 = "Consiga uniformes de empregada para a gente!"
10023010-170 = "Consiga uniformes de empregada para a gente!"
10023010-171 = "[s] \"...Hã?\""
10023010-173 = "Escritório da Toki"
10023010-175 = "[ns] \"...E essa é a situação.\""
10023010-176 = "Entendo, compreendido."
10023010-177 = "[s] \"Se possível, gostaria que mantivesse isso em segredo da Neru...\""
10023010-178 = "Você acha que pode confiar em mim para contar isso?"
10023010-179 = "[s] \"Pensei que a Toki me ajudaria... desculpe.\""
10023010-180 = "……Entendo."
10023010-181 = "Fique tranquila. Guardarei o seu segredo."
10023010-182 = "[s] \"Eu retribuirei esse favor algum dia, com certeza.\""
10023010-183 = "Sim, estarei aguardando ansiosamente."
