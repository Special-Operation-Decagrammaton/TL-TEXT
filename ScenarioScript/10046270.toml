[translation]
10046270-3 = "あの……。"
10046270-5 = "あれ？役員の皆さんじゃないっすか。"
10046270-6 = "何かご用っすか？"
10046270-8 = "いえ、その逆です。私たちにも、何か手伝えることはないですか？"
10046270-9 = "ずっとお一人で……さぞ大変だったことでしょう。"
10046270-11 = "え？あー……お気持ちは嬉しいんすけど……。"
10046270-13 = "人手、全然足りていないのではなくて？"
10046270-14 = "あのナギサ様ですから、何かお考えがあるのでは……。"
10046270-15 = "でも、そのナギサ様は現場のことをあまりご存知ないのよ？"
10046270-16 = "それは、まあ……。"
10046270-17 = "あなたもそう思いませんか？"
10046270-19 = "わ、私っすか！？"
10046270-21 = "ええ、あのお方は毎度あの調子ですから……。"
10046270-22 = "現場のことをいちいち考えられる立場ではないのでしょうけれど……#nあんまりですよね～"
10046270-24 = "は、ははは……。"
10046270-26 = "とはいえ文句を言っていても始まりません。"
10046270-27 = "なので、手伝いに来たんです。"
10046270-29 = "実際、ちょうど困ってたんで、助かるっす。"
10046270-30 = "んじゃ、よろしくお願いするっす！"
