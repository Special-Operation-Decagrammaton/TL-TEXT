[translation]
1009303-1 = "強引なキララさん"
1009303-10 = "先生、はろはろぉ……。"
1009303-11 = "はぁ……。"
1009303-12 = "[ns1] \"テンションが低い……！？\"\n[ns2] \"こんな状態のキララ、初めて見た！？\""
1009303-18 = "あはは、そうだよねぇ……。"
1009303-19 = "テスト、全然ダメで……。"
1009303-20 = "成績は何でも良いんだけど、赤点は流石になーって思ってたのに……。"
1009303-21 = "ほんとにこうなっちゃうと、ちょっとショックかも……。"
1009303-22 = "[s] \"試験が難しかったの？\""
1009303-23 = "んー……問題の難易度っていうか……。"
1009303-24 = "テスト範囲、間違えちゃって……。"
1009303-25 = "[s] \"あちゃー……。\""
1009303-26 = "せっかくテスト前に、勉強会兼パジャマパーティーをしたのにー……。"
1009303-27 = "[s] \"楽しそうな響きだね。\""
1009303-28 = "確かに、たくさんお喋りはしてたよ？"
1009303-29 = "でもちゃんと勉強もしたのに……。"
1009303-30 = "まさか、テスト範囲を最初っから間違えるなんて……！"
1009303-31 = "[s] \"まぁ、そういうこともあるよね……。\""
1009303-32 = "で、赤点だったんだよね……超萎える～。"
1009303-33 = "とゆーわけで！"
1009303-34 = "勉強教えて！ね？追試来週なの。"
1009303-35 = "1人だと眠くなっちゃうし……。#nでもお友達呼んだら遊んじゃいそうだし……。"
1009303-36 = "もう先生しか頼れないの！助けて！"
1009303-37 = "[s3] \"わかった、手伝うよ。\"\n[s4] \"よし、任せて！\""
1009303-43 = "マジ感謝！ マジのマジで頑張るから！！"
1009303-45 = "（そしてシャーレの休憩室で、キララの個人授業を始めた……）"
1009303-53 = "あ、なるほど～！#nその公式使えば良かったんだ！"
1009303-54 = "えー、先生はなんで分かったの？"
1009303-55 = "[s] \"と、答案を見たから……。\""
1009303-56 = "えー、なにそれ！ずるーい！"
1009303-57 = "あははっ、冗談冗談！"
1009303-62 = "[ns] （……）"
1009303-63 = "こっちも教えて！#n一人で勉強するより、先生に教えてもらった方が頭に入る気がする♪"
1009303-64 = "えーっと？これは、図形を横に回して……？"
1009303-65 = "へー……わ、ほんとだ！"
1009303-69 = "すご！ヤバ！不っ思議～！"
1009303-70 = "あははっ！全然わかんなかった～。"
1009303-71 = "[s] （何だか、良い香りがする……）"
1009303-75 = "せんせー？"
1009303-76 = "[s] \"……うん？\""
1009303-78 = "先生の手、おっきいね？"
1009303-79 = "ちょっと貸して♪"
1009303-83 = "手のひらをこうやって合わせて……"
1009303-84 = "あれ、割と同じくらいだ！マジ！？"
1009303-85 = "あ、でも先生の手あったか～い♪"
1009303-86 = "[ns] （っ……！）"
1009303-90 = "どしたん、先生？そんな顔して、何かあった？"
1009303-91 = "あ、もしかして～……。"
1009303-92 = "UFOでも見たとか～？あははっ！"
1009303-93 = "[s] \"いや、その、ちょっと近いというか……。\""
1009303-94 = "え、なにが？追試の日程？"
1009303-95 = "[s5] \"い、いや、やっぱり大丈夫……。\"\n[s6] （キララは純粋にテスト勉強してるのに、私は何を……！）"
1009303-98 = "あははっ、そうだね。大丈夫大丈夫♪ちゃんと結果は出すよ！"
1009303-99 = "とゆーわけで、次の問題もお願い！！"
1009303-101 = "（追試対策はそのまま無事に終わったものの……）"
1009303-102 = "（平然とボディタッチをしてくるキララに振り回され、終わった頃にはこちらの方が疲労困憊だった）"
