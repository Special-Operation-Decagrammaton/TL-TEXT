[translation]
10023055-2 = "Ah, apesar desse visual estranho, você não é nada mal... impressionante."
10023055-3 = "Muito obrigada, ladrão. #nIsso é o suficiente, não é?"
10023055-4 = "— É \"Ladrão Fantasma\", senhorita."
10023055-18 = "!? Uma armadilha aqui...?"
10023055-26 = "Da próxima vez, é melhor prestar atenção onde pisa. #nSeria uma pena estragar essa dança."
10023055-30 = "!?"
10023055-31 = "— Eu não vou deixar!"
10023055-32 = "...Nós também vamos ajudar!"
10023055-34 = "Ora, que empregada adorável."
10023055-36 = "A-adorável, você disse?! Ehehe..."
10023055-37 = "Irmã! Não é hora de ficar feliz com isso!?"
10023055-38 = "Nós vamos... parar você aqui mesmo!"
10023055-39 = "Fufu... Que espírito admirável. #n...Mas, que pena."
10023055-45 = "...Deveria ter finalizado com o primeiro golpe."
10023055-46 = "Coragem imprudente é o que há de mais distante da estética, senhorita. #n— Afinal, você é fraca."
10023055-48 = "Pode até ser, mas...!"
10023055-50 = "Você não está enfrentando apenas a nós!"
10023055-51 = "...?"
10023055-55 = "Luz!"
10023055-60 = "Ugh...!?"
10023055-61 = "Obrigada, Alice!"
10023055-62 = "Hum... não causou danos aos arredores, né?"
10023055-63 = "Sim! Hoje a Alice é uma atacante de alvo único com atributo de luz! #nPor isso, concentrei todo o meu poder de fogo em um único alvo!"
10023055-65 = "...!"
10023055-66 = "...Você ainda consegue se mover."
10023055-75 = "— V-vou atirar...!"
10023055-76 = "Ugh!?"
10023055-82 = "Agora! Peguem ele!"
10023055-83 = "Certo, irmã!"
10023055-91 = "Uau!?"
10023055-92 = "Ahhh!"
10023055-93 = "O-o que está acontecendo!?"
10023055-94 = "Olhem, no teto!"
10023055-96 = "— Humm. Acho que vou retirar o que disse antes."
10023055-97 = "Vocês, senhoritas... parecem ter um talento considerável. #nQual o nome de vocês?"
10023055-99 = "Eu sou da C&C, codinome Zero-Four. Meu nome é Asuma Toki."
10023055-104 = "Humm... A C&C cooperando com Doda..."
10023055-105 = "Por que, exatamente?"
10023055-107 = "Com a recompensa da missão... eu estava pensando em comprar um novo PlayStation Pro 7..."
10023055-108 = "...Hum?"
10023055-109 = "Irmã! Você estava falando sério sobre comprar isso!?"
10023055-110 = "Não! Não é isso...! #nNós queremos proteger as obras de arte..."
10023055-111 = "— Do ladrão fantasma!"
10023055-115 = "..."
10023055-116 = "[ns] \"Por que você decidiu roubar as obras de arte...?\""
10023055-117 = "Você é..."
10023055-118 = "Ah... embora estivesse submerso nos sedimentos da minha memória, reconheço esse rosto."
10023055-119 = "— Você é o \"Sensei\" do Schale, não é?"
10023055-120 = "Aquele que pisou em Kivotos no dia memorável em que nós, os Sete Prisioneiros, fomos libertados da Agência Correcional..."
10023055-121 = "Entendo... Então era isso."
10023055-122 = "Sua "Ladra da Benevolência"! Uma vez que você se infiltrou nesta mansão, não será tão fácil sair!"
10023055-129 = "Ei, espere! Se atirar assim a esmo, vai acabar atingindo a gente também...!"
10023055-130 = "Ah...!?"
10023055-134 = "Midori!?"
10023055-137 = "(Hã...?)"
10023055-138 = "(Eu estou... caindo?)"
10023055-140 = "Fufu, você se machucou, jovem?"
10023055-146 = "...! A "Ladra da Benevolência" salvou a Midori!"
10023055-147 = "Midori, você se feriu!?"
10023055-148 = "N-não... estou bem. Mas por que a "Ladra da Benevolência" me ajudou...?"
10023055-149 = "(Por que será...?)"
10023055-153 = "Entendo, o palco desta noite promete ser interessante――"
10023055-154 = "Deixem-me dizer uma coisa a vocês, senhoritas. Ficar presas aos eventos superficiais é um sonho distante de conseguir discernir a essência das coisas."
10023055-155 = "――Bem, com licença. ...Embora eu ache que nos veremos novamente em breve. Até lá, bons sonhos. Bye!"
10023055-159 = "Ela fugiu!"
10023055-160 = "Irmã, olha isso!"
10023055-161 = "Diz aqui: \"O aviso não foi executado\"."
10023055-162 = "Humph, e pensar que estávamos a um passo de capturá-la!"
10023055-163 = "Desta vez não teve nenhum enigma... Quer dizer, será que ela carrega vários modelos diferentes por aí...?"
10023055-167 = "Senhoras e senhores... poderiam me explicar o que está acontecendo?"
10023055-168 = "O quê!? B-bem, é que...!"
10023055-169 = "[s] \"Foi tudo uma operação de distração que planejamos.\""
10023055-170 = "Sensei!"
10023055-171 = "Ho... poderia me dar mais detalhes?"
10023055-173 = "Entendo... então o plano era que o quinto membro se juntasse a vocês mais tarde."
10023055-174 = "Então quer dizer que a operação quase foi um sucesso."
10023055-175 = "[s] \"Pedimos desculpas, faltou apenas um passo...\""
10023055-176 = "Não peçam desculpas. Nada foi roubado, afinal... Além disso, a habilidade que demonstraram ao encurralar aquela "Ladra da Benevolência" é digna de admiração."
10023055-177 = "Embora ela tenha escapado... a competência de vocês deve ter ficado clara para a ladra. Talvez ela nunca mais apareça."
10023055-178 = "I-isso eu acho difícil, mas..."
10023055-180 = "Diga, Meitaro-san. O que é que está acontecendo aqui?"
10023055-181 = "Quem diria que a "Ladra da Benevolência" apareceria. Se eu soubesse de antemão, teria recusado..."
10023055-182 = "Vamos, pessoal, acalmem-se. A "Ladra da Benevolência" apareceu, mas algum problema real ocorreu?"
10023055-183 = "Como podem ver, nós repelimos a ladra. Não é verdade?"
10023055-184 = "E não é para menos. Quem está fazendo a segurança desta mansão é a famosa C&C!"
10023055-186 = "C&C... Já ouvi rumores. ...Dizem que são as agentes mais fortes de Millennium."
10023055-187 = "Se isso for verdade, faz sentido que tenham conseguido afugentar a ladra."
10023055-189 = "Agradeço a todos pela compreensão."
10023055-190 = "Por ora, parece melhor encerrarmos a festa de hoje. Vou levar os convidados até seus quartos, por aqui..."
10023055-194 = "Bem, o pessoal da C&C deve estar cansado, então descansem um pouco. Podemos discutir os planos futuros depois."
10023055-197 = "...(Q-que foi, por que ela está me encarando tanto!?)"
10023055-198 = "..."
10023055-199 = "(Sensei... a Toki está olhando para cá sem parar desde agora...)"
10023055-200 = "[ns] \"Bem... Toki, primeiro tente se acalmar...\""
10023055-201 = "N-não pense que fico com medo só porque você está me encarando assim!"
10023055-202 = "Além do mais, nós ajudamos vocês... acho que um agradecimento não faria mal!"
10023055-207 = "...Você tem razão."
10023055-208 = "Obrigada, pessoal do Departamento de Desenvolvimento de Jogos."
10023055-209 = "Hã, hã? Hããã?"
10023055-210 = "Ah...!"
10023055-214 = "Não, é um fato que você me ajudou, então...#nPeço desculpas pela demora em dizer isso."
10023055-215 = "E-então... por que você estava me encarando!?"
10023055-216 = "Eu não estou muito acostumada com esse tipo de situação...#nEntão eu não sabia como puxar assunto..."
10023055-217 = "Quer dizer que a Toki-san só estava olhando para cá porque não sabia o que dizer...?"
10023055-218 = "Sim. Obrigada por tomar a iniciativa, Momoi."
10023055-219 = "E, sobre o que faremos daqui para frente—"
10023055-221 = "Entendi. A missão da Toki-san era impedir a 'Ladra da Benevolência', não é..."
10023055-222 = "Sim, embora eu também esteja cumprindo outra missão ao mesmo tempo."
10023055-223 = "Aquele... você não vai contar para a Neru-senpai...#nque nós atrapalhamos a sua missão, vai?"
10023055-224 = "Não, eu não farei nada do tipo.#nPelo contrário, acho que o pessoal do Departamento de Desenvolvimento de Jogos está fazendo o seu melhor."
10023055-225 = "...É verdade.#nQue tal uma operação conjunta entre a C&C e o Departamento de Desenvolvimento de Jogos...?"
10023055-226 = "Isso... é realmente permitido?"
10023055-227 = "Está tudo bem. As veteranas não estão aqui."
10023055-228 = "Será que é esse o problema?"
10023055-230 = "Sim, é esse o problema."
10023055-231 = "Então, a Toki também vai se tornar nossa aliada?"
10023055-232 = "...?"
10023055-233 = "Alice quer formar um grupo com a Toki.#nQueremos resolver essa missão juntas!"
10023055-234 = "A-aliada... você diz?"
10023055-235 = "Não pode ser... mesmo?"
10023055-236 = "Não é isso, mas...#nalém disso... eu recusei outro dia..."
10023055-237 = "Está tudo bem. Aliados não são assustadores!#nEntão, a partir de agora, a Toki e o Departamento de Desenvolvimento de Jogos são aliados!"
10023055-238 = "Ah, obrigada. Por dizer isso..."
10023055-239 = "Tan-tan-tan! Toki entrou para o grupo!"
10023055-244 = "Hya!?"
10023055-245 = "O-o que você está fazendo...?"
10023055-249 = "...(faz carinho)"
10023055-250 = "(A cabeça dela está em uma posição perfeita para fazer carinho... De alguma forma, meu coração está ficando calmo...)"
10023055-255 = "...Será que vai dar certo?"
10023055-256 = "A Alice disse aquilo, então não precisa se preocupar."
10023055-258 = "Que bom para você, Alice-chan. E para a Toki-san também..."
10023055-260 = "(E assim, Toki tornou-se aliada do Departamento de Desenvolvimento de Jogos)"
10023055-261 = "(Felizes para sempr...)"
10023055-263 = "(Continua!)"
