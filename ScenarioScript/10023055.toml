[translation]
10023055-2 = "嗚呼、奇怪な格好なのになかなかどうして――やりますね。"
10023055-3 = "ありがとうございます、[ruby=・   ・   ・]泥棒様[/ruby]。#nこれでよろしいのでしょう？"
10023055-4 = "――「[ruby=・   ・]怪盗[/ruby]」ですよ、お嬢さん。"
10023055-18 = "！？こんなところに罠が……？"
10023055-26 = "次からは、足元にも気を配ったほうが良いですよ。#nせっかくのダンスが台無しになってしまいますから。"
10023055-30 = "！？"
10023055-31 = "――させないよ！"
10023055-32 = "……私たちも加勢します！"
10023055-34 = "おや、可愛いメイドさんですね。"
10023055-36 = "か、可愛いだって！えへへ……"
10023055-37 = "お姉ちゃん！喜んでる場合じゃないでしょ！？"
10023055-38 = "ここで私たちが……あなたを止めます！"
10023055-39 = "ふふ……その心意気も美しい。#n……でも、残念です。"
10023055-45 = "……最初の一撃で仕留めるべきでしたね。"
10023055-46 = "向こう見ずの勇気は美学から最も遠い存在ですよ、お嬢さん。#n――君は、弱いのだから。"
10023055-48 = "そうかも、しれないけど……！"
10023055-50 = "あなたの相手は、私たちだけではありません！"
10023055-51 = "……？"
10023055-55 = "光よ！"
10023055-60 = "くっ……！？"
10023055-61 = "ありがとう、アリス！"
10023055-62 = "えっと……周りに被害は出てないよね？"
10023055-63 = "はい！今日のアリスは光属性単体アタッカーです！#nですので、一つの目標に全ての火力を集中させています！"
10023055-65 = "……！"
10023055-66 = "……まだ動けるんですね。"
10023055-75 = "――う、撃ちます……！"
10023055-76 = "うっ！？"
10023055-82 = "今だ！捕まえて！"
10023055-83 = "うん、お姉ちゃん！"
10023055-91 = "うわっ！？"
10023055-92 = "きゃぁっ！"
10023055-93 = "ど、どうなってるの！？"
10023055-94 = "見て、天井に！"
10023055-96 = "――ふむ。先程までの言葉を撤回するとしましょう。"
10023055-97 = "お嬢さん方は――もう相当な実力をお持ちのようだ。#nお名前は？"
10023055-99 = "私はC&C所属、コールサインゼロフォー。[ruby=あすま]飛鳥馬[/ruby]トキと申します。"
10023055-104 = "ふむ――あのC&Cが[ruby=どうだ]銅田[/ruby]に協力とは……。"
10023055-105 = "一体、何故ですか？"
10023055-107 = "依頼の報酬で……新しいプライステーションPro7を買おうかなって……"
10023055-108 = "……うん？"
10023055-109 = "お姉ちゃん！本当に買うつもりだったの！？"
10023055-110 = "いや！そうじゃなくて……！#n私たちは美術品を――"
10023055-111 = "――怪盗から守りたくて！"
10023055-115 = "……"
10023055-116 = "[ns] \"どうして美術品を盗もうと思ったの……？\""
10023055-117 = "貴方は……"
10023055-118 = "嗚呼――記憶の澱に沈んでしまっていたけれど、その顔には見覚えがあります。"
10023055-119 = "――シャーレの「先生」、ですね？"
10023055-120 = "あの日――[ruby=わたくし] 私 [/ruby]たち七囚人が矯正局から解き放たれた記念すべき日に、キヴォトスに足を踏み入れたという――"
10023055-121 = "なるほど……そういう事でしたか。"
10023055-122 = "「慈愛の怪盗」め！#nこの屋敷に忍び込んだが最後、そう簡単には抜け出せんぞ！"
10023055-129 = "ちょ、ちょっと！そんな無差別に撃ったら、私たちまで……！"
10023055-130 = "あっ……！？"
10023055-134 = "ミドリ！？"
10023055-137 = "（えっ……？）"
10023055-138 = "（私、落ちてる……？）"
10023055-140 = "ふふっ、お怪我はありませんか？お嬢さん。"
10023055-146 = "……！「慈愛の怪盗」がミドリを助けてくれました！"
10023055-147 = "ミドリ、怪我は！？"
10023055-148 = "う、うん……大丈夫。#nでも、どうして「慈愛の怪盗」が私を……？"
10023055-149 = "（何でだろう……？）"
10023055-153 = "なるほど、今宵の舞台は面白くなりそうですね――"
10023055-154 = "一つ、お嬢さん方に伝えておきましょう。#n表面の事象に囚われていては、本質を見極める事など夢のまた夢ですよ。"
10023055-155 = "――それでは、これにて失礼。……そう遠からず、またお会いする事になるでしょうけれど。その時まで、良い夢を。bye！"
10023055-159 = "逃げた！"
10023055-160 = "お姉ちゃん、見てこれ！"
10023055-161 = "「予告は実行されておりません」だって。"
10023055-162 = "ふん、あと一歩で捕まるところだったくせに！"
10023055-163 = "今回は謎解き要素が無いね……#nというか、毎回いろんなパターンのヤツを持ち歩いてるのかな……。"
10023055-167 = "皆様……こちら、ご説明いただいても？"
10023055-168 = "わっ！？そ、それが……！"
10023055-169 = "[s] \"全て我々が計画した陽動作戦です。\""
10023055-170 = "先生！"
10023055-171 = "ほう……詳しくお伺いしても？"
10023055-173 = "なるほど……５人目のメンバーは遅れて合流する計画だった、と。"
10023055-174 = "作戦は成功しかけていたという事だったのですね。"
10023055-175 = "[s] \"申し訳ありません、あと一歩のところで……\""
10023055-176 = "謝らないでください。何も盗まれてなどいないのですから……それに、あの「慈愛の怪盗」をあそこまで追い詰めたその手腕、流石と言わざるを得ません。"
10023055-177 = "取り逃がしこそしましたが……皆様の実力は怪盗に伝わったはず。#nもう二度と現れないかもしれません。"
10023055-178 = "そ、それは流石に無いと思いますが……。"
10023055-180 = "あの、[ruby=めいたろう]明太郎[/ruby]さん。これは一体どういうことなんですか？"
10023055-181 = "まさか、「慈愛の怪盗」が現れるだなんて。#n事前に知っていたら、断っていたのに……"
10023055-182 = "さあさ皆様、落ち着いてください。#n「慈愛の怪盗」が来て、何か問題は発生しましたか？"
10023055-183 = "ご覧の通り、私たちは怪盗を退けました。#nそうですよね？"
10023055-184 = "それもそのはず。#nこの屋敷を警備しているのは、かの有名なC&Cなのですから！"
10023055-186 = "C&C……噂に聞いた事がある。#n……ミレニアム最強のエージェントだとか。"
10023055-187 = "それが本当なら、怪盗を追い払えたのも納得がいく。"
10023055-189 = "皆様、ご納得くださり、お礼を申し上げます。"
10023055-190 = "ひとまず今日のパーティーは、一度お開きにした方が良さそうですね。#nゲストの方々はお部屋までご案内いたしますので、こちらへ……"
10023055-194 = "では、C&Cの皆様もお疲れでしょうし、今日のところはごゆるりと。#n今後の計画は、それからでも構いません。"
10023055-197 = "……（な、なに、めっちゃ睨まれてるけど！？）"
10023055-198 = "……"
10023055-199 = "（先生……さっきからトキさんがこっちをずっと見ているんですが……）"
10023055-200 = "[ns] \"えっと……トキ、まずは落ち着いて……\""
10023055-201 = "そ、そんな風に睨まれたって、全然怖くないんだからね！"
10023055-202 = "というか、協力したんだし……感謝の言葉くらいあってもいいんじゃないかな！"
10023055-207 = "……そうですね。"
10023055-208 = "ありがとうございます、ゲーム開発部の皆さん。"
10023055-209 = "え、え？ええっ？"
10023055-210 = "えっ……！"
10023055-214 = "いえ、助けていただいたのは事実ですので……#n伝えるのが遅くなり申し訳ありません。"
10023055-215 = "じゃ、じゃあ……なんで睨んでたの！？"
10023055-216 = "あまりこういった事態に慣れておりませんので……#nどのように話を切り出せばいいのか、分からず……"
10023055-217 = "つまり、トキさんは何を言えば良いのか分からなくて、こっちを見ていただけって事ですか……？"
10023055-218 = "はい。先に話を切り出してくださり、ありがとうございます、モモイ。"
10023055-219 = "そして、今後のことなのですが――"
10023055-221 = "なるほど。トキさんの任務は、「慈愛の怪盗」を阻止することだったんですね……"
10023055-222 = "はい、同時に別の任務も遂行中ではありますが。"
10023055-223 = "その……私たちが任務の足を引っ張った、とか……#nネル先輩に言ったりしないよね？"
10023055-224 = "いえ、そのような事はいたしません。#nむしろ、ゲーム開発部の皆さんは最善を尽くしているかと。"
10023055-225 = "……そうですね。#nここは一つ、C&Cとゲーム開発部の合同作戦……というのはどうでしょう。"
10023055-226 = "その……本当に良いんですか？"
10023055-227 = "大丈夫です。先輩方は居ませんし。"
10023055-228 = "そういう問題なのかな？"
10023055-230 = "ええ、そういう問題です。"
10023055-231 = "それでは、トキも仲間になるんですね？"
10023055-232 = "……？"
10023055-233 = "アリスはトキとパーティーを組みたいです。#n一緒にこのクエストを解決したいです！"
10023055-234 = "な、仲間……ですか？"
10023055-235 = "やっぱり、ダメですか……？"
10023055-236 = "そういうわけではありませんが……#nそれに……先日、断ったりもしましたし……"
10023055-237 = "大丈夫です。仲間は怖くありません！#nそれでは、今からトキとゲーム開発部は、仲間です！"
10023055-238 = "あ、ありがとうございます。そう言って、くださって……"
10023055-239 = "パンパカパーン！トキがパーティーに加わりました！"
10023055-244 = "ひゃっ！？"
10023055-245 = "い、いったい何を……？"
10023055-249 = "……（なでなで）"
10023055-250 = "（ちょうど良い位置に頭があって撫でやすいですね……なんだか、心が穏やかに……）"
10023055-255 = "……大丈夫かな。"
10023055-256 = "アリスもああ言ってるし、心配いらないよ。"
10023055-258 = "良かったね、アリスちゃん。トキさんも……"
10023055-260 = "（そうして、トキはゲーム開発部の仲間になった）"
10023055-261 = "（めでたし、めでた……）"
10023055-263 = "（続く！）"
