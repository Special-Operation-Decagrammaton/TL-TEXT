[translation]
1001605-1 = "初回限定盤ですよ、先生"
1001605-2 = "ミレニアム・電気街「春葉原」"
1001605-3 = "（事前にミドリと約束した場所に向かうと、そこは身動きが取れないほど大勢の人でごった返していた）"
1001605-4 = "[ns1] \"わぁー……すごい人の数。\"\n[ns2] \"ゲームを愛する人がこんなにもたくさん……。\""
1001605-5 = "先生、気を付けてください！ボーっとしてたら迷子になってしまいますよ！"
1001605-6 = "先生、気を付けてください！ボーっとしてたら迷子になってしまいますよ！"
1001605-7 = "[s3] \"本当に迷子になりそうなくらいだね……。\"\n[s4] \"ゲーム発売に合わせて、イベントでもやってるの？\""
1001605-8 = "今日発売されるゲームは、ただの新作ではありません。"
1001605-9 = "今日発売されるゲームは、ただの新作ではありません。"
1001605-10 = "なんと、十数年も前に出た伝説的な名作、当時の評論サイトでも審査員全員が満点を付けたことで有名なゲーム……"
1001605-11 = "あの『ゼルナの伝説』の新作なんですから！"
1001605-12 = "数多くのゲーマーはもちろん、コレクターの人たちなど、多くの人が今回の初回限定版特典を狙っています。"
1001605-13 = "私たちは今、その獲物を我先に勝ち取らんとする狩人……。"
1001605-14 = "いえ、戦士となり、この戦いに臨まなくてはいけません！場合によっては発砲も許可します！"
1001605-15 = "[s] \"ゲームを、買いに来たんだよね……？\""
1001605-16 = "ゲームの発売開始時刻は、今から1時間後。"
1001605-17 = "物理的に訪問できるお店の数が限られる以上、どんなルートでお店を回るか、戦略的に判断する必要があります。"
1001605-18 = "[s] \"ミドリがいつも以上に頼もしい……。\""
1001605-19 = "もちろんです、今日という今日を待ちわびていたんですから！"
1001605-20 = "さあ、こうしている場合ではありません。先生、クエストを始めましょう！"
1001605-22 = "王道的観点から様々のルートを考慮した結果、まず最初に選んだのはここ、大型家電量販店です。"
1001605-23 = "一番規模が大きいので、数も一番多く入荷されるはず。ここで手に入れられればベスト……！"
1001605-24 = "[ns] \"あっ、でもミドリ、これを見て。\""
1001605-28 = "品切れの、お知らせ……？"
1001605-29 = "「本日入荷予定の『ゼルナの伝説』の新作はすべて売り切れました」？"
1001605-30 = "フ、フ、フラゲ！？"
1001605-31 = "発売日前に全部売り切れですか！？"
1001605-32 = "[s5] \"みんなの執念が凄い……。\"\n[s6] \"開場前に完売……。\""
1001605-33 = "こ、これは通報ものですよ！……いえ、それより今は、ここに無いならすぐにでも他のところに探しに行かないとです！"
1001605-34 = "こ、これは通報ものですよ！……いえ、それより今は、ここに無いならすぐにでも他のところに探しに行かないとです！"
1001605-35 = "先生、走りましょう！"
1001605-47 = "はあ、はあ……見つからない……。"
1001605-48 = "[s] \"もしかしてこれ、もうどこにも無いんじゃ……。\""
1001605-49 = "いえ、まだです、まだ分かりません！"
1001605-50 = "今日のこの日をずっと待っていたんです。このまま、諦めるわけにはいきません。"
1001605-51 = "最後に、まだ一か所……！"
1001605-53 = "ここが最後です、ここにもなかったら……。"
1001605-54 = "あ……"
1001605-55 = "せ、先生！ありました、新作『ゼルナの伝説』の初回限定盤！"
1001605-56 = "[s7] \"良かった……！\"\n[s8] \"何とか無事に……。\""
1001605-57 = "あっ、見つけた！『ゼルナの伝説』最後の一つ！"
1001605-58 = "あっ、見つけた！『ゼルナの伝説』最後の一つ！"
1001605-59 = "あっ……。"
1001605-60 = "[s] \"ミドリ……。\""
1001605-62 = "……。"
1001605-63 = "店員さん！これください！"
1001605-64 = "[s9] \"……大丈夫？\"\n[s10] \"ミドリも一日中探し回ったのに……。\""
1001605-65 = "はい……私も絶対やりたいとは思っていましたが……。"
1001605-66 = "はい……私も絶対やりたいとは思っていましたが……。"
1001605-67 = "あの笑顔に、水を差すことなんてできません。ゲームというのは、楽しくプレイしてもらうべきものですから。"
1001605-68 = "だから、私は大丈夫です、先生。"
1001605-71 = "（なんて、大人なふりをしてみたけど……やっぱりやりたかったぁっ！うわあぁん……！）"
1001605-73 = "（次の日、プレゼントを持ってゲーム開発部の部室を訪れた）"
1001605-74 = "あれ？先生、どうしたんですか？"
1001605-75 = "[s] \"ミドリ、これプレゼント。\""
1001605-76 = "これは……。"
1001605-77 = "『ゼルナの伝説』、初回限定盤……！"
1001605-78 = "ど、どうしてこれを！？"
1001605-79 = "[s11] \"たまたまね。\"\n[s12] \"あちこち探し回ってみたら、見つかったから。\""
1001605-82 = "[s] \"ルール内での徹夜は大人の特権、ってことで。\""
1001605-83 = "これが、徹夜のできる大人……！"
1001605-84 = "……先生、私のために……。"
1001605-85 = "[s] \"ミドリ？\""
1001605-86 = "い、いえ、なんでもありません、先生。"
1001605-87 = "本当に嬉しいです……プレゼント、ありがとうございます！先生！"
