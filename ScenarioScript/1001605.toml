[translation]
1001605-1 = "É a edição limitada, Sensei."
1001605-2 = "Cidade Eletrônica de Millennium, 'Akihabara da Primavera'"
1001605-3 = "（Ao chegar no local combinado previamente com Midori, o lugar estava tão lotado de gente que mal dava para se mover）"
1001605-4 = "[ns1] \"Uau... quanta gente.\"\n[ns2] \"Tantas pessoas que amam jogos assim...\""
1001605-5 = "Sensei, tome cuidado! Se ficar distraído, vai acabar se perdendo!"
1001605-6 = "Sensei, tome cuidado! Se ficar distraído, vai acabar se perdendo!"
1001605-7 = "[s3] \"É quase como se fosse fácil se perder mesmo...\"\n[s4] \"Tem algum evento acontecendo por causa do lançamento do jogo?\""
1001605-8 = "O jogo que será lançado hoje não é apenas um lançamento comum."
1001605-9 = "O jogo que será lançado hoje não é apenas um lançamento comum."
1001605-10 = "É nada menos que uma obra-prima lendária lançada há mais de dez anos, um jogo famoso por ter recebido nota máxima de todos os jurados nos sites de crítica da época..."
1001605-11 = "É o novo jogo da série 'Lenda de Zelna'!"
1001605-12 = "Muitos jogadores, é claro, além de colecionadores, estão de olho nos brindes desta edição limitada."
1001605-13 = "Nós somos agora caçadores tentando capturar essa presa antes de qualquer um..."
1001605-14 = "Não, temos que nos tornar guerreiros e enfrentar esta batalha! Em alguns casos, até o uso de armas está autorizado!"
1001605-15 = "[s] \"Nós viemos aqui para comprar um jogo, não foi...?\""
1001605-16 = "O horário de início das vendas do jogo é daqui a uma hora."
1001605-17 = "Como o número de lojas que podemos visitar fisicamente é limitado, precisamos decidir estrategicamente qual rota seguir."
1001605-18 = "[s] \"A Midori está mais confiável do que nunca...\""
1001605-19 = "Claro, afinal, eu estava esperando por este dia!"
1001605-20 = "Vamos lá, não temos tempo a perder. Sensei, vamos começar a missão!"
1001605-22 = "Após considerar várias rotas sob uma perspectiva lógica, o primeiro lugar que escolhi foi esta grande loja de eletrônicos."
1001605-23 = "Como é a maior, deve ser onde receberão o maior estoque. Se conseguirmos aqui, será o ideal...!"
1001605-24 = "[ns] \"Ah, mas Midori, olhe isso.\""
1001605-28 = "Um aviso de esgotado...?"
1001605-29 = "'Todas as unidades do novo jogo 'Lenda de Zelna' previstas para hoje já foram vendidas'?"
1001605-30 = "V-v-venda antecipada!?"
1001605-31 = "Esgotou tudo antes mesmo do dia do lançamento!?"
1001605-32 = "[s5] \"A determinação de todo mundo é incrível...\"\n[s6] \"Esgotou antes da abertura...\""
1001605-33 = "I-isso é caso de denúncia! ...Não, esqueça, agora precisamos ir procurar em outro lugar imediatamente se não tem aqui!"
1001605-34 = "I-isso é caso de denúncia! ...Não, esqueça, agora precisamos ir procurar em outro lugar imediatamente se não tem aqui!"
1001605-35 = "Sensei, vamos correr!"
1001605-47 = "Haa, haa... não encontramos..."
1001605-48 = "[s] \"Será que não tem mais em lugar nenhum...?\""
1001605-49 = "Não, ainda não, ainda não sabemos!"
1001605-50 = "Eu esperei por este dia por muito tempo. Não posso desistir assim."
1001605-51 = "Por último, ainda tem um lugar...!"
1001605-53 = "Este é o último lugar, se não tiver aqui também..."
1001605-54 = "Ah..."
1001605-55 = "S-Sensei! Encontramos, a edição limitada do novo 'Lenda de Zelna'!"
1001605-56 = "[s7] \"Que bom...!\"\n[s8] \"Conseguimos, sem problemas...\""
1001605-57 = "Ah, achei! O último exemplar de 'Lenda de Zelna'!"
1001605-58 = "Ah, achei! O último exemplar de 'Lenda de Zelna'!"
1001605-59 = "Ah..."
1001605-60 = "[s] \"Midori...\""
1001605-62 = "..."
1001605-63 = "Atendente! Por favor, me dê este!"
1001605-64 = "[s9] \"...Você está bem?\"\n[s10] \"Mesmo depois de a Midori ter procurado o dia todo...\""
1001605-65 = "Sim... eu também queria muito jogar, mas..."
1001605-66 = "Sim... eu também queria muito jogar, mas..."
1001605-67 = "Não posso estragar aquele sorriso. Jogos devem ser algo para se aproveitar com alegria."
1001605-68 = "Por isso, eu estou bem, Sensei."
1001605-71 = "（Eu tentei agir como uma adulta, mas... no fundo, eu queria tanto ter feito isso! Uwaaaa...！）"
1001605-73 = "（No dia seguinte, visitei a sala do Departamento de Desenvolvimento de Jogos levando um presente）"
1001605-74 = "Ué? Sensei, o que houve?"
1001605-75 = "[s] \"Midori, isto é um presente.\""
1001605-76 = "Isto é..."
1001605-77 = "A edição limitada de 'A Lenda de Zelna'...!"
1001605-78 = "Po-por que você conseguiu isso!?"
1001605-79 = "[s11] \"Foi por acaso.\"\n[s12] \"Eu procurei em vários lugares e acabei encontrando.\""
1001605-82 = "[s] \"Digamos que virar a noite dentro das regras é um privilégio de adulto.\""
1001605-83 = "Isso é... um adulto que pode virar a noite...!"
1001605-84 = "......Sensei, por minha causa..."
1001605-85 = "[s] \"Midori?\""
1001605-86 = "N-não, não é nada, Sensei."
1001605-87 = "Estou muito feliz... obrigada pelo presente, Sensei!"
