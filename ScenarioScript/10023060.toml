[translation]
10023060-1 = "Episódio 6; Primeiro, vamos seguir em frente"
10023060-2 = "（O primeiro dia agitado passou e o segundo dia começou）"
10023060-6 = "Esta é a pintura que será leiloada amanhã? #n……Eu pretendo participar, e você?"
10023060-7 = "Acha mesmo que eu fugiria sozinha por medo do \"Ladrão Fantasma da Benevolência\"?"
10023060-12 = "[ns] （Apesar da confusão de ontem, não parece que o número de participantes diminuiu）"
10023060-21 = "Ufa... estou cansada."
10023060-22 = "[s] \"Bom trabalho, Momoi.\""
10023060-23 = "Obrigada, Sensei... #nChegando até aqui, sinto que quero ir até o fim, nem que seja por teimosia!"
10023060-24 = "Mas... Sensei, me desculpa."
10023060-25 = "Por minha causa, você acabou se envolvendo nessa confusão."
10023060-26 = "[s] \"Está tudo bem. Na verdade, estou me divertindo por estar com vocês.\""
10023060-27 = "……Sério? Você não vai se arrepender de ter dito isso?"
10023060-28 = "Se você diz algo assim... quando algo parecido acontecer de novo, eu vou te chamar de novo, viu!"
10023060-29 = "[s] \"Sim, pode me chamar a qualquer momento.\""
10023060-34 = "!!!"
10023060-35 = "[ns] \"Momoi...!\""
10023060-36 = "I-Isso é!"
10023060-37 = "Vamos manter a calma. #nOuvi dizer que o \"Ladrão Fantasma da Benevolência\" nunca faz nada para ferir as pessoas."
10023060-38 = "De fato, foi assim ontem também. #nSendo assim, vamos aproveitar o \"evento\" ao máximo."
10023060-39 = "Sinto muito pelo estresse do Meitaro... #nmas, se pensarmos nisso como um entretenimento extra do leilão, é um bom tempero."
10023060-46 = "Surpreendentemente, ninguém parece abalado. Será porque foi logo depois de ontem?"
10023060-47 = "Então nós também..."
10023060-48 = "[s] \"Sim, conforme o combinado.\""
10023060-50 = "Deixem a pintura comigo. Vou movê-la para um lugar seguro."
10023060-51 = "Nós vamos para o andar de cima!"
10023060-57 = "Alice vai se preparar no saguão central para atirar onde quer que o \"Ladrão Fantasma\" apareça!"
10023060-58 = "E-Eu vou me esconder... e observar a situação..."
10023060-59 = "[s] \"Pessoal, vamos dar o nosso melhor!\""
10023060-63 = "……"
10023060-64 = "……"
10023060-66 = "……"
10023060-68 = "Por que nada está acontecendo!?"
10023060-73 = "（Nesse momento, uma esfera transparente rolou até os pés）"
10023060-74 = "（Ao estender a mão como se fosse atraída por ela...）"
10023060-78 = "Saudações, minha voz está chegando até você?"
10023060-79 = "[s] \"Quem é...?\""
10023060-81 = "Este é um dos meus apetrechos. Tenho algo que preciso lhe contar em segredo... #nReduzi o volume para que não ouçam ao redor, então, por favor, concentre-se."
10023060-82 = "[s] \"Você, por acaso, é...?\""
10023060-83 = "Ah, deixaremos as apresentações para outra oportunidade."
10023060-84 = "Não nos resta muito tempo, então serei direta. #nVocês estão sendo enganados."
10023060-85 = "[s] \"Enganados... por quem exatamente?\""
10023060-86 = "……Você está com a carta de aviso? #nTente se lembrar. O mistério ainda deve estar lá—"
10023060-87 = "—Ah, que pena, mas nossa conversa termina aqui. #nEstarei esperando por você ali, um passo à frente."
10023060-88 = "Ignorar a realidade sabendo que está sendo enganado, ou... #nmergulhar na verdade, mesmo ciente do perigo?"
10023060-89 = "A vida é uma sucessão constante de escolhas, não é mesmo?"
10023060-93 = "[ns] \"A ligação caiu...\""
10023060-98 = "Parece que a iluminação voltou!"
10023060-99 = "O \"Ladrão Fantasma da Benevolência\"... ora, não o vejo em lugar nenhum."
10023060-100 = "Então, será que foi realmente apenas uma queda de energia?"
10023060-101 = "Ou talvez exista a possibilidade de que uma batalha tenha ocorrido neste curto intervalo."
10023060-107 = "Sensei, o que houve?"
10023060-108 = "[s] \"Momoi, pode reunir todo mundo?\""
10023060-109 = "Hã? Mas... e a segurança como fica?"
10023060-110 = "[s] \"É justamente sobre isso que quero falar agora.\""
10023060-115 = "Sensei, isso é verdade!?"
10023060-116 = "Todo mundo sendo enganado? Por quem!?"
10023060-117 = "[s1] \"Ele não chegou a me dizer quem...\"\n[s2] \"Mas disse que a verdade seria revelada se eu resolvesse o mistério da carta de aviso.\""
10023060-120 = "Como vamos acreditar nisso?"
10023060-121 = "O oponente é um dos Sete Prisioneiros, sabe?#nTalvez eles só queiram nos enganar para deixar a segurança vulnerável, não acha?"
10023060-122 = "Mas o 'Ladrão da Benevolência' salvou a Midori quando ela estava em perigo..."
10023060-123 = "I-isso é... verdade, mas!"
10023060-124 = "Mesmo assim, ainda é cedo demais para confiar nele!#nPode ter sido só um capricho... O que você acha, Sensei?"
10023060-125 = "[s3] \"Mesmo sendo um dos Sete Prisioneiros...\"\n[s4] \"Como é um dos meus alunos importantes, quero ouvir o que ele tem a dizer.\""
10023060-128 = "É verdade... O Sensei é esse tipo de pessoa, né."
10023060-130 = "...Tem uma coisa que está me incomodando faz tempo."
10023060-131 = "O 'Lado Oculto de Antikythera'...#nQuando esse termo foi mencionado, a atitude do Sr. Meitaro ficou um pouco estranha."
10023060-132 = "É verdade!#nAlém disso, quando resolvemos o mistério da carta, ele continuou falando mesmo sem saber se estávamos certos!"
10023060-133 = "Insistir que só precisávamos proteger aquele quadro é um pouco suspeito..."
10023060-135 = "Alice não viu o Sr. Meitaro desde aquela hora."
10023060-136 = "Ah... eu também estava vigiando o saguão e a entrada principal... mas não o vi nenhuma vez..."
10023060-137 = "[s] \"Alguém viu o Sr. Meitaro durante a exposição?\""
10023060-142 = "Não é estranho?#nSerá que ele tiraria os olhos de uma obra de arte tão importante?"
10023060-143 = "Falando nisso, o Sr. Meitaro, muito antes da exposição começar..."
10023060-144 = "[s5] \"Mesmo tendo pedido para a C&C cuidar da segurança...\"\n[s6] \"Ele não aparecer nem quando o ladrão surge...\""
10023060-147 = "Qual parte da carta de aviso ainda não resolvemos?"
10023060-148 = "A parte que diz: 'Onde a lua não alcança, a dança interrompida e o lado oculto de Antikythera'..."
10023060-149 = "Midori, você disse que a reação do Sr. Meitaro foi estranha, né?"
10023060-150 = "Sim, parecia que ele estava tentando mudar de assunto..."
10023060-151 = "Antikythera... Antikythera..."
10023060-156 = "Será que...?"
10023060-157 = "Ah, este é o 'Modo UZQueen'!#nAlice sabe!"
10023060-158 = "[s] \"Você descobriu algo?\""
10023060-159 = "Bem... se não me engano, nesta mansão...#nO Sr. Meitaro disse que havia um grande relógio analógico, não disse...?"
10023060-160 = "O mecanismo da ilha de Antikythera... é um dispositivo complexo para calcular a posição dos corpos celestes..."
10023060-161 = "Como também deve ser capaz de calcular calendários, pode-se dizer que é um tipo de relógio..."
10023060-171 = "Então este é o relógio analógico."
10023060-172 = "Entendo — 'A dança interrompida'.#nFoi fácil descobrir assim que viemos aqui."
10023060-178 = "Ao lado do relógio... uma estátua de uma dançarina."
10023060-179 = "[s] \"É exatamente a 'dança interrompida'.\""
10023060-180 = "Hmm... mas não tem nada atrás do relógio ou da estátua?"
10023060-181 = "— Espere um momento.#nApenas este azulejo tem um padrão diferente."
10023060-185 = "...Parece que encontramos o 'alvo'."
10023060-189 = "(Toki muda a direção do azulejo)"
10023060-190 = "(Ao colocá-lo de volta no chão —)"
10023060-197 = "!!!"
10023060-199 = "[ns] \"Isso é... uma escada secreta!?\""
10023060-200 = "Parece ser uma escada para o subsolo."
10023060-201 = "'Onde a lua não alcança'... Entendo."
10023060-202 = "A razão pela qual o cliente mudou de assunto deve ficar clara lá embaixo."
10023060-203 = "[s] \"O que será que nos espera lá embaixo?\""
10023060-204 = "Não dá para saber sem ir lá ver. Mas, supondo que o cliente e o 'Ladrão da Benevolência' estejam lá..."
10023060-206 = "E-e-está tudo bem, Sensei! Se as coisas ficarem feias, nós do Departamento de Desenvolvimento de Jogos vamos te proteger!"
10023060-207 = "Não é muito convincente dizer isso com a voz tremendo desse jeito, irmã mais velha."
10023060-209 = "Por favor, fique tranquilo. Eu também estarei acompanhando vocês."
10023060-210 = "Somos companheiros, afinal — vamos juntos."
10023060-211 = "[s] \"Obrigado, isso me dá muita confiança.\""
10023060-213 = "O registro de missão foi atualizado! O próximo passo é a exploração da masmorra! Alice também adora RPGs de masmorra!"
10023060-214 = "O Sensei deve ficar ao lado da Alice o tempo todo. Porque a Alice é a heroína e o Sensei é o mascote!"
10023060-215 = "[s] \"Heroína, por favor, salve-me!\""
10023060-216 = "Sensei, tome cuidado... por favor..."
10023060-217 = "S-se as coisas ficarem difíceis, por favor, esconda-se na minha caixa... Se eu me encolher, dá para caberem duas pessoas..."
10023060-218 = "[s] \"Então... vamos seguir com cuidado!\""
