[translation]
10023060-1 = "第6話;まずは進んでみましょう"
10023060-2 = "（騒がしかった1日目が過ぎ、2日目を迎えた）"
10023060-6 = "これが明日のオークションで出品される絵画ですか。#n……私は参加するつもりですが、そちらは？"
10023060-7 = "「慈愛の怪盗」を恐れて、一人だけ逃げ出すとでも？"
10023060-12 = "[ns] （昨日の騒動があったというのに、参加者が減る様子は無いようだ）"
10023060-21 = "ふぅ……疲れた。"
10023060-22 = "[s] \"お疲れ様、モモイ。\""
10023060-23 = "ありがとう、先生……#nここまで来たら、意地でも最後までやるぞ～！って気持ちになってきちゃって。"
10023060-24 = "でも……先生、ごめんね。"
10023060-25 = "私のせいで、こんな面倒事に巻き込んじゃって。"
10023060-26 = "[s] \"大丈夫。むしろ、みんなと過ごせて楽しいよ。\""
10023060-27 = "……本当？その言葉、後悔したりしない？"
10023060-28 = "そんな事言われたら……また同じような事が起きた時も、先生を呼んじゃうんだからね！"
10023060-29 = "[s] \"うん、いつでも呼んでいいからね。\""
10023060-34 = "！！！"
10023060-35 = "[ns] \"モモイ……！\""
10023060-36 = "こ、これは！"
10023060-37 = "落ち着きましょう。#n「慈愛の怪盗」は、決して人を傷つける真似はしないと聞き及んでいます。"
10023060-38 = "たしかに昨日もそうでした。#nであれば、我々は思う存分「イベント」を楽しみましょう。"
10023060-39 = "[ruby=めいたろう]明太郎[/ruby]さんの心労を思えば心苦しいですが……#nこれもオークションの余興と思えば、良いスパイスでしょう。"
10023060-46 = "意外とみんな動揺してないね。昨日の今日だからかな？"
10023060-47 = "じゃあ私たちも……"
10023060-48 = "[s] \"うん、打ち合わせ通りに。\""
10023060-50 = "絵画は私にお任せを。安全な場所に移動させます。"
10023060-51 = "私たちは上の階に行きましょう！"
10023060-57 = "アリスは、中央ホールで「怪盗」がどこに現れても狙撃できるように準備します！"
10023060-58 = "か、隠れて……状況を見守っています……"
10023060-59 = "[s] \"みんな、頑張ろう！\""
10023060-63 = "……"
10023060-64 = "……"
10023060-66 = "……"
10023060-68 = "なんで何も起こらないの！？"
10023060-73 = "（その時、足元に透明な球体が転がってきた）"
10023060-74 = "（引き寄せられるように手を伸ばすと……）"
10023060-78 = "ごきげんよう[ruby=わたくし]、私の[/ruby]声は届いておりますか？"
10023060-79 = "[s] \"誰……？\""
10023060-81 = "これは私の小道具ですよ。どうしても内密に伝えたい事がありまして……。#n周囲に聞かれぬよう音量を抑えていますから、どうぞ耳にご集中を。"
10023060-82 = "[s] \"君は、もしかして……？\""
10023060-83 = "嗚呼、ご挨拶はまたの機会に。"
10023060-84 = "時間はもう残されていませんので――単刀直入に申し上げましょう。#n貴方がたは騙されております。"
10023060-85 = "[s] \"騙されて……いったい誰に？\""
10023060-86 = "……予告状はお持ちでしょうか？#n思い出してごらんなさい。謎はまだ残っているはず――"
10023060-87 = "――嗚呼、残念ですが、お話はここまで。#n私は一足先にそこで待っておりますよ。"
10023060-88 = "騙されていると知りながらも現実から目を背けるか――#nそれとも危険を承知で、真実に飛び込むか。"
10023060-89 = "人生とは、常に選択の連続というもの――そうでしょう？"
10023060-93 = "[ns] \"切れた……。\""
10023060-98 = "照明が復旧したようですね！"
10023060-99 = "「慈愛の怪盗」は……おや、どこにも見当たりませんね。"
10023060-100 = "それでは本当に、ただの停電だったのでしょうか？"
10023060-101 = "もしくは、今の短時間に攻防が行われた可能性も。"
10023060-107 = "先生、どうしたの？"
10023060-108 = "[s] \"モモイ、みんなを集めてくれる？\""
10023060-109 = "え？でも……それじゃあ警備はどうするの？"
10023060-110 = "[s] \"今からその話をしようと思ってね。\""
10023060-115 = "先生、それは本当なんですか！？"
10023060-116 = "みんな騙されてるって、誰に！？"
10023060-117 = "[s1] \"そこまでは話してくれなかったけど……\"\n[s2] \"予告状の謎を解けば真実が明らかになる、と。\""
10023060-120 = "そんなの、どうやって信じるの？"
10023060-121 = "相手は七囚人でしょ。#n私たちを騙して、警備を手薄にしたいだけかもしれないよ？"
10023060-122 = "でも、「慈愛の怪盗」は、ミドリが危なかった時に、助けてくれたよ……"
10023060-123 = "そ、それは……そうだけど！"
10023060-124 = "でも、だからといって信用するのはまだ早いよ！#n助けたのだって、ただの気まぐれの可能性もあるし……先生はどう思う？"
10023060-125 = "[s3] \"たとえ七囚人だとしても……\"\n[s4] \"大切な生徒の一人だから、話を聞きたいな。\""
10023060-128 = "そうだ……先生はそういう人だったね。"
10023060-130 = "……ずっと引っかかってる事があって。"
10023060-131 = "「アンティキティラの裏側」……#nあの単語が出た時、[ruby=めいたろう]明太郎[/ruby]さんの態度がちょっとおかしかったんです。"
10023060-132 = "たしかに！#nそれに、予告状の謎を解いた時、正解かどうかも分からないのに勝手に話進めてたよね！"
10023060-133 = "あの絵だけ守れば良いって断言するの、ちょっと怪しい感じがする……"
10023060-135 = "アリス、さっきから明太郎さんの姿を見ていません。"
10023060-136 = "あ……わたしもホールや正門を見張ってたけど……一度も見ませんでした……"
10023060-137 = "[s] \"展示会中、明太郎さんを見た人いる？\""
10023060-142 = "おかしくない？#n大切な美術品から目を離すかな？"
10023060-143 = "そういえば明太郎さん、展示会が始まるだいぶ前から……"
10023060-144 = "[s5] \"C&Cに警備を頼むほどなのに……\"\n[s6] \"怪盗が現れても顔を出さないなんて……\""
10023060-147 = "予告状の中で、まだ解けてない部分はどこですか？"
10023060-148 = "「月の届かない場所、止まった舞とアンティキティラの裏側」……のところです……"
10023060-149 = "ミドリ、明太郎さんの反応がおかしかったって言ってたよね？"
10023060-150 = "うん、なんか話を逸らそうしてたような……"
10023060-151 = "アンティキティラ……アンティキティラ……"
10023060-156 = "もしかして？"
10023060-157 = "あっ、これは「UZQueenモード」です！#nアリス、知っています！"
10023060-158 = "[s] \"何か掴めた？\""
10023060-159 = "その……たしか、この屋敷には……#n大きなアナログ時計がある、と明太郎さんが言ってましたよね……？"
10023060-160 = "アンティキティラ島の機械は……天体の位置を導き出す複雑な装置……"
10023060-161 = "暦の計算も出来るはずだから、時計の一種、とも言えると思う……"
10023060-171 = "これが、そのアナログ時計ですか。"
10023060-172 = "なるほど――「止まった舞」#n足を運べば簡単に判明しましたね。"
10023060-178 = "時計と並び立つ……踊り子の像。"
10023060-179 = "[s] \"まさに「止まった舞」だね。\""
10023060-180 = "う～ん……でも時計と像の裏には何も無いよ？"
10023060-181 = "――お待ちください。#nこの1枚だけ、タイルの模様が異なっています。"
10023060-185 = "……どうやら、「当たり」のようですね。"
10023060-189 = "（トキがタイルの向きを変え）"
10023060-190 = "（床に戻すと――）"
10023060-197 = "！！！"
10023060-199 = "[ns] \"これは……隠し階段！？\""
10023060-200 = "地下への階段のようですね。"
10023060-201 = "「月の届かない場所」……なるほど。"
10023060-202 = "依頼主が話を逸らした理由は、この先で明らかになるかと。"
10023060-203 = "[s] \"この下に……いったい何が待ってるんだろうね。\""
10023060-204 = "行ってみない事には、何とも。#nですが、仮に依頼主と「慈愛の怪盗」が居るとしたら……。"
10023060-206 = "だ、だだ、大丈夫だよ、先生！#nいざとなったら、私たちゲーム開発部が先生を守ってあげるから！"
10023060-207 = "……そんな震えた声で言っても説得力ないよ、お姉ちゃん。"
10023060-209 = "ご安心ください。私もついておりますので。"
10023060-210 = "仲間ですから――ともに参りましょう。"
10023060-211 = "[s] \"ありがとう、心強いよ。\""
10023060-213 = "クエストログが更新されました！次はダンジョンの探検です！#nアリス、ダンジョンRPGも大好きです！"
10023060-214 = "先生は絶対、アリスの隣に居なければなりません。#nアリスは勇者で、先生はマスコットですから！"
10023060-215 = "[s] \"勇者様、どうかお助けください！\""
10023060-216 = "先生、気をつけて……くださいね……"
10023060-217 = "い、いざとなったら、わたしの箱に隠れてください……#n体を丸めたら、2人くらいなら入れますから……"
10023060-218 = "[s] \"それじゃあ……気をつけて進もうか！\""
