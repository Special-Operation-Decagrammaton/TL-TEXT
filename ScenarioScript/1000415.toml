[translation]
1000415-1 = "左腕にのしかかる[ruby=責任]腕章[/ruby]"
1000415-2 = "（こうして、急いでヒナの部屋にやって来た）"
1000415-6 = "[ns] \"ヒナ、お待たせ。\""
1000415-8 = "あ、うん。入って、先生。"
1000415-9 = "[s] \"おじゃまします。\""
1000415-15 = "ふふっ……思ったより早かったね、先生。"
1000415-19 = "……すごい汗だけど、大丈夫？"
1000415-20 = "もしかして、私の部屋に来る途中で何かあった……？"
1000415-21 = "[ns1] \"ヒナに会えるのが楽しみすぎて、\"\n[ns2] \"走って来ただけだよ。\""
1000415-24 = "[ns3] \"ヒナこそ大丈夫？\"\n[ns4] \"クマがすごいよ！？\""
1000415-27 = "あ、これは……。"
1000415-28 = "昨日、徹夜で風紀委員会の仕事をしてて。"
1000415-29 = "でも、そのおかげでこうして休みが取れたの。"
1000415-30 = "[s] \"疲れてるのに遊びに来て大丈夫だった……？\""
1000415-31 = "その……。"
1000415-32 = "む、むしろ、疲れてるからこそ……。"
1000415-33 = "先生に、会いたかったの。"
1000415-34 = "まさか、会えるとは思ってなかったけど……。"
1000415-35 = "私のわがままに付き合ってくれて……。"
1000415-36 = "……ありがとう、先生。"
1000415-37 = "[s] \"ううん、私もヒナに会いたかったから。\""
1000415-38 = "ほ、本当？"
1000415-39 = "……そう、なんだ。ふふっ。"
1000415-43 = "……うーん、今さらだけど。"
1000415-44 = "今日の私、すごくやつれてるわね。"
1000415-45 = "こんな顔を先生に見られるのは……。"
1000415-46 = "なんと言うか……。"
1000415-47 = "ちょっと……恥ずかしい、かも。"
1000415-48 = "[s5] \"ヒナはいつでも可愛いよ！\"\n[s6] \"大事なのは、休日をどう過ごすかだよ。\""
1000415-51 = "……えっ！？"
1000415-52 = "[ns] \"最高の休日にしよう、ヒナ！\""
1000415-56 = "……うん。"
1000415-61 = "あ……ご、ごめん先生。"
1000415-62 = "朝ご飯、食べ忘れちゃってたわ。"
1000415-63 = "[s] \"まずは何か食べようか。\""
1000415-64 = "そうね……。"
1000415-65 = "じゃあ、出かける準備を……。"
1000415-66 = "[s] \"却下します！\""
1000415-67 = "……食べに行かないの？"
1000415-68 = "[s] \"今日はお家でゆっくり過ごします！\""
1000415-69 = "たしかに、外に出てトラブルに巻き込まれたら、#nせっかくのお休みが台無しだけど……。"
1000415-70 = "でも、どうすれば……。"
1000415-71 = "家にちゃんとした食べ物なんて、ないのだけど。"
1000415-72 = "[s] \"ヒナは……。\""
1000415-76 = "[ns] \"カップ麺、好き？\""
1000415-77 = "カップ麺……？"
1000415-84 = "[ns] \"よし、3分待とっか。\""
1000415-85 = "本当にカップ麺で済ませちゃって良いの？"
1000415-86 = "先生と一緒に食べるなら、#nもっとちゃんとした食事を……。"
1000415-87 = "[s7] \"私はヒナと一緒に食べられたら、\"\n[s8] \"それで良いんだよ。\""
1000415-90 = "[ns9] \"あっ。むしろごめん、\"\n[ns10] \"カップ麺で……。\""
1000415-93 = "あ、いや！#nそれは大丈夫。"
1000415-94 = "……カップ麺も、嫌いじゃないから。"
1000415-95 = "ただ……そうね。#n忙しい時は、たまに食べるけど……。"
1000415-96 = "ただの栄養補給としか思ったことないわ。"
1000415-97 = "[s11] \"手軽に食べられるものだからね。\"\n[s12] \"むしろ、よく食べてるって言われたら困ったよ。\""
1000415-100 = "[ns] \"どんなに仕事が忙しくても、ちゃんと栄養は摂ってね。\""
1000415-104 = "……ふふっ。"
1000415-105 = "あなたがそれを言うの？"
1000415-106 = "先生こそ、ちゃんと栄養摂れてる？"
1000415-107 = "[s] \"……が、頑張ります。\""
1000415-108 = "あらためて考えてみれば……。"
1000415-109 = "こうやって、私の部屋で……。"
1000415-110 = "カップ麺が出来上がるのを待つなんて……。"
1000415-111 = "……何だか不思議な気分。"
1000415-116 = "[ns] \"できたよ、食べよっか！\""
1000415-117 = "えっ！？#nう、うん。いただきます。"
1000415-122 = "[ns] \"どうかな？\""
1000415-123 = "……美味しい。"
1000415-125 = "（その後もヒナと一緒に、色々な休日のイベントに挑戦した）"
1000415-128 = "……一緒に座ってテレビを見るの？"
1000415-129 = "あえて何でもない番組を見ることで、"
1000415-130 = "リフレッシュになるのね。"
1000415-131 = "うーん、よく分からないけど。"
1000415-132 = "先生がそう言うなら、やってみる。"
1000415-133 = "（二人で顔も名前も知らない芸人のコントを見たり……）"
1000415-136 = "[ns] \"ヒナ、次はトランプタワーに挑戦してみよう！\""
1000415-137 = "い、いきなり？"
1000415-138 = "こういう単純作業こそ、逆に精神的な疲労を軽減できる、って……？"
1000415-139 = "わ、分かったわ。#n自信はないけど……。"
1000415-142 = "（何度も失敗したが、お互いに笑顔でトランプで遊んだ）"
1000415-145 = "[ns] \"ゲヘナからは簡単に抜け出せないよ！\""
1000415-147 = "[ns] \"覚悟して！\""
1000415-148 = "先生に自治区を占領された以上、#nこのままじゃ通行料を払い続けることに……。"
1000415-149 = "どうすれば、この局面を……。"
1000415-153 = "……！"
1000415-154 = "「無人島」を狙えば……！"
1000415-160 = "（キヴォトス各地をサイコロで回りながら、不動産を買い集めるボードゲームで遊んだり……）"
1000415-167 = "あっ。"
1000415-168 = "さ、さっきの攻撃でHPが半分も……！"
1000415-169 = "[s13] \"ヒナ、諦めないで！\"\n[s14] \"まだエリクサーがあるよ！\""
1000415-172 = "ここでエリクサーを飲めば……。"
1000415-173 = "ボスに魔法で大ダメージを与えられる、けど。"
1000415-174 = "このあと、もっと強力なボスが現れたら……。"
1000415-175 = "使うべきか、温存するべきか……。"
1000415-176 = "決めた、ここでは温存する！"
1000415-177 = "[s] \"その気持ちは分かるけど！\""
1000415-187 = "（その後も、積んでいたゲームで遊んだり）"
1000415-193 = "（ヒナとお休みを満喫した）"
1000415-197 = "（窓の外を見ると、気付けば日が暮れていた）"
1000415-200 = "……ふう。"
1000415-201 = "とっても楽しかったわ。"
1000415-202 = "ありがとう、先生。"
1000415-203 = "[s] \"私も楽しかったよ、ヒナ。\""
1000415-205 = "[ns15] \"ヒナの意外な一面を\"\n[ns16] \"見られて良かったよ。\""
1000415-208 = "意外な一面……？"
1000415-209 = "[s17] \"普段のヒナと違って……。\"\n[s18] \"ゲーム中は、ちょっとムキになってたから意外で。\""
1000415-212 = "え……？"
1000415-213 = "もしかして、変な顔してた……？"
1000415-214 = "せ、先生……？"
1000415-215 = "[s] \"あはは、冗談だよ。\""
1000415-219 = "……はぁ、あなたって人は本当に。"
1000415-220 = "[s] \"風紀委員会の仕事、大変だよね？\""
1000415-221 = "……大変じゃないと言ったら、嘘になるわね。"
1000415-227 = "今となっては当たり前の存在だけど……。"
1000415-228 = "この腕章が持つ責任の重さを考えなかった日はない。"
1000415-229 = "逃げたくなる日もあるし、辞めたくなる日もある。"
1000415-230 = "もう無理だって、先生に甘えたくなる日もあったけど。"
1000415-231 = "……今日みたいに、ね。"
1000415-235 = "よくここまでやって来られたなって、自分でも不思議。"
1000415-236 = "だけど、私に期待してくれている人がいる限り、頑張りたいの。"
1000415-237 = "……諦めずに、最後まで。"
1000415-238 = "たとえ、どんなにつらくても、苦しくても。"
1000415-242 = "[ns] \"すごいね、ヒナは。\""
1000415-243 = "そう、かな……。"
1000415-244 = "同じ状況になったら、誰だって頑張ると思うし……。"
1000415-245 = "そんなに褒められることでは……。"
1000415-246 = "[s19] \"だとしても、\"\n[s20] \"ヒナの頑張りは本物だよ。\""
1000415-249 = "[ns21] \"いつまでもちゃんと見守ってるから安心して。\"\n[ns22] \"私はヒナの先生だからね。\""
1000415-252 = "……うん。"
1000415-260 = "もしもし。"
1000415-264 = "い、委員長！申し訳ありません！"
1000415-265 = "お休みだとは承知しておりますが……。"
1000415-266 = "現在、ゲヘナ北地区でトラブルが……！"
1000415-271 = "温泉開発部とヘルメット団が全面戦争を！？"
1000415-272 = "入浴券の転売が原因……！？"
1000415-276 = "……分かったわ。"
1000415-280 = "はあ……。"
1000415-281 = "先生、残念だけど仕事みたい。"
1000415-282 = "[s] \"うん……大変だね。\""
1000415-283 = "先生のおかげでリフレッシュできたから、大丈夫。"
1000415-284 = "じゃあ……。"
1000415-291 = "――行ってきます、先生。"
1000415-292 = "[s] \"行ってらっしゃい。ヒナ。\""
