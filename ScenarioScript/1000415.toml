[translation]
1000415-1 = "A braçadeira de responsabilidade que pesa no braço esquerdo"
1000415-2 = "（Dessa forma, cheguei apressado ao quarto da Hina）"
1000415-6 = "[ns] \"Hina, desculpe a demora.\""
1000415-8 = "Ah, sim. Pode entrar, Sensei."
1000415-9 = "[s] \"Com licença.\""
1000415-15 = "Fufu... você foi mais rápido do que eu pensava, Sensei."
1000415-19 = "...Você está suando bastante, está tudo bem?"
1000415-20 = "Por acaso aconteceu alguma coisa no caminho para o meu quarto...?"
1000415-21 = "[ns1] \"É que eu estava tão ansioso para te ver, Hina,\"\n[ns2] \"que acabei vindo correndo.\""
1000415-24 = "[ns3] \"E você, Hina, está bem?\"\n[ns4] \"Essas olheiras estão enormes!\""
1000415-27 = "Ah, isso é..."
1000415-28 = "Ontem, passei a noite em claro trabalhando no Comitê Disciplinar."
1000415-29 = "Mas, graças a isso, consegui tirar folga hoje."
1000415-30 = "[s] \"Você está cansada, tem certeza que está tudo bem em me receber...?\""
1000415-31 = "Bem..."
1000415-32 = "N-na verdade, é justamente por estar cansada..."
1000415-33 = "Que eu queria te ver, Sensei."
1000415-34 = "Eu não esperava que fosse possível, mas..."
1000415-35 = "Obrigada por atender ao meu capricho..."
1000415-36 = "...Obrigada, Sensei."
1000415-37 = "[s] \"Não precisa agradecer, eu também queria te ver, Hina.\""
1000415-38 = "V-verdade?"
1000415-39 = "...Entendo. Fufu."
1000415-43 = "...Hum, é um pouco tarde para dizer isso, mas..."
1000415-44 = "Hoje eu estou com uma aparência bem abatida, não estou?"
1000415-45 = "Ser vista assim pelo Sensei..."
1000415-46 = "Como posso dizer..."
1000415-47 = "É um pouco... vergonhoso, talvez."
1000415-48 = "[s5] \"A Hina é sempre adorável!\"\n[s6] \"O que importa é como vamos passar o dia de folga.\""
1000415-51 = "...Eh!?"
1000415-52 = "[ns] \"Vamos fazer deste o melhor dia de folga, Hina!\""
1000415-56 = "...Sim."
1000415-61 = "Ah... d-desculpe, Sensei."
1000415-62 = "Eu acabei esquecendo de tomar café da manhã."
1000415-63 = "[s] \"Primeiro, vamos comer alguma coisa.\""
1000415-64 = "É verdade..."
1000415-65 = "Então, vou me preparar para sair..."
1000415-66 = "[s] \"Pedido negado!\""
1000415-67 = "...Não vamos sair para comer?"
1000415-68 = "[s] \"Hoje vamos passar o dia relaxando em casa!\""
1000415-69 = "É verdade que, se sairmos e acabarmos envolvidos em algum problema, #n o dia de folga seria arruinado, mas..."
1000415-70 = "Mas, o que vamos fazer..."
1000415-71 = "Eu não tenho comida de verdade em casa."
1000415-72 = "[s] \"Hina...\""
1000415-76 = "[ns] \"Você gosta de macarrão instantâneo?\""
1000415-77 = "Macarrão instantâneo...?"
1000415-84 = "[ns] \"Certo, vamos esperar 3 minutos.\""
1000415-85 = "Tem certeza de que tudo bem se contentar com macarrão instantâneo?"
1000415-86 = "Se vou comer com você, Sensei, #n eu queria uma refeição melhor..."
1000415-87 = "[s7] \"Se eu puder comer com você, Hina,\"\n[s8] \"para mim já está ótimo.\""
1000415-90 = "[ns9] \"Ah. Pelo contrário, me desculpe,\"\n[ns10] \"por ser apenas macarrão instantâneo...\""
1000415-93 = "Ah, não!#nEstá tudo bem quanto a isso."
1000415-94 = "......Eu não desgosto de macarrão instantâneo."
1000415-95 = "É só que... bem.#nEu como de vez em quando quando estou ocupada, mas..."
1000415-96 = "Sempre pensei nisso apenas como uma forma de repor nutrientes."
1000415-97 = "[s11] \"É algo prático de se comer, afinal.\"\n[s12] \"Eu ficaria preocupada se você dissesse que come isso com frequência.\""
1000415-100 = "[ns] \"Não importa o quanto esteja ocupada com o trabalho, certifique-se de se alimentar bem.\""
1000415-104 = "......Fufu."
1000415-105 = "É você quem está dizendo isso?"
1000415-106 = "Sensei, você mesmo está se alimentando direito?"
1000415-107 = "[s] \"......Eu, eu vou tentar.\""
1000415-108 = "Pensando bem..."
1000415-109 = "Estar aqui, no meu quarto..."
1000415-110 = "Esperando o macarrão instantâneo ficar pronto..."
1000415-111 = "......É uma sensação um tanto estranha."
1000415-116 = "[ns] \"Está pronto, vamos comer!\""
1000415-117 = "Hã!?#nO-ok. Itadakimasu."
1000415-122 = "[ns] \"O que achou?\""
1000415-123 = "......Está gostoso."
1000415-125 = "(Depois disso, também tentei vários eventos de feriado junto com a Hina)"
1000415-128 = "......Vamos sentar juntos para assistir TV?"
1000415-129 = "Assistir a programas aleatórios de propósito,"
1000415-130 = "ajuda a relaxar, não é?"
1000415-131 = "Hum, não entendo muito bem."
1000415-132 = "Mas se o Sensei diz, eu vou tentar."
1000415-133 = "(Nós dois assistimos a esquetes de comediantes que nem conhecíamos o nome ou o rosto...)"
1000415-136 = "[ns] \"Hina, vamos tentar fazer uma torre de cartas agora!\""
1000415-137 = "D-de repente?"
1000415-138 = "Dizem que esse tipo de tarefa simples, na verdade, pode reduzir a fadiga mental...?"
1000415-139 = "T-tudo bem.#nNão tenho muita confiança, mas..."
1000415-142 = "(Falhamos várias vezes, mas nos divertimos jogando cartas com sorrisos no rosto)"
1000415-145 = "[ns] \"Você não vai escapar de Gehenna tão facilmente!\""
1000415-147 = "[ns] \"Prepare-se!\""
1000415-148 = "Já que o Sensei ocupou meu distrito,#nse continuar assim, vou acabar pagando pedágio sem parar..."
1000415-149 = "Como posso reverter essa situação..."
1000415-153 = "......!"
1000415-154 = "Se eu mirar na \"Ilha Deserta\"...!"
1000415-160 = "(Jogamos jogos de tabuleiro onde viajamos por Kivotos com dados e compramos propriedades...)"
1000415-167 = "Ah."
1000415-168 = "O-o meu HP caiu pela metade com aquele ataque...!"
1000415-169 = "[s13] \"Hina, não desista!\"\n[s14] \"Você ainda tem um Elixir!\""
1000415-172 = "Se eu usar o Elixir aqui..."
1000415-173 = "Posso causar um grande dano ao chefe com magia, mas."
1000415-174 = "Se um chefe ainda mais forte aparecer depois disso..."
1000415-175 = "Devo usar ou guardar?"
1000415-176 = "Decidi, vou guardar por enquanto!"
1000415-177 = "[s] \"Eu entendo esse sentimento, mas!\""
1000415-187 = "(Depois disso, também jogamos os jogos que estavam acumulados)"
1000415-193 = "(Aproveitei o dia de folga com a Hina)"
1000415-197 = "(Ao olhar pela janela, percebi que o sol já tinha se posto)"
1000415-200 = "……Ufa."
1000415-201 = "Foi muito divertido."
1000415-202 = "Obrigada, Sensei."
1000415-203 = "[s] \"Eu também me diverti, Hina.\""
1000415-205 = "[ns15] \"Foi bom ver um\"\n[ns16] \"lado inesperado da Hina.\""
1000415-208 = "Um lado inesperado...?"
1000415-209 = "[s17] \"É que, diferente da Hina de sempre...\"\n[s18] \"você ficou um pouco competitiva durante o jogo, então foi uma surpresa.\""
1000415-212 = "Eh...?"
1000415-213 = "Por acaso, eu fiz uma cara estranha...?"
1000415-214 = "Se, Sensei...?"
1000415-215 = "[s] \"Ahaha, é brincadeira.\""
1000415-219 = "……Haa, você não tem jeito mesmo."
1000415-220 = "[s] \"O trabalho no Comitê Disciplinar é difícil, né?\""
1000415-221 = "……Se eu dissesse que não é difícil, estaria mentindo."
1000415-227 = "Hoje em dia é algo natural para mim, mas..."
1000415-228 = "Nunca houve um dia em que eu não pensasse no peso da responsabilidade que esta braçadeira carrega."
1000415-229 = "Tem dias que eu quero fugir, e dias que eu quero pedir demissão."
1000415-230 = "Já houve dias em que eu quis ser mimada pelo Sensei, dizendo que não aguentava mais..."
1000415-231 = "……Como hoje, por exemplo."
1000415-235 = "É até estranho para mim mesma pensar que consegui chegar até aqui."
1000415-236 = "Mas, enquanto houver pessoas que contam comigo, eu quero me esforçar."
1000415-237 = "……Sem desistir, até o fim."
1000415-238 = "Mesmo que seja doloroso ou difícil."
1000415-242 = "[ns] \"Você é incrível, Hina.\""
1000415-243 = "Você acha...?"
1000415-244 = "Acho que qualquer um se esforçaria se estivesse na mesma situação..."
1000415-245 = "Não é algo digno de tanto elogio..."
1000415-246 = "[s19] \"Mesmo assim,\"\n[s20] \"o seu esforço é verdadeiro, Hina.\""
1000415-249 = "[ns21] \"Pode ficar tranquila, pois estarei sempre de olho em você.\"\n[ns22] \"Afinal, eu sou o sensei da Hina.\""
1000415-252 = "……Sim."
1000415-260 = "Alô."
1000415-264 = "Pre, Presidente! Peço perdão!"
1000415-265 = "Sei que a senhora está de folga, mas..."
1000415-266 = "Houve um problema no distrito norte de Gehenna...!"
1000415-271 = "O Departamento de Desenvolvimento de Fontes Termais e a Gangue dos Capacetes estão em guerra total!?"
1000415-272 = "O motivo é a revenda de ingressos para o banho...!?"
1000415-276 = "……Entendido."
1000415-280 = "Haa..."
1000415-281 = "Sensei, sinto muito, mas parece que é trabalho."
1000415-282 = "[s] \"Entendo... que difícil, hein.\""
1000415-283 = "Graças ao Sensei, eu consegui recarregar as energias, então estou bem."
1000415-284 = "Então..."
1000415-291 = "――Já vou indo, Sensei."
1000415-292 = "[s] \"Vá com cuidado, Hina.\""
