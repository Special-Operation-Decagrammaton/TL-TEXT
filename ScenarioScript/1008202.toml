[translation]
1008202-1 = "青春の師匠"
1008202-3 = "（レンゲの話を聞くために調停室を訪れた）"
1008202-7 = "はっ！"
1008202-20 = "はあっ！"
1008202-28 = "もう一回！"
1008202-29 = "はっ！"
1008202-36 = "トドメだっ！"
1008202-43 = "はあぁぁっ！！！"
1008202-53 = "[ns] \"何か別の混じってなかった！？\""
1008202-57 = "おっ、先生。"
1008202-59 = "え？今の？"
1008202-60 = "これは百花繚乱に代々受け継がれてきた射撃術で……うーん、こうして、こう……みたいな？"
1008202-61 = "[s1] \"な、なるほど……今のが朝練？\"\n[s2] \"これが百花繚乱の朝練なんだ。\""
1008202-64 = "ああ、そうだよ。"
1008202-65 = "アタシたち百花繚乱紛争調停委員会は、百鬼夜行で色々担ってるからね。"
1008202-66 = "有事に備えてのトレーニングはもちろん……"
1008202-67 = "さっきみたいな射撃訓練も欠かせないんだ。"
1008202-68 = "ふっ、今日のアタシは百発百中！#nいつも以上に絶好調だ！"
1008202-69 = "[s3] \"なるほど……！\"\n[s4] \"さすが……！\"\n[s5] \"百花繚乱の切り込み隊長！！\""
1008202-75 = "！？"
1008202-76 = "そ、そんな褒めても何も出ないけどな！"
1008202-77 = "これくらい、百花繚乱じゃ普通だし？"
1008202-78 = "ま、まぁ先生が褒めてくれるのは嬉しいけど……へへっ。"
1008202-82 = "………………じゃなくて。"
1008202-83 = "ご、ごほん……それより、ええっと……"
1008202-84 = "結構来るの早かったね？"
1008202-85 = "[s] \"うん、連絡をもらってすぐに来たから。\""
1008202-86 = "そっか、気を遣わせて悪かったね。"
1008202-87 = "すぐ来てくれたのは、めちゃくちゃ嬉しいけど……"
1008202-88 = "その……こんなに早く来るとは思ってなくて、アタシとしては想定外というか……"
1008202-89 = "準備が、まだ……その……"
1008202-95 = "[ns] \"ところで、相談って？\""
1008202-97 = "わ、わわわっ！"
1008202-98 = "[s] \"レンゲ、どうしたの？\""
1008202-99 = "ままま待って！たんま！たんまっ！"
1008202-103 = "それ以上はちょっと近づかないでほしいというか！"
1008202-104 = "[s] \"私、何かしたかな……？\""
1008202-105 = "いやいやいや、そうじゃなくて！"
1008202-106 = "さっきまで朝練をしてたから、その……"
1008202-107 = "そんなに近くまで来られると……その……"
1008202-108 = "色々と……！！アタシが気にするの！！"
1008202-109 = "[s] \"ご、ごめん。デリカシーが無かったね。\""
1008202-110 = "そういう事だから！ちょっと待っててくれ、先生。"
1008202-111 = "大丈夫、まだ大丈夫……！"
1008202-119 = "[ns] \"どうして急に反復横跳びを……？\""
1008202-120 = "こうすれば、多少は……気にならないと言うか……！"
1008202-121 = "いっち！にっ！いち、にっ！"
1008202-124 = "いっち！にっ！いち、にっ！"
1008202-130 = "あと100回……！いける……！"
1008202-131 = "[s] \"むしろ逆効果じゃないかな！？\""
1008202-134 = "（レンゲの気が済むまで待っていると……）"
1008202-138 = "ふぅ……よし、これで大丈夫だと思う。"
1008202-139 = "[s] \"すごい気合いだったね……\""
1008202-140 = "そこは気にしないでもらえると！"
1008202-141 = "それで、話なんだけど……"
1008202-142 = "うーん………"
1008202-143 = "いざ面と向かって話そうと思ったら、その……"
1008202-144 = "[s] \"話そうと思ったら……？\""
1008202-145 = "いや、その……なんて言うか……"
1008202-146 = "ああもう！ダメだ！#nモモトークなら言えるのに！"
1008202-147 = "でも……！"
1008202-148 = "このまま考え込んでいても仕方ない！決めた！"
1008202-149 = "先生！こっち来てくれ！"
1008202-156 = "その、先生を呼んだ理由は……"
1008202-157 = "[s] \"うん、相談に乗ってほしいって言ってたね。\""
1008202-158 = "……！そ、そう！相談があって……"
1008202-159 = "アタシ、気づいたんだ。#n何もしてなくても、時計の針は刻一刻と進み続ける……"
1008202-160 = "要するに……"
1008202-164 = "このままじゃアタシの青春、なにもないまま終わっちゃうんじゃないかって！"
1008202-165 = "だから先生！手伝って！"
1008202-166 = "[ns] \"……………………はい？\""
1008202-167 = "あー、やっぱり伝わりにくいかな？"
1008202-171 = "……そうだな。"
1008202-172 = "将来、アタシが過去を振り返るようになったときにさ……"
1008202-173 = "百鬼夜行時代を振り返っては「百花繚乱にいたから一瞬じゃった……ああ、アタシの青春は[ruby=いずこ]何処[/ruby]……」"
1008202-174 = "……って、きっと何度も後悔するんだよ。#nそんな人生、嫌なんだ！"
1008202-175 = "だから、いつ振り返ってもいいように――"
1008202-176 = "――アタシは最高の青春を過ごしたいんだ！"
1008202-177 = "それこそ、アタシが生きる意味なんだよ！"
1008202-181 = "[ns6] \"ご、ごめん、レンゲ……\"\n[ns7] \"話が飛躍しすぎて……\"\n[ns8] \"ちょっと……\""
1008202-188 = "（その後も、レンゲの話は続き……）"
1008202-190 = "つまり、手遅れになる前に「青春活動」がしたいんだ！"
1008202-191 = "だから先生！手伝ってほしい！"
1008202-192 = "[s9] \"レンゲは今……\"\n[s10] \"百花繚乱として活動してるよね？\""
1008202-195 = "[ns] \"それも十分、青春だと思うんだけど……\""
1008202-196 = "先生、それは違うと思うんだ……"
1008202-197 = "百花繚乱では、毎日グラウンドを走ったり、兵法の勉強をしたり、射撃の練習をしたり……"
1008202-198 = "問題児が暴れていないか見回って、事件が起きたならみんなで戦う……"
1008202-199 = "どこに青春の要素があるっていうんだ？"
1008202-200 = "こんなの、ただの「日常」だよ。"
1008202-201 = "[s] \"そ、そうかな……？\""
1008202-202 = "そもそも青春ってのは、もっとこう……キラキラして甘酸っぱくて……"
1008202-203 = "そう、まさに「恋よ鯉」の作品に出てくるような！"
1008202-204 = "[s] \"えっと、例えば……？\""
1008202-205 = "例えば……"
1008202-208 = "胸がときめく出会いと……切ない別れ。"
1008202-209 = "ある日、親しい友人が隠していた過去を打ち明けるような、胸が高鳴る展開。"
1008202-212 = "まさか、彼女が前世でも仲間だったなんて……！"
1008202-213 = "こんな感じで、もっとこう破天荒な……ドキドキする体験をした方がお得だと思うんだ！"
1008202-214 = "後で思い返して笑えるような……そんな日々を過ごしたいんだ！"
1008202-215 = "[s] \"たしかに、その気持ちは分かるけど！\""
1008202-216 = "ま、アタシもそこまでドラマチックな青春を求めてるわけじゃない。"
1008202-217 = "ただ、その……このままじゃ鍛錬ばかりで青春が終わっちゃう気がして……それがすごく残念で……"
1008202-218 = "だから先生……手伝ってくれないか？"
1008202-219 = "[s] \"レンゲの話を完全には理解できてないけど……\""
1008202-221 = "[ns] \"それでも良ければ、手伝わせてほしい。\""
1008202-225 = "ほ、本当に……？"
1008202-226 = "へへっ！ありがとう！先生！"
1008202-227 = "じゃあ、これでアタシたちは「青春師弟」だ！"
1008202-228 = "[s] \"青春、師弟……？\""
1008202-229 = "そうと決まれば、先生と呼ぶのは違うか……？"
1008202-230 = "青春師弟に[ruby=ふさわ]相応[/ruby]しい、もっと威厳のある呼び方……"
1008202-236 = "――師匠。"
1008202-237 = "[s] \"……師匠？\""
1008202-238 = "ああ、ピッタリだな！"
1008202-239 = "これから青春活動中は、師匠と呼ぼう！"
1008202-245 = "不甲斐ない弟子かもしれないが、よろしく頼む！師匠！"
1008202-249 = "よし、握手だ！"
1008202-250 = "[s] \"あ、うん。よろしくね。\""
1008202-251 = "へへっ！"
1008202-253 = "（こうして、レンゲとの青春活動が始まった）"
