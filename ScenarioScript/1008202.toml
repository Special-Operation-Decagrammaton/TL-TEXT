[translation]
1008202-1 = "mestre da juventude"

1008202-3 = "(Visitei a sala de mediação para ouvir a história de Renge)"

1008202-7 = "Ha!"

1008202-20 = "Haa!"

1008202-28 = "Mais uma vez!"

1008202-29 = "Ha!"

1008202-36 = "É o golpe final!"

1008202-43 = "Haaaaa! ! !"

1008202-53 = "[ns] \"Não havia mais alguma coisa misturada!?\""

1008202-57 = "Ei, Sensei."

1008202-59 = "foto? Agora?"

1008202-60 = "Esta é uma técnica de tiro que foi passada de geração em geração nas Cem Flores... Hmm, assim, assim...?"

1008202-61 = "[s1] \"Entendo...este é o treinamento matinal?\"\n[s2] \"Este é o treinamento matinal com centenas de flores.\""

1008202-64 = "Ah, isso mesmo."

1008202-65 = "Nós, membros do Comitê de Mediação de Disputas Hyakka Ryoran, somos responsáveis ​​por várias coisas em Hyakki Yako."

1008202-66 = "Claro, treinamento em preparação para emergências..."

1008202-67 = "O treinamento de tiro como mencionei anteriormente também é essencial."

1008202-68 = "Ufa, hoje estou 100/100! #nEle está melhor que o normal!"

1008202-69 = "[s3] \"Entendo...!\"\n[s4] \"Como esperado...!\"\n[s5] \"Capitão do Corte de Cem Flores!!\""

1008202-75 = "! ?"

1008202-76 = "Bem, mesmo que eu te elogie assim, nada vai acontecer!"

1008202-77 = "Isso é normal para um jardim de flores?"

1008202-78 = "Bom, que bom que a Senseia me elogiou, mas... hehe."

1008202-82 = "Não ………………."

1008202-83 = "Desculpe... mais do que isso, uh..."

1008202-84 = "Você chegou bem cedo, não foi?"

1008202-85 = "[s] \"Sim, vim logo depois de receber a ligação.\""

1008202-86 = "Entendo, foi minha culpa por fazer você se preocupar."

1008202-87 = "Estou muito feliz que você veio imediatamente..."

1008202-88 = "Hum... eu não esperava que isso acontecesse tão cedo e acho que é inesperado..."

1008202-89 = "Ainda não estou pronto... hum..."

1008202-95 = "[ns] \"A propósito, o que você quer dizer com consulta?\""

1008202-97 = "Uau!"

1008202-98 = "[s] \"Renge, o que há de errado?\""

1008202-99 = "Espere! tempo esgotado! Tanma!"

1008202-103 = "É como se eu não quisesse que você chegasse mais perto do que isso!"

1008202-104 = "[s] \"Eu fiz alguma coisa...?\""

1008202-105 = "Não, não, não é isso!"

1008202-106 = "Eu estava praticando de manhã até agora, então..."

1008202-107 = "Se você puder chegar tão perto..."

1008202-108 = "Muitas coisas...! ! Eu me importo! !"

1008202-109 = "[s] \"Desculpe, não fui muito sensível.\""

1008202-110 = "Porque é isso que é! Espere um minuto, senhor."

1008202-111 = "Está tudo bem, ainda está tudo bem...!"

1008202-119 = "[ns] \"Por que você de repente pulou para o lado repetidamente...?\""

1008202-120 = "Se você fizer isso, não terá que se preocupar com isso...!"

1008202-121 = "Ichi! Não! Um, não!"

1008202-124 = "Ichi! Não! Um, não!"

1008202-130 = "Mais 100 vezes...! Eu posso ir...!"

1008202-131 = "[s] \"Na verdade, não teria o efeito oposto!?\""

1008202-134 = "(Se eu esperar até que Renge esteja satisfeito...)"

1008202-138 = "Ufa... Ok, acho que está tudo bem."

1008202-139 = "[s] \"Foi um grande espírito...\""

1008202-140 = "Espero que você não se preocupe com isso!"

1008202-141 = "Então essa é a história..."

1008202-142 = "Hum..."

1008202-143 = "Quando finalmente decidi falar com ele cara a cara,..."

1008202-144 = "[s] \"Se você quiser conversar...?\""

1008202-145 = "Não, o que devo dizer..."

1008202-146 = "Ah, já! Não! #nVocê pode dizer isso com o Momotalk!"

1008202-147 = "mas……!"

1008202-148 = "Não adianta pensar assim! Eu decidi!"

1008202-149 = "Sensei! Venha aqui!"

1008202-156 = "A razão pela qual liguei para o Sensei foi..."

1008202-157 = "[s] \"Sim, você disse que gostaria de me consultar.\""

1008202-158 = "...! Isso mesmo! tenho uma consulta..."

1008202-159 = "Ei, eu percebi. #nMesmo que você não faça nada, os ponteiros do relógio continuam correndo..."

1008202-160 = "resumidamente……"

1008202-164 = "Se as coisas continuarem assim, minha juventude terminará sem que nada aconteça!"

1008202-165 = "Então Sensei! Me ajude!"

1008202-166 = "[ns] \"……………………Sim?\""

1008202-167 = "Ah, afinal é difícil transmitir, não é?"

1008202-171 = "...Isso mesmo."

1008202-172 = "No futuro, quando eu começar a olhar para o meu passado..."

1008202-173 = "Olhando para trás, para a era Hyakki Yako, ele disse: ``Foi apenas por um momento porque eu estava em Hyakki Ryouran...Ah, minha juventude foi...''"

1008202-174 = "...Tenho certeza que você se arrependerá muitas vezes. #nEu odeio esse tipo de vida!"

1008202-175 = "Então você pode olhar para trás a qualquer momento..."

1008202-176 = "――Eu quero passar a melhor juventude!"

1008202-177 = "Esse é o sentido da minha vida!"

1008202-181 = "[ns6] \"Sinto muito, Renge...\"\n[ns7] \"A história avançou muito rápido...\"\n[ns8] \"Espere um minuto...\""

1008202-188 = "(Depois disso, a história de Renge continua...)"

1008202-190 = "Em outras palavras, quero fazer algumas “atividades juvenis” antes que seja tarde demais!"

1008202-191 = "Então Sensei! Eu preciso de sua ajuda!"

1008202-192 = "[s9] \"Renge é agora...\"\n[s10] \"Ele está ativo como Hyakka Ryoran, certo?\""

1008202-195 = "[ns] \"Acho que isso é bastante juvenil...\""

1008202-196 = "Sensei, não acho que isso seja verdade..."

1008202-197 = "Na Hyakka Ryouran corremos em campo todos os dias, estudamos táticas militares, praticamos tiro..."

1008202-198 = "Olhamos em volta para ver se as crianças problemáticas estão agindo assim e, se ocorrer um incidente, todos lutamos juntos..."

1008202-199 = "Onde está o elemento da juventude?"

1008202-200 = "Isso é apenas \"vida cotidiana\"."

1008202-201 = "[s] \"Eu-eu acho...?\""

1008202-202 = "Em primeiro lugar, a juventude é mais assim... espumante, doce e azedo..."

1008202-203 = "Sim, é exatamente como aparece na obra \"Koi Yo Koi\"!"

1008202-204 = "[s] \"Hum, por exemplo...?\""

1008202-205 = "por exemplo……"

1008202-208 = "Um encontro emocionante e uma despedida comovente."

1008202-209 = "Um dia, um amigo próximo revela algo sobre seu passado que ele estava escondendo, e a história é de tirar o fôlego."

1008202-212 = "Nunca pensei que ela fosse minha amiga em uma vida anterior...!"

1008202-213 = "Acho melhor ter uma experiência como essa, algo ainda mais escandaloso...e de tirar o fôlego!"

1008202-214 = "Quero passar dias assim para poder olhar para trás mais tarde e rir!"

1008202-215 = "[s] \"Eu certamente entendo como você se sente!\""

1008202-216 = "Bem, não estou procurando por um jovem tão dramático."

1008202-217 = "Mas... se as coisas continuarem assim, sinto que minha juventude vai acabar apenas com treino... e isso é uma pena..."

1008202-218 = "Então, Sensei... você poderia me ajudar?"

1008202-219 = "[s] \"Não entendo completamente a história de Renge...\""

1008202-221 = "[ns] \"Se você não se importa, gostaria de ajudá-lo.\""

1008202-225 = "Oh sério...?"

1008202-226 = "Hehe! obrigado! Sensei!"

1008202-227 = "Pois bem, agora somos “jovens mestres e discípulos”!"

1008202-228 = "[s] \"Jovem, mestre e discípulo...?\""

1008202-229 = "Se eu decidir fazer isso, posso me chamar de Sensei...?"

1008202-230 = "Uma forma mais digna de chamar jovem mestre e discípulo..."

1008202-236 = "--Mestre."

1008202-237 = "[s] \"...Mestre?\""

1008202-238 = "Ah, isso é perfeito!"

1008202-239 = "De agora em diante, vou chamá-lo de mestre durante minhas atividades juvenis!"

1008202-245 = "Posso ser um discípulo inútil, mas por favor me ajude! Mestre!"

1008202-249 = "Ok, vamos apertar as mãos!"

1008202-250 = "[s] \"Ah, sim. Prazer em conhecê-lo.\""

1008202-251 = "Hehe!"

1008202-253 = "(Assim, começaram as atividades juvenis com Renge)"

