[translation]
52270-1 = "Capítulo 27: A ponta dos dedos alcançada"
52270-11 = "No fim das contas, você veio, Nagusa."
52270-12 = "Ayame, eu..."
52270-13 = "Não precisa se dar ao trabalho de explicar."
52270-14 = "Eu vi tudo desde o início."
52270-15 = "Entendimento, incompreensão... sério, que bobagem."
52270-16 = "Não importa o que você diga, acho que nunca vou te entender."
52270-17 = "Não importa quem seja... na verdade, eu nem quero entender."
52270-18 = "Ayame, eu não vim aqui porque queria que você me entendesse."
52270-22 = "Então, o que veio fazer?"
52270-23 = "Vim para que você me entregue tudo o que está carregando nas costas."
52270-27 = "...Presidente do Comitê de Mediação de Conflitos Hyakkiyako, Ayame Nanakado."
52270-28 = "Suas ações, que traem o dever da Hyakka Ryoran e colocam Hyakkiyako em perigo, me levaram a julgar que você não é digna do cargo de presidente."
52270-33 = "— Eu desafio você para uma Batalha de Sucessão."
52270-40 = "Olha só como você fala agora, aquela chorona."
52270-41 = "Você está bem sozinha?!"
52270-42 = "I-isso mesmo! Se a veterana Ayame é a oponente, deveríamos ir todos juntos...!"
52270-44 = "Mesmo que todos vocês lutem contra ela, acho que o resultado não mudará."
52270-45 = "Renge e Yukari, cuidem do Sensei."
52270-46 = "Além disso... a Batalha de Sucessão da Hyakka Ryoran tem condições, não tem?"
52270-47 = "Uma testemunha de fora da Hyakka Ryoran para garantir que o julgamento da Batalha de Sucessão seja justo..."
52270-48 = "E um executivo pertencente à Hyakka Ryoran."
52270-52 = "Kikyou, Sensei. Por favor, sejam as testemunhas da Batalha de Sucessão."
52270-56 = "...Entendido."
52270-58 = "[ns] \"Com prazer.\""
52270-63 = "Você continua a mesma, sempre preocupada com as regras."
52270-64 = "Mas... entendi. É importante resolver as coisas de uma vez por todas."
52270-69 = "Presidente do Comitê de Mediação de Conflitos Hyakka Ryoran, Ayame Nanakado."
52270-70 = "Aceito o desafio da Batalha de Sucessão da desafiante, Nagusa Goryo."
52270-82 = "...Ugh!"
52270-83 = "............"
52270-84 = "Incrível... a veterana Nagusa está lutando de igual para igual com a presidente Ayame."
52270-85 = "Ainda não podemos baixar a guarda, mas... se continuar assim, talvez..."
52270-95 = "(Por que... eu deveria ter conseguido derrotá-la facilmente antes)"
52270-96 = "(Mesmo sendo a Nagusa... como pode a Nagusa...!)"
52270-98 = "...Por que você está tão desesperada?"
52270-102 = "Desesperada...?"
52270-103 = "Quem está desesperada é você, não tente se fazer de forte."
52270-104 = "Não. Seus movimentos, sua respiração, sua expressão..."
52270-105 = "Tudo isso diz que você \"não pode perder\". Você não é a mesma Ayame de antes."
52270-106 = "Ha... se eu tivesse a intenção de pegar leve, nem teria começado essa Batalha de Sucessão."
52270-107 = "Você ainda tem apego ao cargo de presidente?"
52270-108 = "Se era assim, deveria ter desistido de tudo e voltado."
52270-109 = "Desistir?"
52270-110 = "Se eu descartar meu status, meus desejos e minha seriedade, o que restará de mim...?"
52270-114 = "Se ninguém me entender e ninguém me reconhecer, para que eu deveria viver!"
52270-119 = "...Você não precisa de um motivo."
52270-120 = "...Apenas estar aqui já basta."
52270-122 = "A luz do sol quente é agradável, o céu azul límpido é lindo... o cheiro de comida gostosa vindo do mercado..."
52270-123 = "Cada uma dessas coisas me faz pensar: \"Hoje foi divertido. Amanhã, com certeza, também será...\". #nVocê não precisa procurar por um motivo."
52270-127 = "Eu... só precisava que a Ayame estivesse aqui."
52270-128 = "Eu..."
52270-132 = "……Você cresceu, Nagusa. Tentar me abalar com palavras."
52270-141 = "Mas esse truque não vai funcionar."
52270-147 = "Meu valor e minha razão de viver, eu vou provar aqui――"
52270-161 = "Ah, droga... então é isso."
52270-165 = "Parabéns... Nagusa, agora você é a presidente do comitê."
52270-166 = "Você, que me desafiou centenas de vezes e nunca venceu... finalmente me derrotou."
52270-167 = "Erga a cabeça. Esse não era o seu objetivo?"
52270-173 = "……Ei."
52270-174 = "……Por que você está chorando com essa cara?"
52270-176 = "Me desculpa……."
52270-179 = "Sinto muito, de verdade…… Ayame."
52270-180 = "Eu nunca olhei para você de verdade até agora... você estava gritando de dor ao meu lado o tempo todo, e eu não ouvi……."
52270-184 = "Eu não percebi que você também estava estendendo a mão, pedindo ajuda……!"
52270-185 = "Você estava sofrendo tanto, e eu só dependia de você... me desculpa."
52270-186 = "Eu não tenho nada comparado a você, mas... esta mão, eu nunca mais... vou soltar."
52270-187 = "Eu vou carregar o seu sofrimento junto comigo……."
52270-191 = "Sinto muito, sinto muito mesmo…… né…… Ayame……."
52270-196 = "Como eu pensei, eu――"
52270-197 = "Sempre odiei... essa sua cara de choro."
52270-201 = "Próximo episódio: Aguardando juntos o desabrochar"
