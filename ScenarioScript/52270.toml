[translation]
52270-1 = "Episódio 27; A Ponta dos Dedos Alcançada"
52270-11 = "No final das contas, você veio, Nagusa."
52270-12 = "Ayame, eu......"
52270-13 = "Você não precisa se dar ao trabalho de explicar."
52270-14 = "Eu vi tudo através do Hitotsume."
52270-15 = "Entender, não entender...... sinceramente, que bobagem."
52270-16 = "Não importa o que você diga, não acho que eu vá te entender."
52270-17 = "Não importa quem seja o oponente...... eu não quero entender, afinal."
52270-18 = "Ayame, eu não vim aqui porque queria ser compreendida."
52270-22 = "Então, por que veio?"
52270-23 = "Vim para que você me entregue tudo o que está carregando."
52270-27 = "......Comitê de Mediação de Conflitos Hyakkaryouran, presidente. Ayame Nanakado."
52270-28 = "Por seus atos de abandonar os deveres da Hyakkaryouran e colocar Hyakkiyako em perigo, julgo que você não é mais digna do posto de presidente."
52270-33 = "――Eu desafio você para uma Batalha de Sucessão."
52270-40 = "Você aprendeu a falar, hein, sua chorona."
52270-41 = "Será que você está pronta para fazer isso sozinha!"
52270-42 = "E, exatamente! Se for para enfrentar a Ayame-senpai, deveríamos ir todas juntas......!"
52270-44 = "Mesmo que enfrentem juntas, não acho que o resultado vá mudar."
52270-45 = "Renge e Yukari, cuidem do Sensei."
52270-46 = "Além disso...... existem condições para a Batalha de Sucessão da Hyakkaryouran, não é?"
52270-47 = "Uma testemunha de fora da Hyakkaryouran para garantir que a Batalha de Sucessão seja justa......"
52270-48 = "E um executivo pertencente à Hyakkaryouran."
52270-52 = "Kikyou, Sensei. Peço que sejam as testemunhas da Batalha de Sucessão."
52270-56 = "......Entendido."
52270-58 = "[ns] \"Com prazer.\""
52270-63 = "Você continua se preocupando demais com as regras, como sempre."
52270-64 = "Mas...... entendi. É importante dar um desfecho a isso."
52270-69 = "Presidente do Comitê de Mediação de Conflitos Hyakkaryouran, Ayame Nanakado."
52270-70 = "Eu aceito o desafio da Batalha de Sucessão da desafiante, Nagusa Goryou."
52270-82 = "......Ugh!"
52270-83 = "............"
52270-84 = "Incrível...... a Nagusa-senpai está lutando de igual para igual com a presidente Ayame."
52270-85 = "Ainda não podemos ficar tranquilas, mas...... se continuar assim, talvez......!"
52270-95 = "(Por que...... eu deveria ter sido capaz de derrotá-la facilmente antes)"
52270-96 = "(Mesmo sendo a Nagusa...... logo pela Nagusa......!)"
52270-98 = "......Por que você está tão desesperada?"
52270-102 = "Desesperada......?"
52270-103 = "Quem está desesperada é você. Não tente fingir ser forte."
52270-104 = "Não. Seus movimentos, sua respiração, sua expressão......"
52270-105 = "Tudo isso está dizendo que você 'não pode perder'. Você não é a Ayame de antes."
52270-106 = "Ha...... se eu pretendesse pegar leve, nem teria aceitado uma Batalha de Sucessão desde o início."
52270-107 = "Você ainda tem apegos ao cargo de presidente?"
52270-108 = "Se era assim, deveria ter desistido de tudo e voltado."
52270-109 = "Desistir?"
52270-110 = "Se eu descartar meu status, meus desejos e minha seriedade, o que restará de mim......?"
52270-114 = "Se ninguém me entende e ninguém me reconhece, para que eu deveria viver!"
52270-119 = "......Eu não preciso de motivos."
52270-120 = "......Eu só queria que você estivesse aqui."
52270-122 = "Como é bom sentir o sol quente, o céu azul sem nuvens é lindo...... o cheiro delicioso que vem do mercado......"
52270-123 = "Cada pequena coisa me faz pensar: 'Hoje foi divertido. Amanhã também vai ser......'. #n Você não precisa buscar um motivo para isso."
52270-127 = "Eu...... só precisava que a Ayame estivesse aqui."
52270-128 = "Eu......"
52270-132 = "......Você cresceu, Nagusa. Tentar me abalar com palavras, hein."
52270-141 = "Mas esse truque não vai funcionar comigo."
52270-147 = "Vou provar aqui qual é o meu valor e a minha razão de viver――"
52270-161 = "Ah...... então é esse o fim."
52270-165 = "Parabéns...... Nagusa, agora você é a presidente."
52270-166 = "Você, que me desafiou centenas de vezes e nunca tinha vencido...... finalmente me derrotou."
52270-167 = "Erga a cabeça. Esse não era o seu objetivo?"
52270-173 = "......Ei."
52270-174 = "......Por que você está chorando com essa cara?"
52270-176 = "Sinto muito......"
52270-179 = "Sinto muito mesmo...... Ayame."
52270-180 = "Eu não estava olhando para você de verdade até agora...... você estava ao meu lado gritando por socorro, e eu não consegui ouvir......"
52270-184 = "Eu não percebi que você também estava estendendo a mão, pedindo para ser salva......!"
52270-185 = "Ayame, você estava sofrendo tanto, e eu só dependia de você...... me desculpe."
52270-186 = "Eu não tenho nada comparado a você, mas...... esta mão, eu nunca...... nunca mais vou soltá-la."
52270-187 = "Vou carregar o sofrimento da Ayame junto comigo......"
52270-191 = "Sinto muito, sinto muito mesmo...... Ayame......"
52270-196 = "Como eu pensava, eu――"
52270-197 = "Sempre detestei...... essa sua cara de choro."
52270-201 = "Próximo Episódio; Juntos, Esperando pelo Florescimento"

