[translation]
52270-1 = "第27話;つかんだ指先"
52270-11 = "結局来たんだね、ナグサ。"
52270-12 = "アヤメ、私は……。"
52270-13 = "わざわざ説明しなくていい。"
52270-14 = "全部[ruby=ここ]ヒトツメ[/ruby]から見てたから。"
52270-15 = "理解だの、不可解だの……ほんと、くだらない。"
52270-16 = "あんたが何を言おうと、私があんたを理解することはないと思う。"
52270-17 = "相手が誰だろうと……別に、理解したくないから。"
52270-18 = "アヤメ、私はわかってもらいたくて、ここに来たんじゃないよ。"
52270-22 = "じゃあ、何？"
52270-23 = "あなたが背負っているものを全部、渡してもらうために来たの。"
52270-27 = "……百花繚乱紛争調停委員会、委員長。[ruby=ななかど]七稜[/ruby]アヤメ。"
52270-28 = "百花繚乱の役目に背き、百鬼夜行を危険に晒すその所業、委員長の座にふさわしくないと判断した。"
52270-33 = "――あなたに、継承戦を申し込む。"
52270-40 = "言うようになったね、あの泣き虫が。"
52270-41 = "一人で大丈夫なのかよ！"
52270-42 = "そ、そうですわ！アヤメ先輩がお相手なら、全員で……！"
52270-44 = "みんなで相手をしたところで、結果は変わらないと思う。"
52270-45 = "レンゲとユカリは先生をお願い。"
52270-46 = "それに……百花繚乱の継承戦には条件があるでしょ。"
52270-47 = "継承戦の判断が公平であることを示すための、百花繚乱以外の立会い人が1人……。"
52270-48 = "百花繚乱所属の幹部が1人。"
52270-52 = "キキョウ、先生。継承戦の証人をお願い。"
52270-56 = "……了解。"
52270-58 = "[ns] \"喜んで。\""
52270-63 = "ルールばっかり気にするとこ、相変わらずだね。"
52270-64 = "でも……分かった、けじめは大事だから。"
52270-69 = "百花繚乱紛争調停委員会委員長、七稜アヤメ。"
52270-70 = "挑戦者、[ruby=ごりょう]御稜[/ruby]ナグサの継承戦を受けて立つ。"
52270-82 = "……ぐっ！"
52270-83 = "…………。"
52270-84 = "すげえ……ナグサ先輩が、あのアヤメ委員長と互角にやりあってる。"
52270-85 = "まだ安心はできませんが……このままいけば、もしかすると……！"
52270-95 = "（どうして……前はすぐに倒せたはず）"
52270-96 = "（ナグサのくせに……ナグサなんかに……！）"
52270-98 = "……どうしてそんなに必死なの？"
52270-102 = "必死……？"
52270-103 = "必死なのはそっちでしょ、強がらないで。"
52270-104 = "ちがう。あなたの動き、呼吸、表情……。"
52270-105 = "その全部が「負けられない」って言ってる。前までのアヤメじゃない。"
52270-106 = "はっ……手を抜くつもりがあったら、ハナから継承戦なんてやらないよ。"
52270-107 = "まだ委員長の座に、未練があるの？"
52270-108 = "じゃあ全部諦めて、戻ってくればよかったのに。"
52270-109 = "諦める？"
52270-110 = "地位も、望みも、真面目さも捨てたら、私に何が残るっていうの……？"
52270-114 = "誰からも理解されず、誰からも認められなかったら、私は何のために生きればいいの！"
52270-119 = "……理由なんていらない。"
52270-120 = "……ただ、そこにいてくれれば。"
52270-122 = "暖かい日差しが気持ちいい、抜けるような青空が綺麗……市場からおいしそうな香りがする……。"
52270-123 = "ひとつひとつが、「今日も楽しかった。明日もきっと……」って思わせてくれる。#n理由なんて、探さなくてもいいんだよ。"
52270-127 = "私は……アヤメがいるだけで、よかった。"
52270-128 = "私は……。"
52270-132 = "……成長したね、ナグサ。言葉で私を揺さぶろうだなんて。"
52270-141 = "でも、そんな手は通じない。"
52270-147 = "私の価値も、生きる理由も、ここで証明する――"
52270-161 = "あーあ……これでおしまいか。"
52270-165 = "おめでとう……ナグサ、これであんたが委員長だよ。"
52270-166 = "今まで何百回も挑戦して、一度も勝てなかったあんたが……やっと私に勝ったんだ。"
52270-167 = "胸を張りなよ。これが目標だったんでしょ？"
52270-173 = "……ねえ。"
52270-174 = "……なんで、そんな顔で泣いてるの？"
52270-176 = "ごめんね……。"
52270-179 = "本当にごめんなさい……アヤメ。"
52270-180 = "今まであなたのことを、ちゃんと見れてなくて……ずっと隣で悲鳴を上げてたのに、聞こえなかった……。"
52270-184 = "アヤメも、助けて欲しい、って、手を伸ばしてたことに気づけなかった……！"
52270-185 = "アヤメはずっと苦しんでいたのに、頼ってばかりで……ごめんなさい。"
52270-186 = "私は、アヤメに比べたら何にもないけど……この手だけは、絶対に……もう離さないよ。"
52270-187 = "アヤメの苦しみも一緒に、抱えていくから……。"
52270-191 = "本当に、本当にごめん……ね……アヤメ……。"
52270-196 = "やっぱり、私は――"
52270-197 = "あんたのその泣き顔が……大嫌いだったよ。"
52270-201 = "次回;ともに芽吹きを待ち侘びて"
