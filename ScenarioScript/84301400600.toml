[translation]
84301400600-5 = "聞こえるかしら。"
84301400600-6 = "チップや部品の検証なら、こちらに任せてもらえるかしら。"
84301400600-7 = "ちょうど私からも協力を要請しようと思っていたところだ。"
84301400600-8 = "確認して欲しい物がある。"
84301400600-9 = "ええ。"
84301400600-14 = "隠れ家まで持ってこられるかしら。"
84301400600-15 = "構わないが……それではエンジニア部の無実を証明できないのでは？"
84301400600-16 = "アバンギャルド君に適当なウイルスを入れておくわ。運悪くウイルスに感染してしまった……それであれば、少なくとも悪者はいなくなるでしょう？"
84301400600-17 = "何者かの作為的な行為によると知れ渡れば、EXPOの継続に影響が出てしまうもの。"
84301400600-18 = "君が非難される可能性は？"
84301400600-22 = "いま、それを気にする必要があるのかしら？"
84301400600-23 = "優先順位を履き違えてはならないわ……詳細は貴女が戻ってから、改めて。"
84301400600-27 = "……ガイドの二人には申し訳ないね。"
84301400600-28 = "とはいえ……。"
84301400600-29 = "リオ。"
84301400600-30 = "まだ君は……。"
