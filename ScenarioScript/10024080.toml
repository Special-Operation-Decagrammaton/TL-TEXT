[translation]
10024080-1 = "第8話;[ruby=はじゃけんしょう]破邪顕正[/ruby]"
10024080-6 = "ぐっ！？"
10024080-7 = "うわっ！？"
10024080-15 = "ルミ会長、制圧完了しました。"
10024080-16 = "はぁはぁ……酷い腕だな。銃が泣いてるぞ？"
10024080-17 = "そちらこそ、そんな体力でよく執行部長が務まりますね。"
10024080-18 = "カンフー映画しか見てないような脳筋に言われて[ruby=たま]堪[/ruby]るものか！"
10024080-19 = "あなたこそ、どうせマフィア映画ばっかりのくせに！"
10024080-20 = "[s] （口を挟むと面倒なことになりそうだ……）"
10024080-21 = "よしっ。これで一件落着、かな。"
10024080-22 = "サヤ、聞いておきたいことがあるんだっけ？"
10024080-28 = "あ、そうだったのだ。"
10024080-29 = "お前たちは、誰の指示で動いてるのだ？"
10024080-31 = "！？"
10024080-32 = "！？"
10024080-33 = "しっ、知らない！#n本当だ、何も知らないっ！！"
10024080-35 = "……。"
10024080-36 = "いや、お前たちが言わなくても分かってるのだ……"
10024080-37 = "「[ruby=ごじん]五塵[/ruby]の[ruby=びこう]獼猴[/ruby]」――[ruby=しんたに]申谷[/ruby]カイだろう？"
10024080-39 = "……！"
10024080-40 = "なっ、何のことだか……ッ！"
10024080-42 = "その反応じゃ、正解だと言ってるようなものなのだ。"
10024080-44 = "いったい誰なの？#nその「五塵の獼猴」って。"
10024080-45 = "私も初めて聞きますね。"
10024080-46 = "ちょ、ちょっと待ってくれ！"
10024080-47 = "「五塵の獼猴」だと！？"
10024080-48 = "かつて、錬丹術研究会の会長だった……あの申谷カイのことか？"
10024080-50 = "知ってる人がいて良かったのだ。"
10024080-51 = "そう、錬丹術研究会の元会長で――「七囚人」の1人。"
10024080-52 = "秘薬の密輸に関与した容疑で、永久に山海経から追放されたのだ。"
10024080-53 = "[s] \"七囚人ってことは、たしか……\""
10024080-55 = "うん……7人とも、脱獄したんだよね。"
10024080-56 = "そのうちの1人が、今回の事件の黒幕とは。"
10024080-57 = "私たちが想像していたよりも、規模が大きくなってきましたね。"
10024080-59 = "さあ、白状するのだ！#n申谷カイと、どんな取引をしたのだ！"
10024080-61 = "……私たちも、詳しくは知らない。"
10024080-62 = "受け子に過ぎないからな。#n指定の場所まで「萬年参」を運んで、報酬を受け取っただけ。"
10024080-63 = "（カイさんのことは話したらマズいよな？）"
10024080-64 = "（当たり前だろ！それだけは何としても隠し通さないと、私たちの身が……）"
10024080-66 = "うう……こいつ等、絶対に何か知ってるはずなのだ……！"
10024080-68 = "ここは私に任せてくれ。"
10024080-69 = "お前たちの言葉が本当かどうかは、玄龍門の名において詳らかにしてやろう。"
10024080-82 = "錬丹術研究会にも……複雑な過去があったんだね。"
10024080-83 = "……山海経の多くは、何かしらの事情を抱えていますから。#n私たち、玄武商会も……"
10024080-84 = "その話は今度にしよっか、レイジョ。#nこれから大変なことになる人が、まさに目の前に居るわけだし。"
10024080-85 = "……玄龍門のことを言ってるのか？"
10024080-86 = "あれ、違った？「萬年参」の密輸が、玄龍門の身内問題だって知られたら大騒ぎになるよね。関与してる人がどれくらい居るのかだって、これから調べるわけだし……"
10024080-88 = "そ、それくらい言われなくても分かってる！"
10024080-89 = "[s] \"これからどうするの？\""
10024080-90 = "まずは、迅速に「萬年参」の回収をしなくてはな。"
10024080-91 = "それが終わり次第、「玄龍門」として責任を問う。#nいつまでも続く尋問に、果たして耐えられるのか……"
10024080-92 = "玄龍門の名を汚した罪は軽くないぞ……フッフッフ。"
10024080-93 = "何か言うべきことを忘れていませんか？"
10024080-94 = "うっ！？"
10024080-95 = "結局、「萬年参」の密輸犯は、玄龍門の構成員だったわけですが……"
10024080-96 = "そ、それは……玄龍門にも事情があってだな……"
10024080-97 = "玄龍門の事情など、玄武商会からすれば関係ありません。"
10024080-99 = "それとも、何か？ご自身の管轄外だから関係ないとでも？#n最初にうちの言い分を聞かなかったのは、玄龍門の方だったかと。"
10024080-101 = "っ、その……そうかもしれないが、言い方ってものがあるだろう！"
10024080-102 = "私たちが玄龍門を訪れた時の扱いを忘れたとは言わせませんよ？"
10024080-103 = "き、聞いてくれ。#nこの件は、玄龍門が責任を持って真相を……！"
10024080-104 = "玄龍門の責任など、私たちにとってはどうでもいい事です。"
10024080-105 = "だが、あなた達が玄武商会にしてきた不当な扱いを、忘れることはない。#nそれとも、今ここで謝罪してくれるのですか？"
10024080-106 = "そ、それは……"
10024080-107 = "私だけで決められる問題ではない！#nだが、決めつけたことは悪かったと思っている！改めて謝罪の場を設けさせてくれ！"
10024080-109 = "後でちゃんと、場を用意するから……それまで待っていてくれ！"
10024080-115 = "逃げられてしまいました……！あんなの謝罪ではありません！"
10024080-116 = "あはは……まあ、あんまり追い詰めすぎてもね。"
10024080-117 = "会長は、これで良かったのですか？#n自分たちの責任だと分かった途端……"
10024080-118 = "いいのいいの。あたしは無実が証明できれば、それで十分だよ。"
10024080-119 = "玄龍門には、どうせ後で行くことになるし。"
10024080-120 = "それに、うまく転べば商売がやりやすくなるかもしれないからね。"
10024080-121 = "サヤ、来てくれて助かったよ。ありがとう。"
10024080-122 = "いつもご馳走になってるから、これくらい何でもないのだ！#nでも、ぼく様も早く帰って、色々と対策を……"
10024080-123 = "心配になる気持ちも分かるけど、まずは帰ってお祝いしよっか。"
10024080-124 = "先生もありがとう、お疲れ様。"
10024080-125 = "[s] \"ルミこそ、お疲れ様。\""
10024080-126 = "ふふっ、ありがとう。#nそうだ、帰ったらお礼に、新しい試作品を振る舞ってあげる！"
10024080-127 = "はい！？#nそれのどこがお礼に……っ、何でもありません！"
10024080-129 = "（会長の試作品は……）"
10024080-130 = "（いつも、言葉では言い表せない謎の味がして……）"
10024080-135 = "[ns] \"ルミの料理、早く食べたいね！\""
10024080-136 = "新作……！チーズ南煎丸子をかけた焼き刀削麺みたいな奴か！？#n思い出しただけでも、お腹が空いてきたのだ！！"
10024080-138 = "（やはり、ここは2人に本当のことを伝えるべきでは……！しかし、私の口からルミ会長の料理を悪く言うのは……！）"
10024080-139 = "（だが、玄武商会の恩人に、あんな料理を食べさせるわけにも……！）"
10024080-140 = "（うう、私は一体どうすれば……）"
10024080-146 = "そう……「萬年参」の密輸が、もう見つかってしまったとは。"
10024080-147 = "あの子たちがねぇ……ククッ、成長しているようで、先輩としては喜ばしい限りさ。#nいや、それともシャーレの「先生」の力なのかね。"
10024080-148 = "でも、残念なことに後一歩遅かった。#nすでに新薬の実験は終えたところさ。"
10024080-149 = "欲を言えば、もう少しばかり実験データを集めたかったところではあるけど……"
10024080-153 = "まあ、構わないさ。これもまた一興。#nここは後輩の成長に免じて、大人しく引き下がろうじゃあないか。"
10024080-154 = "ククッ、あの子たちの顔を見るついでに、#n今度は山海経まで「挨拶」に行くとしようかな。"
10024080-155 = "それに……「先生」との出会いが、#n一体どんな化学反応を起こすのかも気になるところだねぇ。"
10024080-156 = "先生、先生か……"
10024080-157 = "いつ以来だろうか、こんなにも心が踊るのは――ククッ。"
