[translation]
10024080-1 = "Episódio 8: Haja Kensho"
10024080-6 = "Guh!?"
10024080-7 = "Uwah!?"
10024080-15 = "Presidente Rumi, supressão concluída."
10024080-16 = "Haa, haa... Que técnica terrível. Sua arma está chorando, sabia?"
10024080-17 = "Diz a pessoa que mal consegue se manter de pé e ainda quer ser Chefe de Execução."
10024080-18 = "Não vou aceitar desaforo de uma cabeça-oca que só assiste filme de kung fu!"
10024080-19 = "Você que diz isso, sendo que só assiste filme de máfia!"
10024080-20 = "[s] (Se eu me meter nisso, vai dar problema...)"
10024080-21 = "Muito bem. Acho que por hoje é só."
10024080-22 = "Saya, você não tinha algo para perguntar?"
10024080-28 = "Ah, é verdade."
10024080-29 = "Por ordem de quem vocês estão agindo?"
10024080-31 = "!?"
10024080-32 = "!?"
10024080-33 = "Eu, eu não sei!#nÉ verdade, não sei de nada!!"
10024080-35 = "..."
10024080-36 = "Não, mesmo que vocês não digam, eu já sei..."
10024080-37 = "O \"Macaco dos Cinco Pós\"... É a Shintani Kai, não é?"
10024080-39 = "...!"
10024080-40 = "Do, do que você está falando...!"
10024080-42 = "Essa reação é praticamente uma confissão."
10024080-44 = "Quem é ela afinal?#nEsse tal de \"Macaco dos Cinco Pós\"."
10024080-45 = "Eu também ouço esse nome pela primeira vez."
10024080-46 = "E-espera um pouco!"
10024080-47 = "\"Macaco dos Cinco Pós\"!?"
10024080-48 = "Você está falando daquela Shintani Kai... que já foi presidente do Clube de Pesquisa de Alquimia?"
10024080-50 = "Que bom que alguém aqui conhece."
10024080-51 = "Sim, a ex-presidente do Clube de Pesquisa de Alquimia e uma das \"Sete Prisioneiras\"."
10024080-52 = "Ela foi banida permanentemente de Shanhaijing por suspeita de envolvimento no contrabando de drogas secretas."
10024080-53 = "[s] \"Sete Prisioneiras... se não me engano...\""
10024080-55 = "Sim... todas as sete escaparam da prisão, não foi?"
10024080-56 = "E pensar que uma delas é a mentora deste incidente."
10024080-57 = "A escala disso tudo ficou muito maior do que imaginávamos."
10024080-59 = "Vamos, confesse logo!#nQue tipo de acordo você fez com Shintani Kai!"
10024080-61 = "...Nós também não sabemos os detalhes."
10024080-62 = "Somos apenas mulas. Só transportamos o \"Ginseng Milenar\" até o local designado e recebemos o pagamento."
10024080-63 = "(Não é perigoso falar da Kai-san?)"
10024080-64 = "(Claro que é! Temos que esconder isso a todo custo, ou nossas vidas estarão em risco...)"
10024080-66 = "Ugh... essas duas definitivamente sabem de algo...!"
10024080-68 = "Deixe isso comigo."
10024080-69 = "Em nome da Genryumon, vou descobrir se o que vocês dizem é verdade ou não."
10024080-82 = "O Clube de Pesquisa de Alquimia também tinha... um passado complicado, né."
10024080-83 = "...Muitos em Shanhaijing carregam algum tipo de fardo.#nNós, da Associação Comercial Genbu, também..."
10024080-84 = "Vamos deixar esse assunto para depois, Reijo.#nAfinal, temos alguém bem aqui na nossa frente que vai passar por maus bocados."
10024080-85 = "...Você está falando da Genryumon?"
10024080-86 = "Ué, não? Se descobrirem que o contrabando do \"Ginseng Milenar\" é um problema interno da Genryumon, vai ser um escândalo. E ainda temos que investigar quantas pessoas estão envolvidas..."
10024080-88 = "I-isso eu já sei, não precisa me dizer!"
10024080-89 = "[s] \"O que vamos fazer agora?\""
10024080-90 = "Primeiro, precisamos recuperar o \"Ginseng Milenar\" o mais rápido possível."
10024080-91 = "Assim que isso terminar, cobrarei a responsabilidade da \"Genryumon\".#nSerá que eles conseguirão aguentar um interrogatório que dura para sempre...?"
10024080-92 = "O crime de manchar o nome da Genryumon não é leve... Hehehe."
10024080-93 = "Você não esqueceu de dizer algo?"
10024080-94 = "Hã!?"
10024080-95 = "No fim das contas, o contrabandista do \"Ginseng Milenar\" era um membro da Genryumon, não é..."
10024080-96 = "I-Isso é... A Genryumon tem suas circunstâncias..."
10024080-97 = "As circunstâncias da Genryumon não importam para a Associação Genbu."
10024080-99 = "Ou será que não? Está dizendo que não importa porque está fora da sua jurisdição?#nAcho que foi a Genryumon quem não quis ouvir o nosso lado primeiro."
10024080-101 = "Tsc, isso... pode até ser, mas existe um jeito de falar as coisas!"
10024080-102 = "Não me diga que esqueceu de como fomos tratados quando visitamos a Genryumon?"
10024080-103 = "E-Escute.#nEste caso, a Genryumon assumirá a responsabilidade de descobrir a verdade...!"
10024080-104 = "A responsabilidade da Genryumon não nos interessa nem um pouco."
10024080-105 = "Mas não esqueceremos o tratamento injusto que vocês deram à Associação Genbu.#nOu será que vai se desculpar aqui e agora?"
10024080-106 = "I-Isso é..."
10024080-107 = "Não é um problema que eu possa decidir sozinho!#nMas admito que foi errado tirar conclusões precipitadas! Deixem-me preparar uma ocasião para pedir desculpas formalmente!"
10024080-109 = "Vou preparar o local adequadamente depois... espere até lá!"
10024080-115 = "Eles fugiram...! Aquilo não foi um pedido de desculpas!"
10024080-116 = "Ahaha... bem, não adianta pressionar demais também."
10024080-117 = "Presidente, isso foi o suficiente?#nAssim que eles perceberam que a responsabilidade era deles..."
10024080-118 = "Está tudo bem. Para mim, basta que nossa inocência tenha sido provada."
10024080-119 = "De qualquer forma, teremos que ir à Genryumon mais tarde."
10024080-120 = "Além disso, se as coisas correrem bem, talvez fique mais fácil fazer negócios."
10024080-121 = "Saya, obrigada por vir, você me ajudou muito."
10024080-122 = "Como você sempre me convida para comer, isso não é nada!#nMas eu também preciso voltar logo para tomar várias medidas..."
10024080-123 = "Entendo que esteja preocupada, mas vamos voltar e comemorar primeiro."
10024080-124 = "Sensei, obrigado também, bom trabalho."
10024080-125 = "[s] \"Lumi, bom trabalho para você também.\""
10024080-126 = "Fufu, obrigada.#nAh, quando voltarmos, vou preparar um novo protótipo como agradecimento!"
10024080-127 = "Hein!?#nComo isso seria um agradecimento... ah, não é nada!"
10024080-129 = "(O protótipo da presidente é...)"
10024080-130 = "(Sempre tem um sabor misterioso que não dá para descrever com palavras...)"
10024080-135 = "[ns] \"Mal posso esperar para comer a comida da Lumi!\""
10024080-136 = "Uma novidade...! Seria algo como um macarrão frito com almôndegas de carne com queijo!?#nSó de lembrar, já estou com fome!!"
10024080-138 = "(Afinal, não deveria contar a verdade para os dois aqui...! Mas eu não posso falar mal da comida da presidente Lumi!)"
10024080-139 = "(Mas também não posso deixar que sirvam aquela comida para os benfeitores da Associação Genbu...!)"
10024080-140 = "(Ugh, o que eu devo fazer...)"
10024080-146 = "Então... o contrabando do \"Ginseng Milenar\" já foi descoberto."
10024080-147 = "Aqueles garotos, hein... Hehe, parece que estão crescendo, como veterana, fico feliz.#nNão, ou será que é o poder do \"Sensei\" do Schale?"
10024080-148 = "Mas, infelizmente, chegaram um passo atrasados.#nJá terminei os experimentos com o novo medicamento."
10024080-149 = "Se eu pudesse pedir algo, teria gostado de coletar um pouco mais de dados experimentais, mas..."
10024080-153 = "Bem, não importa. Isso também é interessante.#nVou recuar silenciosamente, em consideração ao crescimento dos meus juniores."
10024080-154 = "Hehe, já que vou ver o rosto deles, acho que vou até Shanhaijing para fazer uma \"visita\" da próxima vez."
10024080-155 = "Além disso... estou curioso para ver que tipo de reação química o encontro com o \"Sensei\" vai causar."
10024080-156 = "Sensei, Sensei, é..."
10024080-157 = "Faz quanto tempo que não fico tão empolgado assim? — Hehe."
