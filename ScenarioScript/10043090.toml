[translation]
10043090-1 = "Episódio 9: Treinamento de Finalização"
10043090-2 = "（O dia seguinte após a histórica grande vitória...）"
10043090-3 = "（No dia seguinte...）"
10043090-9 = "Pista de Atletismo do Millennium"
10043090-12 = "Ah, Sensei!"
10043090-13 = "[s] \"Rei, todo esse equipamento de beisebol é...?\""
10043090-14 = "Recebemos como um presente de agradecimento dos Corgi Braves!"
10043090-15 = "Eles até me ofereceram um contrato como jogadora, mas..."
10043090-16 = "Eu recusei, é claro!"
10043090-17 = "[s] \"Ser uma jogadora exclusiva traria muita pressão, né.\""
10043090-21 = "Afinal, eu sou a rebatedora número 4 do clube de beisebol do Millennium, Nomasa Rei!"
10043090-22 = "Como alguém responsável pela reconstrução do clube de beisebol do Millennium, não posso ir para outro time!"
10043090-23 = "[s] \"Isso mesmo! Temos que nos esforçar!\""
10043090-24 = "Vamos usar isso com muita gratidão no clube de beisebol."
10043090-25 = "...O orçamento do clube estava bem apertado, afinal."
10043090-26 = "Ainda assim, não consigo acreditar!#nQue eu, de todas as pessoas..."
10043090-27 = "...tenha conseguido rebater um home run!"
10043090-28 = "Até agora, eu não conseguia nem durante os treinos!"
10043090-29 = "[s] \"Foi assim, é...?\""
10043090-33 = "Por que está me olhando desse jeito?"
10043090-34 = "Eu bati aquele home run ontem e renasci!"
10043090-35 = "Observe, Sensei!"
10043090-36 = "A partir de hoje, começa a ascensão da rebatedora mais forte do Millennium!"
10043090-40 = "Venha, máquina de arremesso!"
10043090-41 = "Não importa que tipo de bola curva seja..."
10043090-42 = "Eu vou rebater todas elas!"
10043090-47 = "（Rei segue para o campo de treino cheia de entusiasmo...）"
10043090-65 = "（...e foi derrotada pela máquina de arremesso）"
10043090-69 = "P-por que!?"
10043090-74 = "Não, perder tudo bem, mas!!"
10043090-75 = "Minha média de rebatidas caiu de 0,080 para 0,079!"
10043090-76 = "[s] \"Bem... talvez você esteja colocando força demais nos ombros?\""
10043090-77 = "E-esse é um conselho clássico, mas... ah, que desânimo...!"
10043090-82 = "Vocês dois, então estavam aqui."
10043090-83 = "Senpai...?"
10043090-85 = "[ns1] \"Bom dia, Sumire.\"\n[ns2] \"Vejo que gostou dessa roupa.\""
10043090-88 = "Sim."
10043090-89 = "Será que é por causa do jogo de ontem?"
10043090-93 = "Eu também... fiquei emocionada com aquele home run."
10043090-94 = "Não queria esquecer aquele momento, e quando percebi..."
10043090-95 = "Já tinha trocado de roupa."
10043090-96 = "Comparado ao traje de treino, é um pouco mais difícil de se mover, mas..."
10043090-97 = "Não são apenas os números que melhoram o desempenho."
10043090-98 = "[s] \"Faz sentido!\""
10043090-99 = "Além disso..."
10043090-100 = "Aprendi algo importante ontem."
10043090-105 = "\"O excesso é tão ruim quanto a falta.\""
10043090-109 = "[ns] \"De fato, tudo em excesso faz mal.\""
10043090-113 = "...Sim."
10043090-114 = "A confusão de ontem foi causada pelo meu amor excessivo pelo beisebol."
10043090-115 = "É como um overtraining nos treinos."
10043090-116 = "Se você exagerar no treino, a fadiga acaba se acumulando."
10043090-117 = "Percebi isso mais uma vez."
10043090-118 = "[s3] \"Aprender com essas experiências é...\"\n[s4] \"...o que torna a Sumire maravilhosa.\""
10043090-121 = "Fufu, obrigada, Treinador."
10043090-125 = "Estou... recuperada!"
10043090-126 = "Rei-san, você descansou o suficiente?"
10043090-127 = "Sim!"
10043090-128 = "Como a rebatedora número 4 que lidera o clube de beisebol do Millennium..."
10043090-129 = "Não tenho tempo para ficar parada!"
10043090-130 = "Esse é o espírito! Rei-san!"
10043090-131 = "Eu também continuarei te apoiando com força total, como sempre!"
10043090-136 = "……Ué?"
10043090-137 = "Sinto um... aperto no peito..."
10043090-138 = "……Está preocupada com algo? Nesses momentos, o melhor é se exercitar para relaxar."
10043090-143 = "Hoje, um menu de fortalecimento de resistência seria ótimo."
10043090-148 = "E-então, é que..."
10043090-149 = "Nós acabamos de terminar o jogo ontem..."
10043090-150 = "Pelo menos hoje... ah...!"
10043090-154 = "……!"
10043090-163 = "Para onde você está indo?"
10043090-164 = "A academia é por ali, Rei-san?"
10043090-165 = "……"
10043090-170 = "Aaaaaah...!"
10043090-171 = "Eu não quero mais treinar!"
10043090-174 = "[ns5] \"E-eu lembrei de um compromisso, então...\"\n[ns6] \"Estarei sempre torcendo pela Rei e pela Sumire!\""
10043090-179 = "O que está dizendo, Sensei?"
10043090-180 = "Vamos lá—"
10043090-181 = "Membros, a academia é por ali!"
10043090-182 = "[s] \"!!!!\""
10043090-184 = "[ns] \"Chega de treino...\""
10043090-187 = "—Eu não aguento mais...!"
10043090-188 = "Play Ball! ~Mirando no Home Run com bases lotadas~"
