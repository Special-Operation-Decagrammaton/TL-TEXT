[translation]
10043090-1 = "第9話;仕上げのトレーニング"
10043090-2 = "（歴史的大勝利から一夜明け……）"
10043090-3 = "（翌日……）"
10043090-9 = "ミレニアム陸上トラック"
10043090-12 = "あ、先生！"
10043090-13 = "[s] \"レイ、この大量の野球用品は……？\""
10043090-14 = "コーギー・ブレーブスから謝礼としていただいたんです！"
10043090-15 = "選手として契約したいというお話もありましたが……。"
10043090-16 = "それは、流石にお断りしました！"
10043090-17 = "[s] \"専属となると、負担も大きいもんね。\""
10043090-21 = "そもそも、私はミレニアム野球部の4番バッター、[ruby=のまさ]野正[/ruby]レイですから！"
10043090-22 = "ミレニアム野球部の復興を担う者として、他のチームには行けません！"
10043090-23 = "[s] \"そうだ！がんばらないとね！\""
10043090-24 = "これは、野球部でありがたく使わせていただきます。"
10043090-25 = "……部費もかつかつでしたしね。"
10043090-26 = "それにしても、まだ信じられません！#nまさか私が――"
10043090-27 = "――ホームランを打ったなんて！"
10043090-28 = "いままで、練習中ですら打てなかったのに！"
10043090-29 = "[s] \"そうだったんだ……。\""
10043090-33 = "どうしてそんな目で見るんですか？"
10043090-34 = "私は昨日、ホームランを打って生まれ変わったんですから！"
10043090-35 = "見ていてください、先生！"
10043090-36 = "今日から、ミレニアム最強打者の活躍が始まりますよ！"
10043090-40 = "さあ掛かってこい、ピッチングマシン！"
10043090-41 = "どんな変化球だろうと――"
10043090-42 = "全部打ち返してやるーっ！"
10043090-47 = "（レイは意気揚々と練習場へ向かっていき……）"
10043090-65 = "（……ピッチングマシンに大敗していた）"
10043090-69 = "な、なぜぇ！？"
10043090-74 = "いや、負けるのはまだいいけど！！"
10043090-75 = "打率が8分から7分9厘に下がってます！"
10043090-76 = "[s] \"えっと……肩に力が入りすぎ、とか？\""
10043090-77 = "て、定番のアドバイスではありますが……がくっ……！"
10043090-82 = "お二人とも、ここにいたんですね。"
10043090-83 = "先輩……？"
10043090-85 = "[ns1] \"おはよう、スミレ。\"\n[ns2] \"その服が気に入ったんだね。\""
10043090-88 = "ええ。"
10043090-89 = "やはり昨日の試合の影響でしょうか。"
10043090-93 = "私も……あのホームランに感動しました。"
10043090-94 = "あの瞬間を忘れたくないと思い、気付けば――"
10043090-95 = "この服に着替えていました。"
10043090-96 = "トレーニングウェアと比べ、動きづらい部分もありますが……。"
10043090-97 = "パフォーマンスを向上させるのは、数字だけではありませんから。"
10043090-98 = "[s] \"それもそうだね！\""
10043090-99 = "それに――"
10043090-100 = "昨日は大切なことを学びました。"
10043090-105 = "「過ぎたるは猶及ばざるが如し」です。"
10043090-109 = "[ns] \"たしかに、何事もやりすぎはよくないね。\""
10043090-113 = "……はい。"
10043090-114 = "昨日の騒ぎは、野球への度を過ぎた愛情が原因です。"
10043090-115 = "まるで、トレーニングのオーバーワークのように。"
10043090-116 = "トレーニングも度を過ぎれば、疲労が蓄積してしまうもの。"
10043090-117 = "改めて、そのことに気付かされました。"
10043090-118 = "[s3] \"そういう体験から学んでいくのが――\"\n[s4] \"スミレの素敵なところだね。\""
10043090-121 = "ふふっ、ありがとうございます。トレーナー。"
10043090-125 = "復活……しました！"
10043090-126 = "レイさん、休憩は十分ですか？"
10043090-127 = "はい！"
10043090-128 = "ミレニアム野球部を率いる4番バッターとして……。"
10043090-129 = "立ち止まっている暇はありません！"
10043090-130 = "その意気です！レイさん！"
10043090-131 = "私もこれまでと同じく、全力でサポートします！"
10043090-136 = "……あれ？"
10043090-137 = "なにか……胸騒ぎが……。"
10043090-138 = "……不安なことでも？そんなときこそ、体を動かしてリラックスしましょう。"
10043090-143 = "今日は持久力強化メニューがいいですね。"
10043090-148 = "そ、そのですね……？"
10043090-149 = "昨日試合を終えたばかりですし……。"
10043090-150 = "今日……くらいはぁ……！"
10043090-154 = "……っ！"
10043090-163 = "どこへ行くのですか？"
10043090-164 = "ジムはあちらですよ、レイさん？"
10043090-165 = "……。"
10043090-170 = "ああぁぁぁ……！"
10043090-171 = "トレーニングもうやだあぁぁっ！"
10043090-174 = "[ns5] \"わ、私は用事を思い出したから……\"\n[ns6] \"レイとスミレのことは、いつも応援してるよ！\""
10043090-179 = "何を言っているのですか、先生？"
10043090-180 = "さぁ――"
10043090-181 = "[ruby=・]会[/ruby][ruby=・]員[/ruby]の皆さま、ジムはあちらです！"
10043090-182 = "[s] \"！！！！\""
10043090-184 = "[ns] \"もうトレーニングは――\""
10043090-187 = "――こりごりだあぁぁ……！"
10043090-188 = "プレイボール！～目指せ！満塁ホームラン～"
