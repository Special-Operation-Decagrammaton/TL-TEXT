[translation]
1103-1 = "gosto imparcial"

1103-2 = "(Todos os membros do Grupo de Pesquisa Gourmet visitaram a Veritas no Millennium)"

1103-3 = "...Então, quando as pessoas com o receptor OR6A4 sentem gosto de menta, tem gosto de sabonete ou xampu."

1103-4 = "Isso ocorre porque [ruby=SNP]polimorfismo de nucleotídeo único[/ruby]――"

1103-5 = "……Eu vejo. Em suma, é correto dizer que o tratamento é impossível?"

1103-6 = "...Não acho que gostar de hortelã seja uma doença. É necessário passar pelo trabalho do “tratamento”?"

1103-7 = "Isso mesmo! É terrível que você esteja sendo tratado como uma pessoa doente!"

1103-8 = "Não é disso que estou falando! É um problema sério! ? Pode haver algo errado com seu olfato ou paladar!"

1103-9 = "Quando se descobrir que se trata de um problema patológico, já terá se tornado um obstáculo fatal à vida diária."

1103-10 = "Isso é realmente um grande problema...?"

1103-11 = "O início disso remonta a 30 anos..."

1103-12 = "Muito atrás! Quantas horas você vai falar? ?"

1103-13 = "Suspirar. Ontem, quando eu estava fazendo e vendendo suco de menta, o comitê de moral pública me pegou e me colocou na prisão. Simplificando, é assim que parece."

1103-14 = "Suco de menta...? O que é aquilo..."

1103-15 = "Tenho certeza que é uma bebida incomum, mas não acho que seja um problema que possa ser detectado pelo comitê disciplinar..."

1103-16 = "Isso mesmo! ? É tudo conspiração deles! Boa sorte com a discriminação da hortelã!"

1103-17 = "O problema era que, embora fosse anunciado como suco de menta, era apenas água com pasta de dente dissolvida."

1103-18 = "Ah, isso faz sentido."

1103-19 = "! ?"

1103-20 = "Iori também veio em minha direção com uma expressão terrível no rosto, dizendo: ``Isso não pode ser tolerado.''"

1103-22 = "(Iori: Membro do Comitê Disciplinar da Gehenna Academy)"

1103-24 = "(Informações de referência: Iori gosta de alimentos e bebidas à base de menta)"

1103-26 = "Tem gosto de suco de menta... mas faz bem aos dentes... e é barato..."

1103-27 = "Quem beberia isso? ! Não tente ser pago e vender para todo mundo só porque você costuma beber!"

1103-28 = "De qualquer forma, Izumi provavelmente não possui nenhum receptor, então pode-se inferir que ela acha o sabor da menta delicioso."

1103-29 = "Se tivéssemos receptores, reconheceríamos que tem gosto de xampu ou sabonete."

1103-30 = "Resumindo, é um problema congênito e a percepção da hortelã é diferente."

1103-32 = "Veja bem, por mais que eu ache o xampu e o sabonete deliciosos, não vou comê-los nem bebê-los."

1103-33 = "Eu realmente acho isso uma delícia!"

1103-34 = "Hum, parece que sim..."

1103-35 = "まあ、せっかくここまで来てくれたことだし。"

1103-36 = "Devo verificar se cada um tem receptores?"

1103-37 = "Compreender quem você é pode levar à tolerância para com os outros."

1103-38 = "Ah, isso parece divertido☆"

1103-39 = "Bom, isso significa que podemos descobrir se cada pessoa acha que menta tem gosto de xampu, certo?"

1103-40 = "Esta pode ser uma tentativa interessante em busca do sabor definitivo."

1103-43 = "Pois bem, abra a boca. Acabará em breve."

1103-45 = "(depois de um tempo......)"

1103-47 = "Os resultados já foram divulgados. Primeiro de tudo, Akari... não tem receptores."

1103-48 = "Ah, é mesmo? Então, é por causa dos meus preconceitos que não gosto tanto de hortelã?"

1103-49 = "Talvez seja esse o caso, e pode ser uma boa ideia pensar novamente e tentar uma vez."

1103-52 = "Em seguida, Haruna... ela tem receptores."

1103-53 = "Para Haruna, a hortelã tem gosto de xampu ou sabonete."

1103-54 = "Como esperado. Tento ter uma atitude igual em relação a todos os sabores, mas menta era um sabor que eu não conseguia tolerar."

1103-55 = "Afinal, era uma questão de DNA. Claro, não discrimino a hortelã por esse motivo."

1103-58 = "Junko não tem receptores."

1103-59 = "Bem, eu posso comer hortelã totalmente."

1103-60 = "E então há Izumi."

1103-61 = "Izumi provavelmente não tem receptores, já que ela adora hortelã."

1103-63 = "Sim! Menta é uma delícia! Não entendo por que todo mundo odeia algo tão delicioso."

1103-65 = "Izumi-san... diz que você tem receptores..."

1103-67 = "...! ?"

1103-68 = "Ah, ah! ?"

1103-69 = "Então quando Izumi come hortelã, deve ter gosto de xampu ou sabonete...?"

1103-70 = "……falta?"

1103-72 = "Yeah, yeah! ? Isso tinha gosto de xampu! ?"

1103-73 = "Eu não conseguia entender quando estava comendo! ? Quero dizer, você acabou de dizer que o shampoo não tem um gosto bom! ?"

1103-74 = "Hmm... bem, provavelmente há pessoas neste mundo que gostam do sabor do xampu e do sabonete..."

1103-75 = "Eu me pergunto se existe...? Provavelmente há um..."

1103-76 = "O que você está falando? Não pode haver nenhuma maneira! ?"

1103-77 = "Por que tem um gosto delicioso quando tem gosto de xampu? ? Você é um idiota? ! Você é um idiota! ! !"

1103-79 = "Uau, isso tinha gosto de xampu..."

1103-81 = "Isso significa... mesmo que você beba shampoo disponível no mercado, o sabor é o mesmo! ?"

1103-82 = "Você é realmente estúpido! ? ! ?"

1103-83 = "gosto imparcial"

