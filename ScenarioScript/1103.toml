[translation]
1103-1 = "偏見なき味覚"
1103-2 = "（ミレニアムのヴェリタスを訪問した、美食研究会一同）"
1103-3 = "……というわけで、受容体OR6A4がある人はミントを口にした時に、石鹸とかシャンプーみたいな味に感じる。"
1103-4 = "これは[ruby=SNP]一塩基多型[/ruby]だから――"
1103-5 = "……なるほど。要するに、治療は不可能ということでよろしいでしょうか？"
1103-6 = "……別に、ミントが好きなのは病気ではないと思うよ。わざわざ「治療」する必要ある？"
1103-7 = "そうだよ！病人扱いだなんてひどい！"
1103-8 = "そういう話じゃないんだってば！深刻な問題なんだよ！？嗅覚か味覚に異常があるのかもしれない！"
1103-9 = "病理学的に問題だと発覚する頃には、もう日常生活で致命的な支障になっているでしょうし。"
1103-10 = "これ、そんなに問題なの……？"
1103-11 = "ことの始まりは30年前に遡りますわ……。"
1103-12 = "遡りすぎ！何時間話すつもりなの！？"
1103-13 = "はあ。昨日、ミントジュースっていうのを作って売ってたら、風紀委員会に見つかって留置場に入れられたの。端的に言うとそんな感じ。"
1103-14 = "ミントジュース……？何それ……。"
1103-15 = "確かに変わった飲み物だとは思うけど、それが風紀委員に捕まるほどの問題だとは思えないね……。"
1103-16 = "そうよね！？全部あいつらの陰謀よ！ミント差別にはんたーい！"
1103-17 = "問題は、ミントジュースと謳っておきながら、ただお水に歯磨き粉を溶かしたものを売ってたことですね☆"
1103-18 = "ああ、それなら納得。"
1103-19 = "！？"
1103-20 = "イオリも「こんなの許されない」って言いながらすごい形相で向かってきたし……。"
1103-22 = "（イオリ：ゲヘナ学園の風紀委員会のメンバー）"
1103-24 = "（参考情報：イオリはミント系の飲食物が好き）"
1103-26 = "味はミントジュースそっくりなのに……歯にも良いし……安上がりだし……。"
1103-27 = "そんなの誰が飲むのよ！！あんたが普段飲んでるからってお金を貰ってみんなに売ろうとしないで！"
1103-28 = "とにかく、イズミさんは恐らく受容体がないから、ミントの味を美味しく感じてるんだと推察される。"
1103-29 = "受容体があったら、シャンプーとか石鹸みたいな味だと認知するはずだから。"
1103-30 = "要するに先天的な問題で、ミントに対する認識は違ってくる。"
1103-32 = "ほら、いくら私でもシャンプーとか石鹸を美味しい美味しいって食べたり飲んだりしないってばー。"
1103-33 = "これは本当に私が美味しいと思ってるの！"
1103-34 = "うーん、そういうことみたいですわね……。"
1103-35 = "まあ、せっかくここまで来てくれたことだし。"
1103-36 = "それぞれ受容体があるかどうか、しっかり確認してみる？"
1103-37 = "自分がどんな人間かを理解することで、他人に対する寛容さも生まれることもある。"
1103-38 = "あらっ、それは楽しそうですね☆"
1103-39 = "へ～、それってつまり、それぞれがミントをシャンプーみたいな味だと感じてるかどうかを調べられるってことだよね？"
1103-40 = "究極の味を追求するにあたって、面白い試みかもしれません。"
1103-43 = "じゃあ、口をあーんって開けて。すぐに終わるから。"
1103-45 = "（しばらくして……）"
1103-47 = "結果が出たよ。まずアカリさんは……受容体なし。"
1103-48 = "あらっ、そうなんですか？では私がミントをあまり好きでないのは、先入観で……？"
1103-49 = "そうかもしれない、あらためてそう思った上で一度食べてみるのも良いかもね。"
1103-52 = "次にハルナさん……受容体あり。"
1103-53 = "ハルナさんにとってミントは、シャンプーや石鹸と同じ味がするってことだね。"
1103-54 = "予想通りです。すべての味に対して平等な姿勢であろうと思っている私ですが、ミントはなかなかに許せない味でしたので。"
1103-55 = "やはりDNAの問題でしたね。もちろん、だからといってミントを差別したりはしませんわ。"
1103-58 = "ジュンコさんは受容体なし。"
1103-59 = "まあ、私は全然ミント食べられるから。"
1103-60 = "あとはイズミさん。"
1103-61 = "イズミは受容体無いでしょ、こんなにミント好きなんだし。"
1103-63 = "うん！ミント美味しい！どうしてこんな美味しい物をみんなが嫌がるのか分かんない。"
1103-65 = "イズミさん……受容体あり……って出てるけど。"
1103-67 = "……！？"
1103-68 = "え、はぁ！？"
1103-69 = "ということはイズミさんはミントを食べている時、それをシャンプーや石鹸の味のように感じているはず……？"
1103-70 = "……あら？"
1103-72 = "ええええええー！？あれってシャンプーの味だったの！？"
1103-73 = "食べてて分かんなかったの！？っていうかさっきシャンプーを美味しく感じるわけないって言ってたじゃん！？"
1103-74 = "うーん……まあ、世の中にはシャンプーとか石鹸の味が好きな人もいるだろうし……。"
1103-75 = "いるのかな……？多分いる、はず……。"
1103-76 = "何言ってんのよ！いるわけないでしょう！？"
1103-77 = "シャンプーの味がするのにどうして美味しく感じるわけ！？バカか！！バカでしょあんた！！！"
1103-79 = "へえーこれシャンプーの味だったんだ……。"
1103-81 = "っていうことは……市販のシャンプーとかを飲んでも、同じ味がするんだよね！？"
1103-82 = "本当にバカなの！？！？"
1103-83 = "偏見なき味覚"
