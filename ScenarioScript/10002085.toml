[translation]
10002085-1 = "第8話;海の家（２）"
10002085-2 = "海の家"
10002085-3 = "ぐああぁっ！？な、なぜお前たちまでここに……！？"
10002085-4 = "くそっ、この海の家とグルだったのか……！？"
10002085-5 = "せっかく作ってもらった料理に敬意を払わないなど、言語道断！反省してください！"
10002085-6 = "あ、あの料理に敬意だと……！？あんたら正気か！？"
10002085-7 = "ぐっ、覚えとけよ！次こそ、次こそは……！"
10002085-12 = "よ、良かったー……"
10002085-13 = "みんな本当にありがとう！おかげで助かったよ！"
10002085-14 = "危うく、大変なことになるところだった……！"
10002085-15 = "いえ、これくらいは正義実現委員会として当然のこと。お店が無事で良かったです。"
10002085-16 = "うん、それでもありがとね！"
10002085-17 = "お礼にっていうのもなんだけど……"
10002085-20 = "とりあえずこれ、みんなに！"
10002085-21 = "あ、これはタダだから！感謝の気持ち！さあ、グイっと飲んじゃって！"
10002085-22 = "見返りを求めていたわけではないのですが、ありがたく頂戴しますね。"
10002085-23 = "ところで、このジュース……かなり珍しい色をしていますね。"
10002085-24 = "良いから良いから、遠慮しないで！"
10002085-25 = "さっ、あなたも、そっちのあなたも！"
10002085-26 = "では、お店の無事を祝して！"
10002085-27 = "カンパ～イ！！"
10002085-34 = "乾杯！！"
10002085-35 = "[s] その灰色の飲み物を飲む。"
10002085-38 = "（……ごっくん）"
10002085-44 = "ぶふぉっっっっっっ！？！？"
10002085-45 = "（それが「なまこジュースのチョコレートがけ」だったと、目が覚めてから教えてもらった）"
