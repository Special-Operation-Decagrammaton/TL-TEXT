[translation]
10002085-1 = "Episódio 8; Casa de Praia (2)"
10002085-2 = "Casa de Praia"
10002085-3 = "Guaaaah!? Po-por que vocês também estão aqui...!?"
10002085-4 = "Droga, vocês estavam mancomunados com esta casa de praia...!?"
10002085-5 = "Não mostrar respeito pela comida que foi feita com tanto esforço é inaceitável! Reflita sobre isso!"
10002085-6 = "A-aquela comida merece respeito...!? Vocês estão loucas!?"
10002085-7 = "Grr, marquem minhas palavras! Na próxima, na próxima eu...! "
10002085-12 = "Ai, que alívio..."
10002085-13 = "Muito obrigada a todas! Graças a vocês, eu fui salva!"
10002085-14 = "Por pouco não aconteceu uma tragédia...!"
10002085-15 = "Não, isso é apenas o esperado do Comitê de Justiça. Fico feliz que a loja esteja a salvo."
10002085-16 = "Sim, mas ainda assim, obrigada!"
10002085-17 = "Como forma de agradecimento..."
10002085-20 = "Tomem, é para todas vocês!"
10002085-21 = "Ah, isso é por conta da casa! É um gesto de gratidão! Vamos, bebam tudo!"
10002085-22 = "Não estávamos esperando nada em troca, mas aceitaremos com gratidão."
10002085-23 = "A propósito, este suco... tem uma cor bem incomum, não é?"
10002085-24 = "Não se preocupe com isso, não seja tímida!"
10002085-25 = "Vamos, você também, e você ali!"
10002085-26 = "Então, um brinde à segurança da loja!"
10002085-27 = "Tim-tim!!"
10002085-34 = "Saúde!!"
10002085-35 = "[s] Beber a bebida cinzenta."
10002085-38 = "(...Gulp)"
10002085-44 = "Pffffffffffff!?!?"
10002085-45 = "(Só descobri que aquilo era 'suco de pepino-do-mar com cobertura de chocolate' depois que acordei)"
