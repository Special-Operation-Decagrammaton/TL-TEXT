[translation]
13420-1 = "Episódio 42; Epílogo (1)"
13420-2 = "Bom dia, Sensei!"
13420-3 = "O dia a dia do Comitê de Contramedidas de Abydos continua agitado hoje também."
13420-4 = "……Sinto que já disse algo parecido antes."
13420-5 = "Ah, ahaha……."
13420-6 = "Parece que faz tanto tempo desde o dia em que fomos salvar a Hoshino-senpai."
13420-7 = "……Você também acha, Sensei?"
13420-8 = "Fufu, então não fui só eu."
13420-14 = "……Ah, cheguei."
13420-15 = "Toda coberta de areia, o que aconteceu?"
13420-16 = "……Fui ao oásis, um pouco."
13420-17 = "Ué, você não tinha desistido?"
13420-18 = "Se eu cavar mais fundo, talvez ainda tenha algo lá, não acha?"
13420-19 = "Cavei 8 metros, mas não saiu nada."
13420-20 = "Será que acabou tudo mesmo……."
13420-25 = "Fufufu."
13420-26 = "Hoshino-senpai!?"
13420-27 = "Você sabe de alguma coisa?"
13420-32 = "Fufu…… é porque não estava de roupa de banho."
13420-33 = "Não me compare com você!"
13420-34 = "Além disso, não é como se fosse jorrar com tanta força assim!"
13420-38 = "……Shiroko-senpai, diga alguma coisa também."
13420-39 = "Bem~, não deveríamos valorizar a história e a tradição?"
13420-40 = "Por isso, da próxima vez, vá de roupa de banho! #nÉ uma ordem da presidente do conselho estudantil~."
13420-41 = "Usar a autoridade de presidente do conselho estudantil só nessas horas……."
13420-45 = "A Hoshino-senpai finalmente aceitou o cargo de presidente do conselho estudantil."
13420-46 = "Será que ela conseguiu organizar seus sentimentos?"
13420-47 = "É um pequeno passo, mas acho que é um passo muito importante para nós."
13420-48 = "……Eu, será?"
13420-49 = "Ahaha…… o cargo de presidente não combina comigo."
13420-55 = "Está bom assim?"
13420-59 = "……Não, ainda não. #nFaça de forma minuciosa!"
13420-60 = "S-sim!"
13420-62 = "Vamos transportar mais explosivos!"
13420-66 = "……."
13420-73 = "O legado do 'Imperador do Trovão' foi resolvido pela Presidente da Pandemonium Society e pela Presidente do Comitê Disciplinar."
13420-74 = "Ouvi dizer que as duas são como cão e gato, mas #nnão senti nem um pouco disso."
13420-75 = "Será que houve algum motivo por trás disso……?"
13420-77 = "Dizem que o presidente da Kaiser está no hospital desde aquela época."
13420-78 = "Será que ele perdeu o objetivo……?"
13420-79 = "……De qualquer forma, o pagamento da dívida ainda não terminou, #ne pretendo continuar em alerta."
13420-82 = "Voltei~♧"
13420-83 = "Nonomi-chan, como foi?"
13420-84 = "A restauração da linha foi concluída. #nAgora, só faltam os testes de operação!"
13420-85 = "Na próxima semana, a operação será possível em três seções."
13420-86 = "Finalmente!?"
13420-87 = "Parece que está tudo correndo bem~."
13420-91 = "Ah, tenho boas notícias também!"
13420-92 = "Parece que a Nephthys vai investir novamente no Distrito Autônomo de Abydos."
13420-93 = "Dito isso, eles apenas anunciaram que, em cooperação com a Academia Ferroviária Highlander, #nretomarão parcialmente o projeto da ferrovia transdesértica……."
13420-94 = "Se a rede de transporte se desenvolver com isso, talvez o fluxo de pessoas aumente."
13420-97 = "Muito bem, vamos colocar em movimento."
13420-98 = "Como estão as coisas por dentro?"
13420-101 = "Parece que não há problemas."
13420-103 = "Será que vai dar certo mesmo...?"
13420-104 = "Bem, acho que vai funcionar. A sala de supervisão providenciou mecânicos excelentes."
13420-105 = "Mas, se não for lucrativo, desta vez nós..."
13420-106 = "Por que está dizendo isso antes mesmo de começar?!"
13420-107 = "A Linha Central de Abydos deve ser restaurada no próximo inverno, vai dar tudo certo!"
13420-111 = "……"
13420-112 = "Supervisor?"
13420-113 = "……Ah."
13420-114 = "Será que este lugar era uma escola secundária antigamente?"
13420-115 = "……Não é nada, vamos."
13420-116 = "Se você diz... Bem, existem muitos lugares assim em Abydos."
13420-117 = "Parece que a CCC está causando confusão de novo."
13420-118 = "……De novo aquelas gêmeas?"
13420-119 = "Sim, recebemos um pedido de reforço."
13420-123 = "Ah... não me deixe para trás, supervisor!"
13420-134 = "――E assim, aos poucos, a vitalidade está retornando."
13420-135 = "Até abriram lojas novas."
13420-136 = "……Embora muitas pessoas pareçam familiares."
13420-137 = "Ei, este é o terreno onde vou colocar a placa da minha loja."
13420-138 = "Nem pensar, este terreno é nosso há 100 anos."
13420-139 = "Você faliu, então por que está falando isso?"
13420-140 = "Você não está na mesma situação?!"
13420-145 = "……Que gente patética."
13420-146 = "Quem diria que teríamos que recomeçar a partir de um centro comercial como este..."
13420-148 = "Vou expandir minha loja o quanto antes."
13420-150 = "A outra Shiroko... desde aquela época, não tivemos mais notícias dela."
13420-151 = "O Sensei também não sabe onde ela está?"
13420-152 = "[s] \"Sinto muito.\""
13420-153 = "Entendo..."
13420-154 = "……"
13420-158 = "Bem, dizem que não ter notícias é uma boa notícia, não é?"
13420-159 = "……É verdade."
13420-164 = "Com certeza vamos nos encontrar de novo algum dia, né?"
13420-165 = "Ainda nem consegui agradecer direito."
13420-173 = "Próximo episódio: Epílogo (2)"
