[translation]
13420-1 = "第42話;エピローグ（１）"
13420-2 = "おはようございます、先生！"
13420-3 = "アビドス対策委員会の一日は、今日もまた慌ただしいです。"
13420-4 = "……何だか、前にも似たようなセリフを言った気がしますね。"
13420-5 = "あ、あはは……。"
13420-6 = "ホシノ先輩を助けにいった日のことが、もうだいぶ昔のように感じます。"
13420-7 = "……先生もですか？"
13420-8 = "ふふ、私だけじゃなかったんですね。"
13420-14 = "……はぁ、ただいま。"
13420-15 = "そんな砂まみれになって、どうしたの？"
13420-16 = "……ちょっと、オアシスに。"
13420-17 = "えっ、諦めたんじゃなかった？"
13420-18 = "掘り進めたら、残ってるやつがあるかもしれないでしょ。"
13420-19 = "8メートル掘ったけど、何も出なかった。"
13420-20 = "やっぱり、もう全部なくなっちゃったのかな……。"
13420-25 = "ふっふっふー。"
13420-26 = "ホシノ先輩！？"
13420-27 = "何か知ってるの？"
13420-32 = "ふふ……それはね、水着じゃなかったからだよ。"
13420-33 = "一緒にしないでくれる！？"
13420-34 = "そもそも、そんな勢いよく噴き出さないでしょ！"
13420-38 = "……シロコ先輩も何か言ってよ。"
13420-39 = "まあさ～、やっぱ歴史というか伝統は大切にするべきじゃない？"
13420-40 = "だから、次は水着で行くように！#n生徒会長命令だよ～。"
13420-41 = "こういう時だけ生徒会長の権限を使うなんて……。"
13420-45 = "ホシノ先輩が、ようやく生徒会長を引き受けてくれました。"
13420-46 = "気持ちの整理がついたんでしょうか。"
13420-47 = "小さな一歩ですが、私たちにとっては大事な一歩だと思います。"
13420-48 = "……私、ですか？"
13420-49 = "あはは……私に生徒会長は合いませんから。"
13420-55 = "これで良いでしょうか？"
13420-59 = "……いや、まだだ。#n徹底的にやれ！"
13420-60 = "は、はいっ！"
13420-62 = "爆薬をもっと運ぶぞ！"
13420-66 = "……。"
13420-73 = "「雷帝」の遺[ruby=パンデモニウム・ソサエティー]産は、万魔殿の議長[/ruby]と風紀委員長さんが処理しました。"
13420-74 = "お二方は犬猿の仲だと聞いていましたが、#nそんな様子は微塵も感じませんでしたね。"
13420-75 = "何か事情でもあったのでしょうか……？"
13420-77 = "カイザーのプレジデントは、あれ以来ずっと病院にいるそうです。"
13420-78 = "目標を見失ってしまったんですかね……？"
13420-79 = "……いずれにせよ、借金の返済は終わっていませんし、#n引き続き警戒しておくつもりです。"
13420-82 = "戻りました～♧"
13420-83 = "ノノミちゃん、どうだった？"
13420-84 = "路線の復旧は完了しました。#nこれで、あとは試験運行を残すのみです！"
13420-85 = "来週中には、三区間で運行が可能になります。"
13420-86 = "ついに！？"
13420-87 = "順調みたいだね～。"
13420-91 = "あっ、良いお知らせもあります！"
13420-92 = "ネフティスが再び、アビドス自治区に投資を行なうようです。"
13420-93 = "といっても、ハイランダー鉄道学園と協力しつつ、#n砂漠横断鉄道事業を一部再開すると発表しただけですが……。"
13420-94 = "これで交通網が発達すれば、人の出入りが増えるかもしれません。"
13420-97 = "よし、動かすぞ。"
13420-98 = "内部のほうはどうだ？"
13420-101 = "問題ないようです。"
13420-103 = "本当に大丈夫でしょうか……？"
13420-104 = "まあ、動きはすると思いますよ。#n監理室が優秀な整備士を手配してくれましたし。"
13420-105 = "ですが、採算が取れなければ今度こそ私たちは……。"
13420-106 = "始まる前から何を言ってるんですか！"
13420-107 = "次の冬にはアビドス中央線も復旧できる予定ですし、#nきっとうまくいきますよ！"
13420-111 = "……。"
13420-112 = "監督官？"
13420-113 = "……ああ。"
13420-114 = "ここ、昔は中学校だったんでしょうかね？"
13420-115 = "……何でもない、行こう。"
13420-116 = "なら良いんですけど……#nまあ、アビドスにはこういう場所が多いですからね。"
13420-117 = "どうやらCCCが、また騒ぎを起こしてるようですし。"
13420-118 = "……またあの双子か？"
13420-119 = "はい、応援要請が届いています。"
13420-123 = "あっ……置いていかないでください、監督官！"
13420-134 = "――といったように、少しずつですが活気が戻ってきました。"
13420-135 = "新しいお店もできたんです。"
13420-136 = "……どこかで見たような方が多いですが。"
13420-137 = "おい、ここはウチの看板を置く土地だぞ。"
13420-138 = "いーや、ここは100年前から私たちの土地だ。"
13420-139 = "結局倒産したくせに、何を言ってる？"
13420-140 = "それはアンタも一緒じゃないか！"
13420-145 = "……見苦しい奴らめ。"
13420-146 = "こんな商店街からやり直すことになるとは……"
13420-148 = "さっさと店をデカくしてやる。"
13420-150 = "もう一人のシロコさんは……#nあれから、ぱったり連絡が途絶えてしまいました。"
13420-151 = "先生も居場所を知らないの？"
13420-152 = "[s] \"ごめんね。\""
13420-153 = "そっか……。"
13420-154 = "……。"
13420-158 = "まあ、便りがないのは良い知らせ、とも言うでしょ！"
13420-159 = "……たしかに。"
13420-164 = "きっと、いつかまた会えますよね？"
13420-165 = "お礼もきちんと言えてませんし。"
13420-173 = "次回;エピローグ（２）"
