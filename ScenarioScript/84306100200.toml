[translation]
84306100200-5 = "Eu estava esperando... Infelizmente, aconteceu exatamente como você disse."
84306100200-6 = "Eu revisei a exposição novamente... e encontrei vários problemas."
84306100200-11 = "……Isso tem relação com o caso anterior?"
84306100200-12 = "Não. É apenas um problema que causaria um certo alvoroço."
84306100200-13 = "Embora, claro, seja um \"certo alvoroço\" pelos padrões do Millennium."
84306100200-14 = "Pode ser um pouco estimulante demais para as alunas da Trinity, no entanto."
84306100200-15 = "Entendo……."
84306100200-16 = "Ou seja, você quer resolver isso internamente antes que se torne público."
84306100200-17 = "……Isso seria uma \"infiltração\"?"
84306100200-18 = "Sim. Você terá que se dividir com a Neru para lidar com isso."
84306100200-19 = "Hum... uma operação solo, então."
84306100200-20 = "……Posso contar com você?"
84306100200-21 = "Não me importo, mas... você tem certeza de que quer que seja eu?"
84306100200-22 = "Não falta nada em você. Afinal, a Neru aprovou."
84306100200-23 = "Ela disse: \"Se tiver o equipamento, não tem problema\". Além disso..."
84306100200-24 = "Ela também disse: \"Ela vai ficar feliz\"."
84306100200-25 = "……Entendo. Bem, nesse caso, tudo bem."
84306100200-26 = "Entender isso tão rápido em um curto período de tempo... como esperado."
84306100200-27 = "Então? Para onde devo ir?"
84306100200-28 = "Antes disso, pegue este equipamento."
84306100200-29 = "Tenho certeza de que será útil."
84306100200-34 = "……O que é isto?"
84306100200-35 = "É um equipamento que pode escanear os itens da exposição. Deve ajudar a identificar os objetos de coleta."
84306100200-36 = "Hum……."
84306100200-40 = "Vou usá-lo com gratidão. Obrigado."
84306100200-41 = "Não... eu que agradeço."
84306100200-42 = "Então, conto com você."
