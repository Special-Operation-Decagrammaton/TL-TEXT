[translation]
84306100200-5 = "待っていたわ……残念ながら、貴女の言う通りになってしまった。"
84306100200-6 = "展示を再度洗い直してみたのだけれど……複数の問題が見つかってしまったの。"
84306100200-11 = "……先の件と関係が？"
84306100200-12 = "いえ。それはちょっと騒ぎになる程度の問題よ。"
84306100200-13 = "とはいえ、あくまでもミレニアム基準での「ちょっと」だから。"
84306100200-14 = "トリニティの生徒にとっては少々刺激が強いかもしれないけれど。"
84306100200-15 = "なるほど……。"
84306100200-16 = "つまり、表沙汰になる前に、内々で処理したい、と。"
84306100200-17 = "……「潜入」になるのかな？"
84306100200-18 = "ええ。ネルと手分けして対応してもらうことになるわ。"
84306100200-19 = "ふむ……単独行動か。"
84306100200-20 = "……頼めるかしら。"
84306100200-21 = "構わないが……君は、私でいいのか？"
84306100200-22 = "不足は無いわ。ネルが認めたのだから。"
84306100200-23 = "「装備さえありゃ、問題ねぇだろ」だそうよ。それに……。"
84306100200-24 = "「喜ぶはずだ」ともね。"
84306100200-25 = "……そうか。いや、それならいいんだ。"
84306100200-26 = "この短期間で、そこまで理解するとは……流石だね。"
84306100200-27 = "それで？どこに向かえば良いのだろうか。"
84306100200-28 = "その前に、この装備を受け取ってちょうだい。"
84306100200-29 = "きっと、役に立つはずよ。"
84306100200-34 = "……これは？"
84306100200-35 = "展示物をスキャンできる装備よ。回収対象の判別に一役買ってくれるはず。"
84306100200-36 = "ふむ……。"
84306100200-40 = "有難く使わせてもらうよ。ありがとう。"
84306100200-41 = "いえ……それはこちらのセリフだわ。"
84306100200-42 = "では、お願いね。"
