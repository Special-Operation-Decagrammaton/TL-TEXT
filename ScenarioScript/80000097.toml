[translation]
80000097-1 = "特別な対象"
80000097-3 = "……こちらです、先生。"
80000097-4 = "こんな時間にご足労くださり、ありがとうございます。"
80000097-5 = "……え？"
80000097-6 = "ええと、何か問題があったわけではありませんので、どうか誤解なきよう……"
80000097-7 = "た、ただ……その……"
80000097-13 = "……これ、を……"
80000097-14 = "[s1] \"……チョコレート？\"\n[s2] \"今日はバレンタインデーだもんね。\""
80000097-17 = "はい……渡すのが遅くなってしまいましたが……"
80000097-18 = "先生は慕われておりますので、たくさんいただいているかとは思いますし、私も悩んだのです。"
80000097-19 = "もしかしたら、今日という日を意識していないかも、とも……"
80000097-20 = "ですが、あまり難しく考えず、自分の心のままに行動すると決めたのです。"
80000097-21 = "ご迷惑でしたら申し訳ありませんが……#nどうか、お許しくださると……"
80000097-22 = "[s3] \"そんなことないよ、本当にありがとう。\"\n[s4] \"サクラコこそ、忙しいのにありがとう。\""
80000097-25 = "……はい。そう仰ってくださって、安心しました。"
80000097-26 = "その……開ける前に、お伝えしておきたいのですが……"
80000097-27 = "[s5] \"……ん？\"\n[s6] \"どうしたの？何かあった？\""
80000097-30 = "それが、ですね……"
80000097-31 = "これは……いえ、これだけは誰かに相談したり、調べたりせず、自分なりの答えを出したかったので……"
80000097-32 = "……「エイリアンメガネ」や「チョコタイムダンス」のような流行は、取り入れていないのです。"
80000097-33 = "[s7] （エイリアンメガネ……？チョコタイムダンス……？）\n[s8] （……なんの話だろう？）"
80000097-36 = "ですから、その……"
80000097-37 = "お渡ししたチョコレートは、流行りのものからは……"
80000097-38 = "少し……いえ、とてもかけ離れているでしょう……"
80000097-39 = "……申し訳、ございません。"
80000097-43 = "[ns] \"……サクラコ。\""
80000097-45 = "[ns9] \"その考え、大切だよ！\"\n[ns10] \"これからは、もっと自分の心を信じて！\""
80000097-48 = "は、はい？えっと……先生？"
80000097-49 = "ど、どうして突然そのようなお言葉を……！？#nわ、私……な、何か間違っておりましたか？"
80000097-50 = "へ、変なことを言ってしまいましたか……？#nあ、あれ……えええ……？？？"
80000097-52 = "…………こほん。"
80000097-53 = "ひ、ひとまず……先生が仰りたいことは、理解しました。"
80000097-54 = "……が……"
80000097-55 = "[s11] \"……が？\"\n[s12] \"……ん？\""
80000097-60 = "……です、が……"
80000097-61 = "そうですね……"
80000097-62 = "申し訳ありません、先生。#nその……いくら先生のお言葉だとしても……"
80000097-63 = "全てを心の赴くまま、というのはやはり……"
80000097-64 = "…………。"
80000097-65 = "……せ、せん……"
80000097-66 = "……せい……のことだけに、しようと思います。"
