[translation]
80000097-1 = "Alvo especial"
80000097-3 = "……Aqui está, Sensei."
80000097-4 = "Obrigada por se dar ao trabalho de vir a esta hora."
80000097-5 = "……Eh?"
80000097-6 = "Bem, não é como se houvesse algum problema, então, por favor, não entenda mal……"
80000097-7 = "É, só que…… bom……"
80000097-13 = "……Isto, por favor……"
80000097-14 = "[s1] \"……Chocolate?\"\n[s2] \"Hoje é Dia dos Namorados, né.\""
80000097-17 = "Sim…… peço desculpas pela demora em entregar……"
80000097-18 = "Como o Sensei é muito querido, imagino que já tenha recebido muitos, e eu fiquei na dúvida."
80000097-19 = "Pensei até que talvez você nem estivesse ligando para o dia de hoje……"
80000097-20 = "Mas decidi não pensar demais e agir conforme o meu coração."
80000097-21 = "Sinto muito se isso for um incômodo, mas……#npor favor, espero que possa me perdoar……"
80000097-22 = "[s3] \"De jeito nenhum, muito obrigado mesmo.\"\n[s4] \"Obrigado por vir, Koharu, mesmo estando ocupada.\""
80000097-25 = "……Sim. Fico aliviada em ouvir isso."
80000097-26 = "Bem…… antes de abrir, eu gostaria de lhe dizer uma coisa……"
80000097-27 = "[s5] \"……Hm?\"\n[s6] \"O que houve? Aconteceu alguma coisa?\""
80000097-30 = "É que, veja bem……"
80000097-31 = "Isto é…… não, eu queria encontrar minha própria resposta para isso sem consultar ninguém ou pesquisar……"
80000097-32 = "……Então, não incluí nenhuma tendência como \"óculos alienígena\" ou \"dança da hora do chocolate\"."
80000097-33 = "[s7] (Óculos alienígena……? Dança da hora do chocolate……?)\n[s8] (……Do que será que ela está falando?)"
80000097-36 = "Por isso, bem……"
80000097-37 = "O chocolate que lhe entreguei está……"
80000097-38 = "Um pouco…… não, muito longe das tendências atuais……"
80000097-39 = "……Peço perdão."
80000097-43 = "[ns] \"……Sakurako.\""
80000097-45 = "[ns9] \"Esse pensamento é muito importante!\"\n[ns10] \"De agora em diante, confie mais no seu coração!\""
80000097-48 = "S-sim? Bem…… Sensei?"
80000097-49 = "P-por que de repente essas palavras……!?#nE-eu…… fiz algo de errado?"
80000097-50 = "D-disse algo estranho……?#nAh, nossa…… ehhh……???"
80000097-52 = "…………Ahem."
80000097-53 = "P-por enquanto…… entendi o que o Sensei quis dizer."
80000097-54 = "……Mas……"
80000097-55 = "[s11] \"……Mas?\"\n[s12] \"……Hm?\""
80000097-60 = "……É que……"
80000097-61 = "Bem……"
80000097-62 = "Sinto muito, Sensei.#nIsso…… por mais que sejam palavras do Sensei……"
80000097-63 = "Agir sempre conforme o coração, no fim das contas……"
80000097-64 = "…………."
80000097-65 = "……Se, Sensei……"
80000097-66 = "……Acho que vou reservar isso apenas para o Sensei."
