[translation]
22180-1 = "第18話;それでも越えられない壁"
22180-13 = "……！"
22180-14 = "遅ぇ、遅ぇ、遅ぇ……"
22180-23 = "おせぇんだよ、後輩！"
22180-32 = "（スピードは明らかに「武装」を使う私の方が上……なのに）"
22180-39 = "（データは間違っていないはず――#n　リオ様の命令通り、戦場の地形を変更したというのに）"
22180-40 = "（それでも勝敗がつかないというのは……まさか、データが間違っている？）"
22180-41 = "（いや、これはそういう次元の問題では……）"
22180-49 = "彼女の射程に入るたびに、データが……#nリアルタイムで更新されている……！？"
22180-50 = "（間合いを詰められると……危険……！）"
22180-56 = "くっ……！！"
22180-57 = "これほどの超長距離からの……狙撃……まさか……！"
22180-59 = "こちらコールサインゼロツー。"
22180-60 = "……先輩の背中は任せてくれ。"
22180-61 = "あれ？道に迷ってたと思ったんだけどー……意外とそんな事なかった？"
22180-62 = "それはアスナ先輩が幸運だからですよ……普通は抜け出せません。"
22180-64 = "要塞都市の迷路を……いとも容易く……！？"
22180-65 = "そんな事、確率的にあり得ない……。"
22180-66 = "ケッ！偉そうに分断だの何だの御託を並べてたクセによぉ。"
22180-67 = "結局言葉だけだったのか？あぁ？"
22180-68 = "……。"
22180-72 = "トキ、一旦退きなさい。"
22180-73 = "……！"
22180-74 = "リオ様、私は……。"
22180-75 = "貴女を責めているわけではないわ。#nヴェリタスの干渉で、アバンギャルド君の制御権が奪われてしまった。"
22180-76 = "これはあくまで、私の予測不足による失敗……#nまずは撤退して、状況を立て直しましょう。"
22180-77 = "……イエス、マム。"
22180-78 = "――現場から離脱します。"
22180-79 = "ハァ！？ざけんなコラ！"
22180-88 = "おい！逃げんじゃねえ！！"
22180-90 = "えっ、なになに？トキちゃん行っちゃったの？"
22180-91 = "……逃してしまったようです。"
22180-92 = "あー！クソッ！#nこの場でケリつけたかったのに！"
22180-94 = "仕方ないですよ部長、想定外の交戦でしたし……"
22180-95 = "戦況そのものが変わってしまいましたから。"
22180-96 = "陽動作戦は一旦中断して……まずは先生と合流しましょう。"
22180-97 = "この作戦は、アリスちゃんを連れ出すためのものですからね。"
22180-98 = "そうですよね、部長？"
22180-99 = "うっ……。"
22180-100 = "……あぁ、わ～った。わ～ったって。"
22180-101 = "うし、行くか。"
22180-104 = "[ns] \"えっと、ここを曲がったら……次はどこに向かえばいい？\""
22180-105 = "右に曲がって、直進！そこが目的地だよ。"
22180-106 = "よーし、行っくよ～！"
22180-107 = "ここにアリスが……！"
22180-118 = "[ns] \"ここが要塞都市「エリドゥ」の中央タワー……。\""
22180-119 = "アリスちゃんが……ここに……。"
22180-120 = "……行こう！"
22180-121 = "うん！"
22180-123 = "え？"
22180-125 = "あっ！ご主人様とみんな～！#nやほやほ！"
22180-126 = "皆さん到着されていたのですね。"
22180-132 = "先輩！"
22180-133 = "[s] \"ネル達がここにいるという事は……トキは？\""
22180-134 = "……ぐっ！！"
22180-135 = "あはは、それがね～"
22180-136 = "……はぁ。"
22180-137 = "残念ながら、逃げられてしまいました。"
22180-138 = "あとちょっとでぶちのめせたのによ！"
22180-140 = "（その後、トキとの戦いについて、アカネから一部始終を聞いた）"
22180-142 = "[ns] \"さっきの地震はそれだったんだね……。\""
22180-143 = "ええ……そのせいで陽動自体の意味がなくなってしまったわけです。"
22180-144 = "[s] \"地形が変わるなんて、普通は想像できないから仕方ないよ……。\""
22180-145 = "先生の方も、何か起きていたように見えるが……。"
22180-146 = "あ、たしかに。一緒にいたエンジニア部は？"
22180-147 = "う～ん、何か起きていたというか……。"
22180-148 = "たしかに大変といえば大変だったけど、その……。"
22180-149 = "[s] \"強かったね、アバンギャルド君……。\""
22180-155 = "[ns] \"チヒロ、このタワーにアリスがいるの？\""
22180-156 = "その……会長が言ってたんだよね？#nアリスのヘイローを破壊するって。"
22180-157 = "そのためには、相応の施設が必要なんじゃないかな。"
22180-158 = "そして、ここエリドゥは全ての電力がこのタワーに集中するような構造になっている。"
22180-159 = "これほどの規模の施設が、会長の手によって作られた理由……そして、会長の動機……#n答えは明白だろうね。"
22180-160 = "本当に……アリスがあそこに……"
22180-161 = "つまり、後はこのバカデカいタワーを登りゃあいいんだろ？"
22180-162 = "[s] \"そうだね、あとは登るだけ……。\""
22180-163 = "ただ、残念だけど――"
22180-171 = "あの会長が、門番を用意しないわけがないよね。"
22180-175 = "お待ちしておりました、先輩方、先生。"
22180-176 = "[s] \"やっぱり、トキが門番なんだね……。\""
22180-177 = "あっ！また会えたね～！トキちゃんやほ！"
22180-178 = "あぁん？んだよ、さっきは尻尾巻いて逃げ出したくせに……"
22180-179 = "一体どのツラ下げてあたしらの前に現れてんだ？"
22180-180 = "作戦を変更したのは、貴女たちだけだと思って？"
22180-181 = "……リオ。"
22180-182 = "貴女たちが来ることを見越していくつもの計画を準備してきたけれど――"
22180-183 = "まさか、防衛システムをすべて壊して、ここまで到達するなんて……。"
22180-184 = "変数として機能し、私の計算を狂わせたのも、すべては――"
22180-185 = "シャーレの先生、貴方が関わったからかしら？"
22180-186 = "[s] \"…………リオ。\""
22180-187 = "それならそれで構わないのよ。#n貴方が規格外の力を見せるのなら、こちらもそれ相応の切り札を出すまで。"
22180-188 = "トキ。現時刻をもって[ruby=Abi-Eshuh]「アビ・エシュフ」[/ruby]の使用を許可するわ。"
22180-189 = "……リオ様、それは。"
22180-190 = "ええ、本来は「名もなき神々の王女」との戦闘用だけど……仕方ないわ。"
22180-191 = "ここでこの子たちを阻止できなければ、すべてが無に帰してしまうのだから。"
22180-196 = "……イエス、マム。"
22180-197 = "パワードスーツシステム「アビ・エシュフ」へ移行します。"
22180-198 = "[s] \"アビ……エシュフ？\""
22180-211 = "この音は……。"
22180-213 = "……ッ！#n上！"
22180-217 = "呼出信号確認。"
22180-234 = "わ、わぁっ！？一体なにっ！？"
22180-249 = "パワードスーツシステム[wa:1000]「アビ・エシュフ」[wa:1500]起動"
22180-254 = "戦闘、[wa:1500]開始します。"
22180-258 = "[ns] \"………来る！\""
