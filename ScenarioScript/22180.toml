22180-147 = "Hmm, mais ou menos que aconteceu uma coisa……"
22180-148 = "De fato, difícil foi difícil, mas é que……"
22180-149 = "[s] \"Foi forte, hein, o Avant-Garde……\""
22180-155 = "[ns] \"Chihiro, a Aris está nesta torre?\""
22180-156 = "É que…… a presidente disse, né?#nQue ia destruir o Halo da Aris."
22180-157 = "Pra isso, deve ser preciso uma instalação à altura."
22180-158 = "E esta Eridu tem uma estrutura em que toda a energia se concentra nesta torre."
22180-159 = "O motivo de uma instalação desse porte ter sido construída pelas mãos da presidente…… e o motivo dela……#na resposta é óbvia, né."
22180-160 = "De verdade…… a Aris está ali em cima……"
22180-161 = "Ou seja, agora é só subir esta torre gigantesca, né?"
