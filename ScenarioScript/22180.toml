[translation]
22180-1 = "Episódio 18; A Muralha que Ainda Não Pode Ser Transposta"
22180-13 = "……！"
22180-14 = "Lenta, lenta, lenta……"
22180-23 = "Você está lenta, veterana!"
22180-32 = "（A velocidade é claramente superior com o meu uso de \"Armamento\"…… mas ainda assim）"
22180-39 = "（Os dados não deveriam estar errados――#n　Mesmo tendo alterado o terreno do campo de batalha conforme as ordens da Rio-sama）"
22180-40 = "（O fato de não haver um vencedor mesmo assim é…… será que os dados estão errados?）"
22180-41 = "（Não, esse tipo de problema não é dessa dimensão……）"
22180-49 = "Toda vez que entro no alcance dela, os dados……#nEstão sendo atualizados em tempo real……!?"
22180-50 = "（Se ela fechar a distância…… é perigoso……!）"
22180-56 = "Droga……！！"
22180-57 = "Um disparo de uma distância tão longa…… não pode ser……!"
22180-59 = "Aqui é o sinal de chamada Zero-Dois."
22180-60 = "……Deixe as costas da veterana comigo."
22180-61 = "Ué? Achei que você tinha se perdido…… mas parece que não foi bem assim?"
22180-62 = "Isso é porque a Asuna-senpai tem sorte…… Normalmente, ninguém conseguiria escapar."
22180-64 = "O labirinto da cidade fortaleza…… tão facilmente……!?"
22180-65 = "Isso é estatisticamente impossível……."
22180-66 = "Tsc! E olha que você estava toda metida falando sobre divisões e não sei o quê."
22180-67 = "No fim, era só conversa fiada? Hein?"
22180-68 = "……."
22180-72 = "Toki, recue por enquanto."
22180-73 = "……!"
22180-74 = "Rio-sama, eu……."
22180-75 = "Não estou culpando você.#nDevido à interferência da Veritas, o controle do Vanguard-kun foi tomado."
22180-76 = "Isso foi, acima de tudo, uma falha devido à minha falta de previsão……#nPrimeiro, vamos recuar e reorganizar a situação."
22180-77 = "……Sim, madame."
22180-78 = "――Saindo do local."
22180-79 = "Hã!? Tá de brincadeira, né!"
22180-88 = "Ei! Não fuja!!"
22180-90 = "Ué, o que foi? A Toki-chan foi embora?"
22180-91 = "……Parece que a deixamos escapar."
22180-92 = "Ah! Droga!#nEu queria ter resolvido isso aqui mesmo!"
22180-94 = "Não tem jeito, chefe, foi um combate inesperado……"
22180-95 = "A situação de batalha mudou completamente."
22180-96 = "Vamos interromper a operação de distração por enquanto…… e nos encontrar com o Sensei."
22180-97 = "Afinal, esta operação é para resgatar a Alice-chan."
22180-98 = "Não é, chefe?"
22180-99 = "Ugh……."
22180-100 = "……Tá, tá bom. Eu entendi."
22180-101 = "Beleza, vamos nessa."
22180-104 = "[ns] \"Bem, depois de virar aqui…… para onde devo ir agora?\""
22180-105 = "Vire à direita e siga em frente! O destino é ali."
22180-106 = "Beleza, lá vamos nós!"
22180-107 = "A Alice está aqui……!"
22180-118 = "[ns] \"Esta é a torre central da cidade fortaleza \"Eridu\"…….\""
22180-119 = "A Alice-chan está…… aqui……."
22180-120 = "……Vamos!"
22180-121 = "Sim!"
22180-123 = "Hã?"
22180-125 = "Ah! Mestre e pessoal~!#nIupii!"
22180-126 = "Então vocês chegaram."
22180-132 = "Senpai!"
22180-133 = "[s] \"Se a Neru e as outras estão aqui... então onde está a Toki?\""
22180-134 = "......Grrr!!"
22180-135 = "Ahaha, sobre isso..."
22180-136 = "......Haa."
22180-137 = "Infelizmente, ela conseguiu escapar."
22180-138 = "E olha que eu quase dei uma surra nela!"
22180-140 = "(Depois disso, ouvi de Akane toda a história sobre a batalha contra Toki.)"
22180-142 = "[ns] \"Então foi por isso que houve aquele terremoto...\""
22180-143 = "Sim... por causa disso, a manobra de distração acabou perdendo o sentido."
22180-144 = "[s] \"Ninguém imagina que o terreno pode mudar do nada, então não tem como culpar vocês...\""
22180-145 = "Parece que algo também aconteceu do lado do Sensei..."
22180-146 = "Ah, é verdade. E o Clube de Engenharia que estava com você?"
22180-147 = "Bem, sobre isso..."
22180-148 = "Foi complicado, com certeza, mas, sabe..."
22180-149 = "[s] \"O Avant-Garde-kun era bem forte, né...\""
22180-155 = "[ns] \"Chihiro, a Alice está nesta torre?\""
22180-156 = "Bem... a Presidente disse, não disse?#nQue destruiria o halo da Alice."
22180-157 = "Para isso, ela provavelmente precisa de instalações adequadas."
22180-158 = "E aqui em Eridu, a estrutura foi feita para que toda a energia se concentre nesta torre."
22180-159 = "O motivo de uma instalação desse porte ter sido construída pela Presidente... e a motivação dela...#nA resposta parece óbvia."
22180-160 = "Sério mesmo... a Alice está lá em cima..."
22180-161 = "Ou seja, agora só falta subir essa torre gigante, né?"
22180-162 = "[s] \"É, agora é só subir...\""
22180-163 = "Mas, infelizmente..."
22180-171 = "A Presidente não deixaria de colocar um guardião na porta, não é?"
22180-175 = "Estava esperando por vocês, senpais, Sensei."
22180-176 = "[s] \"Como eu imaginei, a Toki é a guardiã...\""
22180-177 = "Ah! Nos encontramos de novo~! Oi, Toki-chan!"
22180-178 = "Ah é? O que foi, depois de ter fugido com o rabo entre as pernas..."
22180-179 = "Com que cara você aparece na nossa frente agora?"
22180-180 = "Vocês acharam mesmo que só vocês podiam mudar de estratégia?"
22180-181 = "......Rio."
22180-182 = "Eu preparei vários planos prevendo que vocês viriam, mas..."
22180-183 = "Eu não esperava que vocês destruíssem todos os sistemas de defesa e chegassem até aqui..."
22180-184 = "Tudo o que funcionou como uma variável e arruinou meus cálculos..."
22180-185 = "Será que foi porque você, Sensei do Schale, se envolveu?"
22180-186 = "[s] \"............Rio.\""
22180-187 = "Se for esse o caso, não me importa.#nSe você vai mostrar um poder fora dos padrões, eu também usarei meu trunfo correspondente."
22180-188 = "Toki. A partir deste momento, autorizo o uso do Abi-Eshuh."
22180-189 = "......Rio-sama, isso é..."
22180-190 = "Sim, originalmente é para o combate contra a 'Princesa dos Deuses Sem Nome', mas... não tenho escolha."
22180-191 = "Se eu não impedir essas crianças aqui, tudo será reduzido a nada."
22180-196 = "......Sim, madame."
22180-197 = "Iniciando a transição para o sistema de traje de poder 'Abi-Eshuh'."
22180-198 = "[s] \"Abi... Eshuh?\""
22180-211 = "Esse som é..."
22180-213 = "......!!#nCima!"
22180-217 = "Sinal de chamada confirmado."
22180-234 = "U-uau!? O que está acontecendo!?"
22180-249 = "Sistema de traje energizado [wa:1000] \"Abi-Eshuh\" [wa:1500] inicializado."
22180-254 = "Combate, [wa:1500] iniciando."
22180-258 = "[ns] \"………Lá vem!\""
