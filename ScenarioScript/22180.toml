22180-140 = "(Depois disso, ouvi da Akane todos os pormenores da luta contra a Toki.)"
22180-142 = "[ns] \"Aquele terremoto de agora há pouco era isso, né……\""
22180-143 = "Sim…… e foi por isso que a própria distração perdeu o sentido."
22180-144 = "[s] \"O terreno mudar é uma coisa que, normalmente, ninguém imagina, então não teve jeito……\""
22180-145 = "Pelo visto, com o Sensei também aconteceu alguma coisa……"
