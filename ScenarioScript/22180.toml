22180-90 = "Hã, que foi, que foi? A Toki foi embora?"
22180-91 = "……Parece que ela escapou."
22180-92 = "Aah! Droga!#nEu queria ter acertado as contas aqui mesmo!"
22180-94 = "Não tem jeito, presidente, foi um combate imprevisto……"
