22180-163 = "Só que, infelizmente——"
22180-171 = "não tinha como aquela presidente não deixar um guardião na porta, né."
22180-175 = "Estava à espera de vocês, veteranas, Sensei."
22180-176 = "[s] \"Eu sabia, a Toki é a guardiã da porta, né……\""
22180-177 = "Ah! A gente se encontrou de novo~! Oie, Toki!"
22180-178 = "Hãã? Que é isso, agora há pouco você saiu correndo de rabo entre as pernas……"
22180-179 = "e com que cara você aparece de novo na nossa frente?"
