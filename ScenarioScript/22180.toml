22180-191 = "Porque, se eu não conseguir deter estas garotas aqui, tudo vai virar pó."
22180-196 = "……Sim, senhora."
22180-197 = "Migrando para o sistema de traje de combate \"Abi-Eshuh\"."
22180-198 = "[s] \"Abi…… Eshuh?\""
22180-211 = "Esse som é……"
22180-213 = "……Kh!#nLá em cima!"
