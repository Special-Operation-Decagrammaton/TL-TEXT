[translation]
22180-1 = "Episódio 18; O Muro que Ainda Não Pode ser Transposto"
22180-13 = "......!"
22180-14 = "Lenta, lenta, lenta..."
22180-23 = "Você é lenta demais, novata!"
22180-32 = "(A velocidade é claramente superior na minha forma 'Armada'... e ainda assim)"
22180-39 = "(Os dados não deveriam estar errados―― #n Mesmo depois de alterar o terreno do campo de batalha conforme as ordens da Srta. Rio)"
22180-40 = "(Se mesmo assim não conseguimos um resultado... será que os dados estão errados?)"
22180-41 = "(Não, isso vai além de uma simples questão de dados...)"
22180-49 = "Sempre que entro no alcance dela, os dados... #n estão sendo atualizados em tempo real...!?"
22180-50 = "(Se ela fechar a distância... é perigoso...!)"
22180-56 = "Ugh......!!"
22180-57 = "Uma... sniper... de uma distância tão longa assim... não pode ser...!"
22180-59 = "Aqui é o Codinome Zero Dois."
22180-60 = "......Deixe as costas da senpai comigo."
22180-61 = "Ué? Achei que vocês tinham se perdido... mas parece que não?"
22180-62 = "Isso é porque a Asuna-senpai tem sorte...... Normalmente, é impossível escapar."
22180-64 = "Atravessar o labirinto da cidade-fortaleza... tão facilmente...!?"
22180-65 = "Isso é... probabilisticamente impossível..."
22180-66 = "Tsc! Ficou falando toda pomposa sobre 'separação' e o escambau."
22180-67 = "No fim das contas, foi só conversa fiada? Hã?"
22180-68 = "......"
22180-72 = "Toki, recue por enquanto."
22180-73 = "......!"
22180-74 = "Srta. Rio, eu..."
22180-75 = "Não estou te culpando. #n A interferência da Veritas roubou o controle do Avant-Garde-kun."
22180-76 = "Isso foi apenas uma falha de cálculo minha... #n Primeiro, vamos recuar e reagrupar."
22180-77 = "......Sim, senhora."
22180-78 = "――Estou me retirando da área."
22180-79 = "Hã!? Não me venha com essa!"
22180-88 = "Ei! Não fuja!!"
22180-90 = "Eh, o quê? A Toki-chan foi embora?"
22180-91 = "......Parece que ela escapou."
22180-92 = "Ah! Droga! #n Eu queria ter acabado com isso aqui mesmo!"
22180-94 = "Não tem jeito, líder, foi um confronto inesperado..."
22180-95 = "Porque a situação da batalha mudou completamente."
22180-96 = "Vamos interromper a operação de diversão por um instante... e nos reunir com o Sensei primeiro."
22180-97 = "Essa operação é para trazer a Aris-chan de volta, afinal."
22180-98 = "Não é, líder?"
22180-99 = "Ugh......"
22180-100 = "......Ah, tá bom, tá bom."
22180-101 = "Certo, vamos lá."
22180-104 = "[ns] \"Ehm, depois de virar aqui... para onde devemos ir?\""
22180-105 = "Vire à direita e siga em frente! O destino é logo ali."
22180-106 = "Muito bem, vamos nessa! GOGO~!"
22180-107 = "A Aris está... aqui...!"
22180-118 = "[ns] \"Aqui é a torre central da 'Cidade-Fortaleza Eridu'......\""
22180-119 = "A Aris... está aqui..."
22180-120 = "......Vamos!"
22180-121 = "Sim!"
22180-123 = "Eh?"
22180-125 = "Ah! O Mestre e todo mundo~! #n Oi, oi!"
22180-126 = "Vejo que todos vocês chegaram."
22180-132 = "Senpai!"
22180-133 = "[s] \"Se a Neru e os outros estão aqui, então...... a Toki?\""
22180-134 = "......Ugh!!"
22180-135 = "Ahaha, bem..."
22180-136 = "......Haa."
22180-137 = "Infelizmente, ela conseguiu escapar."
22180-138 = "Eu quase consegui acabar com ela!"
22180-140 = "(Depois disso, ouvimos todo o relato da Akane sobre a batalha contra a Toki)"
22180-142 = "[ns] \"Então foi por isso que tremeu tudo lá atrás......\""
22180-143 = "Sim...... por causa disso, a diversão em si perdeu o sentido."
22180-144 = "[s] \"Não dá para imaginar que o terreno mudaria, então não tem como culpar vocês......\""
22180-145 = "Parece que algo também aconteceu do lado do Sensei..."
22180-146 = "Ah, é verdade. E o Clube de Engenharia que estava com vocês?"
22180-147 = "Bem, não diria que 'aconteceu algo'..."
22180-148 = "Com certeza foi uma situação difícil, mas..."
22180-149 = "[s] \"Ele era forte, o Avant-Garde-kun......\""
22180-155 = "[ns] \"Chihiro, a Aris está nessa torre?\""
22180-156 = "Bem... A Presidente disse, não é? #n Que ia destruir o Halo da Aris."
22180-157 = "Para isso, ela deve precisar de instalações apropriadas."
22180-158 = "E aqui em Eridu, toda a energia é estruturada para se concentrar nesta torre."
22180-159 = "O motivo de uma instalação desse porte ter sido construída pela Presidente... e a motivação dela... #n A resposta parece óbvia, não?"
22180-160 = "Sério...... a Aris está lá dentro..."
22180-161 = "Ou seja, agora só nos resta subir essa torre gigantesca, né?"
22180-162 = "[s] \"Sim, agora só nos resta subir......\""
22180-163 = "Porém, infelizmente――"
22180-171 = "Aquela Presidente jamais deixaria de colocar um guardião no portão, não é?"
22180-175 = "Estava esperando por vocês, senpais, Sensei."
22180-176 = "[s] \"Como eu imaginava, a Toki é a guardiã......\""
22180-177 = "Ah! Nos vimos de novo~! Oi, Toki-chan!"
22180-178 = "Hã? Que porra é essa, você fugiu com o rabo entre as pernas da última vez..."
22180-179 = "Com que cara você aparece na nossa frente agora?"
22180-180 = "Você acha mesmo que o plano foi alterado só por vocês?"
22180-181 = "......Rio."
22180-182 = "Preparei vários planos prevendo a chegada de vocês――"
22180-183 = "Quem diria que vocês destruiriam todos os sistemas de defesa e chegariam até aqui..."
22180-184 = "Tudo o que funcionou como uma variável e bagunçou meus cálculos――"
22180-185 = "Será que foi porque você se envolveu, Sensei da Schale?"
22180-186 = "[s] \"............Rio.\""
22180-187 = "Se for assim, tudo bem. #n Já que você insiste em mostrar um poder fora do comum, eu também usarei meu trunfo correspondente."
22180-188 = "Toki. A partir deste momento, autorizo o uso de 'Abi-Eshuh'."
22180-189 = "......Srta. Rio, isso é..."
22180-190 = "Sim, originalmente é para combate contra a 'Princesa dos Deuses Sem Nome', mas... não há escolha."
22180-191 = "Se não pudermos pará-los aqui, tudo será reduzido ao nada."
22180-196 = "......Sim, senhora."
22180-197 = "Transição para o sistema de traje de força 'Abi-Eshuh'."
22180-198 = "[s] \"Abi...... Eshuh?\""
22180-211 = "Esse som é......"
22180-213 = "......!! #n Cima!"
22180-217 = "Sinal de chamada confirmado."
22180-234 = "Uwaah!? O que, o que é isso!?"
22180-249 = "Sistema de traje de força [wa:1000] 'Abi-Eshuh' [wa:1500] iniciado"
22180-254 = "Iniciando [wa:1500] combate."
22180-258 = "[ns] \".........Lá vem!\""