[translation]
1012005-1 = "3ª hora “Limpeza: Hóspede Não Convidado”"

1012005-7 = "(Visitei a sala de prática confiando nas informações que mal consegui reunir.)"

1012005-8 = "(No entanto, Natsu não estava em lugar nenhum ――)"

1012005-12 = "Se, Se, Sensei...."

1012005-15 = "[wa:840]― [log=나츠 밴드]Aqui, [wa:780]Por aqui...[wa:1230]Por aqui...[wa:740]Sensei... [/log]"

1012005-18 = "[ns] \"Natsu!?\""

1012005-21 = "[wa:670]― [log=나츠 밴드]Ugh...[wa:1260]Tem...[wa:2160]dentro da bateria...[/log]"

1012005-22 = "[wa:1440]― [log=나츠 밴드]É preto e farfalhante... [wa:2390]Aquele cara. [/registro]"

1012005-25 = "― [log=나츠 밴드]Não importa o quanto eu procure, [wa:980] não consigo encontrar... [/log]"

1012005-28 = "[ns] \"Natsu também tem medo de coisas assim...\""

1012005-31 = "[wa:1610]― [log=나츠 밴드]O que, [wa:1000]Do que você está falando, [wa:1140]Sensei! ? [/registro]"

1012005-32 = "[wa:1340]― [log=나츠 밴드]Não há [wa:880] garotas do ensino médio em Kivotos que não tenham medo disso [wa:920] aquilo [wa:960]! ? [/registro]"

1012005-35 = "― [log=나츠 밴드]É [wa:1220] muito mais assustador que balas! ? [/registro]"

1012005-38 = "[ns] \"Ah, isso mesmo...\""

1012005-41 = "[wa:560]― [log=나츠 밴드]Ugh, [wa:1360] Nesse ritmo... [/log]"

1012005-44 = "― [log=나츠 밴드]O [wa:1360]biscoito de macadâmia limitado que me dei ao trabalho de conseguir é [/log]"

1012005-45 = "[wa:2540]― [log=나츠 밴드]Eu me tornarei uma presa... [/log]"

1012005-48 = "[ns] \"Isso é que é assustador...!?\""

1012005-51 = "[wa:520]― [log=나츠 밴드]Então, por favor, [wa:1360] Sensei... [/log]"

1012005-52 = "[wa:2090]― [log=나츠 밴드]Por favor me ajude... [/log]"

1012005-55 = "(Depois de acalmar Natsu por enquanto, procurei por toda a sala de prática.)"

1012005-60 = "(E... encontrei um pedaço muito grande de poeira que se movia com o vento)"

1012005-61 = "(Joga fora a poeira e volta para Natsu)"

1012005-63 = "Pó...? Não é um inseto...?"

1012005-64 = "……."

1012005-65 = "Ainda que..."

1012005-67 = "Ainda tentei bagunçar os biscoitos de macadâmia!"

1012005-69 = "obrigado. O professor é a pessoa que salvou a vida de Cookie."

1012005-70 = "Agora você pode praticar com tranquilidade -"

1012005-74 = "--Eu não consegui."

1012005-75 = "[s] \"A bateria quebrou...\""

1012005-76 = "Foi um sacrifício necessário encontrar o culpado... #nNão consigo evitar. Vamos montá-lo?"

1012005-77 = "Sim? Por que você está praticando sozinho?"

1012005-78 = "Este é o único lugar onde você pode tocar bateria."

1012005-79 = "Se eu fizesse isso no dormitório... eu seria expulso, não da bateria."

1012005-80 = "É por isso que pratico sozinho em um dia diferente da prática combinada."

1012005-81 = "Você não está sozinho?"

1012005-82 = "Mas de jeito nenhum."

1012005-83 = "Veja bem, graças a isso posso ser assim com meu professor."

1012005-84 = "Não é tudo ruim?"

1012005-85 = "Agora..."

1012005-86 = "Você quer montar a bateria?"

1012005-88 = "(Depois de ajudar Natsu até o fim...)"

1012005-89 = "(Comi biscoitos de macadâmia juntos)"

