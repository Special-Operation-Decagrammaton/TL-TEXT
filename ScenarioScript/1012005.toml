[translation]
1012005-1 = "3時間目「清掃：招かれざる客」"
1012005-7 = "（辛うじて拾えた情報を頼りに練習室を訪れた）"
1012005-8 = "（しかし、ナツの姿はなく――）"
1012005-12 = "せ、せ、せんせぇ……。"
1012005-15 = "[wa:840]― [log=나츠 밴드]こ、[wa:780]こっち……[wa:1230]こっちだ……[wa:740]せんせ……。[/log]"
1012005-18 = "[ns] \"ナツ！？\""
1012005-21 = "[wa:670]― [log=나츠 밴드]うう……[wa:1260]ドラムセットの中に……[wa:2160]いるんだ……[/log]"
1012005-22 = "[wa:1440]― [log=나츠 밴드]黒くてカサカサ動く……[wa:2390]あいつが。[/log]"
1012005-25 = "― [log=나츠 밴드]いくら探しても[wa:980]見つからなくてぇ……。[/log]"
1012005-28 = "[ns] \"ナツもそういうのは怖がるんだね……。\""
1012005-31 = "[wa:1610]― [log=나츠 밴드]な、[wa:1000]何を言ってるのだ、[wa:1140]先生！？[/log]"
1012005-32 = "[wa:1340]― [log=나츠 밴드]キヴォトスで[wa:920]アレを怖がらない[wa:960]女子高生なんて[wa:880]いないんだよ！？[/log]"
1012005-35 = "― [log=나츠 밴드]銃弾なんかより[wa:1220]よっぽど怖いんだよぉ！？[/log]"
1012005-38 = "[ns] \"そ、そうなんだ……。\""
1012005-41 = "[wa:560]― [log=나츠 밴드]うぅ、[wa:1360]このままでは……。[/log]"
1012005-44 = "― [log=나츠 밴드]せっかく手に入れた[wa:1360]限定マカダミアクッキーが、[/log]"
1012005-45 = "[wa:2540]― [log=나츠 밴드]餌食になってしまう……。[/log]"
1012005-48 = "[ns] \"怖いのってそっち……！？\""
1012005-51 = "[wa:520]― [log=나츠 밴드]だからお願い、[wa:1360]先生……。[/log]"
1012005-52 = "[wa:2090]― [log=나츠 밴드]助けてぇ……。[/log]"
1012005-55 = "（ひとまずナツを落ち着かせたあと、練習室をくまなく探した）"
1012005-60 = "（そして……風に乗って動く、とても大きなホコリの塊を見つけた）"
1012005-61 = "（ホコリを捨てて、ナツのところに戻った）"
1012005-63 = "ホコリ……？虫じゃなくて……？"
1012005-64 = "……。"
1012005-65 = "だとしても――"
1012005-67 = "マカダミアクッキーを汚そうとしたのは変わらない！"
1012005-69 = "ありがとう。先生はクッキーの命を救った恩人だよ。"
1012005-70 = "これで安心して練習――"
1012005-74 = "――できないんだった。"
1012005-75 = "[s] \"ドラムセットが、バラバラに……。\""
1012005-76 = "犯人探しには必要な犠牲だったのだよ……。#n仕方ない。組み立てるとしようか。"
1012005-77 = "うん？一人で練習してる理由？"
1012005-78 = "ドラムを叩けるのってここくらいなんだよね。"
1012005-79 = "寮でやったら……ドラムじゃなくて私が叩き出されちゃう。"
1012005-80 = "だから合わせ練習とは別の日に、一人で練習してるんだ。"
1012005-81 = "寂しくないのかって？"
1012005-82 = "全然……ではないけど。"
1012005-83 = "ほら、そのおかげで先生とこうしていられてるし。"
1012005-84 = "悪いことばかりでもないかな？"
1012005-85 = "さーて……。"
1012005-86 = "ドラム、組み立てますか……。"
1012005-88 = "（最後までナツを手伝ったあと……）"
1012005-89 = "（マカダミアクッキーを一緒に食べた）"
