[translation]
2600902-1 = "参考資料は……？"
2600902-2 = "ミレニアム・ゲーム開発部の部室"
2600902-3 = "（仕事でミレニアムに寄ったついでに、ゲーム開発部を訪れた）"
2600902-7 = "（しかし、部室には誰もいなかった……）"
2600902-11 = "[ns] 上着を掛けようとロッカーを開ける。"
2600902-16 = "ひ、ひゃっ！？"
2600902-17 = "あ、せ、先生……！？どうしてここに……。"
2600902-18 = "[ns1] \"ごめん、皆でかけてると思ってた。\"\n[ns2] \"差し入れにおやつを持ってきたんだけど……。\""
2600902-22 = "[ns] \"ところで、どうしてメイド服を……？\""
2600902-23 = "あ、これにはその……理由がありまして……。"
2600902-24 = "い、いえ、人に着せられたのではなく、#n自分の意思で着たのですが……！"
2600902-25 = "で、でも、着たくて着たわけではないと言いますか……。"
2600902-26 = "とにかく、まずは説明させてください……！"
2600902-28 = "（その後、ユズを落ち着かせてから説明を聞いた）"
2600902-30 = "[ns] \"……参考資料？\""
2600902-31 = "はい、ええと……"
2600902-32 = "今開発しているゲームにメイドのキャラクターを#n登場させようと思っているのですが……"
2600902-33 = "メイド服は構造が難しく、#n「資料なしだと描くのが大変」とミドリが言うので……。"
2600902-34 = "わたしが……メイド服を着てモデルをすることになったんです……。"
2600902-35 = "[s] \"事情は分かったよ。でもどうしてロッカーに？\""
2600902-36 = "その……ミドリが忘れ物を取りに寮へ戻ってしまったんです。"
2600902-37 = "それで、メイド服を着たまま一人で待っていたんですけど……#nなんだか不安になってきてしまって……。"
2600902-38 = "万が一、部室に他の生徒が来て、こんな姿を見られてしまったら……"
2600902-39 = "……きっと、笑われてしまう、から。"
2600902-40 = "[s] \"素直にモデルのことを話したらいいと思うけど……。\""
2600902-41 = "……ですがわたしは、C&Cの先輩たちのように#nスタイルもよくないですし……"
2600902-42 = "自信も全然ありません……。"
2600902-43 = "こんなわたしがモデルなんて、誰も信じてくれないです……"
2600902-44 = "[s3] \"大丈夫だよ、ユズは何を着ても可愛いから。\"\n[s4] \"ユズのメイド服姿、最高！\""
2600902-47 = "は、はい！？急になんですか……！？"
2600902-48 = "[s5] \"他の人のことは気にしないで。\"\n[s6] \"ユズはゲームのために頑張ってるんだから。\""
2600902-57 = "……ふふっ、そうですね。"
2600902-58 = "確かにわたしがモデルをしているのは、良いゲームを作るためです。"
2600902-59 = "なのにこんな中途半端な気持ちで挑んだら、#n楽しみにしてくれているファンの方々に失礼かもしれません。"
2600902-60 = "ありがとうございます、先生。"
2600902-61 = "お陰で少し勇気が出た気がします。"
2600902-62 = "でもやっぱりこの姿は恥ずかしいですし、今は一旦着替えて――"
2600902-68 = "ユズ部長ー、いるー？"
2600902-69 = "今期の議決書類にサインして欲しいんだけど――"
2600902-74 = "あ……ええと……。"
2600902-75 = "えっ、メイド服……？それにシャーレの先生……？"
2600902-76 = "こ、これは……その……"
2600902-77 = "ああ……ごめん。私たち、邪魔しちゃったみたいだね……。"
2600902-78 = "違っ……こ、これには事情が――！"
2600902-80 = "じゃ、ごゆっくり！"
2600902-82 = "う、うあああああ……！"
2600902-84 = "（その後、ロッカーに引きこもったユズをなだめるのに苦労した）"
