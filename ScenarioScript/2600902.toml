[translation]
2600902-1 = "O material de referência é...?"
2600902-2 = "Sala do Clube de Desenvolvimento de Jogos da Millennium"
2600902-3 = "（Aproveitei que estava na Millennium a trabalho e decidi visitar o Clube de Desenvolvimento de Jogos.）"
2600902-7 = "（No entanto, não havia ninguém na sala...）"
2600902-11 = "[ns] Abro o armário para pendurar meu casaco."
2600902-16 = "I-iih!?"
2600902-17 = "Ah, s-sensei...!? Por que você está aqui...?"
2600902-18 = "[ns1] \"Desculpe, achei que todos estivessem aqui.\"\n[ns2] \"Trouxe alguns lanches de presente...\""
2600902-22 = "[ns] \"A propósito, por que você está usando um traje de empregada...?\""
2600902-23 = "Ah, isso tem, bem... um motivo..."
2600902-24 = "N-não, ninguém me obrigou a vestir, eu vesti por vontade própria, mas...!"
2600902-25 = "M-mas, não é como se eu quisesse vestir por querer, sabe..."
2600902-26 = "De qualquer forma, deixe-me explicar primeiro...!"
2600902-28 = "（Depois disso, acalmei a Yuzu e ouvi a explicação.）"
2600902-30 = "[ns] \"...Material de referência?\""
2600902-31 = "Sim, bem..."
2600902-32 = "Estamos pensando em colocar uma personagem empregada no jogo que estamos desenvolvendo agora..."
2600902-33 = "Mas o traje de empregada é estruturalmente difícil, e a Midori disse que \"é difícil desenhar sem uma referência\"..."
2600902-34 = "Então... eu acabei me tornando a modelo vestindo o traje..."
2600902-35 = "[s] \"Entendi a situação. Mas por que no armário?\""
2600902-36 = "É que... a Midori voltou para o dormitório para buscar algo que esqueceu."
2600902-37 = "Então, fiquei esperando sozinha vestindo o traje, mas... acabei ficando um pouco ansiosa..."
2600902-38 = "Se, por acaso, outra aluna entrasse na sala e me visse assim..."
2600902-39 = "...Com certeza, ririam de mim."
2600902-40 = "[s] \"Acho que você deveria apenas falar a verdade sobre ser a modelo...\""
2600902-41 = "...Mas eu não tenho um estilo tão bom quanto as veteranas da C&C..."
2600902-42 = "E não tenho confiança nenhuma..."
2600902-43 = "Ninguém acreditaria que alguém como eu é uma modelo..."
2600902-44 = "[s3] \"Está tudo bem, a Yuzu é fofa com qualquer coisa que vista.\"\n[s4] \"A Yuzu de empregada está incrível!\""
2600902-47 = "H-hein!? Por que isso de repente...!?"
2600902-48 = "[s5] \"Não se preocupe com os outros.\"\n[s6] \"A Yuzu está se esforçando pelo jogo.\""
2600902-57 = "...Fufu, é verdade."
2600902-58 = "Com certeza, estou sendo modelo para criar um bom jogo."
2600902-59 = "Se eu encarar isso com um sentimento tão hesitante, talvez seja desrespeitoso com os fãs que estão ansiosos pelo jogo."
2600902-60 = "Obrigada, Sensei."
2600902-61 = "Sinto que ganhei um pouco de coragem graças a você."
2600902-62 = "Mas ainda assim, esse traje é embaraçoso, então vou me trocar agora—"
2600902-68 = "Presidente Yuzu, está aí?"
2600902-69 = "Preciso que assine os documentos de deliberação deste período—"
2600902-74 = "Ah... bem..."
2600902-75 = "Ué, traje de empregada...? E o Sensei do Schale...?"
2600902-76 = "I-isso é... bem..."
2600902-77 = "Ah... desculpe. Parece que atrapalhamos vocês..."
2600902-78 = "Não... i-isso tem uma explicação—!"
2600902-80 = "Então, divirtam-se!"
2600902-82 = "N-naaaaaaao...!"
2600902-84 = "（Depois disso, tive muito trabalho para acalmar a Yuzu, que se trancou no armário.）"
