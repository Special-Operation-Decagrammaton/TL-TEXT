[translation]
31100-1 = "Episódio 10;O Acampamento Começa!"
31100-5 = "Anexo de Trinity, o \"Alojamento de Acampamento\""
31100-7 = "Enfim chegamos, é aqui a nossa……"
31100-8 = "Sim, o lugar do acampamento. Enfim chegamos, ufa……."
31100-9 = "Como ouvi que era um prédio anexo sem uso havia um tempo, cheguei a pensar que a gente ia ter que dormir pelada no chão frio, mas……."
31100-10 = "É amplo, é bem cuidado, e ainda tem cama fofa; que ótimo."
31100-12 = "Assim dá pra todo mundo dormir junto, né, peladas♡"
31100-13 = "Por que é que você fica volta e meia enfatizando \"pelada\"!? E tem cama que chega, então não precisa todo mundo dormir junto, né!?"
31100-14 = "Já que é um acampamento e tal, não seria necessário esse tipo de \"estudo\" também?"
31100-15 = "Não pode! Coisa safada é proibido! Pena de morte!!"
31100-16 = "Bom, agora ainda tá claro, então vamos deixar assim. A noite é longa……♡"
31100-17 = "Hã, q-que, como assim!?!!?"
31100-22 = "É que, como a gente vai passar uma semana comendo, dormindo e estudando junto, pessoal, vamos nos dar bem……"
31100-26 = "Ué, peraí? Cadê a Azusa……?"
31100-27 = "Ora, até agora há pouco ela estava com a gente……."
31100-34 = "Reconhecimento concluído."
31100-35 = "R-reconhecimento……?"
31100-36 = "Fica bem longe do prédio principal de Trinity, então parece que não há risco de tiro de precisão."
31100-37 = "Também gostei do fato de só haver duas entradas pro exterior."
31100-38 = "Na hora H, dá pra bloquear uma das entradas, atrair os invasores pro ginásio do 1º andar e travar ali uma batalha de aniquilação."
31100-39 = "Bom, confirmei também algumas outras vulnerabilidades de segurança, mas nada que uma reforma não resolva."
31100-41 = "É-é que……."
31100-42 = "E aqui é o alojamento militar…… não, a área residencial. ……É limpo."
31100-43 = "Deixar uma instalação dessas sem uso, largada…… é desperdício da pior espécie."
31100-44 = "É que, Azusa…… a gente não veio aqui pra lutar; a gente veio estudar, viu……?"
31100-45 = "Sim, eu sei. É um treinamento intensivo de uma semana, né? Proibido sair, zero tempo livre, um treino duro em que, 24 horas por dia, não se pode baixar a guarda nem num único gesto."
31100-46 = "N-não acho que seja tanto assim, mas……."
31100-47 = "Também me preparei direitinho. Uniforme de ginástica e trocas de roupa, escova e pasta de dente pra higiene, sabonete, comida de emergência, cobertor, cantil……"
31100-48 = "Como esperado da Azusa, toda precavida."
31100-49 = "Óbvio. Preparação minuciosa é o primeiro passo pro sucesso."
31100-51 = "Ufufu. Todo mundo junto saciando a fome, saciando o sono, e movendo as mãos sem desviar o olhar rumo ao objetivo que todo mundo deseja…… que bom, um acampamento."
31100-52 = "……."
31100-53 = "……Sim, é verdade."
31100-57 = "Ah, mas eu cumpro a missão com certeza. Estudar direitinho e, de algum jeito, passar no 2º Exame Especial de Aptidão. Foi pra esse objetivo que eu vim aqui."
31100-58 = "……Não quero dar trabalho."
31100-59 = "Azusa……."
31100-60 = "Fica tranquila; me preparando pra um eventual ataque inimigo, trouxe também minas antipessoal e Claymores. Além disso, um kit de coisas que dariam material pra dispositivo explosivo improvisado, e algumas minas antitanque――"
31100-61 = "A-Azusa! Já falei que esse tipo de coisa……!"
31100-63 = "……Então, é isso, reforçando."
31100-64 = "É exatamente como a Nagisa disse. Como, infelizmente, a gente reprovou no 1º Exame Especial de Aptidão……"
31100-65 = "vamos fazer o acampamento neste anexo. A gente vai ficar aqui pela semana até o 2º exame."
31100-66 = "Dizem que ficou largado por muito tempo, mas, com uma limpeza, dá pra usar tranquilo; e o ginásio, os chuveiros e tudo mais parecem bem completos……."
31100-67 = "Sim, aliás, também tinha uma piscina lá fora. Embora parecesse sem uso havia um tempo."
31100-68 = "Ah, é mesmo. E aqui fica a uma distância que, com esforço, dá pra ir a pé até o prédio principal de Trinity; e no subsolo tinha uma espécie de refeitório, então também não parece que a gente vai passar fome."
31100-69 = "Além disso, enquanto a gente estiver aqui, o Sensei [USERNAME] também vai ficar sempre junto, então, se acontecer algo, acho que vai dar tudo certo!"
31100-70 = "[s] \"Sim, pode deixar.\""
31100-71 = "Muito obrigada. É que, do outro lado do corredor também tem um quarto, e o Sensei――"
31100-77 = "Não pode, de jeito nenhum!! Dormir junto é coisa safada!!!! Pena de morte!!!"
31100-78 = "É que, Koharu? Eu ainda não disse nada, viu……?"
31100-79 = "Eu já sei mais ou menos o que você ia dizer!! Não pode e ponto! Eu não deixo esse tipo de coisa acontecer!"
31100-80 = "A Koharu é durona, hein……."
31100-81 = "Por mim, o Sensei aqui não tem problema nenhum? Tem cama sobrando, e não precisa usar vários quartos à toa."
31100-82 = "[s] \"Aprofundem a amizade entre vocês. Se acontecer algo, é só me chamar.\""
31100-83 = "E-então, por ora, ficamos assim. Aí, a gente guarda as coisas e começa logo a estudar……"
31100-84 = "Ora, mas antes disso não acha que tem uma coisa pra fazer? Hifumi?"
31100-85 = "Hã……?"
31100-90 = "Sei, prevendo um ataque inimigo, instalar armadilhas?"
31100-94 = "Não, não é isso……"
31100-95 = "É limpeza♡"
31100-96 = "……L-limpeza, é?"
31100-97 = "Sim. Mesmo sendo um prédio que era mantido, como ficou muito tempo sem uso, não acha que tem bastante poeira e tal?"
31100-98 = "Ficar aqui assim também não parece bom pra saúde, então, que tal hoje começar pela limpeza e, num ambiente agradável, começar a estudar?"
31100-99 = "Sei, de fato é isso. Começar pela arrumação ao redor é o de praxe; senão, a gente acaba se distraindo no meio……."
31100-100 = "Sim, a higiene é importante. Na prática, até no campo de batalha é uma parte que mexe muito com a moral."
31100-101 = "L-limpeza……? É que, bom, se for limpeza normal……."
31100-102 = "Sim, talvez a Hanako tenha razão. Não adianta a empolgação girar em falso……."
31100-103 = "O que a gente vai fazer não é virar a noite; é estudo de prova dentro de um prazo devidamente preparado…… ou seja, que nem uma corrida de longa distância, tem que pensar na ordem, no ritmo e na estratégia."
31100-108 = "Então, primeiro, vamos começar pela faxina geral!"
31100-109 = "[s] \"Muito bem, vamos nessa!\""
31100-110 = "Então, depois de trocar pra uma roupa que pode sujar, vamos nos reunir na frente do prédio daqui a 10 minutos!"
31100-111 = "Entendido."
31100-112 = "Sim♪"
31100-118 = "R-roupa que pode sujar…… p-pode ser o uniforme de ginástica……?"
31100-120 = "10 minutos depois……"
31100-122 = "Alojamento de Acampamento - Portão principal"
31100-123 = "Sensei, desculpe a demora!"
31100-124 = "[s1] \"Ó, de uniforme de ginástica.\"\n[s2] \"Dá aquela cara de faxina, né.\""
31100-125 = "Sim, começar pela roupa também é importante. O uniforme de ginástica é mais fácil de se mexer e mais fácil de lavar quando suja."
31100-126 = "Sim, começar pela roupa também é importante. O uniforme de ginástica é mais fácil de se mexer e mais fácil de lavar quando suja."
31100-127 = "……E eu, o que faço?"
31100-128 = "Ah, Koharu, você foi rápida."
31100-129 = "Desculpa a demora."
31100-130 = "A Azusa também――peraí, por que você tá com a arma……?"
31100-131 = "Se não ando com ela grudada no corpo, a arma perde o sentido. Ataque é coisa que não se sabe quando vem."
31100-132 = "Não, é que, isso, como dizer, talvez você tenha razão, mas……."
31100-137 = "Desculpem a demora; vocês foram rápidas, né?"
31100-138 = "REPROVADAAAAA!!!"
31100-139 = "Ora……?"
31100-140 = "Por que é que você vem de maiô pra fazer faxina!? Você é boba!? É boba mesmo, né!? Suaa bobaa!!"
31100-141 = "Mas é mais fácil de se mexer, e, se sujar de alguma coisa, tá tudo bem, e enxaguar também é fácil――"
31100-142 = "Não é essa a questão!? Maiô é coisa de vestir na piscina! Aliás, e-e se alguém te vir, o que você faz!?"
31100-143 = "Alguém, que alguém; aqui não tem ninguém além da gente, viu……?"
31100-144 = "E-enfim, não pode! Reprovada e ponto! Você já tá proibida de usar maiô!"
31100-146 = "Ora…… bom, por outro lado, também……."
31100-147 = "Auu……."
31100-149 = "Depois disso, a Hanako voltou devidamente trocada no uniforme de ginástica."
31100-151 = "Próximo Episódio;Faxina Geral!"
