[translation]
31100-1 = "Episódio 10: Acampamento de estudos, começar!"
31100-5 = "Anexo da Trinity: \"Alojamento\""
31100-7 = "Finalmente chegamos. Então este é o nosso..."
31100-8 = "Sim, é o local do acampamento. Finalmente chegamos, ufa..."
31100-9 = "Ouvi dizer que era um prédio anexo que não era usado há algum tempo, então achei que teríamos que dormir no chão frio e ficar nuas, mas..."
31100-10 = "É espaçoso, está tudo em ordem e, acima de tudo, tem camas adoráveis."
31100-12 = "Deste jeito, acho que podemos dormir todas juntas, nuas! ♡"
31100-13 = "Por que você insiste em falar de \"ficar nua\" toda hora!? E tem camas suficientes para todas, então não precisamos dormir juntas, né!?"
31100-14 = "Já que é um acampamento, esse tipo de estudo também não é necessário?"
31100-15 = "Não! Nada de coisas indecentes! Pena de morte!!"
31100-16 = "Bem, ainda está claro agora, então vamos deixar assim por enquanto. A noite é uma criança, afinal... ♡"
31100-17 = "Hã, o, o que isso significa!?!!"
31100-22 = "Bem, como vamos passar uma semana comendo, dormindo e estudando juntas, espero que todas se deem bem..."
31100-26 = "Ué, cadê a Azusa-chan...?"
31100-27 = "Ora, ela estava conosco até agora pouco..."
31100-34 = "Reconhecimento concluído."
31100-35 = "Re, reconhecimento...?"
31100-36 = "Fica bem longe do prédio principal da Trinity, então não parece haver risco de ataques de franco-atiradores."
31100-37 = "Também gostei do fato de haver apenas duas entradas para o exterior."
31100-38 = "Em caso de emergência, posso bloquear uma das entradas e atrair os invasores para o ginásio no primeiro andar para uma batalha de extermínio."
31100-39 = "Bem, identifiquei algumas outras vulnerabilidades de segurança, mas nada que não possa ser corrigido."
31100-41 = "E, então..."
31100-42 = "E aqui é o quartel... não, a área residencial. ...É limpo."
31100-43 = "Deixar uma instalação dessas abandonada... é um desperdício total."
31100-44 = "Ei, Azusa-chan... nós não viemos aqui para lutar, viemos para estudar..."
31100-45 = "Sim, eu sei. É um treinamento intensivo de uma semana, certo? Proibição de sair, zero tempo livre, um treinamento rigoroso onde não se pode baixar a guarda nem por um segundo, 24 horas por dia."
31100-46 = "A, acho que não é para tanto..."
31100-47 = "Preparei tudo direitinho. Roupas de ginástica, trocas de roupa, itens de higiene como escova e pasta de dente, sabonete, rações de emergência, cobertores, cantil..."
31100-48 = "Como esperado da Azusa-chan, muito bem preparada."
31100-49 = "Naturalmente. Uma preparação minuciosa é a chave para o sucesso."
31100-51 = "Ufufu. Satisfazer o apetite, satisfazer o sono e, em seguida, focar sem distrações no objetivo que todas desejam... isso é bom, um acampamento."
31100-52 = "..."
31100-53 = "...Sim, é verdade."
31100-57 = "Ah, mas vou cumprir a missão com certeza. Vou estudar bastante e passar no 2º Exame Especial de Aproveitamento Escolar de qualquer jeito. Vim aqui por esse objetivo."
31100-58 = "...Não quero causar problemas."
31100-59 = "Azusa-chan..."
31100-60 = "Está tudo bem, preparei minas terrestres e Claymores para o caso de um ataque inimigo. Além disso, um conjunto de materiais para dispositivos explosivos improvisados e algumas minas antitanque..."
31100-61 = "A, Azusa-chan! Por isso eu disse que esse tipo de coisa..."
31100-63 = "...Enfim, começando de novo."
31100-64 = "Como a Nagisa-sama disse. Infelizmente, falhamos no 1º Exame Especial de Aproveitamento Escolar..."
31100-65 = "Então decidimos fazer este acampamento neste anexo. Ficaremos aqui por uma semana até o segundo exame."
31100-66 = "Disseram que estava abandonado há muito tempo, mas se limparmos um pouco, parece que dá para usar perfeitamente. O ginásio e os chuveiros também parecem estar em boas condições..."
31100-67 = "Ah, falando nisso, também tem uma piscina lá fora. Embora pareça que não é usada há algum tempo."
31100-68 = "Ah, entendi. Além disso, dá para ir andando até o prédio principal da Trinity se nos esforçarmos, e também tem algo parecido com um refeitório no subsolo, então não precisamos nos preocupar em passar fome."
31100-69 = "E enquanto estivermos aqui, o Sensei [USERNAME] também vai ficar conosco, então acho que ficaremos bem, aconteça o que acontecer!"
31100-70 = "[s] \"Sim, deixem comigo.\""
31100-71 = "Obrigada. Bem, tem um quarto do outro lado do corredor, então o Sensei..."
31100-77 = "Não, de jeito nenhum!! Dormir no mesmo quarto é indecente!!!! Pena de morte!!!"
31100-78 = "Ei, Koharu-chan? Eu ainda nem disse nada..."
31100-79 = "Eu já sei o que você ia dizer!! Não e não! Eu não vou deixar você fazer esse tipo de coisa!"
31100-80 = "A Koharu-chan é bem rigorosa, hein..."
31100-81 = "Eu não me importo que o Sensei fique aqui também, sabe? Sobraram camas e não faz sentido deixar vários quartos vazios."
31100-82 = "[s] \"Aproveitem para se enturmar. Se precisarem de algo, é só me chamar.\""
31100-83 = "E-então, vamos deixar assim por enquanto. Nesse caso, vou guardar minhas coisas e começar a estudar imediatamente..."
31100-84 = "Ora, mas você não acha que tem algo a ser feito antes disso? Hifumi-chan?"
31100-85 = "Hã...?"
31100-90 = "Entendo, vamos montar armadilhas prevendo um ataque inimigo?"
31100-94 = "Não, não é isso..."
31100-95 = "É hora da faxina, pessoal♡"
31100-96 = "...F-faxina, você disse?"
31100-97 = "Sim. Embora seja um prédio que recebia manutenção, ele não é usado há muito tempo. Não acham que tem muita poeira por aqui?"
31100-98 = "Não parece saudável passar o tempo aqui desse jeito. Que tal começarmos fazendo uma limpeza hoje para podermos estudar em um ambiente agradável?"
31100-99 = "Entendo, faz todo sentido. Começar organizando o ambiente ao redor é o básico, e se não fizermos isso, vamos acabar nos distraindo no meio do caminho..."
31100-100 = "Sim, a higiene é importante. Na verdade, no campo de batalha, isso afeta muito o moral das tropas."
31100-101 = "F-faxina...? Bem, se for uma limpeza comum, então..."
31100-102 = "Sim, talvez a Hanako-chan esteja certa. Não queremos que nosso esforço seja em vão..."
31100-103 = "O que vamos fazer não é um estudo de última hora, mas sim uma preparação para o exame dentro de um período bem definido... Ou seja, é como uma corrida de longa distância; precisamos pensar na ordem, no ritmo e na estratégia."
31100-108 = "Então, vamos começar com uma faxina geral!"
31100-109 = "[s] \"Certo, vamos dar o nosso melhor!\""
31100-110 = "Então, troquem de roupa por algo que possa sujar e nos encontramos na frente do prédio em 10 minutos!"
31100-111 = "Entendido."
31100-112 = "Certo♪"
31100-118 = "R-roupa que possa sujar... E-eu posso usar meu uniforme de ginástica...?"
31100-120 = "10 minutos depois..."
31100-122 = "Alojamento - Portão Principal"
31100-123 = "Sensei, desculpe a demora!"
31100-124 = "[s1] \"Oh, de uniforme de ginástica.\"\n[s2] \"Dá um ar de faxina, né?\""
31100-125 = "Sim, é importante entrar no clima através do vestuário. O uniforme de ginástica é mais fácil de se movimentar e, se sujar, é fácil de lavar."
31100-126 = "Sim, é importante entrar no clima através do vestuário. O uniforme de ginástica é mais fácil de se movimentar e, se sujar, é fácil de lavar."
31100-127 = "...E eu, o que devo fazer?"
31100-128 = "Ah, a Koharu-chan foi rápida."
31100-129 = "Demorei?"
31100-130 = "Azusa-chan também... mas por que você está com a arma...?"
31100-131 = "Uma arma não tem utilidade se você não a mantém por perto. Nunca se sabe quando um ataque pode acontecer."
31100-132 = "Não, isso, bem, como posso dizer, você pode até estar certa, mas..."
31100-137 = "Desculpem a demora, vocês foram rápidas, não foram?"
31100-138 = "FORA DAQUI!!!"
31100-139 = "Ora...?"
31100-140 = "Por que você está de biquíni para fazer faxina!? Você é idiota!? É idiota, né!? IDIOTA!!"
31100-141 = "Mas é fácil de se movimentar, não tem problema se sujar, e é fácil de lavar depois..."
31100-142 = "Não é esse o problema, né!? Biquíni é para usar na piscina! E outra, e se alguém te vir assim!?"
31100-143 = "Não tem mais ninguém aqui além de nós..."
31100-144 = "E-enfim, não pode! Fora, está fora! Você está proibida de usar biquíni!"
31100-146 = "Ora... bem, se é assim..."
31100-147 = "Auu..."
31100-149 = "Depois disso, Hanako trocou de roupa para o uniforme de ginástica e saiu."
31100-151 = "Próximo episódio: Faxina Geral!"
