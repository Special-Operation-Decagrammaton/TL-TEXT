[translation]
31100-1 = "Episódio 10: Início do Acampamento!"
31100-5 = "Anexo de Trinity 「Local do Acampamento」"
31100-7 = "Finalmente chegamos… aqui é o nosso…"
31100-8 = "Sim, o lugar do acampamento de estudos. Finalmente chegamos, fuu……"
31100-9 = "Ouvi dizer que era um prédio anexo que não era usado há tempos, então eu já tava me preparando pra dormir pelada no chão frio…"
31100-10 = "Mas é bem espaçoso, arrumadinho e ainda tem camas fofinhas. Perfeito!"
31100-12 = "Assim a gente pode dormir todas juntas… peladinhas♡"
31100-13 = "Por que você fica enfiando «pelada» em toda frase desde que chegamos!? E tem cama pra todo mundo, então não precisa dormir junto não!?"
31100-14 = "É um acampamento de estudos, né? Acho que esse tipo de «estudo» também é necessário…"
31100-15 = "Proibido! Safadeza é crime! Pena de morte！！"
31100-16 = "Bom, ainda tá claro, então vamos deixar pra depois. A noite é longa…♡"
31100-17 = "Eh, hã, q-que você quis dizer com isso！？！！？"
31100-22 = "Então… vamos passar uma semana inteira comendo, dormindo e estudando juntos, então vamos nos dar bem…"
31100-26 = "Hm? Cadê a Azusa-chan……？"
31100-27 = "Ara, ela tava com a gente até agora…"
31100-34 = "Reconhecimento concluído."
31100-35 = "R-reconhecimento……？"
31100-36 = "O prédio principal de Trinity fica bem longe, então pelo menos não tem risco de sniper."
31100-37 = "Só tem duas entradas pro exterior, gostei disso."
31100-38 = "Se der ruim, posso bloquear uma entrada e atrair os invasores pro ginásio no térreo pra um massacre."
31100-39 = "Tem mais algumas vulnerabilidades de segurança, mas dá pra consertar."
31100-41 = "E-eh……"
31100-42 = "E isso aqui deve ser o dormitório… ou área residencial. …Tá bem limpo."
31100-43 = "Deixar uma instalação desse tamanho abandonada… que desperdício."
31100-44 = "A-Azusachan… a gente não veio aqui pra lutar, viemos pra estudar…"
31100-45 = "Eu sei. É um treinamento intensivo de uma semana, né? Proibido sair, zero tempo livre, nada de descuido nem por um segundo."
31100-46 = "N-não é bem assim…"
31100-47 = "Eu vim preparada. Roupa de ginástica, roupas extras, escova e pasta de dente, sabonete, comida de emergência, cobertor, cantil…"
31100-48 = "Como esperado da Azusa-chan, super preparada."
31100-49 = "Óbvio. Preparação completa é o primeiro passo pro sucesso."
31100-51 = "Ufufu. Todo mundo junto saciando a fome, o sono, e trabalhando sem parar pra alcançar nosso objetivo… que bom esse acampamento."
31100-52 = "……。"
31100-53 = "……É, verdade."
31100-57 = "Ah, mas a missão tem que ser cumprida. Vamos estudar direito e passar na segunda prova. Foi pra isso que viemos."
31100-58 = "……Não quero dar trabalho pra ninguém."
31100-59 = "Azusa-chan……"
31100-60 = "Tranquilo, preparei minas antipessoais e claymores pra caso de ataque. Além disso, materiais pra fazer IEDs e algumas minas anticarro…"
31100-61 = "A-Azusachan！ Por isso que eu tô falando que esse tipo de coisa……！"
31100-63 = "……Então, pra recapitular."
31100-64 = "Como a Nagisa-sama disse. Infelizmente não passamos na primeira prova…"
31100-65 = "Então vamos fazer o acampamento de estudos nesse anexo. Vamos passar uma semana inteira aqui até a segunda prova."
31100-66 = "Disseram que o prédio tava abandonado há um tempo, mas depois de uma limpeza deve ficar ótimo. Tem ginásio, chuveiro… tá tudo bem equipado."
31100-67 = "Ah, aliás, tem uma piscina lá fora. Parece que não é usada há tempos."
31100-68 = "Ah, é mesmo. E como dá pra ir andando até o prédio principal de Trinity se precisar, e tem uma espécie de refeitório no subsolo, não vamos passar fome."
31100-69 = "E o Sensei [USERNAME] vai ficar com a gente o tempo todo, então se acontecer alguma coisa vai ficar tudo bem！"
31100-70 = "[s] \"Sim, pode deixar comigo.\""
31100-71 = "Obrigada. Eh, tem quartos do outro lado do corredor também, então Sensei pode escolher…"
31100-77 = "PROIBIDO！！ Absolutamente proibido！！ Dormir junto é safadeza！！！！ Pena de morte！！！"
31100-78 = "Eh, Koharu-chan？ Eu ainda nem disse nada…"
31100-79 = "Eu já sei o que você vai sugerir！！ Proibido é proibido！ Não vou deixar esse tipo de coisa acontecer！"
31100-80 = "Koharu-chan é bem rigorosa…"
31100-81 = "Pra mim o Sensei pode dormir aqui, não tem problema. Tem cama sobrando, não precisa desperdiçar quartos."
31100-82 = "[s] \"Vamos nos aproximar bastante durante o acampamento. Se precisarem de mim, é só chamar.\""
31100-83 = "E-então vamos fazer assim. Depois de arrumar as coisas, vamos começar a estudar logo…"
31100-84 = "Ara, mas antes não tem algo que precisamos fazer？ Hifumi-chan？"
31100-85 = "Eh……？"
31100-90 = "Entendi, você quer instalar armadilhas pra caso de ataque inimigo？"
31100-94 = "Não, não é isso…"
31100-95 = "Vamos fazer uma grande limpeza♡"
31100-96 = "……L-limpeza, é？"
31100-97 = "Sim. Mesmo sendo um prédio mantido, ficou abandonado por um tempo, então deve ter bastante poeira, não acha？"
31100-98 = "Não é saudável ficar assim. Que tal começar com uma limpeza geral pra estudar num ambiente agradável？"
31100-99 = "Faz sentido. Começar organizando o espaço ao redor é o básico, senão a gente fica distraído no meio do estudo…"
31100-100 = "Sim, higiene é importante. No campo de batalha isso afeta muito o moral."
31100-101 = "L-limpeza……？ Eh, bom, se for só limpeza normal…"
31100-102 = "Sim, como a Hanako-chan disse. Não adianta a gente se animar demais e depois se arrepender…"
31100-103 = "O que vamos fazer não é uma maratona de última hora, mas um estudo planejado durante uma semana… ou seja, é como uma corrida de longa distância. Precisamos pensar em ordem, ritmo e estratégia."
31100-108 = "Então vamos começar com uma grande limpeza！"
31100-109 = "[s] \"Beleza, vamos nessa！\""
31100-110 = "Então, troquem pra roupas que possam sujar e se reúnam na frente do prédio em 10 minutos！"
31100-111 = "Entendido."
31100-112 = "Sim♪"
31100-118 = "R-roupa que possa sujar…… o uniforme de ginástica serve……？"
31100-120 = "10 minutos depois……"
31100-122 = "Portão Principal do Anexo"
31100-123 = "Sensei, desculpe a demora！"
31100-124 = "[s1] \"Ooh, uniforme de ginástica.\"\n[s2] \"Realmente dá cara de faxina.\""
31100-125 = "Sim, a roupa certa é importante. O uniforme de ginástica é mais fácil de se mexer e de lavar se sujar."
31100-126 = "Sim, a roupa certa é importante. O uniforme de ginástica é mais fácil de se mexer e de lavar se sujar."
31100-127 = "……E eu, o que faço？"
31100-128 = "Ah, Koharu-chan chegou cedo."
31100-129 = "Desculpe a demora."
31100-130 = "Azusa-chan também―― espera, por que você tá com a arma……？"
31100-131 = "Não faz sentido carregar arma se não estiver sempre comigo. Ataque pode vir a qualquer momento."
31100-132 = "Não, é que… bem, pode até ser verdade, mas…"
31100-137 = "Desculpe a demora, todo mundo chegou cedo, hein？"
31100-138 = "FORAーーーーーー！！！"
31100-139 = "Ara……？"
31100-140 = "Por que você veio de biquíni pra limpar a casa！？ Tá maluca！？ Tá maluca mesmo！？ Idiota！！"
31100-141 = "Mas é confortável de mexer, se sujar é fácil de lavar, e…"
31100-142 = "Não é esse o problema！！ Biquíni é pra piscina！！ E se alguém te vir assim！？"
31100-143 = "Quem vai me ver？ Aqui só tem a gente…"
31100-144 = "E-enfim, proibido！ Biquíni proibido！ Você está proibida de usar biquíni！"
31100-146 = "Ara…… nesse caso, bem…"
31100-147 = "Auuu……"
31100-149 = "Depois disso, Hanako trocou pro uniforme de ginástica e voltou."
31100-151 = "Próximo; Grande Limpeza!"