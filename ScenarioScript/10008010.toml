[translation]
10008010-1 = "Episódio 1: Onde a visita nos levou"
10008010-5 = "（Com a chegada do Ano Novo, eu vim até um lugar que está bombando nas redes sociais ultimamente）"
10008010-6 = "（Talvez por ser um local voltado para o Ano Novo, está tão lotado que mal dá para se mexer）"
10008010-7 = "[s] \"Dá para sentir o clima de Ano Novo...\""
10008010-8 = "……Ah, Sensei!"
10008010-9 = "Feliz Ano Novo!"
10008010-10 = "……Ora? Que coincidência, Sensei?"
10008010-11 = "Ah, a-a-a-feliz Ano Novo! Sensei...!"
10008010-12 = "Ah, Sensei. Feliz Ano Novo."
10008010-13 = "[s] \"Pessoal, feliz Ano Novo para vocês também.\""
10008010-14 = "Fufu. Bem, acho que posso dizer: feliz Ano Novo."
10008010-15 = "Aliás, por que o Sensei está aqui?"
10008010-17 = "Veio passear procurando algo interessante para fazer?"
10008010-18 = "Deve ser parte do trabalho do Schale, né? Bom trabalho."
10008010-19 = "[s] \"Algo assim. Mas, mudando de assunto, vocês estão com visuais maravilhosos.\""
10008010-21 = "……Fufu, como esperado do Sensei."
10008010-22 = "Sim, este quimono não só usa materiais de altíssima qualidade, como cada detalhe do padrão foi costurado à mão por artesãos! E, mantendo o equilíbrio e a harmonia, este design luxuoso transborda presença!"
10008010-23 = "Perceber tamanha qualidade... você é mesmo nosso parceiro da Problem Solver 68!"
10008010-24 = "Bom, a gente só alugou na loja mesmo. Kufufu♪"
10008010-25 = "O quê!?"
10008010-26 = "……"
10008010-27 = "[s1] \"Não importa de onde seja, acho que combina muito com vocês.\"\n[s2] \"Ainda assim, vocês estão muito fofas, lindas e maravilhosas.\""
10008010-28 = "Heeeh……"
10008010-29 = "Heeeh……"
10008010-30 = "Você sempre sendo tão direto assim..."
10008010-31 = "A-a-a-agradeço muito...!"
10008010-32 = "B-b-bem!? É como se fosse um uniforme de batalha que preparamos para hoje, então...!?"
10008010-33 = "[s] \"Uniforme de batalha...?\""
10008010-34 = "D-de qualquer forma! Bem, nós estamos indo para o local do evento agora..."
10008010-35 = "S-se o Sensei quiser, o que acha de vir com a gente...?"
10008010-36 = "Pelo que parece, o Sensei está sozinho hoje, né? Vamos juntos!"
10008010-37 = "[s] \"Sim, com prazer.\""
10008010-44 = "Feliz Ano Novo! Bom dia a todos os espectadores e um feliz Ano Novo!"
10008010-45 = "Aqui é Shinon Kawaru, repórter ídolo do Departamento de Notícias de Chronos!"
10008010-46 = "Sem mais delongas, vocês sabem onde estamos!?"
10008010-47 = "Um lugar tão famoso que é difícil encontrar alguém em Kivotos que não conheça!"
10008010-48 = "É o famoso Daikichiden, muito popular por ser o \"lugar onde os desejos se realizam\"!"
10008010-49 = "E hoje, como convidado especial,"
10008010-50 = "recebemos o administrador do Daikichiden! Por favor!"
10008010-55 = "Olá, feliz Ano Novo. Sou o responsável pela administração do Daikichiden."
10008010-56 = "Conto com vocês hoje!"
10008010-57 = "O Daikichiden está sendo muito comentado nas redes sociais como o \"lugar onde os desejos se realizam\". O que o senhor pensa sobre isso?"
10008010-58 = "Hahaha. Sobre se isso é verdade ou não... é algo difícil para nós comentarmos."
10008010-59 = "De qualquer forma, como resultado desses rumores, tantas pessoas vieram nos visitar. Fico feliz em saber que todos estão se divertindo. Isso é a única coisa que posso afirmar com certeza."
10008010-60 = "Entendo, muito obrigado! Então, continuando, gostaríamos de saber mais detalhes sobre o Daikichiden e sobre o evento de hoje...!"
10008010-61 = "Bem, primeiramente, nós operamos de forma extremamente inteligente e elegante—"
10008010-64 = "Ah, quanto tempo. Agradeço muito pela ajuda no outro dia."
10008010-65 = "Fico feliz que, mais uma vez este ano, conseguimos enganar os olhos do Conselho Estudantil Federal..."
10008010-66 = "Aliás, sobre a empresa que adquirimos recentemente..."
10008010-67 = "Entendo. De fato, no contrato de construção assinado recentemente em Shanhaijing, há algo..."
10008010-68 = "[s] \"Que movimento incrível, não é?\""
10008010-69 = "Fufu, é verdade. Mesmo em meio a toda essa agitação, há provocações, suposições e uma guerra de informações acontecendo."
10008010-70 = "Só pelo fato de não estarmos disparando armas, é como se já estivéssemos em pleno combate..."
10008010-71 = "Por isso, cuide da sua aparência. Nós também estamos sendo muito observadas agora. Consegue sentir os olhares intensos vindo de todos os lados?"
10008010-72 = "Acho que não é bem assim, não?"
10008010-73 = "Bem, por enquanto só estamos sendo observadas de longe. Vamos, Sensei, estufe o peito. É melhor ficar atrás de nós, da Problem Solver 68. Mas como não sabemos de onde ou quando o inimigo pode aparecer, não baixe a guarda..."
10008010-78 = "Ah, o banheiro é por ali!"
10008010-79 = "Podem tirar a sorte aqui!"
10008010-80 = "[s] \"Serika!\""
10008010-81 = "……"
10008010-82 = "Se, Sensei!?"
10008010-83 = "Ah, feliz ano novo...!"
10008010-85 = "Ora, você é..."
10008010-86 = "É a garota do bico de Abydos!"
10008010-88 = "E ainda por cima, a Problem Solver 68...? Por que vocês estão aqui?"
10008010-89 = "[s] \"Feliz ano novo. Serika, você está trabalhando de sacerdotisa aqui?\""
10008010-90 = "Ah, sim. O salário por hora aqui é bem bom. Não dá para ficar só brincando só porque é feriado, e épocas assim são ótimas para ganhar um dinheiro extra."
10008010-91 = "[s] \"Você está se esforçando, bom trabalho.\""
10008010-92 = "Ehehe... b-bem, não é como se eu fosse ganhar algo só por ser elogiada, sabe?"
10008010-93 = "Eu pensei um pouco, mas é difícil achar um bico com um salário tão bom quanto este."
10008010-94 = "...Então, Problem Solver 68. Não sei o que vocês estão planejando, mas se fizerem este lugar explodir, não vou deixar barato."
10008010-95 = "N-nós não vamos fazer isso!? Você acha que somos um grupo de malucas que só pensa em explodir as coisas quando tem tempo livre!?"
10008010-96 = "Nós só viemos aqui normalmente...!"
10008010-97 = "...Bem, não é como se eu estivesse suspeitando de verdade."
10008010-98 = "De qualquer forma, todos vieram aqui para fazer pedidos, não é?"
10008010-99 = "[s] \"Então esse é o motivo principal?\""
10008010-100 = "Sim, é que está na moda nas redes sociais."
10008010-101 = "Venham, eu vou guiar vocês."
10008010-105 = "Se for para fazer uma oferenda, é por aqui."
10008010-106 = "Obrigada, garota do bico♪"
10008010-111 = "Chegamos."
10008010-116 = "Que fila enorme..."
10008010-117 = "Vai demorar um bom tempo até chegar a nossa vez."
10008010-118 = "...Ei, ei. Aquela caixa de oferendas não está estranha? Está escrito \"Cofre\" bem grande nela, não está?"
10008010-119 = "Ah, ouvi dizer que foi instrução do administrador daqui. Como vem muita gente, usaram um cofre para gerenciar tudo com mais rigor, ou algo assim...?"
10008010-120 = "E-entendo..."
10008010-121 = "Afinal, por causa do boato de que é um \"lugar onde os desejos se realizam\", essa multidão de gente está assim."
10008010-122 = "...Todo mundo gosta dessas coisas, né."
10008010-123 = "Mas tem gente que vem agradecer porque o desejo realmente foi realizado. E são muitas pessoas."
10008010-124 = "S-sério...!?"
10008010-125 = "Bem, não sei se é verdade... mas eu também pretendo vir fazer um pedido quando receber meu pagamento e as coisas acalmarem."
10008010-126 = "Bom, vou voltar ao trabalho. Problem Solver, não tentem causar confusão, entenderam?"
10008010-127 = "Sensei, nos vemos mais tarde."
10008010-132 = "..."
10008010-135 = "Será que os desejos realmente se realizam...?"
10008010-136 = "Eu acredito! Afinal, houve várias pessoas que disseram que \"se realizou\"...!"
10008010-137 = "De fato, ao meu redor também..."
10008010-139 = "H-humm...?"
10008010-145 = "(A Aru-chan começou a ficar inquieta.)"
10008010-146 = "(...)"
10008010-148 = "Mas, se isso for verdade, em certo sentido, pode ser perigoso..."
10008010-149 = "Perigoso? Por que diz isso?"
10008010-150 = "Um número considerável de pessoas faz pedidos ao mesmo tempo em que oferece moedas... Ou seja, aquela caixa de ofertas deve estar carregada de intenções intensas."
10008010-151 = "Além disso, este lugar já tem uma reputação duvidosa. Sendo um local assim, a força dessas 'intenções' é ainda maior. Se alguma 'impureza' se fixar em uma caixa de ofertas como essa..."
10008010-152 = "Se alguma 'impureza' se fixar...?"
10008010-153 = "Os desejos acumulados podem se inverter completamente e causar um desastre...!"
10008010-154 = "Não, não, não pode ser..."
10008010-155 = "Desejos são como dois lados da mesma moeda; é difícil distinguir entre um desejo e uma maldição. Como diz o ditado: 'quem deseja o mal aos outros, cava duas covas', não podemos baixar a guarda... Especialmente se este for realmente um 'lugar onde desejos se realizam'!"
10008010-156 = "...Gulp."
10008010-161 = "...É melhor não se preocupar com isso, sabe?"
10008010-162 = "D-do que exatamente você está falando?"
10008010-163 = "Você acha mesmo que eu me deixaria levar por histórias ocultistas sem fundamento?"
10008010-164 = "Pense bem, é apenas uma questão de probabilidade."
10008010-165 = "Com tanta gente reunida aqui, é natural que alguns tenham seus desejos realizados por coincidência, enquanto outros passem pelo oposto."
10008010-166 = "É por isso que essas histórias circulam e viram boatos que se espalham. É só isso."
10008010-167 = "Ou, pelo contrário, pode-se pensar que espalharam esses boatos de propósito para tornar este lugar popular."
10008010-168 = "Você acha que eu seria a presidente se não entendesse algo tão básico?"
10008010-173 = "..."
10008010-174 = "Hee..."
10008010-177 = "[ns] \"É a nossa vez.\""
10008010-182 = "Fufu, finalmente."
10008010-183 = "S-sim...!"
10008010-184 = "...Embora seja tarde para perguntar, isso realmente faz algum sentido?"
10008010-185 = "Não acho que nossa reputação vá melhorar, e tem muita gente e muito barulho."
10008010-186 = "Bem, sinto que as coisas estão bem diferentes do que a Aru imaginou... mas já que viemos até aqui, por que não fazemos nossos pedidos e vamos embora?"
10008010-190 = "Bem... aqui está, 50 mil ienes."
10008010-191 = "50 mil ienes!?"
10008010-192 = "K-Kayoko!? Eu disse para preparar uma quantia alta, mas esse valor...!"
10008010-193 = "Por que a presidente está surpresa com esse valor..."
10008010-194 = "Era um dinheiro que eu estava guardando para comprar um álbum novo, mas gastá-lo de uma vez em um desejo de Ano Novo não parece uma má ideia."
10008010-199 = "..."
10008010-201 = "A-ah..."
10008010-202 = "E-então, a próxima sou eu!"
10008010-203 = "Nos últimos meses, trabalhei sem dormir em canteiros de obras durante a madrugada..."
10008010-204 = "São 300 mil ienes!"
10008010-205 = "Iii!?"
10008010-206 = "!?"
10008010-207 = "O-o que você disse!?"
10008010-208 = "Como alguém como eu, um lixo, só consegue ser útil fazendo isso..."
10008010-209 = "Houve momentos em que meu corpo estava em frangalhos e pensei que fosse desmaiar ali mesmo..."
10008010-210 = "Mas, ainda assim, poder ser útil desta forma...! Estou tão feliz!"
10008010-212 = "Es-espera—"
10008010-216 = "Nossa, entrou direitinho..."
10008010-217 = "..."
10008010-218 = "..."
10008010-220 = "...Pronto, pedido feito!"
10008010-221 = "Bem... Haruka-chan, você está realmente bem...?"
10008010-222 = "E-estar bem, como assim...?"
10008010-223 = "De qualquer forma, se pude ser útil, é uma honra..."
10008010-228 = "..."
10008010-229 = "[s] \"Bem, então acho que é a minha vez.\""
10008010-233 = "[ns] Coloca o dinheiro na caixa de ofertas."
10008010-236 = "[ns] \"……。\""
10008010-237 = "Certo, agora é a vez da Aru-chan."
10008010-238 = "Ah, é mesmo……!?"
10008010-239 = "……Muito bem."
10008010-243 = "Humm……."
10008010-244 = "Entendi. Acho que agora entendi um pouco o que a Aru-chan queria fazer."
10008010-245 = "É verdade, se ficar em silêncio, até que passa uma certa aura."
10008010-246 = "Se jogar uma grande quantia de dinheiro assim, com certeza dá para sentir uma certa dignidade."
10008010-247 = "Aru-sama…… é maravilhosa……."
10008010-248 = "……Fufu."
10008010-251 = "(O, o que eu faço nessa situaçãoーーー!?)"
10008010-252 = "(50 mil ienes não é uma fortuna!? Kayoko, você sacrificou seus hobbies por tanto dinheiro assim!?)"
10008010-253 = "(E a Haruka, 300 mil ienes, o que é isso!? Que quantia absurda!?)"
10008010-254 = "(Será que era por isso que ela andava com o rosto pálido toda manhã!? Todo esse esforço para ganhar dinheiro e jogar fora assim tão fácil!?)"
10008010-255 = "(E, eu só trouxe 5 mil ienes……! O que eu faço……!?)"
10008010-256 = "(Vou colocar só 5 mil ienes no meio desse clima!? Sendo eu a presidente!?)"
10008010-258 = "……Aru-chan?"
10008010-263 = "(Vupt!)"
10008010-264 = "O movimento foi tão rápido que não deu para ver quanto a Aru-chan ofereceu……."
10008010-265 = "……Será que foi porque ela achou que, se vissem o valor, todos sentiriam muita pressão……?"
10008010-266 = "Humm……? Bem, tudo bem, mas o que será que a Aru-chan pediu?"
10008010-271 = "Bem……?"
10008010-272 = "Aru-chan……?"
10008010-273 = "…………………!"
10008010-274 = "Aru-chan, você está chorando……?"
10008010-280 = "(Que o negócio não vá à falência, que o negócio não vá à falência, que o negócio não vá à falência, que o negócio não vá à falência, que o negócio não vá à falência, que o negócio não vá à falência……!!)"
10008010-281 = "(Por favor! Eu imploro de verdade!! Isso realmente traz sorte, não traz!? Se eu pedir, vai se realizar, né!?)"
10008010-282 = "(Já que coloquei tanto dinheiro, faça alguma coisa a respeitoーーーーー!!!!)"
10008010-284 = "Nossa, parece algo bem urgente, mas…… o que será que ela está pedindo?"
10008010-285 = "Eu acho que consigo imaginar……."
10008010-288 = "Então, acho que agora é a minha vez?"
10008010-292 = "Tcharam! 100 milhões de ienes~~!"
10008010-293 = "Não, não, não……."
10008010-294 = "Ce, cem milhões de ienes!? Incrível!"
10008010-296 = "Eeeeh!?"
10008010-297 = "[s] \"Isso é de algum jogo……?\""
10008010-299 = "Sim, isso mesmo!"
10008010-300 = "É difícil conseguir tanto dinheiro de verdade, então pensei que isso serviria. É dinheiro de jogo de tabuleiro."
10008010-304 = "Kufufu, então……!"
10008010-305 = "Espere um pouco aííííí!!"
10008010-306 = "Hm? Aru-chan, o que houve?"
10008010-307 = "Não, é que…… Mutsuki, isso não é um problema?"
10008010-308 = "Problema? Por quê?"
10008010-309 = "Bem, não seria melhor fazer as coisas do jeito certo……? Sabe, é Ano Novo, e não é bom deixar impurezas na caixa de ofertas……."
10008010-310 = "……Impurezas?"
10008010-311 = "Se o seu pedido acabar sendo distorcido, não seria um problema……?"
10008010-312 = "Ahaha! Aru-chan, do que você está falando?"
10008010-313 = "Você mesma disse agora há pouco que isso era uma \"história de ocultismo\", não disse~?"
10008010-314 = "Tudo bem, tudo bem, não tem como isso acontecer."
10008010-315 = "Não é como se a caixa de oferendas fosse explodir de repente só porque fizemos algo profano, né?"
10008010-319 = "Mas explodiu, não explodiu!?"
10008010-320 = "A-Aru-sama! Você está bem!?"
10008010-321 = "Uau, o que é isso!? O que está acontecendo!?"
10008010-322 = "……Tem alguém ali."
10008010-327 = "A-Aquilo é……!?"
10008010-328 = "Tem alguém dentro da fumaça……!"
10008010-332 = "Teyaa!!"
10008010-334 = "Os trilhos que continuam girando, em breve…… levarão ao futuro da justiça!"
10008010-338 = "Esquadrão de Sushi Giratório Infinito, Kaitenger! Chegamos!"
10008010-343 = "Isso seria…… o evento de hoje?"
10008010-345 = "Seus vilões! Sintam o martelo da justiça!!"
10008010-346 = "Opa, sem nenhuma explicação?"
10008010-347 = "Bem, tanto faz,"
10008010-348 = "eu vou brincar com vocês!"
