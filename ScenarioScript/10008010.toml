[translation]
10008010-1 = "第1話;訪れた先で"
10008010-5 = "（新年を迎えて、最近SNSで流行りの場所へと来ていた）"
10008010-6 = "（お正月向けの場所ということもあってか、もはや身動きが取れないほど混み合っている）"
10008010-7 = "[s] \"お正月って感じがする……。\""
10008010-8 = "……あっ、先生！"
10008010-9 = "あけましておめでとー！"
10008010-10 = "……あら？奇遇ね、先生？"
10008010-11 = "あ、あああああけましておめでとうございます！先生……！"
10008010-12 = "や、先生。あけましておめでとう。"
10008010-13 = "[s] \"みんな、あけましておめでとう。\""
10008010-14 = "ふふっ。まあ、あけましておめでとう、と言っておこうかしら。"
10008010-15 = "ところで先生はどうしてここに？"
10008010-17 = "何か面白そうなことないかな～って、ぶらぶらしてたとか？"
10008010-18 = "シャーレの仕事の一環とかでしょ、お疲れ様。"
10008010-19 = "[s] \"そんなところかな。それよりみんな、素敵な格好だね。\""
10008010-21 = "……ふふっ、さすがは先生ね。"
10008010-22 = "そう、この着物は最高級の素材が使われている上に、模様の一つ一つまで職人が手で縫いつけた逸品！そして全体的にバランスと調和が保たれつつも、存在感溢れるこのゴージャスなデザイン！"
10008010-23 = "この良さに気が付くだなんて、やはり我々便利屋68のパートナー！"
10008010-24 = "ま、普通にお店でレンタルしたやつだけどね。くふふっ♪"
10008010-25 = "ちょぉっ！？"
10008010-26 = "……。"
10008010-27 = "[s1] \"どこの物だとしても、みんな似合ってると思うよ。\"\n[s2] \"それでも、みんなすごく可愛くて綺麗で良いね。\""
10008010-28 = "へぇ～……。"
10008010-29 = "へぇ～……。"
10008010-30 = "そうやってまたストレートな……。"
10008010-31 = "あ、あああありがとうございます……！?"
10008010-32 = "ま、まあ！？今日のために揃えた戦闘服のようなものだから……！？"
10008010-33 = "[s] \"戦闘服……？\""
10008010-34 = "と、とにかく！その、私たちはこのまま会場の方に行くけれど……。"
10008010-35 = "も、もし先生が良かったら、一緒にどうかしら……？"
10008010-36 = "見た感じ、先生今日はひとりなんでしょ？一緒に行こうよ～！"
10008010-37 = "[s] \"うん、喜んで。\""
10008010-44 = "ハッピーニューイヤー！視聴者のみなさんおはようございます、そしてあけましておめでとうございます！"
10008010-45 = "クロノス報道部所属、アイドルレポーターの[ruby=かわる]川流[/ruby]シノンです！"
10008010-46 = "早速ですが、この場所がどこなのかご存じでしょうか！？"
10008010-47 = "今やキヴォトスでも知らない人の方が少ないのでは、というほど有名な場所！"
10008010-48 = "「願い事が叶う場所」として大人気な、あの「[ruby=だいきちでん]大吉殿[/ruby]」です！"
10008010-49 = "さらに本日は特別なゲストとして、"
10008010-50 = "「大吉殿」の管理人の方をお迎えしております！どうぞ！"
10008010-55 = "どうも、あけましておめでとうございます。「大吉殿」の管理を担当している者です。"
10008010-56 = "本日はよろしくお願いします！"
10008010-57 = "「大吉殿」は「願い事が叶う場所」として現在SNS上でかなり話題になっておりますが、そのことについてはどうお考えでしょうか？"
10008010-58 = "はっはっは。それが本当かどうか……という部分については、私共としても何とも申し上げにくい部分ではあるのですが。"
10008010-59 = "何はともあれそういった噂の結果として、これだけの方々が来てくださる。それだけみなさんが楽しんでくださっているというのは、嬉しいことだなと。それだけは確実に申し上げられますね。"
10008010-60 = "なるほど、ありがとうございます！それでは続けてこの「大吉殿」そのものや、今回のイベントについて詳しくお伺いしたく……！"
10008010-61 = "そうですね。まず私共は、非常にインテリジェンスかつスマートな運営を――"
10008010-64 = "おや、ご無沙汰しております。先日は大変お世話になりましたな。"
10008010-65 = "今年もどうにか、連邦生徒会の目を誤魔化すことができて何より……。"
10008010-66 = "ところで、最近弊社で買収した業者についてなんですが……"
10008010-67 = "なるほど。確かに先日締結した、山海経における建設契約の中にも何やら……"
10008010-68 = "[s] \"すごい賑わってるね。\""
10008010-69 = "ふふっ、そうね。こうして騒々しい中でも牽制や推察、情報戦が行われているのよ。"
10008010-70 = "銃を撃っていないというだけで、今はもう既に戦闘中みたいなもの……。"
10008010-71 = "だから身だしなみには気を付けなさいね。私たちだって、今もかなり見られているわ。あちこちから熱い視線が感じられるでしょう？"
10008010-72 = "そうでもないと思うけど？"
10008010-73 = "ま、まだ遠巻きに観察されてるだけよ。さあ先生、もっと胸を張りなさい。私たち便利屋68の後ろについてくると良いわ。ただ相手はいつどこから出てくるか分からないから、油断せず……"
10008010-78 = "あ、お手洗いはあちらになりまーす！"
10008010-79 = "おみくじはこちらで引けますよー！"
10008010-80 = "[s] \"セリカ！\""
10008010-81 = "……"
10008010-82 = "せ、先生！？"
10008010-83 = "あ、あけましておめでとう……！"
10008010-85 = "あら、あなたは……。"
10008010-86 = "アビドスのバイトちゃんじゃーん！"
10008010-88 = "それに、便利屋68まで……？どうしてあんたたちがここにいるの？"
10008010-89 = "[s] \"あけましておめでとう。セリカはここで、巫女さんのバイト？\""
10008010-90 = "あ、うん。ここの時給、結構良いんだよね。休みの日だからって遊んでばっかりいられないし、こういう時は稼ぎ時だから。"
10008010-91 = "[s] \"頑張ってるね、お疲れ様。\""
10008010-92 = "えへへ……ま、まあ、褒めても何も出ないけど？"
10008010-93 = "ちょっと迷ったけど、ここまで時給が良いアルバイトもなかなか見つからなくってさ。"
10008010-94 = "……だから便利屋68。あんたたちが何を企んでるかは知らないけど、ここを爆発なんてさせたらタダじゃおかないからね。"
10008010-95 = "そ、そんなことしないわよ！？私たちのことを、暇さえあれば爆発させる面白集団とでも思ってるわけ！？"
10008010-96 = "私たちはただ、普通にここに来ただけで……！"
10008010-97 = "……ま、別に本気で疑ってるわけじゃないけどさ。"
10008010-98 = "とにかく、みんなお願い事をしに来たんでしょう？"
10008010-99 = "[s] \"やっぱりそれ目的が多いの？\""
10008010-100 = "うん、SNSで流行ってることもあってね。"
10008010-101 = "ほら、案内するから。"
10008010-105 = "お賽銭ならこっちだよ。"
10008010-106 = "ありがとー、バイトちゃん♪"
10008010-111 = "到着ー。"
10008010-116 = "ものすごい列だね……"
10008010-117 = "回ってくるまで結構時間かかりそう。"
10008010-118 = "……ねぇねぇ。何かあの賽銭箱、変じゃない？思いっきり「金庫」って書いてあるけど？"
10008010-119 = "あー、何かここの管理人さんからの指示でって聞いた気がする。あまりにもたくさんの人がくるから、厳重に管理する目的で金庫を流用したとか何とか……？"
10008010-120 = "そ、そう……。"
10008010-121 = "何せその「願い事が叶う場所」って噂のせいで、こうして人の波がすごいことになってるし。"
10008010-122 = "……みんな、そういうの好きなのね。"
10008010-123 = "でも実際に「願い事を叶えてもらったから」って、お礼に来る人もいるんだよね。それも結構な数。"
10008010-124 = "そ、そうなの……！？"
10008010-125 = "まあ本当かどうかは知らないけど……私も後でバイト代が入って落ち着いた頃に、一度お願い事しに来るつもり。"
10008010-126 = "じゃあ私は戻るね。便利屋、あんまり暴れたりしないでよ？"
10008010-127 = "先生、また後でね。"
10008010-132 = "……。"
10008010-135 = "願いごと、本当に叶うのでしょうか……？"
10008010-136 = "私は信じますよ！実際に「叶った」って言ってる方も、結構いらっしゃいましたし……！"
10008010-137 = "確かに、私の周りにも……。"
10008010-139 = "ふ、ふーん……？"
10008010-145 = "（アルちゃん、ソワソワし始めたね）"
10008010-146 = "（……）"
10008010-148 = "ですがそれが本当なら、ある意味では危険とも言えます……。"
10008010-149 = "危険？どうしてです？"
10008010-150 = "かなりの数の方々が、お賽銭と同時に願いごとをしている……つまりあの賽銭箱には、相当な念が込められているはずです。"
10008010-151 = "それに、元々ここは幾つか曰く付きの場所でもあります。こういう場所ですから、「念」の強さというものは尚更です。そんな賽銭箱に、もし「穢れ」が付いたりしたら……"
10008010-152 = "「穢れ」が付いたりしたら……？"
10008010-153 = "蓄積された願いが丸っと裏返って、大変なことに……！"
10008010-154 = "いやいや、まさかそんなこと……。"
10008010-155 = "願いというのは表裏一体、願いと呪いの区別は難しいです。「人を呪わば穴二つ」という言葉もあるように、油断してはなりません……本当に「願い事が叶う場所」ならば、尚のこと……！"
10008010-156 = "……ごくり。"
10008010-161 = "……気にしない方が良いよ？"
10008010-162 = "い、一体何のことかしら？"
10008010-163 = "私がそんな、何の根拠もないオカルト話に振り回されるとでも？"
10008010-164 = "よく考えてみなさい、単純な確率の話よ。"
10008010-165 = "これだけ大勢の人が集まれば、偶然願いが叶う人も、逆のことが起きる人もいるわ。"
10008010-166 = "だからそんな話がよく聞こえてきて、噂になってはまた広まっていく。それだけの事よ。"
10008010-167 = "あるいは逆に、ここを流行らせるためにわざとそういう噂を流したとも考えられるわ。"
10008010-168 = "それくらい分からなくて、私が社長をやっているとでも思って？"
10008010-173 = "……。"
10008010-174 = "へー……。"
10008010-177 = "[ns] \"私たちの番だね。\""
10008010-182 = "ふふっ、ようやくね。"
10008010-183 = "は、はいっ……！"
10008010-184 = "……今更だけど、これって本当に意味あるの？"
10008010-185 = "特に評判が上がるとも思えないし、人は多いしうるさいし。"
10008010-186 = "まあ、アルが思い描いてたのとは色々違ってる気もするけど……せっかくここまで来たんだし、お願い事だけでもして帰れば良いんじゃない？"
10008010-190 = "えっと……あった、5万円。"
10008010-191 = "5万円！？"
10008010-192 = "か、カヨコ！？確かに大金を用意するようには言ったけれど、そこまでの金額を……！？"
10008010-193 = "社長がこの金額で驚いてどうするのさ……。"
10008010-194 = "元々新作のアルバムを買おうと思って貯めてたお金だけど。まあ新年の願い事にパッと使うのも、それはそれで悪くないかな。"
10008010-199 = "……。"
10008010-201 = "あ、あぁっ……。"
10008010-202 = "で、では次は私です！"
10008010-203 = "ここ数カ月、深夜の工事現場で寝る間も惜しんで働いた……"
10008010-204 = "30万円です！"
10008010-205 = "いぃっ！？"
10008010-206 = "！？"
10008010-207 = "な、何ですってぇ！？"
10008010-208 = "私みたいなクズが役に立つには、これくらいしかできないので……。"
10008010-209 = "一時は身体がガタガタになり、そのまま倒れてしまうかと思いましたが……。"
10008010-210 = "それでも、こうしてお役に立てるだなんて……！嬉しいです！"
10008010-212 = "ま、待っ――"
10008010-216 = "いやー、綺麗に入ったね……。"
10008010-217 = "……。"
10008010-218 = "……。"
10008010-220 = "……はい、お願いごと完了です！"
10008010-221 = "えっと……ハルカちゃん、本当に大丈夫……？"
10008010-222 = "だ、大丈夫、とは……？"
10008010-223 = "とにかくお役に立てたのであれば、光栄ですが……。"
10008010-228 = "……。"
10008010-229 = "[s] \"えっと、じゃあ私の番かな。\""
10008010-233 = "[ns] 賽銭箱にお金を入れる。"
10008010-236 = "[ns] \"……。\""
10008010-237 = "じゃ、次はアルちゃんの番だよ。"
10008010-238 = "そ、そうね……！？"
10008010-239 = "……よし。"
10008010-243 = "へぇ……。"
10008010-244 = "なるほどねー。アルちゃんが何をしたかったのか、ちょっとだけ分かったかも。"
10008010-245 = "そうだね、黙ってれば雰囲気は出てる。"
10008010-246 = "あれで大金を投げたら、確かに威厳も感じられるかな。"
10008010-247 = "アル様……素敵です……。"
10008010-248 = "……ふふっ。"
10008010-251 = "（ど、どうすれば良いのよこの状況ーーー！？）"
10008010-252 = "（5万円って、超大金じゃない！？カヨコ、自分の趣味を我慢してまでそんなお金を！？）"
10008010-253 = "（ハルカも30万円って何よ！？とんでもない金額じゃないの！？）"
10008010-254 = "（一時期毎朝のように顔色が悪かったのはそのせい！？そんなに頑張って稼いだお金を、あんな簡単に！？）"
10008010-255 = "（わ、私、5千円しか持ってきてないのに……！どうすれば……！？）"
10008010-256 = "（この空気の中で、5千円出すの！？社長の私が！？）"
10008010-258 = "……アルちゃん？"
10008010-263 = "（シュバッ！）"
10008010-264 = "動きが速すぎて、アルちゃんのお賽銭がいくらなのか見えなかった……。"
10008010-265 = "……自分の金額を見たら、みんながプレッシャーを感じ過ぎると思ったから……とか？"
10008010-266 = "ふーん……？まあ良いけど、アルちゃんはどんなお願いごとをするんだろうね？"
10008010-271 = "えっと……？"
10008010-272 = "アルちゃん……？"
10008010-273 = "…………………っ！"
10008010-274 = "アルちゃん、泣いてる……？"
10008010-280 = "（事業が潰れませんように、事業が潰れませんように、事業が潰れませんように、事業が潰れませんように、事業が潰れませんように、事業が潰れませんように……っ！！）"
10008010-281 = "（お願い！ほんっっっとにお願い！！ご利益あるんでしょう！？願えば叶うんでしょう！？）"
10008010-282 = "（こんなに大金を入れたんだから、何とかしなさいよーーーーー！！！！）"
10008010-284 = "な、なんかすごい切実な感じだけど……何を願ってるんだろ？"
10008010-285 = "何となく分かる気がするけど……。"
10008010-288 = "じゃあ、最後は私の番かな？"
10008010-292 = "じゃじゃーん！1億円～～！"
10008010-293 = "いやいやいや……。"
10008010-294 = "いっ、1億円ですか！？すごいですっ！"
10008010-296 = "ええぇぇっ！？"
10008010-297 = "[s] \"それって、ゲームとかの……？\""
10008010-299 = "うん、そう！"
10008010-300 = "お金をたくさん用意するのは大変だし、まあこれでも良いかなって思って。ボードゲームのお金をね。"
10008010-304 = "くふふっ、それじゃあ……！"
10008010-305 = "ちょぉっと待ったあぁぁぁっ！！"
10008010-306 = "ん？アルちゃん、どしたの？"
10008010-307 = "いや、その……ムツキ、それはマズいんじゃないかしら？"
10008010-308 = "マズい？どうして？"
10008010-309 = "その、やっぱりきちんとした方が良いんじゃなくって……？ほら新年だし、あと、賽銭箱に穢れとか付くと良くないし……。"
10008010-310 = "……穢れ？"
10008010-311 = "ね、願いごとが裏返ったりしたら、困るじゃない……？"
10008010-312 = "あははっ！アルちゃん何言ってるの？"
10008010-313 = "その話はさっき、自分で「オカルト話」って言ってたじゃ～ん？"
10008010-314 = "大丈夫大丈夫、そんなこと起きっこないって。"
10008010-315 = "まさか罰当たりなことをしたからって、賽銭箱が急に爆発したりしないだろうし――"
10008010-319 = "爆発したじゃないのよぉ！？"
10008010-320 = "あ、アル様！大丈夫ですか！？"
10008010-321 = "わーお、なになに！？何が起きてるのっ！？"
10008010-322 = "……誰かいる。"
10008010-327 = "あ、あれは……！？"
10008010-328 = "煙の中に、誰かが……！"
10008010-332 = "てやぁっ！！"
10008010-334 = "回り続けるレールはやがて……正義の未来へと繋がる！"
10008010-338 = "無限回転寿司戦隊・カイテンジャー！参上！"
10008010-343 = "これ、今日のイベント……とか？"
10008010-345 = "この悪党め！正義の鉄槌を食らえ！！"
10008010-346 = "おっと、何の説明も無し？"
10008010-347 = "まあ良いよ、"
10008010-348 = "遊んであげる！"
