[translation]
2000305-1 = "O Teste do Atirador (1)"
2000305-2 = "Telhado de um prédio"
2000305-3 = "Dizem que atirar é uma 'batalha contra a espera', e a virtude mais necessária para um atirador é a 'paciência'."
2000305-4 = "Mantendo o alvo fixo, o atirador não deve mover o corpo de forma alguma até que o inimigo entre na linha de tiro."
2000305-5 = "Não importa qual seja a tentação ou a dor, absolutamente não deve se mover...!"
2000305-6 = "[s] \"Mesmo se estiver com fome?\""
2000305-7 = "Com certeza. #nPor isso, ao executar missões de tiro, é comum perder a hora de comer."
2000305-8 = "[s] \"Isso é difícil. Mashiro, você é incrível.\""
2000305-9 = "Não é para tanto. #nIsso é igual para todos os outros atiradores."
2000305-10 = "Além disso, eu ainda não sou nem um pouco perfeita."
2000305-11 = "Na verdade, há uma coisa que me incomoda toda vez que vou atirar..."
2000305-12 = "[s] \"Algo que te incomoda?\""
2000305-13 = "É que... os insetos..."
2000305-14 = "[s] \"Insetos?\""
2000305-15 = "Talvez porque esteja ficando mais quente e os insetos tenham aumentado no pátio e no telhado, quando fico na posição de tiro, eles ficam subindo na minha pele..."
2000305-16 = "...Por causa daquela sensação horrível, minha mira acaba saindo do lugar."
2000305-17 = "[s] \"Não pode espantar com a mão?\""
2000305-18 = "Claro que não! #nMesmo a respiração precisa ser feita com o máximo de cuidado, então mudar de posição por causa de um inseto..."
2000305-19 = "É algo inaceitável para um atirador!"
2000305-20 = "Ugh... mas desse jeito, não consigo treinar direito..."
2000305-21 = "Sendo assim, o que acha de o Sensei me ajudar?"
2000305-22 = "[s] \"Eu? Como?\""
2000305-23 = "Eu vou ficar parada mantendo a calma, e o Sensei vai me fazer cócegas como se um inseto tivesse aparecido."
2000305-24 = "Vamos lá, estou pronta."
2000305-25 = "Ufa..."
2000305-28 = "[s] Fazer cócegas no braço da Mashiro."
2000305-31 = "Ugh... isso está dentro do esperado. #nCom esse nível de estímulo, minha calma não será abalada."
2000305-32 = "[s] Fazer cócegas na bochecha da Mashiro."
2000305-35 = "U-ugh... a-até em lugares assim... m-mas está tudo bem. #nPara um tiro perfeito, isso é apenas..."
2000305-36 = "[s] Fazer cócegas no pescoço da Mashiro."
2000305-39 = "Hii, kyaan?! #nO-onde exatamente você está tocando, Sensei!"
2000305-42 = "Mesmo que seja um treinamento, isso não significa que pode tocar em qualquer lugar!"
2000305-43 = "Francamente... e eu que sempre achei que o Sensei era um defensor da justiça!"
2000305-45 = "Depois disso, passei um tempo consolando a Mashiro, que estava irritada."
