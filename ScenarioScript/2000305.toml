[translation]
2000305-1 = "狙撃手の試練（１）"
2000305-2 = "ある建物の屋上"
2000305-3 = "狙撃は「待つ事との戦い」という言葉があるくらいで、狙撃手にとって一番必要な徳目は「忍耐」です。"
2000305-4 = "目標を固定したまま、射線上に敵が来るまで、狙撃手は絶対に身体を動かしてはいけません。"
2000305-5 = "どんな誘惑や、苦痛があったとしても、絶対にです……！"
2000305-6 = "[s] \"お腹が空いても？\""
2000305-7 = "もちろんです。#nそのため、狙撃任務を実行していると、食事のタイミングを逃すことがよくあります。"
2000305-8 = "[s] \"それは大変。マシロはすごいね。\""
2000305-9 = "そんなことありません。#nこれは他の狙撃手たちも同じなので。"
2000305-10 = "それに、私はまだ決して完璧ではありません。"
2000305-11 = "実は狙撃をするたびに気になってしまうことがひとつありまして……。"
2000305-12 = "[s] \"気になること？\""
2000305-13 = "その……虫が……。"
2000305-14 = "[s] \"虫？\""
2000305-15 = "暑くなってきて校庭や屋上に虫が増えてきたせいか、狙撃の姿勢を取っていると肌の上にどんどん虫が忍び寄ってくることがあって……。"
2000305-16 = "……あの気持ち悪い感触のせいで、すぐ照準点がずれてしまいます。"
2000305-17 = "[s] \"手で追い払っちゃダメなの？\""
2000305-18 = "もちろんダメです！#n息をすることにすら細心の注意を払って行わなければいけないのに、虫ぐらいのことで姿勢を変えるなんて……。"
2000305-19 = "狙撃手としてあってはならないことです！"
2000305-20 = "うう……ですがこのままでは、ちゃんとした訓練になりません……。"
2000305-21 = "そういうことで、先生が手伝ってくださる、というのはいかがでしょうか？"
2000305-22 = "[s] \"私が？どうやって？\""
2000305-23 = "私がじっと立って平静を保ちますので、先生は虫が現れたかのように私をくすぐるんです。"
2000305-24 = "さあ、私は準備OKです。"
2000305-25 = "ふう……。"
2000305-28 = "[s] マシロの腕をくすぐる。"
2000305-31 = "うっ……これぐらいは想定内です。#nこれぐらいの刺激で、私の平静は崩れません。"
2000305-32 = "[s] マシロの頬をくすぐる。"
2000305-35 = "う、ううっ……そ、そんなところまで……で、でも大丈夫です。#n完璧な狙撃のためには、これしきの……。"
2000305-36 = "[s] マシロの首筋をくすぐる。"
2000305-39 = "ひっ、ひゃんっ？！#nい、いったいどこを触っているんですか、先生！"
2000305-42 = "いくら訓練だとしても、どこを触ってもいいという意味ではありません！"
2000305-43 = "まったく……先生はいつも正義の味方だと思っていたのに！"
2000305-45 = "その後しばらく、怒ったマシロを慰めた。"
