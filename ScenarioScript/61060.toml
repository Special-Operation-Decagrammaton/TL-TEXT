[translation]
61060-1 = "Episódio 6; A Cadeira do Outro Lado"
61060-6 = "...O sol vai se pôr em breve."
61060-7 = "É verdade. Vamos nos apressar um pouco."
61060-11 = "..."
61060-12 = "Hiyori? Algum problema?"
61060-13 = "É que... n-nós realmente vamos voltar para Arius, não é...#nA ficha finalmente caiu, ehehe..."
61060-14 = "Não há o que fazer agora que a decisão está tomada. Só nos resta fazer o que deve ser feito."
61060-15 = "Eu já desisti de tentar encontrar sentido em cada coisinha que acontece."
61060-16 = "É uma boa atitude. Você cresceu."
61060-21 = "Líder, cala a boca. Você que vive sumindo por conta própria."
61060-22 = "Guh..."
61060-23 = "Mas, você não está pelo menos um pouquinho feliz que a Satchan está agindo como líder de novo?"
61060-24 = "É apenas temporário."
61060-25 = "I-Isso é...!"
61060-26 = "...Esquece.#nNão importa o que eu diga, a Princesa não vai mudar de ideia mesmo."
61060-27 = "Sempre tão teimosa."
61060-28 = "Já disse que não é isso!"
61060-30 = "[ns]\"É maravilhoso ver como vocês se dão bem.\""
61060-31 = "Até o Sensei... Se continuar dizendo isso, nós vamos te deixar pra trás."
61060-32 = "Hehe. Eu me assustei no começo, mas... fico feliz que o Sensei tenha vindo com a gente."
61060-34 = "D-Deixe a sua escolta... com a gente. Ehehe..."
61060-36 = "Sensei, eu tenho um pedido a fazer."
61060-37 = "Você poderia dar aulas para as alunas de Arius?"
61060-38 = "Claro, a sua segurança é a nossa maior prioridade."
61060-39 = "Pode ser por aulas remotas ou de forma indireta.#nNão mediremos esforços para cooperar e tornar isso realidade da forma que você desejar."
61060-40 = "Talvez isso seja visto como um ato que ignora a vontade das alunas de Arius, mas..."
61060-41 = "...Hã?#nDar aulas lá no local...!?"
61060-43 = "..."
61060-44 = "Eu tinha certeza de que a missão era só ajudar a preparar as aulas remotas."
61060-45 = "Que nós iríamos para Arius e tentaríamos convencer as alunas que ficaram."
61060-46 = "Eu nunca imaginei que acabaria virando uma missão de escolta..."
61060-47 = "[ns]\"Desculpe, acabei dando mais trabalho pra vocês.\""
61060-48 = "N-Não... o Sensei não precisa se preocupar com isso."
61060-49 = "Pelo contrário...#nComo alguém que um dia já pertenceu a Arius, eu temo acabar causando problemas para o Sensei..."
61060-50 = "Peço desculpas por fazer o Sensei se preocupar tanto."
61060-51 = "Aproveitando a deixa, só pra confirmar."
61060-52 = "Por que você quis ir logo para um lugar tão perigoso?"
61060-56 = "[ns1]\"Não tem um grande motivo.\"\n[ns2]\"Acho que é porque... há estudantes lá.\""
61060-60 = "[ns]\"...E aí. Isso não soou um pouquinho legal?\""
61060-61 = "Ah, hã? Eeeh...?"
61060-62 = "...Tem uma coisa que eu acabei de entender muito bem."
61060-63 = "O Sensei... às vezes, pode ser bem idiota..."
61060-65 = "[ns]\"Que maldade...\""
61060-66 = "Hmm..."
61060-67 = "Mas acho que isso é bem a cara do Sensei."
61060-68 = "Às vezes, a gentileza acaba doendo no peito, não acha?"
61060-69 = "Sim, eu disse isso de propósito justamente por saber disso."
61060-75 = "A-Atsuko...!?"
61060-76 = "S-Sensei... eu entendo perfeitamente... tem horas que o peito dói tanto que a gente só quer se encolher no chão, não é..."
61060-77 = "Tá bom, tá bom, chega de teatrinho, levanta. Ainda temos um longo caminho pela frente."
61060-79 = "Então, pessoal, uma salva de palmas, por favor."
61060-80 = "――Para celebrar o retorno de uma querida amiga."
61060-86 = "A-Ahaha... eu já tô só o pó, mas..."
61060-87 = "Mesmo assim, o seu halo está intacto, não é?"
61060-88 = "Você protegeu aquilo que é insubstituível.#nO resto a gente resolve depois."
61060-93 = "Afinal, nós... ainda temos tempo."
61060-94 = "...Maia. Obrigada por voltar sã e salva.#nE... bem-vinda de volta."
61060-95 = "C-Cheguei...! Senpai!"
61060-96 = "Me desculpe por não podermos fazer nada grandioso para comemorar... a sua volta."
61060-97 = "Q-Que isso!#nNa verdade, eu estava com saudade desse clima, então..."
61060-98 = "Por falar nisso, como era o lado de \"fora\"?#nGostaria de ouvir nas palavras da Maia."
61060-99 = "O lado de fora... você diz?#nDeixe-me ver..."
61060-100 = "...Foi fascinante."
61060-101 = "E muito bonito..."
61060-106 = "..."
61060-108 = "Eu vi muitas coisas.#nComo prédios altíssimos feitos de vidro."
61060-109 = "Havia um rio enorme, e uma ponte passando por cima dele."
61060-112 = "Quando a noite caiu, as luzes dos prédios e da cidade refletiram no rio..."
61060-113 = "Oscilando na água, era como se eu estivesse em um sonho."
61060-115 = "Havia também prédios feitos especialmente para se tocar música."
61060-116 = "Enquanto aqui... nós mal conseguíamos tocar escondidas quando a \"Madame\" não estava olhando."
61060-119 = "E ainda por cima, ouvi dizer que as apresentações acontecem mais à noite do que de dia."
61060-120 = "Por isso que, desde o começo, eles foram projetados para ficarem bonitos no escuro."
61060-121 = "Lá fora no mundo... existem pessoas que não criam coisas ou dedicam seu tempo apenas para sobreviver ou lucrar, mas..."
61060-122 = "Simplesmente porque é \"bonito\"...#nSó por esse motivo, as pessoas constroem coisas e dedicam o seu tempo a elas, né..."
61060-124 = "Havia um mercado cheio de barracas com comidas que eu nunca tinha visto na vida."
61060-125 = "Só de olhar e sentir o cheiro...#nEu já me sentia um pouco mais feliz."
61060-126 = "...Mas foi só isso que eu consegui fazer."
61060-128 = "Também tinha um lugar que gastava um monte de água limpa, pura o suficiente para beber, só para as pessoas brincarem."
61060-130 = "E ainda por cima, os lados de dentro e de fora pareciam mundos completamente diferentes, parecia até outro universo..."
61060-131 = "E além disso, também――"
61060-145 = "..."
61060-146 = "..."
61060-147 = "Mas, eu sinto que... não havia nenhum lugar lá onde eu pudesse pertencer."
61060-148 = "Sim... eu entendo perfeitamente como se sente."
61060-149 = "Tudo era tão radiante... e todos pareciam tão felizes."
61060-150 = "Mas a sensação era de que \"apenas nós éramos diferentes\"..."
61060-151 = "Por isso..."
61060-156 = "Mesmo que eu desmaiasse e perdesse a consciência em um canto daquela cidade..."
61060-157 = "Eu pensei que... provavelmente ninguém sequer notaria."
61060-161 = "Em algum lugar deste mundo, alguém está sentindo felicidade."
61060-162 = "Em algum lugar deste mundo, outra pessoa está―― vivendo uma vida plena."
61060-163 = "Mas isso... olhando por outro lado――"
61060-167 = "Significa que em algum lugar deste mundo, há alguém para quem [ruby=a s  c o i s a s  n ã o  s ã o  b e m  a s s i m]as coisas não são bem assim[/ruby]."
61060-168 = "Aquelas palavras, de que \"você pode fazer o que quiser\"――"
61060-169 = "Talvez só quisessem dizer que não sabiam o que fazer com a gente."
61060-170 = "Afinal... ninguém nunca nos ensinou como viver."
61060-171 = "Não existe resposta certa para a vida. Por isso, viva da maneira que quiser."
61060-172 = "Pode até soar bem, mas não acha que esse é um encorajamento muito conveniente e irresponsável?"
61060-178 = "...Você trabalhou duro.#nAinda bem que conseguiu voltar para casa."
61060-179 = "Senpai..."
61060-180 = "Eu entendo... eu entendo muito bem como você se sente."
61060-181 = "Afinal, há muitas meninas aqui... que foram lá para fora e acabaram voltando."
61060-182 = "...Apesar de que também tivemos meninas que foram para Trinity e desapareceram sem deixar rastros."
61060-183 = "..."
61060-184 = "Trinity..."
61060-185 = "O que foi? Você também gostaria de ir para lá, Maia?"
61060-192 = "N-Não, não, claro que não!? Não é nada disso, eu não...!"
61060-193 = "Tudo bem. Eu não vou tentar te impedir.#nMas pra mim... acho que seria impossível."
61060-194 = "Porque eu... ainda não acho que consigo perdoar Trinity."
61060-195 = "I-Isso mesmo! Não tem como a gente perdoar elas tão facilmente!"
61060-196 = "Eu também... sinto o mesmo que você, Senpai...!"
61060-197 = "Obrigada.#n...É muito reconfortante ouvir isso."
61060-204 = "Exato. Nós não podemos perdoá-las."
61060-205 = "O Esquadrão, que estava em posição de guiar a todos nós, mas que escolheu simplesmente \"desaparecer\"――"
61060-209 = "Principalmente a [ruby=Joumae]Joumae[/ruby] Saori――não podemos perdoar o que ela fez."
61060-211 = "Próximo Episódio; Gaita"