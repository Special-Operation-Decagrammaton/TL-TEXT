[translation]
61060-1 = "第6話;向こう側の椅子"
61060-6 = "……もうすぐ、日が沈む。"
61060-7 = "そうだね。少し急ごうか。"
61060-11 = "……。"
61060-12 = "ヒヨリ？どうかしたの？"
61060-13 = "その……ほ、本当にアリウスに帰るんだなって……#n実感が湧いてきて、えへへ……。"
61060-14 = "決まったことはしょうがないよ。やるべきことをやるだけ。"
61060-15 = "私はもう、出来事にいちいち意味を見出すのはやめたの。"
61060-16 = "いい心構えだ。成長したな。"
61060-21 = "リーダー、うるさい。いつも勝手にいなくなるくせに。"
61060-22 = "ぐっ……。"
61060-23 = "でも、またサッちゃんがリーダーをやってくれて、ちょっと嬉しかったりするんじゃない？"
61060-24 = "あくまで臨時だけどね。"
61060-25 = "そ、それは……！"
61060-26 = "……もういい。#nどうせ何言っても、姫の考えは変わらないんだろうし。"
61060-27 = "素直じゃないんだから。"
61060-28 = "だから、違うってば！"
61060-30 = "[ns]\"みんなの仲が良いのは素敵だよね。\""
61060-31 = "先生まで……そんなこと言ってると置いてくよ。"
61060-32 = "ふふ。最初はびっくりしたけど……先生が一緒に来てくれて嬉しいよ。"
61060-34 = "ご、護衛は、お任せ……ください。えへへ……。"
61060-36 = "先生に、お願いがあります。"
61060-37 = "アリウスの皆さんに、授業をしていただけないでしょうか？"
61060-38 = "もちろん、優先されるべきは先生の安全です。"
61060-39 = "リモート授業でも間接的な形でも。#nお望みの方法を実現するために協力は惜しみません。"
61060-40 = "アリウスの皆さんの意思を無視する行為にもなり得るのかもしれませんが……。"
61060-41 = "……はい？#n現地で授業を……！？"
61060-43 = "……。"
61060-44 = "てっきり、任務はリモート授業の準備を手伝うことだと思っていた。"
61060-45 = "私たちがアリウスに向かい、残っている生徒を説得するのだと。"
61060-46 = "それがまさか、護衛任務になるとはな……。"
61060-47 = "[ns]\"ごめん、仕事増やしちゃったね。\""
61060-48 = "い、いやっ……先生が気にすることではない。"
61060-49 = "むしろ……#nかつてアリウスにいた者として、先生に迷惑をかけてしまうのではないかと……。"
61060-50 = "先生に気を遣わせてしまって、申し訳ない。"
61060-51 = "ついでに、一応確認させて。"
61060-52 = "なんでわざわざ危険な場所に行こうと思ったわけ？"
61060-56 = "[ns1]\"大した理由じゃないよ。\"\n[ns2]\"そこに……生徒がいるから、かな。\""
61060-60 = "[ns]\"……どうかな。ちょっとカッコよくなかった？\""
61060-61 = "あっ、えっ？えぇ……？"
61060-62 = "……ひとつだけ、よく分かった。"
61060-63 = "先生って……たまに、すごくしょうもないよね……。"
61060-65 = "[ns]\"そんな……。\""
61060-66 = "うーん……。"
61060-67 = "でも、それが先生らしいんじゃないかな。"
61060-68 = "優しさが、逆に胸に刺さることってあるよね？"
61060-69 = "うん、それも分かってて、あえて言ったんだから。"
61060-75 = "あ、アツコ……！？"
61060-76 = "せ、先生……分かりますよ……胸が苦しくって、うずくまっちゃうこと、ありますよね……。"
61060-77 = "はいはい、茶番はいいから立って。まだ先は長いんだから。"
61060-79 = "では皆さん、拍手をお願いします。"
61060-80 = "――大切な友人の帰還を祝して。"
61060-86 = "あ、あはは……もう、ボロボロなんですけどね……。"
61060-87 = "それでも、ヘイローは無事じゃないですか。"
61060-88 = "替えの利かないものを守り抜いたのです。#n他は後からどうとでもなりますよ。"
61060-93 = "私たちには……まだ、時間がありますから。"
61060-94 = "……マイア。無事でいてくれてありがとう。#nそして……おかえりなさい。"
61060-95 = "た、ただいま……です……！先輩！"
61060-96 = "復帰祝い……と言っても、大したことはできずすみません。"
61060-97 = "そ、そんなことは！#nむしろ、こういう雰囲気が、恋しかったので……。"
61060-98 = "そういえば、「外」はどうでした？#nマイアの言葉で聞いてみたいです。"
61060-99 = "外……ですか？#nそうですね……。"
61060-100 = "……不思議、でした。"
61060-101 = "それに、綺麗で……。"
61060-106 = "……。"
61060-108 = "いろいろなものを見ました。#nすごく高いガラス張りのビルだったり。"
61060-109 = "大きな川があって、その上に橋がかかっていたり。"
61060-112 = "夜になると、ビルや街の灯りが川に映っていて……。"
61060-113 = "水に揺れて、まるで夢の中にいるみたいでした。"
61060-115 = "音楽を演奏するために作られた建物もありました。"
61060-116 = "ここだと……「マダム」がいない隙を見て、こっそり弾くのがやっとだったのに。"
61060-119 = "しかも、演奏は昼より夜にやるほうが多いそうです。"
61060-120 = "だから最初から、暗いときにきれいに見えるように設計されているのだとか。"
61060-121 = "世界には……生き延びるためとか、利益のためじゃなくて……。"
61060-122 = "ただ「きれいだから」……。#nそれだけの理由で、何かを作ったり、時間をかけたりする人がいるんですね……。"
61060-124 = "屋台が並ぶ市場は、見たこともない料理ばっかりでした。"
61060-125 = "見て、香りを感じるだけで……#nなんだか、幸せな気分になれました。"
61060-126 = "……それ以上のことは、できませんでしたけど。"
61060-128 = "飲めるくらい綺麗な水が、遊ぶためだけにたくさん使われている場所もありました。"
61060-130 = "しかも屋内と屋外で世界が違うみたいに作られていて、まるで異世界みたいで……。"
61060-131 = "それから、他にも――"
61060-145 = "……。"
61060-146 = "……。"
61060-147 = "でも、どこにも……私が居ていい場所は、なかった気がするんです。"
61060-148 = "ええ……その気持ち、よく分かります。"
61060-149 = "どこもまぶしくて……みんな幸せそうで。"
61060-150 = "でも、「自分たちだけ違う」って感じで……。"
61060-151 = "だから……。"
61060-156 = "あの街の片隅で倒れて、意識を失っても……。"
61060-157 = "きっと誰にも、気づかれないんだろうなって……思ったんです。"
61060-161 = "この世界のどこかでは、誰かが幸せを感じていて。"
61060-162 = "この世界のどこかでは、別の誰かが――満ち足りた生活を送っている。"
61060-163 = "でもそれって……裏を返せば――"
61060-167 = "この世界のどこかには、[ruby=・   ・   ・   ・   ・   ・]そうではない[/ruby]誰かがいる。"
61060-168 = "「なんでもできる」という言葉は――"
61060-169 = "どうしていいか分からない、ってことだったのかもしれません。"
61060-170 = "生き方なんて……誰も教えてくれませんでしたから。"
61060-171 = "人生に正解なんてない。だから、自分の思うままに生きなさい。"
61060-172 = "聞こえはいいですが、なんて無責任で都合のいい励ましなんでしょうか。"
61060-178 = "……お疲れ様でした。#nよく帰ってきてくれましたね。"
61060-179 = "先輩……。"
61060-180 = "分かります……その気持ち、よく分かりますよ。"
61060-181 = "一度外に出て、帰ってきた子が……ここには、たくさんいますから。"
61060-182 = "……中には、トリニティに行ったまま、消息が途絶えた子もいましたけど。"
61060-183 = "……。"
61060-184 = "トリニティ……。"
61060-185 = "どうしました？マイアも行ってみたいのですか？"
61060-192 = "い、いえいえいえっ！？そんな、私は別に！"
61060-193 = "大丈夫ですよ。引き止めたりはしません。#nですが私は……たぶん、無理なんです。"
61060-194 = "まだ――トリニティを許せそうにないので。"
61060-195 = "そ、そうですよね！簡単に許せるわけ、ないですよね！"
61060-196 = "私も……先輩と同じ気持ち、ですから……！"
61060-197 = "ありがとう。#n……とても心強いです。"
61060-204 = "そうです。許すことなどできません。"
61060-205 = "すべてを導ける立場にいながら、ただ「消える」という選択をしたスクワッド――"
61060-209 = "特に[ruby=じょうまえ]錠前[/ruby]サオリ――彼女のことを。"
61060-211 = "次回;ハーモニカ"
