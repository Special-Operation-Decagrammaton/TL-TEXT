[translation]
10014030-1 = "Episódio 3; Mesmo que os ingredientes sejam todos diferentes"
10014030-5 = "……Ah, Sensei?"
10014030-6 = "[s] \"Olá, Airi.\""
10014030-7 = "Olá, Sensei!#nO que houve?"
10014030-8 = "Hm? Sensei?"
10014030-9 = "É verdade. O que houve de repente?"
10014030-10 = "[s1] \"Não é nada importante.\"\n[s2] \"Só passei por aqui sem motivo.\""
10014030-11 = "Hmm... é verdade mesmo?#nParece um pouco suspeito."
10014030-12 = "Hmm... é verdade mesmo?#nParece um pouco suspeito."
10014030-13 = "Bem, se tem algo para falar, diga logo.#nNão parece que você só passou por aqui sem motivo."
10014030-14 = "……Hm?"
10014030-15 = "Nós……?"
10014030-16 = "……O que foi de repente? Não aconteceu nada com a gente……."
10014030-17 = "N-nós fizemos algo de errado!?#nN-não aconteceu nada……!?"
10014030-18 = "A-Airi!?#nPor que você está tão surpresa de repente?"
10014030-19 = "Ei, isso é meio assustador. Aconteceu alguma coisa mesmo?"
10014030-20 = "Fufufu…… parece que nossos temas estão alinhados."
10014030-22 = "……Natsu?"
10014030-24 = "Parece que não precisamos mais fingir que não sabemos de nada."
10014030-25 = "O que nos preocupa, e o que preocupa o Sensei."
10014030-26 = "Todos os pensamentos estão indo em direção a um único guia.#nA estação final onde nossos pensamentos chegam é a mesma."
10014030-27 = "……Em nome de Kazusa Kyoyama."
10014030-28 = "Natsu-chan……."
10014030-29 = "……???"
10014030-30 = "Hã? O que você está dizendo de repente?#nO que aconteceu com a Kazusa??"
10014030-31 = "Y-Yoshimi-chan…… sobre ontem…….#nSerá que você não se lembra?"
10014030-32 = "……Ontem?"
10014030-33 = "……Ah, aquela briga?#nAquela em que uma pessoa estranha apareceu falando de duelo e de atacar primeiro?"
10014030-34 = "[s3] \"Eu sabia, era isso mesmo.\"\n[s4] \"Então vocês já encontraram a Reisa.\""
10014030-35 = "……E daí? O que tem isso?#nBrigas não são nada incomuns, né."
10014030-36 = "……E daí? O que tem isso?#nBrigas não são nada incomuns, né."
10014030-37 = "Aquela garota é esquentada, não é de se estranhar que tenha muitos inimigos.#nÉ merecido, ela que pediu por isso."
10014030-38 = "Por isso, ela deveria ter sido mais simpática com os amigos desde o início."
10014030-39 = "[s5] \"……Entendo, é assim que vocês a veem.\"\n[s6] \"Amigos…… acho que entendi tudo.\""
10014030-40 = "……O que foi, está falando sozinha?"
10014030-41 = "……O que foi, está falando sozinha?"
10014030-42 = "Não, é que…… Yoshimi-chan……."
10014030-43 = "Parecia que era um pouco diferente das outras, sabe……"
10014030-44 = "Aquilo……."
10014030-48 = "……Não, desculpe.#nNão é nada."
10014030-49 = "Acho que a Yoshimi-chan está bem do jeito que é."
10014030-50 = "……???"
10014030-51 = "……O quê? Que irritante, do nada."
10014030-55 = "O Sensei veio nos visitar assim…….#nSerá que ele deseja trocar informações?"
10014030-56 = "Uma atmosfera diferente do habitual, uma situação onde se pode sentir algo…….#nA ansiedade de que talvez estejamos tocando em algo que não deveríamos."
10014030-57 = "No entanto, não acho que o Sensei esteja se aproximando com essa intenção."
10014030-58 = "Talvez……#nseja o lado oculto de uma moeda queimada, algo que a própria pessoa não deseja."
10014030-59 = "Então, por que o Sensei veio nos visitar?"
10014030-60 = "Talvez seja……."
10014030-61 = "……Talvez ele quisesse verificar a nós, e não a Kazusa.#nO Sensei é esse tipo de pessoa."
10014030-62 = "[s7] \"E não houve problemas.\"\n[s8] \"Fico feliz que esteja tudo bem.\""
10014030-63 = "Ahaha... #nBem, a Kazusa-chan sempre será a Kazusa-chan, não importa o que aconteça."
10014030-64 = "Ahaha... #nBem, a Kazusa-chan sempre será a Kazusa-chan, não importa o que aconteça."
10014030-65 = "Nós não sabemos muito sobre que tipo de pessoa é essa tal de Reisa Uzawa, mas..."
10014030-66 = "Mesmo que tenha acontecido algo entre vocês duas que nós não saibamos... #nnada vai mudar."
10014030-67 = "Exatamente. Nossa união não foi abalada, e não será daqui para frente."
10014030-68 = "Se tivéssemos que nos separar apenas por causa de texturas diferentes nos ingredientes ou origens distintas, #n'doces' nunca seriam concluídos."
10014030-69 = "Isso é algo que... #nnós, do Clube de Doces Depois da Escola, não poderíamos ignorar."
10014030-70 = "Na verdade... #nSe houver algo que possamos fazer pela Kazusa-chan, por favor, entre em contato a qualquer momento."
10014030-71 = "Nós também estamos tão preocupadas com a Kazusa-chan quanto o Sensei!"
10014030-74 = "...Hã? #nDo que vocês estão falando agora?"
10014030-75 = "É só uma briga boba, não precisa de tanto drama..."
10014030-76 = "Coisas assim acontecem na vida, né? #nCrianças crescem brigando mesmo."
10014030-77 = "[s9] \"Com todo o respeito, vocês duas têm a mesma idade.\"\n[s10] \"É profundo ouvir isso da Yoshimi, hein.\""
10014030-78 = "É isso que você vai comentar?! #nÉ só uma expressão, uma expressão!!"
10014030-79 = "É isso que você vai comentar?! #nÉ só uma expressão, uma expressão!!"
10014030-80 = "Francamente... não é como se a Kazusa gostasse de brigar."
10014030-81 = "E-além disso! Sensei, você também!"
10014030-82 = "Não é nada demais, então pare de fazer esse drama todo..."
10014030-86 = "...Hm? O que é isso?"
10014030-87 = "Sensei, uma foto caiu aí."
10014030-88 = "[s] \"Ah, isso...\""
10014030-90 = "[ns11] \"Ei, parem!!\"\n[ns12] \"Não olhem!\""
10014030-91 = "Hã? Não podemos olhar? Por quê?"
10014030-92 = "Hã? Não podemos olhar? Por quê?"
10014030-93 = "Ué... essa foto... #nEssa pessoa..."
10014030-95 = "Casaco longo e máscara cobrindo até o queixo... sem dúvida é alguém da 'organização'."
10014030-96 = "...Hã? Espera um pouco. #nEsse rosto é..."
10014030-97 = "Rosto? De quem? #n...Ah."
10014030-98 = "...Ah."
10014030-105 = "Eeeeeeeeeh!?!"
