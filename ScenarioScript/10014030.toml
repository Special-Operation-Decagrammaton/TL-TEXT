[translation]
10014030-1 = "第3話;材料はみんなバラバラでも"
10014030-5 = "……あれ、先生？"
10014030-6 = "[s] \"こんにちは、アイリ。\""
10014030-7 = "こんにちは、先生！#nどうしたんですか？"
10014030-8 = "ん？先生？"
10014030-9 = "本当だ。急にどうしたの？"
10014030-10 = "[s1] \"別に大した用事はないよ。\"\n[s2] \"何となく寄ってみただけ。\""
10014030-11 = "ふーん……それ本当？#n何かちょっと嘘くさいんだけど。"
10014030-12 = "ふーん……それ本当？#n何かちょっと嘘くさいんだけど。"
10014030-13 = "まぁ、要件があるならさっさと言いなさいよ。#nなんとなく寄ったって雰囲気じゃなさそうだし。"
10014030-14 = "……ん？"
10014030-15 = "私たち……？"
10014030-16 = "……急に何。私たち、特に何もないけど……。"
10014030-17 = "わ、私たちがどうかしたんですか！？#nな、何もないですよ……！？"
10014030-18 = "あ、アイリ！？#nなんで急にそんな驚くのよ？"
10014030-19 = "え、ちょっと怖いんだけど。本当に何かあったの？"
10014030-20 = "ふっふっふ……どうやらお互いのテーマが一致しているようだね。"
10014030-22 = "……ナツ？"
10014030-24 = "不要な様子見はもうやめてもよさそうだ。"
10014030-25 = "私たちが心配すること、そして先生が心配すること。"
10014030-26 = "すべての想いが一つの道しるべに向かっている。#n私たちの思考が到達する終着駅は一緒。"
10014030-27 = "……[ruby=きょうやま]杏山[/ruby]カズサの名の下にね。"
10014030-28 = "ナツちゃん……。"
10014030-29 = "……？？？"
10014030-30 = "え？急に何言ってんの？#nカズサがどうかしたの？？"
10014030-31 = "よ、ヨシミちゃん……昨日のこと……。#nもしかして覚えてないの？"
10014030-32 = "……昨日？"
10014030-33 = "……あー、あの喧嘩？#n変なやつが来て決闘だの先手必勝だの言ってたヤツ？"
10014030-34 = "[s3] \"やっぱり、そうだったんだね。\"\n[s4] \"もうみんなレイサと会ったんだね。\""
10014030-35 = "……それで。それがどうかしたの？#n喧嘩なんか別に珍しいことでもないでしょ。"
10014030-36 = "……それで。それがどうかしたの？#n喧嘩なんか別に珍しいことでもないでしょ。"
10014030-37 = "あの子短気だし、敵が多くても不思議じゃないわ。#n自業自得よ、自業自得。"
10014030-38 = "だから、友達には普段から愛想良くしてれば良かったのに。"
10014030-39 = "[s5] \"……なるほど、そういう風に見えてるんだね。\"\n[s6] \"友達……大体わかった気がする。\""
10014030-40 = "……なに、独り言？"
10014030-41 = "……なに、独り言？"
10014030-42 = "いや、それがね……ヨシミちゃん……。"
10014030-43 = "なんだか、他とちょっと違う感じだったというか……"
10014030-44 = "その……。"
10014030-48 = "……ううん、ごめん。#n何でもない。"
10014030-49 = "ヨシミちゃんは今のままでいいと思う。"
10014030-50 = "……？？？"
10014030-51 = "……なに？急にムカつくわね。"
10014030-55 = "先生がこうして私たちを訪ねてくる……。#nもしかしてこれは情報交換を望んでいるのだろうか？"
10014030-56 = "普段とは違う雰囲気、何かを感じられる状況……。#n触れてはいけないことに触れてしまうかもしれないという不安感。"
10014030-57 = "しかし、私は先生がそんな意図で近づいているわけではないと思う。"
10014030-58 = "もしかしたら……#nそれは本人が望まぬ、燃えたコインの裏側かもしれないし。"
10014030-59 = "それでは何故、先生は私たちを訪ねてきたのだろう。"
10014030-60 = "もしかしたらそれは……。"
10014030-61 = "……カズサではなく「私たち」の方を確かめたかったのではないか。#n先生はそういう人だから。"
10014030-62 = "[s7] \"そして問題なかった。\"\n[s8] \"大丈夫そうでよかった。\""
10014030-63 = "あはは……。#nそりゃあ、カズサちゃんは何があってもカズサちゃんですから。"
10014030-64 = "あはは……。#nそりゃあ、カズサちゃんは何があってもカズサちゃんですから。"
10014030-65 = "私たちはその[ruby=うざわ]宇沢[/ruby]レイサという方がどういう人なのかあまり知りませんが……。"
10014030-66 = "その、何か二人の間に私たちが知らないことがあったとしても……。#n変わることはないと思います。"
10014030-67 = "そうとも。私たちの結束は揺れなかったし、それはこの先もないだろう。"
10014030-68 = "材料間の異なる質感、原産地の違い程度で道を分かたなければならないのであれば、#n「スイーツ」は永遠に完成しないよ。"
10014030-69 = "それは他でもない……。#n放課後スイーツ部の私たちが、知らないわけはないのだから。"
10014030-70 = "むしろ……。#n私たちがカズサちゃんにできることがあったら、いつでも連絡してください。"
10014030-71 = "私たちも、先生と同じくらいカズサちゃんのこと心配してますから！"
10014030-74 = "……え？#nみんなさっきからソレ何の流れ？"
10014030-75 = "たかが喧嘩ぐらいで大げさな……。"
10014030-76 = "生きてたらそんなこともあるでしょ。#n子どもって喧嘩しながら育つもんだし。"
10014030-77 = "[s9] \"お言葉ですが、お二人とも同い年ですよ。\"\n[s10] \"ヨシミが言うと感慨深いね。\""
10014030-78 = "そこツッコミ入れるとこ！？#nそういう言葉があるの、言葉が！！"
10014030-79 = "そこツッコミ入れるとこ！？#nそういう言葉があるの、言葉が！！"
10014030-80 = "まったく……カズサが喧嘩好きってわけでもないんだし。"
10014030-81 = "そ・れ・に！先生も先生よ！"
10014030-82 = "別に大したことでもないのに、そうやって大げさにするんだから……。"
10014030-86 = "……ん？なにこれ？"
10014030-87 = "先生、何か写真落ちたわよ。"
10014030-88 = "[s] \"あ、それ……。\""
10014030-90 = "[ns11] \"ちょっとストップー！！\"\n[ns12] \"見ちゃダメ！\""
10014030-91 = "え？見ちゃダメなの？なんで？"
10014030-92 = "え？見ちゃダメなの？なんで？"
10014030-93 = "あれ……この写真……。#nこの人……。"
10014030-95 = "ロングコートにあごまで下ろしたマスク……間違いなく「組織」の人だね。"
10014030-96 = "……あれ？ちょっと待って。#nこの顔は……。"
10014030-97 = "顔？誰の？#n……え。"
10014030-98 = "……えっ。"
10014030-105 = "ええええええー！？！？"
