[translation]
10011075-7 = "Certo, concluído! Parabéns!"
10011075-8 = "Ah, ah... batalhas seguidas são cansativas..."
10011075-9 = "Bem, eu vou ali reportar os resultados! Tchauzinho!"
10011075-13 = "[ns] \"Que bom que deu tudo certo, bom trabalho.\""
10011075-15 = "Ah...! Vocês estão bem...!"
10011075-16 = "Mestre! E também a Chefe!"
10011075-17 = "Tsukuyo, Izuna...!"
10011075-18 = "Eu consegui chegar até aqui com a Izuna-chan, mas..."
10011075-19 = "Nós nos perdemos completamente! Achei que nunca sairíamos, mas, por sorte, a Tsukuyo encontrou uma solução!"
10011075-20 = "Eu me lembrei de ter visto algo parecido em um mangá que a Chefe me emprestou antigamente..."
10011075-21 = "Ainda bem que a Chefe me recomendou aquele mangá na época...! Ehehe..."
10011075-22 = "I-isso é bom..."
10011075-23 = "[s] \"Ei, mas onde está a Iroha?\""
10011075-25 = "A Iroha também estava conosco até certo ponto, mas..."
10011075-26 = "Nos separamos no caminho... Achei que a encontraríamos em algum lugar, mas ela chegou ao objetivo antes de nós..."
10011075-27 = "Devemos voltar e procurá-la...?"
10011075-28 = "...Tsukuyo, Izuna."
10011075-32 = "Eu tenho algo que preciso dizer a vocês duas..."
10011075-34 = "Hum, sim...?"
10011075-41 = "[ns] \"...?\""
10011075-42 = "Ufa... ainda bem que consegui alcançá-los antes que as coisas saíssem do controle."
10011075-43 = "[s] \"Kaho?\""
10011075-44 = "Sobre esta situação, eu gostaria de perguntar várias coisas a todos vocês, mas..."
10011075-45 = "De qualquer forma, a apresentação está cancelada."
