[translation]
10011075-7 = "はいクリアー！おめでとう！"
10011075-8 = "はぁ、はぁ……連戦は疲れる……。"
10011075-9 = "じゃあ私は、ちょっと結果報告に行ってくるね！バイバイ！"
10011075-13 = "[ns] \"何とかなって良かった、お疲れ様。\""
10011075-15 = "あっ……！ご無事、でしたか……！"
10011075-16 = "主殿！それに部長！"
10011075-17 = "ツクヨ、イズナ……！"
10011075-18 = "イズナちゃんと、どうにかここまで来たのですが……。"
10011075-19 = "すっかり迷ってしまいました！永遠に出られないかと思いましたが、何とツクヨ殿が解決法を見つけてくださったんです！"
10011075-20 = "昔、部長から借りた漫画で、見たことあるな、と……。"
10011075-21 = "あの時、部長がおススメしてくれて、良かったです……！えへへっ……！"
10011075-22 = "そ、それは良かった……。"
10011075-23 = "[s] \"あれ、ところでイロハは？\""
10011075-25 = "イロハ殿も、途中までは一緒だったのですが……"
10011075-26 = "途中で、はぐれてしまい……どこかで会えるかと、思いましたが、いつの間にゴールまで……。"
10011075-27 = "戻って、探してみましょう、か……？"
10011075-28 = "……ツクヨ、イズナ。"
10011075-32 = "私、二人に言っておきたいことがあって……。"
10011075-34 = "えっと、はい……？"
10011075-41 = "[ns] \"……？\""
10011075-42 = "ふぅ……事が大きくなる前に追いつくことができて、何よりです。"
10011075-43 = "[s] \"カホ？\""
10011075-44 = "この事態については、色々と皆さんにもお伺いしたくはありますが……。"
10011075-45 = "とにかく、公演は中止です。"
