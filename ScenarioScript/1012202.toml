[translation]
1012202-1 = "Eu nem me conheço"
1012202-3 = "Olá, sensei!"
1012202-4 = "O que você estava fazendo aqui?"
1012202-5 = "Entendo, eu estava dando um passeio. Como foi olhar ao redor?"
1012202-6 = "[s] \"É um lugar legal.\""
1012202-7 = "Hehe, que bom que você pensou assim."
1012202-8 = "foto? Outras terras de propriedade do Tea Party?"
1012202-9 = "Hum, não sei muito sobre isso..."
1012202-10 = "Eu acho que existem alguns? #nTenho certeza que outras pessoas sabem mais sobre isso."
1012202-11 = "Ehehe, há um lado inesperado em nós... ou algo assim?"
1012202-12 = "Ei, você está surpreso?"
1012202-13 = "[s] \"Sim, fiquei surpreso.\""
1012202-14 = "Os professores costumam ver festas de chá funcionando."
1012202-16 = "(Conversei com Mika sobre vários aspectos dos membros do Tea Party.)"
1012202-18 = "...Não é isso que é o moto daquela criança?"
1012202-19 = "Quanto mais vocês se dão bem, mais começarão a ver um rosto que não olha para fora... mais ou menos?"
1012202-20 = "[s] \"Mika conhece o rosto real de todo mundo, certo?\""
1012202-21 = "Claro, estamos juntos há muito tempo."
1012202-22 = "É por isso que você pode perceber imediatamente se algo está diferente do normal."
1012202-23 = "Ultimamente não estou me sentindo bem..."
1012202-24 = "É por isso que quero que todos façam uma pausa nas férias!"
1012202-25 = "...Não sei se foi bem feito ou não."
1012202-26 = "[s] \"Acho que é uma boa mudança de ritmo.\""
1012202-27 = "Eu gostaria que fosse esse o caso♪"
1012202-28 = "Bem, ao contrário de todo mundo, eu não tenho nenhum histórico..."
1012202-29 = "Afinal, eu sou eu, certo?"
1012202-30 = "Uma criança problemática que sempre faz coisas que irritam as pessoas..."
1012202-31 = "Vou causar problemas novamente desta vez..."
1012202-32 = "Haha, me sinto meio triste."
1012202-33 = "Bem, acho que está tudo bem no sentido de que não existem dois lados."
1012202-34 = "[s] \"Eu também conheço outros Mikas.\""
1012202-35 = "...Eh! ?"
1012202-36 = "[s] \"Você observa muito seus amigos, certo?\""
1012202-37 = "Eu-eu acho que sim...?"
1012202-38 = "Eu realmente não entendo embora..."
1012202-39 = "Você se sentiu assim especialmente desta vez...?"
1012202-43 = "Hehe, nada vai sair mesmo se eu tentar te lisonjear, certo?"
1012202-44 = "Eu não sou uma boa garota..."
1012202-45 = "[ns1] \"É que Mika ainda não sabe...\"\n[ns2] \"Há muitos pontos positivos, certo?\""
1012202-49 = "E-eu estou com problemas... se você disser algo assim sério..."
1012202-50 = "……."
1012202-53 = "É como se ele tivesse me encontrado, mesmo que eu não o conheça... de alguma forma..."
1012202-54 = "Mas talvez o sensei esteja certo."
1012202-55 = "Pode haver muitos pontos positivos nisso que você simplesmente não percebe!"
1012202-56 = "O que você fará se seu charme explodir e você se tornar popular? #n...Que diabos☆"
1012202-58 = "(Conversei sobre várias coisas com Mika, que estava extremamente animado)"
