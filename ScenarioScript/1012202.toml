[translation]
1012202-1 = "私も知らない私"
1012202-3 = "先生、こんにちは！"
1012202-4 = "ここで何してたの？"
1012202-5 = "そっか、お散歩してたんだ。見て回ってどうだった？"
1012202-6 = "[s] \"素敵なところだね。\""
1012202-7 = "えへへ、そう思ってもらえてるならよかった。"
1012202-8 = "え？ティーパーティー所有の他の土地？"
1012202-9 = "ん～私は詳しくないけど……。"
1012202-10 = "結構あるんじゃないかな？#n他の人なら詳しいと思うよ。"
1012202-11 = "えへへ、私たちの意外な一面……だったりした？"
1012202-12 = "ねえねえ、びっくりした？"
1012202-13 = "[s] \"そうだね、驚かされたよ。\""
1012202-14 = "先生は、お仕事してるティーパーティーを見ることが多いもんね。"
1012202-16 = "（ミカとティーパーティーメンバーのいろいろな一面について話し合った）"
1012202-18 = "……そういうのが、その子の[ruby=す]素[/ruby]ってやつじゃない？"
1012202-19 = "仲良くなるほど、お外向けじゃない顔が見えてくる……みたいな？"
1012202-20 = "[s] \"ミカは、みんなの素顔も知ってるんだよね？\""
1012202-21 = "もっちろん☆付き合いも長いからね。"
1012202-22 = "だから、いつもと様子が違うな～ってときは、すぐわかるんだよ？"
1012202-23 = "最近、ちょっと元気なさそう……とかね。"
1012202-24 = "だから、みんなにもバカンスで息抜きしてほしいなって思って！"
1012202-25 = "……上手くできてるかは、分からないけど。"
1012202-26 = "[s] \"いい気分転換になってるんじゃないかな。\""
1012202-27 = "そうだったらいいな♪"
1012202-28 = "まあ、私はみんなと違って、素も何もないんだけど……。"
1012202-29 = "だって、私は私でしょ？"
1012202-30 = "怒られるようなことばっかりする問題児……。"
1012202-31 = "今回もトラブルを起こしちゃうし……。"
1012202-32 = "あはは、なんか悲しくなっちゃった。"
1012202-33 = "ま、まぁ……裏表がないって意味ではいいんだろうけど。"
1012202-34 = "[s] \"私は他のミカも知ってるよ。\""
1012202-35 = "……えっ！？"
1012202-36 = "[s] \"友達のことをよく見てるでしょ？\""
1012202-37 = "そ、そうかな……？"
1012202-38 = "よくわかんないけど……。"
1012202-39 = "今回、特にそう感じた……？"
1012202-43 = "ふふ、おだてても何も出ないよ？"
1012202-44 = "私、いい子じゃないし……。"
1012202-45 = "[ns1] \"まだ、ミカが知らないだけで……。\"\n[ns2] \"良いところがたくさんあるんだよ？\""
1012202-49 = "こ、困っちゃうなあ……そんな真剣に言われると……。"
1012202-50 = "……。"
1012202-53 = " 私も知らない私を、見つけてくれてるみたいで……なんだか……。"
1012202-54 = "……で、でも、先生の言う通りかも。"
1012202-55 = "自分で気づいていないだけで、良いところがたくさんあるのかもしれないし！"
1012202-56 = "魅力爆発して人気者になったらどうしよう！#n……なんちゃって☆"
1012202-58 = "（やけにテンションが高いミカと、いろんな話をした）"
