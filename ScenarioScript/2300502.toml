[translation]
2300502-1 = "O hobby da Ayane"
2300502-2 = "Colégio Abydos"
2300502-3 = "（Vim a Abydos para encontrar a Ayane em um dia de folga）"
2300502-4 = "（Talvez por ser feriado, quase não há ninguém por perto）"
2300502-5 = "[s] Vou até a sala de aula."
2300502-7 = "Sala do Comitê de Contramedidas"
2300502-8 = "（Não há ninguém）"
2300502-9 = "（CRASH! ESTRONDO!）"
2300502-10 = "（Aaaahhh!?）"
2300502-11 = "[s] Da sala ao lado...!?"
2300502-13 = "（Em meio a uma pilha de livros, Ayane está soterrada em uma pose estranha）"
2300502-14 = "[s1] \"Ayane!?\"\n[s2] \"V-você está bem?\""
2300502-15 = "P-Sensei...?"
2300502-16 = "P-Sensei...?"
2300502-17 = "......Ah, aaaaahhh!? N-não olhe, Sensei!"
2300502-18 = "S-se o Sensei me vir nesse estado..."
2300502-19 = "[s] \"Eh...? Não, mas eu preciso te ajudar...\""
2300502-21 = "E-estou bem, por favor, espere lá fora!"
2300502-23 = "（Fui praticamente expulso para fora da sala de aula）"
2300502-29 = "......"
2300502-30 = "......Olá, Sensei."
2300502-31 = "[s3] \"Ayane, você está bem?\"\n[s4] \"O que aconteceu exatamente?\""
2300502-32 = "Sinto muito por ter mostrado uma cena tão vergonhosa... Estou bem, não me machuquei."
2300502-33 = "Sinto muito por ter mostrado uma cena tão vergonhosa... Estou bem, não me machuquei."
2300502-34 = "É que... eu subi na estante para pegar um livro e acabei perdendo o equilíbrio..."
2300502-35 = "E então, o Sensei acabou me vendo naquela pose estranha..."
2300502-36 = "U-uuuh...! P-por favor, esqueça isso, Sensei!!"
2300502-37 = "[s5] \"Realmente foi uma pose estranha.\"\n[s6] \"Fico feliz que você esteja bem. Mas a pose foi estranha mesmo.\""
2300502-38 = "......"
2300502-39 = "......"
2300502-40 = "........."
2300502-41 = "（Snif）"
2300502-42 = "[s] \"B-brincadeira, brincadeira!\""
2300502-45 = "（Depois disso, passei um tempo consolando-a e pedindo desculpas）"
2300502-47 = "Bem, sobre o motivo de eu ter chamado o Sensei..."
2300502-48 = "Enquanto eu organizava uma sala de aula que não está sendo usada, encontrei isto."
2300502-51 = "（Ayane me entregou um livro antigo）"
2300502-52 = "[s] \"Um livro antigo...?\""
2300502-53 = "Acredito que tenha sido deixado por antigas alunas..."
2300502-54 = "Ouvi dizer que, antigamente, muitas pessoas tinham hobbies estranhos que custavam caro."
2300502-55 = "Então, pensei que talvez fosse algo valioso e que, se eu mostrasse ao Sensei, você saberia dizer..."
2300502-56 = "O que acha?"
2300502-57 = "Parece ser um romance escrito em uma língua antiga que eu não consigo ler..."
2300502-58 = "[s7] \"Hmm...\"\n[s8] \"Talvez eu não saiba dizer...\""
2300502-59 = "Entendo..."
2300502-60 = "Entendo..."
2300502-61 = "[s9] \"Por que não leva a uma loja de antiguidades?\"\n[s10] \"Talvez seja melhor deixar para um especialista do que para mim.\""
2300502-62 = "É, você tem razão..."
2300502-63 = "É, você tem razão..."
2300502-64 = "Mas, se nem o Sensei teve certeza, então provavelmente não é algo tão valioso assim..."
2300502-65 = "Haa..."
2300502-66 = "[s] \"Você está procurando por algo caro?\""
2300502-67 = "Eh? Ah, não, não é nada disso..."
2300502-68 = "Eu encontrei isso por acaso enquanto estava arrumando a sala de aula."
2300502-69 = "Parece ser antigo, e quando penso que talvez possa valer uma boa quantia, não consigo evitar de ficar curiosa..."
2300502-70 = "Haa... mas a sorte não cai do céu tão facilmente, não é?"
2300502-71 = "[s11] \"Ayane, você é bem econômica, hein?\"\n[s12] \"Então esse é o seu passatempo, Ayane?\""
2300502-72 = "Eh, não, b-bem, não é para tanto..."
2300502-73 = "Eh, não, b-bem, não é para tanto..."
2300502-74 = "É, digamos que eu tenha um espírito de mão de vaca... que vergonha..."
2300502-75 = "[s] \"Sempre que precisar de mim, pode me chamar.\""
2300502-76 = "Ah, ahaha... sim, muito obrigada, Sensei."
2300502-77 = "Quando chegar a hora, não hesitarei em pedir sua ajuda."
