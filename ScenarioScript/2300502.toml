[translation]
2300502-1 = "アヤネの趣味"
2300502-2 = "アビドス高等学校"
2300502-3 = "（休日、アヤネに会うためにアビドスに来た）"
2300502-4 = "（お休みの日だからか、人影はほとんどない）"
2300502-5 = "[s] 教室に行ってみる。"
2300502-7 = "対策委員会・教室"
2300502-8 = "（誰もいない）"
2300502-9 = "（パリーン！ガタガタッ！）"
2300502-10 = "（きゃあぁぁぁーっ！？）"
2300502-11 = "[s] となりの教室から……！？"
2300502-13 = "（たくさんの本の山の中で、アヤネが変なポーズのまま下敷きになっている）"
2300502-14 = "[s1] \"アヤネ！？\"\n[s2] \"だ、大丈夫？\""
2300502-15 = "せ、先生……？"
2300502-16 = "せ、先生……？"
2300502-17 = "……あっ、きゃあああぁっ！？み、見ないでください、先生！"
2300502-18 = "こ、こんな姿を先生に見られたら……。"
2300502-19 = "[s] \"え……？ いや、でも助けないと……。\""
2300502-21 = "だ、大丈夫ですから、外で待っててください！"
2300502-23 = "（追い出されるようにして、教室の外に出た）"
2300502-29 = "……。"
2300502-30 = "……こんにちは、先生。"
2300502-31 = "[s3] \"アヤネ、大丈夫？\"\n[s4] \"いったいどうしたの？\""
2300502-32 = "お恥ずかしいところをお見せしてしまってすみません……大丈夫です、怪我はありませんので。"
2300502-33 = "お恥ずかしいところをお見せしてしまってすみません……大丈夫です、怪我はありませんので。"
2300502-34 = "その……本を取ろうと棚に乗ったら、バランスを崩してしまって……。"
2300502-35 = "それで、先生にあんな、変な姿を……。"
2300502-36 = "う、うぅぅ……！わ、忘れてくださいね、先生！！"
2300502-37 = "[s5] \"確かに変なポーズだったね。\"\n[s6] \"アヤネが無事でよかった。ポーズは変だったけど。\""
2300502-38 = "……。"
2300502-39 = "……。"
2300502-40 = "………。"
2300502-41 = "（ぐすん）"
2300502-42 = "[s] \"じょ、冗談冗談！\""
2300502-45 = "（その後しばらく、慰めながら謝った）"
2300502-47 = "それで、先生をお呼びした件なのですが……。"
2300502-48 = "使ってない教室の片付けをしていたら、こんなものを見つけまして。"
2300502-51 = "（アヤネが、古びた本を渡してきた）"
2300502-52 = "[s] \"古い本……？\""
2300502-53 = "恐らく、かつての在校生の方々が残していったものだと思うのですが……。"
2300502-54 = "昔は、お金のかかる変な趣味を持つ方々が多かったと聞きます。"
2300502-55 = "それで、もしかしたら高い物なのではないかと思い、先生にお見せしたら分かるかなと……。"
2300502-56 = "いかがでしょう？"
2300502-57 = "私には読めない、昔の文字で書かれた小説のようなのですが……。"
2300502-58 = "[s7] \"うーん……。\"\n[s8] \"ちょっと分からないかも……。\""
2300502-59 = "そうですか……。"
2300502-60 = "そうですか……。"
2300502-61 = "[s9] \"アンティークショップとかに持って行ったら？\"\n[s10] \"私より、専門家に任せた方がいいかも。\""
2300502-62 = "やっぱりそうですよね……。"
2300502-63 = "やっぱりそうですよね……。"
2300502-64 = "ですが、先生がご覧になってピンと来ないものだとすると、それほど高い物というわけではなさそうですし……。"
2300502-65 = "はぁ……。"
2300502-66 = "[s] \"高価な物を探してるの？\""
2300502-67 = "え？あ、いえ、特にそういうことではないのですが……。"
2300502-68 = "教室を片付けていて、偶然発見したものなので。"
2300502-69 = "古そうですし、もしかしたら高値になるかもと思ってしまうと、どうしても気になってしまって……。"
2300502-70 = "はぁ……ですが、そう簡単に幸運は舞い降りてきませんね。"
2300502-71 = "[s11] \"アヤネは倹約家なんだね。\"\n[s12] \"アヤネの趣味みたいなものなんだね。\""
2300502-72 = "えっ、いや、そ、それほどのものでもないのですが……。"
2300502-73 = "えっ、いや、そ、それほどのものでもないのですが……。"
2300502-74 = "び、貧乏性と言いますか……お恥ずかしい……。"
2300502-75 = "[s] \"私が必要な時はいつでも呼んでね。\""
2300502-76 = "あ、あはは……はい、ありがとうございます、先生。"
2300502-77 = "その時は、遠慮なくお声がけさせていただきますね。"
