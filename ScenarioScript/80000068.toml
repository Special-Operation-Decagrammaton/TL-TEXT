[translation]
80000068-1 = "バレンタインチョコの起源"
80000068-2 = "……あ、先生！何という偶然！"
80000068-3 = "今日はバレンタインデーですよ！ということでちょうど、私もチョコレートを準備してたんです！"
80000068-4 = "せっかくですし、このまま先生と一緒に講義室へ行って、バレンタインデーの起源について説明したいところなのですが……"
80000068-5 = "[s1] \"ど、どうしよっかな……。\"\n[s2] \"とりあえずチョコをありがたく頂こうかな……？\""
80000068-6 = "そ、そうですよね……今日はやはり、長い前置きや説明など不要！"
80000068-7 = "そ、そうですよね……今日はやはり、長い前置きや説明など不要！"
80000068-8 = "というわけで、こちらをご用意しました！じゃじゃーん！！"
80000068-13 = "いかがでしょう？？"
80000068-14 = "[s3] \"昔ながらのスタイル……これって……。\"\n[s4] \"もしかしてこれが起源の説明に……？\""
80000068-15 = "ふふふっ……！"
80000068-16 = "ふふふっ……！"
80000068-17 = "流石は先生、大正解です！！"
80000068-18 = "先生が今日お忙しいのは何となく分かっていますし、あまり説明に長く時間を取るのもどうかと思いまして……。"
80000068-19 = "それに加えて、先生はバレンタインデーやチョコレートの由来について既にご存じなのではという懸念もあり……。"
80000068-20 = "色々と悩んだ結果、こういった形にしてみました。"
80000068-21 = "つまり答えであり説明、バレンタインが始まった頃に作られたと言われている有名なチョコ、すなわち「原初のバレンタインチョコ」と呼ばれているそれを再現してみました！"
80000068-25 = "これは端的でかつ説明も兼ねられていて、良いのではないかと！というわけでお渡しもできたことですし、本日はこの辺りで退場――"
80000068-32 = "……っと？"
80000068-33 = "[s5] コトリを捕まえる。\n[s6] \"もう少し話していかない？\""
80000068-34 = "……えっ、と？"
80000068-35 = "……えっ、と？"
80000068-36 = "これは予想外な……。"
80000068-37 = "無理に時間を節約する必要はない……？"
80000068-38 = "……あっ。"
80000068-39 = "これを私と、一緒に……？"
80000068-43 = "ふふっ……やはり先生といると、驚きや発見の連続です。"
80000068-44 = "先生について語るには、まだまだ時間が足りません。"
80000068-45 = "それではちょうどそこの講義室も開いてますし、一緒にチョコを頂くとしましょうか！"
80000068-46 = "あと、その……"
80000068-50 = "……ありがとうございます、先生。"
80000068-52 = "（そしてコトリと一緒に、講義室でチョコレートを美味しく分け合って食べた）"
80000068-56 = "（そして最終的には、バレンタインデーの起源などについて溢れるほどの説明を受けた）"
