[translation]
80000068-1 = "A origem do chocolate de Dia dos Namorados"
80000068-2 = "……Ah, Sensei! Que coincidência!"
80000068-3 = "Hoje é Dia dos Namorados! Por isso, eu estava justamente preparando um chocolate!"
80000068-4 = "Já que estamos aqui, eu adoraria ir com você até a sala de aula para explicar sobre a origem do Dia dos Namorados, mas..."
80000068-5 = "[s1] \"O que eu deveria fazer...\"\n[s2] \"Por enquanto, acho que vou aceitar o chocolate com gratidão...\""
80000068-6 = "V-você tem razão... Hoje, de fato, introduções longas e explicações são desnecessárias!"
80000068-7 = "V-você tem razão... Hoje, de fato, introduções longas e explicações são desnecessárias!"
80000068-8 = "Sendo assim, preparei isto aqui! Tcharam!!"
80000068-13 = "O que achou??"
80000068-14 = "[s3] \"Um estilo clássico... isso é...\"\n[s4] \"Será que isso é a explicação da origem...?\""
80000068-15 = "Fufufu...!"
80000068-16 = "Fufufu...!"
80000068-17 = "Como esperado do Sensei, acertou em cheio!!"
80000068-18 = "Eu sei que você está ocupado hoje, e achei que não seria bom tomar muito do seu tempo com explicações..."
80000068-19 = "Além disso, fiquei com receio de que você já soubesse sobre a origem do Dia dos Namorados e dos chocolates..."
80000068-20 = "Depois de pensar muito, decidi fazer desta forma."
80000068-21 = "Ou seja, é a resposta e a explicação ao mesmo tempo. Tentei reproduzir o famoso chocolate que dizem ter sido feito quando o Dia dos Namorados começou, o chamado \"Chocolate de Dia dos Namorados Primordial\"!"
80000068-25 = "Achei que seria direto e serviria como explicação! Bem, já que consegui te entregar, vou me retirar por hoje—"
80000068-32 = "……Hã?"
80000068-33 = "[s5] Segurar Kotori.\n[s6] \"Por que não fica mais um pouco?\""
80000068-34 = "……Eh, bem?"
80000068-35 = "……Eh, bem?"
80000068-36 = "Isso foi inesperado..."
80000068-37 = "Não preciso economizar tempo à força...?"
80000068-38 = "……Ah."
80000068-39 = "Comer isso... junto comigo...?"
80000068-43 = "Fufu... Estar com você, Sensei, é sempre uma sucessão de surpresas e descobertas."
80000068-44 = "Ainda falta muito tempo para falar tudo sobre você, Sensei."
80000068-45 = "Bem, a sala de aula ali está aberta, então que tal comermos o chocolate juntos?"
80000068-46 = "Ah, e também..."
80000068-50 = "……Muito obrigada, Sensei."
80000068-52 = "(E então, junto com Kotori, dividimos e saboreamos o chocolate na sala de aula)"
80000068-56 = "(E, no final, recebi uma explicação transbordante sobre a origem do Dia dos Namorados e outros assuntos)"
