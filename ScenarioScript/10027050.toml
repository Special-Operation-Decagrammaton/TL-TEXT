[translation]
10027050-1 = "第5話;誰にでもある秘密"
10027050-2 = "同人会場"
10027050-5 = "結局――ここにたどり着いたのですね。メルリーさん。"
10027050-6 = "え……？#nなんであんたがここに？"
10027050-7 = "[s] \"あ、タカネ。こんにちは。\""
10027050-8 = "ごきげんよう、先生。あまり期待はしていなかったのですが……こうして再びお会いできて光栄ですわ。"
10027050-9 = "ここには至れないと思っておりましたから……#nええ。驚嘆に値すると同時に、嬉しくも思っておりますの。"
10027050-10 = "……前者は私に言ってる……？"
10027050-11 = "どうでしょう？それもまた解釈次第かと。"
10027050-12 = "……一つ聞きたいんだけど。#n出版部に行けって言ったのは……この即売会を見せるためだったの？"
10027050-13 = "貴女はモミジさんのために『ルナ』の最終巻を見つけようとしました。しかし、それは最初から不可能なことでした。"
10027050-14 = "なぜなら――『ルナ』の22巻は、元々[ruby=・   ・   ・   ・   ・]存在しない[/ruby]のですから。"
10027050-15 = "で、でもネットではごく少部数発行されたって……"
10027050-16 = "ああ……おそらく同人誌のことを指しているのでしょう。"
10027050-17 = "『ルナ』は不朽の名作ですが、同時に不遇でもありました。#n 一世を風靡したのはたしかなのですが……"
10027050-19 = "運に恵まれず――『ルナ』は……最終巻が出版されなかったのです。"
10027050-20 = "[s] \"どうして……？\""
10027050-21 = "よくあることです。『ルナ』は人気作ではありましたが、完結が近づくにつれて人気が低迷し、次第に忘れ去られてしまったのです。"
10027050-22 = "……正当な評価を受けられなかったことが、一番の原因かと。"
10027050-23 = "今読み返せば、そこまで大きな理由のない展開が、連載当時は過激な思想の作品であると深読みされたり、評価自体を受けるチャンスが得られなかったり……"
10027050-24 = "時間が経ってから初めて価値が認められた名作というのも、もちろん存在します。"
10027050-25 = "評論家として、そのように埋もれてしまう作品を人よりは多く知っているという自負があります。だからこそ、1冊でも多くの本の批評を残していきたいと思っているのですわ。"
10027050-26 = "じゃあ……最初から『ルナ』の最終巻が見つからないことを知ってたって事？"
10027050-27 = "それなら最初から言ってよ。#nなんでこんなまどろっこしいやり方で呼んだのさ？"
10027050-31 = "貴女を試してみたくなったのですよ、メルリーさん。"
10027050-32 = "貴女……メルリーさんという、人間関係もよろしくなければ、プライドも高いクリエイターが……本当に他人と仲直りするためだけに『ルナ』の最終巻を探しているのなら……"
10027050-33 = "あるいは――ここに到達できるのでは、と。"
10027050-34 = "……つまり、それほど切実に探しているのなら。#n出版部を訪ねたり、頭を下げて情報を得ることもするだろう、と……？"
10027050-35 = "ええ。そして本当に……貴女はここに至りました。"
10027050-36 = "そして――こんなことに巻き込んでしまって申し訳ありません、先生。"
10027050-37 = "[s1] \"それは全然大丈夫だけど……。\"\n[s2] \"タカネは……2人に仲直りしてほしかったんだね。\""
10027050-38 = "なんて寛大なお心……さすがですわ。性格も悪ければプライドも高いどこかの誰かさんとは根本的な格の違いが明らかですわね。"
10027050-39 = "いや、あんたも相当でしょ……。"
10027050-40 = "さ、さあ？それはどうなのでしょうね？わ、私はただ！メルリーさんが自分を曲げる姿を眺めたかっただけですのよ！"
10027050-41 = "こいつがそんな殊勝な気持ちで行動してるわけないじゃん！先生、騙されないでよね！"
10027050-42 = "貴女はいつも一言余計なんです！"
10027050-43 = "それはこっちのセリフだよ！"
10027050-44 = "[s] \"はいはい。そこまでそこまで。\""
10027050-45 = "……先生がそう仰るなら。"
10027050-46 = "けっ……！"
10027050-47 = "……まあ、気を遣ってくれたんだなっていうのは……分かるけどさ……"
10027050-48 = "……ふん。"
10027050-49 = "[s] \"それで、タカネはここで何をしていたの？\""
10027050-50 = "それは……"
10027050-56 = "あ、会長。ここにいたのですね。みんな探してますよ。#n早く行かないと。"
10027050-57 = "！！！"
10027050-58 = "会長？"
10027050-59 = "[s] \"会長？\""
10027050-60 = "ちょっと待って。ここで会長って呼ばれるってことは……。"
10027050-61 = "……こうなった以上、隠しても無駄ですわね。#nええ、私が『ルナ』同好会の会長です。"
10027050-62 = "[s] \"タカネが……このオンリーイベントの主催？\""
10027050-63 = "うっ……情報量が多すぎて頭の中こんがらがってきた……#nちょっと整理するね。"
10027050-64 = "やっぱり、あんたも『ルナ』の最終巻が読みたかったの？"
10027050-65 = "……「そうだ」と言ったら、どうしますか？メルリーさん？"
10027050-66 = "なによ。埋もれた作品の価値を見つけるとか、評論で作品を一層輝かせるとか、それっぽい事言っといて。"
10027050-67 = "結局やってるのは自分の好きな作品の収集じゃん……なにそのダブスタ。"
10027050-73 = "きゅ、急に何よ！？"
10027050-74 = "作品に対して中立の立場であるべき評論家が、特定作品の愛好家であることを明かされ……"
10027050-75 = "その事を、人の揚げ足ばかり取るメルリーさんにからかわれるくらいなら……"
10027050-77 = "いっそのこと、このまま永久に沈黙させてあげましょう！"
10027050-78 = "なに言ってんのよ！？#nというか、そもそも私をここに呼んだのはあんたじゃない！"
10027050-80 = "それはそれ、これはこれです！"
10027050-81 = "なによもう！ダブスタもいい加減にしなさいよ！"
10027050-82 = "はあ……まあ仕方ないですね。#nええ、そうですとも。"
10027050-83 = "ですが、たとえ最終巻が発行されなかったとしても。#nその結末を見届けたいと願う人はおります。"
10027050-84 = "休載したまま消息が途絶えた作家を心配してもいいし、それを無責任だと詰るのも良いでしょう。"
10027050-85 = "ですが『ルナ』を心のバイブルとし、その最後を知りたいと願うファンの想いは、ずっと存在しました。だから私たちは……自分だけの『ルナ』を作り始めたのです。"
10027050-86 = "そのうちに、気がついたらこれほどの規模に至ったのですが……。"
10027050-87 = "どこにも存在しない最終巻を、そうやって作って埋めていたんだね……"
10027050-88 = "結局は解釈の問題なのですよメルリーさん。#n10人のファンがいれば、10通りの解釈が生まれるものです。"
10027050-89 = "その解釈のどれが正解なのかは、誰にも分かりません。#nですが、原則としてすべての解釈は尊重されるべきであり、等しく価値があります。"
10027050-90 = "一方で……自らの解釈が少しでも認められたいと願うのは、創作という行為が欲望に基づいているからでしょう。"
10027050-91 = "……しかし、これはあくまで二次創作同人誌。#n貴女の望む完全な『ルナ』の最終巻というのは存在しません。"
10027050-92 = "つまり――モミジさんと仲直りするというのは、もともと不可能なことでした。"
10027050-93 = "ですが、『ルナ』界隈[ruby=さいおおて]最大手[/ruby]の同人誌をプレゼントすれば、あるいは……"
10027050-94 = "モミジさんと仲直りできるかもしれません。"
10027050-95 = "だから……あんたは私をここに……"
10027050-96 = "……。"
10027050-97 = "……そうだね。たしかに、その通りだよ。"
10027050-98 = "最終巻が見つからない以上……#nもしかしたら……それが正解かもしれない……"
10027050-99 = "ええ。貴女も、たまには現実というものと向き合うのですね。"
10027050-103 = "……でもね。"
10027050-105 = "正論ほど反発したくなる時もあるんだよ！"
10027050-106 = "急に何を！？"
10027050-108 = "それなら、私も描いてやるんだから！"
10027050-109 = "何を……？"
10027050-111 = "『ルナ』の最終巻！"
10027050-117 = "[ns] \"え？\""
10027050-118 = "……はい？"
