[translation]
10027050-1 = "Episódio 5: Segredos que todos possuem"
10027050-2 = "Local do evento de doujinshi"
10027050-5 = "No fim das contas... você chegou até aqui, Meru."
10027050-6 = "Hã...? Por que você está aqui?"
10027050-7 = "[s] \"Ah, Takane. Olá.\""
10027050-8 = "Saudações, Sensei. Eu não tinha muitas expectativas, mas... é uma honra poder encontrá-lo novamente desta forma."
10027050-9 = "Eu não achei que você conseguiria chegar até aqui... Sim. É algo digno de admiração e, ao mesmo tempo, fico feliz."
10027050-10 = "...A primeira parte foi para mim...?"
10027050-11 = "Quem sabe? Isso também depende da sua interpretação."
10027050-12 = "...Quero te perguntar uma coisa. Dizer para eu ir ao Departamento de Publicações... foi para me mostrar este evento?"
10027050-13 = "Você tentou encontrar o volume final de 'Luna' por causa da Momiji. No entanto, isso era impossível desde o início."
10027050-14 = "Porque... o volume 22 de 'Luna' originalmente não existe."
10027050-15 = "Ma-mas na internet diziam que foi publicada uma tiragem muito pequena..."
10027050-16 = "Ah... provavelmente estão se referindo a um doujinshi."
10027050-17 = "'Luna' é uma obra-prima imortal, mas, ao mesmo tempo, foi infeliz. É verdade que dominou uma época, mas..."
10027050-19 = "Não teve sorte... 'Luna'... não teve seu volume final publicado."
10027050-20 = "[s] \"Por que...?\""
10027050-21 = "É algo comum. 'Luna' era uma obra popular, mas conforme se aproximava do final, a popularidade caiu e ela foi gradualmente esquecida."
10027050-22 = "...Acredito que o maior motivo foi não ter recebido uma avaliação justa."
10027050-23 = "Lendo hoje em dia, partes que não tinham nada demais foram interpretadas na época como obras de ideologias radicais, ou simplesmente não tiveram a chance de serem avaliadas..."
10027050-24 = "Claro que existem obras-primas cujo valor só foi reconhecido muito tempo depois."
10027050-25 = "Como crítica, tenho orgulho de conhecer mais obras esquecidas do que a maioria das pessoas. É por isso que quero deixar críticas registradas para o maior número possível de livros."
10027050-26 = "Então... você sabia desde o início que o volume final de 'Luna' não seria encontrado?"
10027050-27 = "Se era assim, devia ter dito logo. Por que me chamou de um jeito tão complicado?"
10027050-31 = "Eu queria testar você, Meru."
10027050-32 = "Se uma criadora como você... que não tem bons relacionamentos e tem um orgulho tão alto... estivesse realmente procurando o volume final de 'Luna' apenas para se reconciliar com alguém..."
10027050-33 = "Ou talvez... você pudesse chegar até aqui."
10027050-34 = "...Ou seja, se você estivesse procurando tão desesperadamente... você visitaria o Departamento de Publicações e baixaria a cabeça para obter informações, certo...?"
10027050-35 = "Sim. E, de fato... você chegou até aqui."
10027050-36 = "E... peço desculpas por envolvê-lo nisso, Sensei."
10027050-37 = "[s1] \"Isso não é problema nenhum...\"\n[s2] \"Takane... você queria que as duas se reconciliassem, não é?\""
10027050-38 = "Que coração generoso... como esperado. A diferença de classe é óbvia em comparação com certa pessoa que tem um caráter ruim e um orgulho enorme."
10027050-39 = "Ei, você também não fica atrás..."
10027050-40 = "O-ora? O que será? E-eu só queria ver a Meru deixando o orgulho de lado!"
10027050-41 = "Ela não está agindo com sentimentos tão nobres assim! Sensei, não se deixe enganar!"
10027050-42 = "Você sempre diz uma palavra a mais!"
10027050-43 = "Essa frase é minha!"
10027050-44 = "[s] \"Ei, ei. Chega, chega.\""
10027050-45 = "...Se o Sensei diz isso."
10027050-46 = "Tsc...!"
10027050-47 = "...Bem, eu entendo que você fez isso por consideração, mas..."
10027050-48 = "...Humpf."
10027050-49 = "[s] \"Então, o que a Takane estava fazendo aqui?\""
10027050-50 = "Isso é..."
10027050-56 = "Ah, Presidente. Você estava aqui. Todos estão te procurando. Precisamos ir logo."
10027050-57 = "!!!"
10027050-58 = "Presidente?"
10027050-59 = "[s] \"Presidente?\""
10027050-60 = "Espere um pouco. Se te chamam de presidente aqui, isso significa..."
10027050-61 = "...Já que chegou a esse ponto, não adianta esconder. Sim, eu sou a presidente do clube de fãs de 'Luna'."
10027050-62 = "[s] \"Takane é... a organizadora deste evento exclusivo?\""
10027050-63 = "Ugh... tem informação demais, minha cabeça está dando um nó...#nVou organizar as coisas um pouco."
10027050-64 = "No fim das contas, você também queria ler o volume final de \"Luna\"?"
10027050-65 = "......Se eu disser que \"sim\", o que você fará? Merley-san?"
10027050-66 = "Ora, qual é. Você fala bonito sobre encontrar valor em obras esquecidas ou sobre como a crítica pode fazer uma obra brilhar ainda mais."
10027050-67 = "Mas, no fim, você só está colecionando as obras que gosta... que hipocrisia é essa?"
10027050-73 = "Q-que foi isso, de repente!?"
10027050-74 = "Uma crítica que deveria ser neutra em relação às obras, ter revelado ser uma entusiasta de uma obra específica..."
10027050-75 = "Se for para ser provocada por alguém como você, Merley-san, que só vive apontando os erros dos outros..."
10027050-77 = "É melhor eu te silenciar para sempre agora mesmo!"
10027050-78 = "Do que você está falando!?#nE aliás, não foi você mesma quem me chamou aqui!?"
10027050-80 = "Uma coisa é uma coisa, outra coisa é outra coisa!"
10027050-81 = "Ah, chega! Já deu dessa sua hipocrisia!"
10027050-82 = "Haa... bem, não tem jeito, suponho.#nSim, é verdade."
10027050-83 = "Mas, mesmo que o volume final nunca tenha sido publicado, ainda existem pessoas que desejam ver esse desfecho."
10027050-84 = "Você pode se preocupar com o autor que entrou em hiato e desapareceu, ou pode criticá-lo por ser irresponsável."
10027050-85 = "Mas o sentimento dos fãs que consideram \"Luna\" como sua bíblia pessoal e desejam saber o final sempre existiu. Por isso, nós... começamos a criar o nosso próprio \"Luna\"."
10027050-86 = "E antes que eu percebesse, chegou a essa escala..."
10027050-87 = "Então vocês estavam criando e preenchendo o vazio do volume final que não existe em lugar nenhum..."
10027050-88 = "No fim, é uma questão de interpretação, Merley-san.#nSe houver 10 fãs, surgirão 10 interpretações diferentes."
10027050-89 = "Ninguém sabe qual dessas interpretações é a correta.#nMas, em princípio, todas as interpretações devem ser respeitadas e possuem valor igual."
10027050-90 = "Por outro lado... o desejo de ter sua própria interpretação minimamente reconhecida existe porque o ato de criar é baseado no desejo."
10027050-91 = "......No entanto, isso é apenas um doujinshi de criação derivada.#nO volume final de \"Luna\" que você deseja não existe."
10027050-92 = "Ou seja — fazer as pazes com Momiji-san era, desde o início, algo impossível."
10027050-93 = "Mas, se você der de presente o maior doujinshi de \"Luna\" do mercado, talvez..."
10027050-94 = "Talvez você consiga fazer as pazes com Momiji-san."
10027050-95 = "Então... foi por isso que você me chamou aqui..."
10027050-96 = "......"
10027050-97 = "......É verdade. Você tem razão."
10027050-98 = "Já que o volume final não pode ser encontrado...#ntalvez... essa seja a resposta correta..."
10027050-99 = "Sim. Vejo que você também encara a realidade de vez em quando."
10027050-103 = "......Mas sabe."
10027050-105 = "Às vezes, quanto mais correto é o argumento, mais vontade dá de discordar!"
10027050-106 = "O que foi isso de repente!?"
10027050-108 = "Se é assim, eu mesma vou desenhar!"
10027050-109 = "Desenhar o quê...?"
10027050-111 = "O volume final de \"Luna\"!"
10027050-117 = "[ns] \"Hã?\""
10027050-118 = "......Como é?"
