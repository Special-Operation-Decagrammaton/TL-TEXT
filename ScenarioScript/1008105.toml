[translation]
1008105-1 = "休みも大切ですの！"
1008105-5 = "ふふっ。こんにちは、先生。"
1008105-6 = "[s] \"こんにちは、ユカリ。準備があるから待っててね。\""
1008105-7 = "ええ、分かりましたの。"
1008105-8 = "それでは、こちらに失礼してっと……"
1008105-13 = "ふふん～ふふっん～♪"
1008105-14 = "本日は先生と～何をいたしましょう～"
1008105-15 = "ふふっ、とても楽しみですの。"
1008105-20 = "あら？この音は……"
1008105-28 = "あっ……"
1008105-29 = "[s] \"ユカリ？どうかしたの？\""
1008105-30 = "先生……雨が……"
1008105-34 = "（しばらく様子を見ていたが、雨は止みそうになかった）"
1008105-35 = "[s] \"今日は一日中、雨の予報みたい。\""
1008105-39 = "そう、ですか……それではお出かけは厳しそうですのね。"
1008105-40 = "[s] \"……ごめんね、天気予報を見てなくって。\""
1008105-41 = "あっ、いいえそんな……それを言うのなら、身共も同じですの。"
1008105-42 = "今日は……そうですね。"
1008105-43 = "大人しくそふぁに座って、先生の仕事っぷりを見守りますの！"
1008105-44 = "[s] \"あはは、そう言ってもらえると助かるけど……\""
1008105-45 = "助かる、けど……"
1008105-46 = "身共の時間を無駄にしてしまったのではないかと、気にしているのですか？"
1008105-47 = "先生らしいお気遣いではありますが……"
1008105-52 = "そのように言われると、かえって傷つきますの。"
1008105-53 = "[s] \"えっ……？\""
1008105-54 = "今日は先生に会えると思って、身共はとってもわくわくしていました。"
1008105-58 = "たとえ、どこかに出かけなくとも。#nたとえ、何もなさずとも。"
1008105-59 = "屋敷から出て、先生と一緒に居るだけで……"
1008105-60 = "身共には、そのどれもが斬新で……"
1008105-61 = "かけがえのない時間になっておりますのよ。"
1008105-62 = "今日でなくとも、明日があります。"
1008105-63 = "明日でなくとも、明後日があります。"
1008105-64 = "次に会ったらあれをお話ししよう、これをお話ししよう……"
1008105-65 = "そんな風に会えない時間も先生のことを考えているだけで、身共は毎日がとても楽しいのです。"
1008105-66 = "ですから、身共の時間を無駄にしたのではないかと思っているのなら……"
1008105-67 = "それは大間違いですのよ！"
1008105-68 = "身共にとって、大好きな先生と過ごす時間は宝物ですから！"
1008105-69 = "[s] \"私もだよ。ありがとう、ユカリ。\""
1008105-70 = "あら、身共は心から思っている気持ちを伝えただけですの！"
1008105-71 = "それに、当たり前のことで感謝されると、少しむず痒いです。"
1008105-72 = "ふんふふん～♪"
1008105-73 = "[s] \"でもユカリの本音は、ちゃんと受け取ったから。\""
1008105-74 = "それは何より……"
1008105-75 = "なによ、り……"
1008105-76 = "…………本音？"
1008105-78 = "身共にとって、大好きな先生と過ごす時間は宝物ですから！"
1008105-80 = "…………。"
1008105-81 = "……………………。"
1008105-82 = "（あ……あれれ――――っ！？）"
1008105-83 = "（勢いに任せて、う、うっかり……本音を……？）"
1008105-84 = "[s] \"ユカリの期待に応えられるよう、これからも頑張るね。\""
1008105-85 = "え……ええ！"
1008105-86 = "その……せ、先生のお言葉も！"
1008105-87 = "身共、ユカリは！しっかりと受け取りましたの！"
1008105-88 = "[s] \"ユカリ？\""
1008105-89 = "ですから、この話はここまでに……これでお終いです……！"
1008105-91 = "（その後、なぜかユカリは目を合わせてくれなかったが、雨の音に耳を傾けながら、のんびりと二人の時間を過ごした）"
