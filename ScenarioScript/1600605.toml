[translation]
1600605-1 = "Izumi e o Monstro do Verão"
1600605-2 = "（Hoje também passei por uns 5 restaurantes famosos da região junto com a Izumi）"
1600605-3 = "Hmm,"
1600605-4 = "Estava delicioso!"
1600605-5 = "[s1] \"Já estou bem cheia...\"\n[s2] \"Com certeza estava delicioso, mas...\""
1600605-6 = "O que foi? Teve algo que não estava tão bom?"
1600605-7 = "O que foi? Teve algo que não estava tão bom?"
1600605-8 = "Para mim, estava tudo delicioso, mas..."
1600605-9 = "Será que foi a \"raspadinha sabor lámen de porco\"?"
1600605-10 = "Ou o \"udon de ovo cozido com sopa de melão\"?"
1600605-11 = "[s3] \"Se for para escolher, acho que foi a primeira opção...\"\n[s4] \"...Ah, falando nisso.\""
1600605-14 = "[s] \"Já que viemos até a praia, a Izumi não vai nadar?\""
1600605-15 = "Eh, mas é que..."
1600605-16 = "Hmm, não é que eu não goste, mas tem tantas coisas gostosas por aqui..."
1600605-17 = "Só porque estamos na praia, não significa que temos que nadar obrigatoriamente, né?"
1600605-18 = "[s] \"Sim. Só achei que seria um desperdício.\""
1600605-19 = "Uu... é verdade, já que estou usando roupa de banho..."
1600605-20 = "Huuuuuum..."
1600605-21 = "Bom, mas se o Sensei insiste tanto!"
1600605-22 = "E como já estou cheia, nadar com certeza vai me dar fome de novo."
1600605-23 = "Sendo assim, para poder comer algo gostoso depois!"
1600605-24 = "Vamos nadar!"
1600605-25 = "[s] \"No fim, sua motivação é sempre essa, né...\""
1600605-31 = "Uau...!"
1600605-32 = "O mar! Bom, eu já estava olhando para ele o tempo todo!"
1600605-33 = "Ebaaaaa!!"
1600605-38 = "Ah, não!! As ondas estão vindo para cá...!"
1600605-39 = "Uau! Ahahaha! Ei, Sensei! Vem, vem aqui!"
1600605-40 = "É incrível, né? Tudo isso aqui é água do mar!"
1600605-41 = "[s] \"Pois é...\""
1600605-42 = "Tudo até lá no horizonte é água do mar, incrível, incrível!"
1600605-43 = "Água do mar é salgada, né? Será que não dá para usar em algum prato?"
1600605-44 = "No verão, coisas com um toque de sal também são deliciosas."
1600605-45 = "Como limão com sal, lámen de sal, lámen de shoyu..."
1600605-47 = "...Slurp."
1600605-48 = "[s] \"Izumi!? Você não pode beber a água do mar!\""
1600605-49 = "Ah, que isso, Sensei! Mesmo eu não beberia água do mar!"
1600605-50 = "Eu só lembrei do lámen! Além disso, se eu bebesse tudo isso, ia ficar com a barriga estufada!"
1600605-54 = "Ah, que gelado!"
1600605-55 = "Mas é muito bom! Vem, vem, Sensei, entra também!"
1600605-56 = "[s] \"Izumi, você parece estar se divertindo.\""
1600605-57 = "Sim! Estou me divertindo muito!"
1600605-58 = "Antes de entrar no mar, eu achei que ia ser um incômodo..."
1600605-59 = "Mas agora que entrei, é muito divertido!"
1600605-61 = "Por que será? Bom, acho que o mar é divertido por natureza..."
1600605-62 = "Isso é..."
1600605-63 = "..."
1600605-64 = "Fufu♪"
1600605-66 = "（Slurp, slurp, slurp...）"
1600605-67 = "...Hm?"
1600605-69 = "(Sluuurp...)"
1600605-70 = "Hueee...?"
1600605-71 = "[s] \"Izumi? O que aconteceu?\""
1600605-72 = "Awawa, eh, eh!?"
1600605-73 = "Hueeeen! Sensei, tem algo, tem algo na minha perna!!"
1600605-74 = "[s] \"Na sua perna...?\""
1600605-77 = "[wa:200]— Se, [wa:600]Sensei, [wa:750]me ajudaaa...!"
1600605-80 = "[ns] \"Izumi!? O que houve!?\""
1600605-81 = "[wa:150]— Nnn, [wa:700]está com uma sensação estranha..."
1600605-83 = "— Está úmido e [wa:750]escorregadio, [wa:1250]ueeen...!"
1600605-86 = "[ns] \"Es-espera um pouco! Já estou indo aí...!\""
1600605-87 = "[wa:150]— Não, [wa:400]para com isso!"
1600605-89 = "[wa:50]— Eu ainda não [wa:550]posso ser comida!"
1600605-92 = "— Eu ainda tenho [wa:500]uma montanha de coisas [wa:650]que quero comer!!"
1600605-95 = "[wa:50]— Hiu!? [wa:550]Uuu,"
1600605-97 = "— Eu não posso [wa:530]ser derrotada assim...!"
1600605-100 = "[ns] \"...Izumi?\""
1600605-101 = "[wa:150]— Ha! [wa:650]Será que,"
1600605-103 = "[wa:200]— Se for para ser [wa:450]comida por um polvo, [wa:1550]então, na verdade...!"
1600605-106 = "— Talvez eu deva [wa:910]comê-lo primeiro!?"
1600605-109 = "Se é assim, então, certo...!"
1600605-110 = "Se eu comer o corpo inteiro dele primeiro, eu venço!!"
1600605-114 = "Itadakimasu!!!"
1600605-115 = "[s] \"Izumi! Isso não pode, em nenhum sentido!\""
1600605-117 = "(De alguma forma, consegui desgrudar o polvo da Izumi e, com ela olhando de lado com um ar de quem ainda queria um pouco, consegui devolvê-lo em segurança para o mar)"
