[translation]
1600605-1 = "イズミと夏の魔物"
1600605-2 = "（今日もイズミと一緒に、周囲の有名なお店を5か所ほど回った）"
1600605-3 = "うーん、"
1600605-4 = "美味しかったー！"
1600605-5 = "[s1] \"もうだいぶお腹いっぱい……。\"\n[s2] \"たしかにあれは美味しかったけど……。\""
1600605-6 = "どうしたの？何かイマイチだった？"
1600605-7 = "どうしたの？何かイマイチだった？"
1600605-8 = "私的には、全部美味しかったんだけど……。"
1600605-9 = "もしかして、「豚骨ラーメン味のかき氷」？"
1600605-10 = "それとも「メロンスープの温玉うどん」？"
1600605-11 = "[s3] \"強いて言えば、前者の方かな……。\"\n[s4] \"……あ、そういえば。\""
1600605-14 = "[s] \"せっかく海に来たのに、イズミは泳がないの？\""
1600605-15 = "えー、だって～……。"
1600605-16 = "うーん、嫌ってわけじゃないけど、美味しいものがいっぱいあるから……。"
1600605-17 = "海だからって、絶対に泳がないとダメってわけじゃないでしょ？"
1600605-18 = "[s] \"うん。ただ、勿体ないんじゃないかなって。\""
1600605-19 = "うー……確かに、せっかく水着も着てるし……。"
1600605-20 = "うーーーーーん……。"
1600605-21 = "まあでも、先生がそこまで言うなら！"
1600605-22 = "ちょうどお腹もいっぱいだし。泳いだらきっとまた良い感じにお腹が空くよね。"
1600605-23 = "そうとなったら、美味しくご飯を食べるためにも！"
1600605-24 = "泳ぎに行くとしよー！"
1600605-25 = "[s] \"動機は結局そっちなんだね……。\""
1600605-31 = "おお……！"
1600605-32 = "海だ！まあずっと見てたけど！"
1600605-33 = "わーーーーーーい！！"
1600605-38 = "あわわ！！波がこっちに……！"
1600605-39 = "うわーっ！あはははっ！ね、先生！こっちこっち！"
1600605-40 = "すごいよね、これ全部海水なんだよ！"
1600605-41 = "[s] \"そりゃあね……？\""
1600605-42 = "あの水平線の方まで全部海水なんでしょ、すごいすごい！"
1600605-43 = "海水ってしょっぱいよね、何かの料理に使えそうじゃない？"
1600605-44 = "夏って塩っ気が強いものも美味しいよねー。"
1600605-45 = "塩レモンとか～、塩ラーメンとか～、醬油ラーメンとか～……"
1600605-47 = "……じゅるり。"
1600605-48 = "[s] \"イズミ！？海水そのまま飲んじゃダメだよ！？\""
1600605-49 = "や、やだなー先生！いくら私でも海水まで飲まないよ！？"
1600605-50 = "ラーメンを思い出しただけ！それに、こんなに飲んだらお腹タプタプだよ！"
1600605-54 = "あはっ、冷たーい！"
1600605-55 = "でも気持ちいい！ほらほら、先生も来て！"
1600605-56 = "[s] \"イズミ、楽しそうだね。\""
1600605-57 = "うん！すっごく楽しい！"
1600605-58 = "海に入る前は、めんどくさいなって思ってたけど……。"
1600605-59 = "いざ入ってみるとすっごく楽しいね！"
1600605-61 = "何でだろ、まあ普通に海って楽しいものなんだろうけど……。"
1600605-62 = "これは……。"
1600605-63 = "……。"
1600605-64 = "ふふっ♪"
1600605-66 = "（ズズズズズッ……）"
1600605-67 = "……ん？"
1600605-69 = "（ズズズズズッ……）"
1600605-70 = "ふえぇ……？"
1600605-71 = "[s] \"イズミ？どうしたの？\""
1600605-72 = "あわわっ、えっ、えっ！？"
1600605-73 = "ふえぇぇぇん！先生、何か、何かが私の足にいぃぃ！！"
1600605-74 = "[s] \"足……？\""
1600605-77 = "[wa:200]― せ、[wa:600]先生[wa:750]助けてぇ～……！"
1600605-80 = "[ns] \"イズミ！？どうしたの！？\""
1600605-81 = "[wa:150]― んんっ、[wa:700]変な感じするぅ……"
1600605-83 = "― 湿ってて[wa:750]ヌルヌルして、[wa:1250]うえぇん……！"
1600605-86 = "[ns] \"ちょ、ちょっと待ってて！今そっちに……！\""
1600605-87 = "[wa:150]― いやっ、[wa:400]やめて～！"
1600605-89 = "[wa:50]― 私はまだ[wa:550]食べられるわけにはいかないのー！"
1600605-92 = "― まだまだ[wa:500]食べたいものが[wa:650]山ほどあるんだからー！！"
1600605-95 = "[wa:50]― ひぅっ！？[wa:550]ううっ、"
1600605-97 = "― このまま[wa:530]やられるわけには……っ！"
1600605-100 = "[ns] \"……イズミ？\""
1600605-101 = "[wa:150]― はっ！[wa:650]もしかして、"
1600605-103 = "[wa:200]― このまま[wa:450]タコに食べられるぐらいなら[wa:1550]いっそのこと……！"
1600605-106 = "― 私が先に[wa:910]食べちゃえばいいのかも！？"
1600605-109 = "こ、こうなったら、よし……！"
1600605-110 = "先にそっちの全身を食べきれば、私の勝ち！！"
1600605-114 = "いただきますっ！！！"
1600605-115 = "[s] \"イズミ！それは色んな意味でダメ！\""
1600605-117 = "（どうにかイズミからタコを引きはがして、どこか名残惜しそうなイズミを横目に、ちゃんと無事に海へと帰してあげた）"
