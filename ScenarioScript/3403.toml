[translation]
3403-1 = "Uma manhã um tanto especial em Shanhaijing (3)"
3403-3 = "……。"
3403-4 = "……。"
3403-5 = "[ns] \"O que é... isso exatamente...?\""
3403-6 = "Pela minha memória, era para eu estar fazendo exercícios matinais com a instrutora Kokona e as crianças do Jardim de Infância Baikaen..."
3403-7 = "Kokona-chan...? Mestra...?#nO que está acontecendo aqui...?"
3403-24 = "Diretora Kaguya...?#nPor que o Clube de Ópera de Pequim está aqui...?"
3403-25 = "E por que a senhorita Reijo, da Associação Mercantil Genbu, e o Clube de Pesquisa de Artes Marciais estão aqui...?"
3403-26 = "――Que coincidência."
3403-27 = "Sim―― vagando pelo mundo como plantas flutuantes, tivemos um encontro dramático.#nRealmente, pode-se dizer que é uma coincidência..."
3403-28 = "Bem, eu e o Clube de Pesquisa de Artes Marciais temos assuntos a tratar neste parque."
3403-29 = "Ora, ora, o Clube de Ópera de Pequim também... que peça do destino."
3403-34 = "Eu, Reijo Kayama, e todo o Clube de Pesquisa de Artes Marciais, a partir de hoje, acompanharemos a Mestra em seu treino de Kung Fu!"
3403-35 = "Nós, do Clube de Ópera de Pequim! A partir de hoje, ensinaremos à Mestra, de corpo e alma, o treino de Ópera de Pequim!"
3403-36 = "Hã?"
3403-37 = "Sim?"
3403-42 = "……O quê?"
3403-44 = "Parece haver um mal-entendido, mas... a Mestra pratica Kung Fu aqui todas as manhãs, não é?"
3403-45 = "Não! O que a Mestra tem se dedicado é ao treino de Ópera de Pequim.#nPara ser exata, é a \"Dança da Ópera de Pequim\", mas..."
3403-47 = "Não, eu só..."
3403-49 = "Você deve ter ouvido boatos estranhos, não?#nInfelizmente, a Mestra estava praticando Kung Fu."
3403-50 = "A senhorita Reijo é quem está sendo enganada por boatos falsos, não é?#nA Mestra estava se dedicando ao treino de Ópera de Pequim, sabia?"
3403-52 = "Sensei...? Mestra...?"
3403-54 = "Não seria o Clube de Ópera de Pequim que está se enganando?!#nA Mestra estava claramente praticando Kung Fu!"
3403-55 = "――Eu vi claramente com meus próprios olhos!"
3403-57 = "Disse que é um engano? Que lamentável.#nNo entanto, a Mestra estava, sem dúvida, praticando Ópera de Pequim."
3403-58 = "――Eu, Kaguya Urushibara, gravei essa imagem em minha mente!"
3403-60 = "[ns] \"Ah, entendi.\""
3403-61 = "Lamentável nada! Aquilo é inegavelmente Kung Fu!"
3403-62 = "Aquela pose da Mestra é a própria técnica de Hua Jin para desviar os ataques do oponente!"
3403-67 = "Se aquilo não for Kung Fu, então eu e todos do Clube de Pesquisa de Artes Marciais, que temos nos dedicado às artes marciais até agora,"
3403-68 = "――Significaria que todo o nosso esforço até hoje foi inútil!?"
3403-76 = "(Perigoso... quase deixei escapar um \"Sim, é inútil\"...!)"
3403-77 = "Isso é uma coincidência... ou melhor, devo dizer, um destino.#nEu também estava pensando a mesma coisa que a senhorita Reijo."
3403-78 = "Dediquei meu corpo à Ópera de Pequim e continuei com um treinamento rigoroso todos os dias.#nPor isso, entendo naturalmente."
3403-79 = "Se aquilo não for Ópera de Pequim, então eu e os membros do Clube de Ópera de Pequim..."
3403-80 = "Teríamos desperdiçado nosso tempo!"
3403-86 = "(...Ah! Quase disse \"foi uma perda de tempo\"...)"
3403-93 = "Portanto, aquilo não é Ópera de Pequim!"
3403-96 = "Essa frase é minha!#nAquilo não é Kung Fu!"
3403-98 = "É Kung Fu!"
3403-99 = "É Ópera de Pequim!"
3403-103 = "Não, não é nenhum dos dois..."
3403-104 = "Mestra, tem outras pessoas chegando também...?"
3403-105 = "O que disse?"
3403-117 = "Uau! A Mestra está aqui!"
3403-118 = "Eu não acredito que realmente pude vê-la...!"
3403-119 = "Mas, se formos muito íntimos, talvez o Genryumon nos dê uma bronca, não é?"
3403-120 = "Hmm... bem, não tem problema, não é?"
3403-122 = "\"Quando o sol nascer e se pôr, muitas pessoas cairão... mas desta vez, será a nossa vez...\""
3403-123 = "Onde a Mestra estiver, eu estarei — Konoe Mina, estou às suas ordens!"
3403-128 = "……Não tem ninguém desmaiado aqui, tem?"
3403-129 = "Shiu! Se você falar isso, pode ser que alguém realmente desmaie……."
3403-131 = "Nós, da Genryumon! Viemos atender ao chamado!"
3403-132 = "Não importa se a Mestra quer praticar Kung Fu ou Ópera de Pequim……!"
3403-133 = "A Genryumon estará com a Mestra até o fim!"
3403-138 = "Bem, deixando a Chefe de Execução de lado…… vou aproveitar essa brecha para tirar uma foto da Mestra toda fofa……."
3403-147 = "Me manda essa depois."
3403-148 = "5000 ienes."
3403-149 = "Ei, não está caro demais?"
3403-150 = "Ei…… silêncio!"
3403-151 = "S-sim, senhora!"
3403-153 = "Puxa vida, quem diria que aquele boato era verdade……."
3403-154 = "Isso! Depois eu tenho que fazer uns doces bem nutritivos para a Kisaki!"
3403-155 = "O que é isso, afinal……."
3403-162 = "Agradeço, Sensei. Por pouco eu não perco a consciência."
3403-163 = "[s] \"Já que chegamos a esse ponto, não tem jeito, Kisaki.\""
3403-164 = "……O que você quer dizer com isso?"
3403-165 = "[s] \"Vamos atender às expectativas de todos que estão reunidos aqui!\""
3403-166 = "……!"
3403-167 = "É, você tem razão."
3403-170 = "Kung Fu!"
3403-171 = "Ópera de Pequim!"
3403-173 = "Mestra~"
3403-175 = "Eu bem que gostaria de não ter que atender às expectativas daquelas três……."
3403-176 = "……Não tem jeito. #nJá que chegamos a esse ponto, não me resta alternativa a não ser usar meu trunfo."
3403-182 = "Sim, eu estava pensando a mesma coisa. #nSe as palavras não funcionam, só nos resta usar a força……!"
3403-188 = "Estão preparadas?"
3403-189 = "Vocês ainda têm energia para se preocupar conosco?"
3403-190 = "Hm? Sinto cheiro de confusão em algum lugar……."
3403-192 = "Ehem…… escutem bem, vocês duas. #nEu só vim aqui para fazer a ginástica de saudação com as crianças do Jardim de Infância Meika…… entenderam……?"
3403-193 = "Gi-ginástica de saudação……? #nNão era Kung Fu?"
3403-194 = "Não era um treino de Ópera de Pequim……?"
3403-196 = "Entendo, então era ginástica!"
3403-197 = "Ah, então vocês também, parem com essa briga agora mesmo――"
3403-198 = "Não, Mestra! A ginástica também é necessária para o treino de Kung Fu!"
3403-199 = "Por isso, vamos seguir o caminho do Kung Fu conosco!"
3403-200 = "Sim! Na Ópera de Pequim, o treinamento também é essencial. A ginástica é um tipo de exercício!"
3403-201 = "Mestra! Se nos permitir, juramos ensinar a essência da Ópera de Pequim para a senhora!"
3403-202 = "Eu já disse que não é Ópera de Pequim!"
3403-203 = "A Mestra também está dizendo que não é Kung Fu!"
3403-205 = "Mestra…… snif…… aquelas moças são assustadoras……."
3403-206 = "To-todos! Não chorem!"
3403-210 = "E-eu também…… estou com medo…… uuu……."
3403-215 = "…………."
3403-216 = "――Parem com isso! Vocês estão assustando as crianças!"
3403-219 = "！？"
3403-220 = "！？"
3403-221 = "？"
3403-222 = "――Não importa o que vocês pretendam fazer, eu respeito a vontade de vocês."
3403-223 = "No entanto, não creio que seja necessário falar sobre isso a ponto de ameaçar as crianças, que são o futuro de Shanhaijing."
3403-224 = "Diga a mim... não, diga na frente das crianças. #nO que é mais importante: a vontade de vocês ou o futuro de Shanhaijing?"
3403-226 = "M-Mestra, nós apenas...!"
3403-227 = "N-Nossas mais sinceras desculpas! Mestra!"
3403-229 = "Se a vontade de vocês se tornar o sustento das crianças e um guia para o futuro, #n— eu, em nome da Xuanlongmen, protegerei vocês."
3403-230 = "Mas..."
3403-236 = "Caso isso se torne um mal — nesse caso, terei que tomar as medidas cabíveis."
3403-239 = "[ns] \"As duas, já se acalmaram um pouco?\""
3403-240 = "Pedimos perdão, Mestra..."
3403-241 = "Mestra... por favor, nos perdoe...!"
3403-242 = "Bem, vamos parar por aqui. #nAs crianças estão assustadas."
3403-243 = "Ora, Lumi. Você também estava aí...?"
3403-244 = "Snif... uuu..."
3403-246 = "Mestra..."
3403-251 = "...Já está tudo bem. #nSinto muito por ter levantado a voz."
3403-252 = "S-Sim..."
3403-253 = "[ns] \"Kokona-chan, aqui, um lenço.\""
3403-254 = "...! N-Não precisa! Eu já sou uma dama respeitável, então não preciso me preocupar com coriza...!"
3403-255 = "E não é Kokona-chan, é Instrutora Kokona!"
3403-256 = "[s] \"Sim, é verdade, Instrutora Kokona.\""
3403-257 = "Então, que tal começarmos todos juntos com a ginástica matinal?"
3403-258 = "T-Todos juntos...?"
3403-260 = "Se for junto com a Mestra, não me importo com o que seja!"
3403-261 = "Vamos! Xuanlongmen! Preparem-se para a ginástica!"
3403-262 = "Eu já imaginava que isso aconteceria... mas tinha que ser assim mesmo...?"
3403-263 = "O que a gente tem que fazer para se preparar para a ginástica...?"
3403-264 = "No fim das contas, vamos fazer na frente de todo mundo..."
3403-265 = "Bem, Kisaki também sabe, não é?"
3403-266 = "De vez em quando, dias assim também são necessários."
3403-267 = "..."
3403-268 = "É verdade. Você tem razão."
3403-269 = "Então, vamos começar o dia com a ginástica matinal."
3403-274 = "[ns] \"Ah, lembrei de um compromisso urgente, então vou indo na frente...\""
3403-276 = "Aonde você pensa que vai, Sensei?"
3403-277 = "Você também vai participar."
3403-278 = "[s] \"Eu sabia que ia acabar assim!\""
3403-280 = "(E assim, a manhã um tanto agitada de Shanhaijing começou com muita energia)"
3403-281 = "(Segundo boatos...)"
3403-282 = "(Dizem que, a partir daquele dia, o número de estudantes fazendo ginástica no Parque Byakko aumentou... ou talvez não...)"
3403-283 = "A manhã um tanto especial de Shanhaijing"
