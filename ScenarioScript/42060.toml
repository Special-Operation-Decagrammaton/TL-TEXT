[translation]
42060-1 = "Episódio 6: A Angústia da Veterana"
42060-2 = "Parque dos Coelhinhos"
42060-3 = "（Voltando ao parque, ouvimos o que o RABBIT Squad tinha a dizer）"
42060-4 = "[ns] \"Naquela hora, quem estava no Schale era o FOX Squad...\""
42060-5 = "Sim. #nSinto muito por não ter podido contar a situação..."
42060-6 = "Ficamos nos sentindo culpadas por saber que o Sensei passou por perigos por nossa causa..."
42060-7 = "[s1] \"Está tudo bem, não se preocupem tanto.\"\n[s2] \"Não é culpa de vocês.\""
42060-8 = "Mas... nós estávamos acampando tranquilamente no parque sem saber de nada..."
42060-9 = "Mas... nós estávamos acampando tranquilamente no parque sem saber de nada..."
42060-10 = "O Sensei até nos pagou uma carne cara... #nEle disse que era um agrado, mas, na verdade, nós é que deveríamos estar pedindo desculpas a ele..."
42060-11 = "Mas a carne já foi comida... e mesmo que quiséssemos pagar, só temos trocados..."
42060-12 = "Se for assim... só nos resta entregar todas as nossas marmitas descartadas do dia para o Sensei...!"
42060-13 = "[s] \"E-está tudo bem, de verdade...!\""
42060-14 = "A única coisa que podemos fazer agora para nos redimir é recuperar o que as veteranas levaram do Schale."
42060-15 = "...Embora eu ainda tenha dúvidas se isso é possível contra as veteranas do FOX Squad."
42060-16 = "Aliás, o que exatamente as veteranas levaram do Schale?"
42060-17 = "Deve ser algo que o Sensei nem notaria se sumisse, certo? #nPelas imagens da câmera, não parece ser nada tão grande..."
42060-19 = "Talvez uma lata de atum cara..."
42060-20 = "As roupas íntimas do Sensei, talvez...?"
42060-22 = "...Não quero nem imaginar que as veteranas se armaram até os dentes só para roubar as roupas íntimas do Sensei..."
42060-26 = "[ns] \"...Vamos deixar isso de lado por enquanto.\""
42060-28 = "[ns] \"Primeiro, quero que me contem sobre o FOX Squad.\""
42060-29 = "Sobre o FOX Squad, é... bem..."
42060-30 = "Se pudéssemos descrevê-las em uma palavra..."
42060-31 = "— Elas são a unidade de forças especiais mais talentosa de Kivotos."
42060-32 = "Em termos de poder de combate comum, existem várias alunas em cada escola que rivalizam com a SRT. #nMas, em operações sob condições especiais, não deve existir grupo superior ao FOX Squad."
42060-33 = "As forças especiais são treinadas para realizar operações não apenas em combates comuns, mas em diversas situações."
42060-34 = "Dentre elas, o FOX Squad pode ser considerado a unidade ideal, possuindo todas as habilidades que a SRT exige."
42060-35 = "Por exemplo, a vice-líder do esquadrão, a veterana Niko..."
42060-38 = "Ela é como uma 'mãe do esquadrão' que cuida de todas com carinho."
42060-39 = "Ela costumava trazer inari sushi caseiro para o esquadrão antes das missões de campo..."
42060-40 = "Ela era uma veterana tão querida que até membros de outros esquadrões iam até ela pedir conselhos."
42060-42 = "Quando eu entrei, a veterana Niko me ajudou muito..."
42060-43 = "Mas, apesar da personalidade gentil, ela também possui a frieza necessária para tomar decisões precisas mesmo no meio de um combate caótico."
42060-44 = "Dizem os boatos que ela consegue memorizar a quantidade exata de munição e suprimentos consumidos durante uma operação."
42060-45 = "...Nesse sentido, Moe, por que você não aprende um pouco com a veterana Niko?"
42060-46 = "O quê?! Disparar todas as balas é uma questão de romance!"
42060-47 = "...Em comparação, a veterana Kurumi costumava ser bem impaciente."
42060-50 = "Mas ela também é o exemplo de uma 'pointman' que sempre encara as missões com tensão total."
42060-51 = "Na linha de frente, qualquer descuido pode ser fatal."
42060-52 = "Além disso, a veterana Kurumi tem a capacidade de lidar com flexibilidade em diversas situações."
42060-53 = "Mesmo que caia em uma emboscada ou situação inesperada durante a missão, ela nunca entra em pânico, #ne consegue garantir uma rota de fuga usando o terreno ao redor."
42060-55 = "Eu também já ouvi essa história."
42060-56 = "Dizem que quando a arma dela quebrou bem no meio do território inimigo, #nela roubou a arma do inimigo e conseguiu romper o cerco, não é?"
42060-57 = "...Incrível. #nSe fosse eu, provavelmente tentaria consertar a arma seguindo o manual e acabaria arruinando a missão."
42060-58 = "Para alguém como eu, esse pensamento flexível é um talento invejável."
42060-62 = "A veterana Otogi é a atiradora de elite do FOX Squad..."
42060-65 = "Eu não conversei muito com ela, mas... senti que ela era diferente dos outros atiradores..."
42060-66 = "Bem, ela não era do tipo lobo solitário que fica num canto dobrando o traje de camuflagem."
42060-67 = "A veterana Otogi era bem chamativa... #ne estava sempre no centro das atenções dentro da SRT."
42060-69 = "[ns] \"Para um atirador, não é uma desvantagem ser notado?\""
42060-70 = "Não necessariamente. Se fosse apenas para acertar um alvo, talvez, mas para conter a infantaria inimiga durante um combate intenso, é preciso ter um certo nível de presença."
42060-71 = "Uma vez, durante um treinamento, lutei contra o esquadrão da veterana Otogi, e a pressão de não saber de onde os tiros viriam me deixou incapaz de me mover..."
42060-72 = "Dizem que um atirador de elite excepcional consegue neutralizar três ou mais inimigos com uma única bala..."
42060-73 = "Além disso... a cooperação com os aliados é indispensável para aproveitar as informações de reconhecimento..."
42060-74 = "Comparada à veterana, eu... até meus aliados esquecem da minha existência..."
42060-75 = "I-isso não é culpa da Miyu..."
42060-76 = "É culpa da Saki, que é tão boba que nem consegue contar o número de membros do esquadrão."
42060-77 = "Cala a boca!"
42060-81 = "Por fim, a líder, veterana Yukino..."
42060-85 = "...Aquela pessoa é tão perfeita que não tem defeitos, né~"
42060-86 = "Ah, dizem que ela controlava os movimentos dos membros do esquadrão com precisão de segundos."
42060-87 = "Ela é muito confiável para os companheiros... parece que, se for uma ordem da veterana Yukino, o FOX Squad cumpre qualquer missão..."
42060-89 = "[ns] \"Vocês a admiram bastante, hein...\""
42060-90 = "...As veteranas eram o nosso sonho."
42060-91 = "Um objetivo a ser alcançado, uma existência que admirávamos."
42060-92 = "O FOX Squad tem um desempenho superior ao RABBIT Squad em todas as missões."
42060-96 = "[ns] \"Não existe ninguém perfeito neste mundo.\""
42060-98 = "[ns] \"Além disso, acho que existem coisas que só vocês podem fazer.\""
42060-100 = "...É mesmo?"
42060-101 = "Mas, pelo menos, é assim que eu penso."
42060-102 = "Mas... a veterana Yukino daquela época brilhava de forma tão deslumbrante..."
42060-103 = "Por que ela diz coisas assim agora? É como se fosse um adulto que desistiu de tudo..."
42060-104 = "Será que a veterana mudou em algum lugar que eu não conheço?..."
42060-105 = "...Eu não sei de nada."
42060-106 = "Nós, que somos crianças, deveríamos deixar a responsabilidade com as veteranas e agir exatamente como nos mandam...?"
42060-107 = "...O que vocês acham?"
42060-108 = "Mesmo que me pergunte..."
42060-109 = "E-eu não sei..."
42060-114 = "Isso é..."
42060-115 = "Um alerta de emergência do Conselho Estudantil Federal...?"
42060-116 = "Não pode ser, de novo...!?"
42060-117 = "<Atenção a todos em Kivotos.>"
42060-118 = "<Em breve, uma declaração de emergência será feita pelo Conselho Estudantil Federal de Kivotos.>"
42060-119 = "<Pedimos aos cidadãos que acompanhem pelo canal oficial do Conselho Estudantil Federal ou pelo canal Chronos.>"
42060-120 = "Canal oficial do Conselho Estudantil Federal? Onde eu coloquei meu celular...?"
42060-121 = "...Não, acho que não precisamos do celular."
42060-122 = "Olhem, ali."
42060-123 = "A imagem... está no dirigível..."
42060-125 = "Olá a todos em Kivotos."
42060-126 = "Sou Shiranui Kaya, chefe do Gabinete de Defesa do Conselho Estudantil Federal de Kivotos."
42060-127 = "Peço sinceras desculpas por fazer este anúncio repentino e causar preocupação aos cidadãos."
42060-128 = "...Ultimamente, Kivotos tem sido assolada por inúmeras catástrofes sem precedentes."
42060-129 = "Estruturas de origem desconhecida caíram do céu, paralisando as funções da cidade e causando danos imensos, tanto no D.U. quanto em cada distrito autônomo."
42060-130 = "No entanto, o Conselho Estudantil Federal deixou a resolução dessa situação crítica nas mãos do Schale e dos distritos autônomos, focando apenas nos trabalhos de restauração. Considero isso algo extremamente vergonhoso."
42060-131 = "...Tudo isso deriva do fato de que a tomadora de decisão final — e substituta da presidente do Conselho Estudantil Federal, Nanagami Rin — desapareceu durante o incidente, abandonando suas responsabilidades."
42060-132 = "Diante disso, o Gabinete de Defesa questionou a responsabilidade da administradora Nanagami..."
42060-133 = "E hoje, finalmente, a moção de desconfiança contra a administradora Nanagami, que estava pendente, foi aprovada."
42060-134 = "Consequentemente, eu, Shiranui Kaya, assumirei o cargo de nova substituta da presidente do Conselho Estudantil Federal."
42060-136 = "Nova substituta da presidente do Conselho Estudantil Federal!?"
42060-137 = "O cargo de representante da Presidente do Conselho Estudantil não é algo que se possa mudar tão facilmente, mas..."
42060-139 = "Aos cidadãos, imagino que estejam surpresos com a mudança repentina da representante da Presidente do Conselho Estudantil."
42060-140 = "No entanto, faremos o nosso melhor pela \"normalização\" de Kivotos, por isso, pedimos o apoio de todos ao novo Comitê Administrativo."
42060-142 = "……E, por último."
42060-143 = "Sensei [USERNAME]."
42060-144 = "O senhor também deve estar assistindo a esta transmissão em algum lugar."
42060-145 = "Pelo futuro de Kivotos e do Schale, tenho um assunto importante para tratar com o sensei [USERNAME]."
42060-146 = "Assim que esta transmissão terminar, por favor, dirija-se à sala de recepção do Conselho Estudantil Federal."
42060-147 = "Todos nós do Conselho Estudantil Federal aguardamos ansiosamente pela sua chegada."
42060-148 = "Até logo."
42060-153 = "[ns] \"……O que isso significa?\""
42060-155 = "……Parece que algo está acontecendo no Conselho Estudantil Federal."
42060-157 = "Próximo episódio: Golpe de Estado"
