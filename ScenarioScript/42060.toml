[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 11/06.
42060-1 = "Episódio 6: A Agonia das Calouras"
42060-2 = "Parque dos Coelhinhos"
42060-3 = "（De volta ao acampamento, após ouvir o relato sombrio do Esquadrão RABBIT.）"
42060-4 = "[ns] \"Então os mercenários furtivos que limparam a Schale... eram as veteranas do Esquadrão FOX o tempo todo...\""
42060-5 = "Sim.#nSensei... nós pedimos desculpas por esconder essa verdade nojenta do senhor."
42060-6 = "A simples ideia de que nossa própria ignorância quase custou a sua vida... nos dá um aperto no peito indescritível..."
42060-7 = "[s1] \"Relaxem, garotas. Não é o fim do mundo.\"\n[s2] \"Vocês não tiveram culpa de nada. A responsabilidade não é de vocês.\""
42060-8 = "Como não é culpa nossa...?! Nós estávamos acampando e comendo sossegadas enquanto vendíamos armas letais no mercado negro..."
42060-9 = "Como não é culpa nossa...?! Nós estávamos acampando e comendo sossegadas enquanto vendíamos armas letais no mercado negro..."
42060-10 = "O senhor nos encheu de gratidão e nos alimentou com carne de primeira...#nNós pensamos que era uma recompensa honesta, mas na verdade, nós é que deveríamos estar ajoelhadas pedindo perdão..."
42060-11 = "Mas nós já comemos toda a carne... e mesmo se fôssemos reembolsar o valor daquele Wagyu, a nossa conta bancária não pagaria nem um bife fino..."
42060-12 = "Se é assim... o único jeito de pagar a nossa dívida moral... é entregando todas as nossas marmitas vencidas de supermercado pro senhor todo santo dia!"
42060-13 = "[s] \"E-Eu juro que não precisa chegar a tanto...! Agradeço a intenção, mas tô bem alimentado!\""
42060-14 = "No momento, a única maneira honrosa de redimir o nosso pecado tático é recuperar cada item que as nossas veteranas saquearam do seu cofre na Schale."
42060-15 = "……Ainda que seja assustador pensar em bater de frente com a elite máxima do Esquadrão FOX novamente."
42060-16 = "Parando pra pensar, o que diabos elas roubaram do cofre da Schale?"
42060-17 = "O Sensei disse que não deu falta de nada grave, então não devia ser nada muito explícito...#nE pelas fitas de segurança, não parecia ser carga pesada ou armas..."
42060-19 = "Será que elas roubaram um estoque confidencial de atum premium importado...?"
42060-20 = "O-Ou será que roubaram a... a roupa íntima do Sensei...?!"
42060-22 = "……Kurumi-chan, a ideia das nossas veteranas blindadas invadindo um prédio de segurança máxima só para cheirar a cueca do Sensei me dá pesadelos terríveis. Apaga isso da mente."
42060-26 = "[ns] \"……Vamos ignorar as cuecas por enquanto, por favor.\""
42060-28 = "[ns] \"Eu preciso de informações mais concretas sobre as veteranas de vocês. O que é o Esquadrão FOX?\""
42060-29 = "O Esquadrão FOX... Bem, por onde eu começo..."
42060-30 = "Se eu pudesse resumir em uma única frase――"
42060-31 = "――Elas são o ápice militar e a força especial mais brutal de toda Kivotos."
42060-32 = "Se o papo fosse só poder de fogo bruto, as outras academias também têm suas próprias tropas de choque que fariam frente à SRT.#nMas quando se trata de operações irregulares e cenários impossíveis, ninguém sobrevive contra a FOX."
42060-33 = "Forças especiais não são treinadas apenas para tiroteios genéricos. Nós somos forjadas para cumprir qualquer objetivo, sob as condições mais insanas imagináveis."
42060-34 = "E o Esquadrão FOX... elas são a perfeição de todas essas doutrinas. Elas são a encarnação idealizada do que a SRT representa."
42060-35 = "A Vice-Capitã Niko, por exemplo..."
42060-38 = "Ela passa a vibe de uma 'Mãezona do Esquadrão' que cuida e mima cada soldado com um sorriso gigante."
42060-39 = "Antes de a gente ir pra lama lutar na guerra de trincheiras, ela sempre trazia caixas cheias de Inarizushis caseiros para nos fortalecer..."
42060-40 = "E ela não cozinhava só comida, não. Ela era o psicólogo não oficial da base. Muitas alunas de outros esquadrões sentavam no colo dela pra chorar e desabafar sobre o trauma das missões."
42060-42 = "Eu... confesso que chorei no ombro da Niko-senpai várias vezes quando entrei na academia... ela me salvou."
42060-43 = "Mas não se deixe enganar pela doçura. Quando a bala começa a voar e o sangue espirra, a mente dela é fria como gelo e ela processa cálculos táticos num piscar de olhos."
42060-44 = "Reza a lenda que, no meio de um tiroteio caótico, ela consegue contar exatamente cada projétil disparado, cada pino de granada puxado e cada segundo de bateria de rádio usado por todo o esquadrão de cabeça."
42060-45 = "……Nesse quesito, Moe, seria excelente se você copiasse um décimo da competência logística da Niko."
42060-46 = "Cala a boca! Minha logística é o instinto! Descarregar o pente inteiro com o dedo no gatilho é o auge do romance balístico!"
42060-47 = "……Se a Niko era a mãezona, a Kurumi-senpai era a adrenalina pura e o nervosismo em pessoa."
42060-50 = "Mas esse nervosismo a tornava a vanguardista tática perfeita. Ela nunca, nunca abaixava a guarda."
42060-51 = "Ser a Ponta de Lança significa que, se você piscar um milésimo de segundo atrasado, sua cabeça rola. Ela entrava nas portas primeiro com uma paranóia cirúrgica."
42060-52 = "Além disso, a capacidade de improviso da Kurumi é assustadora."
42060-53 = "Mesmo quando uma emboscada destruía todo o plano de contingência,#nela usava o próprio caos e qualquer móvel destruído ao redor para esmagar os inimigos."
42060-55 = "Já ouvi histórias de gelar o sangue sobre ela também."
42060-56 = "Dizem que, uma vez, durante uma invasão onde a arma principal dela derreteu no meio da base inimiga,#nela quebrou o braço de um soldado, roubou a metralhadora dele no ar e varreu o andar inteiro sem hesitar."
42060-57 = "……Isso é bizarro. Se a minha arma travassse no meio do inferno, eu ia me encolher no canto tentando consertar e colocaria a missão inteira em risco."
42060-58 = "Pra alguém metodicamente teimosa feito eu, essa agressividade e flexibilidade mental parecem um superpoder inatingível."
42060-62 = "A Otogi-senpai... ela era a franco-atiradora absoluta da FOX..."
42060-65 = "Eu não cruzava muito o caminho dela na base... mas ela emitia uma aura... diferente das outras atiradoras isoladas..."
42060-66 = "Com certeza. Ela não passava a vibe da 'Loba Solitária Oculta e Calada' que só fica escovando a capa camuflada no escuro."
42060-67 = "A Otogi-senpai era barulhenta, chamativa e sempre estava no centro das rodas de fofoca da SRT."
42060-69 = "[ns] \"Espera. Mas não ser invisível é praticamente o maior defeito que um sniper pode ter?\""
42060-70 = "Isso vale para snipers convencionais que só atiram em alvos parados.#nMas em um campo de batalha dinâmico, se o franco-atirador quiser suprimir uma área inteira e pregar o inimigo no chão, ele PRECISA exalar uma aura de terror e presença."
42060-71 = "Uma vez, no exame de progressão tática, eu lutei contra a equipe da Otogi.#nA simples presença dela era tão sufocante que ninguém do meu time conseguia dar um passo à frente, com medo de onde a bala viria... ficamos paralisadas."
42060-72 = "Dizem que um sniper mestre só precisa de um tiro de alerta bem dado para anular a coragem de três inimigos ou mais..."
42060-73 = "Sem contar que... pra a inteligência fluir no campo de batalha, o sniper precisa ter uma sinergia monstruosa com os aliados e um carisma comunicativo gigante..."
42060-74 = "Se compararem a ela, eu sou um lixo inútil... até a minha própria equipe esquece que eu existo no meio do fogo cruzado..."
42060-75 = "N-N-Não, a culpa não é sua, Miyu...!!"
42060-76 = "A culpa é toda da Saki, que é uma burra cega que não sabe nem contar até quatro quando tá com adrenalina."
42060-77 = "Moe, eu juro que enfio uma granada na sua goela!"
42060-81 = "E, no fim, temos a líder... A Capitã Yukino."
42060-85 = "……Ela era um deus na terra. Sem fraquezas. Sem falhas."
42060-86 = "Exatamente. O controle e o compasso tático da Yukino eram medidos em milissegundos. Ela regia o esquadrão inteiro como se fossem extensões do seu próprio corpo."
42060-87 = "A devoção que ela inspirava... As meninas do Esquadrão FOX pulariam num abismo sem pensar duas vezes se a Capitã Yukino ordenasse..."
42060-89 = "[ns] \"Isso soa como um peso gigantesco pra carregar... uma adoração doentia.\""
42060-90 = "……As veteranas da FOX eram o nosso sonho de ouro."
42060-91 = "O pico da montanha que nos matávamos todos os dias para escalar. O nosso norte."
42060-92 = "A FOX executava qualquer missão num nível tático... que nós, a RABBIT, ainda somos covardes e fracas demais para sequer sonhar em igualar."
42060-96 = "[ns] \"O perfeccionismo é uma ilusão bonita, meninas.\""
42060-98 = "[ns] \"Além disso, vocês têm a juventude e a garra de fazer coisas que aquele esquadrão engessado não conseguiria nem tentar.\""
42060-100 = "……Você acha, Sensei?"
42060-101 = "Bom, não que faça diferença, eu sigo acreditando nisso até o fim."
42060-102 = "Mas o que rasga a minha garganta... é que a Capitã Yukino do passado queimava com uma luz tão forte e calorosa..."
42060-103 = "E hoje... hoje aquelas palavras geladas saíram da boca dela como lâminas enferrujadas.#nCom um niilismo doente... de uma 'adulta' covarde que desistiu da vida e da esperança."
42060-104 = "Onde foi que o brilho se quebrou...? O que ferrou tanto a cabeça dela longe dos nossos olhos...?"
42060-105 = "……Eu não sei. Eu não entendo mais nada."
42060-106 = "Nós somos só crianças armadas... Será que a gente devia mesmo desistir de pensar, abaixar a cabeça, jogar a responsabilidade pra elas e ser cães de colo...?"
42060-107 = "……O que vocês acham que a gente deve fazer...?"
42060-108 = "Não me joga essa batata quente... eu também tô zonza com tudo isso..."
42060-109 = "E-Eu também não sei de mais nada..."
42060-114 = "Peraí. Esse som..."
42060-115 = "A Sirene de Emergência Nível Vermelho do Conselho Estudantil Geral...?!"
42060-116 = "Não me diga que... o céu vai sangrar de novo...?!"
42060-117 = "<ATENÇÃO, CIDADÃOS DE KIVOTOS. ATENÇÃO.>"
42060-118 = "<UM COMUNICADO DE EMERGÊNCIA ABSOLUTA DO CONSELHO ESTUDANTIL GERAL SERÁ TRANSMITIDO EM BREVE.>"
42060-119 = "<TODOS OS CIDADÃOS DEVEM SINTONIZAR IMEDIATAMENTE NO CANAL OFICIAL DO GOVERNO#nOU NA FREQUÊNCIA DA REDE KRONOS PARA RECEBER O PRONUNCIAMENTO.>"
42060-120 = "O canal do Conselho Estudantil?!#nCadê a droga do meu celular?! Onde eu enfiei?!"
42060-121 = "……Saki, acho que você não vai precisar gastar a tela do seu celular."
42060-122 = "Olha ali pra cima."
42060-123 = "Eles hackearam o letreiro de transmissão... dos dirigíveis que cruzam a cidade..."
42060-125 = "Boa tarde, ilustres cidadãos de Kivotos."
42060-126 = "Sou a Diretora do Escritório de Defesa do Conselho Estudantil Geral, Shiranui Kaya."
42060-127 = "Ajoelho-me em espírito e peço as mais sinceras desculpas pelo choque que essa transmissão emergencial pode estar causando a todos vocês neste momento."
42060-128 = "……Nos últimos tempos, a nossa amada Kivotos foi engolida por ondas de desastres catastróficos e sem precedentes."
42060-129 = "Estruturas apocalípticas caíram dos céus e afogaram o coração da nossa cidade, o Distrito D.U., em escombros e cinzas,#ndeixando um rastro de destruição e sangue em todas as zonas escolares."
42060-130 = "Porém, durante o momento mais negro da nossa história, o Conselho Estudantil lavou as mãos sujas e terceirizou a nossa própria salvação à organização extralegal da Schale e às milícias locais,#nfocando unicamente em assinar papéis e emular normalidade. Eu condeno publicamente essa covardia absurda como uma mancha negra no nosso governo."
42060-131 = "……E a raiz de toda essa desgraça diplomática recai inteiramente na Oficial Nanagami Rin, a Presidente Interina. A mulher que,#nno momento de maior provação e caos, optou por fugir do comando e abandonar a cidade à própria sorte."
42060-132 = "Após deliberações intensas nos bastidores do nosso escritório, nós formalizamos uma denúncia de traição contra a má gestão da Oficial Nanagami e..."
42060-133 = "Hoje, com orgulho absoluto, declaro que a moção de Voto de Desconfiança há muito travada na gaveta―― foi esmagadoramente aprovada pelas lideranças do Conselho."
42060-134 = "Sendo assim, sob a luz da legalidade e da emergência, assumo imediatamente a cadeira vacante como a nova Presidente Interina do Conselho Estudantil Geral. Eu, Shiranui Kaya."
42060-136 = "NOVA PRESIDENTE INTERINA?!!"
42060-137 = "O cargo de presidência interina... não deveria ser alvo de manobras políticas tão sujas em um estalar de dedos..."
42060-139 = "Prezados cidadãos, as ruas choram por justiça."
42060-140 = "Nós, a nova liderança do Conselho Estudantil, cortaremos o mal pela raiz com punho de ferro e forçaremos a verdadeira 'Normalização' de Kivotos.#nPeço que vocês ofereçam seus corações a nós."
42060-142 = "……E, por fim."
42060-143 = "Sensei da Schale."
42060-144 = "Sei que seus olhos estão fixos nessa transmissão agora mesmo."
42060-145 = "Para decidirmos os próximos passos da nossa pacífica Kivotos, exijo uma reunião de portas fechadas com o senhor."
42060-146 = "Apresente-se na sala de recepção primária da Torre do Conselho Estudantil assim que esta transmissão for encerrada."
42060-147 = "O novo Governo Geral de Kivotos aguarda... ansiosamente pela sua rendição pacífica."
42060-148 = "Fim da transmissão."
42060-153 = "[ns] \"……Mas que palhaçada foi essa agora?\""
42060-155 = "……Um Golpe de Estado em rede nacional. O conselho caiu."
42060-157 = "Próximo Episódio: Golpe de Estado"