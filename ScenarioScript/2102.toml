[translation]
2102-1 = "Quem foi chamado, por favor, permaneça (2)"
2102-2 = "……Ugh."
2102-3 = "……Minha cabeça ainda…… A febre parece ter baixado bastante, mas……"
2102-5 = "Ué, já é essa hora……?"
2102-6 = "……Haa."
2102-7 = "Será que a limpeza do ginásio já terminou……?"
2102-8 = "……."
2102-9 = "……Vai dar tudo certo, né? Serika-chan, as veteranas……"
2102-10 = "Fui eu quem encontrou esse trabalho de meio período, então me sinto mal por não poder ir……"
2102-11 = "Ugh……."
2102-12 = "Não, seja firme, Ayane! De vez em quando, elas precisam passar por isso, já que todo mundo sempre fica falando coisas estranhas……!"
2102-13 = "Sempre falando de sequestros, piqueniques e coisas do tipo……!"
2102-14 = "Por isso, isso é o mínimo……!"
2102-15 = "……."
2102-16 = "……Haa."
2102-17 = "……Quando eu melhorar um pouco mais, vou levar alguns doces para a sala de aula……"
2102-18 = "Pelo menos preciso recebê-las bem. Hoje, todas estão se esforçando no meu lugar……"
2102-19 = "Vum"
2102-20 = "……Hm? Momotalk?"
2102-21 = "Hoshino-senpai……?"
2102-22 = "……."
2102-23 = "……?"
2102-24 = "“Ayane-chan, como está se sentindo? Já chegamos no local do trabalho. Mas tem um probleminha, sabe?”"
2102-25 = "“O estado do ginásio está muito pior do que imaginávamos, será que é aqui mesmo?”"
2102-26 = "“Já limpamos a entrada, mas o interior está lotado, é de assustar~”"
2102-28 = "“É trabalho pesado demais para uma velha como eu.”"
2102-29 = "“Isso realmente faz parte do trabalho? Não podemos parar por aqui?”"
2102-30 = "……."
2102-31 = "（Veia saltando）"
2102-33 = "Interior do ginásio com reformas ilegais"
2102-34 = "（BOOM!!）"
2102-35 = "（BOOOOM!!）"
2102-37 = "Estão saindo mais, tem uma quantidade enorme!"
2102-38 = "Sem problemas, vamos subjugar."
2102-39 = "Alguma resposta da Ayane-chan? Ela confirmou que é aqui mesmo?"
2102-40 = "Bem, hum, vou ler a mensagem da Ayane-chan exatamente como está, ok?"
2102-42 = "“Senpai, por favor, esforcem-se um pouco por conta própria.”"
2102-43 = "“Trabalhos de meio período, por natureza, são difíceis.”"
2102-44 = "“Sinto muito por não poder acompanhar, mas conto com vocês até o fim.”"
2102-45 = "……Foi isso que ela mandou, não é meio assustador? Será que ela está brava?"
2102-46 = "Se desistirmos agora, vamos decepcionar a Ayane-chan, não podemos fugir!"
2102-47 = "Vamos nos esforçar! Pela Ayane-chan!"
2102-48 = "Não posso decepcionar a Ayane, vamos terminar isso até o fim."
2102-49 = "……É verdade. Então não há mais dúvidas, atacar!!"
2102-50 = "Uhee~ Isso é amizade, hein? Que caloroso. O brilho da juventude."
2102-51 = "Por isso eu disse que não temos tanta diferença de idade assim!!"
2102-53 = "……Pronto."
2102-54 = "……Agora sim."
2102-55 = "Comprei muitos doces e bebidas também."
2102-56 = "Com isso…… elas vão ficar felizes, né?"
2102-57 = "Mas está demorando... não deveria ser um lugar tão longe..."
2102-58 = "Hmm... será que tinha mais lixo do que eu pensava?"
2102-59 = "Eu deveria ter ido atrás deles mesmo depois..."
2102-60 = "Trim, trim, trim"
2102-61 = "……Telefone?"
2102-63 = "……Alô, aqui é o Comitê de Contramedidas de Abydos. Quem gostaria?"
2102-64 = "……Sim."
2102-65 = "……Sim?"
2102-66 = "……V-vocês ainda não chegaram no ginásio!?"
2102-67 = "I-isso não pode ser... a Hoshino-senpai disse que tinha acabado de chegar..."
2102-68 = "M-multa por quebra de contrato!? E-espere um pouco! Com certeza houve algum engano...!"
2102-69 = "Ué? Alô... alô!?"
2102-70 = "……."
2102-71 = "Hã...?"
2102-72 = "O que foi isso...?"
2102-73 = "Trim, trim, trim"
2102-75 = "……A-alô?"
2102-76 = "Alô, é do Comitê de Contramedidas de Abydos?"
2102-77 = "S-sim. Quem gostaria...?"
2102-78 = "Foi confirmado que as alunas de Abydos entraram em confronto com o nosso grupo esportivo radical, a 'Associação de Recomendação de Ginástica Matinal do Amanhecer'."
2102-79 = "……."
2102-80 = "……Sim?"
2102-81 = "Durante o confronto, o bombardeio de drones do lado de Abydos causou o colapso de todo o ginásio, destruindo todas as instalações e itens internos..."
2102-82 = "Claro que o nosso grupo também tem uma parcela de responsabilidade, então dividiremos os custos, mas..."
2102-83 = "Pretendemos enviar uma solicitação de indenização. Enviaremos os detalhes em breve, por favor, verifique."
2102-84 = "……."
2102-85 = "O quê!? Indenização!? E-espere! Com certeza isso é um erro...!"
2102-86 = "Baque! Estrondo! Clack!!"
2102-87 = "E-espere! Por que tanta pressa...!"
2102-88 = "Eu ainda não estou preparada psicologicamente...!"
2102-89 = "Serika-chan, você conhece aquele ditado 'é mais fácil fazer do que se preocupar'?"
2102-90 = "Ayane-chan, cheguei."
2102-91 = "Chegamos!"
2102-92 = "Nossa, quem diria que era um ginásio diferente, né? A vida é cheia de surpresas."
2102-93 = "……."
2102-94 = "Bem, será que... vocês já receberam a ligação?"
2102-95 = "Uhee... que droga, se eu tivesse falado diretamente talvez desse para inventar uma desculpa, mas acho que não deu tempo, né?"
2102-96 = "E-eita... parece que essa situação é muito pior do que quando vocês estavam enfrentando aquele pessoal da tal 'Amanhecer', não é?"
2102-97 = "Ayane, é que... eu calculei errado a quantidade de explosivos do drone e a coluna acabou quebrando..."
2102-98 = "As senpais fiquem quietas!! Não irritem mais a Ayane-chan!!"
2102-99 = "……."
2102-100 = "A-Ayane-chan! Eu sei que você está brava, e com razão! Primeiro, me desculpa! Mas, é que...!"
2102-101 = "Isso tem um motivo! B-bom, talvez não seja um motivo, mas sinto muito mesmo!"
2102-102 = "Mas, por favor, vamos conversar...!"
2102-104 = "Baque"
2102-105 = "……."
2102-106 = "……!"
2102-107 = "……!"
2102-108 = "……!"
2102-109 = "……."
2102-111 = "……。"
2102-112 = "……A partir de agora,"
2102-113 = "apenas as pessoas chamadas..."
2102-114 = "por favor, permaneçam na sala de aula. ...As outras, podem sair."
2102-115 = "……Gulp."
2102-116 = "……。"
2102-117 = "……Serika-chan,"
2102-118 = "……E-Eu！？！！！？"
2102-119 = "……"
2102-122 = "e todos os outros, exceto ela."
2102-123 = "As pessoas chamadas, por favor, permaneçam."
