[translation]
2102-1 = "呼ばれた人は残ってください（２）"
2102-2 = "……うう。"
2102-3 = "……まだ頭が……熱はだいぶ下がったみたいだけど……。"
2102-5 = "あれ、もうこんな時間……？"
2102-6 = "……はあ。"
2102-7 = "体育館の掃除、終わったかな……。"
2102-8 = "……。"
2102-9 = "……大丈夫だよね？セリカちゃん、先輩たち……。"
2102-10 = "私が見つけてきたバイトなのに、私だけ行けないなんて申し訳なかったけど……。"
2102-11 = "うう……。"
2102-12 = "ダメ、心を鬼にして、アヤネ！たまにはこのくらいしてもらわないと、みんな毎回変なことばかり言って……！"
2102-13 = "すぐに拉致とかピクニックとか、そういうことばっかりで……！"
2102-14 = "だからこれくらい……！"
2102-15 = "……。"
2102-16 = "……はあ。"
2102-17 = "……もう少し良くなったら、教室に何かお菓子でも持って行こう……。"
2102-18 = "せめて気持ちよく出迎えてあげないと。今日はみんな、私の代わりに頑張ってくれてるんだから……。"
2102-19 = "ヴンッ"
2102-20 = "……ん？モモトーク？"
2102-21 = "ホシノ先輩……？"
2102-22 = "……。"
2102-23 = "……？"
2102-24 = "「アヤネちゃん体調大丈夫～？こっちはさっきバイト先に到着したよ。でもちょ～っと問題があってね？」"
2102-25 = "「体育館の状態が想像以上にひどいんだけど、本当にここで合ってるのかな～？って」"
2102-26 = "「入口らへんはもう綺麗に片付けたんだけど、中の方までいっぱいでびっくりだよ～」"
2102-28 = "「おじさんがやるにはあまりにも重労働っていうか」"
2102-29 = "「これ、本当に全部仕事の範疇なのかな～？てきとーなところで切り上げちゃダメ？」"
2102-30 = "……。"
2102-31 = "（ピキッ）"
2102-33 = "違法改築された体育館内部"
2102-34 = "（ドカァァン！！）"
2102-35 = "（ドカァァァアン！！）"
2102-37 = "どんどん出てきます、ものすごい数です！"
2102-38 = "問題ない、制圧する。"
2102-39 = "アヤネちゃんからの返事は？本当にこれで合ってるって？"
2102-40 = "えっと、う～ん、もうアヤネちゃんからのメッセージそのまま読むね～？"
2102-42 = "「先輩、それぐらいは自分で頑張ってください」"
2102-43 = "「アルバイトというのは、元々大変なものです」"
2102-44 = "「同行できずすみませんが、最後までよろしくお願いします」"
2102-45 = "……って来たんだけど、これなんか怖くない？もしかして怒ってない？"
2102-46 = "ここで私たちが諦めたらアヤネちゃんをガッカリさせることになってしまいます、逃げるわけにはいきません！"
2102-47 = "頑張りましょう！アヤネちゃんのために！"
2102-48 = "アヤネを失望させるわけにはいかない、最後までやり遂げる。"
2102-49 = "……そうね。ならもう迷うことは無いわ、突撃！！"
2102-50 = "うへ～これが友情か～、熱いねえ。青春の輝きだな～。"
2102-51 = "だからそんなに歳変わらないでしょうが！！"
2102-53 = "……よっと。"
2102-54 = "……これで良し。"
2102-55 = "お菓子もたくさん買ってきたし、飲み物も十分。"
2102-56 = "これぐらいあれば……喜んでもらえるよね？"
2102-57 = "でも遅いな……そんなに遠いところじゃなかったはずだけど……。"
2102-58 = "うーん……やっぱり思ったよりゴミが多かったのかな……。"
2102-59 = "やっぱり後からでも追いかければ良かっ――"
2102-60 = "プルルルル"
2102-61 = "……電話？"
2102-63 = "……はい、アビドス対策委員会です。どちら様でしょう？"
2102-64 = "……はい。"
2102-65 = "……はい？"
2102-66 = "……ま、まだ体育館に到着してないんですか！？"
2102-67 = "そ、そんなはずは……さっきホシノ先輩が到着したって……。"
2102-68 = "い、違約金ですか！？ま、待ってください！きっと何かの手違いで……！"
2102-69 = "あれ？もしもし……もしもし！？"
2102-70 = "……。"
2102-71 = "えぇ……？"
2102-72 = "これって……？"
2102-73 = "プルルルル"
2102-75 = "……も、もしもし？"
2102-76 = "もしもし、アビドス対策委員会でしょうか？"
2102-77 = "は、はい。どちら様でしょう……？"
2102-78 = "そちらのアビドスの生徒たちが、私たちの街の過激派スポーツ団体「夜明けのラジオ体操推奨会」と交戦していたことが確認されました。"
2102-79 = "……。"
2102-80 = "……はい？"
2102-81 = "交戦中に、アビドス側のドローン爆撃で体育館全体が崩壊し、内外の施設や物品も全て壊れてしまいまして……。"
2102-82 = "もちろんこちらの団体側にもある程度の責任はあるので、按分にはなりますが……。"
2102-83 = "損害賠償請求をさせていただこうかと思います。詳細は後程送りますので、ご確認いただければと。"
2102-84 = "……。"
2102-85 = "はい！？損害賠償！？ま、待ってください！きっと何かの間違いで……！"
2102-86 = "ガタガタッ！ドンッ！ガチャッ！！"
2102-87 = "ま、待って！そんなに急に……！"
2102-88 = "まだ心の準備が……！"
2102-89 = "セリカちゃん、「案ずるより産むが易し」って言葉知ってる～？"
2102-90 = "アヤネちゃんただいま～。"
2102-91 = "ただいまです！"
2102-92 = "いや～まさか別の体育館だったなんて、生きてれば色々あるもんだよね～。"
2102-93 = "……。"
2102-94 = "えっと、もしかして～……もう電話来た？"
2102-95 = "うへ～……参った、直接話せばまだ言い訳もできそうだったけど、ちょ～っと間に合わなかったかな？"
2102-96 = "え、えっと……あの夜明けの何とかという方々と対峙してた時より、この状況の方がよっぽどピンチみたいですね？"
2102-97 = "アヤネ、その……ドローンの爆薬の量を間違えて、柱が壊れて……。"
2102-98 = "もう先輩たちは黙ってて！！これ以上アヤネちゃんを刺激しないで！！"
2102-99 = "……。"
2102-100 = "あ、アヤネちゃん！怒ってるのは分かるけど、っていうか当然のことだけど！まずはごめん！でも、その……！"
2102-101 = "これにはちゃんと理由が……！い、いや、理由になってないかもだけど、ほんとごめん！"
2102-102 = "でもとりあえず話を……！"
2102-104 = "ガタッ"
2102-105 = "……。"
2102-106 = "……っ！"
2102-107 = "……！"
2102-108 = "……！"
2102-109 = "……。"
2102-111 = "……。"
2102-112 = "……今から、"
2102-113 = "呼ばれた人だけ……"
2102-114 = "教室に残ってください。……それ以外は、外へ。"
2102-115 = "……ごくり。"
2102-116 = "……。"
2102-117 = "……セリカちゃん、"
2102-118 = "……わ、私！？！！！？"
2102-119 = "……"
2102-122 = "以外の皆さん、全員です。"
2102-123 = "呼ばれた人は残ってください"
