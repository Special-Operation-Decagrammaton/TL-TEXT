[translation]
1006902-1 = "たくさん召し上がれ！"
1006902-2 = "シャーレ・執務室"
1006902-4 = "――それで、玄武商会から何度もシャーレに依頼するのは……#nちょっとカッコがつかなくてさ。"
1006902-5 = "だから今回は「個人的なお願い」として、先生に手伝ってもらいたくて。"
1006902-6 = "ごめんね、先生。#nお願いする立場なのに、こっちの都合で余計な手間かけさせちゃって。"
1006902-7 = "[s] \"ううん、気にしないで。\""
1006902-9 = "[ns] \"何があったの？\""
1006902-10 = "いつも料理に使ってる調味料の流通経路に不審な点があってね。#nちょっと調べたところ――"
1006902-11 = "――ブラックマーケットに繋がったんだ。"
1006902-12 = "山海経内部の問題なら、あたしだけでも解決できたんだけど……"
1006902-13 = "ブラックマーケットが絡んでる以上……#nシャーレに依頼するのが一番だと思って。"
1006902-14 = "[s1] \"たしかに、1人じゃ危ないし……\"\n[s2] \"相談してくれてありがとう、こういう事は任せて。 \""
1006902-17 = "ありがとう、先生。#nそれと、こっちの都合で悪いんだけど……この件ちょ～っと急いでもらいたくて……"
1006902-18 = "その……予備の調味料が、あと1ヶ月分しかないんだ。"
1006902-27 = "あたしからお願いしておいてこんな事言うのもなんだけど、#n先生、体調大丈夫？ずっと忙しくしてたみたいだから……"
1006902-28 = "面談の時間だって、調整が大変そうだったし……"
1006902-29 = "[s3] \"もっとみんなの力になりたいんだけど……\"\n[s4] \"なかなか、思い通りにはいかないね…… \""
1006902-32 = "あたしに何かできることはないかな？"
1006902-33 = "[s] \"そう言ってもらえるだけで嬉しいよ。 \""
1006902-34 = "そうやって気を遣われるのも、なんだか寂しいなぁ。"
1006902-35 = "先生の力になれたらな、って思ったんだけど……"
1006902-36 = "……先生、お昼は食べた？#nもうこんな時間だし、流石に食べちゃったか。"
1006902-37 = "[s5] \"ゆっくり食べる余裕がなかったから……\"\n[s6] \"その分、夜に食べればいいかなって。 \""
1006902-42 = "……先生、今なんて？"
1006902-43 = "[s7] \"えっと……ルミ、さん？ \"\n[s8] \"き、急にどうしたの……？\""
1006902-46 = "もうっ！"
1006902-47 = "[ruby=いしょくどうげん]医食同源[/ruby]っていうでしょう？ご飯を抜いたらダメなんだからね！#nあたしが先生を健康にしてあげる！！"
1006902-48 = "[s] \"い、いいの……？\""
1006902-49 = "こうしちゃいられない。ご飯作ってくるね！"
1006902-51 = "（そう口にするや否や、ルミは執務室を後にした）"
1006902-55 = "シャーレ・休憩室"
1006902-57 = "[ns] 念のため、ルミについてきた。"
1006902-58 = "どれどれ……玉ねぎは……まだ大丈夫かな。#n芽が出ちゃってるけど、芯を取り除けば使えるね。"
1006902-59 = "先生……このジャガイモって、買った時からこんな色してた？#nちょっと……これは流石に使えないね。"
1006902-60 = "おっ、食パンもあるんだ。カビは生えてないけど、こんなに乾燥してちゃ……#nパン粉にして使おうかな？"
1006902-61 = "どれどれ、冷凍庫には何が入ってるのかな。#nうわぁ……お肉が冷凍焼けしちゃってるね。"
1006902-62 = "それに、醤油と料理酒の賞味期限が切れるって、逆にすごいなぁ……。#nあっ、嫌味じゃなくてね。驚いたっていうか、面白くてさ。"
1006902-63 = "[s9] \"ゆ、許して……。\"\n[s10] \"これが公開処刑……。\""
1006902-66 = "よし、なんとかなりそう。"
1006902-67 = "[s] \"本当！？\""
1006902-68 = "玄武商会[ruby=あなど]を侮っ[/ruby]てもらっちゃ困るよ、先生。#nまあ……たしかに、ちょっと難しそうだけど挑戦してみなくちゃね。"
1006902-69 = "先生は、ゆっくりしててね。#nあたしが腕によりをかけて作るから。"
1006902-79 = "[ns] \"驚いた……。\""
1006902-80 = "どうかな？#n余らせてもしょうがないし、残ってた食材はキレイに使い切ったよ。"
1006902-81 = "おかわりはあるから、たくさん食べてね。"
1006902-86 = "[ns] \"い、いただきます！\""
1006902-91 = "（ルミの料理は……ビックリするほど美味しかった）"
1006902-92 = "（冷蔵庫に残っていた食材で作ったとは、到底思えないほど……）"
1006902-93 = "あはは。#nそんなに美味しそうに食べてもらえると、あたしも作りがいがあるよ。"
1006902-94 = "よくある食材で美味しい料理を作るのが、あたしのポリシーだからね。"
1006902-95 = "どんな料理なら、美味しいと思ってもらえるかを調べててね。#nいつも、どう食材を仕入れたら事業を拡大できるか頭を悩ませてるのさ。"
1006902-96 = "もちろん、料理の味や盛り付け、お店の内装にもこだわって、売上もちゃんと出す。#n問題点があれば改善してさ。"
1006902-97 = "お客さんのためにも、玄武商会のみんなのためにも……お店の経営を回さないとね。"
1006902-98 = "[s] \"ただ……その、ちょっと量が多くないかな？\""
1006902-99 = "なに言ってるの！先生の感じからして、ご飯を抜いたのも一度や二度じゃないでしょ？あたしがいる間は、ちゃんと食べてもらうからね！"
1006902-100 = "何事も、身体が資本なんだから！"
1006902-101 = "遠慮なく食べてね！#nあっ、そうだ、ついでに夜ごはんも作ってあげよっか？"
1006902-102 = "先生、お箸が止まってるけど……ふふっ。#nもしかして、あたしに食べさせてもらいたいの？"
1006902-103 = "[s] \"こ、これ以上は、お腹が……！\""
1006902-105 = "（その後、お腹がはち切れるほどの料理をいただく事になった……）"
