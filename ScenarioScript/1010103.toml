[translation]
1010103-1 = "お祭りの音を探して"
1010103-4 = "先生、こっちだ。"
1010103-5 = "来てくれて感謝する、ありがとう。"
1010103-6 = "[s] \"具体的には何をするの？\""
1010103-7 = "今回のアルバイトでは、DJステージの準備を手伝っている。"
1010103-8 = "しかし、どうやら人手が足りないようでな。"
1010103-9 = "一番重要な「サンプル」が揃ってないんだ。"
1010103-10 = "……ああ、最初にサンプルの説明をしなくては。"
1010103-11 = "DJは、既存の音源をミックスしてパフォーマンスするらしい。"
1010103-12 = "この手法を「サンプリング」と呼ぶのだと、説明を受けた。"
1010103-13 = "だからいくら機材が揃っていたところで、音源が無くては始まらない。"
1010103-14 = "[s] \"いつもはどうやってサンプルを揃えてるんだって？\""
1010103-15 = "作者に使用料を払って、一時的に使っていると聞いた。"
1010103-16 = "「DJの始め方」という本にも、そう書かれていたから間違いない。"
1010103-17 = "しかし、どうやら今回は予算が限られているせいで、難しいそうだ。"
1010103-18 = "となれば、自ら音源を手に入れるしかない。"
1010103-19 = "[s] \"サオリが作曲するってこと？\""
1010103-20 = "そうしたいところだが、今の私には無理だろう。"
1010103-21 = "だが、音を集めに行く程度ならできると思う。"
1010103-22 = "色々なイベントが開催されているお祭りなら、#nサンプルに使えそうな音もあるはず。"
1010103-23 = "要するに、現地調達だ。"
1010103-24 = "[s] \"分かった、一緒に行こうか。\""
1010103-25 = "ありがとう。"
1010103-29 = "では、さっそく向かうとしよう。"
1010103-33 = "……どこから回ったものか。"
1010103-34 = "先生、何か良いアイデアはあるか？"
1010103-35 = "[s] \"まずは屋台のほうとかどう？\""
1010103-36 = "確かに、あれほど賑わっていれば……。"
1010103-37 = "良い音源が[ruby=と]録[/ruby]れるかもしれない。"
1010103-44 = "イカ焼きに焼き鳥、焼きそばもあるよ！"
1010103-45 = "さあ、いらっしゃい！"
1010103-46 = "[s] \"聞いてるだけでよだれが……。\""
1010103-52 = "食べ物を焼く音か……。"
1010103-53 = "これは使えそうだ。"
1010103-57 = "さっそく、収録を――"
1010103-58 = "……先生、どうした？"
1010103-59 = "焼き鳥を買ってくれるのか？"
1010103-60 = "い、いや、大丈夫だ。#nむしろ、ここは先生を付き合わせている私が……。"
1010103-61 = "[s] \"サオリを応援したいんだ。\""
1010103-62 = "……そうか。"
1010103-63 = "何も買わずに録音だけするのも、お店に迷惑だろう。"
1010103-64 = "ありがとう……ここは素直に受け取っておく。#nだが、次は私に支払わせてくれ。"
1010103-68 = "……規則的な波の音、か。"
1010103-69 = "これもサンプルに使えそうだ。"
1010103-73 = "よし、録音機の電源を……。"
1010103-77 = "……距離が遠いからか、うまく録音できないな。"
1010103-78 = "[s] \"私が手伝っても良い？\""
1010103-79 = "うーん……これ以上近づくには、海に入らなくてはいけない。"
1010103-86 = "……なっ、先生！？#nそこまでしてもらっては……。"
1010103-87 = "[s1] \"風もあって気持ち良いね。\"\n[s2] \"私がサオリの力になりたいんだ。\""
1010103-90 = "分かった、先生がそう言うのなら……。"
1010103-91 = "では、これで録音を――"
1010103-95 = "[ns] \"うわっ！\""
1010103-101 = "先生、大丈夫か！？"
1010103-102 = "[s] \"大丈夫、少し足が滑っただけだよ。\""
1010103-103 = "服が濡れてしまったじゃないか。#n早く乾かさなくては風邪を……。"
1010103-104 = "……うん？"
1010103-105 = "録音機は無事だから安心してほしい、と？"
1010103-106 = "先生。こういう状況では、身の安全を最優先にしてくれ。"
1010103-107 = "もし何かあっては、合わせる顔がない。"
1010103-108 = "……だが、感謝はしている。#nありがとう、先生。"
1010103-114 = "今度は森か……。"
1010103-118 = "色々な虫の声が聞こえてくるな。"
1010103-119 = "[s] \"これも使えそう？\""
1010103-120 = "試してみなくては分からないが、素材が多いに越したことはないだろう。"
1010103-124 = "もう少し進んでみよう。"
1010103-131 = "……こうして歩いていると、なんだか妙な気分になるな。"
1010103-132 = "誰かを必死に追いかけることも、追われることもなく、#nゆったりとした時間を過ごせるだなんて。"
1010103-133 = "考えてみれば、今まで一度もこんな余裕のある時間は無かった。"
1010103-134 = "最近は、アルバイトで色々な経験も積めて……。"
1010103-135 = "[s] \"こうやって散歩がしたくなったら、いつでも呼んでね。\""
1010103-139 = "……先生なら、そう言うだろうと思った。"
1010103-140 = "ありがとう、ぜひ頼む。"
1010103-151 = "ふぅ、もうこんなに暗くなってしまったとは。"
1010103-152 = "そろそろ戻る時間だ。"
1010103-153 = "[s] \"いつも頑張ってバイトをしてるサオリは、本当にすごいね。\""
1010103-154 = "……そ、そうだ。#nまだバイトの最中だった。"
1010103-155 = "任務中だというのに、本分を忘れていた。"
1010103-156 = "きっと、気が緩んでいたからに違いない。"
1010103-161 = "なぜなら……。"
1010103-162 = "[s] \"なぜなら……？\""
1010103-166 = "ぎょ、業務上の秘密だ。"
1010103-167 = "と、とにかく早く戻って、録音した音を加工しなくては。"
1010103-168 = "そろそろ帰ろう、先生。"
1010103-174 = "今日は付き合ってくれて助かった。#n……ありがとう。"
