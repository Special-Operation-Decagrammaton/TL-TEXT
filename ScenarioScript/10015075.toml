[translation]
10015075-1 = "Epílogo; Dia da Grande Competição Esportiva"
10015075-7 = "Uuu... uuuu..."
10015075-8 = "Aquele robô não... Não existe uma modalidade de disparar mísseis antitanque na Grande Competição Esportiva..."
10015075-9 = "O carro que alugamos por um preço alto... Os pedidos de indenização das outras escolas..."
10015075-11 = "Se continuar assim, vou falir...!"
10015075-16 = "Hã, o quê? Foi um sonho...?"
10015075-17 = "Ah... que alívio. Foi um pesadelo terrível..."
10015075-18 = "Bem, por mais que estudantes de todo o Kivotos se reúnam aqui, não deve ter nenhuma aluna estranha que sairia disparando mísseis antitanque no local..."
10015075-19 = "Dito isso, por que está tão claro lá fora!?#nQue horas são agora..."
10015075-20 = "7 da manhã!?!?"
10015075-21 = "Ai, ainda tem tanta coisa para preparar...!"
10015075-22 = "Primeiro, preciso trocar de roupa... não, os documentos oficiais urgentes primeiro...!"
10015075-32 = "D-desculpe, Noa!#nEu acabei dormindo...!"
10015075-33 = "Shiu..."
10015075-34 = "...?"
10015075-35 = "Por favor, fale um pouco mais baixo, Yuuka-chan. #nTodos acabaram de pegar no sono."
10015075-36 = "E-eh, entendi..."
10015075-39 = "Hehe... nesta Grande Competição Esportiva também... vou pintar o mundo com várias cores..."
10015075-40 = "Uuu... mesmo que seja um pedido do Sensei... o traje de líder de torcida baseado em roupa de banho é... complicado..."
10015075-41 = "Funya... explicando a história da Grande Competição Esportiva... começou com o festival esportivo realizado pelas alunas da Escola Secundária Odyssey Marine para treinar o físico a bordo do navio..."
10015075-42 = "...bebida energética... preciso de mais bebida energética..."
10015075-44 = "Fufu, todos se esforçaram até tarde, então parece que ficaram exaustos."
10015075-45 = "Pessoal... o que estão fazendo aqui?"
10015075-50 = "Aqui estão a lista de estoque de suprimentos e a lista de inscritos que recebemos das escolas parceiras.#nO pessoal da Veritas ajudou a organizar."
10015075-51 = "A Veritas ajudou com o trabalho do Seminário...?#nO que isso significa?"
10015075-52 = "E a recuperação dos equipamentos roubados e das instalações danificadas também foi concluída..."
10015075-53 = "O robô de torcida... o estado dele não está muito bom, mas espero que entenda essa parte."
10015075-55 = "O acerto e a cobrança das despesas de reparo também já foram feitos...?"
10015075-56 = "Espere, isso era originalmente meu trabalho..."
10015075-57 = "Faa... realmente, estou um pouco cansada."
10015075-58 = "Vou dormir um pouco, então deixo o resto com você."
10015075-60 = "E-espere um pouco, Noa!"
10015075-68 = "[ns] \"Yuuka, conseguiu dormir bem?\""
10015075-69 = "Ah... Sensei [USERNAME]."
10015075-70 = "Sinto muito. Abandonar o que precisava ser feito e acabar dormindo..."
10015075-71 = "Mostrei uma postura irresponsável, me desculpe..."
10015075-72 = "[s1] \"Não é nada disso, não se preocupe.\"\n[s2] \"Não tem problema. Conseguiu descansar?\""
10015075-75 = "Sim. Talvez porque dormi profundamente depois de muito tempo,#nme sinto mais leve do que nunca, mas..."
10015075-76 = "Pensar que, enquanto as outras alunas passavam a noite em claro fazendo meu trabalho...#neu estava dormindo preguiçosamente, meu peito dói de culpa..."
10015075-77 = "Francamente... se iam se esforçar tanto, por que não me acordaram mais cedo...?"
10015075-78 = "Até ficarem tão exaustos assim, pessoal..."
10015075-79 = "[s] \"...Não será porque todos pensam a mesma coisa?\""
10015075-80 = "Hã?"
10015075-81 = "[s3] \"Já que é uma Grande Competição Esportiva.\"\n[s4] \"Eles queriam que a Yuuka, que foi quem mais se esforçou, aproveitasse o festival.\""
10015075-87 = "Mesmo que não precisassem se preocupar tanto comigo, eu..."
10015075-89 = "...não posso dizer isso com certeza."
10015075-94 = "Sim... certamente, se eu estivesse processando toda aquela quantidade de trabalho sozinha...#neu não teria aproveitado o festival e, provavelmente, teria desmaiado de sono logo após a cerimônia de abertura."
10015075-95 = "...Desta vez, fiquei em dívida com todos."
10015075-97 = "Mas ainda não posso ficar tranquila."
10015075-98 = "Acho que vários pequenos incidentes e acidentes ainda podem ocorrer até que a Grande Competição Esportiva termine."
10015075-99 = "Como representante da escola encarregada deste Grande Festival Esportivo, farei o meu melhor para que todos possam se divertir!"
10015075-100 = "[s5] \"Como esperado. Acho uma boa ideia.\"\n[s6] \"Mas não se esforce demais, está bem?\""
10015075-103 = "……Sensei, não é você quem está se esforçando demais?"
10015075-104 = "Dada a situação, você também tem ajudado todo mundo e provavelmente nem dormiu direito……"
10015075-105 = "Por favor, durma um pouco, mesmo que seja só um pouco, antes da cerimônia de abertura começar."
10015075-110 = "É que…… quando eu disse \"todos\" agora há pouco, o Sensei também estava incluído……"
10015075-111 = "Prometa para mim que não vai se sobrecarregar……?"
10015075-123 = "（Depois disso, os preparativos para o Grande Festival Esportivo avançaram sem problemas e a cerimônia de abertura ocorreu conforme o planejado）"
10015075-124 = "（Embora algumas alunas tenham causado confusão ao descobrirem que itens adicionais foram incluídos nas competições com atraso……）"
10015075-130 = "――Em breve, o juramento dos atletas será realizado."
10015075-132 = "Os representantes dos atletas são a aluna \"Okusora Ayane\", da Escola Secundária Abydos, e――"
10015075-139 = "――a aluna \"Urawa Hanako\", da Academia Trinity."
10015075-147 = "（Comparado ao tumulto que aconteceu no Grande Festival Esportivo depois disso, aquele ainda foi um incidente trivial）"
