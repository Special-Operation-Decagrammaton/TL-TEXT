[translation]
10015075-1 = "エピローグ;大運動会当日"
10015075-7 = "うぅ……ううう……"
10015075-8 = "そのロボットはダメ……大運動会に対戦車ミサイルを撃つ種目はないのよ……"
10015075-9 = "高額でレンタルしてきた車が……他校からの被害請求が……"
10015075-11 = "このままいくと破産……！"
10015075-16 = "あ、あれ？夢……？"
10015075-17 = "はぁ……よかった。本当にひどい悪夢だった……"
10015075-18 = "まあ、いくらキヴォトス中から生徒が集まるとはいえ、会場でやたら対戦車ミサイルを撃つような変な生徒はいないだろうし……"
10015075-19 = "というか、なんで外がこんなに明るいの！？#n今の時間は……"
10015075-20 = "午前7時！？！？"
10015075-21 = "まっ、まだ準備がたくさん残ってるのに……！"
10015075-22 = "まず体操着に着替えて……いや、急ぎの公文書から……！"
10015075-32 = "ご、ごめんノア！#n眠っちゃってた……！"
10015075-33 = "しーっ……。"
10015075-34 = "……？"
10015075-35 = "少しだけ声を小さくしてください、ユウカちゃん。#nみんな、ちょうど眠りについたところなんです。"
10015075-36 = "え、えっと……。"
10015075-39 = "へへ……今回の大運動会でも……世界をいろんな色で塗るんだ……"
10015075-40 = "うぅ……いくら先生の頼みでも……水着ベースのチア衣装は……困る……。"
10015075-41 = "ふにゃ……大運動会の歴史について説明しますと……オデュッセイア海洋高等学校の生徒たちが、船上で体力鍛錬のために開催した体育祭が始まりで……"
10015075-42 = "……エナジードリンク……もっとエナジードリンクを……"
10015075-44 = "ふふ、みんな遅くまで頑張ってたので、疲れちゃったみたいですね。"
10015075-45 = "みんな……ここで何を？"
10015075-50 = "こちら、備品の在庫リストと関連校に要請して受け取ったエントリーリストです。#nヴェリタスの皆さんが整理を手伝ってくれました。"
10015075-51 = "ヴェリタスが、セミナーの仕事を手伝ってくれた……？#nどういうこと？"
10015075-52 = "そして盗まれた機材と破損した施設の復旧も完了……"
10015075-53 = "応援ロボットは……状態があまり良くないですが、その部分はご了承いただければと。"
10015075-55 = "修理費用の精算と請求まで、終わってる……？"
10015075-56 = "待って、これは元々私の仕事だったのに――"
10015075-57 = "ふぁあ……流石に少し、疲れました。"
10015075-58 = "ちょっとだけ寝てきますので、あとはお願いしますね。"
10015075-60 = "ちょ、ちょっと待って、ノア！"
10015075-68 = "[ns] \"ユウカ、よく眠れた？\""
10015075-69 = "あ……[USERNAME]先生。"
10015075-70 = "すみません。やるべき事を放り出して、寝ていたなんて……"
10015075-71 = "無責任な姿を見せてしまいました、すみません……。"
10015075-72 = "[s1] \"そんなことないよ、気にしないで。\"\n[s2] \"ううん。疲れは取れた？\""
10015075-75 = "はい。久しぶりにぐっすり寝たからか、#nいつになくスッキリした感じではありますが……"
10015075-76 = "他の生徒たちが徹夜で、私の仕事を代わりにやってくれている間……#n私は怠惰に寝ていたと思うと、罪悪感で胸が痛いですね……。"
10015075-77 = "まったく……ここまで無理するくらいなら、どうして早く私を起こしてくれなかったのかしら……？"
10015075-78 = "こんなに疲れ果てるまで、みんな……"
10015075-79 = "[s] \"……みんな、同じことを考えているからじゃないかな？\""
10015075-80 = "え？"
10015075-81 = "[s3] \"せっかくの大運動会だから。\"\n[s4] \"一番苦労したユウカに、お祭りを楽しんでほしかったんだろうね。\""
10015075-87 = "そんなに気を遣ってもらわなくても、私は……"
10015075-89 = "……とは、言い切れないですね。"
10015075-94 = "はい……たしかに、あの量の仕事を、全部一人で処理していたら……#n私はお祭りを楽しむどころか、開会式が終わったらすぐ寝てしまった事でしょう。"
10015075-95 = "……今回はみんなに借りができましたね。"
10015075-97 = "ですが、まだ安心できません。"
10015075-98 = "大運動会が終わるまで、細かい事件事故は幾つも起こると思いますから。"
10015075-99 = "今回の大運動会を主管する学園の役員として、みんなで楽しめる大運動会になるよう頑張ります！"
10015075-100 = "[s5] \"流石。良いと思う。\"\n[s6] \"でも、あまり無理はしないでね。\""
10015075-103 = "……先生こそ、無理をしていませんか？"
10015075-104 = "状況からして、先生も皆を手伝って、まともに寝てないんじゃ……"
10015075-105 = "ちょっとでもいいですから、開会式が始まる前に先生も寝てください。"
10015075-110 = "その……さっき私が言った「みんな」には、先生も含まれますから……"
10015075-111 = "無理はしないと、約束してくださいね……？"
10015075-123 = "（その後、大運動会の準備は順調に進み、無事開会式を迎えることになった）"
10015075-124 = "（遅れて競技種目に追加項目ができた事を知った一部の生徒たちが、騒ぎを起こしたりもしたが……）"
10015075-130 = "――まもなく、選手宣誓が行われます。"
10015075-132 = "選手代表は、アビドス高等学校の「奥空アヤネ」選手と――"
10015075-139 = "――トリニティ総合学園の「浦和ハナコ」選手です。"
10015075-147 = "（その後大運動会で起きた騒動に比べれば、まだ些細な事件だった）"
