[translation]
901010800360-7 = "Now then, let's summarize what we've discussed so far..."
901010800360-8 = "The Carpaccio Family intentionally rolled oil drums and bought massive amounts of crabs to spread the rumor of the 'Oil Drum Crab'."
901010800360-9 = "The Carpaccio Family was facing a financial burden right before their contract renewal."
901010800360-10 = "It seems the Carpaccio Family is deeply involved in the background of the 'Oil Drum Crab' rumors."
901010800360-11 = "Yes. The Carpaccio Family was using every means necessary to make the rumor more convincing, even at the cost of unnecessary expenses."
901010800360-12 = "And the reason for that is likely because it gives the Carpaccio Family an advantage regarding their interests—specifically, their contract renewal."
901010800360-13 = "Right. While the rumor of being a 'ruthless organization' gives off a negative impression, it can actually be a positive trait for a group of delinquents."
901010800360-14 = "Besides, when choosing bidders for an auction, like the outsourcing at Kanezaki Port, having fewer competitors works in your favor."
901010800360-15 = "No matter how attractive the deal is, people would want to avoid drawing the ire of an organization that uses crabs to abuse others, right?"
901010800360-16 = "And since that isn't actually happening, they don't have to worry about Valkyrie catching on."
901010800360-17 = "[s1] \"That makes sense, but...\"\n[s2] \"What if they just play dumb?\""
901010800360-20 = "True, if they just claim they wanted to throw their money down the drain, we wouldn't be able to press them any further."
901010800360-21 = "Even if we have the evidence, motives are purely subjective, after all..."
901010800360-23 = "On that point, you have nothing to worry about."
901010800360-24 = "For the parts we can't prove with evidence, we can just confirm them directly with the parties involved."
901010800360-25 = "[s] \"Directly...?\""