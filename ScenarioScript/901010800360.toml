[translation]
901010800360-7 = "Então, organizando o que conversamos até agora..."
901010800360-8 = "A Família Carpaccio rolavam tambores de propósito e compravam caranguejos em grande quantidade para espalhar o boato do Caranguejo do Tambor."
901010800360-9 = "A Família Carpaccio estava com problemas financeiros às vésperas da renovação do contrato."
901010800360-10 = "Parece que a Família Carpaccio teve participação ativa na disseminação do boato do \"Caranguejo do Tambor\"."
901010800360-11 = "É. Eles usaram todos os meios possíveis para aumentar o nível de detalhe do boato, inclusive fazendo gastos desnecessários."
901010800360-12 = "E o motivo é que isso poderia beneficiá-los na renovação do contrato, ou seja, nos interesses da família."
901010800360-13 = "É. Dizem que é \"uma organização que trata os funcionários com severidade\", o que pode dar uma impressão negativa, mas para grupos delinquentes isso pode ser até positivo."
901010800360-14 = "E, como no caso da terceirização do Porto Kanezaki, quando a escolha é feita por licitação, quanto menos concorrentes, melhor."
901010800360-15 = "Por mais atraente que seja o negócio, ninguém quer mexer com uma organização que supostamente maltrata pessoas usando caranguejos, não é?"
901010800360-16 = "Além disso, como nada disso realmente acontece, eles não chamam a atenção da Valkyrie."
901010800360-17 = "[s1] \"É, faz sentido, mas...\"\n[s2] \"E se eles negarem tudo?\""
901010800360-20 = "Pois é, se eles disserem que só queriam jogar dinheiro fora, não tem como contestar."
901010800360-21 = "Mesmo com provas, a motivação é subjetiva..."
901010800360-23 = "Fiquem tranquilos quanto a isso."
901010800360-24 = "O que não pode ser provado com evidências, a gente pode confirmar di·re·ta·men·te com os envolvidos."
901010800360-25 = "[s] \"Diretamente...?\""