[translation]#[Texto Final. - Filipe 05/07.]
901010800360-7 = "Então, organizando o que falamos……"
901010800360-8 = "A Família Carpaccio rolavam tambores e compravam caranguejos em massa para espalhar o boato do 'Caranguejo do Tambor'."
901010800360-9 = "A Família Carpaccio estava sob pressão financeira por causa da renovação do contrato."
901010800360-10 = "Parece que a Família Carpaccio teve um papel central no espalhamento do boato."
901010800360-11 = "É. Eles usaram todos os meios para aumentar a credibilidade do boato, mesmo com gastos desnecessários."
901010800360-12 = "E o motivo disso é que a lenda favorece os interesses da Família Carpaccio – especialmente na renovação do contrato."
901010800360-13 = "É. Um boato de 'organização violenta' causa impressão negativa, mas para um grupo de marginais pode ser positivo."
901010800360-14 = "E em licitações, quanto menos concorrentes, melhor."
901010800360-15 = "Por mais atrativo que seja o contrato, ninguém quer se indispor com uma organização que usa caranguejos para ameaçar pessoas."
901010800360-16 = "E como nada disso aconteceu de verdade, a Valkyrie não vai investigar."
901010800360-17 = "[s1] \"Faz sentido, mas……\"\n[s2] \"E se eles negarem tudo?\""
901010800360-20 = "É, se disserem que só queriam gastar dinheiro, não dá pra contestar."
901010800360-21 = "Mesmo com provas, a motivação é subjetiva……"
901010800360-23 = "Quanto a isso, não se preocupe."
901010800360-24 = "O que as provas não podem demonstrar, podemos confirmar DIRETAMENTE com os envolvidos."
901010800360-25 = "[s] \"Diretamente……?\""