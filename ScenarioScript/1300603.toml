[translation]
1300603-1 = "O segredo da pequena diabinha que não pode ser contado"
1300603-2 = "（Convidado por Mutsuki, você vai ao escritório da Problem Solver 68）"
1300603-3 = "Sensei, seja bem-vindo~!"
1300603-4 = "Hoje, eu preparei vá-ri-as♡ coisas para brincar com você!"
1300603-6 = "[s] \"Estão dentro dessa bolsa? É aquela que você carrega sempre, né?\""
1300603-7 = "Isso! Primeiro temos cartas~,"
1300603-8 = "temos xadrez~ temos Othello~ temos gamão~, ah! Também tem karuta!"
1300603-9 = "[s] \"É uma quantidade impressionante de jogos de tabuleiro, não é?\""
1300603-10 = "Sim, preparei tudo para hoje."
1300603-11 = "Brincar lá fora é bom, mas relaxar aqui dentro jogando também é muito divertido, com certeza!"
1300603-12 = "Kufufu, então, Sensei, qual jogo vamos escolher primeiro~?"
1300603-14 = "（Assim, você e Mutsuki passaram o tempo jogando vários jogos de tabuleiro）"
1300603-15 = "（Quando você percebeu, quase 5 horas haviam se passado...）"
1300603-17 = "Fufu, que divertido!"
1300603-18 = "Ah, já é essa hora? O tempo voa quando nos divertimos~."
1300603-19 = "[s] \"Com certeza, isso deve ser a mágica dos jogos de tabuleiro...\""
1300603-20 = "E você, Sensei? Está cansado? Quer descansar um pouco?"
1300603-21 = "Ah, eu fiquei com sede. Espere um pouco, onde será que estão as bebidas~."
1300603-25 = "……Já sei!"
1300603-26 = "Sensei, enquanto eu estiver fora, não tente olhar dentro da minha bolsa, tá?"
1300603-27 = "É um se-gre-do de uma donzela, sabe~."
1300603-28 = "……Promete que não vai olhar, tá bom?"
1300603-31 = "[s] \"A bolsa?\""
1300603-32 = "（Pensando bem, todos os jogos que jogamos até agora saíram daquela bolsa）"
1300603-33 = "（Só os que jogamos até agora já somam uns 20...）"
1300603-34 = "[s1] \"Hmm...?\"\n[s2] \"Isso é... fisicamente possível?\""
1300603-35 = "（Mexida）"
1300603-36 = "（Mexida）"
1300603-39 = "[ns] \"……A bolsa acabou de se mexer?\""
1300603-44 = "[ns] \"Deve ser impressão minha...\""
1300603-46 = "[ns] \"Vou arrumar a mesa antes que a Mutsuki volte...\""
1300603-47 = "（Mexida）"
1300603-50 = "[ns] \"Não é impressão minha...!\""
1300603-51 = "（Mexida, mexida）"
1300603-52 = "[ns] \"Gulp...\""
1300603-54 = "[ns3] \"……Devo dar uma olhadinha?\"\n[ns4] \"A Mutsuki pediu para não olhar, mas...\""
1300603-55 = "（Gulp）"
1300603-58 = "[ns5] \"Vamos ver...\""
1300603-60 = "（……!!!）"
1300603-62 = "（Dentro dela...）"
1300603-63 = "（Senti que, no fim das contas, não é certo verificar as coisas de alguém enquanto o dono está fora）"
1300603-64 = "Sensei?"
1300603-66 = "[ns] \"Ah!!\""
1300603-67 = "Sensei, o que houve? Você está com uma cara de quem viu um fantasma."
1300603-68 = "[s] \"É que, agora há pouco, a bolsa...\""
1300603-69 = "A bolsa? O que tem ela?"
1300603-71 = "[s] \"N-nada. Não é nada...\""
1300603-72 = "Que sem graça. Aqui, trouxe as bebidas."
1300603-73 = "Vamos, vamos, não temos tempo para ficar parados. Ainda temos muitos jogos para aproveitar."
1300603-74 = "Por-tan-to... vamos lá, vamos começar a segunda rodada♥"
1300603-76 = "(Depois disso, nada de especial aconteceu, e passei o resto do dia jogando muitos jogos de tabuleiro com a Mutsuki até anoitecer.)"
1300603-78 = "Kufufu..."
1300603-79 = "Que bom que o Sensei não percebeu o que tinha dentro."
1300603-80 = "Isso é um se-gre-di-nho de uma donzela, sabe?♡"
