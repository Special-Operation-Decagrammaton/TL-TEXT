[translation]
1300603-1 = "人には言えない小悪魔の秘密"
1300603-2 = "（ムツキに招待されて、便利屋の事務所に来た）"
1300603-3 = "先生ようこそ～！"
1300603-4 = "今日は先生と遊ぶために、い・ろ・い・ろ♡たくさん用意したよー！"
1300603-6 = "[s] \"そのかばんの中にあるの？いつも持ち歩いてるやつだね。\""
1300603-7 = "うん！まずはトランプでしょ～、"
1300603-8 = "チェスでしょ～オセロでしょ～バックギャモンでしょ～、あっ！かるたもあるよ！"
1300603-9 = "[s] \"すごい数のボードゲームだね？\""
1300603-10 = "うん、今日のために準備したの。"
1300603-11 = "外で遊ぶのもいいけど、こうやって室内でのんびりゲームするのも楽しいよ、きっと！"
1300603-12 = "くふふっ、さあ先生、最初はどのゲームにする～？"
1300603-14 = "（そうやって、ムツキと二人で色んなボードゲームを遊んだ）"
1300603-15 = "（いつの間にか5時間近くが過ぎた頃……）"
1300603-17 = "ふふっ、おもしろーい！"
1300603-18 = "あ、もうこんな時間？楽しい時間は過ぎるのが早いな～。"
1300603-19 = "[s] \"確かに、これはボードゲームマジック……。\""
1300603-20 = "先生はどう？疲れた？ちょっと休む？"
1300603-21 = "あっ、私、喉乾いちゃった。ちょっと待っててね、飲み物どこだっけな～。"
1300603-25 = "……そうだ！"
1300603-26 = "先生、私がいない間にカバンの中とか見ちゃダメだよ？"
1300603-27 = "乙女の、ひ・み・つ、だからね～。"
1300603-28 = "……絶対に、見ちゃダメだよ？"
1300603-31 = "[s] \"カバン？\""
1300603-32 = "（そういえばこれまで遊んだボードゲーム、全部あのカバンから出てきたけど）"
1300603-33 = "（今まで遊んだのだけでも20個はあったはず……）"
1300603-34 = "[s1] \"ん……？\"\n[s2] \"それって……物理的に、ありえる？\""
1300603-35 = "（ピクッ）"
1300603-36 = "（ピクッ）"
1300603-39 = "[ns] \"……今、カバンがちょっと動いた？\""
1300603-44 = "[ns] \"気のせいだよね……。\""
1300603-46 = "[ns] \"ムツキが帰ってくる前にテーブルを片付けておこう……。\""
1300603-47 = "（ピクッ）"
1300603-50 = "[ns] \"気のせいじゃない……！\""
1300603-51 = "（ピクッ、ピクッ）"
1300603-52 = "[ns] \"ごくり……。\""
1300603-54 = "[ns3] \"……か、確認してみようかな。\"\n[ns4] \"ムツキもああ言ってたし、勝手に中を見るわけには……。\""
1300603-55 = "（ごくっ）"
1300603-58 = "[ns5] \"どれどれ……？\""
1300603-60 = "（……！！！）"
1300603-62 = "（その中には……）"
1300603-63 = "（持ち主が席を外してる間に物を確認するのは、やっぱりイケないことな気がした）"
1300603-64 = "先生？"
1300603-66 = "[ns] \"はっ！！\""
1300603-67 = "先生、どうしたの？お化けでも見たような顔してるけど。"
1300603-68 = "[s] \"その、さっき、カバンが……。\""
1300603-69 = "カバンが？どうかしたの？"
1300603-71 = "[s] \"う、ううん。なんでもない……。\""
1300603-72 = "な～んだ、つまんないの。はい、飲み物持ってきたよ。"
1300603-73 = "ほらほら、ゆっくりしてる時間は無いよ～。まだまだゲームはたくさん残ってるんだしっ。"
1300603-74 = "だ・か・らぁ……ほらっ、2回戦、始めよっか♥"
1300603-76 = "（その後は特に変わったこともなく、夜になるまでムツキとたくさんボードゲームをして遊んだ）"
1300603-78 = "くふふ………。"
1300603-79 = "先生が中身に気づかなくて良かった。"
1300603-80 = "これは、乙女のひ・み・つ♡だからねっ。"
