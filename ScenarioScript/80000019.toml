[translation]
80000019-1 = "イベントアイテム"
80000019-2 = "ゲーム開発部・部室"
80000019-3 = "（ゲーム開発部の部室で、ユズとオンラインRPGゲームをプレイしていた。）"
80000019-10 = "あっ、先生。ボスがそっちに。"
80000019-11 = "もうこちらもボロボロですが、この攻撃さえ耐えられれば勝てるはず……。"
80000019-12 = "攻撃スキルを準備しますので……少しの間、前線はよろしくお願いします！"
80000019-20 = "お疲れ様でした、先生！"
80000019-21 = "先生のおかげで、最高難易度のレイドを無事に終えることができました。"
80000019-22 = "私ひとりではダメだったので……手伝っていただいて本当にありがとうございます！"
80000019-23 = "[s] \"ほとんどはユズが頑張ってくれたおかげだよ。\""
80000019-24 = "そ、そんなことないです。私が無事にボスを攻略できたのは、先生がずっとバフをかけてくださったおかげですよ。"
80000019-25 = "それにこのゲームのボスレイドは、システム上ひとりでは参加が不可能ですし……。"
80000019-26 = "まずは、レイドの戦利品を一緒に分けましょうか。"
80000019-28 = "この剣はもう持ってるし、この鎧も私のより低いレベル……。"
80000019-29 = "今日の戦利品は、全部先生にお渡ししても大丈夫そうです。"
80000019-30 = "[s] \"本当に良いの？\""
80000019-31 = "はい、欲しかった物は別にあるので。"
80000019-35 = "そ、それで、あの……。"
80000019-36 = "せ、先生、このアイテムも受け取っていただけませんか？"
80000019-38 = "[s] \"……これは？\""
80000019-39 = "今回のバレンタインデーイベント期間中にしか手に入らない、特別なチョコレートのアイテムです。"
80000019-40 = "単なる体力回復用アイテムですが……でも、先生にこうして、チョコレートをプレゼントしたくて……。"
80000019-41 = "も、もちろん本物のチョコをプレゼントできたらよかったんですが……どうしてもその、外の人混みの中で買いに行く勇気が……。"
80000019-42 = "実際には食べられない、ゲーム上のチョコレートですけど……"
80000019-43 = "だ、大事にしてくださると、嬉しいです。"
80000019-45 = "（ユズからもらったチョコレートアイテムは、ゲーム内のインベントリに大事に保管しておいた。）"
