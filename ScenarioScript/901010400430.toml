[translation]#[Texto Final. - Filipe 05/07.]
901010400430-7 = "Organizando aqui as informações sobre a captura e o preço do caranguejo que ouvimos no porto……"
901010400430-8 = "Nas lojas de varejo, o preço do caranguejo não mudou muito, mas parece que na origem a captura aumentou e o preço no atacado caiu bastante."
901010400430-9 = "Teve pescador que disse estar pensando em reduzir o número de saídas pro mar."
901010400430-10 = "Como assim? Não tô entendendo direito……"
901010400430-11 = "Se o preço do caranguejo caiu, não era pra vender o máximo possível e lucrar mais?"
901010400430-12 = "FOX3, você não entende nada mesmo, hein."
901010400430-16 = "Produto do mar perde frescor rapidinho. E a demanda não aumenta do nada.#nPor isso, se a quantidade aumenta, acaba dando prejuízo."
901010400430-17 = "Baixar o preço sem critério também não adianta, porque o valor unitário despenca e fica inviável."
901010400430-18 = "Ah, é? Você é bem sabichona, hein."
901010400430-20 = "Ou seja: os pescadores estão sofrendo com a variação do preço do caranguejo."
901010400430-21 = "E com o boato do 'Caranguejo do Tambor' se espalhando junto com isso, o povo vai evitar caranguejo mais ainda."
901010400430-22 = "Mas, falando nisso, pra que espalhar um boato desses?#nQue relação tem com o preço do caranguejo?"
901010400430-30 = "Mas, falando nisso, pra que espalhar um boato desses? Que relação tem com o preço do caranguejo?\n[as1] Provavelmente é alguém que lucra com a queda do preço.\n[as2] Provavelmente é alguém que lucra com a subida do preço.\n[as3] Deve ser alguém que não tem nada a ver com o preço."
901010400430-31 = "Você não falou isso antes também?#nQue podia ser um comerciante querendo comprar caranguejo mais barato."
901010400430-32 = "Claro, se o custo baixar, o lucro na diferença aumenta……"
901010400430-33 = "Mas com esse boato, não é o preço que cai, é a DEMANDA que diminui.#nNo longo prazo, é prejuízo."
901010400430-34 = "Além disso, se os pescadores já estão pensando em reduzir as saídas, o preço não deve cair mais do que isso."
901010400430-35 = "Hmm…… será?"
901010400430-36 = "Sensei, você realmente acha isso?"
901010400430-43 = "Não, mas se o preço pode cair por causa desse boato, como é que chega nessa conclusão?"
901010400430-44 = "Sensei…… será que você tava dormindo quando a gente tava conversando?"
901010400430-45 = "Pensa com mais cuidado."
901010400430-55 = "Alguém que não tem nada a ver com o preço……? Por quê?"
901010400430-56 = "……Eu concordo."
901010400430-57 = "Se o preço do atacado do caranguejo está caindo continuamente, e alguém espalha um boato ruim sabendo do risco de afetar a demanda――"
901010400430-58 = "isso significa que o culpado não tem interesse no preço do caranguejo. É provavelmente um terceiro."
901010400430-59 = "Cada vez mais misterioso. Espalhar um boato ruim sobre caranguejo sem ganhar nada com isso…… que doideira."
901010400430-60 = "……Será que quem começou a história tinha alergia?"
901010400430-61 = "Teve uma experiência ruim com comida de caranguejo no passado e passou a odiar a indústria inteira."
901010400430-62 = "Isso já é forçar demais a barra, não?"