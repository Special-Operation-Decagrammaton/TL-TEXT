[translation]
901010400430-7 = "Resumindo o que ouvimos no porto sobre a captura e o preço do caranguejo..."
901010400430-8 = "O preço no varejo não mudou muito, mas no atacado, com o aumento da captura, caiu bastante."
901010400430-9 = "Alguns pescadores estão pensando em reduzir a frequência das pescarias."
901010400430-10 = "Como assim? Não estou entendendo."
901010400430-11 = "Se o preço caiu, não deviam pescar mais para aumentar o lucro?"
901010400430-12 = "Você não entende nada, FOX3."
901010400430-16 = "Pescado perde o frescor rápido, e a demanda não aumenta de repente. Então, se a oferta aumenta, o preço cai e eles têm prejuízo."
901010400430-17 = "Se baixarem o preço, a receita unitária cai, então não compensa."
901010400430-18 = "Hmm, você sabia disso."
901010400430-20 = "Ou seja, os pescadores estão sofrendo com a variação de preço do caranguejo."
901010400430-21 = "Juntando isso ao boato do \"Caranguejo do Tambor\", as pessoas vão evitar ainda mais o caranguejo."
901010400430-22 = "Aliás, qual a vantagem de espalhar esse boato? Qual a relação com o preço do caranguejo?"
901010400430-30 = "Aliás, qual a vantagem de espalhar esse boato? Qual a relação com o preço do caranguejo?\n[as1] Quem lucraria com a queda de preço.\n[as2] Quem lucraria com a subida de preço.\n[as3] Alguém sem relação com o preço."
901010400430-31 = "Você não disse isso antes? Que poderia ser comerciante querendo comprar barato."
901010400430-32 = "Se o custo cai, o lucro na diferença aumenta... mas isso..."
901010400430-33 = "O boato está diminuindo não só o preço, mas a demanda. No longo prazo, é prejuízo."
901010400430-34 = "E se estão reduzindo a frequência das pescarias, significa que o preço não vai cair mais."
901010400430-35 = "Hmm... tem certeza?"
901010400430-36 = "O senhor realmente pensa assim, Sensei?"
901010400430-43 = "Não, mas com esse boato, o preço pode cair ainda mais. Como chegou a essa conclusão?"
901010400430-44 = "Sensei... o senhor estava dormindo enquanto a gente conversava?"
901010400430-45 = "Pense com mais cuidado."
901010400430-55 = "Alguém sem relação com o preço?"
901010400430-56 = "... Concordo."
901010400430-57 = "Com o preço do caranguejo em queda contínua, espalhar um boato ruim sabendo do risco de afetar a demanda significa –"
901010400430-58 = "O criminoso não tem relação com o preço do caranguejo. Provavelmente é um terceiro."
901010400430-59 = "Que mistério. Alguém que não ganha nada com isso espalhando boato ruim sobre caranguejo."
901010400430-60 = "... Quem espalhou o boato deve ter alergia."
901010400430-61 = "Teve alguma experiência ruim com comida de caranguejo e agora quer prejudicar o setor."
901010400430-62 = "Isso é muito forçado."