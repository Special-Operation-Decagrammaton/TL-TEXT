[translation]
10018065-2 = "うっ、くそ……！"
10018065-7 = "ふう、ちょっと大変だったね！"
10018065-8 = "なるほど……"
10018065-9 = "思っていたよりも、ニャオフードにとってスズメ亭の問題は深刻なんですね。"
10018065-14 = "なぜそう思った？"
10018065-15 = "[s] \"そうでもなければ、店一つにここまで執着する必要はないからね。\""
10018065-19 = "……否定はしない。スズメ亭が鍵を握っているのは間違いないからな。"
10018065-20 = "鍵……ですか？"
10018065-21 = "ニャオフードの傘下に入りたくないという人たちは、まだまだいる。"
10018065-22 = "そいつらが抵抗を続けているのには、スズメ亭の存在が大きい。"
10018065-23 = "え？女将さんは自分のお店を守りたいだけなのに？"
10018065-24 = "女将がどう思っているのかは知らないが、スズメ亭が頑張っているうちは負けてられないと考えている店は多い。"
10018065-25 = "それが女将の意図したものかは別として、ただ事実としてそこにあるんだ。"
10018065-26 = "結果として、ニャオフードの傘下には入らないという店が残る一因となっている。"
10018065-27 = "会長は……派手な演出が好きでね。"
10018065-28 = "だから今は、どうすれば話題になるか考えながら、スズメ亭を潰す計画を進めているところだ。"
10018065-29 = "まだ逆らっているやつらがどうなるか、スズメ亭をその見せしめとしてね。"
10018065-30 = "[s] \"そのやり方が正しいと思ってるの？\""
10018065-31 = "……他に選択肢はない。"
10018065-33 = "だったらどうしてそんな人に従ってるの？"
10018065-35 = "私たちにも生活があるんだ。"
10018065-36 = "[s] \"……なるほど。\""
10018065-37 = "どれだけの人間がニャオフードで働いていると思う？"
10018065-38 = "食材を集めて加工し――それをお店に並べるまでの一連の作業には、とにかく人手が必要になる。"
10018065-39 = "その仕事をあなたたちグルメヘルメット団に取り計らったということですね。"
10018065-40 = "そうだ。私たちも好きでこんなことをしてるわけじゃない。"
10018065-41 = "それはグルメヘルメット団だけじゃない。この商店街の人たちも一緒だ。"
10018065-43 = "ニャオフードの傘下に入ることが、何も悪いわけじゃない。#nむしろ、それがプラスにつながる人もいるんだ。"
10018065-49 = "でも……それが嫌な人たちはどうするのでしょうか？"
10018065-50 = "そこまでは関係ない。私は上の指示に従っているだけだからな。"
10018065-51 = "[s] \"話し合いで解決できないかな？\""
10018065-52 = "……それは分からない。どうしてもと言うのなら、直接本人を訪ねることだな。"
10018065-53 = "まぁ、本社の場所が分かるならの話だけどな！"
10018065-60 = "あ、会社のホームページが出てきましたね。"
10018065-61 = "「今日もニャオフードは安価でおいしい食べ物を提供するために、常日頃から社員一同笑顔で働いております。」"
10018065-65 = "……あ、会社概要のところに住所が書いてあるよ！"
10018065-70 = "好きにするんだな！"
10018065-75 = "あ、逃げたよ！"
10018065-76 = "なんとなく全体像がつかめましたね★"
10018065-81 = "私たちも動いてみましょうか？"
