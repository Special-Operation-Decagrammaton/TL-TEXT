[translation]
10018065-2 = "Ugh, droga...!"
10018065-7 = "Ufa, foi um pouco difícil, não foi!"
10018065-8 = "Entendo..."
10018065-9 = "O problema do Restaurante Suzume é mais sério para a Nyaofood do que eu pensava."
10018065-14 = "Por que você acha isso?"
10018065-15 = "[s] \"Se não fosse, não precisariam ficar tão obcecados com um único restaurante.\""
10018065-19 = "……Não vou negar. Não há dúvidas de que o Restaurante Suzume é a chave de tudo."
10018065-20 = "A chave... você diz?"
10018065-21 = "Ainda existem muitas pessoas que não querem se submeter à Nyaofood."
10018065-22 = "A existência do Restaurante Suzume é um fator importante para que eles continuem resistindo."
10018065-23 = "Hã? Mas a dona do restaurante só quer proteger o próprio estabelecimento, não é?"
10018065-24 = "Não sei o que a dona pensa, mas muitos outros estabelecimentos pensam que, enquanto o Suzume estiver resistindo, eles também não podem perder."
10018065-25 = "Independente de ser essa a intenção dela ou não, é um fato que a situação é essa."
10018065-26 = "Como resultado, isso se tornou um dos motivos pelos quais ainda existem lojas que não se juntaram à Nyaofood."
10018065-27 = "O presidente... gosta de encenações chamativas."
10018065-28 = "Por isso, agora ele está planejando destruir o Restaurante Suzume enquanto pensa em como fazer disso um assunto popular."
10018065-29 = "Ele quer usar o Suzume como um exemplo do que acontece com aqueles que ainda se opõem a ele."
10018065-30 = "[s] \"Você acha que esse método é o correto?\""
10018065-31 = "……Não temos outras opções."
10018065-33 = "Então por que você segue uma pessoa assim?"
10018065-35 = "Nós também temos nossas vidas para sustentar."
10018065-36 = "[s] \"……Entendo.\""
10018065-37 = "Quantas pessoas você acha que trabalham na Nyaofood?"
10018065-38 = "Coletar ingredientes, processá-los e colocá-los nas lojas... toda essa série de tarefas exige muita mão de obra."
10018065-39 = "Então, eles arranjaram esse trabalho para vocês do Grupo Gourmet Capacete, é isso?"
10018065-40 = "Exato. Nós também não fazemos isso porque queremos."
10018065-41 = "E não é só o Grupo Gourmet Capacete. As pessoas deste distrito comercial também estão na mesma situação."
10018065-43 = "Não é que entrar para a Nyaofood seja algo ruim. #nNa verdade, para algumas pessoas, isso até traz benefícios."
10018065-49 = "Mas... e quanto às pessoas que não querem isso?"
10018065-50 = "Isso não é problema meu. Eu só estou seguindo as ordens dos meus superiores."
10018065-51 = "[s] \"Será que não dá para resolver isso conversando?\""
10018065-52 = "……Não sei dizer. Se você faz tanta questão, deveria procurar o próprio responsável."
10018065-53 = "Bem, isso se você conseguir descobrir onde fica a sede, é claro!"
10018065-60 = "Ah, o site da empresa apareceu aqui."
10018065-61 = "\"Hoje, a Nyaofood continua trabalhando com um sorriso no rosto para oferecer alimentos saborosos a preços acessíveis.\""
10018065-65 = "……Ah, o endereço está escrito na seção de perfil da empresa!"
10018065-70 = "Façam o que quiserem!"
10018065-75 = "Ah, ele fugiu!"
10018065-76 = "Conseguimos ter uma visão geral da situação, não é?★"
10018065-81 = "Devemos agir também?"
