[translation]
2402-1 = "Vamos gravar um vídeo de apresentação do Clube de Treinamento! (2)"
2402-2 = "Hum, testando, testando, câmera..."
2402-3 = "Aproveitando, testando o microfone também! Estão me vendo e me ouvindo bem?"
2402-4 = "Certo, parece que está OK! Então, vamos começar a apresentação!"
2402-7 = "Este é o Rio do Panda Vermelho em Hyakkiyako, onde o Clube de Treinamento costuma realizar suas atividades!"
2402-8 = "O motivo de termos vindo aqui não é outro senão..."
2402-9 = "Apresentar as atividades da nossa senpai, Tsubaki, a presidente do Clube de Treinamento!"
2402-10 = "Ela costuma treinar aqui, mas... ah, falando nela, olha só!"
2402-13 = "Zzz, zzz..."
2402-15 = "Deixem-me apresentá-la!"
2402-16 = "Esta é a Kasuga Tsubaki-senpai! Uma aluna do segundo ano da Academia Hyakkiyako, de 16 anos! Ela é a presidente do Clube de Treinamento e é chamada por muitos de 'Bela Adormecida'!"
2402-17 = "Se vocês querem saber o quão incrível a Tsubaki-senpai é..."
2402-18 = "Hm?"
2402-20 = "Ah, tem um gato perto da Tsubaki-senpai..."
2402-22 = "Veio mais um!?"
2402-24 = "Ah, de algum lugar veio até um cachorro... espera, um coelho, um pombo e um cervo também!?"
2402-25 = "Por que eles continuam aparecendo!?"
2402-26 = "Entendi. Com certeza todos eles foram cativados pelo belo sono da Tsubaki-senpai!"
2402-27 = "Zzz, zzz..."
2402-28 = "Mesmo com tantos animais reunidos, a Tsubaki-senpai continua dormindo sem se mexer nem um pouco...!"
2402-29 = "Essa postura inabalável, não importa a situação, é digna de uma verdadeira dama!"
2402-30 = "Muito bem, eu não posso ficar para trás!"
2402-31 = "Como o mascote fofo do Clube de Treinamento que sonha em ser uma dama maravilhosa, vou seguir o exemplo da Tsubaki-senpai e treinar...!"
2402-32 = "Então, com licença..."
2402-38 = "Entendi..."
2402-39 = "É esta a vista que a Tsubaki-senpai vê..."
2402-40 = "Dormindo assim, com certeza deve haver algum efeito incrível."
2402-41 = "Ainda não entendo, mas fazendo isso, com certeza me tornarei uma dama maravilhosa...!"
2402-42 = "Então, vou começar a dormir de verdade como a Tsubaki-senpai..."
2402-44 = "..."
2402-47 = "Hya!? Ei, isso faz cócegas!"
2402-48 = "Espere, não me lamba tanto! Assim não vou conseguir dormir!"
2402-49 = "Ah, chega!"
2402-51 = "Francamente!"
2402-52 = "Olha, se é para lamber, a Tsubaki-senpai está bem ali, então vá nela!"
2402-56 = "Hmm...?"
2402-57 = "Certo, foi um bom treino! Então, vamos para a próxima!"
2402-61 = "Hmm, hmmm...?"
2402-63 = "A próxima a ser apresentada é a vice-presidente do nosso Clube de Treinamento,"
2402-64 = "o exemplo de uma dama bela aos olhos de todos, Mimori-senpai!"
2402-65 = "A esta hora, a Mimori-senpai deveria estar preparando o jantar, mas..."
2402-66 = "Ora, Kaede-chan. Aconteceu alguma coisa?"
2402-67 = "Ah, Mimori-senpai!"
2402-68 = "Isso é... uma câmera?"
2402-69 = "Sim! Estou gravando o dia a dia do Clube de Treinamento!"
2402-70 = "O dia a dia do Clube de Treinamento...?"
2402-71 = "Não entendo muito bem, mas isso também faz parte do treinamento para você, Kaede-chan?"
2402-72 = "Isso! Com isso, vou me tornar uma dama maravilhosa e derrotar o Yin-Yang Club!"
2402-73 = "Hum, entendo...?"
2402-74 = "De qualquer forma, estou torcendo por você. Aliás, o jantar de hoje é curry."
2402-75 = "Por favor, volte para a sala do clube a tempo para o jantar, está bem?"
2402-76 = "Sim, entendi! Mal posso esperar pelo curry!"
2402-78 = "Viu só? A Mimori-senpai é a vice-presidente do Clube de Treinamento e cuida de tudo para nós, começando pelas nossas refeições!"
2402-79 = "O sonho da Mimori-senpai é se tornar uma 'Yamato Nadeshiko' maravilhosa e uma 'esposa perfeita'! É um sonho um pouco diferente do meu, mas ela treina muito para isso!"
2402-80 = "A Mimori-senpai também é uma dama tão maravilhosa quanto a Tsubaki-senpai..."
2402-81 = "Eu não posso ficar para trás. Para me tornar como a Mimori-senpai, eu também preciso fazer o mesmo treinamento que ela...!"
2402-82 = "...Ah! Tive uma ideia!"
2402-85 = "O curry que a Mimori-senpai está fazendo tem um cheiro tão bom!"
2402-86 = "Vou provar só um pouquinho... nham."
2402-88 = "Ah! Está muito gostoso!"
2402-89 = "Mas, se eu apenas comer a comida que a Mimori-senpai faz, nunca vou conseguir ser como ela...!"
2402-90 = "Então, pessoal que está assistindo, prestem atenção!"
2402-91 = "Para me tornar como a Mimori-senpai... eu vou dar um toque especial neste curry e deixá-lo ainda mais delicioso!"
2402-92 = "Já está uma delícia, mas se eu conseguir deixá-lo ainda melhor com o meu esforço...!"
2402-94 = "Kaede-chan, isso é incrível! Ficou ainda mais saboroso do que quando eu faço sozinha!"
2402-95 = "Que incrível~. Kaede, quero repetir."
2402-97 = "Hehe, hehehehe...!"
2402-98 = "Sim, é verdade... está gostoso, mas sinto que falta um pouco de doçura!"
2402-99 = "Então, vou colocar um pouco de açúcar..."
2402-103 = "Ué, a tampa!? Caiu uma quantidade enorme!?"
2402-104 = "O-o que eu faço...!"
2402-105 = "Ah!"
2402-106 = "Para neutralizar o doce... sal!"
2402-107 = "Nos jogos de cartas, o dano é calculado subtraindo um pelo outro, não é?"
2402-108 = "Vou colocar só um pouquinho de sal...!"
2402-110 = "Sim! Pronto, ok!"
2402-111 = "Com isso, completei o treinamento seguindo o exemplo da Mimori-senpai!"
2402-113 = "E assim, o vídeo de apresentação ficou pronto! Sensei!"
2402-114 = "Aqui está tudo o que o Clube de Treinamento tem a oferecer!"
2402-115 = "[s] \"Sério...?\""
2402-116 = "Se a gente enviar isso, a vitória no concurso é garantida! Talvez até fique famoso em todo o Kivotos... e minha popularidade como uma dama maravilhosa dispare de uma vez!?"
2402-117 = "Ah, isso significa que, se eu publicar isso, minha popularidade vai subir rápido e..."
2402-118 = "E se um número enorme de pessoas quiser entrar para o clube, o que eu faço!?"
2402-119 = "Hmm...! Mas não tem jeito, né! Sim, eu só preciso me tornar uma 'senpai' maravilhosa que lidera as novatas! Hehe!"
2402-120 = "[s1] \"Ser otimista é bom, mas...\"\n[s2] \"Talvez seja bom olhar para trás de vez em quando.\""
2402-121 = "Hã, para trás? Por quê?"
2402-122 = "Hã, para trás? Por quê?"
2402-125 = "Gatos... cachorros... o inferno das lambidas..."
2402-127 = "Kaede...?"
2402-130 = "Foi você quem mexeu no curry que estava na cozinha do clube, não foi, Kaede-chan?"
2402-132 = "Sente-se aqui. Desta vez, estou falando sério."
2402-133 = "A Tsubaki-senpai e a Mimori-senpai estão com cara de quem está realmente brava!?"
2402-134 = "D-desse jeito, o 'Inferno da Bronca Demoníaca: Curso Completo de 5 Horas' é inevitável!"
2402-135 = "Aiii! Sensei, me ajuda!"
2402-136 = "[s] \"Você que procurou por isso.\""
2402-138 = "Uaaaaaahhh!!"
2402-140 = "(O inferno da bronca das veteranas do Clube de Treinamento continuou por um bom tempo depois disso...)"
2402-141 = "Vamos gravar o vídeo de apresentação do Clube de Treinamento!"
