[translation]
2402-1 = "修行部の紹介動画を撮ろう！（２）"
2402-2 = "えっと、カメラのテストテストっと……。"
2402-3 = "ついでにマイクもテスト～！ちゃんと見えてる聞こえてる～？"
2402-4 = "うん、OKっぽい！それじゃ、紹介を始めるね！"
2402-7 = "ここは修行部がよく活動してる、百鬼夜行の[ruby=レッサーパンダ]小熊猫[/ruby]川！"
2402-8 = "ここに来た理由は他でもない……"
2402-9 = "私たち修行部の部長、ツバキ先輩の活動を紹介するため！"
2402-10 = "よくここで修行してるんだけど……あっ、言ってるそばから発見！"
2402-13 = "すぅ、すぅ……。"
2402-15 = "紹介しよう！"
2402-16 = "こちらは[ruby=かすが]春日[/ruby]ツバキ先輩！百鬼夜行連合学院の2年生で16歳！修行部の部長を務める、人呼んで「眠り姫」！"
2402-17 = "ツバキ先輩がどれぐらいすごいかっていうと……"
2402-18 = "ん？"
2402-20 = "あっ、ツバキ先輩のそばに猫が……。"
2402-22 = "もう一匹来た！？"
2402-24 = "あ、どっかから犬まで……って、ウサギに、鳩に、鹿も！？"
2402-25 = "なんかどんどん増え続けてる！？"
2402-26 = "なるほど。きっとみんな、ツバキ先輩の美しい寝姿に魅了されたに違いない！"
2402-27 = "すぅ、すぅ……。"
2402-28 = "これだけの動物が集まってるのに、全く微動だにせず眠り続けるツバキ先輩……！"
2402-29 = "このいついかなる時も揺るがない姿、まさに素敵なレディそのもの！"
2402-30 = "よーし、私も負けてられない！"
2402-31 = "素敵なレディーを夢見る、修行部の可愛いマスコットとして！ツバキ先輩を見習って修行を……！"
2402-32 = "ではでは、ちょっと失礼しま～す。"
2402-38 = "なるほど……。"
2402-39 = "これが、ツバキ先輩が見ている景色……。"
2402-40 = "こうして眠ることで、きっと、何かすごい効果があるに違いない。"
2402-41 = "まだ私には分からないけど、これをすることできっと素敵なレディーに……！"
2402-42 = "それじゃあ、私も本格的にツバキ先輩みたいに眠って……"
2402-44 = "……"
2402-47 = "ひゃっ！？ちょっ、くすぐったいってば～！"
2402-48 = "待っ、そんなに舐めないで～！眠れないでしょ～！？"
2402-49 = "んっ、あぁもうっ！"
2402-51 = "全くも～！"
2402-52 = "ほら、爪の垢的な意味でも、舐めるならこっちにツバキ先輩がいるから！"
2402-56 = "んん……？"
2402-57 = "うん、良い修行だった！じゃあ次行こー！"
2402-61 = "ん、んん～……？"
2402-63 = "じゃあ次に紹介するのは、私たち修行部の副部長であり、"
2402-64 = "誰から見ても美しいレディーのお手本、ミモリ先輩だよ！"
2402-65 = "この時間ならいつも、ミモリ先輩は夕食を作ってるはずだけど……"
2402-66 = "あらっ、カエデちゃん。どうかしましたか？"
2402-67 = "あ、ミモリ先輩！"
2402-68 = "それ、カメラ……ですか？"
2402-69 = "うん！修行部のいつもの姿を撮ってるの！"
2402-70 = "修行部の日常を……？"
2402-71 = "よく分かりませんが、これもカエデちゃんにとっては修行の一環なんですね？"
2402-72 = "そう！これで素敵なレディーになって、陰陽部を倒すの！"
2402-73 = "えっと、なるほど……？"
2402-74 = "とにかく、応援してますね。ちなみに今日の夕飯はカレーですよ。"
2402-75 = "夕方には間に合うように、部室に帰ってきてくださいね？"
2402-76 = "うん、分かった！カレー楽しみ！"
2402-78 = "見た見た？ミモリ先輩は修行部の副部長で、私たちの食事を始めとして、色んな面倒を見てくれてるの！"
2402-79 = "そんなミモリ先輩の夢は「素敵な大和撫子」、そして「綺麗なお嫁さん」になること！私と似てるようでまた違った夢なんだけど、そのために修行してるんだって！"
2402-80 = "ミモリ先輩もまた、ツバキ先輩に負けないぐらい素敵なレディー……。"
2402-81 = "私も負けていられない。ミモリ先輩みたいになるために、ミモリ先輩と同じ修行もやらないと……！"
2402-82 = "……あっ！良いこと思いついた！"
2402-85 = "ミモリ先輩が作ってるカレー、良い匂い！"
2402-86 = "ちょっとだけ味見を……ぺろっ。"
2402-88 = "っ！すごく美味しい！"
2402-89 = "でも、ミモリ先輩が作ってくれた料理を食べてるだけじゃ、先輩みたいにはなれない……！"
2402-90 = "だから、画面の前のみんな！よく見てて！"
2402-91 = "ミモリ先輩みたいになるために……私はここから、さらにカレーにアレンジを加えて美味しくしてみせる！"
2402-92 = "今のままでもすっごく美味しいけど、私の力でもっと美味しくできたら……！"
2402-94 = "カエデちゃん、すごいです！私だけで作った時より、さらに美味しくなりました！"
2402-95 = "すごいね～。カエデ、おかわりー。"
2402-97 = "えへっ、えへへへっ……！"
2402-98 = "うん、そうだなー……美味しいけど、ちょっとだけ甘さが足りないような気がする！"
2402-99 = "じゃあ砂糖を少し入れて……"
2402-103 = "うわわっ、蓋が！？すんごい量入っちゃった！？"
2402-104 = "ど、どうしよう……！"
2402-105 = "あっ！"
2402-106 = "甘さを中和するためには……塩！"
2402-107 = "カードゲームでも、ダメージはこうやって相殺されて計算されるもの！"
2402-108 = "ちょっとだけ塩を入れて……！"
2402-110 = "うん！よし、OK！"
2402-111 = "これでミモリ先輩を見習った修行もできた！"
2402-113 = "っていう感じで、紹介動画が完成したよ！先生！"
2402-114 = "ここに、修行部の全てが詰まってる！"
2402-115 = "[s] \"本当に……？\""
2402-116 = "これを出せばコンテストでの優勝も確実！もしかしたらキヴォトス中に知れ渡って……素敵なレディーとして一気に知名度がすごいことに！？"
2402-117 = "あっ、ってことはこれを公開したら、人気が急上昇しちゃって……"
2402-118 = "それで、すんごい数の入部希望者が殺到したらどうしよう！？"
2402-119 = "うーん……！でもそれは仕方ないね！うん、後輩たちを率いる素敵な「先輩」のレディーになるしかない！えへっ！"
2402-120 = "[s1] \"前向きなのは良いんだけど……。\"\n[s2] \"たまには後ろも見た方が良いかも。\""
2402-121 = "え、後ろ？何で？"
2402-122 = "え、後ろ？何で？"
2402-125 = "猫……犬……ペロペロ地獄……。"
2402-127 = "カエデ～……？"
2402-130 = "部室のキッチンにあったカレーに手を加えたの、カエデちゃんですよね？"
2402-132 = "ここに座ってください。私、今回はちょっと本気で怒ってますからね。"
2402-133 = "つ、ツバキ先輩とミモリ先輩が、本当に怒った時の顔してる！？"
2402-134 = "こ、このままだと「鬼の説教地獄〜5時間のフルコース〜」待ったなし！"
2402-135 = "ひぃんっ！先生助けて～！"
2402-136 = "[s] \"自業自得。\""
2402-138 = "う、うわあぁぁ～ん！！"
2402-140 = "（修行部の先輩たちによる説教地獄は、それからだいぶ長いこと続いた……）"
2402-141 = "修行部の紹介動画を撮ろう！"
