[translation]
10016110-1 = "Epílogo parte 1: Clube de Pesquisa Gastronômica"
10016110-3 = "Poderia me trazer mais um refrigerante de cereja?"
10016110-4 = "Ah! E também raspadinha de tinta de lula com pepino-do-mar seco ao molho de manteiga de amendoim!"
10016110-5 = "Eu quero arroz frito com ovo, lámen, guioza frito, arroz chinês... ah, e por favor, traga também uma porção de edamame."
10016110-9 = "……Pessoal, vocês não estão comendo demais?"
10016110-10 = "Temos os \"vales-refeição universais\", então é de graça, mas... não forcem a barra."
10016110-11 = "Não parece ter nenhuma farmácia por perto que venda remédios para o estômago."
10016110-12 = "Continuar comendo à força... #nComo alguém que busca a verdadeira gastronomia, não farei nada tão deselegante."
10016110-13 = "Mas, talvez seja porque nos exercitamos... #nSinto que meu apetite está maior que o normal."
10016110-15 = "“O exercício é o melhor tempero”... as palavras dos antigos não estão erradas, fufu."
10016110-16 = "Exercício, hein..."
10016110-17 = "Falando nisso, Haruna, você participou das competições hoje?"
10016110-18 = "Sim. Como membro da Academia Gehenna, participei de algumas competições de atletismo."
10016110-19 = "Embora eu não tenha conseguido alcançar bons resultados."
10016110-20 = "Por que você está tão feliz se perdeu?..."
10016110-21 = "……Durante a cerimônia de encerramento, o secretário da Millennium disse algo. O objetivo do Festival Esportivo não é apenas competir por resultados, mas criar uma oportunidade para que cada aluno desfrute do exercício."
10016110-22 = "……Eu aproveitei este grande festival esportivo ao máximo."
10016110-23 = "Além disso, vocês conseguiram bons resultados nas competições, e nem mesmo o Comitê Disciplinar de Gehenna vai interferir conosco hoje."
10016110-24 = "Eu também me diverti muito~"
10016110-25 = "O soba feito por pessoas demora para sair, o que me deixou um pouco impaciente, mas..."
10016110-26 = "A máquina de fabricação preparou o macarrão exatamente na velocidade que eu comia. #nA tecnologia da Millennium é incrível★"
10016110-28 = "Teria sido ainda mais divertido se não tivesse quebrado no meio do caminho... ufufu★"
10016110-29 = "Sim, o refrigerante de pepino-do-mar também estava delicioso~!"
10016110-30 = "É a primeira vez que bebo algo com um aroma de pepino-do-mar tão intenso!"
10016110-31 = "Aquele método de culinária molecular desenvolvido na Millennium, não é...? #nSerá que não dá para reproduzir isso na cozinha da escola em Gehenna?"
10016110-33 = "……Além disso, no revezamento final, a grande virada da Junko levou Gehenna à vitória."
10016110-34 = "A cara de surpresa dos membros do Comitê Disciplinar quando a Junko ultrapassou a corredora de Abydos... #nFufu, eu deveria ter tirado uma foto."
10016110-35 = "Sim, sim! Naquela hora a Junko foi super legal~!"
10016110-36 = "Ahaha... isso é meio vergonhoso."
10016110-42 = "……Junko."
10016110-43 = "Você conseguiu aproveitar o grande festival esportivo?"
10016110-44 = "Bem..."
10016110-45 = "Por causa da perda da minha carteira, perdi a chance de comprar nas lojas que queria, e fui confundida por uma garota que parecia ser do Comitê Disciplinar de outra escola..."
10016110-46 = "Não foi muito diferente dos dias comuns do Clube de Pesquisa Gastronômica, mas... #nNão, talvez justamente por não ter mudado――"
10016110-54 = "……Eu me diverti."
10016110-55 = "Fico feliz em ouvir isso."
10016110-56 = "Refeições comuns, como arroz e sopa de missô, por serem tão familiares, raramente são valorizadas, mas..."
10016110-57 = "Eu acredito que algo que se pode comer todos os dias sem enjoar também é uma forma de gastronomia."
10016110-58 = "……É verdade, a comida que comemos em festivais é gostosa, mas não é algo que se possa comer todo dia."
10016110-62 = "Sniff, sniff... ei, não está com cheiro de queimado?"
10016110-63 = "Isso é... fumaça? #nHmm, cheiro de madeira queimando, será...?"
10016110-64 = "Ah, parece que os preparativos para a fogueira e a dança folclórica do \"Festival Noturno\" estão avançando."
10016110-65 = "……Dança folclórica? O que é isso?"
10016110-66 = "……É dançar em pares ao redor de uma fogueira."
10016110-70 = "Como assamos um porco inteiro nesse fogo, passou a ser chamada de dança do porco."
10016110-77 = "…………Sim. #nPode-se dizer que é uma das formas de gastronomia mais tradicionais, herdada desde a era da caça."
10016110-78 = "Uau, parece super delicioso~!"
10016110-79 = "Será que dá para assar outras coisas também! #nComo pepino-do-mar... ou polvo!"
10016110-80 = "Com certeza. A fogueira do Festival Esportivo será realizada em grande escala. #nDeve haver espaço suficiente para assar."
10016110-81 = "Eba~! Vou trazer um monte de ingredientes que sobraram!"
10016110-83 = "Enquanto todos os outros estão dançando a 'dança da quadrilha', vamos assar polvos e dançar a 'dança do polvo'!"
10016110-90 = "……Acho que o festival noturno não é bem sobre isso."
10016110-91 = "A Izumi está entendendo tudo errado, será que vai dar certo?"
10016110-92 = "Fufu, não tem problema."
10016110-93 = "Já que é um festival... isso é bem 'normal' para nós."
10016110-94 = "Comer ou morrer, faremos qualquer coisa pela gastronomia, esse é o lema do nosso Clube de Pesquisa Gastronômica."
10016110-98 = "Vamos, Junko-san, vamos também. Não podemos desperdiçar a oportunidade única de assar polvos na fogueira e comê-los, né?★"
10016110-105 = "……É verdade. O nosso 'normal' tem que ser assim mesmo."
