[translation]
10016110-1 = "後日談その1;美食研究会編"
10016110-3 = "桜ソーダをもう一杯いただけますか？"
10016110-4 = "あ！イカ墨かき氷と干しなまこのピーナッツバター和えも～！"
10016110-5 = "私は卵チャーハンとラーメン、焼き餃子、中華丼……あ、それから枝豆も追加で一皿お願いします。"
10016110-9 = "……みんな、食べ過ぎじゃない？"
10016110-10 = "「万能食券」があるからタダだけどさ……あんま無理しないでよね。"
10016110-11 = "胃腸薬が売ってそうなとこ、近くになさそうだし。"
10016110-12 = "無理をして食べ続けるなんて……#n真の美食を追い求める者として、そのように品のないことはしませんわ。"
10016110-13 = "ですが、身体を動かした後だからでしょうか……#nいつもより食欲が増している気がします。"
10016110-15 = "「運動は最高の調味料」……先人の言葉に間違いはありませんね、ふふっ。"
10016110-16 = "運動かぁ……"
10016110-17 = "そういえば、ハルナは今日の競技に参加したの？"
10016110-18 = "ええ。ゲヘナ学園の一員として、いくつか陸上競技に参加させていただきましたわ。"
10016110-19 = "良い成績を収めることは叶いませんでしたが。"
10016110-20 = "負けたのになんで嬉しそうなのよ……"
10016110-21 = "……閉会式の際、ミレニアムの書記の方が言っていました。晄輪大祭の目的は、ただ成績を競うだけでなく、生徒一人ひとりが運動を楽しむきっかけ作りにあるのだと。"
10016110-22 = "……私は今回の大運動会を、存分に満喫しましたわ。"
10016110-23 = "それに、皆さんは参加競技で良い成績を残していましたし、ゲヘナの風紀委員会だって今日くらいは私たちに干渉することはないでしょうから。"
10016110-24 = "私も楽しかったですよ～"
10016110-25 = "人が作るわんこそばは出てくるのが遅くて、じれったい思いをしてきましたけど……"
10016110-26 = "製造機は、私が食べる速度に合わせて麺を用意してくれましたし。#nミレニアムの技術力はすごいですね★"
10016110-28 = "途中で故障しなければ、もっと楽しめたのに……うふふッ★"
10016110-29 = "うん、なまこソーダも美味しかったよ～！"
10016110-30 = "なまこの香りをあんなに濃くした飲み物、初めて！"
10016110-31 = "ミレニアムで開発した分子料理法、だっけ……？#nあれ、ゲヘナの給食室で再現できたりしないかな？"
10016110-33 = "……それに、最後のリレーではジュンコさんの大逆転劇がゲヘナを勝利に導きましたわ。"
10016110-34 = "ジュンコさんがアビドス走者を抜いたときの、風紀委員の驚いた顔……#nフフッ、撮っておけば良かったです。"
10016110-35 = "うんうん！あのときのジュンコ、すっごくカッコよかったぁ～！"
10016110-36 = "あはは……なんか恥ずかしいわね。"
10016110-42 = "……ジュンコさん。"
10016110-43 = "大運動会、楽しめましたか？"
10016110-44 = "そうねぇ……"
10016110-45 = "財布を失くしたせいで目当てのお店を買い逃したり、他学園の風紀委員っぽい子に誤解されちゃったり……"
10016110-46 = "美食研究会のいつもの日々とあんまり変わらなかったけど……#nううん、変わらなかったからかな――"
10016110-54 = "……楽しかったわ。"
10016110-55 = "それなら良かったですわ。"
10016110-56 = "ご飯やお味噌汁といった普段の食事は、身近ゆえにあまり評価されにくいですが……"
10016110-57 = "飽きることなく毎日食べられるものというも、ひとつの美食であると私は思いますわ。"
10016110-58 = "……たしかに、お祭りで食べる料理って、美味しいけど毎日食べられるわけじゃないし。"
10016110-62 = "くんくん……ねえ、なんか焦げくさくない？"
10016110-63 = "これは……燻煙？#nん～、木の焼ける匂い、かな……？"
10016110-64 = "ああ、「後夜祭」のキャンプファイヤーとフォークダンスの準備が進んでいるようですわね。"
10016110-65 = "……フォークダンス？なあに、それ？"
10016110-66 = "……たき火を囲みながらペアで踊ることですよ。"
10016110-70 = "その火で大きな豚を丸ごと焼くので、[ruby=Pork]フォーク[/ruby]ダンスと呼ばれるようになりました。"
10016110-77 = "…………ええ。#n狩猟時代から受け継がれてきた、由緒ある美食の一つと言えますわ。"
10016110-78 = "うわぁ、すっごく美味しそ～！"
10016110-79 = "別のものも焼いたりできるかな！#nなまことか……タコとか！"
10016110-80 = "もちろんです。晄輪大祭のキャンプファイヤーは、盛大に行われるでしょうから。#n焼くスペースは十分に確保できるはずですわ。"
10016110-81 = "やった～！余ってる食材いっぱい持ってこ～！"
10016110-83 = "他のみんなが「フォークダンス」を踊っている間、私たちはタコを焼きながら「タコダンス」を踊ろうよ！"
10016110-90 = "……後夜祭ってそういうものじゃないと思うけど。"
10016110-91 = "イズミが誤解しちゃってるけど大丈夫？"
10016110-92 = "フフッ、いいじゃないですか。"
10016110-93 = "せっかくのお祭りなんですし……これくらい「普通」ですよ。"
10016110-94 = "[ruby=eat or die]「美食のためなら何でもする」[/ruby]、#nそれが私たち美食研究会のモットーですから。"
10016110-98 = "さ、ジュンコさんも行きましょう。#nたき火でタコを焼いて食べるなんて貴重な体験、逃してはもったいないですよ★"
10016110-105 = "……そうね。私たちの「普通」は、こうでなくっちゃね。"
