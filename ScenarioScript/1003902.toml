[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1003902-1 = "RABBIT 4, Ocultando-se" 
1003902-4 = "Distrito Central - Em Frente à Grande Rua Comercial" 
1003902-5 = "（No dia do meu encontro com a Miyu...）" 
1003902-9 = "（Ao chegar no ponto de encontro, vi a Miyu esbarrando constantemente nas pessoas que passavam pela rua...）" 
1003902-14 = "......Nossa, me desculpe. Você se machucou?" 
1003902-15 = "T-Tudo bem. A culpa foi minha, me desculpe..." 
1003902-21 = "......Opa." 
1003902-22 = "Foi mal, eu juro que estava olhando para frente." 
1003902-23 = "T-Tudo bem... não se preocupe..." 
1003902-27 = "Ah... Sensei..." 
1003902-28 = "O-Olá. Eu estava te esperando." 
1003902-29 = "[s1] \"......Você está bem?\"\n[s2] \"Vi que você estava esbarrando em um monte de gente.\"" 
1003902-30 = "E-Eu estou bem. Isso sempre acontece quando vou a lugares com muita gente..." 
1003902-31 = "E-Eu estou bem. Isso sempre acontece quando vou a lugares com muita gente..." 
1003902-32 = "Eu sempre tive uma presença muito fraca desde criança..." 
1003902-33 = "Acabar esbarrando nas pessoas na rua porque elas não me notam é algo que acontece o tempo todo..." 
1003902-34 = "Talvez por causa disso, eu sou muito boa em me esconder... tirei até nota máxima no teste de infiltração da SRT, mas..." 
1003902-35 = "Os instrutores não perceberam que eu ainda estava na área de treinamento e foram embora... e eu acabei sendo deixada para trás a noite toda..." 
1003902-36 = "Naquela ocasião, o sol se pôs e até começou a chover..." 
1003902-37 = "Mesmo assim, ninguém me notava e nem me davam ordens..." 
1003902-38 = "No fim das contas, eu sou só uma aluna inútil sem lugar algum na Academia Especial SRT..." 
1003902-39 = "Que vai gradualmente ser esquecida... e como uma pedrinha na beira da estrada, serei uma existência que ninguém reconhecerá..." 
1003902-40 = "E, por fim, serei miseravelmente descartada e esquecida... e então..." 
1003902-41 = "[s3] \"Não se preocupe. Se eu te perder de vista, vou me esforçar para te procurar imediatamente.\"\n[s4] \"Além disso, no mínimo, eu nunca vou me esquecer da sua existência, Miyu.\"" 
1003902-42 = "O Sensei... sempre me encontra rápido, não é mesmo..." 
1003902-43 = "O Sensei... sempre me encontra rápido, não é mesmo..." 
1003902-44 = "Ficar com o Sensei... me traz um pouco de paz e segurança." 
1003902-45 = "Acho que se o Sensei estiver comigo, até mesmo os atendentes das lojas não vão me ignorar..." 
1003902-46 = "[s] \"Os atendentes...\"" 
1003902-47 = "Bem, você com certeza vai entender assim que chegarmos lá..." 
1003902-48 = "Então, deveríamos ir...?" 
1003902-50 = "（No entanto, depois disso...）" 
1003902-52 = "Bem-vindo, o que procura? Se estiver procurando os itens de 'Acampamento Solo' que estão na moda, ficam por aqui..." 
1003902-53 = "Ah, e-etto, bem..." 
1003902-54 = "......Opa!? Peço mil desculpas, não tinha visto que estava acompanhado..." 
1003902-62 = "（E o ciclo de pessoas quase esbarrando na Miyu continuou...）" 
1003902-63 = "Uau!? F-Foi mal! Não sabia que tinha alguém aí..." 
1003902-64 = "......T-Tudo bem. A culpa é da minha falta de presença..." 
1003902-66 = "（Aparentemente, nem as portas automáticas reconhecem a Miyu...）" 
1003902-70 = "＜Esta é uma porta automática. Por favor, posicione-se bem em frente à porta.＞" 
1003902-71 = "......" 
1003902-72 = "Até a porta automática está me ignorando..." 
1003902-75 = "[ns] \"......Bem, coisas assim acontecem, não é.\"" 
1003902-76 = "Sempre foi assim para mim..." 
1003902-77 = "Ninguém me reconhece, ninguém precisa de mim..." 
1003902-78 = "......Sou apenas uma criança indesejada e com zero presença." 
1003902-79 = "[s] \"De certa forma, isso não deixa de ser um talento.\"" 
1003902-80 = "......Ser uma garota apagada?" 
1003902-81 = "Tirando as missões de atiradora de elite, eu quase nunca tirei proveito disso..." 
1003902-82 = "Talentos assim, para início de conversa..." 
1003902-86 = "Ah, um gatinho... de onde será que ele veio..." 
1003902-87 = "Tão fofo... o pelo parece ser tão macio..." 
1003902-88 = "[s] \"Ah, espera um pouco. Esse gato aí, se me lembro bem...\"" 
1003902-89 = "Ele é famoso por ser feroz... é isso?" 
1003902-90 = "......Acho que vai ficar tudo bem." 
1003902-91 = "Bom garoto, muito bem. Venha cá..." 
1003902-95 = "Fufu, que adorável..." 
1003902-96 = "[s5] \"O fato de um gato desses deixar você tocar nele... é incrível, deve ser o seu talento.\"\n[s6] \"Também quero fazer carinho...\"" 
1003902-97 = "Pensando bem... não me lembro de animais selvagens fugirem ou ficarem em alerta comigo." 
1003902-98 = "Pensando bem... não me lembro de animais selvagens fugirem ou ficarem em alerta comigo." 
1003902-99 = "Será que isso tudo também é por causa da minha baixa presença...?" 
1003902-100 = "Dependendo do ponto de vista, isso pode ser um talento... acho." 
1003902-101 = "Afinal, se não fosse por isso, eu nunca poderia acariciar esse gatinho..." 
1003902-103 = "（Depois disso, passamos um tempo muito agradável brincando com os gatos de rua.）" 