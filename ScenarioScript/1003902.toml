[translation]
1003902-1 = "RABBIT4、隠れます"
1003902-4 = "中央区・大型商店街前"
1003902-5 = "（ミユとの約束当日……）"
1003902-9 = "（約束の場所に着くと、ミユが街行く人にぶつかり続けているのが見えた……）"
1003902-14 = "……あら、ごめんなさい。ケガはないですか？"
1003902-15 = "だ、大丈夫です。ごめんなさい、私のせいなので……"
1003902-21 = "……おっと。"
1003902-22 = "ごめん、前は見ていたつもりなんだけど。"
1003902-23 = "だ、大丈夫です……お構いなく……。"
1003902-27 = "あ……先生……"
1003902-28 = "こ、こんにちは。お待ちしておりました。"
1003902-29 = "[s1] \"……大丈夫？\"\n[s2] \"なんだか、すごく人とぶつかってたけど。\""
1003902-30 = "だ、大丈夫です。人が多い場所に行くと、いつもこうなので……"
1003902-31 = "だ、大丈夫です。人が多い場所に行くと、いつもこうなので……"
1003902-32 = "私、子供の頃から存在感が薄くて……"
1003902-33 = "道行く人たちに気づかれないままぶつかってしまうのは、日常茶飯事なんです……"
1003902-34 = "そのおかげと言いますか、潜伏とかは得意で……SRTの狙撃テストでも満点だったりしたのですが……"
1003902-35 = "私が訓練場に残っていることに気づかず、教官が帰ってしまい……一晩中、取り残されたことも……。"
1003902-36 = "あの時はそのまま日が暮れて、雨まで降り始めて……"
1003902-37 = "でも、誰も私に気づきませんし、命令もしてくれませんし……"
1003902-38 = "やっぱり私は、SRT特殊学園に居場所の無い無能な生徒……"
1003902-39 = "そうやって徐々に忘れられて……道端の小石みたいに、誰にも認知されない存在になって……"
1003902-40 = "最後にはみじめに捨てられて、忘れられて……それで……"
1003902-41 = "[s3] \"大丈夫。もし見失っても、すぐ頑張って探すから。\"\n[s4] \"それに少なくとも、ミユの存在を忘れたりなんてしない。\""
1003902-42 = "先生は、いつも私をすぐ見つけてくれますよね……。"
1003902-43 = "先生は、いつも私をすぐ見つけてくれますよね……。"
1003902-44 = "先生といる時は、少し安心します。"
1003902-45 = "こうして先生も一緒なら、店員さんが私に気づかないこともないでしょうし……"
1003902-46 = "[s] \"店員さん……。\""
1003902-47 = "まあ、実際に行ってみればきっと、分かると思いますので……"
1003902-48 = "早速、行きましょうか……？"
1003902-50 = "（しかしその後も……）"
1003902-52 = "いらっしゃいませ、何かお探しでしょうか？もし今流行りの「ソロキャンプ用品」でしたら、こちらに……"
1003902-53 = "あ、えっと、その……"
1003902-54 = "……あれ！？失礼しました、お連れ様がいらっしゃったとは……。"
1003902-62 = "（その後も、すれ違う人たちが次々とミユにぶつかりそうになり……）"
1003902-63 = "わっ！？ご、ごめん！そこに人がいるとは……"
1003902-64 = "……だ、大丈夫です。影が薄い私のせいなので……"
1003902-66 = "（ミユはどうやら、自動ドアにも認識されにくく……）"
1003902-70 = "＜こちらは自動ドアです。扉の目の前にお立ちください＞"
1003902-71 = "……"
1003902-72 = "自動ドアにも、無視されてる……"
1003902-75 = "[ns] \"……まあ、そういうこともあるよね。\""
1003902-76 = "私、いつもこうなんです……。"
1003902-77 = "誰も認識できず、誰にも必要とされない……"
1003902-78 = "……存在感ゼロの、いらない子なんです。"
1003902-79 = "[s] \"それもある種の才能だよ。\""
1003902-80 = "……影が薄いことが、ですか？"
1003902-81 = "狙撃任務の時を除くと、得した事なんてほとんど無いのですが……"
1003902-82 = "こんな才能なんて、そもそも……"
1003902-86 = "あ、猫さんですね……どこから来たんだろ……。"
1003902-87 = "かわいい……毛並みも柔らかそう……。"
1003902-88 = "[s] \"あ、ちょっと待って。その猫はたしか……\""
1003902-89 = "凶暴で有名……なんですか？"
1003902-90 = "……多分、大丈夫です。"
1003902-91 = "よしよし、良い子。こっちにおいで……"
1003902-95 = "ふふっ、可愛い……。"
1003902-96 = "[s5] \"その猫が触らせてくれるなんて……すごい、やっぱり才能だよ。\"\n[s6] \"私も撫でたい……。\""
1003902-97 = "そういえば……野生の動物に逃げられたり、警戒されたりということは、今まで無かった気がします。"
1003902-98 = "そういえば……野生の動物に逃げられたり、警戒されたりということは、今まで無かった気がします。"
1003902-99 = "これも全部、私の存在感が薄いおかげで……？"
1003902-100 = "確かに考えようによっては、これも才能……かもしれないですね。"
1003902-101 = "そうでなければ、こうしてこの子を撫でられなかったかと思うと……。"
1003902-103 = "（その後、ミユと一緒に野良猫と遊んであげながら、楽しい時間を過ごした）"
