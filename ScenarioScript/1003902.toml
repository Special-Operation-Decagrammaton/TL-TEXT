[translation]
1003902-1 = "RABBIT4, escondendo-se."
1003902-4 = "Distrito Central, em frente ao grande shopping."
1003902-5 = "（Dia do encontro com a Miyu...）"
1003902-9 = "（Ao chegar ao local combinado, vi a Miyu esbarrando constantemente nas pessoas que passavam...）"
1003902-14 = "……Ah, me desculpe. Você se machucou?"
1003902-15 = "E-está tudo bem. Desculpe, a culpa é minha..."
1003902-21 = "……Opa."
1003902-22 = "Foi mal, eu achei que estava olhando para frente."
1003902-23 = "E-está tudo bem... não se preocupe..."
1003902-27 = "Ah... Sensei..."
1003902-28 = "O-olá. Eu estava esperando por você."
1003902-29 = "[s1] \"...Você está bem?\"\n[s2] \"Você estava esbarrando em muita gente, não estava?\""
1003902-30 = "E-está tudo bem. Sempre acontece isso quando vou a lugares cheios..."
1003902-31 = "E-está tudo bem. Sempre acontece isso quando vou a lugares cheios..."
1003902-32 = "Desde criança, minha presença é muito fraca..."
1003902-33 = "É rotina eu acabar esbarrando nas pessoas sem que elas percebam que estou lá..."
1003902-34 = "Graças a isso, por assim dizer, sou boa em me esconder... Tirei nota máxima no teste de precisão da SRT, mas..."
1003902-35 = "O instrutor não percebeu que eu ainda estava no campo de treinamento e foi embora... Acabei sendo deixada para trás a noite toda..."
1003902-36 = "Naquela época, o sol se pôs e até começou a chover..."
1003902-37 = "Mas ninguém me notou, e ninguém me deu ordens..."
1003902-38 = "No fim, sou apenas uma aluna inútil sem lugar na Academia Especial SRT..."
1003902-39 = "Sendo esquecida aos poucos... tornando-me uma existência que ninguém reconhece, como uma pedrinha na beira da estrada..."
1003902-40 = "No final, sendo descartada miseravelmente, esquecida... e então..."
1003902-41 = "[s3] \"Está tudo bem. Se eu te perder de vista, vou me esforçar para te encontrar logo.\"\n[s4] \"Além disso, pelo menos eu nunca vou esquecer da sua existência, Miyu.\""
1003902-42 = "O Sensei sempre me encontra rápido, não é..."
1003902-43 = "O Sensei sempre me encontra rápido, não é..."
1003902-44 = "Sinto-me um pouco mais segura quando estou com o Sensei."
1003902-45 = "Se o Sensei estiver comigo, talvez o atendente da loja não me ignore..."
1003902-46 = "[s] \"O atendente...\""
1003902-47 = "Bem, acho que você entenderá quando chegarmos lá..."
1003902-48 = "Podemos ir agora...?"
1003902-50 = "（Mas, mesmo depois disso...）"
1003902-52 = "Bem-vindo, procura por algo? Se for por esses \"equipamentos de acampamento solo\" que estão na moda, ficam aqui..."
1003902-53 = "Ah, bem, é que..."
1003902-54 = "……Ah!? Peço perdão, não vi que você estava acompanhada..."
1003902-62 = "（Depois disso, as pessoas que passavam continuavam quase esbarrando na Miyu...）"
1003902-63 = "Opa!? D-desculpa! Não vi que tinha alguém aí..."
1003902-64 = "……E-está tudo bem. A culpa é minha, por ser tão apagada..."
1003902-66 = "（Aparentemente, a Miyu também é difícil de ser detectada por portas automáticas...）"
1003902-70 = "＜Esta é uma porta automática. Por favor, fique em frente à porta＞"
1003902-71 = "……"
1003902-72 = "Até a porta automática me ignora..."
1003902-75 = "[ns] \"...Bem, essas coisas acontecem, né?\""
1003902-76 = "Sempre sou assim..."
1003902-77 = "Ninguém me reconhece, ninguém precisa de mim..."
1003902-78 = "……Sou uma criança inútil com presença zero."
1003902-79 = "[s] \"Isso também é um tipo de talento.\""
1003902-80 = "……Ter uma presença fraca, você diz?"
1003902-81 = "Tirando as missões de sniper, quase nunca tirei vantagem disso..."
1003902-82 = "Um talento como esse, para começo de conversa..."
1003902-86 = "Ah, é um gatinho... De onde será que ele veio...?"
1003902-87 = "Que fofo... A pelagem parece tão macia..."
1003902-88 = "[s] \"Ah, espere um pouco. Se não me engano, esse gato é...\""
1003902-89 = "Ele é famoso por ser... feroz?"
1003902-90 = "……Acho que está tudo bem."
1003902-91 = "Isso, isso, bom garoto. Venha aqui..."
1003902-95 = "Hehe, que fofo..."
1003902-96 = "[s5] \"Que esse gato tenha deixado você tocar nele... Incrível, é um talento nato mesmo.\"\n[s6] \"Eu também queria fazer carinho nele...\""
1003902-97 = "Pensando bem... acho que nunca aconteceu de animais selvagens fugirem de mim ou ficarem alertas."
1003902-98 = "Pensando bem... acho que nunca aconteceu de animais selvagens fugirem de mim ou ficarem alertas."
1003902-99 = "Será que tudo isso é graças à minha presença ser tão apagada...?"
1003902-100 = "Pensando bem, talvez isso também seja um talento... quem sabe."
1003902-101 = "Se não fosse por isso, acho que eu não teria conseguido fazer carinho nele..."
1003902-103 = "（Depois disso, passei um tempo divertido brincando com o gato de rua junto com a Miyu）"
