[translation]
901010400460-6 = "Alright, let's summarize what we've gathered so far."
901010400460-7 = "“The ghost stories had a negligible impact on crab prices and catch volumes.”"
901010400460-8 = "“The content of the ghost stories focused on inducing psychological fear.”"
901010400460-9 = "“The source of the ghost stories wasn't anyone connected to Kanezaki Port; they spread through word-of-mouth among the general public.”"
901010400460-11 = "Hmm... Just based on this, I can't say for sure if this disappearance case is related to the lore."
901010400460-12 = "Miyaguchi—do you have any information about the missing fisherman?"
901010400460-14 = "Yeah. I figured it would look suspicious if an outsider started asking around about the missing person."
901010400460-15 = "I've built up some rapport now, so I'll try asking next."
901010400460-17 = "The port is closed tomorrow, so I'll give it a shot the day after."
901010400460-18 = "I just hope no urban legends manifest while we wait~"
901010400460-19 = "Come to think of it, the ocean is a common setting for monster movies, isn't it?"
901010400460-20 = "You know, there was that rumor recently about a new mascot-style monster appearing."
901010400460-21 = "You mean that creepy bird called Peroro?"
901010400460-22 = "They say it materialized because of fans' wishes for a rare, limited-edition plushie..."
901010400460-23 = "I couldn't help but laugh, though."
901010400460-24 = "True. Actually, if it's a Peroro urban legend, it might not even be scary."
901010400460-29 = "...Oh?#nYou've got a strange look on your face, Sensei. What's wrong?"
901010400460-30 = "[s1] \"Well...\"\n[s2] \"...Perorodzilla is actually real.\""
901010400460-35 = "Huh!?"
901010400460-38 = "Wait, so... let me get this straight, Sensei."
901010400460-39 = "A limited-edition plushie named \"Perorodzilla\" materialized because of fans' wishes...#nAnd then it headed toward D.U.?"
901010400460-40 = "And you defeated it in cooperation with Valkyrie?"
901010400460-41 = "...You're joking, right?"
901010400460-42 = "[s] \"I-I'm not joking!\""
901010400460-46 = "[ns3] \"It was an incident Schale resolved before the public could see it...\"\n[ns4] \"Aside from a few Valkyrie students, nobody else knows about it.\""
901010400460-49 = "Now that you mention it, I did see a report from the Valkyrie Security Bureau a while back that mentioned a large-scale deployment of security forces."
901010400460-50 = "The records regarding the nature of the report and the scale of the damage were wiped, so I couldn't verify them..."
901010400460-51 = "If such a major incident happened, why didn't we know about it?"
901010400460-52 = "We were wanted by the authorities for the General Student Council attack back then, remember?"
901010400460-53 = "Oh... right."
901010400460-55 = "If a monster that huge appeared in the waters near D.U., someone other than us should have seen it..."
901010400460-56 = "It's strange that there weren't any news reports or sightings posted on social media."
901010400460-57 = "[s5] \"The General Student Council controlled the information to prevent panic.\"\n[s6] \"That's why most students seem to think it's just an urban legend.\""
901010400460-61 = "I suppose that bird—Peroro, was it?—doesn't look scary at all, even if it is a bit creepy."
901010400460-62 = "It makes sense that people would just dismiss it as a rumor."
901010400460-63 = "To think that something born from an urban legend would become an urban legend itself... that's kind of ironic, isn't it?"
901010400460-64 = "I can't believe a character that looks like that could turn into a giant monster."
901010400460-65 = "Actually, it's kind of worrying that anything famous can become a monster.#nWhat if I end up having to fight a giant Shuppo-kun someday!?"
901010400460-70 = "..."
901010400460-71 = "FOX2, can I step out for a bit tomorrow afternoon?"
901010400460-72 = "Sure. I don't have any particular plans, so that's fine, but... what's this about all of a sudden?"
901010400460-73 = "There's something I want to investigate personally."