[translation]
901010400460-6 = "Então, vamos organizar o que temos até agora."
901010400460-7 = "O boato teve pouco impacto no preço e na captura do caranguejo."
901010400460-8 = "O conteúdo do boato focava em causar medo psicológico."
901010400460-9 = "A origem do boato não eram os trabalhadores do porto, mas sim a tradição oral de cidadãos comuns."
901010400460-11 = "Hmm... só com isso não dá para afirmar se o desaparecimento tem relação com a lenda."
901010400460-12 = "Não temos informações sobre o pescador desaparecido, Miyaguchi?"
901010400460-14 = "É, achei que seria suspeito se um estranho ficasse perguntando."
901010400460-15 = "Já criei um certo vínculo, na próxima vez pergunto."
901010400460-17 = "Amanhã é dia de folga no porto, então só depois de amanhã."
901010400460-18 = "Tomara que os boatos não se espalhem e o fenômeno apareça."
901010400460-19 = "Falando nisso, o mar é cenário de muitas histórias de monstros."
901010400460-20 = "Olha, outro dia teve boato de um monstro com roupa de mascote."
901010400460-21 = "Aquele pássaro feio chamado Peperoni?"
901010400460-22 = "Dizem que se materializou por causa do desejo dos fãs por um pelúcia limitado..."
901010400460-23 = "Eu ri disso."
901010400460-24 = "Verdade. Aliás, se o fenômeno fosse o Peperoni, não teria medo."
901010400460-29 = "... Oh? Professor, o senhor está com uma cara estranha. O que foi?"
901010400460-30 = "[s1] \"Bem...\"\n[s2] \"... Perorojira existe de verdade.\""
901010400460-35 = "Hein!?"
901010400460-38 = "Então, resumindo o que o professor disse..."
901010400460-39 = "Um pelúcia chamado 'Perorojira' se materializou por causa do desejo dos fãs... e veio na direção do D.U.?"
901010400460-40 = "E vocês derrubaram ele junto com a Valkyrie?"
901010400460-41 = "... É brincadeira, né?"
901010400460-42 = "[s] \"Não é brincadeira!\""
901010400460-46 = "[ns3] \"Foi um caso resolvido pelo Schale antes que os cidadãos vissem.\"\n[ns4] \"Além de algumas alunas da Valkyrie, quase ninguém sabe.\""
901010400460-49 = "Verdade, eu vi no relatório do Departamento de Segurança da Valkyrie que houve uma grande movimentação."
901010400460-50 = "O motivo e a extensão dos danos foram apagados, então não confirmei..."
901010400460-51 = "Como é que um caso tão grande assim aconteceu e a gente não ficou sabendo?"
901010400460-52 = "Naquela época estávamos foragidas por causa do ataque ao Conselho Estudantil Federado."
901010400460-53 = "Ah... é mesmo."
901010400460-55 = "Um monstro daquele tamanho no litoral do D.U., outras pessoas também devem ter visto..."
901010400460-56 = "E nenhuma notícia ou relato nas redes sociais? É estranho."
901010400460-57 = "[s5] \"O Conselho Estudantil Federado controlou as informações para evitar o pânico.\"\n[s6] \"Por isso a maioria pensa que é lenda urbana.\""
901010400460-61 = "Verdade, aquele tal de Peroxer... esse pássaro, é feio, mas não assusta."
901010400460-62 = "Até que faz sentido descartarem como boato."
901010400460-63 = "Um ser nascido de uma lenda urbana se tornar uma lenda urbana... é irônico."
901010400460-64 = "Mesmo com essa aparência, ele virou um monstro gigante."
901010400460-65 = "Aliás, se qualquer mascote famoso pode virar monstro, imagina se um dia tivermos que lutar contra um Shuppo-kun gigante!"
901010400460-70 = "..."
901010400460-71 = "FOX2, posso me ausentar amanhã à tarde?"
901010400460-72 = "Sim, não tenho compromisso. Mas por que de repente?"
901010400460-73 = "Tenho uma coisa pessoal para investigar."