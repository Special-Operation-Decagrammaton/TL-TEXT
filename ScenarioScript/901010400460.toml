[translation]#[Texto Final. - Filipe 05/07.]
901010400460-6 = "Então, vamos organizar o que a gente tem até agora."
901010400460-7 = "O boato teve um impacto pequeno no preço e na captura do caranguejo."
901010400460-8 = "O conteúdo do boato era focado em causar medo psicológico."
901010400460-9 = "A origem do boato não veio de gente ligada ao porto de Kanezaki, mas se espalhou de boca em boca entre cidadãos comuns."
901010400460-11 = "Hmm…… só com isso não dá pra afirmar que o caso dos desaparecimentos tem a ver com um Lore."
901010400460-12 = "Miyaguchi―― tem alguma informação sobre o pescador que desapareceu?"
901010400460-14 = "Sim. Achei que se um estranho ficasse perguntando sobre o desaparecido, ia levantar suspeita."
901010400460-15 = "Já criei um certo contato, então na próxima vou perguntar."
901010400460-17 = "Amanhã o porto tá fechado, então vamos continuar depois de amanhã."
901010400460-18 = "Tomara que o boato não se espalhe mais e o fenômeno apareça nesse meio-tempo~"
901010400460-19 = "Falando nisso, o mar sempre é palco de histórias de monstro, né."
901010400460-20 = "É, esses dias até teve boato de um monstro com forma de mascote."
901010400460-21 = "Aquele passarinho esquisito chamado Peperoni?"
901010400460-22 = "Dizem que ele se materializou por causa do desejo dos fãs que queriam o pelúcia limitada……"
901010400460-23 = "Essa eu até ri."
901010400460-24 = "Pois é. Na verdade, se fosse o Perorodzilla, talvez nem fosse tão assustador."
901010400460-29 = "……Ué?#nQue cara estranha é essa, Sensei? O que foi?"
901010400460-30 = "[s1] \"Bom……\"\n[s2] \"……O 'Perorodzilla' existe de verdade.\""
901010400460-35 = "Quê!?"
901010400460-38 = "Então, quer dizer…… resumindo o que o Sensei contou."
901010400460-39 = "Uma pelúcia limitada chamada 'Perorodzilla' ganhou vida pelo desejo dos fãs……#nE marchou em direção a D.U.?"
901010400460-40 = "E vocês derrotaram ela junto com a Valkyrie?"
901010400460-41 = "……É brincadeira, né?"
901010400460-42 = "[s] \"N-Não é brincadeira!\""
901010400460-46 = "[ns3] \"Foi um caso que a Schale resolveu antes de chegar aos olhos do público……\"\n[ns4] \"Fora algumas alunas da Valkyrie, quase ninguém ficou sabendo.\""
901010400460-49 = "Falando nisso, no relatório do Departamento de Segurança da Valkyrie que eu vi, tinha registro de uma mobilização enorme."
901010400460-50 = "Mas o conteúdo da ocorrência e a extensão dos danos tinham sido apagados, então não pude confirmar……"
901010400460-51 = "Com um caso tão grande, como é que a gente não ficou sabendo?"
901010400460-52 = "Naquela época, a gente tava foragida por causa do ataque ao Conselho Estudantil Geral, né."
901010400460-53 = "Ah…… verdade."
901010400460-55 = "Se um monstro daquele tamanho apareceu perto da costa de D.U., outras pessoas além da gente deveriam ter visto……"
901010400460-56 = "É estranho que não tenha saído notícia nem post nas redes sociais."
901010400460-57 = "[s5] \"O Conselho Estudantil Geral controlou a informação pra evitar pânico.\"\n[s6] \"Por isso a maioria das alunas acha que é só lenda urbana.\""
901010400460-61 = "É, esse tal de Perossador…… ou sei lá qual é o nome do pássaro, a aparência é esquisita mas não dá medo mesmo."
901010400460-62 = "Até entendo descartarem como boato."
901010400460-63 = "Uma criatura nascida de uma lenda urbana se tornar ela mesma uma lenda…… que irônico."
901010400460-64 = "Mesmo com essa cara, vira um monstro gigante, hein."
901010400460-65 = "E, falando nisso, se qualquer coisa famosa vira monstro é complicado.#nImagina se um dia a gente tem que lutar contra um Shuppo-kun gigante!?"
901010400460-70 = "……"
901010400460-71 = "FOX2, posso me ausentar amanhã de tarde?"
901010400460-72 = "Sim, não tenho nada planejado…… mas, por que?"
901010400460-73 = "Tenho uma coisa que quero investigar por conta própria."