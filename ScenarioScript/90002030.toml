[translation]
90002030-1 = "Episódio 3: Surtida"
90002030-2 = "Bem, vamos organizar a situação."
90002030-3 = "Temos o que já sabemos e o que precisamos fazer. Por onde quer começar?"
90002030-5 = "Comece pelo que já sabemos."
90002030-7 = "Conseguimos detalhes sobre as unidades que nos atacaram."
90002030-8 = "O nome do modelo é..."
90002030-10 = "Labor...?"
90002030-15 = "Significa 'trabalhador'. Considerando o papel desse modelo, é um nome bem apropriado."
90002030-16 = "Pelo que conseguimos identificar, existem três tipos de Labor."
90002030-17 = "Pelo que vi no local... havia um modelo em formato de paralelepípedo, coberto por algo que parecia uma blindagem."
90002030-18 = "Era muito resistente!"
90002030-19 = "Acho que podemos chamar esse modelo de 'Labor de Defesa'."
90002030-20 = "O próximo é o modelo equipado com um canhão tão grande que dá para notar de relance."
90002030-22 = "O design deixa a desejar, mas... podemos chamá-lo de 'Labor de Artilharia'."
90002030-23 = "Ah, e também... havia uns modelos um pouco menores... que pareciam dois protótipos..."
90002030-25 = "Então, vamos chamar esse modelo de 'Labor Básico'."
90002030-26 = "Geralmente, coisas pequenas parecem fofas, mas... esse aqui só me faz pensar em uma aranha..."
90002030-27 = "Está dizendo que aranhas não são fofas?"
90002030-28 = "Claro, a estética é subjetiva. Entendo que seu senso estético seja peculiar, mas..."
90002030-30 = "Chefe, Presidente, agora não é hora para discutir isso."
90002030-31 = "[s] \"Descobriram mais alguma coisa?\""
90002030-35 = "Sim. Acho que isso é o mais importante."
90002030-36 = "Os Labor conseguem transformar matéria inorgânica ao redor em Continente de Aço."
90002030-37 = "Isso significa que...?"
90002030-38 = "Então, foram os Labor que expandiram o Continente de Aço?"
90002030-39 = "Acredito que não esteja errado."
90002030-40 = "É razoável supor que a produção em massa dos Labor começou apenas depois que o Continente de Aço foi construído até certo ponto."
90002030-41 = "É muito provável que os Labor tenham se aproximado do navio de transporte tentando assimilá-lo ao Continente de Aço."
90002030-42 = "Não examinamos todos os Labor, então isso não passa de uma possibilidade. Mas, na verdade, examinar todos eles não seria nada realista."
90002030-43 = "O que me preocupa é... que os Labor parecem estar fazendo a manutenção da estrutura interna do Continente de Aço."
90002030-44 = "Manutenção...?"
90002030-45 = "Construção de estruturas, reparo de partes danificadas..."
90002030-46 = "Ou o trabalho de assimilação de matéria inorgânica que foi incorporada durante o processo de expansão do Continente de Aço."
90002030-47 = "Ah, então foi por isso que o navio de transporte..."
90002030-49 = "Entendi o que já sabemos. E o que precisamos fazer?"
90002030-50 = "É fácil falar, mas..."
90002030-54 = "Precisamos romper Yesod."
90002030-55 = "[s] \"...\""
90002030-56 = "Vou compartilhar as informações que temos até agora sobre o nono profeta, 'Yesod'."
90002030-57 = "Curiosamente, Yesod não possui um protótipo original."
90002030-58 = "O que isso significa?"
90002030-59 = "Por exemplo, no caso de Hod, originalmente era a IA da unidade de comunicação do Millennium, 'Hub'."
90002030-60 = "Chokmah era uma nave de trabalho e Geburah era uma sonda não tripulada."
90002030-61 = "Dessa forma, estruturas baseadas em sistemas de IA foram hackeadas pelo Decagrammaton junto com suas IAs, tornando-se profetas."
90002030-62 = "A única exceção seria Binah. Porque a primeira vez que foi avistada foi no deserto de Abydos, décadas atrás."
90002030-63 = "Yesod também é uma exceção?"
90002030-64 = "Sim. Isso é uma suposição, mas..."
90002030-65 = "Acredito que Yesod tenha surgido apenas depois que o Continente de Aço foi construído até certo ponto."
90002030-68 = "Caso contrário, não haveria explicação para não termos detectado o sinal de Yesod, sendo ele tão imenso, até agora."
90002030-69 = "Acho que é uma dedução plausível."
90002030-71 = "E se considerarmos isso como verdade... significa que Yesod é extremamente puro."
90002030-72 = "Um profeta \"otimizado\", criado apenas para cumprir um propósito... é isso?"
90002030-73 = "……Provavelmente."
90002030-74 = "Aquele tamanho colossal e aquele poder também devem ser resultados dessa otimização."
90002030-76 = "Sinto que, quanto mais discutimos, menos soluções encontramos……"
90002030-77 = "A-Alice... e todos os outros! Com certeza ficarão bem!"
90002030-78 = "Uma heroína... não se acovarda antes mesmo de começar a aventura... buááá!"
90002030-79 = "[s] (Embora pareça que ela já está com medo...)"
90002030-81 = "Mas eu acho que ele tem um ponto fraco."
90002030-82 = "Sério...?"
90002030-83 = "Acho que ele não consegue sair de cima daquela parede."
90002030-84 = "V-verdade...#nMesmo nos jogos, chefes gigantes... não costumam se mover com facilidade..."
90002030-85 = "Eu não pretendia usar um jogo como exemplo, mas..."
90002030-87 = "Fufu, talvez você tenha acertado em cheio agora."
90002030-88 = "Independentemente do que seja, se tem massa, existem coisas que não podem ser evitadas."
90002030-89 = "Coisas que não podem ser evitadas?#n……Entendo."
90002030-90 = "Questões de velocidade e durabilidade, certo?"
90002030-91 = "Exato.#nPara mover algo com grande massa, é necessária uma quantidade proporcional de energia."
90002030-92 = "Se houver energia suficiente, é possível movê-lo rapidamente, mas a durabilidade atingiria seu limite antes mesmo de qualquer movimento."
90002030-93 = "Claro, ainda há muitas incógnitas sobre a resistência e a durabilidade dessa substância misteriosa."
90002030-94 = "Ainda assim, por ser matéria, acredito que deve haver um limite."
90002030-95 = "[s] \"Ou seja...?\""
90002030-96 = "Em resumo, é o seguinte."
90002030-97 = "Prevê-se que os ataques de Yesod tenham restrições de movimento."
90002030-98 = "Se basearmos nossa estratégia nisso—"
90002030-99 = "—Será uma batalha rápida usando táticas de distração, não é?"
90002030-100 = "……Exatamente."
90002030-101 = "Os ataques de Yesod... ou, mais precisamente, seus \"ataques de braço\", são uma ameaça real."
90002030-102 = "No entanto, se nossa previsão estiver correta, seus movimentos devem ser lentos."
90002030-103 = "Se nos concentrarmos em desviar, talvez consigamos criar uma abertura."
90002030-104 = "Ignoraremos, por ora, o impacto causado pelo seu tamanho colossal."
90002030-105 = "Pelo menos, deve ser o suficiente para desviar a atenção de Yesod algumas vezes."
90002030-106 = "E, nesse intervalo, a unidade principal se moverá com a nave de transporte e—"
90002030-107 = "—atacará Yesod de surpresa a partir de cima da parede."
90002030-113 = "Himari... você está propondo esse plano."
90002030-114 = "……Se fosse você, não teria agido por conta própria sem consultar ninguém?"
90002030-115 = "Você, como está agora, sugerir um plano desses antes de mim..."
90002030-116 = "—Não, não é isso. É apenas um sinal de que estamos encurralados..."
90002030-117 = "……Não temos tempo."
90002030-118 = "Sim……"
90002030-119 = "[s1] \"Pessoal, esperem um pouco.\"\n[s2] \"Esse plano...\""
90002030-122 = "……"
90002030-123 = "É isso mesmo."
90002030-124 = "Este é um plano para derrotar Yesod usando alguém como isca."
90002030-125 = "Além disso, não podemos garantir a segurança da isca, nem temos certeza de que conseguiremos eliminar Yesod."
90002030-126 = "Ou seja, é um plano extremamente perigoso……"
90002030-127 = "[s3] \"Eu não posso... concordar com isso.\"\n[s4] \"Como... sensei de todos vocês.\""
90002030-130 = "Mas não consigo pensar em nenhum outro meio."
90002030-132 = "E-então...! A Alice...! A Alice vai...!"
90002030-133 = "……"
90002030-135 = "Não, Alice."
90002030-136 = "Por que não? Embora eu ainda seja uma aprendiz, a Alice é uma heroína!#nPor isso, eu vou..."
90002030-137 = "Exato. É justamente porque você é uma heroína."
90002030-138 = "Você certamente se tornará..."
90002030-139 = "……Isso inclui a mim também, não é?"
90002030-140 = "……Sim."
90002030-141 = "Você continua agindo de forma tão fria como sempre."
90002030-142 = "……Já estou acostumada com isso."
90002030-143 = "Eu detesto esse seu jeito."
90002030-147 = "É tão frustrante que…… a raiva começa a subir……!"
90002030-148 = "Kei, você não está sempre com raiva?"
90002030-149 = "Isso é verdade, mas…… ah, droga! Não é disso que eu estou falando!"
90002030-150 = "Estou falando de um tipo diferente de raiva! Não jogue lenha na fogueira!!"
90002030-151 = "[s] \"Sério…… não existe outro jeito?\""
90002030-153 = "……."
90002030-154 = "……."
90002030-155 = "(O clima no ambiente ficou pesado e tenso)"
90002030-156 = "(Ainda assim, o tempo continua passando impiedosamente……)"
90002030-161 = "Então, eu farei isso."
90002030-165 = "[ns] \"！？\""
90002030-166 = "Eimi!?"
90002030-171 = "O ponto principal é atrair a atenção deles, certo?"
90002030-173 = "Ma-mas……!"
90002030-174 = "Eimi! Como o Sensei também está preocupado……!"
90002030-176 = "Está tudo bem. Essa é a forma mais eficiente.#nTão clara que nem precisamos usar a palavra \"talvez\"."
90002030-177 = "Estou acostumada com o trabalho de campo, e sou bem resistente e rápida."
90002030-178 = "Ma-mas…… e se algo der errado……!"
90002030-179 = "[s5] \"Eimi, você não poderia repensar isso……?\"\n[s6] \"Eu…… não quero ver vocês se machucando…….\""
90002030-182 = "……."
90002030-190 = "！？"
90002030-191 = "！？"
90002030-192 = "(Eimi abraçou você suavemente)"
90002030-193 = "[s] \"Ei, Eimi……?\""
90002030-196 = "Como eu pensava, o corpo do Sensei…… é tão quentinho."
90002030-197 = "Está tudo bem, Sensei."
90002030-198 = "[s] \"Mas……!\""
90002030-199 = "Sim. Eu entendo."
90002030-200 = "Mas vai ficar tudo bem.#nSe você se preocupa tanto com a gente――"
90002030-201 = "Acredite em nós."
90002030-202 = "Se é natural que o Sensei ajude os alunos, não é natural que os alunos queiram ser a força do Sensei?"
90002030-203 = "Bom…… se algo acontecer comigo――"
90002030-204 = "Eu vou guardar um rancor enorme de você, Sensei. Vai ter que assumir a responsabilidade para sempre."
90002030-205 = "Então, estou indo."
90002030-210 = "[ns] \"Eimi!\""
90002030-213 = "……Operação iniciada."
90002030-214 = "Sim, vamos começar."
90002030-215 = "Para garantir que a Eimi volte em segurança, nós também precisamos nos preparar."
90002030-216 = "Não é, Sensei?"
90002030-217 = "[s] \"……Me diga o que preciso fazer.\""
90002030-224 = "[ns] \"Então, cada um para o seu posto.\""
90002030-225 = "Relatando a situação do reparo do motor.#nTanto a decolagem quanto o pouso de emergência estão operacionais."
90002030-226 = "A partir de agora, irei para o hangar e iniciarei os preparativos para a descida."
90002030-228 = "Sim! Alice também vai acompanhar a Toki!"
90002030-229 = "Eu... eu vou dar o meu melhor...!"
90002030-231 = "Himari, deixo o resto com você."
90002030-232 = "……Toki e Alice são nossas maiores forças de combate e nossa carta na manga."
90002030-233 = "Yuzu pode acabar tendo um desempenho surpreendente em missões como esta."
90002030-234 = "Mas... Rio, é mesmo necessário que você vá também?"
90002030-235 = "……O campo de batalha também precisa de um comandante tático."
90002030-236 = "Isso não seria uma atitude emocional vinda do seu senso de responsabilidade ou culpa?"
90002030-237 = "……Já estou indo."
90002030-244 = "Haa...#nUltimamente, sinto que estou perdendo o respeito das pessoas. O que você acha?"
90002030-245 = "[s] \"Acho que é porque todos confiam na Himari.\""
90002030-246 = "Fufu, vamos deixar por isso mesmo."
90002030-247 = "Bem, chega de conversa... vamos começar?"
90002030-248 = "Então, Sensei?"
90002030-249 = "[s] \"Operação iniciada!\""
90002030-250 = "Hangar, estão me ouvindo? Informem a situação."
90002030-256 = "Acabei de chegar ao hangar. Vou embarcar no pod."
90002030-257 = "Alice, você sabe quais são os procedimentos, certo?"
90002030-259 = "Sim! Com certeza!"
90002030-260 = "Hum... por onde a gente começa mesmo...?"
90002030-261 = "E-eu te ajudo, Alice-chan...#nÉ tipo um manual de jogo..."
90002030-263 = "Então, Yuzu, conto com você para ajudar a Alice."
90002030-266 = "Preparativos para a descida concluídos. Pode prosseguir quando quiser."
90002030-267 = "Então..."
90002030-268 = "Decolar!"
90002030-278 = "Sério, é um tamanho inacreditável."
90002030-279 = "Bem."
90002030-280 = "Vamos ser eficientes."
90002030-281 = "Primeiro..."
90002030-293 = "—pelos inimigos à nossa frente."
