[translation]
10037080-1 = "第8話;人形の言葉に耳を澄ませる"
10037080-3 = "新しい京劇を披露するだなんて……斬新だな。"
10037080-4 = "まあ、この前の劇も良かったし……楽しみにするとしよう！"
10037080-5 = "ああ[ruby=わらわ]、妾も[/ruby]期待しておる。#nカグヤがああも意欲的なのは久方ぶりじゃからのう。"
10037080-6 = "うむ！この旋律にも少しは慣れてきたぞ！"
10037080-7 = "鎧をまとった演者が次々と……！"
10037080-11 = "おお、今回の主役は黒い鎧を着ているんだな！#nちょっとずつ細部も分かるようになってきたぞ！"
10037080-12 = "ふふ、良いことじゃ。"
10037080-22 = "生とは、夢の如し。"
10037080-25 = "如何にして、その生を謳歌するのか。"
10037080-26 = "柱のそばで横になり――"
10037080-27 = "[ruby=こつぜん]忽然[/ruby]と目を覚まし、[ruby=ていぜん]庭前[/ruby]を歩く。"
10037080-29 = "花の間に、一羽の鳥が囀っている。"
10037080-31 = "問おう、今は[ruby=なんどき]何時[/ruby]だ。"
10037080-32 = "春風のような[ruby=ウグイス]、鶯の[/ruby]声。"
10037080-34 = "流れるように歌いながら、月を待つ！"
10037080-39 = "序章はいつものように、世の風景を唄うシーンからだ……。"
10037080-40 = "京劇のお決まりだからね。"
10037080-41 = "たしか、今回はカグヤ部長が新しく劇を執筆したんだっけ？"
10037080-42 = "たった数日で書き上げるなんて、すごいよね。"
10037080-47 = "軽やかな霧が、湖面に立ち上り――"
10037080-48 = "陽射しが燦々と輝いている。嗚呼、今年も豊作だ。"
10037080-49 = "これ以上望むことなどなく――世は泰平なり。"
10037080-50 = "龍と鳳凰が吉兆を運んでくる。"
10037080-52 = "見よ！黒い君主だ！"
10037080-53 = "聡明で鋭敏だが、偏狭で愚劣なる者。"
10037080-54 = "統治し君臨すれども、傲慢で稚拙な者。"
10037080-58 = "己の未熟さには気づくが、"
10037080-59 = "それを克服するほどの勇気は無い者だ！"
10037080-64 = "…………は？今なんて？"
10037080-65 = "しっ！声が大きい！……聞き間違いじゃないよね？"
10037080-66 = "古典の引用なの、かな……？うーん、もうちょっと聞いてみるか……。"
10037080-67 = "でも、いくらなんでも露骨すぎない……？#n黒い君主って言ってたよね……。"
10037080-69 = "[ruby=わらわ]妾、[/ruby]黒い君主が告げる。"
10037080-70 = "隠されし争いは庭を覆い、隠されし恨みは屋根をも貫く。"
10037080-71 = "閉ざされた門戸を開き、新しい風を巻き起こす。"
10037080-72 = "それが妾の道――皆はこれに従うのじゃ。"
10037080-77 = "（……！？閉ざされた門戸を開き、新しい風を巻き起こす……？）"
10037080-78 = "（マズいのだ……他の生徒はどう思うのだ？）"
10037080-85 = "（玄龍門の生徒は他の生徒たち以上に、京劇に詳しいのに……）"
10037080-86 = "（カグヤ……一体何を考えているのだ！？）"
10037080-88 = "お許しください！お許しください！"
10037080-89 = "道義に反する者には処罰が下る。"
10037080-90 = "天の力の前では、人はか弱い存在に過ぎぬ。"
10037080-91 = "人の力では成す術などありませぬ。"
10037080-93 = "泰平の中で、危機を憂い、"
10037080-94 = "危機の中で、再び泰平を思ふ。"
10037080-95 = "天地の調和は、予測できぬものなり。"
10037080-96 = "巻き起こした風で不和を間引き、力で押しつぶす。"
10037080-98 = "見よ、人の知恵とはかくも短慮で――"
10037080-99 = "知謀を誇示する者ほど、愚かであろう。"
10037080-100 = "身に余る至福、理由なき幸運に警戒せよ。"
10037080-101 = "欲に目が眩めば、たちまちに呑まれるであろう。"
10037080-103 = "え、ちょっと……京劇部、どうしたんだ！？"
10037080-104 = "門主様に不満でもあるの？そうだとしても、訪問客が居ない時にやればいいのに……。"
10037080-105 = "もしかして……訪問客を連れてきたからじゃない！？"
10037080-106 = "そう、かもしれないね……#nそもそも他学園の生徒を招待したのが悪いんじゃ……？"
10037080-108 = "見よ、黒い君主は新しき風を起こした。"
10037080-109 = "閉ざされた門戸は開き、塵が世を覆う。"
10037080-110 = "水流は風に打ち勝てず、稲穂は[ruby=こうがい]蝗害[/ruby]に遭う。"
10037080-115 = "傲慢なる者は顧みず、大地は涙に濡れるだろう！"
10037080-120 = "（……！）"
10037080-121 = "（カグヤが、妾を……？皆の前で……！？）"
10037080-127 = "（うっ……まだ痛みが。じゃが……）"
10037080-133 = "妾、黒い君主がもう一度告げよう。"
10037080-134 = "山は高さを厭わず、海は深さを厭わぬもの。"
10037080-135 = "地は風を歓迎し、天は雲を包む。"
10037080-136 = "妾が天下を背くとも、天下は妾に背かせぬ！"
10037080-137 = "お許しください！どうか民をお思いください。"
10037080-138 = "[ruby=せいき]生起[/ruby]を知り、始まれば終わりを思うに――"
10037080-139 = "諫言を受けるのも、存続の為でしょう。"
10037080-140 = "目先の利益に囚われ民を失って、何の意味があるのでしょう！"
10037080-145 = "黒い君主とかいう役、なかなか気概があるな！#nうむ、指導者とはああでなければな！"
10037080-146 = "それに比べて、あの臣下は一体何を言っているんだ？"
10037080-147 = "うむ！やはり偉大な指導者の志は、愚鈍な臣下には理解されないのだな！#nそうは思わないか、キサキ門主！"
10037080-153 = "ん？顔色が悪いようだが……大丈夫か？"
10037080-157 = "ああ……案ずるでない、チェリノ書記長。"
10037080-158 = "（カグヤ、[ruby=そなた]其方[/ruby]はそこまで此度の交流会が気に食わなかったのか）"
10037080-159 = "（いいや……これは、京劇の形をした諫言……？）"
10037080-161 = "黒い君主が風を起こすと。"
10037080-162 = "天から暴雨が降り、川は氾濫する。"
10037080-163 = "海は荒波が立ち、竜巻が起きる。"
10037080-165 = "雷が鳴れば、大地は民の嘆きで覆い尽くされた！"
10037080-170 = "なぁ……私たち、何を聞かされてるんだ……？"
10037080-171 = "でも、門主様がレッドウィンターを招待したのは事実だし……。"
10037080-172 = "別に彼女らは騒ぎを起こしたりしてなくないか？"
10037080-173 = "いや……あの劇の内容も、何となく分かる気がするよ。#n「蟻の穴から堤も崩れる」って言うだろ？"
10037080-174 = "じゃあ……レッドウィンターの訪問客を始めとして、#n門主様はどんどん外部の人間を迎え入れるつもりって話？"
10037080-175 = "そう、ならないことを、願ってるけど……。"
10037080-176 = "前[ruby=まんねんじん]の萬年参事[/ruby]件の時も思ったけど、#n門主様って本当に山海経の伝統を重んじているのかな……。"
10037080-177 = "し、しぃーっ！声が大きい！"
10037080-178 = "ち、小さい声で話してるじゃん……。"
10037080-183 = "涙は川を成し、怨は天を衝く。"
10037080-184 = "良薬は口に苦し。"
10037080-185 = "諫言耳に逆らう。"
10037080-186 = "今からでも過ちを認め、正しい道を辿れば――"
10037080-187 = "まだ元通りにできるはずでありましょう。"
10037080-189 = "妾は間違っておらぬ！其方らを罰してやろう！"
10037080-191 = "どうかお許しください！"
10037080-192 = "[ruby=えんじゃく]燕雀[/ruby][ruby=いず]安[/ruby]くんぞ[ruby=こうこく]鴻鵠[/ruby]の志を知らんや！"
10037080-193 = "雀も鳳も、同じ命であります！"
10037080-198 = "（うわ……！）"
10037080-199 = "（カグヤ、一体何を考えているのだ……！いや、それより……）"
10037080-205 = "（玄龍門の構成員の空気が……これはマズいのだ！）"
10037080-206 = "（直接メッセージとして伝えれば良かったものを……！）"
10037080-207 = "（劇という形で批判するだなんて……しかもこんな公の場で……！）"
10037080-208 = "（早く、門主をこの場から避難させるのだ！）"
10037080-214 = "……炎が描かれた旗を持って、役者が舞台を走り回っていますね。"
10037080-215 = "あれは……世が火の海になっているのを意味するのでしょうか。"
10037080-216 = "今度は流れる水が描かれた旗を……。"
10037080-217 = "……これは、洪水でしょうか。"
10037080-218 = "雷に蝗害……今度はあらゆる災難が起きている様子を現していますね。"
10037080-224 = "（もしかして、と思ってずっと注視していましたが）"
10037080-228 = "（……これは、レッドウィンターで言うところのクーデターですね）"
10037080-230 = "――策士策に溺れる。"
10037080-231 = "君主とは本来、天下を正しく治めるものなり。"
10037080-232 = "貪欲と愚鈍のあまり、ついに天にも逆らってしまった。"
10037080-233 = "民が嘆いたところで、一体何が変わると言うのか。"
10037080-235 = "天にも逆らった、だと……？#nこれは、さすがに……。"
10037080-236 = "……でも、カグヤの言いたいことは分かるよ。"
10037080-237 = "おい……私たちの門主様なんだぞ？"
10037080-238 = "そうなんだけどさ……"
10037080-243 = "仮に、門主様が本当に……山海経の伝統を守るつもりが、無かったとしたら……？"
10037080-244 = "たらればを言ってもしょうがないでしょ……！"
10037080-246 = "見よ。あれが、我らの住処だ。"
10037080-247 = "草木が生い茂り、"
10037080-248 = "山の動物が庭に足を運ぶ。"
10037080-249 = "雉ですら、ここを立ち去っていく。"
10037080-250 = "雑穀を掻き集め、食い扶持をつなぎ。"
10037080-251 = "庭の雑草で汁を作り、ひたすらに水を足す。"
10037080-252 = "茶に染まった食卓、"
10037080-253 = "共に語らう者など居らず。"
10037080-255 = "ああ……なんて悲惨な状況だ。"
10037080-256 = "一緒に食事をする人も居なくなってしまうなんて……。"
10037080-260 = "もし、あれが山海経の未来だとしたら……？"
10037080-261 = "そ、そんな、わけ……ないだろう……！？"
10037080-262 = "ほら、言い切れる自信があるの？"
10037080-268 = "皆、聞くが良い。常に謙遜し、精進せよ。"
10037080-269 = "受け継がれてきたものには、それ相応の理由がある。"
10037080-273 = "昨日を振り返ることは明日に繋がるのだ。"
10037080-274 = "それらを蔑ろにしてしまえば、いずれは天罰が下るであろう。"
10037080-275 = "そして、このような事が起きぬよう――"
10037080-279 = "――山海経の伝統の名のもと、玄龍門の門主、[ruby=りゅうげ]竜華[/ruby]キサキを糾弾するっ！"
10037080-288 = "……っ！"
