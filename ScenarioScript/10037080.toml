[translation]
10037080-1 = "Episódio 8; Ouvindo a voz da marionete"
10037080-3 = "Apresentar uma nova ópera de Pequim... que ideia inovadora."
10037080-4 = "Bem, a peça anterior também foi boa, então... vamos ficar na expectativa!"
10037080-5 = "Ah, eu também estou ansiosa. Faz tempo que Kaguya não demonstra tanto entusiasmo assim."
10037080-6 = "Sim! Já estou começando a me acostumar com essa melodia!"
10037080-7 = "Os atores vestindo armaduras, um após o outro...!"
10037080-11 = "Oh, o protagonista desta vez está usando uma armadura preta!#nEstou começando a entender os detalhes aos poucos!"
10037080-12 = "Fufu, isso é bom."
10037080-22 = "A vida é como um sonho."
10037080-25 = "Como se deve aproveitar essa vida?"
10037080-26 = "Deitar-se ao lado do pilar――"
10037080-27 = "Acordar subitamente e caminhar pelo jardim."
10037080-29 = "Entre as flores, um pássaro gorjeia."
10037080-31 = "Pergunto-me, que horas são agora?"
10037080-32 = "O som do rouxinol, como a brisa da primavera."
10037080-34 = "Cantando de forma fluida, enquanto aguardo a lua!"
10037080-39 = "O prólogo, como sempre, começa com uma cena cantando sobre as paisagens do mundo..."
10037080-40 = "É o padrão da ópera de Pequim, afinal."
10037080-41 = "Se não me engano, desta vez foi a diretora Kaguya quem escreveu a peça, não foi?"
10037080-42 = "Escrever tudo em apenas alguns dias, é incrível."
10037080-47 = "Uma névoa leve sobe sobre a superfície do lago――"
10037080-48 = "A luz do sol brilha intensamente. Ah, este ano também teremos uma colheita farta."
10037080-49 = "Não há mais nada a desejar―― o mundo está em paz."
10037080-50 = "O dragão e a fênix trazem bons presságios."
10037080-52 = "Vejam! É o monarca negro!"
10037080-53 = "Alguém inteligente e perspicaz, mas também mesquinho e tolo."
10037080-54 = "Alguém que governa e reina, mas é arrogante e imaturo."
10037080-58 = "Alguém que percebe a própria imaturidade,"
10037080-59 = "mas não tem coragem suficiente para superá-la!"
10037080-64 = "............Hã? O que foi que ele disse?"
10037080-65 = "Shii! Fale baixo! ...Não foi um erro de audição, foi?"
10037080-66 = "Será que é uma citação clássica...? Hmm, vou ouvir um pouco mais..."
10037080-67 = "Mas, por mais que seja, não está explícito demais...?#nEle disse 'monarca negro', não disse..."
10037080-69 = "Eu, o monarca negro, declaro."
10037080-70 = "Conflitos ocultos cobrem o jardim, e ressentimentos ocultos atravessam até o telhado."
10037080-71 = "Abrirei os portões fechados e trarei um novo vento."
10037080-72 = "Esse é o meu caminho―― todos devem seguir isso."
10037080-77 = "(...!? Abrir os portões fechados e trazer um novo vento...?)"
10037080-78 = "(Isso é um problema... O que as outras alunas vão pensar?)"
10037080-85 = "(As alunas da Genryumon conhecem a ópera de Pequim melhor do que ninguém...)"
10037080-86 = "(Kaguya... O que exatamente você está pensando!?)"
10037080-88 = "Por favor, perdoe-me! Por favor, perdoe-me!"
10037080-89 = "Aqueles que agem contra a moralidade serão punidos."
10037080-90 = "Diante do poder dos céus, os humanos são apenas seres frágeis."
10037080-91 = "Não há nada que o poder humano possa fazer."
10037080-93 = "Em tempos de paz, preocupar-se com a crise,"
10037080-94 = "e em tempos de crise, pensar novamente na paz."
10037080-95 = "A harmonia entre o céu e a terra é algo imprevisível."
10037080-96 = "Eliminar a discórdia com o vento que se levantou e esmagar tudo com força."
10037080-98 = "Vejam, a sabedoria humana é tão míope――"
10037080-99 = "Quanto mais alguém ostenta sua astúcia, mais tolo ele é."
10037080-100 = "Cuidado com a felicidade excessiva e a sorte sem motivo."
10037080-101 = "Se seus olhos forem cegados pela ganância, você será engolido num instante."
10037080-103 = "Ei, espera... O que aconteceu com o Clube de Ópera de Pequim!?"
10037080-104 = "Estão insatisfeitas com a Mestra do Portão? Mesmo que estivessem, poderiam fazer isso quando não houvesse visitantes..."
10037080-105 = "Será que... não é porque trouxemos visitantes!?"
10037080-106 = "É, pode ser... #nMas, afinal, não foi um erro convidar alunas de outra escola...?"
10037080-108 = "Vejam, o Monarca Negro trouxe um novo vento."
10037080-109 = "Os portões fechados se abriram, e a poeira cobre o mundo."
10037080-110 = "O fluxo da água não vence o vento, e as espigas de arroz sofrem com a praga de gafanhotos."
10037080-115 = "Aquele que é arrogante não olha para trás, e a terra se banhará em lágrimas!"
10037080-120 = "(...!)"
10037080-121 = "(Kaguya, está me... confrontando? Na frente de todos...!?)"
10037080-127 = "(Ugh... a dor ainda persiste. Mas...)"
10037080-133 = "Eu, o Monarca Negro, direi mais uma vez."
10037080-134 = "A montanha não se importa com sua altura, e o mar não se importa com sua profundidade."
10037080-135 = "A terra acolhe o vento, e o céu abraça as nuvens."
10037080-136 = "Mesmo que eu me oponha ao mundo, o mundo não me fará opor a ele!"
10037080-137 = "Por favor, perdoe-me! Pense no povo, eu lhe imploro."
10037080-138 = "Conhecendo o surgimento, ao começar, pense no fim—"
10037080-139 = "Aceitar conselhos também é para a sua própria sobrevivência."
10037080-140 = "De que adianta perder o povo por estar presa a ganhos imediatos!"
10037080-145 = "Esse papel de Monarca Negro tem bastante espírito! #nSim, um líder deve ser exatamente assim!"
10037080-146 = "Comparado a isso, o que aquela súdita está dizendo, afinal?"
10037080-147 = "Sim! Como esperado, as aspirações de um grande líder não são compreendidas por súditos tolos! #nNão acha, Mestra Kisaki?"
10037080-153 = "Hm? Você está com uma aparência pálida... está bem?"
10037080-157 = "Ah... não se preocupe, Secretária-Geral Cherino."
10037080-158 = "(Kaguya, você estava tão insatisfeita com este intercâmbio?)"
10037080-159 = "(Não... isso é um conselho disfarçado de ópera...?)"
10037080-161 = "O Monarca Negro traz o vento."
10037080-162 = "Uma tempestade cai do céu e o rio transborda."
10037080-163 = "O mar levanta ondas violentas e tornados surgem."
10037080-165 = "Quando o trovão ruge, a terra é coberta pelos lamentos do povo!"
10037080-170 = "Ei... o que estamos ouvindo...?"
10037080-171 = "Mas é verdade que a Mestra convidou Red Winter..."
10037080-172 = "Elas não causaram nenhum problema, não é?"
10037080-173 = "Não... acho que entendo o conteúdo da peça. #nComo dizem, 'um pequeno furo pode afundar um grande navio', não é?"
10037080-174 = "Então... começando com as visitantes de Red Winter, #na Mestra pretende continuar trazendo pessoas de fora?"
10037080-175 = "Espero que não seja o caso..."
10037080-176 = "Pensei nisso na época do incidente do antigo Conselheiro, #nmas será que a Mestra realmente valoriza as tradições de Shanhaijing...?"
10037080-177 = "Shiii! Fale baixo!"
10037080-178 = "E-estou falando baixo..."
10037080-183 = "As lágrimas formam rios, e o ressentimento atinge o céu."
10037080-184 = "Bons remédios são amargos ao paladar."
10037080-185 = "Conselhos sinceros são difíceis de ouvir."
10037080-186 = "Se você reconhecer seus erros agora e seguir o caminho correto—"
10037080-187 = "Ainda deve ser possível restaurar as coisas como eram."
10037080-189 = "Eu não estou errada! Vou punir vocês!"
10037080-191 = "Por favor, perdoe-nos!"
10037080-192 = "Como poderiam as andorinhas e pardais compreender as aspirações de um cisne!"
10037080-193 = "Tanto o pardal quanto a fênix, possuem a mesma vida!"
10037080-198 = "（Uau...！）"
10037080-199 = "（Kaguya, o que exatamente você está pensando...! Não, mais importante que isso...）"
10037080-205 = "（O clima entre os membros da Genryumon está... isso é um desastre!）"
10037080-206 = "（Ela deveria ter transmitido isso como uma mensagem direta...!）"
10037080-207 = "（Criticar na forma de uma peça de teatro... e ainda por cima em um lugar público como este...!）"
10037080-208 = "（Rápido, preciso tirar a Mestra do Portão deste lugar!）"
10037080-214 = "……Os atores estão correndo pelo palco carregando bandeiras com chamas desenhadas."
10037080-215 = "Será que isso... significa que o mundo está se tornando um mar de fogo?"
10037080-216 = "Agora, eles trouxeram bandeiras com água corrente..."
10037080-217 = "……Isso seria uma inundação?"
10037080-218 = "Relâmpagos e pragas de gafanhotos... eles estão representando todos os tipos de desastres acontecendo agora."
10037080-224 = "（Eu estava observando atentamente porque tive um pressentimento）"
10037080-228 = "（……Isso é, usando os termos de Red Winter, um golpe de estado）"
10037080-230 = "――O estrategista que se afoga em sua própria estratégia."
10037080-231 = "Um monarca, por natureza, deve governar o mundo com retidão."
10037080-232 = "Por ganância e estupidez, acabou até mesmo desafiando os céus."
10037080-233 = "Agora que o povo lamenta, o que exatamente isso mudará?"
10037080-235 = "Desafiou até os céus, disse ela...?#nIsso, francamente..."
10037080-236 = "……Mas eu entendo o que a Kaguya quer dizer."
10037080-237 = "Ei... ela é a nossa Mestra do Portão, sabia?"
10037080-238 = "Eu sei, mas..."
10037080-243 = "E se, por acaso, a Mestra do Portão realmente... não tivesse a intenção de proteger as tradições de Shanhaijing...?"
10037080-244 = "Não adianta ficar falando de 'e se' agora...!"
10037080-246 = "Vejam. Aquele é o nosso lar."
10037080-247 = "Onde a vegetação cresce densa,"
10037080-248 = "e os animais da montanha visitam o jardim."
10037080-249 = "Até os faisões estão indo embora daqui."
10037080-250 = "Juntando grãos para sobreviver, lutando pelo sustento."
10037080-251 = "Fazendo sopa com as ervas daninhas do jardim, adicionando água sem parar."
10037080-252 = "Uma mesa manchada pelo chá,"
10037080-253 = "sem ninguém para conversar."
10037080-255 = "Ah... que situação miserável."
10037080-256 = "Chegar ao ponto de não ter mais ninguém para fazer as refeições juntos..."
10037080-260 = "Se aquilo for o futuro de Shanhaijing...?"
10037080-261 = "I-isso não tem... como ser verdade, certo...!?"
10037080-262 = "Ora, você tem confiança para afirmar isso?"
10037080-268 = "Todos, escutem bem. Sejam sempre humildes e dediquem-se."
10037080-269 = "Há uma razão apropriada para as coisas que foram herdadas."
10037080-273 = "Refletir sobre o ontem é o que nos conecta ao amanhã."
10037080-274 = "Se negligenciarmos essas coisas, eventualmente o castigo divino cairá sobre nós."
10037080-275 = "E, para que tal coisa não aconteça――"
10037080-279 = "――Em nome das tradições de Shanhaijing, eu denuncio a Mestra do Portão da Genryumon, Kisaki!"
10037080-288 = "……!"
