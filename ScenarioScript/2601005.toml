[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
2601005-1 = "A Forma do Céu" 
2601005-2 = "（Fui procurar a Miyu para admirarmos o céu juntos.）" 
2601005-5 = "Ué…… Sensei……?" 
2601005-6 = "Você pergunta o que eu estava fazendo aqui……?\nAhm, sobre isso……" 
2601005-7 = "Eu não estava fazendo nada em especial…… apenas observando o céu……" 
2601005-8 = "Uuuu……" 
2601005-9 = "É por causa daquele MomoTalk de agora há pouco, não é……\nEu não quis dizer nada…… com duplo sentido ou algo assim." 
2601005-10 = "Eu só…… queria te contar os meus pensamentos sobre este céu, Sensei……" 
2601005-11 = "Me desculpe…… Acabei sendo um incômodo, não é……" 
2601005-12 = "[s] \"Eu queria saber como você se sentia, Miyu.\"" 
2601005-13 = "Sendo assim…… venha até aqui, por favor." 
2601005-14 = "Sente-se neste cabeço de amarração, vamos admirar juntos……" 
2601005-15 = "……O céu e a linha do horizonte no mar." 
2601005-16 = "Fufu…… É uma vista tão comum que você vê em qualquer lugar, não acha?" 
2601005-17 = "No entanto…… para mim, é uma visão um pouco…… rara." 
2601005-18 = "Eu sempre estou escondida em pontos de tocaia estreitos ou aguardando em lugares escuros e isolados……" 
2601005-19 = "Mas aqui…… a visão é ampla, a brisa é agradável……\nSinto uma paz muito grande, além de que……" 
2601005-20 = "……O céu é tão amplo e vazio, é muito agradável." 
2601005-21 = "[s] \"Amplo e vazio……?\"" 
2601005-23 = "Sempre que olho para o céu, há tantas coisas bloqueando a minha visão……" 
2601005-24 = "Na cidade, há prédios imponentes por toda parte, e nas montanhas, as copas das árvores cobrem tudo, então……" 
2601005-25 = "O céu que eu conheço sempre foi embaçado e delimitado……" 
2601005-27 = "Mas... este céu tem uma linha do horizonte que parece ter sido traçada perfeitamente reta com uma régua." 
2601005-28 = "Sinto que, sob um céu desses, eu conseguiria acertar qualquer alvo com perfeição……" 
2601005-29 = "……Eu mesma achei estranho, mas, de repente, uma confiança enorme brotou em mim." 
2601005-30 = "Por isso, fiquei com muita vontade de voltar aqui algum dia, mesmo que só de vez em quando…… e acabei me empolgando……" 
2601005-31 = "E por impulso, enviei aquela mensagem para o Sensei……" 
2601005-32 = "……Foi difícil de entender, não foi?\nM-Me desculpe. Esqueça tudo o que eu di――" 
2601005-33 = "[s1] \"……É uma vista maravilhosa, Miyu.\"\n[s2] \"O que acha de virmos ver este céu juntos de novo na próxima?\"" 
2601005-36 = "N-Não foi…… Não foi isso que eu quis dizer, não era a minha intenção……!" 
2601005-37 = "Uuuu…… Eu sabia que não devia ter falado nada……" 
2601005-38 = "Eu devo estar parecendo…… uma garota muito mimada e egoísta para o Sensei……" 
2601005-39 = "[s3] \"Isso não é verdade.\"\n[s4] \"É porque eu também amo este céu.\"" 
2601005-42 = "É v-verdade……?" 
2601005-43 = "O Sensei também…… gosta mesmo dele……?" 
2601005-47 = "S-Se…… se for o caso……" 
2601005-48 = "Se o Sensei também…… gosta dessa vista……" 
2601005-49 = "Ahm…… então……" 
2601005-50 = "……N-Na próxima……" 
2601005-51 = "[s] \"Nós viremos aqui juntos de novo.\"" 
2601005-52 = "…………!!" 
2601005-53 = "……Ah." 
2601005-54 = "Auuu……" 
2601005-55 = "…………Sim." 
2601005-57 = "……É uma promessa... tá bom...?" 