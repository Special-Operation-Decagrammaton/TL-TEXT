[translation]
2601005-1 = "空の形"
2601005-2 = "（一緒に空を見たくて、ミユを探すことにした）"
2601005-5 = "あれ……先生……？"
2601005-6 = "ここで、何をしてたのか、と……？#nそれは、その……"
2601005-7 = "なにか特別なことをしていたわけではなく……こうして、空を眺めて……"
2601005-8 = "ううぅ……。"
2601005-9 = "やっぱり、さっきのモモトークのせいですよね……。#n特に……深い意味はなかったんです。"
2601005-10 = "ただ……その、空の感想を先生に伝えようと……"
2601005-11 = "すみません……迷惑でしたよね……。"
2601005-12 = "[s] \"ミユの気持ちを知りたかったんだ。\""
2601005-13 = "でしたら……こちらに来てください。"
2601005-14 = "そこのビットに座って、一緒に……"
2601005-15 = "……空と、海の水平線。"
2601005-16 = "ふふっ……何でもないような景色ですよね？"
2601005-17 = "ですが……私にとっては、少し……珍しかったんです。"
2601005-18 = "いつもは、狭い狙撃ポイントで待機したり、暗い場所に隠れてばかりいますが……"
2601005-19 = "ここは……視界が開けていて、風が心地よいですし……#nなんだか落ち着けて、それに……"
2601005-20 = "……余白があって、いいですね。"
2601005-21 = "[s] \"余白……？\""
2601005-23 = "いつも見上げる空は、視界を遮るものが多くて……"
2601005-24 = "街はビルが立ち並んでいますし、山は木々が広がっているので……"
2601005-25 = "私が見てきた空は、いつもぼやけていました……"
2601005-27 = "でも……この空は、定規で真っ直ぐ線を引いたような水平線が描かれています。"
2601005-28 = "こんな空の下でなら、どんなターゲットも撃ち抜けそうだな、と……"
2601005-29 = "……自分でも不思議ですが、ふと自信が湧いてきたんです。"
2601005-30 = "なので、またいつか、たまにでも来られたら……と名残惜しくて……"
2601005-31 = "つい、先生にメッセージを……。"
2601005-32 = "……よく分かりませんでしたよね。#nす、すみません。やっぱり何でも……"
2601005-33 = "[s1] \"……いい景色だね、ミユ。\"\n[s2] \"また今度、2人で見に来ようか。\""
2601005-36 = "そっ、そんな……別に、そういうつもりで言ったわけじゃ……！"
2601005-37 = "ううぅ……やっぱり、話さなければ……"
2601005-38 = "先生に……わがままを言ってるみたいじゃないですか……"
2601005-39 = "[s3] \"そんなことないよ。\"\n[s4] \"私も、この空が好きだから。\""
2601005-42 = "ほ、本当ですか……？"
2601005-43 = "先生も……本当に、好きなんです……か？"
2601005-47 = "も、もし……もしですが……"
2601005-48 = "先生も……この景色が、好き……なら……"
2601005-49 = "えっと……その……"
2601005-50 = "……い、いっ……"
2601005-51 = "[s] \"一緒に、また来ようね。\""
2601005-52 = "…………！！"
2601005-53 = "……ぁ。"
2601005-54 = "ぁぅぅ……。"
2601005-55 = "…………はい。"
2601005-57 = "……約束……ですよ……？"
