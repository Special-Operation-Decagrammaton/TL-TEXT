[translation]
1003420-1 = "大和撫子の本気"
1003420-3 = "ようこそいらっしゃいました、先生！"
1003420-4 = "今日は料理修行の成果をお見せしたくて……お時間をいただいた次第です。"
1003420-5 = "それでは、さっそく家庭科室に行きましょう！"
1003420-6 = "修行部室"
1003420-7 = "着きまし――"
1003420-8 = "って、なぜ家庭科室がこんなに散らかっているのですか！？"
1003420-23 = "料理の修行以外にも、食事の準備に使ってはいますが……一体どうして……"
1003420-24 = "ミモリちゃん……あ、シャーレの先生もいらしてるんですね、こんにちは。#nそれが……昨日の夜、魑魅一座がここでお祭りを開いたみたいで……"
1003420-25 = "今から片付けても時間がかかっちゃうだろうから、今日は使えないかも……"
1003420-26 = "……"
1003420-27 = "いえ、大丈夫です。"
1003420-44 = "ミモリちゃん！？"
1003420-45 = "今から片付けます。#nこの程度であれば、すぐに終わりますから。"
1003420-46 = "[s] \"そうだね。一緒にやれば、すぐに終わるよ。\""
1003420-47 = "えっ！？そんな……先生のお手を煩わせるわけには……"
1003420-48 = "私がやりますので……お任せください！ここは私たち修行部の家庭科室ですから。片付ける場所や手順も慣れておりますので。"
1003420-49 = "それに……大和撫子たるもの、魑魅一座がここでお祭りを開くことくらい事前に察知しておくべきで……"
1003420-50 = "事前に現場を押さえ、ちゃんと片付けておかなければならなかったところです！"
1003420-51 = "[s] \"それは大和撫子かな！？\""
1003420-52 = "で、ですが……"
1003420-53 = "私が事前に準備をしておかなかったから、こうなってしまったんです……"
1003420-54 = "それなのに、先生にご迷惑をおかけしてしまうのは……"
1003420-55 = "[s1] \"気にしないで、ミモリ。\"\n[s2] \"私がミモリを助けたいんだ。\""
1003420-58 = "……。"
1003420-59 = "先生がそこまで仰るのなら……"
1003420-60 = "……よろしくお願いします、先生。"
1003420-61 = "それでは、大分お時間をいただいてしまったので……"
1003420-62 = "私、[ruby=みずは]水羽[/ruby]ミモリは修行部の副部長として……"
1003420-63 = "今日は一段と気合を入れて！本気でとりかからせていただきます！"
1003420-64 = "[s] \"いつも頑張ってくれているのに更に！？\""
1003420-65 = "はい！#n素敵な大和撫子になるには、常に向上心を持って臨まなければなりませんから！"
1003420-66 = "ですので、今日は……「アレ」を使います！"
1003420-73 = "[ns] \"え、エプロン！？\""
1003420-74 = "それでは、参ります！"
1003420-77 = "（本気モード(？）のミモリに圧倒されてしまい、私の出番はなかった……)"
1003420-84 = "ふぅ……お疲れ様でした、先生。"
1003420-85 = "え？ほとんど私が片付けてしまった？"
1003420-86 = "ふふっ、先生がいてくださったおかげです。"
1003420-87 = "ですが……そうですね。#nもしかしたら、これのおかげもあるかもしれません。"
1003420-92 = "……似合っていた、なんてそんな。"
1003420-93 = "も、もう……先生ったら、からかわないでください。"
1003420-94 = "からかっているわけではないのですか……？"
1003420-95 = " ……。"
1003420-96 = "つ、疲れていらっしゃるのかもしれませんね。#nまずは場所を変えましょうか！はい、こちらへどうぞ！"
1003420-99 = "しばらくお待ちくださいね。お茶をご用意しますので。"
1003420-112 = "……どうぞ。#nせっかくなので、和菓子もお持ちしました。"
1003420-113 = "実は……この和菓子を作っている姿をお見せしたかったのですが……"
1003420-120 = "……どう、でしょうか？お口に合いましたか？"
1003420-121 = "[s] \"とても美味しいよ。お茶も良い香りだね。\""
1003420-122 = "ふふっ、良かったです。"
1003420-123 = "え？このエプロン、ですか？"
1003420-124 = "……。"
1003420-125 = "これは……私が初めて、漫画を読んで理想の自分を夢見たときに買ったエプロンです。"
1003420-126 = "ずっと、ずっと大切にしてきた……私の宝物。"
1003420-127 = "[s] \"新品なのかと思ったけど……\""
1003420-128 = "ふふ、そうですか？#nよく見ると毛玉ができてますし、細かい部分を繕った跡もあるんですよ。"
1003420-129 = "ですが、私にとって……これは何物にも代えがたいエプロンなんです。"
1003420-130 = "着心地も良いですし、何よりこれを着ていると安心感が……"
1003420-131 = "掃除に洗濯、料理、裁縫、読心……何でもできる気がしてくるんです。"
1003420-132 = "[s] \"……読心？\""
1003420-133 = "あっ、そ、その！"
1003420-134 = "いえ！読……読書です！"
1003420-136 = "（何度か読心について訊ねてみたが、すぐに話を逸らされてしまった……）"
1003420-138 = "ずっと昔に買ったものなので、当時は裾を折らないと引きずってしまうほどでした。"
1003420-139 = "ですが……このエプロンが似合う頃には、きっと夢に近づいているはずだ、と。#nそう自分に言い聞かせて修行を続けていたんです。"
1003420-140 = "ふふっ……懐かしいですね。今思い返すと、少し恥ずかしくもありますが。"
1003420-141 = "[s] \"恥ずかしがらなくていいと思うよ。\""
1003420-142 = "そう……でしょうか？"
1003420-143 = "あの頃の私は、どんなことでも成し遂げられると思っていました。"
1003420-144 = "こうして、エプロンはちょうど良いサイズになりましたが……"
1003420-145 = "幼い私が夢見た姿になれているのかは……よく分かりません。"
1003420-147 = "（ミモリは十分頑張っているよ、と言おうとした瞬間――）"
1003420-148 = "あ、先生。今、「十分頑張っているよ」って言おうとしませんでしたか？"
1003420-149 = "[s] \"なんで分かったの！？\""
1003420-150 = "ふふっ。先生ならそう言ってくださるだろうな、という信頼……でしょうか？"
1003420-151 = "[s3] \"やっぱり、そのエプロンに何か秘密が！？\"\n[s4] \"エプロンと一緒だから、いつも以上の読心力が！？\""
1003420-154 = "は、はい！？私はそんなこと言っていませんが……！"
1003420-158 = "「全てを理解した」みたいな表情で見つめられても……！"
1003420-159 = "先生？先生？？"
1003420-161 = "（その後、ミモリと一緒にお茶を楽しんで過ごした）"
