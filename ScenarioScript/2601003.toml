[translation]
2601003-1 = "Como guardar memórias"
2601003-3 = "（Enquanto caminhava para espairecer, vi Miyu andando de um lado para o outro na beira da praia）"
2601003-9 = "[ns1] \"Bom dia, Miyu.\"\n[ns2] \"O que está fazendo aqui?\""
2601003-13 = "……Ah, o quê……?#nSe, Sensei…… por que você está aqui……?"
2601003-14 = "Entendo, você me viu de longe……"
2601003-15 = "Eu estava, bem, como sempre…… sabe……"
2601003-16 = "……Estava catando pedrinhas."
2601003-17 = "[s] \"Encontrou a pedra que queria?\""
2601003-18 = "Não é como se eu estivesse procurando algo específico……#nmas elas são bem diferentes das pedrinhas que vemos na montanha."
2601003-19 = "O formato, a textura, o toque…… cada uma tem sua própria personalidade……"
2601003-20 = "Já que vim até a praia…… pensei que seria legal levar algumas pedras bonitas para casa……"
2601003-21 = "Acabei me distraindo tanto que…… sinto muito por ter te preocupado, Sensei……"
2601003-22 = "……Eh, você quer procurar comigo, Sensei?"
2601003-23 = "Não acho que seja algo interessante, e elas não têm valor algum, então por que……"
2601003-24 = "[s3] \"Porque é algo que você gosta, Miyu.\"\n[s4] \"É a chance de encontrar as pedrinhas favoritas da Miyu!\""
2601003-27 = "N-não precisa se incomodar tanto……"
2601003-28 = "Mas…… já que você insiste……"
2601003-29 = "P, por favor……."
2601003-31 = "（Depois disso, andei por toda parte com a Miyu para coletar pedrinhas）"
2601003-32 = "（Procurei pedras que parecessem agradar a Miyu, com um charme simples e discreto, e as juntei em um só lugar）"
2601003-34 = "Acho que já cobrimos quase toda essa área.#nHmm……"
2601003-35 = "……Você encontrou alguma coisa, Sensei……?"
2601003-36 = "[s] Entrego as pedrinhas que coletei."
2601003-37 = "Ah, muito obrigada……."
2601003-41 = "……！！"
2601003-42 = "Sensei……!#nPo…… por que você encontrou pedras tão perfeitas……！！"
2601003-43 = "Sim, é essa……! Era exatamente esse tipo de pedra que eu estava procurando!#nO tamanho, a aparência……!"
2601003-44 = "Ah, espere……? Essa aqui também foi você quem encontrou?#nUau, que linda……"
2601003-45 = "E, eh…… essa também…… ah, e aquela ali!"
2601003-46 = "…………."
2601003-47 = "……Sensei……"
2601003-48 = "Por acaso…… você já trabalhou como \"avaliador\" em algum lugar……?"
2601003-49 = "[s5] \"Não. Mas fico feliz que tenha gostado.\"\n[s6] \"Ver você feliz faz todo o esforço valer a pena.\""
2601003-52 = "Sim…… todas são realmente maravilhosas…… estou até em dúvida sobre qual levar……."
2601003-53 = "Por exemplo…… esta pedrinha provavelmente foi desgastada pelas ondas, ficando com um formato médio, comum em qualquer lugar……"
2601003-54 = "Esta aqui…… tem uma cor avermelhada rara, como se tivesse sido pintada, mas ainda assim tem uma atmosfera misteriosa que se mistura ao ambiente……"
2601003-55 = "Esta outra tem um formato que chama a atenção por algum motivo, mas me lembra as pedras que encontramos em parques……"
2601003-56 = "[s] \"Pedrinhas são fascinantes, não é?\""
2601003-57 = "Uuu…… qual será que eu escolho……."
2601003-58 = "……Se, Sensei…… você poderia escolher por mim?"
2601003-62 = "[ns7] \"……Entendido, deixe comigo.\"\n[ns8] Escolho a pedrinha que parece agradar a Miyu."
2601003-66 = "（Assim, fiquei de frente para a Miyu e observamos juntos as pedras alinhadas no chão）"
2601003-73 = "（……Como não conseguimos decidir nem mesmo quando o sol se pôs, decidimos levar todas as pedrinhas que coletamos hoje）"
