[translation]
2601003-1 = "思い出を残す方法"
2601003-3 = "（気晴らしに散歩をしていたら、ぴょこぴょこ動き回っているミユを海辺で見かけた）"
2601003-9 = "[ns1] \"おはよう、ミユ。\"\n[ns2] \"ここで何してるの？\""
2601003-13 = "……あ、あれ……？#nせ、先生……どうしてここに……？"
2601003-14 = "なるほど、遠くから私の姿が見えて……"
2601003-15 = "私は、えっと、いつものように……その……"
2601003-16 = "……小石を、拾ってました。"
2601003-17 = "[s] \"お目当ての石は見つかった？\""
2601003-18 = "特に目当てがあるわけではないのですが……#n山で見かける小石とは、全然違いますね。"
2601003-19 = "形もそうですし、模様や触り心地にも……それぞれ個性があって……"
2601003-20 = "せっかく海辺に来たことですし……綺麗な石を何個か拾っていけたらいいな～と……"
2601003-21 = "それで夢中に……つい、先生に心配をかけてしまったようで、ごめんなさい……"
2601003-22 = "……えっ、先生も一緒に探したいんですか？"
2601003-23 = "特に面白くないと思いますし、価値があるわけでもないのに、どうして……"
2601003-24 = "[s3] \"ミユの好きなものだからね。\"\n[s4] \"ミユの好きな小石を探すチャンスだ！\""
2601003-27 = "そ、そこまでしていただかなくても……"
2601003-28 = "でも……せっかく、そう言ってくれるのなら……"
2601003-29 = "お、お願いします……。"
2601003-31 = "（その後、ミユと一緒にあちこち回って小石集めをした）"
2601003-32 = "（ミユの好きそうな、控えめながらも素朴な魅力のある石を探して、一か所に集めておいた）"
2601003-34 = "これで、この辺りは大体回った気がします。#nうーん……"
2601003-35 = "……先生は、何か見つけましたか……？"
2601003-36 = "[s] 集めておいた小石を渡す。"
2601003-37 = "あ、ありがとうございます……。"
2601003-41 = "……！！"
2601003-42 = "先生……！#nど……どうして、こんなにもピッタリな小石を……！！"
2601003-43 = "はい、これです……！まさに、こんな石を探していたんです！#n大きさも、見た目も……！"
2601003-44 = "あ、あれ？……これも、先生が見つけたんですか？#nわぁっ、すっごく綺麗……"
2601003-45 = "え、えっ……これも……あっ、こっちも！"
2601003-46 = "…………。"
2601003-47 = "……先生……"
2601003-48 = "ひょっとして……どこかで「鑑定士」をされていたり……。"
2601003-49 = "[s5] \"ううん。でも、気に入ってくれたなら良かった。\"\n[s6] \"ミユが喜んでくれて、頑張った甲斐があったよ。\""
2601003-52 = "はい……どれも本当に素敵で……何を持っていこうか悩んでしまいます……。"
2601003-53 = "たとえば……この小石は、たぶん波の影響で削られて、大きさや色合いがどこにでもある平均的な形に……"
2601003-54 = "こっちは……ペンキを塗られたような赤みの珍しい色をしていますが、それでも周りに溶け込む不思議な雰囲気で……"
2601003-55 = "これなんかは、なぜか目を引く形をしていますが、公園にもあるような石を思わせて……"
2601003-56 = "[s] \"小石は奥が深いね……。\""
2601003-57 = "うぅ……どれにしようかな……。"
2601003-58 = "……せ、先生……代わりに、選んでいただけますか？"
2601003-62 = "[ns7] \"……分かった、私に任せて。\"\n[ns8] ミユが気に入ってくれそうな小石を選ぶ。"
2601003-66 = "（そうして、ミユと向かい合い、地面に並べた石を一緒にジッと見つめた）"
2601003-73 = "（……日が暮れても決められず、今日のところは集めた小石を全て持ち帰ることにした）"
