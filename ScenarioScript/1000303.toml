[translation]
1000303-1 = "O segredo da bolsa"
1000303-2 = "Academia Trinity - Pátio da Escola"
1000303-3 = "Lun, lun-lun~♪ Lun-lun, lun-lun~♬"
1000303-4 = "Ah, Sensei!"
1000303-6 = "Aaah!"
1000303-9 = "Ai, ai, ai, ai..."
1000303-10 = "[s] \"Você está bem?\""
1000303-11 = "Ehehe... e-estou bem, sim. Eu sou um pouco desastrada, então já estou acostumada a cair!"
1000303-12 = "Mas é estranho. Não tinha nenhuma pedra por aqui que pudesse me fazer tropeçar, então perder o equilíbrio do nada..."
1000303-13 = "[s] \"A bolsa não está pesada demais?\""
1000303-14 = "Esta bolsa do Peroro-sama? É, talvez você tenha razão."
1000303-15 = "Ultimamente tenho colocado tanta coisa nela que ficou pesada a ponto de quase me desequilibrar... eu estava pensando em organizar tudo logo."
1000303-16 = "Já que estou aqui, acho que vou aproveitar para organizar agora..."
1000303-19 = "[ns] \"...E isso aqui?\""
1000303-20 = "Ah, o Sensei ficou curioso com isso também! São curativos especiais com o rosto do Peroro-sama estampado!"
1000303-21 = "Se um amigo se machucar, seria um problema não ter um curativo à mão, não é?"
1000303-22 = "Por isso, sempre carrego um conjunto na minha bolsa!"
1000303-25 = "[ns] \".........E isso?\""
1000303-26 = "Ah, isso é uma almofada em formato do Big Brother-sama!"
1000303-27 = "Ela é cheia de penas por dentro, então é super macia ao toque."
1000303-28 = "Quando sento nos bancos do parque, coloco nas costas para ficar mais confortável!"
1000303-31 = "[ns] \"............E isso?\""
1000303-32 = "Esse é um guarda-chuva dobrável com a Pinky Paka estampada!"
1000303-33 = "A previsão do tempo não dizia que ia chover hoje, mas às vezes a previsão erra, não é?"
1000303-34 = "Para esses momentos, acho que um guarda-chuva é essencial!"
1000303-36 = "Hmm... tentei organizar pensando se havia algo desnecessário, mas tudo aqui é importante."
1000303-43 = "Não tem jeito, vou ter que continuar carregando essa bolsa pesada por enquanto..."
1000303-44 = "[s] \"Você é do tipo que se prepara para tudo, Hifumi.\""
1000303-45 = "S-sério? Talvez você tenha razão, ehehe..."
1000303-46 = "Como sou uma pessoa comum, sinto que preciso me esforçar mais do que o normal para ser útil aos meus amigos."
1000303-47 = "Esta bolsa é o símbolo desse esforço!"
1000303-51 = "Ah, começou a chover de repente..."
1000303-52 = "Veja só, chegou a hora de usar. #nFufu."
1000303-53 = "Sensei, venha para baixo do guarda-chuva da Pinky Paka. Vamos, chegue mais perto."
1000303-55 = "Não precisa ficar com vergonha. Vamos, rápido!"
1000303-57 = "Depois disso, voltei para a estação dividindo o guarda-chuva com a Hifumi."
