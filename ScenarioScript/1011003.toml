[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
1011003-1 = "Acumulando Coisas que Não Estou Acostumada" 
1011003-5 = "Obrigada por se dar ao trabalho\nde vir até aqui, Sensei." 
1011003-6 = "Acho que nem preciso dizer isso,\nmas...#nnão tenho nenhum assunto oficial\nimportante para tratar." 
1011003-7 = "Por isso, tentei inventar\numa desculpinha gostosa..." 
1011003-13 = "E preparei isso aqui." 
1011003-14 = "[s1] \"...O que é isso?\"\n[s2] \"Nossa, que banquete incrível!\"" 
1011003-17 = "São doces que encomendei\npor meio do Tea Party." 
1011003-18 = "Mandei prepararem como um\nagrado para você, Sensei." 
1011003-19 = "Chamar você com a desculpa de uma 'visita',\nmas na verdade o objetivo ser 'te mimar'...#nentendo que é uma espécie\nde contradição." 
1011003-20 = "Ainda assim, você já devia ter percebido\npelo menos uma parte quando veio até aqui, não?" 
1011003-21 = "Sendo assim――já que está aqui, não acha que\nser bem servido por mim é um belo de um bônus?" 
1011003-22 = "Bem, chega de conversas em pé.\nPode se senta――" 
1011003-28 = "Isso na sua mão é...?" 
1011003-29 = "[s3] \"Uma lembrancinha pra você.\"\n[s4] \"Chegou numa ótima hora.\"" 
1011003-32 = "...Estou surpresa." 
1011003-33 = "Sensei, você já sabia que a visita\nera apenas uma 'desculpa', não sabia?" 
1011003-34 = "E mesmo assim, trouxe um presente\ncomo manda o figurino." 
1011003-35 = "Hmm, isso é..." 
1011003-39 = "Jamais imaginaria que\nvocê também traria doces." 
1011003-40 = "Ainda por cima de um tipo muito parecido\ncom os que eu preparei para nós." 
1011003-41 = "Entendo. Para adoçar as nossas\nconversinhas bobas, não é?" 
1011003-42 = "Nossa... desse jeito não vai caber\ntudo em cima da mesa." 
1011003-43 = "[s5] \"Eu imaginei que a Seia tivesse preparado algo, mas...\"\n[s6] \"Não esperava algo desse nível.\"" 
1011003-46 = "É mesmo?" 
1011003-47 = "Queria fazer uma surpresa picante, então\nquebrei a cabeça pensando nisso..." 
1011003-48 = "E, no fim das contas,\nacabamos trazendo a mesma coisa." 
1011003-49 = "As coisas nunca saem como planejado...\nAra, Sensei." 
1011003-50 = "Você parece estar bem feliz...\nPosso saber o motivo desse sorrisinho pervertido?" 
1011003-51 = "[s7] \"Não acha engraçado que nós dois tivemos a mesma ideia?\"\n[s8] \"No fim das contas, nós dois estávamos pensando um no outro.\"" 
1011003-57 = "...Sinceramente." 
1011003-58 = "Sabe... só você tem o dom de causar essas\nmudanças nos meus sentimentos\ncom palavras tão simples." 
1011003-59 = "Aquela frustração de antes desapareceu...\nOu melhor, diria que isso foi uma dádiva." 
1011003-60 = "Porque você já sabia, desde o começo,\nque a visita era apenas uma desculpa." 
1011003-61 = "Ah, sendo assim... Sim.\nSó de trocar palavras com você,\neu já me sinto plenamente satisfeita." 
1011003-62 = "Mas... pensando bem." 
1011003-63 = "Talvez eu esteja me tornando...\nAquilo que vocês adultos chamam de 'garota má'." 
1011003-64 = "Ah, mas não precisa se preocupar.#nEu ainda conheço os meus limites." 
1011003-65 = "Afinal, você é o único com quem\neu sou egoísta e atrevida desse jeito." 
1011003-66 = "Essa linha eu não vou cruzar. \nSe não as coisas sairiam do controle... não acha?" 
1011003-67 = "Essas foram as palavras\nque você queria ouvir?" 
1011003-68 = "[s9] \"Claro, eu nunca duvidei disso.\"\n[s10] \"É porque eu confio plenamente na Seia.\"" 
1011003-71 = "...Entendo." 
1011003-72 = "Como imaginei, forçar um pouco a barra para\npassar um tempo com você... vale muito a pena." 
1011003-73 = "...A nossa introdução acabou\nficando um pouco longa, né." 
1011003-77 = "[ns11] \"Ué?\"\n[ns12] \"Não vai comer os doces que eu trouxe?\"" 
1011003-80 = "Os doces que eu preparei já são para duas pessoas.#nSeria um desperdício colocar comida\nna mesa que a gente não vai dar conta, não é?" 
1011003-81 = "E além disso, hoje sou eu\nquem está servindo você, Sensei." 
1011003-82 = "Não se preocupe. Mais tarde, no meu cantinho,\neu vou saborear a sua lembrancinha bem devagarzinho..." 
1011003-83 = "Agora venha..." 
1011003-88 = "...Essa é a lei\naqui dentro do meu quarto." 
1011003-89 = "Afinal, sou eu..." 
1011003-91 = "Que dito as regras do que fazemos por aqui." 