[translation]
1011003-1 = "慣れないことを重ねて"
1011003-5 = "ご足労、手間をかけたね、先生。"
1011003-6 = "もはや言うのも野暮とは思うが……#nこれといって職務上大事な用がある訳ではないんだ。"
1011003-7 = "故に、理由をこじつけてみようと……"
1011003-13 = "こんなものを用意してみた。"
1011003-14 = "[s1] \"……これは？\"\n[s2] \"すごいのが出てきた！\""
1011003-17 = "ティーパーティー経由で取り寄せたお菓子だ。"
1011003-18 = "先生への労いとして手配させてもらった。"
1011003-19 = "「お見舞い」と称して呼び付けて、その実「先生の労い」である、のは……#n一種の自己矛盾であると理解している。"
1011003-20 = "とはいえ、ある程度は見抜いたうえでここまで来ているのだろう？"
1011003-21 = "であるならば――ついでに、もてなされたしても役得というものではないかな。"
1011003-22 = "さて、これ以上の立ち話もなんだ。席に――"
1011003-28 = "それは……？"
1011003-29 = "[s3] \"お土産だよ。\"\n[s4] \"ちょうどいいタイミングでね。\""
1011003-32 = "……驚いたな。"
1011003-33 = "先生は「口実」を察していたのだろう？"
1011003-34 = "それでも律儀にお見舞いの品を持って来てくれるとは。"
1011003-35 = "ふむ、これは……。"
1011003-39 = "まさか君もお菓子を持ってくるとはね。"
1011003-40 = "しかも私が用意していたものと種類まで似通っているときた。"
1011003-41 = "成程。他愛無い会話を彩るため、と。"
1011003-42 = "まったく……これでは机の上に乗りきらないかもしれないな。"
1011003-43 = "[s5] \"セイアなら何か準備してるかなって思ったけど……\"\n[s6] \"ここまでの物は予想外だったよ。\"  "
1011003-46 = "そうかい？"
1011003-47 = "せっかくのサプライズ。私なりに知恵を絞ってみたのだが……"
1011003-48 = "蓋を開けてみれば、用意した物が被ってしまった。"
1011003-49 = "どうにも、ままならない……おや、先生。"
1011003-50 = "喜んでいるように見えるけれど……理由を聞いてもいいかい？"
1011003-51 = "[s7] \"お互い同じことを考えてたなんて面白いと思わない？\"\n[s8] \"結局、互いに相手のことを思ってたってことだから。\" "
1011003-57 = "……まったく。"
1011003-58 = "同じ言葉でも、このように私の感情に変化を齎すのは君だけだろうね。"
1011003-59 = "些細な不満など吹き飛んでしまったよ……いや、僥倖というべきか。"
1011003-60 = "お見舞いなど口実に過ぎないと、最初から分かってくれていたのだから。"
1011003-61 = "ああ、であれば……そうだね。言葉を交わすだけでも満足だとも。"
1011003-62 = "だが……そうだね。"
1011003-63 = "少しばかり……君たちのいう「悪い子」に近づいているのやもしれない。"
1011003-64 = "ああでも、心配するほどではないよ、大丈夫。#n私にも立場があるからね。"
1011003-65 = "このような我儘をいうのは君にだけだとも。"
1011003-66 = "その境界線は、ちゃんと守るよ。そうでなければならないだろう？"
1011003-67 = "君が聞きたかった言葉はそれだけかな？"
1011003-68 = "[s9] \"もちろん、疑ったこともないよ。\"\n[s10] \"セイアを信じてるから。\""
1011003-71 = "……そうか。"
1011003-72 = "やはり先生と共に過ごす時は、無理を通してでも得る価値があるね。"
1011003-73 = "……前置きが長くなってしまったな。"
1011003-77 = "[ns11] \"あれ？\" \n[ns12] \"私の持ってきたお菓子は食べないの？\" "
1011003-80 = "私が用意していたお菓子は、端から二人分だ。#n食べきれない量を机に並べるのも、勿体ないだろう？"
1011003-81 = "それに、今日は私が先生をもてなす場だからね。"
1011003-82 = "大丈夫。持ってきてもらったお土産は、後で私がゆっくり堪能させてもらうよ。"
1011003-83 = "さあ……。"
1011003-88 = "……それが、私の部屋での法則さ。"
1011003-89 = "私が……"
1011003-91 = "それを決められるのだからね。"
