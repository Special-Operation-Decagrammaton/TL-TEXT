[translation]
1011003-1 = "Camadas de falta de familiaridade."
1011003-5 = "Obrigado por seu tempo e esforço, doutor."
1011003-6 = "Sei que isso não é mais uma coisa a ser dita, mas ......#nNão tenho nada de importante a dizer sobre isso no cumprimento do dever."
1011003-7 = "Por isso, para tentar juntar um motivo: ......"
1011003-13 = "Eu preparei algo assim."
1011003-14 = "[s1] \"......O que é isso? \"\n[s2] \"Eu tenho uma ótima! \""
1011003-17 = "Esses doces foram encomendados pelo Tea Party."
1011003-18 = "Foi organizado como um trabalho de amor para os Senseies."
1011003-19 = "Entendo que é um tipo de autocontradição ligar e dizer \"solidariedade\", quando na verdade é \"trabalho do sensei\", ......#n."

1011003-20 = "No entanto, você chegou até aqui com alguma percepção, não é mesmo?"
1011003-21 = "Se esse for o caso - e, aliás, é uma vantagem ser entretido."
1011003-22 = "Agora, não quero mais ficar falando por aí. Sentem-se."
1011003-28 = "É o site ......?"
1011003-29 = "[s3] \"É uma lembrança. \"\n[s4] \"Bem a tempo. \"\n[s3]\"\"\n1011003-32 = \"...... Surpreendido.\"\n1011003-33 = \"O sensei deve ter adivinhado o \"pretexto\"?\"\n1011003-34 = \"Ainda assim, é uma pena que eles ainda sejam disciplinados o suficiente para me trazer um presente de solidariedade.\"\n1011003-35 = \"Hmm, isso pode ser encontrado em .......\"\n1011003-39 = \"Eu não esperava que você trouxesse doces também.\"\n1011003-40 = \"Além disso, eles eram até semelhantes em tipo aos que eu havia preparado.\"\n1011003-41 = \"Estou vendo. Para dar mais cor à conversa, que de outra forma seria casual, ele disse.\"\n1011003-42 = \"De forma alguma. ...... Talvez isso não caiba em sua mesa.\"\n1011003-43 = \"[s5]\"Pensei que Seir teria algo pronto para mim, mas não esperava nada até agora. ......\"\n[s6]\"Não esperava nada até agora. \"\"\n1011003-46 = \"Sério?\"\n1011003-47 = \"Foi uma surpresa agradável. Tentei manter meu bom senso. ......\"\n1011003-48 = \"Quando a tampa foi aberta, os preparativos foram cobertos.\"\n1011003-49 = \"De qualquer forma, isso não vai acontecer. ...... Oh, doutor.\"\n1011003-50 = \"Você parece estar feliz com isso, mas posso perguntar por que ......?\"\n1011003-51 = \"[s7] \"Você não acha interessante que nós dois tenhamos pensado a mesma coisa? \"\n[s8] \"Afinal, isso significa que estávamos pensando um no outro. \"\"\n1011003-57 = \"...... Totalmente.\"\n1011003-58 = \"Suponho que você seja a única pessoa capaz de provocar essa mudança em minhas emoções com as mesmas palavras.\"\n1011003-59 = \"Eu superei todas as minhas reclamações mesquinhas. ...... Ou devo dizer fortuito?\"\n1011003-60 = \"Eles sabiam desde o início que uma visita ao hospital era apenas uma desculpa.\"\n1011003-61 = \"Ah, então ...... sim. E que eles estão felizes apenas em trocar palavras.\"\n1011003-62 = \"Mas ...... sim.\"\n1011003-63 = \"Talvez eu esteja chegando um pouco mais perto de ser o que vocês ...... chamam de \"bad boy\".\"\n1011003-64 = \"Sim, mas não o suficiente para se preocupar, está tudo bem. #Tenho minha posição, você sabe.\"\n1011003-65 = \"Ele também disse que você é a única pessoa que pode ser tão egoísta.\"\n1011003-66 = \"Manterei esses limites no lugar. Eles precisam ser mantidos, não é mesmo?\"\n1011003-67 = \"Essa é a única palavra que você queria ouvir?\"\n1011003-68 = \"[s9] \"É claro, nunca duvidei de você. \"\n[s10] \"Eu acredito em Seia. \"\n[s10] \"Eu acredito em Seia.\""

1011003-71 = "...... Entendo."
1011003-72 = "Afinal de contas, quando você passa tempo com um sensei, vale a pena superar o esforço."
1011003-73 = "...... Desculpe-me, esse é um preâmbulo um pouco longo."
1011003-77 = "[ns11] \"Huh? \n[ns12] \"Você não vai comer os doces que eu trouxe para você? \""
1011003-80 = "Os doces que preparei são para duas pessoas no final. Seria uma pena colocar uma quantidade não consumida na mesa, não é mesmo?"
1011003-81 = "Além disso, hoje estou aqui para entreter os Senseies."
1011003-82 = "Não se preocupe. Vou aproveitar as lembranças que você me trouxe mais tarde."
1011003-83 = "Agora vá para ......."
1011003-88 = "...... Essa é a lei em meu quarto."
1011003-89 = "Sou ......"
1011003-91 = "Você pode decidir isso, sabe."
