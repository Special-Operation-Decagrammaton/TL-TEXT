[translation]
70003010-1 = "Diário de Operações da Academia Ferroviária Highlander (1)"
70003010-7 = "Olá, eu sou uma condutora na Academia Ferroviária Highlander!"
70003010-8 = "Hoje, a 'Linha Circular Interna' também está programada para operar normalmente."
70003010-9 = "Como vocês sabem, é a linha onde ocorrem mais acidentes e incidentes durante o ano, mas..."
70003010-10 = "Mesmo quando pedimos reforços, eles raramente chegam..."
70003010-11 = "Então, basicamente, resolvemos tudo por conta própria quando algo acontece."
70003010-12 = "É bem difícil..."
70003010-13 = "..."
70003010-14 = "...Não, talvez 'difícil' seja pouco."
70003010-18 = "Ahaha...! Bem!"
70003010-19 = "Quando estou cuidando da manutenção dos veículos e lidando com problemas, #n os dias passam voando!"
70003010-20 = "Não sei se isso é bom ou ruim... ahaha."
70003010-21 = "O que você está fazendo?"
70003010-22 = "Ah."
70003010-23 = "Não, isso é..."
70003010-27 = "Eu estava pensando em gravar um Vlog..."
70003010-28 = "Sério?"
70003010-29 = "É que, sabe... eu queria mostrar a realidade da Highlander para muitas pessoas..."
70003010-30 = "Uau, parece interessante."
70003010-31 = "Se os passageiros soubessem do nosso trabalho, talvez eles começassem a colaborar também..."
70003010-32 = "Tem gente que acha que a gente só fica parada aí, né?"
70003010-33 = "Outro dia, alguém me disse: 'Que vida boa a sua'."
70003010-34 = "...Comigo também."
70003010-35 = "Seria bom se mais pessoas pudessem ver."
70003010-36 = "Então, vamos nos preparar?"
70003010-37 = "S-sim!"
70003010-41 = "Ufa..."
70003010-42 = "De qualquer forma, vou dar o meu melhor na operação de hoje! #n Rumo ao prêmio de aluna exemplar deste mês...!"
70003010-45 = "Cabine do trem"
70003010-46 = "...Por enquanto, não há nada de anormal."
70003010-47 = "Como estão as coisas no vagão de passageiros?"
70003010-48 = "Sem anormalidades."
70003010-49 = "Acho que só teve um passageiro que sentou no lugar errado no vagão 3."
70003010-50 = "Que bom, espero que possamos continuar operando em paz assim..."
70003010-55 = "Já chegou um contato do vagão 5..."
70003010-56 = "Hum... o vagão está frio demais?"
70003010-57 = "Vou aumentar um pouco a temperatura."
70003010-59 = "(Algum tempo depois)"
70003010-62 = "...De novo o vagão 5."
70003010-63 = "Desta vez está quente demais...?"
70003010-64 = "É o mesmo passageiro de antes?"
70003010-65 = "Não, é outro."
70003010-66 = "Hum, que complicado."
70003010-67 = "Não tem jeito, cada pessoa é de um jeito..."
70003010-72 = "Responda com urgência!"
70003010-73 = "O que houve?"
70003010-74 = "O passageiro do vagão 5 está tirando a roupa...!"
70003010-75 = "Ah... vou lá dar uma olhada."
70003010-76 = "Por enquanto, vamos dar cobertores para os passageiros que estão com frio."
70003010-77 = "Parece uma boa ideia."
70003010-78 = "Sim, por favor……."
70003010-80 = "Vagão 7"
70003010-84 = "Francamente, os jovens de hoje em dia."
70003010-88 = "Você não deveria ceder o assento para os mais velhos?"
70003010-89 = "……？"
70003010-90 = "Este é um assento marcado, sabe……."
70003010-91 = "Eu não quero saber disso!#nEstou cansado! Saia logo daí!"
70003010-92 = "Uou, cuidado!#nEssa bengala……!?"
70003010-93 = "Você vai acabar machucando alguém se ficar balançando isso!"
70003010-95 = "Ora, que falta de educação!#nNo meu tempo, quando eu era jovem――"
70003010-96 = "Cala a boca, seu velho rabugento!"
70003010-106 = "Senhor, senhora…… por favor, mantenham a calma."
70003010-107 = "Francamente, quem é você?"
70003010-108 = "Esse velho começou a briga primeiro!"
70003010-109 = "Vocês estão incomodando os outros passageiros, então, por favor, venham comigo……."
70003010-110 = "Não me faça rir!#nEu também sou um passageiro!"
70003010-111 = "Sim, mas é por isso que peço que se movam para conversarmos……."
70003010-112 = "Eu comprei um assento marcado, por que eu teria que sair?!"
70003010-113 = "Eu não vou sair daqui!"
70003010-114 = "Err……."
70003010-115 = "Ficou me chamando de velho o tempo todo, que falta de respeito absurda!"
70003010-119 = "……."
70003010-120 = "……Ah, eu achei que estava tudo calmo demais."
70003010-123 = "Com licença, comissário……."
70003010-124 = "Sim, o que houve?"
70003010-125 = "Pode dar um jeito naquelas pessoas?#nElas estão fazendo barulho faz tempo……."
70003010-126 = "Sinto muito……."
70003010-127 = "Faça eles ficarem quietos logo.#nAh, que inútil."
70003010-128 = "S-sim……."
70003010-130 = "Peço desculpas pelo transtorno……."
70003010-134 = "……Problemas no vagão 7?"
70003010-135 = "Entendo……."
70003010-136 = "Se estiver difícil lidar com isso, eu irei até aí."
70003010-140 = "Ah……."
70003010-141 = "Todo santo dia, por que tem que ser assim……."
70003010-145 = "Agora no vagão 8……?#nNo vagão 3 também!?"
70003010-147 = "Vagão 8"
70003010-154 = "Ei, quem está saindo tem prioridade!"
70003010-155 = "Hã? Não era só você ter desviado?"
70003010-156 = "Não seria melhor você ter cedido a passagem?"
70003010-157 = "Cala a boca, tá querendo briga?"
70003010-159 = "Vagão 3"
70003010-161 = "Pessoal, por favor, me deem um pouco da sua atenção!"
70003010-165 = "Não importa quem eu sou!"
70003010-166 = "Mais importante que isso……"
70003010-167 = "Vou apresentar um produto incrível para vocês agora!"
70003010-168 = "É um preço especial apenas para quem está aqui!"
70003010-169 = "Tem uma aluna suspeita ali……."
70003010-170 = "Ao usar este produto, os raios infravermelhos distantes e os íons negativos melhoram sua circulação!#nAlém disso, ele reduz a sujeira da sua arma e evita que ela trave, é um item excelente!"
70003010-171 = "O nome dele é \"Pulseira de Germânio Gel-Gel\"!"
70003010-172 = "Vou oferecer um desconto especial de 50% só para vocês!"
70003010-173 = "Uma chance dessas não aparece sempre!"
70003010-174 = "Que barato..."
70003010-175 = "Incrível, as balas não vão mais emperrar..."
70003010-179 = "Ah, cliente! Você tocou nele, não foi?#nAgora você vai ter que comprar!"
70003010-180 = "Ei, eu só estava dando uma olhadinha..."
70003010-181 = "É uma criação especial do Clube de Pseudociência de Millennium, ele registra os dados de quem toca nele!"
70003010-182 = "N-não pode ser..."
70003010-183 = "Não tem jeito, então..."
70003010-185 = "Vou oferecer um preço ainda mais especial!"
70003010-186 = "...Inacreditável, 70% de desconto para quem comprar 5 unidades!"
70003010-188 = "70% de desconto!?"
70003010-189 = "Isso é praticamente de graça!"
70003010-190 = "Muito bem! É uma liquidação total!"
70003010-192 = "Apenas neste vagão! Vou oferecer esse preço para todos vocês também!"
70003010-193 = "E para os três primeiros, vou incluir um amuleto de proteção de Hyakkiyako!"
70003010-194 = "Eu compro!"
70003010-195 = "Eu também!"
70003010-197 = "Vagão 6"
70003010-198 = "Cliente, por favor, não suba no bagageiro!"
70003010-199 = "Cala a boca, qual é o problema?"
70003010-200 = "É perigoso, por favor, volte para o seu assento!"
70003010-204 = "Não tem lugar para sentar, então não tem outro jeito!"
70003010-205 = "...Hã?"
70003010-206 = "Poderia me mostrar sua passagem, por favor?"
70003010-207 = "O que é uma passagem?#nPrecisa disso?"
70003010-212 = "...Você vai ter que descer na próxima estação!"
70003010-213 = "Hã?#nEu sou um cliente!"
70003010-215 = "Vagão 4"
70003010-216 = "...Hm?"
70003010-217 = "Jogando Mahjong bem no meio do corredor!?"
70003010-218 = "Ah, chegou na hora certa!#nUma pessoa acabou de sair."
70003010-219 = "Então, guardem isso logo..."
70003010-220 = "Estamos precisando de gente! Senta logo aí!"
70003010-221 = "Eu nem sei as regras direito... quer dizer, guardem isso logo!"
70003010-222 = "Relaxa, a gente te ensina."
70003010-225 = "Aqui é a casa de máquinas, mais problemas, é?"
70003010-226 = "Qual é o vagão desta vez?"
70003010-230 = "...Todos os vagões!?"
