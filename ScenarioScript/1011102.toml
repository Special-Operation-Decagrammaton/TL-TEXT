[translation]
1011102-1 = "surpreendentemente normal"

1011102-2 = "Bairro/Parque do Milênio"

1011102-5 = "[ns] \"Bom dia, Nell.\""

1011102-6 = "Ah, Senseia."

1011102-7 = "Nossa, estou com um pouco de sono."

1011102-8 = "[s] \"Você está usando uniforme hoje.\""

1011102-9 = "Ah, é a primeira vez que te vejo assim, certo?"

1011102-10 = "Há várias coisas acontecendo."

1011102-11 = "O tesoureiro do seminário me pediu para usar o uniforme por um tempo."

1011102-12 = "Normalmente eu ignoraria isso, mas..."

1011102-13 = "Eu queria dizer não, mas não pude recusar."

1011102-14 = "Na verdade, o motivo pelo qual liguei para a Senseia foi por causa dessas roupas."

1011102-15 = "Não me sinto à vontade a menos que esteja vestindo uma jaqueta Skajan..."

1011102-16 = "Então, alguns conselhos para os Senseies..."

1011102-17 = "……."

1011102-21 = "Guaaaaaaaaaaaaa!"

1011102-22 = "[s] \"Ei, você está bem!?\""

1011102-23 = "Existe uma razão para estar tudo bem? #nNão consigo me acalmar de jeito nenhum!"

1011102-24 = "Sinto que estou andando pelado!"

1011102-25 = "Afinal, é estranho até do ponto de vista do Sensei, não é?"

1011102-26 = "[s] \"Ela é fofa em seu uniforme.\""

1011102-27 = "O que! ?"

1011102-28 = "Ou não tire sarro de mim! #nEstou seriamente preocupado!"

1011102-29 = "[s] \"Combina bem com você.\""

1011102-30 = "E-eu vejo...?"

1011102-31 = "E de qualquer maneira!"

1011102-32 = "Esta é a razão pela qual entrei em contato com você."

1011102-33 = "Bem, desde que o Sensei não ache estranho, fico aliviado."

1011102-34 = "...Claro, eu não acho que ela seja fofa ou fique bem nela."

1011102-35 = "[s] \"Está tudo bem.\""

1011102-37 = "[ns] \"Não importa como você se veste, Nell é Nell.\""

1011102-38 = "Ah? #nIsso é verdade!"

1011102-39 = "Mesmo se você não estiver usando um Sukajan, você pode facilmente derrotar qualquer Sukeban ao seu redor!"

1011102-40 = "Você está aliviado por estar de volta à sua flanela habitual?"

1011102-41 = "...Haha!"

1011102-42 = "Afinal, perguntar ao Sensei era a resposta certa."

1011102-43 = "Podemos conversar um pouco mais, por favor?"

1011102-48 = "O vizinho está vazio."

1011102-50 = "Está meio quieto hoje, não está?"

1011102-51 = "É por causa do evento ou é apenas minha imaginação?"

1011102-52 = "[s] \"Como sempre...\""

1011102-53 = "Não, não, definitivamente não."

1011102-54 = "...Alguma coisa pode estar acontecendo que eu não sei."

1011102-55 = "Ei, dê uma boa olhada neles."

1011102-65 = "[ns] \"...?\""

1011102-66 = "Estou sentado aqui e você simplesmente me ignorou."

1011102-67 = "Normalmente, eles diriam coisas como “Líder C&C!?” ou \"Oi...!\" e então desaparecer em algum lugar."

1011102-68 = "Isso é um exagero."

1011102-69 = "[ns] (Se bem me lembro, os uniformes de empregada da C&C servem como disfarce...)"

1011102-70 = "No entanto, não houve tal reação hoje."

1011102-71 = "Estou grato, mas por outro lado, estou preocupado..."

1011102-72 = "O que diabos está acontecendo?"

1011102-73 = "Caramba! #nIsso tudo é porque não estou usando sukajan?"

1011102-74 = "[s3] \"Ah, acalme-se.\"\n[s4] \"Vamos respirar fundo primeiro.\""

1011102-77 = "Ufa..."

1011102-78 = "Há algo de errado com seu Sensei? #nNão importa o que você pense sobre isso, é estranho."

1011102-79 = "[s] \"Vamos...\""

1011102-86 = "Ei, você."

1011102-90 = "Kiki, este parque é o nosso território. #nSe quiser sentar no banco, peça permissão!"

1011102-91 = "De qualquer forma, como usei sem permissão, acho que terei que pagar por isso. #nVou te dar um desconto na taxa do crepe!"

1011102-92 = "...?"

1011102-93 = "Você está me dizendo isso?"

1011102-94 = "Quem mais está aí?"

1011102-99 = "Então, você..."

1011102-100 = "...Nel! ?"

1011102-104 = "Esse rosto parece familiar. #nVocê não se arrependeu desde que levou uma surra da última vez?"

1011102-105 = "P-por que você está usando uniforme? ?"

1011102-106 = "Você me enganou? ?"

1011102-107 = "Use seu Skajan!"

1011102-108 = "Algo aconteceu hoje."

1011102-109 = "Vamos deixar isso de lado... eu falei isso né?"

1011102-110 = "Ei, ei! ?"

1011102-111 = "...Você vai destruí-lo desta vez?"

1011102-123 = "Droga..."

1011102-124 = "Ah, lembre-se!"

1011102-131 = "[ns] \"Eu fugi...\""

1011102-132 = "Ha, eu vou te perdoar pela sua atitude ultrajante de antes!"

1011102-133 = "Não é revigorante ser atacado por Sukeban?"

1011102-134 = "[s] \"Você não percebeu que era Nell.\""

1011102-135 = "Se você me perguntar, acho que sim?"

1011102-136 = "Bem, nem eu percebi isso..."

1011102-137 = "[s] \"Porque era um uniforme?\""

1011102-138 = "Bem, as jaquetas Skajan são chamativas e podem ser facilmente reconhecidas mesmo à distância."

1011102-139 = "Espere. #nEntão, hoje me senti diferente do normal..."

1011102-140 = "...Talvez seja porque nem todos me notaram! ?"

1011102-141 = "[s] \"Acho que sim...\""

1011102-142 = "Ninguém percebe..."

1011102-146 = "...Não é ruim?"

1011102-147 = "Parece estranho ou algo assim."

1011102-148 = "Pude ter uma experiência rara como a que acabei de ter."

1011102-149 = "[s] \"Está tudo bem então...?\""

1011102-150 = "Bom, eu me sentiria mais tranquilo se usasse uma jaqueta Sukajan."

1011102-151 = "Está começando a ser divertido."

1011102-152 = "Sim, senhor!"

1011102-153 = "Por que você não aproveita para entrar na sala de aula vestido assim?"

1011102-158 = "Eu tenho que tentar!"

1011102-160 = "(Depois disso, andei pela Millennium com Nell, que estava mais animada do que de costume.)"

