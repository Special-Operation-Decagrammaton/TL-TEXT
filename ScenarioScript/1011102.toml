[translation]
1011102-1 = "驚くほど普通に"
1011102-2 = "ミレニアム自治区・公園"
1011102-5 = "[ns] \"おはよう、ネル。\""
1011102-6 = "あ、先生。"
1011102-7 = "わりぃ、ちっと眠くて。"
1011102-8 = "[s] \"今日は制服なんだね。\""
1011102-9 = "あぁ、この格好で会うのは初めてだっけ？"
1011102-10 = "色々と事情があってな。"
1011102-11 = "セミナーの会計から、しばらく制服を着るよう頼まれちまって。"
1011102-12 = "普段だったら無視するところだが……。"
1011102-13 = "断るにも断りきれなくてな。"
1011102-14 = "実は先生を呼んだ理由も、この服のせいなんだ。"
1011102-15 = "スカジャンを着てないと、どうも落ち着かなくて……。"
1011102-16 = "だから、先生にアドバイスを……。"
1011102-17 = "……。"
1011102-21 = "ぐあああああっ！"
1011102-22 = "[s] \"だ、大丈夫！？\""
1011102-23 = "大丈夫なわけあるか！#nちっとも落ち着かねぇ！"
1011102-24 = "裸で出歩いてる気分だ！"
1011102-25 = "やっぱ、先生から見ても変だろ？"
1011102-26 = "[s] \"制服姿も可愛いよ。\""
1011102-27 = "何っ！？"
1011102-28 = "か、からかうなよっ！#nあたしは真剣に悩んでるんだぞ！"
1011102-29 = "[s] \"よく似合ってるよ。\""
1011102-30 = "そ、そうか……？"
1011102-31 = "と、とにかく！"
1011102-32 = "連絡したのは、こういう理由だ。"
1011102-33 = "まぁ、先生から見ても変じゃねぇなら安心した。"
1011102-34 = "……もちろん、可愛いだとか似合ってるだとか思わねぇけどよ。"
1011102-35 = "[s] \"大丈夫だよ。\""
1011102-37 = "[ns] \"どんな格好でも、ネルはネルだからね。\""
1011102-38 = "あぁ？#nんなの当ったりめぇだろ！"
1011102-39 = "スカジャンを着てなくても、そこら辺のスケバンくらい余裕で倒せるからな！"
1011102-40 = "いつものネルに戻って安心した、って？"
1011102-41 = "……ははっ！"
1011102-42 = "やっぱ先生に聞いてもらって正解だったぜ。"
1011102-43 = "せっかくだし、もう少し話していかねぇか？"
1011102-48 = "隣、空いてるぜ。"
1011102-50 = "つーか、今日はやけに静かだな？"
1011102-51 = "行事のせいか、それとも気のせいか……。"
1011102-52 = "[s] \"いつもと同じような……。\""
1011102-53 = "いやいや、絶対違うって。"
1011102-54 = "……あたしの知らないところで、何かが起きてるかもしれねぇ。"
1011102-55 = "ほら、あいつらをよく見てくれ。"
1011102-65 = "[ns] \"……？\""
1011102-66 = "あたしがここに座ってるのに、スルーしたぞ。"
1011102-67 = "いつもなら「C&Cのリーダー！？」とか「ひっ……！」とか言いながら、#nどっかに消えてくのによ。"
1011102-68 = "ったく、大げさだぜ。"
1011102-69 = "[ns] （たしかC&Cのメイド服には、偽装の役割が……）"
1011102-70 = "けどよ、今日はそんな風な反応が一切なかった。"
1011102-71 = "ありがたくはあるんだが、逆に気になるっつーか……。"
1011102-72 = "いったい何が起きてんだ？"
1011102-73 = "くそっ！#nこれも全部スカジャンを着てないせいか？"
1011102-74 = "[s3] \"お、落ち着いて。\"\n[s4] \"まずは深呼吸しようか。\""
1011102-77 = "ふぅ……。"
1011102-78 = "先生は何か心当たりねぇのか？#nどう考えてもおかしいだろ。"
1011102-79 = "[s] \"さ、さあ……。\""
1011102-86 = "おい、お前。"
1011102-90 = "キキッ、ここの公園はウチらの縄張りだぞ。#nベンチに座りたかったら許可を取るんだな！"
1011102-91 = "とりあえず、勝手に利用したんだから金を払ってもらおうか。#nクレープ代くらいで勘弁してやるぞ！"
1011102-92 = "……？"
1011102-93 = "それ、あたしに言ってんのか？"
1011102-94 = "ほかに誰がい――"
1011102-99 = "って、お前は……。"
1011102-100 = "……[ruby=みかも]美甘[/ruby]ネル！？"
1011102-104 = "見覚えのある顔だな。#n前にボコられてから反省してねーのか？"
1011102-105 = "ど、どうして制服を！？"
1011102-106 = "騙したのか！？"
1011102-107 = "スカジャン着とけよ！"
1011102-108 = "今日は事情があってな。"
1011102-109 = "それは置いといて……あたし、言ったよな？"
1011102-110 = "ひ、ひぃっ！？"
1011102-111 = "……今度こそ潰すってよ？"
1011102-123 = "くっ……。"
1011102-124 = "お、覚えてろよー！"
1011102-131 = "[ns] \"逃げちゃった……。\""
1011102-132 = "はっ、さっきのでけぇ態度に免じて許してやる！"
1011102-133 = "スケバンにたかられるなんて、新鮮じゃねぇか。"
1011102-134 = "[s] \"相手はネルだって気づいてなかったんだね。\""
1011102-135 = "言われてみればそうだな？"
1011102-136 = "つーか、あたしだって気づかなかったのは……。"
1011102-137 = "[s] \"制服だったから？\""
1011102-138 = "まあ、スカジャンは派手だし、遠くからでもすぐ分かるしな。"
1011102-139 = "待てよ。#nじゃあ、今日はいつもと違う風に感じたのは……。"
1011102-140 = "……みんな、あたしに気づいてなかったせいか！？"
1011102-141 = "[s] \"そうだと思うよ……。\""
1011102-142 = "誰も気づかない、なんて……。"
1011102-146 = "……悪くねぇな？"
1011102-147 = "不思議な感じっつーか、なんつーか。"
1011102-148 = "さっきみたいな珍しい体験もできたわけだしよ。"
1011102-149 = "[s] \"なら、良いのかな……？\""
1011102-150 = "ま、スカジャンを着てたほうが落ち着くけどよ。"
1011102-151 = "なんか楽しくなってきたぜ。"
1011102-152 = "そうだ、先生！"
1011102-153 = "せっかくだし、この格好で教室に入ってみるのはどうだ？"
1011102-158 = "試してみるしかねぇ！"
1011102-160 = "（その後、いつもよりテンションの高いネルと一緒に、ミレニアムのあちこちを歩き回った）"
