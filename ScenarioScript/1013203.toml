[translation]
1013203-1 = "Você é modelo de novo?"

1013203-2 = "Sala do professor da escola preparatória de arte"

1013203-3 = "Ah, professora...!"

1013203-4 = "[s] \"Tsukuyo, o que aconteceu?\""

1013203-5 = "Isso é..."

1013203-6 = "Recebi uma oferta de modelo de uma escola preparatória de arte, mas..."

1013203-7 = "Não tenho experiência como modelo de pintura..."

1013203-8 = "Eu pensei que gostaria que o professor cuidasse de mim..."

1013203-12 = "...Ah! ? #nCom isso, para minha comodidade... vou causar problemas ao professor...!"

1013203-13 = "Eu-me desculpe…!"

1013203-14 = "[s] \"Não, estou bem.\""

1013203-16 = "[ns] \"Mas você não ia parar de ser modelo...?\""

1013203-17 = "Na verdade..."

1013203-18 = "Você se lembra do presidente que lhe deu o panfleto “A Ninja Lives Seven Times”?"

1013203-23 = "Essa pessoa me pediu para lhe emprestar minha força só mais uma vez..."

1013203-24 = "Aparentemente a modelo fugiu esta manhã..."

1013203-25 = "Então não consegui encontrar um substituto..."

1013203-26 = "Disseram-me que os modelos de pintura ficam parados..."

1013203-27 = "[s1] \"Entendo...!\"\n[s2] \"Tenho certeza de que você pretende se tornar um pintor. Mas tudo bem.\""

1013203-30 = "Ah, é isso!"

1013203-31 = "Continuarei com o objetivo de me tornar um bom ninja...!"

1013203-32 = "……sim?"

1013203-33 = "Ah, hum, ela está usando um vestido..."

1013203-34 = "O tema de hoje parece ser "Mulheres de Vestidos"..."

1013203-39 = "Ah, é Tsukuyo. Obrigado por hoje. #nVocê pode ir para a sala de aula agora?"

1013203-43 = "Ah, sim...!"

1013203-44 = "Pois bem, vamos lá...!"

1013203-46 = "Sala de aula da escola preparatória de arte"

1013203-50 = "Tsukuyo-san, [ruby=Ono]Ohno[/ruby], que veio como substituto, certo?"

1013203-51 = "Ah, sim!"

1013203-52 = "Obrigado por me aceitar. #nDeixe-me explicar brevemente primeiro."

1013203-53 = "Desta vez, gostaria de solicitar uma aula para o curso de vestibular da Wild Hunt Art Academy."

1013203-54 = "Darei instruções sobre a pose mais tarde..."

1013203-55 = "Espero que você o mantenha o maior tempo possível."

1013203-57 = "Ah, eu entendo!"

1013203-58 = "É a primeira vez que sou modelo, mas farei o meu melhor...!"

1013203-59 = "Haha, não há necessidade de ficar tão nervoso."

1013203-64 = "(Deve ser difícil se você não tem experiência...)"

1013203-65 = "(É surpreendentemente difícil manter a mesma pose...)"

1013203-68 = "(... foi o que pensei)"

1013203-69 = "(Já se passou uma hora desde então e não mudou nada!?)"

1013203-75 = "Aquela modelo... ela ainda está viva, certo?"

1013203-76 = "Espere, não era uma figura de cera?"

1013203-77 = "não sei? Ela é uma nova modelo que vem chamando a atenção recentemente!"

1013203-78 = "É verdade! Se você olhar de perto, é essa pessoa!"

1013203-82 = "(...)"

1013203-83 = "(Eu estava preocupado, mas isso é mais como um modelo de show...)"

1013203-84 = "(Eu sou bom em ficar parado)"

1013203-85 = "(Hehehe, o disfarce de árvore... valeu a pena a prática...!)"

1013203-86 = "(Uau, isso é um gênio...!)"

1013203-87 = "(Dou aulas há 10 anos e nunca vi um modelo tão perfeito...)"

1013203-88 = "(Mesmo se você disser que é uma figura de cera, você entenderá!)"

1013203-89 = "(E aquela expressão pacífica...)"

1013203-90 = "(Onde esteve uma pessoa tão talentosa até agora...!?)"

1013203-92 = "(Simplesmente assim, o tempo passou e a aula de desenho terminou com sucesso.)"

1013203-95 = "obrigado pelo seu trabalho duro! #nBem, foi difícil, não foi?"

1013203-96 = "Não... obrigado pelo seu trabalho duro!"

1013203-97 = "Porém, foi um ótimo modelo!"

1013203-98 = "Esta foi realmente sua primeira vez como modelo de pintura?"

1013203-99 = "Sim...esta é minha primeira experiência."

1013203-100 = "(Afinal, ele é um gênio nato...!)"

1013203-101 = "Agora, se você me der licença..."

1013203-102 = "Por favor, aguarde!"

1013203-103 = "Se você não se importa, eu poderia ter mais alguns modelos, por favor?"

1013203-104 = "sim……?"

1013203-105 = "Até na aula de escultura são necessários modelos...!"

1013203-107 = "Pagaremos o dobro do valor por hora!"

1013203-108 = "Hum, uh…."

1013203-109 = "Não conheço ninguém que consiga manter a postura tão perfeitamente!"

1013203-110 = "Se o Sr. Ohno se tornar um modelo..."

1013203-111 = "Não há dúvida de que as habilidades dos alunos irão melhorar rapidamente!"

1013203-112 = "Por favor, por favor!"

1013203-113 = "Bem, ah..."

1013203-117 = "Ah, eu entendo. #nObrigado antecipadamente..."

1013203-120 = "(E Tsukuyo também está na aula de escultura...)"

1013203-121 = "(mantive a postura perfeita)"

1013203-122 = "(Algumas horas depois...)"

1013203-125 = "Isso realmente me ajudou! #nObrigado, Ohno-san!"

1013203-126 = "Ha, sim#nObrigado pelo seu trabalho duro...!"

1013203-131 = "Sinto muito, sensei... Sinto muito por ter feito você esperar."

1013203-132 = "[s] \"Tudo bem, me diverti assistindo o passeio.""

1013203-133 = "Graças ao meu professor, consegui fazer algo..."

1013203-134 = "Fiz o meu melhor até o fim...."

1013203-135 = "……sim? #nO que você acha da aula de escultura...?"

1013203-136 = "Bem...#nA atmosfera era a mesma da aula de desenho, mas..."

1013203-137 = "Havia pólvora voando, provavelmente porque a pedra estava sendo cortada e aparada..."

1013203-138 = "Minha garganta está um pouco..."

1013203-139 = "[s3] \"Então vamos comer uma comida deliciosa!\"\n[s4] \"Vamos comer uma comida deliciosa!""

1013203-144 = "Ah...!"

1013203-145 = "Se for esse o caso, então é hora de mim..."

1013203-146 = "[s] \"Se for um restaurante, já fiz uma reserva!\""

1013203-147 = "Ah, é isso…!"

1013203-148 = "Erm... obrigado, professor...!"

1013203-150 = "(Aquele que levou Tsukuyo para lá)"

1013203-151 = "(Era um restaurante em Hyakki Yako que tinha um rico cardápio de vegetais.)"

1013203-155 = "(...Por alguma razão, sinto que minhas atividades de modelo continuarão.)"

