[translation]
90002260-1 = "Episódio 26: Epílogo (2)"
90002260-12 = "Kei-chan... o-o que você achou...?#nDo nosso novo jogo, 'Arctic Adventure Final'..."
90002260-13 = "Com certeza é um jogo lendário! Afinal, o roteiro foi baseado na nossa experiência recente!"
90002260-14 = "Sim. E conseguimos garantir recursos artísticos suficientes também."
90002260-16 = "A Alice também se esforçou muito na programação!"
90002260-22 = "……Com licença."
90002260-23 = "O que é isso, exatamente...?"
90002260-24 = "É um jogo, ué?"
90002260-25 = "Admiro a coragem de insistir que isso é um jogo."
90002260-26 = "Mas não acha que deveria ter uma perspectiva um pouco mais objetiva?"
90002260-27 = "O quê!?"
90002260-29 = "Por que...?"
90002260-30 = "U-uuh..."
90002260-32 = "Waaaaah!"
90002260-34 = "Primeiro, o cenário não faz sentido. É um jogo de fantasia, certo?#nEntão por que um robô monstro gigante aparece do nada no meio da neve?"
90002260-35 = "Fufufu... Parece que você ainda não entende o que é o romance..."
90002260-36 = "Não, o romance também tem limites."
90002260-37 = "Se você faz tudo o que quer sem critério, isso não é romance, é autoindulgência."
90002260-41 = "E se fosse só o robô gigante, ainda seria aceitável."
90002260-43 = "Por que entrar de repente no espaço imaginário!? E a jogabilidade é horrível!!"
90002260-44 = "É-é um robô monstro gigante, então é claro que não é fácil de controlar!#nIsso também faz parte do romance!"
90002260-45 = "O romance só é romance justamente por ser anacrônico!"
90002260-46 = "Eu já disse que isso é só autoindulgência!!"
90002260-47 = "Que nadaaa!"
90002260-48 = "E esse inimigo? Desde que entramos no espaço imaginário, esse já é o sétimo camarão, não é?"
90002260-49 = "Ma-mas as cores são todas diferentes..."
90002260-50 = "No fim das contas, ainda é um camarão!"
90002260-51 = "I-isso é uma técnica chamada variação de cores!#nÉ para reduzir recursos e otimizar os investimentos..."
90002260-52 = "E precisava mesmo de sete variações de cores?"
90002260-53 = "Tem um limite para variações de cores, sabia!"
90002260-54 = "É que eu me concentrei demais em desenhar os pinguins no início, aí o tempo..."
90002260-55 = "É que os pinguins são mais fofos que os camarões..."
90002260-60 = "Então, no fim, é tudo uma questão de preferência pessoal!?"
90002260-61 = "U-uuh...!"
90002260-62 = "E sobre a parte terrestre antes de entrar no espaço imaginário..."
90002260-63 = "Por que o 'dash', o 'rolamento' e o 'pulo' usam o mesmo botão no combate!?"
90002260-64 = "Ah, isso... se você apertar e soltar rápido é um 'rolamento'...#ne se segurar por uns 3 frames, é um 'pulo'."
90002260-65 = "E se segurar por mais 3 frames, vira um 'dash'..."
90002260-66 = "É-é tudo movimento de esquiva, então...#nEu achei que seria mais prático colocar tudo em um botão só..."
90002260-67 = "A-aliás, tem mais uma coisa."
90002260-68 = "Se você fizer um parry no momento exato do rolamento... e conseguir um parry perfeito de 1 frame..."
90002260-69 = "Vo-você vai parar atrás do chefe... e causar um dano enorme, então tente praticar..."
90002260-70 = "Por que você baseia a jogabilidade do jogo nos seus próprios padrões!?"
90002260-71 = "Eu não consigo fazer comandos tão precisos! Aliás, a maioria das pessoas não consegue!"
90002260-72 = "Ke-Kei-chan, se você se esforçar, consegue...! Talvez..."
90002260-73 = "Yuzu... nem todo mundo neste mundo é uma gamer como você..."
90002260-74 = "E aquele subchefe de agora pouco, não foi terrível?#nDepois de aguentar uma jogabilidade péssima para finalmente derrotá-lo, ele tem uma mecânica de ressurreição!?"
90002260-75 = "Tudo bem, uma vez eu até entendo. Mas repetir isso duas ou três vezes é demais, não acha!?"
90002260-76 = "N-não foi divertido...?"
90002260-81 = "Eu achei que era uma penitência!"
90002260-82 = "Ughhh..."
90002260-83 = "Por último... essa tela aqui, não está meio piscando? É um bug?"
90002260-84 = "Eu quase fui atingida por aquele meteoro que o camarão amarelo do espaço imaginário jogou!"
90002260-85 = "A Alice que fez a codificação daquela parte. Desculpe..."
90002260-89 = "Entendo, nesse caso não tem problema. Você ainda está se acostumando com algumas coisas, afinal."
90002260-95 = "Na verdade, deveríamos elogiar o fato de você ter conseguido chegar até aqui. Como esperado da Alice."
90002260-97 = "Ei, ei! Você não está sendo boazinha demais só com a Alice?!"
90002260-98 = "Deve ser pela diferença de comportamento no dia a dia. #nVocê deveria começar se arrependendo daquele robô monstro gigante e do espaço imaginário."
90002260-99 = "Gueh..."
90002260-104 = "Então, quando isso vai estar disponível para jogar oficialmente?"
90002260-105 = "Toki... você de novo..."
90002260-106 = "Algum problema?"
90002260-107 = "Você não é da Divisão de Investigação de Fenômenos Estranhos e da C&C...? #nO que você está fazendo aqui...?"
90002260-108 = "Em Millennium, se você tiver habilidade, pode participar de vários clubes ao mesmo tempo."
90002260-109 = "Além disso, este lugar também é o meu parquinho."
90002260-111 = "Parquinho... mas nós somos um clube de desenvolvimento de jogos..."
90002260-112 = "Quando a irmã mais velha diz isso, até que soa convincente..."
90002260-113 = "Para criar bons jogos, você precisa jogar muitos jogos!"
90002260-114 = "Tá, tá. Eu já ouvi isso umas 100 vezes..."
90002260-116 = "Aliás, Toki, você não tinha hobbies?"
90002260-117 = "Não é que eu não tenha. Só estou procurando."
90002260-118 = "E ultimamente, comecei a me interessar por jogos, mangás e transmissões online."
90002260-119 = "Um pouco? Pelo visto, você está bem imersa nisso..."
90002260-125 = "[log=（トキは自身の胸元をトントンと叩いた）]"

90002260-127 = "Tenho confiança no meu mental de aço. V de vitória."
90002260-128 = "Você é idiota?!"
90002260-130 = "Não é idiotice, é mentalidade."
90002260-131 = "Ah, chega—!"
90002260-133 = "Kei, Kei?! Você não pode desmaiar!"
90002260-134 = "Essa conversa! Vamos usar no próximo cenário!"
90002260-135 = "Momoi—!!!"
90002260-141 = "..."
90002260-142 = "A Alice está feliz que todos estão se divertindo!"
90002260-149 = "Faz tempo que não venho aqui também. Ah, Rio, é a sua primeira vez, né?"
90002260-150 = "Sim. Então era aqui... que vocês faziam tudo."
90002260-151 = "Depois de passar por vários incidentes, voltamos para cá."
90002260-152 = "...Obrigada, Himari."
90002260-153 = "De verdade."
90002260-154 = "...Sim."
90002260-155 = "B-bem! Com isso, a Divisão de Investigação de Fenômenos Estranhos também está dispensada."
90002260-157 = "Ah, eu lembro que no começo pensei: 'Lá vem a presidente e a chefe me empurrando trabalhos estranhos de novo'..."
90002260-158 = "Não tem como isso ser verdade. Eu sou diferente da Rio."
90002260-159 = "Eu, que sou atenciosa, tenho um pensamento flexível, sou compreensiva e uma pessoa sensata—"
90002260-160 = "Jamais pediria algo absurdo."
90002260-161 = "(...Será que era assim mesmo?)"
90002260-162 = "A cara de pau dela não está aumentando...?"
90002260-163 = "Acho que ela sempre foi assim."
90002260-164 = "Sim. A presidente Rio e a chefe Himari são farinha do mesmo saco."
90002260-165 = "Quem é melhor por uma pequena margem... eu não vou comentar. Paz, paz."
90002260-166 = "Que falta de educação!? É completamente diferente!"
90002260-167 = "Mesmo sendo excêntricos, existe uma diferença abismal entre quem tem planejamento e quem não tem, sabia!?!?"
90002260-168 = "[s] \"……Então você admite que é uma excêntrica.\""
90002260-169 = "Até você, Sensei!?"
90002260-170 = "（……Parece que minha percepção não estava tão errada assim.）"
90002260-171 = "Por que você está com essa cara de alívio!?"
90002260-172 = "[s] \"Vamos, vamos, todos sejam amigos…….\""
90002260-173 = "Ehem……."
90002260-174 = "Embora tenha sido bom termos alcançado tantos resultados em um incidente daquela magnitude……."
90002260-175 = "É um pouco lamentável não poder tornar isso público."
90002260-176 = "Poderíamos ter adicionado pelo menos uma linha à Biblioteca de Lore, a lenda urbana que se espalha por Kivotos."
90002260-178 = "Nós eliminamos o perigo, isso não basta?#nExiste algo mais que você queira?"
90002260-179 = "Você usar argumentos lógicos assim me deixa sem saída……."
90002260-180 = "Afinal, para realizar o seu desejo, teríamos que começar revelando a existência do Departamento de Investigação de Fenômenos Estranhos, não é?"
90002260-181 = "O que significa que teríamos que explicar o motivo de você ter desaparecido――"
90002260-182 = "E antes disso, seria necessário explicar o processo do fenômeno estranho…… a existência chamada Decagrammaton. #nSe isso acontecesse, a sua posição――"
90002260-183 = "Eu entendi! Eu já entendi! Eu só estava comentando, tá bom!!!!"
90002260-185 = "Desta vez, acho que a Rio está certa……."
90002260-187 = "Obrigada."
90002260-188 = "Bem…… embora eu tenha acabado de voltar, decidi que vou partir novamente. #nFoi bom ver como as coisas estão no Millennium depois de tanto tempo."
90002260-192 = "Sim?"
90002260-194 = "Hm?"
90002260-195 = "Rio-sama?"
90002260-196 = "Ah…… Sensei, por favor, faça alguma coisa."
90002260-197 = "[s] \"Não acha que isso é demais, não importa como olhe?\""
90002260-198 = "E-eu disse algo estranho de novo……? #nAfinal, não sabemos quando uma nova crise pode atingir Kivotos――"
90002260-199 = "Você vai dizer que agir pelas sombras é mais eficaz para se preparar de forma racional e eficiente?"
90002260-200 = "……!?"
90002260-202 = "Vamos conversar seriamente a partir de agora."
90002260-203 = "Primeiro, você pode continuar agindo pelas sombras mesmo ficando no Millennium."
90002260-204 = "Eu mesma faço isso, então posso garantir."
90002260-205 = "Isso não é só porque a sua personalidade é um pouco distorcida……?"
90002260-206 = "Pfft!?"
90002260-207 = "Eimi……? Eu…… acabei de perder um pouco a vontade de viver."
90002260-208 = "Está tudo bem. A diretora é uma pessoa cara de pau — quer dizer, resiliente o suficiente para não desmoronar por qualquer coisa."
90002260-209 = "Exatamente. A diretora Himari que eu conheço é alguém que não perde a si mesma, não importa o quão difícil as coisas fiquem."
90002260-210 = "Ultimamente, sinto que a avaliação de vocês sobre mim está ficando estranha……."
90002260-213 = "De qualquer forma, o fato de você tentar se esconder novamente só me faz pensar que você está evitando os alunos do Millennium."
90002260-214 = "Seria por causa da sua dificuldade com a comunicação, ou algo do tipo?"
90002260-215 = "……."
90002260-216 = "Claro, eu sei que você tem problemas com habilidades interpessoais. #nMesmo assim, você começou a tentar entender os outros recentemente, ainda que tateando no escuro."
90002260-217 = "……Por isso."
90002260-218 = "Eu não acho que você seja uma pessoa fundamentalmente errada."
90002260-219 = "Então, o que você quer dizer?"
90002260-220 = "Você quer que eu mesma diga, não é……!"
90002260-221 = "Escute bem. Só vou dizer isso uma vez, então preste atenção. #nOu seja――"
90002260-222 = "Como o fato de você ter tentado fazer coisas terríveis com a Alice!"
90002260-223 = "Como o fato de ter agido emocionalmente e feito coisas terríveis com a Toki!"
90002260-224 = "Mesmo que você seja de mente fechada, paranoica e teimosa a ponto de não ouvir ninguém!"
90002260-225 = "Sua essência não é ruim. #nComo resultado, fomos salvas por você inúmeras vezes."
90002260-227 = "Mas…… eu……."
90002260-228 = "Alguma preocupação?#nSe sente culpa, então fale comigo olhando nos meus olhos!"
90002260-229 = "De qualquer forma, o que eu quero dizer é...!"
90002260-230 = "Você! Você pode ficar aqui! Entendido!?"
90002260-231 = "Não, você deve ficar aqui! Para não causar problemas sem que ninguém saiba!"
90002260-237 = "Chefe..."
90002260-238 = "Entendo."
90002260-239 = "...Hum."
90002260-243 = "Pessoal, aconteceu alguma coisa...?"
90002260-245 = "Fiquei um pouco emocionada ao ver que a chefe também consegue dizer essas coisas.#nVou colocar colírio, já que é uma cena de chorar."
90002260-246 = "Eu lhe emprestarei o meu. Como sou uma empregada e agente perfeita, estou sempre preparada."
90002260-247 = "Eu gravei toda essa fala. Vou compartilhar com a Alice mais tarde."
90002260-248 = "...!"
90002260-249 = "Eu realmente não deveria ter dito coisas com as quais não estou acostumada..."
90002260-250 = "[s1] \"Mas a Himari tem razão.\"\n[s2] \"...Você já levou bronca o suficiente da Yuuka, não é?\""
90002260-253 = "...!!!"
90002260-254 = "É, é verdade... Vou tentar não repetir isso..."
90002260-255 = "Muito bem."
90002260-258 = "Podemos considerar que não há mais perigo de hackeamento pelo Decagrammaton."
90002260-259 = "Ainda assim, há um motivo para eu ter voltado a esta sala do clube."
90002260-260 = "Para esconder a existência de Malkuth dos alunos de Kivotos, não é? É isso?"
90002260-265 = "Pensei que seria esquecida assim."
90002260-266 = "Não que isso importe, mesmo que acontecesse."
90002260-267 = "[s] \"Desculpe... você ficou brava?\""
90002260-268 = "Não compreendo a intenção da pergunta. Vou pesquisar se a palavra \"brava\" possui algum significado que eu ainda não tenha registrado..."
90002260-269 = "...Ainda não entendo. Sensei, que tipo de pergunta é essa?"
90002260-270 = "Se não sabe, então tudo bem...? Isso faz ainda menos sentido..."
90002260-271 = "[s3] \"B-bem, mudando de assunto!\"\n[s4] \"O que a Malkuth quer fazer daqui para frente?\""
90002260-274 = "Fufu, é apenas uma sugestão, mas..."
90002260-275 = "Se desejar, posso reservar um lugar para você no Departamento de Investigação de Fenômenos Estranhos."
90002260-276 = "Claro, apenas se você quiser."
90002260-277 = "Hum..."
90002260-278 = "(Será que isso significa...)"
90002260-280 = "Em outras palavras, ela está dizendo que quer ser sua amiga e passar um tempo com você."
90002260-281 = "Sim. A chefe Himari às vezes não consegue ser honesta."
90002260-282 = "Espero que não seja apenas porque quer mantê-la por perto por ser um objeto de estudo interessante..."
90002260-284 = "(Como eu suspeitava...)"
90002260-285 = "O que vocês pensam de mim!?"
90002260-290 = "O verdadeiro significado das palavras é algo difícil, não é..."
90002260-291 = "..."
90002260-292 = "Agradeço a sua preocupação."
90002260-293 = "Mas pretendo me esconder por um tempo."
90002260-294 = "[s] \"Por que isso?\""
90002260-295 = "..."
90002260-296 = "Até agora, eu não sabia o que era a \"minha própria vida\"."
90002260-297 = "Eu não precisava pensar nisso, e nem havia necessidade de pensar."
90002260-302 = "Ain, Soph, Aur..."
90002260-303 = "Minhas irmãs me disseram para viver.#nPor isso, pretendo fazer isso, mas..."
90002260-304 = "Ainda preciso de tempo para definir, organizar e estabelecer minha vida."
90002260-305 = "Na verdade, nem eu mesma sei bem como cheguei a esse pensamento."
90002260-306 = "Se eu usar os termos de vocês, foi uma \"intuição\" de que eu precisava fazer isso."
90002260-307 = "……。"
90002260-308 = "Se essa é a sua vontade, não tenho mais nada a dizer."
90002260-309 = "Apenas, caso volte a causar algum tipo de problema..."
90002260-310 = "Desta vez, usarei todo o meu poder para forçar sua matrícula na Millennium."
90002260-316 = "……Fufu."
90002260-317 = "Sim. Esse nível de discernimento é algo que eu certamente \"aprendi\"."

90002260-322 = "……Afinal, será que eu deveria ter tentado impedi-la?"
90002260-323 = "Mas... eu consigo entender um pouco os sentimentos da Malkuth."
90002260-324 = "A presidente ficou desaparecida por muito tempo, né."
90002260-325 = "Sim. A Rio-sama é especialista em desaparecer, cortar contato e realizar trabalhos nas sombras."
90002260-326 = "……Não te disseram para tomar cuidado com as palavras?"
90002260-327 = "Perceber isso... Por acaso você estava me vigiando o tempo todo?"
90002260-328 = "Claro que não!? Eu sei disso mesmo sem precisar olhar!!"
90002260-329 = "Acalme-se, Kei. Toki apenas disse um fato."
90002260-330 = "Consigo entender por que vocês duas se dão tão bem……."
90002260-333 = "Para onde será que ela vai?"
90002260-334 = "[s] \"Acho que ela precisa de um tempo agora.\""
90002260-335 = "Um tempo para refletir sobre si mesma e se conhecer... é isso?"
90002260-336 = "Mas ela poderia fazer isso aqui também..."
90002260-337 = "Você está se sentindo solitária, não é?"
90002260-338 = "……Não é isso."
90002260-340 = "Sim. Isso significa que você está se sentindo solitária."
90002260-341 = "Essa personalidade não está um pouco ultrapassada...?"
90002260-343 = "……."
90002260-344 = "(Então era isso...)"
90002260-347 = "Mas, estando sozinha, há coisas que se aprende."
90002260-348 = "Quem sabe um dia, ela também não encontre o caminho que deve seguir?"
90002260-352 = "Estou surpresa. Não esperava ouvir isso da Rio."
90002260-353 = "É mesmo?"
90002260-354 = "[s] \"Pois é. Meus parabéns.\""
90002260-355 = "Não zombe de mim..."
90002260-356 = "É raro ver a presidente elogiando alguém, né."
90002260-357 = "Sim. Além disso, nem eu fui elogiada dessa forma."
90002260-358 = "Por isso, Sensei, me elogie também. Não fiz nada, mas por favor, me elogie logo."
90002260-359 = "[s] \"Bem, sobre isso...\""
90002260-360 = "Pular de alegria?"
90002260-361 = "[s] \"Toki...?\""
90002260-362 = "Toki... qual é a sua idade mental, afinal...?"
90002260-365 = "É algo um tanto fascinante, não é?"
90002260-366 = "Do que você está falando?"
90002260-367 = "Bem... talvez seja como a sensação de invejar um pássaro que voa livremente pelo céu."
90002260-368 = "Os pássaros também acabam descendo ao solo eventualmente."
90002260-369 = "Para beber água, comer e descansar suas asas."
90002260-370 = "Ainda assim, enquanto voa, o céu pertence ao pássaro."
90002260-371 = "Mesmo que ela tenha que voar sozinha por um céu vazio."
90002260-372 = "……É verdade. Mas não acho que ela esteja sozinha."
90002260-373 = "Ora, por que diz isso?"
90002260-377 = "Com certeza, em algum lugar... deve haver alguém cuidando dela."
90002260-378 = "……Sim, você tem razão."
90002260-383 = "[ns] \"Pessoal, bom trabalho a todos.\""
90002260-386 = "Sim."
90002260-387 = "――Investigação de fenômenos anômalos, concluída."
