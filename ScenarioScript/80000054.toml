[translation]
80000054-1 = "Como de costume"
80000054-3 = "（Senti vontade de beber algo e vim à loja de conveniência）"
80000054-9 = "……Ah, Sensei?"
80000054-10 = "[s] \"……Suzumi?\""
80000054-11 = "Olá, Sensei. Que coincidência encontrar você em um lugar como este. Veio fazer compras?"
80000054-12 = "……Ah, eu? Eu vim comprar uma bebida e repor munição."
80000054-13 = "……Entendo."
80000054-14 = "Falando nisso, hoje é Dia dos Namorados, não é? Achei que a decoração estava bonita, e agora entendo o porquê."
80000054-15 = "Dia dos Namorados……."
80000054-16 = "……."
80000054-17 = "[s1] \"……Suzumi?\"\n[s2] \"O que houve?\""
80000054-18 = "Nada. É que, já que nos encontramos assim, seria um desperdício deixar passar como uma simples coincidência."
80000054-19 = "Nada. É que, já que nos encontramos assim, seria um desperdício deixar passar como uma simples coincidência."
80000054-20 = "Pensei que talvez pudesse lhe entregar algo, Sensei."
80000054-21 = "Ah, claro, se você não se importar, é claro……."
80000054-22 = "……Não tem como eu me importar, você diz?"
80000054-23 = "……Como esperado do Sensei, muito obrigada."
80000054-24 = "Bem, sinto muito por escolher algo assim na hora, mas……."
80000054-33 = "O que acha deste aqui?"
80000054-35 = "[s3] \"Tem formato de estrela…….\"\n[s4] \"Está brilhando!\""
80000054-36 = "O que achou?"
80000054-37 = "O que achou?"
80000054-38 = "……O motivo, você pergunta?"
80000054-39 = "Ah, não, é que…… não é um motivo específico, talvez tenha sido mais por intuição."
80000054-40 = "……Pensando bem, por que será?"
80000054-41 = "[s5] \"Acho que combina com você, Suzumi.\"\n[s6] \"É como se fosse uma granada de luz, não é?\""
80000054-42 = "I-Isso é um pouco difícil de responder……."
80000054-43 = "I-Isso é um pouco difícil de responder……."
80000054-44 = "Quer que eu escolha outra coisa?"
80000054-45 = "……Sim? Você quer este?"
80000054-46 = "[s] \"Porque foi algo que você escolheu, Suzumi.\""
80000054-47 = "……."
80000054-51 = "……Entendido. Então, aqui está."
80000054-52 = "Desculpe por tomar seu tempo, Sensei. Vamos indo?"
80000054-56 = "……Já que estamos aqui, Sensei."
80000054-57 = "Poderia me deixar te escoltar no caminho de volta, como nos velhos tempos?"
80000054-60 = "（Assim, sendo escoltado pela Suzumi, voltei para o Schale em total segurança）"
