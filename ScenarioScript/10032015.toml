[translation]
10032015-3 = "Haa, haa... haa, haa...!"
10032015-4 = "Incrível, acabou num piscar de olhos, não foi?"
10032015-5 = "É, foi graças ao Sensei, né~ Espero que as coisas se acalmem agora."
10032015-7 = "Não tem como se acalmar..."
10032015-8 = "Não dá para resolver tudo só ganhando uma vez."
10032015-9 = "...Além disso, a parte difícil vem agora."
10032015-13 = "...Não é, Sensei?"
10032015-14 = "[s1] \"...É verdade.\"\n[s2] \"Pode me explicar o que está acontecendo?\""
10032015-19 = "Uau... Sensei, não está sendo um pouco assustador? Por acaso vai começar uma reunião de reflexão?"
10032015-20 = "Desculpa, desculpa, desculpa, desculpa, desculpa..."
10032015-21 = "...O que vamos fazer, Presidente? Vai dar alguma desculpa?"
10032015-22 = "Quer que eu diga algo no seu lugar?"
10032015-26 = "...Não."
10032015-27 = "Essa forma de falar está errada, Kayoko."
10032015-28 = "...Não precisamos dar \"desculpas\"."
10032015-29 = "Este é um pedido oficial que a Problem Solver 68 aceitou."
10032015-30 = "Portanto, não precisamos de desculpas nem de reuniões de reflexão."
10032015-34 = "...Mas."
10032015-35 = "Foi um erro nosso incomodar o consultor de gestão e ainda fazê-lo nos dar suporte. #nQuanto a isso, deixe-me pedir desculpas... como presidente."
10032015-36 = "Já que o Sensei está em uma relação de cooperação conosco..."
10032015-37 = "Como pedido de desculpas, vou te contar o motivo de estarmos aqui, algo que estava te preocupando."
10032015-38 = "Mas, depois de ouvir isso, não haverá como voltar atrás, Sensei."
10032015-39 = "...Está preparado, Sensei?"
10032015-40 = "[s3] \"Estou preparado.\"\n[s4] \"Pode me explicar em detalhes?\""
10032015-43 = "...Ufa."
10032015-44 = "Entendido... Então, escute com atenção."
10032015-48 = "Este pedido... foi aceito de um figurão do submundo."
10032015-49 = "Isso mesmo... um trabalho que só nós, da Problem Solver 68, podemos realizar."
10032015-50 = "Através deste pedido, nós vamos..."
10032015-52 = "...nos tornar ainda mais hard-boiled."
