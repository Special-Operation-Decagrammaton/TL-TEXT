[translation]
10032015-3 = "はぁ、はぁ……はぁ、はぁ……！"
10032015-4 = "すっごーい、ほんとに一瞬で終わったじゃん。"
10032015-5 = "やっぱり先生のおかげだね～このままうまく収まってくれたらいいんだけど。"
10032015-7 = "収まるわけないじゃん……"
10032015-8 = "1回勝った程度で、収拾がつくわけない。"
10032015-9 = "……それに、大変なのはこれから。"
10032015-13 = "……でしょ、先生？"
10032015-14 = "[s1] \"……そうだね。\"\n[s2] \"簡単に話を聞かせてもらえる？\""
10032015-19 = "わっ……先生、ちょっと怖くない？もしかして、反省会でも始まる感じ？"
10032015-20 = "すみませんすみませんすみませんすみませんすみません……"
10032015-21 = "……どうする、社長？何か言い訳でもする？"
10032015-22 = "私が代わりに何か言おうか？"
10032015-26 = "……いいえ。"
10032015-27 = "その言い方は間違ってるわ、カヨコ。"
10032015-28 = "……「言い訳」する必要なんて無いもの。"
10032015-29 = "これは便利屋が引き受けた正式な依頼よ。"
10032015-30 = "だから、言い訳も反省会も不要。"
10032015-34 = "……でも。"
10032015-35 = "経営顧問を困らせたうえに、サポートまでさせたのは私たちのミスね。#nこれに関しては、謝らせてちょうだい……社長として。"
10032015-36 = "先生は、私たちと協力関係にあるのだから……"
10032015-37 = "お詫びに、先生が気にしていた私たちがここに居る理由を教えてあげる。"
10032015-38 = "けど、これを聞いたら先生も後戻りはできない。"
10032015-39 = "……覚悟はいいかしら、先生？"
10032015-40 = "[s3] \"覚悟ならできてるよ。\"\n[s4] \"詳しく教えてもらえるかな。\""
10032015-43 = "……ふぅ。"
10032015-44 = "分かったわ……じゃあ、しっかり聞いてちょうだい。"
10032015-48 = "この依頼は……裏世界の大物から請け負ったのよ。"
10032015-49 = "そう……まさに私たち便利屋68にしかできない仕事。"
10032015-50 = "今回の依頼を通じて、私たちは……"
10032015-52 = "……よりハードボイルドになるの。"
