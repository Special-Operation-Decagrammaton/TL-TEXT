[translation]
1004606-1 = "イズナと一緒に手を取り合って"
1004606-2 = "（やはり触れてはいけなかっただろうかと思いつつ、イズナとの待ち合わせ場所へと訪れた）"
1004606-3 = "あっ、主殿！こっちです！こっち！"
1004606-6 = "[ns] \"イズナ、お待たせ。\""
1004606-7 = "とんでもありません！"
1004606-8 = "えーっと、どうしましょうか？海でできること……"
1004606-9 = "むむむ、いっぱいあるはずなのに難しいですね……修行も良いですが、ここは……！"
1004606-13 = "今度は最初から忍術修行じゃなくて、"
1004606-14 = "夏のおいしいお店を探すとか、そんなことをしてみるのも……！"
1004606-15 = "[s] \"今後のために、聞いておきたいんだけど……。\""
1004606-16 = "主殿、どうかしましたか？"
1004606-17 = "[s] \"イズナは海で泳ぐの、嫌い？\""
1004606-21 = "！？"
1004606-22 = "[s1] \"言いたくなかったら良いんだけど、避けてる気がして……。\"\n[s2] \"せっかくだしって気持ちもありつつ、何か理由があるのかなって。\""
1004606-25 = "そ、それは……"
1004606-26 = "[s] \"ごめん、言いたくなかったら気にしないで。嫌なこと聞いてごめんね。\""
1004606-27 = "ち、違うんです主殿！嫌というわけではなく……！"
1004606-28 = "イズナはその、えっと……"
1004606-31 = "……"
1004606-32 = "う、うわあぁぁぁん！！"
1004606-33 = "[s] \"い、イズナ！？\""
1004606-34 = "す、すみません！隠そうと思ったわけではないのですが……！"
1004606-36 = "（その後、イズナから話を聞かせてもらった）"
1004606-38 = "[ns] \"つまり、かなづち……？\""
1004606-39 = "は、はい……。"
1004606-40 = "イズナ、どうしても慣れることができなくて……。"
1004606-41 = "今まで何度か、挑戦はしてみたのですが……。"
1004606-42 = "こう、つい怖がってしまうと言いますか……。"
1004606-43 = "海水が目や口に入ると、何だかおっかなびっくりになってしまい……。"
1004606-44 = "ご、ごめんなさい主殿……！"
1004606-45 = "先に言っておけば良かったのに、イズナが誤魔化したせいで……。"
1004606-46 = "本当に、申し訳ありません……！"
1004606-47 = "[s] \"いや、謝るようなことじゃ……\""
1004606-49 = "[ns] \"あ、でも一つ気になったんだけど。\""
1004606-50 = "……？"
1004606-51 = "[s] \"どうして誤魔化してたんだろう、って。\""
1004606-52 = "そ、それは……"
1004606-56 = "イズナはその、主殿に何度も……。"
1004606-57 = "キヴォトス最強の忍者になると、言っていたので……。"
1004606-58 = "[s] \"うん。\""
1004606-59 = "キヴォトス最強を目指しておきながら、その、泳げないとなってしまったら……。"
1004606-60 = "えっと、つまりは……。"
1004606-61 = "あ、主殿に、ガッカリされてしまうのではと思い……それが、怖くて……。"
1004606-62 = "[s3] \"……大丈夫だよ。イズナ。\"\n[s4] \"それだけのことで、イズナを判断したりはしないから。\""
1004606-65 = "そ、そうなんですか……？"
1004606-66 = "よ、良かったです……えへへ……。"
1004606-67 = "主殿に直接そう言っていただけると、安心します……！"
1004606-68 = "ですがイズナは同時に、一つの決心をしました！"
1004606-69 = "[s] \"決心……？\""
1004606-70 = "はい！怖いことは怖いとしても、逃げてばかりでは何も変わりません！"
1004606-71 = "キヴォトスで一番の忍者を目指す者として……。"
1004606-75 = "やはり、いつかは乗り越えなくてはならないのです！"
1004606-76 = "[s] \"っていうことは……？\""
1004606-77 = "ということで主殿、少々お待ちください！"
1004606-78 = "[s] \"あ、うん……？\""
1004606-85 = "お待たせしました！！"
1004606-89 = "[ns] \"これは……？\""
1004606-90 = "いつかはこんな日も、来るかもしれないと"
1004606-91 = "思ってました……。"
1004606-92 = "克服のため、いつかは正々堂々と戦わなくてはならない、と！"
1004606-93 = "[s] \"なるほど、それは良い心意気。\""
1004606-94 = "そしてこれらは、そのための忍具です！"
1004606-95 = "ご覧ください主殿！"
1004606-96 = "不思議な形をしていますが、これは忍びが水の上を歩くのに使った道具です！"
1004606-100 = "そしてこの筒！"
1004606-101 = "こちらは忍びが、水中からでも息ができるように作られた竹筒です！"
1004606-102 = "さらにこちらは、忍びが水上を素早く移動するための――"
1004606-103 = "簡易型超電導スクリューモーター！"
1004606-104 = "[s] \"よく分からないけどすごい！\""
1004606-106 = "たとえ力が及ばなくても、忍びには忍びなりのやり方があります！"
1004606-107 = "というわけでイズナは、これを使って水泳を克服してみようと思います！"
1004606-109 = "（そして、イズナの特訓が始まった）"
1004606-111 = "まずはこの、[ruby=みずぐも]水蜘蛛[/ruby]から！"
1004606-113 = "ではイズナ、参ります！"
1004606-120 = "[ns] \"イズナーーー！？\""
1004606-122 = "ぜ、"
1004606-123 = "全然立てませんでした……！"
1004606-124 = "イズナの修行が、まだまだ足りないということでしょうか！？"
1004606-125 = "[s] \"ミレニアム製でもない限り、そういうので立つのは無理じゃないかな……。\""
1004606-126 = "くっ……しかし、イズナは諦めません！"
1004606-127 = "次は、この竹筒で……！"
1004606-131 = "イズナ！参ります！"
1004606-137 = "（ブクブクブク……）"
1004606-138 = "[s] \"イズナーーーーー！？！？\""
1004606-140 = "ぷはぁっ！"
1004606-145 = "あ、主殿……"
1004606-146 = "水中で目を開けるのって大変なのですね！？"
1004606-147 = "目が痛くて、竹筒を手放してしまいました……。"
1004606-148 = "[s] \"そ、そっか……とりあえず目を洗っておいで……。\""
1004606-149 = "い、イズナは諦めません！次こそは……！"
1004606-151 = "（そうしてイズナは何度も挑戦してみたものの……）"
1004606-152 = "うわぁぁん、主殿ー！？"
1004606-157 = "（残念ながら、ことごとく失敗に終わってしまった）"
1004606-159 = "ぐすん……どうやら忍具で海を克服するのは、難しいようです……。"
1004606-160 = "イズナは、このままなのでしょうか……。"
1004606-161 = "これではイズナ、キヴォトス最高の忍者には……"
1004606-162 = "[s] \"イズナ、泳ぐ練習してみない？"
1004606-163 = "……え？"
1004606-164 = "[s5] \"忍具や忍術で克服できないとしても……。\"\n[s6] \"それなら、泳ぎを学んでみるのはどうかなって。\""
1004606-167 = "主殿が、教えてくださる……ということですか？"
1004606-168 = "[s7] \"うん、それなりに泳げるから。任せて。\"\n[s8] \"イズナのために全力を尽くすよ！\""
1004606-171 = "は、はいっ……！"
1004606-172 = "で、では、お願いします！主殿……！"
1004606-174 = "（そうして、特に忍術は関係ない、純粋な水泳のレッスンが始まった）"
1004606-176 = "えっと、主殿の手を握って良いのですか？"
1004606-177 = "[s] \"うん。それでまず顔を水につけて、水に慣れることから。\""
1004606-178 = "は、はい！ではイズナ、参ります……！"
1004606-180 = "お手を拝借し、顔を……！"
1004606-181 = "顔を……。"
1004606-182 = "あの……主殿の手は、握ったままで……！？"
1004606-183 = "[s] \"うん、何かやりにくかったりする？\""
1004606-184 = "い、いえ！ではイズナ、参ります！"
1004606-190 = "[ns] \"どう？\""
1004606-191 = "ぷはっ……は、はい、何とか……。"
1004606-192 = "それよりも、その……。"
1004606-193 = "[s] \"じゃあ、次はバタ足かな。\""
1004606-194 = "は、はいっ！"
1004606-196 = "（そうして、少しずつレッスンは続いていく）"
1004606-204 = "（手を握って顔を水につけることから始め、続けてバタ足）"
1004606-209 = "（そこから息継ぎの練習などを行い……）"
1004606-221 = "（一つずつ、必要な要素を教えていった）"
1004606-224 = "[ns] \"じゃあ私の方で支えるから、水中で身体を横にしてみよっか。\""
1004606-228 = "ひゃぅっ！？"
1004606-235 = "[ns] \"い、イズナ！？大丈夫！？\""
1004606-236 = "だ、大丈夫です……その、急に腰だったので……。"
1004606-243 = "[ns] \"いつの間にこんな時間か……この辺りにしておく？\""
1004606-244 = "は、はい……ありがとうございました、主殿……。"
1004606-245 = "[s] \"うん、お疲れ様。じゃあ帰ろうか。\""
1004606-246 = "は、はいっ……！"
1004606-250 = "（そうして、リゾートへと戻る途中……）"
1004606-257 = "主殿と……。"
1004606-258 = "何だかまだ……"
1004606-262 = "………。"
1004606-263 = "[s] \"何だかごめんね。\""
1004606-264 = "は、はいっ……！？"
1004606-265 = "[s9] \"無理に付き合わせちゃったんじゃないかなって思って\"\n[s10] \"珍しくイズナ、すごい疲れてそうだなって……。\""
1004606-268 = "そ、そんな……！"
1004606-269 = "え、歩き方、ですか……？"
1004606-270 = "そ、そうでしょうか……イズナ、変ですかね……？"
1004606-271 = "[s11] \"まあ基礎の基礎は教えられたから、もう大丈夫だと思う。\"\n[s12] \"あとはイズナひとりでも、気が向いた時に練習してもらえれば。\""
1004606-274 = "それはつまり……。"
1004606-275 = "主殿と練習するのは、今日で終わりという……？"
1004606-276 = "[s] \"あ、日も落ちてきたね。早めに――\""
1004606-277 = "そ、そんなことはありません！"
1004606-278 = "違うんです、主殿！"
1004606-279 = "[s] \"イズナ……？\""
1004606-280 = "無理にだなんてことはありません！"
1004606-281 = "疲れたからではないんです……！"
1004606-282 = "イズナは、イズナは……！"
1004606-287 = "[wa:800]― （どうしてでしょうか……"
1004606-289 = "― 主殿が、[wa:1200]水泳を教えてくれると[wa:1200]言った時から……）"
1004606-292 = "― （イズナの心臓、[wa:1900]すごく……"
1004606-294 = "― ドキドキしています……)"
1004606-297 = "[wa:900]― （先ほど[wa:1250]主殿が握ってくれた、"
1004606-299 = "[wa:100]― イズナの[wa:650]手……"
1004606-302 = "[wa:100]― 他にも[wa:1150]主殿に触れられた場所が、"
1004606-304 = "[wa:150]― なんだか[wa:400]少し熱くて……)"
1004606-307 = "[wa:850]― あの、[wa:1200]主殿。[wa:1500]先ほどは[wa:750]その、"
1004606-309 = "― 少し[wa:450]バタバタしてしまいましたが……。"
1004606-312 = "― 今日一日……"
1004606-314 = "― イズナはすごく楽しくて、[wa:2000]幸せでした！"
1004606-317 = "― ですから、[wa:750]その……"
1004606-319 = "[wa:150]― 何と[wa:550]言いますかえっと……！"
1004606-322 = "[wa:1000]― 少しだけ、[wa:1650]我儘を[wa:750]言ってもよろしければ……"
1004606-325 = "― 今度また……"
1004606-327 = "[wa:100]― もう一度[wa:1200]泳ぎ方を、[wa:750]教えていただけないでしょうか？"
1004606-330 = "[ns] \"……それはもう、喜んで。\""
1004606-331 = "― えへへっ……"
1004606-333 = "― はい、[wa:950]ありがとうございます！"
1004606-336 = "― イズナのこと、"
1004606-338 = "― これからも[wa:350]よろしくお願いしますね！[wa:1800]主殿！"
1004606-341 = "（そうして夕焼けにきらめく街にも負けないくらい、輝く笑みを浮かべるイズナと一緒に）"
1004606-342 = "（ゆっくりと、色んな話をしながら帰るのだった）"
