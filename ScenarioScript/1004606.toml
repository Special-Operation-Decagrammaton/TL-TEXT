[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
1004606-1 = "De Mãos Dadas com a Izuna"
1004606-2 = "(Fiquei no ponto de encontro esperando pela Izuna, me perguntando se deveria tocar no 'assunto' ou não...)"
1004606-3 = "Ah, Meu Mestre! Aqui! É a Izuna aqui!"
1004606-6 = "[ns] \"Izuna. Desculpe fazer você esperar.\""
1004606-7 = "N-Não, imagina!"
1004606-8 = "Então, o que faremos hoje? Na praia podemos..."
1004606-9 = "Hmmm, temos tantas opções que fica difícil escolher... O treinamento também é ótimo, mas talvez...!"
1004606-13 = "Desta vez, em vez de focar no treinamento ninja,"
1004606-14 = "Poderíamos procurar um lugar com comidas de verão gostosas para experimentar!"
1004606-15 = "[s] \"Para os nossos próximos planos, eu queria te perguntar uma coisa...\""
1004606-16 = "Meu Mestre, houve algum problema?"
1004606-17 = "[s] \"Izuna, por acaso você... não gosta de nadar?\""
1004606-21 = "!?"
1004606-22 = "[s1] \"Você não precisa falar se não quiser, mas senti que você estava evitando isso...\"\n[s2] \"E como viemos à praia várias vezes, pensei que houvesse algum motivo.\""
1004606-25 = "I-Isso, i-isso é...!"
1004606-26 = "[s] \"Me desculpe, por favor esqueça se for algo que te deixa desconfortável. Foi indelicado da minha parte.\""
1004606-27 = "N-Não, não é que eu não goste do mar, de forma alguma...!"
1004606-28 = "A verdade... é que a Izuna... e-eu..."
1004606-31 = "........."
1004606-32 = "W-Uwaaaaah... eu... UWAAAAAH!!"
1004606-33 = "[s] \"I-Izuuna!?!\""
1004606-34 = "M-Me desculpe! E-Eu não estava tentando esconder do Meu Mestre por maldade...!"
1004606-36 = "(Depois que a Izuna se acalmou, ela me contou o que estava acontecendo)"
1004606-38 = "[ns] \"Ou seja... você não sabe nadar?\""
1004606-39 = "A... aah... s-sim...!"
1004606-40 = "A Izuna não consegue se acostumar a nadar na água de jeito nenhum..."
1004606-41 = "Eu já tentei aprender algumas vezes, mas..."
1004606-42 = "Eu sempre acabo ficando com muito medo... e travo...!"
1004606-43 = "Quando a água do mar entra nos meus olhos ou na boca, eu acabo ficando com pânico de me afogar..."
1004606-44 = "Me perdoe... Meu Mestre...!"
1004606-45 = "Eu deveria ter sido honesta com você desde o início. Por a Izuna ter tentado disfarçar..."
1004606-46 = "Eu sinto muito...!"
1004606-47 = "[s] \"Ei... não tem que pedir desculpas por algo assim.\""
1004606-49 = "[ns] \"A propósito, tem algo que eu queria te perguntar.\""
1004606-50 = "...Hã?"
1004606-51 = "[s] \"Por que você estava escondendo isso de mim?\""
1004606-52 = "P-Porque..."
1004606-56 = "A Izuna já disse para o Meu Mestre tantas vezes..."
1004606-57 = "Que o sonho dela é se tornar a melhor ninja de Kivotos..."
1004606-58 = "[s] \"Sim, eu lembro.\""
1004606-59 = "Mesmo dizendo que quer ser a melhor de Kivotos, se ela acabar confessando que... não sabe nadar..."
1004606-60 = "O medo da Izuna era... que..."
1004606-61 = "Eu fiquei com medo de que o Meu Mestre ficasse decepcionado com a Izuna por isso..."
1004606-62 = "[s3] \"...Está tudo bem, Izuna.\"\n[s4] \"Eu nunca te julgaria ou me decepcionaria com você por causa de uma coisinha dessas.\""
1004606-65 = "É-É sério...?"
1004606-66 = "Uwahhh! E-Eu estou tão aliviada, ehehe..."
1004606-67 = "Ouvir o Meu Mestre dizer isso diretamente me deixa tão tranquila...!"
1004606-68 = "Ao mesmo tempo, a Izuna acaba de tomar uma decisão!"
1004606-69 = "[s] \"Decisão...?\""
1004606-70 = "Sim! Pode até ser que eu sinta medo, mas ficar fugindo não vai mudar nada!"
1004606-71 = "Para ser alguém digna de se tornar a melhor ninja de Kivotos...!"
1004606-75 = "A Izuna sabe que precisa superar esse obstáculo algum dia!"
1004606-76 = "[s] \"E então isso quer dizer que...?\""
1004606-77 = "Por isso, Meu Mestre, me dê só um momentinho!"
1004606-78 = "[s] \"Ah, claro...\""
1004606-85 = "Desculpe a demora!!"
1004606-89 = "[ns] \"Isso aí que está na sua mão é...?\""
1004606-90 = "A Izuna sempre pensou que esse dia chegaria..."
1004606-91 = "E eu sempre estive me preparando!"
1004606-92 = "Para superar o meu medo, um dia eu teria que enfrentá-lo de forma justa e honesta!"
1004606-93 = "[s] \"Isso é uma ótima atitude.\""
1004606-94 = "E essas ferramentas ninjas são justamente para essa ocasião!"
1004606-95 = "Olhe para isto, Meu Mestre!"
1004606-96 = "Tem um formato meio estranho, mas esses são os sapatos que os ninjas usam para andar sobre a água!"
1004606-100 = "E também temos este bambu oco...!"
1004606-101 = "Isso foi feito para que o ninja consiga respirar enquanto estiver submerso!"
1004606-102 = "E por fim... para o ninja se mover rapidamente na superfície da água..."
1004606-103 = "É o Super Motor Elétrico Compacto do Estilo Izuna!"
1004606-104 = "[s] \"Eu não conheço essas invenções, mas parece incrível!\""
1004606-106 = "Mesmo quando não têm a habilidade, os ninjas têm as suas próprias formas de lidar com os problemas!"
1004606-107 = "Então... a Izuna vai usar essas ferramentas ninjas para tentar superar o mar de uma vez por todas!"
1004606-109 = "(E então, o 'treinamento especial' da Izuna começou)"
1004606-111 = "Para iniciar, vou usar esses sapatos ninjas! A arte do Mizugumo!"
1004606-113 = "Aqui vou eu! Izuna, a caminho!"
1004606-120 = "[ns] \"Izuna!? Cuidado como você pisa com i-isso--!\""
1004606-122 = "Guuuubaaaaaaa--...!!"
1004606-123 = "A Izuna... não conseguiu ficar em pé de jeito nenhum...!"
1004606-124 = "Isso significa que o treinamento da Izuna ainda é insuficiente!?"
1004606-125 = "[s] \"A não ser que isso fosse fabricado pela Millennium... eu acho que a física diz que é impossível alguém ficar em pé na água com isso.\""
1004606-126 = "Uggh... mas a Izuna não vai desistir!"
1004606-127 = "A próxima tentativa será com o tubo de bambu...!"
1004606-131 = "Izuna! Mergulhando!"
1004606-137 = "(Blubluubllbluu.. ghh...)"
1004606-138 = "[s] \"Izuuuna!? O bambu deve estar entupido ou furado!?\""
1004606-140 = "Phuuuhaa-- Gwahhhh... Cof... Cof..."
1004606-145 = "A--... Meu Mestre..."
1004606-146 = "É muito difícil conseguir abrir os olhos debaixo d'água!?"
1004606-147 = "Os olhos da Izuna doeram com o sal, e eu acabei soltando a ferramenta da minha boca sem querer..."
1004606-148 = "[s] \"Ah, tudo bem... vem lavar o seu rosto com água limpa pra tirar o sal.\""
1004606-149 = "A Izuna não vai desistir! Na próxima vez...!"
1004606-151 = "(A Izuna tentou várias e várias vezes usando os seus itens ninjas, mas...)"
1004606-152 = "WAAAAAH-- Meu Senhorrrr... Socooorooo a engrenagem afogou e a cordinha travou---!?"
1004606-157 = "(Infelizmente, todas as tentativas terminaram em falhas desastrosas)"
1004606-159 = "Sniff, gusususun... Pelo visto, superar o mar usando ferramentas ninjas é mais difícil do que parecia..."
1004606-160 = "Será que a Izuna vai ficar assim pra sempre...?"
1004606-161 = "Desse jeito a Izuna nunca vai conseguir se tornar a melhor ninja de Kivotos..."
1004606-162 = "[s] \"Izuna, você gostaria de praticar natação comigo?\""
1004606-163 = "...Hã?"
1004606-164 = "[s5] \"Se você não consegue resolver isso apenas com ninjutsu e ferramentas...\"\n[s6] \"Então eu estava pensando se você não gostaria de aprender a nadar do jeito normal.\""
1004606-167 = "Isso quer dizer... que o Meu Mestre vai ensinar a Izuna a nadar?"
1004606-168 = "[s7] \"Sim, eu sei nadar razoavelmente bem. Pode deixar comigo.\"\n[s8] \"Eu vou dar o meu melhor para ensinar a Izuna!\""
1004606-171 = "H-Hai...!"
1004606-172 = "E-Então, eu conto com você! Meu Mestre...!"
1004606-174 = "(E assim, iniciamos uma aula de natação de verdade, sem uso de ninjutsus)"
1004606-176 = "A-Ahm, M-Meu Mestre... Eu posso segurar a sua mão?"
1004606-177 = "[s] \"Sim. Vamos começar colocando o rosto na água para você se acostumar.\""
1004606-178 = "S-Sim! Aqui vou eu...!"
1004606-180 = "Segurando a sua mão, o meu rosto...!"
1004606-181 = "O rosto..."
1004606-182 = "Ahn... Eu posso continuar segurando a sua mão desse jeito, Meu Mestre...!?"
1004606-183 = "[s] \"Claro, se isso for te ajudar a se sentir mais segura.\""
1004606-184 = "S-Sim! Aqui vou eu!"
1004606-190 = "[ns] \"E então, como foi?\""
1004606-191 = "Puhaahh-- Aahhh... S-Sim... De alguma forma eu consegui..."
1004606-192 = "Mas o mais importante, é que..."
1004606-193 = "[s] \"Certo, agora vamos treinar o bater de pernas.\""
1004606-194 = "H-Hai!"
1004606-196 = "(E a aula de natação continuou passo a passo...)"
1004606-204 = "(Começamos com segurar as mãos e colocar o rosto na água, depois fomos para as pernas...)"
1004606-209 = "(E então praticamos a respiração adequada...)"
1004606-221 = "(Fui ensinando com bastante cuidado tudo o que ela precisava saber)"
1004606-224 = "[ns] \"Certo, agora eu vou te segurar, então tente deitar o seu corpo na água horizontalmente.\""
1004606-228 = "K-Kyuuh! Ahn-Kkyuahh!?"
1004606-235 = "[ns] \"I-Izuna!? Tudo bem!?\""
1004606-236 = "E-Estou bem... é que você me segurou pela cintura de repente e... me pegou de surpresa."
1004606-243 = "[ns] \"Já está ficando tarde... O que acha de pararmos por hoje?\""
1004606-244 = "H-Hai... Muito obrigada, Meu Mestre..."
1004606-245 = "[s] \"Bom trabalho. Vamos indo então.\""
1004606-246 = "H-Hai...!"
1004606-250 = "(E assim, no caminho de volta para o resort...)"
1004606-257 = "O Meu Mestre... e a Izuna..."
1004606-258 = "A sensação ainda..."
1004606-262 = "......"
1004606-263 = "[s] \"Me desculpe, Izuna.\""
1004606-264 = "H-Hai... !?"
1004606-265 = "[s9] \"Sinto que acabei te forçando a fazer o treinamento...\"\n[s10] \"A Izuna parece estar incrivelmente cansada agora.\""
1004606-268 = "N-Não, de forma alguma!"
1004606-269 = "Eh... É pela forma como estou andando...?"
1004606-270 = "Será que... eu estou andando de um jeito estranho...?"
1004606-271 = "[s11] \"Bem, nós cobrimos o básico do básico hoje, então acho que você vai ficar bem.\"\n[s12] \"Depois disso, a Izuna pode praticar sozinha quando se sentir confortável para isso.\""
1004606-274 = "Isso quer dizer que..."
1004606-275 = "O treinamento que fizemos hoje com o Meu Mestre acabou...?"
1004606-276 = "[s] \"Ah, o sol já está se pondo. Precisamos ir mais rápid--\""
1004606-277 = "N-Não, isso não é verdade!"
1004606-278 = "A Izuna não acha isso, Meu Mestre!"
1004606-279 = "[s] \"Izuna...?\""
1004606-280 = "Você não me forçou de forma alguma!"
1004606-281 = "E eu também não estou cansada...!"
1004606-282 = "É que a Izuna... A Izuna...!"
1004606-287 = "[wa:800]― (Por que será que... "
1004606-289 = "― desde que o Meu Mestre disse que iria me ensinar a nadar...)"
1004606-292 = "― (O coração da Izuna...[wa:1900] e o meu peito..."
1004606-294 = "― estão batendo de forma tão forte e acelerada...)"
1004606-297 = "[wa:900]― (A mão que o Meu Mestre segurou gentilmente mais cedo..."
1004606-299 = "[wa:100]― E os outros..."
1004606-302 = "[wa:100]― lugares em que o Meu Mestre me segurou debaixo d'água para eu não afundar..."
1004606-304 = "[wa:150]― ainda estão quentinhos e formigando...)"
1004606-307 = "[wa:850]― Ahn, [wa:1200]Meu Mestre. [wa:1500]Me desculpe se eu acabei ficando muito nervosa lá no mar e..."
1004606-309 = "― Hoje eu me diverti tanto com você...[wa:450] Eu fiquei incrivelmente feliz!"
1004606-312 = "― Por isso, sabe..."
1004606-314 = "― Como eu poderia dizer...!"
1004606-317 = "― Se eu puder ser só um pouquinho..."
1004606-319 = "[wa:150]― egoísta dessa vez...!"
1004606-322 = "[wa:1000]― Você poderia... [wa:1650]me ensinar a nadar de novo em uma outra hora? [wa:750]"
1004606-325 = "― Você poderia..."
1004606-327 = "[wa:100]― me ensinar a nadar de novo e segurar a minha mão...?"
1004606-330 = "[ns] \"...Claro. Eu farei isso com todo o prazer.\""
1004606-331 = "― Ehehe..."
1004606-333 = "― Sim, [wa:950]muito, muito obrigada!"
1004606-336 = "― Por favor,"
1004606-338 = "― continue cuidando da Izuna daqui em diante! [wa:1800]Meu Mestre!"
1004606-341 = "(E assim, junto com uma Izuna que sorria radiante e fofinha, superando o brilho da cidade ao pôr do sol)"
1004606-342 = "(Nós fomos caminhando devagar, conversando sobre várias coisas alegres no caminho de volta para casa)"