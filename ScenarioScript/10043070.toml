[translation]
10043070-1 = "第7話;球場に落ちているもの"
10043070-9 = "……8回裏、得点どころか、攻撃もできなかった……残塁は一塁、三塁――"
10043070-10 = "無死一、三塁で単打すら打てないなんて……なんなんだよこのチーム！"
10043070-11 = "さっきからゴロばっか！もう……引退しろよ！"
10043070-18 = "落ち着けって……こんなの日常茶飯事だろ……。"
10043070-19 = "幸い、9回表までクローザーは使わずに済んだ。#nレイダースの打線を分析して、初球でスライダーで投げれば……。"
10043070-21 = "……なんでブレーブスはここまで勝てないんだ！？"
10043070-22 = "打順はめちゃくちゃに変わるし、先発ピッチャーはブルペンで投球練習を始める始末！"
10043070-23 = "有望選手は有望なだけ……監督はズレた指示しかしない！"
10043070-24 = "三塁ベースコーチは、壊れた信号機ときてる！"
10043070-25 = "褒められるのは熱い応援歌だけだ！"
10043070-31 = "あの……あまり大声を出しては……。"
10043070-32 = "周囲のご迷惑になってしまいますから……。"
10043070-33 = "あ、あと……ドリンク、美味しかったです。"
10043070-35 = "ああ。好きなだけ頼んでいいからな。"
10043070-36 = "ふぅ……落ち着け……冷静になれ……。"
10043070-37 = "まだだ……3点差まで詰めたんだ。逆転できないわけじゃない。"
10043070-41 = "9回表を守り切れば、裏の攻撃は8番から始まる……！"
10043070-42 = "上手くいけば、4番まで回せるんだ……！"
10043070-43 = "……ああ！"
10043070-44 = "（毎回、2～3点差までは行くんだけどな……）"
10043070-51 = "なんだ！？"
10043070-55 = "た、大変です！"
10043070-60 = "本当にここだったんですね！"
10043070-61 = "監督！こちらです！"
10043070-67 = "ついに見つけたぞ！"
10043070-72 = "どどどうしよう！バレたぞ！"
10043070-73 = "捕まってたまるか！"
10043070-77 = "と、止まってください！"
10043070-84 = "ど、どこへ行くんですか！？"
10043070-85 = "みんな！護衛対象が移動したぞ！"
10043070-92 = "[ns] \"あっちだ！\""
10043070-98 = "観客に紛れ込もうとしても無駄です……。"
10043070-99 = "このスタジアムにいる方々の顔は、既に把握しています！"
10043070-100 = "こんなことをした理由を、聞かせてもらいますよ！"
10043070-108 = "お前たちか！脅迫電話で妨害してきたのは！"
10043070-109 = "妨害、だと……？"
10043070-114 = "馬鹿言うな！足手まといはお前らだろ！"
10043070-115 = "それ以上来るな！近付いたら――"
10043070-121 = "きゃあぁっ！？"
10043070-122 = "こいつが食ってるおにぎりは俺のものだ！"
10043070-123 = "や、やめて！それは今年の新米で作ったおにぎりなの……！"
10043070-128 = "よせ！ファンに手を出すな！"
10043070-132 = "な、なんでブレーブスの4番がここに！？"
10043070-134 = "当然だろ……ファンを傷つけさせはしない！"
10043070-135 = "ファンあっての私たちだ！"
10043070-137 = "いいからお前は試合に戻れ！！！"
10043070-143 = "あっちだ！護衛対象を確認！"
10043070-144 = "お待たせしました！さ、さあ、指示を！"
10043070-146 = "ちっ……制圧しろ！選手たちに怪我はさせるなよ！"
10043070-147 = "監督は……どうなってもいい！"
10043070-152 = "難しいこと言いますね……。"
10043070-154 = "私の扱いだけひどくないか！？"
10043070-160 = "[ns] \"なんとなく、事情が分かったような……。\""
10043070-161 = "そうですか？私にはあまり……。"
10043070-162 = "……。"
10043070-164 = "ですが……無事解決したら、全員でトレーニングをしましょう！"
10043070-165 = "せ、先輩、ひとまずは戦いの方を！"
