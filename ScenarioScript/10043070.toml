[translation]
10043070-1 = "Episódio 7; O que caiu no estádio"
10043070-9 = "……Fim da 8ª entrada, nem pontuamos, nem conseguimos atacar…… Corredores deixados na primeira e terceira base――"
10043070-10 = "Com ninguém eliminado e corredores na primeira e terceira, não conseguir nem um simples hit…… Que tipo de time é esse!"
10043070-11 = "Só estão rebatendo rasteiras desde agora! Já chega…… se aposentem!"
10043070-18 = "Calma aí…… isso é o pão de cada dia, não é……."
10043070-19 = "Felizmente, conseguimos passar até o topo da 9ª entrada sem usar o closer. #nSe eu analisar a linha de rebatidas dos Raiders e lançar um slider na primeira bola……."
10043070-21 = "……Por que os Braves não conseguem vencer de jeito nenhum!?"
10043070-22 = "A ordem de rebatidas muda do nada, e o arremessador titular começa a treinar no bullpen!"
10043070-23 = "Os jogadores promissores são só promissores…… o técnico só dá instruções sem noção!"
10043070-24 = "E o técnico da terceira base é como um semáforo quebrado!"
10043070-25 = "A única coisa que se salva é o hino de torcida empolgante!"
10043070-31 = "Com licença…… não precisa gritar tanto……."
10043070-32 = "Isso acaba incomodando as pessoas ao redor……."
10043070-33 = "Ah, e…… a bebida estava gostosa."
10043070-35 = "Ah. Pode pedir o quanto quiser."
10043070-36 = "Ufa…… calma…… mantenha a calma……."
10043070-37 = "Ainda não acabou…… diminuímos a diferença para 3 pontos. Não é impossível virar."
10043070-41 = "Se defendermos bem o topo da 9ª entrada, o ataque da parte de baixo começa no 8º rebatedor……!"
10043070-42 = "Se tudo der certo, conseguiremos chegar até o 4º rebatedor……!"
10043070-43 = "……Ah!"
10043070-44 = "（Toda vez a gente chega a ficar a 2 ou 3 pontos de diferença, mas……）"
10043070-51 = "O que foi!?"
10043070-55 = "I-isso é um problema!"
10043070-60 = "Então era aqui mesmo!"
10043070-61 = "Técnico! É por aqui!"
10043070-67 = "Finalmente encontramos!"
10043070-72 = "O-o que eu faço! Nos descobriram!"
10043070-73 = "Não vou ser pego!"
10043070-77 = "P-por favor, pare!"
10043070-84 = "A-aonde você vai!?"
10043070-85 = "Pessoal! O alvo da escolta se moveu!"
10043070-92 = "[ns] \"Ali!\""
10043070-98 = "Não adianta tentar se misturar com a multidão……."
10043070-99 = "Já memorizamos o rosto de todos que estão neste estádio!"
10043070-100 = "Vou querer que me expliquem o motivo de terem feito isso!"
10043070-108 = "Foram vocês! Que ficaram atrapalhando com telefonemas de ameaça!"
10043070-109 = "Atrapalhando, disse……?"
10043070-114 = "Não diga besteira! Os estorvos são vocês!"
10043070-115 = "Não cheguem mais perto! Se chegarem――"
10043070-121 = "Aaaah!?"
10043070-122 = "Esse onigiri que ela está comendo é meu!"
10043070-123 = "P-pare! Esse onigiri foi feito com o arroz novo deste ano……!"
10043070-128 = "Parem! Não toquem nos fãs!"
10043070-132 = "P-por que o 4º rebatedor dos Braves está aqui!?"
10043070-134 = "É óbvio…… não vou deixar que machuquem os fãs!"
10043070-135 = "Nós só existimos por causa dos fãs!"
10043070-137 = "Tanto faz, volta logo para o jogo!!!"
10043070-143 = "Ali! Alvo da escolta confirmado!"
10043070-144 = "Desculpe a demora! B-bem, dê as ordens!"
10043070-146 = "Tsc…… dominem eles! Não deixem que os jogadores se machuquem!"
10043070-147 = "O Sensei... não importa o que aconteça com você!"
10043070-152 = "Você diz coisas difíceis, hein..."
10043070-154 = "Não é só o jeito que você me trata que é terrível!?"
10043070-160 = "[ns] \"De alguma forma, acho que entendi a situação...\""
10043070-161 = "É mesmo? Para mim, não muito..."
10043070-162 = "..."
10043070-164 = "Mas... assim que resolvermos isso em segurança, vamos todos treinar juntos!"
10043070-165 = "Se-senpai, por enquanto, foque na batalha!"
