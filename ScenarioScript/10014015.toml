[translation]
10014015-2 = "Pare, Kyoyama Kazusa!! Por que você está fugindo?!"
10014015-3 = "Ah, droga! Vá para lá! Vá para longe!!"
10014015-20 = "Haa, haa, haa..."
10014015-21 = "Estou exausta..."
10014015-22 = "Acho que agora está tudo bem, né...? Será que despistei ela?"
10014015-23 = "Sério, isso é cansativo demais... Só hoje já é a terceira vez..."
10014015-24 = "Bem, eu me afastei do Sensei rapidamente, mas... você não acabou se envolvendo, né? #nEstá tudo bem?"
10014015-25 = "Sim, ainda bem..."
10014015-26 = "...Hm?"
10014015-27 = "Ah. Ela é lenta para escalar muros, então eu a levei para um caminho qualquer."
10014015-28 = "Por isso consegui voltar rápido, mas..."
10014015-32 = "...? #nPor que essa cara?"
10014015-33 = "[s1] \"A Kazusa consegue escalar muros?\"\n[s2] \"Você diz isso de um jeito tão simples...\""
10014015-34 = "...Ah."
10014015-35 = "...Ah."
10014015-36 = "Ah... é..."
10014015-37 = "Bem... várias coisas. Tive oportunidades de praticar. #nDeixa por isso mesmo."
10014015-41 = "...Haa."
10014015-42 = "É verdade... depois de pedir várias coisas a você, não ser justa sobre a situação não é legal. Desculpe."
10014015-43 = "Bem, não é algo que eu queira muito contar..."
10014015-44 = "Mas... é necessário para explicar a situação. #nNão tem jeito, né."
10014015-45 = "Hmm... mas por onde eu deveria começar?"
10014015-46 = "...Sensei, você sabe o que é uma \"Sukeban\"?"
10014015-47 = "São alunas delinquentes. #nEntre elas, tem umas que são bem fáceis de identificar, sabe?"
10014015-48 = "Usam máscara, saias longas, faixas no peito... esse tipo de coisa."
10014015-49 = "Se for o Sensei, acho que você deve ter uma ideia..."
10014015-50 = "Então... o motivo de uma Sukeban ter aparecido é..."
10014015-51 = "Aquela Uzawa de agora pouco. Desde o ensino fundamental, ela é uma idiota sangue quente que sai correndo assim que ouve falar de uma Sukeban forte."
10014015-52 = "O que ela chama de \"Apóstola da Justiça\"... ou algo assim?"
10014015-53 = "Parece que ela continua fazendo a mesma coisa no \"Grupo de Vigilância\" agora..."
10014015-54 = "Sério... é por isso que eu odeio idiotas barulhentos e sangue quente."
10014015-58 = "...Ah, desculpe. Eu ia me desviando do assunto. #nEntão, o ponto principal é este."
10014015-63 = "[ns3] \"Essa foto é...?\"\n[ns4] \"...Uma Sukeban?\""
10014015-64 = "Não é que eu goste de andar com isso por aí. #n— Mas achei que precisava mostrar ao Sensei."
10014015-65 = "Não é que eu goste de andar com isso por aí. #n— Mas achei que precisava mostrar ao Sensei."
10014015-66 = "Acho que o Sensei vai acreditar em mim, mas só por precaução."
10014015-67 = "...Eh?"
10014015-68 = "...Sim, é isso mesmo."
10014015-69 = "Isso..."
10014015-70 = "............Sou eu mesma."
10014015-71 = "Bem, para ser exata, não sou eu de agora, mas sim da época do ensino fundamental."
10014015-72 = "...Eu."
10014015-73 = "............"
10014015-78 = "— Eu era uma \"Sukeban\"."
