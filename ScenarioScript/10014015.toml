[translation]
10014015-2 = "止まりなさい、[ruby=きょうやま]杏山[/ruby]カズサ！！#nなんで逃げるんですか！！"
10014015-3 = "ああもう！あっち行って！あっち行ってよ！！"
10014015-20 = "はあ、はあ、はあ……"
10014015-21 = "疲れた……。"
10014015-22 = "もう大丈夫だよね……？振り切れたかな……。"
10014015-23 = "ほんとキツすぎ……今日だけでもう三回目だよ……。"
10014015-24 = "とりあえず、すぐに先生から離れたけど……巻き込まれたりしてない？#n大丈夫？"
10014015-25 = "うん、ならよかった……。"
10014015-26 = "……ん？"
10014015-27 = "ああ。あいつ、壁を乗り越えるのは遅いから、適当に誘導してきたの。"
10014015-28 = "だから早く帰ってこれたんだけど……"
10014015-32 = "……？#nなにその顔。"
10014015-33 = "[s1] \"カズサって壁登れるの？\"\n[s2] \"すごく簡単そうに言うんですね……？\""
10014015-34 = "……あ。"
10014015-35 = "……あ。"
10014015-36 = "あー……その……。"
10014015-37 = "まぁ……色々。練習する機会があったの。#nそういう事にしといて。"
10014015-41 = "……はあ。"
10014015-42 = "そうだね……こちらから色々お願いしておいて、事情を言わないのはフェアじゃないよね。すみません。"
10014015-43 = "その、あんまり言いたい事ではないんだけど……。"
10014015-44 = "まぁ……状況の説明のためには必要なことだし。#n仕方ないか。"
10014015-45 = "うーん……とは言っても、どこから話せばいいだろ。"
10014015-46 = "……先生、「スケバン」って知ってる？"
10014015-47 = "不良生徒の事なんだけどさ。#nその中でも特に分かりやすい子とかいるじゃん。"
10014015-48 = "マスクして、スカートを長くしたり胸にサラシ巻いたりしてる……ああいうの。"
10014015-49 = "先生だったら多分なんとなく分かると思うんだけど……。"
10014015-50 = "その……なんでスケバンが出てきたかって言うと。"
10014015-51 = "さっきの[ruby=うざわ]宇沢[/ruby]。あいつ、中学生の時から強いスケバンと聞けば、ああやって飛びかかるような熱血バカだったの。"
10014015-52 = "自称「正義の使徒」……ってやつ？"
10014015-53 = "今も「自警団」で同じようなこと続けてるみたいだけど……"
10014015-54 = "ホント……これだから熱血でうるさいバカは嫌い。"
10014015-58 = "……あ、ごめん。話がそれるとこだった。#nそれで、本題はこれ。"
10014015-63 = "[ns3] \"この写真は……？\"\n[ns4] \"……スケバン？\""
10014015-64 = "別に、好きで持ち歩いてるわけじゃないんだけどさ。#n――先生には、見せないといけないかなと思って。"
10014015-65 = "別に、好きで持ち歩いてるわけじゃないんだけどさ。#n――先生には、見せないといけないかなと思って。"
10014015-66 = "先生は信じてくれるとは思うけど、一応。"
10014015-67 = "……え？"
10014015-68 = "……うん、そうだよ。"
10014015-69 = "それ……"
10014015-70 = "…………私であってるよ。"
10014015-71 = "まぁ、正確には今の私じゃなくて中学の時のなんだけどね。"
10014015-72 = "……私。"
10014015-73 = "…………。"
10014015-78 = "――「スケバン」だったの。"
