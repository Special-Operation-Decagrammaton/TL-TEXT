10054090-76 = "Hmm... hey, we only have to work for what we're paid, right?"
10054090-77 = "That's true. We have no obligation to go the extra mile.#nWait... that means—"
10054090-81 = "Oh. This works, then."
10054090-82 = "Yeah, that's right, isn't it?"
10054090-85 = "I don't really feel like doing this anyway. And there weren't any specific instructions."
10054090-86 = "In that case... we'll just pretend to fight!"
10054090-87 = "Plus, I don't want to get a sunburn."
10054090-89 = "Go! Get them! Smash everything!"
10054090-93 = "……Huh?"
10054090-94 = "We aren't going to just take it forever!"
10054090-100 = "W-what is the meaning of this?#nUgh! You small-fry adults... how dare you!!"
10054090-101 = "This is our home! We have things we need to protect!#nJust because you're kids, we won't show any more mercy...!!"
10054090-102 = "What are you delinquents doing!?#nWork as per the contract!"
10054090-103 = "Oh, about that.#nIt didn't say anything in the contract about things turning out like this, did it?"
10054090-104 = "Exactly. It said there would be no resistance.#nBut look at this. We're actually fighting. Don't we need extra pay for this?"
10054090-108 = "Y-you—!"
10054090-113 = "Eek!?"
10054090-114 = "Whoops, stray bullet. #nIf you don't want to get hurt, you'd better back off."
10054090-115 = "……You small-fry, how dare you mock us!"
10054090-116 = "So, in the end, no one can be trusted. #nIf it's come to this, we have no choice but to step in ourselves."
10054090-117 = "Prepare yourselves!!"
10054090-127 = "Those girls are really angry."
10054090-128 = "They probably never expected a situation like this."
