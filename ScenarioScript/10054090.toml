10054090-145 = "A-are you sure? I mean, this will turn our town into a battlefield..."
10054090-146 = "……That is exactly why."
10054090-147 = "Thinking back, we were powerless. It's shameful that we've had to rely on the strength of students and Sensei like this."
10054090-148 = "Yeah... this has always been our home.#nIt's finally time for us to wake up."
10054090-149 = "In short, we just need to make sure they don't pass through this road, right? We can at least do that much."
