[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10054090-1 = "Episódio 9: Contrato e Transição"
10054090-10 = "......"
10054090-11 = "......"
10054090-12 = "Haa... a gente vai ter que fazer isso mesmo...?"
10054090-13 = "Não tem outro jeito, tem... O dinheiro já caiu na nossa conta..."
10054090-14 = "Mas, tipo, botar fogo na rua comercial inteira é... tenso, né?"
10054090-15 = "Pois é... E olha que a cliente até que parecia uma pessoa respeitável. Nunca dá pra saber, né."
10054090-16 = "Aiai, só bora de uma vez."
10054090-23 = "Até que enfim vocês chegaram!"
10054090-24 = "Vão enrolar até quando!?\nMesmo sendo adultas, não sabem nem cumprir um horário. Que vergonha pra vocês, hein!"
10054090-25 = "......Ahn. Só conseguiram reunir isso de gente? Tô decepcionada."
10054090-26 = "M-Mas o que são esses toquinhos de gente."
10054090-27 = "Então é por isso que o intermediário tava com cara de quem ia chorar pedindo desculpa..."
10054090-28 = "Tudo bem, tanto faz. Vamos deixar isso passar dessa vez.\nA nossa gangue tem um coração gigante, sabem."
10054090-29 = "O trabalho de vocês é mamão com açúcar!"
10054090-30 = "A única coisa que precisam fazer é estourar e destruir tudo por aqui!"
10054090-31 = "Olha só, ô pirralha... Dá pra pelo menos explicar o motivo disso tudo?"
10054090-32 = "Vocês já receberam o pagamento, não receberam?\nEntão fechem a matraca e façam o que a gente mandou."
10054090-33 = "Ah, espera... Vai me dizer que as adultas fracassadas aqui nem entendem como funciona um contrato?"
10054090-34 = "Haa... Pelo amor, façam o favor de não me decepcionar ainda mais."
10054090-35 = "Essa pirralha...!"
10054090-36 = "Para começo de conversa, vocês precisam de um motivo para agir?"
10054090-37 = "Se for preciso, é o dinheiro, não é?\nRealmente, o dinheiro resolve qualquer coisa, não acham?"
10054090-38 = "......"
10054090-39 = "......"
10054090-40 = "Nossa, que enjoo ouvir isso..."
10054090-41 = "Bom... a pirralha não tá de todo errada."
10054090-42 = "É... mas, aff..."
10054090-49 = "Booooom diaaa!\nMe desculpem... a gente chegou um tiquinho atrasadas!"
10054090-50 = "Fuwaaah... A Kiki acabou roncando além da conta... desculpa..."
10054090-51 = "Ah, bom dia!\nO descanso das crianças é a coisa mais importante que existe! Relaxem e não se preocupem com isso!"
10054090-52 = "A gente mal chegou e as coisas já vão esquentar por aqui, então recuem ali pra trás para não se machucarem.\nNão fiquem muito na linha de frente, tá?"
10054090-53 = "Sério? Tem certeza de que não vamos atrapalhar?"
10054090-54 = "Vocês duas nunca fizeram isso antes, né. Pensem que hoje é o período de teste de vocês!"
10054090-55 = "(Isso cai como uma luva. Dessa forma não precisamos lutar ativamente nem levantaremos suspeitas)"
10054090-56 = "Puxa, muito obrigada!"
10054090-57 = "Então, está na hora... Que comecem os fogos de artifício!"
10054090-58 = "Boraaaa!!"
10054090-65 = "Elas tiveram a cara de pau de voltar mesmo...!"
10054090-66 = "Nós podíamos ter aguentado calados os abusos até agora, mas...!"
10054090-67 = "As alunas vieram aqui só pra nos ajudar, e agora somos nós quem não vamos aturar isso quietos!"
10054090-74 = "Ai, caramba!? Não me disseram que não haveria resistência nenhuma!?"
10054090-75 = "Quem em sã consciência ficaria parado apanhando quando estão quebrando a própria casa na frente deles..."
10054090-76 = "Ehhh... Ei, a gente só tem a obrigação de fazer o que o contrato pagou, né?"
10054090-77 = "Claro. A gente não tem o menor dever de entregar serviço de graça.\nHm? Pera, se for assim――"
10054090-81 = "É isso. Esse teatro já tá bom demais pra nós."
10054090-82 = "Não é mesmo?"
10054090-85 = "Meu pique pra lutar por essas pirralhas é zero, e pra piorar nem tiveram a decência de dar instruções concretas pra gente."
10054090-86 = "Sendo assim... vamos só fingir que estamos lutando com a galera!"
10054090-87 = "Sem contar que ficar assando nessa areia debaixo do sol vai queimar a nossa pele. É o melhor a se fazer."
10054090-89 = "Vão lá! Acabem com eles! Destruam tudo!"
10054090-93 = "......Ué?"
10054090-94 = "Acharam que íamos ficar apanhando quietos pro resto da vida!"
10054090-100 = "O-O que significa isso!?\nTsc! São só adultos lixosos e fracassados... Que audácia!!"
10054090-101 = "Aqui é o nosso lugar! Nós temos o dever de protegê-lo!\nNão me importa se são crianças, não terei mais piedade...!!"
10054090-102 = "O que diabos vocês Sukebans estão fazendo aí paradas!?\nComecem a trabalhar como manda o contrato agora mesmo!"
10054090-103 = "Ah, sobre isso aí.\nNão tem nada no contrato dizendo que o barraco ia ser armado desse jeito, sacou?"
10054090-104 = "É, certíssimo. Disseram que não haveria resistência.\nMas olha como estamos: num fogo cruzado real. Nós merecemos um bônus de insalubridade por isso, não acham?"
10054090-108 = "S-Suas caloteiras――!"
10054090-113 = "Kyaan!?"
10054090-114 = "Opa, bala perdida.\nEi vocês aí, se não quiserem sair machucadas, é melhor se esconderem logo."
10054090-115 = "......Elas acham que podem rir das nossas caras só porque somos adultas fracassadas!"
10054090-116 = "No fim das contas, a lição mais valiosa de hoje é: nunca confie em ninguém.\nSe for assim, nós mesmas resolveremos isso."
10054090-117 = "Preparem-se!!"
10054090-127 = "Aquelas crianças estão bem furiosas."
10054090-128 = "Acho que nem elas previam que a situação sairia tanto de controle."
10054090-129 = "Mesmo assim, atirar com tudo pra cima de crianças me deixa com a consciência um tanto pesada."
10054090-130 = "Do que vocês estão falando!\nÉ justamente nessas horas que precisamos ser duros e discipliná-las para valer!"
10054090-131 = "Desta vez elas precisarão engolir uma bronca dolorosa para aprenderem a lição!"
10054090-132 = "Ahahaha, depois de ouvir isso vindo da Instrutora Kokona em pessoa, não tem nem como a gente aliviar agora."
10054090-133 = "Então essa é a tática do 'Martelo e Bigorna'. Realmente, o Sensei não erra em seus planos."
10054090-136 = "Tática da Martelo e Bigorna?"
10054090-137 = "Sim, você provavelmente já deve ter ouvido falar... É um conceito tão antigo que é considerado o alfa e o ômega das manobras táticas."
10054090-138 = "A unidade da 'Bigorna' retém e suporta a frente do ataque inimigo, enquanto a unidade do 'Martelo', altamente móvel, flanqueia e ataca as laterais ou a retaguarda num movimento de pinça."
10054090-139 = "É o padrão fundamental e sagrado de qualquer manobra de combate..."
10054090-140 = "Afinal, a esmagadora maioria das formações e sistemas de armamentos orbita justamente na premissa vitalícia de 'conseguiremos ou não executar a tática do martelo e da bigorna com sucesso'."
10054090-142 = "[ns] \"Isso mesmo. E desta vez, o esquadrão de vocês será o nosso 'Martelo'.\""
10054090-143 = "A gente fica com o Martelo? E por conhecerem cada pedrinha desse vilarejo, os comerciantes serão a Bigorna? Mas Sensei... isso quer dizer que..."
10054090-144 = "Entendido, Sensei. Pode contar com a gente."
10054090-145 = "T-Tem certeza disso? Isso significa transformar a nossa própria rua no campo de guerra, mas..."
10054090-146 = "......E é por isso mesmo que faremos isso."
10054090-147 = "Até agora, fomos covardes apanhando calados. Pior ainda, a nossa impotência forçou que nós pedíssemos socorro às alunas e ao Sensei. Isso mancha a nossa honra com muita vergonha."
10054090-148 = "Tem razão... O vilarejo é o nosso lar e nós aceitamos que fizessem o que bem entenderem com ele.\nChegou a hora de acordarmos pra vida."
10054090-149 = "O objetivo é simples: trancar o avanço deles por essa rua custe o que custar, certo? Deixa a defesa bruta com a gente."
10054090-151 = "Então vamos pôr a mão na massa!\nSe a gente limpar tudo e resolver rápido, os danos para as lojas vão ser bem pequenos, né?"
10054090-152 = "Vitória relâmpago. Gosto disso."
10054090-156 = "A brincadeira mal-educada de vocês acaba aqui!!"