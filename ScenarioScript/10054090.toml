10054090-50 = "Yawn... Kiki overslept... I'm so sorry..."
10054090-51 = "Oh, good morning!#nSleep is important for kids, so don't worry about it!"
10054090-52 = "I know we just got here, but it might get dangerous, so stay back.#nDon't get too close to the front."
10054090-53 = "Are you sure?"
10054090-54 = "You two are new, after all. Consider this a trial period."
10054090-55 = "(How convenient. This way, we won't look suspicious even if we don't join the fray.)"
