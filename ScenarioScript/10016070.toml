[translation]
10016070-1 = "第7話;協力（2）"
10016070-2 = "いったい何なのよこのこの戦車！#nどうして動かないの！？"
10016070-3 = "[s1] \"そりゃあ、戦車じゃないからね……。\"\n[s2] \"エンジニア部が昨日修理した時に戦闘機能を封じたんだね……。\""
10016070-4 = "思ったよりつまらない敵でしたね。準備運動にもなりません。"
10016070-5 = "思ったよりつまらない敵でしたね。準備運動にもなりません。"
10016070-6 = "そうですね。大きな問題にならなかったのは幸いですが、こんなに簡単に制圧されるとは……肩透かしです。"
10016070-10 = "うっ……目の前で私たちを馬鹿にするなんて……！"
10016070-11 = "クソッ！後退後退！会場の外で、週休4日に賛同する同志を集め直しよ！"
10016070-16 = "ああっ！！待ちなさい！！！"
10016070-19 = "クロノスチャンネルをご覧の皆さん、こんにちは！お昼はおいしかったでしょうか？"
10016070-20 = "個人対抗種目が主だった午前の試合がすべて終わりましたので、#nここで学園別中間順位を確認していきましょう！"
10016070-21 = "開幕直後はゲヘナ学園が圧倒的な大差で1位に君臨していましたが……"
10016070-22 = "現在の順位は果たして――"
10016070-23 = "なんと！ミレニアムサイエンススクールがトップに躍り出ています！"
10016070-24 = "ミレニアムサイエンススクールですか？運動と縁遠い学園ですから、いつもと同じように今回も成績が奮わないと思っていたのですが……。"
10016070-25 = "やはり主催校としてのプライドでしょうか？"
10016070-26 = "しかし、ゲヘナとトリニティが追い上げているので油断はできません！"
10016070-27 = "目が離せませんねぇ……午後に行われる学園別対抗種目の結果にも注目です！"
10016070-28 = "続いて次の試合は……「障害物競走」です！"
10016070-29 = "障害物競走というと、障害物を乗り越えていく競技でしょうか？"
10016070-30 = "はい。トラックの上には選手たちを妨害する障害物がたくさん配置されています。"
10016070-31 = "「忍者用撒菱」から「500円玉に見えるボトルキャップ」、「拾ってくださいと書かれた箱に入ったぬいぐるみ」まで……"
10016070-32 = "なるほど、そういったものがトラック上にあると走りにくそうですね。"
10016070-33 = "それに加え、今回の障害物競走は特別ルールが追加されています。"
10016070-34 = "そう……バトンの代わりに電子式雷管を挿入した柄付き手榴弾を使用するという点です！"
10016070-35 = "バトンの代わりに手榴弾を渡していくのですか？#nそれはあまりにも危険じゃないでしょうか？"
10016070-36 = "はい。ですが、一定時間内に次の走者に手榴弾を渡せば爆発しないそうです。"
10016070-37 = "あまりにも長時間折り返し地点に入れないと、そのまま手榴弾が爆発して脱落してしまいますが！"
10016070-38 = "なるほど、特定の選手に頼らず、全員がベストを尽くせるよう配慮した措置なのですね。"
10016070-40 = "さあ……この試合で勝利の女神が微笑むのはどの学園なのでしょうか？"
10016070-42 = "「障害物競走」のアビドス代表は……"
10016070-43 = "セリカちゃんとホシノ先輩、そしてシロコ先輩ですね。"
10016070-47 = "うへ～緊張するなぁ。"
10016070-48 = "……ん、任せて。"
10016070-49 = "手榴弾だの、びっくり箱だの……競技に何か変なのがたくさん混ざってるみたいだけど……"
10016070-50 = "晄輪大祭の総合優勝賞金を獲得するためにも、この試合は必ず1位を獲得するわよ！"
10016070-54 = "あはは……いくらなんでも、私たちのような弱小校が総合優勝するのは難しいんじゃないでしょうか……？"
10016070-55 = "ですが……最善を尽くして試合に臨んでください。"
10016070-56 = "私たちが大運動会で活躍すれば、#nアビドス高等学校に転校してくる生徒が増えるかもしれませんから。"
10016070-57 = "うへ～アヤネちゃんはまだまだだねぇ～"
10016070-58 = "大運動会で注目されたいなら、競技場より観客席で頑張る方が効果的なんだよ。"
10016070-59 = "……観客席、ですか？"
10016070-60 = "はい！観客席でのチアリーディング……そう、応援合戦です☆"
10016070-61 = "ホシノ先輩のお話を聞いて、応援も用意してきたのに……"
10016070-62 = "頑張れ！"
10016070-63 = "頑張れ！"
10016070-64 = "水着応援団～☆"
10016070-65 = "水着応援団って何よ！？#nもっとマシな名前なかったの！？"
10016070-69 = "……ん。応援なら、私も準備してきたのがある。"
10016070-70 = "なんだか不吉な予感が……"
10016070-74 = "……60mm対戦車ロケットだよ。"
10016070-76 = "……なんですか！？"
10016070-77 = "威嚇射撃。"
10016070-78 = "応援って味方の士気を上げることもだけど、相手の士気を落とすことも大事。"
10016070-79 = "リレーでこの対戦車ロケットを持ってトラックに入ったら、#n圧倒的な火力差に相手チームの士気が落ちるはず。"
10016070-80 = "いや～いいねぇ。#nやっぱ戦いは出鼻を挫くに限るよねぇ～"
10016070-81 = "うふふ、楽しそうですね☆"
10016070-84 = "そんな……"
10016070-85 = "そんなの許されるわけないじゃないですか！"
10016070-87 = "ふっふっふ……障害物競走に使われる手榴弾は摩擦式遅延信管を使用した旧型に見えますが……実は最先端の電気信管を使用しているんです！"
10016070-88 = "ですが、昨日急ごしらえで作ったので、きちんと動作するか少し不安ですが……"
10016070-89 = "であれば……競技に参加して性能テストを行うのが[ruby=マイスター]職人[/ruby]の道理と言えるでしょう！"
10016070-90 = "それでは、ウタハ先輩。手榴弾のテストは私が行いますので、#n選手たちの応援はお願いしますね！"
10016070-94 = "うむ、応援は任せておけ！"
10016070-95 = "うぅ……私が確認したかった……"
10016070-96 = "いつまでそうやってるんだ、ヒビキ。"
10016070-97 = "応援団がそんな顔をしてたら、選手も実力を発揮できないだろう？"
10016070-98 = "さあ、笑って！お腹から声を出そう！"
10016070-99 = "行け！行け！勝て！勝て！ミレニアム！"
10016070-100 = "み、ミレニアム……！"
10016070-102 = "はぁ……"
10016070-103 = "昨日も今日も変な事件ばっかりで……流石に疲れたな……"
10016070-104 = "ちょっとでも緊張が解けたら倒れちゃいそう……"
10016070-105 = "みんな、あとちょっとですから頑張りましょう。#n晄輪大祭はまだ終わっていません。"
10016070-106 = "今もなお、極悪非道なテロリストがどこで悪巧みをしているか分からないのですよ。"
10016070-110 = "ねえ、こっちに近づいてくる巨大な物体がレーダーに引っかかったんだけど……"
10016070-111 = "これ、大丈夫かな……？"
10016070-113 = "（はぁ……こんな面倒くさそうな試合には出場したくなかったのに……）"
10016070-114 = "（でも、3位内に入ったら晄輪大祭で何でも食べられる「万能食券」をくれるってアコが言ってたし……）"
10016070-117 = "（とりあえず頑張ってみようかな……？）"
10016070-125 = "さあ、開始の合図が鳴りました！各選手、一斉に走り出します！"
10016070-129 = "猛烈な勢いでトラックを疾走していく！"
10016070-133 = "最初の障害物「まきびしトラック」を無事突破し、#n第二走者にバトン――いや、手榴弾が渡された！"
10016070-134 = "続く次の障害物は……"
10016070-135 = "キュルキュルキュル！"
10016070-136 = "これは一体何の音でしょうか！？異音がグラウンドに響き渡ります！"
10016070-141 = "し、しつこいわね……"
10016070-142 = "ついてこないで！"
10016070-148 = "おおっと！！これは一体どういった事でしょう！？#n戦車です！グラウンドに突如として戦車が現れました！"
10016070-149 = "そちらにつきましてはエンジニア部よりご説明します！"
10016070-150 = "このロボットは、私たちエンジニア部が大運動会用に作った応援ロボットなのです。"
10016070-151 = "どんな場所でも迅速に移動できるよう、空気抵抗を減らした丸い胴体、そして段差も乗り越えられるカタピラをセットしました！"
10016070-152 = "今はちょっと「小さな問題」があるから公式には使ってないけど……"
10016070-154 = "どうしてアレがここにあるんだろ……？"
10016070-155 = "なんと！応援ロボットとの事でした！#nですが、応援ロボットと呼ぶには些か無理があるのでは？"
10016070-156 = "ああ。それは騒動やテロが発生した際、すぐ鎮圧できるよう搭載した戦闘システムだよ。"
10016070-157 = "もちろん今は勝手に動かないように調整しているがね。#nそう……強力な衝撃を与えたりしない限り異常作動することはまずな――"
10016070-158 = "プシュー"
10016070-159 = "ドッカーン！"
10016070-160 = "シロコ先輩！それ使わないでって言ったでしょ！"
10016070-161 = "対戦車ロケットを撃つ応援団がどこにいるのよ！？"
10016070-162 = "ダメか……"
10016070-163 = "ダメに決まってるでしょ！"
10016070-164 = "うわぁ……なんか高そうな戦車に当たってる。#n大丈夫かな……"
10016070-166 = "＜400mm以上の貫通力を持つ弾頭の爆発を感知。戦闘システムを起動します＞"
10016070-167 = "＜半径1km以内の不良生徒を探知中……＞"
10016070-168 = "＜不法JHP弾を所持した生徒が3人、許可されていない自家製体操着を着用した生徒が7人、歩行しながら飲食する生徒が5人……＞"
10016070-170 = "……不良かどうかの判断基準が思ったより厳しいですね。"
10016070-171 = "AIのマシンラーニングにセミナーの意思決定アルゴリズムを使ったのさ。"
10016070-172 = "その過程で「どこかの冷酷な会計」に影響を受けたのかも……"
10016070-174 = "＜調査完了。半径1km以内のすべての生徒を「不良生徒」とみなします＞"
10016070-175 = "＜全員――因数分解します！＞"
10016070-176 = "ドッカーン！"
10016070-178 = "ちょ、ちょっと何アレ！？#nどうして戦車があるの！？"
10016070-179 = "さっきのロケットのせいで戦車が暴走した！？"
10016070-180 = "さっきのロケットのせいで戦車が暴走した！？"
10016070-181 = "もう……！これ全部シロコ先輩のせいじゃん！"
10016070-183 = "わ、わぁっ！制御不能になってしまいました！#n先輩ー！助けてください！！"
10016070-184 = "＜大運動会の円満開催を妨害する不良生徒は……直ちに排除します＞"
10016070-186 = "ついに姿を現したな、ミレニアムのテロリストめ！"
10016070-187 = "こうなった以上、手榴弾でカタピラを切るしか……"
10016070-191 = "……あれ？手榴弾が作動しな――"
10016070-193 = "ドッカーン！"
10016070-194 = "さ、サキちゃん――！"
10016070-196 = "み、皆さん……ご覧になりましたか？"
10016070-197 = "障害物競走に戦車が乱入し、生徒を攻撃しています！"
10016070-198 = "皆さんで手を取り合って取り組むはずの晄輪大祭に、あんなものが現れるとは……"
10016070-199 = "前代未聞の大型スクー……いえ、事件ですね！"
10016070-201 = "ユウカ、あの戦車は一体？"
10016070-202 = "「晄輪大祭」にあんな戦車を使う競技があるなんて聞いておりませんが。"
10016070-203 = "わ、私もよ！#nあんな戦車があるなんて聞いてない！"
10016070-204 = "彼らのことだから、どうせ形だけのハリボテだと思ってたけど……。"
10016070-205 = "本当に知らないんですか？#nあなたのような言葉遣いで騒いでいますよ。"
10016070-206 = "「因数分解してやる～」とか「完璧～」とか言っていますけど……。"
10016070-207 = "それ、私の話し方を真似してるつもりなの！？"
10016070-208 = "先生は、あの戦車の事何か知ってますか？#nもしかして私が寝てる間に何かあったとか！？"
10016070-209 = "[s3] \"えっと、それが……。\"\n[s4] \"説明すると長くなるんだけど……。\""
10016070-212 = "説明は後からでも遅くないでしょう。"
10016070-213 = "マリーさん、まずは観客の避難誘導をお願いします。"
10016070-214 = "……は、はいっ！"
10016070-215 = "残った私たちで戦車を無力化しましょう！"
10016070-217 = "はいはい。あなたの指示がなくたって、そのように動くつもりでしたよ？"
10016070-218 = "もう、先生！#n後で始末書の覚悟をしておいてくださいね！"
