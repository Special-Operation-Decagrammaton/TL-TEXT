[translation]
10016070-1 = "Episódio 7; Cooperação (2)"
10016070-2 = "O que é esse tanque, afinal!?#nPor que ele não se mexe!?"
10016070-3 = "[s1] \"Bem, é porque não é um tanque...\"\n[s2] \"O Departamento de Engenharia selou as funções de combate quando o consertou ontem...\""
10016070-4 = "Foram inimigos mais entediantes do que eu pensava. Nem serviram para um aquecimento."
10016070-5 = "Foram inimigos mais entediantes do que eu pensava. Nem serviram para um aquecimento."
10016070-6 = "Concordo. É uma sorte que não tenha se tornado um problema maior, mas ser subjugados tão facilmente... foi decepcionante."
10016070-10 = "Ugh... Como ousam nos ridicularizar bem na nossa frente...!"
10016070-11 = "Droga! Recuar, recuar! Vamos reunir novamente os camaradas que apoiam a semana de 4 dias de trabalho fora do local do evento!"
10016070-16 = "Ah!! Espere aí!!!"
10016070-19 = "Olá a todos que assistem ao Canal Kronos! Espero que tenham tido um bom almoço!"
10016070-20 = "Como todas as provas individuais da manhã terminaram, #nvamos conferir agora o ranking intermediário por escola!"
10016070-21 = "Logo após a abertura, o Colégio Gehenna reinava em 1º lugar com uma vantagem esmagadora, mas..."
10016070-22 = "Qual será o ranking atual?"
10016070-23 = "Incrível! A Millennium Science School saltou para o topo!"
10016070-24 = "Millennium Science School? Como é uma escola distante de atividades físicas, eu achei que o desempenho deles seria fraco como sempre..."
10016070-25 = "Será o orgulho de ser a escola anfitriã?"
10016070-26 = "No entanto, Gehenna e Trinity estão correndo atrás, então não dá para baixar a guarda!"
10016070-27 = "Não dá para tirar os olhos... Fiquem atentos aos resultados das provas entre escolas que acontecerão à tarde!"
10016070-28 = "A próxima prova é... a \"Corrida de Obstáculos\"!"
10016070-29 = "Falando em corrida de obstáculos, seria uma competição de superar obstáculos?"
10016070-30 = "Sim. Na pista, há muitos obstáculos dispostos para atrapalhar os atletas."
10016070-31 = "Desde \"abrolhos ninjas\" até \"tampas de garrafa que parecem moedas de 500 ienes\" e \"bichos de pelúcia dentro de caixas com um bilhete dizendo 'por favor, pegue-me'\"..."
10016070-32 = "Entendo, parece difícil correr com essas coisas na pista."
10016070-33 = "Além disso, uma regra especial foi adicionada a esta corrida de obstáculos."
10016070-34 = "Isso mesmo... O uso de uma granada de mão com cabo, equipada com um detonador eletrônico, em vez de um bastão!"
10016070-35 = "Passar uma granada em vez de um bastão?#nIsso não é perigoso demais?"
10016070-36 = "Sim. Mas dizem que, se passar a granada para o próximo corredor dentro de um tempo determinado, ela não explode."
10016070-37 = "Se demorar demais para chegar ao ponto de retorno, a granada explode e o time é eliminado!"
10016070-38 = "Entendo, é uma medida pensada para que todos deem o seu melhor, sem depender apenas de um atleta específico."
10016070-40 = "Bem... qual escola terá o sorriso da deusa da vitória nesta prova?"
10016070-42 = "As representantes de Abydos na \"Corrida de Obstáculos\" são..."
10016070-43 = "Serika, Hoshino-senpai e Shiroko-senpai."
10016070-47 = "Uhe~ que nervoso."
10016070-48 = "...Hum, deixem comigo."
10016070-49 = "Granadas, caixas surpresa... parece que misturaram muitas coisas estranhas na competição..."
10016070-50 = "Para ganhar o prêmio da vitória geral do Festival Kourin, vamos conquistar o 1º lugar nesta prova!"
10016070-54 = "Ahaha... por mais que tentemos, não é difícil para uma escola pequena como a nossa vencer no geral...?"
10016070-55 = "Mas... por favor, deem o seu melhor na prova."
10016070-56 = "Se tivermos um bom desempenho no Grande Festival Esportivo, #ntalvez mais alunas se transfiram para o Colégio Abydos."
10016070-57 = "Uhe~ Ayane-chan, você ainda tem muito o que aprender~"
10016070-58 = "Se quer chamar atenção no Grande Festival Esportivo, é mais eficaz se esforçar na arquibancada do que na pista."
10016070-59 = "...Na arquibancada?"
10016070-60 = "Sim! Líderes de torcida na arquibancada... isso mesmo, uma batalha de torcidas!☆"
10016070-61 = "Depois de ouvir a Hoshino-senpai, eu até preparei uma torcida..."
10016070-62 = "Força!"
10016070-63 = "Força!"
10016070-64 = "Time de torcida de biquíni~☆"
10016070-65 = "O que é esse time de torcida de biquíni!?#nNão tinha um nome melhor!?"
10016070-69 = "...Hum. Se for torcida, eu também preparei algo."
10016070-70 = "Sinto um presságio sinistro..."
10016070-74 = "……É um lança-foguetes antitanque de 60mm."
10016070-76 = "……O quê!?"
10016070-77 = "Tiro de advertência."
10016070-78 = "Torcer não é só elevar o moral dos aliados, também é importante derrubar o moral dos adversários."
10016070-79 = "Se eu entrar na pista do revezamento com este lança-foguetes, #na diferença de poder de fogo esmagadora deve acabar com o moral da equipe adversária."
10016070-80 = "Nossa, que bom. #nNada como frustrar o ímpeto do inimigo logo de cara, né?"
10016070-81 = "Ufufu, parece divertido☆"
10016070-84 = "Isso é..."
10016070-85 = "Isso não é algo que se possa permitir!"
10016070-87 = "Hehehe... As granadas usadas na corrida de obstáculos parecem modelos antigos com fusíveis de retardo por fricção, mas... na verdade, elas usam fusíveis elétricos de última geração!"
10016070-88 = "Mas, como fiz às pressas ontem, estou um pouco preocupada se vão funcionar direito..."
10016070-89 = "Sendo assim... participar da competição para testar o desempenho é o dever de um artesão!"
10016070-90 = "Então, Utaha-senpai. Como eu vou fazer o teste das granadas, #npor favor, cuide da torcida pelos atletas!"
10016070-94 = "Certo, pode deixar a torcida comigo!"
10016070-95 = "Uuu... eu queria ter verificado..."
10016070-96 = "Até quando vai ficar assim, Hibiki?"
10016070-97 = "Se a líder da torcida ficar com essa cara, os atletas não vão conseguir mostrar seu potencial, não é?"
10016070-98 = "Vamos, sorria! Coloque energia na voz!"
10016070-99 = "Vai! Vai! Ganha! Ganha! Millennium!"
10016070-100 = "Mi, Millennium...!"
10016070-102 = "Haa..."
10016070-103 = "Ontem e hoje só aconteceram incidentes estranhos... estou exausta, para ser sincera..."
10016070-104 = "Sinto que vou desmaiar se relaxar um pouco que seja..."
10016070-105 = "Pessoal, falta pouco, então vamos nos esforçar. #nO Festival de Halo ainda não acabou."
10016070-106 = "Ainda não sabemos onde terroristas vis e cruéis podem estar tramando algo."
10016070-110 = "Ei, o radar detectou um objeto enorme se aproximando daqui..."
10016070-111 = "Será que isso é seguro...?"
10016070-113 = "(Haa... eu não queria ter participado de uma competição tão problemática assim...)"
10016070-114 = "(Mas a Ako disse que, se ficarmos entre os 3 primeiros, ganharemos um 'Vale-Refeição Universal' que permite comer qualquer coisa no Festival de Halo...)"
10016070-117 = "(Bom, acho que vou tentar dar o meu melhor...?)"
10016070-125 = "Certo, o sinal de partida soou! Todos os atletas começam a correr ao mesmo tempo!"
10016070-129 = "Eles estão correndo pela pista com uma velocidade feroz!"
10016070-133 = "Superaram o primeiro obstáculo, a 'Pista de Caltrops', sem problemas, e o bastão — não, a granada — foi passado para o segundo corredor!"
10016070-134 = "O próximo obstáculo é..."
10016070-135 = "Kyuru kyuru kyuru!"
10016070-136 = "Que som é esse!? Um ruído estranho ecoa pelo campo!"
10016070-141 = "Que, que insistência..."
10016070-142 = "Não me sigam!"
10016070-148 = "Oh!! O que é isso!? #nUm tanque! Um tanque apareceu de repente no campo!"
10016070-149 = "Sobre isso, o Clube de Engenharia explicará!"
10016070-150 = "Este robô é um robô de torcida que nós, do Clube de Engenharia, fizemos para o Grande Festival Esportivo."
10016070-151 = "Para se mover rapidamente em qualquer lugar, colocamos um corpo arredondado para reduzir a resistência do ar e lagartas para superar degraus!"
10016070-152 = "Como ele tem um 'pequeno problema', não estamos usando oficialmente, mas..."
10016070-154 = "Por que aquilo está aqui...?"
10016070-155 = "Incrível! Era um robô de torcida! #nMas, não é um pouco forçado chamar isso de robô de torcida?"
10016070-156 = "Ah. Isso é um sistema de combate instalado para que possamos suprimir distúrbios ou terrorismo rapidamente caso ocorram."
10016070-157 = "Claro, agora ele está ajustado para não se mover sozinho. #nSim... a menos que receba um impacto forte, é quase impossível que ele funcione mal—"
10016070-158 = "Pshhh"
10016070-159 = "CABUM!"
10016070-160 = "Shiroko-senpai! Eu disse para não usar isso!"
10016070-161 = "Onde é que tem uma torcida organizada que dispara foguetes antitanque!?"
10016070-162 = "Não vai dar..."
10016070-163 = "Claro que não vai dar, né!"
10016070-164 = "Uau... parece que acertou um tanque que custa uma fortuna. #nSerá que está tudo bem..."
10016070-166 = "＜Detecção de explosão de ogiva com poder de penetração superior a 400mm. Iniciando sistema de combate.＞"
10016070-167 = "＜Detectando estudantes delinquentes em um raio de 1km...＞"
10016070-168 = "＜3 estudantes portando munição JHP ilegal, 7 estudantes usando uniformes de ginástica caseiros não autorizados, 5 estudantes comendo enquanto caminham...＞"
10016070-170 = "...Os critérios para julgar quem é delinquente são mais rigorosos do que eu pensava."
10016070-171 = "Usei o algoritmo de tomada de decisão do Seminar no aprendizado de máquina da IA."
10016070-172 = "Talvez ela tenha sido influenciada por uma certa 'contadora implacável' durante o processo..."
10016070-174 = "＜Investigação concluída. Todas as estudantes em um raio de 1km serão consideradas 'estudantes delinquentes'.＞"
10016070-175 = "＜Todas vocês — serão fatoradas!＞"
10016070-176 = "BOOM!"
10016070-178 = "Ei, o que é aquilo!? #nPor que tem um tanque aqui!?"
10016070-179 = "O tanque enlouqueceu por causa daquele foguete de agora pouco!?"
10016070-180 = "O tanque enlouqueceu por causa daquele foguete de agora pouco!?"
10016070-181 = "Ah, não...! Isso é tudo culpa da veterana Shiroko!"
10016070-183 = "A-ah! Perdi o controle! #nVeterana! Me ajude!!"
10016070-184 = "＜Estudantes delinquentes que interferem na realização pacífica do Festival Esportivo... serão eliminadas imediatamente.＞"
10016070-186 = "Finalmente deu as caras, sua terrorista do Millennium!"
10016070-187 = "Já que chegamos a esse ponto, só nos resta cortar a lagarta com uma granada..."
10016070-191 = "...Ué? A granada não funcionou—"
10016070-193 = "BOOM!"
10016070-194 = "Sa-Saki—!"
10016070-196 = "P-pessoal... vocês viram isso?"
10016070-197 = "Um tanque invadiu a corrida de obstáculos e está atacando as estudantes!"
10016070-198 = "Algo assim aparecer no Festival Esportivo, onde todos deveriam estar de mãos dadas..."
10016070-199 = "É um escândalo... digo, um incidente sem precedentes!"
10016070-201 = "Yuuka, o que é aquele tanque?"
10016070-202 = "Não me lembro de ter ouvido falar de nenhuma competição no 'Festival Esportivo' que usasse um tanque desses."
10016070-203 = "E-eu também não! #nNão me avisaram que teria um tanque desses!"
10016070-204 = "Como são eles, achei que fosse só uma carcaça de fachada, mas..."
10016070-205 = "Você realmente não sabe? #nEle está fazendo barulho usando o seu jeito de falar."
10016070-206 = "Está dizendo coisas como 'Vou fatorar vocês' ou 'Perfeito'..."
10016070-207 = "Isso é uma tentativa de imitar o meu jeito de falar!?"
10016070-208 = "Sensei, você sabe algo sobre aquele tanque? #nSerá que aconteceu alguma coisa enquanto eu estava dormindo!?"
10016070-209 = "[s3] \"Bem, é que...\"\n[s4] \"É uma longa história para explicar...\""
10016070-212 = "Não será tarde demais para explicações depois."
10016070-213 = "Mari, por favor, comece guiando os espectadores para a evacuação."
10016070-214 = "...S-sim!"
10016070-215 = "Vamos neutralizar o tanque com os que restaram!"
10016070-217 = "Sim, sim. Mesmo sem as suas instruções, eu já pretendia agir assim."
10016070-218 = "Ah, Sensei! #nPrepare-se para escrever um relatório de desculpas depois!"
