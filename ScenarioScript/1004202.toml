[translation]
1004202-1 = "A Princesa nas Ruínas"
1004202-2 = "（Inalação, esfregando）"
1004202-3 = "[s] \"Bem... bom dia, Atsuko.\""
1004202-4 = "（…………）"
1004202-9 = "……Ah."
1004202-14 = "Desculpe, foi força do hábito."
1004202-15 = "Eu não preciso mais da linguagem de sinais nem da máscara."
1004202-16 = "……Recomeçando."
1004202-17 = "Bom dia, Sensei."
1004202-18 = "[s1] \"……Sim, bom dia.\"\n[s2] \"Bom dia…… embora agora seja noite.\""
1004202-19 = "Cumprimentar é importante…… por isso."
1004202-20 = "Cumprimentar é importante…… por isso."
1004202-21 = "Este lugar é um prédio escolar abandonado, mas é perfeito para se esconder…… pretendo ficar aqui por mais uma semana."
1004202-22 = "Parece que todos estão ocupados, então foram para algum lugar. Eles deixaram muita comida e bebida para mim, mas……"
1004202-23 = "Por isso, chamei o Sensei em segredo. Não podemos ser descobertos. O Sensei é meu amigo secreto."
1004202-24 = "[s] \"Entendo, um amigo secreto…….\""
1004202-25 = "Isso, um segredo. Seria um problema se todos descobrissem. Tudo bem?"
1004202-26 = "Então, Sensei. O que vamos brincar?"
1004202-27 = "[s] \"Hmm…….\""
1004202-28 = "……Tive uma ideia. \"Brincar de escola\"."
1004202-29 = "[s] \"Brincar de escola?\""
1004202-30 = "Ter uma aula com o Sensei na sala de aula. Eu nunca tive isso antes."
1004202-31 = "Parece que aqui também era uma escola antigamente, então tem uma sala de aula."
1004202-32 = "Aqui, temos uma aluna e um sensei."
1004202-33 = "Vamos."
1004202-37 = "[ns] Acompanhar."
1004202-41 = "……."
1004202-42 = "[s] \"Isso aqui não parece muito seguro para sentar…….\""
1004202-43 = "É. Eu queria pelo menos sentir a atmosfera, mas parece impossível."
1004202-44 = "Não tem jeito. Vamos parar de brincar de escola."
1004202-45 = "Hmm…… o que mais podemos fazer?"
1004202-49 = "……Hm?"
1004202-50 = "Sensei. Eles estão voltando."
1004202-51 = "A brincadeira de hoje acaba aqui. Se descobrirem que o Sensei está aqui, eles vão ficar bravos."
1004202-52 = "[s] \"Ah, sim…….\""
1004202-53 = "Desculpe. Vamos brincar de novo outra hora."
1004202-55 = "（Deixando Atsuko para trás com uma expressão de desapontamento, saí da escola abandonada.）"
