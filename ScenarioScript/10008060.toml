[translation]
10008060-1 = "Episódio 6: O motivo para querer recuperar"
10008060-3 = "[ns] \"Que tal organizarmos a situação primeiro?\""
10008060-4 = "Sim. Primeiro, toda essa confusão em torno da caixa de ofertas foi um golpe em larga escala da organização criminosa \"Grupo Kurokame\"."
10008060-5 = "E-então os Kaitengers, fingindo ser a justiça, roubaram a caixa de ofertas..."
10008060-6 = "E aí, um monte de encrenqueiros e o Comitê Disciplinar apareceram de uma vez!"
10008060-7 = "Basicamente, virou uma corrida caótica onde tudo está uma bagunça, ahaha!"
10008060-8 = "...Que começo de ano agitado, francamente."
10008060-14 = "Fufu..."
10008060-15 = "Bem, não importa! De qualquer forma, que bom que deu tudo certo!"
10008060-16 = "...Presidente?"
10008060-17 = "Hmm? Aru-chan, parece que você ficou aliviada, né?"
10008060-18 = "N-não, é que..."
10008060-19 = "Kufufu, será que é porque... você descobriu que o seu desejo não vai ser \"invertido\"?"
10008060-20 = "¡?"
10008060-21 = "Não quero nem pensar, mas... será que esse era o motivo de você estar perseguindo a caixa de ofertas esse tempo todo...?"
10008060-25 = "N-não é nada disso!"
10008060-26 = "E-eu só estava um pouco curiosa, só isso..."
10008060-27 = "Ora, veja bem! Ninguém quer começar o ano novo com um sentimento ruim, certo!?"
10008060-28 = "Ahaha!"
10008060-29 = "Além disso, Aru-chan, você fez um pedido super sincero, né!"
10008060-30 = "N-não... isso é, porque, sabe..."
10008060-32 = "Haa... Mutsuki, vamos deixar isso de lado por enquanto."
10008060-33 = "E-eu entendo os sentimentos da Aru-sama! Sim!"
10008060-34 = "Ahahaha!"
10008060-35 = "Bem, mas agora que entendemos tudo... hum, se era tudo um golpe, vamos voltar para casa?"
10008060-36 = "Ou, já que era um golpe mesmo, talvez valha a pena pegar o conteúdo daquela caixa de ofertas para nós?"
10008060-43 = "Presidente, o que vamos fazer?"
10008060-44 = "...O que temos que fazer não muda. Vamos recuperar e devolver, só isso."
10008060-45 = "Hã?"
10008060-46 = "Todas vocês fizeram um pedido, não fizeram?"
10008060-47 = "É óbvio, mas vocês só fizeram o pedido porque queriam que ele se realizasse."
10008060-48 = "Não é?"
10008060-49 = "Alguém por aí até se esforçou para abrir mão de seus hobbies para fazer o pedido..."
10008060-51 = "..."
10008060-53 = "E alguém por aí colocou o dinheiro suado que ganhou trabalhando duro no canteiro de obras...!"
10008060-54 = "Aru-sama..."
10008060-55 = "(A Haruka não parece se importar muito com isso...)"
10008060-56 = "(O meu dinheiro era de brinquedo, mas...)"
10008060-58 = "É verdade que essa situação pode ser apenas nós sendo manipuladas por uma organização criminosa e gente estranha. Mesmo assim..."
10008060-59 = "Aquele desejo era verdadeiro...!"
10008060-60 = "Não posso deixar que o sujem!"
10008060-65 = "...A-Aru-sama! Você se importa tanto assim com a gente...!"
10008060-66 = "Hmm, a Aru-chan é mesmo a Aru-chan."
10008060-67 = "...Você sempre acaba acertando em cheio quando menos esperamos."
10008060-72 = "Sério, às vezes você diz umas coisas muito boas, sabia...?"
10008060-73 = "[s] \"Como esperado da Presidente Aru.\""
10008060-74 = "Em resumo, nosso objetivo não mudou!"
10008060-75 = "Não importa a circunstância, nós vamos recuperar a caixa de ofertas. Eu decidi!"
10008060-76 = "Vamos lá, vocês vão me acompanhar, certo?"
10008060-78 = "...Bem, não tem outro jeito."
10008060-79 = "Kufufu, bem, isso parece mais interessante! Tudo bem!"
10008060-80 = "S-sim!"
10008060-82 = "Entendido, entendido."
10008060-83 = "[s] \"Então, vamos nessa.\""
10008060-87 = "A propósito... para onde será que os Kaitenger foram?"
10008060-88 = "Ahaha,"
10008060-89 = "Até esse seu jeito atrapalhado é a sua cara, Aru-chan."
10008060-90 = "……Bem,"
10008060-91 = "Eu tenho uma pista."
10008060-92 = "Kayoko! Como esperado da nossa confiável gerente da Problem Solver 68...!"
10008060-93 = "Não exagera..."
10008060-94 = "De qualquer forma, considerando o caso da lavagem de dinheiro que o Comitê Disciplinar mencionou, a caixa de ofertas e as intenções dos Kaitenger..."
10008060-95 = "Provavelmente..."
10008060-97 = "Mercado Negro - Beco"
10008060-100 = "Ufa..."
10008060-101 = "Chegando até aqui, com certeza conseguimos despistá-los—"
10008060-108 = "Encontrei vocês!"
10008060-109 = "O quê,"
10008060-110 = "Como eles descobriram nossa localização...!?"
10008060-112 = "Uau, na mosca! Como esperado da Kayoko-chi!"
10008060-113 = "Não é nada complicado. Se eles roubaram algo ilegal sabendo que era ilegal..."
10008060-114 = "Para se livrar disso, eles precisam de uma rota ilegal. Ou seja, não tem como fugir do mercado negro."
10008060-115 = "Bem, acho que o Comitê Disciplinar logo vai perceber isso também."
10008060-117 = "Mesmo assim, chegamos antes do Comitê Disciplinar! Só por isso, você merece um prêmio, Kayoko!"
10008060-121 = "Agora, devolvam a caixa de ofertas pacificamente!"
10008060-122 = "Haha, que bobagem!"
10008060-123 = "B-bobagem...!?"
10008060-124 = "Uma vez roubada, esta caixa de ofertas é nossa, é o fundo dos Kaitenger! Não há motivo para devolvermos!"
10008060-125 = "[s] \"Essa é uma fala de vilão clássica...\""
10008060-126 = "O quê! Nós somos a própria justiça! Se você procurar por \"justiça\" no dicionário, nossos nomes deveriam estar lá!"
10008060-127 = "Já que é assim, ataque total de todos! Tudo pelo nosso sonho...!"
10008060-133 = "Todo mundo diz a mesma coisa, né? Sobre sonhos e tal."
10008060-134 = "Haa..."
10008060-136 = "Se vocês vão vir com essa, então vamos usar a força também...!"
10008060-137 = "Vamos nessa!"
