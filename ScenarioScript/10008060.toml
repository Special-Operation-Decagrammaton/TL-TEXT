[translation]
10008060-1 = "第6話;取り戻したい理由"
10008060-3 = "[ns] \"とりあえず状況を整理してみようか？\""
10008060-4 = "うん。まず賽銭箱を巡る一連の流れは、犯罪組織「黒亀組」の大規模な詐欺だった。"
10008060-5 = "そ、それでカイテンジャーが、正義と言いつつ、賽銭箱を盗み……。"
10008060-6 = "で、他の問題児たちやら風紀委員会やらが大集合～！"
10008060-7 = "あっちこっちがめちゃくちゃなドタバタレースになってるってことだね、あはっ！"
10008060-8 = "……新年早々慌ただしいね、全く。"
10008060-14 = "ふふっ……。"
10008060-15 = "まあ良いわ！とにかく良かった良かった！"
10008060-16 = "……社長？"
10008060-17 = "ふ～ん？アルちゃん、安心したーって感じだね？"
10008060-18 = "い、いやそのっ……！？"
10008060-19 = "くふふっ、もしかしてぇ……アルちゃんの願い事が「裏返る」なんてことはない、って分かったから？"
10008060-20 = "っ！？"
10008060-21 = "まさかとは思うけど……ずっと賽銭箱を追いかけてた理由って、それ……？"
10008060-25 = "ち、違うわよ！"
10008060-26 = "あ、あくまでちょっと、気になってたぐらいで……"
10008060-27 = "ほ、ほら！新年早々、嫌な気持ちで始めるのは避けたいでしょう！？"
10008060-28 = "あははっ！"
10008060-29 = "それにアルちゃん、すっごい切実なお願い事してたもんね！"
10008060-30 = "い、いや……それはだからその……！"
10008060-32 = "はぁ……ムツキ、この辺にしておいてあげよう。"
10008060-33 = "わ、私はアル様の気持ちも理解できます！はい！"
10008060-34 = "あはははっ！"
10008060-35 = "まあ、でも色々分かってきたことだし……んー、全部詐欺なら、もう帰っちゃう？"
10008060-36 = "それかどうせ詐欺だったなら、あらためてあの賽銭箱の中身を手に入れちゃうのもアリかも？"
10008060-43 = "社長、どうする？"
10008060-44 = "……やることは変わらないわ。取り戻して、返すだけよ。"
10008060-45 = "えっ？"
10008060-46 = "みんな、お願い事をしたでしょう？"
10008060-47 = "当たり前だけど、それが叶ってほしいからこそお願い事をしたはず。"
10008060-48 = "そうよね？"
10008060-49 = "どっかの誰かさんは、趣味を我慢してでも願ったわけだし……。"
10008060-51 = "……。"
10008060-53 = "どっかの誰かさんは、工事現場で頑張って働いた大事なお金を入れたわけだし……！"
10008060-54 = "アル様……。"
10008060-55 = "（ハルカはその辺、あんまり気にしてなさそうだけど……）"
10008060-56 = "（私はオモチャのお金だったけど……）"
10008060-58 = "確かにこの状況は、犯罪組織と変なやつらに振り回されているだけかもしれない。それでも……"
10008060-59 = "あの願いは本物だったんだから……！"
10008060-60 = "それを、汚させるわけにはいかないわ！"
10008060-65 = "……あ、アル様！そこまで、私たちのことを……！"
10008060-66 = "うーん、アルちゃんはやっぱりアルちゃんだね～。"
10008060-67 = "……こうやって、たまに刺してくるんだから。"
10008060-72 = "ほんっと、時々だけど良いこと言うわよね……？"
10008060-73 = "[s] \"流石はアル社長だね。\""
10008060-74 = "つまり、私たちの目的は変わらないわ！"
10008060-75 = "どんな事情があったって、とにかく賽銭箱は取り返す。そう決めたの！"
10008060-76 = "さあ、付き合ってもらうわよ？"
10008060-78 = "……まあ、仕方ない。"
10008060-79 = "くふふっ、まあそっちの方が面白そうだし！良いよ！"
10008060-80 = "は、はい！"
10008060-82 = "分かった分かった。"
10008060-83 = "[s] \"じゃ、行こっか。\""
10008060-87 = "ところで……カイテンジャーはどこに行ったのかしら？"
10008060-88 = "あはっ、"
10008060-89 = "締まらないところまで含めてアルちゃんだねー。"
10008060-90 = "……まあ、"
10008060-91 = "手がかりならあるよ。"
10008060-92 = "カヨコ！さすがは私たち便利屋68の頼れる課長……！"
10008060-93 = "大げさな……"
10008060-94 = "とにかくさっきの風紀委員会が言ってた資金洗浄の件、賽銭箱、それからカイテンジャーの意図を推測すると……"
10008060-95 = "多分……"
10008060-97 = "ブラックマーケット・路地裏"
10008060-100 = "ふぅ……"
10008060-101 = "ここまで来れば、流石に振り切っ――"
10008060-108 = "見つけたわよっ！"
10008060-109 = "なっ、"
10008060-110 = "どうして我々の位置が……！？"
10008060-112 = "わ～お、バッチリ！流石はカヨコっち！"
10008060-113 = "別に難しい話じゃない。違法な物を違法な物だと分かって奪ったんだとしたら……"
10008060-114 = "それを処理するにも、違法なルートが必要。つまり、ブラックマーケットを通すしかない。"
10008060-115 = "まあこれぐらい、風紀委員会もすぐに気づくと思うけど。"
10008060-117 = "それでも風紀委員会より早かったわ！それだけでお手柄よカヨコ！"
10008060-121 = "さあ、賽銭箱を大人しく返しなさい！"
10008060-122 = "ははっ、何をくだらないことを！"
10008060-123 = "く、くだらない……！？"
10008060-124 = "一度奪った時点でこの賽銭箱は我々のもの、カイテンジャーの資金だ！返すわけが無いだろう！"
10008060-125 = "[s] \"完全に悪役の台詞だ……。\""
10008060-126 = "何をっ！我々は正義そのもの！「正義」で辞書を引けば、そこには我々の名前があるはず！"
10008060-127 = "こうなったら全員で総攻撃だ！すべては我々の、夢のために……！"
10008060-133 = "みーんな同じこと言ってるね？夢がどうとか。"
10008060-134 = "はぁ……。"
10008060-136 = "そっちがそう来るなら、私たちも実力行使で……！"
10008060-137 = "さあ、行くわよ！"
