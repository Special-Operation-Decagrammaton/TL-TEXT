[translation]
1006406-1 = "Como aliviar o estresse"

1006406-2 = "(Mesmo com a chegada do ano novo, ocorreram incidentes por toda Kivotos e não houve tempo para se acalmar.)"

1006406-4 = "Sensei, é contra as regras acertar um golpe com um golpe de pena...?"

1006406-5 = "Acidentalmente bati na peteca como se estivesse jogando tênis de mesa, mas meus amigos ficaram bravos comigo..."

1006406-6 = "[s1] \"Esse é um problema difícil...\"\n[s2] \"Vamos pensar nisso juntos...\""

1006406-10 = "(Depois de uma consulta difícil, ocorre um problema inesperado...)"

1006406-12 = "O que diabos você é? #nVocê tem coragem de se intrometer nas pessoas, né?"

1006406-13 = "Não importa para você se o emprego de meio período de um estudante é barato ou não."

1006406-14 = "o que? Um professor de placa de Petri...?"

1006406-15 = "É isso! Não sei se é uma placa de Petri ou o Conselho Estudantil da Federação, mas se você vai interferir..."

1006406-16 = "Não é grátis!"

1006406-17 = "[s] \"Ah, acalme-se, vamos conversar primeiro...\""

1006406-19 = "(Quando terminei o trabalho, estava completamente exausto...)"

1006406-22 = "...Huh, professor?"

1006406-23 = "Não acredito que podemos nos encontrar em um lugar como este."

1006406-27 = "Estou bem... não parece. #nHouve algo doloroso?"

1006406-28 = "[s3] \"Olá, Kayoko...\"\n[s4] \"Estive ocupado com muitas coisas hoje...\""

1006406-29 = "Hmm... o que posso dizer, obrigado pelo seu trabalho duro."

1006406-30 = "Hmm... o que posso dizer, obrigado pelo seu trabalho duro."

1006406-31 = "Sinto muito, é tudo o que posso dizer."

1006406-32 = "[s] \"Já chega, obrigado.\""

1006406-34 = "[ns] \"A propósito, para onde Kayoko está indo?\""

1006406-35 = "Ah, minha banda favorita estava fazendo um show aqui perto."

1006406-36 = "Você já ouviu falar do “Wagakki Club”?"

1006406-37 = "Somos um grupo que toca música pop moderna usando instrumentos japoneses como taiko, shamisen e koto."

1006406-38 = "As expressões que acompanham os instrumentos japoneses são interessantes, então vou lá com frequência."

1006406-39 = "[s5] \"Música pop moderna com instrumentos japoneses...\"\n[s6] \"Parece ser calmante.\""

1006406-40 = "Isso mesmo. Os tons únicos dos instrumentos musicais japoneses irão acabar com o seu estresse."

1006406-41 = "Isso mesmo. Os tons únicos dos instrumentos musicais japoneses irão acabar com o seu estresse."

1006406-42 = "Se você não se importa, gostaria de ir ver comigo?"

1006406-43 = "Aparentemente todos os faz-tudo tinham algo para fazer, então eu tinha ingressos extras."

1006406-44 = "[s7] \"Sim, eu quero ir!\"\n[s8] \"Estou cansado hoje, então está perfeito!\""

1006406-45 = "Hehe, bom."

1006406-46 = "Hehe, bom."

1006406-47 = "Pois bem, venha comigo. O local fica próximo."

1006406-50 = "(Depois cheguei ao local com a orientação de Kayoko...)"

1006406-51 = "(Foi completamente diferente da “cura” que eu imaginava...)"

1006406-53 = "Kivotos onde a escuridão paira! Sinta a morte da morte! !"

1006406-54 = "Isto é Destruir! O fim deste mundo! !"

1006406-60 = "(Depois da apresentação ao vivo――)"

1006406-62 = "Ah... essa foi a melhor fase."

1006406-63 = "Na música final, o tocador de shamisen arrancou as cordas e bateu na bateria com a cabeça, o que foi uma performance hipnotizante."

1006406-64 = "[s] \"U-Sim...\""

1006406-65 = "Talvez..."

1006406-66 = "Foi um pouco estimulante demais para o professor?"

1006406-67 = "Você parece mais cansado do que antes do show... me desculpe."

1006406-68 = "[s9] \"Não, melhor...\"\n[s10] \"Foi tão divertido que fiquei animado...\""

1006406-71 = "[ns] \"Assim como Kayoko disse, meu estresse foi embora!\""

1006406-73 = "...Fico feliz em ouvir isso."

1006406-74 = "Mas não consigo esconder o fato de que estou cansado, então volto rapidamente para a placa de Petri e descanso."

1006406-75 = "...Obrigado por se juntar a nós hoje, Sensei."

1006406-76 = "Voltarei quando me sentir melhor. #nTenho certeza que será mais divertido."

