[translation]
1901-1 = "Comitê Disciplinar - Reunião Semanal"
1901-5 = "Bem, vamos começar a reunião semanal."
1901-6 = "……Haa."
1901-7 = "……Ako, hoje temos uma reunião com o pessoal do Pandemônio, então tente ser breve."
1901-8 = "Sim, compreendido. Deve começar em 15 minutos, então vamos terminar antes disso."
1901-9 = "Primeiro, o relatório sobre a explosão de origem desconhecida que ocorreu na área 97-44."
1901-10 = "Após a verificação, foi confirmado que a causa da explosão foi um granadeiro multiuso."
1901-11 = "O grupo responsável foi identificado como o Departamento de Desenvolvimento de Fontes Termais, mas eles estão foragidos e três pelotões do Comitê Disciplinar foram enviados para capturá-los."
1901-12 = "O motivo?"
1901-13 = "……Como sempre, desenvolvimento de fontes termais."
1901-14 = "……Espere, a área 97-44 não é bem no meio da rodovia? Eles tentaram desenvolver uma fonte termal lá?"
1901-15 = "Sim, exatamente. Aquele departamento não leva esse tipo de circunstância em consideração, então……."
1901-17 = "Vou perguntar por precaução, qual foi o motivo para fazerem algo assim……."
1901-18 = "Porque tem uma fonte termal lá! Não existe outro motivo além desse!"
1901-19 = "Isso mesmo, temos que cavar de qualquer jeito! Enquanto houver a possibilidade de uma fonte termal lá!"
1901-20 = "Vamos remover tudo com tratores! Tudo começa com o desenvolvimento!"
1901-21 = "(……Não entendo absolutamente nada do que eles estão dizendo. O que se espera que eu faça……)"
1901-26 = "……Esse é o resumo do relatório da Chinatsu. Não entendo o sentido disso."
1901-27 = "Imagino que eles queriam criar algo como uma área de serviço na rodovia…… com uma fonte termal incluída."
1901-28 = "……Haa, esquece."
1901-29 = "Sobre essa rodovia, espera-se um congestionamento pelos próximos 3 meses, então quase 54% da logística……."
1901-30 = "Deixe que o pessoal do Pandemônio resolva essa parte, próximo."
1901-31 = "Sim, então o próximo item: o caso da explosão do 3º refeitório estudantil……."
1901-32 = "O refeitório explodiu…… Clube de Pesquisa Gourmet?"
1901-33 = "Exatamente."
1901-34 = "O motivo?"
1901-35 = "O motivo desta vez foi…… 'porque não colocaram limão no frango frito'."
1901-36 = "Limão……."
1901-37 = "O Clube de Pesquisa Gourmet fez a Fuuka, chefe do Departamento de Alimentação, de refém, e houve um confronto com o Comitê Disciplinar que foi tentar contê-los."
1901-39 = "Pergunto a todos os membros do Comitê Disciplinar, este é um problema muito importante."
1901-40 = "Limão no frango frito é aceitável ou não!!!!"
1901-41 = "Bem, qual é a opinião de vocês?"
1901-42 = "E-eu, por mim, prefiro que tenha……."
1901-43 = "Se fizer isso, o frango frito vai ficar todo encharcado! Por que você faria algo tão terrível!?"
1901-44 = "O que você disse!? É justamente o limão que dá o toque refrescante e corta a gordura do frito, não é!?"
1901-45 = "Fufufu, muito bom, um debate sério sobre gastronomia! É exatamente isso que nós, do Clube de Pesquisa Gourmet, buscávamos!"
1901-46 = "O que é o correto, o que é a verdade! Vamos, vamos discutir isso!"
1901-47 = "Por isso, se você colocar limão……"
1901-48 = "Não, a casca fica mole no meio do caminho……"
1901-49 = "E se for sal?"
1901-50 = "Não mude de assunto de repente! Mas eu prefiro molho do que sal!"
1901-51 = "Fufufu, isso é maravilhoso……!"
1901-55 = "(Qualquer coisa serve, por favor, me salvem logo……)"
1901-60 = "Depois disso, a discussão acalorada se transformou em briga, e vários membros do Comitê Disciplinar, incluindo Iori, foram hospitalizados. Enquanto isso, o Clube de Pesquisa Gourmet fugiu……."
1901-61 = "……Haa."
1901-62 = "Entendido. Diga à chefe do Departamento de Alimentação para me reportar o valor do prejuízo assim que souber."
1901-63 = "Se deixarmos como está, logo a comida vai ser apenas bolinho de arroz."
1901-64 = "Compreendido."
1901-65 = "O próximo. Um ato ilegal de falsificar atestados de ausência e vendê-los por 2 mil ienes cada……"
1901-66 = "Agência de Soluções?"
1901-67 = "Sim, aqui é a Problem Solver 68. Parece que elas invadiram a sala dos Senseies para copiar o carimbo usado em atestados de ausência e..."
1901-68 = "Colocaram um anúncio bem chamativo no mural da escola dizendo: 'Vendemos atestados de ausência, agora você pode faltar o quanto quiser'."
1901-69 = "Atestados de ausência... Existe alguém nesta escola que se daria ao trabalho de pedir permissão para faltar?"
1901-71 = "Po-por que não conseguimos vender nem uma unidade?!"
1901-72 = "Ahahahaha! Você continua a mesma de sempre, Aru-chan!"
1901-73 = "(Inquieta...)"
1901-77 = "Haa..."
1901-82 = "Não existe, pelo visto não venderam absolutamente nada. As acusações são invasão de propriedade e falsificação de documentos oficiais."
1901-83 = "Haa..."
1901-84 = "Sobre o próximo item..."
1901-85 = "Espera, quantos ainda faltam?"
1901-86 = "Ainda restam 18 casos."
1901-87 = "...18 casos só nesta semana?"
1901-88 = "Não, na verdade isso é referente a apenas 2 dias. Devido à folga do Departamento de Inteligência, os relatórios dos outros 5 dias serão trazidos na reunião regular da semana que vem."
1901-89 = "..."
1901-90 = "..."
1901-91 = "Boa sorte, Presidente."
1901-92 = "Haa..."
1901-93 = "Comitê de Disciplina - Reunião Semanal"
