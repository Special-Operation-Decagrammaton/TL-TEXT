[translation]
1901-1 = "風紀委員会・週次定例"
1901-5 = "では、今週の定例会を始めます。"
1901-6 = "……はあ。"
1901-7 = "……アコ、今[ruby=パンデモニウムソサエティー]日は「万魔殿」のや[/ruby]つらとミーティングがあるから、早めにお願い。"
1901-8 = "はい、承知しました。15分後だったはずですので、その前には終わらせましょう。"
1901-9 = "まず、97-44区域で起きた正体不明の爆発について報告です。"
1901-10 = "検証の結果、この爆発は多目的榴弾が原因だったことが確認されました。"
1901-11 = "犯行グループは温泉開発部と判明していますが現在は逃走中、風紀委員会の3個小隊が確保に向かっています。"
1901-12 = "理由は？"
1901-13 = "……いつも通り、温泉開発です。"
1901-14 = "……待って、97-44区域って高速道路のど真ん中でしょう？そこに温泉を開発しようとして？"
1901-15 = "はい、そうです。あそこの部はそういった事情を鑑みたりはしないので……。"
1901-17 = "念のためお聞きしますが、どういった理由でこのようなことを……。"
1901-18 = "そこに温泉があるからだよ！それ以外に理由なんてない！"
1901-19 = "そうだ、とにかく掘るんだ！そこに温泉の可能性がある限り！"
1901-20 = "ブルドーザーで撤去だ！すべては開発から始まる！"
1901-21 = "（……何を言ってるのか全く分かりませんね。どうしろと……）"
1901-26 = "……というのが、チナツさんからの報告書の要旨です。意味は分かりませんが。"
1901-27 = "思うに高速道路のサービスエリア……のようなものを作りたかったのではないでしょうか、温泉付きで。"
1901-28 = "……はあ、もういい。"
1901-29 = "その高速道路ですが、以後約3か月間の渋滞が予想されるため、物流の54%近くが……。"
1901-30 = "その辺りの処理は万魔殿のやつらに任せればいいわ、次。"
1901-31 = "はい、では次、第3学生食堂が爆破された件ですが……。"
1901-32 = "学食が爆破……美食研究会？"
1901-33 = "そうです。"
1901-34 = "理由は？"
1901-35 = "今回の理由は……「唐揚げにレモンを添えてくれなかったから」、だそうです。"
1901-36 = "レモン……。"
1901-37 = "美食研究会は給食部部長のフウカさんを人質にし、それを制圧しに向かった風紀委員会と戦闘になりました。"
1901-39 = "風紀委員のみなさんにお聞きしますわ、これはとても大事な問題です。"
1901-40 = "唐揚げにレモンは有りか、無しか！！！！"
1901-41 = "さあ、みなさんのご意見はいかがでしょう？"
1901-42 = "わ、私はどちらかというと、あった方が……。"
1901-43 = "そんなことしたらせっかくの揚げ物がべちゃべちゃになるでしょ！なんでそんなひどいことができるの！？"
1901-44 = "何だと！？さっぱりするレモンがあってこそ、揚げ物の脂っこさが引き締まるんだろ！？"
1901-45 = "ふふふ、良いですね、美食についての真剣な討議！これぞ私たち美食研究会が求めていたもの！"
1901-46 = "何が正しいのでしょう、何が真理なのでしょう！さあ、話し合おうではありませんか！"
1901-47 = "だから、レモンなんてかけると……"
1901-48 = "いや、衣はどんどん途中から……"
1901-49 = "だったら塩は？"
1901-50 = "急に話題を変えないで！でも私は塩よりソース派！"
1901-51 = "ふふふっ、素晴らしいですわね……！"
1901-55 = "（何でもいいから早く助けて……）"
1901-60 = "その後、激論は争いへと発展し、イオリを含む多数の風紀委員が入院。一方で美食研究会は逃走し……。"
1901-61 = "……はあ。"
1901-62 = "分かった。給食部の部長に、被害額を把握したらこっちに報告するように伝えて。"
1901-63 = "このまま放置すると、そのうち給食がおにぎりだけになるかもしれない。"
1901-64 = "承知しました。"
1901-65 = "次です。欠席届を偽造し、1枚2千円で販売するという不法行為を……"
1901-66 = "便利屋？"
1901-67 = "はい、便利屋68です。どうやら職員室に侵入して欠席届用の印鑑をコピーし……"
1901-68 = "学園の掲示板に堂々と、「欠席届売ります、これで好きなだけ欠席が可能」という広告文を貼ったようです。"
1901-69 = "欠席届……この学園で、わざわざ許可を得て欠席するような人、いる？"
1901-71 = "ど、どうして一枚も売れないのよ！"
1901-72 = "あははははは！相変わらずだねー、アルちゃん！"
1901-73 = "（ソワソワ……）"
1901-77 = "はあ……。"
1901-82 = "いませんね、実際に全く売れなかったそうで。罪状は不法侵入と公文書偽装です。"
1901-83 = "はあ……。"
1901-84 = "次ですが――"
1901-85 = "待って、あといくつあるの？"
1901-86 = "あと18件ですね。"
1901-87 = "……この一週間で、18件？"
1901-88 = "いえ、実際には2日分です。情報部のお休みの関係で、残り5日分の報告書は来週の定例会議に持ってくるそうで。"
1901-89 = "……。"
1901-90 = "……。"
1901-91 = "頑張ってください、委員長。"
1901-92 = "はあ……。"
1901-93 = "風紀委員会・週次定例"
