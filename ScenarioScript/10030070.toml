[translation]
10030070-1 = "Episódio 7; Uma vista inédita"
10030070-5 = "Hmm... ugh..."
10030070-9 = "Maki, está na hora de acordar."
10030070-10 = "Nós combinamos de acordar cedo hoje para ver o primeiro nascer do sol do ano, lembra?"
10030070-16 = "...Só mais 10 minutos... não pode...?"
10030070-17 = "Não pode, se sairmos agora já vamos ficar no limite."
10030070-18 = "Levante logo e se arrume. Vista-se bem para não passar frio."
10030070-19 = "Tá bom..."
10030070-25 = "[ns1] \"Bom dia, Maki.\"\n[ns2] \"Feliz Ano Novo, Maki.\""
10030070-26 = "Bom dia, sensei..."
10030070-27 = "Sensei, feliz Ano Novo também..."
10030070-28 = "...Pensando bem, hoje é o dia de Ano Novo, né."
10030070-29 = "Como eu sempre dormia de manhã no Ano Novo, acordar a essa hora parece tão estranho..."
10030070-30 = "Espera, acho que eu nunca tive o hábito de acordar cedo..."
10030070-36 = "A Maki também acordou."
10030070-37 = "Bom dia, Sensei."
10030070-38 = "[s] \"Bom dia. Hare, Kotama.\""
10030070-39 = "Ahhh... que sono..."
10030070-40 = "É nessas horas que dá vontade de virar um energético com muita cafeína de uma vez só..."
10030070-41 = "Eu também estou precisando de um energético agora..."
10030070-46 = "Não temos energéticos, mas fiz um café lá embaixo."
10030070-50 = "Aqui, pegue. Talvez você não esteja com fome, mas coma pelo menos uma barra de chocolate. #nSubir a montanha gasta muita energia."
10030070-51 = "E se sentir qualquer coisa estranha, me avise imediatamente. Entendido?"
10030070-56 = "Tá bom."
10030070-58 = "(Depois de se arrumarem, começou a longa jornada até o local para ver o primeiro nascer do sol)"
10030070-63 = "Ofegante... ofegante..."
10030070-64 = "Já... cheguei no meu limite físico..."
10030070-65 = "Estou tão cansada..."
10030070-66 = "Senpai~, falta quanto para o topo...?"
10030070-71 = "Já passamos da metade, vamos nos esforçar só mais um pouco."
10030070-75 = "...Mas, o tempo está estranho."
10030070-76 = "Desse jeito, não sei se vamos conseguir ver o nascer do sol mesmo chegando no topo..."
10030070-83 = "Ué? Aquele arbusto ali não se mexeu?"
10030070-84 = "N-não me diga que, como ontem, um urso vai aparecer..."
10030070-85 = "Hii..."
10030070-101 = "Ué, o pessoal da Veritas de novo, e o treinador também..."
10030070-108 = "Ah, Sumire-senpai! Oi!"
10030070-110 = "Bom dia, não esperava encontrar vocês de novo."
10030070-111 = "Pessoal, feliz Ano Novo."
10030070-112 = "[s] \"Sumire, feliz Ano Novo.\""
10030070-114 = "[ns] \"Conseguiu dormir bem ontem?\""
10030070-118 = "Não... talvez por estar empolgada com o acampamento ao ar livre, não consegui dormir muito."
10030070-119 = "Então, para relaxar a tensão do corpo, decidi fazer uma corrida em trilha como exercício matinal."
10030070-120 = "Graças a um pouco de movimento, sinto que meu corpo voltou ao normal."
10030070-121 = "Isso não foi \"um pouco\", né!?"
10030070-122 = "A gente nem tinha se recuperado do cansaço de ontem e você saiu correndo em velocidade máxima por uma estrada de terra...!"
10030070-123 = "Como é que funciona a resistência física da Sumire-senpai!?"
10030070-124 = "Fufu, dizem que quanto mais você usa o corpo, mais forte ele fica."
10030070-125 = "Se a Rei continuar treinando comigo, um home run em duas entradas seguidas na próxima temporada não será um sonho."
10030070-129 = "...Se for para conseguir um home run em duas entradas seguidas, acho que não tem jeito... né?"
10030070-130 = "Dito isso, todas vocês reunidas para uma escalada tão cedo pela manhã..."
10030070-131 = "……Por acaso, decidiram mudar de ares e começar a praticar exercícios este ano?"
10030070-133 = "Começar, eu diria que..."
10030070-134 = "Foi por sugestão da vice-presidente, estamos a caminho do topo para ver o primeiro nascer do sol do ano."
10030070-136 = "Entendo, o primeiro nascer do sol, é..."
10030070-140 = "Sinto muito, mas talvez seja melhor desistirem de ver o nascer do sol desta vez."
10030070-144 = "Por quê!?"
10030070-145 = "O sol ainda não nasceu, mas ainda há muitas nuvens por aqui."
10030070-146 = "Com esse tempo, mesmo que o sol suba, é muito provável que não consigam apreciar o nascer do sol completo……"
10030070-147 = "Vocês vieram até aqui com tanta expectativa, pode acabar sendo uma decepção."
10030070-149 = "Mas a previsão do tempo dizia que estaria limpo……"
10030070-150 = "[s] \"O que a gente faz…….\""
10030070-155 = "……Pessoal, o que vamos fazer?"
10030070-156 = "Fui eu quem propôs, mas como o tempo não está colaborando, não precisamos nos forçar a chegar ao topo."
10030070-165 = "……Vamos continuar a escalada."
10030070-166 = "Entendi. Eu imaginei que diria isso……"
10030070-170 = "……Hein? Continuar?"
10030070-171 = "Hum, já que saímos de casa, né."
10030070-173 = "Já que chegamos até aqui, acho que ficaria mais incomodada se voltasse sem chegar ao topo."
10030070-174 = "Não gosto de repetir fases, mas……"
10030070-175 = "Não posso largar o controle antes da luta contra o chefe!"
10030070-177 = "Mas ainda falta metade do caminho até o topo……"
10030070-178 = "Vocês…… não odiavam tarefas que não trazem resultados?"
10030070-180 = "Bem, é verdade que seria uma pena subir até o topo e não ver o nascer do sol, mas……"
10030070-181 = "Se for pelo nascer do sol, podemos assistir pelo monitor quando voltarmos para a sala do clube."
10030070-182 = "Mas a jornada até o topo é algo que só nós mesmas podemos vivenciar."
10030070-188 = "……O primeiro nascer do sol deste ano pode acabar surgindo do oeste, quem sabe."
10030070-189 = "Que espírito maravilhoso!"
10030070-190 = "Muitas pessoas esquecem, mas o verdadeiro valor do treinamento não está em construir um corpo bonito, mas sim no processo até chegar lá!"
10030070-191 = "O mesmo vale para a escalada. O verdadeiro valor deve estar no caminho até o topo!"
10030070-193 = "Eu também concordo plenamente! O Clube de Treinamento também quer acompanhar vocês até o topo!"
10030070-194 = "Rei-san! Então, a partir de agora, vamos correr em velocidade máxima até o topo!"
10030070-198 = "Hein!? Senpai, você não disse que o treino de hoje seria no meio da montanha!?"
10030070-206 = "Não pode ser――!"
10030070-211 = "Então, vamos todas nos esforçar até o topo?"
10030070-212 = "Não temos muito tempo, vamos nos apressar."
10030070-228 = "……Chegamos."
10030070-229 = "Este é o topo do Monte Higashitake."
10030070-233 = "Uau! Que vento forte!"
10030070-234 = "Por ser um lugar aberto, está mais frio do que antes……"
10030070-235 = "Será por causa das nuvens? Não consigo ver direito……"
10030070-238 = "É verdade, não dá para ver muita coisa……"
10030070-242 = "Ah…… está ficando mais claro."
10030070-243 = "Está na hora?"
10030070-253 = "Ah……!"
10030070-254 = "……Lindo."
10030070-255 = "Em um instante, o céu se encheu com a luz do sol……"
10030070-256 = "Já vi isso várias vezes em vídeos, mas ver com os próprios olhos é diferente……"
10030070-257 = "É lindo…… e tão brilhante."
10030070-258 = "……É muito quente."
10030070-262 = "A vista que vemos após tanto esforço é um estímulo que não tem preço."
10030070-263 = "……No fim das contas, não foi bom ter vindo ver?"
10030070-268 = "……Sim."
10030070-269 = "……Obrigada, Senpai."
10030070-270 = "Para ser sincera, no começo achei um incômodo acampar só por causa do primeiro nascer do sol do ano..."
10030070-271 = "Mas agora, sinto que entendo um pouco o motivo da vice-presidente ter nos trazido aqui."
10030070-273 = "Se você pensa assim, eu também fico feliz."
10030070-277 = "……É que existem muitas coisas no mundo que a gente só entende de verdade quando experimenta."
10030070-283 = "Que barulho foi esse..."
10030070-288 = "Rei-san, por acaso você está com fome?"
10030070-289 = "E-eh, bem... é que..."
10030070-290 = "Não tem como evitar!#nA gente está correndo desde cedo!"
10030070-292 = "Então, que tal voltarmos para o acampamento e comermos todos juntos?"
10030070-293 = "Eu trouxe pães para o café da manhã."
10030070-298 = "[ns] \"Também tem geleia e manteiga.\""
10030070-300 = "Ah, eu vou desenhar algo no pão antes de comer!"
10030070-301 = "Para mim, uma fatia é o suficiente."
10030070-302 = "Pão é bom, mas eu queria um café..."
10030070-305 = "Parece que vai combinar bem com a minha proteína."
10030070-306 = "Fufu, é verdade. Vamos comer como cada um preferir."
