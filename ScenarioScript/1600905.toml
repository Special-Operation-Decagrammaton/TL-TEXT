[translation]
1600905-1 = "A garota ninja não esconde"
1600905-2 = "（E assim, decidi acompanhar Michiru até uma loja que vende artigos de ninja... ou melhor, ferramentas ninja）"
1600905-6 = "Sensei! Por aqui, por aqui!"
1600905-13 = "Chegamos! Este é o meu lugar favorito."
1600905-14 = "[s] \"Uma barraca...? É um pouco incomum para uma loja de artigos, não acha?\""
1600905-15 = "Não é? Mas é justamente isso que dá um ar mais autêntico e voltado para colecionadores, sabe..."
1600905-16 = "…Quer dizer, não é isso, Sensei! Não são apenas artigos, são ferramentas de ninjutsu de verdade!"
1600905-17 = "Ora, ora, se não é a moça que sempre vem aqui vestida de ninja. Estão em um encontro hoje?"
1600905-18 = "[s] \"Você vem aqui tanto a ponto de te conhecerem, hein? Olá.\""
1600905-19 = "En-en-en-encontro!?"
1600905-20 = "O que traz vocês aqui hoje? Vieram ver se tem algo novo?"
1600905-21 = "Chegou uma coisa legal ontem, um suporte que permite carregar vários fogos de artifício de uma vez. É perfeito para o seu cosplay!"
1600905-22 = "Já disse que não é cosplay!"
1600905-23 = "Ah, entendi. É esse o seu papel, né?"
1600905-24 = "Bom, não tem problema. Bom trabalho para você também."
1600905-25 = "[s] \"Ahaha... bem, não é exatamente um trabalho...\""
1600905-26 = "Já diiiiiiisse!"
1600905-27 = "Hmm, mas como vendedor, talvez eu devesse atender às necessidades do cliente... Certo."
1600905-28 = "…Aqui é o codinome: Zero Trinta. Mademoiselle, qual é o seu objetivo hoje?"
1600905-29 = "Errado! Totalmente errado! E isso nem é coisa de ninja!"
1600905-30 = "Bem, num sentido amplo, espiões também podem ser ninjas, mas...!"
1600905-31 = "[s] \"O critério de ninja da Michiru não é amplo demais?\""
1600905-32 = "Bom, de qualquer forma, aproveitem o encontro, vocês dois!"
1600905-36 = "[ns] \"Ah, ele foi embora.\""
1600905-37 = "Ai, meu Deus, eu já disse que não é um encontro...! Isso é puramente para fins de estudo, ah, meu Deus...!"
1600905-38 = "Ufa, respira fundo... inspira, expira..."
1600905-39 = "Certo, eu sou a presidente do Clube de Pesquisa de Ninjutsu, não posso entrar em pânico por causa de uma coisinha dessas!"
1600905-40 = "Vou manter a mente serena e tranquila..."
1600905-41 = "Mas o que é isso!?"
1600905-45 = "Uau, olha só, Sensei! Isso não é incrível!?"
1600905-46 = "[s1] \"A serenidade foi embora...\"\n[s2] \"Uma metralhadora?\""
1600905-47 = "Que reação sem graça é essa! Sensei, você não entende o quão incrível isso é!?"
1600905-48 = "Que reação sem graça é essa! Sensei, você não entende o quão incrível isso é!?"
1600905-49 = "Isso não é uma metralhadora comum! É a \"Arma Amaldiçoada Muramato\", a metralhadora demoníaca que aparece nas obras do diretor \"Mike Neko Nyan-goro\"!"
1600905-50 = "Dizem que quem a empunha se torna um ninja ancestral com uma alma demoníaca!"
1600905-51 = "Ah, claro, dependendo da obra do mesmo diretor, a descrição pode variar, e é um item que divide bastante a opinião dos fãs, mas..."
1600905-52 = "Mas esse nível de detalhe! Incrível, eu quero..."
1600905-53 = "Espera, 2 milhões de ienes!?"
1600905-54 = "Ugh, isso é demais, até para... hã?"
1600905-58 = "Ah, esse é o pôster do primeiro filme do diretor \"Kai-ken Gururu\"!? É original!? Incrível, pensar que eles têm algo assim..."
1600905-59 = "Ah, será que aquilo é...!"
1600905-60 = "（E assim, Michiru começou a procurar por várias coisas com entusiasmo）"
1600905-62 = "Uau... incrível, eu poderia ficar aqui o dia todo!"
1600905-63 = "[s] \"Parece que você está se divertindo.\""
1600905-64 = "Com certeza! É como uma ilha do tesouro, não consigo parar de me empolgar!"
1600905-65 = "…Ah!? Desculpe, Sensei, acabei me empolgando sozinha..."
1600905-66 = "Acabei deixando você de lado..."
1600905-67 = "[s3] \"Não, não. Fico feliz em ver você se divertindo, Michiru.\"\n[s4] \"Sinto que estou recebendo uma energia muito positiva.\""
1600905-68 = "S-sério...? Ehe, ehehe... b-bem, eu sou a presidente, né? Então é normal ser enérgica!"
1600905-69 = "S-sério...? Ehe, ehehe... b-bem, eu sou a presidente, né? Então é normal ser enérgica!"
1600905-70 = "[s] \"Sim, não me canso de olhar.\""
1600905-71 = "E-esse jeito de falar é meio constrangedor, sabia!?"
1600905-72 = "Bem, mas... esse... o fato de você estar aqui do meu lado, me fazendo companhia, é... como posso dizer... fico feliz..."
1600905-73 = "O que é isso? Artigos ninja? Isso é brinquedo de criança!"
1600905-74 = "……Hm?"
1600905-79 = "\"Kit de shuriken para iniciantes\" e \"bomba de fumaça fácil de usar\"...?"
1600905-80 = "Que porcaria é essa, eles são idiotas? Quem compraria isso!"
1600905-81 = "Nossa, isso não tem nada a ver com os dias de hoje."
1600905-83 = "[ns] \"...Ué, Michiru?\""
1600905-84 = "B-baderneiros...!!!"
1600905-89 = "[ns] \"Ei, Michiru? Você está bem?\""
1600905-90 = "Ugh..."
1600905-91 = "...Ah! E-eu perdi um pouco a compostura, mas estou bem, Sensei. Não precisa se preocupar. Desta vez, com um espírito de clareza mental, vou recuperar a calma, e..."
1600905-92 = "e-e-e-e..."
1600905-93 = "[s] \"Seu corpo e sua voz estão tremendo muito...\""
1600905-94 = "Ah, chega! Não tem como evitar! Por que esses baderneiros estão no meu santuário!?"
1600905-99 = "Ahhh! Ficar balançando os artigos desse jeito...! Que falta de cuidado...!"
1600905-100 = "Sem saber nada sobre ninjas, falando que é cafona ou anacrônico... eles falam o que querem!"
1600905-101 = "Xô, xô! Vão embora, sumam daqui logo!"
1600905-102 = "[s] \"Michiru, isso aí é uma parede.\""
1600905-103 = "Ugh... dizer isso cara a cara é um pouco..."
1600905-104 = "I-isso mesmo! O risco é muito alto!"
1600905-105 = "Não sei o que pode acontecer se eu fizer isso. Esse tipo de coisa é meio...!"
1600905-106 = "Não, é só uma desculpa, é..."
1600905-107 = "É que, mesmo aos olhos do Sensei, eu pareço patética... né?"
1600905-108 = "Só na conversa, desse jeito..."
1600905-109 = "[s5] \"Não é nada disso.\"\n[s6] \"Acho que quem está sendo patético são eles.\""
1600905-110 = "Sensei..."
1600905-111 = "Sensei..."
1600905-112 = "Que porcaria é essa, a metralhadora demoníaca \"Arma Amaldiçoada Muramato\"? Que brega!!"
1600905-113 = "！？"
1600905-115 = "Hm? Se segurar isso, você é dominado pela arma demoníaca...? Ancestral... do que esse texto explicativo está falando?"
1600905-116 = "Hahaha, vai, segura pra ver! Pode ser que você seja dominado!"
1600905-117 = "Não tem como, tá de brincadeira, né? Hahahaha!"
1600905-118 = "Bom, só pra testar, talvez eu dispare um tiro..."
1600905-120 = "Quem está de brincadeira são vocês!!"
1600905-125 = "Guaaaah!? Q-quem é você!?"
1600905-126 = "Escutem bem, seus baderneiros! Eu sou a presidente do Clube de Pesquisa de Ninjutsu, e aquela que possui a alma ninja mais forte, Michiru Chidori!"
1600905-127 = "É uma maluca!?"
1600905-128 = "Vocês nem sabem o valor dessa metralhadora... e se tocarem nela sem cuidado e quebrarem, como é que fica!?"
1600905-129 = "Não, foi você quem atirou... se quebrar, a culpa é sua..."
1600905-131 = "Sem mais perguntas! Ninjutsu estilo Michiru, Destruição Ninja!!!"
1600905-141 = "Droga, guarda as minhas palavras, presidente do Clube de Pesquisa de Ninjutsu!"
1600905-142 = "Eu gravei bem a sua cara!"
1600905-143 = "Ehh!? I-isso é um problema!?"
1600905-147 = "Ferrou, eles gravaram meu rosto..."
1600905-148 = "Como vou andar na rua à noite agora!?"
1600905-149 = "[s] \"Acho que não tem problema. De qualquer forma, bom trabalho, Michiru.\""
1600905-150 = "Não, hehehe... é que, sabe, aqueles baderneiros tratam os artigos ninja com tanto descaso que eu acabei..."
1600905-151 = "[s] \"Você acabou de chamar de artigos ninja.\""
1600905-152 = "Ahhh!?"
1600905-153 = "Ahahaha. Eu ia dar uma mãozinha, mas obrigado por resolver tudo. Nossa cliente habitual."
1600905-154 = "Ah, não, imagina... não foi nada."
1600905-155 = "Agora entendo melhor o quão profundo é o seu amor pelos ninjas. Não que seja uma comemoração, mas tome este item como presente."
1600905-156 = "Sério, posso pegar!? Eu não fiz nada demais... bem, talvez tenha sido uma atuação digna de um vídeo para o canal!"
1600905-158 = "Posso mesmo aceitar!? Essa é a 'Pistola Demoníaca Muramato' de 2 milhões!?"
1600905-160 = "Não, isso é impossível."
1600905-161 = "[s] \"Que pena.\""
1600905-162 = "Ehh!? Mas eu criei expectativas..."
1600905-163 = "É um item diferente, mas aqui está, um item novo. Obrigado por ajudar. É por ter fãs como você que podemos continuar com a loja."
1600905-164 = "Ah..."
1600905-165 = "[s7] \"Que bom, né? Derrotou os valentões e ainda ganhou um presente.\"\n[s8] \"Como esperado da Chidori Michiru, a presidente do Clube de Pesquisa de Ninjutsu!!\""
1600905-166 = "Esse jeito de me elogiar é meio vergonhoso, Sensei!!"
1600905-167 = "Esse jeito de me elogiar é meio vergonhoso, Sensei!!"
1600905-168 = "Ma-mas..."
1600905-169 = "...Sim! De qualquer forma, o importante é que teve um final feliz!!"
1600905-171 = "(Depois disso, passei mais um tempo aproveitando as compras junto com a Michiru)"
