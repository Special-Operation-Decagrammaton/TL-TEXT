[translation]
1600905-1 = "忍者少女は隠さない"
1600905-2 = "（そうして、ミチルと一緒に忍者グッズ……ではなく、忍具を売ってるお店に向かうことに）"
1600905-6 = "先生殿ー！こっちこっちー！"
1600905-13 = "とうちゃーく！ここが、私の行きつけのお店。"
1600905-14 = "[s] \"屋台のお店……？グッズ系にしては珍しいね。\""
1600905-15 = "でしょでしょ！でもそこがマニア向けっぽくて渋いって言うか～……。"
1600905-16 = "……って違うよ先生殿！グッズ系とかじゃなくて、れっきとした「忍術の道具」！"
1600905-17 = "おや、誰かと思ったら……いつも来てくれる忍者コスのお嬢さんじゃないか、今日はデートかい？"
1600905-18 = "[s] \"顔見知りになるくらい通ってるんだね、こんにちは。\""
1600905-19 = "で、ででででデートぉ！？"
1600905-20 = "今日はどうしたんだい、新しいグッズでも見に来たのかな？"
1600905-21 = "昨日入ってきたのが良い感じでねぇ、花火を一気にたくさん持てるやつなんだ。コスプレにはバッチリだよ！"
1600905-22 = "だ、だからコスプレじゃないんだってば！"
1600905-23 = "ああ、そういう設定なんだっけ。"
1600905-24 = "まあ良いんじゃないかな。あんたもご苦労様。"
1600905-25 = "[s] \"あはは……まあ、苦労というわけでは……。\""
1600905-26 = "だーかーらーーっ！"
1600905-27 = "ふむ、しかし売り手としては顧客のニーズに合わせるべきかもしれんなぁ……よし。"
1600905-28 = "……こちらコードネーム：ゼロサーティ。マドモアゼル、今日の用件は？"
1600905-29 = "アウト！ほぼアウト！あとそれ忍者じゃないよ！"
1600905-30 = "いやまあ、広い意味ではスパイも忍者かもしれないけど……！"
1600905-31 = "[s] \"ミチルの忍者判定、広すぎない？\""
1600905-32 = "ま、とにかくお二人さんとも、デートを楽しんでいきな！"
1600905-36 = "[ns] \"あ、どっか行っちゃった。\""
1600905-37 = "ああもう、だからデートじゃないって言ってるじゃん……！これはあくまで勉強のためで、もう……っ！"
1600905-38 = "はぁ、深呼吸深呼吸……すーっ、はーっ……。"
1600905-39 = "よし、私は忍術研究部の部長これしきのことで慌てるわけにはいかない！"
1600905-40 = "ここは明鏡止水の気持ちで……"
1600905-41 = "ってあぁっ！？"
1600905-45 = "うわぁ、見て見て先生殿！これすごくない！？"
1600905-46 = "[s1] \"明鏡止水が四散した……。\"\n[s2] \"機関銃？\""
1600905-47 = "何その薄い反応！先生殿、これのすごさ分かってる！？"
1600905-48 = "何その薄い反応！先生殿、これのすごさ分かってる！？"
1600905-49 = "これは普通の機関銃じゃないの！「三毛猫にゃん五郎」監督の作品によく出てくる、呪われし魔の機関銃「妖銃ムラマト」なんだよ！"
1600905-50 = "これを手にしたものは、魔のソウルを持つエンシェント忍者になってしまうという伝説の代物！"
1600905-51 = "あ、もちろん同じ「三毛猫にゃん五郎」監督の作品でも、作品によっては記述が違ったりするし、色々とファンの反応が分かれるアイテムでもあるけど……。"
1600905-52 = "でもこの完成度！すごい、欲しい……"
1600905-53 = "って200万円！？"
1600905-54 = "うっ、これは流石に……ん？"
1600905-58 = "あっ、これ「甲斐犬グルル」監督初作品のポスターじゃん！？本物！？すごい、こんなものまであるなんて……。"
1600905-59 = "あっ、あれってもしかして……！"
1600905-60 = "（そうしてミチルは、楽しそうに色んなものを物色し始めた）"
1600905-62 = "うっひゃあぁ……すごいね、一日中ここにいられそう！"
1600905-63 = "[s] \"楽しそうだね。\""
1600905-64 = "そりゃあね！宝島みたいなものだもん、興奮が止まらないよ！"
1600905-65 = "……はっ！？ごめん先生殿、ひとりでテンション上がっちゃって……。"
1600905-66 = "何かこう、先生殿を置いてけぼりに……"
1600905-67 = "[s3] \"ううん。ミチルが楽しそうで嬉しいよ。\"\n[s4] \"すごくこう、プラスのエネルギーをもらってる感じ。\""
1600905-68 = "そ、そう……？えへっ、えへへっ……ま、まあ部長だし？エネルギッシュではあるけど？"
1600905-69 = "そ、そう……？えへっ、えへへっ……ま、まあ部長だし？エネルギッシュではあるけど？"
1600905-70 = "[s] \"うん、見てて飽きない。\""
1600905-71 = "そ、そういう言い方はなんか恥ずかしいんだけど！？"
1600905-72 = "まあでも、その……こうして横にいてくれて、付き合ってくれるのはその……嬉しいっていうか……"
1600905-73 = "なーんだこれ？忍者グッズ？子どものおもちゃじゃん！"
1600905-74 = "……ん？"
1600905-79 = "「初心者用手裏剣セット」に、「お手軽煙幕弾」……？"
1600905-80 = "何だこれ、バカじゃねぇの？誰がこんなん買うんだよ！"
1600905-81 = "いやー、今の時代にこれは無いわぁ。"
1600905-83 = "[ns] \"……ってあれ、ミチル？\""
1600905-84 = "ち、チンピラ……！！！"
1600905-89 = "[ns] \"えっと、ミチル？大丈夫？\""
1600905-90 = "うぅ……。"
1600905-91 = "……はっ！す、少し平常心を失っちゃいましたけど、大丈夫でござるよ先生殿。心配無用である。今度こそ明鏡止水の精神にて、冷静さを取りもど、"
1600905-92 = "もどももどどもど……"
1600905-93 = "[s] \"体と語尾がすごく揺れてるけど……。\""
1600905-94 = "ああもうっ、仕方ないじゃん！どうしてチンピラが私の聖地に！？"
1600905-99 = "ああっ！あんな風にグッズを振り回して……！なんて雑な扱い方を……！"
1600905-100 = "忍者のことを碌に知らずに、ダサいとか時代錯誤とか……言いたい放題言ってくれるじゃん！"
1600905-101 = "シッシッ！あっち行け、早く消えろ！"
1600905-102 = "[s] \"ミチル、そっちは壁だよ。\""
1600905-103 = "うぅ……直接面と向かって言うのは、ちょっと……。"
1600905-104 = "そ、そう！リスクが大きい！"
1600905-105 = "それが原因で、何が起きるか分からないし。そういうのはちょっと……！"
1600905-106 = "いや、言い訳なんだけど、うん……。"
1600905-107 = "その、やっぱり先生殿から見ても、情けない……よね？"
1600905-108 = "口先だけで、こんな……。"
1600905-109 = "[s5] \"そんなこと無いよ。\"\n[s6] \"実際に情けないことをしてるのは、あっちの方だと思うし。\""
1600905-110 = "先生殿……。"
1600905-111 = "先生殿……。"
1600905-112 = "何だこれ、魔の機関銃「妖銃ムラマト」？だっっさ！！"
1600905-113 = "！？"
1600905-115 = "んー？これを握ると、魔銃に支配されて……？エンシェント……何言ってんだこの説明文？"
1600905-116 = "ひゃはははっ、ほら握って見ろよ！支配されちゃうかもしれないぜ！"
1600905-117 = "んなわけねーだろ、ざっけんなこら！あははははっ！"
1600905-118 = "ま、試しに一発くらい撃っても……"
1600905-120 = "ふざけてるのは、お前らの方だぁー！！"
1600905-125 = "ぐああぁっ！？だ、誰だ！？"
1600905-126 = "よく聞けチンピラ共！私は忍術研究部の部長、そして最強の忍者ソウルを持つ者、千鳥ミチル！"
1600905-127 = "やべぇやつだ！？"
1600905-128 = "その機関銃の価値も知らないくせに……むやみに触って壊したりしたらどうするのさ！？"
1600905-129 = "いや、お前が銃を撃ってきたんじゃん……壊れたらお前のせいだろ……"
1600905-131 = "問答無用！ミチル流忍術、忍者デストロイッ！！！"
1600905-141 = "くそ、覚えとけよ忍術研究部の部長！"
1600905-142 = "お前の顔、こっちはしっかり覚えたからな！"
1600905-143 = "えぇ！？そ、それは困る！？"
1600905-147 = "やばい、顔覚えられた……"
1600905-148 = "これからの夜道、どうしよう！？"
1600905-149 = "[s] \"大丈夫だと思うよ。とにかくお疲れ様、ミチル。\""
1600905-150 = "いや、えへへ……何かこう、チンピラ共があんまりにも忍者グッズを雑に扱うから、つい……。"
1600905-151 = "[s] \"忍者グッズって言っちゃった。\""
1600905-152 = "ああっ！？"
1600905-153 = "あっはっは。口を出そうと思ったら、解決してくれてありがとよ。常連のお嬢さん。"
1600905-154 = "あ、いや、とんでもないです……。"
1600905-155 = "あらためて、お嬢さんの忍者への愛情の深さを理解したよ。記念というわけではないが、このグッズをあげよう。"
1600905-156 = "え、良いの！？私は全然……まあ、チャンネルに動画として上げたいくらいの活躍はしたけど！"
1600905-158 = "貰っちゃって良いの！？200万の「妖銃ムラマト」！？"
1600905-160 = "いや、これは無理。"
1600905-161 = "[s] \"残念。\""
1600905-162 = "えぇ！？期待したのにぃ……。"
1600905-163 = "それとは別のグッズだけど、はいよ、新しいグッズだ。助けてくれてありがとうな。お前さんみたいなファンがいてくれるから、うちも続けていけるよ。"
1600905-164 = "あ……。"
1600905-165 = "[s7] \"良かったね。チンピラも退治して、お礼も貰えて。\"\n[s8] \"流石は千鳥ミチル、忍術研究部の部長！！\""
1600905-166 = "何かその持ち上げ方は恥ずかしいなぁ先生殿！？"
1600905-167 = "何かその持ち上げ方は恥ずかしいなぁ先生殿！？"
1600905-168 = "で、でも……。"
1600905-169 = "……うん！とにかくハッピーエンドってことで！！"
1600905-171 = "（その後ミチルと一緒に、もう少し買い物を楽しみながら時間を過ごした）"
