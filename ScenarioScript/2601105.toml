[translation]
2601105-1 = "バッティングセンス"
2601105-2 = "（佐天に呼ばれた先は、近郊にあるバッティングセンターだった）"
2601105-10 = "ふぅ……！ここ、なかなか設備が整ってるなぁ。"
2601105-11 = "それに、あたし達の学園都市に似てる気がする。"
2601105-12 = "[s1] \"お、見つけた。\"\n[s2] 佐天に手を振る。"
2601105-15 = "……あ！せんせ～～～い！"
2601105-16 = "早かったですね。もっと時間かかるかと思って、先に打っちゃってました。"
2601105-17 = "……はい？"
2601105-18 = "ああ、これがあたしにとっての息抜きなんですよ。#n向こうでも、よく通ってましたから。"
2601105-22 = "……どうかしました？"
2601105-23 = "[s3] \"いや、佐天が楽しそうで良かったなって。\"\n[s4] \"今日も元気いっぱいだね。\""
2601105-26 = "ふふっ、ありがとうございます。#nそういえば先生……あたし、ひとつ気になってることがあって。"
2601105-27 = "ここの設備に不満は無いんですけど……"
2601105-28 = "ほら、あそこ……変わった打席がありますよね。"
2601105-29 = "……見えます？あれです、あれ。"
2601105-33 = "[ns5] \"……もしかして。\"\n[ns6] \"アレは、いったい……。\""
2601105-36 = "先生が来る前に注意書きを読んでみたんです。#nそしたら、ミレニアム製の超豪速球マシーンだそうで……"
2601105-37 = "なんか、そう書かれると逆に挑戦したくなりません？"
2601105-38 = "……え？そんなに危ないんですか？"
2601105-39 = "……ふっふっふ。"
2601105-40 = "[s7] \"……えっと、佐天さん？\"\n[s8] \"もしかして、余計なこと言ったかな……？\""
2601105-43 = "いえ……実は、最初からやると決めてたんです。"
2601105-44 = "だって、一度気になったら止められないじゃないですか？"
2601105-45 = "それじゃ……"
2601105-46 = "……見ててください、先生！"
2601105-51 = "（佐天は意気揚々と打席に立った）"
2601105-54 = "[wa:500]― [log=사텐]ん～、[wa:1320] [/log]"
2601105-55 = "― [log=사텐]特に変わったところは……[wa:1640]なさそうかな。[/log]"
2601105-58 = "[wa:1000]― [log=사텐]……[wa:100]先生、[wa:1560]顔がこわばってません？[wa:1720] [/log]"
2601105-59 = "― [log=사텐]ただの[wa:190]バッティングマシーン[wa:520]ですって。[/log]"
2601105-62 = "[ns] \"危なそうだったら、すぐに止めるよ？\""
2601105-65 = "[wa:700]― [log=사텐]はい。[wa:680]でも、[wa:500]たぶん大丈夫です。[/log]"
2601105-68 = "[wa:850]― [log=사텐]バッティングには、[wa:480] [/log]"
2601105-69 = "― [log=사텐]それなりに[wa:320]自信がありますから。[/log]"
2601105-72 = "[wa:400]― [log=사텐]……[wa:250]なんですか、[wa:1260] [/log]"
2601105-73 = "― [log=사텐]その疑いの眼差しは。[/log]"
2601105-76 = "― [log=사텐]じゃあ、[wa:840]賭けでもします？[/log]"
2601105-79 = "[wa:600]― [log=사텐]3球以内に[wa:860]打てなかったら、[wa:860] [/log]"
2601105-80 = "― [log=사텐]大人しく打席を[wa:800]離れます。[/log]"
2601105-83 = "[wa:500]― [log=사텐]その代わり、[wa:860]もし1球でも打てたら、[wa:1950] [/log]"
2601105-84 = "― [log=사텐]そこの自販機で[wa:820]飲み物を奢ってください！[/log]"
2601105-87 = "[wa:700]― [log=사텐]どうですか？[wa:1070] [/log]"
2601105-88 = "― [log=사텐]先生にとっても、[wa:1060]悪い話じゃないですよね？[/log]"
2601105-91 = "― [log=사텐]……[wa:400]へへっ。[/log]"
2601105-94 = "さあ！佐天選手、バッターボックスに入りました！"
2601105-95 = "まずは一球目！"
2601105-99 = "よーく引きつけて……"
2601105-103 = "……はぁっ！！"
2601105-111 = "（……飲み物を3つ買うことになった）"
