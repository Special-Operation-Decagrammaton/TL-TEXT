[translation]
2601105-1 = "Talento para o beisebol"
2601105-2 = "（O local para onde Saten me chamou era um centro de rebatidas nos arredores da cidade）"
2601105-10 = "Ufa...! Esse lugar tem instalações muito boas."
2601105-11 = "Além disso, sinto que se parece com a nossa Cidade Acadêmica."
2601105-12 = "[s1] \"Ah, te achei.\"\n[s2] Aceno para Saten."
2601105-15 = "……Ah! Professooooor!"
2601105-16 = "Você foi rápido. Achei que demoraria mais, então comecei a rebater antes."
2601105-17 = "……Sim?"
2601105-18 = "Ah, isso é como eu relaxo. Lá também, eu vinha aqui com frequência."
2601105-22 = "……Aconteceu alguma coisa?"
2601105-23 = "[s3] \"Não, é que fico feliz em ver que a Saten está se divertindo.\"\n[s4] \"Você está cheia de energia hoje também, hein.\""
2601105-26 = "Fufu, obrigada. Falando nisso, professor... tem uma coisa que está me deixando curiosa."
2601105-27 = "Não tenho reclamações sobre as instalações daqui, mas..."
2601105-28 = "Olha só, ali... tem uma caixa de rebatidas diferente, não tem?"
2601105-29 = "……Consegue ver? É aquela ali, aquela."
2601105-33 = "[ns5] \"……Por acaso.\"\n[ns6] \"O que é aquilo, exatamente…….\""
2601105-36 = "Eu li o aviso antes de você chegar. Parece que é uma máquina de arremessos super veloz feita pela Millennium……"
2601105-37 = "Não dá uma vontade de desafiar quando escrevem algo assim?"
2601105-38 = "……Eh? É tão perigoso assim?"
2601105-39 = "……Fufufu."
2601105-40 = "[s7] \"……Ei, Saten-san?\"\n[s8] \"Será que eu disse algo desnecessário……?\""
2601105-43 = "Não…… na verdade, eu já tinha decidido que faria isso desde o começo."
2601105-44 = "Porque, depois que algo me deixa curiosa, não consigo parar, sabe?"
2601105-45 = "Então……"
2601105-46 = "……Fique olhando, professor!"
2601105-51 = "（Saten entrou na caixa de rebatidas cheia de entusiasmo）"
2601105-54 = "[wa:500]― [log=사텐]Hmm~, [wa:1320] [/log]"
2601105-55 = "― [log=사텐]Não parece ter nada de [wa:1640] tão especial assim.[/log]"
2601105-58 = "[wa:1000]― [log=사텐]……[wa:100]Professor, [wa:1560] seu rosto está tenso, não está?[wa:1720] [/log]"
2601105-59 = "― [log=사텐]É só uma [wa:190] máquina de rebatidas[wa:520], sabe.[/log]"
2601105-62 = "[ns] \"Se parecer perigoso, eu vou parar na hora, viu?\""
2601105-65 = "[wa:700]― [log=사텐]Sim. [wa:680] Mas, [wa:500] acho que vai ficar tudo bem.[/log]"
2601105-68 = "[wa:850]― [log=사텐]Para rebatidas, [wa:480] [/log]"
2601105-69 = "― [log=사텐]eu tenho uma certa [wa:320] confiança.[/log]"
2601105-72 = "[wa:400]― [log=사텐]……[wa:250]O que é [wa:1260] [/log]"
2601105-73 = "― [log=사텐]esse olhar de dúvida?[/log]"
2601105-76 = "― [log=사텐]Então, [wa:840] quer fazer uma aposta?[/log]"
2601105-79 = "[wa:600]― [log=사텐]Se eu não conseguir rebater [wa:860] em 3 bolas, [wa:860] [/log]"
2601105-80 = "― [log=사텐]eu saio da caixa de rebatidas [wa:800] sem reclamar.[/log]"
2601105-83 = "[wa:500]― [log=사텐]Em troca, [wa:860] se eu conseguir rebater pelo menos uma, [wa:1950] [/log]"
2601105-84 = "― [log=사텐]você me paga uma bebida [wa:820] naquela máquina ali![/log]"
2601105-87 = "[wa:700]― [log=사텐]O que acha?[wa:1070] [/log]"
2601105-88 = "― [log=사텐]Para você também, [wa:1060] não é um mau negócio, né?[/log]"
2601105-91 = "― [log=사텐]……[wa:400]Hehe.[/log]"
2601105-94 = "Certo! A jogadora Saten entrou na caixa de rebatidas!"
2601105-95 = "Primeira bola!"
2601105-99 = "Esperando o momento certo……"
2601105-103 = "……Haa!!"
2601105-111 = "（……Acabei tendo que comprar três bebidas）"
