[translation]
10003010-1 = "第1話;一難去らずにまた一難"
10003010-8 = "（風紀委員たちが、合宿のためにホテルに集まっていた）"
10003010-11 = "ほら、ぼーっとするな！企画部と情報部はそこの機材を、5階で作ってる最中のオペレーションルームのところに！"
10003010-12 = "テキパキ動け！もたもたしてると訓練が始まるぞ！"
10003010-13 = "はいっ！！"
10003010-14 = "兵站部はそちらの物資から優先的に。医療部は先に訓練用のリストを整理して――"
10003010-15 = "――どうしました？ああ、それはすぐに使うものなのであちらへ。"
10003010-16 = "承知しました！"
10003010-20 = "[ns] \"みんな手慣れてる感じだね。\""
10003010-21 = "そりゃあもちろん、これでも全員ゲヘナの風紀委員だから。これくらいは当然のようにできてもらわないと、ゲヘナの風紀は守れない。"
10003010-22 = "毎月とは言いませんが、訓練は定期的にしていますし。"
10003010-23 = "今回の訓練は、特殊な形になりそうですが……"
10003010-27 = "ああ、ここにいらっしゃいましたか。臨時のオペレーションルームの設置が終わったそうなので、そちらに移動しましょう。"
10003010-29 = "夏季合宿用オペレーションルーム"
10003010-30 = "準備の方はいかがですか？"
10003010-31 = "問題無い。もう準備が終わったところには、取り合えず休憩してもらってる。"
10003010-32 = "こちらも、医療部の運び込みはおよそ完了しています。"
10003010-33 = "では大丈夫そうですね、良かったです。"
10003010-34 = "それでは、始めるとしましょうか。"
10003010-35 = "[s] \"来る途中にもちょっと見えたけど、良い感じの場所だね？\""
10003010-36 = "はい、何と言ってもここ「アラバ海岸」は、ゲヘナの中でもかなり閑静な場所として知られていまして。"
10003010-37 = "この1年で発生した事故の数も100件以下。最近起きたことと言っても、海の家での無銭飲食や、爆音ライブ、海辺に無許可で建造物を建設……それくらいでしょうか。"
10003010-38 = "[s] \"それはもう十分、閑静ではないのでは……？\""
10003010-39 = "ゲヘナだったらそれくらい、子どもの悪戯みたいなものだよ。"
10003010-40 = "まあとにかく、静かなところが良かったので。なにせ、表面的には夏季の合宿訓練ではありますが、私たちの真の目的を忘れてはいけません。"
10003010-41 = "つまり……静かな場所であればあるほど、ヒナ委員長もゆっくり休めるはず！"
10003010-42 = "体裁としての風紀委員の訓練も、何も起きなければ私たちだけで十分ですし。"
10003010-43 = "まあ……そうですね。"
10003010-44 = "しょうがない、やるか。"
10003010-45 = "「しょうがない」なんて言ってますが……イオリ？どうしてイオリはもうすでに水着なんですか？どういうことですか、遊ぶ気満々なんですか！？"
10003010-46 = "え、いや……その……！"
10003010-47 = "[s1] \"そういえば言いそびれたけど。\"\n[s2] \"水着、すっごく似合ってるよ、イオリ。\""
10003010-48 = "……っ！！！？"
10003010-49 = "……っ！！！？"
10003010-50 = "ちっ、違う！これはあくまでその、今回の訓練が海辺だからってことで、それに合わせようとしただけで……！"
10003010-51 = "その、夏の海に自然な格好じゃないと、問題児たちに逆に警戒されるっていうか……！"
10003010-52 = "[s] \"イオリはどっちにしろ目を引くと思うけど。\""
10003010-53 = "はいそこ、楽しいお喋りはその辺で！はしゃぎたい気持ちも分かりますが、今回大事なのは皆さんの夏休みではありません！"
10003010-54 = "だから違うんだってアコちゃん！？"
10003010-55 = "とにかく、今回の目的はヒナ委員長の休息です！皆さんはそれを成立させるための駒だと思ってください！今回の計画においては、各位の意思も言葉も必要ありません！"
10003010-56 = "この夏はただ全力で、委員長を休ませるための歯車になってください！"
10003010-57 = "そ、そこまで言うことある……？"
10003010-58 = "（まあ、こうなると思っていたから、私は水着を持って来なかったわけですが……）"
10003010-60 = "委員長を煩わせる事象を限りなくゼロにするのです！どんな騒音も、問題も、ヒナ委員長のお耳に届かせてはなりません！"
10003010-61 = "[s] \"ところで、その当人のヒナは？\""
10003010-62 = "委員長でしたら、今はもうホテルに。この後、4時間はお部屋で……と伝えています。"
10003010-63 = "4時間も……？"
10003010-64 = "はい、あと4時間後にはちょうど午後の戦術訓練が終わって、次の歩行訓練が始まる頃合いです。委員長はそのタイミングでお呼びしようかと。"
10003010-65 = "ただし、この「歩行訓練」というのもあくまで名目上のこと。言ってしまえばこれは、ゆっくり海辺をお散歩していただく時間です！"
10003010-66 = "委員長は、それで納得したのか……？"
10003010-67 = "しっかり歩くことも訓練の一種だと、それはもうかなりの勢いで主張しておきましたから！ですので戦術訓練は素早く済ませて、急いでビーチの掃除と整備を……！"
10003010-68 = "上手く行くと良いけど……。"
10003010-69 = "ところで行政官、一つ疑問が。"
10003010-70 = "はい、どうしましたか？"
10003010-71 = "この辺り、何だかあまりにも静かすぎるような気がするのですが……？"
10003010-72 = "ここまで来る途中も、訓練の準備をしている時も、ほとんど誰ともすれ違いませんでしたし……。"
10003010-73 = "それは別に良いことじゃないのか？ただのタイミングの問題でしょ、何か事件があったわけじゃあるまいし。"
10003010-74 = "イオリ、「口は災いの元」って知ってますか……？"
10003010-75 = "ん？そりゃ、意味は知ってるけど……。"
10003010-78 = "あら……？"
10003010-81 = "はい、アコです。どうされましたか？"
10003010-82 = "あ、行政官。実は合宿用の物資の調達のために、ホテルの付近を回っていたのですが、お店が一つも開いておらず……如何しましょう？"
10003010-83 = "……はい？どうしてそんな――"
10003010-86 = "失礼いたします。私、当ホテルの支配人を務めているものです。今お時間よろしいでしょうか？"
10003010-87 = "……はい、どうぞ。どうかしましたか？"
10003010-91 = "おお……フロントで聞いた時は耳を疑いましたが……本当に来てくださったんですね、ゲヘナ風紀委員会の皆様！"
10003010-92 = "……は？どういうことだ？"
10003010-93 = "何だか嫌な予感がしますね……。"
10003010-94 = "えっと……？皆さまは私共の救援要請を聞いて、こちらに来てくださったのですよね？"
10003010-95 = "[s] \"何かすれ違ってるような……初めから説明をお願いできますか？\""
10003010-96 = "今、この辺りは大変なんです！もともとスラム街を占拠していたヘルメット団と、最近になって急に現れたスケバンが衝突してまして……！"
10003010-97 = "最初は小競り合いだったのが、どんどん激しくなって……どちらの集団がこの辺の地区を牛耳るのか、約4時間後にはその決着をつけると言っているんです！"
10003010-98 = "え……？"
10003010-99 = "それがネット上でも騒ぎになり、色んな所から面白半分で見物客が来るだとか、どっちが勝つか賭けになっているだとか……それで逆に、その噂を聞いたこの地域の方々は軒並みお店を閉めて、逃げ出してしまったんです！"
10003010-100 = "これでもし本当に見物客まで巻き込んで、大暴れなんてことになったら……！"
10003010-101 = "うぅ、せっかく改装の一環として、温泉の開発も始めたところだったのに……！"
10003010-102 = "しかし、天は私たちを見捨てていませんでした……！こうして風紀委員会の皆様が来てくださるなんて！どうかお願いします……彼女たちの、「全面戦争」を止めてください！"
10003010-110 = "全面戦争！！？！？"
10003010-111 = "[s3] \"あー、これってやっぱり……。\"\n[s4] \"口は災いの元……。\""
10003010-112 = "ちょっと！私のせいだって言いたいわけ！？"
10003010-113 = "ちょっと！私のせいだって言いたいわけ！？"
10003010-114 = "ま、待ってください！そんな大規模な抗争になりそうなんですか！？"
10003010-115 = "アコちゃんさっき、ここはゲヘナの中でも指折りの静かな場所、って言ってなかった……？"
10003010-116 = "そんなことを今、私に言われましても！？"
10003010-117 = "……ネットで調べてみましたが、今のお話は事実のようですね。"
10003010-118 = "ゲヘナのSNSで、すごく話題になっています。「約4時間後、アラバ海岸で大規模な全面戦争が起きる」……と。"
10003010-120 = "＜GehEricha0201：そういえば今日だっけ？＞"
10003010-121 = "＜#Nyanko&：海辺でスケバンとヘルメット団が、ド派手な勢力争いするんだって＞"
10003010-122 = "＜akusi-girl：今年の夏、一番デカそうなイベントじゃん！＞"
10003010-123 = "＜EATorDIEOfficial：何だか面白そうな匂いがしますわね？＞"
10003010-124 = "といった感じです。確かにこれは、かなり大規模になりそうな……。"
10003010-125 = "……っ！"
10003010-128 = "い、委員長！？"
10003010-131 = "……もしもし、アコ？さっき聞きそびれたのだけど、よく考えてみたら何もせずに4時間待機は長くない？何か間違ってる気がするから、今から私の部屋に来て。"
10003010-134 = "くっ、やはりダメでしたか……！"
10003010-135 = "いや、そりゃ訓練に来たのにすぐ「4時間はホテルの部屋で待機です♪」って言われたら怪しむでしょ……。"
10003010-138 = "ああもうっ！こんな時に誰ですか！？"
10003010-139 = "[ruby=パンデモニウム・ソサエティー]……万魔殿！？[/ruby]"
10003010-142 = "もしもし、アコ行政官でしょうか？先日ご提出いただいた決裁文書につきまして、幾つかミスが発見されました。至急こちらに来ていただけますでしょうか？"
10003010-143 = "はいっ！？え、今からですか！？"
10003010-146 = "……。"
10003010-152 = "アコ行政官、ご報告です！"
10003010-153 = "現在、海辺で正体不明のスケバン及びヘルメット団の小規模集団が、小競り合いを始めた模様です。至急ご対応を！"
10003010-159 = "あっひゃひゃひゃひゃっ！この海岸は、今日からあたしらが占拠する！4時間後を律儀に待つまでもねえ……さあ、やつらを追い出せ！"
10003010-160 = "何を言ってる！あんたたちみたいなぽっと出のよそ者に、この海を渡せるか！"
10003010-166 = "こ、これは……。"
10003010-167 = "アコ、今どこ？それに今さっき外から銃声が聞こえたけど、訓練の予定でも変わったの？"
10003010-168 = "アコちゃん、どうする！？"
10003010-169 = "悪いことは重なるものですね……行政官、どうしましょうか。"
10003010-175 = "くっ……！"
10003010-177 = "すぅ、はぁ……。"
10003010-178 = "……分かりました。ええ、分かりましたとも。"
10003010-179 = "[ns] \"あ、アコ……？大丈夫……？\""
10003010-180 = "こうなったらもう、槍でも雨でもかかってきなさい！この私が委員長のために、これくらいの試練すら乗り越えられないとでもお思いですか！"
10003010-181 = "まずは先生！ヒナ委員長のところに行って、何も大したことは起きてないと伝えてください！訓練は予定通りに進んでおり、何も問題はありませんと！"
10003010-182 = "「まだ風紀委員長としての出番はこの後ですので、訓練の効果を最大化するためにもまだ待機していただきたい」と言ってください！それで大丈夫なはずです！その先は任せます！"
10003010-183 = "何はともかく絶対に、ぜっっったいに！ヒナ委員長を部屋の外に出さないでください！分かりましたね！？"
10003010-184 = "[s] \"は、はいっ！\""
10003010-185 = "イオリ、チナツ、おふたりは風紀委員のメンバーを連れて、海辺の小競り合いを収拾させてきてください！"
10003010-186 = "わ、分かった！"
10003010-187 = "承知しました。"
10003010-188 = "……仕方ないので私は一旦、ゲヘナに戻ります。あの面倒な方々と早急に話を付けてきますので！何だか状況はややこしくなってきましたが、私たちのやるべきことは変わりません！"
10003010-189 = "全ては、"
10003010-190 = "ヒナ委員長の安らかな休息のために！！！"
10003010-191 = "[s] \"りょ、了解……！\""
