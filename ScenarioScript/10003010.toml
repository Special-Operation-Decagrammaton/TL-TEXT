[translation]
10003010-1 = "Episódio 1: Um problema atrás do outro"
10003010-8 = "(Os membros do Comitê Disciplinar estavam reunidos no hotel para o acampamento de treinamento)"
10003010-11 = "Ei, não fiquem aí parados! Pessoal do Departamento de Planejamento e do Departamento de Informação, levem esses equipamentos para a sala de operações que está sendo montada no 5º andar!"
10003010-12 = "Movam-se rápido! Se enrolarem, o treinamento vai começar!"
10003010-13 = "Sim, senhora!!"
10003010-14 = "Departamento de Logística, priorizem aqueles suprimentos. Departamento Médico, organizem a lista de treinamento primeiro e..."
10003010-15 = "— O que houve? Ah, isso será usado logo, então leve para lá."
10003010-16 = "Entendido!"
10003010-20 = "[ns] \"Parece que todos são bem experientes.\""
10003010-21 = "Ora, claro. Afinal, todos aqui são membros do Comitê Disciplinar de Gehenna. Se não conseguirem fazer pelo menos isso, não poderemos proteger a disciplina de Gehenna."
10003010-22 = "Não digo todo mês, mas fazemos treinamentos regularmente."
10003010-23 = "Embora este treinamento em particular pareça ter um formato um tanto especial..."
10003010-27 = "Ah, você estava aqui. A instalação da sala de operações temporária foi concluída, então vamos para lá."
10003010-29 = "Sala de Operações para o Acampamento de Verão"
10003010-30 = "Como estão os preparativos?"
10003010-31 = "Sem problemas. Onde os preparativos já terminaram, pedi para descansarem por enquanto."
10003010-32 = "Aqui também, o transporte do Departamento Médico está praticamente concluído."
10003010-33 = "Então parece que está tudo bem, que bom."
10003010-34 = "Bem, então vamos começar."
10003010-35 = "[s] \"Vi um pouco no caminho para cá, mas é um lugar bem agradável, não é?\""
10003010-36 = "Sim, afinal, esta \"Praia Alaba\" é conhecida como um dos lugares mais tranquilos dentro de Gehenna."
10003010-37 = "O número de acidentes ocorridos neste último ano foi inferior a 100. Se formos falar do que aconteceu recentemente, foi apenas um caso de comer sem pagar em uma casa de praia, um show com som alto e a construção de estruturas sem permissão na areia... só isso."
10003010-38 = "[s] \"Isso já não é o suficiente para não ser considerado tranquilo...?\""
10003010-39 = "Para Gehenna, isso é como uma brincadeira de criança."
10003010-40 = "Bem, de qualquer forma, queríamos um lugar calmo. Afinal, embora seja superficialmente um acampamento de treinamento de verão, não podemos esquecer nosso verdadeiro objetivo."
10003010-41 = "Ou seja... quanto mais calmo for o lugar, mais a Presidente Hina poderá descansar tranquilamente!"
10003010-42 = "E o treinamento do Comitê Disciplinar, que serve apenas de fachada, será suficiente apenas com nós se nada acontecer."
10003010-43 = "Bem... é verdade."
10003010-44 = "Não tem jeito, vamos começar."
10003010-45 = "Você diz \"não tem jeito\", mas... Iori? Por que você já está de roupa de banho? O que significa isso, você está pronta para brincar!?"
10003010-46 = "Eh, não, isso...!"
10003010-47 = "[s1] \"Aliás, esqueci de dizer.\"\n[s2] \"A roupa de banho combina muito com você, Iori.\""
10003010-48 = "……!!!?"
10003010-49 = "……!!!?"
10003010-50 = "N-não é isso! Isso é apenas, sabe, como o treinamento é na praia, eu só tentei me adequar a isso...!"
10003010-51 = "Tipo, se eu não estiver com um visual natural para o mar de verão, os encrenqueiros podem ficar alertas, entende...!?"
10003010-52 = "[s] \"Acho que a Iori chama a atenção de qualquer jeito.\""
10003010-53 = "Ei, chega de conversa fiada! Entendo que estejam empolgados, mas o que é importante agora não são as férias de verão de vocês!"
10003010-54 = "Eu já disse que não é isso, Ako-chan!?"
10003010-55 = "De qualquer forma, o objetivo desta vez é o descanso da Presidente Hina! Considerem-se apenas peças para fazer isso acontecer! No plano atual, a vontade ou a opinião de vocês não são necessárias!"
10003010-56 = "Neste verão, apenas sejam as engrenagens que trabalham com força total para que a Presidente descanse!"
10003010-57 = "P-precisa dizer desse jeito...?"
10003010-58 = "(Bem, como eu já imaginava que seria assim, eu não trouxe roupa de banho...)"
10003010-60 = "Reduzam a zero qualquer evento que possa incomodar a Presidente! Nenhum ruído, nenhum problema, nada deve chegar aos ouvidos da Presidente Hina!"
10003010-61 = "[s] \"A propósito, onde está a própria Hina?\""
10003010-62 = "A Presidente já está no hotel. Avisei que ela deve ficar no quarto pelas próximas 4 horas..."
10003010-63 = "4 horas...?"
10003010-64 = "Sim, daqui a 4 horas o treinamento tático da tarde terá terminado e será a hora de começar o próximo treinamento de caminhada. Pensei em chamá-la nesse momento."
10003010-65 = "No entanto, esse \"treinamento de caminhada\" é apenas um nome. Na verdade, é apenas um tempo para ela passear calmamente pela praia!"
10003010-66 = "A Presidente aceitou isso...?"
10003010-67 = "Eu insisti com bastante firmeza que caminhar bem também é um tipo de treinamento! Por isso, vamos terminar o treinamento tático rapidamente e nos apressar com a limpeza e organização da praia...!"
10003010-68 = "Espero que dê tudo certo..."
10003010-69 = "Aliás, Administradora, tenho uma dúvida."
10003010-70 = "Sim, o que houve?"
10003010-71 = "Sinto que esta área está silenciosa demais, não acha...?"
10003010-72 = "Não cruzamos com quase ninguém no caminho até aqui, nem enquanto preparávamos o treinamento..."
10003010-73 = "Isso não é algo bom? É só uma questão de timing, não é como se tivesse acontecido algum incidente."
10003010-74 = "Iori, você sabe que \"a língua é o chicote do corpo\", não sabe...?"
10003010-75 = "Hm? Bom, eu sei o significado, mas..."
10003010-78 = "Ora...?"
10003010-81 = "Sim, aqui é a Ako. O que houve?"
10003010-82 = "Ah, Administradora. Na verdade, eu estava circulando perto do hotel para conseguir suprimentos para o acampamento, mas não há nenhuma loja aberta... O que devemos fazer?"
10003010-83 = "……Sim? Por que isso—"
10003010-86 = "Com licença. Eu sou o gerente deste hotel. Teria um momento?"
10003010-87 = "……Sim, pode falar. Aconteceu algo?"
10003010-91 = "Oh... eu duvidei dos meus ouvidos quando ouvi na recepção, mas... vocês realmente vieram, membros do Comitê Disciplinar de Gehenna!"
10003010-92 = "……Hã? O que quer dizer com isso?"
10003010-93 = "Estou com um pressentimento ruim..."
10003010-94 = "Err... Vocês vieram até aqui porque ouviram nosso pedido de socorro, não foi?"
10003010-95 = "[s] \"Parece que houve um mal-entendido... pode explicar desde o início?\""
10003010-96 = "A situação aqui está terrível! O Grupo dos Capacetes, que já ocupava a favela, entrou em conflito com as Sukebans que apareceram de repente recentemente...!"
10003010-97 = "O que começou como uma pequena briga foi ficando cada vez mais intenso... e eles disseram que vão decidir quem manda nesta região daqui a cerca de 4 horas!"
10003010-98 = "O quê...?"
10003010-99 = "Isso virou um alvoroço na internet, atraindo curiosos de todos os lugares e até apostas sobre quem vai vencer... Por causa disso, os moradores locais, ao ouvirem os rumores, fecharam todas as lojas e fugiram!"
10003010-100 = "Se isso realmente escalar para uma grande confusão envolvendo os curiosos...!"
10003010-101 = "Ai, ai, e pensar que tínhamos acabado de começar o desenvolvimento de fontes termais como parte da reforma...!"
10003010-102 = "Mas os céus não nos abandonaram...! Que os membros do Comitê Disciplinar tenham vindo até aqui! Por favor, eu imploro... parem a \"guerra total\" delas!"
10003010-110 = "GUERRA TOTAL!!?！？"
10003010-111 = "[s3] \"Ah, então era isso...\"\n[s4] \"A língua é o chicote do corpo...\""
10003010-112 = "Ei! Está querendo dizer que a culpa é minha!?"
10003010-113 = "Ei! Está querendo dizer que a culpa é minha!?"
10003010-114 = "E-esperem um pouco! Vai mesmo acontecer um conflito dessa magnitude!?"
10003010-115 = "Ako, você não disse agora pouco que este era um dos lugares mais tranquilos de Gehenna...?"
10003010-116 = "Como você espera que eu responda a isso agora!?"
10003010-117 = "……Pesquisei na internet e parece que o que ele disse é verdade."
10003010-118 = "Está sendo um assunto muito comentado nas redes sociais de Gehenna. \"Daqui a cerca de 4 horas, uma guerra total em grande escala acontecerá na Praia de Araba\"..."
10003010-120 = "＜GehEricha0201：Falando nisso, é hoje, né?＞"
10003010-121 = "＜#Nyanko&：Dizem que as Sukebans e o Grupo dos Capacetes vão fazer uma disputa de poder chamativa na praia＞"
10003010-122 = "＜akusi-girl：Esse vai ser o maior evento deste verão!＞"
10003010-123 = "＜EATorDIEOfficial：Sinto um cheiro de algo interessante por aqui, não acha?＞"
10003010-124 = "É exatamente isso. Realmente parece que vai ser algo em grande escala..."
10003010-125 = "……!"
10003010-128 = "P-Presidente!?"
10003010-131 = "……Alô, Ako? Esqueci de perguntar antes, mas pensando bem, não é muito tempo esperar 4 horas sem fazer nada? Sinto que tem algo errado, venha ao meu quarto agora."
10003010-134 = "Droga, então não deu certo...!"
10003010-135 = "Bom, é claro que iam suspeitar se, logo após chegarmos para o treinamento, alguém dissesse \"esperem 4 horas no quarto do hotel♪\"..."
10003010-138 = "Ah, droga! Quem é agora numa hora dessas!?"
10003010-139 = "……Pandemonium Society!?"
10003010-142 = "Alô, é a Administradora Ako? Encontramos alguns erros nos documentos de aprovação que você enviou outro dia. Poderia vir aqui imediatamente?"
10003010-143 = "Sim!? O quê, agora mesmo!?"
10003010-146 = "……。"
10003010-152 = "Administradora Ako, tenho um relatório!"
10003010-153 = "Parece que um pequeno grupo de Sukebans e membros da Gangue do Capacete, cuja identidade é desconhecida, começou uma briga na praia. Precisamos de uma resposta imediata!"
10003010-159 = "Ahahahahaha! A partir de hoje, esta praia é nossa! Não precisamos esperar pacientemente por quatro horas... Vamos, expulsem eles daqui!"
10003010-160 = "Do que você está falando! Não vamos entregar este mar para um bando de estranhos que apareceram do nada!"
10003010-166 = "I-isso é..."
10003010-167 = "Ako, onde você está agora? E eu acabei de ouvir tiros lá fora, o cronograma do treinamento mudou?"
10003010-168 = "Ako-chan, o que vamos fazer!?"
10003010-169 = "As coisas ruins sempre acontecem todas de uma vez... Administradora, o que faremos?"
10003010-175 = "Droga...!"
10003010-177 = "Suspiro... inspira..."
10003010-178 = "……Entendido. Sim, eu entendi perfeitamente."
10003010-179 = "[ns] \"A-Ako...? Você está bem...?\""
10003010-180 = "Já que chegou a esse ponto, que venha o que tiver que vir! Você acha mesmo que eu, por causa da Presidente, não conseguiria superar nem esse tipo de provação?!"
10003010-181 = "Primeiro, Sensei! Vá até onde a Presidente Hina está e diga a ela que não aconteceu nada de grave! Diga que o treinamento está seguindo conforme o planejado e que não há problema algum!"
10003010-182 = "Diga a ela: 'Como sua vez como Presidente do Comitê Disciplinar é apenas mais tarde, por favor, continue aguardando para maximizar os efeitos do treinamento'! Isso deve bastar! O resto deixo com você!"
10003010-183 = "De qualquer forma, absolutamente, de jeito nenhum! Não deixe a Presidente Hina sair do quarto! Entendido!?"
10003010-184 = "[s] \"S-sim!\""
10003010-185 = "Iori, Chinatsu, vocês duas levem os membros do Comitê Disciplinar e resolvam essa briga na praia!"
10003010-186 = "E-entendido!"
10003010-187 = "Compreendido."
10003010-188 = "……Não tenho escolha, então voltarei para Gehenna por um momento. Vou resolver as coisas com aquelas pessoas problemáticas o mais rápido possível! A situação ficou um pouco complicada, mas o que precisamos fazer não mudou!"
10003010-189 = "Tudo isso,"
10003010-190 = "pelo descanso tranquilo da Presidente Hina!!!"
10003010-191 = "[s] \"En-entendido...!\""
