[translation]
1000203-1 = "O Caminho Solitário"
1000203-2 = "Periferia de Gehenna - Casa de Chá"
1000203-3 = "Eu estava esperando por você, Sensei."
1000203-4 = "[s] \"Incrível, um lugar como este...\""
1000203-5 = "Fufu, já que finalmente posso passar um tempo com você, Sensei, me esforcei um pouco. Além disso, a busca pelo conhecimento exige um certo investimento financeiro."
1000203-6 = "Reservei o local para o dia todo, então não precisamos nos preocupar com ninguém nos interrompendo."
1000203-7 = "Tarde da noite e uma casa de chá tradicional. O ambiente perfeito."
1000203-8 = "Então, vamos começar."
1000203-9 = "[s1] \"Eu não entendo muito disso, não sei se serei útil...\"\n[s2] \"Estou um pouco nervoso...\""
1000203-14 = "(Tum)"
1000203-15 = "(Primeiro, o que Haruna colocou sobre a mesa foi...)"
1000203-16 = "[s3] \"...?\"\n[s4] \"...Macarrão instantâneo?\""
1000203-17 = "O objeto de estudo de hoje é o macarrão instantâneo."
1000203-18 = "O objeto de estudo de hoje é o macarrão instantâneo."
1000203-19 = "...? Sim, não é chá."
1000203-20 = "O que você quer dizer com isso? Eu nunca disse que estava estudando a cerimônia do chá."
1000203-21 = "Apenas acho que a cerimônia do chá é a forma suprema de etiqueta em relação à alimentação."
1000203-22 = "Em outras palavras, trata-se de considerar vários fatores: a postura ao comer, o ambiente, a atitude, o estado de espírito, e assim por diante."
1000203-23 = "O que aconteceria se aplicássemos toda essa postura da cerimônia do chá, com total sinceridade, ao macarrão instantâneo?"
1000203-24 = "Sim, este não é o caminho do chá, mas o caminho para dominar o macarrão instantâneo."
1000203-25 = "Em outras palavras, é a busca pelo Caminho do Macarrão Instantâneo!"
1000203-26 = "[s5] Que convincente...\n[s6] ...Faz sentido!"
1000203-27 = "Fufu, como esperado. Eu sabia que você, Sensei, entenderia a profundidade deste mundo."
1000203-28 = "Fufu, como esperado. Eu sabia que você, Sensei, entenderia a profundidade deste mundo."
1000203-29 = "Bem, primeiro, os ingredientes."
1000203-32 = "(Tum)"
1000203-33 = "(Haruna tirou uma cerâmica de aparência cara)"
1000203-34 = "É uma cerâmica feita à mão por um artesão. Vou ferver a água nela."
1000203-37 = "(Em seguida, ela tirou a água)"
1000203-38 = "E esta é água coletada a 500 metros abaixo da zona vulcânica de Gehenna."
1000203-39 = "É algo raro, contendo vários minerais, e custou um preço considerável."
1000203-42 = "(Haruna tira mais alguma coisa)"
1000203-43 = "Este é carvão feito de carvalho novo. Também é bem raro e dizem que consegue manter uma temperatura constante para ferver a água."
1000203-47 = "(Su, su, su...)"
1000203-48 = "Este é um relógio de cristal oscilante, um termômetro para medir a temperatura da água, hashis feitos do bambu mais fino, e isto é para servir a água..."
1000203-49 = "Fufu, acho que é só isso. Bem, vamos começar."
1000203-50 = "Primeiro, vamos ferver a água."
1000203-52 = "Hum, para acender o carvão..."
1000203-53 = "Cof, cof!"
1000203-54 = "Em vez de fogo, está saindo fumaça...! O que eu deveria fazer...?"
1000203-55 = "(E após muita luta, cerca de 2 horas depois, a água finalmente ferveu)"
1000203-56 = "(...Tive a impressão de ver uma chaleira elétrica no canto da sala de chá, mas decidi ignorar)"
1000203-58 = "...Fufu. Desculpe pela espera, estamos prontos."
1000203-59 = "[s7] \"Bom trabalho...\"\n[s8] \"Finalmente vamos poder comer...\""
1000203-60 = "Não, não podemos baixar a guarda. É aqui que o verdadeiro desafio começa."
1000203-61 = "Não, não podemos baixar a guarda. É aqui que o verdadeiro desafio começa."
1000203-62 = "Ao despejar a água, onde devo mirar, onde não devo tocar, de onde e como devo despejar...!"
1000203-63 = "Há muitas coisas a se considerar. Existem várias formas de despejar, como desenhando círculos ou focando no centro, mas aqui farei um pequeno círculo...!"
1000203-64 = "Originalmente, aprendi isso como uma forma de preparar café, mas certamente servirá. Então..."
1000203-66 = "(Su)"
1000203-67 = "（Haruna estava tão concentrada que eu só pude observar sentada em posição seiza）"
1000203-68 = "……Ufa."
1000203-69 = "Quem diria que até mesmo colocar água quente pode ser tão cansativo quando se leva a sério……."
1000203-70 = "Muito bem, vou marcar 3 minutos no relógio……."
1000203-72 = "（3 minutos depois……）"
1000203-76 = "Então, vamos comer!"
1000203-78 = "（Na sala de chá durante a madrugada, eu e Haruna comemos um macarrão instantâneo de 100 ienes como se fosse um banquete, em perfeita harmonia）"
1000203-79 = "（……Estava surpreendentemente gostoso）"
1000203-80 = "Caminho de volta"
1000203-81 = "Fufu…… o que achou do dia de hoje?"
1000203-82 = "Da minha parte, achei delicioso. Foi um sabor completamente diferente do habitual."
1000203-83 = "A sala de chá silenciosa, aquele ambiente, e o macarrão instantâneo que provamos ali……."
1000203-84 = "Percebi a diferença logo na primeira garfada."
1000203-85 = "Se eu conseguir ajustar mais algumas condições e torná-las consistentes, talvez dominar a arte do macarrão instantâneo não seja apenas um sonho."
1000203-86 = "Fufu…… então, por hoje é só."
1000203-88 = "（Observei Haruna ir embora com uma expressão de satisfação）"
