[translation]
10008135-2 = "Ugh... no fim das contas, não recebi o pagamento do bico..."
10008135-3 = "[s] \"O zelador que nos contratou acabou sendo preso, né...\""
10008135-4 = "Bem, não tem jeito..."
10008135-5 = "Isso acontece muito quando se faz bicos..."
10008135-6 = "[s] \"Acontece muito!?\""
10008135-10 = "Além disso, embora eu também esteja, parece que eles lá também estão bem decepcionados..."
10008135-15 = "Fufu... ahaha... tudo, tudo acabou..."
10008135-16 = "Err, b-bem..."
10008135-17 = "...Ah, que cansaço."
10008135-18 = "No fim das contas, o que nós estávamos fazendo... logo no início do ano novo...?"
10008135-19 = "I-isso, bem, é que..."
10008135-21 = "Ora, ora, o que passou, passou, não é?"
10008135-22 = "[s] \"Mutsuki?\""
10008135-23 = "Kufufu, bem, eu me diverti bastante, sabe? Não sinto que foi algo vazio nem nada do tipo."
10008135-24 = "Várias coisas interessantes aconteceram, foi divertido!"
10008135-25 = "M-mas, o meu desejo... ugh..."
10008135-26 = "Falando nisso, Mutsuki, você ainda não fez o seu desejo, né?"
10008135-27 = "Ah, é verdade, talvez eu não tenha feito mesmo?"
10008135-28 = "Por que não faz agora? O lugar é o que é, mas pelo menos tem uma caixa de ofertas."
10008135-29 = "Sim,"
10008135-30 = "É verdade!"
10008135-31 = "Então, vamos todos rezar juntos!"
10008135-32 = "Olha, tem notas de brinquedo suficientes para todo mundo!"
10008135-33 = "H-hã?"
10008135-34 = "S-será que tudo bem fazer um pedido com isso...?"
10008135-36 = "Tudo bem, tudo bem!"
10008135-44 = "Aqui, Sensei também!"
10008135-45 = "Então vamos todos fazer um pedido!"
10008135-46 = "Ah, claro, um diferente daquele de antes, hein!"
10008135-47 = "Com um sentimento novo, um novo desejo! Né?"
10008135-53 = "B-bem..."
10008135-54 = "...Sim, é verdade."
10008135-55 = "[s] \"Acho uma boa ideia.\""
10008135-57 = "Então, no três!"
10008135-66 = "Pronto, pedido feito!"
10008135-67 = "[s] \"Foi rápido...\""
10008135-70 = "Kufufu, nesse tipo de coisa, quem termina primeiro ganha, sabia?"
10008135-71 = "...Sim, tudo bem. Embora eu ache que não exista essa de ganhar ou perder."
10008135-72 = "Aliás, Sensei, qual foi o pedido que você fez?"
10008135-73 = "[s] \"Ah, falando nisso, eu fui interrompido.\""
10008135-74 = "Aru-chan, você não pode perguntar essas coisas! Se contar o pedido para alguém, ele perde o efeito."
10008135-75 = "Aru-chan também não gostaria disso, né?"
10008135-76 = "B-bem, é verdade, mas..."
10008135-77 = "Ah. De tanto ficar correndo de um lado para o outro, sinto que..."
10008135-81 = "D-desculpe, desculpe! Minha barriga roncou sozinha, sinto muito mesmo...!?"
10008135-82 = "Ah! Mas é verdade que estamos com fome."
10008135-83 = "Então, que tal pedirmos para o Sensei pagar algo gostoso para a gente?"
10008135-84 = "Sim, vamos fazer isso."
10008135-85 = "Sim, se o Sensei estiver de acordo, eu também topo."
10008135-86 = "...Err, isso, eu também posso ir? Já que o Sensei vai pagar, seria uma ótima oportunidade..."
10008135-87 = "[s] \"As coisas foram decididas com uma rapidez incrível……!\""
10008135-89 = "Fufu, você não vai recusar, vai, Sensei? Além disso, todo mundo se esforçou tanto por isso."
10008135-90 = "Então vamos! Anda, anda, depressa!"
10008135-91 = "Aliás, o que vamos comer?"
10008135-93 = "……Fufu, aqui também é bem barulhento, não é?"
10008135-94 = "V-você tem certeza de que eu posso dar minha opinião……!? B-bem, se for com a Aru-sama, talvez um lámen……!"
10008135-97 = "（E assim, um novo ano em Kivotos começou）"
10008135-102 = "[ns] （Um pedido……）"
10008135-107 = "[ns] Em silêncio, mas ainda assim com firmeza, rezo em meu coração."
10008135-108 = "Rapsódia de Ano Novo Nº 68"
