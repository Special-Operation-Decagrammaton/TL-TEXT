[translation]
10008135-2 = "うぅっ……結局バイト代、貰えなかった……。"
10008135-3 = "[s] \"雇い主の管理人が捕まっちゃったんだもんね……。\""
10008135-4 = "まぁ、しょうがないか……。"
10008135-5 = "バイトしてると、よくあることだし……。"
10008135-6 = "[s] \"よくあるの！？\""
10008135-10 = "それに私もそうだけど、あっちも相当ガッカリしてるみたいだし……。"
10008135-15 = "ふふ……あはは……全部、全部終わりよ……。"
10008135-16 = "えっと、あ、あの……。"
10008135-17 = "……はぁ、疲れた。"
10008135-18 = "結局私たちは……新年早々、何をしてたのかしら……？"
10008135-19 = "そ、その、それは……。"
10008135-21 = "まあまあ、終わったことはしょうがないじゃん！"
10008135-22 = "[s] \"ムツキ？\""
10008135-23 = "くふふっ、まあ私はそれなりに楽しかったし？別に虚しいとか、そんな風にも思わないし。"
10008135-24 = "色々面白いことが起きて、楽しかったから！"
10008135-25 = "で、でも、願い事が……うぅっ……。"
10008135-26 = "そういえばムツキ、まだ願い事してなくない？"
10008135-27 = "あ、そういえばそうかも？"
10008135-28 = "今からでもすれば？まあ場所はあれだけど、一応賽銭箱はあるし。"
10008135-29 = "うん、"
10008135-30 = "そうだね！"
10008135-31 = "じゃあ、みんなで一緒に祈ろう！"
10008135-32 = "ほら、オモチャのお札ならちょうど人数分あるから！"
10008135-33 = "え、えっ？"
10008135-34 = "こ、これでお願いごとをしても、大丈夫なのでしょうか……？"
10008135-36 = "大丈夫大丈夫！"
10008135-44 = "はい、先生も！"
10008135-45 = "じゃあみんなでお願いごとしよ！"
10008135-46 = "あっ、もちろんさっきとは違うやつでね！"
10008135-47 = "新しい気分で、新しい願い事！ねっ？"
10008135-53 = "え、ええ……。"
10008135-54 = "……うん、そうだね。"
10008135-55 = "[s] \"良いと思うよ。\""
10008135-57 = "それじゃあ、せーのっ！"
10008135-66 = "はい、願いごと終わり！"
10008135-67 = "[s] \"早いね……。\""
10008135-70 = "くふふっ、こういうのは早く終わらせた方が勝ちなんだよ？"
10008135-71 = "……うん、良し。というか勝ち負けとか、そういうのは別に無いと思うけど。"
10008135-72 = "ところで先生は、どんなお願いごとをしたのかしら？"
10008135-73 = "[s] \"あ、そういえば中断してた。\""
10008135-74 = "アルちゃん、そういうのは聞いちゃダメなんだよ！お願いごとは誰かに言っちゃうと、効果が無くなるんだから。"
10008135-75 = "アルちゃんもそんなの嫌でしょ？"
10008135-76 = "そ、それはそうだけど……。"
10008135-77 = "はぁ。本当にずっと動きっぱなしだったせいで、何だか……"
10008135-81 = "ご、ごめんなさいごめんなさい！私のお腹が勝手に、本当にすみません……！？"
10008135-82 = "あはっ！でも確かにお腹空いたね。"
10008135-83 = "じゃあ、先生に美味しいものでも奢ってもらおっか！"
10008135-84 = "そうね、そうしましょうか。"
10008135-85 = "うん、先生が良いなら私も賛成。"
10008135-86 = "……えっと、これ、私も行って良いやつ？先生が奢ってくれるなら、せっかくだし……。"
10008135-87 = "[s] \"すごい勢いで決定事項に……！\""
10008135-89 = "ふふっ、まさか先生は断ったりしないでしょう？それに、みんなこれだけ頑張ったんだから。"
10008135-90 = "じゃあ行こっ！ほらほら早くっ！"
10008135-91 = "ところで、何食べる？"
10008135-93 = "……ふふっ、ここも騒がしいわね。"
10008135-94 = "わ、私が意見しても大丈夫なのですか……！？え、えっと、やはりアル様と一緒ならラーメンなど……！"
10008135-97 = "（そうして、キヴォトスの新しい一年が始まった）"
10008135-102 = "[ns] （お願い事……）"
10008135-107 = "[ns] 静かに、それでもしっかりと、心の中で祈る。"
10008135-108 = "新春狂想曲 第68番"
