[translation]
12060-1 = "第6話;アビドス砂漠へ（１）"
12060-2 = "ここまでは列車で来ることが出来ましたが、ここからの移動手段は徒歩しかありません。"
12060-3 = "少し進めばもうアビドス砂漠……このアビドスにおける砂漠化が進む前から、元々砂漠だった場所です。"
12060-4 = "普段から壊れたドローンや警備ロボット、オートマタなどが徘徊してるので、危険な場所なのですが……。"
12060-5 = "今は強行突破するしかありません。皆さん、今一度火器の動作チェックをお願いします。"
12060-6 = "アビドス砂漠で、カイザーコーポレーションが一体何を企んでいるのか……。"
12060-7 = "実際に行って、確かめることにしましょう。"
12060-8 = "……けどさ、アヤネちゃん。よく考えると、その情報をくれたのってゲヘナの風紀委員長でしょ。それってなんかおかしくない？"
12060-9 = "いくら風紀委員長とはいえ、どうして他の学園の生徒が、うちの自治区のことをそこまで知ってるわけ？"
12060-10 = "うーん、あくまで推測に過ぎないけど……ゲヘナの風紀委員会はかなり情報収集能力に秀でてるって聞いたことが……。"
12060-11 = "だから、アビドスみたいな小規模な学校では考えられないような情報網を持ってる、とか……？"
12060-12 = "ま、そういうこともあるのかもね～。"
12060-13 = "委員長という立場でしたら、風紀委員会が把握している情報は全部集約されているでしょうし……それにあの時、あちらの行政官がたしか……"
12060-15 = "ましてや他の学園自治区の付近なのだから、きちんとその辺りは注意するのが当然でしょう？"
12060-16 = "（……？）"
12060-18 = "行政官は、「他の学園自治区の付近なのだから」……と言っていました。"
12060-19 = "自治区の「中」ではなく、あくまで「付近」、と。"
12060-20 = "そ、そうだっけ！？"
12060-21 = "それに……"
12060-23 = "あまり望ましくない出来事もありましたが、まだ違法行為とは言いきれないでしょうし……やむを得なかったということでご理解いただけますと幸いです。"
12060-25 = "「まだ違法行為とは言いきれない」……あの言葉も、よく考えてみると……。"
12060-26 = "あの時はてっきり苦しい言い訳かと思っていましたが……もしかしたら向こうは本当に、不法侵入の意図は無かったのかもしれません。"
12060-27 = "……もしかしたらそうかもしれない。けど、あの時の風紀委員会には、明らかに侵犯行為だと取れる言動が多々あった。あそこがアビドスの所持している自治区だったかどうかは、そんなに重要じゃない。"
12060-28 = "それに、あのアコの行動は明確な敵対行為。"
12060-29 = "それだけで十分。あの時のアヤネの判断は間違ってない。"
12060-30 = "……はい、そうですね。ありがとうございます、シロコ先輩。ですが……"
12060-33 = "……あの行政官は、私たちの知らなかった事実を知っていた。少なくともその可能性がある、そう考えるのが妥当かもしれません。"
12060-34 = "そうなると、ゲヘナの風紀委員長が私たちの知らないことを知っているとしても、何もおかしくありません。"
12060-36 = "ま、行ってみたらそれも含めて、きっと色々分かるでしょ。セリカちゃんが言ってた通り、直接この目で確かめれば早いんだしさ～。"
12060-37 = "じゃ、引き続き進むとしよっか～？"
