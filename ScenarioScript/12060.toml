[translation]
12060-1 = "Episódio 6: Rumo ao Deserto de Abydos (1)"
12060-2 = "Conseguimos chegar até aqui de trem, mas, daqui em diante, o único meio de transporte é a pé."
12060-3 = "Mais um pouco e chegaremos ao Deserto de Abydos... um lugar que já era deserto muito antes de a desertificação avançar por aqui."
12060-4 = "É um lugar perigoso, onde drones quebrados, robôs de segurança e autômatos costumam vagar, mas..."
12060-5 = "Agora, não temos escolha a não ser seguir em frente. Pessoal, por favor, verifiquem suas armas mais uma vez."
12060-6 = "O que será que a Kaiser Corporation está planejando no Deserto de Abydos..."
12060-7 = "Vamos até lá e descobrir por conta própria."
12060-8 = "Mas, Ayane-chan, pensando bem, quem nos deu essa informação foi a presidente do Comitê Disciplinar de Gehenna, né? Isso não é meio estranho?"
12060-9 = "Mesmo sendo a presidente do Comitê Disciplinar, por que uma aluna de outra escola saberia tanto sobre o nosso distrito?"
12060-10 = "Bem, é apenas uma suposição, mas... ouvi dizer que o Comitê Disciplinar de Gehenna é extremamente eficiente na coleta de informações..."
12060-11 = "Então, talvez eles tenham uma rede de informações que uma escola pequena como Abydos nem conseguiria imaginar...?"
12060-12 = "Bem, talvez seja esse o caso~."
12060-13 = "Sendo a presidente, todas as informações coletadas pelo Comitê Disciplinar estariam centralizadas nela... e, além disso, naquela época, o administrador de lá disse..."
12060-15 = "E, sendo perto do distrito de outra escola, é natural que eles tomem o devido cuidado, não é?"
12060-16 = "（……？）"
12060-18 = "O administrador disse: 'sendo perto do distrito de outra escola'..."
12060-19 = "Não 'dentro' do distrito, mas apenas 'perto'."
12060-20 = "É, foi isso mesmo!?"
12060-21 = "Além disso..."
12060-23 = "Embora tenha ocorrido um incidente indesejado, ainda não podemos classificar como um ato ilegal... espero que compreendam que foi uma medida inevitável."
12060-25 = "'Ainda não podemos classificar como um ato ilegal'... pensando bem, essa frase também..."
12060-26 = "Naquela hora, achei que fosse apenas uma desculpa esfarrapada... mas talvez eles realmente não tivessem a intenção de invadir."
12060-27 = "...Talvez seja verdade. Mas, naquela época, o Comitê Disciplinar teve várias atitudes que claramente podiam ser interpretadas como invasão. Se aquele local pertencia ou não ao distrito de Abydos não é o ponto principal."
12060-28 = "Além disso, as ações da Ako foram um ato de hostilidade claro."
12060-29 = "Isso já basta. O julgamento da Ayane naquela hora não estava errado."
12060-30 = "...Sim, você tem razão. Obrigada, Shiroko-senpai. Mas..."
12060-33 = "...Aquele administrador sabia de fatos que nós desconhecíamos. Pelo menos, é razoável pensar que essa possibilidade existe."
12060-34 = "Sendo assim, não há nada de estranho no fato de a presidente do Comitê Disciplinar de Gehenna saber coisas que nós não sabemos."
12060-36 = "Bem, quando chegarmos lá, com certeza descobriremos muita coisa, inclusive isso. Como a Serika-chan disse, é mais rápido verificar com nossos próprios olhos~."
12060-37 = "Então, vamos continuar avançando?"
