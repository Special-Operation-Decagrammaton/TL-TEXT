[translation]
10025060-1 = "Episódio 6; Céu sem névoa"
10025060-2 = "（Na manhã seguinte...）"
10025060-12 = "Outro dia sem nenhuma colheita, hein."
10025060-13 = "Ei, depois de atracar, guarde as redes."
10025060-14 = "Antes que o sol suba, precisamos arrumar aquela cozinha que ficou uma bagunça."
10025060-15 = "Ah, sobre isso... a cozinha já estava limpa."
10025060-16 = "Foi o pessoal do Kumagai?"
10025060-17 = "Pelo que ouvi no rádio, o Kumagai também não sabe de nada..."
10025060-18 = "E parece que até os equipamentos quebrados foram consertados."
10025060-23 = "…Quem será que foi?"
10025060-29 = "Pronto... agora sim."
10025060-30 = "Moe, verifique o quadro de distribuição de novo. #nSe estiver tudo conectado, a luz deve acender agora."
10025060-31 = "Ok~"
10025060-44 = "Ei... o que você está fazendo aí!?"
10025060-45 = "Estão passando dezenas de milhares de volts por esse fio elétrico!?"
10025060-46 = "É perigoso, desça daí agora!"
10025060-47 = "Está tudo bem. Eu verifiquei que não havia corrente passando antes de começar o trabalho."
10025060-48 = "Hã...?"
10025060-49 = "Já estou terminando, espere um pouco."
10025060-59 = "Moe, tente ligar o disjuntor de novo."
10025060-65 = "…Ok. Ah, parece que estava em curto mesmo."
10025060-66 = "Fios expostos à maresia se deterioram fácil. #nSe a voltagem subir um pouco, a sobrecarga faz o disjuntor cair."
10025060-67 = "Troquei os fios velhos e removi a ferrugem do painel de fiação."
10025060-68 = "Isso deve bastar como medida de emergência. #nAh, mas não esqueça de pedir para um profissional dar uma olhada depois."
10025060-70 = "…Co-como você conseguiu consertar...?"
10025060-72 = "Hm? Consertar um quadro de distribuição não é muito diferente de montar um comunicador em uma base temporária."
10025060-73 = "Acho que qualquer estudante de Kivotos deveria saber mexer em um quadro de distribuição..."
10025060-74 = "Só você na SRT tem esse tipo de conhecimento, sabia?"
10025060-76 = "Hm...? S-R-T...?"
10025060-78 = "N-não é nada!"
10025060-79 = "Aliás, este cais não tem guarda-corpo nem corrimão, isso é seguro?"
10025060-81 = "Já ocorreram acidentes no passado, então tentamos instalar cercas e coisas do tipo, mas..."
10025060-82 = "Parece que isso atrapalha na hora de atracar os barcos..."
10025060-83 = "Tentamos de tudo, mas... não deu certo."
10025060-85 = "Hmm... se houvesse alguma marcação visível mesmo à noite, talvez ajudasse a prevenir."
10025060-86 = "Já sei, Moe. Você não trouxe tinta luminescente?"
10025060-87 = "Eu tenho a que preparei para operações noturnas... mas por quê?"
10025060-88 = "Se pintarmos os cabeços de amarração, eles ficarão visíveis. #nAssim, o número de pessoas que caem no mar deve diminuir."
10025060-89 = "Daqui até ali... e já que estamos nisso, vamos fazer ali também!"
10025060-90 = "Ei, isso é equipamento militar, não é barato..."
10025060-91 = "Não seja pão-dura. #nVocê vive comprando equipamentos muito mais caros."
10025060-92 = "Certo, vou buscar a tinta."
10025060-94 = "…Ah, é verdade, o aterramento do poste de luz ainda não terminou, #nentão fique de olho para que os moradores não cheguem perto!"
10025060-96 = "…Si-sim."
10025060-105 = "…Ah."
10025060-106 = "Olá. O tempo está bom hoje, não é?"
10025060-107 = "…Vocês fizeram o que bem entenderam com a nossa vila."
10025060-108 = "Tanto os equipamentos da cozinha quanto o poste de luz que estava quebrado."
10025060-109 = "Meus olhos ainda não se acostumaram, é estranho."
10025060-110 = "Pe-peço perdão... é que os equipamentos deteriorados eram perigosos e pensei que fossem um incômodo..."
10025060-111 = "Será que eu fiz algo desnecessário...?"
10025060-112 = "Não... eu não diria isso. #nO pessoal da vila ficou feliz, afinal."
10025060-113 = "Apenas os velhos como eu se recusam a mudar e se apegam ao passado."
10025060-117 = "Aquele... peço desculpas novamente."
10025060-118 = "Por causa do medo, acabei sendo rude com todos vocês sem ter provas concretas..."
10025060-119 = "Eu deveria ter mantido a calma e ouvido as opiniões de vocês."
10025060-120 = "...Um medo que pode ser controlado não é um medo de verdade. Não se preocupe com isso."
10025060-121 = "Além disso... é natural que vocês suspeitassem desta vila."
10025060-122 = "Nós mesmos, de certa forma, desejávamos que isso acontecesse."
10025060-123 = "...Por acaso."
10025060-124 = "Não estou falando sobre os \"Profundos\"."
10025060-125 = "Aqueles que visitaram este lugar até hoje ouviam as lendas da vila e iam embora como se estivessem fugindo."
10025060-126 = "Uma cidade sem visitantes estagnou. #nComo não há mudanças, naturalmente, ninguém questiona os métodos antigos."
10025060-127 = "Sem saber que esse medo estava corroendo a atmosfera da vila."
10025060-128 = "...Mas eu acho que esta é uma vila maravilhosa."
10025060-129 = "Hah, você tem uma lábia afiada."
10025060-130 = "Hm... o que você está fazendo aí?"
10025060-131 = "Ah, a ponta da linha de arremesso estava frouxa, então..."
10025060-132 = "Pensei em refazer o nó de cabeça de macaco."
10025060-133 = "Você é habilidosa. Alguém te ensinou?"
10025060-134 = "Ah, esse tipo de nó é especial—"
10025060-136 = "...Especial?"
10025060-137 = "Ah, bem, é que... eu aprendi no clube de artesanato."
10025060-139 = "No clube de artesanato, aprenderam a fazer um nó de cabeça de macaco...?"
10025060-143 = "É difícil de acreditar, mas... é verdade. #nA verdade não é algo que se entenda tão facilmente."
10025060-144 = "...Fufu. Assim como esta vila, não é?"
10025060-148 = "...Espero que, em breve, vocês consigam pescar camarões como antes."
10025060-149 = "...É."
10025060-157 = "Vara de isca de 7 pés, molinete pequeno..."
10025060-158 = "Linha de nylon 0.8... certo."
10025060-159 = "Agora, com esse metal jig feito de cartucho de munição—"
10025060-167 = "Com licença..."
10025060-169 = "Hiiih!? D-desde quando você está aí...?"
10025060-170 = "Eu estava te chamando faz um tempo..."
10025060-171 = "D-desculpe...! #nÉ comum que não me notem, mas... não ter percebido você..."
10025060-172 = "Não, não, desculpe eu por te atrapalhar enquanto estava concentrada."
10025060-173 = "N-não... está tudo bem..."
10025060-175 = "(Essa pessoa é a que estava ontem... recitando feitiços estranhos...)"
10025060-176 = "(Ela veio falar comigo... Como agente da SRT, #nnão posso perder essa chance...! Preciso descobrir alguma coisa!)"
10025060-177 = "(M-mas... não consigo esquecer o quanto fiquei com medo ontem. O que eu faço...)"
10025060-179 = "Você estava pescando aqui?"
10025060-180 = "S-sim. Eu estava... pescando carapaus."
10025060-181 = "Enquanto os outros agentes observam a vila... fui encarregada de conseguir suprimentos..."
10025060-182 = "Eu poderia ter pegado marmitas descartadas como sempre, mas... não tem loja de conveniência nesta vila..."
10025060-183 = "Agentes...? Marmitas descartadas...?"
10025060-184 = "Ah, bem..."
10025060-189 = "Ah... espere, a boia agora..."
10025060-190 = "Carapaus são sensíveis a sons, então, por favor, fique em silêncio..."
10025060-191 = "O-oh...!"
10025060-192 = "Agora que o anzol fisgou bem... se eu puxar devagar..."
10025060-198 = "……Pesquei!"
10025060-199 = "Uau! Que tamanho incrível, deve ter uns 30cm, não é?!"
10025060-201 = "Ah, ahaha... acho que tem uns 20cm, na verdade..."
10025060-202 = "Se eu pescar mais uns três, acho que já dá para hoje."
10025060-203 = "Mais três...? Desse tamanho todo...?"
10025060-204 = "Sim. Se forem carapaus, eu costumo pescar uns cinco ou seis..."
10025060-205 = "……A-aconteceu alguma coisa?"
10025060-209 = "Eu sei que já te dei trabalho ontem, mas..."
10025060-210 = "Você poderia me ensinar a pescar?!"
10025060-212 = "Hã...? Ah, sério!?"
