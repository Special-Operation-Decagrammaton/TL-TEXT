[translation]
10025060-1 = "第6話;霧の晴れた空"
10025060-2 = "（翌朝……）"
10025060-12 = "今日も収穫なし、か。"
10025060-13 = "ほれ、係留したら網を戻しておいてくれ。"
10025060-14 = "日が昇る前に、あの荒れちまった調理場を片付けんといけないからな。"
10025060-15 = "あの、それが……調理場はすでに綺麗になってましたよ。"
10025060-16 = "[ruby=くまがい]熊谷た[/ruby]ちか？"
10025060-17 = "それが、無線で聞いたところ熊谷さんも知らないようで……"
10025060-18 = "しかも、壊れていた機器も直っていたらしいです。"
10025060-23 = "……いったい誰なんじゃ。"
10025060-29 = "これで……よしっ、と。"
10025060-30 = "モエ、もっかい分電盤をチェックしてくれ。#nちゃんとつながってたら、これで電気がつくはずだ。"
10025060-31 = "おっけ～"
10025060-44 = "ちょっ……そこで何をしてるんですか！？"
10025060-45 = "その電線には、数万ボルトもの電流が流れてるんですよ！？"
10025060-46 = "危ないので早く下りてください！"
10025060-47 = "大丈夫だって。電気が流れてないのを確認して作業を進めてるから。"
10025060-48 = "へっ……？"
10025060-49 = "もうちょっとで終わるから、待っててくれ。"
10025060-59 = "モエ、もっかいブレーカーを上げてみて。"
10025060-65 = "……おっけ～。お、やっぱショートしてたみたいだね。"
10025060-66 = "海風にさらされた電線は劣化しやすいからな。#n少しでも電圧が上がると、過負荷でブレーカーが落ちてしまう。"
10025060-67 = "古い電線は交換して、配線盤のサビは取っておいた。"
10025060-68 = "これで応急処置としては十分なはず。#nあ、でも後で専門の業者に見てもらうのは忘れないようにな。"
10025060-70 = "……ど、どうやって修理を……？"
10025060-72 = "ん？分電盤の修理なんて、仮設拠点で通信機の設営をするのと大して変わらないだろ。"
10025060-73 = "キヴォトスの生徒なら、分電盤くらい触れると思うんだが……"
10025060-74 = "そんな知識まで身につけてるのは、SRTでもあんたくらいだからね？"
10025060-76 = "ん……？えすあーる……？"
10025060-78 = "な、何でもない！"
10025060-79 = "というか、この船着場ってガードレールも手すりもないが、このままで大丈夫なのか？"
10025060-81 = "過去に事故が発生したので、フェンスなどの設置を試みたのですが……"
10025060-82 = "そうすると、停泊時の邪魔になってしまうようで……"
10025060-83 = "手は尽くしたのですが……ダメでした。"
10025060-85 = "んー……夜でも分かりやすい目印があれば多少は防げそうだな。"
10025060-86 = "そうだ、モエ。夜光塗料を持ってきてないか？"
10025060-87 = "夜戦用に用意したものならあるけど……どうして？"
10025060-88 = "ボラードに塗っておけば目立つだろ。#nそうすれば海に落ちるやつも減るはずだ。"
10025060-89 = "ここからここまで……ついでにあっちもやっておくか！"
10025060-90 = "えー、軍用品だから安くはないんだけど……"
10025060-91 = "ケチケチするな。#nもっと高い装備をよく買ってるだろ。"
10025060-92 = "じゃ、私は塗料を取ってくる。"
10025060-94 = "……そうだ、街灯のアース工事は終わってないから、#n住民が近づかないように見といてくれ！"
10025060-96 = "……は、はい。"
10025060-105 = "……あ。"
10025060-106 = "こんにちは。今日は天気がいいですね。"
10025060-107 = "……ワシたちの村を、よく好き勝手してくれたもんだ。"
10025060-108 = "調理場の設備も、壊れていた街灯も。"
10025060-109 = "まだ目が慣れんで、違和感があるの。"
10025060-110 = "も、申し訳ありません……その、劣化した設備は危険ですし、不便かと思い……"
10025060-111 = "余計なことをしてしまったでしょうか……？"
10025060-112 = "いや……そうは言っておらんじゃろう。#n村のモンは喜んでおったしな。"
10025060-113 = "変化を拒み、過去に執着するのは年寄りくらいのものじゃ。"
10025060-117 = "あの……あらためて申し訳ありませんでした。"
10025060-118 = "恐怖心から、たしかな証拠もなく皆さんに無礼を働いてしまい……"
10025060-119 = "もっと冷静になって、ご意見に耳を傾けるべきでした。"
10025060-120 = "……抑えられるような恐怖は、恐怖と言えんじゃろう。気にするな。"
10025060-121 = "それに……この村を怪しむなと言う方がおかしいもんだ。"
10025060-122 = "我々も、それを望んでおったからな。"
10025060-123 = "……もしかして。"
10025060-124 = "「深きもの」のことを言ってるわけではないぞ。"
10025060-125 = "これまでここを訪ねてきた者たちは、村の言い伝えを耳に挟んでは逃げるように去っていった。"
10025060-126 = "人が来なくなった町は停滞した。#n変化がないから当然、これまでのやり方を否定する者もいない。"
10025060-127 = "その[ruby=・   ・]恐怖[/ruby]が……村の空気を蝕んでいくとは知らずに。"
10025060-128 = "……でも、私は素敵な村だと思います。"
10025060-129 = "はんっ、口が上手いな。"
10025060-130 = "ん……それは、何をしてるんだ？"
10025060-131 = "あ、ヒービングラインの先端が緩んでいたので……"
10025060-132 = "モンキーフィストを作り直しておこうかと。"
10025060-133 = "器用なもんだ。誰かに教わったのか？"
10025060-134 = "あ、この結び方は特殊――"
10025060-136 = "……特殊？"
10025060-137 = "あっ、ええっと、その……しゅ、手芸部で教わったんです。"
10025060-139 = "手芸部で、モンキーフィストの作り方を……？"
10025060-143 = "信じがたいが……そうじゃな。#n真相はそう簡単に理解できんしの。"
10025060-144 = "……ふふ。この村のように、ですね。"
10025060-148 = "……早く以前のように、またエビが捕れることを願っています。"
10025060-149 = "……ああ。"
10025060-157 = "7フィートのルアーロッドに、小型スピニングリール……"
10025060-158 = "0.8号のナイロンライン……よし。"
10025060-159 = "後はこの薬莢を加工して作ったメタルジグで――"
10025060-167 = "あのー……"
10025060-169 = "ひぃっっ！？い、いつからそちらに……？"
10025060-170 = "さっきから声をかけてたんだけど……"
10025060-171 = "ご、ごめんなさい……！#n気づかれないことは多いのですが……気づけなかったなんて……"
10025060-172 = "いやいや、集中してたのに邪魔しちゃってごめんよ。"
10025060-173 = "い、いえ……大丈夫です……"
10025060-175 = "（この人はたしか昨日……怪しい呪文を唱えてた人……）"
10025060-176 = "（相手から話しかけてくるなんて……SRTの隊員として、#nこのチャンスを逃すわけには……！なにか聞き出さないと！）"
10025060-177 = "（で、でも……昨日の怖かったのが忘れられない。どうしよう……）"
10025060-179 = "ここで釣りをしていたのかい？"
10025060-180 = "は、はい。アジを……釣っていたところです。"
10025060-181 = "他の隊員が、村の様子を見ている間……食糧の調達を任されて……"
10025060-182 = "いつも通り廃棄弁当でも良かったのですが……この村にはコンビニがないので……"
10025060-183 = "隊員……？廃棄弁当……？"
10025060-184 = "あっ、ええっと……"
10025060-189 = "あ……待ってください、今ウキが。"
10025060-190 = "アジは音に敏感なので、少し静かに……"
10025060-191 = "お、おう……！"
10025060-192 = "しっかり針が掛かったところで……ゆっくり引き上げれば……"
10025060-198 = "……釣れた！"
10025060-199 = "うわっ！すげえ大きさだな、30cmはあるんじゃねえか！"
10025060-201 = "あ、あはは……たぶん20cmくらいだと思いますが……"
10025060-202 = "あと3匹くらい釣れば、今日の分は大丈夫そうです。"
10025060-203 = "3匹も……？こんなデカい獲物を……？"
10025060-204 = "はい。アジなら、いつも5、6匹は釣ってますし……"
10025060-205 = "……な、何かありましたか？"
10025060-209 = "昨日も迷惑かけたのに申し訳ないんだけどよ……"
10025060-210 = "オレに釣りを教えてくれませんか！！"
10025060-212 = "へっ……？あっ、ええっ！？"
