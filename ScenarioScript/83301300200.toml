[translation]
83301300200-6 = "委員長！戦闘があったと聞きましたが、大丈夫ですか！？"
83301300200-7 = "私は大丈夫。"
83301300200-8 = "いったい何があったんですか？"
83301300200-9 = "温泉開発部の手がかりを追っていたら、怪しい動きを見つけた。"
83301300200-10 = "一連の行動は全て「わくわく温泉大作戦」に関係してるらしい。"
83301300200-11 = "「わくわく温泉大作戦」………？"
83301300200-12 = "何でも完璧な温泉を作るのだとか。"
83301300200-13 = "完璧な、温泉……"
83301300200-14 = "えっと……聞き間違い、とかではなく？"
83301300200-15 = "……？"
83301300200-16 = "い、いえ！"
83301300200-17 = "とにかく、地下で班長は見つけたのだけど……"
83301300200-18 = "主犯の部長がまだ見つからない。"
83301300200-20 = "あ、温泉開発部の部長でしたら、風紀委員を総動員して調べたところ……"
83301300200-27 = "どうやらマコト議長が行方を知っているかもしれない、という情報を入手しました。"
83301300200-28 = "マコトが………？"
83301300200-29 = "はい。温泉の開発を依頼する際に、自ら温泉開発部のアジトまで足を運んだそうです。"
83301300200-30 = "……なるほど。"
83301300200-31 = "あのタヌキが知っていると分かっていれば、追いかける前に問いただしたのに……！"
83301300200-32 = "素直に教えてくれると思う？"
83301300200-33 = "それは……そうですね。"
83301300200-34 = "私がマコトと直接話してみる。"
