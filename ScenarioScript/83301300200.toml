[translation]
83301300200-6 = "Presidente! Ouvi dizer que houve um combate, a senhora está bem!?"
83301300200-7 = "Eu estou bem."
83301300200-8 = "O que aconteceu, afinal?"
83301300200-9 = "Enquanto seguia as pistas do Departamento de Desenvolvimento de Fontes Termais, notei movimentos suspeitos."
83301300200-10 = "Parece que toda essa série de ações está relacionada à 'Grande Operação Termas Emoção'."
83301300200-11 = "'Grande Operação Termas Emoção'………?"
83301300200-12 = "Dizem que é para criar a fonte termal perfeita."
83301300200-13 = "Uma fonte termal... perfeita..."
83301300200-14 = "Err... não seria um erro de audição, por acaso?"
83301300200-15 = "……?"
83301300200-16 = "N-não, nada!"
83301300200-17 = "De qualquer forma, encontrei o líder do grupo no subsolo, mas..."
83301300200-18 = "Ainda não encontrei a chefe, a principal culpada."
83301300200-20 = "Ah, sobre a chefe do Departamento de Desenvolvimento de Fontes Termais, mobilizamos todo o Comitê Disciplinar para investigar e..."
83301300200-27 = "Obtivemos a informação de que talvez a Presidente Makoto saiba o paradeiro dela."
83301300200-28 = "A Makoto...?"
83301300200-29 = "Sim. Ao solicitar o desenvolvimento da fonte termal, ela mesma teria ido até o esconderijo do Departamento de Desenvolvimento de Fontes Termais."
83301300200-30 = "……Entendo."
83301300200-31 = "Se eu soubesse que aquela guaxinim sabia de algo, teria a interrogado antes de sair perseguindo os outros...!"
83301300200-32 = "Você acha mesmo que ela contaria a verdade?"
83301300200-33 = "Isso é... verdade."
83301300200-34 = "Eu mesma vou falar com a Makoto."
