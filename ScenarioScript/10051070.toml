[translation]
10051070-1 = "Episódio 7: Um Vazio Desconhecido"
10051070-2 = "Local de filmagem de 'Crônicas Ninja da Garota Michiru'"
10051070-3 = "Nyahaha~. Olá."
10051070-4 = "Desde as câmeras até os vestidos... ver que as coisas que emprestei estão sendo bem aproveitadas me deixa muito feliz."
10051070-8 = "Senhorita Niya...!"
10051070-9 = "Será que você veio buscar os vestidos!?"
10051070-10 = "Não, não, pode devolver quando for conveniente para vocês."
10051070-11 = "Então, é uma participação especial!?"
10051070-12 = "O caminho do ninja está sempre aberto! Nin-nin!"
10051070-13 = "Infelizmente, isso também não é o caso..."
10051070-15 = "Então, por que a chefe do Departamento de Yin-Yang está aqui? Foi só coincidência?"
10051070-16 = "Bem, digamos que eu estava apenas de passagem..."
10051070-17 = "Mais importante... parece que a Tsukuyo-san realmente não está aqui, não é?"
10051070-18 = "É verdade. E, além disso, não conseguimos contato com ela faz tempo..."
10051070-22 = "...Hm? O que você quer dizer com 'realmente'?"
10051070-24 = "Ah, é que ouvi dizer que a Tsukuyo-san saiu do Clube de Pesquisa de Ninjutsu."
10051070-29 = "Eeeeeeh!?"
10051070-30 = "E-eu não fiquei sabendo de nada disso!?"
10051070-31 = "Essa reação também era esperada, eu diria..."
10051070-32 = "Já que parece que vocês não têm interesse em nada além de ninjas..."
10051070-33 = "Hã? Não, não, não! É brincadeira, né?"
10051070-34 = "Eu sou a chefe, sabia!? Como assim a chefe não sabe de nada!?"
10051070-35 = "Hmm~, vocês leem revistas como 'ron-ro' ou 'Heart Girls'?"
10051070-36 = "O que é isso?"
10051070-37 = "Então imagino que também não conheçam a 'BiBi'... Vocês usam redes sociais?"
10051070-38 = "Eu cuido do canal 'Crônicas Ninja da Garota Michiru'."
10051070-39 = "Ou seja, vocês não usam redes sociais. #nNesse caso, é natural que não tenham visto aquele programa."
10051070-40 = "Do que você está falando?"
10051070-41 = "Ver para crer. Este é um vídeo que foi enviado ao canal Chronos."
10051070-47 = "Então, a última pergunta! #nVocê poderia nos dizer, em uma palavra, qual é o objetivo futuro da Tsukuyo-san!"
10051070-48 = "A-ah, bem... de agora em diante, e-eu vou me esforçar para me tornar uma modelo de moda incrível...!"
10051070-49 = "Estamos ansiosos pelo sucesso da Tsukuyo-san daqui para frente—"
10051070-54 = "Eh..."
10051070-55 = "I-isso é..."
10051070-56 = "Eh...? A Tsukuyo, modelo...? #nIsso significa que... ela vai trabalhar como modelo para sempre?"
10051070-57 = "Chefe..."
10051070-58 = "..."
10051070-59 = "Por que... desde quando...?"
10051070-60 = "Parece que a Tsukuyo-san participou como modelo substituta no desfile de moda outro dia."
10051070-61 = "Dizem que aquele palco causou um grande impacto na indústria da moda~"
10051070-62 = "Provavelmente, logo depois disso, a 'Shine Cat Agency' a recrutou."
10051070-63 = "Eu não imaginava que vocês não sabiam de absolutamente nada."
10051070-64 = "..."
10051070-65 = "Eu não sabia de nada..."
10051070-66 = "...Talvez não fosse o melhor momento para falar sobre isso."
10051070-67 = "Bem, por hoje, vou me retirar."
10051070-71 = "Chefe... a Tsukuyo-dono..."
10051070-72 = "Izuna... você se lembra da Tsukuyo naquele palco?"
10051070-73 = "...Com certeza."
10051070-74 = "Como ela estava?"
10051070-75 = "……Eu pensei que ela estava linda."
10051070-76 = "E depois?"
10051070-77 = "E depois... ugh..."
10051070-78 = "Você não achou que ela parecia alguém de outro mundo?"
10051070-79 = "……!"
10051070-80 = "Nós estávamos olhando de baixo do palco, do canto mais escuro..."
10051070-81 = "E a Tsukuyo estava lá, no lugar mais alto e iluminado do palco."
10051070-82 = "Mas, Chefe... ninjas são seres que mantêm seus corações ardentes nos lugares mais escuros, não são?"
10051070-83 = "Sim. É exatamente por isso que... a Tsukuyo, sobre nós..."
10051070-87 = "Ah, é verdade. Esqueci de mencionar uma coisa."
10051070-88 = "Nyaa!?"
10051070-89 = "Você ainda não tinha ido embora!?"
10051070-90 = "Sim. Pensei que não tinha cumprido meu verdadeiro objetivo, nyahaha."
10051070-91 = "Objetivo? Você disse que estava apenas de passagem..."
10051070-92 = "Existem coincidências planejadas, não é mesmo?"
10051070-93 = "……Não faz sentido nenhum!"
10051070-94 = "Se foi planejado, então não é mais uma coincidência, né!?"
10051070-95 = "Às vezes, esse tipo de jogo de palavras é necessário~"
10051070-96 = "Bem, agora não é nada necessário, então vamos ao que interessa. #nComo a Tsukuyo-san parece que vai faltar na gravação de hoje—"
10051070-97 = "Pensei no seu bem e arranjei um assistente de gravação substituto!"
10051070-99 = "Um assistente de gravação... é!?"
10051070-100 = "Bem... agradeço a consideração, mesmo vindo da Niya..."
10051070-101 = "Mas substituir a Tsukuyo não é algo fácil..."
10051070-107 = "[ns] \"Olá. Sou o assistente temporário apenas para hoje.\""
10051070-108 = "Dohyaaa!?"
10051070-109 = "Meu senhor!"
10051070-110 = "Aparecer do nada assim faz mal para o coração!"
10051070-111 = "[s1] \"Isso também seria uma emboscada?\"\n[s2] \"Se fosse apenas uma vez antes da saudação, não seria perdoável?\""
10051070-114 = "Como esperado do Sensei! Você se lembra bem dos meus ensinamentos—"
10051070-115 = "...Não é isso! #nNiya, não me diga que você fez o Sensei ser o assistente de gravação? Como!?"
10051070-116 = "Nyahaha, não se preocupe com os detalhes~"
10051070-117 = "Bem, como meu trabalho aqui terminou, vou me retirar agora~"
10051070-121 = "Meu senhor! Estou feliz em vê-lo!"
10051070-122 = "Um ataque surpresa torna a emoção ainda maior! Nin-nin!"
10051070-123 = "O Sensei participar da gravação..."
10051070-124 = "Esse é um desenrolar inesperado demais..."
10051070-125 = "Bem, então... podemos começar a gravação...?"
10051070-126 = "Hm? Se está tudo bem sem a Tsukuyo?"
10051070-127 = "Não está tudo bem, mas... o telefone não atende, não responde no MomoTalk... #nNão sei nem onde ela está, não tem o que fazer..."
10051070-128 = "[s3] \"Eu não sei onde a Tsukuyo está, mas...\"\n[s4] \"Eu tenho um jeito de entrar em contato com ela.\""
10051070-131 = "Você consegue falar com a Tsukuyo!?"
10051070-132 = "É verdade!?"
10051070-133 = "C-como!?"
10051070-134 = "[s] \"A Niya me deu o contato do empresário dela.\""
10051070-135 = "……!"
10051070-136 = "Chefe! Vamos ligar agora mesmo!"
10051070-137 = "Com certeza!"
10051070-138 = "Mas antes... suuu... haaa..."
10051070-139 = "[s] \"Está respirando fundo?\""
10051070-140 = "Ligar para alguém que não conheço é assustador... quer dizer, não é isso, é que preciso ser cautelosa!"
10051070-141 = "Muito bem... vou ligar para o número que o Sensei me deu... ufa..."
10051070-147 = "Trim, trim..."
10051070-148 = "Click."
10051070-151 = "Sim, alô?"
10051070-152 = "Ah... oi, olá!"
10051070-153 = "Sim? Quem gostaria?"
10051070-154 = "I-isso mesmo! Na verdade, a ninja chamada Tsukuyo... não, a modelo, ela está aí?"
10051070-155 = "Tsukuyo?"
10051070-159 = "...Ah, outro repórter."
10051070-160 = "Escute, nós já fizemos a coletiva de imprensa e já enviamos o comunicado, não enviamos?"
10051070-161 = "Estou um pouco ocupado agora, então vou desligar."
10051070-162 = "E-espera um pouco! Eu não sou repórter!"
10051070-163 = "Eu sou Chidori Michiru! Amiga da Tsukuyo!"
10051070-164 = "Você é... a Michiru?"
10051070-165 = "Hã? Você me conhece?"
10051070-167 = "Será que você é uma inscrita do canal \"Crônicas Ninjas da Michiru\"...!?"
10051070-168 = "Crôni... o quê?"
10051070-169 = "Sinto muito, mas não conheço esse canal. #nSei o seu nome porque a Tsukuyo mencionou você."
10051070-170 = "Então, qual é o assunto?"
10051070-171 = "I-isso mesmo! O assunto! O que vocês fizeram com a Tsukuyo!?"
10051070-172 = "Sim?"
10051070-173 = "Ela não atende o telefone e nem visualiza as mensagens no MomoTalk!"
10051070-174 = "Ah, é só isso..."
10051070-175 = "Só isso...?"
10051070-176 = "No mundo profissional, é comum restringir o contato para que a pessoa possa se concentrar no trabalho."
10051070-177 = "No momento, estamos com o smartphone da Tsukuyo sob nossos cuidados."
10051070-178 = "Sob cuidados!?"
10051070-179 = "Além disso, você tem noção de quão seriamente a Tsukuyo está se dedicando às filmagens agora?"
10051070-180 = "A Tsukuyo...?"
10051070-181 = "Sim. Portanto, encerraremos a conversa por aqui."
10051070-182 = "Es-espera um pouco! Só um minutinho para falar com a Tsukuyo—"
10051070-183 = "Não se preocupe com a Tsukuyo. Esta noite, um vídeo dos bastidores será publicado em nosso canal, por favor, confira lá."
10051070-184 = "Passar bem."
10051070-189 = "Bu-bucho..."
10051070-190 = "..."
10051070-194 = "Muito bem, chega de choramingar."
10051070-195 = "Bucho!?"
10051070-196 = "A Tsukuyo disse que ia postar um vídeo hoje também, não disse? #nEntão nós não podemos ficar para trás!"
10051070-197 = "Mesmo sem a Tsukuyo... vamos fazer o que está ao nosso alcance!"
10051070-198 = "E acima de tudo, o Sensei também vai nos ajudar! #n...né?"
10051070-199 = "[s] \"Com certeza!\""
10051070-200 = "Então Izuna... prepare o equipamento de filmagem!"
10051070-201 = "Sim! Bucho!"
10051070-205 = "—Muito bem, o tema de hoje das \"Crônicas Ninjas da Michiru\" é! #n...Ninpo em situações de infiltração!"
10051070-206 = "Onde esconder armas ocultas, qual técnica de qual escola utilizar!"
10051070-207 = "Tudo isso! Eu vou—"
10051070-208 = "Eu... vou..."
10051070-209 = "..."
10051070-210 = "[s] \"Michiru, você está bem?\""
10051070-211 = "Bucho... talvez seja melhor adiar a filmagem de hoje para outro dia..."
10051070-215 = "Ufa..."
10051070-216 = "Não, a filmagem... vou continuar assim mesmo...!"
