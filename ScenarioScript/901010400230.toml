[translation]#[Texto Final. - Filipe 05/07.]
901010400230-7 = "Aqui FOX1. FOX2, reporte o progresso."
901010400230-8 = "Aqui FOX2, os alvos estão na defensiva, então estou priorizando criar confiança."
901010400230-9 = "Perguntei superficialmente sobre o 'Caranguejo do Tambor', mas ninguém parece ter ouvido falar."
901010400230-10 = "Podem estar fingindo?"
901010400230-11 = "Alguns podem estar mentindo, mas……#nquem trabalha no porto acha que caranguejo em tambor é absurdo."
901010400230-12 = "Se o objetivo fosse assustar o pessoal do porto, usariam uma ameaça mais realista."
901010400230-13 = "É. Quem tem o mínimo de conhecimento não espalha um boato desse."
901010400230-15 = "Então, a investigação de hoje termina aqui?"
901010400230-16 = "Hmm…… ainda tenho tempo, vou tentar na área comercial."
901010400230-18 = "FOX3, sem objeções. Hoje o vento tá fresco, dá pra aguentar."
901010400230-19 = "FOX4 também. Vou continuar vigiando o porto em busca de movimentos suspeitos."
901010400230-21 = "Certo. FOX2, mova-se para o ponto Charlie e continue a operação."
901010400230-22 = "FOX2, entendido."