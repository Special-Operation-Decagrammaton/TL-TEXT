[translation]
901010400230-7 = "Aqui FOX1. FOX2, informe o andamento."
901010400230-8 = "Aqui FOX2. O alvo está bem alerta, então estou priorizando construir uma relação de confiança."
901010400230-9 = "Tentei puxar o assunto do \"Caranguejo do Tambor\" de leve, mas ninguém sabia de nada."
901010400230-10 = "Existe a possibilidade de estarem fingindo inocência?"
901010400230-11 = "Pode ser que alguns estejam mentindo, mas... me parece que os trabalhadores do porto acham estranho colocar caranguejo em tambor."
901010400230-12 = "Se o objetivo fosse assustar o pessoal do porto, não usariam um método mais realista?"
901010400230-13 = "Concordo. Quem tem o mínimo de conhecimento não espalharia um boato idiota como \"Caranguejo do Tambor\"."
901010400230-15 = "Então, encerramos a investigação por hoje?"
901010400230-16 = "Hmm... ainda temos tempo, que tal a gente dar uma olhada na área comercial?"
901010400230-18 = "FOX3, sem objeções. O vento hoje está fresquinho, ainda aguento."
901010400230-19 = "FOX4 também topo. Vou continuar vigiando os arredores do porto pra ver se alguém suspeito aparece."
901010400230-21 = "Certo. FOX2, vá para o Ponto Charlie e continue a operação."
901010400230-22 = "FOX2, entendido."