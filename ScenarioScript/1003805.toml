[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1003805-1 = "SRT, Iniciando Proteção!" 
1003805-2 = "Parque dos Coelhinhos" 
1003805-3 = "Muitos dizem que coelhos geralmente amam cenouras,\nmas ouvi dizer que não é bom dar cenouras para coelhos muito novos." 
1003805-4 = "Como a Pyonko tem menos de 6 meses de vida,\nestou colhendo trevos por aqui para alimentá-la em vez de cenouras." 
1003805-5 = "……? Ah, sim. Eu a batizei de 'Pyonko'." 
1003805-6 = "Acho que é um nome adorável\ne que combina muito com ela." 
1003805-7 = "Pyonko, Pyonko……\nÉ realmente um ótimo nome." 
1003805-8 = "Ela é uma garota muito esperta. Assim que eu volto de uma missão,\nela me reconhece na hora e vem correndo me receber." 
1003805-9 = "Mas ultimamente tenho saído muito para missões\ne deixado a Pyonko sozinha... Fico um pouco preocupada." 
1003805-10 = "[s] \"Será que não seria melhor\nter arrumado mais um coelho?\"" 
1003805-11 = "Não. Existe o mito de que os coelhos enfraquecem de solidão,\nmas na verdade eles são criaturas muito territoriais e desconfiadas,\nentão não fazem amizade fácil com outros coelhos." 
1003805-12 = "Se houvesse mais um coelho,\ntalvez tivéssemos problemas com várias coisas." 
1003805-13 = "Exatamente como o Esquadrão RABBIT\nantes de conhecer você, Sensei……" 
1003805-14 = "……Não, não é nada." 
1003805-15 = "Na verdade, o maior problema atualmente...\nÉ que as membras do Esquadrão RABBIT estão de olho na Pyonko." 
1003805-16 = "Como nossa situação alimentar não é das melhores...\nÀs vezes, os olhares que elas lançam para a Pyonko\nsão um tanto... suspeitos..." 
1003805-17 = "Sensei, quando eu não estiver por perto,\nvocê poderia cuidar dela para mim?" 
1003805-19 = "（Depois disso, ajudei a Miyako a cuidar do coelho\npor um tempo e retornei à Schale.）" 