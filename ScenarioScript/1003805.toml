[translation]
1003805-1 = "SRT, protegendo!"
1003805-2 = "Parque dos Coelhinhos"
1003805-3 = "Dizem que coelhos geralmente gostam de cenouras, mas parece que não é bom dar cenouras para coelhos que ainda são pequenos."
1003805-4 = "Como Pyonko ainda não tem seis meses de vida, em vez de cenouras, estou colhendo trevos por aqui para ela comer."
1003805-5 = "……? Ah, sim. Decidi chamá-la de \"Pyonko\"."
1003805-6 = "Acho que é um nome adorável que combina com ela."
1003805-7 = "Pyonko, Pyonko... é um nome realmente muito bom."
1003805-8 = "Pyonko é uma coelhinha muito inteligente; assim que volto das missões, ela percebe e vem me receber."
1003805-9 = "Só que, ultimamente, por causa das missões, tenho deixado a Pyonko sozinha com frequência, e isso me preocupa um pouco."
1003805-10 = "[s] \"Será que seria melhor se tivesse outra?\""
1003805-11 = "Não. Existe um mito de que coelhos morrem de solidão, mas, na verdade, eles são criaturas extremamente tímidas, então parece que não é fácil para eles se darem bem com outros coelhos."
1003805-12 = "Se houvesse outro coelho, com certeza teríamos problemas com várias coisas."
1003805-13 = "Como o RABBIT Squad antes de conhecer o Sensei..."
1003805-14 = "……Não, não é nada."
1003805-15 = "Na verdade, o maior problema é que, ultimamente, as integrantes do RABBIT Squad estão de olho na Pyonko."
1003805-16 = "Talvez seja porque o RABBIT Squad não tem muita folga em relação à comida... o olhar das integrantes para a Pyonko às vezes é suspeito..."
1003805-17 = "Sensei, quando eu não estiver, você poderia cuidar dela para mim?"
1003805-19 = "(Depois disso, cuidei da coelhinha junto com Miyako e voltei para o Schale)"
