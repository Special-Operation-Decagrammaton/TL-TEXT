[translation]
10002090-1 = "Episódio 9; Quebra da Melancia (1)"
10002090-2 = "B-bem, vamos retomar o foco, o próximo é a \"Quebra da Melancia\"!"
10002090-3 = "Na verdade, eu acabei esquecendo a melancia... mas o dono da casa de praia vendeu várias para a gente por um preço muito barato!"
10002090-8 = "......Uma melancia comum? Não é algum tipo de código?"
10002090-9 = "Bem, é uma quebra de melancia comum..."
10002090-10 = "Entendo, se é assim, então não há problema. Afinal, eu conheço bem a quebra da melancia."
10002090-11 = "É um clássico das brincadeiras na praia, não é?"
10002090-12 = "A propósito, onde está o bastão?"
10002090-13 = "......?"
10002090-14 = "Falando em quebra da melancia, acho que precisaríamos de algo como um bastão ou uma espada de madeira."
10002090-15 = "Ah, agora que você mencionou, eu esqueci de trazer isso também..."
10002090-21 = "(Clang)"
10002090-23 = "BANG!!"
10002090-25 = "A melancia foi reduzida a pedaços!?"
10002090-26 = "Por que está surpresa? Eu quebrei a melancia corretamente, bem no centro."
10002090-27 = "Não é isso! Quer dizer, não está errado, mas está errado, Azusa-chan! Por favor, não atire!"
10002090-28 = "Além disso, a quebra da melancia deve ser feita com os olhos vendados. Azusa-chan, você sempre atirava na melancia de olhos vendados até agora?"
10002090-29 = "Entendo, então essa é a regra local. Vamos fazer assim, então."
10002090-39 = "A-a melancia...! Foi estraçalhada de novo..."
10002090-45 = "Como esperado, você é boa, Azusa-san."
10002090-46 = "Mas eu também sou uma atiradora."
10002090-51 = "BANG!!"
10002090-52 = "......Entendo."
10002090-53 = "Mesmo sendo um fuzil antimaterial, a mira é bem precisa."
10002090-54 = "Nesta distância, não chegaremos a lugar nenhum competindo assim. Precisamos de alguma restrição..."
10002090-55 = "Tudo bem. Aceitarei qualquer desafio, Azusa-san."
10002090-62 = "O espírito de competição entre as duas está pegando fogo...!?"
10002090-63 = "Será que isso vai dar certo? Será que podemos deixar assim mesmo, Sensei!?"
10002090-64 = "[s] \"Acho que está tudo bem, parece divertido.\""
10002090-65 = "E-ehhh..."
10002090-69 = "Voltei. Coloquei a melancia no ponto alvo corretamente..."
10002090-70 = "Tem uns 500 metros de distância, será que isso é mesmo seguro? Com a minha visão, só consigo ver um ponto minúsculo..."
10002090-71 = "Sem problema algum. Já tive sucesso incontáveis vezes nessa distância."
10002090-72 = "Eh...?"
10002090-73 = "Como atiradora, esse tipo de desvantagem não é nada."
10002090-74 = "Vendar os olhos de uma atiradora... acho que isso vai muito além de uma simples desvantagem..."
10002090-75 = "Como uma atiradora que busca a justiça,"
10002090-76 = "não posso esquecer o espírito de continuar desafiando a mim mesma."
10002090-77 = "Auu... eu não entendo mais nada do que vocês estão dizendo..."
10002090-78 = "B-bem,"
10002090-79 = "então, podemos começar...?"
10002090-80 = "......? A-ah, espere?"
10002090-81 = "[s] \"O que houve?\""
10002090-82 = "Bem... se eu não estou vendo errado,"
10002090-83 = "a melancia que deveria estar ali sumiu...? Como eu mal conseguia ver de qualquer jeito, talvez seja só impressão minha..."
10002090-84 = "Será que vocês já atiraram nela...? Não, não ouvi nenhum barulho..."
10002090-85 = "Bem, Mashiro-san, Azusa-chan, vocês conseguem ver?"
10002090-86 = "Ei, tem alguém vindo para cá...?"
10002090-87 = "Eh, será que é o pessoal da casa de praia...!?"
10002090-95 = "O que diabos vocês estão fazendo!?"
10002090-96 = "Não se brinca com comida, sabia!?"
10002090-97 = "Trate os ingredientes com cuidado!!"
10002090-99 = "Argumento lógico...! N-não, você realmente vai dizer isso!?"
10002090-100 = "……Diferença de valores, é?"
10002090-101 = "Se ficar no meu caminho, não terei piedade."
10002090-102 = "P-por que as coisas terminaram assim de novo..."
