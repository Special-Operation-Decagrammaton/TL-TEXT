[translation]
10002090-1 = "第9話;スイカ割り（１）"
10002090-2 = "き、気を取り直して、次は「スイカ割り」です！"
10002090-3 = "実は、スイカをうっかり忘れてしまったんですが……海の家の店主さんが、すごく安いお値段でたくさん売ってくださいました！"
10002090-8 = "……普通のスイカ？何かの暗号じゃなく？"
10002090-9 = "えっと、普通のスイカ割りです……。"
10002090-10 = "そうか、それならそれで問題ない。何せ、スイカ割りなら私も良く知ってる。"
10002090-11 = "海での遊びにおける定番ですね。"
10002090-12 = "ところで、棒はどちらに？"
10002090-13 = "……？"
10002090-14 = "スイカ割りといえば、バットや木刀のようなものが必要だと思うのですが。"
10002090-15 = "あ、そういえば、それも一緒に忘れてきてしまいました……。"
10002090-21 = "（ガシャンッ）"
10002090-23 = "ッパァァン！！"
10002090-25 = "スイカが粉々にっ！？"
10002090-26 = "何を驚いてるの？きちんとスイカは割った、それもど真ん中。"
10002090-27 = "違います！違わないですが違うんですアズサちゃん！撃たないでください！"
10002090-28 = "それに、スイカ割りは目隠しをしてするものですよ。今までアズサちゃんは、いつも目隠しをしたままスイカを撃ち抜いてたんですか？"
10002090-29 = "なるほど、そういうローカルルールか。ならそれで行こう。"
10002090-39 = "す、スイカが……！また粉々に飛び散って……。"
10002090-45 = "流石、やりますねアズサさん。"
10002090-46 = "ですが、私も[ruby=スナイパー]狙撃手[/ruby]の端くれ。"
10002090-51 = "ッパァァン！！"
10002090-52 = "……なるほど。"
10002090-53 = "アンチマテリアルライフルなのに、かなり精密な照準だ。"
10002090-54 = "この距離だと競い合っても埒が明かないな、何か制約を……。"
10002090-55 = "良いでしょう。どんな挑戦でも受けて立ちますよ、アズサさん。"
10002090-62 = "お互いに対抗心が燃え上がってます……！？"
10002090-63 = "大丈夫でしょうか？本当にこのままで大丈夫なんでしょうか、先生！？"
10002090-64 = "[s] \"良いんじゃないかな、楽しそうだし。\""
10002090-65 = "え、えぇぇ……。"
10002090-69 = "ただいま戻りました。スイカ、ちゃんと目標地点に置いてきました……。"
10002090-70 = "500メートルくらいありますけど、本当に大丈夫ですか？もう私の目だと、ただの点にしか見えませんが……。"
10002090-71 = "全く問題ない。これくらいの距離、数えきれないほど成功させてきた。"
10002090-72 = "えぇ……？"
10002090-73 = "狙撃手ですから、これくらいのハンデは何てことありません。"
10002090-74 = "狙撃手に目隠しって、普通はハンデどころの問題じゃない気がするのですが……。"
10002090-75 = "正義を追い求める[ruby=スナイパー]狙撃手[/ruby]として、"
10002090-76 = "常に挑戦し続ける気持ちを忘れるわけにはいきません。"
10002090-77 = "あうぅ……もう何を言っているのか私には全然……。"
10002090-78 = "え、えっと、"
10002090-79 = "ではとにかく始めましょうか……？"
10002090-80 = "……？あ、あれ？"
10002090-81 = "[s] \"どうしたの？\""
10002090-82 = "えっと……見間違いでなければ、"
10002090-83 = "あそこにおいたはずのスイカが無くなっているような……？元々ほとんど見えていなかったので、多分、ですが……。"
10002090-84 = "もしかしてもう撃ち抜いて……は、いないですよね。音もしてませんでしたし……。"
10002090-85 = "えっと、マシロさん、アズサちゃん、見えますか？"
10002090-86 = "あれ、誰かがこっちに……？"
10002090-87 = "え、もしかして海の家の……！？"
10002090-95 = "一体全体何をしてるのさ！？"
10002090-96 = "食べ物で遊んじゃダメでしょー！？"
10002090-97 = "食材は大切に扱って！！"
10002090-99 = "正論……！い、いえ、あなたがそれを言いますか！？"
10002090-100 = "……価値観の違い、か。"
10002090-101 = "立ち塞がるなら、容赦はしない。"
10002090-102 = "ど、どうしてまたこんな展開に……。"
