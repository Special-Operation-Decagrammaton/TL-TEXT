21130-79 = "Pra ser exata, 442 câmeras de#nvigilância e robôs de segurança#ndivididos em 3 tipos, num total de#n52."
21130-80 = "Sua cara é de \"como é que ela#nsabe de tudo isso\"…… mas é simples.#nQuem ajudou a montar o sistema de#nsegurança daquele lugar fomos nós, o#nDepartamento de Engenharia."
21130-83 = "Eca……"
