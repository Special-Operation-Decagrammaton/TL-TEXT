[translation]
21130-1 = "Episódio 13; Nerd VS Maid"
21130-2 = "Millennium - Sala de Operações"
21130-3 = "(BOOOOOMMMM!)"
21130-4 = "Ugh!?"
21130-5 = "A-Acabaram com a gente...!"
21130-6 = "M, magia de ressurreição... me..."
21130-8 = "(Baque)"
21130-10 = "......"
21130-11 = "Inacreditável..."
21130-12 = "Eu fiquei pensando em qual método elas usariam, mas invadir à força bem dessa maneira..."
21130-13 = "Então essa garota é a Aris-chan."
21130-14 = "Ela é tão fofa, dá até vontade de criá-la como a sexta agente maid. Posso levá-la comigo pra casa?"
21130-15 = "......Não pode não."
21130-16 = "No momento, ela é uma das criminosas que atacou o Conselho Estudantil... Por enquanto, vou trancá-la na Sala de Reflexão do Conselho Estudantil."
21130-17 = "Mas falando nisso... eu nunca imaginaria que, mesmo sendo para burlar o 'sistema de reconhecimento de impressão digital' do elevador, ela simplesmente destruiria a porta à força."
21130-18 = "Eu confirmei. Parece que será difícil consertar a trava de segurança do elevador imediatamente. A única solução é trocar tudo..."
21130-19 = "Entendo, então vamos trocar por uma nova... Não, espera."
21130-20 = "É só um palpite, mas aquela arma gigante e absurda da Aris-chan... sem dúvidas foi construída pelo Clube de Engenharia."
21130-21 = "Sempre que algo assim acontecia nós pedíamos para o Clube de Engenharia, mas..."
21130-22 = "......Não podemos descartar a possibilidade de haver uma armadilha nisso."
21130-23 = "......Compre o sistema de segurança que parecer mais forte e troque imediatamente. Porém, que não seja um fabricado pelo Clube de Engenharia."
21130-25 = "Millennium - Corredor"
21130-26 = "Uugh! Levaram a Aris!"
21130-27 = "Acalme-se, Momoi. Tá tudo correndo de acordo com o plano."
21130-28 = "Aris-chan... Espere um pouco, nós já vamos te resgatar."
21130-31 = "Por enquanto... Parece que a primeira armadilha funcionou perfeitamente."
21130-32 = "Não é, Sensei?"
21130-33 = "[s1] \"Sim, é verdade.\"\n[s2] \"O próximo passo é perguntar pro Clube de Engenharia se eles já terminaram os preparativos.\""
21130-34 = "Acabaram de mandar mensagem. 'Aqui é o Clube de Engenharia, conseguimos infiltrar o Cavalo de Troia com sucesso'... e foi o que disseram."
21130-35 = "Acabaram de mandar mensagem. 'Aqui é o Clube de Engenharia, conseguimos infiltrar o Cavalo de Troia com sucesso'... e foi o que disseram."
21130-36 = "Ufa, que alívio. Se a gente tivesse falhado nisso, a Aris só teria sido trancafiada à toa... seria isso que teria acontecido."
21130-37 = "Então, vamos passar para a próxima etapa."
21130-39 = "......Muito bem, vamos começar."
21130-40 = "Haa, eu tô nervosa..."
21130-41 = "Não me sinto assim desde quando invadimos o prédio da Sociedade de Pesquisa de História Antiga."
21130-42 = "Como estão a Hibiki e a Utaha-senpai?"
21130-44 = "Elas disseram que já estão prontas para receber os 'convidados'."
21130-45 = "Legal, como esperado."
21130-46 = "Mas o que a gente tá fazendo não é nada legal..."
21130-47 = "E como estão a Maki e a Kotori?"
21130-48 = "Tudo pronto por aqui também, estamos em posição de espera~."
21130-49 = "Deixem conosco! Pela minha teoria, a taxa de sucesso deste plano é de 2%!"
21130-50 = "Eeeh, isso é quase certeza de que vai dar errado! Por que você tá tão confiante!?"
21130-51 = "Ehehe, é uma piada pra descontrair! É o contrário, as chances de sucesso são de 98%!"
21130-52 = "Já que os preparativos da Kotori-chan e da Maki-chan também terminaram..."
21130-53 = "A Fase 2 começa agora."
21130-54 = "Sendo assim... Sensei!"
21130-55 = "[s] \"Iniciando a operação!\""
21130-57 = "Sim!"
21130-58 = "Vamos lá!!"
21130-60 = "Millennium - Sala de Operações"
21130-62 = "(Beep beep beep, beep beep beep)"
21130-63 = "......Eles chegaram."
21130-64 = "Detectamos os alvos nas câmeras de segurança. Alvos confirmados no Portão 1, Ponto A1."
21130-65 = "Elas entrarão no Ponto A2 em breve."
21130-66 = "Se entrarem ali, podemos considerar que a fuga é quase impossível, não é mesmo? ......Então, eu mesma irei até lá."
21130-67 = "Nossa, parece que você tá as estimando bem alto. Há mesmo necessidade da Akane ir pessoalmente?"
21130-68 = "Claro que sim."
21130-71 = "Afinal, recepcionar os convidados é o básico de uma maid."
21130-73 = "Millennium - Veritas"
21130-74 = "(Voltando no tempo, 2 horas atrás. Durante a reunião de planejamento...)"
21130-75 = "Então, vou explicar sobre o Depósito de Itens Confiscados do Conselho Estudantil, onde dizem que o nosso alvo, o 'Espelho', está guardado."
21130-76 = "O Conselho Estudantil da Millennium, a 'Seminar', usa basicamente o andar mais alto da Millennium Tower como seu espaço exclusivo."
21130-77 = "O Depósito de Itens Confiscados onde o 'Espelho' está fica no lado oeste desse andar superior."
21130-78 = "Pelo que pesquisei, para chegar da entrada até o Depósito de Itens Confiscados, nós precisamos passar por cerca de 400 câmeras de segurança, quase 50 robôs de patrulha e mais dezenas de robôs de combate confiscados de corporações corruptas."
21130-79 = "Para ser exata, são 442 câmeras de segurança e 52 robôs de patrulha classificados em 3 tipos."
21130-80 = "Vocês parecem estar com a expressão de 'Como você sabe de tantos detalhes'... Mas a resposta é simples. Foi o Clube de Engenharia quem colaborou na construção do sistema de segurança de lá."
21130-83 = "Ueeh..."
21130-84 = "O maior problema é que, para chegar ao depósito, é obrigatório usar o 'elevador'. E esse elevador possui um sistema de reconhecimento de impressão digital que só os membros da diretoria do Conselho Estudantil e pessoas limitadas podem passar."
21130-85 = "Mesmo se, por um milagre, a gente conseguisse passar pelo elevador, com certeza haveria alunas da Seminar e guardas armados, e acima de tudo..."
21130-86 = "O andar mais alto é dividido em seções para cada sala."
21130-87 = "Seções... Não é óbvio que as salas sejam separadas?"
21130-88 = "As seções são conectadas ao sistema de segurança. Por isso, se ocorrer um incêndio ou surgir fumaça em alguma sala, eles podem baixar persianas metálicas para isolar a sala das outras."
21130-89 = "E se a persiana baixar, ela também só pode ser destravada com a impressão digital dos membros do Conselho Estudantil."
21130-90 = "Se reagir a uma impressão digital não registrada ou a um impacto muito forte, uma segunda persiana feita de titânio, que é muito mais forte, irá baixar. E se isso acontecer, aí sim será necessário tanto a impressão digital quanto a íris de um membro da diretoria para destravá-la."
21130-91 = "Uugh, que complicado... E isso é tão impressionante que nem consigo imaginar isso direito..."
21130-92 = "Resumindo, a única forma de chegar ao Depósito de Itens Confiscados é pelo elevador."
21130-93 = "Depois, tem o sistema de segurança por impressão digital, e se a gente errar, as persianas vão descer e vai ficar muito difícil se mover para outras seções."
21130-94 = "Se tentarmos passar à força por isso, uma persiana ainda mais forte vai baixar e a gente vai ficar presa lá dentro..."
21130-95 = "E não se esqueçam dos robôs de patrulha e das câmeras de segurança~."
21130-96 = "As câmeras de segurança a gente até consegue hackear, mas... O sistema de segurança em si, acho que seria difícil enfrentar de frente, mesmo com a força da Veritas. Afinal de contas, ele é desconectado de redes externas por padrão."
21130-97 = "Ah, chegou mais uma informação nova. Parece que se alguém tentar invadir o elevador à força, as persianas de todas as seções do andar superior irão baixar."
21130-99 = "Ah, para com isso, só tem histórias complicadas e sem esperança! Não tem nenhuma notícia boa!?"
21130-100 = "......Ponto fraco, nós temos."
21130-101 = "Primeiro, ele é vulnerável ao método de cortar a energia externa. Como ele se conecta naturalmente à rede externa quando a energia é cortada, nós teremos uma brecha temporária para hackear."
21130-102 = "Com o mini EMP que nós criamos, podemos mirar nessa brecha para neutralizar qualquer sistema. O tempo em que ele ficará neutralizado... provavelmente será de cerca de 6 segundos."
21130-103 = "6 segundos, hein..."
21130-106 = "É tempo o suficiente."
21130-108 = "Millennium - Corredor"
21130-109 = "(E o tempo retorna, novamente, para o presente)"
21130-110 = "Ehm, é por aqui, não é?"
21130-111 = "Sinto que nós viemos bem fundo... Mas acho que não estamos erradas."
21130-113 = "Sim, vocês estão certas."
21130-114 = "!?"
21130-115 = "Boa noite, é uma bela noite, não acha? Tive o prazer de observar todas as suas ações até aqui através das câmeras de segurança."
21130-116 = "Vocês já devem estar percebendo, mas o plano de vocês já falhou. Recomendo que se rendam o quanto antes."
21130-117 = "Novamente, eu sou do C&C, Call Sign Zero Três... Como o meu nome verdadeiro é um segredo, podem me chamar de bela maid misteriosa, se preferirem."
21130-118 = "A-Akane-senpai!"
21130-119 = "Aquela Akane-senpai, famosa por ter 'Assassinato' como especialidade!?"
21130-120 = "Hmmm... Eu deveria ser uma agente secreta, mas quando foi que eu fiquei conhecida por isso... Será que as heroínas que não revelam sua identidade já estão fora de moda...?"
21130-121 = "Eu sei de um monte de coisas~. E a Kotama-senpai me disse que recentemente o seu peso..."
21130-122 = "E-Espera um pouco! Vazar esse tipo de informação com certeza é um problema, não acha!?"
21130-123 = "Vou pedir para você ficar calada sobre essa informação para sempre...! Então, que tal vocês mostrarem as suas caras agora, Momoi-chan e Midori-chan!"
21130-125 = "......"
21130-126 = "......"
21130-127 = "Fufufu..."
21130-131 = "Acho que você ainda não percebeu. Quem falhou aqui, foi o seu plano."
21130-132 = "Como disse?"
21130-137 = "(Swoosh)"
21130-138 = "O~lá, Akane-senpai! Estávamos tentando voltar pro dormitório, mas nos perdemos~."
21130-140 = "V-Vocês são!?"
21130-141 = "Se nos perguntam quem somos nós! É cortesia do mundo explicar!"
21130-142 = "Fornecendo respostas para qualquer pergunta! A personificação das explicações do Clube de Engenharia, Toyomi Kotori!"
21130-143 = "A combinação de arte e ciência! A artista digital da Veritas, Maki!"
21130-144 = "Isso é impossível, quem tinha vindo para cá era a Midori-chan e a Momoi-chan, não é!? Eu vi muito bem, através das câmeras de segurança...!"
21130-146 = "Yuuka! O que está acontecendo!?"
21130-147 = "Eu não sei! Nas minhas câmeras de segurança aqui, a Momoi e a Midori continuam aparecendo! E você não está aparecendo nelas, Akane...!"
21130-148 = "C-Como assim? Isso quer dizer, não me diga que...!?"
21130-149 = "Redefinam as configurações das câmeras! Cortem a conexão com a nuvem e mostrem a imagem de novo através de uma linha privada!"
21130-150 = "Atualizando! Nova imagem... apareceu! Akane confirmada! Ela está frente a frente com a Kotori e a Maki!"
21130-151 = "Entendo, isso quer dizer que..."
21130-152 = "As imagens que a gente estava assistindo até agora eram, não pode ser!?"
21130-154 = "Millennium - Corredor"
21130-155 = "Acho que já deve estar na hora delas descobrirem que era um vídeo gravado."
21130-156 = "Eu sei que agora já passou, mas não seria melhor se a gente tivesse colocado um vídeo da situação pacífica tocando e ido pegar o 'Espelho' escondido?"
21130-157 = "Aquele era um lugar onde muitas pessoas passavam, se não tivesse ninguém elas poderiam achar estranho, não é?"
21130-158 = "Além disso, dividir e trancar as senpais da C&C desse jeito vai aumentar as nossas chances de sucesso no final das contas."
21130-164 = "Ah, o elevador chegou! Sendo assim, acho que 'de verdade' vamos nós!"
21130-165 = "Espere um momento... Sensei, aqui em volta também está escuro, então segure firme nas nossas mãos, tá?"
21130-166 = "Sendo assim... Vamos lá!"
21130-167 = "Go!"
21130-169 = "(Wuuuuuuuu-----)"
21130-171 = "Millennium - Corredor"
21130-172 = "Invasores detectados. Fechando as seções do andar exclusivo da Seminar por motivo de emergência."
21130-173 = "Isso é... as persianas!?"
21130-174 = "(Gashan!)"
21130-175 = "Haa, fala sério..."
21130-176 = "Hehe, ficamos todos presos juntos aqui~"
21130-177 = "......Isso não é verdade. Diferente de vocês, as minhas impressões digitais estão registradas no sistema."
21130-178 = "Se não quiserem se machucar, fiquem quietinhas, por favor. Foi uma honra conhecê-las, mas eu vou indo..."
21130-179 = "Inconsistência de dados. Impressão digital não registrada."
21130-180 = "Eh...!?"
21130-181 = "Segunda persiana, ativada."
21130-182 = "I-Isso não pode ser!?"
21130-184 = "(Gogogo... gashan!)"
21130-186 = "Millennium - Sala de Operações"
21130-187 = "A Akane foi trancafiada!"
21130-188 = "Alguém da diretoria... A Noa deve estar por perto, peçam para ela abrir!"
21130-191 = "O que diabos elas estão planejando...? Desse jeito, a Momoi e a Midori 'verdadeiras' também ficarão presas em algum lugar――"
21130-192 = "Uh, não me diga que...!?"
21130-193 = "Contato da Noa! Ela diz que também estão presas!"
21130-194 = "As persianas não se abrem nem com a impressão digital da Noa, elas estão pedindo ajuda!"
21130-195 = "C-C-Como é que é!?"
21130-196 = "Uma falha bem agora!? Sendo que a gente acabou de trocar por um novo, e também transferimos os dados de impressão digital direitinho... Não, não pode ser!?"
21130-197 = "Já estava hackeado!? Isso quer dizer que era o que elas queriam desde o começo, e foi por isso que fizeram a Aris-chan quebrar as portas...!?"
21130-199 = "Millennium - Interior do Prédio Escolar"
21130-200 = "Sensei, mana, a Hare-senpai mandou mensagem! Ela disse que conseguiu trancar a Akane-senpai com sucesso!"
21130-201 = "Beleza, o sistema de reconhecimento de impressões digitais também funcionou *normalmente*."
21130-202 = "A gente também conseguiu isolar todas as diretoras do conselho... E agora as únicas que podem circular livremente pela torre somos nós!"
21130-203 = "O novíssimo sistema de segurança que parece levemente inferior ao original do Clube de Engenharia... Pelo visto, deu muito certo."
21130-204 = "A gente omitiu os nomes, então acho que elas nem suspeitaram que ele tivesse sido construído pelo Clube de Engenharia também. Ter arranjado até os mínimos detalhes para que isso acontecesse... o Clube de Engenharia é realmente incrível. Bom, agora vamos agir livremente, então."
21130-205 = "Bip―― Saiba Momoi, Saiba Midori, Sensei. As 3 credenciais foram aprovadas."
21130-206 = "Tô com a sensação de estar num dejavu...?"
21130-207 = "Ah, não é daquela vez nas Ruínas? Nossa que saudade, sinto até que isso já faz um tempão."
21130-208 = "Enfim, ainda bem que a gente conseguiu neutralizar a Akane-senpai. Pra garantir eu queria muito trancar a Asuna-senpai junto com ela, mas... a gente ainda não sabe o paradeiro dela, né?"
21130-209 = "A Hare-senpai revistou a Millennium inteira o máximo que pôde... e parece que não achou ela. Ela não estaria fora da Millennium?"
21130-210 = "Ela é uma senpai meio fantasma mesmo, então não ia ser fácil de achá-la. E parece que ela é do tipo de pessoa que sai do nada pra ir comer parfait no meio de uma missão... Bom, como o plano tá correndo exatamente como a gente queria, não precisa se estressar com isso!"
21130-211 = "Quem tá aí!?"
21130-212 = "Hyaah! E-É o Conselho Estudantil! Poxa, ainda tinha gente aí!"
21130-213 = "O-O que a gente faz, Sensei!?"
21130-214 = "[s3] \"Vamos forçar a passagem.\"\n[s4] \"......Vamos fugir?\""
21130-215 = "......É, parece que a gente não tem outra escolha."
21130-216 = "......Sim, tem razão. Não podemos fugir depois de ter chegado tão longe."
21130-217 = "......Não, eu não vou fugir agora! Vou dar um jeito de forçar a passagem!"
21130-218 = "Nós não podemos desistir agora!"
21130-219 = "Pela Aris-chan!"
21130-221 = "......"
21130-222 = "[s] \"......Beleza, vamos lá!\""