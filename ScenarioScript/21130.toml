21130-89 = "E, se a comporta descer, ela#ntambém só pode ser destravada com a#ndigital de um membro do Conselho."
21130-90 = "Se reagir a uma digital não#ncadastrada ou a um impacto forte, aí#ndesce uma segunda comporta, ainda#nmais reforçada, de titânio. Nesse#ncaso, passa a ser necessária dupla#nautenticação: digital e íris de um#nmembro do Conselho."
21130-91 = "Aaah, que complicado…… e, sei#nlá, é tudo tão absurdo que nem cai a#nficha direito……"
21130-92 = "Organizando: primeiro, o único#njeito de chegar ao depósito de#n apreensões é o elevador."
21130-93 = "Depois, tem um sistema de#nsegurança por digital; e, se a gente#nerrar nele, desce uma comporta e#nfica difícil passar pra outra seção."
