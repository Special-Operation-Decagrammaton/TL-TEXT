[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21130-1 = "Episódio 13: Nerds VS Maids."
21130-2 = "Millennium · Sala de Operações"
21130-3 = "(KABÃÃÃM!)"
21130-4 = "Kh!?"
21130-5 = "F-fomos derrotadas……!"
21130-6 = "O f-feitiço de ressurreição…… o……"
21130-8 = "(Baque)"
21130-10 = "……"
21130-11 = "Inacreditável……"
21130-12 = "Eu me perguntava por que método elas viriam,\ne, logo elas, vêm de arrombamento na marra."
21130-13 = "Então esta é a tal Aris."
21130-14 = "Ela é tão fofinha~, dá até vontade de criar ela\ncomo a sexta agente-maid. Posso levar pra casa?"
21130-15 = "……Isso não pode."
21130-16 = "Agora ela é uma das responsáveis pela invasão\nao Conselho…… por ora, vou trancá-la na sala\nde reflexão do Conselho mesmo."
21130-17 = "Mas, ainda assim…… só pra furar o \"sistema de\nleitura de digital\" do elevador, arrombar a porta\nna marra a tiro……"
21130-18 = "Confirmado. Consertar a trava de segurança do\nelevador rápido parece difícil. Como solução,\nsó trocando tudo por inteiro……"
21130-19 = "Tá, então troca por uma nova…… não, peraí."
21130-20 = "É só um palpite, mas aquela arma absurdamente\ngigante da Aris…… não tem como não ser coisa\nfeita pelo Clube de Engenharia."
21130-21 = "Nessas horas, a gente sempre pedia\npro Clube de Engenharia, mas……"
21130-22 = "……não dá pra descartar a possibilidade\nde ter uma armadilha aí."
21130-23 = "……Compra a segurança que parecer mais forte\ne troca às pressas. Só que tem que ser uma\nque não seja fabricada pelo Clube de Engenharia."
21130-25 = "Millennium · Corredor"
21130-26 = "Uuh! Levaram a Aris embora!"
21130-27 = "Calma, Momoi, está tudo dentro do plano."
21130-28 = "Aris…… espera só, a gente já já te salva."
21130-31 = "Por enquanto…… a primeira armadilha\nparece ter dado certo, né."
21130-32 = "Não é, Sensei?"
21130-33 = "[s1] \"Sim, é isso aí.\"\n[s2] \"Agora pergunta pro pessoal do Clube de Engenharia se já terminaram a preparação.\""
21130-34 = "Olha, chegou contato bem na hora: \"aqui é o Clube\nde Engenharia, conseguimos infiltrar o Cavalo de\nTroia\"…… é isso."
21130-35 = "Olha, chegou contato bem na hora: \"aqui é o Clube\nde Engenharia, conseguimos infiltrar o Cavalo de\nTroia\"…… é isso."
21130-36 = "Ufa, isso é um alívio. Se tivesse falhado, a Aris\nteria sido presa à toa, sem motivo nenhum……\né o que teria acontecido."
21130-37 = "Bem, então bora pra próxima etapa."
21130-39 = "……Bom, vamos começar."
21130-40 = "Aah, que tensão……"
21130-41 = "Um friozinho desses, só senti quando a gente\ninvadiu o prédio do Clube de Pesquisa\nde História Antiga."
21130-42 = "Cadê a Hibiki e a Utaha?"
21130-44 = "Disseram que já estão prontas\npra receber as \"visitas\"."
21130-45 = "Boa, era de esperar."
21130-46 = "Embora o que a gente esteja fazendo\nnão seja nada bonito, né……"
21130-47 = "E a Maki com a Kotori?"
21130-48 = "Aqui também tá tudo OK, de prontidão~."
21130-49 = "Pode deixar comigo! Pelos meus cálculos, a chance\ndeste plano dar certo é de 2%!"
21130-50 = "Heein, então é fracasso quase garantido!\nPor que essa confiança toda!?"
21130-51 = "Ehehe, é só uma piadinha pra descontrair!\nÉ o contrário, 98% de chance de sucesso!"
21130-52 = "Se a preparação da Kotori e da Maki\ntambém terminou……"
21130-53 = "então é a 2ª fase, né."
21130-54 = "Então…… Sensei!"
21130-55 = "[s] \"Operação, iniciar!\""
21130-57 = "Sim!"
21130-58 = "Lá vamos nós!!"
21130-60 = "Millennium · Sala de Operações"
21130-62 = "(Bip-bip-bip, bip-bip-bip)"
21130-63 = "……Chegaram."
21130-64 = "Alvos detectados nas câmeras de vigilância.\nAlvos confirmados no Portão 1, ponto A1."
21130-65 = "Em breve entrarão no ponto A2."
21130-66 = "Uma vez lá dentro, a fuga já é praticamente\nimpossível, certo?…… Então, eu vou."
21130-67 = "Ora, parece que você as valoriza bastante.\nPrecisa mesmo a Akane ir pessoalmente?"
21130-68 = "Mas é claro."
21130-71 = "Receber bem as visitas é o básico\npara uma maid, afinal."
21130-73 = "Millennium · Veritas"
21130-74 = "(Voltando no tempo, 2 horas antes.\nEm plena reunião de planejamento……)"
21130-75 = "Então, deixa eu explicar sobre o depósito de bens\napreendidos do Conselho, onde supostamente está\no nosso alvo, o \"Espelho\"."
21130-76 = "O Conselho da Millennium, a \"Seminar\", usa\nbasicamente o último andar da Torre Millennium\ncomo espaço exclusivo."
21130-77 = "O depósito de apreensões, onde fica o \"Espelho\",\nestá na ala oeste desse último andar."
21130-78 = "Pelo que apurei, pra chegar da entrada até o\ndepósito, é preciso furar cerca de 400 câmeras de\nvigilância, quase 50 robôs de segurança e mais\nalgumas dezenas de robôs de combate confiscados\nde firmas escravistas."
21130-79 = "Pra ser exata, 442 câmeras de vigilância e robôs de\nsegurança divididos em 3 tipos, num total de 52."
21130-80 = "Sua cara é de \"como é que ela sabe de tudo isso\"……\nmas é simples. Quem ajudou a montar o sistema de\nsegurança daquele lugar fomos nós, o Clube de Engenharia."
21130-83 = "Eca……"
21130-84 = "O maior problema é que, pra chegar ao depósito, é\nobrigatório usar o \"elevador\". E esse elevador tem\num sistema de autenticação por digital, que só os\nmembros do Conselho e umas poucas pessoas podem passar."
21130-85 = "E mesmo que, por hipótese, a gente furasse o\nelevador, é claro que ainda teria as alunas da\nSeminar e os seguranças armados, e, acima de tudo……"
21130-86 = "o último andar é dividido em seções, sala por sala."
21130-87 = "Seções…… as salas serem separadas\nnão é o óbvio?"
21130-88 = "As seções estão integradas ao sistema de segurança.\nEntão, se em alguma sala começar um incêndio ou\nsurgir fumaça, dá pra baixar uma comporta\ne isolá-la das outras salas."
21130-89 = "E, se a comporta descer, ela também só pode ser\ndestravada com a digital de um membro do Conselho."
21130-90 = "Se reagir a uma digital não cadastrada ou a um\nimpacto forte, aí desce uma segunda comporta, ainda\nmais reforçada, de titânio. Nesse caso, passa a ser\nnecessária dupla autenticação: digital e íris\nde um membro do Conselho."
21130-91 = "Aaah, que complicado…… e, sei lá, é tudo tão\nabsurdo que nem cai a ficha direito……"
21130-92 = "Organizando: primeiro, o único jeito de chegar\nao depósito de apreensões é o elevador."
21130-93 = "Depois, tem um sistema de segurança por digital;\ne, se a gente errar nele, desce uma comporta\ne fica difícil passar pra outra seção."
21130-94 = "E, se a gente tentar passar na marra, desce uma\ncomporta ainda mais forte e a gente fica presa……"
21130-95 = "Sem esquecer dos robôs de segurança\ne das câmeras, viu~."
21130-96 = "As câmeras até parece que dá pra hackear, mas……\no sistema de segurança em si, nem com a força da\nVeritas é fácil furar de frente. Afinal, ele fica\nbasicamente isolado de qualquer rede externa."
21130-97 = "Ah, chegou mais uma informação nova. Se a gente\ntentar invadir o elevador na marra, descem as\ncomportas de todas as seções do último andar."
21130-99 = "Aaah, é só coisa difícil e história desesperadora!\nNão tem nenhuma notícia boa!?"
21130-100 = "……Ponto fraco, tem."
21130-101 = "Primeiro, é vulnerável ao método de cortar a energia\nexterna. Sem energia, ele se conecta naturalmente à\nrede externa, e aí se abre, por um instante, uma\nbrecha pra hackear."
21130-102 = "Com o EMP ultracompacto que a gente fez, dá pra\nmirar nessa brecha e desativar todos os sistemas.\nProvavelmente, o tempo de desativação é de……\nuns 6 segundos."
21130-103 = "6 segundos, né……"
21130-106 = "É o suficiente."
21130-108 = "Millennium · Corredor"
21130-109 = "(E o tempo, então, volta de novo ao presente)"
21130-110 = "Deixa ver, é por aqui mesmo, né?"
21130-111 = "A gente avançou bem pro fundo, mas……\nprovavelmente não estamos erradas."
21130-113 = "Sim, está correto."
21130-114 = "!?"
21130-115 = "Boa noite, que noite agradável. Tudo o que vocês\nduas fizeram até aqui, eu acompanhei pelas\ncâmeras de vigilância."
21130-116 = "Talvez vocês já tenham percebido vagamente, mas o\nplano de vocês já fracassou. Recomendo que\nse rendam o quanto antes."
21130-117 = "Reapresentando-me: sou a do C&C, codinome\nZero-Três…… meu nome verdadeiro é segredo, então\npodem me chamar de a misteriosa e bela maid."
21130-118 = "A-a Akane!"
21130-119 = "Aquela Akane famosa por ter o \"assassinato\"\ncomo especialidade?"
21130-120 = "Hmm…… eu deveria, em tese, ser uma agente secreta,\nmas, desde quando fiquei tão conhecida assim……\nSerá que heroína do tipo \"não revela a identidade\"\njá saiu de moda……?"
21130-121 = "Eu sei de um monte de coisa~. Segundo a Kotama,\nparece que ultimamente o seu peso……"
21130-122 = "E-espera! Esse vazamento de informação é um\nproblema sério, né!?"
21130-123 = "Essa informação aí, você vai guardar em silêncio\npra sempre……! Bom, então que tal aparecerem\nde uma vez, Momoi, Midori!"
21130-125 = "……"
21130-126 = "……"
21130-127 = "Fufufu……"
21130-131 = "Pelo visto você ainda não percebeu. Quem\nfracassou foi o plano de VOCÊS, viu?"
21130-132 = "Como é?"
21130-137 = "(Surge)"
21130-138 = "Oiii, Akane! A gente tava tentando voltar pro\ndormitório, mas se perdeu no caminho~."
21130-140 = "V-vocês são!?"
21130-141 = "Se me perguntam \"vocês são\"! Responder\né a caridade do mundo!"
21130-142 = "A qualquer pergunta, a resposta a postos!\nA encarnação das explicações do Clube de\nEngenharia, Toyomi Kotori!"
21130-143 = "A combinação de arte e ciência!\nA artista digital da Veritas, Maki!"
21130-144 = "Não pode ser, quem veio até aqui eram a Midori\ne a Momoi!? Nas câmeras, com certeza……!"
21130-146 = "Yuuka! O que está acontecendo!?"
21130-147 = "Não sei! Nas minhas câmeras, ainda agora aparecem,\ncom certeza, a Momoi e a Midori! E você, Akane,\neu não consigo ver……!"
21130-148 = "C-como assim? Isso, será que é……!?"
21130-149 = "Reinicia a configuração das câmeras! Corta a\nconexão com a nuvem e projeta a imagem de novo\npor uma linha privada!"
21130-150 = "Atualizando! Imagem nova…… apareceu! Akane\nconfirmada! Em confronto com a Kotori e a Maki!"
21130-151 = "Entendi, quer dizer que……"
21130-152 = "a imagem que a gente estava vendo até agora,\nnão me diga!?"
21130-154 = "Millennium · Corredor"
21130-155 = "Acho que já é por volta da hora em que\ndescobriram que era gravação."
21130-156 = "Já é tarde pra falar isso, mas não teria sido melhor\ndeixar passando uma imagem de tudo em paz\ne ir pegar o \"Espelho\" escondido?"
21130-157 = "Era um lugar de muito vai e vem de gente; talvez\nnão ter ninguém causasse mais estranheza, sabe?"
21130-158 = "Além disso, dividir e prender as veteranas do C&C\nassim aumenta, no fim, a chance de sucesso da missão."
21130-164 = "Ah, o elevador chegou! Então bora entrar\n\"de verdade\" agora!"
21130-165 = "Peraí um pouco…… Sensei, está escuro à nossa\nvolta, então segura bem firme na nossa mão, tá?"
21130-166 = "Então…… vamos lá!"
21130-167 = "Go!"
21130-169 = "(Vuuuuuum——)"
21130-171 = "Millennium · Corredor"
21130-172 = "Invasor detectado. Por emergência, fechando todas\nas seções do andar exclusivo da Seminar."
21130-173 = "Isto é…… as comportas!?"
21130-174 = "(Tchác!)"
21130-175 = "Aff, francamente……"
21130-176 = "Hehe, ficamos presas juntinhas, né~?"
21130-177 = "……Isso não vai acontecer. Diferente de vocês, eu\ntenho a digital cadastrada no sistema."
21130-178 = "Se não querem se machucar, fiquem quietinhas, tá?\nFoi uma honra conhecê-las, mas eu já vou indo……"
21130-179 = "Dados não correspondem. Digital não cadastrada."
21130-180 = "Hã……!?"
21130-181 = "Segunda comporta, ativando."
21130-182 = "I-impossível!?"
21130-184 = "(Grgrgr…… Tchác!)"
21130-186 = "Millennium · Sala de Operações"
21130-187 = "A Akane ficou presa!"
21130-188 = "Alguém, um membro do Conselho…… a Noa deve estar\nperto, manda ela abrir!"
21130-191 = "Que ideia é essa……? Nesta situação, as Momoi\ne Midori \"de verdade\" também estão presas\nem algum lugar——"
21130-192 = "Kh, não me diga……!?"
21130-193 = "Contato da Noa! Parece que elas também\nestão presas!"
21130-194 = "Diz que nem com a digital da Noa as comportas\nabrem, e está pedindo ajuda!"
21130-195 = "C-c-como é que é!?"
21130-196 = "Defeito bem nessa hora!? Sendo que acabou de ser\ntrocada, e a gente migrou os dados de digital\ndireitinho…… não, não me diga!?"
21130-197 = "Já estava hackeada!? Quer dizer que, desde o início,\nera isso que elas miravam, mandando a Aris\narrombar a porta logo de cara……!?"
21130-199 = "Millennium · Interior do Prédio"
21130-200 = "Sensei, mana, contato da Hare! Diz que\nconseguiram prender a Akane!"
21130-201 = "Boa, o sistema de autenticação por digital\ntambém funcionou \"normalmente\", né."
21130-202 = "Todos os membros do Conselho também devem estar\nisolados…… então, agora, as únicas que podem se\nmover livres pela Torre somos nós!"
21130-203 = "A tal segurança de última geração, que parecia só\num tiquinho mais fraca que a fabricada pelo Clube\nde Engenharia…… parece que deu certo."
21130-204 = "A gente escondeu o nome, então provavelmente nem\npassou pela cabeça deles que aquilo também era do\nClube de Engenharia. Esse joguinho de cintura\ntambém é a cara do Clube de Engenharia. Bom,\nentão bora entrar de cabeça erguida."
21130-205 = "Bip-bip—— Saiba Momoi, Saiba Midori, Sensei:\naprovação dos 3 concluída."
21130-206 = "Sei lá, deu uma sensação de déjà-vu, né……?"
21130-207 = "Ah, aquilo das Ruínas, né? Que saudade, parece\numa coisa de um tempão atrás já."
21130-208 = "Por ora, foi bom ter neutralizado a Akane. Se desse,\neu queria ter prendido a Asuna junto também, mas……\nainda não dá pra saber onde ela está, né?"
21130-209 = "A Hare vasculhou a Millennium inteira o máximo que\ndeu…… mas parece que não achou. Será que ela\nestá fora da Millennium?"
21130-210 = "Ela é uma veterana que aparece e some do nada,\nentão não dá pra achar fácil, né. É o tipo de pessoa\nque, no meio da missão, do nada vai comer um\nparfait…… bom, por enquanto tá tudo dentro do\nplano, então relaxa, relaxa!"
21130-211 = "Quem é!?"
21130-212 = "Hyá! Ué, é o Conselho! Quem diria que ainda tinha gente!"
21130-213 = "E-e agora, Sensei!?"
21130-214 = "[s3] \"Vamos romper a linha.\"\n[s4] \"……Bora fugir?\""
21130-215 = "……Sim, parece que só rompendo mesmo."
21130-216 = "……Sim, é isso mesmo. Depois de chegar até aqui,\nnão dá pra fugir."
21130-217 = "……Não, fugir agora está fora de questão!\nEu vou dar um jeito de romper!"
21130-218 = "Porque a gente, agora, não pode recuar!"
21130-219 = "Pela Aris também!"
21130-221 = "……"
21130-222 = "[s] \"……Boa, bora!\""