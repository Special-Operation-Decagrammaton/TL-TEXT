[translation]
21130-1 = "Episódio 13; Nerd VS Maid"
21130-2 = "Sala de Operações do Millennium"
21130-3 = "(BOOOOM!)"
21130-4 = "Argh!?"
21130-5 = "Eu, eu fui derrotada...!"
21130-6 = "O, o feitiço de ressurreição... ele..."
21130-8 = "(Ploft)"
21130-10 = "……."
21130-11 = "Inacreditável..."
21130-12 = "Eu imaginei que eles viriam de alguma forma, mas recorrer a uma invasão forçada..."
21130-13 = "Então essa é a Alice-chan."
21130-14 = "Ela é tão fofa, dá vontade de criá-la como a sexta agente maid. Posso levá-la comigo?"
21130-15 = "...Isso não pode."
21130-16 = "Ela é uma das culpadas que atacaram o conselho estudantil agora... Por enquanto, vamos trancá-la na sala de detenção do conselho."
21130-17 = "Ainda assim... pensar que eles explodiram a porta só para contornar o sistema de reconhecimento de impressão digital do elevador."
21130-18 = "Confirmei. Parece difícil consertar a trava de segurança do elevador rapidamente. A única solução é substituir tudo..."
21130-19 = "Entendo, então vamos trocar por um novo... não, espere um pouco."
21130-20 = "Provavelmente, aquela arma gigantesca e incompreensível da Alice-chan... deve ter sido feita pelo Departamento de Engenharia."
21130-21 = "Sempre que algo assim acontece, nós pedíamos ajuda ao Departamento de Engenharia, mas..."
21130-22 = "...Não posso descartar a possibilidade de haver uma armadilha ali."
21130-23 = "...Compre a segurança mais poderosa que encontrar e troque o mais rápido possível. Mas, nada que seja feito pelo Departamento de Engenharia."
21130-25 = "Corredor do Millennium"
21130-26 = "Ugh! A Alice foi levada!"
21130-27 = "Calma, Momoi, está tudo indo conforme o plano."
21130-28 = "Alice-chan... espere aí, vamos te salvar logo."
21130-31 = "Por enquanto... parece que a primeira parte do plano funcionou bem."
21130-32 = "Não é, Sensei?"
21130-33 = "[s1] \"Sim, é verdade.\"\n[s2] \"Agora, pergunte ao Departamento de Engenharia se eles terminaram os preparativos.\""
21130-34 = "Acabei de receber uma mensagem: \"Aqui é o Departamento de Engenharia, conseguimos infiltrar o Cavalo de Troia\"... é isso."
21130-35 = "Acabei de receber uma mensagem: \"Aqui é o Departamento de Engenharia, conseguimos infiltrar o Cavalo de Troia\"... é isso."
21130-36 = "Ufa, que alívio. Se tivéssemos falhado, a Alice teria sido presa sem motivo nenhum..."
21130-37 = "Então, vamos para o próximo passo."
21130-39 = "...Bem, vamos começar."
21130-40 = "Ai, que nervoso..."
21130-41 = "Não me sinto assim desde que atacamos o prédio do Clube de Pesquisa de História Antiga."
21130-42 = "E a Hibiki e a Utaha-senpai?"
21130-44 = "Elas disseram que já estão prontas para receber os \"convidados\"."
21130-45 = "Ótimo, como esperado."
21130-46 = "Embora o que estamos fazendo não seja exatamente algo bom..."
21130-47 = "E a Maki e a Kotori?"
21130-48 = "Aqui também está tudo pronto, estamos aguardando~."
21130-49 = "Pode deixar comigo! Pela minha teoria, a chance de sucesso desta operação é de 2%!"
21130-50 = "Ei, isso significa que é quase certo que vai falhar! Por que você está tão confiante!?"
21130-51 = "Hehe, é só uma piada para descontrair! É o contrário, temos 98% de chance de sucesso!"
21130-52 = "Se a Kotori-chan e a Maki-chan também terminaram os preparativos..."
21130-53 = "Segunda etapa, então."
21130-54 = "Então... Sensei!"
21130-55 = "[s] \"Operação iniciada!\""
21130-57 = "Sim!"
21130-58 = "Vamos nessa!!"
21130-60 = "Sala de Operações do Millennium"
21130-62 = "（Bip, bip）"
21130-63 = "……Eles chegaram."
21130-64 = "Detectei o alvo pelas câmeras de segurança. Alvo confirmado no Portão 1, Ponto A1."
21130-65 = "Eles entrarão no Ponto A2 em breve."
21130-66 = "Se chegarem até lá, podemos considerar que a fuga é praticamente impossível, não é? ……Bem, eu irei."
21130-67 = "Ora, você está levando isso muito a sério. Tem mesmo necessidade da Akane ir pessoalmente?"
21130-68 = "Com certeza."
21130-71 = "Recepcionar os clientes é o básico para uma empregada."
21130-73 = "Millennium Veritas"
21130-74 = "（Voltando no tempo, 2 horas atrás. Durante a reunião de estratégia……）"
21130-75 = "Certo, vou explicar sobre o depósito de itens confiscados do conselho estudantil, onde dizem que está o nosso alvo, o 'Espelho'."
21130-76 = "O conselho estudantil do Millennium, o 'Seminar', usa basicamente o último andar da Torre Millennium como seu espaço exclusivo."
21130-77 = "O depósito de itens confiscados, onde o 'Espelho' está, fica no lado oeste desse último andar."
21130-78 = "Pelo que pesquisei, para chegar ao depósito a partir da entrada, teríamos que passar por cerca de 400 câmeras de segurança, quase 50 robôs de guarda e dezenas de robôs de combate confiscados de empresas corruptas."
21130-79 = "Para ser exata, são 442 câmeras de segurança e 52 robôs de guarda divididos em 3 tipos."
21130-80 = "Se está se perguntando por que sei disso tudo…… é simples. Fomos nós, o Clube de Engenharia, que ajudamos a construir o sistema de segurança de lá."
21130-83 = "Ué……"
21130-84 = "O maior problema é que, para chegar ao depósito, é obrigatório usar o 'elevador'. Esse elevador possui um sistema de autenticação por impressão digital que só permite a passagem de membros do conselho estudantil ou pessoas autorizadas."
21130-85 = "Mesmo que conseguíssemos passar pelo elevador, ainda teríamos os alunos do Seminar e os guardas armados, e acima de tudo……"
21130-86 = "O último andar é dividido em seções para cada sala."
21130-87 = "Seções…… não é normal que as salas sejam separadas?"
21130-88 = "As seções estão integradas ao sistema de segurança. Por isso, se houver um incêndio ou fumaça em alguma sala, é possível baixar as persianas e isolá-la das outras."
21130-89 = "Se as persianas baixarem, elas só podem ser abertas com a impressão digital de um membro do conselho estudantil."
21130-90 = "Se o sistema detectar uma impressão digital não registrada ou um impacto forte, uma segunda persiana, feita de titânio e muito mais resistente, é ativada. Nesse caso, seria necessária a autenticação dupla: a impressão digital e a íris de um membro do conselho."
21130-91 = "Hmm, que complicado…… e parece tão avançado que nem consigo acreditar que é real……"
21130-92 = "Resumindo: a única forma de chegar ao depósito de itens confiscados é pelo elevador."
21130-93 = "Além disso, existe o sistema de segurança por impressão digital; se cometermos um erro, as persianas descem e fica difícil se mover entre as seções."
21130-94 = "E se tentarmos forçar a passagem, uma persiana ainda mais forte desce e nos deixa presas……"
21130-95 = "Sem esquecer dos robôs de guarda e das câmeras de segurança~."
21130-96 = "Dá para hackear as câmeras de segurança, mas…… quanto ao sistema de segurança em si, seria difícil até para a Veritas passar pela frente. Afinal, ele é basicamente isolado da rede externa."
21130-97 = "Ah, recebi uma informação nova. Se tentarmos invadir o elevador à força, as persianas de todas as seções do último andar serão fechadas."
21130-99 = "Ah, chega! É tudo tão difícil e desesperador! Não tem nenhuma notícia boa!?"
21130-100 = "……Existe um ponto fraco."
21130-101 = "Primeiro, ele é vulnerável ao corte de energia externa. Quando a energia é cortada, ele se conecta automaticamente à rede externa, criando uma brecha temporária para hackear."
21130-102 = "Com o pulso eletromagnético (EMP) ultracompacto que criamos, podemos aproveitar essa brecha para desativar todo o sistema. Provavelmente, o tempo de desativação seria…… de cerca de 6 segundos."
21130-103 = "6 segundos, é……"
21130-106 = "É o suficiente."
21130-108 = "Millennium - Corredor"
21130-109 = "（E o tempo volta ao presente）"
21130-110 = "Err, é por aqui mesmo?"
21130-111 = "Sinto que viemos muito fundo…… mas provavelmente não estamos erradas."
21130-113 = "Sim, vocês estão certas."
21130-114 = "！？"
21130-115 = "Boa noite, que noite agradável. Vi todas as ações de vocês até aqui pelas câmeras de segurança."
21130-116 = "Como talvez já tenham percebido, o plano de vocês já falhou. Recomendo que se rendam o quanto antes."
21130-117 = "Apresentando-me novamente, sou o codinome Zero-Três da C&C…… meu nome real é segredo, então podem me chamar de bela empregada misteriosa."
21130-118 = "Ah, Akane-senpai!"
21130-119 = "Aquela Akane-senpai famosa por ter 'assassinato' como especialidade?"
21130-120 = "Hmm…… teoricamente eu deveria ser uma agente secreta, mas quando foi que fiquei tão conhecida assim…… será que heroínas que não revelam sua identidade já estão fora de moda……?"
21130-121 = "Eu sei de várias coisas. Segundo a senpai Kotama, parece que ultimamente o seu peso..."
21130-122 = "E-espere um pouco! Esse vazamento de informações é um problema sério, não acha!?"
21130-123 = "Você vai ter que manter essa informação em segredo para sempre...! Agora, vamos aparecer, Momoi-chan, Midori-chan!"
21130-125 = "……"
21130-126 = "……"
21130-127 = "Fufufu……"
21130-131 = "Acho que você ainda não percebeu. Quem está falhando é o seu plano, não é?"
21130-132 = "Sim?"
21130-137 = "(Sussurro)"
21130-138 = "Oii, Akane-senpai! Eu estava tentando voltar para o dormitório, mas acabei me perdendo~."
21130-140 = "Q-quem são vocês!?"
21130-141 = "Se nos perguntam quem somos! É um dever do mundo explicar!"
21130-142 = "Fornecemos respostas para qualquer pergunta! A encarnação da explicação do Clube de Engenharia, Toyomi Kotori!"
21130-143 = "Uma combinação de arte e ciência! A artista digital da Veritas, Maki!"
21130-144 = "Não pode ser, quem deveria ter vindo aqui eram a Momoi-chan e a Midori-chan!? Pela câmera de segurança, com certeza..."
21130-146 = "Yuuka! O que está acontecendo!?"
21130-147 = "Eu não sei! Nas câmeras de segurança daqui, a Momoi e a Midori ainda estão aparecendo! Além disso, a Akane... não consigo ver você!"
21130-148 = "O-o que você disse? Isso, será que é...!?"
21130-149 = "Reinicie as configurações da câmera! Corte a conexão com a nuvem e exiba a tela novamente usando uma linha privada!"
21130-150 = "Atualizando! Nova tela... apareceu! Confirmei a Akane! Ela está confrontando a Kotori e a Maki!"
21130-151 = "Entendo, então isso significa..."
21130-152 = "As imagens que estávamos vendo até agora, será que eram...!?"
21130-154 = "Millennium - Corredor"
21130-155 = "Acho que já está na hora de descobrirem que era uma gravação."
21130-156 = "Embora seja tarde para dizer isso, não teria sido melhor apenas passar um vídeo de um estado pacífico e ir buscar o 'espelho' escondida?"
21130-157 = "Era um lugar com muita circulação de pessoas, então não seria mais estranho se não houvesse nada?"
21130-158 = "Além disso, ao separar e prender as senpais da C&C assim, a probabilidade de sucesso da missão acaba sendo maior."
21130-164 = "Ah, o elevador chegou! Então, vamos entrar de \"verdade\" agora!"

21130-165 = "Espere um pouco... Sensei, está escuro por aqui, então por favor, segure firme na nossa mão."
21130-166 = "Então... vamos lá!"
21130-167 = "Go!"
21130-169 = "(Uuuuuuuu)"
21130-171 = "Millennium - Corredor"
21130-172 = "Intruso detectado. Devido à emergência, todas as seções do andar exclusivo do Seminário serão fechadas."
21130-173 = "Isso é... as persianas!?"
21130-174 = "(Clang!)"
21130-175 = "Ah, francamente..."
21130-176 = "Hehe, acabamos presas juntas, né?"
21130-177 = "……Não é bem assim. Diferente de vocês, minhas digitais estão registradas no sistema."
21130-178 = "Se não quiserem se machucar, fiquem quietas. Foi um prazer conhecê-las, mas agora eu vou..."
21130-179 = "Dados incompatíveis, impressão digital não registrada."
21130-180 = "O quê...!?"
21130-181 = "Segunda persiana, ativando."
21130-182 = "I-isso não pode ser!?"
21130-184 = "(Gogogo... Clang!)"
21130-186 = "Millennium - Sala de Operações"
21130-187 = "Akane, ela foi trancada!"
21130-188 = "Alguém chame um membro do conselho estudantil... a Noa deve estar por perto, peça para ela abrir!"
21130-191 = "O que exatamente eles estão planejando...? Com isso, a Momoi e a Midori \"reais\" também devem estar presas em algum lugar—"

21130-192 = "Ah, será que...!?"
21130-193 = "Contato da Noa! Ela disse que elas também estão presas!"
21130-194 = "Nem a digital da Noa está conseguindo abrir o obturador, ela está pedindo ajuda!"
21130-195 = "O-o-o que você disse!?"
21130-196 = "Uma falha bem agora!? Acabamos de renovar o sistema, e eu até migrei os dados das digitais corretamente... não, espera, será que!?"
21130-197 = "Hackearam!? Isso significa que eles planejaram isso desde o início, fazendo a Alice-chan quebrar a porta primeiro...!?"
21130-199 = "Interior do prédio escolar de Millennium"
21130-200 = "Sensei, irmã, contato da Hare-senpai! Ela disse que conseguiram prender a Akane-senpai!"
21130-201 = "Muito bem, o sistema de autenticação por digital funcionou normalmente."
21130-202 = "Conseguimos isolar todos os membros do conselho estudantil... agora, os únicos que podem se mover livremente pela torre somos nós!"
21130-203 = "A segurança de última geração, que parece um pouco mais fraca do que a original feita pelo Clube de Engenharia... parece que funcionou."
21130-204 = "Como escondemos o nome, eles provavelmente nem imaginaram que também era um produto do Clube de Engenharia. O equilíbrio foi perfeito, como esperado do Clube de Engenharia. Bem, vamos seguir em frente com confiança."
21130-205 = "Bip — Momoi Saiba, Midori Saiba, Sensei, a autorização dos 3 foi concluída."
21130-206 = "Sinto um certo déjà vu, não sinto...?"
21130-207 = "Ah, você diz aquilo das ruínas? Que nostálgico, parece que faz tanto tempo."
21130-208 = "De qualquer forma, foi bom termos conseguido selar a Akane-senpai. Se pudéssemos, teríamos prendido a Asuna-senpai junto, mas... ainda não sabemos onde ela está, né?"
21130-209 = "A Hare-senpai vasculhou toda a Millennium o máximo que pôde, mas... parece que não a encontrou. Será que ela não está fora da Millennium?"
21130-210 = "Ela é uma senpai sempre imprevisível, não é fácil de achar. É o tipo de pessoa que sai para comer um parfait do nada no meio de uma missão... bem, por enquanto o plano está correndo como esperado, então não vamos nos preocupar!"
21130-211 = "Quem está aí!?"
21130-212 = "Eita! Ah, é o conselho estudantil! Não acredito que ainda estavam aqui!"
21130-213 = "O-o que a gente faz, Sensei!?"
21130-214 = "[s3] \"Vamos avançar.\"\n[s4] \"...Vamos fugir?\""
21130-215 = "...Sim, parece que não temos escolha a não ser avançar."
21130-216 = "...Sim, você tem razão. Não podemos fugir depois de chegar até aqui."
21130-217 = "...Não, não podemos fugir agora! Vamos dar um jeito de passar por elas!"
21130-218 = "Não podemos recuar agora!"
21130-219 = "Pela Alice-chan também!"
21130-221 = "..."
21130-222 = "[s] \"...Muito bem, vamos nessa!\""
