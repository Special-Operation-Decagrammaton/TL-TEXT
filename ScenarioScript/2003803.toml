[translation]
2003803-1 = "寒国の秘書室長"
2003803-3 = "ふぅ……。"
2003803-4 = "[s] \"大丈夫？\""
2003803-5 = "ええ、何とか。"
2003803-6 = "山海経の気候に慣れるまで、時間はかかりそうですが……。"
2003803-7 = "こちらの服に着替えたところ、多少は暑さが和らぎました。"
2003803-8 = "今度は何か冷たい飲み物でも口にしたいと思い、#n街に出てきたものの……。"
2003803-9 = "[s] \"……見つからなかった、とか？\""
2003803-10 = "はい、先生が仰る通りです。"
2003803-11 = "冷たい飲み物は体に悪いから、と。"
2003803-12 = "その考えが間違っているとは言いませんが……。"
2003803-13 = "この暑さのなか、温かいお茶を頂く気にはなれず。"
2003803-14 = "先ほどは冷たい飲み物かと思い注文したところ、#n常温で出てきてしまいまして。"
2003803-15 = "[s] \"とりあえず、これでも使ってみる？\""
2003803-22 = "あら。"
2003803-23 = "きれいなうちわですね。"
2003803-24 = "レッドウィンターでは、使う機会がありませんでしたし……。"
2003803-25 = "せっかくですから、お借りします。"
2003803-29 = "[wa:1670]― [log=토모에 치파오]涼しい風……[wa:2430]ちょうどよい日陰……[/log]"
2003803-30 = "[wa:2810]― [log=토모에 치파오]更にはうちわで涼む……。[/log]"
2003803-33 = "[wa:830]― [log=토모에 치파오]ふふ。[wa:1180]たしかにこれは[wa:1210]初めての経験です。[/log]"
2003803-36 = "[wa:1500]― [log=토모에 치파오]こういった経験一つ一つが……[/log]"
2003803-37 = "[wa:3950]― [log=토모에 치파오]視野を広げてくれるのですね。[/log]"
2003803-40 = "[ns] \"トモエの目には、何が映ってるの？\""
2003803-42 = "[wa:1230]― [log=토모에 치파오]あら？[wa:1610]あまり面白いものでは[wa:1100]ないかもしれませんよ？[/log]"
2003803-45 = "[wa:670]― [log=토모에 치파오]ふふ、[wa:1260]先生。[wa:1360]そんなところで見てないで……[/log]"
2003803-46 = "[wa:2580]― [log=토모에 치파오]こちらにお越しください。[/log]"
2003803-49 = "[wa:2830]― [log=토모에 치파오]ほら、[wa:1160]うちわで扇いで差し上げますので。[/log]"
2003803-54 = "ねぇ、あの欄干のとこ見て。"
2003803-55 = "どうしたの？"
2003803-56 = "ほら、あそこの人。"
2003803-57 = "すごい……どこかのお嬢様なのかな？"
2003803-58 = "普通のうちわのはずなのに……。"
2003803-59 = "……高級な物に見えるね。"
2003803-61 = "……！"
2003803-62 = "[s1] \"まだそんなに暑いの？\"\n[s2] \"さっきよりも顔が赤いような……。\""
2003803-65 = "い、いえ……。"
2003803-66 = "と、とりあえず、どこか場所を移しませんか？"
2003803-67 = "[s] \"なら、[ruby=バオビン]刨冰[/ruby]を食べに行こう！\""
2003803-68 = "[ruby=バオビン]刨冰[/ruby]、ですか……？"
2003803-69 = "……なるほど、かき氷の一種でしたか。#nでしたら、ぜひご一緒させてください。"
2003803-70 = "道中は暑いでしょうし、着くまで扇いで差し上げますね。"
2003803-72 = "（こうして、トモエと街を散策することになった）"
2003803-73 = "（交代で、お互いをうちわで扇ぎながら）"
