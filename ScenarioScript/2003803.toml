[translation]
2003803-1 = "A Chefe da Secretaria da Terra Fria"
2003803-3 = "Ufa..."
2003803-4 = "[s] \"Está tudo bem?\""
2003803-5 = "Sim, de alguma forma."
2003803-6 = "Vai levar um tempo até eu me acostumar com o clima de Shanhaijing, mas..."
2003803-7 = "Depois que troquei para estas roupas, o calor diminuiu um pouco."
2003803-8 = "Pensei em tomar algo gelado agora, então saí pela cidade, mas..."
2003803-9 = "[s] \"...Não conseguiu encontrar nada?\""
2003803-10 = "Sim, exatamente como você disse, Sensei."
2003803-11 = "Disseram que bebidas geladas fazem mal à saúde."
2003803-12 = "Não que eu discorde desse pensamento, mas..."
2003803-13 = "Com esse calor, não consigo nem pensar em tomar um chá quente."
2003803-14 = "Tentei pedir algo gelado agora há pouco, mas me serviram em temperatura ambiente."
2003803-15 = "[s] \"Por enquanto, quer tentar usar isto?\""
2003803-22 = "Ora."
2003803-23 = "Que leque bonito."
2003803-24 = "Em Red Winter, nunca tive a oportunidade de usar um..."
2003803-25 = "Já que insiste, vou aceitar emprestado."
2003803-29 = "[wa:1670]― [log=토모에 치파오]Uma brisa fresca...[wa:2430]uma sombra perfeita...[/log]"
2003803-30 = "[wa:2810]― [log=토모에 치파오]E ainda me refrescando com o leque...[/log]"
2003803-33 = "[wa:830]― [log=토모에 치파오]Fufu.[wa:1180]Certamente, esta é[wa:1210] uma experiência inédita.[/log]"
2003803-36 = "[wa:1500]― [log=토모에 치파오]Cada uma dessas experiências...[/log]"
2003803-37 = "[wa:3950]― [log=토모에 치파오]acaba expandindo meus horizontes, não é?[/log]"
2003803-40 = "[ns] \"O que você está vendo, Tomoe?\""
2003803-42 = "[wa:1230]― [log=토모에 치파오]Oh?[wa:1610] Talvez não seja[wa:1100] nada tão interessante assim.[/log]"
2003803-45 = "[wa:670]― [log=토모에 치파오]Fufu,[wa:1260] Sensei.[wa:1360] Não fique olhando daí...[/log]"
2003803-46 = "[wa:2580]― [log=토모에 치파오]Venha para cá.[/log]"
2003803-49 = "[wa:2830]― [log=토모에 치파오]Veja,[wa:1160] vou abanar você com o leque.[/log]"
2003803-54 = "Ei, olha ali perto do parapeito."
2003803-55 = "O que foi?"
2003803-56 = "Olha só, aquela pessoa ali."
2003803-57 = "Incrível... será que ela é alguma dama da alta sociedade?"
2003803-58 = "Deveria ser um leque comum, mas..."
2003803-59 = "...parece um objeto de luxo."
2003803-61 = "……！"
2003803-62 = "[s1] \"Ainda está com tanto calor?\"\n[s2] \"Seu rosto parece mais vermelho do que antes...\""
2003803-65 = "N-não..."
2003803-66 = "P-por enquanto, que tal mudarmos de lugar?"
2003803-67 = "[s] \"Então, vamos comer Baobing!\""
2003803-68 = "Baobing...?"
2003803-69 = "...Entendo, é um tipo de raspadinha. Nesse caso, adoraria ir com você."
2003803-70 = "O caminho deve estar quente, então vou te abanar até chegarmos."
2003803-72 = "(Assim, acabei passeando pela cidade com Tomoe.)"
2003803-73 = "(Revezando-nos para abanar um ao outro com o leque.)"
