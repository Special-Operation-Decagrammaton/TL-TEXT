[translation]
51080-1 = "Episódio 8; Garota Juvenil(?) (2)"
51080-5 = "Ehm, Sensei...? E estas pessoas são...?"
51080-6 = "[s] \"Elas são as alunas do Clube de Treinamento. Esta é a Yukari da Hyakkaryouran.\""
51080-8 = "Oh, Hyakkaryouran...!"
51080-9 = "Hm? Ué, mas a Hyakkaryouran..."
51080-10 = "Fufu, muito prazer. Me chamo Mimori."
51080-11 = "Ah, é verdade."
51080-12 = "Olá! Eu sou a Kaede! Uma garota que deseja se tornar uma dama esplêndida!"
51080-13 = "Muito prazer~"
51080-15 = "Eu me chamo Yukari. É uma honra conhecê-las!"
51080-16 = "Eu ouço falar muito de todas vocês do Clube de Treinamento."
51080-17 = "Dizem que vocês estão sempre atuando como a guarda da cidade."
51080-18 = "Sim, sempre junto da Kaede-chan e da Tsubaki-chan."
51080-19 = "Mas, se formos nos comparar com a Hyakkaryouran, não tenho confiança se estamos sendo úteis para todos..."
51080-20 = "Por favor, não seja modesta! #n As atividades de vocês são realmente esplêndidas!"
51080-21 = "Você acha? Fufu, muito obrigada."
51080-22 = "[s] \"Então, o que as alunas do Clube de Treinamento estão fazendo aqui?\""
51080-24 = "Nós estávamos preparando tudo para o festival!"
51080-25 = "Desta vez também, fomos convidadas pelo Comitê de Operações do Festival~"
51080-26 = "Estamos ajudando para que o 'Festival das Lanternas da Hyakkiyako' possa acontecer sem problemas."
51080-27 = "E me disseram que esse festival em particular é muuuito importante!"
51080-29 = "(O que eu ouvi delas era mais ou menos a mesma coisa que eu tinha escutado no Clube Yin-Yang)"
51080-31 = "Durante o 'Festival das Lanternas', espalhamos lanternas acesas por toda a cidade..."
51080-33 = "E no final do festival, fazemos a cerimônia de deixá-las descerem pelo rio~"
51080-34 = "Despedir-se do antigo e dar as boas-vindas ao novo... #n Desejar o futuro, e deixar as memórias difíceis do passado irem junto das lanternas pelo rio..."
51080-35 = "Para assim, preparar os corações para seguir um novo caminho―― foi o que a Shizuko-chan disse."
51080-36 = "Você também se lembra, Sensei... o dia em que o céu ficou vermelho."
51080-40 = "Desde então, a Hyakkiyako continua com uma atmosfera um tanto sombria..."
51080-41 = "A Shizuko parecia estar preocupada com isso."
51080-43 = "Por isso, para mudar o clima com um festival divertido, elas estão colocando muito esforço neste festival!"
51080-44 = "Nós vamos curtir o festival e jogar as memórias ruins num 'Tóru no Xin'? e mandar tudo rio abaixo nas lanternas! Não é incrível!"
51080-45 = "E tem mais, no final do festival, uma Miko suuuuper linda vai dançar no palco! "
51080-46 = "Puxa, eu também queria tentar fazer isso~"
51080-47 = "[s] \"Se é uma Miko, então desta vez a Chise também vai...?\""
51080-48 = "Não, eu ouvi dizer que a pessoa encarregada de dançar desta vez é de uma família tradicional, a mesma que cuidou da cerimônia há 20 anos."
51080-49 = "Deve ser uma garota super linda! Mal posso esperar para vê-la, Sensei!"
51080-55 = "E agora mesmo, enquanto conversamos, a Shizuko-chan, a Pina-chan, a Umika-chan e todo o pessoal estão se preparando..."
51080-56 = "Nós do Clube de Treinamento também viemos para ver se podíamos ajudar de alguma forma."
51080-57 = "[s] \"Todos estão se esforçando muito.\""
51080-63 = "......Hmm, entendo."
51080-64 = "Isso é verdadeiramente..."
51080-70 = "Uma postura maravilhosa! Excellent!"
51080-72 = "E-Eh?"
51080-73 = "A disposição de realizar um festival para o bem de todos aqueles que carregam passados dolorosos!"
51080-74 = "Ehm... A senhora se chama Shizuko-san? "
51080-75 = "Você é realmente incrível!"
51080-77 = "Sim, eu também acho."
51080-78 = "Mas... hmm, Yukari-san."
51080-79 = "Sim?"
51080-80 = "Nós... já nos encontramos em algum lugar antes? #n Sinto que já te conheço de algum lugar..."
51080-84 = "Ah, eh, isso é...!"
51080-85 = "C-Como posso dizer! Hoje está muito quente! "
51080-86 = "Precisamos cuidar da nossa saúde! E vocês também!"
51080-87 = "......É, é verdade?"
51080-92 = "Sensei, Sensei!"
51080-93 = "Que pedido você vai fazer neste festival~?"
51080-99 = "(Enquanto conversávamos animadamente com a Yukari e o pessoal do Clube de Treinamento...)"
51080-107 = "Te encontrei! Maldita Hyakkaryouran!"
51080-108 = "Fez o que quis na última vez, não foi!?"
51080-114 = "Quem... seria você?"
51080-117 = "Líder! Essa aí é outra pessoa, viu?"
51080-118 = "Ah!? Não importa! Se usa haori azul-claro, é das delas!"
51080-119 = "Vamos descontar e nos vingar nela!"
51080-121 = "Entendido! Como esperado da Líder!"
51080-126 = "Trupe Sudama..."
51080-127 = "Não sei o motivo, mas são pessoas que sempre causam confusão na época do festival!"
51080-128 = "Querem causar problemas de novo? Não vou permitir!"
51080-137 = "......Cuidado!"
51080-149 = "[ns] \"Vocês estão bem!?\""
51080-151 = "Hah, desapareçam do meu caminho!"
51080-159 = "......Eu não vou permitir."
51080-161 = "Hm?"
51080-163 = "Causar um tumulto em um lugar desses... #n E ainda por cima, envolver as garotas do Clube de Treinamento, que não têm culpa de nada...!"
51080-168 = "Eu nunca vou perdoá-las!"
51080-170 = "Oh? Vai encarar?"
51080-172 = "Sim, eu vou!"
51080-179 = "Como a elite da Hyakkaryouran! Eu vou derrotar vocês!"
51080-181 = "Pelo menos eu admiro a sua coragem!"
51080-183 = "Nós somos a Trupe Sudama!"
51080-192 = "Você acha que consegue lidar com todas nós sozinha!?"
51080-194 = "Ugh...!"
51080-218 = "I-Isso não seria...!"
51080-220 = "Q-Quem tá aí!"
51080-222 = "Tiro os olhos por um segundo e de repente começa uma confusão dessas..."
51080-229 = "Se quiserem continuar fazendo baderna, é bom estarem preparadas."
51080-234 = "Essa voz... não pode ser...!"
51080-241 = "Se querem atrapalhar as minhas atividades da juventude, eu, Fuwa Renge, serei a oponente de vocês."
51080-246 = "......Renge-senpai!?"
51080-248 = "Droga... a-acabem com ela!"
