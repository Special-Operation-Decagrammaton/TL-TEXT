[translation]
51080-1 = "第8話;青春（？）少女（２）"
51080-5 = "ええっと、先生……？こちらの方々は……？"
51080-6 = "[s] \"こちらは修行部のみんな。こっちは百花繚乱のユカリだよ。\""
51080-8 = "おおっ、百花繚乱……！"
51080-9 = "ん？あれ、でも百花繚乱って……"
51080-10 = "ふふっ、初めまして。ミモリと申します。"
51080-11 = "あっ、そうだ。"
51080-12 = "こんにちは！私はカエデ！素敵なレディーを目指してるの！"
51080-13 = "はじめまして～"
51080-15 = "[ruby=みども]身共[/ruby]はユカリと申します。お会いできて光栄ですの！"
51080-16 = "修行部の皆様のことは、よくお話を聞いておりますわ。"
51080-17 = "いつも街の自警団として活動されているとのことで。"
51080-18 = "はい、いつもカエデちゃんとツバキちゃんと一緒に。"
51080-19 = "百花繚乱の方と比べたら、皆様のお役に立てているのか自信は……"
51080-20 = "ご謙遜なさらないでくださいまし！#n皆様の活動、身共はとても素敵だと思いますの！"
51080-21 = "そうですか？ふふっ、ありがとうございます。"
51080-22 = "[s] \"それで、修行部のみんなはどうしたの？\""
51080-24 = "私たち、お祭りの準備をしてたんだ！"
51080-25 = "今回もお祭り運営委員会からお願いされてて～"
51080-26 = "無事に「百鬼夜行燈籠祭」が開催できるよう、手伝っているんです。"
51080-27 = "特に今回のお祭りはす～～っごい重要なんだって！"
51080-29 = "（詳しく聞くと、陰陽部から聞いた話と大体同じだった）"
51080-31 = "「燈籠祭」の期間中は、街中のいたるところに灯籠を灯し……"
51080-33 = "お祭りの最後に、灯籠流しをするの～"
51080-34 = "[ruby=そうこげいしん]送故迎新[/ruby]……#n未来を願い、つらかった過去の記憶を灯籠に込めて川に流す……"
51080-35 = "そうして、新たな道に進む心の準備をするのだと――シズコちゃんが言っていました。"
51080-36 = "先生も覚えてるよね――空が赤く染まった日のこと。"
51080-40 = "あれから百鬼夜行は、どこか暗い雰囲気が続いてて……"
51080-41 = "シズコはそれを気にしてたみたいだから。"
51080-43 = "だから、楽しいお祭りでムード一変するために、今回のお祭りはすっごく力を入れてるんだって！"
51080-44 = "お祭りを楽しんで、悪い思い出はトコノーシン？で燈籠に乗せて流しちゃうの！すごいでしょ！"
51080-45 = "あとね、お祭りの最後には、す～～～っごいきれいな巫女さんが舞台の上で踊るんだって！ "
51080-46 = "いいなぁ、私もやってみたいなぁ～"
51080-47 = "[s] \"巫女ってことは、今回もチセが……？\""
51080-48 = "いえ、二十年前の「燈籠祭」で祭儀を担当した由緒ある家の方が踊るのだと聞いています。"
51080-49 = "きっとすっごい美人さんなんだろうなぁ！早く会いたいね、先生！"
51080-55 = "今この時間も、シズコちゃんやフィーナちゃん、ウミカちゃんたち皆さんは準備をしていますから……"
51080-56 = "私たち修行部も、ぜひお力になれたらと。"
51080-57 = "[s] \"みんな、頑張ってるんだね。\""
51080-63 = "……ふむ、なるほど。"
51080-64 = "それは誠に……"
51080-70 = "素晴らしい心構え！えくせれ～んとですの！"
51080-72 = "は、はいっ？"
51080-73 = "つらい過去を抱えた皆様のためにお祭りを開こうとする、その心意気！"
51080-74 = "ええと……シズコさん、と仰いましたか？ "
51080-75 = "本当に素晴らしいですわ！"
51080-77 = "ええ、私もそう思います。"
51080-78 = "ただ……その、ユカリさん。"
51080-79 = "はい？"
51080-80 = "私たち……以前どこかでお会いしたことはありませんか？#nなんだか懐かしい感じがして……"
51080-84 = "あっ、えっ、それは……！"
51080-85 = "な、なんだか！今日はとても暑いですの！ "
51080-86 = "体調には気をつけませんと！皆様も、ね！"
51080-87 = "……そ、そうですね？"
51080-92 = "ねえねえ先生！"
51080-93 = "今回のお祭りで、先生はどんなお願いをするの～？"
51080-99 = "（修行部のみんなやユカリと談笑をしていると……）"
51080-107 = "見つけた！百花繚乱め！"
51080-108 = "この間はよくも好き勝手やってくれたな！？"
51080-114 = "どちらさま……でしょうか？"
51080-117 = "リーダー！こいつ、違うヤツっすよ？"
51080-118 = "あぁ！？関係ねえ！水色の羽織だから仲間だろ！"
51080-119 = "こいつに仕返して復讐といくぞ！"
51080-121 = "なるほど！流石っすリーダー！"
51080-126 = "[ruby=すだまいちざ]魑魅一座[/ruby]……"
51080-127 = "理由は分かりませんが、いつもお祭りの時期に暴れ回る人たちです！"
51080-128 = "また問題を起こす気？許さないよ！？"
51080-137 = "……危ない！"
51080-149 = "[ns] \"みんな、大丈夫！？\""
51080-151 = "はんっ、邪魔者は消えろ！"
51080-159 = "……ません。"
51080-161 = "ん？"
51080-163 = "こんな場所で暴動だなんて……#nそれも、何の罪も無い修行部の皆様まで巻き込んで……！"
51080-168 = "絶対に許しません！"
51080-170 = "おう？やんのか！"
51080-172 = "ええ、身共は！"
51080-179 = "百花繚乱のえりーととして！あなた達を倒してみせますの！"
51080-181 = "その度胸は認めてやるがな！"
51080-183 = "あたし達は魑魅一座だ！"
51080-192 = "お前一人で、この数を相手にできるっていうのか！？"
51080-194 = "っ……！"
51080-218 = "こ、これはもしや……！"
51080-220 = "だっ、誰だ！"
51080-222 = "ちょっと目を離した隙に、何の騒ぎかと思えば……"
51080-229 = "それ以上暴れるってんなら、覚悟はできてるな。"
51080-234 = "その声……まさか……！"
51080-241 = "アタシの青春活動を邪魔する気なら、この[ruby=ふわ]不破[/ruby]レンゲが相手になってやる。"
51080-246 = "……レンゲ先輩！？"
51080-248 = "くっ……や、やっちまえ！"
