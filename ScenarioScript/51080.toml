[translation]
51080-1 = "Episódio 8; Juventude (?) e Garotas (2)"
51080-5 = "Hum, Sensei...? Quem são estas pessoas...?"
51080-6 = "[s] \"Estas são o pessoal do Clube de Treinamento. E esta é a Yukari, da Hyakkiyako Ryoran.\""
51080-8 = "Oh, Hyakkiyako Ryoran...!"
51080-9 = "Hm? Ué, mas a Hyakkiyako Ryoran não é..."
51080-10 = "Fufu, muito prazer. Meu nome é Mimori."
51080-11 = "Ah, é verdade."
51080-12 = "Olá! Eu sou a Kaede! Estou me esforçando para ser uma dama maravilhosa!"
51080-13 = "Muito prazer~"
51080-15 = "Eu me chamo Yukari. É uma honra conhecê-las!"
51080-16 = "Já ouvi falar muito sobre vocês do Clube de Treinamento."
51080-17 = "Dizem que vocês sempre atuam como a patrulha da cidade."
51080-18 = "Sim, sempre junto com a Kaede-chan e a Tsubaki-chan."
51080-19 = "Comparado ao pessoal da Hyakkiyako Ryoran, não tenho confiança se estamos sendo realmente úteis..."
51080-20 = "Não seja tão modesta!#nEu acho as atividades de vocês maravilhosas!"
51080-21 = "É mesmo? Fufu, muito obrigada."
51080-22 = "[s] \"Então, o que o pessoal do Clube de Treinamento está fazendo?\""
51080-24 = "Nós estávamos preparando o festival!"
51080-25 = "Desta vez também fomos chamadas pelo Comitê Organizador do Festival~"
51080-26 = "Estamos ajudando para que o \"Festival das Lanternas de Hyakkiyako\" ocorra sem problemas."
51080-27 = "Disseram que este festival em especial é suuuuper importante!"
51080-29 = "(Ao ouvir os detalhes, era basicamente a mesma história que ouvi do Departamento Yin-Yang)"
51080-31 = "Durante o período do \"Festival das Lanternas\", lanternas são acesas por toda a cidade..."
51080-33 = "E no final do festival, fazemos o lançamento das lanternas no rio~"
51080-34 = "Sokogeishin...#nDesejar pelo futuro e colocar as memórias dolorosas do passado nas lanternas para que sejam levadas pelo rio..."
51080-35 = "É assim que nos preparamos mentalmente para seguir um novo caminho — foi o que a Shizuko-chan disse."
51080-36 = "Sensei também se lembra, não é? — Daquele dia em que o céu ficou vermelho."
51080-40 = "Desde então, Hyakkiyako tem mantido uma atmosfera um tanto sombria..."
51080-41 = "Parece que a Shizuko estava preocupada com isso."
51080-43 = "Por isso, para mudar o clima com um festival divertido, eles estão se esforçando muito desta vez!"
51080-44 = "Aproveitamos o festival e mandamos as lembranças ruins embora com o Sokogeishin! Incrível, né!"
51080-45 = "Ah, e no final do festival, uma sacerdotisa suuuuper linda vai dançar no palco!"
51080-46 = "Que legal, eu também queria tentar fazer isso~"
51080-47 = "[s] \"Sacerdotisa... isso significa que a Chise vai... novamente?\""
51080-48 = "Não, ouvi dizer que será alguém de uma família tradicional que cuidou dos rituais no \"Festival das Lanternas\" de vinte anos atrás."
51080-49 = "Com certeza deve ser uma beldade! Mal posso esperar para conhecê-la, Sensei!"
51080-55 = "Mesmo agora, a Shizuko-chan, a Fina-chan, a Umika-chan e todos os outros estão preparando tudo..."
51080-56 = "Nós, do Clube de Treinamento, também queremos ajudar no que pudermos."
51080-57 = "[s] \"Vocês todos estão se esforçando muito, hein.\""
51080-63 = "...Hum, entendo."
51080-64 = "Isso é realmente..."
51080-70 = "Uma atitude maravilhosa! É excelente!"
51080-72 = "H-hã?"
51080-73 = "Essa intenção de realizar um festival para todos que carregam um passado doloroso!"
51080-74 = "Hum... Shizuko, foi esse o nome que disse?"
51080-75 = "É realmente maravilhoso!"
51080-77 = "Sim, eu também penso o mesmo."
51080-78 = "Mas... hum, Yukari-san."
51080-79 = "Sim?"
51080-80 = "Nós... não nos conhecemos em algum lugar antes?#nSinto uma sensação nostálgica..."
51080-84 = "Ah, eh, isso é...!"
51080-85 = "O-o que é isso! Está muito quente hoje!"
51080-86 = "Precisamos cuidar da nossa saúde! Todos vocês também, entenderam?"
51080-87 = "...I-isso mesmo, não é?"
51080-92 = "Ei, ei, Sensei!"
51080-93 = "Que tipo de pedido você vai fazer no festival desta vez~?"
51080-99 = "(Enquanto conversava alegremente com o pessoal do Clube de Treinamento e Yukari...)"
51080-107 = "Achei vocês! Hyakkiyako Ryoran!"
51080-108 = "Como ousam fazer o que bem entendem daquela vez!?"
51080-114 = "Quem... seria você?"
51080-117 = "Líder! Esse cara não é um deles, não!"
51080-118 = "Ah!? Não importa! Ele está usando um haori azul, então é um deles!"
51080-119 = "Vamos nos vingar nele!"
51080-121 = "Entendido! Como esperado do líder!"
51080-126 = "Chimi Ichiza..."
51080-127 = "Não sei o motivo, mas são pessoas que sempre causam confusão na época do festival!"
51080-128 = "Vão causar problemas de novo? Eu não vou perdoar vocês!?"
51080-137 = "...Cuidado!"
51080-149 = "[ns] \"Pessoal, vocês estão bem!?\""
51080-151 = "Hmph, saiam da frente, seus estorvos!"
51080-159 = "...não vou."
51080-161 = "Hm?"
51080-163 = "Causar um tumulto em um lugar como este...#nE ainda envolver o pessoal inocente do Clube de Treinamento...!"
51080-168 = "Eu não vou perdoar vocês de jeito nenhum!"
51080-170 = "Oh? Quer brigar?"
51080-172 = "Sim, eu quero!"
51080-179 = "Como uma elite da Hyakkiyako Ryoran! Eu vou derrotar todos vocês!"
51080-181 = "Admito que você tem coragem!"
51080-183 = "Nós somos a Chimi Ichiza!"
51080-192 = "Você acha mesmo que pode enfrentar todos nós sozinha!?"
51080-194 = "Tsc...!"
51080-218 = "I-isso seria...!"
51080-220 = "Q-quem está aí!"
51080-222 = "Bastou eu tirar os olhos por um segundo para ver essa confusão..."
51080-229 = "Se pretendem continuar com essa baderna, espero que estejam preparados."
51080-234 = "Essa voz... não pode ser...!"
51080-241 = "Se pretendem atrapalhar as minhas atividades de juventude, eu, Fuwa Renge, serei sua oponente."
51080-246 = "...Senpai Renge!?"
51080-248 = "Droga... A-ataquem!"
