[translation]
80000005-1 = "Novos produtos de chocolate!"
80000005-2 = "Em frente à loja da Momo Friends"
80000005-3 = "Ugh... o que eu faço? Eu não esperava que houvesse um limite de compra para os novos produtos do Peroro-sama..."
80000005-4 = "Não parece ter nenhum amigo por perto, e se eu chamar alguém, pode esgotar enquanto espero..."
80000005-5 = "[s] \"Ei, Hifumi. Está com algum problema?\""
80000005-6 = "Ah, Sensei! Você apareceu na hora certa...!"
80000005-7 = "Digo, só por hoje..."
80000005-8 = "V-você poderia fingir ser meu namorado?"
80000005-9 = "Ah, bem... é que... não é nada estranho, eu juro..."
80000005-10 = "[s1] \"Entendi, compreendo.\"\n[s2] \"Você quer um produto exclusivo para casais?\""
80000005-11 = "Ah... sim, é isso mesmo."
80000005-12 = "Ah... sim, é isso mesmo."
80000005-13 = "Lançaram um novo chocolate do Peroro-sama em comemoração ao Dia dos Namorados, mas quando cheguei na loja, descobri que só vendem para casais..."
80000005-14 = "Você percebeu tão rápido mesmo sem eu explicar, como esperado do Sensei!"
80000005-15 = "[s] \"Já faz bastante tempo que nos conhecemos, afinal.\""
80000005-16 = "Hehe, é verdade. Desde que conheci o Sensei, já se passou tanto tempo..."
80000005-17 = "Mas não é hora de conversar! O chocolate do Peroro-sama pode esgotar! Sensei, vamos entrar na loja logo!"
80000005-23 = "(Depois disso, comprei o chocolate do Peroro exclusivo para casais junto com a Hifumi.)"
80000005-26 = "Conseguimos comprar! O chocolate de edição limitada de Dia dos Namorados do Peroro-sama está em nossas mãos!"
80000005-27 = "E pensar que o nosso foi o último... foi por um triz."
80000005-28 = "Se o Sensei não tivesse aparecido por acaso, eu teria perdido a chance. Muito obrigada mesmo!"
80000005-29 = "Ué? Tem dois conjuntos de chocolates limitados aqui, será que o atendente errou...?"
80000005-30 = "...Ah, não. Como é um produto para casais, parece que já vem com dois conjuntos mesmo."
80000005-35 = "Aqui, pegue. Um é para você, Sensei."
80000005-36 = "[s] \"É um item limitado tão valioso, tem certeza?\""
80000005-37 = "Sim. Só consegui isso graças ao Sensei."
80000005-38 = "Além disso, hoje é Dia dos Namorados, e eu queria te dar um presente..."
80000005-39 = "Ah, digo, é que... de qualquer forma, ficarei feliz se você cuidar bem dele!"
