[translation]
80000005-1 = "新作のチョコレートグッズ！"
80000005-2 = "モモフレンズ専門店前"
80000005-3 = "うぅ……どうしましょう。まさかペロロ様の新作グッズに、購入制限があったなんて……。"
80000005-4 = "近くにお友達は誰もいないみたいですし、もし呼んでも待っている間に売り切れになったりしたら……。"
80000005-5 = "[s] \"や、ヒフミ。もしかして何か困ってる？\""
80000005-6 = "あっ、先生！ちょうど良いタイミングで……！"
80000005-7 = "あの、今日だけでいいので……"
80000005-8 = "わ、私とカップルになっていただけませんか？"
80000005-9 = "あ、えっと……その……変な意味ではなくて……。"
80000005-10 = "[s1] \"なるほど、理解した。\"\n[s2] \"カップル専用のグッズが欲しいとか？\""
80000005-11 = "あっ……はい、そうです。"
80000005-12 = "あっ……はい、そうです。"
80000005-13 = "今回のバレンタインデーを記念して、ペロロ様の新作チョコレートが発売されたんですが、お店に着いてみたらカップルにだけ販売しているそうで……。"
80000005-14 = "説明もしてないのにすぐに気づくなんて、さすがは先生です！"
80000005-15 = "[s] \"ヒフミとの付き合いも長いからね。\""
80000005-16 = "ふふ、そうですね。先生にお会いしてからもう……"
80000005-17 = "なんてお話している場合ではありませんでした！ペロロ様チョコが売り切れてしまうかもしれません！先生、早くお店に入りましょう！"
80000005-23 = "（その後、ヒフミと一緒にカップル専用のペロロチョコレートを買った。）"
80000005-26 = "購入成功ですね！ペロロ様のバレンタイン限定チョコレート、無事に手に入れられました！"
80000005-27 = "私たちのが最後だなんて……ギリギリでしたね。"
80000005-28 = "先生が偶然いらっしゃらなかったら、買い逃してしまっていたかもしれません。本当にありがとうございました！"
80000005-29 = "あれ？限定チョコレートが2セットも入ってますね、店員さんのミスでしょうか……？"
80000005-30 = "……あ、いえ。カップル用の商品なので最初から2セットになっていたみたいですね。"
80000005-35 = "はい、どうぞ。ひとつは先生に。"
80000005-36 = "[s] \"貴重な限定グッズなのに、良いの？\""
80000005-37 = "はい。これが手に入ったのは先生のおかげですから。"
80000005-38 = "それに今日はバレンタインデーですし、プレゼントはしたかったですし……"
80000005-39 = "あ、いえその、とにかく大事にしてくれると嬉しいです！"
