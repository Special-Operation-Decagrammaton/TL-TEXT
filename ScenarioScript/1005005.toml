[translation]
1005005-1 = "Não importa o que digam, o que eu não gosto, eu não gosto!"
1005005-2 = "Centro da cidade"
1005005-3 = "（Enquanto caminhava pela cidade, encontrei a Kokona）"
1005005-4 = "Ah, Sensei. Bom dia."
1005005-5 = "Ahaha... Eu estava com uma cara de cansada? #nEntão você também percebeu, Sensei..."
1005005-6 = "Eu estava pensando em como fazer as crianças me chamarem de Instrutora Kokona de forma mais natural."
1005005-7 = "Desde o dia em que você veio nos visitar, elas voltaram a me chamar de Kokona-chan..."
1005005-8 = "[s1] \"Enquanto a Kokona odiar cenouras.\"\n[s2] \"Acho que vão continuar te chamando de 'Kokona-chan', não é?\""
1005005-9 = "Mesmo assim, eu odeio cenouras!"
1005005-10 = "Mesmo assim, eu odeio cenouras!"
1005005-11 = "Não importa o que digam, o que eu não gosto, eu não gosto!"
1005005-12 = "Isso é a única coisa que não pretendo mudar!"
1005005-13 = "Por que eu odeio tanto cenouras? Você pergunta... #n...Hmm."
1005005-14 = "Na verdade, eu me pergunto como as outras pessoas conseguem comer cenouras."
1005005-15 = "É amarga, dura e tem um cheiro estranho..."
1005005-16 = "Originalmente, cenouras nem eram vegetais para consumo humano."
1005005-17 = "Então, por que os humanos começaram a comer cenouras..."
1005005-18 = "Eu considero isso um claro retrocesso cultural."
1005005-19 = "Nós precisamos avançar mais. Precisamos evoluir."
1005005-20 = "Não podemos ficar comendo coisas como cenouras enquanto fazemos o relógio andar para trás!"
1005005-21 = "Ah, o pimentão é a mesma coisa. De certa forma, é até pior que a cenoura."
1005005-22 = "Eles são amargos e fedidos, mas o pimentão ainda tem um gosto picante, não tem?"
1005005-23 = "[s3] \"Então, suponhamos.\"\n[s4] \"Se você tivesse que comer obrigatoriamente um dos dois, cenoura ou pimentão, qual escolheria?\""
1005005-24 = "Sim?"
1005005-25 = "Sim?"
1005005-26 = "Cenoura e pimentão... U-um dos dois? Obrigatoriamente...?"
1005005-27 = "Por que uma escolha tão terrível como essa..."
1005005-28 = "A justiça deve estar morta! #nSe não, isso não estaria acontecendo... Buááá!"
1005005-29 = "[s] \"E-era para ser um choque tão grande assim...?\""
1005005-30 = "Mas são cenouras e pimentões, né!? #nNão tem como ser diferente..."
1005005-31 = "Uuu... Se eu realmente tiver que comer um dos dois... Então..."
1005005-32 = "Então... Snif..."
1005005-33 = "...Prefiro a cenoura."
1005005-34 = "Surpreso? É que o pimentão ainda tem aquele gosto picante..."
1005005-35 = "Sensei, você é muito mau por perguntar isso. Muito mau!"
1005005-36 = "[s5] \"Desculpe... Eu conheço um restaurante que prepara cenouras de um jeito delicioso,\"\n[s6] \"quer ir comigo?\""
1005005-37 = "Sim...!? #nCenoura, restaurante, você disse...?"
1005005-38 = "Sim...!? #nCenoura, restaurante, você disse...?"
1005005-39 = "Eu realmente tenho que ir? Por sua conta, Sensei...? #nIsso é gentil e eu agradeço, mas..."
1005005-40 = "Não podemos ir a outro lugar? #nDeve haver tantas outras coisas mais gostosas no mundo..."
1005005-41 = "Poderíamos usar nosso tempo de forma mais produtiva, não poderíamos?"
1005005-42 = "Por que eu teria que ir a um lugar terrível chamado #nrestaurante de cenouras?!"
1005005-43 = "[s] \"Mas Kokona-chan, você disse que comeria cenoura, não disse?\""
1005005-44 = "E-eu disse isso, é verdade!"
1005005-45 = "Mas isso foi só porque a cenoura é melhor do que comer pimentão..."
1005005-46 = "Eu não quero ir a um restaurante que prepara pimentão de um jeito gostoso... #nO que você quer dizer com isso?! Buááá!"
1005005-47 = "Sensei é um adulto mau! Você é cruel! Odeio tudo isso!"
1005005-48 = "Todos os adultos são iguais! Buááá!"
1005005-50 = "（Tive muito trabalho para consolar e acalmar a Kokona, que começou a chorar）"
