[translation]
1005005-1 = "いくらなんでも嫌なものは嫌なんです！"
1005005-2 = "昼の街"
1005005-3 = "（市内を歩いている最中、ココナに会った）"
1005005-4 = "あ、先生。おはようございます。"
1005005-5 = "あはは……疲れた顔していましたか？#nやっぱり先生にもそう見えてしまいましたか……"
1005005-6 = "どうすればもっと自然に、園児たちにココナ教官と呼ばれるかを考えていました。"
1005005-7 = "先生に以前来ていただいた日から、またココナちゃん呼びに戻ってしまって……。"
1005005-8 = "[s1] \"ココナがニンジンを嫌う限りは。\"\n[s2] \"ずっと「ココナちゃん」って呼ばれるんじゃないかな？\""
1005005-9 = "それでもニンジンは嫌いです！"
1005005-10 = "それでもニンジンは嫌いです！"
1005005-11 = "何と言っても嫌なものは嫌なんです！"
1005005-12 = "これだけは変えるつもりはありません！"
1005005-13 = "どうしてそんなにニンジンが嫌いなのか？ですか。#n……うーん。"
1005005-14 = "私はむしろ、どうして他の人がニンジンを食べられるのかが気になります。"
1005005-15 = "苦いし、硬いし、臭いし……"
1005005-16 = "もともとニンジンは人が食べる野菜ではなかったんですよ。"
1005005-17 = "それなのに、どうして人間までニンジンを食べるようになってしまったのか……。"
1005005-18 = "私はこれを明白な文化の後退だと思います。"
1005005-19 = "私たちはもっと進まなければなりません。進化しなければならないんですよ。"
1005005-20 = "ニンジンなんかを食べながら、時計を逆さまに進めてはいけないんですよ！"
1005005-21 = "あ、ピーマンも同じです。ある意味、ニンジンよりもっとひどいです。"
1005005-22 = "苦くて臭いという点は同じなのに、辛みまであるじゃないですか。"
1005005-23 = "[s3] \"それじゃあ、もしも。\"\n[s4] \"ニンジンとピーマン、片方を必ず食べなきゃいけないなら、どっちを食べる？\""
1005005-24 = "はい？"
1005005-25 = "はい？"
1005005-26 = "ニンジンとピーマン……ど、どっちか？必ず……？"
1005005-27 = "どうしてこんな恐ろしい選択肢が……"
1005005-28 = "正義は死んだに違いないです！#nそうじゃなければこんなこと起こるはずがありません……うわーん！"
1005005-29 = "[s] \"そ、そこまでショックを受けること……？\""
1005005-30 = "だってニンジンとピーマンなんですよ！？#nそうするしかないじゃないですか……。"
1005005-31 = "ううぅ……必ず二つのうちの片方を食べなければならないのなら……それなら……"
1005005-32 = "それなら……ふええん……"
1005005-33 = "……いっそ、ニンジンです。"
1005005-34 = "意外ですか？だって、ピーマンは辛みまであるじゃないですか……"
1005005-35 = "こんなことを聞くなんて、先生は意地が悪いです。意地悪！"
1005005-36 = "[s5] \"ごめん……ニンジンをおいしく料理するレストランを知ってるんだけど、\"\n[s6] \"一緒に行ってみない？\""
1005005-37 = "はい……！？#nニンジン、レストラン、ですか……？"
1005005-38 = "はい……！？#nニンジン、レストラン、ですか……？"
1005005-39 = "絶対行かないとダメですか？先生の奢り……？#nそれは嬉しいし、ありがたいですけど……"
1005005-40 = "他のところじゃダメですか？#n世の中にはもっとおいしいものがたくさんあるはずですし……"
1005005-41 = "もっと時間を有意義に使うこともできますよね？"
1005005-42 = "何が悲しくてニンジンレストランとかいう#n恐ろしい場所に行かなきゃいけないんですか！？"
1005005-43 = "[s] \"でもココナちゃん、ニンジン食べるって言ってたでしょう？\""
1005005-44 = "た、確かにそう言いましたけど！"
1005005-45 = "それは……ピーマンを食べるよりはニンジンがマシということであって……"
1005005-46 = "ピーマンを美味しく料理するレストランに行きたいわけでは……#n本当に何ですか！うわぁあん！"
1005005-47 = "先生は悪い大人です！意地悪です！全部嫌いです！"
1005005-48 = "大人はみんな同じです！わぁああん！"
1005005-50 = "（泣き出してしまったココナを宥めて、あやすのに苦労した）"
