[translation]
10002135-1 = "第13話;夏空のウィッシュリスト"
10002135-2 = "（全ての花火を使い果たした頃、海辺は火薬の匂いで満ちていた）"
10002135-3 = "（ただでさえ暗い海辺が真っ黒な灰を被って、もはや漆黒の色に染まっており……）"
10002135-5 = "けほっ、けほっ！あうぅ……まだ煙で目が……。"
10002135-6 = "ふぅ、私たちの勝利ですね。"
10002135-7 = "夜の浜辺に、このナパーム弾の匂い……なるほど、これが海。悪くない。"
10002135-8 = "だから違うんですよアズサちゃん……。"
10002135-9 = "そもそも、どうしてこんなことに……。"
10002135-10 = "あっ、そ、そういえば写真を撮っていませんでした……！"
10002135-11 = "[s1] \"大丈夫、ちゃんと撮っておいたよ。\"\n[s2] \"結構素敵な写真だと思うよ。\""
10002135-12 = "ふぇ……！？せ、先生、いつの間に！？"
10002135-13 = "ふぇ……！？せ、先生、いつの間に！？"
10002135-16 = "み、見せてもらっても良いですか？……うわぁ、すごいです！"
10002135-17 = "こうして見ると、普通に綺麗な花火に見えますね……！？"
10002135-19 = "あっ、この写真、私たちも……いつの間に、こんなに……。"
10002135-20 = "[s] \"ツルギも見る？\""
10002135-22 = "ぐぎっ！？うぇぇ……！？"
10002135-23 = "……！！！！"
10002135-24 = "え、えっと……その……。"
10002135-25 = "ぜ、ぜひ……！"
10002135-27 = "（その後、朝日が昇るまでの間、できる限り海辺の片づけをした）"
10002135-28 = "（ごみを含めて、荷物を全てクルセイダーちゃんに運んだ頃、ちょうど朝日が昇り始めた）"
10002135-30 = "[ns] \"じゃあ、帰ろっか。\""
10002135-36 = "（思っていた以上に疲れたからか、案の定帰りの戦車の中では、ほとんどみんな眠っていた）"
10002135-37 = "（行きの時の緊張感は全く無く、みんな安らかで幸せな表情をしていた……）"
10002135-43 = "（……疲れてるはずなのに、頑張って運転をしてくれたヒフミ以外は）"
10002135-45 = "（海から帰ってきた翌日……）"
10002135-48 = "正義実現委員会部室"
10002135-51 = "あら、先生。お久しぶりですね。"
10002135-52 = "引率してくださったとのことで、ありがとうございました。海はいかがでしたか？"
10002135-53 = "マシロとツルギは今日も委員会の用事があって、今はいないのですが……。"
10002135-54 = "ツルギはかなり元気になったみたいでして、良かったです。ありがとうございます。"
10002135-55 = "マシロも、何だか少し余裕が生まれたと言いますか、良い意味で力が抜けた表情をしてました。"
10002135-56 = "あのお二人も、楽しめていたのなら良いのですが……先生から見て、いかがでしたか？"
10002135-57 = "[s3] \"最初はちょっと戸惑ってたみたいだけど……。\"\n[s4] \"夏休みの宿題に追われてる感じっていうか。\""
10002135-58 = "えっと、それは…？"
10002135-59 = "えっと、それは…？"
10002135-64 = "[ns] 二人から貰ったリストを差し出す。"
10002135-66 = "ああ、なるほど。余計なことかもしれないと少し迷ったのですが、やはり迷惑だったでしょうか……？"
10002135-67 = "……リストがあって助かったと思う、ですか？"
10002135-68 = "ふふっ、"
10002135-69 = "そう言ってくださるとありがたいですね。ある程度は意図していましたが……。"
10002135-70 = "あのお二人が、ツルギと打ち解けるのは難しいだろうなと思いまして。もちろん、マシロも含めて、四人が仲良くなってくれたら良いなとは思ってましたが……それは流石に高望みでしょうし。"
10002135-71 = "お二人をかえって緊張させてしまったのなら申し訳なかったのですが……。"
10002135-72 = "せめて、やる事が明確だったら、その時間だけでも楽しめるかなと……。"
10002135-73 = "[s5] \"さすがはハスミだね。\"\n[s6] \"それが無かったら、もっと大変だったかも。\""
10002135-74 = "ふふっ。先生にそう言っていただけると、胸のつかえがとれた気がします。"
10002135-75 = "ふふっ。先生にそう言っていただけると、胸のつかえがとれた気がします。"
10002135-76 = "よろしければ、お二人にお疲れ様でしたとお伝えください。"
10002135-77 = "恐らく私が言うよりも、先生からの方が良いでしょうから。"
10002135-78 = "あらためて、ありがとうございました。先生。"
10002135-83 = "それでは、また……"
10002135-88 = "[ns] \"ハスミ。\""
10002135-89 = "えっと、どうかしましたか？"
10002135-90 = "[s7] \"次は絶対、ハスミも一緒に行こうね。\"\n[s8] \"ハスミも一緒だったら、もっと楽しかったと思うよ。\""
10002135-91 = "それは……。"
10002135-92 = "それは……。"
10002135-93 = "ふふっ、なかなか私はここを離れられないのですが……。"
10002135-94 = "お言葉だけでもありがたく受け取っておきます。いつか、叶ったら良いですね。"
10002135-95 = "えっと……。"
10002135-96 = "もしかしてそれ以外にも、まだ何かご用事が……？"
10002135-97 = "……このリスト、ですか？"
10002135-98 = "……ふふっ、よくお分かりになりましたね。"
10002135-99 = "はい。疲れた時なんかに、いつかやりたいことをあれこれ想像しながら、まとめたりするんです。"
10002135-100 = "そういう意味では、これは確かに私のウィッシュリストですが……こうしてその通りに楽しんできてくれただけでも、私は嬉しいのですよ。"
10002135-101 = "そういえば忘れるところでした、写真の方はいかがでしたか？"
10002135-102 = "本当に仲良くなってもらうのは高望みだとしても、せめてそう見える、楽しそうな写真でも見られれば……と思ったのですが。"
10002135-103 = "[s] 写真を渡す。"
10002135-109 = "ありがとうございます、では拝見して……"
10002135-110 = "……えっと、思ったより多いですね？"
10002135-111 = "……。"
10002135-112 = "これは……"
10002135-113 = "[s9] \"高望みなんかじゃないよ。\"\n[s10] \"ウィッシュリスト、ちゃんと叶ってるでしょ？\""
10002135-119 = "……ふふっ、なるほど。"
10002135-125 = "……これは、良い写真ですね。"
10002135-126 = "夏空のウィッシュリスト"
