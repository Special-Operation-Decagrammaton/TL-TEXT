[translation]
10002135-1 = "Episódio 13: Lista de Desejos do Céu de Verão"
10002135-2 = "（Quando todos os fogos de artifício foram usados, a beira-mar estava cheia com o cheiro de pólvora）"
10002135-3 = "（A praia, que já era escura, estava coberta por cinzas pretas, tingida de um tom de breu...）"
10002135-5 = "Cof, cof! Auuu... Meus olhos ainda estão ardendo por causa da fumaça..."
10002135-6 = "Ufa, nossa vitória, hein."
10002135-7 = "O cheiro de napalm na praia à noite... Entendo, então isso é o mar. Nada mal."
10002135-8 = "Não é bem assim, Azusa-chan..."
10002135-9 = "Para começo de conversa, por que as coisas chegaram a esse ponto..."
10002135-10 = "Ah, i-isso mesmo, eu não tirei fotos...!"
10002135-11 = "[s1] \"Não se preocupe, eu tirei algumas.\"\n[s2] \"Acho que as fotos ficaram bem legais.\""
10002135-12 = "Hã...!? P-Sensei, desde quando você estava aí!?"
10002135-13 = "Hã...!? P-Sensei, desde quando você estava aí!?"
10002135-16 = "P-Posso dar uma olhada? ...Uau, que incrível!"
10002135-17 = "Olhando assim, parece um fogo de artifício comum, não é...!?"
10002135-19 = "Ah, essa foto, nós também... Desde quando, e como..."
10002135-20 = "[s] \"Tsurugi, quer ver também?\""
10002135-22 = "Gugui!? Ueee...!?"
10002135-23 = "……！！！！"
10002135-24 = "E-Errado... é que..."
10002135-25 = "C-Com certeza...!"
10002135-27 = "（Depois disso, até o sol nascer, limpamos a praia o máximo que pudemos）"
10002135-28 = "（Quando terminamos de carregar tudo, incluindo o lixo, para dentro da Crusader-chan, o sol começou a nascer）"
10002135-30 = "[ns] \"Bem, vamos voltar então.\""
10002135-36 = "（Talvez por estarem mais cansadas do que imaginavam, quase todas dormiram no tanque durante a volta）"
10002135-37 = "（Sem a tensão da ida, todas tinham expressões serenas e felizes...）"
10002135-43 = "（...exceto pela Hifumi, que mesmo exausta, se esforçou para dirigir）"
10002135-45 = "（No dia seguinte ao retorno da praia...）"
10002135-48 = "Sala do Comitê de Justiça"
10002135-51 = "Ah, Sensei. Faz tempo."
10002135-52 = "Obrigada por ter acompanhado elas. Como foi o mar?"
10002135-53 = "Mashiro e Tsurugi estão ocupadas com assuntos do comitê hoje, então não estão aqui agora..."
10002135-54 = "Fico feliz que a Tsurugi pareça estar bem melhor. Obrigada."
10002135-55 = "A Mashiro também parece estar mais relaxada, como se tivesse ganhado um pouco mais de tranquilidade."
10002135-56 = "Se elas se divertiram, fico feliz... Na sua visão, Sensei, como foi?"
10002135-57 = "[s3] \"Parecia que elas estavam um pouco confusas no começo...\"\n[s4] \"Parecia que estavam correndo contra o tempo, como se fosse um dever de casa de férias.\""
10002135-58 = "Err, isso é..."
10002135-59 = "Err, isso é..."
10002135-64 = "[ns] Entrega a lista que recebeu das duas."
10002135-66 = "Ah, entendo. Fiquei na dúvida se seria um incômodo, mas será que foi um problema...?"
10002135-67 = "...Você acha que a lista foi útil?"
10002135-68 = "Fufu,"
10002135-69 = "Fico grata por dizer isso. Eu tinha algumas intenções, é claro..."
10002135-70 = "Pensei que seria difícil para elas se aproximarem da Tsurugi. Claro, eu esperava que as quatro se dessem bem, incluindo a Mashiro... mas isso talvez fosse pedir demais."
10002135-71 = "Sinto muito se acabei deixando as duas ainda mais tensas..."
10002135-72 = "Pelo menos, se tivessem tarefas claras, pensei que poderiam aproveitar o tempo..."
10002135-73 = "[s5] \"Como esperado da Hasumi.\"\n[s6] \"Se não fosse por isso, teria sido ainda mais difícil.\""
10002135-74 = "Fufu. Ouvir isso de você, Sensei, me tira um peso do peito."
10002135-75 = "Fufu. Ouvir isso de você, Sensei, me tira um peso do peito."
10002135-76 = "Se puder, por favor, diga a elas que fizeram um bom trabalho."
10002135-77 = "Provavelmente será melhor vindo de você do que de mim."
10002135-78 = "Mais uma vez, muito obrigada. Sensei."
10002135-83 = "Bem, então, até mais..."
10002135-88 = "[ns] \"Hasumi.\""
10002135-89 = "Ah, aconteceu alguma coisa?"
10002135-90 = "[s7] \"Da próxima vez, com certeza, vamos juntos, Hasumi.\"\n[s8] \"Acho que teria sido muito mais divertido se você estivesse lá também, Hasumi.\""
10002135-91 = "Isso é..."
10002135-92 = "Isso é..."
10002135-93 = "Hehe, é um pouco difícil para mim sair daqui, mas..."
10002135-94 = "Fico grata apenas pelas suas palavras. Seria maravilhoso se isso pudesse se realizar algum dia."
10002135-95 = "Ah..."
10002135-96 = "Por acaso, além disso, você ainda tem algum outro assunto...?"
10002135-97 = "...Esta lista, você diz?"
10002135-98 = "...Hehe, você percebeu, não é?"
10002135-99 = "Sim. Quando estou cansada, costumo imaginar coisas que gostaria de fazer algum dia e as anoto."
10002135-100 = "Nesse sentido, esta é certamente a minha lista de desejos, mas... só de saber que você se divertiu seguindo-a, já fico muito feliz."
10002135-101 = "Ah, quase me esqueci, como ficaram as fotos?"
10002135-102 = "Mesmo que pedir para que se tornem amigos próximos seja pedir demais, eu esperava pelo menos ver fotos que parecessem divertidas..."
10002135-103 = "[s] Entregar as fotos."
10002135-109 = "Obrigada, vou dar uma olhada..."
10002135-110 = "...Ah, tem mais do que eu esperava, não é?"
10002135-111 = "..."
10002135-112 = "Isto é..."
10002135-113 = "[s9] \"Não é pedir demais.\"\n[s10] \"A lista de desejos foi realizada, não foi?\""
10002135-119 = "...Hehe, entendo."
10002135-125 = "...Estas são fotos muito boas."
10002135-126 = "Lista de Desejos do Céu de Verão"
