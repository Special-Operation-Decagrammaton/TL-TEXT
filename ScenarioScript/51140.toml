[translation]
51140-1 = "第14話;少女の決心"
51140-5 = "[ns] \"ユカリはどこに……。\""
51140-10 = "（探したものの、既にユカリの姿はなかった）"
51140-13 = "お祭り会場ってこっちだっけ？"
51140-14 = "早く行こ！屋台売り切れちゃう！"
51140-20 = "あっ、待ってよ～！"
51140-24 = "お祭りが始まる時に花火が打ち上がるんだって。"
51140-25 = "花火製造所の新作らしいね！楽しみ～！"
51140-27 = "（街中で飛び交う、期待に満ちた声を横目に）"
51140-28 = "（人混みの中、ユカリを探し続けていると……）"
51140-31 = "先生……！"
51140-32 = "あちらも探してみましたが、どこにも見当たらなくて…… "
51140-33 = "もしかしたらもう、この辺りにはいないのかもしれません……#nどうしましょう？"
51140-34 = "[s1] \"人が多すぎるからね……。\"\n[s2] \"人が増えてきてるし、探すのはどんどん難しくなるかも。\""
51140-37 = "あ、もうこんな時間……！？"
51140-38 = "[s] \"そろそろお祭りが始まるんだよね？\""
51140-39 = "あっ、はい。#nあと1時間くらいしたら本格的に始まります。"
51140-40 = "今も本部ではウミカとフィーナが準備を進めてくれてて……"
51140-41 = "[s3] \"シズコ達が頑張って準備したお祭りだもんね。\"\n[s4] \"そろそろ戻ったほうがいいんじゃないかな？\""
51140-44 = "あ……それは、そうですが……"
51140-48 = "……。"
51140-49 = "……やっぱり放っておけません。"
51140-50 = "今回のお祭りの主役は「儀式」………つまり「勘解由小路の巫女による舞」なんです。"
51140-51 = "20年前のお祭りを再現すると決めた以上、#n「巫女の舞」は必要だと思っています。誰もが心躍るようなお祭りにするためにも。"
51140-52 = "ですが……それ以上に今は、ユカリさんと話をしたいです。"
51140-53 = "[s] \"……シズコ。\""
51140-55 = "[ns] \"どうして、お祭りを再現しようと思ったの？\""
51140-56 = "その……"
51140-57 = "なにか特別な理由があるわけではなくて……"
51140-59 = "単に……忘れられてしまったお祭りを再現したい、そう思っただけなんです。"
51140-60 = "百鬼夜行が、連合となった時から連綿と続いていたお祭り――"
51140-61 = "そんな素晴らしいお祭りがこのまま忘れ去られてしまうのは、もったいないと思いませんか？ "
51140-62 = "[s] \"たしかに、もったいないかも……。\""
51140-64 = "そうなんです！"
51140-65 = "私は、たくさんの人が笑顔になれるようなお祭りを作りたいんです。"
51140-66 = "そんなお祭りを開催できれば観光客も楽しめますし……#nその分、財布の紐も緩くなるかも？なーんて期待もできちゃいますし。 "
51140-67 = "百夜堂の名前もキヴォトス全域に広まってブランドパワーをゲット！"
51140-68 = "……というのは流石に冗談ですけどね。"
51140-69 = "[s] \"冗談かな……？\""
51140-73 = "本当に冗談ですからね！？"
51140-74 = "……開催にあたって、障害もたくさんありました。"
51140-75 = "でも、たくさんの人に助けられて、なんとかここまでこられたんです。"
51140-76 = "だから……みんなが笑顔でお祭りの日を迎えられたらな、って……"
51140-77 = "そんなお祭りにできるようにって、頑張ってきたんですけど……"
51140-78 = "[s] \"シズコはそのために百花繚乱にも来てたもんね。\""
51140-79 = "はい……でも、ユカリさんの件は……私のせいです。"
51140-80 = "これまで[ruby=かでのこうじ]勘解由小路[/ruby]家の巫女様と連絡がつかないのは、タイミングが悪かったとしか思ってなくて。そのうち連絡もとれるだろうと思っていたんです。"
51140-81 = "まさか……ユカリさんと百花繚乱の間でそんなことがあったなんて。 "
51140-82 = "私、安易に考えすぎていたのかもしれません。"
51140-83 = "[s] \"シズコ……。\""
51140-84 = "ですから、なおさら引き返せません。 "
51140-85 = "お祭りの成功のため、だけじゃなく……"
51140-86 = "先生も言っていましたよね。"
51140-88 = "「ユカリさんの気持ちは、ユカリさんのもの」だと……"
51140-89 = "私もそう思います。"
51140-91 = "やりたいことをやるべきだし、それを決めるのは本人です。"
51140-92 = "……誰も、ユカリさんにそれを伝えていないんですよね？"
51140-93 = "なら、このままでは帰れません。"
51140-94 = "いや……帰りたくないんです。#nユカリさんと会って、話をするまでは。"
51140-98 = "[ns5] \"そっか……シズコらしいね。\"\n[ns6] \"さすが、我らがお祭り運営委員会の委員長！\""
51140-101 = "へっ！？"
51140-102 = "い、いえ！そんな風に言われるようなことじゃ……"
51140-103 = "[s] \"じゃあ、二手に分かれて探そうか。\""
51140-104 = "これから人が増える前に、短期決戦でいこうってわけですね。"
51140-105 = "うう……"
51140-106 = "はい！それでいきましょう！"
51140-107 = "[s] \"お互い、見つけたら連絡を入れよう。\""
51140-108 = "はい！お任せください！"
51140-109 = "ユカリさんの捜索――"
51140-110 = "再開です！"
51140-122 = "（皆、口を揃えて言う――）"
51140-126 = "今代のお嬢様は大変優秀ですね。"
51140-127 = "ええ。この間の百鬼夜行連合試験でも満点で！"
51140-128 = "先日のコンクールでも優勝されて……"
51140-131 = "本当にまっすぐで真面目で、美しいお方です。"
51140-132 = "どんなことでもテキパキとこなす姿は、まさに皆の鑑。"
51140-133 = "本当によかった……これであれば無事、今代も――"
51140-135 = "百鬼夜行の歴史に、[ruby=かでのこうじ]勘解由小路[/ruby]の名を刻めることでしょう。"
51140-140 = "（満点をとるのは当然で）"
51140-143 = "（他人の役に立つのは当たり前で）"
51140-144 = "（期待通りに在るのは義務だった）"
51140-146 = "名は、勘解由小路ユカリ。"
51140-147 = "百鬼夜行の中でも名高い一家、勘解由小路家の令嬢。"
51140-148 = "「勘解由小路家の者としてまっすぐ在りなさい」"
51140-149 = "それが私の使命であり、義務。"
51140-154 = "……身共も存じております。それが身共のやるべきことだと。"
51140-156 = "でも。"
51140-158 = "（まっすぐな背中）"
51140-159 = "初めて……「やるべきこと」ではなく「やりたいこと」を教えてくれた人。"
51140-160 = "初めてあの方に会ったあの日。"
51140-165 = "お、お待ちください！"
51140-166 = "……あれ？まだ帰ってなかったんだ。#nもう遅い時間だから――"
51140-167 = "ナグサ……先輩！#nその……今の、とっても格好良くて……身共感銘を受けましたの！"
51140-168 = "……ん？"
51140-169 = "どうしたら身共もナグサ先輩のようになれるのでしょうか？"
51140-170 = "……私の、ように。"
51140-171 = "そうだね……"
51140-172 = "毎日、一生懸命運動する……とか？"
51140-173 = "むむ……毎日の運動！なるほど……身共には少し難しいかもしれません……"
51140-178 = "身共、思いつきました！"
51140-179 = "身共も百花繚乱に入れば良いのです！"
51140-181 = "ん……？"
51140-183 = "そうすれば、ナグサ先輩と共に……！ "
51140-185 = "ナグサ先輩の隣で活動できるはず！#n身共、決めましたの！"
51140-193 = "あの時……身共は心を決めたのです。"
51140-194 = "百花繚乱の一員になって、憧れのあの方と、皆様と一緒になりたいと。"
51140-198 = "でも――"
51140-200 = "あの時点で、百花繚乱は終わってたんだ。"
51140-202 = "認めたら？"
51140-203 = "百花繚乱[ruby=・   ・   ・]ごっこ[/ruby]は、もう終わったんだよ。"
51140-205 = "レンゲ先輩、キキョウ先輩……"
51140-206 = "皆様……。"
51140-209 = "身共が描いていた光景を……"
51140-210 = "誰も望んでいないのなら……"
51140-213 = "…………お祭り。"
51140-214 = "そう……お祭りが、始まりますのね。"
51140-215 = "本来であれば、百花繚乱が警備をするのですが……"
51140-216 = "今はもう……。"
51140-221 = "はぁ……はぁ……#n見つけた……！こちらに居たんですね！"
51140-227 = "ユカリさん！探しましたよ！"
51140-228 = "あなた様はたしか……お祭り運営委員長？#nどうして身共を……？"
51140-229 = "あ……お祭りのことで身共を探して……？"
51140-230 = "百花繚乱の調停室に戻りましょう！"
51140-231 = "……えっ。"
51140-232 = "百花繚乱の作戦参謀でしたっけ、あの方。"
51140-233 = "ちょっと言い過ぎだと思います！ユカリさんの話を聞きもしないであんなこと言うなんて！"
51140-234 = "自分の居場所を決めるのは自分なのに……偉そうに……！"
51140-235 = "さあっ！戻って話し合いましょう！"
51140-236 = "こういう時は、腹を割って話すものです！"
51140-238 = "もうお祭りが始まるのに……"
51140-239 = "委員長が身共の個人的な問題を……何故？"
51140-240 = "私、こういうのを見過ごせないんです！"
51140-241 = "………………そうですか。"
51140-242 = "……お言葉ありがとうございます。#nでも身共は大丈夫ですわ。"
51140-243 = "えっ、大丈夫ってどういう……"
51140-244 = "キキョウ先輩のお言葉も、間違ってないと思うのです。"
51140-245 = "身共が家から逃げ出したというのは、本当ですから。"
51140-246 = "お遊びだと言われるのも当然でしょう。#nたとえ、身共にそのつもりがなかったとしても。"
51140-247 = "でも……！"
51140-248 = "お祭り運営委員長……いえ、シズコさん。"
51140-249 = "もう時間がありません。#n幸い、儀式の手順は覚えておりますので……"
51140-250 = "身共、[ruby=かでのこうじ]勘解由小路[/ruby]ユカリは――"
51140-255 = "――ご希望の通り、巫女として参加いたしましょう。"
51140-260 = "ええっ！？"
51140-263 = "（ユカリを探して街中を走り続けていると）"
51140-267 = "[ns] \"……あ。\""
51140-268 = "（お祭りのスタートが目前に迫っていた）"
51140-272 = "聞きました？"
51140-273 = "今回のメインイベント、「巫女の舞」らしいですよ！"
51140-274 = "「百鬼夜行燈籠祭」のですよね？#n「巫女の舞」……今回は誰がやるのでしょう？"
51140-275 = "やっぱりチセ様でしょうか？"
51140-276 = "あ、それなんですけど、20年前の「巫女の舞」を務めた一族の方がやるらしいですよ。"
51140-277 = "たしか……"
51140-278 = "――「[ruby=かでのこうじ]勘解由小路[/ruby]」って言ってたような。"
51140-279 = "[s] （勘解由小路……）"
51140-280 = "そういえば、どうして百鬼夜行灯篭祭はなくなってしまったんでしょうね？"
51140-281 = "今回再現したとは聞きましたが、どうしてなくなったのかは知らないですねぇ。"
51140-282 = "ま、終わったことだしいいじゃないですか。#nこれからを楽しみましょう。"
51140-283 = "それもそうですね。"
51140-284 = "このために百鬼夜行まで来たんだし、全力で楽しみましょ！"
51140-292 = "[ns] \"……お祭りがなくなった理由、か。\""
51140-297 = "[ns] \"あ、シズコからの電話だ。\""
51140-301 = "（電話に出ようとしたその時――）"
51140-308 = "[ns] （…………ん？）"
51140-313 = "機は熟した。"
51140-314 = "数多の積み上げられた物語が、いま始まりが訪れるのを待っている。"
51140-318 = "これより紡がれるは、手前どもの「[ruby=かいだん]百物語[/ruby]」。"
51140-323 = "アハハッ！ご挨拶申し上げますぅ。"
51140-324 = "ずっと、手前様にお会いしたかったんですよぉ？#n――シャーレの先生。"
51140-326 = "次回;遭遇"
