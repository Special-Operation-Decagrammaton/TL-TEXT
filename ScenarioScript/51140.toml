[translation]
51140-1 = "Episódio 14; A Decisão de Uma Garota"
51140-5 = "[ns] \"Onde a Yukari está...\""
51140-10 = "(A procurei por toda parte, mas a Yukari já não estava à vista)"
51140-13 = "O local do festival é pra cá, né?"
51140-14 = "Vamos logo! As barraquinhas vão esgotar!"
51140-20 = "Ah, espera por mim~!"
51140-24 = "Ouvi dizer que vão soltar fogos de artifício no começo do festival."
51140-25 = "Parece que é um modelo novo da fábrica de fogos! Mal posso esperar~!"
51140-27 = "(Com as vozes cheias de expectativa ecoando pela cidade...)"
51140-28 = "(Continuei procurando a Yukari no meio da multidão até que...)"
51140-31 = "Sensei...!"
51140-32 = "Eu procurei por lá também, mas não consegui encontrá-la em lugar nenhum... "
51140-33 = "Talvez ela não esteja mais por aqui... #n O que faremos?"
51140-34 = "[s1] \"O problema é que tem muita gente...\"\n[s2] \"E com mais pessoas chegando, vai ficar cada vez mais difícil procurá-la.\""
51140-37 = "Ah, já é essa hora...!?"
51140-38 = "[s] \"O festival já vai começar, não é?\""
51140-39 = "Ah, sim. #n O evento principal vai começar em mais ou menos 1 hora."
51140-40 = "A Umika e a Pina estão na sede preparando tudo neste exato momento..."
51140-41 = "[s3] \"Vocês se esforçaram tanto para preparar esse festival.\"\n[s4] \"Acho melhor você voltar, não?\""
51140-44 = "Ah... isso, é verdade, mas..."
51140-48 = "......"
51140-49 = "......Eu não consigo simplesmente ignorar isso."
51140-50 = "A atração principal deste festival é o 'Ritual'......... ou seja, 'A Dança da Miko da Família Kadenokouji'."
51140-51 = "Já que decidimos recriar o festival de 20 anos atrás, #n acho que a 'Dança da Miko' é necessária. Até mesmo para que seja um festival que empolgue o coração de todos."
51140-52 = "Mas... mais importante do que isso agora, eu quero conversar com a Yukari-san."
51140-53 = "[s] \"......Shizuko.\""
51140-55 = "[ns] \"Por que você decidiu recriar o festival?\""
51140-56 = "Ehm..."
51140-57 = "Não é como se eu tivesse um motivo especial..."
51140-59 = "Eu só... queria reviver um festival que havia sido esquecido, foi o que pensei."
51140-60 = "Um festival que era realizado continuamente desde quando a Hyakkiyako se tornou uma 'aliança'――"
51140-61 = "Você não acha um desperdício que um festival tão maravilhoso seja simplesmente esquecido para sempre? "
51140-62 = "[s] \"Realmente, pode ser um desperdício...\""
51140-64 = "É isso!"
51140-65 = "Eu quero criar um festival que traga sorrisos para muitas pessoas."
51140-66 = "Se conseguirmos realizar um festival assim, os turistas também vão se divertir... #n E talvez até gastem mais nas barraquinhas? Dá pra criar algumas expectativas sobre isso também. "
51140-67 = "O nome da Hyakkiyadou vai se espalhar por toda Kivotos e nossa marca ganhará muito mais poder!"
51140-68 = "......Bem, isso é brincadeira, claro."
51140-69 = "[s] \"Será que é...?\""
51140-73 = "É sério, é brincadeira!?"
51140-74 = "......Tivemos muitos obstáculos até conseguirmos realizar o festival."
51140-75 = "Mas, com a ajuda de muitas pessoas, conseguimos chegar até aqui."
51140-76 = "Por isso... eu queria que todos pudessem aproveitar o dia do festival com um sorriso..."
51140-77 = "Eu me esforcei para que esse fosse o tipo de festival que conseguiríamos realizar, mas..."
51140-78 = "[s] \"Foi por isso que você foi até a Hyakkaryouran também, né.\""
51140-79 = "Sim... mas, sobre o que aconteceu com a Yukari-san... a culpa é minha."
51140-80 = "Eu achei que era apenas falta de sorte não ter conseguido entrar em contato com a Miko da família Kadenokouji até agora. Pensei que, eventualmente, conseguiríamos falar com ela."
51140-81 = "Nunca imaginei... que algo assim tivesse acontecido entre a Yukari-san e a Hyakkaryouran. "
51140-82 = "Talvez eu estivesse encarando as coisas de forma muito superficial."
51140-83 = "[s] \"Shizuko...\""
51140-84 = "Por isso, agora é que eu não posso desistir. "
51140-85 = "Não apenas para o sucesso do festival, mas..."
51140-86 = "O Sensei também disse, não foi."
51140-88 = "Que 'Os sentimentos da Yukari-san pertencem a ela'..."
51140-89 = "Eu também acho."
51140-91 = "Ela deve fazer o que quer fazer, e quem decide isso é ela mesma."
51140-92 = "......Ninguém disse isso para a Yukari-san, não é?"
51140-93 = "Nesse caso, eu não posso ir embora assim."
51140-94 = "Não... eu não quero ir embora. #n Até que eu possa encontrar a Yukari-san e conversar com ela."
51140-98 = "[ns5] \"Entendo... Bem a cara da Shizuko.\"\n[ns6] \"Como esperado da presidente do Comitê de Operações do Festival!\""
51140-101 = "Eh!?"
51140-102 = "N-Não! Não é pra tanto..."
51140-103 = "[s] \"Então, que tal nos dividirmos para procurá-la?\""
51140-104 = "Você quer dizer que devemos resolver isso rápido, antes que a multidão aumente?"
51140-105 = "Uhh..."
51140-106 = "Certo! Vamos fazer isso!"
51140-107 = "[s] \"Se alguém a encontrar, avisa o outro.\""
51140-108 = "Certo! Deixe comigo!"
51140-109 = "A busca pela Yukari-san――"
51140-110 = "Recomeça!"
51140-122 = "(Todos dizem a mesma coisa――)"
51140-126 = "A atual senhorita da família é muito talentosa."
51140-127 = "Sim. Ela tirou a pontuação máxima no recente Exame Conjunto da Hyakkiyako!"
51140-128 = "E também venceu o concurso que ocorreu dias atrás..."
51140-131 = "Ela é realmente muito honesta, séria e de uma beleza ímpar."
51140-132 = "Vê-la lidar com tudo com tanta agilidade é, sem dúvida, um exemplo a ser seguido."
51140-133 = "Que alívio... Desse jeito, a atual geração também..."
51140-135 = "Conseguirá gravar com sucesso o nome Kadenokouji na história da Hyakkiyako."
51140-140 = "(Tirar a nota máxima era óbvio)"
51140-143 = "(Ajudar os outros era natural)"
51140-144 = "(Ser como esperavam era minha obrigação)"
51140-146 = "Meu nome é Kadenokouji Yukari."
51140-147 = "Sou a filha de uma família renomada até mesmo dentro da Hyakkiyako, a família Kadenokouji."
51140-148 = "'Como um membro da família Kadenokouji, mantenha-se íntegra.'"
51140-149 = "Essa é minha missão, meu dever."
51140-154 = "......Eu estou ciente. Sei que é o que eu devo fazer."
51140-156 = "Porém."
51140-158 = "(Uma silhueta íntegra de costas)"
51140-159 = "Foi a primeira pessoa... que me mostrou 'o que eu quero fazer' em vez de 'o que eu devo fazer'."
51140-160 = "O dia em que a conheci."
51140-165 = "E-Espera, por favor!"
51140-166 = "......Ah? Ainda não foi para casa. #n Já é tarde, então――"
51140-167 = "Nagusa... senpai! #n Você foi muito legal agora há pouco... eu fiquei impressionada!"
51140-168 = "......Hm?"
51140-169 = "O que eu devo fazer para ser como você, Nagusa-senpai?"
51140-170 = "......Como eu?"
51140-171 = "Deixa eu ver..."
51140-172 = "Talvez... se esforçando nos treinos físicos todos os dias?"
51140-173 = "Hmm... treino físico todo dia! Entendi... isso pode ser um pouco difícil para mim..."
51140-178 = "Eu tive uma ideia!"
51140-179 = "Eu só preciso entrar para a Hyakkaryouran também!"
51140-181 = "Hm...?"
51140-183 = "Assim eu poderei...!"
51140-185 = "Trabalhar ao seu lado, Nagusa-senpai! #n Eu já me decidi!"
51140-193 = "Naquele momento... eu tomei a minha decisão."
51140-194 = "Que me tornaria membro da Hyakkaryouran, para poder ficar junto com a senpai que eu tanto admiro e com todas vocês."
51140-198 = "Mas――"
51140-200 = "Naquele momento, a Hyakkaryouran acabou."
51140-202 = "Por que não admite logo?"
51140-203 = "Essa [ruby=·   ·   ·]brincadeira[/ruby] de Hyakkaryouran já acabou."
51140-205 = "Renge-senpai, Kikyou-senpai..."
51140-206 = "Todas..."
51140-209 = "Se a visão que eu tinha..."
51140-210 = "Não é desejada por mais ninguém..."
51140-213 = "............O festival."
51140-214 = "É mesmo... o festival já vai começar."
51140-215 = "Normalmente a Hyakkaryouran faria a segurança..."
51140-216 = "Mas agora, não mais..."
51140-221 = "*Haa... haa*... #n Te encontrei...! Então você estava aqui!"
51140-227 = "Yukari-san! Eu estava te procurando!"
51140-228 = "Você é... a Presidente do Comitê de Operações do Festival? #n O que quer comigo...?"
51140-229 = "Ah... estava me procurando por causa do festival...?"
51140-230 = "Vamos voltar para a sala de mediação da Hyakkaryouran!"
51140-231 = "......Hã?"
51140-232 = "Aquela garota é a estrategista da Hyakkaryouran, não é."
51140-233 = "Acho que ela exagerou! Dizer aquilo sem nem mesmo ouvir o que você tinha a dizer, Yukari-san!"
51140-234 = "Sendo que quem decide qual é o seu próprio lugar é você mesma... agindo de forma tão arrogante...!"
51140-235 = "Vamos lá! Volte e converse com ela!"
51140-236 = "Nessas horas, o melhor a se fazer é ser honesta consigo mesma e conversar!"
51140-238 = "O festival já vai começar..."
51140-239 = "Por que a presidente está se preocupando com um problema pessoal meu...?"
51140-240 = "Porque não consigo ignorar algo assim!"
51140-241 = "..................Entendo."
51140-242 = "......Agradeço as suas palavras. #n Mas, está tudo bem comigo."
51140-243 = "Eh, como assim está tudo bem..."
51140-244 = "Acho que as palavras da Kikyou-senpai também não estão erradas."
51140-245 = "Afinal de contas, é verdade que eu fugi de casa."
51140-246 = "E é natural que digam que é tudo uma brincadeira. #n Mesmo que essa não fosse a minha intenção."
51140-247 = "Mas...!"
51140-248 = "Presidente do Comitê de Operações do Festival... não, Shizuko-san."
51140-249 = "Não temos mais tempo. #n Felizmente, ainda me lembro dos passos do ritual..."
51140-250 = "Eu, Kadenokouji Yukari, irei――"
51140-255 = "――participar como Miko, como desejam."
51140-260 = "Eeh!?"
51140-263 = "(Depois de continuar correndo pela cidade em busca da Yukari)"
51140-267 = "[ns] \"......Ah.\""
51140-268 = "(O início do festival estava muito próximo)"
51140-272 = "Vocês ouviram?"
51140-273 = "Parece que o evento principal desta vez vai ser a 'Dança da Miko'!"
51140-274 = "No 'Festival das Lanternas da Hyakkiyako', certo? #n 'A Dança da Miko'... quem será a Miko desta vez?"
51140-275 = "Será que é a senhorita Chise?"
51140-276 = "Ah, sobre isso, ouvi dizer que a pessoa que vai dançar é de uma família tradicional, a mesma que cuidou da 'Dança da Miko' há 20 anos."
51140-277 = "Se não me engano..."
51140-278 = "――O nome era 'Kadenokouji', eu acho."
51140-279 = "[s] (Kadenokouji...)"
51140-280 = "Falando nisso, por que será que o Festival das Lanternas da Hyakkiyako tinha deixado de ser realizado?"
51140-281 = "Ouvi dizer que o recriaram agora, mas não faço ideia do motivo de ter acabado."
51140-282 = "Bom, seja o que for, ficou no passado, não é? #n Vamos nos divertir agora."
51140-283 = "É verdade."
51140-284 = "Até porque viemos até a Hyakkiyako para isso, vamos curtir com tudo!"
51140-292 = "[ns] \"......O motivo de o festival ter deixado de existir, hein.\""
51140-297 = "[ns] \"Ah, uma ligação da Shizuko.\""
51140-301 = "(Na hora em que eu estava prestes a atender o telefone――)"
51140-308 = "[ns] (............Hm?)"
51140-313 = "O momento é propício."
51140-314 = "Inúmeras histórias acumuladas, apenas esperando o seu começo chegar."
51140-318 = "O que será tecido a partir de agora é a nossa 'História de Fantasmas'."
51140-323 = "Ahaha! Muito prazer em conhecê-lo."
51140-324 = "Eu queria tanto te conhecer, sabia? #n ――Sensei da Schale."
51140-326 = "Próximo Episódio; O Encontro"
