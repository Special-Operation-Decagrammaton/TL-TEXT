[translation]
51140-1 = "Episódio 14; A Decisão da Garota"
51140-5 = "[ns] \"Onde será que a Yukari foi...\""
51140-10 = "（Procurei por toda parte, mas Yukari já não estava em lugar nenhum）"
51140-13 = "O local do festival é por aqui, né?"
51140-14 = "Vamos logo! As barracas vão ficar sem comida!"
51140-20 = "Ei, me esperem!"
51140-24 = "Disseram que vão soltar fogos de artifício quando o festival começar."
51140-25 = "Parece que são novidades da fábrica de fogos! Que empolgante!"
51140-27 = "（Olhando de relance para as vozes cheias de expectativa que ecoavam pela cidade）"
51140-28 = "（Enquanto continuava procurando por Yukari no meio da multidão...）"
51140-31 = "Sensei...!"
51140-32 = "Eu também procurei por lá, mas não a encontrei em lugar nenhum..."
51140-33 = "Talvez ela não esteja mais por aqui...#nO que devemos fazer?"
51140-34 = "[s1] \"Tem gente demais aqui...\"\n[s2] \"O número de pessoas está aumentando, vai ficar cada vez mais difícil encontrá-la.\""
51140-37 = "Ah, já é essa hora...!?"
51140-38 = "[s] \"O festival já vai começar, não é?\""
51140-39 = "Ah, sim. #nVai começar de verdade daqui a uma hora mais ou menos."
51140-40 = "A Umika e a Pina continuam preparando tudo na sede..."
51140-41 = "[s3] \"Afinal, a Shizuko e as outras se esforçaram muito nesse festival.\"\n[s4] \"Não seria melhor você voltar logo?\""
51140-44 = "Ah... é verdade, mas..."
51140-48 = "..."
51140-49 = "...Eu não consigo simplesmente ignorar isso."
51140-50 = "A atração principal deste festival é o \"ritual\"... ou seja, a \"dança da sacerdotisa da família Kadenokouji\"."
51140-51 = "Já que decidi recriar o festival de 20 anos atrás, #na \"dança da sacerdotisa\" é indispensável. Para que este seja um festival que faça o coração de todos vibrar."
51140-52 = "Mas... mais do que isso, agora eu quero conversar com a Yukari-san."
51140-53 = "[s] \"...Shizuko.\""
51140-55 = "[ns] \"Por que você decidiu recriar esse festival?\""
51140-56 = "Bem..."
51140-57 = "Não é como se houvesse um motivo especial..."
51140-59 = "Eu só... queria recriar um festival que foi esquecido, foi só isso."
51140-60 = "Um festival que continuou ininterruptamente desde que Hyakkiyako se tornou uma união..."
51140-61 = "Não acha um desperdício deixar um festival tão maravilhoso ser esquecido assim?"
51140-62 = "[s] \"Realmente, seria um desperdício...\""
51140-64 = "Exatamente!"
51140-65 = "Eu quero criar um festival onde muitas pessoas possam sorrir."
51140-66 = "Se conseguirmos realizar um festival assim, os turistas vão se divertir... #ne talvez, quem sabe, eles fiquem mais generosos com a carteira? É uma expectativa que eu tenho."
51140-67 = "O nome da Hyakkiyako vai se espalhar por todo o Kivotos e vamos ganhar poder de marca!"
51140-68 = "...Isso foi uma brincadeira, claro."
51140-69 = "[s] \"Será que foi brincadeira mesmo...?\""
51140-73 = "Foi uma brincadeira de verdade, eu juro!"
51140-74 = "...Tivemos muitos obstáculos para realizar este evento."
51140-75 = "Mas, com a ajuda de muitas pessoas, conseguimos chegar até aqui."
51140-76 = "Por isso... eu queria que todos pudessem receber o dia do festival com um sorriso..."
51140-77 = "Eu me esforcei muito para que o festival fosse assim, mas..."
51140-78 = "[s] \"Foi por isso que a Shizuko também foi até a Hyakkiyouran, né?\""
51140-79 = "Sim... mas o caso da Yukari-san... a culpa é minha."
51140-80 = "Até agora, eu achava que não conseguir contato com a sacerdotisa da família Kadenokouji era apenas uma questão de azar. Achei que conseguiria falar com ela eventualmente."
51140-81 = "Eu nunca imaginei... que algo assim tivesse acontecido entre a Yukari-san e a Hyakkiyouran."
51140-82 = "Talvez eu tenha sido ingênua demais."
51140-83 = "[s] \"Shizuko...\""
51140-84 = "Por isso mesmo, não posso voltar atrás."
51140-85 = "Não é só pelo sucesso do festival..."
51140-86 = "O Sensei também disse, não disse?"
51140-88 = "Que \"os sentimentos da Yukari-san pertencem à Yukari-san\"..."
51140-89 = "Eu também penso assim."
51140-91 = "Devemos fazer o que queremos, e quem decide isso é a própria pessoa."
51140-92 = "...Ninguém disse isso para a Yukari-san, não é?"
51140-93 = "Então, não posso voltar para casa assim."
51140-94 = "Não... eu não quero voltar. #nAté encontrar a Yukari-san e conversar com ela."
51140-98 = "[ns5] \"Entendi... É a sua cara, Shizuko.\"\n[ns6] \"Como esperado da nossa presidente do Comitê de Operações do Festival!\""
51140-101 = "Hã!?"
51140-102 = "N-não! Não é para tanto..."
51140-103 = "[s] \"Então, vamos nos dividir em dois grupos para procurar.\""
51140-104 = "Entendi, vamos resolver isso rapidamente antes que o lugar fique cheio."
51140-105 = "Uuu..."
51140-106 = "Sim! Vamos fazer isso!"
51140-107 = "[s] \"Vamos nos avisar se encontrarmos algo.\""
51140-108 = "Sim! Deixe comigo!"
51140-109 = "A busca pela Yukari-san—"
51140-110 = "Recomeça agora!"
51140-122 = "(Todos dizem em uníssono—)"
51140-126 = "A jovem desta geração é extremamente talentosa."
51140-127 = "Sim. Ela tirou nota máxima até no exame da União de Hyakkiyako!"
51140-128 = "Ela também venceu o concurso outro dia..."
51140-131 = "Ela é uma pessoa verdadeiramente íntegra, séria e bela."
51140-132 = "Sua forma de lidar com tudo com eficiência é um exemplo para todos."
51140-133 = "Que bom... Com isso, esta geração também poderá—"
51140-135 = "Gravar o nome Kadenokouji na história de Hyakkiyako."
51140-140 = "(Tirar nota máxima era o esperado)"
51140-143 = "(Ser útil aos outros era natural)"
51140-144 = "(Viver de acordo com as expectativas era um dever)"
51140-146 = "O nome é Kadenokouji Yukari."
51140-147 = "A filha da família Kadenokouji, uma das mais renomadas de Hyakkiyako."
51140-148 = "\"Como alguém da família Kadenokouji, viva de forma íntegra.\""
51140-149 = "Essa é a minha missão e o meu dever."
51140-154 = "...Eu também sei disso. Sei que é isso que devo fazer."
51140-156 = "Mas."
51140-158 = "(Aquelas costas retas)"
51140-159 = "Pela primeira vez... a pessoa que me ensinou não o que eu \"deveria fazer\", mas o que eu \"queria fazer\"."
51140-160 = "Naquele dia, quando a conheci pela primeira vez."
51140-165 = "E-espere um momento!"
51140-166 = "...Ué? Você ainda não tinha ido embora? #nJá está tarde, então—"
51140-167 = "Nagusa... senpai! #nAquilo... foi muito incrível... fiquei muito impressionada!"
51140-168 = "...Hm?"
51140-169 = "O que eu devo fazer para me tornar como a Nagusa-senpai?"
51140-170 = "...Como eu?"
51140-171 = "Bem..."
51140-172 = "Talvez... se exercitar bastante todos os dias?"
51140-173 = "Hum... exercícios diários! Entendo... talvez seja um pouco difícil para mim..."
51140-178 = "Já sei!"
51140-179 = "Eu também deveria entrar para o Hyakkiyako Ryoran!"
51140-181 = "Hm...?"
51140-183 = "Se eu fizer isso, poderei ficar junto com a Nagusa-senpai...!"
51140-185 = "Deveria ser possível atuar ao lado da Nagusa-senpai!#nEu tomei minha decisão!"
51140-193 = "Naquela época... eu tomei uma decisão."
51140-194 = "Que me tornaria um membro do Hyakkiyako Ryoran para ficar junto daquela pessoa que tanto admiro, e de todos vocês."
51140-198 = "Mas..."
51140-200 = "Naquele momento, o Hyakkiyako Ryoran já tinha acabado."
51140-202 = "Por que não admite?"
51140-203 = "A brincadeira de Hyakkiyako Ryoran já acabou."
51140-205 = "Renge-senpai, Kikyou-senpai..."
51140-206 = "Todos vocês..."
51140-209 = "Se a cena que eu imaginava..."
51140-210 = "Se ninguém mais a deseja..."
51140-213 = "............O festival."
51140-214 = "É verdade... o festival vai começar, não é?"
51140-215 = "Normalmente, o Hyakkiyako Ryoran faria a segurança, mas..."
51140-216 = "Agora, já não..."
51140-221 = "Haa... haa...#nTe encontrei...! Você estava aqui!"
51140-227 = "Yukari-san! Eu te procurei por toda parte!"
51140-228 = "Você é, se não me engano... a presidente do comitê organizador do festival?#nPor que você está me procurando...?"
51140-229 = "Ah... você está me procurando por causa do festival...?"
51140-230 = "Vamos voltar para a sala de mediação do Hyakkiyako Ryoran!"
51140-231 = "...Eh."
51140-232 = "A estrategista do Hyakkiyako Ryoran, não é?"
51140-233 = "Acho que ela passou dos limites! Dizer aquelas coisas sem nem ouvir o que você tinha a dizer, Yukari-san!"
51140-234 = "Quem decide o seu lugar é você mesma... que arrogância...!"
51140-235 = "Vamos! Volte lá e conversem!"
51140-236 = "Nessas horas, é preciso abrir o coração e conversar!"
51140-238 = "O festival já vai começar..."
51140-239 = "Por que a presidente do comitê está se preocupando com os meus problemas pessoais...?"
51140-240 = "Eu não consigo ignorar esse tipo de coisa!"
51140-241 = "..................Entendo."
51140-242 = "...Agradeço pelas suas palavras.#nMas eu estou bem."
51140-243 = "Eh, como assim, está bem?"
51140-244 = "Acho que as palavras da Kikyou-senpai não estão erradas."
51140-245 = "É verdade que eu fugi de casa."
51140-246 = "É natural que digam que é apenas uma brincadeira.#nMesmo que, para mim, não fosse essa a intenção."
51140-247 = "Mas...!"
51140-248 = "Presidente do comitê organizador do festival... não, Shizuko-san."
51140-249 = "Não temos mais tempo.#nFelizmente, eu me lembro dos procedimentos do ritual, então..."
51140-250 = "Eu, Kadenokouji Yukari, vou..."
51140-255 = "— Como você deseja, participarei como a sacerdotisa."
51140-260 = "O quê!?"
51140-263 = "(Enquanto corria pela cidade procurando por Yukari)"
51140-267 = "[ns] \"...Ah.\""
51140-268 = "(O início do festival estava prestes a acontecer)"
51140-272 = "Você ouviu?"
51140-273 = "Dizem que o evento principal desta vez é a \"Dança da Sacerdotisa\"!"
51140-274 = "Do \"Festival das Lanternas de Hyakkiyako\", não é?#n\"Dança da Sacerdotisa\"... quem será que vai fazer desta vez?"
51140-275 = "Será que é a senhorita Chise?"
51140-276 = "Ah, sobre isso, parece que será alguém da família que realizou a 'Dança da Sacerdotisa' há 20 anos."
51140-277 = "Se não me engano..."
51140-278 = "— Acho que disseram 'Kadenokouji'."
51140-279 = "[s] (Kadenokouji...)"
51140-280 = "Falando nisso, por que será que o Festival das Lanternas de Hyakkiyako acabou?"
51140-281 = "Ouvi dizer que o recriaram desta vez, mas não sei por que ele tinha desaparecido."
51140-282 = "Bem, já passou, então não tem problema, né?#nVamos aproveitar o que vem pela frente."
51140-283 = "É verdade."
51140-284 = "Já que viemos até Hyakkiyako para isso, vamos aproveitar ao máximo!"
51140-292 = "[ns] \"...O motivo do festival ter acabado, é?\""
51140-297 = "[ns] \"Ah, é uma ligação da Shizuko.\""
51140-301 = "(No momento em que tentei atender o telefone—)"
51140-308 = "[ns] (............hã?)"
51140-313 = "A hora chegou."
51140-314 = "Inúmeras histórias acumuladas aguardam agora o momento de começar."
51140-318 = "O que será tecido a partir de agora são as nossas 'Cem Histórias'."
51140-323 = "Ahaha! Permita-me cumprimentá-lo."
51140-324 = "Eu queria muito te encontrar, sabe?#n— Sensei de Schale."
51140-326 = "Próximo episódio: Encontro"
