[translation]
42180-1 = "Episódio 18; Elite e Elite"
42180-4 = "Seus... seus inúteis...! #nJá esqueceram da gratidão por eu ter dado comida e um teto para vocês, que não tinham nem emprego nem casa!?"
42180-6 = "Gratidão? Para começo de conversa, não foram vocês que nos sequestraram e nos forçaram a trabalhar?!"
42180-7 = "Eu tomei uma decisão por causa disso. #nDe agora em diante, eu nunca mais vou trabalhar na vida—"
42180-8 = "—e vou me opor a toda e qualquer propriedade neste mundo!"
42180-9 = "Venham, seus bandos de pirralhos imundos e gananciosos!"
42180-10 = "Pessoas como vocês não são páreo para mim, Descartes!"
42180-12 = "Seus ingratos traidores... com quem vocês pensam que estão falando!!"
42180-23 = "A-ah..."
42180-24 = "C-camarada... me ajude...!"
42180-28 = "Ah! Dói, dói!"
42180-29 = "Não dá para enfrentar os soldados regulares da Kaiser...!"
42180-30 = "F-fujam...!"
42180-35 = "Seus covardes!! Não fujam!"
42180-37 = "Graças ao pessoal da 'Sociedade de Bem-Estar', evitamos a desvantagem numérica, mas... #nainda falta poder de ruptura."
42180-38 = "Não sabemos quando os reforços da Kaiser Security chegarão, então, se não rompermos logo, corremos o risco de sermos cercados..."
42180-39 = "Sabendo do perigo, não tenho escolha a não ser ir eu mesma..."
42180-44 = "Ué? Aquela pessoa é..."
42180-51 = "...Que confusão é essa aqui?"
42180-52 = "Poderiam me explicar — Kaiser Security?"
42180-53 = "Diretora da Segurança Pública! Que bom que chegou. #nDê um jeito nesses caras!"
42180-54 = "Lidar com esses desajustados sociais não é o trabalho de vocês?"
42180-59 = "Hii... a 'Cão Raivoso' daquela época...?"
42180-74 = "O-o que você está fazendo...!?"
42180-75 = "Como a Diretora da Segurança Pública da Academia Valkyrie ousa atirar em nós, que temos autoridade de chefes de defesa!"
42180-77 = "...Diretora da Segurança Pública?"
42180-78 = "Vocês deveriam saber... a Segurança Pública está suspensa no momento por medidas disciplinares."
42180-79 = "Então, o que veio fazer aqui? #nSem ter autoridade nenhuma... por acaso veio comprar briga?"
42180-80 = "A segurança deste local é nossa responsabilidade. #nValkyrie, suma daqui logo!"
42180-81 = "Bem, mesmo que não seja a Segurança Pública, ainda restam organizações capazes de manter a ordem em D.U."
42180-82 = "—Regulamento de Serviço da Academia Valkyrie, Artigo 32, Parágrafo 1. Alunas da 'Divisão de Segurança e Vida' podem deter temporariamente cidadãos que obstruam o uso do metrô e do transporte público."
42180-89 = "...Como parte do serviço comunitário, pensei em ajudar no trabalho da Divisão de Segurança e Vida."
42180-95 = "Aqui é a Divisão de Segurança e Vida! Joguem as armas no chão e deitem-se!"
42180-100 = "Idiota... o lixo que parasita a sociedade está ali!"
42180-101 = "Estamos cumprindo nosso dever oficial de acordo com as normas!"
42180-103 = "Mesmo sendo da Kaiser Security, não há exceções!"
42180-104 = "Já que causaram tumulto na frente da estação, peço que nos acompanhem até a delegacia pacificamente!"
42180-105 = "Se não pretendem cooperar, podemos usar força bruta, sabe? #n...É melhor virem por bem antes que as coisas fiquem complicadas."
42180-107 = "...A Divisão de Segurança e Vida? Vocês vão nos subjugar...?"
42180-108 = "Kuku... Hahaha!"
42180-109 = "O-o que há de tão engraçado!?"
42180-110 = "Não é engraçado? A Divisão de Segurança e Vida nos subjugar pela força?"
42180-111 = "Embora estejamos operando sob outro nome agora, somos um grupo de elite composto pelos membros mais talentosos das SOF dentro da Kaiser PMC."
42180-112 = "Já vocês são um bando de desajustados com o armamento mais pobre da Academia Valkyrie. E ainda assim, acham que são páreo para nós... é um sonho distante!"
42180-113 = "Não importa quão capaz seja o comandante, peixes pequenos nunca vencerão a elite."
42180-115 = "Vocês só vão aprender que existe um muro intransponível entre a elite e os não-elite. É melhor desistirem."
42180-117 = "Desajustados...? #nVocês parecem estar enganados sobre algo —"
42180-118 = "A Divisão de Segurança e Vida é uma organização especial onde apenas a elite mais talentosa da Academia Valkyrie pode entrar."
42180-119 = "...Até eu, que sou a Diretora da Segurança Pública, já me candidatei para a Divisão de Segurança e Vida e fui reprovada."
42180-121 = "O quê? O que é isso..."
42180-122 = "Ei, você sabia?"
42180-123 = "A Estação Coelhinho não passa por reformas há mais de 10 anos, então...#nOs suportes que seguram a placa estão bem deteriorados."
42180-124 = "Nos últimos meses, não param de chegar reclamações aqui dizendo que a placa balança e causa preocupação nos dias de vento forte."
42180-125 = "Por isso, por motivos de segurança, decidimos trocá-la no final deste mês, mas..."
42180-126 = "E então, o que você quer dizer com isso?"
42180-127 = "...Eu queria que você tivesse ouvido a história até o fim."
42180-128 = "Bem, em resumo... é que a placa pode cair com qualquer impacto leve."
42180-133 = "Essa garota, não me diga que..."
42180-135 = "Cuidado com a sua cabeça também~"
42180-145 = "Esses policiais... acham que podem se aproveitar só porque estamos sendo bonzinhos...#nNão vou ter piedade!"
42180-147 = "Kirino, granada de fumaça!"
42180-148 = "Pode deixar comigo!"
42180-153 = "Droga, minha visão..."
42180-154 = "Bloqueiem a entrada! Não deixem que eles entrem na estação!"
42180-159 = "Disseram que era pelo bem dos cidadãos, mas... parece que eles não querem que ninguém chegue perto da estação."
42180-160 = "...Mas escolheram o lugar errado para se esconder. Para o Departamento de Segurança Pública, que patrulha aqui diariamente, a estação é como o nosso campo de jogo."
42180-164 = "Kirino, Fubuki."
42180-165 = "Junto com os outros alunos, cuidem de conter esses 'passageiros rebeldes'."
42180-166 = "Eu vou ficar aqui na entrada para garantir que não apareçam mais suspeitos."
42180-168 = "Sim!"
42180-169 = "Chefe Kanna~#nVocê vai comprar aquele cruller de edição limitada da Master Donuts como prometeu, né?"
42180-171 = "Sim, eu não esqueci. Vou te entregar mais tarde."
42180-172 = "...E quanto a vocês, da SRT."
42180-173 = "O resto está com vocês."
42180-174 = "...Mas, se você desobedecer às ordens aqui, você vai..."
42180-175 = "— Não há necessidade de você se preocupar com isso."
42180-176 = "Como eu disse antes — a responsabilidade e as decisões são coisas que eu mesma tomo."
42180-177 = "Se for para seguir a justiça em que acredito — não me importa o que aconteça comigo."
42180-178 = "Chefe..."
42180-183 = "Sendo assim, Sensei.#nConto com você para lidar com esses idiotas."
42180-184 = "[s] \"Sim, obrigado Kanna. Pode deixar comigo.\""
42180-185 = "Muito bem, então..."
42180-191 = "— Você já deve ter ouvido o nome 'Cão Louco' pelo menos uma vez, não é?"
