[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 11/06.
42180-1 = "Episódio 18;Elite Contra Elite"
42180-4 = "Malditos sejam vocês, bando de imprestáveis……!!#nNós tiramos vocês do esgoto, demos marmita e alojamento, e é assim que vocês retribuem a Kaiser?! Mordendo a mão de quem alimenta?!"
42180-6 = "Alimentam?! Vocês nos colocaram num caminhão à força, nos espancaram e nos escravizaram em trabalhos braçais, seus fascistas sujos!"
42180-7 = "Essa humilhação de engolir sapo de patrão acabou aqui. Eu juro pela minha alma:#nEu nunca mais vou bater ponto na vida――!"
42180-8 = "――E vou lutar até a morte contra todo e qualquer sistema que ouse ser dono de alguma coisa!!"
42180-9 = "Caiam dentro, seus capitalistas imundos! Eu não tenho nada a perder!"
42180-10 = "Capachos como vocês não aguentam nem cinco minutos de soco contra o Sublime Descartes!!"
42180-12 = "Seu rato ingrato do maldito…… Eu vou arrancar a sua língua!!"
42180-23 = "Aiiih……!! Meus ossos……"
42180-24 = "C-Companheiros…… não fiquem aí parados, atirem neles……!"
42180-28 = "Ugh! Ferrou, me acertaram! Ai, ai!"
42180-29 = "Não dá, caramba! Esses caras são militares da Kaiser, a gente não aguenta o chumbo deles……!"
42180-30 = "A barricada quebrou…… Salve-se quem puder……!!"
42180-35 = "SEUS COVARDES!! Voltem pra linha de frente! Reúnam!!"
42180-37 = "O levante suicida dos mendigos da Irmandade FeliSem engoliu muita munição inimiga e equilibrou os números pra nós……#nMas eles não têm treinamento tático pra romper a linha de choque de verdade."
42180-38 = "Nós não sabemos a que distância os reforços da Kaiser estão. Se não arrombarmos a porta agora, eles vão nos esmagar por flanqueamento……"
42180-39 = "O risco de emboscada é alto, mas não tem outro jeito…… eu vou ter que liderar a invasã--"
42180-44 = "Hã? Quem é aquela ali no asfalto……"
42180-51 = "……Alguém quer me explicar que desgraça tá rolando no meu asfalto?"
42180-52 = "Tô no aguardo do relatório oficial, lixos da Kaiser Security."
42180-53 = "Aha! A Ex-Chefe da Segurança Pública! Chegou na hora perfeita.#nO Controle de Pragas é a especialidade de vocês. Trancafia essa laia de marginais pra gente!"
42180-54 = "Vocês da Valkyrie não servem pra muita coisa além de lidar com lixo social inútil de rua mesmo, né?"
42180-59 = "Hiiiih…… A-Ah…… É O CACHORRO LOUCO DE KIVOTOS…… A KANNA……!!"
42180-74 = "Q-QUE DROGA É ESSA……?! POR QUE ATIROU NA GENTE?!"
42180-75 = "Nós operamos sob a bênção divina da Presidente Kaya! Você é só a Chefe caída da Segurança Pública! Como ousa apontar a arma pra nós?!"
42180-77 = "……\"Chefe da Segurança Pública\"?"
42180-78 = "Acho que a inteligência falha de vocês perdeu as notícias…… Eu fui escorraçada do cargo. O Bureau tá com as portas fechadas por insubordinação."
42180-79 = "Então o que diabos você veio caçar aqui se não tem distintivo nem farda?!#nVeio só encher o saco e levar um tiro nas costas?!"
42180-80 = "O perímetro dessa estação pertence à Kaiser!#nVaza daqui antes que a gente jogue a Valkyrie inteira no lixo!!"
42180-81 = "Talvez. Mas mesmo com as patas da Segurança Pública atadas, eu não sou a única insígnia capaz de varrer o lixo das vias de D.U."
42180-82 = "――Artigo 32, Parágrafo 1º do Código de Conduta da Academia de Polícia Valkyrie: \"Cadetes do Bureau de Segurança Cidadã e Trânsito possuem autonomia tática letal para incapacitar, imobilizar ou deter suspeitos que interrompam deliberadamente o fluxo civil nas redes de metrô\"."
42180-89 = "……Achei que sujar as mãos prestando horas de serviço voluntário pra ajudar minhas calouras do Trânsito a limpar a rua seria uma boa terapia pro estresse……"
42180-95 = "Atenção!! A Segurança Cidadã chegou! Todo mundo com a barriga no chão e fuzil no asfalto agora!!"
42180-100 = "Vocês têm merda na cabeça?! A gente não tá atrapalhando nada, os parasitas que tão quebrando tudo são os mendigos ali!!"
42180-101 = "Nós somos Oficiais Cumprindo a Lei em serviço direto da Segurança da Cidade!!"
42180-103 = "Para nós, não importa se você usa o logo da Kaiser ou se veste farrapos! A lei não tem rosto!"
42180-104 = "Fazer baderna armada em frente à bilheteria de transporte público é vandalismo! Andando, as duas mãos na cabeça até a viatura!"
42180-105 = "Se vocês resistirem muito à prisão…… a gente vai ter que usar força bruta, sabiam?#n……Pra não machucar os joelhos à toa, é mais fácil só chorar e deitar~."
42180-107 = "……Segurança Cidadã? O esquadrão de guarda de trânsito acha que tem colhões pra dominar e deter a gente……?"
42180-108 = "Kuh…… HAHAHAHA!! ESSA É A MELHOR PIADA DO ANO!"
42180-109 = "Qual é a graça?! Tão duvidando da nossa autoridade tática?!"
42180-110 = "Não, nós estamos duvidando é da sanidade de vocês. As guardinhas de quarteirão acham que conseguem desarmar um esquadrão de assalto militar da Kaiser?"
42180-111 = "Para a informação dos lixos, nós vestimos a farda de guardas agora, mas todo o nosso esquadrão foi forjado no inferno! Nós somos as lendas de Forças Especiais (SOF) da antiga Kaiser PMC."
42180-112 = "E nós teríamos que abaixar a cabeça pra Segurança Cidadã? A escória da escoria da polícia, um lixão de alunos com desempenho patético?! Vocês não servem nem pra lustrar a nossa bota!!"
42180-113 = "O General pode ser durão, mas cadetes fracassadas não derrubam veteranos forjados no sangue. A matemática é simples."
42180-115 = "A barreira genética e tática entre a pura Elite e o lixo nunca será quebrada. Rastejem de volta pra delegacia antes que virem peneira."
42180-117 = "Lixo……? Cês têm certeza que a miopia de vocês não tá atacando?――"
42180-118 = "O Bureau de Segurança Cidadã é a jóia rara da Academia Valkyrie. Eles possuem os talentos investigativos e operacionais mais fora da curva que o Governo já viu."
42180-119 = "……Pra te dar contexto do nível absurdo de lá: Até mesmo eu, a Cão Louco de Segurança Pública, fiz a prova de aptidão pro Bureau Cidadã anos atrás…… e fui reprovada e expulsa por inaptidão técnica."
42180-121 = "QUÊ?! O Cão Louco reprovou lá……?!"
42180-122 = "Vocês tão sabendo dessa fofoca de bairro~?"
42180-123 = "A última manutenção estrutural na fachada da Estação dos Coelhinhos rolou tem mais de uma década……#nE, cê sabe…… as vigas de sustentação e os vergalhões do mega-letreiro no topo da escada enferrujaram bonito."
42180-124 = "Eu tô engavetando reclamações de civis há meses, dizendo que o letreiro de trinta toneladas fica balançando no telhado quando venta forte."
42180-125 = "Como a gente zela pela vida, o cronograma dizia pra gente chamar o guindaste e arrancar aquilo do telhado na semana que ve――"
42180-126 = "Que droga de diário de prefeitura chato é esse que cê tá lendo no meio do tiro, caramba?!"
42180-127 = "……Poxa, cê tinha que ter escutado a explicação até o fim pra entender o aviso~"
42180-128 = "Resumindo a bula…… Um tirinho ali na haste de ferro e a gravidade vai fazer os trinta mil quilos despencarem do céu."
42180-133 = "ESPERA, ESSA DESGRAÇADA VAI――"
42180-135 = "É sempre bom olhar pra cima quando andar debaixo do letreiro, tá~?"
42180-145 = "Cadetes miseráveis!! Como ousam explodir o letreiro em cima do meu pelotão?!#nCortem elas no meio com as escopetas!! MATA!"
42180-147 = "Kirino! Granada de fumaça pesada, agora!!"
42180-148 = "Fogo na cobertura! Puxando o pino!!"
42180-153 = "Aargh, o corredor inteiro sumiu……!"
42180-154 = "Fechem as catracas e as saídas! Não deixem elas infiltrarem os túneis da estação de jeito nenhum!!"
42180-159 = "Interessante…… Minutos atrás vocês gritavam que vieram defender os civis, mas agora o pânico em impedir a nossa entrada nas vias é palpável. O que vocês escondem no escuro?"
42180-160 = "……Mas adivinhem: Vocês escolheram ser encurralados pela Segurança Cidadã no pior lugar de Kivotos. Nós patrulhamos a geometria dessa estação e das escadas todo santo dia."
42180-164 = "Kirino. Fubuki."
42180-165 = "Puxem os esquadrões de apoio pra dentro e esmaguem todos os \"Arruaceiros do Transporte\" escondidos no breu."
42180-166 = "Eu engatilho o revólver aqui na entrada e cuido para que nem um mosquito passe pelas portas pra dar reforço a eles."
42180-168 = "Entendido, Capitã!"
42180-169 = "Ai ai, Chefe Kanna~#nVocê vai me dever duas caixas daquele Cruller de Chocolate edição limitada do Mister Donuts pela hora-extra, não esquece~"
42180-171 = "Eu jamais daria um calote na minha tropa de apoio. Eu vou enfiar os doces no seu armário, te dou minha palavra."
42180-172 = "……E, Miyako da SRT."
42180-173 = "Vá lá e acabe com essa desgraça."
42180-174 = "……Chefe Kanna…… nós não queríamos jogar sangue no seu nome. Se a senhora segurar o cordão de mercenários atirando…… o Novo Conselho não vai perdoar isso……"
42180-175 = "――Por que você tá se preocupando com a minha ficha criminal suja num momento crítico desses?"
42180-176 = "Vocês esqueceram a lição? ――A glória e o fardo de uma ação devem ser engolidos com o peito aberto por quem fez a escolha. E essa foi a minha."
42180-177 = "Se eu vou ser lembrada como heroína ou como traidora fuzilada no pelotão amanhã…… eu não me importo. Hoje o gatilho da justiça é o meu."
42180-178 = "Chefe Kanna……"
42180-183 = "Sensei. O tabuleiro tá limpo. Pegue a sua aluna de elite e varra as sombras.#nEu cuido desse lixo na porta."
42180-184 = "[s] \"Muito obrigado, Kanna. Pela bravura e por tudo.\""
42180-185 = "Hmph…… É um bom dia pra morrer."
42180-191 = "――Vamos descobrir na pele se as armaduras da Kaiser aguentam as mordidas do Cão Louco!"