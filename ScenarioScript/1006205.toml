[translation]
1006205-1 = "趣味の悩み"
1006205-2 = "シャーレオフィス"
1006205-3 = "（トキと一緒にシャーレの仕事を始めた）"
1006205-9 = "[ns] \"トキってさ。\""
1006205-10 = "はい、先生。"
1006205-11 = "[s] \"こういう仕事、慣れてるよね。\""
1006205-12 = "こういうお仕事、とは……？"
1006205-13 = "[s] \"資料の整理とか書類仕事全般。\""
1006205-14 = "僭越ですが、以前お仕えしていた方のもとでも、よくやっておりましたから。"
1006205-15 = "ご指示くだされば、掃除や洗濯、料理まで、何でもいたしますよ。"
1006205-16 = "[s1] \"これだけでも十分ありがたいよ。\"\n[s2] \"大変だと感じたりしない？\""
1006205-19 = "シャーレのお仕事が、ですか？"
1006205-20 = "特に大変だとは思いません。#nむしろ仕事が少なくて、どこか落ち着かないくらいです。"
1006205-21 = "せっかく優秀なメイドがいるのですから、遠慮せずに有効活用すべきです。"
1006205-22 = "例えば普段の護衛はもちろん、爆弾解除や対象の追跡、撃退、破壊、殲滅、滅亡……どんなことでも構いません。"
1006205-23 = "[s] \"メイドだよね……？\""
1006205-24 = "はい。これこそ、優秀なメイドに求められる能力です。"
1006205-25 = "[s] \"そ、そうなのか……も？\""
1006205-26 = "もちろん、私は完璧なメイドですので、全て可能です。"
1006205-27 = "[s3] \"は、話は変わるけどさ！\"\n[s4] \"休日は何をしてるの？趣味とかないのかなって！\""
1006205-30 = "シュミ……？"
1006205-31 = "何を言っているのか、よく分かりません。#nシュミとはどのようなものなのですか？"
1006205-32 = "余った時間に行うこと、ですか。"
1006205-33 = "……難しい問題ですね。#n今まで特に時間が余るようなことはなく……。"
1006205-34 = "[s5] \"それで本当にいいの！？\"\n[s6] \"トキにも楽しいことを見つけてもらわないと！\""
1006205-37 = "せ、先生……？"
1006205-38 = "はい？今すぐ行こう、って……？#nせ、先生、もう少し優しく……！"
1006205-43 = "キヴォトス・市内"
1006205-44 = "[ns] \"映画、どうだった？\""
1006205-45 = "理解できませんでした。"
1006205-46 = "どうしてわざわざ乱戦に持ち込んだのでしょうか？#n遠くから狙撃すれば、無駄な犠牲者を出すこともなかったでしょう。"
1006205-47 = "それに最初から余計な話をせずに始末していれば、逃げられることもなかったと思いますが。"
1006205-48 = "[s] \"ドラマ性の全否定！？\""
1006205-49 = "他にも納得いかない点が多かったです。#nまずは冒頭のシーンなのですが……。"
1006205-51 = "（トキは映画のいい加減な演出について、30分以上語り続けた）"
1006205-53 = "……以上です。"
1006205-54 = "[s] \"……の、喉乾かない？\""
1006205-55 = "いえ、お気遣いありがとうございます。"
1006205-56 = "はい？普通はもっと構えずに楽しむものなのですか？"
1006205-57 = "なるほど……。#nどうやら映画を趣味にするには、鍛錬が必要なようです。"
1006205-59 = "商店街"
1006205-60 = "[ns] \"漫画も合わなかったか……。\""
1006205-61 = "絵を通じて情報を伝えるという趣旨は理解しました。"
1006205-62 = "ですが、情報の密度や正確性を考慮すると、漫画にする必要性はあるのでしょうか？"
1006205-63 = "情報の密度では文字に劣り、正確性では映像に劣ります。"
1006205-64 = "それでも時間や労力のかかる絵に拘るのは……なぜなのでしょう。"
1006205-65 = "まだ私には理解の及ばない理由があるとは思うのですが、よく分かりません。"
1006205-69 = "ウィンドウショッピングとは、不思議なものですね……。"
1006205-70 = "見るだけのはずが、必要のないものまで購入してしまうなんて。"
1006205-71 = "なぜ不必要な衝動買いに走ってしまうのでしょうか？"
1006205-72 = "私には、分かりません……。"
1006205-73 = "[ns] \"楽しくなかった……？\""
1006205-75 = "（その後も、様々な「趣味」を試してみた）"
1006205-76 = "（トキが興味を示してくれたものは……ひとつもなかった）"
1006205-78 = "キヴォトス・市内"
1006205-79 = "[ns] \"お疲れさま、トキ……。\""
1006205-80 = "大丈夫、ですか……？"
1006205-81 = "すごくお疲れのような……。"
1006205-82 = "……。"
1006205-83 = "あの、先生。"
1006205-84 = "[s] \"うん？\""
1006205-85 = "趣味とは何なのでしょうか……。"
1006205-86 = "趣味を通じて、何かを得る必要はない、のでしょうか……？"
1006205-87 = "そこに意味はなくとも、良いのでしょうか……？"
1006205-88 = "（不安に揺れる瞳と視線がぶつかった）"
1006205-89 = "（初めて見るトキの姿に、私は……）"
1006205-90 = "[s] \"トキ、趣味っていうのはね……。\""
1006205-91 = "はい。"
1006205-92 = "[s7] \"意味なんて、理由なんてなくていいんだよ。\"\n[s8] \"そこに自分の「好き」って気持ちがあれば。\""
1006205-95 = "「好き」の気持ち……ですか？"
1006205-96 = "[s9] \"焦らせちゃってごめんね。\"\n[s10] \"きっと、巡り合せみたいなものだから。\"\n[s11] \"その時になったら気付くと思うよ。\""
1006205-100 = "……。"
1006205-101 = "でしたら、私の趣味は……。"
1006205-102 = "……ふふっ。"
1006205-103 = "[s] \"ん？もう見つけたの？\""
1006205-104 = "何でも……ありませんよ。"
1006205-108 = "さあ、先生。"
1006205-109 = "そろそろ帰りましょうか。"
1006205-110 = "シャーレまで、私が護衛しますね。"
1006205-111 = "[s] \"そう言われると気になるな～って……。\""
1006205-112 = "さて、何のことでしょうか？"
1006205-118 = "[ns] \"教えてくれないの？\""
1006205-119 = "今日のところは……内緒です。"
1006205-120 = "[ns] \"そっか……でもいつか、聞かせてくれるとうれしいな。\""
1006205-122 = "（帰り道、トキの微笑みを見て、自分のことのようにうれしくなった）"
