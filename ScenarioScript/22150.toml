[translation]
22150-1 = "Episódio 15; Armadilha"
22150-2 = "Asuna! Vamos nessa!"
22150-10 = "……！"
22150-21 = "Agora!"
22150-33 = "É inútil!"
22150-42 = "Não vou deixar você escapar!"
22150-46 = "（……São poderosas.）"
22150-47 = "（A C&C, sendo um clube especializado em combate em grupo como agentes, possui uma coordenação muito forte……）"
22150-48 = "（Táticas em perfeita sintonia…… É o ponto que mais as diferencia das forças de outras escolas, e――）"
22150-51 = "……Não há falhas nessa estratégia."
22150-52 = "Sendo assim……."
22150-57 = "……Chefe, isso é…!"
22150-61 = "Hã? O que é isso!?#nO chão está tremendo todo!!"
22150-62 = "Não é só isso…… Akane, a situação está estranha."
22150-63 = "……O prédio está se movendo?"
22150-67 = "Ei……!? Que diabos é isso!?"
22150-68 = "Chefe……!! As anteparas……!"
22150-74 = "O tremor…… parou?"
22150-75 = "Onde elas foram……?"
22150-81 = "Alterei a estrutura urbana desta área para isolá-las das outras veteranas."
22150-82 = "Hã? Que papo é esse?"
22150-83 = "Originalmente, \"Eridu\" também serve como uma fortaleza para repelir invasores."

22150-84 = "Graças à autoridade que a Rio-sama me concedeu, eu as separei."
22150-85 = "Vamos, veterana Neru, agora sua taxa de vitória é praticamente nula."
22150-86 = "…………."
22150-87 = "Ah…… taxa de vitória…… ou o que quer que seja……"
22150-88 = "――Está de brincadeira comigo."
22150-97 = "Hã!? Ei, espere um pouco! Agora, o estado da comunicação……!"
22150-98 = "Isso é……."
22150-99 = "Veritas…… então eram vocês mesmo."
22150-100 = "Não se esperava menos das subordinadas daquela \"Himari\"."

22150-101 = "Hã? Q-quem é!?"
22150-109 = "A comunicação da Veritas……"
22150-110 = "[s] \"Foi cortada…….\""
22150-114 = "Eu já esperava por isso…… mas você realmente chegou até aqui, Sensei."
22150-115 = "[s1] \"Rio…….\"\n[s2] \"Vim aqui para te impedir.\""
22150-116 = "……Entendo."
22150-117 = "……Entendo."
22150-118 = "Como eu pensei, apenas com minhas palavras e ações daquela vez, eu não consegui……"
22150-119 = "E não consegui convencer aquelas garotas, não é?"
22150-126 = "…………Sensei."
22150-127 = "Você conhece o dilema do bonde?"
22150-128 = "Dilema do bonde……?"
22150-129 = "……Dilema?"
22150-130 = "É uma história simples."
22150-131 = "Quando um trem quebrado, que não consegue parar, está correndo sobre os trilhos.#nVocê sacrifica uma pessoa para salvar a maioria――"
22150-132 = "Ou você sacrifica a maioria para salvar uma pessoa――#nÉ um dilema que força essa escolha."
22150-133 = "Exato. Alguém precisa assumir o papel de puxar a alavanca."
22150-134 = "E…… eu estou apenas disposta a assumir esse papel."
22150-135 = "Não tenho malícia nem hostilidade desde o início.#nEu apenas――"
22150-136 = "Ah, chega! Eu não entendo nada!! #nEsquece essas conversas difíceis, devolve a Alice!!"
22150-137 = "Ora, você é..."
22150-138 = "Eu já fiquei sabendo de tudo!"
22150-139 = "Disseram que a Presidente falou um monte de coisas sem sentido e levou a Alice embora!"
22150-140 = "……Não é uma conversa sem sentido."
22150-141 = "Sendo você alguém que foi atacada pela #n\"Princesa dos Deuses Sem Nome\", não deveria entender?"
22150-142 = "Eu não entendo nada!"
22150-143 = "……!"
22150-144 = "Eu só quero trazer a Alice de volta de onde a Presidente a levou!"
22150-145 = "Irmã..."
22150-146 = "Momoi..."
22150-147 = "Para começo de conversa, sequestrar a Alice dando desculpas sobre ela ser uma ameaça para Kivotos, #né uma escala pequena demais!"
22150-148 = "A escala dos cenários que eu escrevo é muito, muito maior!"
22150-149 = "Não tem como esse tipo de conversa fazer sentido!"
22150-150 = "……É verdade. Deve ser difícil fazer vocês entenderem agora."
22150-151 = "……Eu mesma entendo perfeitamente que não serei compreendida tão cedo."
22150-152 = "――Avant-Garde-kun, lançar."
22150-158 = "Uau!? #nQue brega..."
22150-159 = "É, realmente não é um design muito bonito, mas..."
22150-164 = "……A aparência não importa."
22150-165 = "[s] \"……Dá para ver o que você realmente pensa, Rio.\""
22150-166 = "Se não vão me entender, então que seja. #nNão me importo com isso."
22150-167 = "A-ahhh!?"
22150-168 = "[ns] \"Pessoal, cuidado... lá vem!\""
