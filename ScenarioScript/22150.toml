[translation]
22150-1 = "Episódio 15; Armadilha"
22150-2 = "Asuna! Vamos nessa~!"
22150-10 = "......!"
22150-21 = "Agora é a hora!"
22150-33 = "É inútil!"
22150-42 = "Não vou deixar você escapar!"
22150-46 = "（......Ela é poderosa, hein.）"
22150-47 = "（A C&C, sendo especializada em combate em grupo como agentes, é um clube com uma coordenação extremamente forte......）"
22150-48 = "（Táticas em perfeita sintonia...... é o ponto que mais os diferencia das forças de outras escolas――）"
22150-51 = "......Não há falhas nessa estratégia."
22150-52 = "Sendo assim......"
22150-57 = "......Líder, isto é...!"
22150-61 = "Eh? O que é isso!? #n O chão está tremendo todo!!"
22150-62 = "Não é só isso...... Akane, algo está errado."
22150-63 = "......O prédio está se movendo?"
22150-67 = "Ei......!? Que porra é essa!?"
22150-68 = "Líder......!! As divisórias......!"
22150-74 = "O tremor...... parou?"
22150-75 = "E elas......?"
22150-81 = "Alterei a estrutura urbana desta área e isolei vocês das outras senpais."
22150-82 = "Hã? Que porra é essa."
22150-83 = "'Eridu' serve originalmente como uma fortaleza para repelir invasores."
22150-84 = "Graças à autoridade que me foi concedida pela Srta. Rio, eu separei todas vocês."
22150-85 = "Muito bem, Neru-senpai, agora as suas chances de vitória tornaram-se infinitamente baixas."
22150-86 = "............"
22150-87 = "Haa... chances de vitória... o que quer que seja..."
22150-88 = "――Está tirando uma com a minha cara."
22150-97 = "Eh!? Ei, espere um pouco! Agora, o estado da comunicação......!"
22150-98 = "Isso é......"
22150-99 = "Veritas...... então eram vocês, afinal."
22150-100 = "Como esperado das subordinadas daquela 'Himari'."
22150-101 = "Eh? Q-Quem é!?"
22150-109 = "A comunicação da Veritas......"
22150-110 = "[s] \"Foi cortada......\""
22150-114 = "Eu imaginava, mas... você realmente veio até aqui, Sensei."
22150-115 = "[s1] \"Rio......\"\n[s2] \"Vim aqui para te deter.\""
22150-116 = "......Entendo."
22150-117 = "......Entendo."
22150-118 = "Como eu temia, minhas palavras e ações daquela vez não foram o suficiente para fazer você......"
22150-119 = "E nem convencer aquelas garotas, não é?"
22150-126 = "............Sensei."
22150-127 = "Você conhece o 'Dilema do Bonde'?"
22150-128 = "Dilema do Bonde...?"
22150-129 = "......Dilema?"
22150-130 = "É uma questão simples."
22150-131 = "Quando um trem, que quebrou e não consegue mais parar, corre sobre os trilhos. #n Você sacrifica uma vida para salvar a maioria――"
22150-132 = "Ou sacrifica a maioria para salvar uma única vida―― #n É um dilema que força uma escolha."
22150-133 = "Isso. Alguém deve assumir o papel de puxar a alavanca."
22150-134 = "E... eu estou disposta a assumir esse papel de bom grado."
22150-135 = "Não tenho intenção de carregar malícia ou hostilidade. #n Eu apenas――"
22150-136 = "Ah, chega! Não entendo nada disso!! #n Esquece essa conversa difícil, devolve a Aris!!"
22150-137 = "Ara, quem é você..."
22150-138 = "Eu fiquei sabendo de tudo, tá bem!"
22150-139 = "Que a presidente sequestrou a Aris dizendo um monte de coisas sem sentido!"
22150-140 = "......Não são coisas sem sentido."
22150-141 = "Você, que foi atacada pela 'Princesa dos Deuses Sem Nome', não deveria entender?"
22150-142 = "Eu não entendo nada!"
22150-143 = "......!"
22150-144 = "Eu só quero trazer a Aris de volta da presidente!"
22150-145 = "Mana..."
22150-146 = "Momoi..."
22150-147 = "Sequestrar a Aris inventando desculpas sobre ela ser uma ameaça a Kivotos, #n é um pensamento de escala pequena demais, não acha!"
22150-148 = "A escala dos cenários que eu escrevo é muito maior do que isso!"
22150-149 = "Não tem como esse papo fazer sentido!"
22150-150 = "......Entendo. Parece que será difícil fazer vocês entenderem agora."
22150-151 = "......Eu mesma entendo perfeitamente que não serei compreendida tão cedo."
22150-152 = "――Avant-Garde-kun, ataque."
22150-158 = "Uwaah!? #n Que brega..."
22150-159 = "É, o design não é lá muito fofo, mas..."
22150-164 = "......A aparência não importa."
22150-165 = "[s] \"......Você deixou escapar o que pensa, Rio.\""
22150-166 = "Se vocês não podem me entender, então que seja. #n Não me importo se continuarem assim."
22150-167 = "U, uwaaaah!?"
22150-168 = "[ns] \"Todos, cuidado... ela vem aí!\""