22150-46 = "(……É poderosa, hein.)"
22150-47 = "(O C&C, especializado em combate de várias agentes em conjunto, é um clube de coordenação muito forte……)"
22150-48 = "(Uma tática sincronizada…… é o ponto que mais as diferencia das forças de outras colégios——)"
22150-51 = "……Não há brecha nessa estratégia."
22150-52 = "Nesse caso……"
22150-57 = "……Presidente, isto é…!"
22150-61 = "Hã? Que é isso!?#nO chão tá tremendo!!"
22150-62 = "Não é só isso…… Akane, tem algo estranho."
22150-63 = "……Os prédios, estão se movendo?"
22150-67 = "Peraí…!? Que é isso!?"
22150-68 = "Presidente……!! O anteparo……!"
22150-74 = "O tremor…… parou?"
22150-75 = "E aquelas ali……?"
22150-81 = "Alterei a estrutura urbana desta área e as isolei das outras veteranas."
22150-82 = "Hã? Que é isso?"
22150-83 = "A \"Eridu\" cumpre, na origem, também o papel de uma fortaleza que repele invasores."
22150-84 = "Com a autoridade que recebi da senhorita Rio, eu dividi vocês todas."
22150-85 = "Vamos, veterana Neru, com isto a sua taxa de vitória ficou infinitamente baixa."
22150-86 = "…………"
22150-87 = "Haah…… taxa de vitória…… que nada……"
22150-88 = "——Tá de sacanagem."
22150-97 = "Hã!? P-peraí! Agora o estado da comunicação……!"
22150-98 = "Isto é……"
22150-99 = "Veritas…… eram vocês mesmo, então."
22150-100 = "Não é à toa que são as juniores daquela \"Himari\"."
22150-101 = "Hã? Q-quem é!?"
22150-109 = "A comunicação da Veritas……"
22150-110 = "[s] \"foi cortada……\""
22150-114 = "Eu já esperava, mas…… vocês chegaram até aqui mesmo, hein, Sensei."
22150-115 = "[s1] \"Rio……\"\n[s2] \"Vim te deter.\""
22150-116 = "……Sei."
22150-117 = "……Sei."
22150-118 = "No fim, só com as minhas palavras e ações daquela vez, eu não consegui……"
22150-119 = "convencer nem você, nem essas garotas."
22150-126 = "…………Sensei."
22150-127 = "Você conhece o Dilema do Bonde?"
22150-128 = "Bonde……?"
22150-129 = "……Dilema?"
22150-130 = "É uma história simples."
22150-131 = "Quando um trem com defeito, incapaz de parar, corre sobre os trilhos.#nSacrificar uma pessoa para salvar a maioria——"
22150-132 = "ou então sacrificar a maioria para salvar uma pessoa——#né um problema que impõe esse tipo de escolha."
22150-133 = "Isso. Alguém tem que assumir o papel de puxar a alavanca."
22150-134 = "E…… eu apenas me disponho, de bom grado, a assumir esse papel."
22150-135 = "Malícia ou hostilidade, eu não tenho, desde o início.#nEu apenas——"
22150-136 = "Aah! Não entendo nada!!#nDeixa a conversa difícil de lado e devolve a Aris!!"
22150-137 = "Ora, você é……"
22150-138 = "Eu fiquei sabendo de tudo, viu!"
22150-139 = "Que a presidente saiu falando umas coisas sem sentido e levou a Aris embora!"
22150-140 = "……Não é uma história sem sentido."
22150-141 = "Justamente você, que foi atacada pela#n\"Princesa dos Deuses Sem Nome\", não consegue compreender?"
22150-142 = "Não entendo, não!"
22150-143 = "……!"
22150-144 = "Eu só quero trazer a Aris de volta de junto da presidente!"
22150-145 = "Mana……"
22150-146 = "Momoi……"
22150-147 = "Pra começar, sequestrar a Aris arranjando uma desculpa de ameaça a Kivotos, sei lá o quê,#na escala disso é pequena demais!"
22150-148 = "Os roteiros que eu costumo escrever têm uma escala muuuito maior!"
22150-149 = "Não tem como engolir uma conversa dessas!"
22150-150 = "……É verdade. Conseguir que vocês se convençam agora mesmo deve ser difícil."
22150-151 = "……Eu mesma compreendo perfeitamente que não vou ser entendida de imediato."
22150-152 = "——Avant-Garde, avançar."
22150-158 = "Uaah!?#nQue brega……"
22150-159 = "De fato, não é um design lá muito fofo, mas……"
22150-164 = "……A aparência não tem nada a ver."
22150-165 = "[s] \"……Deu pra ver um pouco o que você realmente sente, Rio.\""
22150-166 = "Se não vou ser compreendida, então tudo bem.#nPode ficar assim mesmo."
22150-167 = "A-uaaah!?"
22150-168 = "[ns] \"Pessoal, cuidado…… ele vem aí!\""