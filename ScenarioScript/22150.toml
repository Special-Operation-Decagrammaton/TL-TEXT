[translation]
22150-1 = "第15話;罠"
22150-2 = "アスナ！いっくよ～！"
22150-10 = "……！"
22150-21 = "今だ！"
22150-33 = "無駄です！"
22150-42 = "逃がすもんか！"
22150-46 = "（……強力ですね）"
22150-47 = "（エージェントとして複数人での戦闘に長けているC&Cは、連携がとても強い部活……）"
22150-48 = "（息の合った戦術……他校の戦力と最も差別化されている点であり――）"
22150-51 = "……その戦略に穴はない。"
22150-52 = "それなら……。"
22150-57 = "……部長、これは…！"
22150-61 = "えっ？なにこれー！？#n地面がぐらぐらしてる！！"
22150-62 = "それだけじゃない……アカネ、様子が変だ。"
22150-63 = "……建物が、動いている？"
22150-67 = "ちょ……！？んだよこれ！？"
22150-68 = "部長……！！隔壁が……！"
22150-74 = "揺れは……止まったのか？"
22150-75 = "あいつらは……？"
22150-81 = "この一帯の都市構造を変更し、他の先輩方と隔離させていただきました。"
22150-82 = "は？んだよ、それ。"
22150-83 = "「エリドゥ」は本来、侵入者を撃退する要塞の役割を兼ねておりますので。"
22150-84 = "リオ様からいただいた権限によって、皆様を分断させていただいたのです。"
22150-85 = "さあネル先輩、これであなたの勝率は限りなく低くなりました。"
22150-86 = "…………。"
22150-87 = "はぁ……勝率だの……何だの……"
22150-88 = "――ふざけてやがる。"
22150-97 = "え！？ちょ、ちょっと待って！今、通信の状態が……！"
22150-98 = "これは……。"
22150-99 = "ヴェリタス……やはり貴女たちだったのね。"
22150-100 = "流石あの「ヒマリ」の後輩なだけあるわ。"
22150-101 = "え？だ、誰！？"
22150-109 = "ヴェリタスの通信が……"
22150-110 = "[s] \"途絶えてしまった……。\""
22150-114 = "予想はしていたけれど……本当にここまで来たのね、先生。"
22150-115 = "[s1] \"リオ……。\"\n[s2] \"君を止めに来たよ。\""
22150-116 = "……そう。"
22150-117 = "……そう。"
22150-118 = "やはり、あの時の私の言葉と行動だけでは貴方を……。"
22150-119 = "そして、その子たちを説得できなかったのね。"
22150-126 = "…………先生。"
22150-127 = "トロッコ問題をご存知かしら？"
22150-128 = "トロッコ……？"
22150-129 = "……問題？"
22150-130 = "簡単なお話よ。"
22150-131 = "故障し、止まる事ができなくなってしまった列車がレールの上を走っている時。#n大多数を生かすために一人を犠牲にするか――"
22150-132 = "それとも、一人を生かすために大多数を犠牲にするか――#nそういう選択を迫る問題。"
22150-133 = "そう。誰かがレバーを引く役割を担わなければならない。"
22150-134 = "そして……私は喜んでその役を引き受けようとしているだけ。"
22150-135 = "悪意も敵意も、端から持ち合わせていない。#n私はただ――"
22150-136 = "もう！分かんないよ！！#n難しい話はいいから、アリスを返して！！"
22150-137 = "あら、貴方は……。"
22150-138 = "話は聞いたんだからね！"
22150-139 = "会長が意味わかんないこと言ってアリスを連れて行ったって！"
22150-140 = "……意味不明な話などではないわ。"
22150-141 = "他の誰でもない、#n「名もなき神々の王女」に攻撃された貴女なら分かるのではなくて？"
22150-142 = "分かんないよ！"
22150-143 = "……！"
22150-144 = "私はただ、会長の元からアリスを連れ戻したいだけ！"
22150-145 = "お姉ちゃん……。"
22150-146 = "モモイ……。"
22150-147 = "そもそもキヴォトスの脅威だとかなんとか理由をつけてアリスを誘拐するなんて、#nスケールが小さすぎるよ！"
22150-148 = "普段私が書いているシナリオの規模の方がず～っと大きい！"
22150-149 = "そんな話通じるわけ無いじゃん！"
22150-150 = "……そうね。今すぐ貴女たちに納得してもらうのは難しいのでしょうね。"
22150-151 = "……私自身、すぐに納得してもらえないということは、十分理解しているもの。"
22150-152 = "――アバンギャルド君、発進。"
22150-158 = "うわぁっ！？#nダサ……"
22150-159 = "たしかに、あんまり可愛いデザインじゃないけど……"
22150-164 = "……見た目は関係ないわ。"
22150-165 = "[s] \"……本音がちょっと見えてるよ、リオ。\""
22150-166 = "理解されないのなら、もういいわ。#nそのままで構わない。"
22150-167 = "う、うわああっ！？"
22150-168 = "[ns] \"みんな気をつけて……来るよ！\""
