[translation]
101140-1 = "Episódio 14; Operação de recaptura em placa de Petri (2)"

101140-3 = "...Então, essas seis energias que acabamos de observar são “cores”?"

101140-4 = "Ainda não sei a situação atual. Mas provavelmente será revelado em breve."

101140-5 = "Kaiser agiu por conta própria, então#nAcho que vai demorar um pouco mais para descobrir..."

101140-6 = "Originalmente, mistérios não são o que me interessa... mas agora que a “Arca” foi observada, a história mudou."

101140-7 = "Está tudo bem se o subterrâneo de Oparts no deserto de Abydos cair nas mãos de Kaiser?"

101140-8 = "Sim, você não precisa se preocupar muito com isso.#nAfinal, o presidente não acha que pode controlar aquilo, não importa o que faça."

101140-9 = "E como não é uma “arca”, não nos interessa mais."

101140-10 = "Vamos prosseguir com nosso plano."

101140-12 = "...A comunhão dos santos completada pela reprodução é o primeiro período.#nAmbrosius falhou e Gregorio ainda não está pronto."

101140-13 = "A Biblioteca Infinita de Histórias de Fantasmas está apenas começando... e o mágico do Amuse Park... parece que vai levar algum tempo."

101140-14 = "Os profetas do Decagrammaton são aquele que entende, Binah, e o juiz, Chesed...#nE garantiu o poder da glória \"Hodo\"."


101140-15 = "...O Decagrammaton deixou para trás o profeta e escolheu a morte.#nEsta é atualmente a melhor opção?"

101140-16 = "Eu queria ver se isso era uma reconstituição da segunda vinda divina \"Parousia\"... mas infelizmente não tenho tempo."


101140-17 = "A \"cor\" está se aproximando de nós, o \"sacerdote anônimo\" está à beira da ressurreição...#nDe qualquer forma, você deve estar preparado."


101140-18 = "…..."
101140-19 = "……。"
101140-20 = "Muitos mistérios em Kivotos desaparecerão."

101140-21 = "... Suponhamos que a oscilação também fosse nossa busca."

101140-22 = "……。"
101140-23 = "……。"
101140-28 = "……sim?"

101140-42 = "SOF, relate a situação."

101140-44 = "Oscar 1 está esperando em sua localização atual."

101140-46 = "Oscar 2 está esperando."

101140-48 = "Oscar 3 garante a posição do atirador. Aguardando ordens."

101140-50 = "Agora, vamos entrar na construção da placa de Petri."

101140-51 = "...Estou indo!"

