[translation]
101140-1 = "Episódio 14; Operação de Retomada da Schale (2)"
101140-3 = "……Então, essas 6 energias que acabaram de ser observadas são o \"Chroma\"?"
101140-4 = "Na situação atual, ainda não sabemos. Mas isso provavelmente será revelado muito em breve."
101140-5 = "Como a Kaiser decidiu agir por conta própria,#ncreio que levaremos mais um tempinho para entender tudo, mas..."
101140-6 = "Normalmente, o inexplicável não seria objeto do meu interesse... Mas, agora que até a \"Arca\" foi observada, as coisas mudam de figura."
101140-7 = "Aquele Oopart no subsolo do deserto de Abydos, não tem problema deixá-lo cair nas mãos da Kaiser?"
101140-8 = "Sim, não precisamos nos preocupar muito com isso.#nAfinal, o Presidente não será capaz de controlar aquilo, não importa o que tente fazer."
101140-9 = "E, como aquilo não é a \"Arca\", deixou de ser um assunto do nosso interesse."
101140-10 = "Vamos dar continuidade ao nosso próprio plano."
101140-12 = "……A Comunhão dos Santos concluída através de Mimesis está na primeira fase.#nAmbrosius foi um fracasso, e os preparativos para Gregorius ainda não terminaram――certo."
101140-13 = "A Biblioteca Infinita de Histórias de Fantasmas mal começou... E o mágico do Parque de Diversões... também parece precisar de mais tempo."
101140-14 = "Os Profetas de Decagrammaton garantiram o poder do Compreensor, \"Binah\", e do Juiz, \"Chesed\"...#ne também o da Glória, \"Hod\"."
101140-15 = "……Decagrammaton deixou para trás seus Profetas e escolheu a morte.#nTalvez isso seja o melhor para a situação atual."
101140-16 = "Eu queria confirmar se isso recriaria a segunda vinda divina, a \"Parusia\", mas... infelizmente, estamos sem tempo."
101140-17 = "O \"Chroma\" que se aproxima sorrateiramente, os \"Sacerdotes Sem Nome\" prestes a ressuscitar...#nDe qualquer forma, devemos nos preparar."
101140-18 = "……。"
101140-19 = "……。"
101140-20 = "Os muitos Mistérios espalhados por Kivotos estão prestes a desaparecer, não é mesmo?"
101140-21 = "……Digamos que até mesmo o seu piscar faça parte da nossa busca."
101140-22 = "……。"
101140-23 = "……。"
101140-28 = "……Hm?"
101140-42 = "SOF, relatem a situação."
101140-44 = "Oscar 1, de prontidão na posição atual."
101140-46 = "Oscar 2, de prontidão."
101140-48 = "Oscar 3, posição de franco-atirador assegurada. Aguardando ordens."
101140-50 = "Certo, vamos invadir o prédio da Schale agora."
101140-51 = "……Vamos lá!"