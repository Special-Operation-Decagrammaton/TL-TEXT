[translation]
101140-1 = "第14話;[ruby=S.C.H.]シャーレ[/ruby]奪還作戦（２）"
101140-3 = "……では、今観測されたあの6つのエネルギーは「色彩」だと？"
101140-4 = "現状はまだ分かりません。しかし、もう間もなく明かされる事でしょう。"
101140-5 = "カイザーが独断で動いてしまったので、#n把握にはもう少々お時間をいただくと思いますが…… "
101140-6 = "本来、不可思議は、私の興味の対象ではありません……ですが、「箱舟」まで観測された今、話は変わってきます。"
101140-7 = "アビドス砂漠地下のオーパーツは、カイザーの手に渡ってしまっていいのでしょうか？"
101140-8 = "ええ、そちらはあまり心配しなくて良いでしょう。#n何せプレジデントは、どんな手を使ったところでアレを制御できないかと。"
101140-9 = "そしてそれが「箱舟」ではない以上、我々が興味を持つ事項ではなくなりました。"
101140-10 = "我々は、我々の計画を進めましょう。"
101140-12 = "……[ruby=ミメシス]複製[/ruby]で完成された聖徒の交わりは1期。#nアンブロジウスは失敗、グレゴリオはまだ準備が終わっていない――と。"
101140-13 = "怪談の無限図書館はまだ始まったばかり……そしてアミューズパークのマジシャンも……まだ時間が必要そうですね。"
101140-14 = "デカグラマトンの預言者は、理解者「ビナー」に審判者「ケセド」……#nそして栄光「ホド」の力を確保しました。"
101140-15 = "……デカグラマトンは預言者を残し、死を選んだ。#n現状はこれが最善というところでしょうか。"
101140-16 = "これが神聖の再臨「パルーシア」を再現するものなのか確認したかったのですが……残念ながら、時間がありませんね。"
101140-17 = "忍び寄ってくる「色彩」、復活目前の「無名の司祭」……#nどちらにせよ、備えておかねばなりません。"
101140-18 = "……。"
101140-19 = "……。"
101140-20 = "キヴォトス中の、数多の神秘が消えてゆくのですね。"
101140-21 = "……その明滅をも、私たちの探求であったとしましょう。"
101140-22 = "……。"
101140-23 = "……。"
101140-28 = "……ん？"
101140-42 = "SOF、状況を報告せよ。"
101140-44 = "オスカー1、現在位置で待機中。"
101140-46 = "オスカー2、待機中。"
101140-48 = "オスカー3、狙撃位置を確保。命令待機中。"
101140-50 = "では、シャーレの建物に突入します。"
101140-51 = "……行きます！"
