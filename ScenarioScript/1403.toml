[translation]
1403-1 = "GUNS N' PEPPERS（３）"
1403-2 = "Millennium - Corredor"
1403-8 = "……Parece que ela ainda não percebeu."
1403-9 = "……Mas não podemos baixar a guarda. Se, por um acaso, a senpai Neru puxar o gatilho, tudo acaba naquele instante."
1403-10 = "Acho que não precisa se preocupar com isso. A senpai Neru é realmente esquentada, mas, por causa disso, todas as alunas de Millennium tomam cuidado para não provocá-la no dia a dia!"
1403-11 = "A menos que apareça algum idiota que faça questão de arrumar briga, acho que a senpai Neru não vai puxar o gatilho tão facilmente."
1403-13 = "Ah, achei! Senpai Neru!"
1403-14 = "Hã? O que foi? Não é uma das gêmeas do Clube de Desenvolvimento de Jogos?#nVocê quer alguma coisa comigo?"
1403-15 = "Olha isso!"
1403-16 = "Da última vez, quando a senpai Neru tentou reprimir o Grupo dos Capacetes que invadiu a escola e saiu destruindo tudo, uma bala perdida atingiu meu console e quebrou a placa interna! Então, assuma a responsabilidade!"
1403-17 = "……Ah? Tá de brincadeira? Por que isso seria culpa minha?"
1403-18 = "Se a senpai não tivesse disparado a arma daquele jeito, o console não teria quebrado!#nIsso foi caro, então me pague! Me pague!!"
1403-19 = "Sua... já chega...!"
1403-20 = "Espera um pouco! Deixe isso com a gente!"
1403-22 = "Ué? Por que o Clube de Engenharia está aqui?"
1403-23 = "Espera um pouco, Momoi, deixa eu ver o estado desse console...?"
1403-25 = "Hum, hum, é apenas um defeito leve, o terminal de conexão só quebrou. Com as peças que nós do Clube de Engenharia temos, dá para consertar facilmente!"
1403-26 = "Sério!? Então acho que tudo bem..."
1403-28 = "Humpf, então você não precisa mais de mim, né? Até mais."
1403-30 = "Ah, e-espere, senpai Neru!"
1403-31 = "Eu vou consertar isso assim que voltar, então pode deixar no Clube de Engenharia por enquanto? Tenho um assunto urgente agora..."
1403-32 = "Hibiki, vamos logo atrás dela! Antes que a senpai Neru se meta em outro problema!"
1403-34 = "……Outro problema? O que o Clube de Engenharia está fazendo?"
1403-36 = "No entanto, a crise continuou depois disso..."
1403-39 = "Ei, chefe. Eu estava pensando nisso faz tempo, onde você comprou essa jaqueta pequena que está usando? Na seção de roupas infantis?"
1403-40 = "Sua... olha como você fala! Vou te mandar pelos ares!"
1403-42 = "Espere! Senpai Neru, acalme-se! Acho que a senpai Asuna não disse isso por mal!"
1403-43 = "……É verdade. Acho que a senpai Asuna também deveria pedir desculpas."
1403-44 = "Hmm? Aquilo foi tão chocante assim?"
1403-45 = "Desculpa se te deixei chateada, eu só achei a jaqueta legal e queria saber onde vendia."
1403-46 = "Tsc... você sempre foi assim. Vou deixar passar dessa vez por causa do pessoal do Clube de Engenharia.#nMas, se você falar de novo sobre roupas infantis ou qualquer coisa do tipo, pode se preparar!"
1403-50 = "Ah, Neru. Pode quebrar a fechadura dessa porta com sua arma? Acabei trancando por descuido e fiquei do lado de fora."
1403-51 = "Ah, isso não é problema. É só atirar, né? Então, vou fazer um estrago..."
1403-53 = "E-espere! Se for para abrir a porta, deixe com a gente!"
1403-54 = "Com a tecnologia do Clube de Engenharia, podemos abrir sem precisar quebrar a maçaneta..."
1403-57 = "Uau, abrir a fechadura só com um arame, parece filme! Incrível!"
1403-58 = "Esse tipo de coisa é nossa especialidade! Não precisa usar armas só porque a porta não abre! Isso mesmo!"
1403-59 = "……"
1403-67 = "Vocês... o que diabos vocês são?"
1403-68 = "H-hein? N-nós somos do Clube de Engenharia!?"
1403-69 = "Eu sei muito bem disso!"
1403-70 = "O que eu quero saber é por que vocês estão me seguindo o tempo todo e, além disso, se metendo em tudo o que eu faço!"
1403-71 = "A-ajudar quem está em apuros é o dever de uma aluna! A-ahahaha!"
1403-72 = "Além disso, violência não é bom... não é melhor resolver tudo apenas com tecnologia?"
1403-73 = "Bem, isso faz sentido, mas... tem algo estranho nisso."
1403-74 = "Vocês não fizeram alguma gracinha na minha arma, fizeram...?"
1403-76 = "Então você estava aqui, Neru Mikamo!"
1403-79 = "Desde que perdi da última vez, estive te procurando o tempo todo!"
1403-80 = "Hã? São vocês... de novo, sem aprender a lição."
1403-81 = "Fufu. Daquela vez foi um ataque surpresa e eu não tive chance, mas desta vez eu me preparei muito bem!"
1403-82 = "Não só os capacetes, mas trocamos todo o nosso equipamento por materiais à prova de balas capazes de resistir até a projéteis de artilharia! Com essa sua submetralhadora fraca, você não será capaz de nos derrotar!"
1403-83 = "Prepare-se, líder da C&C! Vamos pagar a dívida da última vez!"
1403-84 = "Hah, parece que vocês vieram com bastante disposição, hein."
1403-85 = "Beleza, eu aceito o desafio!"
1403-86 = "E-espere, Neru-senpai! Essa arma agora está...!"
1403-87 = "TATATATATATATA!"
1403-88 = "Fuhaha! Vou mostrar a resistência do meu novo capacete à prova de balas... hã?"
1403-90 = "O quê, guaaaaah!"
1403-91 = "O-o que é isso? Esse cheiro forte... Tabasco!?"
1403-92 = "Ugh! Entrou pelas frestas, nos meus olhos e no meu nariz... #nGeho, geho! E-eu não consigo respirar! Me ajudem!"
1403-93 = "Geho, ugh...! Seus covardes! Não satisfeitos com explosivos, ainda usam munição especial? Como esperado da líder da C&C, sem sangue nem lágrimas! Geho!"
1403-94 = "...Hã? Não... eu não fiz nada..."
1403-95 = "Vamos recuar por hoje! Lembrem-se disso! Geho, geho!!!"
1403-99 = "...I-isso foi por pouco. Graças ao Bando dos Capacetes e seus materiais à prova de balas, o mito da invencibilidade da Neru-senpai quase foi quebrado."
1403-100 = "...Ainda bem que modifiquei a arma para disparar Tabasco com antecedência. #nFim feliz, fim feliz."
1403-101 = "...Ei."
1403-102 = "Podem me explicar o que significa isso? Clube de Engenharia?"
1403-103 = "B-bem, isso foi... digamos que um subproduto acidental do processo de experimentação... #nEu pensei que seria útil se a arma pudesse disparar Tabasco..."
1403-104 = "...Já que foi útil na prática, não está tudo bem?"
1403-105 = "...É só isso que tem a dizer antes de partir?"
1403-106 = "TATATATATATATA!"
1403-107 = "U-uwaah! Senpai! Você não pode disparar Tabasco nas pessoas!"
1403-108 = "Geho! Geho! É perigoso se entrar nos olhos...! #nÉ realmente perigoso!!"
1403-109 = "FORAM VOCÊS QUE CRIARAM ESSA PORCARIAAAAAA!!"
1403-110 = "TATATATATATATATATATATA!"
1403-112 = "GUNS N' PEPPERS"
