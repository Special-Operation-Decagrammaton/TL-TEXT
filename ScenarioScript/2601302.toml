[translation]
2601302-1 = "形がなくとも残るもの"
2601302-2 = "あ、[USERNAME]先生。"
2601302-3 = "こんにちは。"
2601302-4 = "[s1] \"こんにちは、何だか楽しそうだね。\"\n[s2] \"何か良いことでもあった？\""
2601302-7 = "そう見える？"
2601302-8 = "いつもと変わってない、つもりだったけど……。"
2601302-9 = "顔に出ちゃってたのかな。"
2601302-10 = "……たしかに、ちょっと浮かれてるかもしれない。#nお祭りの熱気もだけど……。"
2601302-11 = "「アウトロービーチ」では、逃げたり隠れたりする必要もないし……。"
2601302-12 = "あと、このカメラがあるから。"
2601302-13 = "写真を撮るの、楽しくて。"
2601302-14 = "大切な瞬間を、切り取っておけるのが。"
2601302-15 = "だから今日は、良い写真が撮れそうな場所を探したいの。"
2601302-16 = "先生、一緒に来てくれる？"
2601302-17 = "[s] \"もちろんだよ。\""
2601302-18 = "じゃあ、行こう。"
2601302-20 = "とりあえず、たくさん撮ってみようと思う。"
2601302-21 = "このデジタルカメラは、#nブラックマーケットで運良く手に入れたの。"
2601302-22 = "古いけど、まだまだ使えるはず。"
2601302-23 = "あっ……先生、見て。"
2601302-24 = "あそこの看板、良いな。"
2601302-25 = "[s] \"看板……？\""
2601302-26 = "「焼きそば」、「かき氷」、「とうもろこし」……。"
2601302-27 = "あとで写真を見返したら、#nきっとこの鉄板の音も美味しそうな匂いも……。"
2601302-28 = "きっと、思い出せると思う。"
2601302-31 = "次、行こう。"
2601302-33 = "……風が気持ち良いね。"
2601302-34 = "あっ、先生。そこ、気をつけて。#n今、ヤドカリさんを踏みそうになってたよ。"
2601302-35 = "[s] \"わっ、危なかった……。\""
2601302-36 = "ふふ、小さくて可愛いね。"
2601302-37 = "助けてあげたお礼に、写真撮らせてもらっても良いかな。"
2601302-41 = "うん、これで良し。#nありがとう、ヤドカリさん。"
2601302-42 = "ここは危ないから、海のほうに戻ってね。"
2601302-43 = "この写真も、思い出に……。"
2601302-44 = "次は、何を撮ろうかな。"
2601302-46 = "（その後も、アツコと一緒に近くを散策した）"
2601302-48 = "もう、こんな時間……。"
2601302-49 = "[s3] \"夕焼けがきれいだね。\"\n[s4] \"最後に、夕焼けの写真を撮ってみない？\""
2601302-52 = "良いと思――"
2601302-53 = "あっ！"
2601302-58 = "……！"
2601302-59 = "……良かった。#n砂の上に落ちたから、無事みたい。"
2601302-60 = "あ、バッテリーカバーが開いちゃってる。"
2601302-61 = "砂、入ってないと良いな……。"
2601302-62 = "……あれ。"
2601302-63 = "[s] \"バッテリーが……。\""
2601302-67 = "……バッテリー、入ってなかったんだ。"
2601302-68 = "それで画面が映らなかったんだね。#n古いカメラだから、そういうものなんだと思ってたけど……。"
2601302-69 = "じゃあ、撮った写真は……。"
2601302-70 = "[s] \"……たぶん。\""
2601302-74 = "……今日、とっても楽しかったのに、無駄だったのかな。"
2601302-75 = "バッテリーを入れ忘れたせいで、何も残せなかったなんて。"
2601302-76 = "看板も、ヤドカリさんも……。"
2601302-77 = "先生と過ごした思い出が、全部……。"
2601302-78 = "[s] \"無駄なんかじゃないよ。\""
2601302-79 = "……そう、なの？"
2601302-80 = "でも、写真は一枚も残ってないよ？"
2601302-81 = "いつか、思い出を振り返れるように、頑張ったのに……。"
2601302-82 = "[s] \"写真がなくても、記憶には残るから。\""
2601302-85 = "[ns] \"今日が楽しかった事実は変わらないでしょ？\""
2601302-87 = "……そっか。"
2601302-88 = "楽しかった思い出は、どれもしっかり残ってる。"
2601302-89 = "こうして先生とお話してる時間も、絶対に忘れない。"
2601302-90 = "……ありがとう、先生。#n今日も、勉強になったよ。"
2601302-91 = "[s] \"次は私も、予備のバッテリーを持ってくるね。\""
2601302-92 = "ふふ。"
2601302-93 = "それじゃあ、またお祭りに来よう。"
2601302-94 = "次は、私も忘れないようにするから。"
