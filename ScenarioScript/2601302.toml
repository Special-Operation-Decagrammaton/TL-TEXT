[translation]
2601302-1 = "Algo que permanece mesmo sem forma"
2601302-2 = "Ah, sensei [USERNAME]."
2601302-3 = "Olá."
2601302-4 = "[s1] \"Olá, você parece animada.\"\n[s2] \"Aconteceu algo de bom?\""
2601302-7 = "Eu pareço animada?"
2601302-8 = "Eu pretendia agir como sempre, mas..."
2601302-9 = "Será que ficou estampado no meu rosto?"
2601302-10 = "...É verdade, talvez eu esteja um pouco empolgada. Não é só por causa da energia do festival..."
2601302-11 = "Na \"Outlaw Beach\", não preciso fugir nem me esconder..."
2601302-12 = "E também, por causa desta câmera."
2601302-13 = "Tirar fotos é divertido."
2601302-14 = "Poder capturar momentos preciosos."
2601302-15 = "Por isso, hoje quero procurar lugares onde eu possa tirar boas fotos."
2601302-16 = "Sensei, você viria comigo?"
2601302-17 = "[s] \"Com certeza.\""
2601302-18 = "Então, vamos."
2601302-20 = "Por enquanto, pretendo tirar muitas fotos."
2601302-21 = "Consegui esta câmera digital por sorte no mercado negro."
2601302-22 = "É antiga, mas ainda deve funcionar."
2601302-23 = "Ah... sensei, olhe."
2601302-24 = "Aquele letreiro ali é legal."
2601302-25 = "[s] \"Um letreiro...?\""
2601302-26 = "\"Yakisoba\", \"raspadinha\", \"milho\"..."
2601302-27 = "Quando eu olhar as fotos depois, tenho certeza de que poderei me lembrar do som da chapa e do cheiro delicioso..."
2601302-28 = "Tenho certeza de que vou me lembrar."
2601302-31 = "Vamos para o próximo."
2601302-33 = "...O vento está agradável."
2601302-34 = "Ah, sensei. Cuidado aí. Você quase pisou naquele caranguejo eremita."
2601302-35 = "[s] \"Uau, essa foi por pouco...\""
2601302-36 = "Fufu, ele é pequeno e fofo."
2601302-37 = "Como agradecimento por termos ajudado, será que posso tirar uma foto dele?"
2601302-41 = "Pronto, assim está bom. Obrigado, caranguejo eremita."
2601302-42 = "É perigoso aqui, então volte para o mar."
2601302-43 = "Esta foto também será uma lembrança..."
2601302-44 = "O que devo fotografar agora?"
2601302-46 = "(Depois disso, continuei passeando pelos arredores com Atsuko)"
2601302-48 = "Nossa, já está nesse horário..."
2601302-49 = "[s3] \"O pôr do sol está lindo.\"\n[s4] \"Por que não tiramos uma foto do pôr do sol para encerrar?\""
2601302-52 = "Acho uma boa ide—"
2601302-53 = "Ah!"
2601302-58 = "...!"
2601302-59 = "...Que bom. Como caiu na areia, parece que está tudo bem."
2601302-60 = "Ah, a tampa da bateria abriu."
2601302-61 = "Espero que não tenha entrado areia..."
2601302-62 = "...Ué."
2601302-63 = "[s] \"A bateria...\""
2601302-67 = "...A bateria não estava dentro."
2601302-68 = "Então era por isso que a tela não ligava. Como é uma câmera antiga, achei que fosse normal..."
2601302-69 = "Então, as fotos que eu tirei..."
2601302-70 = "[s] \"...Provavelmente não foram salvas.\""
2601302-74 = "……Hoje foi tão divertido, será que foi tudo em vão?"
2601302-75 = "Por ter esquecido de colocar a bateria, não sobrou nada."
2601302-76 = "A placa, o caranguejo eremita também..."
2601302-77 = "As memórias que passei com o Sensei, tudo..."
2601302-78 = "[s] \"Não foi em vão.\""
2601302-79 = "……É mesmo?"
2601302-80 = "Mas não sobrou nenhuma foto, sabe?"
2601302-81 = "Eu me esforcei tanto para que pudéssemos relembrar as memórias algum dia..."
2601302-82 = "[s] \"Mesmo sem fotos, elas ficarão na memória.\""
2601302-85 = "[ns] \"O fato de que hoje foi divertido não muda, certo?\""
2601302-87 = "……Entendi."
2601302-88 = "As memórias divertidas, todas elas ficaram guardadas."
2601302-89 = "Este momento conversando com o Sensei, eu nunca vou esquecer."
2601302-90 = "……Obrigada, Sensei.#nHoje também aprendi algo novo."
2601302-91 = "[s] \"Da próxima vez, eu também trarei uma bateria reserva.\""
2601302-92 = "Fufu."
2601302-93 = "Então, vamos vir ao festival de novo."
2601302-94 = "Da próxima vez, eu também vou me certificar de não esquecer."
