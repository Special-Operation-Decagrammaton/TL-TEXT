[translation]
34140-1 = "Episódio 14; Encontro Inesperado"
34140-4 = "......Limpo. Até aqui estamos seguros."
34140-5 = "S-Sim! Tudo bem!"
34140-6 = "Estranho... a cidade está silenciosa demais.#nSempre foi um lugar com pouco movimento, mas nunca a esse ponto."
34140-7 = "P-Parece que... a quantidade de coisas que eu não conheço aumentou muito..."
34140-8 = "Sim... eu também estou sentindo uma estranheza enorme há um tempo."
34140-9 = "Mesmo que tenhamos ficado longe do distrito autônomo por muito tempo, a cidade ficou completamente irreconhecível."
34140-10 = "......"
34140-11 = "S-Sabe... agora que parei para pensar, parece que o número de coisas estranhas vêm aumentando aos poucos há um tempo."
34140-12 = "Os mísseis de cruzeiro instalados por todo o distrito autônomo... as armas misteriosas que foram fornecidas..."
34140-13 = "Além disso, pensando agora, a existência das 'Réplicas (Mimesis)' em si não é muito estranha? E mesmo assim, eu sinto que nós simplesmente aceitamos isso sem duvidar de nada."
34140-19 = "Desde quando a Arius possui algo como mísseis de cruzeiro...?"
34140-20 = "E desde quando conseguimos manipular aquele poder misterioso...?"
34140-21 = "......E a 'bomba que destrói halos' também."
34140-22 = "Desde quando, exatamente..."
34140-24 = "......"
34140-25 = "Espera... tem alguém aí. Escondam-se."
34140-37 = "Aquilo é..."
34140-38 = "A S-Sociedade dos Santos!? É a Sociedade dos Santos Justina, né?#nE essa aparência..."
34140-39 = "......Por quê?#nComo o Tratado do Éden foi anulado, deveria ser impossível usá-las."
34140-40 = "......Pensando bem."
34140-41 = "O motivo pelo qual atacamos o local do Tratado do Éden, em primeiro lugar, foi para garantir a capacidade de 'Replicação (Mimesis)'."
34140-42 = "Sim, é verdade... É por isso que a Princesa fez o que a 'boneca de madeira' mandou lá no subsolo do Antigo Tabernáculo..."
34140-43 = "Com as forças da Sociedade dos Santos que garantiríamos, iríamos ocupar o distrito autônomo da Trinity e o de Gehenna...#nEssa era a nossa missão."
34140-44 = "Embora tenhamos sido derrotadas pela 'Schale' depois."
34140-45 = "Sim... E esse foi o motivo pelo qual nós fugimos.#nNós falhamos tanto em garantir a capacidade de 'Replicação', quanto em ocupar as duas academias."
34140-46 = "E mesmo assim...#nO distrito autônomo de Arius... A 'ela' já garantiu a capacidade de 'Replicação'...?"
34140-53 = "UUUOOOOOOHHHH――――"
34140-54 = "Esse som..."
34140-55 = "É o grito do 'Ambrosius', que foi usado como 'arma tática' durante o Tratado do Éden. ......Parece que é a mesma 'Réplica' que manipulamos daquela vez."
34140-56 = "Isso quer dizer que..."
34140-57 = "......Bastava que a 'Replicação' tivesse sucesso apenas uma vez..."
34140-58 = "Então, quer dizer que a nossa verdadeira missão...#nEra apenas 'Levar a Princesa até o Antigo Tabernáculo para ativar a Replicação'...?!"
34140-59 = "Então, a missão de ocupar Trinity e Gehenna era..."
34140-60 = "――Era algo que não importava para ela...?"
34140-61 = "......"
34140-62 = "Então, para que a nossa missão serviu...?"
34140-63 = "Qual foi o sentido de tudo isso?"
34140-71 = "......Estamos cercadas!?"
34140-72 = "Tsc... Uma armadilha."
34140-73 = "......Eles sabiam que viríamos para cá."
34140-77 = "Sim, é claro."
34140-78 = "......Madame."
34140-79 = "Este é um território sob o meu domínio.#nEu conheço as suas posições, os seus destinos e até as rotas que tomarão para chegar lá."
34140-80 = "Eu já sabia desde o começo que vocês tentariam ir para os corredores do antigo prédio escolar.#nCrianças tolas――Vocês não conseguem esconder nada de mim."
34140-81 = "H-Hiii... D-Desde o começo..."
34140-82 = "Como eu imaginei, nós estávamos na palma da mão dela..."
34140-83 = "......"
34140-84 = "Sim, exatamente."
34140-85 = "Desde o começo, a missão de vocês era apenas 'Levar a Princesa até o Antigo Tabernáculo para manifestar a Sociedade dos Santos'...... nada mais do que isso."
34140-86 = "Bastava que vocês conectassem o 'Caminho' apenas uma vez, e eu assumiria o controle depois.#nEmbora o Maestro estivesse um pouco relutante, achando que as criações dele seriam roubadas."
34140-87 = "......"
34140-88 = "Bem, o fato de vocês ocuparem a Trinity ou a Gehenna é algo que não tem a menor importância para mim."
34140-89 = "Aquilo era apenas uma justificativa para controlar o ódio que este distrito autônomo carrega há anos.#nEu mesma não guardo rancor algum daquelas academias."
34140-90 = "......!!"
34140-91 = "Pois é. Dito isso, pode-se dizer que vocês cumpriram a missão de vocês muito bem. Vocês me forneceram a habilidade de 'Replicação' e――"
34140-92 = "Até me entregaram a Princesa como sacrifício sem hesitar.#nVocê é uma boa menina que obedece direitinho às ordens, Saori."
34140-93 = "......Então você não tinha a intenção de cumprir a sua promessa desde o começo..."
34140-94 = "Bem, chega dessa conversa inútil... O que me interessa é... Ah, sim."
34140-100 = "G-Guh..."
34140-102 = "Prazer em conhecê-lo, Sensei [USERNAME]."
34140-103 = "[s] \"............!!\""
34140-104 = "O meu nome é Beatrice. Como já deve saber, sou um membro da 'Gematria'. Peço perdão por estar me apresentando através de um comunicador."
34140-105 = "Eu ouvi muito sobre você do Black Suit, do Maestro e do Golconda."
34140-106 = "[s] \"Você é quem está controlando Arius... Beatrice?\""
34140-107 = "Sim. E, até o momento, o único membro bem-sucedido na Gematria."
34140-108 = "Fufu... Está curioso sobre mim?#nSobre como consegui ter a Arius na palma da minha mão... Se você quiser, eu posso trocar isso por alguma informação que você conheça."
34140-109 = "[s1] \"Não é necessário.\"\n[s2] \"Eu já conheço as suas táticas.\""
34140-110 = "Oh, é mesmo?"
34140-111 = "Oh, é mesmo?"
34140-112 = "Para deixar claro e manter a minha honra, eu não uso nenhuma habilidade especial."
34140-113 = "Lavagem cerebral ou superpoderes... Kukuku, seria ótimo se eu tivesse uma habilidade tão conveniente.#nInfelizmente, isso não é a forma como um 'adulto' faz as coisas."
34140-114 = "Sim. Ódio, raiva, desprezo, desgosto――Eu tenho usado esses sentimentos negativos, controlando as crianças com falsidades e enganos."
34140-115 = "É um método simples, mas infalível. Você sabe muito bem disso, não é?"
34140-117 = "......Para começar, este distrito autônomo já estava em guerra civil muito antes de eu chegar."
34140-118 = "Os sentimentos negativos que nutriam umas pelas outras já estavam mais do que suficientes.#n――Eu apenas me aproveitei disso."
34140-119 = "Não é como se este lugar fosse especial.#nIsso não é uma cena muito comum de se ver?"
34140-122 = "Pois é... na verdade, se falarmos de ódio, o da Trinity pode ser ainda maior do que o daqui."
34140-124 = "Eu apenas agi de acordo com a maré."
34140-125 = "Os provérbios que ensinam a humildade perante a vida foram distorcidos e transformados num vazio sem valor..."
34140-126 = "A rígida auto-reprovação que alertava contra a degeneração, foi distorcida e se transformou em um sentimento de culpa inescapável..."
34140-127 = "E assim eu distorci os fatos, ocultei a verdade, interpretei mal os verdadeiros sentimentos, fomentei o desgosto, incitei o ódio, os outros, os outros, os outros, os outros――fazendo com que eternamente vissem umas às outras como inimigas."
34140-128 = "É exatamente por ser eternamente inalcançável que o paraíso pode ser chamado de paraíso. É no meio desse inferno que os 'adultos' controlam, exploram e predam as 'crianças'."
34140-129 = "Sim――Isso pode ser um inferno para alguns, mas para os 'adultos' é um paraíso de pura tranquilidade."
34140-130 = "Então você deve ser capaz de compreender esta minha caça, não é? Sensei?"
34140-132 = "E sendo assim, você poderia deixar a Princesa em paz?"
34140-133 = "Aquela garota é uma aluna que eu ensinei com todo o meu coração. Se eu a oferecer como sacrifício, tenho certeza de que ela trará maravilhosas boas-novas para nós, os adultos."
34140-134 = "Não está curioso? Para saber o que eu estou fazendo e que grande feito vou alcançar?#nSim――eu poderia te contar agora mesmo."
34140-135 = "O que me diz, Sensei?"
34140-137 = "Por exemplo, sobre este mundo――Você não gostaria de saber que tipo de lugar Kivotos é?"
34140-138 = "Este mundo é um mistério――um caldeirão do sublime onde o desconhecido e o terror se fundem, além de qualquer compreensão."
34140-140 = "Sim... eu posso lhe ensinar a verdade sobre este mundo.#nO que me diz? Se perder esta oportunidade, pode ser que nunca mais tenha outra."
34140-141 = "[s] \"Já chega.\""
34140-142 = "Oh?"
34140-143 = "[s3] \"Não tenho interesse nisso.\"\n[s4] \"Não preciso de uma verdade que só pode ser alcançada com o sacrifício de alguém.\""
34140-144 = "......Kukuku. Entendo... Sabia que acabaria assim."
34140-145 = "......Kukuku. Entendo... Sabia que acabaria assim."
34140-146 = "Parece que ambos acreditamos em verdades diferentes.#nSim――Não restam dúvidas de que você é o meu antagonista."
34140-147 = "Sim... eu entendi. O paraíso do qual você falava era o 'Tratado do Éden', não é?#nUm mundo simples e fácil de entender, onde a amizade de todos afasta o mal."
34140-148 = "Kukuku... Por que a linha de pensamento de vocês crianças é sempre tão pura e simples?"
34140-149 = "Dar o nome de paraíso a isso não mudará as coisas.#nPelo contrário, como um adulto responsável, você deve ensinar a verdade dessa maneira."
34140-150 = "'Que o tal do paraíso é o lugar onde o pecado original começou'..."
34140-151 = "Que o verdadeiro paraíso... transborda de ódio, raiva, repulsa, dor, remorso... coisas desse tipo."
34140-152 = "[ns] \"Beatrice.\""
34140-154 = "[ns5] \"Você insultou as alunas, você nos insultou.\"\n[ns6] \"E além disso, você insultou o 'ensino', o 'aprendizado'.\"\n[ns7] \"Como um adulto, eu jamais vou te perdoar por isso.\""
34140-159 = "......Devo interpretar isso como uma declaração de guerra?"
34140-160 = "Muito bem, estarei à sua espera na Basílica.#n――Se for capaz de chegar até lá, é claro."
34140-161 = "E então acertaremos as contas."
34140-162 = "Venha, Sensei――Você que é inescrutável."
34140-164 = "O Black Suit acredita que você seja um aliado com quem pode competir."
34140-165 = "O Maestro acredita que você seja um compreendedor com quem pode se aprimorar."
34140-166 = "O Golconda acredita que você seja uma metáfora e que, através de você, se completará."
34140-167 = "E eu acredito que você seja um antagonista a quem me oporei."
34140-169 = "Você é o meu inimigo."
34140-177 = "(......)"
34140-178 = "(......)"
34140-179 = "(S-Sim. Es-Estamos... prontas!)"
34140-180 = "Eliminem-nos."
34140-185 = "[ns] \"Vamos! Esquadrão!\""
34140-186 = "Aham!"