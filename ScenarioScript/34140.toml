[translation]
34140-1 = "Episódio 14; Encontro"
34140-4 = "……Limpo. Até aqui, está seguro."
34140-5 = "S-sim! Estou bem!"
34140-6 = "Estranho…… a cidade está silenciosa demais. #nOriginalmente, este é um lugar com pouco movimento, mas não deveria estar assim."
34140-7 = "A-algo está... tem muitas coisas estranhas aparecendo por aqui..."
34140-8 = "É verdade... Eu também estou sentindo uma sensação estranha há algum tempo."
34140-9 = "Embora eu tenha ficado longe do Distrito Autônomo por muito tempo, esta cidade se tornou algo que eu não reconheço de forma alguma."
34140-10 = "……."
34140-11 = "D-de certa forma... pensando bem, sinto que coisas incompreensíveis vinham aparecendo aos poucos há algum tempo."
34140-12 = "Mísseis de cruzeiro instalados por todo o Distrito Autônomo e... armas misteriosas que foram reabastecidas..."
34140-13 = "Além disso, pensando agora, aquela Mimesis, a cópia, não é algo muito estranho? Mesmo assim, sinto que aceitei sem questionar nada."
34140-19 = "Desde quando Arius tem coisas como mísseis de cruzeiro...?"
34140-20 = "E desde quando eles conseguiram manipular poderes tão misteriosos...?"
34140-21 = "……E a \"bomba que destrói halos\" também."
34140-22 = "Afinal, desde quando..."
34140-24 = "……."
34140-25 = "Espere um pouco... tem alguém ali. Esconda-se."
34140-37 = "Aquilo é..."
34140-38 = "A-a Congregação!? É a Congregação Justina, não é? #nE aquela aparência..."
34140-39 = "……Por que? #nDesde que o Tratado de Éden foi cancelado, a invocação deveria ser impossível."
34140-40 = "……Pensando bem."
34140-41 = "Originalmente, a razão pela qual atacamos o local do Tratado de Éden era para garantir a capacidade de Mimesis, a cópia."
34140-42 = "É verdade... por isso a Princesa fez exatamente o que aquele \"boneco de madeira\" disse no subsolo da Antiga Catedral..."
34140-43 = "Com as forças da Congregação garantidas dessa forma, ocuparíamos os distritos de Trinity e Gehenna... #nEssa era a nossa missão."
34140-44 = "Embora depois tenhamos sido derrotados pelo \"Schale\"."
34140-45 = "Ah... foi por isso que fugimos também. #nPorque falhamos tanto em garantir a capacidade de Mimesis quanto em ocupar as duas academias."
34140-46 = "E ainda assim... #nO Distrito Autônomo de Arius... \"Ela\" já garantiu a capacidade de Mimesis...?"
34140-53 = "UOOOOOOON――――"
34140-54 = "Esse som é..."
34140-55 = "É o lamento de \"Ambrosius\", que usamos como \"arma tática\" durante o Tratado de Éden. ...Parece que é exatamente a Mimesis, a cópia, que manuseamos naquela época."
34140-56 = "Isso significa que..."
34140-57 = "……A Mimesis, a cópia, só precisa ser bem-sucedida uma vez..."
34140-58 = "Em outras palavras, nossa missão original era apenas... #n\"Levar a Princesa à Antiga Catedral e ativar a Mimesis\"...?"
34140-59 = "Então, a missão de ocupar Trinity e Gehenna era..."
34140-60 = "――Para ela, isso não importava...?"
34140-61 = "……."
34140-62 = "Então, nossa missão era..."
34140-63 = "Qual era o sentido de tudo isso?"
34140-71 = "……Estamos cercados!?"
34140-72 = "Tsc... uma armadilha."
34140-73 = "……Eles sabiam que viríamos aqui."
34140-77 = "Sim, com certeza."
34140-78 = "……Madame."
34140-79 = "Este lugar é um território sob meu domínio. #nConheço tudo, desde a localização de vocês e seus destinos, até as rotas que percorreram."
34140-80 = "Eu sabia desde o início que vocês tentariam ir para o corredor do prédio antigo. #nCrianças tolas... esconder algo de mim é impossível."
34140-81 = "A-ah... d-desde o início..."
34140-82 = "Então estávamos mesmo na palma da mão dela..."
34140-83 = "……."
34140-84 = "Sim, é exatamente isso."
34140-85 = "A missão de vocês era, desde o início, \"levar o Sangue Real à Antiga Catedral e manifestar a Congregação\"... apenas isso."
34140-86 = "Uma vez que o caminho esteja conectado, poderei controlá-lo a partir de agora. #nO Maestro não gostou da ideia de ter sua obra roubada, mas..."
34140-87 = "……."
34140-88 = "Bem, se vou ou não ocupar Trinity ou Gehenna é algo trivial para mim."
34140-89 = "É apenas um meio para controlar o ódio que este distrito autônomo nutre há anos. #nEu, pessoalmente, não tenho rancor algum contra aquela escola."
34140-90 = "……！！"
34140-91 = "Exatamente. Portanto, pode-se dizer que você cumpriu sua missão. Você me forneceu a capacidade de replicação e—"
34140-92 = "O Sangue Real também se ofereceu obedientemente como sacrifício. #nVocê é uma boa menina que sabe seguir ordens, Saori."
34140-93 = "……Então, você nunca teve a intenção de cumprir a promessa desde o início……"
34140-94 = "Bem, vamos encerrar essa conversa infrutífera por aqui... Meu interesse é... sim."
34140-100 = "Guh, ugh……."
34140-102 = "Prazer em conhecê-lo, Sensei [USERNAME]."
34140-103 = "[s] \"…………！！\""
34140-104 = "Meu nome é Beatrice. Talvez você já saiba, mas sou um membro da \"Gematria\". Por favor, perdoe-me por cumprimentá-lo através de uma comunicação."
34140-105 = "Ouvi muitas coisas sobre você através de Kuroko, Maestro e Golconda."
34140-106 = "[s] \"Você é quem controla Arius…… Beatrice?\""
34140-107 = "Sim. E, atualmente, a única bem-sucedida dentro da Gematria."
34140-108 = "Fufu... Está curioso sobre mim? #nComo consegui colocar Arius sob meu controle... Se precisar, posso trocar essa informação pelo que você sabe, não posso?"
34140-109 = "[s1] \"Não é necessário.\"\n[s2] \"Eu já conheço seus métodos.\""
34140-110 = "Oh, é mesmo?"
34140-111 = "Oh, é mesmo?"
34140-112 = "Para preservar minha honra, devo dizer que não usei nenhuma habilidade especial."
34140-113 = "Lavagem cerebral ou superpoderes... hehehe, se eu tivesse um poder tão conveniente, seria ótimo. #nInfelizmente, esse não é o jeito de um \"adulto\"."
34140-114 = "Sim. Ódio, raiva, desprezo, aversão — utilizei essas emoções negativas e dominei as crianças com falsidades e enganos."
34140-115 = "É um método simples, mas eficaz. Você deve saber bem disso, não é?"
34140-117 = "……Para começar, este distrito autônomo já estava em guerra civil antes mesmo de eu chegar."
34140-118 = "As emoções negativas uns pelos outros já estavam mais do que saturadas. #n— Eu apenas aproveitei isso."
34140-119 = "Não é como se este lugar fosse especial. #nIsso não é uma cena comum?"
34140-122 = "Pois é... na verdade, se falarmos de ódio, talvez Trinity seja mais intensa que este lugar."
34140-124 = "Eu apenas agi dessa maneira."
34140-125 = "A humildade da vida distorce-se em um vazio sem valor, transformando-se em um ditado vazio……"
34140-126 = "A autocrítica rigorosa que alerta contra a depravação distorce-se em uma culpa inevitável……"
34140-127 = "Distorcer fatos, ocultar a verdade, interpretar mal as intenções, promover a aversão, incitar o ódio, e fazer com que os outros, os outros, os outros, os outros — eternamente, uns aos outros, se tornem estranhos."
34140-128 = "O paraíso só pode ser um paraíso porque é inalcançável. Dentro desse inferno, o \"adulto\" domina, explora e devora a \"criança\"."
34140-129 = "Sim — para alguns pode ser um inferno, mas este é o paraíso tranquilo dos \"adultos\"."
34140-130 = "Portanto, você pode entender esta minha predação, não pode? Sensei?"
34140-132 = "E, por favor, você poderia deixar o Sangue Real em paz?"
34140-133 = "Aquela criança é uma aluna que ensinei com muito esforço. Se a oferecermos como sacrifício, certamente nos trará um maravilhoso evangelho aos adultos."
34140-134 = "Não está curioso? Sobre o que estou fazendo, ou que tipo de grande feito alcançarei. #nSim — posso te contar agora mesmo, aqui."
34140-135 = "O que me diz, Sensei?"
34140-137 = "Por exemplo, este mundo — você não gostaria de saber que tipo de lugar é este Kivotos?"
34140-138 = "Este mundo é desconhecido — um cadinho sublime onde o mistério e o terror se misturam, algo que a compreensão não alcança."
34140-140 = "Sim... eu também posso te ensinar a verdade deste mundo. #nO que me diz? Se perder esta oportunidade, talvez não haja uma segunda vez."
34140-141 = "[s] \"Chega disso.\""
34140-142 = "Oh?"
34140-143 = "[s3] \"Não tenho interesse nisso.\"\n[s4] \"Não preciso de uma verdade alcançada através do sacrifício de alguém.\""
34140-144 = "……Hehehe. Entendo…… Como esperado, as coisas terminam assim."
34140-145 = "……Hehehe. Entendo…… Como esperado, as coisas terminam assim."
34140-146 = "Parece que acreditamos em verdades diferentes. #nSim — você é meu adversário, e não há erro nisso."
34140-147 = "Sim…… entendi. O paraíso de que você fala era o \"Tratado de Eden\", não era? #nUm mundo simples e fácil de entender, onde a amizade de todos derrota o mal."
34140-148 = "Hehehe…… por que os pensamentos das crianças são tão puros e simples?"
34140-149 = "Só porque você deu o nome de paraíso, não significa que as coisas mudam. #nPelo contrário, como adultos, devemos ensinar a verdade de forma adequada."
34140-150 = "Que \"esse paraíso é, na verdade, o lugar onde o pecado original começou\"..."
34140-151 = "Que o verdadeiro paraíso está transbordando de ódio, raiva, desprezo, dor e remorso — #ncoisas desse tipo."
34140-152 = "[ns] \"Beatrice.\""
34140-154 = "[ns5] \"Você insultou os alunos, nos insultou.\"\n[ns6] \"E insultou o 'ensino' e o 'aprendizado'.\"\n[ns7] \"Como adulto, eu jamais poderei perdoá-la.\""
34140-159 = "......Devo considerar isso uma declaração de guerra?"
34140-160 = "Muito bem, estarei esperando na Basílica. #n— Se é que você consegue chegar lá."
34140-161 = "Vamos resolver isso lá."
34140-162 = "Vamos lá, Sensei — ser incompreensível."
34140-164 = "Black Suit reconhece você como um aliado e acredita que podem competir entre si."
34140-165 = "Maestro reconhece você como alguém que o compreende e acredita que podem elevar um ao outro."
34140-166 = "Golconda reconhece você como uma metáfora e acredita que serão completados através um do outro."
34140-167 = "E eu reconheço você como um antagonista e acredito que nos repeliremos."
34140-169 = "Você é meu inimigo."
34140-177 = "(......)"
34140-178 = "(......)"
34140-179 = "(S-sim. A-a preparação... está pronta!)"
34140-180 = "Dê um fim nisso."
34140-185 = "[ns] \"Vamos! Esquadrão!\""
34140-186 = "Ah!"
