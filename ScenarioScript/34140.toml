[translation]
34140-1 = "Episódio 14;Reencontro"
34140-4 = "……Limpo. Até aqui, seguro."
34140-5 = "S-sim! Tudo certo!"
34140-6 = "Estranho…… a cidade tá silenciosa demais.#nJá era um lugar de pouco movimento, mas não a este ponto."
34140-7 = "S-sei lá…… tá cheio de coisa que eu não conheço……."
34140-8 = "Pois é…… essa sensação estranha, eu também sinto forte desde agora há pouco."
34140-9 = "Por mais que a gente tenha ficado muito tempo longe do distrito, virou uma cidade que eu não reconheço em nada."
34140-10 = "……."
34140-11 = "C-como dizer…… pensando bem, desde antes já iam aparecendo, aos poucos, coisas inexplicáveis, tenho essa impressão."
34140-12 = "Os mísseis de cruzeiro instalados por todo canto do distrito…… as armas misteriosas que chegavam de suprimento……."
34140-13 = "E, pensando agora, aquela tal de réplica também é estranhíssima, não é? E, mesmo assim, a gente aceitava sem desconfiar de nada."
34140-19 = "Desde quando a Arius tem coisas como mísseis de cruzeiro……?"
34140-20 = "E quando foi que vocês passaram a manejar aquele poder estranho……?"
34140-21 = "……E a \"bomba que destrói aureolas\" também."
34140-22 = "Desde quando, afinal……."
34140-24 = "……."
34140-25 = "Espera…… tem alguém. Escondam-se."
34140-37 = "Aquilo é……."
34140-38 = "O-o Conselho dos Santos!? É o Conselho dos Santos de Justina, né?#nE aquela figura é……."
34140-39 = "……Por quê?#nCom o Tratado do Éden cancelado, comandá-los deveria ser impossível."
34140-40 = "……Pensando bem."
34140-41 = "Pra começo de conversa, o motivo de a gente ter atacado o local do Tratado do Éden era assegurar a capacidade de réplica."
34140-42 = "Pois é…… por isso a Hime, no subsolo da catedral antiga, fez como aquela \"boneca de madeira\" mandou……."
34140-43 = "E, com a força do Conselho dos Santos assim assegurada, ocupar os distritos de Trinity e Gehenna…….#nEssa era a nossa missão."
34140-44 = "Depois, a gente perdeu pra \"Schale\", mas."
34140-45 = "Sim…… foi por isso que a gente fugiu.#nPorque falhamos tanto em assegurar a capacidade de réplica quanto em ocupar as duas academias."
34140-46 = "E, mesmo assim…….#nO distrito de Arius…… \"ela\" já tem a capacidade de réplica assegurada……?"
34140-53 = "UOOOOOON――――"
34140-54 = "Esse som……"
34140-55 = "É o grito do \"Ambrosius\", que a gente usou como \"arma tática\" na época do Tratado do Éden. ……De fato, parece ser a mesma réplica que a gente manejou naquela hora."
34140-56 = "Isso quer dizer que……."
34140-57 = "……A réplica só precisava dar certo uma única vez……."
34140-58 = "Ou seja, a nossa verdadeira missão era só……#n\"levar a Hime à catedral antiga e ativar a réplica\"……?"
34140-59 = "Então, a missão de ocupar Trinity e Gehenna……"
34140-60 = "――pra ela, não fazia diferença nenhuma……?"
34140-61 = "……."
34140-62 = "Então, a nossa missão……."
34140-63 = "Que sentido, afinal, ela teve?"
34140-71 = "……Estamos cercadas!?"
34140-72 = "Tch…… armadilha."
34140-73 = "……Ela sabia que a gente viria pra cá."
34140-77 = "Sim, é claro."
34140-78 = "……Madame."
34140-79 = "Este é o território sob o meu domínio.#nA posição, o destino e até a rota de vocês, eu conheço por inteiro."
34140-80 = "Que vocês tentariam ir ao corredor do prédio velho, eu sabia desde o começo.#nCrianças tolas――esconder algo de mim é impossível."
34140-81 = "H-hiih…… d-desde o começo……."
34140-82 = "No fim, a gente sempre esteve na palma da mão dela……."
34140-83 = "……."
34140-84 = "Sim, exatamente."
34140-85 = "A missão de vocês, desde o início, era só \"levar o sangue real à catedral antiga e manifestar o Conselho dos Santos\"…… só isso."
34140-86 = "Uma vez conectado o caminho, a partir daí eu posso controlá-lo.#nO Maestro reclamou, dizendo que era como ter a própria obra roubada, mas."
34140-87 = "……."
34140-88 = "Bom, ocupar ou não Trinity e Gehenna é, pra mim, um detalhe irrelevante."
34140-89 = "Era só um expediente pra controlar o ódio que este distrito nutriu por tantos anos.#nEu mesma não tenho rancor algum daquelas academias."
34140-90 = "……!!"
34140-91 = "Pois é. Por isso, dá pra dizer que você cumpriu a missão. Você me forneceu a capacidade de réplica――"
34140-92 = "e o sangue real também se ofereceu, obediente, como sacrifício.#nVocê é uma boa menina que escuta direitinho o que mandam, Saori."
34140-93 = "……No fim, você nunca teve a intenção de cumprir a promessa……."
34140-94 = "Bom, chega desta conversa estéril…… o meu interesse é…… sim."
34140-100 = "G-uh……."
34140-102 = "Muito prazer, Sensei [USERNAME]."
34140-103 = "[s] \"…………!!\""
34140-104 = "Eu me chamo Beatrice. Talvez já saiba, mas sou membro da \"Gematria\". Perdoe que a saudação seja por comunicação à distância."
34140-105 = "Do homem de preto, do Maestro e de Golconda, eu ouvi muitas histórias sobre você."
34140-106 = "[s] \"Você é quem domina a Arius…… Beatrice?\""
34140-107 = "Sim. E, na Gematria, a única bem-sucedida até o momento."
34140-108 = "Ufu…… ficou curioso a meu respeito?#nComo eu pus a Arius nas mãos…… se precisar, posso até trocar por informações que você tenha, viu?"
34140-109 = "[s1] \"Não é necessário.\"\n[s2] \"Eu conheço os seus métodos.\""
34140-110 = "Oh, é mesmo?"
34140-111 = "Oh, é mesmo?"
34140-112 = "Em nome da minha honra, aviso: eu não uso nenhuma habilidade especial, viu."
34140-113 = "Lavagem cerebral, poderes paranormais…… kukuku, se poderes tão convenientes existissem, seria ótimo.#nInfelizmente, esse não é o jeito dos \"adultos\"."
34140-114 = "Sim. Ódio, raiva, desprezo, aversão――usando essas emoções negativas, dominei as crianças com falsidade e embuste."
34140-115 = "Simples, mas um método garantido. Você deve conhecer bem, não?"
34140-117 = "……Aliás, este distrito já estava em guerra interna antes de eu chegar."
34140-118 = "As emoções negativas de uns contra os outros já transbordavam de sobra.#n――Eu apenas as aproveitei."
34140-119 = "Não é que aqui seja especial.#nIsso é uma cena corriqueira, não é?"
34140-122 = "Pois é…… aliás, em ódio, Trinity talvez seja até mais forte que aqui."
34140-124 = "Eu apenas agi conforme."
34140-125 = "As máximas que ensinam a humildade da vida, distorcidas em vazio sem valor……"
34140-126 = "a autocrítica severa que alerta contra a queda, distorcida em culpa da qual não se escapa……"
34140-127 = "distorcer os fatos, ocultar a verdade, deturpar o que se sente, fomentar a aversão, atiçar o ódio; e o outro, o outro, o outro, o outro――fazer, eternamente, que uns sejam, para os outros, apenas outros."
34140-128 = "O paraíso só é paraíso por ser eternamente inalcançável. Nesse inferno, os \"adultos\" dominam, exploram e predam as \"crianças\"."
34140-129 = "Sim――para alguns será um inferno; mas isto é, justamente, o plácido paraíso dos \"adultos\"."
34140-130 = "Por isso, este meu banquete também, você compreende, não é, Sensei?"
34140-132 = "E, então: será que você poderia deixar o sangue real onde está?"
34140-133 = "Aquela menina é uma aluna que eu eduquei com todo o esmero. Oferecida como sacrifício, ela, com certeza, há de nos conceder, a nós, adultos, um evangelho esplêndido."
34140-134 = "Não fica curioso? Sobre o que eu faço, sobre a que grande obra eu vou chegar.#nSim――posso, aqui e agora, te ensinar."
34140-135 = "O que acha, Sensei?"
34140-137 = "Por exemplo, este mundo――não quer saber que lugar é esta Kivotos?"
34140-138 = "Este mundo é de identidade desconhecida――um conversor do sublime, onde mistério e terror se misturam, totalmente fora do alcance da compreensão."
34140-140 = "Sim…… eu posso até te ensinar a verdade deste mundo.#nO que acha? Perdendo esta oportunidade, talvez não haja outra."
34140-141 = "[s] \"Já chega.\""
34140-142 = "Oh?"
34140-143 = "[s3] \"Não tenho interesse nisso.\"\n[s4] \"Uma verdade alcançada ao custo do sacrifício de alguém não me serve.\""
34140-144 = "……Kukuku. Sei…… no fim, dá nisto mesmo."
34140-145 = "……Kukuku. Sei…… no fim, dá nisto mesmo."
34140-146 = "Pelo visto, nós acreditamos em verdades diferentes.#nSim――você é, sem erro, o meu adversário."
34140-147 = "Sim…… compreendi. O paraíso de que você fala era o \"Tratado do Éden\", né.#nUm mundo simples e fácil de entender, em que a amizade de todos afasta o mal."
34140-148 = "Kukuku…… por que o pensamento das crianças é tão puro e simples assim?"
34140-149 = "Não é por pôr o nome do paraíso que algo muda.#nAliás, um adulto de verdade deveria ensinar a verdade direitinho, assim:"
34140-150 = "\"esse paraíso é, justamente, o lugar onde o pecado original começou\"……."
34140-151 = "Que o verdadeiro paraíso é o que transborda de ódio, raiva, aversão, sofrimento, remorso――#ndessas coisas."
34140-152 = "[ns] \"Beatrice.\""
34140-154 = "[ns5] \"Você insultou os alunos, insultou a nós.\"\n[ns6] \"E insultou o 'ensinar' e o 'aprender'.\"\n[ns7] \"Eu, como adulto, jamais poderei te perdoar.\""
34140-159 = "……Devo tomar isso como uma declaração de guerra?"
34140-160 = "Pois bem; eu os espero na Basílica.#n――Se é que conseguem chegar, claro."
34140-161 = "Lá, decidimos isto."
34140-162 = "Venha, Sensei――ó, incompreensível."
34140-164 = "O homem de preto te reconhece como companheiro e crê que podem competir entre si."
34140-165 = "O Maestro te reconhece como compreendedor e crê que podem elevar um ao outro."
34140-166 = "Golconda te reconhece como metáfora e crê que, um através do outro, se completam."
34140-167 = "E eu te reconheço como adversário, e creio que nos repelimos mutuamente."
34140-169 = "Você é o meu inimigo."
34140-177 = "(……)"
34140-178 = "(……)"
34140-179 = "(S-sim. A-a preparação…… está pronta!)"
34140-180 = "Deem cabo deles."
34140-185 = "[ns] \"Vamos! Squad!\""
34140-186 = "Sim!"
