[translation]
31060-1 = "Episódio 6: Vamos Fazer as Apresentações!"
31060-2 = "Sala do Clube de Reforço"
31060-3 = "（Depois disso, foram feitas breves apresentações e explicações sobre o Clube de Reforço）"
31060-4 = "Então… é isso. Vai ser por pouco tempo, mas vamos nos dar bem a partir de agora."
31060-5 = "[s] \"Prazer em conhecer todo mundo.\""
31060-6 = "……。"
31060-7 = "……。"
31060-8 = "……。"
31060-11 = "E-eh, se tiverem alguma dúvida ou algo que não entenderam…"
31060-12 = "Tranquilo. Basicamente vamos ter aula normal + treinamento especial todo dia depois da aula, né?"
31060-13 = "Bem, não sei se «treinamento» é a palavra certa, mas sim. Nosso objetivo é passar todos juntos no exame especial que vai rolar daqui a pouco."
31060-14 = "O Sensei também vai ajudar, então… vamos todos nos esforçar pra não sermos reprovados…！"
31060-15 = "O exame especial tem três fases, ou seja, três chances… se a gente conseguir passar todos juntos em qualquer uma delas, o Clube de Reforço acaba ali mesmo！"
31060-16 = "Sensei, basicamente você vai cuidar do cronograma e dar vários reforços pra gente."
31060-17 = "Entendi. São três missões. Basta passar em uma com todo mundo. Pra isso, vamos nos reunir aqui todo dia e treinar… não é uma missão tão difícil assim."
31060-18 = "Esse grupo é basicamente pra impedir que alguém desista no meio do caminho… eu, particularmente, não tenho motivo nem vontade de sabotar."
31060-19 = "E-exato, vamos nos esforçar！ Ah, Azusa-chan, você transferiu faz pouco tempo, né?"
31060-20 = "Ainda deve estar se acostumando com a escola, então se a gente se ajudar, vai dar tudo certo rapidinho！"
31060-21 = "Ara？ [ruby=しらす]Shirasu[/ruby]-san se transferiu pra Trinity？"
31060-22 = "Transferir pra Trinity é bem raro, né…？"
31060-23 = "……。"
31060-24 = "Ah, é o que tá escrito nos documentos… s-será que eu falei algo que não devia…？"
31060-25 = "Não, não é nada que eu precise esconder. É um fato."
31060-26 = "Estou acostumada a ouvir esse tipo de coisa, e me esforço pra isso."
31060-27 = "Entendi…"
31060-28 = "Então… posso te chamar de Azusa-chan？"
31060-29 = "……？ Pode, por quê？"
31060-30 = "Então, Azusa-chan, Hifumi-chan, Koharu-chan. Fufu, que som legal. A partir de agora somos companheiras do Clube de Reforço."
31060-31 = "Azusa-chan parece fria à primeira vista, mas é bem fofinha. Fufufu."
31060-37 = "……。"
31060-38 = "Ara, por que esses olhos cheios de ódio, Koharu-chan？"
31060-39 = "Só pra deixar claro, eu não aceito isso……！"
31060-40 = "Eh, o quê…？"
31060-41 = "Ara, do que você tá falando？"
31060-42 = "E-eu sou uma elite do Comitê de Execução da Justiça！"
31060-43 = "Só porque vocês são mais velhas, não vou chamar nenhuma de vocês de senpai！"
31060-44 = "E de qualquer forma, vou sair logo desse clube ridículo！ Então não fiquem tão amiguinhas assim comigo, tá！？"
31060-45 = "Entendi… realmente não faz sentido ter hierarquia de senpai/kouhai dentro do Clube de Reforço. Pra mim não tem problema nenhum."
31060-46 = "Pra mim também. Eu nem tô acostumada com esse tipo de cultura."
31060-47 = "No fundo esse grupo não é pra gente ser amiguinha. É só por interesse mútuo, então não precisa fingir intimidade. Certo？"
31060-48 = "A-auuu……"
31060-49 = "Então tá decidido！ E falando nisso…"
31060-50 = "Se eu tirei nota baixa foi só porque… eu fiz a prova do 2º ano pra tentar pular de série！"
31060-51 = "Ara, pular de série？ Por que você faria isso…？"
31060-52 = "P-por que o quê…！ Eu vou ser a futura líder do Comitê de Execução da Justiça……！"
31060-53 = "Mas acabou reprovando, né？ Se fosse só uma tentativa, eu entenderia, mas por que insistiu várias vezes…？"
31060-54 = "C-cala a boca, cala a boca！ Não é isso que eu quero dizer！"
31060-56 = "Ou seja, eu tava escondendo meu verdadeiro poder o tempo todo！！"
31060-61 = "Na próxima prova vou fazer a do 1º ano direitinho！ Aí tiro nota alta e pronto, fim de papo. Entendeu？"
31060-66 = "E aí saio logo desse clube idiota！"
31060-67 = "E-eh… mesmo que você tire nota alta sozinha, isso não significa que o clube acaba…"
31060-68 = "Entendi, então você tava escondendo seu histórico. Aliás, eu também tô fazendo prova do 1º ano por causa da diferença de currículo da escola anterior."
31060-69 = "Ah, então somos iguais… n-não！ De qualquer forma, logo isso não vai mais importar！"
31060-70 = "E, foi uma pena o curto tempo juntas, mas vocês não parecem ser meu tipo mesmo！ Ahaha！"
31060-71 = "Tchau, boa sorte aí！"
31060-74 = "A-aquela……！ F-foi embora…"
31060-75 = "Fufu, a Koharu-chan tem altos e baixos de humor bem intensos. É divertido de ver."
31060-76 = "Já a Azusa-chan é o oposto, ela não muda nunca."
31060-79 = "Auuu……"
31060-80 = "Vai ser divertido a partir de agora, fufufu."
31060-82 = "（Depois disso, o Clube de Reforço começou a se reunir todo dia depois da aula pra ter reforço especial）"
31060-84 = "Próximo; Vamos Estudar pra Prova"