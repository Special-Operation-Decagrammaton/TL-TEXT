[translation]
31060-1 = "Episódio 6; Vamos nos apresentar!"
31060-2 = "Clube de Reforço - Sala de Aula"
31060-3 = "（Depois disso, foram feitas apresentações simples e uma introdução ao Clube de Reforço）"
31060-4 = "Bem, é isso... é por pouco tempo, mas conto com vocês a partir de agora."
31060-5 = "[s] \"Conto com você também.\""
31060-6 = "……。"
31060-7 = "……。"
31060-8 = "……。"
31060-11 = "E-então, se tiverem alguma dúvida ou algo que queiram saber..."
31060-12 = "Tudo bem. De agora em diante, além das aulas normais, teremos um treinamento especial todos os dias depois da escola, certo?"
31060-13 = "Bem, não sei se dá para chamar de treinamento, mas é isso. O que buscamos é que, no próximo exame acadêmico especial, \"todas passem ao mesmo tempo\"."
31060-14 = "O Sensei também vai nos ajudar, então, t-todas vamos nos esforçar para evitar a reprovação...!"
31060-15 = "Parece que o exame acadêmico especial terá até a 3ª fase, ou seja, três tentativas... mas se passarmos todas juntas em qualquer uma delas, o Clube de Reforço acaba!"
31060-16 = "Gostaria que o Sensei nos ajudasse principalmente com... o ajuste de horários e a condução de vários reforços."
31060-17 = "Entendido. Das três missões, basta que tenhamos sucesso uma vez como grupo. Para isso, nos reuniremos aqui todos os dias para treinar... não é uma tarefa tão difícil."
31060-18 = "Este grupo é, essencialmente, uma medida para evitar que cada uma de nós seja reprovada... Pessoalmente, não tenho intenção nem motivo para sabotar isso."
31060-19 = "I-isso mesmo, vamos nos esforçar! Bem, Azusa-chan, você não faz muito tempo que se transferiu, não é?"
31060-20 = "Deve ser também porque ainda não se acostumou com a escola, mas acho que se todas nos esforçarmos, logo daremos um jeito!"
31060-21 = "Ah? A Shirasu-san se transferiu para cá?"
31060-22 = "Transferir-se para Trinity é algo raro, não é...?"
31060-23 = "……。"
31060-24 = "Ah, nos documentos estava escrito assim... s-será que eu disse algo desnecessário...?"
31060-25 = "Não, não é algo que precise ser escondido, então não se preocupe. É um fato concreto."
31060-26 = "Devo me acostumar a ser questionada sobre isso, e farei o esforço necessário."
31060-27 = "Entendo..."
31060-28 = "Então, eu também posso te chamar de Azusa-chan?"
31060-29 = "……? Por mim tudo bem, mas por quê?"
31060-30 = "Então, Azusa-chan, Hifumi-chan, e Koharu-chan. Ufufu, soa muito bem. A partir de agora, somos todas companheiras do Clube de Reforço."
31060-31 = "A Azusa-chan parece fria à primeira vista, mas é bem fofinha. Fufufu."
31060-37 = "……。"
31060-38 = "Ora, por que esse olhar cheio de ódio, Koharu-chan?"
31060-39 = "Já vou avisando, eu não aceito isso...!"
31060-40 = "E-então...?"
31060-41 = "Ora, do que você está falando?"
31060-42 = "E-eu sou uma elite do Comitê de Implementação da Justiça!"
31060-43 = "Só porque sou mais nova, não pensem que vou chamar vocês de veteranas!"
31060-44 = "Além disso, eu vou sair desse clube logo, logo! Não fiquem sendo tão íntimas comigo!"
31060-45 = "Entendo... realmente, não acho necessário tratar umas às outras como veteranas e novatas dentro do Clube de Reforço. Para mim, não há problema algum."
31060-46 = "Para mim também não. Além disso, não estou acostumada com essa cultura."
31060-47 = "Não estamos reunidas aqui para sermos amigas. É puramente para o benefício mútuo, então não há necessidade de fingir proximidade. Não é?"
31060-48 = "A-auuu..."
31060-49 = "Então está decidido! E, aliás, sobre o que estávamos falando..."
31060-50 = "Eu só reprovei no exame porque... tentei fazer o teste do 2º ano, um nível acima, para pular de série!"
31060-51 = "Ah, pular de série? Por que faria algo assim...?"
31060-52 = "P-por que nada...! Eu vou carregar o futuro do Comitê de Implementação da Justiça nas costas...!"
31060-53 = "Mas, por causa disso, você acabou reprovando, não foi? Entendo tentar como um desafio, mas por que fazer isso repetidamente...?"
31060-54 = "C-cala a boca, cala a boca! Não é isso que eu quero dizer!"
31060-56 = "O que eu quero dizer é que, até agora, eu estava escondendo meu verdadeiro poder!!"
31060-61 = "No próximo teste, vou fazer o teste do 1º ano corretamente! Assim, vou tirar uma nota excelente e pronto, acabou. Entendeu?"
31060-66 = "E aí, vou sair desse Clube de Reforço imediatamente!"
31060-67 = "Bem, mesmo que eu tenha obtido notas excelentes individualmente, isso não significa que eu possa me formar neste clube..."
31060-68 = "Entendi, então você estava escondendo seu histórico. Aliás, eu também estou fazendo as provas do primeiro ano agora, já que a diferença no ritmo de aprendizado com a minha escola anterior era muito grande."
31060-69 = "Ah, então somos iguais... N-não! De qualquer forma, isso não vai importar por muito tempo!"
31060-70 = "Além disso, é uma pena que nosso tempo juntos tenha sido curto, mas parece que vocês não são desse tipo, né? Ahaha!"
31060-71 = "Até mais, boa sorte!"
31060-74 = "A-ah... E-ela foi embora..."
31060-75 = "Fufu, a Koharu-chan tem altos e baixos de humor tão intensos que é divertido de assistir."
31060-76 = "Em contraste, a Azusa-chan é consistente e nunca vacila."
31060-79 = "Auu..."
31060-80 = "Estou ansiosa pelo que vem a seguir, fufufu."
31060-82 = "(A partir de então, o Clube de Reforço passou a se reunir na sala de aula todos os dias após as aulas para receber aulas de reforço especiais.)"
31060-84 = "Próximo episódio: Estudando para as provas"
