[translation]
31060-1 = "Episódio 6;Vamos nos Apresentar!"
31060-2 = "Clube de Aulas de Reforço - Sala de aula"
31060-3 = "(Em seguida, fez-se uma breve apresentação e uma introdução ao Clube de Aulas de Reforço)"
31060-4 = "É que, então, é isso…… por um curto período, mas, daqui pra frente, conto com vocês."
31060-5 = "[s] \"Conto com vocês.\""
31060-6 = "……."
31060-7 = "……."
31060-8 = "……."
31060-11 = "É-é que, se tiverem algum ponto que não entenderam ou que os preocupe……."
31060-12 = "Tranquilo. A partir de agora, além das aulas normais, é só ter um treinamento especial todo dia depois da aula, né."
31060-13 = "É que, não sei se dá pra chamar de treinamento, mas é isso. O que a gente busca é \"todo mundo ser aprovado ao mesmo tempo\" no Exame Especial de Aptidão que vem por aí."
31060-14 = "O Sensei também vai ajudar, então v-vamos todo mundo se esforçar pra escapar da reprovação……!"
31060-15 = "O Exame Especial de Aptidão vai até o 3º, ou seja, são 3 vezes…… mas, se ao menos uma dessas vezes todo mundo for aprovado ao mesmo tempo, aí o reforço acaba!"
31060-16 = "Do Sensei, a gente precisa principalmente…… do ajuste da agenda e de dar vários reforços."
31060-17 = "Sim, entendi. Das 3 missões, obter sucesso com todo mundo em pelo menos uma. Pra isso, reunir-se aqui todo dia e acumular treino…… não é uma missão tão difícil."
31060-18 = "Este grupo é, em suma, uma medida pra evitar a desistência de cada uma…… quanto a mim, não tenho nem vontade nem motivo pra fazer sabotagem."
31060-19 = "P-pois é, vamos nos esforçar! É que, Azusa, faz pouco tempo que você se transferiu pra cá, né?"
31060-20 = "Deve ser em parte porque você ainda não se acostumou a esta academia; acho que, com todo mundo se esforçando, logo dá um jeito!"
31060-21 = "Ora? A senhorita Shirasu se transferiu pra cá?"
31060-22 = "Transferir-se pra Trinity, que raro……?"
31060-23 = "……."
31060-24 = "Ah, no papel está escrito assim…… s-será que eu falei algo que não devia……?"
31060-25 = "Não, não é nada que eu esconda, pode ficar tranquila. É um fato consumado."
31060-26 = "É algo com que eu devo me acostumar a ouvir, e vou me esforçar pra isso."
31060-27 = "Sei……."
31060-28 = "Então eu também posso te chamar de Azusa?"
31060-29 = "……? Por mim, tudo bem?"
31060-30 = "Então, Azusa. Hifumi. E também Koharu. Ufufufu, que som bom, sei lá. A gente, daqui pra frente, é companheira no Clube de Aulas de Reforço."
31060-31 = "A Azusa, à primeira vista, parece meio fria, mas é meio fofinha, sabe. Ufufu."
31060-37 = "……."
31060-38 = "Ora, com esse olhar cheio de ódio, o que foi, Koharu?"
31060-39 = "Já vou avisando: eu não vou aceitar……!"
31060-40 = "É que……?"
31060-41 = "Ora, do que você está falando?"
31060-42 = "E-eu sou uma elite do Comitê de Realização da Justiça!"
31060-43 = "Só porque sou mais nova, não pense que eu vou chamar vocês de veteranas!"
31060-44 = "E, aliás, desse clube eu vou sair logo, logo! Dá pra não ser tão íntima assim comigo!?"
31060-45 = "Sei…… de fato, acho que não é preciso, dentro do Clube de Aulas de Reforço, tratar como veterana e caloura. Por mim, não há problema nenhum."
31060-46 = "Por mim também não. Aliás, esse tipo de cultura não é o meu forte."
31060-47 = "No fundo, não é um grupo que se reuniu pra fazer amizade. É só pelo interesse mútuo, então não precisa fingir intimidade. Não é?"
31060-48 = "A-auu……."
31060-49 = "Então tá decidido! E, aliás, indo à raiz da questão……."
31060-50 = "Eu reprovei na prova só porque…… pra pular de série, fiz a prova do 2º ano, um ano acima!"
31060-51 = "Ora, pular de série? Por que uma coisa dessas……?"
31060-52 = "P-por que, ora essa……! É que eu vou passar a ter a posição de carregar o Comitê de Realização da Justiça nas costas……!"
31060-53 = "Mas, com isso, você acabou reprovando, né? Se fosse pra tentar uma vez, eu até entenderia; mas por que fazer isso várias vezes……?"
31060-54 = "C-cala a boca, cala a boca! Não é isso que eu quero dizer!"
31060-56 = "Ou seja, é que eu, até agora, estava escondendo o meu verdadeiro poder!!"
31060-61 = "Na próxima prova eu vou fazer certinho a prova do 1º ano! Aí eu tiro uma nota excelente e pronto, acabou. Entendeu?"
31060-66 = "E aí eu saio logo desse tal de Clube de Aulas de Reforço!"
31060-67 = "É que, mesmo que você tire uma nota excelente sozinha, isso não faz você se formar deste clube……."
31060-68 = "Sei, então você escondia o seu histórico. Aliás, eu também, agora, por causa da grande diferença de ritmo de estudo com o meu lugar anterior, estou fazendo a prova do 1º ano."
31060-69 = "Ah, então a gente é igu― n-não! De todo jeito, logo isso não vai ter mais relação!"
31060-70 = "E, foi um prazer curto, uma pena, mas vocês não parecem ser desse tipo, né? Ahaha!"
31060-71 = "Até mais, esforcem-se bastante!"
31060-74 = "A-ah, é que……! E-ela foi embora, né……."
31060-75 = "Ufu, a Koharu tem uns altos e baixos de humor incríveis; é divertido de ver."
31060-76 = "A Azusa, ao contrário, é sempre firme, não oscila nada."
31060-79 = "Auu……."
31060-80 = "Daqui pra frente vai ser divertido, né, ufufu."
31060-82 = "(A partir daí, o Clube de Aulas de Reforço passou a se reunir na sala todo dia depois da aula pra ter as aulas de reforço especiais)"
31060-84 = "Próximo Episódio;Estudo para a Prova"
