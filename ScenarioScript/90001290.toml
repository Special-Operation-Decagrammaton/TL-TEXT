[translation]
90001290-1 = "Episódio 29; O Destino da Carga"
90001290-2 = "[ns] \"N-nós conseguimos...!\""
90001290-3 = "Então este é... o Profeta de quem o Sensei estava falando!"
90001290-4 = "Foi incrível! #nSenti como se tivéssemos derrotado um subchefe!!"
90001290-5 = "Pegando emprestada a expressão da Aris — foi um chefe um pouco diferente dos que enfrentamos até agora. #nSerá porque chegamos a um novo mapa?"
90001290-7 = "Não existe um padrão para a forma dos Profetas."
90001290-8 = "Mas... é, eu concordo que ele parecia estranho."
90001290-9 = "Senti como se as peças tivessem se unido para dar suporte à unidade principal."
90001290-10 = "Não foi um exagero? #nAquele poder de fogo, parecia que ia queimar até as sementes que deveria proteger."
90001290-12 = "Talvez eles tenham priorizado a eliminação dos invasores em vez da preservação das sementes."
90001290-13 = "……Embora pareça um contrassenso."
90001290-14 = "Eliminação... quando é direcionada a nós, é uma palavra tão assustadora..."
90001290-15 = "Existem outros Profetas, não é...? #nSensei, que tipo de batalhas você enfrentou até agora...?"
90001290-16 = "Uu, que medo... onde... tem um armário...?"
90001290-18 = "[ns1] \"Mas, até agora, sempre demos um jeito.\"\n[ns2] \"Isso também é graças a todos vocês.\""
90001290-22 = "Ora, você pode me elogiar mais, sabia?"
90001290-23 = "Ah, a chefe vai ficar convencida de novo..."
90001290-24 = "Sensei, você deveria elogiar mais a mim, que sou tanto da C&C quanto membro do Departamento de Investigação de Fenômenos Singulares."
90001290-26 = "……Sensei, deve ser difícil estar cercado por pessoas assim."
90001290-28 = "Tiferet foi derrotada...?"
90001290-29 = "Ugh... buááá!"
90001290-30 = "Não pode ser... como...!?"
90001290-34 = "Recebi uma mensagem da Tiferet... ela está pedindo desculpas."
90001290-35 = "Para Sof, por ter causado esse resultado devido ao seu egoísmo."
90001290-36 = "E para Ain, por ter traído a confiança depositada nela."
90001290-37 = "Por fim, para Owl... por ter decepcionado o Administrador."
90001290-39 = "Não, decepção é uma palavra forte... #nSe a Tiferet estiver bem, é o que importa."
90001290-40 = "A Princesa e a Serva... se não fosse por aquela variável...!!"
90001290-41 = "Se tivéssemos conseguido captar mais cedo, a Tiferet teria..."
90001290-42 = "Ti, Tiferet-chan! #nEspere um pouco, vamos dar um jeito agora mesmo!"
90001290-43 = "Owl! Consegue abrir espaço no último contêiner?"
90001290-44 = "Ainda é possível. #nAin, por favor!"
90001290-45 = "S-sim! #nAh, m-mas..."
90001290-46 = "Desse jeito, o tempo...! #nVai levar mais 30 minutos...!"
90001290-47 = "Não temos tanto tempo assim!"
90001290-48 = "E, e, e, e, então, o que faremos...?"
90001290-49 = "Nesse caso, vamos mover o lançador de contêineres do subsolo até embaixo da Tiferet e—"
90001290-50 = "Mover...?"
90001290-52 = "Explodir o chão! Se fizermos isso, o carregamento e o lançamento devem acontecer direto!"
90001290-53 = "O, o quêêêêê!?"
90001290-54 = "Plano aceito!"
90001290-55 = "Sério mesmo!?"
90001290-59 = "Está tremendo muito... o que está acontecendo agora?"
90001290-60 = "……Parece que algo gigantesco está se movendo."
90001290-61 = "――A partir deste momento, esta instalação será fechada."
90001290-62 = "Repito... a partir deste momento, esta instalação será fechada. #nPor favor, evacuem imediatamente."
90001290-68 = "Sensei, segure-se firme!"
90001290-69 = "Pessoal, vamos sair daqui!"
90001290-79 = "Aris, Sensei, vocês estão bem?"
90001290-80 = "Sim, a Aris está bem, mas..."
90001290-82 = "[ns] \"O que está acontecendo...?\""
90001290-84 = "……Sensei, olhe aquilo!"
90001290-88 = "O que seria aquilo...?"
90001290-89 = "Parece um equipamento de transporte."
90001290-90 = "Não acredito, eles transportavam recursos para o Continente de Aço desse jeito...!?"
90001290-91 = "Embora pareça apenas que estão carregando carga em grandes contêineres……."
90001290-95 = "Ei, aquilo é...! P-pessoal, abaixem-se!#nA onda de choque vem aí――"
90001290-101 = "[ns] \"Aaaah!?\""
90001290-102 = "Sensei, você está bem?"
90001290-103 = "Fico feliz que esteja a salvo."
90001290-105 = "O contêiner voou para longe... que método bruto……."
90001290-106 = "Como você sabia que ele seria lançado?"
90001290-107 = "Ah, eu não sei... eu só tive um pressentimento……."
90001290-108 = "……Entendo, o poder da intuição não deve ser subestimado."
90001290-110 = "Vamos descer."
90001290-111 = "Pessoal, tomem cuidado. Parece que ainda há muito calor residual."
90001290-112 = "Ah, então eu vou ficar aqui vigiando."
90001290-113 = "Sim? Se vamos, deveríamos ir todos juntos... ah, entendi. Nesse caso, deixo com você."
90001290-114 = "Sim, pode deixar comigo."
90001290-120 = "Então os trilhos levavam até aqui."
90001290-121 = "Sim, este deve ter sido o centro de coleta de recursos."
90001290-122 = "E então eram carregados nos contêineres――"
90001290-124 = "――E voavam pelos ares em direção ao Continente de Aço, como vimos."
90001290-125 = "É um sistema cheio de romance, não é...#nJá que serve para lançar carga, vamos chamar de \"Lançador de Contêineres\"?"
90001290-126 = "Os recursos coletados em vários locais eram trazidos por ferrovia――#ne transportados pelo ar até o Continente de Aço pelo Lançador de Contêineres. Finalmente estamos vendo o quadro completo."
90001290-128 = "Se analisarmos a trajetória dos contêineres, poderemos descobrir as coordenadas do Continente de Aço."
90001290-129 = "As instalações que restaram aqui também parecem valer a pena investigar."
90001290-131 = "……Entendo.#nEntão, o que devemos fazer agora?"
90001290-132 = "Hmm... vejamos."
90001290-133 = "Parece que vai exigir trabalho pesado, então você poderia chamar a Eimi?"
90001290-134 = "Aquele lugar ainda parece quente, não quero ir."
90001290-135 = "[s] \"Se você for, eu compro bastante sorvete quando voltarmos!\""
90001290-136 = "……."
90001290-137 = "É uma promessa, Sensei?"
90001290-140 = "Próximo episódio: Preparativos para a partida"
