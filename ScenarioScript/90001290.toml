[translation]
90001290-1 = "第29話;貨物の行方"
90001290-2 = "[ns] \"や、やった……！\""
90001290-3 = "これが……先生の言っていた預言者なのですね！"
90001290-4 = "すごかったです！#nまるで中ボスを倒した気分でした！！"
90001290-5 = "アリスの表現を借りるなら――これまでとは少し変わったボスでしたね。#n新マップに来たからでしょうか？"
90001290-7 = "預言者の形態に決まりなどないわ。"
90001290-8 = "けれど……そうね、たしかに異質だと感じるわ。"
90001290-9 = "パーツが合体して、メインユニットを補助していたように感じました。"
90001290-10 = "それにしては過剰じゃなかった？#nあの火力、守ってる種まで燃やす勢いだったよ。"
90001290-12 = "種子の保管より、侵入者の排除を優先していたのかもしれません。"
90001290-13 = "……本末転倒な気もしますが。"
90001290-14 = "排除って、自分に向けられたらこんなに怖い言葉なんだ……。"
90001290-15 = "預言者は他にもいるんですよね……？#n先生は今まで、どんな戦いを……？"
90001290-16 = "うぅ、怖い……ロッカー……どこ……。"
90001290-18 = "[ns1] \"けど、今までは何とかなってきたからね。\"\n[ns2] \"これも、みんなのおかげだよ。\""
90001290-22 = "あら、もっと褒めてくださっても良いのですよ？"
90001290-23 = "ああ、また部長が調子に乗っちゃう……。"
90001290-24 = "先生は、C&Cでもあり特異現象捜査部のメンバーでもある私をもっと褒めるべきです。"
90001290-26 = "……こんな人たちに囲まれて、先生も大変ですね。"
90001290-28 = "ティファレトが、負けた……？"
90001290-29 = "うっ……うえぇーん！"
90001290-30 = "まさか……そんな……！？"
90001290-34 = "ティファレトからメッセージが届きました……謝っています。"
90001290-35 = "ソフには、自分の身勝手のせいで、このような結果を招いてしまったことについて。"
90001290-36 = "そしてアインには、せっかくの信頼を裏切ってしまったことについて。"
90001290-37 = "最後にオウル……管理者を失望させてしまったことについて。"
90001290-39 = "いえ、失望だなんて……。#nティファレトが無事でいてくれればそれで。"
90001290-40 = "王女と侍女……あの変数さえなければ……！！"
90001290-41 = "もっと早く補足できてれば、ティファレトは……。"
90001290-42 = "ティ、ティファちゃん！#nちょっと待っててくださいね、今すぐ何とかしますから！"
90001290-43 = "オウル！最後のコンテナにスペース作れる？"
90001290-44 = "まだ何とかなります。#nアイン、お願いします！"
90001290-45 = "はっ、はいっ！#nあっ、で、でも……。"
90001290-46 = "このままじゃ時間が……！#nあと30分はかかっちゃいます……！"
90001290-47 = "そんなに時間ないよ！"
90001290-48 = "で、でででで、では、どうしましょう……？"
90001290-49 = "それなら、地下のコンテナ・ランチャーをティファレトの下まで移動させて――"
90001290-50 = "移動させて……？"
90001290-52 = "地面を爆破！そうすれば積み込みから発射まで、そのまま行けるはず！"
90001290-53 = "え、ええええええ！？"
90001290-54 = "それ、採用です！"
90001290-55 = "本当ですかぁぁぁ！？"
90001290-59 = "大きく揺れていますね……次から次へ、何が起こっているのでしょう？"
90001290-60 = "……巨大な何かが動いてるみたい。"
90001290-61 = "――現時刻を以って、当施設は閉鎖されます。"
90001290-62 = "繰り返します……現時刻を以って、当施設は閉鎖されます。#n速やかに退去してください。"
90001290-68 = "先生、しっかり掴まっていてください！"
90001290-69 = "みんな、脱出するわよ！"
90001290-79 = "アリス、先生、無事ですか？"
90001290-80 = "はい、アリスは大丈夫ですが……。"
90001290-82 = "[ns] \"何が起きてるの……？\""
90001290-84 = "……先生、あれを見てください！"
90001290-88 = "あれは……何でしょうか？"
90001290-89 = "輸送用設備のように見えます。"
90001290-90 = "まさか、こんな方法で鋼鉄大陸まで資源を輸送していたというの……！？"
90001290-91 = "大きなコンテナに貨物を積んでいるだけのようにも見えますが……。"
90001290-95 = "えっ、あれって……！みっ、皆さん、伏せて！#n爆風が来る――"
90001290-101 = "[ns] \"うわあぁっ！？\""
90001290-102 = "先生、大丈夫？"
90001290-103 = "ご無事のようで何よりです。"
90001290-105 = "コンテナが飛んでいきましたね……なんという荒業を……。"
90001290-106 = "どうして打ち上げられると分かったのですか？"
90001290-107 = "なっ、なんか……そんな気がして……。"
90001290-108 = "……なるほど、直感の力は侮れませんね。"
90001290-110 = "下へ降りてみましょう。"
90001290-111 = "皆さん、気をつけてください。まだ熱気が残っているようです。"
90001290-112 = "あ、じゃあ、私はここで見張ってるね。"
90001290-113 = "はい？行くならまとめて……ああ、そういうことですか。では、お任せしました。"
90001290-114 = "うん、任されたよ。"
90001290-120 = "レールはここに続いていたのね。"
90001290-121 = "ええ、ここが資源の集積地だったのでしょう。"
90001290-122 = "そしてコンテナに積み込まれ――"
90001290-124 = "――あのように、鋼鉄大陸めがけて空を飛んでいった、と。"
90001290-125 = "ロマンあふれるシステムですね……。#n貨物を打ち出すという意味で、「コンテナ・ランチャー」とでも呼んでおきますか。"
90001290-126 = "各所で採取された資源は鉄道で運び込まれ――#nコンテナ・ランチャーによって、鋼鉄大陸へと空中輸送されていた。これでやっと全体像が見えてきましたね。"
90001290-128 = "コンテナの軌道を分析すれば、鋼鉄大陸の座標が割り出せそうね。"
90001290-129 = "ここに残されている施設も、調査の価値がありそうです。"
90001290-131 = "……なるほど。#nでは、私たちは何をすれば良いでしょうか？"
90001290-132 = "うーん……そうですね。"
90001290-133 = "力仕事になりそうなので、エイミを呼んできてくれますか？"
90001290-134 = "そこ、まだ暑そうだから行きたくないんだけど。"
90001290-135 = "[s] \"帰ったらいっぱいアイス買ってあげるよ！\""
90001290-136 = "……。"
90001290-137 = "約束だよ、先生？"
90001290-140 = "次回;出発の準備"
