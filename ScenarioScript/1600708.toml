[translation]
1600708-1 = "Uma mentira sutil é quase um erro."
1600708-2 = "Academia Federal Red Winter - Em frente ao portão principal"
1600708-3 = "Bom dia, Sensei."
1600708-4 = "Como mencionei anteriormente, hoje planejamos registrar o grande cotidiano da Presidente Cherino para um documentário. Mas, como a Presidente está muito ocupada... hoje vamos seguir os passos dela."
1600708-5 = "Desde o escritório da secretaria, onde a Presidente Cherino trabalha habitualmente,"
1600708-6 = "até a loja de doces que ela gosta de visitar durante o intervalo..."
1600708-7 = "Vamos observar a Academia Federal Red Winter seguindo a rotina da Presidente Cherino e registrar seus gostos e seu cotidiano sem perder nenhum detalhe!"
1600708-8 = "[s] \"E o que eu devo fazer exatamente...?\""
1600708-9 = "Este filme é uma grande obra da Academia Federal Red Winter, que futuramente será exibida em todos os cinemas de Kivotos!"
1600708-10 = "Por isso, precisamos considerar não apenas a perspectiva da Academia Federal Red Winter, mas também o ponto de vista objetivo de alguém de fora."
1600708-11 = "Então, hoje, quero que o Sensei vivencie a rotina da Presidente Cherino e... sinta-se à vontade para expressar qualquer dúvida ou impressão que tiver."
1600708-12 = "[s] \"Entendo, se é assim, ficarei feliz em ajudar.\""
1600708-13 = "Sim. Já que estamos aqui, hoje tratarei o Sensei com a mesma cortesia que tratamos a Presidente Cherino, então espero que o Sensei apenas aproveite o momento."
1600708-14 = "Então... vamos começar as filmagens!"
1600708-16 = "Academia Federal Red Winter - Secretaria"
1600708-17 = "Como o Sensei sabe, este é o escritório onde os funcionários da secretaria da Academia Federal Red Winter trabalham."
1600708-18 = "O dia da Presidente Cherino também começa aqui."
1600708-19 = "Após chegar à escola, a Presidente Cherino começa o dia desfrutando de um chá com bastante geleia, mas..."
1600708-20 = "[s1] \"Chá com geleia...?\"\n[s2] \"Não consigo nem imaginar o gosto.\""
1600708-21 = "Sim. Na verdade, a doçura da geleia combina muito bem com o aroma do chá."
1600708-22 = "Sim. Na verdade, a doçura da geleia combina muito bem com o aroma do chá."
1600708-23 = "Já que estamos aqui, o Sensei gostaria de uma xícara?"
1600708-24 = "[s] \"Bom, acho que vou aceitar.\""
1600708-25 = "Vou preparar agora mesmo, por favor, sente-se e aguarde."
1600708-31 = "O chá que Tomoe trouxe era realmente delicioso. Não houve nada de especial que me chamasse a atenção, e tivemos uma conversa agradável."
1600708-33 = "Dentro da Academia Federal Red Winter - Loja de doces"
1600708-34 = "Esta é a loja de doces que vende o pudim favorito da Presidente Cherino."
1600708-35 = "Certa vez, ao provar o pudim daqui, a Presidente Cherino ficou tão impressionada que concedeu uma medalha à loja. Como resultado, todos os doces deste lugar passaram a ser decorados com um bigode, símbolo de sua autoridade."
1600708-36 = "Aqui, além do pudim, o \"Blini de Bigode\", feito com bastante ovas de salmão e creme doce, também é muito popular."
1600708-37 = "[s] \"Ovas de salmão e creme doce...?\""
1600708-38 = "Sim, é muito gostoso, sabia? Gostaria de experimentar?"
1600708-39 = "Vou pedir, por favor, aguarde um momento."
1600708-45 = "As ovas de salmão e o creme doce, surpreendentemente, combinavam muito bem e estavam deliciosos."
1600708-46 = "Depois disso, continuei conversando com Tomoe enquanto percorríamos vários lugares da Academia Federal Red Winter. Não houve nada que me causasse estranheza, e passei um tempo muito agradável..."
1600708-50 = "Academia Federal Red Winter - Em frente ao portão principal"
1600708-51 = "Ah, já está nesse horário."
1600708-52 = "Passar o dia inteiro apenas seguindo os passos dela... deu para perceber que a Presidente Cherino realmente tem um dia muito ocupado."
1600708-53 = "[s] \"Basicamente passamos o dia todo comendo... isso estava certo?\""
1600708-54 = "Sim, foi muito útil."
1600708-55 = "Acho que conseguiremos um bom filme, estou ansiosa."
1600708-56 = "[s3] \"Aliás, eu queria perguntar isso faz tempo...\"\n[s4] \"Onde está a câmera de filmagem?\""
1600708-57 = "……"
1600708-58 = "Ah, agora que você mencionou, esqueci de trazer a câmera."
1600708-59 = "……"
1600708-60 = "Ah, agora que você mencionou, esqueci de trazer a câmera."
1600708-61 = "A conversa com o Sensei estava tão agradável que acabei cometendo um \"erro\" por descuido."
1600708-62 = "[ns] \"I-isso é possível...?\""
1600708-64 = "[ns] \"O que é verdade e o que não é...?\""
1600708-72 = "Sem dúvida, é verdade que eu adoro a Presidente Cherino, mas... existe uma frase em um filme que eu gosto muito."
1600708-73 = "\"Uma mentira sutil é quase um erro\"..."
1600708-74 = "No fim das contas... mais do que uma mentira, foi um erro."
1600708-75 = "O dia que passei com o Sensei foi divertido, de uma forma diferente dos dias com a Presidente Cherino..."
1600708-76 = "Talvez, de vez em quando, eu acabe cometendo esse tipo de 'erro' novamente no futuro."
1600708-78 = "Depois disso, passei o resto do dia aproveitando e acompanhando o 'erro' da Tomoe, até que o dia chegou ao fim."
