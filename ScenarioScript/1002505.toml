[translation]
1002505-1 = "É para verificar a segurança!"
1002505-2 = "Distrito Central de Kivotos - Playland"
1002505-3 = "Então aqui é...!"
1002505-4 = "Entendo, realmente tem muitas coisas que parecem divertidas aqui!"
1002505-5 = "Um pula-pula com personagens fofos, uma piscina de bolinhas enorme..."
1002505-6 = "Fufu, acho que com isso todos ficarão satisfeitos."
1002505-7 = "Vamos lá, Sensei. Por qual vamos começar a brincar?"
1002505-8 = "[s] \"Ah, então você vai brincar de verdade?\""
1002505-9 = "C-claro que sim! Olhar de fora e experimentar na prática são coisas completamente diferentes!"
1002505-10 = "Não tem como saber como o equipamento se move ou se é realmente perigoso sem testar pessoalmente."
1002505-12 = "De forma alguma é porque eu quero brincar... não é nada disso!"
1002505-13 = "[s1] \"Pode ser verdade.\"\n[s2] \"Já que estamos aqui, é melhor brincar a sério para entender esses detalhes, não é?\""
1002505-14 = "(S-será que ele acreditou em mim...?)"
1002505-15 = "(S-será que ele acreditou em mim...?)"
1002505-16 = "E-então, vamos começar por aquele pula-pula ali?"
1002505-18 = "O pula-pula parece um brinquedo simples à primeira vista, mas como usa molas, na verdade é algo onde é fácil se machucar."
1002505-19 = "Por exemplo, se houver um problema nas molas, ele pode quebrar por falta de durabilidade, ou se a elasticidade for forte demais, a pessoa pode acabar sendo arremessada para fora do tapete. Pode prender os dedos ou, se alguém cometer um erro, pode causar um ferimento grave."
1002505-20 = "Por isso, primeiro vou verificar a durabilidade..."
1002505-26 = "...Hum, pelo que verifiquei com as mãos, parece não haver problemas. Assim, não tem problema se várias crianças subirem ao mesmo tempo. Também não tem risco de prender os dedos."
1002505-27 = "Agora... acho que vou subir nele para testar."
1002505-34 = "Uau! Pula muito alto...!?"
1002505-37 = "Este pula-pula, mais do que eu pensava...!"
1002505-38 = "Ah, é incrível! É como se eu estivesse voando no céu...!"
1002505-39 = "[s3] \"...Shun?\"\n[s4] \"Parece que está se divertindo, hein?\""
1002505-40 = "Ah, não...!"
1002505-41 = "Ah, não...!"
1002505-42 = "I-isso mesmo! Quando a gente se coloca no lugar das crianças, fica muito divertido! Tenho certeza de que todos vão gostar...!"
1002505-47 = "Hum, parece que não há problemas mesmo subindo nele."
1002505-48 = "Se for para dizer algo, é que o pula-pula é tão divertido que existe a possibilidade de as crianças não quererem descer..."
1002505-49 = "[s] \"Não tem problema ficar mais um pouco, sabe?\""
1002505-50 = "E-eu estou bem! Não vim aqui para brincar!"
1002505-51 = "Bem... então vamos para aquela piscina de bolinhas enorme ali!"
1002505-53 = "Dentro da Playland, parece que esta piscina de bolinhas é a maior zona."
1002505-54 = "Tem muitas bolinhas coloridas, é tão fofo. Fufu...!"
1002505-55 = "Ah...!"
1002505-57 = "S-Sensei, olhe aquilo! Tem um escorregador!"
1002505-58 = "Incrível, dá para descer de um lugar tão alto pelo escorregador e cair direto na piscina de bolinhas...!"
1002505-59 = "Só de olhar já parece divertido!"
1002505-60 = "[s] \"Por que não vai lá experimentar?\""
1002505-61 = "Sim! Quando eu estava no meu corpo original, não podia brincar com essas coisas...!"
1002505-62 = "Ah, c-claro, o objetivo principal é verificar se é seguro para as crianças do Baikaen quando elas forem usar! Como instrutora! Sim!"
1002505-63 = "[s] \"Parece resistente, não acho que tenha nenhum perigo especial.\""
1002505-64 = "Não, você não sabe. Assim como o pula-pula, existem vários elementos no escorregador que só dá para entender testando pessoalmente."
1002505-65 = "Dependendo do ângulo, a pessoa pode perder o equilíbrio e ser perigoso, e seria um problema se houvesse algum arranhão na superfície do escorregador!"
1002505-66 = "Então, já volto! Pela verificação de segurança!"
1002505-71 = "Shun foi em direção ao escorregador com passos leves, quase como se estivesse dançando."
1002505-73 = "Incrível, isso é muito divertido!"
1002505-74 = "A inclinação e a curva são perfeitas, e a velocidade dá um frio na barriga...!"
1002505-75 = "M-mais uma vez...!"
1002505-76 = "[s] \"A segurança estava ok?\""
1002505-78 = "Ah, bem... a velocidade estava um pouco alta, então não consegui entender completamente o interior..."
1002505-79 = "Vou verificar mais uma vez! Nunca é demais garantir a segurança, afinal...!"
1002505-80 = "E não sei quando poderei andar nisso de novo..."
1002505-81 = "[s] \"Sim, pode andar quantas vezes quiser, então vá verificar com calma.\""
1002505-82 = "Uuuu...!"
1002505-83 = "Sensei, por acaso você está zombando de mim...!?"
1002505-85 = "O rosto emburrado de Shun logo se transformou em um sorriso ao subir no escorregador, e no final, ela acabou indo cinco vezes."
