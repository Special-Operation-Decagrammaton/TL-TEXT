[translation]
1002505-1 = "安全確認ですから！"
1002505-2 = "キヴォトス中央区・プレイランド"
1002505-3 = "ここが……！"
1002505-4 = "なるほど、確かに面白そうなものがたくさんありますね！"
1002505-5 = "可愛いキャラクターが描かれたトランポリン、大きなボールプール……。"
1002505-6 = "ふふっ、これならみんなも満足してくれそうです。"
1002505-7 = "さあ、先生。どれから遊んでみますか？"
1002505-8 = "[s] \"あ、やっぱり実際に遊ぶんだ？\""
1002505-9 = "も、もちろんですよ！外から見るのと実際にやってみるのでは、全然違いますから！"
1002505-10 = "実際に乗ってみたらどんな風に動くのか、本当に危なくないか、それは直接確認してみないと分かりませんし。"
1002505-12 = "決して、私が遊びたいから……というわけではありません！"
1002505-13 = "[s1] \"確かにそうかも。\"\n[s2] \"せっかくだし、本気で遊んだ方がそういう部分まで分かるかもね。\""
1002505-14 = "（こ、これは、信じてもらえてるんでしょうか……？）"
1002505-15 = "（こ、これは、信じてもらえてるんでしょうか……？）"
1002505-16 = "で、ではまず、あそこにあるトランポリンからにしましょうか？"
1002505-18 = "トランポリンは一見シンプルな遊具ですが、スプリングを利用していることもあり、実はケガをしやすいものでもあります。"
1002505-19 = "例えばスプリングに問題があったりすると、耐久性の問題で壊れてしまったり、逆に弾性が強すぎても勢いでマットの外に落ちてしまったりします。手を挟んだりするかもしれませんし、一歩間違えたら大怪我に繋がってしまうんです。"
1002505-20 = "ということでまずは、耐久性をチェックして……。"
1002505-26 = "……うん、こうして手で確認する限りは、問題無さそうですね。これなら子どもたちが何人乗っても大丈夫そうです。手も挟まれないようになってますね。"
1002505-27 = "あとは……実際に私も乗ってみましょうか。"
1002505-34 = "わわっ！すごい跳ねますね……！？"
1002505-37 = "このトランポリン、思ったより……！"
1002505-38 = "あはっ、すごいです！まるで空を飛んでるみたいで……！"
1002505-39 = "[s3] \"……シュン？\"\n[s4] \"楽しそうだね？\""
1002505-40 = "あっ、いえ……！"
1002505-41 = "あっ、いえ……！"
1002505-42 = "そ、そうですね！子どもたちの気分になりきると、すごく楽しいです！きっとみんなも楽しんでくれるでしょう……！"
1002505-47 = "うん、実際に乗ってみても問題は無さそうですね。"
1002505-48 = "強いて言うとトランポリンが楽しすぎて、子どもたちがなかなか降りてこない可能性が……。"
1002505-49 = "[s] \"もう少し乗ってても大丈夫だよ？\""
1002505-50 = "わ、私は大丈夫です！遊びに来たわけではありませんので！"
1002505-51 = "えっと……では次は、あの大きなボールプールに行きましょう！"
1002505-53 = "プレイランドの中でも、このボールプールが一番大きいゾーンみたいですね。"
1002505-54 = "色鮮やかなボールがたくさんで、可愛いですね。ふふっ……！"
1002505-55 = "あっ……！"
1002505-57 = "せ、先生、あれを見てください！スライダーがあります！"
1002505-58 = "すごいです、あんな高いところからスライダーを通って、ボールプールに飛び込めるんですね……！"
1002505-59 = "見ているだけで楽しそうです！"
1002505-60 = "[s] \"乗ってきてみたら？\""
1002505-61 = "はい！元の身体の時は、ああいったものには乗れなかったですし……！"
1002505-62 = "あ、も、もちろん第一の目的は、梅花園の子たちが乗る時に安全かどうかの確認です！教官として！はい！"
1002505-63 = "[s] \"見た感じ丈夫そうだし、特に危険は無さそうな気がするね。\""
1002505-64 = "いえ、分かりませんよ。スライダーもトランポリンと同様、直接乗ってみないと分からない要素が幾つもあります。"
1002505-65 = "角度によっては体勢を崩してしまって危ないですし、スライダーの表面に傷などがあったら大変ですから！"
1002505-66 = "では、行ってきます！安全確認のために！"
1002505-71 = "シュンがすごく軽い足取りで、踊るようにスライダーへと向かっていった。"
1002505-73 = "すごい、とっても楽しいですこれ！"
1002505-74 = "傾斜とカーブが絶妙で、ドキドキするほど速度が出ます……！"
1002505-75 = "も、もう一度……！"
1002505-76 = "[s] \"安全性は大丈夫だった？\""
1002505-78 = "あ、えっと……ちょっとスピードが速かったので、内部を完全には把握できなくって……。"
1002505-79 = "もう一度確認してきます！安全の確認は、いくらしてもし過ぎることはありませんし……！"
1002505-80 = "今度はまたいつ乗れるか、分かりませんし……。"
1002505-81 = "[s] \"うん、何回乗っても良いからしっかり確認してきてね。\""
1002505-82 = "ううう……！"
1002505-83 = "先生、もしかしてからかってませんか……！？"
1002505-85 = "シュンの拗ねた顔はスライダーに乗るとすぐに笑顔へと変わり、最終的にスライダーには5回乗ることになった。"
