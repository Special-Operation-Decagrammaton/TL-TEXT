[translation]
1300402-1 = "偶然の出会いですね"
1300402-2 = "アビドス郊外・市内外郭"
1300402-3 = "（外での用事を済ませて、そろそろシャーレへ戻ろうとしていた時……）"
1300402-5 = "（スーッ）"
1300402-7 = "わっ!"
1300402-8 = "（ビクッ）"
1300402-9 = "あはは～☆じゃーん、驚きました？"
1300402-10 = "[s] \"やあ、ノノミ。\""
1300402-11 = "歩いてたら先生を見つけて、嬉しくて走ってきました。"
1300402-12 = "うん？なんでここにいるか、ですか？あ、ちょっと買いたいものがありまして。"
1300402-13 = "ご存じの通りアビドスは多くの店が閉まってまして……。"
1300402-14 = "生活必需品を買うのに結構遠くまで出てこなきゃいけないので。"
1300402-15 = "でも大丈夫です。こうやって偶然の出会いが起こったりもしますから☆"
1300402-16 = "うんうん！本当に嬉しい偶然！"
1300402-17 = "それでは私と一緒にパフェを食べに行きませんか？この周辺によく知ってる、有名なお店があるんです☆"
1300402-18 = "[s] \"でも他に用事が……。\""
1300402-19 = "捕まえた～☆"
1300402-20 = "もう先生、帰り道なのは知っていますよ。"
1300402-21 = "うん？どうして分かったのか、ですか？それはヒ・ミ・ツ♡"
1300402-22 = "じゃあ、早速出発～。"
1300402-24 = "（ノノミに捕まって近所のパフェ専門店に入った）"
1300402-25 = "（1メートルのパフェをそれぞれ一つずつ頼んでお腹いっぱいになるまで食べて）"
1300402-26 = "（ノノミがお会計しようとしてるところを止めて、大人のカードで奢ってあげた）"
