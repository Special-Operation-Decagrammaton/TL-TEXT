[translation]
1300402-1 = "Que encontro inesperado."
1300402-2 = "Subúrbios de Abydos - Periferia da cidade"
1300402-3 = "（Depois de terminar meus afazeres lá fora, eu estava prestes a voltar para o Schale...）"
1300402-5 = "（Vupt）"
1300402-7 = "Uau!"
1300402-8 = "（Pulo de susto）"
1300402-9 = "Ahaha~☆ Tcharam! Te assustei?"
1300402-10 = "[s] \"Olá, Nonomi.\""
1300402-11 = "Eu estava caminhando, vi o Sensei e corri até aqui de tanta felicidade."
1300402-12 = "Hm? Por que estou aqui? Ah, é que eu precisava comprar algumas coisas."
1300402-13 = "Como você sabe, muitas lojas em Abydos estão fechadas..."
1300402-14 = "Então, acabo tendo que ir bem longe para comprar itens de necessidade básica."
1300402-15 = "Mas está tudo bem. Afinal, encontros inesperados como este podem acontecer☆"
1300402-16 = "Sim, sim! Uma coincidência realmente feliz!"
1300402-17 = "Então, que tal ir tomar um parfait comigo? Tem uma loja famosa aqui perto que eu conheço muito bem☆"
1300402-18 = "[s] \"Mas eu tenho outros afazeres...\""
1300402-19 = "Te peguei~☆"
1300402-20 = "Ora, Sensei, eu sei que você já estava voltando para casa."
1300402-21 = "Hm? Como eu sei? Isso é um... se-gre-do♡"
1300402-22 = "Então, vamos partir agora mesmo."
1300402-24 = "（Fui arrastado pela Nonomi para uma sorveteria especializada em parfaits ali perto）"
1300402-25 = "（Pedimos um parfait de um metro para cada um e comemos até não aguentar mais）"
1300402-26 = "（Impedi a Nonomi de pagar a conta e paguei tudo com o Cartão de Adulto）"
