[translation]#[Texto revisado] Em aguardo de revisão de formatação de texto. - Filipe 10/06.
41040-1 = "Episódio 4: Por Trás dos Bastidores"#Circunstâncias de Outro Lado
41040-2 = "Essa é a nossa primeira vez nos encontrando, correto, Sensei?"
41040-3 = "Eu sou a Chefe do Escritório de Defesa do Conselho Estudantil Geral de Kivotos, Kaya. Fico encarregada das questões de segurança nacional do Comitê de Administração."
41040-4 = "[s1] \"Escritório de Defesa...?\"\n[s2] \"Comitê de Administração...?\""
41040-5 = "Entendo. Pelo visto você não está muito familiarizado com a nossa estrutura, não é mesmo?"
41040-6 = "Entendo. Pelo visto você não está muito familiarizado com a nossa estrutura, não é mesmo?"
41040-7 = "A Chefe Rin nunca lhe explicou nada sobre isso?"
41040-8 = "[s] \"Foi mal, eu não lembro muito bem...\""
41040-9 = "Bem, não é surpresa. A Chefe Rin costuma ser alguém de poucas palavras."
41040-10 = "Sendo assim, junto da minha apresentação, vou te explicar brevemente como funcionamos."
41040-11 = "O Conselho Estudantil Geral, o qual é responsável pela administração de Kivotos, é composto primariamente pelo \"Comitê de Administração\". É ele quem gerencia os deveres administrativos oficiais, sendo formado por 11 divisões de operação em total, como o nosso \"Escritório de Finanças\" e o \"Escritório de Mediação\"."
41040-12 = "E operando como uma entidade separada do Comitê de Administração, está o especialíssimo \"Escritório Central\"... ou \"Escritório da Chefe de Administração\", o qual é jurisdição da Rin. Acredito que não haja problema em você imaginar que o \"Conselho Estudantil Geral\" seja a soma das 11 divisões do Comitê de Administração com o Escritório Central de Administração."
41040-13 = "Eu sou a encarregada do \"Escritório de Defesa\". Somos uma organização encarregada de defender as alunas e a população de qualquer organização nociva que ameace a paz de Kivotos."
41040-14 = "[s] \"Entendi. Muito obrigado por explicar. O seu trabalho parece ser bem puxado.\""
41040-15 = "Não, imagina, longe de mim. Eu não passo de uma mera supervisora que dá ordens de trás de uma mesa. Quem realmente se esforça e carrega o peso são as alunas das divisões ativas em campo, como a Kanna-san aqui presente."
41040-19 = "É verdade que, após o desaparecimento da Presidente do Conselho Estudantil Geral, eu fiquei preocupada achando que o número de fatores instáveis aumentaria na cidade, mas..."
41040-20 = "Como a Schale assumiu uma boa parte dessas cargas de responsabilidades de emergência... Graças a você, o nosso fardo nem ficou muito mais pesado do que já era."
41040-21 = "Gostaria de aproveitar a oportunidade para lhe agradecer novamente por tudo."
41040-22 = "[s3] \"Imagina, não precisa agradecer. Mas eu queria te perguntar uma coisa...\"\n[s4] \"A Valkyrie e a SRT são parte do Escritório de Defesa também?\""
41040-23 = "Podemos colocar dessa forma, sim. A Academia de Polícia Valkyrie geralmente opera sob as diretrizes do nosso Escritório, mas..."
41040-24 = "Podemos colocar dessa forma, sim. A Academia de Polícia Valkyrie geralmente opera sob as diretrizes do nosso Escritório, mas..."
41040-30 = "A Academia Especial SRT já era uma organização excepcional que respondia apenas e exclusivamente à Presidente. O Escritório de Defesa e até mesmo o Comitê de Administração não possuíam o menor controle sobre elas."
41040-32 = "Como você já deve saber, a princípio, o Conselho Estudantil Geral não interfere diretamente nos distritos autônomos de cada academia de Kivotos. E cada distrito possui a sua própria força de segurança jurisdicional."
41040-33 = "Por exemplo, se uma aluna cometer um crime no distrito da Gehenna, quem a punirá será o Comitê Disciplinar da Gehenna, não nós."
41040-36 = "Porém, em outros distritos ou em áreas como o [ruby=Distrito de Utnapishtim]D.U.[/ruby], qualquer crime se torna jurisdição automática da Valkyrie."
41040-37 = "A questão é: se a criminosa conseguir escapar para o território de uma academia diferente, ou estiver conspirando e se aliando ao conselho estudantil daquele respectivo distrito, a nossa capacidade de agir e prender se torna quase nula."
41040-38 = "Claro, nós sempre tentamos fazer de tudo para responder o mais rápido possível e contornar isso... mas existia um limite claro de até onde as nossas ações responsivas podiam chegar sob essas leis."
41040-43 = "A \"Academia Especial SRT\" foi fundada justamente por causa disso."
41040-44 = "Elas receberam ordens diretas da Presidente do Conselho Estudantil Geral para ter o direito incondicional de agir rápida e ativamente sob qualquer área onde ocorresse um crime."
41040-49 = "Por causa disso, o processo seletivo da Academia Especial SRT se tornou extremamente rigoroso para moldar um exército de pura elite. E o armamento delas era o mais avançado de Kivotos."
41040-52 = "Tanto que, só para dar um exemplo do quão longe chegaram, a unidade do terceiro ano da SRT... mais conhecida como \"Esquadrão FOX\", conseguiu realizar a prisão da calamidade de Kivotos que nós não conseguimos pegar por anos, a \"Wakamo\". Elas continuaram com esse histórico de excelentes resultados, até que..."
41040-53 = "……Até a Presidente do Conselho Estudantil sumir do mapa."
41040-55 = "Com o desaparecimento da Presidente, a autoridade e a responsabilidade de manter e direcionar a SRT ficou em um hiato."
41040-56 = "Ninguém quis assumir a responsabilidade e tomar a frente de uma instituição que agora não passava de um barril de pólvora perigoso prestes a explodir."
41040-57 = "Até mesmo nós queríamos fazer alguma coisa, mas... Aquele poder de fogo destrutivo e armamento letal nos intimidou. Era difícil saber quando elas iriam nos acatar e como lidar com aquilo..."
41040-58 = "……No fim das contas, a Academia Especial SRT virou uma organização estática, de mãos atadas."
41040-59 = "[s] \"E por causa disso que decidiram fechar a academia de uma vez logo?\""
41040-60 = "Bem, claro que o motivo não foi apenas este."
41040-61 = "Ninguém determinou que a Presidente nunca mais vai voltar, então nós precisávamos manter a SRT de pé para a sua volta... Tinham membros do Conselho que pensavam assim também."
41040-62 = "Eu também era uma delas que era a favor dessa linha de raciocínio, inclusive."
41040-63 = "Porém, não sei se sentiram que o próprio futuro da existência delas estava sob perigo... mas o \"Esquadrão FOX\" decidiu tomar uma atitude drástica."
41040-64 = "[s5] \"'Esquadrão FOX'...\"\n[s6] \"Foi aquele esquadrão de antes que conseguiu prender a Wakamo?\""
41040-65 = "Sim, esse mesmo."
41040-66 = "Sim, esse mesmo."
41040-67 = "Isso foi há um mês, quando o Esquadrão FOX realizou um ataque surpresa à sede do Conselho Estudantil Geral."
41040-68 = "Elas atacaram as oficiais do conselho que estavam liderando e encaminhando o projeto de fechamento da Academia Especial SRT, e logo depois desapareceram sem deixar vestígios."
41040-69 = "Como resultado, parte da estrutura da Sanctum Tower foi totalmente queimada. Alguns membros do Conselho Estudantil Geral ficaram feridas e outros foram até hospitalizados."
41040-70 = "A Chefe Rin ainda tentou realizar mais debates em todas as instâncias possíveis para decidir um novo plano e direção para a SRT depois disso, mas..."
41040-74 = "E agora, até mesmo o \"Esquadrão RABBIT\" decide apontar armas e disparar contra o Conselho. Nós acabamos de testemunhar isso no parque."
41040-75 = "Com tudo isso acumulado, as oficiais do Conselho já devem estar exaustos de tentar chegar num acordo com elas..."
41040-76 = "……Sensei. O relato do seu bom trabalho ajudando as alunas de diversas academias pelos quatro cantos de Kivotos chegou aos meus ouvidos."
41040-77 = "Se deixarmos como está, o histórico estudantil do \"Esquadrão RABBIT\" pode ser completamente apagado do sistema por ordem do Conselho. E, sem lugar para ir, elas terão que viver na sombra do esquecimento para sempre, vagando sozinhas sem um teto ou rumo na vida."
41040-78 = "Apesar de seus erros e juventude, elas ainda são alunas de elite geniais que conseguiram sobreviver aos rigores cruéis do exame de admissão da SRT."
41040-79 = "Jogar toda a capacidade que elas têm no lixo sem propósito seria uma perda inimaginável..."
41040-80 = "Sensei, se não for pedir muito, por favor... O senhor não poderia tentar conversar e convencer essas meninas a aceitarem a transferência para a Academia de Polícia Valkyrie?"
41040-81 = "Se conseguirmos uma resposta e um parecer positivo sobre isso... Eu tenho certeza de que consigo mexer meus pauzinhos por debaixo dos panos para que ninguém apague o histórico estudantil delas no Conselho."
41040-82 = "[s] \"Bom, sobre isso...\""
41040-83 = "Tenho completa ciência de que vai ser extremamente difícil, mas..."
41040-84 = "[s] \"Não é sobre o quão difícil vai ser convencer elas...\""
41040-88 = "[ns] \"Nós adultos, não podemos e nem deveríamos forçar nenhuma aluna a aceitar um futuro que não é o que elas escolheram para si mesmas.\""
41040-90 = "……Ora, entendo."
41040-91 = "Sim, de fato, é verdade. Elas todas abraçaram o rigor por um sonho, um futuro pelo qual ansiaram desde sempre... O momento em que as portas da Academia Especial SRT abriram para elas."
41040-92 = "Pensar em retorcer esses sonhos com as próprias mãos à força... Realmente soa deprimente. Nem sei qual desculpa esfarrapada eu iria conseguir inventar para o dia que a Presidente retornasse... "
41040-93 = "Eu entendo muito bem tudo isso... Mas infelizmente o Conselho preza pelas suas próprias regras e a sua imagem com mão de ferro, então uma punição incrivelmente pesada ainda está nos papéis como a resposta padrão..."
41040-94 = "Maaas, pensando bem, nós podemos apenas fingir que esquecemos da existência dessas regras, não?!"
41040-95 = "C-Chefe Kaya...?"
41040-96 = "Oh, credo. Eu me excedi, não é?"
41040-97 = "Esqueçam que ouviram isso da minha boca agora pouco."
41040-98 = "O que eu quero dizer é, Sensei: nós do Escritório de Defesa do Comitê de Administração, seremos aliadas da Schale e apoiaremos totalmente qualquer decisão que o senhor tomar."
41040-99 = "Tudo para proteger o futuro com o qual aquelas garotas tanto sonham. Então, por favor, eu peço que as salve."
41040-100 = "Eu lhe dou carta branca para tomar qualquer providência e ditar o que for necessário para o \"Esquadrão RABBIT\"."
41040-101 = "Se o senhor decidir tomar conta delas sob a asa da Schale, ou então decidir que devem seguir vivendo sozinhas pelos próprios esforços... Em relação a essas garotas, o que você falar será a ordem."
41040-102 = "Infelizmente eu só não posso prometer uma varinha mágica que \"Reestruture e as mande de volta a uma SRT reconstruída\" agora mesmo, pois seria impossível... "
41040-103 = "[s] \"Você tem certeza disso? Deixar que eu decida o futuro de alunas das quais eu mal tenho jurisdição?\""
41040-104 = "Sim, completamente. Apesar dessa minha aparência, eu desfruto de uma certa confiança incontestável e de respeito absoluto entre o Comitê de Administração do Conselho."
41040-105 = "Diremos a eles que as minhas decisões colocaram a todos do conselho um passo mais longe de um desastre e que agora todos me devem um favor."
41040-106 = "No fim do dia, perdoar a punição é um preço pequeno se for para não destruir o futuro dos prodígios de Kivotos."
41040-112 = "Sendo assim... O destino dessas crianças agora está em suas mãos, Sensei."
41040-114 = "Próximo Episódio: Desconfiança Duradoura"