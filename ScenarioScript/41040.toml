[translation]
41040-1 = "Episódio 4: Circunstâncias de outro ângulo"
41040-2 = "Prazer em conhecê-lo... Sensei."
41040-3 = "Meu nome é Kaya, do Gabinete de Defesa, subordinado ao Conselho Estudantil Geral de Kivotos. Sou a responsável pela parte de segurança dentro do Comitê Administrativo."
41040-4 = "[s1] \"Gabinete de Defesa...?\"\n[s2] \"Comitê Administrativo...?\""
41040-5 = "Entendo, parece que você não conhece muito bem, não é?"
41040-6 = "Entendo, parece que você não conhece muito bem, não é?"
41040-7 = "A Administradora Rin nunca lhe contou nada sobre isso?"
41040-8 = "[s] \"Desculpe, não muito...\""
41040-9 = "Bem, a Administradora Rin é uma pessoa de poucas palavras, afinal."
41040-10 = "Então, aproveitando as apresentações, gostaria de explicar brevemente."
41040-11 = "O Conselho Estudantil Geral, que administra Kivotos, possui como organização principal o \"Comitê Administrativo\". É aqui que as tarefas principais são realizadas, sendo composto por um total de 11 divisões, como o \"Departamento Financeiro\" e o \"Departamento de Mediação\"."
41040-12 = "E, existindo separadamente deste Comitê Administrativo, há o \"Gabinete de Supervisão\", uma organização especial sob a jurisdição da Administradora Rin. Se você considerar que o \"Conselho Estudantil Geral\" é a soma deste \"Gabinete de Supervisão\" e do \"Comitê Administrativo\" de 11 divisões, não estará muito longe da verdade."
41040-13 = "Eu sou responsável pelo \"Gabinete de Defesa\". É a organização que protege os estudantes e cidadãos de forças que ameaçam a segurança de Kivotos."
41040-14 = "[s] \"Entendo, obrigado pela explicação. Parece um trabalho difícil.\""
41040-15 = "Não, não, eu estou apenas em uma posição de supervisão, dando ordens. O trabalho difícil fica para as pessoas que estão na linha de frente, como a Kanna aqui."
41040-19 = "De fato, desde que a Presidente do Conselho Estudantil Geral desapareceu, pensei que vários fatores de instabilidade aumentariam, mas..."
41040-20 = "Como o Schale tem cuidado de várias coisas, graças a você, nossa carga de trabalho não aumentou tanto assim."
41040-21 = "Gostaria de aproveitar esta oportunidade para agradecer novamente."
41040-22 = "[s3] \"Não, eu que agradeço. Aliás, queria perguntar uma coisa...\"\n[s4] \"Valkyrie e SRT são responsabilidade do Gabinete de Defesa?\""
41040-23 = "Sim. Sobre a Academia de Polícia Valkyrie, basicamente eles operam sob as ordens do nosso Gabinete de Defesa, mas..."
41040-24 = "Sim. Sobre a Academia de Polícia Valkyrie, basicamente eles operam sob as ordens do nosso Gabinete de Defesa, mas..."
41040-30 = "A Academia SRT é uma organização um tanto especial que está fora do controle do Gabinete de Defesa e até mesmo do Comitê Administrativo."
41040-32 = "Como deve saber, cada distrito escolar aqui em Kivotos basicamente não recebe muita interferência do Conselho Estudantil Geral. E cada distrito possui uma organização responsável pela segurança pública."
41040-33 = "Por exemplo, estudantes que causam problemas na Academia Gehenna são punidos pelo Comitê Disciplinar de Gehenna, e não pelo Conselho Estudantil Geral, certo?"
41040-36 = "No entanto, em outros lugares... como em D.U., por exemplo, crimes cometidos nesses locais ficam basicamente sob a jurisdição da Valkyrie."
41040-37 = "Mas, se a estudante fugir para outro distrito escolar ou conspirar com o conselho estudantil de outro lugar, a prisão se torna difícil."
41040-38 = "Nesses casos, é claro, tentamos agir o mais rápido possível, mas havia limites para esse tipo de resposta tardia."
41040-43 = "Foi por isso que a \"Academia SRT\" foi criada."
41040-44 = "A Presidente do Conselho Estudantil Geral permitiu que elas respondessem imediatamente a qualquer crime, a qualquer hora e em qualquer lugar."
41040-49 = "Por isso, a seleção para a Academia SRT é extremamente rigorosa, tornando-as um grupo de elite. Seus equipamentos também são do mais alto nível em Kivotos."
41040-52 = "Como um dos resultados disso, a unidade do terceiro ano da Academia SRT, conhecida como \"FOX Squad\", conseguiu prender \"Wakamo\", a raposa da calamidade que foi uma dor de cabeça para Kivotos por anos. Além disso, elas continuaram a obter resultados sucessivos..."
41040-53 = "...até que a Presidente do Conselho Estudantil Geral desapareceu."
41040-55 = "Com o desaparecimento da Presidente, a responsabilidade pela SRT ficou em um limbo."
41040-56 = "Nessa situação, era como um barril de pólvora extremamente perigoso... Ninguém apareceu para assumir a responsabilidade pela Academia SRT."
41040-57 = "Nós também pensamos em como resolver isso, mas... devido aos seus equipamentos de ponta, o momento e a forma de utilizá-las eram difíceis..."
41040-58 = "...como resultado, a Academia SRT acabou ficando de mãos atadas."
41040-59 = "[s] \"Então, decidiram fechá-la?\""
41040-60 = "Claro, esse não é o único motivo."
41040-61 = "Não foi decidido que a Presidente do Conselho Estudantil Geral não voltaria, e havia opiniões dentro do Conselho de que a SRT deveria ser mantida..."
41040-62 = "Eu também sou uma das pessoas que compartilha dessa opinião."
41040-63 = "Mas, talvez por terem percebido que sua própria existência estava ameaçada... o \"FOX Squad\" começou a agir."
41040-64 = "[s5] \"\"FOX Squad\"...\"\n[s6] \"O esquadrão que você mencionou antes, que prendeu a Wakamo?\""
41040-65 = "Sim, exatamente."
41040-66 = "Sim, exatamente."
41040-67 = "Foi no mês passado, o FOX Squad atacou repentinamente o Conselho Estudantil Geral."
41040-68 = "Elas atacaram os membros que estavam promovendo o fechamento da Academia SRT e fugiram."
41040-69 = "Como resultado, parte das instalações da Torre Sanctum foi totalmente queimada. Vários membros do Conselho Estudantil Geral ficaram feridos, e alguns tiveram que ser hospitalizados."
41040-70 = "Depois disso, a Administradora tentou expandir as discussões sobre a Academia SRT em várias direções, mas..."
41040-74 = "Em seguida, o \"RABBIT Squad\" também tentou apontar suas armas para o Conselho Estudantil Geral. Aquele incidente no parque outro dia."
41040-75 = "Com isso, certamente todos os membros do Conselho Estudantil Geral agora..."
41040-76 = "……Sensei. Tenho ouvido falar sobre suas atividades por todo o Kivotos."
41040-77 = "Se as coisas continuarem assim, os dados de matrícula do RABBIT Squad serão apagados e elas acabarão vagando sem rumo, sem pertencer a nenhuma escola."
41040-78 = "Elas são, sem dúvida, elites que passaram pelos rigorosos exames de admissão da Academia SRT."
41040-79 = "Seria uma perda considerável ver essas habilidades serem desperdiçadas..."
41040-80 = "Se não for pedir muito, você poderia convencê-las a se transferirem para a Escola de Polícia Valkyrie?"
41040-81 = "Se parecer que você conseguirá uma resposta positiva, acho que posso convencer os responsáveis rapidamente para que não apaguem os dados de matrícula delas."
41040-82 = "[s] \"Isso é...\""
41040-83 = "Sei que convencê-las é difícil. Mas――"
41040-84 = "[s] \"Não é exatamente sobre a dificuldade de convencê-las...\""
41040-88 = "[ns] \"Não posso forçar as alunas a seguirem um caminho que elas não desejam.\""
41040-90 = "……Entendo, compreendo perfeitamente."
41040-91 = "É verdade. Elas também devem ter entrado na Academia SRT carregando seus próprios sonhos..."
41040-92 = "Forçar a mudança desses desejos é algo que realmente não me agrada. Além disso, não saberia o que dizer quando a Presidente do Conselho Estudantil Federal retornar..."
41040-93 = "Originalmente, seguindo os princípios e em nome da honra do Conselho Estudantil Federal, deveria haver uma punição severa, mas..."
41040-94 = "Bem, princípios não importam tanto assim!"
41040-95 = "Ch-Chefe do Gabinete de Defesa...?"
41040-96 = "Ah, peço desculpas."
41040-97 = "Por favor, esqueça o que acabei de dizer."
41040-98 = "Sensei. Nós, do 'Comitê Administrativo - Gabinete de Defesa', cooperaremos ativamente com o Schale."
41040-99 = "Portanto, por favor, ajude-as para que possam continuar perseguindo seus sonhos, pode ser?"
41040-100 = "Deixo a decisão sobre o 'RABBIT Squad' nas suas mãos, Sensei."
41040-101 = "Você pode mantê-las sob sua supervisão no Schale, ou deixá-las seguir seu próprio caminho... Nesse aspecto, faça como preferir."
41040-102 = "A única coisa que é difícil é 'fazer a Academia SRT ser restaurada para que elas retornem'..."
41040-103 = "[s] \"Tudo bem eu decidir isso?\""
41040-104 = "Sim. Pode não parecer, mas tenho bastante confiança dentro do 'Comitê Administrativo'."
41040-105 = "Direi aos outros membros que eles me devem um favor."
41040-106 = "Comparado ao futuro dessas elites, isso é um preço baixo a se pagar."
41040-112 = "Então, Sensei, conto com você em relação a elas, certo?"
41040-114 = "Próximo episódio: A Desconfiança que não Desaparece"
