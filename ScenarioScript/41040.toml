[translation]
41040-1 = "Episódio 4: Circunstâncias de Outro Lado"
41040-2 = "Prazer em conhecê-lo… Professor."
41040-3 = "Sou Kaya, do Conselho Estudantil de Kivotos, Escritório de Defesa. Sou responsável pela segurança na Administração."
41040-4 = "[s1] \"Escritório de Defesa…?\"\n[s2] \"Administração…?\""
41040-5 = "Parece que o senhor não está muito familiarizado?"
41040-6 = "Parece que o senhor não está muito familiarizado?"
41040-7 = "A Oficial Rin nunca lhe falou sobre isso?"
41040-8 = "[s] \"Desculpe, não muito…\""
41040-9 = "Bem, a Rin sempre foi calada, mesmo."
41040-10 = "Já que é uma ocasião formal, vou explicar resumidamente."
41040-11 = "O Conselho Estudantil de Kivotos tem como principal organização a 'Administração'. Ela cuida das funções principais e é composta por 11 divisões, como o 'Escritório de Finanças', o 'Escritório de Mediação', entre outros."
41040-12 = "Paralelamente a essa Administração, existe o 'Escritório Geral', uma organização especial sob jurisdição da Oficial Rin. Pode-se dizer que o 'Conselho Estudantil' é a união do 'Escritório Geral' com a 'Administração'."
41040-13 = "Eu dirijo o 'Escritório de Defesa'. Uma organização que protege os alunos e cidadãos de ameaças à segurança de Kivotos."
41040-14 = "[s] \"Entendo. Obrigado pela explicação. Parece um trabalho difícil.\""
41040-15 = "De modo algum. Minha posição é mais de supervisão. Quem realmente trabalha são as equipes de campo, como a Kanna aqui."
41040-19 = "Com o desaparecimento da Presidente, imaginei que os problemas aumentariam…"
41040-20 = "Mas a Schale tem lidado com muitos deles. Graças a isso, nossa carga não aumentou muito."
41040-21 = "Aproveito a ocasião para agradecer."
41040-22 = "[s3] \"Que nada, nós que agradecemos. Aliás, uma pergunta…\"\n[s4] \"A Valkyrie e a SRT estão sob o Escritório de Defesa?\""
41040-23 = "Sim. A Academia Valkyrie opera sob as ordens do nosso Escritório de Defesa…"
41040-24 = "Sim. A Academia Valkyrie opera sob as ordens do nosso Escritório de Defesa…"
41040-30 = "Já a Academia SRT é uma organização especial que foge até mesmo ao controle da Administração."
41040-32 = "Como deve saber, os distritos escolares de Kivotos não sofrem grande interferência do Conselho Estudantil. Cada distrito tem sua própria organização de segurança."
41040-33 = "Por exemplo, um aluno que cause problemas na Gehenna é punido pelo Comitê de Disciplina de Gehenna, não pelo Conselho, certo?"
41040-36 = "Mas em outros lugares… como o Distrito D.U., os crimes são de responsabilidade da Valkyrie."
41040-37 = "Se um criminoso fugir para outro distrito escolar ou se aliar a algum conselho estudantil, a captura se torna difícil."
41040-38 = "Claro, sempre tentamos agir rapidamente, mas esse tipo de reação tardia tem seus limites."
41040-43 = "Foi para isso que a 'Academia SRT' foi criada."
41040-44 = "Por ordem da Presidente, elas têm permissão para agir imediatamente, a qualquer hora e em qualquer lugar, quando um crime ocorre."
41040-49 = "Por isso, a seleção para a SRT é extremamente rigorosa, tornando-a um grupo de elite. O equipamento também é do mais alto nível em Kivotos."
41040-52 = "Um dos resultados disso é que o time de terceiro ano da SRT – o chamado 'Esquadrão FOX' – conseguiu prender a Raposa da Perdição, Wakamo, que era uma pedra no sapato de Kivotos há anos. E eles continuaram a obter sucessos…"
41040-53 = "……Até o desaparecimento da Presidente do Conselho Estudantil."
41040-55 = "Com o desaparecimento da Presidente, a responsabilidade pela SRT ficou no ar."
41040-56 = "Isso a tornou um barril de pólvora extremamente perigoso. Mas ninguém se manifestou para assumir a responsabilidade."
41040-57 = "Nós também tentamos fazer alguma coisa, mas o equipamento de ponta delas dificultava o momento e a forma de uso…"
41040-58 = "……Como resultado, a SRT ficou incapacitada."
41040-59 = "[s] \"E por isso decidiram fechá-la?\""
41040-60 = "Claro, não é só por isso."
41040-61 = "Havia opiniões no Conselho de que a SRT deveria ser mantida, já que a Presidente poderia voltar."
41040-62 = "Eu também era uma dessas vozes."
41040-63 = "Mas, talvez percebendo que sua própria existência estava ameaçada, o 'Esquadrão FOX' agiu."
41040-64 = "[s5] \"'Esquadrão FOX'…\"\n[s6] \"O time que prendeu Wakamo, que você mencionou?\""
41040-65 = "Sim."
41040-66 = "Sim."
41040-67 = "No mês passado, o Esquadrão FOX atacou o Conselho Estudantil."
41040-68 = "Eles atacaram os membros que tentavam fechar a SRT e fugiram."
41040-69 = "O resultado foi a queima de parte das instalações da Torre Sanctum e vários feridos, alguns hospitalizados."
41040-70 = "Depois disso, a Administração tentou discutir o futuro da SRT em várias frentes…"
41040-74 = "Em seguida, o 'Esquadrão RABBIT' também tentou apontar suas armas para o Conselho. O caso do parque outro dia."
41040-75 = "Depois disso, os membros do Conselho certamente…"
41040-76 = "……Professor. Sei de suas realizações em Kivotos."
41040-77 = "Se continuar assim, o 'Esquadrão RABBIT' terá seus registros acadêmicos cancelados e ficará sem escola, vagando sem destino."
41040-78 = "Elas são elites que passaram pelo rigoroso exame de admissão da SRT."
41040-79 = "Desperdiçar suas habilidades seria uma perda enorme…"
41040-80 = "Se possível, não poderia convencê-las a se transferir para a Academia Valkyrie?"
41040-81 = "Se houver uma resposta positiva… posso tentar persuadir os outros membros a não cancelarem os registros."
41040-82 = "[s] \"Isso é…\""
41040-83 = "Sei que é difícil convencê-las. Mas――"
41040-84 = "[s] \"Mais do que a dificuldade…\""
41040-88 = "[ns] \"Não posso forçar os alunos a seguir um caminho que elas não querem.\""
41040-90 = "……Entendo. Compreendo."
41040-91 = "É verdade. Cada uma delas deve ter entrado na SRT com seus próprios sonhos…"
41040-92 = "Forçar esses sonhos a se curvarem não é algo que eu goste. Também não sei o que dizer quando a Presidente voltar…"
41040-93 = "Originalmente, a ideia era aplicar punições severas, de acordo com os princípios do Conselho…"
41040-94 = "Bem, princípios são feitos para serem quebrados!"
41040-95 = "O-O Escritório de Defesa…?"
41040-96 = "Ah, desculpe-me."
41040-97 = "Esqueça o que disse agora."
41040-98 = "Professor. Nós, do 'Escritório de Defesa da Administração', estamos dispostos a cooperar ativamente com a Schale."
41040-99 = "Portanto, por favor, ajude essas garotas a continuarem perseguindo seus sonhos."
41040-100 = "Deixo a decisão sobre a punição do 'Esquadrão RABBIT' com o senhor."
41040-101 = "Pode mantê-las na Schale, deixá-las fazer o que quiserem… fica a seu critério."
41040-102 = "Restaurar a SRT e mandá-las de volta é impossível…"
41040-103 = "[s] \"Tudo bem eu decidir?\""
41040-104 = "Sim. Acredito que tenho certa influência na 'Administração'."
41040-105 = "Consideraremos que criei dívidas com outros membros."
41040-106 = "Comparado ao futuro de elites como elas, isso é um preço baixo."
41040-112 = "Então, Professor… fico na sua dependência."
41040-114 = "Próximo Episódio: Desconfiança Duradoura"