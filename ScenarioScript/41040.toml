[translation]
41040-1 = "Episódio 4;Por Trás dos Bastidores"
41040-2 = "Essa é a nossa primeira vez nos encontrando,#ncorreto, Sensei?"
41040-3 = "Eu sou a Chefe do Escritório de Defesa do Conselho Estudantil Geral de Kivotos, Kaya.#nFico encarregada das questões de segurança nacional#ndo Comitê de Administração."
41040-4 = "[s1] \"Escritório de Defesa……?\"\n[s2] \"Comitê de Administração……?\""
41040-5 = "Entendo.#nPelo visto você não está muito familiarizado com a nossa estrutura,#nnão é mesmo?"
41040-6 = "Entendo.#nPelo visto você não está muito familiarizado com a nossa estrutura,#nnão é mesmo?"
41040-7 = "A Chefe Rin nunca lhe explicou nada sobre isso?"
41040-8 = "[s] \"Foi mal, eu não lembro muito bem……\""
41040-9 = "Bem, não é surpresa.#nA Chefe Rin costuma ser alguém de poucas palavras."
41040-10 = "Sendo assim, junto da minha apresentação,#nvou te explicar brevemente como funcionamos."
41040-11 = "O Conselho Estudantil Geral, o qual é responsável pela administração de Kivotos,#né composto primariamente pelo \"Comitê de Administração\".#nÉ ele quem gerencia os deveres administrativos oficiais, sendo formado por 11 divisões de operação em total,#ncomo o nosso \"Escritório de Finanças\" e o \"Escritório de Mediação\"."
41040-12 = "E operando como uma entidade separada do Comitê de Administração, está o especialíssimo \"Escritório Central\"……#nou \"Escritório da Chefe de Administração\", o qual é jurisdição da Rin.#nAcredito que não haja problema em você imaginar que o \"Conselho Estudantil Geral\"#nseja a soma das 11 divisões do Comitê de Administração#ncom o Escritório Central de Administração."
41040-13 = "Eu sou a encarregada do \"Escritório de Defesa\".#nSomos uma organização encarregada de defender as alunas e a população#nde qualquer organização nociva que ameace a paz de Kivotos."
41040-14 = "[s] \"Entendi. Muito obrigado por explicar. O seu trabalho parece ser bem puxado.\""
41040-15 = "Não, imagina, longe de mim.#nEu não passo de uma mera supervisora que dá ordens de trás de uma mesa.#nQuem realmente se esforça e carrega o peso são as alunas das divisões ativas em campo,#ncomo a Kanna-san aqui presente."
41040-19 = "É verdade que, após o desaparecimento da Presidente do Conselho Estudantil Geral,#neu fiquei preocupada achando que o número de fatores instáveis aumentaria na cidade,#nmas……"
41040-20 = "Como a Schale assumiu uma boa parte dessas cargas de responsabilidades de emergência……#nGraças a você, o nosso fardo nem ficou muito mais pesado do que já era."
41040-21 = "Gostaria de aproveitar a oportunidade para lhe agradecer novamente por tudo."
41040-22 = "[s3] \"Imagina, não precisa agradecer. Mas eu queria te perguntar uma coisa……\"\n[s4] \"A Valkyrie e a SRT são parte do Escritório de Defesa também?\""
41040-23 = "Podemos colocar dessa forma, sim.#nA Academia Polícial Valkyrie geralmente opera sob as diretrizes do nosso Escritório, mas……"
41040-24 = "Podemos colocar dessa forma, sim.#nA Academia Polícial Valkyrie geralmente opera sob as diretrizes do nosso Escritório, mas……"
41040-30 = "A Academia Especial SRT já era uma organização excepcional que respondia apenas e exclusivamente à Presidente.#nO Escritório de Defesa e até mesmo o Comitê de Administração não possuíam o menor controle sobre elas."
41040-32 = "Como você já deve saber, a princípio,#no Conselho Estudantil Geral não interfere diretamente nos distritos autônomos de cada academia de Kivotos.#nE cada distrito possui a sua própria força de segurança jurisdicional."
41040-33 = "Por exemplo, se uma aluna cometer um crime no distrito da Gehenna,#nquem a punirá será o Comitê de Morais Públicas da Gehenna, não nós."
41040-36 = "Porém, em outros distritos ou em áreas como o [ruby=Distrito de Utnapishtim]D.U.[/ruby],#nqualquer crime se torna jurisdição automática da Valkyrie."
41040-37 = "A questão é: se a criminosa conseguir escapar para o território de uma academia diferente,#nou estiver conspirando e se aliando ao conselho estudantil daquele respectivo distrito,#na nossa capacidade de agir e prender se torna quase nula."
41040-38 = "Claro, nós sempre tentamos fazer tudo para responder o mais rápido possível e contornar isso……#nmas existia um limite claro de até onde as nossas ações responsivas#npodiam chegar sob essas leis."
41040-43 = "A \"Academia Especial SRT\" foi fundada justamente por causa disso."
41040-44 = "Elas receberam ordens diretas da Presidente do Conselho Estudantil Geral#npara ter o direito incondicional de agir rápida e ativamente#nsob qualquer área onde ocorresse um crime."
41040-49 = "Por causa disso,#no processo seletivo da Academia Especial SRT se tornou extremamente rigoroso#npara moldar um exército de pura elite.#nE o armamento delas era o mais avançado de Kivotos."
41040-52 = "Tanto que, só para dar um exemplo do quão longe chegaram, a unidade do terceiro ano da SRT……#nmais conhecida como \"Esquadrão FOX\", conseguiu realizar a prisão da calamidade de Kivotos#nque nós não conseguimos pegar por anos, a \"Wakamo\".#nElas continuaram com esse histórico de excelentes resultados, até que……"
41040-53 = "……Até a Presidente do Conselho Estudantil sumir do mapa."
41040-55 = "Com o desaparecimento da Presidente,#na autoridade e a responsabilidade de manter e direcionar a SRT ficou em um hiato."
41040-56 = "Ninguém quis assumir a responsabilidade e tomar a frente de uma instituição#nque agora não passava de um barril de pólvora perigoso prestes a explodir."
41040-57 = "Até mesmo nós queríamos fazer alguma coisa, mas……#nAquele poder de fogo destrutivo e armamento letal nos intimidou.#nEra difícil saber quando elas iriam nos acatar e como lidar com aquilo……"
41040-58 = "……No fim das contas,#na Academia Especial SRT virou uma organização estática,#nde mãos atadas."
41040-59 = "[s] \"E por causa disso que decidiram fechar a academia de uma vez logo?\""
41040-60 = "Bem, claro que o motivo não foi apenas este."
41040-61 = "Ninguém determinou que a Presidente nunca mais vai voltar,#nentão nós precisávamos manter a SRT de pé para a sua volta……#nTinham membros do Conselho que pensavam assim também."
41040-62 = "Eu também era uma delas que era a favor dessa linha de raciocínio,#ninclusive."
41040-63 = "Porém, não sei se sentiram que o próprio futuro da existência delas estava sob perigo……#nmas o \"Esquadrão FOX\" decidiu tomar uma atitude drástica."
41040-64 = "[s5] \"\"Esquadrão FOX\"……\"\n[s6] \"Foi aquele esquadrão de antes que conseguiu prender a Wakamo?\""
41040-65 = "Sim, esse mesmo."
41040-66 = "Sim, esse mesmo."
41040-67 = "Isso foi há um mês,#nquando o Esquadrão FOX realizou um ataque surpresa#nà sede do Conselho Estudantil Geral."
41040-68 = "Elas atacaram as oficiais do conselho que estavam liderando e encaminhando#no projeto de fechamento da Academia Especial SRT,#ne logo desapareceram sem deixar vestígios."
41040-69 = "Como resultado, parte da estrutura da Sanctum Tower foi totalmente queimada.#nAlguns membros do Conselho Estudantil Geral ficaram feridas#ne outros foram até hospitalizados."
41040-70 = "A Chefe Rin ainda tentou realizar mais debates em todas as instâncias possíveis#npara decidir um novo plano e direção para a SRT depois disso,#nmas……"
41040-74 = "E agora, até mesmo o \"Esquadrão RABBIT\" decide apontar armas e disparar contra o Conselho.#nNós acabamos de testemunhar isso no parque."
41040-75 = "Com tudo isso acumulado,#nas oficiais do Conselho já devem estar exaustos#nde tentar chegar num acordo com elas……"
41040-76 = "……Sensei.#nO relato do seu bom trabalho ajudando as alunas de diversas academias#npelos quatro cantos de Kivotos chegou aos meus ouvidos."
41040-77 = "Se deixarmos como está, o histórico estudantil do \"Esquadrão RABBIT\"#npode ser completamente apagado do sistema por ordem do Conselho.#nE, sem lugar para ir, elas terão que viver na sombra do esquecimento para sempre,#nvagando sozinhas sem um teto ou rumo na vida."
41040-78 = "Apesar de seus erros em juventude,#nelas ainda são alunas de elite geniais que#nconseguiram sobreviver aos rigores cruéis do exame de admissão da SRT."
41040-79 = "Jogar toda a capacidade que elas têm no lixo sem propósito#nseria uma perda inimaginável……"
41040-80 = "Sensei, se não for pedir muito, por favor……#nO senhor não poderia tentar conversar e convencer essas meninas#na aceitarem a transferência para a Academia Polícial Valkyrie?"
41040-81 = "Se conseguirmos uma resposta e um parecer positivo sobre isso……#nEu tenho certeza de que consigo mexer meus pauzinhos por debaixo dos panos#npara que ninguém apague o histórico estudantil delas no Conselho."
41040-82 = "[s] \"Bom, sobre isso……\""
41040-83 = "Tenho completa ciência de que vai ser extremamente difícil,#nmas……"
41040-84 = "[s] \"Não é sobre o quão difícil vai ser convencer elas……\""
41040-88 = "[ns] \"Nós adultos, não podemos e nem deveríamos forçar nenhuma aluna a aceitar um futuro que não é o que elas escolheram para sí mesmas.\""
41040-90 = "……Ora, entendo."
41040-91 = "Sim, de fato, é verdade.#nElas todas abraçaram o rigor por um sonho, um futuro pelo qual ansiaram desde sempre……#nO momento em que as portas da Academia Especial SRT abriram para elas."
41040-92 = "Pensar em retorcer esses sonhos com as próprias mãos à força……#nRealmente soa deprimente.#nNem sei qual desculpa esfarrapada eu iria conseguir inventar#npara o dia que a Presidente retornasse…… "
41040-93 = "Eu entendo muito bem tudo isso……#nMas infelizmente o Conselho preza pelas suas próprias regras e a sua imagem com mão de ferro,#nentão uma punição incrivelmente pesada#nainda está nos papéis como a resposta padrão……"
41040-94 = "Maaas, pensando bem,#nnós podemos apenas fingir que esquecemos da existência dessas regras,#nnão?!"
41040-95 = "C-Chefe Kaya……?"
41040-96 = "Oh, credo.#nEu me excedi, não é?"
41040-97 = "Esqueçam que ouviram isso da minha boca agora pouco."
41040-98 = "O que eu quero dizer é, Sensei:#nnós do Escritório de Defesa do Comitê de Administração,#nseremos aliadas da Schale e apoiaremos totalmente#nqualquer decisão que o senhor tomar."
41040-99 = "Tudo para proteger o futuro com o qual aquelas garotas tanto sonham.#nEntão, por favor, eu peço que as salve."
41040-100 = "Eu lhe dou carta branca para tomar qualquer providência e ditar o que for necessário#npara o \"Esquadrão RABBIT\"."
41040-101 = "Se o senhor decidir tomar conta delas sob a asa da Schale,#nou então decidir que devem seguir vivendo sozinhas pelos próprios esforços……#nEm relação a essas garotas, o que você falar será a ordem."
41040-102 = "Infelizmente eu só não posso prometer uma varinha mágica de que#n\"Reestruture e as mande de volta a uma SRT reconstruída\" agora mesmo,#npois seria impossível…… "
41040-103 = "[s] \"Você tem certeza disso? Deixar que eu decida o futuro de alunas das quais eu mal tenho jurisdição?\""
41040-104 = "Sim, completamente.#nApesar dessa minha aparência, eu desfruto de uma certa confiança incontestável#ne de respeito absoluto entre o Comitê de Administração do Conselho."
41040-105 = "Diremos a eles que as minhas decisões colocaram a todos do conselho#num passo mais longe de um desastre e que agora todos me devem um favor."
41040-106 = "No fim do dia,#nperdoar a punição é um preço pequeno se for para não destruir#no futuro dos prodígios de Kivotos."
41040-112 = "Sendo assim……#nO destino dessas crianças agora está em suas mãos, Sensei."
41040-114 = "Próximo Episódio;Desconfiança Duradoura"