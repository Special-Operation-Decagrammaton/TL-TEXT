[translation]
10025010-1 = "第1話;可愛い水着と不穏な村"
10025010-2 = "[ruby=やとうら]夜戸浦[/ruby]村・入口"
10025010-15 = "……モエ。なんだ、そのやる気のない格好は？"
10025010-16 = "ん？どうかしたの？"
10025010-18 = "いつものメガネはどうした？#nそれに端末も持ってきてないじゃないか。"
10025010-19 = "いやー、メガネをかけてたら泳げないでしょ。#nコンタクトに決まってるじゃん。"
10025010-20 = "端末は防水に対応してないから、スマホでアクセスできるようにしたの。"
10025010-21 = "まあ、セキュリティはちょっと弱くなるけど。"
10025010-22 = "モエ、お前……私たちは遊びに来たんじゃないんだが……"
10025010-24 = "これは立派な任務なんだぞ！"
10025010-25 = "変装を言い訳に、そんな軽装備で来るなんて……#nひとつでも多く装備を持ち込むべきだろう！"
10025010-30 = "いいえ、サキ。今回の作戦においては、モエの判断が正しいです。"
10025010-35 = "事前に共有した通り、この作戦はいかに現地住民に疑われないようにするかが重要です。特殊部隊を連想させるような装備は、最小限に抑えるべきです。"
10025010-36 = "たしかに戦闘では役に立ちますが、それ以上に情報収集が最優先ですから。#nまだ裏があると決まったわけではありませんし。"
10025010-42 = "ミヤコ……その水着……"
10025010-43 = "え、ええっと……可愛いと思ったのですが、変でしょうか？"
10025010-44 = "いや、可愛いとは思うけど……"
10025010-45 = "そんなにフリルがいっぱい付いてたら動きづらくないか？"
10025010-46 = "それと、その浮き輪は一体何に使うつもりなんだ？"
10025010-47 = "SRTの水泳実習……満点だったよな？"
10025010-48 = "で、ですからこれも……その、作戦に必要なので仕方なく……！"
10025010-50 = "せっかくの海だし、可愛い姿を先生にお披露目したかったんじゃないの～？"
10025010-52 = "……モエ！"
10025010-54 = "で、サキの持ってるそれは何？"
10025010-55 = "ダッフルバッグにマガジンポーチ、ブーニーハット……"
10025010-56 = "そんな格好じゃ、怪しまれるに決まってるでしょ。#n水中で爆破作戦でもするつもり？"
10025010-57 = "これでも減らしたんだぞ！？"
10025010-58 = "潜入調査とはいえ、戦闘になる可能性もあるわけだし……"
10025010-59 = "予備のマガジン、水分補給用の水筒……防弾素材のハット。#n万が一の水中作戦に備えた装備……"
10025010-60 = "……。"
10025010-61 = "せめて、そのいかにもなダッフルバッグをもう少しカジュアルな物に変えられなかったの？"
10025010-62 = "これの何が悪いんだ？十分カジュアルだと思うが。"
10025010-68 = "お、お待たせ……！#nごめんね、思ったより時間がかかっちゃって……"
10025010-69 = "狙撃の装備は釣り用バッグにまとめたけど、これでどうかな……？#n大丈夫？"
10025010-70 = "新品だと変に見えちゃうし、少し使用感を出してみたんだけど……"
10025010-77 = "あ、あれ……みんな、どうしたの……？"
10025010-79 = "これが本当の潜入装備か……そこまでは頭が回らなかった。"
10025010-80 = "潜入といえば、やっぱりミユだよね～"
10025010-82 = "え、えっ。わ、私、変かな……？"
10025010-89 = "[ns1] \"全員、水着で来たんだね。\"\n[ns2] \"みんな、よく似合ってるよ。\""
10025010-93 = "あ、ありがとうございます……。"
10025010-94 = "そ、それなら、良かったです……。"
10025010-96 = "バリバリに水泳します～って格好のヤツもいるけど。"
10025010-97 = "……空気が読めなくて悪かったな。"
10025010-98 = "可愛い格好とは無縁なもんで。"
10025010-99 = "[s3] \"そんなことはないよ。\"\n[s4] \"サキの水着も可愛いよ？\""
10025010-109 = "これは、喜んで良いのか……？"
10025010-110 = "普通の観光客に見えるなら、まあ……そうだな、ありがとう。"
10025010-116 = "全員揃いましたし、潜入前に最後の確認を。"
10025010-117 = "今回の作戦は、[ruby=やとうら]夜戸浦[/ruby]村で聞き込みを行います。#n村でエビが廃棄されたり、普段と異なるルートで搬出された痕跡を探してください。"
10025010-118 = "住民の方々にご協力を得なくてはなりません。#nくれぐれも疑いを招くような行動は慎んでください。"
10025010-119 = "あ、あの……ミヤコちゃん。#n作戦会議中にごめん……そ、その……"
10025010-121 = "すでに注目されてるみたい、だけど……"
10025010-130 = "……どうやら、海水浴を楽しむのは難しそうですね。"
10025010-132 = "ここは漁村なんだし、こんな水着でウロウロしてたらそりゃ怪しいだろ。#n観光客の姿もないしな。"
10025010-133 = "なんか、この村……ホラー映画に出てきそうな雰囲気……"
10025010-135 = "……ココ、本当に観光地なの？"
10025010-137 = "記録によれば、工場の建設前は自然豊かな景色を楽しめる隠れた名所として人気だったようですが……"
10025010-138 = "工場ができてからは村の雰囲気が変わってしまって、#n観光客の足は遠のいてしまったようです。"
10025010-139 = "[s] \"これなら制服で来た方が良かったかな？\""
10025010-140 = "いえ……外部の人というだけで注目を集めているのですから、#n正体を知られれば余計に警戒されていたでしょう。"
10025010-141 = "調査は難航するかもしれませんが……ひとまず、計画通り作戦を進めましょう。"
10025010-142 = "私は船着き場で漁師の方を当たってみます。#nサキは役所で、ここ最近の事故や事件を調べてください。"
10025010-144 = "了解。"
10025010-146 = "モエは村に出入りしている不審者がいないか、防犯カメラの確認を。#nミユは、私たち以外で村に訪れた人がいないか聞き込みをお願いします。"
10025010-148 = "う、うん……！"
10025010-149 = "任せなって、くひひっ。"
10025010-151 = "では、作戦を開始します！"
