[translation]
10025010-1 = "Episódio 1: Trajes de banho fofos e uma vila inquietante"
10025010-2 = "Entrada da Vila Yatoura"
10025010-15 = "……Moe. O que é esse visual desleixado?"
10025010-16 = "Hm? Aconteceu alguma coisa?"
10025010-18 = "Onde estão seus óculos de sempre?#nE você nem trouxe seu terminal."
10025010-19 = "Ah, não dá para nadar de óculos, né?#nObviamente estou usando lentes de contato."
10025010-20 = "Como o terminal não é à prova d'água, configurei tudo para acessar pelo smartphone."
10025010-21 = "Bem, a segurança fica um pouco mais fraca, mas..."
10025010-22 = "Moe, você... nós não viemos aqui para brincar..."
10025010-24 = "Isso é uma missão séria!"
10025010-25 = "Usar o disfarce como desculpa para vir com um equipamento tão leve...#nVocê deveria ter trazido o máximo de equipamento possível!"
10025010-30 = "Não, Saki. Para esta operação, o julgamento da Moe está correto."
10025010-35 = "Como compartilhamos anteriormente, o mais importante nesta operação é não levantar suspeitas dos moradores locais. Equipamentos que lembrem forças especiais devem ser reduzidos ao mínimo."
10025010-36 = "Certamente são úteis em combate, mas a coleta de informações é nossa prioridade máxima.#nAlém disso, ainda não temos certeza se há algo suspeito acontecendo."
10025010-42 = "Miyako... esse traje de banho..."
10025010-43 = "Ah, bem... eu achei que era fofo, mas está estranho?"
10025010-44 = "Não, eu acho fofo, mas..."
10025010-45 = "Não é difícil se mover com tantos babados?"
10025010-46 = "E essa boia, afinal, para que você pretende usá-la?"
10025010-47 = "O treinamento de natação da SRT... você tirou nota máxima, não tirou?"
10025010-48 = "P-por isso mesmo, isso também é... bem, necessário para a operação, então não tive escolha...!"
10025010-50 = "Já que estamos na praia, você não queria mostrar seu visual fofo para o Sensei, não é~?"
10025010-52 = "……Moe!"
10025010-54 = "E Saki, o que é isso que você está carregando?"
10025010-55 = "Bolsa de lona, porta-carregadores, chapéu boonie..."
10025010-56 = "Com esse visual, é óbvio que vão desconfiar de você.#nVocê pretende fazer uma operação de demolição debaixo d'água?"
10025010-57 = "Eu já reduzi bastante, sabia!?"
10025010-58 = "Mesmo sendo uma investigação de infiltração, existe a possibilidade de combate..."
10025010-59 = "Carregadores extras, cantil para hidratação... chapéu de material à prova de balas.#nEquipamento preparado para qualquer operação subaquática de emergência..."
10025010-60 = "……."
10025010-61 = "Pelo menos, você não poderia ter trocado essa bolsa de lona óbvia por algo mais casual?"
10025010-62 = "O que há de errado com isso? Acho bem casual."
10025010-68 = "D-desculpem a demora...!#nDesculpe, demorou mais do que eu pensava..."
10025010-69 = "Coloquei o equipamento de sniper na bolsa de pesca, o que acham...?#nEstá bom?"
10025010-70 = "Se fosse novo pareceria estranho, então tentei dar um aspecto de usado..."
10025010-77 = "Ah, nossa... pessoal, o que houve...?"
10025010-79 = "Esse sim é um equipamento de infiltração de verdade... não tinha pensado nisso."
10025010-80 = "Quando se fala em infiltração, a Miyu é quem entende, né~"
10025010-82 = "E-eh. E-eu, estou estranha...?"
10025010-89 = "[ns1] \"Vocês todas vieram de traje de banho.\"\n[ns2] \"Todas estão muito bonitas.\""
10025010-93 = "Ah, muito obrigada..."
10025010-94 = "S-sendo assim, fico aliviada..."
10025010-96 = "Embora tenha gente aqui que parece que veio pronta para uma competição de natação."
10025010-97 = "……Desculpe por não saber ler o clima."
10025010-98 = "Não tenho muita afinidade com visuais fofos."
10025010-99 = "[s3] \"Não é verdade.\"\n[s4] \"O traje de banho da Saki também é fofo.\""
10025010-109 = "Isso é algo para eu ficar feliz...?"
10025010-110 = "Se eu pareço uma turista comum, então... bem, obrigado."
10025010-116 = "Já que estamos todas reunidas, vamos à última verificação antes da infiltração."
10025010-117 = "Nesta operação, faremos perguntas na Vila Yatoura.#nProcurem por vestígios de camarões descartados ou rotas de transporte incomuns na vila."
10025010-118 = "Precisamos da cooperação dos moradores. #nPor favor, evitem qualquer comportamento que possa levantar suspeitas."
10025010-119 = "A-ah... Miyako-chan. #nDesculpe interromper a reunião de estratégia... é que, bem..."
10025010-121 = "Parece que já estamos chamando atenção, mas..."
10025010-130 = "...Pelo visto, vai ser difícil aproveitar o banho de mar."
10025010-132 = "Este é um vilarejo de pescadores, então é óbvio que andar por aí com esses trajes de banho é suspeito. #nAlém disso, não tem nenhum turista por aqui."
10025010-133 = "Sabe, esse vilarejo... tem uma atmosfera que parece saída de um filme de terror..."
10025010-135 = "...Aqui é realmente um ponto turístico?"
10025010-137 = "De acordo com os registros, antes da construção da fábrica, era um local popular e escondido, conhecido por suas paisagens naturais..."
10025010-138 = "Mas, depois que a fábrica foi construída, a atmosfera do vilarejo mudou, #ne os turistas pararam de vir."
10025010-139 = "[s] \"Será que teria sido melhor vir de uniforme?\""
10025010-140 = "Não... só o fato de sermos pessoas de fora já atrai atenção, #nentão se descobrissem nossa identidade, seríamos vigiadas ainda mais."
10025010-141 = "A investigação pode ser difícil, mas... por enquanto, vamos seguir com o plano."
10025010-142 = "Eu vou verificar com os pescadores no cais. #nSaki, por favor, verifique na prefeitura sobre os acidentes e incidentes recentes."
10025010-144 = "Entendido."
10025010-146 = "Moe, verifique as câmeras de segurança para ver se há algum suspeito entrando ou saindo do vilarejo. #nMiyu, por favor, tente descobrir se mais alguém além de nós visitou o vilarejo."
10025010-148 = "C-certo...!"
10025010-149 = "Pode deixar comigo, hehe."
10025010-151 = "Muito bem, vamos iniciar a operação!"
