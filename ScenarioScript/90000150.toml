[translation]
90000150-1 = "第16話;氷河（２）"
90000150-3 = "エイミ、トキ、お疲れ様でした。#n何か見つかりましたか？"
90000150-9 = "デカグラマトンの眷属が氷海の色んなところにいたよ。でも、何か目的があるようには見えなかったかな。"
90000150-10 = "どちらかというと、あれは命令がなくて彷徨ってる感じかも。"
90000150-16 = "信号の発信源には氷海しかありませんでした。"
90000150-17 = "となると……"
90000150-22 = "……メーデー、メーデー……あ、あ―……聞こえますか？"
90000150-23 = "通信……！？ "
90000150-24 = "これは、遭難信号……？"
90000150-25 = "違うってば！メーデーは救助要請！言うのはこっち！"
90000150-26 = "皆様、ご足労いただきありがとうございます。#nそれでは――死んでもらいます。"
90000150-27 = "あ、あなたたちは……！？"
90000150-32 = "！？"
90000150-33 = "地震！？"
90000150-40 = "いえ！これは……地震波ではありません……#nこれは……"
90000150-46 = "地下15mより強力なエネルギー体を感知！#nこっちに接近してる……！"
90000150-48 = "氷海の下から……！？"
90000150-49 = "この信号は……預言者……！？#nデカグラマトンの新たな預言者が近づいています！"
90000150-50 = "あれれ～？#nこの子たち、思ったよりバカじゃないかも！"
90000150-51 = "評価を上方修正します。超バカからバカへ。"
90000150-52 = "何でも構いません。それではお疲れ様でした。#nお別れの挨拶はあの世に着いてからどうぞ。それでは良い旅を。"
90000150-53 = "……まずは預言者の阻止をしましょう！"
90000150-54 = "[s] \"みんな、戦闘準備！\""
90000150-61 = "承知しました。"
90000150-62 = "了解！"
