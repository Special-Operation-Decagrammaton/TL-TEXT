[translation]
90000150-1 = "Episódio 16; Glaciar (2)"
90000150-3 = "Eimi, Toki, bom trabalho. #nEncontraram alguma coisa?"
90000150-9 = "Os servos de Decagrammaton estavam espalhados por várias partes do mar de gelo. Mas não parecia que eles tinham um objetivo específico."
90000150-10 = "Na verdade, parecia mais que eles estavam vagando sem receber ordens."
90000150-16 = "A única fonte de sinal era o próprio mar de gelo."
90000150-17 = "Sendo assim..."
90000150-22 = "...Mayday, Mayday... ah, ah... vocês estão me ouvindo?"
90000150-23 = "Uma transmissão...!? "
90000150-24 = "Isso é um sinal de socorro...?"
90000150-25 = "Não é isso! Mayday é um pedido de resgate! Quem deveria dizer isso somos nós!"
90000150-26 = "Senhoras, obrigado por se darem ao trabalho de vir. #nEntão... preparem-se para morrer."
90000150-27 = "Q-quem são vocês...!?"
90000150-32 = "!?"
90000150-33 = "Um terremoto!?"
90000150-40 = "Não! Isso... não é uma onda sísmica... #nIsso é..."
90000150-46 = "Detectada uma entidade de energia poderosa a 15 metros de profundidade! #nEstá se aproximando daqui...!"
90000150-48 = "Debaixo do mar de gelo...!?"
90000150-49 = "Este sinal é... um Profeta...!? #nUm novo Profeta de Decagrammaton está se aproximando!"
90000150-50 = "Ora, ora~? #nEssas garotas podem não ser tão idiotas quanto eu pensava!"
90000150-51 = "Vou revisar a avaliação. De super idiotas para apenas idiotas."
90000150-52 = "Não importa. Bem, bom trabalho. #nDeixem as despedidas para quando chegarem ao outro mundo. Tenham uma boa viagem."
90000150-53 = "...Primeiro, vamos impedir o Profeta!"
90000150-54 = "[s] \"Pessoal, preparem-se para o combate!\""
90000150-61 = "Entendido."
90000150-62 = "Compreendido!"
