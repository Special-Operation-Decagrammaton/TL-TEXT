[translation]
3401-1 = "山海経のちょっと特別な朝（１）"
3401-3 = "いち、に、さん、し……#nにーに、さん、し……"
3401-15 = "ふぅ……[ruby=びゃっこ]白虎[/ruby]公園といえど、この時間には誰もおらぬのじゃな。"
3401-16 = "かような姿を誰にも見られずに済むのは良いことじゃ。"
3401-25 = "ふふ……朝早くから身体を動かすのは気持ち良いのう。"
3401-26 = "護衛もおらぬゆえ、自由の身になったような気分……#nうむ。早起きは三文の徳、じゃな。"
3401-27 = "まぁ……目が覚めてしまうだけなのじゃが。#n……たまには、寝坊してみたくもある。"
3401-28 = "……。"
3401-29 = "さて、そろそろ戻るとしよう。"
3401-36 = "今のは、もしかして……"
3401-37 = "いえ、もしかしなくとも……カンフーの練習では！？"
3401-41 = "あの門主様が……！？"
3401-45 = "[ruby=うるしばら]漆原カ[/ruby]グヤ、感激いたしました……っ！"
3401-46 = "最初は我が目を疑っておりましたが……"
3401-47 = "[ruby=てんがいひりん]天涯比隣[/ruby]――この世で理解し合える者が居れば、たとえ地の果てに居ようとも、隣人のように感ずるものである……"
3401-51 = "門主様……！#nついに我々の忠誠心を理解し、京劇の稽古を始めて下さったのですね！"
3401-54 = "玄龍門の事は未だに苦手です。"
3401-55 = "うるさいし、無礼だし、傲慢だし……#nまるで自分たちが法だと言わんばかりの態度……"
3401-59 = "……もちろん、それが必要な場面があることは承知しています。"
3401-60 = "ああでも、門主様だけは例外です。#n基本的に話が通じますし、時には私たちに寄り添ってくれる方です。"
3401-61 = "そんな門主様が……まさか、こっそりカンフーの練習をしていたとは！"
3401-62 = "朝練をしに来た甲斐がありました。#n普段より早く目覚めたのも何かの導きだったのですね……#nすべてはこの場面を目撃するための！"
3401-63 = "まさに運命と言えるでしょう！#nこれを機に門主様と共に……！"
3401-67 = "いえ、先にこの事実を皆さんに知ってもらわねば……！#nまずは……ルミ会長に！"
3401-73 = "……京劇部は例の事件を受け、一定期間、活動を自粛することになりました。"
3401-74 = "無論、門主様の決定に不服などありません。"
3401-75 = "むしろ、門主様に見放され、もう二度と忠義を示せなくなるのではないかと懸念していたくらいです。"
3401-76 = "ですが、門主様は自ら京劇の稽古をしてくださり……実はま[ruby=わたし]だ私た[/ruby]ちのことを見捨ててないのだと示して下さりました！"
3401-77 = "嗚呼――身に余る光栄！"
3401-78 = "これで京劇部は世間[ruby=はばか]に憚る[/ruby]ことなく、劇を披露することができます！"
3401-79 = "ええ、部にとっても朗報です！#n早く皆にこの事実を伝えねば！"
3401-86 = "それで――キサキが朝早くに公園でカンフーの練習をしていた、と？"
3401-87 = "はい！まさか、私以外にもカンフーの素晴らしさに気づいてくれる人がいたとは！#nそれも、あの門主様が……！"
3401-88 = "カンフーを愛し、修行に勤しむ身として、嬉しい限りです！"
3401-89 = "えっと……それは多分だけど……"
3401-90 = "……。"
3401-91 = "うん、そうだよね。"
3401-92 = "どうかしましたか、会長？"
3401-93 = "ううん、なんでもないよ。"
3401-94 = "（あたしの知る限り、キサキはカンフーに興味ないと思うんだけどね……）"
3401-95 = "それで……これからどうするの？"
3401-96 = "そうですね……カンフーを愛する同志にも、それを共有しようと思っているところです。"
3401-97 = "ご存知の通り、山海経だけでなくキヴォトス全土を見わたしても、武術を極める者は少ないです。"
3401-98 = "ですので、同志が一人増えるというのは、とてもめでたいことなのです！"
3401-99 = "いち早く皆に伝えねば……！それでは、お先に失礼します！"
3401-104 = "元気なのは良いんだけどさ……"
3401-108 = "ま、本人が喜んでるし別にいっか！"
3401-109 = "しかし、あのキサキがねぇ……うーん、やっぱり妙というか……"
3401-110 = "でも、本当にカンフーの練習をしてたのなら……"
3401-111 = "後でこっそり、お菓子でも差し入れてあげようかな。"
3401-114 = "本当なのですか？部長。"
3401-115 = "ええ、この目でしかと見ました！"
3401-119 = "無論……見つからぬよう遠くから見ていたので、勘違いだと主張する者もいるでしょう……"
3401-120 = "しかし、これだけは断言できます――この漆原カグヤの目に狂いは無し！"
3401-121 = "円を[ruby=えが]描[/ruby]くような振り付け……#nそして両の腕を大きく伸ばし、全身をそらす動作！ええ、まさに……！"
3401-122 = "我ら京劇部の「京劇舞踊」そのものでした！"
3401-123 = "京劇舞踊……それは京劇の基本的な動きを応用して作られた――"
3401-124 = "私たち京劇部特有の舞踊……！"
3401-125 = "でも、おかしくないですか？#n我々京劇部の舞踊をなぜ門主様がご存知なのでしょう。"
3401-126 = "おかしくなどありません。よく考えてみてください。"
3401-130 = "門主様は――全てを知っているお方なのですよ？"
3401-135 = "た、たしかに！"
3401-136 = "しかし、いくら美しい至宝でも、多少の[ruby=かし]瑕疵[/ruby]はあるというもの……。"
3401-137 = "門主様の京劇舞踊は、ところどころ未熟な箇所が見受けられました。"
3401-138 = "――であれば！我々が門主様に手ほどきすればよいのです！"
3401-139 = "そうですね！#n京劇部一同、門主様のために頑張りましょう！"
3401-142 = "ねぇねぇ、聞いた？門主様がさぁ……"
3401-143 = "聞いた聞いた！ほんとビックリしたんだから……#nってか、この話聞かれたらマズいんじゃないの……？"
3401-144 = "バレなきゃいいんじゃない？#nすごいよね……門主様が早朝からあんな練習をしているなんて……"
3401-145 = "たしかにね……でも、この話が広まったら門主様のお立場とか色々大変になっちゃうかも……。"
3401-151 = "おや、武術研究部の皆さんではありませんか。#n何か御用でしょうか？"
3401-152 = "お久しぶりです、レイジョさん。"
3401-153 = "その……門主様の「例の件」なんですが……。"
3401-154 = "どうか、私たち武術研究部に協力してくれませんか？#n一瞬で構いませんので！"
3401-155 = "……。"
3401-156 = "いいでしょう。武術研究部の皆さんには、昔からずっとお世話になっていますからね。"
3401-157 = "むしろ、私の方から助力を申し出たいくらいです。"
3401-158 = "修行と鍛錬のために、ご教示願えますか？"
3401-159 = "はい！もちろん喜んで！"
3401-160 = "それと……"
3401-161 = "よろしければ、これを機に……レイジョさんを武術研究部の部員とし[ruby=しょうへい]て招聘し[/ruby]たいのですが……！"
3401-163 = "……ごめんなさい。#n今は商会の仕事で忙しくて……。"
3401-164 = "やっぱり、そうですよね……。"
3401-167 = "全員、集まりましたね？"
3401-171 = "はい、部長！"
3401-173 = "ここが――門主様が早朝から京劇舞踊に励んでいた白虎公園……。"
3401-174 = "京劇披露の場として――我々にとっては縁のある地。"
3401-175 = "しかし――其処に立つ者が誰なのか、また、どのような目的で使用していたかによって、此処が持つ意味は大きく異なります！"
3401-176 = "高きに登るにはまず低きより――門主様は自ら、お手本となって下さりました。"
3401-177 = "私たちは今ここで……その崇高な志に、最大の敬意を示すのです。"
3401-178 = "さあ！我々京劇部が誇る[ruby=みやび]、雅や[/ruby]かな京劇舞踊をお見せすると致しましょう！"
3401-183 = "はいっ！部長！"
