[translation]
3401-1 = "Uma manhã um tanto especial em Shanhaijing (1)"
3401-3 = "Um, dois, três, quatro...#nDois, três, quatro..."
3401-15 = "Ufa... Mesmo sendo o Parque Byakko, não há ninguém por aqui a esta hora."
3401-16 = "É bom poder evitar que alguém me veja nesta situação."
3401-25 = "Fufu... É revigorante exercitar o corpo logo cedo."
3401-26 = "Sem escoltas por perto, sinto-me como se estivesse livre...#nSim. Deus ajuda quem cedo madruga, não é?"
3401-27 = "Bem... na verdade, é só porque eu acordo cedo mesmo.#n...Às vezes, eu gostaria de poder dormir até mais tarde."
3401-28 = "..."
3401-29 = "Bem, é hora de voltar."
3401-36 = "Aquilo foi, por acaso..."
3401-37 = "Não, não há dúvidas... Aquilo era treino de Kung Fu!?"
3401-41 = "A própria Monshu-sama...!?"
3401-45 = "Urushibara Kaguya, estou emocionada...!"
3401-46 = "No começo, eu duvidei dos meus próprios olhos, mas..."
3401-47 = "Tengai Hirin — Se existem pessoas que se compreendem neste mundo, mesmo que estejam nos confins da terra, elas se sentem como vizinhas..."
3401-51 = "Monshu-sama...!#nVocê finalmente entendeu nossa lealdade e começou a praticar a Ópera de Pequim!"
3401-54 = "Ainda não gosto da Genryumon."
3401-55 = "São barulhentos, rudes e arrogantes...#nComo se a atitude deles dissesse que eles mesmos são a lei..."
3401-59 = "...Claro, entendo que há situações em que isso é necessário."
3401-60 = "Ah, mas a Monshu-sama é a exceção.#nBasicamente, é possível conversar com ela e, às vezes, ela até nos dá atenção."
3401-61 = "E essa Monshu-sama... quem diria que ela estava praticando Kung Fu em segredo!"
3401-62 = "Valerá a pena ter vindo para o treino matinal.#nAcordar mais cedo que o habitual também deve ter sido algum tipo de orientação...#nTudo para testemunhar esta cena!"
3401-63 = "Isso só pode ser o destino!#nAproveitarei esta oportunidade para ficar ao lado da Monshu-sama...!"
3401-67 = "Não, primeiro preciso contar isso a todos...!#nPrimeiro... à presidente Lumi!"
3401-73 = "...O Clube de Ópera de Pequim, após aquele incidente, decidiu suspender suas atividades por um período."
3401-74 = "Claro, não tenho nenhuma objeção à decisão da Monshu-sama."
3401-75 = "Na verdade, eu estava preocupada que ela tivesse nos abandonado e que não pudéssemos mais demonstrar nossa lealdade."
3401-76 = "Mas a Monshu-sama praticou a Ópera de Pequim por conta própria... e, na verdade, ela nos mostrou que ainda não desistiu de nós!"
3401-77 = "Ah — que honra imensa!"
3401-78 = "Com isso, o Clube de Ópera de Pequim poderá apresentar suas peças sem medo do julgamento alheio!"
3401-79 = "Sim, é uma ótima notícia para o clube!#nPreciso contar isso a todos logo!"
3401-86 = "Então... Kisaki estava praticando Kung Fu no parque bem cedo?"
3401-87 = "Sim! Quem diria que, além de mim, haveria alguém que percebesse a maravilha do Kung Fu!#nE ainda por cima, a própria Monshu-sama...!"
3401-88 = "Como alguém que ama o Kung Fu e se dedica ao treinamento, estou muito feliz!"
3401-89 = "Bem... isso provavelmente é..."
3401-90 = "..."
3401-91 = "Sim, é isso mesmo."
3401-92 = "Aconteceu algo, presidente?"
3401-93 = "Não, não é nada."
3401-94 = "(Até onde eu sei, não acho que a Kisaki tenha interesse em Kung Fu...)"
3401-95 = "Então... o que você vai fazer agora?"
3401-96 = "Bem... estou pensando em compartilhar isso com outros camaradas que amam o Kung Fu."
3401-97 = "Como você sabe, não apenas em Shanhaijing, mas em todo o Kivotos, há poucas pessoas que dominam artes marciais."
3401-98 = "Portanto, ganhar mais um camarada é algo muito auspicioso!"
3401-99 = "Preciso contar a todos o mais rápido possível...! Com licença, vou indo!"
3401-104 = "É bom que ela esteja animada, mas..."
3401-108 = "Bem, ela está feliz, então acho que está tudo bem!"
3401-109 = "Mas a Kisaki, hein... hum, ainda acho isso estranho..."
3401-110 = "Mas, se ela realmente estava praticando Kung Fu..."
3401-111 = "Talvez eu leve alguns doces para ela mais tarde, em segredo."
3401-114 = "É verdade, Chefe?"
3401-115 = "Sim, eu vi com meus próprios olhos!"
3401-119 = "Claro... eu estava observando de longe para não ser notada, então pode ser que alguns insistam que foi um mal-entendido..."
3401-120 = "Mas, disso eu posso afirmar com certeza — os olhos desta Urushibara Kaguya não se enganam!"
3401-121 = "A coreografia que desenhava um círculo... #ne o movimento de esticar bem os braços e arquear todo o corpo! Sim, exatamente...!"
3401-122 = "Era a nossa própria 'Dança da Ópera de Pequim' do Clube de Ópera de Pequim!"
3401-123 = "Dança da Ópera de Pequim... algo criado aplicando os movimentos básicos da ópera..."
3401-124 = "Uma dança exclusiva do nosso Clube de Ópera de Pequim...!"
3401-125 = "Mas não é estranho? #nPor que o Mestre do Portão saberia da nossa dança?"
3401-126 = "Não há nada de estranho. Pense bem."
3401-130 = "O Mestre do Portão é alguém que... sabe de tudo, não é?"
3401-135 = "É, verdade!"
3401-136 = "Porém, mesmo o tesouro mais belo pode ter algumas falhas..."
3401-137 = "A Dança da Ópera de Pequim do Mestre do Portão tinha partes que pareciam um pouco inexperientes."
3401-138 = "— Sendo assim! Nós devemos dar umas dicas ao Mestre do Portão!"
3401-139 = "Concordo! #nVamos nos esforçar pelo Mestre do Portão, pessoal do Clube de Ópera de Pequim!"
3401-142 = "Ei, ei, você ouviu? Sobre o Mestre do Portão..."
3401-143 = "Ouvi, ouvi! Fiquei tão surpresa... #nMas, não seria um problema se soubessem que estamos falando disso...?"
3401-144 = "Se ninguém descobrir, não tem problema, né? #nÉ incrível, né... o Mestre do Portão praticando daquele jeito logo de manhã cedo..."
3401-145 = "É verdade... mas se isso se espalhar, a posição do Mestre do Portão pode ficar complicada..."
3401-151 = "Ora, se não são as integrantes do Clube de Pesquisa de Artes Marciais. #nPrecisam de algo?"
3401-152 = "Faz tempo, Reijo-san."
3401-153 = "Sobre... aquele 'assunto' do Mestre do Portão..."
3401-154 = "Poderia colaborar com o nosso Clube de Pesquisa de Artes Marciais? #nSó por um instante, não precisa ser muito!"
3401-155 = "..."
3401-156 = "Muito bem. O Clube de Pesquisa de Artes Marciais sempre nos ajudou muito no passado."
3401-157 = "Na verdade, eu mesma gostaria de oferecer minha ajuda."
3401-158 = "Poderia me ensinar para fins de treinamento e aprimoramento?"
3401-159 = "Sim! Com certeza, ficaremos felizes!"
3401-160 = "E também..."
3401-161 = "Se não for pedir muito, aproveitando a oportunidade... gostaríamos de convidar a Reijo-san para ser um membro do Clube de Pesquisa de Artes Marciais...!"
3401-163 = "...Sinto muito. #nAgora estou ocupada com o trabalho na associação comercial..."
3401-164 = "É, eu imaginei..."
3401-167 = "Todas reunidas?"
3401-171 = "Sim, Chefe!"
3401-173 = "Este é o Parque Byakko, onde o Mestre do Portão praticava a Dança da Ópera de Pequim logo cedo..."
3401-174 = "Um local com o qual temos laços, como palco de nossas apresentações."
3401-175 = "Porém — dependendo de quem está aqui e com qual propósito, o significado deste lugar muda drasticamente!"
3401-176 = "Para subir alto, deve-se começar de baixo — o Mestre do Portão tornou-se nosso exemplo pessoalmente."
3401-177 = "Agora, aqui... vamos demonstrar nosso maior respeito por essa nobre determinação."
3401-178 = "Vamos lá! Vamos mostrar a elegante Dança da Ópera de Pequim, o orgulho do nosso clube!"
3401-183 = "Sim! Chefe!"
