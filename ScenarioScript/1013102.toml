[translation]
1013102-1 = "Assunto de crítica"

1013102-2 = "Bom dia, professor. #nPrazer em conhecê-lo novamente, [ruby=Miyoshi]Miyoshi[/ruby]Takane."

1013102-3 = "[s] \"Bem-vindo Takane, esta é sua primeira vez em uma placa de Petri, certo?\""

1013102-4 = "Sim, está certo. #n... As placas de Petri são realmente maravilhosas."

1013102-5 = "É mais quente que o Inverno Vermelho... talvez seja por isso."

1013102-6 = "...Bem, há algo que eu gostaria de perguntar mais do que antes."

1013102-7 = "[s] \"O que há de errado? Diga-me qualquer coisa.\""

1013102-8 = "obrigado."

1013102-9 = "...Quero saber mais sobre você. #nSe você não se importa, poderia me dizer?"

1013102-10 = "[s] \"S-de repente... por quê?\""

1013102-11 = "Ah, você não acha que quer saber mais sobre mim?"

1013102-12 = "É natural que os professores queiram saber mais sobre seus alunos? #nHmm…."

1013102-13 = "Concordo. Só precisamos nos conhecer melhor a partir de agora."

1013102-14 = "É natural que os críticos queiram saber mais sobre o assunto."

1013102-15 = "[s] \"Até as pessoas estão sujeitas a críticas!?\""

1013102-16 = "Não...na verdade, está fora do escopo."

1013102-17 = "Conhecer o assunto, analisá-lo e combinar as informações obtidas para encontrar o valor oculto."

1013102-18 = "Isso não é importante tanto na crítica quanto nas relações humanas?"

1013102-19 = "É por isso que acho que as pessoas também podem criticá-lo."

1013102-20 = "Num sentido positivo, claro."

1013102-21 = "[s] \"...Sua escolha de palavras é muito boa.\""

1013102-22 = "Hehe, claro."

1013102-23 = "...Caso contrário, especialmente nesta sociedade da Internet...você não conseguiria ganhar a vida escrevendo."

1013102-24 = "A propósito, professor... que livro é esse? #nEncontrei embaixo da mesa do professor..."

1013102-25 = "Ah, mas. Este também é um livro, por isso está sujeito a críticas. #nLeia por enquanto――"

1013102-26 = "[s] \"Oh, isso não é bom!!!\""

1013102-27 = "Eh, eh... é realmente algo para entrar em pânico?"

1013102-28 = "Não importa o que aconteça, definitivamente não está tudo bem...?"

1013102-29 = "Eca..."

1013102-33 = "Eu entendo. Todo mundo tem uma ou duas coisas que deseja esconder."

1013102-34 = "Mas ainda estou um pouco preocupado... #nMesmo tendo essa aparência, sou surpreendentemente tolerante."

1013102-35 = "Afinal... não é bom?"

1013102-36 = "[s] \"...Por favor, me mate primeiro.\""

1013102-37 = "É assim mesmo...?"

1013102-39 = "Pensando bem... tem muita coisa na sala do professor."

1013102-40 = "Há tanta variedade que é difícil encontrar pontos em comum..."

1013102-41 = "foto? Todos foram deixados para trás por outros alunos como lembranças?"

1013102-42 = "……."

1013102-43 = "Tudo bem, mas... por que você não os classifica pelo menos um pouco de acordo com seus próprios padrões?"

1013102-44 = "A classificação é em si um ato que cria significado."

1013102-45 = "Através desse processo, também posso entender que tipo de pessoa o professor é."

1013102-46 = "Bem... nesse sentido, vou te dar isso."

1013102-47 = "Coleção de resenhas culturais dos Kivotos deste mês publicada por nosso departamento editorial."

1013102-48 = "Ah, das páginas 22 a 24... você não precisa ler."

1013102-49 = "Essa é a parte que Merly desenhou sozinha..."

1013102-50 = "[s] \"Takane publica uma coleção de resenhas como essa todo mês?\""

1013102-51 = "Embora não esteja escrevendo sozinho, procuro preencher ao máximo todas as páginas pelas quais sou responsável."

1013102-52 = "...Se não consigo criar um trabalho que valha a pena criticar, às vezes não tenho escolha a não ser desistir."

1013102-54 = "...Isso mesmo. Se tivéssemos confiado apenas na edição analógica, não teríamos sobrevivido mais."

1013102-55 = "Na verdade, a indústria editorial está a fazer tudo o que pode para manter o seu negócio em funcionamento."

1013102-56 = "Sinto que estou colocando a carroça na frente dos bois, então, se possível, gostaria de retornar à minha função original de editora..."

1013102-57 = "Ha... sim. Acho que isso também é um problema de luxo. #nNesse aspecto, devo reconhecer as habilidades estratégicas de gestão do gestor."

1013102-58 = "...No final, minha conclusão é sempre a mesma."

1013102-59 = "Enquanto estou sobrecarregado com preocupações extravagantes, quero deixar tantas críticas excelentes quanto possível e mostrar ao mundo o valor oculto... é isso que eu..."

1013102-60 = "É uma “obrigação profissional”."

1013102-61 = "Portanto, professor! Só para mim――"

1013102-62 = "É possível você me mostrar as partes que está escondendo?"

1013102-63 = "[s] \"Os professores não têm nada a esconder dos alunos...\""

1013102-64 = "Nossa... essa é uma resposta clássica."

1013102-65 = "Mas eu já sei duas coisas."

1013102-66 = "Os professores valorizam o que recebem dos alunos mais do que qualquer outra coisa."

1013102-67 = "--E ele está escondendo algo que não pode mostrar aos seus alunos!"

1013102-68 = "[s] \"Bem, então quero que você mostre o lado oculto de Takane!\""

1013102-69 = "Claro. Fique à vontade para fazer qualquer pergunta."

1013102-70 = "Ah, mas... as partes menos sensíveis..."

1013102-71 = "……."

1013102-72 = "Em alguns casos, talvez não possamos responder às suas perguntas."

1013102-73 = "[s] \"E-eu não vou te fazer essa pergunta!\""

1013102-74 = "Ah, é mesmo?"

1013102-75 = "Então, o que você quer saber?"

1013102-76 = "Meu hobby...? Além de ler...?"

1013102-77 = "Ugh... sinto que estou sendo chamada de estudante pela minha aparência, o que é meio frustrante...!"

1013102-78 = "Além do mais, não está errado!"

1013102-79 = "Hehe...mas eu tenho um hobby que surpreenderia meu professor."

1013102-80 = "Isso é hóquei no gelo!"

1013102-81 = "[s] \"Hóquei no gelo!?\""

1013102-82 = "Sim! O hóquei no gelo é um verdadeiro esporte! #nQuanto você sabe sobre hóquei no gelo?"

1013102-83 = "[s1] \"Bem, basicamente...?\"\n[s2] \"Desculpe, não entendi nada.\""

1013102-84 = "Isso mesmo. Então talvez..."

1013102-85 = "Ao se inscrever em um serviço de streaming sob demanda dedicado, você pode até analisar as partidas de times rivais! ?"

1013102-86 = "Ah, isso não é tudo..."

1013102-87 = "Ah, sim. É mais natural assim."

1013102-88 = "O Inverno Vermelho é um inverno eterno, então você pode ver esportes de inverno durante todo o ano, mas nem sempre é o caso em outros lugares..."

1013102-89 = "Se sim, professor..."

1013102-90 = "Da próxima vez que você estiver no Red Winter, gostaria de assistir hóquei no gelo comigo?"

1013102-91 = "Vou explicar passo a passo――"

1013102-92 = "Não, vou te dar uma “crítica”!"

