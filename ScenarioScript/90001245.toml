[translation]
90001245-3 = "[ns] \"明るくなった！\""
90001245-4 = "うわっ、眩しっ！"
90001245-5 = "[ns] \"みんな怪我はない？\""
90001245-6 = "私たちは平気よ。"
90001245-7 = "先生も……無事みたいね。"
90001245-10 = "もう、逃げるなんて卑怯だよ！"
90001245-11 = "なんか……気持ち悪い機械でした……。"
90001245-13 = "これまでの敵とは違った印象がありますね。"
90001245-14 = "機体の破片があれば、持ち帰って分析したいところですが……。"
90001245-15 = "んー、残念。ひとつ残らず持ってかれちゃった。"
90001245-16 = "なんだか勝ったような気がしません。#n何故でしょうか……。"
90001245-18 = "逃げるまでがワンセットの……イベント戦をしていたような気分です……。"
90001245-19 = "獲得経験値が少なかったのも、ドロップアイテムがなかったのも、そのせいだったのですね……。"
90001245-21 = "アリス、それはちょっと違うような気がします……。"
90001245-24 = "（さっきの襲撃は……）"
90001245-25 = "（こちらの戦力を探っていた……？）"
90001245-28 = "……。"
90001245-29 = "……！"
90001245-30 = "……！！！"
90001245-34 = "どうかしましたか？"
90001245-35 = "あ、あれは、もしかして……！？"
90001245-36 = "み、見間違いじゃ、ないよね……？"
90001245-42 = "なぜあの二人がここにいるのですか！？"
90001245-44 = "次回;生命について"
