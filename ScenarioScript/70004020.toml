[translation]
70004020-1 = "Presente sem dono (2)"
70004020-2 = "（Na manhã seguinte...）"
70004020-8 = "Bem-vinda à Angel 24!"
70004020-9 = "Ora, que esforçada, trabalhando tão cedo."
70004020-15 = "（Essa pessoa é a presidente Hina Sorasaki, do Comitê Disciplinar de Gehenna. #nEla é uma celebridade conhecida até em outras escolas...）"
70004020-16 = "（Ela é uma pessoa quieta que não demonstra emoções, então não consigo imaginar ela dando um presente para alguém...）"
70004020-17 = "（Mas o Comitê Disciplinar de Gehenna tem contato frequente com o Sensei, então existe uma possibilidade!）"
70004020-22 = "A-ah... Você é a presidente Hina Sorasaki, da Academia Gehenna, certo?"
70004020-23 = "Sou eu, mas o que deseja?"
70004020-24 = "Ah, não! Não é que eu deseje algo em específico...!"
70004020-25 = "É que... bem..."
70004020-26 = "V-você já tem planos para o Natal...?"
70004020-27 = "Natal...?"
70004020-28 = "S-sim. Ouvi dizer que a presidente está sempre muito ocupada... #nEntão pensei que, talvez no Natal, você pudesse... descansar um pouco..."
70004020-29 = "P-por exemplo, participar de uma festa luxuosa, ou... dar um 'presente' para alguém —"
70004020-30 = "......Quem sabe."
70004020-31 = "Por que quer saber dos meus planos?"
70004020-32 = "（Droga, ela desconfiou...!）"
70004020-33 = "I-isso é porque..."
70004020-35 = "N-na verdade, eu ainda estou no ensino fundamental. D-daqui a dois anos, vou para o ensino médio!"
70004020-36 = "Mas estou em dúvida sobre qual escola escolher... #nEntão, queria ouvir como é o Natal em Gehenna para me ajudar a decidir..."
70004020-37 = "Escolher uma escola...? Para a Academia Gehenna...?"
70004020-38 = "Eh? D-disse algo estranho?"
70004020-39 = "Não, não é estranho, mas..."
70004020-40 = "É a primeira vez que vejo uma estudante do fundamental querendo vir para Gehenna."
70004020-41 = "Sempre achei que você fosse uma garota séria... #nQuem diria que você também admira a liberdade."
70004020-42 = "Eh. Você estava me observando?"
70004020-43 = "Bem... eu te vejo toda vez que vou ao Schale."
70004020-44 = "A Sora está sempre nesta loja de conveniência, não está?"
70004020-45 = "Vendo você trabalhar sério sem faltar, achei que fosse uma garota responsável."
70004020-46 = "Não imagino você agindo de forma desleixada como as alunas de Gehenna, por isso me surpreendi. #nEntão não se preocupe, pode escolher seu caminho livremente."
70004020-47 = "Falando como presidente do Comitê Disciplinar... #nSe uma aluna séria como a Sora se tornasse minha subordinada, seria muito reconfortante."
70004020-48 = "M-muito obrigada..."
70004020-49 = "Voltando ao assunto... neste Natal, #npelo visto vou passar na sala do Comitê Disciplinar com os outros membros."
70004020-50 = "Ako — a oficial administrativa do Comitê — parece que vai preparar algo."
70004020-51 = "Dito isso, o trabalho está acumulado... então provavelmente ficarei presa na sala o dia todo no Natal."
70004020-52 = "Entendo... Então, esse presente é, na verdade..."
70004020-53 = "......Presente?"
70004020-54 = "N-não! N-não é nada!"
70004020-58 = "É mesmo? #n... De qualquer forma, vou te dar meu contato. Se precisar de algo, fale comigo."
70004020-59 = "Sobre a escolha da escola também... posso te ajudar."
70004020-60 = "Ah, muito obrigada! #nSe a loja de conveniência for atacada, entrarei em contato imediatamente!"
70004020-61 = "......Espero que isso não aconteça."
70004020-66 = "Bem-vinda à Angel 24!"
70004020-67 = "Hum... me dê um desses novos pães recheados de chocolate com menta, por favor."
70004020-68 = "E, se sobrar... um de cada sabor também."
70004020-69 = "Sim, por favor, aguarde um momento."
70004020-75 = "（Aquela pessoa, se não me engano, é uma aluna da Academia Trinity...）"
70004020-76 = "（...Ela tem uma expressão um pouco assustadora, mas é uma cliente que adora doces fofos e açucarados.）"
70004020-77 = "（Ela sempre compra doces para presentear... Ah. #nSerá que o presente para o Sensei também é...？）"
70004020-82 = "Ah, com licença! Você já reservou seu bolo de Natal?"
70004020-83 = "……Bolo?"
70004020-84 = "Ah, vocês estão fazendo alguma campanha de bolos?"
70004020-85 = "N-não! É que eu queria perguntar por curiosidade……"
70004020-86 = "Que tipo de bolo as pessoas de Trinity costumam comer no Natal?"
70004020-87 = "Hã……?"
70004020-88 = "……?"
70004020-89 = "E-eu cheguei a dizer que sou uma aluna de Trinity?"
70004020-90 = "……?#nNão, você não disse, mas……"
70004020-91 = "Entendi…… Então eu pareço uma aluna de Trinity, né?#nHehehe……"
70004020-92 = "（N-nossa, ela parece feliz……?#nNão é só parecer, ela está literalmente usando o uniforme de Trinity……）"
70004020-93 = "Falando nisso, esses dias circulou um boato nas redes sociais de que \"as alunas de Trinity só comem doces de luxo\"…… Ah, é por isso?"
70004020-94 = "Mas as garotas de Trinity também gostam de doces comuns.#nNão dá para dizer que todas são assim, claro……"
70004020-95 = "A sensação de comer algo gostoso é a mesma para todo mundo.#nEu também reservei um Bûche de Noël em uma loja de D.U. este ano……"
70004020-96 = "Ah, mas como era uma venda limitada por ordem de chegada, acho que não conta como algo comum.#nDesculpe, não ajudei muito."
70004020-97 = "N-não, ajudou sim! Muito obrigada por me contar!"
70004020-98 = "E-então…… com quem você vai comer esse bolo?"
70004020-100 = "Com o pessoal do clube, colegas de classe…… ou talvez com o \"Sensei [USERNAME]\"——"
70004020-101 = "N-não tem como ser isso, né!?"
70004020-102 = "D-desculpe!"
70004020-103 = "……Ah."
70004020-104 = "Fiz de novo……"
70004020-105 = "Desculpe…… Eu acabo gritando quando me assusto."
70004020-106 = "Você não tem culpa de nada.#nIsso é tipo um hábito que eu tenho quando estou com aquelas pessoas……#nSério, me desculpe, eu gostaria que você não levasse a mal……"
70004020-107 = "T-tá tudo bem. Não se preocupe……!"
70004020-108 = "……Obrigada. Você é mais madura do que eu pensava."
70004020-109 = "Respondendo à sua pergunta, pretendo comer o bolo com o pessoal do clube.#nBem, não é impossível que eu coma doces com o Sensei também……"
70004020-110 = "Neste Natal, vou ajudar a Sisterhood."
70004020-111 = "Disseram que, depois da celebração, a Sisterhood vai distribuir panetones recém-assados.#nNão é nada especial, mas…… fiquei curiosa."
70004020-112 = "Entendo…… Então, quanto ao presente, para outra pessoa……"
70004020-113 = "……?"
70004020-117 = "……Sora, é esse seu nome, né? O que você vai fazer no Natal?"
70004020-118 = "Eu peguei um turno de trabalho no dia."
70004020-119 = "Hã? Trabalhando no Natal, logo agora?"
70004020-120 = "Ahaha…… É que tem uma coisa que eu quero muito comprar……"
70004020-121 = "Entendi…… Que difícil, hein……"
70004020-122 = "……Então, toma isso."
70004020-123 = "I-isso é……?"
70004020-124 = "Macarons de edição limitada vendidos em Trinity.#nAcabei comprando demais, então, se quiser, pode comer."
70004020-125 = "Sabe como é, às vezes a gente precisa de um doce quando está trabalhando, né?"
70004020-126 = "Ah, muito obrigada……!"
70004020-127 = "Não esquenta. É também um pedido de desculpas por ter te assustado antes."
70004020-128 = "Até mais, Sora."
70004020-132 = "Ei, vocês têm carregadores portáteis aí!?"
70004020-133 = "A-ah, sim! Na prateleira do fundo à direita, na parte de baixo!"
70004020-134 = "Obrigada! Ufa, finalmente vou conseguir carregar……!#nEu estava esperando um contato importante, então isso salvou minha vida!"
70004020-135 = "Mas era para ter durado até eu voltar…… O que será que aconteceu?"
70004020-141 = "（A Yuuka-san, que cuida das finanças na Millennium Science School……）"
70004020-142 = "（Ela costuma estar com o Sensei durante a temporada de fechamento de contas……）"
70004020-143 = "（Vejo ela dando bronca no Sensei com frequência, mas…… será que ela está preparando um presente em segredo……?）"
70004020-148 = "A-ah, com licença..."
70004020-149 = "Ué. Será que eu calculei o troco errado?"
70004020-150 = "N-não. Na verdade, é que eu queria perguntar uma coisa pessoal..."
70004020-151 = "Ora. É raro a Sora-chan ter uma pergunta pessoal."
70004020-152 = "Tudo bem. Se for algo que eu possa responder."
70004020-154 = "Muito obrigada! #nAh... você sabe quais são os planos do Sensei para o Natal?"
70004020-155 = "P-p-por que você está me perguntando isso!?"
70004020-157 = "Eh? É que a Yuuka-san parece saber sobre os registros de gastos e os turnos noturnos do Sensei..."
70004020-158 = "E como você parece ser mais próxima dele do que as outras, #nimaginei que vocês compartilhassem a agenda um com o outro..."
70004020-162 = "D-desculpe! Eu devo ter entendido tudo errado...!?"
70004020-163 = "…E-ehem. Pois é, é verdade que eu dou conselhos ao Sensei para que ele não desperdice dinheiro."
70004020-164 = "Mas isso é estritamente na relação de aluna e professor. #nA menos que seja uma emergência, evito entrar em contato nos dias de folga."
70004020-165 = "Além disso, parece que o Sensei fica ocupado até nos dias de folga, não é?"
70004020-166 = "A-ah, entendo. #nEntão, a Yuuka-san vai passar o dia de Natal..."
70004020-167 = "Vou passar com o pessoal do Seminar, claro."
70004020-168 = "E ultimamente, tem uma aluna mais nova que dá trabalho e parece estar preocupada com algo."
70004020-169 = "Acho que vou passar o fim de ano cuidando das integrantes do clube, de forma tranquila."
70004020-170 = "Mas, o fato de você tocar nesse assunto... #nAlguém marcou algum compromisso de Natal com o Sensei?"
70004020-171 = "Ah, não! Não é nada disso...!"
70004020-172 = "Hum... bem, não é da minha conta."
70004020-173 = "De qualquer forma, desculpe ter reagido de forma exagerada agora pouco... #nSe precisar de algo, pode perguntar sem medo."
70004020-174 = "Muito obrigada...!"
70004020-178 = "P-pensei que tinha sido descoberta... #nRealmente, perguntar direto assim não é uma boa ideia..."
70004020-179 = "Mas ninguém parece saber sobre o presente."
70004020-180 = "Será que o presente não era para o Sensei...?"
70004020-181 = "Não, ainda é cedo para tirar conclusões. #nTenho que investigar minuciosamente até a última pessoa!"
70004020-186 = "Bem-vinda à Angel 24!"
70004020-188 = "(Depois disso, Sora continuou procurando a origem do presente, mas...)"
70004020-189 = "(...não encontrou nenhuma pista concreta.)"
