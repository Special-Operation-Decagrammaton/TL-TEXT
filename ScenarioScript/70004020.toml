[translation]#[Texto Final. - Filipe 08/07.]
70004020-1 = "O Presente Sem Dono (2)"
70004020-2 = "(Na manhã seguinte……)"
70004020-8 = "Bem-vindo à 'Angel 24'!"
70004020-9 = "Ora, tão cedo assim, hein."
70004020-15 = "(Essa é a Hina, presidente do Comitê de Disciplina de Gehenna.#nÉ uma figura conhecida até em outras escolas……)"
70004020-16 = "(Ela é quieta e não demonstra emoções, então#n……é difícil imaginar ela dando presente pra alguém……)"
70004020-17 = "(Mas o Comitê de Disciplina de Gehenna tem contato com o Sensei, então é possível!)"
70004020-22 = "Ah, com licença…… a senhora é a Hina, de Gehenna, né?"
70004020-23 = "Sim, o que quer?"
70004020-24 = "Ah, nada! Não é que tenha acontecido algo……!"
70004020-25 = "Bom…… é que……"
70004020-26 = "V-você tem planos pro Natal……?"
70004020-27 = "Natal……?"
70004020-28 = "Sim. Ouvi dizer que a senhora é sempre muito ocupada……#nmas no Natal, talvez…… passe um tempo relaxando……?"
70004020-29 = "Por exemplo, ir a uma festa chique, ou#n……dar um presente pra alguém――"
70004020-30 = "……Bem, não sei."
70004020-31 = "Por que quer saber da minha agenda?"
70004020-32 = "(Ah, ela desconfiou……!)"
70004020-33 = "B-bem……"
70004020-35 = "N-na verdade, eu ainda sou do ensino médio! Daqui a dois anos vou entrar no ensino superior!"
70004020-36 = "Mas tô em dúvida sobre qual escola escolher……#nqueria saber como é o Natal em Gehenna pra ter uma ideia……"
70004020-37 = "Ensino superior……? Em Gehenna……?"
70004020-38 = "Hã? Falei algo errado?"
70004020-39 = "Não, não é errado……"
70004020-40 = "É a primeira vez que vejo uma aluna do ensino médio querendo Gehenna."
70004020-41 = "Você parece uma garota séria……#nquem diria que tem esse lado aventureiro."
70004020-42 = "Hã. A senhora reparou em mim?"
70004020-43 = "Bom…… toda vez que venho à Schale, vejo você."
70004020-44 = "Você tá sempre nessa conveniência, né?"
70004020-45 = "Vi você trabalhando direitinho, sem enrolar, e pensei que era uma garota esforçada."
70004020-46 = "Fiquei surpresa porque você não parece ter a vibe desleixada dos alunos de Gehenna.#nEntão não se preocupe, escolha seu caminho com liberdade."
70004020-47 = "Como presidente do Comitê de Disciplina, digo que……#nter uma aluna esforçada como você como minha kouhai seria muito bom."
70004020-48 = "M-muito obrigada……"
70004020-49 = "Voltando ao assunto…… este Natal,#nvou passar com os membros do Comitê na nossa sala."
70004020-50 = "A Ako―― a administradora do Comitê―― vai preparar alguma coisa."
70004020-51 = "Mas tenho uma montanha de trabalho…… então vou ficar o dia todo na sala."
70004020-52 = "Entendo…… então esse presente é de outra pessoa……"
70004020-53 = "……Presente?"
70004020-54 = "N-não! Nada não!"
70004020-58 = "É mesmo?#n……Bem, vou te dar meu contato. Se precisar de algo, é aqui."
70004020-59 = "E se for orientação de carreira…… posso ajudar também."
70004020-60 = "Obrigada!#nSe a conveniência for atacada, sou a primeira a avisar!"
70004020-61 = "……Tomara que isso nunca aconteça."
70004020-66 = "Bem-vindo à 'Angel 24'!"
70004020-67 = "Hmm…… me vê um dos novos pães de chocolate com hortelã?"
70004020-68 = "E se ainda tiver…… um de cada outro sabor também."
70004020-69 = "Certo, só um momento."
70004020-75 = "(Essa garota é da Trinity, né……)"
70004020-76 = "(……Ela tem uma cara meio brava, mas#n……é cliente que adora doces fofinhos.)"
70004020-77 = "(Ela sempre compra doces pra levar pros outros…… ah.#n……será que ela também comprou um presente pro Sensei?)"
70004020-82 = "Ah, com licença! Já fez a reserva do bolo de Natal?"
70004020-83 = "……Bolo?"
70004020-84 = "Ah, tem alguma promoção de bolo?"
70004020-85 = "N-não! É uma pergunta pessoal……"
70004020-86 = "Que tipo de bolo vocês de Trinity comem no Natal?"
70004020-87 = "Hã……?"
70004020-88 = "……?"
70004020-89 = "Eu disse que sou de Trinity?"
70004020-90 = "……? Não, a senhora não disse……"
70004020-91 = "Então quer dizer que eu pareço uma aluna de Trinity, né.#nEhehe……"
70004020-92 = "(E-ela tá feliz? Sendo que tô vendo o uniforme de Trinity……)"
70004020-93 = "Aliás, vi um boato no SNS outro dia: 'alunos de Trinity só comem sobremesas caras'…… ah, é por isso?"
70004020-94 = "Mas as moças de Trinity também gostam de doces normais.#nNem todas são assim……"
70004020-95 = "O senso de 'gostoso' é o mesmo pra todo mundo.#nEste ano também encomendei um bolo de natal numa loja de D.U.……"
70004020-96 = "Ah, mas era edição limitada, então não posso dizer que é comum.#nDesculpa, não serve de referência."
70004020-97 = "N-não! Obrigada por me explicar!"
70004020-98 = "E-então…… com quem você vai comer esse bolo?"
70004020-100 = "Com o pessoal do clube, ou colegas…… ou com o 'Sensei'――"
70004020-101 = "N-não é possível, né!?"
70004020-102 = "D-desculpa!"
70004020-103 = "……Ah."
70004020-104 = "De novo, fiz isso……"
70004020-105 = "Desculpa…… quando me assusto, acabo gritando."
70004020-106 = "Você não tem culpa.#nÉ um hábito que peguei com aquele pessoal……#n……foi mal, se puder relevar……"
70004020-107 = "T-tudo bem. Não se preocupe……!"
70004020-108 = "……Obrigado. Você é mais madura do que parece."
70004020-109 = "Respondendo sua pergunta, vou comer com o pessoal do clube.#n……Bom, não é como se eu nunca comesse doces com o Sensei……"
70004020-110 = "Este Natal vou ajudar a Irmandade."
70004020-111 = "Disseram que depois da missa de Natal, vão distribuir panetone caseiro.#nNada especial…… mas fiquei curiosa."
70004020-112 = "Entendo…… então o presente é de outra……"
70004020-113 = "……?"
70004020-117 = "……Sora, né? O que você vai fazer no Natal?"
70004020-118 = "Eu vou trabalhar."
70004020-119 = "Hã, no Natal? Trabalhar?"
70004020-120 = "Ahaha…… tem uma coisa que quero comprar……"
70004020-121 = "Entendo…… que duro……"
70004020-122 = "……Então, toma isso."
70004020-123 = "I-isto é……?"
70004020-124 = "Macarons limitados de Trinity.#nComprei um pouco demais, então fique à vontade."
70004020-125 = "É, quando se trabalha, dá vontade de comer doce, né?"
70004020-126 = "Ah, muito obrigada……!"
70004020-127 = "Não liga. É também um pedido de desculpas por ter te assustado antes."
70004020-128 = "Tchau, Sora."
70004020-132 = "Ei, vocês vendem power bank!?"
70004020-133 = "S-sim! Na prateleira de baixo, no canto direito!"
70004020-134 = "Obrigada! Ufa…… finalmente posso carregar……!#nTinha uma mensagem importante, então me salvou!"
70004020-135 = "Mas eu calculei que daria até voltar…… será que foi o que? "
70004020-141 = "(Yuuka, que cuida das finanças de Millennium……)"
70004020-142 = "(Ela vive com o Sensei na época do balanço, né……)"
70004020-143 = "(Vivo vendo ela brigando com o Sensei……#n……mas talvez ela tenha preparado um presente escondido?)"
70004020-148 = "Ah, com licença……"
70004020-149 = "O quê? Errei o troco?"
70004020-150 = "N-não. Na verdade, queria fazer uma pergunta pessoal……"
70004020-151 = "Ora, a Sora fazendo pergunta pessoal, isso é raro."
70004020-152 = "Pode falar, se estiver ao meu alcance."
70004020-154 = "Obrigada!#n……Você sabe o que o Sensei vai fazer no Natal?"
70004020-155 = "P-p-p-por que pergunta ISSO pra mim!?"
70004020-157 = "Hã? Porque a senhora parece saber dos registros financeiros e de horas extras do Sensei……"
70004020-158 = "E parece mais próxima dele do que as outras, então#n……achei que vocês compartilhavam a agenda……"
70004020-162 = "M-mil perdões! Eu entendi tudo errado……!?"
70004020-163 = "……Cof cof. É, eu dou conselhos pra ele não gastar dinheiro à toa."
70004020-164 = "Mas isso é só como aluna e professor.#nA menos que seja urgente, evito contato em dias de folga."
70004020-165 = "E o Sensei parece ocupado até nos fins de semana."
70004020-166 = "E-era isso……#nentão você no Natal……"
70004020-167 = "Vou passar com o pessoal do Seminário."
70004020-168 = "Além disso, uma kouhai problemática tá passando por dificuldades."
70004020-169 = "Devo passar o fim de ano cuidando dos membros."
70004020-170 = "Mas você perguntar isso……#n……alguém marcou de ver o Sensei no Natal?"
70004020-171 = "Ah, não! Não é isso……!"
70004020-172 = "Hmm…… bom, não é da minha conta."
70004020-173 = "Enfim, desculpa ter exagerado antes……#n……se precisar de algo, pode perguntar de boa."
70004020-174 = "Muito obrigada……!"
70004020-178 = "A-achei que tinha sido descoberta……#n……é melhor não ser tão direta……"
70004020-179 = "Mas ninguém parece saber do presente."
70004020-180 = "Será que não era pro Sensei……?"
70004020-181 = "Ainda é cedo pra concluir.#nVou investigar até o último!"
70004020-186 = "Bem-vindo à 'Angel 24'!"
70004020-188 = "(Sora continuou procurando o dono do presente……)"
70004020-189 = "(……mas não encontrou nenhuma pista concreta)"