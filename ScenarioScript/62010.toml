[translation]
62010-1 = "Episódio 1; O Clube de Voluntariado Sem Nome"
62010-3 = "Sentimos no ar que alguém precisava de resgate--#nEntão, as Cavaleiras do Socorro chegaram com tudo!"
62010-8 = "Como assim!?"
62010-9 = "[s] \"Significa exatamente o que ela disse... é o resgate em ação, eu acho...\""
62010-10 = "Hã... Eu não tô entendendo nada..."
62010-15 = "Ah, Senpai! Essas pessoas são--"
62010-16 = "[s] \"E-Espera um pouco!\""
62010-18 = "[ns] \"Todo mundo... reunir!\""
62010-28 = "[ns] \"Tá todo mundo aqui...?\""
62010-29 = "S-Sim..."
62010-30 = "Sensei, o que deu em você de repente...?"
62010-31 = "Não precisava me puxar pela mão, era só chamar que eu vinha..."
62010-32 = "E então, o que houve? #nPro Sensei fazer essa cara, deve ser algo bem sério."
62010-33 = "Aconteceu alguma coisa? Se eu torcer por você, vai se sentir melhor?"
62010-34 = "[s] \"...Maia. Você sabe quem são elas?\""
62010-39 = "Bem, hã..."
62010-46 = "São as... Cavaleiras do Socorro, não é?"
62010-47 = "--Da Trinity."
62010-48 = "Olá. Não nos vemos desde a vez do 4º Sanctum."
62010-49 = "Foi uma loucura na época e não conseguimos nos cumprimentar direito... Agradeço pela ajuda de vocês."
62010-50 = "Lembro que tinha uma freira com uma roupa bem chamativa... Mas parece que ela não veio hoje."
62010-52 = "A Sakurako-sama não faz parte das Cavaleiras do Socorro, ela é da Sisterhood--"
62010-57 = "E-Ela tá um pouco ocupada agora! Sim! #nAh, é que... as provas tão chegando!"
62010-59 = "Ah, provas... Vocês também tão nessa, né..."
62010-63 = "...Ué? E vocês não precisam estudar?"
62010-64 = "Bom, isso é--"
62010-69 = "Estender a mão para o resgate é tão importante quanto as provas!"
62010-70 = "Além disso, acredito que todas as Cavaleiras do Socorro conseguem conciliar o resgate com os estudos."
62010-71 = "Acreditar. #nIsso também faz parte do espírito do resgate."
62010-72 = "E, claro, eu mesma continuo mantendo as melhores notas."
62010-73 = "[s] \"Incrível! Não esperava menos de você, Mine.\""
62010-77 = "N-Não é pra tanto..."
62010-78 = "[s1] \"Mas eu tenho um favorzinho pra pedir a vocês aqui...\"\n[s2] \"Queria que escondessem o fato de que são as Cavaleiras do Socorro da Trinity.\""
62010-84 = "Por que isso?"
62010-85 = "Tem mesmo a necessidade de esconder isso...?"
62010-92 = "Capitã, vamos fazer o que o Sensei diz por enquanto."
62010-93 = "Ué? Mas a gente veio pra fazer o 'resgate', não é...?"
62010-94 = "Acredito que precisamos esconder isso para o bem do próprio 'resgate'."
62010-95 = "É... mesmo?"
62010-96 = "Hã, as escrituras falam sobre isso, né. #n'Que a sua mão esquerda não saiba o que faz a direita.'"
62010-97 = "Eu entendo esse ensinamento, mas... #nAs Cavaleiras do Socorro não têm a mesma cultura de segredos da Sisterhood."
62010-98 = "Mas o Sensei deve ter os seus motivos. #nAcho que é melhor obedecermos agora."
62010-102 = "...Se é assim que deve ser, tudo bem. #nFaremos dessa forma."
62010-103 = "[s] \"Fico feliz que tenham entendido. Obrigado também, Serina.\""
62010-107 = "Fico feliz em poder ajudar."
62010-109 = "...Eu compreendi a situação."
62010-110 = "Apesar disso, eu ainda acho que é em momentos como este que devemos espalhar amplamente o espírito do resgate."
62010-111 = "Por isso, confesso que ainda tenho minhas ressalvas sobre isso..."
62010-112 = "[s] \"Desculpa pelo pedido maluco.\""
62010-113 = "Não tem problema. Se é algo necessário."
62010-117 = "Prometo que não usaremos os nomes 'Trinity' ou 'Cavaleiras do Socorro'."
62010-118 = "[s] \"Posso contar com vocês duas pra isso também?\""
62010-128 = "E-Entendido..."
62010-129 = "Ah, nesse caso, tenho uma sugestão pra Capitã..."
62010-130 = "Acho que usar 'Capitã' deixa muito na cara que somos das 'Cavaleiras do Socorro'."
62010-131 = "Então, só enquanto estivermos aqui... que tal chamarmos de 'Senpai'?"
62010-132 = "Isso..."
62010-133 = "...Realmente, você tem razão."
62010-134 = "Sendo assim, peço que façam isso."
62010-135 = "Sim! Capitã Min-- Mine-senpai!"
62010-139 = "Mine... senpai..."
62010-140 = "Mine-senpai..."
62010-144 = "É muita intimidade, não é...? #nS-Será só enquanto estivermos aqui!"
62010-145 = "Não, está tudo bem. Além do mais--"
62010-146 = "Fica mais amigável assim... pode ser uma boa ideia."
62010-151 = "Pelo visto chegaram num acordo."
62010-152 = "Um grupo de voluntários de boa vontade veio visitar a filial da Arius para espalhar o espírito do resgate..."
62010-153 = "É isso que a gente tem que fingir que tá rolando?"
62010-154 = "Sim, sem problemas. #nMas..."
62010-155 = "O Squad também é da Arius... #nTem certeza de que não tem problema ficarmos junto com vocês...?"
62010-156 = "...É. Fica tranquila."
62010-157 = "Apesar de sermos mesmo alunas da filial da Arius..."
62010-158 = "Nós estamos excluídas do sistema no momento."
62010-160 = "...Quisera eu que fôssemos só isso."
62010-161 = "Então... tudo resolvido, né? Que bom!"
62010-162 = "Hehe, Hanae-san... certo? É um prazer."
62010-163 = "O prazer é meu!!"
62010-164 = "..."
62010-165 = "Só de olhar pra você, Hanae-san, sinto que eu acabo recebendo energia também... #nEi, não quer vir pro nosso grupo por um tempinho?"
62010-167 = "Hã? Uééé!?"
62010-168 = "!!!"
62010-169 = "...Mas aí o seu grupo ia ficar triste, não é?"
62010-170 = "É-É um prazer. Serina-san, Mine-san..."
62010-171 = "S-Sensei? Isso também faz parte do resgate...?"
62010-173 = "Hã? Eu vou virar uma aluna da Arius agora?"
62010-174 = "Hehe, é brincadeira. #nA Hanae-chan é tão honesta e animada que eu não resisti..."
62010-176 = "É verdade, a Hanae-chan parece uma 'flor-da-manhã cheia de energia'. #nMas ela é uma presença indispensável nas Cavaleiras do Socorro, então me desculpe."
62010-177 = "Ehehe... Eu sabia que era brincadeira...!"
62010-182 = "Uuu..."
62010-183 = "[s] \"...Tudo bem com você?\""
62010-184 = "E-Elas são pessoas cheias de energia, né..."
62010-185 = "[s] \"Pra quem não tá acostumado, pode ser demais mesmo...\""
62010-189 = "[ns] \"E então, o que vocês pretendem fazer agora?\""
62010-194 = "Uma excelente pergunta."
62010-195 = "Para nossas atividades, primeiro precisamos de uma base."
62010-199 = "As Cava-- quer dizer, o Clube de Voluntariado Sem Nome vai começar montando um posto de resgate!"
62010-204 = "Posto de Resgate Temporário"
62010-206 = "Tá pronto!"
62010-207 = "Bom trabalho, Sensei e Mine-senpai."
62010-208 = "Senpai..."
62010-212 = "Hã? Como eu montei rápido...? #nMas é claro. Já tô acostumada com isso!"
62010-217 = "Bom trabalho, Sensei. E..."
62010-224 = "..."
62010-225 = "A vocês, 'voluntárias'."
62010-229 = "Olá. Você é aquela de antes..."
62010-230 = "Meu nome não importa. #nMudando de assunto, o que vieram fazer na Arius?"
62010-231 = "D-Desculpe... #nNós não entendemos muito... de coisas assim..."
62010-236 = "Hã...?"
62010-237 = "...?"
62010-240 = "(A Mine segurou as duas que estavam prestes a falar)"
62010-243 = "--Então vocês vieram até aqui porque 'sentiram que alguém precisava de resgate'."
62010-244 = "I-Isso é...!"
62010-245 = "..."
62010-246 = "Tem algum problema com isso?"
62010-247 = "Cap-- Senpai...!?"
62010-248 = "Não, não chega a ser um problema. #nSó achei que... vocês são muito corajosas."
62010-249 = "Num lugar onde vocês não sabem dos perigos, nem do que pode acontecer--"
62010-250 = "Estão se intrometendo de forma inconsequente só porque acham que 'parecemos dignas de pena'."
62010-251 = "Se me permite dizer... é, pode até parecer isso. #nMas o motivo é muito mais simples."
62010-255 = "Oi?"
62010-256 = "Nós fazemos tudo puramente em nome do 'resgate'."
62010-257 = "Resgate...?"
62010-258 = "Levar resgate onde há falta dele. #nNão só preencher, mas fazer transbordar--"
62010-259 = "Para salvar o maior número possível de pessoas da tristeza e do sofrimento."
62010-260 = "Esse é o propósito das nossas atividades de resgate... os ideais do nosso voluntariado."
62010-261 = "Não importa se há perigos ou a forma como somos vistas."
62010-263 = "A-Ahaha..."
62010-264 = "Não esperava menos de você, Senpai...!"
62010-269 = "..."
62010-270 = "Entendo, vocês são exatamente como dizem os boatos."
62010-275 = "(Boatos...?)"
62010-279 = "Cavaleiras do Socorro... da Trinity."
62010-280 = "[s] \"!?\""
62010-281 = "O-Oi!? Ah, não, nós somos, hã... bem...!"
62010-282 = "Não precisam forçar uma atuação."
62010-283 = "...Acham mesmo que a gente não ia notar? #nO cheiro da Trinity."
62010-284 = "..."
62010-285 = "Vamos parar de rodeios. #nDiscutir por muito tempo só vai nos deixar cansadas."
62010-286 = "Indo direto ao ponto: se pretendem esconder suas identidades e focar no trabalho voluntário, não pretendo causar problemas."
62010-287 = "Contanto que--"
62010-288 = "Vocês não sejam espiãs do 'Tea Party' ou da 'Sisterhood'... #nClaro."
62010-289 = "...Bem, já ouvi dizer que vocês são uma organização bem peculiar até mesmo dentro da Trinity."
62010-290 = "Você parece saber... bastante coisa."
62010-291 = "Não é nada de outro mundo."
62010-292 = "Se voltar bastante no tempo... nós éramos uma única escola, não é?"
62010-293 = "...!"
62010-294 = "De qualquer forma, deixemos os segredos em paz. #nSendo assim, não vou reclamar de nada."
62010-295 = "Temos um acordo?"
62010-301 = "...Entendido. Aceitamos essas condições."
62010-302 = "Agradeço."
62010-303 = "...Mas mudando de assunto, parece que a Capitã de vocês não veio."
62010-304 = "Bem, como ela lidera um grupo tão grande, não deve dar para aparecer em todas as atividades, imagino."
62010-305 = "!?"
62010-306 = "Hã? Ah, isso é..."
62010-307 = "I-Isso aí! Nossa Capitã é muito ocupada! #nPor isso ela deixou isso aqui nas nossas mãos! Ahahahahaha...!"
62010-308 = "I-Isso mes...mo. #nÉ isso que acon... quer dizer, foi isso que aconteceu."
62010-312 = "Parece que tem algo por trás disso... mas talvez seja melhor assim."
62010-316 = "Ouvi dizer que ela é o tipo de pessoa que, quando acha que está certa, atropela qualquer obstáculo para seguir em frente."
62010-317 = "O fato de que ela poderia estar aqui agora... só de pensar me dá calafrios."
62010-321 = "...Parece que você tem uma leve impressão errada."
62010-322 = "A Capitã... das Cavaleiras do Socorro... é alguém que sacrificaria qualquer coisa para espalhar o espírito do resgate...!"
62010-323 = "Isso não quer dizer que ela... é dura como uma pedra e completamente inflexível?"
62010-324 = "Sugiro que tenha mais cuidado com as palavras. #nFalar de uma vontade inabalável como se fosse apenas um peso--"
62010-325 = "É uma tremenda falta de educação com alguém que não está presente para se defender."
62010-326 = "Ouvi dizer que as Cavaleiras do Socorro confiam muito umas nas outras... #nSim, isso fica bem claro."
62010-327 = "Entendido. Vamos encerrar esse assunto por aqui."
62010-328 = "Se eu ficar mais tempo, só vou atrapalhar o 'voluntariado' de vocês. #nCom licença."
62010-329 = "Ah, se precisarem de ajuda com alguma coisa... #né, fiquem à vontade pra chamar."
62010-335 = "M-Mine-senpai..."
62010-336 = "Mine-senpai..."
62010-338 = "..."
62010-339 = "Serina, Hanae. Eu estou bem. Ainda podemos nos dedicar às atividades de resgate. #nÉ em momentos assim que não podemos esquecer de nossos princípios e focar na missão."
62010-342 = "C-Certo...!"
62010-347 = "Mas... antes disso, só um pouquinho. #nMe perdoem, mas eu poderia tirar um tempinho para descansar...?"
62010-352 = "Claro que sim! Não precisa se preocupar com as coisas por aqui! #n...Hanae-chan, pode me ajudar com uma coisa?"
62010-353 = "Sim! Deixa comigo!"
62010-358 = "..."
62010-359 = "[s] \"Tudo bem...?\""
62010-363 = "Claro que sim. Eu..."
62010-364 = "..."
62010-365 = "Não... esconder as coisas de você, Sensei, não faz o menor sentido."
62010-369 = "...Uma raiva que parece não ter fim. Embora esteja apenas superficialmente contida. #nDiante disso... o que eu posso fazer?"
62010-370 = "[s] \"...Foi isso que você sentiu?\""
62010-371 = "...Sim."
62010-372 = "--Isso também é resgate."
62010-373 = "É assim que eu enxergo as coisas."
62010-374 = "...Absorver o ódio daquelas pessoas também faz parte do processo."
62010-381 = "Porém, enquanto esse sentimento continuar lá, nada vai mudar."
62010-382 = "...Um resgate unilateral acaba perdendo o sentido com o tempo."
62010-383 = "É uma opinião minha, mas... se a pessoa não estiver disposta a ser convencida, não há como persuadi-la."
62010-384 = "Alguém que deseja ser parado, mas mesmo assim segue em frente até o limite. #n...Pessoas assim existem."
62010-388 = "...? #n...Sensei? ...Você está bem? Parece pálido..."
62010-389 = "[s3] \"Ah, sim... é que naquela vez, eu não consegui agir direito...\"\n[s4] \"Eu devia ter cuidado de tudo até o fim.\""
62010-392 = "...Isso não é verdade."
62010-393 = "Você fez o seu melhor, Sensei. Eu garanto isso."
62010-394 = "Mas... agora, eu não sei mais o que eu posso fazer..."
62010-395 = "Antes de ser uma Cavaleira do Socorro, eu sou uma aluna da Trinity. #nE dizer que eu 'consigo entender' a Arius seria--"
62010-396 = "Se eu disser isso, só vou provocar ainda mais a ira de todos da Arius."
62010-397 = "Usar a palavra 'entender', em si, pode ser pura arrogância minha."
62010-402 = "...Mesmo assim, eu quero acreditar. #nQue nós podemos entender umas às outras."
62010-403 = "Se agirmos acreditando nisso... o amanhã com certeza vai ser um dia melhor. #nMesmo que sejam pequenas mudanças, mesmo que seja apenas uma possibilidade minúscula."
62010-404 = "Mesmo assim, eu..."
62010-405 = "[s] \"É a primeira vez que vejo você fazer essa expressão, Mine.\""
62010-406 = "Hehe, é mesmo?"
62010-407 = "Por falar nisso... sinto que você também está diferente do normal, Sensei."
62010-412 = "...Posso lhe fazer uma pergunta?"
62010-413 = "Quando você se desespera com tudo... e mesmo assim algo te mantém de pé. #nO que seria... esse 'algo'?"
62010-414 = "[s] \"...\""
62010-417 = "Sensei, eu..."
62010-418 = "Se, por acaso, alguém..."
62010-422 = "Se ela realmente, verdadeiramente... #nquisesse desistir da própria vida."
62010-423 = "Existiria alguma forma de parar essa pessoa...?"
62010-426 = "[ns] \"Acho que... seria aquilo em que ela acredita.\""
62010-427 = "Aquilo em que ela acredita?"
62010-428 = "Hehe... isso me pegou de surpresa. #nSendo você, Sensei... eu imaginava."
62010-429 = "Que me daria uma resposta um pouco mais 'racional'."
62010-430 = "[s5] \"O que move as pessoas são as emoções e suas crenças, afinal.\"\n[s6] \"A lógica nem sempre explica tudo.\""
62010-435 = "[ns7] \"Seja a fé em uma existência divina.\"\n[ns8] \"...Ou a confiança em algo que existe dentro de si mesma.\""
62010-438 = "...Entendi."
62010-439 = "Emoções... não são correntes que prendem as pessoas, mas sim coisas que podem servir de gatilho para nossas ações."
62010-440 = "É verdade que as emoções influenciam facilmente nosso julgamento. #nVocê acredita nisso porque elas estão atreladas ao nosso subconsciente, certo, Sensei?"
62010-441 = "...Sim. Talvez isso seja mesmo uma 'aula'."
62010-442 = "..."
62010-443 = "[s9] \"E é por isso que, se você conseguir acreditar--\"\n[s10] \"Que o caminho que percorreu até aqui não foi um erro.\""
62010-446 = "...Basta acreditar nesse caminho e seguir em frente, é isso?"
62010-447 = "Mas, se esse caminho é realmente o certo ou não... Ninguém tem como saber, não acha?"
62010-448 = "[s11] \"Isso é algo que você mesma tem que provar.\"\n[s12] \"...Acho que eu também fiz um pouco disso na minha vida.\""
62010-451 = "O que... você provou, Sensei...?"
62010-452 = "[s13] \"Que se eu virar as costas para uma aluna que pede ajuda--\"\n[s14] \"Eu não mereço me chamar de professor.\""
62010-455 = "...!"
62010-456 = "Hehe... você é exatamente esse tipo de pessoa, Sensei."
62010-457 = "Inúmeras alunas já foram salvas por você."
62010-463 = "Muito... obrigada mesmo."
62010-468 = "(A Mine se encostou em mim em silêncio...)"
62010-469 = "Me desculpe... só um pouquinho."
62010-470 = "Não vou tomar muito do seu tempo..."
62010-471 = "...Me deixe ficar assim por um momento."
62010-475 = "(A Mine fechou os olhos e tinha uma expressão tranquila no rosto)"
62010-476 = "(Naquele instante que pareceu durar uma eternidade--)"
62010-482 = "Esse som... #nVocê ouviu isso, Sensei?"
62010-483 = "[s] \"Ouvi. Que som foi esse...?\""
62010-489 = "I-Isso foi... uma trombeta? #nFez um barulhão, né!"
62010-491 = "Será que é algum 'sinal' do pessoal da Arius...?"
62010-492 = "Eu não sei. Mas--"
62010-493 = "Tô com um leve mau pressentimento..."
62010-495 = "Senpai, o que a gente faz...?"
62010-500 = "..."
62010-501 = "Mesmo assim."
62010-505 = "Vamos fazer o que viemos fazer."
62010-507 = "Próximo episódio; O Som da Trombeta"