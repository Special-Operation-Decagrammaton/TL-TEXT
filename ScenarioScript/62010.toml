[translation]
62010-1 = "Episódio 1: O Clube de Serviço Sem Nome"
62010-3 = "Senti um pressentimento de que precisavam de socorro, então...#nO Esquadrão de Primeiros Socorros chegou!"
62010-8 = "O que você quer dizer com isso!?"
62010-9 = "[s] \"É como se diz... ou melhor, é assim que funciona o socorro...\""
62010-10 = "Hum... eu não entendi muito bem..."
62010-15 = "Ah, Senpai! Essas pessoas são..."
62010-16 = "[s] \"E-espera um pouco!\""
62010-18 = "[ns] \"Todas... reunir!\""
62010-28 = "[ns] \"Será que todas já chegaram...?\""
62010-29 = "S-sim..."
62010-30 = "Sensei, o que aconteceu de repente...?"
62010-31 = "Não precisava puxar minha mão, bastava pedir que nós viríamos..."
62010-32 = "Então, o que houve?#nPara o Sensei estar com essa cara, deve ser algo muito sério."
62010-33 = "Aconteceu alguma coisa? Se eu te apoiar, você vai se sentir melhor?"
62010-34 = "[s] \"...Maia. Você sabe quem são elas?\""
62010-39 = "Isso é, bem..."
62010-46 = "São o Esquadrão de Primeiros Socorros... não são?"
62010-47 = "— De Trinity."
62010-48 = "Olá. Faz tempo desde o 4º Sanctum, não é?"
62010-49 = "Naquela época, estávamos tão ocupadas que nem conseguimos nos cumprimentar... agradeço por tudo naquela ocasião."
62010-50 = "Lembro que tinha uma irmã com um visual bem chamativo também... mas ela não veio hoje, né?"
62010-52 = "A Srta. Sakurako não é do Esquadrão de Primeiros Socorros, ela é da Sisterhood..."
62010-57 = "E-ela está um pouco ocupada agora! Sim!#nBem... é época de provas, afinal!"
62010-59 = "Ah, provas... então vocês também estão nessa..."
62010-63 = "...Ué? Vocês não deveriam estar estudando?"
62010-64 = "Bem, é que..."
62010-69 = "Prestar socorro é tão importante quanto as provas!"
62010-70 = "Além disso, acredito que o Esquadrão de Primeiros Socorros consegue conciliar o socorro com os estudos."
62010-71 = "Ter fé.#nIsso também pode ser chamado de espírito de socorro."
62010-72 = "Claro que eu mesma mantenho o topo constantemente."
62010-73 = "[s] \"Incrível! Como esperado da Mine.\""
62010-77 = "N-não é para tanto..."
62010-78 = "[s1] \"Mas, eu tenho um pedido para todas vocês aqui...\"\n[s2] \"Queria que vocês escondessem o fato de serem do Esquadrão de Primeiros Socorros de Trinity.\""
62010-84 = "Por que?"
62010-85 = "Será que é realmente necessário esconder isso...?"
62010-92 = "Capitã, vamos fazer como o Sensei pediu por enquanto."
62010-93 = "Hã? Mas nós viemos para \"prestar socorro\", não foi...?"
62010-94 = "Acho que é justamente para \"prestar socorro\" que precisamos esconder."
62010-95 = "É... mesmo?"
62010-96 = "Bem, não está escrito nas escrituras?#n\"Que a sua mão esquerda não saiba o que a direita faz.\""
62010-97 = "Entendo esse ensinamento, mas...#nO Esquadrão de Primeiros Socorros não é uma organização secreta como a Sisterhood."
62010-98 = "Mas o Sensei deve ter seus motivos.#nSinto que é melhor seguirmos o que ele diz agora."
62010-102 = "...Se você insiste tanto, entendi.#nFaremos dessa forma."
62010-103 = "[s] \"Fico feliz que tenha entendido. Serina, obrigado também.\""
62010-107 = "Fico feliz em poder ajudar."
62010-109 = "...Eu entendi."
62010-110 = "Ainda assim, acho que é justamente em momentos como este que deveríamos espalhar o espírito de socorro."
62010-111 = "Por isso, embora ainda existam muitas coisas que não me convencem..."
62010-112 = "[s] \"Desculpe por fazer um pedido tão absurdo.\""
62010-113 = "Não tem problema. Se isso for necessário."
62010-117 = "Farei o possível para não usar os nomes Trinity ou Esquadrão de Socorro."
62010-118 = "[s] \"Pessoal, vocês podem fazer o mesmo?\""
62010-128 = "E-entendido..."
62010-129 = "Ah, se for esse o caso, eu tenho uma sugestão para a líder..."
62010-130 = "Acho que chamar de \"Líder\" acaba dando um ar de \"Esquadrão de Socorro\"."
62010-131 = "Então, apenas aqui, que tal chamarmos de \"Senpai\"?"
62010-132 = "Isso é..."
62010-133 = "...De fato, você tem razão."
62010-134 = "Então, por favor, façam dessa forma."
62010-135 = "Sim! Líder Mine... quer dizer, Mine-senpai!"
62010-139 = "Mine... senpai..."
62010-140 = "Mine-senpai..."
62010-144 = "Será que fui íntima demais...?#nÉ só aqui, eu prometo!"
62010-145 = "Não, está tudo bem. Além disso..."
62010-146 = "Dessa forma parece mais amigável... talvez seja melhor assim."
62010-151 = "Parece que chegamos a um consenso."
62010-152 = "Um grupo de voluntários benevolentes visitou a filial de Arius para espalhar o espírito de socorro..."
62010-153 = "Essa é a versão correta, certo?"
62010-154 = "Sim, sem problemas.#nMas..."
62010-155 = "Vocês do esquadrão também são de Arius...#nNós estarmos juntos com vocês, será que... está tudo bem?"
62010-156 = "...Sim. Não se preocupe, está tudo bem."
62010-157 = "Além disso, embora sejamos alunas da filial de Arius..."
62010-158 = "Nós somos párias agora."
62010-160 = "...Seria bom se fosse apenas isso."
62010-161 = "Então... isso significa que está tudo resolvido? Que bom!"
62010-162 = "Fufu, Hanae-san... era esse o nome? Prazer em conhecê-la."
62010-163 = "Sim!!"
62010-164 = "..."
62010-165 = "Não sei por que, mas ver a Hanae-san me dá energia...#nEi, por que não vem morar com a gente por um tempo?"
62010-167 = "Hã? O quê!?"
62010-168 = "!!!"
62010-169 = "...Se você fizer isso, o pessoal de lá vai ficar solitário, não é?"
62010-170 = "P-por favor, cuidem de mim. Serina-san, Mine-san..."
62010-171 = "P-sensei? Isso também faz parte do socorro...?"
62010-173 = "Hã? Eu vou me tornar uma aluna de Arius agora?"
62010-174 = "Fufu, é brincadeira.#nHanae-chan é tão direta e alegre que eu não pude evitar..."
62010-176 = "Realmente, a Hanae-chan parece uma \"flor radiante cheia de energia\".#nMas ela é um membro indispensável do Esquadrão de Socorro, então sinto muito."
62010-177 = "Ehehe... eu sabia que era brincadeira...!"
62010-182 = "Uuu..."
62010-183 = "[s] \"...Você está bem?\""
62010-184 = "E-eles são pessoas bem energéticas, não são..."
62010-185 = "[s] \"É difícil se você não estiver acostumado...\""
62010-189 = "[ns] \"Então, o que pretendem fazer agora?\""
62010-194 = "Boa pergunta."
62010-195 = "Para nossas atividades, primeiro precisamos de uma base."
62010-199 = "O Esquadrão de Socorro... não, o Grupo de Atividades de Serviço Sem Nome, vai começar montando um posto de socorro!"
62010-204 = "Posto de Socorro Temporário"
62010-206 = "Concluído!"
62010-207 = "Sensei e Mine-senpai, bom trabalho."
62010-208 = "Senpai..."
62010-212 = "Hã? Eu fui eficiente...?#nClaro que sim. Estou acostumada!"
62010-217 = "Bom trabalho, Sensei. E também..."
62010-224 = "..."
62010-225 = "Vocês, os \"voluntários\"."
62010-229 = "Olá. Você é aquela pessoa de agora há pouco..."
62010-230 = "Não sou ninguém importante o suficiente para me apresentar.#nMais importante, o que vocês estão fazendo aqui em Arius?"
62010-231 = "D-desculpe...#nNós, bem, não sabemos muito bem sobre essas coisas..."
62010-236 = "Hã...?"
62010-237 = "...?"
62010-240 = "(Conseguiu parar as duas que estavam prestes a dizer algo)"
62010-243 = "—Em suma, vocês vieram até aqui guiadas por um \"pressentimento de que precisavam prestar socorro\"."
62010-244 = "I-isso é...!"
62010-245 = "..."
62010-246 = "Houve algum problema com isso?"
62010-247 = "Líder— Senpai...!?"
62010-248 = "Não, não diria que é um problema.#nÉ só que... acho vocês muito corajosas."
62010-249 = "Entrar em um lugar sem saber quais perigos existem ou o que pode acontecer—"
62010-250 = "Apenas por acharem que \"parece algo triste\", agindo de forma tão imprudente."
62010-251 = "Não sei o que esperava que eu dissesse... mas sim, pode parecer assim.#nNo entanto, a situação é bem mais simples."
62010-255 = "Sim?"
62010-256 = "Porque todas as nossas ações são realizadas em prol do \"socorro\"."
62010-257 = "Socorro...?"
62010-258 = "Socorro onde ele é escasso.#nNão apenas o suficiente, mas transbordando—"
62010-259 = "Salvar o maior número possível de pessoas da tristeza e do sofrimento."
62010-260 = "Isso é o que define o trabalho de socorro — o ideal do nosso voluntariado."
62010-261 = "Se é perigoso ou como somos vistas, isso não importa."
62010-263 = "Ah, ahaha..."
62010-264 = "Como esperado da Senpai...!"
62010-269 = "..."
62010-270 = "Entendo, vocês são exatamente como dizem os rumores."
62010-275 = "(Rumores...?)"
62010-279 = "Vocês são da... Brigada de Socorro de Trinity."
62010-280 = "[s] \"!?\""
62010-281 = "S-sim!? Ah, não, nós somos, bem, aquilo..."
62010-282 = "Não precisam se esforçar para disfarçar."
62010-283 = "...Vocês acham mesmo que não notaríamos?#nA presença de Trinity."
62010-284 = "..."
62010-285 = "Vamos parar com rodeios. Discutir por muito tempo só vai nos deixar cansadas."
62010-286 = "Concluindo: se vocês pretendem manter suas identidades ocultas e se dedicar ao voluntariado, não pretendo criar problemas."
62010-287 = "No entanto—"
62010-288 = "Isso se vocês não forem espiãs do \"Tea Party\" ou da \"Sisterhood\"...#nclaro."
62010-289 = "...Bem, ouvi dizer que vocês são uma organização peculiar dentro de Trinity."
62010-290 = "Vocês... sabem muito bem, não é?"
62010-291 = "Não acho que seja algo estranho."
62010-292 = "Se formos olhar a origem... nós éramos uma única escola, não éramos?"
62010-293 = "...!"
62010-294 = "De qualquer forma, segredos devem permanecer segredos.#nSe for assim, não direi nada."
62010-295 = "Podemos fazer esse acordo?"
62010-301 = "...Entendido. Sob essas condições."
62010-302 = "Agradeço."
62010-303 = "……Dito isso, parece que a sua comandante não veio, não é?"
62010-304 = "Bem, sendo responsável por uma organização tão grande, imagino que ela não consiga comparecer a todas as atividades."
62010-305 = "！？"
62010-306 = "Ah? Bem, isso é……."
62010-307 = "I-isso mesmo! A comandante está muito ocupada! #nPor isso ela nos confiou esta tarefa! Ahahaha……!"
62010-308 = "I-isso mesmo. #nSim, é isso…… não, quer dizer, é exatamente isso."
62010-312 = "Parece haver algum motivo por trás disso, mas…… talvez tenha sido melhor assim."
62010-316 = "Ouvi dizer que ela é o tipo de pessoa que, quando acredita estar certa, segue em frente mesmo que tenha que atropelar qualquer obstáculo."
62010-317 = "Só de pensar que ela poderia estar presente aqui…… já é assustador."
62010-321 = "……Parece que há um pequeno mal-entendido."
62010-322 = "A comandante da Sociedade de Socorro é alguém capaz de sacrificar todo o resto se for para espalhar o espírito de auxílio……!"
62010-323 = "Isso não significa que ela é teimosa como uma pedra e inflexível?"
62010-324 = "Recomendo que escolha suas palavras com cuidado. #nChamar uma vontade inabalável de um simples peso é――"
62010-325 = "Um ato de falta de respeito com alguém que não está presente."
62010-326 = "Dizem que vocês da Sociedade de Socorro confiam muito umas nas outras, e…… #nsim, isso fica bem claro."
62010-327 = "Entendido. Vamos encerrar este assunto por aqui."
62010-328 = "Se eu ficar mais tempo, acabarei atrapalhando o seu \"trabalho voluntário\". #nJá vou indo."
62010-329 = "Ah, e se precisarem de ajuda com algo…… #nbem, sintam-se à vontade para me chamar."
62010-335 = "Mi-Mine-senpai……."
62010-336 = "Mine-senpai……."
62010-338 = "……."
62010-339 = "Serina, Hanae. Eu estou bem. Afinal, posso me dedicar às atividades de socorro. #nÉ justamente em momentos assim que devemos nos manter fiéis ao nosso propósito inicial e focar no trabalho."
62010-342 = "S-sim……!"
62010-347 = "Mas…… antes disso, só um pouco. #nPeço desculpas, mas poderiam me dar um momento para descansar……?"
62010-352 = "Claro! Não se preocupe com as coisas por aqui! #n……Hanae-chan, pode me ajudar um pouco?"
62010-353 = "Sim! Pode deixar comigo!"
62010-358 = "……."
62010-359 = "[s] \"Você está bem……?\""
62010-363 = "Claro que estou. Eu……."
62010-364 = "……."
62010-365 = "Não…… esconder algo de você, Sensei, certamente não faz sentido."
62010-369 = "……Não vejo um fim. Mas há uma raiva que mal consegue ser contida. #nDiante disso…… o que será que eu posso fazer?"
62010-370 = "[s] \"……Foi assim que você se sentiu?\""
62010-371 = "……Sim."
62010-372 = "――Isso também é uma forma de socorro."
62010-373 = "É assim que eu penso."
62010-374 = "……Aceitar o ódio daquelas pessoas também faz parte disso."
62010-381 = "Mas, enquanto esse sentimento persistir, nada mudará."
62010-382 = "……Um socorro unilateral acaba perdendo o sentido com o tempo."
62010-383 = "Isso é uma teoria minha, mas…… não se pode convencer alguém que não esteja preparado para ser convencido."
62010-384 = "Existem pessoas que desejam que alguém as pare, mas que continuam avançando até o limite. #n……Existem pessoas assim também."
62010-388 = "……? #n……Sensei? ……Você está bem? O seu rosto está……."
62010-389 = "[s3] \"Ah, sim…… Naquela época, eu não consegui fazer o meu melhor…….\"\n[s4] \"Eu deveria ter prestado atenção até o fim.\""
62010-392 = "……Não é verdade."
62010-393 = "Você fez o seu melhor, Sensei. Eu garanto isso."
62010-394 = "Mas…… agora, eu não sei mais o que posso fazer……."
62010-395 = "Antes de ser da Sociedade de Socorro, eu sou uma aluna de Trinity. #nDizer que posso \"entender\" Arius é algo que eu dificilmente……"
62010-396 = "Se eu disser isso, só atrairei a raiva do pessoal de Arius."
62010-397 = "Talvez usar a palavra \"entender\" já seja um ato de arrogância."
62010-402 = "……Mesmo assim, eu quero acreditar. #nQue nós podemos, sim, nos entender mutuamente."
62010-403 = "Se agirmos acreditando nisso... amanhã, com certeza, será um dia melhor do que hoje. #nMesmo que seja uma mudança gradual e uma possibilidade ínfima."
62010-404 = "Ainda assim, eu..."
62010-405 = "[s] \"É a primeira vez que vejo a Mine com essa expressão.\""
62010-406 = "Fufu, é mesmo?"
62010-407 = "Já que mencionou isso... sinto que o Sensei também está um pouco diferente do habitual."
62010-412 = "……Posso lhe perguntar uma coisa?"
62010-413 = "Quando se está totalmente desesperado... o que é que nos sustenta? #nO que seria... isso?"
62010-414 = "[s] \"…….\""
62010-417 = "Sensei, hum..."
62010-418 = "Se, por acaso, alguém..."
62010-422 = "Realmente, realmente, realmente... #ndesejasse desistir da própria vida."
62010-423 = "Existe alguma forma de impedir essa pessoa...?"
62010-426 = "[ns] \"Aquilo em que essa pessoa acredita... talvez.\""
62010-427 = "Aquilo em que acredita, você diz?"
62010-428 = "Fufu... foi um pouco inesperado. #nSe fosse o Sensei... bem."
62010-429 = "Eu pensei que você citaria algo mais \"racional\"."
62010-430 = "[s5] \"O que move as pessoas são as emoções e as convicções.\"\n[s6] \"Nem tudo pode ser resolvido apenas com a lógica.\""
62010-435 = "[ns7] \"Seja a fé em uma existência grandiosa.\"\n[ns8] \"...Ou a confiança em algo que reside dentro de si mesmo.\""
62010-438 = "……Entendo."
62010-439 = "As emoções não são correntes que prendem as pessoas, mas sim algo que pode se tornar o gatilho para a ação, é isso?"
62010-440 = "De fato, as emoções influenciam facilmente o julgamento. #nVocê acredita que isso acontece porque elas estão ligadas ao nosso subconsciente, não é, Sensei?"
62010-441 = "……É verdade. Talvez isso seja uma \"lição\"."
62010-442 = "……."
62010-443 = "[s9] \"É por isso que, se pudermos pensar que o caminho percorrido até aqui--\"\n[s10] \"Não foi um erro.\""
62010-446 = "……Quer dizer que devo acreditar nesse caminho e seguir em frente?"
62010-447 = "Mas, se esse caminho é realmente o correto... ninguém pode saber, não é?"
62010-448 = "[s11] \"Isso é algo que só podemos provar por nós mesmos.\"\n[s12] \"...Eu também, de certa forma, tenho tentado fazer isso.\""
62010-451 = "O que o Sensei... provou...?"
62010-452 = "[s13] \"Se eu virar as costas para o pedido de socorro de um aluno--\"\n[s14] \"Não tenho o direito de me chamar de sensei.\""
62010-455 = "……!"
62010-456 = "Fufu... o Sensei sempre foi assim."
62010-457 = "Muitos alunos foram salvos por um Sensei como você."
62010-463 = "Muito... obrigada."
62010-468 = "(Mine encostou-se silenciosamente em mim...)"
62010-469 = "Desculpe... só um pouco."
62010-470 = "Não tomarei muito do seu tempo..."
62010-471 = "……Por favor, deixe-me ficar assim por um tempo."
62010-475 = "(Mine, com os olhos fechados, tinha uma expressão serena)"
62010-476 = "(Naquele momento, senti como se o tempo tivesse parado--)"
62010-482 = "Que som foi esse...? #nVocê também ouviu, Sensei?"
62010-483 = "[s] \"Sim. Que som seria esse...?\""
62010-489 = "E-esse som, seria uma trombeta...? #nQue som impressionante!"
62010-491 = "Seria algum tipo de \"sinal\" do lado de Arius?"
62010-492 = "Não sei. Mas--"
62010-493 = "Tenho um pressentimento um pouco ruim..."
62010-495 = "Senpai, o que faremos...?"
62010-500 = "……."
62010-501 = "Ainda assim."
62010-505 = "Vamos fazer o que precisa ser feito."
62010-507 = "Próximo episódio: O som da trombeta"
