[translation]
1000309-1 = "Sessão de autógrafos surpresa"
1000309-2 = "Em frente à Arena Pública de Kivotos"
1000309-3 = "Com isso, compramos todos os suprimentos necessários, hum..."
1000309-5 = "Ué? Tem uma quantidade enorme de pessoas reunidas. Será que está acontecendo algum evento?"
1000309-6 = "Ah! Incrível, Sensei! Olhe ali! É o Peroro-sama!"
1000309-7 = "Até o Wave Cat e o Pinky Paca estão lá...! Parece que eles estão fazendo um show!"
1000309-8 = "Quem diria que teria um show dos Momo Friends em um lugar desses..."
1000309-9 = "Se, Sensei! Já que viemos até aqui, podemos assistir um pouquinho antes de ir embora?"
1000309-10 = "[s] \"Tudo bem.\""
1000309-11 = "Muito obrigada, Sensei!"
1000309-12 = "Ah, olhe ali, Sensei! #nO Angry Adélie, que foi sofrer lavagem cerebral pelos vilões, está tentando atacar o Peroro-sama!"
1000309-13 = "Peroro-sama, cuidado!"
1000309-15 = "Ufa... que desenrolar maravilhoso!"
1000309-16 = "A parte em que o Peroro-sama derrota o vilão lambendo ele... eu fiquei até com as mãos suadas!"
1000309-17 = "Poder ver o Peroro-sama tão de perto... hoje eu tive muita sorte!"
1000309-20 = "Ué...? Será que ainda tem mais alguma coisa acontecendo?"
1000309-21 = "A partir de agora, quem quiser apertar a mão do Peroro, por favor, forme uma fila à frente!"
1000309-22 = "Apertar a mão do Peroro-sama...!"
1000309-23 = "Se eu pudesse tocar naquelas asas fofinhas... com certeza seria maravilhoso..."
1000309-24 = "[s] \"Por que você não vai?\""
1000309-25 = "Ahaha... eu adoraria, mas não me sinto muito à vontade para ir..."
1000309-26 = "As pessoas na fila são quase todas crianças, e se alguém da minha idade entrar, sinto que acabaria estragando o clima..."
1000309-27 = "Já estou satisfeita por ter conseguido ver o show bem de perto hoje."
1000309-28 = "[s] \"Se você gosta de verdade, a idade não importa, não é?\""
1000309-29 = "Se eu gosto de verdade...!"
1000309-30 = "É, verdade... talvez tenha faltado um pouco de amor da minha parte pelo Peroro-sama..."
1000309-32 = "Sensei, vamos logo para a fila!"
1000309-33 = "[s] \"Eu também?\""
1000309-34 = "Claro! Não é sempre que temos a chance de apertar a mão do Peroro-sama!"
1000309-35 = "Com certeza deve ser fofinho e ter um cheiro muito bom!"
1000309-37 = "Então, entrei na fila com a Hifumi e apertei a mão do Peroro."
1000309-38 = "...Das asas do Peroro, vinha um cheiro peculiar de frango assado..."
