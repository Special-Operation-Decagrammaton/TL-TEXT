[translation]
1000309-1 = "ゲリラ握手会"
1000309-2 = "キヴォトス・公共アリーナ前"
1000309-3 = "これで必要な備品はすべて購入できました、えーっと……。"
1000309-5 = "あれ？すごい数の人が集まってますね。何か催し物でもあるんでしょうか？"
1000309-6 = "あ！すごいです、先生！あそこを見てください！ペロロ様です！"
1000309-7 = "ウェーブキャットさんとピンキーパカさんまで……！ショーをしているみたいです！"
1000309-8 = "こんなところでモモフレンズのショーをやっていたなんて……。"
1000309-9 = "せ、先生！せっかくここまで来たので、帰る前にちょっとだけ見て行ってもいいでしょうか？"
1000309-10 = "[s] \"いいよ。\""
1000309-11 = "ありがとうございます、先生！"
1000309-12 = "あっ、あそこを見てください。先生！#n悪党に洗脳されてしまったアングリーアデリーさんが、ペロロ様を襲おうとしてます！"
1000309-13 = "ペロロ様、気をつけてください！"
1000309-15 = "ふう……素晴らしい展開でした！"
1000309-16 = "ペロロ様が悪党をペロペロと舐めて倒すところなんて、思わず手に汗を握ってしまいました！"
1000309-17 = "あんなに近くでペロロ様が見られるなんて……今日は運がよかったです！"
1000309-20 = "あれ……？まだ何か催し物が残ってるんでしょうか？"
1000309-21 = "この後、ペロロと握手したい方は前方にお並びください！"
1000309-22 = "ペロロ様との握手……！"
1000309-23 = "あのふかふかな翼に触れたら……きっと気持ちいいですよね……。"
1000309-24 = "[s] \"行って来たら？\""
1000309-25 = "あはは……そうしたい気持ちは山々なのですが、私が行くのはちょっと気が進まないと言いますか……。"
1000309-26 = "並んでる人たちもほとんど子供たちばかりですし、私みたいな歳で入ってしまうと、なんだか雰囲気を壊してしまいそうで……。"
1000309-27 = "今日はショーが目の前で見られただけで、満足です。"
1000309-28 = "[s] \"本当に好きなら、年齢なんて関係ないんじゃない？\""
1000309-29 = "本当に、好きなら……！"
1000309-30 = "た、確かに……ペロロ様に対する愛情が足りなかったかもしれません……。"
1000309-32 = "先生、早く並びに行きましょう！"
1000309-33 = "[s] \"私も？\""
1000309-34 = "もちろんです！ペロロ様と握手できる機会なんてめったにありませんから！"
1000309-35 = "きっとふかふかでいい香りがするに違いありません！"
1000309-37 = "それからヒフミと一緒に並んで、ペロロと握手をした。"
1000309-38 = "……ペロロの翼からは、どこか香ばしいチキンの香りがした……。"
