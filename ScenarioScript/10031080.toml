[translation]
10031080-1 = "Epílogo; Início da festa"
10031080-2 = "（Com todos os problemas resolvidos, decidiu-se recomeçar a festa do zero）"
10031080-6 = "Bem, eu já vou. Professor, Ako."
10031080-7 = "Sim! Po, por favor, dê o seu melhor! Presidente!"
10031080-13 = "[ns] \"Vá com cuidado, Hina.\""
10031080-18 = "Grr! So, Hina Sorasaki...! Maldita presidente do Comitê Disciplinar...!"
10031080-19 = "Como ousa frustrar todos os meus planos...!"
10031080-20 = "A Hina-senpai foi incrível!"
10031080-21 = "I, Ibuki!?"
10031080-27 = "Senpai, vamos admitir logo. #nDesta vez, mais uma vez, o Pandemonium... não, a Makoto-senpai perdeu."
10031080-33 = "Ahaha! Iroha-chan! Não foi direta demais?"
10031080-34 = "Bem, é a Makoto-chan de sempre."
10031080-36 = "Não! Ainda não! Ainda não acabou...!"
10031080-37 = "Nos últimos dias, com tanta correria, não tem como ela ter praticado direito!"
10031080-38 = "Ela praticamente veio aqui para passar vergonha!"
10031080-39 = "Makoto-senpai, essas palavras não são um presságio..."
10031080-41 = "…………."
10031080-43 = "（Eu pratiquei com todo o meu esforço...）"
10031080-44 = "（Para corresponder às suas expectativas, e de mais ninguém）"
10031080-45 = "（Por isso, pensando em você...）"
10031080-48 = "……Só vou dar o meu melhor com o que posso fazer agora."
10031080-60 = "#video;11003"
10031080-74 = "[ns] \"……Incrível.\""
10031080-78 = "……Guaaa! O, o que é isso!?"
10031080-79 = "A, apresentar uma performance como esta...! #nEla não disse que não sabia tocar...!?"
10031080-80 = "Não, não pode ser... #nAquela informação foi forjada desde o início para nos enganar...?"
10031080-81 = "M, maldito Comitê Disciplinar...! #nAté quando vocês vão ficar atrapalhando a mim...!"
10031080-82 = "[s] \"Foi a Makoto quem preparou este palco, não foi...\""
10031080-83 = "Sim, isso também foi algo que a própria Makoto-senpai causou."
10031080-84 = "……Hah! Guaaa!! Ma, mas que droga...!!"
10031080-91 = "……Ufa."
10031080-96 = "Presidente! Foi uma performance maravilhosa!"
10031080-102 = "Desde quando você aprendeu a tocar tão bem!?"
10031080-103 = "Um som tão adorável... foi lindo."
10031080-108 = "Ah, sim. Pessoal... obrigada."
10031080-109 = "Fico feliz que tenha dado tempo..."
10031080-110 = "[s] \"Bom trabalho. A performance da Hina... tocou fundo no meu coração.\""
10031080-111 = "Pro, professor..."
10031080-112 = "……Sim. #nSe você diz isso... valeu a pena todo o esforço."
10031080-113 = "Obrigada, professor."
10031080-114 = "[s1] \"Bom trabalho mesmo. Tanto pela resolução do incidente quanto pela preparação da performance...\"\n[s2] \"Não se esforce demais, eu fico preocupado, sabe?\""
10031080-117 = "Hm?"
10031080-118 = "Não, eu não me esforcei tanto quanto o professor pensa."
10031080-119 = "[s] \"Acho que foi bem difícil, na verdade...\""
10031080-120 = "Ah, você fala da série de problemas que a presidente Makoto planejou."
10031080-121 = "Bem, seria mentira dizer que não foi difícil..."
10031080-122 = "Mas o Pandemonium causar problemas é algo de sempre. #nNão sinto que desta vez tenha sido especialmente difícil."
10031080-123 = "Sim. O descontrole da presidente Makoto é algo comum. #nJá nos acostumamos."
10031080-124 = "[s] \"……Com que frequência esse tipo de problema acontece?\""
10031080-125 = "Eu não contei, mas geralmente..."
10031080-126 = "Umas 4 vezes por ano...?"
10031080-129 = "Em Gehenna, isso é praticamente o dia a dia."
10031080-130 = "Se a Presidente ficar parada, eu é que começo a me preocupar."
10031080-131 = "[s] \"Isso é... o cotidiano de Gehenna...!\""
10031080-133 = "Bem, deixando isso de lado, a festa acabou de começar, não é?"
10031080-134 = "Sensei... se não se importar, poderia me acompanhar?"
10031080-135 = "[s] \"Se eu for o suficiente, será um prazer.\""
10031080-136 = "Fufu, então..."
10031080-142 = "— Conto com você, Sensei."
10031080-144 = "(Assim, com a confusão chegando ao fim, o tempo de uma festa divertida começou)"
10031080-145 = "A serenata delas que floresce ao sol"
