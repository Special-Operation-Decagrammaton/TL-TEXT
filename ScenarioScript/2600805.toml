[translation]
2600805-1 = "Eu sou muito gananciosa!"
2600805-2 = "（Cheguei ao local de encontro com a Shizuko, sentindo-me metade animado e metade ansioso）"
2600805-3 = "Seja bem-vindo!"
2600805-4 = "Bem-vindo à filial da Hyakkiyako, a casa de praia!"
2600805-5 = "[s] \"Shizuko, desculpe a demora.\""
2600805-6 = "De jeito nenhum!"
2600805-7 = "Já que você se deu ao trabalho de vir até aqui, eu mesma vou atendê-lo pessoalmente!"
2600805-8 = "Para começar, que tal um serviço de 'garota desastrada'?"
2600805-9 = "[s1] \"O-o que eu deveria fazer...\"\n[s2] \"Serviço de garota desastrada, isso me traz lembranças...\""
2600805-13 = "（Depois disso, recebi um atendimento grandioso da Shizuko）"
2600805-34 = "（Quando me dei conta, já era fim de tarde...）"
2600805-36 = "Como foi, Sensei?"
2600805-37 = "Ah, talvez fosse melhor chamá-lo de mestre agora?"
2600805-38 = "Sensei está bom...? Entendido, compreendido."
2600805-39 = "Mas enfim, qual foi a sua impressão...!"
2600805-40 = "[s] \"Senti que isso é a cara da Hyakkiyako, foi muito bom.\""
2600805-41 = "S-sério?!"
2600805-42 = "Fico muito feliz em ouvir isso!"
2600805-43 = "[s] \"Resolveu suas preocupações?\""
2600805-44 = "……"
2600805-45 = "Bem, como posso dizer..."
2600805-46 = "……Tudo graças a você, Sensei."
2600805-47 = "Graças a você, lembrei-me de coisas que tinha esquecido."
2600805-48 = "E também do que eu deveria estar fazendo."
2600805-49 = "[s] \"Não fiz nada demais.\""
2600805-50 = "Fufu. Eu meio que já esperava que você dissesse isso."
2600805-51 = "Se você não fosse esse tipo de Sensei..."
2600805-52 = "Talvez eu ainda estivesse perdida até agora."
2600805-53 = "Pronto, chega de conversas embaraçosas!"
2600805-54 = "A partir de amanhã, voltarei a ser a Shizuko Kawawa de sempre!"
2600805-55 = "Vamos lá, vida que segue!"
2600805-56 = "[s] \"E-espera, Shizuko?\""
2600805-64 = "[wa:750]— Sensei. [wa:1450]Eu, [wa:1150]descobri o que preciso fazer."
2600805-67 = "— Pensando bem, [wa:600]era algo tão óbvio,"
2600805-69 = "— Perceber isso só agora... [wa:1800]Shizuko, [wa:800]que erro imperdoável!"
2600805-72 = "[wa:400]— Talvez você já saiba,"
2600805-74 = "— Mas eu [wa:400]sou gananciosa, sabe?"
2600805-77 = "[wa:50]— Tenho muitas coisas que quero fazer [wa:950]e muitas coisas que quero ter,"
2600805-79 = "[wa:50]— Mas não vou desistir de nenhuma delas."
2600805-82 = "[wa:250]— Fazer todos [wa:350]felizes, [wa:1650]e também o sucesso do negócio!"
2600805-84 = "[wa:100]— E tornar a Hyakkiyako [wa:1150]a melhor cafeteria de Kivotos!"
2600805-87 = "[wa:450]— Eu [wa:1250]não quero deixar nada escapar! [wa:1800]Nada!"
2600805-89 = "— É claro... [wa:1350]você também, Sensei!"
2600805-94 = "Primeiro, pretendo rever várias coisas sobre o sistema de franquias."
2600805-95 = "Vou desenvolver novos menus, incorporar ainda mais o serviço de garota desastrada..."
2600805-96 = "Preciso estudar muito, não me limitar a uma única ideia e aprender várias coisas."
2600805-98 = "O que será que me espera lá na frente..."
2600805-99 = "Só de imaginar, não consigo parar de me empolgar!"
2600805-100 = "Sem esquecer o que é importante, mas ainda assim tentando tudo o que for possível..."
2600805-101 = "Vou fazer tudo o que precisa ser feito!"
2600805-103 = "Então, sendo assim, vou encher este arquipélago inteiro com a minha franquia!"
2600805-104 = "E aí..."
2600805-105 = "Vou dar de presente para o Sensei... essa vista do mar, tão pacífica, calma e luxuosa!!"
2600805-106 = "[s] \"Isso é realmente incrível.\""
2600805-108 = "[s] \"Será que eu mereço receber um presente tão grandioso assim...?\""
2600805-110 = "O que o Sensei pensa sobre isso não importa agora!"
2600805-111 = "Eu, Shizuko Kawa, decidi que será assim!"
2600805-112 = "É só isso!"
2600805-113 = "Eu decido, eu me esforço... e eu torno isso realidade!"
2600805-114 = "Se o Sensei se divertir quando esse momento chegar..."
2600805-115 = "Só isso já me deixará extremamente feliz!"
2600805-116 = "[s] \"...Como esperado, a Shizuko é incrível.\""
2600805-117 = "Fufu!"
2600805-118 = "Pode me elogiar ainda mais, viu? Quando sou elogiada, eu me esforço ainda mais!"
2600805-119 = "Eu, a Hyakkiyako e esta casa de praia! Vamos crescer cada vez mais daqui para frente!!"
