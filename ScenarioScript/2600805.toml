[translation]
2600805-1 = "私、すっごい欲張りなんです！"
2600805-2 = "（楽しみ半分不安半分で、シズコとの待ち合わせ場所に到着した）"
2600805-3 = "いらっしゃいませ！"
2600805-4 = "「百夜堂」直営店、海の家へようこそ！"
2600805-5 = "[s] \"シズコ、お待たせ。\""
2600805-6 = "とんでもございません！"
2600805-7 = "それではせっかくお越しいただいたことですし、シズコが直接サービスさせていただきます！"
2600805-8 = "まずは、ドジっ子サービスからいかがですか？"
2600805-9 = "[s1] \"ど、どうしようかな……。\"\n[s2] \"ドジっ子サービス、何だか懐かしい……。\""
2600805-13 = "（その後、シズコから盛大にサービスをしてもらった）"
2600805-34 = "（気が付いた頃には、もう夕方になっており……）"
2600805-36 = "どうでしたか、先生！"
2600805-37 = "あ、今はご主人様と呼んだ方が良いかもしれませんね？"
2600805-38 = "先生で大丈夫……？そうですか、了解です。"
2600805-39 = "ところで、感想は……！"
2600805-40 = "[s] \"これぞ百夜堂だなって感じがして、すごく良かったと思う。\""
2600805-41 = "そ、そうでしたか！"
2600805-42 = "それは何よりです！"
2600805-43 = "[s] \"悩みは解決した？\""
2600805-44 = "……。"
2600805-45 = "そうですね、何と言いましょうか……。"
2600805-46 = "……全部、先生のおかげです。"
2600805-47 = "おかげで忘れていたことを、思い出しました。"
2600805-48 = "それに、何をするべきなのかも。"
2600805-49 = "[s] \"大したことはしてないよ。\""
2600805-50 = "ふふっ。何となく、そう言うんじゃないかと思ってました。"
2600805-51 = "そんな先生じゃなかったら…… "
2600805-52 = "私は今でもずっと、迷走してばかりだったかもしれません。"
2600805-53 = "はいっ、恥ずかしいお話はここまで！"
2600805-54 = "明日からは、いつもの[ruby=かわわ]河和[/ruby]シズコです！"
2600805-55 = "ささっ、仕切り直しですよ！"
2600805-56 = "[s] \"し、シズコ？ちょっと待っ――\""
2600805-64 = "[wa:750]― 先生。[wa:1450]私、[wa:1150]自分のするべきことが分かりました。"
2600805-67 = "― 考えてみれば[wa:600]当たり前のことなのに、"
2600805-69 = "― 今になって気づくとは……[wa:1800]シズコ、[wa:800]一生の不覚！"
2600805-72 = "[wa:400]― 知ってるかもしれませんが、"
2600805-74 = "― 私って[wa:400]欲張りなんですよ？"
2600805-77 = "[wa:50]― やりたいことも、[wa:950]欲しい物もたくさんありますが、"
2600805-79 = "[wa:50]― 一つも諦めません。"
2600805-82 = "[wa:250]― みんなを[wa:350]喜ばせることも、[wa:1650]商売としての成功も！"
2600805-84 = "[wa:100]― 百夜堂を、[wa:1150]キヴォトスいちの喫茶店にすることも！"
2600805-87 = "[wa:450]― 私、[wa:1250]全部逃したくないんです！[wa:1800]全部！"
2600805-89 = "― もちろん……[wa:1350]先生のことも！"
2600805-94 = "まずは、フランチャイズ化について色々見直そうと思います。"
2600805-95 = "新メニューもどんどん開発して、ドジっ子サービスもどんどん取り入れて……。"
2600805-96 = "たくさん勉強して、これだと決めつけず、色んなことを学ばねばなりません。"
2600805-98 = "この先に、何が私を待ち受けているのか……"
2600805-99 = "想像するだけで、ワクワクが止まりませんね！"
2600805-100 = "大事なことは忘れず、それでもできることはたくさん試して……"
2600805-101 = "やるべきことを、全部やって！"
2600805-103 = "それで改めて、この群島を私のフランチャイズで全部埋め尽くしてやるんです！"
2600805-104 = "そしたら……"
2600805-105 = "その平和で穏やかで、贅沢な海の景色を……先生にプレゼントしてあげますね！！"
2600805-106 = "[s] \"それは、本当にすごいね。\""
2600805-108 = "[s] \"私がそんな、盛大なプレゼントを貰っても良いのかな……？\""
2600805-110 = "先生がどう思うかは、この際関係ありません！"
2600805-111 = "この私、[ruby=かわわ]河和[/ruby]シズコが！そうすると決めたんです！"
2600805-112 = "ただそれだけです！"
2600805-113 = "私が決めて、私が努力して……私がそれを叶える！"
2600805-114 = "その時先生が楽しんでくれたら……"
2600805-115 = "私はそれだけで、すっごく嬉しいので！"
2600805-116 = "[s] \"……やっぱり、シズコはすごいね。\""
2600805-117 = "ふふっ！"
2600805-118 = "もっともっと、褒めても良いんですよ？褒められるとさらに伸びるので！"
2600805-119 = "私も百夜堂も、この海の家も！この先もっともっと、成長していきますから！！"
