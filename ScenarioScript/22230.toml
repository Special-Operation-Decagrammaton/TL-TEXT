[translation]
22230-1 = "Episódio 23; Pavana para a Princesa (2)"
22230-2 = "……Falha na obtenção de recursos. Desligamento do sistema."
22230-3 = "Pessoal, vocês estão bem!?"
22230-4 = "Yuuka……!"
22230-5 = "Senpai Noa!"
22230-6 = "C-como vocês chegaram aqui……?"
22230-7 = "Já entendi muito bem que a situação não é nada normal, Sensei!"
22230-8 = "No início, eu pretendia apenas informar a localização da cidade e me retirar, mas……"
22230-9 = "Fufu, a Yuuka-chan disse que, no fim das contas, só isso não seria o suficiente……#nQue precisávamos dar um jeito de resolver tudo até o fim, sabe?"
22230-10 = "[s] \"Como esperado da Yuuka! O timing foi perfeito!\""
22230-11 = "Isso é o mínimo que se espera."
22230-12 = "Mas, antes disso, Presidente!!"
22230-14 = "！！"
22230-15 = "Desviar o orçamento do Seminário para construir uma cidade como esta……#nDepois teremos uma conversa séria! Esteja preparada!"
22230-16 = "……Yuuka."
22230-20 = "Erro no processo de obtenção de recursos.#nSituação de emergência detectada. Energia da Divi:Sion, para proteger o executor do protocolo, reúnam-se na Torre Central de Eridu……"
22230-24 = "……Intrusos?"
22230-25 = "Isso não deveria ser possível — as forças remanescentes na cidade são zero."
22230-26 = "Erro lógico detectado. Exibindo tela para confirmação."
22230-35 = "Ah, aquilo é, por acaso……!"
22230-39 = "[ns] \"………O Avant-Garde-kun e o Clube de Engenharia!"
22230-40 = "Detectamos uma presença suspeita com antecedência! O Clube de Engenharia fez um retorno triunfal!"
22230-41 = "Tem máquinas com um senso estético bem peculiar por toda parte."
22230-42 = "Provavelmente, esta é…… a ameaça que transbordou das ruínas, como a Presidente mencionou."
22230-43 = "Fufu…… então nós também não podemos ficar para trás."
22230-44 = "Se o oponente é um monstro que rastejou para fora das ruínas……"
22230-45 = "Nós somos engenheiros que visam o espaço."
22230-52 = "Ainda bem que agora temos aliados armados com o senso de design supervisionado pela Maki."
22230-53 = "Sim! O inimigo do meu inimigo é meu aliado! E os inimigos que modificamos também são aliados! É isso!"
22230-54 = "Sim…… especialmente porque instalamos armas de fogo que poderão ser usadas até nos futuros encouraçados espaciais."
22230-55 = "Mesmo que sejam monstros das ruínas, não são páreo para o \"Avant-Garde-kun Mk.2\"."
22230-56 = "Então, vamos lá! Avante!"
22230-57 = "Sim! Vamos limpar esses lixos das ruínas!"
22230-58 = "Ooooh!"
22230-66 = "Modificar o Avant-Garde-kun para…… um encouraçado espacial……"
22230-67 = "Eh? Do que você está falando?"
22230-68 = "[s] \"Se for um encouraçado espacial, não tem como evitar! Afinal, é o sonho de todo mundo!\""
22230-69 = "Bem…… eu não entendo muito bem o que o Sensei está dizendo……"
22230-70 = "Incompreensível. Julgamento de situação impossível."
22230-71 = "Correção de comando e reexecução. Os seguidores devem evitar combate com forças inesperadas e se reunir na Torre Central de Eridu……"
22230-72 = "Sinto muito, mas essas crianças não conseguirão chegar até aqui.#nQuanto à entrada da torre, a Eimi e os membros da C&C já a bloquearam."
22230-75 = "[ns] \"Eh? Himari!? Por que você está aqui!?\""
22230-76 = "Ufufu. Devo dizer que aconteceram várias coisas?"
22230-77 = "Himari…… você, não tinha fugido……?"
22230-78 = "Fugir…… que coisa triste de se dizer."
22230-79 = "Eu já tinha uma certa noção sobre a situação daqui."
22230-80 = "Depois de escapar da instalação de isolamento, vim para cá às pressas."
22230-81 = "Tratando-se da Rio…… eu previ que ela causaria outro incidente."
22230-82 = "O que acha?#nFufu — eu acertei?"
22230-83 = "…………."
22230-84 = "Bem, isto é a ＜Key＞……#nO gatilho de IA para ativar o \"OOPArt\" dos Sacerdotes Sem Nome."

22230-85 = "Se deixarmos como está, a personalidade da Alice certamente será substituída pela ＜Key＞……#ne ela despertará como a \"Princesa dos Deuses Sem Nome\", exatamente como os Sacerdotes Sem Nome desejam."

22230-86 = "E-então, isso significa que……!"
22230-87 = "！！#nHimari-senpai…… isso quer dizer que……"
22230-88 = "A Alice-chan vai, desse jeito……"
22230-89 = "Claro que existe uma maneira de impedir isso."
22230-90 = "[s] \"……O que exatamente precisamos fazer?\""
22230-91 = "A situação é urgente…… pois os Sacerdotes Sem Nome já começaram a agir."
22230-108 = "Portanto, antes que os Sacerdotes Sem Nome cheguem, primeiro nós devemos――"
22230-109 = "Acordar a Alice, que foi isolada nas profundezas do banco de dados pela ativação da ＜Key＞."
22230-111 = "Se fizermos isso, seremos capazes de deter esta situação."
22230-115 = "Isso…… é realmente possível?"
22230-116 = "Quer dizer que podemos trazer a Alice de volta!?"
22230-117 = "Com certeza. #nRio, você tem equipamentos de mergulho, não tem?"
22230-118 = "Sim, eu tenho. #n……Mas algo assim, realisticamente falando, não é possível……!"
22230-119 = "[s] \"Hã?\""
22230-120 = "É perigoso demais. Mesmo que consigam invadir o mundo mental da Alice, #nse algo der errado, vocês nunca mais conseguirão voltar."
22230-121 = "Além disso, quem faria uma coisa dessas――"
22230-122 = "No momento, apenas o Clube de Desenvolvimento de Jogos e o Sensei podem trazer a Alice de volta."
22230-123 = "Há riscos envolvidos, mas…… não existe outra maneira."
22230-125 = "……Nós faremos isso."
22230-126 = "Se for para……"
22230-127 = "Trazer a Alice-chan de volta."
22230-128 = "Viram só?"
22230-129 = "…………."
22230-130 = "Sendo assim, vou começar a analisar a mente da Alice agora para criar uma abertura."
22230-131 = "Vocês devem entrar no mundo mental da Alice e trazê-la de volta."
22230-136 = "[ns] \"……Entendido. Vamos nessa!\""
22230-138 = "Sim, então vamos começar."
22230-143 = "……Preparação concluída."
22230-144 = "Então, pessoal, conto com vocês."
22230-148 = "Próximo episódio: Aquilo que eu quero ser"
