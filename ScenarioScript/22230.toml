[translation]
22230-1 = "第23話;王女のためのパヴァーヌ（２）"
22230-2 = "……リソース確保失敗。システムシャットダウン。"
22230-3 = "みんな、大丈夫！？"
22230-4 = "ユウカ……！"
22230-5 = "ノア先輩！"
22230-6 = "こ、ここには、どうやって……？"
22230-7 = "状況が普通ではないということはよくわかりました、先生！"
22230-8 = "最初は都市の位置を伝えるだけで、手を引くつもりだったのですが……"
22230-9 = "ふふっ、ユウカちゃんが、やっぱりそれだけじゃダメだって……#n最後まで何とかしないと。と言ってましてね？"
22230-10 = "[s] \"さすがユウカ！タイミング完璧だったよ！\""
22230-11 = "これくらい当然です。"
22230-12 = "それより、会長！！"
22230-14 = "！！"
22230-15 = "セミナーの予算を横領してこんな都市を作るなんて……#n後でお説教ですよ！覚悟しておいてください！"
22230-16 = "……ユウカ。"
22230-20 = "リソース確保プロセスエラー。#n緊急状況発生Divi:Sion電源、プロトコル実行者を保護するためエリドゥ中央タワーに集………"
22230-24 = "……邪魔者？"
22230-25 = "そんなはずは――都市内の残存兵力はゼロ。"
22230-26 = "論理エラー発生。確認のため、画面を表示します。"
22230-35 = "あっ、あれはまさか……！"
22230-39 = "[ns] \"………アバンギャルド君とエンジニア部！"
22230-40 = "怪しい気配を事前にキャッチ！エンジニア部が華麗に復活しましたよ～！"
22230-41 = "あちこちに不思議なセンスの機械がいっぱいあるね。"
22230-42 = "おそらくこれが……会長が言っていた、廃墟から溢れた脅威なのだろうね。"
22230-43 = "ふふ……ならば私たちも負けていられないね。"
22230-44 = "相手が廃墟から這い上がってきた怪物なら……"
22230-45 = "こちらは宇宙を目指す技術者。"
22230-52 = "私たちには、マキが監修したデザインセンスで武装した味方ができたところでね。"
22230-53 = "はい！敵の敵は味方！私たちが改造した敵も味方！です！"
22230-54 = "うん……特に、今後の宇宙戦艦でも使える火力兵器をつけたから。"
22230-55 = "いくら廃墟の怪物だとしても、「アバンギャルド君Mk.2」の敵じゃあない。"
22230-56 = "それでは、行こうか！突進ー！"
22230-57 = "はい！廃墟のザコをお掃除しちゃいましょう！"
22230-58 = "お～！"
22230-66 = "アバンギャルド君を改造して……宇宙戦艦を……"
22230-67 = "え？何言ってるの？"
22230-68 = "[s] \"宇宙戦艦なら仕方ないよ！だってみんなのロマンだから！\""
22230-69 = "えっと……先生が何をおっしゃっているのか、よく分かりません……。"
22230-70 = "理解不能。状況判断不可。"
22230-71 = "命令修正および再実行。追従者は想定外の兵力と戦闘を避け、エリドゥ中央タワーに集結……。"
22230-72 = "申し訳ありませんが、その子たちはここまで来られませんよ。#nタワーの入口でしたら、エイミとC&Cのメンバーが塞いでおりますので。"
22230-75 = "[ns] \"えっ？ヒマリ！？なんでここに！？\""
22230-76 = "うふふっ。なんだかんだありまして～とでも言いましょうか？"
22230-77 = "ヒマリ……貴女、逃げたんじゃ……。"
22230-78 = "逃げるだなんて……なんと寂しいことを。"
22230-79 = "この先の状況について、ある程度見当がついておりましたから。"
22230-80 = "隔離施設を抜け出した後、急いでここに来たのです。"
22230-81 = "リオのことですから……また事件を引き起こすだろうと予測していたのです。"
22230-82 = "どうですか？#nふふっ――当たりましたか？"
22230-83 = "…………。"
22230-84 = "さて、これが＜Key＞……#n無名の司祭の「オーパーツ」を稼働させるためのトリガーAIですね。"
22230-85 = "このまま放っておけば、きっとアリスの人格は＜Key＞に置き換えられ……#n無名の司祭が望む通り「名もなき神々の王女」として覚醒することになるでしょう。"
22230-86 = "そ、それじゃあ……！"
22230-87 = "！！#nヒマリ先輩……それって……"
22230-88 = "アリスちゃんは、このまま……。"
22230-89 = "もちろんそれを防ぐ方法もあります。"
22230-90 = "[s] \"……一体、何をすればいいの？\""
22230-91 = "事態は一刻を争います……既に、無名の司祭は動き出しておりますから。"
22230-108 = "ですから、無名の司祭が到着する前に、まず私たちの手でアリスを――"
22230-109 = "＜Key＞の起動でデータベースの深部に隔離されてしまったアリスを起こすのです。"
22230-111 = "そうすれば、この事態を止める事ができるでしょう。"
22230-115 = "そんなこと……本当にできるの？"
22230-116 = "アリスを連れ戻せるってことですか！？"
22230-117 = "できますとも。#nリオ、ダイブ設備くらいありますよね？"
22230-118 = "ええ、あるわ。#n……でもそんな事、現実的にできるわけ……！"
22230-119 = "[s] \"あれ？\""
22230-120 = "危険すぎる。たとえアリスの精神世界に侵入できたとしても、#n下手すれば二度と戻って来れなくなってしまうのよ。"
22230-121 = "そもそも、そんなこと一体誰が――"
22230-122 = "現状、アリスを連れ戻せるのはゲーム開発部と先生しかおりません。"
22230-123 = "危険が伴いますが……それ以外に方法はありません。"
22230-125 = "……やります。"
22230-126 = "アリスちゃんを……"
22230-127 = "連れ戻せるのなら。"
22230-128 = "ほらね？"
22230-129 = "…………。"
22230-130 = "それでは、私が今からアリスの精神を分析して隙間を作ります。"
22230-131 = "皆さんはアリスの精神世界に入って、彼女を連れ戻してきてください。"
22230-136 = "[ns] \"……分かった。行こう！\""
22230-138 = "ええ、それでは始めましょう。"
22230-143 = "……準備完了です。"
22230-144 = "それでは皆さん、お願いします。"
22230-148 = "次回;自分がなりたいもの"
