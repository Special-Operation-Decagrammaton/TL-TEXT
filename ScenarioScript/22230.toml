[translation]
22230-1 = "Episódio 23; Pavane para a Princesa (2)"
22230-2 = "......Falha na obtenção de recursos. Desligando o sistema."
22230-3 = "Pessoal, vocês estão bem!?"
22230-4 = "Yuuka......!"
22230-5 = "Noa-senpai!"
22230-6 = "C, como vocês chegaram aqui......?"
22230-7 = "Entendemos muito bem que a situação não está nada normal, Sensei!"
22230-8 = "No começo, eu pretendia apenas passar a localização da cidade e me retirar, mas......"
22230-9 = "Fufu, a Yuuka-chan disse que só isso não seria o bastante... que precisávamos dar um jeito até o fim, sabe?"
22230-10 = "[s] \"Como esperado da Yuuka! O timing foi perfeito!\""
22230-11 = "Isso é o mínimo esperado."
22230-12 = "Mais importante, Presidente!!"
22230-14 = "!!"
22230-15 = "Desviar o orçamento do Seminar para construir uma cidade dessas...... #n Você vai levar uma bronca depois! Esteja preparada!"
22230-16 = "......Yuuka."
22230-20 = "Erro no processo de obtenção de recursos. #n Emergência. Fonte de energia Divi:Sion. Para proteger o executador de protocolo, reúna-se na torre central de Eridu......"
22230-24 = "......Intrusos?"
22230-25 = "Não deveria ser possível―― as forças restantes na cidade são zero."
22230-26 = "Erro de lógica. Exibindo a tela para confirmação."
22230-35 = "Ah, aquilo não pode ser......!"
22230-39 = "[ns] \".........Avant-Garde-kun e o Clube de Engenharia!\""
22230-40 = "Detectei presenças suspeitas com antecedência! O Clube de Engenharia retornou triunfalmente~!"
22230-41 = "Tem máquinas com designs estranhos por toda parte."
22230-42 = "Provavelmente... essas devem ser as ameaças que transbordaram das ruínas, como a Presidente mencionou."
22230-43 = "Fufu...... então nós não podemos perder também."
22230-44 = "Se o oponente é um monstro que rastejou para fora das ruínas......"
22230-45 = "Nós somos engenheiros que visam as estrelas."
22230-52 = "Nós ganhamos aliados armados com um senso de design supervisionado pela Maki, afinal."
22230-53 = "Sim! O inimigo do meu inimigo é meu amigo! O inimigo que modificamos também é nosso aliado! É isso mesmo!"
22230-54 = "Sim...... especialmente porque instalamos armas de fogo que poderão ser usadas em naves espaciais no futuro."
22230-55 = "Não importa se é um monstro das ruínas, ele não é páreo para o 'Avant-Garde-kun Mk.2'."
22230-56 = "Muito bem, vamos lá! Avante!"
22230-57 = "Sim! Vamos limpar essa escória das ruínas!"
22230-58 = "Ooooh!"
22230-66 = "Modificar o Avant-Garde-kun para... uma nave espacial..."
22230-67 = "Eh? Do que você está falando?"
22230-68 = "[s] \"Nave espacial não tem como evitar! É o sonho de todo mundo!\""
22230-69 = "Ehm...... Sensei, não consigo entender o que você está dizendo......"
22230-70 = "Incompreensível. Julgamento de situação impossível."
22230-71 = "Corrigindo ordem e reexecutando. Seguidores, evitem combate com forças inesperadas e reúnam-se na torre central de Eridu......"
22230-72 = "Sinto muito, mas essas crianças não chegarão aqui. #n Quanto à entrada da torre, a Eimi e os membros da C&C já bloquearam o caminho."
22230-75 = "[ns] \"Eh? Himari!? Por que você está aqui!?\""
22230-76 = "Ufufu. Devo dizer que foi graças a uma série de circunstâncias?"
22230-77 = "Himari...... você não tinha fugido......?"
22230-78 = "Fugir...... que coisa solitária de se dizer."
22230-79 = "Eu já tinha uma boa ideia sobre a situação daqui."
22230-80 = "Depois de escapar da instalação de isolamento, vim correndo para cá."
22230-81 = "Tratando-se da Rio...... eu previ que ela causaria outro incidente."
22230-82 = "E então? #n Fufu―― eu acertei?"
22230-83 = "............"
22230-84 = "Bem, esta é a <Key>...... #n A IA de gatilho para operar a 'Oopart' dos Sacerdotes Sem Nome."
22230-85 = "Se a deixarmos aqui, a personalidade da Aris certamente será substituída pela <Key>...... #n E ela despertará como a 'Princesa dos Deuses Sem Nome', exatamente como os Sacerdotes Sem Nome desejam."
22230-86 = "E, então......!"
22230-87 = "!! #n Himari-senpai...... isso significa que..."
22230-88 = "A Aris-chan vai continuar assim......"
22230-89 = "Claro que existe uma forma de impedir isso."
22230-90 = "[s] \"......O que precisamos fazer?\""
22230-91 = "O tempo é curto...... Os Sacerdotes Sem Nome já começaram a se mover."
22230-108 = "Portanto, antes que os Sacerdotes Sem Nome cheguem, primeiro nós precisamos..."
22230-109 = "Acordar a Aris, que foi isolada nas profundezas do banco de dados pelo despertar da <Key>."
22230-111 = "Se fizermos isso, poderemos deter essa situação."
22230-115 = "Isso... é realmente possível?"
22230-116 = "Quer dizer que podemos trazer a Aris de volta!?"
22230-117 = "Com certeza. #n Rio, você tem equipamentos de mergulho mental aqui, certo?"
22230-118 = "Sim, eu tenho. #n ......Mas isso, realisticamente, não tem como......!"
22230-119 = "[s] \"Ah?\""
22230-120 = "É perigoso demais. Mesmo que consigam invadir o mundo espiritual da Aris, #n se algo der errado, vocês nunca mais conseguirão voltar."
22230-121 = "Além disso, quem faria uma coisa dessas――"
22230-122 = "Atualmente, os únicos que podem trazer a Aris de volta são o Clube de Desenvolvimento de Jogos e o Sensei."
22230-123 = "É perigoso, mas...... não há outro método."
22230-125 = "......Eu vou."
22230-126 = "Se for para trazer a Aris-chan..."
22230-127 = "Se for para trazê-la de volta."
22230-128 = "Viram?"
22230-129 = "............"
22230-130 = "Então, começarei a analisar a mente da Aris e criar uma abertura."
22230-131 = "Vocês entrem no mundo espiritual dela e tragam-na de volta."
22230-136 = "[ns] \"......Entendido. Vamos!\""
22230-138 = "Sim, então vamos começar."
22230-143 = "......Preparativos concluídos."
22230-144 = "Pessoal, conto com vocês."
22230-148 = "Próximo Episódio; O que eu quero ser"