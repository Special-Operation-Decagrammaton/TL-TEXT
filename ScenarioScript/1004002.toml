[translation]
1004002-1 = "Em uma ninja de verdade...!"
1004002-2 = "（Cheguei ao local de encontro com Tsukuyo um pouco antes do horário combinado, mas...）"
1004002-3 = "（O horário passou e Tsukuyo não apareceu de jeito nenhum...）"
1004002-4 = "[ns] \"Tsukuyo, o que será que aconteceu...?\""
1004002-5 = "Sensei..."
1004002-10 = "Ah, estou aqui..."
1004002-16 = "[ns] \"T-Tsukuyo...!?\""
1004002-18 = "Desculpe por fazer você esperar..."
1004002-19 = "Bem, eu que pedi para nos encontrarmos, mas... quando pensei em ver o Sensei, eu, sabe... acabei ficando nervosa..."
1004002-20 = "Fiquei pensando se alguém como eu, que só é grande, deveria mesmo te encontrar..."
1004002-21 = "O Sensei aceitou prontamente, mas... ainda assim, fiquei com medo de acabar te incomodando..."
1004002-22 = "Pensando nisso, acabei..."
1004002-23 = "Acabei me disfarçando de árvore..."
1004002-24 = "[s] \"Não precisa se esconder, está tudo bem.\""
1004002-25 = "É, mesmo...?"
1004002-26 = "[s] \"Mas então, sobre o que você queria conversar, Tsukuyo?\""
1004002-27 = "Ah, bem, é que..."
1004002-28 = "Eu quero me tornar uma ninja exemplar...!"
1004002-29 = "Ouvi dizer que o Sensei do Schale é uma pessoa incrível..."
1004002-30 = "Se o Sensei puder me ajudar... talvez até alguém como eu consiga se tornar uma ninja de verdade...!"
1004002-31 = "[s1] \"Uma ninja de verdade, hein...\"\n[s2] \"Mas por que você quer ser uma ninja, Tsukuyo?\""
1004002-32 = "Ah, desculpe...! É verdade, eu deveria ter começado por aí..."
1004002-33 = "Ah, desculpe...! É verdade, eu deveria ter começado por aí..."
1004002-34 = "Bem, o motivo é..."
1004002-35 = "O motivo, bem... o motivo..."
1004002-36 = "Bem, se eu me tornar uma ninja exemplar, acho que poderei ser útil nas atividades do Clube de Pesquisa de Ninjutsu..."
1004002-37 = "Quero me tornar uma ninja exemplar e ser útil para todos...!"
1004002-38 = "Esse é o motivo pelo qual quero ser uma ninja de verdade...!"
1004002-39 = "Ah, bem, desculpe... deve ser estranho ouvir isso de repente, não é...?"
1004002-40 = "[s] \"Está tudo bem. Não sei se serei de grande ajuda, mas farei o possível para colaborar.\""
1004002-46 = "Sim, muito obrigada...!"
1004002-48 = "Farei qualquer coisa! Por onde devo começar...?"
1004002-49 = "[s3] \"Acho melhor começar pelo que você faz de melhor.\"\n[s4] \"É bom praticar aos poucos naquilo que você tem mais confiança.\""
1004002-54 = "Entendo...!"
1004002-55 = "O que eu faço de melhor... aquilo que tenho mais confiança..."
1004002-56 = "Aos poucos, né..."
1004002-57 = "Como esperado do Sensei do Schale...! Cada palavra tem um peso diferente...!"
1004002-58 = "Preciso anotar tudo sem deixar passar nada...!"
1004002-59 = "[s] \"Será que é para tanto...? Mas enfim, no que você é boa?\""
1004002-60 = "Bem, no que sou boa..."
1004002-61 = "Ah, nesse caso...!"
1004002-62 = "Eu tenho confiança apenas em me disfarçar de árvore...!"
1004002-63 = "[s5] \"Realmente, agora pouco...\"\n[s6] \"Eu não percebi nada até você falar comigo.\""
1004002-64 = "Ah, é, mesmo...?"
1004002-65 = "Ah, é, mesmo...?"
1004002-66 = "Hehehe... ouvir isso do Sensei... me deixa muito, muito feliz!"
1004002-67 = "Essa é uma habilidade especial que venho treinando desde pequena..."
1004002-68 = "Como sempre fui alta, nas peças da escola, eu sempre fazia o papel de árvore...!"
1004002-69 = "Por isso, estou acostumada."
1004002-70 = "Meu apelido antigamente era \"A Árvore Sagrada de Hyakkiyako\"!"
1004002-71 = "Então, vamos começar...?"
1004002-72 = "[s] \"Ah, você vai fazer isso?\""
1004002-73 = "Sim, por favor, espere um momento...!"
1004002-74 = "Primeiro, eu faço isso assim..."
1004002-75 = "E esse galho, eu coloco aqui..."
1004002-76 = "Ufa, preparação concluída..."
1004002-77 = "Então, eu, Oono Tsukuyo..."
1004002-78 = "Vou mostrar minha habilidade especial...!"
1004002-79 = "Haaah...!"
1004002-84 = "O que achou, Sensei...?"
1004002-90 = "[ns7] \"Incrível...!?\"\n[ns8] \"Você se tornou um com a natureza...!?\""
1004002-94 = "É mais ou menos assim...!"
1004002-95 = "Como foi? Tinha algo estranho...?"
1004002-96 = "[s] \"Incrível, eu não conseguia nem notar onde você estava escondida...\""
1004002-97 = "Ah, receber um elogio desses..."
1004002-98 = "Acho que ganhei um pouco mais de confiança...!"
1004002-99 = "Se eu continuar aprimorando essa técnica...!"
1004002-100 = "Será que eu também conseguirei me tornar uma ninja de verdade...? Eu vou conseguir, não vou!"
1004002-101 = "[s] \"Com certeza vai, vamos nos esforçar!\""
1004002-102 = "Muito obrigada...!"
1004002-103 = "Continuarei me esforçando ao máximo!"
1004002-106 = "..."
1004002-107 = "Bem, é que..."
1004002-108 = "Será que eu deveria ter feito uma saída triunfal como uma ninja agora há pouco...?"
1004002-109 = "Desculpe, não sou muito boa em ler o clima..."
1004002-110 = "Tanto faz, é...? Ah, muito obrigada."
1004002-111 = "Então, recomeçando... com licença...!"
1004002-112 = "Ya...!"
1004002-117 = "[ns] \"...Que menina boa.\""
1004002-119 = "[ns] \"Bem, agora vou voltar para o Schale--\""
1004002-122 = "[ns9] \"...Tsukuyo, você está por aí?\"\n[ns10] \"Será que você se disfarçou de árvore de novo...?\""
1004002-125 = "[ns] \"...\""
1004002-127 = "(Depois disso, por precaução, verifiquei os arredores por uns 10 minutos para ver se a Tsukuyo não estava por perto antes de voltar para o Schale)"
