[translation]
1004002-1 = "一人前の、忍者に……！"
1004002-2 = "（約束の時間より少し前に、ツクヨとの待ち合わせ場所に着いたものの……）"
1004002-3 = "（約束の時間が過ぎても、一向にツクヨが現れない……）"
1004002-4 = "[ns] \"ツクヨ、どうしたんだろう……。\""
1004002-5 = "先生……。"
1004002-10 = "あの、ここです……。"
1004002-16 = "[ns] \"つ、ツクヨ……！？\""
1004002-18 = "お待たせして、すみません……。"
1004002-19 = "その、先生をお呼びしておいて、何ですが……いざ先生にお会いすると思うと、何だかその、緊張してしまって……。"
1004002-20 = "私みたいな、ただ大きいだけの子が、お会いしても良いものかと……。"
1004002-21 = "先生は、快諾してくれましたが……やっぱりご気分を、害してしまうのでは、と……。"
1004002-22 = "そう考えていたら、つい……。"
1004002-23 = "ついその、木に変装してしまい……。"
1004002-24 = "[s] \"隠れなくても大丈夫だよ。\""
1004002-25 = "そう、ですか……？"
1004002-26 = "[s] \"ところで、ツクヨが相談したかったことって？\""
1004002-27 = "あ、えっと、ですね……。"
1004002-28 = "私、立派な忍者に、なりたくて……！"
1004002-29 = "シャーレの先生は、その、凄い方だと……聞きましたので……。"
1004002-30 = "先生に、手伝っていただければ……私なんかでも、一人前の忍者に、なれるのではと……！"
1004002-31 = "[s1] \"一人前の忍者かぁ……。\"\n[s2] \"ところで、ツクヨはどうして忍者になりたいの？\""
1004002-32 = "あ、すみません……！そうですね、そこから、言うべきでした……。"
1004002-33 = "あ、すみません……！そうですね、そこから、言うべきでした……。"
1004002-34 = "えっと、理由、は……。"
1004002-35 = "理由、えっと……理由……。"
1004002-36 = "あの、立派な忍者になれたら、忍術研究部の活動で、役に立てるのでは、と……。"
1004002-37 = "立派な忍者になって、みんなの役に、立ちたいんです……！"
1004002-38 = "それが、一人前の忍者になりたい理由、です……！"
1004002-39 = "あ、えっと、すみません……急にこんなことを言われても、困りますよね……？"
1004002-40 = "[s] \"大丈夫。力になれるかは分からないけど、できるかぎり協力するよ。\""
1004002-46 = "はい、ありがとう、ございますっ……！"
1004002-48 = "何でも、やります！まずは、何をすれば……？"
1004002-49 = "[s3] \"やっぱりまずは、ツクヨが一番得意なことから。\"\n[s4] \"一番自信があることから、コツコツ練習するのが良いんじゃないかな。\""
1004002-54 = "なるほど……！"
1004002-55 = "私が一番、上手にできること……一番、自信のあること……。"
1004002-56 = "コツコツ、と……。"
1004002-57 = "流石は、シャーレの先生……！一言一言の、重みが違います……！"
1004002-58 = "一言も漏らさず、記録しないと……！"
1004002-59 = "[s] \"そこまでかな……？と、とりあえず、得意なことは？\""
1004002-60 = "えっと、得意なこと……。"
1004002-61 = "あ、それなら……！"
1004002-62 = "木に変装すること、だけは、自信があります……！"
1004002-63 = "[s5] \"たしかにさっき……。\"\n[s6] \"声をかけられるまで、全然気づかなかった。\""
1004002-64 = "あっ、そう、ですか……？"
1004002-65 = "あっ、そう、ですか……？"
1004002-66 = "えへへっ……先生にそう、言ってもらえると……何だか、すごく嬉しい、です！"
1004002-67 = "これは、昔からずっと鍛え続けてきた、私の特技で……。"
1004002-68 = "私、昔から背が高かったので……学芸会などでは、よく、木の役をしていて……！"
1004002-69 = "なので、慣れてるんです。"
1004002-70 = "昔のあだ名は、「百鬼夜行の神木」でした！"
1004002-71 = "では、早速……？"
1004002-72 = "[s] \"あ、やってくれるの？\""
1004002-73 = "はい、少々お待ちを……！"
1004002-74 = "まず、これをこうして……。"
1004002-75 = "この枝をこう……ここに付けて……。"
1004002-76 = "ふう、準備完了です……。"
1004002-77 = "それでは、この[ruby=おおの]大野[/ruby]ツクヨ……"
1004002-78 = "とっておきの特技、お見せします……！"
1004002-79 = "はああっ……！"
1004002-84 = "いかが、でしょうか、先生……？"
1004002-90 = "[ns7] \"すごい……！？\"\n[ns8] \"もはや自然と一体に……！？\""
1004002-94 = "こんな、感じです……！"
1004002-95 = "いかが、でしたか？何か、変なところなどは……？"
1004002-96 = "[s] \"すごいね、どこに隠れてるのか全然分からなかった……。\""
1004002-97 = "えっと、そこまで褒めて、いただけるなんて……。"
1004002-98 = "少し、自信が湧いてきたかもしれません……！"
1004002-99 = "この技を、磨き続ければ……！"
1004002-100 = "私も、一人前の忍者に、なれるでしょうか……！？なれるんですね！"
1004002-101 = "[s] \"きっとなれるよ、頑張ろう！\""
1004002-102 = "ありがとうございます……！"
1004002-103 = "これからも、一生懸命、頑張ります！"
1004002-106 = "……。"
1004002-107 = "えっと、その……。"
1004002-108 = "もしかして今のは、忍者として、カッコよく退場するべきだった、でしょうか……？"
1004002-109 = "すみません、空気が読めなくて……。"
1004002-110 = "どっちでも、ですか……？あ、ありがとうございます。"
1004002-111 = "それでは、あらためて……失礼、します……！"
1004002-112 = "やっ……！"
1004002-117 = "[ns] \"……良い子だなあ。\""
1004002-119 = "[ns] \"さて、じゃあシャーレに――\""
1004002-122 = "[ns9] \"……ツクヨ、実はそこにいたりする？\"\n[ns10] \"もしかして、また木に変装してたり……？\""
1004002-125 = "[ns] \"……。\""
1004002-127 = "（その後も念のため、ツクヨがいないか周囲を10分ぐらい確認してからシャーレへと帰った）"
