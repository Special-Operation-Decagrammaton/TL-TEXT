[translation]
10033050-1 = "Episódio 5; Mais do que flores, mais do que bolinhos"
10033050-2 = "Quando nos divertimos, o tempo passa voando..."
10033050-3 = "Mas, ao mesmo tempo, não se pode lutar com a barriga vazia!"
10033050-4 = "Sendo assim, é hora de comer!"
10033050-6 = "O que acharam da culinária repleta das tradições de Hyakkiyako?"
10033050-11 = "Fufufu..."
10033050-12 = "Gastronomia... uma palavra mágica, simples e modesta, mas profunda."
10033050-13 = "[ns] \"Haruna!?\""
10033050-14 = "Ei, espera aí!? Não diga coisas estranhas aqui!?"
10033050-15 = "Entendi perfeitamente que este refeitório é um lugar maravilhoso. Sou muito grata por isso."
10033050-16 = "Mas... comer pratos determinados em lugares determinados. Será que isso é a verdadeira gastronomia?"
10033050-17 = "A gastronomia não deveria ser algo que buscamos ativamente, em vez de apenas receber?"
10033050-18 = "[s] \"O que você quer dizer com isso...?\""
10033050-19 = "Quero dizer que, já que estamos em Hyakkiyako, deveríamos experimentar muito mais coisas deliciosas, não acha?★"
10033050-20 = "Concordo plenamente! Eu também vou!"
10033050-24 = "Bem, acho que entendo o que ela quer dizer? Obrigado pela comida!"
10033050-29 = "Aquelas garotas, lá vão elas de novo..."
10033050-30 = "Mas, pensando bem, talvez eu ainda consiga comer mais?"
10033050-31 = "Certo, vou mostrar para elas o significado de \"segundo estômago\"!"
10033050-32 = "Dentro!"
10033050-37 = "Es-esperem um pouco! O cronograma depois disso, a ordem das coisas...!"
10033050-38 = "E-e agora, o que faremos, Sensei!?"
10033050-39 = "[s] \"De qualquer forma, precisamos trazer todos de volta...!\""
10033050-42 = "Hum, o aroma fragrante do shoyu... O gengibre escondido realça ainda mais o sabor do frango. Embora, por algum motivo, esteja em chamas."
10033050-43 = "Uau, é um bolinho, mas tem \"monja\" dentro! Talvez fique ainda melhor com wasabi e molho de pimenta!"
10033050-44 = "Que lula grelhada maravilhosa... Uma lula-gigante inteira, isso é o máximo!★"
10033050-45 = "Ora, \"grátis se comer 10 em 5 minutos\"... Que meta modesta, não é?"
10033050-46 = "\"Coloque este tempurá sobre o onigiri e coma tudo de uma vez\"... Isso não é só uma tigela de tempurá?"
10033050-47 = "Bem, farei como foi dito por enquanto..."
10033050-51 = "Que quente!!?！？"
10033050-52 = "Bem, conseguimos conquistar esta área."
10033050-53 = "Então, pessoal, vamos para as barracas ali!"
10033050-54 = "Oba!"
10033050-61 = "...Encontrei. Sensei, ali..."
10033050-62 = "[s] \"Obrigado, Tsubaki!\""
10033050-63 = "Haa, haa... O que são aquelas pessoas...!?"
10033050-64 = "Elas estão comendo enquanto se movem, mas são mais rápidas do que nós correndo!?"
10033050-66 = "Esperem! É difícil correr com essa roupa!"
10033050-67 = "Vamos nos apressar, pessoal...!"
10033050-71 = "Entendo... Há muitas coisas raras por aqui também."
10033050-72 = "Devo dizer que são sabores peculiares... O espetinho de frango extremamente apimentado é uma coisa."
10033050-73 = "Mas esta maçã do amor, por exemplo, não tem nada de doce, apenas um amargor misterioso..."
10033050-74 = "Ei, o que é isso? É delicioso! Acho que nunca comi nada assim!"
10033050-75 = "(O quê, elas estão comendo isso normalmente...!? Então...!)"
10033050-76 = "Agora é a vez deste! Um onigiri com extrato de ameixa em conserva concentrado 10 vezes, super azedo!"
10033050-81 = "Uau, incrível! Sinto como se minha cabeça estivesse dormente!"
10033050-85 = "(O quê!? Então...!)"
10033050-86 = "Então o próximo é uma torrada com bastante geleia de kusaya!"
10033050-90 = "O cheiro característico do peixe está concentrado e, além disso, está doce na medida certa..."
10033050-91 = "Acho que consigo comer quantas quiser! Quero mais!"
10033050-92 = "Soba de Haukattoru!"
10033050-93 = "Que cheiro bom!"
10033050-94 = "Ramen de Surströmming!"
10033050-95 = "O sabor é irresistível!"
10033050-97 = "……Então, que tal isto!#nParfait de baunilha com takoyaki de pepino-do-mar!"
10033050-98 = "Ei, eu não autorizei a venda disso!"
10033050-100 = "Droga……!"
10033050-104 = "Será mesmo?"
10033050-105 = "……Hã!?"
10033050-106 = "A autorização é algo feito pensando naqueles que a recebem……#nDevemos ser gratos por isso."
10033050-107 = "Mas nós somos o Clube de Pesquisa Gastronômica.#nUm grupo que busca novos encontros, superando tais restrições!#nNão podemos ficar quietas logo em uma viagem escolar!"
10033050-108 = "Isso mesmo! E olha que tudo nesta loja é delicioso!"
10033050-109 = "Mas praticamente só você comeu, né!?"
10033050-110 = "Ora, ora, imprevistos fazem parte de uma viagem★"
10033050-112 = "Autorização é autorização, o que é proibido é proibido!#nAs normas de segurança alimentar são rigorosas, então não reclamem!"
10033050-113 = "Que decepção, Fuuka-san……#nEu achei que você entenderia a nossa filosofia."
10033050-114 = "Uma coisa é uma coisa, outra coisa é outra coisa!"
