[translation]
10033050-1 = "第5話;花より団子より"
10033050-2 = "時は楽しいほど、あっという間に過ぎ去るもの……。"
10033050-3 = "しかし同時に腹が減っては戦はできぬ、です！"
10033050-4 = "というわけで、お食事の時間ですよ！"
10033050-6 = "百鬼夜行の伝統が詰まった美食、いかがでしたでしょうか！"
10033050-11 = "ふふふっ……。"
10033050-12 = "美食……シンプルかつ簡素にして、奥深い魔法の言葉ですね。"
10033050-13 = "[ns] \"ハルナ！？\""
10033050-14 = "ちょっと！？#nここで変なこと言わないでよ！？"
10033050-15 = "この食堂が素晴らしい場所であるということは、存分に分かりました。#nその点は大いに感謝しましょう。"
10033050-16 = "ですが……決められた場所で、決められた振舞いを頂く。#nこれだけが本当の美食なのでしょうか？"
10033050-17 = "美食とは受け身ではなく、積極的に手にすべきものではありませんか？"
10033050-18 = "[s] \"それはつまり……？\""
10033050-19 = "つまりせっかくの百鬼夜行なのですから、#n美味しいものをもっともっと食べてみないと、というお話です★"
10033050-20 = "大賛成ー！#n私も行く！"
10033050-24 = "まぁ、言ってることは分かるかも？#nご馳走様！"
10033050-29 = "あの子たち、またやってるね……。"
10033050-30 = "でも、確かにまだ食べられるかも？"
10033050-31 = "よし、「別腹」って言葉の意味を思い知らせてやるー！"
10033050-32 = "乗ったぁ！"
10033050-37 = "ちょ、ちょっと待ってください！#nこの後のスケジュールが、順番が……！"
10033050-38 = "え、えぇと、どうしましょう先生ぇ！？"
10033050-39 = "[s] \"どっちにせよ、みんなを呼び戻さないと……！\""
10033050-42 = "ふむ、香しい醤油の香り……#n秘められた生姜がより鶏肉の旨味を引き立てていますね。#n何故か燃え盛ってますが。"
10033050-43 = "わ、饅頭なのに「もんじゃ」が入ってる！#nわさびとチリソースを足したらもっと美味しくなるかも！"
10033050-44 = "これは素晴らしいイカ焼き……#nダイオウイカを一匹丸ごとなんて、最高ですね★"
10033050-45 = "おや、「5分以内に10匹完食したら無料」……#n随分と控えめな目標設定ですねぇ？"
10033050-46 = "「この天ぷらはおにぎりの上に乗せて、一気に頬ばってください」……#nそれ、天ぷら丼じゃないの？"
10033050-47 = "まあ、一旦言われたとおりに……。"
10033050-51 = "[ruby=熱]あふ[/ruby]っ！！？！？"
10033050-52 = "さて、この辺はおよそ制覇できましたね。"
10033050-53 = "それでは皆さん、向こうの屋台へ向かいましょう！"
10033050-54 = "おー！"
10033050-61 = "……見つけた。#n先生、あっち……。"
10033050-62 = "[s] \"ありがとう、ツバキ！\""
10033050-63 = "はぁ、はぁ……何なのですか、あの方々は……！？"
10033050-64 = "食べながら動いてるのに、ワタシたちが走るよりも速いのデハ！？"
10033050-66 = "待ってー！#nこの格好ちょっと走りにくいよー！"
10033050-67 = "急ぎましょう、皆さん……！"
10033050-71 = "なるほど……#nこの辺りはまた、珍しいものが多いですね。"
10033050-72 = "個性的な味、と申しましょうか……#n非常に辛い焼き鳥などはまだしも。"
10033050-73 = "このりんご飴などは、#n甘さどころか渋みしか感じられないという魔訶不思議な……。"
10033050-74 = "え、何これ美味しー！#nこんなの食べたことないかも！"
10033050-75 = "（なっ、これを普通に食べるだと……！？ならば……！）"
10033050-76 = "さあお次はこいつだ！#n梅干しエキスを10倍に濃縮した、酸っぱすぎるおにぎり！"
10033050-81 = "うわぁ、すごい！#nなんか頭の中が痺れてる！"
10033050-85 = "（何だと！？ならば……！）"
10033050-86 = "なら次は、クサヤジャムたっぷりのトーストだ！"
10033050-90 = "魚特有の匂いが凝縮されて、その上良い感じに甘ったるくなってて……"
10033050-91 = "何枚でも食べられそう！おかわり！"
10033050-92 = "ハウカットルそば！"
10033050-93 = "良い香りー！"
10033050-94 = "シュールストレミングラーメン！"
10033050-95 = "コクがたまんないねー！"
10033050-97 = "……ならばこれだ！#nナマコたこ焼きバニラパフェ！"
10033050-98 = "ちょっと、それは販売を許可していないはずです！"
10033050-100 = "ちぃっ……！"
10033050-104 = "果たして本当にそうでしょうか？"
10033050-105 = "……はい！？"
10033050-106 = "許可というものは、あくまで受容する方々を慮ってのこと……#nそれ自体は感謝しましょう。"
10033050-107 = "しかし私たちは美食研究会。#nそういった規制を超えて、新たな出会いを求める集団！#nせっかくの修学旅行で、おとなしくなどしてはいられません！"
10033050-108 = "そうだそうだー！このお店、何でも美味しいのに！"
10033050-109 = "ほぼあんたしか食べてないけどね！？"
10033050-110 = "まぁまぁ、旅にはハプニングが付きものですから★"
10033050-112 = "許可は許可、ダメなものはダメ！#n食品規制は大変なんだから、文句言わないの！"
10033050-113 = "残念です、フウカさん……#nあなたは私たちの理念を理解してくださると思っていたのに。"
10033050-114 = "それはそれ、これはこれ！"
