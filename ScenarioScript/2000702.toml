[translation]
2000702-1 = "O segredo da cantora virtual"
2000702-2 = "Distrito Central de Kivotos, beco dos fundos"
2000702-3 = "（Conforme instruído, cheguei ao local designado quando o sol estava começando a se pôr）"
2000702-7 = "……Eu estava esperando por você."
2000702-13 = "Mesmo sendo uma mensagem tão suspeita,"
2000702-14 = "obrigada por vir."
2000702-16 = "Embora eu ache que seja falta de educação,"
2000702-17 = "eu não podia deixar que outras pessoas soubessem disso de jeito nenhum……"
2000702-22 = "[ns] \"Ah…….\""
2000702-24 = "Você sabe quem eu sou?"
2000702-25 = "[s1] \"Hatsune Miku…… não é?\"\n[s2] \"……?\""
2000702-26 = "Fufu, exatamente."
2000702-27 = "V-você não sabia……."
2000702-28 = "Eu sou a cantora virtual, Hatsune Miku."
2000702-29 = "Sou um software que tem o papel de transmitir"
2000702-30 = "os sentimentos contidos nas músicas."
2000702-31 = "[s] \"Cantora virtual……?\""
2000702-32 = "Sim. O lugar onde eu atuo originalmente é o espaço virtual…… o que chamam de espaço virtual eletrônico."
2000702-33 = "Por isso, até agora, pude transmitir músicas e os sentimentos nelas contidos para muitas pessoas sem restrições de tempo ou espaço, mas…… por outro lado, não conseguia interagir cara a cara com ninguém assim."
2000702-34 = "Ainda assim, graças a vários acasos, encontros maravilhosos e aos fãs que diziam \"eu quero te conhecer pessoalmente\"……"
2000702-35 = "com a ajuda de alguns engenheiros de Kivotos, consegui obter um corpo físico adequado como este."
2000702-37 = "Fufu, a tecnologia de Kivotos é realmente incrível."
2000702-38 = "É quase idêntica à minha aparência anterior, e além disso, essa sensação do vento acariciando meu corpo ou a doçura dos doces na ponta da língua, que eu não podia experimentar antes……"
2000702-39 = "Agora, sinto que posso fazer um show maravilhoso como nunca antes!"
2000702-40 = "Era o que eu pensava, mas……"
2000702-41 = "[s3] \"Algum problema?\"\n[s4] \"É por isso que você me chamou aqui?\""
2000702-42 = "……Sim, exatamente."
2000702-43 = "……Sim, exatamente."
2000702-44 = "Eu queria perguntar uma coisa ao Sensei……."
2000702-45 = "Daqui a cerca de duas semanas, eu planejava fazer um show alugando uma grande casa de shows em Kivotos."
2000702-46 = "Como é diferente dos shows no espaço virtual que eu fazia até agora, eu estava me preparando com mais entusiasmo do que nunca."
2000702-47 = "No meio disso, eu percebi. Não sei o porquê, mas……"
2000702-48 = "minha voz, parou de sair."
2000702-49 = "[s] \"Pelo que estamos conversando agora, não parece haver problemas com sua garganta……?\""
2000702-50 = "Ah, sendo precisa, \"eu não consigo mais cantar\"."
2000702-51 = "Se for uma conversa casual ou um cantarolar leve, não há problema algum, mas quando tento cantar de verdade, por algum motivo, é como se minha garganta ficasse travada……."
2000702-52 = "Eu perguntei aos engenheiros que criaram este corpo, mas eles apenas inclinaram a cabeça……."
2000702-53 = "Foi então que ouvi falar sobre o \"Sensei do Schale\"."
2000702-54 = "Disseram que existe um Sensei adulto que resolve sucessivamente vários incidentes e fenômenos misteriosos em Kivotos……."
2000702-55 = "Pensei que, se fosse esse Sensei, talvez ele tivesse alguma ideia sobre a causa disso."
2000702-59 = "[ns] \"Hmm…….\""
2000702-60 = "N-não é tão fácil assim, né, ahaha……."
2000702-61 = "E-está tudo bem! Eu também não esperava encontrar uma resposta tão rápido……!"
2000702-62 = "Vou tentar investigar um pouco mais."
2000702-63 = "Obrigada, mesmo estando ocupado. Então……"
2000702-67 = "[ns] \"Eu também vou procurar uma solução com você.\""
2000702-68 = "Eh……?"
2000702-69 = "I-isso seria muito grato, mas eu não sou uma residente de Kivotos, nem aluna do Sensei……."
2000702-70 = "Mesmo assim, por que você é tão gentil comigo, que acabei de conhecer hoje……?"
2000702-71 = "[s5] \"Porque sou um adulto.\"\n[s6] \"Se você está em apuros, quero ajudar.\""
2000702-77 = "……Fufu. Como eu ouvi dizer, você é realmente uma pessoa gentil e maravilhosa."
2000702-78 = "Muito obrigada. Então, posso aceitar a sua gentileza?"
2000702-79 = "Eu também farei algumas pesquisas por conta própria. Ficaria feliz se você pudesse procurar se houve algum caso semelhante em algum lugar, Sensei."
2000702-85 = "Então, conto com você a partir de agora. Sensei!"
