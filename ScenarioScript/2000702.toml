[translation]
2000702-1 = "バーチャル・シンガーの秘密"
2000702-2 = "キヴォトス中央区・外郭裏路地"
2000702-3 = "（言われた通りに日が暮れかけた頃、指定された場所へとやってきた）"
2000702-7 = "……お待ちしておりました。"
2000702-13 = "あんなに怪しいメッセージだったのに、"
2000702-14 = "来てくれてありがとうございます。"
2000702-16 = "失礼かなとは思いつつ、"
2000702-17 = "どうしても他の方に知られてしまうわけにはいかなかったので……"
2000702-22 = "[ns] \"あ……。\""
2000702-24 = "私のこと、分かりますか？"
2000702-25 = "[s1] \"初音ミク……だよね？\"\n[s2] \"……？\""
2000702-26 = "ふふっ、その通りです。"
2000702-27 = "ご、ご存じありませんでしたか……。"
2000702-28 = "私はバーチャル・シンガーの、初音ミク。"
2000702-29 = "歌に込められた想いを届ける役割を持った、"
2000702-30 = "ソフトウェアです。"
2000702-31 = "[s] \"バーチャル・シンガー……？\""
2000702-32 = "はい。本来私が活動している場所はバーチャル空間……いわゆる、電子的な仮想空間なんです。"
2000702-33 = "だからこそ、これまで時間や空間などの制限無く、多くの方に歌やそこに込められた心を届けることができたのですが……逆にこうして、誰かと面と向かって交流することは中々できませんでした。"
2000702-34 = "それでも様々な偶然と、素敵な出会いと、「私と実際に会いたい」と言ってくれるファンの方々のおかげで……"
2000702-35 = "キヴォトスのとあるエンジニアの方々の力を借り、こうしてきちんとした物理的な身体を手に入れることができたんです。"
2000702-37 = "ふふっ、キヴォトスの技術力って本当にすごいですね。"
2000702-38 = "今までの私の外見とほとんど一緒ですし、それに今までは自分で体験できなかったこの、風が身体を撫でる感覚や、舌先で感じられるスイーツの甘さ……"
2000702-39 = "今なら、これまでには無かったような素敵なライブができそう！"
2000702-40 = "そう、思っていたのですが……"
2000702-41 = "[s3] \"何かトラブルが？\"\n[s4] \"そこに、こうして私を呼んでくれた理由が？\""
2000702-42 = "……はい、その通りです。"
2000702-43 = "……はい、その通りです。"
2000702-44 = "先生に、お聞きしたいことがありまして……。"
2000702-45 = "約2週後、キヴォトスの大型のライブハウスを借りて、ライブを行う予定だったんです。"
2000702-46 = "今までの仮想空間でのライブとは違うということもあって、私も今まで以上に気合を入れて準備をしていました。"
2000702-47 = "その途中で気づいたんです。何故なのかは分かりませんが……"
2000702-48 = "声が、出なくなってしまったんです。"
2000702-49 = "[s] \"こうして話してる限り、喉には問題なさそうだけど……？\""
2000702-50 = "あ、正確に言うと、「歌うことができなくなってしまった」ですね。"
2000702-51 = "こうしたちょっとした会話や、軽いハミングでしたら何の問題も無いのですが、いざ歌おうとすると何故だか喉が詰まってしまったように……。"
2000702-52 = "この身体を作ってくれたエンジニアの方々にも聞いてみたのですが、首を傾げられてまして……。"
2000702-53 = "そこで、「シャーレの先生」についてのお話を聞いたんです。"
2000702-54 = "キヴォトスの様々な事件や不思議な現象を次々に解決する、大人の先生がいる……と。"
2000702-55 = "そんな先生なら、もしかしてこの原因について何か思い当たる部分があったりしないかなと思いまして。"
2000702-59 = "[ns] \"うーん……。\""
2000702-60 = "そ、そう上手くは行きませんよね、あはは……。"
2000702-61 = "だ、大丈夫です！私もそんなすぐに答えが見つかるとは思っていませんし……！"
2000702-62 = "もう少し、色々と調べてみようと思います。"
2000702-63 = "お忙しいのに、ありがとうございました。では……"
2000702-67 = "[ns] \"私も一緒に方法を探すよ。\""
2000702-68 = "え……？"
2000702-69 = "そ、それはありがたいのですが、私はキヴォトスの住民でもなければ、先生の生徒でもないのに……。"
2000702-70 = "なのに、こうして今日出会ったばかりの私に対して、どうしてこんな親切に……？"
2000702-71 = "[s5] \"大人だからね。\"\n[s6] \"困ってるなら、助けたいよ。\""
2000702-77 = "……ふふっ。聞いた通り、本当に親切で素敵な方ですね。"
2000702-78 = "ありがとうございます、では、厚意に甘えても良いですか？"
2000702-79 = "私も私で、自分なりに少し調べてみますね。先生の方でも、何か似たようなケースがどこかに無かったか探してもらえると嬉しいです。"
2000702-85 = "それではこれから、よろしくお願いしますね。先生！"
