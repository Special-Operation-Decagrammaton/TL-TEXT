[translation]
84312100500-5 = "邪魔するよ。"
84312100500-6 = "最後に挨拶を、と思って……。"
84312100500-10 = "ふむ。これは……何事だい？"
84312100500-16 = "どこ！？私のコントローラー！！"
84312100500-17 = "自分で失くしといて怒らないでよ。#nあと、お姉ちゃんのコントローラーじゃないでしょ。"
84312100500-18 = "どこぉ……私たちのコントローラー！"
84312100500-20 = "ふ、二人とも落ち着いて……。"
84312100500-22 = "（……コントローラー？）"
84312100500-26 = "どうかしたのかい？"
84312100500-33 = "あっ！シーフ王です！シーフ王が助けに来てくれました！"
84312100500-34 = "いつの間に来たんですか？#n全然気づきませんでした！流石はシーフ王です！"
84312100500-36 = "……ありがとう。"
84312100500-37 = "あれ、セイアさん……どうされたんですか？"
84312100500-38 = "あっ、お姉ちゃんのあれは気にしないでください。#nコントローラーを失くしてゲームができないだけなので。"
84312100500-39 = "失くしたんじゃなーいー！これは盗まれたの！そう、部外者が盗んでいったんだ！"
84312100500-40 = "事件だ！侵入事件だーっ！"
84312100500-41 = "そんなわけないでしょ……。 "
84312100500-42 = "ふむ……。"
84312100500-43 = "私も探すのを手伝おう。意外と近くを見落としがちだからね。"
84312100500-45 = "ぱんぱかぱーん！シーフ王がパーティーに加入しました！"
84312100500-46 = "シーフ王と一緒に宝探しクエスト開始です！！"
84312100500-53 = "うん……？"
