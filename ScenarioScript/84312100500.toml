[translation]
84312100500-5 = "Com licença."
84312100500-6 = "Pensei em passar para me despedir..."
84312100500-10 = "Hum. O que é... que está acontecendo aqui?"
84312100500-16 = "Onde está!? O meu controle!!"
84312100500-17 = "Não fique brava sendo que você mesma perdeu. #nAlém disso, esse nem é o controle da sua irmã."
84312100500-18 = "Onde está... o nosso controle!"
84312100500-20 = "A-as duas, por favor, se acalmem..."
84312100500-22 = "(...Controle?)"
84312100500-26 = "Aconteceu alguma coisa?"
84312100500-33 = "Ah! É o Rei Ladrão! O Rei Ladrão veio nos ajudar!"
84312100500-34 = "Quando você chegou? #nNem percebemos! Como esperado do Rei Ladrão!"
84312100500-36 = "...Obrigada."
84312100500-37 = "Ah, Seia-san... o que houve?"
84312100500-38 = "Ah, não ligue para aquilo da minha irmã. #nEla só perdeu o controle e não consegue jogar."
84312100500-39 = "Eu não perdi! Ele foi roubado! Isso mesmo, um intruso veio e roubou!"
84312100500-40 = "É um caso! Um caso de invasão!"
84312100500-41 = "Não tem como ser isso..."
84312100500-42 = "Hum..."
84312100500-43 = "Eu vou ajudar a procurar também. Às vezes, deixamos passar coisas que estão bem perto."
84312100500-45 = "Tan-tan-ta-ran! O Rei Ladrão entrou para o grupo!"
84312100500-46 = "A missão de caça ao tesouro com o Rei Ladrão começou!!"
84312100500-53 = "Hm...?"
