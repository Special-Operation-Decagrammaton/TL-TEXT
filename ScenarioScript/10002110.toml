[translation]
10002110-1 = "Episódio 11; Vôlei de Praia"
10002110-2 = "(Só restam mais dois na lista)"
10002110-4 = "Bem, vamos começar o vôlei de praia!"
10002110-5 = "A bola também está bem aqui!"
10002110-6 = "Para ser mais exata, a \"bola que o Sensei comprou para nós\"."
10002110-7 = "Uuu..."
10002110-8 = "Desculpe por esquecer tantas coisas... E obrigada, Sensei."
10002110-9 = "Tem menos gente agora e não vejo as Sukebans por perto... Desta vez parece que nada vai acontecer."
10002110-10 = "[s1] \"Hifumi, você está bem...?\"\n[s2] \"Parece que você está com uma expressão cansada...\""
10002110-11 = "E-estou bem...!"
10002110-12 = "E-estou bem...!"
10002110-13 = "É só que... eu fico pensando se isso está certo..."
10002110-14 = "Na verdade, não era para ser assim..."
10002110-15 = "No começo, eu só queria mostrar o mar para a Azusa-chan... e, se possível, passar um tempo divertido com todo mundo..."
10002110-16 = "Mas eu estou me divertindo."
10002110-17 = "Não, bem, fico feliz em ouvir isso. Mas, como posso dizer, as férias de verão deveriam ser..."
10002110-18 = "Algo que você faz sem medo, e não algo onde você é atacada por Sukebans várias vezes..."
10002110-19 = "Além disso, toda vez que tentamos fazer algo, alguém aparece gritando \"Te achamos!\" e atrapalha tudo—"
10002110-29 = "Te achamos!! Então era aqui que vocês estavam!"
10002110-30 = "Nos deram o maior trabalho, escondidas em um lugar desses!"
10002110-35 = "[ns] \"...\""
10002110-37 = "Vamos revidar!"
10002110-38 = "Uuu... sim..."
