[translation]
10002110-1 = "第11話;ビーチバレー"
10002110-2 = "（リストに残っているのはあと二つ）"
10002110-4 = "では、ビーチバレーを始めましょう！"
10002110-5 = "ボールもちゃんとここにあります！"
10002110-6 = "正確には「先生が買ってくれたボール」が、ですね。"
10002110-7 = "うう……。"
10002110-8 = "忘れ物ばっかりでごめんなさい……先生も、ありがとうございます。"
10002110-9 = "少し人も減ってきて、スケバンの方々も見当たりませんし……今度こそ何も起きなさそうですね。"
10002110-10 = "[s1] \"ヒフミ、大丈夫……？\"\n[s2] \"表情が疲れてる気が……。\""
10002110-11 = "だ、大丈夫です……！"
10002110-12 = "だ、大丈夫です……！"
10002110-13 = "ただその、これで良いのかなって思ってしまって……。"
10002110-14 = "本当なら、こんなはずではなかったのですが……。"
10002110-15 = "最初はただ、アズサちゃんに海を見せてあげたくて……できればみんなで、楽しい時間を過ごしたいなって……。"
10002110-16 = "私は楽しいけど？"
10002110-17 = "いえ、えっと、それは嬉しいのですが。何と言いますか、夏休みというのは……。"
10002110-18 = "恐る恐る何かをするようなものでもなく、何度もスケバンの方々から襲撃されるものでもないはずで……。"
10002110-19 = "それにああやって、何かをする度に「見つけたぞ！」って邪魔が入ってくると――"
10002110-29 = "見つけたぞ！！ここにいたのか！"
10002110-30 = "手間をかけさせやがって、こんなところに隠れてたのか！"
10002110-35 = "[ns] \"……。\""
10002110-37 = "応戦します！"
10002110-38 = "うぅ……はい……。"
