[translation]
1000302-1 = "Novos produtos!"
1000302-2 = "Academia Trinity - Sala de Aula"
1000302-3 = "Ah, Sensei! Olá!"
1000302-4 = "Hehe, como eu disse no MomoTalk, eu consegui uns produtos novos."
1000302-5 = "Dê uma olhada! Tcharam!"
1000302-6 = "É um travesseiro de pescoço super fofinho em formato do Wave Cat!"
1000302-7 = "Com isso, eu posso tirar uma soneca em qualquer lugar!"
1000302-8 = "[s] \"...Wave Cat?\""
1000302-9 = "Ué...? Sensei, por acaso você não conhece o Wave Cat?"
1000302-10 = "O Wave Cat aparece no Momo Friends, é um gato de corpo longo e o melhor amigo inseparável do Peroro-sama!"
1000302-11 = "Não chega ao nível da dança do Peroro-sama, mas ele sempre faz uma dança maravilhosa e é muito popular entre os fãs de Momo Friends."
1000302-12 = "E essa corujinha em cima do Wave Cat se chama Big Brother-sama!"
1000302-13 = "Dizem que o Big Brother-sama consegue descobrir qualquer verdade apenas olhando fixamente para alguém, por isso ele é muito popular como um amuleto da sorte entre os estudantes que vão prestar exames."
1000302-14 = "E esse quokka aqui do lado é o Sr. Nikolai..."
1000302-15 = "Ah, desculpe! Só eu fiquei falando!"
1000302-16 = "É que eu fico tão empolgada quando começo a falar de Momo Friends..."
1000302-17 = "[s] \"Tudo bem, eu também estou me divertindo.\""
1000302-18 = "Fico feliz que você também esteja se divertindo, Sensei. Mas..."
1000302-19 = "Muitos dos meus amigos não gostam quando eu falo sobre Momo Friends..."
1000302-20 = "Dizem que os personagens de Momo Friends são todos meio estranhos ou excêntricos..."
1000302-21 = "Mas eu acho que é justamente esse o charme deles. Acho maravilhoso que eles tenham personalidades únicas que outros personagens não possuem."
1000302-22 = "Eu sou uma pessoa comum, sem nada de especial... então, quando vejo esses personagens, acabo sentindo uma certa admiração..."
1000302-23 = "[s] \"Eu também gosto de pessoas comuns.\""
1000302-24 = "Ah, ahaha... é mesmo? Ouvir isso me deixa um pouco envergonhada..."
1000302-25 = "Ah, Sensei. Quer experimentar este travesseiro de pescoço do Wave Cat?"
1000302-26 = "Ele é super fofinho e confortável~"
1000302-30 = "Ah, combinou com você! Parece até um novo personagem de Momo Friends!"
1000302-31 = "O que achou? Não dá vontade de dormir só de colocar no pescoço?"
1000302-32 = "...Mas eu não posso te dar esse travesseiro. Foi muito difícil de conseguir!"
1000302-34 = "Mas, se você precisar... eu posso te emprestar."
