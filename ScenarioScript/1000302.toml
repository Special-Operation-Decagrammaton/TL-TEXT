[translation]
1000302-1 = "新作グッズ！"
1000302-2 = "トリニティ総合学園・教室"
1000302-3 = "あっ、先生！こんにちは！"
1000302-4 = "えへへ、モモトークでお伝えした通り、新しいグッズをゲットしたんです。"
1000302-5 = "見てください！じゃーん！"
1000302-6 = "「ウェーブキャット」さんの形をした、ふかふかのネックピローですー！"
1000302-7 = "これさえあれば、どこでもぐっすりお昼寝ができるんです！"
1000302-8 = "[s] \"……ウェーブキャット？\""
1000302-9 = "あれ……？先生、もしかしてウェーブキャットさんをご存じないですか？"
1000302-10 = "ウェーブキャットさんはモモフレンズに登場する、長い体を持った猫で、ペロロ様の唯一無二の親友なんですよ！"
1000302-11 = "ペロロ様のペロロダンスほどではありませんが、いつも素敵なダンスを踊る、モモフレンズマニアたちの間では人気が高い子なんです。"
1000302-12 = "そしてウェーブキャットさんの上に乗ってるこの小さいフクロウは、ビッグブラザー様といいます！"
1000302-13 = "ビッグブラザー様は、相手をじっと見つめるだけでありとあらゆる真実が分かるので、受験生たちのお守りのキャラクターとして人気が高いんですよ。"
1000302-14 = "そしてこの横にあるクアッカワラビーはMr.ニコライさんといって……。"
1000302-15 = "あっ、私ばっかり喋ってました、すみません！"
1000302-16 = "モモフレンズの話をしてると思わず楽しくなっちゃいまして……。"
1000302-17 = "[s] \"大丈夫、こっちも楽しいから。\""
1000302-18 = "先生も楽しいなら良かったです。ですが……。"
1000302-19 = "私がモモフレンズの話をすると、それを嫌がる友達も多くて……。"
1000302-20 = "モモフレンズのキャラクターたちはみんなどこかひねくれていたり、変わったキャラクターしかいないって……。"
1000302-21 = "でも私は、そこが魅力だと思うんです。普通ではない、他のキャラクターたちが持たない個性を持っているということは、とても素敵なことだと思います。"
1000302-22 = "私は特別な何かなんて持っていない、平凡な人間なので……そんなキャラクターたちを見ていると、なんだか憧れてしまいます……。"
1000302-23 = "[s] \"私は平凡なのも好きだよ。\""
1000302-24 = "あ、あはは……そうですか？そう言われると、なんだか恥ずかしいです……。"
1000302-25 = "そうだ、先生。このウェーブキャットさんのネックピロー、一度使ってみますか？"
1000302-26 = "ふかふかで気持ちいいですよ～。"
1000302-30 = "あは、お似合いです！まるでモモフレンズの新しいキャラクターみたいです！"
1000302-31 = "どうですか？首にかけてるだけで眠くなってきません？"
1000302-32 = "……でもこのネックピローはお渡しできません。私も手に入れるのに苦労したので！"
1000302-34 = "でも、もし必要でしたら……その時は、お貸ししますから。"
