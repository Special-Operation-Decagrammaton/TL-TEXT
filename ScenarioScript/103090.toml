[translation]
103090-1 = "Episódio 9; A Última Noite na Terra"
103090-2 = "Schale - Alojamento Temporário"
103090-4 = "……Sendo assim, as coisas vão ser desse jeito, Noah."
103090-5 = "Sim. Eu já entendi a situação, Yuuka-chan."
103090-6 = "Enquanto isso, o distrito da Millennium――"
103090-7 = "Não. Nós protegeremos Kivotos inteira."
103090-8 = "Uhum, conto com você. "
103090-11 = "Eu é quem digo... Contamos com você. "
103090-18 = "Por favor, só tome cuidado para não se machucar."
103090-23 = "……Uhum."
103090-26 = "――Hoshino-senpai..."
103090-27 = "Então é isso, Ayane-chan.#nNós também vamos embarcar na \"Utnapishtim\" e ir pra \"Arca\" com o Sensei."
103090-28 = "A gente não ia deixar a Ayane-chan ir sozinha de jeito nenhum!"
103090-29 = "M-Mas..."
103090-31 = "Vocês podem ter que lutar assim que chegarem na Arca, não é?"
103090-32 = "Se for o caso, acredito que quanto mais gente pra ajudar, melhor."
103090-33 = "E além disso..."
103090-34 = "A Shiroko-chan deve estar lá na Arca, não é?"
103090-41 = "……。"
103090-42 = "……Sim, bem provável."
103090-43 = "A Ayane-chan não é a única que quer encontrar a Shiroko-senpai.#nTodo mundo aqui quer a mesma coisa."
103090-45 = "A Shiroko-chan daquele jeito com certeza vai vir atrapalhar a gente..."
103090-46 = "E capturar ela é o papel do tio aqui~"
103090-47 = "Eu também já avisei isso pro Sensei."
103090-48 = "Mas... a chance de sucesso dessa operação é muito baixa.#nNós precisamos pensar no que fazer caso a gente falhe――"
103090-52 = "Para de falar essas coisas deprimentes!"
103090-53 = "V-Vocês são...!"
103090-62 = "Uau~ É o pessoal da Faz-Tudo☆"
103090-65 = "Opa~ Viemos dar um oizinho!"
103090-66 = "B-Bom trabalho...!"
103090-67 = "Haa... o clima aqui também tá pesadão."
103090-68 = "A operação nem começou direito e vocês já tão pensando em falhar?"
103090-70 = "H-Hã? Err..."
103090-73 = "Em momentos assim, você tem que dizer! "
103090-78 = "\"Quando a gente voltar sãs e salvas, vamos todo mundo comer lamen!\" ou algo do tipo!"
103090-85 = "E-Entendo... Isso é ser \"hard-boiled\"! A Aru-sama é a melhor!!"
103090-86 = "……Sinceramente, pra mim isso soa mais como uma death flag."
103090-87 = "Kufufu... Mas sabe, a Aru-chan, quando ouviu que a Kayoko-chan ia sozinha, ela ficou com os olhos super marejados e disse――"
103090-89 = "E-Espera aí! Quando foi que eu――"
103090-90 = "Ahaha! Ela disse: \"Não vai se machucar~\" e \"Toma muito cuidado~\"――"
103090-91 = "E-Eu não falei nada disso!?"
103090-93 = "……Bom, eu sei que vocês devem tá com um monte de preocupações, mas relaxem."
103090-94 = "É um plano em que as garotas de várias academias tão juntando forças――e o Sensei [USERNAME] também tá lá. "
103090-95 = "Já que o Sensei tá lá... vai dar tudo certo, não importa o que aconteça."
103090-96 = "……Uhum."
103090-98 = "É verdade..."
103090-99 = "Foi graças ao Sensei que a gente conseguiu chegar até aqui..."
103090-100 = "……。"
103090-101 = "……。"
103090-121 = "Sim... Aquelas coisas que a gente achou que não ia conseguir fazer de jeito nenhum, acabaram dando certo no fim das contas."
103090-122 = "Pois é... Então, a gente só precisa acreditar que dessa vez também vai dar tudo certo."
103090-127 = "……Uhum!"
103090-128 = "A gente vai resgatar a Shiroko-chan."
103090-129 = "Isso aí! É a Operação de Captura da Shiroko-chan☆"
103090-131 = "Já falei que a Shiroko-senpai não é um bicho selvagem..."
103090-133 = "Alojamento Temporário - Área de Escavação no Deserto"
103090-136 = "Eu vim porque ouvi dizer que tinham descoberto uma \"nave de guerra espacial\"... "
103090-137 = "Hmm, mas é um pouquinho diferente do que a gente imaginava."
103090-139 = "Pois é... Não dá pra ir pro espaço e parece que também não tem nenhuma arma nela.#nSerá que isso é... alguma coisa diferente de uma nave de guerra espacial?"
103090-141 = "O Sensei disse que vai \"usar isso pra ir atacar a base inimiga\"..."
103090-142 = "……Mana, e o que a gente vai fazer?"
103090-143 = "Hmm... Acho melhor a gente voltar pra Millennium, como a Yuuka sugeriu.#n……Se ficarmos aqui, só vamos atrapalhar o pessoal..."
103090-149 = "A Aris quer ir com o Sensei."
103090-151 = "……Aris-chan?"
103090-152 = "M-Mas por quê...?"
103090-153 = "É, por que!?#nEssa nave não vai pro espaço, então você não vai poder estrear como \"Heroína Espacial\", viu?"
103090-154 = "Isso é muito triste, mas..."
103090-155 = "Porque a Aris é a única que pode proteger essa nave."
103090-157 = "Hã... Como assim, Aris-chan?"
103090-158 = "Err... Você quer dizer porque a nave... não tem armas...?"
103090-159 = "Você quer ir porque você tem a \"Espada de Luz\"...?"
103090-161 = "Sim. A \"Espada de Luz\" da Aris é uma arma que o pessoal do Departamento de Engenharia construiu pra ser usada em naves de guerra espaciais. "
103090-162 = "Atualmente em Kivotos, a Aris é a única que consegue usar ela."
103090-165 = "……。"
103090-167 = "O pessoal do Departamento de Engenharia disse que \"fizeram mais de brincadeira\" e que \"com essa potência, não seria útil num combate de nível espacial\", mas..."
103090-168 = "Mesmo assim... se a Aris for o único meio de proteger a nave,"
103090-169 = "Se a Aris puder ser útil para o Sensei, nem que seja só um pouquinho... Ela quer ir."
103090-171 = "M-Mas... "
103090-172 = "É, eu entendo como a Aris se sente.#nO Sensei já ajudou a gente pra caramba. "
103090-181 = "……E-Então, vamos todas nós juntas?"
103090-183 = "Hã... ehhh!?"
103090-184 = "Yuzu-chan...?"
103090-186 = "É-É que... a gente já passou por um monte de situações perigosas até aqui... "
103090-187 = "E no meio delas, teve muita coisa que a gente não entendeu direito... muita coisa que a gente nunca conseguiria ter resolvido sozinhas..."
103090-188 = "I-Isso é verdade, mas..."
103090-189 = "Até hoje eu não entendo muito bem por que a Presidente do Conselho Estudantil tava atrás da Aris-chan... nem o que aconteceu naquela época..."
103090-190 = "B-Bom, eu também não..."
103090-191 = "Mas isso não significa que a gente precise ir junto!"
103090-192 = "É-É verdade..."
103090-194 = "……。"
103090-196 = "Eu... não quero mais que a gente seja deixada de fora. "
103090-197 = "Mesmo que eu não entenda a situação, se eu estiver com todo mundo... eu acho que vou ficar bem..."
103090-198 = "Teve muita coisa que a gente não entendeu da última vez também... mas... como a gente tava com todo mundo, com o Sensei... eu não senti tanto medo..."
103090-199 = "Conhecemos pessoas novas também... como o pessoal do Esquadrão RABBIT, a Presidente do Comitê Disciplinar...#nC-Claro que eu senti muito medo, mas――"
103090-204 = "――Foi muito melhor do que ficar tremendo de medo escondida num armário."
103090-205 = "Por isso, eu... quero ir junto com a Aris-chan. "
103090-206 = "Afinal, o Departamento de Desenvolvimento de Jogos só continua existindo até hoje por causa dela..."
103090-207 = "Então, se tem algo que a Aris-chan quer fazer...#nAcho que agora é a nossa vez de ajudar ela..."
103090-208 = "Porque a gente... é n-nossa companheira...!"
103090-213 = "……。"
103090-215 = "Você tem razão, Yuzu... Muito bem dito!#nMidori, vamos nós também!"
103090-216 = "Uhum, mana... Aris-chan, a gente pode não virar \"Heroínas Espaciais\", mas... vamos ser o poder de fogo principal da nave!"
103090-218 = "……Uhum! Com todo mundo junto, sinto como se tivesse a força de cem pessoas!#nA Aris não tem mais medo!"
103090-220 = "Aris-chan... você tava com medo?"
103090-221 = "Sim. Eu tava com muito, muito medo."
103090-226 = "……A \"Key\" ainda continua dentro da Aris."
103090-232 = "Hã!? A K-Key... SÉRIO!?#nAchei que você tinha dado uma surra nela com a Espada de Luz..."
103090-233 = "No fim, o nome dela vai ficar \"Key\" mesmo... é..."
103090-235 = "A Aris ainda não sabe qual a verdadeira identidade da Key...#nNem o que ela quer da Aris."
103090-236 = "……A Aris não entende direito nem sobre a própria \"Aris\". "
103090-237 = "A Key disse que a Aris é... a princesa que os \"Deuses Sem Nome\" deixaram pra trás.#nA Presidente Rio disse que eu era uma arma que ia destruir o mundo."
103090-238 = "A \"Princesa\", a \"Key\", a \"Arca\", os \"Deuses Sem Nome\"... A Aris não sabe nada de nada sobre essas coisas relacionadas a ela..."
103090-239 = "Mas... por causa de todo mundo... e do Sensei..."
103090-240 = "Mesmo sem saber dessas coisas, a Aris acha que conseguiu se tornar a \"Aris\"."
103090-244 = "[ns] \"Uhum. Você pode ser uma heroína.\""
103090-246 = "[ns] \"Você pode ser quem você quiser ser, Aris.\""
103090-248 = "……"
103090-249 = "A Aris quer ir com todo mundo... com as suas companheiras salvar o Sensei. "
103090-250 = "Porque a Aris quer ser uma heroína... Porque eu quero ser um membro do Departamento de Desenvolvimento de Jogos,"
103090-251 = "E porque eu quero que a própria Aris, e não outra pessoa... decida quem é a \"Aris\"!"
103090-252 = "Aris-chan..."
103090-254 = "Uhum... Aris-chan, vamos todo mundo junto amanhã. Nós com certeza estaremos ao seu lado."
103090-255 = "Aris, você mandou muito bem! Você pareceu uma heroína de verdade agora!!"
103090-257 = "Sim! Claro que sim! Porque a Aris é uma heroína! "
103090-258 = "E também, mesmo que não tenha rolado dessa vez... um dia a Aris pretende se tornar uma Heroína Espacial!"
103090-260 = "Você ainda não desistiu disso..."
103090-262 = "É-É que parece que é um gênero muito afetado por modinhas, se não aproveitarmos logo, vai ser tarde..."
103090-264 = "Não, não!"
103090-265 = "Essas coisas duram mais do que a gente pensa, sabia?"
103090-267 = "Que nem aquele clássico, o \"Tornado de Dinossauros\", que é amado por muuuito tempo!"
103090-272 = "Cê quer dizer um clássico dos piores, né?"
103090-277 = "A-A Heroína Espacial é..."
103090-278 = "Tipo o Tornado de Dinossauros, né..."
103090-280 = "Eita... A Aris-chan ficou deprimida...!?"
103090-286 = "E foi assim――que tudo aconteceu."
103090-287 = "Hanako-chan..."
103090-288 = "Entendo. Será uma missão e tanto, com certeza."
103090-290 = "M-Mas vai dar tudo certo, né?"
103090-291 = "Ué... bem, o Sensei vai tá lá, então... "
103090-292 = "Sim, tenho certeza que vai dar tudo certo. Ufufu♡"
103090-293 = "É verdade, se o Sensei está lá, com certeza..."
103090-294 = "……Sabe, às vezes eu fico pensando."
103090-298 = "Se o Sensei não tivesse aparecido para ser o Sensei conselheiro do Clube de Aulas de Reposição naquela época,"
103090-299 = "O que teria sido de nós?――é o que me pergunto."
103090-307 = "I-Isso é..."
103090-308 = "Foi apenas por causa do Sensei que nós conseguimos resolver tudo aquilo..."
103090-327 = "……。 "
103090-328 = "……。 "
103090-329 = "Hanako-chan..."
103090-330 = "Tome muito cuidado, viu, Hanako.#nEnquanto você estiver fora, nós vamos proteger a academia."
103090-331 = "Isso mesmo! Dá um jeito em tudo por lá rapidinho enquanto a gente protege Kivotos!"
103090-333 = "Fufu, entendido――Voltarei num piscar de olhos."
103090-335 = "Ako, tome cuidado com a sua saúde."
103090-336 = "Presidente..."
103090-337 = "É melhor que eu fique por aqui――essa foi a decisão certa.#nAfinal, se acontecer alguma emergência, sou eu a pessoa mais eficiente para lidar com a situação."
103090-338 = "……Uhum. Sendo assim, voltarei para relatar tudo."
103090-339 = "Beleza. Tô no aguardo."
103090-341 = "……。"
103090-343 = "……。"
103090-345 = "Você está preocupada? Seia-san."
103090-346 = "Não, não é isso――"
103090-348 = "Olha só quem tá falando, em qual xícara você já tá, Nagi-chan~?#nVocê bebe tanto chá assim e acha que vai conseguir dormir à noite?"
103090-350 = "N-Não, isso é..."
103090-351 = "……Eu estava me perguntando se, por acaso, ainda teria o poder dos sonhos premonitórios."
103090-352 = "Seia-san..."
103090-354 = "Hehe, então a Seia-chan também tá preocupada."
103090-355 = "Mas eu também tô."
103090-356 = "Porém, esse tipo de história sempre tem um final feliz, não é?#nPor isso――vamos acreditar."
103090-357 = "……Tem razão. Até mesmo nós nos reunirmos assim seria impossível sem o Sensei."
103090-358 = "Portanto... vamos acreditar, como a Mika sugeriu."
103090-359 = "Isso mesmo☆#nSe não fosse pelo Sensei――"
103090-363 = "Peraí, melhor não pensar nesse tipo de coisa agora."
103090-368 = "Sensei, e todas vocês――por favor,"
103090-369 = "……Por favor, que a sorte as acompanhe."
103090-370 = "Pode deixar a segurança lá embaixo com a gente☆"
103090-372 = "O-O que nós deveríamos fazer?"
103090-373 = "Não vamos fazer nada de diferente do normal.#nEnquanto o Sensei estiver na operação, nós vamos defender D.U.――"
103090-374 = "Digo, a segurança de toda Kivotos."
103090-375 = "\"Manter a ordem em Kivotos enquanto o Sensei estiver fora\", essa é a missão de nós da SRT."
103090-376 = "Aham. A Kaiser sumiu do mapa por enquanto, mas nunca se sabe quando eles podem voltar pra causar mais problemas."
103090-377 = "Pois é~#nE o Conselho Estudantil Geral também tá correndo de um lado pro outro tentando organizar toda a bagunça."
103090-378 = "……Mas, pela lerdeza deles, acho que só vão conseguir depois que o Sensei já tiver voltado, né não?"
103090-380 = "Uuu... Espero que o Sensei fique bem."
103090-381 = "Relaxa, Miyu, não precisa se preocupar tanto.#nSendo o Sensei, com certeza ele vai voltar como se nada tivesse acontecido."
103090-383 = "……É verdade. O Sensei passa essa vibe mesmo."
103090-384 = "Kuhihi... Pois é. Até que passa mesmo. "
103090-389 = "……Nenhum rastro do inimigo por aqui."
103090-394 = "……。"
103090-395 = "Sa-chan, aconteceu alguma coisa?"
103090-396 = "……Não, não foi nada."
103090-398 = "Cê deve tá pensando: \"quem diria que a gente lutaria lado a lado com a Trinity...\", não é?"
103090-399 = "É-É, tem razão... Um monte de coisas que eu nem conseguia imaginar antes tão acontecendo uma atrás da outra..."
103090-400 = "Viver ainda é doloroso... mas, como eu posso dizer... "
103090-401 = "A gente passou a esperar pelo \"amanhã\", né."
103090-402 = "S-Sim... Eu não sabia direito como expressar isso, mas é bem isso mesmo..."
103090-403 = "……。"
103090-405 = "……Nós podemos deixar pra falar o que achamos depois que tudo isso acabar."
103090-406 = "Parece que a ameaça dos \"Sanctums Falsos\" ainda não acabou."
103090-409 = "S-Sim...!"
103090-410 = "É isso aí. A vida é dura e cheia de dor, né, hehehe..."
103090-411 = "Além disso, alguém como a gente tem que dar um duro danado nos bastidores pra que a protagonista brilhe."
103090-416 = "……。 "
103090-417 = "……Mas eu tô muito feliz de poder ficar com todo mundo de novo. "
103090-419 = "Hi... Hime-chan..."
103090-420 = "……。"
103090-426 = "E algum dia―― "
103090-427 = "――É... Com certeza."
103090-441 = "……Rin-senpai, você está aí? "
103090-442 = "……Sim, o que foi, Ayumu?"
103090-452 = "Sinto muito por interromper o seu descanso..."
103090-453 = "Mas eu precisava que você desse uma olhadinha nisso urgente..."
103090-460 = "A rede de comunicação de emergência do Conselho Estudantil Geral tá tocando faz um tempinho...#nParece que estão te procurando, Rin-senpai."
103090-461 = "……Então eles conseguiram restaurar a rede de comunicação. "
103090-465 = "Esse código é..."
103090-466 = "Sim... Acredito que seja a Chefe de Finanças.#nErr... eu fiquei em dúvida se devia desligar a chamada ou não, mas por precaução eu..."
103090-467 = "Eu entendo. Vou atender."
103090-468 = "S-Sim... Sendo assim, com licença..."
103090-469 = "Sim. Obrigada, Ayumu. "
103090-479 = "……Administradora Rin――!"
103090-480 = "Onde você est――? Você não se machucou, né!? "
103090-481 = "Chefe de Finanças... Que bom que você está a salvo. "
103090-482 = "――Não tô te escutando direito. Com muito sacrifício, a gente conseguiu reestabelecer a rede de comunicação――"
103090-483 = "Onde você tá?――A Torre Sanctum agora――"
103090-484 = "Reunimos as outras Chefes――E a Kaiser――"
103090-485 = "Administradora Rin―― "
103090-486 = "……Aoi."
103090-487 = "Me desculpe, Rin-senpai.#nEu nunca achei que as coisas chegassem a esse ponto――"
103090-488 = "……Não, eu não sinto rancor de você.#nVocê estava apenas fazendo o seu trabalho."
103090-489 = "Portanto, eu também vou apenas fazer o meu."
103090-490 = "――Onde você tá, e o que tá――Com a Schale?――"
103090-494 = "Aoi."
103090-498 = "Se algo acontecer comigo, o Conselho Estudantil Geral e――#nKivotos, eu deixo nas suas mãos."
103090-499 = "……O quê!? O que você disse―― "
103090-500 = "……Por favor, cuide-se, Aoi."
103090-508 = "（E assim――o dia raiou, encerrando a nossa última noite na superfície）"
103090-514 = "Sensei, os preparativos para a decolagem foram concluídos."
103090-515 = "Todos estão aguardando na ponte de comando."
103090-516 = "[ns] \"Uhum, entendido.\""
103090-520 = "[ns] \"Sendo assim... Vamos lá.\""
103090-526 = "Próximo episódio; Aos Confins do Céu"