[translation]
103090-1 = "第9話;地上最後の夜"
103090-2 = "シャーレ・仮宿"
103090-4 = "……そういう事だから、ノア。"
103090-5 = "はい。ユウカちゃん、お話は伺いました。"
103090-6 = "その間、ミレニアム自治区は――"
103090-7 = "いえ、キヴォトスは私たちが守りますので。"
103090-8 = "うん、よろしくね。 "
103090-11 = "こちらこそ……よろしくお願いしますね。 "
103090-18 = "どうか怪我だけはしないよう、気をつけて行ってきてください。"
103090-23 = "……うん。"
103090-26 = "――ホシノ先輩……"
103090-27 = "そういうことだから、アヤネちゃん。#n私たちも「ウトナピシュティム」に乗って、先生と一緒に「箱舟」に向かうよ。"
103090-28 = "アヤネちゃん一人を行かせるわけないでしょ！"
103090-29 = "で、ですが…… "
103090-31 = "箱舟に着いたら戦うことになるかもしれないんですよね？"
103090-32 = "それでしたら、人手は多ければ多いほど良いと思うんです。"
103090-33 = "それに……"
103090-34 = "その箱舟には、シロコちゃんがいるんですよね？"
103090-41 = "……。"
103090-42 = "……はい、おそらくは。"
103090-43 = "シロコ先輩に会いたいのは、アヤネちゃんだけじゃない。#nここにいるみんな同じなのよ。"
103090-45 = "あの状態のシロコちゃんだったら、私たちの邪魔に来るだろうし……"
103090-46 = "捕まえるのは、おじさん達の役目だからね～"
103090-47 = "それは、先生にも伝えてるよ。"
103090-48 = "ですが……この作戦は、成功確率がとても低いんです。#n私たちが失敗した時の事を考えないと――"
103090-52 = "そんな辛気臭いこと言うんじゃないわよ！"
103090-53 = "あ、あなた達は……！ "
103090-62 = "わあ～便利屋のみなさん☆"
103090-65 = "やっほ～、遊びに来たよ！"
103090-66 = "ご、ご苦労様です……！"
103090-67 = "はぁ……ここの空気も重い。"
103090-68 = "まだ作戦が始まってもいないのに、もう失敗した時の話？ "
103090-70 = "はっ、はい？ええっと……"
103090-73 = "こういう時はね！ "
103090-78 = "「無事に帰ってきたら、みんなでラーメン食べに行こう！」とでも言いなさいよ！"
103090-85 = "な、なるほど……それがハードボイルド！さすがはアル様です！！"
103090-86 = "……いや、むしろフラグに聞こえるんだけど。"
103090-87 = "くふふっ……でもアルちゃんね、カヨコちゃんが一人で行くって話を聞いたらすっごい涙ぐみながら――"
103090-89 = "ちょ、ちょっと！私がいつ――"
103090-90 = "あははっ！怪我しないように～、とか重々気をつけてほしい～、だとか――"
103090-91 = "そ、そんなこと言ってないわよ！？"
103090-93 = "……まぁ色々心配事があるだろうけど、大丈夫でしょ。"
103090-94 = "学園を越えて力を合わせた計画だし――[USERNAME]先生も一緒だから。 "
103090-95 = "先生がいるから……どんなことが起きても、きっと大丈夫。"
103090-96 = "……はい。"
103090-98 = "そうだねぇ……"
103090-99 = "先生がいたから、今までも――"
103090-100 = "……。"
103090-101 = "……。"
103090-121 = "はい……私たちだけでは絶対できなかった事も、なんとかなりました。"
103090-122 = "そうだね……だから、今回もきっと大丈夫って信じればいいんだよ。"
103090-127 = "……はい！"
103090-128 = "私たちでシロコちゃんを助けよう。"
103090-129 = "うんうん！シロコちゃん捕獲作戦です☆"
103090-131 = "だから、シロコ先輩は野生動物じゃないってば……"
103090-133 = "砂漠・発掘エリアの仮宿"
103090-136 = "「宇宙戦艦」が発見された、って聞いたから来てみたけど…… "
103090-137 = "うーん、私たちの想像してたのとはちょっと違ったね。"
103090-139 = "そうだね……宇宙には出られないし、武装も無いみたいだし。#nこれって、宇宙戦艦とは違う別の何か……なのかな。"
103090-141 = "先生は「これに乗って本拠地の攻略に行く」って言うし……"
103090-142 = "……お姉ちゃん、私たちはどうするの？"
103090-143 = "んー……ユウカが言ってたように、ミレニアムに帰った方がいいと思う。#n……ここにいたところで、みんなに迷惑をかけちゃうだけだし……"
103090-149 = "アリスは、先生と一緒に行きたいです。"
103090-151 = "……アリスちゃん？"
103090-152 = "ど、どうして……？"
103090-153 = "えっ、なんで！？#nこれは宇宙に出られないから、「宇宙勇者」デビューはできないよ？"
103090-154 = "それはとても残念ですが……"
103090-155 = "この戦艦を守れるのはアリスだけだから、です。"
103090-157 = "えっ……アリスちゃん、それはどういう事？"
103090-158 = "えっと……それって、戦艦に、武器が無いから……？"
103090-159 = "「光の剣」を持ってるから、アリスちゃんは行きたいの……？"
103090-161 = "はい。アリスが持っている「光の剣」は、エンジニア部のみなさんが宇宙戦艦用として製作した武器です。 "
103090-162 = "今のキヴォトスで、これを扱えるのはアリス以外いません。"
103090-165 = "……。"
103090-167 = "エンジニア部のみなさんは、「半分は遊びで作ったものだし、この程度の出力では戦艦級の戦闘には役に立たない」と言っていましたが……"
103090-168 = "だとしても……あの戦艦を守れる、唯一の方法がアリスなら、"
103090-169 = "アリスが少しでも、先生の役に立てるのなら……アリスは行きたいです。"
103090-171 = "で、でも…… "
103090-172 = "うん、アリスの気持ちも分かるよ。#n先生には、本当にいっぱい助けてもらったから。 "
103090-181 = "……じゃ、じゃあ、わたし達みんなで行く？"
103090-183 = "えっ……ええっ！？"
103090-184 = "ユズちゃん……？"
103090-186 = "ほ、ほら……今までも危険な出来事はたくさんあったし…… "
103090-187 = "その中には、理解できないようなことも……わたし達だけじゃ絶対解決できないようなことも、たくさんあった……"
103090-188 = "そ、そうだけど……"
103090-189 = "わたし、未だにどうして生徒会長がアリスちゃんを狙っているのか……あの時、何があったのかも、よく分かってなくて……"
103090-190 = "そ、それは私もそうだけど……"
103090-191 = "でもだからといって、私達が行く必要ないじゃん！"
103090-192 = "そ、そうだよ……"
103090-194 = "……。"
103090-196 = "わたし、は――わたし達が、これ以上仲間はずれにされるのは、いやなの。 "
103090-197 = "たとえ、状況が分からなくても、みんなと一緒なら……大丈夫だと、思うから……"
103090-198 = "今回も分からない事がたくさんあったけど……でも、みんなと、先生と一緒だったから……あんまり怖くなかったの……"
103090-199 = "新しい人とも出会えた……RABBIT小隊の方とか、風紀委員長、とか……#nも、もちろん怖かったけど、でも――"
103090-204 = "――ロッカーに隠れて震えているよりは……良かった、って思ってる。"
103090-205 = "だから、わたしは……アリスちゃんと一緒に行きたい。 "
103090-206 = "アリスちゃんがいたから、わたし達ゲーム開発部は今も続いているんだし……"
103090-207 = "だから、アリスちゃんがやりたい事があるのなら……#n今度は、わたし達が協力する番、だと思うの……"
103090-208 = "わたし達は――な、仲間、だから……！"
103090-213 = "……。"
103090-215 = "そうだね、ユズ……よくぞ言ってくれた！#nミドリ、私たちも行こう！"
103090-216 = "うん、お姉ちゃん……アリスちゃん、「宇宙勇者」にはなれなくても……戦艦のメイン火力になろう！"
103090-218 = "……はい！みんなと一緒なら百人力です！#nアリスはもう、怖くありません！"
103090-220 = "アリスちゃんも……怖かったの？"
103090-221 = "はい。とてもとても、怖かったです。"
103090-226 = "……アリスの中には、まだ「ケイ」が残っています。"
103090-232 = "え！？け、ケイが……ホント！？#nあいつ、光の剣でぶっ飛ばしたはずじゃ……"
103090-233 = "結局「ケイ」……で、いいのかな……名前……"
103090-235 = "アリスには、ケイの正体が何なのか……#nアリスに何を望んでいるのか、よく分かりません。"
103090-236 = "……アリスは、「アリス」の事さえ、よく分かっていません。 "
103090-237 = "ケイはアリスの事を……「名もなき神」が残した王女、と言っていました。#nリオ会長は、世界を滅亡させる兵器、と言っていました。"
103090-238 = "「王女」も、「ケイ」も、「箱舟」も、「名もなき神」も……アリスはアリスと関係している何もかもが分かりません……"
103090-239 = "でも……皆がいたから……そして、先生がいたから……"
103090-240 = "そういった事が分からなくても、「アリス」になれたんだと、思います。"
103090-244 = "[ns] \"うん。勇者になっていいんだよ。\""
103090-246 = "[ns] \"君がなりたい存在は、君自身が決めていいんだよ――アリス。\""
103090-248 = "……"
103090-249 = "アリスはみんなと――仲間たちと一緒に、先生を助けに行きたいです。 "
103090-250 = "アリスが勇者でいたいから……ゲーム開発部の、一員でいたいから、"
103090-251 = "他の誰でもないアリス自身が……「アリス」の事を、決めたいから！"
103090-252 = "アリスちゃん……"
103090-254 = "うん……アリスちゃん、明日みんなで出発しよう。絶対、一緒にいるからね。"
103090-255 = "アリス、カッコよかったよ！今の、本当の勇者みたいだった！！"
103090-257 = "はい！当然です！アリスは勇者ですから！ "
103090-258 = "それと、今回はダメでしたが……いつか、宇宙勇者にもなる予定です！"
103090-260 = "それ、まだ諦めてなかったんだね…… "
103090-262 = "り、流行に左右されそうだし、早めに取り入れないとダメかも……"
103090-264 = "いーや！"
103090-265 = "こういうのは案外長続きするもんだよ？"
103090-267 = "「恐竜トルネード」みたいなさ、すえながーく愛される名作みたいに！"
103090-272 = "「迷」作……じゃなくて？"
103090-277 = "う、宇宙勇者は……"
103090-278 = "恐竜トルネード、なんですね……"
103090-280 = "あっ……アリスちゃんが落ち込んでる……！？"
103090-286 = "という訳で――そういう事に、なりました。"
103090-287 = "ハナコちゃん……"
103090-288 = "そうか、大変な任務になるだろう。"
103090-290 = "だ、大丈夫なんだよね？"
103090-291 = "いや……まぁ、先生も一緒だし…… "
103090-292 = "ええ、きっと大丈夫だと思います。うふふっ♡"
103090-293 = "そうですね、先生がいるのなら、きっと……"
103090-294 = "……たまに、こんな事を考えるんです。"
103090-298 = "あの時、先生が補習授業部の担任としていらっしゃらなかったら、"
103090-299 = "私たちは一体どうなっていたのだろう――と。"
103090-307 = "そ、それは……"
103090-308 = "そして、先生がいたからこそ、私たちがやり遂げられた事……"
103090-327 = "……。 "
103090-328 = "……。 "
103090-329 = "ハナコちゃん……"
103090-330 = "気をつけていってくるんだぞ、ハナコ。#n私たちはその間、学園を守っているから。"
103090-331 = "そうよ！私たちがキヴォトスを守っている間に、ちゃちゃっと片付けてきてよね！"
103090-333 = "ふふっ、分かりました――すぐ、戻ってきますね。"
103090-335 = "アコ、体には気をつけて。"
103090-336 = "委員長……"
103090-337 = "ここには私が残った方がいい――その判断は間違ってない。#n緊急事態が起きた時、一番効率的に解決できるのは私だろうから。"
103090-338 = "……はい。では、戻りましたらまたご報告いたします。"
103090-339 = "うん、待ってる。"
103090-341 = "……。"
103090-343 = "……。"
103090-345 = "心配ですか？セイアさん。"
103090-346 = "いや、そういうわけでは――"
103090-348 = "そう言うナギちゃんだって、今何杯目～？#nそんなに飲んで大丈夫？夜寝られる？"
103090-350 = "い、いえこれは……"
103090-351 = "……私にまだ予知夢の力が残っていれば、と考えていた。"
103090-352 = "セイアさん……"
103090-354 = "へぇ、セイアちゃんも心配なんだね。"
103090-355 = "まぁ、私もそうだけど。"
103090-356 = "でも、こういうお話ってハッピーエンドになるものじゃん？#nだから――信じようよ。"
103090-357 = "……ああ。私たちがこうして顔を合わせる事も、先生がいなければ不可能だった。"
103090-358 = "だから……ミカの言う通り、信じる事としよう。"
103090-359 = "そうそう☆#n先生がいなかったら――"
103090-363 = "いや、今そういう事を考えるのはやめとこ。"
103090-368 = "先生、そして皆――どうか、"
103090-369 = "……どうか、ご武運を。"
103090-370 = "地上の安全は私たちが守るから、任せてね☆"
103090-372 = "わ、私たちはどうしましょう？"
103090-373 = "特に平時と変わりありません。#n先生が作戦を進行する間、私たちはD.U.を――"
103090-374 = "いえ、キヴォトスの安全を守るだけです。"
103090-375 = "「先生がいない間、キヴォトスの治安を維持すること」、それが私たちSRTの任務ですから。"
103090-376 = "ああ。今でこそカイザーは姿を消したが、またいつ事態を引っ掻き回してくるか分からないしな。"
103090-377 = "そうだね～#nそれに連邦生徒会も、なんとか現状を整理しようとあちこち走り回ってるみたいだし。"
103090-378 = "……まぁ、あいつらのスピード感からして、先生が地上に帰ってきてからになりそうだけど？"
103090-380 = "うう……先生、無事だといいんだけど。"
103090-381 = "そんなに心配しなくていいと思うぞ、ミユ。#n先生なら、どうせ何でもない顔で帰ってくるに決まってる。"
103090-383 = "……そうですね。先生は、なんだかそんな感じがします。"
103090-384 = "くひひ……そうだね。たしかに、そういうイメージあるかも。 "
103090-389 = "……敵の痕跡は見当たらなかったよ。"
103090-394 = "……。"
103090-395 = "サッちゃん、どうしたの？"
103090-396 = "……いや、何でもない。"
103090-398 = "どうせ、私たちがトリニティと共闘するなんて……とか思ってたんじゃない？"
103090-399 = "そ、そうですね……以前なら想像できないようなことが、立て続けに起こってるというか……"
103090-400 = "生きる事が苦しいのは変わりませんが……なんというか…… "
103090-401 = "「明日」を待つように、なるよね。"
103090-402 = "は、はい……それを、なんと表現したらいいのか、分からないですが…… "
103090-403 = "……。"
103090-405 = "……感想を言うのは、すべてが終わってからでも遅くない。"
103090-406 = "「虚妄のサンクトゥム」の脅威は、まだ終わってないようだからな。"
103090-409 = "は、はいっ……！"
103090-410 = "そうですよね、人生は辛く苦しいものですからね、えへへっ……"
103090-411 = "ま、主人公が活躍するためにも、私たちみたいなのが裏で頑張る必要があるわけだし。"
103090-416 = "……。 "
103090-417 = "……でも、こうしてみんなとまた一緒にいられて、嬉しい。 "
103090-419 = "ひ……姫ちゃん……。"
103090-420 = "……。"
103090-426 = "そして、いつかは―― "
103090-427 = "――ああ……そうだな。"
103090-441 = "……リン先輩、いらっしゃいますか？ "
103090-442 = "……はい、どうしましたアユム。"
103090-452 = "お休み中のところ申し訳ありません……"
103090-453 = "至急確認していただきたいことがありまして……"
103090-460 = "連邦生徒会の非常用通信網が先ほどからずっと鳴っていて……#nどうやら、リン先輩を探しているみたいで。"
103090-461 = "……通信網の復旧に成功したのですね。 "
103090-465 = "このコードは……"
103090-466 = "はい……財務室長だと思います。#nその……通信を切るべきか悩んだのですが、念のために、と……"
103090-467 = "分かりました、出ます。"
103090-468 = "はっ、はい……では私はお先に失礼します……"
103090-469 = "はい。ありがとうございます、アユム。 "
103090-479 = "……リン行政官――！"
103090-480 = "今どこにい――？怪我はないのね！？ "
103090-481 = "財務室長……ご無事でしたか。 "
103090-482 = "――よく聞こえないわ。これでもなんとか通信網を復旧して――"
103090-483 = "どこにいるの？――今サンクトゥムタワーが――"
103090-484 = "他の室長を集めて――カイザーが――"
103090-485 = "リン行政官―― "
103090-486 = "……アオイ。"
103090-487 = "ごめんなさいリン先輩。#n私、こんなことになるなんて思わなくて――"
103090-488 = "……いえ、あなたを恨んだりなどしていません。#nあなたは自身の責務を果たしただけ。"
103090-489 = "ですので、私も、己の責務を果たすだけです。"
103090-490 = "――今、どこで何を――シャーレと一緒に？――"
103090-494 = "アオイ。"
103090-498 = "万が一、私の身に何か起きた時には、連邦生徒会を――#nキヴォトスを、よろしくお願いします。"
103090-499 = "……っ！？今なん―― "
103090-500 = "……どうか体に気をつけて、アオイ。"
103090-508 = "（そうして地上で過ごす最後の夜が――明けた）"
103090-514 = "先生、出発の準備が整いました。"
103090-515 = "全員、ブリッジで待機中です。"
103090-516 = "[ns] \"うん、了解。\""
103090-520 = "[ns] \"それじゃ……行こっか。\""
103090-526 = "次回;天上の遥か彼方へ"
