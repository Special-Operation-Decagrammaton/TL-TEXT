[translation]
32170-1 = "Episódio 17; Tal mundo também (1)"
32170-2 = "Guh, ugh...!!"
32170-8 = "N-nós vencemos...?"
32170-9 = "Todos os inimigos foram neutralizados."
32170-10 = "Auu... ter a liderança do Sensei foi uma ajuda e tanto..."
32170-14 = "...Sim. Bem, agora que superamos um ponto difícil, vamos passar para a próxima fase."
32170-15 = "Reforços de Arius devem chegar em breve, mas só precisamos ganhar tempo."
32170-16 = "Se conseguirmos segurar as pontas até que a unidade do Comitê de Justiça chegue aqui..."
32170-17 = "Ah, eu já avisei a Hasumi-senpai! Ela deve responder logo!"
32170-18 = "Sim, obrigada♡... Se o Comitê de Justiça, que está sob as ordens do Tea Party, puder agir, será apenas quando houver um problema com o Tea Party."
32170-19 = "Deve haver contatos regulares, então tenho certeza de que a Hasumi e as outras já notaram que algo aconteceu com a Nagisa-san."
32170-20 = "Junto com o contato da Koharu-chan... não deve demorar muito para que elas comecem a se mover, pelo menos para verificar a situação."
32170-21 = "Agora, só nos resta torcer para que elas cheguem rápido..."
32170-25 = "!?"
32170-26 = "Isso é..."
32170-35 = "Os reforços, tão rápido assim...!?"
32170-36 = "H-hã...?"
32170-44 = "...O número é grande, é um batalhão inteiro. Provavelmente quase metade de Arius..."
32170-45 = "Auu...! T-tantas pessoas assim, entrando tranquilamente no território de Trinity...!?"
32170-46 = "Ainda não há sinal de que o Comitê de Justiça vá se mover...?"
32170-47 = "Isso é inevitável."
32170-49 = "...!"
32170-54 = "Porque essas pessoas estão prestes a se tornar a força armada oficial de Trinity."
32170-55 = "[s] \"Mika...?\""
32170-56 = "Ei, quanto tempo, Sensei. Fico feliz em te ver de novo."
32170-57 = "E quanto ao Comitê de Justiça, eles não vão se mover. Eu mesma dei uma nova ordem de espera para eles."
32170-58 = "A escola estava bem silenciosa hoje, não estava? Além do Comitê de Justiça, cuidei de tudo que pudesse atrapalhar com antecedência."
32170-59 = "Inventei desculpas para atrasar todos os lugares onde as ordens do Tea Party pudessem chegar."
32170-60 = "Seria um problema se alguém atrapalhasse quando eu fosse atacar a Nagi-chan, né?"
32170-61 = "Uma das integrantes do \"Tea Party\"... Misono Mika-san..."
32170-62 = "Bem, falando de um jeito simples, é a hora da vilã aparecer, né?"
32170-63 = "Eu sou a \"verdadeira\" traidora de Trinity."
32170-64 = "..."
32170-65 = "..."
32170-66 = "...!?"
32170-68 = "Sendo assim, pode me dizer onde você escondeu a Nagi-chan? Eu também não tenho muito tempo."
32170-71 = "Bem, eu poderia simplesmente eliminar todos aqui e procurar com calma depois. Mas isso seria um incômodo, não seria?"
32170-73 = "[ns] \"Mika, por que...\""
32170-74 = "Hmm? Quer saber? Se o Sensei pergunta, não tenho escolha."
32170-75 = "É porque... eu odeio Gehenna."
32170-76 = "Eu realmente, do fundo do meu coração... odeio Gehenna."
32170-77 = "...Então, é por isso que quer cancelar o Tratado do Éden? E por isso fez aquilo com a Nagisa-san...?"
32170-78 = "Hum... quem é você mesmo? Desculpe, não sou muito boa em lembrar rostos."
32170-79 = "...Ah, lembrei. Urawa Hanako, né? Aquela que foi expulsa da aula na capela por aparecer de roupa de banho. Ahaha, que nostálgico."
32170-80 = "..."
32170-81 = "Bem, respondendo à sua pergunta, é exatamente isso. Porque a Nagi-chan estava tentando fazer algo estranho como esse Tratado do Éden."
32170-82 = "Fazer um tratado de paz com aqueles seres de chifres de Gehenna... não acha que isso é uma piada de mau gosto? Só de pensar, eu sinto arrepios."
32170-83 = "Com certeza seremos traídas, não acha? Se virar as costas, será esfaqueada na hora."
32170-84 = "Eu não posso deixar que isso aconteça."
32170-85 = "A Nagi-chan é gentil demais, ou melhor, ingênua demais... isso não é uma história de escola alegre de ficção. Esse tipo de conveniência não existe na realidade."
32170-86 = "Já está na hora de você entender que nós somos habitantes de um mundo muito mais sombrio do que parece, não acha?"
32170-87 = "……É por isso que, poderia me devolver a Nagi-chan? Não se preocupe, não vou machucá-la. Bem, talvez o resto da vida escolar dela seja dentro de uma cela, mas isso é outra história."
32170-88 = "[s] \"Então o Tratado de Eden era, de fato, um tratado de paz legítimo...\""
32170-89 = "Ah, desculpe por ter te enganado naquela época, Sensei. Sim, aquilo foi mentira."
32170-90 = "Aquilo era realmente um tratado de paz. Afinal, seria impossível para a Nagi-chan, tão ingênua e boba, usar o Tratado de Eden como uma aliança militar."
32170-91 = "……Mas nem tudo o que eu disse naquela época era mentira."
32170-92 = "É verdade que eu queria me reconciliar com Arius."
32170-96 = "Essas crianças são minhas aliadas, pois compartilham do mesmo ódio por Gehenna."
32170-97 = "Arius também era originalmente parte da Trinity. Como eu disse ao Sensei antes, o ódio delas por Gehenna é imenso, não perde em nada para o nosso. Na verdade, pode-se dizer que elas possuem um ódio ainda mais puro."
32170-98 = "Foi por isso que estendi a mão. Eu disse: 'Por que não unimos forças e derrotamos aqueles vilões que tentam assinar um tratado de paz com Gehenna?'"
32170-99 = "Se a anfitriã do Chá das Cinco, 'Kirifuji Nagisa', tem o Comitê de Realização da Justiça, então a próxima anfitriã, 'Misono Mika', terá Arius ao seu lado."
32170-100 = "Isso é um acordo. Um passo em direção à reconciliação, talvez?"
32170-101 = "Inimigos unindo forças temporariamente por um inimigo em comum. É isso. Por isso eu estava apoiando Arius em segredo."
32170-102 = "Arius era, desde o início, uma ferramenta para o golpe de estado em Trinity...?"
32170-103 = "Hm?……Sim, com certeza. Pode-se dizer que isso é um golpe de estado. Afinal, no fim das contas, vou tirar a Nagi-chan do poder e me tornar a anfitriã do Chá das Cinco."
32170-104 = "Ah, eu entendo você. Obrigado, Shirasu Azusa. Embora eu não saiba muito sobre você, isso não muda o fato de que você é uma existência importante para mim. Sempre foi, e sempre será."
32170-105 = "Porque, a partir de agora, você terá que ser a culpada pelo ataque à Nagi-chan."
32170-106 = "……！！"
32170-107 = "Seria melhor chamar de bode expiatório? É preciso haver alguém para carregar o pecado como um sacrifício, para que todos possam dormir tranquilos."
32170-108 = "O mundo não funciona assim?"
32170-109 = "……。"
32170-110 = "Mas fiquei surpresa. Quando ouvi que a Nagi-chan tinha sido atacada por alguém desconhecido, entrei em pânico pensando que meu plano poderia desmoronar, mas..."
32170-111 = "Quem diria que eram vocês do Clube de Reforço, isso foi inesperado. É."
32170-112 = "[s] \"……Tudo isso, apenas para se tornar a anfitriã do Chá das Cinco?\""
32170-113 = "Sim, exatamente."
32170-114 = "Ah, mas não quero que entenda errado, Sensei. Não é que eu queira poder."
32170-115 = "Eu só quero apagar Gehenna de Kivotos... É realmente só isso."
32170-116 = "[s] \"……。\""
32170-117 = "Vou afastar os moderados de Trinity e preencher as vagas com Arius."
32170-118 = "Talvez surja uma nova coalizão? Se necessário, podemos até convocar um novo Concílio... Sim, isso seria bom, não seria?"
32170-119 = "E então, com um novo grupo militar, a Trinity reorganizada declarará guerra total a Gehenna. Sim, esse é o meu plano!"
32170-120 = "[ns] \"……!\""
32170-121 = "Uau, que susto..."
32170-122 = "Sensei, você consegue fazer um olhar tão assustador assim... Sim, entendi perfeitamente que você está muito bravo. Desculpe, eu expliquei tudo de forma apressada e descuidada, não foi?"
32170-127 = "Eu adoraria conversar com mais calma, mas... que tal eliminarmos os obstáculos primeiro?"
32170-131 = "……Cuidado, Sensei."
32170-132 = "Dá para perceber só de olhar... Ela é muito forte."
32170-133 = "Fufu, é verdade. Como eu disse ao Sensei antes, eu sou bem forte, sabe?"
32170-134 = "Certo. Então, pode acabar com o Clube de Reforço?"
