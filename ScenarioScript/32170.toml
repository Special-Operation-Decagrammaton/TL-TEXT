[translation]
32170-1 = "Episódio 17;Também um Mundo Assim (1)"
32170-2 = "Gh, uh……!!"
32170-8 = "G-ganhamos……?"
32170-9 = "Todos fora de combate."
32170-10 = "Auu…… graças ao comando do Sensei, a gente se salvou de verdade……."
32170-14 = "……Sim. Então, vencido um trecho difícil, vamos passar pra próxima fase?"
32170-15 = "Depois disto, a tropa de reforço da Arius deve chegar; mas, pra gente, basta ganhar tempo."
32170-16 = "Até a tropa do Comitê de Realização da Justiça chegar aqui; se a gente conseguir ganhar tempo até lá……."
32170-17 = "Ah, eu já avisei a veterana Hasumi! A resposta deve vir logo!"
32170-18 = "Sim, muito obrigada♡…… Se o Comitê de Realização da Justiça, que está sob o comando do Tea Party, pode se mexer, é só quando surge um problema em torno do Tea Party."
32170-19 = "Deve haver contato periódico e tal, então, a esta altura, a Hasumi e as outras já devem ter percebido que algo aconteceu com a Nagisa."
32170-20 = "Junto com isso, o contato da Koharu…… ao menos pra se mexerem e conferir a situação, não deve demorar tanto."
32170-21 = "Depois, só resta torcer pra que cheguem logo, mas……."
32170-25 = "!?"
32170-26 = "Isto é……."
32170-35 = "A tropa de reforço, tão rápido assim……!?"
32170-36 = "H-hã……?"
32170-44 = "……São muitos, em escala de batalhão. Provavelmente, quase metade da Arius……."
32170-45 = "Auu……! T-tanta gente assim, entrando tão tranquilamente no terreno de Trinity……!?"
32170-46 = "O Comitê de Realização da Justiça ainda não dá sinal de se mexer……?"
32170-47 = "Isso não tem jeito."
32170-49 = "……!"
32170-54 = "Porque essas pessoas vão, daqui pra frente, se tornar o grupo militar oficial de Trinity."
32170-55 = "[s] \"Mika……?\""
32170-56 = "Oi, há quanto tempo, Sensei. Que bom te ver de novo."
32170-57 = "E o Comitê de Realização da Justiça não vai se mexer. Porque eu, mais uma vez, dei ordem de espera."
32170-58 = "Hoje a academia tava silenciosa, né. Além do Comitê de Realização da Justiça, tudo o que pudesse atrapalhar eu tratei de tirar do caminho de antemão."
32170-59 = "Em todo lugar onde a ordem do Tea Party alcança, eu deixei tudo travado com vários motivos diferentes."
32170-60 = "Na hora de atacar a Nagi, ser atrapalhada seria um problema, né."
32170-61 = "Uma das do \"Tea Party\"…… a Mika Misono……."
32170-62 = "Bom, resumindo, entrada do cérebro por trás☆ é mais ou menos isso?"
32170-63 = "Eu sou o VERDADEIRO \"traidor de Trinity\"."
32170-64 = "……."
32170-65 = "……."
32170-66 = "……!?"
32170-68 = "Sendo assim, me conta onde você escondeu a Nagi? Eu também tô sem tempo, sabe."
32170-71 = "Bom, dá pra eu apagar todo mundo aqui e procurar com calma depois. Mas isso dá trabalho, né?"
32170-73 = "[ns] \"Mika, por quê……\""
32170-74 = "Hmm? Quer saber? Se o Sensei pede assim, não tem jeito."
32170-75 = "É que…… é porque eu odeio Gehenna."
32170-76 = "Eu, de verdade, do fundo…… do fundo do coração, odeio Gehenna."
32170-77 = "……Então, é pra cancelar o Tratado do Éden? É por isso que a Nagisa……?"
32170-78 = "É que…… quem era mesmo? Desculpa, eu não sou muito boa de guardar rosto."
32170-79 = "……Ah, lembrei. É a Hanako Urawa. Aquela que participou da aula na capela de maiô e foi expulsa. Ahaha, que saudade."
32170-80 = "……."
32170-81 = "Bom, se é pra responder, é isso mesmo. Afinal, a Nagi vai e tenta fazer uma coisa estranha, um Tratado do Éden."
32170-82 = "Um tratado de paz logo com aqueles de Gehenna, uns que têm chifre na cabeça, é brincadeira demais, não acha? Só de pensar já me dá arrepio."
32170-83 = "É óbvio que a gente vai ser traída, né? Se der as costas, é apunhalada na hora, viu?"
32170-84 = "Uma coisa dessas, eu não posso deixar acontecer."
32170-85 = "A Nagi também é gentil, ou melhor, gentil demais…… não é uma história de escola alegrinha de ficção. Uma coisa tão conveniente não existe na realidade."
32170-86 = "Que a gente é habitante de um mundo mais sombrio e enrolado que isso, já tava na hora de ela entender, né?"
32170-87 = "……Então é isso; me devolve a Nagi? Fica tranquilo, não vou fazer nada que doa. Bom, o resto da vida escolar dela talvez seja todo atrás das grades, mas."
32170-88 = "[s] \"Então o Tratado do Éden é mesmo um tratado de paz legítimo……\""
32170-89 = "Ah, naquela hora, desculpa por te enganar, Sensei. É, aquilo era mentira."
32170-90 = "Aquilo é mesmo um tratado de paz. Aliás, com a Nagi, tão ingênua e bobinha, aproveitar o Tratado do Éden como aliança militar seria impossível, né."
32170-91 = "……Mas o que eu falei naquela hora não é tudo mentira, não."
32170-92 = "Que eu queria fazer as pazes com a Arius é verdade."
32170-96 = "Essas meninas são companheiras que odeiam a mesma Gehenna."
32170-97 = "A Arius, no fundo, também era parte de Trinity. Como eu já falei antes pro senhor, essas meninas têm um ódio enorme por Gehenna, à altura do nosso, senão maior. Aliás, dá até pra dizer que são elas que têm o ódio mais puro."
32170-98 = "Por isso, eu estendi a mão. \"Vamos, de mesmo ideal, acabar com os bandidos que tentam fazer um tratado de paz com Gehenna?\", assim."
32170-99 = "Se a host do Tea Party, \"Nagisa Kirifuji\", tem o Comitê de Realização da Justiça, a próxima host do Tea Party, \"Mika Misono\", tem a Arius."
32170-100 = "É esse tipo de acordo. Uma escadinha rumo à reconciliação, digamos?"
32170-101 = "Por um inimigo comum, inimigos, temporariamente, dão as mãos. É isso. E, com isso, eu vinha apoiando a Arius em segredo."
32170-102 = "A Arius, desde o começo, era uma ferramenta do golpe dentro de Trinity……?"
32170-103 = "Hm? ……Sim, de fato. Isto também dá pra chamar de golpe, né. Afinal, no fim, eu derrubo a Nagi e me torno a host do Tea Party."
32170-104 = "Ah, você eu conheço. Obrigada, Azusa Shirasu. Eu não te conheço muito, mas que você é uma existência importante pra mim, isso não muda. Até agora, e daqui pra frente."
32170-105 = "Porque, de agora em diante, você vai ter que ser a culpada que atacou a Nagi."
32170-106 = "……!!"
32170-107 = "Bode expiatório é uma palavra melhor, quem sabe? É justamente havendo uma existência que serve de vítima pra carregar a culpa que todo mundo dorme tranquilo e em paz."
32170-108 = "O mundo é assim, não é?"
32170-109 = "……."
32170-110 = "Mas que susto. Ouvir que a Nagi foi atacada por um alguém de identidade desconhecida, achei que o plano fosse desmoronar e me apavorei um pouco, mas……."
32170-111 = "Quem diria que era o Clube de Aulas de Reforço, né. Isso eu não previa, confesso. Pois é."
32170-112 = "[s] \"……Tudo isso pra se tornar a host do Tea Party?\""
32170-113 = "Sim, isso mesmo."
32170-114 = "Ah, mas eu não quero que você entenda errado, Sensei. Não é que eu queira poder."
32170-115 = "Eu quero apagar Gehenna de Kivotos…… de verdade, é só isso."
32170-116 = "[s] \"……\""
32170-117 = "Afastar a ala moderada de Trinity e preencher esses assentos vagos com a Arius."
32170-118 = "Quem sabe vira uma nova união, né? Se preciso, abre-se até um novo concílio…… sim, isso também seria bom?"
32170-119 = "E aí, a Trinity, reorganizada e com um novo grupo militar, declara guerra total a Gehenna. Isso, é este o meu plano!"
32170-120 = "[ns] \"……!\""
32170-121 = "Uau, que susto……."
32170-122 = "Sensei, você também consegue fazer um olhar tão assustador, né…… sim, dá pra ver bem que você tá muito bravo. Desculpa, a explicação também saiu meio apressada, meio porca, né?"
32170-127 = "Eu queria conversar com mais calma, mas…… primeiro, vamos tirar do caminho as várias coisas que atrapalham?"
32170-131 = "……Cuidado, Sensei."
32170-132 = "Dá pra ver só de olhar…… ela é bem forte."
32170-133 = "Ufu, isso mesmo. Eu já falei antes pro senhor: eu sou bem forte."
32170-134 = "Sim. Então, dá pra você dar um jeito no Clube de Aulas de Reforço?"
