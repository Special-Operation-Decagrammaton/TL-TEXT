[translation]
32170-1 = "Episódio 17; Mesmo Num Mundo Assim (1)"
32170-2 = "Ugh, ugh...!!"
32170-8 = "A... A gente ganhou...?"
32170-9 = "Todas incapacitadas."
32170-10 = "Auuu... a gente só conseguiu dar conta graças ao Sensei no comando..."
32170-14 = "...É. Bom, já passamos pelo pior, então vamos para a próxima fase."
32170-15 = "Logo os reforços de Arius devem chegar, mas a nossa missão agora é só ganhar tempo."
32170-16 = "A gente só precisa aguentar as pontas até as unidades do Comitê de Realização da Justiça chegarem..."
32170-17 = "Ah, eu já avisei a Hasumi-senpai! Ela já deve tá respondendo!"
32170-18 = "Obrigada, Koharu-chan♡ ...Se o Comitê de Realização da Justiça, que está sob ordens diretas da Tea Party, se mover, será apenas porque houve algum problema com a alta cúpula."
32170-19 = "Eles devem ter comunicações regulares, então a essa altura a Hasumi-san e as outras já devem ter percebido que algo aconteceu com a Nagisa-san."
32170-20 = "Juntando isso com o aviso da Koharu-chan... não deve demorar muito para que elas comecem a se mobilizar, pelo menos para averiguar a situação."
32170-21 = "Agora só nos resta torcer para que elas cheguem rápido..."
32170-25 = "!?"
32170-26 = "Isso é..."
32170-35 = "Os reforços já chegaram... !?"
32170-36 = "H-Hã...?"
32170-44 = "...É muita gente. Unidades inteiras. Provavelmente quase metade de toda a Arius tá aqui..."
32170-45 = "Auuu...! C-Como é que tanta gente conseguiu entrar no território da Trinity assim, na cara dura...!?"
32170-46 = "E até agora nenhum sinal de que o Comitê de Realização da Justiça vai aparecer...?"
32170-47 = "Isso é óbvio, né."
32170-49 = "...!"
32170-54 = "Afinal, a partir de agora esse pessoal vai ser o grupo armado oficial da Trinity."
32170-55 = "[s] \"Mika...?\""
32170-56 = "Oie, quanto tempo, Sensei! Fico feliz em te ver de novo."
32170-57 = "Ah, e só pra avisar: o Comitê de Realização da Justiça não vem. Eu mandei outra ordem mandando ficarem onde tão."
32170-58 = "A escola hoje tava tão quietinha, não tava? Eu dei um jeito de tirar do caminho não só o Comitê, mas qualquer um que pudesse atrapalhar."
32170-59 = "Mandei a Tea Party segurar todo mundo onde dava, inventei um monte de desculpa pra atrasar todo mundo."
32170-60 = "Até porque seria um saco se alguém atrapalhasse quando fossem atacar a Nagi-chan, né?"
32170-61 = "Uma das líderes da 'Tea Party'... Mika [ruby=Misono]Misono[/ruby]-san..."
32170-62 = "Resumindo a história, a grande vilã entrou em cena, sacou?☆"
32170-63 = "Eu sou a *verdadeira* 'Traidora da Trinity'."
32170-64 = "......"
32170-65 = "......"
32170-66 = "...!?"
32170-68 = "Então, será que vocês poderiam me dizer onde esconderam a Nagi-chan? É que eu não tô com muito tempo, sabe."
32170-71 = "Claro, eu poderia só acabar com todo mundo aqui e procurar com calma depois. Mas dá preguiça, sabe?"
32170-73 = "[ns] \"Mika, por quê...\""
32170-74 = "Humm? Quer saber? Bom, se é o Sensei quem tá perguntando, não tem o que fazer, né."
32170-75 = "É que... eu odeio a Gehenna."
32170-76 = "Sério, eu odeio. Do fundo... mas do fundo do meu coração, eu odeio a Gehenna."
32170-77 = "...Então, quer dizer que você queria cancelar o Tratado do Éden? E por causa disso você armou contra a Nagisa-san...?"
32170-78 = "Peraí... quem é você mesmo? Foi mal, eu sou péssima pra lembrar rostos."
32170-79 = "...Ah, lembrei. Hanako Urawa, não é? A garota que foi na missa de biquíni e acabou sendo chutada de lá. Ahaha, velhos tempos, hein."
32170-80 = "......"
32170-81 = "Bom, pra responder a sua pergunta: é exatamente isso. Tudo porque a Nagi-chan inventou de fazer aquela maluquice de Tratado do Éden."
32170-82 = "Fazer um tratado de paz com aqueles seres com chifres de Gehenna? Isso parece piada de mal gosto, não acha? Só de pensar me dá calafrios."
32170-83 = "É óbvio que eles vão trair a gente na primeira chance. Se virar de costas, toma uma facada na certa."
32170-84 = "E eu nunca ia deixar isso acontecer."
32170-85 = "A Nagi-chan é gentil demais... ou pelo menos, ela tenta ser. A gente não tá vivendo num daqueles animes de vida escolar feliz. Isso aí não existe na vida real."
32170-86 = "Já passou da hora dela perceber que a gente mora num mundo muito mais sujo e complicado, não acha?"
32170-87 = "...Então, será que dá pra devolver a Nagi-chan? Relaxa, não vou machucar ela. Bom, ela provavelmente vai passar o resto da vida escolar numa jaula, mas né."
32170-88 = "[s] \"Então no fim das contas, o Tratado do Éden era mesmo um tratado de paz verdadeiro...\""
32170-89 = "Ah, desculpa por ter te enganado antes, Sensei. É, aquilo foi mentira."
32170-90 = "Aquele era um tratado de paz de verdade. Afinal, não tem como a Nagi-chan, ingênua e boba do jeito que é, conseguir usar o Tratado do Éden como uma aliança militar."
32170-91 = "...Mas nem tudo que eu te falei naquele dia foi mentira."
32170-92 = "A parte em que eu disse que queria fazer as pazes com a Arius era a mais pura verdade."
32170-96 = "Essas garotas são aliadas que odeiam Gehenna tanto quanto eu."
32170-97 = "As meninas da Arius, originalmente, também eram parte da Trinity. Eu não te falei isso da última vez, Sensei? O ódio que elas têm por Gehenna é absurdo, não perdem em nada pra nós. Dá até pra dizer que o ódio delas é mais puro."
32170-98 = "Por isso eu estendi a mão. Perguntei: 'Que tal juntarmos forças pra acabar com as vilãs que querem assinar um tratado de paz com Gehenna?'."
32170-99 = "Se a anfitriã 'Nagisa Kirifuji' tem o Comitê de Realização da Justiça do lado dela, então a próxima anfitriã, 'Mika Misono', tem a Arius."
32170-100 = "Foi uma troca. Um pequeno passo em direção à paz, entende?"
32170-101 = "Inimigos de longa data dão as mãos temporariamente por conta de um inimigo em comum. É isso aí. E pra que isso acontecesse, eu tava ajudando Arius pelas sombras."
32170-102 = "Então desde o começo, Arius não passava de uma ferramenta pro golpe de estado na Trinity...?"
32170-103 = "Humm? ...É, pode se dizer que sim. Até que dá pra chamar de golpe de estado. No fim das contas, eu vou derrubar a Nagi-chan e pegar o posto de anfitriã pra mim."
32170-104 = "Ah, de você eu me lembro. Obrigada, Shirasu Azusa. Eu não te conheço muito bem, mas o seu papel nisso tudo foi muito importante pra mim. E ainda vai ser."
32170-105 = "Afinal, a partir de agora, eu vou precisar que você assuma a culpa por atacar a Nagi-chan."
32170-106 = "...!!"
32170-107 = "Bode expiatório soa melhor pra você? A paz e o sossego das pessoas só existem porque a gente arranja alguém pra carregar todos os pecados por elas."
32170-108 = "O mundo funciona assim, não é?"
32170-109 = "......"
32170-110 = "Mas olha, confesso que tomei um susto. Quando eu ouvi que a Nagi-chan tinha sido atacada por 'um grupo desconhecido', achei que o meu plano ia pro saco e bateu um desespero na hora..."
32170-111 = "Quem diria que ia ser o Clube de Reposição, né? Essa aí eu não vi chegando. Sério mesmo."
32170-112 = "[s] \"...Isso tudo só para se tornar a anfitriã da Tea Party?\""
32170-113 = "Aham, foi sim."
32170-114 = "Ah, mas não entenda mal, Sensei. Eu não ligo pra poder."
32170-115 = "Eu quero apagar Gehenna do mapa de Kivotos... Apenas isso."
32170-116 = "[s] \"......\""
32170-117 = "Vou varrer os moderados da Trinity pra escanteio, e botar Arius nas cadeiras vazias."
32170-118 = "Isso pode até virar uma nova coalizão, sabe? Se bobear, a gente abre um novo Concílio e... é, não é uma má ideia."
32170-119 = "E então, uma Trinity repaginada com uma nova força bélica vai iniciar uma guerra total contra Gehenna. Sim, esse é o meu plano!"
32170-120 = "[ns] \"...Tch!\""
32170-121 = "Eita, que susto..."
32170-122 = "Sensei, você consegue fazer uma cara bem assustadora quando quer... é, já deu pra perceber que você tá fumaçando de raiva. Foi mal, eu acabei explicando as coisas meio rápido, ficou meio bagunçado, né?"
32170-127 = "Eu adoraria bater um papo com mais calma, mas... que tal a gente varrer os empecilhos do caminho primeiro?"
32170-131 = "...Cuidado, Sensei."
32170-132 = "Só de olhar pra ela dá pra sentir... ela é bem forte."
32170-133 = "Fufu, eu sou sim. Como eu já falei antes pro Sensei, eu sou muito forte."
32170-134 = "Prontinho. Podem limpar a sujeira do Clube de Reposição pra mim?"