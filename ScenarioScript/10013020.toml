[translation]
10013020-1 = "Episódio 2: Primeiro, vamos organizar a situação"
10013020-2 = "（Enquanto todos se afastam por um momento para se preparar...）"
10013020-6 = "Insistir em algo nessa situação... não há necessidade de escolher um método tão ineficiente, não é?"
10013020-7 = "Além disso, até a Mimori-chan e a Chise colaborarem... nossa, isso foi um choque."
10013020-8 = "Sensei, você entendeu bem essa parte?"
10013020-9 = "[s] \"Bem, honestamente, não posso afirmar que 'esta é a resposta correta'.\""
10013020-13 = "[ns] \"Mas como foi a Shizuko quem decidiu, eu quero apoiá-la.\""
10013020-14 = "……Entendo. Então, você também não está negando, é?"
10013020-15 = "Nyahaha~. Sim, sim, entendi. #nVamos parar com essa conversa entediante."
10013020-16 = "Se o meu conselho é inútil, não adianta ficar falando por aí. #nSendo assim, por hoje é só――"
10013020-17 = "[s] \"Sim. Conto com você, Niya.\""
10013020-18 = "Hmm~? Não faço a menor ideia do que o sensei está dizendo~? #nNyahaha♪"
10013020-27 = "Ah, sensei! Você veio."
10013020-28 = "[s] \"Shizuko!? Esse visual...\""
10013020-29 = "Ah, isso aqui?"
10013020-30 = "Prevemos batalhas intensas no mar, afinal! #nEntão pensei em usar algo que não tivesse problema se molhasse."
10013020-31 = "Como resultado..."
10013020-32 = "Eu troquei para este traje de banho!"
10013020-33 = "O que achou? Esta é a estratégia de 'prevenido vale por dois' pensada por Kawa Shizuko! E este é o visual profissional que cobre perfeitamente todas as condições climáticas!"
10013020-34 = "[s] \"Ah, sim...\""
10013020-35 = "Fufufu♪"
10013020-36 = "……Ufa."
10013020-44 = "E, então, é isso. Bem, é por causa disso que――"
10013020-45 = "Aquele... se, se não for pedir muito, o que você acha... aquele..."
10013020-46 = "A... a... sua opinião sobre isso――"
10013020-47 = "MEEEESTREEEEE!!"
10013020-53 = "[ns] \"Uau! I-Izuna!?\""
10013020-59 = "Sim! A humilde Izuna, assim como a senhorita Shizuko!"
10013020-60 = "Troquei para um traje adequado para o mar de verão!"
10013020-64 = "Como estou, Mestre? A Izuna conseguiu se transformar de um jeito legal?"
10013020-68 = "[ns] \"Ah, sim. Está legal.\""
10013020-69 = "E-ei, espera! Izuna...!"
10013020-70 = "Ora, ora, todos estão cheios de energia. Ufufu."
10013020-71 = "Sensei, eu também troquei de roupa."
10013020-72 = "Com isso――"
10013020-73 = "Será que consigo correr sobre o mar?"
10013020-74 = "[s] \"Provavelmente... acho que não.\""
10013020-75 = "É mesmo?"
10013020-77 = "Mas, senhorita Chise!"
10013020-78 = "Mesmo que seja difícil agora, se não negligenciarmos o treinamento――"
10013020-79 = "A Izuna acha que um dia conseguiremos correr como ninjas! Sim! Provavelmente!"
10013020-80 = "[s] \"Claro, ter confiança é bom, mas...!\""
10013020-85 = "[ns] \"Então todos trocaram para trajes de banho.\""
10013020-86 = "Sim, exatamente."
10013020-87 = "O traje de banho da Izuna foi escolhido pela Chefe e pela senhorita Tsukuyo! Elas disseram que, como o destino da missão era o mar, talvez fosse necessário! Entendo, então é para isso que servem!"
10013020-88 = "A Chefe Niya disse que se eu usar no mar, vou ficar mais forte."
10013020-89 = "[s] \"E-entendo... E a Mimori?\""
10013020-90 = "Eh? Ah, eu... bem..."
10013020-93 = "Quando contei para a Tsubaki-chan e para a Kaede-chan que ia ao mar... elas escolheram algo que combinasse comigo..."
10013020-94 = "Eu avisei que não era para passear, mas sim porque a Shizuko-chan poderia estar em perigo, mas..."
10013020-95 = "Você ficou... desapontado, não foi?"
10013020-98 = "[ns1] \"De jeito nenhum. É uma ocasião especial, afinal.\"\n[ns2] \"Todas vocês estão muito bonitas.\""
10013020-101 = "V-você acha...?"
10013020-102 = "N-não é? Todas vocês estão preparadas e prontas, como esperado! Ahaha..."
10013020-103 = "Sim! Todas vocês estão realmente muito bonitas!"
10013020-104 = "É como se um novo festival tivesse começado!"
10013020-105 = "Se eu soubesse, deveria ter trazido meu traje de banho também~."
10013020-106 = "Um evento tão maravilhoso acontecendo... que bom que vim para a praia!"
10013020-107 = "Você também acha, Sensei? Não acha?"
10013020-108 = "[s] \"B-bem... eu acho que sim, né?\""
10013020-110 = "Umika, o Sensei está ficando sem jeito..."
10013020-117 = "Bem, agora que todas estão reunidas, que tal trocarmos informações?"
10013020-124 = "De acordo com as informações que Niya investigou, parece que os grupos que estão se destacando neste \"Lost Paradise Resort\" são estes."
10013020-125 = "Parece que estão divididos em cerca de sete grupos..."
10013020-128 = "Hum. Entre eles, o que está praticando a \"caça ao resort\" ativamente é este Grupo dos Capacetes."
10013020-129 = "Nós lutamos contra eles outro dia, não foi? Eram um bando muito barulhento."
10013020-130 = "É melhor considerar que eles estabeleceram bases de operação e rotas de movimento por toda parte."
10013020-132 = "Sim... mas o Grupo dos Capacetes é uma exceção. A maioria dos outros grupos parece estar tentando esconder sua existência, operando nas sombras..."
10013020-133 = "Parece que eles são chamados por apelidos, em vez de nomes oficiais."
10013020-134 = "[s] \"Apelidos?\""
10013020-135 = "Por exemplo, o grupo que ocupa a ilha mais próxima daqui é..."
10013020-140 = "\"Os Mineiros de Enxofre em Busca da Fonte Fantasma\"...?"
10013020-141 = "Que nome romântico☆"
10013020-142 = "[s] \"Romântico... será?\""
10013020-145 = "Há também os \"Monstros de Orelhas Brancas que Levam os Perdedores à Ruína\" e outros..."
10013020-148 = "Ah! Também tem um grupo chamado \"Os Mensageiros de Genbu que Exigem um Preço por Tudo\", mestre!"
10013020-149 = "Parecem nomes de vilões que lutam contra ninjas!"
10013020-150 = "[s] \"Eu não entendo muito bem os critérios de bem e mal da Izuna...\""
10013020-151 = "...Hum, isso é algum tipo de cenário de mangá?"
10013020-153 = "E o último é..."
10013020-157 = "\"O Grupo dos Capacetes que sai por aí arrumando briga com todo mundo\"."
10013020-158 = "Isso é só o Grupo dos Capacetes mesmo!"
10013020-159 = "Acho que isso é tudo sobre as informações."
10013020-160 = "Hum... em vez de obter informações, parece que um mistério chamou outro..."
10013020-162 = "Hmm... Shizuko-chan, o que faremos agora?"
10013020-173 = "Hmm... neste caso..."
10013020-174 = "Para agir de forma mais eficiente..."
10013020-181 = "...Certo, decidi."
10013020-182 = "Vamos nos dividir em dois grupos a partir de agora."
10013020-183 = "[s] \"Eh? Para fazer a \"caça ao resort\"?\""
10013020-184 = "Sim. É verdade que nossas forças serão dispersas, mas acho que poderemos avançar de forma mais eficiente."
10013020-185 = "Além disso, enquanto fazemos isso, a reputação da Hyakkiyako pode continuar caindo..."
10013020-186 = "Ou seja, é uma corrida contra o tempo!"
10013020-187 = "[s3] \"Entendido. Nesse caso, as equipes...\"\n[s4] \"Seria melhor dividir entre Abydos e Hyakkiyako, não é?\""
10013020-194 = "Sim. Nós vamos para este ponto, então pedimos que o pessoal de Abydos cuide daquela parte!"
10013020-195 = "Uhe~ entendido. Então, pode ser assim?"
10013020-196 = "Sim. Então, todas juntas..."
10013020-197 = "Vamos partir!"
10013020-199 = "Entendido! Nin-nin!"
10013020-200 = "[s] \"Vamos dar o nosso melhor, pessoal.\""
10013020-201 = "Muito bem, vamos começar a batalha de ocupação do 'Lost Paradise Resort'..."
10013020-202 = "Agora!"
