[translation]
10013020-1 = "第2話;まずは状況を整理しよう"
10013020-2 = "（みんなが準備のためにしばらく席を外していると――）"
10013020-6 = "こんな状況で意地を張るなんて……わざわざそんな非効率的なやり方をする必要もないでしょうに。"
10013020-7 = "それにミモリちゃんとチセまで協力するとは……いやはや、衝撃でしたねぇ～。"
10013020-8 = "先生はその辺り、ちゃんと理解されてます？"
10013020-9 = "[s] \"まあ、正直「これが正解」とは断言できないけど。\""
10013020-13 = "[ns] \"でもシズコが決めたことだから、応援してあげたいかな。\""
10013020-14 = "……なるほど。つまり先生も否定はしてない、と？"
10013020-15 = "にゃはは～。はいはい、わかりましたよっと。#n退屈な話はここまでにしましょう。"
10013020-16 = "私の助言が無意味なら、ダラダラ喋っても仕方がありませんし。#nそれでは、これで――"
10013020-17 = "[s] \"うん。頼んだよ、ニヤ。\""
10013020-18 = "ん～？先生が何をおっしゃっているのか、さっぱり分かりませんねぇ～？#nにゃはは♪"
10013020-27 = "あ、先生！いらしてたんですね。"
10013020-28 = "[s] \"シズコ！？その格好は……。\""
10013020-29 = "ああ、これですか？"
10013020-30 = "海での激しい戦闘が予想されますからね！#n水に濡れても大丈夫な格好をと思いまして。"
10013020-31 = "その結果……"
10013020-32 = "こうして水着に着替えたわけです！"
10013020-33 = "どうでしょう？この[ruby=かわわ]河和[/ruby]シズコが考えた備えあれば憂いなしの戦略！そして全天候を完璧に網羅したプロフェッショナルな姿！"
10013020-34 = "[s] \"あー、うん……。\""
10013020-35 = "ふふふっ♪"
10013020-36 = "……ふぅ。"
10013020-44 = "そ、それで、ですね。えっと、そういうわけなんですけど――"
10013020-45 = "その……もし、よろしければ、先生から見た……その……"
10013020-46 = "か……か、感想とか――"
10013020-47 = "あーーーーーるじどのぉぉぉお！！"
10013020-53 = "[ns] \"うわっ！い、イズナ！？\""
10013020-59 = "はい！不肖イズナ、シズコ殿と同じく！"
10013020-60 = "夏の海に相応しい装束に着替えてきました！"
10013020-64 = "いかがですか、主殿？イズナ、かっこよく変身できてますか？"
10013020-68 = "[ns] \"あ、うん。かっこいいよ。\""
10013020-69 = "ちょ、ちょっと！イズナ……！"
10013020-70 = "あらあら、みんな元気いっぱいですね。うふふ。"
10013020-71 = "先生、私も着替えたよー。"
10013020-72 = "これで――"
10013020-73 = "海の上、走れるかな？"
10013020-74 = "[s] \"たぶん……無理だと思う。\""
10013020-75 = "そうなの？"
10013020-77 = "ですがチセ殿！"
10013020-78 = "たとえ今は難しくとも、修行を怠らなければ――"
10013020-79 = "いつか忍者のように走れると、イズナは思います！はい！たぶん！"
10013020-80 = "[s] \"もちろん自信を持つのはいいことなんだけど……！\""
10013020-85 = "[ns] \"みんな水着に着替えたんだね。\""
10013020-86 = "はい、そうなんです。"
10013020-87 = "イズナの水着は部長とツクヨ殿が選んでくれたんです！任務先が海だと言ったら、必要になるかもしれないからと！なるほど、このような時に使われるのですね！"
10013020-88 = "ニヤ部長がー海で着ると強くなれるよって。"
10013020-89 = "[s] \"そ、そうなんだ……ミモリは？\""
10013020-90 = "えっ？あっ、私は……その……"
10013020-93 = "海に行くとツバキちゃんとカエデちゃんに言ったら……私に似合うものを見繕ってくれて……"
10013020-94 = "一応、遊びに行くのではなく、シズコちゃんが危険かもしれないから行くのだと伝えたんですけど……"
10013020-95 = "幻滅……されましたよね？"
10013020-98 = "[ns1] \"まさか。せっかく、というのもあるからね。\"\n[ns2] \"みんな、とても似合ってるよ。\""
10013020-101 = "そ、そうですか……"
10013020-102 = "で、ですよね！皆さん準備万端で流石です！あはは……。"
10013020-103 = "はい！皆さん、本当によく似合ってます！"
10013020-104 = "新しいお祭りでも始まったのかなって思うくらいです！"
10013020-105 = "こんなことなら、私も水着を持ってくればよかったなぁ～。"
10013020-106 = "こんな眼福の一大イベントが開催されるなんて……海にきて良かった～！"
10013020-107 = "先生もそう思いますよね？ね？"
10013020-108 = "[s] \"う、うん……そう、だね？\""
10013020-110 = "ウミカ、先生が困ってるから……。"
10013020-117 = "さてさて、みんな集まったことだし、情報交換といこうか？"
10013020-124 = "ニヤさんが調査してくれた情報によると、現在、この「ロスト・パラダイス・リゾート」で頭角を現しているグループはこのようになっているみたいです。"
10013020-125 = "大体７つくらいに分かれているのね……"
10013020-128 = "ん。その中でも「リゾート狩り」を積極的にやっているのが、このヘルメット団。"
10013020-129 = "私たちもこの間戦ったわね。とにかく騒がしい連中だった。"
10013020-130 = "活動拠点や移動経路があちこちに形成されていると見たほうが良さそうですね。"
10013020-132 = "はい……ただ、このヘルメット団が特殊なだけで、ほとんどのグループは存在を隠そうとしているのか、水面下で活動しているようで……"
10013020-133 = "正式な名前というよりは、通称で呼ばれているみたいなんです。"
10013020-134 = "[s] \"通称？\""
10013020-135 = "例えば、ここから一番近い島を占領しているグループは――"
10013020-140 = "「幻の泉脈を探す硫黄の鉱夫たち」……？"
10013020-141 = "ロマンティックなお名前ですね☆"
10013020-142 = "[s] \"ロマンティック……かなぁ？\""
10013020-145 = "他にも「敗者を破滅に導く白い耳の怪物たち」とか……。"
10013020-148 = "あっ！「全てに代価を要求する玄武の使者たち」というグループもあるみたいですよ、主殿！"
10013020-149 = "まるで忍者と敵対する悪党みたいな名前ですね！"
10013020-150 = "[s] \"イズナの善悪の基準がよく分からないんだけど……。\""
10013020-151 = "……ええと、漫画の設定か何かです？"
10013020-153 = "そして、最後の一つは――"
10013020-157 = "「片っ端から喧嘩を売って回るヘルメット団」です。"
10013020-158 = "それ、ただのヘルメット団じゃない！"
10013020-159 = "これで情報は大体全部かしら。"
10013020-160 = "むむむ…これじゃあ情報を得たというより、むしろ謎が謎を呼んだような……"
10013020-162 = "うーん……シズコちゃん、これからどうします？"
10013020-173 = "うーん……この場合……"
10013020-174 = "より効率的に動くには……"
10013020-181 = "……よし、決めた。"
10013020-182 = "ここからは二手に分かれましょう。"
10013020-183 = "[s] \"え？「リゾート狩り」をするのに？\""
10013020-184 = "はい。たしかに戦力は分散しますが、その分効率的に攻略できると思いますので。"
10013020-185 = "それに、こうしている間にも、百夜堂の評判はどんどん落ちてしまっているかもしれませんし……"
10013020-186 = "つまりこれは、時間との勝負なんです！"
10013020-187 = "[s3] \"わかった。それならチームは……\"\n[s4] \"アビドスと百鬼夜行――で分けた方が良さそうだね。\""
10013020-194 = "はい。私たちはこのポイントに向かいますので、アビドスの皆さんはこっちをお願いします！"
10013020-195 = "うへ～了解。んじゃ、それでいいかな？"
10013020-196 = "はい。それでは、みんなで――"
10013020-197 = "出発しましょう！"
10013020-199 = "承知です！ニンニン！"
10013020-200 = "[s] \"みんなで頑張ろう。\""
10013020-201 = "それじゃあ、今から「ロスト・パラダイス・リゾート」の占領戦を……"
10013020-202 = "始めるわよ！"
