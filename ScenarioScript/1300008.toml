[translation]
1300008-1 = "Bom dia, mestre."
1300008-2 = "Schale - Área Residencial"
1300008-4 = "Fufu, parece que você ainda está dormindo."
1300008-5 = "Sinto muito, já que parece estar tendo um bom sonho, mas..."
1300008-6 = "Já está na hora de acordar."
1300008-13 = "Acordou?"
1300008-14 = "Bom dia, mestre."
1300008-15 = "Está mais cedo que o habitual? Sim, eu fiz questão de acordá-lo mais cedo."
1300008-16 = "O motivo... eu explicarei mais tarde."
1300008-17 = "Fufu, se isso o desagradou, pode me punir mais tarde, se quiser."
1300008-18 = "Não! Na verdade, eu adoraria ser punida!"
1300008-19 = "Se for pelo bem da sua vida saudável e de suas refeições regulares, eu, Akane, tenho confiança de que sorrirei alegremente mesmo que caia no inferno."
1300008-20 = "Vamos, rápido! A punição!"
1300008-21 = "..."
1300008-22 = "...Ora, sem punições ou repreensões?"
1300008-23 = "Que pessoa gentil você é, fufu."
1300008-25 = "Ah, vai se deitar de novo? Não pode, não pode~, levante-se logo."
1300008-26 = "Desista... ué? Ué, ué? Por que você está me... Kyaa!?"
1300008-27 = "Ah..."
1300008-30 = "Ai, meu Deus."
1300008-31 = "Pu-puxar uma empregada para a cama à força..."
1300008-32 = "...Sim!? V-vamos dormir juntos!?"
1300008-33 = "Is-isso é tão indecente... Aah, mesmo sendo você, mestre, ainda não estou pronta para algo assim..."
1300008-35 = "Eh?"
1300008-36 = "..."
1300008-37 = "N-não pode ser, né?"
1300008-38 = "Vo... você realmente dormiu!?"
1300008-39 = "Não acredito! Acorde! Como você faz isso depois de tudo o que aconteceu!?"
1300008-40 = "...Puxa."
1300008-41 = "Na verdade... o motivo de eu ter vindo acordá-lo um pouco mais cedo é..."
1300008-42 = "É porque eu queria te ver e conversar com você o quanto antes."
1300008-43 = "..."
1300008-44 = "Hmm... ficar assim também não é... nada mal."
1300008-45 = "Fufu, está quentinho."
1300008-46 = "Seria bom aproveitar essa felicidade matinal juntos, mas..."
1300008-48 = "Além disso, há coisas que eu preciso preparar, afinal."
1300008-49 = "Fufu... espere um pouco, por favor."
