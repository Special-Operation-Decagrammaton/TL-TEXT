[translation]
1300008-1 = "おはようございます、ご主人様"
1300008-2 = "シャーレ・居住区"
1300008-4 = "ふふっ、まだお眠りのようですね。"
1300008-5 = "良い夢を見られているようなので申し訳ありませんが……。"
1300008-6 = "そろそろ、お目覚めのお時間ですよ。"
1300008-13 = "お目覚めになりましたか。"
1300008-14 = "おはようございます、ご主人様。"
1300008-15 = "いつもより早い時間、ですか？はい、私が早めに起こさせていただきました。"
1300008-16 = "その理由は……後ほどお話しします。"
1300008-17 = "ふふっ、もしご不快でしたら、後で罰を与えてくださってもいいのですよ。"
1300008-18 = "いえ！むしろ罰を強く希望します！"
1300008-19 = "ご主人様の健全な生活と規則正しい食事のためでしたら、このアカネ、地獄に落ちても明るく笑ってみせる自信があります。"
1300008-20 = "さあ早く！罰を！"
1300008-21 = "……。"
1300008-22 = "……あら、罰やお咎めは無しですか？"
1300008-23 = "なんて優しいお方なのでしょう、ふふっ。"
1300008-25 = "あっ、また横になるだなんて。ダメですよ～、早く起きてください。"
1300008-26 = "諦めて……あれ？あれ、あれれ？なんで私を……きゃあっ！？"
1300008-27 = "あっ……。"
1300008-30 = "も、もう。"
1300008-31 = "メ、メイドを強引にベッドへ引き込むなんて……。"
1300008-32 = "……はいっ！？い、一緒に寝るのですか！？"
1300008-33 = "そっ、そんな、いやらしいこと……ああっ、いくらご主人様でも、まだ、そんな……"
1300008-35 = "え？"
1300008-36 = "……。"
1300008-37 = "う、嘘でしょう？"
1300008-38 = "ほ……本当に寝てしまわれたのですか！？"
1300008-39 = "そんな！信じられません！起きてください！ここまでしておいてそれはどうなんですか！"
1300008-40 = "……ふう。"
1300008-41 = "実は……少し早い時間にご主人様を起こしに来た理由は……。"
1300008-42 = "少しでも早くご主人様に会って、お話ししたかったからです。"
1300008-43 = "……。"
1300008-44 = "うーん……このままでいるのも……悪くない、ですね。"
1300008-45 = "ふふっ、暖かいです。"
1300008-46 = "このまま一緒に、朝の幸せを味わうのもいいですが……。"
1300008-48 = "それとはまた別に、私が用意しなくてはならないものがありますからね。"
1300008-49 = "ふふっ……少々お待ちくださいね。"
