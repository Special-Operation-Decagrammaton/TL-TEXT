[translation]
1006602-1 = "メイド大ピンチ！"
1006602-2 = "（ゲーム開発部の部室に駆けつけた）"
1006602-9 = "ゲーム開発部・部室"
1006602-10 = "[ns] \"アリス、大丈夫！？\""
1006602-11 = "勇者よ、本当に来てしまったのですね……。"
1006602-12 = "[s1] \"もちろん、心配だからね。\"\n[s2] \"でも、一体どこにいるの……？\""
1006602-15 = "勇者よ、すぐに元いたところへ戻るがよい……#n今のアリスはそなたの前に姿を現すことが許されないのだ……。"
1006602-16 = "[s] \"本当に、どうしたの？\""
1006602-17 = "……。"
1006602-18 = "[s3] \"何かあったのなら、聞かせてほしい。\"\n[s4] \"アリスの力になりたいから。\""
1006602-29 = "…………ずるいです、先生。#nそんなことを言われたら、アリスは従うほかありません。"
1006602-30 = "[s] \"え……？メイド服……？\""
1006602-31 = "うう……そんな顔で見ないでください……。"
1006602-32 = "アリスも、メイド服はまだ少し無理なんです……。"
1006602-33 = "だから着るつもりもなかったのに、先生が来ると言うから――！"
1006602-34 = "先生！こうなった責任を取ってください！"
1006602-40 = "まずはアリスの頭をナデナデするのです！"
1006602-42 = "（アリスのあたまをなでなでした）"
1006602-43 = "（アリスはすこしおちついた！）"
1006602-45 = "[ns] \"改めて……何があったの？\""
1006602-46 = "実は……。"
1006602-50 = "[ns5] \"つまり、着るものが……。\"\n[ns6] \"メイド服しかなかったってこと？\""
1006602-53 = "はい、他の服はすべて洗濯中なのです……。"
1006602-54 = "ですが、アリスはまだメイド服に抵抗があるのです……。"
1006602-55 = "これを見ていると様々なことを思い出しますから。#n激しい戦い、倒れゆく仲間たち、向かってくるネル先輩――"
1006602-56 = "心に残ったシーン、感動的なカット、#n夕焼けに浮かぶクジラ雲、そしてCMが流れていき……。"
1006602-57 = "[s7] \"確かに色々あったね……。\"\n[s8] \"なんか他のも混ざってる気が……。\""
1006602-60 = "とにかくあの時のことがあるからか、メイド服を着ると#nアリスは思うように身体を動かせなくなってしまうのです。"
1006602-61 = "装備すると全ステータスに[ruby=弱くなる]デバフがかかる[/ruby]#n呪いのアイテムみたいに……。"
1006602-62 = "今はネル先輩も怖い人じゃないって分かってますし、#n先輩が着ているものなら好きになりたいのですが……#nどうしたらいいか、分からなくて……ぐすん。"
1006602-63 = "[s] \"それなら、アリス！\""
1006602-64 = "……？"
1006602-65 = "[s] \"メイドにジョブチェンジしよう！\""
1006602-66 = "ジョブチェンジ、ですか？"
1006602-67 = "突然どうして……？"
1006602-68 = "[s9] \"メイドにジョブチェンジして経験値を稼げば、\"\n[s10] \"専用スキルを覚えてデバフを打ち消せるはず！\""
1006602-71 = "そうすればメイドを克服できる……ほ、本当でしょうか……？"
1006602-72 = "……ですが、先生が言うなら信じたいです！"
1006602-73 = "でも、何から始めればいいんでしょう？"
1006602-74 = "[s] \"メイドがやりそうなことをしてみるとか？\""
1006602-75 = "メイドがやりそうなこと……？"
1006602-79 = "そうですね……メイドといえば……#nよくお掃除をしています。"
1006602-80 = "他には、戦闘や破壊……潜入なども……"
1006602-81 = "……え？それは気にしなくていい、ですか？"
1006602-82 = "ではアリス、お掃除から始めてみます！"
1006602-86 = "うわーん！片付けるものが多すぎます！"
1006602-87 = "転がるペットボトル、散乱したお菓子の袋、ホコリまみれの床……。"
1006602-88 = "本当に……綺麗になるのでしょうか……？"
1006602-89 = "[s] \"少しずつやっていこう……。\""
1006602-90 = "はい……アリス、頑張ります……。"
1006602-92 = "先生、ゴミ袋を用意してください。#n一枚……いえ、三枚くらい欲しいです。"
1006602-94 = "ああっ、お菓子のくずがこぼれてしまいました！#n掃除機も必要です！"
1006602-96 = "くしゅんっ！少しはたいただけでホコリまみれです……。#nええと、まずはバケツで水を……。"
1006602-97 = "え？……それより乾拭きした方がいい？"
1006602-98 = "なるほど……。"
1006602-100 = "（アリスと懸命に部室を掃除して……）"
1006602-106 = "……。"
1006602-107 = "先生、部室が綺麗になりました！お掃除クエスト完了です！"
1006602-108 = "[ns] \"そしてアリスも、普通に動けるようになったね。\""
1006602-109 = "え……？"
1006602-110 = "ほ、本当です！アリス、もう手も足も震えてません！絶好調です！"
1006602-111 = "これはクエスト完了でレベルアップし、#n専用スキルを手に入れたからですね！？"
1006602-112 = "[s] \"きっとそうだよ、良かったね。\""
1006602-113 = "先生のおかげです！アリスもメイド服を#n着たまま動けるようになりました！"
1006602-114 = "やっぱり先生はすごいです！"
1006602-116 = "（その後、ご機嫌なアリスと一緒にゲームを楽しんだ）"
