[translation]
22010-1 = "第1話;密やかなる会談"
22010-10 = "ミレニアム・セミナー執務室"
22010-12 = "あら……超天才清楚系病弱美少女の来訪を、#n電気もつけずに迎えるなんて……。"
22010-13 = "来客をもてなす気がこれっぽっちも無いという点、#nとてもあなたらしいとは思いますけど……。"
22010-14 = "ですが、暗い部屋でモニターをつけていると目が悪くなりますよ？"
22010-18 = "――リオ。"
22010-25 = "万全を期しているだけよ――この会談を外部に知られてはならないもの。"
22010-26 = "そのためであれば、この程度問題ではないわ。"
22010-27 = "この訪問はデータベースには残らない。#nつまり、記録上私たちは会ってなどいない事になっている。"
22010-28 = "すべては――これから話す内容の機密を守るため。"
22010-29 = "リオったら、真面目なんですから……#n「貴女は私の姉なの？」くらいの軽口を返せないと、ユーモアからは程遠いですよ。"
22010-30 = "今のだって、超天才清楚系病弱美少女の軽い冗談なんですから。#nふふ。"
22010-31 = "……貴女は私の姉ではないわ。#n急にそんな非合理的な話をするなんて……どうしたの、ヒマリ。"
22010-32 = "……ええ、ええ。そうでした。#nあなたはそういう人でしたね。"
22010-33 = "ユーモアを解さずに「合理」だなんて……あなたの好きな表現でしたね、それ。"
22010-34 = "好悪の話ではないのだけれど……事実でしょう？"
22010-35 = "この会合が秘匿されている事くらいは、あなたも理解しているものだと思っていたのだけれど。"
22010-36 = "それはどうでしょう？#n――そもそも、人目を気にするのであれば、他の場所にすれば良かったのでは？"
22010-38 = "……他の場所？"
22010-39 = "ええ、例えば……"
22010-41 = "誰かさんがこっそり作っている――"
22010-42 = "[ruby=悪趣味]「セーフハウス」[/ruby]……とか？"
22010-44 = "……。"
22010-46 = "……本題に入りましょう。"
22010-47 = "あらあら、話を逸らすつもりですか？#nふふ……ええ、構いませんが。"
22010-52 = "まず、お互いの認識のすり合わせを。"
22010-54 = "前回、「鏡」を巡ってミレニアム生が起こした一連の騒動――"
22010-55 = "それは私たちが共に仕掛けたことだったわね。"
22010-61 = "ええ。私が「鏡」という手段を用意し、リオが「C&C」という危機を提供する――。"
22010-62 = "珍しく、一つの目的のためにあなたと私が協力した事でした。"
22010-64 = "そう――[ruby=AL-1S]アリス[/ruby]の正体を明かすために。"
22010-70 = "あれから随分と経つけれど……#n解釈の結論は出たかしら？"
22010-71 = "もちろんです。"
22010-73 = "アリスの正体……#nそれは――"
22010-74 = "無名の司祭が崇拝する「オーパーツ」であり――"
22010-75 = "――遥か昔の記録に存在する、"
22010-79 = "「名もなき神々の王女」。"
22010-81 = "……。"
22010-82 = "……。"
22010-83 = "そう……同じ解釈になったようね。"
22010-88 = "つまり……「あの存在」の本質は……。"
22010-89 = "ええ。アリス、あの子は――"
22010-93 = "「世界を終焉に導く兵器」"
22010-94 = "「『かわいい後輩』ですよね♪」"
22010-100 = "……？"
22010-101 = "……あら。"
22010-102 = "……あなたは一体、何を言っているの？"
22010-103 = "リオこそ、一体何を言っているのですか……？"
22010-104 = "……。"
22010-105 = "……。"
22010-111 = "……そう。じゃあ、私たちの同盟はここで終わりという事ね。"
22010-112 = "そうですね。#n同盟ではなく、休戦でしたが……。"
22010-113 = "………………。"
22010-114 = "……………………。"
22010-122 = "ああ、これが噂の……最近あなたが作っているおもちゃですね。"
22010-126 = "同盟を解除した以上、貴女をこのまま帰すわけにはいかないわ。"
22010-128 = "まぁ……そうでしょうね。#nあなたならそうすると思っていました。"
22010-135 = "ッ……！？#n私のオフィスが……ハッキングされた……！？"
22010-136 = "あらあら……ビッグシスターの部屋は無敵だとでも？"
22010-137 = "AMAS、ヒマリを捕らえなさい……！"
22010-138 = "ふふ、病弱美少女に不可能なんてないんですよ。"
22010-144 = "（AMASの全個体が、動作を停止した……？）"
22010-145 = "（まさか、照明システムがダウンした瞬間に……！？#n　あの一瞬でこれだけの規模のハッキングを……？）"
22010-146 = "（……感心してる場合じゃない。ドローンの制御権を復旧させないと）"
22010-163 = "ん、なんで照明システムが反応……。"
22010-168 = "うっ……！"
22010-173 = "ヒマリは……"
22010-179 = "……そう、抜け出したのね。"
22010-180 = "さすがはヴェリタスの部長……。"
22010-181 = "できることなら、味方にしておきたかったけれど……"
22010-182 = "本当に、残念よ。"
22010-184 = "はぁ……非合理的なこの方法だけは、選びたくなかったのに――"
22010-193 = "自分と意見が違うと気づくや否や、躊躇いなく行動するその姿……"
22010-194 = "久々に見ましたが……相変わらずですね、リオ。"
22010-195 = "まぁ、超天才病弱美少女の私には無意味ですが♪"
22010-196 = "さてさて……これでリオより先に……"
22010-203 = "ん……？"
22010-211 = "くっ……！？#nあなたは……だれ……？"
22010-219 = "あなたは……"
22010-220 = "まさか……5番目のC&C……"
22010-228 = "次回;ゲーム開発部の平凡な日常"
