[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
22010-1 = "Episódio 1: A Reunião Secreta."
22010-10 = "Millennium · Escritório da Seminar"
22010-12 = "Ora, ora…… receber a visita de uma\nsuper-gênia, recatada, fragilzinha e linda#nsem sequer acender a luz……"
22010-13 = "Não ter o menor interesse\nem receber bem uma convidada,#nbem, isso é tão a sua cara……"
22010-14 = "Mas, sabe, ficar com o monitor ligado\nnum quarto escuro estraga a vista, viu?"
22010-18 = "——Rio."
22010-25 = "Só estou sendo cautelosa——ninguém lá fora\npode tomar conhecimento desta reunião."
22010-26 = "E, para garantir isso,\numa escuridão dessas é o de menos."
22010-27 = "Esta visita não ficará registrada\nem banco de dados algum.#nOu seja, nos registros,\neste encontro jamais existiu."
22010-28 = "Tudo isso——para proteger o sigilo\ndaquilo que vamos conversar."
22010-29 = "Ai, Rio, você é séria demais……#nSe não consegue rebater nem com uma\npiadinha tipo \"você por acaso é minha\nirmã mais velha?\", está a anos-luz\nde ter senso de humor."
22010-30 = "Aquilo agora era só uma brincadeirinha leve\nda super-gênia recatada, fragilzinha e linda, viu?#nFufu."
22010-31 = "……Você não é minha irmã mais velha.#nSair com uma irracionalidade dessas do nada……\no que deu em você, Himari?"
22010-32 = "……Sim, sim. É verdade.#nVocê é exatamente esse tipo de pessoa."
22010-33 = "Não compreender uma pitada de humor\ne ainda falar em \"razão\"……\nessa é uma das suas expressões favoritas, não é?"
22010-34 = "Não é questão de gostar ou não……\né só um fato, não acha?"
22010-35 = "Eu imaginava que você ao menos entendesse\nque este encontro precisa permanecer em segredo."
22010-36 = "Será mesmo?#n——Aliás, se você se importa tanto\ncom olhares alheios, não teria sido\nmelhor escolher outro lugar?"
22010-38 = "……Outro lugar?"
22010-39 = "Sim, por exemplo……"
22010-41 = "Aquela coisa que uma certa pessoa\nanda construindo às escondidas——"
22010-42 = "a tal \"casa segura\"…… que tal?"
22010-44 = "……"
22010-46 = "……Vamos ao que interessa."
22010-47 = "Ora, ora, vai mudar de assunto?#nFufu…… tudo bem, por mim não há problema."
22010-52 = "Primeiro, vamos alinhar\no que cada uma de nós sabe."
22010-54 = "Da última vez, toda aquela confusão que\nas alunas de Millennium causaram\npor causa do \"Espelho\"——"
22010-55 = "……fomos nós duas, juntas,\nque armamos tudo aquilo."
22010-61 = "Sim. Eu preparei o recurso chamado \"Espelho\",\ne a Rio forneceu a ameaça chamada \"C&C\"——"
22010-62 = "Foi uma rara ocasião em que você e eu\ncolaboramos por um único objetivo."
22010-64 = "Isso mesmo——para revelar\na verdadeira identidade de Aris."
22010-70 = "Já se passou um bom tempo desde então……#nVocê já chegou a alguma conclusão na sua análise?"
22010-71 = "Com toda a certeza."
22010-73 = "A verdadeira identidade de Aris……#né——"
22010-74 = "um \"OOPArt\" venerado\npor um sacerdote sem nome——"
22010-75 = "——algo que consta em registros\nde um passado remoto,"
22010-79 = "\"A Princesa dos Deuses Sem Nome\"."
22010-81 = "……"
22010-82 = "……"
22010-83 = "Então é isso……\nparece que chegamos à mesma interpretação."
22010-88 = "Ou seja…… a verdadeira essência\n\"daquela existência\" é……"
22010-89 = "Sim. A Aris, aquela menina, é——"
22010-93 = "\"A arma que conduzirá o mundo ao seu fim\"."
22010-94 = "\"'Uma caloura fofinha', não é mesmo? ♪\""
22010-100 = "……?"
22010-101 = "……Ora."
22010-102 = "……O que, exatamente, você está dizendo?"
22010-103 = "A Rio é que está dizendo\no quê, exatamente……?"
22010-104 = "……"
22010-105 = "……"
22010-111 = "……Entendo. Então\na nossa aliança termina aqui."
22010-112 = "Pois é.#nEmbora não fosse bem uma aliança,\ne sim uma trégua……"
22010-113 = "………………"
22010-114 = "……………………"
22010-122 = "Ah, então é este o tal……\nbrinquedinho que você anda construindo ultimamente."
22010-126 = "Agora que a aliança foi rompida,\nnão posso deixar você ir embora assim."
22010-128 = "Bem…… imagino que não mesmo.#nJá esperava que você fosse agir assim."
22010-135 = "Kh……!?#nO meu escritório……\nfoi hackeado……!?"
22010-136 = "Ora, ora…… achou que a sala\nda Irmã Mais Velha fosse invencível?"
22010-137 = "AMAS, capturem a Himari……!"
22010-138 = "Fufu, para uma frágil e linda donzela\nnão existe impossível."
22010-144 = "(Todas as unidades AMAS……\npararam de funcionar……?)"
22010-145 = "(Não me diga que, no exato instante em que\no sistema de iluminação caiu……!?#n Naquele único segundo,\numa invasão dessa magnitude……?)"
22010-146 = "(……Não é hora de ficar admirada.\nPreciso recuperar o controle dos drones.)"
22010-163 = "Hã, por que o sistema\nde iluminação reagiu……"
22010-168 = "Ugh……!"
22010-173 = "A Himari……"
22010-179 = "……Entendo, então ela escapou."
22010-180 = "Não esperava menos\nda presidente da Veritas……"
22010-181 = "Se fosse possível,\neu teria gostado de tê-la do meu lado……"
22010-182 = "É uma verdadeira pena."
22010-184 = "Haah…… este método irracional era justamente\no que eu não queria ter de escolher——"
22010-193 = "No instante em que percebe que alguém\npensa diferente, parte para a ação\nsem o menor titubeio……"
22010-194 = "Fazia tempo que eu não via isso……\ncontinua a mesma de sempre, Rio."
22010-195 = "Mas, claro, contra mim, a super-gênia\nfragilzinha e linda, isso não serve de nada ♪"
22010-196 = "Pois bem, pois bem……\nagora, antes mesmo da Rio……"
22010-203 = "Hã……?"
22010-211 = "Kh……!?#nVocê…… quem é você……?"
22010-219 = "Você é……"
22010-220 = "Não pode ser…… o quinto C&C……"
22010-228 = "Próximo episódio: O Dia a Dia Comum do Clube de Desenvolvimento de Jogos."