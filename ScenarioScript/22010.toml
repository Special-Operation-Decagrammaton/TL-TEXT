[translation]
22010-1 = "Episódio 1; Uma Reunião Clandestina"
22010-10 = "Millennium - Escritório da Seminar"
22010-12 = "Ara... Receber a visita de uma linda, pura, supergenial e frágil garota doente no escuro, sem sequer acender as luzes..."
22010-13 = "Essa sua total falta de vontade de ser hospitaleira com as visitas é, de fato, bem a sua cara..."
22010-14 = "No entanto, ficar olhando para monitores num quarto escuro faz mal aos olhos, sabia?"
22010-18 = "――Rio."
22010-25 = "Estou apenas garantindo a perfeição. Esta reunião não pode chegar ao conhecimento do mundo exterior."
22010-26 = "Se for para garantir isso, um incômodo desse nível é irrelevante."
22010-27 = "Esta sua visita não ficará registrada no banco de dados. Em outras palavras, para os registros oficiais, nós nunca nos encontramos."
22010-28 = "Tudo isso... para proteger o sigilo absoluto do que discutiremos a partir de agora."
22010-29 = "Rio, você é sempre tão séria... Se não consegue nem retrucar com um 'Por acaso você é minha irmã mais velha?', então você está bem longe de ter senso de humor."
22010-30 = "Afinal, o que eu disse agora não passou de uma piadinha leve de uma linda, pura, supergenial e frágil garota doente. Fufu."
22010-31 = "......Você não é a minha irmã mais velha. Trazer à tona uma conversa tão irracional do nada... Qual é o seu problema, Himari?"
22010-32 = "......Sim, sim. É verdade. Você sempre foi esse tipo de pessoa."
22010-33 = "Ser incapaz de compreender o humor e chamar isso de 'racionalidade'... É bem a sua expressão favorita, não é?"
22010-34 = "Não é uma questão de gosto, é apenas um fato. Não concorda?"
22010-35 = "Eu presumi que até você seria capaz de compreender a necessidade desta reunião ser mantida em sigilo absoluto."
22010-36 = "Será mesmo? ――Pra começo de conversa, se você se importa tanto com os olhares alheios, não seria melhor ter escolhido outro lugar?"
22010-38 = "......Outro lugar?"
22010-39 = "Sim, como por exemplo..."
22010-41 = "Aquele lugarzinho que uma certa pessoa está construindo em segredo..."
22010-42 = "O seu 'Esconderijo' [ruby=de péssimo gosto]Safehouse[/ruby]... talvez?"
22010-44 = "......"
22010-46 = "......Vamos direto ao assunto principal."
22010-47 = "Ara ara, tentando mudar de assunto? Fufu... Tudo bem, eu não me importo."
22010-52 = "Primeiro, precisamos alinhar os nossos entendimentos."
22010-54 = "Aquele incidente recente envolvendo as alunas da Millennium e a disputa pelo 'Espelho'..."
22010-55 = "Fomos nós duas que orquestramos tudo aquilo."
22010-61 = "Exatamente. Eu forneci o meio, o 'Espelho', enquanto você providenciou a crise, a 'C&C'."
22010-62 = "Foi uma rara ocasião em que nós duas cooperamos em prol de um único objetivo."
22010-64 = "Sim. Tudo para revelar a verdadeira identidade de Aris."
22010-70 = "Já se passou um bom tempo desde então... Você já chegou a uma conclusão na sua análise?"
22010-71 = "Mas é claro."
22010-73 = "A verdadeira identidade de Aris... Ela é..."
22010-74 = "O 'Oopart' venerado pelos Sacerdotes Sem Nome..."
22010-75 = "――Aquela que existe em registros de um passado muito distante,"
22010-79 = "A 'Princesa dos Deuses Sem Nome'."
22010-81 = "......"
22010-82 = "......"
22010-83 = "Entendo... Parece que chegamos à mesma conclusão."
22010-88 = "Em outras palavras... A verdadeira essência daquela 'entidade' é..."
22010-89 = "Sim. A Aris, aquela garota é――"
22010-93 = "'A arma que trará o fim do mundo.'"
22010-94 = "'Uma kouhai adorável, não é mesmo?♪'"
22010-100 = "......?"
22010-101 = "......Ara."
22010-102 = "......O que diabos você está dizendo?"
22010-103 = "A pergunta é o que *você* está dizendo, Rio...?"
22010-104 = "......"
22010-105 = "......"
22010-111 = "......Entendo. Então a nossa aliança termina aqui."
22010-112 = "Pois é. Embora tenha sido um cessar-fogo, e não uma aliança..."
22010-113 = ".................."
22010-114 = "...................."
22010-122 = "Ah, então esses são os famosos... brinquedinhos que você tem construído ultimamente."
22010-126 = "Já que a nossa aliança foi desfeita, eu não posso simplesmente deixar você ir embora."
22010-128 = "Bem... Eu imaginei. Vindo de você, eu já esperava por isso."
22010-135 = "Tsk...!? O meu escritório... foi hackeado...!?"
22010-136 = "Ara ara... Você realmente achou que a sala da Big Sister era impenetrável?"
22010-137 = "AMAS, capturem a Himari...!"
22010-138 = "Fufu, não existe a palavra 'impossível' para esta bela e frágil garota doente."
22010-144 = "(Todas as unidades AMAS... pararam de funcionar...?)"
22010-145 = "(Não me diga que, no exato instante em que o sistema de iluminação caiu...!? Ela executou um hack dessa magnitude naquela fração de segundo...?)"
22010-146 = "(......Não é hora de ficar impressionada. Preciso restaurar o controle dos drones.)"
22010-163 = "Hm? Por que o sistema de iluminação reagiu..."
22010-168 = "Ugh...!"
22010-173 = "A Himari..."
22010-179 = "......Entendo, ela escapou."
22010-180 = "Como esperado da presidente da Veritas..."
22010-181 = "Se fosse possível, eu gostaria de tê-la mantido como uma aliada..."
22010-182 = "É realmente uma pena."
22010-184 = "Haa... Eu realmente não queria ter que escolher um método tão irracional, mas――"
22010-193 = "No instante em que percebe que alguém tem uma opinião divergente, você age sem a menor hesitação..."
22010-194 = "Fazia tempo que eu não via isso, mas... Você continua a mesma de sempre, Rio."
22010-195 = "Bem, de qualquer forma, isso é inútil contra uma garota doente e supergenial como eu♪"
22010-196 = "Pois bem... Agora eu só preciso chegar na frente da Rio e..."
22010-203 = "Hm...?"
22010-211 = "Ugh...!? Quem é... você...?"
22010-219 = "Você é..."
22010-220 = "Não me diga que... A quinta membro da C&C..."
22010-228 = "Próximo Episódio; O Cotidiano Pacato do Clube de Desenvolvimento de Jogos"