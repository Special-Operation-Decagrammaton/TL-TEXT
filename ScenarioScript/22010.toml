[translation]
22010-1 = "Episódio 1: Uma Reunião Secreta"
22010-10 = "Sala de Trabalho do Seminário do Millennium"
22010-12 = "Ora... Receber a visita da super gênio, pura e frágil beldade sem nem mesmo #nacender a luz..."
22010-13 = "O fato de você não ter o menor interesse em receber visitas, #nacho que é bem a sua cara, mas..."
22010-14 = "Mesmo assim, ficar com o monitor ligado em um quarto escuro vai prejudicar seus olhos, sabe?"
22010-18 = "――Rio."
22010-25 = "Estou apenas sendo cautelosa. Esta reunião não pode ser de conhecimento externo."
22010-26 = "Se for para garantir isso, esse nível de desconforto não é um problema."
22010-27 = "Esta visita não ficará registrada no banco de dados. #nOu seja, nos registros, nós nunca nos encontramos."
22010-28 = "Tudo isso é para manter o sigilo do que vamos discutir agora."
22010-29 = "Você é tão séria, Rio... #nSe não consegue nem retrucar com uma brincadeira do tipo 'Você é minha irmã?', está longe de ter senso de humor."
22010-30 = "O que eu acabei de dizer foi só uma piadinha leve da super gênio, pura e frágil beldade. #nFufu."
22010-31 = "...Você não é minha irmã. #nPor que de repente está dizendo algo tão irracional? O que houve, Himari?"
22010-32 = "...Sim, sim. Era isso mesmo. #nVocê sempre foi esse tipo de pessoa."
22010-33 = "Falar em 'racionalidade' sem entender de humor... essa era uma das suas expressões favoritas, não era?"
22010-34 = "Não é uma questão de gostar ou não... é um fato, não é?"
22010-35 = "Eu achei que você, pelo menos, entenderia que esta reunião precisa ser mantida em segredo."
22010-36 = "Será mesmo? #n――Para começo de conversa, se você se preocupa tanto com olhares alheios, não deveria ter escolhido outro lugar?"
22010-38 = "...Outro lugar?"
22010-39 = "Sim, por exemplo..."
22010-41 = "Aquele \"esconderijo\" de gosto duvidoso que alguém está construindo em segredo..."
22010-42 = "――ou algo assim?"
22010-44 = "……."
22010-46 = "……Vamos ao que interessa."
22010-47 = "Ora, ora, tentando mudar de assunto? #nFufu... bem, tudo bem."
22010-52 = "Primeiro, vamos alinhar nossas percepções."
22010-54 = "Da última vez, a série de incidentes causados pelos alunos do Millennium em torno do \"Espelho\"――"
22010-55 = "Foi algo que nós duas arquitetamos juntas, não foi?"
22010-61 = "Sim. Eu preparei o meio, o \"Espelho\", e a Rio forneceu a crise, a \"C&C\"――."
22010-62 = "Foi uma ocasião rara em que você e eu cooperamos por um objetivo comum."
22010-64 = "Isso――para revelar a verdadeira identidade de Alice."
22010-70 = "Já faz um bom tempo desde então... #nVocê chegou a alguma conclusão na sua interpretação?"
22010-71 = "Com certeza."
22010-73 = "A verdadeira identidade de Alice... #nÉ――"
22010-74 = "Um \"OOPArt\" adorado pelos Sacerdotes Sem Nome, e――"
22010-75 = "――algo que existe em registros de um passado muito distante,"
22010-79 = "A \"Princesa dos Deuses Sem Nome\"."
22010-81 = "……."
22010-82 = "……."
22010-83 = "Entendo... parece que chegamos à mesma conclusão."
22010-88 = "Ou seja... a essência daquela existência é..."
22010-89 = "Sim. Alice, aquela criança é――"
22010-93 = "Uma \"arma que levará o mundo ao fim\"."
22010-94 = "Uma \"'querida kohai', não é?♪\""
22010-100 = "……?"
22010-101 = "……Ora."
22010-102 = "……O que exatamente você está dizendo?"
22010-103 = "Rio, o que exatamente você está dizendo...?"
22010-104 = "……."
22010-105 = "……."
22010-111 = "……Entendo. Então, nossa aliança termina aqui."
22010-112 = "É verdade. #nNão era uma aliança, mas sim um cessar-fogo, porém……"
22010-113 = "………………。"
22010-114 = "……………………。"
22010-122 = "Ah, então este é o famoso…… brinquedo que você tem feito ultimamente."
22010-126 = "Já que a aliança foi desfeita, não posso deixar você ir embora assim."
22010-128 = "Bem…… eu suponho que sim. #nEu sabia que você faria isso."
22010-135 = "O quê……!? #nMeu escritório foi…… hackeado……!?"
22010-136 = "Ora, ora…… você achava que a sala da Big Sister era invencível?"
22010-137 = "AMAS, capturem a Himari……!"
22010-138 = "Fufu, não existe nada impossível para uma linda garota doente."
22010-144 = "(Todas as unidades AMAS pararam de funcionar……?)"
22010-145 = "(Não pode ser, no momento em que o sistema de iluminação caiu……!? #nEm um instante, ela realizou um hack dessa magnitude……?)"
22010-146 = "(……Não é hora de ficar impressionada. Preciso recuperar o controle dos drones.)"
22010-163 = "Hm, por que o sistema de iluminação está reagindo……."
22010-168 = "Ugh……!"
22010-173 = "Himari está……"
22010-179 = "……Entendo, ela escapou."
22010-180 = "Como esperado da presidente do Veritas……."
22010-181 = "Se fosse possível, eu gostaria de tê-la como aliada, mas……"
22010-182 = "É realmente uma pena."
22010-184 = "Haa…… eu não queria ter que escolher esse método irracional, mas――"
22010-193 = "Assim que percebe que alguém tem uma opinião diferente da sua, você age sem hesitação……"
22010-194 = "Faz tempo que não vejo isso…… mas você continua a mesma, Rio."
22010-195 = "Bem, para uma super gênio linda e doente como eu, isso não significa nada♪"
22010-196 = "Muito bem…… agora, antes da Rio……"
22010-203 = "Hm……?"
22010-211 = "Droga……!? #nQuem…… é você……?"
22010-219 = "Você é……"
22010-220 = "Não pode ser…… a quinta integrante da C&C……"
22010-228 = "Próximo episódio: O cotidiano comum do Clube de Desenvolvimento de Jogos"
