[translation]
2001303-1 = "Métodos de hacking"
2001303-2 = "Distrito Central, próximo ao 1º Distrito Comercial"
2001303-3 = "Ah, Sensei."
2001303-4 = "Obrigada por vir, mesmo com tanta coisa para fazer."
2001303-5 = "Com você aqui, com certeza vai dar tudo certo."
2001303-6 = "[s1] \"Ajudar a Veritas me deixa um pouco nervosa.\"\n[s2] \"Será que eu dou conta...?\""
2001303-7 = "Não precisa se preocupar tanto assim."
2001303-8 = "Não precisa se preocupar tanto assim."
2001303-9 = "Eu disse no MomoTalk, só preciso que você fique ao meu lado."
2001303-10 = "Bem, o nosso cliente é a empresa de TI que fica neste arranha-céu."
2001303-11 = "Eles expandiram os servidores de uma vez e fizeram várias mudanças recentemente, então estou preocupada com a segurança... mas o presidente é teimoso e parece não confiar em estudantes para cuidar dos dados."
2001303-12 = "[s3] \"Entendi. Mas por onde vamos entrar?\"\n[s4] \"Pelos dutos de ventilação?\""
2001303-13 = "Hã, do que você está falando? Vamos entrar pela entrada principal, como pessoas normais."
2001303-14 = "Hã, do que você está falando? Vamos entrar pela entrada principal, como pessoas normais."
2001303-15 = "Nada de brincar de espião hoje. É uma negociação importante, afinal."
2001303-20 = "Mais uma vez, eu sou Kagami Chihiro, da Millennium Science School."
2001303-21 = "Gostaria de conversar um pouco sobre a segurança da sua empresa."
2001303-22 = "……Pode entrar."
2001303-23 = "……Então, vamos começar."
2001303-24 = "Ah, só por precaução, não precisa se sentir na obrigação de dizer nada, Sensei."
2001303-25 = "Basta responder de forma casual ao que eu disser e já está ótimo. Então, vamos lá."
2001303-31 = "……Então, você está dizendo que os dados da nossa empresa estão em risco?"
2001303-32 = "Sim. Os servidores que vocês instalaram recentemente utilizam um software antivírus obsoleto. Entre os hackers, ele já é considerado algo totalmente inútil."
2001303-33 = "Se sofrerem qualquer tipo de ataque, como um spoofing, não apenas as informações internas da empresa, mas até os dados das empresas parceiras serão vazados."
2001303-34 = "……Incluindo, é claro, os documentos ultrassecretos do \"novo projeto\" que vocês prepararam."
2001303-35 = "……Hum, isso é um problema. De fato, talvez seja necessário tomar alguma medida."
2001303-36 = "Mas, só por isso, não significa que eu deva confiar isso a vocês da Veritas, certo?"
2001303-37 = "Ouvi dizer que são talentosos, mas vocês são apenas um clube escolar. Ou seja, amadores."
2001303-38 = "Falando em lógica, ser estudante não significa ser amador. A Veritas já obteve resultados concretos em segurança trabalhando com diversas empresas de TI em Kivotos."
2001303-39 = "E o Sensei do Schale, que está aqui comigo, também é um desses clientes."
2001303-40 = "[s5] \"I-isso mesmo!\"\n[s6] \"As soluções da Veritas são perfeitas.\""
2001303-41 = "Schale... Aquele Departamento de Investigação Federal que recebeu autoridade extrajudicial da Presidente do Conselho Estudantil Federal?"
2001303-42 = "Schale... Aquele Departamento de Investigação Federal que recebeu autoridade extrajudicial da Presidente do Conselho Estudantil Federal?"
2001303-43 = "……De fato, ouvi dizer que o Schale tem um intercâmbio profundo com várias escolas. Se for esse o caso, não há como duvidar da competência."
2001303-44 = "Mas você ainda é jovem. Confiar a gestão de informações confidenciais assim tão facilmente..."
2001303-45 = "[s7] \"A habilidade da Chihiro é garantida.\"\n[s8] \"Posso garantir que nada acontecerá, mas se algo der errado, eu assumirei a responsabilidade.\""
2001303-50 = "……Entendo."
2001303-51 = "Muito bem, então vamos começar com um contrato de um ano."
2001303-52 = "Se fosse apenas uma estudante como você, talvez eu não tivesse aceitado..."
2001303-53 = "Sensei do Schale, vou confiar em você também, junto com a sua recomendação."
2001303-54 = "Muito obrigada. Lidaremos com isso de forma responsável e sincera."
2001303-56 = "Ufa, caso encerrado."
2001303-57 = "Graças a isso, parece que não precisarei me preocupar com fundos por um bom tempo."
2001303-58 = "[s] \"No fim das contas, o que a Chihiro instalou...?\""
2001303-59 = "Hm? Como eu disse no começo, um \"backdoor\"."
2001303-60 = "Ou seja, uma \"porta dos fundos\" diferente da entrada oficial. É uma das técnicas básicas de hacking usadas para contornar firewalls e coisas do tipo."
2001303-61 = "Desta vez, você, Sensei, serviu como esse \"backdoor\". Para contornar o firewall que era o \"preconceito\" daquele presidente."
2001303-62 = "[s] \"Entendi. Mas isso não parece ser hacking...\""
2001303-63 = "Não, isso também é uma forma legítima de hacking."
2001303-64 = "Hacking é \"usar vários métodos para desativar e liberar a segurança do alvo, a fim de obter as informações desejadas\"."
2001303-65 = "Se você não se importar em dedicar tempo para construir confiança através da conversa, essa é a forma mais simples, clara e a melhor de hackear. Não há necessidade de recorrer a métodos ilícitos ou meios eletrônicos."
2001303-66 = "Na verdade, a maioria dos membros da Veritas tem dificuldade com isso e acaba crescendo para direções estranhas, o que é um problema..."
2001303-67 = "É por isso que eu preciso ser o exemplo. De qualquer forma, obrigado por hoje. Na próxima vez que nos virmos, eu te pago um café."
