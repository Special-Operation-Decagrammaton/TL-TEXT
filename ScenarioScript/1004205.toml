[translation]
1004205-1 = "街の花園"
1004205-2 = "[ns] \"おはよう、アツコ。\""
1004205-3 = "うん、おはよう。先生。"
1004205-4 = "……それは、何？"
1004205-5 = "[s] \"生け花をするならって思って。\""
1004205-6 = "……え？"
1004205-9 = "[wa:400]― この花、[wa:1800]もしかして……。"
1004205-11 = "― ……持ってきて、[wa:1200]くれたんだ。"
1004205-14 = "[wa:300]― 私の[wa:800]ために……？"
1004205-16 = "― ……そっか。"
1004205-19 = "[wa:500]― ……大切にするね、[wa:2100]ずっと。"
1004205-22 = "[wa:1800]― ……すごく[wa:900]嬉しい。"
1004205-24 = "― ありがとう。"
1004205-27 = "……でも、私、生け花をするとは、言ってないよ。"
1004205-28 = "[s1] \"……え？\"\n[s2] \"あれ、そうだったっけ……！？\""
1004205-29 = "うん。花壇を作ろうとしてた。"
1004205-30 = "うん。花壇を作ろうとしてた。"
1004205-31 = "[s] \"花壇……。\""
1004205-32 = "これは、花壇に植えられないけど、大切にするね。"
1004205-33 = "ふふっ……これは、特別だから。"
1004205-37 = "花壇はこっちだよ、先生。"
1004205-42 = "（人々が往来する街の片隅に、花壇が作られていた。）"
1004205-43 = "（花壇の所々に、花が植えられている。）"
1004205-44 = "[ns] \"これが花壇？\""
1004205-45 = "うん。しばらくは、この地域にいる予定なんだって。"
1004205-46 = "だから、花壇を作ってもいいかなって。"
1004205-47 = "日当たりのいい場所を探して、ここに花を植え替えたの。"
1004205-48 = "始めたばかりだけど……ここを全部、花でいっぱいにしたい。"
1004205-49 = "[s] \"これはなんて名前の花なの？\""
1004205-50 = "……私も知らない。"
1004205-51 = "[s] \"そっか。調べるの難しいよね。\""
1004205-52 = "……ただの花。都市に野放図に生えている雑草。どれも名前があったかもしれないけど、私は知らない。"
1004205-53 = "そのままにしておいたら、枯れちゃったかも……だからここに移したの。"
1004205-54 = "ここで、地に根を下ろしたらいいなって……そう思って。"
1004205-55 = "[s] \"それなら、私も手伝うよ。\""
1004205-56 = "……うん、ありがとう。"
1004205-57 = "じゃあ、近くで花を見つけたら、根っこまで掘り起こしてここに持ってきてくれる？"
1004205-58 = "[s3] \"わかった。\"\n[s4] \"任せて。\""
1004205-59 = "気をつけてね。根が傷むと死んじゃうから。"
1004205-60 = "気をつけてね。根が傷むと死んじゃうから。"
1004205-62 = "（その後、しばらく街に咲いている花を探し回った。）"
