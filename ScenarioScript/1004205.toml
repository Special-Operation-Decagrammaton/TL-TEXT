[translation]
1004205-1 = "O Jardim da Cidade"
1004205-2 = "[ns] \"Bom dia, Atsuko.\""
1004205-3 = "Sim, bom dia. Sensei."
1004205-4 = "……O que é isso?"
1004205-5 = "[s] \"Pensei que você gostaria de fazer um arranjo floral.\""
1004205-6 = "……Eh?"
1004205-9 = "[wa:400]― Esta flor, [wa:1800]será que……."
1004205-11 = "― ……Você trouxe, [wa:1200]para mim."
1004205-14 = "[wa:300]― Por minha [wa:800]causa……?"
1004205-16 = "― ……Entendo."
1004205-19 = "[wa:500]― ……Vou cuidar bem dela, [wa:2100]para sempre."
1004205-22 = "[wa:1800]― ……Estou muito [wa:900]feliz."
1004205-24 = "― Obrigada."
1004205-27 = "……Mas eu não disse que queria fazer um arranjo floral."
1004205-28 = "[s1] \"……Eh?\"\n[s2] \"Ah, foi isso que eu entendi……!?\""
1004205-29 = "Sim. Eu estava tentando fazer um canteiro de flores."
1004205-30 = "Sim. Eu estava tentando fazer um canteiro de flores."
1004205-31 = "[s] \"Um canteiro…….\""
1004205-32 = "Esta aqui não pode ser plantada no canteiro, mas vou cuidar dela com carinho."
1004205-33 = "Fufu…… esta é especial."
1004205-37 = "O canteiro é por aqui, Sensei."
1004205-42 = "(Em um canto da cidade, onde as pessoas passam, um canteiro havia sido feito.)"
1004205-43 = "(Flores estão plantadas em vários pontos do canteiro.)"
1004205-44 = "[ns] \"Isso é um canteiro?\""
1004205-45 = "Sim. Disseram que planejam ficar nesta região por um tempo."
1004205-46 = "Por isso, pensei que seria bom fazer um canteiro."
1004205-47 = "Procurei um lugar ensolarado e replantei as flores aqui."
1004205-48 = "Acabei de começar, mas…… quero encher tudo isso de flores."
1004205-49 = "[s] \"Qual é o nome desta flor?\""
1004205-50 = "……Eu também não sei."
1004205-51 = "[s] \"Entendo. Deve ser difícil descobrir.\""
1004205-52 = "……São apenas flores. Ervas daninhas que crescem livremente pela cidade. Talvez todas tivessem um nome, mas eu não conheço."
1004205-53 = "Se eu as deixasse lá, talvez tivessem murchado…… por isso as trouxe para cá."
1004205-54 = "Espero que elas criem raízes aqui…… é o que eu desejo."
1004205-55 = "[s] \"Nesse caso, eu também vou ajudar.\""
1004205-56 = "……Sim, obrigada."
1004205-57 = "Então, se encontrar flores por perto, você poderia trazê-las até aqui, cavando até a raiz?"
1004205-58 = "[s3] \"Entendido.\"\n[s4] \"Pode deixar comigo.\""
1004205-59 = "Tenha cuidado. Se a raiz for danificada, elas morrem."
1004205-60 = "Tenha cuidado. Se a raiz for danificada, elas morrem."
1004205-62 = "(Depois disso, passei um tempo procurando por flores que cresciam pela cidade.)"
