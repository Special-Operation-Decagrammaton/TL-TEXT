[translation]
102120-1 = "第12話;第3サンクトゥム「廃墟化した遊園地」"
102120-9 = "私たちも始めよう。準備はいい？"
102120-14 = "はい！みなさん、ボスの前で会いましょう！ "
102120-18 = "う、うん……気をつけてね、アリスちゃん……"
102120-19 = "あの二人だけで本当に大丈夫なのか……？"
102120-20 = "……はい、問題ないと思います。"
102120-22 = "そ、それじゃ……"
102120-23 = "アバンギャルド君……出動！"
102120-31 = "あれは何だ！？ "
102120-32 = "出ました！この間、仲間になったアバンギャルド君です！！"
102120-38 = "おおっ！ここでアバンギャルド君Mk.3の出番ですか！"
102120-39 = "ちなみに、Mk.1はリオ会長オリジナル、Mk.2はヴェリタスが改造、そしてこのMk.3はなんと！#nユズ専用の機体なんです！"
102120-40 = "アバンギャルド君Mk.3の特徴はですね！フレーム単位で入力ができるユズの動体視力に合わせて特注されたコントローラーで操作ができるんです！"
102120-41 = "そうです！最強のゲーマー「UZQueen」の専用機なのです！"
102120-42 = "えっと……"
102120-43 = "うう……プレッシャー、が……"
102120-52 = "コトリ！説明はその辺で……こっちのデータ解析を頼む！"
102120-56 = "まるで格闘ゲームのような操作感と――あっ、誰かがまた私の説明を要してますね！それでは、これで！健闘を祈りますよ、UZQueen！"
102120-61 = "……では、始めようか。"
102120-62 = "は、はい……！"
102120-67 = "第3サンクトゥムの攻略……"
102120-76 = "始めます……！！"
