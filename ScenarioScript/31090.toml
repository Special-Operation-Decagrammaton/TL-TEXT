[translation]
31090-1 = "Episódio 9;Sombras que Tremeluzem sob a Superfície"
31090-4 = "Ora, Sensei. Bom trabalho."
31090-5 = "Como vão as coisas no Clube de Aulas de Reforço?"
31090-6 = "……Digo isso, mas já fiquei sabendo. Pelo visto, a primeira prova não correu muito bem, né."
31090-7 = "Mas ainda restam mais 2, então……."
31090-8 = "……Ah, isto? É xadrez; um passatempo meu."
31090-9 = "[s] Repara no xadrez nas mãos da Nagisa."
31090-10 = "……Provavelmente, é um tipo que o senhor não costuma ver, né?"
31090-11 = "As pretas são só o Rei e a Rainha; o resto, tudo Peão."
31090-12 = "As brancas têm Rei, Torre, Bispo e Cavalo, 3 ou 4 de cada…… deve ser uma formação que não se vê com frequência."
31090-13 = "[s] \"Você tava jogando isso sozinha?\""
31090-14 = "Sim, agora sozinha. Também não tem a Mika barulhenta aqui."
31090-15 = "Hoje eu tinha uma coisa que queria lhe contar…… mas, antes disso, parece-me que o senhor tem algo que quer dizer, não é?"
31090-16 = "[s] \"Se reprovarem nas 3, o que acontece com o pessoal do Clube de Aulas de Reforço?\""
31090-17 = "……."
31090-18 = "Chegou aos seus ouvidos? A fonte foi…… a Hifumi, imagino."
31090-19 = "Ela tem dessas. Bom, mas isso também é uma das qualidades dela……."
31090-20 = "Então, respondendo à pergunta, é uma coisa simples. Reprovar repetidamente, não conseguir escapar da repetência, não conseguir se ajudar…… nesse caso, só resta que todas, juntas, sejam expulsas."
31090-21 = "[s] \"Expulsas!?\""
31090-22 = "Claro que, em condições normais, aqui em Trinity também existem regras sobre reprovação, suspensão, expulsão etc."
31090-23 = "Só que o procedimento é longo e trabalhoso, exige muitas verificações e discussões. Diferentemente de Gehenna, nós damos importância ao trâmite."
31090-24 = "Mas o Clube de Aulas de Reforço, criado às pressas desta vez, foi ajustado para poder ignorar essas regras. Como incorporamos um pouco da autoridade da Schale, uma medida dessas se tornou possível."
31090-25 = "Afinal, o Clube de Aulas de Reforço……"
31090-30 = "foi criado justamente para expulsar alunos."
31090-31 = "[s] \"……!?\""
31090-33 = "[s] \"Por que uma coisa dessas……!?\""
31090-34 = "……."
31090-35 = "Porque, no meio deles, há um traidor de Trinity."
31090-36 = "[s] \"Um traidor……?\""
31090-39 = "O objetivo desse traidor é impedir a assinatura do Tratado do Éden."
31090-40 = "Pra que o senhor compreenda o peso dessas palavras…… é preciso explicar o que é o \"Tratado do Éden\"."
31090-42 = "O Tratado do Éden…… dizendo de forma simples, é um pacto de não agressão firmado entre Trinity e Gehenna."
31090-43 = "Seu cerne está em estabelecer um órgão neutro, do qual participem todos os membros centrais de Gehenna e de Trinity."
31090-44 = "A \"Organização do Tratado do Éden\", que provavelmente será chamada de \"ETO\", vai intervir quando houver conflito entre Trinity e Gehenna e resolvê-lo."
31090-45 = "Digamos, \"inimigos no mesmo barco\". Uma aliança de paz hostil, mantida por ambas embarcarem juntas num navio sempre instável, que balança."
31090-46 = "Com isso, deixa de haver a possibilidade de uma guerra total entre as duas academias. Se alguém der um passo, os dois lados caem juntos, lado a lado."
31090-48 = "……Sensei."
31090-49 = "A longa hostilidade entre Trinity e Gehenna é um grande fardo para ambas."
31090-50 = "O Tratado do Éden é, provavelmente, o único método para evitar esse desgaste sem sentido, e também um método para manter o equilíbrio de forças em Kivotos."
31090-51 = "Esta foi, também, uma solução apresentada pela presidente do Conselho Estudantil Geral. Com o desaparecimento dela, chegou a quase desmoronar de vez, mas, sob a minha condução, consegui, com muito custo, reerguê-lo até aqui."
31090-52 = "E, justamente nesta hora, a um passo de o tão desejado tratado ser assinado…… chegou aos meus ouvidos a informação de que há quem esteja tentando sabotá-lo."
31090-53 = "Ainda não sei quem é. Não cheguei a identificar. Então, como segunda melhor medida…… reuni num só lugar os suspeitos que têm essa possibilidade."
31090-54 = "……O traidor está ali. Mas não sei quem é."
31090-55 = "Sendo assim, vamos juntar tudo numa única caixa…… para que, na hora H, seja fácil descartar tudo de uma vez."
31090-56 = "……O senhor já deve ter percebido: essa caixa é o \"Clube de Aulas de Reforço\". O senhor colaborou com a criação dessa \"caixa\"."
31090-57 = "……Me desculpe."
31090-58 = "Acabei envolvendo o senhor numa coisa tão sórdida. Pode me xingar, se quiser."
31090-59 = "[s] \"……Mas, se você realmente pretendesse me usar, não estaria me contando isso agora, né.\""
31090-60 = "……Como esperado, o senhor compreende rápido."
31090-61 = "Eu me perguntava se, contando, o senhor acreditaria; mas é exatamente como disse. Assim, a conversa fica mais fácil."
31090-62 = "Sensei."
31090-63 = "……Será que o senhor poderia procurar o traidor que está no Clube de Aulas de Reforço?"
31090-64 = "[s] \"…….\""
31090-65 = "Há alguém tentando enganar o senhor, e Trinity."
31090-66 = "É um terrorista que quer destruir a paz. Não só a nossa, mas a paz de toda Kivotos, ele quer pôr na balança contra os próprios interesses."
31090-67 = "Encontrar o traidor está diretamente ligado à paz de Kivotos. O que acha? Ficaria feliz se, como Schale, o Departamento Federal de Investigação, o senhor compreendesse――"
31090-68 = "[s] \"……Eu vou lidar com esse problema do meu jeito.\""
31090-71 = "……Ah, sim. Entendido."
31090-72 = "……Mas, Sensei. Quando é difícil separar o lixo em detalhe pra jogar fora, jogar a caixa inteira também é uma opção…… não acha?"
31090-73 = "E mais um ponto…… quanto às provas, elas estão, no fundo, na palma da nossa mão."
31090-74 = "Por exemplo, \"a matéria da prova muda de repente\", ou \"o local da prova muda\", ou \"a dificuldade muda\"……."
31090-75 = "Torço para que esse tipo de coisa não aconteça, mas……."
31090-76 = "……Perdão, foi um jeito feio de falar. Então, daqui pra frente, continuo contando com o senhor no Clube de Aulas de Reforço."
31090-77 = "Da nossa parte, não causaremos prejuízo nem dano ao senhor…… é o que eu gostaria de dizer, mas……."
31090-78 = "[s] \"……Não dá pra afirmar isso com certeza?\""
31090-79 = "……Pois é. Não posso prometer com facilidade."
31090-80 = "Mas, ainda assim, sei que o senhor não é do tipo que abandonaria os alunos…… então nem eu consigo prever o que vai acontecer daqui pra frente."
31090-81 = "Só me resta torcer para que este desfecho…… seja, tanto quanto possível, um que não venha acompanhado de sofrimento."
31090-82 = "Ah, mas deixo um único aviso……"
31090-83 = "No 1º exame, da nossa parte não houve manipulação alguma. Quanto a isso, juro que não é mentira."
31090-84 = "[s] \"…….\""
31090-85 = "O jeito do Sensei…… torço para que ele seja um que beneficie Trinity."
31090-86 = "……Então, até mais."
31090-89 = "Próximo Episódio;O Acampamento Começa!"
