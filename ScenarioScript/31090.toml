[translation]
31090-1 = "Episódio 9: Sombras Sob a Superfície"
31090-4 = "Ara, Sensei. Bom trabalho."
31090-5 = "Como está o Clube de Reforço?"
31090-6 = "……Embora eu já tenha ouvido falar. Parece que a primeira prova não correu muito bem, né."
31090-7 = "Mas ainda restam duas chances…"
31090-8 = "……Ah, isso? É xadrez. É um hobby meu."
31090-9 = "[s] Olha para o tabuleiro de xadrez na frente de Nagisa."
31090-10 = "……Provavelmente não é o tipo que você está acostumado a ver, né?"
31090-11 = "Pretas: Rei e Rainha, e o resto só Peões."
31090-12 = "Brancas: Rei, Torre, Bispo e Cavalo, com 3 a 4 de cada… com certeza é uma configuração bem incomum."
31090-13 = "[s] \"Você tava jogando sozinha？\""
31090-14 = "Sim, agora só eu. A Mika-san barulhenta também não está aqui."
31090-15 = "Hoje eu queria te contar uma coisa… mas antes disso, parece que você também tem algo que quer dizer, né."
31090-16 = "[s] \"Se os três testes forem reprovados, o que vai acontecer com as meninas do Clube de Reforço？\""
31090-17 = "……。"
31090-18 = "Você já ouviu falar? A fonte deve ter sido… a Hifumi-san, né."
31090-19 = "Ela tem esse lado fofinho de não conseguir guardar segredo. Bom, isso também é uma das qualidades dela…"
31090-20 = "Vou responder direto: é simples. Se continuarem reprovando, não conseguirem escapar da reprovação e não puderem se ajudar… não vai ter outro jeito senão expulsar todas elas."
31090-21 = "[s] \"Expulsar！？\""
31090-22 = "Claro, originalmente Trinity também tem regras para reprovação, suspensão e expulsão."
31090-23 = "Mas o processo é longo e complicado, exige muitas confirmações e discussões. Diferente de Gehenna, nós valorizamos os procedimentos."
31090-24 = "Porém, o Clube de Reforço foi criado de forma especial justamente pra contornar essas regras. Usando um pouco da autoridade extralegal da Schale, conseguimos fazer esse arranjo."
31090-25 = "No fundo, o Clube de Reforço foi criado…"
31090-30 = "…para expulsar alunas."
31090-31 = "[s] \"……！？\""
31090-33 = "[s] \"Por que você faria uma coisa dessas……！？\""
31090-34 = "……。"
31090-35 = "Porque tem uma traidora dentro de Trinity."
31090-36 = "[s] \"Traidora……？\""
31090-39 = "O objetivo dessa traidora é impedir a assinatura do Tratado de Eden."
31090-40 = "Pra você entender o peso dessa palavra… preciso explicar o que é o «Tratado de Eden»."
31090-42 = "O Tratado de Eden… pra simplificar, é um tratado de não-agressão entre Trinity e Gehenna."
31090-43 = "O ponto central é criar uma instituição neutra onde os principais membros de Gehenna e Trinity participem juntos."
31090-44 = "Essa organização, que provavelmente será chamada de [ruby=Eden Treaty Organization]「Organização do Tratado de Eden」[/ruby] ou «ETO», vai intervir e resolver conflitos entre as duas escolas."
31090-45 = "É como «inimigos no mesmo barco». Uma aliança pacífica instável, onde se um lado atacar, os dois afundam juntos."
31090-46 = "Com isso, nunca mais vai acontecer uma guerra total entre as duas academias. Porque se alguém pisar na bola, os dois lados vão cair juntos."
31090-48 = "……Sensei."
31090-49 = "A longa rivalidade entre Trinity e Gehenna tem sido um peso enorme para os dois lados."
31090-50 = "O Tratado de Eden é provavelmente a única forma de acabar com esse desperdício sem sentido, e também de manter o equilíbrio de poder em Kivotos."
31090-51 = "Essa foi a solução proposta pela presidente do Conselho Estudantil Geral. Depois que ela desapareceu e quase tudo desmoronou, eu consegui reconstruir tudo até aqui."
31090-52 = "E justo agora, quando o tratado sonhado está prestes a ser assinado… recebi informações de que tem gente tentando sabotá-lo."
31090-53 = "Ainda não sei quem é. Não consegui identificar. Por isso, como plano B… reuni todos os possíveis suspeitos num só lugar."
31090-54 = "……A traidora está lá dentro. Mas não sei quem é."
31090-55 = "Então, vamos colocar todos no mesmo caixote… pra facilitar jogar tudo fora de uma vez se precisar."
31090-56 = "……Você já deve ter entendido. Esse é o «Clube de Reforço». Você nos ajudou a construir essa «caixa»."
31090-57 = "……Desculpe."
31090-58 = "Acabei te envolvendo numa coisa tão suja. Pode me xingar se quiser."
31090-59 = "[s] \"……Mas se você realmente quisesse me usar, não estaria me contando tudo isso agora, né？\""
31090-60 = "……Como esperado, você entende rápido."
31090-61 = "Eu não tinha certeza se você acreditaria, mas como você disse, é isso. Agora a conversa fica mais fácil."
31090-62 = "Sensei."
31090-63 = "……Você poderia procurar a traidora que está dentro do Clube de Reforço?"
31090-64 = "[s] \"……。\""
31090-65 = "Tem alguém tentando enganar Trinity e o Sensei."
31090-66 = "Uma terrorista que quer destruir a paz. Não só nós, mas a paz de todo Kivotos está sendo colocada na balança pelos interesses pessoais dela."
31090-67 = "Encontrar a traidora está diretamente ligado à paz de Kivotos. O que acha? Como representante da Schale, você poderia nos ajudar――"
31090-68 = "[s] \"……Vou lidar com isso do meu jeito.\""
31090-71 = "……Entendi."
31090-72 = "……Mas, Sensei. Quando é difícil separar o lixo, às vezes é mais prático jogar a caixa inteira fora… você não acha?"
31090-73 = "Ah, e mais uma coisa… sobre as provas, basicamente elas estão nas nossas mãos."
31090-74 = "Por exemplo, «de repente o conteúdo da prova muda», «o local da prova muda», «o nível de dificuldade muda»…"
31090-75 = "Espero que nada disso aconteça, mas…"
31090-76 = "……Desculpe, não foi uma forma muito boa de falar. De qualquer forma, conto com você para continuar cuidando do Clube de Reforço, Sensei."
31090-77 = "Nós não vamos te causar prejuízo ou dano de propósito… gostaria de poder dizer isso com certeza, mas…"
31090-78 = "[s] \"……Não dá pra garantir, né？\""
31090-79 = "……Realmente. Não posso prometer com facilidade."
31090-80 = "Mas, mesmo assim, acho que você não é o tipo de pessoa que abandona alunas em dificuldade… por isso, nem eu consigo prever como isso vai terminar."
31090-81 = "Só espero que esse final… não cause mais dor do que o necessário."
31090-82 = "Ah, mas tem uma coisa que eu posso te garantir…"
31090-83 = "Na primeira prova, nós não fizemos nenhuma manipulação. Sobre isso, eu juro que é verdade."
31090-84 = "[s] \"……。\""
31090-85 = "Seu jeito de fazer as coisas… espero que seja algo que beneficie Trinity."
31090-86 = "……Então, até mais."
31090-89 = "Próximo; Início do Acampamento!"