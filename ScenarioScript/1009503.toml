[translation]
1009503-1 = "お出かけの時間ですよ、先生！"
1009503-2 = "（約束の時間より15分ほど早く着いた……）"
1009503-3 = "（ミドリを待っていると、人混みの向こうから……）"
1009503-7 = "こんにちは、先生！"
1009503-11 = "[ns] \"どうしてメイド服！？\""
1009503-12 = "ふふっ、今回は驚いてくれましたね！"
1009503-13 = "[s] \"重要なのはそこじゃないよ！\""
1009503-14 = "別に驚くようなことじゃありませんよ。"
1009503-15 = "だって今の私は、先生だけのメイドですから。"
1009503-16 = "[s] \"その設定、続いてたんだね……。\""
1009503-17 = "当たり前じゃないですか。"
1009503-18 = "[s] \"当たり前ではないよ！？\""
1009503-19 = "と、とにかく！私は先生のメイドです！"
1009503-20 = "ご主人様の外出には、お供するもの……。"
1009503-21 = "その際にふさわしい服装を身に纏うのは、自然なことですよね？"
1009503-22 = "先生もそう思われませんか？"
1009503-23 = "[s] \"私にはもう何も分からないよ……。\""
1009503-24 = "ふふっ、ではこのままで。"
1009503-25 = "あ、それなら……。"
1009503-26 = "せっかくですし先生も、ドレスコードを合わせてみるのはいかがでしょう！"
1009503-27 = "ご主人様の身だしなみを整える……。#nこれもメイドとしてすべきこと、ですよね？"
1009503-28 = "[s] \"私も着替えるってこと……？\""
1009503-29 = "大丈夫です、私を信じてください！"
1009503-33 = "こんなこともあろうかと、色々お持ちしましたから！"
1009503-34 = "フロックコートにシルクハット、それに杖と……"
1009503-35 = "バッスルドレスに羽根つき帽子、日傘もあります！"
1009503-36 = "特にアクセサリーは好みが分かれますし、モノクルや羽根扇子、#n他にもいろいろと用意してきました。"
1009503-37 = "安心して、全てこのメイドにお任せください。"
1009503-38 = "[s1] \"大きなスーツケースを持ってると思ったら……！\"\n[s2] \"それ全部、スーツケースに入ってるの？\""
1009503-41 = "はい！私は先生のメイドですから！"
1009503-42 = "さあ、着替えましょう。#nきちんとお手伝いしますので。"
1009503-43 = "立派なご主人様にお仕えすることが、メイドの喜びなんです。"
1009503-44 = "先生が素敵な服を着ている姿、私に見せてください！"
1009503-45 = "メイドとしても、イラストレーターとしても……。#nこの機会、絶対に逃すことはできません！"
1009503-46 = "[s3] \"そ、その前に確認なんだけど。\"\n[s4] \"この服、サイズは合ってる？\""
1009503-49 = "ご安心ください！"
1009503-50 = "ミレニアムの各部活から、技術的な協力とアドバイスを#nもらってますから。"
1009503-51 = "みんな、写真を楽しみにしているとのことでした。"
1009503-52 = "ですから、先生？"
1009503-60 = "早く……？"
1009503-62 = "（ミドリの説得に何とか成功したが、かなり残念そうだった……）"
1009503-63 = "（スーツケースをロッカーに預け、ミドリをなだめながら美術館に向かう……）"
1009503-73 = "展示室だけじゃなく、廊下までコンセプトに則って……。"
1009503-74 = "本当にすごいです……。"
1009503-75 = "先生、このドレスを見てください。#nゆとりある身幅と、くびれたウエストが対照的で……。"
1009503-76 = "当時の貴婦人はこのドレスを着るために、コルセットで#nお腹を締め上げたそうです。"
1009503-77 = "想像するだけで、大変そう……。"
1009503-78 = "それに、お腹を締め上げるということは……。#nああいった服は、一人で着ることはできなかったはずなんです。"
1009503-79 = "ちょっと調べてみたんですが……。"
1009503-80 = "着替えには、お手伝いさんが3人ほど必要だったそうで……。"
1009503-81 = "[s] \"ファッションって、何なんだろうね……。\""
1009503-82 = "全てです！"
1009503-83 = "[s] \"そこまで！？\""
1009503-84 = "さ、流石にそれは大げさだったかもしれませんが……。"
1009503-85 = "ですが、よく「衣食住」って言いますよね？ですからファッションは、#n世の中で思われているよりも、ずっとずっと……大切なものだと思うんです。"
1009503-86 = "イラストを描いていると、そういう事をよく考えるんです。"
1009503-87 = "身につける服を選ぶのは、自分を表現する手段のひとつですから。"
1009503-88 = "ですから先生も、もっとファッションに気を配るべきかと！"
1009503-89 = "[s] \"善処するね……。\""
1009503-90 = "善処ではダメです！#n本当に大事なことなんですから！"
1009503-91 = "こうしてはいられません。#nやはりスーツケースを取りに行って――"
1009503-92 = "[s] \"ミドリ、落ちついて！\""
1009503-93 = "と、止めないでください！"
1009503-94 = "……着替えて再入場すると、またチケットを買うことになる？"
1009503-95 = "そ、それは確かに……。"
1009503-99 = "古典の服飾のデザインって……。"
1009503-100 = "メイドの服装に似ているようで、違う部分もありますね。"
1009503-101 = "この帽子とか。ドレスのスカートやリボンの形も。"
1009503-102 = "[s] \"言われてみると確かに。\""
1009503-103 = "もう少し回りましょう、先生。"
1009503-104 = "何だかここにいると、インスピレーションがたくさん湧いてきそうです！"
1009503-113 = "（ミドリの後ろについて、展示室全体を見て回った）"
1009503-114 = "（全てを見終える頃には、日が暮れていた……）"
1009503-117 = "先生、今日はありがとうございます。#nとっても参考になりました！"
1009503-118 = "それに、その……。"
1009503-119 = "デート、とっても楽しかったです……。"
1009503-120 = "[ns] \"ん、なんて？\""
1009503-124 = "い、いえ！なんでもありません！"
1009503-125 = "そ、そんなことより早く帰りましょう！#n最後まで、私がメイドとしてお供しますから！"
1009503-126 = "[s] \"うん、ありがとね。\""
1009503-130 = "ところで、先生。"
1009503-137 = "やっぱり、その……一回だけでも着てみませんか……？"
1009503-138 = "[s] \"それは無しで。\""
1009503-139 = "せんせぇ……。"
1009503-141 = "（メイド然としたミドリと腕を組み、夕暮れの道を歩いて帰った……）"
