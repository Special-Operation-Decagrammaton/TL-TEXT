[translation]
1009503-1 = "É hora de ir, professor!"

1009503-2 = "(Cheguei cerca de 15 minutos antes do horário prometido...)"

1009503-3 = "(Quando eu estava esperando por Midori, vi alguém do outro lado da multidão...)"

1009503-7 = "Olá, professor!"

1009503-11 = "[ns] \"Por que a roupa de empregada!?\""

1009503-12 = "Hehe, você me surpreendeu dessa vez!"

1009503-13 = "[s] \"Esse não é o ponto!\""

1009503-14 = "Não é realmente surpreendente."

1009503-15 = "Porque neste momento sou apenas a empregada da professora."

1009503-16 = "[s] \"Essa configuração continuou...\""

1009503-17 = "Isso não é óbvio?"

1009503-18 = "[s] \"Não é óbvio!?\""

1009503-19 = "E de qualquer maneira! Eu sou a empregada da professora!"

1009503-20 = "Algo para acompanhar seu marido quando ele sai..."

1009503-21 = "Não é natural vestir-se adequadamente para a ocasião?"

1009503-22 = "Você também não acha?"

1009503-23 = "[s] \"Não sei mais de nada...\""

1009503-24 = "Hehe, deixe assim."

1009503-25 = "Ah, nesse caso..."

1009503-26 = "Se você é professor, por que não tentar combinar o código de vestimenta?"

1009503-27 = "Cuide da aparência do seu patrão... #nIsso também é o que uma empregada doméstica deve fazer, certo?"

1009503-28 = "[s] \"Isso significa que vou trocar de roupa também...?\""

1009503-29 = "Está tudo bem, confie em mim!"

1009503-33 = "Achei que algo assim poderia acontecer, então trouxe muitas coisas comigo!"

1009503-34 = "Sobrecasaca, cartola e bengala..."

1009503-35 = "Há também vestidos agitados, chapéus de penas e sombrinhas!"

1009503-36 = "Principalmente quando se trata de acessórios, cada um tem gostos diferentes, e preparamos monóculos, leques de penas e muitas outras coisas."

1009503-37 = "Fique tranquilo, deixe tudo para essa empregada."

1009503-38 = "[s1] \"Achei que você estava carregando uma mala grande...!\"\n[s2] \"Está tudo na mala?\""

1009503-41 = "sim! Eu sou a empregada da professora!"

1009503-42 = "Agora, vamos nos trocar. #nEu vou te ajudar direito."

1009503-43 = "É uma alegria para uma empregada servir um bom mestre."

1009503-44 = "Por favor, mostre-me a professora vestindo roupas bonitas!"

1009503-45 = "Tanto como empregada doméstica quanto como ilustradora... #nVocê não pode perder essa oportunidade!"

1009503-46 = "[s3] \"そ、その前に確認なんだけど。\"\n[s4] \"この服、サイズは合ってる？\""
1009503-49 = "Não se preocupe!"

1009503-50 = "Recebemos cooperação técnica e aconselhamento de vários clubes do Millennium."

1009503-51 = "Todos disseram que estavam ansiosos pelas fotos."

1009503-52 = "ですから、先生？"
1009503-60 = "rapidamente……?"

1009503-62 = "(Consegui convencer Midori, mas ela parecia bastante decepcionada...)"

1009503-63 = "(Deixo minha mala no armário e vou para o museu enquanto acalmo Midori...)"

1009503-73 = "Não apenas a sala de exposição, mas até os corredores são baseados no conceito..."

1009503-74 = "É realmente incrível...."

1009503-75 = "Professor, olhe esse vestido. #nA largura ampla e a cintura estreita contrastam..."

1009503-76 = "Diz-se que as senhoras da época apertavam a barriga com espartilhos para usar este vestido."

1009503-77 = "Só de imaginar parece difícil..."

1009503-78 = "Além disso, apertando a barriga... #nEu não deveria poder usar aquelas roupas sozinha."

1009503-79 = "Fiz algumas pesquisas e descobri..."

1009503-80 = "Aparentemente foram necessários cerca de três ajudantes para trocar de roupa..."

1009503-81 = "[s] \"Eu me pergunto o que é moda...\""

1009503-82 = "Tudo!"

1009503-83 = "[s] \"Até aqui!?\""

1009503-84 = "Bem, isso pode ter sido um exagero, mas..."

1009503-85 = "Porém, costumamos dizer “comida, roupa e abrigo”, certo? É por isso que acho que a moda é muito mais importante do que as pessoas pensam."

1009503-86 = "Quando desenho ilustrações, penso muito nessas coisas."

1009503-87 = "Escolher as roupas que você veste é uma forma de se expressar."

1009503-88 = "Então acho que os professores deveriam prestar mais atenção à moda!"

1009503-89 = "[s] \"Eu farei o meu melhor...\""

1009503-90 = "Não é bom estar em um bom lugar! #nÉ muito importante!"

1009503-91 = "Eu não posso ficar assim. #nEu ainda fui pegar minha mala――"

1009503-92 = "[s] \"Midori, acalme-se!\""

1009503-93 = "E por favor não pare!"

1009503-94 = "...Se eu trocar de roupa e voltar a entrar, terei que comprar outro ingresso?"

1009503-95 = "Bem, isso é verdade..."

1009503-99 = "Design clássico de roupas..."

1009503-100 = "Parece semelhante a uma roupa de empregada, mas existem algumas diferenças."

1009503-101 = "Como este chapéu. Também o formato da saia e da fita do vestido."

1009503-102 = "[s] \"Se você me perguntar, é verdade.\""

1009503-103 = "Vamos dar uma volta mais um pouco, senhor."

1009503-104 = "Sinto que me inspiro muito quando estou aqui!"

1009503-113 = "(Segui Midori e olhei ao redor de toda a sala de exposição.)"

1009503-114 = "(Quando terminei de ver tudo, o sol já estava se pondo...)"

1009503-117 = "Obrigado, professor, por hoje. #nFoi muito útil!"

1009503-118 = "Além disso..."

1009503-119 = "O encontro foi muito divertido..."

1009503-120 = "[ns] \"Hmm, o que?\""

1009503-124 = "não! Nada!"

1009503-125 = "Bem, em vez disso, vamos para casa mais cedo! #nVou te acompanhar como sua empregada até o fim!"

1009503-126 = "[s] \"Sim, obrigado.\""

1009503-130 = "A propósito, senhor."

1009503-137 = "Afinal, por que não tentar usá-lo pelo menos uma vez...?"

1009503-138 = "[s] \"Sem isso.\""

1009503-139 = "Sensei...."

1009503-141 = "(Dei o braço a Midori, que parecia uma empregada, e voltei para casa ao anoitecer...)"

