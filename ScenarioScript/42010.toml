[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 11/06.
42010-1 = "Episódio 1;O Sonho da Raposa"
42010-14 = "Arredores do Distrito [ruby=Distrito de Utnapishtim]D.U.[/ruby] - Frente à Fábrica 2 da Kaiser Industry"
42010-17 = "（――2 Anos Atrás）"
42010-18 = "Boa tarde, Kivotos! Aqui é o Departamento de Jornalismo da Kronos, trazendo a notícia crua e direta#nem primeiríssima mão para você!"
42010-19 = "Estamos transmitindo ao vivo, diretamente do olho do furacão:#nos portões da Fábrica 2 da Kaiser Industry."
42010-20 = "Esta mega-instalação é responsável por quase 30% de toda a produção bélica da Kaiser, mas――"
42010-21 = "Uma bomba estourou na mídia: fortes suspeitas apontam que esta fábrica estaria sendo usada como fachada para o desenvolvimento de Armas de Destruição em Massa,#numa violação gravíssima dos tratados de paz do Conselho Estudantil!"
42010-22 = "Os executivos da Kaiser negam as acusações com unhas e dentes, mas#nsem transparência, o pânico já está tomando as ruas de Kivotos."
42010-23 = "A população exige justiça imediata, mas a Academia Valkyrie parece bater cabeça sem avançar nas investigações. Em contrapartida, rumores fervilham de que a própria Presidente do Conselho Estudantil acionou a sua Tropa de Choque pessoal――"
42010-27 = "Waaah! U-Uma explosão colossal acaba de sacudir a fábrica……!!"
42010-28 = "O que diabos aconteceu lá dentro?!#nSerá que as Armas de Destruição em Massa foram――"
42010-30 = "Cof…… cof, cof……"
42010-31 = "Otogi, que droga foi essa?!#nNinguém avisou que a porta de extração tava forrada de armadilhas explosivas!"
42010-32 = "Eu ia avisar agora mesmo, hihihi~"
42010-33 = "Avisa antes de eu meter o pé na porta, né!!"
42010-34 = "Haaah, haaah…… Kurumi-chan, você corre rápido demais…… eu não tenho essa estamina toda……"
42010-35 = "Checagem de sinais vitais…… todas intactas.#nSorte nossa que o brinquedo só estourou depois da missão concluída."
42010-37 = "A-Atenção!! Alunas armadas até os dentes acabam de emergir do meio da fumaça!!"
42010-38 = "Seriam elas o lendário esquadrão fantasma enviado pela Presidente?!"
42010-39 = "Aqui é o jornalismo Kronos!#n――Com licença! Vocês poderiam nos dar uma declaração?!"
42010-41 = "Ahaha…… Parece que a gente foi flanqueada pela imprensa, capitã."
42010-42 = "……Fazer o quê.#nNão é uma má oportunidade para apresentar o nosso cartão de visitas para a cidade."
42010-43 = "A sigla na farda…… SRT?! Vocês são as forças de operações especiais sob o comando direto e absoluto da Presidente do Conselho Estudantil……?"
42010-45 = "Exatamente."
42010-46 = "――Cidadãos de Kivotos, saudações.#nNós somos a espada da Academia Especial SRT. Eu sou a Capitã do Esquadrão FOX, Shichido Yukino."
42010-47 = "A SRT foi forjada sob a autoridade inquestionável da Presidente.#nNossa missão é intervir com força máxima em crimes no Distrito D.U. que a Academia Valkyrie ou as milícias locais são covardes ou fracas demais para resolver."
42010-48 = "Intervir onde a Valkyrie falha…… Isso quer dizer que,#nde agora em diante, a SRT vai usurpar o controle da segurança pública em Kivotos?"
42010-49 = "……Não.#nNós não somos cães de guarda. Somos uma tropa de execução cirúrgica. Nós resolvemos os problemas que escapam da Valkyrie, ou#nincidentes críticos que precisam ser extirpados antes que causem o fim da cidade. Exatamente como o de hoje."
42010-51 = "Fascinante…… Muito obrigada pela resposta.#nAgora, o que todos querem saber: os segredos obscuros da Fábrica 2."
42010-52 = "Indo direto à ferida: é verdade que armas de destruição em massa estavam sendo montadas aqui?!"
42010-54 = "Bem…… vejamos……"
42010-58 = "A Presidente não colocou uma ordem de mordaça oficial nessa operação, então acho que eu posso expor a sujeira deles."
42010-59 = "……Há alguns dias, nossa inteligência interceptou provas irrefutáveis de que a Fábrica 2 da Kaiser Industry#nescondia explosivos de obliteração banidos pelos nossos tratados."
42010-60 = "Durante a Operação A.N.T.I.O.C.H. do ano passado,#nfocada em atualizar granadas termobáricas, a Kaiser desviou fundos para projetar ogivas termobáricas para mísseis balísticos intercontinentais.#E o protótipo, pronto para o abate, estava dormindo bem aqui."
42010-62 = "Mas podem relaxar. Nós já desativamos o núcleo e arrancamos as garras do monstrinho deles lá dentro."
42010-63 = "Mísseis balísticos termobáricos……?!#nI-Isso tem um poder de aniquilação de qual escala?!"
42010-64 = "Como era um protótipo não testado, os números exatos são teoria, mas――"
42010-66 = "Com base na massa crítica do núcleo e nos arquivos roubados,#nestimamos que a onda de choque transformaria um raio de vários quilômetros em pó."
42010-67 = "P-Por Deus…… E vocês neutralizaram uma ogiva do fim do mundo usando apenas uma equipe de quatro cadetes……?!#nNão é um nível de risco insano até para vocês?!"
42010-68 = "Isso não exigiria, no mínimo, um batalhão de engenharia e blindagem pesada……?"
42010-70 = "Não. Muito pelo contrário. Contra uma bomba desse calibre, encher o prédio de soldados é burrice. Se ela detona, um exército ou quatro pessoas viram cinzas do mesmo jeito."
42010-71 = "E É E-XA-TA-MEN-TE POR ISSO!#nQue a SRT é a ponta da lança!"
42010-72 = "Nossos esquadrões operam como uma lâmina microscópica e letal.#nNós entramos, neutralizamos a ameaça e asseguramos o alvo antes que o inimigo perceba que as portas foram arrombadas."
42010-73 = "A prova viva disso é que garantimos a ogiva e dominamos a fábrica em menos de 3 minutos hoje."
42010-74 = "……Dois minutos e quarenta e cinco segundos."
42010-75 = "E se não tivéssemos sido forçadas a entrar em combate no Setor B, teríamos cortado o tempo em 15 segundos."
42010-76 = "Aaah~ A culpa não foi minha se a Kurumi confundiu uma granada de fumaça com uma flashbang e jogou no nosso pé, né~?"
42010-77 = "EU NÃO CONFUNDI NADA!#nO esquadrão de elite deles tava usando visores anti-clarão de grau militar! A flashbang ia ser inútil!"
42010-78 = "Se eu não tivesse metido dois tiros no peito do atirador na mesma hora, ele teria perfurado a gente de bala!"
42010-79 = "Você quer falar do quê?! A culpa toda é da Otogi, que era a sniper e não limpou o corredor antes da gente invadir!"
42010-80 = "Opa, sobre isso…… eu meio que me perdi na contagem de balas no pente e só ouvi o \"clique\" vazio……"
42010-81 = "Sabe como é, aquele charmoso e inofensivo erro de cálculo da sua adorável sniper quando os números no radar não batem…… hehehe~"
42010-82 = "ISSO É UMA ZONA DE GUERRA, SUA INÚTIL!!"
42010-83 = "O-Otogi-chan, Kurumi-chan…… pelo amor da Presidente, não briguem com as câmeras rodando……"
42010-85 = "……Ahem. Retomando.#nPor operarmos de forma cirúrgica e com força absoluta,#nfomos capazes de expor a podridão corporativa sem lhes dar tempo de apagar os rastros."
42010-86 = "E as verdades contidas nos discos rígidos que arrancamos lá de dentro……#nProvam um esquema milionário de propina, onde laudos de segurança foram totalmente falsificados."
42010-87 = "E a sujeira não para nos engravatados da Kaiser……#nA lista de pagamentos inclui nomes influentes da cúpula do nosso próprio Escritório de Defesa."
42010-91 = "E-Escritório de Defesa…… Mas essa é uma instituição vital do Conselho Estudantil Geral?!"
42010-92 = "A senhorita está declarando em TV aberta que as falhas de segurança vieram da corrupção do próprio governo?!#nComo arma da Presidente, vocês não temem consequências por expor a cúpula?!"
42010-93 = "……Não vejo motivo para temer a verdade."
42010-94 = "Justiça significa seguir a lógica e a razão, sem curvar a espinha para corruptos."
42010-96 = "A Justiça da SRT é de aço absoluto. Nenhuma tempestade vai nos fazer hesitar."
42010-107 = "……"
42010-108 = "Ah, bom dia, Yukino-chan."
42010-110 = "……Relatório de horário."
42010-111 = "03:15. Horário padrão de Kivotos."
42010-112 = "Ainda falta um bom tempo pro seu turno de vigília. Por que não tenta dormir um pouco mais?"
42010-113 = "Negativo. Meu corpo já está plenamente operacional."
42010-116 = "……Parecia que você estava tendo um sonho doce."
42010-117 = "Com base em quê você afirma isso?"
42010-118 = "Seu rosto…… você parecia tão leve enquanto dormia."
42010-119 = "……Não seja ingênua. Foi um pesadelo."
42010-120 = "Um pesadelo estúpido, banhado na doçura dos dias em que vivíamos como flores inúteis dentro de uma estufa de vidro."
42010-121 = "……Entendo."
42010-124 = "――FOX 4. Relatório de status."
42010-125 = "Na escuta, FOX 4 na linha~.#nZero novidades no Conselho Estudantil."
42010-126 = "Eles continuam correndo em círculos como baratas tontas.#nO pânico se instalou desde a queda da Torre Sanctum."
42010-127 = "E a principal ovelha negra é a Presidente Interina, Oficial Rin. O fato de ela não estar na sala de comando durante o apagão#ndeu aos abutres internos a desculpa perfeita pra massacrar a imagem dela."
42010-128 = "Graças a isso, a tal \"Política de Restauração Geral de D.U.\" que ela tentou socar goela abaixo está apodrecendo na gaveta."
42010-129 = "Convenhamos…… a gente preparou esse terreno. Quando a nossa SRT explodiu as defesas da Torre Sanctum logo antes da academia ser extinta,#nnós limpamos cirurgicamente a facção leal à Rin. Então não sobrou nenhum escudo para oferecer apoio a ela no conselho."
42010-130 = "Compreendido.#n――E como estão os cães de guarda do Comitê de Administração?"
42010-131 = "Hum, também engessados.#nComo nós deixamos as Diretoras da Cultura e da Saúde na UTI na última visita, quem tá assinando os papéis são os vices."
42010-132 = "Mas um vice é só um selo de borracha. Eles mantêm a roda girando,#nmas não têm força política nem voz pra contrariar nada."
42010-133 = "Perfeito…… Mantenha a vigilância total."
42010-137 = "Mas vem cá…… Capitã."
42010-138 = "Eu sei que é especulação, mas……"
42010-139 = "E se essas Diretoras de licença médica milagrosamente se recuperarem e voltarem ao jogo?"
42010-140 = "A Chefe Kaya ficaria de mãos atadas, não……?"
42010-141 = "Haaah…… Minhas ordens para os Protocolos de Contingência foram absolutas."
42010-142 = "«A cota de conselheiras que oferecem suporte à Oficial Rin, deve,#nsempre, ser mantida inferior ao número de apoiadores da Chefe Kaya.»"
42010-143 = "Se qualquer membro da facção da Oficial Rin demonstrar sinais de recuperação e tentar retomar o poder,#nvocês estão autorizadas a tomar medidas letais para garantir que a pessoa fique \"incapacitada de atuar\" de forma definitiva."
42010-147 = "……FOX 4, ordem recebida."
42010-152 = "――FOX 3. Câmbio."
42010-153 = "Aqui é FOX 3. Detonação da bomba EMP na malha ferroviária do Distrito Norte confirmada. Sistema de controle de tráfego paralisado. A sabotagem da rede primária foi um sucesso limpo."
42010-154 = "A carcaça da bomba foi recuperada imediatamente após a implosão.#nO departamento de engenharia deles vai enlouquecer e culpar o próprio sistema obsoleto."
42010-155 = "Excelente. E o choque civil?"
42010-156 = "Como apagamos os nossos rastros, não há indícios de ataque.#nA cidade inteira acha que foi um colapso brutal da infraestrutura do Conselho."
42010-157 = "Tô com os olhos nas redes sociais e o ódio tá palpável.#nA população tá caindo matando em cima da Chefe dos Transportes e da Oficial Rin."
42010-158 = "Tudo conforme o planejado.#nFOX 3, aborte as posições e retorne ao QG imediatamente."
42010-162 = "Ei…… desculpa a insubordinação, mas…… a gente realmente tá fazendo a coisa certa……?"
42010-163 = "Com o apagão dos trens, o sistema de saúde travou. Tinha gente precisando correr pro hospital……"
42010-164 = "――Isso muda o resultado tático da nossa missão?"
42010-168 = "……Deixa pra lá. FOX 3, encerrando."
42010-175 = "Yukino-chan…… Até onde nós vamos descer?"
42010-176 = "……Justifique a sua pergunta."
42010-177 = "A nossa missão absoluta é reviver a SRT, eu entendo. Mas espalhar esse terror nas ruas e usar o sofrimento dos civis como escada……"
42010-181 = "A Justiça que nós juramos proteger…… morreu."
42010-182 = "……Questões morais não têm espaço na cadeia de comando."
42010-183 = "Nós somos armas. Ferramentas forjadas para cumprir o objetivo sem hesitação.#nQuem escolhe o alvo e o sacrifício não é a arma, é quem detém a empunhadura."
42010-184 = "Uma espada que olha para o pescoço do inimigo e sente pena―― é sucata inútil."
42010-185 = "Julgar o que é bom ou mau é um privilégio de quem se senta no trono para assumir a responsabilidade. Não nosso."
42010-186 = "……"
42010-187 = "Se o seu estômago embrulha com o peso do fuzil, a porta está aberta para você desertar.#nMas eu―― o Esquadrão FOX, completará a missão a qualquer custo."
42010-192 = "……FOX 2, compreendido. Ao seu dispor."
42010-196 = "O tabuleiro está quase limpo. Resta apenas……"
42010-197 = "Lidar com o estorvo chamado Esquadrão RABBIT."
42010-198 = "ESQUADRÃO RABBIT?!"
42010-199 = "Opa, pera, você tá falando das nossas fofíssimas calourinhas?!"
42010-200 = "……FOX 3 e FOX 4. Eu não liberei a linha de comunicação."
42010-202 = "Foi mal! Mas ouvir o nome delas me deu um comichão!~"
42010-203 = "Você vai fazer uma visitinha pra elas?!#nEu também quero! Deixa eu apertar as bochechas delas!!"
42010-204 = "Haaah……"
42010-206 = "Bom, considerando a calmaria no cronograma,#numa pequena manobra de campo com todo o esquadrão pode servir para nos aquecer."
42010-207 = "O alvo da FOX 3 já foi neutralizado, e#na FOX 4 não precisa mover um dedo antes do Dia-D……"
42010-208 = "Ah! Verdade! Com toda a confusão do fechamento da nossa escola, as coitadas ficaram sem a nossa \"Festa de Boas-Vindas\"!"
42010-209 = "Heh, o velho e sádico \"Trote da SRT\". A gente precisa ensinar de que lama a verdadeira elite é feita."
42010-210 = "Fufu…… Que feio da nossa parte.#nVou enrolar uns Inarizushis bem gordos pra alimentar elas na festinha!"
42010-215 = "……Que seja. Para essa operação, contingente máximo é preferível."
42010-216 = "Atenção: FOX 3 e FOX 4, limpem a zona e voltem à base.#nVerifiquem o arsenal, reabasteçam a munição e preparem o terreno para a nossa…… \"Festa de Boas-Vindas\"."
42010-221 = "Copiado e entendido!!"
42010-225 = "Faz tempo que não temos um confronto em família.#nVamos ensinar às calouras o que significa a verdadeira Justiça da SRT."
42010-227 = "Próximo Episódio;O Sonho do Coelho"