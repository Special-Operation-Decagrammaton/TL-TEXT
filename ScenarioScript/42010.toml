[translation]
42010-1 = "Episódio 1: O sonho que a raposa vê"
42010-14 = "Subúrbios de D.U., em frente à 2ª Fábrica da Kaiser Industry"
42010-17 = "(-- 2 anos atrás)"
42010-18 = "Olá a todos! Aqui é o Departamento de Notícias Chronos, trazendo as notícias mais precisas de Kivotos em primeira mão!"
42010-19 = "Hoje, estamos transmitindo ao vivo aqui, em frente à 2ª Fábrica da Kaiser Industry."
42010-20 = "A 2ª Fábrica é responsável por cerca de 30% da produção de munições da Kaiser Industry, mas..."
42010-21 = "Nos últimos anos, espalharam-se suspeitas de que armas de destruição em massa, proibidas pelas normas do Conselho Estudantil Federal, estariam sendo desenvolvidas nesta fábrica."
42010-22 = "A Kaiser Industry nega veementemente esses fatos, mas, sem provas que refutem as alegações, a ansiedade dos cidadãos não diminui."
42010-23 = "Embora uma solução rápida seja exigida, a investigação da Escola de Polícia Valkyrie parece estar enfrentando dificuldades. Além disso, sussurra-se que a Presidente do Conselho Estudantil Federal enviou uma equipe de investigação especial..."
42010-27 = "Uau! A-agora mesmo, houve uma explosão vinda da fábrica...!"
42010-28 = "O que será que aconteceu? Será que a tal arma de destruição em massa..."
42010-30 = "Cof, cof..."
42010-31 = "Otogi, o que significa isso? Você não me avisou que tinha uma armadilha na saída!"
42010-32 = "Eu ia falar disso agora mesmo."
42010-33 = "Deveria ter falado antes!"
42010-34 = "Ai, ai... Kurumi-chan, você correu rápido demais..."
42010-35 = "Todos, estão feridos? ...Parece que não. Ainda bem que a missão terminou."
42010-37 = "Acabaram de aparecer alunas armadas saindo da fábrica de munições!"
42010-38 = "Será que elas são a tal equipe de investigação especial!?"
42010-39 = "Aqui é o Departamento de Notícias Chronos! -- Com licença! Poderiam dizer algumas palavras?"
42010-41 = "Ahaha... parece que fomos cercadas, né?"
42010-42 = "...Não tem jeito. Acho que não é uma má ideia aproveitar a oportunidade para apresentar a SRT."
42010-43 = "Falando em SRT... seria aquela força especial estabelecida pela Presidente do Conselho Estudantil Federal?"
42010-45 = "Sim, exatamente."
42010-46 = "-- Olá a todos de Kivotos. Sou Yukino Shichido, capitã do Esquadrão FOX da Academia Especial SRT."
42010-47 = "A Academia Especial SRT foi estabelecida sob autorização da Presidente do Conselho Estudantil Federal para lidar com crimes na região de D.U. que são difíceis de serem resolvidos pela Escola de Polícia Valkyrie ou pelos Comitês Disciplinares de cada distrito."
42010-48 = "Lidar com crimes em D.U.... isso significa que, a partir de agora, a Academia Especial SRT substituirá a Escola de Polícia Valkyrie?"
42010-49 = "...Não. Nós somos apenas uma equipe que lida com crimes que fogem ao alcance da Escola de Polícia Valkyrie ou incidentes que exigem uma ação preventiva, como este de hoje."
42010-51 = "Entendo, obrigado pela explicação. Agora, gostaria de perguntar sobre esta 2ª fábrica."
42010-52 = "Sendo direto, é verdade que armas de destruição em massa ilegais estão sendo desenvolvidas aqui?"
42010-54 = "Bem..."
42010-58 = "Bom, não fomos proibidas de falar sobre este caso, então acho que não tem problema."
42010-59 = "...Há alguns dias, recebemos uma denúncia anônima e obtivemos provas contundentes de que bombas poderosas, que violam as normas, estavam sendo armazenadas na 2ª Fábrica da Kaiser Industry."
42010-60 = "A Kaiser Industry, durante o projeto de melhoria das granadas termobáricas antigas <A.N.T.I.O.C.H.> anunciadas no ano passado, estava fabricando ogivas termobáricas para mísseis balísticos. O que estava guardado aqui eram protótipos disso."
42010-62 = "Mas como nós as neutralizamos, agora está tudo bem."
42010-63 = "Ogivas termobáricas para mísseis balísticos... Qual seria o poder de destruição disso?"
42010-64 = "Como são protótipos, os números exatos são desconhecidos, mas..."
42010-66 = "Pelo tamanho da ogiva e pelos dados de pesquisa existentes, estimamos que o raio de impacto da explosão alcance vários quilômetros."
42010-67 = "U-uma bomba desse tamanho, sendo tratada por um esquadrão... Isso não é perigoso demais?"
42010-68 = "Parece um caso que exigiria o envio de um esquadrão de engenharia com trajes de proteção..."
42010-70 = "Não... pelo contrário, bombas desse porte são inúteis contra um grande número de soldados."
42010-71 = "E é aí que nós, da SRT, entramos!"
42010-72 = "Os esquadrões da SRT são compostos por equipes de elite reduzidas. Por isso, podemos garantir o alvo ou neutralizá-lo antes que percebam, como fizemos hoje."
42010-73 = "Na verdade, nesta missão, conseguimos garantir a ogiva em menos de 3 minutos."
42010-74 = "...2 minutos e 45 segundos."
42010-75 = "Se não tivéssemos entrado em combate no caminho, poderíamos ter reduzido mais 15 segundos."
42010-76 = "Ah~, isso foi porque a Kurumi jogou uma granada de fumaça achando que era uma granada de luz, né?"
42010-77 = "Eu não me enganei! Aquele cara estava usando um visor especial contra luz."
42010-78 = "Além disso, se eu não tivesse disparado duas vezes, nós é que teríamos sido atingidas."
42010-79 = "Na verdade, se a Otogi tivesse derrotado os guardas primeiro, o assunto teria sido resolvido, não é?"
42010-80 = "Aquilo foi... eu esqueci de contar a munição e acabei..."
42010-81 = "É meio que uma característica de uma atiradora fofa... cometer erros quando não se pode prever o número de inimigos..."
42010-82 = "Leve isso a sério!"
42010-83 = "Otogi-chan, Kurumi-chan... brigar na frente da câmera não é..."
42010-85 = "...Cof. De qualquer forma, como esta operação foi conduzida com um número reduzido de pessoal, conseguimos garantir a captura do culpado e a apuração da verdade rapidamente."
42010-86 = "O documento confidencial obtido durante a operação... nele, estava escrito que vários membros receberam dinheiro e bens para falsificar os relatórios de segurança da fábrica de munições."
42010-87 = "E entre esses membros, não estavam apenas executivos do Grupo Kaiser, mas também pessoas ligadas ao Gabinete de Defesa."
42010-91 = "Falando em Gabinete de Defesa... não seria o Conselho Estudantil Geral?"
42010-92 = "Como resultado, descobriu-se uma falha na segurança do Conselho Estudantil Geral, mas... é apropriado que a SRT, que age sob as ordens da Presidente do Conselho Estudantil Geral, divulgue esse tipo de informação?"
42010-93 = "...Não há problema."
42010-94 = "Justiça é o princípio correto e racional."
42010-96 = "A justiça da SRT não vacila em nenhuma circunstância."
42010-107 = "..."
42010-108 = "Ah, Yukino-chan. Bom dia."
42010-110 = "...Que horas são?"
42010-111 = "Pelo horário padrão de Kivotos... 03:15."
42010-112 = "Ainda falta tempo para o último turno de vigília. Por que não dorme mais um pouco?"
42010-113 = "Não, já dormi o suficiente."
42010-116 = "...Você teve um bom sonho, não foi?"
42010-117 = "Por que acha isso?"
42010-118 = "Porque você parecia feliz enquanto dormia."
42010-119 = "...Não, foi um pesadelo."
42010-120 = "Um doce pesadelo que tive enquanto passava o tempo na estufa."
42010-121 = "...Entendo."
42010-124 = "— FOX4, relate."
42010-125 = "Sim, sim, aqui é a FOX4. No momento, não há movimentos incomuns no Conselho Estudantil Geral."
42010-126 = "Eles continuam em pânico. Desde que a torre gigante caiu, tem sido assim."
42010-127 = "Especialmente a Administradora Rin, a Presidente interina, que não estava presente na situação de maior confusão, então ela virou o alvo das críticas dentro do Conselho Estudantil Geral."
42010-128 = "Por causa disso, a Política de Recuperação Geral de D.U. que ela propôs também parece estar enfrentando dificuldades."
42010-129 = "Bem... quando atacamos a Sanctum Tower pouco antes do fechamento da Academia Especial SRT, atacamos minuciosamente os apoiadores da Administradora Rin, então provavelmente não restou muita gente para protegê-la."
42010-130 = "Entendido. — Qual é a situação atual dos departamentos principais do Comitê Administrativo?"
42010-131 = "Hum, lá também está como antes. Como os chefes do Departamento Cultural e do Departamento de Saúde se feriram no último ataque, agora os vice-chefes estão cuidando das operações."
42010-132 = "Mas, bem, não acho que se possa esperar poder de decisão de alguém no cargo de vice-chefe. Embora não deva haver problemas com as operações em si."
42010-133 = "Então está tudo bem... continue monitorando."
42010-137 = "Aquela... Comandante de pelotão, não, FOX1."
42010-138 = "É uma hipótese, mas..."
42010-139 = "O que faremos se os chefes que estão de licença retornarem?"
42010-140 = "Se isso acontecer... a Chefe Kaya vai ficar em apuros, não vai...?"
42010-141 = "Haa... eu já deveria ter passado o protocolo de emergência para situações críticas."
42010-142 = "“Entre os oficiais do Comitê Administrativo, os oficiais que apoiam a Administradora Nanagami nunca devem ser mais numerosos do que os oficiais que apoiam a Chefe Shiranui.”"
42010-143 = "Se as forças que apoiam a Administradora Nanagami tentarem retornar, tome medidas para deixá-las “incapazes de agir”."
42010-147 = "...FOX4, entendido."
42010-152 = "— FOX3, relate."
42010-153 = "Aqui é a FOX3, conforme planejado, instalei bombas EMP no pátio ferroviário do Distrito Norte e neutralizei o sistema de gerenciamento de tráfego. A sabotagem dos principais equipamentos eletrônicos também foi concluída."
42010-154 = "Recuperei as bombas EMP logo após a detonação, então os engenheiros não devem conseguir descobrir a causa da falha por um bom tempo."
42010-155 = "Bom trabalho. Qual é a reação dos cidadãos?"
42010-156 = "Como a causa do acidente não foi anunciada, eles parecem achar que foi um erro do Conselho Estudantil Geral."
42010-157 = "Estou verificando as postagens nas redes sociais agora, e está bem caótico. Está transbordando de críticas ao Chefe de Tráfego e à Presidente interina do Conselho Estudantil Geral."
42010-158 = "Entendido. Então, FOX3, retorne ao QG imediatamente."
42010-162 = "Ei, pode parecer estranho, mas... será que é realmente seguro continuar assim...?"
42010-163 = "Ainda agora, o trem parou e tem gente com problemas por não conseguir chegar ao hospital..."
42010-164 = "――Isso é um assunto importante para o andamento da operação?"
42010-168 = "……Não é nada. #nFOX3, relatório encerrado."
42010-175 = "Yukino-chan... será que nós realmente podemos continuar assim?"
42010-176 = "……O que quer dizer?"
42010-177 = "Mesmo que seja para reviver a Academia SRT, causar tanto dano aos cidadãos é..."
42010-181 = "Eu sinto que... isso não é justiça."
42010-182 = "……Essa dúvida é desnecessária para o andamento da operação."
42010-183 = "Nós somos armas que seguem ordens e executam operações. #nE escolher o alvo para onde a lâmina aponta não é papel da arma, mas sim de quem segura o cabo."
42010-184 = "Uma arma que hesita ao ver o alvo―― não tem valor como arma."
42010-185 = "O bem e o mal das coisas são julgamentos que apenas aqueles que podem arcar com a responsabilidade devem fazer."
42010-186 = "……."
42010-187 = "Se você se sente mal, pode desistir. #nEu―― o Esquadrão FOX, continuará com a operação."
42010-192 = "……FOX2, entendido."
42010-196 = "Bem, o que resta é..."
42010-197 = "Apenas lidar com o Esquadrão RABBIT."
42010-198 = "Esquadrão RABBIT?"
42010-199 = "O que, o que? Por acaso estão falando dos nossos veteranos?"
42010-200 = "……FOX3, FOX4. Eu não chamei vocês agora."
42010-202 = "Desculpa, é que eu ouvi uma conversa interessante de repente~"
42010-203 = "Vocês vão encontrar os veteranos? #nEu também quero ir!"
42010-204 = "Haa..."
42010-206 = "Bem, as coisas acabaram de se acalmar, #nnão seria bom nos movermos todos juntos depois de tanto tempo?"
42010-207 = "A operação da FOX3 terminou, #ne a FOX4 também não precisa se mover muito depois do Dia D..."
42010-208 = "Ah! Falando nisso, o Esquadrão RABBIT ainda não teve aquela festa de boas-vindas, né?"
42010-209 = "Ah, a festa de costume da SRT para "brincar" com os novatos."
42010-210 = "Fufu, é verdade. #nEntão vou fazer muitos inari-zushi para a festa!"
42010-215 = "……Bem, quanto mais gente, melhor."
42010-216 = "Então, FOX3 e FOX4, assim que terminarem a missão atual, retornem ao QG, #nfaçam a manutenção e comecem a preparar a "festa de boas-vindas" imediatamente."
42010-221 = "Entendido!"
42010-225 = "É um reencontro após muito tempo, vamos receber nossos veteranos em grande estilo."
42010-227 = "Próximo episódio: O sonho que os coelhos veem"
