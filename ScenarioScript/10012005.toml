[translation]
10012005-1 = "Prólogo; Na vida, nunca se sabe o que pode acontecer"
10012005-5 = "Sala do Comitê de Contramedidas de Abydos"
10012005-9 = "……Estão todas aqui?"
10012005-13 = "Sim."
10012005-14 = "Aqui estou☆"
10012005-15 = "Uhe……"
10012005-16 = "A titia estava dormindo aqui o tempo todo, o que aconteceu……?"
10012005-21 = "……Bem, vou considerar que todas estão presentes e prosseguir."
10012005-24 = "……?"
10012005-25 = "Ayane, a Serika ainda não……"
