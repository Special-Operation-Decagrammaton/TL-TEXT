10012005-37 = "B-bem, bem, vamos esperar ela terminar de falar…… A Ayane-chan se deu ao trabalho de reunir todo mundo, né?"
10012005-38 = "Isso mesmo! O que tem o grande equipamento? Ayane-chan!"
10012005-44 = "Sim…… finalmente……!!"
10012005-51 = "P-pessoal!!"
