10012005-27 = "É raro ver a Ayane-chan com tanta pressa assim."
10012005-31 = "Ehem…… Tenho um anúncio importante para todas!"
10012005-32 = "Finalmente, o esforço do nosso Comitê de Contramedidas deu frutos!"
10012005-33 = "Sim…… enquanto pagávamos os juros mensais, fomos economizando o dinheiro que sobrava aos poucos……"
