[translation]
10012005-1 = "プロローグ;人生、何が起こるか分からない"
10012005-5 = "アビドス対策委員会部室"
10012005-9 = "……皆さんお揃いでしょうか？"
10012005-13 = "うん。"
10012005-14 = "は～い☆"
10012005-15 = "うへ……"
10012005-16 = "おじさんはずっとここで寝てたけど、一体どうしたの……。"
10012005-21 = "……それでは、お揃いだと判断して進行します。"
10012005-24 = "……？"
10012005-25 = "アヤネ、まだセリカが……。"
10012005-26 = "セ、セリカちゃんには後で伝えますので……！"
10012005-27 = "アヤネちゃんがそんなに急ぐなんて珍しいねぇ。"
10012005-31 = "こほん……。皆さんに重大なお知らせがあります！"
10012005-32 = "ついに、私たち対策委員会の努力が形になったんです！"
10012005-33 = "そう……毎月利子を返済しながら、余ったお金をコツコツと貯金し……。"
10012005-34 = "ついに対策委員会初の大型備品が……！！"
10012005-35 = "……あ。"
10012005-36 = "グラウンドにあったヘリってもしかして……。"
10012005-37 = "ま、まぁまぁ、話し終わるのを待ってあげようよ……せっかくアヤネちゃんがみんなを集めたんだし、ね？"
10012005-38 = "うんうん！大型備品がどうしたんですか？アヤネちゃん！"
10012005-44 = "はい……ついに……！！"
10012005-51 = "み、みんな！！"
10012005-52 = "見て！！"
10012005-57 = "私、ビンゴ大会で当たったの！！しかも1等！！"
10012005-61 = "#video;10012"
