[translation]
41130-1 = "Episódio 13: Inari-zushi"
41130-2 = "（Antes de ir ao parque de sempre, visitei a Cidade dos Coelhinhos para comer alguma coisa）"
41130-4 = "Perto do Parque dos Coelhinhos - Cidade dos Coelhinhos"
41130-6 = "（...Mas, por algum motivo, não havia nenhuma loja aberta）"
41130-9 = "Um delicioso, maravilhoso \"Inari-zushi\", gostaria de experimentar?"
41130-10 = "Ah, cliente! Se ainda não comeu nada, que tal isto?"
41130-11 = "Hoje, sem dúvida, ficou perfeito!"
41130-12 = "E está fresquinho! Agora é a melhor hora para comer!"
41130-13 = "[s] \"Bem, já que insiste...\""
41130-15 = "Obrigada pela preferência!"
41130-16 = "Nossa, eu estava tão desanimada porque não aparecia nenhum cliente hoje. Pensei que não venderia nada e até fiquei com dor de estômago."
41130-17 = "Seria um desperdício, já que me dei ao trabalho de fazer."
41130-18 = "[s] \"Falando nisso, não tem ninguém aqui e as lojas estão todas fechadas.\""
41130-19 = "Pois é. Na verdade, a reurbanização desta área vai começar em breve. Acho que é por causa disso."
41130-23 = "Ah, você não sabia?"
41130-24 = "Pelo que dizem os boatos, planejam construir uma nova linha de metrô por aqui."
41130-25 = "Dizem que vão demolir o centro comercial e tudo mais, fazer as obras do metrô e construir um novo shopping center no lugar."
41130-26 = "Como era mesmo o nome... acho que é uma empresa com um símbolo que parece um polvo..."
41130-27 = "[s] \"...Grupo Kaiser?\""
41130-28 = "Ah, isso mesmo! Acho que é uma empresa chamada \"Kaiser Construction\" desse grupo!"
41130-29 = "Dizem que é um projeto de reurbanização enorme, a ponto de apostarem o futuro da empresa nele."
41130-30 = "Por causa disso, as lojas foram forçadas a fechar e parece que estão expulsando os moradores..."
41130-31 = "Bem, para uma aluna que vive de bicos como eu, isso é um assunto muito distante. Fufu..."
41130-35 = "[ns] Comprar mais um Inari-zushi."
41130-36 = "Ora, gostou do sabor?"
41130-37 = "Fico muito feliz. Não é por nada não, mas tenho muita confiança no meu talento para fazer este \"Inari-zushi\"."
41130-38 = "Meus colegas... amigos e veteranos sempre gostaram."
41130-42 = "...Ah, acabei me desviando do assunto."
41130-43 = "Bem..."
41130-44 = "Já que comprou tanto, vou te contar mais uma informação valiosa."
41130-45 = "Sobre aquele assunto da reurbanização da \"Kaiser Construction\"..."
41130-46 = "Parece que há boatos de que pode ser cancelada."
41130-47 = "[s] \"E por que isso?\""
41130-48 = "Na verdade, tem um grupo de nômades por aqui."
41130-49 = "Eles estão armados com armas de fogo bem pesadas e, toda vez que o pessoal da \"Kaiser Construction\" aparece, eles causam uma confusão... dizem que a obra está atrasando cada vez mais."
41130-50 = "Além disso, parece que um grupo de alunas armadas ocupou o parque ali perto, e a Valkyrie está tendo muita dor de cabeça com isso."
41130-51 = "Nessa situação, a \"Kaiser Construction\" deve estar em apuros, não acha?"
41130-52 = "[s] \"Essas alunas no parque...\""
41130-53 = "Ah, você as conhece?"
41130-54 = "Talvez você já tenha percebido, mas eu adoro conversar."
41130-61 = "Vou te dar mais um Inari-zushi, então, se souber de algo, poderia me contar?"
41130-62 = "[s1] \"Não tenho nada em especial para contar...\"\n[s2] \"Desculpe, eu também não sei muito sobre isso.\""
41130-63 = "...Entendo. Que pena."
41130-64 = "...Entendo. Que pena."
41130-65 = "Isso também é apenas um boato, mas..."
41130-66 = "Parece que as alunas daquele parque são de alguma escola de elite."
41130-67 = "Se for verdade, elas devem ter armas de fogo de alto calibre, então é natural que a Valkyrie esteja tendo dificuldades."
41130-68 = "Dito isso, por que alunas de elite estariam ocupando um parque para viver..."
41130-69 = "Isso é apenas uma suposição, mas talvez estejam tentando esconder algo, ou talvez tenham sido forçadas a isso por causa de um erro irreparável."
41130-70 = "Ou talvez... elas estejam apenas sonhando."
41130-71 = "Como uma flor criada em estufa... um sonho frágil, gentil e inalcançável."
41130-72 = "Deve ser muito difícil para quem está na posição de guiar alunas imersas em sonhos assim."
41130-73 = "[s] \"Acho que não é bem assim.\""
41130-74 = "……Entendo?"
41130-75 = "Por que diz isso?"
41130-76 = "[s] \"Apoiar os sonhos das alunas é o dever de quem as guia.\""
41130-80 = "……Você é uma pessoa estranha."
41130-81 = "Bem, talvez esse seja um ponto de vista válido."
41130-85 = "Bem, vamos fechar a loja por hoje. Muito obrigada pela compra!"
41130-89 = "[ns] \"……O que é isso?\""
41130-90 = "É o que sobrou."
41130-91 = "Eu não consigo comer tudo sozinha... então, considere um brinde."
41130-92 = "Se não se importar,"
41130-93 = "por favor, dê para alguém que esteja com fome."
41130-94 = "Foi um prazer te ver hoje."
41130-95 = "Vamos nos ver de novo se tivermos a chance, Sensei."
41130-100 = "Parque dos Coelhinhos"
41130-103 = "P-pare aí! Se fizer qualquer movimento estranho, e-eu atiro...!"
41130-107 = "……Miyu, quando for ficar em alerta, olhe primeiro para quem é."
41130-108 = "Olha, é o Sensei."
41130-109 = "Ah... d-desculpe!"
41130-111 = "Ah, é o Sensei [USERNAME]."
41130-112 = "Você estava se movendo de um jeito estranho, achei que fosse um cachorro ou algo assim."
41130-113 = "[s] \"Entendi...\""
41130-114 = "Mas, por que você está aqui? Não me lembro de termos chamado."
41130-115 = "Hum, esse cheiro..."
41130-119 = "[ns] Oferece o Inari Sushi."
41130-120 = "Uau, Inari Sushi! Que delícia!"
41130-121 = "Faz tempo que não como... me lembra dos tempos da SRT..."
41130-122 = "S-será que você trouxe isso para nós...?"
41130-123 = "[s3] \"Sim, podem comer se quiserem.\"\n[s4] \"Bem... eu achei no caminho até aqui...\""
41130-124 = "Hum..."
41130-125 = "Saki, come um pouco primeiro. Vai que tem alguma coisa nele."
41130-126 = "[s5] \"E-está tudo bem! Eu também acabei de comer um!\""
41130-127 = "E-entendo... como esperado, o Sensei não gastaria dinheiro com gente como nós..."
41130-128 = "Isso não está estragado, né?"
41130-132 = "Pelo cheiro parece estar tudo bem, mas..."
41130-135 = "Ué, esse cheiro é..."
41130-136 = "Que nostálgico... ah, bem, tínhamos veteranas na SRT. Veteranas que adoravam Inari Sushi."
41130-137 = "Onde será que elas estão agora..."
41130-141 = "……Bem, vamos comer."
41130-143 = "(Depois disso, enquanto dividiam o Inari Sushi, contei a elas algumas das coisas que aconteceram até agora)"
41130-147 = "……Entendo. Não podemos contar com o apoio do Conselho Estudantil Federal e ainda há a pressão das empresas por causa da reurbanização."
41130-148 = "Eu não esperava nada do Conselho Estudantil desde o início, mas a situação é pior do que eu pensava."
41130-149 = "Com a chuva forte da última vez, nossos equipamentos estão em um estado precário..."
41130-151 = "Dificuldades como essa não são nada que eu não esperasse."
41130-152 = "Se não tivermos balas, lutaremos com as próprias mãos!"
41130-153 = "No fim, sempre acaba assim..."
41130-154 = "Os suprimentos acabam, o apoio não vem e os ataques continuam..."
41130-155 = "No final, algum dia..."
41130-156 = "Ser levada para o mercado negro e passar por coisas terríveis..."
41130-157 = "Eu acho que não chegaríamos a esse ponto... ainda mais com o Sensei aqui."
41130-158 = "De qualquer forma, estou preocupada com nosso poder de fogo. Com o que temos agora, será que conseguiríamos trocar tiros de igual para igual nem que fosse com o Departamento de Segurança Pública..."
41130-159 = "Pelo menos, precisamos consertar as metralhadoras e as torres de defesa para posicionar no parque..."
41130-161 = "Kuhihi... pessoal, por acaso vocês não se esqueceram de mim?"
41130-169 = "Se for sobre suprimentos, pode deixar comigo!"
41130-171 = "Próximo episódio: Escambo"
