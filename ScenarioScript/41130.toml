[translation]
41130-1 = "Episódio 13: Inarizushi"
41130-2 = "(Antes de ir ao parque de sempre, passei na Vila dos Coelhinhos para comer alguma coisa.)"
41130-4 = "Vila dos Coelhinhos – Próximo ao Parque dos Coelhinhos"
41130-6 = "(…No entanto, por alguma razão, não havia uma única loja aberta.)"
41130-9 = "Delicioso, delicioso… Que tal um 'inarizushi'?"
41130-10 = "Ah, aquele cliente! Se ainda não comeu, que tal este aqui?"
41130-11 = "Pois hoje, posso dizer com segurança, ficou no ponto!"
41130-12 = "E é fresquinho! É o melhor agora, viu?"
41130-13 = "[s] \"Então, já que é assim…\""
41130-15 = "Muito obrigado!"
41130-16 = "Nossa, hoje não aparecia ninguém, já estava até desanimada. Achei que não ia vender nenhum, meu estômago até doeu."
41130-17 = "É um desperdício, depois de ter feito tudo com tanto cuidado."
41130-18 = "[s] \"Por falar nisso, não tem ninguém na rua, e quase nenhuma loja aberta.\""
41130-19 = "Pois é… Na verdade, a revitalização daqui vai começar em breve. Acho que é por isso."
41130-23 = "O quê? O senhor não sabia?"
41130-24 = "Pelo que dizem, estão planejando abrir uma nova linha de metrô por aqui."
41130-25 = "Vão demolir a rua comercial e o resto, fazer a obra do metrô e construir uma nova cidade comercial lá."
41130-26 = "Uma empresa com um logotipo parecido com um polvo, acho que era…"
41130-27 = "[s] \"…Grupo Kaiser?\""
41130-28 = "Ah, isso mesmo! Uma empresa chamada 'Kaiser Construction' desse grupo!"
41130-29 = "É um projeto de revitalização tão grande que estão colocando o destino da empresa em jogo, pelo que dizem."
41130-30 = "Com isso, as lojas foram forçadas a fechar e os moradores estão sendo despejados…"
41130-31 = "Mas para mim, que sou só uma aluna que vive de bicos, isso é papo de outro mundo. Hehe…"
41130-35 = "[ns] Compro mais um inarizushi."
41130-36 = "Ora, gostou?"
41130-37 = "Que bom. Não é querer me gabar, mas esse 'inarizushi' eu faço com muito orgulho."
41130-38 = "Meus colegas… amigos e kouhais também sempre adoraram."
41130-42 = "…Ah, acabei me perdendo no assunto."
41130-43 = "Bem…"
41130-44 = "Já que o senhor comprou bastante, vou contar mais uma informação boa."
41130-45 = "É sobre a revitalização da 'Kaiser Construction' que eu mencionei…"
41130-46 = "Parece que há boatos de que pode ser cancelada."
41130-47 = "[s] \"E por quê?\""
41130-48 = "Na verdade, há um grupo de andarilhos por aqui."
41130-49 = "Eles estão armados com armas de fogo pesadas e sempre causam confusão quando os representantes da 'Kaiser Construction' aparecem… Dizem que a obra está atrasando cada vez mais."
41130-50 = "Além disso, no parque próximo, há umas alunas armadas ocupando o local, e a Valkyrie está penando para resolver."
41130-51 = "Nessa situação, a 'Kaiser Construction' também deve estar de mãos atadas… não acha?"
41130-52 = "[s] \"As alunas do parque…\""
41130-53 = "Ora, o senhor as conhece?"
41130-54 = "Já deve ter percebido, mas eu adoro conversar."
41130-61 = "Vou lhe dar mais um inarizushi, então, se souber de alguma coisa, não me conta?"
41130-62 = "[s1] \"Não tenho nada para contar…\"\n[s2] \"Desculpa, também não sei muito sobre elas.\""
41130-63 = "…É mesmo? Que pena."
41130-64 = "…É mesmo? Que pena."
41130-65 = "Isso também é só um boato, mas…"
41130-66 = "Dizem que aquelas alunas do parque são de alguma escola de elite."
41130-67 = "Se for verdade, devem ter armas bem potentes, não é à toa que a Valkyrie está penando."
41130-68 = "Mas por que alunas tão elites ocupariam um parque e viveriam ali…"
41130-69 = "Só posso especular, mas talvez estejam tentando se passar por outra coisa, ou talvez tenham cometido um erro irreparável e sejam obrigadas a fazer isso."
41130-70 = "Ou talvez… estejam sonhando."
41130-71 = "Um sonho doce e suave, irrealizável, como o das flores cultivadas em estufa."
41130-72 = "Quem tem a responsabilidade de guiar alunas imersas nesse sonho deve ter um trabalho e tanto, não?"
41130-73 = "[s] \"Acho que não.\""
41130-74 = "…Hmm?"
41130-75 = "Por que diz isso?"
41130-76 = "[s] \"Porque apoiar os sonhos das alunas é o dever de quem as guia.\""
41130-80 = "…Que pessoa estranha."
41130-81 = "Bem, pode ser que pense assim."
41130-85 = "Bom, acho que vou fechar a barraca por hoje. Muito obrigado pela compra!"
41130-89 = "[ns] \"…Isto é?\""
41130-90 = "O que sobrou."
41130-91 = "Sozinha não consigo comer tudo… é um brinde. Aceite."
41130-92 = "Se não se importa,"
41130-93 = "dê para alguma criança com fome."
41130-94 = "Bom, fico feliz em ter encontrado o senhor hoje."
41130-95 = "Até uma próxima oportunidade, 'Professor'."
41130-100 = "Parque dos Coelhinhos"
41130-103 = "P-Pare aí! Se fizer algum movimento estranho, v-vou atirar…!"
41130-107 = "…Miyu, na hora de ficar alerta, primeiro olhe para quem você está apontando, ok?"
41130-108 = "Viu? É o Professor."
41130-109 = "Ah… d-desculpe!"
41130-111 = "Ah, é o Professor [USERNAME]."
41130-112 = "Estava se mexendo estranho, pensei que fosse um cachorro ou algo assim."
41130-113 = "[s] \"É mesmo…\""
41130-114 = "De qualquer forma, o que o senhor quer aqui? Não lembro de ter chamado."
41130-115 = "Hmm, esse cheiro…"
41130-119 = "[ns] Mostro o inarizushi."
41130-120 = "Uau, é inarizushi! Que delícia!"
41130-121 = "Faz tempo que não como… me lembro dos tempos da SRT…"
41130-122 = "S-será que… foi para nós?"
41130-123 = "[s3] \"Sim, comam se quiserem.\"\n[s4] \"Ahm… peguei no caminho até aqui…\""
41130-124 = "Hmm…"
41130-125 = "Saki, experimenta primeiro. Pode ter alguma coisa."
41130-126 = "[s5] \"T-Tudo bem! Eu também comi agora há pouco!\""
41130-127 = "S-Sério? Então… o Professor não gastaria dinheiro com alguém como a gente…"
41130-128 = "Isso não está estragado, né?"
41130-132 = "Pelo cheiro, parece estar bom…"
41130-135 = "Ah, esse cheiro…?"
41130-136 = "Que nostalgia… ah, é, na SRT tinha uma senpai. Uma senpai que adorava inarizushi."
41130-137 = "Onde será que elas estão agora…"
41130-141 = "…Bom, vamos comer."
41130-143 = "(Depois, dividimos os inarizushis e contei a elas o que houve.)"
41130-147 = "…Entendo. Não podemos contar com o apoio do Conselho Estudantil e ainda temos a pressão das empresas com a revitalização."
41130-148 = "Já não esperava nada do Conselho, mas a situação está pior do que eu imaginava."
41130-149 = "Com a tempestade da última vez, nossos equipamentos estão precários…"
41130-151 = "Uma dificuldade dessas não é nada inesperado."
41130-152 = "Sem balas, lutamos com as próprias mãos!"
41130-153 = "Vai acabar assim mesmo…"
41130-154 = "Os suprimentos acabam, o apoio não vem, os ataques continuam…"
41130-155 = "No final… um dia…"
41130-156 = "Vão nos levar para o Mercado Negro e fazer coisas terríveis…"
41130-157 = "Acho que não vai chegar a esse ponto… ainda mais com o Professor aqui."
41130-158 = "De qualquer forma, o que me preocupa é o poder de fogo. Do jeito que estamos, será que conseguimos sequer trocar tiros com o Departamento de Segurança da Vida…?"
41130-159 = "Pelo menos, precisamos de metralhadoras e reparos nas torretas para a defesa do parque…"
41130-161 = "Kuhihi… vocês não se esqueceram de mim, né?"
41130-169 = "Se é questão de suprimentos, podem deixar comigo!"
41130-171 = "Próximo Episódio: Escambo"