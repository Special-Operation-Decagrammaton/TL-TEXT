[translation]
1012706-1 = "Do fim do sonho"
1012706-2 = "campus de caça selvagem"
1012706-3 = "(Terminei meu trabalho formal hoje e saí do prédio.)"
1012706-7 = "[ns] \"Por que o número de empregos está aumentando repentinamente...\""
1012706-8 = "(Quando você guarda um, mais dois crescerão...)"
1012706-9 = "(Por enquanto, fui para o Wild Hunt Art Information Center)"
1012706-11 = "Centro de informações de arte Wild Hunt"
1012706-12 = "[ns] Sentei-me em um lugar vazio."
1012706-15 = "[ns] \"Não consigo ver o fim...\""
1012706-16 = "(Eu me pergunto quanto tempo se passou...)"
1012706-22 = "……."
1012706-23 = "[s] \"Qual deles é você...?\""
1012706-24 = "É quando você está dormindo? #nO que aconteceu com o trabalho?"
1012706-25 = "[s] \"Sim?\""
1012706-26 = "Olha aquele pico...!"
1012706-27 = "Além disso, traga-me um pouco de ramen."
1012706-28 = "[s] \"Por favor, deixe-me descansar um pouco...!\""
1012706-29 = "O que? Você está tentando responder comigo? ?"
1012706-30 = "Pessoa rude!"
1012706-31 = "[ns] \"Aaah...!\""
1012706-33 = "Você esteve aqui, senhor."
1012706-36 = "[wa:610]― [log=미요]……[wa:1740]O que você [wa:1060] está fazendo em um lugar como este? [/registro]"
1012706-38 = "[wa:80]― [log=미요]Estou procurando um sensei [wa:810] há muito tempo... [/log]"
1012706-41 = "[ns] \"Miyo...?\""
1012706-42 = "[wa:610]― [log=미요][wa:1060]Você parece estar sofrendo um pouco [wa:800] de um tempo atrás... [/log]"
1012706-44 = "― [log=미요]Talvez [wa:1030][wa:490]você não esteja se sentindo muito bem [wa:370]...? [/registro]"
1012706-47 = "[ns] \"Tive um sonho estranho...\""
1012706-48 = "[wa:2480]― [log=미요]Entendo, [wa:1570]Um pesadelo... [/log]"
1012706-50 = "― [log=미요]Tenho certeza que [wa:1200] foi punido. [/registro]"
1012706-53 = "[ns] \"Eu fiz algo tão ruim assim!?\""
1012706-54 = "[wa:2300]― [log=미요]Recentemente, [wa:490]Tenho ido muito ao Wild Hunt... [/log]"
1012706-56 = "― [log=미요]Porque você nunca me contatou. [/registro]"
1012706-59 = "[ns] \"Desculpe...\""
1012706-60 = "[wa:2390]― [log=미요]...Hehe, [wa:1240]Só estou brincando. [/registro]"
1012706-63 = "― [log=미요]Mas [wa:1190]Pude te conhecer assim...[/log]"
1012706-65 = "[wa:80]― [log=미요]Estou [wa:990] feliz. [/registro]"
1012706-68 = "Centro de informações de arte Wild Hunt"
1012706-70 = "[ns] \"Obrigado por me acordar, Miyo.\""
1012706-71 = "não."
1012706-72 = "A propósito, por que você trabalha em um lugar como esse...?"
1012706-73 = "Tinha um lugar mais fácil para trabalhar na zona oeste do prédio que você visitou hoje, certo?"
1012706-74 = "Por favor, levante-se agora."
1012706-75 = "Além disso... você gostaria de tomar um café?"
1012706-77 = "(Tomei café com Miyo no café do campus.)"
1012706-78 = "(Quando saí do Wild Hunt...uma pergunta me veio à mente)"
1012706-82 = "(...Como Miyo sabia onde eu estava?)"
