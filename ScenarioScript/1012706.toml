[translation]
1012706-1 = "夢の終わりから"
1012706-2 = "ワイルドハント・キャンパス"
1012706-3 = "（今日も手続きの仕事を終え、建物の外に出た）"
1012706-7 = "[ns] \"仕事って、どうして急に増えるんだろう……。\""
1012706-8 = "（一つ片付けると、次は二つ生えてくる……）"
1012706-9 = "（ひとまず、ワイルドハントの芸術情報館へ向かった）"
1012706-11 = "ワイルドハント・芸術情報館"
1012706-12 = "[ns] 空いている席に座った。"
1012706-15 = "[ns] \"終わりが見えない……。\""
1012706-16 = "（どれくらい時間が経ったのだろう……）"
1012706-22 = "……。"
1012706-23 = "[s] \"どちら様ですか……？\""
1012706-24 = "寝てる場合か？#n仕事はどうした？"
1012706-25 = "[s] \"はい？\""
1012706-26 = "あちらの峰を見たまえ……！"
1012706-27 = "あと、私にラーメンを持って来い。"
1012706-28 = "[s] \"す、少しだけ休ませてください……！\""
1012706-29 = "なにっ？この私に口答えするつもりか！？"
1012706-30 = "無礼者！"
1012706-31 = "[ns] \"うああっ……！\""
1012706-33 = "こちらにいたんですね、先生。"
1012706-36 = "[wa:610]― [log=미요]……[wa:1740]こんなところで、[wa:1060]何をされているんですか？[/log]"
1012706-38 = "[wa:80]― [log=미요]ずっと先生を[wa:810]探していたのに……。[/log]"
1012706-41 = "[ns] \"ミヨ……？\""
1012706-42 = "[wa:610]― [log=미요]さっきから[wa:1060]少し[wa:800]苦しそうですが……。[/log]"
1012706-44 = "― [log=미요]もしかして、[wa:1030]あまり[wa:490]体調が[wa:370]良くないのですか……？[/log]"
1012706-47 = "[ns] \"ちょっと変な夢を見てね……。\""
1012706-48 = "[wa:2480]― [log=미요]なるほど、[wa:1570]悪夢……。[/log]"
1012706-50 = "― [log=미요]きっと、[wa:1200]罰が当たったんですよ。[/log]"
1012706-53 = "[ns] \"そんな悪いことしたかな！？\""
1012706-54 = "[wa:2300]― [log=미요]最近、[wa:490]よくワイルドハントにいらしてるのに……。[/log]"
1012706-56 = "― [log=미요]一度も、私に連絡しなかったから。[/log]"
1012706-59 = "[ns] \"ご、ごめん……。\""
1012706-60 = "[wa:2390]― [log=미요]……ふふ、[wa:1240]冗談ですよ。[/log]"
1012706-63 = "― [log=미요]でも、[wa:1190]こうやって先生にお会いできて……[/log]"
1012706-65 = "[wa:80]― [log=미요]私、[wa:990]嬉しいです。[/log]"
1012706-68 = "ワイルドハント・芸術情報館"
1012706-70 = "[ns] \"起こしてくれてありがとう、ミヨ。\""
1012706-71 = "いいえ。"
1012706-72 = "ところで、どうしてこんな場所で仕事を……？"
1012706-73 = "今日先生が訪れた建物の西側に、もっと作業しやすい場所がありましたよ？"
1012706-74 = "と、とりあえず立ってください。"
1012706-75 = "それから……コーヒーでも飲みませんか？"
1012706-77 = "（ミヨと一緒に校内のカフェでコーヒーを飲んだ）"
1012706-78 = "（ワイルドハントを出た頃……ひとつの疑問が浮かんだ）"
1012706-82 = "（……ミヨは、なんで私がどこにいるかわかったんだろう）"
