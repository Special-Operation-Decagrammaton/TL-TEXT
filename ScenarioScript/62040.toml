[translation]
62040-1 = "Episódio 4; Confiando os Sentimentos"
62040-5 = "[ns] \"Mine!!\""
62040-6 = "C-Capitã...!"
62040-7 = "*wahhhhhh*!"
62040-8 = "……Não há grandes anormalidades na respiração. #nHanae-chan! Primeiro, assegure as vias aéreas!"
62040-9 = "Sim! Vou afrouxar as roupas no pescoço e na cintura... Ah, e vou trazer uma maca!"
62040-10 = "Por favor!"
62040-15 = "V-Você ouviu... agora há pouco?"
62040-16 = "Sim... disseram claramente, Corporação de Cavaleiros de Resgate...!"
62040-21 = "Quer dizer que quem estava nos ajudando era Trinity...?"
62040-22 = "Acho que já vi a pessoa que chamaram de Capitã! #nQuando foi...? Isso mesmo! No dia em que a 'Madame' desapareceu de Arius...!"
62040-23 = "Sério? #nEu não estava lá naquele dia..."
62040-24 = "Pois é..."
62040-39 = "Peço que também resgatem e tratem prontamente os feridos que eu causar de agora em diante."
62040-42 = "H-Hie...! Hiiiiie...!"
62040-43 = "O-O que aconteceu de repente?!"
62040-48 = "[log]Calamidade[/log]"
62040-52 = "[log]Calamidade[/log]"
62040-56 = "[log]Calamidade[/log]"
62040-59 = "[log]Calamidade para aqueles que habitam na terra.[/log]"
62040-63 = "[log]Pois os outros três anjos ainda estão para tocar suas trombetas.[/log]"
62040-65 = "！！！"
62040-66 = "！！！"
62040-68 = "O-O que foi isso... agora mesmo?!"
62040-69 = "Tive a impressão de ouvir vindo do céu..."
62040-71 = "Calamidade...?"
62040-72 = "Os outros três anjos estão para tocar suas trombetas...?"
62040-78 = "！！！"
62040-83 = "N-Não me diga que... é [ruby=・]a[/ruby][ruby=・]q[/ruby][ruby=・]u</ruby>[ruby=・]e[/ruby][ruby=・]l[/ruby][ruby=・]o[/ruby]?"
62040-84 = "Não pode ser! Isso é algo que só está escrito no 'Apocalipse'...!"
62040-86 = "Mas é o Apocalipse. Nós de Arius somos os que mais..."
62040-87 = "Se realmente for [ruby=・]i[/ruby][ruby=・]s[/ruby][ruby=・]s[/ruby][ruby=・]o[/ruby]... #ne se estiver acontecendo bem aqui...!"
62040-92 = "Não há dúvida. Aquilo é..."
62040-93 = "――O Anjo do Apocalipse!"
62040-94 = "……O 'fim do mundo' começou...!"
62040-96 = "[ns1] \"O que foi isso...?\"\n[ns2] \"Vocês sabem de alguma coisa...?\""
62040-99 = "……."
62040-100 = "……."
62040-101 = "Aquilo, não pode ser...!"
62040-102 = "Não deveria ser possível... mas..."
62040-103 = "[s] \"Atsuko?\""
62040-104 = "……."
62040-105 = "Desculpe. Nós também só podemos especular por enquanto. #nAlém disso, agora..."
62040-106 = "Precisamos mover o pessoal da Corporação de Cavaleiros de Resgate para um lugar seguro."
62040-107 = "[s] \"……Serina! A Mine está bem?\""
62040-111 = "Sim, ela não corre risco de vida! No entanto..."
62040-112 = "V-Veterana? Sensei...?"
62040-119 = "[ns] \"Squad!\""
62040-121 = "……Entendido. #nAbram caminho!"
62040-122 = "Tch."
62040-124 = "É-É isso aí... então com licença... #nehehe..."
62040-130 = "Veterana, o que vamos fazer...?"
62040-135 = "……."
62040-136 = "Pessoal, por favor, deixem-nas passar."
62040-137 = "……Pelo menos por agora."
62040-143 = "……Entendido."
62040-150 = "[ns] \"Obrigado, pessoal.\""
62040-151 = "Não há de quê. Fico feliz em poder ser útil para o Sensei."
62040-152 = "Obrigado também a todos da Corporação de Cavaleiros de Resgate."
62040-154 = "N-Não, nós é que agradecemos..."
62040-155 = "Realmente... achei que estivéssemos perdidas..."
62040-159 = "[ns] \"E... desculpe por chamá-la tão de repente.\""
62040-162 = "Não há problema. Este é o dever do Departamento de Medicina de Emergência."
62040-163 = "Além disso, já trabalhamos juntas com a Corporação de Cavaleiros de Resgate em campo."
62040-167 = "Mudando de assunto, o estado desta pessoa..."
62040-168 = "Sena-san..."
62040-170 = "……."
62040-171 = "[s] \"O que houve...?\""
62040-172 = "Como posso explicar..."
62040-173 = "Primeiro, não há anormalidades nos sinais vitais. Isso é certo."
62040-174 = "Embora pareça um estado de coma prolongado, ainda está dentro do esperado. #nApenas..."
62040-175 = "……."
62040-176 = "Isto é mais como uma 'intuição' minha."
62040-177 = "Uma regra empírica... de quem vive no campo de atuação, por assim dizer."
62040-178 = "……Não tenho um bom pressentimento."
62040-180 = "……!"
62040-181 = "C-Capitã...! *wahhhhhh*..."
62040-182 = "Especificamente...?"
62040-183 = "Sinto muito, mas eu também... não posso dizer com clareza."
62040-184 = "Apenas sinto intuitivamente... que a situação não é boa."
62040-185 = "……De qualquer forma, continuaremos fazendo o que pudermos. #nPortanto..."
62040-186 = "Sim, eu entendo. Vamos transportá-la em nosso veículo até o quartel-general da Corporação de Cavaleiros de Resgate."
62040-187 = "M-Mas o veículo do Departamento de Medicina de Emergência não é um pouco perigoso...?"
62040-188 = "Como já existem precedentes, não deve haver problema. #nEntão――"
62040-193 = "Sensei...?"
62040-194 = "!"
62040-196 = "！！！"
62040-197 = "Capitã!? Você recuperou a consciência?!"
62040-203 = "……Desculpe, Hanae. #nSe puder baixar um pouco a voz..."
62040-204 = "S-Sim! Ah...!"
62040-205 = "A-Assim... está... bom...?"
62040-207 = "Sim. Obrigada. #n……Sena-san."
62040-208 = "Sim. O que deseja?"
62040-209 = "Provavelmente... não vou aguentar por muito tempo. #nAcho que acabarei causando problemas para você."
62040-210 = "……Ajudar-se mutuamente faz parte quando estamos em apuros. Não se preocupe com isso."
62040-211 = "E também, Sensei. Tenho um pedido a fazer."
62040-212 = "[s] \"……Pode pedir qualquer coisa.\""
62040-213 = "……Obrigada."
62040-214 = "Se não fossem as suas palavras, eu poderia ter ficado [ruby=・]c[/ruby][ruby=・]o[/ruby][ruby=・]n[/ruby][ruby=・]s[/ruby][ruby=・]u[/ruby][ruby=・]m[/ruby][ruby=・]i[/ruby][ruby=・]d[/ruby][ruby=・]a[/ruby] lá e nunca mais voltado."
62040-215 = "Por favor... você poderia proteger o 'cotidiano' das alunas de Arius?"
62040-216 = "……!"
62040-217 = "Sei que é um pedido repentino."
62040-218 = "Mas... eu mesma acabei me esquecendo disso sem perceber."
62040-219 = "Acordar de manhã, se trocar, assistir às aulas, ir ao clube, voltar para o próprio quarto..."
62040-220 = "Que o que é normal para mim não é normal para outra pessoa――"
62040-221 = "E que o cotidiano é, na verdade, uma sucessão de milagres."
62040-224 = "Como? Ir para Arius?"
62040-229 = "Sim. E eu gostaria que você ajudasse o Sensei."
62040-230 = "O Sensei, agora――"
62040-231 = "está ensinando as alunas de Arius a estudarem para os exames."
62040-232 = "O que... isso significa?"
62040-233 = "Significa exatamente o que eu disse."
62040-234 = "Não importa que tipo de lugar seja, se houver um aluno lá, ele irá sem hesitar. #nO Sensei é esse tipo de pessoa."
62040-235 = "Considerando a segurança, eu queria impedi-lo de ir pessoalmente, mas..."
62040-236 = "……Entendo. #nEm outras palavras, esta é uma instrução para garantir a segurança do Sensei?"
62040-237 = "Não, claro que isso também é importante, mas... acima de tudo――"
62040-242 = "Quero [ruby=・]p[/ruby][ruby=・]e[/ruby][ruby=・]d[/ruby][ruby=・]i[/ruby][ruby=・]r[/ruby] o 'resgate' de que Arius precisa."
62040-243 = "……."
62040-244 = "Vou considerar que você diz isso compreendendo o que isso significa."
62040-246 = "A Capitã Mine não era fã desse tipo de fraseado, não é?"
62040-247 = "Ou melhor... não apenas do fraseado, mas de mim mesma também."
62040-248 = "Mesmo assim, ciente de tudo isso."
62040-249 = "Isto não é uma diretriz da Tea Party para a Corporação de Cavaleiros de Resgate."
62040-250 = "É um 'pedido' de uma aluna chamada [ruby=Kirifuji]Kirifuji[/ruby] Nagisa para a senhorita [ruby=Aomori]Aomori[/ruby] Mine."
62040-251 = "Porque certamente... Arius também precisa de resgate."
62040-252 = "……Trinity não tem o 'direito de salvar' Arius. #nVocê não pensa assim às vezes?"
62040-253 = "É verdade. #nMas acredito que a senhorita Mine é alguém capaz de seguir em frente com o 'espírito de resgate'."
62040-254 = "……."
62040-255 = "Eu não guardo ressentimentos em relação à senhorita Nagisa."
62040-260 = "Pelo contrário, há partes pelas quais sou grata."
62040-261 = "Porque, por não querer ficar presa à posição e às pesadas responsabilidades impostas pelo título de Tea Party――"
62040-262 = "pode-se dizer que a Corporação de Cavaleiros de Resgate abriu mão desse posto por vontade própria."
62040-263 = "Mas o modo de falar da senhorita Nagisa... #nainda passa um pouco de pressão."
62040-265 = "……Sinto muito."
62040-266 = "……Compreendi a situação."
62040-270 = "Seguirei em direção a Arius guiada pelo 'pressentimento de que o resgate é necessário'."
62040-273 = "O que o Sensei trouxe. Deve ter sido algo completamente novo e revigorante para as alunas de Arius."
62040-274 = "Experimentar uma aula, ter contato com os estudos, preocupar-se seriamente com bobagens..."
62040-275 = "Esse tipo de 'cotidiano' contínuo..."
62040-276 = "……."
62040-277 = "Por favor, eu lhe peço."
62040-278 = "……Permita que elas continuem a desfrutar disso."
62040-279 = "[s] \"……Sim, eu prometo.\""
62040-280 = "Obrigada... de coração."
62040-287 = "Capitã!? Capitã..."
62040-288 = "……Parece que ela perdeu a consciência."
62040-289 = "……."
62040-290 = "Ter recuperado a consciência, mesmo que temporariamente, é um bom sinal."
62040-291 = "Ou talvez seja apenas uma evidência de quão resiliente é a força mental da senhorita Mine."
62040-295 = "……Bem, com certeza entregaremos a senhorita Mine em segurança. Eu me despeço por aqui."
62040-296 = "Por favor, cuide bem da sua saúde."
62040-304 = "E-Ela já foi..."
62040-305 = "……."
62040-306 = "……."
62040-307 = "Será que a Mine... vai ficar bem...?"
62040-308 = "[s] \"Eu acredito que sim.\""
62040-309 = "……Entendo. Sim."
62040-310 = "[s] \"……Tem algo que quero perguntar à Atsuko.\""
62040-314 = "É sobre aquela voz, não é?"
62040-315 = "……Por onde devo começar?"
62040-316 = "……Acho que aquilo provavelmente é o 'Anjo do Apocalipse'. #nEmbora ainda seja apenas uma suposição."
62040-317 = "Mas se isso estiver correto... significa apenas uma coisa."
62040-318 = "……Sim."
62040-322 = "O começo do 'fim do mundo'."
62040-324 = "Próximo Episódio; Basílica de Arius"