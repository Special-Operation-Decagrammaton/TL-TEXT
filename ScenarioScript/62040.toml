[translation]
62040-1 = "Episódio 4; Depositando Esperanças"
62040-5 = "[ns] \"MINE!!\""
62040-6 = "L-Líder...!"
62040-7 = "Waaaaah!"
62040-8 = "……Não há grandes anormalidades na respiração. Hanae-chan! Primeiro, garanta que as vias aéreas estejam desobstruídas!"
62040-9 = "Sim! Vou afrouxar as roupas no pescoço e na cintura... Ah, e vou buscar a maca!"
62040-10 = "Por favor!"
62040-15 = "A-aquilo agora pouco... você ouviu?"
62040-16 = "Sim... com certeza, algo sobre o Esquadrão de Socorro...!"
62040-21 = "Então quer dizer que quem estava nos ajudando era a Trinity...?"
62040-22 = "Acho que já vi a pessoa que chamaram de líder antes! Quando foi mesmo... Ah, já sei! No dia em que a \"Madame\" desapareceu de Arius...!"
62040-23 = "É mesmo? Naquele dia, eu não estava lá..."
62040-24 = "É que..."
62040-39 = "Peço que socorram e tratem prontamente os feridos que eu causar daqui em diante."
62040-42 = "I-iiih...! Iiiiiiih...!"
62040-43 = "O-o que houve de repente!?"
62040-48 = "[log]Ai dos habitantes[/log]"
62040-52 = "[log]Ai dos habitantes[/log]"
62040-56 = "[log]Ai dos habitantes[/log]"
62040-59 = "[log]Ai dos habitantes da terra.[/log]"
62040-63 = "[log]Eis que três anjos estão prestes a tocar suas trombetas.[/log]"
62040-65 = "!!!"
62040-66 = "!!!"
62040-68 = "O-o que foi isso agora pouco!?"
62040-69 = "Senti como se tivesse vindo do céu..."
62040-71 = "Ai dos habitantes...?"
62040-72 = "Três anjos estão prestes a tocar suas trombetas...?"
62040-78 = "!!!"
62040-83 = "N-não pode ser... aquilo?"
62040-84 = "Não tem como! Aquilo é só algo escrito no \"Apocalipse\"...!"
62040-86 = "Mas é o Apocalipse, sabe? Nós de Arius somos os que mais..."
62040-87 = "Se for realmente assim... Se isso estiver acontecendo aqui...!"
62040-92 = "Não há dúvidas. Aquilo é..."
62040-93 = "――Um anjo do Apocalipse!"
62040-94 = "……O \"fim do mundo\" começou...!"
62040-96 = "[ns1] \"O que foi aquilo...?\"\n[ns2] \"Vocês sabem de alguma coisa...?\""
62040-99 = "……."
62040-100 = "……."
62040-101 = "Aquilo, não pode ser...!"
62040-102 = "Não deveria ser possível... mas..."
62040-103 = "[s] \"Atsuko?\""
62040-104 = "……."
62040-105 = "Desculpe. Nós também só podemos especular por enquanto. Além disso, agora..."
62040-106 = "Precisamos levar o pessoal do Esquadrão de Socorro para um lugar seguro."
62040-107 = "[s] \"...Serina! A Mine está bem?\""
62040-111 = "Sim, a vida dela não corre perigo! Mas..."
62040-112 = "S-senpai? Sensei...?"
62040-119 = "[ns] \"Esquadrão!\""
62040-121 = "……Entendido. Vamos abrir caminho!"
62040-122 = "Tsc."
62040-124 = "É, é por isso que... sinto muito...#nhehe..."
62040-130 = "Senpai, o que faremos...?"
62040-135 = "……"
62040-136 = "Pessoal, por favor, deixem que ela passe."
62040-137 = "……Pelo menos, só por agora."
62040-143 = "……Entendido."
62040-150 = "[ns] \"Pessoal, obrigado.\""
62040-151 = "Não precisa agradecer. Se pude ser útil ao Sensei, é o que importa."
62040-152 = "Pessoal da Brigada de Socorro, obrigado também."
62040-154 = "N-não, nós que agradecemos..."
62040-155 = "Sério... achei que não teria mais jeito..."
62040-159 = "[ns] \"E também... desculpem por chamar vocês de repente.\""
62040-162 = "Não há problema. Esse é o dever do Departamento de Medicina de Emergência."
62040-163 = "Além disso, já trabalhamos em campo com o pessoal da Brigada de Socorro antes."
62040-167 = "Deixando isso de lado, o estado dela é..."
62040-168 = "Sena..."
62040-170 = "……"
62040-171 = "[s] \"O que houve...?\""
62040-172 = "Como devo dizer isso..."
62040-173 = "Primeiro, não há anormalidades nos sinais vitais. Disso tenho certeza."
62040-174 = "Embora pareça que ela está em coma há muito tempo, ainda está dentro do esperado.#nPorém..."
62040-175 = "……"
62040-176 = "Isso é algo próximo da minha \"intuição\"."
62040-177 = "Poderia chamar de... regra empírica de alguém que está sempre no campo de batalha."
62040-178 = "……Não tenho um bom pressentimento sobre isso."
62040-180 = "……!"
62040-181 = "C-chefe...! Uéééééé..."
62040-182 = "De forma concreta, você diz...?"
62040-183 = "Sinto muito, mas nem eu... consigo dizer com clareza."
62040-184 = "Apenas minha intuição me diz que... a situação não é boa."
62040-185 = "……De qualquer forma, continuaremos fazendo o que podemos.#nPor isso..."
62040-186 = "Sim, eu entendo. Vamos levá-la até o quartel-general da Brigada de Socorro em nosso veículo."
62040-187 = "M-mas o carro do Departamento de Medicina de Emergência não é um pouco perigoso...?"
62040-188 = "Já temos precedentes, então não deve haver problema.#nEntão—"
62040-193 = "Sense...i?"
62040-194 = "!"
62040-196 = "!!!"
62040-197 = "Chefe!? Você recuperou a consciência!?"
62040-203 = "……Desculpe, Hanae.#nSe puder baixar um pouco o tom de voz..."
62040-204 = "S-sim! Ah...!"
62040-205 = "A-assim... está bom...?"
62040-207 = "Sim. Obrigado.#n...Sena."
62040-208 = "Sim. O que foi?"
62040-209 = "Provavelmente... não vou aguentar por muito tempo.#nSinto que vou acabar causando problemas a vocês."
62040-210 = "……Quando estamos em apuros, devemos ajudar uns aos outros. Não se preocupe com isso."
62040-211 = "E também, Sensei. Tenho um pedido a lhe fazer."
62040-212 = "[s] \"...Pode dizer qualquer coisa.\""
62040-213 = "……Muito obrigada."
62040-214 = "Se não fossem as palavras do Sensei, talvez eu não tivesse conseguido voltar, tendo sido levada por tudo aquilo."
62040-215 = "Por favor... você poderia proteger o \"cotidiano\" das alunas de Arius?"
62040-216 = "……！"
62040-217 = "Sei que é um pedido repentino."
62040-218 = "Mas... eu mesma, sem perceber, acabei me esquecendo."
62040-219 = "Acordar de manhã, trocar de roupa, assistir às aulas, participar do clube, voltar para o meu quarto..."
62040-220 = "O que é natural para mim, não é natural para outra pessoa —"
62040-221 = "E que o cotidiano é uma sucessão de milagres."
62040-224 = "Sim? Para ir até Arius, você diz?"
62040-229 = "Sim. E gostaria que ajudasse o Sensei."
62040-230 = "O Sensei está agora —"
62040-231 = "Ensinando as alunas de Arius para as provas."
62040-232 = "Isso... o que quer dizer com isso?"
62040-233 = "Exatamente o que eu disse."
62040-234 = "Não importa o lugar, se há alunas lá, ele vai sem hesitar. #nO Sensei é esse tipo de pessoa."
62040-235 = "Considerando a segurança, eu queria impedi-lo de ir pessoalmente, mas..."
62040-236 = "……Entendo. #nEm outras palavras, é uma instrução para garantir a segurança do Sensei, correto?"
62040-237 = "Não, embora isso também seja importante, acima de tudo —"
62040-242 = "Eu gostaria de pedir o \"socorro\" que Arius precisa."
62040-243 = "……."
62040-244 = "Entenderei isso como se você soubesse o que isso significa."
62040-246 = "A Comandante Mine não costuma gostar desse tipo de abordagem, não é?"
62040-247 = "Ou talvez... não apenas da abordagem, mas de mim mesma."
62040-248 = "Ainda assim, ciente de tudo isso."
62040-249 = "Este não é um pedido do Tea Party para a Brigada de Socorro."
62040-250 = "É um \"pedido\" de uma aluna chamada Kirifuji Nagisa para você, Aomori Mine-san."
62040-251 = "Com certeza... Arius também precisa de socorro."
62040-252 = "……Trinity não tem o \"direito de salvar\" Arius. #nVocê não acha que podem pensar assim?"
62040-253 = "Sim. #nMas acredito que a Mine-san é alguém que pode seguir em frente com o \"espírito de socorro\"."
62040-254 = "……."
62040-255 = "Eu não tenho sentimentos negativos em relação à Nagisa-sama."
62040-260 = "Na verdade, há partes pelas quais sou grata."
62040-261 = "Já que não queríamos ficar presos à posição e à responsabilidade impostas pelo título de Tea Party —"
62040-262 = "Pode-se dizer que a Brigada de Socorro abriu mão desse lugar por conta própria."
62040-263 = "Mas o jeito de falar da Nagisa-sama... #nainda sinto um pouco de pressão."
62040-265 = "……Peço perdão."
62040-266 = "……Entendi o que foi dito."
62040-270 = "Seguirei o \"pressentimento de que o socorro é necessário\" e irei para Arius."
62040-273 = "O que o Sensei trouxe. Para as alunas de Arius, isso deve ter sido algo novo e fresco."
62040-274 = "Experimentar aulas, ter contato com estudos, preocupar-se seriamente com coisas triviais..."
62040-275 = "Esse \"cotidiano\" que continua dessa forma..."
62040-276 = "……."
62040-277 = "Por favor, eu lhe peço."
62040-278 = "……Faça com que elas possam continuar desfrutando disso."
62040-279 = "[s] \"……Sim, eu prometo.\""
62040-280 = "Muito... obrigada."
62040-287 = "Comandante!? Comandante..."
62040-288 = "……Parece que ela perdeu a consciência."
62040-289 = "……."
62040-290 = "O fato de ter recuperado a consciência, mesmo que temporariamente, é um bom sinal."
62040-291 = "Ou talvez, seja a prova de que a força mental da Mine-san é tão formidável assim."
62040-295 = "……Então, levarei a Mine-san com segurança. #nPor ora, é só."
62040-296 = "Por favor, cuide bem de si mesma."
62040-304 = "E-ela foi embora..."
62040-305 = "……"
62040-306 = "……"
62040-307 = "Será que a Mine-san... está bem?"
62040-308 = "[s] \"Eu acredito nela.\""
62040-309 = "……Entendo. É verdade."
62040-310 = "[s] \"……Tenho algo que quero perguntar à Atsuko.\""
62040-314 = "Sobre aquela voz, não é?"
62040-315 = "……Por onde devo começar?"
62040-316 = "……Acho que aquilo provavelmente é o \"Anjo do Apocalipse\". #nEmbora ainda seja apenas uma suposição."
62040-317 = "Mas, se isso estiver correto... só existe um significado."
62040-318 = "……Sim."
62040-322 = "É o início do \"fim do mundo\"."
62040-324 = "Próximo episódio: Basílica de Arius"
