[translation]
41110-1 = "Episódio 11: Alerta de Tempestade"
41110-2 = "Schale – Escritório"
41110-4 = "Dias depois, uma forte chuva caía sobre uma vasta área de Kivotos."
41110-5 = "Que chuva forte…"
41110-6 = "Espero que não tenha causado danos nos distritos…"
41110-7 = "Será que os conselhos e comitês de cada escola vão dar conta?"
41110-8 = "Ah, mas… e as alunas da SRT que estão no parque agora…"
41110-9 = "Com essa tempestade, a barraca…"
41110-10 = "Estou preocupado que elas peguem um resfriado, e também…"
41110-16 = "[ns] Vou ver como está o Esquadrão RABBIT."
41110-22 = "Parque dos Coelhinhos"
41110-24 = "A lona aqui também rasgou!"
41110-25 = "Miyu! As lonas impermeáveis acabaram!"
41110-26 = "J-já não tenho mais reservas…!"
41110-27 = "Droga, se tivéssemos mais materiais…"
41110-28 = "Moe, me ajuda aqui!"
41110-29 = "Não é hora de ficar abraçada com a máquina!"
41110-31 = "Não, não, não! Se o equipamento de comunicação molhar, é um problemão!"
41110-32 = "Sabe quanto custa tudo isso junto?"
41110-33 = "Quero saber! Dá um jeito!!"
41110-37 = "Droga, quanto tempo ainda vai durar essa chuva…!"
41110-39 = "Depois de reforçar a impermeabilização, vamos para os canais de escoamento!"
41110-40 = "Deve estar entupido de areia, a água está transbordando…"
41110-41 = "Se continuar assim, tudo ao redor vai alagar!"
41110-42 = "Eu sei! Mas aqui o reforço não vai dar tempo!"
41110-43 = "Se eu largar, desaba na hora…"
41110-49 = "Aquilo foi…?"
41110-50 = "U-um raio caiu no centro do parque…!"
41110-52 = "Droga,"
41110-56 = "A estrutura da barraca vai cair…!"
41110-65 = "……"
41110-66 = "A-as barracas…"
41110-67 = "A munição toda foi para o saco…"
41110-68 = "Os equipamentos de comunicação também…"
41110-69 = "É o fim, né…"
41110-75 = "Não, ainda é cedo para desistir."
41110-76 = "Dêmos um jeito nos canais de escoamento e recuperemos o que não molhou tanto…"
41110-77 = "Não se trata só dos equipamentos!!"
41110-78 = "É tudo, tudo…! Nós, da SRT, já estamos…!!"
41110-79 = "Saki-chan…"
41110-80 = "Haaah… se soubesse que ia acabar assim, desde o começo…"
41110-82 = "O-o que você está dizendo…?"
41110-83 = "Nós mesmas dissemos no início."
41110-84 = "Enquanto não desistirmos, o nome da SRT――"
41110-86 = "A Miyako também já sabia, não sabia?"
41110-87 = "Que não daria para continuar com essa idiotice para sempre."
41110-88 = "Agora, em vez de manter a ordem, vivemos procurando comida…"
41110-89 = "Não é mais questão de justiça, ou de criminosos."
41110-90 = "Nesse estado, não acho que estamos protegendo o nome da SRT…!"
41110-91 = "……Já nem sei mais o que estou fazendo."
41110-92 = "É, o que estamos fazendo mesmo…"
41110-93 = "Tudo inundado, cansada de dormir ao relento…"
41110-94 = "Miyako-chan… já está na hora de desistir…"
41110-95 = "……"
41110-101 = "……Miyako, para onde vai?"
41110-102 = "Ainda vai continuar com essa loucura?!"
41110-103 = "……Sim."
41110-104 = "Não posso desistir. Pela SRT."
41110-115 = "(A pressão da água está forte… já não sinto mais as mãos…)"
41110-116 = "(Pode ser que não faça diferença…)"
41110-117 = "(Mas eu, com a SRT, com o meu ideal…)"
41110-119 = "Não posso desistir…!"
41110-127 = "……Professor?"
41110-128 = "……O que o senhor quer hoje?"
41110-129 = "Como pode ver, não é hora para brincadeiras."
41110-130 = "Se não agirmos agora, tudo ao redor…"
41110-134 = "[ns] Pego uma pá e vou para o canal."
41110-135 = "Professor…?"
41110-136 = "Por que…"
41110-137 = "[s] \"É só tirar a terra daqui, certo?\""
41110-141 = "Sim, por favor."
41110-147 = "Haaah… que jeito ruim de usar pá. Me dá isso."
41110-152 = "……É, o que estamos fazendo mesmo."
41110-153 = "……Vou ajudar."
41110-155 = "Depois disso, as integrantes do Esquadrão RABBIT e eu trabalhamos duro para desobstruir os canais de escoamento."
41110-159 = "……Finalmente a chuva parou."
41110-160 = "[s] \"Bom trabalho, pessoal.\""
41110-164 = "……"
41110-165 = "……Por que nos ajuda?"
41110-166 = "Dissemos várias vezes. Nada vai mudar."
41110-167 = "Não entendo o que o senhor espera de nós."
41110-168 = "[s] \"Não espero nada.\""
41110-170 = "[s] \"Sou apenas o Professor.\""
41110-174 = "……É mesmo."
41110-175 = "Os equipamentos foram quase todos perdidos…"
41110-176 = "Mas conseguimos evitar que o parque ficasse completamente alagado."
41110-185 = "É, tenho muito a dizer para a Miyako também, mas…"
41110-186 = "Professor, o senhor não queria que a gente saísse do parque?"
41110-187 = "Mesmo sem ganhar nada com isso… que idiota convicto."
41110-188 = "Bem, que era idiota a gente já sabia. Kuhihi…"
41110-189 = "M-Moe-chan… ela veio nos ajudar, pelo menos…"
41110-194 = "Dissemos repetidamente que não precisávamos de ajuda… mas fomos ajudadas, é fato."
41110-195 = "……Muito obrigada, Professor."
41110-197 = "(Depois, voltei para a Schale com o corpo molhado.)"
41110-198 = "(Peguei um resfriado por ficar na chuva, mas pelo menos deu tudo certo…)"
41110-200 = "Próximo Episódio: A Fatura Encharcada"