[translation]
41110-1 = "Episódio 11; Alerta de Chuva Forte"
41110-2 = "Escritório do Schale"
41110-4 = "Alguns dias depois, uma chuva forte caía sobre toda Kivotos."
41110-5 = "Que chuva terrível..."
41110-6 = "Espero que não haja danos em nenhum dos distritos autônomos..."
41110-7 = "Será que podemos confiar nos conselhos estudantis e comitês de cada escola para lidar com isso?"
41110-8 = "Ah, mas... e as alunas da SRT que estão no parque agora...?"
41110-9 = "Com essa chuva forte, as barracas..."
41110-10 = "Estou preocupado que elas peguem um resfriado, e além disso..."
41110-16 = "[ns] Ir verificar como está o Esquadrão RABBIT."
41110-22 = "Parque dos Coelhinhos"
41110-24 = "A lona rasgou aqui também!"
41110-25 = "Miyu! Não temos lona impermeável suficiente!"
41110-26 = "N-não temos mais reservas...!"
41110-27 = "Droga, se tivéssemos mais suprimentos..."
41110-28 = "Moe, me ajude aqui!"
41110-29 = "Não é hora de ficar abraçada com essas máquinas!"
41110-31 = "Não, não, não! Vai ser um desastre se o equipamento de comunicação for inundado!"
41110-32 = "Você tem ideia de quanto custa todo esse equipamento aqui?"
41110-33 = "Que se dane! Dê um jeito nisso!!"
41110-37 = "Droga, até quando essa chuva vai continuar...!"
41110-39 = "Se conseguirmos reforçar a impermeabilização, o próximo passo é o canal de drenagem!"
41110-40 = "Parece que está entupido com terra e a água está transbordando..."
41110-41 = "Se continuar assim, toda a área ao redor vai acabar inundada!"
41110-42 = "Eu sei! Mas não estamos conseguindo reforçar aqui a tempo!"
41110-43 = "Se eu soltar, vai desmoronar na hora—"
41110-49 = "O que foi isso...?"
41110-50 = "U-um raio caiu no centro do parque...!"
41110-52 = "Droga,"
41110-56 = "O suporte da barraca vai cair...!"
41110-65 = "..."
41110-66 = "A-a barraca..."
41110-67 = "Toda a munição foi perdida..."
41110-68 = "Os equipamentos de comunicação também..."
41110-69 = "Acabou tudo, né..."
41110-75 = "Não, ainda é cedo para desistir."
41110-76 = "Vamos dar um jeito no canal de drenagem e recuperar os equipamentos que não foram atingidos pela água—"
41110-77 = "Não é só sobre o equipamento!!"
41110-78 = "Tudo, perdemos tudo...! Nós da SRT, já..."
41110-79 = "Saki-chan..."
41110-80 = "Ah... se eu soubesse que ia acabar assim, desde o começo..."
41110-82 = "O-o que você está dizendo...?"
41110-83 = "Nós não dissemos todas juntas, desde o início?"
41110-84 = "Enquanto não desistirmos, o nome da SRT—"
41110-86 = "Miyako, você também sabia, não sabia?"
41110-87 = "Que não podíamos continuar com essa coisa estúpida para sempre."
41110-88 = "Do jeito que estamos agora, longe de manter a ordem pública, passamos os dias procurando comida..."
41110-89 = "Não é nem uma questão de justiça ou de criminosos."
41110-90 = "Nesse estado, não acho que estamos protegendo o nome da SRT...!"
41110-91 = "...Eu já não sei mais o que estou fazendo."
41110-92 = "Sério, o que será que estamos fazendo..."
41110-93 = "Está tudo alagado, e estou exausta de viver ao relento..."
41110-94 = "Miyako-chan... vamos desistir logo..."
41110-95 = "..."
41110-101 = "...Miyako, onde você vai?"
41110-102 = "Você pretende continuar com essa loucura!?"
41110-103 = "...Sim, pretendo."
41110-104 = "Não posso desistir, pelo bem da SRT."
41110-115 = "(A pressão da água é forte... já perdi a sensibilidade das mãos...)"
41110-116 = "(É verdade, talvez isso não tenha sentido algum...)"
41110-117 = "(Mas eu preciso proteger a SRT, o ideal em que acredito...)"
41110-119 = "Eu não posso... desistir!"
41110-127 = "...Sensei?"
41110-128 = "...O que veio fazer aqui hoje?"
41110-129 = "Como pode ver, não estamos em uma situação para brincadeiras."
41110-130 = "Se não resolvermos isso agora, tudo ao redor vai..."
41110-134 = "[ns] Pega uma pá e vai em direção ao canal de drenagem."
41110-135 = "Sensei...?"
41110-136 = "Por que..."
41110-137 = "[s] \"Só preciso limpar a terra daqui, certo?\""
41110-141 = "Sim, por favor."
41110-147 = "Haa... Você não sabe usar uma pá, me dê isso aqui."
41110-152 = "...Sério, o que estamos fazendo..."
41110-153 = "...Vou ajudar."
41110-155 = "Depois disso, trabalhei desesperadamente com as integrantes do Esquadrão RABBIT para consertar o canal de drenagem."
41110-159 = "...A chuva finalmente parou."
41110-160 = "[s] \"Bom trabalho, pessoal.\""
41110-164 = "..."
41110-165 = "...Por que você nos ajuda?"
41110-166 = "Eu já disse várias e várias vezes. Nada vai mudar."
41110-167 = "Eu não entendo o que você espera de nós, Sensei."
41110-168 = "[s] \"Não espero nada em especial.\""
41110-170 = "[s] \"É porque eu sou o Sensei.\""
41110-174 = "...Entendo."
41110-175 = "Nossos equipamentos estão quase todos inutilizáveis, mas..."
41110-176 = "De alguma forma, conseguimos evitar que o parque ficasse completamente submerso."
41110-185 = "Nossa, eu tenho várias coisas para falar para a Miyako, mas..."
41110-186 = "Sensei, você não queria que elas parassem de viver neste parque?"
41110-187 = "Não ganha nada com isso e ainda faz uma coisa dessas... você é um idiota convicto."
41110-188 = "Bem, eu já sabia que você era um idiota desde o começo. Kuhihi..."
41110-189 = "M-Moe-chan... mesmo que ele tenha nos ajudado..."
41110-194 = "Eu continuei dizendo que não precisávamos de ajuda, mas... é um fato que fomos ajudadas."
41110-195 = "...Obrigada, Sensei."
41110-197 = "(Depois disso, voltei para o Schale com o corpo encharcado.)"
41110-198 = "(Embora eu tenha pegado um resfriado por causa da chuva, pelo menos tudo acabou bem...)"
41110-200 = "Próximo episódio: A fatura encharcada pela chuva"
