[translation]
41110-1 = "Episódio 11;Alerta de Tempestade"
41110-2 = "Schale - Escritório"
41110-4 = "Dias depois, uma tempestade severa varreu toda a extensão de Kivotos."
41110-5 = "A chuva tá castigando lá fora……"
41110-6 = "Espero que os Distritos Autônomos não estejam debaixo d\"água ou sofrendo danos graves…………"
41110-7 = "Os Conselhos Estudantis e os Comitês devem dar conta do recado, mas……"
41110-8 = "Ah…… e o Esquadrão RABBIT no parque……?"
41110-9 = "Com uma chuva dessas, aquelas barracas finas não vão aguentar……"
41110-10 = "Se elas pegarem uma hipotermia ou coisa pior……"
41010-16 = "[ns] (Vou até o parque ver como o Esquadrão RABBIT está.)"
41110-22 = "Parque dos Coelhinhos"
41110-24 = "Droga, a lona principal rasgou no meio!!"
41110-25 = "Miyu! Puxa o impermeável, rápido!!"
41110-26 = "N-Não tem mais nada! Foram todos os reservas……!"
41110-27 = "Droga! Se a gente tivesse mais material……!"
41110-28 = "Moe, larga de ser inútil e me ajuda a segurar essa coluna!"
41110-29 = "Para de abraçar esses equipamentos e vem colocar força aqui!"
41110-31 = "Cê tá louca?! Se a central de comunicação inundar, acabou tudo!"
41110-32 = "Você tem noção da fortuna que custam esses transmissores?!"
41110-33 = "Dane-se o preço! Se o teto desabar na nossa cabeça, nada disso importa!!"
41110-37 = "Caramba…… Quando é que esse inferno vai acabar……?!"
41110-39 = "Se a estrutura aguentar, a nossa próxima prioridade é a trincheira de drenagem!"
41110-40 = "A lama entupiu o escoamento, a água tá subindo rápido demais……"
41110-41 = "Se continuar assim, a lama vai engolir a base inteira!"
41110-42 = "Eu sei disso, droga! Mas eu não posso sair daqui!"
41110-43 = "Se eu soltar as mãos, essa estrutura inteira cai por terra――!"
41110-49 = "Q-Que Barulho foi esse……?"
41110-50 = "U-Um raio caiu…… bem no meio do parque……!"
41110-52 = "Droga……"
41110-56 = "As estacas…… não vão aguentar……!"
41110-65 = "……"
41110-66 = "A nossa barraca…… as lonas…… tudo destruído."
41110-67 = "A munição foi afogada na lama. Inutilizada……"
41110-68 = "Os rádios também fritaram……"
41110-69 = "Acabou…… a gente perdeu tudo……"
41110-75 = "Ainda não…… é muito cedo para jogarmos a toalha."
41110-76 = "A gente desentope a vala, recupera o que molhou menos e――"
41110-77 = "O PROBLEMA NÃO É A DROGA DO EQUIPAMENTO!!"
41110-78 = "Olha em volta! Acabou tudo! A nossa SRT morreu afogada nessa lama!!"
41110-79 = "Saki-chan……"
41110-80 = "Haah…… Eu sabia que a gente ia bater nesse muro mais cedo ou mais tarde……"
41110-82 = "Saki…… que absurdo você tá falando……?"
41110-83 = "A gente fez um juramento naquele dia, lembra?!"
41110-84 = "Enquanto a gente não abaixar a cabeça, o nome da SRT nunca vai morrer――"
41110-86 = "Miyako, para de mentir pra si mesma! Você também já percebeu!"
41110-87 = "A gente não tem como sustentar essa brincadeira de guerra pra sempre!"
41110-88 = "Cadê a tal \"elite\"? A gente passa os dias catando lixo e mendigando marmita na rua igual bicho!"
41110-89 = "Prender criminoso? Fazer justiça? A gente não tem poder nem pra se proteger da chuva!"
41110-90 = "Você realmente acha que o orgulho e o legado da SRT sobrevivem nessa poça de lama……?!"
41110-91 = "……Eu já nem sei mais pelo que nós estamos lutando."
41110-92 = "É…… a gente cavou a própria cova……"
41110-93 = "Eu perdi as forças…… não aguento mais passar frio, dormir no mato…… dói demais……"
41110-94 = "Miyako-chan…… por favor…… eu quero desistir……"
41110-95 = "……"
41110-101 = "……Aonde cê vai, Miyako?"
41110-102 = "Vai continuar cavando nessa droga?! Você quer afundar o que sobrou da gente até a morte?!"
41110-103 = "……Sim. Eu vou."
41110-104 = "Eu me recuso a ver a SRT morrer assim."
41110-115 = "（A pressão da lama…… meus braços estão dormentes…… não sinto minhas mãos……）"
41110-116 = "（A Saki tem razão…… Talvez lutar contra essa maré seja inútil……）"
41110-117 = "（Mas se eu soltar essa pá…… os meus ideais e a minha SRT morrem comigo hoje……）"
41110-119 = "Eu me recuso…… a aceitar esse fim……!"
41110-127 = "……Sensei?"
41110-128 = "……O que o senhor veio fazer num inferno desses?"
41110-129 = "Como pode ver, a gente não tem tempo para o seu discurso de pena."
41110-130 = "Se a gente não escoar a água agora, a nossa base afunda de vez……"
41110-134 = "[ns] (Pego uma pá em silêncio, desço na lama e entro na trincheira ao lado dela.)"
41110-135 = "Sensei……?"
41110-136 = "Mas…… por que……"
41110-137 = "[s] \"É só puxar a lama grossa desse lado pra água descer, não é?\""
41110-141 = "S-Sim…… por favor."
41110-147 = "Haaah…… Olha como você segura isso, vai quebrar as costas. Me dá essa pá."
41110-152 = "……Caramba. A gente só faz besteira mesmo."
41110-153 = "……Sai do caminho. Eu cavo."
41110-155 = "E assim, lado a lado, juntei forças com o Esquadrão RABBIT para enfrentar a tempestade de frente e reconstruir a drenagem."
41110-159 = "……Finalmente…… a chuva cedeu."
41110-160 = "[s] \"Bom trabalho, esquadrão. Vocês aguentaram firme.\""
41110-164 = "……"
41110-165 = "……Por que o senhor sujou as mãos por nós?"
41110-166 = "Eu repeti incontáveis vezes. Que não íamos abaixar a cabeça. Que não confiávamos no senhor."
41110-167 = "Eu não consigo entender…… O que o senhor ganha sofrendo na lama com a gente?"
41110-168 = "[s] \"Eu não busco ganhar nada de vocês.\""
41110-170 = "[s] \"Eu fiz isso porque sou o professor de vocês.\""
41110-174 = "……É, eu devia imaginar."
41110-175 = "O nosso equipamento virou sucata, mas……"
41110-176 = "Graças ao senhor, o acampamento não foi apagado do mapa."
41110-185 = "Caramba, eu tenho um monte de sapo pra engolir e umas verdades pra jogar na cara da Miyako, mas……"
41110-186 = "O senhor não queria a gente fora desse parque, na Academia Valkyrie?"
41110-187 = "Ajudar a gente agora não traz benefício nenhum pra você…… Você é um imbecil de marca maior, sabia?"
41110-188 = "Ah, Saki, não é novidade pra ninguém que esse cara é um besta. Kukuku……"
41110-189 = "M-Moe-chan…… ele mergulhou na lama pra salvar a gente, não fala assim……"
41110-194 = "Eu sempre bati no peito dizendo que não aceitaríamos a sua caridade…… Mas hoje, você nos salvou. Isso é um fato indiscutível."
41110-195 = "……Do fundo do meu coração. Obrigada, Sensei."
41110-197 = "（Depois disso, com o corpo ensopado e coberto de lama, retornei lentamente para a Schale.）"
41110-198 = "（Acabei ganhando um resfriado forte por causa da chuva, mas saber que elas não perderam a base fez tudo valer a pena……）"
41110-200 = "Próximo Episódio;Uma Fatura Encharcada"