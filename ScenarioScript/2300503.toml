[translation]
2300503-1 = "Corra, Ayane"
2300503-2 = "（Ao chegar na Escola de Ensino Médio Abydos, um caminhão carregado com muito ferro estava prestes a partir）"
2300503-3 = "Muito obrigada como sempre, Ayane-san."
2300503-4 = "Não há de quê, obrigada por vir. Bom trabalho."
2300503-5 = "Com essa quantidade, vai dar um bom valor. Vou levar direto para o centro de processamento, pesar e colocar no alto-forno. Entrarei em contato mais tarde."
2300503-6 = "Certo, contamos com você."
2300503-7 = "Sim, eu que agradeço!"
2300503-11 = "Ah, Sensei."
2300503-12 = "[s] \"O que foi isso...?\""
2300503-13 = "Ah, é o fornecedor que sempre recolhe sucatas e materiais que negociamos. Tirando o custo da viagem, parece que vai render um bom dinheiro."
2300503-14 = "Desculpe por ter vindo até aqui, não é nada muito interessante..."
2300503-15 = "[s] Perguntar onde ela encontrou o ferro."
2300503-16 = "Bem, foi no fundo de um armazém que usávamos como depósito de materiais no canto da escola. Estava coberto por uma lona impermeável, então não tínhamos notado até agora."
2300503-17 = "Parece ter quase 300kg, então mesmo que o preço unitário seja baixo, com certeza..."
2300503-18 = "[s] Ir em direção ao armazém."
2300503-19 = "Eh?"
2300503-20 = "Bem... tem algo que te preocupa?"
2300503-21 = "Ah, é por aqui."
2300503-23 = "（Click）"
2300503-24 = "É aqui, está um pouco sujo, mas..."
2300503-25 = "Estava aqui."
2300503-26 = "[s] Verificar o interior da lona."
2300503-27 = "Isso provavelmente é um ferro comum... espere...?"
2300503-28 = "Tem algo escrito aqui... \"Manuseie com cuidado. Este material é feito de um ferro especial de alto valor, portanto, é necessário cuidado com a umidade e a temperatura. Detalhes...\""
2300503-29 = "...Alto valor?"
2300503-30 = "...Alto valor!?"
2300503-31 = "[s] ........."
2300503-32 = "..."
2300503-33 = "N-não, não pode ser!!"
2300503-37 = "Não dá, o telefone não atende!"
2300503-38 = "O pessoal da loja também não...!"
2300503-39 = "O-o que a gente faz!?"
2300503-40 = "[s1] \"Vamos nos acalmar, Ayane.\"\n[s2] \"Vamos pensar em um método com calma.\""
2300503-41 = "S-sim!"
2300503-42 = "S-sim!"
2300503-43 = "Foque, Ayane... situações desesperadoras são o de sempre...!"
2300503-45 = "...Ufa, certo!"
2300503-46 = "...Primeiro, vamos entender a situação atual!"
2300503-47 = "（...！）"
2300503-48 = "...OK, consegui organizar. Aquele caminhão não vai direto para o centro de processamento, ele deve ser carregado em um trem na estação de carga."
2300503-49 = "Se for colocado no trem de carga, não poderemos mais fazer nada, a missão falhará."
2300503-50 = "E antes disso, assim que ele entrar na rodovia para a estação de carga, não conseguiremos mais segui-lo."
2300503-53 = "（Tec-tec-tec-tec...）"
2300503-54 = "[s] \"E se entrarmos em contato com a estação de carga?\""
2300503-55 = "A estação de carga mais próxima daqui é operada sem funcionários, então não tem ninguém lá para atender o contato."
2300503-56 = "E mesmo que a gente vá para a estação agora, o caminhão chegará antes, então o nosso ponto decisivo não é a estação de carga."
2300503-57 = "[s] \"Então quer dizer que...\""
2300503-60 = "（Tec-tec-tec-tec...）"
2300503-61 = "Precisamos resolver isso antes disso, vamos pensar na rota até lá."
2300503-62 = "Como negociamos com eles há muito tempo, devo ter registrado essas informações em algum lugar..."
2300503-66 = "（Cataploft, cataploft, cataploft...）"
2300503-67 = "……Entendo. Se seguirmos o padrão de sempre, eles deveriam ir para o centro de gerenciamento de materiais de construção pesados no distrito comercial de Abydos."
2300503-68 = "[s] \"Então, se formos até lá...!?\""
2300503-69 = "……Não, isso só seria verdade se eles ainda pudessem carregar mais coisas no caminhão."
2300503-70 = "O caminhão já está carregado com 300kg de carga; não deve haver nada lá que eles consigam carregar além disso."
2300503-71 = "Aquele lugar, literalmente, só lida com materiais de construção pesados."
2300503-72 = "[s] \"Ah, entendo...!\""
2300503-73 = "Mesmo que eles passem por lá, podemos cortar caminho e chegar antes. Assumindo que eles passem direto por lá, o próximo lugar é..."
2300503-74 = "…………."
2300503-75 = "……Aqui, o \"Parque Central de Abydos, Distrito 3\"!"
2300503-76 = "Estão fazendo obras de remoção no parque agora, eles provavelmente vão carregar algumas coisas mais leves lá!"
2300503-77 = "A distância é de cerca de 3km... não é longe!"
2300503-78 = "O tempo estimado de chegada deles é de cerca de 10 minutos..."
2300503-79 = "[s] \"E um táxi ou um carro...?\""
2300503-80 = "Não, o tempo para um táxi chegar é incerto e provavelmente não chegaríamos a tempo."
2300503-81 = "……Eu vou correr."
2300503-82 = "[s] \"O quê!?\""
2300503-84 = "A rota do caminhão é bem longa e tem semáforos. Por outro lado, se eu for sozinha, é possível percorrer 3km em 10 minutos seguindo o caminho mais curto."
2300503-85 = "[s] \"Sério!?\""
2300503-86 = "Sensei, por favor, assuma o comando."
2300503-87 = "[s] \"Eh, o comando?\""
2300503-88 = "Vou reduzir minha carga ao máximo, e não consigo correr na velocidade máxima enquanto olho o mapa. Por favor, me guie pelo caminho."
2300503-89 = "Então, estou indo!!"
2300503-91 = "（Ayane desapareceu como o vento）"
2300503-92 = "（...Não tem jeito, hoje eu serei a operadora com tudo o que tenho）"
2300503-94 = "Sensei, é um cruzamento! Para que lado eu vou!?"
2300503-95 = "[s] \"Di, direita!\""
2300503-96 = "Certo!"
2300503-98 = "Haa, haa...!! Sensei, deveria ser do outro lado, mas não tem uma faixa de pedestres...!"
2300503-99 = "[s] \"Tem uma passarela a 300 metros!\""
2300503-100 = "Passarela, entendido! Ha, ha...!!"
2300503-101 = "……Kyaa!?"
2300503-102 = "（Baque!）"
2300503-103 = "[s] \"O que aconteceu!?\""
2300503-104 = "N-não foi nada! Por favor, continue!"
2300503-107 = "Ha, ha, ha..."
2300503-108 = "Haa... eu deveria ter... haa, haa... me exercitado mais... antes..."
2300503-109 = "Finalmente cheguei... ah, e-espere!! Haa, haa...!"
2300503-110 = "Eh, eh!? Ayane-san!?"
2300503-111 = "P-por que você está aqui!? Aconteceu alguma coisa?"
2300503-112 = "E-espere um pouco, espere, haa, haa... aquele... ferro..."
2300503-113 = "Aquilo... é..."
2300503-114 = "（Baque）"
2300503-115 = "A-Ayane-san!?"
2300503-117 = "（No fim, parece que conseguiram vender aquele ferro por quase o dobro do preço original）"
2300503-118 = "（Ayane, que me contou isso orgulhosa e com um sorriso, estava completamente exausta, mas...）"
