[translation]
2300503-1 = "走れアヤネ"
2300503-2 = "（アビドス高等学校に着くと、ちょうど鉄をたくさん積んだトラックが出発しようとしていた）"
2300503-3 = "いつもありがとうございます、アヤネさん。"
2300503-4 = "いえいえ、来ていただいてありがとうございます、お疲れ様です。"
2300503-5 = "これくらいあれば良い値段になりますね。すぐに処理場に持っていって、測ってから溶鉱炉に入れてきちゃいます。じゃあまた後で連絡しますんで。"
2300503-6 = "では、よろしくお願いします。"
2300503-7 = "はい、こちらこそまたよろしくお願いします！"
2300503-11 = "あっ、先生。"
2300503-12 = "[s] \"今のは……？\""
2300503-13 = "あ、いつも取引してもらっている廃品とか資財とかを回収する業者さんでして。出張費はともかく、それなりの額になりそうです。"
2300503-14 = "すみませんわざわざお越しいただいて、特に面白いものでは……。"
2300503-15 = "[s] どこで見つけた鉄なのかを聞く。"
2300503-16 = "えっと、学校の隅にある資材置き場として使っていた倉庫の奥です。防水の布で覆われていたので、今まで気づかなかったのですが。"
2300503-17 = "ざっと見て300kg近くはあるみたいだったので、単価が安くてもきっと……"
2300503-18 = "[s] その倉庫に向かう。"
2300503-19 = "え？"
2300503-20 = "えっと……何か気になることでもあるんですか？"
2300503-21 = "あ、こっちです。"
2300503-23 = "（ガチャッ）"
2300503-24 = "こちらです、ちょっと汚れていますが……。"
2300503-25 = "ここにありました。"
2300503-26 = "[s] 布の内側を確認する。"
2300503-27 = "それはおそらく普通の……あれ……？"
2300503-28 = "何か書いてありますね……「取扱い注意。この資財は高価な特殊製の鉄のため、湿気や温度には注意が必要。詳細は……」"
2300503-29 = "……高価な？"
2300503-30 = "……高価な！？"
2300503-31 = "[s] …………。"
2300503-32 = "……。"
2300503-33 = "だっ、ダメぇ！！"
2300503-37 = "駄目です、電話繋がりません！"
2300503-38 = "お店の方も同じです……！"
2300503-39 = "ど、どうしましょう！？"
2300503-40 = "[s1] \"落ち着こう、アヤネ。\"\n[s2] \"冷静に何か方法を考えよう。\""
2300503-41 = "は、はい！"
2300503-42 = "は、はい！"
2300503-43 = "しっかりして、アヤネ……追い込まれた状況なんて、いつものこと……！"
2300503-45 = "……ふう、よし！"
2300503-46 = "……まずは、現状の把握を！"
2300503-47 = "（……！）"
2300503-48 = "……OKです、整理できました。あのトラックは直接処理場に行くわけではなく、貨物駅で列車に積み込むはず。"
2300503-49 = "貨物列車に乗せてしまったらもう手出しできません、ミッション失敗です。"
2300503-50 = "それ以前に、貨物駅に向かうハイウェイに乗ってしまった時点でもう追跡は出来ないでしょう。"
2300503-53 = "（カタカタカタカタ……）"
2300503-54 = "[s] \"その貨物駅に連絡をするっていうのは？\""
2300503-55 = "ここから一番近い貨物駅は無人で運用されているので、そこに連絡を受けてくれる人はいないんです。"
2300503-56 = "そして今から貨物駅に向かってもトラックの方が到着が早いですから、私たちの勝負所は貨物駅ではありません。"
2300503-57 = "[s] \"ということは……。\""
2300503-60 = "（カタカタカタカタ……）"
2300503-61 = "その前に勝負をつける必要があります、そこまでの動線を考えましょう。"
2300503-62 = "以前からずっと取引してる方なので、その辺りの情報は記録していたはず……。"
2300503-66 = "（カタカタカタカタ……）"
2300503-67 = "……なるほど、いつもの通りであれば、アビドスの商店街にある大型建築資材管理センターに向かうはずです。"
2300503-68 = "[s] \"じゃあそこに行けば……！？\""
2300503-69 = "……いえ、ですがそれはきっと「まだトラックに積み込みができる場合」でしょう。"
2300503-70 = "今はトラックに300kgの荷物が載せられています、あそこであれ以上載せられるものは無いはず。"
2300503-71 = "あの場所は文字通り、大型建築資材を取り扱う場所ですから。"
2300503-72 = "[s] \"な、なるほど……！\""
2300503-73 = "万が一行ったとしても、その分をショートカットして先回りできます。そこをパスしたと仮定して、その次は……。"
2300503-74 = "…………。"
2300503-75 = "……ここです、「アビドス中央公園第3地区」！"
2300503-76 = "ここの公園では今撤去作業がされてます、ここである程度軽いものを載せるはず！"
2300503-77 = "距離、約3km……遠くありません！"
2300503-78 = "予測される到着時刻まで、約10分……。"
2300503-79 = "[s] \"タクシーとか車とか……！\""
2300503-80 = "いえ、タクシーが来るまでの時間は不確定ですし、おそらく間に合いません。"
2300503-81 = "……走ります。"
2300503-82 = "[s] \"え！？\""
2300503-84 = "トラックの経路はそれなりに遠回りですし、信号もあります。一方で私一人でしたら、最短経路で向かえば3kmを10分はおそらく可能です。"
2300503-85 = "[s] \"うそぉ！？\""
2300503-86 = "先生、指揮をお願いします。"
2300503-87 = "[s] \"え、指揮？\""
2300503-88 = "極力荷物を減らします、それに地図を確認しながらでは全速力で走れません。私に、道を教えてください。"
2300503-89 = "それでは、行ってきます！！"
2300503-91 = "（アヤネが風のように消えてしまった）"
2300503-92 = "（……仕方ない、今日は私が全力でオペレーターをしよう）"
2300503-94 = "先生、十字路です！どの方向ですか！？"
2300503-95 = "[s] \"み、右！\""
2300503-96 = "はい！"
2300503-98 = "はぁ、はぁ……っ！！先生、向こう側のはずなのですがっ、横断歩道がありません……っ！"
2300503-99 = "[s] \"300m先に歩道橋が！\""
2300503-100 = "歩道橋、承知です！はっ、はっ……！！"
2300503-101 = "……きゃっ！？"
2300503-102 = "（バタン！）"
2300503-103 = "[s] \"どうしたの！？\" "
2300503-104 = "な、何でもありません！続けてください！"
2300503-107 = "はっ、はっ、はっ……。"
2300503-108 = "はぁ……普段から、もっと……はぁ、はぁ……運動しておけば、良かった……。"
2300503-109 = "やっと着い……あ、ま、待ってください！！はぁ、はあ……っ！"
2300503-110 = "え、えっ！？アヤネさん！？"
2300503-111 = "ど、どうしてここに！？何かありましたか？"
2300503-112 = "ちょ、ちょっと、待ってくだ、はっ、はぁっ……先ほどの……鉄……。"
2300503-113 = "あれ……は……"
2300503-114 = "（バタンッ）"
2300503-115 = "あ、アヤネさん！？"
2300503-117 = "（結局あの鉄は、元の2倍近い単価で買ってもらうことができたらしい）"
2300503-118 = "（そう誇らしそうに笑顔で話してくれたアヤネは、かなり満身創痍の状態だったけれど……）"
