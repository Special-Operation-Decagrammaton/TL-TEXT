[translation]
62090-1 = "Episódio 9; Apocrypha"
62090-6 = "Realmente existia, não é mesmo...?"
62090-7 = "O que Trinity julgou como um livro falso, sempre desviando o olhar... tentando fazer parecer que nunca existiu――"
62090-8 = "Os [ruby=apocrypha]Livros Apócrifos[/ruby]...!"
62090-10 = "Até quando continuarás sem nos julgar e sem vingar o nosso sangue contra os que habitam na terra?"
62090-11 = "Até quando teremos de ouvir as vozes delas [ruby=escarnecendo]escarnecendo[/ruby] e perguntando: 'Onde está a verdade?'"
62090-12 = "'Vingar o nosso sangue'... É um começo bem impactante."
62090-14 = "Estas são palavras para os escolhidos e para os justos――"
62090-15 = "no tempo da tribulação, quando todos os perversos e irreverentes serão expulsos."
62090-16 = "...Ora? Parece que o conteúdo muda a partir daqui...?"
62090-17 = "...Entendo."
62090-18 = "A história de Arius está registrada lado a lado com as descrições dos apócrifos?"
62090-23 = "Trinity nos declarou excomungados. Mas elas não sabem."
62090-24 = "Que isso, na verdade, é uma excomunhão contra elas mesmas."
62090-25 = "Como podem aqueles que não conseguem acolher as irmãs de dentro, acolher os outros que estão de fora?"
62090-26 = "Elas nos afugentaram para [ruby=esta terra]Nicomédia[/ruby]."
62090-27 = "E é justamente por isso que construiremos os alicerces de Arius nesta terra."
62090-28 = "Nicomédia...?"
62090-29 = "Será que esse era o nome original deste lugar?"
62090-31 = "A primeira vez que Trinity apontou suas armas foi contra nós, de Arius."
62090-32 = "Crianças armadas querem, acima de tudo, testar o próprio poder."
62090-33 = "Arius, tida como heresia, deve ter sido o alvo perfeito."
62090-34 = "...Essa é uma história que nós também conhecemos bem."
62090-35 = "...Ora, voltou para as descrições dos apócrifos de novo?"
62090-37 = "Quando chegar o dia em que os [ruby=sinais]sinais profetizados[/ruby] aparecerem."
62090-38 = "A cidade que agora não se vê――a terra que estava oculta se manifestará."
62090-39 = "A verdade estará com as pessoas, e aqueles que restarem até aquele dia se regozijarão para sempre."
62090-40 = "Isso é... o Apocalipse?"
62090-41 = "...Não, o conteúdo difere um pouco do Apocalipse das escrituras comuns."
62090-42 = "Bem... pensando no significado da palavra 'Apócrifo', talvez isso seja natural."
62090-44 = "O mundo despertará, e aquilo que deve perecer desaparecerá."
62090-45 = "Os justos serão poucos, e os irreverentes serão incontáveis."
62090-46 = "Alegra-te pelos poucos que serão salvos――"
62090-47 = "mas não te entristeças pela multidão que perecerá."
62090-51 = "'Não te entristeças pela multidão que perecerá'..."
62090-52 = "……."
62090-60 = "Pessoal? Aconteceu alguma coisa?"
62090-62 = "A montagem da base foi concluída, então vim relatar!"
62090-64 = "Entendo. Bom trabalho."
62090-66 = "Você descobriu alguma coisa, veterana?"
62090-68 = "Talvez não chegue a ser uma pista definitiva, mas encontrei uma escritura sagrada que estava oculta."
62090-69 = "Provavelmente é algo que nem em Trinity é estudado... Uma escritura exclusiva de Arius."
62090-71 = "Incrível! Tem algo novo escrito nela?"
62090-75 = "Ah, antes disso... Sabe, é que estávamos conversando um pouco entre nós..."
62090-76 = "Talvez não seja a hora certa para falar disso, mas..."
62090-77 = "Como é algo para ser decidido, achamos que a veterana seria a pessoa ideal..."
62090-79 = "...Aconteceu alguma coisa, não foi? Podem falar."
62090-81 = "Sim... Bem..."
62090-82 = "É que... é sobre o nosso grupo..."
62090-83 = "Em termos de quantidade de pessoas, somos mais do que um pelotão e um pouco menos do que uma companhia..."
62090-84 = "Claro que, além de nós, existem outras garotas reunidas em outros lugares, mas..."
62090-85 = "Estávamos conversando que já está na hora de dar um nome para o nosso grupo..."
62090-86 = "Tipo... como o 'Esquadrão Arius'."
62090-87 = "...Só de falar esse nome já me dá uma pontinha de raiva! Mas enfim!"
62090-89 = "Entendo, agora compreendo. Mas falar disso logo agora..."
62090-90 = "……."
62090-91 = "Não. Nomes são importantes."
62090-93 = "Fico feliz que você entenda!"
62090-94 = "Veterana, você tem alguma boa sugestão...?"
62090-99 = "……."
62090-100 = "...Nicomédia."
62090-102 = "Nico... média?"
62090-104 = "Sim. Tropa Nicomédia."
62090-105 = "Este será o nome da afiliação de todas vocês que estão reunidas aqui agora."
62090-107 = "Entendido!"
62090-108 = "Não sei muito bem o significado... mas soa bem legal, eu gostei!"
62090-112 = "Será que vai ficar tudo bem mesmo...? O Sensei ir pessoalmente..."
62090-113 = "[s1] \"Não se trata de ficar tudo bem ou não.\"\n[s2] \"...Eu tenho que ir.\""
62090-116 = "An... Sensei?"
62090-117 = "E se a veterana Subaru..."
62090-118 = "Disser que não consegue te perdoar de jeito nenhum...?"
62090-119 = "O fato de o Sensei ir até Porta Pacis――"
62090-120 = "Não acabaria se tornando... inútil...?"
62090-121 = "[s3] \"Mesmo assim, eu preciso ir.\"\n[s4] \"Mesmo que ela não me perdoe até o fim.\""
62090-126 = "[ns] \"Terminar as coisas sem dizer nada é a única coisa que eu jamais devo fazer.\""
62090-127 = "Isso é... para deixar uma possibilidade aberta para o futuro...?"
62090-128 = "……."
62090-129 = "O Sensei é realmente incrível. Eu também..."
62090-130 = "Eu também..."
62090-131 = "Quero ser como o Sensei. E como a veterana Subaru..."
62090-132 = "Quero me tornar uma pessoa de verdade..."
62090-133 = "Claro, a veterana Subaru em relação a mim..."
62090-134 = "...Ugh."
62090-139 = "Depois de tudo o que aconteceu, você ainda defende a Subaru...?"
62090-140 = "[ruby=Aquela pessoa]A veterana Subaru[/ruby] é desse tipo. Quando você menos espera, ela já fez os outros a seguirem."
62090-141 = "O pior é que ela faz isso sem nem perceber."
62090-142 = "...É verdade."
62090-143 = "E-Ehehe... Eu fico feliz... que a Saori-姉さん esteja aqui conosco..."
62090-144 = "Sim. A Sa-chan é uma ótima líder."
62090-145 = "……."
62090-146 = "Mas acho que a Subaru, do jeito dela, também está se esforçando ao máximo."
62090-147 = "...Você sabe que só isso não é o bastante, não sabe?"
62090-148 = "...Sim. É verdade."
62090-149 = "[s] \"...Ei? Tudo bem? Quer diminuir um pouco o ritmo?\""
62090-150 = "Não, não se preocupe. Desculpe, já vou te alcançar."
62090-151 = "Seria um erro fazer o Sensei parar."
62090-152 = "Não sabemos o que pode acontecer. Vamos pressa."
62090-154 = "(A próxima página é...)"
62090-158 = "A própria ideia de que se pode coexistir com Gehenna é uma heresia."
62090-159 = "Erguendo essa ideologia, elas oprimem e tentam absorver todas as outras denominações."
62090-160 = "Essa Trinity também é uma heresia."
62090-161 = "Ó vós que vos autodenominais gloriosos."
62090-162 = "Ó vós que vos orgulhais de tudo saber."
62090-163 = "A humildade nunca foi uma virtude vossa, desde o princípio."
62090-164 = "[ruby=Vanitas vanitatum et omnia vanitas]Vaidade das vaidades, tudo é vaidade. Não importa quão longe se vá, tudo é absolutamente vão[/ruby]."
62090-165 = "(Registros sobre os governantes de Arius que mudaram repetidas vezes. E inúmeras palavras que pareciam maldições direcionadas a Trinity e Gehenna...)"
62090-166 = "(Já chega disso. É algo que já senti até cansar)"
62090-167 = "(O que preciso agora é saber o que fazer, o que posso fazer. E...)"
62090-168 = "(A descrição sobre aquele anjo...)"
62090-170 = "Os olhos não se fartam de ver, nem os ouvidos se enchem de ouvir."
62090-171 = "O que foi, isso é o que há de ser. #nO que se fez, isso se tornará a fazer."
62090-172 = "Não há nada de novo debaixo do sol."
62090-173 = "[ruby=Vanitas vanitatum et omnia vanitas]Vaidade das vaidades, tudo é vaidade. Não importa quão longe se vá, tudo é absolutamente vão[/ruby]."
62090-176 = "(Mais... um trecho das escrituras...)"
62090-177 = "([ruby=Vanitas vanitatum et omnia vanitas]Vaidade das vaidades, tudo é vaidade. Não importa quão longe se vá, tudo é absolutamente vão[/ruby])"
62090-178 = "(Para ser coincidência, é uma semelhança grande demais...?)"
62090-180 = "Este mundo pertence àqueles que devoram cadáveres. Os que são devorados encontram a morte."
62090-181 = "Porém, a verdade é aquela que nutre a vida. Aqueles que são criados pela verdade jamais conhecerão a morte."
62090-182 = "Por assim dizer, os anjos nada mais são do que símbolos de vós mesmos."
62090-183 = "(Hum...?)"
62090-184 = "(Os anjos são símbolos de nós mesmos...?)"
62090-185 = "(É a primeira vez que vejo essa interpretação...)"
62090-187 = "(O... O que é isso?!)"
62090-196 = "Declaramos aqui a resolução do Concílio."
62090-197 = "Decretamos a excomunhão eterna de Arius a partir de agora."
62090-198 = "―― Em nome das almas sagradas."
62090-199 = "Não havia caminho. Por isso, abrimos passagem à força com as nossas mãos ensanguentadas."
62090-200 = "A luz se afastou de nós, e nos submergimos em meio aos [ruby=lamentos]lamentos[/ruby] que ecoavam."
62090-201 = "Do ponto mais alto dos céus até o lugar mais profundo da terra――"
62090-202 = "[ruby=Elas]Trinity[/ruby] tentou fazer parecer que nós 'nunca existimos'."
62090-203 = "Muitos desapareceram."
62090-204 = "Aqueles que não precisavam sumir, sumiram――"
62090-205 = "E aqueles que não precisavam se odiar, odiaram-se."
62090-206 = "O fim disso tudo é――"
62090-207 = "[ruby=Vanitas vanitatum et omnia vanitas]Vaidade das vaidades, tudo é vaidade. Não importa quão longe se vá, tudo é absolutamente vão[/ruby]."
62090-210 = "……?! Essa voz é……?!"
62090-214 = "O [ruby=agora]presente[/ruby] é uma construção erguida sobre o passado. Todo o passado está conectado com o presente."
62090-215 = "Se no passado―― o Concílio tivesse chegado a uma conclusão minimamente diferente. Se [ruby=nós]Arius[/ruby] não tivéssemos sido expulsos por um motivo como 'uma interpretação diferente'."
62090-216 = "No presente... que tipo de vida [ruby=nós]Arius[/ruby] estaríamos levando?"
62090-217 = "Arius precisava continuar pensando."
62090-221 = "...Quem... é você?"
62090-222 = "[ruby=Nós]Arius[/ruby] somos o que nos restou de――"
62090-228 = "Próximo Episódio; O Ninho"