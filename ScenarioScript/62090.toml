[translation]
62090-1 = "Episódio 9; Apocrypha"
62090-6 = "Realmente, existia mesmo..."
62090-7 = "Algo que a Trinity classificou como apócrifo, sempre desviou o olhar... e tentou fingir que nunca existiu――"
62090-8 = "Apocrypha...!"
62090-10 = "Até quando não farás justiça, nem vingarás o nosso sangue contra os que habitam na terra?"
62090-11 = "Até quando teremos que ouvir as vozes delas zombando: 'Onde está a verdade?'"
62090-12 = "'Vingança de sangue'... é um começo intenso, não é?"
62090-14 = "Estas são palavras para os escolhidos e para os justos, no tempo da tribulação em que todos os ímpios e irreverentes serão banidos――"
62090-15 = "São palavras para os escolhidos e para os justos."
62090-16 = "...Oh? Parece que o conteúdo muda a partir daqui...?"
62090-17 = "...Entendo."
62090-18 = "Junto com as descrições do Apocrypha, a história de Arius também está registrada aqui?"
62090-23 = "A Trinity nos declarou a excomunhão. Mas elas não sabem de uma coisa."
62090-24 = "Que isso é, na verdade, uma excomunhão contra elas mesmas."
62090-25 = "Como pode alguém que não consegue abraçar as irmãs dentro de si, abraçar o outro que está fora?"
62090-26 = "Elas nos expulsaram para Nicomédia."
62090-27 = "Sendo assim, é aqui que construiremos os alicerces de Arius."
62090-28 = "Nicomédia...?"
62090-29 = "Seria esse o nome original deste lugar?"
62090-31 = "O primeiro alvo da Trinity foi nós, de Arius."
62090-32 = "Crianças com armas em mãos, acima de tudo, querem testar seu poder."
62090-33 = "Arius, sendo considerada herética, deve ter sido o alvo perfeito."
62090-34 = "...Essa é uma história que nós também conhecemos bem."
62090-35 = "...Oh, voltamos para as descrições do Apocrypha?"
62090-37 = "Quando chegar o dia em que o sinal profetizado aparecer."
62090-38 = "A cidade que ainda não vemos―― a terra que estava escondida, se manifestará."
62090-39 = "A verdade estará com o povo, e aqueles que permanecerem até aquele dia, regozijar-se-ão eternamente."
62090-40 = "Isso é... o Apocalipse?"
62090-41 = "...Não, o conteúdo é um pouco diferente do Apocalipse das escrituras comuns."
62090-42 = "Bem... considerando o significado da palavra 'Apocrypha', talvez isso seja natural."
62090-44 = "O mundo despertará, e aquilo que deve apodrecer desaparecerá."
62090-45 = "Os justos são poucos, e os irreverentes são incontáveis."
62090-46 = "Tu, embora sintas alegria pelos poucos que serão salvos――"
62090-47 = "Não te entristeças pelos muitos que perecerão."
62090-51 = "'Não te entristeças pelos muitos que perecerão'..."
62090-52 = "..."
62090-60 = "Pessoal? Aconteceu alguma coisa?"
62090-62 = "A montagem do acampamento foi concluída, vim informar!"
62090-64 = "Entendo. Bom trabalho."
62090-66 = "Sênior, você descobriu alguma coisa?"
62090-68 = "Talvez não chegue a ser uma pista, mas encontrei escrituras que estavam escondidas."
62090-69 = "Provavelmente são escrituras exclusivas de Arius... que nem a Trinity manuseia."
62090-71 = "Incrível! Tem algo novo escrito nelas?"
62090-75 = "Ah, antes disso... #nBem, tem uma coisa que estávamos conversando..."
62090-76 = "Talvez não seja o momento certo para dizer..."
62090-77 = "Mas, se é para decidir, você é a pessoa mais indicada, Sênior..."
62090-79 = "...Aconteceu alguma coisa, não é? #nPor favor, pode falar."
62090-81 = "Sim... bem..."
62090-82 = "É que... sobre nós..."
62090-83 = "Em termos de número de pessoas reunidas, somos mais que um pelotão, mas um pouco menos que uma companhia..."
62090-84 = "Claro, além daqui, existem outras garotas reunidas em outros lugares, mas..."
62090-85 = "Começamos a conversar sobre como talvez precisemos de um nome para o nosso grupo..."
62090-86 = "Tipo... como o 'Esquadrão Arius'."
62090-87 = "Digo... só de falar esse nome já me dá um pouco de raiva! Mas enfim!"
62090-89 = "Entendo, compreendi a situação. #nMas, agora, isso..."
62090-90 = "..."
62090-91 = "Não. Um nome é importante, sim."
62090-93 = "Fico feliz que tenha entendido!"
62090-94 = "Senpai, você tem alguma boa sugestão...?"
62090-99 = "..."
62090-100 = "...Nicomedia."
62090-102 = "Nico...media?"
62090-104 = "Sim. Tropa Nicomedia."
62090-105 = "Vamos usar esse nome para todas vocês que estão reunidas aqui agora."
62090-107 = "Entendido!"
62090-108 = "Não entendo muito bem o significado, mas... soa legal e eu gostei!"
62090-112 = "Será que é realmente seguro...? #nO Sensei ir pessoalmente..."
62090-113 = "[s1] \"Não é uma questão de ser seguro ou não.\"\n[s2] \"...Eu preciso ir.\""
62090-116 = "Ei... Sensei?"
62090-117 = "Se a Subaru-senpai nos..."
62090-118 = "Se ela disser que não consegue perdoar o Sensei de jeito nenhum..."
62090-119 = "O fato de o Sensei ir até Porta Pacis..."
62090-120 = "Não acabaria sendo... inútil...?"
62090-121 = "[s3] \"Mesmo assim, eu preciso ir.\"\n[s4] \"Mesmo que eu não seja perdoado até o fim.\""
62090-126 = "[ns] \"O que eu não posso fazer de jeito nenhum é terminar sem dizer nada.\""
62090-127 = "Então é por isso... para deixar uma possibilidade para o futuro...?"
62090-128 = "..."
62090-129 = "O Sensei é realmente incrível. Eu também..."
62090-130 = "Eu também..."
62090-131 = "Como o Sensei. E como a Subaru-senpai..."
62090-132 = "Quero me tornar uma pessoa decente..."
62090-133 = "Claro, a Subaru-senpai me..."
62090-134 = "...Uu."
62090-139 = "Depois de tudo o que aconteceu, você ainda vai defender a Subaru..."
62090-140 = "A Subaru-senpai é desse tipo, não é? Antes que percebamos, ela faz os outros a seguirem."
62090-141 = "O problema é que ela não tem consciência de que está fazendo isso."
62090-142 = "...É verdade."
62090-143 = "E-hehe... Eu fico feliz... por ter a Saori-nee-san por perto..."
62090-144 = "Sim. A Sa-chan é uma boa líder."
62090-145 = "..."
62090-146 = "Mas acho que a Subaru também está se esforçando do jeito dela."
62090-147 = "...Você sabe que só isso não é o suficiente, não sabe?"
62090-148 = "...Sim. É verdade."
62090-149 = "[s] \"...Ei? Tudo bem? Quer que eu diminua o ritmo?\""
62090-150 = "Não, não se preocupe. Desculpe, vou alcançar vocês logo."
62090-151 = "Não quero atrasar o Sensei."
62090-152 = "Não sabemos o que pode acontecer. Vamos seguir em frente."
62090-154 = "(A próxima página é...)"
62090-158 = "A própria ideologia de que é possível coexistir com Gehenna é uma heresia."
62090-159 = "Defendendo essa ideologia, eles oprimem e tentam absorver todas as outras seitas."
62090-160 = "Essa Trinity também é uma heresia."
62090-161 = "Aqueles que se autoproclamam na glória."
62090-162 = "Aqueles que se orgulham de saber tudo."
62090-163 = "A humildade nunca foi uma virtude de vocês, desde o início."
62090-164 = "Tudo é vaidade. Não importa o quão longe você vá, tudo é apenas vaidade."
62090-165 = "（Registros sobre as camadas dominantes de Arius que mudaram repetidamente. E, inúmeras palavras que soam como maldições contra Trinity e Gehenna...）"
62090-166 = "（Já chega disso. É algo que senti até não aguentar mais.）"
62090-167 = "（O que é necessário agora é o que deve ser feito, o que pode ser feito. E...）"
62090-168 = "（A descrição sobre aquele anjo...）"
62090-170 = "O olho não se farta de ver, nem o ouvido se enche de ouvir."
62090-171 = "O que aconteceu antes, acontecerá novamente. #nO que foi feito antes, será feito novamente."
62090-172 = "Debaixo do sol, não há nada de novo."
62090-173 = "Tudo é vaidade. Não importa o quão longe você vá, tudo é apenas vaidade."
62090-176 = "（De novo... um trecho das escrituras...）"
62090-177 = "（Tudo é vaidade. Não importa o quão longe você vá, tudo é apenas vaidade.）"
62090-178 = "（Para ser uma coincidência, não está coincidindo demais...?）"
62090-180 = "Este mundo é aquele que devora cadáveres. Aquele que é devorado, ou seja, chega à morte."
62090-181 = "No entanto, a verdade é aquela que nutre a vida. Aquele que é nutrido pela verdade não chegará à morte."
62090-182 = "Em outras palavras, o anjo não passa de uma existência que simboliza vocês mesmos."
62090-183 = "（Hm...?）"
62090-184 = "（O anjo é um símbolo de nós...?）"
62090-185 = "（Parece que é a primeira vez que vejo essa interpretação...）"
62090-187 = "（O quê... o quê!?）"
62090-196 = "Declaro aqui a resolução do Concílio."
62090-197 = "A partir de agora, sentencio Arius à excomunhão eterna."
62090-198 = "――Em nome da alma sagrada."
62090-199 = "Não havia caminho. Por isso, com nossas mãos feridas, abrimos o caminho à frente."
62090-200 = "A luz nos deixou, e nos afundamos em meio ao lamento que ecoava."
62090-201 = "Do lugar mais alto do céu, até o lugar mais baixo da terra――"
62090-202 = "Trinity tentou fazer com que nós \"nunca tivéssemos existido\"."
62090-203 = "Muitos desapareceram."
62090-204 = "Aqueles que não precisavam desaparecer, desapareceram――"
62090-205 = "Aqueles que não precisavam se odiar, odiaram-se."
62090-206 = "O fim disso foi――"
62090-207 = "Tudo é vaidade. Não importa o quão longe você vá, tudo é apenas vaidade."
62090-210 = "……!? Essa voz é...!?"
62090-214 = "O presente é uma construção baseada no passado. Todo passado não é irrelevante ao presente."
62090-215 = "Se no passado―― se uma conclusão diferente tivesse sido tomada no Concílio. Se Arius não tivesse sido banido por causa de uma \"interpretação diferente\"."
62090-216 = "No presente... como Arius estaria vivendo?"
62090-217 = "Arius teve que continuar pensando."
62090-221 = "……Você é... quem?"
62090-222 = "Arius é o que restou para nós――"
62090-228 = "Próximo episódio: Ninho"
