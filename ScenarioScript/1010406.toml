[translation]
1010406-1 = "主体と客体"
1010406-2 = "シャーレ・オフィス"
1010406-5 = "[ns] \"レイジョ、ごめん！\""
1010406-6 = "どうされましたか、先生？"
1010406-7 = "[s] \"それが、その……。\""
1010406-8 = "……なるほど、急に外回りの仕事が入ったのですね。"
1010406-9 = "せっかく来てくれたのに、置き去りにするのが申し訳ない、と。"
1010406-10 = "分かりました。"
1010406-11 = "でしたら、私も一緒に行きましょう。"
1010406-12 = "[s] \"良いの……？\""
1010406-13 = "もちろんです。"
1010406-14 = "今日の私は、シャーレ当番ですから。"
1010406-15 = "先生の仕事を手伝うのは、当たり前でしょう。"
1010406-16 = "それでは……。"
1010406-17 = "今日一日、先生の護衛はお任せください。"
1010406-29 = "[ns] \"やっと終わった……。\""
1010406-30 = "お疲れ様でした、先生。"
1010406-31 = "シャーレの仕事は、本当に様々なのですね。"
1010406-32 = "……なるほど。"
1010406-33 = "どれだけ忙しくても、生徒のために頑張る、と……。"
1010406-34 = "……先生は、武道についてどう思っていますか？"
1010406-35 = "急な話で困惑させてしまい、申し訳ありません。"
1010406-36 = "ですが、私はこう思うのです。#n武道とは、自分を見つめ直すためのものだと。"
1010406-37 = "体を鍛えることで、精神的にも成長できるはずですから。"
1010406-38 = "[s] \"そうだね。\""
1010406-39 = "そして、武道に身を置く一人として……。"
1010406-40 = "強き者は弱き者を守り、使命を果たす必要があると思います。"
1010406-41 = "これは，玄龍門が掲げている義と侠に通じているかもしれませんね。"
1010406-42 = "[s] \"たしかに……。\""
1010406-43 = "ですから……。"
1010406-44 = "先生には、私を守る義務があります。"
1010406-45 = "[s] \"たしかに……って、なんで！？\""
1010406-46 = "先生は、大人でもあり教育者でもありますから。"
1010406-47 = "どれだけ忙しくても、生徒のために頑張ると言っていましたし。"
1010406-48 = "[s1] \"それは、その……！\"\n[s2] \"もちろん、放ってはおけないけど……！"
1010406-51 = "そう言ってくださると思っていました。"
1010406-52 = "では、今日一日、先生に守っていただきましょう。"
1010406-54 = "……あん？#nお前、プルプル派の連中だろ？"
1010406-59 = "誰かと思ったら、プニプニ派じゃねぇか！#nなんか文句あんのか？"
1010406-60 = "なんも言ってねーだろ、あぁ！？"
1010406-61 = "そっちが最初に突っかかってきたんだろうが！#nぐだぐだプニプニうるせえなぁ！！"
1010406-67 = "先生……！"
1010406-68 = "[s3] \"こういう時は……！\"\n[s4] \"とりあえず、逃げよう！\""
1010406-73 = "先生の判断のおかげで、何とか巻き込まれずに済みましたね。"
1010406-78 = "どんどん激しくなっているようですが……。"
1010406-79 = "……先生。"
1010406-80 = "私を守ってくれるのではなかったのですか？"
1010406-81 = "[s] \"よく聞いて、レイジョ――\""
1010406-82 = "……なるほど。"
1010406-83 = "必ずしも守る方法はひとつではない、と。"
1010406-84 = "水の流れに逆らわず、待つことも大事なのですね。"
1010406-85 = "これが、先生の強さ……。"
1010406-86 = "……よく分かりました。"
1010406-87 = "私も、ここは流れに身を任せてみようと思います。"
1010406-92 = "[ns] \"れ、レイジョ！？\""
1010406-93 = "どうしましたか、先生？"
1010406-94 = "こうして体をくっつけていたほうが、#n見つかる可能性を下げられるかと。"
1010406-95 = "[s] \"それは、そうなんだけど……。\""
1010406-96 = "でしょう？"
1010406-97 = "……落ち着いてきましたね。"
1010406-98 = "何だか、先生に守られている実感が湧いてきました。"
1010406-105 = "……まだ辺りは騒がしいですが。"
1010406-106 = "先生と一緒だからでしょうか。"
1010406-107 = "こういう時間も、悪くありません。"
1010406-110 = "（銃撃戦は、その後も続いたが……）"
1010406-111 = "（しばらくしてヴァルキューレ警察学校がやって来ると、事態は収束した）"
1010406-113 = "もう、こんな時間になってしまいましたね……。"
1010406-114 = "[s] \"仕事は終わってるから安心して。\""
1010406-115 = "ですが……。"
1010406-116 = "申し訳ありません、先生。"
1010406-117 = "私がワガママを言ったせいで……。"
1010406-118 = "……先生の時間を奪ってしまいました。"
1010406-119 = "ただ、一度くらい守られる側になってみたかったのです。"
1010406-120 = "[s] \"大丈夫だよ、レイジョ。\""
1010406-121 = "しかし……。"
1010406-122 = "[s5] \"今日は、まだ終わってないから！\"\n[s6] \"山海経に着くまで守ってあげる！\""
1010406-125 = "……。"
1010406-126 = "そうですね……。"
1010406-127 = "では、お言葉に甘えて……。"
1010406-133 = "（突然、体を寄せてきたレイジョに戸惑っていると……）"
1010406-134 = "（遠慮がちに体重を預けながら、腕を絡めてきた）"
1010406-137 = "[ns] \"れ、レイジョ？\""
1010406-138 = "先生……？"
1010406-139 = "私を守ってくれるのではありませんでしたか？"
1010406-140 = "……今日が終わるまでは。"
1010406-142 = "（この日の帰り道は……）"
1010406-143 = "（なぜか、いつもより長く感じた）"
