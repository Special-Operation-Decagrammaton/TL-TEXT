1010406-81 = "[s]\"Ouça-me com atenção, Rayjo... ᥉\"\"\n1010406-82 = \"...... Entendo.\"\n1010406-83 = \"Nem sempre há uma única maneira de protegê-la, disse ele.\"\n1010406-84 = \"É importante esperar e não ir contra o fluxo da água.\"\n1010406-85 = \"Essa é a força do sensei. ......\"\n1010406-86 = \"...... bem compreendido.\"\n1010406-87 = \"Também tentarei seguir o fluxo aqui.\"\n1010406-92 = \"[ns] \"Re, Reijo! \"\"\n1010406-93 = \"O que há de errado, doutor?\"\n1010406-94 = \"Achei que seria melhor manter o corpo preso dessa forma para reduzir as chances de ser encontrado.\"\n1010406-95 = \"[s]\"É, mas ....... \"\"\n1010406-96 = \"Certo?\"\n1010406-97 = \"...... se acalmou.\"\n1010406-98 = \"Eu meio que me senti protegido pelo sensei.\"\n1010406-105 = \"...... Ainda há muito barulho por aqui.\"\n1010406-106 = \"É porque você está com um sensei?\"\n1010406-107 = \"Esses tempos não são ruins.\"\n1010406-110 = \"(O tiroteio continuou depois disso, ......)\"\n1010406-111 = \"(As coisas chegaram a um ponto crítico quando a Academia de Polícia Valkyrie chegou pouco tempo depois).\"\n1010406-113 = \"Já é esta hora do dia. ......\"\n1010406-114 = \"[\"Não se preocupe, o trabalho está feito. \"\"\n1010406-115 = \"Mas veja .......\"\n1010406-116 = \"Desculpe, senhor.\"\n1010406-117 = \"Por causa de meu egoísmo. ......\"\n1010406-118 = \"O site ...... tomou muito tempo do sensei.\"\n1010406-119 = \"Eu só queria estar do lado da proteção, pelo menos uma vez.\"\n1010406-120 = \"[\"Está tudo bem, Rayjo. \""

