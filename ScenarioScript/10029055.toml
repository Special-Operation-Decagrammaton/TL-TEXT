[translation]
10029055-5 = "結構な数ね……！#n前にあなたが来た時は、これを1人で相手してたの！？"
10029055-6 = "ううん、あの時よりも多い。#n押し切れるとは思うけど、こんなところで時間を使いたくはないかも。"
10029055-7 = "どうにかして、突破口を開ければ……"
10029055-8 = "……突破口、か。"
10029055-9 = "……！！"
10029055-10 = "なるほど！まさに今がチャンスですね！！"
10029055-11 = "[ruby=みこと]美琴[/ruby]さん！私たちが作ったレールガンの準備を！！"
10029055-12 = "……ええっ、本当にやるの！？"
10029055-13 = "そろそろ十分な電力がたまってるはずだよ。#n銃をレールガン発射モードに切り替えてみて。"
10029055-15 = "誰もが一度は憧れる携帯型レールガン……#nこれこそ、エンジニア部の……いや、みんなの夢だ！"
10029055-16 = "ついに、この目で見られるのですね！！"
10029055-17 = "あはは……えらく期待されてますね、[ruby=みさか]御坂[/ruby]さん。"
10029055-18 = "……わ、分かったわよ！#nここでモードを変更するのね？"
10029055-19 = "えっと……こうして、と。"
10029055-20 = "急いで、かなり集まってきたよ。"
10029055-21 = "分かってるわ……"
10029055-25 = "……よし。"
10029055-26 = "モード変更完了！"
10029055-28 = "レ～！"
10029055-30 = "ル～！！"
10029055-32 = "ガン！！！"
10029055-36 = "[ns] \"……発射！！！\""
10029055-41 = "…………？"
10029055-42 = "……あれ？"
10029055-43 = "……むむ？"
10029055-44 = "ん……？"
10029055-45 = "発射された……のか？"
10029055-47 = "……御坂さん、本当に撃ったのよね？"
10029055-48 = "一応、何か発射したような気はするけど……#nなんて言うか、虫の音みたいなのが。"
10029055-49 = "ふふっ、こういう御坂さんも可愛いですね。"
10029055-50 = "[ruby=しらい]白井[/ruby]さんが見たら、どんな反応したんでしょう？"
10029055-54 = "……来るよ。"
10029055-55 = "時間をかけてたら、どんどん敵が増え続ける。"
10029055-56 = "この道は諦めて、ルートBに切り替えないと。"
10029055-57 = "…………。"
10029055-58 = "……ったく、仕方ないわね。"
10029055-62 = "[ns1] \"御坂、何を……？\"\n[ns2] \"そのコインで何をするの？\""
10029055-65 = "要するに、あのロボットをまとめてブッ飛ばせば良いんでしょ？"
10029055-66 = "……みんな、後ろに下がって。#n本調子とは言えないけど……"
10029055-67 = "一発くらいなら、撃てる気がするから。"
10029055-68 = "……？"
10029055-69 = "一発って、何を？"
10029055-73 = "……！！"
10029055-74 = "みなさーん！下がってくださいねー！#n近くにいると危険ですよー！はい、下がって下がってー！"
10029055-75 = "……？わ、分かった。"
10029055-76 = "な、何ですか！？急に空気が変わりましたよ！"
10029055-77 = "重機を扱うような緊張感だね。"
10029055-79 = "まぁ、そうねぇ。"
10029055-80 = "……あながち間違いじゃないと思うわぁ。"
10029055-82 = "……失敗の埋め合わせは！"
10029055-87 = "……これでッ！！！"
10029055-91 = "……ふう。"
10029055-92 = "うっ……"
10029055-93 = "ここじゃ、そう何度も撃てそうにないわね。#nこんなに頭が重くなるなんて……"
10029055-100 = "[ns] \"…………。\""
10029055-102 = "[ns3] \"今のが……。\"\n[ns4] \"レール、ガン……？\""
10029055-108 = "やっぱり初めて見ると、そういう反応になりますよね。"
10029055-109 = "あたしは未だにビックリしますけど……あはは。"
10029055-110 = "はぁ……相変わらず派手ねぇ、あなたの能力。"
10029055-111 = "……先生？皆さん？"
10029055-112 = "あ、あの～……"
10029055-117 = "…………。"
10029055-118 = "……………………。"
10029055-120 = "……銃を使わずに、レールガンを……撃った……？"
10029055-121 = "言葉のあやなどではなく……本当に、その手でレールガンを？"
10029055-122 = "これが……「超能力者」……！"
10029055-123 = "なるほど、だから「レールガン」……！"
10029055-124 = "……！？"
10029055-125 = "な、何？どうしちゃったの、みんな！？"
10029055-126 = "すごいです……！どういう仕組みになっているのでしょう？#n手のどこかに発電器官があるのでしょうか……"
10029055-127 = "コトリ、原理を究明したい気持ちは分かるが、そういった質問の仕方は失礼だよ。"
10029055-128 = "その……もしよろしければ、もう一度見せてもらえないだろうか？"
10029055-129 = "え、も、もっかい？"
10029055-130 = "あんまり何度も撃つものじゃないんだけど……"
10029055-131 = "ああ、すまない……配慮が足りなかったね。"
10029055-132 = "コインを使うのだろう？#n頼んでいるというのに用意もなく申し訳ない。"
10029055-133 = "ヒビキ、小銭を貸してくれないかい？あいにく私は今持ち合わせがなくて……。"
10029055-135 = "……え？"
10029055-136 = "10円玉しかないけど大丈夫……？"
10029055-137 = "小銭の大きさや値段によって威力が変わる可能性もある……#n色々な種類で試したいところだが……"
10029055-138 = "……ま、待って！なんでそういう話になるの！？"
10029055-139 = "というか、そういう問題じゃなくて……！"
10029055-141 = "むむっ！ウタハ先輩！私のポケットに500円玉が入ってました！"
10029055-142 = "……！！コトリ、それは流石に……！"
10029055-143 = "あの……私の話、聞いてる……？"
10029055-144 = "私が使ってるのは、お金じゃなくてゲーセンのメダルなんだけど……？"
10029055-145 = "小銭を出さないで……！もったいないでしょ！"
10029055-146 = "[s5] \"探究心が旺盛なんだよ。\"\n[s6] \"みんな、超能力が見れて嬉しいんだと思う。\""
10029055-150 = "御坂さんの話、聞こえてないみたいですね……？"
10029055-151 = "よかったわねぇ、御坂さん。異世界でもすぐお友達ができてぇ。"
10029055-153 = "何もよくないわよ！！"
10029055-154 = "お願いコトリの夕飯代のコレで……もう一度やってくれないかな。#n私の10円玉も、一緒に……！"
10029055-155 = "どうか、お願いします！"
10029055-156 = "受け取ってくれ、私たちの500円を！"
10029055-157 = "いや、510円。"
10029055-158 = "……510円を！"
10029055-160 = "いや、ちょっと……。"
10029055-164 = "……！"
10029055-165 = "……はぁ。"
10029055-166 = "今回だけよ！#n使わせてもらうわね500……"
10029055-170 = "……510円。"
10029055-171 = "……次からは、こういうのナシだからね。"
