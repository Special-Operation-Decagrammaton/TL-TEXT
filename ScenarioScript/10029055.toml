[translation]
10029055-5 = "Tem uma quantidade considerável aqui...!#nQuando você veio aqui antes, você enfrentou tudo isso sozinha!?"
10029055-6 = "Não, tem mais do que naquela vez.#nAcho que consigo passar, mas não quero perder tempo aqui."
10029055-7 = "Se ao menos conseguíssemos abrir uma brecha..."
10029055-8 = "……Uma brecha, é?"
10029055-9 = "……！！"
10029055-10 = "Entendi! É exatamente agora a nossa chance!!"
10029055-11 = "Mikoto-san! Prepare o canhão elétrico que nós fizemos!!"
10029055-12 = "……Ei, você vai fazer isso mesmo!?"
10029055-13 = "Já deve ter energia suficiente acumulada.#nTente mudar a arma para o modo de disparo de canhão elétrico."
10029055-15 = "Um canhão elétrico portátil que todos sonham em ter um dia...#nIsso é o sonho do Clube de Engenharia... não, de todos!"
10029055-16 = "Finalmente vou poder ver isso com meus próprios olhos!!"
10029055-17 = "Ahaha... Estão depositando muita expectativa em você, Misaka-san."
10029055-18 = "……Tá, tá bom, eu entendi!#nÉ aqui que muda o modo, né?"
10029055-19 = "Bem... é assim, né."
10029055-20 = "Depressa, eles estão se acumulando bastante."
10029055-21 = "Eu sei..."
10029055-25 = "……Certo."
10029055-26 = "Mudança de modo concluída!"
10029055-28 = "RAIL~!"
10029055-30 = "GUN~!!"
10029055-32 = "!!!"
10029055-36 = "[ns] \"……Fogo!!!\""
10029055-41 = "…………?"
10029055-42 = "……Ué?"
10029055-43 = "……Hmm?"
10029055-44 = "Hum...?"
10029055-45 = "Será que... disparou?"
10029055-47 = "……Misaka-san, você disparou mesmo?"
10029055-48 = "Eu sinto que disparei alguma coisa...#nMas, como posso dizer, pareceu o som de um inseto."
10029055-49 = "Fufu, a Misaka-san desse jeito também é fofa."
10029055-50 = "Como será que a Shirai-san reagiria se visse isso?"
10029055-54 = "……Eles estão vindo."
10029055-55 = "Se perdermos tempo, os inimigos vão continuar aumentando."
10029055-56 = "Temos que desistir deste caminho e mudar para a rota B."
10029055-57 = "…………."
10029055-58 = "……Ai, não tem jeito, né."
10029055-62 = "[ns1] \"Misaka, o que você está...?\"\n[ns2] \"O que vai fazer com essa moeda?\""
10029055-65 = "Resumindo, é só mandar todos aqueles robôs pelos ares, certo?"
10029055-66 = "……Pessoal, recuem.#nNão posso dizer que estou no meu melhor, mas..."
10029055-67 = "Sinto que consigo disparar pelo menos uma vez."
10029055-68 = "……?"
10029055-69 = "Uma vez, o quê?"
10029055-73 = "……！！"
10029055-74 = "Pessoal! Por favor, recuem!#nÉ perigoso ficar perto! Vamos, recuando, recuando!"
10029055-75 = "……? Tá, entendi."
10029055-76 = "O-o que foi!? O clima mudou de repente!"
10029055-77 = "É uma tensão parecida com a de manusear maquinário pesado."
10029055-79 = "Bem, é verdade."
10029055-80 = "……Acho que você não está errada."
10029055-82 = "……Para compensar a falha!"
10029055-87 = "……É agora!!!"
10029055-91 = "……Ufa."
10029055-92 = "Ugh……"
10029055-93 = "Não parece que vou conseguir disparar muitas vezes aqui. Minha cabeça está ficando tão pesada……"
10029055-100 = "[ns] \"…………。\""
10029055-102 = "[ns3] \"O que foi aquilo……。\"\n[ns4] \"Um railgun……?\""
10029055-108 = "É uma reação comum quando se vê pela primeira vez."
10029055-109 = "Eu ainda fico surpresa, na verdade…… ahaha."
10029055-110 = "Haa…… como sempre, sua habilidade é bem chamativa."
10029055-111 = "……Sensei? Pessoal?"
10029055-112 = "Ei, com licença……"
10029055-117 = "…………。"
10029055-118 = "……………………。"
10029055-120 = "……Você disparou um railgun…… sem usar uma arma……?"
10029055-121 = "Não foi apenas uma força de expressão…… você realmente disparou um railgun com as próprias mãos?"
10029055-122 = "Isso é…… uma \"superpoderosa\"……!"
10029055-123 = "Entendi, por isso o nome \"Railgun\"……!"
10029055-124 = "……!?"
10029055-125 = "Q-quê? O que deu em vocês, pessoal!?"
10029055-126 = "É incrível……! Como funciona? Será que você tem algum órgão gerador de eletricidade em algum lugar da mão……"
10029055-127 = "Kotori, eu entendo sua vontade de investigar o princípio, mas esse tipo de pergunta é falta de educação."
10029055-128 = "Dito isso…… se não for pedir muito, você poderia nos mostrar mais uma vez?"
10029055-129 = "Hã, d-de novo?"
10029055-130 = "Não é algo que eu deva disparar tantas vezes assim……"
10029055-131 = "Ah, me desculpe…… não fui atenciosa o suficiente."
10029055-132 = "Você usa uma moeda, não é? Sinto muito por pedir sem nem ter uma preparada."
10029055-133 = "Hibiki, você poderia me emprestar umas moedas? Infelizmente, não tenho nenhuma comigo agora……"
10029055-135 = "……Hã?"
10029055-136 = "Eu só tenho uma moeda de 10 ienes, tudo bem……?"
10029055-137 = "A potência pode mudar dependendo do tamanho ou do valor da moeda…… eu adoraria testar com vários tipos……"
10029055-138 = "……E-espera! Por que a conversa chegou nesse ponto!?"
10029055-139 = "Quer dizer, não é esse o problema……!"
10029055-141 = "Opa! Utaha-senpai! Tinha uma moeda de 500 ienes no meu bolso!"
10029055-142 = "……!! Kotori, isso já é demais……!"
10029055-143 = "Ei…… vocês estão me ouvindo……?"
10029055-144 = "O que eu uso não é dinheiro de verdade, são fichas de fliperama, sabia……?"
10029055-145 = "Não gastem moedas……! É um desperdício!"
10029055-146 = "[s5] \"Elas são muito curiosas.\"\n[s6] \"Acho que todos estão felizes por ver um superpoder de verdade.\""
10029055-150 = "Parece que elas não estão ouvindo o que você diz, Misaka-san……"
10029055-151 = "Que bom para você, Misaka-san. Conseguiu fazer amigos rápido até em outro mundo."
10029055-153 = "Não tem nada de bom nisso!!"
10029055-154 = "Por favor, use esse dinheiro que seria para o jantar da Kotori…… e faça de novo. Minha moeda de 10 ienes também……!"
10029055-155 = "Por favor, eu imploro!"
10029055-156 = "Aceite, aqui estão nossos 500 ienes!"
10029055-157 = "Não, 510 ienes."
10029055-158 = "……510 ienes!"
10029055-160 = "Não, espera aí……"
10029055-164 = "……!"
10029055-165 = "……Haa."
10029055-166 = "Só desta vez, hein! Vou usar esses 500……"
10029055-170 = "……510 ienes."
10029055-171 = "……Da próxima vez, nada disso, entendeu?"
