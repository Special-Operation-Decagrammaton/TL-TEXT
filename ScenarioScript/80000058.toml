[translation]
80000058-1 = "悩んだ末に"
80000058-2 = "（公園に向かうと、ブランコに座ってそわそわしているアイリの姿が見えた）"
80000058-3 = "……。"
80000058-9 = "せ、先生！？いつからそこに……！？"
80000058-10 = "さ、さっきですか？そうでしたか……すみません、ちょっと考えこんじゃってまして……えへへ……。"
80000058-11 = "きょ、今日はその、もしかしたらご存じかと思いますが……。"
80000058-12 = "あ、いえ、先生はお忙しいですし、分かっててほしいと思っているわけではないのですが……。"
80000058-13 = "あ、えっと、それだともしかしてこれは、ご迷惑なのでは……！？"
80000058-14 = "[s1] \"何となくは分かってるかも。\"\n[s2] \"私の自惚れじゃなければ、バレンタインデーだから、とか？\""
80000058-15 = "……！"
80000058-16 = "……！"
80000058-17 = "は、はい、そうです……。"
80000058-18 = "えっと……。"
80000058-22 = "分かってても緊張しちゃいますね……ど、どうぞっ！"
80000058-28 = "[ns3] \"……。\"\n[ns4] （やっぱりいつものフレーバーだ！）"
80000058-29 = "……。"
80000058-30 = "……。"
80000058-31 = "せ、先生？その……？"
80000058-32 = "……え？"
80000058-33 = "チョコミント……？"
80000058-34 = "や、やっぱりダメでしたか！？すみません、実は自分でも迷ったのですが……！"
80000058-35 = "何だかラインナップを見てグルグル悩んでいる内に、結局戻ってきたと言いますか……。"
80000058-36 = "すみません、上手く説明できないのですが……あはは……。"
80000058-37 = "何だか一周回って、いつも通りになっちゃった感じですね……。"
80000058-38 = "[s5] \"色々考えてくれたんだね、ありがとう。\"\n[s6] \"ううん、嬉しいよ。\""
80000058-39 = "……！"
80000058-40 = "……！"
80000058-41 = "あ、ありがとうございます……！"
80000058-42 = "……あ、その。"
80000058-43 = "実はこれ、普通のチョコミントでは無いんです。"
80000058-44 = "見ての通りチョコレートとミントの比率も斬新ですし、普通は使わないようなペニーロイヤルを上手く使っていて……！"
80000058-45 = "……そのお顔、もしかして分からない感じです？"
80000058-46 = "ちゃ、ちゃんと見てください！全然違うんですよ……！"
80000058-47 = "これはペニーロイヤルという普通なら食べられないミントでして、それを特殊な製法によって……！"
80000058-48 = "……"
80000058-52 = "……ね、すごいと思いません？"
80000058-53 = "[s] \"……\""
80000058-55 = "（申し訳ないことにあまり理解はできなかったものの、美味しく頂いた）"
