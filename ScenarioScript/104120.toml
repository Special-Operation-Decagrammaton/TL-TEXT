[translation]
104120-1 = "第12話;後日談（２）"
104120-5 = "……"
104120-6 = "そうか。これで物語は幕切れ、と――"
104120-7 = "自らを「主人公ではない」と告げ、私の予測を裏切り――ジャンルまでも戻した。"
104120-8 = "そういうこったぁ！！"
104120-9 = "嗚呼……最後に見せかけて、物語を、観客を――#n私の目を欺いたのだな…… "
104120-10 = "だが、そんな俯瞰的な介入が、いつまでも続くと思うなよ――先生。"
104120-11 = "物語は続くべきである――"
104120-12 = "そういうこったぁ！！"
104120-13 = "これは、新しい局面を迎えるための幕間――幕を引かれた物語は、新たな舞台へと続いていく。"
104120-14 = "嗚呼、そのために――ゲマトリアに[ruby=・   ・]変化[/ruby]をもたらさなくては。"
104120-15 = "[ruby=われわれ]ゲマトリア[/ruby]から追放され――埋もれてしまった封印されし旧友……あの者を訪ねるとしよう。 "
104120-16 = "見ているがいい……黒服。#nお前が成し遂げられなかった事を、この私が全うしてみせようぞ。"
104120-24 = "むにゃ……。"
104120-29 = "……。"
104120-30 = "演算完了。仮説を確認。 "
104120-31 = "「Q.E.D.」――証明完了。"
104120-33 = "そういうことだったのですね……。"
104120-34 = "シッテムの箱のOS、A.R.O.N.Aである私と、アロナ先輩……#nなぜ二人が似て非なる存在であるのか……理解しました。"
104120-37 = "ここに居たのですね……だからこそ、誰にも見つけられなかった。#nそうでしょう？"
104120-41 = "――――連邦生徒会長。"
104120-48 = "#video;11002"
