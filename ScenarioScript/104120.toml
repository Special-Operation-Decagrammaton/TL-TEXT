[translation]
104120-1 = "Episódio 12; Epílogo (2)"
104120-5 = "……"
104120-6 = "Entendi. Então a história acaba aqui, é..."
104120-7 = "Se autoproclamou 'não ser o protagonista', traiu minhas previsões――e até mudou o gênero da história."
104120-8 = "É disso que eu tô falando!!"
104120-9 = "Ah... fingiu que era o fim, e enganou a história, o público――e meus olhos também..."
104120-10 = "Mas não ache que essa sua intromissão toda poderosa vai durar pra sempre――Sensei."
104120-11 = "A história tem que continuar――"
104120-12 = "É disso que eu tô falando!!"
104120-13 = "Isso é só um intervalo pra uma nova fase――a história que teve sua cortina fechada vai continuar em um novo palco."
104120-14 = "Ah, e pra isso――eu preciso trazer mudanças para a Gematria."
104120-15 = "Vou visitar aquele meu velho amigo selado, que foi banido da Gematria――e deixado no esquecimento."
104120-16 = "Fique vendo aí... Black Suit.#nEu vou terminar o que você não conseguiu completar."
104120-24 = "Nham……."
104120-29 = "……。"
104120-30 = "Cálculo concluído. Hipótese confirmada."
104120-31 = "Q.E.D.――Demonstração concluída."
104120-33 = "Então era isso, né……"
104120-34 = "Eu, a A.R.O.N.A, SO da Arca de Shittim, e a Arona-senpai...#nPor que nós duas somos seres parecidos, mas diferentes... entendi."
104120-37 = "Então você estava aqui…… por isso ninguém conseguiu te achar.#nNão é?"
104120-41 = "――――Presidente do Conselho Estudantil Geral."
104120-48 = "#video;11002"