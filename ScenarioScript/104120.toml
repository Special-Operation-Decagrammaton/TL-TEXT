[translation]
104120-1 = "Episódio 12; História posterior (2)"
104120-5 = "None"
104120-6 = "Eu vejo. Com isso a história termina..."
104120-7 = "Ele se anunciou como “não o personagem principal” e traiu minhas previsões – ele até voltou ao gênero."
104120-8 = "Foi isso que aconteceu! !"
104120-9 = "Ah... Você enganou a história, o público e meus olhos ao fingir no final..."
104120-10 = "Mas não pense que tal intervenção abrangente continuará para sempre – Sensei."
104120-11 = "A história deveria continuar..."
104120-12 = "Foi isso que aconteceu! !"
104120-13 = "Este é um interlúdio para dar as boas-vindas a uma nova fase. A cortina foi fechada e a história continua para uma nova etapa."
104120-14 = "Ah, para isso, tenho que provocar mudança na gematria."
104120-15 = "Suponha que visitemos um velho amigo selado que foi banido da Gematria e enterrado."
104120-16 = "Olhe para mim... roupas pretas. #nEu realizarei o que você não conseguiu realizar."
104120-24 = "Hum..."
104120-29 = "……."
104120-30 = "Cálculo concluído. Confirme a hipótese."
104120-31 = "\"Q.E.D.\" --- Prova concluída."

104120-33 = "Foi isso que aconteceu..."
104120-34 = "Eu, o sistema operacional da caixa de Shittem, A.R.O.N.A. e Arona-senpai...#nEu entendo porque somos semelhantes, mas diferentes..."
104120-37 = "Ele estava aqui... é por isso que ninguém conseguiu encontrá-lo. #nNão é?"
104120-41 = "--- Presidente do Conselho Estudantil da Federação."
