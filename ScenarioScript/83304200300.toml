[translation]
83304200300-6 = "Ah, Presidente. Bom trabalho."
83304200300-7 = "Bom trabalho para você também, Ako. #nEu vim para confirmar o conteúdo do treinamento antiterrorismo, mas..."
83304200300-8 = "“Não devem brigar”... “Tudo pela paz”..."
83304200300-13 = "“Vamos todos parar com as disputas”... Pandemonium, Hanuma Makoto?"
83304200300-14 = "O que é isso...?"
83304200300-15 = "...Como sempre, parece que ela está tramando algo suspeito novamente."
83304200300-16 = "Parece que panfletos foram espalhados por toda a academia. Francamente, o que ela está planejando desta vez..."
83304200300-17 = "Não importa o que eles estejam planejando, o que precisamos fazer não muda."
83304200300-18 = "Ako, vamos começar os preparativos para o treinamento."
83304200300-19 = "Você sabe onde os outros membros estão?"
83304200300-20 = "Sim, Presidente. Primeiro, vamos nos encontrar com a Iori, que está aguardando na sala de aula."
83304200300-21 = "Certo, vamos lá."
