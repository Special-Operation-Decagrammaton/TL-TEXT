[translation]
83304200300-6 = "あ、委員長。お疲れ様です。"
83304200300-7 = "アコこそ、お疲れ様。#n対テロ訓練の内容を確認しておこうと思って来たんだけど……"
83304200300-8 = "「喧嘩をしてはなりません」……「全ては平和のために」……"
83304200300-13 = "「みんなで争いをやめましょう」……万魔殿・羽沼マコト？"
83304200300-14 = "これは……？"
83304200300-15 = "……いつものように、また怪しいことを企んでいるようです。"
83304200300-16 = "学園の至る所にチラシが撒かれているようです。まったく、今度は何を……"
83304200300-17 = "あいつらが何を企んでいようと、私たちのやるべきことは変わらない。"
83304200300-18 = "アコ、訓練の準備を始めよう。"
83304200300-19 = "他の部員の位置は分かる？"
83304200300-20 = "はい、委員長。まずは教室で待機しているイオリと合流しましょう。"
83304200300-21 = "うん、行こう。"
