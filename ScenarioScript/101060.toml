[translation]
101060-1 = "Episódio 6; Presságio"
101060-7 = "Rin-chan, Riiin-chan."
101060-8 = "Quem é \"Rin-chan\"?#nJá não falei para parar de me chamar assim, Presidente?"
101060-9 = "Mas... a Rin-chan é a Rin-chan...#nHmmm, então como devo te chamar...?"
101060-10 = "Senhora... Nanagami?"
101060-11 = "……。"
101060-12 = "Ou talvez, Srta. Rin?#nSenhora Rin? ...Vossa Excelência Rin?"
101060-13 = "……Me chame como quiser."
101060-14 = "Não me importo.#nAfinal, a Presidente deve ser a única pessoa que me chama desse jeito."
101060-15 = "Entendido, então vai ser Rin-chan mesmo! Hehe."
101060-16 = "……Ué?#nPor acaso a Rin-chan deu um sorriso agora?"
101060-17 = "……Não sorri coisa nenhuma."
101060-18 = "Ehh? Mas eu vi, sabia?"
101060-19 = "……Foi impressão sua."
101060-20 = "Será mesmo?#nEu jurava que tinha visto um sorrisinho..."
101060-21 = "……。"
101060-22 = "……É sério, foi só impressão sua."
101060-24 = "Rin-senpai……"
101060-25 = "……！"
101060-26 = "Sala do Conselho Estudantil Geral"
101060-27 = "Senpai, você está bem...?"
101060-28 = "Ayumu...?#n……Desculpe, acabei cochilando um pouco."
101060-29 = "Desculpe incomodar enquanto está cansada, mas temos um assunto urgente que precisa da sua revisão..."
101060-30 = "……Tudo bem, não tem problema. Vamos lá."
101060-36 = "Opa, Rin-senpai e Ayumu-senpai. Trabalhando até tarde, hein? Bom trabalho~"
101060-37 = "Momoka."
101060-38 = "Momoka-chan…… sobre \"aquilo\"……"
101060-39 = "Siiim, é por aqui."
101060-45 = "Isso é...?"
101060-46 = "São os dados que detectamos há 2 horas."
101060-49 = "Observamos diversas massas de energia de altíssima concentração por toda Kivotos."
101060-50 = "……。"
101060-51 = "Vejamos... os locais são o deserto de Abydos, o parque de diversões abandonado perto de D.U.,#na área restrita nos subúrbios da Millennium, perto da fronteira entre Trinity e Gehenna, a nova cidade perto da Millennium e... ah, bem no meio da Torre Sanctum."
101060-53 = "Como assim, no meio da Torre Sanctum...?"
101060-54 = "Pois é... onde estamos agora mesmo.#nBem em cima da gente."
101060-55 = "Depois de ouvir isso, tentei checar as imagens das câmeras externas, mas...#nnão consegui encontrar nada..."
101060-56 = "Yep. Tudo normal, nada de diferente."
101060-57 = "……。"
101060-58 = "A mesma coisa nas outras regiões."
101060-59 = "No começo eu até achei que fosse um super tufão chegando,#nmas tufões não têm massa desse jeito..."
101060-60 = "Está me dizendo que... conseguimos observar os dados, mas não existe nada fisicamente lá?"
101060-61 = "Isso aí.#n――Sendo assim, só resta uma possibilidade. O equipamento pifou!"
101060-62 = "Momoka-chan……"
101060-63 = "……。"
101060-64 = "Parece que não temos escolha a não ser verificar com os próprios olhos."
101060-65 = "Err... Rin-senpai, o que você disse...?"
101060-66 = "Hã!? Você quer ir lá ver diretamente? Mas os drones não mostraram nada!"
101060-67 = "Que exagero... Nem recebemos nenhum aviso de anomalia ainda..."
101060-71 = "――Convoquem os representantes dos conselhos estudantis de cada distrito autônomo com urgência."
101060-72 = "……！？"
101060-73 = "Hã?"
101060-74 = "Atualmente, o Conselho Estudantil Geral não tem capacidade para lidar com isso sozinho.#nVamos trabalhar em conjunto com cada distrito autônomo para analisar as áreas afetadas."
101060-75 = "Sob a autoridade de Presidente Interina do Conselho Estudantil Geral, estou ativando o protocolo de emergência.#n――Declaro a formação do Comitê de Medidas de Emergência de Kivotos."
101060-76 = "Comitê de Medidas de Emergência...? V-você vai tão longe assim?#nPode ser só um defeito nos equipamentos, sabia?"
101060-77 = "……Se for só isso, ótimo. Terá sido apenas um alarme falso."
101060-78 = "No entanto, até que a situação seja totalmente esclarecida, precisamos lidar com isso com força total."
101060-79 = "Trinity, Gehenna, Millennium... e Abydos.#nE não só elas. Convoquem os responsáveis de todos os distritos autônomos que conseguirmos contatar."
101060-80 = "……。"
101060-81 = "Uau... Ferrou de vez.#nVou ter que virar a noite a semana toda nessa brincadeira..."
101060-83 = "Rin-senpai……！#nErr... Tem certeza de que isso é uma boa ideia?"
101060-87 = "É que... ultimamente... temos recebido reclamações de todos os lados...#ndizendo que a senhorita está abusando da sua autoridade como interina..."
101060-88 = "Convocar os representantes de cada distrito pode acabar colocando a sua própria posição em risco...#nEspecialmente desta vez, onde isso pode ser visto como uma invasão na jurisdição do Departamento de Defesa..."
101060-89 = "A-Ah, é claro que, como uma decisão da Presidente Interina, eu acho que é a atitude correta, mas...#no Departamento de Finanças vai..."
101060-90 = "……provavelmente criticar cada passo que você der."
101060-93 = "Ah, Chefe do Departamento de Finanças……！"
101060-94 = "――Ougi Aoi."
101060-95 = "Administradora Rin."
101060-97 = "Oopa... Acabei de lembrar de uma urgência urgente, então vou dar o fora daqui~."
101060-105 = "Momoka-chan, por favor, não fuja."
101060-106 = "M-Me solta, Ayumu-senpai!#nO clima tá tão pesado que eu vou morrer asfixiada se ficar aqui!"
101060-109 = "Desde quando a Administradora do Departamento de Administração tem autoridade sobre o Departamento de Defesa?"
101060-110 = "Aoi, isso é……"
101060-111 = "Dispenso as explicações. Eu já estou a par de toda a situação."
101060-112 = "Um fenômeno anômalo sem precedentes ocorrendo por toda Kivotos."
101060-113 = "Sem nenhum indício ou dano real――mas até que se prove o contrário, devemos mobilizar#ntodos os recursos e tratar isso com a máxima prioridade... Não tenho objeções a essa decisão."
101060-114 = "……Se quem tivesse decidido isso fosse a Presidente do Conselho Estudantil Geral, é claro."
101060-115 = "……。"
101060-116 = "Mas você não é a Presidente. Você é uma Administradora.#nColocar essa braçadeira de Interina não faz de você ela."
101060-117 = "Primeiro, perde a autoridade administrativa da Torre Sanctum. Depois, decide fechar a Academia Especial SRT...#nAinda aprova aquela organização suspeita chamada \"Schale\"..."
101060-118 = "E agora isso. O que significa tudo isso?#nA \"profecia\" da Schale? Um pesadelo com o fim do mundo...? Se deixar levar por essas baboseiras..."
101060-119 = "Por mais que você seja a \"Interina\", você está passando dos limites."
101060-120 = "Aoi, eu sei que você não vai com a minha cara, mas……"
101060-121 = "……Eu não estou falando de sentimentos pessoais agora."
101060-122 = "Eu sempre tive um grande respeito pela sua competência. E a Presidente também.#nAcredito que eu entenda do que você é capaz melhor do que ninguém."
101060-123 = "Mas isso não significa que você possa se tornar um ser intocável como a Presidente era."
101060-124 = "Você só se tornou a Interina porque era a \"Administradora\" do Departamento de Administração.#nNão foi um reconhecimento das suas habilidades, foi apenas uma medida de necessidade."
101060-125 = "Essa é a dura realidade que vai assombrar você enquanto usar essa braçadeira.#nEspero que tenha isso em mente antes de tomar suas decisões, Presidente \"Interina\"."
101060-126 = "……。"
101060-127 = "Mesmo assim, se ainda planeja estabelecer esse Comitê de Medidas de Emergência,#nprecisará de provas e justificativas plausíveis o bastante para passar por cima da autoridade do Departamento de Defesa."
101060-128 = "No mínimo――volte a me procurar quando tiver algo que consiga me convencer."
101060-129 = "Se não conseguir fazer isso――"
101060-130 = "……Vou ter que considerar você como uma ameaça que se aproveita do desaparecimento da Presidente#npara abusar da sua autoridade interina e monopolizar o Conselho Estudantil Geral para si."
101060-131 = "……。"
101060-132 = "Vou levar as suas palavras em consideração."
101060-133 = "……Certo.#nSendo assim――"
101060-138 = "……Ah, e vá dormir um pouco."
101060-139 = "As olheiras debaixo dos seus olhos estão terríveis. Estão arruinando a sua pele bonita."
101060-145 = "……。"
101060-146 = "Ufa..."
101060-147 = "Haa... Haa... Achei que eu fosse sufocar e bater as botas ali mesmo."
101060-148 = "Rin-senpai……"
101060-149 = "Ayumu, prepare o Comitê de Medidas de Emergência."
101060-153 = "……！！"
101060-154 = "……。"
101060-159 = "Ora, Administradora Rin……"
101060-160 = "Kaya……"
101060-161 = "Me desculpe por isso.#nA Chefe de Finanças estava falando tão alto que... acabei escutando sem querer."
101060-162 = "……Peço desculpas sobre essa questão do Comitê de Medidas de Emergência."
101060-163 = "Que isso, você é a Interina.#nAcredito que isso esteja perfeitamente dentro da sua jurisdição."
101060-164 = "……。"
101060-165 = "A senhora está apenas dando o seu melhor para cumprir seu dever... Preencher o vazio deixado pela Presidente não é uma tarefa fácil. A Chefe de Finanças não precisava ter pegado tão pesado..."
101060-166 = "Mas... é um fato que existem pessoas que duvidam da sua autoridade... Uma situação complicada, não é?"
101060-167 = "Já sei... O que acha de convidar a Schale para participar do Comitê de Medidas de Emergência?"
101060-168 = "A Schale……?"
101060-169 = "Sim. Pode ser de grande ajuda para convencer os representantes das outras academias."
101060-170 = "Já ouvimos falar dos feitos da Schale por todos os distritos.#nComo conseguiram expor até mesmo os atos ilegais na Academia de Polícia... eu diria que já podemos até considerá-los como um departamento de investigação oficial."
101060-171 = "A presença do Sensei também ajudaria a diminuir as preocupações da senhora."
101060-172 = "……Muito obrigada.#nVocê tem razão. Eu já estava mesmo pensando em pedir a cooperação da Schale."
101060-173 = "……Sendo assim, eu mesma entro em contato com o Sensei."
101060-174 = "Se ele tiver que vir da Schale até aqui, precisaremos de escolta...#nVou deixar isso nas mãos da Valkyrie."
101060-175 = "Muito obrigada, Kaya. Conto com você."
101060-176 = "Imagina, são tempos difíceis. Temos que nos ajudar."
101060-177 = "Com licença, vou me retirar."
101060-182 = "……。"
101060-187 = "……Sim, pode prosseguir."
101060-189 = "Próximo episódio; A Convocação do Comitê de Medidas de Emergência"