[translation]
101060-1 = "第6話;前兆"
101060-7 = "リンちゃん、リンちゃーん。"
101060-8 = "誰が「リンちゃん」ですか。#nその呼び方は控えるようにと言ったでしょう？生徒会長。"
101060-9 = "でも……リンちゃんはリンちゃんだもん……#nうーん、じゃあ何て呼べばいいのかな……。"
101060-10 = "七神……様？"
101060-11 = "……。"
101060-12 = "それか、リンさん？#nリン様？……リン殿？"
101060-13 = "……お好きなようにどうぞ。 "
101060-14 = "何でも構いません。#n私に対してそんな風に呼びかけるのは、きっと生徒会長だけですから。"
101060-15 = "分かった、じゃあリンちゃんで！へへっ。"
101060-16 = "……あれ～？#nもしかしてリンちゃん、今笑った？"
101060-17 = "……笑ってません。"
101060-18 = "え～？私、見たよ？"
101060-19 = "……気のせいですよ。"
101060-20 = "そうかなぁ？#n笑ってたと思うんだけどなぁ……。"
101060-21 = "……。"
101060-22 = "……本当に気のせいですよ。"
101060-24 = "リン先輩……。"
101060-25 = "……！"
101060-26 = "連邦生徒会室"
101060-27 = "先輩、大丈夫ですか……？"
101060-28 = "アユム……？#n……すみません、少し眠っておりました。"
101060-29 = "お疲れの所すみません。至急確認をお願いしたい事項が……"
101060-30 = "……ええ、大丈夫です。行きましょう。"
101060-36 = "お、リン先輩にアユム先輩。遅くまでお疲れ～。"
101060-37 = "モモカ。"
101060-38 = "モモカちゃん……例のアレを……。"
101060-39 = "はーい、こっちこっち。"
101060-45 = "これは……？"
101060-46 = "これ、2時間前に検出したデータ。"
101060-49 = "キヴォトス全域で、超高濃度のエネルギー体がいくつか観測されたの。"
101060-50 = "……。"
101060-51 = "えーと……場所は、アビドス砂漠、D.U.近郊の廃墟化した遊園地、#nミレニアム郊外の閉鎖地域、トリニティとゲヘナの境界付近、ミレニアム近郊の新しい都市と……あと、[ruby= ・     ・     ・     ・     ・     ・     ・     ・     ・     ・     ・     ・     ・     ・ ]サンクトゥムタワーのど真ん中[/ruby]。"
101060-53 = "サンクトゥムタワーの真ん中、と言いますと…… "
101060-54 = "そう……私たちが今いる場所。#nここの真上。"
101060-55 = "それを聞いて、外部カメラの映像を確認してみたのですが……#n何も見つける事ができず……。"
101060-56 = "そ。何も変わったところがなかったんだ。"
101060-57 = "……。"
101060-58 = "他の地域も一緒でね。"
101060-59 = "最初は超大型の台風でも来るのかと思ったんだけど、#n台風は質量を持ってないし……。"
101060-60 = "データとして観測はできるものの、実在しない……ということですか。"
101060-61 = "そういう事。#n――それなら残る可能性は一つ。機械の故障ってわけ！"
101060-62 = "モモカちゃん……。"
101060-63 = "……。"
101060-64 = "実際に確認するしかなさそうですね。"
101060-65 = "えっと……リン先輩、今なんと……？"
101060-66 = "えっ！？直接行くつもり？ドローンで見ても何もなかったのに？"
101060-67 = "特に異常報告が入ったわけでもないのに大袈裟な……。"
101060-71 = "――各自治区の生徒会代表を緊急招集します。"
101060-72 = "……！？"
101060-73 = "えっ？"
101060-74 = "現在、連邦生徒会に対応する余力はありませんので。#n各自治区と協力して該当地域の分析を行います。"
101060-75 = "連邦生徒会長代行の権限により、緊急プロトコルを発動。#n――キヴォトス非常対策委員会を発足します。"
101060-76 = "非常対策委員会……？そ、そこまでする？#nただの機械の故障かもしれないよ？"
101060-77 = "……それならそれでいいのです。杞憂で済みますから。"
101060-78 = "ですが、本件の全貌が明らかになるまでは、全力で対応しなくてはなりません。"
101060-79 = "トリニティ、ゲヘナ、ミレニアム……そしてアビドス。#nそれだけでなく、連絡が取れるすべての自治区の責任者をこちらに招集します。"
101060-80 = "……。"
101060-81 = "うわぁ……終わった。#nこれ、1週間は徹夜だよねぇ……。"
101060-83 = "リン先輩……！#nその……本当に、大丈夫なのでしょうか？"
101060-87 = "その……最近……リン先輩が、代行の権限を乱用しているという声が……#nあちこちから入ってきています……。"
101060-88 = "各自治区の代表を招集するとなると、リン先輩ご自身の立場すら危うくなるかもしれません……#n特に今回は、防衛室の権限を侵害していると思われる可能性も……"
101060-89 = "あっ、もちろん連邦生徒会長代行のご判断としては、適切だとは思いますが……#nですが、財務室からは……"
101060-90 = "……判断の一つ一つに、指摘を入れるでしょうね。"
101060-93 = "あ、財務室長……！"
101060-94 = "――[ruby=おき]扇喜[/ruby]アオイ。 "
101060-95 = "リン行政官。"
101060-97 = "おっと……急用を思い出したので、私はここで失礼～。"
101060-105 = "モモカちゃん、逃げないでください。"
101060-106 = "はっ、離してよ～アユム先輩！#nここにいたら息がつまりすぎて窒息死しちゃうって！"
101060-109 = "いつから統括室の行政官が、防衛室の権限まで持つようになったのかしら？"
101060-110 = "アオイ、これは……"
101060-111 = "説明は不要よ。この件については、既に把握済みだから。"
101060-112 = "キヴォトス中に、未曾有の異常現象が発生。 "
101060-113 = "兆候も、実害も特に無い――けれど、脅威がないことを立証するまでは、#nあらゆる手段を動員して、最高水準で対応すべき……その決定に異論は無いわ。"
101060-114 = "……そう決定したのが、[ruby=  ・    ・    ・    ・    ・    ・    ・    ・  ]連邦生徒会長なら[/ruby]、ね。"
101060-115 = "……。"
101060-116 = "でも、あなたは連邦生徒会長じゃない。行政官よ。#n代行の腕章をつけたからといって、あなたが彼女になるわけではない。"
101060-117 = "サンクトゥムタワーの行政権を失ったうえに、SRT特殊学園の閉鎖を決定……#n「シャーレ」という正体不明の組織の認可……"
101060-118 = "その上、これは一体どういう事？#n「シャーレ」の予言？終焉の予知夢……？そんな戯言に振り回されて……"
101060-119 = "いくら「代行」といえど、度を越しているわ。"
101060-120 = "アオイ、私のことが気に入らないのは分かりますが……"
101060-121 = "……私は今、私的な感情の話をしてはいないの。"
101060-122 = "私は、昔からあなたの能力を高く評価してきたわ。それは生徒会長も然り。#nあなたの能力は、誰よりもよく理解しているつもり。"
101060-123 = "でも、あなたが連邦生徒会長のような超人になれるわけではない。"
101060-124 = "あなたが代行になったのは、統括室の「行政官」だったからであって、#nあなたの能力が認められたのではなく、あくまで必要だったからに過ぎない。"
101060-125 = "その事実は、代行の腕章をつけている限り、あなたにつきまとうでしょうね。#nそれを念頭に置いて、判断をお願いしたいの――連邦生徒会長「代行」。"
101060-126 = "……。"
101060-127 = "それでも、あなたが非常対策委員会を設置するのであれば、#n防衛室の権限を侵害するに足るだけの根拠と正当性が必要よ。"
101060-128 = "せめて――私を説得できる程度のものを準備してから、発言してちょうだい。"
101060-129 = "それができないと言うのであれば――"
101060-130 = "……あなたの事を、生徒会長の失踪を理由に代行権限を振りかざして、#n連邦生徒会を私物化しようとしている存在として見る事になるわ。"
101060-131 = "……。"
101060-132 = "そのお言葉、留意いたします。"
101060-133 = "……そう。#nそれじゃ――"
101060-138 = "……あと、少しは寝なさい。"
101060-139 = "目の下のクマ、酷いわよ。綺麗な肌が台無しじゃない。"
101060-145 = "……。"
101060-146 = "ぷはー。"
101060-147 = "はぁ……はぁ……息が詰まって、死ぬかと思ったぁ。"
101060-148 = "リン先輩……。"
101060-149 = "アユム、非常対策委員会の準備を。"
101060-153 = "……！！"
101060-154 = "……。"
101060-159 = "あら、リン行政官……"
101060-160 = "カヤ……"
101060-161 = "ごめんなさいね。#n財務室長の声が大きくて……盗み聞きした形になってしまいました。"
101060-162 = "……非常対策委員会の件は、申し訳ありません。"
101060-163 = "いえ、代行ですから。#n当然の権限だと私は思っていますよ。"
101060-164 = "……。"
101060-165 = "行政官は精一杯務めを果たしているだけなのに……生徒会長の穴を埋めることは、容易ではありません。財務室長も、何もあそこまで言う事はないのに……。"
101060-166 = "ですが……あなたの権威を疑う人がいるのも事実……困りましたね。"
101060-167 = "そうですね……非常対策委員会にシャーレを同席させるのは、いかがでしょうか？"
101060-168 = "シャーレを……？"
101060-169 = "ええ。各学園代表を説得する際の一助になってくださるかもしれません。"
101060-170 = "各自治区からシャーレの活躍ぶりは聞き及んでいますから。#n警察学校の不法行為まで突き止めたとのことで……これは捜査部と呼んでも差し支えないかと。"
101060-171 = "先生が同席すれば、行政官の心配も少なくなるでしょうし。"
101060-172 = "……ありがとうございます。#nそうですね。ちょうど、シャーレに協力を要請しようかと思っていたところです。"
101060-173 = "……では、私の方で先生に連絡をしておきますね。"
101060-174 = "シャーレからここまで移動するのでしたら、警護も必要ですし……#nこちらはヴァルキューレにお願いするとしましょう。"
101060-175 = "ありがとうございます、カヤ。よろしくお願いします。"
101060-176 = "いえ、大変な時ですから。お互い助け合っていきましょう。"
101060-177 = "では、失礼しますね。"
101060-182 = "……。 "
101060-187 = "……ええ、進めてください。"
101060-189 = "次回;非常対策委員会の招集"
