[translation]
32200-1 = "Episódio 20;Epílogo"
32200-2 = "……O pessoal do Clube de Aulas de Reforço conquistou, direitinho, a aprovação com as próprias forças."
32200-3 = "A Koharu, depois disto, poderá enfim voltar, radiante, ao Comitê de Realização da Justiça."
32200-4 = "A Hanako, pelo visto, encontrou uma boa companhia, boas amigas diante de quem pode se revelar. Provavelmente, agora, ao menos, ela já não pensa em abandonar a escola."
32200-5 = "A Azusa, com certeza, poderá seguir aprendendo daqui pra frente."
32200-6 = "E a Hifumi, que, em certo sentido, mais do que qualquer uma, esteve na linha de frente acumulando esforço com sinceridade, poderá voltar ao cotidiano de até agora."
32200-7 = "……A Mika foi encarcerada na prisão da academia. Talvez nunca mais possa ser vista."
32200-8 = "A Nagisa…… conforme o previsto, deve ir assinar o Tratado do Éden."
32200-9 = "……."
32200-10 = "Sim, até aqui é uma história bem-feita."
32200-11 = "……Mas, para os créditos finais, ainda é cedo demais."
32200-12 = "Afinal, o desfecho que você deve testemunhar ainda não revelou toda a sua face."
32200-13 = "Por mais que esta história role de qualquer maneira……"
32200-14 = "tudo há de convergir para a catástrofe."
32200-19 = "……Nuvens negras."
32200-20 = "Umas nuvens negras que ninguém consegue dominar, que fazem crer que nunca mais se verá o sol…… essas nuvens, agora, avançam lentamente."
32200-22 = "Ainda há algo que resta; isto não é o fim das cortinas…… disso você, com certeza, tem plena consciência, mais que ninguém, não é?"
32200-25 = "……Preparem-se, pessoal."
32200-27 = "A-aah…… e-enfim vai começar……!? E-enfim chegou esta hora…… mas é doloroso, né, é penoso, né……?"
32200-28 = "……Sim. Mas fica tranquila; a dor é prova de que a gente está viva."
32200-29 = "……."
32200-30 = "A H-Hime tá dizendo alguma coisa por sinais. Deixa ver……."
32200-31 = "……\"O que foi feito daquela menina?\", é? Você tá curiosa, Hime?"
32200-32 = "……."
32200-33 = "……Tanto faz, não? No fim, é só uma questão de mais cedo ou mais tarde."
32200-38 = "Já chega disso."
32200-39 = "……."
32200-40 = "Nuvem negra…… amanhã vai chover."
32200-41 = "Ah, chuva? Que chato, chuva é úmida…… penosa, e desagradável……."
32200-47 = "……Azusa. Por mais que você lute, você não vai conseguir escapar."
32200-48 = "O seu corpo se lembra. Logo há de recordar a verdade."
32200-49 = "……Reza assim:"
32200-52 = "Tudo é vão. Por mais longe que se vá, tudo não passa de algo vão."
32200-58 = "Arco do Tratado do Éden. Continua no Capítulo 3"
