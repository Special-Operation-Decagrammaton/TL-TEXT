[translation]
32200-1 = "Episódio 20; Epílogo"
32200-2 = "......O pessoal do Clube de Reposição realmente conquistou a aprovação com as próprias forças, não é?"
32200-3 = "A Koharu deve conseguir voltar para o Comitê de Realização da Justiça agora."
32200-4 = "A Hanako parece ter encontrado alguém em quem pode se abrir, uma boa amiga. Provavelmente, agora, nem passa pela cabeça dela largar a escola."
32200-5 = "A Azusa com certeza vai poder continuar estudando daqui para frente."
32200-6 = "E a Hifumi, que de certa forma esteve na linha de frente mais que qualquer outra e se esforçou sinceramente, deve conseguir voltar à sua rotina normal."
32200-7 = "......A Mika foi trancada na prisão da academia. Talvez a gente nunca mais a veja."
32200-8 = "A Nagisa... vai assinar o Tratado do Éden como planejado."
32200-9 = "......"
32200-10 = "É, até aqui, foi uma história com um final bem feito."
32200-11 = "......Mas ainda é cedo demais para os créditos finais."
32200-12 = "Afinal, o desfecho que você deve testemunhar ainda não revelou a sua forma completa."
32200-13 = "Não importa como essa história acabe..."
32200-14 = "Tudo está convergindo para uma catástrofe."
32200-19 = "......Nuvens carregadas."
32200-20 = "Nuvens que ninguém consegue conter, nuvens que fazem você pensar que nunca mais vai ver o sol... elas estão se aproximando lentamente."
32200-22 = "Ainda resta algo; isso não é o fim... Você sabe disso melhor do que ninguém, não é?"
32200-25 = "......Preparem-se, pessoal."
32200-27 = "A-Aah... f-finalmente vai começar...!? O-O momento finalmente chegou... mas é doloroso, não é? É sofrido, não é...?"
32200-28 = "......Sim. Mas não se preocupe, a dor é a prova de que estamos vivas."
32200-29 = "......"
32200-30 = "A-A Hime-chan está dizendo alguma coisa em língua de sinais. Hum..."
32200-31 = "......Perguntando o que aconteceu com aquela criança? Você está curiosa, Hime?"
32200-32 = "......"
32200-33 = "......Não faz diferença, não é? No fim das contas, é só uma questão de tempo."
32200-38 = "Já chega disso."
32200-39 = "......"
32200-40 = "Nuvens negras... vai chover amanhã."
32200-41 = "Ah, chuva? Que ruim, chuva deixa tudo úmido... é triste, é desconfortável..."
32200-47 = "......Azusa. Não importa o quanto você se debata, você não vai conseguir escapar."
32200-48 = "Seu corpo se lembra. Você logo vai se lembrar da verdade."
32200-49 = "......Como dizem,"
32200-52 = "Tudo é uma grande ilusão. Não importa aonde você vá, tudo é apenas algo vazio e vão."
32200-58 = "Arco do Tratado do Éden; Continua no Capítulo 3"