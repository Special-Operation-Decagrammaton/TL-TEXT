[translation]
32200-1 = "Episódio 20; Epílogo"
32200-2 = "……As integrantes do Clube de Estudos Suplementares conquistaram a aprovação com seu próprio esforço, não é mesmo."
32200-3 = "Koharu deve conseguir retornar oficialmente ao Comitê de Justiça depois disso."
32200-4 = "Hanako parece ter encontrado uma boa companhia, uma boa amiga com quem pode ser ela mesma. Provavelmente, agora, ela não pensa mais em deixar a escola, pelo menos."
32200-5 = "Azusa certamente poderá continuar seus estudos daqui em diante."
32200-6 = "E, em certo sentido, Hifumi, que se esforçou com mais sinceridade do que qualquer outra pessoa na linha de frente, poderá retornar ao seu cotidiano de sempre."
32200-7 = "……Mika foi confinada na prisão da academia. Talvez não possamos nos encontrar nunca mais."
32200-8 = "Nagisa…… irá assinar o Tratado do Éden conforme o planejado."
32200-9 = "……."
32200-10 = "Sim, até aqui, foi uma história bem feita."
32200-11 = "……Mas ainda é cedo demais para os créditos finais."
32200-12 = "Afinal, o desfecho que você deve observar ainda não revelou sua forma completa."
32200-13 = "Não importa como esta história se desenrole……"
32200-14 = "Tudo convergirá para a catástrofe."
32200-19 = "……Nuvens negras."
32200-20 = "Algo que ninguém consegue controlar, algo que faz você pensar que nunca mais verá o sol…… essas nuvens negras estão se aproximando lentamente agora."
32200-22 = "Ainda há algo que resta, este não é o fim…… Você sabe disso melhor do que ninguém, não sabe?"
32200-25 = "……Preparem-se, pessoal."
32200-27 = "A-ah…… f-finalmente vai começar……!? F-finalmente este momento…… mas vai ser doloroso, não vai? Vai ser difícil……?"
32200-28 = "……Sim. Mas está tudo bem, a dor é a prova de que estamos vivos."
32200-29 = "……."
32200-30 = "A-a Hime-chan está dizendo algo em linguagem de sinais. Hum……."
32200-31 = "……Quer saber o que aconteceu com aquela criança? Está curiosa, Hime?"
32200-32 = "……."
32200-33 = "……Não importa, não é? No fim das contas, é apenas uma questão de tempo."
32200-38 = "Já chega disso."
32200-39 = "……."
32200-40 = "Nuvens negras…… vai chover amanhã."
32200-41 = "A-ah, chuva? Eu não gosto, a chuva é úmida…… é dolorosa, e é desagradável……."
32200-47 = "……Azusa. Não importa o quanto você se debata, você não conseguirá escapar."
32200-48 = "Seu corpo se lembra. Você logo se lembrará da verdade."
32200-49 = "……Como dizem,"
32200-52 = "Tudo é vaidade. Não importa o quão longe você vá, tudo é apenas vaidade."
32200-58 = "Capítulo do Tratado do Éden; Continua no Capítulo 3"
