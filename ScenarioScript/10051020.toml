[translation]
10051020-1 = "Episódio 2: As condições do pedido"
10051020-2 = "Hyakkiyako - Uma sala de aula no antigo prédio 38"
10051020-3 = "……E é por isso que...#nFomos encarregadas da escolta!"
10051020-4 = "Oooooh!"
10051020-5 = "Como esperado da nossa chefe...!"
10051020-6 = "E-escolta..."
10051020-7 = "Vou me esforçar ao máximo para não atrapalhar...!"
10051020-8 = "A-ah, espera..."
10051020-9 = "Eu achei que vocês fossem ficar bravas por eu ter trazido algo tão trabalhoso..."
10051020-10 = "De jeito nenhum!"
10051020-11 = "Esta é uma oportunidade de ouro para espalhar o nome do Clube de Pesquisa Ninjutsu pelo mundo, através da escolta de uma pessoa tão renomada...!"
10051020-12 = "Não há um motivo sequer para recusar!"
10051020-13 = "E-eu também penso o mesmo...!"
10051020-14 = "Tsukuyo... Izuna...#nEntão, eu queria perguntar uma coisa..."
10051020-15 = "Vocês conhecem a Shine Cat?"
10051020-16 = "É a primeira vez que ouço esse nome!"
10051020-17 = "Que resposta rápida!?"
10051020-18 = "Ué, se vocês não conhecem, como sabiam que ela é famosa?"
10051020-19 = "Porque a chefe disse isso durante a explicação!"
10051020-20 = "Ah, é verdade."
10051020-21 = "Bom, eu também só fiquei sabendo depois que a Niya me contou..."
10051020-23 = "A-ah, com licença..."
10051020-24 = "Eu... eu conheço..."
10051020-25 = "Oh...!"
10051020-26 = "Ela estabeleceu uma reinterpretação moderna da beleza clássica com um estilo inovador e..."
10051020-27 = "E-ela é alguém que mudou o paradigma do mundo da moda...!"
10051020-28 = "Por isso, dizem que ela é o modelo a ser seguido por todos os designers existentes..."
10051020-29 = "Você entende bastante disso...!"
10051020-30 = "S-sério...?"
10051020-31 = "Bem, de qualquer forma! Obrigada por concordarem!"
10051020-32 = "Mas!"
10051020-33 = "Um ninja é um profissional! E um profissional não se move sem uma recompensa!"
10051020-34 = "Sendo assim... Tcharam!"
10051020-35 = "Como pagamento adiantado, eu consegui esta câmera!"
10051020-36 = "Com isso, podemos retomar as filmagens do \"Diário Ninja da Michiru-chi\"!"
10051020-37 = "Oooooh!"
10051020-38 = "Incrível...!"
10051020-39 = "Esta é muito mais potente do que a que tínhamos antes...!"
10051020-40 = "Com esta câmera, poderei gravar as artes ninja da chefe com muito mais nitidez!"
10051020-41 = "Além disso, ela é à prova d'água!"
10051020-42 = "V-verdade mesmo...!"
10051020-43 = "Isso significa que... poderemos gravar até dentro de um caldo de lámen fervendo!"
10051020-44 = "Fufu, fico feliz que tenham gostado."
10051020-45 = "Mas, um ninja é alguém que se \"esconde\"...!"
10051020-46 = "Por isso, vamos deixar a alegria de lado por um momento e...#nComeçar o briefing para cumprir a missão!"
10051020-47 = "Sim!"
10051020-48 = "Chefe...!"
10051020-49 = "Primeiro, vamos dar uma olhada no que recebemos do Clube Yin-Yang!"
10051020-54 = "Uma mala...?"
10051020-55 = "Izuna, estou ficando empolgada!"
10051020-56 = "O que será que tem dentro...?"
10051020-57 = "Será que é um pergaminho com técnicas ninjas!?"
10051020-58 = "O que tem aqui dentro é um item essencial para a missão de hoje!"
10051020-59 = "É um..."
10051020-61 = "— É um vestido!"
10051020-62 = "Um vestido...?"
10051020-63 = "Um vestido... é isso...?"
10051020-69 = "Uau! É a primeira vez que vejo um traje tão deslumbrante!"
10051020-70 = "É realmente lindo..."
10051020-71 = "B-bem, não combina nem um pouco com o meu corpo grande..."
10051020-72 = "Bem... fico feliz que tenha gostado da roupa em si."
10051020-73 = "Digo isso porque somos nós que vamos usá-los."
10051020-77 = "Eeeeeeh!?"
10051020-78 = "Não vai ser difícil se mover com esse tipo de roupa!?"
10051020-79 = "N-não me diga que..."
10051020-80 = "Nós... vamos subir em um palco de desfile de moda...?"
10051020-81 = "S-se a chefe diz que esse é o caminho do ninja..."
10051020-82 = "E-eu farei o meu melhor...!"
10051020-83 = "Não, não! Nossa missão é apenas escolta!"
10051020-84 = "Nosso trabalho é nos misturar aos convidados e neutralizar qualquer movimento suspeito imediatamente!"
10051020-85 = "Mas, para isso, precisamos conseguir nos mover livremente pelo local, certo?"
10051020-86 = "É, verdade...?"
10051020-87 = "E parece que existem lugares onde só se entra com trajes formais assim."
10051020-88 = "Por exemplo... sabe, hum... onde as pessoas importantes se reúnem... como é o nome..."
10051020-89 = "Ah, seria um salão de banquetes?"
10051020-90 = "Isso! Salão de banquetes!"
10051020-91 = "E-então tem um código de vestimenta..."
10051020-92 = "Sim. Por isso o Departamento Yin-Yang preparou esses trajes para nós."
10051020-93 = "Mas, como a Izuna-chan disse..."
10051020-94 = "Não vai ser difícil de se mover? #nFlexibilidade e agilidade são o básico do básico para um ninja, mas..."
10051020-95 = "E-e além disso, acho que não combina nada comigo...!"
10051020-96 = "Mesmo que eu consiga vestir... se eu me mover um pouco, a roupa pode rasgar...!"
10051020-97 = "Sendo assim, vamos todas experimentar!"
10051020-98 = "Hã?"
10051020-99 = "……!"
10051020-100 = "Chefe, você sempre dizia, não é?"
10051020-101 = "“Um ninja nunca desiste, não importa a situação”...!"
10051020-102 = "Por isso, não podemos desanimar por causa disso!"
10051020-103 = "Se experimentarmos e nos acostumarmos—"
10051020-104 = "Deve ser fácil se mover na hora!"
10051020-105 = "...Com certeza, se nos acostumarmos agora, será mais fácil depois."
10051020-106 = "Além disso, um ninja é alguém que se mistura naturalmente a qualquer situação...!"
10051020-107 = "Não podemos ser derrotadas por um vestido!"
10051020-108 = "Exatamente! Nin-nin!"
10051020-109 = "Então, Izuna, serei a primeira a experimentar!"
10051020-112 = "O meu vestido é este?"
10051020-113 = "Sim, esse é o da Izuna. E este aqui é o da Tsukuyo..."
10051020-114 = "H-hieee...!"
10051020-116 = "Izuna de vestido, apresentando-se!"
10051020-122 = "Uau...!"
10051020-123 = "Uau……!"
10051020-124 = "E aí, o que achou? Ficou bom, né?"
10051020-125 = "L-lindo...! É maravilhoso!"
10051020-126 = "V-você acha? Ehehe."
10051020-127 = "Eu nunca imaginei que receberia tantos elogios...!"
10051020-128 = "Não está difícil de se mover?"
10051020-129 = "Está um pouco apertado em alguns lugares, mas..."
10051020-130 = "Se eu me acostumar, não tem problema!"
10051020-131 = "Além disso, é a primeira vez que visto algo tão bonito e chamativo..."
10051020-133 = "Izuna está muito, muito animada!"
10051020-134 = "Oh, isso, muito bom!"
10051020-135 = "Certo, então agora..."
10051020-136 = "A próxima é a Tsuku—"
10051020-137 = "B-部長! Pode ir primeiro, por favor...!"
10051020-138 = "Tenho certeza de que vai ficar ótimo em você!"
10051020-139 = "Ah, v-você acha?"
10051020-140 = "Então, bem... este aqui é o meu..."
10051020-142 = "Será que eu passo isso... por aqui...?"
10051020-143 = "Está de cabeça para baixo!"
10051020-144 = "Sério!?"
10051020-145 = "Isso é complicado demais de vestir...!"
10051020-146 = "S-se eu vestir nesta ordem aqui..."
10051020-147 = "E então, se eu apertar bem aqui—"
10051020-148 = "Oh...!"
10051020-149 = "部長! Por que não solta o cabelo?"
10051020-150 = "Acho que combinaria mais com você!"
10051020-151 = "Até mudar o penteado!?"
10051020-152 = "N-não precisa ir tão longe..."
10051020-153 = "P-por que não tenta só para ver...?"
10051020-154 = "E-eu trouxe uma chapinha por acaso, então...!"
10051020-155 = "Você trouxe isso...!?"
10051020-157 = "E-e então, como estou...?"
10051020-158 = "Oh! A atmosfera mudou completamente!"
10051020-159 = "Você parece tão pura, como uma garotinha..."
10051020-160 = "O potencial de uma ninja é infinito...!"
10051020-161 = "N-não me elogie tanto assim...!"
10051020-162 = "Eu fico um pouco envergonhada...!"
10051020-163 = "E-e além disso... honestamente, sinto que a Tsukuyo é quem melhor combina com roupas assim...!"
10051020-164 = "A-ah!?"
10051020-165 = "Exatamente!"
10051020-166 = "Tsukuyo-dono, vamos vestir logo também!"
10051020-167 = "H-hieee...!"
10051020-168 = "S-se é assim... eu também..."
10051020-172 = "Hum... será que isso é realmente do meu tamanho...?"
10051020-173 = "Não está... entrando de jeito nenhum..."
10051020-174 = "É normal parecer um pouco apertado no começo, não se preocupe."
10051020-175 = "Uuuu...!"
10051020-176 = "E além disso, a bainha não está curta demais...?"
10051020-177 = "Não está num comprimento bom?"
10051020-178 = "É, mesmo...? #nS-será que é só porque eu sou grande demais...?"
10051020-179 = "Eu sou apenas... grande demais, então..."
10051020-180 = "Já não tenho nem roupas que sirvam em mim direito...!"
10051020-181 = "Ugh...!"
10051020-182 = "Não diga isso! Falta só um pouco!"
10051020-183 = "Ma-mas...!"
10051020-184 = "Se-se eu forçar tanto assim...!"
10051020-188 = "RIIIIIIIP!"
10051020-191 = "Ah..."
10051020-192 = "O vestido rasgou...!"
10051020-193 = "E-e todos os botões voaram longe também...!"
10051020-194 = "Ugh..."
10051020-195 = "No fim das contas, eu não consigo usar roupas bonitas como essa..."
10051020-196 = "Eu só sou grande, e nem sou fofa..."
10051020-197 = "Na-não é nada disso! Mas... desculpe, eu tentei te forçar a vestir..."
10051020-198 = "Tsukuyo-dono, você está bem?"
10051020-199 = "Eu estou bem, mas..."
10051020-200 = "Es-essa roupa foi emprestada pelo Departamento Yin-Yang, não foi...?"
10051020-201 = "Se por causa disso o Departamento Yin-Yang ficar bravo..."
10051020-202 = "Ou se eles tomarem a minha câmera..."
10051020-203 = "Eu não vou conseguir gravar o \"Diário Ninja da Michiru-chi\"..."
10051020-204 = "[s] \"Está tudo bem. É só consertar a roupa rasgada.\""
10051020-205 = "Isso mesmo, é só remendar e devolver que fica tudo bem."
10051020-206 = "Tenho certeza de que dá para consertar direitinho!"
10051020-207 = "Então não precisa ficar tão preocupada..."
10051020-211 = "— Sensei-dono!? Por que você está aqui!?"
10051020-212 = "[s] \"Eu tinha um assunto por perto, então resolvi passar.\""
10051020-213 = "Deixando de lado o motivo de você ter vindo..."
10051020-214 = "— Desde quando você estava aí!?!?"
10051020-215 = "Se-Sensei...!?"
10051020-216 = "Mestre...!?"
10051020-217 = "Será que... você estava aqui até durante a troca de roupa...?"
10051020-222 = "Ni-Ninpo! \"Técnica de Expurgo de Intrusos\"!!"
10051020-223 = "[s] \"Es-espera um pouco...!\""
