[translation]
80000123-1 = "Jornalismo de Doces"
80000123-2 = "Bem, vou compilar tudo em um artigo agora mesmo!"
80000123-3 = "Com isso, poderemos montar uma edição especial de Dia dos Namorados que vai deixar todo mundo empolgado!"
80000123-4 = "[s] \"Acho que falei demais...\""
80000123-5 = "Não se preocupe! Todo mundo adora histórias estimulantes!"
80000123-6 = "Vou começar a escrever o artigo agora mesmo!"
80000123-10 = "Ah, é verdade! Falando em Dia dos Namorados, eu tenho algo para te entregar, Sensei..."
80000123-11 = "É um agradecimento por ter sacrificado sua própria imagem para falar sobre o especial do \"Pandemonium Semanal\"!"
80000123-12 = "[s] \"Será que eu falei mesmo disso!?\""
80000123-13 = "Não ligue para isso! Em vez disso..."
80000123-14 = "Achei, achei!"
80000123-18 = "Tcharam! ...O que achou!?"
80000123-19 = "[s1] \"Não sei nem o que dizer...\"\n[s2] \"O que é isso exatamente...?\""
80000123-22 = "Eu queria uma reação mais exagerada! #nIsso é uma \"Edição Extra Especial do Pandemonium Semanal\" feita exclusivamente para você, Sensei!?"
80000123-23 = "O segredo do chocolate de Dia dos Namorados é ser \"feito à mão\"!"
80000123-24 = "Ao registrar o seu estado mais belo em uma foto, você pode aproveitar o chocolate artesanal para sempre!"
80000123-25 = "[s] \"Entendo...\""
80000123-29 = "[ns] \"Mas, não parece nada com a foto...?\""
80000123-30 = "Como esperado de um leitor assíduo do \"Pandemonium Semanal\"! Você percebeu rápido!"
80000123-31 = "Para tirar fotos de comida que pareçam deliciosas, são necessárias várias técnicas!"
80000123-32 = "Por exemplo, você sabe qual é o truque para tirar uma foto de uma sopa deliciosa com ervas por cima?"
80000123-33 = "[s] \"Colocar bastante...?\""
80000123-34 = "Errado!"
80000123-35 = "Se você colocar muitas ervas, elas afundam na hora!"
80000123-36 = "A resposta correta é colocar um recipiente pequeno virado para baixo dentro da sopa e colocar as ervas em cima dele!"
80000123-37 = "[s] \"E a sopa?\""
80000123-38 = "É só tirar o recipiente e você pode beber!"
80000123-39 = "Como pode ver, por trás de uma boa foto, existem várias técnicas!"
80000123-40 = "Bem, este chocolate acabou endurecendo enquanto eu tirava a foto, mas..."
80000123-41 = "[s] \"E as técnicas!?\""
80000123-42 = "De qualquer forma! O sabor não mudou, e você tem uma foto bonita, então..."
80000123-43 = "Se você saborear os dois alternadamente, o prazer é dobrado!"
80000123-44 = "[s] \"...Será mesmo!?\""
80000123-46 = "(Enquanto eu comia o chocolate olhando para a foto, ainda um pouco cético--)"
80000123-47 = "(Chiaki observava a cena com um sorriso de satisfação)"
