[translation]
80000123-1 = "スイーツジャーナリズム"
80000123-2 = "では、こちらで記事にまとめさせてもらいま～す！"
80000123-3 = "これで、みんながドキドキするバレンタイン特集が組めますよ～！"
80000123-4 = "[s] \"ちょっと喋りすぎたかも……。\""
80000123-5 = "大丈夫ですって！みんな刺激的なエピソードが好きなんですから！"
80000123-6 = "早速、記事にまとめちゃいますね～！"
80000123-10 = "そうだ！バレンタインといえば、先生に渡すものがありまして……。"
80000123-11 = "「週刊[ruby=ぱんでも]万魔殿[/ruby]」の特集のため、自身のイメージを犠牲にしてまでお話してくれたお礼です！"
80000123-12 = "[s] \"そんな話したかな！？\""
80000123-13 = "気にしない気にしない！それより～"
80000123-14 = "あったあった！"
80000123-18 = "じゃじゃーん！……ご感想は！？"
80000123-19 = "[s1] \"感想って言われても……。\"\n[s2] \"これは一体……？\""
80000123-22 = "もっとオーバーなリアクションが欲しかったです！#nこれは先生専用の「週刊万魔殿 特別号外版」なんですよ！？"
80000123-23 = "バレンタインチョコは「手作り」がポイント！"
80000123-24 = "一番美しい状態を写真に残すことで、永久に手作りチョコを楽しめるわけです！"
80000123-25 = "[s] \"なるほど……。\""
80000123-29 = "[ns] \"でも、写真と全然違うような……？\""
80000123-30 = "さすが、「週刊万魔殿」の愛読者！よく気づきましたね！"
80000123-31 = "おいしいフード写真を撮るには、さまざまなテクニックが必要なんです！"
80000123-32 = "例えば、ちょこんとハーブが載った、美味しそうなスープの写真を撮るコツはわかりますか？"
80000123-33 = "[s] \"たっぷり載せる……？\""
80000123-34 = "ぶぶ～！"
80000123-35 = "ハーブをたっぷり載せると、すぐに沈んじゃうんです！"
80000123-36 = "正解は、中に小さい器を伏せて、その上に載せる！"
80000123-37 = "[s] \"じゃ、スープは？\""
80000123-38 = "器を取れば飲めますよ！"
80000123-39 = "このように、良い写真の裏には、様々なテクニックがあるんです！"
80000123-40 = "まあ、このチョコは撮っている間に固まっちゃったんですけど……"
80000123-41 = "[s] \"テクニックは！？\""
80000123-42 = "とにかく！味は落ちていませんし、良い写真もあるわけですし――"
80000123-43 = "交互に味わえば、お楽しみが2倍！ですから！"
80000123-44 = "[s] \"……そうかなあ！？\""
80000123-46 = "（半信半疑で、写真を見ながらチョコを食べていると――）"
80000123-47 = "（その姿を、チアキは嬉しそうに眺めていた）"
