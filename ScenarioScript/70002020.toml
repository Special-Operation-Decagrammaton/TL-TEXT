70002020-1 = "O Dia Brilhante de Kirara e Erika (2)"
70002020-5 = "Olá, olá~!"
70002020-6 = "É aqui que é a sala de descanso do Pande-mônio?"
70002020-7 = "Queríamos fazer um período experimental, pode ser?"
70002020-15 = "……Veio."
70002020-16 = "――Bem-vindas ao Pande-mônio."
