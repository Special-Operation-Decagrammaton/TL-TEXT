[translation]
70002020-1 = "O dia brilhante de Kirara e Erika (2)"
70002020-5 = "Halo halo~!"
70002020-6 = "A sala de descanso da Pandemonium Society é aqui mesmo?"
70002020-7 = "Queria fazer um teste de admissão, pode ser?"
70002020-15 = "……Bem-vindas."
70002020-16 = "――Bem-vindas à Pandemonium Society."
70002020-17 = "Concederei a vocês a honra de interagir com esta que vos fala, Makoto-sama, a presidente do conselho estudantil da Academia Gehenna."
70002020-22 = "Fomos concedidas~! É assim que se diz?"
70002020-23 = "Provavelmente."
70002020-24 = "Sinto que já te vi em algum lugar, você é a recepcionista?"
70002020-26 = "O quê……!? Recepcionista……!?"
70002020-27 = "Você quer dizer que…… não conhece esta que vos fala, Makoto-sama!?"
70002020-28 = "Eu sou a líder eterna e imortal da Pandemonium Society!#nA maior líder que um dia se tornará a governante de Kivotos, Makoto-sama!"
70002020-29 = "Hee, é mesmo?"
70002020-30 = "O que é essa pessoa…… que falta de educação……."
70002020-31 = "……Não. Não devo me deixar levar por novatas que ainda nem sabem distinguir o céu da terra."
70002020-32 = "Ehem. Voltando ao assunto……."
70002020-33 = "Kikiki……! Então vocês disseram que querem experimentar as atividades da minha Pandemonium Society."
70002020-34 = "Sejam bem-vindas! Kirara e Erika!"
70002020-35 = "Ué? Você sabe nossos nomes?"
70002020-36 = "Kishishi, obviamente."
70002020-37 = "Lembrar o nome de quem vem pessoalmente à nossa Pandemonium Society e ainda pede um teste de admissão……."
70002020-38 = "Para esta que vos fala, Makoto-sama, isso não é nada."
70002020-39 = "Kikiki…… Podem criar expectativas.#nQuem sabe, tornar-se um dos executivos da nossa Pandemonium Society no futuro não é um sonho――"
70002020-40 = "Hmm, acho que dispenso."
70002020-41 = "O quê!?"
70002020-42 = "Tsc. Entendo, então ainda é cedo demais para isso, é?"
70002020-43 = "Que há paisagens que só podem ser vistas justamente por ser uma subordinada…… hum."
70002020-44 = "Você já tinha previsto até isso, Yozakura Kirara……!"
70002020-45 = "Acho que não é bem assim……."
70002020-48 = "Sim, muito obrigada. Então vocês querem fazer um teste de admissão."
70002020-49 = "Mas um teste de admissão, como posso dizer…… vocês são pessoas bem peculiares."
70002020-51 = "O que a Pandemonium Society faz normalmente?"
70002020-52 = "Ouvi dizer que vocês têm um papel parecido com o de um conselho estudantil em Gehenna……."
70002020-53 = "Tipo, gerenciar o orçamento relacionado à administração da academia?"
70002020-55 = "Sim, temos esse tipo de trabalho também."
70002020-56 = "Além disso, como o rosto de Gehenna, cuidamos de assuntos externos e contratos com terceiros, mas……."
70002020-57 = "Bem, ultimamente…… o que mais fazemos é limpar a bagunça que a Makoto-senpai causa……."
70002020-58 = "Stare……."
70002020-59 = "Hm? O que foi, Iroha?#nTem algo além de dignidade no rosto da Makoto-sama?"
70002020-60 = "Não, não é nada.#nHaa……."
70002020-62 = "Parece ser bem difícil, hein."
70002020-66 = "Cheguei!"
70002020-67 = "Ué? As moças do clube de ir para casa?"
70002020-69 = "Hã?"
70002020-70 = "Ibuki-chan! Halo halo~!"
70002020-71 = "Oi, Ibuki-chan. Nos encontramos de novo."
70002020-72 = "Uau, as moças! Fico feliz em vê-las!#nVocês vieram brincar comigo?"
70002020-73 = "Isso mesmo! Hoje viemos fazer um teste de admissão♪#nBem, acho que é o mesmo que vir brincar!"
70002020-74 = "Sério? Oba!"
70002020-75 = "Faz tempo que não vejo a Ibuki, mas não parece nem um pouco."
70002020-76 = "Será que é porque vejo muitas fotos dela no 'Semanal Pandemonium'?"
70002020-78 = "Entendo... Então aquela revista semanal que a Makoto-senpai e a Chiaki fazem não era inútil."
70002020-79 = "Kukuku! Finalmente você entendeu o verdadeiro valor da Makoto-sama!"
70002020-80 = "Tá, tá..."
70002020-81 = "Bem..."
70002020-83 = "Ibuki~?"
70002020-84 = "Quem diria, tem pudim na geladeira, sabia?"
70002020-86 = "Falando nisso, Ibuki, você é boa em fazer malabarismo, né? Li no 'Semanal Pandemonium'!"
70002020-87 = "Pode mostrar pra gente se quiser?"
70002020-88 = "Tá bom!"
70002020-89 = "Vou ensinar as irmãs mais velhas a fazerem malabarismo também!"
70002020-90 = "Oba, malabarismo da Ibuki♪"
70002020-91 = "Vamos fazer ali."
70002020-97 = "……!"
70002020-98 = "I-Ibuki...?"
70002020-99 = "E o... pudim...?"
70002020-101 = "I-Ibuki!? Você está dizendo que prefere elas a mim!?"
70002020-102 = "N-não pode ser... não é verdade, né?"
70002020-103 = "Ibuki! D-diga que é mentira! Ibuki!!"
70002020-109 = "……."
70002020-110 = "Parece que hoje vai ser um dia tranquilo."
70002020-116 = "Brincar com a Ibuki foi super divertido!"
70002020-117 = "Acabamos gastando bastante tempo. Talvez a gente não chegue a tempo na próxima aula experimental, vamos nos apressar."
70002020-118 = "Ahaha, é verdade! Onde é a próxima mesmo?"
70002020-120 = "A próxima é..."
70002020-123 = "Bem-vindas ao Clube de Merenda de Gehenna!"
70002020-124 = "A aula experimental é bem-vinda!"
70002020-126 = "Uau! Que cheiro gostoso! Até fiquei com fome!"
70002020-127 = "Eu sempre vinha ao refeitório, mas acho que é a primeira vez que entro na cozinha."
70002020-129 = "É aqui que fazemos a comida de todo mundo. Bem-vindas à cozinha de Gehenna."
70002020-130 = "Aliás, vocês duas têm experiência com culinária?"
70002020-131 = "Hmm, acho que só faço um ensopado de carne de vez em quando."
70002020-132 = "Eu não sei fazer nada!"
70002020-134 = "Não tem problema! Vocês podem aprender a partir de agora!"
70002020-135 = "Hoje eu vou ensinar vocês!"
70002020-136 = "Desculpem, eu adoraria ajudar também, mas preciso preparar o jantar..."
70002020-137 = "Se pudéssemos transportar os ingredientes de uma vez no caminhão como sempre, não teria levado tanto tempo..."
70002020-138 = "O nosso..."
70002020-142 = "O nosso caminhão do Clube de Merenda...!"
70002020-143 = "F-Fuuka-senpai! Está tudo bem! Com certeza ele vai voltar... vai dar tudo certo!"
70002020-144 = "B-bem, é isso, então vou deixar o resto com a Juri."
70002020-145 = "Sim, pode deixar comigo! Vou ensinar tudo com cuidado, desde o básico!"
70002020-146 = "Obrigada. Então, vocês duas, fiquem à vontade..."
70002020-150 = "Então, por favor, venham comigo!"
70002020-151 = "Depois de conhecerem as instalações, vamos passar para a culinária prática."
70002020-153 = "É como se fosse o primeiro passo para ser a Chef Kirara, né? Estou ficando empolgada!"
70002020-156 = "Aqui é o interior da cozinha."
70002020-157 = "Ali é o armário de louças, aqui é a grelha... o fogão é este..."
70002020-159 = "Para quantas pessoas vocês costumam cozinhar nesta cozinha?"
70002020-161 = "Bem... talvez para alguns milhares de pessoas."
70002020-163 = "Hã!? Sério!?"
70002020-164 = "Ah, mas é verdade, o número de alunos que vem ao refeitório todo dia é impressionante."
70002020-165 = "Parece exaustivo."
70002020-166 = "No começo foi difícil, mas já me acostumei!"
70002020-167 = "Bem, então vamos começar a cozinhar!"
70002020-168 = "Hoje, primeiro... vamos fazer o prato básico: omurice!"
70002020-169 = "Uau...!"
70002020-180 = "E ao colocar no prato assim... Tcharam!"
70002020-182 = "E, então? O que acharam?"
70002020-186 = "Como esperado de uma veterana, tem um toque diferente—"
70002020-194 = "……Não, espera um pouco."
70002020-195 = "O omurice costuma ter essa cor?"
70002020-196 = "Hã? Não é assim?"
70002020-197 = "Quer dizer, isso está se mexendo, não está? O que você fez?"
70002020-198 = "Ahaha! Esse movimento sinuoso é meio estranho, mas fofinho!"
70002020-199 = "Hm? Saiu uma mão, é um cumprimento?"
70002020-200 = "Ei, espera um pouco, isso é realmente seguro?"
70002020-202 = "Ué, não é fofo? #nBate aqui!"
70002020-207 = "Eles se entenderam...!?"
70002020-211 = "Fiquei surpresa, mas..."
70002020-212 = "Bem, esse tipo de coisa é bem a cara da Kirara-chan."
70002020-213 = "Ué, Omu-chan?"
70002020-223 = "Ah, fugiu."
70002020-224 = "……O que é 'Omu-chan'? É o nome?"
70002020-225 = "Ei, espere um pouco! Omu-chan!"
70002020-226 = "……Ah, é o nome mesmo. E todo mundo já conhece."
70002020-227 = "Não fuja, por favor!?"
70002020-228 = "Es-espera aí!"
70002020-232 = "O Clube de Merenda também... passou por poucas e boas, hein."
70002020-233 = "Ahahaha! Foi bem divertido e engraçado!"
70002020-234 = "Omu-chaaaan!!"
70002020-236 = "(A experiência de admissão no Clube de Merenda foi interrompida por conveniência dos organizadores)"
70002020-241 = "Vocês são os candidatos para a experiência de admissão?"
70002020-243 = "Halo-halo~, eu sou a Kirara! Prazer em conhecê-los!"
70002020-244 = "Eu sou a Erika, prazer."
70002020-246 = "Sou Sena Himuro, chefe do Departamento de Medicina de Emergência."
70002020-247 = "É surpreendente que vocês também aceitem alunos para experiência."
70002020-248 = "Sempre parecem tão ocupados, achei que não tivessem tempo para isso."
70002020-249 = "Pelo contrário. É justamente por estarmos ocupados a ponto de ficar tontos que aceitamos a experiência."
70002020-250 = "Hã? É mesmo?"
70002020-251 = "Atualmente, conflitos entre delinquentes eclodiram no distrito, e vários cadáveres... #nquer dizer, feridos estão sendo trazidos."
70002020-253 = "Sem mais delongas, vocês atuarão como força de trabalho."
70002020-254 = "Hã, tudo bem? Nós não sabemos de nada, sabe?"
70002020-255 = "Colocar um curativo a gente até consegue, né?"
70002020-257 = "Não se preocupem, é claro que não pedirei nada difícil para quem não é especialista."
70002020-258 = "Enquanto eu preparo as injeções, vocês podem acalmar os feridos."
70002020-259 = "Então, preparem-se!"
70002020-261 = "Entendido~."
70002020-265 = "Bem... vamos tentar."
70002020-268 = "Ai…… ai……."
70002020-269 = "Droga, eu ainda consigo lutar, mas meu joelho……."
70002020-270 = "Chega de reclamar!#nSe continuarmos assim, nossa área vai ser tomada!"
70002020-272 = "Não é hora de ficar aí caída por causa de um ferimento!"
70002020-273 = "Certo!"
70002020-274 = "Vamos sair daqui logo! Sem que a chefe do Departamento de Medicina de Emergência perceba, na surdina!"
70002020-275 = "Sim! Chefe!"
70002020-280 = "Alô, alô~!#nO anjo de jaleco temporário, Kirara, chegou~!"
70002020-284 = "Q-quem é você!?"
70002020-286 = "Vim para o teste de admissão hoje. Vocês são os feridos?"
70002020-287 = "Prazer em conhecê-los~!"
70002020-289 = "Prazer o quê! Nós estamos indo embora agora mesmo!"
70002020-290 = "É isso aí! Não podemos ficar aqui para sempre!"
70002020-292 = "Hm? Não querem ser tratados?"
70002020-293 = "Esses ferimentos devem estar doendo bastante, não acham?"
70002020-294 = "E quem se importa com isso!"
70002020-295 = "Proteger nossa área é muito mais importante!"
70002020-297 = "É mesmo? Que área é essa?"
70002020-298 = "Aquele beco atrás da barraca, logo depois daquela encruzilhada ali."
70002020-299 = "Ah? Onde vende crepe? Eu conheço esse lugar!"
70002020-300 = "É muito gostoso, né!#nEu sou cliente frequente lá!"
70002020-302 = "E-eh, é mesmo? Que coincidência."
70002020-303 = "Eu sempre peço morango com sorvete e cobertura de gotas de chocolate, e você?"
70002020-304 = "Eu prefiro banana."
70002020-305 = "Você já provou a combinação de abacaxi com sorvete? É uma delícia!"
70002020-306 = "Sério? Só de ouvir já parece ser muito bom~!"
70002020-308 = "Eu não gosto de frutas, então prefiro biscoito de chocolate com chantilly extra!"
70002020-309 = "Ah, que bom! Vou experimentar na próxima♪"
70002020-310 = "Ah, é verdade! E aproveitando..."
70002020-315 = "Ah!? A chefe do Departamento de Medicina de Emergência!?"
70002020-325 = "Acabei... me distraindo com a conversa..."
70002020-331 = "Anestesia concluída."
70002020-332 = "Pode apontar uma arma para um paciente?"
70002020-333 = "É uma medida necessária para o tratamento.#nÀs vezes, para proteger algo, não há outra escolha."
70002020-334 = "……Vocês duas têm talento.#nConseguiram parar esses encrenqueiros com eficiência."
70002020-335 = "Bem, não foi planejado... foi mais por causa da Kirara..."
70002020-336 = "Eu queria ter ido comer crepe com eles..."
70002020-337 = "Por que não deixam seus contatos?#nQuando eles acordarem, podem ir juntos."
70002020-338 = "Ah, é verdade! Chefe, tudo bem?"
70002020-342 = "Normalmente, contatos pessoais com pacientes não são recomendados, mas..."
70002020-343 = "Desta vez abrirei uma exceção, como agradecimento pelo excelente trabalho de vocês."
70002020-344 = "Eba! Obrigada, chefe! Vou comprar um para a senhora também!"
70002020-345 = "Não, eu dispenso."
70002020-346 = "Que isso, não precisa ser tímida~!"
70002020-349 = "Ufa~! Foi divertido~!"
70002020-350 = "Eu não sabia que existiam tantos clubes!"
70002020-351 = "Graças a isso, ganhei muita experiência."
70002020-352 = "E então, você encontrou?"
70002020-353 = "Hm? O quê?"
70002020-354 = "Esqueceu o objetivo do seu teste de admissão?"
70002020-355 = "A Kirara-chan estava procurando um clube para entrar, não estava?"
70002020-356 = "Ah, é verdade! Esqueci completamente, ahaha!"
70002020-357 = "Hmm... todos foram super divertidos, né."
70002020-358 = "Fiz novos amigos e tive várias experiências!"
70002020-359 = "Pois é... de todos que experimentei, o que eu mais quero entrar..."
70002020-363 = "……Talvez não tenha nenhum!"
70002020-365 = "Hã?"
70002020-366 = "Você não disse agora pouco que foi super divertido?"
70002020-367 = "Sim! Foi super divertido! Fiquei muito empolgada!"
70002020-368 = "Brincar com a Ibuki-chan, entrar na cozinha do Clube de Merenda, #n cuidar dos pacientes!"
70002020-369 = "Tudo foi novo e divertido!"
70002020-370 = "Então por que não?"
70002020-371 = "Hmm... se for para escolher só um entre eles, isso é..."
70002020-372 = "Não seria um desperdício!?"
70002020-373 = "Um desperdício...?"
70002020-374 = "Olha só! Clubes são assim, né!"
70002020-375 = "Depois que entra, você acaba fazendo a mesma coisa todo dia, não é?"
70002020-376 = "Isso é bom, mas não combina muito comigo..."
70002020-377 = "Sinto que seria um desperdício."
70002020-378 = "……Entendi. A Kirara-chan quer fazer algo novo todo dia?"
70002020-379 = "Isso mesmo, como esperado da Erika-chan! Você é quem melhor entende meus sentimentos!"
70002020-380 = "Porque, para mim, isso parece ser o melhor dia a dia, brilhante e empolgante, sabe?"
70002020-381 = "Isso sim é que é juventude!"
70002020-386 = "Por exemplo, fazer novos amigos —"
70002020-394 = "Correr atrás de um caminhão —"
70002020-404 = "Ajudar um amigo que se perdeu —"
70002020-407 = "Eu quero fazer coisas assim, que não dá para prever!"
70002020-408 = "Mas isso não é o que você já faz como parte do Clube de Ir Para Casa...? Tem alguma diferença?"
70002020-409 = "Hmm~ é verdade, mas! #n Em um clube, a formalidade é importante!"
70002020-410 = "A flor da juventude é o clube, afinal♪"
70002020-411 = "É, será...?"
70002020-412 = "Mas, sendo assim, não parece existir um clube que a Kirara-chan queira, né?"
70002020-413 = "Pois é..."
70002020-414 = "Hmmmm..."
70002020-418 = "……Ah! Tive uma ideia!"
70002020-419 = "O que foi?"
70002020-420 = "Se não existe, é só criar um!"
70002020-421 = "Um clube brilhante!"
70002020-422 = "Um novo clube, cheio de surpresas e empolgação todos os dias!"
70002020-427 = "Criar, é... entendi. #n Uma conclusão bem a cara da Kirara-chan."
70002020-428 = "Então, qual vai ser o nome do clube?"
70002020-429 = "Hmm, quero que seja um clube empolgante e brilhante, então..."
70002020-431 = "É bem direto, mas que tal 'Clube Brilhante'?"
70002020-433 = "Sim! Gostei da sonoridade! O que acha, Erika-chan?"
70002020-434 = "Bem, é realmente direto, mas..."
70002020-435 = "Por que não? No fim das contas, parece ser a única opção."
70002020-436 = "Eu também concordo, Clube Brilhante."
70002020-437 = "Legal! Então, vamos tomar um chá de bolhas para comemorar a fundação!"
70002020-438 = "Hã, agora?"
70002020-439 = "Fazer o que queremos no momento em que pensamos é a nossa atividade de clube, né♪ #n E eu estou com sede também!"
70002020-440 = "……É, você tem razão. Bem, como sempre, né."
70002020-441 = "Então, vamos nessa!"
70002020-442 = "Eu encontrei uma loja nova!"
70002020-443 = "Tá, tá bom."
70002020-453 = "Nós somos o \"Clube Brilhante\"——"
70002020-454 = "Começando agora!"
70002020-458 = "O dia brilhante de Kirara e Erika"
