70002020-43 = "Ser um membro comum, não um líder, permite ver outras perspectivas…… hmm."
70002020-44 = "Você já tinha previsto isso, Yozakura Kirara……!"
70002020-45 = "Acho que não……"
70002020-48 = "Sim, obrigada. Período experimental, certo."
70002020-49 = "Mas pedir período experimental…… é algo, digamos…… incomum."
