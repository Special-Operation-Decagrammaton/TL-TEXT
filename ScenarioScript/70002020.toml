70002020-23 = "Acho que sim."
70002020-24 = "Acho que já vi você em algum lugar, você é a recepcionista?"
70002020-26 = "O quê……!? Recepcionista……!?"
70002020-27 = "Você não conhece…… esta Makoto-sama!?"
70002020-28 = "Eu sou a líder eterna e imortal do Pande-mônio!#nA maior líder que um dia dominará Kivotos, a Makoto-sama!"
70002020-29 = "Ah, é?"
70002020-30 = "Quem é esse…… que mal educado……"
