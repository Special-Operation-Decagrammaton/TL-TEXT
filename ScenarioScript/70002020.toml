70002020-72 = "Uau, são vocês! Que bom ver vocês!#nVieram brincar?"
70002020-73 = "Isso! Hoje viemos fazer período experimental♪#nBom, é quase a mesma coisa que brincar!"
70002020-74 = "Sério? Uhuuul!"
