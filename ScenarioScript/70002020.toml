70002020-57 = "Mas ultimamente…… tem sido mais limpar a bagunça que a Makoto-senpai faz……"
70002020-58 = "Olhar fixo……"
70002020-59 = "Hã? O que foi, Iroha.#nTem alguma coisa no rosto da Makoto-sama além de dignidade?"
70002020-60 = "Não, nada.#nHaa……"
70002020-62 = "Parece que é puxado."
70002020-66 = "Vol-tei!"
