[translation]
51150-1 = "Episódio 15; Encontro"
51150-3 = "[ns] \"Quem……?\""
51150-4 = "Ah! Essa sua cara."
51150-5 = "É a cara de quem não faz a menor ideia do que está acontecendo, não é?"
51150-6 = "É exatamente a expressão que eu imaginei e sonhei ver desde que ouvi falar de você, idêntica."
51150-7 = "Sinceramente…… é adorável. #nEu gostei muito, muuuito mesmo."
51150-8 = "Fico feliz por ter conseguido encontrar você, de quem tanto ouvi falar nos \"rumores\"."
51150-9 = "[s] （Rumores……?）"
51150-10 = "Hmm~? Por acaso, por acaso você está desconfiando de mim?"
51150-11 = "Essa sua aparência e tudo mais, você é exatamente como dizem os rumores."
51150-12 = "Nesse sentido também…… você é o Sensei, não é?"
51150-13 = "――Mesmo que esse sentido não signifique nada. Ah!"
51150-14 = "Ah…… é verdade, eu quase esqueci. #nVocê viu a carta?"
51150-15 = "[s] \"A carta, você diz…….\""
51150-19 = "＜Aviso a vocês＞"
51150-20 = "＜Nossa elegância não chegou ao fim, a beleza deve ser apreciada por muitos＞"
51150-21 = "＜Quando o entretenimento começar e vocês olharem para as flores que desabrocham no céu――＞"
51150-22 = "＜Mais uma vez―― visitaremos vocês＞"
51150-23 = "[s] \"Isso é…… o que o Clube Kachou Fuugetsu enviou……\""
51150-24 = "E aguardem ansiosamente."
51150-25 = "Quando nós aparecermos diante de vocês――"
51150-29 = "[log=???][ff4444]＜Vamos reduzir Hyakkiyako a cinzas＞[-][/log]"
51150-32 = "[ns] \"…………！？\""
51150-35 = "Ora, ora, ora? Então quer dizer que…… a mensagem não foi passada?"
51150-36 = "E olha que eram palavras que eu queria que chegassem até você……"
51150-37 = "Ah, entendi, aquela pessoa achou que não era necessário contar, não é?"
51150-38 = "――Que pessoa tola."
51150-39 = "[s] \"……Foi você quem enviou a carta do Clube Kachou Fuugetsu?\""
51150-40 = "Sim, sim. Exatamente."
51150-41 = "Se isso resolveu sua dúvida, eu fico muito, muuuito feliz."
51150-42 = "Bem…… não é como se isso fosse possível, né? Ahahaha!"
51150-43 = "Essa sua cara de bobo, como se não entendesse nada. #nSim, sim, é engraçado ver que você não consegue compreender."
51150-44 = "Agora, você entendeu o significado da sua pergunta……?"
51150-45 = "Mesmo sabendo a resposta, você não entende nada da essência. #nÉ uma pergunta extremamente tola."
51150-46 = "Então, então, agora é a minha vez, certo?"
51150-47 = "O \"Sensei\"…… vai responder às perguntas dos \"alunos\", não vai?"
51150-52 = "Você…… o Sensei do Schale――"
51150-53 = "――Você gosta de gatos?"
51150-54 = "[s] \"Ei…… o que você está……?\""
51150-55 = "Ahahaha! Não diga algo tão triste assim."
51150-56 = "Bem, mas é natural, né? #nDesde o início, essa conversa não tem significado algum."
51150-57 = "――O único motivo pelo qual eu vim visitar você é um só."
51150-59 = "O que será tecido a partir de agora é……"
51150-60 = "As \"Cem Histórias\" para a elegância."
51150-62 = "Hoje, após 20 anos de espera, finalmente todos os atores estão reunidos."
51150-63 = "Por isso―― acompanhe-me até o fim, está bem?"
51150-64 = "Até o momento em que a história chegar ao seu ponto final."
51150-70 = "[ns] \"E-espere……!\""
51150-74 = "[ns1] \"……O que seriam essas histórias?\"\n[ns2] \"Essa voz, parece que já ouvi antes…….\""
51150-81 = "Ah, Sensei!? Você está bem?"
51150-82 = "Como você não atendia o telefone... fiquei preocupado se algo tinha acontecido com você, Sensei!"
51150-83 = "[s3] \"Ah, estou bem... só aconteceu algo um pouco estranho.\"\n[s4] \"O que será? Será que fiquei tonto com a agitação do festival...?\""
51150-86 = "Hã...?"
51150-87 = "Ah, é verdade!#nEu encontrei a Yukari-san!"
51150-88 = "[s] \"Sério!?\""
51150-89 = "Só que tem um pequeno problema..."
51150-90 = "Não, talvez não seja um problema... hummm."
51150-91 = "É que... eu queria te encontrar pessoalmente para explicar!"
51150-92 = "Sensei, onde você está agora?"
51150-94 = "(Enquanto espero no local combinado com a Shizuko...)"
51150-99 = "Ah, Sensei!!"
51150-100 = "Finalmente te encontrei...!"
51150-101 = "Tinha tanta gente que foi um sufoco chegar até aqui. Ufa..."
51150-102 = "[s5] \"Bom trabalho. Então, o que você queria me falar pessoalmente?\"\n[s6] \"Ué, e a Yukari...?\""
51150-105 = "Bem, é verdade que encontrei a Yukari-san.#nMas, tem um certo contexto..."
51150-106 = "Pois é... bem, por onde eu deveria começar a explicar..."
51150-107 = "A história é um pouco longa, mas..."
51150-109 = "Eeeh, você vai ser a sacerdotisa...!?"
51150-115 = "Sim."
51150-116 = "Não, não, não, de jeito nenhum!#nIsso não é algo para se decidir por impulso!"
51150-117 = "Se você está preocupada com o que eu disse...#nAquilo foi só algo que eu falei por conta própria, antes de saber sobre o Hyakkiyako e a Yukari-san..."
51150-118 = "Que uma sacerdotisa era necessária..."
51150-119 = "I-isso é verdade, mas...! É um fato que a \"sacerdotisa da família Kadenokouji\" foi o centro do festival de 20 anos atrás... então eu acho que a presença de uma sacerdotisa é importante desta vez também, mas...!"
51150-120 = "M-mesmo assim, não desse jeito...!"
51150-121 = "Quanto a isso, não precisa se preocupar.#nEu também não decidi por impulso."
51150-125 = "...Eu estive pensando nisso o tempo todo."
51150-126 = "Se não posso voltar àquela época... se ninguém deseja isso."
51150-127 = "Aquilo foi, desde o início, apenas uma ilusão."
51150-128 = "...Então, eu farei o que \"deve ser feito\"."
51150-129 = "Porque esse é o \"dever da família Kadenokouji\"."
51150-131 = "Ma-mas...!"
51150-132 = "Shizuko-san. Você poderia transmitir ao Sensei... um pedido de desculpas da minha parte?"
51150-133 = "Como a Kikyou-senpai disse... eu estava mentindo para o Sensei."
51150-134 = "Fui egoísta até o fim... interpretei o papel de alguém que se esforçava pelo Hyakkiyako."
51150-135 = "No fim das contas, acabei enganando o Sensei."
51150-136 = "...O Sensei certamente não me culparia. Ele é esse tipo de pessoa."
51150-137 = "Sim. Se for ele, com certeza..."
51150-138 = "Mas esta é a minha decisão.#nSei que é muito egoísta da minha parte, depois de pedir ajuda na batalha de sucessão..."
51150-139 = "\"Parar com o egoísmo e apenas voltar ao meu lugar original\"."
51150-144 = "Por favor, diga a ele por mim... que \"agora está tudo bem\"."
51150-150 = "A Yukari-san pediu desculpas ao Sensei até o fim. Disse que não tinha coragem de encará-lo."
51150-151 = "[s] \"Então foi por isso que ela foi direto para o local do festival...\""
51150-152 = "Sensei..."
51150-153 = "Será que a culpa é minha?"
51150-154 = "Será que a Yukari-san desistiu porque eu fui visitar o Hyakkiyako...?"
51150-155 = "Não, na verdade..."
51150-156 = "Será que foi porque eu tentei recriar o festival?"
51150-157 = "[s] \"Não, a culpa não é sua, Shizuko.\""
51150-159 = "[ns7] \"Mesmo que o festival tenha sido o gatilho...\"\n[ns8] \"Você não teve más intenções, Shizuko.\""
51150-162 = "[ns9] \"E como você veio até aqui...\"\n[ns10] \"Eu sou muito grato.\""
51150-167 = "N-não...! Eu só senti que, como presidente do comitê organizador do festival, era minha responsabilidade...!"
51150-168 = "[s] \"...Certo, então vou deixar a Yukari aos cuidados da Shizuko por enquanto.\""
51150-169 = "Eh, e o Sensei...?"
51150-170 = "Vai ouvir um pouco mais sobre a Hyakkiyako...?"
51150-171 = "[s] \"Afinal, o meu objetivo original não era 'presenciar a sucessão'.\""
51150-174 = "[ns11] \"Se o pessoal da Hyakkiyako está carregando preocupações...\"\n[ns12] \"Eu quero ouvi-las.\""
51150-177 = "[ns] \"Além disso, a Shizuko também disse, não é?\""
51150-179 = "――Algo que faça com que todos sorriam."
51150-180 = "Eu adoraria que o festival se tornasse algo assim... de verdade."
51150-181 = "[s] \"Sim. Para isso, eu também vou me esforçar.\""
51150-182 = "Sensei..."
51150-183 = "[ns] \"E também tem algo que está me incomodando um pouco.\""
51150-189 = "[ns13] \"De qualquer forma, Kikyou, Renge e Yukari...\"\n[ns14] \"Deve haver um motivo para o desentendimento entre essas três.\""
51150-193 = "A Nagusa-san... é isso?"
51150-194 = "Aquela que escolheu não permanecer na Hyakkiyako como vice-presidente, mas sim devolver o emblema da presidência."
51150-195 = "[s] \"Sim, por isso preciso encontrar a Nagusa primeiro.\""
51150-196 = "Uuuuh... Entendido."
51150-197 = "Se o Sensei insiste tanto, pode deixar o caso da Yukari-san comigo."
51150-198 = "Quando me pedem algo, eu, Kawa Shizuko, faço com perfeição!"
51150-199 = "Vou transformar a Yukari-san em uma sacerdotisa impecável!"
51150-200 = "Sensei, aguarde ansiosamente pela dança também!"
51150-201 = "[s] \"Conto com você, Shizuko.\""
51150-205 = "[ns] \"O problema é como encontrar a Nagusa, mas...\""
51150-210 = "[ns] \"Ah... falando nisso.\""
51150-220 = "Nós vamos procurar a Nagusa...?"
51150-221 = "[s] \"Pensei que poderia pedir isso às três que já se encontraram com a Nagusa.\""
51150-222 = "Com certeza, no meio dessa multidão, não há ninguém além do Clube de Pesquisa de Ninjutsu que consiga encontrá-la! ...é o que eu também acho."
51150-224 = "Sim! N-nós já nos encontramos com a Nagusa-san antes, então..."
51150-225 = "Então somos as pessoas certas para o trabalho! Presidente, Tsukuyo-dono!"
51150-227 = "A propósito... por que você está procurando por ela?"
51150-228 = "[s15] \"Tem uma aluna que quero ajudar...\"\n[s16] \"Mas sozinho, não tenho força o suficiente.\""
51150-231 = "[ns17] \"Quero pedir a ajuda do Clube de Pesquisa de Ninjutsu...\"\n[ns18] \"Será que não pode?\""
51150-234 = "Para ajudar uma aluna... um motivo digno do Sensei-dono!"
51150-235 = "Nesse caso, não há motivos para recusar, certo?"
51150-236 = "Tsukuyo, Izuna!"
51150-239 = "Sim!!"
51150-241 = "Nós, o Clube de Pesquisa de Ninjutsu! Recebemos o desejo do Sensei-dono com toda a seriedade!!"
51150-242 = "Sendo assim, todo o Clube de Pesquisa de Ninjutsu!"
51150-243 = "Entra em ação...!"
51150-244 = "Missão iniciada! Nin-nin!"
51150-246 = "Próximo episódio: Goryou Nagusa"
