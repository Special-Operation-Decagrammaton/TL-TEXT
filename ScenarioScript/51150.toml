[translation]
51150-1 = "第15話;遭遇"
51150-3 = "[ns] \"誰……？\""
51150-4 = "アハッ！そのお顔。"
51150-5 = "まったく身に覚えがない、という顔ですねぇ。"
51150-6 = "手前様のことを聞いた時からずうっとずうっと思い描いてきた表情、そ～っくり。"
51150-7 = "本当に……愛らしいですわぁ。#nとても、とて～も、気に入りました。"
51150-8 = "「噂」に聞く手前様に、お会いできて良かったです。 "
51150-9 = "[s] （噂……？）"
51150-10 = "ん～？もしかしてもしかして、怪しまれたりしちゃってますぅ？"
51150-11 = "そのお姿然り、本当に噂通りの方。"
51150-12 = "そういった意味でも……先生？なんですねぇ。"
51150-13 = "――その意味を成さないとしても、ですけどぉ。アハッ！"
51150-14 = "ああ……そうだそうだ、忘れるところでしたぁ。#nお手紙、ご覧になりました？"
51150-15 = "[s] \"手紙、って……。\""
51150-19 = "＜そなたらに告げる＞"
51150-20 = "＜我々の風流は終わってなどいない、風情は大勢で味わうべきもの＞"
51150-21 = "＜お楽しみが始まり、空に咲いた花を見上げたその時に――＞"
51150-22 = "＜もう一度――そなたらの元を訪ねよう＞"
51150-23 = "[s] \"それは……たしか花鳥風月部が送ってきた……\""
51150-24 = "そして心待ちにするが良い。"
51150-25 = "我々がそなたらの前に姿を現す時――"
51150-29 = "[log=???][ff4444]＜百鬼夜行を燃やし尽くしてやろう＞[-][/log]"
51150-32 = "[ns] \"…………！？\""
51150-35 = "おやおやおやぁ？やっぱり……伝わってなかったんですねぇ？"
51150-36 = "手前様に届いてほしい言葉だったのですが……"
51150-37 = "ああ、あの人は伝える必要がない、と考えたんですねぇ？"
51150-38 = "――愚かな人。"
51150-39 = "[s] \"……君が、花鳥風月部の手紙を送った張本人？\""
51150-40 = "ええ、ええ。そうですよぉ？"
51150-41 = "疑問が解消できたのなら、手前はとてもとて～も嬉しいです。"
51150-42 = "まぁ……そんなはずありませんよねぇ。アハハッ！"
51150-43 = "訳がわからないといった間抜け顔。#nうんうん、理解ができなくて笑えますねぇ。"
51150-44 = "これで、手前様の質問の意味……分かりましたぁ？"
51150-45 = "解答を知ったところで、本質は何も分かっていないのですから。#n愚問極まりないのですよぉ。"
51150-46 = "それではそれでは、今度は手前の番ですよぉ？"
51150-47 = "「先生」は……「生徒」の質問に答えてくださりますよねぇ？"
51150-52 = "手前様……シャーレの先生は――"
51150-53 = "――猫、お好きですかぁ？"
51150-54 = "[s] \"えっと……一体何を……？\""
51150-55 = "アハハッ！そんな寂しいこと言わないでくださいよぉ。"
51150-56 = "まぁでも、当然ですよねぇ。#n最初からこの会話に意味なんて無いのですからぁ。"
51150-57 = "――手前が手前様を訪ねてきた理由はただ一つ。 "
51150-59 = "これより紡がれるは……"
51150-60 = "風流のための「[ruby=かいだん]百物語[/ruby]」。"
51150-62 = "20年という歳月を経て再び訪れ[ruby=こんにち]た今日、[/ruby]ついについに役者が揃ったのです。 "
51150-63 = "ですから――最後までお付き合いくださいねぇ？"
51150-64 = "物語が終止符を打つ、その時まで。"
51150-70 = "[ns] \"ま、待って……！\""
51150-74 = "[ns1] \"……かいだんって、何だろう。\"\n[ns2] \"今の声、聞き覚えがあるような……。\""
51150-81 = "あっ、先生！？大丈夫ですか？ "
51150-82 = "ずっと電話に出ないから……#n先生の身に何かあったんじゃないかと心配しましたよ！"
51150-83 = "[s3] \"あ、大丈夫……ちょっと不思議なことがね。\"\n[s4] \"何だろう、お祭りの熱気でのぼせちゃったのかな……。\""
51150-86 = "へ……？ "
51150-87 = "あ、そうだ！#n私、ユカリさんを見つけました！"
51150-88 = "[s] \"本当！？\""
51150-89 = "ただちょっと問題があって……"
51150-90 = "いや、問題ではないのかな……ううーん。"
51150-91 = "その……ちょっと、直接会ってご説明したいです！"
51150-92 = "先生、今どちらにいらっしゃいますか？"
51150-94 = "（シズコとの待ち合わせ場所で待っていると……）"
51150-99 = "あっ、先生っ！！"
51150-100 = "やっと、見つけた……！"
51150-101 = "人が多すぎて、ここにたどり着くのもひと苦労でした。うう……"
51150-102 = "[s5] \"お疲れ様。それで、直接話したいことって？\"\n[s6] \"あれ、ユカリは……？\""
51150-105 = "えっと、ユカリさんを見つけたのは本当です。#nただ、ちょっと事情があって……"
51150-106 = "そうですね……えっと、どこから説明すればいいのか……"
51150-107 = "ちょっと話は長くなってしまいますが……"
51150-109 = "ええっ、巫女をやってくださるんですか……！？"
51150-115 = "ええ。"
51150-116 = "いやいやいや、そんな！#n勢いで決めるようなものじゃないですよ！"
51150-117 = "もし私の言葉を気にしてるなら……#nあれは、百花繚乱やユカリさんのことを知る前に、私が勝手に話しただけなので……"
51150-118 = "巫女が必要だと……"
51150-119 = "そ、それはそうだけど……！20年前のお祭りで「勘解由小路家の巫女」が中心となっていたのは本当なので……今回も巫女様の存在が重要だとは思っていますが……！"
51150-120 = "だ、だからといってこんな形は……！"
51150-121 = "それなら心配はいりませんわ。#n身共も、勢いで決めたわけではありません。"
51150-125 = "……ずっと考えておりました。"
51150-126 = "あの頃に戻れないのなら……誰も望んでいないのなら。"
51150-127 = "アレは初めから、ただの幻だったのです。"
51150-128 = "……ならば身共は「為すべきこと」をいたします。"
51150-129 = "それが――「勘解由小路の責務」ですから。"
51150-131 = "で、でもっ……！"
51150-132 = "シズコさん。先生には……ごめんなさい、と身共の代わりに伝えていただけないでしょうか。"
51150-133 = "キキョウ先輩の言う通り……身共は、先生に嘘をついておりました。"
51150-134 = "どこまでも自己中心的に……百花繚乱のために頑張る自分を、演じたのです。"
51150-135 = "結果的に、身共は先生を騙した形になります。"
51150-136 = "……先生は、きっと責めたりはしません。そんな方ですから。"
51150-137 = "ええ。あの方ならきっと……。"
51150-138 = "ですが、これが身共の決断ですの。#n継承戦を手伝ってほしいと言っておいて、本当に身勝手だと思っておりますが……"
51150-139 = "「わがままをやめて、元の場所に戻るだけ」。"
51150-144 = "「もう大丈夫だから」と……どうか、身共の代わりに[ruby=ことづ]言伝[/ruby]てを。"
51150-150 = "ユカリさんは最後まで先生に謝っていました。合わせる顔がないと。"
51150-151 = "[s] \"それで先にお祭り会場へ向かったんだね……。\""
51150-152 = "先生……"
51150-153 = "もしかして私のせいでしょうか？"
51150-154 = "私が百花繚乱を訪ねたから……ユカリさんは諦めちゃったのでしょうか。"
51150-155 = "いや、そもそも……"
51150-156 = "私がお祭りを再現しようとしたから、でしょうか。"
51150-157 = "[s] \"違うよ、シズコのせいじゃない。\""
51150-159 = "[ns7] \"お祭りがきっかけだったとしても……\"\n[ns8] \"シズコに悪気があったわけじゃないし。\""
51150-162 = "[ns9] \"こうやってシズコが来てくれて……\"\n[ns10] \"私は感謝してるよ。\""
51150-167 = "い、いえ……！私は、お祭り運営委員長として、責任を感じただけで……！"
51150-168 = "[s] \"……よし、それじゃあユカリのことは一旦シズコに任せるね。\""
51150-169 = "えっ、先生は……？"
51150-170 = "百花繚乱の話を、もう少し聞きにいく……？"
51150-171 = "[s] \"そもそも「継承戦の立ち会い」が目的じゃなかったからね。\""
51150-174 = "[ns11] \"百花繚乱のみんなが悩みを抱えているなら……\"\n[ns12] \"それを聞いてあげたいんだ。\""
51150-177 = "[ns] \"それに、シズコも言ってたよね。\""
51150-179 = "――みんなが笑顔になるような。"
51150-180 = "そんなお祭りになってほしい……ですね。"
51150-181 = "[s] \"そう。そのために、私も頑張るよ。\""
51150-182 = "先生……。"
51150-183 = "[ns] \"それに、ちょっと気になることもあって。\""
51150-189 = "[ns13] \"いずれにしても、キキョウとレンゲ、ユカリ……\"\n[ns14] \"この3人がすれ違った原因があるだろうから。\""
51150-193 = "ナグサさん……ですね？"
51150-194 = "副委員長として百花繚乱に残るのではなく、#n委員長の証を返却する道を選んだ方。"
51150-195 = "[s] \"うん、だからまずはナグサに会わないと。\""
51150-196 = "ううーん……分かりました。"
51150-197 = "先生がそこまでおっしゃるのなら、ユカリさんの件はお任せください。"
51150-198 = "任されたら何だって完璧にこなすのが、[ruby=かわわ]河和[/ruby]シズコなので！"
51150-199 = "ユカリさんを完璧な巫女様に仕上げてみせます！"
51150-200 = "先生も、舞を楽しみにしていてくださいね！"
51150-201 = "[s] \"よろしくね、シズコ。\""
51150-205 = "[ns] \"問題はナグサをどうやって探すか、だけど……\""
51150-210 = "[ns] \"あ……そういえば。\""
51150-220 = "ナグサを私たちが探す……？"
51150-221 = "[s] \"ナグサと会ったことがある3人になら、お願いできるかなって。\""
51150-222 = "たしかに、この人混みの中で彼女を見つけられるのは、忍術研究部の他にいない！……って、私も思うけど。"
51150-224 = "はい！わ、私たちはナグサさんと……お、お会いしたことがありますから……"
51150-225 = "適任！というわけですね？部長、ツクヨ殿！"
51150-227 = "ところで……どうして彼女を探してるの？"
51150-228 = "[s15] \"助けたい子がいるんだけど……\"\n[s16] \"私一人じゃ力不足で。\""
51150-231 = "[ns17] \"忍術研究部の力を借りたいんだけど……\"\n[ns18] \"ダメかな？\""
51150-234 = "生徒を助けるため、と……まさに先生殿らしい理由！"
51150-235 = "それなら断る理由はないね？"
51150-236 = "ツクヨ、イズナ！"
51150-239 = "はい！！"
51150-241 = "我ら、忍術研究部！#n先生殿の思い、しかと受け取ったり！！"
51150-242 = "ということで、忍術研究部一同！"
51150-243 = "さ、参戦……！"
51150-244 = "任務開始です！ニンニン！"
51150-246 = "次回;[ruby=ごりょう]御稜[/ruby]ナグサ"
