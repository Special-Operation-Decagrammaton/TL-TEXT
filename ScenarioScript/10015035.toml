[translation]
10015035-6 = "……A sabotagem está seguindo conforme o planejado?"
10015035-7 = "Sem problemas. O composto explosivo do Departamento de Desenvolvimento de Novos Materiais destruiu os robôs que seriam usados no Festival Esportivo."
10015035-8 = "A menos que construam novos, será impossível consertar os robôs antes da cerimônia de abertura."
10015035-9 = "Certo, muito bem. #nComo está o plano de hackear o servidor da escola para causar uma falha na comunicação?"
10015035-10 = "Sobre isso... a ferramenta de hack que preparamos foi bloqueada pelo sistema de segurança e acabou sendo totalmente neutralizada..."
10015035-11 = "Qual é... você tem ideia de quanto custou preparar aquela ferramenta de hack?"
10015035-12 = "Não tem como evitar! O oponente é a vice-diretora da Veritas, sabia?"
10015035-13 = "Como nós, que somos iniciantes, vamos enfrentar alguém que nem mesmo o Seminar consegue superar em termos de segurança? #n"
10015035-14 = "Tsc... não tem jeito. Vamos desistir da sabotagem via rede de comunicação..."
10015035-15 = "Mas só isso ainda não é o suficiente para quebrar a vontade do Seminar... #nSerá que não existe outro jeito?"
10015035-16 = "Bem, não é exatamente um substituto, mas... #nEu encontrei isto na sala de prática industrial..."
10015035-23 = "Se for este 'robô', ele ainda não deve estar registrado na nuvem de segurança, então talvez a ferramenta de hack funcione, não acha?"
10015035-24 = "Nada mal. #nA propósito, quando foi que o Departamento de Engenharia desenvolveu um 'robô de combate' como este?"
10015035-25 = "A origem não importa. #nSe conseguirmos hackear este robô, poderemos cancelar o Grande Festival Esportivo sem precisar sujar as mãos."
10015035-26 = "Sinto muito pelo Seminar, que se preparou tanto para o Grande Festival Esportivo, mas não temos escolha..."
10015035-27 = "Para não aumentar o número de 'vítimas'..."
10015035-29 = "Precisamos cancelar o 'Grande Festival Esportivo'!"
