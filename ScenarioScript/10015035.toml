[translation]
10015035-6 = "……サボタージュは計画通りに進んでる？"
10015035-7 = "問題ない。新素材開発部の複合爆発物質が「[ruby=こうりんたいさい]晄輪大祭[/ruby]」で使う予定のロボットをぶち壊したよ。"
10015035-8 = "新しく作りでもしない限り、開会式までにロボットを修理するのは不可能だろうね。"
10015035-9 = "そう、よくやったわ。#n校内のサーバーをハッキングして通信障害を起こす計画はどう？"
10015035-10 = "それが……準備したハッキングツールがセキュリティシステムに阻まれて、全部無力化されちゃって……。"
10015035-11 = "ちょっと……そのハッキングツールを準備するのに、いくらかかったと思ってんの？"
10015035-12 = "仕方ないでしょ！相手はあのヴェリタスの副部長だよ？"
10015035-13 = "セミナーでさえセキュリティ関連では太刀打ちできないような相手を、#n私たちのような初心者がどう相手するのさ？"
10015035-14 = "チッ……仕方ないわね。通信網を利用したサボタージュは諦めて……"
10015035-15 = "でも、これだけじゃ、セミナーの意志を挫くにはまだ足りない……#n他に方法はないのかしら。"
10015035-16 = "えっと、代わりというにはアレだけど……#n工業実習室の方でこんなものを見つけたんだ……"
10015035-23 = "この「ロボット」なら、まだセキュリティクラウドに登録されてないはずだからハッキングツールが使えるんじゃないかな？"
10015035-24 = "悪くないね。#nところで、エンジニア部はいつの間にこんな「戦闘用ロボット」を開発したの？"
10015035-25 = "出所はどうでもいいでしょ。#nこのロボットのハッキングに成功すれば、直接手を使わず大運動会を中止させることができるわね。"
10015035-26 = "大運動会の準備してきたセミナーには申し訳ないけど、仕方がないの……"
10015035-27 = "これ以上の「被害者」を増やさないためにも……"
10015035-29 = "「大運動会」を中止させなきゃ！"
