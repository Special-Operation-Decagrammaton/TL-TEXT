[translation]
2101-1 = "Quem foi chamado, por favor, permaneça aqui (1)"
2101-2 = "Abydos - Periferia"
2101-6 = "Haa, haa..."
2101-7 = "Tá tão quente...! A gente já não andou o suficiente? Será que esse é o caminho certo?"
2101-8 = "Não deveria ser uma distância tão grande assim..."
2101-9 = "Pelo mapa, esta direção parece estar correta... mas já devemos ter caminhado uns 30km e ainda não chegamos."
2101-10 = "30km!? Isso já é a distância de uma maratona, não é!?"
2101-11 = "...Mas, se forem só uns 30km,"
2101-12 = "O padrão da veterana Shiroko não serve de referência, então fica quieta."
2101-13 = "...Hmm."
2101-14 = "O tio aqui está com a lombar ruim, não tenho mais idade para essas marchas forçadas cheias de energia..."
2101-15 = "Por isso eu digo, vocês quase não têm diferença de idade!!"
2101-16 = "E aliás, vocês têm noção do motivo de estarmos nessa situação!?"
2101-17 = "A culpa é toda de vocês, né!?"
2101-18 = "Hmm..."
2101-19 = "Uhee~."
2101-20 = "Aha~☆"
2101-21 = "Pelo menos finjam que estão arrependidas!!"
2101-22 = "Bem, dentro desse \"vocês\", talvez eu também esteja um pouco incluída..."
2101-23 = "Nossa, fazia tempo que eu não via a Ayane-chan tão brava assim...!"
2101-25 = "(Voltando um dia, na sala do Comitê de Contramedidas)"
2101-26 = "..."
2101-27 = "..."
2101-28 = "..."
2101-29 = "..."
2101-30 = "..."
2101-31 = "...Bem."
2101-32 = "Quem foi que apresentou a \"Operação: Investir todo o fundo restante na loteria, a vida é uma aposta única~\"?"
2101-33 = "Foi o tio que apresentou essa!"
2101-34 = "..."
2101-35 = "Quem foi que apresentou o \"Plano: 15 métodos para capturar estudantes como reféns e forçar a transferência delas\"?"
2101-36 = "Eu."
2101-37 = "............"
2101-38 = "A viabilidade já foi analisada. Mirando no horário da assembleia da escola vizinha, invadindo o auditório e..."
2101-39 = "Err, Ayane...?"
2101-40 = "Quem foi que apresentou o \"Cronograma de viagem: Vamos todos fazer um piquenique neste fim de semana☆\"?"
2101-41 = "Opa, fui eu!"
2101-42 = ".............."
2101-43 = "Ué, tem algo de errado?"
2101-44 = "Pelo que o tio vê, isso aqui tá com um clima meio perigoso, hein~."
2101-45 = "Veteranas, vocês estão brincando com a minha cara!?"
2101-46 = "Eu pedi para trazerem as diretrizes de atividades do comitê, por que raios vocês trouxeram coisas sobre loteria, planos criminosos e viagens!?"
2101-47 = "Pensem com mais seriedade! A testa da Ayane-chan já está ficando toda franzida, olha só!"
2101-48 = "...Kuromi Serika-san, ainda tem mais uma."
2101-49 = "A-Ayane-chan...? Por que você começou a falar formalmente de repente...?"
2101-50 = "Por último, quem trouxe o \"Manual de investimento empresarial em fazendas de petróleo renovável\"?"
2101-51 = "F-fui eu, mas..."
2101-52 = "..."
2101-53 = "M-mas Ayane-chan! Isso é um negócio legítimo, e no panfleto que recebi na palestra dizia que o lucro era garantido..."
2101-54 = "Serika-chan, petróleo não é algo que se cultiva em fazendas, é algo que se extrai cavando o solo..."
2101-55 = "I-Isso eu também sei! Mas o tal do Petróleo Ponzi que foi descoberto recentemente..."
2101-56 = "……."
2101-59 = "Já chega disso, por favor!!!!!"
2101-66 = "……"
2101-67 = "……Bem,"
2101-68 = "já era de se esperar, né."
2101-70 = "Nossa, fazia tempo que eu não ficava com medo da Ayane-chan daquele jeito."
2101-71 = "Hum... e olha que eu até tinha feito uma simulação..."
2101-72 = "Eu só queria que todos tivessem um pouco mais de tranquilidade mental..."
2101-73 = "É por isso que as coisas chegaram a esse ponto, porque vocês ficam brincando em momentos sérios!"
2101-74 = "Uhe~, mas não parece que a culpada foi a Serika-chan? Parecia que foi você quem deu o empurrão final para a Ayane-chan explodir, não foi?"
2101-75 = "E-Eu!?"
2101-76 = "Ela estava com uma cara de quem pensava: 'Eu confiava em você, até você, Serika-chan...'"
2101-77 = "I-Isso é...!"
2101-78 = "A Ayane-chan é super apegada à Serika-chan, então o choque deve ter sido grande, né."
2101-79 = "……!!"
2101-81 = "Haa... haa..."
2101-82 = "Pessoal..."
2101-83 = "Por favor, comportem-se um pouco melhor..."
2101-85 = "Nossa, parecia até um pai dando bronca em filho que não trabalha e fica de preguiça em casa, né."
2101-86 = "E o exemplo concreto desse 'comportar-se' é esse bico de limpeza."
2101-87 = "O trabalho era limpar o lixo acumulado no ginásio para o festival cultural de amanhã, certo?"
2101-88 = "Como será que ela achou esse bico? Nossa, a Ayane-chan é uma menina tão planejada."
2101-89 = "A Ayane-chan sempre se esforça sozinha, fico preocupada que ela acabe se sobrecarregando às vezes..."
2101-90 = "Por isso que, como resultado, a Ayane-chan acabou ficando de cama por causa do estresse hoje!"
2101-91 = "Se ela tivesse vindo com a gente como planejado, não estaríamos perdidas assim!"
2101-92 = "Tudo bem, tudo bem~. Já que estamos aqui, vamos deixar a Ayane-chan descansar em casa."
2101-93 = "Pensando bem, talvez seja uma chance de ouvir a Ayane-chan dizer: 'Viram só, vocês conseguem quando querem!'"
2101-94 = "Já que estamos aqui, temos que mostrar que, pelo menos uma vez, conseguimos fazer as coisas direito sozinhas."
2101-95 = "……Embora eu pense isso de verdade, é longe demais~. Alguém me carrega nas costas, por favor~."
2101-96 = "Todas nós estamos cansadas igual! Meu Deus, faz quantas horas que estamos andando..."
2101-97 = "Ah! Olhem aquilo!"
2101-98 = "……!"
2101-100 = "Ginásio com reforma ilegal"
2101-101 = "……"
2101-102 = "？"
2101-103 = "……？"
2101-104 = "(Q-Que isso? Isso é um ginásio?)"
2101-105 = "Uhe~, esse é o ginásio de destino... será? Mais parece..."
2101-106 = "Quem são vocês! De onde vocês vieram!!"
2101-108 = "……!!"
2101-109 = "O que vocês querem! Por acaso vocês são os donos desse ginásio!?"
2101-110 = "Que pena, este lugar já foi ocupado por nós! Se não quiserem se dar mal, é melhor desistirem desse ginásio!"
2101-111 = "Não importa quem sejam, nós não teremos piedade! Gehehehehe!"
2101-112 = "……Q-Quem são esses caras? Estão sendo agressivos do nada..."
2101-117 = "Ah~..."
2101-118 = "Entendi, então é isso~."
2101-119 = "……Entendo, eu também compreendi."
2101-120 = "S-Shiroko-senpai? Por que você tirou uma bomba!?"
2101-121 = "……Aha☆ eu também entendi~."
2101-122 = "Hã……?"
2101-124 = "Vou pedir para vocês fazerem um trabalho de verdade."
2101-125 = "É um trabalho de meio período limpando o lixo do ginásio. É uma tarefa simples, afinal."
2101-127 = "“Limpar o lixo do ginásio”, foi o que a Ayane disse."
2101-128 = "……Lixo?"
2101-129 = "Nossa, a Ayane-chan também tem cada uma. Para nós, isso pode ser um trabalho bem simples, não é?"
2101-130 = "……E-espera!? V-você não quer dizer que……?"
2101-131 = "Senpai!?"
2101-135 = "Não vamos perder tempo, vamos começar."
2101-136 = "Limpeza de lixo."
2101-137 = "É hora do castigo~☆"
2101-139 = "Fiuuu……!"
2101-140 = "BUM☆"
