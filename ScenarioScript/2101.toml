[translation]
2101-1 = "呼ばれた人は残ってください（１）"
2101-2 = "アビドス・外郭"
2101-6 = "はあ、はあ……。"
2101-7 = "あっつい……！もう結構歩いてない？この道で合ってるの？"
2101-8 = "そんな大した距離じゃなかったはずなんだけど……。"
2101-9 = "地図ですとこの方向で合っているようなのですが……30kmぐらい歩いたはずなのに、まだ見えてきませんね。"
2101-10 = "30km！？もうマラソンの距離じゃん！？"
2101-11 = "……でも、30kmぐらいだったら、"
2101-12 = "シロコ先輩の基準は参考にならないから黙ってて。"
2101-13 = "……うーん。"
2101-14 = "おじさん腰が悪いし、もうこんな元気に強行軍できる歳じゃないんだけどな～。"
2101-15 = "だから、ほとんど歳変わらないでしょ！！"
2101-16 = "っていうか、こんなことになった原因分かってる！？"
2101-17 = "自分たちのせいでしょ！？"
2101-18 = "ん……。"
2101-19 = "うへ～。"
2101-20 = "あは～☆"
2101-21 = "ちょっとは申し訳なさそうな顔をして！！"
2101-22 = "まあ、その「自分たち」の中には私も、多少入ってるかもしれないけど……。"
2101-23 = "全く、あんなに怒ってるアヤネちゃん久しぶりに見たわよ……！"
2101-25 = "（一日遡って、対策委員会の教室）"
2101-26 = "……。"
2101-27 = "……。"
2101-28 = "……。"
2101-29 = "……。"
2101-30 = "……。"
2101-31 = "……えっと。"
2101-32 = "「残ってる資金を宝くじに全投入、人生は一発勝負だよね～作戦」を提出された方？"
2101-33 = "おじさんの出したやつだ！"
2101-34 = "……。"
2101-35 = "「作戦：生徒を人質として大量に捕獲して、強制的に転校させる15の方法」を提出された方？"
2101-36 = "私。"
2101-37 = "…………。"
2101-38 = "実現性は検討済み。隣の学校の朝礼の時間を狙って、講堂を襲撃して……"
2101-39 = "えっと、アヤネ……？"
2101-40 = "「旅行計画表：今週末みんなでピクニックに行きましょう☆」を提出された方？"
2101-41 = "は～い、私です！"
2101-42 = "………………。"
2101-43 = "あれ、何か違いましたか？"
2101-44 = "おじさんが見るにこれ、ちょ～っと危ない雰囲気かもね～。"
2101-45 = "先輩たち、ふざけてるの！？"
2101-46 = "これからの委員会の活動方針を持ってきてって言われたのに、何で宝くじとか犯罪計画とか旅行の話なわけ！？"
2101-47 = "もっと真面目に考えて！アヤネちゃんの眉間が大変なことになってるでしょ！"
2101-48 = "……黒見セリカさん、まだもう一つありますから。"
2101-49 = "あ、アヤネちゃん……？何で急に敬語……？"
2101-50 = "最後に、「再生可能石油農場への事業投資説明書」を持ってきた方？"
2101-51 = "わ、私だけど……。"
2101-52 = "……。"
2101-53 = "で、でもアヤネちゃん！これちゃんとした事業だし、説明会でもらったパンフレットでも確実な利益がって……。"
2101-54 = "セリカちゃん、石油は農場で育てるものじゃなくて、地面を掘って出てくるもので……。"
2101-55 = "そ、それは私も知ってる！でも最近見つかったポンジー石油っていう――"
2101-56 = "……。"
2101-59 = "いい加減にしてくださいっ！！！！！"
2101-66 = "……"
2101-67 = "……まあ、"
2101-68 = "こうなるよね～。"
2101-70 = "いやぁ～久々に怖かったねえ、あのアヤネちゃん。"
2101-71 = "うーん……ちゃんとシミュレーションまでしてあったのに……。"
2101-72 = "私は、みんなに心の余裕を持ってもらおうと……。"
2101-73 = "真面目な話をする場でそうやってふざけてるからこうなったんでしょ！"
2101-74 = "うへ～、でもトリガーになったのはセリカちゃんっぽくない？アヤネちゃんに最後の引き金を引かせた感じだったし？"
2101-75 = "わ、私！？"
2101-76 = "「信じてたのに、セリカちゃんまで……」みたいな顔してたよ？"
2101-77 = "そ、それは……っ！"
2101-78 = "アヤネちゃんはセリカちゃんにベタベタだからな～、ショックが大きかったかもね～。"
2101-79 = "……っ！！"
2101-81 = "はぁ……はぁ……。"
2101-82 = "皆さん……。"
2101-83 = "もう少し、ちゃんとしてください……。"
2101-85 = "って、まるで仕事もしないで家でダラダラしてる子どもに対する親、みたいな雰囲気だったね～。"
2101-86 = "それでその「ちゃんと」の具体例が、この掃除のアルバイト、と。"
2101-87 = "明日の学芸祭のために、体育館に溜まってるゴミを掃除……というお話でしたよね？"
2101-88 = "こんなアルバイト、いつの間に探してたんだろうね～？いやあ、アヤネちゃんは計画的で良い子だー。"
2101-89 = "アヤネちゃん、いつも一人で頑張ってくれてますが、時々無理してそうで心配ですね……。"
2101-90 = "だからその結果今日みたいに、アヤネちゃんがストレスで寝込んじゃったんでしょ！"
2101-91 = "予定通りアヤネちゃんも一緒に来てたら、こうして迷うことも無かったのに！"
2101-92 = "大丈夫大丈夫～、せっかくだしアヤネちゃんには家でゆっくり休んでもらって～。"
2101-93 = "逆に考えると、アヤネちゃんに「やればできるじゃないですか！」って言ってもらえるチャンスかもよ？"
2101-94 = "せっかくなんだしたまには、私たちだけでもちゃんとできるってところを見せてあげなきゃ。"
2101-95 = "……とは本当に思ってるんだけど、遠すぎる～。誰でもいいからおんぶして～。"
2101-96 = "みんな同じくらい疲れてるの！もう、何時間歩いてることやら……。"
2101-97 = "あっ！あれ見てください！"
2101-98 = "……！"
2101-100 = "違法改築された体育館"
2101-101 = "……"
2101-102 = "？"
2101-103 = "……？"
2101-104 = "（な、なにこれ？これが体育館？）"
2101-105 = "うへー、これが目的地の体育館……で合ってる？体育館っていうか……。"
2101-106 = "なんだお前ら！どこから来たんだ！！"
2101-108 = "……！！"
2101-109 = "何の用だ！もしかしてお前ら、この体育館の持ち主か！？"
2101-110 = "残念だったな、ここは俺たちが占領済みだ！ひどい目に遭いたくなければこの体育館のことは諦めるんだな！"
2101-111 = "相手が誰であれ、こちとら容赦しないぜ！？げへへへへっ！"
2101-112 = "……な、何よあいつら？急に喧嘩腰で……。"
2101-117 = "ああ～……。"
2101-118 = "そっかあ、そういうことか～。"
2101-119 = "……なるほど、私も理解した。"
2101-120 = "し、シロコ先輩？何で爆弾取り出したの！？"
2101-121 = "……あは☆私も分かりました～。"
2101-122 = "えっ……？"
2101-124 = "皆さんにちゃんとしたお仕事をしてもらいます。"
2101-125 = "体育館のゴミ掃除のアルバイトです。簡単なお仕事ですので。"
2101-127 = "「体育館のゴミ掃除」、アヤネはそう言ってた。"
2101-128 = "……ゴミ？"
2101-129 = "いや～、アヤネちゃんも言うねえ。これは確かに私たちにとっては、簡単なお仕事かも？"
2101-130 = "……ま、待って！？も、もしかして……？"
2101-131 = "先輩たち！？"
2101-135 = "時間がもったいないから、始めよっか。"
2101-136 = "[ruby=悪党退治]ゴミ掃除[/ruby]。"
2101-137 = "お仕置きの時間ですよ～☆"
2101-139 = "ヒューン……！"
2101-140 = "ドカァァァアン☆"
