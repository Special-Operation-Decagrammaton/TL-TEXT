[translation]
1006403-1 = "新年の鐘音"
1006403-4 = "あ、先生、来てくれて良かった。"
1006403-5 = "[s] \"遅くなってごめん、電車が遅延して……。\""
1006403-6 = "平気、そんなに待ったわけじゃないし。"
1006403-7 = "それに時間の余裕はあるから大丈夫だよ。"
1006403-8 = "目的地はどのくらいか？って……？"
1006403-9 = "市内から下町の小さな駅まで、1時間以上は揺られることになるし……。"
1006403-10 = "帰りは遅くなるかもしれないけど、#n今日は臨時列車があるはずだから心配は要らないよ。"
1006403-11 = "じゃあ、そろそろ行こう。"
1006403-16 = "（1時間後……)"
1006403-17 = "はあ、はあ……聞いてた話よりも遠い……。"
1006403-18 = "ごめん、先生。私のペースに合わせてたから余計に疲れたよね？"
1006403-19 = "着物で山道を歩くのは大変で……。"
1006403-20 = "[s] \"大丈夫、怪我しないようにね。\""
1006403-21 = "でも間に合って良かった。#nそろそろ鐘の音が聞こえる頃合いだと思うんだけど……。"
1006403-25 = "……あれ？なんで誰も居ないんだろう。"
1006403-26 = "もしかして、除夜の鐘を見に来られた方ですか……？"
1006403-27 = "うん、にしても人が見当たらないけど……。"
1006403-28 = "今年は鐘を吊るす鐘楼の修繕で、中止になりまして……。"
1006403-29 = "訪れる方のほとんどが地元民なので、近隣にしかご案内しておらず……。"
1006403-30 = "無駄足を踏ませてしまい、申し訳ありません……。"
1006403-31 = "そんな……ここで除夜の鐘を聞きながら、年越しを迎えたかったのに……。"
1006403-32 = "[s1] \"仕方ない。\"\n[s2] \"また来年があるよ。\""
1006403-33 = "うん……。"
1006403-34 = "うん……。"
1006403-37 = "……もう終電が終わった！？"
1006403-38 = "去年はこの時間も走ってたみたいだけど……。"
1006403-39 = "はい……ですが、この辺りを訪れる方は皆お寺さん目的なので、今年は除夜の鐘の中止に伴い臨時列車が無くなりました。"
1006403-40 = "申し訳ありませんが、始発が動き出すまでお待ちください。"
1006403-44 = "うぅ、最悪……。"
1006403-45 = "ごめん、先生。こんなことになるなんて……。"
1006403-46 = "私がちゃんと調べておけば良かったのに……。"
1006403-47 = "[s] \"ごめんね。私が遅刻しなければ、帰れてたんだし……。\""
1006403-48 = "でも、どうしよう？近くには宿もお店も無い……。"
1006403-49 = "[s3] \"駅員の言う通り……。\"\n[s4] \"始発が動くまで、待合室で過ごそうか。\""
1006403-50 = "……うん、数時間だけだしね。"
1006403-51 = "……うん、数時間だけだしね。"
1006403-56 = "うーん……。"
1006403-57 = "[s] \"カヨコ、寒くない？\""
1006403-58 = "私は大丈夫、防寒対策はしてきたから。"
1006403-59 = "そういう先生はどう？寒くない？"
1006403-60 = "[s5] \"うん、今日は暖かい方だからね。\"\n[s6] \"私も大丈夫だよ。\""
1006403-61 = "……そう。"
1006403-62 = "……そう。"
1006403-66 = "……音楽プレーヤーでも持ってくれば良かったね。"
1006403-67 = "いつも周りが騒がしいから……こういう沈黙は、ちょっと苦手。"
1006403-68 = "[s] \"そういえば、よく音楽を聴いてるよね。\""
1006403-70 = "[ns] \"いつから音楽を好きになったの？\""
1006403-71 = "ん……便利屋の事務所に入る前、かな……。"
1006403-72 = "当時も騒がしい人たちに囲まれてたんだ。"
1006403-73 = "あの時は、それが嫌で現実から目を逸らすために、#n耳を塞ぎたくて音楽を聴いてたのかも。"
1006403-74 = "でも、便利屋の騒がしさは……嫌じゃない。"
1006403-75 = "ふふ……昔と比べたら、音楽を聴く時間も減っちゃったね。"
1006403-77 = "（そして電車が来るまでの間、便利屋で過ごした思い出話をカヨコから聞いた）"
1006403-79 = "……もうこんな時間。"
1006403-80 = "先生と話してたら、一瞬だった。"
1006403-84 = "ん、鐘の音……？"
1006403-87 = "[wa:1300]― もうすぐ[wa:400]始発の時間だね。"
1006403-90 = "[wa:1300]― 期待していた音では[wa:1100]ないけど……"
1006403-92 = "― これも、悪くない。"
1006403-95 = "[wa:1400]― 年に一度の除夜の鐘と違って"
1006403-97 = "[wa:600]― これ、[wa:1300]毎朝鳴ってる[wa:1500]なんでもない音だけど……"
1006403-100 = "[wa:1200]― お正月も、"
1006403-102 = "― 日々の一日に過ぎないからさ。"
1006403-105 = "[wa:300]― 今日という日に[wa:750]聞く音は、"
1006403-107 = "― これがいいのかも。"
1006403-110 = "[wa:1200]― 今年もいい一年でありますように。"
1006403-112 = "― あけましておめでとう、[wa:1750]先生。"
1006403-115 = "はあ……やっと帰って来られたね。"
1006403-116 = "一晩中、付き合ってくれてありがとう。危うく最悪の年明けになるところだったけど、先生が居てくれたおかげで楽しかった。"
1006403-117 = "[s] \"私もカヨコと話せて楽しかったよ。\""
1006403-118 = "徹夜したから今すぐにでも寝たいけど……便利屋の事務所は遠いし……。"
1006403-119 = "……先生、シャーレで寝てっても良い？"
1006403-120 = "せっかくだから、よく寝られる音楽を教えてあげる。#n先生も今日くらいは休んでね。"
1006403-122 = "（その後、シャーレに戻ってカヨコと一緒に睡眠を取った）"
