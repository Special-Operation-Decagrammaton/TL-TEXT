[translation]
1006403-1 = "Toque do sino de Ano Novo"
1006403-4 = "Oh, doutor, estou feliz que o senhor esteja aqui."
1006403-5 = "[s]\"Sorry I'm late, the train was delayed. ....... \""
1006403-6 = "Estou bem, não esperei tanto tempo."
1006403-7 = "E há tempo de sobra para fazer isso, portanto, não teremos problemas."
1006403-8 = "Qual é a distância até o destino? O site é ......?"
1006403-9 = "Levaria mais de uma hora para ir da cidade até uma pequena estação no centro da cidade. ......"
1006403-10 = "Talvez eu me atrase para chegar em casa, mas não se preocupe, pois deve haver um trem extra hoje."
1006403-11 = "Então é hora de ir embora."
1006403-16 = "(1 hora depois ......)"
1006403-17 = "Ha, ha ...... longe das histórias que ouvi. ......"
1006403-18 = "Desculpe, doutor. Você estava indo no meu ritmo, o que foi muito cansativo, não foi?"
1006403-19 = "É difícil caminhar pelas trilhas das montanhas com um quimono. ......"
1006403-20 = "[\"Não se preocupe, não se machuque. \""
1006403-21 = "Mas estou feliz por ter chegado a tempo. #nEu acho que é hora de ouvir os sinos. ......"
1006403-25 = "...... Huh? Por que ninguém está aqui?"
1006403-26 = "Talvez você seja um visitante do sino de Ano Novo ......?"
1006403-27 = "Sim, mas não estou vendo ninguém em ......."
1006403-28 = "Este ano foi cancelado devido a reparos na torre do sino, onde os sinos são pendurados. ......"
1006403-29 = "A maioria dos visitantes são moradores locais, portanto, nós os guiamos apenas aos bairros e ao site ......."
1006403-30 = "Desculpe-me pelo desperdício de passos. ......"
1006403-31 = "...... mesmo que eu quisesse entrar no Ano Novo aqui, ouvindo o sino de Ano Novo. ......"
1006403-32 = "[s1] \"Não há como evitar. \"\n[s2] \"Sempre há o próximo ano. \"\"\n[s2] \"Haverá outro ano.\"\"\n1006403-33 = \"Sim. .......\"\n1006403-34 = \"Sim. .......\"\n1006403-37 = \"...... O último trem já terminou!\"\n1006403-38 = \"No ano passado, eles também estavam funcionando nessa época. ......\"\n1006403-39 = \"Sim, ......, mas todos os visitantes da área estão aqui para os templos, portanto, este ano não há mais trens extras devido ao cancelamento do sino de Ano Novo.\"\n1006403-40 = \"Desculpe, aguarde até que o primeiro trem comece a circular.\"\n1006403-44 = \"Ugh, o pior. .......\"\n1006403-45 = \"Desculpe, doutor. Eu não queria que isso acontecesse. ......\"\n1006403-46 = \"Eu deveria ter feito minha pesquisa corretamente. ......\"\n1006403-47 = \"[s]\"Desculpe. Se eu não tivesse me atrasado, poderia ter ido para casa. ...... \"\"\n1006403-48 = \"Mas o que fazer? Não há acomodações ou lojas nas proximidades. ......\"\n1006403-49 = \"[s3] \"A equipe da estação está certa: ....... \"\n[s4] \"Vamos ficar na sala de espera até o primeiro trem partir? \"\"\n1006403-50 = \"...... Sim, é só por algumas horas.\"\n1006403-51 = \"...... Sim, é só por algumas horas.\"\n1006403-56 = \"Hmmm. .......\"\n1006403-57 = \"[\"Kayoko, você está com frio? \"\"\n1006403-58 = \"Estou bem, tomei minha proteção térmica.\"\n1006403-59 = \"E quanto aos Senseies? Não estão com muito frio?\"\n1006403-60 = \"[s5] \"Sim, hoje está um pouco quente. \"\n[s6] \"Eu também estou bem. \"\n[s6]\""

1006403-61 = "...... Sim."
1006403-62 = "...... Sim."
1006403-66 = "...... Você deveria ter trazido um tocador de música."
1006403-67 = "É sempre muito barulhento ao meu redor. ...... Não sou um grande fã desse tipo de silêncio."
1006403-68 = "[\"Pensando bem, você ouve muita música. \""
1006403-70 = "[ns] \"Quando você se apaixonou pela música? \""
1006403-71 = "Antes de entrar no escritório do faz-tudo, pergunto-me ......."
1006403-72 = "Naquela época, eu também estava cercado de pessoas barulhentas."
1006403-73 = "Talvez eu estivesse ouvindo música na época porque não queria fazer isso e queria #n-ear para me distrair da realidade."
1006403-74 = "Mas não me importo com o barulho do faz-tudo ......."
1006403-75 = "Hmmm... ...... Passo menos tempo ouvindo música do que antes."
1006403-77 = "(E Kayoko me contou sobre suas lembranças de passar o tempo na casa do faz-tudo até a chegada do trem)"
1006403-79 = "...... Já é tarde."
1006403-80 = "Eu estava conversando com o médico e foi apenas um momento."
1006403-84 = "Hmm, o som de sinos. ......?"
1006403-87 = "[wa:1300]- Está quase [wa:400]na hora do primeiro trem."
1006403-90 = "[wa:1300]- não é [wa:1100]o som que eu estava esperando, mas ......"
1006403-92 = "- Isso também não é ruim."
1006403-95 = "[wa:1400]- Ao contrário do sino anual da véspera de Ano Novo."
1006403-97 = "[wa:600]- Este é [wa:1300]o som de [wa:1500]nada que ouço todas as manhãs. ......"
1006403-100 = "[wa:1200]- O dia de Ano Novo também,"
1006403-102 = "- Porque é apenas mais um dia na vida."
1006403-105 = "[wa:300]- O som que você ouve [wa:750]neste dia é,"
1006403-107 = "- Talvez essa seja uma boa ideia."
1006403-110 = "[wa:1200]- Desejo a você um bom ano pela frente."
1006403-112 = "- Feliz Ano Novo, [wa:1750] sensei."
1006403-115 = "Haha. ...... Você finalmente chegou em casa."
1006403-116 = "Obrigado por me fazer companhia a noite toda. Quase acabou sendo o pior começo de ano possível, mas graças à sua presença, eu me diverti muito."
1006403-117 = "[\"Eu também gostei de conversar com a Kayoko. \""
1006403-118 = "Fiquei acordado a noite toda e quero ir para a cama agora, mas o escritório do faz-tudo fica longe. ......"
1006403-119 = "...... Doutor, posso dormir em uma placa de Petri?"
1006403-120 = "Já que você está aqui, vou lhe ensinar algumas músicas que ajudam a dormir melhor. Você deve descansar pelo menos hoje, #n sensei."
1006403-122 = "(Depois voltou para a placa de Petri e dormiu com Kayoko)"
