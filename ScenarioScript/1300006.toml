[translation]
1300006-1 = "眠れる森のメイド"
1300006-2 = "謎の事務所"
1300006-3 = "くうー………。"
1300006-4 = "ふにゃふにゃ……。"
1300006-5 = "（Zzz……）"
1300006-6 = "ううん……カリン……それはネル先輩のプリンだから……食べちゃダメ……。"
1300006-7 = "[s] 起こす。"
1300006-8 = "ううん？"
1300006-9 = "[s] \"起きて。\""
1300006-10 = "……え？"
1300006-11 = "ああっ！？ご、ご主人様！？"
1300006-12 = "こ、困ります、突然寝室に入ってくるだなんて……。"
1300006-13 = "でも、ご主人様でしたら……うふふっ。"
1300006-14 = "……って、あれ？ここ、夢じゃないのでしょうか？"
1300006-16 = "んん……っ、よく寝ました。"
1300006-17 = "あれ、もしかして、「んん……っ、よく寝ました」って言うような雰囲気ではない感じですか？ふむ、確かに。"
1300006-18 = "そういえば、全身縛られて……。"
1300006-19 = "そうでした、私たち――"
1300006-21 = "ミレニアム近郊・繁華街"
1300006-22 = "（数時間前）"
1300006-23 = "ここがあの、書類を盗んだ手下に対し、機密の流出を指示した……"
1300006-24 = "依頼主のビルですね。"
1300006-25 = "カイザーコーポレーション……あまり相手にしたくない企業ではありますが……。"
1300006-26 = "とりあえず、私が潜入してみます。ご主人様は、私からの連絡を待っててください。"
1300006-30 = "もし私からの連絡、もしくは脱出が遅くなったらその時は……お願いします。"
1300006-32 = "謎の事務所"
1300006-33 = "え、えーっと……。"
1300006-34 = "私の脱出が遅くなったら、C&Cに連絡をしていただきたいという意味だったのですが。"
1300006-35 = "私を助けるために先生が侵入し、それに伴う騒ぎで私も見つかって、こうなったと。"
1300006-36 = "ふふっ、なにも責めているわけではありません。"
1300006-37 = "私を助けに来てくださったこと、すごく嬉しいです。"
1300006-38 = "しかし……窓の外を見る限り、時間もだいぶ経ってしまったようです。どうしましょう、かなり高いビルですし……。"
1300006-39 = "どうしましょうか……仕方ないですね、爆弾を使いましょう。"
1300006-40 = "運がよければ、生き残れると思いますので。"
1300006-41 = "あ、待ってください……でももしかしたら、ご主人様の身に被害が及ぶ可能性も……？となるとこれは……。"
1300006-42 = "……申し訳ありません。"
1300006-43 = "私のせいでご主人様が……こんな、危険な目に遭ってしまうだなんて。"
1300006-44 = "……くすん。"
1300006-45 = "はい？大丈夫、ですか？ら、拉致されるくらいそんなに驚くことでもない、ですって！？"
1300006-46 = "うーん……私を慰めようとして嘘をついている、というようには見えませんが……。"
1300006-47 = "ふふっ……そうですね。"
1300006-48 = "実は私も、そこまで不安ではありません。"
1300006-49 = "その理由が何なのか、少し考えてみたのですが。"
1300006-50 = "きっと、ご主人様がそばにいてくださるからだと思います。それに、"
1300006-51 = "こういう時は、いつも……"
1300006-53 = "（ガガガガンッ！）"
1300006-54 = "ね、ネルだ！"
1300006-55 = "に、逃げろ！C&Cが現れた！！"
1300006-56 = "くそ！さっきのメガネのメイド、本当にC&Cだったのか！？"
1300006-57 = "だからメイドには関わるなってあれだけ、うわあああっ！"
1300006-58 = "……。"
1300006-59 = "いつも、こうなるんですよね。"
1300006-60 = "それで、すぐにみんながこの扉を開けて、「はっ、そんなことさせるかよ」なんて言いながら……。"
1300006-61 = "ぐああっ！くそっ、このままやられるわけにはいかない！人質がいる階だけでも爆破させろ！"
1300006-62 = "！？"
1300006-63 = "だ、ダメっ！ま、待ってくださ――"
1300006-65 = "（ズドオオオオオン！）"
1300006-66 = "ご主人様っ！！"
1300006-73 = "ご主人様！ご主人様！"
1300006-75 = "ご、ご主人様、大丈夫ですか？！"
1300006-76 = "[s] \"んん……っ、よく寝た。\""
1300006-77 = "「んん……っ、よく寝た」、ではありません！"
1300006-78 = "ふう……ですが……。"
1300006-79 = "良かったです。爆発もそれほど派手ではありませんでしたし。"
1300006-80 = "少し痛みはありますが、すぐ近くに手すりがあったおかげで、何とか助かりました。"
1300006-81 = "それに……。"
1300006-82 = "手すりから落ちる時、私のクッションになってくださったんですね。"
1300006-83 = "……ふふっ……さすが、ご主人様は、ご主人様ですね。"
1300006-84 = "守ってくださって、ありがとうございます。"
1300006-85 = "これからも、よろしくお願いします。"
