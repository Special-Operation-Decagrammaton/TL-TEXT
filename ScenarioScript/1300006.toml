[translation]
1300006-1 = "A empregada adormecida"
1300006-2 = "Escritório misterioso"
1300006-3 = "Hmmmm..."
1300006-4 = "Fofinha..."
1300006-5 = "(Zzz...)"
1300006-6 = "Não... Karin... esse pudim é da senpai Neru... não pode comer..."
1300006-7 = "[s] Acordá-la."
1300006-8 = "Hmm?"
1300006-9 = "[s] \"Acorde.\""
1300006-10 = "...Eh?"
1300006-11 = "Ahhh!? M-Mestre!?"
1300006-12 = "I-Isso é inapropriado, entrar no quarto assim de repente..."
1300006-13 = "Mas, sendo o Mestre... ufufu."
1300006-14 = "...Espere, o quê? Isso não é um sonho?"
1300006-16 = "Hmm... ah, dormi muito bem."
1300006-17 = "Ah, será que não é o momento ideal para dizer \"dormi muito bem\"? Hum, certamente não."
1300006-18 = "Falando nisso, estou amarrada de corpo inteiro..."
1300006-19 = "É verdade, nós..."
1300006-21 = "Arredores de Millennium - Distrito comercial"
1300006-22 = "(Algumas horas atrás)"
1300006-23 = "Este é o prédio do cliente que..."
1300006-24 = "ordenou o vazamento de informações confidenciais para o subordinado que roubou os documentos."
1300006-25 = "Kaiser Corporation... é uma empresa com a qual prefiro não lidar, mas..."
1300006-26 = "Por enquanto, vou me infiltrar. Mestre, por favor, aguarde meu contato."
1300006-30 = "Se meu contato ou minha fuga atrasarem, então... conto com você."
1300006-32 = "Escritório misterioso"
1300006-33 = "E-Err..."
1300006-34 = "Eu quis dizer que, se minha fuga atrasasse, era para você entrar em contato com a C&C."
1300006-35 = "Mas o Sensei invadiu para me salvar, e com a confusão, acabei sendo descoberta e terminamos assim."
1300006-36 = "Fufu, não estou te culpando."
1300006-37 = "Estou muito feliz que tenha vindo me salvar."
1300006-38 = "No entanto... pelo que vejo pela janela, já passou bastante tempo. O que faremos? É um prédio bem alto..."
1300006-39 = "O que faremos... não tem jeito, vamos usar uma bomba."
1300006-40 = "Se tivermos sorte, acho que sobreviveremos."
1300006-41 = "Ah, espere... mas se houver a possibilidade de o Mestre se ferir...? Nesse caso..."
1300006-42 = "...Sinto muito."
1300006-43 = "Por minha causa, o Mestre está... passando por uma situação tão perigosa."
1300006-44 = "...Snif."
1300006-45 = "Sim? Está tudo bem? Dizer que ser sequestrado não é algo tão surpreendente assim!?"
1300006-46 = "Hmm... não parece que você está mentindo para me consolar..."
1300006-47 = "Fufu... é verdade."
1300006-48 = "Na verdade, eu também não estou tão preocupada assim."
1300006-49 = "Pensei um pouco sobre o motivo disso."
1300006-50 = "Com certeza é porque o Mestre está ao meu lado. Além disso,"
1300006-51 = "nessas horas, sempre..."
1300006-53 = "(BANG BANG BANG!)"
1300006-54 = "É a Neru!"
1300006-55 = "F-Fujam! A C&C apareceu!!"
1300006-56 = "Droga! Aquela empregada de óculos era realmente da C&C!?"
1300006-57 = "Eu avisei para não mexer com empregadas, uwaaaaaah!"
1300006-58 = "……。"
1300006-59 = "Sempre acaba assim, não é?"
1300006-60 = "Aí, logo em seguida, todos abrem essa porta dizendo coisas como: 'Ha! Nem pense que vou deixar você fazer isso!'"
1300006-61 = "Argh! Droga! Não posso ser derrotado assim! Explodam pelo menos o andar onde os reféns estão!"
1300006-62 = "！？"
1300006-63 = "N-não! E-espere, por fav—"
1300006-65 = "(BOOOOOM!)"
1300006-66 = "Mestre!!"
1300006-73 = "Mestre! Mestre!"
1300006-75 = "M-mestre, você está bem?!"
1300006-76 = "[s] \"Hmm... ah, dormi bem.\""
1300006-77 = "Não é hora para dizer \"Hmm... ah, dormi bem\"!"
1300006-78 = "Ufa... mas..."
1300006-79 = "Ainda bem. A explosão não foi tão grande assim."
1300006-80 = "Estou um pouco dolorido, mas graças ao corrimão que estava logo ali perto, consegui me salvar."
1300006-81 = "Além disso..."
1300006-82 = "Quando caímos do corrimão, você serviu de almofada para mim, não foi?"
1300006-83 = "……Hehe... Como esperado, você é o mestre de sempre."
1300006-84 = "Obrigada por me proteger."
1300006-85 = "Conto com você daqui para frente também."
