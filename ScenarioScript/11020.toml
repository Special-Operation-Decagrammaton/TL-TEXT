[translation]
11020-2 = "Episódio 2;Primeiro Dia em Abydos"
11020-3 = "Área residencial de Abydos"
11020-4 = "(Pássaros cantando)"
11020-5 = "...huh?"
11020-6 = "(Ranger)"
11020-7 = "..."
11020-8 = "Nn..."
11020-19 = "..."
11020-20 = "...Você está bem?"
11020-21 = "[s1] (Aceno com a cabeça) \n[s2] Peça por ajuda."
11020-22 = "Ah, você tá vivo. Achei que estivesse morto deitado no meio da estrada."
11020-23 = "……Nn? Você desmaiou de fome?"
11020-24 = "...Morador de rua?"
11020-25 = "Você foi roubado? Ou um acidente...?"
11020-26 = "...Oh? Você desmaiou de fome?"
11020-27 = "Isso significa que você é um sem-teto?"
11020-28 = "..."
11020-30 = "Área residencial de Abydos"
11020-31 = "(Olha)"
11020-32 = "Veio para esta cidade há alguns dias para fazer algumas coisas, mas não havia lojas então está desidratado e faminto?"
11020-33 = "Isso não é uma surpresa."
11020-34 = "Acontece toda hora, as lojas que vendem alimentos desapareceram faz tempo."
11020-35 = "Teria mais sorte pela borda, encontrará uma área urbana."
11020-36 = "Não conhece o local? #n...Entendo, é sua primeira vez por aqui."
11020-37 = "...Espere um minuto."
11020-39 = "(remexendo)"
11020-42 = "Aqui. Um energético."
11020-43 = "É para ciclismo, mas é tudo que tenho no momento. Acho que vai ajudar seu estômago."
11020-45 = "Bem, a xícara..."
11020-46 = "[s] Beber direto da garrafa."
11020-47 = "(gole, gole)"
11020-48 = "...!"
11020-49 = "Ah... isso..."
11020-50 = "...Não, não é nada ...deixa para lá."
11020-51 = "[s] (Agradecer pela ajuda)"
11020-52 = "Un."
11020-53 = "Você parece ser um adulto do Conselho Estudantil Geral... #nVocê veio para a escola por alguma coisa?"
11020-54 = "Minha escola é a única perto daqui..."
11020-55 = "Você está aqui para visitar o Ensino Médio Abydos?"
11020-56 = "[s] (Aceno com a cabeça)."
11020-57 = "...Oh, faz muito tempo que ninguem nos visitou."
11020-58 = "Bem, então vou te mostrar o caminho. Não está muito longe."
11020-59 = "Huh? Você está com muita fome para se mover?"
11020-60 = "Un.. o que devo fazer?"
11020-61 = "[s] Pedir uma carona."
11020-62 = "Minha bicicleta é para uma pessoa só..."
11020-63 = "[s] Gostaria que você me carregasse nas suas costas."
11020-64 = "..."
11020-65 = "Tá bom."
11020-66 = "Deixa eu estacionar a minha bicicleta..."
11020-68 = "Vamos..."
11020-71 = "(Mexe)"
11020-72 = "...Ah, espera"
11020-73 = "..."
11020-74 = "É só que eu estava andando de bicicleta... então estou suada, mas..."
11020-75 = "Eu costumo usar o banheiro da escola. Tem roupas sobrando lá também..."
11020-76 = "Huh? Você não se importa?"
11020-77 = "...Você acha que eu cheiro bem?"
11020-78 = "..."
11020-79 = "...Uun. Eu realmente não entendo...#nMas se você não se importa, tudo bem."
11020-80 = "Bem, então..."
11020-82 = "(Mexe)"
11020-83 = "Segure firme."
11020-85 = "Sala de aula da Força-Tarefa Hipotecária"
11020-87 = "Estou em casa."
11020-88 = "Bem vinda de volta, Shiroko-sen...?"
11020-89 = "Uou!? O que!? Quem esse nas suas costas!?"
11020-90 = "Uau, Shiroko-chan sequestrou um adulto!"
11020-91 = "Sequestro!? Pode ser um cadáver!! #nShiroko-senpai finalmente cometeu um crime!"
11020-92 = "Todos se acalmem e encontrem rapidamente um lugar para esconder o corpo! #nHá uma pá e uma picareta no armazém do ginásio..."
11020-93 = "..."
11020-94 = "(Cai)"
11020-95 = "Não... é um adulto normal. Ele disse que tinha algo para fazer na escola."
11020-96 = "Huh? Não era um cadáver...?"
11020-97 = "Você não o sequestrou, é um visitante?"
11020-98 = "Parece que sim..."
11020-99 = "[s] (Cumprimentar alegremente)"
11020-100 = "Uau, fiquei surpresa. Já faz muito tempo que não temos visitantes."
11020-101 = "Bem, isso é verdade... Mas você estava esperando convidados?"
11020-103 = "[ns] \"Sou o consultor da Schale. Prazer em conhecê-las.\""
11020-105 = "...Eh? ? ? Não é possível!?"
11020-106 = "Sensei da \"Schale\"? O Clube de Investigação Federal!?"
11020-107 = "Uau! Então o seu pedido de ajuda foi aceito Ayane-chan! ☆"
11020-108 = "Agora podemos receber assistência com munições e suprimentos."
11020-109 = "Eu tenho que avisar a Hoshino-senpai...#nAonde ela está?"
11020-110 = "Ela está dormindo no quarto ao lado. Eu vou lá acordar ela."
11020-112 = "(Da-da-da-da-da-da-da-da!)"
11020-113 = "Tiros!?"
11020-114 = "! ! !"
11020-117 = "Hahahahaha!"
11020-118 = "Ataquem, ataquem! Elas já estão sem munição! Assumam o controle da escola!"
11020-120 = "(Tatatatatatatata!)"
11020-123 = "Grupos armados estão se aproximando da escola! Parecem ser a Gangue do Capacete Kata-Kata!"
11020-124 = "Essas delinquentes... Não aprenderam a sua lição!"
11020-126 = "Eu trouxe a Hoshino-senpai! Senpai, acorde!"
11020-127 = "(boceja)... só mais 5 minutos..."
11020-128 = "Hoshino-senpai! A Gangue do Capacete está atacando novamente! Essa pessoa aqui é o Sensei de Schale."
11020-129 = "...Ah, Sensei? (boceja) Prazer em conhecê-lo, Munya."
11020-130 = "Senpai acorde logo e se arrume! Nós estamos indo pro combate! Temos que proteger a escola!"
11020-131 = "(resmunga). Nem consigo tirar uma soneca decente, sua Gangue do Capacete."
11020-134 = "Vamos indo, graças ao Sensei temos munições e suprimentos suficientes."
11020-135 = "Okey, vamos! ☆"
11020-138 = "Eu serei a operadora."
11020-139 = "Sensei, fique na retaguarda e nos apoie!"