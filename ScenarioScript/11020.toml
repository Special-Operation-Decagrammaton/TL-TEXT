11020-52 = "Sim."

11020-53 = "Ele parece um adulto do Conselho Estudantil da Federação... Obrigado pelo seu trabalho duro. #nVocê veio para a escola por alguma coisa?"

11020-54 = "Minha escola é a única perto daqui...talvez..."

11020-55 = "Você está indo para Abidos?"

