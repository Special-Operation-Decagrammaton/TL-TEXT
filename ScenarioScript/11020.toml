11020-103 = "[ns] \"Sou o consultor da Placa de Petri. Prazer em conhecê-lo. \""

11020-105 = "...Eh, sim! ? Sem chance! ?"

11020-106 = "Professor da “Placa de Petri” do Departamento de Investigação Federal! ?"

11020-107 = "Uau! Seu pedido de suporte foi aceito! Que bom para você, Ayane-chan!"

11020-108 = "sim! Agora você pode receber assistência com munições e suprimentos."

11020-109 = "Ah, eu tenho que avisar Hoshino-senpai rapidamente...#nHuh? E quanto a Hoshino-senpai?"

