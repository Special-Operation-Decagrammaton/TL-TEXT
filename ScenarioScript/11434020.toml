[translation]
11434020-1 = "エンディング（隠し）;\"嬉しい！けど……。\""
11434020-12 = "……早く、こっち！"
11434020-13 = "はぁ、はぁっ、はぁっ……！"
11434020-14 = "こ、これって……。"
11434020-15 = "喋ってないで足動かすの！はぁ、はぁっ……！"
11434020-21 = "ここまで来れば安全……かな。"
11434020-22 = "……大丈夫？"
11434020-26 = "いったい何がどうなってるわけ……？"
11434020-27 = "嬉しいけど、こんなことになるなんて……。"
11434020-28 = "……もう、ロックの域を超えてる。"
11434020-30 = "まったく……。"
11434020-36 = "……っ！！"
11434020-37 = "\"すみません！\""
11434020-39 = "\"どうかインタビューを……！！\""
11434020-40 = "\"バンド名を教えてください！もう事務所には所属してるんですか！？\""
11434020-41 = "\"素晴らしい演奏でした！！どうか少しだけでも取材を！！\""
11434020-43 = "わわわっ！？"
11434020-45 = "ど、どうしてこうなったのかなぁ……！？"
11434020-46 = "何でだろうね、まったく……！"
11434020-47 = "何か誤解されてるんじゃないの！？"
11434020-48 = "嬉しいような困るような……！"
11434020-49 = "やむを得ないね、これも宵に降り立った天才のさだめ……。"
11434020-50 = "悠長にしてる場合かっ！"
11434020-56 = "（……その後、事情を説明して何とか理解してもらえた）"
