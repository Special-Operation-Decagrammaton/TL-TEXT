[translation]
90001130-1 = "第13話;出発"
90001130-10 = "お、着いた？"
90001130-12 = "は、はい！「グリッドポイント」から最後の資源が届きました！"
90001130-13 = "まぁ、正確には「最後」ではありませんが。#n総収集率99.98％……あと2回くらいでしょうか。"
90001130-17 = "そ、そうですけど……ひぃん。"
90001130-19 = "大丈夫、それくらい誤差だって！#n問題なく次の工程に移れるよ。"
90001130-20 = "ってかオウル、一言多くない？#n今のいう必要あった？"
90001130-24 = "だって……。"
90001130-25 = "……だって？"
90001130-31 = "アインの泣きそうな顔って、可愛いじゃないですか！"
90001130-33 = "は、はいぃ！？"
90001130-35 = "いや、それは分かるけどさ……。"
90001130-37 = "ソフ！？"
90001130-42 = "あっ、今のはそういう意味じゃなくて――"
90001130-43 = "もう！あんたのせいなんだけど！"
90001130-44 = "私のせいにしないでくださいよ！？"
90001130-54 = "えっと、みんな……。"
90001130-62 = "つ、次はうちのレイバーちゃんたちの番ですね！"
90001130-66 = "ええ、みんなよく頑張ってくれています。"
90001130-67 = "で、でもちょっと心配です。#nヘリカル5号ちゃんの傷、まだ治ってないので。"
90001130-72 = "ヘリカル5号……名前つけたの？#n塗装が剥がれてたヤツだっけ。"
90001130-73 = "そうです！塗装が剥がれると錆びやすくなってしまうので……。"
90001130-74 = "塗りなおすのと一緒に、大きなアームを追加して……！"
90001130-75 = "ついでに、ボディを頑丈な素材に変更すれば……。"
90001130-76 = "ヘリカル3号をどれだけ大事にしてるかはよ～く分かったから、落ち着いてアイン。"
90001130-77 = "ご、5号です！それにヘリカル5号ちゃんは、ただのレイバーじゃありません！#nあの子は、その……。"
90001130-78 = "と、特別なんです！"
90001130-79 = "何か違いでもあるの？#n何万個もあるレイバーの一つでしょ。"
90001130-84 = "ああ、なんて血も涙もない言葉！#nソフはレイバーのことを、ただの道具としか見ていないのですね！"
90001130-85 = "その言葉が、アインの心にどれだけ大きな傷を与えるのか――あなたはお分かりですか？"
90001130-86 = "……あんたにだけは言われたくないんだけど？"
90001130-87 = "ところで、アイン。#nヘリカル5号の修理材はそれで足りますか？"
90001130-93 = "全体のアップグレードをするなら、それに合った装備とプログラムが必要になります。"
90001130-94 = "無茶な改造は、ヘリカル5号の寿命を縮めるだけになるかもしれませんよ？"
90001130-96 = "え、ええっ！？#nそ、それは……ダメです！"
90001130-97 = "だから手伝うって言ってるじゃないですか。お任せください。"
90001130-98 = "まず、すべてのプロセスを最適化し、既存業務を半分以下の時間で終わらせられるようにして……。"
90001130-102 = "浮いた業務時間は……ダンスでも踊らせましょうか！そして――"
90001130-104 = "そ、それはあんまりですよぉ！"
90001130-117 = "暴力、反対……ぐはっ……"
90001130-119 = "その……収集率が99.98%に到達したということは。"
90001130-120 = "うん……ついに時が来た。"
90001130-124 = "ええ、私たちのお姉様……。"
90001130-128 = "「マルクト」をこの地に降臨させる用意ができました。"
90001130-130 = "だ、だだだ大丈夫でしょうか？"
90001130-131 = "もしもお姉様が目覚めなかったら……！"
90001130-132 = "大丈夫、私たちは信じてる。#nそれに今まで上手くやってきたでしょ？"
90001130-133 = "私たちの中で一番機械に詳しいのはアインだからね。"
90001130-134 = "で、でも……！"
90001130-139 = "アインの気持ちも理解できます。#nこれより先は、量子力学のことまで考えないといけないですからね。"
90001130-140 = "それに、成功させなければなりません。#n「最善を尽くした」は言い訳にしかならないですから……ふふ。"
90001130-141 = "ひぃん……。"
90001130-142 = "でも――今はやるしかありません。"
90001130-143 = "禁じられた力の手を借りているのは気に食わないですが……。"
90001130-144 = "まあ、「結果良ければ全て良し」とも言いますし。#nそれに、ここの準備も滞りなく終わりました。"
90001130-145 = "そうだね。#n「多次元解釈・状態共存・位相バリア」――長いから多次元バリアでいっか。"
90001130-146 = "あらゆる多次元の可能性を同居させて防御に使うバリア……。"
90001130-149 = "あの日は、とても良いサンプルが見られたよね。#nおかげで、ここ[ruby=リバースエンジニアリング]まで再構築でき[/ruby]たわけだし。"
90001130-150 = "ふふ、うふふふっ。その部分に関しては、自分の功績が一番大きかったと認めても良いのではないでしょうか？"
90001130-151 = "……悔しいけど、そうだね。"
90001130-152 = "ご、ごめんなさい……私はその辺りが弱くて……ひぃん。"
90001130-155 = "大丈夫だよアイン！#nそもそも私たち、専門分野が違うわけだし？"
90001130-156 = "アインにだけ甘すぎませんか……。"
90001130-157 = "日頃の行いを考えたら？"
90001130-158 = "……現状、多次元バリアで保護されているここを発見するなんて、ほぼ不可能です。"
90001130-163 = "私たちは「名もなき神の力」を使いこなしていますからね。"
90001130-165 = "ほ、本当にそうなんでしょうか？#n「他人の力を勝手に使うんじゃない」って怒られたりしませんか……？"
90001130-166 = "誰が何言ったって、別に良くない？"
90001130-171 = "私たちは、「完全無欠」ですからね。"
90001130-172 = "道具は使えるところだけ使えばいいのです。#nそれを咎めるものなどいないかと。"
90001130-173 = "ああでも、無名の司祭がいるんでしたっけ？#n噂でしか聞いたことないですが。"
90001130-174 = "というか、時の敗北者への配慮なんて必要ですか？#nそれに、仮にいたとしても私たちに感謝するのでは？使ってくださりありがとうございます！って"
90001130-176 = "まあそうだよね。別に悪いことしてるわけじゃないし？"
90001130-177 = "ほ、本当にこれで良いんでしょうか……。"
90001130-193 = "つ、ついにクリアした……！"
90001130-202 = "ど、どうだった！？"
90001130-207 = "アリス、知っています！#nこれは……"
90001130-208 = "これは……？"
90001130-213 = "クソゲーですね！"
90001130-215 = "ひうっ……！"
90001130-216 = "ぐはっ！？"
90001130-217 = "まずさ、なんで氷河に足を踏み入れた瞬間死ぬの？"
90001130-218 = "実際の氷河って寒いじゃん？#n何も準備してなかったら凍死するでしょ？"
90001130-219 = "いくら何でもひどすぎない！？#nせめて、まともにプレイできるようにして！"
90001130-220 = "ちゃんとチュートリアルを最後までやったら、防寒装備がもらえるようにしてあるよ！？"
90001130-221 = "30分のチュートリアルはちょっと……もらった装備に着替えないといけないならそう書いて！"
90001130-222 = "というか、いくら寒くても即死はなくない！？"
90001130-223 = "ミドリ、氷河に行ったことあるの！？#n即死するかもじゃん！"
90001130-227 = "はぁ……装備がないと百歩譲って即死するのはいいとして。#n私の描いたイラストはどうしたの？"
90001130-231 = "そ、それはDLCにしようと思って……。"
90001130-236 = "依頼の時に言ってよ！"
90001130-244 = "ふ、二人とも、喧嘩しないで……。"
90001130-245 = "でも、アリスは楽しいです。#nみんなでゲームを作るのも、こうやって直していくのも！"
90001130-251 = "うわああああん、アリス～！"
90001130-252 = "はぁ……アリスちゃんがお姉ちゃんを甘やかすからこうなるんじゃないのかな。"
90001130-254 = "で、でも実際……何が足りてなかったのかな？"
90001130-256 = "シナリオライター兼企画者兼統括プロデューサーとして、ちゃんと向き合わないとだよね！"
90001130-257 = "最後のは自称でしょ……。"
90001130-261 = "分かった！#n「アークティック・アドベンチャー」にはリサーチが足りてないんだ！"
90001130-262 = "そうと決まれば、氷河に行こう！"
90001130-263 = "なに言ってるのお姉ちゃん！ちゃんと資料を調べるだけでも、ある程度まともなゲームになるでしょ！現地に行く必要なんて……。"
90001130-268 = "氷河……！？#nそ、そんな遠いところに行くなんて……。"
90001130-274 = "大丈夫ですか、ユズ！？"
90001130-276 = "雪が積もった平原、青くて透明な氷河、仲良く遊んでいる白熊とペンギン……。"
90001130-277 = "インスピレーションを与えてくれる素晴らしい景色だと思わない！？"
90001130-278 = "お姉ちゃんが見てみたいだけでしょ。#nというか、白熊とペンギンは同じ地域に生息してないよ？"
90001130-279 = "うっ……。"
90001130-288 = "これ、アリスのじゃない？"
90001130-293 = "この番号は……？"
90001130-298 = "先生……？"
90001130-299 = "え、先生から電話？"
90001130-301 = "ふふっ……なんだか久しぶりな気がする。"
90001130-305 = "もしもし、先生！"
90001130-306 = "[s] \"こんにちは、アリス。\""
90001130-307 = "はい、アリスです！#nこうしてお話するのは久しぶりな気がします！"
90001130-308 = "「気がする」というより、全然会ってないような……。"
90001130-309 = "みんなも先生と会いたがっています！"
90001130-310 = "[s] \"ごめんね。\""
90001130-312 = "[ns] \"ユズたちもそこにいるの？\""
90001130-313 = "はい、新しく作ったゲームのテストを一緒にしていました！"
90001130-317 = "ゲームの出来ですか……？"
90001130-327 = "楽しく作れました！"
90001130-328 = "それより先生、いつもと声が違うような……？"
90001130-329 = "[s] \"えっと……みんな、そこにいるんだよね？\""
90001130-330 = "はい、そうですが……。"
90001130-335 = "（どこまで話すか悩んだけど……）"
90001130-336 = "（素直に言うのが一番良い気がした）"
90001130-338 = "[ns] \"みんな、よく聞いてほしいんだ。\""
90001130-349 = "氷？"
90001130-350 = "河！"
90001130-351 = "探？"
90001130-352 = "検！"
90001130-353 = "みんなと一緒に氷河に行くんですか？#n良かったですね、モモイ！"
90001130-355 = "流石だよ、先生！"
90001130-356 = "[s1] \"えっと、さっきも言ったけど……。\"\n[s2] \"危険もいっぱいあると思うんだ。\""
90001130-359 = "そ、そうだよお姉ちゃん！"
90001130-360 = "氷河に現れた巨大変身怪獣が何か変な事をしてて……。"
90001130-361 = "その親玉が隠れてそうなとこに行くために、アリスちゃんの力を借りるかもしれないってことでしょ！？"
90001130-362 = "うぅ……ゲームの世界の話みたい。#n現実味がないよ……。"
90001130-363 = "[s3] \"これはゲームじゃなくて、現実の話なんだ。\"\n[s4] \"だから、よく考えて決めてほしい。\""
90001130-366 = "……先生は、アリスの仲間です。"
90001130-367 = "[s] \"そう思ってくれるのは本当に嬉しいけど……。\""
90001130-369 = "[ns] \"もう一度説明するね。これは――\""
90001130-370 = "大丈夫です、アリスはちゃんと分かっていますから。"
90001130-371 = "アリスたちの安全を確保できないかもしれないのですよね。"
90001130-372 = "アリスちゃん……。"
90001130-377 = "……先生。"
90001130-378 = "それで、どうやって向かえば良いんですか？"
90001130-379 = "[s] \"！？\""
90001130-384 = "あ、アリス！？"
90001130-385 = "アリスちゃん！？"
90001130-390 = "どうしてそんなに驚くのですか？#n仲間が大変な時は、みんなで助けるべきです。パーティープレイの基本です。"
90001130-391 = "何よりもアリスは、困った時に先生がこうして頼ってくれて嬉しいです。"
90001130-392 = "信頼こそ、仲間である一番の証拠ですから。"
90001130-393 = "[s] \"……本当に大丈夫？\""
90001130-394 = "先生……アリスは見習いですが、これでも勇者です。そうであろうと努力しています。"
90001130-395 = "見習い勇者として、少しでも良い世界になってほしいと思っています。"
90001130-396 = "だからこそ、困っている人がいるのなら、力になりたいのです。"
90001130-397 = "そうすれば、世界は少しだけ素敵になるからです。"
90001130-398 = "[s] \"もしも、危険な状況になってしまったら……アリスはどうするの？\""
90001130-399 = "その時は……。"
90001130-405 = "生徒にジョブチェンジして、安全な場所に隠れます！"
90001130-407 = "それ良いね！#nゲームなら、何してもいいわけだし！"
90001130-408 = "チートはダメだけどね。"
90001130-409 = "わ、わたしもそれなら大丈夫だと思う……。"
90001130-410 = "[s] \"本当に危なくなったら、ちゃんと言うことを聞いてくれる？\""
90001130-412 = "もちろんです、先生！#n勇者は必ず約束を守ります！"
90001130-413 = "……でも、変なお願いだったらどうしましょう？"
90001130-418 = "大丈夫だよ、アリス！#n先生が変な事いうのはいつものことだし！"
90001130-419 = "まぁ……そうだね。"
90001130-420 = "で、でも……危ないときに変な事は言わないと思うから。"
90001130-422 = "そうですね！#n先生、氷河に行く方法を早く教えてください！"
90001130-423 = "[s5] \"ありがとう、みんな。\"\n[s6] \"モモトークで説明するね。\""
90001130-426 = "[ns] \"そうだ、最後に伝えておかないと。\""
90001130-432 = "どうしました？"
90001130-433 = "[s] \"暖かい格好で来てね。\""
90001130-438 = "次回;合流"
