[translation]
90001130-1 = "Episódio 13; Partida"
90001130-10 = "Oh, chegamos?"
90001130-12 = "S-sim! Os últimos recursos do \"Ponto de Grade\" chegaram!"
90001130-13 = "Bem, para ser exata, não são os \"últimos\". #nTaxa de coleta total de 99,98%... acho que faltam mais umas duas vezes."
90001130-17 = "I-isso é verdade, mas... buá."
90001130-19 = "Tudo bem, isso é só uma margem de erro! #nPodemos seguir para a próxima etapa sem problemas."
90001130-20 = "E outra, Owl, você não acha que falou demais? #nPrecisava dizer isso agora?"
90001130-24 = "Porque..."
90001130-25 = "...Porque?"
90001130-31 = "O rosto da Ein quase chorando é tão fofo, não acha?"
90001130-33 = "H-hã!?"
90001130-35 = "Não, eu entendo o que você quer dizer, mas..."
90001130-37 = "Soph!?"
90001130-42 = "Ah, não foi nesse sentido que eu quis dizer—"
90001130-43 = "Chega! A culpa é toda sua!"
90001130-44 = "Não coloque a culpa em mim!?"
90001130-54 = "Err, pessoal..."
90001130-62 = "A-agora é a vez das minhas Labor!"
90001130-66 = "Sim, todas elas têm se esforçado muito."
90001130-67 = "M-mas estou um pouco preocupada. #nA ferida da Helical nº 5 ainda não cicatrizou."
90001130-72 = "Helical nº 5... Você deu um nome para ela? #nÉ aquela que estava com a pintura descascando, né?"
90001130-73 = "Sim! Se a pintura descascar, ela enferruja mais fácil, então..."
90001130-74 = "Junto com a repintura, vou adicionar um braço maior...!"
90001130-75 = "E se eu trocar o corpo por um material mais resistente..."
90001130-76 = "Já entendi o quanto você se importa com a Helical nº 3, então se acalme, Ein."
90001130-77 = "É-é a nº 5! E a Helical nº 5 não é apenas uma Labor qualquer! #nAquela criança é, tipo..."
90001130-78 = "É-é especial!"
90001130-79 = "Tem alguma diferença? #nEla é só uma entre dezenas de milhares de Labor, não é?"
90001130-84 = "Ah, que palavras tão frias e sem coração! #nSoph, você só vê as Labor como meras ferramentas!"
90001130-85 = "Você tem noção de quanto essa frase fere o coração da Ein?"
90001130-86 = "...Você é a última pessoa que deveria dizer isso, sabia?"
90001130-87 = "Aliás, Ein. #nOs materiais de reparo da Helical nº 5 são suficientes?"
90001130-93 = "Se for fazer uma atualização completa, precisará de equipamentos e programas compatíveis."
90001130-94 = "Modificações imprudentes podem acabar encurtando a vida útil da Helical nº 5, sabia?"
90001130-96 = "E-eh!? #nI-isso... não pode!"
90001130-97 = "Por isso eu disse que vou ajudar. Deixe comigo."
90001130-98 = "Primeiro, vou otimizar todos os processos para que as tarefas atuais sejam concluídas na metade do tempo..."
90001130-102 = "E o tempo livre... que tal fazê-las dançar? E então—"
90001130-104 = "I-isso é demais!"
90001130-117 = "Violência, não... guh..."
90001130-119 = "Então... o fato de a taxa de coleta ter atingido 99,98% significa que..."
90001130-120 = "Sim... finalmente chegou a hora."
90001130-124 = "Sim, nossa irmã mais velha..."
90001130-128 = "Estamos prontas para fazer \"Malkuth\" descer a esta terra."
90001130-130 = "S-s-será que vai dar certo?"
90001130-131 = "E se a irmã mais velha não acordar...!"
90001130-132 = "Vai dar certo, nós acreditamos. #nAlém disso, temos nos saído bem até agora, não é?"
90001130-133 = "Afinal, a Ein é quem mais entende de máquinas entre nós."
90001130-134 = "M-mas...!"
90001130-139 = "Eu entendo os sentimentos da Ein. #nDaqui para frente, teremos que considerar até a mecânica quântica."
90001130-140 = "Além disso, precisamos ter sucesso. Porque \"dar o meu melhor\" não passa de uma desculpa... fufu."
90001130-141 = "Hiiin..."
90001130-142 = "Mas... agora não temos escolha a não ser seguir em frente."
90001130-143 = "Não gosto nada de ter que recorrer a um poder proibido, mas..."
90001130-144 = "Bem, dizem que \"se o resultado é bom, tudo está bem\". Além disso, os preparativos aqui terminaram sem problemas."
90001130-145 = "É verdade. \"Interpretação Multidimensional, Coexistência de Estados, Barreira de Fase\"... é muito longo, então vamos chamar de barreira multidimensional."
90001130-146 = "Uma barreira que usa a coexistência de todas as possibilidades multidimensionais para defesa..."
90001130-149 = "Naquele dia, vimos uma amostra muito boa, não foi? Graças a isso, conseguimos reconstruir até isso aqui."
90001130-150 = "Fufu, ufufufu. Em relação a essa parte, não acha que pode admitir que a minha contribuição foi a maior?"
90001130-151 = "...É frustrante, mas é verdade."
90001130-152 = "De-desculpe... eu não sou muito boa nessas coisas... hiiin."
90001130-155 = "Está tudo bem, Ein! Afinal, nossas áreas de especialização são diferentes, não são?"
90001130-156 = "Você não está sendo boazinha demais só com a Ein...?"
90001130-157 = "Já pensou no seu comportamento diário?"
90001130-158 = "...Atualmente, é quase impossível descobrir este lugar, que está protegido pela barreira multidimensional."
90001130-163 = "Afinal, nós dominamos o \"Poder do Deus Sem Nome\"."
90001130-165 = "Se-será que isso está realmente certo? Não vamos levar uma bronca por \"usar o poder dos outros sem permissão\"...?"
90001130-166 = "Não importa o que digam, não está tudo bem?"
90001130-171 = "Nós somos \"perfeitas e impecáveis\", afinal."
90001130-172 = "Ferramentas devem ser usadas onde podem ser úteis. Não creio que haja ninguém para nos culpar por isso."
90001130-173 = "Ah, mas ainda existe o Sacerdote Sem Nome, não é? Só ouvi falar por boatos, no entanto."
90001130-174 = "E outra, precisamos mesmo nos preocupar com um derrotado pelo tempo? Além disso, mesmo que ele existisse, não nos agradeceria? Tipo: \"Obrigada por me usar!\""
90001130-176 = "Bem, é verdade. Não estamos fazendo nada de errado, afinal?"
90001130-177 = "Se-será que isso está realmente certo..."
90001130-193 = "Fi-finalmente zerei...!"
90001130-202 = "E-e então, como foi!?"
90001130-207 = "Alice sabe! Isso é..."
90001130-208 = "Isso é...?"
90001130-213 = "Um jogo horrível!"
90001130-215 = "Hiuu...!"
90001130-216 = "Guh!?"
90001130-217 = "Primeiro, por que você morre no momento em que pisa na geleira?"
90001130-218 = "Geleiras reais são frias, não são? Se você não estiver preparado, vai morrer congelado, certo?"
90001130-219 = "Isso não é exagero demais!? Pelo menos faça com que seja possível jogar direito!"
90001130-220 = "Eu fiz de um jeito que você ganha equipamento de frio se terminar o tutorial, sabia!?"
90001130-221 = "Um tutorial de 30 minutos é demais... se precisa trocar de roupa com o equipamento que ganhou, escreva isso!"
90001130-222 = "E outra, mesmo que esteja frio, não deveria ser morte instantânea, né!?"
90001130-223 = "Midori, você já foi a uma geleira!? Pode ser que você morra instantaneamente, sabia!"
90001130-227 = "Haa... ignorando o fato de que morrer instantaneamente sem equipamento é aceitável. O que aconteceu com as ilustrações que eu desenhei?"
90001130-231 = "I-isso, eu pensei em deixar como DLC..."
90001130-236 = "Deveria ter dito isso na hora do pedido!"
90001130-244 = "A-as duas, não briguem..."
90001130-245 = "Mas a Alice está se divertindo. Fazer um jogo com todo mundo e consertar as coisas assim!"
90001130-251 = "Uwaaaaa, Alice~!"
90001130-252 = "Haa... não é por isso que a Alice mima tanto a irmã mais velha?"
90001130-254 = "Ma-mas na verdade... o que estava faltando?"
90001130-256 = "Como roteirista, planejadora e produtora geral, preciso encarar isso de frente, né!"
90001130-257 = "Esse último título é autoproclamado, né..."
90001130-261 = "Já sei! Falta pesquisa no \"Arctic Adventure\"!"
90001130-262 = "Já que decidimos, vamos para a geleira!"
90001130-263 = "O que você está dizendo, irmã! Só de pesquisar os materiais direito, já dá para fazer um jogo decente! Não tem necessidade nenhuma de ir até o local..."
90001130-268 = "Glaciar...!? I-ir para um lugar tão longe assim..."
90001130-274 = "Você está bem, Yuzu!?"
90001130-276 = "Planícies cobertas de neve, glaciares azuis e transparentes, ursos polares e pinguins brincando juntos..."
90001130-277 = "Não acha que é uma paisagem maravilhosa para nos dar inspiração!?"
90001130-278 = "Você só quer ir ver por si mesma, né? E, aliás, ursos polares e pinguins não vivem na mesma região, sabia?"
90001130-279 = "Ugh..."
90001130-288 = "Isso não é da Alice?"
90001130-293 = "Este número é...?"
90001130-298 = "Sensei...?"
90001130-299 = "Ah, uma ligação do Sensei?"
90001130-301 = "Fufu... sinto que faz tempo que não nos falamos."
90001130-305 = "Alô, Sensei!"
90001130-306 = "[s] \"Olá, Alice.\""
90001130-307 = "Sim, é a Alice! Sinto que faz tempo que não conversamos assim!"
90001130-308 = "Mais do que \"sinto\", parece que a gente não se vê faz um tempão..."
90001130-309 = "Todas nós também estamos com saudades do Sensei!"
90001130-310 = "[s] \"Me desculpem.\""
90001130-312 = "[ns] \"A Yuzu e as outras também estão aí?\""
90001130-313 = "Sim, estávamos testando o jogo novo que criamos juntas!"
90001130-317 = "Como está o jogo...?"
90001130-327 = "Foi muito divertido de fazer!"
90001130-328 = "Mas Sensei, sua voz parece um pouco diferente do habitual...?"
90001130-329 = "[s] \"Bem... todas vocês estão aí, certo?\""
90001130-330 = "Sim, estamos, mas..."
90001130-335 = "(Fiquei pensando até onde deveria contar...)"
90001130-336 = "(Senti que ser sincera seria o melhor)"
90001130-338 = "[ns] \"Pessoal, quero que me escutem com atenção.\""
90001130-349 = "Gla-"
90001130-350 = "-ciar!"
90001130-351 = "Expe-"
90001130-352 = "-dição!"
90001130-353 = "Vamos todas juntas para o glaciar? Que bom, Momoi!"
90001130-355 = "Como esperado do Sensei!"
90001130-356 = "[s1] \"Bem, como eu disse antes...\"\n[s2] \"Acho que existem muitos perigos lá.\""
90001130-359 = "I-isso mesmo, irmã!"
90001130-360 = "Um monstro gigante transformado apareceu no glaciar e está fazendo coisas estranhas..."
90001130-361 = "E para ir até onde o chefão está escondido, você vai precisar da ajuda da Alice, é isso, né!?"
90001130-362 = "Ugh... parece história de jogo. Não parece nada real..."
90001130-363 = "[s3] \"Isso não é um jogo, é a realidade.\"\n[s4] \"Por isso, quero que pensem bem antes de decidir.\""
90001130-366 = "...O Sensei é um companheiro da Alice."
90001130-367 = "[s] \"Fico muito feliz que pense assim, mas...\""
90001130-369 = "[ns] \"Vou explicar de novo. Isso é...\""
90001130-370 = "Está tudo bem, a Alice entende perfeitamente."
90001130-371 = "Você quer dizer que talvez não consiga garantir a nossa segurança, certo?"
90001130-372 = "Alice..."
90001130-377 = "...Sensei."
90001130-378 = "Então, como devemos ir até lá?"
90001130-379 = "[s] \"!?\""
90001130-384 = "A-Alice!?"
90001130-385 = "Alice!?"
90001130-390 = "Por que está tão surpreso?#nQuando um companheiro está em apuros, todos devem ajudar. É o básico do jogo em grupo."
90001130-391 = "Acima de tudo, a Alice fica feliz que o Sensei tenha contado comigo quando precisou."
90001130-392 = "Afinal, a confiança é a maior prova de que somos companheiros."
90001130-393 = "[s] \"...Tem certeza mesmo?\""
90001130-394 = "Sensei... a Alice ainda é uma aprendiz, mas ainda assim sou uma heroína. Eu me esforço para ser uma."
90001130-395 = "Como uma heroína aprendiz, eu quero que o mundo se torne um lugar um pouco melhor."
90001130-396 = "É por isso que, se houver alguém em apuros, eu quero ajudar."
90001130-397 = "Porque, se eu fizer isso, o mundo se tornará um pouquinho mais maravilhoso."
90001130-398 = "[s] \"E se a situação ficar perigosa... o que você vai fazer, Alice?\""
90001130-399 = "Nesse caso..."
90001130-405 = "Eu mudo de classe para estudante e me escondo em um lugar seguro!"
90001130-407 = "Essa é boa!#nSe for um jogo, vale tudo, né!"
90001130-408 = "Mas trapacear não vale."
90001130-409 = "E-eu também acho que assim ficaria tudo bem..."
90001130-410 = "[s] \"Se a situação ficar realmente perigosa, você vai me ouvir, certo?\""
90001130-412 = "Com certeza, Sensei!#nA heroína sempre cumpre suas promessas!"
90001130-413 = "...Mas e se for um pedido estranho?"
90001130-418 = "Tudo bem, Alice!#nO Sensei falar coisas estranhas é normal!"
90001130-419 = "Bem... é verdade."
90001130-420 = "M-mas... eu acho que ele não diria coisas estranhas em um momento de perigo."
90001130-422 = "É verdade!#nSensei, por favor, me diga logo como chegar à geleira!"
90001130-423 = "[s5] \"Obrigado, pessoal.\"\n[s6] \"Vou explicar pelo MomoTalk.\""
90001130-426 = "[ns] \"Ah, é, preciso dizer uma última coisa.\""
90001130-432 = "O que houve?"
90001130-433 = "[s] \"Venham agasalhados.\""
90001130-438 = "Próximo episódio: Reunião"
