[translation]
1005906-1 = "Cicatrizes"

1005906-6 = "(Eu ouvi toda a história da equipe)"

1005906-7 = "...Mika está atualmente suspensa na sala de reflexão #n devido a um incidente de violência dentro da escola."

1005906-8 = "[s] \"Este é um caso de violência...?\""

1005906-9 = "sim. Aparentemente ele levantou a mão para outro aluno..."

1005906-10 = "[ns1] \"…………!?\"\n[ns2] \"O que diabos aconteceu?\""

1005906-13 = "Também não sei os detalhes..."

1005906-14 = "#n Mika estava observando a aula de sinuca de hoje."

1005906-15 = "[s] \"...Visita?\""

1005906-16 = "isso mesmo. Além disso, ele apareceu na hora em que as aulas terminaram e não olhou ao redor da piscina, mas parecia estar andando por aqui e ali..."

1005906-17 = "Também houve problemas com a atitude de Mika nas aulas."

1005906-18 = "Parece que alguns estudantes ficaram insatisfeitos com isso e protestaram. #n Então Mika-san levantou a mão para as meninas..."

1005906-22 = "[ns] \"………….\""

1005906-23 = "Felizmente, o aluno não ficou gravemente ferido, e #nMika também pediu para ser contido, então a história terminou aí..."

1005906-24 = "A situação está um pouco complicada devido à posição atual de Mika...Espero que não se torne muito importante..."

1005906-25 = "Então... eu queria saber se eu poderia pedir a Mika-san para ser minha Senseia de placas de Petri..."

1005906-26 = "[s] \"...Eu entendo.\""

1005906-30 = "obrigado!"

1005906-34 = "Bem, tenho algo para fazer, então, por favor, me desculpe."

1005906-38 = "[ns] \"…….\""

1005906-44 = "(Decidi assumir a custódia de Mika, que está em liberdade condicional.)"

1005906-50 = "[ns] \"Mika....\""

1005906-51 = "Haha... acabou assim de novo."

1005906-52 = "Você está desapontado...? Mas você sabe que #nSou um péssimo aluno."

1005906-53 = "Se você deixá-lo sozinho, ele sempre causará problemas... ele é uma criança tão problemática."

1005906-57 = "É só um incômodo e estou ligando... Já era hora..."

1005906-64 = "[ns] \"Mika...Você não está sendo assediado por acaso? Você está bem?\""

1005906-65 = "Uh... ah, sim! ?"

1005906-66 = "[s] \"Você perdeu seu maiô?\""

1005906-70 = "Eu... eu..."

1005906-71 = "E-eu comprei e recebi um maiô da minha Senseia, mas..."

1005906-78 = "P-por que! ?"

1005906-79 = "O maiô...! #nHuh? onde……! ?"

1005906-85 = "Pfft... a \"princesa\" da festa do chá não consegue nem administrar #n armários."

1005906-86 = "Bom, até agora parece que tudo foi feito pelos atendentes, então acho que é assim."

1005906-87 = "Mas não é bom? Ele é uma pessoa de alto escalão... #nVocê não quer estar no mesmo grupo que plebeus como nós, certo?"

1005906-88 = "Ah... tem muitas latas de lixo. #nEu me pergunto se tinha muito lixo...Pfft."

1005906-89 = "…………."

1005906-101 = "Não... procurei a lata de lixo e o incinerador..."

1005906-102 = "Não está em lugar nenhum…! #nPor que...? #nMesmo sendo importante... onde diabos está...?"

1005906-107 = "Ah, tem lixo aqui também, né?"

1005906-111 = "...! !"

1005906-112 = "É lixo ou é um maiô?"

1005906-116 = "Bem, não posso mais usá-lo em pedaços."

1005906-125 = "Muito bem para vocês..."

1005906-127 = "Ei, ei! ?"

1005906-128 = "O-o que! ? Ouvi dizer que Mika é tão estúpida que nem consegue mais se rebelar! ?"

1005906-129 = "Eu-eu vou ser morto...! ?"

1005906-136 = "(...não)"

1005906-137 = "(...Se isso continuar, voltarei novamente...)"

1005906-138 = "Bem, ela é uma bruxa...! #n, me ajude! !"

1005906-142 = "Espere, não me deixe aí!"

1005906-146 = "Não me puxe nem um pouco...! Uau! ?"

1005906-152 = "Eu-isso..."

1005906-157 = "O maiô..."

1005906-159 = "……."

1005906-160 = "Sensei...me desculpe. #nO maiô que minha Senseia me comprou está estragado..."

1005906-161 = "Bem, é claro...#nEu fiz muitas coisas terríveis até agora...#nSe eu fosse uma \"boa menina\", isso não teria acontecido."

1005906-162 = "Mas desta vez...eu realmente tentei o meu melhor...#n mas...não deu certo..."

1005906-163 = "Me desculpe... eu sempre acabo estragando a boa vontade do Sensei... #nEu estava ansiosa para nadar nesse maiô..."

1005906-164 = "...Acho que é impossível para mim..."

1005906-165 = "Não importa o que eu faça, não posso voltar atrás..."

1005906-166 = "[s] \"...Mika, você tem tempo hoje?\""

1005906-167 = "...Eh?"

1005906-168 = "tempo……? #nUh, sim. Ainda falta muito tempo até o toque de recolher..."

1005906-174 = "[ns] \"Ok, vamos para a aula de natação.\""

1005906-175 = "...Eh?"

1005906-182 = "Loja de roupas designada da Trinity"

1005906-185 = "……Concordo. #nEstá bastante desgastado, mas isso não significa que não possa ser reparado."

1005906-187 = "……."

1005906-188 = "Acho que haverá algumas marcas de costura, mas não acho que será um problema se você usar normalmente. #nComo acabei de comprar, aceitarei de graça."

1005906-189 = "[s] \"Obrigado.\""

1005906-190 = "Isso terminará em breve, então aguarde um momento."

1005906-194 = "Obrigado por esperar, por favor."

1005906-199 = "……."

1005906-200 = "Posso até consertar roupas de banho..."

1005906-201 = "Eu não sabia disso...#nAchei que teria que comprar um novo se não funcionasse..."

1005906-205 = "S-Sensei...? Para onde você está indo? ...#nEsta não é uma sala de aula..."

1005906-206 = "Aulas de natação, certo? #nMas não sei o que vou fazer..."

1005906-207 = "Além disso, não deve haver nada aberto neste momento..."

1005906-208 = "[s] \"Tem um lugar legal.\""

1005906-213 = "Campo de treinamento/piscina"

1005906-215 = "Aqui..."

1005906-220 = "Entendo... agora que penso nisso, havia esse lugar."

1005906-221 = "[s] \"É um lugar de lembranças, né?\""

1005906-222 = "……Sim."

1005906-223 = "Ficou muito tempo sozinho e ficou sujo sem ser cuidado... #nEstava realmente uma bagunça que não havia nada que eu pudesse fazer a respeito..."

1005906-224 = "Agora renasceu tão lindamente."

1005906-225 = "[s3] \"Sim, o mesmo vale para trajes de banho.\"\n[s4] \"Acho que é o mesmo para todo o resto.\""

1005906-228 = "……."

1005906-229 = "Então, você vai ter aulas de natação com seu Sensei agora?"

1005906-230 = "Já é tarde da noite assim...e estamos só nós dois em um lugar deserto...? #nVocê está bem? Não seria muito ruim se eles descobrissem?"

1005906-231 = "[s] \"Ah! Entendo...\""

1005906-232 = "Bem, estou bem, mas ☆#nVou me trocar, então, por favor, espere!"

1005906-236 = "[ns] \"Espere, Mika!?\""

1005906-239 = "Jajaa~☆"

1005906-240 = "Olha, Senseia! É um pouco difícil, mas voltou completamente ao normal!"

1005906-244 = "O que você acha? Isso combina com você? #nPosso usar o maiô especificado pela escola?"

1005906-245 = "Ei, ei? ?"

1005906-246 = "[s] \"Hum... Mika-san, está um pouco... perto demais.\""

1005906-247 = "Ahaha! O que, uma estudante de maiô? #nSe você fugir, você vai se machucar."

1005906-248 = "[s] \"…….\""

1005906-259 = "Nossa... agora que penso nisso com calma, fico com muita vergonha..."

1005906-260 = "[s] \"Mika era o tipo de pessoa que se movia antes de pensar.\""

1005906-261 = "Ahaha☆Sim. #nAs raízes não parecem mudar tão facilmente."

1005906-265 = "O Sensei virá também? #nÉ tão bom☆"

1005906-266 = "[s] \"Não, eu recuso...\""

1005906-270 = "Bip! Lá! #nEste lugar está atualmente fora dos limites!"

1005906-271 = "Uau, Senseia! O segurança chegou! ?"

1005906-272 = "[s5] \"Acabei de me lembrar de algo urgente, desculpe! Pois bem!\"\n[s6] Eu pego Mika e saio correndo a toda velocidade."

1005906-277 = "Ei, Sensei! ?"

1005906-282 = "Ei, Sensei! ?"

