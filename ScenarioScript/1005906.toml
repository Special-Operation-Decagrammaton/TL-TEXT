[translation]
1005906-1 = "きずあと"
1005906-6 = "（職員から事情の一部始終を聞いた）"
1005906-7 = "……現在ミカさんは、校内で暴力沙汰を起こしたため、#n反省部屋で謹慎中です。"
1005906-8 = "[s] \"暴力沙汰、ですか……？\""
1005906-9 = "はい。別の生徒さんに手を上げたそうで……。"
1005906-10 = "[ns1] \"…………！？\"\n[ns2] \"一体何があったんですか？\""
1005906-13 = "詳しくは私も分かりませんが……"
1005906-14 = "今日のプールの授業で、#nミカさんが見学していたんです。"
1005906-15 = "[s] \"……見学？\""
1005906-16 = "そうです。それも、授業が終わる頃にやってきて、#nプールサイドで見学をするわけでもなく、あちこち歩き回っていたようで……"
1005906-17 = "ミカさんの授業態度にも問題はありました。"
1005906-18 = "そのことに不満を抱いた何人かの生徒が抗議をしたようです。#nそうしたらミカさんが彼女たちに手を上げて……"
1005906-22 = "[ns] \"…………。\""
1005906-23 = "幸い、その生徒さんは大事には至りませんでしたし、#nミカさんも自ら謹慎を望んだので、そこで話は終わりましたが……"
1005906-24 = "今のミカさんの立場のこともありますし、#nちょっと状況が複雑でして……あまり大事にならないといいのですが……"
1005906-25 = "それで……その、ミカさんをシャーレの先生にお願いできればと……"
1005906-26 = "[s] \"……分かりました。\""
1005906-30 = "ありがとうございます！"
1005906-34 = "では私は用事があるので、失礼いたします。"
1005906-38 = "[ns] \"……。\""
1005906-44 = "（謹慎中のミカの身柄を引き継ぐことになった）"
1005906-50 = "[ns] \"ミカ……。\""
1005906-51 = "あはは……また、こんな風になっちゃった。"
1005906-52 = "ガッカリした……？でも、知ってるもんね、#n私が不良生徒な事。"
1005906-53 = "放っておいたら揉め事ばっか起こす……そんな問題児なんだから。"
1005906-57 = "迷惑ばっか、かけちゃってるし……そろそろ――"
1005906-64 = "[ns] \"ミカ……もしかして、嫌がらせとかされてない？大丈夫？\""
1005906-65 = "っ……う、うん！？"
1005906-66 = "[s] \"水着、なくしたの？\""
1005906-70 = "わ……わたし……"
1005906-71 = "せ、先生に、買って、もらった……水着、だったのに……。"
1005906-78 = "な、なんで！？"
1005906-79 = "水着が……！#nあれ？どこ……！？"
1005906-85 = "ぷっ……ティーパーティーの「お姫様」は、#nロッカーの管理もできないんですね。"
1005906-86 = "まあ、今までは全部お付きの人にやってもらってたみたいだし、#nそういうもんなのかな。"
1005906-87 = "でも、よかったんじゃないですかぁ？身分の高いお方ですもの……#n私たちみたいな庶民と同じプールに入るなんて、嫌ですよねぇ？"
1005906-88 = "あら……ゴミ箱がいっぱい。#nゴミが多かったのかしらねぇ……ぷっ。"
1005906-89 = "…………。"
1005906-101 = "ない……ゴミ箱も、焼却炉も探したけど……"
1005906-102 = "どこにも無い……！#nどうして……？#n大事なものなのに……一体どこに……。"
1005906-107 = "あら、こんなところにもゴミがありますねぇ？"
1005906-111 = "……！！"
1005906-112 = "ゴミっていうか、水着？"
1005906-116 = "まあ、もうズタズタで着れたもんじゃないですけど。"
1005906-125 = "あんた達、よくも……"
1005906-127 = "ひ、ひぃっ！？"
1005906-128 = "な、何よ！？ミカはもう反抗すらできない腑抜けって聞いたんだけど！？"
1005906-129 = "こ、殺される……！？"
1005906-136 = "（……ダメ）"
1005906-137 = "（……このままじゃ、また私は……）"
1005906-138 = "ま、魔女だ……！#nた、たすけて！！"
1005906-142 = "待って、置いてかないでよ！"
1005906-146 = "ちょっと引っ張らないで……！う、うわぁっ！？"
1005906-152 = "い、いたた……。"
1005906-157 = "水着が……"
1005906-159 = "……。"
1005906-160 = "先生……ごめんね。#n先生が買ってくれた水着、ダメになっちゃった……。"
1005906-161 = "まあ、当然だよね……#n今まで私、散々酷い事ばっかしてきたから……#n私が「いい子」だったら、こんなことなってないもんね。"
1005906-162 = "でも今回は……本当に、頑張ったのに……#nなのに……うまくいかなかったなぁ……。"
1005906-163 = "ごめんなさい……私、いつも先生の好意を台無しにしちゃうね……。#nこの水着で泳ぐの、楽しみだったのに……。"
1005906-164 = "……やっぱ、私には無理なんだねー……。"
1005906-165 = "何をしたって、もう取り戻せないんだ……。"
1005906-166 = "[s] \"……ミカ、今日は時間ある？\""
1005906-167 = "……えっ？"
1005906-168 = "時間……？#nう、うん。まだ門限までは全然あるけど……"
1005906-174 = "[ns] \"じゃあ、水泳の授業しに行こっか。\""
1005906-175 = "……えっ？"
1005906-182 = "トリニティの指定洋服販売店"
1005906-185 = "……そうですね。#nかなりボロボロですが、修繕できないわけではありません。"
1005906-187 = "……。"
1005906-188 = "縫った跡が残るとは思いますが、普通に着る分には問題ないかと。#n買って間もないので、無料でお引き受けしましょう。"
1005906-189 = "[s] \"ありがとうございます。\""
1005906-190 = "すぐ終わりますので、少々お待ちください。"
1005906-194 = "お待たせしました、どうぞ。"
1005906-199 = "……。"
1005906-200 = "水着も、直せるんだ……。"
1005906-201 = "知らなかった……#nダメになったら新しいのを買うしかないと思ってた……。"
1005906-205 = "せ、先生……？どこに向かってるの？……#nこっちは教室じゃないけど……。"
1005906-206 = "水泳の授業、だよね……？#n何をするのかは分かんないけどさ……。"
1005906-207 = "あと今の時間は、どこも開いてないはず――"
1005906-208 = "[s] \"いい場所があるんだ。\""
1005906-213 = "合宿所・プール"
1005906-215 = "ここは……"
1005906-220 = "そっか……そういえば、ここがあったね。"
1005906-221 = "[s] \"思い出の場所、だよね？\""
1005906-222 = "……うん。"
1005906-223 = "長い間放ったらかされて、手入れもされず汚れたままだった……、#nほんと、手の施しようがないくらいにめちゃくちゃだったのに……"
1005906-224 = "今はこんなにも綺麗に生まれ変わってる。"
1005906-225 = "[s3] \"うん、水着もそうだよね。\"\n[s4] \"他も、同じだと思うよ。\""
1005906-228 = "……。"
1005906-229 = "で、今から先生と水泳の授業？"
1005906-230 = "こんな深夜の……しかも人気のない場所で、二人きり……？#n大丈夫？バレたらかなりヤバいんじゃない？"
1005906-231 = "[s] \"あっ！そ、そっか……。\""
1005906-232 = "ま、私はいいんだけど☆#n着替えてくるから待ってて！"
1005906-236 = "[ns] \"ま、待ってミカ！？\""
1005906-239 = "じゃじゃ～ん☆"
1005906-240 = "見て、先生！ちょっとキツいけど、すっかり元通り！"
1005906-244 = "どうどう？似合う？#n学校指定の水着でもいいカンジ？"
1005906-245 = "ねぇねぇ？？"
1005906-246 = "[s] \"えっと……ミカさん、ちょっと……近すぎます。\""
1005906-247 = "あははっ！なになに、女子生徒の水着姿だよ？#n逃げるなんて、傷ついちゃうなぁ。"
1005906-248 = "[s] \"……。\""
1005906-259 = "うわぁ……冷静に考えたら、めちゃくちゃ恥ずかしくなっちゃった……。"
1005906-260 = "[s] \"ミカは考えるより先に身体が動くタイプだったよね。\""
1005906-261 = "あははっ☆うん。#n根っこはそう簡単には変わらないみたい。"
1005906-265 = "先生も入る？#nすっごい気持ち良いよ☆"
1005906-266 = "[s] \"いえ、お断りします……。\""
1005906-270 = "ピーッ！そこ！#nこの場所は今、立ち入り禁止ですよ！"
1005906-271 = "わわっ、先生！警備員さん来ちゃったよ！？"
1005906-272 = "[s5] \"ちょっと急な用事を思い出しちゃった、ごめん！それじゃ！\"\n[s6] ミカを連れて全速力で逃げる。"
1005906-277 = "せ、先生！？"
1005906-282 = "せ、先生！？"
