[translation]
1600802-1 = "A ideia de uma policial preguiçosa"
1600802-2 = "Preocupado com a mensagem do MomoTalk da Fubuki, visitei o Departamento de Segurança Pública."
1600802-4 = "Escola Valkyrie - Departamento de Segurança Pública"
1600802-6 = "Ah, puxa vida..."
1600802-7 = "Posso mesmo ficar com tantos donuts assim...?"
1600802-8 = "O Departamento de Segurança Pública é o melhor..."
1600802-9 = "[s] Sacudo o ombro da Fubuki para acordá-la."
1600802-10 = "Hmm...?"
1600802-11 = "Ué... Sensei?"
1600802-12 = "Eu estava tirando um cochilo tão gostoso..."
1600802-17 = "Então, por que veio ao Departamento de Segurança Pública de repente?"
1600802-18 = "Se for um caso problemático, peça para a Kirino ou para outro departamento. Estou ocupada tirando um cochilo."
1600802-19 = "[s1] \"O que quer dizer com 'ocupada tirando um cochilo'...?\"\n[s2] \"Eu queria perguntar sobre aquela mensagem no MomoTalk de agora pouco...\""
1600802-20 = "MomoTalk? Eu não mandei nada para você hoje, mandei?"
1600802-21 = "MomoTalk? Eu não mandei nada para você hoje, mandei?"
1600802-22 = "...Ah, será que..."
1600802-28 = "...Ah, é um erro no macro."
1600802-29 = "Foi mal, foi mal. Parece que um aviso interno da Valkyrie acabou sendo enviado para você por engano. Não é nada demais, então não se preocupe."
1600802-30 = "[s] \"Macro...?\""
1600802-31 = "É. Eu peguei um programa que comprei em Millennium, dei uns ajustes e deixei ele trabalhando no meu lugar."
1600802-32 = "Basta deixar isso ligado e ele responde automaticamente a qualquer reclamação que chegar."
1600802-33 = "Por exemplo..."
1600802-37 = "\"Fubuki, você não esqueceu da reunião de amanhã de manhã, né? Não pode se atrasar!\""
1600802-38 = "\"Sim, eu sei disso, então não se preocupe.\""
1600802-39 = "\"Fubuki, você está com o registro da patrulha da semana passada? Tenho que escrever o relatório, mas não estou achando...\""
1600802-40 = "\"Eu também não sei, mas... por que você não tenta perguntar para o Departamento de Segurança primeiro?\""
1600802-41 = "...Mais ou menos assim!"
1600802-42 = "Bem, é um algoritmo bem simples, mas na maioria das vezes ninguém percebe. Até agora, tem funcionado bem para empurrar o trabalho para outros departamentos."
1600802-43 = "E, enquanto isso, eu posso fazer coisas mais produtivas."
1600802-44 = "Como tirar um cochilo ou comer um lanche."
1600802-45 = "[s3] \"...Isso é seguro de várias formas?\"\n[s4] \"E se algo realmente sério acontecer...?\""
1600802-46 = "Relaxa, relaxa. Afinal, quase nunca acontece nada \"realmente sério\" no Departamento de Segurança Pública."
1600802-47 = "Relaxa, relaxa. Afinal, quase nunca acontece nada \"realmente sério\" no Departamento de Segurança Pública."
1600802-48 = "Na maioria das vezes, são só reclamações chatas que se resolvem com respostas automáticas."
1600802-49 = "E mesmo que chegue algo complicado que o macro não consiga resolver, a Kirino deve dar um jeito."
1600802-50 = "[s] \"Hmm...\""
1600802-51 = "Ah... ainda não dormi o suficiente..."
1600802-52 = "Então, Sensei, vou tirar um cochilo de verdade agora. Seria uma ajuda se você pudesse ficar de olho para ver se o macro está funcionando direito."
1600802-53 = "Boa noite."
1600802-58 = "Depois disso..."
1600802-63 = "Fubuki, aqui é o Departamento de Segurança. Você está de serviço agora, certo?"
1600802-64 = "\"Sim, eu sei disso, então não se preocupe.\""
1600802-65 = "\"Então, vamos nos esforçar no trabalho.\""
1600802-66 = "...Que atitude é essa?"
1600802-67 = "E desde quando você se esforça no trabalho...?"
1600802-68 = "\"Eu também não sei, mas...\""
1600802-69 = "Não diga isso você mesma! Era para você rebater isso, não era!?"
1600802-70 = "...Bom, deixa pra lá. Já sei que não adianta ficar bravo de verdade com o Departamento de Segurança Pública, só vou sair perdendo."
1600802-71 = "Sobre o motivo do meu contato: é sobre as barricadas que emprestamos ao Departamento de Segurança Pública. Quando vocês pretendem devolver?"
1600802-72 = "Como vocês não devolveram até agora, o Departamento de Segurança está com problemas."
1600802-73 = "Por que não tenta entrar em contato com o Departamento de Segurança primeiro?"
1600802-74 = "……Nós somos o Departamento de Segurança!?"
1600802-75 = "Será que estão me fazendo de idiota……?"
1600802-76 = "Sim, eu também acho."
1600802-80 = "……."
1600802-81 = "……Entendi perfeitamente."
1600802-82 = "Estou indo para o Departamento de Segurança Pública agora mesmo. Espere aí, Fubuki!"
1600802-86 = "……? Pareceu que ouvi um barulho alto……."
1600802-87 = "Sensei, aconteceu alguma coisa enquanto eu dormia?"
1600802-88 = "[s5] Desvia o olhar lentamente.\n[s6] \"Vamos cuidar das nossas próprias coisas, né…….\""
1600802-89 = "Hã, hã? O que isso significa? Não me diga que um problema sério aconteceu de verdade?"
1600802-90 = "Hã, hã? O que isso significa? Não me diga que um problema sério aconteceu de verdade?"
1600802-91 = "Sensei? Sensei!?"
1600802-93 = "Depois disso, Fubuki levou uma bronca daquelas dos oficiais do Departamento de Segurança que apareceram no Departamento de Segurança Pública e acabou tendo que escrever uma pilha de relatórios de desculpas……."
