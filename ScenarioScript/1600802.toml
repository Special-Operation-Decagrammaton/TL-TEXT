[translation]
1600802-1 = "怠けがちな警察官の発想"
1600802-2 = "フブキのモモトークの件が気になり、生活安全局を訪れた。"
1600802-4 = "ヴァルキューレ警察学校・生活安全局"
1600802-6 = "いやぁ、悪いねぇ……。"
1600802-7 = "こんなにたくさんドーナッツ貰っても良いわけ……？"
1600802-8 = "生活安全局、最高ー……。"
1600802-9 = "[s] フブキの肩を揺らして起こす。"
1600802-10 = "んー……？"
1600802-11 = "あれ……先生？"
1600802-12 = "せっかく気持ち良く昼寝してたのに……。"
1600802-17 = "で、今日はどうして急に生活安全局に？"
1600802-18 = "めんどくさい案件ならキリノか、別の局にお願い。私は昼寝で忙しいから。"
1600802-19 = "[s1] \"「昼寝で忙しい」とは……？\"\n[s2] \"さっきのモモトークの件について聞きたくって……。\""
1600802-20 = "モモトーク？今日先生には送ってなくない？"
1600802-21 = "モモトーク？今日先生には送ってなくない？"
1600802-22 = "……あ、もしかして。"
1600802-28 = "……あー、マクロの誤作動だこれ。"
1600802-29 = "ごめんごめん。ヴァルキューレ内部での定期連絡が、間違って先生の方に飛んでたみたい。特に何も無いから気にしないで。"
1600802-30 = "[s] \"マクロ……？\""
1600802-31 = "うん。ミレニアムで買ったプログラムをちょいちょいっといじって、私の代わりに働いてくれるようにしておいたの。"
1600802-32 = "これをONにしておくだけで、どんな苦情が来ても自動で処理してくれるわけ。"
1600802-33 = "例えば……"
1600802-37 = "「フブキ、明日の午前中にある定例会議忘れてないよね？遅れちゃダメだよ！」"
1600802-38 = "「うん、それは分かってるから心配しないで」"
1600802-39 = "「フブキ、先週のパトロールの記録って手元にある？報告書を書かなきゃなのに、ちょっと見つからなくって……」"
1600802-40 = "「それは私にも分からないけど……とりあえず一度、警備局に問い合わせてみたら？」"
1600802-41 = "……こんな感じで！"
1600802-42 = "まあ雑なアルゴリズムではあるけど、この程度のレベルでもほとんどの場合はバレないんだよね。これまでも良い感じに他の部署に押し付けられてるし。"
1600802-43 = "それで私はその間、もっと生産的なことができると。"
1600802-44 = "昼寝とか、おやつとかね。"
1600802-45 = "[s3] \"……これ、色々と大丈夫なの？\"\n[s4] \"本当に大変なことが舞い込んだ時とかは……？\""
1600802-46 = "大丈夫大丈夫、そもそも生活安全局に「本当に大変なこと」なんてほとんど来ないから。"
1600802-47 = "大丈夫大丈夫、そもそも生活安全局に「本当に大変なこと」なんてほとんど来ないから。"
1600802-48 = "大抵はオウム返しで済むような、めんどくさい苦情ばっかだよ。"
1600802-49 = "まあたとえマクロじゃ処理できないような面倒なことが回ってきても、キリノとかが良い感じにしてくれるはずだし。"
1600802-50 = "[s] \"うーん……\""
1600802-51 = "ふぁ……まだ寝足りない……。"
1600802-52 = "じゃあ先生、私は本格的に昼寝するから。その間マクロがちゃんと作動してるか見守っててくれると助かるな。"
1600802-53 = "おやすみー。"
1600802-58 = "その後……"
1600802-63 = "フブキ、こちら警備局。今勤務中だよな？"
1600802-64 = "「うん、それは分かってるから心配しないで」"
1600802-65 = "「じゃあ、頑張って働くとしよう」"
1600802-66 = "……何だその態度は。"
1600802-67 = "それに、あんたがいつ頑張って働いたって……？"
1600802-68 = "それは私にも分からないけど……"
1600802-69 = "自分で言うな！そこは反論するところだろ！？"
1600802-70 = "……まあ良い。今さら生活安全局相手に真面目に怒ったところで、こっちが損するだけだって分かってるからな。"
1600802-71 = "今回連絡した件だけど、以前生活安全局に貸したバリケードについての話。あれはいつ返してくれる予定だ？"
1600802-72 = "しばらく返却が無いせいで、警備局でも困ってるんだ。"
1600802-73 = "とりあえず一度、警備局に問い合わせてみたら？"
1600802-74 = "……私たちがその警備局だが！？"
1600802-75 = "もしかして、私はバカにされてるのか……？"
1600802-76 = "うん、私もそう思う"
1600802-80 = "……。"
1600802-81 = "……よく分かった。"
1600802-82 = "今すぐ生活安全局に向かう。そこで待ってろフブキ！"
1600802-86 = "……？何か大きな音がしたような……。"
1600802-87 = "先生、私が寝てる間に何かあった？"
1600802-88 = "[s5] ゆっくり視線を逸らす。\n[s6] \"自分のことはちゃんと自分でやろうね……。\""
1600802-89 = "え、え？どういうこと？まさか本当に何か大きな問題でも起こった？"
1600802-90 = "え、え？どういうこと？まさか本当に何か大きな問題でも起こった？"
1600802-91 = "先生？先生！？"
1600802-93 = "その後フブキは生活安全局に来た警備局の幹部に派手に怒られ、大量の始末書を書くこととなった……。"
