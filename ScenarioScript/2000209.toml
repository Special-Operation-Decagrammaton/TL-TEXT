[translation]
2000209-1 = "Nezusuke desaparecido"
2000209-2 = "Laboratório da Saya"
2000209-3 = "Sensei, é uma emergência, uma emergência! O Nezusuke... o Nezusuke..."
2000209-4 = "O Nezusuke sumiu!"
2000209-5 = "Eu pensei que ele pudesse estar escondido em algum lugar e procurei por todo o laboratório, mas ele não está em lugar nenhum!"
2000209-7 = "É a primeira vez que o Nezusuke vai embora sem dizer nada... o, o que eu faço? Buááá!"
2000209-8 = "[s] Acalmar a Saya."
2000209-10 = "Snif, snif. Mas... e se algo aconteceu com o Nezusuke...?"
2000209-11 = "Ah, lugares onde o Nezusuke iria?#nO Nezusuke é meu parceiro e está sempre comigo, então ele nunca foi a lugar nenhum sozinho."
2000209-12 = "[s] \"Vamos perguntar aos outros membros do Clube de Pesquisa de Alquimia.\""
2000209-13 = "Entendido... snif."
2000209-15 = "Sala de aula de Shanhaijing"
2000209-16 = "O Nezusuke sumiu? Isso é terrível..."
2000209-17 = "Vocês viram o Nezusuke hoje?"
2000209-18 = "Não, eu nunca vi o Nezusuke em nenhum lugar que não fosse o laboratório da veterana."
2000209-19 = "Mas é estranho. O Nezusuke desaparecer sozinho..."
2000209-20 = "O que eu faço, snif..."
2000209-21 = "Não querendo ser indelicada, mas... será que o Nezusuke não fugiu de casa?"
2000209-22 = "...Fugiu de casa?"
2000209-23 = "Sim, a veterana usava os experimentos como desculpa para maltratar o Nezusuke quase todo dia..."
2000209-24 = "Na verdade, é impressionante que ele não tenha fugido antes."
2000209-25 = "Maltratar, nada! Eu só estava pedindo ajuda nos experimentos, eu nunca maltratei o Nezusuke!"
2000209-26 = "Mas o Nezusuke não gostava de participar dos experimentos, não é?#nEle sempre acaba ficando com uma aparência estranha, eu entendo como ele se sente."
2000209-27 = "Uuu..."
2000209-28 = "[s] \"Vamos perguntar aos outros membros.\""
2000209-29 = "Entendido..."
2000209-31 = "Mentira, o Nezusuke sumiu?"
2000209-32 = "Sim. Você viu o Nezusuke em algum lugar hoje?"
2000209-33 = "Não... não me lembro de ter visto o Nezusuke hoje."
2000209-34 = "Sério, para onde ele foi... snif."
2000209-35 = "Com licença, mas... será que o Nezusuke não fugiu de casa?"
2000209-36 = "Pessoal... por que vocês acham isso?"
2000209-37 = "Pessoal...? Bem, é que, o Nezusuke sempre era maltratado pela veterana Saya..."
2000209-38 = "Eu não queria maltratá-lo, buááá..."
2000209-39 = "[s] \"Vamos dar uma volta pela escola para procurar o Nezusuke.\""
2000209-40 = "Tá bom..."
2000209-42 = "Escola Secundária Shanhaijing"
2000209-47 = "Nezusuke... para onde você foi, de verdade..."
2000209-48 = "[s] \"Vamos procurar ali também.\""
2000209-49 = "...Não, já chega.#nO Nezusuke, como a Mei e a Kin disseram, com certeza fugiu de casa."
2000209-50 = "É tudo culpa minha por ter maltratado ele demais. Uuu...#nO Nezusuke ficou decepcionado comigo e não vai mais voltar."
2000209-51 = "[s] Dizer para não desistir."
2000209-52 = "Sensei, você também deve ter sofrido por causa dos meus experimentos, não é?#nMesmo assim... por que você é tão gentil comigo?"
2000209-53 = "[s1] \"Eu me diverti estando com a Saya.\"\n[s2] \"Porque eu sou o Sensei.\""
2000209-55 = "Sensei..."
2000209-57 = "Sensei..."
2000209-60 = "Chu, chu-chu..."
2000209-61 = "Ah, Nezusuke...! Onde você estava, buáááá!"
2000209-62 = "Chu-chu..."
2000209-63 = "Snif, snif... você fugiu porque eu te tratei mal esse tempo todo?#nSinto muito mesmo..."
2000209-64 = "Chu-chu, chu."
2000209-65 = "Hã? Você ouviu que a associação comercial ia distribuir sementes de girassol gigantes e foi lá? #nEntão por que você foi sem me avisar nada! Eu passei o dia inteiro te procurando!"
2000209-66 = "Snif... mas me desculpa. De agora em diante, não vou mais fazer travessuras terríveis... #nVocê nunca mais pode ir embora sem me dizer nada, entendeu?"
2000209-67 = "Chu..."
2000209-70 = "Sim, eu prometo! De agora em diante, só vou te envolver em experimentos sérios!"
2000209-71 = "Chu!"
2000209-72 = "Seu pestinha, Nezuke! Pare de se debater! #nEu não vou te deixar escapar nunca mais!"
2000209-74 = "Chu, chu-chu!"
2000209-76 = "Depois disso, Saya voltou para o laboratório em harmonia com Nezuke."
