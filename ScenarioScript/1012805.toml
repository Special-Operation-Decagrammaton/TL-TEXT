[translation]
1012805-1 = "スカウトの試み"
1012805-2 = "おはようございます、先生。"
1012805-3 = "お元気そうでなによりです！"
1012805-4 = "[s] \"おはよう、フユ。\""
1012805-8 = "[ns] \"……ところで、今日の当番って別の子だよね？\""
1012805-9 = "書類上は、私が当番です。"
1012805-10 = "学院の当番外出者リストにも、ちゃんと私の名前がありましたよ？"
1012805-11 = "[s] \"あれ、私には何も共有されてないんだけど……。\""
1012805-12 = "そうでしょうね。"
1012805-13 = "私が修正したのは、校内の名簿だけですから。"
1012805-14 = "[s] \"……え？\""
1012805-15 = "「取引」の対価は、お金だけとは限りません。"
1012805-16 = "ときには、特別な権限をいただくことも……。"
1012805-20 = "[ns] \"名簿の改ざんを引き換えに、品物を渡したの？\""
1012805-21 = "ご名答！"
1012805-22 = "ですが先生、聞いてください。"
1012805-23 = "私にもやむを得ない事情がありまして……。"
1012805-24 = "[s] \"……聞かせてもらおうか。\""
1012805-25 = "今日は大事な商談があるんです。"
1012805-26 = "なんとしても成功させなければならない商談……それは――"
1012805-27 = "先生に、私ども特殊交易部の外部顧問になっていただくこと！"
1012805-28 = "[s] \"私！？\""
1012805-29 = "では、まずこちらの企画書をご覧ください。"
1012805-30 = "先生が特殊交易部の顧問になっていただければ、#nより多角的な事業が可能となります。"
1012805-31 = "依頼品の中には、外部の方でないと搬入できないものもありまして――"
1012805-36 = "（フユのプレゼンはしばらく続いた……）"
1012805-38 = "……以上です。"
1012805-39 = "いかがでしょう、先生？"
1012805-40 = "[s1] \"とても良いプレゼンテーションでした。\"\n[s2] \"ですが、当案件はお断りさせていただきます。\""
1012805-43 = "えっ……！#nなぜですか……！"
1012805-44 = "もしかして、報酬の説明が足りなかったのでしょうか？"
1012805-45 = "もしも、先生が私たちの顧問になってくださるのであれば――"
1012805-46 = "ほとんどの家電製品、電子機器を無償で修理しましょう！"
1012805-47 = "[s3] \"フユを見ていると、たまに思うんだ。\"\n[s4] \"ミレニアムは、惜しい人材を逃したのかなって……。\""
1012805-50 = "……ふふ。"
1012805-51 = "[s] \"でも、ダメなものはダメです。\""
1012805-52 = "いい条件だと……思うのですが……。"
1012805-53 = "うーん……あ、そうだ。"
1012805-54 = "私、修理だけでなく、料理も得意でして。"
1012805-55 = "お弁当はもちろん、だし巻き卵やお味噌汁も……。"
1012805-56 = "[s] \"それでもダメです。\""
1012805-57 = "うーん、他には……。"
1012805-58 = "え、えっと、顧問になっていただけたら……。"
1012805-59 = "わ、私と毎日、会えます……よ？"
1012805-60 = "って、これは報酬なのかな……？#nうぅ……。"
1012805-64 = "[ns] \"それは、ちょっと興味あるかも。\""
1012805-65 = "えっ。"
1012805-66 = "ほ、本当ですか……！？"
1012805-67 = "[s5] \"でも、今はシャーレの仕事で忙しくてね……。\"\n[s6] \"しばらくの間、顧問を引き受けるのは難しいんだ。\""
1012805-73 = "そ、それなら仕方ありませんね！"
1012805-74 = "ふ、ふふ……。#n次は、もっと作戦を練っておきましょう。"
1012805-75 = "それでは、今日はこの辺りで失礼します。"
1012805-83 = "ちょっと興味ある、か……。"
1012805-87 = "……ふふっ。"
