[translation]
1012805-1 = "Tentativa do escoteiro"

1012805-2 = "Bom dia, professor."

1012805-3 = "Estou feliz que você esteja bem!"

1012805-4 = "[s] \"Bom dia, Fuyu.\""

1012805-8 = "[ns] \"...A propósito, tem outra garota de plantão hoje, certo?\""

1012805-9 = "No papel, estou de plantão."

1012805-10 = "Meu nome também estava na lista de plantonistas da escola, né?"

1012805-11 = "[s] \"Bem, nada foi compartilhado comigo...\""

1012805-12 = "Eu acho que sim."

1012805-13 = "A única coisa que corrigi foi a lista da escola."

1012805-14 = "[s] \"...Hein?\""

1012805-15 = "A contrapartida por uma “transação” não é apenas dinheiro."

1012805-16 = "Às vezes você pode receber privilégios especiais..."

1012805-20 = "[ns] \"Você deu itens a eles em troca de falsificar a lista?\""

1012805-21 = "Ótima resposta!"

1012805-22 = "Mas, senhor, por favor, me escute."

1012805-23 = "Eu também tenho circunstâncias inevitáveis..."

1012805-24 = "[s] \"...Deixe-me perguntar uma coisa.\""

1012805-25 = "Tenho uma importante reunião de negócios hoje."

1012805-26 = "Uma negociação comercial que deve ser bem sucedida, não importa o que aconteça..."

1012805-27 = "Gostaríamos que você se tornasse um consultor externo do nosso Departamento de Negociação Especial!"

1012805-28 = "[s] \"Eu!?\""

1012805-29 = "Primeiro, dê uma olhada neste plano."

1012805-30 = "Se você se tornar consultor do Departamento de Comércio Especial, poderemos realizar negócios mais diversificados."

1012805-31 = "Alguns dos itens solicitados só podem ser entregues por pessoal externo."

1012805-36 = "(A apresentação de Fuyu continuou por um tempo...)"

1012805-38 = "...É isso."

1012805-39 = "O que você acha, senhor?"

1012805-40 = "[s1] \"Foi uma apresentação muito boa.\"\n[s2] \"No entanto, gostaria de recusar esta proposta.\""

1012805-43 = "Eh...! #nPorquê?...!"

1012805-44 = "Talvez eu não tenha explicado a recompensa o suficiente?"

1012805-45 = "Se você fosse nosso conselheiro..."

1012805-46 = "Repararemos a maioria dos eletrodomésticos e dispositivos eletrônicos gratuitamente!"

1012805-47 = "[s3] \"Quando olho para Fuyu, às vezes penso.\"\n[s4] \"Eu me pergunto se a Millennium perdeu um talento valioso...\""

1012805-50 = "……n / D."

1012805-51 = "[s] \"Mas se não é bom, não é bom.\""

1012805-52 = "acho que está em bom estado..."

1012805-53 = "Hmm... Ah, isso mesmo."

1012805-54 = "Não sou apenas bom em reparos, mas também em cozinhar."

1012805-55 = "Não só lancheiras, mas também ovos dashimaki e sopa de missô..."

1012805-56 = "[s] \"Isso ainda não funciona.\""

1012805-57 = "Hum, fora isso..."

1012805-58 = "Bem, se você pudesse se tornar um conselheiro..."

1012805-59 = "V-você consegue me ver todos os dias...?"

1012805-60 = "Então, isso é uma recompensa...? #nUgh..."

1012805-64 = "[ns] \"Isso pode ser um pouco interessante.\""

1012805-65 = "Huh?"

1012805-66 = "Ah, é verdade...! ?"

1012805-67 = "[s5] \"Mas agora estou ocupado com o trabalho da placa de Petri...\"\n[s6] \"É difícil aceitar um papel de conselheiro por um tempo.\""

1012805-73 = "Bem, então não pode ser ajudado!"

1012805-74 = "Fu, fufu…. #nDa próxima vez, vamos ter uma estratégia melhor."

1012805-75 = "Pois bem, por favor, desculpe-me por hoje."

1012805-83 = "Estou um pouco interessado, hein..."

1012805-87 = "...Hehe."

