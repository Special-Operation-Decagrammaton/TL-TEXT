[translation]
1004502-1 = "隠されていた島の宝物"
1004502-2 = "（ホシノの話を聞いて客室に向かった）"
1004502-7 = "（…………）"
1004502-8 = "うへへ、これだよ、これ～"
1004502-12 = "（……？）"
1004502-13 = "うんうん、いいね……。"
1004502-14 = "[s1] \"……ホシノ？\"\n[s2] 音がした方に行ってみる。"
1004502-21 = "……ん？"
1004502-22 = "あれ？先生、どしたの？"
1004502-23 = "モモトークで説明はしたような気がするけど……何かあった？"
1004502-24 = "[s3] \"ここで何してたの？\"\n[s4] \"独り言が聞こえたような気がして……。\""
1004502-25 = "……独り言？"
1004502-26 = "……独り言？"
1004502-27 = "ああ、えっとね……"
1004502-31 = "……これを見てたの。"
1004502-35 = "[ns5] \"リゾートガイドマップ？\"\n[ns6] \"ガイドマップがどうしたの？\""
1004502-36 = "うへー、分かってないなぁ先生。"
1004502-37 = "うへー、分かってないなぁ先生。"
1004502-38 = "こことか見てよ、ほら。"
1004502-39 = "ちょっと使用感があるでしょ？他の誰かが使ってた冊子らしくて。"
1004502-40 = "こういう誰かが書き込んだマップって、他の人の軌跡が残ってて面白いじゃん？"
1004502-41 = "だから客室をちょっと調べてたんだ。"
1004502-42 = "他にも似たようなものないかな～って……"
1004502-43 = "……ちょっとした宝探しっぽくて楽しいでしょ？"
1004502-44 = "それで見つかったのがこの部屋に残ってた「宝の地図」なんだ。"
1004502-45 = "いま、書き込まれた場所とかをチェックしてたとこ。"
1004502-46 = "あ、そうだ。"
1004502-53 = "せっかくだし……。"
1004502-54 = "先生も一緒にお宝を探さない？"
1004502-61 = "う～ん、この辺のどこかだと思うんだけど……。"
1004502-62 = "うへ……すごいきれいな景色。"
1004502-66 = "これはまさに「お宝」だねぇ～"
1004502-70 = "……お？"
1004502-71 = "[s] \"……どうしたの？\""
1004502-76 = "……！！！"
1004502-81 = "[ns] \"ホシノ！？\""
1004502-88 = "[wa:200]― いやぁ、[wa:1700]たまんないねぇ……"
1004502-90 = "[wa:50]― これぞ[wa:400]まさに[wa:450]楽園……"
1004502-93 = "[wa:1500]― 涼しい日陰……[wa:1850]心地良い海風……"
1004502-95 = "[wa:350]― 穏やか[wa:900]な波の音……"
1004502-98 = "[wa:50]― いやぁ、[wa:1150]ここに来られて良かった～"
1004502-100 = "― 最高だねぇ、[wa:2100]まるで[wa:350]夢みたいな場所だー……"
1004502-103 = "[wa:1700]― ……先生もそんなとこに[wa:1100]ずっと立ってないで、"
1004502-105 = "― 横になってみたら？"
1004502-108 = "― あんまり広くはないけど、[wa:1450]どう？"
1004502-110 = "[wa:50]― 良い感じだよ～？"
1004502-113 = "[ns7] \"楽しそうなホシノを見てるだけで満足だよ。\"\n[ns8] \"ゆっくり休んでて。ホシノも色々と疲れたでしょ。\""
1004502-114 = "― うへー、[wa:650]なるほどそう来たか……。"
1004502-115 = "― うへー、[wa:650]なるほどそう来たか……。"
1004502-117 = "[wa:200]― まあ、[wa:950]何となく[wa:500]予想はしてたけどね。"
1004502-120 = "[wa:650]― 別にいいのに……"
1004502-123 = "― まあ、[wa:800]そういうところ[wa:1250]嫌いじゃないけど。"
1004502-125 = "[wa:150]― ……えへへ。"
1004502-128 = "[ns9] \"いいお昼寝スポットが見つかったね。\"\n[ns10] \"寝過ごさないようにね。\""
1004502-129 = "うへ、先生も私がいない時はここを使ってもいいよ～"
1004502-130 = "うへ、先生も私がいない時はここを使ってもいいよ～"
1004502-135 = "まぁ、でも……。"
1004502-136 = "……せっかくなら、その時はおじさんも呼んでほしいかな。"
1004502-138 = "（一緒に横になってゆっくりお昼寝をしてから戻った）"
