[translation]
1003702-1 = "O interrogatório da presidente do Comitê de Segurança"
1003702-2 = "Em frente ao portão principal da Academia Federal Red Winter"
1003702-3 = "Reforçando: um \"espião\" é um agente contratado por uma organização hostil para obter informações, realizar sabotagens ou causar perturbações de forma secreta."
1003702-4 = "Nossa Academia Federal Red Winter é alvo de olhares invejosos de várias pequenas academias espalhadas por Kivotos. Portanto, não seria estranho se espiões tivessem se infiltrado aqui."
1003702-5 = "Além disso, espiões costumam ser especialistas em disfarces... ou seja, é quase impossível identificá-los apenas pela aparência."
1003702-6 = "Sendo assim, sem que saibamos, neste exato momento, espiões disfarçados de alunos da nossa escola podem estar tramando uma conspiração para derrubar a Academia Federal Red Winter!"
1003702-7 = "[s] \"Isso é grave.\""
1003702-8 = "Ah, é grave, sim."
1003702-9 = "Por isso, nós do Comitê de Segurança realizamos investigações minuciosas nos últimos dias. Graças a isso, conseguimos compilar uma lista de pessoas suspeitas de serem espiões."
1003702-10 = "Como resultado, a pessoa mais suspeita na Academia Federal Red Winter atualmente..."
1003702-11 = "É você, Sensei!"
1003702-12 = "[s] \"...Eu?\""
1003702-13 = "Sim, pense bem."
1003702-14 = "O Sensei pode transitar livremente entre várias academias e, além disso, goza de grande confiança da Presidente Cherino—"
1003702-15 = "Você consegue entrar facilmente até mesmo nas instalações importantes da Academia Federal Red Winter."
1003702-16 = "Se eu fosse uma figura importante de Trinity ou Gehenna, certamente daria ordens para subornar o Sensei e extrair informações confidenciais da Academia Federal Red Winter."
1003702-17 = "Sim, por isso o Sensei é o suspeito mais provável neste caso!"
1003702-18 = "[s] \"Mas eu não sou um espião...\""
1003702-19 = "Não adianta dizer isso! Todo espião diz a mesma coisa!"
1003702-20 = "Mas Sensei, eu não sou uma pessoa tão cruel assim. Vou lhe dar uma chance."
1003702-21 = "Se o Sensei realmente não é um espião, deve ser capaz de passar neste teste especial que preparei."
1003702-22 = "[s] \"Um teste?\""
1003702-23 = "Sim, um teste para verificar o quanto você conhece, entende e compartilha dos ideais e do senso comum da Academia Federal Red Winter."
1003702-24 = "Todas as perguntas são compostas por conteúdos que qualquer aluno da nossa escola saberia."
1003702-25 = "Se você passar brilhantemente neste teste, em nome da presidente do Comitê de Segurança, negarei formalmente a suspeita de espionagem contra você. Mas, se errar apenas uma pergunta..."
1003702-26 = "Você será enviado para a classe especial do antigo prédio escolar, esteja preparado!"
1003702-27 = "[s1] \"Entendi...\"\n[s2] \"Eu sou o Sensei, afinal de contas...\""
1003702-28 = "Não reclame! Vamos, comece!"
1003702-29 = "Não reclame! Vamos, comece!"
1003702-33 = "Primeira pergunta: qual animal simboliza a Academia Federal Red Winter?"
1003702-34 = "[s3] \"Urso.\"\n[s4] \"Dragão.\""
1003702-35 = "Correto!"
1003702-36 = "Fufu, essa foi fácil demais, como esperado."
1003702-37 = "Errado! O símbolo da Academia Federal Red Winter é o \"Urso\"! Basta olhar para o emblema da escola, não é!?"
1003702-38 = "Mas, um dragão... dragões são legais. Vou deixar passar desta vez por causa disso."
1003702-42 = "Seguindo para a segunda pergunta. Qual é a característica que representa a autoridade da Academia Federal Red Winter e que a própria presidente do conselho estudantil de Red Winter se orgulha?"
1003702-43 = "[s5] \"Bigode.\"\n[s6] \"Barba.\""
1003702-44 = "Correto! Pode-se dizer que a autoridade da Academia Federal Red Winter se manifesta naquele bigode."
1003702-45 = "Como esperado do Sensei. Você realmente conhece bem a nossa escola."
1003702-46 = "...Mas parei para pensar, será que \"bigode\" também inclui \"barba\"?"
1003702-47 = "Ah, isso é ambíguo! Vamos fingir que essa pergunta não existiu!"
1003702-51 = "Agora, a última pergunta. Diga em voz alta o nome da grande camarada que é secretária-geral da Academia Federal Red Winter, chefe do Departamento de Embelezamento Ambiental, representante do Departamento de Esportes e chefe do Departamento de Limpeza."
1003702-52 = "[s7] \"Presidente Cherino.\"\n[s8] \"Presidente Cherino.\"\n[s9] \"Presidente Cherino.\""
1003702-53 = "Correto! Magnífico!"
1003702-54 = "Correto! Magnífico!"
1003702-55 = "Correto! Magnífico!"
1003702-56 = "Entendo, então o Sensei não era um espião... Por pouco eu não expurguei por engano um camarada em quem a Presidente Cherino confia."
1003702-57 = "Bem, então vou procurar outros espiões..."
1003702-58 = "[s] \"Ei, Marina, que tal você tentar responder também?\""
1003702-59 = "...Hm? Você quer que eu responda às perguntas, Sensei?"
1003702-60 = "Se um espião pode se disfarçar de qualquer pessoa, então a possibilidade de eu ser uma espiã não pode ser descartada... é isso que você quer dizer?"
1003702-61 = "Hmm... é frustrante admitir, mas você tem um ponto. Distinguir entre um \"espião altamente treinado\" e um \"subordinado que ostenta lealdade\" é, de fato, difícil..."
1003702-62 = "Muito bem. Mas esteja preparado para o fato de que isso será uma tentativa inútil. Afinal, eu tenho conhecimento de absolutamente tudo o que acontece na Academia Federal de Red Winter!"
1003702-63 = "[s] \"Qual é a altura da Cherino?\""
1003702-64 = "Fufu, essa é uma pergunta fácil. 181 cm!"
1003702-65 = "Isso sempre é escrito em letras garrafais nos artigos de propaganda do \"Red Bear\". Eu me lembro disso perfeitamente!"
1003702-66 = "[s] \"Mas a Cherino não é mais baixa que você, Marina?\""
1003702-67 = "...Hmm?"
1003702-68 = "Minha altura é 166 cm, e é verdade que a Presidente geralmente tem uma linha de visão mais baixa que a minha. Mas a altura da Presidente é 181 cm... o que isso significa?"
1003702-69 = "Ugh, minha cabeça... i-isso deve ser algum tipo de mal-entendido! Próxima! Dê logo a próxima pergunta!"
1003702-70 = "[s] \"Qual é a idade da Cherino?\""
1003702-71 = "A Presidente está no terceiro ano, então... provavelmente 17 anos!"
1003702-75 = "...Está correto, não está? Ei, por que não está?"
1003702-76 = "Espere, por que você não responde logo! Por que está olhando para baixo! Será que eu estou errada!?"
1003702-77 = "[ns] \"Será que a Marina...\""
1003702-79 = "[ns] \"Não tem um conhecimento muito bom sobre a Academia Federal de Red Winter...?\""
1003702-80 = "I-isso é impossível...! Se é algo relacionado a Red Winter, eu deveria saber perfeitamente...!"
1003702-81 = "Eu, a Chefe do Comitê de Segurança, não conseguir passar no teste... n-não me diga que a espiã que se infiltrou na Academia Federal de Red Winter sou... eu!?"
1003702-82 = "O-o que eu faço, Sensei!? Pode ser que a espiã fosse eu o tempo todo!"
1003702-83 = "Nesse caso, a única solução é expurgar a mim mesma...!?"
1003702-85 = "(Depois disso, acalmei a Marina, que estava confusa, e a levei até a secretaria.)"
