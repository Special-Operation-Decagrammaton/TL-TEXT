[translation]
1600602-1 = "イズミと夏を楽しむ幾つかの方法"
1600602-2 = "（イズミから教えてもらって辿り着いた海の家は、すでにたくさんの人でごった返していた）"
1600602-4 = "あっ、先生～！"
1600602-6 = "もうっ、遅いよ！"
1600602-7 = "こうしてる間に、「噂の珍味」が食材切れとかで食べられなくなっちゃったらどうするの！？"
1600602-8 = "[s1] \"ご、ごめんイズミ……。\"\n[s2] \"それにしても、すごい人の数だね……。\""
1600602-9 = "ね！みんなやっぱり、賞品って聞いて集まってきたのかな！"
1600602-10 = "ね！みんなやっぱり、賞品って聞いて集まってきたのかな！"
1600602-11 = "あっ、ちなみにこれがお店のチラシ！"
1600602-13 = "[s] \"……「棒倒し」でゲーム対決？\""
1600602-14 = "そうそう！「山崩し」って呼んだりもするのかな？砂山に刺さった棒を倒さないように、順番に砂を取っていくあのゲーム！"
1600602-15 = "これで勝てたら、この海の家の名物「特製ロコモコ丼」とかをタダで食べられるんだって！"
1600602-16 = "一体どんな味なのかな～……じゅるり。"
1600602-17 = "[s] \"イズミ、よだれよだれ。\""
1600602-18 = "はっ！……ふふっ、すっごく楽しみにしてたんだー、ここのチャバ……いや、ロコモコ丼！"
1600602-21 = "[ns] \"……？\""
1600602-22 = "ゲーム、終了ーーーーっ！！！"
1600602-23 = "あ、ちょうどゲームが終わったみたい！"
1600602-25 = "勝者は……"
1600602-26 = "このお店の店主さんです！"
1600602-27 = "……ふっ。"
1600602-29 = "だからそんなに、一気に欲張らない方が良いって言ったじゃん！"
1600602-30 = "だ、だってさぁ……。"
1600602-32 = "ちなみにこちらの方、ただの店主ではありません……！"
1600602-33 = "「キヴォトス棒倒し選手権」において、15年連続で優勝しているという相当の実力者なんです！"
1600602-35 = "はぁ！？"
1600602-36 = "さあ、惜しくも負けてしまった方々には罰ゲームとして……！"
1600602-37 = "こちらの、ある意味有名な裏看板メニュー……"
1600602-38 = "チャバスコの辛さとココナッツの甘さの化学反応、ココナッツの実に入った「チャバスコジュース」を一気飲みしていただきます！"
1600602-39 = "くっ……ええいっ、やってやろうじゃんか！"
1600602-45 = "ぶふぉっ！？"
1600602-46 = "ゴバッ！？"
1600602-51 = "それが人生のスパイスの味……ってやつさ。お嬢ちゃんたちにはちょっと早かったかな。"
1600602-52 = "では次のチャレンジャーの方、どうぞ！"
1600602-55 = "あ、私たちの番だよ！行こう！"
1600602-56 = "[s3] \"ちょっと待って、これ負けたらさっきのやつ飲むの？\"\n[s4] \"罰ゲームなんて聞いてな――\""
1600602-57 = "大丈夫大丈夫っ！"
1600602-58 = "大丈夫大丈夫っ！"
1600602-60 = "ふむ……君たちが次の挑戦者か？"
1600602-61 = "うん、ロコモコ丼を食べに来たの！"
1600602-62 = "なるほど。これまでの戦いを見た上で、いきなり事実上の勝利宣言とは……。"
1600602-63 = "面白い！その挑戦、受けて立つ！"
1600602-64 = "それでは、競技……始めっ！"
1600602-65 = "では、私から……。"
1600602-67 = "［スーッ］"
1600602-68 = "初手から4分の1近くの砂を持っていきました、これは大胆！さすがチャンピオンです！"
1600602-69 = "これに対し、チャレンジャーたちはどう出るのか！"
1600602-70 = "頑張れー！"
1600602-71 = "さて、どう来る……？"
1600602-72 = "[s] \"じゃあ、えっと……。\""
1600602-74 = "……ふっ、ずいぶんと慎重じゃないか。"
1600602-75 = "そんな消極的な戦い方で、私に勝てるとでも？"
1600602-76 = "[s5] \"いや、ちょっと負けるのは嫌なので……。\"\n[s6] \"店主さん、ノリノリですね……。\""
1600602-77 = "じゃあ私の番だね！"
1600602-78 = "じゃあ私の番だね！"
1600602-79 = "さて、どうしよっかな～！"
1600602-80 = "うーん……？"
1600602-81 = "じゃあ、えっと……。"
1600602-82 = "さあ、チャレンジャーはどう動くのか！！"
1600602-83 = "一歩間違えれば、口の中がチャバスコで真っ赤になってしまいます！"
1600602-84 = "あの地獄のジュースを避けようと、大半のチャレンジャーは慎重に動きますが……！？"
1600602-85 = "ふふっ、どうせ大人しく……"
1600602-87 = "えいっ！"
1600602-88 = "おおっと！チャレンジャー、一気に攻めていきます！これは短期決戦か！？"
1600602-89 = "すごい、砂を半分近く一気に……！"
1600602-90 = "おい、もうあれ倒れるんじゃないか！？グラグラしてるぞ！？"
1600602-91 = "[s] \"ちょっ、イズミ！？\""
1600602-92 = "ううん、見て……！すごい、ギリギリだけど……"
1600602-93 = "まだ棒は立ってる……！"
1600602-95 = "な、なんだと……！？今の技、まさか……！"
1600602-96 = "10年前……私とチャンピオンの座を争った、通称「黄金のサソリ」……。"
1600602-97 = "あいつの必殺技……「十戒」だと！？な、なぜその技を……！？まさか、後継者はいないはず……！"
1600602-98 = "……？何それ？"
1600602-99 = "あれ？棒、まだ倒れてない？なんだ、ざんねーん。"
1600602-100 = "[s] \"……ちょっと待ってイズミ。\""
1600602-101 = "チャバスコジュースが……え？先生、何か言った？"
1600602-102 = "[s] \"もしかして、わざと負けようとしてない！？\""
1600602-104 = "やっ、えっと、手を抜いてたわけじゃなくて……！"
1600602-105 = "そうじゃなくて、その、私は本気で……。"
1600602-106 = "本気で、珍味を味わおうと……"
1600602-107 = "[s7] \"イズミが狙ってる「珍味」ってロコモコじゃなくて……。\"\n[s8] \"あの「チャバスコジュース」の方！？\""
1600602-108 = "えっと、えぇっと……！"
1600602-109 = "えっと、えぇっと……！"
1600602-110 = "……。"
1600602-111 = "し、仕方ないじゃん！普通に注文しても出てこなくて、このゲームで負けないと飲めないんだから！"
1600602-112 = "そ、それにゲームに参加するにはコンビが必要で、それで先生に……。"
1600602-113 = "[s] \"えぇ……？\""
1600602-114 = "ふふふ……この血が騒ぐ感覚、久しぶりだ。"
1600602-115 = "ふぇ？"
1600602-116 = "あいつもいないし、しばらく退屈してたんだ。この身体に滾る熱い衝動、懐かしいな……！"
1600602-117 = "良いだろう、私にもプライドがある……全力で行くとしよう！"
1600602-118 = "[s] \"本当にノリノリですね！？\""
1600602-120 = "さあ、行くぞ！"
1600602-122 = "ふえぇぇ！？よ、よく分からないけど私も負けな、いや、勝ち……？"
1600602-123 = "と、とりあえず頑張る！"
1600602-131 = "認めよう……私の、負けだ。"
1600602-135 = "なんとなんと……！"
1600602-136 = "チャレンジャーの勝利です！"
1600602-137 = "うおおおおおぉぉぉ！！！"
1600602-138 = "[s] \"か……勝った。\""
1600602-140 = "ふええぇぇぇん！？え、勝ったの！？なんで、どうして！？"
1600602-141 = "勝っちゃったらあの「チャバスコジュース」飲めないじゃーん！"
1600602-142 = "あれだけネットでみんな「口の感覚が消えた」「私の歯、まだある？」「途中から逆に味が無い」って言ってたから……"
1600602-143 = "すっごく楽しみにしてたのにいぃ！！！"
1600602-144 = "[s] \"何でそのコメントで飲もうと思ったの！？\""
1600602-145 = "……心配するな、チャレンジャー。君たちの情熱は確かに受け取った。"
1600602-146 = "そこのお嬢さんに敬意を表して、ロコモコ丼だけじゃなく……"
1600602-147 = "「チャバスコジュース」も、一緒に贈呈しよう！"
1600602-150 = "え、嘘！？やったああぁぁぁぁ！！本当に！？ありがとーー！！"
1600602-151 = "やった！やったよ先生！！"
1600602-152 = "[s] \"えっと、良かったね……。\""
1600602-158 = "ほら先生！一緒に食べよう！"
1600602-159 = "はい、ストロー！先に一口飲んで良いよ！"
1600602-160 = "（太陽に負けないほど輝いたイズミの笑顔を前にして、どうしても断ることができなかった）"
1600602-162 = "（トイレとの絆ランクが上がった）"
