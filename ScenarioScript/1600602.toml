[translation]
1600602-1 = "Algumas formas de aproveitar o verão com a Izumi"
1600602-2 = "（A casa de praia que chegamos após as indicações da Izumi já estava lotada de gente）"
1600602-4 = "Ah, Sensei!"
1600602-6 = "Poxa, você demorou!"
1600602-7 = "O que a gente vai fazer se a \"iguaria famosa\" acabar antes da gente chegar!?"
1600602-8 = "[s1] \"D-desculpe, Izumi...\"\n[s2] \"Mas, nossa, quanta gente...\""
1600602-9 = "Né! Será que todo mundo veio porque ouviu falar do prêmio?"
1600602-10 = "Né! Será que todo mundo veio porque ouviu falar do prêmio?"
1600602-11 = "Ah, aliás, aqui está o panfleto do lugar!"
1600602-13 = "[s] \"...Um desafio de jogo de 'derrubar o bastão'?\""
1600602-14 = "Isso mesmo! Acho que também chamam de \"desmoronamento da montanha\"? Aquele jogo onde você vai tirando a areia aos poucos sem deixar o bastão espetado na montanha de areia cair!"
1600602-15 = "Disseram que se a gente ganhar, podemos comer o famoso \"Loco Moco especial\" da casa de graça!"
1600602-16 = "Como será que é o gosto... babando."
1600602-17 = "[s] \"Izumi, você está babando.\""
1600602-18 = "Ah! ...Hehe, eu estava esperando muito por isso, o chaba... quer dizer, o Loco Moco!"
1600602-21 = "[ns] \"...?\""
1600602-22 = "Jogo, encerrado!!!"
1600602-23 = "Ah, parece que o jogo acabou bem agora!"
1600602-25 = "O vencedor é..."
1600602-26 = "O dono deste estabelecimento!"
1600602-27 = "...Hmph."
1600602-29 = "Eu não disse que não era bom ser ganancioso e tentar pegar tudo de uma vez?"
1600602-30 = "M-mas é que..."
1600602-32 = "Aliás, esta pessoa não é apenas um dono de restaurante...!"
1600602-33 = "Ele é um competidor de elite que venceu o \"Campeonato de Derrubar o Bastão de Kivotos\" por 15 anos consecutivos!"
1600602-35 = "O quê!?"
1600602-36 = "Agora, para aqueles que infelizmente perderam, como castigo...!"
1600602-37 = "Vocês terão que beber de uma vez o nosso famoso menu secreto..."
1600602-38 = "O \"Suco de Chabasco\", uma reação química entre a picância do chabasco e a doçura do coco, servido dentro do próprio coco!"
1600602-39 = "Droga... ah, quer saber, vamos nessa!"
1600602-45 = "Buf!?"
1600602-46 = "Goba!?"
1600602-51 = "Isso é o que chamam de tempero da vida... Talvez tenha sido cedo demais para vocês, garotas."
1600602-52 = "Próximo desafiante, por favor!"
1600602-55 = "Ah, é a nossa vez! Vamos!"
1600602-56 = "[s3] \"Espera um pouco, se a gente perder, vamos ter que beber aquilo?\"\n[s4] \"Ninguém me avisou sobre um castigo--\""
1600602-57 = "Tá tudo bem, tá tudo bem!"
1600602-58 = "Tá tudo bem, tá tudo bem!"
1600602-60 = "Hum... vocês são os próximos desafiantes?"
1600602-61 = "Sim, viemos comer o Loco Moco!"
1600602-62 = "Entendo. Depois de ver as batalhas anteriores, já declarando vitória de cara..."
1600602-63 = "Interessante! Aceito o desafio!"
1600602-64 = "Então, que comece a competição!"
1600602-65 = "Bem, começando por mim..."
1600602-67 = "［Suss］"
1600602-68 = "Ele tirou quase um quarto da areia logo no primeiro movimento, que audácia! Como esperado do campeão!"
1600602-69 = "Como os desafiantes vão reagir a isso!"
1600602-70 = "Boa sorte!"
1600602-71 = "E então, o que vai fazer...?"
1600602-72 = "[s] \"Bem, então...\""
1600602-74 = "……Hmph, você está sendo bem cauteloso, não é?"
1600602-75 = "Acha mesmo que pode me vencer com um estilo de jogo tão passivo?"
1600602-76 = "[s5] \"Não, é que eu não quero perder...\"\n[s6] \"O dono da loja está empolgado demais...\""
1600602-77 = "Então é a minha vez!"
1600602-78 = "Então é a minha vez!"
1600602-79 = "Bem, o que eu deveria fazer~!"
1600602-80 = "Hmm...?"
1600602-81 = "Então, bem..."
1600602-82 = "Vamos ver, como o desafiante vai agir!!"
1600602-83 = "Se der um passo em falso, sua boca ficará vermelha de tanto Chavasco!"
1600602-84 = "A maioria dos desafiantes joga com cautela para evitar aquele suco infernal, mas...!?"
1600602-85 = "Hehe, de qualquer forma, calmamente..."
1600602-87 = "Ei!"
1600602-88 = "Opa! O desafiante ataca de uma vez! Será uma batalha rápida!?"
1600602-89 = "Incrível, ele tirou quase metade da areia de uma vez...!"
1600602-90 = "Ei, aquilo não vai cair agora!? Está balançando!"
1600602-91 = "[s] \"Ei, Izumi!?\""
1600602-92 = "Não, olha...! Incrível, por um triz, mas..."
1600602-93 = "O bastão ainda está de pé...!"
1600602-95 = "O-o que foi isso...!? Essa técnica, não pode ser...!"
1600602-96 = "Há 10 anos... o homem que disputou o título de campeão comigo, conhecido como o \"Escorpião Dourado\"..."
1600602-97 = "A técnica secreta dele... o \"Dez Mandamentos\"!? Como ele conhece essa técnica...!? Não deveria haver nenhum sucessor...!"
1600602-98 = "...? O que é isso?"
1600602-99 = "Ué? O bastão ainda não caiu? Ah, que pena."
1600602-100 = "[s] \"...Espere um pouco, Izumi.\""
1600602-101 = "O suco de Chavasco... hein? Sensei, você disse algo?"
1600602-102 = "[s] \"Por acaso você não está tentando perder de propósito!?\""
1600602-104 = "Ah, bem, não é que eu estivesse pegando leve...!"
1600602-105 = "Não é isso, é que, eu estava falando sério..."
1600602-106 = "Sério, sobre saborear a iguaria..."
1600602-107 = "[s7] \"A 'iguaria' que a Izumi está querendo não é o locomoco...\"\n[s8] \"É aquele 'suco de Chavasco'!?\""
1600602-108 = "Bem, bem..."
1600602-109 = "Bem, bem..."
1600602-110 = "..."
1600602-111 = "N-não tem como evitar! Se eu pedir normalmente, eles não servem, e só consigo beber se eu perder nesse jogo!"
1600602-112 = "A-além disso, precisa de uma dupla para participar do jogo, e por isso eu chamei o Sensei..."
1600602-113 = "[s] \"Sério...?\""
1600602-114 = "Fufufu... essa sensação do sangue fervendo, faz tempo que não sinto isso."
1600602-115 = "Hã?"
1600602-116 = "Aquele cara não está aqui, e eu estava entediado há algum tempo. Esse impulso ardente que corre pelo meu corpo, que nostálgico...!"
1600602-117 = "Muito bem, eu também tenho meu orgulho... vou dar tudo de mim!"
1600602-118 = "[s] \"Você está realmente empolgado, não é!?\""
1600602-120 = "Vamos lá!"
1600602-122 = "Hããã!? E-eu não entendi muito bem, mas eu também não posso perder, não, quer dizer, ganhar...?"
1600602-123 = "D-de qualquer forma, vou dar o meu melhor!"
1600602-131 = "Eu admito... a minha derrota."
1600602-135 = "Inacreditável...!"
1600602-136 = "Vitória do desafiante!"
1600602-137 = "Uooooooo!!!"
1600602-138 = "[s] \"E-eu ganhei.\""
1600602-140 = "Waaaaaahhh!? Espera, a gente ganhou!? Por quê, como assim!?"
1600602-141 = "Se a gente ganhou, eu não vou poder tomar aquele \"Suco de Chavasco\"!"
1600602-142 = "Todo mundo na internet dizia que \"perderam a sensibilidade da boca\", \"será que meus dentes ainda estão aqui?\" e \"depois de um tempo, o gosto simplesmente some\", então..."
1600602-143 = "Eu estava super ansiosa para experimentar!!!"
1600602-144 = "[s] \"Por que você decidiu tomar isso depois de ler esses comentários!?\""
1600602-145 = "......Não se preocupe, desafiante. Recebi a paixão de vocês em alto e bom som."
1600602-146 = "Em homenagem a essa jovem dama, não vou dar apenas o Loco Moco..."
1600602-147 = "Vou presentear vocês com o \"Suco de Chavasco\" também!"
1600602-150 = "Sério, mentira!? Ebaaaaaa!! É verdade!? Obrigadaaaa!!"
1600602-151 = "Conseguimos! Conseguimos, Sensei!!"
1600602-152 = "[s] \"Bem, fico feliz por você...\""
1600602-158 = "Olha só, Sensei! Vamos comer juntos!"
1600602-159 = "Aqui, o canudo! Pode dar o primeiro gole!"
1600602-160 = "(Diante do sorriso da Izumi, que brilhava tanto quanto o sol, não consegui recusar de jeito nenhum)"
1600602-162 = "(O nível de vínculo com o banheiro aumentou)"
