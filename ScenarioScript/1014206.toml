[translation]
1014206-1 = "二人だけのサイン"
1014206-2 = "（そしてビーチを訪れると……）\r\n"
1014206-7 = "ナイススパイク～！\r\n"
1014206-8 = "や、やられたああぁ……！\r\n"
1014206-9 = "この声は……？"
1014206-10 = "先生。あっちに行ってみよう。"
1014206-16 = "[ns] \"ビーチバレーをしているの？\""
1014206-17 = "あ！ナグサさん！先生！\r\n"
1014206-18 = "お二人も、一緒にビーチバレーをしませんか？"
1014206-23 = "私はいいけど、先生は？"
1014206-24 = "[s1] \"私は見ているよ。\"\r\n[s2] \"ナグサのお荷物になっちゃうから。\""
1014206-27 = "一緒にやるから楽しいのに。"
1014206-28 = "あ……。"
1014206-29 = "もしかして……やるより見るほうが好きなタイプ？"
1014206-33 = "やっぱり先生は……。"
1014206-34 = "[s] \"何を考えてるか知らないけど、違うよ！\""
1014206-36 = "（結局みんなでビーチバレーをすることになった……）\r\n"
1014206-38 = "じゃあ、先生とナグサさんがチームですよ！"
1014206-39 = "そのほうがバランスが良さそうなので！"
1014206-40 = "[s] \"お荷物にならないよう、頑張るね。\""
1014206-44 = "私はお荷物だなんて思わないよ。\r\n"
1014206-45 = "右腕も今、絶好調だし。"
1014206-46 = "大丈夫。今の私は……無敵だから。"
1014206-47 = "[s3] \"で、でも任せっきりにはできないよ。\"\r\n[s4] \"私が役に立てそうな作戦ってある？\""
1014206-54 = "作戦……。"
1014206-55 = "それなら簡単なサインを使うのはどうかな。"
1014206-56 = "試合中に相手にバレないようやり取りできる……。"
1014206-57 = "二人だけの秘密のサイン。"
1014206-59 = "（しばらくして訪れた対決の時間……）\r\n"
1014206-61 = "[fffbab]御[-]"
1014206-62 = "[fffbab]稜[-]"
1014206-63 = "[fffbab]ナ[-]"
1014206-64 = "[fffbab]グ[-]"
1014206-65 = "[fffbab]サ[-]"
1014206-68 = "[ffaecd]百[-]"
1014206-69 = "[ffaecd]鬼[-]"
1014206-70 = "[ffaecd]夜[-]"
1014206-71 = "[ffaecd]行[-]"
1014206-72 = "[ffaecd]の[-]"
1014206-73 = "[ffaecd]生[-]"
1014206-74 = "[ffaecd]徒[-]"
1014206-75 = "[ffaecd]た[-]"
1014206-76 = "[ffaecd]ち[-]"
1014206-81 = "[fffbab]VS[-]"
1014206-85 = "先攻は相手チーム。"
1014206-86 = "流れを有利にするには、最初のレシーブが大事だね。"
1014206-90 = "[wa:1451]― [log=나구사 수영복]最初はこの作戦でいこう。[/log]"
1014206-92 = "― [log=나구사 수영복]向こうは序盤から[wa:1690]全力で来るだろうから。[/log]"
1014206-95 = "[wa:3201]― [log=나구사 수영복]……[wa:1520]先生？[/log]"
1014206-97 = "― [log=나구사 수영복]私のサイン、[wa:1880]ちゃんと見てる？[/log]"
1014206-100 = "― [log=나구사 수영복]最初からよそ見をするなんて、[wa:2450]らしくないね。[/log]"
1014206-102 = "― [log=나구사 수영복]一体何を見て……。[/log]"
1014206-105 = "[wa:4161]― [log=나구사 수영복]あ……[wa:1800]そっか。[/log]"
1014206-107 = "― [log=나구사 수영복]ごめんなさい。[/log]"
1014206-110 = "― [log=나구사 수영복]逆に集中できないよね。[/log]"
1014206-112 = "― [log=나구사 수영복]私が……[wa:1740]ミステリアスな[wa:1240]美少女だから。[/log]"
1014206-115 = "[wa:2081]― [log=나구사 수영복]ビーチバレーはこうやってサインを出すんだけど……。[/log]"
1014206-117 = "― [log=나구사 수영복]今からでも、[wa:1590]やり方を変えたほうがいいかな？[/log]"
1014206-120 = "[wa:2321]― [log=나구사 수영복]……ダメか、[wa:1970]流石に遅いよね。[/log]"
1014206-123 = "[wa:691]― [log=나구사 수영복]このままいこう、[wa:1202]先生。[/log]"
1014206-125 = "― [log=나구사 수영복]私たちなら……[wa:2490]大丈夫。[/log]"
1014206-128 = "（そして試合が始まった）\r\n"
1014206-129 = "（勝敗に関係なく、非常に楽しい時間だった）\r\n"
1014206-138 = "（こうして試合が終わり……）"
1014206-140 = "あはははっ！本当に楽しかったです！\r\n"
1014206-141 = "それでは！お二人とも引き続き楽しいお時間を～！\r\n"
1014206-146 = "た、楽しいお時間をって……どういう意味なのかな？\r\n"
1014206-147 = "[s5] \"言葉どおりじゃない？\"\r\n[s6] \"楽しい時間を続けてって意味だよ。\""
1014206-150 = "……。"
1014206-151 = "……うん。そうだね。"
1014206-152 = "これまで、本当にいろんなことがあった。"
1014206-153 = "先生がいなければ、私の腕は今も、暗く不吉な黄昏に吞まれたままだったと思うの。"
1014206-154 = "先生のおかげで……。"
1014206-155 = "どう手を差し伸べたらいいのか分かった。"
1014206-156 = "どう前に進めばいいのか……分かった。"
1014206-157 = "まだ全てが元通りになったわけじゃないけど……。"
1014206-158 = "先生がずっとそばにいてくれたら、心配ないと思う。"
1014206-159 = "……あ。"
1014206-160 = "しゃべり過ぎたかな。"
1014206-165 = "[ns] \"な、ナグサ……？\""
1014206-166 = "ここまで話しちゃったから、もうはっきり言うね。\r\n"
1014206-167 = "まだまだ未熟だし……。"
1014206-168 = "美人なこと以外、特に取り柄がないけど……。"
1014206-169 = "これからもずっとよろしくね、先生。\r\n"
1014206-171 = "（その後、遅くまでナグサとビーチで楽しんだ）"
