1014206-81 = "[fffbab]VS[-]"
1014206-85 = "The opposing team serves first."
1014206-86 = "To turn the tide in our favor, the first receive is important."
1014206-90 = "[wa:1400]― [log=나구사 수영복] We'll go with this strategy first.[/log]"
1014206-92 = "― [log=나구사 수영복] They'll likely come at us with full force from the beginning [wa:1690][/log]"
1014206-95 = "[wa:3201]― [log=나구사 수영복]……[wa:1520] ...Sensei.[/log]"
1014206-97 = "― [log=나구사 수영복] Are you watching my sign properly?[wa:1900][/log]"
1014206-100 = "― [log=나구사 수영복] Looking away right from the start, that's not like you.[wa:2600][/log]"
1014206-102 = "― [log=나구사 수영복] What are you looking at...[/log]"
1014206-105 = "[wa:4161]― [log=나구사 수영복]Ah...[wa:1800] I see.[/log]"
1014206-107 = "― [log=나구사 수영복] I'm sorry.[/log]"
1014206-110 = "― [log=나구사 수영복] It actually makes it harder to concentrate, doesn't it?[/log]"
1014206-112 = "― [log=나구사 수영복] Because I'm...[wa:1200] a mysterious,[wa:1100] beautiful girl.[/log]"
1014206-115 = "[wa:2081]― [log=나구사 수영복] In beach volleyball, this is how you give sign, but...[/log]"
1014206-117 = "― [log=나구사 수영복] I wonder if I should change how I do things, even now.[wa:1590][/log]"
1014206-120 = "[wa:2321]― [log=나구사 수영복]…… ...No good? Yeah, it's a bit too late for that.[wa:1970][/log]"
1014206-123 = "[wa:691]― [log=나구사 수영복] Let's just go with this,[wa:1202] Sensei.[/log]"
1014206-125 = "― [log=나구사 수영복] If it's us...[wa:2490] we'll be fine.[/log]"
1014206-128 = "（And so the match began.）\r\n"
1014206-129 = "（Regardless of the outcome, it was an incredibly fun time.）\r\n"
1014206-138 = "（And like that, the match ended...）"
1014206-140 = "Ahahaha! That was really fun!\r\n"
1014206-141 = "Well then! You two enjoy the rest of your time together~!\r\n"
1014206-146 = "E-enjoy the rest of your time together... What could she mean by that?\r\n"
1014206-147 = "[s5] \"Isn't it exactly what it sounds like?\"\r\n[s6] \"It means to keep having a fun time.\""
1014206-150 = "..."
1014206-151 = "...Yeah. You're right."
1014206-152 = "So many things have happened up until now."
1014206-153 = "If you hadn't been there, Sensei, I think my arm would still be swallowed by that#ndark, ominous twilight."
1014206-154 = "Thanks to you, Sensei..."
1014206-155 = "I learned how to reach out my hand."
1014206-156 = "I learned... how to move forward."
1014206-157 = "Not everything is completely back to normal yet, but..."
1014206-158 = "If you stay by my side, Sensei, I don't think I have anything to worry about."
1014206-159 = "...Ah."
1014206-160 = "I think I talked too much."
1014206-165 = "[ns] \"N-Nagusa...?\""
1014206-166 = "Since I've said this much, I'll just be blunt.\r\n"
1014206-167 = "I'm still inexperienced…"
1014206-168 = "And other than being a beauty, I don't really have any redeeming qualities, but..."
1014206-169 = "Please continue to look after me from now on, Sensei.\r\n"
1014206-171 = "（After that, I enjoyed the beach with Nagusa until late.）"