[translation]
1014206-1 = "A Sign for Just the Two of Us"
1014206-2 = "(And when we visited the beach...)\r\n"
1014206-7 = "Nice spike!\r\n"
1014206-8 = "O-oh, I got hit...!\r\n"
1014206-9 = "Whose voice is that...?"
1014206-10 = "Sensei. Let's go over there."
1014206-16 = "[ns] \"Are they playing beach volleyball?\""
1014206-17 = "Ah! Nagusa-san! Sensei!\r\n"
1014206-18 = "Would you two like to join us for some beach volleyball?"
1014206-23 = "I don't mind, but what about you, Sensei?"
1014206-24 = "[s1] \"I'll just watch.\"\r\n[s2] \"I don't want to be a burden to Nagusa.\""
1014206-27 = "But it's more fun if we do it together."
1014206-28 = "Oh..."
1014206-29 = "Could it be... are you the type who prefers watching over playing?"
1014206-33 = "I knew it, Sensei is..."
1014206-34 = "[s] \"I don't know what you're thinking, but that's not it!\""
1014206-36 = "(In the end, we all ended up playing beach volleyball...)\r\n"
1014206-38 = "Then, Sensei and Nagusa-san will be a team!"
1014206-39 = "That seems like it would be more balanced!"
1014206-40 = "[s] \"I'll do my best not to be a burden.\""
1014206-44 = "I don't think you're a burden at all.\r\n"
1014206-45 = "My right arm is in top shape right now, too."
1014206-46 = "It's fine. Right now... I'm invincible."
1014206-47 = "[s3] \"B-but I can't just leave it all to you.\"\r\n[s4] \"Is there any strategy I could help with?\""
1014206-54 = "A strategy..."
1014206-55 = "In that case, how about we use some simple signs?"
1014206-56 = "We can communicate during the match without the opponents noticing..."
1014206-57 = "A secret sign for just the two of us."
1014206-59 = "(A while later, the time for our match arrived...)\r\n"
1014206-61 = "[fffbab]Goryo[-]"
1014206-62 = "[fffbab]Nagusa[-]"
1014206-63 = "[fffbab]Na[-]"
1014206-64 = "[fffbab]gu[-]"
1014206-65 = "[fffbab]sa[-]"
1014206-68 = "[ffaecd]Hyakkiyako[-]"
1014206-69 = "[ffaecd]Academy[-]"
1014206-70 = "[ffaecd]stu[-]"
1014206-71 = "[ffaecd]dents[-]"
1014206-72 = "[ffaecd]are[-]"
1014206-73 = "[ffaecd]the[-]"
1014206-74 = "[ffaecd]op[-]"
1014206-75 = "[ffaecd]po[-]"
1014206-76 = "[ffaecd]nents[-]"
1014206-81 = "[fffbab]VS[-]"
1014206-85 = "The opposing team serves first."
1014206-86 = "To gain the advantage, the first receive is crucial."
1014206-90 = "[wa:1451]― [log=Nagusa Swimsuit]Let's go with this strategy first.[/log]"
1014206-92 = "― [log=Nagusa Swimsuit]They'll likely come at us with full force from the start, after all.[/log]"
1014206-95 = "[wa:3201]― [log=Nagusa Swimsuit]...[wa:1520]Sensei?[/log]"
1014206-97 = "― [log=Nagusa Swimsuit]Are you [wa:1880]properly watching my signs?[/log]"
1014206-100 = "― [log=Nagusa Swimsuit]It's [wa:2450]not like you to look away from the start.[/log]"
1014206-102 = "― [log=Nagusa Swimsuit]What on earth are you looking at...?[/log]"
1014206-105 = "[wa:4161]― [log=Nagusa Swimsuit]Ah...[wa:1800]I see.[/log]"
1014206-107 = "― [log=Nagusa Swimsuit]I'm sorry.[/log]"
1014206-110 = "― [log=Nagusa Swimsuit]It makes it hard to focus, doesn't it?[/log]"
1014206-112 = "― [log=Nagusa Swimsuit]Since I'm... [wa:1740]a mysterious [wa:1240]beautiful girl.[/log]"
1014206-115 = "[wa:2081]― [log=Nagusa Swimsuit]This is how you give signs in beach volleyball...[/log]"
1014206-117 = "― [log=Nagusa Swimsuit]Should we [wa:1590]change how we do this, even now?[/log]"
1014206-120 = "[wa:2321]― [log=Nagusa Swimsuit]...No, [wa:1970]it's too late for that, isn't it?[/log]"
1014206-123 = "[wa:691]― [log=Nagusa Swimsuit]Let's go with this, [wa:1202]Sensei.[/log]"
1014206-125 = "― [log=Nagusa Swimsuit]If it's us... [wa:2490]we'll be fine.[/log]"
1014206-128 = "(And so, the match began)\r\n"
1014206-129 = "(Regardless of the outcome, it was a very fun time)\r\n"
1014206-138 = "(And with that, the match ended...)"
1014206-140 = "Ahahaha! That was truly fun!\r\n"
1014206-141 = "Well then! Have a wonderful time, both of you!\r\n"
1014206-146 = "H-have a wonderful time, you say... what could that mean?\r\n"
1014206-147 = "[s5] \"Doesn't it mean exactly what she said?\"\r\n[s6] \"It means to keep having a good time.\""
1014206-150 = "..."
1014206-151 = "...Yeah. I suppose so."
1014206-152 = "So many things have happened until now."
1014206-153 = "If it weren't for you, Sensei, I think my arm would still be swallowed by that dark, ominous twilight."
1014206-154 = "Thanks to you, Sensei..."
1014206-155 = "I learned how to reach out."
1014206-156 = "I learned... how to move forward."
1014206-157 = "Not everything is back to normal yet, but..."
1014206-158 = "As long as you stay by my side, Sensei, I don't think I have anything to worry about."
1014206-159 = "...Ah."
1014206-160 = "Did I talk too much?"
1014206-165 = "[ns] \"N-Nagusa...?\""
1014206-166 = "Since I've already said this much, I'll just be blunt.\r\n"
1014206-167 = "I'm still inexperienced...\r\n"
1014206-168 = "And other than being beautiful, I don't really have any redeeming qualities, but...\r\n"
1014206-169 = "I'm counting on you from here on out, Sensei.\r\n"
1014206-171 = "(After that, we enjoyed ourselves on the beach with Nagusa until late)"