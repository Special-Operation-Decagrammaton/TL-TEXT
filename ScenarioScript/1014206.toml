1014206-1 = "Um Sinal Só Nosso" 
1014206-2 = "（E quando fomos à praia...）\n" 
1014206-7 = "Belo corte~!\n" 
1014206-8 = "M-Me pegou...!\n" 
1014206-9 = "Essa voz é...?" 
1014206-10 = "Sensei. Vamos lá dar uma olhada." 
1014206-16 = "[ns] \"Vocês estão jogando vôlei de praia?\"" 
1014206-17 = "Ah! Nagusa-san! Sensei!\n" 
1014206-18 = "Vocês dois não querem jogar\nvôlei de praia com a gente?" 
1014206-23 = "Por mim tudo bem, e você, Sensei?" 
1014206-24 = "[s1] \"Eu vou só assistir.\"\n[s2] \"Acabaria sendo um peso morto para a Nagusa.\"" 
1014206-27 = "Mas é mais divertido jogarmos juntos." 
1014206-28 = "Ah..." 
1014206-29 = "Por acaso... você é do tipo que prefere\nolhar em vez de participar?" 
1014206-33 = "Como eu imaginava, o Sensei é..." 
1014206-34 = "[s] \"Não sei o que você tá pensando,\nmas tá errado!\"" 
1014206-36 = "（No fim das contas, acabamos todos\njogando vôlei de praia juntos...）\n" 
1014206-38 = "Certo, então o Sensei e a Nagusa-san\nvão ser um time!" 
1014206-39 = "Acho que assim as equipes\nficam mais equilibradas!" 
1014206-40 = "[s] \"Vou dar o meu melhor\npara não ser um peso morto.\"" 
1014206-44 = "Eu não te acho um peso morto.\n" 
1014206-45 = "Meu braço direito está em\nótima forma hoje, aliás." 
1014206-46 = "Fique tranquilo. A eu de hoje...\né invencível." 
1014206-47 = "[s3] \"M-Mas eu não posso deixar\ntudo nas suas costas.\"\n[s4] \"Tem alguma estratégia onde eu possa ser útil?\"" 
1014206-54 = "Estratégia..." 
1014206-55 = "Que tal usarmos sinais simples?" 
1014206-56 = "Assim podemos nos comunicar durante a partida\nsem que o oponente perceba..." 
1014206-57 = "Sinais secretos que só nós dois entendemos." 
1014206-59 = "（Um tempo depois, a hora do confronto chegou...）\n" 
