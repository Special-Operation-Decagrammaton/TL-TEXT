[translation]
1014206-1 = "A Sign Just for the Two of Us"
1014206-2 = "（Upon visiting the beach……）\r\n"
1014206-7 = "Nice spike~!\r\n"
1014206-8 = "Y-you got meee...!\r\n"
1014206-9 = "This voice is...?"
1014206-10 = "Sensei. Let's go check over there."
1014206-16 = "[ns] \"Are you playing beach volleyball?\""
1014206-17 = "Ah! Nagusa-san! Sensei!\r\n"
1014206-18 = "Would you two like to play beach volleyball with us?"
1014206-23 = "I don't mind, but what about you, Sensei?"
1014206-24 = "[s1] \"I'll just watch.\"\r\n[s2] \"I'd only be a burden to you, Nagusa.\""
1014206-27 = "But it's more fun if we play together."
1014206-28 = "Ah..."
1014206-29 = "Could it be... you're the type who prefers watching over playing?"
1014206-33 = "Sensei, you really are..."
1014206-34 = "[s] \"I don't know what you're thinking, but you're wrong!\""
1014206-36 = "（In the end, we all decided to play beach volleyball……）\r\n"
1014206-38 = "Then, Sensei and Nagusa-san will be a team!"
1014206-39 = "That seems like it would be more balanced!"
1014206-40 = "[s] \"I'll do my best not to be a burden.\""
1014206-44 = "I don't think you're a burden at all.\r\n"
1014206-45 = "My right arm is in top form right now, too."
1014206-46 = "It's okay. Right now... I'm invincible."
1014206-47 = "[s3] \"B-But I can't just leave everything to you.\"\r\n[s4] \"Is there a strategy where I could be useful?\""
1014206-54 = "A strategy..."
1014206-55 = "In that case, how about using a simple hand sign?"
1014206-56 = "So we can communicate during the match without the opponents finding out..."
1014206-57 = "A secret sign just for the two of us."
1014206-59 = "（After a little while, the time for the showdown arrived……）\r\n"
1014206-61 = "[fffbab]  [-] "
