[translation]
1001905-1 = "計画"
1001905-2 = "時間ピッタリ、待ってたよ先生。"
1001905-3 = "今日の訓練では、全面的に先生の指揮に従うことにする。"
1001905-4 = "さあ、何から始めればいい？ここでの生活に慣れるために、私に必要なことを言ってほしい。"
1001905-5 = "[s1] \"えっと……ごめん、実はあんまり考えてなくて……。\"\n[s2] \"こういうのはその時の気分で決めるのが一番だと思うよ。\""
1001905-6 = "……なに？"
1001905-7 = "……なに？"
1001905-8 = "つまり無計画？それはどういう……？"
1001905-9 = "準備も無しに、"
1001905-10 = "訓練を全うできるとでも？"
1001905-11 = "え、逆に計画を立てすぎるのは良くない？"
1001905-12 = "先生、世の中の全てのことには計画が必要だ。作戦でも任務でも、それは同じ。"
1001905-13 = "日常生活においても、無計画に生きてたら何一つ叶えられ――"
1001905-14 = "[s3] \"アズサはもう十分計画的で、真面目だから。\"\n[s4] \"時には非効率な考えが、素敵な巡り合わせを導くかもよ。\""
1001905-15 = "……。"
1001905-16 = "……。"
1001905-17 = "……もしかして誤魔化そうとしてる？それとも、何か深遠な考えが……。"
1001905-18 = "……いや、今日は全面的に先生の指揮に従うと決めた。それは覆さない。"
1001905-19 = "じゃあ、その非効率な無計画に準じて、私は何をすればいい？"
1001905-20 = "……私が、選ぶ？"
1001905-21 = "え、だって今日は先生が指揮を……どうして私が？"
1001905-22 = "よ、よく分からない、うーん……。"
1001905-23 = "そんなに真剣に悩む必要は無い……？"
1001905-24 = "でも、選択である以上は常に最善の答えを……"
1001905-25 = "……最善ではない選択をする練習？"
1001905-26 = "だ、ダメ、もう何も分からない……。"
1001905-27 = "……。"
1001905-28 = "……スイーツ。"
1001905-29 = "スイーツのお店とか……行ってみたい、かも……？"
1001905-30 = "[s5] スイーツのお店に向かう。\n[s6] お店の方に向かってゆっくりアズサの背中を押す。"
1001905-35 = "ま、待って！先生！あくまで「かも」であって、まだそうと決めたわけじゃ……！"
1001905-40 = "ま、待って！先生！あくまで「かも」であって、まだそうと決めたわけじゃ……！"
1001905-42 = "（お店に入ると、店員さんたちが笑顔で迎えてくれた）"
1001905-43 = "（アズサはもじもじした状態ですぐには選べなさそうだったので、美味しそうなものを適当に全部頼んでみた）"
1001905-47 = "……！？"
1001905-48 = "お、おいしい……！甘い……！！"
1001905-49 = "この材料、どんな調理方法で……！流通性も保存性も弱そうだけど、この味は……！！"
1001905-50 = "……すっごくおいしい！"
1001905-51 = "（最初はためらいつつも、一口ずつ食べるにつれてアズサの目が輝き始めた）"
1001905-54 = "（しばらくした後、ゲームセンターにて）"
1001905-55 = "な、なんで……！信じられない！今ので負け！？"
1001905-56 = "理不尽！そもそも、これは何を楽しむものなんだ！？"
1001905-57 = "よく考えてみると、わざわざ自分から負けに行く理由は無い。これをやって、私に何か得があるわけでもない。"
1001905-58 = "どう考えても無駄！！こんなの認めない……！"
1001905-59 = "……え？"
1001905-60 = "もう一度……？このまま引き下がれるのって……？"
1001905-61 = "……っ。"
1001905-62 = "か、貸して！もう戦術なら練り直してある！"
1001905-63 = "これで最後、絶対にやっつけてやる！"
1001905-65 = "（その後、アズサは16回もリトライしてから、ようやくクリアすることができた）"
1001905-66 = "（本人は認めなかったけれど、クリアした瞬間の表情は、喜びでこれ以上ないくらいに輝いた笑顔だった）"
1001905-67 = "（その後もフードコート、カラオケ、映画館など、ショッピングモール内の様々な施設を回った）"
1001905-68 = "（新しいものを見て、アズサは最初こそ否定しつつもすぐに夢中になる、という流れを繰り返した）"
1001905-70 = "だいぶ色々と回った気がする……。"
1001905-71 = "次はどうしよう……？"
1001905-72 = "結構ほとんどのところは回ったような……"
1001905-73 = "……なに？今度はあそこに？"
1001905-74 = "先生が行きたいなら……うん。"
1001905-75 = "[s] アズサと、そのお店に入る。"
1001905-81 = "……！"
1001905-82 = "こっ、これは……！！"
1001905-83 = "[s] \"モモフレンズのぬいぐるみショップだよ。\""
1001905-84 = "こ、こんな……！こんなお店が……！？"
1001905-85 = "だ、ダメ！これは良くない！こんなところにいたら、だ、堕落して……！"
1001905-86 = "な、なに？フレンズ体験ゾーン……？え、あそこの中に……？"
1001905-87 = "で、でも、私は、その……！"
1001905-89 = "わ、私は……！！"
1001905-94 = "― 可愛いのは何も悪くないけど！"
1001905-96 = "― 可愛いぬいぐるみがいっぱいなのは[wa:1500]良いけど！！"
1001905-99 = "― ……何だか[wa:1500]恥ずかしい。"
1001905-102 = "[wa:1000]― 絶対にからかってるでしょ、[wa:1000]先生。"
1001905-104 = "― ……ま、[wa:700]まあ別に、[wa:1800]心底嫌ってわけじゃないけど……."
1001905-107 = "― ううっ、[wa:1500]可愛い……！"
1001905-109 = "[wa:100]― この子、[wa:1300]ずっと会いたかった……！"
1001905-112 = "[wa:500]― えへっ、[wa:1500]えへへ……[wa:1000]えへへ……"
1001905-115 = "― っ……"
1001905-117 = "― ……そのっ、[wa:1500]いや[wa:1500]何でもない……。"
1001905-120 = "― （これ以上、）"
1001905-122 = "― （距離を縮めるわけにはいかないのに……）"
1001905-125 = "― でも、[wa:1250]先生がどうしてこんな可愛い場所を……？"
1001905-127 = "― ……先生も好き？[wa:1300]本当に？"
1001905-130 = "― 子ども扱いして、[wa:2200]合わせたりしてない？"
1001905-132 = "― ……まあ、[wa:1000]別にどっちでも良いけど。"
1001905-136 = "……。"
1001905-141 = "もしかして、実は最初から全部仕込んでた？最初から全部計画してた？"
1001905-142 = "違う？本当に偶然？"
1001905-143 = "ただ可愛いからって思って？"
1001905-144 = "たまたま？"
1001905-145 = "……計画通りじゃなかったからこそ？"
1001905-146 = "計画通りにだけ過ごすと、こういう偶然の出会いを逃しちゃうかも？"
1001905-147 = "……確かに、それはそうかもしれない。"
1001905-148 = "……こういうことも、あるんだ。"
1001905-149 = "充実した訓練だった。今日教わったことは肝に銘じる。"
