[translation]
1001905-1 = "Plano"
1001905-2 = "Pontual, eu estava te esperando, Sensei."
1001905-3 = "No treinamento de hoje, seguirei totalmente as suas ordens, Sensei."
1001905-4 = "Bem, por onde devemos começar? Diga-me o que preciso fazer para me acostumar com a vida aqui."
1001905-5 = "[s1] \"Bem... desculpe, na verdade eu não pensei muito sobre isso...\"\n[s2] \"Acho que o melhor é decidir essas coisas conforme o humor do momento.\""
1001905-6 = "……O quê?"
1001905-7 = "……O quê?"
1001905-8 = "Quer dizer, sem planejamento? O que isso significa...?"
1001905-9 = "Sem nenhuma preparação,"
1001905-10 = "você acha mesmo que podemos completar o treinamento?"
1001905-11 = "Ah, por outro lado, planejar demais não é bom?"
1001905-12 = "Sensei, tudo neste mundo precisa de um plano. Seja em uma operação ou em uma missão, é a mesma coisa."
1001905-13 = "Até na vida cotidiana, se você viver sem um plano, não conseguirá realizar nada—"
1001905-14 = "[s3] \"Azusa, você já é planejada e séria o suficiente.\"\n[s4] \"Às vezes, um pensamento ineficiente pode levar a encontros maravilhosos.\""
1001905-15 = "……."
1001905-16 = "……."
1001905-17 = "……Será que você está tentando me enrolar? Ou será que existe algum pensamento profundo por trás disso...?"
1001905-18 = "……Não, eu decidi que hoje seguiria totalmente as ordens do Sensei. Não vou voltar atrás."
1001905-19 = "Então, seguindo esse seu planejamento ineficiente, o que eu devo fazer?"
1001905-20 = "……Eu que escolho?"
1001905-21 = "Ah, mas hoje o Sensei é quem está no comando... por que eu?"
1001905-22 = "Eu, eu não sei, hum..."
1001905-23 = "Não precisa se preocupar tanto assim...?"
1001905-24 = "Mas, sendo uma escolha, sempre busco a melhor resposta..."
1001905-25 = "……Praticar fazer uma escolha que não seja a melhor?"
1001905-26 = "N-não, eu não sei mais de nada..."
1001905-27 = "……."
1001905-28 = "……Doces."
1001905-29 = "Uma loja de doces... talvez eu queira ir lá...?"
1001905-30 = "[s5] Ir em direção à loja de doces.\n[s6] Empurrar gentilmente as costas da Azusa em direção à loja."
1001905-35 = "E-espere! Sensei! Foi só um \"talvez\", eu ainda não decidi que vamos mesmo...!"
1001905-40 = "E-espere! Sensei! Foi só um \"talvez\", eu ainda não decidi que vamos mesmo...!"
1001905-42 = "(Ao entrar na loja, os funcionários nos receberam com sorrisos)"
1001905-43 = "(Como Azusa parecia hesitante e incapaz de escolher, pedi um pouco de tudo que parecia gostoso)"
1001905-47 = "……!?"
1001905-48 = "É, é delicioso...! Tão doce...!!"
1001905-49 = "Esses ingredientes, que método de preparo será que...! A durabilidade e o armazenamento parecem frágeis, mas esse sabor...!!"
1001905-50 = "……É incrivelmente gostoso!"
1001905-51 = "(Embora estivesse hesitante no início, os olhos de Azusa começaram a brilhar a cada mordida)"
1001905-54 = "(Algum tempo depois, em um fliperama)"
1001905-55 = "P-por que...! Não acredito! Perdi com isso!?"
1001905-56 = "Que absurdo! Afinal, qual é a graça disso aqui!?"
1001905-57 = "Pensando bem, não há motivo para eu mesma querer perder. Fazer isso não me traz benefício nenhum."
1001905-58 = "Não importa como eu pense, é um desperdício!! Não aceito isso...!"
1001905-59 = "……Ah?"
1001905-60 = "Mais uma vez...? É possível desistir assim...?"
1001905-61 = "……Ah."
1001905-62 = "M-me empresta! Eu já reformulei a tática!"
1001905-63 = "Esta é a última, eu vou acabar com isso agora!"
1001905-65 = "(Depois disso, Azusa tentou mais 16 vezes até finalmente conseguir vencer)"
1001905-66 = "(Ela não admitiu, mas no momento em que completou, sua expressão era de um sorriso radiante, transbordando uma alegria sem igual.)"
1001905-67 = "(Depois disso, passamos pela praça de alimentação, karaokê, cinema e várias outras instalações dentro do shopping.)"
1001905-68 = "(O padrão se repetia: Azusa via algo novo, negava inicialmente, mas logo ficava fascinada.)"
1001905-70 = "Sinto que já rodamos por bastante coisa..."
1001905-71 = "O que faremos agora...?"
1001905-72 = "Acho que já passamos por quase todos os lugares..."
1001905-73 = "...O quê? Vamos ali agora?"
1001905-74 = "Se o Sensei quer ir... então, tudo bem."
1001905-75 = "[s] Entro na loja com Azusa."
1001905-81 = "...!"
1001905-82 = "I-Isso é...!!"
1001905-83 = "[s] \"É uma loja de pelúcias dos Momo Friends.\""
1001905-84 = "I-Isso...! Uma loja como esta...!?"
1001905-85 = "N-Não, isso não é bom! Se eu ficar em um lugar assim, eu vou... eu vou me corromper...!"
1001905-86 = "O-O quê? Zona de experiência dos amigos...? Espera, ali dentro...?"
1001905-87 = "M-Mas, eu, tipo...!"
1001905-89 = "E-Eu...!!"
1001905-94 = "― Não tem nada de errado em ser fofo, mas!"
1001905-96 = "― É [wa:1500] bom que tenha muitas pelúcias fofas, mas!!"
1001905-99 = "― ...É meio [wa:1500] vergonhoso."
1001905-102 = "[wa:1000]― Você está definitivamente me provocando, [wa:1000] Sensei."
1001905-104 = "― ...B-bem, [wa:700] não é como se eu [wa:1800] odiasse de verdade, mas..."
1001905-107 = "― Ugh, [wa:1500] que fofo...!"
1001905-109 = "[wa:100]― Eu queria [wa:1300] conhecer esse aqui há muito tempo...!"
1001905-112 = "[wa:500]― Ehe, [wa:1500] ehehe... [wa:1000] ehehe..."
1001905-115 = "― Ah..."
1001905-117 = "― ...Digo, [wa:1500] não, [wa:1500] não é nada..."
1001905-120 = "― (Eu não deveria,)"
1001905-122 = "― (deixar nossa distância diminuir ainda mais...)"
1001905-125 = "― Mas, [wa:1250] por que o Sensei trouxe a gente para um lugar tão fofo...?"
1001905-127 = "― ...Você também gosta, Sensei? [wa:1300] Sério?"
1001905-130 = "― Você não está só me tratando como criança [wa:2200] e fingindo que gosta, está?"
1001905-132 = "― ...Bem, [wa:1000] tanto faz, na verdade."
1001905-136 = "..."
1001905-141 = "Será que você planejou tudo desde o começo? Tinha tudo esquematizado?"
1001905-142 = "Não? Foi realmente por acaso?"
1001905-143 = "Só porque achou que era fofo?"
1001905-144 = "Por acaso?"
1001905-145 = "...Justamente por não ter sido planejado?"
1001905-146 = "Se a gente só seguir o plano, talvez acabe perdendo encontros casuais como este?"
1001905-147 = "...É, talvez você tenha razão."
1001905-148 = "...Coisas assim também acontecem, né."
1001905-149 = "Foi um treinamento muito proveitoso. Vou guardar o que aprendi hoje no coração."
