[translation]
83306105600-6 = "はい、これで合ってる？"
83306105600-7 = "これで間違いないわ！ありがとう！"
83306105600-8 = "良かったですね、ジュンコさん。"
83306105600-9 = "ヒナさん、こうして手伝ってくださってありがとうございます。"
83306105600-10 = "ふふっ……助けてもらうだなんて、とても新鮮ですわ。"
83306105600-12 = "……たしかに新鮮ね。"
83306105600-13 = "なるほど、これが私たちの友情……"
83306105600-14 = "それよりお腹空いた！食券も見つかったんだし早く食べに行こ～！"
83306105600-19 = "あっ！待って！"
