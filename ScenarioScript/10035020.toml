[translation]
10035020-1 = "第2話;ウォータースライダー、案内します！"
10035020-2 = "本日はご足労いただきありがとうございます！#n私は、「エーギル」の代表を務めております。"
10035020-3 = "まさかヴァルキューレの方々にご支援いただけるとは……。"
10035020-4 = "本当に助かります！ありがとうございます。"
10035020-5 = "はい！市民の安全を守るのが、私たち生活安全局の責務ですから！"
10035020-6 = "どこであってもやることは変わりません。#nお任せください！"
10035020-7 = "はははっ！なんと心強い！"
10035020-8 = "オープン初日、張り切って行きましょう！"
10035020-9 = "それでは、配置を決めさせていただきますね。"
10035020-10 = "ラクなところにしてほしいな～"
10035020-11 = "ヘルプに来て下さった方々には、比較的負担の少ない場所にする予定です。"
10035020-12 = "うむ……ここが良いでしょう。"
10035020-14 = "当施設が誇るウォータースライダー、「アクアボブスレー」です！"
10035020-17 = "わぁっ！"
10035020-18 = "お、思った以上に高いですね……！"
10035020-19 = "あそこから滑り下りるのだと思うと……！"
10035020-20 = "ま、大丈夫じゃない？"
10035020-21 = "滑るのはお客さんだし、私たちは誘導係～"
10035020-22 = "そ、そうでしたね。"
10035020-23 = "す、すこし気持ちが楽になりました！"
10035020-24 = "（階段で下りるほうが地獄だと思うけど……言わないでおこっと）"
10035020-25 = "まあ、とにかく。やることは単純だね。"
10035020-26 = "ここにお客さんを誘導してボタンを押すだけ。"
10035020-27 = "単純作業で楽だし簡単！"
10035020-28 = "どう？局長もこれなら文句ないんじゃない？"
10035020-33 = "もとより内容に文句などない。与えられた任務をこなすまでだ。"
10035020-34 = "だが、より負担の少ない業務ではありそうだな。"
10035020-35 = "よし、対応しよう。"
10035020-36 = "局長！マニュアルはこちらにありますので！"
10035020-37 = "ここに載っていない対応については、いつでも本官にお聞きくださいね！"
10035020-38 = "市民への応対は慣れていますから。#nきっとお力になれると思います！"
10035020-39 = "……そうだな、感謝する。"
10035020-40 = "[s1] \"みんな、頑張ってね！\"\n[s2] \"応援してるよ！カンナ！\""
10035020-42 = "先生……ありがとうございます。"
10035020-43 = "お客様がいらっしゃいました！#n皆さま、どうぞこちらにお並びください！"
10035020-47 = "う、うわぁ……高い……！"
10035020-48 = "ほ、ほんとに大丈夫かな……。"
10035020-49 = "大丈夫です！どうか緊張なさらずに！安全にご利用いただくために、#nまずは身長を確認させていただきます！"
10035020-50 = "こちらの台の上に立っていただけますか？"
10035020-55 = "オッケー、身長制限は問題なし～。"
10035020-56 = "じゃあ、スライダーの内側に立ってね。"
10035020-57 = "うぅ、緊張するぅ……！"
10035020-58 = "3つ数えたらボタンを押しますので！#n水流に乗って滑走をお楽しみください！"
10035020-59 = "いち、に、さん！"
10035020-63 = "うわああああぁぁぁぁぁ！"
10035020-65 = "[ns] \"う、うわぁ……。\""
10035020-66 = "思ったよりスピードが速いね。"
10035020-67 = "どうー？先生も乗ってみたい？"
10035020-68 = "[s3] \"え、遠慮しておこうかな。\"\n[s4] \"み、見るだけにするね。\""
10035020-71 = "だよね、私もこれは流石に……"
10035020-72 = "なんでこんなのに乗るんだろうね。"
10035020-73 = "こういうのが好きなのかな……？"
10035020-74 = "フブキ、次のお客様がいらっしゃいますよ！"
10035020-75 = "おっけ～"
10035020-79 = "……。"
10035020-80 = "頭部の保護がばっちりですね！"
10035020-81 = "[ns5] \"あれ？あの子は……。\"\n[ns6] \"どこかで見たような……？\""
10035020-85 = "はい、身長も問題ありません！3つ数えたら押しますね！"
10035020-86 = "いち、に！"
10035020-90 = "2で押すなあぁぁぁぁぁ！"
10035020-92 = "[ns] （やっぱり……）"
10035020-93 = "はっ！つい手が滑ってしまいました！"
10035020-94 = "気をつけてよね、怪我人が出ちゃうかも。"
10035020-95 = "局長、キリノと交代してくれる？"
10035020-96 = "問題ない。"
10035020-97 = "キリノ、交代しよう。"
10035020-98 = "はい……。"
10035020-103 = "ふぅ、やっとか。"
10035020-104 = "すごい並んでたからなあ。"
10035020-106 = "静粛に！"
10035020-107 = "隊列を崩すな！"
10035020-108 = "お前を連行……いや、搭乗前に保安検査をさせてもらう。"
10035020-110 = "ほ、保安検査？"
10035020-111 = "それより、あんた！なんだ。その口調は！"
10035020-112 = "拒否権はない。"
10035020-113 = "「背筋を正せっ」！"
10035020-114 = "は、はぁ！？"
10035020-119 = "搭乗不可だ。"
10035020-120 = "仕方ない。階段で退場するように。"
10035020-121 = "な、なんだと？ここまできて乗れないっていうのか？"
10035020-122 = "一時間も並んだんだぞ！？"
10035020-126 = "マニュアルによると――"
10035020-127 = "「アクアボブスレー」には、安全規定が厳格に定められており――#n事故防止のために、身長制限が存在している。"
10035020-128 = "こっちはお客様なんだぞ！？"
10035020-129 = "おい！責任者を呼べっ！"
10035020-130 = "お客様！ここで暴れてはいけません！危険です！"
10035020-131 = "お、落ち着いてください！"
10035020-132 = "ちょっ！危ないってば！"
10035020-133 = "暴れたら、落ちるかもしれないよ！"
10035020-134 = "だから、乗せてくれたらそれで――"
10035020-140 = "痛たたたっ！な、なにするんだ！？"
10035020-141 = "大人しくしろ。"
10035020-142 = "せ、制圧した……。"
10035020-143 = "お前には黙秘権があり、弁護士の立会いを求める権利がある。"
10035020-145 = "きょ、局長！お客様を犯罪者みたいに扱っちゃダメですよ！"
10035020-148 = "法とは、市民の安全を守るために存在する。"
10035020-149 = "そして、ウォーターパークの安全規定は利用客を守るためにある。"
10035020-150 = "つまり、このパーク内の「法」そのものだ。"
10035020-151 = "ライフセーバーとして、法を破る者を制圧するのは当然のこと……。"
10035020-152 = "な、なんだ。あの人！"
10035020-153 = "身長制限に引っかかったら、ああなるのか！？"
10035020-154 = "抗議しただけなのに……押さえつけるのはやりすぎだろ！"
10035020-158 = "何故だ……？"
10035020-159 = "これは一体……どういうことだ？"
10035020-160 = "局長！はやくお客様を解放してください！"
10035020-164 = "う、うぅっ！"
10035020-165 = "く、首が絞まるかと思った！"
10035020-166 = "ライフセーバーが客に暴力を振るうなんて！#nクレームを入れてやるっ！"
10035020-170 = "何か間違えたのか……？"
10035020-171 = "あの、局長？大丈夫ですか？"
10035020-172 = "うーん。市民対応の業務って、公安局のやり方とは違うっていうか……。"
10035020-173 = "周りの目も気にしないといけなくて、面倒なんだよね～"
10035020-174 = "まぁ、さっきのはちょっとやりすぎかな。"
10035020-175 = "そう、なのか……。"
10035020-176 = "すまない……。"
10035020-185 = "ちょっとちょっと！何をやってるんですか！"
10035020-186 = "お客様を押さえつけるなんて！"
10035020-187 = "でもさぁ、さっきの人は安全規定を無視して駄々をこねてたし……。"
10035020-188 = "だからといって、お客様に危害を加えていい理由にはなりません！"
10035020-189 = "生活安全局は市民対応に慣れていると安心していたのに……。#nどういうことですか、これは！"
10035020-190 = "も、申し訳ありません！"
10035020-191 = "すまない……いや、申し訳ありません。"
10035020-192 = "もう、結構です！"
10035020-193 = "今回は、起きてしまったことですし……。"
10035020-194 = "配置を変更しますから、次はどうか気を付けてください。"
10035020-196 = "ここから移動になるってこと？"
10035020-197 = "どちらに……でしょう？"
10035020-199 = "屋内の子供用プールです！"
