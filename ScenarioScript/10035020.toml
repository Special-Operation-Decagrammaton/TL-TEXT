[translation]
10035020-1 = "Episódio 2; Toboágua, vou guiá-los!"
10035020-2 = "Muito obrigado por virem hoje!#nEu sou a representante da \"Aegir\"."
10035020-3 = "Eu não esperava que o pessoal da Valkyrie viesse nos apoiar..."
10035020-4 = "Isso realmente ajuda muito! Obrigado."
10035020-5 = "Sim! Proteger a segurança dos cidadãos é o dever do nosso Departamento de Segurança Pública!"
10035020-6 = "Não importa onde estejamos, nosso trabalho não muda.#nPode deixar conosco!"
10035020-7 = "Hahaha! Que tranquilizador!"
10035020-8 = "Vamos dar o nosso melhor no dia da inauguração!"
10035020-9 = "Bem, então, vou definir as posições."
10035020-10 = "Eu queria um lugar tranquilo~"
10035020-11 = "Planejo colocar aqueles que vieram nos ajudar em locais com carga de trabalho relativamente menor."
10035020-12 = "Hum... este lugar será bom."
10035020-14 = "Este é o \"Aqua Bobsleigh\", o toboágua que é o orgulho de nossas instalações!"
10035020-17 = "Uau!"
10035020-18 = "É, é mais alto do que eu pensava...!"
10035020-19 = "Só de pensar em deslizar lá de cima...!"
10035020-20 = "Bem, não tem problema, né?"
10035020-21 = "Quem vai deslizar são os clientes, nós somos apenas os guias~"
10035020-22 = "Ah, é verdade."
10035020-23 = "Isso, isso me deixou um pouco mais aliviada!"
10035020-24 = "(Acho que descer pelas escadas seria um inferno... melhor não dizer isso em voz alta)"
10035020-25 = "Bem, de qualquer forma. O que temos que fazer é simples."
10035020-26 = "Só guiar os clientes até aqui e apertar o botão."
10035020-27 = "É um trabalho simples, fácil e tranquilo!"
10035020-28 = "E aí? A Chefe não tem do que reclamar com isso, né?"
10035020-33 = "Eu não tinha reclamações sobre o conteúdo desde o início. É apenas cumprir a missão que me foi dada."
10035020-34 = "Mas parece ser uma tarefa com menos carga de trabalho, de fato."
10035020-35 = "Certo, vamos lidar com isso."
10035020-36 = "Chefe! O manual está aqui!"
10035020-37 = "Para qualquer situação que não esteja listada aqui, por favor, pergunte a mim a qualquer momento!"
10035020-38 = "Estou acostumada a lidar com os cidadãos.#nTenho certeza de que poderei ajudar!"
10035020-39 = "...Entendido, agradeço."
10035020-40 = "[s1] \"Pessoal, boa sorte!\"\n[s2] \"Estou torcendo por vocês! Kanna!\""
10035020-42 = "Sensei... obrigado."
10035020-43 = "Os clientes chegaram!#nPor favor, todos, formem uma fila aqui!"
10035020-47 = "N-nossa... que alto...!"
10035020-48 = "S-será que é seguro mesmo..."
10035020-49 = "Está tudo bem! Por favor, não fique nervosa! Para garantir um uso seguro,#nprimeiro vamos verificar sua altura!"
10035020-50 = "Poderia ficar em cima desta plataforma, por favor?"
10035020-55 = "Ok, sem problemas com a restrição de altura~"
10035020-56 = "Então, fique dentro do toboágua."
10035020-57 = "Ai, que nervoso...!"
10035020-58 = "Vou apertar o botão quando contar até três!#nPor favor, aproveite o deslizamento na correnteza!"
10035020-59 = "Um, dois, três!"
10035020-63 = "Aaaaaaaaahhhhh!"
10035020-65 = "[ns] \"N-nossa...\""
10035020-66 = "A velocidade é maior do que eu pensava."
10035020-67 = "E aí? Sensei, quer tentar também?"
10035020-68 = "[s3] \"Ah, acho que vou recusar.\"\n[s4] \"V-vou apenas observar.\""
10035020-71 = "Pois é, eu também, honestamente..."
10035020-72 = "Por que será que as pessoas gostam de andar nisso?"
10035020-73 = "Será que elas realmente gostam desse tipo de coisa...?"
10035020-74 = "Fubuki, o próximo cliente chegou!"
10035020-75 = "Ok~"
10035020-79 = "……."
10035020-80 = "A proteção da cabeça está perfeita!"
10035020-81 = "[ns5] \"Ué? Aquela ali é...\"\n[ns6] \"Já a vi em algum lugar...?\""
10035020-85 = "Certo, a altura também está dentro do limite! Vou apertar quando contar até três!"
10035020-86 = "Um, dois!"
10035020-90 = "Você apertou no dois, aaaaaah!"
10035020-92 = "[ns] (Eu sabia...)"
10035020-93 = "Ah! Minha mão escorregou sem querer!"
10035020-94 = "Tome cuidado, alguém pode acabar se machucando."
10035020-95 = "Chefe, pode trocar de lugar com a Kirino?"
10035020-96 = "Sem problemas."
10035020-97 = "Kirino, vamos trocar."
10035020-98 = "Sim..."
10035020-103 = "Ufa, finalmente."
10035020-104 = "A fila estava enorme."
10035020-106 = "Silêncio!"
10035020-107 = "Não quebrem a fila!"
10035020-108 = "Vou te levar... digo, farei uma inspeção de segurança antes do embarque."
10035020-110 = "I-inspeção de segurança?"
10035020-111 = "E outra, você! O que é isso? Que tom de voz é esse!"
10035020-112 = "Você não tem direito de recusa."
10035020-113 = "\"Endireite a postura!\""
10035020-114 = "O-o quê!?"
10035020-119 = "Embarque negado."
10035020-120 = "Não tem jeito. Por favor, retire-se pelas escadas."
10035020-121 = "O-o que você disse? Cheguei até aqui e não posso subir?"
10035020-122 = "Eu fiquei uma hora na fila, sabia!?"
10035020-126 = "De acordo com o manual—"
10035020-127 = "O \"Aqua Bobsleigh\" possui normas de segurança rigorosas—#nExiste um limite de altura para evitar acidentes."
10035020-128 = "Eu sou um cliente, sabia!?"
10035020-129 = "Ei! Chame o responsável!"
10035020-130 = "Senhor! Não pode fazer bagunça aqui! É perigoso!"
10035020-131 = "P-por favor, acalme-se!"
10035020-132 = "Ei! Isso é perigoso!"
10035020-133 = "Se você ficar se debatendo, pode acabar caindo!"
10035020-134 = "Por isso mesmo, se vocês me deixarem subir, eu..."
10035020-140 = "Ai, ai, ai! O-o que você está fazendo!?"
10035020-141 = "Fique quieto."
10035020-142 = "E-ele neutralizou o suspeito..."
10035020-143 = "Você tem o direito de permanecer em silêncio e o direito de solicitar a presença de um advogado."
10035020-145 = "Ch-chefe! Você não pode tratar os clientes como se fossem criminosos!"
10035020-148 = "A lei existe para proteger a segurança dos cidadãos."
10035020-149 = "E as normas de segurança do parque aquático existem para proteger os visitantes."
10035020-150 = "Ou seja, elas são a própria \"lei\" dentro deste parque."
10035020-151 = "Como salva-vidas, é natural que eu neutralize quem quebra a lei..."
10035020-152 = "Q-quem é aquele cara!"
10035020-153 = "Então é isso que acontece quando se é barrado pelo limite de altura!?"
10035020-154 = "Eu só estava protestando... imobilizar alguém é exagero, não acha?!"
10035020-158 = "Por que...?"
10035020-159 = "O que exatamente... está acontecendo aqui?"
10035020-160 = "Chefe! Solte o cliente agora mesmo!"
10035020-164 = "U-ugh!"
10035020-165 = "A-achei que ia ser estrangulado!"
10035020-166 = "Um salva-vidas usando violência contra um cliente!#nVou registrar uma reclamação formal!"
10035020-170 = "Será que fiz algo errado...?"
10035020-171 = "Ei, Chefe? Você está bem?"
10035020-172 = "Hmm. O atendimento ao público é bem diferente dos métodos do Departamento de Segurança Pública..."
10035020-173 = "Temos que nos preocupar com o que os outros pensam, é um saco~"
10035020-174 = "Bem, acho que aquilo foi um pouco exagerado."
10035020-175 = "É... mesmo...?"
10035020-176 = "Sinto muito..."
10035020-185 = "Ei, ei! O que vocês estão fazendo?!"
10035020-186 = "Imobilizar um cliente desse jeito!"
10035020-187 = "Mas, sabe, aquela pessoa estava ignorando as normas de segurança e fazendo birra..."
10035020-188 = "Isso não é motivo para ferir um cliente!"
10035020-189 = "Eu achei que o Departamento de Segurança Pública estava acostumado a lidar com civis...#nO que significa isso?!"
10035020-190 = "M-mil perdões!"
10035020-191 = "Sinto muito... não, peço perdão."
10035020-192 = "Já chega, está bem!"
10035020-193 = "Já que isso aconteceu, não há muito o que fazer..."
10035020-194 = "Vou mudar a sua escala, então, por favor, tome cuidado da próxima vez."
10035020-196 = "Isso significa que vou ser transferido daqui?"
10035020-197 = "Para onde... exatamente?"
10035020-199 = "Para a piscina infantil coberta!"
