[translation]
10053050-1 = "Episódio 5; Uma sombra se aproximando da cabana na montanha"

10053050-6 = "Estou em casa……. \r\n"

10053050-11 = "Eu não posso... não consigo mais me mover..."

10053050-12 = "Eu também..."

10053050-13 = "[ns1] \"Todo mundo deve estar cansado, então descanse um pouco.\"\r\n[ns2] \"Vou jantar... hein?\""

10053050-18 = "[ns3] \"Ou meu corpo não consegue se mover...?\"\r\n[ns4] \"De jeito nenhum, estou amarrado...!?\""

10053050-24 = "É só dor muscular, só isso. \r\n"

10053050-25 = "Todo mundo parece cansado, então serei eu quem preparará o jantar."

10053050-26 = "Ah, obrigado... \r\n\r\n\r\n"

10053050-27 = "Em vez disso, não importa o que aconteça, não reclame, ok? \r\n"

10053050-28 = "Você pode cozinhar, certo? \r\n\r\n\r\n\r\n"

10053050-29 = "A maioria das coisas fica deliciosa se você assá-las, fervê-las e fervê-las. Vitória fácil, vitória fácil~\r\n\r\n"

10053050-33 = "Não me sinto nada seguro! ? Estou ouvindo! ? \r\n"

10053050-34 = "Talvez eu devesse ir atrás dela agora... estou muito preocupado... \r\n"

10053050-35 = "Ei, Tsubasa?"

10053050-40 = "……. \r\n"

10053050-44 = "...Estou dormindo."

10053050-45 = "Eu estava em constante movimento hoje..."

10053050-46 = "Isso me dá sono... Nossa... \r\n"

10053050-47 = "Eu também estava começando a sentir sono..."

10053050-48 = "……."

10053050-53 = "(baque)"

10053050-57 = "Fiquei surpreso.... \r\n"

10053050-58 = "Antes que eu percebesse, eu tinha adormecido..."

10053050-59 = "……. \r\n"

10053050-60 = "Conoka...? É Konoka, certo?"

10053050-61 = "……. \r\n"

10053050-63 = "[ns5] \"Konoka?\"\r\n[ns6] \"Posso te ajudar em algo?\""

10053050-66 = "Ei, espere! É Konoka? \r\n\r\n"

10053050-67 = "……."

10053050-68 = "Porque eu já sei! #nMeus idosos não estariam pregando peças infantis como essa! \r\n"

10053050-70 = "……."

10053050-71 = "S-Sensei...? \r\n"

10053050-72 = "[s7] \"Deixe isso comigo.\"\r\n[s8] \"Vou dar uma olhada.\""

10053050-75 = "Não, não... eu também vou."

10053050-76 = "Sinto que não gosto... A professora está atrás de mim. \r\n"

10053050-80 = "Há alguém atrás desta porta..."

10053050-86 = "…………. \r\n"

10053050-92 = "Espere! ! ! ! \r\n\r\n\r\n"

10053050-93 = "! ? ! ? \r\n"

10053050-102 = "o que! ? Por que você foi atingido? ? \r\n\r\n\r\n"

10053050-103 = "enganar! ! Por que aparece de forma tão confusa? ! Achei que meu coração ia parar!"

10053050-104 = "先生、レナは何を怒ってるんすか？ \r\n"

10053050-105 = "[s9] \"コノカじゃなかったの……？\"\r\n[s10] \"さっきまでドアの前にいたよね……？\""

10053050-108 = "não? Acabei de chegar ――\r\n\r\n"

10053050-109 = "Ah, então... acho que não me enganei, afinal. \r\n"

10053050-110 = "Huh! ? O que isso significa! ? \r\n\r\n\r\n\r\n"

10053050-111 = "Bem, quando eu estava indo trazer a sopa de missô com amêijoas, senti como se alguém tivesse saído da cabana na montanha. \r\n"

10053050-112 = "Mas como todos estavam lá dentro, pensei que fosse um erro. \r\n"

10053050-113 = "Então... há realmente alguém lá fora? ? Além de nós! ? \r\n\r\n\r\n\r\n\r\n"

10053050-114 = "Se não fui o único que sentiu isso, então deve ser real, certo? \r\n"

10053050-115 = "Em vez disso, vamos comer alguma coisa logo! Acorde o diretor também. \r\n\r\n"

10053050-116 = "Há coisas mais importantes para fazer agora! ? \r\n\r\n\r\n"

10053050-117 = "Não, não há nada mais importante neste mundo do que a comida. A comida é a base da vida. #nDiretor~Acorde~\r\n\r\n"

10053050-119 = "(O jantar começou, deixando uma atmosfera estranha.)"

10053050-120 = "(A comida de Konoka era deliciosa. No entanto, havia muitos pratos oleosos e com sabores fortes.)"

10053050-123 = "Entendo... isso aconteceu enquanto eu estava dormindo. \r\n\r\n"

10053050-124 = "Gostaria de te perguntar uma coisa... \r\n"

10053050-125 = "Existe alguém que está ofendendo alguém? \r\n"

10053050-126 = "Não tem como ele estar aí! ! \r\n\r\n\r\n"

10053050-128 = "São muitos momentos memoráveis. \r\n"

10053050-130 = "Huh! ? \r\n\r\n\r\n"

10053050-132 = "Bom, a última pessoa que veio se vingar foi há duas semanas... \r\n\r\n"

10053050-133 = "Acho que já é hora de eu voltar ~\r\n"

10053050-134 = "Você está brincando? \r\n"

10053050-135 = "Sem chance. \r\n"

10053050-136 = "Não estou apenas comendo comida de graça no Departamento de Segurança Pública.\r\n"

10053050-137 = "...Ah, mas desta vez é diferente. Só minha irmã sabe onde estou. \r\n"

10053050-138 = "...Não, esse não é necessariamente o caso. \r\n"

10053050-139 = "Sim? \r\n\r\n\r\n\r\n"

10053050-140 = "Se alguém tivesse um forte rancor contra Konoka-kun e o estivesse seguindo secretamente...#nNa verdade, agora que ele está nas profundezas das montanhas assim deveria ser o momento perfeito para atacá-lo. \r\n"

10053050-141 = "É claro que para que essa hipótese seja verdadeira, você precisará de muita paciência, tenacidade...#n e, acima de tudo, senso de vingança. \r\n\r\n"

10053050-142 = "Como esperado, eu seria muito odiado ――\r\n\r\n\r\n"

10053050-146 = "...Só um pouquinho?"

10053050-147 = "Há! ? \r\n\r\n\r\n"

10053050-148 = "Se você trabalhar assim, uma ou duas pessoas ficarão feridas ――\r\n\r\n\r\n\r\n"

10053050-149 = "Não, não, não! Valquíria tem permissão para fazer isso! ?"

10053050-150 = "É defesa legítima, portanto é defesa legítima. \r\n\r\n\r\n\r\n"

10053050-155 = "────Sete prisioneiros."

10053050-162 = "Eu ouvi os rumores. #n Sete criminosos violentos que desistiram da reabilitação em sua alma mater e foram presos pelas forças especiais do Conselho Estudantil da Federação. Ele foi enviado para o Departamento de Correções, mas depois escapou. \r\n"

10053050-163 = "E se o alvo deles não fosse Konoka-kun pessoalmente... mas o Departamento de Segurança Pública, em outras palavras, a Academia de Polícia Valquíria como um todo? \r\n"

10053050-164 = "Podemos estar agora enfrentando uma crise sem precedentes...!"

10053050-169 = "Isso não é... um salto longe demais?"

10053050-174 = "Hum, mas talvez não."

10053050-175 = "Há! ? ! ?"

10053050-176 = "Um fugitivo da prisão bem preparado e tenaz que odeia Valquíria."

10053050-177 = "Eu consigo me lembrar disso corretamente."

10053050-178 = "…………."

10053050-179 = "…………."

10053050-181 = "Ah, isso é bom."

10053050-182 = "Huh?"

10053050-183 = "Não, eu realmente pensei que um fantasma tivesse aparecido."

10053050-184 = "Se você for um prisioneiro fugitivo, você falará rapidamente, certo? #nVou te pegar mais uma vez e te jogar na bunda."

10053050-185 = "...Ah, cancelei do jeito que falei. Para o Departamento de Correções."

10053050-186 = "Não é muito leve...?"

10053050-187 = "Até eu ouvi falar dos Sete Prisioneiros. \r\n"

10053050-188 = "Espere, você sabe sobre os Sete Prisioneiros, mas não sabia que eu era do Departamento de Segurança Pública? \r\n\r\n\r\n\r\n"

10053050-189 = "Ah, não, desculpe. Nesse sentido ――\r\n\r\n"

10053050-190 = "Brincadeirinha, você não precisa se desculpar! Ahaha! \r\n\r\n\r\n"

10053050-194 = "De qualquer forma, protegerei você, não importa quem vier. \r\n"

10053050-195 = "Isso resolve o assunto! Ah~ eu estava com medo e perdido~\r\n"

10053050-196 = "……. \r\n"

10053050-200 = "……. \r\n\r\n\r\n"

