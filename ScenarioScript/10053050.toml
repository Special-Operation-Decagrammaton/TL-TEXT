[translation]
10053050-1 = "第5話;山小屋に近づく影"
10053050-6 = "ただいま……。\r\n"
10053050-11 = "もう……無理……動けない……。"
10053050-12 = "吾輩もだ……。"
10053050-13 = "[ns1] \"みんな疲れただろうし、少し休んでて。\"\r\n[ns2] \"晩ご飯は私が……あれ？\""
10053050-18 = "[ns3] \"か、身体が動かない……？\"\r\n[ns4] \"まさか、金縛り……！？\""
10053050-24 = "ただの筋肉痛っすよ、それ。\r\n"
10053050-25 = "みんな疲れてそうだし、晩ご飯はあたしがちゃっちゃと用意するっすね。"
10053050-26 = "あ、ありがとう……。\r\n\r\n\r\n"
10053050-27 = "その代わり、何が出てきても文句は言いっこなしですよ？\r\n"
10053050-28 = "料理、できるんだよね……？\r\n\r\n\r\n\r\n"
10053050-29 = "焼いて、煮て、ぶっ込めば大体は美味くなるんだから。楽勝楽勝～\r\n\r\n"
10053050-33 = "全然安心できないんだけど！？聞いてる！？\r\n"
10053050-34 = "今からでも追いかけたほうがいいかな……本当に不安なんだけど……。\r\n"
10053050-35 = "ねぇ、ツバサ？"
10053050-40 = "……。\r\n"
10053050-44 = "……寝てる。"
10053050-45 = "今日はずっと動きっぱなしだったし……。"
10053050-46 = "眠くもなる……ふわぁ……。\r\n"
10053050-47 = "私も……眠くなってき……た……。"
10053050-48 = "……。"
10053050-53 = "（ゴトッ）"
10053050-57 = "ビックリした……。\r\n"
10053050-58 = "いつの間にか寝落ちしてたのね……。"
10053050-59 = "……。\r\n"
10053050-60 = "コノカ……？コノカだよね？"
10053050-61 = "……。\r\n"
10053050-63 = "[ns5] \"コノカ？\"\r\n[ns6] \"何か手伝おうか？\""
10053050-66 = "ちょ、ちょっと！コノカなんでしょ？\r\n\r\n"
10053050-67 = "……。"
10053050-68 = "もう分かってるんだから！#nこんな子どもみたいな悪ふざけ、うちの先輩たちじゃあるまいし――！\r\n"
10053050-70 = "……。"
10053050-71 = "せ、先生……？\r\n"
10053050-72 = "[s7] \"ここは私に任せて。\"\r\n[s8] \"ちょっと見てくるよ。\""
10053050-75 = "い、いや……私も行く。"
10053050-76 = "なんか嫌な感じがするの……。先生は私の後ろにいて。\r\n"
10053050-80 = "この扉の向こうに……誰かいる……。"
10053050-86 = "…………。\r\n"
10053050-92 = "お待ちどお！！！！\r\n\r\n\r\n"
10053050-93 = "！？！？\r\n"
10053050-102 = "なに！？なんで殴られたの！？\r\n\r\n\r\n"
10053050-103 = "バカ！！どうしてそんな紛らわしい登場すんのよ！！心臓止まるかと思ったじゃない！"
10053050-104 = "先生、レナは何を怒ってるんすか？\r\n"
10053050-105 = "[s9] \"コノカじゃなかったの……？\"\r\n[s10] \"さっきまでドアの前にいたよね……？\""
10053050-108 = "いいえ？あたしは来たばっか――\r\n\r\n"
10053050-109 = "あ、ってことは……やっぱり見間違いじゃなかったんすね。\r\n"
10053050-110 = "えっ！？どういう意味！？\r\n\r\n\r\n\r\n"
10053050-111 = "いや～しじみの味噌汁を持ってくる途中で、山小屋から誰か出ていった気がして。\r\n"
10053050-112 = "でもみんな中にいたから、見間違いかと思ってたんだよ。\r\n"
10053050-113 = "じゃあ……ほんとに誰かいるの！？私たち以外に！？\r\n\r\n\r\n\r\n\r\n"
10053050-114 = "感じたのがあたしだけじゃないなら、そりゃ本物っしょ？\r\n"
10053050-115 = "それより、早くご飯にしよう！所長も起こしてさ。\r\n\r\n"
10053050-116 = "今はもっと大事なことがあるでしょ！？\r\n\r\n\r\n"
10053050-117 = "いやいや、ご飯より大事なことなんてこの世にないって。飯は生きる基本なんだから。#n所長～起きて～\r\n\r\n"
10053050-119 = "（妙な空気を残したまま、夕食が始まった）"
10053050-120 = "（コノカの料理はかなり美味しかった。ただ、油っぽくて味の濃いメニューが多かった）"
10053050-123 = "なるほど……吾輩が寝ている間にそんなことが。\r\n\r\n"
10053050-124 = "一応、聞いておくが……。\r\n"
10053050-125 = "誰かの恨みを買っている者はいるかね？\r\n"
10053050-126 = "いるわけないでしょ！！\r\n\r\n\r\n"
10053050-128 = "思い当たる節がたくさん。\r\n"
10053050-130 = "えっ！？\r\n\r\n\r\n"
10053050-132 = "え～っと、最後に復讐しに来たヤツが2週間前だから……。\r\n\r\n"
10053050-133 = "そろそろ、また来てもおかしくない頃かな～\r\n"
10053050-134 = "冗談でしょ？\r\n"
10053050-135 = "まさか。\r\n"
10053050-136 = "あたしだって公安局でタダ飯食ってるわけじゃないんで～\r\n"
10053050-137 = "……あ、でも今回は違うな。あたしの居場所を知ってるの姉御だけだし。\r\n"
10053050-138 = "……いや、そうとは限らない。\r\n"
10053050-139 = "うん？\r\n\r\n\r\n\r\n"
10053050-140 = "もしも誰かがコノカ君に強い恨みを抱いていて、こっそり尾行していたとしたら……#nむしろこうして山奥に来ている今こそが、襲うには絶好のタイミングのはずだ。\r\n"
10053050-141 = "もちろん、この仮説が成立するには相当な忍耐力と執念……#nそして何より復讐心が必要になるけれどね。\r\n\r\n"
10053050-142 = "さすがのあたしもそこまで恨まれるようなことは――\r\n\r\n\r\n"
10053050-146 = "……ちょっとだけ？"
10053050-147 = "あるの！？\r\n\r\n\r\n"
10053050-148 = "こんな仕事してれば、ケガ人の1人や2人出るわけで――\r\n\r\n\r\n\r\n"
10053050-149 = "いやいやいや！ヴァルキュ ーレってそういうの許されるの！？"
10053050-150 = "正当防衛だから、正当防衛。\r\n\r\n\r\n\r\n"
10053050-155 = "───七囚人。"
10053050-162 = "噂なら聞いたことがある。#n母校での更生を諦められ、連邦生徒会の特殊部隊によって逮捕された7名の凶悪犯。矯正局に送られたものの……後に脱獄した、あの。\r\n"
10053050-163 = "彼女らの狙いがコノカ君個人ではなく……公安局、つまりヴァルキューレ警察学校全体だったとしたら？\r\n"
10053050-164 = "我々は今、未曾有の危機に直面しているのかもしれない……！"
10053050-169 = "それは……さすがに飛躍しすぎじゃない？"
10053050-174 = "うーん、でも、なくはないかも。"
10053050-175 = "あるの！？！？"
10053050-176 = "用意周到、粘着質、そして異常にヴァルキューレを憎んでる脱獄犯。"
10053050-177 = "ちゃんと思い出せるもんすね。"
10053050-178 = "…………。"
10053050-179 = "…………。"
10053050-181 = "あ～よかった～"
10053050-182 = "えっ？"
10053050-183 = "いや、てっきり幽霊でも出たのかと思って。"
10053050-184 = "脱獄犯なら話は早いっしょ？#nもう1回捕まえて、ムショにぶち込むだけなんだから。"
10053050-185 = "……あ、ムショって言い方は取り消し。矯正局に、っすね。"
10053050-186 = "さすがに軽すぎない……？"
10053050-187 = "七囚人って、私でも聞いたことあるんだけど。\r\n"
10053050-188 = "え、七囚人は知ってるのに、あたしが公安局なのは知らなかったってこと？\r\n\r\n\r\n\r\n"
10053050-189 = "あ、いや、ごめん。そういう意味じゃ――\r\n\r\n"
10053050-190 = "冗談冗談、謝らなくていいって！あははっ！\r\n\r\n\r\n"
10053050-194 = "とにかく、誰が来ようとあたしが守ってあげるから。\r\n"
10053050-195 = "これで一件落着！あ～ビビって損した～\r\n"
10053050-196 = "……。\r\n"
10053050-200 = "……。\r\n\r\n\r\n"
