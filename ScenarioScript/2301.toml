[translation]
2301-1 = "いざ、お祭り運営委員会定例会議！"
2301-2 = "（のんびりとしたある休日の午後。百夜堂の片隅に、お祭り運営委員会の部員たちが集まっていた）"
2301-3 = "ホワイトボード準備OK、マーカーも新品。うん、完璧ね。"
2301-4 = "じゃあ、フィーナ。"
2301-5 = "ハイっ！"
2301-6 = "それでは委員長からの命令も受けマシタのでっ！"
2301-10 = "これより、お祭り運営委員会の定例会議を始めマースっ！！！"
2301-12 = "うーん……。"
2301-13 = "毎回思うんだけど、会議でこのテンション必要……？"
2301-14 = "何を言ってるんデスか！礼儀はどんな時でも大事なものなんデスよ、委員長！"
2301-15 = "ワタシたちお祭り運営委員会の定例会は、崇高で繊細な儀式デス！"
2301-16 = "心から真剣に、それでいて楽しく、本気でやらなくてはいけマセン！"
2301-17 = "まあ、フィーナがそこまで言うなら良いんだけど……。"
2301-18 = "とりあえず本題、今日の議題の説明から始めましょう。"
2301-19 = "来月、「烏羽商店街」でお祭りが開催される予定なのは知ってると思うけど、"
2301-20 = "その商店街のお祭りのプロデュース依頼が来たわ。もちろんお祭り運営委員会として、断る理由も無いし、全力を尽くすつもりよ。"
2301-21 = "ウミカ……は残念ながら、ゲヘナ地区のお祭りの調査からまだ帰ってきてないから。"
2301-22 = "今回はフィーナと私の二人だけで、何とかしてこのお祭りを成功させなきゃね。"
2301-23 = "ハイっ！"
2301-24 = "じゃあ単刀直入に聞くけど、今回のお祭りについて何か良さそうなアイデアとかある？"
2301-25 = "どんなものでもOK。くだらないように思えても、そこから話が広がるかもしれないから。"
2301-26 = "ウーン……！"
2301-29 = "はいはーい！私ある！あるよ、良いアイデア！"
2301-30 = "ふあぁ……。"
2301-31 = "あらあら……。"
2301-33 = "……あのねえ。"
2301-34 = "頑張って無視してたのに無理やり入ってこないでもらえる！！？"
2301-35 = "それより何で修行部が、外部の人がここにいるわけ！？"
2301-36 = "そもそも今日百夜堂はお休みなんだけど！？"
2301-37 = "ふぁ……それはね～、"
2301-38 = "修行部でピクニックに行こうとしてまして、そのおやつをテイクアウトで頂こうかと伺ったのですが、"
2301-39 = "ここに来るまで百夜堂が休日だったとは知らず……すみません、シズコちゃん。"
2301-40 = "何やらお困り顔で正面玄関に立っていマシタので！フィーナが招待しました！"
2301-41 = "あんたかっ！！！"
2301-42 = "困った時は助け合うものデス！"
2301-43 = "正論！フィーナの勝ち！"
2301-44 = "別に勝負してるわけじゃないから！いや、正論だけど、確かに正論ではあるのだけど……！"
2301-45 = "あ、そういえばちょうどお昼に食べようと持ってきていたお弁当があるんです。シズコちゃん、ご一緒にいかがですか？"
2301-46 = "え、そうなの？ありがとう、それは嬉しいかも……わっ、キャラ弁？"
2301-47 = "すごい、可愛いし美味しそう！じゃあ少しだけ……"
2301-48 = "じゃなくてっ！"
2301-49 = "今はお祭り運営委員会の定例会議の最中なの！外部の人がいたら困るんだってば！"
2301-51 = "委員長！それは違うと思いマス！"
2301-52 = "フィ、フィーナ……？"
2301-53 = "お祭りのアイデアだとしても、いつもワタシたちからだけではなく、時には外部の意見も聞くべきだと！フィーナは思いマス！"
2301-54 = "うっ、なるほど……！？"
2301-55 = "「流水腐らず」と言いマス！"
2301-56 = "逆に言えば、組織を健全な形で大きくしていくには、外部からの意見も積極的に取り入れる必要があるはずデス！"
2301-57 = "「仁義なきニャンニャンパンチ」でも、そう言ってマシタ！"
2301-58 = "まあ今回も映画の話だろうとは思ってたけど！"
2301-59 = "でも……。"
2301-61 = "そうね、フィーナ。それはその通りだと思う。"
2301-62 = "元々人数も少ないんだし、たまには外からの新鮮な意見も、何か良いアイデアに繋がるかもしれない。"
2301-63 = "それによって、私たちには見えてなかったものが見えてくるかもしれないし……。"
2301-64 = "うん、よし！分かった！"
2301-65 = "修行部のみんな、じゃああらためて参加してもらうわ。何か意見があったら言ってちょうだい！"
2301-66 = "え、良いの？ほんとに？"
2301-67 = "さっき無理やり入ってきておいて今更！？"
2301-68 = "お祭り……私は、気持ちよく寝られれば何でも……すぅ……。"
2301-69 = "それじゃあお祭りじゃないでしょうが！！っていうか言ってる途中で寝ないで！"
2301-70 = "私は、お祭りにはちょっと詳しくなくて……カエデちゃんはどうですか？"
2301-71 = "えっ、私？私？"
2301-72 = "えへへ、そうだね……私なら、素敵なレディーを目指して日々鍛錬と修行を怠らない私ならね～……！"
2301-73 = "（……さっきピクニックとか言ってなかった？）"
2301-74 = "お客さんを一気に集められる、大人っぽい……アダルトな計画を実行するかな！"
2301-75 = "あ、アダルトな計画！？何それ、どんな計画なの……！？"
2301-76 = "アダルトな計画だなんて、フィーナ、ドキドキしマス！ドキドキ！"
2301-77 = "きっとこれを実行したら、あちこちから人が押し寄せるように集まると思うよ？"
2301-78 = "アダルトで、押し寄せるように……。"
2301-79 = "ま、まさか、ハレンチなことをやろうとしてるんじゃないでしょうね！？"
2301-81 = "ハレンチ……？"
2301-82 = "カエデちゃん、「恥ずかしいことを平気でするような」という意味です。"
2301-83 = "へえ、う～ん……！確かに、考えようによってはちょっとハレンチかも？"
2301-84 = "あらあら……。"
2301-87 = "だ、ダメダメ！いくらお祭りを成功させるためでも、私たちお祭り運営委員会はあくまでも節度と倫理を守って……！"
2301-88 = "あ、でもそういえば今回の依頼の商店街、最近お客さんも減って閉店寸前のお店も多いって言ってたし……。"
2301-89 = "何卒よろしくお願いしますって、商店街の会長が涙目に……。"
2301-90 = "……いやいやいや、私も何とか成功させたい気持ちは山々だけど！"
2301-91 = "ふふっ、これくらいのことで迷うなんて、お祭り運営委員会の委員長といえどもまだまだ子供って感じだね？"
2301-92 = "で、でも……！"
2301-94 = "成功させなきゃいけないんでしょ、やっちゃおうよ！"
2301-95 = "禁忌のイベント……"
2301-96 = "人気トレーディングカードゲーム、「甲虫王女ムシクイーン」のひとり一箱販売を！"
2301-97 = "……え？禁忌？カード？……何の話？"
2301-98 = "エエッ！？あの限定発売で中々手に入りにくい、どこでもひとり2パックまでしか購入できないことが常の、あの「ムシクイーン」のカードを……！"
2301-99 = "ひとり一箱も！？それは確かに禁忌で、大人の所業デス！"
2301-100 = "そんなことをしたらキヴォトス全域から、「ムシクイーン」ユーザーが確かに押し寄せるように集まりマスよ！"
2301-101 = "……はい？"
2301-102 = "そう！そしてそれと同時に、「ムシクイーンバトル」を開催すればもう大盛り上がり間違いなし！"
2301-103 = "……はっ！よく考えると、ここまでしちゃうと百鬼夜行だけじゃなくて、ゲヘナやトリニティ、キヴォトスのありとあらゆる学校から生徒たちが押し寄せて……！？"
2301-104 = "そうなったら、文字通りキヴォトス最強の「ムシクイーン」の座を決める、すんごい大会が開かれることに！？"
2301-106 = "よく分かりませんが、素敵なお祭りになりそうですね？"
2301-107 = "……んん、大騒ぎ……？それはちょっと……すぅ……すぴー……。"
2301-109 = "ゴクリ……そうなったらもしかして、学校同士の大規模な抗争にまで飛び火して……！"
2301-110 = "しかしご心配なく、フィーナも参戦しマス！"
2301-111 = "委員長！万が一抗争になっても、その際はこのフィーナにお任せクダサイ！"
2301-117 = "いやそのカード、あんまり手に入らないんだったらそもそもどうやって大量に仕入れて……。"
2301-118 = "いやいやいや、そんなことより……"
2301-119 = "会議を、進行……"
2301-122 = "うううっ……！！"
2301-125 = "助けてウミカ！早く帰ってきてよ～っ！！？"
2301-126 = "いざ、お祭り運営委員会定例会議！"
