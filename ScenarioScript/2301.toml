[translation]
2301-1 = "Vamos lá, reunião regular do Comitê de Operações do Festival!"
2301-2 = "（Em uma tarde de folga tranquila. Em um canto da Hyakkiyako, os membros do Comitê de Operações do Festival estavam reunidos.）"
2301-3 = "Quadro branco pronto, marcadores novos. Sim, está perfeito."
2301-4 = "Então, Fina."
2301-5 = "Sim!"
2301-6 = "Já que recebi as ordens da presidente, então!"
2301-10 = "Daremos início à reunião regular do Comitê de Operações do Festival!!!"
2301-12 = "Hum..."
2301-13 = "Eu penso isso toda vez, mas essa empolgação toda é necessária na reunião...?"
2301-14 = "O que está dizendo! A etiqueta é importante em qualquer situação, presidente!"
2301-15 = "Nossa reunião regular do Comitê de Operações do Festival é um ritual sublime e delicado!"
2301-16 = "Devemos levar a sério, de coração, mas também nos divertir e nos dedicar de verdade!"
2301-17 = "Bem, se a Fina diz isso com tanta convicção, tudo bem..."
2301-18 = "Por enquanto, vamos começar com o assunto principal, a explicação da pauta de hoje."
2301-19 = "Acho que vocês sabem que um festival está planejado para o próximo mês na 'Rua Comercial Karasuha',"
2301-20 = "e recebemos um pedido para produzir esse festival. É claro que, como Comitê de Operações do Festival, não temos motivos para recusar e pretendo dar o meu melhor."
2301-21 = "Infelizmente, a Umika ainda não voltou da investigação sobre o festival no distrito de Gehenna."
2301-22 = "Desta vez, teremos que fazer esse festival ser um sucesso apenas com nós duas, Fina."
2301-23 = "Sim!"
2301-24 = "Então, sendo direta, vocês têm alguma ideia boa para este festival?"
2301-25 = "Qualquer coisa serve. Mesmo que pareça boba, pode acabar gerando algo maior."
2301-26 = "Hum...!"
2301-29 = "Eu, eu! Eu tenho! Eu tenho uma ideia ótima!"
2301-30 = "Ahhh..."
2301-31 = "Ora, ora..."
2301-33 = "...Ei."
2301-34 = "Eu estava tentando ignorar com todas as minhas forças, então poderia parar de se intrometer assim!!?"
2301-35 = "E por que o Clube de Treinamento, ou melhor, pessoas de fora estão aqui!?"
2301-36 = "Para começar, a Hyakkiyako está fechada hoje, sabia!?"
2301-37 = "Ah... é que,"
2301-38 = "estávamos planejando fazer um piquenique no Clube de Treinamento e viemos aqui para comprar alguns lanches para viagem, mas..."
2301-39 = "não sabíamos que a Hyakkiyako estaria fechada hoje... Desculpe, Shizuko-chan."
2301-40 = "Ela estava parada na entrada principal com uma cara de quem precisava de ajuda! Então eu a convidei!"
2301-41 = "Foi você, né!!!"
2301-42 = "Quando alguém está em apuros, devemos ajudar!"
2301-43 = "Argumento lógico! Ponto para a Fina!"
2301-44 = "Não estamos competindo! Quer dizer, é um argumento lógico, de fato é, mas...!"
2301-45 = "Ah, falando nisso, eu trouxe um bento que ia comer no almoço. Shizuko-chan, gostaria de se juntar a nós?"
2301-46 = "Ah, é mesmo? Obrigada, eu adoraria... Uau, um bento decorado?"
2301-47 = "Incrível, é fofo e parece delicioso! Então, só um pouquinho..."
2301-48 = "Não é isso que importa!"
2301-49 = "Estamos no meio da reunião regular do Comitê de Operações do Festival! Não pode ter gente de fora aqui!"
2301-51 = "Presidente! Acho que você está enganada!"
2301-52 = "Fi, Fina...?"
2301-53 = "Mesmo para ideias de festivais, não devemos ouvir apenas a nós mesmas, às vezes precisamos ouvir opiniões externas! É o que a Fina acha!"
2301-54 = "Ugh, entendo...!?"
2301-55 = "Como diz o ditado: 'Água corrente não apodrece'!"
2301-56 = "Pelo contrário, para expandir a organização de forma saudável, devemos incorporar ativamente opiniões externas!"
2301-57 = "Disseram isso até em 'Soco Nyan-Nyan Sem Lei'!"
2301-58 = "Bem, eu já imaginava que isso vinha de um filme!"
2301-59 = "Mas……."
2301-61 = "É verdade, Fina. Acho que você tem razão."
2301-62 = "Como já somos poucas pessoas, opiniões frescas de fora podem acabar nos levando a boas ideias."
2301-63 = "Graças a isso, talvez possamos enxergar coisas que antes não víamos..."
2301-64 = "Certo, entendi! Fechado!"
2301-65 = "Pessoal do Clube de Treinamento, então vamos deixar vocês participarem. Se tiverem alguma opinião, podem falar!"
2301-66 = "Sério? Pode mesmo?"
2301-67 = "Depois de terem entrado à força, agora querem participar?!"
2301-68 = "Festival... Para mim, contanto que eu consiga dormir bem, qualquer coisa serve... zzz..."
2301-69 = "Isso não seria um festival, né!! E aliás, não durma enquanto fala!"
2301-70 = "Eu não entendo muito de festivais... Kaede-chan, o que você acha?"
2301-71 = "Ah, eu? Eu?"
2301-72 = "Hehehe, vejamos... Se for eu, que busco ser uma dama elegante e não descuido do meu treinamento e disciplina diários...!"
2301-73 = "(...Ela não tinha acabado de falar de um piquenique?)"
2301-74 = "Eu executaria um plano bem adulto, capaz de atrair muitos clientes de uma vez só!"
2301-75 = "Um, um plano adulto!? O que é isso, que tipo de plano é esse...!?"
2301-76 = "Um plano adulto, Fina está empolgada! Empolgada!"
2301-77 = "Tenho certeza de que, se fizermos isso, as pessoas virão correndo de todos os lugares!"
2301-78 = "Adulto e vindo correndo..."
2301-79 = "N-não me diga que você está planejando fazer algo indecente!?"
2301-81 = "Indecente...?"
2301-82 = "Kaede-chan, significa 'fazer coisas vergonhosas sem se importar'."
2301-83 = "Ah, entendi...! Pensando bem, talvez seja um pouco indecente mesmo?"
2301-84 = "Ora, ora..."
2301-87 = "N-não, de jeito nenhum! Mesmo que seja para o sucesso do festival, nós, do Comitê Organizador, devemos manter a moderação e a ética...!"
2301-88 = "Ah, mas falando nisso, disseram que a rua comercial do pedido de hoje está com poucos clientes e muitas lojas à beira da falência..."
2301-89 = "O presidente da associação comercial até ficou com os olhos marejados pedindo nossa ajuda..."
2301-90 = "...Não, não, não! Eu também quero muito que seja um sucesso, mas!"
2301-91 = "Fufu, hesitar por causa disso... mesmo sendo a presidente do Comitê Organizador, você ainda parece uma criança, não é?"
2301-92 = "M-mas...!"
2301-94 = "Você não disse que precisa ser um sucesso? Vamos fazer isso!"
2301-95 = "Um evento proibido..."
2301-96 = "Vender uma caixa por pessoa do popular jogo de cartas colecionáveis, 'Princesa Besouro Mushiqueen'!"
2301-97 = "...Hã? Proibido? Cartas? ...Do que você está falando?"
2301-98 = "Eeeh!? Aquelas cartas de 'Mushiqueen' que são edições limitadas, difíceis de conseguir e que normalmente só permitem comprar dois pacotes por pessoa...!"
2301-99 = "Uma caixa por pessoa!? Isso é realmente proibido, é coisa de gente grande!"
2301-100 = "Se fizermos isso, os jogadores de 'Mushiqueen' de todo o Kivotos virão correndo para cá!"
2301-101 = "...Oi?"
2301-102 = "Isso! E se, ao mesmo tempo, organizarmos uma 'Batalha Mushiqueen', o sucesso será garantido!"
2301-103 = "...Ah! Pensando bem, se chegarmos a esse ponto, não serão apenas alunas de Hyakkiyako, mas de Gehenna, Trinity e de todas as escolas de Kivotos que virão correndo...!?"
2301-104 = "Se isso acontecer, um torneio incrível para decidir quem é a melhor jogadora de 'Mushiqueen' de Kivotos será realizado, literalmente!?"
2301-106 = "Não entendi muito bem, mas parece que vai ser um festival maravilhoso, não é?"
2301-107 = "...Hmm, uma grande confusão...? Isso é um pouco... zzz... snif..."
2301-109 = "Gulp... Se isso acontecer, será que pode acabar virando um conflito em larga escala entre as escolas...!"
2301-110 = "Mas não se preocupe, Fina também vai participar!"
2301-111 = "Presidente! Se por acaso virar um conflito, deixe com a Fina!"
2301-117 = "Não, mas se essas cartas são tão difíceis de conseguir, como vamos conseguir tantas..."
2301-118 = "Não, não, não, esqueça isso..."
2301-119 = "Continuar... a reunião..."
2301-122 = "Uuuuh...!!"
2301-125 = "Socorro, Umika! Volta logo para cá~~!!?"
2301-126 = "Começa agora a reunião regular do Comitê Organizador do Festival!"
