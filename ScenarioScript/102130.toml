[translation]
102130-1 = "第13話;「トリニティ」自治区防衛（１）"
102130-5 = "こちらです！"
102130-6 = "みなさん、こちらに避難を！"
102130-8 = "トリニティ自治区の避難誘導は私たちが務めます！#nマシロ、後方支援を！"
102130-9 = "はい、ハスミ先輩！"
102130-14 = "こちらにお入りください！#n古書館はトリニティのなかでも歴史の長い建物なので、まだ比較的崩れにくいはずです！"
102130-24 = "私の古書館……私だけのアジトが……うぅ……"
102130-25 = "委員長も！今回はみなさんのために開放しているのですから、#nもっと楽しそうな表情で！"
102130-26 = "ああ……ううぅっ……"
102130-32 = "う、うわぁっ！？"
102130-33 = "こっちにも敵が！？"
102130-48 = "手が足りないようですね、私たちも手伝います。"
102130-49 = "はい！#nトリニティの「走る閃光弾」と、自警団の「スーパースター」が到着しましたよ！"
102130-51 = "自警団のみなさん……！"
102130-53 = "れ、レイサさん……その呼び名は少し……"
102130-54 = "ああっと！そんな事を言っている間に敵襲が！#nこれは大ピンチ！"
102130-55 = "――ですが！"
102130-66 = "……この程度でこの私、[ruby=うざわ]宇沢[/ruby]レイサを仕留められると思わないでください！スズミさん、今の見ましたか！私の華麗な――"
102130-71 = "すみません、今はすぐにあちらに向かわなくてはなりません。#n行きましょう、レイサさん。"
102130-76 = "あっ、はい！「走る閃光弾」の本領発揮ですね！"
102130-77 = "スズミさーん！待ってくださーい！"
102130-82 = "……。"
102130-83 = "カズサちゃんどうしたの？"
102130-84 = "……いや、元気そうだなと思って。"
102130-89 = "で、何で私たちは避難しないの？"
102130-90 = "おやおや、ヨシミくん。仮にも私たちは放課後スイーツ部だよ？#nこういう非常事態には手を差し伸べるべきじゃないかな。スイーツのように。"
102130-91 = "は？何言ってんの？ってかスイーツ関係ないし。"
102130-93 = "で、でも……正義実現委員会のみなさんも大変そうだし……#nお手伝いしたら喜んでくれるかも……"
102130-94 = "だね。私たちも行こっか。"
102130-95 = "うん！"
102130-97 = "はぁ……仕方ないわね。"
102130-109 = "ああっ！あちらに聖徒会の[ruby=ミメシス]複製[/ruby]が出現しています！"
102130-110 = "なっ！？あっちはまだ防衛体制が整ってないのに……！！"
102130-114 = "砲手、支援を。"
102130-124 = "これは……L118、牽引式榴弾砲……？"
102130-126 = "ええ、ハスミさん。その通りです。#n懐かしい響きではありませんか？"
102130-135 = "……ナギサ様……セイア様……。"
102130-136 = "……私、ナギサ様を外で見るのは初めてです。"
102130-137 = "ティーパーティーの支援に感謝します。 "
102130-139 = "いえ。#nこの程度もできなければ、ティーパーティーとしての面目が立ちませんから。"
102130-140 = "ではセイアさん、後はお願いします。"
102130-141 = "次は……北東方向、座標は――"
102130-152 = "……。"
102130-153 = "セイアさんの予知能力は無くなってしまいましたが……#nその代わりにと言いますか、別の力が与えられたとでもいうのでしょうか。"
102130-154 = "能力と呼ぶのかどうかは定かではないが……感覚が鋭くなってね……"
102130-155 = "……「勘」が良くなった、ということにしておきましょうか。"
102130-156 = "……ミカ、そちらの状況はどうだい？"
102130-157 = "うん、こっちは大丈夫。#n私一人で平気だから、そっちの防衛に力を入れちゃって。"
102130-158 = "……ああ。無理はしないように。"
102130-159 = "では、こちらの防衛は私たちが手伝いましょう。#nハスミさん、指揮をお願いします。"
102130-163 = "……分かりました、では遠慮なく。"
