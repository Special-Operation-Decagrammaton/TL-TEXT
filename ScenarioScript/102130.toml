[translation]
102130-1 = "Episódio 13; Defesa da região autônoma “Trindade” (1)"

102130-5 = "Aqui está!"

102130-6 = "Todos, evacuem aqui!"

102130-8 = "Estaremos encarregados da orientação de evacuação em Trinity Borough! #n Mashiro, forneça suporte logístico!"

102130-9 = "Sim, Hasumi-senpai!"

102130-14 = "Por favor entre aqui! #nA Biblioteca do Livro Antigo é um edifício com uma longa história em Trinity, por isso ainda deve ser relativamente resistente ao colapso!"

102130-24 = "Minha antiga livraria... meu próprio esconderijo... uh..."

102130-25 = "Presidente também! Desta vez estamos abrindo para todos, então, por favor, pareça que você está se divertindo!"

102130-26 = "Ahhhh..."

102130-32 = "Uau! ?"

102130-33 = "Há inimigos aqui também! ?"

102130-48 = "Parece que você não tem mãos suficientes, então podemos ajudar."

102130-49 = "sim! #n "Running Flashbang" do Trinity e "Superstar" do grupo de vigilantes chegaram!"

102130-51 = "Queridos vigilantes...!"

102130-53 = "Bem, Reisa-san... esse nome é um pouco..."

102130-54 = "Ah! Enquanto eu dizia isso, o inimigo atacou! #nEsta é uma grande pitada!"

102130-55 = "--Mas!"

102130-66 = "...Por favor, não pense que posso derrubar [ruby=annoying]Uzawa[/ruby]Reisa nesse nível! Suzumi-san, você viu o que acabou de ver? Minha linda――"

102130-71 = "Desculpe, mas tenho que ir até lá agora. #nVamos, Leisa-san."

102130-76 = "Ah, sim! Este é o verdadeiro poder da “bomba flash em execução”!"

102130-77 = "Suzumi-san! Por favor, aguarde!"

102130-82 = "……."

102130-83 = "O que aconteceu com Kazusa-chan?"

102130-84 = "...Não, pensei que você parecia bem."

102130-89 = "Então por que não estamos evacuando?"

102130-90 = "Olá, Yoshimi-kun. Mesmo se estivéssemos no clube de doces depois da escola, certo? #nAcho que deveríamos ajudar em emergências como esta. Como doces."

102130-91 = "dentes? O que você está falando? Quer dizer, não tem nada a ver com doces."

102130-93 = "Mas... todos no Comitê de Realização da Justiça parecem estar passando por momentos difíceis...#nEles podem ficar felizes se você ajudar..."

102130-94 = "Certo. Vamos também?"

102130-95 = "Sim!"

102130-97 = "Suspiro... não consigo evitar."

102130-109 = "Ah! Uma [ruby=mimesis]cópia[/ruby] do Coven está aparecendo ali!"

102130-110 = "O que! ? Eles ainda não têm um sistema de defesa instalado...! !"

102130-114 = "Artilheiro, suporte."

102130-124 = "Este é...L118, obus rebocado...?"

102130-126 = "Sim, Hasumi. Isso mesmo. #nNão parece nostálgico?"

102130-135 = "... Nagisa-sama... Seia-sama..."

102130-136 = "...Esta é a primeira vez que vejo Nagisa-sama lá fora."

102130-137 = "Obrigado pelo seu apoio ao Tea Party."

102130-139 = "lar. #nSe não pudermos fazer algo assim, o Tea Party perderá prestígio."

102130-140 = "Agora, Seia-san, por favor, cuide do resto."

102130-141 = "Próximo... Direção Nordeste, as coordenadas são--"

102130-152 = "……."

102130-153 = "A habilidade precognitiva de Seia-san desapareceu, mas...#nEm seu lugar, acho que você poderia dizer que ela recebeu um poder diferente."

102130-154 = "Não tenho certeza se chamaria isso de habilidade, mas... meus sentidos ficaram mais aguçados..."

102130-155 = "... Digamos apenas que minha “intuição” melhorou."

102130-156 = "...Mika, como está a situação aí?"

102130-157 = "Sim, está tudo bem aqui. #nEstou bem sozinho, então me concentrei em me defender."

102130-158 = "...... ah. Não exagere."

102130-159 = "Pois bem, deixe-nos ajudá-lo com sua defesa. #n Sr. Hasumi, por favor, conduza."

102130-163 = "...Eu entendo, então fique à vontade para perguntar."

