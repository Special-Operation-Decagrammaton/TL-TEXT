[translation]
102130-1 = "Episódio 13;Defesa do Distrito de Trinity (1)"
102130-5 = "Por aqui!"
102130-6 = "Pessoal, evacuem por aqui!"
102130-8 = "Nós vamos cuidar da evacuação no distrito de Trinity!#nMashiro, dê suporte na retaguarda!"
102130-9 = "Sim, Hasumi-senpai!"
102130-14 = "Entrem aqui, por favor!#nA Biblioteca de Livros Antigos é um dos prédios mais antigos de Trinity, então deve resistir melhor aos desabamentos!"
102130-24 = "Minha biblioteca… meu esconderijo particular… uuu…"
102130-25 = "Até a presidente! Já que estamos abrindo isso pra todo mundo,#npelo menos tente parecer um pouco mais feliz!"
102130-26 = "Aah… uuuuh…"
102130-32 = "U-uwaah!?"
102130-33 = "Tem inimigos aqui também!?"
102130-48 = "Parece que vocês estão sem pessoal. Nós vamos ajudar."
102130-49 = "Isso aí!#nA \"Granada de Luz Ambulante\" de Trinity e a \"Superestrela\" da Patrulha Civil chegaram!"
102130-51 = "Pessoal da Patrulha Civil…!"
102130-53 = "R-Reisa-san… esse apelido é meio…"
102130-54 = "Aaah! E enquanto conversamos, mais inimigos estão chegando!#nEstamos numa situação crítica!"
102130-55 = "――Mas!"
102130-66 = "…Não pensem que conseguem derrotar euzinha, Reisa Uzawa, com tão pouco! Suzumi-san, você viu aquilo!? Minha magnífica――"
102130-71 = "Desculpe, mas precisamos ir imediatamente pra lá.#nVamos, Reisa-san."
102130-76 = "A-ah, sim! Hora da \"Granada de Luz Ambulante\" brilhar!"
102130-77 = "Suzumi-saaan! Espera por mimmm!"
102130-82 = "……"
102130-83 = "Kazusa-chan, aconteceu alguma coisa?"
102130-84 = "…Não, só achei que ela parece bem animada."
102130-89 = "Então… por que a gente não tá evacuando?"
102130-90 = "Ora ora, Yoshimi-kun. Nós somos o Clube dos Doces Pós-Aula, lembra?#nNuma emergência dessas, devemos estender a mão aos outros. Igual aos doces."
102130-91 = "Hã? Do que você tá falando? E doces não têm nada a ver com isso."
102130-93 = "M-mas… o pessoal do Comitê de Justiça também parece estar tendo dificuldades…#nTalvez eles fiquem felizes se ajudarmos…"
102130-94 = "Verdade. Então vamos também?"
102130-95 = "Vamos!"
102130-97 = "Aff… fazer o quê."
102130-109 = "Ahh! Uma réplica do Conselho Estudantil apareceu naquela direção!"
102130-110 = "O quê!? A defesa daquela área ainda nem foi preparada…!!"
102130-114 = "Artilharia, deem suporte."
102130-124 = "Isso é… um L118, obus rebocado…?"
102130-126 = "Sim, Hasumi-san. Exatamente.#nNão traz lembranças nostálgicas?"
102130-135 = "…Nagisa-sama… Seia-sama…"
102130-136 = "…É a primeira vez que vejo a Nagisa-sama do lado de fora."
102130-137 = "Agradecemos o apoio da Tea Party."
102130-139 = "Não precisa agradecer.#nSe não conseguíssemos nem fazer isso, seria vergonhoso para a Tea Party."
102130-140 = "Então, Seia-san, o resto fica com você."
102130-141 = "Próximo alvo… nordeste, coordenadas――"
102130-152 = "……"
102130-153 = "A Seia-san perdeu sua habilidade de previsão do futuro…#nMas talvez, em troca disso, tenha recebido outro tipo de poder."
102130-154 = "Não sei se dá pra chamar isso de habilidade… mas meus sentidos ficaram mais aguçados…"
102130-155 = "…Digamos apenas que minha \"intuição\" melhorou."
102130-156 = "…Mika, como estão as coisas aí?"
102130-157 = "Uhum, aqui tá tudo bem.#nEu consigo lidar sozinha, então foquem mais na defesa daí."
102130-158 = "…Entendido. Só não se force demais."
102130-159 = "Então deixem a defesa daqui conosco.#nHasumi-san, assumimos sob seu comando."
102130-163 = "…Entendido. Então não vou pegar leve."