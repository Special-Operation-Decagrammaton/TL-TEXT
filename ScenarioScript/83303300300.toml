[translation]
83303300300-6 = "P-Presidente! Preciso de reforços com urgência!"
83303300300-7 = "O que houve?"
83303300300-8 = "É que... aquele encrenqueiro que a senhora subjugou começou a causar um tumulto..."
83303300300-9 = "“Não vou decepcionar as expectativas do Presidente do Pandemonium!”"
83303300300-10 = "“Nós somos encrenqueiros que vivem pela honra e pela humanidade! Guerra total contra o Comitê Disciplinar!”"
83303300300-11 = "...foi o que relataram que ele estava gritando enquanto causava o caos!"
83303300300-12 = "Honra e humanidade, é... Fico curiosa sobre que tipo de conversa o Presidente do Pandemonium teve com esses encrenqueiros, mas..."
83303300300-13 = "Vou garantir que ele fique quieto desta vez, para que nunca mais cause problemas."
