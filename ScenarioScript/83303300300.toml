[translation]
83303300300-6 = "い、委員長！大至急応援を！"
83303300300-7 = "どうしたの？"
83303300300-8 = "その……委員長が制圧した問題児が暴れ出しまして……"
83303300300-9 = "「万魔殿の議長の期待を裏切ってなるものか！」"
83303300300-10 = "「私たちは義理と人情に生きる問題児！風紀委員会と全面戦争だ！」"
83303300300-11 = "……などと叫びながら、暴れていると報告が！"
83303300300-12 = "義理と人情ね……万魔殿の議長が問題児たちと一体どんなやり取りを交わしたのかは気になるけど……"
83303300300-13 = "二度と暴れられないように、今度こそ大人しくなってもらう。"
