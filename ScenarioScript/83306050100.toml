[translation]
83306050100-7 = "ん……？"
83306050100-13 = "こんなところに日誌が……ずいぶん古い物ね。"
83306050100-14 = "少しくらい見ても……"
83306050100-17 = "このピアノなら自由に使っていいと言われた。"
83306050100-18 = "私は将来、ゲヘナで……いや、キヴォトスで一番のピアニストになりたい。"
83306050100-23 = "その夢を叶えるために、これから毎日、欠かさず練習を続ける。"
83306050100-24 = "いつの日か夢が叶うことを願って、記録を残していこう。"
83306050100-31 = "……昔、このピアノで練習していた人の忘れ物ね。"
83306050100-32 = "きっと、その頃は埃なんて被ってなかったんでしょう。このピアノも、日誌も……"
83306050100-33 = "ピアニストになる夢、か……"
83306050100-34 = "この人は今、どうしているんだろう。"
83306050100-35 = "………。"
