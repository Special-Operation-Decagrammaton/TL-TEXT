[translation]
1002220-1 = "ずっと大切なもの"
1002220-2 = "（そうして、ヒナが待っている海辺に急いで向かった）"
1002220-7 = "[ns] \"ヒナ、お待たせ。\""
1002220-8 = "あ、先生……。"
1002220-9 = "急なお願いだったから、心配したけど……。"
1002220-13 = "……来てくれてありがとう、先生。"
1002220-14 = "[s] \"ヒナの頼みなら、喜んで駆けつけるよ。\""
1002220-15 = "あ……。"
1002220-16 = "……そうなんだ、先生はそんなに……。"
1002220-17 = "……ふふっ。"
1002220-18 = "[s1] \"水泳なら任せて。全力で教えるね！\"\n[s2] \"あまり泳ぐのは得意じゃないけど、ヒナのためなら全力で頑張るね。\""
1002220-19 = "そう言ってくれると、すごく頼もしい。"
1002220-20 = "そ、そうなの……？"
1002220-21 = "[s3] \"ヒナと一緒に自分も水泳の勉強をしていくよ。\""
1002220-22 = "あ……う、うん。"
1002220-23 = "先生がこんなにもやる気を見せてくれるのなら、私も負けていられない。"
1002220-24 = "やるからには、全力で頑張るね。#n先生の時間をあまりもらうのも、申し訳ないから。"
1002220-28 = "その……物覚えが良いところが、数少ない私の長所、だし……"
1002220-29 = "それじゃ早速……。"
1002220-33 = "[ns] \"待って、それはダメだよ！\""
1002220-34 = "……？#nダメ……？"
1002220-35 = "[s4] \"早く上達しようと思わなくていいよ。時間なんて思う存分奪ってほしい。\"\n[s5] \"短時間の習得は、身についたとしても定着しないからね。\""
1002220-38 = "でも、せっかくの休日だし……遊ぶというわけでもないのだから。"
1002220-39 = "私の指導で一日を浪費するのは、やっぱり申し訳……"
1002220-40 = "[s] \"ヒナと一緒に過ごせるだけでいいんだよ。\""
1002220-41 = "……二人で穏やかに過ごす時間が、の……のぞ、望むところ……？"
1002220-42 = "信じられないなら、ここで確かめてもいいって…… "
1002220-43 = "ま、待って！人目があるから、#nそ……その、やっぱりそういうのはちょっと……。"
1002220-44 = "……まったく、あなたという人は本当に……。"
1002220-45 = "……。"
1002220-46 = "……ふふっ。"
1002220-47 = "そういうところ……やっぱりあなたらしい。"
1002220-48 = "わかった。それじゃ先生、今日はよろしくね。"
1002220-49 = "[s] \"よっしゃ！任せてちょうだい！\""
1002220-50 = "さてと……。"
1002220-57 = "きゅ、急に何するんですか！？"
1002220-58 = "い、 いきなり撃ってくるなんて！#nどうしてこんなことを！？"
1002220-62 = "あぁん？当たり前の事を聞くんじゃねぇよ！"
1002220-63 = "こっちゃあな！あっつい日によぉ！#nイチャついてる奴らを見るとムカついてしゃあねぇんだ！"
1002220-64 = "メチャクチャにしてやりたくなるんだよぉ！"
1002220-65 = "リア充は全員地獄に堕ちろってんだ！！"
1002220-66 = "そんな身勝手な理由で！？"
1002220-71 = "[ns] \"ヒナ、ちょっと……！\""
1002220-73 = "……先生、少しだけ待ってて。"
1002220-74 = "すぐに片付けてくる。"
1002220-77 = "[ns] \"あっ、ヒナ！\""
1002220-81 = "あん？おめぇ誰だ？"
1002220-82 = "小柄で銀髪の……ちょ、こいつまさか！"
1002220-86 = "う、うわあああっ！？"
1002220-87 = "げ、ゲヘナの風紀委員長がなんでここに！？ガハッ！"
1002220-94 = "（そうして、ヒナは騒ぎ起こす問題児を無慈悲に撃退していった）"
1002220-97 = "あ、ありがとうございます！おかげさまで助かりました！"
1002220-98 = "このご恩はどうお返しすればいいか……！"
1002220-99 = "……いい、やるべきことをやっただけだから。"
1002220-101 = "（感謝の意を表する人々を帰した直後）"
1002220-106 = "[ns] \"お疲れ様、ヒナ。\""
1002220-108 = "別に、本当に大したことなかったし。"
1002220-109 = "夏になると、増えるんだ。こういう手合い、ゲヘナで何人も見てきたから。"
1002220-110 = "これくらい、いつもの事、というか……。"
1002220-111 = "[s] \"さすがゲヘナの風紀委員長だね。\""
1002220-112 = "だから、そんなんじゃないってば……"
1002220-117 = "[ns] \"あれ？今の音は……。\""
1002220-118 = "あっ、浮き輪に……穴が開いたみたい。"
1002220-119 = "[s] \"ヒナの浮き輪が……？急にどうして……\""
1002220-120 = "ああ……さっき戦った時に銃弾が掠っちゃったみたい。"
1002220-121 = "私の判断ミスだよ。"
1002220-122 = "今まで大丈夫だったから、油断したみたい。"
1002220-123 = "もう少し注意すればよかった……。"
1002220-124 = "[s] \"それはヒナのせいじゃないよ。\""
1002220-125 = "ちがう、先生……。"
1002220-126 = "穴が開いちゃったのは、私の扱い方が悪かったから……。"
1002220-127 = "どうしようもないの……もう壊れてしまったんだし……。"
1002220-128 = "…………。"
1002220-129 = "[s] \"じゃ、直しに行こうか？\""
1002220-130 = "直すって……浮き輪を？"
1002220-131 = "それは……難しい。"
1002220-132 = "この浮き輪、一応風紀委員会の備品だから、特殊な素材で作られているの。"
1002220-133 = "整備科に持っていかないと、簡単には直せない。"
1002220-134 = "よりにもよって……先生が水泳を教えてくれるタイミングでこんな……。"
1002220-135 = "私……いつもこうなんだよね。"
1002220-136 = "…………。"
1002220-137 = "……むしろ、これで良かったのかもしれない。"
1002220-138 = "[s] \"ヒナ？\""
1002220-139 = "……水泳を習うなら、浮き輪はもう使わないでおこうって思っていたから。"
1002220-140 = "昔から使ってたけど……いい機会なのかも。"
1002220-141 = "ちょっと名残惜しいけど……卒業、しないとね。"
1002220-142 = "……うん、浮き輪がなくても大丈夫。"
1002220-143 = "その方が練習が捗りそう、だし……。"
1002220-144 = "…………。"
1002220-145 = "……先生。#n浮き輪は捨てて、練習しに……"
1002220-146 = "[s] \"もちろん浮き輪がなくても、水泳の練習はできるよ。\""
1002220-147 = "……？"
1002220-148 = "[s] \"そして、ヒナの言う通り、いつかは卒業する日も来る。\""
1002220-149 = "先生……？"
1002220-150 = "[s] \"だからといって、それが今である必要はないんじゃない？\""
1002220-151 = "……！それは……。"
1002220-152 = "そう、だけど……。"
1002220-153 = "[s6] \"それに、私はまだ見れてないからね。\"\n[s7] \"浮き輪の上でアワアワしている、可愛いヒナの姿を！\""
1002220-156 = "せ、先生！？急に何を……！？"
1002220-157 = "ほ、本気で言ってるのなら……私も怒るよ。"
1002220-158 = "[ns] \"だ、だから！方法を探す前に諦めないでって話！\""
1002220-160 = "[ns] \"それに……ヒナが昔から使ってた大切な浮き輪、でしょ？\""
1002220-161 = "先生……"
1002220-162 = "……はあ、まったく。"
1002220-163 = "あなたはいつもそう。"
1002220-164 = "先生がそこまで言うのなら……やってみる。"
1002220-165 = "[s8] \"よし！じゃあ、修理してくれる場所を探しに行こうか。\"\n[s9] \"もちろん、全力で、ね！\""
1002220-169 = "（そうしてヒナを説得した末、一緒に浮き輪を直せるところを探し回ることにした）"
1002220-196 = "ふぅむ……これならこっちで直せると思うぞ。"
1002220-197 = "……本当？"
1002220-198 = "ゲヘナの新素材で作られた代物なんだろう？#n俄然やる気がわいてくるってもんだよ。"
1002220-199 = "じゃあ――"
1002220-200 = "[s] \"何卒！お願いします！\""
1002220-208 = "（そうして浮き輪の修理が順調に進み……）"
1002220-213 = "はいよ、お待ちどうさん！"
1002220-214 = "[s] \"ありがとうございます！\""
1002220-215 = "あ、ありがとう……。"
1002220-216 = "礼はいいって！こっちこそ勉強させてもらったからな。"
1002220-222 = "[ns] \"ヒナ、よかったね。\""
1002220-223 = "うん、そうだね。#n本当に……直せたんだ……。"
1002220-224 = "壊れちゃった時は、もうどうにもできないと思っていたけど……。"
1002220-225 = "……ありがとう、先生。"
1002220-226 = "[s] \"どういたしまして。\""
1002220-230 = "でも……あちこち歩き回っていたら、もうこんな時間……。"
1002220-231 = "……今日は色々とありがとう、先生。"
1002220-232 = "呼び出しておいて言うセリフじゃないけど、もう遅いからこれで……。"
1002220-233 = "[s] \"待って。まだ終わりじゃないよ。\""
1002220-234 = "……え？"
1002220-235 = "[s10] \"約束したよね？浮き輪を直すのも、\"\n[s11] \"水泳を教えるのも全力でやるって。\""
1002220-240 = "[ns] \"だから、少し遅いかもだけど…… \"\n[ns] \"水泳の授業をしてもいいかな？\""
1002220-241 = "あ……。"
1002220-242 = "あ……。"
1002220-243 = "あなたは相変わらず……。"
1002220-249 = "うん。"
1002220-250 = "あなたさえよければ、いくらでも……。"
1002220-255 = "私も全力で、教わるから。"
1002220-260 = "（その後、夜が熟して月が彼方に傾くまで、ヒナと水泳の授業を続けた）"
