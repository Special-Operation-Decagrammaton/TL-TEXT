[translation]
1002220-1 = "Algo sempre precioso"
1002220-2 = "（E assim, apressei-me em direção à beira-mar onde Hina estava esperando）"
1002220-7 = "[ns] \"Hina, desculpe a demora.\""
1002220-8 = "Ah, Sensei..."
1002220-9 = "Foi um pedido repentino, então fiquei preocupada, mas..."
1002220-13 = "...Obrigada por vir, Sensei."
1002220-14 = "[s] \"Se é um pedido da Hina, eu venho correndo com prazer.\""
1002220-15 = "Ah..."
1002220-16 = "...É mesmo, Sensei, você é tão..."
1002220-17 = "...Fufu."
1002220-18 = "[s1] \"Pode deixar a natação comigo. Vou te ensinar com tudo!\"\n[s2] \"Eu não sou muito bom em nadar, mas farei o meu melhor pela Hina.\""
1002220-19 = "Ouvir você dizer isso me deixa muito confiante."
1002220-20 = "S-sério...?"
1002220-21 = "[s3] \"Vou aprender a nadar junto com você, Hina.\""
1002220-22 = "Ah... s-sim."
1002220-23 = "Se o Sensei está mostrando tanta motivação, eu não posso ficar para trás."
1002220-24 = "Já que vamos fazer isso, vou me esforçar ao máximo.#nNão quero tomar muito do seu tempo, Sensei."
1002220-28 = "Bem... aprender rápido é uma das minhas poucas qualidades, então..."
1002220-29 = "Então, vamos começar..."
1002220-33 = "[ns] \"Espere, isso não pode!\""
1002220-34 = "...?#nNão pode...?"
1002220-35 = "[s4] \"Não precisa se preocupar em melhorar rápido. Quero que tome o tempo que quiser.\"\n[s5] \"Aprender algo rápido demais não faz o conhecimento se fixar bem.\""
1002220-38 = "Mas é um feriado, afinal... e não é como se estivéssemos apenas brincando."
1002220-39 = "Desperdiçar seu dia com o meu treinamento, eu realmente sinto que..."
1002220-40 = "[s] \"Só de passar o tempo com a Hina já é o suficiente para mim.\""
1002220-41 = "...Passar um tempo tranquilo a sós, é... é o que você... deseja...?"
1002220-42 = "Se não acredita, pode verificar aqui mesmo..."
1002220-43 = "E-espere! Tem gente olhando, então...#nI-isso, bem, esse tipo de coisa é um pouco..."
1002220-44 = "...Nossa, você é realmente uma pessoa..."
1002220-45 = "..."
1002220-46 = "...Fufu."
1002220-47 = "Esse seu jeito... é bem a sua cara."
1002220-48 = "Entendi. Então, Sensei, conto com você hoje."
1002220-49 = "[s] \"Beleza! Pode deixar comigo!\""
1002220-50 = "Bem então..."
1002220-57 = "P-por que você está fazendo isso de repente!?"
1002220-58 = "A-atirar do nada!#nPor que você faria algo assim!?"
1002220-62 = "Ah? Não me faça perguntas óbvias!"
1002220-63 = "É o seguinte! Num dia quente como este!#nEu fico irritada só de ver gente de casalzinho por aí!"
1002220-64 = "Dá vontade de destruir tudo!"
1002220-65 = "Que todos os casais felizes vão para o inferno!!"
1002220-66 = "Por um motivo tão egoísta assim!?"
1002220-71 = "[ns] \"Hina, espere um pouco...!\""
1002220-73 = "...Sensei, espere só um pouco."
1002220-74 = "Vou resolver isso rapidinho."
1002220-77 = "[ns] \"Ah, Hina!\""
1002220-81 = "Hã? Quem é você?"
1002220-82 = "Baixa, cabelo prateado... espera, não me diga que é ela!"
1002220-86 = "U-uwaaaaah!?"
1002220-87 = "A-a presidente do Comitê Disciplinar de Gehenna, por que ela está aqui!? Gah!"
1002220-94 = "（E assim, Hina repeliu impiedosamente os encrenqueiros que causavam confusão）"
1002220-97 = "Ah, muito obrigada! Graças a você, tudo se resolveu!"
1002220-98 = "Como poderei retribuir esse favor...!"
1002220-99 = "……Não precisa, eu só fiz o que tinha que ser feito."
1002220-101 = "（Logo após dispensar as pessoas que expressavam gratidão）"
1002220-106 = "[ns] \"Bom trabalho, Hina.\""
1002220-108 = "Não foi nada, sério. Não foi grande coisa."
1002220-109 = "Quando chega o verão, eles aparecem mais. Já vi muitos desse tipo em Gehenna."
1002220-110 = "Isso é algo comum, ou melhor dizendo……."
1002220-111 = "[s] \"Como esperado da presidente do Comitê Disciplinar de Gehenna.\""
1002220-112 = "Eu já disse que não é nada disso……"
1002220-117 = "[ns] \"Ué? Que barulho foi esse…….\""
1002220-118 = "Ah, parece que a boia…… furou."
1002220-119 = "[s] \"A boia da Hina……? Por que de repente……\""
1002220-120 = "Ah…… parece que uma bala de raspão a atingiu durante a luta de agora pouco."
1002220-121 = "Foi um erro de julgamento meu."
1002220-122 = "Como nunca tinha acontecido nada antes, acabei baixando a guarda."
1002220-123 = "Eu deveria ter sido mais cuidadosa……."
1002220-124 = "[s] \"Isso não é culpa sua, Hina.\""
1002220-125 = "Não, Sensei……."
1002220-126 = "O furo aconteceu porque eu não a manuseei direito……."
1002220-127 = "Não tem jeito…… já que ela estragou……."
1002220-128 = "…………."
1002220-129 = "[s] \"Então, vamos consertar?\""
1002220-130 = "Consertar…… a boia?"
1002220-131 = "Isso é…… difícil."
1002220-132 = "Essa boia, tecnicamente, é um equipamento do Comitê Disciplinar, então ela é feita de um material especial."
1002220-133 = "Se eu não levar ao departamento de manutenção, não dá para consertar facilmente."
1002220-134 = "Logo agora…… justamente quando o Sensei ia me ensinar a nadar, acontece isso……."
1002220-135 = "Eu…… sou sempre assim, né."
1002220-136 = "…………."
1002220-137 = "……Na verdade, talvez tenha sido melhor assim."
1002220-138 = "[s] \"Hina?\""
1002220-139 = "……Eu estava pensando em parar de usar a boia se fosse aprender a nadar."
1002220-140 = "Eu a uso desde pequena, mas…… talvez seja uma boa oportunidade."
1002220-141 = "É um pouco difícil de desapegar, mas…… preciso me formar nisso, né."
1002220-142 = "……Sim, tudo bem ficar sem a boia."
1002220-143 = "Acho que o treino vai render mais assim, inclusive……."
1002220-144 = "…………."
1002220-145 = "……Sensei. #nVamos descartar a boia e ir treinar……"
1002220-146 = "[s] \"Claro, dá para praticar natação mesmo sem a boia.\""
1002220-147 = "……?"
1002220-148 = "[s] \"E, como você disse, Hina, um dia o momento de se formar vai chegar.\""
1002220-149 = "Sensei……?"
1002220-150 = "[s] \"Mas só porque vai chegar, não significa que precise ser agora, não é?\""
1002220-151 = "……! Isso é……."
1002220-152 = "É, mas……."
1002220-153 = "[s6] \"Além disso, eu ainda não vi.\"\n[s7] \"A Hina toda atrapalhada em cima da boia, que cena adorável!\""
1002220-156 = "Se, Sensei!? Por que disse isso de repente……!?"
1002220-157 = "Se, se você estiver falando sério…… eu vou ficar brava, viu."
1002220-158 = "[ns] \"E-eu disse! Não desista antes de procurar uma solução!\""
1002220-160 = "[ns] \"Além disso... é a boia importante que a Hina usa desde pequena, não é?\""
1002220-161 = "Sensei..."
1002220-162 = "...Ah, meu Deus."
1002220-163 = "Você é sempre assim."
1002220-164 = "Se o Sensei insiste tanto assim... eu vou tentar."
1002220-165 = "[s8] \"Ótimo! Então vamos procurar um lugar que possa consertar!\"\n[s9] \"Claro, com toda a nossa força!\""
1002220-169 = "(Depois de convencer a Hina, decidimos procurar juntos um lugar onde pudéssemos consertar a boia)"
1002220-196 = "Hmm... acho que consigo consertar isso por aqui."
1002220-197 = "...Sério?"
1002220-198 = "É um item feito com os novos materiais de Gehenna, né?#nIsso me deixa muito motivado para trabalhar."
1002220-199 = "Então..."
1002220-200 = "[s] \"Por favor! Eu imploro!\""
1002220-208 = "(Assim, o conserto da boia progrediu sem problemas...)"
1002220-213 = "Pronto, aqui está!"
1002220-214 = "[s] \"Muito obrigado!\""
1002220-215 = "Ah, obrigada..."
1002220-216 = "Não precisa agradecer! Eu que aprendi muito com isso."
1002220-222 = "[ns] \"Hina, que bom, né?\""
1002220-223 = "Sim, é verdade.#nEu realmente... consegui consertar..."
1002220-224 = "Quando ela quebrou, achei que não tinha mais jeito..."
1002220-225 = "...Obrigada, Sensei."
1002220-226 = "[s] \"De nada.\""
1002220-230 = "Mas... de tanto andar por aí, já está tarde..."
1002220-231 = "...Obrigada por tudo hoje, Sensei."
1002220-232 = "Não é algo que se diga depois de ter chamado você, mas como já está tarde, vou indo..."
1002220-233 = "[s] \"Espere. Ainda não acabou.\""
1002220-234 = "...Eh?"
1002220-235 = "[s10] \"Nós prometemos, não é?\"\n[s11] \"Que eu daria o meu melhor para consertar a boia e te ensinar a nadar.\""
1002220-240 = "[ns] \"Então, pode estar um pouco tarde, mas...\"\n[ns] \"Podemos ter nossa aula de natação?\""
1002220-241 = "Ah..."
1002220-242 = "Ah..."
1002220-243 = "Você continua o mesmo de sempre..."
1002220-249 = "Sim."
1002220-250 = "Se estiver tudo bem para você, o quanto você quiser..."
1002220-255 = "Eu também vou me esforçar ao máximo para aprender."
1002220-260 = "(Depois disso, continuei a aula de natação com a Hina até a noite avançar e a lua se inclinar no horizonte)"
