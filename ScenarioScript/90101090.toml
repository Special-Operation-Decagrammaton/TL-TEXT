[translation]
90101090-1 = "Episode 9: SRT-Style Interrogation"
90101090-2 = "In front of the Kanzaki Port warehouse"
90101090-7 = "Who's there?"
90101090-12 = "It's me. Your Capo."
90101090-13 = "Did you forget what I look like?"
90101090-14 = "Ah, Boss... my apologies!"
90101090-15 = "Yeah, yeah. So, anything happen this afternoon?"
90101090-16 = "No, ma'am! While we were guarding this place, not even a single crab came near!"
90101090-17 = "Well, I suppose that's to be expected. There aren't many fools brave enough to wander into the Carpaccio Family's territory—"
90101090-18 = "—though, I do feel like they've been increasing a bit lately."
90101090-20 = "Excuse me~ I'm here to deliver an order, but there was no one at the entrance."
90101090-21 = "It'll go bad if I leave it outside, so I came all the way here to find someone."
90101090-22 = "Is that true? You're saying the main gate guards let you through?"
90101090-23 = "Um... there wasn't anyone at the main gate, though?"
90101090-25 = "Tch... I guess the Carpaccio Family's reputation isn't what it used to be."
90101090-26 = "I can't afford to lose the next bid if I want to regain the Boss's trust...!"
90101090-27 = "Boss, is something bothering you?"
90101090-28 = "No, nothing."
90101090-29 = "More importantly, weren't you two on the afternoon patrol shift? It's already past 18:00, why are you still stuck at the warehouse?"
90101090-30 = "Ah, well, you see..."
90101090-31 = "The guys on the night patrol shift got food poisoning."
90101090-32 = "You weaklings. What did you eat to end up like that?"
90101090-33 = "Something like... 'Some-kind-of-Sushi'? They said they ordered it for delivery yesterday."
90101090-34 = "So now there's a hole in tonight's patrol, and we were just wondering what to do."
90101090-35 = "You idiots..."
90101090-36 = "Were you planning on waiting here all night if I hadn't shown up!?"
90101090-37 = "S-sorry!"
90101090-38 = "Go to the dorms and bring Sato and Suzuki. They're off-duty today, so they should be free."
90101090-39 = "Tell them the Capo will make up for their time off later. Tell them to just work hard today."
90101090-40 = "Y-yes...!"
90101090-46 = "...What are you dawdling for?"
90101090-47 = "Ah, we were just debating who should go."
90101090-48 = "The Boss always says, 'When guarding a sector, always work in pairs. Never leave your post.' So..."
90101090-49 = "Haa... you really are a handful."
90101090-50 = "So what? While one of you goes to call them, the other was planning to just stand here and chat with me?"
90101090-51 = "If you want to get them here as fast as possible, it's obviously faster if you both go!"
90101090-52 = "Or... are you actually worried about me?"
90101090-53 = "N-no!"
90101090-54 = "Just go and get them already!"
90101090-59 = "...Haa. To think I'm stuck patrolling this sector with such morons."
90101090-60 = "Um..."
90101090-61 = "If you were caught off guard, wouldn't even a Capo be in danger?"
90101090-62 = "Huh? What did you just—"
90101090-67 = "—Ugh."
90101090-72 = "I suppose your boss was worried about a situation exactly like this."
90101090-75 = "This is FOX3. I've secured a middle manager of the Carpaccio Family."
90101090-76 = "FOX4, copy. No signs of other members within a 50m radius."
90101090-77 = "FOX1, copy. Conceal the target and transport to Point Charlie. Watch out for witnesses."
