90101090-208 = "To believe such words—"
90101090-212 = "...Are you really not interested in this bid?"
90101090-217 = "Oh, the atmosphere really softens once Sensei steps in."
90101090-218 = "It's a classic, but the carrot and stick strategy is effective. I didn't expect Sensei to play the carrot."
90101090-219 = "I don't think Sensei meant to appease them with that intention, though..."
90101090-224 = "[ns] \"We just want to know why you spread the rumors.\""
90101090-225 = "Any adult should know why one would incite fear."
90101090-230 = "When people's emotions run high, their judgment dulls. Whether it's joy, sadness, or fear..."
90101090-231 = "If emotions come first, they can't think rationally. They're easily swayed by the words of others."
90101090-236 = "This Kivotos lacks fear."
