[translation]
90101090-1 = "Episódio 9; Método de Interrogatório da SRT"
90101090-2 = "Porto Kanezaki, Em frente ao armazém"
90101090-7 = "Quem tá aí?"
90101090-12 = "Sou eu, cambada. A Chefe de Filial de vocês."
90101090-13 = "Que foi, já esqueceram o meu rosto?"
90101090-14 = "Ah, patroa... Desculpa o vacilo!"
90101090-15 = "Tá, tá. E aí, rolou alguma coisa de tarde?"
90101090-16 = "Nadinha! Enquanto a gente tava de olho aqui, nem caranguejo se atreveu a chegar perto!"
90101090-17 = "Mas é claro. Que doido que teria a coragem de ficar saracoteando no território da Família Carpaccio?"
90101090-18 = "Pra falar a verdade, sinto que ultimamente tem aparecido um ou outro metido a besta."
90101090-20 = "Com licença~ Vim entregar um pedido, mas não tinha ninguém lá na frente."
90101090-21 = "Como podia estragar se eu deixasse lá fora, resolvi vir até aqui atrás de alguém."
90101090-22 = "Como é que é? A segurança do portão principal te deixou passar de boa?"
90101090-23 = "É que... não tinha ninguém lá no portão, sabe?"
90101090-25 = "Tsc... O respeito que a Família Carpaccio impunha já não é mais o mesmo."
90101090-26 = "Até pra reconquistar a confiança do chefe, não podemos perder esse próximo leilão de jeito nenhum...!"
90101090-27 = "Patroa, tá grilada com alguma coisa?"
90101090-28 = "Não, nada demais."
90101090-29 = "Mas mudando de assunto, vocês não tavam no turno de patrulha da tarde? Já passou das 18h, por que cês tão mofando aqui no armazém?"
90101090-30 = "Ah, é que..."
90101090-31 = "A galera que ia pegar o turno da noite teve uma dor de barriga das brabas."
90101090-32 = "Bando de fracos. Comeram o quê pra dar nisso?"
90101090-33 = "Acho que foi num tal de Sushi alguma coisa. Disseram que pediram pelo aplicativo ontem."
90101090-34 = "Aí deu ruim pro turno da noite, e a gente tava aqui quebrando a cabeça pra ver o que ia fazer."
90101090-35 = "Bando de idiotas..."
90101090-36 = "Iam ficar aí a noite toda esperando se eu não aparecesse?!"
90101090-37 = "D-Desculpa!"
90101090-38 = "Vai lá no alojamento e chama a Sato e a Suzuki. Hoje é a folga delas, então devem estar coçando."
90101090-39 = "Avisa que o Capo vai compensar a folga delas depois. E manda elas virem pra ralar um pouquinho hoje."
90101090-40 = "S-Sim...!"
90101090-46 = "...Tá moscando por quê?"
90101090-47 = "Ah, é que a gente tava decidindo qual das duas ia."
90101090-48 = "O chefe vive falando, não é? Na hora de vigiar o setor, sempre em dupla. E nunca abandone seu posto. Por isso..."
90101090-49 = "Aiai... Vocês dão trabalho, viu."
90101090-50 = "Aí uma vai chamar e a outra fica aqui batendo papo comigo, é isso?"
90101090-51 = "Se a ideia é trazer elas o mais rápido possível, óbvio que ir as duas é mais rápido!"
90101090-52 = "Ou... vocês tão querendo dar uma de preocupadas comigo, é?"
90101090-53 = "N-Não, de jeito nenhum!"
90101090-54 = "Então vão logo e tragam elas aqui!"
90101090-59 = "...Aiai. Quem diria que eu ia ter que aturar essas antas e ainda dar uma de vigia."
90101090-60 = "Com licença..."
90101090-61 = "Se rolasse um ataque surpresa, até a Capo ia ficar em apuros, não ia?"
90101090-62 = "Hã? O que você acabou de..."
90101090-67 = "...Guh."
90101090-72 = "É provável que seu chefe tava com medo que esse tipo de coisa acontecesse."
90101090-75 = "Aqui é a FOX3. Peguei a chefe de meio escalão da Família Carpaccio."
90101090-76 = "FOX4, entendido. Nenhum membro à vista num raio de 50m."
90101090-77 = "FOX1, entendido. Encubram a prisioneira e a levem pro Ponto Charlie. Cuidado com testemunhas."
90101090-78 = "Mas o que que tá pegando..."
90101090-86 = "Ugh... Ugh..."
90101090-95 = "...Recobrou a consciência?"
90101090-99 = "Onde... Onde eu tô. E quem são vocês...?"
90101090-100 = "Armazém abandonado nos arredores do Porto Kanezaki"
90101090-104 = "FOX1, a prisioneira acordou."
90101090-108 = "Fazer barulho do lado do ouvido dela deu certo."
90101090-109 = "Então, vamos começar o interrogatório."
90101090-114 = "Interrogatório...? Ha, logo de mim?"
90101090-115 = "Nunca vi esses uniformes antes, mas..."
90101090-116 = "Vocês são da Família Arancino?"
90101090-117 = "E trouxeram até um adulto, que audácia. Cês acham que o meu chefe vai deixar isso barato?"
90101090-118 = "[s] \"E-Err...\""
90101090-119 = "Sensei, não dê bola pro que ela diz."
90101090-120 = "São apenas ameaças desesperadas."
90101090-124 = "Cale-se. Não te demos permissão pra fazer perguntas."
90101090-125 = "Haha, tá se achando, hein."
90101090-126 = "Tudo bem, me mostre do que são capazes. Façam o que quiser, a minha boca continua fechada."
90101090-127 = "Antes virar isca de caranguejo do que trair a minha família"
90101090-134 = "FOX2. Esse gerador aqui já era?"
90101090-135 = "Tem outro? De preferência um que dê uns choques mais fortes."
90101090-136 = "E-Espera aí! O que cês vão fazer com isso?!"
90101090-137 = "O que a gente vai fazer? Eu acabei de falar, né. Um interrogatório."
90101090-138 = "Mas, desculpa, dá pra esperar só mais um pouquinho? Ainda tô terminando a fiação aqui."
90101090-139 = "Cês... Cês vão usar isso pra me torturar?!"
90101090-142 = "Uma atrocidade dessas... O Conselho Estudantil Geral não vai ficar de braços cruzados!"
90101090-143 = "V-Vocês já devem ter ouvido falar, não é? Se passarem dos limites aqui em D.U., as Forças Especiais da Presidente do Conselho Geral vão vir atrás de vocês...!"
90101090-149 = "Eles vão caçar vocês até o fim de Kivotos...! V-Vocês não têm medo da Presidente do Conselho Estudantil Geral?!"
90101090-150 = "[s] \"Ah, cê tá falando daquelas Forças Especiais...\""
90101090-151 = "Tá tranquilo. A gente já conversou com eles."
90101090-152 = "Uhum. Tivemos uma \"conversinha\" muito sincera com eles."
90101090-153 = "Vocês falaram direto com a Presidente do Conselho Estudantil Geral? Inventa outra"
90101090-154 = "Calma, calma. Não precisa ficar tão desesperada. Não vamos fazer nada que deixe marca."
90101090-155 = "A gente só trouxe esse gerador pra ligar o servidor. Não é pra usar nas pessoas."
90101090-156 = "Servidor...?"
90101090-160 = "Seu nome é Takahashi. Capo da Família Carpaccio, líder do time de segurança do Porto Kanezaki... Tô certa?"
90101090-161 = "Seus subordinados morrem de medo de você por você ser sangue frio, mas... Fiquei sabendo que o seu hobby é \"colecionar coisinhas fofas\""
90101090-162 = "V-Você... Como é que você sabe disso...!"
90101090-163 = "Pois é você mesma quem escreve tudo lá no seu perfil fake do \"Full Link\"."
90101090-164 = "É óbvio que você tava tentando esconder, mas..."
90101090-165 = "Foi só bater o olho na galera que você segue e na sua rotina do dia a dia, e pronto, A gente descobriu rapidinho."
90101090-166 = "Mês passado você até deu um pulo lá na loja pop-up da Corgi Town pra comprar a pelúcia de edição limitada da Uromi-chan..."
90101090-167 = "Que fofura. Você até tem um gatinho lindo."
90101090-168 = "Ugh..."
90101090-169 = "E aí, já pensou se eu vazar esse seu perfil pro mundo...? Como é que fica?"
90101090-170 = "[s1] \"Que plano maquiavélico...\"\n[s2] \"Que medo... Vocês dão calafrios...\""
90101090-173 = "P-Para com isso! Se vazarem isso pra geral, a minha imagem de durona vai pro ralo...!"
90101090-174 = "Então eu sugiro que você responda às nossas perguntas com sinceridade."
90101090-175 = "Por que você espalhou o boato do \"Caranguejo Monstruoso\"?"
90101090-176 = "Tsc... Já sacaram tudo isso, é."
90101090-177 = "Mas... Eu sou a queridinha do chefe. O terror que faz o sindicato comercial do porto tremer nas bases"
90101090-178 = "Parece que a ficha ainda não caiu, hein."
90101090-179 = "FOX1. Trouxe aquele negócio que você pediu."
90101090-180 = "É isso aqui?"
90101090-181 = "...Isso, bom trabalho."
90101090-182 = "FOX3, se as negociações forem pro brejo, você vai correndo na casa da Capo e dá isso pro gato dela."
90101090-183 = "O-O que que cê vai dar pra ele comer...?!"
90101090-184 = "Uma latinha de ração úmida sabor atum da \"Inarisha\". Você deve saber o quão doido os gatos ficam por isso... já que é dona de um, não é?"
90101090-185 = "Como você acha que um gato reagiria se um estranho oferecesse uma lata chique dessas pra ele?"
90101090-186 = "N-Não pode ser..."
90101090-187 = "Ele ia esquecer na hora da ração seca sem graça de todo dia. E do nada, ele ia começar a dar um amor pro estranho que nem ele dá pra você"
90101090-188 = "Ah. Ele não iria gostar muito de um dono que só dá comida barata pra ele, né?"
90101090-189 = "Como vocês conseguem ser tão perversas?!"
90101090-190 = "...Perversas?"
90101090-191 = "Acho que você tá confundindo as coisas."
90101090-192 = "A gente não é gente como a gente. Nós somos \"Raposas astutas e perversas\"."
90101090-193 = "Se você não colaborar, a gente é capaz de fazer coisas piores do que você imagina."
90101090-194 = "Argh...!"
90101090-195 = "[s3] \"Calma, gente, relaxa.\"\n[s4] \"Vamo deixar ela falar, vai?\""
90101090-198 = "Um adulto... Quem é você?"
90101090-199 = "Pelo fato de cês andarem com um adulto, já deu pra sacar que não são só uma ganguezinha qualquer. Vocês são de qual empresa?"
90101090-200 = "[s5] \"Eu sou da Schal... Sou só quem as protege mesmo.\"\n[s6] \"Foi mal por terem te trazido de um jeito meio brusco.\""
90101090-203 = "Ha, e quem é que vai acreditar num pedido de desculpas a essa altura do campeonato?"
90101090-204 = "Tá na cara que você tá tentando me comprar com papinho manso."
90101090-205 = "[s7] \"Eu dou a minha palavra.\"\n[s8] \"A gente tá pouco se lixando pra fatia da Família Carpaccio.\""
90101090-208 = "E cê acha que eu vou botar fé nessas palav..."
90101090-212 = "...É sério que cês não tão nem aí pro leilão?"
90101090-217 = "Eita, o clima até dá uma amenizada quando o Sensei abre a boca."
90101090-218 = "Estratégia do policial bom e mau à moda antiga. Quem diria que o Sensei seria o cara do policial bom."
90101090-219 = "Eu duvido que o Sensei tentou apaziguar os ânimos de propósito..."
90101090-224 = "[ns] \"A gente só quer saber por que você espalhou aquele boato.\""
90101090-225 = "Como um adulto, tu já deve manjar o porquê da gente botar terror na galera, né."
90101090-230 = "Quando os ânimos tão a flor da pele, as pessoas perdem a razão. Seja alegria, tristeza ou medo..."
90101090-231 = "A emoção toma as rédeas e não dá mais pra pensar direito. E é aí que fica fácil levar os outros no bico."
90101090-236 = "Falta medo nessa Kivotos de hoje."
90101090-238 = "[log=카야]Falta medo nessa Kivotos de hoje.[/log]"
90101090-240 = "...Se eu lhes der algo assustador o suficiente..."
90101090-244 = "...Se eu lhes der algo assustador o suficiente..."
90101090-245 = "Todo mundo vai se curvar diante de mim."
90101090-247 = "[log=카야]...Se eu lhes der algo assustador o suficiente, todo mundo vai se curvar diante de mim.[/log]"
90101090-249 = "E de todas elas, o medo é a mais fácil de controlar. Afinal, todo mundo se caga de medo daquilo que não conhece."
90101090-250 = "Tipo as tais Forças Especiais da Presidente do Conselho, sabe. Só o boato de que elas existem já basta pra fazer muito bandido pensar duas vezes antes de agir."
90101090-251 = "Se elas existem ou quantos elas já prenderam, não importa."
90101090-255 = "Uma academia construída a base do medo das pessoas..."
90101090-257 = "[log=미야코]Uma academia construída a base do medo das pessoas...[/log]"
90101090-261 = "Por acaso pode ser chamada de Academia Especial SRT?"
90101090-263 = "[log=미야코]Uma academia construída a base do medo das pessoas...[/log]"
90101090-265 = "........."
90101090-266 = "A gente só usou a mesma tática pra segurar as pontas."
90101090-267 = "\"Se não quer se ferrar, é melhor não botar o dedo nos nossos negócios\", sacou?"
90101090-268 = "Pra colocar medo, tinha outras opções."
90101090-269 = "Por que escolher logo a dos \"caranguejos\"?"
90101090-270 = "A gente só escolheu uma lenda que o pessoal do porto já tava acostumado, só isso."
90101090-271 = "\"Vai bater de frente com a Carpaccio e virar isca de caranguejo. Vai encarar o terror do desconhecido.\""
90101090-272 = "No fim das contas, a ideia é que ninguém saia ferido."
90101090-273 = "Uma pesquizada básica... Não, quem trabalha no porto sabe muito bem que um caranguejo normal não faz estrago nenhum."
90101090-274 = "Mas a gente tá lidando com a galera do povão em geral."
90101090-275 = "A imagem de garras afiadas e uma carapaça dura por si só já dá calafrios."
90101090-276 = "A Valkyrie não iria intervir só por causa de um mero boato."
90101090-277 = "A gente só usa um medo imaginário."
90101090-278 = "A gente não tá fazendo mal a ninguém, não acha? Afinal de contas, não teve desaparecimento nenhum."
90101090-285 = "...Ainda tem a cara de pau de soltar uma dessa."
90101090-289 = "Um monte de gente tá na neura, e o vencedor já tá definido antes mesmo do leilão começar."
90101090-290 = "Como você tem a coragem de me dizer que não tão fazendo mal a ninguém?!"
90101090-291 = "O-O que foi? Eu disse alguma coisa de errado, foi?"
90101090-294 = "[ns] \"Yukino, vai com calma.\""
90101090-295 = "Mas Sensei, eu――"
90101090-301 = "Hm? O que é isso?"
90101090-302 = "Ouviu esse estalido?"
90101090-303 = "É como se insetos... ou artrópodes estivessem rastejando por aqui..."
90101090-304 = "...Será que é uma infestação de baratas?"
90101090-305 = "Deus me livre! Credo! Barata não faz esse barulho, não!"
90101090-306 = "De onde tá vindo esse estrondo? Tão usando uma betoneira aqui perto?"
90101090-307 = "Não disseram nada sobre obra essa hora."
90101090-308 = "...E o som tá ficando cada vez mais alto."
90101090-309 = "Sensei, fica atrás de mim."
90101090-313 = "...Tá chegando."
90101090-314 = "[s] \"O-O que tá chegando...?\""
90101090-320 = "O que diabos é aquilo...?!"