90101090-240 = "……If I show them all the fear I can muster,"
90101090-244 = "……If I show them all the fear I can muster,"
90101090-245 = "everyone will start listening to what I say."
90101090-247 = "[log=카야]……If I show them all the fear I can muster, everyone will start listening to what I say.[/log]"
90101090-249 = "Among them, 'fear' is the easiest to control. People are naturally afraid of the unknown, after all."
90101090-250 = "Yes, just like the General Student Council's special forces. They might exist. Just that alone makes it hard for thugs to make a move, right?"
90101090-251 = "Whether they actually exist or how many they've caught isn't important."
