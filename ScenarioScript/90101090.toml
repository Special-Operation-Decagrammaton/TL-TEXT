[translation]#[Texto Final. - Filipe 05/07.]
90101090-1 = "Episódio 9; Interrogatório Estilo SRT"
90101090-2 = "Porto de Kanezaki - Em frente ao armazém"
90101090-7 = "Quem vem lá?"
90101090-12 = "Sou eu, ué. A chefe da filial de vocês."
90101090-13 = "Já esqueceram a minha cara?"
90101090-14 = "Ah, chefa…… mil perdões!"
90101090-15 = "Tá, tá. E aí, nada de estranho à tarde?"
90101090-16 = "Nada! Enquanto a gente guardava o posto, nem um caranguejo chegou perto!"
90101090-17 = "Bom, era de se esperar.#nAlguém sem noção o bastante pra rondar o território da Família Carpaccio――"
90101090-18 = "――pensando bem, ultimamente até que andou aparecendo gente assim."
90101090-20 = "Com licençaaa~ Vim trazer o delivery, mas não tinha ninguém na entrada."
90101090-21 = "Se deixar do lado de fora estraga, então vim até aqui procurar alguém."
90101090-22 = "É mesmo? E a guarda do portão te deixou passar?"
90101090-23 = "Er…… não tinha ninguém no portão, viu?"
90101090-25 = "Tsc…… a moral da Família Carpaccio já não é mais a de antes, é isso?"
90101090-26 = "Pra recuperar a confiança do chefe, a gente NÃO PODE perder a próxima licitação……!"
90101090-27 = "Chefa, alguma preocupação?"
90101090-28 = "Não, nenhuma."
90101090-29 = "Mais importante: vocês não eram do turno da tarde?#nJá passa das 18h; por que ainda tão colados no armazém?"
90101090-30 = "Ah, é que……"
90101090-31 = "O pessoal da ronda noturna passou mal da barriga."
90101090-32 = "Que bando de fracote. O que comeram pra ficar assim?"
90101090-33 = "Sushi alguma coisa? Acho.#nPediram no delivery ontem."
90101090-34 = "Aí abriu um buraco na ronda de hoje, e a gente tava aqui pensando no que fazer."
90101090-35 = "Seus cabeças-ocas……"
90101090-36 = "Se eu não aparecesse, iam esperar a noite inteira?!"
90101090-37 = "P-Perdão!"
90101090-38 = "Vão no dormitório e tragam o Satou e o Suzuki. Hoje eles tão de folga, devem estar à toa."
90101090-39 = "Digam que a Capo compensa a folga depois. Hoje é dia de dar um gás."
90101090-40 = "S-Sim, senhora……!"
90101090-46 = "……Que enrolação é essa agora?"
90101090-47 = "Ah, é que…… a gente tava decidindo quem vai."
90101090-48 = "O chefe sempre fala, né?#n\"Guardando área, é sempre em dupla. Não abandone o posto.\" Então……"
90101090-49 = "Haa…… vocês me dão um trabalho……"
90101090-50 = "Quer dizer então que……#nenquanto um vai chamar, o outro fica aqui de papo comigo, é?"
90101090-51 = "Se é pra trazer os dois o mais rápido possível, óbvio que indo os dois é mais rápido!"
90101090-52 = "Ou o quê…… agora deu pra se preocupar comigo, é?"
90101090-53 = "N-Não, senhora!"
90101090-54 = "Então vão logo, andem!"
90101090-59 = "……Haa. Ter que tocar a área carregando esses paspalhos."
90101090-60 = "Com licença……"
90101090-61 = "Levando um ataque surpresa, até uma Capo corre perigo…… não acha?"
90101090-62 = "Hã? O que foi que você――"
90101090-67 = "――Ghk."
90101090-72 = "O seu chefe devia estar preocupado justamente com uma situação dessas."
90101090-75 = "Aqui é FOX3. Gerente intermediária da Família Carpaccio capturada."
90101090-76 = "FOX4, entendido. Sem sinal de outros membros num raio de 50m."
90101090-77 = "FOX1, entendido. Levem o alvo escondido até o ponto Charlie. Cuidado com testemunhas."
90101090-78 = "Que droga é…… essa……"
90101090-86 = "Ugh…… uuugh……"
90101090-95 = "……Acordou?"
90101090-99 = "Onde…… eu tô? Quem são vocês……?"
90101090-100 = "Armazém abandonado nos limites do porto de Kanezaki"
90101090-104 = "FOX1, o alvo recobrou a consciência."
90101090-108 = "Valeu a pena ficar fazendo barulho do lado dela."
90101090-109 = "Pois bem. Iniciando o interrogatório."
90101090-114 = "Interrogatório……? Ha! Eu?"
90101090-115 = "Nunca vi esses uniformes de vocês――"
90101090-116 = "Trabalhinho da Família Arancino, é?"
90101090-117 = "Até adulto vocês trouxeram; quanta confiança.#nAcham que o meu chefe vai deixar barato?"
90101090-118 = "[s] \"E-Er……\""
90101090-119 = "Não precisa dar ouvidos."
90101090-120 = "É só uma ameaça de quem está encurralada."
90101090-124 = "Silêncio. Não autorizei perguntas."
90101090-125 = "Haha, olha a pose."
90101090-126 = "Beleza, mostrem o que sabem. Façam o que fizerem, minha boca não abre."
90101090-127 = "Antes virar comida de caranguejo do que trair a organização――"
90101090-134 = "FOX2. Esse gerador não tá morto, não?"
90101090-135 = "Não tem outro? Um mais parrudo, de preferência."
90101090-136 = "E-Espera! O que vocês vão fazer?!"
90101090-137 = "Como assim \"o quê\"? A gente já disse.#nInterrogatório."
90101090-138 = "Mas, foi mal, dá pra aguentar mais um pouquinho?#nA fiação ainda tá pela metade."
90101090-139 = "V-Vão me torturar com isso?!"
90101090-142 = "Uma crueldade dessas…… o Conselho Estudantil Geral não vai deixar passar!"
90101090-143 = "V-Vocês já devem ter ouvido falar, né?#nQuem passa dos limites em D.U. recebe a visita da força especial que responde direto à Presidente do Conselho……!"
90101090-149 = "Pode fugir que eles te caçam até o fim de Kivotos……!#nV-Vocês não têm medo da Presidente do Conselho?!"
90101090-150 = "[s] \"Ah, sobre essa força especial……\""
90101090-151 = "Sem problema. Já acertamos tudo com eles."
90101090-152 = "Uhum. Tivemos um \"diálogo\" suuuper sincero."
90101090-153 = "Vocês, falando direto com a Presidente do Conselho? Mentira tem limite――"
90101090-154 = "Calma, calma. Não precisa se preocupar tanto.#nNão vamos fazer nada que deixe cicatriz."
90101090-155 = "Esse gerador é só pra ligar o servidor.#nNão é pra usar em gente."
90101090-156 = "Servidor……?"
90101090-160 = "Seu nome é Takahashi.#nCapo da Família Carpaccio e líder da equipe que guarda o porto de Kanezaki…… certo?"
90101090-161 = "Os membros morrem de medo, dizem que você não tem sangue nem lágrimas……#nmas seu hobby secreto é \"colecionar coisas fofas\"――"
90101090-162 = "V-Você…… como sabe disso……!"
90101090-163 = "Você mesma escreveu tudo. Na sua conta secreta do \"FullLink\"."
90101090-164 = "Claro, você achava que estava escondida……"
90101090-165 = "Mas bastou cruzar as contas que você segue com a sua rotina#npra te identificar na hora."
90101090-166 = "Mês passado você foi comprar a pelúcia limitada da Uromi#nna loja pop-up de Corgi Town……"
90101090-167 = "Ah, e você tem um gatinho fofo, né."
90101090-168 = "Gh……"
90101090-169 = "E então…… se essa conta secreta vazar, o que acontece?"
90101090-170 = "[s1] \"Que ideia assustadora……!\"\n[s2] \"Medo…… medo demais……\""
90101090-173 = "P-Para! Se fizerem isso, a minha autoridade vai――!"
90101090-174 = "Então é melhor responder às perguntas com sinceridade."
90101090-175 = "Por que vocês espalharam o boato do \"caranguejo monstruoso\"?"
90101090-176 = "Tsc…… já chegaram até aí, é?"
90101090-177 = "Mas…… eu sou uma Capo que goza da confiança do chefe. O terror que faz tremer a associação dos comerciantes do――"
90101090-178 = "Parece que ainda não entendeu, né~"
90101090-179 = "FOX1. Trouxe aquilo que você pediu."
90101090-180 = "É isso, né?"
90101090-181 = "……Ótimo. Bom trabalho."
90101090-182 = "FOX3, se a negociação fracassar, vá direto à casa da Capo. E dê isto ao gato dela."
90101090-183 = "O-O que vão dar pra ele comer……?!"
90101090-184 = "Lata de ração úmida sabor atum, da \"Inari\".#nO quanto um gato ataca uma dessas…… quem ama gato sabe bem, né?"
90101090-185 = "Se um estranho oferecer uma lata premium…… o que você acha que o gato faz?"
90101090-186 = "N-Não pode ser……"
90101090-187 = "Nada a ver com a ração seca sem graça de sempre. Ele vai fazer manha como nunca fez e――"
90101090-188 = "Ah. Vai que ele cria uma distância da dona que só dá COMIDA RUIM?"
90101090-189 = "Como conseguem fazer uma crueldade dessas?!"
90101090-190 = "……Crueldade?"
90101090-191 = "Você entendeu errado."
90101090-192 = "Nós não somos gente. Somos \"raposas cruéis e rancorosas\"."
90101090-193 = "Se não aceitar o acordo, fazemos coisa pior do que você imagina, sem pestanejar."
90101090-194 = "Ghhh……!"
90101090-195 = "[s3] \"Calma, gente.\"\n[s4] \"Vamos deixar um espaço pra ela falar, que tal?\""
90101090-198 = "O adulto…… quem é você?"
90101090-199 = "Aliás, andar com um adulto…… vocês não são bandidinhos comuns.#nGente de empresa?"
90101090-200 = "[s5] \"Eu sou da Scha…… sou o responsável por essas meninas.\"\n[s6] \"Desculpa te trazer de um jeito tão bruto.\""
90101090-203 = "Ha! Quem vai acreditar em desculpa a essa altura?"
90101090-204 = "Pode tentar me enrolar: suas intenções tão na cara."
90101090-205 = "[s7] \"Juro pela minha honra.\"\n[s8] \"Não temos o menor interesse nos negócios da Família Carpaccio.\""
90101090-208 = "E eu vou confiar nessa――"
90101090-212 = "……É sério que vocês não têm interesse na licitação?"
90101090-217 = "Olha, quando o Sensei entra, o clima amolece na hora, né~"
90101090-218 = "Clássico, mas eficaz: cenoura e porrete. Só não esperava o Sensei no papel da cenoura."
90101090-219 = "Acho que não foi bem essa a intenção dele ao acalmar a situação……"
90101090-224 = "[ns] \"Só queremos saber o motivo de espalharem o boato.\""
90101090-225 = "O motivo de semear medo? Um adulto devia saber."
90101090-230 = "Com a emoção à flor da pele, o julgamento falha. Seja alegria, tristeza ou medo……"
90101090-231 = "Emoção na frente, razão de lado. Aí qualquer palavra dos outros te conduz."
90101090-236 = "Falta MEDO nesta Kivotos."
90101090-238 = "[log=카야]Falta MEDO nesta Kivotos.[/log]"
90101090-240 = "……Se eu mostrar todo o medo que existe,"
90101090-244 = "……Se eu mostrar todo o medo que existe,"
90101090-245 = "todos passarão a me obedecer."
90101090-247 = "[log=카야]……Se eu mostrar todo o medo que existe, todos passarão a me obedecer.[/log]"
90101090-249 = "E, delas todas, a mais fácil de controlar é o \"medo\".#nO desconhecido, por padrão, assusta."
90101090-250 = "É, tipo a tal força especial da Presidente do Conselho.#n\"Pode ser que exista.\" Só isso já faz o bandidinho pensar duas vezes, né?"
90101090-251 = "Se existe de verdade, quantos já prendeu…… nada disso importa."
90101090-255 = "Uma academia construída sobre o medo das pessoas……"
90101090-257 = "[log=미야코]Uma academia construída sobre o medo das pessoas……[/log]"
90101090-261 = "como poderia se tornar a Academia Especial SRT?"
90101090-263 = "[log=미야코]como poderia se tornar a Academia Especial SRT?[/log]"
90101090-265 = "………"
90101090-266 = "Só peguei emprestado um truque parecido pra manter a organização."
90101090-267 = "\"Se não quer passar por maus bocados, não mexa no nosso negócio.\" Só isso."
90101090-268 = "Pra plantar medo, havia outros meios."
90101090-269 = "Por que escolheram justo o boato do \"caranguejo\"?"
90101090-270 = "Só achei uma história de terror familiar pra quem trabalha no porto e usei."
90101090-271 = "\"Desafiou os Carpaccio, virou comida de caranguejo. Vai encarar o medo do desconhecido.\""
90101090-272 = "Mas o mais importante: ninguém sai ferido."
90101090-273 = "Basta pesquisar um pouco―― não, quem trabalha no porto sabe de cara.#nUm caranguejo de TAMANHO NORMAL não tem força nenhuma."
90101090-274 = "Mas o nosso público é a massa de gente comum."
90101090-275 = "Pinça afiada, casca dura: só a imagem já evoca o medo."
90101090-276 = "E, com mero boato, a Valkyrie não se move."
90101090-277 = "A gente só usa um medo sem forma."
90101090-278 = "Qual é o problema? No fim, ninguém desapareceu de verdade."
90101090-285 = "……Quanta cara de pau."
90101090-289 = "Tanta gente com medo, e a licitação decidida antes mesmo de começar."
90101090-290 = "Como você pode cravar que \"não tem problema\"?!"
90101090-291 = "Q-Que deu nela? Pisei em alguma mina?"
90101090-294 = "[ns] \"Yukino, calma.\""
90101090-295 = "Mas eu――"
90101090-301 = "Hm? Que barulho é esse?"
90101090-302 = "Um \"clac-clac\"?"
90101090-303 = "Tipo inseto…… artrópode se mexendo……"
90101090-304 = "……Será que é infestação de barata?"
90101090-305 = "Não fala essas coisas!#nBarata não faz um barulho desses, tá?!"
90101090-306 = "Aliás, que tremedeira é essa? Tem máquina pesada operando por perto?"
90101090-307 = "Não ouvi falar de obra nenhuma a essa hora."
90101090-308 = "……E o som tá ficando cada vez mais alto."
90101090-309 = "Sensei, para trás."
90101090-313 = "……Aí vem."
90101090-314 = "[s] \"O-O que vem……?\""
90101090-320 = "Que diabo é AQUILO――?!"
