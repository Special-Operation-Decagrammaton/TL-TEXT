[translation]
2001305-1 = "メンテナンス"
2001305-2 = "中央区・データセンター"
2001305-8 = "ケーブルの接続状態は問題無し、ハードウェアの容量も十分……"
2001305-9 = "セキュリティ設定も異常は無し。カーネルをアップデートして、DBのバックアップを……"
2001305-10 = "[s] \"……。\""
2001305-11 = "……もしかして先生、ハッカーなんだし「色とりどりのランプが点滅する中で、モニターに大量のウィンドウが出てキーボードを叩き続ける」みたいな風景を期待してた？"
2001305-12 = "まあ実際リアルタイムで応対する緊急事態だったら、そういうのも無いわけじゃないけど……。"
2001305-13 = "今日はほぼ定期メンテナンスの一環だし、基本的にはルーティン通りの作業だから。"
2001305-14 = "[s] \"でもどうして、こんな深夜に？\""
2001305-15 = "それはまあ、メンテナンス中はサーバーが使えないし。もちろんサービスの種類によるけど、接続数が少ない深夜の時間帯を活用する方が望ましいタイプだった。"
2001305-16 = "あとこういう夜中には付近の回線を使う人が少ないから、データの処理が遅延しないってメリットもある。"
2001305-17 = "……まあもちろん深夜だからって、全部が全部良いってわけじゃない。この時間帯にこそサービスを利用したいって思う人もいるだろうし。"
2001305-18 = "どうしたところで全員を満足はさせられないわけだから、最終的には自分が信じるように。だったら、より静かな時が良いかなって。"
2001305-19 = "[s] \"大変だね……。\""
2001305-20 = "ま、そうでも無いよ。これが私の仕事だから。"
2001305-24 = "……こういうセキュリティ面の仕事は、警察とか消防と同じ。やることは少ない方が良い。"
2001305-25 = "どれだけ有能なサーバー管理者だとしても、「問題無い」っていう状態が最高の仕事。"
2001305-26 = "地味だし、大変なこともあるけれど、そういうのにはそういうのなりの良さがある。"
2001305-31 = "[ns] \"ふぁ……。\""
2001305-32 = "ふふっ、そろそろ良い時間だね。"
2001305-33 = "バックアップ作業もそろそろ終わりそうだし、これが終わったらコーヒーでも飲みに行かない？"
2001305-34 = "[s] \"それは賛成だけど、この時間にやってるお店あるかな……？\""
2001305-35 = "大丈夫。私がこういう徹夜作業のたびに、良く行く場所があるから。"
2001305-36 = "前にも話した通り、私が奢るよ。"
2001305-37 = "さて、そろそろ終わると思うけど……。"
2001305-42 = "サーバーのメンテナンスを終えて、チヒロと一緒に外へ出て、付近の路地へと入る。"
2001305-47 = "[ns] \"こんなところに……？\""
2001305-48 = "うん、もうすぐそこ。"
2001305-52 = "ほら、先生。こっち。"
2001305-58 = "[wa:200]― ふふっ、[wa:1500]やっぱり[wa:1200]ひと仕事[wa:500]終えた後のコーヒーは[wa:1600]格別だね。"
2001305-61 = "[wa:200]― ……ん？[wa:2000]カフェとかだと[wa:400]思った？"
2001305-64 = "― ごめんね。[wa:1400]こんな時間だから[wa:800]もう[wa:300]どこもやってないし、"
2001305-66 = "― ここぐらいしか[wa:800]飲めるところが[wa:400]無くってさ。"
2001305-69 = "[wa:900]― 私、[wa:1400]いつも[wa:400]徹夜明けはここで、"
2001305-71 = "― コーヒーを[wa:350]飲むことにしてて。"
2001305-74 = "[wa:900]― この自販機は[wa:1200]こんな時間でも、"
2001305-76 = "― 誰にも[wa:400]見られてなくても、"
2001305-79 = "― 淡々と[wa:1300]きちんと[wa:600]自分の役目を[wa:600]果たしてる。[wa:100] "
2001305-82 = "― 何だか[wa:300]そういうところが、"
2001305-84 = "[wa:450]― 自分の役目に[wa:1300]重なってるような[wa:600]気がして……。"
2001305-87 = "[wa:1000]― ……先生も、"
2001305-89 = "― この[wa:400]コーヒーの味が[wa:700]分かってくれたら、[wa:1500]嬉しいな。"
2001305-92 = "ああ、もうこんな時間か……。"
2001305-93 = "先生と話してたら、いつの間に夜が明けてたね。"
2001305-94 = "もうこの時間帯だと、ミレニアムの寮に戻るのもあれだし……。"
2001305-95 = "シャーレの仮眠室、借りても良い？"
2001305-97 = "その後一緒にシャーレに戻って、ふたりしてすぐ眠りに落ちた。"
