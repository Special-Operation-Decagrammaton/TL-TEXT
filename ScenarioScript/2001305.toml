[translation]
2001305-1 = "Manutenção"
2001305-2 = "Distrito Central - Centro de Dados"
2001305-8 = "A conexão dos cabos está normal, a capacidade do hardware também é suficiente..."
2001305-9 = "As configurações de segurança não apresentam anomalias. Vou atualizar o kernel e fazer o backup do banco de dados..."
2001305-10 = "[s] \"……。\""
2001305-11 = "……Por acaso você esperava algo como \"luzes piscando por toda parte, várias janelas abertas no monitor e eu digitando sem parar no teclado\", como um hacker de filme, Sensei?"
2001305-12 = "Bem, se fosse uma emergência real exigindo resposta imediata, até que não seria impossível ver algo assim..."
2001305-13 = "Mas hoje é apenas parte da manutenção periódica, então é basicamente um trabalho de rotina."
2001305-14 = "[s] \"Mas por que fazer isso no meio da madrugada?\""
2001305-15 = "Bom, o servidor fica indisponível durante a manutenção. Dependendo do tipo de serviço, é preferível aproveitar o horário da madrugada, quando o número de conexões é menor."
2001305-16 = "Além disso, como pouca gente usa a rede nesse horário, o processamento de dados não sofre atrasos. Essa é outra vantagem."
2001305-17 = "……Claro, nem tudo são flores só porque é madrugada. Provavelmente tem gente que quer usar o serviço justamente nesse horário."
2001305-18 = "Como não dá para agradar todo mundo, no fim das contas, eu sigo o que acredito ser o melhor. E, nesse caso, prefiro um momento mais tranquilo."
2001305-19 = "[s] \"Deve ser cansativo...\""
2001305-20 = "Ah, nem tanto. É o meu trabalho, afinal."
2001305-24 = "……Trabalhar com segurança é como ser da polícia ou dos bombeiros. O ideal é que haja o mínimo de problemas possível."
2001305-25 = "Não importa o quão competente seja um administrador de servidor, o estado de \"nenhum problema\" é o melhor resultado possível."
2001305-26 = "É um trabalho discreto e, às vezes, exaustivo, mas esse tipo de coisa tem o seu valor."
2001305-31 = "[ns] \"Ah...\""
2001305-32 = "Fufu, já está na hora."
2001305-33 = "O backup está quase terminando. Que tal irmos tomar um café quando eu acabar?"
2001305-34 = "[s] \"Eu topo, mas será que tem algum lugar aberto a essa hora...?\""
2001305-35 = "Não se preocupe. Eu conheço um lugar que costumo frequentar sempre que faço esses plantões."
2001305-36 = "Como eu disse antes, eu pago."
2001305-37 = "Bem, acho que já está terminando..."
2001305-42 = "Após terminar a manutenção do servidor, saio com Chihiro e entramos em um beco próximo."
2001305-47 = "[ns] \"Em um lugar desses...?\""
2001305-48 = "Sim, é logo ali."
2001305-52 = "Venha, Sensei. Por aqui."
2001305-58 = "[wa:200]— Fufu, [wa:1500]o café depois de [wa:1200]terminar um trabalho [wa:500]é realmente [wa:1600]especial."
2001305-61 = "[wa:200]— ...Hm? [wa:2000]Você achou que [wa:400]seria uma cafeteria?"
2001305-64 = "— Desculpe. [wa:1400]A essa hora [wa:800]já não tem [wa:300]nada aberto,"
2001305-66 = "— e este é o único lugar [wa:800]onde podemos [wa:400]beber algo."
2001305-69 = "[wa:900]— Eu [wa:1400]sempre [wa:400]venho aqui depois de virar a noite,"
2001305-71 = "— para tomar um café."
2001305-74 = "[wa:900]— Esta máquina de venda automática [wa:1200]mesmo a essa hora,"
2001305-76 = "— mesmo sem ninguém [wa:400]olhando,"
2001305-79 = "— continua cumprindo [wa:1300]o seu papel [wa:600]com calma e [wa:600]eficiência.[wa:100] "
2001305-82 = "— De certa forma, [wa:300]acho que isso,"
2001305-84 = "[wa:450]— se assemelha [wa:1300]ao meu próprio [wa:600]papel..."
2001305-87 = "[wa:1000]— ...Sensei,"
2001305-89 = "— eu ficaria feliz [wa:400]se você [wa:700]pudesse apreciar [wa:1500]o sabor deste café."
2001305-92 = "Ah, já está nesse horário..."
2001305-93 = "Conversando com você, nem percebi que o dia amanheceu."
2001305-94 = "A essa altura, voltar para o dormitório de Millennium seria complicado..."
2001305-95 = "Poderia me emprestar o quarto de descanso do Schale?"
2001305-97 = "Depois disso, voltamos juntos para o Schale e acabamos adormecendo logo em seguida."
