[translation]
1300503-1 = "事務所の掃除"
1300503-2 = "便利屋68・事務所"
1300503-11 = "ん……？先生？"
1300503-12 = "思ったより早かったね。"
1300503-13 = "こんなに早く来るって知ってたら、事務所の掃除はもっと遅い時間に始めれば良かったかな……。"
1300503-14 = "[s] \"他のメンバーは？\""
1300503-15 = "他の社員たちはまだ出勤前。#n昨日深夜遅くまで依頼をこなしてたから。"
1300503-16 = "……私？私は大丈夫。#n朝弱いタイプじゃないから。"
1300503-17 = "だからこうやって、一人で早く出勤した日はたまに、事務所の整理をしたりしてる。"
1300503-18 = "みんなでやった方がもっと早いんじゃないか、って？"
1300503-19 = "それは、もちろんそうだけど……。"
1300503-20 = "わざわざ掃除しようって言うのもなんか生意気だし……#n何より、めんどくさい。"
1300503-21 = "アルとかハルカも、散らかした物くらいはたまに片付けてくれてるみたいだし、掃除する物も、大して多くないから。"
1300503-22 = "めんどくさいことは人の手を借りずに、一人でやっちゃった方が楽。"
1300503-23 = "[s] \"掃除、手伝うよ。\""
1300503-24 = "……先生、もしかして話聞いてなかった？"
1300503-25 = "それに、これは便利屋のことだから、先生とは関係ない。"
1300503-26 = "それとも、私にいくつも借りを作らせて困らせようとしてる？"
1300503-27 = "やりたくてやるだけだから気にしないで、って？"
1300503-28 = "でも……。"
1300503-29 = "いや、こんなことで口喧嘩するのもおかしいか。"
1300503-30 = "他人が絡むことには足を踏み入れないけど、人から絡んできた時には避けない主義だから。"
1300503-31 = "ここ、便利屋の仕事と同じでね、ふふ。"
1300503-34 = "それじゃ、重い荷物を運ぶのは先生に任せるね。"
1300503-36 = "その後、カヨコと事務所をキレイに掃除した。"
