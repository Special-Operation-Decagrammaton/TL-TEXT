[translation]
1300503-1 = "Limpeza do escritório"
1300503-2 = "Escritório da Problem Solver 68"
1300503-11 = "Hm...? Sensei?"
1300503-12 = "Você chegou mais cedo do que eu esperava."
1300503-13 = "Se eu soubesse que você viria tão cedo, talvez devesse ter deixado para limpar o escritório mais tarde..."
1300503-14 = "[s] \"Onde estão os outros membros?\""
1300503-15 = "Os outros funcionários ainda não chegaram. #nEles terminaram os trabalhos ontem tarde da noite."
1300503-16 = "...Eu? Eu estou bem. #nNão sou do tipo que tem dificuldade de acordar cedo."
1300503-17 = "É por isso que, nos dias em que chego cedo sozinha, às vezes aproveito para organizar o escritório."
1300503-18 = "Você acha que seria mais rápido se fizéssemos todos juntos?"
1300503-19 = "Bem, é claro que seria, mas..."
1300503-20 = "Pareceria um pouco mandona se eu pedisse para todo mundo limpar... #ne, acima de tudo, é trabalhoso."
1300503-21 = "A Aru e a Haruka parecem arrumar as coisas que bagunçam de vez em quando, então não tem tanta coisa para limpar assim."
1300503-22 = "É mais fácil fazer as coisas chatas sozinha do que pedir ajuda para os outros."
1300503-23 = "[s] \"Vou te ajudar com a limpeza.\""
1300503-24 = "...Sensei, por acaso você não estava me ouvindo?"
1300503-25 = "Além disso, isso é um assunto da Problem Solver, não tem nada a ver com você."
1300503-26 = "Ou você está tentando me deixar em apuros me fazendo ficar te devendo favores?"
1300503-27 = "Diz que não é para eu me preocupar porque você quer fazer isso por vontade própria?"
1300503-28 = "Mas..."
1300503-29 = "Não, seria estranho discutir por causa disso."
1300503-30 = "Eu não costumo me meter nos assuntos dos outros, mas quando alguém se mete nos meus, eu não fujo."
1300503-31 = "É igual ao trabalho da Problem Solver, sabe? Fufu."
1300503-34 = "Sendo assim, vou deixar que você carregue as caixas pesadas, Sensei."
1300503-36 = "Depois disso, limpei o escritório com a Kayoko."
