[translation]
10048070-1 = "Episódio 7; Entre o roubo e o comércio"
10048070-2 = "Um certo café"
10048070-3 = "O sol já está se pondo."
10048070-4 = "Quando o dia amanhecer, a Exposição Especial Veronica será realizada."
10048070-5 = "Consegue imaginar a cena no local da exposição?"
10048070-6 = "Bem..."
10048070-7 = "Os espectadores passarão pelas obras como se estivessem em uma esteira rolante."
10048070-8 = "E então, se reunirão diante das obras ditas famosas, #nbalançando a cabeça como se tivessem sentido algo."
10048070-9 = "Eles não sentiram algo de verdade?"
10048070-10 = "Não, ninguém entende nada... #nO estilo do que é autêntico. A mediocridade criada por falsificações."
10048070-11 = "Eles não estão olhando para as pinturas."
10048070-12 = "Eles só encontram valor na fama ou no preço de mercado da obra."
10048070-13 = "Eles não passam de meros espectadores das informações que cercam a pintura."
10048070-14 = "Às vezes, eu me pergunto... #nSe chegará o dia em que todos perceberão o valor da arte em si—"
10048070-15 = "—Será que esse dia realmente chegará?"
10048070-16 = "...Eu, sinceramente, não consigo acreditar."
10048070-17 = "O que você acha?"
10048070-22 = "Com licença, já está quase na hora de fecharmos..."
10048070-23 = "...Ah!"
10048070-24 = "P-perdão!"
10048070-29 = "Depósito de Wildhunt"
10048070-30 = "Ufa... finalmente amanhã, hein."
10048070-31 = "Já fiz a segurança deste lugar várias vezes, mas desta vez está especialmente rigorosa."
10048070-32 = "..."
10048070-33 = "Já é difícil o suficiente com a segurança de sempre, e agora esse tal de 'Ladrão da Caridade'..."
10048070-34 = "Bem, se nada acontecer hoje, ele não deve aparecer."
10048070-35 = "Por mais que seja um ladrão famoso, não tem como atravessar um esquema de segurança tão rígido—"
10048070-36 = "A propósito."
10048070-37 = "Hm?"
10048070-38 = "O que exatamente estamos protegendo?"
10048070-39 = "Hm...? #nDeveríamos estar protegendo as obras dos ladrões."
10048070-40 = "Não seria... protegendo as obras dos espectadores?"
10048070-41 = "Do que você está falando? A exposição começa amanhã, não é? #nQualquer um pode apreciar as obras livremente."
10048070-42 = "Quem decide quais obras serão exibidas é a Fundação Veronica."
10048070-43 = "Apenas o que a fundação escolhe é exibido. Os espectadores não podem escolher o que ver."
10048070-44 = "A ideia de que todos podem desfrutar da arte... não passa de uma ilusão."
10048070-45 = "...Ouvi dizer que todas as obras do depósito serão exibidas nesta exposição."
10048070-46 = "Sim. Mas isso é apenas 10% do que a Fundação Veronica possui."
10048070-47 = "As outras obras de arte continuam trancadas nos armazéns da fundação."
10048070-48 = "...Sem que ninguém possa ver sua beleza."
10048070-49 = "Será que isso está realmente certo?"
10048070-50 = "Isso é... já que a fundação é a proprietária, não há nada a ser feito, certo?"
10048070-51 = "Acho que é liberdade do dono decidir o que mostrar."
10048070-52 = "Quem sabe? #nPor exemplo, se alguém comprasse todos os lagos e rios do mundo e declarasse que vai interromper o fornecimento de água potável... você aceitaria isso?"
10048070-53 = "Isso é... acho que são situações diferentes."
10048070-55 = "Não, é a mesma coisa."
10048070-56 = "A arte é... a beleza é. #nDeve ser compartilhada com todos."
10048070-64 = "O-o que é isso...!?"
10048070-69 = "BUM!!"
10048070-70 = "Ei, uma cortina de fumaça...!?"
10048070-71 = "N-não pode ser, a Ladra da Benevolência...!?"
10048070-72 = "Vamos nos dividir, eu vou para o portão dos fundos!"
10048070-73 = "S-sim! Eu vou para o portão principal!"
10048070-79 = "Sim, a Ladra da Benevolência――"
10048070-84 = "――eu cheguei."
10048070-86 = "Wild Hunt - Terreno Baldio"
10048070-87 = "Ladra da Benevolência, apareceu! Esquadrões 1, 2 e 3, reúnam-se na área A!"
10048070-88 = "Sigam o treinamento! A vantagem do terreno é nossa!"
10048070-92 = "Sim! Indo para aí agora――"
10048070-99 = "Hã!?"
10048070-100 = "O que houve!?"
10048070-101 = "A equipe de vanguarda caiu em um buraco!"
10048070-102 = "Um buraco? Por que teria um lá!?"
10048070-103 = "P-provavelmente alguém armou uma armadilha...!"
10048070-104 = "Armadilha? Nós não armamos nada――"
10048070-110 = "Cortina de fumaça!?"
10048070-111 = "Por que tem cortina de fumaça desde agora...!?"
10048070-112 = "O quê!? O que é isso...!!"
10048070-113 = "O que diabos está acontecendo...!?"
10048070-117 = "Uuu... me desculpem. #nPessoal da Equipe de Monitoramento, Hiromi-chan..."
10048070-118 = "Mas, vocês não devem se machucar..."
10048070-119 = "E aí? Miyo-chan, a armadilha funcionou direitinho?"
10048070-120 = "S-sim! Obrigada, Ricchan."
10048070-121 = "Ei, não vai me agradecer também?"
10048070-122 = "Vou precisar que a Fuyu me acompanhe por mais um pouco. #nNúmero 3, número 5, ação."
10048070-123 = "Recebido. Número 3, número 5, ativado."
10048070-127 = "Outra cortina de fumaça!?"
10048070-128 = "Socorro! Estamos aqui, dentro do buraco!"
10048070-129 = "Onde vocês estão!? Não consigo ver nada!"
10048070-131 = "Cuidado, quem não caiu na armadilha está indo para aí."
10048070-132 = "Entendido. Fiquem atentos à encosta nordeste onde a Fuyu está, é um ponto fácil de atacar."
10048070-133 = "Confirmado. Ah, as forças inimigas estão se movendo para o lado oeste do depósito."
10048070-134 = "Número 12, ação."
10048070-135 = "Entendido. Número 12, ativado."
10048070-139 = "...Limpo. Vou me juntar a vocês aí."
10048070-140 = "Recebido."
10048070-144 = "Ufa..."
10048070-145 = "...Ugh."
10048070-148 = "Cheguei."
10048070-149 = "...Ei, você está bem? Está com uma cara péssima."
10048070-150 = "...Independentemente do motivo, estamos ajudando em um crime."
10048070-151 = "Miyo, lembre-se disso justamente nos momentos difíceis."
10048070-152 = "Lembrar do quê?"
10048070-153 = "Dos negócios passados que fracassaram por causa da Equipe de Monitoramento!"
10048070-154 = "Não era melhor nem ter aceitado o pedido, não é!?"
10048070-155 = "Fufu... bem, não diga isso."
10048070-156 = "Se tivermos sucesso desta vez, além de corrigir a falsificação para a original... #nserá possível passar a perna nessa criminosa chamada Ladra da Benevolência."
10048070-157 = "A história que a Miyo escreveu terá um final feliz, não é?"
10048070-158 = "Final... feliz..."
10048070-162 = "É verdade... além disso, não posso desistir agora que chegamos tão longe."
10048070-163 = "……precisamos chegar até o fim."
10048070-164 = "E então, Fuyu, quantas armadilhas ainda restam?"
10048070-165 = "Já usamos todas."
10048070-166 = "Entendo... fizemos tudo o que podíamos."
10048070-167 = "Agora, só resta esperar que a Ladra da Benevolência consiga roubar o que precisa..."
10048070-168 = "Se ela falhar depois de toda essa ajuda, talvez não tenha jeito para ser uma ladra, não é?"
10048070-169 = "……É, você tem razão."
10048070-170 = "Sim... Fuyu, você trouxe aquela obra original, certo?"
10048070-171 = "Claro. Está guardada em segurança na minha bolsa."
10048070-172 = "Então, vamos nos retirar por aqui."
10048070-173 = "O sol já está se pondo, afinal..."
10048070-175 = "Sim — é um bom momento para baixar as cortinas do palco desta noite."
10048070-179 = "……!"
10048070-180 = "Quando o véu da noite cai, a expressão falsa se dissolve na escuridão — e apenas a voz da verdade ecoa."
10048070-186 = "Boa noite. Senhoritas que não conheço."
10048070-187 = "É um prazer conhecê-las — eu me chamo 'Ladra da Benevolência'."
10048070-188 = "Poderiam... conversar um pouco comigo?"
