[translation]
10048070-1 = "第7話;盗みと貿易の狭間"
10048070-2 = "とあるカフェ"
10048070-3 = "もう日が暮れます。"
10048070-4 = "夜が明ければ、ベロニカ特別展が開催される。"
10048070-5 = "展示場の光景が、想像できますか？"
10048070-6 = "さあ……。"
10048070-7 = "観客はまるでベルトコンベアに載せられたかのように、作品の前を通り過ぎていくでしょう。"
10048070-8 = "そして有名と言われる作品の前に集まり、#nさも何かを感じ取ったかのように頷いていく。"
10048070-9 = "本当に何かを感じ取ったのでは？"
10048070-10 = "いいえ、誰も何もわかっていない……。#n本物の風格を。偽物が作り出す粗悪さを。"
10048070-11 = "彼らは絵なんて見ていませんよ。"
10048070-12 = "絵の知名度や取引価格にのみ、価値を見出している。"
10048070-13 = "彼らはただ、絵を取り巻く情報を鑑賞しているだけに過ぎません。"
10048070-14 = "私は、疑問を抱くことがあります……。#nあらゆる者が芸術そのものの価値に気が付く――"
10048070-15 = "――そんな日は、果たして訪れるのでしょうか？"
10048070-16 = "……私には、到底信じられません。"
10048070-17 = "あなたは、どう思いますか？"
10048070-22 = "あのー、そろそろ閉店のお時間なので……。"
10048070-23 = "……あっ！"
10048070-24 = "し、失礼しました！"
10048070-29 = "ワイルドハントの収蔵庫"
10048070-30 = "ふぅ……いよいよ明日、か。"
10048070-31 = "今までもここの警備は何度かしたことがあるが、今回は特に厳重だな。"
10048070-32 = "……。"
10048070-33 = "いつもの警備でさえ手一杯なのに、慈愛の怪盗だなんて……。"
10048070-34 = "まあ、今日大丈夫ならもう来ないでしょう。"
10048070-35 = "いくら怪盗と言っても、こんな厳戒態勢を突破できるわけ――"
10048070-36 = "ところで。"
10048070-37 = "ん？"
10048070-38 = "私たちは、何を守っているのでしょうか？"
10048070-39 = "ん……？#n泥棒から作品を守っているはずですが。"
10048070-40 = "観客から作品を守っている……のではなく？"
10048070-41 = "何言っているんですか。明日から展示ですよ？#n作品なんて、誰でも自由に鑑賞できます。"
10048070-42 = "公開する作品を決めているのは、ベロニカ財団です。"
10048070-43 = "財団が選んだものが飾られるだけ。観客は何を見るかなんて選べません。"
10048070-44 = "誰もがアートを楽しめるなど――錯覚でしかない。"
10048070-45 = "……今回の展示会は、収蔵庫の作品全部が展示されると聞いていますが。"
10048070-46 = "ええ。ですがそれは、ベロニカ財団が保有する内の、ほんの1割。"
10048070-47 = "他の芸術品は、今もなお財団の倉庫に閉じ込められている。"
10048070-48 = "……その美しさを、誰にも見せることなく。"
10048070-49 = "果たして、本当にそれで良いのでしょうか。"
10048070-50 = "それは……財団が持ち主なのですから、仕方ないのでは？"
10048070-51 = "どれを見せるかは所有者の自由かと。"
10048070-52 = "どうでしょう。#nたとえば世界中の湖や川を買い上げた方が、飲み水の供給を止めると宣言したとして……貴女はそれを受け入れられますか？"
10048070-53 = "それは……流石に別の話だと思いますが。"
10048070-55 = "いいえ、同じことですよ。"
10048070-56 = "芸術は――美しさは。#nあらゆる者に共有されるべきなのです。"
10048070-64 = "なっ、なんだ……！？"
10048070-69 = "ボン！！"
10048070-70 = "え、煙幕っ……！？"
10048070-71 = "ま、まさか慈愛の怪盗が……！？"
10048070-72 = "二手に分かれましょう、私は裏門へ！"
10048070-73 = "は、はい！こっちは正門に向かいます！"
10048070-79 = "ええ、慈愛の怪盗――"
10048070-84 = "――[ruby=わたくし]私[/ruby]が、参りましたよ。"
10048070-86 = "ワイルドハント・空き地"
10048070-87 = "慈愛の怪盗、出現！1・2・3分隊、A区域にて集合！"
10048070-88 = "訓練通りに動け！地の利は我々にある！"
10048070-92 = "はっ！すぐにそちらへ――"
10048070-99 = "えっ！？"
10048070-100 = "どうした！？"
10048070-101 = "先遣隊が穴に落ちました！"
10048070-102 = "穴？なぜそんなところに！？"
10048070-103 = "お、おそらく誰かが罠を……！"
10048070-104 = "罠？私たちは何も仕掛けていな――"
10048070-110 = "煙幕！？"
10048070-111 = "なんでさっきから煙幕が……！"
10048070-112 = "わっ！？なんだこれはっ……！！"
10048070-113 = "一体何が起きている……！？"
10048070-117 = "うぅぅぅ……ごめんなさい。#n寮監隊の皆さん、ヒロミちゃん……。"
10048070-118 = "でも、怪我はしないはずですから……。"
10048070-119 = "どう？ミヨちゃん、ちゃんと罠発動してる？"
10048070-120 = "う、うん！ありがとね、リッちゃん。"
10048070-121 = "ねえ、私にお礼はないの？"
10048070-122 = "フユにはもう少し付き合ってもらいますけど。#n3番、5番、アクション。"
10048070-123 = "ラジャー。3番、5番、オン。"
10048070-127 = "また煙幕っ！？"
10048070-128 = "助けてください！こっちにいます、穴の中！"
10048070-129 = "どこですか！？何も見えません！"
10048070-131 = "気をつけて、罠にかかってないヤツがそっちに向かったよ。"
10048070-132 = "了解。フユのいる北東の斜面も、攻められやすいので注意してください。"
10048070-133 = "確認しました。あっ、収蔵庫の西側に兵力が移動しています。"
10048070-134 = "12番、アクション。"
10048070-135 = "了解。12番、ON。"
10048070-139 = "……クリア。そっちに合流するね。"
10048070-140 = "ラジャー。"
10048070-144 = "ふぅ……。"
10048070-145 = "……うぅっ。"
10048070-148 = "来ましたよっと。"
10048070-149 = "……って大丈夫？顔色悪いよ。"
10048070-150 = "……理由はどうあれ、犯罪の手伝いをしていますから。"
10048070-151 = "ミヨ、そんな苦しい時こそ思い出して。"
10048070-152 = "なにを？"
10048070-153 = "寮監隊のせいでことごとく失敗してきた、過去のビジネスを！"
10048070-154 = "依頼を受けなきゃよかった話ですよね！？"
10048070-155 = "ふふっ……まあ、そう言わないでさ。"
10048070-156 = "今回の件を成功させれば、贋作を真作に正すのはもちろん……#n慈愛の怪盗という犯罪者に一杯食わせることもできる。"
10048070-157 = "ミヨが書いた話が、ハッピーエンドを迎えられるんだよ？"
10048070-158 = "ハッピー、エンド……。"
10048070-162 = "そうですね……それに、ここまで来て筆を折るわけにはいかない。"
10048070-163 = "……結末まで辿り着かないと。"
10048070-164 = "それでフユ、罠は残りいくつ？"
10048070-165 = "全部使い切ってるよ。"
10048070-166 = "そう……やれることはやりましたね。 "
10048070-167 = "あとは、慈愛の怪盗がちゃんと盗めれば……。"
10048070-168 = "ここまで手伝って失敗するなら、怪盗向いてないんじゃないかな？"
10048070-169 = "……それもそうですね。"
10048070-170 = "うん……フユ、例の真作は持ってきたよね？"
10048070-171 = "もちろん。カバンに大事にしまってありますとも。"
10048070-172 = "じゃあ、この辺で下がろうか。"
10048070-173 = "日も暮れてきたし……。 "
10048070-175 = "ええ――今宵の舞台の幕を下ろすには、良い頃合いでしょう。"
10048070-179 = "……！"
10048070-180 = "夜の帳が下りれば、偽りの[ruby=かお]表情[/ruby]は闇に溶け――真実の声のみがこだまする。"
10048070-186 = "ごきげんよう。名も知らぬお嬢さん方。"
10048070-187 = "お初にお目にかかります――「慈愛の怪盗」と申します。"
10048070-188 = " 少々――[ruby=・]お[/ruby][ruby=・]話[/ruby]していきませんか？"
