[translation]
2004506-1 = "Uma oferta irrecusável"
2004506-2 = "（Como um turista comum, participei do passeio da Phina）"
2004506-4 = "Daqui em diante, por favor, sigam as instruções do guia local para entrar!"
2004506-5 = "Por favor, voltem para o ônibus até o horário de encontro!"
2004506-7 = "Uau... que castelo magnífico...!"
2004506-8 = "Não importa quantas vezes eu venha aqui, é incrível."
2004506-9 = "Um dia, quero dar uma volta com calma por aqui."
2004506-10 = "[s1]（Já que estou aqui, acho que vou ver como a Phina está）\n[s2] \"Se não se importar, gostaria de ir ver no seu lugar?\""
2004506-13 = "Sério, é verdade?"
2004506-14 = "Desculpe o incômodo. Então, vou aceitar sua gentileza...!"
2004506-16 = "（Decidi voltar ao ônibus para ver como a Phina estava）"
2004506-18 = "A previsão é de chuva, então preciso preparar os guarda-chuvas também..."
2004506-22 = "Os panfletos para distribuição ficam aqui..."
2004506-23 = "Garrafas de água: uma, duas, três... De novo! Uma, duas..."
2004506-24 = "É melhor prevenir do que remediar! Uma, duas..."
2004506-25 = "[s] \"Phina, bom trabalho.\""
2004506-26 = "Ah! Sensei!"
2004506-27 = "Eu estava preparando o próximo destino!"
2004506-28 = "Por que o Sensei está aqui...? A-aconteceu algo de errado de novo!?"
2004506-29 = "[s] （Expliquei que vim ver como ela estava）"
2004506-30 = "Entendo! Mas eu não sou mais aquela Phina inexperiente de antigamente!"
2004506-31 = "Para não cometer erros, eu verifico tudo várias vezes!"
2004506-32 = "Verificação tripla! Uma... duas..."
2004506-33 = "[s3] \"Não acha que já está bom por hoje?\"\n[s4] \"Por que não descansa um pouco comigo?\""
2004506-36 = "Ma-mas... eu tenho medo de cometer erros..."
2004506-37 = "É melhor prevenir..."
2004506-38 = "[s5] \"A Phina já está se esforçando o suficiente.\"\n[s6] \"Descansar também é uma parte importante do trabalho.\""
2004506-41 = "Suas palavras são gentis demais, sinto-me honrada!"
2004506-42 = "Se o Sensei diz isso, não posso recusar...!"
2004506-44 = "（Decidi descansar no ônibus junto com a Phina）"
2004506-47 = "[wa:630]― [log=피나 가이드]Hmm, [wa:2080]Hah![/log]"
2004506-49 = "― [log=피나 가이드]...Parece que eu estava [wa:1100]tensa.[/log]"
2004506-52 = "[wa:1000]― [log=피나 가이드]Enquanto estava com os clientes, eu estava [wa:1440]tão focada,[/log]"
2004506-54 = "― [log=피나 가이드]que não percebi...[/log]"
2004506-57 = "[wa:1000]― [log=피나 가이드]Mas agora, estando aqui com o Sensei,[/log]"
2004506-59 = "― [log=피나 가이드]meu coração [wa:920]se acalma.[/log]"
2004506-62 = "[wa:1000]― [log=피나 가이드]Para se mover com leveza, [wa:1110]alongar é essencial! [wa:1380]Mais uma vez![/log]"
2004506-65 = "― [log=피나 가이드]Hmm, [wa:880]hmmm, [wa:1160]uau![/log]"
2004506-68 = "[wa:570]― [log=피나 가이드]Eh? [wa:1060]É melhor relaxar os ombros... [wa:2700]é?[/log]"
2004506-71 = "[wa:2400]― [log=피나 가이드]I-isso... [wa:700]é que... [wa:1720]como [wa:960]guia,[/log]"
2004506-73 = "― [log=피나 가이드]eu preciso manter o foco...[/log]"
2004506-76 = "― [log=피나 가이드]Mas quando estamos só nós dois... [wa:1900]é que...[/log]"
2004506-79 = "[wa:1330]― [log=피나 가이드]Eu acabo [wa:1070]relaxando demais...[/log]"
2004506-83 = "Ah?"
2004506-84 = "Ainda não é o horário de encontro?"
2004506-85 = "Oops!?"
2004506-86 = "Preciso me apressar para recebê-los!"
2004506-93 = "Bem-vindos de volta! Bom trabalho!"
2004506-97 = "Foi muito divertido~"
2004506-102 = "Graças ao Sensei, consegui ver tudo com calma! Obrigado!"
2004506-106 = "!!!"
2004506-107 = "......P-por favor, suba no ônibus!"
2004506-112 = "[ns] \"Fina? Aconteceu alguma coisa?\""
2004506-113 = "E-err..."
2004506-114 = "Fina, você deixou seus sapatos para trás dentro do ônibus...!"
2004506-115 = "[s7] \"......! Por enquanto, vou agir naturalmente!\"\n[s8] \"Para ninguém perceber...!\""
2004506-118 = "C-compreendido!"
2004506-120 = "(Depois que todos embarcaram, Fina calçou seus sapatos rapidamente para que ninguém percebesse)"
