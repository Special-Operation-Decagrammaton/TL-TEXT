[translation]
10011055-2 = "Sim, bom trabalho. Não é como se você tivesse passado oficialmente, mas..."
10011055-3 = "Bem, acho que serve."
10011055-4 = "Isso significa que... podemos passar?"
10011055-5 = "Sim. A próxima atração é seguindo em frente e virando à direita."
10011055-6 = "A propósito, vocês são o tal \"Clube de Pesquisa de Ninjutsu\" que todos mencionaram no anúncio?"
10011055-7 = "Ah, s-sim, somos nós..."
10011055-8 = "Entendi. Ninjas são incríveis, né?"
10011055-10 = "Ah..."
10011055-11 = "...!"
10011055-12 = "Sim! Ninjas são incríveis!"
10011055-14 = "Boa sorte, estarei torcendo por vocês daqui."
10011055-17 = "Presidente, sobre isso..."
10011055-18 = "Sim. Assim como o comitê organizador do festival de agora pouco, acho que esta é a primeira vez que recebemos um elogio sincero de outros alunos..."
10011055-19 = "É claro! Porque ninjas são incríveis! Não é, meu senhor?"
10011055-20 = "[s] \"Sim, é verdade. Ninjas são muito legais.\""
10011055-21 = "..."
10011055-22 = "De qualquer forma, se conseguimos passar, vamos logo. Enquanto ficamos parados aqui, a distância só aumenta."
10011055-23 = "É-é verdade! Vamos nessa, pessoal!"
