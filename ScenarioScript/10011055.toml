[translation]
10011055-2 = "うん、お疲れ様～。正式に通過、ってわけじゃないけど……。"
10011055-3 = "まあ、一応アリかな。"
10011055-4 = "ってことは、通っても良いってこと……？"
10011055-5 = "うん。次のアトラクションは、まっすぐ進んで右の方だよ。"
10011055-6 = "ところで、みんなが放送で言ってた「忍術研究部」？"
10011055-7 = "あ、そ、そうだけど……"
10011055-8 = "そっか。忍者って、すごいね。"
10011055-10 = "あ……。"
10011055-11 = "……！"
10011055-12 = "はい！忍者はすごいんです！"
10011055-14 = "頑張ってね、私はここから応援してるから。"
10011055-17 = "部長、その……"
10011055-18 = "うん。さっきのお祭り運営委員会もそうだけど、こうして他の生徒からちゃんと褒めてもらったのは、初めて……かも。"
10011055-19 = "当然です！忍者はすごいものなので！ですよね、主殿！"
10011055-20 = "[s] \"うん、そうだね。忍者はカッコ良いよ。\""
10011055-21 = "……。"
10011055-22 = "とりあえず、突破できたならさっさと進みましょう。こうしている間にも距離が離されてしまいます。"
10011055-23 = "そ、そうだった！よし行こう、みんな！"
