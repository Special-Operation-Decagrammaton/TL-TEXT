[translation]
1011302-1 = "趣味の時間（1）"
1011302-2 = "（公園に少し早めに着いた）"
1011302-3 = "[ns1] \"セナと公園で待ち合わせたのは良いけど……。\"\n[ns2] \"何をしようかな……。\""
1011302-7 = "[ns3] \"セナの趣味って待機と薬品の整備だったよね……。\"\n[ns4] \"でも、公園ではできないし……。\""
1011302-10 = "先生は相手が楽しめているかを気にするタイプなんですね？"
1011302-11 = "[ns] \"一緒に楽しめたら、それが一番良いからね……。\""
1011302-12 = "では、もし相手が楽しんでいたら、先生もご満足いただけますか？"
1011302-13 = "[ns5] \"まあ、状況にもよるけど……。\"\n[ns6] \"嬉しいと思う。\""
1011302-16 = "……なるほど、参考になりました。"
1011302-17 = "[ns] \"うん、なら良かったよ……って、あれ！？\""
1011302-22 = "こんにちは、もういらっしゃってたんですね。"
1011302-23 = "[s] \"いつの間に来てたの！？\""
1011302-24 = "これで先生のことを、少し理解できました。"
1011302-25 = "私の予想を上回るところもあるのだと。"
1011302-26 = "……私ですか？#n気にしないでください。そんなことより、先生にお会いできて嬉しいです。"
1011302-27 = "……楽しみにしておりましたので。"
1011302-28 = "では、この後の予定を教えていただけますか？"
1011302-29 = "私の目的はお会いできた時点で達成しています。"
1011302-30 = "もうここで解散しても良いくらいです。"
1011302-31 = "ですが、せっかくなので明るい未来について話し合ったり……。"
1011302-32 = "……なんて。"
1011302-33 = "[s7] \"い、いや、それはちょっと違うかも！？\"\n[s8] \"そうだ、「待機」しよっか！\""
1011302-36 = "……分かりました、そうしましょう。"
1011302-37 = "ただ、先生も楽しんでいただけるか不安ですが……。"
1011302-38 = "先生を信じます。"
1011302-40 = "（こうして「待機」することにした……）"
1011302-44 = "先生、大丈夫ですか？"
1011302-45 = "何を言っているのか分からない……？"
1011302-46 = "……今の先生は、とても暇そうに見えましたので。"
1011302-47 = "[s] \"どうして分かるの！？\""
1011302-48 = "ええ、感覚ではありますが……。"
1011302-49 = "見れば分かります。"
1011302-50 = "私の方は……。"
1011302-51 = "ものすごく危険に感じられます。"
1011302-52 = "……見えるものすべてが。"
1011302-53 = "[s] \"え、なんで！？\""
1011302-54 = "あちらをご覧ください。"
1011302-58 = "あはははっ！やめてよ、姉ちゃん！くすぐったいってば！"
1011302-59 = "ここがくすぐったいの？#nほら、逃げても無駄だよ！"
1011302-61 = "ただ子どもたちが遊んでいるように見えるかもしれません。"
1011302-62 = "ですが同時に、非常に危険な状況でもあります。"
1011302-63 = "人の体は、99%の酸素飽和度を保っている状態が正常とされているのですが……。"
1011302-64 = "過度にくすぐられると酸素飽和度が低下し、低酸素症を引き起こす可能性があるのです。"
1011302-65 = "まあ、普通はそこまでくすぐることはありませんが……。"
1011302-66 = "人は予測できない生き物です。"
1011302-67 = "それに……あちらでも危険な行動をしている人が。"
1011302-69 = "おお……美味そうだな。"
1011302-70 = "よし、温泉卵は後で入れよう。"
1011302-71 = "まずは麺から頂くか。"
1011302-73 = "温泉卵入りのカップラーメン――なかなかユニークな楽しみ方ですね。"
1011302-74 = "しかし、卵は麺より食べにくいですし、麺はのどに詰まりやすい。"
1011302-75 = "この場合は、まず卵を食べて、胃にシグナルを送るほうが安全です。"
1011302-76 = "何より、麺を一度に食べすぎると、気管が詰まって死体……いえ、救急患者になってしまいます。"
1011302-77 = "それだけではありません。#nあちらにも危険な要素が潜んでいます。"
1011302-79 = "ふんふふん～チーズ、チーズ。"
1011302-80 = "チーズにはピクルスが欠かせないよね～"
1011302-81 = "こってりしたチーズの味を、爽やかなピクルスが引き締めてくれるし～"
1011302-83 = "……チーズとピクルスを一緒に食べては危険です。"
1011302-84 = "チラミンという食品の発酵と関わる成分にあり……。"
1011302-85 = "チーズとピクルスは、発酵食品のためチラミンが大量に含まれています。"
1011302-86 = "つまり、過剰摂取になるため、交感神経に大きな刺激が加わり、不整脈を引き起こす可能性があります。"
1011302-87 = "最悪の場合、心停止に至る可能性もあるため、注意しなくてはいけません。"
1011302-88 = "[s9] \"じゃあ、安全に生きるためには……。\"\n[s10] \"何も食べず、動かず、じっとしてるほうが良いのかな……？\""
1011302-91 = "はい、栄養がすべて満たされるなら、それが一番安全かと。"
1011302-92 = "[s] \"極端過ぎない！？\""
1011302-93 = "そして、万が一非常事態が発生した時、すぐに対応できるよう、常に私たち救急医学部が待機するのです。"
1011302-94 = "[s] \"返す言葉もないよ……。\""
1011302-95 = "先生は私が待機を楽しんでいるだけのように見えますか？"
1011302-96 = "……別にそういうわけではないのです。"
1011302-97 = "こうして待機しながら書類整理や記録の確認などを行って……。"
1011302-98 = "いつでも駆けつけられるようにしながら、誰もいない場所で過ごす……#n私にとって、この時間は、落ち着くことができるんです。"
1011302-99 = "そして……#nそうですね、未知の現象に対する期待があります。"
1011302-100 = "[s] \"どういうこと？\""
1011302-101 = "……未来は誰にも分かりません。"
1011302-102 = "それ故に、不安を生むでしょう。"
1011302-103 = "ですが、だからこそ私たちを突き動かす理由にもなります。"
1011302-104 = "いつ、どこで死体……#nいえ、負傷者が発生するか予測できないからこそ……。"
1011302-105 = "そんな状況を想像しながら待機することで、緊張感が生まれます。"
1011302-106 = "もちろん、何も起こらないほうが良いですが……。"
1011302-107 = "それとは別に、緊張感を持って世界を見守ることにより得られる満足感があります。"
1011302-108 = "この気持ちを、私は大切にしているのです。"
1011302-113 = "もうこんな時間ですね。"
1011302-114 = "ワンピースだからでしょうか、いつもより体温が下がっています。"
1011302-115 = "このままでは低体温症を引き起こす危険があります。"
1011302-116 = "もう少し近づいても良いでしょうか……。"
1011302-121 = "[ns] \"……そこまで寒いかな？\""
1011302-122 = "……いえ、ただの口実です。"
1011302-123 = "先生とこうしていたいと思った、それだけです。"
1011302-124 = "今日は本当に……。"
1011302-128 = "先生にお会いできて、本当に嬉しかったです。"
1011302-129 = "……すみません、言葉足らずかもしれませんが。"
1011302-130 = "待機デートに、胸がときめいてしまいました。"
1011302-131 = "「待機デート」とは何か、と？#n当たり前のことを聞くんですね。"
1011302-132 = "それは待機中に行われるデートのことです。"
1011302-133 = "今の私たちのように。"
1011302-135 = "（セナと一緒に、半日かけて「待機デート」を楽しんだ）"
1011302-136 = "（デートには、ただ「会う」という意味も含まれているから、間違っていないはず）"
