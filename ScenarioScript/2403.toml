[translation]
2403-1 = "夜は短し、走れよ乙女（１）"
2403-2 = "（それは、午前1時すぎの深夜のこと……）"
2403-5 = "んんんんんんん……。"
2403-7 = "（むにゃ……んぅ……）"
2403-9 = "（……？この音、何……？）"
2403-14 = "ミモリ、どう？準備終わった？"
2403-15 = "えっと……これとあれと、この辺りで大丈夫ですよね？"
2403-16 = "うん、それで大丈夫。"
2403-17 = "……じゃあ、行こっか？"
2403-18 = "はい。カエデちゃんを起こしてしまわないように、静かに出ましょう。"
2403-22 = "（んん、ツバキ先輩……ミモリ先輩……？）"
2403-23 = "二人で、一体どこに……Zzz……"
2403-26 = "はっ！？"
2403-27 = "……夢？"
2403-31 = "あ、カエデちゃん。おはようございます。"
2403-32 = "ちょうど朝ご飯もできますから、顔を洗ってきては如何ですか？"
2403-33 = "あ、うん。"
2403-34 = "ふあぁ……。"
2403-35 = "ツバキちゃんも、立ったまま器用に二度寝しないでくださいね？"
2403-36 = "さあさあ、カエデちゃんと一緒に。"
2403-37 = "ふぁぅ……うん、お母さん……。"
2403-38 = "わっ、私はお母さんではありませんよ！？"
2403-39 = "くぅ……。"
2403-40 = "……ツバキちゃん？え、もしかして本格的に寝てしまったんですか？起きてください、ツバキちゃん！？"
2403-43 = "……。"
2403-45 = "百夜堂"
2403-46 = "先生はどう思う！？"
2403-47 = "[s1] \"どういうこと……？\"\n[s2] \"急に「どう思う」って言われても……。\""
2403-48 = "何でそんなにリアクションが薄いのさ！？"
2403-49 = "何でそんなにリアクションが薄いのさ！？"
2403-50 = "先生分かってる？これは深刻なことなんだよ、大事件なんだよ！？"
2403-51 = "そ、それほどのことなのデスカ！？フィーナ、今の話では何も分かりませんデシタ！"
2403-52 = "[s] \"大丈夫、私も分かってない。\""
2403-53 = "どうして！？こんな大事件なのに！"
2403-54 = "先輩たちが私だけを置いて、二人っきりで深夜に外出なんて……！"
2403-55 = "確かにそう聞くと、怪しいかもデスね？"
2403-56 = "でしょ！？"
2403-57 = "怪しいよ！もう怪しさしかないよ！"
2403-58 = "それも、しっかり私が眠った頃を見計らって……これは何か、とんでもない秘密を隠してるに違いない！"
2403-59 = "ナルホド。部員には内緒で、幹部二人だけが夜な夜な……怪しい事件の匂いがしてキマシタ！"
2403-60 = "そうだよね！さっすがフィーナ、分かってるぅ！はい、そんなフィーナには花丸シールあげちゃう！"
2403-61 = "ヤリマシタ！ありがとうゴザイマス！"
2403-62 = "[s] \"うーん……。\""
2403-63 = "先生、そんなんじゃ名探偵にはなれないよ！"
2403-64 = "嵐の中の離島とか、橋が落ちた山奥の山荘なんかに孤立しちゃったらどうするの！？"
2403-65 = "[s] \"特に名探偵は目指してないから……。\""
2403-66 = "と・に・か・く！このカッコよくて可愛くて、すごい推理力を持ってて、将来はキヴォトスいちの美少女名探偵として名を馳せることになるこの私の天才的な頭脳によると……！"
2403-69 = "何だかすごい壮大な形容詞が聞こえたけど……"
2403-71 = "はい、ご注文のイチゴ餡蜜ですよー。"
2403-72 = "アッ、委員長！"
2403-73 = "わーい！美味しそー！"
2403-74 = "[s] \"ありがとね、シズコ。\""
2403-75 = "いえ、ご注文いただいたものを持ってきただけですから、そんなお礼を言われるようなことでは。"
2403-76 = "ところでフィーナ。いくらお店が空いてる時間帯とはいえ、あんまり先生を困らせないようにね。"
2403-77 = "そこはご心配なく！これは遊んでいるわけではなく、[ruby=ももよどう]百夜堂[/ruby]の店員として、お客さんのお悩みをお聞きしているだけデスので！"
2403-79 = "任侠映画でも序盤によく出てくる、ちょっとこじれた事情を聴く役デス！"
2403-80 = "そうそう、お客さんには親切にしないと！もぐもぐ……。"
2403-81 = "それをお客さん側から言うのもちょっとどうかと思うけど……まあ確かにそうね。"
2403-82 = "それじゃあ、せっかくだし……。"
2403-83 = "さぁご主人様っ！このご注文のイチゴ餡蜜セットがも～っと美味しくなるように、今からシズコが魔法をかけちゃいますね！"
2403-84 = "美味しくな――"
2403-85 = "あっ、それは大丈夫！"
2403-86 = "ぁ……え？"
2403-87 = "そういうのって、タンカ？を高くするために、お店が勝手にたくさん付けるサービスなんでしょ？"
2403-88 = "この間そう聞いたの！一人前のレディーとして、そういう手には乗らないんだから！"
2403-89 = "ちょっ、待って！その言い方は悪意があるでしょ！？うちはそういうのは――"
2403-90 = "[s] \"お店によっては、そういう闇の側面も時々……。\""
2403-91 = "先生！？"
2403-92 = "とにかくさっきの続きだけど、先輩たちは私に何かを隠してるに違いないの……もぐもぐ。"
2403-94 = "もぐもぐ……はむはむ……だから、あむっ……。"
2403-95 = "とりあえず全部食べ終わってからにしたら？"
2403-97 = "はむっ……ごっくん！ふぅ、だからつまりっ！"
2403-98 = "先輩たちは私に隠れて、例えば……修行部の秘密のミッションとかをしてるのかもしれない！"
2403-99 = "秘密のミッションって……ちょっと考えすぎじゃない？"
2403-100 = "うーん……でも、今回だけってわけじゃなさそうだし……。"
2403-101 = "一昨日も、三日前も、先週も……うん、週に五回くらいはある気がする。"
2403-102 = "もうほとんど毎日じゃん……。"
2403-103 = "でも、なんで私にだけバレないように、それも夜中に……？"
2403-104 = "[s] \"うーん、きっと何か理由が……。\""
2403-105 = "はっ！今、私のこの天才的な頭脳にビビビッと来た！"
2403-106 = "もしかして、大人の女性なら誰もが嗜んでるっていう……「夜遊び」を！？"
2403-107 = "やっぱり素敵なレディーとして、夜遊びは普通のことなの！？私はまだ素敵なレディーになれてないから、だから連れて行ってくれないってこと！？"
2403-108 = "絶対に違うと思うけど……。"
2403-109 = "えー、でもそんなの分かんないじゃん。あっ、もしかして……自分はお祭り運営委員会の委員長として、夜遊びしてるから分かるってこと！？"
2403-110 = "そうなんデスカ委員長！？"
2403-111 = "委員長のヨアソビ……"
2403-112 = "つまり百夜堂のオーナーとして、夜な夜な任侠入り乱れる百鬼夜行の街の平和を守っていたのデスカ！？さすがは委員長、フィーナ感動しマシタ！"
2403-113 = "[s] \"シズコのパンチならできるかも。\""
2403-114 = "そんな訳ないでしょ！？それに多分「夜遊び」って言ったら、普通はそういうのじゃなくて、えっと……。"
2403-115 = "でも、他に私を置いていく理由なんて……。"
2403-116 = "もしかして……私が、頼りない後輩だから？"
2403-117 = "私、もう先輩たちにとって……要らない後輩、なのかな……。"
2403-118 = "カエデ……。"
2403-119 = "……はあ。そこまで気になるなら、実際に確かめてみればいいでしょ？"
2403-120 = "えっ？"
2403-121 = "うじうじ考えてばっかいないで、そういう時はさっさと確認するのが一番良いの。"
2403-122 = "そういうところから誤解は生まれるんだから。"
2403-123 = "実際に、確かめる……？"
2403-124 = "ほら、この抹茶ラムネもあげるから。早く行ってきたらどう？"
2403-125 = "サスガ委員長！不器用ながらも相手を気遣う優しさ、これぞ百夜堂のオーナー！"
2403-126 = "[s] \"やっぱりシズコは優しいね。\""
2403-127 = "いっ、いえその、これはただそんな顔をされるとお店としても困ると言いますか、他のお客さんも気になってしまうからと言いますか……そう、それだけです！"
2403-128 = "……うん！"
2403-129 = "確かにそうかも、やっぱりお祭り運営委員会の委員長は伊達じゃないね！仕方ないからこの花丸シールあげちゃう！"
2403-130 = "いや、別に要らないけど……これ何？どこのシール？"
2403-131 = "私のお手製！このシールをたくさん集めると、なんと豪華賞品をプレゼント！"
2403-132 = "へえ……賞品ってどんなの？"
2403-133 = "シールを10枚集めたら、お誕生日に私がお歌を歌ってあげる！"
2403-134 = "……すごくコメントに困る賞品！"
2403-135 = "まあそれはともかく……これで悩みは解決したでしょ？帰って先輩たちに直接理由を聞いて――"
2403-136 = "よしっ！じゃあ早速今夜、先輩たちを尾行して直接真相を確かめないと！"
2403-137 = "私の話聞いてた！？"
2403-138 = "夜な夜な私に隠れて何をしてるのか……一人前のレディーになるためにも、ちゃんとそれを自分の手で解明しないと！"
2403-139 = "良いデスね！フィーナも応援してマス！"
2403-140 = "あっ、もちろん先生も協力してくれるよね？可愛い生徒のお願い、断ったりしないよね？"
2403-141 = "[s] \"え？ま、まあ全然協力するけど……。\""
2403-142 = "よし、そうと決まれば善は急げだよ！あ、イチゴ餡蜜ごちそう様ー！"
2403-145 = "もう、慌ただしいんだから……。"
2403-146 = "あ、先生。カエデの分と合わせて、お会計お願いしますね♡"
2403-147 = "[s] \"まあそうなるよね！\""
2403-150 = "（そうして夜になって……）"
2403-154 = "…………。"
2403-155 = "……！"
2403-156 = "ツバキ先輩とミモリ先輩は……もう行ったかな？"
2403-157 = "よし、じゃあ私も……シュババッ！"
2403-160 = "先生！こっちこっち！"
2403-161 = "[s] \"お待たせ。結構もう夜遅いけど、大丈夫？眠くない？\""
2403-162 = "自分で言ったんだもん！それに私はこう見えて一人前のレディー……になる予定なんだから！"
2403-163 = "ミモリ先輩にダメって言われてたブラックコーヒーを5杯も飲んだし、お目目ぱっちり！"
2403-164 = "普段は「眠れなくなって生活サイクルが崩れてしまうので、飲んではいけませんよ」って言われてるけど、今日は非常事態だから仕方ない！"
2403-165 = "完璧！やっぱり私、賢い！"
2403-166 = "ふぁ……。"
2403-167 = "[s] \"本当に大丈夫かな……。\""
2403-168 = "……ん？先生どうしたの？"
2403-169 = "はっ、こんなにゆっくりしてる場合じゃない！"
2403-172 = "ほら、先輩たちを追いかけないと！いざ、尾行開始！"
