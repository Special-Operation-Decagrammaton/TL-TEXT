[translation]
2403-1 = "A noite é curta, corra, donzela (1)"
2403-2 = "（Isso aconteceu na calada da noite, pouco depois da 1 da manhã...）"
2403-5 = "Hmmmmmmm..."
2403-7 = "（Munya... hmm...）"
2403-9 = "（...? Que som é esse...?）"
2403-14 = "Mimori, como está? Terminou os preparativos?"
2403-15 = "Bem... isso, aquilo e por aqui, está tudo certo, não está?"
2403-16 = "Sim, está tudo bem."
2403-17 = "...Então, vamos?"
2403-18 = "Sim. Vamos sair em silêncio para não acordar a Kaede-chan."
2403-22 = "（Hmm, Tsubaki-senpai... Mimori-senpai...?）"
2403-23 = "Onde será que as duas foram... Zzz..."
2403-26 = "Hã!?"
2403-27 = "...Um sonho?"
2403-31 = "Ah, Kaede-chan. Bom dia."
2403-32 = "O café da manhã já está quase pronto, por que não vai lavar o rosto?"
2403-33 = "Ah, sim."
2403-34 = "Uaaah..."
2403-35 = "Tsubaki-chan, não tente tirar um cochilo de pé de forma tão habilidosa, por favor."
2403-36 = "Vamos, vamos, junto com a Kaede-chan."
2403-37 = "Fua... sim, mamãe..."
2403-38 = "Ué, eu não sou sua mãe!?"
2403-39 = "Kuu..."
2403-40 = "...Tsubaki-chan? Ei, será que você dormiu de verdade? Acorde, Tsubaki-chan!?"
2403-43 = "..."
2403-45 = "Hyakkiyako"
2403-46 = "O que você acha, Sensei!?"
2403-47 = "[s1] \"O que quer dizer com isso...?\"\n[s2] \"Mesmo que me pergunte 'o que eu acho' de repente...\""
2403-48 = "Por que sua reação é tão fraca!?"
2403-49 = "Por que sua reação é tão fraca!?"
2403-50 = "Você entende, Sensei? Isso é algo sério, é um grande incidente!"
2403-51 = "É, é tão grave assim!? Fina, não entendi nada com o que você disse agora!"
2403-52 = "[s] \"Tudo bem, eu também não entendi.\""
2403-53 = "Por que não!? Mesmo sendo um incidente tão grande!"
2403-54 = "As senpais me deixaram para trás e saíram sozinhas no meio da noite...!"
2403-55 = "Realmente, dito dessa forma, parece suspeito, não é?"
2403-56 = "Viu só!?"
2403-57 = "É suspeito! Não tem como não ser suspeito!"
2403-58 = "E ainda por cima, esperaram eu dormir profundamente... Com certeza elas estão escondendo algum segredo absurdo!"
2403-59 = "Entendo. Sem contar para os membros, as duas líderes saem noite após noite... Sinto cheiro de um caso suspeito!"
2403-60 = "Pois é! Essa é a Fina, você entende! Pronto, vou te dar um adesivo de nota dez por isso!"
2403-61 = "Consegui! Muito obrigada!"
2403-62 = "[s] \"Hmm...\""
2403-63 = "Sensei, desse jeito você nunca vai ser um grande detetive!"
2403-64 = "O que você faria se ficasse isolado em uma ilha no meio de uma tempestade ou em uma mansão nas montanhas com a ponte destruída!?"
2403-65 = "[s] \"Eu não estou tentando ser um grande detetive...\""
2403-66 = "De-qualquer-forma! De acordo com o meu cérebro genial — que é legal, fofo, possui um poder de dedução incrível e que, no futuro, será conhecido como a maior garota detetive de Kivotos...!"
2403-69 = "Ouvi um monte de adjetivos grandiosos, mas..."
2403-71 = "Aqui está o seu Anmitsu de morango, como pediu."
2403-72 = "Ah, Presidente!"
2403-73 = "Uau! Parece delicioso!"
2403-74 = "[s] \"Obrigada, Shizuko.\""
2403-75 = "Não há de quê. Eu apenas trouxe o que foi pedido, não é algo que mereça agradecimentos."
2403-76 = "Aliás, Pina. Mesmo que o restaurante esteja vazio, tente não incomodar muito o Sensei."
2403-77 = "Não se preocupe com isso! Eu não estou brincando, estou apenas ouvindo as preocupações de um cliente como atendente da Hyakkiyako!"
2403-79 = "É o papel de ouvir circunstâncias complicadas, que costuma aparecer no início de filmes de yakuza!"
2403-80 = "Isso mesmo, temos que ser gentis com os clientes! Nhac, nhac..."
2403-81 = "Acho um pouco estranho ouvir isso vindo do próprio cliente... mas, bem, você tem razão."
2403-82 = "Então, já que estamos aqui..."
2403-83 = "Vamos lá, mestre! A Shizuko vai lançar um feitiço agora para que este conjunto de anmitsu de morango que você pediu fique ainda mais delicioso!"
2403-84 = "Fique delicioso――"
2403-85 = "Ah, não precisa disso!"
2403-86 = "Hã... é?"
2403-87 = "Esse tipo de coisa não é um serviço que o restaurante inventa para aumentar a conta?"
2403-88 = "Eu ouvi isso outro dia! Como uma dama de verdade, não vou cair nesse truque!"
2403-89 = "Ei, espere! Essa forma de falar é maldosa, sabia!? Nós não fazemos esse tipo de coisa――"
2403-90 = "[s] \"Dependendo do restaurante, esse lado sombrio às vezes existe...\""
2403-91 = "Sensei!?"
2403-92 = "De qualquer forma, continuando o que eu dizia, as veteranas devem estar escondendo algo de mim... nhac, nhac."
2403-94 = "Nhac, nhac... ham, ham... então, nhac..."
2403-95 = "Por que você não termina de comer tudo primeiro?"
2403-97 = "Ham... engoli! Ufa, então, em resumo!"
2403-98 = "As veteranas podem estar escondendo algo de mim, como, por exemplo... missões secretas do Clube de Treinamento!"
2403-99 = "Missões secretas... você não está pensando demais?"
2403-100 = "Hum... mas não parece ser algo que aconteceu só desta vez..."
2403-101 = "Anteontem, três dias atrás, semana passada... sim, sinto que acontece umas cinco vezes por semana."
2403-102 = "Isso é praticamente todo dia..."
2403-103 = "Mas por que esconder só de mim, e ainda por cima no meio da noite...?"
2403-104 = "[s] \"Hum, com certeza deve haver um motivo...\""
2403-105 = "Ah! Agora, meu cérebro genial teve um estalo!"
2403-106 = "Será que é aquilo que toda mulher adulta pratica... a tal da \"vida noturna\"!?"
2403-107 = "Afinal, como uma dama maravilhosa, a vida noturna é algo comum!? É porque eu ainda não me tornei uma dama maravilhosa que elas não me levam!?"
2403-108 = "Eu tenho certeza absoluta de que não é isso..."
2403-109 = "É, mas não dá para saber. Ah, será que... como presidente do Comitê de Operações do Festival, você sabe disso porque pratica a vida noturna!?"
2403-110 = "É verdade, presidente!?"
2403-111 = "A vida noturna da presidente..."
2403-112 = "Ou seja, como dona da Hyakkiyako, você protege a paz das ruas de Hyakkiyako, onde a yakuza se mistura noite após noite!? Como esperado da presidente, a Pina está emocionada!"
2403-113 = "[s] \"Com o soco da Shizuko, talvez seja possível.\""
2403-114 = "Não tem como ser isso, né!? Além disso, quando se fala em \"vida noturna\", geralmente não é esse tipo de coisa, é, bem..."
2403-115 = "Mas, que outro motivo elas teriam para me deixar para trás...?"
2403-116 = "Será que... é porque eu sou uma kohai que não inspira confiança?"
2403-117 = "Será que, para as veteranas... eu sou uma kohai inútil..."
2403-118 = "Kaede..."
2403-119 = "......Ah. Se você está tão preocupada, por que não verifica por conta própria?"
2403-120 = "Hã?"
2403-121 = "Em vez de ficar aí remoendo, a melhor coisa a se fazer nessas horas é confirmar logo."
2403-122 = "É assim que os mal-entendidos começam."
2403-123 = "Verificar... por conta própria?"
2403-124 = "Toma, pode ficar com esse ramune de matcha também. Por que você não vai logo?"
2403-125 = "Como esperado da presidente! Essa gentileza de se preocupar com o próximo, mesmo sendo um pouco desajeitada, é a cara da dona da Hyakkiyako!"
2403-126 = "[s] \"A Shizuko é mesmo gentil.\""
2403-127 = "N-não, é que, bem, é só que se você fizer essa cara, fica difícil para a loja, ou melhor, os outros clientes podem acabar se incomodando... Sim, é só isso!"
2403-128 = "……Sim!"
2403-129 = "É, talvez você tenha razão. A presidente do Comitê de Operações do Festival não é qualquer uma! Já que não tem jeito, vou te dar esse adesivo de nota dez!"
2403-130 = "Não, eu não preciso disso... O que é isso? De onde é esse adesivo?"
2403-131 = "Eu mesma fiz! Se você juntar muitos desses adesivos, ganha um prêmio incrível!"
2403-132 = "Hmm... Que tipo de prêmio?"
2403-133 = "Se juntar 10 adesivos, eu canto uma música para você no seu aniversário!"
2403-134 = "……Um prêmio que me deixa sem saber o que dizer!"
2403-135 = "Bem, deixando isso de lado... O problema está resolvido, não está? Vá para casa e pergunte o motivo diretamente para as veteranas—"
2403-136 = "Certo! Então, hoje à noite mesmo, vou segui-las e descobrir a verdade!"
2403-137 = "Você estava me ouvindo?!"
2403-138 = "O que será que elas fazem escondidas de mim noite após noite... Para me tornar uma dama de verdade, preciso descobrir isso com minhas próprias mãos!"
2403-139 = "Isso é ótimo! A Fina também vai torcer por você!"
2403-140 = "Ah, é claro que o Sensei vai ajudar também, né? Você não recusaria o pedido de uma aluna fofa, certo?"
2403-141 = "[s] \"Eh? B-bem, eu ajudo, mas...\""
2403-142 = "Ótimo, decidido! Quem tem pressa faz bem feito! Ah, obrigada pelo anmitsu de morango!"
2403-145 = "Ai, ai, que apressada..."
2403-146 = "Ah, Sensei. Por favor, pague a conta, incluindo a da Kaede, está bem? ♡"
2403-147 = "[s] \"Eu sabia que ia sobrar para mim!\""
2403-150 = "(E assim, a noite chegou...)"
2403-154 = "…………."
2403-155 = "……!"
2403-156 = "A veterana Tsubaki e a veterana Mimori... será que já foram?"
2403-157 = "Certo, então eu também... Vupt!"
2403-160 = "Sensei! Por aqui, por aqui!"
2403-161 = "[s] \"Desculpe a demora. Já está bem tarde, você está bem? Não está com sono?\""
2403-162 = "Foi você quem disse! Além disso, apesar da aparência, eu sou uma dama... ou pelo menos pretendo ser!"
2403-163 = "Tomei cinco xícaras de café preto, que a veterana Mimori disse que eu não podia, então estou super alerta!"
2403-164 = "Normalmente ela diz: 'Você não deve beber, pois vai perder o sono e desregular seu ciclo de vida', mas hoje é uma emergência, então não tem jeito!"
2403-165 = "Perfeito! Eu sou mesmo muito esperta!"
2403-166 = "Ah... *bocejo*."
2403-167 = "[s] \"Será que ela está bem mesmo...\""
2403-168 = "……Hm? O que foi, Sensei?"
2403-169 = "Ah, não é hora de ficar de bobeira!"
2403-172 = "Vamos, temos que seguir as veteranas! Começando a perseguição!"
