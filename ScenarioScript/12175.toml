[translation]
12175-2 = "敵発見、攻撃を始めています！"
12175-3 = "兵力を集結させろ！"
12175-4 = "北と東からも呼び寄せておけ、北方の対デカグラマトン大隊もだ！！"
12175-5 = "はいっ！"
12175-6 = "……！？北方に、少数ですが兵力を確認！"
12175-7 = "む、北方……！？"
12175-8 = "数は3人……あ、あれは……！"
12175-10 = "……はぁ。"
12175-11 = "カイザーPMCの増援を発見。一個大隊の規模です、委員長。"
12175-12 = "分かった、準備して。"
12175-13 = "どうして私もここにいるんだ……。"
12175-14 = "（イオリはともかく何故私まで……）"
12175-15 = "まだ風紀委員の仕事も残ってるし、手早く片付けよう。"
12175-16 = "せっかく委員長が反省文の代わりに、ということにしてくれたんですから、愚痴はそこまでにしましょうね？"
12175-17 = "ここで全軍止める、誰一人として先生には近づけさせない。"
12175-20 = "行こう。"
12175-23 = "次回;それでも手放さなかったもの（１）"
