[translation]
12175-2 = "Inimigo detectado, iniciando ataque!"
12175-3 = "Reúnam as tropas!"
12175-4 = "Tragam reforços do norte e do leste também, incluindo o batalhão anti-Decagrammaton do norte!!"
12175-5 = "Sim, senhor!"
12175-6 = "……！？ Detectamos forças ao norte, embora sejam poucas!"
12175-7 = "Hm, ao norte……!?"
12175-8 = "São três pessoas…… A-aquilo é……!"
12175-10 = "……Haa."
12175-11 = "Reforços da Kaiser PMC detectados. É um batalhão inteiro, Presidente."
12175-12 = "Entendido, preparem-se."
12175-13 = "Por que eu também estou aqui……"
12175-14 = "（Tudo bem a Iori, mas por que eu também……）"
12175-15 = "Ainda tenho trabalho do Comitê Disciplinar pendente, então vamos acabar com isso logo."
12175-16 = "Já que a Presidente teve a gentileza de considerar isso como um substituto para a carta de desculpas, vamos parar com as reclamações, certo?"
12175-17 = "Parem todo o exército aqui. Não deixem ninguém chegar perto do Sensei."
12175-20 = "Vamos."
12175-23 = "Próximo episódio: Aquilo que ainda assim não foi deixado para trás (1)"
