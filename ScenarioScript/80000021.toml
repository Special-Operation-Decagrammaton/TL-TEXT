[translation]
80000021-1 = "Energético especial"
80000021-2 = "（Por causa do trabalho no Schale, você visitou a sala do Veritas para pedir ajuda à Hare）"
80000021-3 = "（Cerca de 5 horas depois de receber a ajuda da Hare...）"
80000021-5 = "Sala do Veritas"
80000021-8 = "Será que é este nó? Sim, aqui estão os registros de transações de delinquentes vendendo armas ilegais..."
80000021-9 = "Ei, você está bem? Sensei?"
80000021-10 = "Você está com uma cara de muito cansado."
80000021-11 = "[s] \"Desculpe, mesmo sendo eu quem pediu o favor...\""
80000021-12 = "……Ah, é verdade. Já está tarde."
80000021-13 = "Desculpe, como meu ciclo de sono é invertido... eu nem percebi."
80000021-14 = "[s] \"Está tudo bem. Não se preocupe.\""
80000021-18 = "[ns] \"Você teria alguma bebida que ajude a despertar...?\""
80000021-19 = "Uma bebida para despertar... o café acabou, então..."
80000021-23 = "Ah, falando nisso."
80000021-30 = "Aqui, pegue. \"Yokai MAX\"."
80000021-31 = "Tem bastante cafeína, então acho que você vai despertar rapidinho."
80000021-32 = "[s] \"Obrigado. Ei, acho que nunca vi esse design antes.\""
80000021-33 = "Sim, esse é o \"Yokai MAX\" edição limitada de Dia dos Namorados deste ano."
80000021-34 = "Como é uma edição limitada, acho que não dá mais para encontrar..."
80000021-35 = "Mas achei que não teria problema nenhum dar para o Sensei."
80000021-41 = "（O \"Yokai MAX\" sabor chocolate que a Hare me deu tinha um gosto bem estimulante, mas com certeza me deixou acordado.）"
