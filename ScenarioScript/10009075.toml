[translation]
10009075-1 = "Epílogo: Mesmo que o Dia dos Namorados tenha acabado"
10009075-2 = "Escritório do Schale"
10009075-3 = "Bem, conseguimos recuperar a maior parte dos equipamentos que foram roubados. Embora mais da metade estivesse quebrada..."
10009075-4 = "E quanto ao pessoal que estava causando confusão junto com a 'Raposa da Calamidade', conseguimos capturar quase todos."
10009075-5 = "Por enquanto, podemos dizer que o caso está praticamente encerrado, certo?"
10009075-6 = "Ah,"
10009075-7 = "Falando nisso, recebi recados para o Sensei de algumas pessoas que colaboraram..."
10009075-11 = "Primeiro, a Yuuka disse: 'Sinto muito por não ter sido de grande ajuda...'"
10009075-15 = "Além disso, a Suzumi e a Chinatsu disseram que... como não conseguiram impedir a fuga desta vez, elas querem realizar uma reunião com o Schale em breve para planejar medidas futuras. Por isso, pediram para você informar em quais horários estaria disponível para conversarmos regularmente..."
10009075-19 = "A Hasumi disse, hum... 'É um assunto importante: não me avisaram que a barra de chocolate fornecida como ração de combate durante a operação tinha 1200 calorias. Por favor, avisem sobre essas coisas antes de comermos!'... foi isso."
10009075-20 = "Kirino, isso não é uma reclamação direcionada a nós?"
10009075-21 = "Ah, peço desculpas! Bem, aqui está: 'Se precisar da nossa ajuda novamente, por favor, nos chame a qualquer momento'."
10009075-23 = "[ns] \"Entendi. Preciso agradecer a cada uma delas depois.\""
10009075-24 = "Ufa. Já é tarde, mas estou exausta, mesmo sendo Dia dos Namorados..."
10009075-25 = "No fim, minha avaliação de desempenho parece que vai ser um desastre,"
10009075-26 = "e a Raposa da Calamidade sumiu de novo! Que pesadelo!"
10009075-27 = "Como esperado de um dos 'Sete Prisioneiros'... fomos completamente manipulados..."
10009075-28 = "Ah, não aguento mais isso!!"
10009075-29 = "[s] \"Vocês duas, bom trabalho...\""
10009075-30 = "De qualquer forma, o relatório é basicamente isso."
10009075-31 = "Entrarei em contato caso surja algo novo."
10009075-32 = "Bom trabalho também, Sensei. Vamos comer donuts juntos qualquer dia desses."
10009075-38 = "[ns] \"Alô?\""
10009075-40 = "Ah, Sensei."
10009075-41 = "Peço desculpas pela demora em entrar em contato."
10009075-42 = "É que..."
10009075-43 = "Sinto muito pelo que aconteceu ontem. Fui enganada e acabei me afastando do senhor..."
10009075-44 = "O correto seria ter mantido meu posto sem esquecer meu dever, focando totalmente na proteção e na recuperação dos corpos até o fim, mas..."
10009075-45 = "[s] \"...Corpos?\""
10009075-46 = "...Eu deveria ter focado totalmente na recuperação dos feridos. Julguei mal a situação, agi por conta própria e causei problemas ao senhor. Como devo me desculpar?"
10009075-47 = "[s1] \"Não, naquela hora parecia ser a melhor escolha.\"\n[s2] \"Eu também não disse nada para te impedir, então não se preocupe.\""
10009075-52 = "...Entendo. Em suma, quer que eu me preocupe com o futuro, que ainda posso mudar, em vez de remoer um passado que não pode ser alterado."
10009075-53 = "Palavras de um adulto... tocaram meu coração, vou guardá-las como uma regra de ouro."
10009075-54 = "[s] \"Será que eu disse algo tão profundo assim...?\""
10009075-55 = "De qualquer forma,"
10009075-56 = "ficaremos por aqui hoje."
10009075-57 = "Então... espero ansiosamente pelo dia em que poderemos trabalhar juntos novamente."
10009075-62 = "(Está na hora de dar uma olhada nos documentos sobre os danos de ontem...)"
10009075-66 = "[ns] \"Ah, pode entrar.\""
10009075-70 = "...Verificação de segurança, -40 pontos."
10009075-71 = "Sensei, não é 'pode entrar'. Tenha mais consciência sobre a segurança."
10009075-72 = "[s] \"Levei uma bronca logo de cara...\""
10009075-77 = "Não é só isso. Investiguei várias coisas antes de vir aqui, e a segurança do Schale está cheia de buracos."
10009075-78 = "Além disso, a fechadura da porta da entrada já estava quebrada..."
10009075-79 = "O que significa isso?"
10009075-80 = "[s] \"Ah... é que várias alunas vêm aqui...\""
10009075-81 = "Sensei, como você pretende lidar com as coisas do Schale desse jeito...?"
10009075-82 = "Haa... se fosse algo relacionado a programas, tudo bem, mas quando se trata de instalações ou hardware, eu não consigo resolver sozinha..."
10009075-83 = "Depois, é melhor pedir para o Clube de Engenharia fazer os reparos."
10009075-84 = "Bem, há uma grande chance de eles adicionarem alguma função estranha, mas... quando se trata desse tipo de coisa, não existem outras pessoas tão confiáveis quanto elas."
10009075-85 = "[s] \"Ah, vocês são bem próximos... ou melhor, vocês realmente confiam um no outro, né?\""
10009075-86 = "Bem, deixando isso de lado..."
10009075-87 = "Eu não vim aqui para reclamar, na verdade, vim para pedir desculpas."
10009075-88 = "[s] \"Mas o que aconteceu ontem não foi culpa da Chihiro--\""
10009075-89 = "Não, eu era a responsável pela segurança naquela situação."
10009075-90 = "Eu não consegui prever o problema com antecedência, nem resolvê-lo imediatamente na hora. Isso é claramente culpa minha."
10009075-91 = "Por isso, me desculpe. Vou tomar medidas para que algo assim não aconteça novamente."
10009075-92 = "Não é uma desculpa, mas a segurança é algo que se torna mais forte através de um ciclo constante de ataques e defesas."
10009075-93 = "Era só isso, então até mais."
10009075-94 = "Quando eu tiver tempo, voltarei para verificar a segurança novamente."
10009075-95 = "[s] \"Certo, até mais.\""
10009075-96 = "……Sim. Então, até mais."
10009075-100 = "（Com tudo isso, o Dia dos Namorados, que foi uma grande confusão, estava finalmente chegando ao fim graças aos esforços de muitas alunas）"
10009075-104 = "[ns] \"（Sério, todas vocês...）\""
10009075-107 = "[ns] \"！？\""
10009075-110 = "[ns] \"……Wakamo！？ Por que você está aqui……！？\""
10009075-111 = "Fufufu...♡"
10009075-112 = "Como eu prometi! Sensei!"
10009075-113 = "A porta estava aberta, então não consegui esperar e vim te ver assim...! "
10009075-114 = "[s] \"É melhor eu revisar a segurança mesmo, pela minha paz de espírito...\""
10009075-116 = "（Neste Kivotos, onde existem tantas alunas diferentes）"
10009075-117 = "（Eu me encontrei mais uma vez com uma garota particularmente perigosa）"
10009075-118 = "Patrulha de Feliz Dia dos Namorados do Schale"
