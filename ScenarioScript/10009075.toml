[translation]
10009075-1 = "エピローグ;バレンタインは終わっても"
10009075-2 = "シャーレ・オフィス"
10009075-3 = "というわけで、奪われてしまった装備品はおよそ回収できました。ただ、半分以上壊れていましたが……。"
10009075-4 = "「災厄の狐」と一緒に暴れてたやつらも、まあ大体捕まえられたし。"
10009075-5 = "とりあえず、ほぼ一件落着ってところ？"
10009075-6 = "あっ、"
10009075-7 = "そういえばご協力いただいた方々から先生への伝言がありまして……"
10009075-11 = "まずユウカさんから、「お役に立てず申し訳ないです……」と。"
10009075-15 = "それと、スズミさんとチナツさんからは……今回力及ばず逃してしまったので、今後の対策をしっかり立てるため、後日シャーレとの会議を行いたい。そのため、定期的にお話ができる時間帯を教えてほしい……との旨がそれぞれ届いています。"
10009075-19 = "ハスミさんからは、えーっと「大事なお話なのですが、作戦中に支給された戦闘用の配給品であるチョコレートバーのカロリーが1200キロカロリーとは聞いていません。そういうのは食べる前に言ってください！」……とのことです。"
10009075-20 = "キリノ、それ私たち宛の異議申し立てでしょ？"
10009075-21 = "あっ、失礼しました！えっと、こちらですね。「もし今度私たちのお力が必要な時は、いつでもお呼び出しください」とのことです。"
10009075-23 = "[ns] \"そっか。後でそれぞれお礼言わないと。\""
10009075-24 = "ふぅ。今さらですが、バレンタインデーだというのに疲れましたね……。"
10009075-25 = "結局成績評価はヤバそうだし、"
10009075-26 = "災厄の狐はまたどっか消えちゃったし！散々だよ！"
10009075-27 = "流石は「七囚人」というところですね……散々弄ばれてしまいました……。"
10009075-28 = "あーもうやってらんないっ！！"
10009075-29 = "[s] \"二人ともお疲れ様……。\""
10009075-30 = "とにかく、報告はこういったところですね。"
10009075-31 = "また何かありましたらご連絡いたしますので。"
10009075-32 = "先生もお疲れー。また今度一緒にドーナッツでも食べよう。"
10009075-38 = "[ns] \"もしもし？\""
10009075-40 = "あ、先生。"
10009075-41 = "連絡が遅くなってしまい申し訳ありません。"
10009075-42 = "そのですね……。"
10009075-43 = "昨日は申し訳ありませんでした。騙されてしまい、先生の傍を離れて……。"
10009075-44 = "本来なら役目を忘れることなく留まり、最後までしっかり警護と死体の回収に全力を注ぐべきだったのですが……"
10009075-45 = "[s] \"……死体？\""
10009075-46 = "……負傷者の回収に全力を注ぐべきでした。判断を誤って単独行動に走ってしまい、先生にはご迷惑をおかけしてしまいました。どう謝罪すればよろしいでしょうか。"
10009075-47 = "[s1] \"ううん、あの時はそれが最善手に見えたし。\"\n[s2] \"私も何も言ってあげられなかったんだし、気にしないで。\""
10009075-52 = "……なるほど。つまるところ、取り返しのつかない過去を振り返るより、これから変えていけるかもしれない未来のことを気にしてほしいと。"
10009075-53 = "大人のお言葉……心に染みました、金科玉条とします。"
10009075-54 = "[s] \"私、そこまですごいこと言ったかな……？\""
10009075-55 = "とにかく、"
10009075-56 = "本日はこの辺りで。"
10009075-57 = "それでは……またご一緒に活動ができる日を、楽しみにしております。"
10009075-62 = "（そろそろ、昨日の被害状況が書かれた各種書類に目を通そう……）"
10009075-66 = "[ns] \"あ、どうぞー。\""
10009075-70 = "……セキュリティチェック、ー40点。"
10009075-71 = "先生、「どうぞ」じゃないの。もっとセキュリティ意識を高く持って。"
10009075-72 = "[s] \"出会って早々怒られた……。\""
10009075-77 = "それだけじゃない。ここに来るまで色々調べたけど、シャーレのセキュリティ穴だらけ過ぎ。"
10009075-78 = "それにエントランスの入り口に至ってはもうドアのロックが壊れてたし……"
10009075-79 = "どういうこと？"
10009075-80 = "[s] \"あー……、色んな子たちが来るからね……。\""
10009075-81 = "シャーレに関することで、先生がその状態でどうするのさ……。"
10009075-82 = "はぁ……プログラム系ならともかく、施設のこととかハードウェア系になると私じゃちょっと無理だし……。"
10009075-83 = "後で、エンジニア部にでも修理を頼んだ方がいいよ。"
10009075-84 = "まあ、高確率で何か変な機能が付いてくるかもしれないけど……そういう事に関しては、あれほど信頼できる子たちも中々いないからね。"
10009075-85 = "[s] \"あ、結構仲が良い……というか、やっぱり信頼してるんだね？\""
10009075-86 = "まあ、そんなことは置いといて……。"
10009075-87 = "別に小言を言いに来たんじゃなくて、むしろ謝りに来たの。"
10009075-88 = "[s] \"でも、昨日のはチヒロのせいじゃ――\""
10009075-89 = "ううん、あの場でセキュリティ周りを担当してたのは私。"
10009075-90 = "事前に問題を察知することもできなければ、その場ですぐに解決することもできなかった。それは明確に私が悪い。"
10009075-91 = "だから、ごめん。これからはあんなことが再発しないように、対処していくつもり。"
10009075-92 = "言い訳じゃないけど、セキュリティは破って破られて……そういう繰り返しで、強固になっていくものだから。"
10009075-93 = "用件はそれだけ、じゃあ。"
10009075-94 = "また時間がある時に、セキュリティを確認しに来るから。"
10009075-95 = "[s] \"うん、またね。\""
10009075-96 = "……うん。じゃあ、また。"
10009075-100 = "（そんなこんなで大騒ぎだったバレンタインデーは、多くの生徒たちの尽力があって、どうにか終わろうとしていた）"
10009075-104 = "[ns] \"（本当に、みんな……）\""
10009075-107 = "[ns] \"！？\""
10009075-110 = "[ns] \"……ワカモ！？どうしてここに……！？\""
10009075-111 = "ふふふっ……♡"
10009075-112 = "それはもう、お約束した通りです！先生！"
10009075-113 = "ちょうど扉も開いておりましたので、待ちきれずにこうして会いに来てしまいました……！"
10009075-114 = "[s] \"やっぱりセキュリティ見直しておこう、心の余裕のために……。\""
10009075-116 = "（様々な生徒たちがいるこのキヴォトスで）"
10009075-117 = "（ひと際殺伐とした女の子と、こうしてあらためて出会った）"
10009075-118 = "シャーレのハッピー♡バレンタインパトロール"
