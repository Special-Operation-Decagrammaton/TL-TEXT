1009205-27 = "[ns3] \"...Yoshimi?\"\n[ns4] \"Que tipo de situação é essa...?\""

1009205-30 = "Bem, em uma palavra: vou começar a jogar agora."

1009205-31 = "Pratiquei até morrer, mas ainda fico nervoso quando coisas assim acontecem."

