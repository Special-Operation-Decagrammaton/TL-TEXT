1009205-46 = "Eu estava nervoso... tanto convidando quanto preparando."

1009205-47 = "...Estou falando sério, então não tire sarro disso."

1009205-51 = "[ns5] \"Sim, entendo.\"\n[ns6] Sente-se silenciosamente em uma cadeira próxima."

