[translation]
1009205-1 = "jogar para você"

1009205-4 = "(Fui ao local do encontro no horário combinado.)"

1009205-10 = "(A sala estava vazia e as luzes não estavam acesas.)"

1009205-14 = "[ns1] \"O Yoshimi ainda está aí...?\"\n[ns2] Acenda a luz."

