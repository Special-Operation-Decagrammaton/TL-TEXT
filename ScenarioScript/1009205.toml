[translation]
1009205-1 = "あなたのために奏でて"
1009205-4 = "（約束した時間に合わせて、待ち合わせ場所に向かった）"
1009205-10 = "（部屋はがらんとしていて、電気も点いていない）"
1009205-14 = "[ns1] \"ヨシミはまだかな……？\"\n[ns2] 電気を点ける。"
1009205-22 = "……ふふっ。"
1009205-23 = "待ってたわよ、先生。"
1009205-27 = "[ns3] \"……ヨシミ？\"\n[ns4] \"これはどういう状況……？\""
1009205-30 = "そうね、ひとことで言うと――今から演奏をするわ。"
1009205-31 = "死ぬほど練習したけど……やっぱりこうなると緊張するわね。"
1009205-35 = "誰かにちゃんと聴かせるのは初めてだし。"
1009205-36 = "……ん？"
1009205-37 = "なに、説明？"
1009205-41 = "……はぁ。"
1009205-42 = "これ以上、言葉が必要？"
1009205-43 = "いくら先生でも、分かるでしょ？"
1009205-44 = "……練習の成果を、聴いてもらおうと思ったの。"
1009205-45 = "ほら、分かったら口閉じて。"
1009205-46 = "緊張したんだから……誘うのも、準備するのも。"
1009205-47 = "……本気なんだから、茶化さないでよね。"
1009205-51 = "[ns5] \"うん、分かった。\"\n[ns6] 無言で近くの椅子に座る。"
1009205-56 = "……ふぅ。"
1009205-57 = "先生がそう真面目だと、逆に緊張するわね……。"
1009205-58 = "それじゃ……。"
1009205-59 = "……ん？"
1009205-60 = "曲？"
1009205-61 = "バンドでやってたのとは別で、"
1009205-62 = "個人的に練習してたヤツ。"
1009205-63 = "ちゃんと私が選んだ――"
1009205-68 = "……はあ。"
1009205-69 = "良いから、細かいことは聞かないで。"
1009205-70 = "黙って聴いててよ？"
1009205-79 = "それじゃ……。"
1009205-80 = "ふぅ……。"
1009205-81 = "……。"
1009205-82 = "んー……。"
1009205-83 = "うーん……。"
1009205-87 = "ううーん……！"
1009205-90 = "……やっぱりダメね。"
1009205-95 = "[ns7] \"座った……？\"\n[ns8] \"そんなに緊張しなくてもいいのに。\""
1009205-99 = "ごめん。やっぱりミスりそうだから、練習の時みたいに座ってやるわ。"
1009205-100 = "ちょっと姿勢がアレかもしれないけど……気にしないで。"
1009205-101 = "それじゃ……。"
1009205-106 = "……。"
1009205-112 = "（ヨシミの演奏が部屋に響き渡る）"
1009205-113 = "（アンプやスピーカーに繋げているわけではなく、生の音を直に聴くことができた）"
1009205-114 = "（その演奏は……）"
1009205-118 = "（……とても上手だった）"
1009205-121 = "[wa:580]― [log=요시미 밴드]ふぅ……[wa:1020]ふう……。[/log]"
1009205-124 = "― [log=요시미 밴드]……や、[wa:1030]やった……。[/log]"
1009205-126 = "― [log=요시미 밴드]やり遂げたわ……。[/log]"
1009205-129 = "[ns9] \"本当にすごかった。\"\n[ns10] \"すごい、心に響いたよ。\""
1009205-130 = "[wa:400]― [log=요시미 밴드]そ、[wa:550]そう……？[/log]"
1009205-131 = "[wa:400]― [log=요시미 밴드]そ、[wa:550]そう……？[/log]"
1009205-133 = "― [log=요시미 밴드]先生が[wa:470]聴いてた感じも[wa:550]そうだった……？[/log]"
1009205-136 = "― [log=요시미 밴드]ふざけてるんじゃ[wa:550]ないわよね？[/log]"
1009205-138 = "― [log=요시미 밴드]これは……[wa:1020]本当にそう思ってる？[/log]"
1009205-141 = "[wa:1350]― [log=요시미 밴드]なんか……[wa:1180]ドキドキして……。[/log]"
1009205-144 = "― [log=요시미 밴드]こんなの、[wa:1250]初めて……。[/log]"
1009205-147 = "[wa:650]― [log=요시미 밴드]……先生……。[/log]"
1009205-150 = "― [log=요시미 밴드]思い返して見たら、[/log]"
1009205-152 = "― [log=요시미 밴드]先生に[wa:400]初めて見せたんじゃないかな。[/log]"
1009205-155 = "[wa:1160]― [log=요시미 밴드]なんというか……[wa:1630]その……。[/log]"
1009205-158 = "― [log=요시미 밴드]……私の[wa:500]「格好いい」姿……[wa:1650]ってやつ……。[/log]"
1009205-162 = "……は、はい！もう終わり！"
1009205-163 = "用事は終わったから解散！"
1009205-167 = "ほら、もう良いでしょ！"
1009205-168 = "それとも何か――"
1009205-172 = "……え？"
1009205-176 = "も、もう一回……？アンコール……？"
1009205-177 = "な、何言ってんの！？"
1009205-178 = "これは、コンサートとかそんなのじゃなくて……！"
1009205-179 = "[s11] \"それでも、聴きたいなって。\"\n[s12] \"初めてのアンコールも欲しいな？\""
1009205-182 = "……！！！！"
1009205-183 = "くっ……うっ……！！本当にもう！！"
1009205-184 = "この減らず口は……っ！"
1009205-188 = "～～～～～～～～！！！！！！"
1009205-189 = "はぁ……もう良いわよ。"
1009205-193 = "……よし。"
1009205-194 = "そんなに言うなら、やってやるわ。"
1009205-195 = "でも、覚悟してよね。"
1009205-196 = "そっちがそのつもりなら……"
1009205-197 = "先生の「初めて」――"
1009205-202 = "――全部持ってってやるんだから。"
1009205-204 = "（そうして、ヨシミの色んな演奏を聴いた）"
1009205-208 = "（中盤からは体力が尽きたのか、へとへとになっていた……）"
