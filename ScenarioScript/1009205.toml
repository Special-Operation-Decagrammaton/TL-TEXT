1009205-82 = "Hum..."

1009205-83 = "Hum..."

1009205-87 = "Hum...!"

1009205-90 = "...Não adianta, afinal."

1009205-95 = "[ns7] \"Sente-se...?\"\n[ns8] \"Você não precisa ficar tão nervoso.\""

1009205-99 = "desculpe. Tenho certeza que cometerei um erro, então vou apenas sentar como faço durante o treino."

