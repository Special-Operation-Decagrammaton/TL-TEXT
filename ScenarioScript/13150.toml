[translation]
13150-1 = "Episódio 15; As ordens da vice-presidente do conselho estudantil"
13150-7 = "Ei, Hoshino-chan."
13150-8 = "Sabe, quando eu conheci a Hoshino-chan pela primeira vez, eu me belisquei várias vezes porque achei que devia ser um sonho."
13150-9 = "Ter uma kouhai tão fofa, forte e confiável como a Hoshino-chan ao meu lado... era algo tão parecido com um sonho que eu fiquei genuinamente feliz..."
13150-10 = "Hmm, talvez eu não esteja conseguindo explicar direito..."
13150-11 = "É só que, poder estar aqui com a Hoshino-chan é como um milagre para mim."
13150-13 = "……Nós estamos juntas assim todos os dias, não estamos?"
13150-14 = "Ontem, hoje e amanhã também. Por que fazer tanto drama por algo tão natural?"
13150-15 = "Hau... mas é que..."
13150-16 = "Um \"milagre\" é algo muito mais grandioso e raro, sabe?"
13150-17 = "……Não, não é."
13150-18 = "Hoshino-chan."
13150-22 = "Eu não penso assim."
13150-23 = "Ei, Hoshino-chan. Se um dia você tiver uma kouhai fofa, quando esse dia chegar—"
13150-24 = "Esteja sempre ao lado dela, está bem?#nMomentos assim são o que chamamos de milagre."
13150-25 = "Tenho certeza de que, um dia, a Hoshino-chan vai entender."
13150-27 = "Que uma kouhai viesse para uma escola como esta,"
13150-28 = "isso sim é um milagre."
13150-29 = "Ah, não é nada disso, Hoshino-chan."
13150-30 = "Sim, sim, eu entendi."
13150-31 = "……Fufu.#nEntão, se a Hoshino-chan tiver uma kouhai..."
13150-32 = "Não importa o que aconteça, você tem que protegê-la, entendeu?"
13150-33 = "Bem, farei o meu melhor."
13150-45 = "Ugh..."
13150-46 = "Mesmo depois de atacar tanto,"
13150-47 = "ela nem sequer está ofegante..."
13150-51 = "……Desculpe."
13150-52 = "Lidando com três helicópteros, não consegui controlar bem a minha força."
13150-53 = "……Como a Ayane-chan disse, acabou sendo uma repetição do que aconteceu antes."
13150-54 = "Você poderia pedir desculpas ao Sensei por mim?"
13150-55 = "Diga que sinto muito, mesmo depois de ele ter nos ajudado tanto."
13150-58 = "……"
13150-59 = "……"
13150-62 = "……Vocês duas são o \"futuro\" de Abydos."
13150-63 = "Fiquei tão feliz por vocês terem vindo para uma escola nesse estado."
13150-64 = "Por isso, eu preciso proteger vocês.#nPorque é dever de uma senpai proteger suas kouhais."
13150-70 = "……"
13150-71 = "Mas,"
13150-72 = "se for assim, a senpai vai...!"
13150-74 = "Está tudo bem, Serika-chan."
13150-75 = "Eu sou do terceiro ano, então a formatura está próxima de qualquer jeito."
13150-76 = "Desta vez, a Ayane-chan e a Serika-chan devem proteger as kouhais."
13150-79 = "Vocês têm o papel de carregar o futuro de Abydos nas costas."
13150-80 = "Assim que o canhão ferroviário desaparecer... tenho certeza de que tudo se resolverá."
13150-81 = "Só é preciso que a ojisan desapareça."
13150-84 = "Nonomi-chan, Shiroko-chan, Ayane-chan, Serika-chan...#nSe todas unirem forças, vai dar tudo certo."
13150-85 = "O conselho estudantil de Abydos, da Yume-senpai e meu, está dissolvido a partir de hoje.#nMas o Comitê de Contramedidas continuará existindo."
13150-91 = "E então, passem o bastão para as próximas kouhais."
13150-92 = "Esta é a vontade herdada de Yume, a presidente do conselho estudantil de Abydos..."
13150-94 = "A última ordem de Hoshino Takanashi, a vice-presidente do conselho estudantil."
13150-103 = "Pessoal, vocês estão bem?"
13150-105 = "Shiroko-senpai..."
13150-106 = "A senpai é quem está mais ferida..."
13150-108 = "...Hum. E a Hoshino-senpai?"
13150-109 = "Eu não consegui impedi-la..."
13150-110 = "...Fui incapaz."
13150-111 = "Shiroko-senpai, o que devemos fazer a partir de agora...?"
13150-112 = "Eu também não sei..."
13150-114 = "Sinto que é a primeira vez que vejo"
13150-115 = "a senpai desse jeito..."
13150-117 = "..."
13150-130 = "Falando nisso, o contrato da presidente do conselho estudantil..."
13150-132 = "O que tem ele?"
13150-137 = "Hoje faz dois anos desde que aquele contrato foi assinado."
13150-138 = "Isso significa que..."
13150-140 = "A presidente desapareceu hoje, há dois anos..."
13150-156 = "...Nonomi-chan, espere por mim."
13150-158 = "Nunca mais..."
13150-161 = "...Eu não vou repetir aquele erro."
13150-163 = "Próximo episódio: Contra-ataque"
