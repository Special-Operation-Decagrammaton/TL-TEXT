[translation]
34070-1 = "Episódio 7;Escolha e Decisão"
34070-3 = "C-como está a senhorita Seia……!?"
34070-4 = "Não adianta, as convulsões e o sangue não param……."
34070-5 = "Contatem a Ordem dos Cavaleiros de Socorro, urgente……!! Sisterhood, qualquer um serve; confirmem logo um tratamento……!"
34070-6 = "E a senhorita Nagisa?"
34070-7 = "Está a caminho do hospital agora! Estamos contatando os demais também……."
34070-8 = "E a \"Schale\"?"
34070-9 = "Sem contato desde agora há pouco! ……N-não me diga que algo aconteceu com o Sensei também……!?"
34070-10 = "Não fala coisa de mau agouro; continua tentando o contato!"
34070-11 = "E a culpada! É a Mika Misono!? Aquela bruxa!!"
34070-15 = "Esperem! A senhorita Mika não fez nada……."
34070-16 = "Não foi porque ela visitou o quarto da senhorita Seia que isto aconteceu? Aquela mulher fez alguma coisa, na certa!"
34070-21 = "Parem! Brigar aqui, agora……!?"
34070-22 = "Assassina! Bruxa maldita!!"
34070-27 = "Sai daí agora!!"
34070-30 = "[ns] \"Saori……?\""
34070-31 = "……."
34070-40 = "……."
34070-41 = "[s1] \"…………!?\"\n[s2] \"…………\""
34070-42 = "……Sensei."
34070-43 = "……Sensei."
34070-44 = "A Atsuko…… foi levada."
34070-45 = "As outras companheiras também sofreram o ataque da Arius e se dispersaram…… nem se sabe se estão vivas……."
34070-46 = "Desde então, por dias…… eu venho fugindo, mas……."
34070-47 = "Eu não consegui detê-la……."
34070-48 = "Do jeito que vai…… a Atsuko…… a Hime vai morrer……."
34070-49 = "Amanhã de manhã…… junto com o amanhecer, ela vai ser morta por \"ela\"……."
34070-50 = "Sei que a minha história é difícil de acreditar, mas…… só isto é a verdade……."
34070-52 = "A Atsuko é uma existência criada, desde a origem, pra isso……."
34070-53 = "Desde pequena, o destino dela era ser feita \"sacrifício\"……."
34070-54 = "\"Ela\" disse……."
34070-55 = "que, se eu quisesse mudar o destino da Hime, obedecesse às ordens dela……."
34070-56 = "Que, assim, não só a Hime…… ela salvaria as outras companheiras também."
34070-57 = "Roubar o Tratado do Éden, tornar o poder do Conselho dos Santos de Justina posse da Arius――e, dominando Trinity e Gehenna……."
34070-58 = "a Atsuko não precisaria virar \"sacrifício\"……."
34070-59 = "Mas……."
34070-61 = "eu falhei……."
34070-62 = "O Squad de Arius…… não conseguiu cumprir a missão."
34070-63 = "Além de falhar no roubo do Tratado do Éden,"
34070-64 = "a conquista dos distritos de Trinity e Gehenna,"
34070-65 = "salvar as companheiras,"
34070-66 = "e até proteger a Atsuko,"
34070-67 = "tudo…… a minha força não alcançou; nada se realizou."
34070-68 = "……A eu de agora é uma fracassada. Nem a Trinity, nem a Gehenna――nem à própria Arius eu posso pedir ajuda."
34070-69 = "Por isso, só me resta recorrer…… ao Sensei [USERNAME]……."
34070-70 = "Por favor……."
34070-71 = "……Juro pela minha vida: seja qual for a ordem, eu obedeço."
34070-72 = "……A \"bomba que destrói aureolas\"; isto também, eu entrego. Pode ficar com a minha vida nas mãos."
34070-73 = "Se julgar que não pode confiar em mim, use-a…… por isso, eu imploro."
34070-74 = "……."
34070-75 = "Por favor…… a Atsuko……."
34070-76 = "salve…… a Hime……."
34070-80 = "Sai daí agora!! Mika Misono! Sua celerada! É tudo culpa sua!"
34070-81 = "Por você ter contatado a Arius……."
34070-82 = "O Sensei…… está sendo visado pelo Squad……."
34070-83 = "Porque foi você que trouxe o Sensei……!"
34070-84 = "Por minha culpa…… deu nisto, né……."
34070-85 = "……Culpa minha."
34070-86 = "Por eu ser burra, a Seia…… eu não tinha sido perdoada em nada, no fim……."
34070-87 = "……Eu achava que, quem sabe, houvesse uma chance de me redimir."
34070-88 = "Que, passada esta noite…… amanhã de manhã, com a Nagi e a Seia, e com o Sensei…… todos, juntos……."
34070-89 = "Era pra ser assim…… por que isto……."
34070-90 = "……."
34070-91 = "……Chance de redenção; uma coisa de conto de fadas dessas jamais existiria…… que idiota. Por eu ter acreditado numa coisa dessas……."
34070-92 = "Por eu ser burra, fui só sendo usada pela Arius…… pelo \"Squad de Arius\"…… pela Saori……."
34070-93 = "E, por causa disso…… feri as pessoas queridas, deixei que se machucassem…… desse jeito, é como se……."
34070-94 = "Bruxa maldita!!"
34070-95 = "……."
34070-96 = "Parem! Alguém, tragam logo o Comitê de Realização da Justiça!"
34070-100 = "……Ah, é. Então era isso……."
34070-108 = "……."
34070-109 = "……Ué, pensando bem, é simples."
34070-110 = "……A Saori Joumae, do \"Squad de Arius\"…… tudo……."
34070-114 = "Aquela mulher é a origem de tudo."
34070-115 = "Aquela mulher me usou――tentou destruir a aureola da Seia, disparou um míssil contra a Nagi, feriu o Sensei……."
34070-116 = "Tudo…… tudo, tudo, tuuudo! Foi aquela ali que planejou."
34070-117 = "……Pois é. Se é pra terminar assim…… eu já sei o que eu tenho que fazer."
34070-118 = "As minhas pessoas queridas passando por isto, e só a Saori Joumae vivendo em paz? Não é estranho?"
34070-119 = "Sim, é isso. Isso mesmo――aquela mulher também……."
34070-120 = "Na mesma medida em que me roubaram, ela precisa ser roubada; senão é injusto, né."
34070-121 = "As pessoas queridas daquela mulher também, do mesmo jeito…… tudo."
34070-127 = "Solta! Sai daí, Mika Misono!!"
34070-128 = "Não façam alvoroço aqui! Agora a situação……"
34070-135 = "Guah!?"
34070-136 = "Q-que foi……!? A parede…… quebrou!?"
34070-138 = "Foi mal~★"
34070-139 = "Deixa ver…… cadê a minha arma·······……."
34070-140 = "Era pra lá? Bom, bom, vamos indo."
34070-144 = "A-a parede…… com as mãos nuas……?"
34070-145 = "……A M-Mika Misono…… a Mika Misono……."
34070-146 = "A Mika Misono fugiu da prisão!!"
34070-152 = "……."
34070-153 = "[s] \"Levanta, Saori.\""
34070-154 = "M-mas……."
34070-155 = "[s] \"Eu quero conversar com você de igual pra igual.\""
34070-156 = "……."
34070-158 = "……."
34070-159 = "[s] \"Primeiro, deixa eu perguntar: quem é 'ela'?\""
34070-160 = "\"Ela\" é a representante do distrito autônomo de Arius e a dona da Filial de Arius. Nós a chamamos de \"ela\", mas as outras alunas também a chamam de \"Madame\"."
34070-161 = "Eu mesma só a vi poucas vezes…… uma adulta alta, de pele vermelha, envolta num vestido branco."
34070-162 = "O nome é Beatrice…… mais do que eu, era a Hime que se encontrava com ela."
34070-163 = "[s] \"……E o resto do 'Squad', como está agora?\""
34070-164 = "……Logo depois de levarem a Hime, sofremos um ataque…… nessa hora nos dispersamos, então não sei o paradeiro."
34070-165 = "Talvez ainda estejam sendo perseguidas pelas alunas de Arius."
34070-166 = "[s] \"Você sabe onde está a Atsuko, que foi levada?\""
34070-167 = "No distrito autônomo de Arius――a Basílica de Arius. No subsolo dela há um sanctum sanctorum secreto que \"ela\" preparou. Provavelmente, é lá."
34070-168 = "[s] \"A Basílica de Arius…… por que levar a Atsuko pra lá……?\""
34070-169 = "Até aí eu não sei. Aquele lugar também sempre foi só \"um lugar preparado pra Hime\"……."
34070-170 = "Só que a Hime, desde antes, dizia que um dia seria oferecida ali como \"sacrifício\"……."
34070-171 = "\"Ela\"…… deve realizar o ritual amanhã, junto com o amanhecer……"
34070-172 = "……O tempo que resta à Hime talvez já não exista."
34070-173 = "[s] \"……Entendi. Já compreendi a situação no geral.\""
34070-175 = "[ns3] Estende a mão à Saori.\n[ns4] Acolhe o desejo da Saori.\n[ns5] Ajuda a Saori."
34070-176 = "……."
34070-177 = "……."
34070-178 = "……."
34070-179 = "……De…… verdade?"
34070-180 = "Você vai…… me ajudar……?"
34070-181 = "[s] \"É que o pedido de um aluno não dá pra ignorar.\""
34070-182 = "……Só por esse motivo? ……Não pode ser."
34070-183 = "V-você esqueceu? Eu atirei em você!"
34070-184 = "Eu tentei tirar a sua vida, e, mesmo assim, você, tão fácil…… eu não compreendo…… por quê……."
34070-185 = "[s] \"Mas a bomba tá confiscada.\""
34070-186 = "……Sim, é claro. Como prometido."
34070-192 = "Este é o detonador. Pode apertá-lo a qualquer momento."
34070-193 = "[s] \"……Não só o detonador; tudo. As bombas, todas confiscadas.\""
34070-194 = "A-as bombas também……?"
34070-195 = "……Entendido. Se você diz……."
34070-199 = "[ns] Recebe as bombas."
34070-200 = "Mas fique tranquilo. Sem este detonador, elas jamais explodem."
34070-201 = "[s6] \"Que ótimo.\"\n[s7] \"É que eu não posso fazer vista grossa a um aluno carregando material perigoso.\""
34070-202 = "……?"
34070-203 = "……?"
34070-204 = "[ns] Quebra o detonador."
34070-207 = "O-o que você……!?"
34070-208 = "[ns] Joga os cacos do detonador quebrado no lixo."
34070-211 = "……."
34070-212 = "[s8] \"Vamos, não há tempo. Depressa.\"\n[s9] \"Primeiro, vamos nos juntar à Misaki e à Hiyori.\""
34070-213 = "O que, afinal……."
34070-214 = "O que, afinal……."
34070-215 = "[s] Parte."
34070-216 = "E-espera um pouco, Sensei. Eu ainda não ouvi o motivo……."
34070-218 = "E-espera……!!"
34070-226 = "Próximo Episódio;O \"Squad de Arius\""
