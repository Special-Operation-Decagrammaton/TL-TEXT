[translation]
34070-1 = "Episódio 7; Escolhas e Decisões"
34070-3 = "A-a condição da Seia-sama está...!?"
34070-4 = "Não dá, as convulsões e o sangramento não param..."
34070-5 = "Contatem o Esquadrão de Socorro imediatamente...!! Não importa se for a Sisterhood ou qualquer outro lugar, descubram logo como tratar isso...!"
34070-6 = "E a Nagisa-sama?"
34070-7 = "Ela está a caminho do hospital agora! Estamos tentando contato com os outros, mas..."
34070-8 = "E o Schale?"
34070-9 = "Não conseguimos contato desde agora há pouco! ...N-não me diga que algo aconteceu com o Sensei também...!?"
34070-10 = "Não diga coisas agourentas, continue tentando!"
34070-11 = "E a culpada! É a Mika Misono!? Aquela bruxa!!"
34070-15 = "Espere! A Mika-sama não fez nada..."
34070-16 = "Não foi por causa da visita dela ao quarto da Seia-sama que isso aconteceu? Aquela mulher com certeza fez alguma coisa!"
34070-21 = "Parem com isso! Discutir aqui agora não vai...!?"
34070-22 = "Assassina! Sua bruxa maldita!!"
34070-27 = "Apareça!!"
34070-30 = "[ns] \"Saori...?\""
34070-31 = "……."
34070-40 = "……."
34070-41 = "[s1] \"…………！？\"\n[s2] \"…………。\""
34070-42 = "……Sensei."
34070-43 = "……Sensei."
34070-44 = "A Atsuko foi... levada."
34070-45 = "Os outros membros também foram atacados pelo Arius e acabaram se dispersando... não sei se estão vivos ou mortos..."
34070-46 = "Desde aquele dia... estive fugindo, mas..."
34070-47 = "Eu não consegui impedi-la..."
34070-48 = "Se continuar assim... a Atsuko... a Princesa, vai morrer..."
34070-49 = "Amanhã de manhã... ao amanhecer, ela será morta por \"ela\"..."
34070-50 = "Sei que é difícil acreditar no que digo... mas isso é a verdade..."
34070-52 = "A Atsuko, desde o início, foi criada para ser assim..."
34070-53 = "Desde pequena, ela estava destinada a ser um \"sacrifício\"..."
34070-54 = "\"Ela\"..."
34070-55 = "Se eu quisesse mudar o destino da Princesa, deveria seguir as ordens dela..."
34070-56 = "Se eu fizesse isso, não apenas a Princesa... mas os outros membros também seriam salvos."
34070-57 = "Roubar o Tratado do Éden, colocar o poder da Sociedade de Santos Justina sob o controle de Arius — e tomar Trinity e Gehenna..."
34070-58 = "Assim, a Atsuko não precisaria se tornar um \"sacrifício\"..."
34070-59 = "Mas..."
34070-61 = "Eu falhei..."
34070-62 = "O Esquadrão Arius... não conseguiu cumprir a missão."
34070-63 = "Além de falhar em roubar o Tratado do Éden,"
34070-64 = "a conquista dos distritos de Trinity e Gehenna,"
34070-65 = "salvar meus companheiros,"
34070-66 = "e até mesmo proteger a Atsuko,"
34070-67 = "tudo... foi por minha incapacidade, nada disso se realizou."
34070-68 = "……Agora sou uma pária. Não posso pedir ajuda a Trinity, nem a Gehenna — nem mesmo ao próprio Arius."
34070-69 = "Por isso, a única pessoa em quem posso confiar agora é você, [USERNAME] Sensei..."
34070-70 = "Por favor..."
34070-71 = "……Juro pela minha vida, seguirei qualquer instrução que me der."
34070-72 = "……Esta \"bomba que destrói o Halo\", também a deixarei com você. Pode ficar com a minha vida em suas mãos."
34070-73 = "Se decidir que não pode confiar em mim, use-a... por isso, por favor."
34070-74 = "……."
34070-75 = "Por favor... a Atsuko..."
34070-76 = "A princesa... ajudem ela..."
34070-80 = "Apareça!! Misono Mika! Sua criminosa! É tudo culpa sua!"
34070-81 = "Porque você entrou em contato com Arius..."
34070-82 = "O Sensei... está sendo alvo do Esquadrão..."
34070-83 = "Porque você trouxe o Sensei para cá...!"
34070-84 = "Por minha causa... as coisas ficaram assim, não é..."
34070-85 = "...Culpa minha."
34070-86 = "Como sou uma idiota, a Seia-chan... eu nunca fui perdoada de verdade..."
34070-87 = "...Eu pensei que talvez houvesse uma chance de consertar as coisas."
34070-88 = "Com certeza, depois desta noite... amanhã de manhã, com a Nagi-chan, a Seia-chan e o Sensei... todos nós, juntos..."
34070-89 = "Deveria ter sido assim... mas por que tudo isso..."
34070-90 = "..."
34070-91 = "...Chance de redenção, que conto de fadas ridículo... não existe tal coisa... que idiota. Acreditar em algo assim..."
34070-92 = "Como sou uma idiota, fui usada pelo Arius... pelo \"Esquadrão Arius\"... pela Saori..."
34070-93 = "Por causa disso... machuquei pessoas importantes, causei ferimentos nelas... isso é como se..."
34070-94 = "Sua bruxa!!"
34070-95 = "..."
34070-96 = "Parem! Alguém, tragam o Comitê de Justiça logo!"
34070-100 = "...É verdade. Era isso mesmo..."
34070-108 = "..."
34070-109 = "...Nossa, pensando bem, é algo tão simples."
34070-110 = "...Saori, a fechadura do \"Esquadrão Arius\"... tudo é..."
34070-114 = "Aquela mulher é a culpada de tudo."
34070-115 = "Aquela mulher me usou — tentou destruir o halo da Seia-chan, lançou mísseis na Nagi-chan e feriu o Sensei..."
34070-116 = "Tudo... tudo, tudo, tudinho! Foi tudo planejado por aquela garota."
34070-117 = "...É isso. Já que as coisas chegaram a esse ponto... eu já sei o que preciso fazer."
34070-118 = "Minhas pessoas importantes estão passando por isso, não é estranho que apenas a Saori, a fechadura, continue vivendo em paz?"
34070-119 = "Sim, é isso. Exatamente — aquela mulher também..."
34070-120 = "Não é injusto que eu tenha que perder o que perdi, enquanto ela não perde nada?"
34070-121 = "As pessoas importantes dela também, da mesma forma... tudo."
34070-127 = "Me soltem! Apareça, Misono Mika!!"
34070-128 = "Não cause tumulto aqui! Agora a situação..."
34070-135 = "Argh!?"
34070-136 = "O-o que foi...!? A parede... quebrou!?"
34070-138 = "Foi mal~★"
34070-139 = "Hum... onde está minha arma mesmo..."
34070-140 = "Foi por ali? Bem, vamos indo."
34070-144 = "A, a parede... com as mãos nuas...?"
34070-145 = "...Mi, Misono Mika... Misono Mika..."
34070-146 = "Misono Mika escapou da prisão!!"
34070-152 = "..."
34070-153 = "[s] \"Levante-se, Saori.\""
34070-154 = "Ma, mas..."
34070-155 = "[s] \"Eu quero conversar com a Saori de igual para igual.\""
34070-156 = "..."
34070-158 = "..."
34070-159 = "[s] \"Deixe-me perguntar primeiro. De quem você está falando quando diz 'ela'?\""
34070-160 = "\"Ela\" é a representante do Distrito Autônomo de Arius e a mestra da filial de Arius. Nós a chamamos de \"ela\", mas outros estudantes a chamam de \"Madame\"."
34070-161 = "Eu mesma só a vi algumas vezes... é uma adulta alta, de pele avermelhada e que veste um vestido branco."
34070-162 = "O nome dela é Beatrice... A Princesa a via com mais frequência do que eu."
34070-163 = "[s] \"...O que aconteceu com o resto do 'Esquadrão'?\""
34070-164 = "...Logo depois que a Princesa foi levada, sofremos um ataque... Nos separamos naquela hora, então não sei o paradeiro delas."
34070-165 = "Talvez elas ainda estejam sendo perseguidas pelos alunos de Arius."
34070-166 = "[s] \"Você sabe onde a Atsuko, que foi levada, está?\""
34070-167 = "Fica no Distrito Autônomo de Arius — a Basílica de Arius. No subsolo, há um santuário secreto que 'ela' preparou. Provavelmente é lá."
34070-168 = "[s] \"A Basílica de Arius... Por que levaram a Atsuko para lá...?\""
34070-169 = "Não sei dizer. Só sei que aquele lugar também foi preparado para a Princesa há muito tempo..."
34070-170 = "Mas a Princesa dizia há tempos que, um dia, ela seria oferecida como 'sacrifício' lá..."
34070-171 = "'Ela'... pretende realizar o ritual ao amanhecer de amanhã..."
34070-172 = "...Talvez não reste mais tempo para a Princesa."
34070-173 = "[s] \"...Entendido. Já entendi a situação geral.\""
34070-175 = "[ns3] Oferecer ajuda a Saori.\n[ns4] Atender ao desejo de Saori.\n[ns5] Salvar a Saori."
34070-176 = "……"
34070-177 = "……"
34070-178 = "……"
34070-179 = "...Sério?"
34070-180 = "Você vai... me ajudar?"
34070-181 = "[s] \"Não posso ignorar o pedido de uma aluna.\""
34070-182 = "...Só por esse motivo? ...Não pode ser."
34070-183 = "V-você esqueceu? Eu atirei em você!"
34070-184 = "Eu tentei tirar a sua vida, então por que você... não consigo entender... por que..."
34070-185 = "[s] \"Mas, vou confiscar a bomba.\""
34070-186 = "...Ah, entendo. Como prometido."
34070-192 = "Este é o detonador. Pode apertá-lo quando quiser."
34070-193 = "[s] \"...Não apenas o detonador, tudo. Vou confiscar todas as bombas.\""
34070-194 = "A-as bombas também...?"
34070-195 = "...Entendido. Se é isso que você diz..."
34070-199 = "[ns] Receber a bomba."
34070-200 = "Mas pode ficar tranquilo. Sem este detonador, ela nunca explodirá."
34070-201 = "[s6] \"Que bom.\"\n[s7] \"Não posso deixar passar o fato de uma aluna estar carregando itens perigosos.\""
34070-202 = "……？"
34070-203 = "……？"
34070-204 = "[ns] Destruir o detonador."
34070-207 = "O-o que você está...!"
34070-208 = "[ns] Jogar os pedaços do detonador destruído na lixeira."
34070-211 = "……"
34070-212 = "[s8] \"Vamos, não temos tempo. Precisamos nos apressar.\"\n[s9] \"Primeiro, vamos nos encontrar com a Misaki e a Hiyori.\""
34070-213 = "O que, afinal, você está..."
34070-214 = "O que, afinal, você está..."
34070-215 = "[s] Partir."
34070-216 = "E-ei, espere um pouco, Sensei. Eu ainda não ouvi o motivo..."
34070-218 = "E-espere...!!"
34070-226 = "Próximo episódio: \"Esquadrão de Arius\""
