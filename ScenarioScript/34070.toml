[translation]
34070-1 = "Episódio 7; Escolhas e Decisões"
34070-3 = "E-E como está a Seia-sama...!?"
34070-4 = "Não parece bom, as convulsões e o sangramento não param..."
34070-5 = "Entrem em contato com os Cavaleiros Hospitalários imediatamente...!! Ou com a Irmandade, não importa quem, só descubram como tratá-la rápido...!"
34070-6 = "E a Nagisa-sama?"
34070-7 = "Ela está a caminho do hospital agora! Estou tentando contatar as outras também, mas..."
34070-8 = "E a 'Schale'?"
34070-9 = "Não consigo entrar em contato com ele há um tempo! ...N-Não me diga que aconteceu algo com o Sensei também...!?"
34070-10 = "Não diga uma coisa dessas e continue tentando!"
34070-11 = "A culpada foi a Mika Misono!? Foi aquela bruxa!!"
34070-15 = "Por favor, esperem! A Mika-sama não fez nada..."
34070-16 = "Foi ela quem foi visitar o quarto da Seia-sama e logo depois isso aconteceu, não foi? É óbvio que aquela mulher fez alguma coisa!"
34070-21 = "Parem com isso! Ficar brigando aqui não vai resolver nada...!?"
34070-22 = "Assassina! Sua bruxa!!"
34070-27 = "Apareça logo!!"
34070-30 = "[ns] \"Saori...?\""
34070-31 = "......"
34070-40 = "......"
34070-41 = "[s1] \"............!?\"\n[s2] \"............\""
34070-42 = "......Sensei."
34070-43 = "......Sensei."
34070-44 = "A Atsuko... foi levada."
34070-45 = "Nós fomos atacadas pela própria Arius... o Esquadrão se dispersou e eu nem sei se estão vivas ou mortas..."
34070-46 = "E eu tenho fugido nos últimos dias... mas..."
34070-47 = "Eu não fui capaz de impedi-la..."
34070-48 = "Nesse ritmo... a Atsuko... a Princesa vai morrer..."
34070-49 = "Amanhã de manhã... ao nascer do sol, 'ela' vai matá-la..."
34070-50 = "Você provavelmente não vai acreditar em nada do que eu disser... mas isso é a verdade..."
34070-52 = "A Atsuko foi criada com esse único propósito desde o início..."
34070-53 = "O destino dela era ser o nosso 'sacrifício' desde criança..."
34070-54 = "'Ela'..."
34070-55 = "Me disse que, se eu quisesse mudar o destino da Princesa, teria de obedecer às suas ordens..."
34070-56 = "Que se eu fizesse isso, pouparia não apenas a Princesa... mas as minhas companheiras também."
34070-57 = "Me disse que se eu roubasse o Tratado do Éden, usasse a Sociedade dos Santos Justina a favor de Arius, e colocasse a Trinity e Gehenna sob o seu controle..."
34070-58 = "A Atsuko não precisaria mais ser um 'sacrifício'..."
34070-59 = "Mas..."
34070-61 = "Eu falhei..."
34070-62 = "O Esquadrão Arius... falhou em sua missão."
34070-63 = "Eu não só falhei em roubar o Tratado do Éden,"
34070-64 = "Como também na conquista de Trinity e de Gehenna."
34070-65 = "Não consegui salvar minhas companheiras,"
34070-66 = "E muito menos consegui proteger a Atsuko."
34070-67 = "Tudo isso... porque eu fui fraca, eu não consegui nada."
34070-68 = "......Agora eu não passo de um fracasso. Eu não posso pedir ajuda a Trinity, a Gehenna e nem à própria Arius."
34070-69 = "Por isso, a única pessoa a quem eu posso recorrer... é você, Sensei [USERNAME]."
34070-70 = "Eu imploro..."
34070-71 = "......Juro pela minha própria vida, seguirei qualquer ordem sua."
34070-72 = "......Eu até te dou a 'bomba que destrói halos'. Minha vida está em suas mãos."
34070-73 = "Se julgar que não sou digna de confiança, use-a... por favor."
34070-74 = "......"
34070-75 = "Eu imploro... por favor, salve a Atsuko..."
34070-76 = "Salve... a Princesa..."
34070-80 = "Saia logo!! Mika Misono! Sua criminosa terrível! Tudo isso é culpa sua!"
34070-81 = "Por sua culpa, por ter feito contato com a Arius..."
34070-82 = "O Sensei... é o alvo do Esquadrão..."
34070-83 = "Porque foi você quem trouxe o Sensei...!"
34070-84 = "As coisas... chegaram a esse ponto por minha culpa..."
34070-85 = "......A culpa é minha."
34070-86 = "Eu fui tão idiota, e por isso a Seia-chan... Ela nunca tinha me perdoado de verdade..."
34070-87 = "......E eu pensando que talvez eu tivesse uma chance de consertar as coisas."
34070-88 = "Eu tinha certeza de que depois de hoje... na manhã de amanhã, com a Nagi-chan, a Seia-chan e o Sensei... a gente ia passar por isso juntas..."
34070-89 = "Era para ser assim... por que as coisas acabaram..."
34070-90 = "......"
34070-91 = "......Como eu fui burra de achar que uma segunda chance parecida com conto de fadas existiria... Sou uma idiota mesmo. Por ter acreditado em algo assim..."
34070-92 = "Por eu ser uma idiota, que se deixou ser usada pela Arius... pelo 'Esquadrão Arius'... e por aquela Saori..."
34070-93 = "Por causa disso... eu acabei machucando e ferindo as pessoas que são importantes para mim... Desse jeito..."
34070-94 = "Sua bruxa!!"
34070-95 = "......"
34070-96 = "Parem com isso! Alguém chame o Comitê de Realização da Justiça logo!"
34070-100 = "......Sim. É isso mesmo..."
34070-108 = "......"
34070-109 = "......Nossa, até que é algo bem simples se eu parar pra pensar."
34070-110 = "......Tudo é culpa da Saori Joumae, do 'Esquadrão Arius'..."
34070-114 = "É aquela mulher a raiz de todos os meus problemas."
34070-115 = "Foi ela quem me usou para tentar destruir o halo da Seia-chan, que disparou aquele míssil na direção da Nagi-chan e que machucou o Sensei..."
34070-116 = "Tudo... Tudo, tudo, tu-di-nho! Foi tudo parte do plano dela."
34070-117 = "......É verdade. Se for para terminar desse jeito... Eu já sei exatamente o que devo fazer."
34070-118 = "Não acha injusto as pessoas que eu amo sofrerem enquanto aquela Saori Joumae vive na paz?"
34070-119 = "Sim, você tem razão. Isso mesmo――aquela mulher também tem que..."
34070-120 = "Seria injusto ela não perder as coisas na mesma medida que eu perdi, não acha."
34070-121 = "As pessoas que são importantes pra ela... tudo."
34070-127 = "Saiam da frente! Apareça logo, Mika Misono!!"
34070-128 = "Parem de causar esse tumulto todo! Temos que avaliar a situação..."
34070-135 = "Gah!?"
34070-136 = "M-Mas o que...!? A parede... ela quebrou!?"
34070-138 = "Desculpem por isso~★"
34070-139 = "Hum... Onde eu deixei a minha arma mesmo..."
34070-140 = "Acho que foi pra lá. Bom, é hora de ir, né."
34070-144 = "A-A parede... com as próprias mãos...?"
34070-145 = "......M-Mika Misono... a Mika Misono..."
34070-146 = "A MIKA MISONO FUGIU DA PRISÃO!!"
34070-152 = "......"
34070-153 = "[s] \"Levante-se, Saori.\""
34070-154 = "M-Mas..."
34070-155 = "[s] \"Quero falar com você de igual para igual.\""
34070-156 = "......"
34070-158 = "......"
34070-159 = "[s] \"Antes de tudo, quero fazer uma pergunta. A quem você se refere com 'ela'?\""
34070-160 = "A 'ela' é a representante do distrito autônomo e mestre da filial de Arius. Nós a chamamos assim, mas as outras alunas a chamam de 'Madame'."
34070-161 = "Só a vi algumas vezes... ela é alta, tem pele vermelha e usa um vestido branco."
34070-162 = "O nome dela é Beatrice... A Princesa a via com mais frequência do que eu."
34070-163 = "[s] \"...Onde estão as outras integrantes do 'Esquadrão'?\""
34070-164 = "......Fomos atacadas logo após a Princesa ser levada... nós nos dispersamos durante o ataque e não sei do paradeiro delas."
34070-165 = "É possível que ainda estejam sendo caçadas pelas alunas de Arius."
34070-166 = "[s] \"Você faz ideia de para onde a Atsuko pode ter sido levada?\""
34070-167 = "Para a Basílica de Arius, dentro do distrito autônomo. No subsolo, há um santuário secreto que a 'ela' preparou. Provavelmente estão lá."
34070-168 = "[s] \"Basílica de Arius... e por que a Atsuko...?\""
34070-169 = "Eu não sei. Só sei que aquele lugar já estava preparado para a Princesa..."
34070-170 = "Mas a Princesa vinha me dizendo há muito tempo que seria oferecida como 'sacrifício' naquele lugar..."
34070-171 = "E que a 'ela'... planeja realizar o ritual amanhã de manhã ao nascer do sol..."
34070-172 = "......É bem provável que a Princesa já não tenha mais muito tempo."
34070-173 = "[s] \"......Entendi. Já tenho uma noção do que está acontecendo.\""
34070-175 = "[ns3] Oferece a mão para Saori.\n[ns4] Atende ao pedido de Saori.\n[ns5] Decide ajudar Saori."
34070-176 = "......"
34070-177 = "......"
34070-178 = "......"
34070-179 = "......É sério...?"
34070-180 = "Você vai... mesmo me ajudar...?"
34070-181 = "[s] \"Como eu poderia ignorar o pedido de ajuda de uma das minhas alunas.\""
34070-182 = "......Só por causa disso? ...Eu não acredito."
34070-183 = "V-Você esqueceu? Eu atirei em você!"
34070-184 = "Como pode concordar tão fácil quando fui eu quem tentou te matar... Não consigo entender... Por quê..."
34070-185 = "[s] \"Mas a bomba está confiscada.\""
34070-186 = "......Sim, claro. Como o prometido."
34070-192 = "Este é o detonador. Pode apertá-lo a qualquer momento."
34070-193 = "[s] \"...Não só o detonador, passa o resto. Estou confiscando todas as suas bombas.\""
34070-194 = "A-As bombas também...?"
34070-195 = "......Tudo bem. Se você insiste..."
34070-199 = "[ns] Pega a bomba."
34070-200 = "Pode ficar tranquilo. Sem o detonador, ela jamais explodirá."
34070-201 = "[s6] \"Fico mais aliviado em ouvir isso.\"\n[s7] \"Pois não posso deixar uma das minhas alunas sair andando por aí com materiais perigosos.\""
34070-202 = "......?"
34070-203 = "......?"
34070-204 = "[ns] Destrói o detonador."
34070-207 = "O-O que você...!"
34070-208 = "[ns] Joga os restos quebrados do detonador na lixeira."
34070-211 = "......"
34070-212 = "[s8] \"Pois bem, não temos muito tempo a perder. Vamos logo.\"\n[s9] \"Primeiro, vamos atrás da Misaki e da Hiyori.\""
34070-213 = "O que foi que você..."
34070-214 = "O que foi que você..."
34070-215 = "[s] Se prepara para sair."
34070-216 = "E-Espera um pouco, Sensei. Eu ainda não ouvi a sua resposta..."
34070-218 = "E-Espera um pouco...!!"
34070-226 = "Próximo Episódio; 'Esquadrão Arius'"