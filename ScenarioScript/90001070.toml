[translation]
90001070-1 = "Episódio 7; Exploração"
90001070-3 = "[ns] \"Onde estamos...?\""
90001070-5 = "Será que é uma passagem de serviço para a instalação de antes...?"
90001070-6 = "Parece que usamos explosivos demais... Está tudo desmoronando por toda parte e não dá para entender nada."
90001070-11 = "Eu apenas segui o ensinamento de que \"nunca se usa explosivos demais\"."
90001070-12 = "Já que certa pessoa costumava escrever isso frequentemente em seus relatórios."
90001070-18 = "[ns] (Eu sinto que sei de quem é esse relatório...)"
90001070-22 = "Não há unidades inimigas por perto. Vamos seguir em frente."
90001070-23 = "Sim, eu também fiquei curiosa sobre o que há mais adiante."
90001070-27 = "Estou ouvindo um som... #nAquilo é... uma esteira rolante?"
90001070-28 = "Parece que estão processando os recursos coletados."
90001070-29 = "Provavelmente, este lugar é uma \"fábrica de processamento\"."
90001070-30 = "...É de uma escala considerável. #nSinto como se estivesse em uma enorme siderúrgica."
90001070-32 = "Vestígios de movimentação, perfuratrizes, estações de rádio com interferência e, agora, uma fábrica de processamento..."
90001070-33 = "...O que exatamente está acontecendo nesta região? #nPor que ninguém percebeu?"
90001070-34 = "Crises mundiais e conspirações geralmente são assim."
90001070-36 = "Radar desativado. #nInvasão inimiga confirmada."
90001070-37 = "Então... vamos começar?"
90001070-38 = "Temos que encurralá-los ainda mais... lá no fundo, certo? #nDeixe comigo!"
90001070-39 = "Fufu... essa é a tática mais básica. #nAtraí-los para um beco sem saída e acabar com tudo de uma vez."
90001070-40 = "Posicionamento concluído. #nEin, é a sua vez!"
90001070-41 = "S-sim! Dizem que os animais carnívoros perseguem suas presas da base da montanha para o topo! E-eu não entendo muito bem, mas!"
90001070-42 = "Foi a Soph quem me ensinou isso antigamente!"
90001070-43 = "Não é o contrário?"
90001070-44 = "Eh!? S-sério...?"
90001070-45 = "Não tem problema se você não souber. #nAfinal, nunca vimos animais herbívoros ou carnívoros por aqui."
90001070-55 = "!? O que foi isso!?"
90001070-56 = "Será que...? #nPresença de forças inimigas confirmada! Preparem-se!"
90001070-64 = "Um dos servos de Decagrammaton...? #nTem mais deles do que antes... O que faremos, Chefe?"
90001070-65 = "Entrando em posição de combate."
90001070-66 = "Toki, espere. #nO Abi-Eshuh não é adequado para combate em ambientes fechados!"
90001070-67 = "Além disso, como a Eimi disse, é imprudente enfrentar esse número de inimigos."
90001070-68 = "C-compreendido, Rio-sama."
90001070-69 = "...Existe alguma rota de fuga, Rio?"
90001070-70 = "Estou calculando agora."
90001070-71 = "As forças inimigas estão posicionadas na direção de onde viemos, então a retirada será difícil."
90001070-72 = "À frente, o número de inimigos é relativamente menor — parece haver outra saída por ali."
90001070-73 = "Ou seja, a única opção que temos agora é seguir para o outro lado da esteira rolante."
90001070-74 = "Não sei o que há lá na frente, mas..."
90001070-82 = "Não parece haver escolha. Vamos em frente."
90001070-83 = "Ainda acho que deveríamos lutar..."
90001070-84 = "Isso é loucura. Não é hora para brincadeiras."
90001070-88 = "...Entendido. Então, vamos abrir caminho rapidamente."
90001070-97 = "(O posicionamento das tropas está estranhamente escasso...)"
90001070-98 = "(Há uma grande chance de ser uma armadilha... Mas o Sensei e a Himari estão aqui. Por enquanto, preciso priorizar a resolução do problema...)"
