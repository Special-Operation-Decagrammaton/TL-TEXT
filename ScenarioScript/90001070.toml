[translation]
90001070-1 = "第7話;探索"
90001070-3 = "[ns] \"ここは……？\""
90001070-5 = "さっきの施設との連絡通路かな……？"
90001070-6 = "爆薬を使いすぎちゃったみたい……あちこち崩れちゃっててよく分からなくなってるね。"
90001070-11 = "私は「爆薬に使いすぎなんてない」という教えに従ったまでです。"
90001070-12 = "とある方が、報告書によく書いていましたので。"
90001070-18 = "[ns] （誰の報告書なのか、分かるような……）"
90001070-22 = "その付近に敵部隊はいないわ。先に進みましょう。"
90001070-23 = "ええ、私もこの先に興味が湧いてきました。"
90001070-27 = "音が聞こえる……。#nあれは……ベルトコンベアかな？"
90001070-28 = "採取した資源を加工しているようですね。"
90001070-29 = "ここはおそらく「加工工場」なのではないかと。"
90001070-30 = "……かなりの規模ですね。#n巨大な製鉄所にいる気分です。"
90001070-32 = "移動の痕跡、[ruby=しすいき]試錐機[/ruby]、妨害電波の無線局、そして加工工場……"
90001070-33 = "……この地域で一体、何が起こっているのでしょうか？#n何故誰も気づかないのでしょう？"
90001070-34 = "世界の危機や陰謀というのは、往々にしてそういうものよ。"
90001070-36 = "レーダーサイト停止。#n敵の侵入を確認。"
90001070-37 = "それじゃ……始めよっか。"
90001070-38 = "もっと、も～っと……奥へ追い込んでいけば良いんですよね？#nま、任せてください！"
90001070-39 = "ふふ……もっとも基本的な戦術です。#n袋小路に誘い込んで、一気に仕留める。"
90001070-40 = "配置完了。#nアイン、出番だよ！"
90001070-41 = "は、はい！に、肉食動物は、山の下から上へ獲物を追い込むといいますから！よ、よくわかりませんが！"
90001070-42 = "昔、ソフにそう教えてもらいました！"
90001070-43 = "それ逆じゃない？"
90001070-44 = "ふえぇ！？そ、そうなんですか……？"
90001070-45 = "知らなくても仕方ないですよ。#n私たちは草食動物も肉食動物も見たことありませんから。"
90001070-55 = "ッ！？何事ですか！？"
90001070-56 = "まさか……？#n敵兵力の出現を確認！構えて！"
90001070-64 = "デカグラマトンの眷属……？#n今までより数が多いよ……どうする、部長？"
90001070-65 = "応戦準備に入ります。"
90001070-66 = "トキ、待ちなさい。#nアビ・エシュフは屋内戦向きではないわ！"
90001070-67 = "それに、エイミの言うとおり、あの数を相手するのは無謀よ。"
90001070-68 = "し、承知しました、リオ様。"
90001070-69 = "……脱出ルートはありますか、リオ？"
90001070-70 = "いま計算中よ。"
90001070-71 = "敵兵力は私たちが来た方向に陣取っているから、退却は難しそうだわ。"
90001070-72 = "前方は比較的敵の数が少ない――この先に別の出口もあるようね。"
90001070-73 = "つまり、いま選べるのはベルトコンベアの向こう側しかないということですね。"
90001070-74 = "この先に何があるのかは分からないけど……。"
90001070-82 = "選択肢はなさそうだね。進もう。"
90001070-83 = "やはり、応戦した方が――"
90001070-84 = "それは無茶だよ。今はふざけてる場合じゃないよ。"
90001070-88 = "……分かりました。それでは、迅速に活路をひらきましょう。"
90001070-97 = "（不自然ともいえるほど手薄な兵の配置……）"
90001070-98 = "（罠の可能性も高い……けれど、先生もヒマリもいるもの。今は問題の解決を優先しなければ……）"
