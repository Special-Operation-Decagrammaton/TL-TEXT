[translation]
10038060-1 = "Episódio 6: Nós em um futuro distante"
10038060-7 = "……Não está apertado, Sensei?"
10038060-8 = "[s1] \"Eu estou bem.\"\n[s2] \"E quanto à Kisaki, Mina... e a Lumi?\""
10038060-11 = "Sobre as três... ou melhor, as duas e a pequena, não se preocupe. #nJá as encaminhei para o lugar mais seguro da Associação Genbu."
10038060-12 = "Sensei, também o levarei para lá mais tarde."
10038060-13 = "Além disso, como conseguimos um favor da Líder da Seita, nem tudo é ruim."
10038060-14 = "Tudo isso, claro, depois que as coisas se acalmarem... e a Líder da Seita recuperar seu posto original."
10038060-15 = "[s] \"Como estão as coisas lá fora?\""
10038060-16 = "Sim. Primeiro, a Presidente Lumi ainda não reverteu o fenômeno de rejuvenescimento."
10038060-17 = "Todas as alunas que caíram no mesmo fenômeno estão em um estado em que não podem sair muito."
10038060-18 = "Especialmente alunas com muitos contatos, como a Presidente."
10038060-19 = "No entanto, a rede de informações da Associação Genbu ainda está intacta, então podemos obter informações externas mesmo estando aqui."
10038060-20 = "E sobre a situação atual da Genryumon..."
10038060-25 = "Parece que, dentro e fora da Genryumon, as críticas... ou melhor, as vozes de condenação contra a Líder da Seita estão aumentando."
10038060-28 = "Sim... Eu mesma duvidei dos meus ouvidos no início."
10038060-29 = "Claro, nem todos os membros da Genryumon pensam assim, mas dizem que vozes de dúvida e condenação contra a Líder Kisaki estão surgindo, principalmente entre os membros da linha dura."
10038060-30 = "O que elas questionam é o fato de a Líder da Seita estar no cargo atual—"
10038060-31 = "Sobre o processo de como ela se tornou a presidente do conselho estudantil, por assim dizer..."
10038060-38 = "Para começar, a própria nomeação da Líder Kisaki foi estranha!"
10038060-39 = "Originalmente, o cargo de Líder da Seita deveria ser ocupado por uma aluna do terceiro ano. #nE ainda assim, a Líder Kisaki assumiu o cargo estando no segundo ano!"
10038060-43 = "Como resultado, a Líder Kisaki quebrou a tradição para assumir o cargo, não foi?!"
10038060-44 = "Mas isso... não foi por aclamação da própria Genryumon?"
10038060-45 = "Além disso, a causa disso foi a queda da antiga Líder da Seita..."
10038060-46 = "A queda da Líder da Seita foi um escândalo que, originalmente, não deveria ter acontecido... não foi algo inevitável?"
10038060-47 = "Como resultado, a Líder Kisaki quebrou a tradição para assumir o cargo, não foi?!"
10038060-48 = "Em outras palavras, pode-se dizer que a Líder Kisaki estava contra a tradição desde o início!"
10038060-49 = "Mesmo sabendo que ia contra a tradição, não foi uma decisão unânime? #nVocê vai mesmo desenterrar isso agora?"
10038060-50 = "É exatamente por isso! Não chegou a hora de corrigir essas coisas que estavam erradas desde o início?!"
10038060-53 = "[ns] \"Não seria melhor não contar para a Kisaki...?\""
10038060-54 = "Se eu não contar, acho que depois ela perguntará: \"Por que não me contou mais cedo?\""
10038060-55 = "Ela provavelmente diria: \"Afinal, como Líder da Seita, devo aceitar qualquer tipo de avaliação\"."
10038060-59 = "Ah, eu imitei bem agora? #nÉ mesmo... obrigado."
10038060-60 = "……Sensei, você é realmente uma pessoa muito fácil de lidar."
10038060-61 = "[s] \"Eu estou do lado das alunas, afinal!\""
10038060-62 = "Quanto a mim, fico até preocupada em como devo lidar com o Sensei..."
10038060-66 = "N-não é nada. #nVamos continuar com o assunto."
10038060-70 = "A principal responsável por causar toda essa comoção, Shintani Kai do Clube de Pesquisa de Alquimia, parecia não ter muito interesse no que aconteceria depois de ter causado o incidente."
10038060-74 = "Ora? As discussões e debates na Genryumon estão mais intensos do que o esperado...?"
10038060-75 = "—Agora que a Líder Kisaki não está, como devemos governar a Genryumon e Shanhaijing?"
10038060-76 = "E, existe legitimidade em continuar mantendo a Líder Kisaki como nossa soberana?"
10038060-77 = "Haa... isso tem alguma relação com o Elixir?"
10038060-78 = "Se você tem tempo para se envolver com esses boatos, deveria se dedicar à conclusão do Elixir."
10038060-82 = "Faltam materiais e processamento — e, acima de tudo, a quantidade de Ginseng Milenar é drasticamente insuficiente."
10038060-83 = "Se faltar algo, peça à Genryumon. Se ainda assim não for suficiente, peça à Associação Genbu. #nEstou voltando para o laboratório."
10038060-84 = "Francamente... só tem gente inútil aqui."
10038060-90 = "……Por causa disso, a Associação Genbu, que está com suas atividades parcialmente paralisadas, também está sofrendo pressão do Clube de Pesquisa de Alquimia."
10038060-91 = "Em uma \"Shanhaijing normal\", o papel da Genryumon seria mediar esse tipo de situação, mas agora..."
10038060-95 = "A Associação Genbu também não pode fugir de sua responsabilidade!"
10038060-96 = "Este incidente também, as \"forças externas\" lideradas pela Associação Genbu!"
10038060-97 = "Com certeza causaram esse tumulto de propósito para forçar o cancelamento do Festival do Luar, por vingança contra as restrições de acesso impostas à associação!"
10038060-98 = "Isso não é uma especulação exagerada...?#nVocê tem provas?"
10038060-99 = "Todos vocês aqui, por favor, reavaliem suas posições mais uma vez!#nSe vocês estão do lado do Genryumon, que protege as tradições de Shanhaijing, ou do lado de outros!"
10038060-100 = "Agora que o assento do líder está temporariamente vago, se nós não protegermos o Genryumon e Shanhaijing, quem protegerá?!"
10038060-101 = "......Concordo que, como tudo está no meio do caos, precisamos de uma pedra de toque."
10038060-102 = "Mas, quem deveríamos apoiar para assumir o cargo...?"
10038060-103 = "O que mais precisamos fazer agora é — voltar à posição de valorizar as tradições."
10038060-104 = "Como...?"
10038060-110 = "Acho que o melhor seria procurar os clubes e pessoas mais envolvidos com as tradições de Shanhaijing."
10038060-113 = "[ns] \"O Genryumon está tentando encontrar um substituto para Kisaki...?\""
10038060-114 = "......"
10038060-115 = "Para ser sincera, eu não tenho sentimentos muito bons em relação ao Genryumon, para começar."
10038060-116 = "No entanto, reconheço que o Genryumon é indispensável para Shanhaijing.#nIsso provavelmente não mudará no futuro. É necessário para manter o equilíbrio."
10038060-117 = "E pensar que esse Genryumon quer expulsar a líder Kisaki só porque ela está contra a \"tradição\"..."
10038060-118 = "[s] \"......\""
10038060-120 = "[ns] \"Pode continuar de onde parou?\""
10038060-124 = "Entendido. Acho que consegui transmitir todas as informações que obtive até agora."
10038060-125 = "No fim das contas, a linha dura do Genryumon — concordou quase unanimemente em encontrar um substituto para a líder Kisaki."
10038060-129 = "O Clube de Ópera de Pequim, é...?"
10038060-130 = "......Pensando de forma abrangente, o Clube de Ópera de Pequim não seria o ideal?#nÉ o clube que continua protegendo a Ópera de Pequim, que é a própria tradição de Shanhaijing."
10038060-131 = "Além disso, a própria Ópera de Pequim exige força física, e o poder de combate do Clube de Ópera de Pequim, que suportou o treinamento rigoroso de Kaguya, está entre os melhores de Shanhaijing."
10038060-132 = "Mas, será que podemos dizer que isso é o correto...?#nPodemos realmente dizer que essa é uma decisão que protege a tradição?"
10038060-133 = "......"
10038060-137 = "Eu penso o seguinte."
10038060-138 = "Para julgar isso — deveríamos libertar Kaguya e ouvir a opinião dela."
10038060-145 = "[ns] \"As coisas parecem estar ficando estranhas, não é?\""
10038060-146 = "Como devemos pensar sobre essa mudança de ventos... nem eu mesma sei."
10038060-147 = "Por isso, queria consultar o Sensei."
10038060-151 = "Ah, mas não precisa levar isso tão a sério."
10038060-152 = "Além disso, só de você me ouvir assim, já é mais do que suficiente."
10038060-153 = "[s5] \"Entendo... Na minha opinião pessoal...\"\n[s6] \"Isso é apenas uma opinião pessoal, então sinta-se à vontade para ignorar.\""
10038060-156 = "Obrigada, Sensei.#nAh, quer que façamos como se fosse uma aula?"
10038060-157 = "Devemos fazer o comando de levantar, saudar e sentar?#nAh, não precisa...? Desculpe."
10038060-158 = "\"Vácuo de poder\", é? Já ouvi falar, mas..."
10038060-159 = "......Entendo.#nNormalmente, isso se refere a uma situação em que um ambicioso entra onde o poder desapareceu, mas —"
10038060-160 = "Às vezes, um terceiro pode apoiar alguém e empurrá-lo para essa posição..."
10038060-161 = "Poder, ou seja, autoridade — é uma questão de responsabilidade e onde ela reside."
10038060-162 = "Pois é... Incidentes e tumultos nunca desaparecem, e a busca pela responsabilidade sobre eles sempre ocorre."
10038060-163 = "E alguém precisa assumir a responsabilidade final e tomar a decisão..."
10038060-167 = "Nesse sentido, talvez seja mais feliz para o indivíduo se um ambicioso ocupar esse lugar... é, talvez."
10038060-168 = "Pelo menos, como indivíduo ambicioso, ele poderá satisfazer sua sede e desejo por fama e lucro."
10038060-169 = "Mas se alguém acabar assumindo esse cargo não por vontade própria, mas por aclamação dos outros, então isso..."
10038060-173 = "......"
10038060-174 = "A presidente Kaguya que eu conheço, pelo menos, não é uma pessoa ambiciosa."
10038060-175 = "Ela é apenas teimosa e inflexível — se for para definir, é um tipo mais próximo de um artesão ou artista."
10038060-176 = "[s7] \"Sim. Por isso, se Kaguya for \"aclamada\".\"\n[s8] \"Isso seria...\""
10038060-186 = "......É verdade."
10038060-190 = "Isso provavelmente — poderia se tornar uma tragédia para todos nós."
10038060-198 = "Você está livre. Pode sair, presidente Kaguya."
10038060-204 = "Isso é repentino. Essa é uma decisão da líder?"
10038060-209 = "......"
10038060-210 = "……Esta é a decisão da Genryumon."
10038060-212 = "Poderia me explicar o verdadeiro motivo?"
10038060-213 = "Explico a situação mais tarde. Por enquanto, vamos sair daqui."
10038060-220 = "……Esses foram os acontecimentos que levaram ao tumulto em Shanhaijing."
10038060-221 = "E-espere um pouco. Então... a Mestra do Portão desapareceu, Shintani Kai retornou e colocou o Clube de Pesquisa de Alquimia em movimento... não, espere, antes disso!"
10038060-222 = "Por causa do fenômeno de rejuvenescimento, a Associação Comercial Genbu está praticamente com as operações suspensas...?"
10038060-223 = "E, além disso, nem sabemos se o Festival do Luar poderá ser realizado...?"
10038060-224 = "Como chegamos a tal situação...!?"
10038060-229 = "……"
10038060-231 = "— Diretora Kaguya. Para corrigir essa confusão e desordem, mesmo que seja temporariamente."
10038060-232 = "A Genryumon concluiu que é necessário um grupo capaz de proteger as tradições de Shanhaijing acima de tudo."
10038060-233 = "E esse grupo é... o Clube de Ópera de Pequim."
10038060-235 = "Exatamente."
10038060-240 = "Sinto-me honrada. Mas... parece haver outro motivo para ter me chamado aqui."
10038060-241 = "Sim — serei direta."
10038060-247 = "Mesmo que seja temporário — por favor, assuma o cargo de Mestra do Portão."
10038060-253 = "……!"
10038060-255 = "A Shanhaijing atual precisa de tradição e ordem. Pelo que soubemos no interrogatório anterior, ouvi dizer que você também é a favor do retorno temporário de Shintani Kai."
10038060-256 = "E, como essa condição foi atendida atualmente — se tudo correr bem, você poderá guiar Shanhaijing da forma que deseja."
10038060-262 = "……"
10038060-264 = "Como devo contar isso à Mestra do Portão e à Presidente...?"
10038060-265 = "[s] \"……Eu darei um jeito nisso.\""
10038060-266 = "Agradeço. Mas... os problemas se acumulam. Precisamos considerar várias possibilidades e pensar no próximo passo."
10038060-267 = "O fato de a Diretora Kaguya assumir o cargo também não é isento de problemas."
10038060-268 = "É evidente que surgirão discussões sobre a legitimidade."
10038060-269 = "De fato... atualmente, a única que pode garantir a legitimidade é Shintani Kai."
10038060-273 = "Ela é a culpada por colocar a Mestra Kisaki nesta situação... e, bem... ela mesma tem circunstâncias que permitem uma redução de pena."
10038060-274 = "……Afinal, ela já deveria ter se formado."
10038060-277 = "Mas parece que o Clube de Pesquisa de Alquimia decidiu se retirar deste problema. Pelo menos, enquanto Shintani Kai tiver essa qualificação—"
10038060-278 = "Se ela tivesse demonstrado a intenção de transferir isso para a Genryumon... ou para outro clube, de qualquer forma, as coisas poderiam ter avançado com mais facilidade."
10038060-279 = "Mas, no momento..."
10038060-280 = "[s] \"No fim, tudo depende da escolha da Kaguya.\""
10038060-281 = "Sim..."
10038060-282 = "Não é exagero dizer que tudo depende dessa escolha."
10038060-285 = "— Entendido."
10038060-286 = "A situação atual de Shanhaijing... e o fato de que, agora, o que precisamos é manter a tradição e restaurar a ordem."
10038060-291 = "Então...!"
10038060-292 = "……"
10038060-297 = "……"
10038060-298 = "— Eu recuso. A única coisa que não posso fazer é assumir o cargo de Mestra do Portão."
10038060-303 = "Por que não!?"
10038060-304 = "……!"
10038060-306 = "Porque a Genryumon está fazendo uma exigência contraditória a mim e ao Clube de Ópera de Pequim: destruir a tradição para proteger a tradição de Shanhaijing."
10038060-307 = "I-isso é..."
10038060-308 = "E, enquanto o paradeiro da Mestra Kisaki for desconhecido, eu assumir esse cargo seria nada menos que uma rebelião, indo contra a minha lealdade."
10038060-310 = "(Diretora Kaguya...)"
10038060-312 = "Eu sou apenas uma atriz que encena ópera de Pequim. E o mesmo vale para as minhas membras."
10038060-313 = "É verdade que treinei as membras rigorosamente... mas isso foi apenas em prol da ópera de Pequim."
10038060-314 = "E, por extensão, em prol de \"Shanhaijing\" — não tenho outras intenções."
10038060-315 = "Se eu tivesse feito tudo isso por motivos egoístas — aceitarei de bom grado qualquer punição divina ou expulsão."
10038060-316 = "Mas, a Shanhaijing de agora...!"
10038060-317 = "...Sim. Entendo o que deseja dizer e a posição da Genryumon."
10038060-318 = "Certamente, se esta situação continuar, todos os alunos que frequentam a Shanhaijing serão prejudicados..."
10038060-319 = "Portanto... como chefe de um clube que protege as tradições da Shanhaijing há muito tempo."
10038060-320 = "Farei o máximo esforço para manter a ordem dentro dos limites do regulamento escolar."
10038060-325 = "Por ora, isso é o suficiente. Agradeço."
10038060-329 = "...Conto com você, Chefe Kaguya."
10038060-333 = "E então... uma mensagem do Clube de Pesquisa de Alquimia —"
10038060-339 = "“Que todos os recursos dentro da Shanhaijing sejam concentrados no Clube de Pesquisa de Alquimia”"
10038060-340 = "Por precaução, gostaria de perguntar: esse tipo de pedido já existia antes?"
10038060-341 = "Não, é a primeira vez... Até agora, a atitude do Clube de Pesquisa de Alquimia era: #n“Não pedimos nada, então não interfiram conosco”..."
10038060-342 = "Então, o novo... não, dependendo do ponto de vista... #nO Clube de Pesquisa de Alquimia que voltou ao que era antes..."
10038060-343 = "..."
10038060-344 = "Mas, esse pedido é, francamente..."
10038060-345 = "No entanto, tanto a Chefe Kaguya quanto nós... #nSó conseguimos chegar às nossas posições atuais por causa do novo Clube de Pesquisa de Alquimia."
10038060-346 = "Nessa situação, ignorar o pedido do Clube de Pesquisa de Alquimia é..."
10038060-347 = "Será mesmo...?"
10038060-348 = "Que tal aceitarmos o pedido do Clube de Pesquisa de Alquimia por enquanto, #ne planejarmos uma contramedida posteriormente...?"
10038060-349 = "Essa é uma opinião como Genryumon?"
10038060-353 = "Não..."
10038060-354 = "(Ninguém quer assumir a responsabilidade...)"
10038060-355 = "Entendido. Vamos prosseguir com essa proposta."
10038060-357 = "Então... ficaremos com o fato de que “a Chefe Kaguya também concordou com esta opinião”."
10038060-364 = "Ufa..."
10038060-373 = "A casa é uma estalagem para uma estadia temporária. Eu sou apenas uma viajante que partirá um dia —"
10038060-374 = "Status e poder são como o vento de outono que roça as mangas. #nAinda assim, a noite chega, e aqui pergunto pelo caminho."
10038060-378 = "Para onde o Clube de Ópera de Pequim deve seguir? E a Shanhaijing..."
10038060-380 = "..."
10038060-381 = "Será que o Mestre do Portão sempre carregou preocupações como esta...?"
