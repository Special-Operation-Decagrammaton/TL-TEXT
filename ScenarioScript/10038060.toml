[translation]
10038060-1 = "第6話;遠い未来の私たち"
10038060-7 = "……狭くないですか、先生？"
10038060-8 = "[s1] \"私は大丈夫だけど。\"\n[s2] \"キサキとミナ……ルミは？\""
10038060-11 = "3人……いえ、2人と1人のことならご心配なく。#n玄武商会で一番安全な場所に案内済みです。"
10038060-12 = "先生も、後ほどそちらにご案内いたします。"
10038060-13 = "それに、門主様に借りを作ることができたのですから、悪いことばかりではありません。"
10038060-14 = "すべては無事に……門主様が元の座を取り戻されてからにはなりますが。"
10038060-15 = "[s] \"外はどんな感じになってるの？\""
10038060-16 = "はい。まず、ルミ会長はまだ若返り現象から戻っておりません。"
10038060-17 = "同様の現象に陥っている生徒は皆、あまり出歩けない状態になってしまっています。"
10038060-18 = "特に、会長のように顔が広い生徒はなおさら。"
10038060-19 = "ですが、玄武商会の情報網は未だ健在ですので、ここにいても外部の情報を得ることはできます。"
10038060-20 = "そして、玄龍門の現状ですが……"
10038060-25 = "玄龍門内外で、門主様に対する批判……というか、非難の声が大きくなっているようで。"
10038060-28 = "ええ……私も最初は自分の耳を疑いました。"
10038060-29 = "もちろん、すべての玄龍門の構成員がそうではありませんが、強硬派の構成員を中心にキサキ門主に対しての疑問や非難の声が上がっているそうです。"
10038060-30 = "彼女たちが問題視しているのは、門主様が今の座――"
10038060-31 = "他の学園でいうところの、生徒会長に就いた経緯についてです……"
10038060-38 = "そもそも、キサキ門主の擁立そのものがおかしかったのです！"
10038060-39 = "本来、門主は3年生が担うもの。#nだというのに、キサキ門主は2年生で門主の座に就きました！"
10038060-43 = "結果、キサキ門主が伝統を破って門主の座に就いたのではありませんか！"
10038060-44 = "ですがそれは……玄龍門の推戴によるものではありませんか？"
10038060-45 = "それに、そうなった原因は前門主が失脚したからですし……"
10038060-46 = "門主の失脚は、本来起きてはならない不祥事……致し方のないことではありませんか。"
10038060-47 = "結果、キサキ門主が伝統を破って門主の座に就いたのではありませんか！"
10038060-48 = "言い換えれば、キサキ門主は最初から伝統に反していたと言えます！"
10038060-49 = "伝統に反すると分かっていても、満場一致の決定だったではありませんか。#nいまさらそれを蒸し返すのですか？"
10038060-50 = "だからこそ！最初からおかしかったこれらを正す時が来たのではありませんか！"
10038060-53 = "[ns] \"キサキには伝えないほうがいいんじゃないかな……。\""
10038060-54 = "伝えなければ、後で「なぜ、早く伝えなかったのか」と仰るかと。"
10038060-55 = "「そもそも門主たるもの、どのような評価も受け入れるべきじゃからの」と仰ると思いますよ。"
10038060-59 = "え、今の似てました？#nそうですか……ありがとうございます。"
10038060-60 = "……先生は本当にとても接しやすい方ですね。"
10038060-61 = "[s] \"私は生徒の味方だからね！\""
10038060-62 = "私としては、先生とどう接すればいいのか悩んでしまいますが……。"
10038060-66 = "な、何でもありません。#n話を続けましょう。"
10038060-70 = "これらの騒動を巻き起こした張本人の錬丹術研究会――[ruby=しんたに]申谷[/ruby]カイは、自分で事件を起こしておいて、後のことにはさほど興味がないようでした。"
10038060-74 = "ほう？玄龍門で[ruby=こうろんおつばく]の甲論乙駁が[/ruby]、想定以上に激しくなっている……？"
10038060-75 = "――キサキ門主がいない今、玄龍門と山海経をどのように統治すべきか。"
10038060-76 = "そして、キサキ門主を主として戴き続ける正統性があるのか？"
10038060-77 = "はぁ……それって、仙丹と関係があるのかね？"
10038060-78 = "そんな巷説に付き合う暇があるのなら、仙丹の完成に尽力すべきだよ。"
10038060-82 = "材料も加工も足りず――なにより、[ruby=まんねんじん]萬年参[/ruby]の数が圧倒的に足りていない。"
10038060-83 = "足りないものがあれば玄龍門に要請を。それでも足りなければ玄武商会にも。#n私は研究室に戻らせてもらうよ。"
10038060-84 = "まったく――役立たずばかりだ。"
10038060-90 = "……その関係で、半ば活動が止まっている玄武商会にも錬丹術研究会から圧力をかけられている状況です。"
10038060-91 = "「普段の山海経」であれば、こうした事態の仲裁をするのが玄龍門の役割ですが……今は……。"
10038060-95 = "玄武商会も責任から逃れることはできません！"
10038060-96 = "今回の一件も、玄武商会を筆頭とする「外部勢力」が！"
10038060-97 = "商会に立ち入り制限を課したことを恨み、わざと月影祭を中止に追い込もうとこのような騒動を起こしたに違いありません！"
10038060-98 = "それは行き過ぎた憶測ではありませんか……？#n証拠はあるのですか？"
10038060-99 = "ここにいる皆さんも、いま一度ご自身の立ち位置を見直してみてください！#n自分が山海経の伝統を守る玄龍門の味方なのか、それとも他の味方なのか！"
10038060-100 = "門主の座が一時的に空いているいま、我々が玄龍門と山海経を守らねば、誰が守るというのです！"
10038060-101 = "……すべてが混乱の渦中にあるので、試金石が必要だというのは同意します。"
10038060-102 = "ですが、誰を擁立すれば良いのですか……？"
10038060-103 = "我々が今もっともすべきことは――伝統を重んじる立場に立ち戻ることです。"
10038060-104 = "どのように……？"
10038060-110 = "最も山海経の伝統に携わっている部活や人物を当たってみるのが最適かと。"
10038060-113 = "[ns] \"玄龍門がキサキの代わりを探そうとしている……？\""
10038060-114 = "……"
10038060-115 = "正直に言えば、そもそも私は玄龍門についてあまり良い感情を持っていません。"
10038060-116 = "しかし、山海経に玄龍門が必要不可欠であることは認めています。#nそれはおそらく、今後も変わることはないでしょう。バランスを維持するのに必要なのですから。"
10038060-117 = "そんな玄龍門が「伝統」に反しているからと、キサキ門主様を追い出そうとするなんて……"
10038060-118 = "[s] \"……。\""
10038060-120 = "[ns] \"さっきの話を続けてもらえる？\""
10038060-124 = "分かりました。現状手に入れた情報は、一通りお伝えできたかと。"
10038060-125 = "結局、玄龍門の強硬派は――キサキ門主の代わりを見つけるということに、ほとんど合意しました。"
10038060-129 = "京劇部、ですか……？"
10038060-130 = "……総合的に考えて、京劇部が最適ではありませんか？#n山海経の伝統そのものである京劇を守り続けている部活ですから。"
10038060-131 = "そして、京劇自体が体力を必要としますし、カグヤの厳しい鍛錬を耐え抜いた京劇部の戦闘力は山海経の中でも屈指のレベルです。"
10038060-132 = "ですが、果たしてそれは正しいといえるのでしょうか……。#nそれが本当に、伝統を守った決定だと言えるのですか？"
10038060-133 = "……。"
10038060-137 = "私はこう思います。"
10038060-138 = "それを判断するためにも――カグヤを釈放し、意見を聞いてみるべきだと。"
10038060-145 = "[ns] \"なんだか雲行きが怪しくなっているね。\""
10038060-146 = "この風向きについて、どう考えていくべきなのか……私にも分かりません。"
10038060-147 = "だから、先生にご相談したく。"
10038060-151 = "あ、とはいっても、そこまで重たく捉える必要はありません。"
10038060-152 = "それに、こうしてお話を聞いていただいただけでも、十分すぎるくらいですから。"
10038060-153 = "[s5] \"そうだね……私個人の意見としては……。\"\n[s6] \"これはあくまで個人的な意見だから、聞き流してほしいんだけど。\""
10038060-156 = "ありがとうございます、先生。#nあ、授業みたいにしてみますか？"
10038060-157 = "起立、礼、着席の号令をしましょうか？#nあ、いらないですか……すみません。"
10038060-158 = "「権力の空白」、ですか？聞いたことはありますが……。"
10038060-159 = "……なるほど。#n普通は権力が消えたところに、野心家が入り込むさまを指すけれど――"
10038060-160 = "第三者が一人を擁立し、そのポジションに押し上げることもある……。"
10038060-161 = "権力、つまり権限とは――責任とその所在の話。"
10038060-162 = "そうですね……事件や騒動というのは無くならず、それに対する責任の所在追及は必ず発生するもの。"
10038060-163 = "そして、誰かが最終的な責任を負い、裁決を下さなければならない……"
10038060-167 = "そういう意味では、野心家がその場におさまってくれた方が、個人としては幸せに過ごせるかもしれない……そうですね。"
10038060-168 = "少なくとも、野心家個人としては、あふれる名利への渇望と欲望を満たすことができるでしょう。"
10038060-169 = "でも、個人の意思ではなく周囲の推戴でその地位に就くことになってしまったのなら、それは……。"
10038060-173 = "……。"
10038060-174 = "私の知っているカグヤ部長は、少なくとも野心家ではありません。"
10038060-175 = "ただ頑固で融通が利かない――どちらかといえば、職人や芸術家に近いタイプです。"
10038060-176 = "[s7] \"うん。だから、もしもカグヤが「推戴」されてしまったら。\"\n[s8] \"それは……。\""
10038060-186 = "……そうですね。"
10038060-190 = "それはおそらく――私たち全員にとっての……悲劇になりえるかもしれません。"
10038060-198 = "釈放です。出てきてください、カグヤ部長。"
10038060-204 = "唐突ですね。これは門主様の裁決ですか？"
10038060-209 = "……"
10038060-210 = "……[ruby=・   ・   ・]玄龍門[/ruby]の、裁決です。"
10038060-212 = "その真意を伺っても？"
10038060-213 = "事情説明は後ほど。とりあえず今は、ここを出ましょう。"
10038060-220 = "……以上が、山海経で起こった騒動の経緯です。"
10038060-221 = "ちょ、ちょっと待ってください。#nつまり……門主様が行方をくらまし、[ruby=しんたに]申谷[/ruby]カイが戻ってきて錬丹術研究会を動かし……いえ、その前に！"
10038060-222 = "若返り現象のせいで玄武商会は事実上の営業停止……？"
10038060-223 = "その上、月影祭さえも開催できるかどうかもわからない……？"
10038060-224 = "どうして、このような事態に……！？"
10038060-229 = "……。"
10038060-231 = "――カグヤ部長。#nこの混乱と無秩序を正すためにも、一時的にで構いません。"
10038060-232 = "玄龍門は、最も山海経の伝統を守り抜ける集団が必要だと結論づけました。"
10038060-233 = "それが――京劇部である、と。"
10038060-235 = "そうです。"
10038060-240 = "光栄に思います。#nところで…[ruby=わたくし]…私を[/ruby]この場に呼んだのは、別の理由があるように見えますが。"
10038060-241 = "ええ――単刀直入に申し上げましょう。"
10038060-247 = "一時的で構いません――門主の座にお上がりください。"
10038060-253 = "……！"
10038060-255 = "今の山海経には伝統と秩序が必要です。#n以前の尋問の通りであれば、あなたも[ruby=しんたに]申谷[/ruby]カイの一時的な復学には賛成だと聞いております。"
10038060-256 = "そして、現在その条件は満たされており――#nともすれば、あなたの望み通りの山海経に導くこともできるでしょう。"
10038060-262 = "……"
10038060-264 = "門主様と会長にどう伝えれば良いのでしょう……。"
10038060-265 = "[s] \"……私が何とかしてみるよ。\""
10038060-266 = "ありがとうございます。#nですが……問題は山積みです。私たちは、これから様々な可能性を念頭に置いて次の一手を考えなければなりません。"
10038060-267 = "カグヤ部長がその座に就くことに関しても、問題が無いわけではありません。"
10038060-268 = "正統性という観点で、議論の余地が生まれるのは明白かと。"
10038060-269 = "そうですね……現状、正統性を確保できるのは、[ruby=しんたに]申谷[/ruby]カイだけでしょう。"
10038060-273 = "キサキ門主様を今の状況に追いやった元凶ですし……その……当人としてもまだ情状酌量の余地がある事情を持っています。"
10038060-274 = "……本来であれば、卒業生となっていた人ですから。"
10038060-277 = "ですが、錬丹術研究会はこの問題から手を引くことにしたようで。#n少なくとも[ruby=しんたに]申谷[/ruby]カイがその資格を――"
10038060-278 = "どんな形であれ、玄龍門……あるいは他の部活に移管する意思を示してくれていたら、もっとスムーズに事が進んでいたのかもしれません。"
10038060-279 = "ですが、現状は……"
10038060-280 = "[s] \"結局、カグヤの選択次第だね。\""
10038060-281 = "はい……"
10038060-282 = "その選択にすべてがかかっていると言っても過言ではありません。"
10038060-285 = "――理解しました。"
10038060-286 = "山海経の現状も……いま、必要としているのが伝統の維持と秩序の修復というのも。"
10038060-291 = "それでは……！"
10038060-292 = "……。"
10038060-297 = "……。"
10038060-298 = "――お断りします。#n門主の座に就くことだけは、決してできません。"
10038060-303 = "なぜですか！？"
10038060-304 = "……！"
10038060-306 = "玄龍門は今――私と京劇部に、山海経の伝統を守るために伝統を破壊しろという矛盾した要請をしているからです。"
10038060-307 = "そ、それは……！"
10038060-308 = "そして、キサキ門主様の行方が明らかになっていないのに私がその座に就くのは、#n反逆に他ならず、忠義に反しております。"
10038060-310 = "（カグヤ部長……）"
10038060-312 = "私はあくまで、京劇を公演する女優でしかありません。#nそれは部員たちも同じこと。"
10038060-313 = "私が部員を厳しく鍛錬してきたのは事実ですが……それはあくまで京劇のためでしかありません。"
10038060-314 = "ひいては「山海経」のためであり――それ以外の意図はありません。"
10038060-315 = "私が利己的な思いでこのようなことを行なっていたのであれば――#n天罰を受け、退学処分となったとしても甘んじて受け入れます。"
10038060-316 = "しかし、今の山海経は……！"
10038060-317 = "……ええ。おっしゃりたいことも、玄龍門の立場も理解しております。"
10038060-318 = "たしかに、この状況が続けば山海経に通う全ての生徒に被害が及ぶでしょう……"
10038060-319 = "ですので……山海経の伝統を長く守ってきた部活の長として。"
10038060-320 = "校則の範囲内で、最大限秩序維持に尽力いたしましょう。"
10038060-325 = "今はそれで十分です。感謝いたします。"
10038060-329 = "……よろしくお願いします。カグヤ部長。"
10038060-333 = "そして……錬丹術研究会からの伝言です――"
10038060-339 = "「山海経内のすべての資源を、錬丹術研究会に集中するように」"
10038060-340 = "念の為お聞きしたいのですが、以前からこのような要望があったのですか？"
10038060-341 = "いえ、初めてです……今までの錬丹術研究会は、#n「何も要求しないから、干渉しないでほしい」という態度でした……"
10038060-342 = "それでは、新しく変わった……いえ、見方によっては……#n従来に戻った錬丹術研究会の……"
10038060-343 = "……"
10038060-344 = "ですが、この要求は流石に……"
10038060-345 = "ですが、カグヤ部長も我々も……#n新たな錬丹術研究会があったからこそ、今の座に上がることができたのです。"
10038060-346 = "そんな状況で錬丹術研究会の依頼を無下にするのは……。"
10038060-347 = "そう、でしょうか……"
10038060-348 = "一旦、錬丹術研究会側の要求を聞き入れ、#n後日改めて対策を立ててみては……？"
10038060-349 = "それは――[ruby=・   ・   ・]玄龍門[/ruby]としての意見ですか？"
10038060-353 = "いえ……。"
10038060-354 = "（誰も責任を取ろうとしない……）"
10038060-355 = "分かりました。その提案通りに進めましょうか。"
10038060-357 = "それでは――「カグヤ部長もこの意見に賛同した」ということで。"
10038060-364 = "ふぅ……"
10038060-373 = "家とは一時的に滞在する宿。私はいつか旅立つ旅人であり――"
10038060-374 = "地位も権力も、袖に触れる秋の風と同じ。#nそれでも夜は訪れ、ここに道を問う。"
10038060-378 = "京劇部はどこへ進むべきか。そして山海経は……"
10038060-380 = "……"
10038060-381 = "門主様は、いつもこのようなお悩みを抱えていたのだろうか……?"
