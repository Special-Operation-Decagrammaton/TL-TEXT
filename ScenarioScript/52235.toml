[translation]
52235-4 = "……考え事ですか？ニヤ部長。"
52235-8 = "あら、初めまして……ですよね？"
52235-9 = "あなたが今回の主犯の怪談家さんですか？#nそれとも、誰かさんの影……？"
52235-10 = "あんなおバカと一緒にされるのは、少々不愉快ですね。"
52235-11 = "うふふっ、事前連絡なくいらっしゃるところ、シュロさんにそっくりだったもので。"
52235-12 = "気に障られましたかね？ご容赦くださいな。"
52235-16 = "……そんな安っぽい挑発じゃ何も変わりませんよ。"
52235-17 = "お祭りを強行したとしても、この局面は覆らない。それと同じです。"
52235-18 = "ほぉ……。"
52235-19 = "おっと、ご挨拶が遅れましたね。"
52235-20 = "私の名は[ruby=はぶ]土生[/ruby]アザミ。"
52235-21 = "お察しの通り、今宵の物語の担い手にして、花鳥風月部の[ruby=かいげいか]怪芸家[/ruby]――コクリコ様の腹心でございます。"
52235-23 = "怪談を生み出す書、「[ruby=いのうもののけろく]稲生物怪録[/ruby]」は前回壊したはずですが……。"
52235-24 = "それに、どんな面白い逸話だって、何度も聞けば飽きてしまうもの……懲りないですねぇ。"
52235-25 = "あのような駄作と並べて語られるのは心外です。"
52235-26 = "私の怪書「稲亭物怪録」は、恐怖から生まれしもの。"
52235-27 = "「稲生物怪録」が必要とする[ruby=・]欲[/ruby][ruby=・]望[/ruby]とは違う。「稲亭物怪録」の恐怖は、より鮮やかに怯える者の心を浮かび上がらせるのですから。"
52235-28 = "自分の欲望を知らない者はいても、恐怖を感じぬ者などいません。"
52235-29 = "ウジ虫から巨大な猛獣……見慣れた悪友や、自分を罵る他人……。"
52235-30 = "心の中に潜む恐怖は十人十色。#nひとところに集まれば、美しい虹がかかることでしょう。"
52235-31 = "どれだけ足掻こうが、永遠にこの恐怖から抜け出すことはできません。"
52235-32 = "ヒトツメに視線を向けられている限り、あなたたちは「稲亭物怪録」の恐怖を生む土台なのですよ。"
52235-33 = "にゃは……自分に酔ってる方の話って、長いし退屈なんですよねぇ。"
52235-34 = "ではもう一度聞きますよ、ニヤ部長。"
52235-35 = "足掻いてこの状況が好転すると、本気でお考えなのですか？"
52235-36 = "いいえ？"
52235-37 = "己の非力さを痛感してる真っ最中でして。"
52235-41 = "じゃあ何故、わざわざお祭りの決行を？"
52235-42 = "焼け石に水では？"
52235-46 = "……アザミさんでしたっけ。こちらからも一つ聞いていいですか？"
52235-47 = "過去の戦乱の時代から、いまに至るまで。"
52235-48 = "百鬼夜行の各所で人々を惑わし、怪談のきっかけとなった怪異が――#nなぜ学園の統合後は郊外にしか現れなくなったのか……わかります？"
52235-49 = "[ruby=あなたたち]陰陽部[/ruby]のような連中が、何かしたのでしょう？"
52235-50 = "にゃはは、まっさかぁ。"
52235-51 = "そんな業務までやってたら、陰陽部の部長なんてとっくにやめてます。"
52235-56 = "答えは……どんな時にも執り行われる、百鬼夜行のお祭りですよ。"
52235-57 = "……お祭り？"
52235-58 = "ええ。大勢で盛り上がる、派手なやつです。"
52235-59 = "これまで不思議に思いませんでしたか？"
52235-60 = "なぜ、一介の部活に過ぎない「お祭り運営委員会」が学園行事を決定し、自治区の資金の流れまでも把握しているのか。"
52235-61 = "これは単なる私の怠慢によるものじゃあないんですよ。#n古来、クズノハの時代より定められていることなんです。"
52235-62 = "当初、お祭りは安らかな生活を願う祭事から始まったとされています。"
52235-63 = "お供え物をし、現在の苦難を天に告げて、安らかな未来を願う……。"
52235-64 = "要は、これから行うのはただのお祭りじゃありません。"
52235-68 = "……苦難を祓う「祭儀」なのです。"
52235-69 = "わけのわからぬことを……。"
52235-73 = "ヒトツメが……薄れていく？"
52235-87 = "一体何を……！"
52235-88 = "なーんにも特別なことはしてませんよ。"
52235-89 = "[ruby=・]こ[/ruby][ruby=・]れ[/ruby][ruby=・]ま[/ruby][ruby=・]で[/ruby][ruby=・]通[/ruby][ruby=・]り[/ruby]調和のとれた日々を過ごせるよう力をお貸しするのが、我々陰陽部の仕事ですから。"
52235-94 = "――陰に傾いたときは、陽の力で調和をもたらす。#n至って普通な、[ruby=おんみょう]陰陽[/ruby]の理です。"
52235-97 = "こ、ここにも目が！"
52235-98 = "そこかしこに目がある……ずっとこっちを見てるよ……！"
52235-99 = "も、もうダメだ……逃げても無駄なんだ……。"
52235-100 = "百花繚乱もいない……みんなあの怪物に、食われちまうんだ！"
52235-104 = "……あれ？どっかから歌が聞こえないか？"
52235-105 = "こんな状況で……？空耳じゃない？"
52235-106 = "いや……間違いない、歌だよ。#nそれにこの声、どこかで……。"
52235-108 = "みなさん！和楽まつりは予定通り開催いたします！#nどうぞ舞台の前にお集まりください！"
52235-109 = "チセちゃんの未発表曲を最前列で聴ける、千載一遇のチャンスです！"
52235-110 = "秘蔵のチセちゃんアクスタ、チセにゃんぬいぐるみなどなど……限定グッズもこの機会に大放出！"
52235-111 = "観賞のお供に、さくらソーダはいかがでしょうか～！"
52235-114 = "誰だ？こんなときにライブだなんて……。"
52235-115 = "ご存知ないんですか！？#n百鬼夜行随一のアイドルであり、今回のお祭りの主役「和楽姫のチセちゃん」ですよ！"
52235-116 = "まさか決行するだなんて……もうチセ様の歌声は聞けないとばっかり……。"
52235-123 = "どけ！私はチセ様のライブを観に行くんだ！"
52235-124 = "そこら中にお化けがいるのに！？"
52235-125 = "どうせおしまいなら、最期にチセ様のスペシャルライブが観たい！"
52235-130 = "みんな掴まって～"
52235-131 = "さあ、黄昏の向こう側へ～"
52235-136 = "……なるほど。考えあってのことでしたか。"
52235-137 = "恐怖の色を、お祭り騒ぎで拭い去る……。#nたしかに、これなら「稲亭物怪録」の恐怖を中和できることでしょう。"
52235-138 = "でも……永遠に続くお祭りなんてありませんよね？"
52235-139 = "祭りはいずれ幕を下ろすもの。#nそのときは、再び恐怖がこの学園を覆います。"
52235-140 = "奇策のつもりでしょうが、結局はその場しのぎでしかない。"
52235-141 = "どうでしょう？今はご自身の心配をされては？"
52235-142 = "天守閣に白い花火も打ち上げられたことですし……。"
52235-143 = "あんな[ruby=もの]花火[/ruby]、いくら打ち上げたところで……。"
52235-144 = "あら、ご存じなかったとは。ではこの機会にお教えしましょう。"
52235-145 = "無線技術が発達する前は――花火は救助者の位置を知らせる信号として使われていたんですよ。"
52235-147 = "貴様、まさか――"
52235-149 = "これが百花繚乱式射撃術――"
52235-153 = "青春の花火だぁっ！！"
52235-164 = "次回;鬼哭は獅子の遠吠えに"
