[translation]
52235-4 = "......Está pensando em alguma coisa, Diretor Niya?"
52235-8 = "Ah, muito prazer...... não é?"
52235-9 = "Você é a contadora de histórias responsável por tudo isso? #n Ou será apenas a sombra de alguém......?"
52235-10 = "É um pouco desagradável ser comparada àquela idiota."
52235-11 = "Ufufu, é que você chegou sem aviso prévio, exatamente como a Shuro-san."
52235-12 = "Isso a incomodou? Por favor, me perdoe."
52235-16 = "......Provocações baratas como essa não mudam nada."
52235-17 = "Mesmo que forcem o festival a acontecer, a situação não vai mudar. É a mesma coisa."
52235-18 = "Ho......"
52235-19 = "Opa, peço desculpas pela saudação tardia."
52235-20 = "Meu nome é Azami Habu."
52235-21 = "Como você suspeitou, sou a portadora da história desta noite, uma 'artista de histórias misteriosas' do Clube das Flores, Pássaros, Vento e Lua―― um braço direito da Kokuriko-sama."
52235-23 = "Eu deveria ter destruído o 'Inotei Mononokeroku', o livro que cria histórias de fantasmas, da última vez......"
52235-24 = "Além disso, não importa quão interessante seja uma anedota, se você ouve várias vezes, ela fica entediante...... você é persistente, não é?"
52235-25 = "É ofensivo ser comparada a um trabalho medíocre como aquele."
52235-26 = "Meu livro misterioso, o 'Inotei Mononokeroku', nasce do medo."
52235-27 = "É diferente do 'desejo' que o outro livro exigia. O medo do 'Inotei Mononokeroku' faz com que o coração de quem teme se destaque de forma mais vívida."
52235-28 = "Podem existir aqueles que não conhecem seus próprios desejos, mas não existem aqueles que não sentem medo."
52235-29 = "De um verme a uma fera gigante...... um amigo próximo que se tornou estranho, ou um estranho que te insulta......"
52235-30 = "O medo escondido no coração é de dez tipos para dez pessoas. #n Se todos se reunirem em um só lugar, um lindo arco-íris se formará."
52235-31 = "Não importa o quanto se debatam, nunca escaparão desse medo para sempre."
52235-32 = "Enquanto estiverem sob o olhar de Hitotsume, vocês são a base que gera o medo do 'Inotei Mononokeroku'."
52235-33 = "Nyaha...... as histórias de quem se acha demais são longas e entediantes."
52235-34 = "Vou perguntar mais uma vez, Diretor Niya."
52235-35 = "Você realmente acha que essa situação vai melhorar se você lutar?"
52235-36 = "Não?"
52235-37 = "Estou justamente no meio de sentir o quanto sou impotente."
52235-41 = "Então por que se deu ao trabalho de realizar o festival?"
52235-42 = "Não é como apagar um incêndio com uma gota d'água?"
52235-46 = "......Azami, é esse o seu nome? Posso te perguntar uma coisa também?"
52235-47 = "Desde os tempos de guerra do passado até agora."
52235-48 = "As assombrações que iludiram as pessoas por Hyakkiyako e deram origem às histórias de fantasmas―― #n você sabe por que elas só começaram a aparecer nos subúrbios depois da integração da academia......?"
52235-49 = "Alguém do Clube Yin-Yang deve ter feito algo, não?"
52235-50 = "Nyahaha, de jeito nenhum."
52235-51 = "Se eu tivesse que fazer esse tipo de trabalho, já teria pedido demissão como chefe do Clube Yin-Yang há muito tempo."
52235-56 = "A resposta é...... o festival de Hyakkiyako, realizado em todas as épocas."
52235-57 = "......Um festival?"
52235-58 = "Sim. Aquele tipo chamativo onde todos se divertem muito."
52235-59 = "Você nunca achou estranho até agora?"
52235-60 = "Por que o 'Comitê Organizador do Festival', que não passa de um clube, decide os eventos da academia e até controla o fluxo de fundos dos distritos autônomos?"
52235-61 = "Isso não acontece por causa da minha negligência. #n Desde a antiguidade, desde a época de Kuzunoha, isso já está determinado."
52235-62 = "Originalmente, os festivais começaram como rituais para desejar uma vida pacífica."
52235-63 = "Fazer oferendas, declarar as dificuldades atuais aos céus e desejar um futuro pacífico......"
52235-64 = "Em suma, o que faremos a seguir não é apenas um simples festival."
52235-68 = "......É um 'ritual' para purificar as dificuldades."
52235-69 = "Que conversa sem sentido......"
52235-73 = "Hitotsume...... está desaparecendo?"
52235-87 = "O que você fez......!"
52235-88 = "Não fiz nada de especial."
52235-89 = "O trabalho do nosso Clube Yin-Yang é emprestar nossa força para manter a harmonia como sempre fazemos."
52235-94 = "――Quando a balança inclina para a sombra, usamos a força do sol para trazer harmonia. #n É um princípio simples do Yin e do Yang."
52235-97 = "Ah, tem olhos aqui também!"
52235-98 = "Tem olhos em toda parte...... eles estão olhando para nós o tempo todo......!"
52235-99 = "N, não dá mais...... fugir é inútil......"
52235-100 = "A Hyakkaryouran não está aqui...... todos seremos devorados por esses monstros!"
52235-104 = "......Ué? Vocês não estão ouvindo uma música vindo de algum lugar?"
52235-105 = "Nesta situação......? Não está ouvindo errado?"
52235-106 = "Não...... sem dúvida, é uma música. #n E essa voz, em algum lugar......"
52235-108 = "Pessoal! O Festival Waraku será realizado conforme planejado! #n Por favor, reúnam-se em frente ao palco!"
52235-109 = "Esta é uma oportunidade única na vida de ouvir a música inédita da Chise-chan na primeira fila!"
52235-110 = "Temos produtos limitados, como os suportes de acrílico da Chise-chan e pelúcias da Chise-nyan, à venda nesta oportunidade!"
52235-111 = "Que tal um refrigerante de cereja para acompanhar a apresentação~!"
52235-114 = "Quem é? Um show ao vivo em um momento como este......"
52235-115 = "Você não sabe!? #n É a 'Princesa Waraku, Chise-chan', a maior ídolo de Hyakkiyako e protagonista deste festival!"
52235-116 = "Quem diria que eles realmente realizariam...... pensei que nunca mais ouviria a voz da Chise-sama......"
52235-123 = "Saiam da frente! Eu vou assistir ao show da Chise-sama!"
52235-124 = "Mesmo com monstros em todo lugar!?"
52235-125 = "Se é para acabar de qualquer jeito, eu quero assistir ao show especial da Chise-sama!"
52235-130 = "Segurem-se, pessoal~"
52235-131 = "Vamos, para o outro lado do crepúsculo~"
52235-136 = "......Entendi. Então era esse o seu plano."
52235-137 = "Apagar a cor do medo com o alvoroço do festival...... #n certamente, isso neutralizará o medo do 'Inotei Mononokeroku'."
52235-138 = "Mas...... não existe festival que dure para sempre, existe?"
52235-139 = "O festival sempre termina. #n E nesse momento, o medo cobrirá esta academia novamente."
52235-140 = "Você pode achar que é um plano brilhante, mas no fim não passa de um paliativo."
52235-141 = "Que tal? Por que você não se preocupa com si mesma agora?"
52235-142 = "Já que dispararam fogos de artifício brancos na torre do castelo......"
52235-143 = "Não importa quantos fogos de artifício como esse vocês disparem......"
52235-144 = "Oh, você não sabia? Então vou te ensinar nesta oportunidade."
52235-145 = "Antes do desenvolvimento da tecnologia de rádio―― os fogos de artifício eram usados como sinais para indicar a posição dos socorristas."
52235-147 = "Seu infeliz, não me diga que――"
52235-149 = "Esta é a técnica de tiro estilo Hyakkaryouran――"
52235-153 = "Fogos de artifício da juventude!!"
52235-164 = "Próximo Episódio; O Lamento do Oni é o Uivo do Leão"

