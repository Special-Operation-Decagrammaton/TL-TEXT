[translation]
52235-4 = "……Pensando em algo? Chefe Niya."
52235-8 = "Ora, prazer em conhecê-la…… não é?"
52235-9 = "Você é a contadora de histórias responsável por tudo isso?#nOu seria apenas a sombra de alguém…?"
52235-10 = "Ser comparada com aquela idiota é um tanto desagradável."
52235-11 = "Ufufu, você apareceu sem aviso prévio, então me lembrou muito a Shuro-san."
52235-12 = "Ficou ofendida? Peço perdão."
52235-16 = "……Provocações baratas assim não vão mudar nada."
52235-17 = "Mesmo que forcem a realização do festival, essa situação não vai se reverter. É a mesma coisa."
52235-18 = "Oh……."
52235-19 = "Ops, peço desculpas pela demora nas apresentações."
52235-20 = "Meu nome é Habu Azami."
52235-21 = "Como deve ter imaginado, sou a portadora da história desta noite e confidente de Kokuriko-sama, a Artista de Mistérios do Clube Kachoufuugetsu."
52235-23 = "O livro que cria histórias de terror, o \"Inou Mononoke Roku\", deveria ter sido destruído da última vez, mas……."
52235-24 = "Além disso, qualquer anedota interessante se torna entediante se ouvida muitas vezes…… vocês não aprendem, não é?"
52235-25 = "É um insulto ser comparada a uma obra medíocre como aquela."
52235-26 = "Meu livro de mistérios, o \"Inotei Mononoke Roku\", nasceu do medo."
52235-27 = "É diferente do desejo que o \"Inou Mononoke Roku\" exige. O medo do \"Inotei Mononoke Roku\" faz com que o coração daqueles que sentem medo se destaque de forma muito mais vívida."
52235-28 = "Pode haver quem não conheça seus próprios desejos, mas não existe ninguém que não sinta medo."
52235-29 = "De vermes a feras gigantescas…… amigos de longa data ou estranhos que te insultam……."
52235-30 = "O medo que espreita no coração é único para cada pessoa.#nSe todos se reunirem em um só lugar, um belo arco-íris se formará."
52235-31 = "Não importa o quanto se debatam, vocês nunca conseguirão escapar deste medo."
52235-32 = "Enquanto estiverem sob o olhar do Hitotsume, vocês são a base que gera o medo do \"Inotei Mononoke Roku\"."
52235-33 = "Nya-ha…… as histórias de quem é apaixonado por si mesmo são longas e entediantes, sabe?"
52235-34 = "Então, vou perguntar mais uma vez, Chefe Niya."
52235-35 = "Você realmente acha que se debater vai melhorar essa situação?"
52235-36 = "Não?"
52235-37 = "Estou justamente sentindo na pele a minha própria impotência."
52235-41 = "Então por que se deu ao trabalho de realizar o festival?"
52235-42 = "Não é como tentar apagar um incêndio com um copo d'água?"
52235-46 = "……Azami-san, era esse o seu nome? Posso lhe perguntar uma coisa também?"
52235-47 = "Desde os tempos das guerras passadas até agora."
52235-48 = "As aparições que enganavam as pessoas por toda Hyakkiyako e que davam origem às histórias de terror――#npor que elas só passaram a aparecer nos arredores depois da união da academia…… você sabe?"
52235-49 = "Pessoas como vocês do Escritório Yin-Yang devem ter feito algo, não é?"
52235-50 = "Nya-haha, de jeito nenhum."
52235-51 = "Se eu tivesse que cuidar desse tipo de trabalho, já teria deixado o cargo de chefe do Escritório Yin-Yang há muito tempo."
52235-56 = "A resposta é…… o festival de Hyakkiyako, que é realizado em qualquer circunstância."
52235-57 = "……Um festival?"
52235-58 = "Sim. Aquele bem chamativo, onde muita gente se diverte."
52235-59 = "Você nunca achou isso estranho até agora?"
52235-60 = "Por que o \"Comitê Organizador do Festival\", que não passa de um clube comum, decide os eventos da academia e até controla o fluxo de fundos do distrito autônomo?"
52235-61 = "Isso não é apenas por causa da minha negligência.#nDesde os tempos antigos, desde a era de Kuzunoha, isso já estava determinado."
52235-62 = "Dizem que, no início, os festivais começaram como rituais para desejar uma vida pacífica."
52235-63 = "Fazer oferendas, contar ao céu sobre as dificuldades atuais e desejar um futuro tranquilo……."
52235-64 = "Em suma, o que vamos fazer agora não é apenas um festival comum."
52235-68 = "……É um \"ritual\" para afastar as dificuldades."
52235-69 = "Que bobagem você está dizendo……."
52235-73 = "O Hitotsume está…… desaparecendo?"
52235-87 = "O que você fez……!"
52235-88 = "Não fiz nada de especial."
52235-89 = "Afinal, o trabalho do nosso Escritório Yin-Yang é justamente emprestar nossa força para que possamos passar nossos dias em harmonia, como sempre fizemos."
52235-94 = "――Quando as coisas se inclinam para a sombra, o poder da luz traz a harmonia. É o princípio básico e comum do Yin e Yang."
52235-97 = "A-aqui também tem olhos!"
52235-98 = "Tem olhos por toda parte... eles estão olhando para cá o tempo todo...!"
52235-99 = "Já era... não adianta fugir..."
52235-100 = "A Hyakkaryouran também não está aqui... todos nós vamos ser devorados por aquele monstro!"
52235-104 = "...Ué? Vocês não estão ouvindo uma música vindo de algum lugar?"
52235-105 = "Nessa situação...? Não é coisa da sua cabeça?"
52235-106 = "Não... não tem erro, é uma música. E essa voz, eu já ouvi em algum lugar..."
52235-108 = "Pessoal! O Festival Waraku será realizado conforme o planejado! Por favor, reúnam-se em frente ao palco!"
52235-109 = "Esta é uma oportunidade única na vida de ouvir a música inédita da Chise-chan na primeira fila!"
52235-110 = "Temos também o acrílico exclusivo da Chise-chan, o pelúcia da Chise-nyan e muito mais... vamos liberar produtos limitados nesta ocasião!"
52235-111 = "Que tal um refrigerante de sakura para acompanhar o show?!"
52235-114 = "Quem é? Fazer um show numa hora dessas..."
52235-115 = "Você não conhece?! É a maior idol de Hyakkiyako e a protagonista deste festival, a 'Princesa Waraku, Chise-chan'!"
52235-116 = "Não acredito que ela vai seguir em frente... eu achei que nunca mais ouviria a voz da Chise-sama..."
52235-123 = "Saiam da frente! Eu vou assistir ao show da Chise-sama!"
52235-124 = "Mesmo com monstros por toda parte?!"
52235-125 = "Se é para ser o fim, eu quero ver o show especial da Chise-sama antes de partir!"
52235-130 = "Todos, segurem-se~"
52235-131 = "Vamos, para o outro lado do crepúsculo~"
52235-136 = "...Entendo. Então havia um plano por trás disso."
52235-137 = "Apagar a cor do medo com a agitação de um festival... De fato, isso pode neutralizar o terror do 'Inatei Monokairoku'."
52235-138 = "Mas... não existe festival que dure para sempre, certo?"
52235-139 = "Todo festival chega ao fim. Quando isso acontecer, o medo cobrirá esta academia novamente."
52235-140 = "Você pode achar que é uma estratégia brilhante, mas no fim, é apenas um paliativo."
52235-141 = "Quem sabe? Por que não se preocupa consigo mesmo agora?"
52235-142 = "Afinal, fogos de artifício brancos já foram lançados na torre do castelo..."
52235-143 = "Aqueles fogos de artifício, não importa quantos lancem..."
52235-144 = "Ora, não sabia? Então deixe-me aproveitar esta oportunidade para lhe ensinar."
52235-145 = "Antes do desenvolvimento da tecnologia de rádio, os fogos de artifício eram usados como sinal para indicar a localização dos socorristas."
52235-147 = "Seu maldito, não me diga que..."
52235-149 = "Esta é a técnica de tiro estilo Hyakkaryouran..."
52235-153 = "Fogos de artifício da juventude!!"
52235-164 = "Próximo episódio: O lamento do demônio é o rugido do leão"
