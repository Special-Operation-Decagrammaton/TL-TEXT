[translation]
10018020-1 = "Episódio 2; Cozinha da Fuuka"
10018020-7 = "Incrível..."
10018020-12 = "Coifa, queimadores a gás, fritadeira elétrica, forno... mesmo sendo coisas que costumam sujar facilmente."
10018020-13 = "Como são muito usadas, embora tenham alguns arranhões... parecem novas."
10018020-17 = "O controle dos ingredientes também é cuidadoso... tanto a refrigeração quanto os itens embalados individualmente estão devidamente separados."
10018020-18 = "Sinto que os vegetais estão um pouco machucados demais, mas acho que isso é problema do fornecedor."
10018020-19 = "Isso é... até os temperos com prazo de validade longo são descartados periodicamente para colocar novos...?"
10018020-20 = "Sim. Se eu não mantiver uma higiene rigorosa, perderei a confiança dos clientes. #nE então... houve algum problema?"
10018020-21 = "Ah, não!"
10018020-22 = "É que o estado da cozinha está maravilhoso."
10018020-23 = "A propósito... o tempero é sempre essa combinação?"
10018020-24 = "S-sim. Essa é a combinação secreta, então..."
10018020-25 = "Entendo... talvez esse seja o primeiro problema."
10018020-26 = "Todos os pratos acabam ficando com um sabor muito parecido..."
10018020-27 = "E isso é apenas uma impressão baseada no que vi dos ingredientes..."
10018020-28 = "Sim, o que seria...?"
10018020-29 = "Vocês compram todos os ingredientes da Nyao Food, certo?"
10018020-30 = "Sim. Como os fornecedores estáveis são limitados..."
10018020-31 = "Bem... sinto que a qualidade dos ingredientes não é muito boa..."
10018020-35 = "...Então era isso mesmo."
10018020-39 = "Na verdade, quando mudei o fornecedor para a Nyao Food,"
10018020-40 = "os clientes habituais disseram que o sabor tinha caído."
10018020-41 = "Mas, como a Nyao Food monopoliza os ingredientes por aqui, não há nada que eu possa fazer..."
10018020-42 = "Se for sobre ingredientes, acho que podemos ajudar, Senpai!"
10018020-44 = "É verdade."
10018020-45 = "É um pouco longe daqui, mas..."
10018020-52 = "...Essa é a situação. Poderia nos fazer esse favor, gerente?"
10018020-53 = "Se é um pedido da Fuuka-chan, aceito com prazer."
10018020-54 = "Além disso, conseguir um novo cliente é sempre bom."
10018020-55 = "Sinto muito pelo pedido repentino, mas conto com você."
10018020-56 = "Que isso, não se preocupe. Vamos nos esforçar juntos. #nÉ nos momentos difíceis que devemos nos ajudar."
10018020-58 = "Além disso, nós fornecemos os ingredientes para a merenda de Gehenna, então temos confiança no sabor!"
10018020-60 = "Sinto que estou sempre dependendo demais de vocês..."
10018020-61 = "Não se preocupe. Ainda nem sabemos se vamos conseguir resolver tudo..."
10018020-62 = "Nós decidimos ajudar o Suzume-tei juntos."
10018020-63 = "Dona, aceite a ajuda da Fuuka-chan! #nEu garanto a habilidade da Fuuka-chan!"
10018020-64 = "[s] \"Eu garanto a habilidade da Fuuka.\""
10018020-65 = "Viu, o Sensei do Schale também disse isso!"
10018020-67 = "Ahaha..."
10018020-73 = "Hm? Ei, aquilo... não é a dona do Suzume-tei?"
10018020-74 = "É verdade. Ela não ia fechar o restaurante? Por que está com o gerente do Piyo Super?"
10018020-78 = "Será que...?"
10018020-83 = "Bem, já que conseguimos novos ingredientes, vamos retomar o preparo dos pratos."
10018020-84 = "Juri, sobre esses ingredientes... você poderia cuidar apenas do preparo inicial?"
10018020-85 = "Sim, pode deixar comigo, Senpai!"
10018020-89 = "Sei que a senhora tem seu próprio jeito de fazer as coisas, mas..."
10018020-90 = "Quando a carne grelhar assim, em vez de servir imediatamente, se você usar o calor residual para envolver o molho —"
10018020-94 = "a carne ficará revestida,"
10018020-95 = "e não só o sabor, mas a textura também mudará."
10018020-96 = "Então existe um método assim...!"
10018020-100 = "Ao fazer sopa, se você refogar levemente os ingredientes antes de adicionar a água,"
10018020-101 = "o sabor ficará muito mais profundo."
10018020-102 = "Refogar os ingredientes primeiro?"
10018020-103 = "Sim. Ao cozinhá-los um pouco antes,"
10018020-104 = "além de evitar que se desfaçam,"
10018020-106 = "coisas como a cebola ficam mais doces."
10018020-109 = "Cozinhar uma grande quantidade de ingredientes de uma só vez é sempre uma tarefa difícil."
10018020-110 = "Preparar a quantidade certa para o número de pessoas é fácil, mas o controle do fogo é limitado."
10018020-111 = "Não existe um método melhor?"
10018020-112 = "Não há escolha a não ser observar com atenção e misturar com cuidado para não queimar."
10018020-113 = "Se colocar muita força ao misturar, os ingredientes vão acabar se desfazendo..."
10018020-114 = "O segredo aqui é fazer cada etapa com cuidado."
10018020-118 = "Ótimo, criei alguns menus novos!"
10018020-119 = "Agora preciso confirmar se esses novos pratos estão realmente gostosos..."
10018020-120 = "……Haruna?"
10018020-122 = "Eu estava esperando por isso."
10018020-123 = "Então, vamos comer."
10018020-132 = "(S-Senpai... estou me sentindo muito nervosa.)"
10018020-133 = "(Também estou curiosa sobre a avaliação do sabor... mas, mais do que isso)"
10018020-134 = "[s] (\"Eu também estou preocupado...\")"
10018020-141 = "Obrigada pela refeição."
10018020-142 = "Bem... sobre o sabor..."
10018020-144 = "(Gole)"
10018020-145 = "[ns] (\"Por favor, não faça nenhuma cena...\")"
10018020-152 = "Está aprovado."
10018020-155 = "Uau!"
10018020-156 = "Ufa..."
10018020-158 = "Foi um prato maravilhoso, sem falhas."
10018020-159 = "Seria um desperdício aproveitar este sabor sozinha."
10018020-163 = "Vamos comer todos juntos."
10018020-172 = "Estou ansiosa para provar um prato com o selo de aprovação da Haruna★"
10018020-173 = "Já posso comer? O cheiro estava tão bom que foi difícil aguentar!"
10018020-177 = "Rápido, rápido!"
10018020-186 = "Dona do restaurante, saia já daí!"
10018020-187 = "Quem disse que você podia mudar de fornecedor por conta própria?"
10018020-188 = "Você sabe que isso é uma quebra de contrato, não sabe?"
10018020-189 = "Hahaha! Multa rescisória! Indenização! Inadimplência!"
10018020-196 = "Ah, cuidado aí!"
10018020-207 = "Minha... minha comida..."
10018020-208 = "Eu nem cheguei a dar uma mordida sequer!!"
10018020-209 = "Ora★ Isso é um problema, não é?"
10018020-211 = "O-o que foi? Tem alguma reclamação?"
10018020-212 = "A culpa é sua por estar aí. Vai colocar a culpa na gente?"
10018020-213 = "[s] \"Olha, é melhor você fugir... embora eu ache que seja inútil.\""
10018020-223 = "Vocês... não vou perdoá-los!"
