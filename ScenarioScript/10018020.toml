[translation]
10018020-1 = "第2話;FUUKA'Sキッチン"
10018020-7 = "すごい……。"
10018020-12 = "レンジフード、ガスバーナー、電気フライヤー、オーブン……どれも汚れやすいものばかりなのに。"
10018020-13 = "使い込まれているから、傷こそあるものの……まるで新品のよう。"
10018020-17 = "材料の管理も丁寧……冷蔵保存や個別に包むものも、ちゃんと区分けされてる。"
10018020-18 = "ちょっと野菜に傷が多すぎる気はするけど、これは仕入れ先の問題かな。"
10018020-19 = "これは……賞味期限が長い調味料も、定期的に処分して新しいものにしている……？"
10018020-20 = "はい。衛生管理を徹底しないと、信用を失ってしまいますから。#nその……何か問題でもありましたか？"
10018020-21 = "あ、いえ！"
10018020-22 = "キッチンの状態が素晴らしいなぁって。"
10018020-23 = "ところで……味付けはこちらの組み合わせだけなんですか？"
10018020-24 = "は、はい。これが秘伝の組み合わせなので……。"
10018020-25 = "なるほど……これが最初の問題かもしれない。"
10018020-26 = "どの料理も、似たような味付けになってしまっている……。"
10018020-27 = "それと、これは少し食材を見た範囲の感想なのだけど……。"
10018020-28 = "はい、何でしょうか……？"
10018020-29 = "食材は全てニャオフードから仕入れているんですよね？"
10018020-30 = "ええ。安定した仕入れ先は限られるので……。"
10018020-31 = "その……食材の品質が、あまり良くないように感じるのだけど……。"
10018020-35 = "……やはり、そうでしたか。"
10018020-39 = "実はニャオフードに仕入れ先を変えた時に、"
10018020-40 = "常連さんに味が落ちたと言われてしまったんです。"
10018020-41 = "ですが、このあたりではニャオフードが食材を独占しているので、私にはどうすることもできず……。"
10018020-42 = "食材のことでしたら、私たちが協力できそうですね、先輩！"
10018020-44 = "そうね。"
10018020-45 = "ここからちょっと距離は離れてるけど……。"
10018020-52 = "……という事情なんです。なんとかお願いできないでしょうか、店長？"
10018020-53 = "フウカちゃんたってのお願いとあらば、喜んで引き受けるよ。"
10018020-54 = "それに、新しい得意先ができるのは良い事だからね。"
10018020-55 = "突然のことで申し訳ありませんが、よろしくお願いします。"
10018020-56 = "なんのなんの。お互い頑張りましょうね。#n苦しいときこそ、助け合っていかないと。"
10018020-58 = "それに、うちはゲヘナの給食の食材を提供していますからね、味には自信がありますよ！"
10018020-60 = "あまりにも、皆さんにお世話になってばかりのような……。"
10018020-61 = "気にしないでください。まだ本当に解決できるか分かりませんし……。"
10018020-62 = "私たち、みんなでスズメ亭に協力する事にしたんですから。"
10018020-63 = "女将さん、ここはフウカちゃんに甘えましょう！#nフウカちゃんの腕は私が保証しますよ！"
10018020-64 = "[s] \"フウカの技量は私が保証するよ。\""
10018020-65 = "ほら、シャーレの先生もそう仰ってるじゃないですか！"
10018020-67 = "あはは……。"
10018020-73 = "ん？おい、あれ……もしかしてスズメ亭の女将じゃないか？"
10018020-74 = "本当だ。もう店を畳むはずなのに、なんでピヨスーパーの店長と一緒にいるんだ？"
10018020-78 = "まさか……？"
10018020-83 = "では、新しく食材を手に入れたことですし、料理を再開しましょうか。"
10018020-84 = "ジュリ、この食材なんだけど……下ごしらえだけしてくれるかしら？"
10018020-85 = "はいっ、お任せください。先輩！"
10018020-89 = "女将さんにも、慣れたやり方があるかと思いますが……"
10018020-90 = "こういう風にお肉が焼けてもすぐに盛り付けず、余熱を使ってタレを絡ませると――"
10018020-94 = "お肉がコーティングされるので、"
10018020-95 = "味だけでなく食感も変わるんです。"
10018020-96 = "そんなやり方があるのですね……！"
10018020-100 = "スープを作るときは、材料を先に軽く炒めてから水を入れると、"
10018020-101 = "より深い味わいになりますよ。"
10018020-102 = "材料を先に炒めるんですか？"
10018020-103 = "はい。先に熱を通すことで、"
10018020-104 = "煮崩れ防止になる上、"
10018020-106 = "玉ねぎなんかは甘みが増すんです。"
10018020-109 = "一度に大量の食材を調理するのは、何度やっても大変な作業です。"
10018020-110 = "材料は人数分を用意すれば大丈夫ですが、火力の調整には限りがありますからね。"
10018020-111 = "何か良い方法はないものでしょうか？"
10018020-112 = "よく見ながら、焦げないように注意して混ぜるしかありません。"
10018020-113 = "力を入れて混ぜすぎては、食材の形が崩れてしまうので……。"
10018020-114 = "ここは一つひとつの作業を丁寧に、ですね。"
10018020-118 = "よし、何個か新メニューができた！"
10018020-119 = "次はこの新メニューが本当においしいか確認しないと……。"
10018020-120 = "……ハルナ？"
10018020-122 = "お待ちしておりました。"
10018020-123 = "それでは、いただきます。"
10018020-132 = "（せ、先輩……何だかすごく緊張しますね）"
10018020-133 = "（味の評価も気になるけど……それより）"
10018020-134 = "[s] （\"私も心配だよ……。\"）"
10018020-141 = "ごちそうさまでした。"
10018020-142 = "そうですね……お味のほどは……。"
10018020-144 = "（ごくり）"
10018020-145 = "[ns] （\"お願いだから、暴れたりはしないでくれ……。\"）"
10018020-152 = "合格ですわ。"
10018020-155 = "わぁ！"
10018020-156 = "ふう……。"
10018020-158 = "非の打ち所がない素晴らしい料理でした。"
10018020-159 = "この味を私一人だけ満喫するなんて、もったいないですわ。"
10018020-163 = "皆さんで一緒に頂きましょう。"
10018020-172 = "ハルナのお墨つきの料理だなんて楽しみですね★"
10018020-173 = "もう食べていいの？おいしそうな匂いがず～っとしてたから我慢するのも大変だったよ～！"
10018020-177 = "はやくはやく～！"
10018020-186 = "女将、コラ！出てこい！"
10018020-187 = "誰が勝手に取引先を変えていいなんて言った？"
10018020-188 = "契約違反だってことくらい知ってるよな？"
10018020-189 = "ハハハ！違約金だ！損害賠償だ！債務不履行だ！"
10018020-196 = "あっ、そこ！気をつけて！"
10018020-207 = "私の……私の料理が……"
10018020-208 = "まだ一口も食べてないのに～！！"
10018020-209 = "あら★これは大変ですね。"
10018020-211 = "な、何か文句でもあんのか。"
10018020-212 = "そ、そこにいたのが悪いんだよ。こっちのせいにするのか？"
10018020-213 = "[s] \"その、逃げたほうがいいよ……たぶん無駄だと思うけど。\""
10018020-223 = "あんたたち……許さない！"
