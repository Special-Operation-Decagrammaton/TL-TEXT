[translation]
10031030-1 = "第3話;議長の要求"
10031030-14 = "うーーーん！やっぱりダメだったね！#n風紀委員会だけで一苦労なのに、相変わらず強いね、ヒナ委員長！"
10031030-15 = "（ぶるぶるぶるぶる……）"
10031030-22 = "ど、どうすれば！"
10031030-23 = "うーん、部長は大変な状態だし……"
10031030-24 = "みんな、撤退～！逃げるよ～！"
10031030-25 = "みんな、30分後にアジトで集まろう！"
10031030-32 = "……！アコ、追いかけるよ。"
10031030-36 = "はい！委員長……！"
10031030-38 = "ちょっと待ちたまえええ！！"
10031030-40 = "な、何ですか！？マコト議長！"
10031030-42 = "周りをよく見ろ！#nお前たちが何をやらかしたのか……！"
10031030-53 = "[ns] \"議事堂、壊れちゃったね……\""
10031030-56 = "だからどうしたんですか？"
10031030-57 = "だからどうした、だと……！？"
10031030-58 = "お前たち風紀委員会が暴れたせいで、竣工式すらできずに壊れてしまったじゃないか！"
10031030-59 = "どう責任を取ってくれるんだ！"
10031030-60 = "はい？責任転嫁も程がありませんか！？"
10031030-61 = "それは、あなたが温泉開発部になんか仕事を依頼したからでしょう？"
10031030-62 = "それで？"
10031030-63 = "はい……？"
10031030-64 = "それはもう終わったことだろう！"
10031030-65 = "[s] \"……うわぁ。\""
10031030-66 = "とにかく風紀委員会のせいだ！#nまったく、シャーレの先生も立ち会うはずだったのにな！"
10031030-71 = "こうなった以上、責任は取ってもらうぞ……風紀委員会！"
10031030-72 = "いや！風紀委員長！[ruby=そらさき]空崎[/ruby]ヒナ！"
10031030-73 = "お前も組織のリーダーとして、責任を取るべきだろう！"
10031030-74 = "いえ、委員長！#nこんな戯言に耳を貸す必要はありません！"
10031030-75 = "[s] \"マコト、いくら何でもそれは……\""
10031030-78 = "……分かった。それで、あなたは私にどうしてほしいの？"
10031030-79 = "委員長！？"
10031030-83 = "[ns] \"ヒナ……？\""
10031030-84 = "……ん？こうもすんなりと行くとは……"
10031030-85 = "もちろん、意図したものではないけど、私たちのせいで被害が生じたのも事実だから。"
10031030-86 = "しかも先生の仕事を邪魔することになったのだから……#n私にも責任はある。"
10031030-87 = "それで、マコト議長……私にどう責任を取ってほしいの？"
10031030-88 = "う、うーーん。そうだな……"
10031030-90 = "（ヒナの奴、いつもと違ってこちらの要求をあっさり受け入れるとは……理由はよく分からないが……）"
10031030-91 = "（これも良い機会だ……！今こそ万魔殿と風紀委員会の上下関係をはっきりさせてやろう！）"
10031030-92 = "（どうすれば、風紀委員会の鼻をへし折って、このマコト様の威厳を知らしめられるのか……！）"
10031030-93 = " （そういえば、今回のパーティーではピアノの演奏を予定していたな……）"
10031030-94 = "（キキキッ！それなら……！）"
10031030-96 = "ククッ……ククククッ……クククククッ！！！！"
10031030-97 = "[s] \"すごく嫌な気配がするような……\""
10031030-99 = "い、委員長！#nそんな簡単に約束をしては大変なことになるかもしれませんよ！？"
10031030-100 = "いいの、アコ。もう決めたことだから。"
10031030-101 = "し、しかし……！"
10031030-107 = "……先生に迷惑をかけたくはないから。"
10031030-108 = "[s] \"ひ、ヒナ……！\""
10031030-109 = "そんな……委員長。"
10031030-110 = "ククククッ！決めたぞ！"
10031030-111 = "きっと、またとんでもない要求を……！"
10031030-112 = "ああ、心配するな。私も馬鹿ではない。#nあくまで現実的な要求をするとしよう。"
10031030-113 = "現実的な要求？"
10031030-114 = "そうだ。#nお前には、このマコト様が用意しているパーティーを手伝ってもらおうじゃあないか！"
10031030-115 = "パーティー……ああ、そういえば万魔殿が準備していると情報がありましたね。"
10031030-116 = "何を企もうと勝手ですが……委員長のことを巻き込まないで頂けますか！？"
10031030-117 = "はっ、何を言っている天雨アコ。私たちはただ素晴らしいパーティーを開こうとしているだけだ。"
10031030-118 = "そこにいる、先生の協力を得た上でなぁ！キキキッ！"
10031030-119 = "……先生、そうなの？"
10031030-120 = "[s] \"う、うん。まあ成り行きで……\""
10031030-121 = "ああ、進んで手伝ってくれているとも！しかも先生は、今回のパーティーをとても楽しみにしている！何せ、このマコト様のパーティーなのだからな！"
10031030-122 = "先生が、パーティーを楽しみに……"
10031030-123 = "[s] \"期待……してなくはない、かな……うん。\""
10031030-124 = "そんなパーティーを台無しにするところだったのだ。#nだからお前には、この埋め合わせをしてもらう！"
10031030-125 = "埋め合わせ、って……具体的には何をすれば？"
10031030-132 = "（今こそ万魔殿のスパイが手に入れた情報を活用する時……！）"
10031030-133 = "風紀委員長、空崎ヒナ！"
10031030-134 = "お前には、オープニングのピアノ演奏を担当してもらおうじゃないか！"
10031030-135 = "……はい？"
10031030-136 = "ピアノ、演奏……？"
10031030-137 = "クククッ！そうだ！演奏だ！"
10031030-138 = "（どうやら風紀委員長は、泳げないうえにピアノを弾けないらしいからな！）"
10031030-143 = "委員長のピアノ……！"
10031030-144 = "たしかに、それなら私も撮影を……い、いえ！#nぜひ聴いてみたいですが！"
10031030-145 = "しかし……そんな無茶はさすがに……！"
10031030-146 = "一度承諾した以上、まさか断りはしないだろう？"
10031030-147 = "…………。"
10031030-148 = "[s] \"ヒナ、無理に受ける必要は無いからね。\""
10031030-149 = "……先生。"
10031030-150 = "気を遣ってくれてありがとう。でも、もう約束したから。"
10031030-151 = "私が被害を与えたのは事実だし……#n先生もパーティーを楽しみにしているのなら……"
10031030-152 = "私も、ゲヘナの風紀委員長として……えっと、その……"
10031030-153 = "先生の期待には応えたい、から……"
10031030-154 = "……分かった。#nマコト議長、あなたの要求を受け入れる。"
10031030-155 = "ほ、本当か！？"
10031030-156 = "うむ……"
10031030-157 = "いや！もちろんそう言うと思っていた！#n風紀委員長に二言は無いからな！"
10031030-158 = "では、引き受けたという認識で準備を進めておくとしよう！"
10031030-163 = "じゃあ、まずは温泉開発部を追わせてもらう。"
10031030-164 = "放っておくと、またトラブルを起こすだろうから。#n急いで仕事を終えて、早くピアノの練習を……"
10031030-165 = "……アコ、行こう。"
10031030-171 = "あ、えっと……い、委員長！？"
10031030-177 = "……本当に引き受けるとはな。"
10031030-178 = "……ふっ。"
10031030-179 = "ふふふっ……クククッ、キキキキキッ！"
10031030-180 = "これは良いものが見られそうだ……！"
10031030-181 = "自分で言ったのだから、逃げるわけにはいかないだろう！#n風紀委員長、空崎ヒナ……！"
10031030-184 = "[ns] \"……本当に大丈夫かな。\""
