[translation]
10031030-1 = "Episódio 3; O Pedido da Presidente"
10031030-14 = "Ugh! Como esperado, não deu certo!#nJá é difícil lidar só com o Comitê de Disciplina, e você continua forte como sempre, Presidente Hina!"
10031030-15 = "(Tremedeira, tremedeira...)"
10031030-22 = "O-o que a gente faz?!"
10031030-23 = "Poxa, a nossa presidente está em um estado terrível..."
10031030-24 = "Pessoal, recuar! Vamos fugir!"
10031030-25 = "Pessoal, vamos nos reunir no esconderijo em 30 minutos!"
10031030-32 = "...! Ako, vamos persegui-las."
10031030-36 = "Sim! Presidente...!"
10031030-38 = "Esperem um poucooooo!!"
10031030-40 = "O-o que foi!? Presidente Makoto!"
10031030-42 = "Olhem bem ao redor!#nO que foi que vocês fizeram...!"
10031030-53 = "[ns] \"O auditório acabou sendo destruído...\""
10031030-56 = "E daí?"
10031030-57 = "Como assim, 'e daí'...!?"
10031030-58 = "Por causa da bagunça que vocês do Comitê de Disciplina fizeram, o auditório foi destruído antes mesmo da cerimônia de inauguração!"
10031030-59 = "Como vocês vão assumir a responsabilidade por isso?!"
10031030-60 = "Hein? Isso não é transferir a culpa demais para nós?!"
10031030-61 = "Isso aconteceu porque você contratou o Departamento de Desenvolvimento de Fontes Termais para o trabalho, não foi?"
10031030-62 = "E daí?"
10031030-63 = "Sim...?"
10031030-64 = "Isso já é passado!"
10031030-65 = "[s] \"...Nossa.\""
10031030-66 = "De qualquer forma, a culpa é do Comitê de Disciplina!#nFrancamente, o Sensei do Schale também deveria estar presente!"
10031030-71 = "Já que as coisas chegaram a esse ponto, vocês vão assumir a responsabilidade... Comitê de Disciplina!"
10031030-72 = "Não! Presidente do Comitê de Disciplina! Hina Sorasaki!"
10031030-73 = "Você também, como líder da organização, deveria assumir a responsabilidade!"
10031030-74 = "Não, Presidente!#nNão há necessidade de dar ouvidos a esse tipo de absurdo!"
10031030-75 = "[s] \"Makoto, isso já é demais...\""
10031030-78 = "...Entendi. Então, o que você quer que eu faça?"
10031030-79 = "Presidente!?"
10031030-83 = "[ns] \"Hina...?\""
10031030-84 = "...Hm? Não esperava que fosse ser tão fácil..."
10031030-85 = "Claro, não foi algo intencional, mas é um fato que danos foram causados por nossa causa."
10031030-86 = "Além disso, acabamos atrapalhando o trabalho do Sensei...#nEu também tenho responsabilidade."
10031030-87 = "Então, Presidente Makoto... como você quer que eu assuma a responsabilidade?"
10031030-88 = "U-ugh. Vejamos..."
10031030-90 = "(A Hina, ao contrário do habitual, aceitou meu pedido tão facilmente... Não entendo bem o motivo...)"
10031030-91 = "(Essa é uma ótima oportunidade...! Agora vou deixar bem clara a hierarquia entre o Pandemonium e o Comitê de Disciplina!)"
10031030-92 = "(Como posso humilhar o Comitê de Disciplina e mostrar a todos a autoridade da grande Makoto...!)"
10031030-93 = "(Falando nisso, eu tinha planejado uma apresentação de piano para a festa...)"
10031030-94 = "(Hehehe! Se for assim...!)"
10031030-96 = "Kuku... Kukukuku... Kukukukuku!!!!"
10031030-97 = "[s] \"Sinto um pressentimento muito ruim...\""
10031030-99 = "P-presidente!#nAceitar um acordo tão facilmente pode acabar em algo terrível, sabia!?"
10031030-100 = "Está tudo bem, Ako. Eu já decidi."
10031030-101 = "M-mas...!"
10031030-107 = "...Porque não quero causar problemas para o Sensei."
10031030-108 = "[s] \"H-Hina...!\""
10031030-109 = "Não pode ser... Presidente."
10031030-110 = "Kukuku! Decidi!"
10031030-111 = "Com certeza, ela vai pedir algo absurdo de novo...!"
10031030-112 = "Ah, não se preocupe. Eu não sou idiota. #nFarei apenas exigências realistas."
10031030-113 = "Exigências realistas?"
10031030-114 = "Isso mesmo. #nVocê vai me ajudar com a festa que eu, a grande Makoto, estou preparando!"
10031030-115 = "Festa... Ah, agora que você mencionou, havia informações de que o Pandemonium estava preparando uma."
10031030-116 = "Pode planejar o que quiser, mas... poderia parar de envolver a Presidente nisso!?"
10031030-117 = "Ha! O que você está dizendo, Amau Ako? Nós só estamos tentando dar uma festa maravilhosa."
10031030-118 = "Com a cooperação do Sensei, que está bem aí! Kiki-ki!"
10031030-119 = "......Sensei, é verdade?"
10031030-120 = "[s] \"B-bem, foi o que aconteceu...\""
10031030-121 = "Ah, ele está ajudando de bom grado! Além disso, o Sensei está muito animado com esta festa! Afinal, é a festa da grande Makoto!"
10031030-122 = "O Sensei está animado com a festa..."
10031030-123 = "[s] \"Eu não diria que não estou esperando por ela... acho que sim. É.\""
10031030-124 = "Você quase arruinou uma festa dessas. #nPor isso, você vai ter que compensar!"
10031030-125 = "Compensar, você diz... O que exatamente eu deveria fazer?"
10031030-132 = "(Agora é a hora de usar as informações que o espião do Pandemonium conseguiu...!)"
10031030-133 = "Presidente do Comitê Disciplinar, Sorasaki Hina!"
10031030-134 = "Você vai ficar responsável pela apresentação de piano na abertura!"
10031030-135 = "......Sim?"
10031030-136 = "Piano, apresentação...?"
10031030-137 = "Kukuku! Isso mesmo! Uma apresentação!"
10031030-138 = "(Pelo visto, a Presidente do Comitê Disciplinar não sabe nadar e nem tocar piano!)"
10031030-143 = "O piano da Presidente...!"
10031030-144 = "Certamente, se for assim, eu também poderia filmar... N-não! #nEu adoraria ouvir, mas!"
10031030-145 = "Mas... um pedido tão absurdo assim..."
10031030-146 = "Já que você aceitou uma vez, não vai voltar atrás, vai?"
10031030-147 = "............"
10031030-148 = "[s] \"Hina, você não precisa aceitar se não quiser.\""
10031030-149 = "......Sensei."
10031030-150 = "Obrigada por se preocupar. Mas eu já prometi."
10031030-151 = "É verdade que eu causei danos... #ne se o Sensei está ansioso pela festa..."
10031030-152 = "Eu, como Presidente do Comitê Disciplinar de Gehenna... bem, sabe..."
10031030-153 = "Eu quero atender às expectativas do Sensei, então..."
10031030-154 = "......Entendido. #nPresidente Makoto, eu aceito o seu pedido."
10031030-155 = "S-sério!?"
10031030-156 = "Sim..."
10031030-157 = "Não! É claro que eu sabia que você diria isso! #nA Presidente do Comitê Disciplinar nunca volta atrás na palavra!"
10031030-158 = "Então, vamos seguir com os preparativos considerando que você aceitou!"
10031030-163 = "Bem, primeiro vou atrás do Departamento de Desenvolvimento de Fontes Termais."
10031030-164 = "Se eu os deixar sozinhos, vão causar problemas de novo. #nPreciso terminar o trabalho rápido para praticar piano..."
10031030-165 = "......Ako, vamos."
10031030-171 = "Ah, bem... P-Presidente!?"
10031030-177 = "......Ela realmente aceitou."
10031030-178 = "......Hmph."
10031030-179 = "Fufufu... Kukuku, Kiki-ki-ki!"
10031030-180 = "Isso vai ser algo muito bom de se ver...!"
10031030-181 = "Já que você mesma disse, não tem como fugir! #nPresidente do Comitê Disciplinar, Sorasaki Hina...!"
10031030-184 = "[ns] \"...Será que isso vai dar certo mesmo?\""
