[translation]
10047060-1 = "第6話;それぞれの夢"
10047060-9 = "[ns] \"……屋根裏部屋だ。\""
10047060-10 = "ふふ、まるでシンデレラのよう……。"
10047060-11 = "本当のシンデレラでもなければ、#n灰の中の豆を探してもいませんが――"
10047060-12 = "もういいから！それよりどうするの？#nどうやってここから出るつもり？"
10047060-16 = "[ns] \"ここは何のための部屋なの？\""
10047060-17 = "生徒を外界から隔絶し、マナを奪う空間です……。"
10047060-18 = "ある種の「結界」と言えば良いでしょうか……！"
10047060-22 = "ただの反省室でしょ……。"
10047060-23 = "[s] \"な、なるほど……。\""
10047060-24 = "例えるなら「牢屋」でしょうか。#nそれほど抑圧はされませんが……。"
10047060-25 = "ここ……意外と良いよ、あったかいし……ご飯も出る。"
10047060-26 = "だから……みんな、心配いらない……。"
10047060-27 = "すぐ出られるはず……。"
10047060-28 = "そうです！こういう時こそ、前向きにいきましょう！"
10047060-29 = "みんなのんき過ぎ。"
10047060-30 = "何でついてきちゃったんだろ……はぁ。"
10047060-31 = "何が魔法陣よ……。次こそは、絶対止めるんだから。"
10047060-35 = "[ns1] \"魔法陣、か……。\"\n[ns2] \"そういえばみんな、どうしてオカルトにハマったの？\""
10047060-38 = "特にこれといったきっかけはありません。"
10047060-39 = "私はみんなと楽しい時間が過ごせれば、それでいいのです。"
10047060-40 = "バンドと同じように。"
10047060-41 = "ふふ……それで十分ではないですか？"
10047060-42 = "イヒッ、そうだねぇ……楽しければ……それでいい。"
10047060-43 = "この世界は……闇に覆われている……。"
10047060-44 = "生き抜くなら……楽しみは多ければ、多いほど……良い。"
10047060-45 = "[s] \"カノエは、どうしてオカルトを……？\""
10047060-46 = "私は……ただ、好きなだけ……。"
10047060-47 = "「好き」に……理由はいらないよねぇ？"
10047060-48 = "そしてオカルトは……意外と、勉強になる……。"
10047060-49 = "エリちゃんが言ったように……#n芸術とオカルトは、切り離せない存在だから。"
10047060-50 = "ちなみに……成績はいい方だよ……イヒッ……。"
10047060-51 = "うう……尊敬します、先輩！"
10047060-52 = "私もカノエ先輩を見習わないと……#n実技試験でいつも緊張しちゃうから……。"
10047060-53 = "[s] \"そうなんだ？\""
10047060-54 = "……実は私、落ちこぼれなんです。"
10047060-55 = "入学するまで、絵に自信を持っていたのですが……#nここにはもっと凄い子たちがたくさんいました。"
10047060-56 = "いくら頑張っても実力は伸びず……#n学科の友達の前に立つと、いつも小さくなってしまうんです。"
10047060-57 = "みんなが素敵な作品を生み出してるのに……#n私は今まで納得できるものを作れていません。"
10047060-58 = "[s] \"だから、美術館で友達と会った時に緊張してたんだね。\""
10047060-59 = "え、えへへ……情けないですよね。"
10047060-60 = "でも、これではいけないと思い……#n実力をつける方法を探して――"
10047060-61 = "気づけば、オカルトの虜になっていました。"
10047060-62 = "いつか「創世の影像」のような作品を生み出せたら――"
10047060-63 = "その時こそ、みんなの前に堂々と立てるんです！"
10047060-67 = "変、ですかね……。"
10047060-68 = "[ns3] （懸命に、自分の夢を追う生徒がいる）\n[ns4] （なら、先生がすべきことはなにか――）"
10047060-73 = "[ns] \"なにも変じゃないよ。世界は可能性に満ちているからね。\""
10047060-74 = "にゅっふっふ……！そうですよね？#nやはり、マスターなら応援してくださると思いました！"
10047060-75 = "先生も「そっち側」だったんだ……。"
10047060-76 = "何度も言うけど、私はオカルトなんて信じないからね。"
10047060-77 = "変な噂も、おかしな現象も、全部みんなの勘違い。"
10047060-78 = "悪魔も運命も、未来予知も……魔法だって。#nこの目で見ないと信じられない。"
10047060-79 = "[s] \"そうだね。理性的に考えるのも重要だと思うよ。\""
10047060-80 = "ですが、そんなレナちゃんも素敵な夢を追っているんです。#nいつかキヴォトス最高のファッションデザイナーになる、と言っていましたよね？"
10047060-81 = "ゆ、夢は大きい方がいいでしょ？#n学科の成績も良い方だし……。"
10047060-82 = "そうですね……。#n私の夢は、みんなとずっと、夢と希望に満ちた日々を送ることです……ふふっ。"
10047060-83 = "カノエ先輩の夢は、なんですか？"
10047060-87 = "……秘密ぅ。"
10047060-88 = "教えてくださいよ～！みんな話したじゃないですかぁ。"
10047060-89 = "そんなに、知りたい……？"
10047060-90 = "仕方ないなぁ……私の夢はねぇ……。"
10047060-97 = "前世の絆を取り戻すこと……。"
10047060-98 = "[ns] \"んん……？\""
10047060-99 = "私の前世には、強い絆で結ばれた相手がいた……#n最近、気づいたんだ……イヒッ。"
10047060-105 = "[ns5] \"そ、そうなんだね……。\"\n[ns6] \"い、いいと思うよ……。\""
10047060-108 = "イヒヒ……。"
10047060-113 = "……お忘れですか？あなた方は反省室にいるんですよ？"
10047060-114 = "あ！ご、ごめんなさい！"
10047060-115 = "……まあ、反省するとは最初から思っていませんでしたが。"
10047060-120 = "あ、あれ？"
10047060-127 = "さあ、どうぞ。今回は特別に注意のみとしておきます。"
10047060-128 = "ただし、次は評議会に報告しますからね。"
10047060-129 = "イヒッ、ありがとう……やっぱりミリアちゃんは話がわかるねぇ。"
10047060-130 = "シャーレの先生を拘禁したと知られたら……#n一体何を言われるか分かりませんから。"
10047060-131 = "さぁ、お帰りください。私の気が変わる前に。"
10047060-132 = "あ、ありがと！"
10047060-133 = "ふう、助かりました……！"
10047060-145 = "[ns] \"いまの子も寮監隊？\""
10047060-146 = "そう……昔から世話になっている友達だよ……。"
10047060-147 = "寮監隊の、幹部たちの中でも……話が通じる方でねぇ……。"
10047060-152 = "[ns] \"……そうなんだ。\""
10047060-153 = "では、寮に戻りましょうか。部屋の掃除もしないとです。"
10047060-154 = "あっ……！そういえば、めちゃくちゃになってた！"
10047060-155 = "えへへ……ごめんなさい。"
10047060-159 = "[ns] \"私も手伝うよ。\""
10047060-160 = "ちゃんと綺麗にしてね？止めなかった先生にも責任あるんだから。"
10047060-161 = "私もまあ……ちょっと手伝うよ。"
10047060-162 = "やっぱり、レナちゃんは優しいねぇ……イヒッ……。"
10047060-167 = "ほ、褒められても嬉しくないし！"
10047060-180 = "……こんなところで再会するとは。"
10047060-181 = "ふふっ……[USERNAME]先生。"
