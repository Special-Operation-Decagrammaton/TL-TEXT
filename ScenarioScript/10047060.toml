[translation]
10047060-1 = "Episódio 6; Cada sonho"
10047060-9 = "[ns]\"...É o sótão.\""
10047060-10 = "Hehe, assim como a Cinderela..."
10047060-11 = "Se você não é a verdadeira Cinderela,#nNem procurei feijão nas cinzas..."
10047060-12 = "Suficiente! O que mais você faz?#nComo você vai sair daqui?"
10047060-16 = "[ns]“Para que serve este quarto?”"
10047060-17 = "É um espaço que isola os alunos do mundo exterior e os priva de gestão..."
10047060-18 = "Eu acho que você poderia chamar isso de uma espécie de \"barreira\"...!"
10047060-22 = "É apenas uma sala de reflexão..."
10047060-23 = "[s]“E-eu vejo...”"
10047060-24 = "Por exemplo, seria uma “prisão”.#nNão é tão reprimido assim..."
10047060-25 = "Este lugar... é surpreendentemente bom, é quente... e eles servem comida."
10047060-26 = "Então... pessoal, não há necessidade de se preocupar..."
10047060-27 = "Devo poder sair em breve..."
10047060-28 = "isso mesmo! Em momentos como esse, vamos em frente!"
10047060-29 = "Todo mundo é muito despreocupado."
10047060-30 = "Eu me pergunto por que você me seguiu... suspiro."
10047060-31 = "O que é o círculo mágico...? Da próxima vez, definitivamente pararei."
10047060-35 = "[ns1]\"Círculo mágico, hein...\"\n[ns2]“Pensando bem, por que todos vocês entraram no ocultismo?”"
10047060-38 = "Não há nenhuma razão específica para isso."
10047060-39 = "Contanto que eu possa me divertir com todos, tudo bem."
10047060-40 = "Assim como a banda."
10047060-41 = "Hehe... isso não é suficiente?"
10047060-42 = "Ihi, isso mesmo... contanto que seja divertido... tudo bem."
10047060-43 = "Este mundo está coberto de escuridão..."
10047060-44 = "Se você quer sobreviver... quanto mais diversão você tiver, melhor..."
10047060-45 = "[s]\"Por que Kanoe está no ocultismo...?\""
10047060-46 = "Eu... assim como..."
10047060-47 = "“Eu gosto de você”… você não precisa de motivo, certo?"
10047060-48 = "E o oculto...surpreendentemente, aprendi muito..."
10047060-49 = "Como Eli disse...#nPorque a arte e o oculto são inseparáveis."
10047060-50 = "A propósito... suas notas são boas... hehe..."
10047060-51 = "Ugh... eu respeito você, Senpai!"
10047060-52 = "Eu tenho que aprender com Kanoe-senpai também...#nSempre fico nervoso durante as provas práticas..."
10047060-53 = "[s]\"Isso mesmo?\""
10047060-54 = "...Na verdade, sou um fracasso."
10047060-55 = "Eu estava confiante em minhas habilidades de desenho até entrar na escola, mas...#nHavia muitas crianças incríveis aqui."
10047060-56 = "Não importa o quanto você tente, suas habilidades não irão melhorar...#nSempre me sinto pequeno quando estou na frente dos meus colegas."
10047060-57 = "Todo mundo está criando trabalhos maravilhosos...#nNão consegui criar nada que me satisfaça até agora."
10047060-58 = "[s]“É por isso que você ficou nervoso quando encontrou seus amigos no museu.”"
10047060-59 = "え、えへへ……情けないですよね。"
10047060-60 = "でも、これではいけないと思い……#nProcurando uma maneira de melhorar minhas habilidades..."
10047060-61 = "Antes que eu percebesse, eu estava viciado no ocultismo."
10047060-62 = "Se algum dia eu pudesse criar uma obra como \"Imagem da Criação\"..."
10047060-63 = "Só então poderei ficar orgulhosamente diante de todos!"
10047060-67 = "Isso é estranho, não é?"
10047060-68 = "[ns3](Há estudantes que estão trabalhando duro para perseguir seus sonhos)\n[ns4](Então, o que o Sensei deve fazer?)"
10047060-73 = "[ns]“Não há nada de estranho nisso. O mundo está cheio de possibilidades.”"
10047060-74 = "Nyufufufu…! Não é verdade?#nAchei que o Mestre iria me apoiar, afinal!"
10047060-75 = "A Senseia também estava desse lado..."
10047060-76 = "Como já disse muitas vezes, não acredito no ocultismo."
10047060-77 = "Rumores estranhos e fenômenos estranhos são todos mal-entendidos das pessoas."
10047060-78 = "Demônios, destino, previsão do futuro... até magia.#nNão posso acreditar até ver com meus próprios olhos."
10047060-79 = "[s]“Sim, acho importante pensar racionalmente.”"
10047060-80 = "Porém, Lena também está perseguindo um sonho maravilhoso.#nVocê disse que um dia se tornaria o melhor estilista de Kivotos, certo?"
10047060-81 = "Yu, é melhor sonhar grande, certo?#nEle também tem boas notas na escola..."
10047060-82 = "Concordo…….#nMeu sonho é passar dias cheios de sonhos e esperanças com todos...hehe."
10047060-83 = "Qual é o sonho de Kanoe-senpai?"
10047060-87 = "...É um segredo."
10047060-88 = "Por favor, me avise! Todo mundo falou sobre isso, certo?"
10047060-89 = "Você quer saber tanto?"
10047060-90 = "Eu não posso evitar... não é meu sonho..."
10047060-97 = "Para recuperar os laços da minha vida anterior..."
10047060-98 = "[ns]\"Hum...?\""
10047060-99 = "Na minha vida anterior, havia alguém com quem eu tinha um forte vínculo...#nNotei algo recentemente... hehe."
10047060-105 = "[ns5]\"Ah, isso mesmo...\"\n[ns6]\"Eu-eu acho que é bom...\""
10047060-108 = "Ei, ei...."
10047060-113 = "...Você esqueceu? Você está na sala de reflexão?"
10047060-114 = "um! Eu sinto muito!"
10047060-115 = "...Bem, desde o início não pensei que me arrependeria."
10047060-120 = "Ah, o que?"
10047060-127 = "Aqui você vai. Vou apenas dar-lhe uma nota especial desta vez."
10047060-128 = "No entanto, da próxima vez irei reportar ao conselho."
10047060-129 = "Ihi, obrigada...Milia-chan não entende do que estou falando, afinal."
10047060-130 = "E se se souber que detive o Sensei da placa de Petri...#nVocê nunca sabe o que eles vão dizer."
10047060-131 = "Agora, por favor, vá para casa. Antes que eu mude de ideia."
10047060-132 = "Ah, obrigado!"
10047060-133 = "Uau, isso foi útil...!"
10047060-145 = "[ns]\"Seu filho atual também é inspetor de dormitório?\""
10047060-146 = "Sim... ele é um amigo com quem estou em dívida há muito tempo..."
10047060-147 = "Entre os executivos da equipe de supervisão do dormitório... é com ele que posso conversar..."
10047060-152 = "[ns]\"……Isso mesmo.\""
10047060-153 = "Agora, vamos voltar para o dormitório. Eu também tenho que limpar meu quarto."
10047060-154 = "Ah...! Pensando bem, foi uma bagunça!"
10047060-155 = "Ehehe... me desculpe."
10047060-159 = "[ns]“Eu também ajudarei.”"
10047060-160 = "Certifique-se de mantê-lo limpo, ok? O Sensei que não o impediu também é responsável."
10047060-161 = "Eu também...vou te ajudar um pouco."
10047060-162 = "Como esperado, Rena-chan é gentil...hehe..."
10047060-167 = "Ah, não fico feliz mesmo sendo elogiado!"
10047060-180 = "...Não acredito que nos encontraremos novamente em um lugar como este."
10047060-181 = "Hehe...[USERNAME]Sensei."