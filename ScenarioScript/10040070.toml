[translation]
10040070-1 = "第7話;オニの特権"
10040070-3 = "――――"
10040070-4 = "――――せい。"
10040070-5 = "――――――――"
10040070-6 = "――――せん――せい。"
10040070-7 = "――――先生。"
10040070-8 = "――先生、何か考え事ですか？"
10040070-9 = "[ns1] \"あ、ううん。\"\n[ns2] \"ただ今日起きたことを振り返ってたんだ。\""
10040070-12 = "ふふっ、そうでしたか。"
10040070-13 = "暗いので、足もとには気をつけてくださいね。"
10040070-14 = "皆さん、先生を待ってるんですよ。"
10040070-15 = "よければ、転ばないよう手をつなぎませんか？"
10040070-16 = "はい、どうぞ。"
10040070-17 = "ふふっ、冗談です。#nでもおかげで、先生の珍しい表情に出会えました。"
10040070-18 = "その顔を目にしたのは、私だけなんですね。#n待ってる皆さんに、少しだけ申し訳ないです。"
10040070-19 = "でも、そうですね……。"
10040070-20 = "先生を捕まえた「オニ」の特権と考えれば……悪い気はしないのかも？"
10040070-21 = "ふふっ。少し浮かれて見えますか？#nたしかに、そうなのかもしれません。"
10040070-22 = "……どうしました？"
10040070-23 = "いつから気づいていたのかが、聞きたいんですね？"
10040070-24 = "それはですねえ……。"
10040070-25 = "先生を残したまま、#nコユキちゃんが逃げ出した時から、です。"
10040070-26 = "[s3] \"ほとんど最初から……！？\"\n[s4] \"全部知ってたうえで、あんな仕打ちを……！？\""
10040070-29 = "ふふっ、そこはお互い様だと思いますよ？"
10040070-30 = "だって、コユキちゃんのためとはいえ……。"
10040070-31 = "……先生も、素直に出てきてくれなかったのですから。"
10040070-36 = "なんて、ごめんなさい。#n少し意地悪な言い方でしたね。"
10040070-37 = "もちろん、ほかならぬ先生のことですから、#n事情があることはわかってました。"
10040070-38 = "でも、やっぱり……。"
10040070-39 = "コユキちゃんも先生も楽しそうだったので。"
10040070-40 = "水を差したくなかったんです。"
10040070-41 = "コユキちゃんを捕まえた後になってからですけど、#nユウカちゃんも概ね事情には気付いたみたいですよ。"
10040070-42 = "ふふっ。先生がどう感じたか分かりませんが……。"
10040070-43 = "コユキちゃんたちとのオニごっこ、私は楽しかったですよ。"
10040070-44 = "皆さんが息を合わせて助けあう姿や慌てた様子も見られましたし。"
10040070-45 = "こんな機会は、そうそうないでしょうから。"
10040070-46 = "だから……。"
10040070-47 = "つい、捕まえるのが惜しくなってしまったんです。"
10040070-48 = "ふふっ。いま「じゃあ、またやろう」と言いかけましたね。#nそうじゃないんです。わかりますよね。"
10040070-49 = "……なんて、ごめんなさい。私の話ばかりになってしまいました。"
10040070-50 = "先生はどうでしたか？#n私が聞くのも変ですが、ちゃんと楽しめました？"
10040070-51 = "[s5] \"……スリル満点だったよ。\"\n[s6] \"こういう感覚、久しぶりかも。\""
10040070-54 = "そうでしたか。良かった。#nご不快でしたら、申し訳ないと思っていたので。"
10040070-55 = "……どうしました？"
10040070-56 = "コユキちゃんが意味深な発言を？"
10040070-57 = "……具体的にお聞かせいただけますか？"
10040070-58 = "[s7] \"ずっと見られている気がするって。\"\n[s8] \"ノアの視線を感じていたのかも。\""
10040070-61 = "なるほど……。"
10040070-62 = "さすが、コユキちゃんですね……。"
10040070-63 = "気付かれないように動いたつもりでしたが、勘がいいんでしょうね。"
10040070-64 = "まあ、当然のことかもしれません。#nコユキちゃんは……。"
10040070-68 = "……いえ、なんでもないです。"
10040070-69 = "話が長くなってしまうので、ふふっ。"
10040070-70 = "[s9] \"……えっ？\"\n[s10] \"気になるような……。\""
10040070-73 = "まあまあ。それより先生、そろそろ到着です。"
10040070-74 = "……皆さん、お待ちかねですよ。"
10040070-84 = "え、刺しちゃうの？そこでいいの？"
10040070-85 = "統計を踏まえると、そこは良くないのでは……。"
10040070-86 = "独立試行だから、どこを刺しても同じなのはそうだけど……。"
10040070-87 = "[ns11] \"……みんな集まってるね。\"\n[ns12] \"盛り上がってるみたいだね。\""
10040070-90 = "あ～もう！私の番なんですから、[ruby=がいや]外野[/ruby]は静かにしててください！！"
10040070-91 = "なんでもいいから、早めにお願い。"
10040070-92 = "言われなくともやりますよ～！#nここが大丈夫なら、私の勝ち……！"
10040070-93 = "そぉれえええええ！！"
10040070-98 = "ああああー！なんでぇぇえええ！！こんなのクソゲーです！！"
10040070-103 = "（次のゲームから参加して、みんなと一緒に楽しんだ）"
10040070-104 = "……あ、しまった。"
10040070-105 = "あ～！もう何やってるんですか！！"
10040070-111 = "ちょ、ああああああ！！"
10040070-112 = "（……その後、三連敗したコユキは、涙を流しながらしばらく不貞腐れていた）"
10040070-114 = "（……数時間後）"
10040070-117 = "もうこんな時間……日付も変わっちゃいますね。"
10040070-118 = "コユキちゃんは……寝てしまいましたか。"
10040070-119 = "カウントダウンするって言ってたのに。ふふっ。"
10040070-120 = "無理に起こすのも可愛そうですし……。"
10040070-121 = "仕方ないので、あとは起きている方だけで――"
10040070-122 = "……？"
10040070-123 = "まあ……。"
10040070-130 = "[ns13] \"……みんな寝てるね。\"\n[ns14] \"誰も起きてないみたい。\""
10040070-133 = "あらあら……。"
10040070-134 = "コユキちゃんやマキちゃんはともかく……ちょっと意外ですね。"
10040070-135 = "ヴェリタスの皆さんやユウカちゃんまで……。"
10040070-136 = "はしゃいでましたし、そのせいでしょうか？"
10040070-137 = "[s15] \"普段遅くまでがんばってるし……。\"\n[s16] \"こういう時くらい寝かせてあげよう。\""
10040070-140 = "ええ、そうですね。"
10040070-141 = "ですが、がんばっているのは先生もなのでは……？"
10040070-142 = "……もしかしてですが。"
10040070-143 = "私が起きているから、でしょうか……。"
10040070-144 = "先生は、そういうところで気をつかう方ですもんね。"
10040070-145 = "……あら、違いましたか？"
10040070-146 = "ふふっ、本当ですか？そうじゃないと言い切れます？"
10040070-147 = "そんなに必死に否定されると、余計に怪しく思えてきちゃいますよ。"
10040070-151 = "冗談です。ふふっ。"
10040070-152 = "ちゃ～んと、信じてますよ。"
10040070-153 = "さて、私も寝てしまう前に……。"
10040070-157 = "[ns17] \"……ノア？\"\n[ns18] \"どこに行くの？\""
10040070-160 = "もうすぐ日付が変わってしまいますから。#n新年のカウントダウンをしようと思いまして。"
10040070-161 = "でも、皆さんを起こしたら申し訳ないですし……。"
10040070-162 = "場所を移した方がいいかなと。"
10040070-170 = "……先生は、こんな時間に女の子を一人で出歩かせたりしませんよね？"
