[translation]
10040070-1 = "Episódio 7; O privilégio do pegador"
10040070-3 = "――――"
10040070-4 = "――――sen."
10040070-5 = "――――――――"
10040070-6 = "――――sen――sei."
10040070-7 = "――――Sensei."
10040070-8 = "――Sensei, está pensando em algo?"
10040070-9 = "[ns1] \"Ah, não, nada.\"\n[ns2] \"Só estava refletindo sobre o que aconteceu hoje.\""
10040070-12 = "Fufu, entendo."
10040070-13 = "Está escuro, então tome cuidado onde pisa."
10040070-14 = "Todos estão esperando pelo Sensei."
10040070-15 = "Se quiser, que tal darmos as mãos para não tropeçar?"
10040070-16 = "Sim, aqui está."
10040070-17 = "Fufu, é brincadeira. #nMas, graças a isso, pude ver uma expressão rara do Sensei."
10040070-18 = "Sou a única que viu esse rosto. #nSinto um pouco de pena dos outros que estão esperando."
10040070-19 = "Mas, sabe..."
10040070-20 = "Se eu pensar nisso como um privilégio de quem pegou o Sensei no pega-pega... talvez não seja uma sensação ruim?"
10040070-21 = "Fufu. Pareço estar um pouco animada demais? #nTalvez seja verdade."
10040070-22 = "……O que houve?"
10040070-23 = "Quer saber desde quando eu percebi?"
10040070-24 = "Bem, sobre isso..."
10040070-25 = "Desde o momento em que a Koyuki-chan fugiu, #ndeixando o Sensei para trás."
10040070-26 = "[s3] \"Desde quase o começo...!?\"\n[s4] \"Sabendo de tudo isso, você fez aquilo comigo...!?\""
10040070-29 = "Fufu, acho que estamos quites, não acha?"
10040070-30 = "Afinal, mesmo que tenha sido pela Koyuki-chan..."
10040070-31 = "……O Sensei também não apareceu logo de cara."
10040070-36 = "Desculpe, eu disse isso de um jeito um pouco maldoso."
10040070-37 = "Claro, tratando-se do Sensei, #neu sabia que havia um motivo por trás."
10040070-38 = "Mas, ainda assim..."
10040070-39 = "A Koyuki-chan e o Sensei pareciam estar se divertindo."
10040070-40 = "Eu não queria estragar o momento."
10040070-41 = "Foi só depois de pegar a Koyuki-chan que a Yuuka-chan também percebeu a situação, mais ou menos."
10040070-42 = "Fufu. Não sei como o Sensei se sentiu, mas..."
10040070-43 = "Eu me diverti no pega-pega com vocês."
10040070-44 = "Pude ver todos trabalhando juntos em sintonia e também o desespero de vocês."
10040070-45 = "Não é sempre que temos oportunidades assim."
10040070-46 = "Por isso..."
10040070-47 = "Acabei ficando com pena de capturar vocês."
10040070-48 = "Fufu. Você ia dizer \"então vamos fazer de novo\", não ia? #nNão é bem assim. Você entende, certo?"
10040070-49 = "……Desculpe, acabei falando só de mim."
10040070-50 = "E o Sensei? #nÉ estranho eu perguntar, mas você se divertiu de verdade?"
10040070-51 = "[s5] \"……Foi cheio de emoção.\"\n[s6] \"Faz tempo que não sentia algo assim.\""
10040070-54 = "Entendo. Fico feliz. #nEu estava preocupada se isso tinha sido desagradável para você."
10040070-55 = "……O que houve?"
10040070-56 = "A Koyuki-chan disse algo enigmático?"
10040070-57 = "……Poderia me contar detalhadamente?"
10040070-58 = "[s7] \"Ela disse que sentia que estava sendo observada o tempo todo.\"\n[s8] \"Talvez ela tenha sentido o seu olhar, Noa.\""
10040070-61 = "Entendo..."
10040070-62 = "Como esperado da Koyuki-chan..."
10040070-63 = "Tentei me mover sem ser notada, mas ela deve ter uma intuição aguçada."
10040070-64 = "Bem, talvez seja natural. A Koyuki-chan..."
10040070-68 = "……Não, não é nada."
10040070-69 = "A conversa ficaria longa demais, hehe."
10040070-70 = "[s9] \"……Eh?\"\n[s10] \"Estou ficando curioso...\""
10040070-73 = "Bem, bem. Mais importante, Sensei, já estamos chegando."
10040070-74 = "……Todos estão esperando por você."
10040070-84 = "Ei, você vai espetar aí? Tem certeza?"
10040070-85 = "Com base nas estatísticas, não seria melhor evitar esse lugar...?"
10040070-86 = "Como são eventos independentes, não importa onde você espete, mas ainda assim..."
10040070-87 = "[ns11] \"……Todos estão reunidos, né.\"\n[ns12] \"Parece que está bem animado.\""
10040070-90 = "Ah, chega! É a minha vez, então os espectadores fiquem quietos!!"
10040070-91 = "Tanto faz, só faz logo."
10040070-92 = "Eu vou fazer mesmo sem você pedir~! #nSe aqui estiver seguro, eu ganho...!"
10040070-93 = "Lá vaiiiiiii!!"
10040070-98 = "Aaaaaah! Por queeee!! Isso é um jogo horrível!!"
10040070-103 = "（Participei do próximo jogo e me diverti com todos）"
10040070-104 = "……Ah, droga."
10040070-105 = "Ah! Mas o que você está fazendo!!"
10040070-111 = "Espera, aaaaaah!!"
10040070-112 = "（……Depois disso, Koyuki, que perdeu três vezes seguidas, ficou emburrada por um tempo enquanto chorava）"
10040070-114 = "（……Algumas horas depois）"
10040070-117 = "Já está tão tarde... a data vai mudar logo."
10040070-118 = "A Koyuki-chan... acabou dormindo."
10040070-119 = "E ela disse que ia fazer a contagem regressiva. Hehe."
10040070-120 = "Seria uma pena acordá-la à força..."
10040070-121 = "Não tem jeito, o resto de nós que estamos acordados vamos――"
10040070-122 = "……?"
10040070-123 = "Bem..."
10040070-130 = "[ns13] \"……Todos estão dormindo.\"\n[ns14] \"Parece que ninguém está acordado.\""
10040070-133 = "Ora, ora..."
10040070-134 = "Deixando a Koyuki-chan e a Maki-chan de lado... isso é um pouco surpreendente."
10040070-135 = "Até o pessoal do Veritas e a Yuuka-chan..."
10040070-136 = "Eles estavam tão animados, será que foi por isso?"
10040070-137 = "[s15] \"Eles se esforçam muito no dia a dia...\"\n[s16] \"Vamos deixá-los dormir, já que é uma ocasião especial.\""
10040070-140 = "Sim, é verdade."
10040070-141 = "Mas o Sensei também se esforça muito, não é...?"
10040070-142 = "……Por acaso."
10040070-143 = "Será que é porque eu ainda estou acordada...?"
10040070-144 = "O Sensei é o tipo de pessoa que se preocupa com essas coisas, não é?"
10040070-145 = "……Oh, eu estava errada?"
10040070-146 = "Hehe, é verdade mesmo? Pode afirmar que não?"
10040070-147 = "Se você negar com tanto desespero, acabo ficando ainda mais desconfiada."
10040070-151 = "É brincadeira. Hehe."
10040070-152 = "Eu acredito em você, de verdade."
10040070-153 = "Bem, antes que eu também durma..."
10040070-157 = "[ns17] \"……Noah?\"\n[ns18] \"Onde você vai?\""
10040070-160 = "A data vai mudar em breve. #nPensei em fazer a contagem regressiva do Ano Novo."
10040070-161 = "Mas eu não gostaria de incomodar acordando todos..."
10040070-162 = "Então achei melhor mudar de lugar."
10040070-170 = "……Sensei, você não deixaria uma garota andar por aí sozinha a essa hora, deixaria?"
