[translation]
84300200600-11 = "Aqui está o que prometi. ...E então? A recompensa está devidamente preparada, não está?"
84300200600-15 = "Acredito que o contrato já foi assinado. Você ainda tem dúvidas sobre isso?"
84300200600-16 = "Se tudo correr bem, entregarei os 25% dos lucros conforme o documento."
84300200600-17 = "Quanto ao valor total..."
84300200600-18 = "Depende de 'o quanto vocês vão se esforçar'! Conto com vocês, entendido?"
84300200600-20 = "Sim, sim, eu entendo."
84300200600-21 = "...Ainda assim, ganhar dinheiro destruindo a EXPO. Vocês realmente pensam em coisas terríveis."
84300200600-26 = "(O quê...!)"
84300200600-27 = "(Sobre o que, exatamente, elas estão falando...?)"
84300200600-29 = "Normalmente, as pessoas tentam se esforçar por conta própria, não é?"
84300200600-30 = "Ah, francamente! É por isso que vocês não conseguem ganhar muito dinheiro."
84300200600-31 = "Pessoas ricas são aquelas que conseguem realizar ideias inovadoras!"
84300200600-32 = "Ou seja, ser o primeiro e o melhor! ...Você conseguiu entender?"
84300200600-33 = "Bem, vou indo. Tenho uma agenda cheia depois disso."
84300200600-34 = "Dito isso, sinta-se à vontade para entrar em contato se precisar de algo! Até mais!"
84300200600-41 = "(Fazer a Millennium EXPO ser cancelada para ganhar muito dinheiro...?)"
84300200600-42 = "Por que...?"
84300200600-43 = "(...Droga! O som)"
84300200600-45 = "Ei? Agora há pouco... você não ouviu alguma coisa?"
84300200600-46 = "Hã? Não me diga que alguém estava ouvindo...? Isso seria um desastre!"
84300200600-47 = "Se o plano for descoberto, é o nosso fim... não teremos recompensa nem nada!"
84300200600-48 = "Estou com um pressentimento ruim... sinto como se estivéssemos sendo observadas..."
84300200600-49 = "P-pelo menos vamos sair daqui. Rápido!"
84300200600-53 = "Ei! Esperem aí!!"
84300200600-59 = "(...Ufa)"
84300200600-60 = "(Será que consegui escapar do perigo...?)"
84300200600-65 = "Ah, droga... elas escaparam, tsc. Estávamos tão perto."
84300200600-66 = "(...?)"
84300200600-67 = "(Aquilo é...)"
84300200600-74 = "Ei."
84300200600-75 = "(...)"
84300200600-76 = "Ei, responda."
84300200600-80 = "Estou falando com você, aí dentro da caixa. Tem coragem de me ignorar, é?"
84300200600-81 = "(...!)"
84300200600-82 = "Saia daí. Relaxa, eu não vou te devorar."
