[translation]
84300200600-11 = "約束のブツだ。……で？報酬はしっかり用意してあるんだろうな？"
84300200600-15 = "すでに契約書は交わしているかと。今更それを疑うのですか？"
84300200600-16 = "上手くいけば、書面通り利益の25%をお渡しします。"
84300200600-17 = "総額については……"
84300200600-18 = "あなた方が「どれだけやってくれるか」にかかっているのです！そこのところ、お願いしますよ？"
84300200600-20 = "はいはい、分かってますよ。"
84300200600-21 = "……にしても、EXPOをめちゃくちゃにして金を稼ぐなんて。悪いこと考えるもんだな。"
84300200600-26 = "（なっ……！）"
84300200600-27 = "（彼女たちは一体、何の話を……？）"
84300200600-29 = "普通なら、自分たちでなんとか頑張ろうとするもんだろ？"
84300200600-30 = "は～まったく！それだから、大きく稼げないのですよ。"
84300200600-31 = "お金持ちというのは、斬新なアイデアを実現できた人のことを指すのです！"
84300200600-32 = "つまり、最初にして最高に成る！……ご理解いただけましたか？"
84300200600-33 = "では、私はこれで。この後も予定が詰まっておりまして。"
84300200600-34 = "とはいえ、何かあればお気軽にご連絡くださいね！それでは！"
84300200600-41 = "（ミレニアムEXPOを中止させて、大きく稼ぐ……？）"
84300200600-42 = "何故……？"
84300200600-43 = "（……っ！声が）"
84300200600-45 = "あれ？今……なんか聞こえなかった？"
84300200600-46 = "えっ？まさか、誰かに聞かれてたり……？それはマズイって！"
84300200600-47 = "計画がバレたら一巻の終わり……報酬も何もなくなっちまうよ！"
84300200600-48 = "なんか嫌な予感……誰かに見られてるような気もするし……。"
84300200600-49 = "とっ、とりあえず移動しよう。早く！"
84300200600-53 = "ちょっと！待ってよ！！"
84300200600-59 = "（……ふう）"
84300200600-60 = "（難は逃れられたか……）"
84300200600-65 = "あーあ……逃がしちまった、チッ。あと一歩だったのによぉ。"
84300200600-66 = "（……？）"
84300200600-67 = "（あれは……）"
84300200600-74 = "おい。"
84300200600-75 = "（……）"
84300200600-76 = "おい、返事しろよ。 "
84300200600-80 = "お前だよお前、箱ん中の。無視決め込むたぁいい度胸してんなぁ？"
84300200600-81 = "（……！）"
84300200600-82 = "出てこいよ。まっ、取って食いやしねえって。"
