[translation]
200004-1 = "Episode 4;The Shining Trapezohedron"
200004-4 = "H-hey..."
200004-5 = "Don't you think they're taking a long time to come back?"
200004-6 = "...It hasn't even been three minutes since they dove."
200004-7 = "Y-yeah, but you never know what might happen underwater..."
200004-8 = "What if they got swept away by a current?#nWhat if they were attacked by a dangerous creature?"
200004-9 = "...I don't know."
200004-10 = "But, they'll be fine."
200004-15 = "...That's the signal."
200004-16 = "What's the beacon's position?"
200004-17 = "1,000 feet to the southeast."
200004-18 = "They got swept pretty far away. #nIt's getting dark, let's go pick them up."
200004-22 = "Phew..."
200004-23 = "...You're further out than the planned point. What happened?"
200004-24 = "Sorry, sorry. The current was faster than I thought. #nI had a bit of trouble adjusting my direction."
200004-25 = "...Did you decompress properly?"
200004-26 = "Obviously. Who do you think I am?"
200004-27 = "I'd be fine even if I didn't, but..."
200004-28 = "Don't let your guard down. Anything can happen underwater."
200004-29 = "Ugh..."
200004-33 = "So, how was it inside the 'shipwreck'?"
200004-34 = "Zero harvest. Too much time has passed."
200004-35 = "I guess it was a bust this time too..."
200004-36 = "Oh, but... I did find something interesting."
200004-38 = "Is this... a shard of glass?"
200004-39 = "It looks harder than glass... It has a beautiful shape."
200004-40 = "It almost looks like it's glowing, doesn't it? Doesn't it look a bit like a gemstone?"
200004-41 = "I suppose so. This light... it's like the horizon dyed in the sunset."
200004-42 = "...Don't stare at it too much. #nWe don't know what kind of effect it might have."
200004-43 = "It might burn your skin..."
200004-46 = "So, how long are we going to keep doing this mission?"
200004-47 = "You're asking that now?"
200004-48 = "...Until we get new orders. We can't just quit on our own."
200004-49 = "This is our mission, after all."
200004-50 = "I'm going to get all pruney..."
200004-54 = "...That's it for today. #nLet's head back."
200004-55 = "With this—the 'Shining Trapezohedron'."