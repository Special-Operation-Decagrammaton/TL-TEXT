[translation]
200004-1 = "Эпизод 4;Сияющий Трапецоэдр"
200004-4 = "Э-эй..."
200004-5 = "Вам не кажется, что они что-то долго не возвращаются?"
200004-6 = "...Да они и трёх минут ещё не пробыли под водой."
200004-7 = "Н-ну да, но под водой ведь всякое может случиться..."
200004-8 = "А что, если их унесло течением?#nЧто, если на них напало какое-то опасное существо?"
200004-9 = "...Не знаю."
200004-10 = "Но с ними всё будет в порядке."
200004-15 = "...Это сигнал."
200004-16 = "Где зафиксирован маяк?"
200004-17 = "В 1000 футах к юго-востоку."
200004-18 = "Их унесло довольно далеко. #nУже темнеет, поплыли за ними."
200004-22 = "Фух..."
200004-23 = "...Вас вынесло дальше запланированной точки. Что стряслось?"
200004-24 = "Простите, простите. Течение оказалось сильнее, чем я думала. #nМне было немного трудно скорректировать направление."
200004-25 = "...Вы прошли декомпрессию как положено?"
200004-26 = "Обижаешь. За кого ты меня принимаешь?"
200004-27 = "Да я бы и без неё не пропала, но..."
200004-28 = "Не теряй бдительности. Под водой может случиться что угодно."
200004-29 = "Ох..."
200004-33 = "Ну так и что там было внутри «затонувшего корабля»?"
200004-34 = "Улов нулевой. Слишком много времени прошло."
200004-35 = "Похоже, в этот раз тоже пустышка..."
200004-36 = "О, хотя... Кое-что интересное я всё же нашла."
200004-38 = "Это... осколок стекла?"
200004-39 = "На ощупь оно прочнее стекла... И форма у него красивая."
200004-40 = "Оно как будто светится, правда? Немного похоже на драгоценный камень."
200004-41 = "Пожалуй, что так. Этот свет... он словно линия горизонта, окрашенная закатом."
200004-42 = "...Не уставляйся на него так сильно. #nМы не знаем, какое воздействие он может оказать."
200004-43 = "Он может и кожу обжечь..."
200004-46 = "И долго мы ещё будем выполнять эту миссию?"
200004-47 = "Ты только сейчас решила спросить?"
200004-48 = "...Пока не поступят новые приказы. Мы не можем просто так всё бросить по своей воле."
200004-49 = "В конце концов, это наша миссия."
200004-50 = "Я так скоро совсем сморщусь от воды..."
200004-54 = "...На сегодня закончили. #nПора возвращаться."
200004-55 = "Вместе с ним — с «Сияющим Трапецоэдром»."