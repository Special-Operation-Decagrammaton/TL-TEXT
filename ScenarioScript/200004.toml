[translation]#[Texto Final. mas eventualmente pode haver alterações na formatação de texto. - Filipe 03/07.]
200004-1 = "Episódio 4: O Trapezoedro Cintilante"
200004-4 = "E-Ei……"
200004-5 = "Elas não tão demorando pra voltar?"
200004-6 = "……Nem faz 3 minutos que mergulharam."
200004-7 = "M-Mas debaixo d'água nunca se sabe\no que pode acontecer……"
200004-8 = "Será que a correnteza não levou elas?#nSerá que não foram atacadas por\nalgum bicho perigoso?"
200004-9 = "……Não sei."
200004-10 = "Mas elas vão ficar bem."
200004-15 = "……O sinal."
200004-16 = "Posição do beacon?"
200004-17 = "1000 pés a sudeste."
200004-18 = "Foram arrastadas pra bem longe, hein.#nTá escuro; bora buscar elas?"
200004-22 = "Ufa……"
200004-23 = "……Vocês saíram do ponto combinado.\nO que houve?"
200004-24 = "Foi mal, foi mal. A correnteza tava mais\nforte do que eu esperava.#nDemorei um pouco pra ajustar a direção."
200004-25 = "……Fez a descompressão direitinho?"
200004-26 = "Óbvio. Tá achando que fala com quem?"
200004-27 = "Eu nem precisava fazer, na real……"
200004-28 = "Nada de bobeira. Debaixo d'água,\ntudo pode acontecer."
200004-29 = "Uhh……"
200004-33 = "E aí, como era dentro do \"navio naufragado\"?"
200004-34 = "Colheita zero. Passou tempo demais."
200004-35 = "Dessa vez também não rolou, né……"
200004-36 = "Ah, mas…… achei uma coisa interessante."
200004-38 = "Isso é um caco de vidro……?"
200004-39 = "Parece mais duro que vidro……\ne o formato é bonito."
200004-40 = "Até parece que tá brilhando, né?\nMeio que uma joia, não acha?"
200004-41 = "Pois é. Esse brilho…… parece o horizonte\ntingido pelo pôr do sol."
200004-42 = "……Não fica olhando demais.#nNão se sabe que efeitos isso pode ter."
200004-43 = "Vai que queima a pele……"
200004-46 = "E aí, até quando essa missão vai durar?"
200004-47 = "Só agora pergunta?"
200004-48 = "……Até chegarem novas ordens.\nNão podemos parar por conta própria."
200004-49 = "Afinal, essa é a nossa missão."
200004-50 = "Vou ficar toda enrugada……"
200004-54 = "……Por hoje chega.#nBora voltar?"
200004-55 = "Levando este―― \"Trapezoedro Cintilante\"."
