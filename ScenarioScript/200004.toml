[translation]#[Texto Final. - Filipe 12/07.]
200004-1 = "Episódio 4;O Trapezoedro Cintilante"
200004-4 = "E-Ei……"
200004-5 = "Elas não tão demorando pra voltar?"
200004-6 = "……Nem faz 3 minutos que mergulharam."
200004-7 = "M-Mas debaixo d'água nunca se sabe o que pode acontecer……"
200004-8 = "Será que a correnteza não levou elas?#nSerá que não foram atacadas por algum bicho perigoso?"
200004-9 = "……Não sei."
200004-10 = "Mas elas vão ficar bem."
200004-15 = "……O sinal."
200004-16 = "Posição do beacon?"
200004-17 = "1000 pés a sudeste."
200004-18 = "Foram arrastadas pra bem longe, hein.#nTá escuro mas bora buscar elas?"
200004-22 = "Ufa……"
200004-23 = "……Vocês saíram do ponto combinado. O que houve?"
200004-24 = "Foi mal, foi mal. A correnteza tava mais forte do que eu esperava.#nDemorei um pouco pra ajustar a direção."
200004-25 = "……Fez a descompressão direitinho?"
200004-26 = "Óbvio. Tá achando que fala com quem?"
200004-27 = "Eu nem precisava fazer, na real……"
200004-28 = "Nada de bobeira. Debaixo d'água, tudo pode acontecer."
200004-29 = "Uhh……"
200004-33 = "E aí, como era por dentro do \"navio naufragado\"?"
200004-34 = "Colheita zero. Passou tempo demais."
200004-35 = "Dessa vez também não rolou, né……"
200004-36 = "Ah, mas…… achei uma coisa interessante."
200004-38 = "Isso é um \"caco de vidro\"……?"
200004-39 = "Parece mais duro que vidro…… e o formato é bonito."
200004-40 = "Até parece que tá brilhando, né? Meio que uma joia, não acha?"
200004-41 = "Pois é. Esse brilho…… parece o horizonte tingido pelo pôr do sol."
200004-42 = "……Não fica olhando demais.#nNão se sabe que efeitos isso pode ter."
200004-43 = "Vai que queima a pele……"
200004-46 = "E aí, até quando essa missão vai durar?"
200004-47 = "Só agora pergunta?"
200004-48 = "……Até chegarem novas ordens. Não podemos parar por conta própria."
200004-49 = "Afinal, essa é a nossa missão."
200004-50 = "Vou ficar toda enrugada……"
200004-54 = "……Por hoje chega.#nBora voltar?"
200004-55 = "Levando este―― \"Trapezoedro Cintilante\"."