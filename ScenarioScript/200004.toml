[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
200004-1 = "Episódio 4: O Trapezoedro Cintilante"
200004-4 = "E-Ei..."
200004-5 = "Elas não estão demorando muito pra voltar?"
200004-6 = "……Fazem menos de três minutos que elas mergulharam."
200004-7 = "M-Mas é que debaixo d'água não dá pra saber o que pode acontecer..."
200004-8 = "E se elas foram arrastadas por uma correnteza forte?#nOu atacadas por alguma criatura bizarra?"
200004-9 = "……Não há como saber."
200004-10 = "Mas as duas vão ficar bem."
200004-15 = "……É o sinal."
200004-16 = "Qual é a posição do radar?"
200004-17 = "Mil pés a Sudeste."
200004-18 = "A correnteza levou elas pra bem longe.#nO breu lá embaixo é denso, vamos buscá-las."
200004-22 = "Phew..."
200004-23 = "……Vocês emergiram longe do perímetro planejado. O que houve?"
200004-24 = "Foi mal. A força da água nos pegou de surpresa.#nPerdemos um pouco de tempo tentando alinhar a bússola."
200004-25 = "……Cumpriram as paradas de descompressão?"
200004-26 = "Óbvio. Você acha que está falando com quem?"
200004-27 = "Eu não precisava de descompressão, na verdade..."
200004-28 = "A soberba debaixo d'água é uma sentença de morte. Tudo pode acontecer lá."
200004-29 = "Uuuh..."
200004-33 = "E então? Vasculharam a \"embarcação naufragada\"?"
200004-34 = "Saque zero. O abismo corroeu tudo pelo tempo."
200004-35 = "Poxa, falhamos de novo..."
200004-36 = "Ah, espera... Pescamos algo no mínimo intrigante."
200004-38 = "Isso é um... caco de vidro...?"
200004-39 = "A textura é muito mais densa que vidro... e as proporções são muito exatas."
200004-40 = "Tem um fulgor emanando do centro, não tem? Parece alguma joia mística."
200004-41 = "Realmente. O tom dessa luz lembra... o pôr do sol sangrando no oceano."
200004-42 = "……Não encarem a pedra por muito tempo.#nA radiação pode não ser inofensiva."
200004-43 = "Vai torrar nossa pele..."
200004-46 = "E vem cá, quando a gente joga a toalha dessa caçada fantasma?"
200004-47 = "Perdeu as esperanças já?"
200004-48 = "……Nós caçamos até a base dar ordem de regresso. Desistir não tá no protocolo."
200004-49 = "Essa cruz é a nossa razão de ser."
200004-50 = "Eu vou enrugar de tanta água..."
200004-54 = "……O oxigênio acabou por hoje.#nPodemos recuar."
200004-55 = "E nós levaremos este prêmio―― \"O Trapezoedro Cintilante\"."