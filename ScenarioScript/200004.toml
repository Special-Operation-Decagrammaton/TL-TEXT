[translation]
200004-1 = "Episódio 4; O Trapézoedro Brilhante"
200004-4 = "Ei, ei..."
200004-5 = "Não acha que eles estão demorando para voltar?"
200004-6 = "...Ainda não se passaram nem 3 minutos desde que mergulharam."
200004-7 = "M-mas, nunca se sabe o que pode acontecer debaixo d'água..."
200004-8 = "E se eles forem levados pela correnteza?#nE se forem atacados por alguma criatura perigosa?"
200004-9 = "...Não sei."
200004-10 = "Mas, tratando-se delas, ficará tudo bem."
200004-15 = "...É o sinal."
200004-16 = "Qual é a posição do sinalizador?"
200004-17 = "1000 pés a sudeste."
200004-18 = "Foram levadas bem longe, hein.#nEstá escuro, vamos buscá-las."
200004-22 = "Ufa..."
200004-23 = "...Vocês estão longe do ponto planejado. O que aconteceu?"
200004-24 = "Foi mal, foi mal. A correnteza estava mais forte do que eu pensava.#nTive um pouco de dificuldade para ajustar a direção."
200004-25 = "...Fizeram a descompressão corretamente?"
200004-26 = "Claro. Quem você acha que eu sou?"
200004-27 = "Eu não preciso fazer isso, mas..."
200004-28 = "Não baixe a guarda. Debaixo d'água, qualquer coisa pode acontecer."
200004-29 = "Ugh..."
200004-33 = "E então, como estava dentro do \"navio naufragado\"?"
200004-34 = "Colheita zero. Já passou tempo demais."
200004-35 = "Poxa, então desta vez também não deu em nada..."
200004-36 = "Ah, mas... eu encontrei algo interessante."
200004-38 = "Isso é um pedaço de vidro...?"
200004-39 = "Parece mais duro que vidro... tem um formato bonito, né."
200004-40 = "Parece até que está brilhando, não acha? Não parece um pouco com uma joia?"
200004-41 = "É verdade. Esse brilho... parece o horizonte tingido pelo pôr do sol."
200004-42 = "...Não olhem muito para isso.#nNão sabemos que tipo de efeito pode ter."
200004-43 = "Pode acabar queimando a pele..."
200004-46 = "E então, até quando vamos continuar com essa missão?"
200004-47 = "Agora você pergunta isso?"
200004-48 = "...Até recebermos novas instruções. Não podemos parar por conta própria."
200004-49 = "Essa é a nossa missão, afinal."
200004-50 = "Vou ficar toda enrugada..."
200004-54 = "...Por hoje é só.#nVamos voltar logo."
200004-55 = "Levando este — \"Trapézoedro Brilhante\"."
