[translation]
10020040-5 = "……Desta vez, não vejo a \"tal\" Shiroko por aqui."
10020040-6 = "Pois é. Será que ela desistiu?"
10020040-7 = "Não sei dizer ao certo…… mas, ainda assim, não podemos baixar a guarda!"
10020040-9 = "Falando nisso, tenho boas notícias para todos. #nO trabalho de reparo da nave…… está quase concluído."
10020040-10 = "S-sério……! Muito obrigada! Pessoal, vocês fizeram um ótimo trabalho!!"
10020040-11 = "Ah, para ser sincero, eu estava bem preocupado, mas…… que bom, que bom."
10020040-15 = "Sim. Graças à unidade de processamento da Arca que hackeamos, terminamos mais rápido do que o esperado."
10020040-16 = "Sim! Essa unidade de processamento tem um desempenho incrível!"
10020040-17 = "Agora só falta…… destruir o \"Motor Dimensional\" na 4ª área, e deveremos conseguir ativar a \"sequência de autodestruição\" da Arca."
10020040-18 = "Acho que teremos tempo suficiente até a autodestruição, então, nesse meio tempo, basta reiniciar o Utnapishtim e escapar."
10020040-19 = "A partir de agora, o timing é fundamental. Vamos nos manter focados."
10020040-20 = "Então, desejo boa sorte a vocês."
10020040-25 = "Pode-se dizer que foi uma sorte em meio ao azar…… Rio, parece que o \"dispositivo de fuga\" que você sugeriu não será necessário."
10020040-26 = "……É verdade."
10020040-41 = "Estamos em combate em frente à sala de controle da \"área especial\"!"
10020040-42 = "Sério, vocês são muito insistentes!"
10020040-43 = "Ainda estamos enfrentando resistência, mas é questão de tempo até terminarmos a destruição!"
10020040-44 = "Vamos, vamos, esse nível de ataque não serve nem para nos atrasar~!"
10020040-45 = "Assim que a destruição da sala de controle for concluída, entraremos em contato novamente!"
