[translation]
10013035-3 = "Hahahaha! Quente, está quente! É justamente porque nenhum de nós pretende ceder que as coisas estão tão acaloradas! Não é como se estivéssemos desenvolvendo uma fonte termal!"
10013035-4 = "Vamos queimar tudo o que estiver no nosso caminho!"
10013035-6 = "Sim, sim! Sendo assim, é uma ordem da chefe!"
10013035-7 = "Todos, avancem! Pelo desenvolvimento da fonte termal, não olhem para trás e queimem tudo até o fim!"
10013035-14 = "Entendido~, então é só queimar tudo por enquanto, né?"
10013035-16 = "Chise!? Por que você está do lado deles!?"
10013035-17 = "E falando nisso, vocês são muito persistentes...!"
10013035-18 = "Por que vocês arriscam a vida por causa de uma fonte termal!?"
10013035-19 = "[s] \"É porque esse é o Departamento de Desenvolvimento de Fontes Termais...\""
10013035-20 = "Sensei, o que você está dizendo!?"
10013035-22 = "Hahahaha! Quando vencermos, vamos fazer de vocês nossos subordinados e trabalhar até a exaustão!"
10013035-23 = "Vamos todos começar uma vida divertida de desenvolvimento de fontes termais!"
10013035-24 = "[s] \"Um verão dando tudo de si no desenvolvimento de fontes termais sob um sol escaldante...\""
10013035-26 = "Eu recuso terminantemente!"
10013035-27 = "Presidente~~! Desse jeito, vamos ficar na miséria~~!"
10013035-28 = "Shizuko-chan! Desse jeito..."
10013035-29 = "Ugh... não tem como neutralizar o Departamento de Desenvolvimento de Fontes Termais nessa situação..."
10013035-30 = "...Só tem um jeito!"
10013035-31 = "Capturar a chefe do Departamento de Desenvolvimento de Fontes Termais! Se fizermos isso, devemos conseguir neutralizá-las de uma vez!"
10013035-33 = "Ou seja... é uma estratégia de cortar a cabeça do general inimigo com um golpe só e acabar com tudo!"
10013035-34 = "Como esperado da presidente! Você não tem sangue nem lágrimas!"
10013035-35 = "Ora... puxa..."
10013035-36 = "N-não acredito... que você estava planejando algo tão assustador que parece ter saído de um drama de época... Izuna está chocada!"
10013035-37 = "[s] \"Shizuko, que garota assustadora...\""
10013035-38 = "Não, não, não! Ninguém disse nada disso! #nPor que todo mundo está reagindo assim!?"
10013035-39 = "Não sei o que vocês estão tramando, mas já é tarde demais!"
10013035-46 = "Ehehe♪"
10013035-49 = "...Ah, Sensei."
10013035-50 = "[s] \"O que houve, Chise?\""
10013035-51 = "Bem..."
10013035-52 = "Ali..."
10013035-53 = "[s] \"Tem algo ali?\""
10013035-54 = "Hmm."
10013035-58 = "..................Fonte termal?"
10013035-59 = "Hã?"
10013035-60 = "Sim?"
10013035-65 = "[ns] \"Izuna! Jogue uma shuriken onde a Chise apontou!\""
10013035-69 = "Entendido! Izuna, lá vou eu!"
10013035-70 = "Arte Ninja estilo Izuna — Técnica de Força Total!"
10013035-71 = "Shuriken! Ei!"
10013035-80 = "Uau!? Hã, o que, o que!? Que susto!"
10013035-81 = "De repente, o que você pensou em jogar... aliás, aquilo era uma granada?"
10013035-82 = "Você tem coisas bem interessantes, não é—"
10013035-94 = "Ora, isso é..."
10013035-95 = "Não me diga que, com o ataque da Izuna agora pouco—"
10013035-96 = "O... oh... oh..."
10013035-97 = "É uma fonte termal!!"
10013035-99 = "Ah, Chefe Kasumi! Não roube minha fala~!"
10013035-100 = "Isso não importa agora! Preparem os membros logo!"
10013035-102 = "E-espera! E quanto à luta contra nós!?"
10013035-104 = "Não é hora de brigar! A água termal está jorrando!"
10013035-105 = "Muito bem, pessoal do Departamento de Desenvolvimento de Fontes Termais! Preparar...!"
10013035-107 = "BUM!"
10013035-129 = "Não acredito... Em um piscar de olhos, um resort de águas termais surgiu...!"
10013035-130 = "Isso é incrível..."
10013035-131 = "Ora, ora, maravilhoso! Gostei! Adorei! #nBem, é um pouco diferente das fontes termais de águas profundas que eu buscava, mas..."
10013035-132 = "Ainda assim, graças àquele disparo espetacular de agora pouco, conseguimos uma fonte termal de excelente qualidade!"
10013035-133 = "Mas, como exatamente vocês conseguiram encontrar? Que habilidade impressionante. Você, a moça de cabelo azul, e a moça de orelhas de raposa. O que me dizem? Não querem entrar para o nosso Departamento de Desenvolvimento de Fontes Termais?"
10013035-134 = "A vida nas fontes termais é ótima."
10013035-135 = "……?"
10013035-136 = "Sinto muito! Izuna já é membro do Departamento de Pesquisa de Ninjutsu!"
10013035-137 = "Entendo... Que pena."
10013035-138 = "……Muito bem, pessoal. Vamos voltar ao trabalho de acabamento!"
10013035-139 = "E-esperem! Nesse caso, como fica a nossa promessa!?"
10013035-140 = "Ah, isso."
10013035-141 = "Hmmmmmm."
10013035-142 = "……Afinal, será que perdemos?"
10013035-143 = "Hã?"
10013035-144 = "Já que vocês encontraram uma fonte termal antes de nós encontrarmos a de água termal de águas profundas."
10013035-145 = "Pois é, é uma pena, mas não tenho como negar a derrota."
10013035-146 = "[s] \"Aquilo era uma questão de ganhar ou perder...\""
10013035-147 = "Por isso, temos que recuar."
10013035-148 = "Ah, não! Chefe! A gente ainda não encontrou a fonte termal de águas profundas!?"
10013035-149 = "Fica para uma próxima oportunidade."
10013035-150 = "Vamos deixar este lugar para os jovens que acabaram de chegar."
10013035-151 = "Hmm, não entendi muito bem, mas... se a chefe Kasumi diz, então deve ser isso mesmo..."
10013035-152 = "E outra, Meg. Quem cava fontes termais não pode ser uma pessoa ruim. #nEntão, por que não deixamos este lugar nas mãos delas?"
10013035-153 = "Faz sentido! Nesse caso, tudo bem!"
10013035-155 = "O que será que está tudo bem..."
10013035-156 = "Bem, lamento não ter encontrado a fonte termal de águas profundas, mas deixaremos o resto com vocês."
10013035-157 = "Ah..."
10013035-158 = "[s] \"Que bom que conseguimos recuperar o contrato em segurança, Shizuko.\""
10013035-159 = "Isso é um passo à frente, Shizuko-chan!"
10013035-160 = "I-isso é..."
10013035-161 = "É verdade, mas..."
10013035-163 = "Então, nós vamos indo."
10013035-169 = "Esperem!"
10013035-175 = "Hm? Ainda tem algo?"
10013035-178 = "É que..."
10013035-179 = "Bem, sabe..."
10013035-180 = "……Sim, decidi!"
10013035-181 = "Eu quero deixar este lugar com vocês!"
10013035-182 = "[s] \"Shizuko?\""
10013035-183 = "……O que você quer dizer com isso?"
10013035-184 = "Vamos fazer um contrato comigo."
10013035-185 = "Por isso, podem ficar com o contrato original. #nEm troca, façam um novo contrato conosco."
10013035-186 = "E eu quero que vocês operem o resort de águas termais que construíram aqui."
10013035-187 = "Vocês não vieram aqui para fazer uma \"caça aos resorts\"? Então, por que..."
10013035-188 = "Porque... #nVocês ainda querem encontrar a fonte termal de águas profundas, não querem?"
10013035-189 = "Claro! Afinal, não alcançamos nosso objetivo ainda! Não é, chefe?"
10013035-190 = "Isso é verdade, mas..."
10013035-191 = "Hum... então você quer que a gente assine um contrato para isso?"
10013035-193 = "Exato. Esta é uma proposta de colaboração como proprietária da Hyakkiyako!"
10013035-194 = "Parece quase um contrato de franquia..."
10013035-195 = "Franquia... é, talvez esse termo se encaixe melhor."
10013035-196 = "Então, o que acha da minha proposta?"
10013035-197 = "............"
10013035-201 = "Fu, fufu... hahaha... Hahaha! Interessante! E não é uma má proposta!"
10013035-202 = "Em vez de sermos repreendidos pelo desenvolvimento de fontes termais, acabamos recebendo um pedido de cooperação... É algo raro para o nosso departamento, mas, bem, de vez em quando, isso não é nada mal!"
10013035-203 = "Vamos cooperar com esse seu empreendimento. Conto com você a partir de agora, presidente!"
10013035-211 = "Uau~! Que progresso incrível, presidente!"
10013035-212 = "Eu já disse! Eu não sou a presidente!"
10013035-216 = "...Não, espera, será que agora eu sou mesmo a presidente?"
10013035-217 = "De, de qualquer forma!"
10013035-221 = "Conto com vocês também, Departamento de Desenvolvimento de Fontes Termais!"
