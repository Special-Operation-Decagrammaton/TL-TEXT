[translation]
10013035-3 = "ハーハッハッハッハ！アツい、アツいぞ！互いに譲るつもりがないからこそ、ここまで白熱するのだな！まるで温泉開発みたいじゃないか！"
10013035-4 = "邪魔するものは、全て燃やしてしまおう！"
10013035-6 = "うんうん！というわけで、部長の命令だよ～！"
10013035-7 = "みんな突撃！温泉開発のため、後ろを振り向かずに燃やし尽くせー！"
10013035-14 = "わかった～、とりあえず燃やせばいいんだね。"
10013035-16 = "チセ！？なんでそっち側なの！？"
10013035-17 = "ってか、しつこいわね……！"
10013035-18 = "なんで温泉開発なんかに命をかけるわけ！？"
10013035-19 = "[s] \"それが温泉開発部だからね……\""
10013035-20 = "先生まで何言っちゃってるんですか！"
10013035-22 = "ハーハッハッハッハ！このまま私たちが勝った暁には、温泉開発部の下請けとしてこき使ってやろう！"
10013035-23 = "みんなで楽しい温泉開発ライフを始めよー！"
10013035-24 = "[s] \"炎天下で温泉開発に全力投球する夏……\""
10013035-26 = "そんなのお断りですけど！？"
10013035-27 = "社長～～！このままではジリ貧ですぅ～～！"
10013035-28 = "シズコちゃん！このままでは……"
10013035-29 = "うぅ……この状況で温泉開発部を無力化する方法なんて……"
10013035-30 = "……1つだけあるわ！"
10013035-31 = "温泉開発部の部長を捕まえる！そうすれば、一気に無力化できるはず！"
10013035-33 = "つまり……一振りで敵将の首を斬って、バタン！という作戦ですね！"
10013035-34 = "さすが社長！血も涙もありませんね！"
10013035-35 = "あら……まぁ……。"
10013035-36 = "ま、まさか……そんな時代劇に出てきそうな恐ろしい事を計画していたなんて……イズナ、びっくりしました！"
10013035-37 = "[s] \"シズコ、恐ろしい子……\""
10013035-38 = "いやいやいや！誰もそこまで言ってないじゃない！#n何でみんなそんな反応するのよ！"
10013035-39 = "何を企てているのかは知らんが、時既に遅しだ！"
10013035-46 = "えへへっ♪"
10013035-49 = "……あっ、先生。"
10013035-50 = "[s] \"どうしたの、チセ？\""
10013035-51 = "えっとぉ……"
10013035-52 = "あそこ……"
10013035-53 = "[s] \"あそこに何かあるの？\""
10013035-54 = "んー。"
10013035-58 = "……………………温泉？"
10013035-59 = "えっ？"
10013035-60 = "はい？"
10013035-65 = "[ns] \"イズナ！チセが指差した所に手裏剣投げて！\""
10013035-69 = "わかりました！イズナ、参ります！"
10013035-70 = "イズナ流忍法――渾身の術！"
10013035-71 = "手裏剣！えーいっ！"
10013035-80 = "うわあっ！？えっ、なになに！？ビックリしたー！"
10013035-81 = "急に何を投げるかと思えば……というか、今のは手榴弾か？"
10013035-82 = "なかなか素敵なものを持ってるじゃ――"
10013035-94 = "あら、これは……"
10013035-95 = "まさか、さっきのイズナの攻撃で――"
10013035-96 = "お……おお……お……"
10013035-97 = "温泉だーー！！"
10013035-99 = "あっ、カスミ部長！私のセリフ取らないで～！"
10013035-100 = "そんなのはどうでもいい！早く部員に準備をさせろ！"
10013035-102 = "ちょ、ちょっと！私たちとの戦いはどうするの！？"
10013035-104 = "争っている場合ではない！温泉が湧き上がっているんだぞ！"
10013035-105 = "ではでは～、温泉開発部一同！よ～い！"
10013035-107 = "ドン！"
10013035-129 = "うそ……あっという間に温泉郷ができちゃった……！"
10013035-130 = "これは、すごいですね……"
10013035-131 = "いやぁ～素晴らしい！いいね！気に入った！#nまあ、私が求めていた深海温泉とは多少異なるが――"
10013035-132 = "とはいえ、先程の見事な一発のおかげでなかなか質のいい温泉が出来上がった！"
10013035-133 = "しかし、一体どうやって探り当てたんだ？すごいスキルじゃないか。そこの青髪のお嬢さんと、キツネ耳のお嬢さん。どうだ？我が温泉開発部に入らないか？"
10013035-134 = "温泉ライフはいいぞー。"
10013035-135 = "……？"
10013035-136 = "すみません！イズナはすでに忍術研究部の部員ですので！"
10013035-137 = "そうか……それは残念だ。"
10013035-138 = "……さあ、みんな。仕上げに戻るぞー！"
10013035-139 = "ま、待って！この場合、約束はどうなるの！？"
10013035-140 = "あー、それか。"
10013035-141 = "う～～～～～～～む。"
10013035-142 = "……やはり、我々の負けか？"
10013035-143 = "えっ？"
10013035-144 = "我々が海洋深層水の温泉を見つけるよりも先に、そちらが温泉を見つけてしまったわけだし。"
10013035-145 = "いやぁ～、残念だがこれは負けを認めざるを得ないな。"
10013035-146 = "[s] \"さっきのは勝ち負けの問題だったんだ……\""
10013035-147 = "だから、ここは撤退せんとな。"
10013035-148 = "えぇーっ！部長！深海温泉、まだ見つけてないんだけど！？"
10013035-149 = "それはまたの機会にな。"
10013035-150 = "この場は、新たに訪れた若者たちに譲ることにしよう。"
10013035-151 = "う～ん、よくわかんないけど……カスミ部長がそう言うなら、そういうことにしておくかぁ……"
10013035-152 = "それとな、メグ。温泉を掘ったやつに悪いやつはいない。#nだからこの場は、この子たちに任せようじゃないか！"
10013035-153 = "なるほど！それなら大丈夫かも！"
10013035-155 = "何が大丈夫なんだろ……。"
10013035-156 = "まあ、海洋深層水の温泉を見つけられなかったことは悔やまれるが、後のことは君たちに託そう。"
10013035-157 = "あ……"
10013035-158 = "[s] \"無事に契約書を回収できて良かったね、シズコ。\""
10013035-159 = "これで一歩前進ですね、シズコちゃん！"
10013035-160 = "そ、それは……"
10013035-161 = "その通り、なんだけど……。"
10013035-163 = "では、我々はこれで。"
10013035-169 = "待って！"
10013035-175 = "ん？まだ何かあるのか？"
10013035-178 = "それは……"
10013035-179 = "えっと、その……"
10013035-180 = "……うん、決めた！"
10013035-181 = "あなたたちに、ここを任せたいの！"
10013035-182 = "[s] \"シズコ？\""
10013035-183 = "……それは、どういう意味かな？"
10013035-184 = "私と契約しましょう。"
10013035-185 = "だから、契約書はそのまま持ってていいわ。#nその代わり、私たちと新たな契約を結んでちょうだい。"
10013035-186 = "そして、ここであなたたちが作った温泉リゾートを運営してほしいの。"
10013035-187 = "君たちは「リゾート狩り」をしに来たんだろう？なのに、なぜ……"
10013035-188 = "だって……#nあなた達はまだ海洋深層水の温泉を見つけたいって思っているんでしょう？"
10013035-189 = "もちろん！私たちの目的は達成できたわけじゃないし！だよね、部長？"
10013035-190 = "それは、そうだが……"
10013035-191 = "ふむ……そのために、契約を結べと？"
10013035-193 = "そう。これは百夜堂のオーナーとしてのコラボ提案よ！"
10013035-194 = "まるでフランチャイズ契約みたいなお話ですね……。"
10013035-195 = "フランチャイズ……たしかに、そっちの方がしっくり来るかも。"
10013035-196 = "それで、私の提案はどうかしら？"
10013035-197 = "…………。"
10013035-201 = "ふ、ふふ……ははは……ハーハッハッハッハ！面白い！そして悪くない提案だ！"
10013035-202 = "温泉開発を咎められるわけではなく、むしろ協力の要請を受けることになるとは……我が部にしては珍しい出来事だが、まあ、たまにはこういうのも悪くない！"
10013035-203 = "その事業とやらに協力してやろうではないか。これから宜しく頼むぞ、社長！"
10013035-211 = "わぁ～！まさに快進撃ですね、社長！"
10013035-212 = "だから！私は社長じゃないってば！"
10013035-216 = "……いや、もう社長、なのかな？"
10013035-217 = "と、とにかく！"
10013035-221 = "こちらこそよろしくね、温泉開発部！"
