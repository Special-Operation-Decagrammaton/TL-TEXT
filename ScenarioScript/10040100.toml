[translation]
10040100-1 = "Epílogo parte 2; Partida em BOOM!"
10040100-2 = "……Hmm, não consigo vencer a Noah no jogo de cartas."
10040100-3 = "Um jogo de mão única é, honestamente…… nada divertido."
10040100-8 = "Desculpe, acho que exagerei um pouco."
10040100-9 = "Continuar ganhando também não tem graça…… que tal jogarmos outra coisa?"
10040100-10 = "Sim, sim!#nEu tenho uma sugestão!"
10040100-11 = "Maki Konuri, pode falar."
10040100-12 = "Jogos de tabuleiro são legais, mas#npara passar a noite em claro, videogames são um clássico, né?"
10040100-13 = "Então, vamos jogar uma partida competitiva!"
10040100-15 = "……Nesse caso, nós temos a vantagem.#nSem objeções."
10040100-16 = "Mas ninguém trouxe um console, né?#nE não parece ter nenhum jogo que dê para começar agora."
10040100-18 = "Hehe. Esqueceu que a versão clássica de \"BOOM\"#npode ser instalada em qualquer terminal, contanto que tenha#num monitor e uma CPU!?"
10040100-19 = "É só iniciar o firmware pelo celular,#nmapear os botões de entrada e…… pronto, tudo preparado!"
10040100-20 = "Depois trate de deixar tudo como estava."
10040100-21 = "Relaxa. Com um botão eu desfaço tudo.#nAh, e se quiserem jogar \"BOOM\" de novo, é só reinstalar."
10040100-22 = "Ei! Parece que esqueceu, mas aqui é a sala de reflexão da Koyuki, sabia!?#nNão traga mais distrações para cá!"
10040100-24 = "Tratando-se da Koyuki, eu não duvidaria que ela tivesse escondido um console em algum lugar."
10040100-25 = "Aliás, \"BOOM\" não era um jogo de tiro para um jogador?#nComo pretende fazer uma partida competitiva?"
10040100-26 = "Tem o modo Time Attack, né."
10040100-27 = "Que tal a regra de que quem terminar o estágio 1 mais rápido vence!#nE quem perder…… vai na loja de conveniência comprar lanches! Por conta própria, claro!"
10040100-28 = "Entendo.#nO estágio 1 tem poucos truques e é fácil, então podemos dizer que é justo."
10040100-30 = "Eu também concordo. Faz tempo que não jogo a versão clássica de \"BOOM\",#nentão não estou muito confiante, mas……"
10040100-31 = "Eu vou passar. Não tenho costume com esse tipo de jogo."
10040100-32 = "Eeeeh!?#nVamos jogar juntas, veterana! Eu te ensino os controles!"
10040100-33 = "Vai ser divertido. Além disso, você pode acabar viciando sem querer, né?"
10040100-34 = "Você só quer me ver perdendo, não é……?"
10040100-35 = "Ah, não vou negar isso, mas――"
10040100-36 = "Bom, bom, só tenta jogar. Anda, senta aqui."
10040100-39 = "O que é isso? Apareceu um monstro que parece um demônio. É só atacar?"
10040100-40 = "Isso mesmo. Aliás, eles são piratas espaciais. Inimigos do Boom Guy.#nAh, para atacar, você pode usar o botão de ataque normal para dar socos, mas――"
10040100-44 = "Ah, é verdade. Parece que eu venci."
10040100-45 = "O alcance do soco é curto, então se usar a escopeta que caiu ali――"
10040100-52 = "Uau…… até esse efeito tem.#nCapricharam bastante no desenvolvimento."
10040100-56 = "Ei…… ao invés de socos, a escopeta seria――"
10040100-66 = "Ve-veterana…… a vida do inimigo já está em zero, sabia……?"
10040100-67 = "Fufu. Isso alivia o estresse mais do que eu pensava."
10040100-68 = "Ué, já acabou?"
10040100-69 = "Bem…… tem uma sala do lado direito……."
10040100-75 = "(Depois disso, Chihiro continuou zerando o jogo apenas com socos.#nEmbora o tempo de conclusão não tenha sido melhor que o das outras membros……)"
10040100-76 = "(Maki e as outras pensaram, do fundo do coração, que nunca deveriam irritar a Chihiro.)"
