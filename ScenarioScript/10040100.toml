[translation]
10040100-1 = "後日談その2;BOOMで対戦！"
10040100-2 = "……う～ん、ババ抜きじゃ、ノアに勝てないよ。"
10040100-3 = "ワンサイドゲームはさすがに……面白くないですね。"
10040100-8 = "すみません、ちょっとやりすぎちゃいましたね。"
10040100-9 = "勝ち続けるのも面白くないですし……ほかのゲームをしましょうか？"
10040100-10 = "はいはーい！#nあたしに提案がありまーす！"
10040100-11 = "[ruby=こぬり]小塗[/ruby]マキ選手、どうぞ。"
10040100-12 = "テーブルゲームも良いけど、#n徹夜でするならビデオゲームだって定番でしょ？"
10040100-13 = "というわけで、みんなで対戦プレイしよ！"
10040100-15 = "……それなら私たちが有利ですね。#n異論はありません。"
10040100-16 = "でもゲーム機なんて誰も持ってきてないよね？#nすぐ始められるゲームもなさそうだけど。"
10040100-18 = "ふっふーん。「BOOM」はクラシック版なら、#nCPUとモニターさえあればどんな端末にでも#nインストールできることをお忘れかな！？"
10040100-19 = "スマホでファームウェアを起動して、#n入力ボタンを対応させれば……はい、準備完了！"
10040100-20 = "あとでちゃんと元に戻してよね。"
10040100-21 = "大丈夫。ボタンひとつですぐ戻せるから。#nあ、「BOOM」したくなったら、すぐ再インストールもできるからね。"
10040100-22 = "ちょっと！忘れてそうだけど、ここはコユキの反省部屋なのよ！？#nこれ以上、娯楽を増やさないで！"
10040100-24 = "コユキちゃんのことですから、どこかにゲーム機を隠してそうですけどね。"
10040100-25 = "ところで「BOOM」は一人で遊ぶシューティングゲームだったはず。#nどうやって対戦する気ですか？"
10040100-26 = "タイムアタックモードがあるでしょ。"
10040100-27 = "ステージ1を一番早くクリアした人が勝ちってルールでどうかな！#nで、下位の人は……コンビニでお菓子の買い出し！もちろん、奢りで！"
10040100-28 = "なるほど。#nステージ1ならギミックも少なくて簡単ですし、公平と言えるでしょう。"
10040100-30 = "私も賛成。クラシック版の「BOOM」は#nしばらくプレイしてないから、ちょっと自信ないけど……。"
10040100-31 = "私は遠慮しとこうかな。こういうゲームは慣れてないし。"
10040100-32 = "ええーっ！？#n一緒にやろうよ、先輩！操作とかは、あたしが教えるから！"
10040100-33 = "きっと楽しいからさ。それに、意外とハマっちゃうかもしれないでしょ？"
10040100-34 = "私が負けてるとこを見たいだけじゃないの……？"
10040100-35 = "あー、それは否定はしないけど――"
10040100-36 = "まあまあ、とにかくやってみてよ。ほら、ここに座った座った。"
10040100-39 = "なにこれ。悪魔みたいなモンスターが出てきたけど。攻撃すれば良いの？"
10040100-40 = "そうそう。ちなみにそいつらは宇宙海賊。ブームガイの敵なんだ。#nあ、攻撃する時は、通常攻撃ボタンで拳攻撃できるんだけど――"
10040100-44 = "お、本当だ。倒せたみたい。"
10040100-45 = "それだと射程が短いから、そこに落ちてるショットガンを使えば――"
10040100-52 = "へえ……こんなエフェクトまであるんだ。#nだいぶ作り込んでるね。"
10040100-56 = "あの……拳じゃなくて、ショットガンのほうが――"
10040100-66 = "せ、先輩……敵のライフは、もうゼロだよ……？"
10040100-67 = "ふふっ。思ってたよりストレス解消になるね、これ。"
10040100-68 = "あれ、もう終わりなの？"
10040100-69 = "えっと……右側に部屋が……。"
10040100-75 = "（その後もチヒロは拳攻撃だけで攻略した。#n他の部員よりクリアタイムは良くなかったようだが……）"
10040100-76 = "（チヒロを怒らせてはいけないと、マキたちは心の底から思ったのだった）"
