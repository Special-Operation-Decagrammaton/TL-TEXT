[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1009706-1 = "Embelezamento da Área" 
1009706-2 = "Você disse uma casa vazia que não tá sendo usada?\nMas é claro que a gente tem." 
1009706-3 = "Isso aqui já foi bem movimentado antigamente, mas...\nDez anos atrás, quase todo mundo arrumou as malas e se mudou pra cidade grande..." 
1009706-4 = "E até hoje tem umas quantas casas vazias largadas por aí." 
1009706-5 = "A Kazekura-chan e suas amigas podem pegar qualquer uma e usar do jeito que quiserem." 
1009706-6 = "[s] \"Muitíssimo obrigado!\"" 
1009706-7 = "Nós é que agradecemos, já que vocês vão poupar a gente do trabalho de ter que manter o lugar em ordem." 
1009706-8 = "Mesmo oferecendo aluguel de graça e até grana pra ajudar na mudança,\na gente não conseguiu arranjar ninguém pra morar lá..." 
1009706-9 = "Mas olha, é uma casa antiga, então dar uma faxina nela vai ser dureza. Vocês aguentam o tranco?" 
1009706-10 = "Moleza, comparado a dormir em banco de praça no relento, isso aí não é nada!" 
1009706-11 = "D-Dormir no relento...?" 
1009706-12 = "B-Bom, fiquem à vontade pra usar." 
1009706-16 = "Aí sim~ Essa foi uma puta ideia, Sensei." 
1009706-17 = "O gerador portátil que a gente trouxe tava quase...\nvirando sucata por falta de uso, pra falar a verdade." 
1009706-18 = "Mas agora a gente pode usar ele e todos os equipamentos sem ter dor de cabeça." 
1009706-19 = "[s] \"Fico feliz em ter ajudado.\"" 
1009706-20 = "A gente não para de receber favores seus e dos moradores daqui, né." 
1009706-21 = "Além da comida e da água, deram até uma base de operações inteira pra gente...\nAcho que essa vida tá sendo mil vezes mais confortável do que a nossa no Parque dos Coelhinhos." 
1009706-22 = "Quase me dá vontade de tacar o foda-se e ficar morando aqui em vez de voltar pra aquele parque.\nKuhihi..." 
1009706-23 = "[s] \"É sério...?\"" 
1009706-24 = "......Claro que é brincadeira, né.\nPor mais confortável que seja isso aqui, o Parque dos Coelhinhos ainda é a nossa verdadeira base de operações." 
1009706-25 = "Nós temos uma certa consideração e apego por aquele parquezinho fudido, sabe..." 
1009706-26 = "E o mais importante, nós prometemos que...\niamos aguentar as pontas juntas até a SRT ser ressuscitada de vez." 
1009706-30 = "Ugh.\nComecei a falar umas paradas melosas que não combinam nada comigo, tô quase pegando urticária de desgosto..." 
1009706-31 = "......Enfim!\nA gente tem que dar uma geral nessa pocilga!" 
1009706-32 = "Eu já vi que limpar tudo isso aqui vai demorar muito mais do que a gente esperava." 
1009706-34 = "（E então ajudei a Moe a faxinar a casa abandonada.）" 
1009706-36 = "Haa... eu sabia que ia ser foda." 
1009706-37 = "A gente perdeu um tempão só jogando os entulhos e as tralhas antigas pra fora da casa." 
1009706-38 = "[s] \"Bom trabalho, Moe.\"" 
1009706-39 = "Que nada.\nEu que deveria te agradecer por me ajudar, Sensei." 
1009706-40 = "Parece que a gente ainda vai ter que gastar uns bons dias dando faxina até que fique num nível habitável, mas..." 
1009706-41 = "Pelo menos a gente vai poder analisar os dados sem tomar chuva e vento na car――" 
1009706-42 = "......Ué?" 
1009706-46 = "Ah, era só um pernilongo..." 
1009706-47 = "Espera, tá cheio de mariposa e mosquitão de cavalo aqui também!?" 
1009706-48 = "Esse lugar virou a porra do ninho dos insetos, caralho!" 
1009706-52 = "Uwaaah! Eles tão voando na minha cara!" 
1009706-53 = "[s1] \"Talvez eles tenham feito ninhos por aqui.\"\n[s2] \"Tem muitos deles...\"" 
1009706-56 = "Hau...\nEu queria evitar ter que apelar pra isso, mas fazer o quê." 
1009706-57 = "Tá na hora de usar a famosa bomba de fósforo branco, extremamente eficaz contra insetos――" 
1009706-58 = "[s3] \"Isso aí não!\"\n[s4] \"Isso é muito eficaz contra mim também, sabia!?\"" 
1009706-61 = "Pensando bem, o trabalho que ia dar pra limpar tudo depois seria sacanagem..." 
1009706-62 = "Então, que tal granadas de gás lacrimogêneo (CS)? Não são totalmente letais pra humanos, então――" 
1009706-63 = "[s] \"Isso já é mais do que letal o suficiente!?\"" 
1009706-67 = "[ns5] \"Espera só um pouco.\"\n[ns6] \"Eu trouxe uma coisinha pro caso de precisarmos.\"" 
1009706-71 = "......Incenso repelente de mosquito?" 
1009706-72 = "Tch.\nUm bagulho fuleiro desses só serve pra pegar mosquito e olha lá." 
1009706-73 = "[s7] \"...Mas o seu objetivo principal não era acabar com os insetos daqui?\"\n[s8] \"Vamos acender o incenso e ver se dá conta do recado primeiro.\"" 
1009706-81 = "[wa:570]― [log=모에 수영복]Hmm... [wa:1150]Não importa quanto eu olhe, [wa:1740]sinto que falta muito poder de fogo nisso...[/log]" 
1009706-82 = "[wa:2090]― [log=모에 수영복]Mas, [wa:820]se tá saindo fumaça, tudo bem.[/log]" 
1009706-85 = "[ns9] \"Sabe que nem tudo se resolve só com fogo e explosões, não é?\"\n[ns10] \"Vamos esperar e ver o resultado.\"" 
1009706-88 = "[wa:1920]― [log=모에 수영복]Sabe... [wa:1250]Sentir esse cheiro, [wa:1510]traz umas memórias à tona.[/log]" 
1009706-91 = "― [log=모에 수영복]Na época que eu ainda frequentava a SRT...[/log]" 
1009706-92 = "[wa:2380]― [log=모에 수영복]Não, [wa:1000]talvez seja de uma época mais distante que essa?[/log]" 
1009706-95 = "― [log=모에 수영복]Quando eu sinto o cheiro desse negócio,[/log]" 
1009706-96 = "[wa:1270]― [log=모에 수영복]Lembro dos meus verões de quando era criança.[/log]" 
1009706-99 = "[wa:610]― [log=모에 수영복]Que bizarro, [wa:1020]sério mesmo.[/log]" 
1009706-102 = "― [log=모에 수영복]Isso aqui é o cheiro do veneno e da ruína que massacra os insetos, mas[/log]" 
1009706-103 = "[wa:2390]― [log=모에 수영복]Pode trazer nostalgia e [wa:1120]conforto dependendo da pessoa...[/log]" 
1009706-106 = "― [log=모에 수영복]Acho que as pessoas, [wa:1180]no fundo, amam o cheiro da ruína e do apocalipse, não é? [wa:2480]Kuhihi...[/log]" 
1009706-109 = "[wa:1140]― [log=모에 수영복]Sensei. [wa:1310]Chega um pouquinho mais pra cá.[/log]" 
1009706-112 = "― [log=모에 수영복]Se uns insetos ou sanguessugas vierem em cima de você [wa:1880]vai ser o maior saco...[/log]" 
1009706-113 = "[wa:2300]― [log=모에 수영복]Vamos ficar [wa:1520]bem [wa:320]inundados [wa:120]nessa fumaça de ruína por hoje à noite, belê?[/log]" 
1009706-116 = "（Depois disso, passei um momento tranquilo com a Moe, banhados pelo nostálgico perfume daquele verão.）" 