[translation]
42020-1 = "Episódio 2: O sonho que os coelhos veem"
42020-4 = "“A Academia Especial SRT... sob a autorização da Presidente do Conselho Federal...”"
42020-6 = "“Os esquadrões da SRT são compostos por equipes de elite selecionadas...”"
42020-8 = "“...Justiça é o princípio correto e racional.”"
42020-11 = "“A justiça da SRT não vacila em nenhuma situação.”"
42020-15 = "……As veteranas que apareciam na televisão brilhavam intensamente."
42020-16 = "Aquela figura que personificava o ideal era... a própria definição da nossa inveja."
42020-18 = "Eu admirava a crença inabalável e a disciplina rigorosa que nunca se quebravam, mesmo em situações cruéis."
42020-19 = "Eu admirava o poder avassalador capaz de subjugar qualquer vilão com um único golpe."
42020-20 = "Eu admirava a coragem ousada que não tremia nem diante de inimigos terríveis."
42020-22 = "――Eu admirava a justiça que nunca mudava."
42020-23 = "As veteranas eram o nosso sonho e o nosso futuro."
42020-24 = "Seguindo seus passos, corremos――"
42020-26 = "E então, nós..."
42020-30 = "Nos tornamos a SRT."
42020-33 = "Hmm..."
42020-34 = "Ah, Miyako-chan. Bom dia."
42020-35 = "...Bom dia, Miyu."
42020-36 = "Já vai levantar? Ainda falta um tempo para o café da manhã...?"
42020-37 = "Miyako-chan, você chegou tarde por causa da patrulha noturna de ontem... podia dormir mais um pouco."
42020-38 = "Está tudo bem, eu dormi o suficiente."
42020-42 = "O tempo está bom hoje, as roupas devem secar rápido."
42020-43 = "Aliás, onde estão Moe e Saki...?"
42020-44 = "Elas foram procurar ingredientes para o acompanhamento agora pouco..."
42020-51 = "Ei, olha só!"
42020-52 = "Num lugar um pouco fora da nossa rota de caminhada habitual, encontrei muitos cogumelos!#nColetei os maiores."
42020-53 = "Com isso aqui, só de cogumelos, dá para durar uns 2 dias!"
42020-58 = "Hehehe... talvez você se surpreenda com isso aqui também?"
42020-59 = "Olha só, muitos ovos!"
42020-60 = "Ganhei no centro comercial agora pouco. Foi um agradecimento por exterminar pragas."
42020-61 = "Eu só testei uma nova bomba de fumaça, mas... acabei ganhando isso."
42020-62 = "Uau... quanta comida fresca...!"
42020-66 = "Ainda temos pão em lata... o café da manhã de hoje vai ser um banquete."
42020-67 = "Hehehe, estou ficando empolgada.#nBom, primeiro precisamos acender o fogo. Vou buscar galhos secos."
42020-68 = "Deixe a frigideira e os vegetais comigo!"
42020-69 = "Então, eu cuidarei dos temperos e do resto dos preparativos."
42020-73 = "E-eu também vou ajudar...!"
42020-78 = "Pão com cogumelos refogados e ovos... é um café da manhã luxuoso que eu nem conseguia imaginar."
42020-79 = "Eu queria poder comer refeições ricas assim todos os dias――"
42020-80 = "Pois é. Além disso, hoje está fresco e o tempo está bom..."
42020-81 = "Se dias assim continuassem, talvez eu pudesse ficar aqui para sempre――"
42020-86 = "...Ei. Nós não estamos nos acostumando demais com essa situação?"
42020-87 = "...É verdade. Já estamos até priorizando essas pequenas melhorias na vida cotidiana em vez das missões..."
42020-88 = "Droga... e pensar que somos a elite da SRT...#nMesmo sendo membros de um esquadrão de uma academia especial com equipamentos de ponta..."
42020-89 = "...Vamos parar de falar disso.#nA comida maravilhosa vai acabar perdendo o gosto."
42020-90 = "É verdade. Agora, vamos focar na refeição――"
42020-94 = "[ns] \"Bom dia, como estão todos?\""
42020-95 = "Ah, é o Sensei [USERNAME]."
42020-96 = "Ah, achei que era um rosto familiar, é o Sensei."
42020-97 = "Bem-vindo, Sensei. Estou de bom humor hoje, então vou te dar as boas-vindas."
42020-98 = "[s1] \"Ser recebido com um sorriso de orelha a orelha pela Saki...\"\n[s2] \"Ainda bem que me tornei sensei...\""
42020-99 = "C-cala a boca! Eu não estava sorrindo de orelha a orelha!"
42020-100 = "C-cala a boca! Eu não estava sorrindo de orelha a orelha!"
42020-107 = "Ah, sensei. Bom dia."
42020-108 = "O que faz aqui tão cedo?#nNão recebemos nenhum aviso..."
42020-109 = "Por acaso, aconteceu algum problema...?"
42020-110 = "[s] \"Não, não é nada disso...\""
42020-112 = "[ns] \"Eu só queria agradecer pelo que aconteceu outro dia.\""
42020-113 = "Sobre outro dia..."
42020-114 = "Ah... você fala daquele incidente."
42020-119 = "...A crise em Kivotos foi uma experiência bem estimulante, não foi?"
42020-120 = "Até para mim, que gosto de destruição, aquilo fez meu sangue gelar, hehe..."
42020-121 = "O céu estava vermelho sangue, inimigos desconhecidos aparecendo por toda parte...#nEu estava com tanto medo que queria fugir o tempo todo..."
42020-122 = "...Mas todo mundo se esforçou tanto por Kivotos."
42020-123 = "[s] \"Fui salvo por muitas alunas naquele incidente...\""
42020-125 = "Doryaaaaa!!!"
42020-126 = "Esquadrão RABBIT. Confirmamos o pedido de resgate do sensei e chegamos ao local."
42020-127 = "[ns3] \"Se o Esquadrão RABBIT não tivesse aparecido naquela hora.\"\n[ns4] \"Começar um contra-ataque teria sido um sonho distante.\""
42020-132 = "...Não, não precisa de agradecimentos."
42020-133 = "Como parte da SRT, nós apenas fizemos o que precisava ser feito..."
42020-134 = "Isso mesmo, proteger a justiça é o dever da SRT!"
42020-135 = "Além disso, foi uma oportunidade rara de disparar mísseis contra o prédio do Schale, hehe..."
42020-136 = "[s] \"Obrigado. Mas eu não vou ficar em paz se não retribuir de alguma forma.\""
42020-140 = "[ns] \"Eu trouxe um presente para vocês...\""
42020-141 = "Hum... nós já estamos bem acostumadas com essa vida, sabe?#nJá temos comida o suficiente, mas..."
42020-142 = "Bem, vamos aceitar o seu gesto, então guarde isso aí."
42020-144 = "Nossa maior alegria é poder proteger a segurança dos cidadãos.#nNão desejamos nada além disso."
42020-145 = "Aliás, sensei. Se ainda não tomou café da manhã, gostaria de comer com a gente?#nAcabamos de conseguir muitos ovos e cogumelos."
42020-146 = "Ah, isso seria ótimo. Esse cogumelo é um tipo raríssimo de encontrar por aqui.#nDizem que tem o aroma de um matsutake e o sabor de um shimeji..."
42020-151 = "[ns] \"Mas, isso aqui...\""
42020-153 = "[ns] \"É um lombo bovino premium para bife...\""
42020-155 = "E-ei, espera... isso é..."
42020-156 = "...C-claro que a segurança dos cidadãos é nossa maior alegria, mas..."
42020-157 = "Lombo... bovino... premium...!!"
42020-158 = "Uma carne tão marmorizada assim... eu nunca comi na vida..."
42020-159 = "[s5] \"Se não querem, tudo bem...\"\n[s6] \"Como tem bastante, vou colocar no meu miojo mesmo...\""
42020-162 = "O QUE VOCÊ DISSE!?"
42020-163 = "Você disse que ia colocar lombo bovino premium marmorizado no miojo?"
42020-164 = "Que tipo de decisão é essa!? Você quer jogar dinheiro no lixo!?"
42020-168 = "[ns7] \"Mas eu não sei de outra forma melhor de preparar...\"\n[ns8] \"E como tem muita quantidade, talvez eu não consiga comer tudo sozinho.\""
42020-169 = "E-então, por que não come aqui com a gente...?"
42020-170 = "E-então, por que não come aqui com a gente...?"
42020-171 = "Aqui temos fogo e, se for para comer, tem gente de sobra..."
42020-175 = "[ns] \"Então, vamos comer todos juntos.\""
42020-177 = "Ebaaa!"
42020-178 = "Vou preparar a grelha!"
42020-179 = "Vou buscar mais um prato...!"
42020-183 = "O-o que a gente deve servir com a carne?#nBatatas? Ou talvez cebolas...?"
42020-184 = "Por enquanto, vou tirar esses cogumelos daqui..."
42020-189 = "...Você não disse que eram cogumelos raríssimos?"
42020-190 = "Isso é verdade, mas... é um lombo bovino de primeira que não se sabe se vamos conseguir ver outra vez na vida, né? Deve ter um acompanhamento mais adequado para ele!"
42020-191 = "Em vez disso, Moe, acenda logo o fogo! O segredo do churrasco no carvão é a potência da chama!"
42020-192 = "Tá, tá, como quiser~"
42020-198 = "Próximo episódio: Isca"
