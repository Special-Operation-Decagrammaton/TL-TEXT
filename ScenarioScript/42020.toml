[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 11/06.
42020-1 = "Episódio 2;O Sonho do Coelho"
42020-4 = "「A Academia Especial SRT foi forjada…… sob a autoridade absoluta da Presidente……」"
42020-6 = "「Nossos esquadrões operam como uma elite microscópica, cirúrgica e letal……」"
42020-8 = "「……Justiça não é um conceito vago; é a aplicação implacável da lógica e da moral correta.」"
42020-11 = "「A convicção da SRT jamais tremerá, não importa quão profano seja o inimigo.」"
42020-15 = "……Na tela da TV, nossas veteranas brilhavam como deusas intocáveis."
42020-16 = "Aquelas figuras eram a personificação do ideal absoluto…… a nossa adoração cega."
42020-18 = "Eu era obcecada por aquela disciplina de ferro e pela vontade inquebrável nas missões mais suicidas."
42020-19 = "Eu desejava aquele poder esmagador, capaz de colocar qualquer pecador de joelhos com um único tiro."
42020-20 = "Eu ansiava por aquela coragem audaz que não hesitava nem diante dos monstros mais abomináveis."
42020-22 = "――Eu me apaixonei por aquela visão de uma justiça eterna e imutável."
42020-23 = "Aquelas veteranas eram o nosso sonho erguido em aço…… o nosso futuro."
42020-24 = "Nós corremos atrás daquelas sombras, sangrando para alcançá-las――"
42020-26 = "E, finalmente, nós…… "
42020-30 = "Nos tornamos a SRT."
42020-33 = "Hummm…… ah……"
42020-34 = "Ah, Miyako-chan. Bom dia."
42020-35 = "……Bom dia, Miyu."
42020-36 = "Já vai levantar? Ainda falta um tempinho pro café da manhã…… você podia ficar agarradinha no saco de dormir mais um pouco……"
42020-37 = "Você ficou de vigia até de madrugada ontem, Miyako-chan…… não precisa se forçar tanto, a gente cobre você."
42020-38 = "Está tudo bem, Miyu. Meu corpo já despertou e o sono foi reparador o suficiente."
42020-42 = "O céu está limpo hoje. Vai ser um ótimo dia para deixarmos as roupas secando ao sol."
42020-43 = "A propósito, onde se meteram a Moe e a Saki?"
42020-44 = "Saíram faz pouco tempo…… disseram que iam \"caçar\" algo que desse um gosto mais selvagem pro nosso desjejum."
42020-51 = "EI, GAROTAS! OLHEM SÓ O QUE EU TROUXE!"
42020-52 = "Saí um pouco da trilha principal hoje e dei de cara com um ninho de cogumelos gigantes!#nOlha o tamanho e a grossura dessas belezinhas!"
42020-53 = "Com esse estoque, a gente aguenta firme na base do fungo por uns dois dias!"
42020-58 = "Kuhihihi…… o meu \"achado\" vai deixar vocês babando de um jeito diferente."
42020-59 = "Vejam só, ovos fresquinhos! E são grandes!"
42020-60 = "Consegui descolar no centro comercial. O dono da mercearia me deu de presente por eu ter \"exterminado\" umas pragas que tavam incomodando ele."
42020-61 = "Eu só usei umas das minhas granadas de fumaça experimentais lá dentro pra…… limpar o ambiente, e ele ficou tão grato que quase me deu a loja inteira. Saí no lucro total, né?"
42020-62 = "Nossa…… quanta coisa fresca…… fazia tempo que a nossa boca não via algo tão bom!"
42020-66 = "Ainda temos alguns pães enlatados macios na reserva…… o café da manhã de hoje vai ser um verdadeiro banquete de elite."
42020-67 = "Kuhihi, eu já tô ficando toda arrepiada. Deixa que eu cuido de acender esse fogo, vou ali catar uns galhos duros pra gente começar a brincadeira."
42020-68 = "Eu cuido de esquentar a frigideira e dar um trato nesses cogumelos!"
42020-69 = "Certo, eu fico responsável por umedecer os temperos e preparar a mesa."
42020-73 = "E-Eu também quero ajudar em alguma coisa……!"
42020-78 = "Pão quentinho, cogumelos salteados e ovos…… até ontem isso parecia um luxo perverso de tão inalcançável."
42020-79 = "Dá vontade de viver solta assim pra sempre, só comendo gostoso e sem ninguém atirando na gente――"
42020-80 = "Pois é. O clima tá uma delícia, o sol tá batendo no corpo……"
42020-81 = "Se a vida de desertora for sempre assim, eu não me importaria de ficar morando nesse parque até ficar velhinha――"
42020-86 = "……Ei. Vocês não acham que a gente tá ficando…… \"mansa\" e domesticada demais?"
42020-87 = "……É, agora que você falou. A gente é a elite tática, mas nossa maior adrenalina agora é ver se o cogumelo tá molhadinho ou se a calcinha secou direito…… a gente tá vibrando por migalhas."
42020-88 = "Droga…… nós fomos treinadas para ser o terror dos criminosos……#nA elite implacável de uma escola militar de ponta……"
42020-89 = "……Vamos esquecer isso por agora, Saki.#nFalar de tristeza vai fazer a comida perder a graça."
42020-90 = "Tem razão. Vamos focar no que interessa: engolir――"
42020-94 = "[ns] \"Bom dia, coelhinhas! Estão animadas hoje?\""
42020-95 = "Ah, é o Sensei."
42020-96 = "Tinha que ser…… senti um cheiro de encrenca misturado com perfume barato e era só o Sensei aparecendo do nada."
42020-97 = "Olha só, você deu sorte. Como meu corpo tá de bom humor por causa da comida, vou deixar você se juntar ao bando hoje."
42020-98 = "[s1] \"Ser recebido de braços abertos com esse sorriso lindo da Saki…… ganhei meu dia.\"\n[s2] \"Obrigado, Deus, por me deixar ser o Sensei sortudo dessas garotas……\""
42020-99 = "Q-QUEM TÁ SORRINDO?! Cala a boca, seu tarado! Eu tô com cara de fome, só isso!"
42020-100 = "Q-QUEM TÁ SORRINDO?! Cala a boca, seu tarado! Eu tô com cara de fome, só isso!"
42020-107 = "Ah, Sensei. Bom dia."
42020-108 = "O que traz o senhor ao nosso acampamento tão cedo e sem avisar?#nNão tínhamos nenhuma \"sessão de treinamento\" agendada……"
42020-109 = "O senhor está precisando de alguma ajuda tática urgente……?"
42020-110 = "[s] \"Nada disso, Miyako. Relaxa esses ombros tensos.\""
42020-112 = "[ns] \"Eu só queria dar uma recompensa bem suculenta pelo esforço sobre-humano de vocês na última vez.\""
42020-113 = "A nossa última vez……?"
42020-114 = "Ah…… você tá falando daquele caos total com a Torre Sanctum."
42020-119 = "……Aquilo sim foi o que eu chamo de \"experiência imersiva e intensa\". Kivotos à beira do abismo, o céu rachando…… foi arrepiante de um jeito bem bizarro."
42020-120 = "Até eu, que adoro ver as coisas estourando e sujando tudo, senti um frio na espinha que não passava por nada, kuhihi……"
42020-121 = "Aquele céu vermelho e quente…… aqueles monstros bizarros saindo de todos os lados……#neu só queria me enterrar num buraco bem fundo e nunca mais sair……"
42020-122 = "……Mas eu vi todo mundo suando tanto pela cidade, que eu não podia simplesmente fugir e deixar vocês na mão."
42020-123 = "[s] \"Muitas alunas me emprestaram sua força e armas naquela crise, mas……\""
42020-125 = "AGORA! METE TUDO O QUE TEMOS NESSA BRECHA! DORYAAA!!――"
42020-126 = "Esquadrão RABBIT na área. Atendendo aos pedidos de socorro do Sensei. Viemos limpar a sujeira."
42020-127 = "[ns3] \"Se vocês não tivessem chegado rasgando as defesas naquela hora crucial……\"\n[ns4] \"Eu nem estaria aqui inteiro pra contar a história. O contra-ataque teria sido só uma fantasia inalcançável.\""
42020-132 = "……Não precisa de tanto drama, Sensei. Nós não precisamos de presentinhos por isso."
42020-133 = "Nós somos a SRT. Agir com brutalidade em crises extremas é o nosso propósito……"
42020-134 = "Isso aí! Proteger a justiça impondo dominância é o nosso trabalho de elite!"
42020-135 = "Além do mais, ter a chance de descarregar munição grossa bem no prédio da Schale foi um sonho realizado que eu não podia perder, kuhihi……"
42020-136 = "[s] \"Eu entendo o orgulho de vocês. Mas como um homem de palavra, minha consciência não ficaria em paz se eu não trouxesse um agrado.\""
42020-140 = "[ns] \"Eu trouxe um pedaço de carne bem suculento pra dar um \"up\" no café de vocês……\""
42020-141 = "Pff…… você acha que a gente ainda passa vontade?#nNossos instintos já tão afiados, temos mato de sobra pra comer――"
42020-142 = "Mas já que você tá tão ansioso pra nos dar, deixa isso aí num canto que depois a gente vê se presta pra enfiar na boca."
42020-144 = "Ver o sorriso e a paz dos cidadãos já preenche o nosso coração.#nNão precisamos de luxos extras."
42020-145 = "Mas já que você tá aqui com essa cara de quem quer companhia…… quer comer algo com a gente?#nColhemos uns cogumelos grandes e temos ovos frescos, dá pro gasto."
42020-146 = "É, senta aí e relaxa. Esses cogumelos gigantes que eu achei são uma raridade tática.#nO aroma é penetrante e o sabor explode na boca…… é o ápice do--"
42020-151 = "[ns] \"Ah, que pena. E eu achando que vocês iam babar loucamente por isso aqui……\""
42020-153 = "[ns] \"É uma peça gigantesca de Lombo de Wagyu A5…… cheio de gordura derretendo…… eu ia enfiar tudo na brasa quente……\""
42020-155 = "E-Eh…… o quê? Wagyu……?"
42020-156 = "……B-Bom, é óbvio que a segurança dos cidadãos preenche os nossos buracos, mas…… mas……"
42020-157 = "WAGYU…… A5…… LOMBO PREMIUM……!! É CARNE DE VERDADE PULANDO NA MINHA CARA!!"
42020-158 = "Olha como essa carne tá brilhando…… cheia de marmoreio…… eu nunca coloquei algo tão absurdo na minha boca……"
42020-159 = "[s5] \"Bom, se vocês recusam a minha carne, não vou forçar a barra……\"\n[s6] \"Vou levar tudo de volta pro meu quarto e picar bem pequenininho pra jogar dentro de um miojo sem graça de 50 centavos……\""
42020-162 = "VOCÊ TÁ LOUCO, SENSEI?!"
42020-163 = "Você acabou de ter a ousadia de dizer que vai pegar um Wagyu A5 suculento, picotar e jogar num copo de plástico barato?!"
42020-164 = "Que tipo de heresia absurda é essa?! É um crime contra a decência! É esfregar dinheiro na lama!"
42020-168 = "[ns7] \"É que eu não tenho as manhas na cozinha…… só queria jogar na água quente pra resolver logo……\"\n[ns8] \"Além disso, o pedaço é grande demais pra mim. Eu sozinho não dou conta de comer tudo isso.\""
42020-169 = "E-Então bota essa carne pra fora e divide com a gente, caramba! Não precisa levar de volta!"
42020-170 = "E-Então bota essa carne pra fora e divide com a gente, caramba! Não precisa levar de volta!"
42020-171 = "A gente já tá com o fogo ardendo aqui, os estômagos tão roncando e tem quatro bocas famintas chorando por essa proteína!"
42020-175 = "[ns] \"Bom, se vocês tão implorando tanto pela minha carne…… vamos fazer uma festa gastronômica então!\""
42020-177 = "ISSOOO!! VEM, CARNEEE!!"
42020-178 = "Eu vou lubrificar a grelha e jogar o sal grosso agora mesmo!"
42020-179 = "Vou buscar os pratos mais limpos pra aparar os sucos……!"
42020-183 = "S-Saki, o que a gente usa pra acompanhar um calibre desses?!#nBatatas grandes? Cebolas escorrendo manteiga?! Alguém me dá uma luz!"
42020-184 = "Primeiro de tudo, joga esses cogumelos murchos no mato pra abrir caminho pro Wagyu!"
42020-189 = "Ué, Saki…… você não acabou de dizer que eles eram uma \"raridade tática gigante e rara\" que você nunca via?"
42020-190 = "Isso era antes de eu ter a chance de provar do paraíso! Eu não vou desperdiçar espaço no meu estômago com fungo quando eu tenho esse lombo premium na minha frente!#nPRECISAMOS DO ACOMPANHAMENTO PERFEITO PRA ESSA PEÇA!"
42020-191 = "Moe, foca nesse fogo! O ponto da carne depende de uma brasa constante e bem acesa!"
42020-192 = "Pode deixar, capitã! Vou fazer esse fogo arder com a paixão de uma ogiva armada! Kuhihi~"
42020-198 = "Próximo Episódio;A Isca"