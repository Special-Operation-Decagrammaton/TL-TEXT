[translation]
1300602-1 = "A pequena diabinha gosta de brincar"
1300602-2 = "Sendo assim~!"
1300602-3 = "Tcharam! A sua querida Mutsuki veio te visitar, Sensei!"
1300602-4 = "[s] \"No fim das contas, você veio mesmo...\""
1300602-5 = "Pensei em ficar bem grudadinha em você enquanto se esforça no trabalho."
1300602-6 = "Ei, ei, olha só~,"
1300602-8 = "Sensei! Um abraço!"
1300602-9 = "[s] \"Desculpe, estou com as mãos ocupadas agora, poderia ir para outro lugar...?\""
1300602-10 = "Tudo bem, eu posso esperar!"
1300602-12 = "Vou ficar aqui quietinha até você terminar seu trabalho!"
1300602-13 = "Então, né?"
1300602-14 = "[s] \"Se você insiste tanto...\""
1300602-15 = "Obrigada, Sensei!"
1300602-17 = "(Enquanto era observada por Mutsuki, você começou a terminar o resto do trabalho)"
1300602-19 = "Encarando."
1300602-20 = "[s] \"...\""
1300602-22 = "Encarando fixamente."
1300602-23 = "[s] \"Err, Mutsuki...?\""
1300602-24 = "Hm? Sensei, já terminou?"
1300602-25 = "[s] \"Ainda vai demorar um pouco para terminar...\""
1300602-26 = "Ahhh, esperar mais do que isso é um tédio~."
1300602-27 = "Esquece isso e vamos brincar juntos, Sensei?"
1300602-28 = "Eu trouxe uma coisa legal justamente para brincar com você~."
1300602-29 = "[s] \"Uma coisa legal?\""
1300602-31 = "Isso mesmo, pensei em nos divertirmos hoje com essas pulseiras."
1300602-32 = "[s] \"Hum, mas o trabalho ainda...\""
1300602-33 = "É importante se dedicar, mas descansar também é, sabia?"
1300602-34 = "Você sempre está trabalhando quando não te encontro por aí..."
1300602-35 = "Por isso, é verdade que eu quero brincar, mas também quero que você descanse..."
1300602-36 = "Então vamos brincar...?"
1300602-40 = "Ei, Sensei...?"
1300602-42 = "[s] \"É verdade, descansar é tão importante quanto trabalhar!\""
1300602-43 = "Eba! Então está decidido, vamos brincar!"
1300602-45 = "[ns] \"E o que é essa pulseira?\""
1300602-46 = "Fufu, ela tem uma função de medir a frequência cardíaca."
1300602-47 = "Colocamos uma em cada pulso, e se a frequência subir acima de um certo nível, ela dá um choque elétrico."
1300602-48 = "[s] \"Entendi. E como vamos brincar com isso?\""
1300602-49 = "Kufufu, boa pergunta, Sensei."
1300602-50 = "As regras do jogo são simples. Vamos nos revezar para tentar assustar um ao outro."
1300602-51 = "Quem se assustar, tiver a frequência cardíaca elevada e levar o choque primeiro, perde."
1300602-52 = "Claro, quem perder terá que fazer qualquer coisa que o vencedor pedir!"
1300602-53 = "[s] \"Com direito a castigo, então...\""
1300602-54 = "Sem reclamar depois, hein~."
1300602-57 = "Vamos lá, Sensei!"
1300602-60 = "Então, jogo iniciado!"
1300602-62 = "Como é a primeira vez que você joga, vou deixar você começar."
1300602-63 = "(Bem, para assustar a Mutsuki...)"
1300602-64 = "[ns1] (Fazer cócegas na Mutsuki)\n[ns2] (Fazer caretas na frente da Mutsuki)"
1300602-65 = "Ahahahaha!! Sensei~! Faz cócegas~!!"
1300602-66 = "(Embora ela estivesse morrendo de cócegas, a pulseira da Mutsuki não reagiu nem um pouco)"
1300602-67 = "Aihá! Haha, ahi, kufu...! Ufa... ah, acabou?"
1300602-68 = "Que pena! O ataque do Sensei falhou, né."
1300602-69 = "……Uau, Sensei…… você se esforçou tanto assim……."
1300602-70 = "……."
1300602-71 = "Pff, pufu, ahahahaha!!!! Olhando bem, é engraçado demais~!"
1300602-72 = "Aha, ahaha! Pufu! Ahaha! Minha barriga dói~!"
1300602-73 = "Hmm, mas que pena! A eletricidade não passou, então o ataque do Sensei foi um fracasso."
1300602-74 = "Então o turno do Sensei acaba aqui!"
1300602-75 = "Agora é a minha vez. Prepare-se, Sensei?"
1300602-78 = "[s3] \"Err, Mutsuki-chan……?\"\n[s4] \"Por que você está pendurada de repente……?\""
1300602-79 = "Perto do ouvido do Sensei……."
1300602-80 = "Perto do ouvido do Sensei……."
1300602-81 = "Fuu~……♪"
1300602-82 = "[s] \"U, uwaaaaah!?\""
1300602-85 = "[ns] \"Ai, ai, ai!?\""
1300602-87 = "[ns] \"Que, que susto…….\""
1300602-88 = "Ahaha!! Grande sucesso! Com isso, eu ganhei o jogo de hoje, né?"
1300602-89 = "Já que eu ganhei~, o que será que eu vou pedir~?"
1300602-90 = "Kufufu~!"
1300602-93 = "(Eu perdi…… Quando suspirei pensando nisso, algo chamou minha atenção)"
1300602-94 = "[s5] \"Ei, Mutsuki. Por acaso, essa pulseira aí…….\"\n[s6] \"Não está…… desligada?\""
1300602-98 = "……."
1300602-99 = "[s] \"Mutsuki…… você trapaceou, né!?\""
1300602-100 = "Aha, descobriu♪"
1300602-101 = "Já que descobriu, eu vou indo nessa~!"
1300602-103 = "[s] \"Ei, espera……!\""
1300602-106 = "(Sem tempo para impedi-la, ela desapareceu como o vento)"
