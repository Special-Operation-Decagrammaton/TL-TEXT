[translation]
1300602-1 = "小悪魔は遊ぶのがお好き"
1300602-2 = "ということで～！"
1300602-3 = "じゃーん！愛しのムツキちゃんが遊びに来ったよ～、先生！"
1300602-4 = "[s] \"結局遊びに来たんだね……。\""
1300602-5 = "頑張ってる先生のすぐそばで、くっついててあげようと思って。"
1300602-6 = "ねえねえほらほら～、"
1300602-8 = "先生！ぎゅーっ！"
1300602-9 = "[s] \"ごめん、ちょっと手が離せないからどこか別の所で……。\""
1300602-10 = "大丈夫、待てるから！"
1300602-12 = "先生の仕事が終わるまでここで大人しくしてるから！"
1300602-13 = "だからぁ～、ね？"
1300602-14 = "[s] \"そこまで言うなら……。\""
1300602-15 = "ありがと、先生！"
1300602-17 = "（そうやってムツキに見守られる中、残りの仕事を始めた）"
1300602-19 = "じーっ。"
1300602-20 = "[s] \"……。\""
1300602-22 = "じーーっ。"
1300602-23 = "[s] \"えっと、ムツキ……？\""
1300602-24 = "ん？先生、もう終わった？"
1300602-25 = "[s] \"終わるまでもうちょっとかかるから……。\""
1300602-26 = "えぇ～、これ以上待つのは退屈～。"
1300602-27 = "もうそんなこと良いからさ、一緒に遊ぼっ。先生？"
1300602-28 = "せっかく先生と遊ぶために、良いもの持ってきたのに～。"
1300602-29 = "[s] \"良いもの？\""
1300602-31 = "これこれ、今日はこのブレスレットで、先生と一緒に楽しく遊ぼうと思って。"
1300602-32 = "[s] \"うーん、でもまだ仕事が……。\""
1300602-33 = "やる時はやるのも大事だけど、休憩も大事だよ？"
1300602-34 = "先生ってば、見当たらない時はいつも仕事ばっかりしてるし……。"
1300602-35 = "だから私、一緒に遊んでほしいのも本当だけど、先生にも休んでほしいなって思って……。"
1300602-36 = "だから遊ぼ……？"
1300602-40 = "ね、先生……？"
1300602-42 = "[s] \"そうだね、仕事と同じぐらい休むのも大事！\""
1300602-43 = "やった～！じゃあ遊ぶってことで決まりっ！"
1300602-45 = "[ns] \"それで、このブレスレットは何？\""
1300602-46 = "ふふっ、これにはね、心拍数の測定機能が付いてるの。"
1300602-47 = "それぞれの手首に付けて、心拍数が一定値以上に上がるとピリッて電気が流れる仕組み。"
1300602-48 = "[s] \"なるほど。それでどうやって遊ぶの？\""
1300602-49 = "くふふ、良い質問だね先生。"
1300602-50 = "ゲームのルールは簡単だよ。今からお互い順番に、相手のことをびっくりさせるの。"
1300602-51 = "びっくりして心拍数が上がって、先に電気が流れた方が負け。"
1300602-52 = "もちろん、負けた人は勝った人の言うことを何でも一つ聞くってことで！"
1300602-53 = "[s] \"罰ゲーム付きか……。\""
1300602-54 = "細かいことは言いっこなしだよ～。"
1300602-57 = "ほらほら先生！"
1300602-60 = "じゃあ、ゲームスタート！"
1300602-62 = "先生はこのゲーム初めてだし、先攻は譲ってあげるね。"
1300602-63 = "（さて、ムツキをびっくりさせるためには……）"
1300602-64 = "[ns1] （ムツキをくすぐる）\n[ns2] （ムツキの前で顔芸をする）"
1300602-65 = "あはははっ！！先生～！くすぐったい～っ！！"
1300602-66 = "（相当くすぐったのだけど、ムツキのブレスレットはちっとも反応しなかった）"
1300602-67 = "あひゃっ！ははっ、はひっ、くふっ……！ふう……あ、終わり？"
1300602-68 = "残念！先生の攻撃は失敗だね。"
1300602-69 = "……うわぁ、先生……そこまで必死に……。"
1300602-70 = "……。"
1300602-71 = "ぷっ、ぷふっ、あははははっ！！！！よく見ると面白すぎ～！"
1300602-72 = "あは、あははっ！ぷふっ！あはは！お腹痛い～！"
1300602-73 = "んー、でも残念！電気は流れなかったね～、先生の攻撃は失敗ってことで。"
1300602-74 = "じゃあ先生のターンはこれで終わり！"
1300602-75 = "次は私の番。覚悟してね、先生？"
1300602-78 = "[s3] \"えっと、ムツキちゃん……？\"\n[s4] \"急にぶら下がって何を……？\""
1300602-79 = "先生の耳元にぃ……。"
1300602-80 = "先生の耳元にぃ……。"
1300602-81 = "ふぅ～……っ♪"
1300602-82 = "[s] \"う、うわあぁぁっ！？\""
1300602-85 = "[ns] \"あ痛ぁぁっっ！？\""
1300602-87 = "[ns] \"び、びっくりしたー……。\""
1300602-88 = "あはは！！大成功！これで今回のゲームは私の勝ちだね？"
1300602-89 = "それじゃあ勝っちゃったし～、何をお願いしよっかな～？"
1300602-90 = "くふふ～っ！"
1300602-93 = "（負けてしまった……そう思ってため息をついた時、何かがふと目に入った）"
1300602-94 = "[s5] \"あれ、ムツキ。もしかして、そっちのブレスレット……。\"\n[s6] \"電源……入ってないんじゃ……？\""
1300602-98 = "……。"
1300602-99 = "[s] \"ムツキ……ズルしたね！？\""
1300602-100 = "あはっ、バレちゃった♪"
1300602-101 = "バレちゃったことだし、私はこれで～っ！"
1300602-103 = "[s] \"ちょっ、待っ……！\""
1300602-106 = "（止める暇も無く、風のように消えていった）"
