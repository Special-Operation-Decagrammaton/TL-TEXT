11008-67 = "U-Uau!? Então estou certa?! Faz tanto tempo assim!?"
11008-68 = "U-Uau!? Então estou certa?! Faz tanto tempo assim!?"
11008-69 = "Uoooau. Calma, calma...."
11008-70 = "Hum... hum... ah, isso mesmo! Primeiro, vou me apresentar!"
11008-71 = "Eu sou Arona!"
11008-72 = "Eu sou a administradora do sistema operacional principal, e a secretária que estará auxiliando o Sensei neste \"Baú de Shittim\"!"
11008-73 = "Finalmente consegui te conhecer! Faz muito tempo que estou esperando por você aqui!"
11008-74 = "[s] \"Você não estava dormindo?\""
11008-75 = "Ah, hm... mas é claro que às vezes eu cochilo..."
11008-76 = "[s] \"Prazer em conhecê-la.\""
11008-77 = "Sim! obrigada!"
11008-78 = "Meu corpo físico ainda está em um nível baixo e preciso fazer ajustes principalmente nas cordas vocais, mas..."
11008-79 = "De agora em diante, farei o meu melhor para apoiá-lo como posso!"
11008-80 = "Ah, isso mesmo! Primeiramente, embora seja só uma formalidade, realizaremos a autenticação biométrica♪"
11008-81 = "Ugh... é um pouco constrangedor, mas não tem jeito, já que é uma formalidade. Por favor, venha aqui."
11008-84 = "Chegue mais perto."
11008-88 = "Agora, coloque seu dedo no meu dedo."
11008-92 = "Hehehe. É como se estivéssemos fazendo uma promessa, não é?"
11008-93 = "O que? Parece uma cena de um filme famoso de ficção científica?"
11008-94 = "Na verdade, é assim que verificamos as impressões digitais biométricas!"
11008-95 = "Verifico visualmente as impressões digitais deixadas na tela... logo logo acaba! #nMeus olhos são ótimos."
11008-98 = "Deixe me ver..."
11008-99 = "Hmmm..."
11008-100 = "(Hmm... talvez eu não consiga ver bem...)"
11008-101 = "(...Bem, não importa.)"
11008-103 = "Confirmação concluída♪"
11008-104 = "hmm? Parece que eu não fiz direito? #nHumm... I-Isso não é verdade!"
11008-105 = "..."
11008-106 = "As máquinas modernas fazem reconhecimento facial e de impressões digitais rapido? Espere, leva menos de um segundo? #nUau, não tenho esses recursos de ponta..."
11008-107 = "E-Eu não preciso desses recursos! Eu posso verificar com meus olhos!"
11008-108 = "...Parece que você não acredita em mim..."
11008-109 = "..."
11008-110 = "(Suspira)"
11008-111 = "(Funga)"
11008-112 = "Nesse caso, porque não me larga pela Seeree se acha isso!"
11008-113 = "[s] Eu a consolo dizendo que era só uma piada."
11008-114 = "(Soluça)"
11008-116 = "(Eu tento alegrar ela por vários minutos)"
11008-118 = "..."
11008-119 = "...Entendo. Parece que muito esteve acontecendo."
11008-120 = "A Presidente do Conselho Estudantil Geral desapareceu, e por causa disso, não há como controlar a Torre em Kivotos agora..."
11008-121 = "[s5] \"Você sabe sobre a Presidente do Conselho Estudantil Geral?\"\n[s6] \"Quem é a Presidente do Conselho Estudantil Geral?\""
11008-122 = "Tenho muitos dados sobre Kivotos, mas sei muito pouco sobre a Presidente do Conselho Estudantil Geral. #nEu não sei quem ela é e por que desapareceu..."
11008-123 = "Tenho muitos dados sobre Kivotos, mas sei muito pouco sobre a Presidente do Conselho Estudantil Geral. #nEu não sei quem ela é e por que desapareceu..."
11008-124 = "Desculpe, não posso ajudá-lo."
11008-125 = "...No entanto, eu acho que posso de alguma forma resolver o problema da Torre Sanctum."
11008-126 = "[s] \"Então, por favor, Arona.\""
11008-127 = "Sim! Entendido. Agora irei reparar os direitos de acesso à Torre Sanctum!"
11008-128 = "Espere um momento!"
11008-130 = "(Wiiiiiiin―――)"
11008-138 = "..."
11008-139 = "Aquisição de privilégios de administrador da Torre Sanctum, concluída..."
11008-140 = "Sensei. Recuperamos com sucesso o controle da Torre Sanctum. #nTorre Sanctum agora está sob meu controle."
11008-141 = "Isso significa que Kivotos está na palma de suas mãos Sensei!"
11008-142 = "Se o Sensei aprovar, o controle da Torre Sanctum pode ser transferido para o Conselho Estudantil Geral."
11008-143 = "Mas... você tem certeza? você estaria entreguado controle total ao Conselho Estudantil Geral..."
11008-144 = "[s7] \"Ficará tudo bem.\"\n[s8] \"Aprovado.\""
11008-145 = "Entendido. De agora em diante, o controle da Torre Sanctum será transferido para o Conselho Estudantil Geral!"
11008-146 = "Entendido. De agora em diante, o controle da Torre Sanctum será transferido para o Conselho Estudantil Geral!"
11008-148 = "...Sim. Entendo."
11008-149 = "(clique) Confirmamos que temos o controle da Torre Sanctum."
11008-150 = "A partir de agora, a gestão administrativa prosseguirá da mesma forma que quando existia uma Presidente do Conselho Estudantil Geral."
11008-151 = "Obrigado pelo seu trabalho duro, Sensei. #nEm nome do Conselho Estudantil Geral, gostaria de expressar minha mais profunda gratidão por evitar o caos em Kivotos."
11008-152 = "Não se preocupe, iremos rastrear e subjugar os delinquentes e as alunas suspensas que atacaram este lugar."
11008-153 = "Pois bem, meu dever era te entregar o \"Baú de Shittim\" meu papel aqui acabou."
11008-154 = "...Ah, tem mais uma coisa."
11008-155 = "Por favor, siga-me. Gostaria de apresentar a você ao Clube de Investigação Federal: \"Schale\"."
11008-158 = "Este é o Saguão principal da Schale."
11008-159 = "Esteve vazio por muito tempo, mas finalmente tem um dono."
11008-160 = "(Abre porta)"
11008-164 = "E esta é a sala do clube de Schale."
11008-165 = "É aqui que trabalhará, começando agora."
11008-166 = "[s] \"O que devo fazer agora?\""
11008-167 = "...A Schale tem autoridade, mas não tem objetivos no momento."
11008-168 = "Você pode entrar e sair livremente de qualquer distrito autônomo de qualquer escola em Kivotos #ne ter qualquer aluna que desejar como membras do clube, independentemente de sua afiliação..."
11008-169 = "É interessante, não é? #nEmbora seja chamado de Clube de Investigação, a Presidente do Conselho Estudantil Geral não mencionou especificamente o seu propósito."
11008-170 = "Em outras palavras, você pode fazer o que quiser..."
11008-171 = "..."
11008-172 = "...Mesmo se eu quisesse perguntar a ela sobre, a Presidente do Conselho Estudantil Geral continua desaparecida."
11008-173 = "Estamos fazendo tudo o que podemos para encontrá-la, por isso não temos recursos para lidar com os problemas que surgem em torno de Kivotos."
11008-174 = "Mesmo agora, o Conselho Estudantil Geral continua recebendo todo tipo de reclamações... #nPedidos de suprimentos, melhorias ambientais, aulas especiais para alunos reprovados, pedidos de para salvar clubes, etc..."
11008-175 = "...Talvez, Schale possa resolver essas reclamações incômodas."
11008-176 = "Deixei todos os documentos relacionados a isso na mesa, Sensei. Por favor, leia quando tiver tempo."
11008-177 = "Tudo fica a critério seu."
11008-178 = "Então não tenha pressa. Entraremos em contato novamente quando necessário."
11008-181 = "Confirmei que o Conselho Estudantil Geral recuperou o controle da Torre Sanctum."
11008-182 = "Wakamo escapou para a distrito de estudantes... mas tenho certeza que será capturada em breve."
11008-183 = "Deixamos o resto para a equipe responsável."
11008-184 = "Nada mal, Sensei. Aposto que o seu trabalho se espalhará por Kivotos, já deve estar em todas as redes sociais."
11008-185 = "[s] \"Não conseguiria sem vocês.\""
11008-186 = "Isto é uma despedida, mas por favor, passe pela Escola Geral Trinity futuramente, Sensei."
11008-188 = "(Concorda)"
11008-189 = "Reportarei o que aconteceu hoje a Presidente do Comitê de Morais Públicas. Por favor, venha nos visitar quando vier à Academia Gehenna."
11008-190 = "Se você vier para a Escola de Ciências Millennium, talvez possamos nos encontrar novamente? Sensei, até breve!"
11008-192 = "[ns] Volte ao escritório de Schale."
11008-194 = "..."
11008-195 = "Ah... isso é um problema..."
11008-196 = "Hehe...hehehe."
11008-198 = "...Ufufufufufufu♥"
11008-200 = "Haha... Tudo estava um pouco agitado, mas...#nParece que as coisas se acalmaram até certo ponto. obrigada pela sua ajuda."
11008-201 = "[s] \"Obrigado pelo seu trabalho duro, Arona.\""
11008-202 = "Sim! Mas isso é só o começo, certo?"
11008-203 = "A partir de agora, junto com o você, resolveremos todos os problemas que as alunas de Kivotos estão enfrentando...!"
11008-204 = "Embora possa parecer simples, não é nada fácil... é uma tarefa muito importante!"
11008-205 = "Kivotos e Schale, estarão contando com você, Sensei."
11008-206 = "[s9] \"E eu estou contando com você, Arona.\"\n[s10] \"Feliz em ajudar.\""
11008-207 = "Agora vamos começar nossa primeira missão oficial como o Clube de Investigação Federal: Schale!"
11008-208 = "Agora vamos começar nossa primeira missão oficial como o Clube de Investigação Federal: Schale!"
