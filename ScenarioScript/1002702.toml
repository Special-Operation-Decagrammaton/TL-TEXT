[translation]
1002702-1 = "思わぬ角度"
1002702-4 = "（お願いされたものを持って、アスナがいると聞いた場所に来たのだけれど、辺りには誰もいない……）"
1002702-8 = "[ns] \"……？\""
1002702-10 = "こちらカリン。"
1002702-11 = "えっと、先生？"
1002702-12 = "その、ごめん……今聞いたんだけど、どうやら手違いがあったみたいで……。"
1002702-13 = "アスナ先輩がまたどこか、見当もつかない場所に……。"
1002702-14 = "本当に申し訳ない、忙しい中こっちから頼んだのに……。"
1002702-15 = "どうしようか……。"
1002702-16 = "……とりあえず、そこに置いておいてもらえる？これ以上迷惑をかけるわけにはいかないし……。"
1002702-17 = "あとで落ち着いた頃に、私が取りに行くから。"
1002702-18 = "[s1] \"それでも全然良いんだけど……。\"\n[s2] \"カリンは今、どこにいるの？\""
1002702-19 = "……ん？"
1002702-20 = "……ん？"
1002702-21 = "私？"
1002702-22 = "えっと……今先生がいる位置から一つ横の道に入った先に、廃墟が見えると思うのだけど。"
1002702-23 = "今はそこの最上階にいる。ただ、今は監視対象から注意を逸らすわけにはいかなくて……。"
1002702-24 = "[s] \"じゃあ、そこまで持っていくね。\""
1002702-25 = "え？"
1002702-26 = "そ、そこまでしてもらうのは、申し訳ないような……。"
1002702-27 = "何だか、先生をこき使っているみたいで……。"
1002702-28 = "[s] \"全然大丈夫だよ、ちょっと待ってて。\""
1002702-29 = "それなら……うん。"
1002702-30 = "じゃあ、お願いしようかな。"
1002702-31 = "ありがとう、先生。"
1002702-38 = "（その廃墟はかなり荒んでいて、だいぶ前に打ち捨てられた場所のようだった）"
1002702-39 = "（自分の足音だけが、やたらと大きく響く）"
1002702-40 = "先生、迷子になってたりしない？"
1002702-41 = "……あ、先生の足音聞こえた。"
1002702-42 = "もう迷う心配は無さそうだね、じゃあ。"
1002702-43 = "[s] そのまま真っすぐに進む。"
1002702-49 = "……あ、先生？"
1002702-50 = "[s] \"……っ！？\""
1002702-51 = "……？"
1002702-52 = "先生、どうかした？"
1002702-53 = "姿勢……？"
1002702-54 = "……うぇっ！？"
1002702-57 = "[wa:50]― ……うぇっ！？"
1002702-61 = "[wa:700]― せ、[wa:1200]先生！？[wa:1700]ちがっ、[wa:870]これはその……！"
1002702-64 = "[wa:50]― 待って！[wa:1250]今は、[wa:480]姿勢を変えるわけにいかなくて……！"
1002702-67 = "[wa:1050]― えっと、[wa:1450]今は狙撃任務中で……！"
1002702-70 = "[wa:100]― ターゲットから[wa:400]狙いを外すわけにはいかないし、"
1002702-72 = "― だから……！"
1002702-75 = "[wa:550]― ……え、[wa:1700]こっちは大丈夫……？"
1002702-77 = "― ……むしろ、[wa:880]そのままでお願い？[wa:2150]ちょっ……！"
1002702-80 = "[wa:1000]― な、[wa:1020]何だか[wa:480]喜んでるみたいだけど、[wa:2530]これは流石に……！"
1002702-82 = "― やっぱり[wa:500]無理だ、[wa:1300]恥ずかしい……っ！"
1002702-85 = "[wa:650]― え、[wa:1100]気にせず続けて……？"
1002702-87 = "― き、[wa:1000]気にせずにいられるか！[wa:1770]バカっ！"
1002702-90 = "（カリンが任務を終えるまで、そのまま後ろでおとなしく待っていた）"
1002702-95 = "……とりあえず、任務完了。"
1002702-96 = "ん？この格好……？"
1002702-97 = "ああ、その、今日は誰とも会わない任務だからせっかくだし、と思って……。"
1002702-98 = "それより……はぁ、ごめん。ちょっと、こうなるとは思ってなかった。"
1002702-99 = "先生が来るって分かってたのに、そこまで頭が回らなくって……。"
1002702-100 = "えっと、私はもう少しここにいる予定だけど、とにかくありがとう。先生はそろそろシャーレに戻る？"
1002702-101 = "……もう少し一緒にいる？"
1002702-102 = "ふふっ。もしかして先生、私がひとりで寂しがってるんじゃないかとか思って、そんな優しいことを言ってるのか？"
1002702-103 = "大丈夫だ、スナイパーはひとりで待機してるなんてことしょっちゅうだし……"
1002702-104 = "……そういうことじゃない？それって、もしかしてその……"
1002702-105 = "……目の保養？"
1002702-109 = "……はぁ。"
1002702-110 = "先生は本当に、全くもう……。"
