[translation]
10041080-1 = "後日談;スポンサー"
10041080-4 = "はあ……結局こうなるのか。"
10041080-5 = "どこに送られるんだ？やっぱ矯正局？"
10041080-6 = "多分ね。聞いた感じそうだったよ。"
10041080-13 = "はぁぁ……。"
10041080-15 = "すげーため息。"
10041080-16 = "まあまあそんな落ち込むなって。あのC&C相手じゃ仕方ないだろ。私たちじゃ無理だって。"
10041080-21 = "いえ、そういう意味ではなかったのですが……。"
10041080-22 = "にしても見直したよ。正直、美甘ネルに捕まった時は見捨てられると思った。"
10041080-23 = "……え？"
10041080-24 = "そうそう！本当ビックリ！"
10041080-25 = "雇い主に裏切られないとか、いつぶり？また今度なんかあったら呼んでくれよな！"
10041080-26 = "そう、ですか……はは。いい印象だったならよかったです。"
10041080-27 = "それに対し、こちらの雇い主は……。"
10041080-28 = "ん？雇い主？"
10041080-30 = "あ、そういやそっちもスポンサーがいるとか言ってたよな？そんな変わらない立場か。"
10041080-31 = "はい。どんな人かはよく分かっていませんが、私の目的に力を貸すと言われ従っているだけです。"
10041080-32 = "ですが……どうやら見捨てられたようですね。"
10041080-33 = "えっ……？"
10041080-34 = "おっと……。"
10041080-35 = "大丈夫です。分かっていたことなので。ビジネスの関係ってそういうものですし。"
10041080-36 = "それに私も任務を失敗したので……とやかく言える立場じゃありません。"
10041080-41 = "誰が見捨てたと言うのです？"
10041080-46 = "……ん？"
10041080-48 = "あれ？何だ……？何か聞こえなかったか？"
10041080-49 = "だよな……？"
10041080-60 = "ドアが開いた……！？"
10041080-66 = "ここは……。"
10041080-67 = "……地下？"
10041080-72 = "「安全な場所」ですよ。皆さんを助けるべく、特別にご用意しました。"
10041080-76 = "……！？この声は……。"
10041080-77 = "……雇い主ですね。"
10041080-78 = "え……！？"
10041080-85 = "まったく、寂しいものです。契約相手を見捨てると思われるなんて。"
10041080-86 = "もちろん他の方を誘導することもありますが……それなりに責任は負いますよ？"
10041080-87 = "……あなたが。"
10041080-88 = "ええ、「ニヤニヤ教授」と申します。"
10041080-89 = "実際にお会いするのは初めてですね。"
10041080-90 = "おや、緊張されてますか？もう少し信用してくださってもいいと思いますよ。矯正局行きを止めてあげたのに。"
10041080-91 = "そうですね……でも、だからこそ意外といいますか。だって私は任務を失敗したのですよ。"
10041080-92 = "失敗……？"
10041080-96 = "ほむ……認識のズレがあったようですね？"
10041080-97 = "認識のズレ……？"
10041080-98 = "ご心配なく。あなたは十分にやってくれました。これだってそのご褒美なのですよ？"
10041080-99 = "……？"
10041080-100 = "それはどういう……？ハナから別の狙いがあったと？"
10041080-101 = "……ふふ。それについては伏せておきましょう。今皆さんにやっていただいていることとは関係ありませんから。"
10041080-106 = "とにかく、楽しいお時間でしたよ。"
10041080-107 = "所用のため失礼しますね。では、お足元に気を付けて。"
10041080-118 = "な……"
10041080-120 = "何者だ、あいつ？"
