[translation]
10041080-1 = "Epílogo; Patrocinador"
10041080-4 = "Ah... então no fim das contas, é assim que termina."
10041080-5 = "Para onde vamos ser mandadas? Para o Departamento Correcional, como sempre?"
10041080-6 = "Provavelmente. Pelo que ouvi, parece que sim."
10041080-13 = "Ahhh..."
10041080-15 = "Que suspiro profundo."
10041080-16 = "Ei, não fique tão deprimida. Não tinha como vencer a C&C. Não era algo que nós pudéssemos resolver."
10041080-21 = "Não, não era nesse sentido que eu estava falando..."
10041080-22 = "Mas, de qualquer forma, mudei minha opinião sobre você. Sinceramente, quando fomos pegas pela Neru Mikamo, achei que seríamos descartadas."
10041080-23 = "...Hã?"
10041080-24 = "Pois é! Fiquei muito surpresa!"
10041080-25 = "Quando foi a última vez que um empregador não nos traiu? Se precisar de algo de novo, pode chamar a gente!"
10041080-26 = "É mesmo...? Haha. Fico feliz que tenha tido uma boa impressão."
10041080-27 = "Em contraste, o meu empregador..."
10041080-28 = "Hm? Empregador?"
10041080-30 = "Ah, agora que mencionou, você disse que também tinha um patrocinador, né? Estamos na mesma situação, então?"
10041080-31 = "Sim. Não sei muito bem que tipo de pessoa é, apenas sigo ordens porque me prometeram ajudar com o meu objetivo."
10041080-32 = "Mas... parece que fui descartada."
10041080-33 = "Hã...?"
10041080-34 = "Opa..."
10041080-35 = "Está tudo bem. Eu já sabia que isso poderia acontecer. Relações de negócios são assim mesmo."
10041080-36 = "Além disso, eu falhei na missão... então não estou em posição de reclamar."
10041080-41 = "Quem disse que você foi descartada?"
10041080-46 = "...Hm?"
10041080-48 = "Ué? O que foi...? Vocês não ouviram alguma coisa?"
10041080-49 = "Você também ouviu...?"
10041080-60 = "A porta abriu...!?"
10041080-66 = "Onde é que estamos..."
10041080-67 = "...No subsolo?"
10041080-72 = "Em um \"lugar seguro\". Preparei isto especialmente para ajudar vocês."
10041080-76 = "...!? Essa voz..."
10041080-77 = "...É o meu empregador."
10041080-78 = "Hã...!?"
10041080-85 = "Francamente, que decepção. Pensar que eu descartaria alguém com quem tenho um contrato."
10041080-86 = "É claro que às vezes preciso desviar a atenção de outras pessoas, mas... eu assumo a responsabilidade, sabe?"
10041080-87 = "...Você."
10041080-88 = "Sim, pode me chamar de \"Professor Sorridente\"."
10041080-89 = "Esta é a primeira vez que nos encontramos pessoalmente, não é?"
10041080-90 = "Ora, está nervosa? Acho que poderia confiar um pouco mais em mim. Afinal, eu impedi que vocês fossem para o Departamento Correcional."
10041080-91 = "É verdade... mas é por isso que estou surpresa. Afinal, eu falhei na minha missão."
10041080-92 = "Falhou...?"
10041080-96 = "Hum... parece que houve um pequeno desentendimento sobre a percepção dos fatos, não é?"
10041080-97 = "Desentendimento...?"
10041080-98 = "Não se preocupe. Você fez o suficiente. Isso aqui não é uma recompensa pelo seu esforço?"
10041080-99 = "...?"
10041080-100 = "O que quer dizer com isso...? Você tinha outro objetivo desde o início?"
10041080-101 = "...Hehe. Vamos deixar isso em segredo por enquanto. Não tem relação com o que vocês estão fazendo agora."
10041080-106 = "De qualquer forma, foi um prazer passar este tempo com vocês."
10041080-107 = "Tenho outros assuntos a tratar, então com licença. Cuidado onde pisa."
10041080-118 = "O qu..."
10041080-120 = "Quem é aquele sujeito?"
