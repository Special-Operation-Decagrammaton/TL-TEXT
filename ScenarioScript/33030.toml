[translation]
33030-1 = "Episódio 3; Post Mortem (3)"
33030-2 = "Prisão da Trinity"
33030-5 = "Eu achei que a gente não ia mais se ver."
33030-6 = "......Nem pensar. Olha o nosso nível de amizade, Mika-san?"
33030-7 = "Fufu, é verdade. Somos amigas de infância, né?"
33030-8 = "......"
33030-9 = "......Mas então, por que veio aqui? Se for pra me interrogar, já fizeram isso até eu enjoar."
33030-10 = "Já que você veio pessoalmente, Nagi-chan, é porque tem algo mais importante, né?"
33030-11 = "......"
33030-12 = "'Esquadrão Arius'..."
33030-13 = "Uma unidade de forças especiais organizada secretamente pela presidente do conselho estudantil de Arius."
33030-14 = "Era só isso que queria saber? Eu já falei sobre isso durante o interrogatório, não falei?"
33030-15 = "Desde como comecei a contatar a Arius até a composição dos membros do Esquadrão. Já contei tudo que eu sabia."
33030-16 = "......Sim. Eu confirmei isso também."
33030-17 = "E daí? Então você acha que eu ainda estou escondendo alguma coisa? Quer tentar arrancar minhas unhas pra ver se sai algo? Aquele jeitinho que o pessoal da Irmandade... ou era de algum outro lugar? Costumava fazer?"
33030-18 = "...Não é o método da Irmandade, mas sim da antiga 'Sociedade de Santos'. Além disso, não permito mais métodos tão bárbaros."
33030-19 = "Ahaha, foi só uma brincadeira. Eu sei, eu sei, a Nagi-chan é boazinha demais pra essas coisas, né?"
33030-20 = "......"
33030-21 = "......Mas falando sério, não acha que já chega dessa história de Arius?"
33030-22 = "Você já acabou com o meu apoio, e agora o suprimento de armas de Arius deve estar todo cortado."
33030-23 = "O 'Esquadrão' ainda tá aí, mas mesmo se somar com o resto do pessoal da filial de Arius, não dá pra resolver isso deixando o Comitê de Realização da Justiça agir?"
33030-24 = "...Sim, já analisamos isso. Pelo menos na fase do Tratado do Éden, a atual filial de Arius não é uma ameaça significativa."
33030-25 = "É, pois é. Eu também acho. ...Aliás, me perguntaram isso no interrogatório também, mas eu nunca descobri onde fica o Distrito Autônomo de Arius."
33030-26 = "Quem deve saber como entrar no Distrito... acho que é só a líder do 'Esquadrão', a Saori, né?"
33030-27 = "Se quer tanto saber, por que não tenta ameaçar a Azusa-chan? Ela é uma traidora, mas como estava lá dentro, deve saber de alguma coisa, não?"
33030-28 = "Isso é, bem..."
33030-29 = "......? Ah, ah, entendi. Essa sua hesitação toda, Nagi-chan... não me diga que..."
33030-30 = "É porque você tratou mal o Sensei [USERNAME], e agora tá sem jeito de interrogar a Azusa-chan, que tá sob a proteção da Schale?"
33030-31 = "Bom, se você tentar algo do tipo, o Sensei com certeza vai querer proteger a Azusa-chan. Não que ele vá te tratar mal, mas..."
33030-32 = "......"
33030-33 = "Essa cara... Nagi-chan, você não viu o Sensei desde aquele dia, né?"
33030-34 = "Ficou com tanta vergonha depois do que fez que não tem coragem de olhar na cara dele? Ahah, como você é uma garota adolescente, Nagi-chan."
33030-35 = "......Bom, eu não sou muito diferente nesse aspecto."
33030-36 = "O Sensei... ele vem até aqui várias e várias vezes querendo me ver. Fica até difícil ter que recusar toda vez."
33030-37 = "Já que eu tô trancada aqui, você podia só usar a autoridade da Schale ou qualquer coisa e me tirar daqui à força, né?"
33030-38 = "......Bom, você não é desse tipo, né? A Nagi-chan sabe disso. Eu passei um monte de informação errada pro Sensei pra tentar confundir vocês... se o Sensei tivesse traído vocês naquela hora, teria sido tudo tão fácil."
33030-39 = "Mesmo se não fosse isso, bastava o Sensei acreditar em tudo o que eu dizia ou em tudo o que você dizia... teria sido muito mais simples. Eu teria tido muito mais liberdade."
33030-40 = "É, se eu tivesse só repassado tudo o que eu te falei direto pro Sensei... acho que agora eu estaria aqui rindo com ele, que veio até aqui pra me ver."
33030-41 = "......"
33030-42 = "......Ei, Nagi-chan. Pensando bem, não deu tudo certo no final?"
33030-43 = "A 'traidora da Trinity' foi capturada. Arius não é mais uma ameaça."
33030-44 = "Se a gente conseguir assinar o Tratado do Éden, a paz que você tanto queria vira realidade."
33030-45 = "Final feliz, que bom, né?"
33030-46 = "......"
33030-47 = "Não há nada de bom nisso..."
33030-48 = "O que há de bom nisso, com a Mika-san sendo a traidora..."
33030-49 = "Por que você tentou destruir o meu halo?"
33030-51 = "......"
33030-52 = "......Por quê? Porque você odeia Gehenna? Foi esse o motivo para você fazer isso comigo...?"
33030-53 = "E o caso da Seia-san também. Por quê? Por quê..."
33030-54 = "......"
33030-55 = "Naquela época, quando soube que a Seia-san tinha morrido..."
33030-56 = "Choque e terror... e ao mesmo tempo, pensei: 'Com certeza a próxima sou eu'."
33030-57 = "A Seia-san, a mais inteligente de nós, que ainda tinha o poder do sonho premonitório como arma... dá para entender por que você atacaria a pessoa mais perigosa da Trinity primeiro."
33030-58 = "A Mika-san é, digamos, peculiar na política... então eu pensei que a próxima seria eu..."
33030-59 = "......Será que tão falando mal de mim agora?"
33030-60 = "Então, se algo acontecesse comigo... eu pretendia deixar tudo nas mãos da Mika-san."
33030-61 = "Por isso, antes que a Mika-san ficasse sozinha... eu queria encontrar o culpado. E, acima de tudo, eu não queria que a Mika-san se machucasse também..."
33030-63 = "Quem será que foi... Gehenna? O Conselho Geral? Ou será que aquela Big Sister de Millennium? O ditador de Red Winter? Aquele monarca negro de Shanhaijing...?"
33030-64 = "Fiquei só pensando em quem seria o traidor... não podia ser, mas talvez, mas...!"
33030-65 = "Então, eu――"
33030-66 = "Nagi-chan."
33030-67 = "...Já chega. Essa não é uma história tão complicada assim. Eu, que odeio Gehenna com todas as forças, tentei até matar minha amiga de infância por isso. É só isso."
33030-68 = "......Não houve algo? Algum mal-entendido, algum erro... alguma verdade que não dá para ver pelos fatos..."
33030-69 = "...Verdade? Ahaha!"
33030-70 = "Ah, é por isso que eu gosto da Nagi-chan. Por causa desse seu lado purinho."
33030-71 = "Não existe nada disso. Eu tentei atacar a Seia-chan, e a Nagi-chan também. Só isso."
33030-72 = "A Nagi-chan sabe bem, né? Eu tenho amores e ódios intensos. É só isso. Eu simplesmente não conseguia me dar bem com Gehenna, fim da história."
33030-73 = "Não suporto ficar no mesmo ambiente que aquela gente. Você não se sente assim, Nagi-chan?"
33030-74 = "......Então foi por isso que você se aliou à Arius?"
33030-75 = "Sim, eu sou uma assassina, né? Se tem algo que eu não gosto, é normal resolver desse jeito, não é?"
33030-76 = "Mesmo que a Seia-chan esteja viva, o fato de que eu tentei matá-la não vai mudar."
33030-77 = "A Nagi-chan simplesmente não conhecia esse meu lado, só isso."
33030-78 = "Por que... por que eu..."
33030-79 = "'Eu estive com ela por tanto tempo e não percebi'?"
33030-80 = "...A resposta para isso, a Nagi-chan sabe melhor do que eu, não sabe?"
33030-81 = "...'Porque nós somos pessoas diferentes'. Não tem como saber, né?"
33030-82 = "......"
33030-83 = "......Hoje, eu vou embora."
33030-84 = "É, se cuida, Nagi-chan. Não posso te acompanhar até a saída."
33030-87 = "......"
33030-91 = "......Por que você mente desse jeito?"
33030-92 = "Hum, hoje tem muita visita, né. A próxima é a Hanako-chan?"
33030-93 = "......Bom, o meu caso é mais por uma questão de papel."
33030-94 = "Entendi. Bom, se você não veio com a Nagi-chan, é ordem da Irmandade? Será que vocês entraram para a rede delas?"
33030-95 = "......Bom, para mim tanto faz. Mas sobre essa história de 'mentira', do que você está falando? Quando e sobre o que eu menti?"
33030-96 = "......"
33030-97 = "Combinei as informações da Irmandade e deduzi os movimentos da Mika-san até agora. É um tipo de 'Post Mortem' para descobrir seus alvos e objetivos..."
33030-98 = "Ou seja, por que a Mika Misono causou esse incidente...?"
33030-99 = "Uau, você vai falar isso na frente da pessoa envolvida? Que gosto peculiar."
33030-100 = "...Mika-san tentou destruir o Tratado do Éden como resultado do seu ódio por Gehenna. Isso é um fato."
33030-101 = "......"
33030-102 = "Não sei por quem você foi incitada, ou se existe esse 'alguém', ou como você chegou a essa decisão... mas, no final, você se aliou à Arius para se tornar a anfitriã."
33030-103 = "O plano inicial provavelmente era só sequestrar e prender a Seia-chan. Para se tornar anfitriã, isso era o suficiente."
33030-104 = "Porém, o pensamento do 'Esquadrão Arius', que executou o plano, era diferente. Elas planejavam destruir o halo da Seia-chan desde o início..."
33030-105 = "O desenrolar posterior pode ser visto de várias maneiras..."
33030-106 = "De qualquer forma, a Mika-san recebeu o relatório de que 'a Seia-chan morreu'."
33030-107 = "Acho que foi a partir daí que a mente da Mika-san começou a se quebrar."
33030-108 = "Provavelmente, você entrou em pânico. A Seia-chan tinha morrido, algo irreversível tinha acontecido, você praticamente tinha se tornado uma 'assassina'..."
33030-109 = "Já que chegou nesse ponto, só restava levar isso até o fim. Não importa quem fosse sacrificado, você tinha que chegar ao objetivo que traçou no início..."
33030-110 = "Com esse impulso autodestrutivo que beirava o desespero..."
33030-111 = "Ei, ei, espera um pouco."
33030-112 = "Pode parar de inventar coisas sobre o que eu sinto?"
33030-113 = "Fui eu quem dei a ordem para atacarem a Seia-chan, e fui eu quem tentei dar um jeito na minha amiga de infância, a Nagi-chan, não fui? Hanako-chan, que deveria ser inteligente, falando de desespero e impulsos... do que você tá falando?"
33030-114 = "...Não. Eu me lembro do que você disse."
33030-117 = "Mas eu não mandei destruir o halo. Eu não sou uma assassina."
33030-118 = "O que aconteceu com a Seia-chan foi o estopim pra essa confusão toda tomar essa proporção, sabia?"
33030-119 = "A partir dali as coisas saíram do controle e viraram essa bola de neve sem volta... E aí, o que você tem a dizer sobre isso?"
33030-122 = "Existem outros pontos estranhos."
33030-123 = "Eu suspeitava que 'havia um verdadeiro traidor na Trinity' naquela época, mas não imaginava que ele se revelaria daquela forma."
33030-124 = "Porque isso significaria jogar fora a sua maior vantagem."
33030-125 = "Estrategicamente falando, você não agiria daquela maneira."
33030-126 = "É, eu também penso nisso. Ah, se eu fosse um pouco mais esperta――"
33030-127 = "Mika-san, você não estava 'com medo de que a Arius matasse a Nagisa-san'...? Não era isso?"
33030-128 = "......"
33030-129 = "Talvez você tenha pensado que, como no caso da Seia-chan, Arius destruiria o halo da Nagisa-san?"
33030-132 = "...Então, será que dá pra devolver a Nagi-chan? Relaxa, não vou machucar ela. Bom, ela provavelmente vai passar o resto da vida escolar numa jaula, mas né."
33030-135 = "......"
33030-136 = "Mika-san, você é forte. Provavelmente, em um combate puro, você conseguiria lutar de igual para igual com a Tsurugi-san do Comitê de Realização da Justiça. É claro que você tem outros tipos de força, mas..."
33030-137 = "Naquela época, eu estava fingindo estar calma, mas sabia que era uma situação bem perigosa."
33030-138 = "Mesmo com o apoio da Irmandade, subjugar você não seria fácil. Eu cheguei a prever que, na pior das hipóteses, todos da Irmandade poderiam ser derrotados."
33030-139 = "...Mas você se rendeu. No momento em que ouviu que 'a Seia-chan está viva'."
33030-140 = "...Já chega."
33030-141 = "E o que você quer dizer com isso?"
33030-142 = "Que eu sou uma coitada? Que na verdade eu não queria fazer aquilo? Ou que eu sou uma burra que fez a escolha errada?"
33030-143 = "Ahahahahahahaha!"
33030-144 = "Ai, ai, você é mesmo uma garota muito interessante..."
33030-148 = "Nada disso, eu sou só uma traidora. Uma assassina perversa e ardilosa que vendeu amigos e aliados."
33030-149 = "Não pretendo fechar os olhos para esse fato. É normal que todos me odeiem por ser assim."
33030-150 = "...Se, por acaso, houvesse outro motivo. Como é que você saberia?"
33030-151 = "Porque eu estou dizendo que é verdade. Mesmo negando isso, o que é que você está tentando encontrar, Hanako-chan?"
33030-152 = "Por que você insiste tanto em algo impossível de provar?"
33030-153 = "Eu só, bem..."
33030-154 = "...Ei, como está a Seia-chan agora? Hanako-chan, vocês eram próximas, né?"
33030-155 = "A Seia-chan tá bem mesmo? Não é que eu duvide, mas... 'ela morreu de verdade, mas vocês mentiram'? Mas se for assim, por que ela não aparece? Ou será que vocês estão me enganando com mentiras agora também? A Hanako-chan também tem esse lado, né, talvez eu deva suspeitar disso também?"
33030-156 = "......"
33030-157 = "...Hoje é só isso, Mika-san."
33030-158 = "Não contarei a ninguém sobre as deduções que mencionei agora. Nem para a Nagisa-san."
33030-159 = "Sim, faça como quiser."
33030-160 = "E nem para o Sensei [USERNAME]."
33030-161 = "......"
33030-162 = "É só uma 'dedução', afinal de contas."
33030-163 = "......"
33030-164 = "...Então, até mais."
33030-169 = "......"
33030-170 = "............"
33030-176 = "...Eu também não sou flor que se cheire, mas a Hanako-chan é bem cruel, né."
33030-178 = "[ns] \"............\""
33030-179 = "Bom, dito isso, acabei contando tudo para o Sensei..."
33030-180 = "Eu só queria provocá-la um pouco, mas... sinto que no final, acabou sendo uma maldade mesmo."
33030-181 = "...Parece que o sangue subiu à cabeça. Preciso pedir desculpas depois..."
33030-182 = "Mas, por enquanto, parece que esse é o único desfecho possível."
33030-183 = "A Mika-san, que odiava Gehenna, tentou atacar a Tea Party para se tornar a anfitriã."
33030-184 = "Quem deu a ordem foi a Mika Misono. Quem executou foi o Esquadrão Arius. E, no final das contas, quem explodiu o quarto onde a Seia-chan estava foi a Azusa Shirasu."
33030-185 = "Cada uma tinha seus motivos e objetivos..."
33030-186 = "Os resultados dessas ações se encadearam, mal-entendidos e desconfianças se misturaram, e chegamos até aqui..."
33030-187 = "...Será que essa é a conclusão?"
33030-188 = "[ns] \"Quem sabe...\""
33030-190 = "[ns] \"Por exemplo, a Mika também, no começo, talvez só quisesse implicar com a Seia...\""
33030-191 = "...Sensei? O que foi, de repente...?"
33030-192 = "Mesmo sendo uma hipótese, parece algo muito extremo... bom, pensando bem..."
33030-193 = "Pensando na personalidade da Mika-san..."
33030-194 = "Deixando de lado a realidade, dizem que a Mika-san 'não tem jeito para a política', ou seja, ela é do tipo que age sem calcular muito as coisas."
33030-195 = "Talvez ela estivesse irritada com a Seia-chan, que vivia dizendo coisas complicadas o tempo todo...?"
33030-196 = "Bem, não dá pra dizer que a Seia-chan tem uma 'boa personalidade'..."
33030-197 = "A Mika-san tentou implicar com ela e a Arius..."
33030-198 = "Isso, no mínimo, soa como algo absurdo ou arbitrário demais..."
33030-199 = "[s] \"É, pode ser.\""
33030-200 = "...Sensei? Você está aceitando isso tão facilmente...?"
33030-201 = "[s] \"Ou talvez o objetivo da Mika fosse realmente fazer as pazes com Arius.\""
33030-202 = "......"
33030-203 = "O verdadeiro objetivo era fazer as pazes, e ela foi usada...? E nesse processo, o ódio por Gehenna foi atiçado..."
33030-204 = "...Não, o que o Sensei quer dizer é――"
33030-205 = "Nós não conseguimos entender o coração de outra pessoa... é isso?"
33030-206 = "[s] \"'Será possível provar a verdade de quem alcançou o paraíso?'...\""
33030-207 = "O quinto..."
33030-208 = "Quem alcança o paraíso não é observado de fora do paraíso. Não se pode observar a existência... O paradoxo sobre a prova de existência do paraíso..."
33030-209 = "[s] \"...Como provar algo que não pode ser provado?\""
33030-210 = "......"
33030-211 = "Se chegarmos ao 'coração de outra pessoa'... já não somos mais outra pessoa. Se não podemos chegar, então o coração verdadeiro continua desconhecido..."
33030-212 = "O paraíso e o coração de alguém são a mesma coisa... é sobre isso que estamos falando?"
33030-213 = "...Certamente, pode ser. Nós não temos como tocar diretamente no coração de alguém, nem temos meios de provar essa verdade."
33030-214 = "Como podemos provar que as palavras 'compreendi o coração de alguém' são verdadeiras..."
33030-215 = "Uma contradição real... será impossível? Não há como entender o coração de outra pessoa..."
33030-216 = "[s] \"...Não há, certamente.\""
33030-217 = "......"
33030-218 = "[ns] \"Isso é, com certeza, uma prova impossível...\""
33030-220 = "[ns] \"...Se for assim, talvez só nos reste acreditar.\""
33030-222 = "[ns] \"Que existe um paraíso ali.\""
33030-223 = "......"
33030-224 = "Sim, é isso."
33030-225 = "Pensando bem, o Sensei era assim desde o início. Desde o começo dessa história cheia de dúvidas e suspeitas――"
33030-253 = "Claro, incluindo a Mika-san e a Nagisa-san, o Sensei não duvida de seus alunos... é sobre isso?"
33030-254 = "...Mesmo que, como resultado disso, você acabe sendo traído?"
33030-255 = "[s] \"Naquela hora, com certeza deve haver algum motivo.\""
33030-256 = "Por que... Sensei, por que você é assim..."
33030-257 = "[s1] \"Se o professor não acreditar nos alunos, nada começa...\"\n[s2] \"Porque sou um adulto, quero acreditar em todos.\""
33030-264 = "[ns3] \"Espero que chegue o dia em que Nagisa e Mika\"\n[ns4] \"possam expressar seus verdadeiros sentimentos uma à outra.\""
33030-269 = "[ns] \"Algum dia, com certeza. Por isso eu também...\""
33030-272 = "[ns5] \"...Quando o Tratado do Éden acabar,\"\n[ns6] \"vou vê-las de novo imediatamente.\"\n[ns7] \"Tanto a Mika quanto a Nagisa.\""
33030-273 = "Sim... quando tudo estiver resolvido, vamos nos encontrar mais uma vez..."
33030-274 = "Sim... quando tudo estiver resolvido, vamos nos encontrar mais uma vez..."
33030-275 = "Sim... quando tudo estiver resolvido, vamos nos encontrar mais uma vez..."
33030-276 = "Mesmo sem saber o que acontecerá... só nos resta estender as mãos um ao outro e nos esforçar. É isso, né?"
33030-277 = "[s] \"Certamente é a única coisa que podemos fazer...\""
33030-278 = "......Sim, é verdade."
33030-282 = "Próximo Episódio; E Depois"