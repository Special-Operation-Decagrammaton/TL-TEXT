[translation]
33030-1 = "Episódio 3;Post-Mortem (3)"
33030-2 = "Trinity - Prisão"
33030-5 = "Eu achava que a gente não fosse mais se ver, sabia."
33030-6 = "……Imagina. Com a nossa relação, Mika?"
33030-7 = "Ufu, é verdade, né. Afinal, somos amigas de infância?"
33030-8 = "……."
33030-9 = "……E aí, por que você veio? Se for interrogatório, já fizeram até eu enjoar, viu?"
33030-10 = "Se a Nagi veio em pessoa, é porque tem algum outro assunto importante?"
33030-11 = "……."
33030-12 = "O \"Squad de Arius\" é……"
33030-13 = "A tropa especial que a presidente do conselho estudantil de Arius organizou em segredo."
33030-14 = "É só isso que você quer saber? Sobre isso eu já falei no interrogatório, viu?"
33030-15 = "Do estopim do contato com a Arius até a composição do Squad de Arius. Tudo o que eu sabia, eu já devo ter contado, não?"
33030-16 = "……Sim. Isso eu também verifiquei."
33030-17 = "E aí? Então você acha que ainda tem algo escondido? Que tal, de teste, arrancar umas unhas? Do jeitinho de umas certas pessoas por aí, a Sisterhood, era?"
33030-18 = "……Não é a Sisterhood; deve ser o jeito do antigo \"Conselho dos Santos\". Além disso, métodos bárbaros desses eu já não permito mais."
33030-19 = "Ahaha, foi só pra provocar. Eu sei, oras: a Nagi, gentil, gentilzinha, não leva jeito pra essas coisas, né?"
33030-20 = "……."
33030-21 = "……Não é bem coisa que EU deva dizer, mas a Arius já não tanto faz?"
33030-22 = "Sem o meu respaldo, as armas e o suprimento da Arius já devem estar todos se esgotando."
33030-23 = "O \"Squad\" sobrou, mas, mesmo somando o resto do efetivo da Filial de Arius, se o Comitê de Realização da Justiça se mexer, resolve, não resolve?"
33030-24 = "……Sim, isso já foi avaliado. Ao menos no estágio do Tratado do Éden, a Filial de Arius de hoje não é um fator de risco relevante."
33030-25 = "Sim, né. Eu também acho. ……Aliás, também me perguntaram no interrogatório, mas, do distrito autônomo de Arius, eu nunca soube, até o fim."
33030-26 = "Quem conhece direito o caminho pro distrito autônomo…… é, provavelmente, só a Saori, a líder do \"Squad\", eu acho?"
33030-27 = "Se você quer saber disso, por que não dá uma prensada na Azusa e pergunta? Traidora ou não, ela é parte envolvida; deve saber de alguma coisa."
33030-28 = "Isso é, é que……"
33030-29 = "……? A-ah, entendi. Essa sua enrolação toda, Nagi, não me diga que é aquilo?"
33030-30 = "Como você judiou do Sensei [USERNAME], fica sem graça de ir agora apertar a Azusa, que tá sob a asa da Schale?"
33030-31 = "Bom, de fato, se você tentasse, o Sensei ia tentar proteger a Azusa. Não que ele fosse te tratar mal, claro."
33030-32 = "……."
33030-33 = "Essa cara…… Nagi, você não viu mais o Sensei desde então, né?"
33030-34 = "Depois de fazer aquela maldade toda, não tem cara pra encará-lo…… é isso? Aha, uma mocinha adolescente, hein, até você, Nagi."
33030-35 = "……Bom, nisso eu tô igualzinha."
33030-36 = "O Sensei, sabe…… vem até aqui de novo e de novo, tentando me ver. Recusar toda vez também cansa, viu."
33030-37 = "Sendo que eu tô presa aqui; era só ele usar a autoridade da Schale, o que fosse, e me obrigar a aparecer, né?"
33030-38 = "……Bom, ele não é esse tipo de pessoa, né. A Nagi também sabe. Que eu passei um monte de informação pro Sensei tentando confundir…… se, com aquilo, ele tivesse traído, a história teria sido simples."
33030-39 = "Mesmo sem isso, se ele acreditasse em tudo o que eu dizia, ou em tudo o que a Nagi dizia…… teria sido um desenrolar bem mais fácil de entender. Bem, bem mais fácil de manobrar."
33030-40 = "É, por isso, se eu tivesse, sei lá, repassado tudo o que eu disse direto pra Nagi…… provavelmente, a esta altura, eu estaria encontrando o Sensei aqui de cabeça erguida, sorrindo."
33030-41 = "……."
33030-42 = "……Ei, Nagi. Dependendo de como se olha, no fim das contas, não deu tudo certo?"
33030-43 = "O \"traidor de Trinity\" foi preso, assim. A Arius já não é ameaça."
33030-44 = "Agora, se o Tratado do Éden for assinado, a paz que a Nagi desejou vira realidade, oras."
33030-45 = "Final feliz, que bom, que bom."
33030-46 = "……."
33030-47 = "Não tem nada de bom……"
33030-48 = "O que foi bom, neste estado…… com a Mika sendo a traidora……."
33030-49 = "Por que você tentou destruir a minha aureola?"
33030-51 = "……."
33030-52 = "……Por quê? Porque odeia Gehenna? Por esse motivo, a mim……?"
33030-53 = "E a questão da Seia também. Por que, por quê……."
33030-54 = "……."
33030-55 = "Naquela hora, quando eu ouvi que a Seia tinha morrido……."
33030-56 = "Choque e pavor…… e, ao mesmo tempo, eu pensei: \"a próxima, com certeza, sou eu\"."
33030-57 = "A Seia, a mais inteligente entre nós, munida até da arma dos sonhos premonitórios…… atacar primeiro a mais perigosa de Trinity, em certo sentido, dá pra entender."
33030-58 = "A Mika, politicamente, é meio aquilo, né…… então, com certeza, a próxima seria eu……."
33030-59 = "……Peraí, eu tô levando xingamento agora?"
33030-60 = "Por isso, se algo acontecesse comigo…… eu pretendia confiar todo o resto à Mika."
33030-61 = "Por isso, antes disso, antes que a Mika ficasse sozinha…… eu queria encontrar o culpado. Ainda mais que eu não queria que nem a Mika se machucasse……."
33030-63 = "Quem seria…… Gehenna? O Conselho Estudantil Geral? Ou aquela Big Sister de Millennium? A ditadora de Red Winter? Aquela monarca sombria de Shanhaijing……?"
33030-64 = "Quem é o traidor; eu só pensava nisso…… não pode ser, ou talvez, mas……!"
33030-65 = "E aí, eu――"
33030-66 = "Nagi."
33030-67 = "……Já chega. Isto não é uma história complicada dessas. Eu, que odeio Gehenna com todas as forças, por causa disso, tentei matar até a minha amiga de infância. É só isso."
33030-68 = "……Não houve alguma coisa? Um erro, um mal-entendido…… alguma verdade que não se vê pelos fatos……"
33030-69 = "……Verdade? Ahaha!"
33030-70 = "Aah, é por isso que eu gosto da Nagi, com certeza. Dessa Nagi pura."
33030-71 = "Não existe nada disso. Eu tentei acabar com a Seia e, ainda por cima, com a Nagi também. Só isso."
33030-72 = "A Nagi sabe bem, né? Eu sou de gostos e desgostos intensos. É só isso. Eu simplesmente não consegui me dar bem com Gehenna; é só essa a história."
33030-73 = "Estar no mesmo espaço que aqueles ali é insuportável. A Nagi não sente o mesmo?"
33030-74 = "……E, por isso, você se juntou à Arius?"
33030-75 = "Sim; eu sou uma assassina, viu? Se tem algo que me desagrada, isso é o mínimo, não é?"
33030-76 = "Mesmo que a Seia esteja viva, o fato de que eu tentei matá-la não desaparece."
33030-77 = "A Nagi só não conhecia esse meu lado; só isso."
33030-78 = "Por que…… eu……."
33030-79 = "\"Como eu, que passei tanto tempo junto, não percebi\"?"
33030-80 = "……A resposta disso, mais do que eu, é a Nagi que sabe, né?"
33030-81 = "……\"Porque somos outras\". Viu, não tem como saber, né?"
33030-82 = "……."
33030-83 = "……Por hoje, eu vou embora."
33030-84 = "Sim, se cuida, Nagi. Não vou poder te acompanhar até a porta, mas."
33030-87 = "……."
33030-91 = "……Por que você conta uma mentira dessas?"
33030-92 = "Hmm, hoje tá cheio de visita, hein. Agora é a Hanako."
33030-93 = "……Bom, no meu caso, digamos que é mais por dever de ofício."
33030-94 = "Sei. Bom, se você não veio junto com a Nagi, é mando da Sisterhood? Não me diga que você entrou pro grupo?"
33030-95 = "……Bom, pra mim tanto faz. Mais do que isso: \"mentira\", como assim? Quando, e que mentira eu contei?"
33030-96 = "……."
33030-97 = "Juntando as informações da Sisterhood e o resto, eu vinha deduzindo os seus movimentos até aqui, Mika. Com isso, investigar o alvo e o objetivo…… uma espécie de post-mortem, digamos."
33030-98 = "Ou seja: por que a Mika Misono causou um incidente destes……? Assim."
33030-99 = "Uau, discutir isso na frente da própria envolvida? Que gosto refinado o seu, hein?"
33030-100 = "……A Mika, como resultado do ódio por Gehenna, tentou destruir o Tratado do Éden. Isso, de fato, deve ser verdade."
33030-101 = "……."
33030-102 = "Quem a instigou, ou se esse \"alguém\" existe, e por que caminho você chegou a essa decisão, eu não sei…… mas, no fim, pra virar host, você se juntou à Arius."
33030-103 = "O plano inicial devia ser, simplesmente, sequestrar a Seia e mantê-la presa, só isso. Pra virar host, isso já bastava."
33030-104 = "Mas o pensamento do \"Squad de Arius\", que executaria isso, era outro. Elas, desde o início, pretendiam destruir a aureola da Seia……"
33030-105 = "A sequência depois disso, de novo, tem vários ângulos possíveis, mas……"
33030-106 = "de todo modo, a Mika recebeu o relato de que \"a Seia morreu\"."
33030-107 = "Foi a partir daí que o seu coração começou a quebrar, não foi?"
33030-108 = "Provavelmente, você entrou em pânico. Aconteceu o irreversível, a Seia morreu; você, na prática, virou uma \"assassina\"……"
33030-109 = "E, nessas alturas, só restava ir até o fim, por completo. Custasse o que custasse, só restava chegar aonde você desenhou no começo……"
33030-110 = "Com esse impulso destrutivo, quase autodestrutivo……"
33030-111 = "Ei, ei, peraí."
33030-112 = "Dá pra não sair deduzindo o coração dos outros por conta própria?"
33030-113 = "Quem mandou matar a Seia fui eu, e quem tentou dar um jeito na Nagi, minha amiga de infância, também fui eu, viu? A Hanako, que devia ser inteligente, falando de autodestruição, impulso; do que você tá falando?"
33030-114 = "……Não. Eu me lembro das palavras que você disse."
33030-117 = "Mas eu não mandei destruir a aureola. Eu não sou assassina."
33030-118 = "A Seia ter acabado daquele jeito foi o estopim pra situação ficar deste tamanho, viu?"
33030-119 = "Foi a partir daí que um monte de coisa saiu do controle…… ei, o que você acha disso?"
33030-122 = "Há outros pontos estranhos também."
33030-123 = "Naquela hora, eu já achava que \"existe um verdadeiro traidor de Trinity\", mas não esperava tanto que ele fosse, de fato, aparecer em pessoa ali."
33030-124 = "Porque isso seria jogar fora a sua maior vantagem."
33030-125 = "Pensando estrategicamente, você jamais tomaria uma atitude daquelas."
33030-126 = "Sim, disso eu também me arrependo. Aah, se eu fosse um pouquinho mais esperta――"
33030-127 = "A Mika \"ficou com medo de a Arius matar a Nagisa\"…… não foi?"
33030-128 = "……."
33030-129 = "Como na vez da Seia, a Arius talvez destruísse a aureola da Nagisa. Foi o que você pensou, não foi?"
33030-132 = "……Então é isso; me devolve a Nagi? Fica tranquilo, não vou fazer nada que doa. Bom, o resto da vida escolar dela talvez seja todo atrás das grades, mas."
33030-135 = "……."
33030-136 = "Mika, você é forte. Provavelmente, num combate puro, você faria frente até à Tsurugi, do Comitê de Realização da Justiça. Claro, você tem outras forças além dessa, mas……"
33030-137 = "Naquela hora, eu fingia tranquilidade, mas, por dentro, sabia que era uma situação bem perigosa."
33030-138 = "Mesmo com o apoio da Sisterhood, subjugar você não seria fácil. No pior dos casos, eu chegava a prever que o pessoal da Sisterhood inteiro poderia cair."
33030-139 = "……Mas você se rendeu. No instante em que ouviu que \"a Seia está viva\"."
33030-140 = "……Já chega."
33030-141 = "E aí, o que você quer dizer?"
33030-142 = "Que eu sou coitadinha? Que, na verdade, eu não queria fazer aquilo? Ou que eu sou uma boba que fez a escolha errada?"
33030-143 = "Ahahahahaha!"
33030-144 = "Aah, você é engraçada de verdade……."
33030-148 = "Nada a ver; eu sou só uma traidora. Uma assassina maligna e dissimulada, que vendeu amigas e companheiras."
33030-149 = "Eu não pretendo desviar o olhar desse fato. Uma pessoa como eu, se todo mundo odiar, é merecido."
33030-150 = "……Se, supondo, houvesse outro motivo. Como você o conheceria?"
33030-151 = "Sendo que eu tô dizendo que isto é a verdade. Negando até isso, o que é que você tá tentando achar?"
33030-152 = "Por que você se apega tanto assim ao que não se pode provar?"
33030-153 = "Eu só……."
33030-154 = "……Ei, como é que a Seia está agora? Você era próxima dela, né, Hanako?"
33030-155 = "A Seia está bem mesmo? Sei que é improvável, mas não é o caso de \"na verdade morreu e mentiram\", né? Mas, se é assim, por que ela não aparece?"
33030-156 = "Ou será que, ainda agora, vocês estão me torturando com uma mentira? A Hanako também é bem dissimulada, né; melhor desconfiar desse ponto também, quem sabe?"
33030-157 = "……."
33030-158 = "……Por hoje, eu me retiro, Mika."
33030-159 = "Sobre as suposições que eu disse agora, não vou contar a ninguém. Claro, nem à Nagisa."
33030-160 = "Sim, faz como quiser?"
33030-161 = "E nem ao Sensei [USERNAME]."
33030-162 = "……."
33030-163 = "Afinal, são só \"suposições\"."
33030-164 = "……."
33030-165 = "……Com licença."
33030-169 = "……."
33030-170 = "…………."
33030-176 = "……Eu não fico atrás, mas a Hanako também é bem cruel, hein."
33030-178 = "[ns] \"…………\""
33030-179 = "Bom, dizendo isso, acabei contando tudo pro senhor, né……."
33030-180 = "Eu pretendia só implicar um pouquinho com a Mika, mas…… sei lá, no fim, virou uma implicância de verdade, tenho essa sensação."
33030-181 = "……Parece que o sangue me subiu à cabeça. Depois tenho que me desculpar……."
33030-182 = "Mas, por ora, o desfecho parece que só consegue ser deste formato."
33030-183 = "A Mika, que odiava Gehenna, tentou atacar o Tea Party pra se tornar host."
33030-184 = "Quem ordenou o ataque foi a Mika Misono. Quem executou foi o Squad de Arius. E, no fim, quem explodiu o quarto onde a Seia estava foi a Azusa Shirasu."
33030-185 = "Cada uma com um motivo e um objetivo diferentes……"
33030-186 = "e o resultado dessas ações foi se encadeando um atrás do outro, mal-entendidos e desconfianças se misturaram, e chegamos até aqui……."
33030-187 = "……Será esta a conclusão?"
33030-188 = "[ns] \"Será……\""
33030-190 = "[ns] \"Por exemplo, a Mika também, no começo, só quis implicar com a Seia…… quem sabe.\""
33030-191 = "……Sensei? Do nada, o quê……?"
33030-192 = "Mesmo como hipótese, parece uma suposição bem extrema, mas…… deixa ver, tentando pensar……"
33030-193 = "Pensando na personalidade da Mika……"
33030-194 = "Deixando a prática de lado, a Mika é, a ponto de dizerem que \"não leva jeito pra política\", do tipo que, vista de fora, age sem calcular muito."
33030-195 = "Ela sentia irritação com a Seia, que todo dia vinha com aquelas coisas complicadas……?"
33030-196 = "Bom, a Seia, de fato, não é bem alguém de quem se possa dizer que \"tem uma boa personalidade\"……."
33030-197 = "E a Mika, tentando implicar com isso, foi atrás da Arius……."
33030-198 = "É-é forçado demais, digamos, fica uma forma arbitrária demais, digamos……."
33030-199 = "[s] \"Sim, pode ser.\""
33030-200 = "……Sensei? O senhor se convence fácil, hein……?"
33030-201 = "[s] \"Ou, quem sabe, o objetivo da Mika fosse mesmo fazer as pazes com a Arius.\""
33030-202 = "……."
33030-203 = "Fazer as pazes era o objetivo verdadeiro, e essa intenção foi usada……? E aí, com o ódio por Gehenna sendo atiçado……"
33030-204 = "……Não, o que o senhor quer dizer é――"
33030-205 = "que nós não temos como adivinhar o que a Mika de fato sente…… é isso?"
33030-206 = "[s] \"\"É possível provar a verdade daquele que chegou ao paraíso?\"……\""
33030-207 = "A quinta……"
33030-208 = "Aquele que chegou ao paraíso jamais é observado fora do paraíso. Não se pode observar que ele existe…… o paradoxo da prova da existência do paraíso……"
33030-209 = "[s] \"……Como provar o que não se pode provar.\""
33030-210 = "……."
33030-211 = "Se alguém chegasse a algo como \"o que o outro de fato sente\"…… então já não seria outro. E, se não se pode chegar, então, de fato, não se conhece o que ele sente……."
33030-212 = "O paraíso e o que alguém de fato sente são a mesma coisa…… é essa a história?"
33030-213 = "……De fato, talvez seja. Nós não temos nem um meio de tocar diretamente o coração de alguém, nem um método de provar essa verdade."
33030-214 = "A frase \"compreendi o que alguém de fato sente\", como se poderia provar que ela é \"verdadeira\"……"
33030-215 = "Uma verdadeira contradição…… será impossível? Não haverá um método de compreender o que o outro de fato sente……?"
33030-216 = "[s] \"……Não deve haver, com certeza.\""
33030-217 = "……."
33030-218 = "[ns] \"É, com certeza, uma prova impossível……\""
33030-220 = "[ns] \"……Sendo assim, talvez só reste acreditar.\""
33030-222 = "[ns] \"Que ali existe um paraíso.\""
33030-223 = "……."
33030-224 = "Pois…… é."
33030-225 = "Pensando bem, o senhor foi assim desde o começo. Desde o início desta história transbordando de suspeitas e desconfianças――"
33030-253 = "Claro, incluindo a Mika e a Nagisa; o senhor não desconfia dos alunos…… é isso?"
33030-254 = "……Mesmo que, como resultado, seja traído por alguém?"
33030-255 = "[s] \"Porque, nessa hora, com certeza, deve haver alguma razão.\""
33030-256 = "Por que…… por que o senhor é tão……."
33030-257 = "[s1] \"Se o Sensei não acreditar nos alunos, nada começa……\"\n[s2] \"Por ser adulto, eu quero acreditar em todos.\""
33030-264 = "[ns3] \"Que a Nagisa e a Mika possam, um dia, de novo,\"\n[ns4] \"abrir o coração uma pra outra; que esse dia chegue.\""
33030-269 = "[ns] \"Um dia, com certeza. E pra isso eu também……\""
33030-272 = "[ns5] \"……Quando o Tratado do Éden terminar,\"\n[ns6] \"eu vou visitá-las de novo, logo.\"\n[ns7] \"Tanto a Mika quanto a Nagisa.\""
33030-273 = "Pois é…… quando tudo se resolver, todos nós, mais uma vez……."
33030-274 = "Pois é…… quando tudo se resolver, todos nós, mais uma vez……."
33030-275 = "Pois é…… quando tudo se resolver, todos nós, mais uma vez……."
33030-276 = "Mesmo sem saber no que vai dar…… só nos resta estender as mãos um ao outro e nos esforçar. É isso, né."
33030-277 = "[s] \"Porque, com certeza, é a única coisa que nós podemos fazer……\""
33030-278 = "……Sim, é verdade."
33030-282 = "Próximo Episódio;E Então"
