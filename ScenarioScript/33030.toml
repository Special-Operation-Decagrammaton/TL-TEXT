[translation]
33030-1 = "Episódio 3; Pós-morte (3)"
33030-2 = "Prisão de Trinity"
33030-5 = "Eu achei que a gente não fosse mais se ver."
33030-6 = "……De jeito nenhum. Somos amigas, não somos, Mika-san?"
33030-7 = "Hehe, é verdade. Somos amigas de infância, afinal."
33030-8 = "……."
33030-9 = "……Então, por que você veio aqui? Se for para me interrogar, já fizeram isso até eu enjoar, não fizeram?"
33030-10 = "Se a Nagi-chan veio pessoalmente, significa que tem algum outro assunto importante, não é?"
33030-11 = "……."
33030-12 = "O \"Esquadrão Arius\" é……"
33030-13 = "Uma unidade especial organizada secretamente pela presidente do conselho estudantil de Arius."
33030-14 = "É só isso que você quer saber? Eu já disse tudo sobre isso durante o interrogatório, não disse?"
33030-15 = "Desde como entrei em contato com Arius até a composição dos membros do Esquadrão Arius. Eu contei tudo o que sabia, não contei?"
33030-16 = "……Sim. Eu confirmei isso também."
33030-17 = "E então? Você acha que ainda estou escondendo alguma coisa? Quer tentar arrancar minhas unhas para ver? Do jeito que o Sisterhood, ou seja lá quem for, costuma fazer."
33030-18 = "……Isso não é o método do Sisterhood, mas sim o da antiga \"Sociedade de Santos\". Além disso, não permitirei mais métodos tão bárbaros."
33030-19 = "Ahaha, eu só estava brincando. Eu sei, a Nagi-chan é boazinha demais para esse tipo de coisa, não é?"
33030-20 = "……."
33030-21 = "……Não que eu deva dizer isso, mas não acha que Arius não importa mais?"
33030-22 = "Já que perdi meu apoio, o fornecimento de armas de Arius deve estar sendo cortado aos poucos."
33030-23 = "O \"Esquadrão\" ainda existe, mas se somar isso ao restante das forças da filial de Arius, o Comitê de Justiça não daria conta se entrasse em ação?"
33030-24 = "……Sim, isso já foi analisado. Pelo menos no estágio do Tratado de Eden, a atual filial de Arius não representa um grande risco."
33030-25 = "Sim, é verdade. Eu também acho. ……Falando nisso, me perguntaram no interrogatório, mas até o fim, não descobri nada sobre a zona autônoma de Arius."
33030-26 = "A única que sabe como entrar na zona autônoma…… provavelmente é a Saori, a líder do \"Esquadrão\", sabe?"
33030-27 = "Se quer saber sobre isso, por que não tenta ameaçar a Azusa-chan para ela contar? Mesmo sendo uma traidora, ela estava envolvida, então talvez saiba de algo, não?"
33030-28 = "Isso é, bem……"
33030-29 = "……? Ah, entendi. A Nagi-chan está hesitando tanto por causa daquilo?"
33030-30 = "Como você foi cruel com o Sensei do SCHALE, está sem jeito de interrogar a Azusa-chan que está sob a proteção dele?"
33030-31 = "Bem, se você tentasse fazer isso, o Sensei com certeza tentaria proteger a Azusa-chan. Não que ele fosse te tratar mal, mas……"
33030-32 = "……."
33030-33 = "Essa cara…… Nagi-chan, você não encontrou o Sensei desde aquele dia, né?"
33030-34 = "Sentindo que não tem coragem de encará-lo depois de ter feito coisas tão terríveis……? Haha, você é mesmo uma garota na puberdade, Nagi-chan."
33030-35 = "……Bem, eu não sou diferente."
33030-36 = "O Sensei…… ele vem até aqui várias e várias vezes tentando me ver. É bem difícil ter que recusar todas as vezes."
33030-37 = "Já que estou presa aqui, ele poderia simplesmente usar a autoridade do SCHALE ou qualquer outra coisa para me tirar daqui à força, não poderia?"
33030-38 = "……Bem, ele não é esse tipo de pessoa. A Nagi-chan sabe, não sabe? Eu passei várias informações para o Sensei para tentar confundi-lo…… Se ele tivesse me traído naquela época, teria sido fácil."
33030-39 = "Mesmo que não fosse isso, se ele tivesse acreditado em tudo o que eu disse, ou em tudo o que a Nagi-chan disse…… teria sido um desenrolar muito mais simples. Teria sido muito mais fácil agir."
33030-40 = "Sim, por isso, se eu tivesse passado tudo o que eu disse diretamente para a Nagi-chan…… provavelmente agora eu estaria rindo e encontrando o Sensei que veio até aqui."
33030-41 = "……."
33030-42 = "……Sabe, Nagi-chan. Pensando bem, no fim das contas, não deu tudo certo?"
33030-43 = "A \"traidora de Trinity\" foi capturada. Arius não é mais uma ameaça."
33030-44 = "Se o Tratado de Eden for assinado, a paz que a Nagi-chan desejava se tornará realidade."
33030-45 = "Final feliz, que bom, que bom."
33030-46 = "……."
33030-47 = "Não há nada de bom nisso……"
33030-48 = "O que há de bom nisso, com você sendo uma traidora…… Mika-san."
33030-49 = "Por que você tentou destruir o meu halo?"
33030-51 = "……."
33030-52 = "……Por que você fez isso? É porque odeia Gehenna? Foi esse o motivo para você fazer aquilo comigo……?"
33030-53 = "Além disso, o caso da Seia-san também. Por que, por que……"
33030-54 = "……。"
33030-55 = "Naquela época, quando ouvi dizer que a Seia tinha morrido……."
33030-56 = "Choque e terror…… e, ao mesmo tempo, pensei: 'Com certeza a próxima serei eu'."
33030-57 = "A Seia, a mais inteligente entre nós e que ainda possuía a arma dos sonhos premonitórios…… é compreensível, de certa forma, que ela fosse a primeira a ser atacada, sendo a pessoa mais perigosa da Trinity."
33030-58 = "A Mika é basicamente um caso perdido politicamente…… então, se for assim, com certeza a próxima seria eu……."
33030-59 = "……Por acaso você está falando mal de mim agora?"
33030-60 = "Por isso, se algo acontecesse comigo…… eu pretendia deixar tudo nas mãos da Mika."
33030-61 = "Então, antes disso, antes que a Mika ficasse sozinha…… eu queria descobrir quem era o culpado. Além do mais, eu não queria que nem a Mika se machucasse……."
33030-63 = "Quem diabos foi…… Gehenna? O Conselho Estudantil Federal? Ou será que foi aquela irmã mais velha de Millennium? A ditadora de Red Winter? Aquele monarca sombrio de Shanhaijing……?"
33030-64 = "Eu só conseguia pensar em quem seria o traidor…… não pode ser, ou talvez, mas……!"
33030-65 = "E então, eu――"
33030-66 = "Nagi-chan."
33030-67 = "……Já chega. Isso não é uma história tão complicada assim. Eu, que odeio Gehenna com todas as minhas forças, tentei matar minha amiga de infância por causa disso. É só isso."
33030-68 = "……Não aconteceu algo? Um erro, um mal-entendido…… algo que não pode ser visto pelos fatos, uma verdade……"
33030-69 = "……Verdade? Ahahaha!"
33030-70 = "Ah, meu Deus, é por isso que eu gosto tanto da Nagi-chan. Por esse seu lado puro."
33030-71 = "Não existe nada disso. Eu tentei acabar com a Seia-chan, e depois com a Nagi-chan também. É só isso."
33030-72 = "A Nagi-chan sabe muito bem, não sabe? Eu sou muito seletiva com o que gosto ou não. É só isso. Eu simplesmente não conseguia me dar bem com Gehenna, essa é a única história."
33030-73 = "Não suporto estar no mesmo ambiente que aquelas pessoas. A Nagi-chan não é assim?"
33030-74 = "……Então, foi por isso que você se aliou a Arius?"
33030-75 = "Sim, eu sou uma assassina, sabe? Se algo me desagrada, é natural fazer isso, não é?"
33030-76 = "Mesmo que a Seia-chan estivesse viva, o fato de eu ter tentado matá-la não mudaria."
33030-77 = "A Nagi-chan simplesmente não conhecia esse meu lado, só isso."
33030-78 = "Por que…… eu……."
33030-79 = " 'Eu estive com ela por tanto tempo, como não percebi?' "
33030-80 = "……A Nagi-chan sabe a resposta para isso melhor do que eu, não sabe?"
33030-81 = "……'Porque nós somos estranhas uma para a outra'. Viu? Não tem como saber, né?"
33030-82 = "……."
33030-83 = "……Hoje, eu vou embora."
33030-84 = "Sim, tome cuidado, Nagi-chan. Não posso te acompanhar até a saída, infelizmente."
33030-87 = "……."
33030-91 = "……Por que você conta essas mentiras?"
33030-92 = "Hmm, hoje tem muitos visitantes, né? A próxima é a Hanako-chan."
33030-93 = "……Bem, no meu caso, é mais por uma questão de dever."
33030-94 = "Entendi. Bem, se você não veio com a Nagi-chan, foi a Sisterhood que te mandou? Por acaso você entrou para o grupo delas?"
33030-95 = "……Bem, para mim tanto faz. Mas, sobre isso, o que você quer dizer com 'mentira'? Quando e que mentira eu contei?"
33030-96 = "……."
33030-97 = "Eu estava deduzindo os movimentos da Mika até agora, combinando informações da Sisterhood. Com isso, busco entender os objetivos e propósitos…… é como uma espécie de autópsia, talvez."
33030-98 = "Ou seja, por que Misono Mika causou esse incidente……?"
33030-99 = "Uau, você vai falar isso na frente da pessoa envolvida? Que gosto peculiar você tem, hein?"
33030-100 = "……Mika odiava Gehenna e, como resultado, tentou destruir o Tratado do Éden. Isso é um fato."
33030-101 = "……."
33030-102 = "Não sei por quem você foi instigada, ou se existe alguém por trás disso, nem como chegou a essa decisão…… mas, no final, você se aliou a Arius para se tornar a anfitriã."
33030-103 = "O plano inicial era simples, talvez apenas sequestrar e prender a Seia-chan, não era? Para se tornar a anfitriã, isso seria o suficiente."
33030-104 = "No entanto, o pensamento do 'Esquadrão Arius', que executou o plano, era diferente. Elas pretendiam destruir o halo da Seia-chan desde o início……"
33030-105 = "A sequência de eventos depois disso pode ser vista de várias formas, mas……"
33030-106 = "De qualquer forma, a Mika recebeu o relatório de que 'a Seia-chan morreu'."
33030-107 = "A partir desse momento, o coração da Mika começou a se quebrar, não foi?"
33030-108 = "Provavelmente, você entrou em pânico. Algo irreparável aconteceu, a Seia-chan morreu, e você, na prática, se tornou uma 'assassina'……"
33030-109 = "Já que chegou a esse ponto, não restava outra opção a não ser seguir até o fim. Não importa o que fosse sacrificado, você tinha que chegar onde planejou originalmente……"
33030-110 = "Com um impulso destrutivo que pode ser chamado de autodestrutivo..."
33030-111 = "Ei, ei, espere um pouco."
33030-112 = "Poderia parar de tentar deduzir o que se passa na cabeça dos outros por conta própria?"
33030-113 = "Fui eu quem deu a ordem para matar a Seia-chan, e fui eu quem tentou fazer algo contra a Nagi-chan, minha amiga de infância, não fui? Hanako-chan, que deveria ser tão inteligente, o que é que você está dizendo sobre impulsos e autodestruição?"
33030-114 = "……Não. Eu me lembro das palavras que você disse."
33030-117 = "Mas eu não disse para destruir o halo. Eu não sou uma assassina."
33030-118 = "O que aconteceu com a Seia-chan foi o gatilho para que a situação chegasse a esse ponto, não foi?"
33030-119 = "A partir dali, várias coisas saíram do controle... diga, o que você acha disso?"
33030-122 = "Existem outros pontos que não fazem sentido."
33030-123 = "Naquela época, eu achava que 'existia um traidor real na Trinity', mas não imaginava que ele se revelaria daquela forma."
33030-124 = "Porque isso significaria jogar fora a sua maior vantagem."
33030-125 = "Estrategicamente falando, não faz sentido agir daquela maneira."
33030-126 = "Sim, eu também me arrependo disso. Ah, se eu fosse um pouco mais esperta..."
33030-127 = "Mika-san, você estava 'com medo de que a Arius matasse a Nagisa-san'... não é isso?"
33030-128 = "……."
33030-129 = "Você pensou que, assim como aconteceu com a Seia-chan, a Arius poderia destruir o halo da Nagisa-san, não foi?"
33030-132 = "……É por isso que, pode devolver a Nagi-chan para mim? Não se preocupe, não vou machucá-la. Bem, talvez o resto da vida escolar dela seja dentro de uma cela, mas..."
33030-135 = "……."
33030-136 = "Mika-san, você é forte. Provavelmente, em um combate puro, você conseguiria enfrentar de igual para igual a Tsurugi-san do Comitê de Implementação da Justiça. Claro, você também tem outros tipos de força, mas..."
33030-137 = "Naquela época, eu fingi estar calma, mas no fundo eu sabia que a situação era bastante perigosa."
33030-138 = "Mesmo com o apoio da Sisterhood, não seria fácil te subjugar. No pior dos casos, eu cheguei a prever que todas as integrantes da Sisterhood poderiam ser derrotadas."
33030-139 = "……Mas você se rendeu. No momento em que ouviu que 'a Seia-chan está viva'."
33030-140 = "……Já chega."
33030-141 = "E então, o que você quer dizer com isso?"
33030-142 = "Está tentando dizer que eu sou uma coitada? Que, na verdade, eu não queria ter feito aquilo? Ou que eu sou uma idiota que fez a escolha errada?"
33030-143 = "Ahahahahahaha!"
33030-144 = "Ah, você é uma garota realmente interessante..."
33030-148 = "Está completamente enganada, eu sou apenas uma traidora. Uma assassina cruel e de coração sombrio que vendeu amigos e aliados."
33030-149 = "Não pretendo fechar os olhos para esse fato. Não há como evitar que todos me odeiem sendo assim."
33030-150 = "……Se, hipoteticamente, houvesse outro motivo. Como você saberia disso?"
33030-151 = "Porque eu estou dizendo que é a verdade. Por que você insiste em tentar descobrir algo, a ponto de negar isso?"
33030-152 = "Por que você se apega tanto a algo que não pode ser provado?"
33030-153 = "Eu apenas..."
33030-154 = "……Ei, como a Seia-chan está agora? Vocês eram próximas, não eram, Hanako-chan?"
33030-155 = "A Seia-chan está realmente bem? Não quero nem pensar, mas não existe a possibilidade de 'ela ter morrido e vocês terem mentido'? Mas se for assim, por que ela não aparece?"
33030-156 = "Ou será que você ainda está me atormentando com mentiras? A Hanako-chan também é bem astuta, então talvez eu devesse suspeitar disso também?"
33030-157 = "……."
33030-158 = "……Por hoje é só, Mika-san."
33030-159 = "Não contarei a ninguém sobre as suposições que mencionei. Nem mesmo para a Nagisa-san."
33030-160 = "Sim, faça o que quiser."
33030-161 = "E nem para o Sensei [USERNAME]."
33030-162 = "……."
33030-163 = "Afinal, são apenas 'suposições'."
33030-164 = "……."
33030-165 = "……Então, com licença."
33030-169 = "……."
33030-170 = "…………."
33030-176 = "……Eu também não sou santa, mas a Hanako-chan é bem cruel, hein."
33030-178 = "[ns] \"…………。\""
33030-179 = "Bem, apesar de dizer isso, acabei contando tudo para o Sensei desta forma..."
33030-180 = "Eu pensei em ser um pouco maldosa com a Mika-san, mas... no fim, sinto que acabou se tornando uma perseguição de verdade."
33030-181 = "...Parece que o sangue subiu à minha cabeça. Preciso pedir desculpas depois..."
33030-182 = "Mas, por enquanto, parece que o desfecho só poderia ter tomado este rumo."
33030-183 = "A Mika-san, que odiava a Gehenna, tentou atacar o Chá das Cinco para se tornar a anfitriã."
33030-184 = "Quem ordenou o ataque foi a Seia Mika-san. Quem executou foi o Esquadrão Arius. E, no final, quem explodiu a sala onde a Seia-chan estava foi a Shirasu Azusa-chan."
33030-185 = "Cada uma com seus próprios motivos e objetivos..."
33030-186 = "O resultado dessas ações gerou uma reação em cadeia, misturando mal-entendidos e desconfiança, até chegarmos onde estamos agora..."
33030-187 = "...Será que esta é a conclusão?"
33030-188 = "[ns] \"O que você acha...?\""
33030-190 = "[ns] \"Por exemplo, talvez a Mika, no início, só quisesse ser maldosa com a Seia... algo assim.\""
33030-191 = "...Sensei? Por que de repente...?"
33030-192 = "Mesmo que seja uma hipótese, parece uma suposição bastante extrema... bem, pensando nisso..."
33030-193 = "Considerando a personalidade da Mika-san..."
33030-194 = "Deixando de lado o que aconteceu de fato, a Mika-san é do tipo que age sem calcular muito, tanto que dizem que ela 'não serve para a política'."
33030-195 = "Será que ela sentiu irritação com a Seia-chan, que vivia dizendo coisas complicadas todos os dias...?"
33030-196 = "Bem, a Seia-chan certamente não é alguém que se possa dizer que tem uma 'boa personalidade'..."
33030-197 = "E a Mika-san tentou ser maldosa com ela, usando o Arius..."
33030-198 = "Isso é, como posso dizer, um absurdo, ou talvez uma interpretação arbitrária demais..."
33030-199 = "[s] \"É, talvez você tenha razão.\""
33030-200 = "...Sensei? Você se convenceu facilmente...?"
33030-201 = "[s] \"Ou talvez o objetivo da Mika fosse realmente fazer as pazes com o Arius.\""
33030-202 = "..."
33030-203 = "O verdadeiro objetivo era fazer as pazes, e essa intenção foi usada contra ela...? E, com isso, o ódio contra a Gehenna foi instigado..."
33030-204 = "...Não, o que o Sensei quer dizer é..."
33030-205 = "Que nós não podemos compreender os verdadeiros sentimentos da Mika-san... é isso?"
33030-206 = "[s] \"'É possível provar a verdade daqueles que alcançaram o paraíso?'...\""
33030-207 = "O quinto..."
33030-208 = "Aqueles que alcançaram o paraíso não podem ser observados de fora dele. Não se pode observar sua existência... o paradoxo sobre a prova da existência do paraíso..."
33030-209 = "[s] \"...Como provar algo que não pode ser provado?\""
33030-210 = "..."
33030-211 = "Se chegássemos ao 'verdadeiro sentimento de outra pessoa'... então ela não seria mais uma estranha. Se não podemos chegar lá, então, de fato, não entendemos o que ela sente..."
33030-212 = "O paraíso e o coração de alguém são a mesma coisa... é isso que você quer dizer?"
33030-213 = "...De fato, pode ser isso. Nós não temos como tocar diretamente no coração de alguém, nem meios de provar essa verdade."
33030-214 = "Como podemos provar que a frase 'compreendi os verdadeiros sentimentos de alguém' é 'verdadeira'..."
33030-215 = "É uma contradição... será impossível? Não existe um jeito de compreender o coração de outra pessoa...?"
33030-216 = "[s] \"...Provavelmente não existe.\""
33030-217 = "..."
33030-218 = "[ns] \"Isso deve ser, com certeza, uma prova impossível...\""
33030-220 = "[ns] \"...Se for assim, talvez só nos reste acreditar.\""
33030-222 = "[ns] \"Acreditar que o paraíso existe lá.\""
33030-223 = "..."
33030-224 = "É verdade."
33030-225 = "Pensando bem, o Sensei sempre foi assim desde o início. Desde o começo desta história cheia de dúvidas e suspeitas..."
33030-253 = "Claro, incluindo a Mika-san e a Nagisa-san, o Sensei não duvida dos alunos... é isso?"
33030-254 = "...Mesmo que, como resultado, você seja traído por alguém?"
33030-255 = "[s] \"Nesse caso, com certeza deve haver algum motivo por trás.\""
33030-256 = "Por que... Sensei, por que você é assim...?"
33030-257 = "[s1] \"Se o Sensei não acreditar nos alunos, nada começa...\"\n[s2] \"Como adulto, quero acreditar em todos.\""
33030-264 = "[ns3] \"Espero que chegue o dia em que a Nagisa e a Mika\"\n[ns4] \"possam abrir seus corações uma para a outra novamente.\""
33030-269 = "[ns] \"Algum dia, com certeza. Por isso, eu também...\""
33030-272 = "[ns5] \"……Assim que o Tratado de Eden terminar,\"\n[ns6] \"irei encontrar vocês novamente logo em seguida.\"\n[ns7] \"Tanto a Mika quanto a Nagisa.\""
33030-273 = "É verdade... Quando tudo estiver resolvido, todos nós poderemos nos reunir novamente..."
33030-274 = "É verdade... Quando tudo estiver resolvido, todos nós poderemos nos reunir novamente..."
33030-275 = "É verdade... Quando tudo estiver resolvido, todos nós poderemos nos reunir novamente..."
33030-276 = "Mesmo sem saber o que vai acontecer... A única coisa que podemos fazer é estender nossas mãos um ao outro e nos esforçar. É isso, não é?"
33030-277 = "[s] \"Com certeza, porque essa é a única coisa que podemos fazer...\""
33030-278 = "……Sim, é verdade."
33030-282 = "Próximo episódio; E então"
