[translation]
2001803-1 = "Missing in Action"
2001803-2 = "（Certo dia, ao chegar para trabalhar, o computador estava quebrado...）"
2001803-4 = "A placa-mãe está completamente danificada... Não há outra opção a não ser trocá-la."
2001803-5 = "Provavelmente houve um curto-circuito por causa do raio de ontem à noite."
2001803-6 = "[s] \"...Não tem como recuperar pelo menos os dados?\""
2001803-7 = "Se fosse uma falha de software por vírus, talvez, mas é como se o computador tivesse queimado por inteiro..."
2001803-8 = "É muito difícil recuperar dados a partir daqui."
2001803-9 = "...Você não fez backup?"
2001803-10 = "[s] \"Ontem, logo depois de salvar no computador, eu fui embora...\""
2001803-11 = "Hum, isso é uma pena, mas..."
2001803-12 = "Os dados que sumiram, só resta criá-los do zero."
2001803-14 = "Entendi, então foi isso que aconteceu..."
2001803-15 = "Você pediu ajuda para alguém de outra escola?"
2001803-16 = "[s] \"Eu perguntei, mas parece que a recuperação é difícil mesmo.\""
2001803-17 = "Hum, então como o técnico disse, não tem jeito, vai ter que refazer."
2001803-18 = "E então, que dados eram esses que sumiram? O relatório de operações deste mês?"
2001803-22 = "...Deixa eu ver. #nUm relatório que analisa minuciosamente vários dados, desde a localização de combate e escala de danos, baseados em dados de GPS vinculados ao mapa... entendi."
2001803-23 = "Nossa... isso parece que vai levar um bom tempo..."
2001803-24 = "[s] \"...Levei 3 dias para fazer tudo.\""
2001803-25 = "Se tudo o que você levou 3 dias para fazer desapareceu, é normal perder a motivação."
2001803-26 = "Hum..."
2001803-27 = "Quer que eu te ajude com isso?"
2001803-28 = "[s] \"...A Moe!?\""
2001803-29 = "É tão surpreendente assim? Que falta de educação."
2001803-30 = "Dei uma olhada rápida e parece que a maioria dos dados é simples de organizar. #nNão seria melhor pedir uma mãozinha para esse tipo de trabalho?"
2001803-31 = "Hoje à tarde eu estou livre, inclusive."
2001803-32 = "Acho que vou aproveitar para fazer o Sensei me dever um favor. Hehehe..."
2001803-33 = "[s1] \"Isso é verdade, mas...\"\n[s2] \"Não tem medo de não terminar em um dia?\""
2001803-34 = "Não se preocupe. Nas minhas mãos, não leva nem um dia, nem meio dia."
2001803-35 = "Não se preocupe. Nas minhas mãos, não leva nem um dia, nem meio dia."
2001803-36 = "Operadores da SRT não devem ser de primeira apenas em combate, mas também na organização de documentos."
2001803-37 = "Por isso... acho que vou mostrar do que sou capaz depois de tanto tempo. Hehehe."
2001803-39 = "（E então, Moe começou a processar os dados com uma velocidade assustadora...）"
2001803-41 = "...Terminei todos os registros de comunicação até o dia 15."
2001803-42 = "Se os documentos que o Sensei está conferindo ainda não terminaram, me passa eles."
2001803-43 = "[s] \"Você já terminou aquela quantidade toda!?\""
2001803-44 = "Não é um conteúdo tão difícil. #nExiste uma regra constante entre a linha, a origem e o objetivo."
2001803-45 = "Se eu criar um programa e verificar apenas o que sai como exceção, termina rapidinho."
2001803-46 = "...Pronto, Sensei. Por favor, confira apenas onde marquei. #nComo é um documento que veio do Conselho Estudantil Federal, eu não tenho permissão de visualização."
2001803-48 = "Sensei, aquela lista de suprimentos que você me passou. O detalhamento de consumo de munição HP está com 10 unidades a menos..."
2001803-49 = "Será que você não contou errado?"
2001803-50 = "[s3] \"Ah, onde será que eu errei?\"\n[s4] \"Será que devo conferir tudo de novo desde o início...\""
2001803-51 = "Espere um pouco. Vou dar uma olhada no relatório escrito à mão com um programa de OCR."
2001803-52 = "Espere um pouco. Vou dar uma olhada no relatório escrito à mão com um programa de OCR."
2001803-56 = "...Achei. Parece que você digitou 50 unidades onde estava registrado 60."
2001803-57 = "Por precaução, vou conferir as outras listas também. #nNão acho que vá demorar muito."
2001803-59 = "...Sensei. Você está enviando esse pedido de cooperação de treinamento para cada pessoa individualmente?"
2001803-60 = "É só copiar e colar o mesmo texto, não é um pouco ineficiente?"
2001803-61 = "Espere um pouco, eu tinha feito um programa para envio de documentos oficiais..."
2001803-62 = "Ah, achei."
2001803-63 = "Sensei. Me passa esses dados de endereço. Se eu enviar por macro, não leva nem um minuto."
2001803-65 = "（……Depois disso, com a ajuda da Moe, o trabalho de recuperação dos dados foi concluído em meio dia）"
2001803-67 = "……Pronto, terminamos tudo. Foi mais rápido do que eu pensava."
2001803-68 = "[s] \"Muito obrigado, Moe!\""
2001803-69 = "Não foi nada. Para uma operadora da SRT, isso é o básico."
2001803-70 = "Me lembrou de quando eu frequentava o cursinho…… foi até divertido depois de tanto tempo."
2001803-71 = "[s] \"Os agentes da SRT são bons em coisas além de combate, hein.\""
2001803-72 = "Com certeza. O gerenciamento de suprimentos e o trabalho administrativo em tempos de paz são tão importantes quanto o combate."
2001803-73 = "Se você não acumular suprimentos e gerenciá-los rigorosamente todos os dias, não conseguirá lidar com as emergências quando elas surgirem."
2001803-74 = "Por isso, as operadoras da SRT precisam dominar não apenas a guerra eletrônica, mas também habilidades como cálculo de circuitos elétricos necessários para o trabalho administrativo."
2001803-75 = "Bem, comparado aos excêntricos do Millennium, eu ainda tenho um longo caminho a percorrer, mas……"
2001803-76 = "Vou colocar a macro que criei na nuvem compartilhada, pode usar se precisar."
2001803-77 = "E para garantir que não haja problemas caso os dados sumam, faça um backup――"
2001803-78 = "Hm……? Aliás, o que é esse botão?"
2001803-79 = "[s] \"É um botão de reset de emergência.\""
2001803-80 = "Botão de reset de emergência? Por que existe algo assim?"
2001803-81 = "……Ah, entendi. Como o computador do Schale armazena informações dos alunos, é necessário um botão para resetar os dados rapidamente em caso de emergência, né."
2001803-82 = "……Se apertar isso, \"todos os dados, incluindo o trabalho de hoje\", vão para o espaço, né……."
2001803-83 = "Fufu…… ufufufu…… kuhihi."
2001803-84 = "[s5] \"……Ei, Moe?\"\n[s6] \"Não me diga que…… você não está pensando em apertar, né?\""
2001803-85 = "Um botão que pode apagar o esforço de um dia inteiro em um instante……."
2001803-86 = "Um botão que pode apagar o esforço de um dia inteiro em um instante……."
2001803-87 = "É o próprio botão da destruição…… deve ser muito satisfatório apertar isso……."
2001803-88 = "Ha, ha, ha……! Sensei, o que eu faço? Depois que eu percebi…… não consigo parar!"
2001803-89 = "[s] \"Espere um pouco!\""
2001803-90 = "Não, não consigo mais esperar! Cheguei no meu limite!"
2001803-95 = "Iniciando reset de emergência do PC compartilhado do Schale……"
2001803-96 = "3……2……1……"
2001803-97 = "Bom trabalho! Reset de dados concluído."
2001803-98 = "Desculpa, Sensei……."
2001803-99 = "Mas essa sensação destrutiva…… esse catarse…… é irresistível!"
2001803-104 = "（……Depois disso, amarrei as mãos e os pés da Moe e refiz o trabalho de dados sozinho……）"
2001803-105 = "Ha, ha…… o Sensei está trabalhando sozinho enquanto mantém minhas mãos e pés amarrados……."
2001803-106 = "É extremamente humilhante…… uma humilhação insuportável para uma agente da SRT……."
2001803-107 = "Mas, por outro lado, isso é excitante…… talvez não seja tão ruim…… ha, ha……."
2001803-109 = "（Depois disso, Moe continuou sendo deixada de lado até que o trabalho de recuperação terminasse……）"
2001803-110 = "（Graças à macro que ela deixou, foi possível recuperar os dados em meio dia）"
