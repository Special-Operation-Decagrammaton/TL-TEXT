[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
2001803-1 = "Desaparecido em Combate" 
2001803-2 = "（Certo dia, ao chegar no trabalho, descobri que o computador tinha quebrado……）" 
2001803-4 = "A placa-mãe foi totalmente pro saco…… A única solução é colocar uma nova." 
2001803-5 = "Provavelmente deu curto-circuito com os raios da noite passada." 
2001803-6 = "[s] \"……Não tem como recuperar pelo menos os dados?\"" 
2001803-7 = "Se fosse uma falha de software por um vírus ou algo do tipo, até daria, mas isso aqui é quase como se o computador inteiro tivesse pegado fogo……" 
2001803-8 = "Recuperar dados disso aqui vai ser bem difícil." 
2001803-9 = "……Você não tem nenhum backup?" 
2001803-10 = "[s] \"Ontem, eu salvei tudo no PC e fui embora logo em seguida……\"" 
2001803-11 = "Hmm, isso é uma pena, mas……" 
2001803-12 = "Não há o que fazer a não ser refazer os dados perdidos do zero." 
2001803-14 = "Ah, então foi isso que aconteceu……" 
2001803-15 = "Você tentou pedir ajuda pras alunas de outras escolas?" 
2001803-16 = "[s] \"Eu até perguntei, mas parece que recuperar os dados é realmente quase impossível.\"" 
2001803-17 = "Hmm, então não tem jeito. Como a técnica disse, você vai ter que refazer tudo." 
2001803-18 = "E quais foram os dados perdidos? Os relatórios de operação deste mês?" 
2001803-22 = "……Deixa eu ver.\nUm relatório detalhando posições de combate, escala de danos e vários outros dados baseados no GPS vinculado ao mapa…… uau." 
2001803-23 = "Caramba…… Isso aqui parece que vai levar uma eternidade……" 
2001803-24 = "[s] \"……Isso levou três dias inteiros para ser feito.\"" 
2001803-25 = "Perder um trampo de três dias inteiros de uma vez faria qualquer um perder a vontade de viver mesmo." 
2001803-26 = "Hmm……" 
2001803-27 = "Quer que eu te dê uma mãozinha com isso?" 
2001803-28 = "[s] \"……A Moe!?\"" 
2001803-29 = "Por que a surpresa? Que falta de educação." 
2001803-30 = "Dei uma olhada por cima e parece que a maioria dos dados é só de categorização simples.\nNão é melhor ter uma ajudinha com esse tipo de trabalho?" 
2001803-31 = "E eu tava livre hoje à tarde mesmo." 
2001803-32 = "Quem sabe assim eu não deixo o Sensei me devendo um favor. Kuhihi……" 
2001803-33 = "[s1] \"Isso seria de grande ajuda, mas……\"\n[s2] \"Acho que a gente não vai terminar em um dia, sabia?\"" 
2001803-34 = "Relaxa. Se estiver nas minhas mãos, a gente termina em menos de meio dia." 
2001803-35 = "Relaxa. Se estiver nas minhas mãos, a gente termina em menos de meio dia." 
2001803-36 = "Os operadores da SRT não precisam ser bons apenas em combate, temos que ser de primeira linha na organização de documentos também." 
2001803-37 = "Então…… será que eu devo mostrar um pouquinho das minhas habilidades reais depois de tanto tempo? Kuhihi." 
2001803-39 = "（E então a Moe começou a processar os dados numa velocidade absurda……）" 
2001803-41 = "……Terminei de organizar todos os registros de comunicação até o dia 15." 
2001803-42 = "Sensei, passa pra cá os documentos que você tá checando se ainda não tiver terminado." 
2001803-43 = "[s] \"Você já terminou aquela montanha de arquivos!?\"" 
2001803-44 = "Não é nada demais.\nExistem regras padrão entre a linha de transmissão, a fonte e o destino." 
2001803-45 = "Eu só fiz um programinha, e depois de lidar com as exceções que ele me apontou, terminei num piscar de olhos." 
2001803-46 = "……Aqui, Sensei. Dá uma olhada nesses que eu marquei.\nSão documentos do Conselho Estudantil Geral, então eu não tenho autorização de acesso." 
2001803-48 = "Sensei, aquela lista de suprimentos que eu te dei antes. A contagem de munição HP gasta tá com 10 balas a menos……" 
2001803-49 = "Será que você não contou errado?" 
2001803-50 = "[s3] \"Eh, onde foi que eu errei.\"\n[s4] \"Vou começar a verificar tudo do zero de novo……\"" 
2001803-51 = "Peraí. Eu vou jogar os relatórios manuscritos num programa de OCR (Reconhecimento Óptico de Caracteres) rapidinho." 
2001803-52 = "Peraí. Eu vou jogar os relatórios manuscritos num programa de OCR (Reconhecimento Óptico de Caracteres) rapidinho." 
2001803-56 = "……Achei. Você digitou 50 balas num lugar onde deveriam ser 60." 
2001803-57 = "Só pra garantir, vou checar as outras listas também.\nNão deve demorar muito." 
2001803-59 = "……Sensei. Você tá mandando esses pedidos de apoio ao treinamento um por um?" 
2001803-60 = "Você só tá copiando e colando a mesma mensagem, não acha isso ineficiente demais?" 
2001803-61 = "Espera aí, se eu me lembro bem, tem um programa que eu criei para enviar documentos oficiais que deve estar em algum lugar……" 
2001803-62 = "Ah, achei." 
2001803-63 = "Sensei. Manda a lista de endereços pra mim.\nSe eu mandar tudo por macro, não vai demorar nem 1 minuto." 
2001803-65 = "（……Depois disso, graças à ajuda da Moe, terminamos toda a restauração de dados em apenas meio dia.）" 
2001803-67 = "……Acho que agora já foi tudo. Terminamos mais rápido do que eu pensava." 
2001803-68 = "[s] \"Muitíssimo obrigado mesmo, Moe!\"" 
2001803-69 = "Que nada, de boa.\nIsso é moleza para um operador da SRT." 
2001803-70 = "Também me lembrou dos velhos tempos quando eu frequentava o cursinho…… Foi bem divertido." 
2001803-71 = "[s] \"As membras da SRT mandam muito bem fora de combate também.\"" 
2001803-72 = "Com certeza. A gestão de suprimentos e as tarefas administrativas em tempos de paz são tão cruciais quanto o próprio combate." 
2001803-73 = "Se não acumularmos os recursos com cuidado e não fizermos uma gestão rígida no dia a dia, não teremos como lidar com imprevistos quando eles rolarem." 
2001803-74 = "Por isso, os operadores da SRT precisam dominar tudo, desde a guerra eletrônica até os cálculos de circuitos elétricos necessários para o trabalho administrativo." 
2001803-75 = "Mas, lógico, não chego nem perto do nível daquelas esquisitonas da Millennium……" 
2001803-76 = "Vou deixar as macros que eu criei salvas na nuvem compartilhada, pode usar quando precisar." 
2001803-77 = "De agora em diante, faz os backups direitinho pra não chorar se o PC derreter de n――" 
2001803-78 = "Hmm……? Que botão é esse aqui?" 
2001803-79 = "[s] \"É o botão de Reset de Emergência.\"" 
2001803-80 = "Reset de Emergência? Pra que você tem um negócio desses?" 
2001803-81 = "……Ah, saquei. Como o PC da Schale guarda informações confidenciais das alunas, você precisa de um jeito de apagar tudo rápido no caso de uma emergência de verdade." 
2001803-82 = "……E se eu apertar isso, 'todos os dados, incluindo o que fizemos hoje', vão pro beleléu, né……" 
2001803-83 = "Fufu…… Ufufufu…… Kuhihi." 
2001803-84 = "[s5] \"……Ahm, Moe-san?\"\n[s6] \"V-Você não tá pensando em apertar, né?\"" 
2001803-85 = "Um botão capaz de transformar todo o esforço duro de um dia de trabalho em poeira num piscar de olhos……" 
2001803-86 = "Um botão capaz de transformar todo o esforço duro de um dia de trabalho em poeira num piscar de olhos……" 
2001803-87 = "Isso é um convite literal pro caos absoluto…… Deve ser tão satisfatório apertar isso……" 
2001803-88 = "Haa, haa, haa……!\nO-O que eu faço, Sensei? Agora que eu percebi o que é…… minhas mãos não param de tremer!" 
2001803-89 = "[s] \"Espera aí!\"" 
2001803-90 = "Não dá, eu não consigo me segurar! Eu tô no meu limite!" 
2001803-95 = "Iniciando Reset de Emergência do PC compartilhado da Schale……" 
2001803-96 = "3…… 2…… 1……" 
2001803-97 = "Bom trabalho! O reset de dados foi concluído com sucesso." 
2001803-98 = "Foi mal, Sensei……" 
2001803-99 = "Mas essa aura destrutiva……\nEssa catarse…… É simplesmente irresistível!" 
2001803-104 = "（……Depois disso, eu amarrei as mãos e os pés da Moe e refiz sozinho todo o processamento de dados do zero……）" 
2001803-105 = "Haa, haa…… O Sensei me deixou amarrada e tá trabalhando sozinho……" 
2001803-106 = "É super humilhante…… Uma humilhação insuportável para um membro da SRT……" 
2001803-107 = "Isso até que me excita um pouco…… não é nada mau…… haa, haa……" 
2001803-109 = "（E assim, a Moe foi deixada amarrada e largada num canto até que toda a restauração estivesse concluída……）" 
2001803-110 = "（Mas, graças às macros que ela deixou, consegui refazer o trabalho em apenas meio dia.）" 