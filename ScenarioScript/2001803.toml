[translation]
2001803-1 = "Missing in Action"
2001803-2 = "（ある日、出勤するとパソコンが故障していた……）"
2001803-4 = "基板が完全にダメになってしまってますね……新しく交換するしかありません。"
2001803-5 = "おそらく昨晩の雷でショートしたのでしょう。"
2001803-6 = "[s] \"……データだけでもなんとか復旧できませんか？\""
2001803-7 = "ウイルスなどでソフトが故障した場合ならまだしも、これはパソコンが丸ごと燃えちゃったみたいなものなので……。"
2001803-8 = "ここからデータを復旧するのはかなり難しいです。"
2001803-9 = "……バックアップは取っていませんか？"
2001803-10 = "[s] \"昨日はパソコンに保存した後、すぐに帰ってしまって……。\""
2001803-11 = "うーん、それは残念ですが……。"
2001803-12 = "消えてしまったデータは、一から作成するしかないですね。"
2001803-14 = "そっか、そんなことが……。"
2001803-15 = "他校の子にはお願いしてみた？"
2001803-16 = "[s] \"聞いてみたけど、やっぱり復旧は難しいみたい。\""
2001803-17 = "うーん、それじゃあその業者さんの言う通り、作り直すしかないね。"
2001803-18 = "それで、消えたデータは何だったの？今月の作戦報告書？"
2001803-22 = "……どれどれ。#n地図に連動したGPSデータから交戦位置、被害規模などの様々なデータを精査し、見やすくまとめた報告書……ね。"
2001803-23 = "うわぁ……これ、だいぶ時間かかりそうだね……。"
2001803-24 = "[s] \"……全部で3日かかったんだ。\""
2001803-25 = "3日かけて作業したものが全部飛んだら、やる気がなくなるのも当然。"
2001803-26 = "うーん……。"
2001803-27 = "これ、私が手伝ってあげようか？"
2001803-28 = "[s] \"……モエが！？\""
2001803-29 = "そんなに驚くこと？失礼ね。"
2001803-30 = "ちょっと見たけど、ほとんど振り分けが単純なデータみたいだし。#nこういう作業は人手を借りた方がいいんじゃない？"
2001803-31 = "今日は午後からちょうど暇だったし。"
2001803-32 = "先生に貸しを作っておこうかな。くひひ……。"
2001803-33 = "[s1] \"それはそうだけど……。\"\n[s2] \"一日で終わらないかもしれないよ？\""
2001803-34 = "心配しないで。私の手にかかれば、一日どころか半日もかからないよ。"
2001803-35 = "心配しないで。私の手にかかれば、一日どころか半日もかからないよ。"
2001803-36 = "SRTのオペレーターは戦闘だけじゃなく、書類整理も一流じゃないといけないんだ。"
2001803-37 = "だから……久しぶりに実力、見せちゃおうかな？くひひ。"
2001803-39 = "（そしてモエは恐ろしいスピードでデータを処理し始めた……）"
2001803-41 = "……15日までの通信記録は全部終わったよ。"
2001803-42 = "先生が確認中の書類、まだ終わっていないならこっちにちょうだい。"
2001803-43 = "[s] \"あの量をもう終わらせたの！？\""
2001803-44 = "そんな難しい内容じゃないよ。#n回線と発信元、目的のあいだには一定の規則があるからね。"
2001803-45 = "プログラムを組んで、例外処理が出たものだけ確認したらすぐに終わるよ。"
2001803-46 = "……はい、先生。このマーカーつけたとこだけ確認お願い。#n連邦生徒会から来た文書だから、私には閲覧権限がないの。"
2001803-48 = "先生、さっき渡した備品リスト。弾丸消費内訳のHP弾が10発少ないんだけど……。"
2001803-49 = "もしかして数え間違えたんじゃない？"
2001803-50 = "[s3] \"えっ、どこで間違えたんだろう。\"\n[s4] \"最初からもう一回確認しようかな……。\""
2001803-51 = "ちょっと待って。[ruby=光学文字認識]OCR[/ruby]プログラムで手書きの報告書を見てみるから。"
2001803-52 = "ちょっと待って。[ruby=光学文字認識]OCR[/ruby]プログラムで手書きの報告書を見てみるから。"
2001803-56 = "……あった。60発と記録した部分を、50発と間違えて入力したみたい。"
2001803-57 = "念のため、他のリストも確認してみるね。#nそんなに時間はかからないと思う。"
2001803-59 = "……先生。その訓練協力要請文、ひとりひとりに送ってるの？"
2001803-60 = "同じ文章をコピペするだけなのに、ちょっと非効率的過ぎない？"
2001803-61 = "ちょっと待ってね、たしか公文書送信用に作っておいたプログラムが……っと。"
2001803-62 = "あ、見つけた。"
2001803-63 = "先生。その住所データ、こっちにちょうだい。#nマクロで送信すれば1分もかからないから。"
2001803-65 = "（……その後、モエの手を借りてデータの復旧作業を半日で終えた）"
2001803-67 = "……これで全部片付いたかな。思ったよりすぐ終わったね。"
2001803-68 = "[s] \"本当にありがとう、モエ！\""
2001803-69 = "大したことないって。#nSRTのオペレーターならこれくらい普通だよ。"
2001803-70 = "昔、塾に通ってた時のことも思い出したし……久しぶりに面白かったかな。"
2001803-71 = "[s] \"SRTの隊員は戦闘以外のことも得意なんだね。\""
2001803-72 = "もちろん。平常時の物資管理と事務作業は、戦闘と同じくらい重要だからね。"
2001803-73 = "日頃からコツコツと物資を溜めて厳格に管理しないと、いざという時に対処できないんだから。"
2001803-74 = "だから、SRTのオペレーターは電子戦の遂行はもちろん、事務作業に必要な電気回路の計算スキル等もまんべんなく身につけておかないといけないの。"
2001803-75 = "まぁ、さすがにミレニアムの変人たちに比べたら、まだまだだけど……。"
2001803-76 = "私が作ったマクロは共用クラウドに入れておくから、必要になったら使っていいよ。"
2001803-77 = "あとは、データが飛んでも問題ないようにバックアップを――"
2001803-78 = "ん……？ところでこのボタン何？"
2001803-79 = "[s] \"緊急用リセットボタンだよ。\""
2001803-80 = "緊急用リセットボタン？なんでそんなものがあるの？"
2001803-81 = "……あ、そっか。シャーレのパソコンには生徒たちの情報が保存されているから、有事の際に備えてデータをすぐにリセットできるボタンも必要なのね。"
2001803-82 = "……これを押したら「今日の成果物を含めた全データ」が飛ぶんだよね……。"
2001803-83 = "ふふ……うふふふ……くひひ。"
2001803-84 = "[s5] \"……あの、モエさん？\"\n[s6] \"まさか……押そうとなんてしてないよね？\""
2001803-85 = "丸一日分の苦労を、一瞬で吹き飛ばせるボタンだなんて……。"
2001803-86 = "丸一日分の苦労を、一瞬で吹き飛ばせるボタンだなんて……。"
2001803-87 = "まさに破滅を呼ぶボタンそのもの……押したらすごく気持ちいいんだろうな……。"
2001803-88 = "はぁ、はぁ、はぁ……！#nど、どうしよう先生？気づいちゃったら……手が止まらないよ！"
2001803-89 = "[s] \"ちょっと待って！\""
2001803-90 = "ううん、もう待てない！限界！"
2001803-95 = "シャーレ共用PCの緊急リセットを開始します……"
2001803-96 = "3……2……1……"
2001803-97 = "お疲れ様でした！データリセット完了です。"
2001803-98 = "ごめん、先生……。"
2001803-99 = "でもこの破滅的な感じが……#nこのカタルシスが……堪らないの！"
2001803-104 = "（……その後、モエの手足を縛って、データ作業は自分でやり直した……）"
2001803-105 = "はぁ、はぁ……先生が私の手足を縛ったまま一人で働いてる……。"
2001803-106 = "すっごく屈辱的……SRTの隊員としては耐え難い屈辱……。"
2001803-107 = "これはこれで興奮して……悪くないかも……はぁ、はぁ……。"
2001803-109 = "（その後も、モエは復旧作業が終わるまで放置されつづけた……）"
2001803-110 = "（彼女が残したマクロのおかげで、半日でデータを復旧することができた）"
