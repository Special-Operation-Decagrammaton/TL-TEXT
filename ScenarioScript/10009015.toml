[translation]
10009015-2 = "（Depois disso, todos uniram forças e conseguiram capturar Wakamo novamente em segurança）"
10009015-3 = "Nossa, que alívio!"
10009015-4 = "Graças ao Sensei, conseguimos capturá-la de novo."
10009015-5 = "Agradecemos de coração pela sua cooperação! Sensei!"
10009015-6 = "[s] \"Bem, sim. ...Sim?\""
10009015-8 = "Ei. Aquelas pessoas que vieram na nossa direção agora há pouco, não estavam usando equipamentos da Valkyrie?"
10009015-9 = "Não são coisas de vocês? Por que o outro lado estava usando isso?"
10009015-10 = "B-bem, na verdade, nossas armas foram roubadas durante a fuga..."
10009015-11 = "As armas da Valkyrie são valiosas, não são...? É seguro deixar que sejam roubadas tão facilmente?"
10009015-12 = "E a segurança? Como estão o bloqueio automático e a autenticação de usuário?"
10009015-13 = "Para começar, qual sistema de autenticação de empresa vocês usam?"
10009015-14 = "Se me disserem o nome do software, provavelmente consigo deduzir como contornar os procedimentos de autenticação e, a partir daí, inversamente..."
10009015-15 = "Bem, sobre o sistema de segurança, se não me engano,"
10009015-16 = "os equipamentos têm uma senha... né?"
10009015-17 = "...Senha? Uma senha comum?"
10009015-18 = "Sim, tem sim. Uma senha comum. Acho que era o aniversário da Chefe da Segurança."
10009015-19 = "Mas como ela sempre esquece, o bloco de notas com a senha fica sempre em um lugar visível na viatura..."
10009015-23 = "Que falta de consciência de segurança...!"
10009015-24 = "Ah, acho melhor eu mesma ir lá verificar o sistema..."
10009015-25 = "Calma, calma! Foi um susto no começo, mas no fim conseguimos capturar a \"Raposa da Calamidade\" de novo. Tudo está bem quando termina bem!"
10009015-26 = "Isso é o suficiente...?"
10009015-28 = "É verdade, Fubuki. Leve as coisas um pouco mais a sério..."
10009015-29 = "Tá bom, tá bom."
10009015-30 = "Mas, pensando bem, ela escapou e, de todos os lugares, foi parar justamente onde o Sensei estava."
10009015-31 = "Coincidência... será que foi mesmo coincidência? Será que a Raposa da Calamidade tem algum motivo para estar atrás do Sensei...?"
10009015-32 = "Hmm, bem, dizem que ela odiava o Conselho Estudantil Geral e causou aquele tumulto, talvez ela odeie o Schale pelo mesmo motivo?"
10009015-33 = "De qualquer forma, que bom que tudo se resolveu!"
10009015-34 = "[s] \"Hmm...\""
10009015-35 = "Bom, vamos levar a Wakamo sob custódia agora."
10009015-36 = "Desta vez vamos vigiá-la direito, sim!"
10009015-37 = "[s] \"Bem... sim, boa sorte.\""
10009015-43 = "...Sinto que minha cabeça começou a doer."
10009015-44 = "De qualquer forma, o importante é que não virou uma emergência."
10009015-45 = "Já que as coisas se resolveram, vou indo por aqui."
10009015-46 = "Ainda tenho várias seguranças para verificar."
10009015-47 = "Depois preciso ter uma conversa séria com o pessoal da Valkyrie..."
10009015-48 = "[s] \"Chihiro, boa sorte com tudo.\""
10009015-49 = "Sim, até mais."
10009015-53 = "Então, Sensei, vamos retomar a patrulha?"
10009015-54 = "[s] \"É verdade. Embora eu ainda esteja com uma sensação estranha...\""
10009015-56 = "（Decidi retomar a patrulha, mesmo com essa sensação de incerteza）"
