[translation]
10009015-2 = "（その後みんなで力を合わせて、再びワカモを無事に制圧できてしまった）"
10009015-3 = "いやー、助かった！"
10009015-4 = "先生のおかげでまたどうにか捕まえられたよー。"
10009015-5 = "ご協力、心より感謝します！先生！"
10009015-6 = "[s] \"えっと、うん。……うん？\""
10009015-8 = "ねぇ。さっき向かってきたやつら、ヴァルキューレの装備を持ってなかった？"
10009015-9 = "あなたたちの物でしょ？どうしてそれをあっち側が使ってるわけ？"
10009015-10 = "そ、それが実は、脱走時に武器を奪われてしまいまして……。"
10009015-11 = "ヴァルキューレの武器は貴重なのに……そんな簡単に奪われてて大丈夫？"
10009015-12 = "セキュリティは？オートロックとか、ユーザー認証はどうなってるの？"
10009015-13 = "そもそも、どこの企業の認証システムを使ってるの？"
10009015-14 = "ソフトの名前とか言ってくれれば、大体認証手続きの迂回方法とかは推測できそうだし、そこから逆に――"
10009015-15 = "えっと、セキュリティシステムでしたら確か、"
10009015-16 = "装備にパスワードがあります……よね？"
10009015-17 = "……パスワードって、普通の？"
10009015-18 = "うん、あるねぇ。普通のパスワード。確か警備局長の誕生日だった気がする。"
10009015-19 = "でもよく忘れるからって、パスワードを書いたメモ帳がいつも警備車両の目立つところに……"
10009015-23 = "何てセキュリティ意識の低さ……！"
10009015-24 = "はぁ、これはもう私が直接出向いてシステムを確認した方が……。"
10009015-25 = "まあまあ！最初はヒヤッとしたけど、結局「災厄の狐」はまた捕まえられたんだし。終わり良ければすべて良しってことで！"
10009015-26 = "それで良いわけ……？"
10009015-28 = "そうですよ、フブキ。少しは事を真剣に捉えて……"
10009015-29 = "良いから良いから。"
10009015-30 = "それにしても、脱出してどこへ向かったと思ったら、偶然先生のいるところに行ったなんてね。"
10009015-31 = "偶然……偶然なんでしょうか？もしかして災厄の狐さん、何か理由があって先生を狙っているとか……？"
10009015-32 = "んー、まあ元々連邦生徒会のことが嫌いで暴れたらしいし、シャーレも同じ感じで嫌いなんじゃない？"
10009015-33 = "何はともあれ、無事に落ち着いて良かった良かった！"
10009015-34 = "[s] \"うーん……。\""
10009015-35 = "じゃ、私たちはあらためてワカモを護送してくるから。"
10009015-36 = "今回こそちゃんと監視しておきます、はい！"
10009015-37 = "[s] \"えっと……うん、頑張ってね。\""
10009015-43 = "……何だか頭が痛くなってきた。"
10009015-44 = "とにかく、緊急事態にはならなくて何よりです。"
10009015-45 = "とりあえず片付いたことだし、じゃあ私はちょっとこの辺で。"
10009015-46 = "まだ色々と確認したいセキュリティがあるから。"
10009015-47 = "あとでヴァルキューレには、強めに言っておかないと……。"
10009015-48 = "[s] \"チヒロも、色々頑張ってね。\""
10009015-49 = "うん、じゃあまた。"
10009015-53 = "では先生、私たちもパトロールを再開しましょうか。"
10009015-54 = "[s] \"そうだね。何か色々とスッキリしないんだけど……。\""
10009015-56 = "（モヤモヤを抱えたまま、パトロールを再開することにした）"
