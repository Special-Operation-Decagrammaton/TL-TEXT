[translation]
1013606-1 = "cacau com você"
1013606-3 = "Obrigado pelo seu trabalho duro, sensei."
1013606-4 = "[s1] \"Obrigado pelo seu trabalho duro, Amy!\"\n[s2] \"Uh, onde você está agora?\""
1013606-7 = "EU?"
1013606-8 = "Estou lá em cima."
1013606-9 = "Ah, não é como reconhecimento nem nada..."
1013606-10 = "O que devo dizer?"
1013606-11 = "Hum..."
1013606-12 = "Sensei, você gostaria de vir também?"
1013606-13 = "É um pouco estranho aqui."
1013606-16 = "(Como Amy me disse, quando subi...)"
1013606-21 = "[wa:710]― [log=에이미 결전]Bem-vindo, [wa:957]Sensei. [/registro]"
1013606-23 = "― [log=에이미 결전][wa:1540]É um céu estranho. [/registro]"
1013606-26 = "[ns] \"É realmente...incrível.\""
1013606-27 = "[wa:730]― [log=에이미 결전]Parece [wa:2890] semelhante ao céu noturno que conhecemos... [/log]"
1013606-30 = "― [log=에이미 결전]Se você olhar de perto, [wa:2100] é completamente diferente. [/registro]"
1013606-32 = "― [log=에이미 결전]Assim como eu agora. [/registro]"
1013606-35 = "[wa:1070]― [log=에이미 결전]Até agora [wa:1370]Não assim[/log]"
1013606-37 = "― [log=에이미 결전]Eu não olhei para cima, mas... [/log]"
1013606-40 = "― [log=에이미 결전]Recentemente, gosto de [wa:1760]. [/registro]"
1013606-43 = "[wa:860]― [log=에이미 결전]Mas [wa:740]Eu me pergunto por quê. [/registro]"
1013606-45 = "― [log=에이미 결전]Toda vez que olho para cima, [wa:1940] o rosto do sensei vem à mente. [/registro]"
1013606-48 = "[ns] \"Por que...?\""
1013606-49 = "[wa:1720]― [log=에이미 결전]Hehe, [wa:1610]Eu me pergunto por quê. [/registro]"
1013606-51 = "― [log=에이미 결전]Sensei. [/registro]"
1013606-54 = "[wa:1000]― [log=에이미 결전]Fiquei [wa:1590] muito feliz em conhecer você, [wa:1820]. [/registro]"
1013606-56 = "― [log=에이미 결전]Sim, [wa:1130]Sério. [wa:2225]Sim, [wa:1288]Acho que sim. [/registro]"
1013606-60 = "Isso é... cacau? Você trouxe?"
1013606-61 = "Sinto-me feliz, mas... estou com calor."
1013606-62 = "[s] \"É chocolate gelado para Amy.\""
1013606-63 = "Uau, obrigado sensei!"
1013606-64 = "É disso que eu gosto..."
1013606-67 = "(senta-se ao lado de Amy)"
1013606-70 = "Talvez..."
1013606-71 = "Antes de te conhecer, eu era..."
1013606-72 = "Eu realmente pensei que poderia sobreviver sozinho."
1013606-73 = "Eu nunca disse isso em voz alta, mas..."
1013606-74 = "Talvez inconscientemente, isso também estivesse aparecendo."
1013606-75 = "No meu caso, muitas vezes era mais eficiente lidar com isso sozinho."
1013606-76 = "Quanto ao conhecimento, o auto-estudo foi suficiente."
1013606-77 = "[s] \"E agora?\""
1013606-78 = "Não sei."
1013606-79 = "Pelo menos, se você estiver sozinho..."
1013606-80 = "Ter chocolate gelado entregue para mim assim nunca aconteceu."
1013606-81 = "Dessa forma, eles não teriam que compartilhar o calor corporal."
1013606-87 = "(Sinto a temperatura corporal de Amy de onde nos tocamos)"
1013606-88 = "Está quente?"
1013606-89 = "[s] \"Sim, cacau.\""
1013606-90 = "Hum..."
1013606-91 = "[s3] \"Desculpe, desculpe.\"\n[s4] \"Graças a Amy, não estou com frio.\""
1013606-94 = "bom."
1013606-95 = "……."
1013606-96 = "É até legal, assim."
1013606-97 = "Realmente."
1013606-98 = "A partir de agora irei interagir com mais pessoas..."
1013606-99 = "Muita coisa vai mudar...É mesmo?"
1013606-100 = "……."
1013606-101 = "……."
1013606-102 = "…………."
1013606-103 = "O que você acha?"
1013606-104 = "[s] \"Vamos apenas acenar com a cabeça.\""
1013606-105 = "Quando há muitas pessoas envolvidas... torna-se problemático."
1013606-106 = "[s] \"Essa é a razão...\""
1013606-107 = "É importante, senhor."
1013606-108 = "Uma das razões pelas quais as pessoas buscam eficiência é para se livrar dos problemas."
1013606-109 = "[s] \"Eu não nego, mas...\""
1013606-110 = "Ter um sensei é suficiente por enquanto?"
1013606-111 = "[s] \"Eh!?\""
1013606-112 = "Não adianta fingir que não consegue ouvir, senhor."
1013606-113 = "Estou dizendo isso para que você possa ouvir."
1013606-118 = "(Depois, troquei palavras com Amy e passei momentos tranquilos até terminar de beber o chocolate.)"
