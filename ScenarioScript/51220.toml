[translation]
51220-1 = "Episódio 22; Cidade envolta em chamas"
51220-5 = "[ns] \"Haa... haa... o palco está...\""
51220-12 = "Sensei, cuidado...!"
51220-30 = "[ns] \"Sinto que o número deles está aumentando...!\""
51220-31 = "...Desse jeito, não conseguirei romper as Cem Histórias Fantasmagóricas..."
51220-32 = "(Como esperado, sozinha não tenho força suficiente... mesmo com o palco bem à minha frente...! Desse jeito, eu não vou conseguir... nada...!)"
51220-41 = "Por um triz. Sensei, você está bem?"
51220-42 = "Chegamos~"
51220-43 = "[s] \"Niya... Chise!? Por que vocês duas estão aqui...!\""
51220-44 = "A chefe Niya disse que queria ajudar o Sensei~"
51220-45 = "[s] \"A Niya?\""
51220-46 = "Sim. Para resolver essa série de incidentes... por assim dizer."
51220-47 = "Não conseguimos contato com o Comitê Organizador do Festival, então viemos à cidade para verificar pessoalmente."
51220-48 = "Também queríamos verificar o caso do sequestro de sinal que ocorreu há pouco..."
51220-49 = "Será que ela é realmente a pessoa que enviou a carta... uma integrante do Clube Kacho Fugetsu?"
51220-50 = "[s] \"Sim, parece que sim.\""
51220-51 = "...Hum."
51220-52 = "Foi um erro meu. Julguei mal a situação...#nTransformar Hyakkiyako em algo assim..."
51220-53 = "Fui imprudente. Dizem que o que está feito, está feito, mas ainda assim..."
51220-54 = "[s] \"Eu também tenho culpa. Vamos superar isso juntos a partir de agora.\""
51220-55 = "...É verdade, lamentar o passado não mudará a situação."
51220-56 = "Deixaremos a reunião de reflexão para depois, agora vamos olhar para frente — Nagusa-san."
51220-58 = "Ah... sim."
51220-59 = "Resumi a situação atual rapidamente."
51220-60 = "Quem tomou a praça do festival agora é Shuro Yabuki, do Clube Kacho Fugetsu. E Yukari, do Hyakka Ryoran, está sendo mantida como refém... estou correta?"
51220-61 = "...Sim."
51220-62 = "Para salvá-la, precisamos ir até lá."
51220-68 = "Está cheio de monstros por toda parte~"
51220-69 = "...Chefe, o que faremos?"
51220-70 = "Hmm... parece difícil fazer isso sozinha."
51220-71 = "Mesmo que aguentemos até os reforços do Yin-Yang Club chegarem, não sei o que acontecerá..."
51220-77 = "... ... ... ...!!!"
51220-81 = "[ns] \"Não, ainda há uma brecha!\""
51220-85 = "Hm...?"
51220-86 = "Sensei, o que você está...?"
51220-91 = "Técnica secreta! Shuriken Explosiva! Ei!"
51220-100 = "Fufun, Clube de Pesquisa de Ninjutsu...!"
51220-101 = "Aqui...!"
51220-102 = "Chegou! Nin-nin!"
51220-104 = "[ns] \"Izuna! Michiru! Tsukuyo...!\""
51220-105 = "Vocês são... o Clube de Pesquisa de Ninjutsu?"
51220-106 = "Olá a todos~"
51220-108 = "Uau! A chefe do Yin-Yang Club e a senhorita Chise...!?"
51220-109 = "E por falar nisso, aquela ali é a Nagusa!?"
51220-110 = "Por que vocês estão aqui...?"
51220-111 = "Hm? É que..."
51220-113 = "Recebemos um pedido de ajuda do Sensei...!"
51220-114 = "Sim! Se for para ajudar o nosso mestre, todo o Clube de Pesquisa de Ninjutsu!#nMesmo que seja no fogo ou na água! Estamos prontos para correr para onde for preciso! Nin-nin!"
51220-115 = "Sim...! Como a Izuna-chan disse!"
51220-117 = "Não, não, não!? Por mais que queiram ajudar, no fogo é um pouco demais, não acham!?"
51220-118 = "Está tudo bem, a Bucho consegue fazer isso...!"
51220-119 = "Afinal, você é a nossa Bucho...!"
51220-120 = "Uuu... se você diz assim, não tem como recusar...!"
51220-121 = "Claro, como Bucho do Clube de Pesquisa de Ninjutsu, eu estou pronta!#nVamos fazer isso!"
51220-122 = "Sim! É assim que se fala, Bucho...!"
51220-123 = "Hmmmm!! Então eu também vou dar o meu melhor!"
51220-124 = "Certo! Pode deixar tudo comigo e ficar tranquilo, Sensei!"
51220-125 = "[s] \"Pessoal... obrigada!\""
51220-127 = "Como esperado do pessoal do Clube de Pesquisa de Ninjutsu..."
51220-128 = "Vocês são sempre tão confiáveis."
51220-129 = "...Então, vamos nessa.#nNós abriremos o caminho."
51220-130 = "Pode deixar~#nVou mostrar os resultados do meu treino."
51220-132 = "Então vamos lá!"
51220-133 = "Clube de Pesquisa de Ninjutsu, atacar!"
51220-143 = "...Sim!"
