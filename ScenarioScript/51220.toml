[translation]
51220-1 = "第22話;炎に包まれた街"
51220-5 = "[ns] \"はあ……はあ……舞台は……\""
51220-12 = "先生、気をつけて……！"
51220-30 = "[ns] \"なんだか数が増えているような……！\""
51220-31 = "……このままじゃ幻魎百物語は、突破できない……"
51220-32 = "（やっぱり私だけでは力不足……舞台は目の前なのに……！これじゃあ私は、何も……！）"
51220-41 = "間一髪。先生、大丈夫ですかぁ～？"
51220-42 = "来たよ～"
51220-43 = "[s] \"ニヤ……チセ！？どうして2人がここに……！\""
51220-44 = "ニヤ部長が、先生を助けようって～"
51220-45 = "[s] \"ニヤが？\""
51220-46 = "ええ。一連の事態を収拾するため……と言いますか。"
51220-47 = "お祭り運営委員会と連絡がつかず、直接確認しようと街に出向いたのですよぉ。"
51220-48 = "先ほどあった電波ジャックの件も確認したかったので……"
51220-49 = "やはり、彼女が手紙を送った張本人……花鳥風月部の部員なのでしょうか？"
51220-50 = "[s] \"うん、そうみたい。\""
51220-51 = "……ふむ。"
51220-52 = "私のミスです。判断を誤ってしまいました……#n百鬼夜行をこんな風にしてしまうなんて……"
51220-53 = "私が軽率でした。覆水盆に返らずとは言いますが、それでも――"
51220-54 = "[s] \"私にも非があるよ。ここから一緒に乗り越えていこう。\""
51220-55 = "……そうですね、過去を悔やんだところで状況は変わりません。"
51220-56 = "反省会は後にして、今は前を向きましょうか――ナグサさん。"
51220-58 = "あ……うん。"
51220-59 = "現状をざっとまとめてみました。"
51220-60 = "今、お祭り広場を乗っ取った者は、花鳥風月部の[ruby=やぶき]箭吹[/ruby]シュロ。そして、人質に百花繚乱のユカリさんが捕らわれている……合っていますね？"
51220-61 = "……うん。"
51220-62 = "彼女を助けるには、あちらに向かわねばなりません。"
51220-68 = "あっちこっち、怪物でいっぱい～"
51220-69 = "……部長、どうする？"
51220-70 = "う～ん……私だけでは難しそうですねぇ。"
51220-71 = "陰陽部の援軍が来るまで耐えたとして、果たしてどうなるやら……"
51220-77 = "……　……　……　……！！！"
51220-81 = "[ns] \"いや、まだ突破口はある！\""
51220-85 = "ん……？"
51220-86 = "先生、一体なにを――"
51220-91 = "秘技！爆裂手裏剣！えいっ！"
51220-100 = "ふっふ～ん、忍術研究部……！"
51220-101 = "ここに……！"
51220-102 = "参上！です！ニンニン！"
51220-104 = "[ns] \"イズナ！ミチル！ツクヨ……！\""
51220-105 = "あなた達は……忍術研究部？"
51220-106 = "みんな、やっほ～"
51220-108 = "わっ！陰陽部の部長、とチセ様……！？"
51220-109 = "というかそこにいるのはナグサ！？"
51220-110 = "何故みなさんがこちらに……？"
51220-111 = "ん？それはねぇ――"
51220-113 = "先生から、ご相談を受けたのです……！"
51220-114 = "はい！主殿のお力になれるのなら、忍術研究部一同！#nたとえ火の中水の中！どこでも馳せ参じる準備はできております！ニンニン！"
51220-115 = "はい……！イズナちゃんの言う通りです！"
51220-117 = "いやいやいや！？いくらなんでも火の中はちょっと無理かなぁ！？"
51220-118 = "大丈夫です、部長ならできます……！"
51220-119 = "なんたって部長ですから……！"
51220-120 = "うう……そう言われたら仕方ないよね……！"
51220-121 = "もちろん忍術研究部の部長として、覚悟はできてるよ！#nやってやろうじゃない！"
51220-122 = "はい！それでこそ部長です……！"
51220-123 = "んんんっ！！それじゃあ私も頑張るよ！"
51220-124 = "よーし！大船に乗ったつもりでどーんと全部任せてよ、先生殿！"
51220-125 = "[s] \"みんな……ありがとう！\""
51220-127 = "さすがは忍術研究部のみなさん……"
51220-128 = "相変わらず頼もしいですねぇ。"
51220-129 = "……それでは参りましょうか。#n道は私たちが切り開きましょう。"
51220-130 = "任せて～#n練習の成果、見せてあげるね。"
51220-132 = "それじゃあ行くよ！"
51220-133 = "忍術研究部、とつげーき！"
51220-143 = "……うん！"
