[translation]
51220-1 = "Episódio 22; Cidade Envolta em Chamas"
51220-5 = "[ns] \"Haa... haa... o palco está...\""
51220-12 = "Sensei, cuidado...!"
51220-30 = "[ns] \"Parece que o número deles está aumentando...!\""
51220-31 = "......Se continuarmos assim, não conseguiremos romper a Genryou Hyakumonogatari..."
51220-32 = "(Como esperado, só eu não sou o suficiente... e o palco está bem ali na nossa frente...! Desse jeito, eu não vou conseguir... nada...!)"
51220-41 = "Por um triz. Sensei, você está bem~?"
51220-42 = "Chegamos~"
51220-43 = "[s] \"Niya... Chise!? Por que vocês duas estão aqui...!\""
51220-44 = "A Presidente Niya disse que ia ajudar o Sensei~"
51220-45 = "[s] \"A Niya?\""
51220-46 = "Sim. Para tentar remediar a situação atual... por assim dizer."
51220-47 = "Não conseguimos contato com o Comitê de Operações do Festival, então saímos às ruas para verificar diretamente."
51220-48 = "Também queríamos confirmar o caso do sequestro da rede de comunicação..."
51220-49 = "Será que ela é a pessoa por trás da carta... um membro do Clube das Flores, Pássaros, Vento e Lua?"
51220-50 = "[s] \"Sim, parece que é isso.\""
5120-51 = "......Hmm."
51220-52 = "Foi minha culpa. Tomei uma decisão errada... #n Não acredito que deixei a Hyakkiyako chegar a este ponto..."
51220-53 = "Fui imprudente. Dizem que 'a água derramada não volta ao copo', mas mesmo assim――"
51220-54 = "[s] \"Eu também tenho minha parcela de culpa. Vamos superar isso juntos, a partir de agora.\""
51220-55 = "......É verdade, lamentar o passado não vai mudar a situação."
51220-56 = "Vamos deixar a reflexão para depois e olhar para frente―― Nagusa-san."
51220-58 = "Ah... sim."
51220-59 = "Resumi a situação atual."
51220-60 = "Quem tomou o controle da praça do festival agora é Yabuki Shuro, do Clube das Flores, Pássaros, Vento e Lua. E a Yukari-san, da Hyakkaryouran, está sendo mantida como refém... está correto?"
51220-61 = "......Sim."
51220-62 = "Para salvá-la, precisamos ir até lá."
51220-68 = "Por toda parte, cheia de monstros~"
51220-69 = "......Presidente, o que faremos?"
51220-70 = "Hmm... parece difícil apenas comigo."
51220-71 = "Se resistirmos até que os reforços do Clube Yin-Yang cheguem, o que será que vai acontecer..."
51220-77 = "...... ...... ...... ......!!!"
51220-81 = "[ns] \"Não, ainda há uma chance!\""
51220-85 = "Hm...?"
51220-86 = "Sensei, o que você vai――"
51220-91 = "Técnica Secreta! Shuriken Explosiva! Toma essa!"
51220-100 = "Fufufu, Clube de Pesquisa de Ninjutsu...!"
51220-101 = "Chegamos...!"
51220-102 = "Apresente-se! Nin-nin!"
51220-104 = "[ns] \"Izuna! Michiru! Tsukuyo...!\""
51220-105 = "Vocês são... o Clube de Pesquisa de Ninjutsu?"
51220-106 = "Olá, pessoal~"
51220-108 = "Uau! A Presidente do Clube Yin-Yang, e a Senhorita Chise...!?"
51220-109 = "Falando nisso, por que vocês estão aqui...?"
51220-110 = "O que vocês estão fazendo aqui...?"
51220-111 = "Hm? Sobre isso――"
51220-113 = "Recebemos um pedido do Sensei...!"
51220-114 = "Sim! Se é para ajudar o Mestre, todos nós do Clube de Pesquisa de Ninjutsu! #n Seja no fogo ou na água! Estamos prontas para correr para onde for! Nin-nin!"
51220-115 = "Sim...! Como a Izuna-chan disse!"
51220-117 = "Não, não, não!? Mesmo assim, fogo é um pouco demais, não acha!?"
51220-118 = "Tudo bem, a Presidente consegue..."
51220-119 = "Afinal, ela é a nossa Presidente...!"
51220-120 = "Uuu... se vocês dizem, não tenho escolha...!"
51220-121 = "Claro, como presidente do Clube de Pesquisa de Ninjutsu, eu estou preparada! #n Vamos fazer isso!"
51220-122 = "Sim! Essa é a nossa presidente...!"
51220-123 = "Ummm!! Então eu vou dar o meu melhor também!"
51220-124 = "Isso aí! Fiquem tranquilas, deixem tudo com a gente, Sensei!"
51220-125 = "[s] \"Pessoal... obrigado!\""
51220-127 = "Como esperado do Clube de Pesquisa de Ninjutsu..."
51220-128 = "Vocês são sempre tão confiáveis."
51220-129 = "......Então vamos nessa. #n Nós abriremos o caminho."
51220-130 = "Deixa comigo~ #n Vou mostrar o resultado do nosso treinamento."
51220-132 = "Então vamos lá!"
51220-133 = "Clube de Pesquisa de Ninjutsu, avançaar!"
51220-143 = "......Sim!"
