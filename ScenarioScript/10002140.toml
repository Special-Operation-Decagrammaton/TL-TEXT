[translation]
10002140-1 = "後日談その1 ;夢は違えど寄り添って"
10002140-3 = "Ｑ．初めて作ってみた砂の城はどうだった？"
10002140-9 = "ききっ……あ、"
10002140-10 = "え……マイク……？"
10002140-11 = "えっと、先生……。"
10002140-12 = "これは、その、一体……？"
10002140-13 = "……？インタビュー……ですか？"
10002140-14 = "い、いえ……！先生のことですし、きっと何か深い理由があるのだと思いますが……！"
10002140-15 = "えっと……その……。"
10002140-16 = "砂の城、は……。"
10002140-17 = "……。"
10002140-18 = "た……楽しかった、です……それに、先に作ってくれた彼女なんて、すごい綺麗な城を……。"
10002140-19 = "真似ながら、自分なりに頑張って作ってみたのですが……私のは全然その、未熟と言いますか……。"
10002140-20 = "はい……。"
10002140-21 = "な、なので、もし機会があればですが、その……彼女と、えっと、い、いいいい……！"
10002140-22 = "[s] \"一緒に砂のお城を作ってみたい？\""
10002140-23 = "……！は、はい……もし良ければ、ですが……どうなんでしょう……？"
10002140-24 = "もしできるのであれば……や、やりたい、です。もう一度、今度は一緒に……！"
10002140-25 = "くへ、くへへ……一緒に、砂の城……くけけけけ……。"
10002140-26 = "くひゃひゃひゃひゃひゃっ！！！"
10002140-29 = "Ｑ．……って言ってたけど、どう？"
10002140-35 = "……え。"
10002140-36 = "……わ、私がですか？"
10002140-37 = "もう一度砂のお城を……？"
10002140-38 = "あ、あはは……。"
10002140-39 = "あは……えっと、そうですね、その……。"
10002140-40 = "一緒に、というのは、その、大変光栄なのですが……。"
10002140-41 = "そうですね、えっと……あ、あはははは……。"
10002140-43 = "……あは……あはは……。"
10002140-45 = "（インタビュー相手が情緒不安定になってしまったため、インタビューは中断することにした。）"
