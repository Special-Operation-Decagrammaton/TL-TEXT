[translation]
10002140-1 = "Epílogo 1: Sonhos diferentes, mas caminhando lado a lado"
10002140-3 = "P. Como foi construir seu primeiro castelo de areia?"
10002140-9 = "Qui... ah,"
10002140-10 = "Eh... um microfone...?"
10002140-11 = "Bem, Sensei..."
10002140-12 = "Isso é, hum, o que seria exatamente...?"
10002140-13 = "...? Uma entrevista... é isso?"
10002140-14 = "N-não...! Sendo o Sensei, tenho certeza de que deve haver algum motivo profundo por trás disso, mas...!"
10002140-15 = "Bem... hum..."
10002140-16 = "O castelo de areia, ele..."
10002140-17 = "..."
10002140-18 = "F-foi divertido... e a garota que fez um antes de mim, ela fez um castelo tão lindo..."
10002140-19 = "Tentei imitar e me esforcei ao máximo, mas... o meu ficou, bem, imaturo, por assim dizer..."
10002140-20 = "Sim..."
10002140-21 = "P-por isso, se houver uma oportunidade, eu gostaria de... com ela, bem, e-e-e-e...!"
10002140-22 = "[s] \"Quer tentar construir um castelo de areia juntos?\""
10002140-23 = "...! S-sim... se não for pedir muito... o que você acha...?"
10002140-24 = "Se for possível... e-eu quero. Mais uma vez, desta vez juntos...!"
10002140-25 = "Kuhe, kuhehe... juntos, um castelo de areia... kukekekeke..."
10002140-26 = "Kuhihahahahahahaha!!!"
10002140-29 = "P. ...Ela disse isso, o que você acha?"
10002140-35 = "...Eh."
10002140-36 = "...E-eu?"
10002140-37 = "Construir um castelo de areia mais uma vez...?"
10002140-38 = "Ah, ahaha..."
10002140-39 = "Aha... bem, é, hum..."
10002140-40 = "Fazer isso juntos, bem, é uma grande honra, mas..."
10002140-41 = "Pois é, hum... a-ahahahaha..."
10002140-43 = "...Aha... ahaha..."
10002140-45 = "(Como a entrevistada ficou emocionalmente instável, decidimos interromper a entrevista.)"
