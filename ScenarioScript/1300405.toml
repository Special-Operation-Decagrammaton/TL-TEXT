[translation]
1300405-1 = "恩返しの時間です"
1300405-2 = "ショッピングモール"
1300405-5 = "あ、先生！ここです～こちらへ～。"
1300405-7 = "お待ちしておりました☆"
1300405-8 = "はい？長い時間待たせちゃったか、ですか？いえいえ、30分ぐらいですし。"
1300405-9 = "いえそんな、先生は時間通りにいらっしゃいましたし、私が勝手に待っていただけですので☆"
1300405-10 = "さあ。それでは、出発～☆"
1300405-11 = "楽しいデート……いえ、ショッピングの時間ですね！"
1300405-13 = "あっ！先生！あそこも行ってみましょう！"
1300405-14 = "うーん、やっぱりディフューザーも買った方がいいですよね？教室に置いたらよさそうです。"
1300405-15 = "あら、オセロゲーム？やっぱりこういうのも一つあると……。"
1300405-16 = "[s1] \"ちょ、ちょっと待って。\"\n[s2] \"買い過ぎじゃない？\""
1300405-18 = "だって、アビドスからこのショッピングモールまで、こんなに遠いのですから！"
1300405-19 = "だって、アビドスからこのショッピングモールまで、こんなに遠いのですから！"
1300405-20 = "何度も頻繁には来られないので、これぐらいは買わないとダメです。"
1300405-21 = "それに……みんな自分のアルバイト代を、学校の借金を返すのに使っているので……。"
1300405-22 = "このままじゃ学校の教室じゃなくて、まるでアルバイトの休憩室みたいで可哀そうなんです……。"
1300405-23 = "さあ！ショッピングを続けましょう！"
1300405-24 = "私のカードの限度額オーバーまでは、まだまだですので！"
1300405-27 = "（その後、ものすごいショッピングをした）"
1300405-29 = "対策委員会・教室"
1300405-30 = "（アビドスまでの配達はやってないそうで、かなり重たい荷物を持ったまま帰ってきた）"
1300405-31 = "（ドサッ）"
1300405-32 = "せ、先生。"
1300405-33 = "だ、大丈夫ですか？……はい、お疲れ様でした！"
1300405-34 = "……すみません、ちょっと買い過ぎましたね。"
1300405-35 = "いつもはここまでは買わないのですが……。"
1300405-36 = "今日は少し……テンションが上がりすぎちゃったみたいです。"
1300405-39 = "（ドンッ）"
1300405-40 = "（……ダンベルを落としてしまった）"
1300405-41 = "……。"
1300405-42 = "シロコちゃんにプレゼントするダンベル、これもありましたね……。"
1300405-43 = "（スッ、スッ）"
1300405-44 = "それはセリカちゃんにあげる植木鉢で……。"
1300405-45 = "あっ。先生！気を付けてください！割れ物もありますから！"
1300405-46 = "あれ……これは……。"
1300405-47 = "あ、ここに入れてたんですね。はい、そうです。耳かきです。"
1300405-48 = "じゃーん☆実はこれ、先生のために買ったものなんです。"
1300405-49 = "[s] \"私のために？\""
1300405-50 = "はい！そうなんです！ちょっと待ってくださいね！"
1300405-52 = "（スッ、スッ）"
1300405-53 = "床にシートを敷いて……"
1300405-54 = "さあ、先生。"
1300405-55 = "ここ、私の膝の上で横になってください。"
1300405-56 = "[s] \"えっ……？\""
1300405-57 = "さあ、いい子ですから、早く～。"
1300405-58 = "[s] 横になる。"
1300405-62 = "― さあ、[wa:1300]耳掃除の時間ですよ。"
1300405-64 = "― 大人しくしてくださいね、[wa:1800]先生？"
1300405-67 = "― もぞもぞしちゃダメです。[wa:3000]今からこれが入るんですからね？"
1300405-70 = "― くすぐったかったら言ってくださいね？"
1300405-72 = "― うんうん。[wa:1500]いい子ね、[wa:1000]よしよし。"
1300405-75 = "― えっと……[wa:3000]考えてみるとこれちょっと……[wa:3500]恥ずかしいんですけど？"
1300405-78 = "― なんか[wa:1500]先生の顔が[wa:1500]近過ぎて……。"
1300405-80 = "― えっと……。"
1300405-83 = "― これは先生だけへのサービスですから、[wa:3500]二人だけの[wa:1000]ひ・[wa:1000]み・[wa:700]つ[wa:1000]ですよ？"
1300405-87 = "― うん？[wa:1000]そうやって横になったら[wa:2500]先生の背中しか見えないので……"
1300405-89 = "― えっと…[wa:1500]そうしちゃうと..... [wa:1500]鼻息が…"
1300405-93 = "― ダメです、先生！[wa:2000]ちゃんと横になっててください！"
1300405-96 = "さあ、綺麗になりましたよ。"
1300405-97 = "いかがでした？気持ちよかったですか？"
1300405-98 = "[s] \"よく分からないけど、ちょっと恥ずかしかった。\""
1300405-99 = "……あ、あはは。"
1300405-100 = "そう言われてみると、実は私も……すごく恥ずかしかったです……。"
1300405-101 = "でも……ふふっ♡"
1300405-102 = "いえ、何でもありません。"
