[translation]
1300405-1 = "É hora de retribuir o favor."
1300405-2 = "Shopping Center"
1300405-5 = "Ah, Sensei! Aqui! Por aqui~."
1300405-7 = "Estava esperando por você☆"
1300405-8 = "Sim? Se eu esperei muito tempo? Não, não, foram só uns 30 minutos."
1300405-9 = "Não, que isso, o Sensei chegou na hora certa, eu que vim mais cedo por conta própria☆"
1300405-10 = "Vamos lá. Então, hora de partir~☆"
1300405-11 = "Um encontro divertido... digo, hora das compras!"
1300405-13 = "Ah! Sensei! Vamos ali também!"
1300405-14 = "Hmm, será que não seria bom comprar um difusor também? Acho que ficaria ótimo na sala de aula."
1300405-15 = "Ora, um jogo de Othello? É sempre bom ter um desses por perto..."
1300405-16 = "[s1] \"Ei, espere um pouco.\"\n[s2] \"Não está comprando demais?\""
1300405-18 = "Mas é que, de Abydos até este shopping, é muito longe!"
1300405-19 = "Mas é que, de Abydos até este shopping, é muito longe!"
1300405-20 = "Como não dá para vir com frequência, preciso aproveitar e comprar tudo de uma vez."
1300405-21 = "Além disso... todas usam o dinheiro dos seus trabalhos de meio período para pagar as dívidas da escola..."
1300405-22 = "Se continuar assim, a sala de aula vai parecer mais uma sala de descanso de funcionários, é uma pena..."
1300405-23 = "Vamos! Vamos continuar as compras!"
1300405-24 = "Ainda falta muito para atingir o limite do meu cartão!"
1300405-27 = "(Depois disso, ela fez compras absurdas)"
1300405-29 = "Sala do Comitê de Contramedidas"
1300405-30 = "(Como não faziam entregas até Abydos, ela voltou carregando uma carga pesada)"
1300405-31 = "(Ploft)"
1300405-32 = "Se... Sensei."
1300405-33 = "Vo... você está bem? ...Sim, bom trabalho hoje!"
1300405-34 = "...Desculpe, acho que exagerei um pouco nas compras."
1300405-35 = "Normalmente eu não compro tanto assim..."
1300405-36 = "Hoje eu acho que... acabei me empolgando demais."
1300405-39 = "(Bum)"
1300405-40 = "(...O halter caiu no chão)"
1300405-41 = "..."
1300405-42 = "O halter que vou dar de presente para a Shiroko, esse também estava aqui..."
1300405-43 = "(Sussurro, sussurro)"
1300405-44 = "Aquele é o vaso de plantas para a Serika..."
1300405-45 = "Ah. Sensei! Cuidado! Tem coisas frágeis aí!"
1300405-46 = "Ué... isso é..."
1300405-47 = "Ah, eu tinha guardado aqui. Sim, é isso mesmo. Um limpador de ouvidos."
1300405-48 = "Tcharam☆ Na verdade, comprei isso para você, Sensei."
1300405-49 = "[s] \"Para mim?\""
1300405-50 = "Sim! Exatamente! Espere um pouquinho!"
1300405-52 = "(Sussurro, sussurro)"
1300405-53 = "Vou estender um lençol no chão..."
1300405-54 = "Pronto, Sensei."
1300405-55 = "Deite aqui, no meu colo."
1300405-56 = "[s] \"Hã...?\""
1300405-57 = "Vamos, seja um bom aluno e venha logo~."
1300405-58 = "[s] Deitar."
1300405-62 = "― Muito bem, [wa:1300] hora de limpar seus ouvidos."
1300405-64 = "― Fique quietinho, [wa:1800] Sensei?"
1300405-67 = "― Não se mexa. [wa:3000] Agora, isso vai entrar, viu?"
1300405-70 = "― Se fizer cócegas, me avise, está bem?"
1300405-72 = "― Sim, sim. [wa:1500] Que boa menina, [wa:1000] isso, isso."
1300405-75 = "― Bem... [wa:3000] Pensando bem, isso é um pouco... [wa:3500] embaraçoso, não acha?"
1300405-78 = "― É que... [wa:1500] o rosto do Sensei está [wa:1500] perto demais..."
1300405-80 = "― Bem..."
1300405-83 = "― Isso é um serviço exclusivo para o Sensei, então, [wa:3500] é um [wa:1000] se- [wa:1000] gre- [wa:700] do [wa:1000] só nosso, tá?"
1300405-87 = "― Hm? [wa:1000] Se você deitar assim, [wa:2500] eu só vou conseguir ver as suas costas..."
1300405-89 = "― Bem... [wa:1500] se fizer isso... [wa:1500] a sua respiração..."
1300405-93 = "― Não pode, Sensei! [wa:2000] Fique deitado direitinho!"
1300405-96 = "Pronto, ficou limpinho."
1300405-97 = "O que achou? Foi relaxante?"
1300405-98 = "[s] \"Não sei bem, mas foi um pouco embaraçoso.\""
1300405-99 = "……Ah, ahaha."
1300405-100 = "Agora que você mencionou, na verdade, eu também... fiquei muito envergonhada..."
1300405-101 = "Mas... fufu♡"
1300405-102 = "Não, não é nada."
