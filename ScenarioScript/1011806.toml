[translation]
1011806-1 = "意外な弱点？"
1011806-2 = "こんちゃ、せんせー。"
1011806-3 = "[s1] \"こんにちは、ノゾミ。\"\n[s2] \"早かったね。\""
1011806-6 = "そりゃ当番だからね。"
1011806-10 = "ふぁあぁあぁあ～……！"
1011806-11 = "[ns3] \"すごいあくび！\"\n[ns4] \"結構疲れてる？\""
1011806-14 = "昨日、夜間運行だったんだよ。"
1011806-15 = "あんま寝る時間なくってさ。"
1011806-16 = "[s] \"お疲れ様。休んでもよかったのに……。\""
1011806-17 = "パヒャヒャッ、いいのいいの。"
1011806-18 = "先生に会いに来てんだからさ。"
1011806-19 = "んで、何すればいい？"
1011806-21 = "（心配をよそに、ノゾミはやる気満々だったが……）"
1011806-42 = "[ns] \"……寝ててもいいよ？\""
1011806-44 = "ん～……？大丈夫！"
1011806-45 = "へっちゃらだよ！パヒャヒャッ！"
1011806-46 = "[s5] \"じゃあソファで横になってるとか……\"\n[s6] \"それくらいならいいでしょ？\""
1011806-49 = "……じゃあちょっとだけ。"
1011806-56 = "んん～……。"
1011806-57 = "おぉ……体が沈んでゆくぅ……。"
1011806-58 = "[ns] \"寝ちゃっていいからね。\""
1011806-59 = "いやぁ……そういうわけにはぁ……。"
1011806-61 = "せっかく……シャーレま……で来……て……ぇ……。"
1011806-62 = "……。"
1011806-67 = "（ノゾミに毛布をかけてあげた）"
1011806-68 = "（夕方になって目を覚ましたノゾミは、もったいないことをしたと笑っていた）"
