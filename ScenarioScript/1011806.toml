[translation]
1011806-1 = "Uma fraqueza inesperada?"

1011806-2 = "Olá, sensei."

1011806-3 = "[s1] \"Olá, Nozomi.\"\n[s2] \"Isso foi rápido.\""

1011806-6 = "Isso é porque é a minha vez."

1011806-10 = "Fuaaaaaaaa...!"

1011806-11 = "[ns3] \"Grande bocejo!\"\n[ns4] \"Você está muito cansado?\""

1011806-14 = "Ontem houve um culto noturno."

1011806-15 = "Não tenho muito tempo para dormir."

1011806-16 = "[s] \"Obrigado pelo seu trabalho duro. Você poderia ter descansado...\""

1011806-17 = "Pahyahyah, é bom, é bom."

1011806-18 = "Estou aqui para ver o professor."

1011806-19 = "Então, o que devo fazer?"

1011806-21 = "(Apesar de suas preocupações, Nozomi estava cheia de motivação...)"

1011806-42 = "[ns] \"...Tudo bem se eu dormir?\""

1011806-44 = "Hum...? Você está bem!"

1011806-45 = "É uma loucura! Pahiahah!"

1011806-46 = "[s5] \"Então é só deitar no sofá...\"\n[s6] \"Tudo bem, certo?\""

1011806-49 = "...Ok, só um pouquinho."

1011806-56 = "Hum…."

1011806-57 = "Oh... meu corpo está afundando..."

1011806-58 = "[ns] \"Você pode ir dormir.""

1011806-59 = "Bem... esse não é o caso..."

1011806-61 = "Eu me dei ao trabalho de trazer uma... placa de Petri... eh..."

1011806-62 = "……."

1011806-67 = "(cobri Nozomi com um cobertor)"

1011806-68 = "(Quando Nozomi acordou à noite, ela riu, pensando que tinha feito algo inútil.)"

