[translation]
1011105-1 = "Nell e o parque de diversões"
1011105-4 = "Ei, sensei. Está aqui."
1011105-5 = "A placa de Petri ainda é a mesma."
1011105-6 = "[s] \"Mas hoje Nell está usando uniforme.\""
1011105-7 = "Haha, isso mesmo!"
1011105-8 = "Esta pode ser a primeira vez que chego a uma placa de Petri de uniforme!"
1011105-9 = "Bem, esse é o caso na maioria dos lugares..."
1011105-10 = "É engraçado como não importa onde eu vá, ninguém me nota!"
1011105-11 = "[s] \"Mas hoje é o último dia, certo?\""
1011105-12 = "Ah, não posso deixar o C&C aberto o tempo todo."
1011105-13 = "Finalmente, gostaria de fazer algo memorável..."
1011105-14 = "Você tem alguma boa ideia?"
1011105-15 = "[s] \"Hmm...\""
1011105-17 = "[ns] \"...Será que é assim?\""
1011105-23 = "Que tipo de panfleto é esse?"
1011105-27 = "“As melhores recordações passadas no Parque Temático Millennium!”…?"
1011105-28 = "Já estive em um parque de diversões antes."
1011105-29 = "Mas me dei ao trabalho de usar uniforme para ir a um parque de diversões..."
1011105-33 = "...Parece divertido!"
1011105-34 = "[s] \"Ok, vamos agora.\""
1011105-35 = "Ou! Achei que foi um bom dia!"
1011105-36 = "Gosto disso em você, sensei!"
1011105-38 = "Não há muitas pessoas, então o momento é perfeito!"
1011105-39 = "Tanto o carrossel quanto a montanha-russa foram renovados!"
1011105-40 = "[s] \"Nel veio antes, certo?\""
1011105-41 = "Ah, é uma missão."

1011105-42 = "Fiz um pouco chamativo, mas consegui capturar o alvo."
1011105-46 = "[ns](Talvez o motivo da renovação seja...)"

1011105-47 = "Em vez disso, o que você quer andar primeiro?"
1011105-48 = "Afinal, é uma montanha-russa! ?"
1011105-49 = "Tudo bem, vamos!"
1011105-56 = "(Andei três vezes na montanha-russa com Nell)"
1011105-58 = "Kuu! #nIsso é ótimo, sensei!"
1011105-59 = "[ns] \"Estou um pouco tonto...\""
1011105-60 = "Haha, acho que não consigo fazer isso pela quarta vez!"
1011105-61 = "Bem, e aí?"
1011105-62 = "[s] \"carrossel...?\""
1011105-63 = "Quero andar a cavalo pelo menos uma vez! #nBem, mas não é real."
1011105-64 = "Se você não estiver se sentindo bem, não há problema em fazer uma pausa!"
1011105-65 = "[s] \"Então vou esperar aí.\"\"\n1011105-66 = \"Ei, estou indo!\"\n1011105-72 = \"Foi divertido, professora!\"\n1011105-73 = \"Meu grande cavalo era incrível, não era?\"\n1011105-74 = \"Hum, você não viu?\"\n1011105-75 = \"Se você não está se sentindo bem...\"\n1011105-76 = \"[s] \"Não, comprei um presente para você.\""

1011105-77 = "presente?"
1011105-82 = "...Tiara e doces?"
1011105-83 = "Não, não, claro que isso é...!"
1011105-84 = "Hum..."
1011105-88 = "Bem, normalmente eu não usaria isso, mas..."
1011105-89 = "No momento, não sou o líder do C&C ou do \"Double O\"..."

1011105-90 = "Haha, ficarei grato por isso!"
1011105-93 = "[wa:950]― [log=네루 교복]Oh! [wa:600] Olha, sensei! [wa:1180]Há muitas coisas! [/registro]"
1011105-96 = "― [log=네루 교복]Hmm? [wa:900]O que há de errado? [/registro]"
1011105-99 = "[ns1] \"Parece que você está se divertindo muito.\"\n[ns2] \"Nel está diferente hoje.\""
1011105-102 = "[wa:1330]― [log=네루 교복]Ah, [wa:920]Bem... [wa:940]Isso mesmo. [/registro]"
1011105-105 = "― [log=네루 교복]Atualmente não sou [wa:350]C&C e não tenho um relacionamento [wa:630]sênior-júnior com [wa:1610] sensei. [/registro]"
1011105-108 = "[wa:950]― [log=네루 교복]Não conheço ninguém aqui. [/registro]"
1011105-111 = "― [log=네루 교복]Por favor, me perdoe por enquanto [wa:800]. [/registro]"
1011105-114 = "[wa:950]― [log=네루 교복]Ou melhor, [wa:1350]Eu acho...[/log]"
1011105-116 = "― [log=네루 교복]É melhor ser como sempre? [/registro]"
1011105-119 = "[ns3] \"Esse não é o caso.\"\n[ns4] \"Aproveite ao máximo.\""
1011105-122 = "[wa:980]― [log=네루 교복]Haha! [wa:1060]Achei que você diria isso! [/registro]"
1011105-125 = "― [log=네루 교복]Bem, [wa:780]Eu não tenho tanto tempo [wa:600]...[/log]"
1011105-128 = "― [log=네루 교복]Vamos agora! [wa:1390] O próximo é ali! [/registro]"
1011105-131 = "(Depois disso, aproveitei o parque de diversões com Nell.)"
1011105-133 = "Já estava fechado, era muito cedo."
1011105-134 = "Foi muito divertido, sensei."
1011105-135 = "[s] \"Eu também me diverti.\"\"\n1011105-137 = \"[ns] \"Esta foi a última boa lembrança das suas férias?\"\"\n1011105-138 = \"ah!\"\n1011105-139 = \"Claro que estou muito satisfeito!\"\n1011105-143 = \"Antes de voltar ao meu estado normal, gostaria de lhe perguntar uma coisa...\"\n1011105-144 = \"[USERNAME] Como foi seu sensei?\"\n1011105-145 = \"[s] \"Hum?\"\"\n1011105-146 = \"Você está usando seu uniforme nos últimos dias...\"\n1011105-147 = \"A única pessoa que conheci nesta forma foi meu sensei...\"\n1011105-148 = \"Não foi minha culpa, mas... a professora, uh...\"\n1011105-152 = \"Guaaaaaaaaaaaa! Já! !\"\n1011105-156 = \"[ns] \"Nel!?\"\"\n1011105-157 = \"Está tudo bem? #nSó direi uma vez! !\"\n1011105-158 = \"Foi surpreendentemente divertido passar um tempo uniformizado!\"\n1011105-159 = \"Então, quando você usá-lo novamente!\"\n1011105-160 = \"Por favor, se dê bem!\"\n1011105-161 = \"Você entendeu? ?\"\n1011105-162 = \"[s] \"Ah, sim.\""

1011105-163 = "Bem, fim da história."
1011105-167 = "A partir de amanhã voltarei à minha vida diária habitual."
1011105-168 = "...Aqui, vamos para casa."
