[translation]
1011105-1 = "ネルと遊園地"
1011105-4 = "よお、先生。来たぞ。"
1011105-5 = "シャーレは相変わらずだな。"
1011105-6 = "[s] \"でも今日のネルは制服だからね。\""
1011105-7 = "ははっ、そうだな！"
1011105-8 = "制服でシャーレに来たのは初めてかもしれねぇ！"
1011105-9 = "いや、そもそもほとんどの場所がそうだな……。"
1011105-10 = "どこに行っても、あたしだって気づかれないなんて面白いぜ！"
1011105-11 = "[s] \"けど、それも今日で最後なんだよね？\""
1011105-12 = "ああ、ずっとC&Cを空けるわけにもいかねぇからな。"
1011105-13 = "そんで、最後に何か記憶に残ることをしたいんだが……。"
1011105-14 = "何か良いアイデアはねぇか？"
1011105-15 = "[s] \"うーん……。\""
1011105-17 = "[ns] \"……これとかどうかな？\""
1011105-23 = "何のチラシだ？"
1011105-27 = "「ミレニアムテーマパークで過ごす最高の思い出！」……？"
1011105-28 = "遊園地か、前にも行ったことあるな。"
1011105-29 = "でも、わざわざ制服で遊園地なんて……。"
1011105-33 = "……楽しそうじゃねぇか！"
1011105-34 = "[s] \"じゃあ、さっそく行こう。\""
1011105-35 = "おう！思い立ったが吉日だな！"
1011105-36 = "先生のそういうとこ、あたしは好きだぜ！"
1011105-38 = "人も少ないし、ちょうど良いタイミングじゃねぇか！"
1011105-39 = "メリーゴーランドもジェットコースターも、リニューアルされたんだな！"
1011105-40 = "[s] \"ネルは前にも来たんだよね？\""
1011105-41 = "あぁ、任務でな。"
1011105-42 = "ちょっと派手にやらかしちまったけど、無事にターゲットは捕まえたぜ。"
1011105-46 = "[ns] （リニューアルの理由って、もしかすると……）"
1011105-47 = "それより、先生は何から乗りたい？"
1011105-48 = "やっぱ、ジェットコースターだよな！？"
1011105-49 = "よっし、んじゃ行くぞ！"
1011105-56 = "（ネルと一緒にジェットコースターを三回も乗った）"
1011105-58 = "くぅー！#n最高だな、先生！"
1011105-59 = "[ns] \"ちょっと頭がクラクラするよ……。\""
1011105-60 = "ははっ、さすがに四回目は無理か！"
1011105-61 = "んじゃ、あっちはどうだ？"
1011105-62 = "[s] \"メリーゴーランド……？\""
1011105-63 = "一度くらい馬に乗ってみたくてな！#nまぁ、本物じゃねぇけど。"
1011105-64 = "体調が悪かったら休んでても良いぞ！"
1011105-65 = "[s] \"じゃあ、私はそこで待ってるね。\""
1011105-66 = "おう、行ってくる！"
1011105-72 = "楽しかったぜ、先生！"
1011105-73 = "あたしのでっかい馬、すごかったろ？"
1011105-74 = "ん、見てなかったのか？"
1011105-75 = "もし体調が悪いなら……。"
1011105-76 = "[s] \"ううん、プレゼントを買ってきたんだ。\""
1011105-77 = "プレゼント？"
1011105-82 = "……カチューシャとお菓子？"
1011105-83 = "いやいや、さすがにこれは……！"
1011105-84 = "うーん……。"
1011105-88 = "まあ、普段だったらつけねぇけど……。"
1011105-89 = "今はC&Cのリーダーでも、「ダブルオー」でもないからな……。"
1011105-90 = "ははっ、ありがたくもらうとするか！"
1011105-93 = "[wa:950]― [log=네루 교복]お！[wa:600]見ろよ先生！[wa:1180]色んなもんがあるぞ！[/log]"
1011105-96 = "― [log=네루 교복]ん？[wa:900]どうかしたのか？[/log]"
1011105-99 = "[ns1] \"すごく楽しそうだね。\"\n[ns2] \"今日のネルは、いつもと違うね。\""
1011105-102 = "[wa:1330]― [log=네루 교복]あ～、[wa:920]まぁ……[wa:940]そりゃあな。[/log]"
1011105-105 = "― [log=네루 교복]今は[wa:350]C&Cでもないし、[wa:1610]先生とは[wa:630]先輩後輩の関係でもないだろ。[/log]"
1011105-108 = "[wa:950]― [log=네루 교복]ここに知り合いなんていねぇしさ。[/log]"
1011105-111 = "― [log=네루 교복]今くらい、[wa:800]許してくれよ。[/log]"
1011105-114 = "[wa:950]― [log=네루 교복]というか、[wa:1350]やっぱ……[/log]"
1011105-116 = "― [log=네루 교복]普段みたいな方がいいか？[/log]"
1011105-119 = "[ns3] \"そういうわけじゃないよ。\"\n[ns4] \"思いっきり楽しもう。\""
1011105-122 = "[wa:980]― [log=네루 교복]ははっ！[wa:1060]そう言うと思った！[/log]"
1011105-125 = "― [log=네루 교복]まあ、[wa:780]そんなに時間に[wa:600]余裕があるわけじゃねえし……[/log]"
1011105-128 = "― [log=네루 교복]そろそろ行こうぜ！[wa:1390]次はあっちだ！[/log]"
1011105-131 = "（その後もネルと一緒に遊園地を楽しんだ）"
1011105-133 = "もう閉園か、早かったな。"
1011105-134 = "すっごく楽しかったぞ、先生。"
1011105-135 = "[s] \"私も楽しかったよ。\""
1011105-137 = "[ns] \"休日最後の良い思い出になった？\""
1011105-138 = "ああ！"
1011105-139 = "もちろん大満足だ！"
1011105-143 = "いつものあたしに戻る前に聞いておきたいんだが……。"
1011105-144 = "[USERNAME]先生は、どうだった？"
1011105-145 = "[s] \"ん？\""
1011105-146 = "ここ何日か、ずっと制服だったろ……。"
1011105-147 = "この姿で会ったのは、先生だけだから……。"
1011105-148 = "あたしは悪くなかったけど……せ、先生は、そ、その……。"
1011105-152 = "ぐああああっ！もうっっっ！！"
1011105-156 = "[ns] \"ネル！？\""
1011105-157 = "良いか？#n一回しか言わないからな！！"
1011105-158 = "制服で過ごすのが意外と楽しかったんだよ！"
1011105-159 = "だから、また着た時は！"
1011105-160 = "ちゃんと付き合ってくれよな！"
1011105-161 = "分かったか！？"
1011105-162 = "[s] \"う、うん。\""
1011105-163 = "は、話は終わりだ。"
1011105-167 = "明日から、またいつもの毎日に戻っちまうな。"
1011105-168 = "……ほら、帰るぞ。"
