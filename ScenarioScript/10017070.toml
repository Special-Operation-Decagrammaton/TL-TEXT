[translation]
10017070-1 = "Episódio 7: Colina das Tempestades"
10017070-2 = "Entrada do Café 'White&Mason'"
10017070-3 = "Tsc, como esperado, está difícil...!"
10017070-4 = "Dito isso, eles também estão quase no limite!#nPodemos vencer se continuarmos pressionando!"
10017070-6 = "O-o que está acontecendo aqui!?"
10017070-8 = "Haha, quer saber!?"
10017070-9 = "Então, é um ato de bondade responder!#nBem, é simples! O Comitê de Justiça roubou nosso 'frango'!"
10017070-10 = "Nós apenas usamos isso para fazer o Esquadrão de Socorro e o Comitê de Justiça entrarem em conflito!"
10017070-11 = "Eu não esperava que desse tão certo, mas funcionou! Hahaha!"
10017070-12 = "[s] \"Isso significa que, Hasumi, você realmente roubou...?\""
10017070-14 = "……Sim, isso é verdade."
10017070-15 = "No entanto, parece haver uma diferença de percepção entre as partes sobre esse 'frango'."
10017070-20 = "Cala a boca!"
10017070-21 = "Você tem algum problema com o 'Frango do Inferno' que fizemos!?"
10017070-23 = "Inferno...?"
10017070-24 = "O que é isso!?"
10017070-25 = "[s] \"……O que isso significa?\""
10017070-27 = "Vou explicar!#n'Frango do Inferno' é, literalmente, um frango que desafia o nível de picância do inferno!"
10017070-28 = "Não é só capsaicina artificial!"
10017070-29 = "Colocamos bastante da 'Ceifadora de Kivotos', dita como a pimenta mais forte de Kivotos, então o nível de Scoville passa de 2,2 milhões!"
10017070-30 = "E ainda temos o resto aqui!"
10017070-37 = "Ugh, só de olhar, meus olhos estão..."
10017070-38 = "E-estou quase chorando...!"
10017070-39 = "Ah!? Só de tocar com a mão, está pinicando!"
10017070-40 = "Uau, minha pele começou a inchar!#nOnde está a pomada, onde está a pomada...!"
10017070-41 = "[ns1] \"Meu corpo todo está doendo!?\"\n[ns2] \"Isso não está mais perto de ser uma substância química tóxica...?\""
10017070-44 = "Ninguém iria querer comer algo assim."
10017070-45 = "Ou melhor, seria impossível comer."
10017070-46 = "Como eles estavam tentando empurrar esse frango para todos os transeuntes, o Comitê de Justiça interveio, mas..."
10017070-51 = "O Frango do Inferno não tem culpa!#nO sabor sempre precisa de novos desafios!"
10017070-52 = "Isso mesmo, aquele cara de Gehenna disse a mesma coisa!"
10017070-54 = "De qualquer forma... nós, do Comitê de Justiça, lidamos com essa venda forçada maliciosa e esse comportamento próximo ao terrorismo..."
10017070-55 = "Para que parassem com isso."
10017070-56 = "No final, recolhemos aquele lixo industrial."
10017070-57 = "Lixo industrial!? Peça desculpas!"
10017070-58 = "Eles não estavam satisfeitos apenas em vender, estavam tentando adicionar taxas extras constantemente..."
10017070-59 = "Não tem como evitar! Custou caro para criar aquilo!"
10017070-60 = "Isso mesmo, precisamos recuperar o investimento!"
10017070-62 = "Mas esse valor, pelo menos 400% do preço de custo do frango, não é?"
10017070-63 = "Além disso, vocês ameaçaram dizendo: 'Se não comprar o frango, vai sofrer na pele'..."
10017070-64 = "……É isso que aconteceu, Comandante Mine."
10017070-65 = "……."
10017070-70 = "De qualquer forma, esse assunto não importa mais."
10017070-71 = "Todos estão bem acabados, não é... então, vamos continuar?"
10017070-72 = "Para destruir algo, o melhor é começar de dentro, não é? Hehehe..."
10017070-74 = "I-isso é horrível!"
10017070-75 = "Eu confiava em vocês...!"
10017070-76 = "O objetivo era nos usar e nos fazer lutar!"
10017070-77 = "E logo no Natal, onde todos deveriam ser felizes!"
10017070-78 = "Não me venham reclamar se não ganharem presentes do Papai Noel!"
10017070-83 = "……Hã? Papai Noel?"
10017070-84 = "Você não vai me dizer que ainda acredita que o Papai Noel—"
10017070-86 = "Já chega disso."
10017070-90 = "Q-que foi? Por que está me encarando assim de repente……"
10017070-91 = "Desculpe, mas mesmo fugindo, se continuar gritando desse jeito—"
10017070-93 = "Eu disse para parar por aí……!"
10017070-95 = "[ns3] \"……Pode parar de me irritar mais do que isso?\"\n[ns4] \"Não invada o coração dos outros com tanta leviandade.\""
10017070-99 = "P-Professor……!?"
10017070-100 = "E-ele sempre teve uma cara tão assustadora assim……!?"
10017070-107 = "Serina, Hanae."
10017070-109 = "Comandante……"
10017070-110 = "Comandante!"
10017070-112 = "Talvez eu não tenha mais as qualificações para ser a comandante."
10017070-113 = "Mas, apenas por agora…… vocês poderiam me emprestar sua força?"
10017070-115 = "Sim, é claro!"
10017070-116 = "Nós decidimos que seguiríamos a comandante, afinal!"
10017070-118 = "Obrigada…… Então, vamos nessa."
10017070-119 = "Hehehe……"
10017070-125 = "Posso me juntar a vocês também……?"
10017070-130 = "Iiiih!?"
10017070-131 = "O-o que está acontecendo!? #nEla não estava caída!?"
10017070-132 = "Não me pergunte! #nAté agora pouco ela estava claramente desmaiada!"
10017070-133 = "Já que chegamos a esse ponto, não tem como voltar atrás! #nMesmo que sejam elas, não estão em perfeitas condições……!"
10017070-135 = "Embora não fosse a intenção…… no fim das contas, conseguimos preservar a Tsurugi, nossa maior força de combate."
10017070-137 = "Kya-hahahahaha!!"
10017070-138 = "Muito bem, vamos acabar com isso."
10017070-140 = "Com nossas crenças e orgulho no peito……!"
