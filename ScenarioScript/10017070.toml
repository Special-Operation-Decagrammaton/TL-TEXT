[translation]
10017070-1 = "第７話;嵐ノ丘"
10017070-2 = "カフェ「White&Mason」入口"
10017070-3 = "ちっ、やっぱりきついな……！"
10017070-4 = "とはいえ、あいつらもほぼ限界だ！#nこのまま押し切れる！"
10017070-6 = "な、何がどうなっているんですか！？"
10017070-8 = "ははっ、知りたいか！？"
10017070-9 = "なら答えてやるのが世の情けってな！#nまあ簡単なことだ！正義実現委員会は、私たちの「チキン」を奪った！"
10017070-10 = "それを利用して、救護騎士団と正義実現委員会を衝突させただけさ！"
10017070-11 = "まさかここまで上手くいくとは思わなかったけどな！はははっ！"
10017070-12 = "[s] \"っていうことはハスミ、本当に奪ったの……？\""
10017070-14 = "……はい、それは事実です。"
10017070-15 = "しかしその「チキン」については、各位で認識の相違があるようです。"
10017070-20 = "うるせぇ！"
10017070-21 = "私たちが作った「ヘルファイアチキン」に文句あんのか！"
10017070-23 = "ヘル……？"
10017070-24 = "何ですかそれ！？"
10017070-25 = "[s] \"……どういうこと？\""
10017070-27 = "説明してやろう！#n「ヘルファイアチキン」ってのは文字通り、地獄の辛さに挑戦したチキンのこと！"
10017070-28 = "人工カプサイシンだけじゃないぜ！"
10017070-29 = "キヴォトス最強の唐辛子と言われる「キヴォトス・リーパー」をたっぷり入れたから、そのスコヴィル値は220万オーバー！"
10017070-30 = "そしてここにも、その残りがある！"
10017070-37 = "うぅっ、ただ見ているだけで何だか、目が……。"
10017070-38 = "な、涙が出てきそうに……！"
10017070-39 = "うぁっ！？手で触れただけなのに、チクチクします！"
10017070-40 = "わっ、お肌が腫れてきました！#n湿布、湿布はどこに……！"
10017070-41 = "[ns1] \"身体のあちこちが痛いんだけど！？\"\n[ns2] \"これはもはや、毒性の化学物質に近いんじゃ……？\""
10017070-44 = "あのようなもの、誰も食べたがらないでしょう。"
10017070-45 = "食べられない……という方が正しいでしょうか。"
10017070-46 = "そんなあのチキンを片っ端から通行人へ押し売りしようとしていたので、正義実現委員会が乗り出したのですが……"
10017070-51 = "ヘルファイアチキンに罪は無いだろ！#n味にはいつも新しい挑戦が必要なんだ！"
10017070-52 = "そうだ、ゲヘナのあいつもそう言ってた！"
10017070-54 = "とにかく……私たち正義実現委員会はその悪質な押し売りと、テロに近い行為……"
10017070-55 = "それらをやめるよう、対応したのです。"
10017070-56 = "最終的に、あの産業廃棄物は回収しました。"
10017070-57 = "産業廃棄物だと！？謝れ！"
10017070-58 = "ただ売るだけでは飽き足らず、追加の費用をどんどん乗せようとしていましたし……。"
10017070-59 = "仕方ないだろ！あれを生み出すのに、結構お金がかかったんだから！"
10017070-60 = "そうだ、投資分は回収させてもらわないと！"
10017070-62 = "しかしその金額、少なくともチキンの原価400％は超えていましたよね？"
10017070-63 = "それに、「チキンを買わないなら文字通り『痛い目』に遭わせるぞ」などと脅迫していましたし……。"
10017070-64 = "……ということなのですが、ミネ団長。"
10017070-65 = "……。"
10017070-70 = "とにかく、そんな話はもうどうでも良いんだ。"
10017070-71 = "みんなイイ感じにボロボロじゃねぇか……さあ、続けるか？"
10017070-72 = "何かを壊すには、まず内側からってのは定石だろ？へっへっへ……。"
10017070-74 = "ひ、ひどいです！"
10017070-75 = "みなさんを信じていたのに……！"
10017070-76 = "利用して、争わせることが狙いだったなんて！"
10017070-77 = "それも、みんなが幸せであるべきクリスマスに！"
10017070-78 = "サンタさんからプレゼント貰えなくても知りませんよ！？"
10017070-83 = "……は？サンタ？"
10017070-84 = "お前まさか、まだサンタが――"
10017070-86 = "そこまでです。"
10017070-90 = "な、なんだよ急に睨んで……。"
10017070-91 = "悪いけど、逃げながらでもこのまま叫んで――"
10017070-93 = "そこまでにしてくださいと、言っています……！"
10017070-95 = "[ns3] \"……これ以上、怒らせないでもらえる？\"\n[ns4] \"そんな軽い気持ちで、他人の心に踏み入らないで。\""
10017070-99 = "せ、先生……！？"
10017070-100 = "こ、こんな怖い顔してたっけか……！？"
10017070-107 = "セリナ、ハナエ。"
10017070-109 = "団長……"
10017070-110 = "団長！"
10017070-112 = "私にはもう、団長としての資格は無いのかもしれません。"
10017070-113 = "でも、今だけは……私に力を貸してもらえませんか？"
10017070-115 = "はい、もちろんです！"
10017070-116 = "私たちは、団長についていくと決めたんですから！"
10017070-118 = "ありがとうございます……それでは、行きましょうか。"
10017070-119 = "ひひっ……。"
10017070-125 = "私も、入れてもらおうか……？"
10017070-130 = "いぃっ！？"
10017070-131 = "ど、どうなってんだ！？#n倒れてたんじゃないのか！？"
10017070-132 = "私に聞くな！#nさっきまでは確かに気を失ってたんだ！"
10017070-133 = "こうなったらあとには引けない！#nいくらあいつらだって、万全の状態じゃないんだから……！"
10017070-135 = "不本意ながら……結果的に、ツルギという最大戦力を温存できたと。"
10017070-137 = "きゃはははははははぁっ！！"
10017070-138 = "さあ、終わらせるとしましょう。"
10017070-140 = "信念と誇りを胸に……！"
