[translation]
32120-1 = "Episódio 12;De Volta ao Ponto de Partida"
32120-2 = "(Depois disso……)"
32120-4 = "Não aguento mais!!"
32120-5 = "Não dá pra fazer isso! Não entendo! Que chato! Que saco!!"
32120-7 = "A-ah, é que…… a gente tá reunida assim justamente pra não acabar sendo expulsa……."
32120-8 = "Por ora, é que…… agora a gente tem que juntar as cabeças e achar algum jeito bom……."
32120-9 = "Senão, daqui a uma semana, a gente vai mesmo, juntinha, ser toda expulsa……."
32120-10 = "\"Juntar as cabeças\"…… sei. Não é ruim, mas não é algo que me empolgue muito. Falta um quê, sabe……."
32120-11 = "Que tal, por exemplo, assim…… \"juntar as partes fracas e sensíveis\"?"
32120-16 = "D-do nada, que é que você tá falando!? Piada suja não pode! Proibido! Pena de morte!! P-partes sensíveis, juntar o quê com o quê, como assim!?"
32120-17 = "Ah, ficou meio difícil de entender? Então deixa eu mostrar na prática. Abre um pouquinho mais as pernas……"
32120-21 = "……Hã? Quê!?"
32120-24 = "P-para! Não chega perto! Eu não conheço, não quero conhecer e ainda é cedo pra isso!!"
32120-25 = "Toma♡"
32120-29 = "P-para……! Paraaa! S-socorro, Sensei……!"
32120-30 = "E-eu errei, desculpa falar sem formalidade com a veterana, me desculpa! Me perdoa, para, essa aí eu ainda não quero, nãoooo!!!!"
32120-31 = "Sei, então existe uma técnica de imobilização dessas também. Parece útil pro combate corpo a corpo…… aprendi algo."
32120-32 = "Só que sinto que tem movimento desnecessário demais. Se fosse eu, uns 2 tempos antes eu já teria travado a articulação."
32120-34 = "……."
32120-35 = "S-Senseiii……."
32120-36 = "[s] \"……Sim, eu também vou me esforçar.\""
32120-37 = "C-contamos com você……."
32120-38 = "Do jeito que vai, de verdade…… a gente toda vai ser expulsa……."
32120-40 = "(Depois disso, tentou-se encontrar a Nagisa, mas ela não foi achada.)"
32120-41 = "(Do mesmo modo, tentou-se, de algum jeito, entrar em contato, mas nem sequer se sabia onde a Mika estava.)"
32120-43 = "Alojamento de Acampamento"
32120-44 = "No fim das contas, a gente acabou voltando pra cá, né."
32120-45 = "Eu tinha saído achando que era a despedida, e logo dar nisso. A vida é imprevisível mesmo."
32120-46 = "Não é hora de ficar mergulhada em sentimentalismo!? E agora, o que a gente faz!?"
32120-47 = "Aliás, se as figurões do Tea Party querem mesmo nos expulsar, não tem o que fazer! Por mais que a gente junte as cabeças, faça o que fizer é inútil, não é!?"
32120-48 = "Por ora, o 3º Exame Especial de Aptidão, daqui a uma semana, é a última chance, mas……."
32120-49 = "Se a gente vai ser atrapalhada por todos os meios possíveis a esse ponto, de fato pode ser difícil, né."
32120-50 = "Auu……."
32120-51 = "A-aliás, por que a gente foi parar nisso!? Por que é que a gente tem que ser expulsa!?"
32120-52 = "\"Traidor de Trinity\" sei lá o quê, não entendo nada! Por que é que a gente tem que ser suspeita!?"
32120-53 = "Se a gente for expulsa de verdade…… o Comitê de Realização da Justiça, já não……."
32120-54 = "Koharu……."
32120-55 = "……."
32120-59 = "[ns] \"……Desculpa. Foi por eu ter falado aquilo pra Nagisa……\""
32120-60 = "……Não. Pelo que ouvi da história, o senhor falou aquilo pela gente, não foi? Aliás, é algo que merece gratidão."
32120-61 = "Se eu estivesse lá na hora, talvez tivesse feito uma coisa bem pior com aquela gatinha."
32120-62 = "……."
32120-63 = "Conseguir tirar 90 ou mais nesta semana……."
32120-64 = "Pois é…… e, além disso, temos que vigiar a Nagisa pra ela não aprontar mais nada de ruim……."
32120-68 = "Snif…… impossível, é totalmente impossível…… a gente se esforçou tanto até aqui, e ainda mais que isso……."
32120-69 = "Eu me esforcei…… mas mais que isso, pra mim já é impossível…… eu, sendo burra…… não dá……. uu……."
32120-70 = "Koharu……."
32120-71 = "Koharu……."
32120-73 = "P-por ora, hoje, vamos descansar?"
32120-74 = "Alguma coisa, algum jeito, com certeza tem…… não, tem que ter. Eu vou me esforçar pra achar. E o Sensei também ajuda……."
32120-75 = "Hifumi, você também é melhor descansar direito……? Você vem se forçando esse tempo todo……."
32120-76 = "M-mas, se eu não me esforçar agora……."
32120-77 = "Eu também penso junto. Ajudo tanto no estudo da Koharu quanto na questão da Hifumi."
32120-78 = "……Enfim, por hoje, vamos descansar por ora."
32120-79 = "Pois…… é. Sim."
32120-83 = "Então, por hoje, vamos ficar por aqui. Bom trabalho a todas."
32120-86 = "Faltam 6 dias para o último Exame Especial de Aptidão"
32120-90 = "……."
32120-95 = "……."
32120-98 = "Próximo Episódio;Ainda Assim"
