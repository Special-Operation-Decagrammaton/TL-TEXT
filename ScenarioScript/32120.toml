[translation]
32120-1 = "Episódio 12; De volta ao ponto de partida"
32120-2 = "（Depois disso...）"
32120-4 = "Já chega!!"
32120-5 = "Não dá para continuar assim! Não entendo! É chato! É trabalhoso!!"
32120-7 = "Ah, bem, é que... estamos reunidas aqui justamente para evitar a expulsão, então..."
32120-8 = "Por enquanto, precisamos juntar nossas mentes e encontrar um bom método..."
32120-9 = "Se não fizermos isso, daqui a uma semana, todas nós seremos expulsas juntas..."
32120-10 = "“Juntar nossas mentes”... Entendo. Não é ruim, mas não é algo que me empolgue muito. Talvez algo um pouco mais, sabe..."
32120-11 = "Que tal, por exemplo... “Juntar nossas partes fracas e sensíveis”? O que acha?"
32120-16 = "V-você está falando do quê, de repente!? Nada de piadas sujas! Proibido! Pena de morte!! P-partes sensíveis, o que você quer dizer com juntar isso!?"
32120-17 = "Ah, ficou difícil de entender? Então, que tal se eu demonstrar na prática? Abra um pouco mais as pernas, por favor..."
32120-21 = "......Hã? O quê!?"
32120-24 = "P-pare! Não se aproxime! Eu não conheço, não quero saber e ainda é cedo demais para isso!!"
32120-25 = "Ei!♡"
32120-29 = "P-pare...! Pare com isso! S-socorro, Sensei...!"
32120-30 = "Eu, eu estava errada, sinto muito por falar de forma informal com uma veterana! Já chega, pare, isso ainda não, nãooooo!!!!"
32120-31 = "Entendo, existe esse tipo de técnica de supressão também. Parece útil em combate corpo a corpo... aprendi algo novo."
32120-32 = "Embora eu ache que há muitos movimentos inúteis. Se fosse eu, teria imobilizado as articulações dois tempos antes."
32120-34 = "......"
32120-35 = "S-Sensei..."
32120-36 = "[s] \"...Sim, eu também vou me esforçar.\""
32120-37 = "C-conto com você..."
32120-38 = "Se continuar assim, nós realmente... todas nós seremos expulsas..."
32120-40 = "（Tentei encontrar a Nagisa depois disso, mas não consegui encontrá-la.）"
32120-41 = "（Da mesma forma, tentei entrar em contato de alguma forma, mas nem sabia onde a Mika estava.）"
32120-43 = "Alojamento"
32120-44 = "No fim das contas, acabamos voltando para cá, não é?"
32120-45 = "Saí pensando que era uma despedida, mas acabar assim logo em seguida... A vida é mesmo imprevisível."
32120-46 = "Não é hora de ficar sentimental, né!? O que vamos fazer agora!?"
32120-47 = "Digo, se as pessoas importantes do Chá das Cinco realmente querem nos expulsar, não tem o que fazer, né! Mesmo que juntemos nossas mentes, não é inútil tentar qualquer coisa!?"
32120-48 = "Bem, o 3º Exame Especial de Aproveitamento Acadêmico, que acontecerá daqui a uma semana, é a última chance, mas..."
32120-49 = "Sendo atrapalhadas de todas as formas possíveis até agora, certamente será difícil."
32120-50 = "Auu..."
32120-51 = "P-por que isso está acontecendo, afinal!? Por que temos que ser expulsas!?"
32120-52 = "Não entendo esse papo de “traidoras da Trinity”! Por que temos que ser suspeitas de algo assim!?"
32120-53 = "Se formos realmente expulsas... o Comitê de Justiça não poderá mais..."
32120-54 = "Koharu-chan..."
32120-55 = "......"
32120-59 = "[ns] \"...Desculpe. Por minha causa, por ter dito aquilo para a Nagisa...\""
32120-60 = "...Não. Pelo que ouvi, Sensei disse aquilo por nós, não foi? Pelo contrário, deveríamos agradecer."
32120-61 = "Se eu estivesse lá, talvez tivesse feito algo ainda pior com aquela gatinha."
32120-62 = "......"
32120-63 = "Tirar mais de 90 pontos em apenas uma semana..."
32120-64 = "É verdade... Além disso, precisamos vigiar a Nagisa para que ela não faça mais nada de ruim..."
32120-68 = "Snif... Impossível, é absolutamente impossível... Eu me esforcei tanto até aqui, não consigo mais que isso..."
32120-69 = "Eu me esforcei... mas não consigo mais... eu sou burra, então... é impossível... uuu..."
32120-70 = "Koharu..."
32120-71 = "Koharu-chan..."
32120-73 = "P-por enquanto, por que não descansamos por hoje?"
32120-74 = "Eu acho que deve haver algum jeito... Não, com certeza deve haver. Vou me esforçar para encontrar. Além disso, o Sensei também vai nos ajudar..."
32120-75 = "A Hifumi-chan também deveria descansar um pouco, sabe...? Você tem se esforçado demais até agora..."
32120-76 = "Ma-mas, se eu não me esforçar agora..."
32120-77 = "Eu vou pensar junto com você. Vou ajudar tanto com os estudos da Koharu-chan quanto com as coisas da Hifumi-chan."
32120-78 = "De qualquer forma, vamos descansar por hoje."
32120-79 = "É verdade... Sim, você tem razão."
32120-83 = "Então, vamos encerrar por aqui hoje. Bom trabalho."
32120-86 = "Faltam 6 dias para o exame acadêmico especial final"
32120-90 = "..."
32120-95 = "..."
32120-98 = "Próximo episódio: Mesmo assim"
