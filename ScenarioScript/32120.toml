[translation]
32120-1 = "Episódio 12; De Volta à Estaca Zero"
32120-2 = "(Depois disso...)"
32120-4 = "Chega, eu desisto!!"
32120-5 = "Não dá pra aguentar um negócio desses! Eu não entendo nada! É um saco! Dá muito trabalho!!"
32120-7 = "A-Ah, hum, bem... a gente tá se reunindo assim justamente pra evitar a expulsão..."
32120-8 = "Por enquanto, a gente precisa juntar nossas cabeças e tentar achar uma saída..."
32120-9 = "Se não fizermos isso, daqui a uma semana vamos todas ser expulsas juntas de mãos dadas..."
32120-10 = "'Juntar nossas cabeças'... entendi. Não é uma má ideia, mas falta um certo... calor humano, não acha? Que tal se a gente..."
32120-11 = "Por exemplo... 'juntar nossas partes fracas e sensíveis', o que acha?"
32120-16 = "D-Do nada!? Sem papo de pervertido! É proibido! Pena de morte!! P-Partes sensíveis!? O que exatamente você quer juntar!?"
32120-17 = "Ah, ficou difícil de entender? Então que tal eu te mostrar na prática? Se você puder abrir um pouquinho mais as pernas..."
32120-21 = "...Hã? Hã!?"
32120-24 = "P-Para com isso! Não chega perto! Eu não sei o que é, não quero saber e ainda sou muito nova pra isso!!"
32120-25 = "Vem cá♡"
32120-29 = "P-Para...! Para com isso! S-Socorro, Sensei...!"
32120-30 = "E-Eu sinto muito, desculpa ter falado informalmente com uma veterana! Me perdoa, para com isso, eu não quero isso aindaaaaa!!!!"
32120-31 = "Entendi, então também existe esse tipo de técnica de imobilização. Pode ser útil num combate corpo a corpo... aprendi mais uma."
32120-32 = "Mas acho que tem muito movimento inútil aí. Se fosse eu, já teria deslocado a articulação dois passos atrás."
32120-34 = "......"
32120-35 = "S-Sensei..."
32120-36 = "[s] \"...Pois é, vou ter que dar o meu melhor também.\""
32120-37 = "P-Por favor, conto com você..."
32120-38 = "Se continuar desse jeito, nós realmente... vamos todas ser expulsas..."
32120-40 = "(Depois disso, tentei me encontrar com a Nagisa, mas não a achei em lugar nenhum.)"
32120-41 = "(Do mesmo jeito, tentei entrar em contato com a Mika de algum jeito, mas não faço nem ideia de onde ela se meteu.)"
32120-43 = "Alojamento"
32120-44 = "No fim das contas, acabamos voltando pra cá."
32120-45 = "E pensar que a gente saiu achando que era a nossa despedida e acabamos assim. A vida é mesmo uma caixinha de surpresas."
32120-46 = "Não é hora de ficar filosofando! O que a gente vai fazer agora!?"
32120-47 = "Digo, se a alta cúpula da Tea Party realmente quer expulsar a gente, não tem pra onde correr! Não adianta juntar nossas cabeças se nada do que fizermos vai adiantar!"
32120-48 = "Tecnicamente, o 3º Exame Especial de Proficiência daqui a uma semana é a nossa última chance, mas..."
32120-49 = "Sendo sabotadas de todas as formas possíveis e imagináveis desse jeito, a coisa fica meio complicada mesmo."
32120-50 = "Auuu..."
32120-51 = "P-Pra começo de conversa, por que isso tá acontecendo com a gente!? Por que temos que ser expulsas!?"
32120-52 = "'Traidores da Trinity'? Que palhaçada é essa! Por que justo a gente tem que levar a culpa!?"
32120-53 = "Se eu for expulsa de verdade... nunca mais vou poder voltar pro Comitê de Realização da Justiça..."
32120-54 = "Koharu-chan..."
32120-55 = "......"
32120-59 = "[ns] \"...Me desculpem. Isso tudo é culpa minha por ter falado daquele jeito com a Nagisa...\""
32120-60 = "...Não. Pelo que escutei, o Sensei só disse aquilo por nossa causa, não é? Nós que deveríamos agradecer."
32120-61 = "Se eu estivesse lá, talvez tivesse feito coisas bem piores com aquela gatinha."
32120-62 = "......"
32120-63 = "Conseguir tirar mais de 90 em uma semana..."
32120-64 = "Pois é... sem contar que temos que ficar de olho na Nagisa-san para garantir que ela não apronte mais nada..."
32120-68 = "*Sniff*... não dá, é impossível... Eu já me esforcei tanto até aqui, não consigo fazer mais do que isso..."
32120-69 = "Eu dei o meu melhor... mas não dá mais... eu já sou burra... é impossível... uugh..."
32120-70 = "Koharu..."
32120-71 = "Koharu-chan..."
32120-73 = "P-Por enquanto, que tal a gente descansar por hoje?"
32120-74 = "Acho que de algum jeito, a gente vai encontrar uma solução... não, a gente *tem* que encontrar. Eu vou dar um jeito. Além disso, o Sensei vai nos ajudar..."
32120-75 = "Acho que a Hifumi-chan também devia descansar direito, sabia...? Você vem se forçando demais já faz um tempo..."
32120-76 = "M-Mas se eu não me esforçar agora..."
32120-77 = "Eu também vou pensar numa saída junto com vocês. Vou ajudar com os estudos da Koharu-chan e com o que a Hifumi-chan precisar."
32120-78 = "...De qualquer forma, vamos encerrar o dia de hoje e descansar."
32120-79 = "É, tem razão... ok."
32120-83 = "Sendo assim, vamos ficando por aqui hoje. Bom trabalho para todas."
32120-86 = "Faltam 6 dias para o Último Exame Especial de Proficiência"
32120-90 = "......"
32120-95 = "......"
32120-98 = "Próximo Episódio; Mesmo Assim"