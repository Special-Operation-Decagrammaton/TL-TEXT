[translation]
1002102-1 = "Alvo de escolta"
1002102-2 = "（Enviei minha localização para a Azusa por enquanto）"
1002102-3 = "（Depois de um tempo, vi a Azusa se aproximando de longe com passos rápidos）"
1002102-7 = "Você estava aqui, Sensei. Ufa, como eu pensei... que lugar tão vulnerável."
1002102-8 = "Sobre o que estou falando...? Como eu disse no MomoTalk, esta área é perigosa."
1002102-9 = "Ter uma visão tão aberta significa que é fácil ser alvo de ataques. Ficar em um lugar sem nada para se esconder não é bom do ponto de vista tático."
1002102-10 = "......Estou exagerando?"
1002102-11 = "Sensei. Eu entendo como se sente, mas não é bom se distrair. Um ataque inimigo acontece justamente quando você baixa a guarda."
1002102-12 = "Além disso, estar em um lugar como este é como pedir para ser atingido."
1002102-13 = "Para começar...!!"
1002102-14 = "Sensei, abaixe-se!!"
1002102-17 = "[ns]\"......!?\""
1002102-19 = "......"
1002102-20 = "......Ufa."
1002102-21 = "Eram apenas turistas... Já está tudo bem, pode se levantar."
1002102-22 = "[s1] \"Não acha que está ficando tensa demais...?\"\n[s2] \"Azusa, por acaso você está nervosa por estar em um lugar desconhecido?\""
1002102-23 = "Não, é que..."
1002102-24 = "Não, é que..."
1002102-25 = "Não é isso. Na verdade, até elas chegarem perto, não havia como saber se elas não estavam escondendo hostilidade."
1002102-26 = "Já que estamos na praia, entendo o que você quer dizer, Sensei. Mas precisamos considerar o pior cenário a qualquer momento. O perigo espreita em qualquer rotina."
1002102-27 = "Um único momento de descuido pode levar a resultados irreversíveis."
1002102-28 = "......Definitivamente este lugar não serve, vamos mudar de local rapidamente. Vou procurar um lugar mais seguro."
1002102-29 = "Hã? Quer ficar aqui comigo?"
1002102-30 = "Sensei, por isso..."
1002102-31 = "......"
1002102-32 = "[s] \"Azusa?\""
1002102-33 = "Ah... entendi. Respeitar a opinião do alvo de escolta também é necessário em missões como esta."
1002102-34 = "......Mas, em troca, para atender a esse pedido, você terá que seguir o que eu disser."
1002102-35 = "Primeiro, vou tornar este lugar seguro, então espere um pouco. Não vá para outros lugares."
1002102-36 = "[s] \"Tornar este lugar seguro?\""
1002102-37 = "Sim, não vai demorar muito."
1002102-39 = "（Vupt）"
1002102-40 = "[s] \"De onde você tirou essa pá!?\""
1002102-41 = "Não se preocupe, estou acostumada."
1002102-42 = "Esta área parece fácil de cavar."
1002102-44 = "（Sem tempo para impedi-la, Azusa começou a cavar a areia com movimentos experientes）"
1002102-46 = "Pronto, está um pouco rústico, mas acho que serve. Pelo menos, está em um estado aceitável."
1002102-47 = "[s3] \"Que rápido!?\"\n[s4] \"Com esses braços finos, que velocidade...\""
1002102-48 = "Isso não é nada. Já fiz isso dezenas, centenas de vezes."
1002102-49 = "Isso não é nada. Já fiz isso dezenas, centenas de vezes."
1002102-50 = "......Mas nunca pensei que seria útil para proteger o Sensei assim. O futuro é imprevisível, não é?"
1002102-51 = "Vamos, Sensei. Por aqui."
1002102-54 = "（Entrei e sentei bem ao lado da Azusa）"
1002102-55 = "（O interior era surpreendentemente confortável, parecia uma pequena base secreta）"
1002102-56 = "......Por enquanto, estou aliviada."
1002102-57 = "Hm? Aconteceu algo, Sensei?"
1002102-58 = "......Hã?"
1002102-59 = "Fico feliz que você pareça estar um pouco mais relaxado...?"
1002102-60 = "Quer relaxar um pouco mais e brincar assim comigo?"
1002102-61 = "O quê...!"
1002102-62 = "……Não. Eu já disse várias vezes. Tudo isso é para a sua segurança, Sensei."
1002102-63 = "Não é como se eu estivesse nervosa por ser a primeira vez na praia... ou algo do tipo. É meu dever ficar sempre alerta aos arredores."
1002102-64 = "E eu vim até você de propósito, é que..."
1002102-65 = "……Q-que foi? Essa sua cara..."
1002102-66 = "O que você quer dizer com isso...?"
1002102-67 = "[s5] \"Dizem que açúcar ajuda a aliviar a tensão, quer ir comer alguma coisa?\"\n[s6] \"Se não conseguir relaxar, pode vir falar comigo a qualquer momento.\""
1002102-68 = "Ah, sim. Então..."
1002102-69 = "……."
1002102-70 = "Ei, v-você tem certeza...?"
1002102-71 = "Nesse caso..."
1002102-72 = "……Ah. N-não, espere, isso é――"
1002102-73 = "……～～!!!! Sensei!!"
1002102-76 = "(O som do disparo de Azusa, que estava com o rosto completamente vermelho, ecoou pelos arredores.)"
1002102-77 = "(...O pessoal das lojas próximas veio ver o que estava acontecendo, e eu acabei pedindo desculpas junto com a Azusa.)"
