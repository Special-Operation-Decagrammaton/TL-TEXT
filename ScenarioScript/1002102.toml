[translation]
1002102-1 = "護衛対象"
1002102-2 = "（取り合えずアズサに位置情報を伝えた）"
1002102-3 = "（しばらくして、遠くから早歩きで近づいてくるアズサの姿が見えた）"
1002102-7 = "ここにいたのか、先生。はあ、思った通り……なんて無防備な場所に。"
1002102-8 = "何の話かって……？モモトークでも言った通りだ、この辺りは危ない。"
1002102-9 = "こうやって見通しが良いということは、狙われやすいということ。こんな身を隠すものも何も無いところにいるのは、戦術的観点からして良くない。"
1002102-10 = "……考えすぎ？"
1002102-11 = "先生。気持ちは分かるけど、浮かれるのは良くない。敵襲っていうのは、正にそういう時を狙ってくるもの。"
1002102-12 = "その上こんな場所にいたら、狙ってくださいと言ってるようなものだ。"
1002102-13 = "そもそも……っ！！"
1002102-14 = "先生、伏せて！！"
1002102-17 = "[ns]\"……！？\""
1002102-19 = "……。"
1002102-20 = "……ふう。"
1002102-21 = "ただの観光客か……もう大丈夫、起き上がって良いよ。"
1002102-22 = "[s1] \"そんなに緊張しなくても良いんじゃないかな……？\"\n[s2] \"アズサ、もしかして慣れない場所で緊張してる？\""
1002102-23 = "いや、その……。"
1002102-24 = "いや、その……。"
1002102-25 = "そんなことはない。実際今のだって近くに来るまで、彼女たちが敵意を隠していないとは限らなかった。"
1002102-26 = "せっかくの海だし、先生が言ってることは理解できる。でも、どんな時も万が一の事態は考えないといけない。危険はどんな日常にも潜んでるものだ。"
1002102-27 = "たった一度の油断が、取り返しのつかない結果を導くことだってある。"
1002102-28 = "……やっぱりここはダメだ、早く場所を移そう。もっと安全な場所を私が探すから。"
1002102-29 = "え？私と一緒にここにいたい？"
1002102-30 = "先生、だから……"
1002102-31 = "……。"
1002102-32 = "[s] \"アズサ？\""
1002102-33 = "はあ……分かった。護衛対象の意見を尊重するのも、こういう任務においては必要なこと。"
1002102-34 = "……でもその代わり、その要望を叶えるために、私の言うことには従ってもらう。"
1002102-35 = "まずはここを安全な場所にするから、少し待ってて。他のところには行っちゃダメ。"
1002102-36 = "[s] \"安全な場所に[ruby=・・]する[/ruby]？\""
1002102-37 = "うん、そんなに時間はかけない。"
1002102-39 = "（スッ）"
1002102-40 = "[s] \"そのシャベルは一体どこから！？\""
1002102-41 = "心配しないで、慣れてるから。"
1002102-42 = "この辺りは掘りやすそうだし。"
1002102-44 = "（引き留める間もなく、アズサは慣れた手つきで地面の砂を掘り始めた）"
1002102-46 = "うん、ちょっと荒いけどこんなとこかな。最低限、問題無い状態にはなった。"
1002102-47 = "[s3] \"速い！？\"\n[s4] \"その細腕でなんてスピード……。\""
1002102-48 = "これぐらい大したことじゃない。もう何十回も何百回もやってきたこと。"
1002102-49 = "これぐらい大したことじゃない。もう何十回も何百回もやってきたこと。"
1002102-50 = "……でも、まさかこうして先生を守るために役立つとは思わなかった。未来は分からないものだね。"
1002102-51 = "さあ、先生。こっちに。"
1002102-54 = "（中に入って、アズサのすぐ隣に座った）"
1002102-55 = "（中は意外と居心地が良くて、ちょっとした秘密基地感覚だった）"
1002102-56 = "……取り合えず、これで一安心。"
1002102-57 = "ん？どうかした、先生？"
1002102-58 = "……え？"
1002102-59 = "少し緊張がほぐれたみたいで良かった……？"
1002102-60 = "もう少し肩の力を抜いて、こうやって一緒に遊びたい？"
1002102-61 = "なっ……！"
1002102-62 = "……違う。何度も言ったはず。これは全部、先生の安全のため。"
1002102-63 = "別に、初めての海で緊張してたとか……そういうわけじゃない。常に周囲を警戒するのが私の役目。"
1002102-64 = "わざわざこうして先生のところに来たのも、その……"
1002102-65 = "……な、なに。その顔……。"
1002102-66 = "何が言いたいの……？"
1002102-67 = "[s5] \"緊張には糖分が効くって言うし、何か食べに行く？\"\n[s6] \"緊張がほぐれなかったら、いつでも私のところに来て。\""
1002102-68 = "あ、うん。じゃあ……"
1002102-69 = "……。"
1002102-70 = "え、い、良いの……？"
1002102-71 = "それなら……"
1002102-72 = "……あ。や、ちがっ、その――"
1002102-73 = "……～～っ！！！！先生っ！！"
1002102-76 = "（アズサが真っ赤な顔をしたまま撃った銃声が、周囲に響き渡った）"
1002102-77 = "（……何の騒ぎかと周囲のお店の人たちが集まってきてしまい、アズサと一緒に謝った）"
