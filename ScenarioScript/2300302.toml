[translation]
2300302-1 = "A imagem do hacker"
2300302-2 = "Sala de descanso da Veritas"
2300302-3 = "Após terminar meu trabalho no Seminário da Millennium Science School, passei na sala da Veritas no caminho de volta."
2300302-4 = "Hmmmm..."
2300302-9 = "Ah, Sensei. Você veio."
2300302-10 = "Sim, acabei de voltar do cinema, onde assisti a 'Eliminator 4'."
2300302-11 = "Mas, aquilo foi um pouco..."
2300302-12 = "[s] \"Essa expressão... por acaso não foi muito bom?\""
2300302-13 = "Não é que o filme fosse chato, é que teve partes que me incomodaram."
2300302-14 = "O filme em si foi até legal. Os efeitos visuais eram chamativos e os personagens tinham personalidade, então acho que a avaliação do público não deve ser ruim."
2300302-15 = "Sim... tudo isso foi bom, mas..."
2300302-16 = "A forma como retrataram o hacker no filme é inaceitável!"
2300302-17 = "[s] \"O que exatamente foi o problema?\""
2300302-18 = "Havia problemas por toda parte, mas o que mais me incomoda é... o estilo."
2300302-19 = "Mesmo que hackers tendam a preferir roupas confortáveis, o que era aquele moletom surrado que o hacker do filme usava? Isso faz parecer que hackers só vivem na frente do PC e não sabem nem escolher as próprias roupas."
2300302-20 = "Além disso, as cenas de hacking no filme foram muito artificiais."
2300302-21 = "Você acha possível que um único hacker consiga derrubar o sistema de uma grande empresa, protegido por todos os tipos de programas de segurança, de uma só vez? Mesmo que o hacker seja um gênio, existem limites, e isso é impossível na vida real."
2300302-22 = "E aquela cena onde, assim que o hacking é bem-sucedido, aparece uma caveira em arte ASCII na tela do alvo? Aquilo é infantil demais."
2300302-23 = "Não acredito que uma série famosa como 'Eliminator' tenha feito uma representação tão cheia de preconceitos."
2300302-24 = "[s] \"...Isso é um problema tão sério assim?\""
2300302-25 = "Claro que é um problema sério. Isso afeta a nós da 'Veritas', então não é algo irrelevante."
2300302-26 = "Quando hackers são retratados de forma tão preconceituosa em filmes populares, a imagem de hackers éticos como nós acaba sendo prejudicada também."
2300302-27 = "Nós não hackeamos por vingança ou desejos pessoais. O que a Veritas busca é apenas a verdade e a liberdade."
2300302-28 = "Mesmo assim, só porque é fácil e conveniente para o roteiro, retratar hackers como aqueles 'script kiddies' de terceira categoria... eu não aceito isso...!"
2300302-29 = "[s] \"Acho que não entendi muito bem o que você quer dizer...\""
2300302-31 = "...Não, não dá. Quanto a isso, é melhor darmos um aviso severo à produtora de 'Eliminator'."
2300302-32 = "Hm? Quer saber como vou entrar em contato com a produtora? É fácil, basta hackear o servidor deles."
2300302-33 = "Vou aproveitar a oportunidade para mostrar a eles a diferença entre um hacker de filme e um hacker de verdade."
2300302-34 = "Vejamos, o endereço do site da produtora é..."
2300302-37 = "Como esperado, eles têm um sistema de segurança poderoso. Mas, para esse nível de segurança, eu dou um jeito."
2300302-41 = "...Concluído. Agora, por onde começo a corrigir?"
2300302-42 = "Primeiro, vou baixar a nota do filme para 1 estrela e remover a permissão deles de alterar isso..."
2300302-45 = "Vou inserir vários textos no programa dizendo 'Não subestimem os hackers'..."
2300302-48 = "E por fim, vou colocar o logo da Veritas em arte ASCII... pronto, perfeito."
2300302-49 = "[s] \"............\""
2300302-50 = "Hm? Sensei, aconteceu alguma coisa?"
2300302-51 = "...Você está dizendo que o que eu estou fazendo não é muito diferente do hacker do filme?"
2300302-52 = "Não é nada disso, eu não faria um hacking por motivos pessoais ou usaria arte ASCII como no filme..."
2300302-54 = "...Bem, eu fiz, mas..."
2300302-55 = "Vou repetir: nem todos os hackers são assim!"
2300302-57 = "Depois disso, convenci Hare a desfazer as alterações no site."
