[translation]
2300302-1 = "ハッカーのイメージ"
2300302-2 = "ヴェリタス・ハッカー休憩室"
2300302-3 = "「セミナー」でのミレニアムサイエンススクールの仕事を終えて、帰り道にヴェリタスの部室へ寄った。"
2300302-4 = "うーーん……。"
2300302-9 = "あっ、先生。来たんだね。"
2300302-10 = "うん、さっき映画館で『エリミネーター4』を見て、ちょうど帰ってきたところだよ。"
2300302-11 = "ただ、ちょっとあれは……。"
2300302-12 = "[s] \"その表情……もしかして、イマイチだった？\""
2300302-13 = "映画がつまらなかったというより、気になった部分があったというか。"
2300302-14 = "映画自体はまあまあ面白かったよ。#nVFXも派手だったし、登場人物も個性的で、あれは観客からの評価も悪くなさそう。"
2300302-15 = "うん……その辺りは全部よかったんだけど……。"
2300302-16 = "映画に出てくるハッカーの、あの描写はどうかと思う！"
2300302-17 = "[s] \"どういうところが問題だったの？\""
2300302-18 = "あちこち問題だらけだったけど、まず気になるのは……ファッションかな。"
2300302-19 = "いくらハッカーが楽な服装を好む傾向にあるからって、作品に出てくるハッカーが着てた、あのヨレヨレのパーカーは何？あれだとまるでハッカーはいつもPCばっかり触ってて、服の選び方も知らない人ばっかり、みたいに思われちゃう。"
2300302-20 = "それに、作中のハッキングシーンもすごい不自然だった。"
2300302-21 = "あらゆるセキュリティプログラムで保護された大企業のシステムを、たった一人のハッカーが一回で崩せるなんてあり得ると思う？そのハッカーがいくら天才だとしても限界があるし、そんなことは実際にはあり得ない。"
2300302-22 = "しかも、ハッキングに成功するや否や、相手側の画面にアスキーアートでドクロのマークが出るあの演出は何？あれは流石に幼稚すぎる。"
2300302-23 = "『エリミネーター』シリーズみたいな有名な映画で、あんな偏見だらけの描き方をするなんて信じられないよ。"
2300302-24 = "[s] \"……それは、そんなに深刻な問題なの？\""
2300302-25 = "もちろん、深刻な問題だよ。これは私たち「ヴェリタス」にも影響を及ぼすから、関係のない話じゃない。"
2300302-26 = "大衆映画でこんなに偏見に溢れた形でハッカーを描写されると、私たちみたいなホワイトハッカーのイメージも一緒に悪くなりかねない。"
2300302-27 = "私たちは、私怨とか自分の欲望のためにハッキングはしない。ヴェリタスが追求するのは、真理と自由だけ。"
2300302-28 = "なのに、そうやって描写するのが分かりやすくて楽だからって、ハッカーをあんな三流のスクリプトキディみたいに描写するなんて、納得できない……！"
2300302-29 = "[s] \"ちょっと何を言ってるのか、全然分からないかも……。\""
2300302-31 = "……やっぱりダメ。#n今回の件に関しては、『エリミネーター』の制作会社に厳しめの警告をしておいた方がいい。"
2300302-32 = "うん？制作会社に連絡する方法があるのかって？#nそれは簡単、制作会社のサーバーをハッキングすればいい。"
2300302-33 = "この機会に、映画の中のハッカーと本物のハッカーがどれくらい違うのか、きちんと見せてあげるの。"
2300302-34 = "どれどれ、制作会社のホームページのアドレスは……。"
2300302-37 = "やっぱり、強力なセキュリティシステムが設置されてるね。#nでもこれぐらいのセキュリティなら、どうとでもなる。"
2300302-41 = "……クリア。さて、どこから修正しようか？"
2300302-42 = "まず、映画の評価を全部1点に下げて、それを上書き修正できないように権限を奪って……。"
2300302-45 = "プログラムの中に「ハッカーを舐めないで」ってテキストをたくさん入れて……。"
2300302-48 = "最後にヴェリタスのロゴのアスキーアートを浮かばせて……これで完璧。"
2300302-49 = "[s] \"…………。\""
2300302-50 = "ん？先生、どうかした？"
2300302-51 = "……私がやってることも、映画の中のハッカーとそんなに変わらないんじゃない、って？"
2300302-52 = "そんなことない、私は映画みたいに私的な目的のハッキングや、アスキーアートなんて……。"
2300302-54 = "……やったけど。"
2300302-55 = "もう一度言うけど、ハッカーがみんなこうってわけではないから！"
2300302-57 = "その後ハレを説得して、いたずらしたホームページは元に戻しておいた。"
