[translation]
84312101301-5 = "Bom. Acho que está na hora de nos despedirmos."
84312101301-6 = "……Embora eu não esteja muito animada com isso."
84312101301-7 = "Além disso, sendo você, pode vir visitar o meu quarto quando quiser, não é?"
84312101301-8 = "O quê, vai abrir a porta da frente para mim?"
84312101301-9 = "Nem pense nisso. Só que…… se você vier até o meu quarto, eu te receberei. Não posso garantir a sua segurança no caminho, no entanto."
84312101301-10 = "……Afinal, você é a líder da C&C."
84312101301-11 = "Ha……! Olha só o que você diz."
84312101301-12 = "Você é atrevida, mas não consigo te odiar."
84312101301-13 = "Isso é um elogio?"
84312101301-14 = "Não é um elogio."
84312101301-15 = "De qualquer forma. Bem, se precisar de algo, me chame. Eu irei até o seu quarto te visitar."
84312101301-16 = "……Fufu, farei com que preparem os doces mais refinados para te receber."
84312101301-17 = "Essas palavras…… guardarei com carinho na memória."
