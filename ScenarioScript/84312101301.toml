[translation]
84312101301-5 = "さっ。あたしらもそろそろお別れだな。"
84312101301-6 = "……あまり気は乗らないが。"
84312101301-7 = "それに君なら、私の部屋まで気軽に遊びに来れるだろう？"
84312101301-8 = "なんだ、表の玄関開けてくれんのか？"
84312101301-9 = "まさか。ただ……もし部屋まで来てくれたなら歓迎はしよう。道中の保障はできかねるが。"
84312101301-10 = "……君は、C&Cのリーダーなのだから。"
84312101301-11 = "ハッ……！言ってくれるじゃねえか。"
84312101301-12 = "生意気なんだけどなんか憎めねぇんだよなぁ。"
84312101301-13 = "褒めているのかい？"
84312101301-14 = "褒めてねえよ。"
84312101301-15 = "とにかく。ま、何かあれば呼べよ。[ruby=・]部[/ruby][ruby=・]屋[/ruby][ruby=・]ま[/ruby][ruby=・]で[/ruby][ruby=・]遊[/ruby][ruby=・]び[/ruby][ruby=・]に[/ruby][ruby=・]行[/ruby][ruby=・]っ[/ruby][ruby=・]て[/ruby]やるから。"
84312101301-16 = "……ふふ、もてなしの菓子には最高級のモノを用意させよう。"
84312101301-17 = "その言葉……大切に記憶しておこう。"
