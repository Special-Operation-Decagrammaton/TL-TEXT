[translation]
90000010-1 = "Episódio 2: “Coleta de Dados (1) Deserto de Abydos”"
90000010-2 = "O que precisamos agora é, acima de tudo, coletar dados sobre o Decagrammaton."
90000010-3 = "Portanto, vamos começar pelo “Deserto de Abydos”, um dos locais de aparição do Decagrammaton conhecidos atualmente."
90000010-4 = "Pode ser difícil encontrar o “Binah”, mas existem várias entidades que parecem ser subordinadas do Decagrammaton vagando por esta área."
90000010-5 = "Por enquanto, vamos lidar com elas enquanto coletamos os dados."
