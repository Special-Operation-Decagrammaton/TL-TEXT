[translation]
1010902-1 = "無色"
1010902-2 = "ミレニアム寮・廊下"
1010902-4 = "（翌日、急いで仕事を片付けてミレニアムの寮に向かった）"
1010902-5 = "[ns1] （ノアが体調を崩すなんて珍しい……）\n[ns2] （大丈夫だと良いんだけど……）"
1010902-9 = "……どちら様でしょうか？"
1010902-15 = "……あら、[USERNAME]先生。"
1010902-16 = "どうしてこちらに……？"
1010902-17 = "[s3] \"体の調子はどう？\"\n[s4] \"心配で様子を見に来たんだ。\""
1010902-20 = "ご心配をおかけして、申し訳ありません。"
1010902-21 = "安静にしていたので、落ち着いてきま……。"
1010902-22 = "けほっ、けほっ。"
1010902-23 = "[ns] \"大丈夫！？\""
1010902-25 = "[ns5] \"差し入れを持ってきたから……。\"\n[ns6] \"ちょっとお邪魔しても良いかな？\""
1010902-28 = "え？か、構いませんが……。"
1010902-29 = "いらっしゃるとは思わなかったので、掃除が……。"
1010902-30 = "少しお待ちいただいても、よろしいですか？"
1010902-31 = "[s7] \"体調を崩してるんだから当然だよ！\"\n[s8] \"掃除なら私がやるよ！\""
1010902-34 = "そういう意味ではなかったのですが……。"
1010902-35 = "けほっ、けほっ……立ち話も何ですし、どうぞこちらへ。"
1010902-40 = "ノアの部屋"
1010902-43 = "[ns] \"の、ノア……。\""
1010902-44 = "あ、すみません。"
1010902-45 = "こちらの椅子をお使いください。"
1010902-46 = "[s] \"いや、そうじゃなくて……。\""
1010902-50 = "[ns] \"もしかして、引っ越してきたばかり？\""
1010902-51 = "いえ、新入生の頃からずっとこの部屋です。"
1010902-52 = "[s9] \"じゃあ、二年近く住んでるんだ。\"\n[s10] \"それにしては、シンプルな部屋だね。\""
1010902-55 = "こう見えて、生活用品は一通り揃っているんですよ？"
1010902-56 = "教科書や文房具は、あちらの引き出しに。"
1010902-57 = "洗面道具や衛生用品は、奥の棚に。"
1010902-58 = "[s11] \"生活用品というよりも……。\"\n[s12] \"ノアの私物が見当たらないような。\""
1010902-61 = "ふふっ、ユウカちゃんにも似たようなことを言われました。"
1010902-62 = "前はインテリアを置いていたんですが……。"
1010902-63 = "私にはふさわしくない気がして。結局こうなってしまいまして……。"
1010902-64 = "[s] \"どうして？\""
1010902-65 = "私自身がセミナーの書記として、客観的であるべきだと思っておりまして。"
1010902-66 = "偏見を持たないよう、主観を切り捨てていった結果……ですね。"
1010902-67 = "たまに、個性がないと言われたりもしますが……ごほっ。"
1010902-68 = "でも、これこそが私の「個性」だと思っています。"
1010902-69 = "[s13] \"たしかに、あえて残す余白はユニークだけど……。\"\n[s14] \"「シミ」があるくらいの方が、素敵に見えるかも。\""
1010902-72 = "……シミ、ですか？"
1010902-73 = "[s15] \"うん。\"\n[s16] \"シミひとつない空間を維持するのは、大変だよね。\""
1010902-76 = "[ns17] \"でも、真っ白な部屋に「[ruby=シミ]個性[/ruby]」があれば……。\"\n[ns18] \"自分にも優しくなれるんじゃないかな？\""
1010902-79 = "……そうですね。"
1010902-80 = "シミを気にしなくて良いくらいのゆとりが、あってもいいですよね。"
1010902-81 = "ですが……模様替えしようにもインテリアには疎くて……。"
1010902-82 = "もしよければ、手伝っていただけませんか？"
1010902-83 = "先生と一緒なら、きっとうまくいくと思うんです。"
1010902-84 = "[s] \"もちろんだよ、何が良いか考えてみるね。\""
1010902-85 = "はい、次お会いする際は――"
1010902-86 = "けほっ、けほっ……！"
1010902-87 = "[ns] \"まずは風邪を治さないとね。\""
1010902-88 = "心配をおかけして、申し訳ありません。"
1010902-89 = "[ns19] \"ご飯は食べた？\"\n[ns20] \"何か私が作るよ！\""
1010902-92 = "まだですが……冷蔵庫には、たまごしか……。"
1010902-93 = "[s] \"それで充分だよ。\""
1010902-99 = "（台所を借りて、たまごのおかゆを作った）"
1010902-100 = "（ありきたりな味になってしまったが、ノアはおいしそうに食べてくれた）"
