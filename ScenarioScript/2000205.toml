[translation]
2000205-1 = "Remédio de dieta"
2000205-2 = "Rua da Associação Genbu"
2000205-3 = "Parece que você conseguiu chegar aqui sem se perder."
2000205-4 = "Hehe, o Sensei deve saber, mas este é o famoso distrito da Associação Genbu de Shanhaijing, conhecido pelas iguarias das montanhas e mares!"
2000205-5 = "Dizem que há uma disputa secreta entre o conselho estudantil e a administração sobre o funcionamento das barracas, e #nembora seja um lugar com vários rumores interessantes, o sabor é inquestionável!"
2000205-6 = "Não sei se isso compensa o erro da última vez, mas #nhoje, especialmente, vou te apresentar um restaurante delicioso que descobri aqui!"
2000205-7 = "Falando nisso, Sensei... ainda tem uns pelos finos no seu rosto, parecendo um ratinho. Hehe..."
2000205-8 = "D-desculpe, Sensei. Eu sei que não deveria rir, mas é engraçado... hahaha!"
2000205-9 = "Pff... não se preocupe, Sensei. O efeito daquele elixir não dura muito. #nProvavelmente, em um mês, eles vão cair sozinhos."
2000205-10 = "Bem, então vamos entrar no restaurante."
2000205-13 = "Loja de Lamen"
2000205-15 = "Bem-vindo, o que vai pedir?"
2000205-16 = "O de sempre: #n'Macarrão firme, caldo encorpado, vegetais em dobro, alho e gordura extra', dois por favor!"
2000205-17 = "Certo, pedido anotado. #n'Macarrão firme, caldo encorpado, vegetais em dobro, alho e gordura extra', dois!"
2000205-19 = "(Murmúrios)"
2000205-20 = "C-capitã, você ouviu isso? Aquela baixinha pediu o 'pedido padrão'."
2000205-21 = "Não ouvi errado, ouvi...? Quem diria que uma estudante do ensino médio pediria 'macarrão firme, caldo encorpado, vegetais em dobro, alho e gordura extra' aqui..."
2000205-24 = "Hehe, estou ansiosa por isso."
2000205-25 = "[s] \"Macarrão firme, caldo... o quê?\""
2000205-26 = "O Sensei tem uma memória ruim, hein. #n'Macarrão firme, caldo encorpado, vegetais em dobro, alho e gordura extra'. #nÉ o meu pedido especial, então com certeza vai ser delicioso~."
2000205-27 = "Se eu consigo comer tudo? #nClaro! Eu consigo fazer qualquer coisa!"
2000205-28 = "Para uma estudante daquela idade, só de adicionar gordura, as calorias deveriam ser preocupantes... #nNão tem como ela manter esse corpo tão magro comendo aquela bomba calórica!"
2000205-29 = "Exatamente. Ela disse que era o 'de sempre', mas com certeza não vai conseguir comer nem a metade."
2000205-30 = "Aqui está, #n'Macarrão firme, caldo encorpado, vegetais em dobro, alho e gordura extra', dois pedidos."
2000205-31 = "Finalmente chegou! Itadakimasu!"
2000205-33 = "Obrigada pela refeição!"
2000205-36 = "Você viu, capitã! #nAquela baixinha, num instante... até o caldo ela bebeu tudo."
2000205-37 = "Mesmo com aquele corpo pequeno, ela devorou o 'macarrão firme, caldo encorpado, vegetais em dobro, alho e gordura extra' num piscar de olhos! Assustador..."
2000205-42 = "Ei, eu não estou alucinando, você acabou de comer tudo, inclusive o caldo, né?"
2000205-43 = "Sim, e daí? Algum problema?"
2000205-44 = "Você não tem medo das calorias daquele caldo!? #nSó de comer uma tigela, você já ultrapassa a ingestão calórica diária facilmente...!"
2000205-45 = "Hehehe, não precisa se preocupar! Basta ter este remédio de dieta especial que eu desenvolvi!"
2000205-46 = "Remédio de dieta especial?"
2000205-47 = "Isso mesmo, se você tomar isso, não importa o quanto coma de comida calórica, você não vai engordar nada!"
2000205-48 = "Oh... v-você poderia nos vender esse remédio? Pagamos o quanto for preciso!"
2000205-49 = "Não preciso de dinheiro. Em troca, quero que me contem depois o quanto foi eficaz!"
2000205-50 = "Isso é uma grande ajuda, agradecemos!"
2000205-51 = "Com esse remédio, poderemos comer gordura de porco, macarons, tudo o que quisermos!"
2000205-52 = "Estou realmente ansiosa por isso..."
2000205-56 = "Hehehe, é verdade. Estou realmente, muito ansiosa."
2000205-58 = "Laboratório da Saya"
2000205-64 = "Arf, arf... f-finalmente te encontrei. Sua... sua vigarista..."
2000205-65 = "C-como você pôde nos dar um remédio falso...!"
2000205-66 = "Ué? O efeito da dieta não foi bom? Será que eu deveria ter dado um remédio mais forte?"
2000205-67 = "Não! É o contrário!"
2000205-68 = "Tudo o que comemos é digerido instantaneamente... #ne não importa o quanto a gente coma, nunca nos sentimos satisfeitas...!"
2000205-69 = "Desse jeito, vamos acabar morrendo de fome..."
2000205-70 = "Mas o efeito de emagrecer é garantido, não é? #nSe o resultado é não engordar, então foi um sucesso. Hahaha!"
2000205-71 = "Sua... você não vai sair impune dessa...!"
2000205-72 = "Não dá... minhas forças estão indo embora... nem ficar de pé eu consigo mais..."
2000205-76 = "Hmm... talvez eu deva tentar criar e vender um remédio que faz você engordar só de beber água?"
