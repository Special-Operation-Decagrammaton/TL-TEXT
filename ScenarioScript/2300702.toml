[translation]
2300702-1 = "少し変わった女の子"
2300702-2 = "（ハナコと約束した通り、トリニティ総合学園に到着した）"
2300702-3 = "（トリニティはいつ見ても相変わらず、古風で上品なキャンパスで……）"
2300702-4 = "先生～。"
2300702-5 = "こちらですよ～。"
2300702-6 = "[s] \"……？\""
2300702-8 = "[s] 音が聞こえた方に振り向く。"
2300702-11 = "[wa:1000]― こんにちは、[wa:1000]先生。"
2300702-13 = "[wa:200]― 来ていただいて、[wa:1350]ありがとうございます。"
2300702-16 = "[ns] \"……何してるの？\""
2300702-17 = "[wa:400]― こうしていると[wa:800]涼しくて、[wa:1600]とっても[wa:700]気持ち良いんですよ。"
2300702-20 = "― 私にとっての[wa:1500]特等席なんです、[wa:2000]ふふっ……。"
2300702-23 = "[wa:900]― せっかくですし、[wa:2450]先生もいかがですか？"
2300702-26 = "― ここで[wa:450]一緒に、[wa:1850]脱いでしまいません……？"
2300702-29 = "[ns1] \"ちょっとその誘いに乗るのは何だか……。\"\n[ns2] \"遠慮しておこうかな……。\""
2300702-30 = "[wa:1650]― こうして、[wa:1400]こんな真っ昼間から素肌をさらしていると、"
2300702-31 = "[wa:1550]― こうして、[wa:1350]こんな真っ昼間から素肌をさらしていると、"
2300702-33 = "― 何だか[wa:500]楽しくなってくるんですよ？"
2300702-36 = "― イケないことをしてる……[wa:2500]そんな感じがして。"
2300702-39 = "（ハナコは靴を履いて、噴水から降りてこちらの方へと来た）"
2300702-42 = "ふふ……。"
2300702-43 = "先生は脱ぐの、お好きではないのですか？"
2300702-44 = "私は結構好きでして。時々、全部脱いだ状態で校庭を歩いたりもするのですが、そうするとえも言われぬ気持ちになれるんです……。"
2300702-45 = "普段日常を過ごしている空間で、非日常的な行いをすることはこう、禁忌を犯しているような感覚と言いますか……。"
2300702-46 = "本で読んだのですが、健康にも良いのだとか。"
2300702-47 = "先生もいかがですか？意外と自分の欲望の形というのはわからないものです。やってみたら、意外とハマってしまうかもしれませんよ……？"
2300702-48 = "[s3] \"……靴と、靴下の話だよね？\"\n[s4] \"裸足で過ごす、っていう話だよね？\""
2300702-49 = "ふふっ……。"
2300702-50 = "ふふっ……。"
2300702-51 = "指圧的な効果があるので肉体的な健康にはもちろん、精神的な健康にも良さそうですし。"
2300702-52 = "いっそ、トリニティ全体で流行ったら面白そうですね。"
2300702-53 = "みんなで一斉に脱いでしまって、晴れやかな気持ちで登校する……"
2300702-54 = "ふふっ、想像するだけですごい景色だと思いません？"
2300702-55 = "[s] \"裸足で登校っていう話だよね……？\""
2300702-56 = "いえ、裸で登校するお話です。は・だ・か、で♡"
2300702-57 = "全員が一糸まとわぬ姿で、■■を■■のも■■にして、■■してないかどうか■■で■■■■に■■してもらって■■■■■■■■■■るんです。"
2300702-58 = "[s] \"…………。\""
2300702-59 = "……。"
2300702-60 = "……なんて、冗談ですよ、先生。いくら何でも、このトリニティでそんなことは起きません。"
2300702-61 = "ですが、もし叶ったらきっと、すごく楽しいでしょうね……。"
2300702-62 = "[s5] 閑話休題。\n[s6] 本題に移る。"
2300702-63 = "……あ、はい。そうでした。"
2300702-64 = "……あ、はい。そうでした。"
2300702-65 = "聞きたいことがあって先生をお呼びしたのに、何だか先生とこういうお話をしているとつい楽しくなってしまって……。"
2300702-66 = "それでは場所を移しましょうか。私が「お勉強」にぴったりの場所を確保しておきましたので。"
2300702-67 = "あれこれと、実技を教わるのにぴったりの……。"
2300702-68 = "さあ、では行きましょうか。"
2300702-75 = "……先生、どうかしましたか？そんなところに立ってないで、早く行きましょう？"
2300702-76 = "[s7] 念のため……\n[s8] その「場所」がどこなのか聞いてみる。"
2300702-77 = "決まってるじゃないですか、放課後の補習授業といえば……"
2300702-78 = "決まってるじゃないですか、放課後の補習授業といえば……"
2300702-79 = "誰も来ない、「体育倉庫」ですよ。安心してください、この通り鍵も借りておきましたので……。"
2300702-80 = "[s9] \"異議あり！\"\n[s10] \"断固拒否！\""
2300702-81 = "あら……"
2300702-82 = "あら……"
2300702-83 = "それはつまり……ここで、ということですか？"
2300702-84 = "ここは結構、人も行き来しますし……こんな明るい時間帯から広場でというのはなかなかハードな……。"
2300702-85 = "ですが、一生に一度のことですし、それくらいインパクトがあっても……？"
2300702-86 = "[s] \"勉強！ 勉強の話だよね！？\""
2300702-87 = "はい、お勉強の話ですよ？大人の方に教えていただく「お勉強」……。"
2300702-88 = "ふふ……すみません、ちょっとからかい過ぎてしまいましたね。先生の反応があまりにも良くって。"
2300702-89 = "……では。"
2300702-90 = "本館の図書館にでも行きましょうか。人も多いところなので、心配しなくても大丈夫ですよ。"
2300702-91 = "さあ、行きましょう。"
2300702-93 = "（その後、全力で警戒しながらハナコの後についていったものの、行き先は本当に図書館だった）"
2300702-94 = "（……実際の質問は1、2問だけだったので、図書館に到着するまでの時間よりも、到着してからの時間の方が短かった）"
