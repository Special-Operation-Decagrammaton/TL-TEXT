[translation]
2300702-1 = "Uma garota um pouco peculiar"
2300702-2 = "（Conforme prometido com Hanako, cheguei à Academia Trinity.）"
2300702-3 = "（Trinity continua sendo um campus clássico e elegante, não importa quantas vezes eu veja...）"
2300702-4 = "Sensei~."
2300702-5 = "É por aqui~."
2300702-6 = "[s] \"……？\""
2300702-8 = "[s] Viro-me na direção de onde o som veio."
2300702-11 = "[wa:1000]― Olá, [wa:1000]Sensei."
2300702-13 = "[wa:200]― Obrigado por [wa:1350]vir."
2300702-16 = "[ns] \"……O que você está fazendo?\""
2300702-17 = "[wa:400]― Ficar assim é [wa:800]refrescante, [wa:1600]e muito [wa:700]agradável."
2300702-20 = "― É o meu [wa:1500]lugar favorito, [wa:2000]fufu..."
2300702-23 = "[wa:900]― Já que estamos aqui, [wa:2450]o que acha de se juntar a mim, Sensei?"
2300702-26 = "― Por que não [wa:450]tira tudo [wa:1850]aqui comigo...?"
2300702-29 = "[ns1] \"Acho que não é uma boa ideia aceitar esse convite...\"\n[ns2] \"Acho melhor eu recusar...\""
2300702-30 = "[wa:1650]― Sabe, [wa:1400]expor a pele nua em plena luz do dia assim,"
2300702-31 = "[wa:1550]― Sabe, [wa:1350]expor a pele nua em plena luz do dia assim,"
2300702-33 = "― De alguma forma, [wa:500]começa a ficar divertido, não acha?"
2300702-36 = "― É como se eu estivesse fazendo algo proibido... [wa:2500]Essa é a sensação."
2300702-39 = "（Hanako calçou os sapatos, desceu da fonte e veio em minha direção）"
2300702-42 = "Fufu..."
2300702-43 = "Sensei, você não gosta de se despir?"
2300702-44 = "Eu gosto bastante. Às vezes, eu até ando pelo pátio da escola completamente nua, e isso me traz uma sensação indescritível..."
2300702-45 = "Fazer algo fora do comum em um espaço onde você passa o seu dia a dia... é como se você estivesse cometendo um tabu, sabe?"
2300702-46 = "Li em um livro que também faz bem para a saúde."
2300702-47 = "O que acha, Sensei? Às vezes não conhecemos a forma dos nossos próprios desejos. Se você tentar, pode acabar gostando..."
2300702-48 = "[s3] \"……Você está falando dos sapatos e das meias, certo?\"\n[s4] \"Você quer dizer andar descalço, não é?\""
2300702-49 = "Fufu..."
2300702-50 = "Fufu..."
2300702-51 = "Como tem um efeito de acupressão, é bom não só para a saúde física, mas também para a saúde mental."
2300702-52 = "Seria interessante se isso se tornasse uma moda em toda Trinity."
2300702-53 = "Todo mundo se despindo ao mesmo tempo e indo para a aula com uma sensação de leveza..."
2300702-54 = "Fufu, não acha que seria uma cena incrível só de imaginar?"
2300702-55 = "[s] \"Você está falando de ir para a escola descalço, certo……?\""
2300702-56 = "Não, estou falando de ir para a escola pelada. Nu-a, mesmo♡"
2300702-57 = "Todas estariam sem nada, e para [log=■■] o [log=■■], seria [log=■■], e para ver se [log=■■] não estão [log=■■], [log=■■] para [log=■■■■] e [log=■■■■■■■■■■]."
2300702-58 = "[s] \"…………。\""
2300702-59 = "……."
2300702-60 = "……Estou brincando, Sensei. Por mais que seja, algo assim nunca aconteceria em Trinity."
2300702-61 = "Mas, se acontecesse, com certeza seria muito divertido..."
2300702-62 = "[s5] Mudando de assunto.\n[s6] Vamos ao que interessa."
2300702-63 = "……Ah, sim. É verdade."
2300702-64 = "……Ah, sim. É verdade."
2300702-65 = "Eu chamei o Sensei porque tinha algo para perguntar, mas conversar com você sobre essas coisas acaba sendo tão divertido..."
2300702-66 = "Então, vamos mudar de lugar? Eu reservei o local perfeito para o nosso \"estudo\"."
2300702-67 = "Um lugar perfeito para aprender várias coisas, inclusive na prática..."
2300702-68 = "Vamos lá, então."
2300702-75 = "……Sensei, aconteceu alguma coisa? Não fique parado aí, vamos logo?"
2300702-76 = "[s7] Por precaução……\n[s8] Perguntar onde fica esse \"lugar\"."
2300702-77 = "Já está decidido, quando se fala em aulas de reforço depois da escola..."
2300702-78 = "Não é óbvio? Quando se fala em aulas de reforço depois da escola..."
2300702-79 = "É o \"depósito de educação física\", onde ninguém aparece. Pode ficar tranquilo, eu até já peguei a chave..."
2300702-80 = "[s9] \"Objeção!\"\n[s10] \"Recuso terminantemente!\""
2300702-81 = "Ora..."
2300702-82 = "Ora..."
2300702-83 = "Isso significa que... é aqui mesmo?"
2300702-84 = "Muita gente passa por aqui... e fazer isso na praça, em plena luz do dia, é um pouco intenso demais..."
2300702-85 = "Mas, é algo que só acontece uma vez na vida, então talvez um impacto desse tamanho seja..."
2300702-86 = "[s] \"Estudos! Estamos falando de estudos, certo!?\""
2300702-87 = "Sim, estamos falando de estudos. Aquele \"estudo\" que um adulto vai me ensinar..."
2300702-88 = "Fufu... desculpe, acabei provocando demais. É que a reação do Sensei é muito boa."
2300702-89 = "...Então."
2300702-90 = "Vamos para a biblioteca do prédio principal. Tem bastante gente lá, então não precisa se preocupar."
2300702-91 = "Vamos, vamos."
2300702-93 = "(Depois disso, segui a Hanako em alerta máximo, mas o destino era realmente a biblioteca)"
2300702-94 = "(...Como as perguntas eram apenas uma ou duas, o tempo que passamos lá foi menor do que o tempo que levei para chegar até lá)"
