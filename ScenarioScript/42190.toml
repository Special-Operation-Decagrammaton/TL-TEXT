[translation]
42190-1 = "Episódio 19; Abismo"
42190-5 = "Sensei, por aqui."
42190-6 = "A escada que a Kirino-san mencionou leva a este corredor."
42190-7 = "A inclinação é íngreme, então tome cuidado onde pisa para não cair."
42190-15 = "……Realmente, é um lugar suspeito."
42190-16 = "Parece que foi uma construção apressada; o acabamento dos corrimãos e dos materiais é bem amador, mas...#n...a fiação para fornecimento de energia e comunicação está conectada."
42190-22 = "Isto é... bastões luminosos usados foram descartados no chão."
42190-23 = "Provavelmente, as veteranas também usaram este corredor para entrar nas instalações subterrâneas."
42190-24 = "[s] \"Bastões luminosos?\""
42190-25 = "Sim. Durante operações em locais escuros, é um tipo de sinalizador usado por forças especiais para verificar a possibilidade de entrada e identificar aliados e inimigos..."
42190-26 = "Ou seja... há uma alta probabilidade de que o FOX Squad esteja de tocaia logo à frente."
42190-27 = "Para garantir uma rota de entrada segura, iniciarei o arrombamento da porta."
42190-28 = "Sensei, por favor, afaste-se para não se ferir com a granada."
42190-34 = "Então... lá vou eu!"
42190-44 = "[ns] \"Que lugar é este, afinal...\""
42190-45 = "……É um hangar militar."
42190-49 = "Equipamentos militares e trilhos de transporte... Posso ver um elevador lá no fundo."
42190-50 = "Com um hangar deste tamanho... seria possível suprir pelo menos um batalhão inteiro."
42190-51 = "[s] \"Por que uma instalação militar como esta estaria debaixo da estação...?\""
42190-52 = "Não tenho certeza, mas..."
42190-53 = "Geralmente, instalações militares são construídas nos subúrbios porque os cidadãos não gostam delas. Isso acaba aumentando os custos de transporte e operação, mas—"
42190-54 = "Se conseguirem construir um hangar grande dentro da cidade assim... teoricamente, os custos necessários podem ser drasticamente reduzidos. E essa diferença pode ser investida em equipamentos—"
42190-55 = "Especialmente porque esta instalação fica logo abaixo da estação, então, em caso de \"emergência\", é possível enviar tropas para várias partes de D.U. usando a ferrovia..."
42190-60 = "……Acho que agora entendo um pouco o motivo da Kaiser Group ser tão obcecada pela reurbanização da Cidade dos Coelhinhos."
42190-61 = "[s] \"Mas se tudo for explodido, será um esforço inútil, não é?\""
42190-62 = "……Sim."
42190-63 = "Se usarem uma granada termobárica, este lugar desaparecerá sem deixar vestígios."
42190-64 = "Este é um lugar secreto, que nem mesmo aqueles que vagavam pelas sombras da sociedade conheciam."
42190-65 = "É por isso que os poderosos podem expor suas verdadeiras intenções repugnantes aqui."
42190-66 = "Talvez, para eles, este fosse o único lugar onde poderiam satisfazer seus desejos e seu orgulho."
42190-67 = "E... o quão terrível deve ser o medo que eles querem causar a ponto de abrir mão de uma instalação como esta..."
42190-68 = "[s] \"...Por acaso, você está nervosa?\""
42190-69 = "……Não."
42190-70 = "Assim como a justiça que não é reconhecida por ninguém e nunca é dita em voz alta não tem poder."
42190-71 = "O medo que ninguém vê não vale mais do que uma marmita vencida jogada no lixo."
42190-72 = "……Eu também só percebi isso agora que chegamos a este ponto."
42190-73 = "O quanto o nome da autoridade herdado de outros é inútil."
42190-74 = "O horário atual é 11:30.#nFalta pouco para a detonação da ogiva."
42190-75 = "O que precisamos fazer é—"
42190-82 = "Espere um momento, Sensei."
42190-83 = "Como esta é uma área onde as veteranas entraram primeiro, é perigoso se aproximar sem um plano."
42190-84 = "Vou enviar um drone para reconhecimento primeiro."
42190-88 = "Drone, ativado."
42190-102 = "……Como esperado, fomos alvejadas."
42190-103 = "A profundidade da marca do disparo e aquela velocidade...#nO atirador está usando munição de fuzil antimaterial de 12.7mm... É a Otogi-senpai."
42190-104 = "Se fosse um inimigo comum, eu avançaria com tudo, mas...#nSendo a Otogi-senpai, ela mirará nos pontos vitais no próximo disparo."
42190-105 = "Mesmo eu não conseguiria resistir se fosse atingida em um ponto vital."
42190-106 = "Se tivéssemos um soldado de vanguarda equipado com proteção balística..."
42190-108 = "……Parece que finalmente se lembraram de nós."
42190-112 = "Essa voz..."
42190-122 = "……Que tipo de capitã abandona seus subordinados?"
42190-123 = "Isso é cruel, Miyako-chan..."
42190-124 = "Que frieza. #nPelo menos, você poderia ter nos avisado, não acha?"
42190-126 = "Bem, é que..."
42190-127 = "……Me, me desculpem. #nEu achei que seria um pedido absurdo para vocês..."
42190-128 = "Por que seria um pedido absurdo?"
42190-129 = "É que... isso acabaria forçando vocês a fazerem sacrifícios."
42190-130 = "O caminho que escolhi seguir não tem disciplina rigorosa, equipamentos poderosos ou um quarto aquecido."
42190-131 = "Apenas a justiça em que acredito será satisfeita... é um caminho de vida árduo e doloroso que me aguarda..."
42190-132 = "Eu não poderia pedir para vocês desistirem da vida que desejam por causa da minha justiça..."
42190-139 = "……Ai."
42190-140 = "Você é mesmo impossível de convencer..."
42190-142 = "Que história é essa de 'minha justiça'? #nIsso não é algo que pertence a toda a SRT?"
42190-143 = "……N, nós também entramos na SRT porque admirávamos vocês, veteranas..."
42190-145 = "Uma disciplina rigorosa que nunca se quebra, mesmo em situações extremas."
42190-146 = "Uma força avassaladora capaz de subjugar qualquer vilão com um único golpe!"
42190-147 = "Uma coragem ousada que não vacila nem diante de inimigos terríveis..."
42190-148 = "Lutar contra inimigos desconhecidos dá um pouco de medo, mas... se estivermos todas juntas, não tenho medo."
42190-150 = "Em situações onde a vitória é fácil, o gosto da destruição das balas que disparamos perde a graça."
42190-151 = "Afinal, existem verdades neste mundo que não estão escritas nos manuais..."
42190-158 = "Nós acreditamos na justiça da Miyako."
42190-164 = "……."
42190-165 = "……Entendido."
42190-166 = "Então, pessoal, por favor, verifiquem seus equipamentos antes da invasão. #nAssim que estiverem prontas, iniciaremos a operação."
42190-168 = "Um combate real contra o FOX Squad... talvez eu fique um pouco nervosa."
42190-169 = "Concordo. É como se estivéssemos lutando contra monstros invisíveis em uma caverna."
42190-170 = "Falando nisso, não tinha uma cena assim naquele livro antigo de Trinity que a gente comentou?"
42190-171 = "Sim. Lembro que havia uma descrição assim no livro onde coelhos selvagens lutam contra uma ordem de cavaleiros."
42190-172 = "A mensagem escrita naquela caverna era, se não me engano..."
42190-174 = "“Apenas aqueles com um coração corajoso e puro encontrarão o caminho na Caverna de Caerbannog”."
42190-181 = "……Eu também gosto dessa história."
42190-182 = "[s] \"Já decidiram o nome da operação?\""
42190-183 = "Agora que você mencionou, ainda não decidimos o nome da operação..."
42190-184 = "Já que estamos aqui, que tal usarmos o título daquele livro como nome da operação?"
42190-185 = "Ah, vamos fazer isso então."
42190-186 = "Apoio!"
42190-188 = "Certo, então..."
42190-194 = "Operação “Coelho de Caerbannog” — iniciada!"
