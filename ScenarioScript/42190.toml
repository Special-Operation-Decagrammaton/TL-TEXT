[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 11/06.
42190-1 = "Episódio 19: O Abismo"
42190-5 = "Sensei, os nossos passos devem ser silenciosos por aqui."
42190-6 = "A rota de fuga que a Patrulheira Kirino desenhou para nós converge com as escadas de manutenção pesada."
42190-7 = "O declive dos degraus de concreto é cruel e não há iluminação. Segure firme na parede."
42190-15 = "……Realmente, esse túnel emite uma aura asfixiante."
42190-16 = "As juntas e as soldas parecem mal-acabadas, como se a escavação tivesse sido feita às pressas sob sigilo...#nNo entanto, a malha de cabos de força e dutos de fibra óptica é espessa e de última geração militar..."
42190-22 = "Espere. O chão está sujo. Tem um par de bastões de luz química militar quebrados aqui."
42190-23 = "O líquido brilha fraco... Isso significa que a vanguarda das nossas veteranas cruzou essas escadas recentemente."
42190-24 = "[s] \"Luzes químicas? Pra que jogar lixo no chão?\""
42190-25 = "Na doutrina de incursão noturna, os times de vanguarda quebram Cyalumes táticos no chão para demarcar zonas varridas e criar uma trilha de sinalização segura para os fuzileiros que vêm atrás..."
42190-26 = "Sendo assim... nós invadimos a trilha oficial de extração. O Esquadrão FOX deve ter armado uma guarita de defesa nas próximas portas blindadas."
42190-27 = "A discrição acabou. Iniciaremos protocolo de arrombamento dinâmico para furar o cerco."
42190-28 = "A detonação da carga de corte será violenta e espalhará estilhaços pesados. O senhor precisa recuar pra trás da quina de contenção."
42190-34 = "Posição engatilhada... Detonar!"
42190-44 = "[ns] \"Meu Deus... que tipo de escavação amaldiçoada é essa...?\""
42190-45 = "……Um hangar militar colossal."
42190-49 = "Temos trilhos de carga pesada dimensionados para vagões balísticos... e poços de elevação tática no fundo da caverna."
42190-50 = "Com a metragem e o pé direito desse salão... daria para estocar blindados pesados e munição suficientes para abastecer um batalhão blindado inteiro e travar uma guerra."
42190-51 = "[s] \"Por que diabos uma estrutura de guerra desse escopo foi cimentada embaixo dos pés de civis andando de trem...?\""
42190-52 = "Não é uma prova cabal, mas a engenharia aponta para um objetivo óbvio..."
42190-53 = "Tradicionalmente, a opinião pública despreza a poluição sonora de blindados e bases aéreas, empurrando as frotas do conselho para os ermos das montanhas. O preço logístico para mobilizar essa frota até a cidade é astronômico e lento..."
42190-54 = "Mas, se generais ou políticos gananciosos subornassem fiscais para cavar silos gigantescos nos esgotos mortos da cidade... O corte de custo de mobilização seria imediato. O excedente sangrento seria lavado no caixa dois..."
42190-55 = "E o trunfo letal: numa 'Emergência de Estado', com os túneis ferroviários conectados ao hangar, eles poderiam vomitar exércitos e blindados no coração da cidade em minutos..."
42190-60 = "……Agora a teimosia canibal da Kaiser Corporation em escavar e dominar a revitalização do bairro da Vila dos Coelhinhos faz total sentido."
42190-61 = "[s] \"Mas se a ogiva termobárica detonar aqui... o fogo vai derreter toda essa máquina secreta que eles suaram sangue pra construir.\""
42190-62 = "……Exato."
42190-63 = "O calor nuclear contido desta ogiva transformaria essa caverna e os túneis em poeira calcinada e magma. Não sobraria nem o aço."
42190-64 = "Este poço é um cemitério escondido―― Uma vergonha colossal que o populacho ignorava enquanto vagava na superfície."
42190-65 = "É o cofre escuro onde a elite engravatada guardou as armas e as mentiras que dariam suporte às suas tiranias."
42190-66 = "O hangar era o altar particular onde a vaidade dos generais e políticos se alimentava do poder puro da guerra militar sem responder à lei."
42190-67 = "E se eles agora preferem carbonizar este tesouro secreto a mantê-lo inteiro... a escala do terror e da submissão que eles esperam arrancar de Kivotos amanhã deve ser apocalíptica."
42190-68 = "[s] \"……Sua mão tá tremendo, Miyako. É o medo engolindo?\""
42190-69 = "……Negativo."
42190-70 = "A justiça que chora em silêncio no escuro, sem arrancar aplausos ou salvar vidas na superfície... é apenas vaidade morta."
42190-71 = "E o 'Terror Absoluto' que ninguém vai sobreviver para enxergar ou idolatrar―― é um lixo filosófico que fede muito mais que as marmitas estragadas do parque."
42190-72 = "……Custou muito trauma e muita dor pra escama do meu olho cair, mas eu enxerguei."
42190-73 = "Aquele nome imaculado de 'SRT'... A autoridade de papel que as veteranas herdaram do passado... é tudo uma casca vazia e falida."
42190-74 = "Sincronização. Horário tático 11:30.#nO relógio da ogiva está no limite crítico."
42190-75 = "O nosso trabalho sujo agora é――"
42190-82 = "Parada brusca, Sensei. Permaneça na sombra."
42190-83 = "Essa câmara aberta à frente é o domínio da zona de extração. O sangue da FOX manchou as paredes... A invasão frontal é jogar no vasco."
42190-84 = "Liberando drone de reconhecimento aéreo. Vamos pintar os alvos primeiro."
42190-88 = "Motores engajados. Sinal na tela."
42190-102 = "……A resposta foi letal."
42190-103 = "O calibre do furo na carcaça do drone e a velocidade subsônica da perfuração...#nIsso é chumbo anti-material de 12.7mm cravado no alvo... A Veterana Otogi já deitou o fuzil na guarita."
42190-104 = "Se a linha fosse defendida por mercenários corporativos mediocres, eu forçaria o ombro e passaria metralhando o flanco...#nMas contra os olhos afiados da Otogi-senpai... o segundo disparo dela vai arrancar a minha cabeça ou furar meu coração."
42190-105 = "O colete de kevlar não para chumbo pesado de longo alcance. Se a bala de 12.7mm pegar um orgão vital, não vai sobrar nem poeira minha."
42190-106 = "Nós não furamos esse corredor sem uma Vanguarda Pointman enfiando um escudo de choque balístico pra atrair o tiro na garganta e――"
42190-108 = "……Uau, olha só. Finalmente você confessou que é inútil sem as amiguinhas, hein."
42190-112 = "Essa voz rouca e arrogante..."
42190-122 = "……Qual é a droga do manual que te ensinou a desertar e deixar a sua tropa no vácuo de madruga?"
42190-123 = "Achei que o lance do abandono familiar era brincadeira... cê feriu meus sentimentos, Miyako-chan..."
42190-124 = "Eu tô super ressentida!#nQue custava acordar a gente pra falar 'Tchau, vou invadir o inferno' e sumir?"
42190-126 = "Ah, isso... hã..."
42190-127 = "……E-Eu juro que tentei! Mas como eu ia puxar as cobertas quentes e pedir pra vocês..."
42190-128 = "Pra nós fazermos o quê?! Termina a frase!"
42190-129 = "Pra... vocês atirarem a oportunidade da vida no lixo por causa da minha teimosia."
42190-130 = "A trilha suja e fria que os meus coturnos estão caminhando agora... não leva à glória de fardas novas, ar-condicionado ou beliches."
42190-131 = "Vai ser uma desgraça fria e insalubre... É só a promessa fútil da minha Justiça pura se alimentando do meu próprio desgaste..."
42190-132 = "E cobrar que vocês rasgassem o paraíso que as veteranas cederam e queimassem suas vidas... pra satisfazer o meu delírio moral... é uma crueldade de líder que eu não consigo engolir."
42190-139 = "……Aai!"
42190-140 = "Caramba, tira a cera do ouvido e acorda pra realidade..."
42190-142 = "Que papinho egoísta de 'Meu delírio, Minha justiça'.#nDesde quando a Justiça desse maldito esquadrão deixou de ser de todo mundo pra virar sua, Miyako?"
42190-143 = "……S-Sem falar que... você não é a única palhaça que sonhava com a SRT. Nós vestimos essa farda porque quisemos..."
42190-145 = "A disciplina militar sádica que arranca nosso couro nas pedras e nunca se curva..."
42190-146 = "E o poder destrutivo imbatível de engatar o tiro e derreter crânios de bandidos com uma bala!"
42190-147 = "O... A coragem suicida pra descer a cara na lama sem tremer contra as... abominações piores..."
42190-148 = "Fuzilar gangues e fantasmas no breu talvez ferre a minha cabeça um pouco... mas desde que a minha família esteja no flanco, dane-se o pânico."
42190-150 = "Além do mais... esmagar vermes com equipamento top de linha em campo aberto e previsível é fácil demais. A chuva de balas perde o sabor doce do caos."
42190-151 = "Tem ensinamentos de sangue na rua que as laudas de teoria limpa dos generais nunca vão imprimir nos cadernos de escola..."
42190-158 = "Cala a boca e confia na gente. A sua bússola de Justiça... é a nossa bandeira."
42190-164 = "……"
42190-165 = "……Entendido."
42190-166 = "Esquadrão RABBIT, formação tática de choque. Realizem a checagem das travas de segurança e abasteçam os pentes! A detonação inicial começa no meu sinal."
42190-168 = "Ai ai... a gente contra as Deusas Intocáveis da FOX... o estômago vai virar no avesso."
42190-169 = "Vai ser um banho de sangue. Tô me sentindo um lixo entrando na caverna do leão cego armado só com um pedaço de osso."
42190-170 = "Tira esse medo do peito. Vocês lembram daquele livro de fantasia da Trinity que a gente lia nas madrugadas?"
42190-171 = "Ah... a bíblia sagrada onde os Cavaleiros Templários lutaram contra o coelhinho sanguinário numa toca escura... o pesadelo de todo adulto."
42190-172 = "Lembra qual era o ditado maldito rabiscado em sangue nas paredes daquela caverna do coelho?"
42190-174 = "«Apenas as lâminas daqueles com valentia feroz e pureza absoluta no coração... encontrarão a glória intocável na Caverna de Caerbannog.»"
42190-181 = "……Essa lenda é a nossa cara."
42190-182 = "[s] \"Capitã, o esquadrão tem um codinome pra essa incursão de morte?\""
42190-183 = "Ops... A burocracia do desespero engoliu a criatividade. Não botamos o codinome de rádio ainda..."
42190-184 = "Já que o caos é poético... vamos batizar a invasão letal com a citação do livro de fadas."
42190-185 = "Tá perfeito. Eu vou fuzilar veteranas no escuro com um sorriso fofo na cara."
42190-186 = "Bora quebrar a cara do conselho~"
42190-188 = "O sangue está limpo e a munição cheia..."
42190-194 = "――Operação 'Os Coelhos de Caerbannog'... INICIADA!!"