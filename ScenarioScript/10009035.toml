[translation]
10009035-2 = "[ns] \"Outra fuga? O que diabos aconteceu...\""
10009035-3 = "Quem diria que ela usaria o oyakodon do almoço para abrir as algemas..."
10009035-4 = "Como esperado da \"Raposa do Desastre\"..."
10009035-5 = "[s] \"Desculpe, não entendi nada do que você disse.\""
10009035-6 = "Mas não se preocupe! Desta vez, desta vez vai dar certo! Eu já me certifiquei de que o menu do jantar seja \"soba\"!"
10009035-7 = "[s] \"O problema é o menu!?\""
10009035-8 = "Ah, vai ficar tudo bem,"
10009035-9 = "Desta vez eu vou tomar cuidado!"
10009035-10 = "Dizem que a Academia de Polícia Valkyrie continua evoluindo dia após dia, mesmo cometendo erros! Eu também vou dar o meu melhor!"
10009035-11 = "Bem, obrigada, Sensei!"
10009035-12 = "Com licença!"
10009035-13 = "[s] \"S-sim...\""
10009035-18 = "Bem, vamos continuar com a nossa patrulha também."
10009035-19 = "[s] (Será que vai dar certo mesmo...)"
