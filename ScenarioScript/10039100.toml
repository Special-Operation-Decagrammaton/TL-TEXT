[translation]
10039100-1 = "後日談その2;ウタハとアイドル"
10039100-2 = "アイドルコンテストの予選ステージ"
10039100-4 = "今度はどのようなコンセプトのアイドルでしょうね。"
10039100-5 = "どのグループも衣装が素敵でした。"
10039100-6 = "ええ、とても楽しみです。"
10039100-11 = "ふぅ、緊張する……。"
10039100-15 = "これはエンジニア部のデビューステージとも言えますからね。#n緊張して当然です。"
10039100-16 = "うん、ウタハ先輩はリラックスできてると良いんだけど。"
10039100-21 = "あ、先生もステージを見に来たの？"
10039100-22 = "おはようございます、先生！"
10039100-23 = "[s1] \"おはよう！\"\n[s2] \"エンジニア部も見に来たんだね。\""
10039100-26 = "うん、先輩を応援しようと思って。"
10039100-30 = "[ns] \"ウタハも出場してるんだったね？\""
10039100-31 = "はい、これは私たちのデビューライブなのです！"
10039100-32 = "先輩のステージ、期待してて。"
10039100-38 = "あ、始まりそう……。"
10039100-39 = "もう説明は不要ですね。"
10039100-43 = "（生徒たちの様々なステージを眺めた）"
10039100-48 = "さて、次のステージは～！"
10039100-52 = "ミレニアムサイエンススクールから！"
10039100-58 = "奇抜な発明品で有名な、エンジニア部の[ruby=しらいし]白石[/ruby]ウタハさんで～す！"
10039100-69 = "あら、あの服装は……？"
10039100-70 = "普通のアイドル衣装ではなさそうですね。"
10039100-71 = "隣のロボットは……？"
10039100-72 = "さ、さぁ……エンジニアの要素でしょうか？"
10039100-77 = "それでは、ミュージックスタート！"
10039100-82 = "ついに始まりますね……！"
10039100-83 = "頑張って、先輩……。"
10039100-98 = "……あら？"
10039100-99 = "もしかして……。"
10039100-100 = "え、演歌……？"
10039100-101 = "……アイドルコンテストのはずですが？"
10039100-102 = "どういうことでしょう……。"
10039100-108 = "[ns] \"こ、これは……。\""
10039100-114 = "音程もリズムも完璧……！"
10039100-115 = "この曲はウタハ先輩の十八番ですから！"
10039100-116 = "ヒビキ、そろそろ時間です！#n私たちで熱く燃え上がるステージにしましょう！"
10039100-117 = "うん！#n全力でサポートしよう。"
10039100-121 = "[ns] \"サポートって……？\""
10039100-122 = "それは私から説明を！#n熱く燃え上がる――"
10039100-123 = "先生も見ててね。#nきっと、先輩も喜んでくれるから。"
10039100-124 = "[s] \"う、うん……。\""
10039100-125 = "さあ、行くよ……！"
10039100-130 = "ピッ！ピピッ！"
10039100-134 = "み、ミラーボールまで！？"
10039100-135 = "あのロボットが、まさかミラーボールの役割を！？"
10039100-136 = "それもホール全体に照明が届くほど……！"
10039100-138 = "良い調子ですね！#n注目をバッチリ集めています！"
10039100-140 = "こんなステージ、初めてだ……。"
10039100-141 = "え、演歌でミラーボールを……。"
10039100-142 = "[s] \"本当に大丈夫なの……？\""
10039100-144 = "うん。あれを見て、先生。"
10039100-149 = "……？"
10039100-150 = "ずっと聞いていると、何だか楽しくなってきたね。"
10039100-151 = "リズムに合わせて、勝手に足が……。"
10039100-152 = "不思議と中毒性があるような……。"
10039100-153 = "この切ない歌詞も良いですね……。"
10039100-154 = "「染みる」って、こういうことを言うのかな？"
10039100-155 = "[s3] \"こ、これは……。\"\n[s4] \"もしかして……！？\""
10039100-159 = "ふっふっふ……トリニティのお嬢様にとって、とても新鮮でしょう！"
10039100-160 = "それにウタハ先輩の歌声なら、皆さんの心に響くこと間違いなしですから！"
10039100-161 = "もうすぐクライマックス……装置を起動するよ！"
10039100-172 = "こ、これは……。"
10039100-173 = "何の装置！？"
10039100-174 = "とても派手ですね……！"
10039100-176 = "ここは私が説明しましょう！#n暗いステージにインパクトを与えるため、ナパーム弾を配合していまして――"
10039100-177 = "[s] \"危ないよね！？\""
10039100-178 = "安心して、先生。#n人に燃え移る心配はないよ。"
10039100-179 = "[s] \"なら良いんだけど……。\""
10039100-180 = "万が一に備えて準備もしてあるから。"
10039100-181 = "そろそろかな……。"
10039100-185 = "……今！"
10039100-196 = "これは……雨、ですか？"
10039100-197 = "屋内なのに！？"
10039100-199 = "天井近くにドローン型のスプリンクラーを待機させておきました！#nヒビキの操作で火を消すと同時に――"
10039100-200 = "歌詞の内容と合わせた演出になってるの。"
10039100-202 = "これも、舞台演出の一種なのでしょうか……？"
10039100-203 = "すれ違う恋に、滲み出る雨水……感動しました。"
10039100-207 = "……これは、涙？"
10039100-209 = "最初は戸惑いましたが……。"
10039100-210 = "……とても印象的なステージでしたね。"
10039100-215 = "ありがとうございました。"
10039100-220 = "……し、白石ウタハさんのステージでした～！"
10039100-229 = "[ns5] \"思った以上に……。\"\n[ns6] \"良い反応だったね！\""
10039100-233 = "半分くらいはね。"
10039100-234 = "全員を満足させるのは、さすがに難しかった。"
10039100-239 = "[ns7] \"……たしかに。\"\n[ns8] \"……なるほど。\""
10039100-242 = "ですが、最善を尽くしたのでオッケーです！#n先輩の歌も、完璧でした！"
10039100-243 = "うん、やれることはやった。"
10039100-245 = "（予選の結果が発表された）"
10039100-248 = "（エンジニア部は観客審査こそ良かったが、決勝進出には至らなかった）"
10039100-252 = "[ns] \"……。\""
10039100-253 = "……。"
10039100-254 = "ふふっ、無事に落ちて良かった。"
10039100-255 = "そうだね。"
10039100-256 = "[s] \"……えっ？\""
10039100-257 = "実は、一曲しか準備できなかったんだ。"
10039100-258 = "また同じ曲を披露しても、インパクトがないだろう。"
10039100-259 = "決勝戦の舞台は広いですから、効果的な演出を考えるには、もっと時間が必要でした！"
10039100-260 = "ああ、結果は重要じゃない。"
10039100-261 = "今日の私たちは、トリニティで演歌の素晴らしさをアピールできた。"
10039100-262 = "エンジニア部という名前もね。"
10039100-266 = "[ns] \"……そっか。\""
10039100-268 = "[ns] \"本当にそれでいいの？\""
10039100-272 = "まぁ、悔いがないと言えば嘘になるよ。"
10039100-274 = "だが、楽しい思い出になった。#nみんなはどうだい？"
10039100-276 = "はい、とても貴重な経験でしたね！#n先輩のおかげで、自分もステージに立っているかのような気分を味わえました！"
10039100-277 = "私も楽しかった。#n喜んでくれる人たちの顔が見られたから。"
10039100-278 = "[s9] \"うん、良いステージだったね。\"\n[s10] \"みんな、お疲れ様。\""
10039100-281 = "ふふっ、あとは純粋に楽しむだけだ。"
10039100-287 = "先生も良かったら、一緒に見て回らないかい？"
10039100-289 = "（その後、エンジニア部と謝肉祭を満喫した。風の噂によると、しばらくしてトリニティに演歌同好会が新設されたらしい……）"
