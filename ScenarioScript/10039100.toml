[translation]
10039100-1 = "Epílogo 2: Utaha e as Idols"
10039100-2 = "Palco das eliminatórias do concurso de idols"
10039100-4 = "Que tipo de conceito de idol será desta vez, eu me pergunto."
10039100-5 = "Os trajes de todos os grupos estavam maravilhosos."
10039100-6 = "Sim, estou muito ansiosa."
10039100-11 = "Ufa, que nervosismo..."
10039100-15 = "Pode-se dizer que este é o palco de estreia do Clube de Engenharia. #nÉ natural estar nervosa."
10039100-16 = "Sim, espero que a veterana Utaha consiga relaxar."
10039100-21 = "Ah, Sensei, você também veio ver o palco?"
10039100-22 = "Bom dia, Sensei!"
10039100-23 = "[s1] \"Bom dia!\"\n[s2] \"Então você também veio ver o Clube de Engenharia.\""
10039100-26 = "Sim, vim para torcer pela veterana."
10039100-30 = "[ns] \"A Utaha também está participando, não é?\""
10039100-31 = "Sim, este é o nosso show de estreia!"
10039100-32 = "Espere só para ver o palco da veterana."
10039100-38 = "Ah, vai começar..."
10039100-39 = "Não preciso mais de explicações, não é?"
10039100-43 = "(Observou os vários palcos das alunas)"
10039100-48 = "Muito bem, o próximo palco é...!"
10039100-52 = "Vindo da Millennium Science School!"
10039100-58 = "Famosa por suas invenções excêntricas, Utaha Shiraishi do Clube de Engenharia!"
10039100-69 = "Ora, aquele traje é...?"
10039100-70 = "Não parece ser um traje de idol comum."
10039100-71 = "E aquele robô ao lado...?"
10039100-72 = "B-bem... será que é um elemento de engenharia?"
10039100-77 = "Então, música, começar!"
10039100-82 = "Finalmente vai começar...!"
10039100-83 = "Boa sorte, veterana..."
10039100-98 = "...Ora?"
10039100-99 = "Será que..."
10039100-100 = "E-enka...?"
10039100-101 = "...Mas não deveria ser um concurso de idols?"
10039100-102 = "O que será que isso significa..."
10039100-108 = "[ns] \"I-isso é...\""
10039100-114 = "O tom e o ritmo estão perfeitos...!"
10039100-115 = "Essa música é a especialidade da veterana Utaha!"
10039100-116 = "Hibiki, está na hora! #nVamos fazer deste um palco inesquecível!"
10039100-117 = "Sim! #nVou dar todo o meu suporte."
10039100-121 = "[ns] \"Suporte...?\""
10039100-122 = "Deixe que eu explico! #nAlgo que vai incendiar tudo—"
10039100-123 = "Sensei, observe também. #nCom certeza a veterana ficará feliz."
10039100-124 = "[s] \"B-bem...\""
10039100-125 = "Vamos lá...!"
10039100-130 = "Bip! Bip-bip!"
10039100-134 = "A-até uma bola de espelhos!?"
10039100-135 = "Aquele robô, será que ele está servindo de bola de espelhos!?"
10039100-136 = "E a iluminação está cobrindo o salão inteiro...!"
10039100-138 = "Está indo muito bem! #nEstamos atraindo toda a atenção!"
10039100-140 = "Nunca vi um palco assim..."
10039100-141 = "E-enka com uma bola de espelhos..."
10039100-142 = "[s] \"Sério mesmo que vai dar certo...?\""
10039100-144 = "Sim. Olhe aquilo, Sensei."
10039100-149 = "……？"
10039100-150 = "Quanto mais eu ouço, mais divertido parece ficar."
10039100-151 = "Meus pés começam a se mover sozinhos no ritmo..."
10039100-152 = "É estranhamente viciante..."
10039100-153 = "Essa letra melancólica também é muito boa..."
10039100-154 = "Será que é isso que chamam de \"tocar a alma\"?"
10039100-155 = "[s3] \"I-isso é...\"\n[s4] \"Não me diga que...!?\""
10039100-159 = "Hehe... Para as senhoritas da Trinity, isso deve ser bem refrescante!"
10039100-160 = "E com a voz da veterana Utaha, com certeza vai tocar o coração de todos!"
10039100-161 = "O clímax está chegando... vou ativar o dispositivo!"
10039100-172 = "I-isso é..."
10039100-173 = "Que tipo de dispositivo é esse!?"
10039100-174 = "É bem chamativo, não é...!"
10039100-176 = "Deixe que eu explico!#nPara dar um impacto ao palco escuro, misturamos napalm nele—"
10039100-177 = "[s] \"Isso não é perigoso!?\""
10039100-178 = "Fique tranquilo, Sensei.#nNão há risco de o fogo passar para as pessoas."
10039100-179 = "[s] \"Se você diz...\""
10039100-180 = "Já preparei tudo para o caso de qualquer imprevisto."
10039100-181 = "Está quase na hora..."
10039100-185 = "……Agora!"
10039100-196 = "Isso é... chuva?"
10039100-197 = "Mesmo sendo dentro de um lugar fechado!?"
10039100-199 = "Deixei sprinklers em formato de drone prontos perto do teto!#nCom o controle da Hibiki, apagamos o fogo e ao mesmo tempo—"
10039100-200 = "É uma encenação que combina com a letra da música."
10039100-202 = "Isso também faz parte da encenação do palco...?"
10039100-203 = "Um amor desencontrado, a chuva que escorre... fiquei comovida."
10039100-207 = "……Isso é, uma lágrima?"
10039100-209 = "No começo eu fiquei confusa, mas..."
10039100-210 = "……Foi um palco muito marcante."
10039100-215 = "Muito obrigada."
10039100-220 = "……E-esse foi o palco da Utaha Shiraishi~!"
10039100-229 = "[ns5] \"Mais do que eu pensava...\"\n[ns6] \"Foi uma boa reação, né!\""
10039100-233 = "Pelo menos metade deles gostou."
10039100-234 = "Satisfazer a todos é realmente difícil."
10039100-239 = "[ns7] \"……Com certeza.\"\n[ns8] \"……Entendo.\""
10039100-242 = "Mas demos o nosso melhor, então está tudo bem!#nA música da veterana também foi perfeita!"
10039100-243 = "Sim, fizemos tudo o que podíamos."
10039100-245 = "(Os resultados das eliminatórias foram anunciados)"
10039100-248 = "(O Clube de Engenharia teve uma boa avaliação do público, mas não conseguiu avançar para a final)"
10039100-252 = "[ns] \"…….\""
10039100-253 = "……."
10039100-254 = "Fufu, ainda bem que fomos eliminados."
10039100-255 = "É verdade."
10039100-256 = "[s] \"……Hã?\""
10039100-257 = "Na verdade, só tínhamos preparado uma música."
10039100-258 = "Apresentar a mesma música de novo não teria o mesmo impacto."
10039100-259 = "O palco da final é grande, então precisaríamos de mais tempo para pensar em uma encenação eficaz!"
10039100-260 = "Ah, o resultado não é o mais importante."
10039100-261 = "Hoje, conseguimos mostrar a todos em Trinity o quão maravilhoso é o Enka."
10039100-262 = "E o nome do Clube de Engenharia também, né."
10039100-266 = "[ns] \"...Entendi.\""
10039100-268 = "[ns] \"Tem certeza de que está tudo bem assim?\""
10039100-272 = "Bem, seria mentira dizer que não tenho arrependimentos."
10039100-274 = "Mas foi uma lembrança divertida. E vocês, o que acham?"
10039100-276 = "Sim, foi uma experiência muito valiosa! Graças a você, senpai, pude sentir como se estivesse no palco também!"
10039100-277 = "Eu também me diverti. Porque pude ver os rostos das pessoas que ficaram felizes."
10039100-278 = "[s9] \"Sim, foi um ótimo palco.\"\n[s10] \"Pessoal, bom trabalho a todos.\""
10039100-281 = "Hehe, agora é só aproveitar de verdade."
10039100-287 = "Sensei, se quiser, por que não vem dar uma volta com a gente?"
10039100-289 = "(Depois disso, aproveitei o festival com o Clube de Engenharia. Segundo boatos, algum tempo depois, um Clube de Pesquisa de Enka foi fundado em Trinity...)"
