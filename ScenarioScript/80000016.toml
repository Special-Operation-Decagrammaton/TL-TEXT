[translation]
80000016-1 = "あなたの胃袋を"
80000016-2 = "シャーレ・オフィス"
80000016-3 = "お待ちしておりました、先生。"
80000016-4 = "今日はバレンタインデー。恋に落ちた少女たちが相手にチョコレートを渡しながら、大切に抱えていた本心を伝える日……。"
80000016-5 = "せっかくの今日という日に、私も先生にお渡ししたいプレゼントがあります。"
80000016-11 = "……先生のために特別に用意したチョコレートです。"
80000016-12 = "受け取って……いただけますか？"
80000016-13 = "（チョコレートの上に盗聴器が設置されてる。）"
80000016-14 = "[s] \"チョコレートは嬉しいんだけど、その上のこれは……？\""
80000016-15 = "えっと、それは……。"
80000016-16 = "チョコレートの上に乗ってる金属装置は、いわゆるトッピングです。"
80000016-17 = "け、決して、先生の生活音を録音する目的の盗聴器ではありません。"
80000016-18 = "[s] \"どうして何度も食べ物に盗聴器を入れるの？\""
80000016-19 = "そ、それは先生がいつも、盗聴器つきのプレゼントを受け取ってくれないので……。"
80000016-20 = "食べ物と一緒なら、こう、受け取ってもらえるのではないかと……。"
80000016-21 = "[s1] \"……もしこれを食べたとして、胃の中から周囲の音って録れるの？\"\n[s2] \"そういうのは本当に食べちゃったら危ないでしょ……。\""
80000016-22 = "……それはそうですね。先生が盗聴器を飲み込んでしまったら話し声どころか、胃が発する音しか聞けないので……。"
80000016-23 = "……それはそうですね。先生が盗聴器を飲み込んでしまったら話し声どころか、胃が発する音しか聞けないので……。"
80000016-24 = "……先生の胃腸の音？"
80000016-25 = "それも良いかもしれませんね……。"
80000016-29 = "先生、ちょっとだけ口を開けていただけませんか？"
80000016-30 = "[s] \"い、一体何を……。\""
80000016-31 = "大したことではありません、先生に盗聴器を飲ませようとしてるだけです。"
80000016-32 = "健康上の問題ならご心配なく。"
80000016-33 = "私が作ったこの盗聴器は食べ物と一緒に飲み込む前提の設計ですので、勿論さびつくことも無く、人体に有害な成分が染み出すこともあり得ません。"
80000016-34 = "それに大きさもこれだけですので、水と一緒に飲みさえすれば胃に入ることは簡単でしょう。"
80000016-35 = "ですので、もうおとなしく……口を開けてください！"
80000016-36 = "[s] \"だ、誰か！助けて！？\""
80000016-38 = "（その後盗聴器を巡って、コタマとしばらく揉めたのだった。）"
