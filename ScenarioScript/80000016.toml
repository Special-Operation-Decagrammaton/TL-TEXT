[translation]
80000016-1 = "Para o seu estômago"
80000016-2 = "Escritório do Schale"
80000016-3 = "Estava à sua espera, Sensei."
80000016-4 = "Hoje é Dia dos Namorados. O dia em que garotas apaixonadas entregam chocolates para quem amam, enquanto revelam seus sentimentos mais profundos que guardavam com tanto carinho..."
80000016-5 = "Já que hoje é um dia tão especial, eu também tenho um presente que gostaria de lhe entregar, Sensei."
80000016-11 = "……É um chocolate que preparei especialmente para você, Sensei."
80000016-12 = "Você poderia... aceitá-lo?"
80000016-13 = "(Há um dispositivo de escuta instalado em cima do chocolate.)"
80000016-14 = "[s] \"Eu agradeço pelo chocolate, mas o que é isso em cima dele...?\""
80000016-15 = "Bem, isso é..."
80000016-16 = "O dispositivo metálico em cima do chocolate é, por assim dizer, um confeito."
80000016-17 = "De forma alguma é um dispositivo de escuta com o objetivo de gravar os sons do seu cotidiano, Sensei."
80000016-18 = "[s] \"Por que você insiste em colocar dispositivos de escuta na comida?\""
80000016-19 = "I-Isso é porque você nunca aceita os presentes que já vêm com o dispositivo de escuta..."
80000016-20 = "Pensei que, se viesse junto com comida, você acabaria aceitando..."
80000016-21 = "[s1] \"...Se eu comesse isso, daria para gravar os sons ao redor de dentro do meu estômago?\"\n[s2] \"É perigoso comer algo assim, não acha...?\""
80000016-22 = "……É verdade. Se você engolisse o dispositivo, em vez de conversas, eu só conseguiria ouvir os sons do seu estômago..."
80000016-23 = "……É verdade. Se você engolisse o dispositivo, em vez de conversas, eu só conseguiria ouvir os sons do seu estômago..."
80000016-24 = "……Os sons do seu trato digestivo, Sensei?"
80000016-25 = "Isso também pode ser interessante..."
80000016-29 = "Sensei, poderia abrir a boca só um pouquinho?"
80000016-30 = "[s] \"O-O que você está...\""
80000016-31 = "Não é nada demais, só estou tentando fazer você engolir o dispositivo de escuta."
80000016-32 = "Quanto a problemas de saúde, não se preocupe."
80000016-33 = "Este dispositivo que criei foi projetado para ser engolido com comida, então, é claro, ele não enferruja e não há risco de vazar substâncias nocivas ao corpo humano."
80000016-34 = "Além disso, ele é deste tamanho, então se você tomar com água, será fácil fazê-lo chegar ao estômago."
80000016-35 = "Portanto, seja bonzinho e... abra a boca!"
80000016-36 = "[s] \"A-Alguém! Socorro!?\""
80000016-38 = "(Depois disso, acabei discutindo com a Kotama por um tempo por causa do dispositivo de escuta.)"
