[translation]
1003003-1 = "Terapia medicinal?"
1003003-3 = "Com licença, Sensei."
1003003-4 = "Posso entrar...?"
1003003-5 = "[s] \"Sim, pode entrar.\""
1003003-11 = "Obrigada por me receber, mesmo com um pedido tão repentino. Consegui um chá muito bom e queria que o Sensei experimentasse."
1003003-12 = "Espero não estar atrapalhando o seu descanso..."
1003003-13 = "[s1] \"Não, eu estava justamente com vontade de tomar um chá.\"\n[s2] \"Eu estava justamente querendo ver a Chinatsu.\""
1003003-14 = "Fufu, fico muito feliz em ouvir isso."
1003003-15 = "I-isso é, bem...!?"
1003003-16 = "S-se você me provocar assim, eu não sei como reagir..."
1003003-17 = "E-ehem. Voltando ao assunto principal, o que trouxe hoje é um \"chá medicinal\"."
1003003-18 = "[s] \"Chá medicinal?\""
1003003-19 = "Sim. Como talvez saiba, \"medicina dietética\" significa alimentos que servem como remédio. É um tipo de terapia onde, ao consumir ingredientes benéficos ao corpo, você repõe energias e vitalidade."
1003003-20 = "Este \"chá medicinal\" em particular é feito com ervas fervidas junto com as folhas de chá, então a absorção é rápida e o aroma ajuda a acalmar o corpo e a mente."
1003003-21 = "Achei que seria perfeito para o Sensei, que vive tão ocupado."
1003003-28 = "Primeiro, este aqui é um chá de gengibre em conserva com mel."
1003003-29 = "O gengibre tem um aroma forte e um sabor peculiar, mas é rico em vitaminas, o que aumenta a imunidade e melhora a circulação sanguínea."
1003003-30 = "Como adicionei mel doce, o sabor ficou mais suave e fácil de beber."
1003003-34 = "E este aqui é o chamado chá de crisântemo, feito com flores secas."
1003003-35 = "O crisântemo contém vários antioxidantes benéficos e dizem que ajuda na recuperação da fadiga, especialmente para aliviar o cansaço visual."
1003003-36 = "Além disso, o aroma suave do crisântemo tem um efeito relaxante para o corpo e a mente."
1003003-37 = "E então, este aqui é..."
1003003-38 = "[s3] \"Espere, pode esperar um pouco?\"\n[s4] \"Acho que não consigo beber tudo isso...\""
1003003-39 = "A-ah, é mesmo...?"
1003003-40 = "A-ah, é mesmo...?"
1003003-41 = "É verdade, talvez eu tenha me empolgado um pouco demais..."
1003003-42 = "Eu só conseguia pensar em como ajudar o Sensei..."
1003003-43 = "[s5] \"Isso já é o suficiente, obrigado.\"\n[s6] \"Vou beber com prazer.\""
1003003-44 = "Sim. Então, vou preparar agora mesmo."
1003003-45 = "Sim. Então, vou preparar agora mesmo."
1003003-51 = "(Chinatsu ferveu a água e preparou tudo enquanto caminhava de um lado para o outro)"
1003003-52 = "[s] \"Só de ver essa cena, já me sinto relaxado...\""
1003003-53 = "Bem...? A água nem começou a ferver ainda...?"
1003003-54 = "...Fufu, mas acho que entendo o que quer dizer."
1003003-55 = "Ficar assim, sem nenhum objetivo, apenas ouvindo o som relaxante do chá sendo preparado..."
1003003-56 = "Ouvi dizer que o melhor descanso começa ao esvaziar a mente e passar o tempo com tranquilidade."
1003003-57 = "...Só de estar aqui com o Sensei, para mim, já é como um \"remédio\"."
1003003-59 = "Depois disso, passei o resto da tarde relaxando enquanto tomava chá com a Chinatsu."
