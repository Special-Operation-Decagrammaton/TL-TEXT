[translation]
1003003-1 = "薬膳療法？"
1003003-3 = "失礼します、先生。"
1003003-4 = "入ってもよろしいでしょうか……？"
1003003-5 = "[s] \"うん、どうぞどうぞ。\""
1003003-11 = "急なお願いにも関わらずありがとうございます。突然良いお茶が手に入ったので、先生にもぜひ召し上がっていただきたいなと思いまして。"
1003003-12 = "先生のお休みを邪魔した形になっていないと良いのですが……。"
1003003-13 = "[s1] \"ううん、ちょうどお茶の気分だったから。\"\n[s2] \"ちょうどチナツに会いたかったから。\""
1003003-14 = "ふふっ、でしたら何よりです。"
1003003-15 = "そっ、それは、えっと……！？"
1003003-16 = "そ、そうやってからかわれると、反応に困ります……。"
1003003-17 = "こほん。あらためて本題ですが、本日お持ちしたのは「薬膳茶」です。"
1003003-18 = "[s] \"薬膳茶？\""
1003003-19 = "はい。ご存じかもしれませんが「薬膳」とは薬になる食べ物という意味でして、身体に良い材料を使った食べ物を摂ることで、気力などを補う一種の療法とも言えるものです。"
1003003-20 = "特にこの「薬膳茶」は、薬草などを茶葉と共に煎じたものですので、吸収も早く、香りを通じて心身を安定させてくれたりもします。"
1003003-21 = "ご多忙の先生にはピッタリなのではと。"
1003003-28 = "まずこちらは、はちみつで漬けた生姜のお茶です。"
1003003-29 = "生姜は香りが強く独特の味もありますが、ビタミンが豊富なので免疫力を高める効果があり、血行も良くしてくれます。"
1003003-30 = "そこに甘いはちみつを加えたので、全体的にまろやかになって飲みやすくなっているはずです。"
1003003-34 = "そしてこちらは、干し菊を用いた菊花茶と呼ばれるものです。"
1003003-35 = "菊には幾つかの有益な抗酸化成分が含まれ、疲労回復、特に目の疲れを軽減させる効果があるそうです。"
1003003-36 = "それに、菊の優しい香りは心身を安定させる効果があるんですよ。"
1003003-37 = "それからこちらは……"
1003003-38 = "[s3] \"ちょっ、ちょっと待ってもらえる？\"\n[s4] \"そんなには飲めないかな……？\""
1003003-39 = "そ、そうでしたか……？"
1003003-40 = "そ、そうでしたか……？"
1003003-41 = "確かに、少し張り切り過ぎてしまったかもしれません……。"
1003003-42 = "先生の助けになればと、そればっかり考えて……。"
1003003-43 = "[s5] \"これで十分だよ、ありがとう。\"\n[s6] \"美味しく頂くね。\""
1003003-44 = "はい。それでは、早速ご用意いたしますね。"
1003003-45 = "はい。それでは、早速ご用意いたしますね。"
1003003-51 = "（チナツがお湯を沸かしてくれて、パタパタと歩き回りながら色々な準備をしてくれた）"
1003003-52 = "[s] \"もうこの光景が癒される……。\""
1003003-53 = "えっと……？まだ、お湯も沸いていませんが……？"
1003003-54 = "……ふふっ、ですが少し分かるかもしれません。"
1003003-55 = "何の目的も無くこうしてゆるりと、お茶を淹れる心地よい音に耳を傾ける……。"
1003003-56 = "最高の休息は、心を空にして長閑やかに過ごすことから始まる……と聞いたこともありますし。"
1003003-57 = "……先生とこうしていられるだけで、私にとっては「薬膳」のようなものです。"
1003003-59 = "その後、チナツと一緒にお茶を飲みながらのんびりと午後を過ごした。"
