[translation]
10024010-1 = "Episódio 1; Iguarias de Shan Hai"
10024010-2 = "Shan Hai Jing - Associação Comercial Xuanwu"
10024010-4 = "O que achou do Buda Pula o Muro?#nAgora vou trazer o prato principal."
10024010-5 = "Este é o Quan Jia Fu. É um prato feito com pepino-do-mar seco, abalone, búzios, camarão e carne de porco, cozidos juntos com vários vegetais."
10024010-11 = "[ns] \"Oh, que delicioso! É um sabor que nunca provei antes...!\""
10024010-12 = "Fico feliz em ouvir isso.#nNão há nada que me deixe mais contente do que ouvir um cliente dizer que está delicioso."
10024010-13 = "Bem, o próximo é a sopa de almôndegas de camarão!"
10024010-14 = "[s] \"Ainda vem mais comida!?\""
10024010-15 = "O que está dizendo? Ainda estamos no prato principal."
10024010-16 = "Mesmo depois da sopa, ainda faltam o prato principal de carboidrato e o dim sum."
10024010-17 = "Ambos são especialidades da casa, então não deixe de experimentar!"
10024010-18 = "[s1] \"Agradeço a intenção, mas será que vou conseguir comer tudo...?\"\n[s2] \"O estômago do Sensei não é tão grande assim...\""
10024010-21 = "É, é mesmo...?"
10024010-22 = "Bem, as coisas vão ficar agitadas daqui para frente, então você precisa comer bastante!"
10024010-26 = "Presidente Lumi, quando devemos servir isto?"
10024010-27 = "Espere um pouco.#nSensei, ainda estamos no meio do prato principal..."
10024010-28 = "Ah, é verdade. Já que estamos aqui, por que não se apresenta?#nSensei, esta é a Reijo. Ela é quem faz a minha segurança."
10024010-29 = "Sou Kayama Reijo.#nÉ um prazer conhecê-lo."
10024010-30 = "[s] \"Olá, Rei-chan.\""
10024010-31 = "Rei... chan...?"
10024010-32 = "É a primeira vez que me chamam assim, mas..."
10024010-33 = "Ahaha, Rei-chan, hein? Gostei disso.#nSerá que eu deveria começar a chamá-la de Rei-chan também?"
10024010-34 = "Presidente Lumi, isso é um pouco..."
10024010-36 = "……Entendo.#nEntão devo assumir o controle da conversa primeiro."
10024010-37 = "Aprendi nos filmes que, até no Kung Fu, é importante tomar a \"iniciativa\"."
10024010-38 = "[s] \"Não... eu só achei que poderíamos nos tornar amigos...\""
10024010-40 = "Usando uma humildade fluida para induzir o descuido do oponente...#nEste é... o Sensei do Schale."
10024010-41 = "Ora, ora, Reijo. Deixe isso para lá.#nVocê está deixando o Sensei sem jeito."
10024010-42 = "[s] \"Não estão entendendo tudo errado!?\""
10024010-43 = "Ahaha, ela costuma ser calma, mas quando o assunto vira Kung Fu, ela acaba perdendo a noção do que acontece ao redor."
10024010-44 = "Bem, achei divertido ver a cara de confusão do Sensei."
10024010-45 = "[s3] \"Aliás, não tem nenhum cliente aqui desde agora...\"\n[s4] \"Isso tem alguma relação com o motivo de eu ter sido chamado?\""
10024010-48 = "Ahaha... é verdade."
10024010-49 = "É que... não, acho que é mais rápido mostrar do que explicar."
10024010-50 = "Reijo, cuide do Sensei."
10024010-51 = "Sim, presidente."
10024010-55 = "(Lumi manteve o olhar para frente enquanto apontava o polegar para trás)"
10024010-56 = "(Ao olhar por cima do ombro...)"
10024010-60 = "……Algum problema?"
10024010-65 = "Apontar o dedo para um \"cliente\"... parece que falta educação por aqui."
10024010-66 = "Se espalharem por aí que a Associação Comercial Xuanwu tem esse tipo de atendimento...#npode acabar manchando a reputação do restaurante, não acha?"
10024010-67 = "É por isso que gente que se acha só porque tem um restaurante popular é assim..."
10024010-71 = "Bem, como você pode ver."
10024010-72 = "[s] \"Quem são aquelas alunas?\""
10024010-73 = "— São membros da Xuanlongmen."
10024010-74 = "Estão sentadas aí há horas, pedindo apenas um ovo frito."
10024010-75 = "Por causa disso, os outros clientes não se aproximam."
10024010-76 = "Ah, claro, fico feliz que peçam pelo menos um prato."
10024010-77 = "A comida popular é boa justamente por ser acessível. Se eles estivessem se divertindo conversando com amigos, eu ficaria feliz em cozinhar para eles, mas..."
10024010-78 = "O problema não é o tempo de permanência, mas sim o fato de estarem fazendo esse barulho todo..."
10024010-79 = "Sinceramente, já chegou ao nível de atrapalhar os negócios."
10024010-80 = "Bem, suponho que esse seja o objetivo daquelas garotas..."
10024010-81 = "[s] \"...Por que você não pede para elas irem embora?\""
10024010-82 = "É que... como elas são alunas da Genryumon, não posso simplesmente fazer isso."
10024010-83 = "Ah, Sensei, você talvez não saiba dos detalhes. #n...Sobre a relação entre a Genryumon e a nossa Associação Genbu."
10024010-84 = "[s5] \"Pelo que dizem os boatos, a relação não é muito...\"\n[s6] \"Dizem que ninguém quer chegar perto quando as duas entram em conflito...\""
10024010-87 = "Pois é... existem algumas circunstâncias complicadas."
10024010-92 = "A Genryumon é a organização do conselho estudantil em Shanhaijing, mas..."
10024010-96 = "Elas prezam pela justiça e pela cavalaria, com a mentalidade de que nada supera a tradição."
10024010-100 = "Eu entendo o sentimento de querer valorizar a tradição, mas..."
10024010-102 = "Isso não é valorizar. #nEm nome da tradição, elas apenas têm medo de mudanças."
10024010-104 = "Não sei como elas se comportam em outros lugares, mas não posso perdoar que tenham menosprezado a Associação Genbu... #ne a culinária da presidente Lumi, só porque dizem que vai contra a tradição!"
10024010-105 = "A culinária só existe através do desenvolvimento! #nUma mesa sem mudanças acaba se tornando enjoativa!"
10024010-106 = "Elas não fazem ideia de quanto a Associação Genbu se esforça! #nMesmo sem entender nada sobre a nossa situação...!"
10024010-107 = "Eu estou bem, então se acalme, Reijo. #nSe você gritar tão alto assim—"
10024010-108 = "...Parece que estão tendo uma conversa interessante, não é?"
10024010-109 = "Ouvi tudo. #nVou revelar cada uma das suas conspirações."
10024010-110 = "...É por isso que as coisas ficam assim."
10024010-111 = "Eu entendo que a Genryumon também tem suas próprias razões, mas..."
10024010-112 = "Ainda assim, fico pensando se não poderiam mudar um pouco essa política de gestão conservadora."
10024010-113 = "Uma organização também precisa mudar conforme os tempos, não é?"
10024010-114 = "[s] \"É um problema difícil...\""
10024010-115 = "Todo mundo não diz na cara, mas existem muitas alunas que sentem antipatia pelo sistema da Genryumon."
10024010-116 = "Por causa disso, e pelo fato de nos destacarmos, elas nos veem ainda mais como inimigas..."
10024010-117 = "Ultimamente, têm circulado uns boatos bem desagradáveis sobre a associação."
10024010-118 = "[s] \"Pode me contar sobre esses boatos?\""
10024010-119 = "Em Shanhaijing, existe uma planta chamada \"Ginseng Milenar\", mas—"
10024010-120 = "A quantidade colhida é pequena e, por seu alto valor de raridade, a exportação para fora é estritamente limitada."
10024010-121 = "Ultimamente, espalhou-se o boato de que a Associação Genbu está vendendo o \"Ginseng Milenar\" ilegalmente para fora da escola..."
10024010-122 = "E usando isso como pretexto para a investigação, os membros da Genryumon começaram a ficar aqui."
10024010-123 = "Desse jeito, não dá nem para os clientes aproveitarem a refeição... ah."
10024010-128 = "Você realmente acha que isso é apenas um \"boato\"?"
10024010-129 = "Não, não acho. #nA Associação Genbu sempre traz coisas de fora por conta própria."
10024010-130 = "Por causa disso, a tradição de Shanhaijing só faz definhar!"
10024010-131 = "Se tivessem obedecido à Genryumon silenciosamente, não teriam sido suspeitas."
10024010-136 = "A tradição é importante, mas não há futuro se tiver medo de mudanças."
10024010-137 = "Primeiro, é preciso ser flexível e aceitar várias coisas."
10024010-139 = "Isso não é da nossa conta. #nPara começar, você acha que pode fazer negócios em Shanhaijing depois de desafiar a Genryumon?"
10024010-140 = "Não se esqueça de que tudo só existe graças à Genryumon."
10024010-142 = "Ah... não adianta mais conversar, não vamos chegar a lugar nenhum."
10024010-143 = "O quê, ficou com medo?"
10024010-144 = "Você não quer falar conosco porque tem algo a esconder, não é?"
10024010-145 = "Sim, sim, como quiser."
10024010-147 = "Sendo assim... você já entendeu o conteúdo do pedido, certo? #nEu quero esclarecer esse \"mal-entendido\". — Sensei, pode me ajudar?"
10024010-148 = "Mesmo recebendo acusações unilaterais, onde isso é um \"mal-entendido\"!? #nA presidente Lumi é boazinha demais! Precisamos ser mais firmes...!"
10024010-149 = "Reijo, acalme-se. Responder força com força só terá o efeito contrário."
10024010-156 = "[ns] \"Vocês duas são alunas da Genryumon, certo?\""
10024010-157 = "...Hum, quem é você? #nAdultos sem relação, é melhor se retirarem."
10024010-158 = "Mesmo sendo alguém de fora, enquanto estiver em Shanhaijing, #nterá que seguir as regras de Shanhaijing."
10024010-159 = "Ou seja — ficar muito tempo na Associação Genbu significa #nque você será considerado do lado delas."
10024010-160 = "Vocês sabem muito bem de que lado é mais inteligente ficar, não sabem?#nHehehe..."
10024010-164 = "É melhor tomarem cuidado com o que dizem.#nEsta pessoa é o \"Sensei\" do Schale."
10024010-165 = "O quê, o Sensei... do Schale...?"
10024010-166 = "Ei, ei... o que a gente faz!?"
10024010-167 = "[s] \"Poderiam me levar até o representante da Genryumon?\""
10024010-168 = "M-mesmo sendo o Sensei do Schale, isso é..."
10024010-169 = "I-isso mesmo!#nO Mestre da Porta não é alguém que se pode encontrar tão facilmente!"
10024010-171 = "Humm, e são vocês que decidem isso por conta própria?"
10024010-172 = "O-o que você quer dizer com isso?"
10024010-174 = "Vocês sabem que o Schale é uma organização extrajudicial reconhecida pela Presidente do Conselho Estudantil Federal, não sabem?"
10024010-175 = "Será que é uma boa ideia tratar o Sensei do Schale com tanto desdém?"
10024010-176 = "Pelo menos... eu não acho que o Chronos Channel deixaria passar um furo de reportagem desses."
10024010-177 = "Se isso acontecer, Shanhaijing vai ficar bem mais exposta, não é?"
10024010-179 = "E-e-espere!#nPrecisamos de um tempo para pensar!!"
10024010-180 = "Do que você está falando? Tudo deve ser decidido na hora.#nSe não, não dá para fazer negócios."
10024010-181 = "Bem, para nós, isso é uma oportunidade.#nSe muitas pessoas de fora vierem, nosso movimento aumenta, não é?"
10024010-182 = "Ah, então era essa a intenção desde o começo? Desculpe por não ter entendido.#nQuem diria que a Genryumon estava tentando nos dar uma chance com tanta generosidade."
10024010-183 = "Tsc...!"
10024010-184 = "T-tá bom, eu entendi. Vou avisar o Mestre da Porta.#nMas se ele recusar, não venha reclamar depois."
10024010-185 = "[s] \"Só isso já basta, obrigado.\""
10024010-187 = "Tsc... Pode deixar, Genbu Shokai."
10024010-195 = "Usar a técnica de Hua Jin para desviar dos ataques do oponente, mesmo fora de combate...#nEste é o poder do Sensei do Schale..."
10024010-196 = "Não, não é nada disso.#nReijo, volte logo aqui."
10024010-197 = "Você nos salvou. Obrigada, Sensei.#nAcho que, com esse susto, eles não vão voltar tão cedo, não é?"
10024010-198 = "E então, o que você pretende fazer exatamente?"
10024010-199 = "Hã? Depois que a gente se encontrar, o resto se resolve...?"
10024010-200 = "Ahaha, então você também tem esse lado impulsivo?#nGostei ainda mais de você, Sensei."
10024010-201 = "Muito bem, Reijo.#nEntão, vamos nós também?"
10024010-202 = "Tem certeza de que isso é seguro, Presidente?"
10024010-203 = "Claro, claro. Vai dar tudo certo.#nAlém disso, eu também tenho algumas coisas para falar com a Kisaki."
10024010-204 = "[s] \"Então, vamos nessa.\""
10024010-205 = "……Entendido. Em qualquer eventualidade, a segurança do Sensei será minha prioridade máxima."
10024010-206 = "Certo, conto com você."
10024010-207 = "……Mas antes disso. Apesar da interrupção, aproveite a comida até o fim.#nReijo, você pode reaquecer a sopa de almôndegas de camarão?"
10024010-208 = "Sim, Presidente Lumi."
10024010-213 = "[ns] \"Será que vou conseguir me mexer depois de comer tanto...\""
10024010-214 = "Se estiver muito cheio, pode deixar o que sobrou, viu?"
10024010-215 = "Significa que eu ofereci uma \"hospitalidade\" maior do que você conseguia comer, ahaha."
