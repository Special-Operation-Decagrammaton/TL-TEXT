[translation]
10024010-1 = "第1話;[ruby=さんかいのちんみ]山海珍味[/ruby]"
10024010-2 = "山海経・玄武商会"
10024010-4 = "頭菜[ruby=フォーティャオチァン]の佛跳牆は[/ruby]どうだった？#n次は大菜を持ってくるね。"
10024010-5 = "これは[ruby=ぜんかふく]全家福[/ruby]。干しナマコや、アワビ、サザエ、エビ、豚肉なんかを、いろんな野菜と一緒に煮込んだ料理だよ。"
10024010-11 = "[ns] \"お、美味しい！初めての味だ……！\""
10024010-12 = "それなら良かった。#nお客さんの「美味しい」って言葉以上に嬉しいものはないからね。"
10024010-13 = "さて、お次は湯菜のエビ団子スープ！"
10024010-14 = "[s] \"まだ出てくるの！？\""
10024010-15 = "なに言ってるの？まだ大菜だよ。"
10024010-16 = "湯菜が終わっても、主食と点心が残ってるからね。"
10024010-17 = "どっちもウチ自慢の味だから、ぜひ味わっていって！"
10024010-18 = "[s1] \"気持ちは嬉しいけど、全部食べ切れるかな……。\"\n[s2] \"先生の胃袋は、そこまで大きくないんだよね……。\""
10024010-21 = "そ、そうなの……？"
10024010-22 = "ま、これから忙しくなるだろうし、たくさん食べとかないとね！"
10024010-26 = "ルミ会長、こちらいつ出しましょうか？"
10024010-27 = "ちょっと待ってね。#n先生、まだ大菜の途中だからさ……"
10024010-28 = "ああ、そうだ。せっかくだし挨拶したら？#n先生、この子はレイジョ。あたしの警護をしてくれてるんだ。"
10024010-29 = "[ruby=かやま]鹿山[/ruby]レイジョです。#nよろしくお願い致します。"
10024010-30 = "[s] \"こんにちは、レイちゃん。\""
10024010-31 = "レイ……ちゃん……？"
10024010-32 = "そんな風に呼ばれたのは、初めて、ですが……"
10024010-33 = "あははっ、レイちゃんかぁ。いいね、それ。#nあたしも今度からレイちゃんって呼ぼうかな？"
10024010-34 = "ルミ会長、それはちょっと……。"
10024010-36 = "……なるほど。#nまず会話の主導権を握ればいいのですね。"
10024010-37 = "カンフーにおいても、「先手」を取るのが大切だと映画から学びました。"
10024010-38 = "[s] \"いや……仲良くなれるかなと思って……\""
10024010-40 = "相手の油断を誘うために、流れるような謙遜を……。#nこれが……シャーレの先生。"
10024010-41 = "まぁまぁ、レイジョ。そこまでにしといてあげて。#n先生が困ってるよ。"
10024010-42 = "[s] \"なんか勘違いされてない！？\""
10024010-43 = "あはは、普段は落ち着いてるんだけどさ。#nカンフーの話に繋がっちゃうと、ちょっと周りが見えなくなっちゃうんだよね。"
10024010-44 = "ま、先生のちょっと困った顔が見られて、あたしは面白かったけど。"
10024010-45 = "[s3] \"ところで、さっきからお客さんがいないけど……\"\n[s4] \"もしかして、私が呼ばれたことに関係してる？\""
10024010-48 = "あはは……そうだね。"
10024010-49 = "それが――いや、説明するより、アレを見てもらった方が早いかな。"
10024010-50 = "レイジョ、先生を頼んだよ。"
10024010-51 = "はい、会長。"
10024010-55 = "（ルミは前を向いたまま、後ろを親指で差した）"
10024010-56 = "（肩越しに視線を向けると……）"
10024010-60 = "……何か？"
10024010-65 = "「お客様」に指を差すとは、教育がなってないようだな。"
10024010-66 = "玄武商会がこんな接客態度だと知れ渡ったら……#nお店の評判に関わるかもしれないぞ？"
10024010-67 = "人気店だからって調子に乗ってるヤツらはこれだから……。"
10024010-71 = "ま、見ての通りだよ。"
10024010-72 = "[s] \"あの生徒たちは誰？\""
10024010-73 = "――玄龍門の構成員だよ。"
10024010-74 = "卵炒めだけで、ああやって何時間も居座ってるんだ。"
10024010-75 = "そのせいで、他の客が寄りつかなくてさ。"
10024010-76 = "あっ、もちろん一品だけでも食べてもらえるのは嬉しいよ。"
10024010-77 = "大衆料理って、気軽に味わえるのが良いところだし。友達とお喋りしながら楽しく過ごしてもらえるなら、こっちとしても作り甲斐があるんだけど……。"
10024010-78 = "どちらかといえば、長時間の利用じゃなくて、あんな風に騒いでるのが問題でね……"
10024010-79 = "正直、もはや営業妨害のレベルなんだ。"
10024010-80 = "まあ、あの子たちの目的はソレなんだろうけどさ……"
10024010-81 = "[s] \"……流石に出ていってもらったら？\""
10024010-82 = "それが……玄龍門の生徒だから、そうするわけにもいかなくてね。"
10024010-83 = "あ、先生は詳しくないか。#n……玄龍門と、あたしたち玄武商会の関係。"
10024010-84 = "[s5] \"噂通りなら、仲があまり……\"\n[s6] \"両者の争いには、誰も近寄りたがらないとか……\""
10024010-87 = "そうだね……ちょっと複雑な事情があってさ。"
10024010-92 = "玄龍門は、山海経における生徒会組織なんだけど――"
10024010-96 = "義と侠を重んじ、伝統に優るものなし、って考えでね。"
10024010-100 = "伝統を大切にしようって気持ちは、あたしも分かるんだけど……"
10024010-102 = "あれは大切にしているわけではありません。#n伝統の名のもとに、変化を恐れているだけです。"
10024010-104 = "余所ではどんな顔をしているか知りませんが、玄武商会を……#nルミ会長の料理を、伝統に反するからといって[ruby=けな]貶[/ruby]したのは許せません！"
10024010-105 = "料理は発展してこそです！#n変化のない食卓には、いずれ飽きが来てしまいます！"
10024010-106 = "玄武商会がどれだけ努力していると思ってるんだ！#nこちらの事情など、なにひとつ分かっていないクセに……！"
10024010-107 = "あたしは大丈夫だから、落ち着いてレイジョ。#nそんなに大きい声を出したら――"
10024010-108 = "……面白そうな話をしてるじゃないか？"
10024010-109 = "全て聞こえているぞ。#nお前たちの企みは、ひとつ残らず明らかにしてやるからな。"
10024010-110 = "……こうなっちゃうから。"
10024010-111 = "玄龍門にも、それなりの事情があるのは理解するんだけどね……"
10024010-112 = "でも、あの保守的な運営方針は、もう少し何とかならないのかな～って思うよ。"
10024010-113 = "組織だって時代に合わせて変化しないと、ね？"
10024010-114 = "[s] \"難しい問題だね……。\""
10024010-115 = "みんな、面と向かっては言えないけど、#n玄龍門の体制に反感を抱いてる生徒は結構いるからね。"
10024010-116 = "それもあって、うちが目立つ分なおさら目の敵にしてるんだろうけど……。"
10024010-117 = "なんだか最近ちょ～っと商会に関する嫌な噂が出回ってるんだよね。"
10024010-118 = "[s] \"その噂、聞かせてくれる？\""
10024010-119 = "山海経では、「[ruby=まんねんじん]萬年参[/ruby]」という植物が採れるのですが――"
10024010-120 = "収穫量が少なく、#n希少価値が高いから外部への持ち出しが厳しく制限されているんです。"
10024010-121 = "昨今、「萬年参」を[ruby=うち]玄武商会[/ruby]が学園外に密売しているという噂が広まっておりまして……"
10024010-122 = "その調査を口実に、玄龍門の構成員が居座るようになったってわけ。"
10024010-123 = "これじゃあ、お客さんに食事を楽しんでもらうどころじゃないし……はぁ。"
10024010-128 = "本当にそれが「噂」だと思うのか？"
10024010-129 = "いーや、思わないね。#n玄武商会はいつも好き勝手に外部のものを持ち込んでいるし。"
10024010-130 = "そのせいで、山海経の伝統は廃れていく一方だ！"
10024010-131 = "大人しく玄龍門に従っていれば、疑われなかったものを。"
10024010-136 = "伝統も大事だけど、変化を恐れてちゃ先はないよ。"
10024010-137 = "まずは柔軟に、いろんなことを受け入れないとね。"
10024010-139 = "我々の知ったことではない。#nそもそも、玄龍門に楯突いておいて、山海経で商売ができると思っているのか？"
10024010-140 = "全ては玄龍門あってこそだというのを努々忘れるなよ。"
10024010-142 = "はぁ……これ以上話しても、ラチが明かないね。"
10024010-143 = "なんだ、怖気づいたのか？"
10024010-144 = "後ろ暗いことがあるから、我々と話したくないのだろう？"
10024010-145 = "はいはい、それでいいよ。"
10024010-147 = "というわけで……依頼内容は、今ので大体わかったよね。#nあたしは「誤解」を解きたいんだ。――先生、手伝ってもらえるかな？"
10024010-148 = "一方的な誹りを受けているというのに、どこが「誤解」なんですか！？#nルミ会長は甘すぎます！もっと強気に出なくては……！"
10024010-149 = "レイジョ、落ち着いて。力に力で対抗しても逆効果だよ。"
10024010-156 = "[ns] \"2人は玄龍門の生徒なんだね？\""
10024010-157 = "……ん、誰だ？#n無関係の大人は、引っ込んでいてもらおうか。"
10024010-158 = "たとえ外部の者だろうと、山海経にいる以上は、#n[ruby=うち]山海経[/ruby]のルールに従わってもらわなくてはな。"
10024010-159 = "つまり――玄武商会に長居するということは、#nそちら側についたとみなされる。"
10024010-160 = "どちらについたほうが利口か、分からないわけじゃないよな。#nクックック……"
10024010-164 = "言葉には気をつけたほうがいい。#nこの方はシャーレの「先生」です。"
10024010-165 = "なっ、シャーレの、先生……？"
10024010-166 = "お、おい……どうする！？"
10024010-167 = "[s] \"玄龍門の代表に会わせてもらえるかな？\""
10024010-168 = "い、いくらシャーレの先生とはいえ、それは……"
10024010-169 = "そ、そうだ！#n門主様は、そう簡単に会えるようなお方ではない！"
10024010-171 = "へえ、それってキミ達が勝手に決めていいんだ？"
10024010-172 = "な、何が言いたい？"
10024010-174 = "シャーレが、連邦生徒会長が認めた超法規的機関である事はキミ達も知ってるよね？"
10024010-175 = "そんなシャーレの先生を、無下に扱ってもいいのかな～？"
10024010-176 = "少なくとも……クロノスチャンネルは、このスクープを逃さないと思うよ。"
10024010-177 = "そうなったら山海経はも～っと風通しが良くなるね？"
10024010-179 = "ままま、待ってくれ！#n少し考える時間をもらいたい！！"
10024010-180 = "なに言ってるんだい。何事も即断即決。#nでないと、商売なんてやってけないよ。"
10024010-181 = "ま、あたし達にとってはチャンスだからね。#n外部の人がたくさん来てくれたら、もっと繁盛するわけだしさ？"
10024010-182 = "ああ、最初からそういうつもりだったのか。分かってあげられなくて、ごめんね？#nまさか玄龍門が、寛大な心であたし達にチャンスをくれようとしてたなんて。"
10024010-183 = "チッ……！"
10024010-184 = "わ、分かった。門主様に伝えはしてやる。#nだが、もし突き返されても、文句は言うなよ。"
10024010-185 = "[s] \"それだけでも十分だよ、ありがとう。\""
10024010-187 = "チッ……覚えてろよ、玄武商会。"
10024010-195 = "相手の攻撃を受け流す[ruby=かけい]化勁[/ruby]の技術を、戦闘以外でも活かすとは……#nこれがシャーレの先生の力……"
10024010-196 = "いや、違うから。#nレイジョ、早く戻ってきな。"
10024010-197 = "助かったよ。ありがとう、先生。#nこれに懲りて、しばらく来ないんじゃないかな？"
10024010-198 = "それで、具体的にどうするんだい？"
10024010-199 = "え？会ってみたら後は何とかなる……？"
10024010-200 = "あはは、そういう行き当たりばったりなところもあるんだ？#nますます先生のこと気に入ったよ。"
10024010-201 = "よし、レイジョ。#nそれじゃ、あたし達も行こっか？"
10024010-202 = "本当に大丈夫なんですか、会長？"
10024010-203 = "大丈夫、大丈夫。何とかなるよ。#nそれにキサキには、あたしも言いたいことがあるからね。"
10024010-204 = "[s] \"じゃあ、行こうか。\""
10024010-205 = "……はい。万が一の時には、先生の安全を最優先にいたします。"
10024010-206 = "うん、任せたよ。"
10024010-207 = "……と、その前に。邪魔が入っちゃったけど、最後まで料理は楽しんでいってね。#nレイジョ、エビ団子スープを温め直してくれる？"
10024010-208 = "はい、ルミ会長。"
10024010-213 = "[ns] \"こんなに食べて動けるかな……。\""
10024010-214 = "お腹いっぱいなら、残してくれていいんだよ？"
10024010-215 = "食べ切れないくらいの「おもてなし」が出来たってことだからさ、あははっ。"
