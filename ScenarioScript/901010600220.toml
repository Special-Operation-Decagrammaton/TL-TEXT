[translation]
901010600220-7 = "FOX3, está me ouvindo?"
901010600220-11 = "Aqui FOX3, aguardando no Ponto Sierra."
901010600220-12 = "O que foi, de repente?"
901010600220-13 = "Consegue acessar o sistema de gestão de tráfego da Academia Ferroviária Highlander para verificar o registro de embarque de alguém?"
901010600220-14 = "Acessar diretamente o banco de dados da Highlander é difícil... mas o Departamento de Trânsito do Conselho Estudantil Federado compartilha os dados de pagamento de tarifas. Acho que dá para ver indiretamente."
901010600220-15 = "Que informação você quer?"
901010600220-16 = "Pode verificar se no dia do desaparecimento do Sr. Miyaguchi ele embarcou em algum trem na plataforma do Porto Kanezaki?"
901010600220-17 = "E no dia anterior e no seguinte também."
901010600220-18 = "Entendido."
901010600220-19 = "Mas pode demorar um pouco... só compartilho quando voltarmos ao QG."
901010600220-20 = "Sim, por favor."