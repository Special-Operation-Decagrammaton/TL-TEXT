[translation]#[Texto Final. - Filipe 05/07.]
901010600220-7 = "FOX3, você me ouve?"
901010600220-11 = "Aqui FOX3, aguardando no ponto Sierra."
901010600220-12 = "O que foi?"
901010600220-13 = "Consegue acessar o sistema de gestão de transporte da Academia Ferroviária Highlander e verificar o registro de embarque de uma pessoa específica?"
901010600220-14 = "Acessar o banco de dados da Highlander diretamente é difícil…… mas a Sala de Transportes do Conselho Estudantil Geral compartilha os dados de pagamento de passagens, então dá pra confirmar indiretamente."
901010600220-15 = "Que informação você quer?"
901010600220-16 = "No dia em que o Miyaguchi desapareceu, quero ver se há registro de embarque na plataforma do porto de Kanezaki."
901010600220-17 = "O dia anterior e o seguinte também, por favor."
901010600220-18 = "Entendido."
901010600220-19 = "Mas pode demorar um pouco pra conectar no servidor…… compartilho quando voltar ao QG."
901010600220-20 = "Sim, obrigada."