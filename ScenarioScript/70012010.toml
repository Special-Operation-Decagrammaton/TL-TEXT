[translation]
70012010-1 = "ON AIR: Gehenna (1)"
70012010-5 = "It's not enough!"
70012010-6 = "What isn't?"
70012010-7 = "The sparkle! It's missing!"
70012010-8 = "That's awfully vague..."
70012010-9 = "...So, in short, can I take that to mean 'nothing is catching my interest'?"
70012010-10 = "That's our Erika! Exactly."
70012010-11 = "I mean, nothing really fun is happening... Isn't Gehenna kind of quiet lately?"
70012010-12 = "Is it...? Didn't the main building of the clubroom wing explode just last week?"
70012010-13 = "That was a whole week ago! They've already finished the repairs."
70012010-14 = "I just wish there was something a little more fun and exciting going on."
70012010-15 = "Finding a topic that'll get Kirara-chan hyped up is... pretty tough."
70012010-19 = "Oh? Erika-chan, look at that."
70012010-20 = "Hm? See something?"
70012010-26 = "So, all you have to do is sit and talk—"
70012010-27 = "Ugh, what a hassle..."
70012010-28 = "Sorry, but I have to go heat up my curry. See ya."
70012010-32 = "A 'hassle'..."
70012010-33 = "Well... that's exactly why I'm looking for someone."
70012010-37 = "...Hm?"
70012010-38 = "Am I currently going through all this trouble just to avoid trouble...?"
70012010-39 = "Does that mean the 'hassle' factor is effectively zero...?"
70012010-40 = "..."
70012010-41 = "No, I should stop thinking about this. It's only going to upset my stomach..."
70012010-42 = "Still, where am I supposed to find a replacement..."
70012010-43 = "I'd love to bribe them with a reward, but all I have to offer is Makoto-senpai's autograph...#nI doubt anyone would even want that..."
70012010-47 = "Hey, you're Iroha-chan from the Pandemonium Society, right?"
70012010-48 = "You look like you're in a bit of a bind. What's wrong?"
70012010-49 = "Who are you two...?"
70012010-50 = "..."
70012010-51 = "Ah!"
70012010-52 = "Found a suitable candidate."
70012010-54 = "A little while ago..."
70012010-55 = "Hehehe, that's how it is."
70012010-56 = "Uh, what's with the sudden change of heart?"
70012010-57 = "I just felt like saying it. There are times for that, aren't there?"
70012010-58 = "Moods are more important than you think, Iroha."
70012010-59 = "Yes, yes, of course..."
70012010-60 = "Hehehe. Anyway, is the preparation for the Pandemonium Society's school broadcast going well?"
70012010-61 = "I heard you even added a segment to introduce events happening around Gehenna."
70012010-62 = "Yes, I suppose."
70012010-63 = "Actually, didn't I tell you not to add a reading segment on your own?#nHow many times do I have to tell you not to waste the budget..."
70012010-64 = "Besides, there's nobody even listening to it anyway."
70012010-65 = "You're still too green. That's exactly why it's good. Hehehe!"
70012010-66 = "What is that supposed to mean?"
70012010-67 = "Nobody is interested... which means we can do whatever we want."
70012010-68 = "For example, if we talk about the approved budget plans..."
70012010-69 = "We could even say, 'The Prefect Team's budget cut has been officially announced'—that kind of thing! Hehehe!"
70012010-70 = "That's a pathetic reason."
70012010-71 = "Regardless! The best part about the school broadcast is that nobody pays attention to it."
70012010-76 = "Reporting in!"
70012010-77 = "The person in charge of the school broadcast has suddenly resigned!"
70012010-78 = "What!?"
70012010-79 = "I-I don't know...!#nI tried to stop them, but they just looked dazed and said it was for personal reasons..."
70012010-80 = "I'm rushing to find a replacement, but I haven't found anyone suitable yet..."
70012010-81 = "How could this happen...!?"
70012010-82 = "Sigh... it can't be helped. We'll have to cancel the broadcast this time."
70012010-83 = "That is out of the question!!"
70012010-84 = "Excuse me? Like I said, there's nobody even listening to it, right?#nIsn't that the whole point?"
70012010-85 = "That is not the issue—!!"
70012010-86 = "Canceling the broadcast is a completely different matter!"
70012010-87 = "This is a critical issue involving the prestige of the Pandemonium Society... no, of Lady Makoto herself!!"
70012010-88 = "I really don't think anyone cares about that."
70012010-89 = "Find a replacement immediately!!"
70012010-90 = "No, like I said... were you even listening?#nIt's not easy to find someone with broadcasting experience—"
70012010-91 = "At this point, I don't care if they're inexperienced!!"
70012010-92 = "You must broadcast it no matter what—!!"
70012010-93 = "Please, enough with the selfishness!!!"
70012010-95 = "So that's what happened..."
70012010-96 = "Sigh... you understand now, right...? It's a complete waste of effort..."
70012010-97 = "That sounds super fun!!"
70012010-98 = "..."
70012010-99 = "Excuse me?"
70012010-100 = "Erika-chan, what do you think? Since we're here, why don't we give it a try?"
70012010-101 = "Well, it does sound like a good experience. #nIf you don't mind us being amateurs, that is..."
70012010-102 = "Are you serious...?"
70012010-103 = "Yeah!! What do we need to prepare!?"
70012010-104 = "Oh... well, there isn't really anything specific we've decided to do yet..."
70012010-105 = "I mean, are you really... are you serious about this...?"