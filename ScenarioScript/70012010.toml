[translation]#[Texto Final. - Filipe 08/07.]
70012010-1 = "ON AIR: Gehenna (1)"
70012010-5 = "Falta algo!"
70012010-6 = "O quê?"
70012010-7 = "Brilho!"
70012010-8 = "De novo algo vago……"
70012010-9 = "……Quer dizer que não tem nada que te interesse?"
70012010-10 = "Exato, Erika-chan!"
70012010-11 = "Não tem muita coisa interessante…… Gehenna anda meio parada, não?"
70012010-12 = "Sério?…… Semana passada a ala principal do clube não explodiu?"
70012010-13 = "Já faz uma semana! A reforma já terminou."
70012010-14 = "Queria algo mais divertido, sabe?"
70012010-15 = "Uma coisa que anime a Kirara…… é difícil."
70012010-19 = "Oh? Erika-chan, olha ali."
70012010-20 = "Hã? Tem algo?"
70012010-26 = "Então, é só sentar e conversar――"
70012010-27 = "Hã, que saco……"
70012010-28 = "Desculpa, mas tenho que esquentar o curry. Então tchau."
70012010-32 = "'Que saco'……"
70012010-33 = "Bom, por isso estou procurando alguém."
70012010-37 = "……Hã?"
70012010-38 = "Estou procurando trabalho para evitar trabalho?"
70012010-39 = "Ou seja, o tédio se anula?"
70012010-40 = "……"
70012010-41 = "Melhor não pensar mais nisso. Só vai dar dor de estômago……"
70012010-42 = "Mas, onde encontrar um substituto……"
70012010-43 = "Queria usar recompensa, mas só tenho autógrafos da Makoto-senpai……#n……e ninguém quer isso."
70012010-47 = "Ei, você é…… a Iroha-chan do Pande-mônio, né?"
70012010-48 = "Parece que está com problemas, o que foi?"
70012010-49 = "Vocês são……"
70012010-50 = "……"
70012010-51 = "Ah!"
70012010-52 = "Encontrei a pessoa certa."
70012010-54 = "Um pouco antes……"
70012010-55 = "Kishishi, é isso."
70012010-56 = "Hã, do nada?"
70012010-57 = "Só queria dizer isso. Às vezes, bate essa vontade."
70012010-58 = "O humor é mais importante do que você pensa, Iroha."
70012010-59 = "Sim, sim……"
70012010-60 = "Kishishi. Mas, como vai a preparação do programa do Pande-mônio?"
70012010-61 = "Ouvi dizer que criaram um quadro sobre eventos em Gehenna."
70012010-62 = "Sim, mais ou menos."
70012010-63 = "Aliás, eu disse para não colocar um quadro de leitura aleatória, não falei?#nQuanto mais vou ter que repetir para não desperdiçar verba?"
70012010-64 = "Aliás, ninguém ouve, mesmo."
70012010-65 = "Ainda está verde. É por isso que é bom. Kishishi!"
70012010-66 = "O que quer dizer?"
70012010-67 = "Ninguém se interessa…… ou seja, podemos fazer o que quisermos."
70012010-68 = "Por exemplo, se falarmos sobre o orçamento aprovado……"
70012010-69 = "podemos dizer que 'o corte no Comitê de Disciplina já foi anunciado'! Kikiki."
70012010-70 = "Que motivo bobo."
70012010-71 = "Enfim! O bom do programa escolar é que ninguém liga."
70012010-76 = "Um aviso!"
70012010-77 = "A apresentadora do programa escolar pediu demissão!"
70012010-78 = "O quê!? Por quê?"
70012010-79 = "N-não sabemos!……#n……tentamos convencê-la, mas ela disse que era por motivos pessoais……"
70012010-80 = "Estamos procurando um substituto, mas não encontramos……"
70012010-81 = "Por que isso……?"
70012010-82 = "Haa…… não tem jeito. Vamos cancelar o programa."
70012010-83 = "Isso é inaceitável!"
70012010-84 = "Hã? Não tem ouvintes, mesmo.#nNão é isso que você gosta?"
70012010-85 = "Não é essa a questão!"
70012010-86 = "Cancelar o programa é um problema diferente!"
70012010-87 = "Isso é uma questão de prestígio do Pande-mônio…… ou melhor, da Makoto-sama!"
70012010-88 = "Ninguém vai ligar para isso."
70012010-89 = "Encontrem um substituto agora!"
70012010-90 = "Não, mas…… você ouviu o que eu disse?#nNão é fácil achar alguém com experiência――"
70012010-91 = "Desta vez, não importa se não tem experiência!"
70012010-92 = "Vamos fazer o programa de qualquer jeito!"
70012010-93 = "Pare com esse capricho!"
70012010-95 = "Isso não……"
70012010-96 = "Haa…… então você entendeu que é perda de tempo……"
70012010-97 = "Parece muito divertido!!"
70012010-98 = "……"
70012010-99 = "Hã?"
70012010-100 = "Erika-chan, que tal? Já que é assim, vamos tentar?"
70012010-101 = "É, pode ser uma boa experiência.#nSe aceitarem amadoras……"
70012010-102 = "Sério?"
70012010-103 = "Sim!! O que precisamos preparar?"
70012010-104 = "Ah…… não há nada definido……"
70012010-105 = "Vocês estão falando sério?"