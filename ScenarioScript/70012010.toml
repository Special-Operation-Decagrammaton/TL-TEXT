[translation]
70012010-1 = "ON AIR: Gehenna (1)"
70012010-5 = "Tá faltando!"
70012010-6 = "O quê?"
70012010-7 = "O brilho!"
70012010-8 = "De novo sendo bem vaga assim..."
70012010-9 = "...Em resumo, posso interpretar como 'não tem nada que chame a atenção'?"
70012010-10 = "Como esperado da Erika-chan! É isso mesmo."
70012010-11 = "É que não tem nada muito interessante... Gehenna não está meio parada ultimamente?"
70012010-12 = "Sério...? O prédio principal do clube não explodiu semana passada?"
70012010-13 = "Já faz uma semana desde aquilo, né? A restauração já até terminou."
70012010-14 = "Ah, queria que tivesse algo mais divertido e interessante acontecendo."
70012010-15 = "Algo que anime a Kirara-chan... é difícil de achar, hein."
70012010-19 = "Oh? Erika-chan, olha aquilo."
70012010-20 = "Hm? Tem alguma coisa?"
70012010-26 = "Portanto, apenas sentar e conversar já seria o suficiente para—"
70012010-27 = "Eita, que trabalhão..."
70012010-28 = "Desculpa, mas preciso esquentar meu curry. Até mais."
70012010-32 = "Trabalhão, é..."
70012010-33 = "Bem... é por isso que eu estou procurando alguém."
70012010-37 = "...Hm?"
70012010-38 = "Eu estou tentando evitar problemas, mas acabei me metendo em problemas...?"
70012010-39 = "Ou seja, o nível de trabalho é zero a zero...?"
70012010-40 = "..."
70012010-41 = "Não, é melhor parar de pensar nisso. Só vai me dar dor de estômago..."
70012010-42 = "Mas onde eu vou achar um substituto..."
70012010-43 = "Eu queria oferecer uma recompensa, mas a única coisa que tenho é o autógrafo da Makoto-senpai...#nNinguém ia querer isso, né..."
70012010-47 = "Ei, ei, você é a Iroha-chan do Pandemônio, né?"
70012010-48 = "Parece que você está com problemas, o que houve?"
70012010-49 = "Quem são vocês..."
70012010-50 = "..."
70012010-51 = "Ah!"
70012010-52 = "Encontrei a pessoa ideal."
70012010-54 = "Um pouco antes disso..."
70012010-55 = "Kishishi, é isso mesmo."
70012010-56 = "Hã, por que isso de repente?"
70012010-57 = "Eu só queria dizer. Às vezes a gente tem desses momentos, não tem?"
70012010-58 = "O humor é algo mais importante do que você pensa, Iroha."
70012010-59 = "Sim, sim, claro..."
70012010-60 = "Kishishi. Falando nisso, como estão os preparativos para a transmissão escolar do Pandemônio?"
70012010-61 = "Ouvi dizer que criaram um quadro para apresentar os acontecimentos de Gehenna."
70012010-62 = "Sim, mais ou menos."
70012010-63 = "Aliás, eu disse para não colocar um quadro de leitura por conta própria, não disse?#nQuantas vezes preciso dizer para não desperdiçar o orçamento..."
70012010-64 = "Para começo de conversa, não tem ninguém ouvindo isso de verdade."
70012010-65 = "Você ainda não entendeu. É justamente por isso que é bom. Kishishi!"
70012010-66 = "O que você quer dizer com isso?"
70012010-67 = "Ninguém tem interesse... ou seja, podemos fazer o que quisermos."
70012010-68 = "Por exemplo, se falarmos sobre o orçamento aprovado..."
70012010-69 = "Podemos até dizer que 'o corte no orçamento do Comitê Disciplinar já foi anunciado publicamente'! Kikiki."
70012010-70 = "Que motivo mais bobo."
70012010-71 = "De qualquer forma! O bom da transmissão escolar é que ninguém presta atenção nela."
70012010-76 = "Tenho um relatório!"
70012010-77 = "O responsável pela transmissão escolar pediu demissão de repente!"
70012010-78 = "O quê!? Por que isso!?"
70012010-79 = "Eu, eu não sei...!#nTentei impedi-lo, mas ele parecia atordoado e só disse que era por motivos pessoais..."
70012010-80 = "Estamos procurando um substituto às pressas, mas ainda não encontramos ninguém adequado..."
70012010-81 = "Como isso foi acontecer...!?"
70012010-82 = "Haa... não tem jeito. A transmissão de hoje será cancelada."
70012010-83 = "Isso é impossível!!"
70012010-84 = "Sim? Afinal, não é como se houvesse alguém ouvindo, não é?#nEssa é a parte boa, não é?"
70012010-85 = "Não é essa a questão--!!"
70012010-86 = "Cancelar a transmissão é um problema completamente diferente!"
70012010-87 = "Este é um assunto importante que envolve o prestígio do Pandemonium... ou melhor, da Makoto-sama!!"
70012010-88 = "Acho que ninguém se importa com isso, na verdade."
70012010-89 = "Encontre um substituto imediatamente!!"
70012010-90 = "Não, é que... você estava ouvindo?#nNão é fácil encontrar alguém com experiência em transmissão--"
70012010-91 = "Não importa. Mesmo que não tenha experiência, serve!!"
70012010-92 = "Faça a transmissão acontecer de qualquer jeito--!!"
70012010-93 = "Já chega de tanta teimosia!!!"
70012010-95 = "Que coisa..."
70012010-96 = "Haa... você entendeu, né... que isso é um esforço inútil..."
70012010-97 = "Parece super divertido!!"
70012010-98 = "..."
70012010-99 = "Sim?"
70012010-100 = "Erika-chan, o que acha? Já que estamos aqui, por que não tenta?"
70012010-101 = "Bem, parece que seria uma boa experiência.#nSe não se importar com alguém amador..."
70012010-102 = "É verdade...?"
70012010-103 = "Sim!! O que eu preciso preparar!?"
70012010-104 = "Ah... não é como se houvesse algo específico para fazer..."
70012010-105 = "Quer dizer, vocês estão falando sério mesmo...?"
