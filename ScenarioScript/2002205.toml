[translation]
2002205-1 = "O último passeio do feriado"
2002205-2 = "Academia Gehenna - Pátio da Escola"
2002205-9 = "Desculpe, esperei muito por você...!"
2002205-10 = "[s] \"Não, eu acabei de chegar.\""
2002205-11 = "Vim de quimono como prometido, mas..."
2002205-12 = "Bem... o que vamos fazer?"
2002205-13 = "[s1] \"Primeiro, que tal mudarmos de lugar?\"\n[s2] \"Já que, para a Fuuka, Gehenna é um lugar comum.\""
2002205-16 = "……？"
2002205-17 = "B-bem, de qualquer forma, estou confiando em você, Sensei...?"
2002205-19 = "Centro da cidade"
2002205-20 = "A torre de observação famosa pela sua altura incrível..."
2002205-21 = "S-será que foi por ter subido no elevador de alta velocidade..."
2002205-22 = "Acho que fiquei um pouco enjoada..."
2002205-26 = "Ah, incrível...! Dá para ver a cidade inteira daqui!"
2002205-27 = "A-aliás, por que o chão é de vidro...?"
2002205-28 = "Ah. Minhas pernas estão tremendo, não consigo me mexer..."
2002205-29 = "S-Sensei, se... se não se importar, poderia me dar a mão...?"
2002205-35 = "Pela primeira vez, senti o valor de estar com os pés no chão...!"
2002205-36 = "A vista da torre era linda, mas lugares altos são um pouco assustadores..."
2002205-37 = "...Ei, você também estava com medo, Sensei?"
2002205-38 = "Essa mania de querer passar por situações assustadoras de propósito, o que será que é..."
2002205-39 = "O próximo lugar, você diz?"
2002205-40 = "Bem, deixo com você, mas... não, a torre de observação foi legal, mas...!"
2002205-48 = "Parque de diversões"
2002205-50 = "Parque de diversões... já ouvi falar muito sobre isso..."
2002205-54 = "...? Acelerar de 0 a 180 km/h em 1,56 segundos...?"
2002205-55 = "E além disso, um looping de 39,7 metros de diâmetro no meio do percurso...?"
2002205-56 = "Tem certeza de que é seguro andar nisso!? Todos voltam inteiros para casa!?"
2002205-57 = "[s] \"B-bem, claro que não vou te forçar...\""
2002205-58 = "Uuu... mas é uma recomendação do Sensei, e já que viemos juntos..."
2002205-59 = "E-eu vou... já que chegamos a esse ponto, vamos nessa!"
2002205-61 = "AAAAAAHHHHHH!"
2002205-70 = "Uuu... achei que ia morrer de verdade..."
2002205-71 = "Ah, o desfile vai começar em breve?"
2002205-72 = "Ah, o nome da Academia Hyakkiyako está escrito ali."
2002205-73 = "Então esse é o poder do festival da Academia Hyakkiyako que dizem por aí..."
2002205-74 = "Ué...? A fila de Shanhaijing também está vindo atrás? #nE atrás deles, Red Winter também?"
2002205-75 = "Ah, entendi... é um desfile com o conceito das características de cada escola, né?"
2002205-76 = "Isso significa que Gehenna também vai participar? Ah, Trinity está ali...!"
2002205-78 = "Rua comercial"
2002205-83 = "Foi divertido, Sensei."
2002205-84 = "Fiquei um pouco cansada de andar... e estou com fome, então queria entrar em algum lugar."
2002205-85 = "Ah, por intuição... b-bem... então, que tal aquele restaurante ali?"
2002205-86 = "P-posso pedir o que eu quiser...!?"
2002205-87 = "I-isso é um pouco intimidador, por assim dizer..."
2002205-88 = "Mas, já que estamos aqui... v-vou pedir com moderação...!"
2002205-90 = "(Aproveitei uma comida deliciosa com a Fuuka)"
2002205-92 = "Estava delicioso!"
2002205-93 = "A conta ficou tudo bem? Você pagou sem eu nem perceber..."
2002205-94 = "N-não, é impossível não me preocupar com isso...!"
2002205-95 = "[s] \"Se for pela Fuuka, isso não é nada!\""
2002205-96 = "Ah, sinto muito por isso..."
2002205-97 = "Eh, você não quer que eu peça desculpas...?"
2002205-98 = "……Fufu. É verdade, talvez as palavras que eu deveria usar sejam outras."
2002205-99 = "Muito obrigada, Sensei!"
2002205-100 = "[s] \"Estou pensando em ir ali adiante, você está cansada?\""
2002205-101 = "Sim, claro que não!"
2002205-103 = "Caminho das Cerejeiras Noturnas"
2002205-108 = "Este lugar é bem tranquilo, não é?"
2002205-109 = "Faz tempo que não saio para caminhar tão tarde da noite assim."
2002205-110 = "[s] \"Acabei fazendo o seu dia ficar bem corrido, né...\""
2002205-111 = "Não, não, pelo contrário, foi um dia muito produtivo."
2002205-112 = "[s] \"Fico feliz que a Fuuka tenha se divertido.\""
2002205-113 = "I-Isso é...?"
2002205-114 = "Por que, de repente...?"
2002205-115 = "[ns] \"Porque você sempre se esforça muito em Gehenna.\""
2002205-117 = "[ns] \"Queria que você pudesse aproveitar coisas diferentes de vez em quando.\""
2002205-121 = "Se-Sensei..."
2002205-122 = "Não é como se eu estivesse presa... bem, não é que seja totalmente diferente disso, mas..."
2002205-123 = "Mas... no fim das contas, eu só estou fazendo o que preciso fazer."
2002205-124 = "[ns] \"Essa é a Fuuka, não é?\""
2002205-126 = "[ns] \"Mesmo assim, queria que você terminasse esse feriado de um jeito bom.\""
2002205-127 = "Um bom feriado..."
2002205-128 = "É verdade. Passar o tempo com o Sensei tornou este um bom feriado."
2002205-131 = "[wa:1500]― Estou realmente... [wa:1700]muito feliz."
2002205-134 = "[wa:1500]― Muito [wa:700]obrigada, [wa:1200]Sensei."
2002205-137 = "[wa:2000]― Eu só [wa:1400]recebo coisas [wa:400]de você, Sensei."
2002205-140 = "― A pessoa que [wa:1200]mais gosta de comer [wa:500]a minha comida [wa:500]é..."
2002205-141 = "[wa:1300]― Sempre [wa:300]o Sensei..."
2002205-144 = "[wa:1500]― Isso é..."
2002205-145 = "[wa:1600]― Para mim, [wa:1100]o melhor [wa:400]presente."
2002205-148 = "[wa:1500]― Por isso, [wa:500]então... [wa:2000]Sensei."
2002205-149 = "[wa:2100]― Continue assim, [wa:1300]por favor?"
2002205-152 = "(Já tarde da noite, no caminho de volta para levar a Fuuka para casa...)"
2002205-153 = "Pátio da Academia Gehenna"
2002205-161 = "Ah!"
2002205-166 = "[ns] \"Fuuka!?\""
2002205-167 = "E-Estou bem. Só o meu pé..."
2002205-168 = "Ah...!"
2002205-169 = "De-Desculpe, acho que acabei torcendo um pouco... ah...!"
2002205-171 = "(Seguro a Fuuka firmemente enquanto ela cambaleia)"
2002205-174 = "Se-Sensei...!?"
2002205-175 = "……"
2002205-176 = "E-Então... será que podemos ficar assim por mais um pouco...?"
2002205-180 = "(Não é como se eu não conseguisse ficar de pé...)"
2002205-181 = "(Desculpe... só por agora, quero ser uma garota má que não consegue se esforçar sozinha...)"
2002205-183 = "(Depois disso, continuei o caminho de volta apoiando a Fuuka)"
