[translation]
10009130-1 = "後日談その6;ハッピーバレンタイン！"
10009130-2 = "（これはワカモが先生に気持ちを伝える直前のこと――）"
10009130-10 = "……。"
10009130-30 = "そこまでです、災厄の狐。"
10009130-36 = "……餌はたっぷり撒いたはずですが、まさか見つかってしまうとは。"
10009130-40 = "あなたは、一体……？"
10009130-42 = "救護騎士団団長、[ruby=あおもり]蒼森[/ruby]ミネと申します。"
10009130-43 = "救護騎士団……？"
10009130-44 = "ああ……たしかトリニティの、いつも退屈そうにしているお方たち。"
10009130-45 = "まさか、私の狙いに気づかれるなんて……想定外でした。"
10009130-46 = "狙い……？#n私はただ「救護」に駆けつけただけですが……。"
10009130-47 = "あら、それでは救護騎士団の団長さんが、どのようなご用件でしょうか？"
10009130-48 = "……まさか私のことを止めにきた――わけではないのでしょう？"
10009130-49 = "「災厄の狐」、あなたにお聞きしたいことがあります。"
10009130-50 = "……？"
10009130-54 = "何故このような騒ぎを起こしたのですか？"
10009130-56 = "……。"
10009130-60 = "今日は……。"
10009130-61 = "――今日は？"
10009130-62 = "……「バレンタインデー」ですから。#n大切な人に、自分の気持ちを伝える日。"
10009130-63 = "そう――私はただ、あの方に想いを伝えたいだけ。"
10009130-64 = "邪魔をしようとする者は……このワカモ、たとえ相手が誰であろうと……。"
10009130-65 = "絶対に諦めません。#nすべてを破壊し、前進するのみ。"
10009130-69 = "バレンタインデーに、気持ちを伝える……ため？"
10009130-70 = "ええ……理解されずとも構いません。"
10009130-74 = "私とあの人の前に立ちはだかるのであれば、破壊するだけです。"
10009130-75 = "……。"
10009130-76 = "さあ、お望みとあれば戦い――"
10009130-82 = "どうぞ、お進みください。"
10009130-83 = "……どのようなおつもりで？"
10009130-84 = "何を考えているかは分かりませんが、そんな子供だましは――"
10009130-85 = "――いいえ、これは本心です。"
10009130-86 = "救護騎士団が行う「救護」に、嘘や誤魔化しなど存在しませんので。"
10009130-91 = "今日というこの日に想いを伝える――#nそう決心したあなたを止める理由などありません。"
10009130-92 = "…………。"
10009130-97 = "……！"
10009130-103 = "あなたの行いに対する「救護」は、それが済んでからと致しましょう。"
10009130-107 = "団長……？#n今走っていったのってもしかして……"
10009130-108 = "「災厄の狐」じゃないですか！？"
10009130-109 = "い、行かせて良かったんですか！？"
10009130-111 = "……。"
10009130-112 = "セリナ、ハナエ。今日が何の日か覚えていますか？"
10009130-114 = "そ、それはもちろん……。"
10009130-115 = "はい！バレンタインデーですよね？"
10009130-117 = "そうです。バレンタインデーはチョコレートを渡すだけでなく、自分の想いを伝える日でもあります。"
10009130-118 = "たしかに騒ぎこそ起こしましたが、#n彼女の前に立ちはだかることが必ずしも正しいとは限りません。"
10009130-119 = "ここは道を譲って、彼女に想いを伝えさせる……。"
10009130-123 = "それもまた、私たちが成す「救護」の形ではないでしょうか。"
10009130-128 = "で、ですが……団長！"
10009130-132 = "この騒ぎは一体、どうやって収拾すれば！？"
10009130-134 = "ええ、そうですねハナエ。"
10009130-135 = "「災厄の狐」が想いを伝える事とは別に、#nまず目の前の騒動を収束させなくてはなりません。"
10009130-136 = "まずは――"
10009130-147 = "あちらで暴れている方々を「救護」いたします！"
10009130-148 = "「災厄の狐」の元へ向かうのは、それからでも遅くはありません。#n私たちが救護を終える頃には、あちらも事を終えているでしょう。"
10009130-150 = "分かりました、団長！"
10009130-151 = "救急箱……注射器に包帯、添え木も……全部揃ってます！"
10009130-152 = "では……参りましょうか。"
10009130-153 = "『救護が必要な場に救護を』！"
