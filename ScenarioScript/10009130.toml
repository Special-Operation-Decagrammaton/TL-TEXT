[translation]
10009130-1 = "Epílogo parte 6; Feliz Dia dos Namorados!"
10009130-2 = "（Isto aconteceu pouco antes de Wakamo expressar seus sentimentos ao Sensei――）"
10009130-10 = "……。"
10009130-30 = "Até aqui, Raposa da Calamidade."
10009130-36 = "……Eu deveria ter espalhado iscas o suficiente, mas não esperava ser encontrada."
10009130-40 = "Quem é você, afinal……?"
10009130-42 = "Meu nome é Aomori Mine, comandante do Esquadrão de Socorro."
10009130-43 = "Esquadrão de Socorro……?"
10009130-44 = "Ah…… se não me engano, são aquelas pessoas de Trinity que parecem estar sempre entediadas."
10009130-45 = "Não acredito que notaram o meu alvo…… foi inesperado."
10009130-46 = "Alvo……?#nEu apenas vim correndo para prestar \"socorro\"……."
10009130-47 = "Ora, então qual seria o propósito da comandante do Esquadrão de Socorro?"
10009130-48 = "……Não me diga que você veio aqui para me impedir―― não é esse o caso, é?"
10009130-49 = "\"Raposa da Calamidade\", tenho algo a lhe perguntar."
10009130-50 = "……?"
10009130-54 = "Por que você causou todo esse alvoroço?"
10009130-56 = "……。"
10009130-60 = "Hoje é……."
10009130-61 = "――Hoje é?"
10009130-62 = "……Porque é o \"Dia dos Namorados\".#nO dia de expressar seus sentimentos para a pessoa amada."
10009130-63 = "É isso―― eu só quero transmitir meus sentimentos a ele."
10009130-64 = "Aqueles que tentarem me atrapalhar…… eu, Wakamo, não importa quem sejam……."
10009130-65 = "Jamais desistirei.#nDestruirei tudo e seguirei em frente."
10009130-69 = "Para... expressar seus sentimentos no Dia dos Namorados?"
10009130-70 = "Sim…… não me importa se não entenderem."
10009130-74 = "Se alguém ficar entre mim e ele, eu apenas destruirei."
10009130-75 = "……。"
10009130-76 = "Vamos, se é luta o que deseja――"
10009130-82 = "Por favor, pode prosseguir."
10009130-83 = "……O que você pretende com isso?"
10009130-84 = "Não sei o que está pensando, mas esse tipo de truque infantil――"
10009130-85 = "――Não, isso é sincero."
10009130-86 = "Pois no \"socorro\" prestado pelo Esquadrão de Socorro, não existem mentiras ou enganações."
10009130-91 = "Expressar seus sentimentos neste dia――#nnão há motivo para impedir alguém que tomou essa decisão."
10009130-92 = "…………。"
10009130-97 = "……!"
10009130-103 = "Deixaremos o \"socorro\" referente às suas ações para depois que isso terminar."
10009130-107 = "Comandante……?#nAquela que acabou de correr, não era por acaso……"
10009130-108 = "A \"Raposa da Calamidade\"!?"
10009130-109 = "V-você a deixou ir mesmo!?"
10009130-111 = "……。"
10009130-112 = "Serina, Hanae. Vocês se lembram que dia é hoje?"
10009130-114 = "I-isso, é claro……."
10009130-115 = "Sim! É o Dia dos Namorados, não é?"
10009130-117 = "Exato. O Dia dos Namorados não é apenas para entregar chocolates, mas também para expressar seus sentimentos."
10009130-118 = "É verdade que ela causou um alvoroço, mas#nnão significa que ficar no caminho dela seja necessariamente o correto."
10009130-119 = "Abrir caminho para que ela possa expressar seus sentimentos……."
10009130-123 = "Isso também não seria uma forma de \"socorro\" que nós realizamos?"
10009130-128 = "M-mas…… Comandante!"
10009130-132 = "Como vamos resolver toda essa confusão!?"
10009130-134 = "Sim, é verdade, Hanae."
10009130-135 = "Independente da "Raposa da Calamidade" expressar seus sentimentos, #nprimeiro precisamos resolver a confusão que está diante de nós."
10009130-136 = "Primeiro..."
10009130-147 = "Vamos prestar "socorro" àquelas pessoas que estão causando tumulto ali!"
10009130-148 = "Não será tarde demais para ir até a "Raposa da Calamidade" depois disso. #nQuando terminarmos o socorro, elas provavelmente já terão terminado o que estão fazendo também."
10009130-150 = "Entendido, Comandante!"
10009130-151 = "Kit de primeiros socorros... seringas, bandagens, talas também... está tudo pronto!"
10009130-152 = "Então... vamos nessa."
10009130-153 = "“Socorro onde o socorro for necessário”!"
