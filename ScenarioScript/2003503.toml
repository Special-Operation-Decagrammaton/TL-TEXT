[translation]
2003503-1 = "速習コース"
2003503-5 = "……おはよ～先生……むにゃ……。"
2003503-6 = "[s] \"あ……おはよう、ツバキ。ガイドの服のままで来たんだね？\""
2003503-7 = "うん……この服を着ていたからかなあ……？#nここに来る途中、いろんな人から道を訊かれちゃった～。"
2003503-8 = "ガイドの仕事って……やっぱり大変だよね……。"
2003503-9 = "私がガイドできるのは、みんなをよりよい睡眠に導くことだけだから……。"
2003503-13 = "すみません、先生！#nシャーレに「百鬼夜行の眠り姫」が来ていると聞いたんですが！"
2003503-14 = "んん……？"
2003503-15 = "[s] \"ツバキ、誰かと会う約束してる……？\""
2003503-16 = "ううん、ここには先生に会いに来たから……。"
2003503-17 = "でも……そういえばここに来る途中……#n道を訊いてきた人がみんな、私の後ろについて来たような気がしたけど……。"
2003503-21 = "（警戒しながらドアを開けた）"
2003503-25 = "（ドアの向こうには……）"
2003503-30 = "こんにちは、先生！「眠り姫」はここにいるんですよね？"
2003503-31 = "ガイド姿の「眠り姫」について行けば、ぐっすり眠れるって噂を聞いたんですよ。#n本当かどうかわかりませんけど、藁にも縋る思いで……"
2003503-32 = "うぅ……。最近ずっと不眠症で……睡眠サプリを飲んでももう眠れなくて……。#n1時間だけでいいから、ぐっすり眠りたい……。"
2003503-37 = "夜のパトロール勤務が2週間も続いたせいで……。#n生活リズムが完全におかしくなってしまいました……。"
2003503-38 = "[s] \"ヴァルキューレの生徒まで……\""
2003503-39 = "……治安を維持する前に、眠って頭をすっきりさせないと……。"
2003503-40 = "……どうしよう、先生？"
2003503-41 = "[s1] \"この子たちには……ツバキの「ガイド」が必要みたい。\"\n[s2] \"……お願いできるかな、ツバキ。\""
2003503-44 = "うん……そうだね。先生がそう言うなら……やってみるよ～。"
2003503-45 = "うまくガイドできるように……見ててね、先生。"
2003503-49 = "みんなそれぞれ感じていると思うけど……。#nぐっすり眠るって、本当はすごく難しいことなんだ……。"
2003503-50 = "たくさんの人が、今日も不眠症に苦しんでいて……。"
2003503-51 = "どうすればよく眠れるかネットで情報を集めたり、質問したりしてる。#nだから、ネットにもアドバイスはいろいろ書かれてるよね。たとえば……"
2003503-52 = "眠る前に温かいシャワーを浴びるとか、ココアを飲むとか、#nホワイトノイズを流しながら瞑想するとか……。"
2003503-53 = "でも……、ここに集まっているみんなはきっと、そういうのはもう試してそうだよね？"
2003503-55 = "はい……眠る前にシャワーを浴びてみましたが……。#n血流が良くなりすぎて、逆に眠気がとんでしまいました……。"
2003503-56 = "私も……ココアを飲んだら、カフェインのせいでかえって目がさえてしまって……。"
2003503-58 = "そもそも、ホワイトノイズは機器のメンテの時なんかにいつも聞いてるからさ。#n作業のことをあれこれ思い出しちゃって、眠れなかったよ……。"
2003503-59 = "私はアイマスクがいいと聞いて試してみたんですけど、#n今度は音に敏感になって、ちょっとした物音で目が覚めるようになって#nしまって……。"
2003503-60 = "うん、そうだよね……。ネットにもいろいろ方法は書かれているけど、#nそのなかから自分にあったやり方を見つけるのって難しいから……。"
2003503-61 = "だから、今日は私が実際に試してみて……#nいろんな人に効きそうだと思った方法を教えてあげるね。"
2003503-62 = "まずは、息を深く吸ってみて……。自然に……いつもよりゆっくりと……。"
2003503-63 = "…………すぅ。"
2003503-67 = "……ぐぅ……。"
2003503-69 = "も、もう眠ってる！？"
2003503-70 = "さすが百鬼夜行の眠り姫……！って、待って……。#n先に眠らないでください……！"
2003503-76 = "んん……？あ、ごめん。つい……うとうとしちゃった。"
2003503-77 = "えっと、それから次は……目や口の周りの強張りを解いてあげるの……。#n余分な力を入れないようにして……表情は優しく微笑む感じだよ……。"
2003503-78 = "うん、そう……。深く呼吸するのも忘れないでね……。#n息を深く吸って……吐いて……すぅ……"
2003503-82 = "……ぐぅ……。"
2003503-83 = "すこし緊張が緩むような感じが……って、また寝てる！？"
2003503-84 = "うぅ……羨ましい……。この驚異的な寝つきのよさ……。"
2003503-86 = "ふあぁ……ん？もうおやつの時間……？じゃないよね……"
2003503-87 = "えっと、どこまで話したっけ……そうだ……それで顔の力が抜けたら#n次は、首から胸、胸から脚の順で力を抜いていくの……。"
2003503-88 = "全身が雲みたいにかるーく、水に浮いているところを想像して……。だんだん、意識も体から離れてふわふわ浮かび上がるような感覚になる……。"
2003503-89 = "頭のなかに雑念があると、邪魔になるから……。#nそんな時は……自分の呼吸に耳を澄ませてみて……呼吸に集中して……。"
2003503-90 = "難しかったら……横になる前にアイマスクと耳栓をするのもおすすめだよ……。"
2003503-91 = "アイマスクだけじゃダメなんですか？"
2003503-92 = "うん……外の音が聞こえなくなると、呼吸に集中しやすくなるから……。"
2003503-93 = "すぅ……こうしていると……気づいたら……。"
2003503-97 = "……ぐぅ……。"
2003503-99 = "さすがです……！#nうん……なんだか私も、いつもより力が抜けてきたような……。"
2003503-100 = "このふわふわした感覚……ひさしぶりだなあ……。"
2003503-102 = "あれ……なんだろう……瞼が重い……もしかして……。"
2003503-103 = "……ぐぅ……。"
2003503-114 = "（生徒たちはゆっくりと眠りについた）"
2003503-115 = "（ツバキの睡眠ガイドの効果は……抜群だ！）"
2003503-117 = "むにゃ……？あれ、みんな……もう寝ちゃったの……？"
2003503-118 = "ふふっ……良かったあ～。"
2003503-119 = "[s] \"さすがツバキ！信じてたよ！\""
2003503-120 = "しーっ、先生。大きな声を出すとみんなの目が覚めちゃうかも……。"
2003503-123 = "それじゃあ、私も……このまま……おやすみなさい～。"
2003503-129 = "[ns] （えっと、ツバキ？）"
2003503-130 = "膝、ちょっと借りるね……？"
2003503-131 = "いいよね？先生……"
2003503-133 = "（ツバキは膝の上ですやすやと眠りに落ちた）"
2003503-134 = "（シャーレは生徒たちの穏やかな寝息で満たされていた）"
