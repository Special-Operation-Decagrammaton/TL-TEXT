[translation]
2003503-1 = "Curso Intensivo"
2003503-5 = "……Bom dia, Sensei…… cochilo……."
2003503-6 = "[s] \"Ah…… bom dia, Tsubaki. Você veio usando o uniforme de guia?\""
2003503-7 = "Sim…… será que foi por causa dessa roupa……?#nNo caminho para cá, várias pessoas me pediram informações sobre o caminho~."
2003503-8 = "O trabalho de guia…… é realmente difícil, né……."
2003503-9 = "A única coisa que eu consigo guiar é as pessoas para um sono melhor……."
2003503-13 = "Com licença, Sensei!#nOuvi dizer que a \"Bela Adormecida de Hyakkiyako\" está no Schale!"
2003503-14 = "Hmm……?"
2003503-15 = "[s] \"Tsubaki, você marcou de encontrar alguém……?\""
2003503-16 = "Não, eu vim aqui para encontrar o Sensei……."
2003503-17 = "Mas…… agora que você falou, no caminho para cá……#nSenti como se todas as pessoas que me pediram informações estivessem me seguindo……."
2003503-21 = "（Abre a porta em alerta）"
2003503-25 = "（Do outro lado da porta……）"
2003503-30 = "Olá, Sensei! A \"Bela Adormecida\" está aqui, não está?"
2003503-31 = "Ouvi o boato de que, se você seguir a \"Bela Adormecida\" em seu traje de guia, você consegue dormir profundamente.#nNão sei se é verdade, mas estou desesperada……"
2003503-32 = "Ugh…… Tenho sofrido de insônia ultimamente…… nem suplementos de sono funcionam mais…….#nSó preciso de uma hora, quero dormir profundamente……."
2003503-37 = "Por causa de dois turnos seguidos de patrulha noturna…….#nMeu ritmo de vida ficou completamente bagunçado……."
2003503-38 = "[s] \"Até alunas da Valkyrie……\""
2003503-39 = "……Antes de manter a ordem, preciso dormir e limpar a mente……."
2003503-40 = "……O que eu faço, Sensei?"
2003503-41 = "[s1] \"Parece que elas precisam do seu 'guia', Tsubaki.\"\n[s2] \"……Pode fazer isso por elas, Tsubaki?\""
2003503-44 = "Sim…… entendi. Se o Sensei diz…… eu vou tentar~."
2003503-45 = "Vou tentar guiar bem…… fique de olho em mim, Sensei."
2003503-49 = "Acho que cada uma de vocês sente isso…….#nDormir profundamente é, na verdade, algo muito difícil……."
2003503-50 = "Muitas pessoas estão sofrendo de insônia hoje em dia……."
2003503-51 = "Elas pesquisam na internet ou fazem perguntas sobre como dormir melhor.#nPor isso, existem vários conselhos na internet. Por exemplo……"
2003503-52 = "Tomar um banho quente antes de dormir, beber chocolate quente, ou meditar ouvindo ruído branco……."
2003503-53 = "Mas…… todas vocês que estão aqui reunidas provavelmente já tentaram essas coisas, certo?"
2003503-55 = "Sim…… tentei tomar banho antes de dormir, mas……#nA circulação sanguínea ficou tão boa que, pelo contrário, perdi o sono……."
2003503-56 = "Eu também…… tomei chocolate quente, mas por causa da cafeína, fiquei ainda mais desperta……."
2003503-58 = "Para começar, eu sempre ouço ruído branco durante a manutenção dos equipamentos.#nAcabo lembrando do trabalho e não consigo dormir……."
2003503-59 = "Ouvi dizer que máscaras de dormir são boas e tentei usar, mas#nfiquei sensível aos sons e qualquer barulhinho me acordava……."
2003503-60 = "Sim, entendo…… Existem muitos métodos na internet, mas#né difícil encontrar o que funciona para você……."
2003503-61 = "Por isso, hoje vou ensinar os métodos que eu mesma testei e#nque achei que funcionariam para várias pessoas."
2003503-62 = "Primeiro, tente respirar fundo…… Naturalmente…… mais devagar que o normal……."
2003503-63 = "…………Sussurro."
2003503-67 = "……Zzz……."
2003503-69 = "J-já está dormindo!?"
2003503-70 = "Como esperado da Bela Adormecida de Hyakkiyako……! Espere……#nNão durma antes de nós……!"
2003503-76 = "Hmm……? Ah, desculpe. Acabei…… cochilando."
2003503-77 = "Bem, depois disso…… você relaxa a tensão ao redor dos olhos e da boca…….#nTente não fazer esforço desnecessário…… a expressão deve ser como um sorriso gentil……."
2003503-78 = "Sim, isso…… Não se esqueça de respirar fundo também…….#nRespire fundo…… e solte…… sussurro……"
2003503-82 = "……Zzz……."
2003503-83 = "Sinto que a tensão está diminuindo…… espere, dormiu de novo!?"
2003503-84 = "Ugh…… que inveja…… Essa facilidade fenomenal para dormir……."
2003503-86 = "Bocejo…… hm? Já é hora do lanche……? Acho que não……"
2003503-87 = "Bem, onde eu parei…… Ah, sim…… depois que relaxar o rosto,#npróximo passo é relaxar o pescoço, o peito e depois as pernas, nessa ordem……."
2003503-88 = "Imagine que seu corpo inteiro está leve como uma nuvem, flutuando na água…… Aos poucos, a consciência se desprende do corpo e você sente como se estivesse flutuando……."
2003503-89 = "Se houver pensamentos intrusivos na sua mente, eles vão atrapalhar…….#nNesses momentos…… tente ouvir o som da sua própria respiração…… concentre-se nela……."
2003503-90 = "Se for difícil…… também recomendo usar máscara de dormir e protetores auriculares antes de se deitar……."
2003503-91 = "Não dá para usar só uma máscara de dormir?"
2003503-92 = "Sim... quando não consigo ouvir os sons externos, fica mais fácil me concentrar na respiração..."
2003503-93 = "Suuu... fazendo assim... quando percebo..."
2003503-97 = "...Zzz..."
2003503-99 = "Como esperado...!#nSim... sinto que até eu estou ficando mais relaxada que o normal..."
2003503-100 = "Essa sensação de leveza... faz tempo que não sentia isso..."
2003503-102 = "Ué... o que é isso... minhas pálpebras estão pesadas... será que..."
2003503-103 = "...Zzz..."
2003503-114 = "(As alunas caíram em um sono profundo lentamente)"
2003503-115 = "(O guia de sono da Tsubaki é... extremamente eficaz!)"
2003503-117 = "Munya...? Ué, pessoal... já dormiram...?"
2003503-118 = "Hehe... que bom~."
2003503-119 = "[s] \"Como esperado da Tsubaki! Eu confiava em você!\""
2003503-120 = "Shiii, Sensei. Se falar alto, pode acabar acordando todo mundo..."
2003503-123 = "Então, eu também vou... ficar assim... boa noite~."
2003503-129 = "[ns] (Ei, Tsubaki?)"
2003503-130 = "Posso emprestar seu colo um pouquinho...?"
2003503-131 = "Tudo bem, né? Sensei..."
2003503-133 = "(Tsubaki adormeceu tranquilamente no seu colo)"
2003503-134 = "(O Schale estava preenchido pela respiração calma das alunas)"
