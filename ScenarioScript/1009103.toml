[translation]
1009103-1 = "放課後バンド部"
1009103-9 = "お邪魔しまーす。#nあぁ疲れた……。"
1009103-10 = "靴はここで脱いでっと……。"
1009103-14 = "……よいしょ。"
1009103-19 = "ふぅっ、落ち着くー……。"
1009103-20 = "……ん？"
1009103-21 = "……先生、どうしたの？#n何か面白いことでもあった？"
1009103-22 = "[s1] \"寛いで良いよ、とは言いつつも。\"\n[s2] \"ものすごい寛ぎようだなって。\""
1009103-25 = "え、あ、もしかしてダメだった！？"
1009103-26 = "……そうじゃない？"
1009103-27 = "ほんと？"
1009103-28 = "なら良かった……ちょっと焦っちゃったよ。"
1009103-32 = "……いや待った。"
1009103-33 = "先生、しょっちゅう社交辞令ばっかり言うし……。"
1009103-34 = "やっぱり……私、ちょっと距離感間違えてる……？"
1009103-35 = "[s3] \"本当に大丈夫だよ。\"\n[s4] \"そういえば今日は、何があってこんな遅くまで？\""
1009103-41 = "うーん……。"
1009103-42 = "まあ、一旦信じるとしよっかな……。"
1009103-43 = "えっと、今日あったことの話だっけ？"
1009103-44 = "別に、何か特殊なことがあったわけじゃなくって。"
1009103-45 = "さっきモモトークでも言ったけど、練習が長引いただけ。#n息が合ってきたなぁって思ってたら、楽しくなっちゃってさ。"
1009103-46 = "ほら、楽しいと時間忘れちゃうでしょ？"
1009103-47 = "珍しく帰り際まで、買ってきたスイーツを食べ終わってないくらいでさ。"
1009103-48 = "あれじゃ「放課後スイーツ部」じゃなくて「放課後バンド部」だね。"
1009103-49 = "……あ、そうだ。"
1009103-50 = "言ってたら思い出した、残ったスイーツ持って帰ってきたんだった。"
1009103-51 = "先生も食べる？"
1009103-52 = "[s5] \"ありがとう！\"\n[s6] \"ちょうど糖分が欲しかったところ！\""
1009103-55 = "ふふっ、今日のは結構期待してくれても良いよ。"
1009103-56 = "なんと……じゃじゃーん！"
1009103-57 = "[s7] \"……「カフェ・ミルフィーユ」の！\"\n[s8] \"「すくって食べるクッキー＆クリームケーキ」！\""
1009103-60 = "へぇ、先生も知ってるんだ！"
1009103-61 = "もともと詳しかったんだっけ？#nそれとも私たちに影響されちゃった？"
1009103-62 = "ま、どっちでも良いか。ふふっ。"
1009103-63 = "じゃあ早速……！あむっ……。"
1009103-67 = "……あ。"
1009103-68 = "[s9] \"……カズサ？\"\n[s10] \"どうしたの？\""
1009103-71 = "あ、いやその……何というか、がっついちゃったから……。"
1009103-72 = "ちょっとお行儀悪かったかな～って……。"
1009103-73 = "はい、次は先生が食べて。順番こ。"
1009103-74 = "……えぇ？#nまぁ、気にしないなら良いんだけどさ。"
1009103-75 = "う、うん……そっか……。"
1009103-76 = "じゃあ、先生がそう言うなら……。"
1009103-81 = "……や、やっぱりダメ、気になる！"
1009103-82 = "一度気になっちゃうとダメだぁ……。"
1009103-83 = "ほら先生。"
1009103-88 = "食べていいよ。"
1009103-90 = "……早く食べてよ。"
1009103-93 = "[wa:1000]― [log=카즈사 밴드]……[wa:2290]ほら、[wa:1090]早く！[/log]"
1009103-96 = "[wa:835]― [log=카즈사 밴드]あ～ん[wa:615]して！[/log]"
1009103-97 = "[wa:800]― [log=카즈사 밴드]落ちる前に！[/log]"
1009103-100 = "[wa:1120]― [log=카즈사 밴드]先生が食べてくれないと、[/log]"
1009103-101 = "[wa:1850]― [log=카즈사 밴드]私も食べらんないから！[/log]"
1009103-104 = "[wa:1670]― [log=카즈사 밴드]はい、[wa:895]あ～[wa:910]ん！[/log]"
1009103-107 = "[wa:330]― [log=카즈사 밴드]……[wa:1240]え？[/log]"
1009103-110 = "― [log=카즈사 밴드]大丈夫？[/log]"
1009103-111 = "[wa:1810]― [log=카즈사 밴드]先に[wa:650]食べ[wa:450]て……？[/log]"
1009103-114 = "[wa:620]― [log=카즈사 밴드]え……？[/log]"
1009103-115 = "[wa:1240]― [log=카즈사 밴드]このスプーン、[wa:1585]カズサの[wa:860]だし？[/log]"
1009103-118 = "― [log=카즈사 밴드]……[wa:2860]へ？[/log]"
1009103-119 = "[wa:800]― [log=카즈사 밴드]……[wa:1190]あれ？[/log]"
1009103-122 = "[wa:1720]― [log=카즈사 밴드]スプーン……？[/log]"
1009103-123 = "[wa:2690]― [log=카즈사 밴드]私の……？[/log]"
1009103-126 = "[wa:330]― [log=카즈사 밴드]……[wa:500]あ。[/log]"
1009103-129 = "― [log=카즈사 밴드]うわああああぁ！？[/log]"
1009103-130 = "[wa:2250]― [log=카즈사 밴드]今の[wa:460]ナシ！[/log]"
1009103-133 = "せ、先生違う！そういうのじゃないから、これは！"
1009103-134 = "だ、だからその、えっと……！"
1009103-135 = "やばっ、ケーキ落ちる……！！"
1009103-140 = "（幸いにも、ケーキはお皿の上に落ちたので無事だった）"
1009103-141 = "（カズサはケーキを食べながら、真っ赤な顔で色々とまくし立てたのち、そのままの勢いでシャーレから飛び出していった）"
