[translation]
80000077-1 = "rosas azuis e chocolate"

80000077-2 = "Canteiro de flores de Atsuko"

80000077-3 = "Bom dia, Sensei."

80000077-4 = "[s] \"Bom dia, Atsuko. ``Saudações são importantes'', certo? \""

80000077-5 = "Sim. Estou feliz que você se lembre."

80000077-6 = "Por que você ligou?"

80000077-7 = "isso é……"

80000077-8 = "……segredo."

80000077-9 = "...Que piada. Não fique tão preocupado."

80000077-10 = "Sim, isso."

80000077-15 = "[ns] \"Talvez... chocolate do Dia dos Namorados?\""

80000077-16 = "...Isso também é um segredo."

80000077-17 = "Por favor, abra-o logo."

80000077-18 = "(A pedido de Atsuko, ela abre o pacote de chocolate)"

80000077-19 = "(O acabamento do chocolate que apareceu por dentro ficou um pouco desajeitado.)"

80000077-20 = "[ns] \"Talvez seja feito à mão...?\""

80000077-21 = "...Hehe."

80000077-22 = "Se sim, o que você faria?"

80000077-23 = "[s] \"Onde e como isso aconteceu...?\""

80000077-24 = "Hum..."

80000077-25 = "Isso também é um segredo, eu acho."

80000077-26 = "[s] \"É segredo de novo...\""

80000077-27 = "...Eu ouvi isso de Hiyori."

80000077-28 = "Não há problema em uma princesa ter muitos segredos."

80000077-29 = "Porém, não sou mais uma “princesa”."

80000077-30 = "[s] \"Atsuko ainda é minha princesa! Agora me dê suas ordens!\""

80000077-31 = "Hehe, é isso mesmo?"

80000077-32 = "Isso pode me deixar um pouco feliz."

80000077-33 = "Agora, aqui estão as ordens da princesa."

80000077-34 = "Por favor, aproveite o seu chocolate. depois disso--"

80000077-35 = "Por favor, cuide dessas flores até o fim. #n...Porque ele é o filho que eu valorizei e criei."

80000077-36 = "[s] \"Sim! Vou transformá-las em flores secas e guardá-las com carinho pelo resto da minha vida!\""

80000077-37 = "...O que são flores secas?"

80000077-39 = "(Expliquei para Atsuko sobre flores secas)"

80000077-41 = "……incrível. Existe uma maneira de fazer isso."

80000077-42 = "[s] \"Sim, você pode manter as flores lindas.\""

80000077-43 = "Isso mesmo... então, Sensei. Por favor, cuide bem dessa criança."

80000077-44 = "...Hehe. Dessa forma, a criança pode ficar com o Sensei para sempre."

80000077-45 = "O chocolate terá acabado."

80000077-46 = "[s] \"Quando você diz isso, parece um desperdício comê-lo...\""

80000077-47 = "...Isso é um problema."

80000077-48 = "razão……? #nIsso porque eu queria comer chocolate com minha Senseia."

80000077-49 = "...enquanto olha para este canteiro de flores."

80000077-50 = "[s] \"Foi por isso que você me chamou aqui?\""

80000077-51 = "Sim. Eu queria que você visse as flores que você trabalhou tanto para cultivar."

80000077-52 = "Foi graças à Senseia que consegui criar um canteiro de flores tão lindo."

80000077-53 = "Obrigada por sempre me ensinar tantas coisas."

80000077-55 = "(Eu compartilhei um chocolate com Atsuko e comi enquanto olhava para o canteiro de flores.)"

