[translation]
80000077-1 = "Rosas azuis e chocolate"
80000077-2 = "O canteiro de flores da Atsuko"
80000077-3 = "Bom dia, Sensei."
80000077-4 = "[s] \"Bom dia, Atsuko. 'Saudações são importantes', não é?\""
80000077-5 = "Sim. Fico feliz que você se lembre."
80000077-6 = "O motivo de eu ter te chamado?"
80000077-7 = "Isso é..."
80000077-8 = "...um segredo."
80000077-9 = "...Estou brincando. Não fique com essa cara de confuso."
80000077-10 = "Aqui, pegue isto."
80000077-15 = "[ns] \"Será que é... chocolate de Dia dos Namorados?\""
80000077-16 = "...Isso também é segredo."
80000077-17 = "Abra logo para ver."
80000077-18 = "(Incentivado por Atsuko, abri o embrulho do chocolate)"
80000077-19 = "(O acabamento do chocolate que apareceu lá dentro tinha alguns detalhes um pouco amadores)"
80000077-20 = "[ns] \"Por acaso, foi feito à mão...?\""
80000077-21 = "...Fufu."
80000077-22 = "E se for, o que você vai fazer?"
80000077-23 = "[s] \"Como, onde e quando você conseguiu fazer isso...?\""
80000077-24 = "Hmm..."
80000077-25 = "Isso também é segredo, eu acho."
80000077-26 = "[s] \"Mais um segredo, hein...\""
80000077-27 = "...Ouvi dizer pela Hiyori."
80000077-28 = "Que princesas podem ter muitos segredos."
80000077-29 = "Embora, eu não seja mais uma 'princesa'."
80000077-30 = "[s] \"Para mim, você ainda é minha princesa! Agora, diga-me qual é o seu comando!\""
80000077-31 = "Fufu, é mesmo?"
80000077-32 = "Isso me deixa um pouco feliz."
80000077-33 = "Então, aqui está uma ordem da sua princesa."
80000077-34 = "Por favor, coma o chocolate e aproveite. E depois..."
80000077-35 = "Cuide bem daquela flor até o fim.#n...Porque é uma criança que eu cultivei com muito carinho."
80000077-36 = "[s] \"Sim! Vou transformá-la em uma flor seca e guardá-la para sempre!\""
80000077-37 = "...Flor seca? O que é isso?"
80000077-39 = "(Expliquei para a Atsuko o que é uma flor seca)"
80000077-41 = "...Incrível. Então existe um método assim."
80000077-42 = "[s] \"Sim, é possível preservar a flor mantendo sua beleza.\""
80000077-43 = Entendo... Então, Sensei, cuide bem dela."
80000077-44 = "...Fufu. Assim, ela poderá ficar com você para sempre, Sensei."
80000077-45 = "O chocolate, por outro lado, vai acabar."
80000077-46 = "[s] \"Dito isso, dá até pena de comer...\""
80000077-47 = "...Isso seria um problema."
80000077-48 = "O motivo...?#nÉ porque eu queria comer o chocolate junto com você, Sensei."
80000077-49 = "...Enquanto olhamos para este canteiro."
80000077-50 = "[s] \"Então foi por isso que você me chamou aqui?\""
80000077-51 = "Sim. Eu queria que você visse as flores que me esforcei para cultivar."
80000077-52 = "Conseguir criar um canteiro tão lindo também foi graças a você, Sensei."
80000077-53 = "Obrigada por sempre me ensinar tantas coisas."
80000077-55 = "(Enquanto observávamos o canteiro com a Atsuko, dividimos e comemos o chocolate)"
