12195-92 = "[7cd0ff]対策委員会[-]"
12195-93 = "おかえりなさい、です！！"
12195-96 = "シロコ"
12195-97 = "[7cd0ff]対策委員会[-]"
12195-98 = "おかえり、ホシノ先輩。"
12195-102 = "ホシノ"
12195-103 = "[7cd0ff]対策委員会[-]"
12195-104 = "あはは……。"
12195-107 = "ホシノ"
12195-108 = "[7cd0ff]対策委員会[-]"
12195-109 = "……何だかみんな、期待に満ちた表情だけど。"
12195-112 = "ホシノ"
12195-113 = "[7cd0ff]対策委員会[-]"
12195-114 = "……求められてるのは、あの台詞？"
12195-117 = "セリカ"
12195-118 = "[7cd0ff]対策委員会[-]"
12195-119 = "ああもうっ！分かってるなら焦らさないでよ！"
