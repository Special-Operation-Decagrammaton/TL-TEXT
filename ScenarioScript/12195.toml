[translation]
12195-2 = "ねえ、ホシノちゃん。"
12195-3 = "私ね、"
12195-4 = "ホシノちゃんと初めて会った時、これは夢なんじゃないかなって思って、何度も頬をつねったの。"
12195-5 = "ホシノちゃんみたいな、可愛くて強くて、頼れる後輩がそばにいてくれるなんていう夢みたいなことが、本当に嬉しくて……。"
12195-6 = "うーん、上手く説明できてないかもしれないけど……。"
12195-7 = "ただ、こうしてホシノちゃんと一緒にいられることが、私にとっては奇跡みたいなものなの。"
12195-8 = "……毎日毎日、こうして一緒にいるじゃないですか。"
12195-9 = "昨日も今日も、明日もそうです。こんな当たり前なことで、何を大袈裟なことを。"
12195-10 = "はぅ……だって……。"
12195-11 = "「奇跡」というのはもっとすごくて、珍しいもののことですよ。"
12195-12 = "……ううん、ホシノちゃん。"
12195-13 = "私は、そうは思わないよ。"
12195-14 = "ねえ、ホシノちゃん。いつかホシノちゃんにも可愛い後輩ができたら、その時は――"
12195-16 = "……。"
12195-19 = "先輩はすぐそこにいるはずです！！"
12195-20 = "ん、壊れない……もう一度……"
12195-22 = "あ、アヤネちゃん！？どうしてここに！？"
12195-23 = "シャーレに貸してもらったヘリで！ホシノ先輩は！？"
12195-24 = "ここです！でもドアが開かなくて……！！"
12195-25 = "こんのっ！！"
12195-26 = "（ドカアアアァァァァンッ！！！）"
12195-28 = "（一体、何が……）"
12195-29 = "（体が自由に……？夢でも見てるのかな……）"
12195-30 = "（みんなの声が聞こえたし、夢か……）"
12195-31 = "（声……）"
12195-36 = "（こっちの方、かな……）"
12195-37 = "（夢でもいいから……最後に、もう一度だけ……）"
12195-40 = "（ガチャン！）"
12195-42 = "ホシノ先輩！！！！"
12195-46 = "あ、あれ……どうやって……。"
12195-47 = "どうして……だって、私は……。"
12195-50 = "[ns] \"ホシノ。\""
12195-52 = "ホシノ"
12195-53 = "……ああ。"
12195-56 = "ホシノ"
12195-57 = "そっか……みんなが、先生が……。"
12195-60 = "ホシノ"
12195-61 = "大人が、ね……はは。"
12195-66 = "セリカ"
12195-67 = "[7cd0ff]対策委員会[-]"
12195-68 = "……お、おかえりっ！先輩！"
12195-71 = "ノノミ"
12195-72 = "[7cd0ff]対策委員会[-]"
12195-73 = "ああっ、セリカちゃんに先を越されてしまいました！#n恥ずかしいから言わないって言ってたのに、ズルいです！"
12195-76 = "セリカ"
12195-77 = "[7cd0ff]対策委員会[-]"
12195-78 = "う、うるさいうるさいっ！順番なんてどうでも良いでしょ！"
12195-81 = "シロコ"
12195-82 = "[7cd0ff]対策委員会[-]"
12195-83 = "……無事で良かった。"
12195-86 = "アヤネ"
12195-87 = "[7cd0ff]対策委員会[-]"
12195-88 = "ホシノ先輩、おかえりなさい！！"
