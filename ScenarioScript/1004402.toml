[translation]
1004402-1 = "Às vezes, um dia assim é bom"
1004402-2 = "（Nonomi estava esperando em frente ao saguão, acenando com a mão）"
1004402-7 = "Ah, Sensei! Aqui!~"
1004402-8 = "Estava esperando por você~."
1004402-9 = "[s1] \"O que é toda essa bagagem...?\"\n[s2] \"O que tem aí dentro?\""
1004402-12 = "Ah, isso?~"
1004402-13 = "Não é nada demais, mas..."
1004402-14 = "Pensei que não saberia se o local da vistoria seria ideal para um piquenique sem abrir a bagagem..."
1004402-15 = "Então, trouxe algumas coisas!"
1004402-19 = "Um guarda-sol, uma toalha, sanduíches..."
1004402-23 = "Também tem suco~ Laranja, maçã,"
1004402-24 = "e três tipos de uva..."
1004402-25 = "...Eh? Você quer me ajudar a carregar a bagagem?"
1004402-26 = "Fufu, eu sabia que o Sensei diria isso."
1004402-27 = "Mas está tudo bem!"
1004402-28 = "Agradeço a intenção, mas como fui eu quem te convidei..."
1004402-34 = "Além disso, embalei tudo para que eu pudesse carregar sozinha...! Só de você vir comigo, já fico feliz☆"
1004402-35 = "[s3] \"...Se você insiste.\"\n[s4] \"Me avise se ficar pesado, eu carrego a qualquer momento.\""
1004402-39 = "Fufu, então vamos partir~☆"
1004402-46 = "Uau... a vista é linda em todos os lugares. Fico até em dúvida☆"
1004402-50 = "...Que tal por aqui?"
1004402-51 = "Não é tão longe do resort, o espaço é amplo..."
1004402-52 = "E a ventilação é ótima!"
1004402-53 = "Muito bem, vou descarregar as coisas..."
1004402-57 = "...Sensei, aconteceu alguma coisa?"
1004402-58 = "...Eh, suco de abacaxi?"
1004402-59 = "Vou verificar a bagagem..."
1004402-63 = "...Ora?"
1004402-67 = "Desculpe, parece que não trouxe suco de abacaxi..."
1004402-68 = "Acho que deve ter no saguão..."
1004402-69 = "Espere um pouco, por favor☆ Já volto com ele~"
1004402-73 = "Já volto!"
1004402-77 = "[ns5] \"...Bem, vamos começar.\"\n[ns6] Começa a desempacotar as coisas."
1004402-85 = "Voltei~!"
1004402-86 = "Trouxe o suco de abacaxi que você pediu..."
1004402-90 = "...Ué?"
1004402-91 = "...Sensei, o que é isso..."
1004402-92 = "[s7] \"Bem-vinda de volta, Nonomi.\"\n[s8] \"Preparei tudo enquanto você estava fora.\""
1004402-97 = "...Entendo, era isso então."
1004402-98 = "Será que esse suco de abacaxi também..."
1004402-99 = "Foi para não me deixar preocupada...?"
1004402-100 = "Ah, Sensei! Eu disse que estava tudo bem... mas obrigada."
1004402-101 = "Eu só queria passar um tempo com você..."
1004402-102 = "E acabei te dando trabalho."
1004402-106 = "Deve ter sido difícil preparar tudo, não é?"
1004402-107 = "[s9] \"A Nonomi sempre cuida de todos ao seu redor.\"\n[s10] \"Pensei que, pelo menos desta vez, você poderia contar comigo.\""
1004402-112 = "Sensei..."
1004402-113 = "...Fufu."
1004402-114 = "Sensei, você pode mesmo dizer essas coisas?~"
1004402-115 = "Eu vou acabar me acostumando, viu?"
1004402-116 = "Não adianta se arrepender depois, viu?"
1004402-117 = "[s11] \"Claro, está tudo bem.\" \n[s12] \"É um prazer ser útil. Venha aqui!\""
1004402-118 = "Fufu..."
1004402-119 = "Fufu..."
1004402-120 = "Isso me deixa muito feliz e até animada☆ O que será que eu deveria pedir~"
1004402-121 = "……"
1004402-122 = "Mas, por hoje, vamos parar por aqui."
1004402-123 = "Suas palavras são muito gentis, Sensei, mas..."
1004402-124 = "Seria um desperdício usar a chance de depender de você tão facilmente... Vou guardar para um momento mais importante."
1004402-125 = "Então, quando esse momento chegar..."
1004402-131 = "Você não pode recusar de jeito nenhum, combinado?☆"
