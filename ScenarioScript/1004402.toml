[translation]
1004402-1 = "たまにはこういう日も"
1004402-2 = "（ロビーの前でノノミが手を振りながら待っていた）"
1004402-7 = "あ、先生！ここです～！"
1004402-8 = "お待ちしておりました～。"
1004402-9 = "[s1] \"その荷物は一体……？\"\n[s2] \"何が入ってるの？\""
1004402-12 = "あ、これですか～？"
1004402-13 = "そんな大したものではないんですが……。"
1004402-14 = "実際に荷物を広げてみないと、下見の場所がピクニックに最適か分からないと思って……"
1004402-15 = "なので、いくつか持ってきました！"
1004402-19 = "パラソルに、シートに、サンドイッチに……。"
1004402-23 = "ジュースもありますよ～オレンジとりんご、"
1004402-24 = "ぶどうの3種類を……"
1004402-25 = "……え？荷物を一緒に持ってくださるんですか？"
1004402-26 = "ふふ、先生ならそう言ってくれると思いました。"
1004402-27 = "でも大丈夫です！"
1004402-28 = "お気持ちは嬉しいですが、私からお誘いしたので……。"
1004402-34 = "それに、一人で持てるよう包んでいるので……！一緒に行ってくださるだけで嬉しいです☆"
1004402-35 = "[s3] \"……そこまで言うなら。\"\n[s4] \"重たかったら言ってね、いつでも持つから。\""
1004402-39 = "ふふっ、では出発～☆"
1004402-46 = "わぁ……どこも景観が良いですね。悩んでしまいます☆"
1004402-50 = "……この辺がいいですかね？"
1004402-51 = "あまりリゾートから遠すぎないですし、席も広くて……"
1004402-52 = "風通しも抜群！"
1004402-53 = "さてと、荷物を下ろして……。"
1004402-57 = "……先生、どうかされましたか？"
1004402-58 = "……ええと、パイナップルジュース、ですか？"
1004402-59 = "荷物を確認しますね……"
1004402-63 = "……あら？"
1004402-67 = "すみません、パイナップルジュースは持ってきてないみたいで……"
1004402-68 = "ホールにはあると思うのですが……。"
1004402-69 = "ちょっと待っててください☆すぐに持ってきますね～"
1004402-73 = "いってきま～す！"
1004402-77 = "[ns5] \"……さて、やるか。\"\n[ns6] 荷解きを始める。"
1004402-85 = "ただいま戻りました～！"
1004402-86 = "ご注文のパイナップルジュースをお持ちしまし……"
1004402-90 = "……あれ？"
1004402-91 = "……先生、これは一体……。"
1004402-92 = "[s7] \"おかえり、ノノミ\"\n[s8] \"待ってる間に準備しておいたよ。\""
1004402-97 = "……なるほど、そういう事だったんですね。"
1004402-98 = "もしかして、このパイナップルジュースも……"
1004402-99 = "私に気を遣わせないために……？"
1004402-100 = "もう、先生ったら！大丈夫だって言ったのに……ありがとうございます。"
1004402-101 = "先生とご一緒できたらいいなって思ってたら……"
1004402-102 = "逆に迷惑をかけてしまいましたね。"
1004402-106 = "準備するの大変だったでしょう？"
1004402-107 = "[s9] \"ノノミはいつも周りに気を配ってくれるから。\"\n[s10] \"こういう時だけでも、私に甘えて欲しいなと思って。\""
1004402-112 = "先生……。"
1004402-113 = "……ふふっ。"
1004402-114 = "先生ってば、そんな事言っちゃっていいんですか～？"
1004402-115 = "私、本当に甘えちゃいますよ？"
1004402-116 = "後悔しても遅いんですからね？"
1004402-117 = "[s11] \"もちろん、大丈夫だよ。\"\n[s12] \"甘えられるのは本望だよ。おいで！\""
1004402-118 = "ふふ……。"
1004402-119 = "ふふ……。"
1004402-120 = "それは嬉しいですし、楽しみになってきちゃいますね☆何をお願いしちゃおうかな～。"
1004402-121 = "……。"
1004402-122 = "でも、今日はここまでにします。"
1004402-123 = "先生のお言葉はとってもありがたいのですが……。"
1004402-124 = "先生に甘える機会を簡単に使ってしまうのはもったいないので……もっと大事な時に、使いますね。"
1004402-125 = "なので、その時は……。"
1004402-131 = "絶対に断っちゃダメ、ですからね☆"
