[translation]
13020-1 = "Episódio 2; Visitantes Indesejados"
13020-5 = "Cof, cof.#nUgh..."
13020-6 = "Era aqui o último lugar?"
13020-7 = "Sim, deveria ser..."
13020-8 = "Mas, por que transferir o depósito em uma época como esta..."
13020-9 = "Parece que este lugar foi deixado de lado por muito tempo...#nO que costumava ser aqui originalmente?"
13020-10 = "Dizem que guardavam documentos confidenciais da escola, ou algo assim..."
13020-11 = "...Documentos confidenciais?"
13020-12 = "Dito isso, não devem ser mais necessários.#nNão foi por isso que ordenaram o descarte?"
13020-13 = "Mas, talvez fosse bom dar uma olhada rápida nos documentos, não acha...?"
13020-14 = "...Não, o descarte é o melhor caminho.#nNão temos muito tempo."
13020-15 = "Bem, é verdade... Hm?"
13020-20 = "¡!?"
13020-21 = "O que foi!?"
13020-22 = "A coluna...! Fujam!"
13020-27 = "Haa, haa...#n...Você se machucou?"
13020-28 = "E-estou bem.#nQuem diria que a deterioração estava tão avançada assim..."
13020-29 = "Não dá para organizar nada desse jeito...#nVou confirmar com o pessoal lá de cima..."
13020-30 = "Hm? O que é isso?"
13020-34 = "Que documentos são esses?"
13020-35 = "Deixa eu ver..."
13020-36 = "“Contrato de Compra e Venda――"
13020-37 = "――Escola de Ensino Médio Abydos”?"
13020-53 = "Com licença..."
13020-59 = "Aquela é a vice-presidente do conselho estudantil..."
13020-60 = "..."
13020-61 = "Por que ela ainda está aqui sozinha..."
13020-62 = "...Hm?"
13020-69 = "Sinto que alguém está me olhando..."
13020-70 = "..."
13020-71 = "...Deve ser impressão minha."
13020-73 = "Haa, haa..."
13020-74 = "Que susto..."
13020-75 = "Mesmo estando tão longe...#nEu já tinha ouvido rumores sobre ela..."
13020-76 = "Que tipo de rumores?"
13020-78 = "...Ah, bem, isso.#nHoshino-san..."
13020-82 = "¡!?"
13020-84 = "Ora... Você sabe o meu nome?"
13020-86 = "Bem, é que..."
13020-87 = "Quem é você?#nO que quer comigo?"
13020-88 = "E-eu sou..."
13020-89 = "De qual escola você é?#nQual sua afiliação e ano?"
13020-90 = "Não vou pegar leve só porque você é mais velha.#nVocê deve saber disso, se andou me investigando."
13020-91 = "N-não foi com esse objetivo que eu vim..."
13020-92 = "Ei, aquele emblema escolar..."
13020-93 = "S-sim.#nEu também sou uma estudante do Distrito Autônomo de Abydos..."
13020-94 = "E, eu ainda estou no ensino fundamental.#nMas vou me formar em breve..."
13020-98 = "...E-ensino fundamental?#nEntendo, você parece mais velha que eu..."
13020-99 = "A-ahahaha..."
13020-100 = "...Lembrei.#nEsse é o emblema da Escola de Ensino Fundamental Privada Nephthys, não é?"
13020-101 = "Ah, i-isso é..."
13020-102 = "...Mas isso é estranho. Já faz um bom tempo que a sede da Nephthys se mudou para fora da zona autônoma... e, se não me engano, a escola também foi fechada..."
13020-103 = "..."
13020-104 = "Quando eu me formar... depois disso, a escola será fechada."
13020-108 = "...Escola Secundária Privada Nephthys."
13020-109 = "Uma escola de elite sob o guarda-chuva da corporação Nephthys."
13020-110 = "Eu tinha ouvido dizer que a sucessora da Nephthys ainda estava por aqui, mas... entendo."
13020-112 = "..."
13020-113 = "Era você, Izayoi Nonomi-san?"
13020-117 = "Veio fazer uma última visita turística?"
13020-118 = "O que a senhorita da famosa corporação corrupta 'Nephthys' quer na nossa escola?"
13020-119 = "E-eu..."
13020-120 = "Dependendo da sua resposta..."
13020-121 = "...!!??"
13020-122 = "Não garanto a segurança do seu halo."
13020-123 = "D-desculpe, eu..."
13020-124 = "Eu..."
13020-135 = "...Acho que exagerei um pouco."
13020-137 = "..."
13020-138 = "Nephthys..."
13020-139 = "[s] \"Falando no Grupo Nephthys...\""
13020-140 = "Foi essa Nephthys que comprou nossa dívida, não foi? Especificamente, qual é o problema com isso?"
13020-141 = "É que..."
13020-142 = "Saint Nephthys Company. O chamado Grupo Nephthys é..."
13020-144 = "Uma empresa nativa de Abydos que, antigamente, ficava lado a lado com as maiores corporações de Kivotos."
13020-145 = "Uma empresa dessas em Abydos...!?"
13020-146 = "Abydos era um lugar incrível originalmente, afinal."
13020-148 = "Outrora, ostentava a história mais longa de Kivotos..."
13020-149 = "Por causa de sua grandiosidade, era uma escola temida ou invejada por todas as outras... essa era Abydos."
13020-150 = "...Isso antes da desertificação avançar, é claro."
13020-151 = "...A Saint Nephthys Company é uma empresa que viveu o auge de Abydos junto com ela."
13020-153 = "No entanto, à medida que a desertificação avançava, a Nephthys também entrou em declínio, assim como Abydos."
13020-155 = "Além disso, após forçar a barra para tentar recuperar as perdas da ferrovia trans-deserto, eles chegaram à beira da falência..."
13020-158 = "As operações foram forçadas a parar. Como eram uma grande empresa na época, isso causou danos irreparáveis a toda Abydos..."
13020-159 = "E assim, um por um, conforme os moradores deixavam Abydos, a Nephthys também encerrou todas as suas atividades e partiu."
13020-161 = "Para tentar reconstruir Abydos de alguma forma, o conselho estudantil acabou assumindo dívidas..."
13020-162 = "...É mais ou menos isso. Quando eu estava no primeiro ano, quase não se via mais a Nephthys na zona autônoma."
13020-164 = "Então quer dizer que nossa zona autônoma ficou assim por causa da Nephthys!?"
13020-165 = "Acho que isso é um pouco de exagero. A Nephthys é apenas um dos motivos pelos quais Abydos entrou em declínio."
13020-166 = "Mas... se não fosse pelo fracasso da Nephthys, Abydos ainda teria tido uma chance de se recuperar."
13020-167 = "Quem deu o golpe final foi, sem dúvida, a Nephthys."
13020-168 = "A Nephthys é uma agressora para Abydos. E..."
13020-169 = "...é a empresa que minha família administra."
13020-174 = "...Hã? É sério!?"
13020-175 = "..."
13020-176 = "...Sim. Eu sou uma pessoa do Grupo Nephthys."
13020-177 = "[s] \"Nonomi...\""
13020-181 = "...Então era verdade."
13020-182 = "Como assim, 'era verdade'... Ayane-chan, você já sabia?"
13020-183 = "Não, eu não tinha ouvido diretamente... mas, o motivo de você ter aquele cartão dourado, e além disso..."
13020-185 = "Além disso... aquela ferrovia foi justamente o que acelerou o declínio de Abydos..."
13020-186 = "Se isso puder ser útil para salvar o mundo... não há nada que me deixe mais feliz."
13020-187 = "……。"
13020-189 = "Vendo a Nonomi-senpai acessando o sistema da Ferrovia Trans-Deserto, #nachei que provavelmente fosse isso..."
13020-190 = "Ehh, eu fui a única que não sabia de nada!? #nE a Hoshino-senpai e a Shiroko-senpai?"
13020-195 = "...Shiroko-senpai, você não sabia, né?"
13020-196 = "S-sim."
13020-197 = "...Nonomi-senpai, por que você escondeu isso?"
13020-199 = "I-isso é..."
13020-200 = "...Desculpe. #nNão é como se eu devesse te pressionar assim, né."
13020-201 = "Não..."
13020-202 = "Mas, mesmo que a Nephthys tenha saído de Abydos... #nfico feliz que você tenha ficado, senpai."
13020-203 = "……。"
13020-205 = "Vamos organizar a situação por um momento!"
13020-206 = "Hoje, a Kaiser Corporation vendeu 45% das dívidas de Abydos."
13020-207 = "Na ocasião, novos credores surgiram em massa e o valor da dívida disparou... chegando a mais de 4 ou 5 vezes o preço original."
13020-208 = "O comprador da dívida foi... a Saint Nephthys."
13020-209 = "A Kaiser deve ter obtido um lucro enorme com essa transação."
13020-210 = "Mas, por que eles fizeram um negócio desses? #nO motivo, eu ainda não sei."
13020-211 = "Ayane-chan, você poderia verificar os detalhes dos direitos que a Nephthys obteve com essa aquisição?"
13020-212 = "Ah, sim...!"
13020-216 = "Com essa transação, a Nephthys... #nobteve a propriedade de instalações e infraestruturas específicas dentro do Distrito Autônomo de Abydos, além dos direitos de desenvolvimento."
13020-217 = "Então, todos os direitos, exceto a propriedade da terra. #nDe fato, a terra ainda pertence à Kaiser..."
13020-218 = "O que exatamente está incluído nessas 'instalações específicas'?"
13020-219 = "Diz aqui: infraestrutura de transporte voltada para logística e... #ninstalações relacionadas a ela."
13020-220 = "Infraestrutura de transporte? Ainda restava algo assim?"
13020-225 = "...A 'Ferrovia Trans-Deserto'."
13020-226 = "Ehh!?"
13020-227 = "Só pode ser isso."
13020-228 = "Ma-mas Nonomi-senpai. #nAquilo não deveria estar abandonado desde que a construção parou...? #nEntão por que compraram por um preço tão alto...?"
13020-229 = "Além disso, a Nephthys... #nacabou recomprando um negócio que ela mesma descartou no passado."
13020-230 = "...Qual é o objetivo?"
13020-232 = "...Eu também não sei. #nPor que, afinal..."
13020-233 = "Se-será que...!"
13020-238 = "Será que encontraram petróleo ou algo assim!?"
13020-243 = "Não, não tem nada disso. #nSe tivesse, Abydos não estaria nesse estado, né."
13020-244 = "Então, será que detectaram uma grande quantidade de terras raras...? #nGermânio, alguma coisa... era esse o nome?"
13020-245 = "Uhe~, a Serika-chan continua sendo uma gracinha. #nO tio aqui já investigou tudo o que poderia dar dinheiro."
13020-246 = "Mas não saiu nada. Nem petróleo, nem minerais raros, nada mesmo. #n...Aliás, germânio não é barato?"
13020-248 = "I-isso não importa! #nEntão por que se deram ao trabalho de comprar os direitos?"
13020-249 = "Como eu não sei disso, o tio aqui também está preocupado~."
13020-254 = "...Inimigos?"
13020-255 = "O-o que foi, de repente!?"
13020-257 = "Invasores! #nConfirmamos uma reação de explosão no distrito autônomo!"
13020-258 = "Será que a Kaiser Corporation...!?"
13020-259 = "Mas essa explosão, mais do que um ataque..."
13020-260 = "Hmm... será que não é na zona de escavação?"
13020-261 = "Não, parece que não...! Isso é..."
13020-265 = "……。"
13020-266 = "O quê... alguém está vindo para cá...? #nSão dezenas de pessoas, uniformes que nunca vi antes!"
13020-267 = "O que diabos é isso!?"
13020-269 = "Descobrimos!#nElas são……"
13020-278 = "Ahahaha, isso é ótimo, muito bom!"
13020-280 = "Próximo episódio: Academia Ferroviária Highlander"
