[translation]
13020-1 = "第2話;招かれざる客"
13020-5 = "げほっ、げほっ。#nうぅ……"
13020-6 = "ここで最後でしたっけ？"
13020-7 = "あぁ、そのはず……"
13020-8 = "でも、こんな時期に倉庫を移転するなんて一体……"
13020-9 = "ここ、だいぶ長いこと放置されてたみたいですね……#n元々は何をする場所だったんでしょう？"
13020-10 = "たしか学園の機密文書を保管してたとか、なんとか……"
13020-11 = "……機密文書？"
13020-12 = "とはいえ、もう要らないものなんでしょう。#nだからこそ処理が命じられたのでは？"
13020-13 = "でも一応、書類に軽く目を通した方が良いんじゃ……？"
13020-14 = "……いえ、破棄で良いでしょう。#n時間もあまり無いことですし。"
13020-15 = "まあ、確かに……ん？"
13020-20 = "っ！？"
13020-21 = "どうした！？"
13020-22 = "柱が……！逃げろっ！"
13020-27 = "はぁ、はぁ……。#n……怪我は？"
13020-28 = "だ、大丈夫です。#nまさか、ここまで老朽化が進んでるだなんて……。"
13020-29 = "片付けようにも片付けられないな……#n一度、上に確認を……"
13020-30 = "ん？何だこれ。"
13020-34 = "何の書類ですか？"
13020-35 = "どれどれ……"
13020-36 = "「売買契約書――"
13020-37 = "――アビドス高等学校」？"
13020-53 = "失礼しまーす……"
13020-59 = "あの方が、副生徒会長……"
13020-60 = "……。"
13020-61 = "どうして、一人でまだ……"
13020-62 = "……ん？"
13020-69 = "何か、視線が……"
13020-70 = "……。"
13020-71 = "……気のせいか。"
13020-73 = "はぁ、はぁ……"
13020-74 = "ビックリしました……"
13020-75 = "あんなに距離があったのに……#n噂には、聞いていましたが……"
13020-76 = "どんな噂？"
13020-78 = "……え、あ、その。#nホシノ、さん……"
13020-82 = "！？"
13020-84 = "へぇ……私の名前、知ってるんだ？"
13020-86 = "えっと、あの……"
13020-87 = "誰？#n私に何か用？"
13020-88 = "わ、私は……"
13020-89 = "どこの生徒？#n所属と学年は？"
13020-90 = "別に年上だったところで容赦しないけど。#nそれくらい知ってるでしょ。私のことを、調べてたなら。"
13020-91 = "そ、そういう目的で来たわけでは……"
13020-92 = "あれ、その校章……"
13020-93 = "は、はい。#n私も、アビドス自治区の学生で……"
13020-94 = "それと、まだ中学生です。#nもうすぐ卒業ですが……"
13020-98 = "……ちゅ、中学生？#nそうか、私より先輩に見えるけど……"
13020-99 = "あ、あはは……"
13020-100 = "……思い出した。#nそれ、私立ネフティス中学校の校章だよね？"
13020-101 = "あ、そ、それは……"
13020-102 = "……でもおかしいな。#nネフティスの本社は自治区の外に移転してだいぶ経つし……#nたしか学校も廃校って……"
13020-103 = "……。"
13020-104 = "私が卒業したら……その後、廃校になります。"
13020-108 = "……私立ネフティス中学校。"
13020-109 = "ネフティス企業傘下の、超エリート校。"
13020-110 = "ネフティスの後継者が残ってるとは聞いてたけど……#n……なるほどね。"
13020-112 = "……。"
13020-113 = "君だったんだね、[ruby=いざよい]十六夜[/ruby]ノノミさん？"
13020-117 = "最後に物見遊山でもしにきたの？"
13020-118 = "かの高名な悪徳企業「ネフティス」のお嬢さんが、私たちの学校に何の用？"
13020-119 = "わ、私は……"
13020-120 = "回答によっては……"
13020-121 = "……！！？？"
13020-122 = "ヘイローの無事は保障しないよ。"
13020-123 = "ご、ごめんなさい、私は……"
13020-124 = "私、は……"
13020-135 = "……言い過ぎちゃったかな。"
13020-137 = "……。"
13020-138 = "ネフティス……"
13020-139 = "[s] \"ネフティスグループといえば……。\""
13020-140 = "そのネフティスが、私たちの債権を買ったのよね？#n具体的にはそれで、何が問題なの？"
13020-141 = "それは――"
13020-142 = "セイント・ネフティスカンパニー。#nいわゆるネフティスグループは……"
13020-144 = "アビドス土着の企業で、#n昔はキヴォトスの名だたる大企業と肩を並べてた。"
13020-145 = "そんな企業が、アビドスに……！？"
13020-146 = "アビドスは元々、すごいところだったからね。"
13020-148 = "かつてキヴォトスで最も長い歴史を誇り……"
13020-149 = "その強大さ故に、ありとあらゆる学園から恐れられ、#n或いは羨まれていた学校……それがアビドスでした。"
13020-150 = "……砂漠化が進んでしまう前の話、ですけれど。"
13020-151 = "……セイント・ネフティスカンパニーは、そんなアビドスの全盛期を共に過ごした企業です。"
13020-153 = "しかし砂漠化が進むにつれて、#nアビドスと同様にネフティスもまた没落していきました。"
13020-155 = "さらには、砂漠横断鉄道の損失を取り戻そうと無理をした結果、破産直前にまで至り……"
13020-158 = "事業は中断を余儀なくされました。#n当時は大企業だったため、アビドス全体に取り返しのつかない損害が及び……"
13020-159 = "そうして一人、また一人と、住民がアビドスを離れていくと、#nネフティスも全ての事業を畳んで去っていきました。"
13020-161 = "そんなアビドスをどうにか立て直すために、アビドス生徒会が借金を抱えることになり……"
13020-162 = "……そんなところだね。#n私が1年生のときにはもう、自治区でネフティスを見ることはほとんどなかったよ。"
13020-164 = "つまりネフティスのせいで、私たちの自治区がこんなことになったってわけ！？"
13020-165 = "それはちょっと言い過ぎかなー。#nネフティスはアビドスが没落した理由の一つでしかないから。"
13020-166 = "ですが……ネフティスの失敗がなければ、#nアビドスが復興するチャンスはまだあったはずです。"
13020-167 = "止めを刺したのは、間違いなくネフティスでした。"
13020-168 = "ネフティスはアビドスにとって加害者なんです。#nそして――"
13020-169 = "――私の家が、運営している会社です。"
13020-174 = "……えっ？#nそうなの！？"
13020-175 = "……。"
13020-176 = "……はい。#n私はネフティスグループの人間です。"
13020-177 = "[s] \"ノノミ……\""
13020-181 = "……やっぱり、そうなんですね。"
13020-182 = "やっぱり、って……アヤネちゃんは知ってたの？"
13020-183 = "いえ、直接聞いていたわけでは……#nですが、ゴールドカードを持っている理由、それに……"
13020-185 = "それに――あの鉄道こそが、アビドスの衰退に拍車をかけたきっかけですし……"
13020-186 = "それが、世界を救うお役に立てるのなら……これ以上嬉しいことはないです。"
13020-187 = "……。"
13020-189 = "ノノミ先輩が砂漠横断鉄道のシステムにアクセスしているところを見て、#n多分そうなんじゃないかなって……"
13020-190 = "えっ、全然知らなかったのって私だけ！？#nホシノ先輩とシロコ先輩は？"
13020-195 = "……シロコ先輩は、知らなかったんだよね？"
13020-196 = "う、うん。"
13020-197 = "……ノノミ先輩、どうして隠してたの？"
13020-199 = "そ、それは……"
13020-200 = "……ごめん。#nこうやって迫るようなことじゃないわよね。"
13020-201 = "いえ……"
13020-202 = "でも、ネフティスがアビドスからいなくなっても……#n先輩は残ってくれて良かった。"
13020-203 = "……。"
13020-205 = "一度、状況を整理しましょう！"
13020-206 = "本日カイザーコーポレーションが、アビドスの負債の内45％を売却しました。"
13020-207 = "その際に新規債権者が殺到し、債権が暴騰……なんと元値の4～5倍以上の金額にまで跳ね上がりました。"
13020-208 = "債権の購入者は――セイント・ネフティス。"
13020-209 = "カイザーはこの取引で、莫大な利益を得たことでしょう。"
13020-210 = "ですが、どうしてこんな取引をしたのか。#nその理由までは分かりません。"
13020-211 = "アヤネちゃん、ネフティスが買収によって得た権利の詳細を確認してもらえますか？"
13020-212 = "あ、はい……！"
13020-216 = "この取引によって、ネフティスは……#nアビドス自治区内の特定施設及びインフラの所有権、そして開発権を得ています。"
13020-217 = "土地の所有権を除いた全ての権利ですね。#nたしかに、土地は依然としてカイザーが……"
13020-218 = "その「特定施設」というのは、どういったものが含まれていますか？"
13020-219 = "物流を目的とした交通インフラと……#nそれに関連する施設、とあります。"
13020-220 = "交通インフラなんて、そんなの残ってたっけ？"
13020-225 = "……「砂漠横断鉄道」。"
13020-226 = "ええっ！？"
13020-227 = "該当するものは、それしかないはずです。"
13020-228 = "で、でもノノミ先輩。#nあれって工事途中で放置されてるはずじゃ……#nなのに、こんな高い値段で買ったの……？"
13020-229 = "それにネフティスは、#nかつて自らが手放した事業を、再び買い直したことにもなります。"
13020-230 = "……何が目的？"
13020-232 = "……私にも分かりません。#nいったい、どうして……"
13020-233 = "も、もしかして……！"
13020-238 = "石油でも見つかったとか！？"
13020-243 = "いやー無いない。#nもしあったら、アビドスはこんな状態になってないでしょ。"
13020-244 = "じゃあ、大量のレアアースが検出されたとか……？#nゲルマニウム何とか……だっけ？"
13020-245 = "うへ～、相変わらず可愛いねぇセリカちゃんは。#nお金になりそうなものは、おじさんが全部調査済みだよ。"
13020-246 = "けど、何も出なかった。石油も希少鉱物も、なーんにもね。#n……というか、ゲルマニウムは安いやつじゃない？"
13020-248 = "そ、それは良いとして！#nなら、どうしてわざわざ権利を買ったのよ？"
13020-249 = "それが分からないから、おじさんも困ってるんだよね～。"
13020-254 = "……敵？"
13020-255 = "な、何よ急に！？"
13020-257 = "侵入者です！#n自治区で爆発反応を確認しました！"
13020-258 = "まさか、カイザーコーポレーションが……！？"
13020-259 = "ですがこの爆発は、攻撃のためというよりも……"
13020-260 = "んー……もしかして、発掘地帯の方じゃない？"
13020-261 = "いえ、違うようです……！これは……"
13020-265 = "……。"
13020-266 = "なっ……誰かがこちらの方へ……？#n規模は数十人、初めて見る制服です！"
13020-267 = "一体何なの！？"
13020-269 = "判明しました！#n彼女たちは……"
13020-278 = "あはははっ、良いね良いねぇ！"
13020-280 = "次回;ハイランダー鉄道学園"
