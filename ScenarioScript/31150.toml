[translation]
31150-1 = "Episódio 15; A Vice-Presidente do Comitê de Justiça (2)"
31150-4 = "……Bem,"
31150-5 = "E-eu já disse, isso aqui foi um erro, sério!"
31150-6 = "[s] \"……?\""
31150-7 = "Eu normalmente escondo bem as minhas coisas... quer dizer, não é como se eu ficasse andando por aí com elas..."
31150-8 = "[s] \"Você deveria esconder melhor para não ser pega.\""
31150-9 = "!?!?"
31150-10 = "O-o que você está dizendo!? Isso é o mesmo que dizer que tudo bem ter essas coisas desde que ninguém descubra!"
31150-11 = "V-você é o Sensei, não é!? O que está pensando!? Coisas indecentes são proibidas! Pena de morte!!"
31150-12 = "[s] \"Seguindo essa lógica, Koharu também deveria ser punida...\""
31150-13 = "Ei, n-não, espera...!?"
31150-14 = "E-eu, bem..."
31150-15 = "I-isso aqui foi um erro, sério! Então, vamos fingir que não aconteceu!!"
31150-16 = "[s] \"Certo, vamos deixar assim então.\""
31150-17 = "……!? O que foi isso! É essa tal de 'compostura de adulto' que você tanto fala!?"
31150-18 = "[s] \"Tem muita coisa acontecendo, mas não acho que você precise se prender a isso.\""
31150-19 = "Hã...?"
31150-20 = "[s] \"Porque a Koharu é a Koharu.\""
31150-21 = "……."
31150-22 = "Eu entendi, mas ao mesmo tempo não entendi..."
31150-23 = "É, mas..."
31150-24 = "Eu entendi um pouquinho que o Sensei se preocupa comigo..."
31150-25 = "……."
31150-26 = "B-bem então!"
31150-27 = "Em troca, vou te contar um dos meus segredos!"
31150-28 = "[s] \"Um segredo?\""
31150-29 = "……."
31150-34 = "Na verdade, eu..."
31150-35 = "...sou uma espiã enviada para monitorar se o Clube de Reforço está funcionando como deveria!"
31150-36 = "[s] \"……Uma espiã?\""
31150-37 = "Isso significa que estou em uma missão secreta. Então, mesmo que eu pareça uma boba agora, tudo isso é apenas um disfarce!"
31150-38 = "[s] \"Missão... por ordem de quem...?\""
31150-39 = "U-uh, bem... de quem, você pergunta... bem..."
31150-40 = "Bem... da Hasumi-senpai!"
31150-41 = "Isso! A Hasumi-senpai é incrivelmente forte em Trinity e é a vice-presidente do Comitê de Justiça!"
31150-46 = "Ah, e também, isso! A Tsurugi-iinchou também está lá!"
31150-47 = "[s] \"……Entendo.\""
31150-48 = "A-a Tsurugi-iinchou é, bem, a presidente... então, sim, ela consegue fazer qualquer coisa! Ela é talentosa tanto nas artes quanto nas armas...? Por isso! Provavelmente!"
31150-49 = "Só nos vimos algumas vezes, mas... d-de qualquer forma, ela é incrível!"
31150-50 = "Então é isso. Lembre-se de que eu não entrei no Clube de Reforço porque sou ruim nos estudos!"
31150-51 = "Eu sou uma elite que recebeu uma missão importante como espiã!"
31150-52 = "[s] \"Entendi.\""
31150-53 = "Hmph."
31150-54 = "[s] \"Mas tudo bem me contar isso?\""
31150-55 = "……!!"
31150-56 = "O-o Sensei não sairia por aí espalhando os segredos dos alunos, né!? Você não faria isso, né!? ...Então, está tudo bem!"
31150-61 = "Comitê de Justiça - Sala de Gestão de Itens Apreendidos"
31150-63 = "……Certo, assim está bom."
31150-64 = "Pelo menos agora estou aliviada――"
31150-70 = "……Koharu?"
31150-71 = "H-Hasumi-senpai!?"
31150-72 = "E o Sensei também...? Eu ouvi dizer que vocês estavam no anexo para o acampamento, aconteceu alguma coisa?"
31150-73 = "Vocês deveriam estar proibidos de entrar aqui até que as notas melhorassem, não deveriam...?"
31150-74 = "N-não, não é isso, bem..."
31150-75 = "[s] Tentar inventar uma desculpa convincente."
31150-77 = "...Entendo, é sobre os livros usados nas aulas."
31150-78 = "Se for esse o caso, não há o que fazer."
31150-79 = "S-sim..."
31150-80 = "Mas, de certa forma, veio a calhar. Eu tinha algumas coisas que precisava dizer à Koharu novamente..."
31150-81 = "Eh? E-eu...?"
31150-82 = "Sensei, sinto muito, mas poderia nos dar licença por um momento? É algo que preciso tratar como parte do Comitê de Justiça, por assim dizer..."
31150-83 = "[s] \"Claro, entendi.\""
31150-84 = "...Desculpe, obrigada."
31150-86 = "Decidi esperar na sala ao lado."
31150-91 = "...Koharu... por favor..."
31150-92 = "Não... o seu verdadeiro... sem..."
31150-94 = "[ns] (Mesmo a essa distância, consigo ouvir vagamente as vozes...)"
31150-96 = "Mas... para... é impossível..."
31150-97 = "...Como... é algo... demais..."
31150-98 = "Isso não está certo!"
31150-99 = "[ns] (No momento em que pensei em me afastar mais, ouvi o grito de Hasumi...)"
31150-101 = "...faça... por causa de... sempre..."
31150-102 = "...Sensei... é..."
31150-103 = "...Sim... entendi."
31150-107 = "D-desculpe a espera... Sensei?"
31150-108 = "...Você não vai embora?"
31150-109 = "[s] \"...Koharu, você está bem?\""
31150-110 = "Eh, ah, sim? Não é nada, estou bem...?"
31150-112 = "Segui o caminho de volta para casa com Koharu..."
31150-113 = "E assim, mais um dia chega ao fim."
31150-115 = "Próximo episódio: Pequenas Frestas"
