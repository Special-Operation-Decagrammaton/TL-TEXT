[translation]
31150-1 = "Episódio 15;A Vice-Presidente do Comitê de Realização da Justiça (2)"
31150-4 = "……É que,"
31150-5 = "j-já vou avisando: só essa aí, de verdade, é um engano!"
31150-6 = "[s] \"……?\""
31150-7 = "O de sempre eu escondo direiti…… quer dizer, eu não fico andando muito com ele por aí……."
31150-8 = "[s] \"Tem que esconder bem, pra ninguém descobrir, né.\""
31150-9 = "!?!?"
31150-10 = "Q-que é que você tá falando!? Isso é o mesmo que dizer que, se ninguém descobrir, pode ter!?"
31150-11 = "Você é o Sensei, né!? O que você tá pensando!? Coisa safada não pode! Pena de morte!!"
31150-12 = "[s] \"Por essa lógica, a Koharu também vai pro cadafalso……\""
31150-13 = "Hã, n-não, não é iss……!?"
31150-14 = "E-eu, é que……"
31150-15 = "e-essa aí, de verdade, é um engano! Ou seja, não conta!!"
31150-16 = "[s] \"Sim, então vamos deixar assim.\""
31150-17 = "……!? Q-que é isso! É a tranquilidade de gente adulta, é!?"
31150-18 = "[s] \"Tem muita coisa, mas acho que você não precisa se prender à força a tudo.\""
31150-19 = "Hã……?"
31150-20 = "[s] \"Porque a Koharu é a Koharu.\""
31150-21 = "……."
31150-22 = "Meio que entendi, meio que não……."
31150-23 = "Sim, mas……."
31150-24 = "Que o Sensei se importa comigo, isso eu entendi um pouquinho……."
31150-25 = "……."
31150-26 = "E-então!"
31150-27 = "Em retribuição, vou te contar um segredo meu!"
31150-28 = "[s] \"Um segredo?\""
31150-29 = "……."
31150-34 = "Na verdade, eu……"
31150-35 = "……sou uma espiã, encarregada de vigiar se o Clube de Aulas de Reforço tá funcionando direitinho!"
31150-36 = "[s] \"……Espiã?\""
31150-37 = "Ou seja, estou em pleno cumprimento de uma missão secreta. Então, agora eu posso até parecer uma boba, mas isso é tudo fachada!"
31150-38 = "[s] \"Missão…… por ordem de quem……?\""
31150-39 = "U-é que…… d-de quem, é que……."
31150-40 = "É que…… d-da veterana Hasumi!"
31150-41 = "Isso! A veterana Hasumi é superforte, até dentro de Trinity, e é a vice-presidente do Comitê de Realização da Justiça!"
31150-46 = "A-ah, e, isso! T-tem também a presidente Tsurugi, viu!"
31150-47 = "[s] \"……Sei.\""
31150-48 = "A-a presidente Tsurugi é, é que, deixa ver, é a presidente…… isso, ela sabe fazer de tudo! E-excelência nos estudos e nas artes……? Por isso! Provavelmente!"
31150-49 = "Eu só encontrei ela umas poucas vezes, mas…… e-enfim, ela é incrível!"
31150-50 = "Então, é isso. Guarda bem: eu não entrei no Clube de Aulas de Reforço porque de verdade não sei estudar, viu!"
31150-51 = "Eu, como espiã, fui encarregada de uma missão importante; sou uma elite!"
31150-52 = "[s] \"Ah é.\""
31150-53 = "Hunf-hunf."
31150-54 = "[s] \"Mas isso, tudo bem me contar?\""
31150-55 = "……!!"
31150-56 = "O-o Sensei não sai por aí espalhando os segredos dos alunos à toa, né!? Né, não sai!? ……E-então tá tudo bem!"
31150-61 = "Comitê de Realização da Justiça - Sala de gestão de itens apreendidos"
31150-63 = "……Sim, pronto."
31150-64 = "Por ora, um alívio――"
31150-70 = "……Koharu?"
31150-71 = "V-veterana Hasumi!?"
31150-72 = "E, até o Sensei……? Se não me engano, ouvi que estavam no acampamento, no anexo; aconteceu alguma coisa?"
31150-73 = "Até as notas melhorarem, você deveria estar proibida de entrar e sair daqui……."
31150-74 = "É-é que, não é isso, deixa ver……."
31150-75 = "[s] Disfarça com jeitinho."
31150-77 = "……Sei, é sobre os livros que se usam na aula."
31150-78 = "Se é isso, não tem jeito, né."
31150-79 = "S-sim……."
31150-80 = "Mas, em certo sentido, veio bem a calhar. Eu também tinha uma coisa que queria reforçar com você, Koharu……"
31150-81 = "Hã? E-eu……?"
31150-82 = "Sensei, me desculpe, mas será que o senhor poderia se ausentar um instante? É uma coisa que eu queria falar como Comitê de Realização da Justiça, digamos……."
31150-83 = "[s] \"Sim, entendi.\""
31150-84 = "……Desculpe, muito obrigada."
31150-86 = "Decidiu esperar na sala ao lado."
31150-91 = "……Koharu………… por favor."
31150-92 = "A sua verdadeira…… não…………………"
31150-94 = "[ns] （Mesmo a esta distância, dá pra ouvir vagamente a voz……）"
31150-96 = "Mas………… pra…… é impossível……"
31150-97 = "……sei lá…………… é coisa demais……"
31150-98 = "Assim não pode!"
31150-99 = "[ns] （No instante em que pensei em ir pra mais longe, o grito da Hasumi……）"
31150-101 = "……me desculpe…………… esse tempo todo…… pra…………………"
31150-102 = "……Sensei…………… é…………"
31150-103 = "……sim………………."
31150-107 = "D-desculpa a demora…… Sensei?"
31150-108 = "……Você não vai voltar?"
31150-109 = "[s] \"……Koharu, você tá bem?\""
31150-110 = "Hã, s-sim? Nada, tô bem……?"
31150-112 = "Pegou o caminho de volta junto com a Koharu……"
31150-113 = "e, assim, mais um dia se aproxima do fim."
31150-115 = "Próximo Episódio;Uma Pequena Fresta"
