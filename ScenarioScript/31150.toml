[translation]
31150-1 = "Episódio 15: Vice-Presidente do Comitê de Execução da Justiça (2)"
31150-4 = "……Aquilo,"
31150-5 = "S-só pra deixar claro, isso aí foi um erro de verdade！"
31150-6 = "[s] \"……？\""
31150-7 = "Normalmente eu escondo direitinho… quer dizer, eu quase nunca fico carregando isso por aí……"
31150-8 = "[s] \"Tem que esconder bem pra ninguém descobrir, né.\""
31150-9 = "！？！？"
31150-10 = "O-o que você tá falando！？ Isso é o mesmo que dizer que pode ter desde que ninguém descubra！？"
31150-11 = "Você é Sensei, né！？ Em que você tá pensando！？ Safadeza é proibida！ Pena de morte！！"
31150-12 = "[s] \"Pelo seu raciocínio, você também teria que ser condenada……\""
31150-13 = "Eh, n-não é isso……！？"
31150-14 = "E-eu, aquilo…"
31150-15 = "Isso aí foi um erro de verdade！ Ou seja, não conta！！"
31150-16 = "[s] \"Tá bom, então vamos fingir que não conta.\""
31150-17 = "……！？ O que é isso！？ Isso é o famoso «jeitinho de adulto»！？"
31150-18 = "[s] \"Tem várias coisas na vida, não precisa se prender tanto.\""
31150-19 = "Eh……？"
31150-20 = "[s] \"Você é você, Koharu.\""
31150-21 = "……。"
31150-22 = "Entendi… mas ao mesmo tempo não entendi…"
31150-23 = "Mas……"
31150-24 = "Que o Sensei tá pensando em mim… isso eu consegui entender um pouquinho…"
31150-25 = "……。"
31150-26 = "E-então！"
31150-27 = "Em troca, vou te contar um dos meus segredos！"
31150-28 = "[s] \"Segredo？\""
31150-29 = "……。"
31150-34 = "Na verdade, eu…"
31150-35 = "……sou uma espiã enviada pra vigiar se o Clube de Reforço tá funcionando direito！"
31150-36 = "[s] \"……Espiã？\""
31150-37 = "Ou seja, tô cumprindo uma missão secreta. Por isso pode parecer que eu sou burra agora, mas isso tudo é fingimento！"
31150-38 = "[s] \"Missão…… ordens de quem……？\""
31150-39 = "U-eh…… b-bom, de quem… é que…"
31150-40 = "É… da Hasumi-senpai！"
31150-41 = "Isso！ A Hasumi-senpai é super forte em Trinity e é a vice-presidente do Comitê de Execução da Justiça！"
31150-46 = "A-ah, e tem também a presidente Tsurugi！"
31150-47 = "[s] \"……Entendi.\""
31150-48 = "A Tsurugi-senpai é a presidente, então… é… ela consegue fazer tudo！ É boa nos estudos e no combate… provavelmente！"
31150-49 = "Só encontrei ela algumas vezes, mas… e-enfim, ela é incrível！"
31150-50 = "Então é isso. Eu não entrei no Clube de Reforço porque sou burra de verdade, tá？ Guarda isso！"
31150-51 = "Eu sou uma elite cumprindo uma missão importante como espiã！"
31150-52 = "[s] \"Entendi.\""
31150-53 = "Fufun."
31150-54 = "[s] \"Mas tudo bem contar esse segredo pra mim？\""
31150-55 = "……！！"
31150-56 = "O Sensei não vai sair espalhando os segredos dos alunos por aí, né！？ Não vai, né！？…… E-então tá bom！"
31150-61 = "Sala de Gerenciamento de Itens Confiscados do Comitê de Execução da Justiça"
31150-63 = "……Sim, tá bom assim."
31150-64 = "Por enquanto, uma preocupação a menos——"
31150-70 = "……Koharu？"
31150-71 = "H-Hasumi-senpai！？"
31150-72 = "E até o Sensei……？ Ouvi dizer que vocês estavam no anexo pro acampamento, aconteceu alguma coisa？"
31150-73 = "Você não deveria sair daqui até melhorar as notas……"
31150-74 = "N-não é isso, é que……"
31150-75 = "[s] Dá uma boa desculpa."
31150-77 = "……Entendi, então é sobre livros pra aula."
31150-78 = "Se for isso, não tem jeito."
31150-79 = "S-sim……"
31150-80 = "Mas até que foi bom ter te encontrado. Eu também queria te falar uma coisa…"
31150-81 = "Eh？ E-eu……？"
31150-82 = "Sensei, desculpe, mas será que você poderia nos dar um momento？ É um assunto interno do Comitê de Execução da Justiça…"
31150-83 = "[s] \"Tá bom, entendi.\""
31150-84 = "……Desculpe, obrigada."
31150-86 = "Fui esperar na sala ao lado."
31150-91 = "……Koharu…………por favor."
31150-92 = "O original……não…………"
31150-94 = "[ns] （Mesmo dessa distância, ainda consigo ouvir um pouco a voz……）"
31150-96 = "Mas…………é……impossível……"
31150-97 = "……como…………é……demais……"
31150-98 = "Isso não pode！"
31150-99 = "[ns] （Quanto mais longe eu ia, mais alto a voz da Hasumi ficava……）"
31150-101 = "……por favor…………sempre……pra…………"
31150-102 = "……Sensei…………é…………"
31150-103 = "……sim…………"
31150-107 = "D-desculpe a demora…… Sensei？"
31150-108 = "……Você não vai voltar？"
31150-109 = "[s] \"……Koharu, você tá bem？\""
31150-110 = "Eh, u-uh？ Tô bem, por quê……？"
31150-112 = "Voltei com a Koharu…"
31150-113 = "E assim, mais um dia chegou ao fim."
31150-115 = "Próximo; Pequena Fresta"