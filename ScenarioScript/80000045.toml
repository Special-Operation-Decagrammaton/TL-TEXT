[translation]
80000045-1 = "最初が良いんです、先生"
80000045-2 = "（バレンタインデーの前日、ミドリから連絡が届いた）"
80000045-3 = "先生、明日の朝は何か予定とかありますか……？"
80000045-4 = "あ、朝は空いてるんですか？"
80000045-5 = "で、でしたらその、明日の朝7時頃に少し、お会いできませんでしょうか……！"
80000045-6 = "[s] \"うん、それはもちろん。もう少し遅い時間でも大丈夫だよ？\""
80000045-7 = "い、いえ、朝でお願いします！詳しいことは明日、その場でお話しますので！"
80000045-8 = "それでは明日、よろしくお願いいたします……！"
80000045-13 = "（そして、バレンタインデー当日の朝）"
80000045-18 = "[ns] \"えっと、ミドリは……。\""
80000045-22 = "（早朝の冷たい空気の中で、周りを見渡していると……）"
80000045-26 = "はぁ、はぁ……お、思ったより仕上げに時間かかっちゃった……！"
80000045-27 = "あれ、時間まだ大丈夫だよね……？こっちから呼んだのに、遅刻なんて……。"
80000045-28 = "[s] \"ミドリ、こっち。\""
80000045-29 = "せ、先生！？もう来てたんですか！？"
80000045-30 = "す、すみません……！私から呼んだのに、遅刻しちゃうだなんて……。"
80000045-31 = "[s1] \"ううん、今来たところだから。\"\n[s2] \"それより、こんな朝早くからどうしたの？\""
80000045-32 = "あ、それは、その……。"
80000045-33 = "あ、それは、その……。"
80000045-34 = "（お、落ち着いて私……今日のために、お姉ちゃん相手に何度もシミュレーションしたんだから……！深呼吸、深呼吸……！）"
80000045-35 = "ふぅ、はぁ……。"
80000045-36 = "ん、ふぁぁっ……。"
80000045-41 = "ご、ごめんなさい！？目の前であくびなんて……！ちょっと、昨日はあんまり寝られなくって……。"
80000045-42 = "[s] \"大丈夫？徹夜でゲームとか？\""
80000045-43 = "い、いえ、そうではないんです！"
80000045-44 = "早朝に約束をしておいて遅刻して、その上理由が徹夜でゲームなんて……。"
80000045-45 = "そんなことはしてません！ほ、本当です！"
80000045-46 = "[s] \"ごめん、冗談。ミドリにも何か理由があるんだろうし。\""
80000045-47 = "あ、は、はい……。"
80000045-48 = "[s] \"落ち着いた？\""
80000045-49 = "あ……はい、ありがとうございます。"
80000045-50 = "……ふぅ。おかげさまで落ち着きました。"
80000045-51 = "その、昨日眠れなかったのは、実は……。"
80000045-52 = "えっと……。"
80000045-53 = "うぅっ……ここまで来て、これで良いのか分からなくなってきた……。"
80000045-54 = "い、いえ、ここまで来たら自分なりの攻略ルートで……！"
80000045-55 = "[s] \"……？\""
80000045-56 = "その、実は先生をこうしてお呼びしたのは……！"
80000045-60 = "[ns] \"これって……。\""
80000045-61 = "チョコレート、作ったんです。色々試行錯誤して、でも昨晩までなかなか上手く行かなくって……。"
80000045-62 = "え、あ、時間……？それは、その……。"
80000045-63 = "最初が、良かったので……。"
80000045-64 = "[s] \"最初……？\""
80000045-65 = "え、えっと、その……！"
80000045-66 = "と、とにかく！ちゃんと食べられるものになってるはずなので！"
80000045-67 = "よろしければ、後で感想とか……モモトークでも大丈夫ですから、聞かせていただけますと嬉しいです！待ってます！"
80000045-71 = "[ns] \"りょ、了解……！\""
80000045-72 = "（最後の声が届いたのか不安なくらい急速に遠ざかっていくミドリを、戸惑いながら見送った）"
