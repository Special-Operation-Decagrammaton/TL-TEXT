[translation]
80000045-1 = "O começo é o que importa, Sensei."
80000045-2 = "（Na véspera do Dia dos Namorados, recebi uma mensagem da Midori.）"
80000045-3 = "Sensei, você tem algum compromisso amanhã de manhã...?"
80000045-4 = "Ah, você está livre de manhã?"
80000045-5 = "E-então, hum, será que poderíamos nos encontrar amanhã por volta das 7 da manhã...!"
80000045-6 = "[s] \"Sim, claro. Tudo bem se for um pouco mais tarde?\""
80000045-7 = "N-não, por favor, que seja de manhã! Explicarei os detalhes quando nos encontrarmos!"
80000045-8 = "Então, até amanhã, conto com você...!"
80000045-13 = "（E então, na manhã do Dia dos Namorados）"
80000045-18 = "[ns] \"Bem, a Midori está...\""
80000045-22 = "（Enquanto olhava ao redor no ar frio do início da manhã...）"
80000045-26 = "Haa, haa... L-levou mais tempo do que eu pensava para finalizar...!"
80000045-27 = "Ué, ainda estou no horário, né...? Fui eu quem chamei, seria terrível me atrasar..."
80000045-28 = "[s] \"Midori, aqui.\""
80000045-29 = "S-Sensei!? Você já chegou!?"
80000045-30 = "D-desculpe...! Fui eu quem chamei e acabei me atrasando..."
80000045-31 = "[s1] \"Não, eu acabei de chegar.\"\n[s2] \"Mas, o que houve para você marcar tão cedo?\""
80000045-32 = "Ah, isso é, hum..."
80000045-33 = "Ah, isso é, hum..."
80000045-34 = "（C-calma, eu... eu simulei isso várias vezes com a minha irmã para hoje...! Respira fundo, respira fundo...!）"
80000045-35 = "Fuu, haa..."
80000045-36 = "Nn, fuuahh..."
80000045-41 = "D-desculpe!? Bocejar bem na sua frente...! É que eu não consegui dormir muito bem ontem..."
80000045-42 = "[s] \"Está tudo bem? Ficou jogando a noite toda?\""
80000045-43 = "N-não, não é isso!"
80000045-44 = "Marcar um encontro de manhã cedo e me atrasar, e ainda por cima o motivo ser jogar a noite toda..."
80000045-45 = "Eu não fiz isso! É-é verdade!"
80000045-46 = "[s] \"Desculpe, foi brincadeira. Imagino que a Midori tenha seus motivos.\""
80000045-47 = "Ah, s-sim..."
80000045-48 = "[s] \"Já se acalmou?\""
80000045-49 = "Ah... sim, obrigada."
80000045-50 = "......Fuu. Graças a você, me acalmei."
80000045-51 = "Sobre não ter conseguido dormir ontem, na verdade..."
80000045-52 = "Bem..."
80000045-53 = "Uuu... agora que cheguei aqui, não sei se isso é uma boa ideia..."
80000045-54 = "N-não, já que cheguei até aqui, vou seguir minha própria rota de estratégia...!"
80000045-55 = "[s] \"......?\""
80000045-56 = "É que, na verdade, eu chamei o Sensei aqui porque...!"
80000045-60 = "[ns] \"Isso é...\""
80000045-61 = "Eu fiz chocolates. Tentei várias coisas, mas até ontem à noite não estava dando muito certo..."
80000045-62 = "Eh, ah, o tempo...? Isso é, hum..."
80000045-63 = "É que o começo foi bom..."
80000045-64 = "[s] \"O começo...?\""
80000045-65 = "E-ei, hum...!"
80000045-66 = "D-de qualquer forma! Deve estar comestível!"
80000045-67 = "Se puder, depois me diga o que achou... pode ser pelo MomoTalk também! Vou ficar esperando!"
80000045-71 = "[ns] \"E-entendido...!\""
80000045-72 = "（Observei, confuso, a Midori se afastar rapidamente, a ponto de eu nem saber se ela ouviu minha última resposta）"
