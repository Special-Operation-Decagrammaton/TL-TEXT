[translation]
13190-1 = "Episódio 19: Assembleia Geral do Grupo de Credores"
13190-3 = "Presidente, a localização do canhão ferroviário foi identificada."
13190-4 = "Entendo."
13190-8 = "Fica em uma zona restrita a cerca de 480 km daqui!"
13190-9 = "……Hum."
13190-10 = "Preparem-se para sair a qualquer momento."
13190-11 = "Também levaremos a senhorita da Nephthys."
13190-13 = "Entendido."
13190-18 = "Descubram a localização exata. #nPreparem também os meios de transporte."
13190-20 = "Sim, senhor!"
13190-28 = "Que bom que veio, senhorita da Nephthys."
13190-29 = "……Presidente."
13190-43 = "Mordomo... então a Nephthys estava de mãos dadas com a Kaiser."
13190-44 = "Hahaha, você é rápida em entender."
13190-45 = "Como esperado de uma sucessora de uma grande empresa."
13190-46 = "Por que fazer algo assim...!"
13190-47 = "Tudo isso foi por causa de Abydos!"
13190-48 = "Se conseguíssemos o canhão ferroviário, com aquele poder absoluto! #nPoderíamos recuperar a glória de outrora...!"
13190-49 = "Não existe essa possibilidade!"
13190-54 = "Envolver tantas pessoas assim..."
13190-62 = "Causar todo esse caos...!"
13190-63 = "Isso é..."
13190-64 = "A Hoshino-senpai estava certa. #nSe pararmos de escolher os meios para atingir nossos objetivos, acabaremos perdendo a nós mesmos..."
13190-66 = "A própria Abydos não escolhia os meios no passado, não é?"
13190-67 = "……!?"
13190-68 = "Dizem que até mesmo Trinity, #nantigamente, arrancava as garras de seus inimigos."
13190-69 = "Não seria estranho se Abydos, que possuía um poder avassalador, #ntivesse feito algo semelhante."
13190-70 = "Isso é..."
13190-74 = "Presidente, temos invasores!"
13190-75 = "O Schale?"
13190-76 = "N-não! #nO invasor é apenas Takanashi Hoshino!"
13190-78 = "Hoshino-senpai...!?"
13190-83 = "11:30 AM"
13190-85 = "O tempo é..."
13190-86 = "Ora, ora, ainda faltam 30 minutos. #nMas pensar que nem mesmo o General consegue enfrentá-la."
13190-87 = "Por que apenas a senpai...?"
13190-88 = "O Comitê de Contramedidas e o sensei do Schale estão agindo separadamente de Takanashi Hoshino."
13190-89 = "Não sei o motivo, no entanto."
13190-90 = "Pessoal..."
13190-94 = "N-não acho que conseguiremos aguentar por muito mais tempo!"
13190-95 = "Francamente, isso é uma desonra para o nome da Kaiser."
13190-96 = "P-por favor, dê as ordens!"
13190-97 = "O canhão ferroviário foi encontrado?"
13190-99 = "Espere só mais um pouco!"
13190-101 = "E os meios de transporte?"
13190-102 = "O helicóptero chegará ao terraço em 20 minutos!"
13190-103 = "……Entendo. #nNão tem jeito, vou distraí-la até lá."
13190-109 = "Coordenadas identificadas!"
13190-110 = "……Zona restrita do Deserto de Abydos, setor 35-9? #nÉ lá que o canhão ferroviário está escondido."
13190-114 = "11:45 AM"
13190-116 = "Haa... haa..."
13190-117 = "Hoshino-senpai...!"
13190-118 = "(Setor 35-9?)"
13190-119 = "Desculpe a demora, Nonomi-chan.#nVocê não se machucou?"
13190-120 = "Sim, eu estou bem..."
13190-133 = "...Kaiser Corporation."
13190-136 = "É a primeira vez que nos encontramos assim, Takanashi Hoshino.#nEu sou o Presidente."
13190-137 = "Já ouvi muito sobre você.#nParece que aquele Kuroko estava de olho em você."
13190-138 = "...Mais importante, a assembleia ainda não começou, certo?"
13190-139 = "Claro que não.#nO representante do fundo de investimento privado mudou para mim, no entanto."
13190-140 = "Fique tranquila, eu lhe darei o direito de fala."
13190-141 = "..."
13190-142 = "Então, vamos declarar o início da assembleia."
13190-143 = "A partir de agora, dou início à assembleia do grupo de credores."
13190-150 = "Sem mais delongas, você tem algo a dizer?"
13190-158 = "Se eu negar a legitimidade do \"Conselho Estudantil de Abydos\","
13190-159 = "você vai libertar a Nonomi-chan, certo?"
13190-165 = "...Presidente."
13190-166 = "A resposta é não.#nSe não houvesse legitimidade, a posse do canhão ferroviário passaria para a Nephthys."
13190-167 = "Isso seria um problema para nós."
13190-168 = "..."
13190-169 = "Se você quer que Izayoi Nonomi retorne em segurança,#né melhor oferecer a \"rescisão do contrato\"."
13190-170 = "Assim, a posse do canhão ferroviário será minha."
13190-171 = "..."
13190-173 = "Não faça isso, Hoshino-senpai!#nVocê não pode entregar o canhão ferroviário nem para a Nephthys, nem para a Kaiser!"
13190-174 = "Por favor, não negue o tempo que passamos com a Presidente Yume...!"
13190-179 = "...Ela disse isso, o que você vai fazer?"
13190-181 = "Não pode!"
13190-182 = "Se for para cair nas mãos da Kaiser, deveria pertencer à Nephthys!"
13190-183 = "Por favor, tome uma decisão sensata!#nPelo futuro de Abydos!"
13190-185 = "Mordomo...!"
13190-186 = "Senhorita, esqueceu da questão da transferência?"
13190-187 = "Ainda é possível agora—"
13190-192 = "—Eu vou me retirar da escola de Abydos!"
13190-199 = "Com isso, não tenho mais valor como refém!"
13190-200 = "Por isso, senpai, não se sacrifique por mim!"
13190-201 = "Não se preocupe.#nNonomi-chan não precisa sair da escola."
13190-202 = "Eh...?"
13190-203 = "Claro, também não pretendo entregar o canhão ferroviário desse jeito."
13190-204 = "N-não pode ser..."
13190-208 = "Presidente."
13190-209 = "Como parte contratante, admito que o Conselho Estudantil de Abydos era uma organização não reconhecida."
13190-210 = "...!"
13190-215 = "...!"
13190-216 = "Com isso, a validade do contrato referente à ferrovia transdesértica—"
13190-220 = "Espere!!"
13190-225 = "11:57 AM"
13190-229 = "[ns] \"Essa declaração é inválida!\""
13190-231 = "P-pessoal...!"
13190-233 = "A Hoshino-senpai de agora não tem autoridade como Conselho Estudantil de Abydos!"
13190-234 = "U-Ué...!?"
13190-235 = "Porque eu me tornei a presidente do conselho estudantil de Abydos!"
13190-236 = "A-A Ayane-chan virou presidente do conselho estudantil!?"
13190-238 = "[ns1] \"Sim, agora a Ayane é a presidente do conselho estudantil.\"\n[ns2] \"Ela foi escolhida por votação.\""
13190-241 = "[ns] \"Eu sou a testemunha disso.\""
13190-242 = "O-O que isso significa...?"
13190-243 = "Hum, nós decidimos juntas."
13190-244 = "Não pense em tentar resolver tudo sozinha!"
13190-248 = "……."
13190-249 = "E além disso, a senpai foi rebaixada de vice-presidente para secretária!"
13190-250 = "Uma simples secretária causar um problema desses...!"
13190-252 = "(Até agora pouco, eu mesma era a secretária...)"
13190-254 = "Vou explicar tudo para a Hoshino-senpai também!"
13190-255 = "Nós, o \"Comitê de Contramedidas\", aprovadas pelo Sensei, nos fundimos ao #n\"Conselho Estudantil de Abydos\"!"
13190-256 = "……."
13190-258 = "Ayane-chan..."
13190-260 = "Por isso, a parte contratante atual passa a ser o \"Comitê de Contramedidas\"!"
13190-266 = "[ns] \"E quanto a Nonomi...\""
13190-268 = "[ns] \"Se quiser sair do comitê, precisará da minha permissão.\""
13190-269 = "Sensei..."
13190-273 = "12:00 PM"
13190-275 = "Entendo, então foi assim que fizeram."
13190-276 = "Talvez tenha sido um erro lidar com o Schale desde o início."
13190-277 = "Bem, não importa. #nO tempo que eu precisava já foi ganho."
13190-281 = "A assembleia está encerrada."
13190-289 = "[ns] \"O quê...!\""
13190-294 = "Para começo de conversa, quem permitiu que você falasse?"
13190-295 = "I-Isso não pode ser...!"
13190-296 = "……!"
13190-298 = "No fim das contas, todo o esforço de vocês foi em vão."
13190-303 = "Este contrato de compra e venda perdeu sua validade e será descartado."
13190-310 = "O canhão ferroviário sempre foi propriedade da Kaiser. #nNão é mesmo?"
13190-311 = "Não aceitarei objeções."
13190-312 = "Você acha mesmo que esse tipo de tirania será tolerada!?"
13190-317 = "……Presidente, o helicóptero chegará em breve."
13190-321 = "Lide com todos que estão aqui. #nEntendido? Não deixe ninguém para trás."
13190-328 = "No entanto, a senhorita da Nephthys... você virá conosco."
13190-338 = "Espere!"
13190-345 = "Hoshino-senpai! Nonomi!"
13190-348 = "Shiroko-senpai, se você se isolar, será cercada!"
13190-350 = "Sensei, desse jeito a Nonomi-senpai vai...!"
13190-351 = "……Por favor, assuma o comando!"
