[translation]
13190-1 = "第19話;債権者団体の総会"
13190-3 = "プレジデント、列車砲の位置が判明しました。"
13190-4 = "ほう。"
13190-8 = "ここから約480km先の閉鎖地区です！"
13190-9 = "……うむ。"
13190-10 = "いつでも出られるように準備をしておけ。"
13190-11 = "あのネフティスの令嬢も連れていく。"
13190-13 = "了解。"
13190-18 = "正確な位置まで割り出せ。#n移動手段も用意しろ。"
13190-20 = "はっ！"
13190-28 = "よく来てくれた、ネフティスのご令嬢。"
13190-29 = "……プレジデント。"
13190-43 = "執事さん……ネフティスはカイザーと手を組んでいたのですね。"
13190-44 = "ハッハッハ、理解が早い。"
13190-45 = "さすがは大企業の後継者と言ったところか。"
13190-46 = "どうしてそんな……！"
13190-47 = "全部、アビドスのためだったんです！"
13190-48 = "列車砲を手に入れさえすれば、あの絶対的な力があれば！#nかつての栄光を取り戻せると……！"
13190-49 = "そんなわけ、ないじゃないですか！"
13190-54 = "こんなに多くの人を巻き込んで……。"
13190-62 = "混乱を起こすだなんて……！"
13190-63 = "それは……。"
13190-64 = "ホシノ先輩の言う通りでした。#n目的のために手段を選ばなくなってしまえば、自分たちを見失ってしまう……。"
13190-66 = "アビドスこそ、以前は手段を選んでいなかっただろう。"
13190-67 = "……！？"
13190-68 = "あのトリニティでさえ、#n昔は敵の爪を剥いでいたと言われているくらいだ。"
13190-69 = "圧倒的な力を持っていたアビドスが、#n似たようなことをしていてもおかしくない。"
13190-70 = "それは……。"
13190-74 = "プレジデント、侵入者です！"
13190-75 = "シャーレか？"
13190-76 = "い、いえ！#n侵入者は[ruby=たかなし]小鳥遊[/ruby]ホシノ単独です！"
13190-78 = "ホシノ先輩……！？"
13190-83 = "AM 11:30"
13190-85 = "時間は……。"
13190-86 = "やれやれ、まだ30分もあるじゃないか。#nしかし、ジェネラルですら相手にならないとはな。"
13190-87 = "どうして先輩だけ……？"
13190-88 = "対策委員会とシャーレの先生は、小鳥遊ホシノと別で動いている。"
13190-89 = "理由までは知らないがな。"
13190-90 = "みんな……。"
13190-94 = "こ、これ以上持ちこたえるのは厳しいかと！"
13190-95 = "まったく、これではカイザーの名折れだ。"
13190-96 = "ご、ご指示を！"
13190-97 = "列車砲は見つかったか？"
13190-99 = "もう少しお待ちください！"
13190-101 = "移動手段の用意は？"
13190-102 = "20分後には、屋上にヘリが到着します！"
13190-103 = "……そうか。#n仕方ない、それまで相手をしてやろう。"
13190-109 = "座標を特定しました！"
13190-110 = "……アビドス砂漠閉鎖地区セクター35-9？#nここに列車砲が隠されているのか。"
13190-114 = "AM 11:45"
13190-116 = "はぁっ、はぁ……。"
13190-117 = "ホシノ先輩……！"
13190-118 = "（セクター35-9？）"
13190-119 = "遅くなってごめんね、ノノミちゃん。#n怪我してない？"
13190-120 = "はい、私は大丈夫です……。"
13190-133 = "……カイザーコーポレーション。"
13190-136 = "こうして会うのは初めてか、小鳥遊ホシノ君。#n私はプレジデントだ。"
13190-137 = "噂はよく聞いているとも。#nあの黒服が目を付けていたようだな。"
13190-138 = "……それより、総会は始まってないよね？"
13190-139 = "もちろんだ。#n私募ファンドの代表は、私に変わったがね。"
13190-140 = "安心してくれ、君には発言権を与えよう。"
13190-141 = "……。"
13190-142 = "では、総会の開始を宣言しようか。"
13190-143 = "これより、債権者団体の総会を始める。"
13190-150 = "さっそくだが、何か言いたいことはあるかね。"
13190-158 = "「アビドス生徒会」の正当性を否定すれば、"
13190-159 = "ノノミちゃんを解放してくれるんだよね？"
13190-165 = "……プレジデント。"
13190-166 = "答えはノーだ。#nもし正当性がなかったとしたら、列車砲の所有権はネフティスに渡ってしまう。"
13190-167 = "それは我々にとって困るのだよ。"
13190-168 = "……。"
13190-169 = "[ruby=いざよい]十六夜[/ruby]ノノミを無事に返してほしいのならば、#n「契約の解除」を申し出ると良い。"
13190-170 = "そうすれば、列車砲の所有権は私の物になる。"
13190-171 = "……。"
13190-173 = "ダメです、ホシノ先輩！#nネフティスにも、カイザーにも列車砲を渡してはいけません！"
13190-174 = "ユメ会長と過ごした時間を否定しないでください……！"
13190-179 = "……と彼女は言っているが、どうするかね？"
13190-181 = "いけません！"
13190-182 = "カイザーの手に渡るくらいなら、ネフティスが所有するべきです！"
13190-183 = "どうか賢明なご判断を！#nアビドスの未来のためにも！"
13190-185 = "執事さん……！"
13190-186 = "お嬢様、転校の件をお忘れですか？"
13190-187 = "まだ今からでも可能で――"
13190-192 = "――私はアビドスを退学します！"
13190-199 = "これで、もう人質としての価値はありません！"
13190-200 = "だから先輩、私のために自分を犠牲にしないでください！"
13190-201 = "心配しないで。#nノノミちゃんが学校を辞める必要なんてない。"
13190-202 = "え……？"
13190-203 = "もちろん、[ruby=・   ・   ・   ・]そのまま[/ruby]列車砲を渡すつもりもないから。"
13190-204 = "ま、まさか……。"
13190-208 = "プレジデント。"
13190-209 = "契約の当事者として、アビドス生徒会は非認可の組織だったことを認めるよ。"
13190-210 = "……！"
13190-215 = "……！"
13190-216 = "これで、砂漠横断鉄道に関する契約書の効力は――"
13190-220 = "待ってください！！"
13190-225 = "AM 11:57"
13190-229 = "[ns] \"その発言は無効だよ！\""
13190-231 = "み、みんな……！"
13190-233 = "今のホシノ先輩に、アビドス生徒会としての権限はありません！"
13190-234 = "う、うぇ……！？"
13190-235 = "なぜなら、私がアビドス生徒会の会長になったからです！"
13190-236 = "あ、アヤネちゃんが生徒会長に！？"
13190-238 = "[ns1] \"うん、今はアヤネが生徒会長だよ。\"\n[ns2] \"投票で選ばれたんだ。\""
13190-241 = "[ns] \"私が証人になってる。\""
13190-242 = "ど、どういうこと……？"
13190-243 = "ん、みんなで決めた。"
13190-244 = "一人で解決しようとか思わないで！"
13190-248 = "……。"
13190-249 = "それと、先輩は副生徒会長から書記に降格しました！"
13190-250 = "ただの書記が、こんなトラブルを起こすだなんて……！"
13190-252 = "（ついさっきまで、自分が書記だったのに……）"
13190-254 = "ホシノ先輩にも説明をします！"
13190-255 = "先生のもと承認された私たち「対策委員会」は、#n「アビドス生徒会」と合併しました！"
13190-256 = "……。"
13190-258 = "アヤネちゃん……。"
13190-260 = "そのため、現在の契約当事者は「対策委員会」になります！"
13190-266 = "[ns] \"それとノノミ……。\""
13190-268 = "[ns] \"委員会を辞めるなら私の許可が必要だよ。\""
13190-269 = "先生……。"
13190-273 = "PM 12:00"
13190-275 = "なるほど、こう来たか。"
13190-276 = "シャーレを相手にすること自体、間違っていたのかもしれんな。"
13190-277 = "まあ、構わない。#n時間稼ぎは済んだ。"
13190-281 = "総会は終わりとする。"
13190-289 = "[ns] \"なっ……！\""
13190-294 = "そもそも、誰が君に発言を認めた？"
13190-295 = "そ、そんなっ……！"
13190-296 = "……！"
13190-298 = "所詮、君たちの頑張りなど無駄だったのさ。"
13190-303 = "この売買契約書は、効力を失ったものとして破棄する。"
13190-310 = "列車砲は最初からカイザーの所有物だった。#nそうだろう？"
13190-311 = "異論は一切認めない。"
13190-312 = "そんな横暴が許されると思っているんですか！？"
13190-317 = "……プレジデント、間もなくヘリが到着します。"
13190-321 = "ここにいる者どもを処理しておけ。#n良いか、一人残らず全員だ。"
13190-328 = "ただし、ネフティスのご令嬢……君には来てもらう。"
13190-338 = "待てっ！"
13190-345 = "ホシノ先輩！ノノミ！"
13190-348 = "シロコ先輩、孤立すると囲まれるよ！"
13190-350 = "先生、このままではノノミ先輩が……！"
13190-351 = "……どうか指揮を！"
