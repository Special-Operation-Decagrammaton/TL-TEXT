[translation]
2003905-1 = "籠鳥雲を恋う"
2003905-2 = "シャーレ・執務室"
2003905-5 = "[ns] \"じゃあ、今日もよろしくね。\""
2003905-6 = "うむ、任せるのじゃ。"
2003905-24 = "[ns] \"やったー！今日の仕事おっわり～！\""
2003905-25 = "ふふ、随分と嬉しそうじゃのう。"
2003905-26 = "うん？そうさの。好きで仕事をしておるものはおらぬ……妾もじゃ。"
2003905-27 = "そうさな……先生がそう喜んでくれ[ruby=わらわ]て妾も[/ruby]安心した。"
2003905-28 = "この後の予定は空いておるのじゃろう？少し休憩をしてはどうじゃ？"
2003905-29 = "ふむ……まるで妾がシャーレの主になったようじゃ、と？"
2003905-30 = "じゃが、そうはいかぬのう。#n人には、各々の所属がある。"
2003905-32 = "（キサキは窓に近づいた。外の景色を眺めているようだ）"
2003905-35 = "この景色？あぁ、特に意味などない。"
2003905-36 = "ただ、眺めておるだけじゃ……。"
2003905-38 = "（キサキはなんでもないように言っているけれど……）"
2003905-39 = "（その瞳は……無邪気な子供のように輝いていて）"
2003905-40 = "（まるで、初めての景色に胸を躍らせているようでもあった……）"
2003905-43 = "[ns] \"キサキ。\""
2003905-44 = "先生？"
2003905-45 = "[s] \"よければ、一緒に屋上に行ってみない？\""
2003905-46 = "シャーレの、屋上に？"
2003905-47 = "じゃが……いいのか？"
2003905-48 = "妾と一緒に、外の景色を見てみたい……？"
2003905-49 = "……。"
2003905-50 = "ふふ……先生がそう申すのであれば、断る理由はないさな。"
2003905-52 = "（キサキと一緒に、屋上行きのエレベーターに乗った）"
2003905-57 = "っ……！"
2003905-58 = "やはり、少し風が強いのう。"
2003905-59 = "先生はどうしてここを……。"
2003905-60 = "[s1] \"いい天気だからね！\"\n[s2] \"サボり……まではいかなくても、息抜きにはちょうどいいからね！\""
2003905-66 = "そうか……。"
2003905-67 = "ふふ、そうじゃろうな。"
2003905-79 = "不思議な、気分じゃ。"
2003905-80 = "山海経でも、このような景観はいくらでもあるというのに。"
2003905-81 = "ここで見る景色は……なんだか違うように感じられる。"
2003905-84 = "もっと……"
2003905-85 = "もっと……"
2003905-86 = "遠くへ、行ってみたい……。"
2003905-87 = "[s] \"うん、行こうか。\""
2003905-88 = "！？！？"
2003905-89 = "き、聞こえておったのか、先生。"
2003905-90 = "[s] \"二人きりだからね。\""
2003905-91 = "……！"
2003905-92 = "……い、意地が悪いの……！"
2003905-93 = "[s] \"イヤ？\""
2003905-94 = "……！！！"
2003905-95 = "[s] \"私は楽しみだけど。\""
2003905-96 = "ずるい大人じゃな、先生は……。"
2003905-97 = "……こほん。"
2003905-98 = "イヤとは、ひとことも言っておらぬ。"
2003905-99 = "[s3] \"うん。一緒に色んなところを、\"\n[s4] \"もっと遠く、もっと多く見ていこうね。\""
2003905-102 = "……。"
2003905-103 = "期待して、良いのかえ？"
2003905-104 = "[s] \"もちろん。\""
2003905-110 = "（キサキは無言でそっと近づいてきた）"
2003905-111 = "（彼女の目は遠くを眺めていたが――）"
2003905-112 = "（ふと触れ合ったその指先からは、微かな熱が伝わってきた）"
