[translation]
2003905-1 = "Pássaro engaiolado anseia pelas nuvens"
2003905-2 = "Schale - Escritório"
2003905-5 = "[ns] \"Bem, conto com você hoje também.\""
2003905-6 = "Hum, deixo com você."
2003905-24 = "[ns] \"Consegui! O trabalho de hoje acabou!\""
2003905-25 = "Fufu, você parece bem feliz, não é?"
2003905-26 = "Hm? Pois é. Ninguém gosta de trabalhar... nem eu."
2003905-27 = "Pois é... Fico aliviada que você tenha ficado tão feliz, Sensei."
2003905-28 = "Você está livre depois disso, não está? Que tal descansar um pouco?"
2003905-29 = "Hum... como se eu tivesse me tornado a dona do Schale, é isso?"
2003905-30 = "Mas isso não é possível. #nCada pessoa tem sua própria afiliação."
2003905-32 = "（Kisaki se aproximou da janela. Parece estar observando a paisagem lá fora）"
2003905-35 = "Esta paisagem? Ah, não tem nenhum significado especial."
2003905-36 = "Estou apenas observando..."
2003905-38 = "（Embora Kisaki diga isso como se não fosse nada...）"
2003905-39 = "（Seus olhos... brilhavam como os de uma criança inocente）"
2003905-40 = "（Era como se seu coração estivesse acelerado por ver aquela paisagem pela primeira vez...）"
2003905-43 = "[ns] \"Kisaki.\""
2003905-44 = "Sensei?"
2003905-45 = "[s] \"Se quiser, que tal irmos ao terraço juntos?\""
2003905-46 = "Ao terraço do Schale?"
2003905-47 = "Mas... tudo bem?"
2003905-48 = "Você quer ver a paisagem lá fora comigo...?"
2003905-49 = "……."
2003905-50 = "Fufu... se você insiste, Sensei, não tenho motivos para recusar."
2003905-52 = "（Entrei no elevador para o terraço junto com Kisaki）"
2003905-57 = "Ah...!"
2003905-58 = "Como esperado, o vento está um pouco forte."
2003905-59 = "Por que você me trouxe aqui, Sensei...?"
2003905-60 = "[s1] \"Porque o tempo está bom!\"\n[s2] \"Mesmo que não seja exatamente para vadiar, é um ótimo lugar para relaxar!\""
2003905-66 = "Entendo..."
2003905-67 = "Fufu, imagino que sim."
2003905-79 = "É uma sensação estranha."
2003905-80 = "Mesmo em Shanhaijing, existem inúmeras paisagens como esta."
2003905-81 = "Mas a vista daqui... parece diferente de alguma forma."
2003905-84 = "Mais..."
2003905-85 = "Mais..."
2003905-86 = "Quero ir para mais longe..."
2003905-87 = "[s] \"Sim, vamos lá.\""
2003905-88 = "！？！？"
2003905-89 = "V-você ouviu, Sensei?"
2003905-90 = "[s] \"Estamos sozinhos, afinal.\""
2003905-91 = "……！"
2003905-92 = "……V-você é cruel...!"
2003905-93 = "[s] \"Não quer?\""
2003905-94 = "……！！！"
2003905-95 = "[s] \"Eu estou ansioso por isso.\""
2003905-96 = "Você é um adulto astuto, Sensei..."
2003905-97 = "……Ehem."
2003905-98 = "Eu não disse em momento algum que não queria."
2003905-99 = "[s3] \"Sim. Vamos ver vários lugares juntos,\"\n[s4] \"vamos ver mais longe, e ver muito mais, está bem?\""
2003905-102 = "……。"
2003905-103 = "Posso criar expectativas?"
2003905-104 = "[s] \"Com certeza.\""
2003905-110 = "(Kisaki aproximou-se silenciosamente)"
2003905-111 = "(O olhar dela estava perdido ao longe, mas――)"
2003905-112 = "(De repente, um calor suave foi transmitido através de nossas pontas dos dedos que se tocaram)"
