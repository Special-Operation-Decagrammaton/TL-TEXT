[translation]
90100030-1 = "Episode 3;An Army Marches on Its Stomach"
90100030-2 = "D.U. Outskirts - Reservation-only high-end Yakiniku restaurant"
90100030-6 = "[ns1] \"...I think I'll start with the skirt steak.\"\n[ns2] \"And one cold oolong tea, please.\""
90100030-9 = "Right away!"
90100030-13 = "Um..."
90100030-14 = "Yeah..."
90100030-15 = "Ahaha..."
90100030-17 = "[ns3] \"Oh, let's order the beef tongue too.\"\n[ns4] \"And a vegetable platter as well, please.\""
90100030-20 = "Right away!"
90100030-24 = "...Sensei."
90100030-25 = "Before you place any more orders, there is something I would like to ask."
90100030-26 = "[s5] \"Oh, are you looking for a different cut?\"\n[s6] \"Don't hold back, feel free to order whatever you like.\""
90100030-29 = "No. It is not about the meat."
90100030-30 = "I believe we gathered today to discuss our operation..."
90100030-32 = "Why are we at a high-end Yakiniku restaurant?"
90100030-33 = "[s7] \"Well, let's talk while we eat some meat.\"\n[s8] \"...Oh, the skirt steak is done. Here you go.\""
90100030-36 = "Oh, thank you very much..."
90100030-37 = "Since it's been served, I will enjoy it, but..."
90100030-41 = "Nn!? W-what... is this meat?"
90100030-42 = "It feels like it's melting on my tongue, and when I chew, rich juices just overflow... Nn... my mouth is being completely taken over...!"
90100030-43 = "Mmm... delicious. I don't think I've ever eaten meat this good in my life. The stuff we had at SRT wasn't bad, but compared to this..."
90100030-44 = "[s] \"Next up is the beef tongue.\""
90100030-45 = "Well... the savory flavor unique to beef tongue goes very well with the sweet and sour lemon sauce."
90100030-46 = "If it's this thick, maybe it would be good finely chopped and added to inari sushi...?"
90100030-47 = "I never knew beef tongue was this good. The marriage with the sauce is perfect!"
90100030-51 = "...Wait. This is a cow's tongue, right? If I'm eating beef tongue, that means I'm eating the cow's tongue—"
90100030-52 = "Don't say things that make me lose my appetite!!"
90100030-57 = "[ns9] \"Yukino hasn't really eaten much...\"\n[ns10] \"Do you prefer offal, perhaps?\""
90100030-60 = "No, I'm not particularly fond of organ meats..."
90100030-61 = "As I said before, this is not about the meat."
90100030-65 = "For this operation, we intended to set our own goals so as not to burden you as much as possible, Sensei."
90100030-66 = "However, I heard from the General Student Council President that you requested to take direct command."
90100030-67 = "[s11] \"Since I've lent you my name, I have to take responsibility for it, too.\"\n[s12] \"It might be annoying, but I hope you'll allow me this much interference.\""
90100030-70 = "Interference, you say..."
90100030-71 = "You may say that, but for us, this operation is an 'act of atonement.' I assume you understand that, Sensei?"
90100030-72 = "In short, your 'interference' is nothing more than you taking on a portion of our penance."
90100030-76 = "...Sensei."
90100030-77 = "Why are you doing this much for us?"
90100030-78 = "Lending a hand is one thing, but to go to such lengths of kindness..."
90100030-79 = "To be honest, my confusion outweighs my gratitude. It is almost frightening."
90100030-80 = "[s] \"Don't worry about it. It's just a meal.\""
90100030-85 = "[ns] \"...Oh, are you worried the meat might be poisoned?\""
90100030-86 = "Poison? What do you mean by—"
90100030-90 = "Cough, cough!"
90100030-91 = "Eat a little slower."
90100030-92 = "Here, drink some water... Honestly, how do you manage to choke while eating?"
90100030-93 = "N-no... that's not it...!"
90100030-94 = "Come to think of it, we had a similar conversation before, didn't we?"
90100030-95 = "...I have no idea what you're talking about."
90100030-97 = "Excuse me, I'll change the grill."
90100030-98 = "[s] \"Oh, and three more orders of kalbi, please.\""
90100030-99 = "Three orders of kalbi, right away!"
90100030-105 = "...If it were something as straightforward as poison, how much easier it would be."
90100030-106 = "Unilateral kindness. There is nothing more terrifying than this."
90100030-107 = "Sensei, you pulled us up from the bottomless abyss. Thanks to you, we avoided repeating irreversible mistakes, and the lives of our juniors and ourselves were saved."
90100030-108 = "Even though we already owe you a debt we could never repay in a lifetime... you continue to be kind to us."
90100030-109 = "I still cannot fathom what it is you desire..."
90100030-110 = "[s] \"That's a nostalgic question.\""
90100030-114 = "[ns14] \"I'm doing this because I'm your Sensei.\"\n[ns15] \"I'm not doing it expecting anything in return.\""
90100030-117 = "...I struggle to understand."
90100030-118 = "Is treating us to luxury Yakiniku part of your job as Sensei?"
90100030-119 = "[s16] \"Of course.\"\n[s17] \"Making sure children are well-fed is an adult's duty.\""
90100030-124 = "[ns18] \"If you eat well, you'll have energy.\"\n[ns19] \"If you eat well, you can grow.\"\n[ns20] \"...Because only by eating well can you become an adult.\""
90100030-128 = "..."
90100030-129 = "I do not deny that one should eat well."
90100030-130 = "After all, there is a saying that 'an army marches on its stomach.'"
90100030-134 = "[ns] \"Oh, the kalbi is looking good.\""
90100030-136 = "...It is good meat."
90100030-137 = "Wait a second! Is that all you have to say!?"
90100030-138 = "...Did I say something strange?"
90100030-139 = "It has no gamey smell and it isn't too tough. That is why I said it is good meat..."
90100030-140 = "I can't believe you'd describe top-tier marbled kalbi as just 'not smelly'!"
90100030-141 = "What an outrage! What a hopeless sense of taste you have!"
90100030-142 = "Sensei, don't give Yukino any expensive meat! She'd probably say the same thing about meat that costs 100 yen per 100 grams!"
90100030-143 = "Kurumi-chan, isn't that going a bit too far..."
90100030-144 = "She was calm even when eating combat rations every day, so I thought she was just patient... but to think she was just a philistine..."
90100030-145 = "Wait. No matter how little interest I have in food, I cannot let that slide."
90100030-146 = "You wouldn't know, but the canned seafood provided by SRT actually tastes better the longer it sits. That's why it's still delicious even after the expiration date—"
90100030-147 = "Throw away anything that's expired!"
90100030-148 = "It's no use. In that case, I have no choice but to entrust the decision-making to the Vice Squad Leader, who still has a normal sense of taste."
90100030-149 = "Niko! I'm leaving the next order to you!"
90100030-150 = "Hmm. I don't think my sense of taste is particularly exceptional either, but..."
90100030-154 = "Then, how about the fried tofu soup from the recommendations—"
90100030-155 = "No soup! We'll get too full!"
90100030-157 = "(After that, we continued to have a lively dinner with the rest of the FOX Squad.)"
90100030-159 = "Next Episode;A New Base"