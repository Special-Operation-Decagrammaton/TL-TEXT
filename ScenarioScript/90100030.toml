[translation]#[Texto Final. - Filipe 13/07.]
90100030-1 = "Episódio 3; O Esquadrão Só Marcha de Barriga Cheia"
90100030-2 = "Periferia de D.U. - Yakiniku de luxo (apenas reservas)"
90100030-6 = "[ns1] \"……Vou começar pela fraldinha.\"\n[ns2] \"E um chá oolong gelado, por favor.\""
90100030-9 = "É pra jááá~!"
90100030-13 = "Er……"
90100030-14 = "Hm……"
90100030-15 = "Haha……"
90100030-17 = "[ns3] \"Ah, vou pedir língua também.\"\n[ns4] \"E uma seleção de legumes, por favor.\""
90100030-20 = "É pra jáááá~~!"
90100030-24 = "……Sensei [USERNAME]."
90100030-25 = "Antes que faça outro pedido, preciso lhe perguntar uma coisa."
90100030-26 = "[s5] \"Ah, quer experimentar outro corte?\"\n[s6] \"Não faz cerimônia, pode pedir.\""
90100030-29 = "Não. Não se trata da carne."
90100030-30 = "Nós nos reunimos hoje para o briefing da operação, se não me engano……"
90100030-32 = "Por que estamos num yakiniku de luxo?"
90100030-33 = "[s7] \"Calma, vamos conversar comendo uma carninha.\"\n[s8] \"……Opa, a fraldinha já tá no ponto. Se serve.\""
90100030-36 = "O-Obrigada……"
90100030-37 = "Já que foi servido, vou comer direito, mas……"
90100030-41 = "Hmmm?! Q-Que carne…… é essa?"
90100030-42 = "Derrete na língua, mas quando mastiga jorra um suco encorpado……#nHmm…… dominou minha boca inteira……!"
90100030-43 = "Hmmm…… que delícia. Acho que nunca comi uma carne boa dessas na vida.#nA da SRT não era ruim, mas perto disso……"
90100030-44 = "[s] \"Agora a língua.\""
90100030-45 = "Nossa……#no tostado característico da língua casa muito bem com o molho agridoce de limão."
90100030-46 = "Com essa espessura, picadinha,#naté daria um bom acompanhamento pra inarizushi……?"
90100030-47 = "Língua bovina era gostosa assim?#nA harmonização com o molho é suprema~!"
90100030-51 = "……Ah. Isso é língua de boi, né?#nComer a língua é tipo encostar a sua na do boi――"
90100030-52 = "Para de estragar meu apetite!!"
90100030-57 = "[ns9] \"A Yukino quase não comeu……\"\n[ns10] \"Prefere miúdos, por acaso?\""
90100030-60 = "Não. Vísceras não são muito……"
90100030-61 = "Repito: não se trata da carne."
90100030-65 = "Nesta operação, nossa intenção era definir os alvos sozinhas,#npara pesar o mínimo possível sobre o Sensei."
90100030-66 = "Mas soube pela Presidente do Conselho que você pediu o comando direto."
90100030-67 = "[s11] \"Se emprestei meu nome, tenho que arcar com a responsabilidade à altura.\"\n[s12] \"Pode ser um incômodo, mas me deixem dar esse palpite.\""
90100030-70 = "Palpite, é……"
90100030-71 = "Você diz isso, mas esta operação é o nosso \"ato de expiação\".#nO Sensei compreende, não?"
90100030-72 = "No fim das contas,#n o seu \"palpite\" não é outra coisa senão carregar nos ombros#n parte da nossa penitência."
90100030-76 = "……Sensei."
90100030-77 = "Por que faz tudo isso por nós?"
90100030-78 = "Estender a mão já seria muito; mas até essa gentileza, que não merecemos……"
90100030-79 = "Sinceramente?#nA confusão supera a gratidão.#nA ponto de eu sentir até medo."
90100030-80 = "[s] \"Não esquenta. É só um jantar.\""
90100030-85 = "[ns] \"……Ah, tá com medo de a carne estar envenenada?\""
90100030-86 = "Veneno? Como assim――"
90100030-90 = "Cof, cof!"
90100030-91 = "Come mais devagar, criatura."
90100030-92 = "Toma, bebe água…… Como é que a pessoa engasga comendo?"
90100030-93 = "N-Não…… não é nada disso……!"
90100030-94 = "Aliás, já tivemos uma conversa parecida com essa antes, não foi?"
90100030-95 = "……Não faço a menor ideia do que estão falando."
90100030-97 = "Com licença, vou trocar a grelha."
90100030-98 = "[s] \"Ah, e mais três porções de costela, por favor.\""
90100030-99 = "Três de costela, é pra já!"
90100030-105 = "……Se fosse algo óbvio como veneno,#nseria muito mais fácil."
90100030-106 = "Bondade concedida unilateralmente.#nNão há nada mais assustador."
90100030-107 = "O Sensei nos içou de um abismo sem fundo.#nGraças a você, não acumulamos erros irreparáveis,#ne as nossas vidas, e as das calouras, foram salvas."
90100030-108 = "Nossa dívida já é impagável mesmo que gastássemos a vida inteira……#ne ainda assim o Sensei segue sendo gentil."
90100030-109 = "O que será que você deseja de nós……?#nAté hoje não consigo medir."
90100030-110 = "[s] \"Que pergunta nostálgica.\""
90100030-114 = "[ns14] \"É porque eu sou o Sensei.\"\n[ns15] \"Não faço isso esperando algo em troca.\""
90100030-117 = "……É difícil de compreender."
90100030-118 = "Servir um banquete de yakiniku faz parte do seu trabalho?"
90100030-119 = "[s16] \"Claro.\"\n[s17] \"Alimentar bem as crianças é dever de todo adulto.\""
90100030-124 = "[ns18] \"Quem come bem tem energia.\"\n[ns19] \"Quem come bem cresce.\"\n[ns20] \"……É comendo bem que se vira adulto.\""
90100030-128 = "……"
90100030-129 = "Não vou negar que comer bem é importante."
90100030-130 = "Existe até o ditado: \"um exército só marcha de barriga cheia\"."
90100030-134 = "[ns] \"Opa, a costela tá no ponto.\""
90100030-136 = "……É uma boa carne."
90100030-137 = "Peraí! Só isso?!"
90100030-138 = "……Eu disse algo de errado?"
90100030-139 = "Sem cheiro forte, nem dura demais.#nPor isso disse que é uma boa carne……"
90100030-140 = "Despachar uma costela marmorizada premium com um \"não fede\"?!#nInacreditável!"
90100030-141 = "Que ultraje! Que paladar mais desesperador o dessa aí!"
90100030-142 = "Sensei, não dá carne cara pra Yukino!#nAposto que ela diria o mesmo da carne mais baratinha do mercado!"
90100030-143 = "Kurumi, isso já é exagero, vai……"
90100030-144 = "Ela comia ração de combate todo dia sem reclamar, eu achava que era resistência……#nMas era só paladar de gaveta mesmo……"
90100030-145 = "Alto lá. Posso não me interessar por comida, mas isso eu não posso deixar passar."
90100030-146 = "Vocês não sabem, mas o enlatado de frutos do mar da SRT fica mais saboroso com o tempo.#nEntão, mesmo vencido, continua gostoso――"
90100030-147 = "Comida vencida se joga FORA!"
90100030-148 = "Não tem jeito. Só resta delegar a decisão à vice-capitã, que ainda tem o paladar intacto."
90100030-149 = "Niko! O próximo pedido é seu!"
90100030-150 = "Hmm. Não que o meu paladar seja lá essas coisas, mas……"
90100030-154 = "Então, das recomendações, o caldo de tofu frito――"
90100030-155 = "Sopa não! Vai encher minha barriga!"
90100030-157 = "(E o jantar animado com o pessoal do Esquadrão FOX seguiu noite adentro)"
90100030-159 = "Próximo Episódio;A Nova Base de Operações"