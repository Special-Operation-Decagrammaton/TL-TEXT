[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
90100030-1 = "Episódio 3: Um Esquadrão Só Marcha de Barriga Cheia"
90100030-2 = "Churrascaria de Luxo - Margens Externas dos Arredores de D.U."
90100030-6 = "[ns1] \"……Vamos começar com um belo harami.\"\n[ns2] \"Ah, e um chá oolong bem gelado para acompanhar, por favor.\""
90100030-9 = "Saindo na hora, mestre!"
90100030-13 = "Hmm..."
90100030-14 = "Hum..."
90100030-15 = "Ahahaha..."
90100030-17 = "[ns3] \"Opa, bota uma língua de boi bem grossa também.\"\n[ns4] \"E uma saladinha de legumes assados para completar.\""
90100030-20 = "Perfeito, chefia~~!!"
90100030-24 = "……Sensei [USERNAME]."
90100030-25 = "Antes que o senhor esvazie o cartão da Schale com mais pedidos, preciso abrir um parêntese aqui."
90100030-26 = "[s5] \"O que foi? Está com desejo de outra carne?\"\n[s6] \"Pode pedir à vontade, eu pago tudo hoje.\""
90100030-29 = "Negativo. Não é sobre carne."
90100030-30 = "A pauta de hoje era para discutirmos a operação, não era?"
90100030-32 = "Se o assunto é militar, por que estamos numa churrascaria de luxo?"
90100030-33 = "[s7] \"Calma, vamos conversar enquanto comemos. Abre a boca...\"\n[s8] \"……Olha só, o harami está no ponto perfeito. Diga \"ah\".\""
90100030-36 = "A-Ah... obrigada."
90100030-37 = "Já que o senhor insiste, não vou desperdiçar..."
90100030-41 = "NHAM?! M-Mas o que tem essa carne?!"
90100030-42 = "A textura derrete na língua... e o suco quente explode quando mastigo...#nHnnh... esse sabor tomou conta da minha boca inteira!"
90100030-43 = "Uhnnn... nossa. É o pedaço de carne mais delicioso que já comi na vida.#nA comida da SRT até era boa, mas perto disso... é terra e água."
90100030-44 = "[s] \"Vai logo que a língua de boi está quase pronta.\""
90100030-45 = "Uau... O cheiro da carne tostando com o molho agridoce de limão é de outro mundo."
90100030-46 = "É tão grossa... Será que picar e misturar com inarizushi daria uma combinação divina?"
90100030-47 = "Nossa, eu não sabia que língua de boi soltava tanto suco.#nEssa mistura com o molho ácido é um prazer dos deuses~!"
90100030-51 = "……Espera. Língua de boi é... a língua do boi. Então eu estou beijando――"
90100030-52 = "NÃO ESTRAGA A COMIDA COM ESSA IMAGEM NOJENTA, IDIOTA!!"
90100030-57 = "[ns9] \"A Yukino está só mastigando o ar... não gostou?\"\n[ns10] \"Você prefere vísceras, é?\""
90100030-60 = "Negativo. Eu como órgãos de boi sem problemas."
90100030-61 = "Mas repito: não é sobre comida."
90100030-65 = "A ideia original era que a Schale só nos desse suporte.#nNós é que iríamos investigar e enfrentar o perigo, sem envolver o Sensei."
90100030-66 = "No entanto, a Presidente disse que o senhor insistiu em comandar a operação pessoalmente."
90100030-67 = "[s11] \"Se o meu nome está no papel, a responsabilidade também é minha. O que vocês fizerem, cai em mim.\"\n[s12] \"Podem chiar à vontade, mas não vou deixar alunas minhas irem para o escuro sozinhas.\""
90100030-70 = "Comandar... O senhor está camuflando heroísmo com prepotência."
90100030-71 = "A ideia é bonita no papel. Mas esta operação é a nossa chance de redenção. É a nossa penitência.#nO senhor sabe disso, não sabe?"
90100030-72 = "No fim, o senhor só quer pegar o lugar dos nossos castigos e tomar os tiros por nós. Não está liderando, está sendo mártir de novo."
90100030-76 = "……Por favor, Sensei."
90100030-77 = "Por qual razão o senhor se arrisca tanto por pessoas tão problemáticas como a gente?"
90100030-78 = "Já é um favor imenso nos dar essa chance. Mas esbanjar o cartão e nos levar para um lugar desses... é muita bondade, chega a ser sufocante."
90100030-79 = "Vou dizer a verdade: já passou da gratidão. Agora é medo. Essa pureza toda é assustadora."
90100030-80 = "[s] \"Que exagero. Relaxa. É só uma carne gostosa, não uma coleira.\""
90100030-85 = "[ns] \"……Ah, essa sua cara de suspeita... Está achando que o Sensei botou algum \"veneno do amor\" na comida?\""
90100030-86 = "Veneno? Do que você está falan――"
90100030-90 = "AUHG! TOSSE! COF COF!"
90100030-91 = "Sua apressada! Engole a carne sem mastigar, né?"
90100030-92 = "Bebe água... Pelo amor de Deus, como você consegue se engasgar com um pedaço de carne?"
90100030-93 = "N-Não foi culpa minha...! A carne que entalou... e o Sensei provocou com aquela fala maliciosa!"
90100030-94 = "Pois é, capitã. A ironia não falha. A gente mesmo desconfiou de você por causa de uma comida uma vez, lembra?"
90100030-95 = "……Não lembro de nada disso. Calada."
90100030-97 = "Com licença, vou trocar a grelha."
90100030-98 = "[s] \"Valeu. Ah, manda mais três porções de costela para deixar elas bem alimentadas.\""
90100030-99 = "Três costelas premium saindo já!"
90100030-105 = "……Se fosse veneno, seria mais fácil. Pelo menos teria antídoto."
90100030-106 = "Mas ser alvo de bondade sem pedir nada em troca... isso é o pior veneno."
90100030-107 = "O senhor nos tirou do fundo do poço. Impediu que a gente cometesse erros piores.#nE ainda salvou a vida das nossas subordinadas e a nossa."
90100030-108 = "Já estamos com uma dívida eterna, e o senhor continua nos enchendo de banquetes e sorrisos."
90100030-109 = "O que o senhor realmente quer? Minhas matrizes não conseguem entender o seu coração."
90100030-110 = "[s] \"Que nostalgia. Já ouvi essa mesma ladainha de outra aluna há um tempo...\""
90100030-114 = "[ns14] \"Mas o que está no meu peito não tem segredo. Minha função é ser o Sensei de vocês.\"\n[ns15] \"A matemática de 'lucro' e 'pedágio' eu deixo para os políticos. Meu carinho não tem conta no final do mês.\""
90100030-117 = "……Isso vai contra o bom senso."
90100030-118 = "Existe no manual do Sensei uma tática pedagógica chamada \"gastar rios de dinheiro com churrasco para delinquentes\"?"
90100030-119 = "[s16] \"Assinado e carimbado.\"\n[s17] \"Alimentar bem adolescentes em crescimento... ver vocês comerem com saúde... é obrigação de um adulto responsável.\""
90100030-124 = "[ns18] \"Com a barriga cheia, o corpo funciona e a gente sorri.\"\n[ns19] \"E a carne faz bem, dá músculo, enche as curvas...\"\n[ns20] \"……Porque só se sobrevive ao sufoco lá fora se o corpo tiver combustível.\""
90100030-128 = "……"
90100030-129 = "A parte biológica da alimentação eu não discordo."
90100030-130 = "Afinal, \"um exército marcha sobre o estômago\" é um ditado antigo."
90100030-134 = "[ns] \"Opa, a costela está no ponto. Podem atacar.\""
90100030-136 = "……Corte de carne aceitável."
90100030-137 = "PAUSA TÁTICA! Você acabou de chamar aquilo de \"aceitável\"?!"
90100030-138 = "……Ofendi o paladar de vocês com meu comentário?"
90100030-139 = "Sem acidez, não é dura.#nLaudo: carne bovina funcional e aceitável."
90100030-140 = "Você recebeu a costela perfeita e resumiu a \"não fede\"?! Que afronta!"
90100030-141 = "Que anomalia genética destruiu as papilas gustativas dessa mulher?!"
90100030-142 = "Sensei, corta os mimos para ela! É desperdício de dinheiro!#nEla diria a mesma coisa para um bife enlatado de supermercado!"
90100030-143 = "Kurumi-chan, já chega. Recolha as ofensas."
90100030-144 = "Eu sempre achei que a Yukino era só disciplinada, mas na verdade... ela não tem paladar mesmo."
90100030-145 = "Parem de me difamar! Não sou gulosa, isso é verdade. Mas dizer que meu paladar é ruim é calúnia."
90100030-146 = "Vocês não entendem os segredos da logística militar. As latas de peixe da SRT, quando envelhecem, o sabor fica ainda mais intenso. É o umami――"
90100030-147 = "LATAS VENCIDAS SÃO PARA JOGAR FORA, ANIMAL!!"
90100030-148 = "Já chega. A capitã está fora. Tenente Niko, você assume e escolhe os próximos cortes."
90100030-149 = "Niko, salve a operação de engorda do Sensei!"
90100030-150 = "Hmm... eu não sou nenhuma especialista em carnes caras, mas..."
90100030-154 = "Então que tal uma sopinha de tofu com abura-age?"
90100030-155 = "NADA DE SOPA! VAI OCUPAR ESPAÇO DA CARNE NO ESTÔMAGO!!"
90100030-157 = "（O negócio desandou e o Esquadrão FOX passou o resto da noite discutindo e comendo às custas do Sensei.）"
90100030-159 = "Próximo Episódio: Uma Nova Base de Operações"