[translation]
90100030-1 = "Episódio 3: O Esquadrão só Marcha de Barriga Cheia"
90100030-2 = "Churrascaria de Luxo para Convidados VIPs - Margens Externas de D.U."
90100030-6 = "[ns1] \"……Vamos aquecer a noite começando com um Harami suculento.\"\n[ns2] \"Ah, e me desce um Chá Oolong trincando de gelado pra esfriar o fogo, por favor.\""
90100030-9 = "Saindo no capricho, mestre!"
90100030-13 = "Uhm..."
90100030-14 = "Hum..."
90100030-15 = "Ahahaha..."
90100030-17 = "[ns3] \"Opa, bota aquela Língua de Boi bem grossa na conta também.\"\n[ns4] \"E um prato cheio com mix de vegetais assados pra acompanhar a brincadeira.\""
90100030-20 = "É pra já, chefia~~!!"
90100030-24 = "……Sensei [USERNAME]."
90100030-25 = "Antes que o senhor esvazie o cartão negro da Schale com mais luxos, exijo abrir um parêntese tático na pauta."
90100030-26 = "[s5] \"O que foi? O seu corpo tá desejando morder outra parte mais macia?\"\n[s6] \"Pode soltar os desejos, eu banco qualquer luxo pra vocês hoje.\""
90100030-29 = "Negativo. Proteína animal e prazer culinário são irrelevantes agora."
90100030-30 = "O log de hoje cravava que esta reunião visava debater balística e rotas táticas no escuro... Não é?"
90100030-32 = "Se o escopo é militar, por que diabos a nossa guarnição foi arrastada pra dentro de uma Churrascaria de Alta Gastronomia de elite?"
90100030-33 = "[s7] \"Calma, calma, a gente fala de suar na rua depois. Abre a boquinha...\"\n[s8] \"……Olha só, o Harami torrou no ponto perfeito. Diga 'Aaaah'.\""
90100030-36 = "A-Ah... b-bom, obrigada..."
90100030-37 = "Já que o senhor insiste e botou no meu prato, o desperdício calórico não seria ético, mas..."
90100030-41 = "A-HMM?! Q-Que bruxaria divina tem nessa carne?!"
90100030-42 = "A textura derrete igual fumaça nas papilas... e a mastigação explode uma bomba de suco quente na garganta...#nHnnh... A força esmagadora desse sabor imobilizou e dominou a minha boca inteira...!"
90100030-43 = "Uhnnn... Minha nossa... Esse é o corte bovino mais obsceno e delicioso que minha língua já conheceu na vida.#nO lombo grelhado da base da SRT tinha a sua decência, mas comparado a isso... é como lamber lama."
90100030-44 = "[s] \"Guarda espaço que a Língua de Boi tá fervendo na chapa agora.\""
90100030-45 = "Uau... O cheiro de tostado sedutor da carne desmancha a razão em contato com o azedinho doce desse molho de limão."
90100030-46 = "A espessura da fatiagem é tão densa... Será que picotar em tiras pra misturar com as cascas de Inarizushi não casaria a alquimia suprema...?"
90100030-47 = "Meu Deus, eu não sabia que Língua de Boi chorava tanto suco bom.#nA comunhão e as mordidas com esse molho ácido é um prazer dos deuses~!"
90100030-51 = "……Espera. A etiqueta do cardápio bate com a anatomia. 'Língua' bovina quer dizer que eu tô enfiando na boca e dando um beijo de lí--"
90100030-52 = "NÃO ARRUÍNA A PUTARIA GASTRONÔMICA COM ESSA IMAGEM MENTAL NOJENTA, OTÁRIA!!"
90100030-57 = "[ns9] \"A Yukino tá só mastigando o ar... Não gostou da carne grossa?\"\n[ns10] \"O seu paladar é mais pros miúdos e vísceras exóticas, é?\""
90100030-60 = "Repulsa negada. O meu sistema digestivo lida com órgãos suínos de forma pacífica."
90100030-61 = "Eu repito aos canais cegos desta mesa: cortes de tecido animal e luxúria alimentar são irrelevantes."
90100030-65 = "Na gênese do tratado desta missão, a cláusula magna ditava que a Schale apenas cederia o escudo burocrático.#nO Esquadrão Fox rastejaria e executaria os demônios na sombra solitariamente, para não respingar as mãos do Sensei de sangue sujo e desgaste tático."
90100030-66 = "Todavia, os memorandos presidenciais despacharam que o Comandante cravou as garras e ordenou assinar o rádio operacional e supervisionar nossa guerra pessoalmente."
90100030-67 = "[s11] \"Se o selo no papel carrega o meu RG e eu liberei os cães de guarda, as consequências das mordidas de vocês batem na minha testa, sargento.\"\n[s12] \"O ego das tropas especiais pode chiar o quanto quiser, mas eu não delego alunas minhas pro escuro sem ditar as rédeas da operação.\""
90100030-70 = "Ditar as rédeas... O senhor camufla o heroísmo com prepotência militar."
90100030-71 = "A teoria é linda no papel. Contudo, essa operação suicida é o nosso 'Voto de Redenção Penitenciário'. É o nosso banho de lama pra expurgar as chamas golpistas.#nO senhor atestou essa cláusula cármica, não atestou?"
90100030-72 = "O resumo final é simples: a sua intromissão armada e 'ditames táticos' servem apenas para usurpar as nossas chibatadas e absorver o tiro mortal nos nossos lugares. O senhor não está liderando, está sendo um mártir e blindando nossa dor cármica de novo."
90100030-76 = "……Por favor, Sensei."
90100030-77 = "Por qual falha biológica do universo o seu cérebro se arrisca a sujar as mangas por uma escória militar apodrecida como nós?"
90100030-78 = "Apenas atirar uma corda burocrática pro abismo já era perdão divino. Mas despejar o limite do cartão e escoltar nossas fardas sujas para alta gastronomia... O excesso de graça e misericórdia asfixia."
90100030-79 = "Darei voz à verdade sem anestesia: a gratidão secou e deu lugar a um horror tático perante as suas manobras.#nEsse afeto asquerosamente puro e intocável chega a ser patológico, me dá calafrios."
90100030-80 = "[s] \"Que dramática. O seu termostato precisa esfriar. Eu tô comprando proteína deliciosa, não atirando correntes em você.\""
90100030-85 = "[ns] \"……Ah, essa cara tremendo e suspeitando... Tá achando que o Sensei batizou a sua carne com algum 'suquinho do amor' ou veneno paralisante pra te deixar dócil?\""
90100030-86 = "Bife químico...? Do que diabos a sua mente esqui--"
90100030-90 = "AUGH! C-COF! KHAA!"
90100030-91 = "Sua otária desesperada! Engole a linguiça sem respirar, né?"
90100030-92 = "Abre a garganta e desce água... Pelos deuses, em qual protocolo de camuflagem você aprende a se engasgar com um naco de carne?"
90100030-93 = "T-Tá errada a matriz...! A-A engrenagem do gogó que enroscou...! E as calúnias sádicas do Comandante provocaram isso...!"
90100030-94 = "O carma e a ironia não falham. Nós destilamos essa mesma desconfiança venenosa em você por conta de um pratinho de comida tempos atrás, não foi, capitã?"
90100030-95 = "……A senilidade bateu. Não encontro esse log no meu HD da memória não. Calada."
90100030-97 = "Com licença, farei a queima e a substituição da grelha chamuscada."
90100030-98 = "[s] \"Agradecido. Ah, de carona: manda descer mais três fatias grossas de Costela pra engordar e deixar elas suculentas.\""
90100030-99 = "Três rodadas de Costela premium saindo em três!"
90100030-105 = "……Secreções envenenadas ou dopantes na carne seriam honestas. Ao menos a matemática balística diz que o veneno tem cura ou causa a morte física indolor."
90100030-106 = "Mas despejar bombardeios de misericórdia passional sem cobrar pedágio ou favores na volta... Esse é um veneno letal e inescapável. E o senhor sabe bem disso."
90100030-107 = "A doutrina do senhor nos pescou do cu do abismo. A sua munição defletiu tiros, silenciou o meu ego de espirrar sangue em massacres inúteis,#ne a sua coleira puxou o pescoço das nossas cadetes do precipício pro alto e salvou a vida de todas."
90100030-108 = "Se eu derretesse as fardas inteiras, o débito eterno dessa cruz ainda não fecharia o saldo positivo no balanço. As minhas almas não possuem lastro pra quitar a dívida carnal da Schale com você...#nE mesmo afogado em ingratidão, o senhor me enche de banquetes e sorrisos pervertidos."
90100030-109 = "Qual é o ganho e a fatura escondida nessa política, afinal...? As minhas matrizes cognitivas repudiam e sangram de confusão tentando escanear o seu coração."
90100030-110 = "[s] \"Eu juro que uma ex-aluna repetiu essa mesma ladainha de suspeita e fardo no meu ouvido há uns semestres...\""
90100030-114 = "[ns14] \"Mas o selo que gruda no meu peito não tem segredo, sargento. A minha patente é atestada e cravada como o seu Sensei e só.\"\n[ns15] \"A matemática de 'lucro', de 'pedágios fúnebres' e 'agiotagem moral' eu delego pros políticos sujos. O meu carinho não tem fatura no fim do mês.\""
90100030-117 = "……Essa charada quebra o bom senso material."
90100030-118 = "O manual de operações docentes jura que torrar orçamentos gordos forçando alta gastronomia na boca de delinquentes é uma tática pedagógica registrada na base?!"
90100030-119 = "[s16] \"Assinado e cravado com firma reconhecida.\"\n[s17] \"Nutrir a barriga esfomeada e as engrenagens de adolescentes em crescimento... ver vocês lamberem os beiços cheias de saúde... é o primeiro mandamento letal de um adulto responsável.\""
90100030-124 = "[ns18] \"Com a caldeira cheia e a barriga de forrada, o motor orgânico ruge e os sorrisos abrem.\"\n[ns19] \"E a carne constrói músculo, expande o osso, enche de curvas...\"\n[ns20] \"……Porque só se sobrevive à merda do asfalto quente, cresce e desabrocha como mulher se o corpo tiver cimento e tijolo pra queimar.\""
90100030-128 = "……"
90100030-129 = "A premissa biológica da nutrição forçada na base bélica... é matematicamente inegável."
90100030-130 = "O jargão dos exércitos milenares dita em pedra: 'O soldado e a farda só marcham se a fornalha da barriga estiver cheia', afinal."
90100030-134 = "[ns] \"Opa, o chiado cessou, a Costela torrou e tá chorando suco na medida. Podem atacar.\""
90100030-136 = "……Corte de proteína aceitável."
90100030-137 = "PAUSA TÁTICA! A sua língua absorveu AQUELE NÉCTAR DOS DEUSES E SÓ VOMITOU 'ACEITÁVEL'?!"
90100030-138 = "……O meu relatório ofendeu o paladar da guarnição em alguma nota?"
90100030-139 = "O pH é nulo em acidez podre e os nervos não exigem torque exagerado na mordida.#nO laudo é transparente: 'corte bovino funcional e aceitável'."
90100030-140 = "A infeliz teve o privilégio de mascar a obra-prima marbling das costelas divinas e resumiu o laudo a 'não fede a lixo'?! A desonra orgânica!"
90100030-141 = "A heresia bélica!! Que anomalia genética decrépita amaldiçoou e apagou as papilas gustativas dessa doente?!"
90100030-142 = "Sensei, corta o tesão culinário e a cota financeira dela! Ligar cortes luxuosos na CPU inútil dessa aí é jogar munição na privada!#nA infeliz daria o mesmo laudo robótico de merda pra um bife duro enlatado de trinta centavos de loja de conveniência!"
90100030-143 = "Kurumi-chan, a artilharia verbal cruzou a linha do civilizado com a capitã, recolha as granadas..."
90100030-144 = "Eu sempre engolia e acreditava no estoicismo imutável da Yukino de aturar qualquer lixo estragado na ração das trincheiras pra fingir honra...#nO mito caiu. O DNA da mulher é que era podre de nascença... Fim."
90100030-145 = "Ataque verbal negado! A minha falta de luxúria alimentar e gula orgânica é conhecida nas patentes. Mas difamar a pureza e a competência cirúrgica do meu paladar é traição legal."
90100030-146 = "A estupidez de vocês lhes cega pros mistérios químicos da logística paramilitar. A decomposição latente nas latas de peixes táticos da SRT matura em marinada a enzima salina do defunto escamoso com a passagem das luas... o cheiro estragado é a assinatura do Umami apocalíptico e supremo... A ciência d--"
90100030-147 = "O CÓDIGO PENAL DÁ GUILHOTINA EM LATA ESTUFADA! DESCARTE ESSE VENENO MORTO NA HORA!"
90100030-148 = "O motim logístico da tropa rachou o conselho. A capitania aborta a função de provadora tática e transfere as estrelas pra Tenente.#nNiko! O fardo de selecionar as provisões bélicas mais apetitosas e suculentas da mesa cai pra você!"
90100030-149 = "Niko, assume o manche e puxa o cardápio da luxúria! Salve a operação de engorda do Sensei!"
90100030-150 = "Hmm... eu devo atestar pro conselho que meu currículo culinário também passa longe da supremacia exigida por esses cortes raros e caros... mas..."
90100030-154 = "Visto as patentes e orçamentos, então vamos fechar o escopo com uma tijelinha morna e acolhedora de Sopa Clara mergulhada em Tofu Abura-Age frito...!"
90100030-155 = "CORTA OS LAUDOS LÍQUIDOS!! ENTUPIR O RESERVATÓRIO COM CALDO VAI MATAR O ESPAÇO E O TESÃO DA CARNE NO ESTÔMAGO!!"
90100030-157 = "（O comitê abandonou a decência e a gritaria faminta do Esquadrão FOX explodiu as garrafas. O resto da noite seguiu em guerra suada e deliciosa pela chapa, patrocinada pelos luxos do Sensei.）"
90100030-159 = "Próximo Episódio: Uma Nova Base de Operações"