[translation]
90100030-1 = "Episódio 3: Um esquadrão marcha de barriga cheia"
90100030-2 = "Periferia de D.U. - Churrascaria de luxo com reserva"
90100030-6 = "[ns1] \"...Acho que vou começar pelo diafragma.\"\n[ns2] \"E um chá oolong gelado, por favor.\""
90100030-9 = "Com certeza!"
90100030-13 = "Bem..."
90100030-14 = "Sim..."
90100030-15 = "Ahaha..."
90100030-17 = "[ns3] \"Ah, vou pedir língua de boi também.\"\n[ns4] \"E um mix de vegetais, por favor.\""
90100030-20 = "Com certeza!"
90100030-24 = "...Professor [USERNAME]."
90100030-25 = "Antes que faça mais pedidos, gostaria de perguntar uma coisa."
90100030-26 = "[s5] \"Ah, será que você quer comer outra parte?\"\n[s6] \"Não precisa se acanhar, pode pedir o que quiser.\""
90100030-29 = "Não. Não é sobre a carne."
90100030-30 = "Acho que nos reunimos hoje para discutir a estratégia, mas..."
90100030-32 = "Por que estamos em uma churrascaria de luxo?"
90100030-33 = "[s7] \"Ora, vamos conversar enquanto comemos uma carne.\"\n[s8] \"...Ah, o diafragma já assou. Pode servir.\""
90100030-36 = "Ah, muito obrigada..."
90100030-37 = "Já que foi servido, vou comer, mas..."
90100030-41 = "Nnngh!? O que é... essa carne?"
90100030-42 = "Parece que derrete na língua, e quando mordo, um suco de carne intenso transborda...#nNn... minha boca está sendo dominada...!"
90100030-43 = "Uau... que delícia. Acho que nunca comi uma carne tão boa na vida.#nA que serviam no SRT não era ruim, mas comparada a isso..."
90100030-44 = "[s] \"Agora é a língua de boi.\""
90100030-45 = "Ora... o sabor defumado característico da língua combina muito bem com o molho cítrico de limão."
90100030-46 = "Se é tão grossa assim, talvez ficasse boa picadinha em um inari sushi...?"
90100030-47 = "Eu não sabia que língua de boi era tão gostosa.#nA combinação com o molho é perfeita!"
90100030-51 = "...Ah. Isso é a língua de uma vaca, né?#nComer língua de boi significa que a vaca e a língua..."
90100030-52 = "Não diga coisas que tirem o apetite!!"
90100030-57 = "[ns9] \"A Yukino não está comendo muito...\"\n[ns10] \"Será que você prefere miúdos?\""
90100030-60 = "Não, eu não gosto muito de órgãos internos..."
90100030-61 = "Como eu disse antes, não é sobre a carne."
90100030-65 = "Nesta operação, pretendíamos definir os objetivos apenas entre nós, para não sobrecarregar o Professor o máximo possível."
90100030-66 = "Mas ouvi da Presidente do Conselho Estudantil que o Professor deseja assumir o comando direto."
90100030-67 = "[s11] \"Já que emprestei meu nome, preciso assumir a responsabilidade que vem com ele.\"\n[s12] \"Pode ser um incômodo, mas espero que me deixe dar pitacos assim.\""
90100030-70 = "Dar pitacos, é..."
90100030-71 = "Você diz isso, mas esta operação é um \"ato de expiação\" para nós.#nO Professor não entende isso?"
90100030-72 = "No fim das contas, os \"pitacos\" do Professor nada mais são do que assumir parte da nossa expiação."
90100030-76 = "...Professor."
90100030-77 = "Por que faz tanto por nós?"
90100030-78 = "Se fosse apenas nos estender a mão, tudo bem, mas tamanha bondade que não merecemos..."
90100030-79 = "Para ser sincera, a confusão supera a gratidão. Sinto até medo."
90100030-80 = "[s] \"Não precisa se preocupar. É só uma refeição.\""
90100030-85 = "[ns] \"...Ah, está preocupada que a carne possa estar envenenada?\""
90100030-86 = "Veneno? O que quer dizer com..."
90100030-90 = "Cof, cof!"
90100030-91 = "Coma mais devagar."
90100030-92 = "Tome, beba um pouco de água... francamente, como você consegue engasgar comendo?"
90100030-93 = "N-não é... não é nada disso...!"
90100030-94 = "Falando nisso, já tivemos uma conversa parecida antes, não é?"
90100030-95 = "...Não faço ideia do que está falando."
90100030-97 = "Com licença, vou trocar a grelha."
90100030-98 = "[s] \"Ah, e mais três porções de costela, por favor.\""
90100030-99 = "Três porções de costela, entendido!"
90100030-105 = "……Se fosse algo tão óbvio quanto um veneno, teria sido muito mais fácil de lidar."
90100030-106 = "Uma benevolência dada unilateralmente. Não há nada mais assustador do que isso."
90100030-107 = "O Sensei nos puxou de um abismo sem fim. #nGraças a isso, não cometemos erros irreparáveis, #ne as vidas das nossas veteranas e as nossas foram salvas."
90100030-108 = "Embora já tenhamos uma dívida de gratidão que não conseguiríamos pagar nem em uma vida inteira…… #no Sensei continua sendo gentil conosco."
90100030-109 = "Eu ainda não consigo medir…… o que exatamente o senhor espera de nós."
90100030-110 = "[s] \"Essa é uma pergunta nostálgica, não acha?\""
90100030-114 = "[ns14] \"Eu sou o Sensei, afinal.\" \n[ns15] \"Não faço isso esperando algo em troca.\""
90100030-117 = "……Eu não consigo entender."
90100030-118 = "Servir um churrasco luxuoso é parte do trabalho do Sensei?"
90100030-119 = "[s16] \"Com certeza.\" \n[s17] \"Pode-se dizer que é dever de um adulto garantir que as crianças estejam bem alimentadas.\""
90100030-124 = "[ns18] \"Se comerem bem, terão energia.\" \n[ns19] \"Se comerem bem, poderão crescer.\" \n[ns20] \"……Porque só comendo bem é que se pode tornar um adulto.\""
90100030-128 = "……."
90100030-129 = "Não nego o ponto de que é preciso comer bem."
90100030-130 = "Afinal, existe aquele ditado: 'Um exército marcha sobre o estômago'."
90100030-134 = "[ns] \"Oh, a costela está no ponto.\""
90100030-136 = "……É uma boa carne."
90100030-137 = "Espera aí! Só isso de comentário!?"
90100030-138 = "……Eu disse algo estranho?"
90100030-139 = "Não tem cheiro forte e não está dura. #nPor isso eu disse que é uma boa carne, mas……"
90100030-140 = "Não acredito que você resumiu uma costela marmorizada de primeira qualidade como 'não tem cheiro forte'!"
90100030-141 = "Que atrocidade! Que paladar desesperador você tem!"
90100030-142 = "Sensei, não dê carne cara para a Yukino! #nEla provavelmente diria a mesma coisa sobre uma carne de 100 ienes os 100 gramas!"
90100030-143 = "Kurumi, acho que isso já é exagero……"
90100030-144 = "Como ela comia ração de combate todos os dias sem reclamar, achei que ela fosse apenas resistente…… #nmas ela é só uma sem paladar……"
90100030-145 = "Espere. Por mais que eu não tenha interesse em comida, não posso deixar isso passar."
90100030-146 = "Você pode não saber, mas as conservas de frutos do mar fornecidas pela SRT ficam com o sabor do peixe mais apurado com o tempo. Por isso, mesmo vencidas, elas ficam deliciosas――"
90100030-147 = "Jogue fora o que estiver vencido!"
90100030-148 = "Não tem jeito. Sendo assim, só me resta delegar o poder de decisão à sub-líder, que ainda tem um paladar normal."
90100030-149 = "Niko! O próximo pedido está nas suas mãos!"
90100030-150 = "Hmm. Eu também não tenho um paladar tão refinado assim, mas……"
90100030-154 = "Então, que tal a sopa de missô com tofu frito que está na recomendação――"
90100030-155 = "Nada de sopa! Vamos acabar ficando cheias demais!"
90100030-157 = "(Depois disso, continuei a ter um jantar animado com o pessoal do Esquadrão FOX)"
90100030-159 = "Próximo episódio: A Nova Base"
