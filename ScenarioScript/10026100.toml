[translation]
10026100-1 = "Episódio 10: Mudança de perspectiva"
10026100-2 = "Entendo... então foi assim."
10026100-3 = "Dois novos locais. #n...Uma base secreta e um depósito, é?"
10026100-4 = "A conclusão é que, o que inicialmente era usado como campo de treinamento, foi fechado porque alguns alunos o usavam para brincar escondidos, é isso?"
10026100-5 = "...É um pouco surpreendente. Até os veteranos de eras passadas perdiam o controle de vez em quando."
10026100-6 = "De fato, é difícil para qualquer um resistir sempre às tentações..."
10026100-7 = "Entendi quase tudo. Embora ainda haja espaço para considerar como tratar a ilha daqui para frente... agradeço pela sua cooperação."
10026100-8 = "Dito isso, terminar a investigação tão rápido... #nÉ isso que chamam de o mago da biblioteca antiga, pelo que ouvi dizer."
10026100-9 = "...Sobre isso."
10026100-10 = "Como devo dizer..."
10026100-11 = "Sei que não deveria nutrir tais sentimentos, mas..."
10026100-12 = "Algo que nós não conseguimos descobrir mesmo indo lá várias vezes para investigar, vocês resolveram tão facilmente..."
10026100-16 = "...É um resultado feliz, mas sentir frustração... acho que ainda me falta muito treinamento como irmã."
10026100-17 = "Como prometido... deixaremos o assunto da cópia para lá."
10026100-18 = "Fufu. Obrigada, Sakurako-san."
10026100-19 = "............"
10026100-20 = "...Hanako-san. #nIsso não é como Sisterhood, mas uma pergunta pessoal minha..."
10026100-21 = "Sinto que toda essa série de eventos estava na palma da sua mão."
10026100-22 = "Claro, não é em um sentido ruim. #nAcho que foi por boa vontade... e é algo bom, mas..."
10026100-23 = "Será que a Hanako-san já sabia a verdade sobre as ruínas desde o início...?"
10026100-24 = "Qual seria o motivo para querer ajudar tanto a Ui-san...?"
10026100-25 = "Ora... parece que até eu ando um pouco descuidada ultimamente."
10026100-26 = "Motivo, motivo é...? Como devo dizer."
10026100-27 = "Bem... você poderia se contentar com um capricho meu? #nNa verdade, não é um motivo tão grandioso quanto a Sakurako-san está pensando."
10026100-28 = "Um capricho, é...?"
10026100-29 = "...Entendo. Se a Hanako-san diz isso, não perguntarei mais nada."
10026100-30 = "Então, só para garantir, o conteúdo escrito neste relatório está correto e completo?"
10026100-31 = "...O que isso significa?"
10026100-32 = "Por acaso está suspeitando que estamos escondendo algo..."
10026100-33 = "N-não! #nComo eu poderia suspeitar de algo assim...!?"
10026100-34 = "Peço desculpas se a ofendi... é quase um vício de linguagem meu."
10026100-35 = "...É uma pena que o mapa tenha se perdido, mas..."
10026100-36 = "...Pois é."
10026100-37 = "Desculpe, se eu tivesse sido um pouco mais cuidadosa..."
10026100-38 = "Não, você não poderia imaginar que acabaria em combate."
10026100-39 = "Além disso, graças a todos vocês, a investigação das ruínas foi concluída."
10026100-40 = "Na verdade, só tenho a agradecer, já que vocês criaram um novo mapa com as informações reveladas nesta investigação."
10026100-41 = "Espero sinceramente que, um dia, como Sisterhood, possamos retribuir esse favor."
10026100-42 = "Então, por hoje, com licença."
10026100-46 = "...Fufu."
10026100-47 = "Então, vamos voltar também? Sensei?"
10026100-51 = "[ns1] \"Isso foi o certo, né?\"\n[ns2] \"Pelo menos, poderíamos ter contado a verdade para a Sakurako...\""
10026100-54 = "Fufufu, não tem mais volta, sabe? #nNão decidimos todos juntos...? Nós somos \"cúmplices\"♪"
10026100-55 = "Tanto o que colocamos \"lá\", quanto o que enterramos de volta."
10026100-56 = "Aliás... a Ui-san é uma pessoa ousada e adorável, ao contrário do que parece♡"
10026100-57 = "Antes, o Sensei me perguntou... o que eu achava da Ui-san, não foi?"
10026100-58 = "Depois de passar esse tempo juntas, pensei em responder novamente—"
10026100-59 = "—Parece que vamos nos dar muito bem."
10026100-60 = "A ponto de eu querer passear pela academia de biquíni com ela da próxima vez♡"
10026100-61 = "[s3] \"Ui, será que ela está bem...\"\n[s4] \"Não a deixe tão confusa.\""
10026100-62 = "Ufufu, o que será que isso significa?"
10026100-63 = "Fufu... bem, quem sabe?♪"
10026100-64 = "Ah, Hanako-san...?"
10026100-65 = "...?"
10026100-66 = "Ora, Mari-chan?"
10026100-71 = "Faz tempo. Como você tem passado?"
10026100-72 = "Ah, Sensei também... olá. #nJá que vocês dois estão juntos, imagino que vieram a trabalho."
10026100-73 = "Hmm... bem, acho que pode ser considerado trabalho, sim."
10026100-74 = "Entendo, parece que há circunstâncias complexas envolvidas..."
10026100-75 = "...Fufu."
10026100-76 = "Da próxima vez virei a passeio, então não se preocupe."
10026100-81 = "Por exemplo, para nos divertirmos bastante com a Mari-chan...♡"
10026100-82 = "...!?"
10026100-83 = "Hanako-san...!? E-eu não disse isso com essa intenção..."
10026100-84 = "Ora... que pena. Então você não quer se divertir comigo... #nFiquei empolgada sozinha..."
10026100-85 = "Não! É um mal-entendido, Hanako-san! Por favor, venha sim. #nEstarei esperando por vocês a qualquer momento... claro, pelo Sensei também."
10026100-86 = "É-é a minha intenção sincera...!"
10026100-87 = "...Fufu."
10026100-88 = "Eu só estava brincando um pouco, sei como você se sente, Mari-chan. #nMas hoje tenho outros compromissos, então voltarei em outro dia."
10026100-89 = "Ah. S-sim!"
10026100-90 = "...V-vá com cuidado!"
10026100-95 = "[ns] \"A Mari ficou muito feliz, não ficou?\""
10026100-96 = "Fufu, é verdade."
10026100-97 = "Para ser sincera, sinto um pouco de culpa por envolver a Mari-chan comigo... mas ao ver aquele sorriso, sinto-me genuinamente feliz."
10026100-98 = "Fufu... deve ser porque o Sensei estava lá. Em vários sentidos."
10026100-99 = "Por isso..."
10026100-100 = "Se a Mari-chan acabar chorando, a culpa será toda do Sensei, certo?"
10026100-101 = "[s5] \"Isso não tem nada a ver, né!?\"\n[s6] \"Não pode deixar a Mari passear de roupa de banho!?\""
10026100-104 = "Fufu... vamos indo?"
10026100-105 = "Ainda temos várias coisas para fazer hoje."
10026100-111 = "Cheguei, Ui-san."
10026100-112 = "Como assim 'cheguei'... aqui não é a casa da Hanako-san."
10026100-113 = "E como se não bastasse, já tem outra pessoa descuidada por aqui..."
10026100-117 = "Hinata-san...! Cuidado!!"
10026100-118 = "A estante vai cair...! #nO que você pretende fazer se essas crianças se machucarem!?"
10026100-122 = "E-e além disso, a Hinata-san também..."
10026100-124 = "Ahaha... desculpe. #nTem muita coisa no chão... e quando tento desviar..."
10026100-125 = "Mas não se preocupe! #nTenho confiança na minha força e sou bem resistente!"
10026100-126 = "Não, não é esse o problema..."
10026100-127 = "Por que a Ui-san ficou sozinha na biblioteca antiga até agora... estou muito preocupada..."
10026100-128 = "Hmm... com essa quantidade de livros, organizar é difícil, que tal pedir ajuda?"
10026100-129 = "De jeito nenhum! Nem pensar!!!"
10026100-130 = "É óbvio que não pode! Trazer pessoas de fora aqui!? #nMesmo sendo o meu refúgio que conquistei com tanto esforço...!"
10026100-131 = "U-uuh... já estou no meu limite com a situação atual...!"
10026100-132 = "Ai, meu Deus! Por que quatro pessoas!? Isso aqui é uma biblioteca!? Barulhentos demais!"
10026100-133 = "Ah... por que isso foi acontecer!"
10026100-134 = "[s7] \"Mas só tem quatro pessoas aqui...\"\n[s8] \"Por favor, faça silêncio na biblioteca...\""
10026100-137 = "Ahaha... quando você faz essa cara de desgosto, acabo me sentindo culpada. Não se preocupe. Assim que terminarmos de conversar, nós vamos embora."
10026100-138 = "Acabei de entregar o relatório de investigação para a Sakurako-san. #nParece que ela vai fazer vista grossa sobre o caso da Ui-san ter copiado as escrituras."
10026100-139 = "...!? Ela não disse nada? #nAquela Sisterhood cheia de rumores suspeitos...?"
10026100-140 = "Ah... então você conseguiu disfarçar bem...#nAh, muito obrigada. Hanako-san... e você também, Sensei..."
10026100-141 = "E-então... bem... sobre o mapa e a cápsula do tempo..."
10026100-142 = "Eu pedi desculpas sobre o mapa, mas... nem cheguei a mencionar a cápsula do tempo. Não acho que a Sisterhood vá se interessar ou chegar à verdade de qualquer forma."
10026100-143 = "Na verdade, fiquei um pouco surpresa. De todas as pessoas, você, Ui-san..."
10026100-144 = "Sugerir colocar o mapa na cápsula do tempo e enterrá-la de volta no lugar original."
10026100-145 = "Tem certeza de que foi a decisão certa? Aquela cápsula do tempo é uma descoberta valiosa.#nEu pensei que, sendo você, Ui-san, você a levaria para estudar..."
10026100-146 = "Aquele ato... não poderia ser considerado uma espécie de profanação?"
10026100-148 = "...Sim?"
10026100-149 = "P-por que você pensaria algo assim...?"
10026100-150 = "Haa... ter que explicar tudo...#nÉ por isso que as pessoas de fora..."
10026100-151 = "Ah, bem... desculpe. Preciso parar de falar desse jeito..."
10026100-152 = "Uuu... ainda não me acostumei."
10026100-153 = "...Bem, na verdade, eu sou uma bibliotecária... não uma arqueóloga."
10026100-154 = "Eu quero respeitar a vontade dessas crianças, não registrar a história para deixá-la para a posteridade."
10026100-155 = "Além disso... relíquias não existem apenas para transmitir a história às gerações futuras."
10026100-156 = "Embora existam coisas deixadas com esse propósito... também deve haver um sentimento puro de querer deixar suas próprias pegadas naquele lugar como uma lembrança."
10026100-157 = "Depois que aquele campo de treinamento foi fechado, as pessoas que enterraram a cápsula do tempo provavelmente nunca mais voltaram."
10026100-158 = "Mesmo que tentassem levá-la para fora, seriam questionadas sobre o que estavam fazendo durante o treinamento e ela seria confiscada. Sendo assim..."
10026100-160 = "Mesmo que ninguém nunca a visse, elas queriam deixar suas memórias preciosas em forma física."
10026100-161 = "...Acho que essa era a missão e o dever daquela criança."
10026100-163 = "Desenterrá-la propositalmente para guardá-la em um depósito ou exibi-la em um museu é...#n...um desrespeito com ela."
10026100-164 = "............"
10026100-165 = "Claro, como equipe de investigação, tínhamos o dever de relatar o que descobrimos lá, mas..."
10026100-166 = "Pelo menos, a cápsula do tempo...#nÉ um capricho meu querer que, pelo menos ela, cumpra seu papel até o fim."
10026100-167 = "Mas... pensei que talvez ela se sentisse solitária se continuasse sozinha para sempre..."
10026100-168 = "[s9] \"...O pergaminho dura bastante, afinal.\"\n[s10] \"De agora em diante, ela estará com alguém da mesma época.\""
10026100-171 = "É isso. As duas nasceram na mesma época e passaram o mesmo tempo juntas."
10026100-172 = "Na verdade, para mim..."
10026100-178 = "Fiquei surpresa que Hinata-san concordou com a minha proposta."
10026100-179 = "...Eh? Eu?"
10026100-180 = "Bem... Hinata-san é uma irmã, mas eu fiz você mentir...#nVocê está realmente bem com isso?"
10026100-181 = "Ahaha... então você estava preocupada com isso."
10026100-182 = "...Mas está tudo bem.#nNão fui levada por vocês, afinal."
10026100-183 = "É mesmo...?"
10026100-184 = "Sim. Basicamente, dizem que mentir não é bom, mas..."
10026100-185 = "Se você consultar seu coração e não for algo vergonhoso, é perdoado."
10026100-186 = "Sakurako-sama sempre diz isso também.#nMuitas das escrituras e preceitos que seguimos diariamente..."
10026100-187 = "Todos servem de apoio quando estamos em dúvida, mas são apenas um guia."
10026100-188 = "O importante é o coração. É importante estar sempre em sintonia consigo mesma..."
10026100-189 = "...Eu também me senti da mesma forma que você, Ui-san.#nEu apenas segui meu coração, então não precisa se preocupar."
10026100-190 = "Ah, bem... é-é mesmo...?"
10026100-191 = "[s11] \"Como esperado da Sisterhood.\"\n[s12] \"Então não há problema algum.\""
10026100-194 = "S-sim... então fico aliviada."
10026100-195 = "Fico feliz que você tenha entendido!#nAgora, o mal-entendido da Ui-san sobre a Sisterhood..."
10026100-197 = "Uma coisa é uma coisa, outra coisa é outra coisa."
10026100-198 = "Hinata-san é pura, por isso não contaram nada a ela."
10026100-199 = "Com certeza, deve ser isso. Existe uma conspiração gigantesca na Sisterhood...!"
10026100-200 = "O fato de Hinata-san estar aqui agora provavelmente é para extrair informações mais tarde..."
10026100-201 = "Eh? Eu só vim porque me disseram que organizar livros antigos seria difícil para a Ui-san sozinha, então me pediram para ajudar."
10026100-202 = "Por isso mesmo! Eles pensaram que, dizendo isso, poderiam usar a pura Hinata-san..."
10026100-203 = "……Desculpe. #nMesmo dizendo isso para a Hinata, não passa de descontar minha frustração nela."
10026100-204 = "Ahaha... Eu não penso dessa forma."
10026100-206 = "De qualquer forma, já transmiti o que precisava ser dito..."
10026100-207 = "Não quero incomodar ficando muito tempo, então já vou indo..."
10026100-208 = "……！"
10026100-209 = "A-ah, espere..."
10026100-210 = "Por favor, espere um pouco, bem..."
10026100-211 = "Aconteceu alguma coisa?"
10026100-212 = "……Ora. Não me diga que, na verdade, você está se sentindo solitária?"
10026100-213 = "S-solitária? Não é nada disso... N-não se engane."
10026100-214 = "Mas... é que... eu queria dar isso a vocês..."
10026100-218 = "[ns13] \"……Um café americano?\"\n[ns14] \"Posso aceitar mesmo...?\""
10026100-223 = "É que... eu causei problemas por minha causa..."
10026100-224 = "Não é nada demais, mas se puderem aceitar... #nassim eu poderei, pelo menos, agradecer."
10026100-225 = "Obrigada... Só isso."
10026100-231 = "[ns15] \"Obrigado, vou aceitar.\"\n[ns16] \"Você também se esforçou, Ui.\""
10026100-234 = "P-por que está sorrindo desse jeito! #nJá que aceitaram, vão embora logo!"
10026100-236 = "Rápido! Todos saiam! Todos vocês!!!"
10026100-237 = "Tudo bem~"
10026100-238 = "Vamos nos ver de novo, Ui♪"
10026100-239 = "[ns] \"Você deve estar cansada, Ui, então descanse bastante.\""
10026100-242 = "……Haa."
10026100-243 = "Será que eles me entenderam mal...? Por que as pessoas continuam vindo assim..."
10026100-247 = "Ah, droga... O rosto de todos aparece na minha mente... Que incômodo. #nMesmo que isso só aumente as complicações..."
10026100-250 = "……………………。"
10026100-251 = "Se-Sensei...? Você me chamou de repente... o-o que houve?"
10026100-252 = "E ainda por cima, me fazer trazer o traje de banho que eu usava na ilha deserta..."
10026100-255 = "O-o que é isso...!?"
10026100-256 = "Diga alguma coisa, Sensei! #nSe ficar em silêncio, é pena de morte! Pena de morte!!"
10026100-257 = "N-não me diga que é isso...? #nComo eu poderia pensar em outra coisa!? #nNão consigo pensar em nada além disso!!"
10026100-258 = "[s17] \"Acho que a Koharu também vai ficar feliz.\"\n[s18] \"Está tudo bem, não se preocupe.\""
10026100-261 = "Hya...!?"
10026100-262 = "V-você finalmente revelou sua verdadeira natureza, não é!? #nMas... não importa o que aconteça, em um lugar como este...!!"
10026100-263 = "Ah, Sensei! Koharu-chan, por aqui!"
10026100-264 = "……？"
10026100-265 = "Ué, essa voz é..."
10026100-269 = "Parece que chegamos a tempo. #nFiquei preocupada se vocês tinham sofrido uma emboscada, mas fico feliz que estejam bem."
10026100-270 = "Azusa-chan... normalmente não se sofre emboscadas em uma piscina."
10026100-271 = "Fufu, estávamos esperando por vocês."
10026100-272 = "Vamos criar muitas memórias de verão juntos."
10026100-273 = "Reservamos a piscina para o Clube de Estudos Suplementares o dia todo hoje... #nObrigada, Sensei♡"
10026100-277 = "……Eh?"
10026100-278 = "O que isso significa...?"
10026100-279 = "……Se-Sensei?"
10026100-280 = "[s19] \"É a primeira vez que nadamos todos juntos, né?\"\n[s20] \"……Será que eles gostaram?\""
10026100-283 = "……Ah, bem..."
10026100-284 = "Sim."
10026100-285 = "……Ehehe."
10026100-287 = "……O-obrigada."
10026100-288 = "Em busca do legado escondido ~Atividades extracurriculares de Trinity~"
