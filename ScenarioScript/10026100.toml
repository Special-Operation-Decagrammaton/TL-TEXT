[translation]
10026100-1 = "第10話;心境の変化"
10026100-2 = "なるほど……そうでしたか。"
10026100-3 = "新たな場所を、二つも。#n……秘密基地と保管庫ですか。"
10026100-4 = "初めは訓練場として使われていたところ、目を盗み遊ぶ生徒が居たことで、閉鎖されたと考えられる……というのが結論ですか。"
10026100-5 = "……少し、意外ですね。遠い時代の先輩方も、時々羽目を外していた、と。"
10026100-6 = "たしかに、誰であろうと常に誘惑を断ち切るのは難しいですからね……。"
10026100-7 = "概ね理解しました。今後、島をどのように扱うべきかは検討の余地がありそうですが……ご協力ありがとうございます。"
10026100-8 = "とはいえ、こんなにも早く調査が終わるとは……。#nこれが噂に聞く、古書館の魔術師なのですね。"
10026100-9 = "……その。"
10026100-10 = "なんと言いましょうか。"
10026100-11 = "こんな気持ちを抱いてはならないと、分かってはおりますが……"
10026100-12 = "私たちが度々調査で足を運んでも判明しなかったものを、こうも[ruby=たやす]容易[/ruby]く……"
10026100-16 = "……喜ばしい出来事なのに、悔しさを感じてしまうとは、まだまだシスターとしての修行が足りていないのでしょうね。"
10026100-17 = "お約束通り……複写の件は、水に流します。"
10026100-18 = "ふふ。ありがとうございます、サクラコさん。"
10026100-19 = "…………。"
10026100-20 = "……ハナコさん。#nこれはシスターフッドとしてではなく、私の個人的な質問なのですが……"
10026100-21 = "一連の出来事は、ハナコさんの手の平にあったように感じます。"
10026100-22 = "もちろん、悪い意味ではありません。#n善意だとは思いますし……良いことではあるのですが……"
10026100-23 = "ハナコさんは、遺跡の真相も初めから知っていたのではないか……と。"
10026100-24 = "ここまでウイさんを手助けしようと思った理由とは、いったい何でしょうか……？"
10026100-25 = "あら……私も最近、詰めが甘くなってしまったようですね。"
10026100-26 = "理由、理由ですか……なんと言えばよいのでしょう。"
10026100-27 = "そうですね……私の気まぐれ、ということで納得していただけませんか？#n実際、サクラコさんが考えているほど大層な理由ではないのです。"
10026100-28 = "気まぐれ、ですか……。"
10026100-29 = "……なるほど。ハナコさんがそう仰るのなら、これ以上はお聞きしません。"
10026100-30 = "では、念のため確認しておきたいのですが、この報告書に記された内容が全てで間違いないでしょうか？"
10026100-31 = "……どういう意味でしょう？"
10026100-32 = "もしかして、私たちが隠し事をしているのではないか、と疑って……"
10026100-33 = "い、いえ！#nまさか疑うだなんて、そのようなことは……！？"
10026100-34 = "気を悪くされてしまったのなら、申し訳ありません……私の口癖のようなものでして。"
10026100-35 = "……地図が無くなってしまったのは、少々残念ではありますが……"
10026100-36 = "……そうですね。"
10026100-37 = "ごめんなさい、もう少し私が気を配っていれば……"
10026100-38 = "いえ、まさか戦闘になるとは思わなかったでしょうから。"
10026100-39 = "それに皆様のおかげで、遺跡の調査は済んだわけですし。"
10026100-40 = "むしろ、今回の調査で明らかになった情報も加えて、新たな地図を起こしてくださったのですから、感謝しかありません。"
10026100-41 = "いつかシスターフッドとして、この恩をお返しできるよう心から願っております。"
10026100-42 = "それでは、本日は失礼いたします。"
10026100-46 = "……ふふっ。"
10026100-47 = "では、私たちも帰りましょうか。先生？"
10026100-51 = "[ns1] \"これで良かったんだよね？\"\n[ns2] \"せめて、サクラコには事情を話しても……。\""
10026100-54 = "ふふふ、もう引き返せませんよ？#nみんなで決めたじゃないですか……私たちは「共犯」ですから♪"
10026100-55 = "「アソコ」に入れたのも、「アレ」を埋め直したのも全て。"
10026100-56 = "ところで……ウイさんは、見かけによらず大胆で可愛らしい方ですね♡"
10026100-57 = "前に先生から……ウイさんをどう思っているのか聞かれましたよね？"
10026100-58 = "こうして一緒に過ごしてみて、あらためてお返事しようかと思いまして――"
10026100-59 = "――どうやら、仲良くなれそうです。"
10026100-60 = "今度一緒に、水着で学園を散歩したいなと思うくらいに♡"
10026100-61 = "[s3] \"ウイ、大丈夫かな……。\"\n[s4] \"あまり困らせないであげてね。\""
10026100-62 = "うふふ、どういう意味でしょう？"
10026100-63 = "ふふ……さあ、どうでしょうね♪"
10026100-64 = "あ、ハナコさん……？"
10026100-65 = "……？"
10026100-66 = "あら、マリーちゃん？"
10026100-71 = "お久しぶりです。いかがお過ごしですか？"
10026100-72 = "あ、先生も……こんにちは。#nお二人が一緒ということは、お仕事で来られたのですね。"
10026100-73 = "うーん……まあ、一応お仕事になりますかね。"
10026100-74 = "なるほど、複雑な事情がお有りようで……"
10026100-75 = "……ふふっ。"
10026100-76 = "今度はプライベートで来るので、安心してください。"
10026100-81 = "たとえば、マリーちゃんと「仲良く」したり……♡"
10026100-82 = "……！？"
10026100-83 = "ハナコさん……！？わ、私はそういうつもりで言ったわけでは……。"
10026100-84 = "あら……残念です。私とは仲良くしていただけないのですね……。#n一人で盛り上がってしまい……"
10026100-85 = "いえ！違います、ハナコさん！ぜひお越しください。#nいつでもお待ちしておりますから……もちろん、先生もです。"
10026100-86 = "ほ、本心ですので……！"
10026100-87 = "……ふふっ。"
10026100-88 = "ちょっとからかっただけですから、マリーちゃんの気持ちは分かっていますよ。#nでも今日は次の用事があるので、また別の日に来ますね。"
10026100-89 = "あっ。は、はい！"
10026100-90 = "……い、いってらっしゃいませ！"
10026100-95 = "[ns] \"マリー、とっても喜んでたね。\""
10026100-96 = "ふふっ、そうですね。"
10026100-97 = "正直なところ、マリーちゃんを私なんかに付き合わせるのは、申し訳ない気持ちもありますが……あんな笑顔を見せられると、純粋に嬉しく思います。"
10026100-98 = "ふふ……先生がいたから、なのでしょうね。色々な意味で。"
10026100-99 = "ですので……"
10026100-100 = "もしマリーちゃんが泣いてしまった時も、ぜ～んぶ先生のせいですよね？"
10026100-101 = "[s5] \"それは関係ないよね！？\"\n[s6] \"マリーに水着で散歩させちゃダメだよ！？\""
10026100-104 = "ふふ……そろそろ行きましょうか？"
10026100-105 = "今日は色々と用事がありますからね。"
10026100-111 = "ただいまです、ウイさん。"
10026100-112 = "ただいまって……ここはハナコさんの家じゃありませんよ。"
10026100-113 = "それでなくても、危なっかしい方がもう一人いるのに……"
10026100-117 = "ヒナタさん……！気をつけてください！！"
10026100-118 = "本棚が倒れちゃうじゃないですか……！#nその子たちが怪我したら、どうするつもりですか！？"
10026100-122 = "そ、それに、ヒナタさんも……"
10026100-124 = "あはは……すみません。#n床に物が多くて……避けながら歩くと……"
10026100-125 = "ですが、大丈夫です！#n力には自信がありますし、頑丈ですから！"
10026100-126 = "いや、だから、そういう問題では……"
10026100-127 = "どうしてウイさんは、今まで一人で古書館に……とても心配なのですが……"
10026100-128 = "うーん……これだけ数があると整理も大変ですし、人手を借りてはどうでしょう？"
10026100-129 = "絶対！ダメ！！！"
10026100-130 = "ダメに決まってるじゃないですか！外の方を入れるなんて！？#nここまで苦労して手に入れた安息の地だというのに……！"
10026100-131 = "う、うぅっ……すでに現状で、限界だというのに……！"
10026100-132 = "もう、本当に！どうして4人も！？ここは図書館なのに！？うるさすぎる！"
10026100-133 = "あぁ……どうしてこんなことに！"
10026100-134 = "[s7] \"4人しか居ないけど……？\"\n[s8] \"図書館では静かにしてください……。\""
10026100-137 = "あはは……そんなに嫌そうな顔をされると、さすがに申し訳なくなってきますね。大丈夫ですよ。お話が終われば、私たちは帰りますから。"
10026100-138 = "先ほど、サクラコさんに調査報告書を提出しました。#nウイさんが経典を複製した件は、目をつぶっていただけるそうですよ。"
10026100-139 = "……！？何も言われなかったのですか？#nあの怪しい噂の多いシスターフッドが……？"
10026100-140 = "あ……そこは上手く誤魔化したのですね……。#nあ、ありがとうございます。ハナコさん……それに、先生も……。"
10026100-141 = "で、では……えっと……地図とタイムカプセルのことは……"
10026100-142 = "地図に関しては謝っておきましたが……タイムカプセルの話は持ち出してすらいません。シスターフッドが興味を持つとも、真相にたどり着くとも思えませんからね。"
10026100-143 = "実は、少し意外に思ったのです。他の誰でもなく、ウイさんが……"
10026100-144 = "タイムカプセルに地図を入れて、元の場所に埋め直そうと言い出すとは。"
10026100-145 = "本当に良かったのですか？あのタイムカプセルは貴重な発見ですよね。#nウイさんなら、持ち帰って研究するものだと思いましたが……"
10026100-146 = "あの行いは……ある種、冒涜とも言えるのではないですか？"
10026100-148 = "……はい？"
10026100-149 = "ど、どうして、そのような考えに……？"
10026100-150 = "はあ……全て説明しなければならないなんて。#nこれだから、外の……"
10026100-151 = "あ、えっと……すみません。こういった言い方は改めなくては……。"
10026100-152 = "うぅ……まだ慣れませんね。"
10026100-153 = "……その、実際のところ、私は司書であって……考古学者ではありません。"
10026100-154 = "この子たちの意志を尊重したいのであって、歴史を記録し、伝え残したいわけではないんです。"
10026100-155 = "そもそも……遺物というものは、歴史を後世に伝えるためだけの存在とは限りません。"
10026100-156 = "そういった意志のもと残された物もありますが……思い出として、その地に自分たちの足跡を残したいという、純粋な気持ちもあるはずです。"
10026100-157 = "あの訓練場が閉鎖されてから、タイムカプセルを埋めた方たちが戻ることは、ついに無かったのでしょう。"
10026100-158 = "仮に外へ持ち出そうにも、訓練中に何をしていたのだと持ち物検査で問いただされ、押収されてしまうでしょう。それなら……"
10026100-160 = "たとえ誰の目にも触れなかったとしても、大切な思い出を形として残したかった。"
10026100-161 = "……それが、あの子の使命であり、責務だったのだと思います。"
10026100-163 = "それをわざわざ掘り起こして、保管庫に収めたり、博物館に展示するのは……#nあの子を軽んじる行いです。"
10026100-164 = "…………。"
10026100-165 = "もちろん、私たちは調査チームとして、そこで発見した内容を報告する義務はありましたが……"
10026100-166 = "せめて、タイムカプセルくらいは。#nあの子だけでも、最後まで役目を果たしてほしいという、私のわがままです。"
10026100-167 = "ですが……あの子だって、これからもずっと一人で過ごすのは、寂しいのではないかな、と思い……"
10026100-168 = "[s9] \"……羊皮紙は長持ちするからね。\"\n[s10] \"これからは同じ時代の仲間と一緒だね。\""
10026100-171 = "そういうことです。#n二人とも、同じ時代に生まれ、同じ時間を過ごしてきた子たちですから。"
10026100-172 = "むしろ、私としては……"
10026100-178 = "ヒナタさんが、私の提案に同意してくださって、驚きました。"
10026100-179 = "……え？私、ですか？"
10026100-180 = "その……ヒナタさんはシスターなのに、嘘をつかせてしまったので……#n本当に、大丈夫だったのですか？"
10026100-181 = "あはは……気にされていたんですね。"
10026100-182 = "……ですが、大丈夫ですよ。#nみなさんに流されたわけではありませんので。"
10026100-183 = "そう、なんですか……？"
10026100-184 = "はい。基本的に、嘘は良くないとされていますが……"
10026100-185 = "自分の心に聞いてみて、恥ずべきものでなければ[ruby=ゆる]赦[/ruby]されるとされています。"
10026100-186 = "サクラコ様も、いつも仰っていますから。#n私たちが日頃から触れている経典や戒律の多くは……"
10026100-187 = "いずれも選択に迷った時の支えになりますが、それは道しるべに過ぎません。"
10026100-188 = "大切なのは、心。常に自分自身と向き合うのが大切なのだと……。"
10026100-189 = "……私も、ウイさんと同じ気持ちでした。#n自分の心に従っただけですので、心配は要りませんよ。"
10026100-190 = "あ、えっと……そ、そうでしたか……。"
10026100-191 = "[s11] \"さすが、シスターフッド。\"\n[s12] \"それなら何も問題ないね。\""
10026100-194 = "は、はい……それなら、安心しました。"
10026100-195 = "分かっていただけて良かったです！#nこれでウイさんのシスターフッドに対する誤解も……"
10026100-197 = "それとこれとは別です。"
10026100-198 = "ヒナタさんは純粋だから、知らされていないんです。"
10026100-199 = "きっと、そうに違いありません。シスターフッドには、巨大な陰謀が……！"
10026100-200 = "今こうしてヒナタさんが居るのも、おそらく後で情報を聞き出すため……"
10026100-201 = "えっ？ただ私は、ウイさん一人では古書の整理が大変でしょうから、手伝うように言われまして。"
10026100-202 = "ですから！そう言っておけば、純粋なヒナタさんを利用できると考え……"
10026100-203 = "……すみません。#nヒナタさんに言っても、ただの八つ当たりでしかありませんね。"
10026100-204 = "あはは……そんな風には思いませんよ。"
10026100-206 = "ひとまず、伝えるべき内容はお伝えしましたし……"
10026100-207 = "あまり長居しては気を使うでしょうから、そろそろ……"
10026100-208 = "……！"
10026100-209 = "あ、あの……"
10026100-210 = "ちょっと待ってください、えっと……"
10026100-211 = "どうかされました？"
10026100-212 = "……あら。まさか、本当は寂しいのですか？"
10026100-213 = "さ、寂しいとか、そういうのでは……か、勘違い、しないでください。"
10026100-214 = "ですが……その、みなさんにコレを……"
10026100-218 = "[ns13] \"……アイスアメリカーノ？\"\n[ns14] \"受け取ってもいいの……？\""
10026100-223 = "その……私のせいで、面倒をかけましたし……"
10026100-224 = "大したものではありませんが、受け取っていただけると……#n私も、お礼くらい言えますので。"
10026100-225 = "ありがとう、ございました……それだけです。"
10026100-231 = "[ns15] \"ありがとう、頂いてくよ。\"\n[ns16] \"ウイも頑張ったね。\""
10026100-234 = "な、なにニヤニヤしてるんですか！#n受け取ったら、さっさと出ていってください！"
10026100-236 = "早く！みんな出ていって！全員！！！"
10026100-237 = "は～い。"
10026100-238 = "またお会いしましょうね、ウイさん♪"
10026100-239 = "[ns] \"ウイも疲れたろうから、ゆっくり休んでね。\""
10026100-242 = "……はぁ。"
10026100-243 = "私のことを誤解してるんじゃ……どうしてこんな風にどんどん人が……"
10026100-247 = "ああもう……みなさんの顔が浮かんで……困ります。#n面倒事が増えるばかりなのに……"
10026100-250 = "……………………。"
10026100-251 = "せ、先生……？急に呼び出して……ど、どうしたの？"
10026100-252 = "それも、無人島で着てた水着を持ってこさせるなんて……"
10026100-255 = "な、何なの……！？"
10026100-256 = "何か言ってよ、先生！#n黙ってたら死刑なんだから！死刑！！"
10026100-257 = "ま、まさか、そういうこと……？#nどう考えてもそうよね！？#nそうとしか考えられないもん！！"
10026100-258 = "[s17] \"コハルにも喜んでもらえると思うよ。\"\n[s18] \"大丈夫、心配しないで。\""
10026100-261 = "ひゃっ……！？"
10026100-262 = "つ、ついに本性を現したわね！？#nけど……いくら何でも、こんな場所でなんて……！！"
10026100-263 = "あっ、先生！コハルちゃ～ん、こっちです！"
10026100-264 = "……？"
10026100-265 = "あれ、この声って……"
10026100-269 = "間に合ったみたいだ。#n待ち伏せにでも遭ったかと心配したけど、無事で安心した。"
10026100-270 = "アズサちゃん……普通はプールで待ち伏せなんてされませんよ。"
10026100-271 = "ふふ、お待ちしていました。"
10026100-272 = "みんなで目一杯、夏の思い出を作りましょう。"
10026100-273 = "今日一日、補習授業部の貸し切りにしていただきましたから……#nありがとうございます、先生♡"
10026100-277 = "……え？"
10026100-278 = "どういう、こと……？"
10026100-279 = "……せ、先生？"
10026100-280 = "[s19] \"みんなで泳ぐのは初めてだよね？\"\n[s20] \"……喜んでもらえたかな？\""
10026100-283 = "……あ、えっと……"
10026100-284 = "うん。"
10026100-285 = "……えへへっ。"
10026100-287 = "……あ、ありがと。"
10026100-288 = "隠されし遺産を求めて～トリニティの課外活動～"
