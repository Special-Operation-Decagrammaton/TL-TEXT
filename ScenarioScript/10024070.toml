[translation]
10024070-1 = "第7話;[ruby=かいばかべん]快馬加鞭[/ruby]"
10024070-2 = "山海経・外郭"
10024070-9 = "……。"
10024070-10 = "……。"
10024070-11 = "黄鶴は一度飛び去って。"
10024070-12 = "二度と帰らない。"
10024070-13 = "跡をつけられてはいないだろうな？"
10024070-14 = "ああ、もちろん。そちらこそ大丈夫だろうな？"
10024070-15 = "こちらも問題ない。怪しい動きは見られなかった。"
10024070-16 = "それで、わざわざ呼び出した理由を教えてくれないか？"
10024070-17 = "自分でも分かってるだろう。"
10024070-18 = "……何が言いたい。"
10024070-19 = "しらを切るつもりか？#n取引の基本は信用だということを忘れるとはな。"
10024070-20 = "こうして信用を損ねては、「[ruby=ごじん]五塵[/ruby]の[ruby=びこう]獼猴[/ruby]」が黙ってはいないだろうな。"
10024070-22 = "まさか……「五塵の獼猴」を裏切るつもりか？"
10024070-23 = "バカを言うな。誰がそんなこと考えるか。"
10024070-25 = "私たちの忠誠心を疑ってるのか。"
10024070-26 = "いや、それは知っている。だからこそ、疑問に思ってな。#nなぜか突然……"
10024070-28 = "ただの人参を送ってきただろう。"
10024070-29 = "何の話だ？#n私たちは人参どころか、何も手配してないが。"
10024070-31 = "それじゃあ、梅花園を通じて送られてきた、あの荷物は……"
10024070-32 = "待て、何かがおかしいぞ……？"
10024070-37 = "――聞くが良い。"
10024070-38 = "誰だ！"
10024070-39 = "天は見守り、地が言葉を受け止め――#nお前達自身を――この私が知っている。"
10024070-40 = "まさか……？"
10024070-41 = "英雄を夢見る必要などない。#nただ――自分に恥じぬ生き方をしたかっただけ。"
10024070-42 = "くそっ、逃げないと……！"
10024070-43 = "お前達は何のために謳い――何のためにその生を全うするのか？"
10024070-44 = "おいっ、どうした？"
10024070-45 = "ただ漫然と生きているだけでは足りないから――私たちは皆、#n何者かに成ろうと願うのだ！"
10024070-47 = "玄龍門の執行部長、[ruby=このえ]近衛[/ruby]ミナだ！動くな！"
10024070-48 = "玄龍門だと！？"
10024070-49 = "逃げようとしても無駄だよ。#n周辺にも人を手配してるからね。"
10024070-50 = "先に進みたければ――"
10024070-51 = "まずは、私たちに勝ってからにしてもらいましょうか。"
10024070-52 = "玄龍門と玄武商会が一緒にいるなんて……！#nそんな、馬鹿なことが……！？"
10024070-53 = "私としても、不本意だったがな。"
10024070-54 = "さあ、正体を明かせ！"
10024070-61 = "くっ……！"
10024070-63 = "待て、お前は……！？"
10024070-65 = "あの格好は……！"
10024070-66 = "ま、そんなことだろうと思ってたけどね。"
10024070-67 = "ココナちゃんには後で謝っておかないと。#n黙って巻き込んじゃったわけだし。"
10024070-68 = "そうですね。#n私たちもココナ教官を利用したことには違いありませんから。"
10024070-69 = "[s] \"シュンにも謝っておかないと……。\""
10024070-75 = "玄龍門の幹部ともあろう者が……"
10024070-76 = "何故こんなことを……？"
10024070-77 = "……。"
10024070-78 = "答えろ！何故だ！"
10024070-79 = "お前のせいだ、近衛ミナ。"
10024070-80 = "私、だと……？"
10024070-81 = "あぁ。前々から目障りだったんだ。"
10024070-82 = "どうにかしてお前を陥れようと思ったが、協力を集めるには金が必要でな。"
10024070-83 = "そんな時に、ちょうど「萬年参」を欲しがっている[ruby=・   ・   ・   ・]とある人[/ruby]の存在を知ったのさ。"
10024070-84 = "金払いは良かったし、悪い取引じゃなかった。#n玄武商会の犯行に偽装すれば、矛先が向かう目算もあったしな。"
10024070-85 = "……お前に何かした覚えはないが？"
10024070-86 = "玄龍門の執行部長でありながら、門主様直属の護衛も務めている……"
10024070-87 = "お前がどう思ってるかは知らないが、事実上の玄龍門ナンバー2に他ならない。"
10024070-89 = "だが……門主様を思う気持ちは、私の方が上に決まっている！"
10024070-90 = "ああ、お可愛い門主様……私の方が執行部長に[ruby=ふさわ]相応[/ruby]しいというのに！#n……分かったか、私以上に門主様を愛してる者などいるはずがない！！"
10024070-91 = "は……？"
10024070-96 = "何を言ってるんでしょう？"
10024070-97 = "キサキも罪つくりだねぇ……。"
10024070-99 = "そ、そんな理由で子ども達の善意を利用し、#n山海経の伝統に泥を塗ったのか……？"
10024070-100 = "「そんな理由」だと！？#n私の門主様を愛する気持ちが、お前に分かるわけないだろう！！"
10024070-102 = "門主様の気も知らず……たとえ門主様が許しても、私が許さない！"
10024070-103 = "バカな話なのだ。#nそんな理由で、こんな事を？"
10024070-104 = "誰だっ！？"
10024070-105 = "密輸がどうとかはどうでもいいのだ。"
10024070-106 = "ぼく様が知りたいのは、裏で計画を企てたのが誰なのか。#nそこで――"
10024070-110 = "――錬丹術研究会も参戦するのだ！"
10024070-111 = "[ruby=やくし]薬子[/ruby]サヤ……！？#n錬丹術研究会も呼んでいたとは、玄武商会め……！"
10024070-113 = "いや、あたし達も来るなんて聞いてないよ！？"
10024070-115 = "錬丹術研究会をナメてもらったら困るのだ！"
10024070-116 = "薬に関することなら、玄武商会の情報網にも負けないのだ！"
10024070-118 = "そうなのですね！？"
10024070-119 = "助かるよ！ありがとう、サヤ！#nお礼に新作料理をまた作ってあげる！！"
10024070-121 = "楽しみなのだ！#n……って、今はそんな話をしてる場合じゃないのだ！"
10024070-122 = "こいつ等の裏にいるのが、ぼく様の推測通りだったら……"
10024070-123 = "山海経の一大事なのだ！"
10024070-128 = "……。"
10024070-129 = "……どうする？"
10024070-130 = "アイツ等を全員倒せば、目撃者をなかったことに出来る。"
10024070-132 = "ちっ……仕方ない！"
10024070-134 = "レイジョ、準備はいい？"
10024070-136 = "はい、会長。そのお言葉を待っていました！"
10024070-137 = "玄龍門の名にかけて！"
10024070-138 = "お前たちには、聞きたいことがたくさんあるのだ！"
10024070-139 = "先生、指揮は任せたよ。一緒に頑張ろう！"
