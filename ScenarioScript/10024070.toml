[translation]
10024070-1 = "Episódio 7; Acelerar o Passo"
10024070-2 = "Shanhaijing - Subúrbios"
10024070-9 = "……。"
10024070-10 = "……。"
10024070-11 = "O grou amarelo voou para longe uma vez."
10024070-12 = "E nunca mais voltará."
10024070-13 = "Não foi seguido, foi?"
10024070-14 = "Sim, claro. E você, está tudo bem aí?"
10024070-15 = "Aqui também não há problemas. Não vi nenhum movimento suspeito."
10024070-16 = "Então, pode me dizer por que me chamou aqui?"
10024070-17 = "Você mesmo deve saber."
10024070-18 = "……O que quer dizer com isso?"
10024070-19 = "Está tentando se fazer de desentendido?#nEsqueceu que a base de qualquer negociação é a confiança?"
10024070-20 = "Se manchar a confiança assim, os \"Macacos dos Cinco Pós\" não vão ficar calados."
10024070-22 = "Não me diga que... pretende trair os \"Macacos dos Cinco Pós\"?"
10024070-23 = "Não diga besteiras. Quem pensaria em algo assim?"
10024070-25 = "Está duvidando da nossa lealdade?"
10024070-26 = "Não, eu sei disso. É justamente por isso que estou em dúvida.#nPor que, de repente……"
10024070-28 = "Enviaram apenas cenouras, não foi?"
10024070-29 = "Do que está falando?#nNós não providenciamos nada, muito menos cenouras."
10024070-31 = "Então, aquela carga que foi enviada através do Jardim das Ameixeiras……"
10024070-32 = "Espere, tem algo errado aqui……?"
10024070-37 = "――Escutem bem."
10024070-38 = "Quem está aí!"
10024070-39 = "O céu observa, a terra recebe as palavras――#nE eu conheço vocês――muito bem."
10024070-40 = "Não pode ser……?"
10024070-41 = "Não há necessidade de sonhar em ser um herói.#nEu só――queria viver de uma forma da qual não me envergonhasse."
10024070-42 = "Droga, temos que fugir……!"
10024070-43 = "Para que vocês cantam――e para que vocês vivem suas vidas?"
10024070-44 = "Ei, o que houve?"
10024070-45 = "Viver apenas por viver não é o bastante――por isso todos nós#ndesejamos nos tornar alguém!"
10024070-47 = "Aqui é Mina Konoe, Chefe do Departamento de Execução da Genryumon! Não se movam!"
10024070-48 = "Genryumon!?"
10024070-49 = "É inútil tentar fugir.#nJá posicionei pessoas ao redor também."
10024070-50 = "Se quiserem passar――"
10024070-51 = "Primeiro, terão que nos vencer."
10024070-52 = "A Genryumon e a Associação Comercial Genbu juntas……!#nIsso é impossível……!?"
10024070-53 = "Para mim também foi algo relutante."
10024070-54 = "Vamos, revele sua verdadeira identidade!"
10024070-61 = "Droga……!"
10024070-63 = "Espere, você é……!?"
10024070-65 = "Aquele traje……!"
10024070-66 = "Bem, eu já imaginava que seria assim."
10024070-67 = "Vou ter que pedir desculpas à Kokona-chan depois.#nAfinal, a envolvi nisso sem dizer nada."
10024070-68 = "É verdade.#nNão há como negar que também usamos a instrutora Kokona."
10024070-69 = "[s] \"Também preciso pedir desculpas à Shun…….\""
10024070-75 = "Como alguém de um cargo tão alto na Genryumon……"
10024070-76 = "Por que faria algo assim……?"
10024070-77 = "……。"
10024070-78 = "Responda! Por quê!"
10024070-79 = "A culpa é sua, Konoe Mina."
10024070-80 = "Minha... culpa?"
10024070-81 = "Sim. Você sempre foi um estorvo para mim."
10024070-82 = "Eu tentei encontrar uma maneira de te derrubar, mas precisava de dinheiro para reunir colaboradores."
10024070-83 = "Foi então que descobri a existência de uma certa pessoa que desejava desesperadamente o 'Ginseng de Dez Mil Anos'."
10024070-84 = "Pagaram bem, e não foi um negócio ruim. #nSe eu forjasse o crime como sendo da Associação Comercial Genbu, eu tinha a intenção de desviar a culpa para eles também."
10024070-85 = "......Não me lembro de ter feito nada contra você."
10024070-86 = "Você é a Chefe Executiva da Genryumon e, ao mesmo tempo, serve como guarda-costas direta da Líder da Porta..."
10024070-87 = "Não sei o que você pensa, mas, na prática, você é a número 2 da Genryumon."
10024070-89 = "Mas... é claro que o meu sentimento pela Líder da Porta é superior ao seu!"
10024070-90 = "Ah, minha adorável Líder da Porta... mesmo que eu seja muito mais adequada para ser a Chefe Executiva! #n...Entendeu agora? Não existe ninguém que a ame mais do que eu!!"
10024070-91 = "Hã...?"
10024070-96 = "Do que você está falando?"
10024070-97 = "Kisaki também causa muitos problemas, hein..."
10024070-99 = "P-por um motivo desses, você usou a boa vontade das crianças e manchou a tradição de Shanhaijing...?"
10024070-100 = "Disse 'por um motivo desses'!? #nVocê não tem como entender o meu amor pela Líder da Porta!!"
10024070-102 = "Sem saber o que ela sente... mesmo que a Líder da Porta perdoe, eu não perdoarei!"
10024070-103 = "Que história absurda. #nFazer tudo isso por um motivo desses?"
10024070-104 = "Quem está aí!?"
10024070-105 = "Não me importa o contrabando ou qualquer coisa do tipo."
10024070-106 = "O que eu quero saber é quem está por trás desse plano. #nPor isso—"
10024070-110 = "—O Clube de Pesquisa de Alquimia também vai participar!"
10024070-111 = "Yakushi Saya...!? #nChamar até o Clube de Pesquisa de Alquimia, maldita Associação Comercial Genbu...!"
10024070-113 = "Não, nós nem sabíamos que viríamos aqui!?"
10024070-115 = "Não subestimem o Clube de Pesquisa de Alquimia!"
10024070-116 = "Quando se trata de remédios, nossa rede de informações não perde nem para a da Associação Comercial Genbu!"
10024070-118 = "É mesmo!?"
10024070-119 = "Isso ajuda muito! Obrigado, Saya! #nComo agradecimento, vou preparar um novo prato para você!!"
10024070-121 = "Estou ansiosa por isso! #n...Quer dizer, não é hora de falar sobre isso agora!"
10024070-122 = "Se quem está por trás deles for quem eu suspeito..."
10024070-123 = "Isso é um assunto gravíssimo para Shanhaijing!"
10024070-128 = "......"
10024070-129 = "......O que vamos fazer?"
10024070-130 = "Se derrotarmos todos eles, podemos eliminar as testemunhas."
10024070-132 = "Tsc... não tem jeito!"
10024070-134 = "Reijo, está pronta?"
10024070-136 = "Sim, presidente. Eu estava esperando por essas palavras!"
10024070-137 = "Em nome da Genryumon!"
10024070-138 = "Nós temos muitas perguntas para fazer a vocês!"
10024070-139 = "Sensei, deixo o comando com você. Vamos dar o nosso melhor!"
