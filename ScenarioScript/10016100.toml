[translation]
10016100-1 = "Epílogo; Para todos――"
10016100-2 = "（Após o fim do revezamento, o \"Festival Esportivo Halo\" prosseguiu sem grandes incidentes...）"
10016100-3 = "（Com o discurso de encerramento da representante do Millennium, o evento chegou ao fim sem problemas.）"
10016100-8 = "Olá, atletas e espectadores. #nSou Ushio Noa, secretária do Seminar do Millennium e membro do comitê executivo do \"Festival Esportivo Halo\"."
10016100-9 = "Originalmente, a presidente Rio deveria fazer o discurso de encerramento, mas, devido a certas circunstâncias, eu o farei em seu lugar. Peço a compreensão de todos."
10016100-10 = "Ehem... Como mencionei, sou uma secretária focada em registros, então não estou acostumada a fazer discursos de encerramento que envolvam minha própria subjetividade."
10016100-11 = "Portanto, gostaria de encerrar este discurso revisando a programação de hoje, conforme o dever de uma secretária."
10016100-15 = "Neste Festival Esportivo Halo, muitas partidas foram realizadas e #nmuitas pessoas participaram."
10016100-16 = "Pessoalmente, acredito que todas as partidas foram confrontos memoráveis e pontos altos. #nNo entanto, nem todos aqui assistiram às partidas com a mesma perspectiva."
10016100-17 = "Por isso, seria difícil escolher o aluno que mais se destacou neste \"Festival Esportivo Halo\"."
10016100-21 = "Pelo contrário, acredito que cada aluno foi o \"protagonista do Festival Esportivo Halo\" e teve uma atuação maravilhosa. Agradeço profundamente a todos que participaram."
10016100-22 = "Como disse na abertura... o \"Festival Esportivo Halo\" é um \"festival de todos\", criado enquanto os alunos de todo o Kivotos se divertem."
10016100-23 = "Então, esperando que tenha sido um festival divertido para todos――#n――dou por encerrado o discurso de encerramento."
10016100-26 = "Ei, o que vamos fazer agora? Querem ficar mais um pouco no estádio?"
10016100-27 = "Hmm, acho que estou começando a sentir fome."
10016100-28 = "Parece que as barracas de comida vão ficar abertas até tarde mesmo depois do encerramento..."
10016100-29 = "Não tive tempo de comer durante as competições, vamos lá comer aquele donburi chinês que parecia delicioso!"
10016100-30 = "Ei, vi um monte de lenha empilhada na frente do estádio agora há pouco... o que será que vão fazer?"
10016100-31 = "Ei, você esqueceu do festival noturno?"
10016100-32 = "Estava escrito na programação que teríamos uma fogueira no festival noturno. #nDançar a dança folclórica com alunos de várias escolas é algo único do Festival Esportivo Halo!"
10016100-33 = "Você já ouviu dizer que se dançar a dança folclórica com a pessoa que gosta no festival noturno, o amor se realiza?"
10016100-34 = "Ei, ei, com quem você vai dançar?"
10016100-35 = "Hmm, eu..."
10016100-37 = "Hasumi-san, a preparação dos equipamentos e itens de combate a incêndio necessários para o festival noturno foi concluída."
10016100-38 = "E aqui está a lista da quantidade de munição consumida durante o Festival Esportivo Halo..."
10016100-39 = "Obrigada. Graças a vocês, pude respirar um pouco."
10016100-40 = "Quando o festival noturno começar, pode ser que alguns alunos comecem a ter comportamentos perigosos perto da fogueira. Por favor, fiquem atentos à segurança."
10016100-41 = "Conto com vocês até o fim."
10016100-42 = "S-sim!"
10016100-46 = "[ns] \"Bom trabalho até o fim, Hasumi.\""
10016100-47 = "Ah, Sensei."
10016100-48 = "Obrigada pelo seu trabalho hoje. Graças a você, conseguimos terminar o Festival Esportivo Halo em segurança."
10016100-49 = "[s] \"Não é nada comparado ao que o comitê executivo fez.\""
10016100-51 = "[ns] \"...Hasumi, você se divertiu no 'Festival Esportivo Halo'?\""
10016100-52 = "...Você quer saber a minha opinião?"
10016100-53 = "Bem, começando pela conclusão..."
10016100-54 = "...Foi terrível."
10016100-55 = "Não consegui ter um grande desempenho nas partidas e, no final, tive que assistir Gehenna vencer a classificação geral."
10016100-56 = "Incidentes e acidentes com alunos problemáticos não paravam de acontecer, e o robô de última geração do Millennium apresentou mau funcionamento..."
10016100-57 = "Além disso, havia muitas comidas de barraca com alto teor calórico, o inimigo mortal da dieta..."
10016100-58 = "...Foi realmente o pior \"Festival Esportivo Halo\"."
10016100-59 = "Mas, ver os alunos unindo forças para alcançar a vitória..."
10016100-60 = "E ter a experiência de correr na pista com uma sensação de leveza enquanto recebia o apoio de todos..."
10016100-61 = "...Não posso negar que foi divertido."
10016100-62 = "[s] \"Fico feliz que tenha se divertido.\""
10016100-63 = "No entanto, como mencionei antes, eu estaria me sentindo muito mais radiante se a Trinity tivesse vencido a classificação geral..."
10016100-64 = "Como eu fui a última corredora do revezamento entre escolas, não posso reclamar de ninguém."
10016100-68 = "A propósito, Sensei, aquelas alunas atrás de você..."
10016100-69 = "[s] \"Atrás...?\""
10016100-74 = "[ns1] \"Yuuka, Ako... e até a Mari?\"\n[ns2] \"O que as três estão fazendo...?\""
10016100-78 = "E-eu... só queria saber como o Sensei pretende passar o festival noturno..."
10016100-79 = "D-desculpe por ter ficado espiando...!"
10016100-80 = "Não é como se eu estivesse preocupada com superstições ou algo do tipo..."
10016100-81 = "S-se você ainda não tiver um par para a dança folclórica, eu posso fazer companhia a você..."
10016100-82 = "Diferente da Yuuka, eu não tenho interesse em ser parceira do Sensei, mas vi você e a Hasumi conversando de forma bem íntima..."
10016100-83 = "Pensei que talvez houvesse alguma história interessante para provocar o Sensei mais tarde... mas parece que foi perda de tempo."
10016100-85 = "Vocês continuam as mesmas desde a cerimônia de abertura."
10016100-86 = "Mesmo que as competições tenham acabado, ainda resta a organização do festival noturno para o comitê executivo, não é?"
10016100-87 = "Será que vocês não têm senso de responsabilidade como membros do comitê executivo...?"
10016100-89 = "E-eu vim depois de terminar o trabalho urgente, sabia?"
10016100-90 = "Não quero ouvir isso de uma aluna de Trinity."
10016100-92 = "Fufu... bem, de qualquer forma."
10016100-93 = "De vez em quando, deixar o trabalho de lado para aproveitar o festival também é bom."
10016100-97 = "Ainda vai levar um tempo até que a fogueira esteja pronta, então—"
10016100-105 = "Que tal tomarmos um chá que recebi da Tea Party?"
10016100-106 = "Get Set, Go! ~Festival Esportivo de Kivotos~"
