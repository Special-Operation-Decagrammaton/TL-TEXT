[translation]
10016100-1 = "エピローグ;みんなのための――"
10016100-2 = "（リレー終了後、「晄輪大祭」は大きな騒動もなく順調に進行し……）"
10016100-3 = "（ミレニアム代表の閉会の辞を最後に、つつが無く幕を閉じた）"
10016100-8 = "選手ならびにご観覧中の皆さん、こんにちは。#nミレニアムのセミナー書記兼「晄輪大祭」実行委員の[ruby=うしお]生塩[/ruby]ノアと申します。"
10016100-9 = "本来であれば、リオ生徒会長に閉会の辞をお願いする予定でしたが、諸事情で私が代わりに述べさせていただく事となりました。どうかご了承ください。"
10016100-10 = "こほん……先ほども申し上げましたが、私は本来、記録を主とする書記ですので、自身の主観を交えた閉会の辞というのはあまり慣れておりません。"
10016100-11 = "ですので、今回の閉会の辞は書記の本分に合わせ、本日の日程を振り返ること締めさせていただければと思います。"
10016100-15 = "今回の晄輪大祭では数多くの試合が行われ、#nまた、多くの方が参加してくださりました。"
10016100-16 = "私個人としては、すべての試合が手に汗握る名勝負であり、ハイライトだったと思います。#nですが、ここにいる全員が同じ目線で試合を見守っていたわけではありません。"
10016100-17 = "そのため、今回の「晄輪大祭」で最も活躍した生徒を選ぶのは難しいでしょう。"
10016100-21 = "むしろ、生徒ひとりひとりが「晄輪大祭の主人公」であり、素敵な活躍を見せてくださったと思っております。参加してくださった全ての皆様に、深くお礼申し上げます。"
10016100-22 = "開会の時に申し上げたように……「晄輪大祭」はキヴォトス中の生徒が楽しみながら作り上げていく、「みんなのお祭り」ですから。"
10016100-23 = "それではどうか、皆様にとって楽しいお祭りであったことを祈って――#n――閉会の辞とさせていただきます。"
10016100-26 = "ねえ、この後どうしよっか。もう少し競技場に残る？"
10016100-27 = "うーん、私はお腹が空いてきたかも。"
10016100-28 = "閉会後も屋台は遅くまであるみたいだし……。"
10016100-29 = "競技中は食べる時間なかったし、あの美味しそうな中華丼を食べに行こうよ！"
10016100-30 = "ねぇ、さっき見たら、競技場の前に薪がいっぱい積まれてたんだけど……何するつもりなんだろ？"
10016100-31 = "ちょっと、後夜祭のこと忘れたの？"
10016100-32 = "後夜祭でキャンプファイヤーするって、プログラムに書いてあったじゃない。#nいろんな学園の生徒とフォークダンスが踊れるのも、晄輪大祭ならではだよ！"
10016100-33 = "後夜祭で好きな人とフォークダンスを踊ると、恋が叶うって聞いたことない？"
10016100-34 = "ねえねえ、誰と踊るの？"
10016100-35 = "うーん、私は……。"
10016100-37 = "ハスミさん、後夜祭に必要な機材や消火道具の準備が終わりました。"
10016100-38 = "そしてこちらが晄輪大祭中に消耗された弾丸の数量リストです……"
10016100-39 = "ありがとうございます。皆さんのおかげで一息つけました。"
10016100-40 = "後夜祭が始まったら、キャンプファイヤーの前で危険行為を始める生徒が出るかもしれません。安全管理にも気を配ってくださいね。"
10016100-41 = "それでは、最後までよろしくお願いします。"
10016100-42 = "は、はいっ！"
10016100-46 = "[ns] \"最後まで本当お疲れ様、ハスミ。\""
10016100-47 = "あ、先生。"
10016100-48 = "今日は一日お疲れ様でした。おかげさまで無事、晄輪大祭を終えることができました。"
10016100-49 = "[s] \"実行委員のみんなと比べたら大したことないよ。\""
10016100-51 = "[ns] \"……ハスミは「晄輪大祭」、楽しかった？\""
10016100-52 = "……私の感想が聞きたいのですか？"
10016100-53 = "そうですね、結論から申し上げると……"
10016100-54 = "……最悪でした。"
10016100-55 = "試合で大きな活躍もできず、最後はゲヘナが総合優勝する姿を見守らなければなりませんでしたから。"
10016100-56 = "不良生徒の事件や事故は絶えませんでしたし、ミレニアムの最新型ロボットは誤作動を起こすし……"
10016100-57 = "しかも、ダイエットの天敵である高カロリーの屋台料理がたくさん……"
10016100-58 = "……本当に最悪の「晄輪大祭」でした。"
10016100-59 = "ですが、生徒同士が力を合わせて勝利を手にする姿や……"
10016100-60 = "みんなの応援を受けながら晴ればれとした気持ちでトラックを走る経験もできましたので……"
10016100-61 = "……楽しかったことは、否定できませんね。"
10016100-62 = "[s] \"楽しかったならよかった。\""
10016100-63 = "ただ、先ほど申し上げた通り、トリニティが総合優勝していたら晴れやかな気持ちだったのですが……"
10016100-64 = "学園対抗リレーのアンカーは私だったので、誰にも文句は言えませんね。"
10016100-68 = "ところで先生、後ろにいるその生徒たちは……"
10016100-69 = "[s] \"後ろ……？\""
10016100-74 = "[ns1] \"ユウカ、アコ……それにマリーまで？\"\n[ns2] \"3人とも、何してるの……？\""
10016100-78 = "そ、その……先生が後夜祭をどうお過ごしになるのか伺えればと思い……。"
10016100-79 = "の、覗き見をしてしまい、申し訳ありません……！"
10016100-80 = "別にジンクスとか気にしてるわけじゃないけど……。"
10016100-81 = "も、もしフォークダンスのパートナーが決まってないなら、私が付き合ってあげてもいいですよ……。"
10016100-82 = "私はユウカさんと違って先生のパートナーに興味はありませんが、ハスミさんと先生がなにやら親しげに話している姿が見えたので……。"
10016100-83 = "もしかしたら、後で先生をからかえるような面白い話でもないかなと思ったのですが……どうやら無駄足だったみたいですね。"
10016100-85 = "皆さん、開会式の時と変わりませんね。"
10016100-86 = "競技が終わったとはいえ、まだ実行委員会には後夜祭運営が残っているでしょう？"
10016100-87 = "皆さん、実行委員会としての責任感はないのでしょうか……。"
10016100-89 = "わ、私は急ぎの仕事を処理してから来たけど？"
10016100-90 = "トリニティの生徒にそんなことを言われたくはありませんね。"
10016100-92 = "ふふ……まぁ、でも。"
10016100-93 = "たまには仕事を後回しにして、お祭りを楽しむのも良いでしょう。"
10016100-97 = "キャンプファイヤーの準備が整うまで時間もかかりそうですし――"
10016100-105 = "ティーパーティーから頂いた紅茶でも、ご一緒しませんか？"
10016100-106 = "Get Set, Go！～キヴォトス晄輪大祭～"
