21170-1 = "Episódio 17; A Batalha Sem Fim"
21170-2 = "Millennium - Corredor"
21170-3 = "......"
21170-4 = "......"
21170-5 = "......"
21170-7 = "......"
21170-8 = "Entendi..."
21170-9 = "Departamento de Desenvolvimento de Jogos, hein. É um clube do qual eu nunca tinha ouvido falar..."
21170-10 = "Então quer dizer que vocês foram enganadas por elas?"
21170-11 = "......Eu sinto muito."
21170-12 = "Fui eu quem aceitou este pedido e preparou a operação."
21170-13 = "Acabei manchando o nome do Clube das Maids..."
21170-14 = "Não me importo com isso."
21170-15 = "......Eh?"
21170-16 = "Além do mais, a Rio entrou em contato comigo quando cheguei aqui."
21170-17 = "Da Seminar... da presidente do conselho estudantil da Millennium?"
21170-18 = "Sim."
21170-19 = "O pedido foi revogado. Ela disse para fingirmos que isso não aconteceu."
21170-20 = "!?"
21170-21 = "Por que... isso aconteceu tão de repente?"
21170-22 = "Como eu vou saber... Mas provavelmente, tanto a Rio quanto a Himari queriam testar alguma coisa, não?"
21170-23 = "Testar... a nossa força, você diz?"
21170-24 = "O contrário."
21170-25 = "Provavelmente a daquela garota chamada Aris, eu imagino."
21170-26 = "Mas enfim, não tô nem aí pra esses assuntos."
21170-27 = "Já que não tem mais nada a ver com o pedido..."
21170-28 = "Akane, pesquise sobre elas para mim."
21170-29 = "Perdão? Sobre o que exatamente?"
21170-30 = "Sobre o Departamento de Desenvolvimento de Jogos e todos os envolvidos, tudo de uma vez."
21170-31 = "Por que, de repente... Vai ser uma revanche?"
21170-32 = "Eu não gosto dessa palavra, mas... Bem, fiquei com um pouco de curiosidade."
21170-33 = "Assim que tiver todas as informações necessárias, vamos fazer uma visitinha pra elas."
21170-34 = "Entendido, eu adoraria. Neste exato momento elas devem estar pulando de alegria achando que enganaram o Clube das Maids."
21170-35 = "Fufu, eu mal posso esperar para ver... que tipo de expressões elas vão fazer da próxima vez que nos encontrarmos."
21170-38 = "Millennium - Depto. de Desenvolvimento de Jogos"
21170-39 = "......"
21170-40 = "......"
21170-41 = "......"
21170-42 = "Eu não me sentia tão deprimida assim... Desde que fizemos o upload do protótipo de 'Tales Saga Chronicle'..."
21170-46 = "Ehm, Momo...i...?"
21170-47 = "Fufu, fuhehehehe, tudo acabou! É o fiiiiim!!!"
21170-50 = "M-Midori? Ehm, você está bem?"
21170-51 = "Desculpa, Aris-chan... Eu não tô muito a fim de conversar agora..."
21170-54 = "Então, Yuzu――"
21170-55 = "Ira, destruição, corrupção, desespero, letargia... o mundo está rumando para a sua ruína..."
21170-57 = "A, ah, com licença! Ehm, e-eu não tô conseguindo entender direito, mas..."
21170-58 = "Por acaso, essa situação toda..."
21170-60 = "Foi causada pela G.Bible?"
21170-62 = "......"
21170-63 = "......"
21170-65 = "Ehm, eu não acho que a G.Bible esteja dizendo mentiras, mas..."
21170-67 = "E S S E  N Ã O  É  O  P R O B L E M A ! !"
21170-70 = "!?"
21170-71 = "Teria sido melhor se fosse mentira!"
21170-72 = "Uwaaaah, acabou! Nosso clube vai ser fechado agora! Buaaaaahhhh!"
21170-73 = "???"
21170-75 = "Millennium - Depto. de Desenvolvimento de Jogos"
21170-76 = "(2 horas atrás...)"
21170-77 = "O~lá, menininhas do Departamento de Desenvolvimento de Jogos! Chegou um presentinho da Maki-chan!"
21170-79 = "Finalmente!"
21170-80 = "Ta-da-daaaan!"
21170-82 = "G.Bible.exe... Pronto para execução."
21170-83 = "Finalmente, a G.Bible está em nossas mãos...!"
21170-84 = "Desculpa pela demora. Eu tive que devolver o 'Espelho' para a Seminar, e acabou rolando um pequeno contratempo por causa disso."
21170-85 = "Eeeh, você devolveu o 'Espelho'!?"
21170-86 = "Para falar a verdade, parece que a Himari-senpai já sabia de tudo desde o começo. Ela disse que não ligava de ceder ele daquela vez, mas pediu para não forçarmos muito a barra de agora em diante. Ehehe."
21170-87 = "Ah, por falar nisso. Eu achei esta pasta chamada <Key> enquanto tava abrindo a G.Bible."
21170-88 = "O que é isso... Será que se lê Kei?"
21170-89 = "......Kei?"
21170-90 = "É 'Key'! Mana, você realmente passou na prova do ensino médio!?"
21170-93 = "Para ser sincera, não consegui entender absolutamente nada dessa parte. O arquivo não parece estar corrompido, mas... Ele tem uma estrutura inacreditável que não pode ser decifrada com a linguagem de máquina que nós conhecemos."
21170-94 = "Eu consegui abrir a G.Bible direitinho, mas mesmo dando uma olhada nessa aqui eu não entendi bulhufas. Por um acaso vocês sabem alguma coisa sobre essa <Key>?"
21170-95 = "Não, a gente não sabe de nada..."
21170-96 = "......"
21170-97 = "Será que essa <Key>..."
21170-100 = "[56cd7b]Você é AL-1S?"
21170-103 = "Millennium - Depto. de Desenvolvimento de Jogos"
21170-104 = "Será que era sobre... aquela vez?"
21170-105 = "Hmmm, aconteceu alguma coisa? Mas enfim, por agora o importante é a G.Bible, né?"
21170-106 = "Deixo essa <Key> pra depois. Quando eu tiver um tempinho, vou tentar analisá-la com calma."
21170-107 = "Então, entrega feita com sucesso. Até mais!"
21170-109 = "Muito obrigada, Maki-chan!"
21170-110 = "Da próxima vez que quiser falar com a gente, marque com a nossa secretária! Porque nós vamos ser o maior sucesso com o 'TSC2'!"
21170-111 = "Ahaha, mal posso esperar pra ver isso!"
21170-113 = "Gente, cheguem mais!"
21170-114 = "Chegou a hora... vamos ver a G.Bible."
21170-115 = "Como todo mundo sabe, quase ninguém sabe o que tem aqui dentro. Mas, de acordo com um desenvolvedor muito famoso que dizem ter sido o último a ver a G.Bible..."
21170-116 = "Dizem que é 'Uma técnica secreta no desenvolvimento de jogos. O milagre que todos achavam que conheciam, mas que ninguém conhecia de verdade'."
21170-117 = "Eu quero saber o que é."
21170-118 = "Sim... Para criar o melhor jogo."
21170-119 = "Isso mesmo. Se conseguirmos, todas nós poderemos continuar juntas neste lugar."
21170-120 = "Mas se nós falharmos... A Yuzu vai ter que voltar para o dormitório e se encontrar com pessoas que ela não quer ver. E a Aris..."
21170-121 = "......Não quero nem pensar nessa possibilidade. Mas se isso acontecer, com certeza o Sensei, a Schale vai ajudar."
21170-124 = "Schale...? Ficar com o Sensei seria muito bom, mas..."
21170-125 = "A Aris não vai mais poder ficar aqui... junto com todo mundo?"
21170-126 = "......!"
21170-127 = "Não é verdade! Nós com certeza vamos criar o melhor jogo de todos!"
21170-128 = "Vai ficar tudo bem, o 'TSC2' vai ser um 'jogo divino' para a Aris também."
21170-129 = "Bom, então..."
21170-130 = "Vamos começar, Aris!"
21170-131 = "Sim."
21170-132 = "G.Bible..."
21170-133 = "Inicializar!"
21170-135 = "Próximo Episódio; G.Bible"