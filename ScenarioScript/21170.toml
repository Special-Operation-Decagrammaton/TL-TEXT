[translation]
21170-1 = "Episódio 17; A Batalha Sem Fim"
21170-2 = "Millennium - Corredor do Prédio Escolar"
21170-3 = "……."
21170-4 = "……."
21170-5 = "……."
21170-7 = "……."
21170-8 = "Entendo……."
21170-9 = "Departamento de Desenvolvimento de Jogos, é? Nunca tinha ouvido falar desse clube, mas……."
21170-10 = "Então você foi superada por eles, é isso?"
21170-11 = "……Peço perdão."
21170-12 = "Fui eu quem aceitou este pedido e preparou a operação."
21170-13 = "Manchei o nome do Departamento de Maid……."
21170-14 = "Não me importo com isso."
21170-15 = "……Eh?"
21170-16 = "Além disso, recebi um contato da Rio quando voltei para cá."
21170-17 = "Da Seminar…… da presidente do conselho estudantil de Millennium?"
21170-18 = "É."
21170-19 = "O pedido foi cancelado. Como se nunca tivesse existido, ela disse."
21170-20 = "!?"
21170-21 = "Por que, exatamente……?"
21170-22 = "O que eu sei sobre isso? Mas provavelmente, tanto a Rio quanto a Himari queriam verificar algo, não é?"
21170-23 = "Verificar…… as nossas habilidades, você diz?"
21170-24 = "Pelo contrário."
21170-25 = "Deve ser sobre aquela tal de Alice."
21170-26 = "Bem, não me interessa saber os detalhes disso."
21170-27 = "Já não tem relação com o pedido, mas……"
21170-28 = "Akane, investigue para mim."
21170-29 = "Sim? O que exatamente?"
21170-30 = "O Departamento de Desenvolvimento de Jogos, e todos os envolvidos também."
21170-31 = "Por que de repente…… é uma revanche?"
21170-32 = "Essa expressão me irrita um pouco, mas…… bem, estou um pouco interessada."
21170-33 = "Assim que eu tiver todas as informações, vamos até onde eles estão."
21170-34 = "Sim, é exatamente o que eu queria. A essa altura, elas devem estar comemorando por terem dado uma lição no Departamento de Maid."
21170-35 = "Fufu, estou ansiosa para ver que tipo de expressão elas farão quando nos encontrarmos novamente……."
21170-38 = "Millennium - Departamento de Desenvolvimento de Jogos"
21170-39 = "……."
21170-40 = "……."
21170-41 = "……."
21170-42 = "Eu não me sentia tão deprimida assim desde…… que o protótipo de 'Tales Saga Chronicle' foi carregado……."
21170-46 = "A-ah, Momoi……?"
21170-47 = "Fufu, fuhehehehe, acabou tudo! É o fim!!!"
21170-50 = "Mi-Midori? Você está, bem?"
21170-51 = "Alice-chan, desculpe…… não estou com vontade de falar nada agora……."
21170-54 = "Bem, Yuzu――"
21170-55 = "Raiva, ruína, corrosão, desespero, colapso…… o mundo agora está caminhando para a destruição……"
21170-57 = "A-ah! Bem, eu não entendi muito bem, mas……"
21170-58 = "Será que essa situação,"
21170-60 = "é por causa da G.Bible?"
21170-62 = "……."
21170-63 = "……."
21170-65 = "Bem, eu não acho que a G.Bible esteja mentindo, mas..."
21170-67 = "Não é esse o problema!!"
21170-70 = "!?"
21170-71 = "Seria melhor se você tivesse dito que era mentira!"
21170-72 = "Aaaaaah, acabou! Nosso clube vai ser fechado! Buááááá!"
21170-73 = "???"
21170-75 = "Departamento de Desenvolvimento de Jogos do Millennium"
21170-76 = "(2 horas atrás...)"
21170-77 = "Oii, pessoal do Departamento de Desenvolvimento de Jogos! A Maki trouxe um presente para vocês!"
21170-79 = "Finalmente!"
21170-80 = "Tcharam!"
21170-82 = "G.Bible.exe... Preparação para execução concluída."
21170-83 = "Finalmente, a G.Bible está em nossas mãos...!"
21170-84 = "Desculpem a demora. Tive que devolver o \"Espelho\" para o Seminar, então fiquei um pouco ocupada com isso."
21170-85 = "Sério, você devolveu o \"Espelho\"!?"
21170-86 = "Na verdade, parece que a Himari-senpai já sabia de tudo desde o início. Ela disse que tudo bem dar isso para vocês, e que vocês não deveriam se esforçar tanto daqui para frente. Hehehe."
21170-87 = "Ah, e tem outra coisa. Quando abri a G.Bible, encontrei esta pasta chamada <Key>."
21170-88 = "O que é isso... Será que se lê \"Kei\"?"
21170-89 = "...Kei?"
21170-90 = "É \"Key\" (Chave)! Você passou mesmo no vestibular, irmã!?"
21170-93 = "Na verdade, não entendi nada sobre isso. O arquivo não parece estar corrompido, mas... ele tem uma estrutura inacreditável que não conseguimos decifrar com a linguagem de máquina que conhecemos."
21170-94 = "Consegui abrir a G.Bible, mas não entendi nada só de olhar para isso. Vocês sabem alguma coisa sobre essa <Key>?"
21170-95 = "Não, nós não fazemos ideia..."
21170-96 = "..."
21170-97 = "Será que essa <Key> é..."
21170-100 = "[56cd7b]Você é a AL-1S?"
21170-103 = "Departamento de Desenvolvimento de Jogos do Millennium"
21170-104 = "Não pode ser, aquela de antigamente...?"
21170-105 = "Hmm, aconteceu alguma coisa? Bem, de qualquer forma, o foco agora é a G.Bible, né?"
21170-106 = "Sobre a <Key>, falamos depois. Vou tentar analisar quando tiver um tempo."
21170-107 = "Bom, já entreguei, então é isso. Até mais!"
21170-109 = "Obrigada, Maki!"
21170-110 = "Da próxima vez que nos encontrarmos, entre em contato pela nossa secretária! Afinal, vamos fazer um grande sucesso com o \"TSC2\"!"
21170-111 = "Ahaha, estou ansiosa para ver!"
21170-113 = "Pessoal, venham aqui!"
21170-114 = "Vamos lá... hora de ver a G.Bible."
21170-115 = "Como todos sabem, quase ninguém sabe o que tem aqui dentro. Mas, segundo um lendário desenvolvedor que supostamente viu a G.Bible pela última vez..."
21170-116 = "\"O segredo do desenvolvimento de jogos. Um milagre que todos acham que conhecem, mas que ninguém realmente conhece\"... é o que dizem."
21170-117 = "Eu quero saber o que é isso."
21170-118 = "Sim... para criarmos o melhor jogo de todos."
21170-119 = "Isso. Se conseguirmos, poderemos continuar todos juntos neste lugar."
21170-120 = "Se falharmos... a Yuzu terá que voltar para o dormitório e encontrar pessoas que ela nem quer ver. E a Alice..."
21170-121 = "...Não quero nem pensar nisso. Mas, se acontecer, tenho certeza de que o Sensei e o Schale nos ajudarão."
21170-124 = "Schale...? Fico muito feliz em estar com o Sensei, mas..."
21170-125 = "Alice não poderá mais ficar aqui... com todos vocês?"
21170-126 = "...!"
21170-127 = "Isso não vai acontecer! Nós vamos, com certeza, criar o melhor jogo de todos!"
21170-128 = "Não se preocupe, o \"TSC2\" também será um \"jogo divino\" para a Alice."
21170-129 = "Bem, então..."
21170-130 = "Vamos começar, Alice!"
21170-131 = "Sim."
21170-132 = "G.Bible……"
21170-133 = "Ativar!"
21170-135 = "Próximo episódio;G.Bible"
