21170-5 = "……"
21170-7 = "……"
21170-8 = "Saquei……"
21170-9 = "Clube de Desenvolvimento de Jogos, é? Um clube\nque eu nem conhecia, mas……"
21170-10 = "foram essas aí que passaram a perna\nna gente, é isso?"
21170-11 = "……Minhas sinceras desculpas."
21170-12 = "Quem aceitou esse pedido e preparou\na operação fui eu."
21170-13 = "Acabei manchando o nome do Clube das Maids……"
21170-14 = "Isso aí pouco me importa."
21170-15 = "……Hã?"
21170-16 = "Além do mais, quando eu voltei pra cá,\nchegou contato da Rio."
21170-17 = "Da……? Da presidente do Conselho da Millennium?"
21170-18 = "Isso."
21170-19 = "O pedido foi retirado. \"Esqueçam que existiu\",\nfoi o que ela disse."
21170-20 = "!?"
21170-21 = "Mas isso, por quê, afinal……?"
21170-22 = "Sei lá eu…… mas, provavelmente, tanto a Rio\nquanto a Himari queriam confirmar uma coisa, não é?"
21170-23 = "Confirmar…… a nossa força, é isso?"
21170-24 = "Pelo contrário."
21170-25 = "É a tal da Aris."
21170-26 = "Bom, esses detalhes não são da minha conta."
21170-27 = "Já não tem mais nada a ver com o pedido, mas……"
21170-28 = "Akane, dá uma investigada pra mim."
21170-29 = "Hã? Investigar o quê?"
21170-30 = "O Clube de Desenvolvimento de Jogos.\nE os envolvidos junto."
21170-31 = "Assim do nada, por quê…… é vingança?"
21170-32 = "Essa palavra até me dá uma agonia, mas……\nbom, é que fiquei meio interessada."
21170-33 = "Quando tiver levantado tudo, a gente vai\nlá no covil dessas garotas."
21170-34 = "Sim, é o que eu mais quero. A esta altura, aquelas\ngarotas devem estar comemorando por terem feito\no Clube das Maids morder o pó."
21170-35 = "Fufu, que cara será que elas vão fazer no nosso\npróximo encontro…… mal posso esperar."
21170-38 = "Millennium · Clube de Desenvolvimento de Jogos"
21170-39 = "……"
21170-40 = "……"
21170-41 = "……"
21170-42 = "Eu não me sentia tão pra baixo assim……\ndesde a vez em que subi o protótipo\ndo \"Tales Saga Chronicle\"……"
21170-46 = "É-ei, Momoi……?"
21170-47 = "Fufu, fuhehehehe, acabou tudo! É o fim!!!"
21170-50 = "M-Midori? Você…… está bem?"
21170-51 = "Aris, desculpa…… agora eu não tô a fim\nde falar nada……"
21170-54 = "Ãh, Yuzu——"
21170-55 = "Raiva, ruína, decomposição, desespero, colapso……\no mundo, agora, caminha rumo à destruição……"
21170-57 = "É-ei! Ãh, eu não tô entendendo muito bem, mas……"
21170-58 = "será que esta situação,"
21170-60 = "é por causa da G.Bible?"
21170-62 = "……"
21170-63 = "……"
21170-65 = "Bom, a G.Bible não disse nenhuma mentira,\neu acho……"
21170-67 = "N Ã O   É   E S S E   O   P R O B L E M A!!"
21170-70 = "!?"
21170-71 = "Antes você tivesse dito que era mentira,\nteria sido até melhor!"
21170-72 = "Buááá, acabou! A gente vai ser dissolvido!\nBuééééééé!"
21170-73 = "???"
21170-75 = "Millennium · Clube de Desenvolvimento de Jogos"
21170-76 = "(2 horas antes……)"
21170-77 = "Oiii, pirralhada do Clube de Desenvolvimento\nde Jogos! Chegou um presentinho da Maki!"
21170-79 = "Até que enfim!"
21170-80 = "Tcharaaan!"
21170-82 = "G.Bible.exe…… pronta para executar."
21170-83 = "Finalmente, a G.Bible nas nossas mãos……!"
21170-84 = "Desculpa a demora~. A gente teve que devolver o\n\"Espelho\" pra Seminar, e isso deu uma correria."
21170-85 = "Heein, vocês devolveram o \"Espelho\"!?"
21170-86 = "Na real, parece que a Himari sabia de tudo desde o\ncomeço. Disse que dar um trecinho desses tudo bem,\nmas que de agora em diante a gente não force tanto.\nEhehe."
21170-87 = "Ah, e tem isso. Quando eu abri a G.Bible, encontrei\nesta pasta aqui, chamada ＜Key＞."
21170-88 = "Que é isso…… lê-se \"Kei\", será?"
21170-89 = "……Kei?"
21170-90 = "É \"KEY\", lê-se \"qui\"! Mana, você passou MESMO\nna prova do ensino médio!?"
21170-93 = "Na verdade, dessa aqui eu não entendi nadinha. O\narquivo não parece estar corrompido, mas…… tem\numa estrutura inacreditável, que não dá pra decifrar\ncom nenhuma linguagem de máquina que a gente conhece."
21170-94 = "A G.Bible eu consegui abrir direitinho, mas esta\naqui, só de olhar de relance, não deu pra entender\nnada. Sobre essa ＜Key＞, vocês sabem alguma coisa?"
21170-95 = "Não, a gente também não faz ideia……"
21170-96 = "……"
21170-97 = "Não me diga que ＜Key＞ é……"
21170-100 = "[56cd7b]Você é a AL-1S?"
21170-103 = "Millennium · Clube de Desenvolvimento de Jogos"
21170-104 = "Não pode ser, aquilo de antes……?"
21170-105 = "Hmm, aconteceu alguma coisa? Bom, mas, por ora,\no foco é a G.Bible, né."
21170-106 = "Sobre a ＜Key＞ a gente vê outra hora. Se sobrar\ntempo, eu me esforço pra analisar."
21170-107 = "Então, entreguei sem falha. Até mais!"
21170-109 = "Maki, valeu mesmo!"
21170-110 = "Da próxima vez que a gente se ver, fala comigo\natravés da minha secretária! Porque a gente vai\nestourar com o \"TSC2\"!"
21170-111 = "Ahaha, mal posso esperar!"
21170-113 = "Pessoal, juntem-se aqui!"
21170-114 = "Bom, vamos lá…… bora ver a G.Bible."
21170-115 = "Como todas sabem, sobre o que tem aqui dentro,\nquase ninguém faz ideia. Só que, segundo um certo\ndesenvolvedor carismático, que dizem ter sido o\núltimo a ver a G.Bible……"
21170-116 = "\"A técnica secreta do desenvolvimento de jogos.\nUm milagre que todos pareciam conhecer, mas que\nninguém conhecia de verdade\"…… é o que dizem."
21170-117 = "Eu quero conhecer isso."
21170-118 = "Sim…… pra fazer o melhor jogo do mundo."
21170-119 = "Isso. Se a gente conseguir, dá pra continuar aqui,\nneste lugar, todas juntas."
21170-120 = "Se a gente falhar…… a Yuzu volta pro dormitório\ne tem que encarar gente que ela nem quer ver.\nE, além disso, a Aris……"
21170-121 = "……Eu não quero nem pensar na pior hipótese.\nMas, se acontecer, com certeza o Sensei,\na Schale vai ajudar."
21170-124 = "Schale……? Estar junto do Sensei\nme deixa muito feliz, mas……"
21170-125 = "A Aris não vai mais poder ficar aqui……\njunto com todas vocês?"
21170-126 = "……Kh!"
21170-127 = "Isso não vai acontecer! Porque a gente vai, com\ncerteza, fazer o melhor jogo do mundo!"
21170-128 = "Fica tranquila, o \"TSC2\" também vai ser\num \"jogo divino\" pra Aris."
21170-129 = "Bem, então vamos lá……"
21170-130 = "Vamos começar, Aris!"
21170-131 = "Sim."
21170-132 = "G.Bible……"
21170-133 = "iniciar!"
21170-135 = "Próximo episódio: G.Bible"