[translation]
1002705-1 = "Uma conclusão inesperada"
1002705-2 = "（O lugar para onde Karin me guiou era o seu próprio quarto）"
1002705-3 = "（O quarto estava bem organizado, e Karin parecia ter tomado uma decisão）"
1002705-6 = "[ns] \"É um quarto muito bom.\""
1002705-7 = "Ah, obrigada……"
1002705-8 = "Bem, é \"seja bem-vindo\", é assim que se diz……?"
1002705-9 = "Bem, é um assunto bastante importante, ou melhor, algo que exigia determinação…… obrigada por confiar em mim e vir até aqui."
1002705-10 = "[s1] \"……。\"\n[s2] \"Um assunto importante……。\""
1002705-11 = "Bem, então, Sensei……."
1002705-12 = "Bem, então, Sensei……."
1002705-13 = "……？"
1002705-14 = "Você quer dizer que hoje estou com o meu uniforme de empregada de sempre, é isso……?"
1002705-15 = "Bem, é que, não seria errado se não fosse assim?"
1002705-16 = "Se eu já estivesse vestida desde o início, não teria sentido……."
1002705-17 = "Ah, se for esse o caso, eu posso sair do quarto por um momento…… você pode me chamar quando for o melhor momento para você, Sensei."
1002705-18 = "Eu, bem,"
1002705-24 = "Se você não quiser, não contarei isso a ninguém……."
1002705-28 = "……Então, aqui está."
1002705-29 = "A roupa de coelhinha que você queria que eu vestisse. Pode usar como quiser."
1002705-30 = "……？"
1002705-31 = "……Eh, por que esse suspiro?"
1002705-32 = "E-está tudo bem! Eu nunca contarei a ninguém, guardarei segredo! Além disso, você veio até aqui……!"
1002705-33 = "[s3] \"Foi um mal-entendido, afinal……。\"\n[s4] \"Não é que eu queira vestir……。\""
1002705-34 = "……Eh? O que você quer dizer?"
1002705-35 = "……Eh? O que você quer dizer?"
1002705-36 = "Quer dizer que você não quer que eu vista a roupa de coelhinha……?"
1002705-37 = "[s] \"É que eu acho a Karin fofa usando isso, é só isso.\""
1002705-41 = "……."
1002705-42 = "……？"
1002705-43 = "……Ah, entendi……?"
1002705-44 = "……Sim."
1002705-45 = "……Desculpe, finalmente entendi. De alguma forma, eu estava interpretando tudo errado……."
1002705-46 = "Entendo, então é isso……."
1002705-47 = "……Desculpe, fiquei confusa com tudo isso."
1002705-48 = "Então, você reagiu a essa roupa porque achou que eu ficava fofa……?"
1002705-49 = "[s5] \"Além disso, a Karin parecia muito feliz usando isso.\"\n[s6] \"E também fiquei feliz em saber que você gosta desse tipo de coisa.\""
1002705-50 = "E-entendo……."
1002705-51 = "E-entendo……."
1002705-52 = "Sim, entendo……."
1002705-53 = "Então, de várias formas, você estava me observando e ficando feliz por mim……."
1002705-54 = "De alguma forma, sinto um frio na barriga…… nunca houve alguém que se interessasse tanto por mim antes……."
1002705-55 = "Mas, é verdade……."
1002705-56 = "Pensando bem, desde que entrei na C&C, só uso uniformes de empregada. Claro que eu gosto muito disso."
1002705-57 = "Eu quase nunca usei o uniforme da escola, e outras roupas também……."
1002705-58 = "Por causa disso, talvez eu tenha ficado animada com essa roupa de coelhinha sem nem perceber."
1002705-59 = "Eu já achava que era fofa, mas…… ainda assim, estou surpresa. Você percebeu coisas sobre mim antes mesmo de mim mesma."
1002705-60 = "Ultimamente, eu disse \"confie em mim\" várias vezes, mas nem precisava ter dito algo assim, não é?"
1002705-61 = "Sério, você sempre me surpreende, Sensei. E você me ajudou tantas vezes. Eu gostaria de poder retribuir de alguma forma……."
1002705-62 = "……Hm? Ah, se é algo que eu possa fazer……."
1002705-63 = "Você quer ver de novo, aqui e agora……?"
1002705-64 = "Haa... incluindo esse seu lado, Sensei, você continua o mesmo de sempre."
1002705-65 = "...Sim, entendi. Se isso for deixar o Sensei feliz."
1002705-66 = "Então... por favor, pode sair um pouco? Mesmo que sejamos próximos, bem, na sua frente é um pouco..."
1002705-67 = "[s] Você sai temporariamente do quarto da Karin."
1002705-77 = "...Como estou?"
1002705-78 = "N-não sei, fazer algo assim no quarto me deixa com uma sensação estranha..."
1002705-79 = "Tipo, Sensei, não fique só olhando, faça alguma coisa..."
1002705-80 = "...Hm?"
1002705-81 = "Como estou me sentindo agora...?"
1002705-82 = "...Ah, então você quer que eu vista de novo?"
1002705-87 = "Fufu, é verdade..."
1002705-88 = "...Sim, com certeza fico animada. É fofo e divertido."
1002705-90 = "...Bem, acho que isso é uma mistura de vários sentimentos."
