[translation]
1002705-1 = "思わぬ結論"
1002705-2 = "（カリンに案内された場所は、カリンの自室だった）"
1002705-3 = "（部屋は綺麗に整理されていて、カリンは覚悟を決めたような顔をしていた）"
1002705-6 = "[ns] \"すごく良い部屋だね。\""
1002705-7 = "あ、ありがとう……"
1002705-8 = "えっと、いらっしゃいませ、で合ってるのか……？"
1002705-9 = "えっと、結構大事なことというか、覚悟が必要なことだったと思うけど……私を信じて、来てくれてありがとう。"
1002705-10 = "[s1] \"……。\"\n[s2] \"大事なこと……。\""
1002705-11 = "えっと、じゃあ、先生……。"
1002705-12 = "えっと、じゃあ、先生……。"
1002705-13 = "……？"
1002705-14 = "今日はいつものメイド服なんだね、って……？"
1002705-15 = "それはだって、そうじゃないとダメだろう？"
1002705-16 = "私が最初から着てると意味が無いというか……。"
1002705-17 = "あ、あれだったら私は部屋から一旦出るから……先生の良いタイミングで呼んでくれても良い。"
1002705-18 = "私はその、"
1002705-24 = "先生が嫌だったらこのことは誰にも言わないし……。"
1002705-28 = "……じゃあ、はい。これ。"
1002705-29 = "先生が着たがってたバニー衣装。好きなだけ使って。"
1002705-30 = "……？"
1002705-31 = "……え、何でそんなため息を？"
1002705-32 = "だ、大丈夫だ！私は絶対誰にも言わないし、秘密も守るから！それに、ここまで来てくれたんだし……！"
1002705-33 = "[s3] \"やっぱり誤解だった……。\"\n[s4] \"私が着たいわけじゃなくて……。\""
1002705-34 = "……え？どういうことだ？"
1002705-35 = "……え？どういうことだ？"
1002705-36 = "つまり、先生はバニー衣装が着たいのではなく……？"
1002705-37 = "[s] \"それを着てるカリンが可愛いなって、そういうこと。\""
1002705-41 = "……。"
1002705-42 = "……？"
1002705-43 = "……あ、なるほど……？"
1002705-44 = "……うん。"
1002705-45 = "……ごめん、ようやく理解した。何だかずっと誤解をしてたけれど……。"
1002705-46 = "そうか、そういうことか……。"
1002705-47 = "……ごめん、色々と混乱した。"
1002705-48 = "じゃあこの衣装に反応してたのは、可愛いと思ってくれてたから……？"
1002705-49 = "[s5] \"それに、カリンがそれを着ててすごく楽しそうだったし。\"\n[s6] \"そういうのが好きなんだなって知れて嬉しかったのもある。\""
1002705-50 = "そ、そうか……。"
1002705-51 = "そ、そうか……。"
1002705-52 = "うん、なるほど……。"
1002705-53 = "つまり先生は色んな意味で、私のことを見て喜んでくれてたのか……。"
1002705-54 = "何だか、むず痒いな……こうして誰かが私について興味を持ってくれるなんてこと、これまであんまり無かったし……。"
1002705-55 = "でも、確かに……。"
1002705-56 = "考えてみると、C&Cに入ってからはずっとメイド服ばっかりで。もちろんこれはこれですごく好きなのだけど。"
1002705-57 = "学校の制服も、ほとんど着たことが無いし……他の服も……。"
1002705-58 = "そういうこともあって、知らず知らずにこのバニーガール衣装で、テンションが上がっていたのかもしれないな。"
1002705-59 = "もともと可愛いとは思っていたけど……それにしても、驚いた。私のことに、私より早く気が付くなんて。"
1002705-60 = "何だか最近「私を信じて」って何度も言ってしまったけれど、あんなこと言うまでもないくらいだったね。"
1002705-61 = "本当に、先生には驚かされてばっかりだ。それに何度も助けてもらって。私からも何か、お返しできれば良いのだけど……。"
1002705-62 = "……ん？ああ、私にできることなら……。"
1002705-63 = "もう一度今、ここで見たい……？"
1002705-64 = "はぁ……そういうところまで含めて、先生は相変わらずだな。"
1002705-65 = "……うん、分かった。それで先生に喜んでもらえるなら。"
1002705-66 = "じゃあ……一応、外に出てもらえる？私と先生の間柄とはいえその、目の前ではちょっと……。"
1002705-67 = "[s] 一旦カリンの部屋を出る。"
1002705-77 = "……どう、かな？"
1002705-78 = "な、何だかこう、部屋でこんなことをしていると、変な気分になるな……。"
1002705-79 = "その、先生、じっと見てるだけじゃなくて何か……。"
1002705-80 = "……ん？"
1002705-81 = "今の気持ち……？"
1002705-82 = "……ああ、だからもう一度着てもらおうと？"
1002705-87 = "ふふっ、確かに……。"
1002705-88 = "……うん、やっぱりテンションは昂るな。可愛いし、楽しい。"
1002705-90 = "……まあこれは、色々な気持ちが混ざっていると思うけれど。"
