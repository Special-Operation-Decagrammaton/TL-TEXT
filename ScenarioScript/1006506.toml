[translation]
1006506-1 = "カホさんの計画的な営業戦略"
1006506-5 = "（カホに言われた陰陽部の部室に到着した）"
1006506-6 = "[ns] \"待ち合わせ場所は合ってるはず……。\""
1006506-10 = "これは……こっちに……"
1006506-14 = "あとは、これを飾って……"
1006506-15 = "[s] （カホの声だ……奥に居るのかな？）"
1006506-23 = "あ、先生。いらしたんですね。"
1006506-24 = "[s] \"お待たせ、カホ。何してるの？\""
1006506-28 = "よく聞いてくださいました……！"
1006506-29 = "ふふっ、先ほどお話したグッズを飾っているところです！"
1006506-30 = "陰陽部の部室は、訪問客をお招きする場所でもありますので……"
1006506-35 = "ここに宣伝グッズを飾れば……"
1006506-36 = "間違いなく、宣伝効果は抜群でしょう！"
1006506-37 = "[s] \"確かに、カホらしいね。\""
1006506-38 = "ですから、少々お待ちください、先生。"
1006506-39 = "もう少々、光の当たる位置に……真っ直ぐ並べて……"
1006506-40 = "[s] \"私も手伝って良いかな？\""
1006506-41 = "あ……ありがとうございます。"
1006506-48 = "では、よろしくお願いしますね。"
1006506-50 = "（カホと一緒にグッズを並べ終え……）"
1006506-54 = "これにて完了ですね、先生！"
1006506-57 = "[wa:550]― 先生、[wa:1100]いかがでしょう？"
1006506-60 = "― この無邪気なまん丸の瞳に……"
1006506-62 = "― 深く考え込むような表情……"
1006506-65 = "[wa:300]― もう、[wa:1100]本当に[wa:1100]めちゃくちゃ可愛くないですか！？"
1006506-68 = "[wa:150]― はぁ[wa:1530]天が与えた造形……[wa:2320]最高……"
1006506-70 = "― 生きててよかった……！"
1006506-73 = "[ns] \"本当にみんな可愛いね。\""
1006506-74 = "[wa:100]― はい。[wa:850]本当に、"
1006506-76 = "― みんな可愛くて[wa:1150]大切な子なんです。"
1006506-79 = "[wa:100]― 愛くるしい子、[wa:1600]格好良い子、"
1006506-81 = "― クールな子、[wa:1350]美しい子……"
1006506-84 = "[wa:200]― ふふっ……"
1006506-86 = "― まるで[wa:1050]百鬼夜行の生徒みたいですね。"
1006506-89 = "[ns] \"どういうこと……？\""
1006506-90 = "[wa:150]― みんな違うからこそ、"
1006506-92 = "― 時に[wa:700]ぶつかる事もありますが……"
1006506-95 = "― それぞれが[wa:1250]輝く個性を持った"
1006506-97 = "― 大切な生徒だな、[wa:1050]と思いまして。"
1006506-100 = "[ns1] \"そうだね……もちろん、そこにはカホも居るよ。\"\n[ns2] \"いつも頑張ってるカホも、私にとって大切な生徒だよ\" "
1006506-101 = "[wa:50]― せ…[wa:650]先生……！？"
1006506-102 = "[wa:50]― せ…[wa:650]先生……！？"
1006506-104 = "― うぅ……[wa:1550]急にそんな……"
1006506-107 = "― あ……[wa:1050]ありが……とう……"
1006506-109 = "― ございます……[wa:1450]先生……"
1006506-112 = "（そうしてカホと一緒に楽しい時間を過ごした）"
