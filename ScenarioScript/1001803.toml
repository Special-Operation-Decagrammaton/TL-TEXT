[translation]
1001803-1 = "Lutadora gentil"
1001803-2 = "Sala do Clube de Desenvolvimento de Jogos"
1001803-3 = "Ei, Sensei, se não for pedir muito..."
1001803-4 = "V-você poderia jogar um jogo de luta comigo?"
1001803-5 = "[s] \"Um jogo de luta?\""
1001803-6 = "Sim, aquele novo jogo de luta competitivo que mencionei antes, eu finalmente consegui ele...!"
1001803-7 = "Eu estava esperando muito por esse jogo e queria jogar logo, mas, justamente hoje, as outras integrantes do clube têm compromissos..."
1001803-8 = "Como é um jogo de luta, não dá para jogar sozinha, mas, ao mesmo tempo, jogar com alguém que não conheço desde o início é, bem, assustador..."
1001803-9 = "Por isso, Sensei, você poderia ser meu oponente?"
1001803-10 = "[s1] \"Eu não sou muito bom em jogos de luta, mas...\"\n[s2] \"Não vou pegar leve, então prepare-se!\""
1001803-11 = "Não tem problema, eu também estou jogando este jogo pela primeira vez."
1001803-12 = "Vamos jogar juntos e aprimorar nossas habilidades...!"
1001803-13 = "Ah, ahaha... Ouvir isso me deixou um pouco nervosa."
1001803-14 = "Então, eu também vou dar o meu melhor como sua oponente...!"
1001803-21 = "A-ah... C-cuidado...!"
1001803-24 = "V-você é bom... Não sabia que tinha essas habilidades..."
1001803-25 = "Bem, então vou contra-atacar de outra forma..."
1001803-30 = "<Jogadora Yuzu, vitória perfeita!>"
1001803-31 = "[s] \"...Eu desisto.\""
1001803-32 = "Ehehe, desta vez eu venci."
1001803-33 = "S-Sensei? Você está com uma cara estranha... S-será que foi entediante?"
1001803-34 = "Hã? Se eu realmente estou jogando isso pela primeira vez?"
1001803-35 = "C-claro que sim! Este jogo acabou de ser lançado hoje de manhã..."
1001803-36 = "Talvez eu só tenha tido sorte desta vez... Vamos jogar mais uma vez!"
1001803-43 = "Ah, e-esse golpe foi inesperado."
1001803-44 = "Desta vez, talvez eu esteja em apuros...!"
1001803-47 = "<Jogadora Yuzu, vitória perfeita!>"
1001803-48 = "[s] \"............\""
1001803-49 = "Ufa... Desta vez também consegui vencer de alguma forma."
1001803-50 = "Hã? Você sentiu que, apesar dos meus resmungos durante o jogo, você foi espancado unilateralmente...?"
1001803-51 = "Desculpe, eu... quando fico imersa no jogo, acabo falando sozinha sem perceber..."
1001803-52 = "N-não estava pensando em nada estranho, então não devo ter dito nada estranho... Provavelmente."
1001803-53 = "E-então, da próxima vez eu não vou usar combos... #nQue tal mais uma partida...?"
1001803-60 = "<Jogadora Yuzu, vitória perfeita!>"
1001803-61 = "I-isso é porque... quando seguro o controle, acabo me empolgando sem querer... ahaha..."
1001803-62 = "P-prometo que da próxima vez não vou usar nenhum golpe de agarrão, então, por favor, só mais uma vez...!"
1001803-64 = "Apesar das repetidas considerações de Yuzu, após isso, você jogou mais 10 partidas e sofreu uma derrota total em todas elas..."
