[translation]
1001803-1 = "優しいファイター"
1001803-2 = "ゲーム開発部・部室"
1001803-3 = "あの、先生、もしよかったら……。"
1001803-4 = "わ、わたしと一緒に格ゲーをしませんか？"
1001803-5 = "[s] \"格ゲー？\""
1001803-6 = "はい、以前お伝えしたあの、新作の対戦型格闘ゲームをついに手に入れまして……！"
1001803-7 = "すごく楽しみにしてたゲームなので早くやってみたいのですが、今日に限って部員のみんなはそれぞれ先約があるらしく……。"
1001803-8 = "対戦ゲームなので、相手がいないとプレイできないのですが、だからといって最初から知らない人とゲームするのは、その、怖いので……。"
1001803-9 = "なので、先生、わたしのお相手をしていただけませんか？"
1001803-10 = "[s1] \"私、格ゲーはあんまり得意じゃないけど……。\"\n[s2] \"手加減しないから覚悟してね！\""
1001803-11 = "大丈夫です、わたしもこのゲームをプレイするのは初めてですので。"
1001803-12 = "一緒に対戦して、実力を磨きましょう……！"
1001803-13 = "あ、あはは……そう言われると少し、緊張してきました。"
1001803-14 = "それでは、わたしも頑張ってお相手します……！"
1001803-21 = "あ、ああっ……あ、危ないです……っ！"
1001803-24 = "や、やりますね……そんなスキルがあるなんて……。"
1001803-25 = "では、次は別のやり方で反撃を……。"
1001803-30 = "＜ユズ選手、パーフェクト勝利！＞"
1001803-31 = "[s] \"……参りました。\""
1001803-32 = "えへへ、今回はわたしの勝ちですね。"
1001803-33 = "せ、先生？なんだか、すごい顔をされていますが……も、もしかしてつまらなかったですか？"
1001803-34 = "え？本当にこのゲームは初めてなのか、ですか？"
1001803-35 = "も、もちろんです！このゲームはちょうど今朝発売されたばかりの新作ですし……。"
1001803-36 = "今回はわたしの運がよくて勝てただけかもしれませんので……もう一度プレイしてみましょう！"
1001803-43 = "あ、そ、その技は想定外でした。"
1001803-44 = "今度こそ、ピンチかもしれません……！"
1001803-47 = "＜ユズ選手、パーフェクト勝利！＞"
1001803-48 = "[s] \"…………。\""
1001803-49 = "ふぅ……今回も、どうにか勝てました。"
1001803-50 = "え？ゲーム中の呟きとは裏腹に、一方的にボコボコにされてた気がする……ですか？"
1001803-51 = "すみません、わたし……ゲームに夢中になると、知らずのうちにひとり言が増えてしまうみたいで……。"
1001803-52 = "け、決して変なことを考えていたわけでは無いので、変なことは言ってないはずです……多分。"
1001803-53 = "そ、そうしましたら、次はわたし、コンボを使わないようにしますので……#nもう一回いかがですか……？"
1001803-60 = "＜ユズ選手、パーフェクト勝利！＞"
1001803-61 = "こ、これはその……コントローラーを握ると思わず気合が入ってしまって……あはは……。"
1001803-62 = "つ、次はもう掴み技を一切使わないことにしますので、もう一度、もう一度だけお願いします……！"
1001803-64 = "度重なるユズの配慮にも関わらず、その後さらに10回対戦して、全戦完敗を喫した……。"
