90001260-327 = "……O que é isso?"
90001260-328 = "[ns7] \"Parece que continha algo importante...\"\n[ns8] \"Você disse para não irmos ao segundo depósito, não foi?\""
90001260-331 = "Parece que, se necessário, eles pretendem defender este lugar mesmo que tenham que abandonar as outras instalações."
90001260-332 = "Chegando ao ponto de usar tratamentos cruéis e ameaças explícitas."
90001260-333 = "Uuu, eu me esforcei tanto para subir o nível...#nPor favor, não apaguem os dados do meu jogo..."
90001260-334 = "(...Vou ter que dar uma bronca depois sobre jogar com moderação.)"
90001260-340 = "As luzes...?"
90001260-341 = "……De novo? Que falta de criatividade."
90001260-342 = "Waaah! Está tudo escuro!#nNão consigo ver nada...!"
90001260-343 = "Alice, não se afaste de mim!"
90001260-344 = "Algum tipo de sinal...?"
90001260-345 = "……!"
90001260-349 = "O-olá... pessoal, Sensei.#nNos encontramos de novo... hehe."
90001260-350 = "Vocês são realmente persistentes."
90001260-351 = "Seria muito mais fácil se simplesmente desistissem de tudo."
90001260-352 = "[s9] \"Isso não é possível.\"\n[s10] \"Como Sensei, não posso desistir dos meus alunos.\""
90001260-356 = "Se dissermos que também somos alunas... o Sensei não vai desistir?"
90001260-357 = "[s11] \"Claro que não.\"\n[s12] \"Já tenho os formulários de transferência prontos, podem entrar em contato quando quiserem.\""
90001260-363 = "Nossa... será que vocês não entendem uma piada?"
90001260-365 = "I-isso é o que chamam de uma pessoa sem futuro...?"
90001260-366 = "Sinto muito por não atender às suas expectativas, mas... não temos o menor interesse nisso."
90001260-367 = "Transferência escolar, afinal, é apenas um sistema criado por humanos, não é?#nNão tem nada a ver conosco."
90001260-369 = "[ns13] \"Pensei que tivessem vindo nos ver porque queriam se transferir...\"\n[ns14] \"Então, por que vieram?\""
90001260-372 = "Incrível... elas não leem o clima de jeito nenhum..."
90001260-373 = "De qualquer forma, o que queríamos dizer é: se passarem daqui, não haverá volta."
90001260-374 = "Exato. No sentido literal de \"cruzar a linha\"."
90001260-376 = "Usando as palavras de Soph... viemos declarar guerra."
90001260-378 = "Próximo episódio: Crime e Castigo"
