[translation]
90001260-1 = "Episódio 26: A luz que ilumina a escuridão"
90001260-2 = "[ns] \"……Será que esta é a última sala?\""
90001260-3 = "E-estou com uma sensação estranha……."
90001260-4 = "Não tem só musgo, tem trepadeiras também. #nOlha, até tem uma poça d'água aqui."
90001260-5 = "Nesta situação…… normalmente, isso já estaria interditado há muito tempo."
90001260-6 = "Por favor, olhem! #nA parede inteira é feita de gavetas!"
90001260-8 = "Parece que sim. Vamos dar uma olhada?"
90001260-11 = "……Ora? Isso é surpreendente. #nO estado de conservação das sementes não está ruim."
90001260-12 = "Pela atmosfera, será que este é o núcleo do Seed Vault?"
90001260-13 = "É como um lugar sagrado, escondido para que ninguém se aproxime……."
90001260-14 = "Ao que parece, esta instalação possuía uma estrutura de vedação tripla."
90001260-16 = "O prédio e o espaço até o depósito foram destruídos, mas…… felizmente, o abrigo que guarda as sementes ainda está funcionando."
90001260-17 = "É a tecnologia de Millennium, o orgulho de Kivotos."
90001260-18 = "Não, não deve ser só isso."
90001260-20 = "Você acha que há outros fatores?"
90001260-21 = "Até agora, as IAs que se tornaram Profetas mostraram comportamentos diferentes dos seus padrões originais."
90001260-22 = "Hod, que originalmente era uma IA de unidade de comunicação de Millennium――"
90001260-23 = "Chokmah também era um navio, mas agora não mantém mais sua forma original."
90001260-24 = "Sim. Mas a IA administrativa do Seed Vault continua gerenciando as sementes mesmo depois de se tornar um Profeta."
90001260-25 = "――Como se essa fosse a sua missão."
90001260-26 = "De fato, esse estado de conservação…… é mais natural pensar que foi intencional."
90001260-27 = "Porém, essa hipótese levanta uma dúvida."
90001260-28 = "Essa vontade é daquelas três, ou é do Profeta―― Tiphereth?"
90001260-29 = "Se for Tiphereth, qual é a sua opinião?"
90001260-30 = "……Talvez os Profetas também tenham autoconsciência."
90001260-31 = "Pensando por esse lado――"
90001260-37 = "――！？"
90001260-38 = "Isso é……！？"
90001260-46 = "Rio-senpai, Himari-senpai!?"
90001260-47 = "Momoi, Midori!? Pessoal……!? #nO que está acontecendo aqui!?"
90001260-48 = "Tem um cheiro estranho…… ugh, Alice, estou me sentindo mal."
90001260-49 = "S-Sensei, você está bem?"
90001260-57 = "（A visão escureceu……）"
90001260-58 = "（Fui tomado por tontura e sono……）"
90001260-64 = "Sensei! Aguente firme!!"
90001260-65 = "[ns1] \"Ugh…….\"\n[ns2] \"Só mais 5 minutos…….\""
90001260-68 = "Arona-senpai, isso é……."
90001260-69 = "Está tudo bem, Plana-chan! #nEu cuido disso!"
90001260-70 = "Por favor, Arona-senpai. #nEu também vou dar suporte."
90001260-71 = "……A causa parece ser algum tipo de gás. #nNesse caso, primeiro―― pronto, impedi que o Sensei inalasse mais!"
90001260-72 = "Análise. Incolor, inodoro. Toxicidade…… presente. #nAfeta as células nervosas, mas felizmente, o nível de perigo parece ser relativamente baixo."
90001260-73 = "Não há risco de vida para os alunos. #nSe descansarem um pouco, devem acordar logo."
90001260-74 = "No entanto, a inalação prolongada não é recomendada. #nAfinal, ainda é tóxico."
90001260-75 = "Hum, falando de coisas tão complicadas…… #nSinto que até eu estou ficando com sono……."
90001260-76 = "Arona-senpai, se nós também dormirmos……."
90001260-77 = "B-brincadeira! #nNão tem como eu dormir de verdade!"
90001260-78 = "Afirmação. #nNessas horas, a Arona-senpai é até que confiável."
90001260-79 = "A-até que confiável!?"
90001260-80 = "Ah, Sensei! A Kei está se aproximando!"
90001260-82 = "[ns] \"……Kei?\""
90001260-83 = "Ah, você está bem. #nVocê é mais resistente do que eu pensava."
90001260-84 = "……Hm? Não, isso é estranho. #nDeixando a mim e a Alice de lado, por que o Sensei também não foi afetado?"
90001260-85 = "Uwaaa! #nNinguém está acordando de jeito nenhum!"
90001260-86 = "A diferença entre o Sensei e as outras pessoas……."
90001260-88 = "（Será que……？）"
90001260-90 = "Uuu, é um evento de redução de status……. #nComo não consegui proteger o grupo, os buffs dos meus aliados desapareceram."
90001260-91 = "Deste jeito, não conseguirei usar 120% do meu poder……."
90001260-93 = "[ns] \"Eles estão dormindo?\""
90001260-94 = "……Eh? Ah, sim. Acredito que não haja grandes impactos nos sinais vitais. #nMas não podemos continuar assim…… ainda mais com o tempo que nos resta."
90001260-95 = "Por enquanto, vou explicar apenas os pontos principais sobre o que aconteceu até o Sensei acordar."
90001260-96 = "Há pouco, descobri algo parecido com um painel de toque no centro do depósito."
90001260-98 = "Embora não tenha reagido a mim, quando a Alice tocou nele――"
90001260-99 = "A tela brilhou por um instante e depois ficou piscando sem parar…… #nAlice, será que eu fiz algo errado……?"
90001260-101 = "Tentei com outras alunas também, mas não houve mudança."
90001260-102 = "Com certeza, a peça necessária para desativar o mecanismo está faltando…… #nAlice consegue sentir."
90001260-103 = "O que quer que seja essa peça…… de qualquer forma, só falta o Sensei."
90001260-104 = "Pode tocar no painel, por favor?"
90001260-105 = "[s3] \"Antes disso, quero perguntar……\"\n[s4] \"Você usou as mãos das meninas que estão dormindo sem permissão?\""
90001260-108 = "Algum problema? #nEu apenas coloquei em prática o que podia ser testado."
90001260-109 = "A Alice tentou impedir, mas……"
90001260-110 = "……Se fosse a Rio, ela provavelmente concordaria que foi uma decisão racional."
90001260-112 = "[ns] \"Dito dessa forma, não tenho como discordar…….\""
90001260-114 = "（Incentivado por Kei, você coloca a mão no painel）"
90001260-115 = "（Então……）"
90001260-122 = "[ns] \"Eh……?\""
90001260-123 = "Este emblema é…… da Academia Federal de Red Winter?"
90001260-127 = "（Assim que uma música, ao mesmo tempo leve e imponente, começou a tocar）"
90001260-128 = "（Em seguida, uma voz gravada pôde ser ouvida……）"
90001260-130 = "[56cd7b][log=모니터]Bem-vindos, camaradas. ……Embora talvez vocês não sejam camaradas.[/log]"
90001260-132 = "[56cd7b][log=모니터]Bem-vindos ao depósito de sementes de Red Winter.[/log]"
90001260-134 = "[ns] \"……O que é isso?\""
90001260-135 = "[56cd7b]Bem-vindos, camaradas. ……Embora talvez vocês não sejam camaradas."
90001260-136 = "[56cd7b]Bem-vindos ao depósito de sementes de Red Winter."
90001260-137 = "Deve ser algum tipo de sistema de gerenciamento. #nProvavelmente está reproduzindo um vídeo gravado previamente."
90001260-139 = "[56cd7b][log=모니터]Este lugar é o berço da vida, construído para se preparar para o fim do mundo.[/log]"
90001260-141 = "[56cd7b][log=모니터]É a última luz deixada por uma civilização brilhante.[/log]"
90001260-144 = "[56cd7b][log=모니터]Como boas-vindas, eu adoraria tocar minha música favorita para vocês, mas…….[/log]"
90001260-146 = "[56cd7b][log=모니터]Infelizmente, ela foi classificada como música proibida ontem, então ficará para uma próxima oportunidade.[/log]"
90001260-148 = "[ns] \"……Bem a cara de Red Winter.\""
90001260-149 = "[56cd7b][log=모니터]Esta instalação não foi feita apenas para você, que está aí, #n[wa:1500][56cd7b]mas também para nós, do presente.[/log]"
90001260-152 = "[56cd7b][log=모니터]\"Mesmo que o mundo acabe, podemos recomeçar.\"[/log]"
90001260-154 = "[56cd7b][log=모니터]A existência do depósito de sementes tornou-se o apoio das pessoas――[/log]"
90001260-157 = "[56cd7b][log=모니터]E elas puderam viver tranquilamente, sem medo de nada.[/log]"
90001260-159 = "[56cd7b][log=모니터]Claro, supondo que em algum futuro, o fim tenha chegado…….[/log]"
90001260-161 = "[56cd7b][log=모니터]Não tenho como saber qual foi o motivo disso――[/log]"
90001260-164 = "[56cd7b][log=모니터]No momento do fim, quem é você, que está ouvindo esta gravação……? #n[wa:1500][56cd7b]Só de imaginar, fico empolgada.[/log]"
90001260-166 = "Alice não entende bem. #nSerá que é um NPC daqui……?"
90001260-168 = "[56cd7b][log=모니터]Ao construir esta instalação, aconteceram muitas coisas.[/log]"
90001260-170 = "[56cd7b][log=모니터]Até mesmo diluir o pudim para cobrir os custos de construção…… #n[wa:1500][56cd7b]hoje em dia, são boas lembranças.[/log]"
90001260-173 = "[56cd7b][log=모니터]Só espero que aqueles que herdarem isso não passem por dificuldades.[/log]"
90001260-176 = "[56cd7b][log=모니터]De qualquer forma, o momento da destruição chegou.#n[wa:1500][56cd7b]Parece que nossos esforços, feitos com tanto sacrifício, foram recompensados.[/log]"
90001260-178 = "……Isso é desagradável.#nVocê está tratando a destruição com leviandade demais."
90001260-180 = "[56cd7b][log=모니터]Bem, a introdução se estendeu demais.#n[wa:1500][56cd7b]Esta instalação é um depósito de sementes. A última luz a brilhar na escuridão da destruição.[/log]"
90001260-183 = "[56cd7b][log=모니터]Para manter as sementes seguras até o momento oportuno, esta instalação possui mecanismos de defesa.[/log]"
90001260-185 = "[56cd7b][log=모니터]Além disso, para mantê-la em estado impecável, os testes de funcionamento foram omitidos.[/log]"
90001260-188 = "[56cd7b][log=모니터]Ou seja, aquilo em que você tocou, ou pretende tocar, é...[/log]"
90001260-190 = "[56cd7b][log=모니터]Algo que nem nós mesmos jamais tocamos.[/log]"
90001260-192 = "[56cd7b][log=모니터]Esteja devidamente preparado para a ativação.[/log]"
90001260-194 = "[ns5] \"Para mantê-la em estado impecável...\"\n[ns6] \"Não fizeram nenhum teste!?\""
90001260-197 = "[56cd7b]Ou seja, aquilo em que você tocou, ou pretende tocar, é..."
90001260-198 = "[56cd7b]Algo que nem nós mesmos jamais tocamos."
90001260-199 = "[56cd7b]Esteja devidamente preparado para a ativação."
90001260-200 = "O que o projetista tinha na cabeça!?"
90001260-202 = "[56cd7b][log=모니터]Ah, e mais uma coisa. A entrada até esta instalação administrativa da 3ª área é permitida, mas—[/log]"
90001260-204 = "[56cd7b][log=모니터]O 2º depósito, logo adiante, não pode ser acessado sem os procedimentos do comitê orientador.[/log]"
90001260-207 = "[56cd7b][log=모니터]É uma instalação importante onde 70% de todas as sementes estão armazenadas.[/log]"
90001260-209 = "[56cd7b][log=모니터]Caso cause danos à instalação ou tente invadi-la à força—[/log]"
90001260-211 = "[56cd7b][log=모니터]Mesmo que tenhamos que desistir das outras instalações, nós... nós... hum...[/log]"
90001260-214 = "[56cd7b][log=모니터]...Minha mente não está funcionando direito.#n[wa:1500][56cd7b]Não consigo nem tomar um café decente ultimamente, será falta de cafeína?[/log]"
90001260-217 = "[56cd7b][log=모니터]Hum... algo cruel...[/log]"
90001260-219 = "[56cd7b][log=모니터]Se possível, algo que você considere a pior coisa possível.#n[wa:1500][56cd7b]...O que você mais detesta?[/log]"
90001260-221 = "E-eh, bem... talvez deletar os dados salvos?"
90001260-223 = "[56cd7b][log=모니터]…………Entendo. Então será isso. Faremos com que você passe por isso.[/log]"
90001260-225 = "[56cd7b][log=모니터]Não tenho como saber o que você disse, mas agradeço pela cooperação.[/log]"
90001260-227 = "[56cd7b][log=모니터]De qualquer forma, não toque no 2º depósito.[/log]"
90001260-230 = "[56cd7b][log=모니터]Embora... seja uma pena não poder mostrar o interior.[/log]"
90001260-232 = "[56cd7b][log=모니터]Originalmente, não tínhamos a intenção de usá-lo como depósito...#n[wa:1500][56cd7b]Aquele lugar é muito mais bem conservado que a 3ª área.[/log]"
90001260-235 = "[56cd7b][log=모니터]Bem, isso provavelmente também faz parte da providência do mundo.[/log]"
90001260-237 = "[56cd7b][log=모니터]Assim como o primeiro blini que se frita sempre sai com o formato deformado—#n[wa:1500][56cd7b]nem tudo sai como planejamos.[/log]"
90001260-240 = "[56cd7b][log=모니터]Esqueça o que passou, e na próxima destruição...#n[wa:1500][56cd7b]vamos nos esforçar para fazer melhor![/log]"
90001260-242 = "A próxima... destruição?"
90001260-243 = "Waaah, eu não entendo nada do que essa pessoa está dizendo!"
90001260-245 = "[56cd7b][log=모니터]Com isso, encerro as orientações e avisos.[/log]"
90001260-247 = "[56cd7b][log=모니터]Espero que a destruição que virá não seja um fardo pesado.[/log]"
90001260-250 = "[56cd7b][log=모니터]E então—[/log]"
90001260-253 = "[56cd7b]E então———"
90001260-256 = "[56cd7b]E então—————"
90001260-260 = "[FF6666][log=모니터]〈Ué? Apareceu algo estranho... hein? Já acabou o espaço de armazenamento?〉[/log]"
90001260-262 = "[FF6666][log=모니터]〈É que...〉[/log]"
