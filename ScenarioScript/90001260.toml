90001260-323 = "ファイルプレイバック終了"
90001260-324 = "データプレイバック終了"
90001260-325 = "追加データなし"
90001260-327 = "……何ですか、これ。"
90001260-328 = "[ns7] \"重要な内容が含まれてたような……。\"\n[ns8] \"第2貯蔵庫には行くなって言ってたよね？\""
90001260-331 = "いざとなれば、他の施設を諦めてでも防衛するつもりらしいですね。"
90001260-332 = "残酷な仕打ちだとか、明らかな脅しまでして。"
90001260-333 = "ううっ、すごく頑張って育ててきたので……。#nセーブデータだけは消さないでください……。"
90001260-334 = "（……ゲームはほどほどにするよう、後でお説教ですね）"
90001260-340 = "灯りが……？"
90001260-341 = "……またですか。芸がないですね。"
90001260-342 = "うわぁーん！真っ暗です！#n何も見えません……！"
90001260-343 = "アリス、私から離れないでください！"
90001260-344 = "なにか、信号のようなものが……？"
90001260-345 = "……！"
90001260-349 = "こ、こんにちは……みなさん、先生。#nまた会いましたね……えへへ。"
90001260-350 = "ほんと、しぶといね。"
90001260-351 = "いっそ全て諦めてしまえば楽になるというのに。"
90001260-352 = "[s9] \"それはできないよ。\"\n[s10] \"先生として、生徒を諦めるわけにはいかない。\""
90001260-356 = "私たちも生徒だ！って言ったら……先生は諦めないつもり？"
90001260-357 = "[s11] \"もちろん。\"\n[s12] \"編入書類は用意してあるから、いつでも連絡してね。\""
90001260-363 = "うわぁ……もしかして冗談が通じないの？"
90001260-365 = "こ、こういうのをダメ人間、と言うのでしょうか……？"
90001260-366 = "ご期待に沿えず申し訳ないですが……私たちは一切興味ありませんので。"
90001260-367 = "編入も、所詮は人間が作ったシステムでしょう？#n私たちとは無関係ですから。"
90001260-369 = "[ns13] \"編入したくて会いに来たのかなって思ったんだけど……。\"\n[ns14] \"それなら、どうして来てくれたの？\""
90001260-372 = "すごい……全然空気読まないんだ……。"
90001260-373 = "とにかく、私たちが言いたいことは――ここを越えたら、もう取り返しがつかないよ。"
90001260-374 = "ええ。文字通り「一線を越える」という意味です。"
90001260-376 = "ソフの言葉を借りると……宣戦布告に来ました。"
90001260-378 = "次回;罪と罰"
