[translation]
1004803-1 = "見落とし"
1004803-2 = "（モモトークでのサオリとのやり取りが何となく気になって、サオリの元を訪れた）"
1004803-3 = "[s] \"たしか、この辺の工事現場だったはずだけど……。\""
1004803-7 = "[ns] \"こっちかな……？\""
1004803-13 = "（音が大きい方へと向かうと、サオリの姿が見つかった）"
1004803-14 = "[s] \"あっ、サオ――\""
1004803-15 = "今日の仕事は終えた。給与を貰えるか。"
1004803-16 = "ははっ！"
1004803-17 = "だからよお嬢ちゃん、何度も言ったがあげられないんだ。"
1004803-18 = "……それは何故だ？"
1004803-19 = "この3日間、1円も給与を受け取っていない。紹介された時の話と違うと思うが。"
1004803-20 = "まあ、とにかく無理なものは無理なんだ。"
1004803-21 = "というかそもそも……"
1004803-25 = "お嬢ちゃん、契約書すら交わしてないんだろ？"
1004803-26 = "……！"
1004803-27 = "[s] \"ちょ、ちょっと……！？\""
1004803-31 = "先生？どうしてここに……。"
1004803-32 = "んー？"
1004803-33 = "誰だあんた、悪いけど関係無いやつは――"
1004803-34 = "[s] \"関係あります！さっきのはどういうことですか！？\""
1004803-35 = "どういうって……文字通りの意味だが？"
1004803-36 = "契約書……。"
1004803-37 = "[s] \"契約書無しに仕事なんてこと無いでしょう！　それはどういう――\""
1004803-38 = "……それは、書かないといけないのか？"
1004803-39 = "[s] \"……うん？\""
1004803-40 = "はっはっはっは！これは傑作だ！"
1004803-41 = "あんたがどうやってここに辿り着いたのかは知らねぇが……"
1004803-42 = "面白いほど世間知らずのお嬢ちゃんだな！"
1004803-43 = "[s] \"あの、すみません、状況を整理させてもらっても良いですか……？\""
1004803-45 = "（一通り説明してもらい、どうにか状況を把握できた）"
1004803-48 = "[ns1] \"ブラックマーケットで依頼を紹介してもらったものの、\"\n[ns2] \"契約書を書いてなかった……？"
1004803-49 = "この任務を始めた時、特段そういったことは言われなかった。"
1004803-50 = "この任務を始めた時、特段そういったことは言われなかった。"
1004803-51 = "こちらはただ、言われた通りに作業を進めて……"
1004803-52 = "先生？"
1004803-53 = "[ns] \"詐欺だよそれ！抗議してくる！\""
1004803-56 = "はっ、詐欺だと？人聞きの悪いことを言うじゃないか。"
1004803-57 = "そもそもの原因は、そこのお嬢ちゃんが「うっかり」契約書を書かなかった事だろう？"
1004803-58 = "こっちがわざわざ、その責任を負う必要は無いんじゃねぇか？"
1004803-59 = "[s] \"じゃあ、今までサオリが働いた分は……！\""
1004803-60 = "ま、ボランティアってことだな。"
1004803-66 = "助かったぜ、見た目の割に体力もあるしな。"
1004803-67 = "常人の倍以上は動いてくれた。"
1004803-68 = "おかげで安上がりな上に早く片付いたぜ、はははっ！"
1004803-73 = "……。"
1004803-74 = "[s] \"無茶苦茶なことを……！\""
1004803-75 = "ま、こっちだって根っからのワルってわけじゃねぇ。"
1004803-76 = "今から契約書を交わしたって良い。そしたら勿論、働いた分の給料は出る。"
1004803-77 = "[s] \"じゃあ……！\""
1004803-78 = "ま、もちろん「この後」の分だけだがな。"
1004803-79 = "……。"
1004803-80 = "ま、それを遡って払うわけにもいかねぇだろ。せっかくのボランティア精神を傷つけるわけにもいかないからな！はははははっ！"
1004803-81 = "ここにある残りの資材を運んだら、その分はやるが……さあ、どうする？"
1004803-85 = "まあ、嫌なら無理にとは言わねぇ。"
1004803-86 = "もちろんその時は、びた一文払えねぇがな！"
1004803-87 = "[s] \"汚いことを――\""
1004803-88 = "分かった。"
1004803-89 = "[s] \"サオリ！？\""
1004803-90 = "お金が必要なことは確かだ、やるしかない。"
1004803-91 = "ははっ、良い姿勢じゃねぇか！ブラックマーケットには似合わねぇくらい堅実なお嬢ちゃんだぜ！"
1004803-96 = "[ns] \"……！\""
1004803-103 = "な、何だ！？"
1004803-104 = "やる気か！？"
1004803-108 = "[ns] \"私も手伝うよ。\""
1004803-111 = "……なぜお前まで？"
1004803-112 = "[s] \"二人でやった方が早いし。\""
1004803-116 = "ま、まあ別に止めはしねぇが……"
1004803-117 = "二人分払うわけじゃねぇからな！"
1004803-128 = "ぐっ、本当に全部やりやがって……"
1004803-129 = "ほらよ、約束の報酬だ！"
1004803-135 = "ああ、受け取った。"
1004803-140 = "[ns] \"何だか大変だったね……。\""
1004803-141 = "……済まない、先生。"
1004803-142 = "[s] \"うん？\""
1004803-143 = "私のせいだ。"
1004803-144 = "契約書とは、大事なことだったんだな。"
1004803-145 = "[s] \"そうだね……まあ、今回の学びってことで。\""
1004803-146 = "ああ……"
1004803-147 = "今後は起きないように、胸に留めておくとしよう。"
1004803-148 = "……助かった、感謝する。"
1004803-149 = "[s] \"サオリにお礼言われた！良い日だ！\""
1004803-153 = "……用は済んだんだ、帰るぞ。"
1004803-154 = "[s] \"うん、またね、サオリ。\""
1004803-155 = "……。"
1004803-156 = "ああ。"
