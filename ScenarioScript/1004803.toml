[translation]
1004803-1 = "Omissão"
1004803-2 = "（Fiquei um pouco preocupado com a conversa com Saori no MomoTalk, então decidi visitá-la）"
1004803-3 = "[s] \"Se não me engano, deveria ser neste canteiro de obras...\""
1004803-7 = "[ns] \"Será que é por aqui...?\""
1004803-13 = "（Ao seguir em direção ao barulho mais alto, encontrei Saori）"
1004803-14 = "[s] \"Ah, Sao--\""
1004803-15 = "Terminei o trabalho de hoje. Posso receber meu pagamento?"
1004803-16 = "Haha!"
1004803-17 = "Olha, mocinha, já disse várias vezes que não posso te dar nada."
1004803-18 = "......Por que isso?"
1004803-19 = "Nos últimos três dias, não recebi um centavo sequer. Acho que isso é diferente do que foi combinado quando me indicaram."
1004803-20 = "Bem, de qualquer forma, o que não dá, não dá."
1004803-21 = "Aliás, para começar..."
1004803-25 = "Mocinha, você nem assinou um contrato, não é?"
1004803-26 = "......!"
1004803-27 = "[s] \"E-espera um pouco...!?\""
1004803-31 = "Sensei? Por que você está aqui..."
1004803-32 = "Hmm?"
1004803-33 = "Quem é você? Desculpe, mas quem não tem nada a ver com isso--"
1004803-34 = "[s] \"Eu tenho tudo a ver com isso! O que foi que você disse agora há pouco!?\""
1004803-35 = "Como assim 'o que eu disse'... é exatamente o que parece, não é?"
1004803-36 = "Contrato..."
1004803-37 = "[s] \"Não existe trabalho sem contrato! O que significa isso--\""
1004803-38 = "......Isso é algo que precisa ser escrito?"
1004803-39 = "[s] \"......Hein?\""
1004803-40 = "Hahahaha! Essa é de matar!"
1004803-41 = "Não sei como você chegou até aqui, mas..."
1004803-42 = "Você é uma mocinha incrivelmente ingênua!"
1004803-43 = "[s] \"Com licença, poderia me deixar organizar a situação...?\""
1004803-45 = "（Após receber uma explicação completa, consegui entender a situação）"
1004803-48 = "[ns1] \"Você conseguiu o trabalho através do Mercado Negro, mas\"\n[ns2] \"não assinou nenhum contrato...?\""
1004803-49 = "Quando comecei esta missão, não me disseram nada específico sobre isso."
1004803-50 = "Quando comecei esta missão, não me disseram nada específico sobre isso."
1004803-51 = "Eu apenas segui com o trabalho conforme me pediram..."
1004803-52 = "Sensei?"
1004803-53 = "[ns] \"Isso é um golpe! Vou protestar contra isso!\""
1004803-56 = "Ha, golpe? Que acusação feia de se fazer."
1004803-57 = "A causa de tudo isso não é o fato de que a mocinha ali 'esqueceu' de assinar o contrato?"
1004803-58 = "Não acho que eu precise assumir a responsabilidade por isso, não é?"
1004803-59 = "[s] \"Então, o que a Saori trabalhou até agora...!\""
1004803-60 = "Bem, digamos que foi trabalho voluntário."
1004803-66 = "Você me salvou, e apesar da aparência, tem bastante resistência."
1004803-67 = "Você trabalhou mais que o dobro de uma pessoa comum."
1004803-68 = "Graças a isso, saiu barato e terminamos rápido, hahahaha!"
1004803-73 = "......"
1004803-74 = "[s] \"Que absurdo...!\""
1004803-75 = "Bem, eu também não sou um vilão de raiz."
1004803-76 = "Podemos assinar o contrato agora. Se fizermos isso, é claro que você receberá pelo que trabalhou."
1004803-77 = "[s] \"Então...!\""
1004803-78 = "Bem, claro, apenas pelo que for feito 'daqui para frente'."
1004803-79 = "……。"
1004803-80 = "Bem, não tem como pagar retroativamente por isso, né? E eu não posso ferir esse seu espírito voluntário! Hahahaha!"
1004803-81 = "Se você transportar o resto dos materiais que estão aqui, eu te pago por essa parte... E então, o que vai fazer?"
1004803-85 = "Bem, se não quiser, não vou te forçar."
1004803-86 = "Claro que, nesse caso, não pagarei nem um centavo!"
1004803-87 = "[s] \"Que sujeira...\""
1004803-88 = "Entendido."
1004803-89 = "[s] \"Saori!?\""
1004803-90 = "É um fato que precisamos do dinheiro, não temos escolha."
1004803-91 = "Haha, essa é uma ótima atitude! Você é uma garota sensata demais para o Mercado Negro!"
1004803-96 = "[ns] \"……！\""
1004803-103 = "O-o que foi!?"
1004803-104 = "Vai encarar!?"
1004803-108 = "[ns] \"Eu também vou ajudar.\""
1004803-111 = "……Por que você também?"
1004803-112 = "[s] \"É mais rápido se fizermos em duas.\""
1004803-116 = "B-bem, não vou te impedir, mas..."
1004803-117 = "Eu não vou pagar o dobro só porque são duas!"
1004803-128 = "Droga, vocês realmente terminaram tudo..."
1004803-129 = "Aqui, a recompensa prometida!"
1004803-135 = "Ah, recebi."
1004803-140 = "[ns] \"Foi bem difícil, não é...\""
1004803-141 = "……Sinto muito, Sensei."
1004803-142 = "[s] \"Hm?\""
1004803-143 = "A culpa foi minha."
1004803-144 = "Contratos são coisas importantes, pelo visto."
1004803-145 = "[s] \"Pois é... bem, vamos considerar isso como um aprendizado.\""
1004803-146 = "É..."
1004803-147 = "Vou guardar isso na memória para que não aconteça de novo."
1004803-148 = "……Obrigada pela ajuda, agradeço."
1004803-149 = "[s] \"A Saori me agradeceu! Que dia bom!\""
1004803-153 = "……Já terminamos aqui, vamos embora."
1004803-154 = "[s] \"Sim, até mais, Saori.\""
1004803-155 = "……。"
1004803-156 = "É."
