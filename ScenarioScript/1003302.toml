[translation]
1003302-1 = "Um reencontro gentil"
1003302-2 = "（Saí do Schale para resolver um pequeno assunto e, enquanto caminhava pela cidade...）"
1003302-3 = "Ei, você aí!"
1003302-4 = "Hã!? Q-quem é você!?"
1003302-5 = "Por causa desse seu espirro, a chefe tomou um susto e derrubou o sorvete dela! O doce que ela estava esperando tanto para comer!"
1003302-6 = "Já que é assim, você vai ter que pagar pelo meu \"Sorvete de Baunilha Giga Jumbo Deluxe com Frutas Edição Limitada de Primavera Mk.02\"!"
1003302-7 = "M-mas que absurdo! Só por causa de um espirro!?"
1003302-8 = "[s] \"Com licença...\""
1003302-9 = "Hã? Quem é você?"
1003302-10 = "Chefe, esse aí é o professor do \"Schale\"."
1003302-11 = "Ah, o famoso professor do Schale... E o que essa celebridade quer com a gente? Espero que não esteja pensando em atrapalhar, né?"
1003302-12 = "Bom, se for esse o caso, não me importo. Que tal você pagar pelo sorvete que derrubamos?"
1003302-13 = "[s1] \"Não sei se devo...\"\n[s2] \"Eu adoraria comprar, mas estou um pouco sem dinheiro agora...\""
1003302-16 = "Tsc! Tanto faz, então vai ter que pagar com o seu corpo—"
1003302-27 = "[ns] \"...?\""
1003302-28 = "M-muito obrigado por me salvar!"
1003302-29 = "Eu quase fui assaltado só por ter espirrado!"
1003302-30 = "Como esperado do professor do Schale!"
1003302-31 = "[s] \"Não, eu não fiz nada...\""
1003302-32 = "Deve ser por causa da mudança de estação, não consigo parar de espirrar..."
1003302-33 = "A..."
1003302-34 = "Atchim!"
1003302-38 = "Só por causa de um espirro!?"
1003302-43 = "[ns3] \"Um ataque bem nesse momento, será que...\"\n[ns4] （Preciso ir para outro lugar...!）"
1003302-47 = "（Desviando das balas e explosões, corri para uma área deserta）"
1003302-51 = "Espere! Esta área está em obras!"
1003302-52 = "Haverá uma detonação em breve, a passagem está proibida—"
1003302-56 = "O quê!? Você detonou o local no meu lugar!?"
1003302-62 = "（Depois disso, continuei desviando das explosões e fui para o lugar mais isolado que consegui encontrar...）"
1003302-64 = "Ei, aquele não é o professor do Schale?"
1003302-65 = "É ele mesmo. Ei, professor!"
1003302-66 = "Por que está correndo com essa cara vermelha? Aconteceu algo divertido..."
1003302-71 = "Gah!?"
1003302-76 = "[ns] \"...Desculpe!\""
1003302-86 = "（Corri desesperadamente, sem nem saber quanto tempo passou, até chegar a um lugar onde não havia quase ninguém）"
1003302-89 = "[ns] \"Hah, hah... Acho que aqui dá...\""
1003302-93 = "Fufufu. Finalmente, todos os intrusos foram embora..."
1003302-98 = "[ns5] \"...Eu sabia.\"\n[ns6] \"Era você, Wakamo...\""
1003302-99 = "...? Então o professor já sabia que eu estava aqui...?"
1003302-100 = "...? Então o professor já sabia que eu estava aqui...?"
1003302-101 = "Isso significa que..."
1003302-102 = "Você veio até aqui para ficar a sós comigo...?"
1003302-103 = "[s] \"E-eh, bem...\""
1003302-104 = "Eu, eu...!"
1003302-107 = "— Estou tão feliz...!"
1003302-110 = "— Esta Wakamo,"
1003302-112 = "— Tudo foi feito apenas para [wa:1650] encontrar você... [wa:1000]"
1003302-115 = "— De alguma forma, eu queria [wa:1950] expressar meus sentimentos,"
1003302-117 = "— Este meu amor, [wa:1800] eu queria te contar..."
1003302-120 = "[wa:100]— O fato de termos [wa:200] nos encontrado assim [wa:600] certamente,"
1003302-122 = "― O fio vermelho do destino nos guiando... [wa:1700]"
1003302-125 = "― Ah, [wa:1300] ah... [wa:1100] s- [wa:1150] sendo encarada [wa:650] desse jeito...!"
1003302-127 = "― Mesmo sendo eu, [wa:2600] acabo ficando envergonhada..."
1003302-130 = "― Apenas com esse seu olhar, [wa:500] [wa:2150] sinto uma inquietação"
1003302-132 = "― transbordando [wa:500] por todo o meu corpo... ah."
1003302-135 = "[wa:100] ― Mas... [wa:1900] se é isso [wa:1650] que você [wa:1150] deseja... [wa:2350] sim♡"
1003302-138 = "― Vamos, [wa:1350] venha aqui."
1003302-140 = "― Fique ainda mais, [wa:2250] ainda mais perto de mim... [wa:2300] ufufufufu♡"
1003302-143 = "Vamos, Sensei, venha mais para perto de mim..."
1003302-144 = "[s] \"Wakamo.\""
1003302-145 = "Hya...!?"
1003302-146 = "[s7] \"Não pode fazer isso, ficar causando explosões desse jeito.\"\n[s8] \"Eu disse que não deve incomodar as outras pessoas, não disse?\""
1003302-149 = "Ma-mas..."
1003302-150 = "Eu simplesmente não consegui me conter...!"
1003302-151 = "[s] \"De qualquer forma, não é bom ficar incomodando as outras alunas sem motivo.\""
1003302-152 = "Ma-mesmo assim, essa Wakamo, os sentimentos escondidos no meu peito cresceram..."
1003302-153 = "A ponto de eu mesma não conseguir controlar..."
1003302-154 = "Uuu..."
1003302-155 = "[s] \"Eu fico feliz com isso, mas você precisa se esforçar para controlar.\""
1003302-156 = "……!! "
1003302-157 = "N-não me odeie!"
1003302-158 = "Se, por um acaso, você acabasse me odiando, eu...!"
1003302-159 = "Desculpe, desculpe, desculpe! Desculpe...!"
1003302-160 = "De agora em diante, vou me esforçar para não decepcionar o Sensei...! Por favor...!"
1003302-161 = "Por favor, não me odeie..."
1003302-162 = "[s] \"...Vamos nos esforçar daqui para frente.\""
1003302-166 = "Sensei..."
1003302-170 = "Ah... mais uma vez, algo atrapalhou entre você e eu..."
1003302-171 = "Então, Sensei. Esta Wakamo irá se dedicar novamente para não decepcioná-lo."
1003302-172 = "Hoje, vou me retirar por aqui..."
1003302-173 = "Posso vir vê-lo novamente algum dia...?"
1003302-174 = "[s] \"Sim, estarei esperando.\""
1003302-175 = "……Sim! Então, até mais!"
1003302-180 = "(Assim, me despedi de Wakamo, que partiu para algum lugar com uma energia incrível)"
