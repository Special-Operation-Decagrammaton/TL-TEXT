[translation]
1003302-1 = "優しい再会"
1003302-2 = "（ちょっとした用事でシャーレの外に出て、街を歩いている時……）"
1003302-3 = "ちょっとちょっとぉ！"
1003302-4 = "ひっ！？な、何ですか！？"
1003302-5 = "今お前がくしゃみしたせいで、姐さんがビックリしてアイスを落としちゃったじゃねぇか！せっかくの姐さんの楽しみが！"
1003302-6 = "こうなったら、私の「春季限定・ギガジャンボデラックスバニラソフトのフルーツ添えMk.02」を弁償してもらわないとなぁ！"
1003302-7 = "そ、そんな！ただくしゃみをしただけで！？"
1003302-8 = "[s] \"あのー……。\""
1003302-9 = "あん？何だお前？"
1003302-10 = "姐さん、こいつあの「シャーレ」の先生っすよ。"
1003302-11 = "へえ、あのシャーレの先生か……で、その有名人があたしらに何の用だい？まさか邪魔するってわけじゃないよなあ？"
1003302-12 = "まあそれならそれで構わない、あんたにこのアイスの分を弁償してもらおうか！"
1003302-13 = "[s1] \"それはどうしよっかな……。\"\n[s2] \"買ってあげたいところなんだけど、今は懐が寂しくて……。\""
1003302-16 = "ちっ！まあ良い、だったらその身体で払って――"
1003302-27 = "[ns] \"……？\""
1003302-28 = "た、助けていただきありがとうございます！"
1003302-29 = "危うく、くしゃみをしただけでカツアゲされるところでした！"
1003302-30 = "さすがシャーレの先生！"
1003302-31 = "[s] \"いや、私は何も……。\""
1003302-32 = "やっぱり季節の変わり目だからですかね、くしゃみが止まらなくて……"
1003302-33 = "へ、"
1003302-34 = "へくしゅっ！"
1003302-38 = "くしゃみをしただけなのにっ！？"
1003302-43 = "[ns3] \"このタイミングで襲撃って、もしかして……。\"\n[ns4] （どこか別の場所に……！）"
1003302-47 = "（降り注ぐ弾丸と爆発を避けつつ、人けの無い方へと駆け出した）"
1003302-51 = "待て！ここは現在、道路工事を行っている！"
1003302-52 = "もうすぐ発破作業があるから通行禁止――"
1003302-56 = "なぁっ！？代わりに発破作業をしてくれただと！？"
1003302-62 = "（その後もどうにか爆発を避けつつ、できる限り誰もいなさそうな方へと向かい……）"
1003302-64 = "おっ、あれシャーレの先生じゃん？"
1003302-65 = "マジだ。お～い、先生！"
1003302-66 = "何真っ赤な顔して走ってんだよ、何か面白い事でも……"
1003302-71 = "ぐはぁっ！？"
1003302-76 = "[ns] \"……っ、ごめん！\""
1003302-86 = "（どれくらい走ったのか分からなくなるほど必死で走り、どうにかほとんど誰もいない場所へと辿り着いた）"
1003302-89 = "[ns] \"はぁ、はぁ……ここなら何とか……。\""
1003302-93 = "ふふふっ。ようやく邪魔者に、全員退場していただけましたね……。"
1003302-98 = "[ns5] \"……やっぱり？\"\n[ns6] \"ワカモだったんだね……。\""
1003302-99 = "……？先生は、私が来ていたことに既にお気づきだったと……？"
1003302-100 = "……？先生は、私が来ていたことに既にお気づきだったと……？"
1003302-101 = "それはつまり、"
1003302-102 = "私とこうして二人きりで会うために、ここまで……？"
1003302-103 = "[s] \"え、っと……？\""
1003302-104 = "私、私……！"
1003302-107 = "― 嬉しいです……！"
1003302-110 = "― このワカモ、"
1003302-112 = "― 全てはこうして[wa:1650]あなた様と会うため[wa:1000]だけに……！"
1003302-115 = "― どうにか直接、[wa:1950]この気持ちを、"
1003302-117 = "― この想いを、[wa:1800]お伝えしたくって……"
1003302-120 = "[wa:100]― こうして[wa:200]お会いできたのも[wa:600]きっと、"
1003302-122 = "― 赤い糸で結ばれた[wa:1700]運命のお導き……。"
1003302-125 = "― あ、[wa:1300]あぁ……[wa:1100]そ、[wa:1150]そんなに[wa:650]見つめられては……！"
1003302-127 = "― いくら私といえども、[wa:2600]恥ずかしくなってしまいます……。"
1003302-130 = "― あなた様の[wa:500]その視線だけで、[wa:2150]身体のあちこちから、"
1003302-132 = "― もどかしさが[wa:500]溢れ出して……っ。"
1003302-135 = "[wa:100]― ですが……[wa:1900]あなた様が[wa:1650]そう[wa:1150]お望みなのであれば……[wa:2350]はい♡"
1003302-138 = "― さあ、[wa:1350]どうぞこちらへ。"
1003302-140 = "― もっともっと、[wa:2250]私のお傍に……[wa:2300]うふふふふっ♡"
1003302-143 = "さぁ先生、もっと私の方へ……"
1003302-144 = "[s] \"ワカモ。\""
1003302-145 = "ひゃっ……！？"
1003302-146 = "[s7] \"ダメでしょ、あんなに爆発させたりして。\"\n[s8] \"他の人に迷惑かけちゃいけないって言ったでしょ？\""
1003302-149 = "で、ですが……"
1003302-150 = "私、どうしても堪えきれなくって……！"
1003302-151 = "[s] \"とにかく、やたらと他の生徒たちに迷惑をかけるのは良くないよ。\""
1003302-152 = "そ、それでもこのワカモ、胸に秘めたる思いが膨れて……"
1003302-153 = "自分でも制御できないほどに……"
1003302-154 = "うぅ……"
1003302-155 = "[s] \"それは嬉しいけど、そこは頑張ってもらわないと。\""
1003302-156 = "……っ！！"
1003302-157 = "き、嫌わないでください！"
1003302-158 = "もし、万が一あなた様に嫌われてしまうなんてことになっては、私……っ！"
1003302-159 = "ごめんなさいごめんなさいごめんなさい！ごめんなさい……！"
1003302-160 = "これから、先生をがっかりさせないように努力いたしますので……！どうか……！"
1003302-161 = "私のことを、嫌いにならないでください……。"
1003302-162 = "[s] \"……これからまた頑張ろうね。\""
1003302-166 = "先生……。"
1003302-170 = "あぁ……またしてもあなた様と私の間に邪魔が……。"
1003302-171 = "それでは先生。このワカモ、あらためて先生を落胆させぬよう、あらためて精進してまいります。"
1003302-172 = "今日は、この辺りで失礼させていただくのですが……。"
1003302-173 = "またこうしていつか、会いに来てもよろしいですか……？"
1003302-174 = "[s] \"うん、待ってるね。\""
1003302-175 = "……はいっ！ではまた！"
1003302-180 = "（そうしてすごい勢いでどこかに行ってしまったワカモを見送った）"
