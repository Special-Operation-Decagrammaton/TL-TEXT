[translation]
11160-2 = "Episódio 16; A verdade revelada"
11160-3 = "Força Tarefa/Sala de Aula"
11160-4 = "(Ele voltou para Abydos com Hifumi e verificaram os documentos juntos.)"
11160-5 = "(Bang!!)"
11160-6 = "O que é isso! ? O que diabos está acontecendo?! ?"
11160-7 = "...! !"
11160-8 = "O registo de recolha do veículo de transporte de dinheiro afirma que 7,88 milhões de ienes foram recolhidos em Abydos. #nCom certeza é aquele caminhão que veio até nossa escola."
11160-9 = "...No entanto, há um registro de que pouco depois disso, eles forneceram ``5 milhões de ienes em subsídios missionários'' à Brigada de Capacetes Katakata..."
11160-10 = "Isso significa... isso é..."
11160-12 = "Depois de receber nosso dinheiro, eles foram direto para o esconderijo da Gangue dos Capacetes e entregaram o subsídio da missão! ?"
11160-13 = "É uma missão...? Para a Brigada de Capacetes Katakata...?"
11160-14 = "É verdade que a pessoa por trás do grupo de capacetes é Kaiser Lohn?"
11160-17 = "……."
11160-18 = "……."
11160-19 = "……."
11160-20 = "O que você quer dizer! ? Eu não entendo! Se a escola falir, o dinheiro emprestado não será recuperado...#nPor que você faria algo assim...?"
11160-21 = "Hum..."
11160-22 = "Esta não parece ser responsabilidade exclusiva do banco. #nSó posso acreditar que a sede da Kaiser Corporation está funcionando..."
11160-23 = "……sim. É razoável olhar dessa forma."
11160-27 = "Muito obrigado a todos."
11160-28 = "Sinto muito por colocar você nessa situação estranha, Hifumi-san."
11160-29 = "Ah, ahaha…."
11160-30 = "Irei visitá-lo na próxima vez, então, por favor, diga oi."
11160-31 = "Sim claro."
11160-32 = "Embora os detalhes ainda não tenham sido revelados...#nIsso pode realmente ser uma evidência de que a Kaiser Corporation tem algum tipo de conexão com criminosos e forças anti-sociais."
11160-33 = "Quando eu voltar, reportarei esse fato ao Tea Party!"
11160-34 = "Além disso, em relação à situação atual de Abydos..."
11160-35 = "……."
11160-36 = "Bem, acho que você já conhece o Tea Party."
11160-37 = "Ah, sim! ?"
11160-38 = "Acho que a liderança de uma escola desse tamanho já teria percebido isso. #nTenho certeza que nem todo mundo está apenas se divertindo."
11160-39 = "Ah, é isso... embora eu saiba sobre todos vocês..."
11160-40 = "Sim, Hifumi-chan é uma garota inocente e boa. Mas o mundo não é desse tipo."
11160-41 = "……."
11160-42 = "Agradeço os sentimentos de Hifumi-chan, mas mesmo que eu a informe, não acho que haverá qualquer tipo de avanço e sinto que acabaremos entrando em pânico."
11160-43 = "E-É mesmo...?"
11160-44 = "Olha, Abydos está prestes a fechar agora, certo? Eles não têm o poder de controlar as ações de escolas gigantescas como Trinity e Gehenna. #nVocê entende o que quero dizer, certo?"
11160-45 = "...Mesmo que alguém faça algo ruim em nome de te apoiar, você não pode impedir...#n, não é?"
11160-46 = "...Bem, isso certamente é uma possibilidade. #nUgh... Política é difícil."
11160-47 = "Mas... Hoshino-senpai, você não está pensando de forma muito pessimista? #nIsso pode realmente ajudar você..."
11160-48 = "Uau ~ eu me transformei em um velho sujo que não consegue aceitar honestamente a gentileza dos outros."
11160-50 = "Abydos acabou nesta situação porque ignoramos a coisa do “por precaução”."
11160-51 = "……."
11160-52 = "……."
11160-53 = "Pois bem...."
11160-54 = "Bem..."
11160-55 = "Realmente... tantas coisas aconteceram em um dia."
11160-56 = "Sim, foi muito divertido."
11160-57 = "... Shiroko-senpai não foi o único que se divertiu?"
11160-58 = "Ah, hahaha... eu também me diverti."
11160-59 = "Bem, Faust-chan, obrigado pela sua ajuda."
11160-60 = "Por favor, pare de me chamar assim!"
11160-61 = "Ei, líder do grupo de maiôs mascarados!"
11160-62 = "Todo mundo... Hifumi está com problemas, não está?"
11160-63 = "Enfim...sei que continuará sendo difícil, mas por favor, dê o seu melhor. Estou torcendo por você."
11160-64 = "Bem, então... pessoal, nos vemos novamente."
11160-66 = "Obrigado a todos pelo seu trabalho duro. Vamos descansar hoje e nos encontrar novamente amanhã."
11160-67 = "Dissolvido."
11160-69 = "Da próxima vez: nuvens escuras se acumulando"
