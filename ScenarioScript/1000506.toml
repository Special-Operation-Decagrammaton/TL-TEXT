[translation]
1000506-1 = "真夜中のパトロール"
1000506-2 = "アビドス・市内外郭"
1000506-4 = "（夜の道で偶然ホシノに会った）"
1000506-5 = "うへ？先生？"
1000506-6 = "どうしたの？こんな時間に？"
1000506-7 = "[s1] \"散歩中。\"\n[s2] \"パトロール中。\""
1000506-9 = "うへ、アビドスの夜は怖いよ、先生。一人でこんなところを歩き回ってて大丈夫？"
1000506-11 = "うへ、アビドスの夜は怖いよ、先生。一人でこんなところを歩き回ってて大丈夫？"
1000506-12 = "他の学校に比べてかなり無法地帯なんだよ？もし不良とかに会ったら……。"
1000506-13 = "私？私は……その……パトロールっていうか、散歩というか……。"
1000506-14 = "あ、ここにいましたか！"
1000506-15 = "え、えっと、ええ？"
1000506-16 = "先ほど不良から助けてくれた方……！お礼を申し上げようと思ったのに急にいなくなったもので……。"
1000506-17 = "ありがとうございます、もしあなたじゃなかったら今月の家賃を全部盗られるところでした……。"
1000506-18 = "い、いや……わ、私はただ……。"
1000506-19 = "あ、アビドスの生徒さんなんですね。毎晩パトロールをされてると噂は聞いてましたが、こうやって実際に会うことになるとは。"
1000506-20 = "ありがとうございました！"
1000506-21 = "……。"
1000506-23 = "はあ……。"
1000506-24 = "[s] \"真夜中にパトロールしてたの？\""
1000506-25 = "いや、これはただの偶然の出来事っていうか……うーん……。"
1000506-26 = "……何か、言い訳をすればするほど泥沼にはまっていく感じだね。"
1000506-27 = "結構恥ずかしいから知らないふりをしてくれると助かるな～。"
1000506-28 = "[s] \"ホシノは素直じゃないんだね？\""
1000506-29 = "うあー！おじさんをからかうのは楽しいか！？"
1000506-31 = "……すごく楽しそうな表情じゃん！？"
1000506-32 = "[s] \"寝る時間まで削って、あんまり無理しないでね。\""
1000506-33 = "……えへへ。"
1000506-34 = "寝るのはもともと好きだし、盛大に寝てるよ。別に無理をしてるわけでもないし。"
1000506-35 = "……心配してくれてるの？このおじさんを心配してくれるのはやっぱり先生ぐらいだなー？"
1000506-36 = "うへへ。"
1000506-39 = "（ホシノが腕を組んでしがみついてきた）"
1000506-40 = "あっ、急に持病の貧血が……！"
1000506-41 = "めまいがするから家まで送ってほしいな、先生。"
1000506-42 = "ほら、早く行こう。さあ。か弱い生徒からのお願いだから。"
1000506-44 = "（通りがかった人がいてすぐに腕が外れたけれど、ホシノと仲良く家に帰った）"
