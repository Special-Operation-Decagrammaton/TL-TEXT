[translation]
1000506-1 = "Patrulha da Meia-Noite"
1000506-2 = "Abydos - Periferia da Cidade"
1000506-4 = "（Encontrei Hoshino por acaso na estrada à noite）"
1000506-5 = "Uhe? Sensei?"
1000506-6 = "O que está fazendo a essa hora?"
1000506-7 = "[s1] \"Estou passeando.\"\n[s2] \"Estou patrulhando.\""
1000506-9 = "Uhe, a noite em Abydos é perigosa, Sensei. Você tem certeza de que está tudo bem andar por aí sozinho?"
1000506-11 = "Uhe, a noite em Abydos é perigosa, Sensei. Você tem certeza de que está tudo bem andar por aí sozinho?"
1000506-12 = "Comparado a outras escolas, aqui é praticamente uma terra sem lei, sabe? E se você encontrar algum delinquente..."
1000506-13 = "Eu? Eu estou... bem... patrulhando, ou talvez passeando..."
1000506-14 = "Ah, você está aqui!"
1000506-15 = "Eh, hã, é?"
1000506-16 = "A pessoa que me salvou dos delinquentes mais cedo...! Eu queria te agradecer, mas você desapareceu tão rápido..."
1000506-17 = "Muito obrigada. Se não fosse por você, teriam roubado todo o meu dinheiro do aluguel deste mês..."
1000506-18 = "N-não... e-eu só estava..."
1000506-19 = "Ah, então você é uma aluna de Abydos. Já ouvi rumores de que você patrulha todas as noites, mas não esperava te encontrar assim."
1000506-20 = "Muito obrigada!"
1000506-21 = "..."
1000506-23 = "Haa..."
1000506-24 = "[s] \"Você estava patrulhando no meio da noite?\""
1000506-25 = "Não, isso foi só uma coincidência, sabe... hum..."
1000506-26 = "...Sinto que quanto mais tento me explicar, mais me afundo na lama."
1000506-27 = "É bem vergonhoso, então seria uma grande ajuda se você fingisse que não viu nada~."
1000506-28 = "[s] \"A Hoshino não é nada honesta, né?\""
1000506-29 = "Uaa! É divertido provocar a titia aqui, é!?"
1000506-31 = "...Você está com uma cara de quem está se divertindo muito, sabia!?"
1000506-32 = "[s] \"Não se esforce tanto, nem que para isso tenha que sacrificar seu sono.\""
1000506-33 = "...Ehehe."
1000506-34 = "Eu já gosto de dormir, e durmo bastante. Não estou me esforçando tanto assim."
1000506-35 = "...Você está preocupado comigo? Acho que o Sensei é o único que se preocupa com esta titia, né?"
1000506-36 = "Uhehe."
1000506-39 = "（Hoshino cruzou os braços e se agarrou a mim）"
1000506-40 = "Ah, minha anemia atacou de repente...!"
1000506-41 = "Estou tonta, então poderia me levar até em casa, Sensei?"
1000506-42 = "Vamos, ande logo. É um pedido de uma aluna frágil, sabe."
1000506-44 = "（Alguém passou por perto e ela soltou o braço rapidamente, mas voltamos para casa juntos）"
