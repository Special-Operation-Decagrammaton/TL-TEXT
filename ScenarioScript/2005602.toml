[translation]
2005602-1 = "深夜のおつかい"
2005602-2 = "（コユキのメッセージは気になったが、とりあえず夜食を買いにコンビニへ向かった）"
2005602-7 = "……あれ？#n……先生？"
2005602-8 = "気のせい？"
2005602-9 = "[ns1] \"この声は……。\"\n[ns2] \"……あれ？\""
2005602-14 = "やっぱり先生だ！"
2005602-15 = "こんな時間に何してるんですか？#n残業です？"
2005602-16 = "え？私？#nいやいや、質問に質問を返さないでくださいよ～"
2005602-17 = "……あ～！やっぱ残業してるんですね。#nにはは、そんな気がしてました。"
2005602-18 = "私は……寝るところだったんですけど、ちょっとおつかいを頼まれちゃって。"
2005602-19 = "あ、そうです。先輩に。"
2005602-20 = "……今もあの人たち、業務やってるんで。"
2005602-21 = "[s3] \"……セミナーも大変なんだね。\"\n[s4] \"先に寝てって言ってくれるんだね。\""
2005602-24 = "ちょっと、なんでそこで先輩たちの話になるんですか！？#nおつかいしてて偉いね～、とかないんですか！？"
2005602-25 = "……はい？"
2005602-26 = "さっき送ったモモトーク……？"
2005602-30 = "……え、なんの話です？"
2005602-31 = "[s5] \"……特に意味はなかったんだ。\"\n[s6] モモトークの内容を送る。"
2005602-34 = "……あ！それのことですか！"
2005602-35 = "にはは……別に大したことじゃないんですけど。"
2005602-36 = "「XD」って送ったら先生がどう返してくるのか、話に上がって……。"
2005602-40 = "……なんですか、その顔。"
2005602-41 = "別に危ないこととか、嘘ついたわけじゃなくないです？"
2005602-42 = "賭け事してたわけでもないんですし！こんな時間に説教なんてしませんよね！？"
2005602-43 = "見てください！この顔！#n今日一日めちゃくちゃ頑張ったんですよ！？"
2005602-44 = "……何ですか？"
2005602-45 = "その格好でそれを言っても説得力がない……？"
2005602-46 = "世界一リラックスしてる格好？……ちょっと、そんなことないですから！#nまあパジャマなのは事実ですけど！！"
2005602-47 = "[s7] \"そのパジャマ、自分で選んだの？\"\n[s8] \"似合ってるよ。\""
2005602-50 = "……これですか？"
2005602-51 = "いえ、先輩が選んでくれたんです。#n今までずっとテキトーな服で寝てました。"
2005602-52 = "このパジャマ、可愛いですよね！#n結構目立ちますけどね！"
2005602-53 = "[s9] \"たしかに結構派手だね。\"\n[s10] （もしかして、それが狙いだったりして……）"
2005602-56 = "なんか変なこと考えてたりしません？"
2005602-57 = "……はあ。"
2005602-58 = "パジャマで出かけない方がいいのは分かってますよ。"
2005602-59 = "先輩たちみたいに、外に着ていった服はすぐ洗えって言うんでしょ。"
2005602-60 = "別にいいじゃないですか。すぐそばのコンビニなのに、細かいなぁ。"
2005602-61 = "先生だってひどい格好してるじゃないですか。昼間のキリッとした先生はどこいったんですか？#n言ってることとやってること違いません？"
2005602-62 = "[s11] \"いや、それとこれとは別で……。\"\n[s12] \"……返す言葉もございません。\""
2005602-65 = "まーまー、お互い様ってことで。#n細かいことは気にしない気にしない！！"
2005602-66 = "せっかく会ったんですし、なんか食べたいものあったら言ってください！今日は私が奢りますから！"
2005602-67 = "そんな遠慮しないでいいですよ！ほら！！"
2005602-68 = "分かってます？普段だったらぜーったい奢らないんですからね？"
2005602-69 = "ほらほら、お菓子コーナーへレッツGO～！！"
2005602-71 = "（コユキと話しながら、お菓子をいくつか買った）"
2005602-72 = "（奢ると言って聞かないコユキを説得して、半額出した）"
2005602-75 = "ん～、今夜は風も冷たくなくて、最高！"
2005602-76 = "夜の公園でお菓子を食べる……オツなものですねぇ。"
2005602-77 = "はい、先生もどうぞ！"
2005602-82 = "……はいっ！あ～んですよ、先生！#nあ～ん！！"
2005602-86 = "……どうしました？"
2005602-87 = "[s13] \"おつかい頼まれてなかったっけ。\"\n[s14] \"寄り道して大丈夫なの？\""
2005602-90 = "……！"
2005602-91 = "気にしないでください！ちゃーんと考えてありますから。"
2005602-92 = "先生と一緒だったって言えば、先輩たちも許してくれますよ、きっと。#n意味わかります？"
2005602-93 = "先生には普段からお世話になってますし？#nお礼にご馳走したって言えば……ね？"
2005602-97 = "……にはっ。"
2005602-98 = "[s15] \"やっぱり悪いこと企んでたな！！\"\n[s16] スマホを取り出してセミナーに連絡を入れようとする。"
2005602-101 = "あ～！！ちょ、ちょっと待って待って待って待って！ストップ！ストーップ！！"
2005602-102 = "もう！冗談ですって、冗談！"
2005602-103 = "真に受けないでくださいよ！！"
2005602-104 = "……え？"
2005602-105 = "じゃあ私は冗談を真に受けないことがないのかって？#nあ～もう、なんで毎回そんなに揚げ足取るんですか！！"
2005602-106 = "もう！ちょっとくらい遊んだっていいじゃないですか！！#n生徒のささやかな楽しみを奪わないでくださいよ！"
2005602-107 = "……ほら！あーん！！"
2005602-108 = "……あーーーーーーん！！！"
2005602-110 = "（コユキのささやかな楽しみを満喫させてあげることにし――）"
2005602-111 = "（途中から本当に眠くなったのか、ウトウトしだしたコユキを部屋の前まで送ってあげた）"
