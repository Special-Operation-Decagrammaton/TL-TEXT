[translation]
2005602-1 = "Um pedido de madrugada"
2005602-2 = "（Fiquei curioso com a mensagem da Koyuki, mas fui até a loja de conveniência comprar um lanche noturno.）"
2005602-7 = "……Ué?#n……Sensei?"
2005602-8 = "Será que foi impressão minha?"
2005602-9 = "[ns1] \"Essa voz é……。\"\n[ns2] \"……Ué?\""
2005602-14 = "É o Sensei mesmo!"
2005602-15 = "O que está fazendo a essa hora?#nEstá fazendo hora extra?"
2005602-16 = "Ah? Eu?#nNão, não, não responda uma pergunta com outra pergunta~"
2005602-17 = "……Ah! Então você está fazendo hora extra mesmo.#nHehe, eu imaginei."
2005602-18 = "Eu…… já estava indo dormir, mas me pediram para fazer um favor."
2005602-19 = "Ah, sim. As veteranas."
2005602-20 = "……Elas ainda estão trabalhando agora."
2005602-21 = "[s3] \"……O Seminar também é difícil, né?\"\n[s4] \"Elas deixam você ir dormir antes, né?\""
2005602-24 = "Ei, por que você está falando das veteranas agora!?#nNão vai dizer que sou esforçada por estar fazendo esse favor!?"
2005602-25 = "……Sim?"
2005602-26 = "O MomoTalk que enviei agora pouco……?"
2005602-30 = "……Ah, do que você está falando?"
2005602-31 = "[s5] \"……Não tinha um significado especial.\"\n[s6] Enviar o conteúdo do MomoTalk."
2005602-34 = "……Ah! Era disso que você estava falando!"
2005602-35 = "Hehe…… não é nada demais, na verdade."
2005602-36 = "A gente estava conversando sobre como o Sensei responderia se eu mandasse um \"XD\"……."
2005602-40 = "……Que cara é essa?"
2005602-41 = "Não tem nada de perigoso ou mentiroso nisso, tem?"
2005602-42 = "Não é como se estivéssemos apostando! Você não vai me dar um sermão a essa hora, vai!?"
2005602-43 = "Olha só! Essa cara!#nEu me esforcei muito o dia todo, sabia!?"
2005602-44 = "……O que foi?"
2005602-45 = "Dizer isso vestida assim não é muito convincente……?"
2005602-46 = "O traje mais relaxado do mundo?…… Ei, não é nada disso!#nBem, é verdade que é um pijama!!"
2005602-47 = "[s7] \"Foi você mesma que escolheu esse pijama?\"\n[s8] \"Combina com você.\""
2005602-50 = "……Este aqui?"
2005602-51 = "Não, as veteranas escolheram para mim.#nAté agora eu dormia com qualquer roupa velha."
2005602-52 = "Esse pijama é fofo, né!#nEmbora chame bastante atenção!"
2005602-53 = "[s9] \"Realmente é bem chamativo.\"\n[s10] （Será que esse era o objetivo……）"
2005602-56 = "Você não está pensando em nada estranho, está?"
2005602-57 = "……Haa."
2005602-58 = "Eu sei que não deveria sair de pijama."
2005602-59 = "Você vai dizer para lavar a roupa assim que chegar em casa, como as veteranas, né?"
2005602-60 = "Não tem problema, né? É só uma loja de conveniência aqui perto, você é muito detalhista."
2005602-61 = "O Sensei também está com uma aparência terrível. Cadê aquele Sensei elegante de durante o dia?#nO que você diz e o que você faz não batem?"
2005602-62 = "[s11] \"Não, uma coisa é uma coisa, outra coisa é outra…….\"\n[s12] \"……Não tenho como rebater isso.\""
2005602-65 = "Bom, bom, estamos quites.#nNão se preocupe com detalhes, não se preocupe!!"
2005602-66 = "Já que nos encontramos, diga o que você quer comer! Hoje eu pago!"
2005602-67 = "Não precisa ser tão tímido! Vamos!!"
2005602-68 = "Você sabe, né? Normalmente eu nunca pagaria nada para ninguém!"
2005602-69 = "Vamos, vamos, rumo à seção de doces!!"
2005602-71 = "（Enquanto conversava com a Koyuki, comprei alguns doces.）"
2005602-72 = "（Convenci a Koyuki, que insistia em pagar tudo, a dividir a conta pela metade.）"
2005602-75 = "Hmm~, o vento desta noite não está frio, está perfeito!"
2005602-76 = "Comer doces no parque à noite…… é algo bem agradável, né."
2005602-77 = "Aqui, Sensei, pode pegar!"
2005602-82 = "……Isso! Diga 'ah', Sensei!#nAhhh!!"
2005602-86 = "……O que houve?"
2005602-87 = "[s13] \"Você não tinha um recado para fazer?\"\n[s14] \"Tudo bem ficar enrolando por aqui?\""
2005602-90 = "……!"
2005602-91 = "Não se preocupe com isso! Eu já pensei em tudo."
2005602-92 = "Se eu disser que estava com o Sensei, as veteranas com certeza vão me perdoar.#nEntende o que eu quero dizer?"
2005602-93 = "O Sensei sempre cuida de mim, não é?#nSe eu disser que foi um agradecimento por isso... sabe como é, né?"
2005602-97 = "……Hehe."
2005602-98 = "[s15] \"Eu sabia que você estava tramando algo ruim!!\"\n[s16] Tenta pegar o celular para entrar em contato com o Seminar."
2005602-101 = "Ah!! Espere, espere, espere, espere! Pare! Paaaare!!"
2005602-102 = "Qual é! Era brincadeira, só brincadeira!"
2005602-103 = "Não leve a sério!!"
2005602-104 = "……Hã?"
2005602-105 = "Então você está me perguntando se eu não levo brincadeiras a sério?#nAh, qual é, por que você tem que ficar procurando pelo em ovo toda vez!!"
2005602-106 = "Qual é! Não tem problema se divertir um pouquinho de vez em quando!!#nNão tire o pequeno prazer de uma aluna!"
2005602-107 = "……Pronto! Diga 'ah'!!"
2005602-108 = "……Ahhhhhhh!!!"
2005602-110 = "(Decidi deixar Koyuki aproveitar seu pequeno prazer――)"
2005602-111 = "(Como ela parecia estar realmente com sono no meio do caminho, levei Koyuki, que começou a cochilar, até a porta do quarto dela.)"
