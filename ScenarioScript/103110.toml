[translation]
103110-1 = "Episódio 11; A História do Começo"
103110-11 = "……Foi erro meu."
103110-16 = "Minhas escolhas, e toda essa situação que elas trouxeram."
103110-21 = "No fim das contas, só depois de chegar nesse resultado é que eu percebi que você estava certo..."
103110-22 = "……É muita cara de pau da minha parte pedir isso agora, mas, por favor."
103110-27 = "Sensei [USERNAME]."
103110-32 = "Você provavelmente vai esquecer o que eu disse, mas não tem problema."
103110-33 = "Mesmo que você não lembre de nada, provavelmente vai acabar passando pela mesma situação e fazendo as mesmas escolhas..."
103110-38 = "Por isso... o que importa não é a experiência, mas sim a escolha."
103110-39 = "As escolhas que só você pode fazer."
103110-44 = "A gente já conversou sobre o que significa assumir a responsabilidade, né."
103110-45 = "Naquela época eu não entendia... mas agora eu entendo."
103110-49 = "A responsabilidade e o dever de um adulto. E a escolha que você fez como consequência disso."
103110-50 = "E também o sentimento por trás de tudo isso."
103110-59 = "― ……。"
103110-65 = "― Por isso, [wa:900] Sensei."
103110-71 = "― Em você, o único adulto em quem eu consigo confiar, [wa:1800]"
103110-77 = "― Nesse ponto final, depois de ter torcido e distorcido tanto,"
103110-82 = "― Nesse ponto final, depois de ter torcido e distorcido tanto, [wa:150] talvez seja possível chegar a um resultado diferente..."
103110-88 = "― As escolhas que levam a isso..."
103110-93 = "― Com certeza devem existir."
103110-97 = "Então, Sensei, por favor..."
103110-101 = "Esses laços――"
103110-102 = "As memórias com a gente... todos os dias que passamos juntos... por favor..."
103110-115 = "Q-Quê!?"
103110-116 = "Erro no sistema de interpretação multidimensional!!"
103110-117 = "O estado da \"Utnapishtim\"... não tá batendo com o da Arca!"
103110-118 = "Como assim!? O sistema deu pau!?"
103110-119 = "N-Não... isso é――"
103110-121 = "Não é isso! Foi a \"Arca de Atrahasis\" que mudou de valor!!"
103110-130 = "R-Rio-kaichou!?"
103110-132 = "……！！"
103110-133 = "I-Isso é... impossível..."
103110-134 = "A \"Arca de Atrahasis\" mudou? ...Será que ela fez isso pra fugir da gente...!?"
103110-135 = "Ela não tá usando a multidimensão que a gente conhece... ela criou um eixo novo, né."
103110-136 = "É que nem tentar explicar a terceira dimensão pra um ser bidimensional...#nEla deve ter se escondido numa dimensão que a gente não consegue perceber."
103110-137 = "I-Isso..."
103110-138 = "……Então quer dizer que fazer cálculos que superam a nossa análise multidimensional é moleza pra ela...?"
103110-139 = "Não acredito, então toda a nossa análise foi..."
103110-143 = "Em vão...?"
103110-145 = "Próximo episódio; A Qualificação de \"Herói\" (1)"