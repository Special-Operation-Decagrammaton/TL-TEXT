[translation]
103110-1 = "Episódio 11; A história do começo"

103110-11 = "... Foi meu erro."

103110-16 = "Minhas escolhas, e toda essa situação que levou a elas."

103110-21 = "No final, só quando chegar a esse resultado é que você perceberá que estava certo..."

103110-22 = "...Pode parecer descarado agora, mas por favor."

103110-27 = "[NOME DE USUÁRIO] Professor."

103110-32 = "Você provavelmente vai esquecer o que eu disse, mas tudo bem."

103110-33 = "Mesmo que você não consiga se lembrar de nada, provavelmente estaria na mesma situação e faria a mesma escolha..."

103110-38 = "Então... não é a experiência que importa, é a escolha."

103110-39 = "Muitas escolhas que só você pode fazer."

103110-44 = "Já conversamos sobre quem é o responsável."

103110-45 = "Eu não entendia naquela época, mas... entendo agora."

103110-49 = "Responsabilidades e deveres como adulto. E sua escolha foi uma extensão disso."

103110-50 = "O coração que isso significa também é."

103110-59 = "―……."

103110-65 = "― Então, [wa:900] sensei."

103110-71 = "- Se você é um adulto em quem posso confiar, [wa:1800]"

103110-77 = "― Qual é o ponto final dessa coisa [ruby=ne]torcida[/ruby]torcida e distorcida?"

103110-82 = "- O ponto final desta [ruby=ne]torção[/ruby]torcida e distorcida é [wa:150]um resultado diferente..."

103110-88 = "-As opções que levam a isso..."

103110-93 = "- Tenho certeza que você vai encontrar."

103110-97 = "Então, professor, por favor..."

103110-101 = "Esse vínculo..."

103110-102 = "Memórias conosco... todos os dias que passamos juntos... por favor..."

103110-115 = "O que! ?"

103110-116 = "Ocorreu um erro no sistema de interpretação multidimensional...! !"

103110-117 = "O estado de "Utnapishtim"...não combina com a Arca!"

103110-118 = "Qual é o problema! ? Falha no sistema! ?"

103110-119 = "Não... isso é..."

103110-121 = "Não! O valor mudou para "Arca de Atla Hasith"! !"

103110-130 = "Olá, presidente Rio! ?"

103110-132 = "...! !"

103110-133 = "Ah, isso é impossível..."

103110-134 = "Existe uma mudança na “Arca de Atlas Hasith”? ...Para escapar de nós...! ?"

103110-135 = "Em vez da multidimensionalidade que conhecemos...eles criaram outro novo eixo."

103110-136 = "Assim como não podemos explicar a terceira dimensão para um ser bidimensional...#nProvavelmente recuamos para uma dimensão que não podemos perceber."

103110-137 = "Ah, é isso..."

103110-138 = "...Não existe cálculo que supere a análise multidimensional...?"

103110-139 = "De jeito nenhum, toda a análise até agora é――"

103110-143 = "Foi um desperdício...?"

103110-145 = "Próxima vez; Qualificações de “Herói” (1)"

