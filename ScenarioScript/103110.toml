[translation]
103110-1 = "第11話;はじまりの物語"
103110-11 = "……私のミスでした。"
103110-16 = "私の選択、そしてそれによって招かれたこの全ての状況。"
103110-21 = "結局、この結果にたどり着いて初めて、あなたの方が正しかったことを悟るだなんて……。"
103110-22 = "……今更図々しいですが、お願いします。"
103110-27 = "[USERNAME]先生。"
103110-32 = "きっと私の話は忘れてしまうでしょうが、それでも構いません。"
103110-33 = "何も思い出せなくても、おそらくあなたは同じ状況で、同じ選択をされるでしょうから……。"
103110-38 = "ですから……大事なのは経験ではなく、選択。 "
103110-39 = "あなたにしかできない選択の数々。"
103110-44 = "責任を負う者について、話したことがありましたね。"
103110-45 = "あの時の私には分かりませんでしたが……。今なら理解できます。"
103110-49 = "大人としての、責任と義務。そして、その延長線上にあった、あなたの選択。 "
103110-50 = "それが意味する心延えも。"
103110-59 = "― ……。"
103110-65 = "― ですから、[wa:900]先生。"
103110-71 = "― 私が信じられる大人である、[wa:1800]あなたになら、"
103110-77 = "― この[ruby=ね]捻[/ruby]じれて歪んだ先の終着点とは、"
103110-82 = "― この[ruby=ね]捻[/ruby]じれて歪んだ先の終着点とは、[wa:150]また別の結果を……。"
103110-88 = "― そこへ繋がる選択肢は……"
103110-93 = "― きっと見つかるはずです。"
103110-97 = "だから先生、どうか……。"
103110-101 = "この、絆を――"
103110-102 = "私たちとの思い出……過ごしてきたそのすべての日々を……どうか……。"
103110-115 = "なっ、何！？"
103110-116 = "多次元解釈システムに、エラー発生……！！ "
103110-117 = "「ウトナピシュティム」の状態が……箱舟と一致しません！"
103110-118 = "どういう事！？システムの故障！？"
103110-119 = "い、いえ……これは―― "
103110-121 = "違うわ！値が変わったのは「アトラ・ハシースの箱舟」の方よ！！"
103110-130 = "り、リオ会長！？"
103110-132 = "……！！"
103110-133 = "そ、そんな……あり得ません…… "
103110-134 = "「アトラ・ハシースの箱舟」に変化が？……まさか、私たちから逃れるために……！？"
103110-135 = "私たちが認知している多次元ではなく……別の新しい軸を作ったのね。 "
103110-136 = "二次元の存在に対して、三次元を説明できないのと同じように……#n私たちには知覚できない次元へと退避したのでしょう。"
103110-137 = "そ、そんな……"
103110-138 = "……多次元解析を凌駕する計算など、造作もないと……？ "
103110-139 = "まさか、今までの分析が全て――"
103110-143 = "無駄であった、と……？"
103110-145 = "次回;「勇者」の資格（１）"
