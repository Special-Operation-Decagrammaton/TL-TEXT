[translation]
2600903-1 = "新しいアルバイト"
2600903-2 = "シャーレ・執務室"
2600903-3 = "（翌朝、執務室で仕事をしていると……）"
2600903-10 = "も、もう無理、です……！"
2600903-11 = "確かにお客さんも多くなかったですし、#n店員さんもみんな優しかったですけど……"
2600903-12 = "メイドカフェだったなんて、聞いてないです！"
2600903-13 = "ううっ……先生を信じていたのに……信じていたのに……！"
2600903-14 = "[s1] \"一旦落ち着いて、ユズ。\"\n[s2] \"ところでその格好、まさか……？\""
2600903-17 = "うぅ……はい。お店のオープン前に#n店長から接客の研修を受けていたのですが……"
2600903-18 = "「料理を出す時は可愛いポーズを取らないといけない」と言われて……"
2600903-19 = "……思わず逃げてきてしまいました。"
2600903-23 = "ど、どうしましょう？#n考えてみたら、仕事中にこんなところまで来てしまうなんて……！"
2600903-24 = "[s] \"私がお店に事情を話しておくよ。\""
2600903-25 = "ううっ……すみません。#nありがとうございます……。"
2600903-27 = "[ns3] \"ごめんね、そんなに困ると思っていなくて。\"\n[ns4] \"事前に説明しておけばよかったね。\""
2600903-30 = "いえ……そもそもわたしの人見知りが問題なのです……。"
2600903-31 = "……確かに先生の仰る通り、みなさんとても優しかったのですが、#n何だか少し、テンションが高くて……。"
2600903-32 = "自己紹介を終えたと思ったら、いつの間にかメイド服を#n着せられていて、そのまま研修が始まって……。"
2600903-33 = "メイド服姿で人前に出なければいけないと言われたときには、#nもう目の前が真っ暗に――"
2600903-34 = "[s] \"無理に話さなくて大丈夫だよ。\""
2600903-35 = "は、はい……。#nでも、どうしましょう……？"
2600903-36 = "せっかく先生が紹介してくれたアルバイトですし、#n優しく接してくれた他の店員さんたちを#nがっかりさせたくはないのですが……"
2600903-37 = "知らない人に可愛いポーズをするのは……。"
2600903-38 = "[s] \"特訓するのはどうかな？\""
2600903-39 = "と、特訓、ですか……？"
2600903-40 = "[s5] \"まずは知ってる人相手にメイドの特訓をすればいいよ。\"\n[s6] \"というわけで、今から私がご主人様ね！\""
2600903-43 = "メイドの特訓……先生がご主人様……？"
2600903-44 = "……それなら、できるかもしれません。#n先生相手ならあまり緊張しないでしょうし……。"
2600903-45 = "それに……少しくらいなら恥ずかしい姿をみせても……。"
2600903-46 = "では……[ruby=はなおか]花岡[/ruby]ユズ、頑張ります！"
2600903-48 = "（その後、ユズと共にメイド特訓を始めた）"
2600903-50 = "い、い、い、いらっしゃいませ……ご、ご主人様！"
2600903-51 = "[s] \"うん、ちょっと違うかな！\""
2600903-52 = "えっ、挨拶からダメだったのですか……？"
2600903-53 = "[s7] \"メイドはご主人様の家にいるものだから……。\"\n[s8] \"「いらっしゃいませ」じゃなくて「おかえりなさい」だよ！\""
2600903-56 = "そ、そうなんですね……。"
2600903-57 = "じゃあ……おかえりなさい、ご主人様？"
2600903-60 = "ご、ご注文のオムライスです……。"
2600903-61 = "[s] \"あれっ、それで終わり？\""
2600903-62 = "は、はい……。#nえ、えっと、他に何かありましたか……？"
2600903-63 = "[s] \"料理がおいしくなる呪文を忘れてるよ。\""
2600903-64 = "じゅ、呪文……？"
2600903-65 = "えっと……「おいしくなーれ、萌え萌えキュンキュン」……？"
2600903-66 = "こ、こういうのって、本当に効果があるんでしょうか……。"
2600903-67 = "[s9] \"もちろん！\"\n[s10] \"ユズの気持ちがたっぷり入るからね！\""
2600903-70 = "せ、先生がそう仰るのでしたら……"
2600903-71 = "お、おいしくなーれ！も、萌え萌え、キュンキュン！"
2600903-80 = "ひゃっ！？#nご、ごめんなさい！転んじゃって……！"
2600903-81 = "服、汚れていませんか？#nううっ……本当にごめんなさい……。"
2600903-82 = "……え、最高……？ど、どうして……。"
2600903-83 = "おっちょこちょいメイドの萌えポイントが押さえられている……？"
2600903-84 = "……メイドの世界って……奥が深いんですね……。"
2600903-90 = "ふぅ……疲れました……。"
2600903-91 = "でも、特訓のお陰で、今なら知らない人相手でも#n少しは勇気が出せそうです。"
2600903-92 = "実際どうかは分かりませんが……。"
2600903-93 = "とにかく、今日は色々助けてくださってありがとうございました。"
2600903-94 = "それから……今はまだ無理ですが、#nもう少し経ってから、お時間のあるときに……"
2600903-95 = "ぜひ……わたしがアルバイトをしているお店に来てください。"
2600903-96 = "その時は必ず……最高の接客をしてみせます……！"
