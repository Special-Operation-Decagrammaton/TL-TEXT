[translation]
2600903-1 = "Novo trabalho de meio período"
2600903-2 = "Schale - Escritório"
2600903-3 = "（Na manhã seguinte, enquanto trabalhava no escritório...）"
2600903-10 = "E-eu não aguento mais...!"
2600903-11 = "É verdade que não havia muitos clientes e as outras atendentes eram todas gentis, mas..."
2600903-12 = "Ninguém me avisou que era um maid café!"
2600903-13 = "Uuu... eu confiava no Sensei... eu confiava em você...!"
2600903-14 = "[s1] \"Acalme-se um pouco, Yuzu.\"\n[s2] \"Aliás, esse traje, não me diga que...?\""
2600903-17 = "Uuu... sim. Antes da loja abrir, eu estava recebendo treinamento de atendimento do gerente, mas..."
2600903-18 = "Ele disse que \"ao servir a comida, você precisa fazer uma pose fofa\"..."
2600903-19 = "...E eu acabei fugindo sem pensar."
2600903-23 = "O-o que eu faço? Pensando bem, vir até aqui durante o horário de trabalho...!"
2600903-24 = "[s] \"Eu vou explicar a situação para a loja.\""
2600903-25 = "Uuu... sinto muito. Obrigado..."
2600903-27 = "[ns3] \"Desculpe, não imaginei que seria tão difícil para você.\"\n[ns4] \"Eu deveria ter explicado antes.\""
2600903-30 = "Não... o problema é a minha timidez, para começo de conversa..."
2600903-31 = "...É verdade, como o Sensei disse, todas eram muito gentis, mas... elas eram um pouco animadas demais..."
2600903-32 = "Assim que terminei de me apresentar, antes que eu percebesse, já tinham me vestido com o uniforme de maid e o treinamento começou..."
2600903-33 = "Quando me disseram que eu teria que aparecer na frente das pessoas vestida de maid, tudo ficou escuro diante dos meus olhos—"
2600903-34 = "[s] \"Não precisa se forçar a falar sobre isso.\""
2600903-35 = "S-sim... Mas, o que eu faço...?"
2600903-36 = "Foi o Sensei quem me indicou esse trabalho, e eu não quero decepcionar as outras atendentes que foram tão gentis comigo, mas..."
2600903-37 = "Fazer poses fofas para estranhos é..."
2600903-38 = "[s] \"Que tal um treinamento especial?\""
2600903-39 = "T-treinamento especial...?"
2600903-40 = "[s5] \"Primeiro, você pode treinar com alguém que conhece.\"\n[s6] \"Sendo assim, a partir de agora, eu serei o seu mestre!\""
2600903-43 = "Treinamento de maid... o Sensei será o mestre...?"
2600903-44 = "...Se for assim, talvez eu consiga. Não ficarei tão nervosa com o Sensei..."
2600903-45 = "Além disso... mostrar esse lado vergonhoso para você não é tão ruim..."
2600903-46 = "Então... Hanaoka Yuzu, vai dar o seu melhor!"
2600903-48 = "（Depois disso, comecei o treinamento de maid com a Yuzu）"
2600903-50 = "B-b-b-bem-vinda... m-mestre!"
2600903-51 = "[s] \"Hum, acho que não está certo!\""
2600903-52 = "Eh, a saudação já estava errada...?"
2600903-53 = "[s7] \"Maids ficam na casa do mestre, então...\"\n[s8] \"Não é 'bem-vinda', é 'bem-vindo de volta'!\""
2600903-56 = "E-entendo..."
2600903-57 = "Então... bem-vindo de volta, mestre?"
2600903-60 = "O-o seu omelete, mestre..."
2600903-61 = "[s] \"Ué, é só isso?\""
2600903-62 = "S-sim... Eh, bem, faltou alguma coisa...?"
2600903-63 = "[s] \"Você esqueceu o feitiço para deixar a comida mais gostosa.\""
2600903-64 = "F-feitiço...?"
2600903-65 = "Bem... \"Fique gostoso, moe moe kyun kyun\"...?"
2600903-66 = "I-isso realmente funciona...?"
2600903-67 = "[s9] \"Claro!\"\n[s10] \"Porque você coloca todo o seu carinho nele!\""
2600903-70 = "S-se o Sensei diz..."
2600903-71 = "F-fique gostoso! Moe moe, kyun kyun!"
2600903-80 = "Hya!? D-desculpe! Eu tropecei...!"
2600903-81 = "Sua roupa, não sujou, né? Uuu... sinto muito mesmo..."
2600903-82 = "...Eh, incrível...? P-por que..."
2600903-83 = "Os pontos de charme de uma empregada atrapalhada foram captados...?"
2600903-84 = "...O mundo das empregadas é... realmente profundo, não é..."
2600903-90 = "Ufa... estou exausta..."
2600903-91 = "Mas, graças ao treinamento especial, acho que agora consigo ter um pouco de coragem, mesmo diante de estranhos."
2600903-92 = "Embora eu não saiba se isso é verdade na prática..."
2600903-93 = "De qualquer forma, muito obrigada por toda a sua ajuda hoje."
2600903-94 = "E também... ainda não é possível agora, mas, quando passar mais um tempo e você tiver um tempinho..."
2600903-95 = "Por favor... venha visitar a loja onde trabalho meio período."
2600903-96 = "Naquela ocasião, eu certamente... farei o melhor atendimento de todos...!"
