[translation]
1008103-1 = "駄菓子の味は、えくせれんと！"
1008103-5 = "あっ、こちらです！先生！"
1008103-6 = "先ほどのお話……身共にとって、かるちゃーしょっくでしたの！"
1008103-7 = "すでにしょっぱいでざーとが出回っているだなんて！#n本当ですの！？"
1008103-8 = "[s] \"ユカリは普段、どんなデザートを食べてるの？\""
1008103-9 = "そうですね……身共がいつも食べているのは……"
1008103-10 = "ひんやりとした、あいすくりーむとか……"
1008103-11 = "使用人の方が商店街で買ってきてくださる和菓子とか……"
1008103-12 = "最近だと、れっどうぃんたー学園のぷりんやとりにてぃ特製ろーるけーき、ばくらゔぁなどもお土産でいただいたりしますの。"
1008103-13 = "[s1] \"ちゃんとしたお菓子をたくさん食べてきたんだね。\"\n[s2] \"たしかに甘い系のお菓子ばかりだね。\""
1008103-16 = "ええと……？#nそれはどういう……"
1008103-17 = "[s] \"でもなんと、他にもいろんな味のお菓子があるんだよね。\""
1008103-18 = "……！"
1008103-19 = "今日は、しょっぱい系のお菓子が食べられる素敵なお店を身共に教えてくださるのですか？"
1008103-20 = "[s] \"そういう事。さ、駄菓子屋さんに行こうか。\""
1008103-21 = "……駄、菓子？"
1008103-26 = "ここが先生の仰っていた、駄菓子屋さん……"
1008103-31 = "先生、あそこに人が集まっております！"
1008103-35 = "あれは……！"
1008103-38 = "個包装のお菓子がたくさん並んでいますの……"
1008103-39 = "あ！あちらには飴の入った瓶が！"
1008103-40 = "その隣には揚げ菓子にらむね……これは……傘のような形の……ちょこれーと？"
1008103-41 = "花火にべーごま……？"
1008103-42 = "こんな物まで売っているのですか！？"
1008103-43 = "このようなお店が世の中にはあるだなんて……"
1008103-44 = "身共は……身共は、どうしたら良いのでしょうか！？"
1008103-45 = "[s] \"すみません、うんめえ棒を一つください。\""
1008103-46 = "毎度あり！"
1008103-51 = "毎度あり……？"
1008103-52 = "先生は、毎度ここに来ているのですか……？"
1008103-53 = "[s] \"それはここの挨拶みたいなものだよ。はいこれ、食べてみて。\""
1008103-57 = "うんめえ棒……小さな棒状のお菓子、ですのね。"
1008103-58 = "これぞ駄菓子の元祖であり王様、駄菓子きんぐだむ。駄菓子の頂点であり原点……？#nつまりどういうことですの！？"
1008103-59 = "意味が分からないのも駄菓子の特徴……？"
1008103-60 = "う～ん。よく分かりませんが先生のお勧めですから、まずは一口……"
1008103-67 = "……！お、美味しいです！#nこの絶妙な甘みとすぱいしーな味わいは一体！？"
1008103-68 = "「こんぽたみっくすふるーつめがまっくす味」……？"
1008103-69 = "まったく意味が分かりません！"
1008103-70 = "[s] \"でも、悪くないでしょ？\""
1008103-71 = "はい！なんだか……わくわくどきどきするお味でした！"
1008103-73 = "次はこれですの？#n食べると舌の色が変わる飴……？"
1008103-77 = "あ！ほんほれすわ！ひたが青くらってあすの！"
1008103-78 = "先生！先生！見てくださいな！#nほら、あ～～～"
1008103-80 = "（それからもユカリは、様々な駄菓子を食べては笑顔を見せてくれた）"
1008103-82 = "まさか、こんなにも色とりどりなお菓子があったなんて……"
1008103-83 = "初めて知りました！#n世界は広いのですね……かるちゃーしょっくですの。"
1008103-84 = "[s] \"まだまだ！駄菓子屋の醍醐味はここからだよ！\""
1008103-85 = "まだ何かあるのですか！？"
1008103-89 = "あら？#nあちらの一角に人が集まっておりますが……"
1008103-90 = "おーい！みんな集まって！#n格闘ゲーム大会を始めるよ！"
1008103-91 = "よっし！今度こそ本当の実力を見せてやるっ！"
1008103-95 = "格闘……げーむ大会……？"
1008103-96 = "[s] \"駄菓子屋さんでは、たまにゲーム大会も開かれてるんだ。\""
1008103-97 = "皆様……とっても楽しそうです。"
1008103-98 = "……なるほど。駄菓子屋さんとは、ただお菓子が売られているだけではない……ということですのね。"
1008103-99 = "[s] \"楽しんでもらえたかな？\""
1008103-100 = "そう、ですね……"
1008103-104 = "……ふふっ。"
1008103-105 = "身共には、どれも新鮮なものばかりでした。"
1008103-106 = "同じ喧騒でも、この前のげーむせんたーとは違う華やかさがありますのね！"
1008103-107 = "心地良い賑わいと申しましょうか……"
1008103-108 = "皆様の楽しんでいる姿を見ていると、身共の心まで温かくなるような……"
1008103-109 = "先生は、いつも身共に新しいことを教えてくれますのね！"
1008103-110 = "[s3] \"でも、まだいっぱい楽しみはあるよ！\"\n[s4] \"駄菓子屋さんの楽しさ、もっと教えてあげる！\""
1008103-113 = "……！"
1008103-114 = "ええ……本日も身共は！"
1008103-115 = "全力で学ばせていただきますの！"
1008103-117 = "（その後も日が暮れるまで、ユカリに駄菓子屋の楽しさを共有した）"
