[translation]
1000202-1 = "Pesquisa Proibida"
1000202-2 = "Academia Gehenna - 17º Refeitório Estudantil"
1000202-3 = "Fufufu. Este é um refeitório atualmente fechado e, basicamente, a entrada de alunos é proibida, mas..."
1000202-4 = "(Clang)"
1000202-10 = "A eletricidade e a água estão sendo fornecidas sem problemas."
1000202-11 = "Ou seja, é o lugar perfeito para pesquisar a gastronomia sem que ninguém nos atrapalhe!"
1000202-12 = "[s] \"Por que eu fui chamado aqui?\""
1000202-13 = "Não é como se eu fosse pedir para você fazer algo difícil."
1000202-14 = "O motivo de eu ter chamado o Sensei aqui é... bem, precisamos de um adulto que assuma a responsabilidade caso o Comitê Disciplinar nos encontre, não é?"
1000202-15 = "[s] \"Que terrível...\""
1000202-16 = "Fufu. A vida é assim mesmo. Bem, então, vamos começar imediatamente."
1000202-17 = "O objeto da pesquisa gastronômica de hoje é o Coq au Vin!"
1000202-18 = "[s1] \"Coq au Vin, você diz...\"\n[s2] \"O que é isso?\""
1000202-19 = "Sim. Como você sabe, Coq au Vin é..."
1000202-20 = "Se você me perguntar o que é Coq au Vin..."
1000202-21 = "É um prato feito cozinhando frango e vegetais. O método de preparo não é difícil; basta colocar os ingredientes na panela e deixar cozinhar."
1000202-22 = "No entanto... se fosse um prato realmente simples, eu não me daria ao trabalho de torná-lo um objeto de pesquisa."
1000202-23 = "A principal característica do Coq au Vin é, precisamente, que o ingrediente usado para cozinhar o frango não é água, mas sim vinho."
1000202-24 = "[s] \"Vinho, você diz...\""
1000202-25 = "Sim. Vinho de uva, ou seja, bebida alcoólica."
1000202-26 = "Um item proibido que, basicamente, é impossível para os alunos de Kivotos obterem."
1000202-27 = "Restaurantes de luxo que lidam com isso também proíbem a entrada de alunos comuns... É um ingrediente proibido que não há como conseguir."
1000202-28 = "Por isso, a estratégia que elaborei foi esta..."
1000202-29 = "Etanol e suco de uva."
1000202-30 = "[s] \"O quê!?\""
1000202-31 = "Ufufu, pensei em uma combinação que resultasse no sabor do vinho."
1000202-32 = "Uva e álcool, teoricamente não tem erro. Com isso, deve ser possível fazer o Coq au Vin."
1000202-33 = "Observe, Sensei."
1000202-34 = "Bem, primeiro, frite o bacon na frigideira..."
1000202-35 = "(Sizzle...)"
1000202-37 = "...refogue o frango empanado na farinha de trigo na gordura desse bacon."
1000202-38 = "(Sizzle...)"
1000202-40 = "Em seguida, na panela preparada... coloque o frango refogado, cogumelos, cenouras e cebolas..."
1000202-42 = "(Clatter)"
1000202-43 = "Depois disso, o suco de uva..."
1000202-45 = "(Glug, glug, glug)"
1000202-47 = "[s] \"Estou preocupado...\""
1000202-48 = "Fufu. Não se preocupe muito, teoricamente não há problema algum."
1000202-49 = "E agora, o tão esperado álcool..."
1000202-50 = "..."
1000202-51 = "Hmm... quanto será que devo colocar..."
1000202-52 = "Eu deveria ter pensado na proporção..."
1000202-53 = "Bem, deve ficar tudo bem. Pelo que li no livro, o álcool acaba evaporando durante a fervura e não sobra nada..."
1000202-54 = "Vou colocar de qualquer jeito!"
1000202-57 = "(Glug, glug, glug, glug, glug, glug, glug, glug, glug, glug, glug, glug, glug, glug...)"
1000202-58 = "Fufufu. Como alguém que persegue o caminho da gastronomia, não se deve economizar nos ingredientes. Vou colocar bastante..."
1000202-61 = "(Glug, glug, glug, glug, glug, glug, glug, glug, glug, glug, glug, glug, glug, glug...)"
1000202-62 = "...Ufa. Sinto que coloquei um pouco demais, mas... deve ficar tudo bem."
1000202-63 = "Então, vou aumentar o fogo..."
1000202-65 = "...?"
1000202-67 = "(CABUUUUUM!)"
1000202-68 = "(A panela explodiu)"
1000202-70 = "………!?"
1000202-71 = "[s] \"Haruna, você está bem!?\""
1000202-72 = "S-sim. Eu estou bem, mas o Coq au Vin... a comida..."
1000202-74 = "(WIIII! WIIII!)"
1000202-75 = "O alarme de incêndio...!?"
1000202-76 = "Houve uma explosão no refeitório fechado!!"
1000202-77 = "É um ataque!! Avisem o Comitê de Disciplina rapidamente!! Digam para se reunirem no refeitório!!"
1000202-78 = "O-ora... fomos descobertos..."
1000202-79 = "[s] \"Vamos fugir!\""
1000202-80 = "M-mas... a comida..."
1000202-86 = "(Peguei a mão de Haruna e saímos correndo do refeitório)"
1000202-88 = "Ah... desse jeito..."
1000202-89 = "Felizmente não foi uma explosão grande, mas... o laboratório secreto que encontramos com tanto esforço..."
1000202-90 = "Haa..."
1000202-91 = "...Está tudo bem, podemos procurar outro lugar depois."
1000202-92 = "Mas... parece que errei na proporção do álcool. Da próxima vez, vamos nos preparar de forma muito mais minuciosa."
1000202-94 = "(Acho que o problema não era esse, mas não consegui retrucar a Haruna com os olhos brilhando...)"
1000202-95 = "(Depois vou ter que ir a Gehenna pedir desculpas pessoalmente)"
