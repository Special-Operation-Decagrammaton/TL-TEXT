[translation]
1000202-1 = "禁じられた研究"
1000202-2 = "ゲヘナ学園・第17学生食堂"
1000202-3 = "ふふふ。ここは現在閉鎖された食堂で、基本的に生徒は出入り禁止なのですが、"
1000202-4 = "（ガチャン）"
1000202-10 = "電気と水は問題なく供給されております。"
1000202-11 = "つまり、誰にも邪魔されず美食の研究をするのに、ちょうどいい場所ということですわね！"
1000202-12 = "[s] \"私はなんでここに呼ばれたの？\""
1000202-13 = "何も、難しいことをしていただこうというわけではありませんわ。"
1000202-14 = "何故先生をここにお呼びしたのか、それは……風紀委員会に見つかった時に責任を持つ大人が、一人は必要でしょう？"
1000202-15 = "[s] \"ひどい……。\""
1000202-16 = "ふふ。人生とはそういうものですわ。さあ、では、早速始めましょうか。"
1000202-17 = "今日の美食研究の対象は、コッコーヴァンです！"
1000202-18 = "[s1] \"コッコーヴァンっていうと……。\"\n[s2] \"何それ？\""
1000202-19 = "はい。ご存知の通り、コッコーヴァンというのは……。"
1000202-20 = "コッコーヴァンとは何かと言いますと……。"
1000202-21 = "鶏肉と野菜を入れて煮た料理ですわ。調理方法も難しくありません、ただ材料を鍋に入れて煮るだけで終わります。"
1000202-22 = "ですが……本当に単純な料理でしたら、わざわざ研究の対象には致しません。"
1000202-23 = "コッコーヴァンの一番の特徴はずばり、鶏肉を煮る材料がお水ではなくワイン、ということです。"
1000202-24 = "[s] \"ワインというと……。\""
1000202-25 = "はい。ぶどう酒、つまり、お酒ですわ。"
1000202-26 = "キヴォトスの生徒には基本的に絶対手に入れられない、禁じられた品。"
1000202-27 = "これを扱う高級レストランも、普通の生徒は出入り禁止になっており……。手に入れようとしてもその方法がない、禁断の材料ですわ。"
1000202-28 = "そこで私が講じた策はこちら……。"
1000202-29 = "エタノールと、ぶどうジュースですわ。"
1000202-30 = "[s] \"はい！？\""
1000202-31 = "うふふ、ぶどう酒の味になる組み合わせを考えてみたのです。"
1000202-32 = "ぶどうとアルコール、理論上間違いはありません。これでコッコーヴァンが作れるはずですわ。"
1000202-33 = "見ててくださいね、先生。"
1000202-34 = "さあ、まずフライパンでベーコンを焼き……。"
1000202-35 = "（ジュー……）"
1000202-37 = "……小麦粉をまぶした鶏肉を、このベーコンの油で炒めます。"
1000202-38 = "（ジュー……）"
1000202-40 = "次は用意した鍋に……火を通した鶏肉とキノコ、ニンジン、玉ねぎを入れて……。"
1000202-42 = "（ゴロゴロ）"
1000202-43 = "その次にぶどうジュースを……。"
1000202-45 = "（トクトクトク）"
1000202-47 = "[s] \"不安……。\""
1000202-48 = "ふふ。あまり心配なさらないでください、理論上は全く問題ありませんわ。"
1000202-49 = "そして次は待望のアルコールを……。"
1000202-50 = "……。"
1000202-51 = "うーん……どれぐらい入れたら良いのでしょうか……。"
1000202-52 = "比率を考えなければいけないのでした……。"
1000202-53 = "まあ、大丈夫でしょう。本で読んだ限り、結局アルコールは沸騰する際に蒸発して残らないそうですし……。"
1000202-54 = "とりあえず入れることにいたしましょう！"
1000202-57 = "（トクトクトクトクトクトクトクトクトクトクトクトクトクトクトク……）"
1000202-58 = "ふふふ。美食の道を追求する者として、材料をケチるだなんていうことはしてはならないことですわ。たっぷりと入れて……。"
1000202-61 = "（トクトクトクトクトクトクトクトクトクトクトクトクトクトクトク……）"
1000202-62 = "……ふう。少々入れすぎてしまったような気もしますが……大丈夫でしょう。"
1000202-63 = "それでは火をもっと強くして……。"
1000202-65 = "……？"
1000202-67 = "（ドカアアァァァァン！）"
1000202-68 = "（鍋が爆発した）"
1000202-70 = "………！？"
1000202-71 = "[s] \"ハルナ、大丈夫！？\""
1000202-72 = "は、はい。私は大丈夫ですが、コッコーヴァンが……料理が……。"
1000202-74 = "（ウー！ウー！）"
1000202-75 = "火災警報器……！？"
1000202-76 = "閉鎖された食堂で爆発が！！"
1000202-77 = "襲撃です！！早く風紀委員会に知らせて！！食堂に集まるようにと！！"
1000202-78 = "あ、あら……バレてしまいましたか……。"
1000202-79 = "[s] \"逃げよう！\""
1000202-80 = "で、ですが……料理が……。"
1000202-86 = "（ハルナの手を取って食堂から抜け出した）"
1000202-88 = "ああ……これでは……。"
1000202-89 = "幸いに大きな爆発ではありませんでしたが……せっかく見つけた秘密の研究室が……。"
1000202-90 = "はあ……。"
1000202-91 = "……大丈夫です、場所はまた探せばいいですから。"
1000202-92 = "ですが……アルコールの比率を間違えてしまったみたいですわね。次はもっと、徹底的に準備するといたしましょう。"
1000202-94 = "（そういう問題ではなかったと思うけど、目をキラキラさせたハルナにツッコむことができなかった……）"
1000202-95 = "（後であらためてゲヘナに謝りに行こう）"
