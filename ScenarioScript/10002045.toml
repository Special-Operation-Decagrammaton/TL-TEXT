[translation]
10002045-1 = "第4話;砂のお城と砂風呂と（２）"
10002045-2 = "（スケバンたちを蹴散らした頃には、砂のお城はほとんど崩れてしまった……）"
10002045-3 = "ああ……。"
10002045-4 = "せっかくアズサちゃんとマシロさんが作ったお城が……。"
10002045-5 = "仕方ないよ、ヒフミ。全ては虚しく、形あるものはいつか壊れてしまうもの。"
10002045-6 = "で、でも……。"
10002045-7 = "……砂のお城なら、また作ればいい。虚しいことばかりのこの世界、それでも抗い、戦い続けることにきっと意味はある。"
10002045-8 = "その通りです。悪はどこにでも存在するもの。私たちは常に備え、立ち向かわねばなりません。"
10002045-9 = "も、もう私には何も分からないです……。"
10002045-10 = "本当に、"
10002045-11 = "こんな感じでいいんでしょうか……？"
10002045-15 = "つ、ツルギさんはどう思います……？"
10002045-16 = "きへへへへへへ！！"
10002045-18 = "きゃははははははははっ！！！"
10002045-19 = "[s] \"ツルギも楽しそうで良かった。\""
10002045-21 = "そ、そうでしたか……なら良いのですが……。"
10002045-22 = "あ、そういえば「砂のお城」はできましたが、「砂風呂」の方はまだですね。"
10002045-23 = "……え、もう撮ったんですか？"
10002045-24 = "い、いつの間に、一体どなたが……？"
10002045-25 = "……え、ツルギさんとスケバンの方たち、"
10002045-26 = "ですか？"
10002045-27 = "そ、その写真、見せていただいても良いですか……？"
10002045-32 = "[ns] \"さっき、助け出す前に一枚だけパシャっと。\""
10002045-35 = "あー、な、なるほど……？"
10002045-36 = "だ、大丈夫でしょうか。これ、「砂風呂」というより……"
10002045-37 = "「砂に埋められている」という感じですが……。"
