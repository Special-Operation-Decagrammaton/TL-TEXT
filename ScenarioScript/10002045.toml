[translation]
10002045-1 = "Episódio 4; Castelos de areia e banhos de areia (2)"
10002045-2 = "(Quando terminamos de espantar as delinquentes, o castelo de areia já estava quase todo destruído...)"
10002045-3 = "Ah..."
10002045-4 = "O castelo que a Azusa-chan e a Mashiro-san fizeram com tanto esforço..."
10002045-5 = "Não tem jeito, Hifumi. Tudo é efêmero, e as coisas que possuem forma um dia acabam se desfazendo."
10002045-6 = "Ma-mas..."
10002045-7 = "...Se for um castelo de areia, é só fazer outro. Neste mundo cheio de vacuidade, ainda assim, lutar e resistir deve ter algum significado."
10002045-8 = "Exatamente. O mal existe em toda parte. Devemos estar sempre preparados e prontos para enfrentá-lo."
10002045-9 = "Eu... eu já não entendo mais nada..."
10002045-10 = "Será mesmo,"
10002045-11 = "que está tudo bem desse jeito...?"
10002045-15 = "O-o que você acha, Tsurugi-san...?"
10002045-16 = "Kihehehehehe!!"
10002045-18 = "Kyahahahahahahaha!!!"
10002045-19 = "[s] \"Fico feliz que a Tsurugi também esteja se divertindo.\""
10002045-21 = "E-era isso...? Bem, se é assim, então tudo bem..."
10002045-22 = "Ah, falando nisso, o \"castelo de areia\" ficou pronto, mas o \"banho de areia\" ainda não."
10002045-23 = "...Eh, você já tirou a foto?"
10002045-24 = "Q-quando foi isso? E quem exatamente...?"
10002045-25 = "...Eh, a Tsurugi-san e as delinquentes,"
10002045-26 = "foram elas?"
10002045-27 = "P-poderia me mostrar essa foto...?"
10002045-32 = "[ns] \"Tirei uma rapidinha antes de ajudar a resgatá-las.\""
10002045-35 = "Ah... entendo...?"
10002045-36 = "S-será que está tudo bem? Isso parece mais..."
10002045-37 = "\"estar enterrado na areia\" do que um \"banho de areia\"..."
