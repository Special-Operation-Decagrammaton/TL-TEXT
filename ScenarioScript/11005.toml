[translation]
11005-2 = "Chegamos!!"
11005-3 = "Sim."
11005-4 = "Recaptura da sala do clube \"Schale\" concluída. Eu chegarei em breve também. Vamos nos encontrar no porão do prédio."
11005-11 = "Porão do edifício Schale"
11005-13 = "Hmmm... Como eu posso quebrar isto se eu nem sei o que é...?"
11005-14 = "...Oh?"
11005-15 = "[s1] Vem sempre aqui. \n[s2] Olá."
11005-16 = "Ah, A-ah..."
11005-17 = "Ah, A-ah..."
11005-18 = "..."
11005-19 = "Ah, ah..."
11005-20 = "Pe-peço..."
11005-21 = "Peço desculpas pelo inconveniente! !"
11005-24 = "[s] \"...?\""
11005-26 = "Porão do edifício Schale"
11005-28 = "Obrigado por esperar."
11005-29 = "...? Aconteceu alguma coisa?"
11005-30 = "[s] \"Não, está tudo bem.\""
11005-31 = "...Entendo. Aqui está o que a Presidente do Conselho Estudantil Geral deixou para trás."
11005-33 = "(Shsssh)"
11005-35 = "...Felizmente, está seguro e sem nenhum arranhão."
11005-41 = "Por favor, aceite."
11005-42 = "[s] \"Um Smart Tablet...?\""
11005-43 = "Sim. Foi isso que a Presidente do Conselho Estudantil Geral deixou para você. #nO \"Baú de Shittim\"."
11005-44 = "[s] (Nome parece familiar...)"
11005-46 = "Pode parecer um tablet normal, mas na verdade a sua origem é desconhecida. O fabricante, o sistema operacional, estrutura do sistema e componentes são todos desconhecidos."
11005-47 = "A Presidente do Conselho Estudantil Geral disse que este \"Baú de Shittim\" pertencia ao Sensei, e que você deve ser capaz de recuperar o controle da Torre com ele."
11005-48 = "Nenhuma das outras membras conseguiram ligar ele, mas me pergunto se o Sensei vai conseguir liga-lo, porque se não..."
11005-49 = "[s] \"...\""
11005-50 = "..."
11005-51 = "...Bem, meu trabalho aqui acabou. De agora em diante, tudo depende de você Sensei."
11005-52 = "Sairei de perto para não interferir."
11005-55 = "..."
11005-56 = "[ns] Ative o \"Baú de Shittim\"."
