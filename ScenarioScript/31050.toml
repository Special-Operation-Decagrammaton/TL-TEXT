[translation]
31050-1 = "Episódio 5; As alunas do Clube de Estudos Suplementares (2)"
31050-4 = "……Entendo, compreendi a situação. Então o Sensei se tornará o sensei responsável pelo Clube de Estudos Suplementares."
31050-5 = "……Que pena, eu gostaria de ter ajudado, se possível."
31050-6 = "[s] \"Tudo bem se eu levar aquelas duas?\""
31050-7 = "Hã!? É óbvio que não pode, né!? Absolutamente não, elas são criminosas perigosas!?"
31050-8 = "Koharu. O Sensei veio até aqui como representante do Schale, a pedido da Tea Party."
31050-9 = "De acordo com o regulamento, não há problema algum. Afinal, ele se tornará o consultor e sensei responsável pelo Clube de Estudos Suplementares."
31050-10 = "E-entendo…… bem, se a senpai diz isso……."
31050-11 = "H-humph! Bem, que se dane! Pelo menos eu não vou precisar ficar junto dessas criminosas perigosas, e aliás, um Clube de Estudos Suplementares!? Que vergonha!"
31050-12 = "Ahaha! Não é ótimo? Uma combinação de vilã e pervertida! E ainda com o título de \"idiota\", se fosse eu, morreria de vergonha só de estar perto!"
31050-13 = "……Ufa, Koharu……."
31050-15 = "Au……."
31050-16 = "[s] \"E quanto à última…….\""
31050-17 = "……Sim. Bem, é um pouco difícil de dizer, mas……"
31050-18 = "A última pessoa é…… Koharu Shimoe."
31050-19 = "……."
31050-20 = "……E-eu!?"
31050-26 = "Shi"
31050-28 = "moe"
31050-32 = "Ko"
31050-34 = "ha"
31050-36 = "ru"
31050-38 = "Aluna do primeiro ano do Clube de Estudos Suplementares, Koharu Shimoe."
31050-39 = "Já tirou nota vermelha três vezes seguidas e está prestes a ser reprovada."
31050-40 = "Observação: Ela não poderá retornar ao Comitê de Justiça até que suas notas melhorem."
31050-44 = "Então, os membros reunidos aqui são todos os integrantes do Clube de Estudos Suplementares?"
31050-45 = "(Shuu, shuu……)"
31050-46 = "……."
31050-49 = "S-sim…… bem, de alguma forma conseguimos reunir todo mundo. O Clube de Estudos Suplementares……."
31050-50 = "E-esse é o verdadeiro problema, na verdade……."
31050-51 = "Fufu, o que devemos fazer? Presidente Ajitani?"
31050-52 = "Depois da aula, em uma sala vazia, uma estudante problemática e um adulto reunidos…… fufu, parece que algo vai começar."
31050-53 = "Começar……? Bem, não importa o que seja. Aliás, se eu me esforçar, consigo me barricar nesta sala por um mês."
31050-54 = "Eu quero morrer…… eu realmente quero morrer……."
31050-56 = "E-então……."
31050-57 = "Sensei…… bem, conto com você……."
31050-58 = "[s] \"……Sim, vou dar o meu melhor.\""
31050-59 = "Muito obrigada…… eu também farei o meu melhor, na medida do possível……."
31050-61 = "Próximo episódio; Vamos nos apresentar!"
