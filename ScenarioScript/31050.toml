[translation]
31050-1 = "Episódio 5;Os Alunos do Clube de Aulas de Reforço (2)"
31050-4 = "……Sei, compreendi. O senhor vai ser o professor responsável pelo Clube de Aulas de Reforço."
31050-5 = "……Que pena; se pudesse, eu gostaria de ajudar."
31050-6 = "[s] \"Será que eu posso levar aquelas duas comigo?\""
31050-7 = "Hã!? Claro que não pode!? De jeito nenhum, são criminosas perigosas, viu!?"
31050-8 = "Koharu. O Sensei, como representante da Schale, veio até aqui atendendo a um pedido do Tea Party."
31050-9 = "Pelas normas, não há problema algum. Afinal, ele vai ser o orientador, o professor responsável pelo Clube de Aulas de Reforço."
31050-10 = "H-hã…… bom, mas, se a veterana diz……."
31050-11 = "H-hunf! Bom, mas até que bem feito! Assim eu não preciso ficar junto dessas criminosas perigosas, e ainda por cima Clube de Aulas de Reforço, francamente! Que vergonha!"
31050-12 = "Ahaha! Que ótimo, né, a combinação de bandida e tarada! E, ainda por cima, o título de \"burra\"; se fosse eu, só de estar junto já morria de vergonha!"
31050-13 = "……Ufa, Koharu……."
31050-15 = "Au……."
31050-16 = "[s] \"E a que falta é…….\""
31050-17 = "……Sim. É, é muito difícil de dizer, mas……"
31050-18 = "a última é…… a Koharu Shimoe."
31050-19 = "……."
31050-20 = "……Hã, eu!?"
31050-26 = "Shi"
31050-28 = "moe"
31050-32 = "Ko"
31050-34 = "ha"
31050-36 = "ru"
31050-38 = "Do 1º ano do Clube de Aulas de Reforço, Koharu Shimoe."
31050-39 = "Já tirou nota vermelha 3 vezes seguidas; à beira da repetência."
31050-40 = "Observação: até que as notas melhorem, fica impedida de retornar ao Comitê de Realização da Justiça."
31050-44 = "Então, os que estão reunidos aqui são os membros do Clube de Aulas de Reforço?"
31050-45 = "(Sssh, sssh……)"
31050-46 = "……."
31050-49 = "S-sim…… é, com muito custo todo mundo se reuniu. O Clube de Aulas de Reforço……."
31050-50 = "É-é a partir daqui que vem o verdadeiro problema, mas……."
31050-51 = "Ufu, o que será que devemos fazer? Presidente Ajitani?"
31050-52 = "Depois da aula, numa sala vazia, meninas de conduta duvidosa e um adulto reunidos…… ufu, parece que vai começar alguma coisa."
31050-53 = "Começar……? Bom, tanto faz o quê. Aliás, se eu levar a sério, dá pra me entrincheirar nesta sala por um mês."
31050-54 = "Quero morrer…… quero morrer de verdade……."
31050-56 = "É-é que……."
31050-57 = "Sensei…… é, conto com o senhor……."
31050-58 = "[s] \"……Sim, vou tentar dar o meu melhor.\""
31050-59 = "Muito obrigada…… eu também vou me esforçar o máximo que puder……."
31050-61 = "Próximo Episódio;Vamos nos Apresentar!"
