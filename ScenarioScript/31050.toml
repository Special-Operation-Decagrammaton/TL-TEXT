[translation]
31050-1 = "Episódio 5: As Alunas do Clube de Reforço (2)"
31050-4 = "……Entendi. Então o Sensei vai ser o professor responsável pelo Clube de Reforço."
31050-5 = "……Que pena. Eu queria muito ajudar."
31050-6 = "[s] \"Posso levar essas duas comigo？\""
31050-7 = "HÃ!? Claro que não pode！？ De jeito nenhum！ São criminosas perigosas！？"
31050-8 = "Koharu. O Sensei veio aqui como representante da Schale, atendendo a um pedido do Tea Party."
31050-9 = "Não tem nenhum problema quanto às regras. Ele vai ser o supervisor e professor tutor do Clube de Reforço."
31050-10 = "E-eh… bom, se a senpai tá dizendo…"
31050-11 = "H-hmph！ Até que é bom！ Assim eu não preciso ficar junto dessas criminosas pervertidas！ E ainda por cima num clube de reforço！ Que vergonha！"
31050-12 = "Ahaha！ Não é uma combinação ótima? Uma delinquente com uma pervertida！ E ainda com o título de «burra» por cima！ Se eu estivesse no meio, já teria morrido de vergonha！"
31050-13 = "……Haa, Koharu……"
31050-15 = "Auuu……"
31050-16 = "[s] \"Só falta mais uma……\""
31050-17 = "……Sim. É que… é bem difícil falar isso, mas…"
31050-18 = "A última membro é… Koharu Shimoe."
31050-19 = "……。"
31050-20 = "……Eh, eu！？"
31050-26 = "Shi"
31050-28 = "Mo"
31050-32 = "E"
31050-34 = "Ko"
31050-36 = "Ha"
31050-38 = "Ru"
31050-39 = "Aluna do 1º ano do Clube de Reforço, [ruby=しもえ]Shimoe[/ruby] Koharu."
31050-40 = "Já tirou nota vermelha três vezes seguidas e está prestes a repetir de ano."
31050-41 = "Observação: Enquanto não melhorar as notas, não poderá voltar ao Comitê de Execução da Justiça."
31050-44 = "Então… essas são todas as membros do Clube de Reforço?"
31050-45 = "（Shhh, shhh……）"
31050-46 = "……。"
31050-49 = "S-sim…… bem, pelo menos agora estamos todas reunidas. Clube de Reforço……"
31050-50 = "A-agora que começa o verdadeiro problema…"
31050-51 = "Fufu, o que será que vamos fazer? Presidenta Ajitani?"
31050-52 = "Depois da aula, num教室 vazio, um adulto junto com garotas problemáticas… fufu, parece que algo vai começar."
31050-53 = "Começar……？ Bom, tanto faz. Aliás, se eu quiser, consigo me barricar nessa sala por um mês inteiro."
31050-54 = "Quero morrer…… sério, quero morrer……"
31050-56 = "E-eh……"
31050-57 = "Sensei…… por favor, cuide de nós……"
31050-58 = "[s] \"……Tá bom, vou me esforçar.\""
31050-59 = "Obrigada…… eu também vou tentar ao máximo……"
31050-61 = "Próximo; Vamos fazer as apresentações!"