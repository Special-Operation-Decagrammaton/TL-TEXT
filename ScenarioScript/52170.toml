[translation]
52170-1 = "Episódio 17; O Retorno da Presidente"
52170-4 = "……Proposta de orçamento adicional para a montagem do local."
52170-5 = "……Certificado de nomeação do responsável pela segurança do festival."
52170-6 = "Relatório de auditoria dos subsídios do Departamento Yin-Yang……."
52170-10 = "Uuu…… uuuuh……!"
52170-11 = "Por que estou lutando contra essa papelada na véspera do Festival Waraku……?"
52170-12 = "Meu plano de jogar todo o trabalho administrativo para Kaho e ir brincar na cidade…… digo, ir fazer uma inspeção――"
52170-15 = "Então, nós vamos para o ensaio. #nPor favor, cuide do processamento das solicitações que acumularam enquanto isso."
52170-16 = "Já vamos~"
52170-17 = "Eeeh!? Eu também vou junto……!"
52170-18 = "Claro, você pode vir conosco, se quiser."
52170-19 = "Desde que termine toda a papelada do Festival Waraku que passou do prazo, as solicitações e o restante do trabalho administrativo…… é claro."
52170-20 = "Auuuh……!"
52170-21 = "Até agora, eu fechei os olhos para inúmeros casos de negligência no trabalho, mas……."
52170-22 = "Se a negligência da Srta. Niya causar qualquer impacto no Festival Waraku……."
52170-23 = "Desta vez, eu não vou deixar passar barato, entendeu?"
52170-24 = "A cara da Kaho está assustadora~"
52170-25 = "T-tá bom, eu entendi……."
52170-28 = "A Kaho parece estar mais intuitiva do que antes……."
52170-29 = "Ah, droga, eu também queria ter visto o ensaio da Chise-nyan……."
52170-30 = "Será que não tem alguma desculpa por aí para adiar o trabalho administrativo……."
52170-31 = "Como, por exemplo, uma visita inesperada, ou algo assim……."
52170-37 = "Srta. Niya, desculpe incomodá-la enquanto está ocupada."
52170-38 = "Tem uma visita. Parece ser um assunto urgente……."
52170-39 = "Oh, uma desculpa……!"
52170-40 = "Uma desculpa?"
52170-41 = "N-não, nada, esqueça o que eu disse."
52170-42 = "Mas, afinal, quem viria nos visitar nesta época……?"
52170-43 = "Será alguma escola querendo visitar o Festival Waraku?"
52170-44 = "Não, na verdade……."
52170-45 = "A presidente do Comitê de Mediação de Conflitos Hyakkaryouran, Ayame Nanakado, está aqui."
52170-46 = "A presidente Ayame……?"
52170-51 = "Quanto tempo, Srta. Niya."
52170-52 = "Como você tem passado?"
52170-53 = "Nyaha…… eu estou bem, mas nem tudo está correndo perfeitamente, sabe."
52170-54 = "Enquanto você estava ausente, aconteceram muitas coisas em Hyakkiyako."
52170-55 = "Peço mil desculpas por ter abandonado minhas responsabilidades como presidente e ficado tanto tempo longe. #nSinto muito pelo transtorno."
52170-56 = "Não, não, de alguma forma as coisas continuaram funcionando. Fufu."
52170-60 = "Então…… você sabia que o pessoal do Hyakkaryouran foi até a filial de Ebisu para tentar encontrar a 'Presidente Ayame'?"
52170-61 = "Sim. Eu encontrei Nagusa e os outros por lá."
52170-62 = "Então, por que você voltou sozinha……?"
52170-63 = "E além disso…… onde está o Sensei do Schale que deveria estar acompanhando vocês?"
52170-64 = "O assunto urgente é justamente sobre isso……."
52170-65 = "Enquanto procurávamos pela base do Departamento Kacho Fuugetsu na grande planície nevada, fomos atingidos por uma avalanche repentina."
52170-66 = "Eu tive sorte e saí ilesa, mas todos os outros ainda estão sob a neve. #nPor favor, envie uma equipe de resgate o mais rápido possível――"
52170-67 = "……Entendo. É uma situação que exige urgência."
52170-68 = "Você ouviu isso?"
52170-72 = "Chamou, Srta. Niya?"
52170-73 = "Envie imediatamente alunos com alta mobilidade para a grande planície nevada do distrito norte. #nO pessoal do Hyakkaryouran e o Sensei [USERNAME] sofreram um acidente."
52170-74 = "S-sim, senhora!"
52170-81 = "……Agradeço pela sua resposta rápida. Como esperado da Niya-sama."
52170-82 = "Ora, ora~ é apenas o meu dever como chefe do Departamento Yin-Yang."
52170-83 = "Bem, então eu vou para a sala do clube――"
52170-91 = "Com licença."
52170-92 = "Sinto muito incomodá-la enquanto está cansada, mas poderia me responder uma coisa?"
52170-95 = "Sim, claro."
52170-98 = "As pessoas que estão perdidas são... todos os membros do Hyakkiyako e o Sensei, correto?"
52170-99 = "……？#nO que quer dizer com isso?"
52170-100 = "Ah, se está falando da Nagusa e da Kikyou――"
52170-101 = "Não, estou falando da presidente do comitê Hyakkiyako, Nanaryou Ayame."
52170-102 = "Você está imitando ela―― você é apenas uma 'sombra', não é?"
52170-103 = "O que você está..."
52170-104 = "Acaso achou que conseguiria esconder isso?#n――Mesmo exalando essa energia maligna?"
52170-105 = "Além disso... uma 'Nanaryou Ayame que abandona seus companheiros em perigo mortal'――#nnão passa de uma piada de mau gosto."
52170-110 = "Então, onde está a Ayame?#n……Hyakkiyakou."
52170-111 = "……Como esperado da chefe Niya, hein.#nNão esperava que percebesse tão rápido."
52170-116 = "……！"
52170-117 = "Mas…… que problemático."
52170-123 = "Eu não sou do tipo que se importa com companheiros, sabe."
52170-125 = "Próximo episódio; Sonhos Diferentes no Mesmo Travesseiro"
