[translation]
52170-1 = "第17話;委員長の帰還"
52170-4 = "……会場設置の追加予算案。"
52170-5 = "……お祭り安全管理者任命書。"
52170-6 = "陰陽部補助金の監査結果報告書……。"
52170-10 = "うう……ううぅっ……！"
52170-11 = "どうして「和楽まつり」の前日に、こんな書類と格闘しているのでしょうか……？"
52170-12 = "事務作業の全てをカホに投げ、街へ遊び……いえ、視察に行く計画が――"
52170-15 = "それでは私たちはリハーサルへ行ってまいります。#nその間に溜まった稟議の処理、よろしくお願いしますね。"
52170-16 = "行ってくるね～"
52170-17 = "ええっ！？私も一緒に……！"
52170-18 = "もちろん、ついてきていただいても構いません。"
52170-19 = "返送期限の過ぎた和楽まつりの書類、稟議、その他の事務作業……すべて済ませてくださるのなら、ですけど。"
52170-20 = "あううっ……！"
52170-21 = "これまで、数々の職務怠慢に目を瞑ってきましたが……。"
52170-22 = "ニヤ様の怠慢で、和楽まつりに影響が出るようなことがあれば……。"
52170-23 = "今回ばかりは――ただじゃおきませんよ？"
52170-24 = "カホの顔が怖い～"
52170-25 = "わ、わかりました……。"
52170-28 = "カホってば、前より勘が鋭くなったような……。"
52170-29 = "あーあ、私もチセにゃんのリハーサル観たかったなぁ……。"
52170-30 = "どこかに事務作業を後回しにできる口実、落ちていないかしら……。"
52170-31 = "例えば突然の来客、とか……。"
52170-37 = "ニヤ様、お忙しいところ申し訳ありません。"
52170-38 = "お客人です。なにやら至急の用件と……。"
52170-39 = "おやっ、口実が……！"
52170-40 = "口実？"
52170-41 = "い、いえ、こちらの話です。"
52170-42 = "それにしても、こんな時期に来客とは……どちら様です？"
52170-43 = "「和楽まつり」の見学を希望する学園でも？"
52170-44 = "いえ、それが……。"
52170-45 = "百花繚乱紛争調停委員会の委員長、[ruby=ななかど]七稜[/ruby]アヤメさんがいらっしゃいました。"
52170-46 = "アヤメ委員長が……？"
52170-51 = "お久しぶりです、ニヤ様。"
52170-52 = "お元気でしたか？"
52170-53 = "にゃは……元気ではあるけど、万事順調というわけでもないですねぇ。"
52170-54 = "あなたが不在の間、百鬼夜行では[ruby=・]い[/ruby][ruby=・]ろ[/ruby][ruby=・]い[/ruby][ruby=・]ろ[/ruby]とあったものですから。"
52170-55 = "委員長としての責務を放棄し、長らく席を空けたこと……本当に申し訳ありません。#nご迷惑をおかけしました。"
52170-56 = "いえいえ、なんとか回っていましたから。ふふっ。"
52170-60 = "それで……百花繚乱のみなさんが「アヤメ委員長」を探そうと、エビス分校に向かったのはご存知です？"
52170-61 = "ええ。向こうでナグサたちと会いましたから。"
52170-62 = "それなら何故、お一人で戻られたのですか……？"
52170-63 = "それに……同行していたはずのシャーレの先生は？"
52170-64 = "至急の要件というのが、まさにそれでして……。"
52170-65 = "大雪原で花鳥風月部の本拠地を探している最中に、突然の雪崩に遭遇してしまったのです。"
52170-66 = "私は運よく無事だったものの、みんなは今も雪の下にいます。#n一刻も早く救助隊を派遣していただきたく――"
52170-67 = "……ふむ。一刻を争う事態ですね。"
52170-68 = "聞いておりましたか？"
52170-72 = "お呼びでしょうか、ニヤ様。"
52170-73 = "今すぐ機動力の高い生徒を北部自治区の大雪原へ。#n百花繚乱のみなさんと[USERNAME]先生が遭難したとのことです。"
52170-74 = "は、はいっ！"
52170-81 = "……迅速なご対応に感謝します。[ruby=・]さ[/ruby][ruby=・]す[/ruby][ruby=・]が[/ruby]ニヤ様ですね。"
52170-82 = "いえいえ～陰陽部の長として当然のことです。"
52170-83 = "では、私は部室に――"
52170-91 = "失礼。"
52170-92 = "お疲れのところ申し訳ないのですが、一つお尋ねしても？"
52170-95 = "ええ、もちろん。"
52170-98 = "遭難しているのは……百花繚乱の[ruby=・]全[/ruby][ruby=・]員[/ruby]と先生、ですか？"
52170-99 = "……？#nそれはどういう意味ですか？"
52170-100 = "ああ、ナグサやキキョウのことでしたら――"
52170-101 = "いいえ、百花繚乱の委員長、[ruby=・]七[/ruby][ruby=・]稜[/ruby][ruby=・]ア[/ruby][ruby=・]ヤ[/ruby][ruby=・]メ[/ruby]さんのことです。"
52170-102 = "あなたは彼女を模している――ただの「影」でしょう？"
52170-103 = "何を……。"
52170-104 = "まさか隠しきれているとでも？#n――こんなに邪気を振りまいておいて？"
52170-105 = "それに……「死中にある仲間を置き去りにする七稜アヤメ」なんて――#nお笑い種にもなりません。"
52170-110 = "それで、アヤメさんはどちらに？#n……百物語さん。"
52170-111 = "……さすがはニヤ部長、か。#nこんなに早く気づかれるなんて。"
52170-116 = "……！"
52170-117 = "でも……困ったな。"
52170-123 = "私、別に仲間思いじゃないんだよね。"
52170-125 = "次回;同床異夢"
