[translation]
32190-1 = "Episódio 19; 3º Exame Acadêmico Especial"
32190-3 = "Ah, auuu... Já aconteceu tanta coisa que estou exausta..."
32190-4 = "Finalmente nos acalmamos, não é..."
32190-5 = "Sim..."
32190-10 = "Koharu-chan!?"
32190-11 = "De-desculpa, é que minhas forças sumiram de repente... Ah, obrigada."
32190-12 = "Faz sentido, afinal corremos a noite toda..."
32190-13 = "E nesta última semana, não conseguimos dormir direito. Agora, finalmente..."
32190-17 = "Do que você está falando, Hifumi? É daqui que a gente começa."
32190-19 = "……Oi?"
32190-20 = "Ah..."
32190-21 = "É-é verdade, o exame..."
32190-22 = "……Eu tinha esquecido."
32190-24 = "O horário atual é 7h50 da manhã."
32190-25 = "Se não chegarmos ao local do exame em uma hora, vamos ter que correr."
32190-30 = "Eeeh!? Vamos correr!? Espera aí, Azusa-chan, que rápida! É uma distância que dá para chegar correndo a partir daqui!?"
32190-31 = "Hmm, se corrermos com tudo, talvez dê tempo? Vamos lá, Hifumi-chan, Koharu-chan! Força!"
32190-35 = "Uuu, meus pés já doem só de andar... Espera aí...!"
32190-36 = "Po-por que as coisas têm que terminar assim...!"
32190-39 = "Haah, haah, haa, haah... haa... haah... Chega, não dá mais..."
32190-40 = "Fi-finalmente chegamos..."
32190-41 = "Estávamos esperando por vocês, pessoal do Clube de Reforço. Este é um recado da vice-presidente Hasumi."
32190-42 = "Boa sorte... foi o que ela disse."
32190-43 = "Ora, ora."
32190-44 = "A-Hasumi-senpai...!"
32190-45 = "E também... sinto muito por não ter conseguido ajudar. Ela disse que compensará isso algum dia..."
32190-46 = "……Entendo."
32190-47 = "[s] \"Sim. Então, vamos entrar.\""
32190-51 = "……"
32190-52 = "……"
32190-53 = "……"
32190-54 = "……"
32190-55 = "[s] \"Este é o último exame, né.\""
32190-56 = "……Sim. Não importa o resultado, tudo será decidido neste exame."
32190-57 = "É verdade."
32190-58 = "Auuu..."
32190-59 = "……!"
32190-60 = "……Muita coisa aconteceu até aqui."
32190-61 = "……Eu entendo como se sente, mas vamos deixar o sentimentalismo para depois que o exame terminar."
32190-62 = "Sim, você tem razão... De qualquer forma, vamos mostrar o resultado de todo o nosso esforço."
32190-63 = "Sim, não vou desistir até o fim."
32190-64 = "Sim, eu também. Afinal, a Azusa-chan se deu ao trabalho de nos ensinar."
32190-65 = "E-eu vou tirar nota máxima desta vez! Eu vou conseguir!"
32190-67 = "[ns] \"Então, o 3º Exame Acadêmico Especial... Começar!\""
