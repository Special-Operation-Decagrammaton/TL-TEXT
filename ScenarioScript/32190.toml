[translation]
32190-1 = "Episódio 19; O 3º Exame Especial de Proficiência"
32190-3 = "A-Auuu... tanta coisa aconteceu que eu tô exausta..."
32190-4 = "Finalmente as coisas se acalmaram..."
32190-5 = "É..."
32190-10 = "Koharu-chan!?"
32190-11 = "D-Desculpa, é que as minhas forças simplesmente sumiram... ah, obrigada."
32190-12 = "Não é pra menos, a gente ficou correndo a noite inteira..."
32190-13 = "E faz uma semana que a gente mal dorme direito. Agora sim, finalmente..."
32190-17 = "O que você tá dizendo, Hifumi? É aqui que tudo começa."
32190-19 = "...Hã?"
32190-20 = "Ah..."
32190-21 = "É-É verdade, tem a prova..."
32190-22 = "...Tinha esquecido."
32190-24 = "Agora são 7h50 da manhã."
32190-25 = "Se a gente não chegar no local da prova em uma hora, vamos ter que correr."
32190-30 = "Eeeh!? Correr!? Espera aí, Azusa-chan, que pressa! Dá pra chegar correndo daqui!?"
32190-31 = "Hum, acho que se a gente der tudo de si, dá pra chegar no limite do tempo. Vamos, Hifumi-chan, Koharu-chan! Foco!"
32190-35 = "Ugh, minhas pernas já doem só de andar... Espera a gente...!"
32190-36 = "P-Por que que a gente tem que passar por isso logo no final...!"
32190-39 = "Ofegante... ha... ha... chega, não dá mais..."
32190-40 = "F-Finalmente chegamos..."
32190-41 = "Estávamos esperando por vocês, pessoal do Clube de Reposição. Tenho um recado da Vice-Presidente Hasumi."
32190-42 = "'Deem o seu melhor'."
32190-43 = "Ora, ora."
32190-44 = "H-Hasumi-senpai...!"
32190-45 = "E também... 'Sinto muito por não poder ter ajudado. Vou compensar isso algum dia...' foi o que ela disse."
32190-46 = "...Entendi."
32190-47 = "[s] \"Certo. Então, vamos entrar.\""
32190-51 = "......"
32190-52 = "......"
32190-53 = "......"
32190-54 = "......"
32190-55 = "[s] \"Esta é a nossa última prova.\""
32190-56 = "...É. Não importa o resultado, tudo se decide aqui."
32190-57 = "Pois é."
32190-58 = "Auuu..."
32190-59 = "......"
32190-60 = "......Muita coisa aconteceu até aqui, né?"
32190-61 = "...Eu entendo como se sente, mas deixa pra se emocionar depois que a prova acabar."
32190-62 = "É verdade... Vamos focar em mostrar tudo o que a gente aprendeu."
32190-63 = "Isso, não vamos desistir até o fim."
32190-64 = "Sim, eu também. Já que a Azusa-chan se deu ao trabalho de ensinar a gente..."
32190-65 = "E-Eu vou tirar 100! Pode esperar, eu vou conseguir!"
32190-67 = "[ns] \"Então, 3º Exame Especial de Proficiência... começar!\""
