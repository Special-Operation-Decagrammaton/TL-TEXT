[translation]
32190-1 = "Episódio 19;3º Exame Especial de Aptidão"
32190-3 = "A-auu…… aconteceu coisa demais, tô exausta……."
32190-4 = "Enfim a gente se acalmou, né……."
32190-5 = "Sim……."
32190-10 = "Koharu!?"
32190-11 = "D-desculpa, sei lá, minhas forças foram embora…… o-obrigada."
32190-12 = "É o que dá pra esperar, né; a gente correu a noite inteira……."
32190-13 = "E, nesta última semana, a gente também não conseguiu dormir direito. Enfim, agora……."
32190-17 = "Do que você tá falando, Hifumi, é agora que começa."
32190-19 = "……Hã?"
32190-20 = "Ah……."
32190-21 = "É-é mesmo, a prova……."
32190-22 = "……Tinha esquecido."
32190-24 = "O horário atual é 7h50 da manhã."
32190-25 = "Se a gente não chegar ao local da prova em 1 hora…… vamos correr."
32190-30 = "Hãã!? Correr!? Espera, Azusa, que rápido! Daqui dá pra chegar correndo!?"
32190-31 = "Hmm, correndo com tudo, no limite, dá? Vamos, Hifumi, Koharu! Força!"
32190-35 = "Uu, só de andar já dói o pé…… espera aí……!"
32190-36 = "P-por que, até o último minuto, uma coisa dessas……!"
32190-39 = "Haa, haa, haa, haa…… haa…… haa…… já não aguento……."
32190-40 = "E-enfim chegamos, né……."
32190-41 = "Eu estava esperando, pessoal do Clube de Aulas de Reforço. Um recado da vice-presidente Hasumi."
32190-42 = "Esforcem-se…… é o que ela diz."
32190-43 = "Ora, ora."
32190-44 = "V-veterana Hasumi……!"
32190-45 = "E também…… desculpem por não poder ajudar. Um dia, sem falta, eu compenso isso…… ela também disse."
32190-46 = "……Sei."
32190-47 = "[s] \"Sim. Então, vamos entrar?\""
32190-51 = "……."
32190-52 = "……."
32190-53 = "……."
32190-54 = "……."
32190-55 = "[s] \"Esta é a última prova, né.\""
32190-56 = "……Sim. Seja qual for o resultado, esta prova decide tudo."
32190-57 = "Pois é."
32190-58 = "Auu……."
32190-59 = "……Gh."
32190-60 = "……Aconteceu de tudo até aqui, né."
32190-61 = "……Eu entendo o sentimento, mas mergulhar no sentimentalismo fica pra depois da prova."
32190-62 = "Sim, é verdade…… enfim, vamos mostrar direitinho o fruto do nosso esforço."
32190-63 = "Sim, não desistir até o fim."
32190-64 = "Sim, eu também. Afinal, a Azusa me ensinou."
32190-65 = "E-eu, dessa vez, vou tirar nota máxima! Vou tirar mesmo!"
32190-67 = "[ns] \"Então, 3º Exame Especial de Aptidão…… começar!\""
