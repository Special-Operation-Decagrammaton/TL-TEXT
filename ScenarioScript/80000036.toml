[translation]
80000036-1 = "最高のチョコレートを作る方法"
80000036-4 = "…………。"
80000036-9 = "あ、先生。そこ、足元気を付けて……！"
80000036-10 = "[s] \"了解。\""
80000036-12 = "ふふっ。たとえ闇の中でも、食べ物に関することだったら何でもお見通し……。"
80000036-14 = "たぶんこの辺に……"
80000036-16 = "あっ、発見！"
80000036-19 = "おー、誰もいない！変な感じ！"
80000036-20 = "よし、これなら貸し切りで使えそうだね！"
80000036-21 = "[s1] \"とりあえずついて来たものの……。\"\n[s2] \"イズミ、今日はこれ何のために……？\""
80000036-22 = "そりゃあだって、"
80000036-23 = "そりゃあだって、"
80000036-24 = "今日はバレンタインデーでしょ？"
80000036-25 = "[s] \"うん、そうだね。\""
80000036-26 = "だからだよ！"
80000036-27 = "先生と一緒に、最高のバレンタインチョコを作る！"
80000036-28 = "さあ始めよう、先生！あんまり時間も無いよ！"
80000036-32 = "[ns] \"……え？\""
80000036-34 = "せっかくのバレンタインデーなんだから、最高のチョコレートが食べたいって思うのは当然でしょ？"
80000036-35 = "でもただ口を開けて待ってるだけで、それが来てくれるわけじゃない。"
80000036-36 = "なんたって私は美食研究会、自分の手でその先にある理想をつかみ取らないと！"
80000036-37 = "それに最高のチョコレートはやっぱり一人で食べるんじゃなくて、誰かと一緒に食べるのが良いでしょ？"
80000036-38 = "[s] \"イズミ……！\""
80000036-39 = "というわけで、もう材料は準備しておいたの！"
80000036-40 = "まずは、職人さん御用達の特製醤油！"
80000036-41 = "[s] \"……醬油？\""
80000036-42 = "うん！チョコレートのあの美しい光沢を出すためにはやっぱりこれでしょ？"
80000036-43 = "あと最近はチョコレート界の流行として、フルーツ系のチョコレートが流行ってるらしいの！"
80000036-44 = "それでフルーツのことを色々調べてみたんだけど……"
80000036-49 = "[ns] \"この匂いは……！\""
80000036-50 = "じゃーん、フルーツの王様「ドリアン」！"
80000036-51 = "でもこれだけじゃちょっと寂しいし……"
80000036-52 = "何か似たようなのが無いかなって思って探してたら、"
80000036-53 = "「魚の王様」って言うのもあったの！"
80000036-54 = "じゃじゃーん、「鯛」！たしかビタミンが豊富で、健康にも良いんだって！"
80000036-55 = "美味しいチョコレートで、かつ健康にも良かったら、それはまさに最強のチョコレート！"
80000036-56 = "ってわけで材料も揃ったことだし、作ろっか！"
80000036-57 = "[s] \"不安しかない！！\""
80000036-59 = "（そうしてイズミと一緒に、最強のチョコレート（？）作りが始まった）"
80000036-67 = "完成ー！見て見て、先生！"
80000036-72 = "じゃあ最初の一口は、先生にあげる！"
80000036-73 = "最高の材料で作ったんだし、きっと味も最高だよ！"
80000036-74 = "[s3] （イズミが頑張って作ってくれたチョコレート……）\n[s4] \"い、いただきます……！\""
80000036-83 = "[ns] \"こ、これは……！\""
80000036-84 = "（脂身が豊富でまろやかな舌触りの鯛、その風味を邪魔しすぎない絶妙な味わいの醤油……）"
80000036-85 = "（そしてドリアンの独特な風味がなぜかその味を引き立て、まさかのハーモニーが……！）"
80000036-86 = "[s] \"……美味しい！チョコじゃない気がするけど！\""
80000036-87 = "やったー！"
80000036-88 = "やっぱり何でも挑戦あるのみだね、これぞ美食への道！"
80000036-89 = "[s] \"確かにそうかも。ありがとう、イズミ。\""
80000036-90 = "ううん、どういたしまして！ほらほら、まだたくさんあるから。一緒に食べよう！"
80000036-91 = "はい、あーん……先生、ハッピーバレンタイン！"
80000036-93 = "（そうやってイズミと、ちょっと変わったバレンタインデーを一緒に過ごした）"
