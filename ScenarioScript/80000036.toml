[translation]
80000036-1 = "Como fazer o melhor chocolate"
80000036-4 = "…………。"
80000036-9 = "Ah, Sensei. Cuidado onde pisa aí...!"
80000036-10 = "[s] \"Entendido.\""
80000036-12 = "Hehe. Mesmo na escuridão, quando se trata de comida, eu percebo tudo..."
80000036-14 = "Deve estar por aqui..."
80000036-16 = "Ah, achei!"
80000036-19 = "Uau, não tem ninguém! Que sensação estranha!"
80000036-20 = "Beleza, então podemos usar o lugar só para nós!"
80000036-21 = "[s1] \"Eu vim porque você pediu, mas...\"\n[s2] \"Izumi, por que estamos fazendo isso hoje...?\""
80000036-22 = "Ora, porque..."
80000036-23 = "Ora, porque..."
80000036-24 = "Hoje é Dia dos Namorados, não é?"
80000036-25 = "[s] \"Sim, é verdade.\""
80000036-26 = "É por isso!"
80000036-27 = "Vou fazer o melhor chocolate de Dia dos Namorados com o Sensei!"
80000036-28 = "Vamos começar, Sensei! Não temos muito tempo!"
80000036-32 = "[ns] \"...Hã?\""
80000036-34 = "Já que é Dia dos Namorados, é natural querer comer o melhor chocolate possível, né?"
80000036-35 = "Mas ele não vai aparecer magicamente só porque estou de boca aberta esperando."
80000036-36 = "Afinal, eu sou do Clube de Pesquisa Gastronômica, tenho que agarrar o meu ideal com as próprias mãos!"
80000036-37 = "E, além disso, o melhor chocolate não é algo que se come sozinho, é melhor dividir com alguém, certo?"
80000036-38 = "[s] \"Izumi...!\""
80000036-39 = "Sendo assim, eu já preparei os ingredientes!"
80000036-40 = "Primeiro, um molho de soja especial usado pelos mestres culinários!"
80000036-41 = "[s] \"...Molho de soja?\""
80000036-42 = "Sim! Para dar aquele brilho maravilhoso no chocolate, nada melhor que isso, né?"
80000036-43 = "E, ultimamente, a tendência no mundo dos chocolates é usar frutas!"
80000036-44 = "Então eu pesquisei bastante sobre frutas e..."
80000036-49 = "[ns] \"Esse cheiro...!\""
80000036-50 = "Tcharam! O rei das frutas, o \"Durião\"!"
80000036-51 = "Mas só isso parece um pouco solitário..."
80000036-52 = "Fiquei pensando se não tinha algo parecido e, enquanto procurava,"
80000036-53 = "achei algo chamado \"o rei dos peixes\"!"
80000036-54 = "Tcharam! \"Tai\" (Dourada)! Dizem que é rico em vitaminas e faz bem para a saúde!"
80000036-55 = "Se for um chocolate delicioso e ainda por cima saudável, então é o chocolate supremo!"
80000036-56 = "Dito isso, já que temos os ingredientes, vamos começar!"
80000036-57 = "[s] \"Só sinto insegurança!!\""
80000036-59 = "(E assim, junto com a Izumi, começou a criação do chocolate supremo (?))"
80000036-67 = "Terminei! Olha só, Sensei!"
80000036-72 = "Então, a primeira mordida é sua, Sensei!"
80000036-73 = "Usei os melhores ingredientes, então com certeza o sabor também será o melhor!"
80000036-74 = "[s3] (O chocolate que a Izumi se esforçou para fazer...)\n[s4] \"E-estou servido...!\""
80000036-83 = "[ns] \"I-isso é...!\""
80000036-84 = "(A dourada, com sua textura macia e gordurosa, e o molho de soja, com um sabor requintado que não sobrepõe o resto...)"
80000036-85 = "(E o aroma peculiar do durião, que de alguma forma realça o sabor, criando uma harmonia inesperada!)"
80000036-86 = "[s] \"...É delicioso! Embora não pareça chocolate!\""
80000036-87 = "Eba!"
80000036-88 = "No fim, o segredo é sempre tentar coisas novas. Isso é o caminho da gastronomia!"
80000036-89 = "[s] \"Talvez você tenha razão. Obrigado, Izumi.\""
80000036-90 = "Não, não tem de quê! Vamos, vamos, ainda tem bastante. Vamos comer juntos!"
80000036-91 = "Isso, diga ah... Sensei, feliz Dia dos Namorados!"
80000036-93 = "（Dessa forma, passei um Dia dos Namorados um tanto peculiar junto com a Izumi）"
