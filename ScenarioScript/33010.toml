[translation]
33010-1 = "Episódio 1; Post Mortem (1)"
33010-4 = "Sala Secreta"
33010-6 = "......Seia Yurizono?"
33010-7 = "Ah, isso mesmo. Eu estava te esperando, Azusa Shirasu, da Filial Arius."
33010-8 = "...Esperando? Por mim?"
33010-9 = "Sim, eu já tinha visto essa cena num sonho."
33010-10 = "Não sei bem como explicar... bem, pense nisso como uma 'premonição', se quiser."
33010-11 = "Eu tenho esses sonhos de vez em quando. Sonhos que depois se tornam realidade, além de vários outros tipos."
33010-12 = "...Então quer dizer que você sabe o que eu vou fazer agora?"
33010-13 = "Ah, você veio destruir o meu halo, não é?"
33010-14 = "Parece que tinha outros com você, mas só você conseguiu chegar até aqui. Poder impressionante, Azusa Shirasu."
33010-15 = "...Já que você sabia, por que não fugiu?"
33010-16 = "...Porque seria inútil."
33010-17 = "'Tudo é vaidade'... Essa era uma das frases favoritas da Arius, né? É a mesma coisa. Para mim, que consigo ver o futuro, lutar contra ele é inútil."
33010-18 = "É verdade que em Kivotos, a 'morte' é um conceito difícil de entender. Ainda assim, estamos vivas, e não tem como escapar da possibilidade de a morte estar sempre por perto."
33010-20 = "'Destruir o halo'... ou seja, alguém está desejando a minha morte."
33010-21 = "E você invadiu essa sala secreta sem que ninguém percebesse. Como você foi capaz de chegar até aqui, lutar é inútil... você não concorda, olhando da sua posição, Azusa Shirasu?"
33010-23 = "Bem, não é como se eu não tivesse outros motivos, mas... aliás, você já destruiu um halo antes?"
33010-24 = "...Não, nunca. Mas aprendi como fazer."
33010-25 = "Aprendi..."
33010-26 = "Causar danos fatais ao corpo físico... e continuar causando."
33010-27 = "Normalmente, dar vários tiros de 5.56mm não causaria dano fatal."
33010-28 = "Mas não significa que não cause dano. Se você disparar uma quantidade absurda de munição, garantindo vantagem total e tendo tempo suficiente... se você despejar isso de forma 'anormal', não é impossível destruir um halo só com armas de fogo."
33010-29 = "Existem vários outros métodos além de armas de fogo. Doenças não estão fora de cogitação. Por exemplo, privar alguém de água e comida por um longo período, trancá-la em um ambiente sem oxigênio, causar uma hemorragia severa a ponto de parar as funções corporais, manter a pessoa contida em um estado de hipotermia..."
33010-30 = "Métodos para causar a 'morte' não faltam."
33010-31 = "Além disso, ouvi dizer que a Seia Yurizono tem a saúde frágil."
33010-32 = "...Então você acha que armas de fogo seriam suficientes?"
33010-33 = "...Não é impossível. Mas eu não tenho tempo ou vantagem garantida agora."
33010-34 = "Por isso, vou usar esta bomba especial. Ela vai 'destruir o halo'."
33010-35 = "Então quer dizer que é uma 'bomba que destrói halos'? Nunca ouvi falar dessa tecnologia..."
33010-36 = "...Entendo, a Arius anda pesquisando isso. Métodos para destruir halos, ou seja, métodos para matar alguém."
33010-37 = "...Ah, e você aprendeu isso. 'Escola' é um lugar para aprender esse tipo de coisa, não é?"
33010-38 = "......"
33010-39 = "Entendo... a Arius chegou a esse ponto..."
33010-44 = "...Azusa Shirasu, me responda uma coisa. Você está preparada para se tornar uma 'assassina'?"
33010-45 = "......"
33010-47 = "Eu vi. Vi você com medo de se tornar uma assassina."
33010-48 = "Se você desejava isso ou se tinha outras opções... na verdade, isso não faz muita diferença."
33010-49 = "'Uma assassina é uma assassina'. Essa afirmação clara, absoluta e, acima de tudo, desesperadoramente simples, será gravada no seu corpo. E vai permanecer neste mundo para sempre."
33010-50 = "Depois que isso acontecer, o desespero, o sofrimento, a raiva, o arrependimento, a frustração e o sentimento de impotência que você sentir... vão desaparecer no vazio sem chegar a lugar nenhum."
33010-51 = "Sendo da Arius, você não tem como desconhecer essa frase. 'Vanitas vanitatum'... a verdade deste mundo."
33010-52 = "...Mas eu sei. Sei que, embora concorde com essas palavras, em algum lugar lá no fundo, você as nega."
33010-54 = "...Não é verdade?"
33010-55 = "Enquanto olhava para aquela flor, era exatamente nisso que você estava pensando."
33010-56 = "'Tudo é vaidade'... Mas, ainda assim, precisamos continuar lutando."
33010-57 = "Isso é algo enraizado na sua essência, a imagem que te define... embora eu não tenha entendido muito bem."
33010-58 = "Sendo assim, na verdade..."
33010-60 = "...Você não veio aqui para me matar, veio para me pedir conselhos, não foi?"
33010-61 = "Sobre como você deve lutar daqui para frente."
33010-63 = "Sala de Reuniões da Irmandade"
33010-65 = "...Sensei [USERNAME]?"
33010-66 = "[s1] \"...Desculpa, acabei cochilando.\"\n[s2] \"Sinto como se tivesse sonhado com algo...\""
33010-67 = "...Eu entendo que o senhor é uma pessoa ocupada, mas poderia se concentrar um pouco mais?"
33010-68 = "...Eu entendo que o senhor é uma pessoa ocupada, mas poderia se concentrar um pouco mais?"
33010-69 = "[s] \"Desculpa...\""
33010-70 = "Soube que, ultimamente, o senhor tem corrido para lá e para cá resolvendo as consequências dos incidentes. E até de coisas fora da sua jurisdição."
33010-71 = "[s] \"É que me faltou capacidade... teve tanta coisa que eu não consegui resolver...\""
33010-72 = "......Foi assim, é?"
33010-73 = "Muita coisa aconteceu em sequência, então vamos organizar as ideias."
33010-74 = "Vai ser um assunto entediante. Pelo menos não acho que seja interessante, mas... organizar as coisas pode nos ajudar a seguir em frente. Chamamos isso de 'Post Mortem'."
33010-75 = "...Então, vamos ao que interessa."
33010-76 = "O quarto da Seia-san foi explodido por volta das 3 da manhã."
33010-77 = "Depois disso, a primeira pessoa a chegar ao local foi a Capitã Mine, dos Cavaleiros Hospitalários."
33010-80 = "Após verificar a situação no quarto, a Capitã Mine relatou imediatamente o fato à Tea Party."
33010-81 = "A Tea Party, enquanto mergulhava no caos, começou a encobrir as informações e procurar pelo culpado."
33010-85 = "No entanto, aproveitando a confusão, a Capitã Mine sumiu com o 'corpo' da Seia-san. Dizem que nem os outros membros dos Cavaleiros Hospitalários sabiam do paradeiro dela."
33010-87 = "...Enfim, essa é a situação sob o ponto de vista da Tea Party. Mas, na verdade, a informação de que o 'corpo da Seia-san' existia era falsa. A Capitã Mine espalhou o boato de que o 'halo havia sido destruído' enquanto escondia a Seia-san em um lugar seguro."
33010-88 = "Pensando bem, não tinha como uma 'aluna com o halo destruído' ser o alvo. Pode-se dizer que foi a melhor maneira de proteger a Seia-san."
33010-89 = "Numa situação anormal em que membros da Tea Party são atacados... talvez ela tenha pensado: 'antes de pensar em quem confiar, vou resolver isso com as minhas próprias mãos'."
33010-90 = "Na verdade, considerando que a culpada era a Mika-san, da Tea Party, onde as informações deveriam ser centralizadas, pode-se dizer que a decisão dela acabou sendo correta, mas..."
33010-91 = "...Ainda assim, a Seia-san não acordou."
33010-92 = "Embora os ferimentos da explosão tenham curado, ela continua em um estado de sono profundo... A Capitã disse que nem ela sabe a causa."
33010-93 = "A Capitã Mine e a Seia-san continuam escondidas em um lugar que ninguém conhece."
33010-94 = "...Bem, de forma resumida, essa é a história sobre o ataque à Seia Yurizono."
33010-100 = "[ns] \"Hanako!\""
33010-101 = "Pensei que você estivesse sofrendo nas mãos da Sakurako-san, que não é nada divertida, então vim salvar você, Sensei. Fufu♡"
33010-102 = "...Não é hora para brincadeiras, Hanako-san."
33010-103 = "Sakurako-san continua a mesma de sempre... Que tal a gente ler uns livros mais picantes juntas algum dia?♡"
33010-104 = "Sinto que a Sakurako-san não tem muita imunidade para essas coisas... Ufufu♡"
33010-109 = "...Hanako-san. Você não esqueceu da promessa que fizemos, esqueceu?"
33010-110 = "...Claro que não."
33010-113 = "[ns] \"Achei você, Hanako.\""
33010-114 = "Ah. Sensei, por que você está aqui..."
33010-118 = "[ns] \"Sobre aquela promessa que você mencionou com a Irmandade...\""
33010-119 = "Ah, sobre isso..."
33010-120 = "...Sensei da Schale, este não é um problema que você deve intervir."
33010-121 = "[s] \"A Hanako é minha aluna, do Clube de Reposição.\""
33010-122 = "Ah, meu Deus..."
33010-123 = "......"
33010-124 = "Desculpe... é que, eu..."
33010-125 = "Mari-chan..."
33010-129 = "Fui eu quem pedi. Para salvar a Hanako-san, eu persuadi a Sakurako-sama..."
33010-130 = "Em troca da promessa de..."
33010-131 = "Que a Hanako-san teria sua expulsão revogada..."
33010-132 = "......"
33010-133 = "Eu não conseguia parar a Hanako-san... e não conseguia entender o que ela sentia lá no fundo do coração..."
33010-134 = "Sinto muito por ter chegado a esse ponto... mas eu queria que a Hanako-san ficasse na escola..."
33010-135 = "...Não, Mari-chan."
33010-136 = "Você não tem que pedir desculpas. Eu que fiz tudo do meu jeito e deixei todo mundo preocupado. Na verdade, quem tem que pedir desculpas sou eu."
33010-137 = "Desculpe, Mari-chan... fiz você se preocupar."
33010-138 = "Hanako-san..."
33010-139 = "Eu não penso mais em ser expulsa. Fique tranquila."
33010-140 = "S-Sério...?"
33010-141 = "Sim. Eu aprendi no Clube de Reposição... que devo 'lutar' um pouco mais. Né, Sensei?"
33010-142 = "[s] \"......Sim.\""
33010-143 = "...Obrigada. Hanako-san, Sensei [USERNAME]."
33010-147 = "...Mas, só isso não é o bastante."
33010-148 = "Sakurako-sama...?"
33010-149 = "Tenho mais um pedido. Hanako-san."
33010-150 = "......"
33010-151 = "É o seguinte――"
33010-155 = "'Apenas nudez é permitida no traje escolar'... Você nos pediu ajuda com um plano para criar essa regra escolar e transformar a Trinity em um 'Paraíso do Nu'... foi isso, não foi?"
33010-156 = "Sim, foi exat――"
33010-157 = "...Hã?"
33010-158 = "Quem diria que a Irmandade estava tramando uma conspiração dessas... digno de você, Sakurako-san, líder de um grupo secreto envolto em mistérios."
33010-159 = "E aquela cláusula de exceção, 'Em princípio, nudez total. Porém, apenas para a Irmandade, o uso de véus é permitido durante o horário escolar'..."
33010-161 = "Até eu fiquei chocada. Nudez com véu, que mundo novo é esse..."
33010-162 = "S-Sim...!?"
33010-163 = "Mas, na minha posição atual, não tenho escolha a não ser cooperar... e já que vou fazer, vou fazer bem feito!"
33010-164 = "Mas essa parte do véu é trapaça demais. Então, minha proposta é: 'Em princípio, nudez total. Porém, para todas as alunas, o uso de meias é permitido!' O que acha disso?"
33010-165 = "Se você aceitar isso, eu ajudo com o seu plano!"
33010-166 = "S-S-Sakurako-sama!? Q-Que tipo de plano é esse...!?"
33010-167 = "Não é nada disso!?"
33010-168 = "Mas..."
33010-169 = "'Mas' nada! O que você está dizendo de repente!?"
33010-171 = "Era um acordo de 'nós atendemos ao pedido da Hanako-san, e em troca, a Hanako-san atende a um pedido nosso', não era!?"
33010-172 = "...Ah, é verdade, teve essa conversa também, né."
33010-174 = "Haa..."
33010-175 = "O ideal seria que você entrasse para a Irmandade... mas isso seria só te perseguir e te encurralar, então..."
33010-176 = "...Este incidente servirá como ponto de virada para mudarmos nosso antigo 'princípio de não interferência'. Aos poucos, vamos começar a entrar em assuntos políticos também."
33010-177 = "Com certeza muitas coisas acontecerão nesse processo. Ter a ajuda de alguém como a Hanako-san será uma peça-chave. É apenas sobre isso que estamos falando."
33010-178 = "Bom, contanto que seja só isso, tudo bem... Haa..."
33010-179 = "Por que você está com essa cara de decepção... não, não quero que volte naquele assunto..."
33010-180 = "[s] \"...Hanako, você não quer mesmo fazer isso?\""
33010-181 = "Sensei..."
33010-182 = "...Não usarei meios forçados. De qualquer forma, é algo que a Hanako-san 'nos ajudará' a fazer, e não pretendo pedir nada irrazoável."
33010-183 = "...Obrigada, Sakurako-sama."
33010-184 = "Nos desviamos do assunto... vamos voltar ao ponto principal. Bem..."
33010-185 = "Estamos falando sobre a 'nudez total na escola'♡"
33010-186 = "Sim, esse assunto... não é esse! Eu disse para não voltar naquele assunto...!"
33010-187 = "Ufa,"
33010-192 = "Não tem jeito mesmo... vamos voltar ao assunto do ataque à Seia-chan. Como vocês sabem, a culpada foi a Azusa-chan."
33010-193 = "...O quarto da Seia-san foi explodido por volta das 3 da manhã. No entanto, o invasor entrou por volta das 2 da manhã."
33010-194 = "Houve um intervalo de cerca de 1 hora. A invasora... ou seja, a Azusa-chan, ficou com a Seia-san naquele quarto por uma hora."
33010-195 = "O que será que as duas conversaram durante esses 60 minutos..."
33010-196 = "A Azusa-chan não me deu muitos detalhes..."
33010-198 = "Sala de Consultoria"
33010-201 = "Azusa Shirasu-san, pode entrar."
33010-202 = "......"
33010-204 = "Próximo Episódio; Post Mortem (2)"