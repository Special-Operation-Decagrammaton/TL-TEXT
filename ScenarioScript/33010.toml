[translation]
33010-1 = "Episódio 1;Post-Mortem (1)"
33010-4 = "Sala secreta"
33010-6 = "……Seia Yurizono?"
33010-7 = "Sim, isso mesmo. Eu estava te esperando, \"Azusa Shirasu\", da Filial de Arius."
33010-8 = "……Esperando? A mim?"
33010-9 = "Sim; afinal, eu vi esta cena em sonho."
33010-10 = "Como é melhor explicar…… bom, pense nisso como uma espécie de \"sonho premonitório\"."
33010-11 = "De vez em quando, eu tenho sonhos assim. Sonhos que depois se tornam realidade, e vários outros tipos também."
33010-12 = "……Ou seja, você também já sabe o que eu vou fazer agora?"
33010-13 = "Sim; você veio destruir a minha aureola, não veio?"
33010-14 = "Parece que havia outras companheiras, mas só você chegou até aqui. Que força admirável, Azusa Shirasu."
33010-15 = "……Sabendo disso, por que você não fugiu?"
33010-16 = "……Porque seria sem sentido."
33010-17 = "\"Tudo é vão\"…… era a frase favorita da Arius, né. É a mesma coisa. Pra mim, que enxergo o futuro, lutar é sem sentido."
33010-18 = "Que a \"morte\" é um conceito difícil de enxergar em Kivotos, isso é fato. Ainda assim, nós estamos vivas; e é impossível que a \"morte\" não esteja logo ao lado."
33010-20 = "\"Destruir a aureola\"…… ou seja, alguém deseja a minha morte."
33010-21 = "E você se infiltrou até esta sala secreta sem que ninguém percebesse. Se você é capaz de chegar a esse ponto, então, de fato, lutar é inútil…… do seu ponto de vista, você não acha o mesmo, Azusa Shirasu?"
33010-23 = "Bom, não é que não haja outros motivos além desse, mas…… aliás, você já destruiu uma aureola antes?"
33010-24 = "……Não, nunca. Mas aprendi o método."
33010-25 = "\"Aprendi\"……."
33010-26 = "Causar ao corpo um dano fatal, irreversível…… e continuar causando."
33010-27 = "Normalmente, por mais balas 5.56mm que se disparem, quase nunca chega a ser um ferimento fatal."
33010-28 = "Mas não é que não haja dano. Uma quantidade fora do normal de munição, uma superioridade avassaladora capaz de continuar causando dano, e o tempo pra isso. Se tudo isso for aplicado \"a um ponto anormal\"…… destruir uma aureola só com armas de fogo também não é impossível."
33010-29 = "E, fora armas de fogo, há incontáveis meios. Doença também existe. Por exemplo: cortar à força, por longo período, a ingestão de água e comida; trancar à força num ambiente onde não se pode respirar; provocar um sangramento a ponto de as funções do corpo pararem; manter presa, o tempo todo, num estado em que a temperatura corporal fique abaixo de certo nível……"
33010-30 = "Métodos pra levar à \"morte\" devem existir aos montes."
33010-31 = "Além disso, ouvi dizer que \"a Seia Yurizono tem o corpo fraco\"."
33010-32 = "……Por isso, essas armas de fogo já bastariam?"
33010-33 = "……Também não é uma história impossível. Mas, pra mim, agora, nem tempo suficiente nem superioridade estão garantidos."
33010-34 = "Por isso, eu uso esta bomba especial. Com isto, eu \"destruo a aureola\"."
33010-35 = "Ou seja, isso é uma \"bomba que destrói aureolas\"? Uma tecnologia de que eu nunca ouvi falar, mas……"
33010-36 = "……Sei, então a Arius faz esse tipo de pesquisa. O \"método de destruir aureolas\", isto é, o \"método de matar pessoas\"."
33010-37 = "……Sim, e foi isso que eu aprendi. \"Escola\" é um lugar onde se \"aprende\" esse tipo de coisa, não é?"
33010-38 = "……."
33010-39 = "Entendo…… a Arius chegou a esse ponto……."
33010-44 = "……Azusa Shirasu, deixa eu te perguntar uma coisa. Você vai ficar bem se virar uma \"assassina\"?"
33010-45 = "……."
33010-47 = "Eu vi, sabe: a sua figura com medo de se tornar uma \"assassina\"."
33010-48 = "Se você desejou ou não, se havia outra opção ou não…… isso, na verdade, não é lá grande questão."
33010-49 = "\"Assassino é assassino\". Essa proposição clara, absoluta e, acima de tudo, desesperadoramente fácil de entender fica gravada no seu corpo. E permanece neste mundo."
33010-50 = "O desespero, o sofrimento, a raiva, o arrependimento, a frustração e a impotência que você vai sentir depois disso…… tudo isso se esvai no vazio, sem alcançar ninguém."
33010-51 = "Você, sendo da Arius, não tem como não saber. \"Vanitas vanitatum\"…… a verdade deste mundo."
33010-52 = "……Mas eu sei. Que você, ao mesmo tempo em que concorda com essas palavras, em algum canto as nega."
33010-54 = "……Não é?"
33010-55 = "Olhando aquela flor, você pensava assim."
33010-56 = "\"Tudo é vão\"…… mas, ainda assim, é preciso lutar."
33010-57 = "Isso é o que se enraíza no seu âmago, a imagem interior que te expressa…… embora eu não entendesse muito bem."
33010-58 = "Sendo assim, você, na verdade……"
33010-60 = "……não veio me matar; você veio buscar um conselho meu, não foi?"
33010-61 = "Sobre como você deve lutar daqui pra frente."
33010-63 = "Sala de reuniões da Sisterhood"
33010-65 = "……Sensei [USERNAME]?"
33010-66 = "[s1] \"……Desculpa, cochilei um pouco.\"\n[s2] \"Acho que sonhei com alguma coisa……\""
33010-67 = "……Sei que o senhor anda ocupado, mas peço um pouquinho mais de concentração."
33010-68 = "……Sei que o senhor anda ocupado, mas peço um pouquinho mais de concentração."
33010-69 = "[s] \"Desculpa……\""
33010-70 = "De fato, ouvi dizer que, neste último tempo, o senhor esteve na correria com o pós-incidente, digamos…… cuidando de tudo. Até de coisas fora da sua alçada."
33010-71 = "[s] \"Faltou força…… ficou muita coisa que eu não consegui resolver……\""
33010-72 = "……Entendo."
33010-73 = "Aconteceu muita coisa em sequência, então vamos organizar um pouco."
33010-74 = "Vai ser uma conversa entediante. Ao menos, nada divertida, eu acho…… mas, organizando, há coisas que conseguem seguir em frente. É o que chamam de \"post-mortem\"."
33010-75 = "……Então, vamos ao assunto."
33010-76 = "O quarto da Seia foi explodido por volta das 3 da madrugada."
33010-77 = "Depois disso, a primeira a chegar ao local foi a comandante Mine, da \"Ordem dos Cavaleiros de Socorro\"."
33010-80 = "A comandante Mine, após verificar a situação do quarto, reportou o fato imediatamente ao Tea Party."
33010-81 = "O Tea Party, mesmo caindo em pânico, começou o trabalho de abafar a informação e caçar o culpado."
33010-85 = "Mas, como que se misturando a esse alvoroço, a comandante Mine desapareceu junto com o corpo da Seia. Dizem que nem as outras integrantes da Ordem sabiam do paradeiro."
33010-87 = "……E, até aqui, esta é a situação do ponto de vista do Tea Party. Mas, na verdade, a própria informação \"o corpo da Seia\" era falsa. A comandante Mine espalhou a informação falsa de que \"a aureola foi destruída\" e escondeu a Seia num lugar seguro."
33010-88 = "Pensando normalmente, uma \"aluna com a aureola destruída\" jamais seria alvo. Pra proteger a Seia, dá pra dizer que foi o melhor método."
33010-89 = "Uma situação anormal, com um membro do Tea Party sendo atacado…… antes de pensar em quem confiar, resolver com as próprias mãos. Deve ter sido o que ela pensou."
33010-90 = "Na prática, considerando que a culpada era justamente a Mika, do \"Tea Party\", onde as informações se concentram, dá pra dizer que o julgamento dela acabou se mostrando correto……."
33010-91 = "……Mas a Seia ainda não despertou."
33010-92 = "As feridas da explosão sararam, mas ela segue dormindo sem parar…… a comandante também disse que não sabe a causa."
33010-93 = "Ainda agora, a comandante Mine e a Seia estão escondidas num lugar que ninguém conhece."
33010-94 = "……De forma resumida, mas é mais ou menos esta a história do ataque à Seia Yurizono."
33010-100 = "[ns] \"Hanako!\""
33010-101 = "Achei que o senhor estivesse sofrendo, capturado pela Sakurako, que não é lá muito divertida, e vim salvar o Sensei. Ufu♡"
33010-102 = "……Não é hora de piada, Hanako."
33010-103 = "A Sakurako continua a mesma de sempre…… que tal, da próxima, a gente ler junto um livro um pouquinho mais picante♡"
33010-104 = "É só uma impressão, mas a Sakurako parece não ter imunidade nenhuma nessa área…… ufufu♡"
33010-109 = "……Hanako. Aquela promessa, você não esqueceu, né?"
33010-110 = "……Claro que não."
33010-113 = "[ns] \"Achei, Hanako.\""
33010-114 = "Ora. Sensei, por que o senhor aqui……."
33010-118 = "[ns] \"Aquela promessa com a Sisterhood que você falou antes……\""
33010-119 = "Ah, isso é……."
33010-120 = "……Sensei da Schale, este não é um problema em que o senhor deva intervir."
33010-121 = "[s] \"É que a Hanako é do Clube de Aulas de Reforço; é minha aluna.\""
33010-122 = "Ora, ora……."
33010-123 = "……."
33010-124 = "Desculpem…… isso é, é que, fui eu……."
33010-125 = "Marie……."
33010-129 = "Fui eu que pedi. Pra salvar a Hanako, convencer a senhorita Sakurako……"
33010-130 = "e, em troca, como promessa,"
33010-131 = "fazer a Hanako retirar o pedido de abandono da escola……."
33010-132 = "……."
33010-133 = "Eu não conseguia deter a Hanako…… não conseguia compreender o fundo do coração dela……."
33010-134 = "Me desculpem por ter acabado desse jeito…… mas eu queria que a Hanako continuasse na academia……."
33010-135 = "……Não, Marie."
33010-136 = "Não é você que tem que se desculpar. Quem fez um monte de coisa por conta própria e preocupou todo mundo fui eu. Aliás, quem se desculpa sou eu."
33010-137 = "Me desculpe, Marie…… te deixei preocupada, né."
33010-138 = "Hanako……."
33010-139 = "A eu de agora já não pensa em abandonar a escola. Fique tranquila."
33010-140 = "É…… verdade……?"
33010-141 = "Sim. Afinal, eu aprendi no Clube de Aulas de Reforço…… vou tentar \"lutar\" mais um pouco. Né, Sensei?"
33010-142 = "[s] \"……Sim.\""
33010-143 = "……Muito obrigada. Hanako, Sensei [USERNAME]."
33010-147 = "……Mas só isso não basta."
33010-148 = "Senhorita Sakurako……?"
33010-149 = "Tenho mais um pedido, Hanako."
33010-150 = "……."
33010-151 = "E ele é――"
33010-155 = "\"Na vinda à escola, admite-se apenas a nudez como vestimenta\"…… criar uma regra dessas e ajudar no plano de transformar Trinity num \"paraíso da nudez\"…… era isso, né?"
33010-156 = "Sim, exatamen――"
33010-157 = "……Hã?"
33010-158 = "Quem diria que a Sisterhood tramava uma conspiração dessas…… como esperado da Sakurako, chefe do grupo secreto envolto em mistério."
33010-159 = "E aquela cláusula de exceção: \"Em princípio, nudez total. Porém, apenas à Sisterhood se permite o uso do véu na vinda à escola\"……"
33010-161 = "Até eu fiquei arrepiada. Nudez com véu, que mundo novo……"
33010-162 = "Si…… quê!?"
33010-163 = "Mas, na posição atual, não me resta senão colaborar…… e, se é pra fazer, hei de fazer dar certo!"
33010-164 = "Mas essa cláusula do véu é trapaça demais. Por isso, a minha proposta: \"Em princípio, nudez total. Porém, a todos os alunos permite-se apenas o uso de meias\", que tal!"
33010-165 = "Se aceitarem isto, eu colaboro com o plano!"
33010-166 = "S-se-senhorita Sakurako!? U-um plano desses……!?"
33010-167 = "Claro que não!?"
33010-168 = "Essa não……."
33010-169 = "Nada de \"essa não\"! Do que você está falando, assim, do nada!"
33010-171 = "\"Nós atendemos ao pedido da Hanako e, em troca, a Hanako atende a um pedido nosso\", a promessa era essa, não era!?"
33010-172 = "……Ah, teve essa conversa também, né."
33010-174 = "Haa……."
33010-175 = "O ideal, na verdade, seria você entrar pra Sisterhood…… mas isso seria o mesmo que te maltratar e te encurralar."
33010-176 = "……Com este incidente como marco, o nosso \"princípio da não intervenção\" de até agora também vai mudando. Aos poucos, vamos pôr os pés também na política."
33010-177 = "Nesse processo, com certeza, muita coisa vai acontecer. Nessas horas, poder contar com a ajuda de alguém como você, Hanako, pode ser uma chave e tanto. É só isso, essa conversa."
33010-178 = "Bom, se for só isso, por mim tudo bem…… haa……."
33010-179 = "Por que essa cara de decepção…… aliás, por favor, não traga mais o assunto de volta praquilo……."
33010-180 = "[s] \"……Hanako, você não se incomoda mesmo?\""
33010-181 = "Sensei……."
33010-182 = "……Não vamos usar de imposição. De todo jeito, é no formato de a Hanako \"nos ajudar\", e também não pretendemos exigir nada absurdo."
33010-183 = "……Muito obrigada, senhorita Sakurako."
33010-184 = "A conversa desviou, né…… vamos voltar ao assunto? Deixa ver……"
33010-185 = "A conversa sobre a \"vinda à escola em nudez total\", né♡"
33010-186 = "Sim, essa…… NÃO! Eu pedi pra não voltar o assunto……!"
33010-187 = "Ufa,"
33010-192 = "Não tem jeito…… o caso do ataque à Seia; vamos voltar a essa história? A executora, como sabem, foi, pelo visto, a Azusa."
33010-193 = "……O quarto da Seia foi explodido às 3 da madrugada. Mas a invasão do quarto foi por volta das 2."
33010-194 = "Aqui há um vão de cerca de 1 hora. A invasora…… ou seja, a Azusa, passou 1 hora com a Seia naquele quarto."
33010-195 = "Nesses 60 minutos, que conversa será que houve entre as duas……."
33010-196 = "A Azusa não me contou lá muitos detalhes, mas……"
33010-198 = "Sala de consultas"
33010-201 = "Azusa Shirasu, pode entrar."
33010-202 = "……."
33010-204 = "Próximo Episódio;Post-Mortem (2)"
