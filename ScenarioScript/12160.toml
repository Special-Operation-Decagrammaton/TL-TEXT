[translation]
12160-1 = "Episódio 16; A batalha dos adultos"
12160-2 = "……Eu sei quem você é, a existência enigmática convocada pela Presidente do Conselho Estudantil Geral."
12160-3 = "O detentor do artefato 'Shittim Chest', o sensei do Departamento Federal de Investigação, 'SCHALE'."
12160-4 = "Parece que há quem o subestime, mas nós somos diferentes."
12160-5 = "……Primeiro, vamos deixar as coisas claras."
12160-6 = "Nós não temos a intenção de nos tornar seus inimigos."
12160-7 = "Pelo contrário, gostaríamos de cooperar com você."
12160-8 = "Consideramos que, em nossos planos, você é quem pode se tornar o maior obstáculo."
12160-9 = "Para nós, uma escola pequena como Abydos não é um problema de forma alguma. Mas, sensei, sua existência não pode ser considerada um detalhe insignificante. Queremos evitar um confronto direto."
12160-10 = "[s] \"Quem diabos são vocês?\""
12160-11 = "……Ah, agora que mencionou, não nos apresentamos, não é?"
12160-12 = "Somos, assim como você, seres de fora de Kivotos... mas existimos em um domínio diferente do seu."
12160-15 = "Como havia um nome apropriado, estamos usando-o por enquanto. Pode nos chamar de 'Gematria'."
12160-16 = "E quanto a mim, pode me chamar de 'Kurofuku' (Roupa Preta). Gostei desse nome."
12160-17 = "Somos observadores, exploradores e pesquisadores."
12160-18 = "Não há problema em nos considerar, assim como você, uma 'existência enigmática'."
12160-19 = "Por via das dúvidas, pergunto: não tem a intenção de cooperar conosco?"
12160-20 = "[s1] \"Recuso.\"\n[s2] \"Nem um pouco.\""
12160-21 = "……Entendo."
12160-22 = "……Entendo."
12160-25 = "Mesmo recusando esta proposta que lhe permitiria obter a verdade e os mistérios, o que você pretende buscar em Kivotos?"
12160-26 = "[s3] \"Pelo menos, não tenho interesse em tal proposta.\"\n[s4] \"Eu só vim aqui para levar a Hoshino de volta.\""
12160-27 = "……Kukuku."
12160-28 = "……Kukuku."
12160-29 = "Você percebe que suas ações não têm legitimidade, sensei? Que direito você tem, neste momento, para fazer tal exigência?"
12160-30 = "Hoshino não é mais uma aluna de Abydos. Você não conferiu a documentação?"
12160-31 = "[s] \"……Ainda não.\""
12160-32 = "……Oh?"
12160-37 = "[ns] \"Como sou o 'conselheiro', ainda não assinei nada.\""
12160-38 = "……"
12160-41 = "[ns] \"Portanto, a Hoshino ainda pertence ao Comitê de Contramedidas,\""
12160-43 = "[ns] \"ainda é a vice-presidente do conselho estudantil de Abydos,\""
12160-45 = "[ns] \"e ainda é minha aluna.\""
12160-47 = "……Entendo."
12160-48 = "Já que você é o 'sensei', sua assinatura é necessária para a transferência de um aluno sob sua responsabilidade... É isso?"
12160-49 = "Entendo, entendo……"
12160-50 = "Alunos de uma escola, e um sensei... hum. Conceitos bastante problemáticos."
12160-51 = "[s] \"Vocês enganaram aquelas garotas, pisotearam seus corações e se aproveitaram de seu sofrimento.\""
12160-52 = "Sim, certamente, como você diz. Priorizamos nossos próprios interesses acima do infortúnio alheio."
12160-53 = "Não nego isso. Se nos perguntarem se nossas ações são boas ou más, certamente seriam más."
12160-54 = "No entanto, estão dentro das regras."
12160-57 = "Não quero que haja mal-entendidos quanto a isso."
12160-58 = "A calamidade que caiu sobre Abydos não foi culpa nossa."
12160-60 = "Aquela tempestade de areia que atingiu Abydos, embora muito rara, é um fenômeno que pode ocorrer com uma certa probabilidade. É assim que funcionam os desastres naturais; não há um vilão claro por trás deles."
12160-61 = "Nós apenas aproveitamos a oportunidade."
12160-63 = "Oferecer água a quem está morrendo de sede no deserto... contudo, por um valor que eles jamais conseguirão pagar, trabalhando como escravos pelo resto da vida."
12160-64 = "É apenas isso."
12160-65 = "Não é algo tão incomum; é uma história comum no mundo. Não é algo pelo qual devamos sentir um remorso especial ou assumir toda a responsabilidade."
12160-66 = "Não foi um caso que criamos pela primeira vez, e mesmo que não tivéssemos feito isso, o problema não desapareceria."
12160-67 = "Quem tem, explora quem não tem. Quem possui mais conhecimento, explora quem não possui."
12160-68 = "Isso não é um fato rigoroso da vida que qualquer adulto conhece?"
12160-71 = "Sendo assim... você não poderia se afastar de Abydos, Sensei?"
12160-72 = "Se você desistir de Hoshino, nós protegeremos aquela escola."
12160-73 = "Quanto à Kaiser PMC, nós mesmos resolveremos a situação."
12160-74 = "Aquelas garotas também conseguirão continuar frequentando o Colégio Abydos de alguma forma."
12160-75 = "E isso é algo que a própria Hoshino também deseja. O que me diz?"
12160-76 = "[s] Recusar."
12160-77 = "……Por quê?"
12160-78 = "Você pretende mesmo se tornar nosso inimigo a qualquer custo?"
12160-79 = "Você é impotente, não tem meios de lutar!"
12160-82 = "[ns] Usar o Cartão do Adulto."
12160-83 = "……."
12160-84 = "……Sensei."
12160-85 = "Certamente, essa é uma arma que só você possui. Mas eu conheço, ainda que vagamente, os riscos dela."
12160-86 = "Quanto mais você a usa, mais ela consome a sua vida, o seu tempo."
12160-87 = "……Não é verdade?"
12160-88 = "Por isso, guarde esse cartão, Sensei. Você também tem a sua própria vida para viver."
12160-89 = "Comer, pegar o trem, pagar o aluguel. Você deveria se preocupar em resolver essas coisas triviais e sem sentido, não deveria?"
12160-90 = "Por favor, faça isso, Sensei. Use-o para coisas muito mais importantes do que aquelas garotas."
12160-91 = "Não seria melhor simplesmente deixá-las de lado?"
12160-92 = "Afinal, isso não é da sua conta desde o início."
12160-93 = "[s] Recusar."
12160-94 = "Por quê? Por quê? Por quê? Por quê? Por quê? Por quê? Por quê? Por quê? Por quê? Por quê?"
12160-95 = "Eu não entendo, por quê? Por que você recusa?"
12160-96 = "Por que, Sensei? Qual é o propósito disso?"
12160-100 = "[ns] \"Não havia nenhum adulto para assumir a responsabilidade pelo sofrimento daquelas garotas.\""
12160-101 = "……O que você quer dizer com isso?"
12160-102 = "Então você vai assumir a responsabilidade? Você não é guardião nem família daquelas garotas."
12160-103 = "Você é apenas um estranho que foi chamado para Abydos por acaso e as conheceu por acaso."
12160-104 = "Por que diabos você faria isso? Por que tentar assumir uma responsabilidade que não é sua?"
12160-105 = "[s] \"Porque é isso que um adulto deve fazer.\""
12160-106 = "……."
12160-107 = "……Ah, entendo."
12160-108 = "Você quer dizer que um adulto é \"alguém que assume responsabilidades\"?"
12160-111 = "Sensei, esse seu pensamento está errado."
12160-112 = "Um adulto é aquele que remodela a sociedade como deseja, define as leis, estabelece as regras, decide o que é senso comum e o que é absurdo, o que é comum e o que é extraordinário."
12160-113 = "Dominar os que não têm poder através do poder, os que não têm conhecimento através do conhecimento, os que não têm força através da força; isso é ser um adulto."
12160-114 = "Não me venha dizer que isso não tem nada a ver com você."
12160-115 = "……Você poderia ter se tornado o governante de Kivotos."
12160-116 = "O imenso poder e autoridade nesta cidade acadêmica. E o mistério que existe nela. Tudo isso esteve, ainda que temporariamente, em suas mãos."
12160-117 = "Mas você abriu mão disso sem hesitar."
12160-118 = "Eu não entendo."
12160-119 = "Que sentido existe nessa escolha? Descartar a verdade, os mistérios, o poder, o dinheiro, a força... por que fazer uma escolha tão sem sentido!"
12160-122 = "[ns] \"……Acho que, mesmo que eu explicasse, você não entenderia.\""
12160-125 = "……."
12160-126 = "Muito bem. As negociações fracassaram, Sensei."
12160-127 = "Eu até que gostava de você... mas não há o que fazer."
12160-128 = "Sensei, você quer salvar aquela garota?"
12160-130 = "Hoshino está no laboratório, no centro da base da PMC no deserto de Abydos."
12160-131 = "O lado oculto do mistério que observamos com o \"Mimesis\", ou seja, o terror. Pretendemos começar um experimento para ver se é possível aplicá-lo em uma aluna viva."
12160-132 = "Sim, usando a Hoshino como cobaia."
12160-133 = "E, caso a Hoshino falhasse, eu pensei que aquela divindade lobo poderia substituí-la, mas... poxa, parece que a premissa toda desmoronou."
12160-134 = "Sendo assim, é melhor que se esforce ao máximo para salvar sua aluna."
12160-136 = "Embora seja pouco, desejo-lhe boa sorte."
12160-138 = "……."
12160-139 = "Sensei [USERNAME]."
12160-140 = "……A Gematria estará sempre observando você."
12160-141 = "[ns] Voltar."
12160-144 = "Bem-vindo de volta, Sensei."
12160-145 = "Sensei, estávamos esperando por você!"
12160-146 = "Sensei!"
12160-147 = "Sensei……."
12160-148 = "Você parece ter descoberto algo importante."
12160-149 = "Então, vamos lá, mais uma vez—"
12160-152 = "[ns5] \"Vamos salvar a Hoshino.\"\n[ns6] \"Vamos salvar a Hoshino!\"\n[ns7] \"Vamos salvar a Hoshino!!!\""
12160-153 = "……Hm, vamos."
12160-154 = "……Hm, vamos."
12160-155 = "……Hm, vamos."
12160-156 = "[ns] \"Vamos salvar a Hoshino e trazê-la de volta!\""
12160-157 = "Sim, eu sabia que você diria isso!"
12160-158 = "[ns] \"Vamos salvá-la, e depois dar uma bronca daquelas!\""
12160-159 = "Isso mesmo! Ela não cumpriu o que prometeu, então merece um castigo! Temos que dar uma bronca nela!"
12160-160 = "[ns] \"Vou dizer 'bem-vinda de volta' e fazê-la dizer 'estou de volta'!\""
12160-161 = "Sim……"
12160-162 = "Hã!?"
12160-163 = "Que brega, que vergonha! É tão coisa de adolescente!! Me dá até arrepios!"
12160-164 = "Eu vou dizer."
12160-165 = "Hã, o quê!?"
12160-166 = "Se a Serika-chan não vai, eu vou!"
12160-167 = "Hã, sério!?"
12160-168 = "E-eu também. Mesmo que seja um pouco vergonhoso……."
12160-169 = "A-ah, façam o que quiserem! Eu nunca diria algo tão vergonhoso assim!!"
12160-171 = "A-ah, haha... Bem, deixando isso de lado, vamos preparar o resgate……."
12160-172 = "Mas, apenas nós não seremos capazes de vencer."
12160-173 = "Precisamos de alguém para nos ajudar……."
12160-174 = "E o Clube de Soluções?"
12160-175 = "Eles nos ajudaram, é verdade, mas... será que podemos pedir de novo?"
12160-176 = "Vai dar tudo certo! Não sei onde eles se meteram agora, mas já que nos causaram tantos problemas, eles têm que nos ouvir pelo menos uma vez!"
12160-179 = "[ns] \"……Eu tenho um plano.\""
12160-180 = "Hã……?"
12160-181 = "Bem, que tipo de plano……?"
12160-183 = "Próximo episódio: O que eu quero proteger"
