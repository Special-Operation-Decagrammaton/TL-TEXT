[translation]
12160-1 = "第16話;大人の戦い"
12160-2 = "……あなたのことは知っています、連邦生徒会長が呼び出した不可解な存在。"
12160-3 = "あのオーパーツ「シッテムの箱」[ruby=あるじ]の主で[/ruby]あり、連邦捜査部「シャーレ」の先生。"
12160-4 = "あなたを過小評価する者もいるようですが、私たちは違います。"
12160-5 = "……まず、はっきりさせておきましょう。"
12160-6 = "私たちは、あなたと敵対するつもりはありません。"
12160-7 = "むしろ、協力したいと考えています。"
12160-8 = "私たちの計画において、一番の障害になりうるのはあなただと考えているのです。"
12160-9 = "私たちにとってアビドスなんて小さな学校は、全くもって大した問題ではありません。ですが先生、あなたの存在は決して些事とは言えない。敵対することは避けたいのですよ。"
12160-10 = "[s] \"あなたたちは、一体何者？\""
12160-11 = "……おっと、そういえば自己紹介をしていませんでしたか？"
12160-12 = "私たちはあなたと同じ、キヴォトスの外部の者……ですが、あなたとはまた違った領域の存在です。"
12160-15 = "適切な名前がありましたので、今はそれを拝借して使っております。私たちのことは「ゲマトリア」、とお呼びください。"
12160-16 = "そして私のことは、「黒服」とでも。この名前が気に入ってましてね。"
12160-17 = "[ruby=ゲマトリア]私たち[/ruby]は、観察者であり、探求者であり、研究者です。"
12160-18 = "あなたと同じ、「不可解な存在」だと考えていただいて問題ございません。"
12160-19 = "一応お聞きしますが、[ruby=私たち]ゲマトリア[/ruby]と協力するつもりはありませんか？"
12160-20 = "[s1] \"断る。\"\n[s2] \"微塵も無い。\""
12160-21 = "……左様ですか。"
12160-22 = "……左様ですか。"
12160-25 = "真理と秘義を手に入れられるこの提案を断ってまで、あなたはキヴォトスで何を追求するおつもりなのですか？"
12160-26 = "[s3] \"少なくとも、そんな提案に興味は無い。\"\n[s4] \"私はただ、ホシノを返してもらいに来ただけ。\""
12160-27 = "……クックックッ。"
12160-28 = "……クックックッ。"
12160-29 = "あなたの行動に正当性が無いことにお気づきですか、先生？今のあなたに一体何の権利があって、そんな要求をされているのでしょう？"
12160-30 = "ホシノはもうアビドスの生徒ではありません。届け出を確認されていないですか？"
12160-31 = "[s] \"……まだだよ。\""
12160-32 = "……ほう？"
12160-37 = "[ns] \"「顧問」である私が、まだサインをしてない。\""
12160-38 = "……。"
12160-41 = "[ns] \"だから、ホシノはまだ対策委員会の所属だし、\""
12160-43 = "[ns] \"まだアビドスの副生徒会長だし、\""
12160-45 = "[ns] \"今でも私の生徒だから。\""
12160-47 = "……なるほど。"
12160-48 = "あなたが「先生」である以上、担当生徒の去就にはあなたのサインが必要……そういうことですか。"
12160-49 = "なるほどなるほど……。"
12160-50 = "学校の生徒、そして先生……ふむ。中々に厄介な概念ですね。"
12160-51 = "[s] \"あなたたちはあの子たちを騙し、心を踏みにじり、その苦しみを利用した。\""
12160-52 = "ええ、確かに仰る通りです。他人の不幸よりも、私たちは自分たちの利益を優先しました。"
12160-53 = "それを否定はしません。私たちの行動は、善か悪かと問われればきっと悪でしょう。"
12160-54 = "しかし、ルールの範疇です。"
12160-57 = "そこは誤解はしないでいただきましょうか。"
12160-58 = "アビドスに降りかかった災難は、私たちのせいではありません。"
12160-60 = "アビドスを襲ったあの砂嵐は、大変珍しいこととはいえ、一定の確率で起こり得る現象です。誰か明確な悪役がいるわけではない、天変地異とはそういうものでしょう。"
12160-61 = "私たちはあくまで、その機会を利用しただけ。"
12160-63 = "砂漠で水を求めて死にゆく者に、水を提供する……ただし、一生奴隷として働いても返済できない額で。"
12160-64 = "ただそれだけのことです。"
12160-65 = "さして珍しくもない、世の中にはありふれた話でしょう。何も私たちが特別心を痛め、全ての責任を取るべきことではありません。"
12160-66 = "私たちが初めて作った事例でもなければ、私たちがそれをしなかったところで消えるものでもないのですから。"
12160-67 = "持つ者が、持たざる者から搾取する。知識の多いものが、そうでない者から搾取する。"
12160-68 = "大人なら誰もが知っている、厳然たる世の中の事実ではありませんか？"
12160-71 = "そういうことですから……アビドスから手を引いていただけないでしょうか、先生。"
12160-72 = "ホシノさえ諦めていただければ、あの学校については守ってさしあげましょう。"
12160-73 = "カイザーPMCのことについても、私たちの方で解決いたします。"
12160-74 = "あの子たちもどうにか、アビドス高等学校に通い続けることができるはずです。"
12160-75 = "そしてこれは、あのホシノさんも望んでいることのはず。いかがですか？"
12160-76 = "[s] 断る。"
12160-77 = "……どうして？"
12160-78 = "どうあっても、私たちと敵対するおつもりですか？"
12160-79 = "あなたは無力です、戦う手段など無いでしょうに！"
12160-82 = "[ns] 大人のカードを出す。"
12160-83 = "……。"
12160-84 = "……先生。"
12160-85 = "確かに、それはあなただけの武器です。しかし、私はそのリスクも薄っすらとですが知っています。"
12160-86 = "使えば使うほど削られていくはずです、あなたの生が、時間が。"
12160-87 = "……そうでしょう？"
12160-88 = "ですからそのカードはしまっておいてください、先生。あなたにもあなたの生活があるはずです。"
12160-89 = "食事をし、電車に乗り、家賃を払う。そういった無意味でくだらないことを、きちんと解決しなくてはいけないでしょう？"
12160-90 = "ぜひそうしてください、先生。あの子たちよりも、もっと大事なことに使ってください。"
12160-91 = "放っておいても良いではありませんか。"
12160-92 = "元々、あなたの与り知るところではないのですから。"
12160-93 = "[s] 断る。"
12160-94 = "なぜ？なぜ？なぜ？なぜ？なぜ？なぜ？なぜ？なぜ？なぜ？なぜ？"
12160-95 = "理解できません、なぜ？なぜ断るのですか？"
12160-96 = "どうして？先生、それは一体何のためなのですか？"
12160-100 = "[ns] \"あの子たちの苦しみに対して、責任を取る大人が誰もいなかった。\""
12160-101 = "……何が言いたいのですか？"
12160-102 = "だから、あなたが責任を取るとでも？あなたはあの子たちの保護者でも、家族でもありません。"
12160-103 = "あなたは偶然アビドスに呼ばれ、偶然あの子たちと会っただけの他人です。"
12160-104 = "一体どうして、そんなことをするのですか？なぜ、取る必要のない責任を取ろうとするのですか？"
12160-105 = "[s] \"それが、大人のやるべきことだから。\""
12160-106 = "……。"
12160-107 = "……ああ、そうですか。"
12160-108 = "大人とは「責任を負う者」、そう言いたいのですか？"
12160-111 = "先生、その考えは間違っています。"
12160-112 = "大人とは、望む通りに社会を改造し、法則を決めて、規則を決め、常識と非常識とを決め、平凡と非凡とを決める者です。"
12160-113 = "権力によって権力の無い者を、知識によって知識の無い者を、力によって力の無い者を支配する、それが大人です。"
12160-114 = "自分とは関係の無い話、なんてことは言わせません。"
12160-115 = "……あなたは、このキヴォトスの支配者にもなり得ました。"
12160-116 = "この学園都市における莫大な権力と権限。そしてこの学園都市に存在する神秘。その全てが、一時的にとはいえあなたの手の上にありました。"
12160-117 = "しかし、あなたはそれを迷わず手放した。"
12160-118 = "理解できません。"
12160-119 = "一体その選択に、何の意味があるのですか？真理と秘義、権力、お金、力……その全てを捨てるなんていう無意味な選択を、どうして！"
12160-122 = "[ns] \"……言ってもきっと、理解できないと思うよ。\""
12160-125 = "……。"
12160-126 = "良いでしょう。交渉は決裂です、先生。"
12160-127 = "私はあなたのことを気に入っていたのですが……仕方ありませんね。"
12160-128 = "先生、彼女を助けたいですか？"
12160-130 = "ホシノは、アビドス砂漠のPMC基地の中央にある、実験室にいます。"
12160-131 = "「ミメシス」で観測した神秘の裏側、つまり恐怖。それを、生きている生徒に適用することができるか――そんな実験を始めるつもりです。"
12160-132 = "そう、ホシノを実験体として。"
12160-133 = "そして、もしホシノが失敗したらあの狼の神が代わりに、と思っていたのですが……ふう、どうやら前提から崩れてしまったようですね。"
12160-134 = "そういうことですので、精々頑張って生徒を助けると良いでしょう。"
12160-136 = "微力ながら、幸運を祈ります。"
12160-138 = "……。"
12160-139 = "[USERNAME]先生。"
12160-140 = "……ゲマトリアは、あなたのことをずっと見ていますよ。"
12160-141 = "[ns] 帰る。"
12160-144 = "おかえり、先生。"
12160-145 = "先生、お待ちしておりました！"
12160-146 = "先生！"
12160-147 = "先生……。"
12160-148 = "何か、掴んできた顔だね。"
12160-149 = "じゃあ、あらためて――"
12160-152 = "[ns5] \"ホシノを助けに行こう。\"\n[ns6] \"ホシノを助けに行こう！\"\n[ns7] \"ホシノを助けに行こう！！！\""
12160-153 = "……ん、行こう。"
12160-154 = "……ん、行こう。"
12160-155 = "……ん、行こう。"
12160-156 = "[ns] \"ホシノを助けて、ここに連れ戻す！\""
12160-157 = "はい、そう言ってくださると思っていました！"
12160-158 = "[ns] \"助けて、その後は厳しく叱ってあげないと！\""
12160-159 = "うんうん！自分で言ったことを守れなかったんですから、お仕置きです！きちんと叱ってあげないと！"
12160-160 = "[ns] \"「おかえり」って言って、「ただいま」って言わせよう！\""
12160-161 = "うん……"
12160-162 = "えっ！？"
12160-163 = "何それ、恥ずかしい！青春っぽい！！背筋がぞわっとする！"
12160-164 = "私はする。"
12160-165 = "え、え！？"
12160-166 = "セリカちゃんがしなくても、私もします！"
12160-167 = "えっ、えぇっ！？"
12160-168 = "わ、私も。ちょっと恥ずかしいけど……。"
12160-169 = "か、勝手にして！私は絶対、そんな恥ずかしいこと言わないから！！"
12160-171 = "あ、あはは……ではそれはそうとして、救出のための準備を……。"
12160-172 = "でも、今の私たちだけじゃ勝てない。"
12160-173 = "誰か協力者を……。"
12160-174 = "便利屋は？"
12160-175 = "確かに私たちのことを助けてくれましたが……もう一度お願いしても良いのでしょうか？"
12160-176 = "大丈夫だって！またどこに行ったんだか知らないけど、ここまで散々迷惑かけられてきたんだから、これくらいのお願いは聞いてもらわないと！"
12160-179 = "[ns] \"……私に考えがある。\""
12160-180 = "え……？"
12160-181 = "えっと、それはどういった……？"
12160-183 = "次回;守りたいもの"
