[translation]
10037050-1 = "Episódio 5: As nuvens no céu não percebem que estão se despedaçando"
10037050-3 = "[ns] \"Cherino e Marina já estão descansando?\""
10037050-4 = "Sim. Especialmente a Cherino, parece que ela estava bem cansada."
10037050-5 = "A agenda estava bem apertada, então não é de se estranhar."
10037050-6 = "Hm? Eu? Estou bem, não se preocupe."
10037050-7 = "Obrigada por se preocupar comigo."
10037050-8 = "Seria mentira dizer que não estou cansada, mas...#nPreciso organizar meus pensamentos um pouco."
10037050-9 = "[s] \"--Sobre as verdadeiras intenções da reunião de intercâmbio?\""
10037050-10 = "......Ora, quem sabe?"
10037050-13 = "Até certo ponto, consigo deduzir as intenções da Líder da Seita."
10037050-14 = "Embora não tenha certeza se estou correta."
10037050-15 = "[s] \"Nem eu tenho certeza disso.\""
10037050-18 = "É mesmo? Fufu, mas se minha suposição estiver certa...#nAcho que a Líder da Seita não se importa com essas coisas."
10037050-19 = "[s] \"Na sua visão, Tomoe, o que acha de Shanhaijing?\""
10037050-20 = "Ora, você fala como se fosse do lado de Shanhaijing, Sensei."
10037050-21 = "Ah, é verdade, você está aqui a pedido da Líder da Seita, não é?"
10037050-22 = "Bem, acho que Shanhaijing é um lugar lindo."
10037050-25 = "Por ter uma história tão longa, é impressionante...#ne achei muito interessante o fato de haver tantas coisas escondidas."
10037050-26 = "E... parece que o pessoal de Shanhaijing nem percebe que essas coisas estão sendo ocultadas."
10037050-27 = "[s] \"...Pode me explicar melhor?\""
10037050-30 = "Certo. Em outras palavras--"
10037050-31 = "Um \"segredo\" só existe quando há um entendimento comum entre ambas as partes."
10037050-32 = "Se as pessoas não percebem e não tentam saber, então... ele não se concretiza."
10037050-33 = "É apenas algo que não foi revelado, ou cuja verdadeira natureza é desconhecida."
10037050-34 = "Mesmo nós, que somos forasteiras, conseguimos sentir que há algo escondido em Shanhaijing."
10037050-35 = "Mas as alunas daqui nem sequer notam isso..."
10037050-36 = "Fufu. Claro, essa é apenas a opinião pessoal de alguém que está aqui há apenas um dia."
10037050-37 = "[s] \"O que você acha da Kisaki?\""
10037050-38 = "A Líder da Seita é... uma pessoa verdadeiramente admirável."
10037050-39 = "Consigo entender por que tantas alunas a respeitam."
10037050-40 = "Ah, claro, ela não é tão fofa quanto a Cherino. #nNa verdade, ela parece até madura demais. De uma forma quase antinatural."
10037050-41 = "Estar acima dos outros e ser capaz de tomar decisões adequadas..."
10037050-42 = "......Pensando bem, fico curiosa sobre o motivo daquele comportamento estranho dela na época."
10037050-43 = "[s] \"Naquela época?\""
10037050-44 = "Sim. Quando trocamos de guia durante o passeio à tarde."
10037050-45 = "[s] \"Ah...\""
10037050-46 = "Não é estranho que a própria pessoa que nos convidou vá embora antes dos convidados?"
10037050-47 = "E olha que a Líder da Seita é alguém rigorosa com a etiqueta."
10037050-48 = "Ela disse que havia circunstâncias que não podia revelar, mas..."
10037050-49 = "Naquele momento, senti que algo estava errado. #nProvavelmente, as outras alunas sentiram o mesmo."
10037050-55 = "O que você acha, Sensei? #n...Fufu, parece que nem preciso perguntar."
10037050-56 = "......Sou um pouco mais sensível às nuances das expressões faciais do que as outras pessoas."
10037050-57 = "[s] \"Como estavam as alunas de Shanhaijing?\""
10037050-58 = "Bem..."
10037050-62 = "Se formos falar de quem encontramos hoje, tivemos a Chefe do Departamento de Execução Mina, a Chefe do Departamento de Ópera Kaguya, a Presidente da Associação Comercial Rumi e o pessoal do Jardim das Ameixeiras--"
10037050-63 = "E talvez as outras alunas com quem cruzamos de vez em quando."
10037050-64 = "......"
10037050-65 = "O que eu senti foi..."
10037050-69 = "A impressão de que, se alguém acender uma faísca, tudo pode entrar em chamas num instante."
10037050-70 = "[s] \"Isso... o que significa?\""
10037050-71 = "A maioria das coisas vem acompanhada de sinais."
10037050-72 = "As alunas daqui parecem calmas à primeira vista, mas..."
10037050-73 = "Eu senti... uma leve percepção das emoções complexas que elas emanavam."
10037050-74 = "Fiquei pensando se algum incidente não poderia eclodir e fazer com que essas emoções transbordassem."
10037050-75 = "[s] \"I-Isso não é um exagero da sua parte...?\""
10037050-76 = "É apenas uma suposição pessoal, nada mais."
10037050-77 = "……Mas nós, de Red Winter, somos sensíveis a esse tipo de atmosfera."
10037050-81 = "Precisa que eu explique o motivo novamente?"
10037050-85 = "……."
10037050-86 = "Fufu, é que golpes de estado acontecem com frequência em Red Winter."
10037050-94 = "……."
10037050-95 = "Disseram-me que queriam discutir sobre o que está acontecendo em Shanhaijing, então vim até aqui, mas..."
10037050-96 = "Que lugar estranho. #nPertence a Shanhaijing, mas não é Shanhaijing — um fim de mundo sem alunas ou instalações."
10037050-97 = "Quem seria a pessoa que conhece este lugar...?"
10037050-102 = "――Você quer dizer que não sou uma pessoa comum, não é?"
10037050-106 = "Quem está aí...?"
10037050-112 = "O caminho é escuro, mas é uma noite que não é desprezada pelo luar. Não acha?"
10037050-113 = "Você é... Shintani Kai!? Por que está aqui!?"
10037050-114 = "Oh, que surpresa. Não esperava que alguém ainda se lembrasse de mim."
10037050-115 = "……Mesmo que todos esqueçam, mesmo que finjam que fui esquecido... #nAlguém precisa continuar lembrando."
10037050-116 = "Hehe... Você continua a mesma, Kaguya. #nAté eu, que não costumo decorar rostos, ainda reconheço alguns."
10037050-117 = "O Clube de Ópera de Pequim ainda está em atividade? #nParece que a reputação está muito boa, não é?"
10037050-118 = "Você parece ter bastante tranquilidade mental para se preocupar com os outros, Shintani Kai."
10037050-119 = "Hehe. Está preocupada comigo? #nOra, ora... Nunca pensei que chegaria o dia em que eu receberia agradecimentos."
10037050-120 = "Não preciso de agradecimentos. Não acho que a sua expulsão tenha sido um erro, no fim das contas."
10037050-121 = "\"No fim das contas\"? #nHehe, você gosta de deixar as coisas subentendidas, não é?"
10037050-122 = "……A Mestra do Portão te expulsou sem seguir os procedimentos habituais. #nAlém disso, todos os registros sobre você foram apagados."
10037050-123 = "Não tenho o hábito de ficar remoendo o passado... mas, sim, é verdade. #nSe não fosse por aquela expulsão, eu já teria me formado há muito tempo... embora agora eu esteja apenas com o nome removido."
10037050-124 = "Ah, cheguei a ser encarcerado no Departamento Correcional uma vez... #nAgora, só me resta vagar como um fantasma pelos arredores de Kivotos..."
10037050-125 = "……Surpreendente. Shintani Kai lamentando a própria desgraça."
10037050-126 = "É assim que soa? #nPelo visto, minha lábia também perdeu o brilho."
10037050-127 = "Por que você me chamou?"
10037050-128 = "Claro que é para discutir sobre a Shanhaijing atual."
10037050-129 = "Você acha mesmo que entende a situação atual de Shanhaijing?"
10037050-130 = "Hehe... Você quer dizer que um fantasma do passado não deveria se meter, não é?"
10037050-131 = "Bem, eu nem sou mais de Shanhaijing... então não tenho o direito de dizer nada."
10037050-135 = "Mas eu sei, pelo menos, que uma visitante de Red Winter esteve aqui e causou um pequeno alvoroço."
10037050-140 = "Como você sabe disso...!?"
10037050-142 = "Shanhaijing me esqueceu. Mas eu não esqueci. #n――Eu não consigo esquecer."
10037050-143 = "……Você realmente tem meios de saber sobre os assuntos de Shanhaijing...?"
10037050-144 = "Hehe... Você apresentou a ópera de Pequim para Red Winter, não foi? #nComo se sentiu, Kaguya?"
10037050-145 = "……Não pretendo responder."
10037050-146 = "Tudo bem. Isso já é uma resposta. #n――Foi \"humilhante\". Não foi?"
10037050-147 = "……!"
10037050-148 = "Expor tudo de si diante de alguém que não conhece o valor da tradição nem o significado da ópera..."
10037050-149 = "Ah... eu entendo bem essa humilhação — melhor do que ninguém."
10037050-151 = "Você foi expulso... não ouse questionar as decisões da Mestra do Portão!"
10037050-153 = "Oh? E você, não é justamente quem está duvidando das decisões de Kisaki?"
10037050-154 = "O fato de você ter vindo até aqui é a prova disso, não é?"
10037050-155 = "……!!!"
10037050-160 = "Eu vejo... Ah, eu vejo sim. #nAs ondulações que nasceram em Shanhaijing... e até mesmo os resultados que elas trarão."
10037050-161 = "Deste jeito, a Ópera de Pequim se tornará uma relíquia do passado... e será esquecida, não é?"
10037050-162 = "Mudança é algo assim. #nComo um rio que desgasta a rocha... tudo muda de forma constante."
10037050-167 = "――Não insulte a Ópera de Pequim!"
10037050-168 = "Não tenho a intenção de insultá-la. Mesmo que todos ignorem a Ópera de Pequim, alguém precisa proteger essa tradição. #nNão é verdade?"
10037050-170 = "……Você quer que eu assuma esse papel?"
10037050-171 = "Quem mais poderia ser?"
10037050-172 = "……Por que eu?"
10037050-173 = "Porque em Shanhaijing, ninguém entende melhor o valor e o significado da tradição do que... #n――o Clube da Ópera de Pequim."
10037050-174 = "……Pelo menos, é assim que me lembro de quando eu estava matriculado em Shanhaijing, não é?"
10037050-175 = "……!"
10037050-176 = "Todos dizem em uníssono que a tradição deve ser protegida, mas..."
10037050-177 = "Quase ninguém entende exatamente o quão importante isso é."
10037050-178 = "Deveríamos respeitar a história, aquilo que nos foi transmitido do passado! #nO presente só existe porque tem as raízes do passado!"
10037050-179 = "Apesar disso, a Associação Comercial Xuanwu nega essa base fundamental e..."
10037050-182 = "Corrompe Shanhaijing usando a culinária como desculpa! #nQuantas tradições mais eles vão pisotear em nome do lucro antes de ficarem satisfeitos!?"
10037050-183 = "A Mestra do Portão... por que ela deixa esses insolentes agirem livremente..."
10037050-184 = "Que tipo de perigo eles trarão... é algo óbvio, mesmo assim!"
10037050-187 = "O Sensei do Schale também é um alvo que deve ser vigiado. #nE mesmo assim... não satisfeitos com isso, agora eles convidam até mesmo Red Winter..."
10037050-188 = "Hehe..."
10037050-190 = "Eu ouvi a conversa de vocês. #n――Kaguya, você é uma pessoa do Clube da Ópera de Pequim."
10037050-191 = "Sendo assim, não deveria expressar isso através da Ópera de Pequim? #n――Se você realmente deseja proteger a tradição."
10037050-192 = "O que você quer dizer com isso?"
10037050-193 = "Bem... que tal apresentar uma nova Ópera de Pequim?"
10037050-198 = "O conteúdo da Ópera de Pequim... hehe, deveria ser este..."
10037050-205 = "!? O que você está...!? Além disso, eu e o Clube da Ópera de Pequim não temos tal qualificação...!"
10037050-207 = "Ora, que coisa estranha a se dizer."
10037050-208 = "Você está dizendo que a presidente do Clube da Ópera de Pequim, que entende e protege a tradição de Shanhaijing melhor do que ninguém, 'não tem qualificação'?"
10037050-209 = "……!"
10037050-210 = "Bem, talvez não passe de uma tolice dita por alguém que foi banido."
10037050-211 = "Nós apresentarmos uma nova Ópera de Pequim... #ne se falharmos?"
10037050-212 = "Interessante. Existe necessidade de discutir sucesso ou fracasso?"
10037050-213 = "……!!!"
10037050-214 = "Hehe, veja só... a presidente da Ópera de Pequim também se deixou corromper pelo mundo mundano. #nAh... será que, no fim das contas, tudo só pode mudar?"
10037050-215 = "N-não se intrometa! Mesmo que todos esqueçam, se houver alguém que se lembre disso...!"
10037050-216 = "Sim, exatamente. Bem, não precisa se preocupar. Eu prepararei o palco."
10037050-220 = "Como você vai..."
10037050-221 = "Hehe, eu também tenho meus contatos, sabe."
10037050-222 = "……Isso é um assunto de Shanhaijing. #nNão deveria ter nada a ver com você, Sanya Kai."
10037050-223 = "Nós, do Clube da Ópera de Pequim... apenas demonstramos lealdade a Shanhaijing. #nNão se engane quanto a isso."
10037050-224 = "Ah, claro, eu entendo muito bem."
10037050-229 = "Hehe... agora finalmente começou."
10037050-237 = "Com todo o respeito, eu ouvi tudo. #nSr. Kai... o que exatamente você pretende fazer?"
10037050-238 = "Uma faísca."
10037050-240 = "Uma faísca...?"
10037050-241 = "Sim. Por menor que seja, na escuridão, ela emite a luz mais brilhante."
10037050-242 = "O fogo, quanto mais se espalha, mais intensamente queima."
10037050-243 = "O que você acha?"
10037050-249 = "……Como o Clube de Pesquisa de Alquimia, apenas aguardamos o retorno da verdadeira presidente."
10037050-250 = "Ainda falando disso? #nBem... é por isso que você ainda me segue, não é?"
10037050-251 = "Presidente Saya... não, Yakushi Saya não é digna de ser a presidente do Clube de Pesquisa de Alquimia. #nUma existência insignificante, inferior ao Senhor Kai."
10037050-252 = "O Clube de Pesquisa de Alquimia apenas... deseja recuperar seu verdadeiro mestre."
10037050-253 = "Entendo."
10037050-258 = "Sendo assim, acho que vou pedir um favor."
10037050-259 = "Peça o que desejar."
10037050-260 = "Mesmo que isso signifique não ter garantia alguma sobre o amanhã?"
10037050-261 = "Pois, para o atual Clube de Pesquisa de Alquimia, não existe amanhã."
10037050-266 = "...Então está bem. Volte para o Clube de Pesquisa de Alquimia... e cumpra o seu dever."
10037050-267 = "Como desejar."
