[translation]
10037050-1 = "第5話;空雲は千切れ飛ぶことに気づかず"
10037050-3 = "[ns] \"チェリノとマリナはもう休んでるの？\""
10037050-4 = "はい。特にチェリノちゃんはかなり疲れていたみたいで。"
10037050-5 = "スケジュールもタイトでしたから、無理もありませんね。"
10037050-6 = "うん？私ですか？大丈夫ですよ。"
10037050-7 = "心配してくださり、ありがとうございます。"
10037050-8 = "疲れていない、と言えば嘘になりますが……#n少しだけ、考えを整理する必要がありまして。"
10037050-9 = "[s] \"――交流会の真意とか？\""
10037050-10 = "……さあ、それはどうでしょう。"
10037050-13 = "門主様の意図も、ある程度は察しがつきます。"
10037050-14 = "それが合っているかの確証はありませんが。"
10037050-15 = "[s] \"それは私にも分からないかな。\""
10037050-18 = "そうですか？ふふ、でも私の推測通りでしたら……#n門主様はそんな事、気にしないと思いますが。"
10037050-19 = "[s] \"トモエから見て、山海経はどう？\""
10037050-20 = "あら、まるで先生が山海経側のような聞き方ですね。"
10037050-21 = "ああ、そういえば、先生は門主様の依頼でここにいらっしゃるんでしたっけ。"
10037050-22 = "そうですね。山海経は、美しい場所だと思います。"
10037050-25 = "歴史が長いため、印象深く……#nそして隠されているものがとても多いことが、非常に興味深いと思いました。"
10037050-26 = "そして……山海経の皆さんは、それらが隠蔽されているとは思っていない様子で。"
10037050-27 = "[s] \"……詳しく教えてくれる？\""
10037050-30 = "そうですね。つまり――"
10037050-31 = "「秘密」は、双方の共通認識の上で成り立つものです。"
10037050-32 = "人々が認識せず、知ろうとしないのであれば――それは成立しません。"
10037050-33 = "ただ知らされてない――または正体すら分からないものに過ぎないのです。"
10037050-34 = "余所者である私たちでさえ、山海経には何かが隠されているのだと感じるくらいなのに。"
10037050-35 = "当の生徒たちは、それすら気づいていない……。"
10037050-36 = "ふふっ。もちろん、一日しか滞在していない私個人の意見に過ぎませんけどね。"
10037050-37 = "[s] \"キサキについては、どう思う？\""
10037050-38 = "門主様は……とても素晴らしいお方です。"
10037050-39 = "多くの生徒から敬われるのも、少し分かるような気がします。"
10037050-40 = "あ、もちろん、チェリノちゃんほど可愛くはないですよ。#nむしろ、成熟しすぎている印象すらあります。それも、不自然なほどに。"
10037050-41 = "人の上に立ち、適切な判断を下すことができる……。"
10037050-42 = "……こうして思い返すと、あの時不自然な行動をしていた理由が気になるところです。"
10037050-43 = "[s] \"あの時？\""
10037050-44 = "ええ。午後の観光で、案内役を変えた時のことです。"
10037050-45 = "[s] \"あ……。\""
10037050-46 = "招待した当人が、客人を前に先に帰るなんて、不自然でしょう？"
10037050-47 = "門主様は礼儀作法に厳しいお方だというのに。"
10037050-48 = "どうしても言えない事情がある、とは仰っていましたが……。"
10037050-49 = "あの時点で私は、違和感を覚えていました。#nおそらく、他の生徒も同じ感情を抱いていたのでしょう。"
10037050-55 = "先生はどうお思いですか？#n……ふふ、どうやら聞くまでもないようですね。"
10037050-56 = "……私は他人より、表情の機微に少し敏感なんですよ。"
10037050-57 = "[s] \"山海経の生徒はどうだった？\""
10037050-58 = "そうですね……"
10037050-62 = "私たちが今日お会いした方といえば、ミナ執行部長にカグヤ京劇部長、ルミ商会長と梅花園の皆さん――"
10037050-63 = "あと、たまにすれ違っていた他の生徒さん、くらいでしょうか。"
10037050-64 = "……。"
10037050-65 = "私が感じたのは……"
10037050-69 = "誰かが火を点ければ、たちまち燃え盛ってしまいそうな印象、ですね。"
10037050-70 = "[s] \"それは……どういう意味？\""
10037050-71 = "大抵の物事には、[ruby=・   ・]兆し[/ruby]が伴うものです。"
10037050-72 = "ここの生徒さんは、一見すると穏やかに見えますが……"
10037050-73 = "彼女たちが漂わせていた複雑な感情を……わずかに感じたのです。"
10037050-74 = "何かの事件が勃発し、その感情が噴出してしまうのではないかと……#nそう思った次第です。"
10037050-75 = "[s] \"そ、それは流石に言い過ぎでは……。\""
10037050-76 = "あくまで、個人的な推察に過ぎません。"
10037050-77 = "……でも、私たちレッドウィンターはこういう雰囲気に敏感なんです。"
10037050-81 = "理由を改めて説明する必要がありますか？"
10037050-85 = "……。"
10037050-86 = "ふふ、レッドウィンターではよくクーデターが起きていますから。"
10037050-94 = "……。"
10037050-95 = "「山海経で起きている事について話し合いたい」と言われ、ここまで来たのだが……"
10037050-96 = "奇妙な場だ。#n山海経に属しているが、山海経でもない――生徒も施設も無い最果ての地。"
10037050-97 = "此処を知っている人物とは、一体……。"
10037050-102 = "――ただ者ではない、と言いたいのかな？"
10037050-106 = "誰だ……？"
10037050-112 = "道は暗いが、月光に疎まれずに済む夜だ。そうは思わないかい？"
10037050-113 = "貴殿は……[ruby=しんたに]申谷[/ruby]カイ！？どうして此処に！？"
10037050-114 = "ほぉ、まさか私を覚えている者がいるとはね。驚いたよ。"
10037050-115 = "……皆が忘れたとしても、忘れられたことになったとしても……#n誰かは記憶し続けねばならないからな。"
10037050-116 = "ククッ……相変わらずだね、カグヤ。#n人の顔なぞ覚えない私ですら、まだ分かる者がいるくらいだ。"
10037050-117 = "京劇部は、まだ活動中なのかね？#n評判は上々のようじゃないか。"
10037050-118 = "他人に気を配れるほど、心に余裕があるようだな、申谷カイ。"
10037050-119 = "ククッ。私を心配してくれるのか？#nこれはこれは……まさか、お礼を言う日が来るとは思いもしなかった。"
10037050-120 = "礼など不要。貴殿の退学処分について、結果的に間違っているとは思わぬからな。"
10037050-121 = "「結果的に」？#nククッ、含みをもたせるじゃあないか。"
10037050-122 = "……門主様は、従来の手続きを踏まずに貴殿を追放した。#nさらに、貴殿に関する全ての記録も抹消していた。"
10037050-123 = "昔話に花を咲かせる趣味はないんだが……まあ、そうだね。#nあの退学処分がなければ、私はとっくに卒業していただろう……今は除籍の身だが。"
10037050-124 = "ああ、一度は矯正局に収監されたこともあった……#n今はただ幽鬼のように、キヴォトスの外郭を彷徨う羽目になってしまったがねぇ……。"
10037050-125 = "……意外だな。申谷カイが己の不幸を嘆くだなんて。"
10037050-126 = "そう聞こえるのかい？#nこりゃあ、私の話術も衰えてしまったもんだ。"
10037050-127 = "どうして[ruby=わたし]、私を[/ruby]呼んだ？"
10037050-128 = "もちろん――今の山海経について話し合いたいからさ。"
10037050-129 = "貴殿に、昨今の山海経の情勢が分かるとでも？"
10037050-130 = "ククッ……過去の亡霊は首を突っ込むな、とでも言いたげだね。"
10037050-131 = "まあ、山海経の者ですらない私が……何かを言う筋合いはないか。"
10037050-135 = "でも、レッドウィンターの訪問客がここを訪れ、少しばかり騒ぎが起きていることくらいは知っているとも。"
10037050-140 = "どうしてそれを……！？"
10037050-142 = "山海経は私を忘れた。だが、私は忘れてなどいない。#n――忘れられないのさ。"
10037050-143 = "……山海経の事情を知る術が、今の貴殿にあるとでも……？"
10037050-144 = "ククッ……レッドウィンターの前で京劇を披露したんだろう？#nどんな気分だったんだい？カグヤ。"
10037050-145 = "……答えるつもりはない。"
10037050-146 = "それでいい。それがもう返答になっている。#n――「屈辱」だった。そうだろう？"
10037050-147 = "……！"
10037050-148 = "伝統の価値も京劇の意味も、何ひとつ知らぬ者の前で、己のすべてを曝け出す……。"
10037050-149 = "ああ……その屈辱、よく分かるとも――他の誰よりも。"
10037050-151 = "追放された分際で……門主様の決定に口を挟むなっ！"
10037050-153 = "ほう？そういう君こそ、キサキの決定に疑問を抱いているのではないかね？"
10037050-154 = "ここまで足を運んでいることが、その証左だというのに、ねぇ？"
10037050-155 = "……！！！"
10037050-160 = "見える――ああ、見えるとも。#n山海経で生まれた波紋が――それがもたらす結果さえも。"
10037050-161 = "このまま京劇は過去の遺産となり――忘れ去られてしまうだろうね。"
10037050-162 = "変化とは、そういうものさ。#n河川が岩を削るように……すべては着実に移り変わる。"
10037050-167 = "――京劇を貶すでない！"
10037050-168 = "貶すつもりは無いさ。誰もが京劇を蔑ろにしたって、その伝統を守る者は必要。#nそうだろう？"
10037050-170 = "……その役割を、私が担えと？"
10037050-171 = "他に誰がいる？"
10037050-172 = "……何故、私なのだ？"
10037050-173 = "山海経において、伝統の価値と意味を最もよく理解しているのは――#n――京劇部をおいて他にいないからだよ。"
10037050-174 = "……少なくとも、私が山海経に在籍していた頃はそうだったと記憶しているがねぇ？"
10037050-175 = "……！"
10037050-176 = "皆、伝統は守られるべきだと口を揃えるが……"
10037050-177 = "それがどれほど重要なのか、正確に理解している者はほとんどいない。"
10037050-178 = "我々は過去から受け継がれてきたもの、その歴史を尊重すべきなのに！#n現在は過去という根があってこそ存在するものだというのに！"
10037050-179 = "なのに、玄武商会はその根幹を否定し――"
10037050-182 = "料理を理由に、山海経を穢していく！#n商売のために、一体いくつの伝統を踏みにじれば気が済むのだ！？"
10037050-183 = "門主様は……どうしてあの不届き者を放っておくのだろう……"
10037050-184 = "彼女らが、どのような危険をもたらすかなんて……一目瞭然だというのに！"
10037050-187 = "シャーレの先生も警戒すべき対象だ。#nなのに……それに飽き足らず、今度はレッドウィンターまで招くだなんて……"
10037050-188 = "ククッ……"
10037050-190 = "話は聞かせてもらったよ。#n――カグヤ、君は京劇部の人間だ。"
10037050-191 = "であれば、京劇で語る必要があるんじゃないか？#n――真に伝統を守りたいのであれば。"
10037050-192 = "どういう、意味だ。"
10037050-193 = "そうさな……新しい京劇を披露してみるのはどうだ？"
10037050-198 = "京劇の内容は……ククッ、これにすれば良い……"
10037050-205 = "！？な、何を！？そもそも[ruby=わたし]、私と[/ruby]京劇部に、そのような資格など……！"
10037050-207 = "ほう、妙なことを言うんだな。"
10037050-208 = "山海経の伝統を誰よりも理解し、守ってきた京劇部の部長に、「資格がない」とでも？"
10037050-209 = "……！"
10037050-210 = "まあ、所詮は追放された者の[ruby=ざれごと]戯言[/ruby]に過ぎないかもしれないがねぇ。"
10037050-211 = "私たちが、新しい京劇を、披露する……#nもし、失敗すれば？"
10037050-212 = "面白い。成功か失敗かを論ずる必要が？"
10037050-213 = "……！！！"
10037050-214 = "ククッ、これはこれは……京劇部長も俗世に染まってしまったものだ。#nああ……やっぱり、すべては変化するしかないのかねぇ？"
10037050-215 = "か、勝手に口を挟むな！皆が忘れたとしても、それを記憶する者が居るのなら……！"
10037050-216 = "そう、その通り。まあ、心配しなくても良い。舞台は用意してやろう。"
10037050-220 = "どうやって……？"
10037050-221 = "ククッ、私にも、それなりのツテがあるものでね。"
10037050-222 = "……これは山海経の事情。#n貴殿とは関係ないはずだ、申谷カイ。"
10037050-223 = "私たち京劇部は……あくまで山海経へ忠義を示すだけ。#nそれだけは、履き違えないでくれ。"
10037050-224 = "ああ、もちろん、よく分かっているとも。"
10037050-229 = "ククッ……これでようやく始まったな。"
10037050-237 = "僭越ながら、すべて拝聴しておりました。#nカイ様……一体何をなさるおつもりですか？"
10037050-238 = "火種だよ。"
10037050-240 = "火種……？"
10037050-241 = "ああ。いくらちっぽけだろうと、暗闇の中では最も明るい光を放つものさ。"
10037050-242 = "火は、移れば移るほど、より盛んに燃え盛るもの。"
10037050-243 = "君はどう思う？"
10037050-249 = "……錬丹術研究会としては、真の会長のお戻りを待ち望むだけです。"
10037050-250 = "まだそれを言うのか。#nまあ……だからこそ、未だ私に従っているのだろうがな。"
10037050-251 = "サヤ会長……いえ、[ruby=やくし]薬子[/ruby]サヤは錬丹術研究会の会長にふさわしくありません。#nカイ様に劣る矮小な存在。"
10037050-252 = "錬丹術研究会はただ……真の主を取り戻したいだけです。"
10037050-253 = "そうか。"
10037050-258 = "ならば、頼もうかな。"
10037050-259 = "なんなりと。"
10037050-260 = "たとえそれが、明日を保証できぬものだとしても？"
10037050-261 = "今の錬丹術研究会に、明日など御座いませんので。"
10037050-266 = "……なら良い。錬丹術研究会に帰り……事を成せ。"
10037050-267 = "御意。"
