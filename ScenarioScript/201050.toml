[translation]
201050-1 = "Episódio 5; Erro de Memória"
201050-3 = "Você é a... Presidente do Conselho Estudantil?"
201050-4 = "Sim, sou eu... O que houve, Rin?"
201050-5 = "É verdade que fiquei ausente por muito tempo. #nMas agir como se fosse a nossa 'primeira vez'..."
201050-6 = "Não. Eu não conheço você."
201050-8 = "...Rin."
201050-9 = "Você ficou preocupada por eu ter desaparecido de repente?"
201050-10 = "Talvez qualquer coisa que eu diga soe como uma desculpa. #nMas..."
201050-11 = "Não, é exatamente o que eu disse."
201050-12 = "Deveria ser a nossa primeira vez. Eu não conheço você. #nNem seu rosto, nem sua voz, nada."
201050-13 = "A Presidente do Conselho Estudantil que eu conheço não é você."
201050-14 = "Mesmo que seja uma piada, isso ultrapassa o limite do aceitável."
201050-15 = "...Algo aconteceu, não é?"
201050-16 = "Com licença, pode chamar a Aoi... digo, a Chefe do Departamento Financeiro agora mesmo?"
201050-17 = "Tenho algo a tratar sobre a administradora..."
201050-18 = "(O que será que essa pessoa está pensando?)"
201050-19 = "(Ela sabe que a verdade virá à tona assim que alguém chegar, então por que chamar a Chefe do Departamento Financeiro...)"
201050-26 = "Ora... Administradora Rin. Você estava aqui."
201050-27 = "Ouvi dizer que você não voltou para o dormitório ontem, então fiquei preocupada. #nNão me diga que você virou a noite logo após o fim das férias?"
201050-28 = "Não faz sentido ter tirado folga se for para fazer isso."
201050-29 = "Agora, mais importante do que isso, essa pessoa de fora..."
201050-30 = "Então... qual é o motivo da sua visita, Presidente do Conselho Estudantil?"
201050-31 = "...Hã?"
201050-32 = "Aoi, o que você acabou de..."
201050-33 = "Aconteceu alguma coisa?"
201050-34 = "Estou falando com a Presidente do Conselho Estudantil."
201050-35 = "Aoi..."
201050-36 = "Você... acha que essa pessoa é a Presidente do Conselho Estudantil!?"
201050-37 = "Por que você está dizendo isso, veterana Rin?"
201050-38 = "Confirmar algo tão óbvio..."
201050-39 = "Essa pessoa é a nossa Presidente do Conselho Estudantil, não é?"
201050-44 = "...Presidente do Conselho Estudantil? Ela sempre foi assim, não foi?"
201050-45 = "Sinto que a atmosfera dela mudou um pouco, mas... é só isso, não é?"
201050-47 = "Claro que me lembro. Não tem como esquecer aquele tom loiro platinado que parece salgadinho de menta."
201050-48 = "Hã? O cabelo não era azul claro...?"
201050-49 = "Você não está se confundindo?"
201050-51 = "A aparência da Presidente do Conselho Estudantil? Claro que me lembro!"
201050-52 = "Cabelo rosa e olhos verdes..."
201050-53 = "Ah, espera, essa era a ex-interina Kaya. Hum, na verdade, a Presidente do Conselho Estudantil era..."
201050-54 = "Cabelo preto... era isso?"
201050-56 = "Ve-veterana... mesmo que me pergunte tantas vezes, eu realmente não sei."
201050-57 = "A Presidente do Conselho Estudantil continua a mesma de sempre."
201050-61 = "Com todo o respeito..."
201050-62 = "Não será que sua memória está confusa por ter se esforçado demais ultimamente?"
201050-64 = "...Você se acalmou um pouco?"
201050-65 = "De alguma forma, hoje você não parece a Rin de sempre."
201050-69 = "Por que... por que vocês não se lembram?"
201050-70 = "Passamos tanto tempo juntas... por que?"
201050-71 = "Não, é justamente por isso... Quem é você, que todos pensam ser a Presidente do Conselho Estudantil?"
201050-72 = "Talvez... isso seja culpa minha."
201050-73 = "Por ter me ausentado por tanto tempo, acabei sobrecarregando vocês demais."
201050-74 = "A memória humana muda facilmente devido ao estresse excessivo ou fadiga.#nPor isso, mesmo que Rin não se lembre de mim..."
201050-75 = "Não."
201050-76 = "Mesmo que vocês não se lembrem... os vestígios e registros que ela deixou ainda existem."
201050-77 = "Se olharmos para a foto que tirei com a Presidente..."
201050-83 = "Por que...?"
201050-84 = "Apenas a Presidente... desapareceu...?"
201050-85 = "...Sinto muito, Rin."
201050-86 = "Não precisa se preocupar com o trabalho por enquanto.#nEu cuidarei de tudo."
201050-87 = "Já que está aqui, aproveite um pouco mais as suas férias."
201050-88 = "De fato, esta foto..."
