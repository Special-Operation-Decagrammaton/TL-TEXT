[translation]#[Texto Final. mas eventualmente pode haver alterações na formatação de texto. - Filipe 03/07.]
201050-1 = "Episódio 5: Erro de Memória"
201050-3 = "Você…… a Presidente do Conselho\nEstudantil Geral?"
201050-4 = "Sim, exatamente…… O que houve, Rin?"
201050-5 = "De fato, passei muito tempo ausente.#nMas me tratar como se fosse nosso\n\"primeiro encontro\"……"
201050-6 = "Não. Eu não conheço você."
201050-8 = "……Rin."
201050-9 = "Você passou todo esse tempo magoada\npor eu ter sumido de repente?"
201050-10 = "Talvez tudo o que eu diga soe\ncomo desculpa esfarrapada.#nMas――"
201050-11 = "Não. É literal."
201050-12 = "Este é nosso primeiro encontro.\nEu não conheço você.#nNem o rosto, nem a voz. Nada."
201050-13 = "A Presidente do Conselho Estudantil Geral\nque eu conheço não é você."
201050-14 = "Mesmo que fosse piada, já passou do limite\ndo que se releva com um sorriso."
201050-15 = "……Aconteceu alguma coisa, não foi?"
201050-16 = "Com licença―― pode chamar a Aoi……\ndigo, a Chefe de Finanças, agora mesmo?"
201050-17 = "Preciso falar sobre a Administradora――"
201050-18 = "(No que essa pessoa está pensando?)"
201050-19 = "(Basta alguém chegar pra farsa cair.\nE ela ainda chama a Chefe de Finanças――)"
201050-26 = "Ora…… Administradora Rin. Você estava aqui."
201050-27 = "Fiquei preocupada, ouvi que você não voltou\npro dormitório ontem.#nNão me diga que emendou uma virada\nlogo depois da folga?"
201050-28 = "Se for isso, a folga que arranjamos\npra você perde todo o sentido."
201050-29 = "Esqueça isso agora. Antes, esta intrusa――"
201050-30 = "E então…… o que deseja,\nPresidente do Conselho Estudantil Geral?"
201050-31 = "……Quê?"
201050-32 = "Aoi, o que você acabou de……"
201050-33 = "Algum problema?"
201050-34 = "Estou falando com a Presidente\ndo Conselho Estudantil Geral."
201050-35 = "Aoi……"
201050-36 = "Você acha que essa pessoa\né a Presidente do Conselho?!"
201050-37 = "Veterana Rin, quem tá estranha é você."
201050-38 = "Me fazer confirmar uma coisa tão óbvia……"
201050-39 = "Essa pessoa é a nossa Presidente\ndo Conselho Estudantil Geral, não é?"
201050-44 = "……A Presidente? Ela sempre foi assim, ué."
201050-45 = "Até acho que o clima dela mudou um pouco……\nmas só isso, né?"
201050-47 = "Lógico que lembro. Como eu esqueceria\naquele platinado cor de salgadinho\nsabor mentaiko?"
201050-48 = "Quê? O cabelo era azul-claro……?"
201050-49 = "Não tá confundindo as coisas?"
201050-51 = "A aparência da Presidente?\nClaro que eu lembro!"
201050-52 = "Cabelo rosa e olhos verdes――"
201050-53 = "Ah, não, essa é a ex-interina Kaya.\nHmm, a Presidente era……"
201050-54 = "De cabelo…… preto?"
201050-56 = "V-Veterana…… mesmo que pergunte várias\nvezes, eu não sei o que dizer."
201050-57 = "A Presidente do Conselho está igual\nao que sempre foi."
201050-61 = "Er…… com todo o respeito……"
201050-62 = "Não seria confusão na sua memória,\ncausada por excesso de trabalho?"
201050-64 = "……Acalmou-se um pouco?"
201050-65 = "Hoje você não parece você mesma, Rin."
201050-69 = "Por que…… ninguém se lembra?"
201050-70 = "Depois de tanto tempo que passamos\njuntas…… por quê?"
201050-71 = "Não…… justamente por isso……\nvocê, que todos acreditam ser\na Presidente do Conselho……#nquem é você?"
201050-72 = "Isso…… pode ser culpa minha."
201050-73 = "Minha longa ausência colocou um peso\ngrande demais sobre você."
201050-74 = "A memória humana se altera com facilidade\nsob estresse e cansaço excessivos.#nPor isso, mesmo que não se lembre\nde mim, Rin――"
201050-75 = "Não."
201050-76 = "Mesmo que ninguém se lembre……\nos rastros e registros que ela deixou\ncontinuam existindo."
201050-77 = "Basta ver as fotos que tiramos\ncom a Presidente――"
201050-83 = "Por quê……?"
201050-84 = "Só a Presidente…… sumiu das fotos……?"
201050-85 = "……Sinto muito, Rin."
201050-86 = "Pode deixar o trabalho de lado\npor um tempo.#nEu assumo as suas tarefas."
201050-87 = "Aproveite e estenda um pouco mais\nas suas férias."
201050-88 = "Não há dúvida, esta foto é……"
