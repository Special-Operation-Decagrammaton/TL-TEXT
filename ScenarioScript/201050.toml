[translation]
201050-1 = "Episódio 5: Falha de Memória"
201050-3 = "Você ousa afirmar que é a... Presidente Geral do Conselho Estudantil?"
201050-4 = "Mas é claro que sim... qual é o problema, Rin?"
201050-5 = "Eu confesso que a minha ausência burocrática foi excessivamente prolongada.#nMas... me receber com essa frieza patética e encenar um 'primeiro encontro'..."
201050-6 = "Negativo. O meu banco de dados não tem registros seus."
201050-8 = "……Rin."
201050-9 = "O meu sumiço surpresa machucou a sua alma tão profundamente assim?"
201050-10 = "Eu sei que qualquer palavra que eu cuspir soará como desculpa barata agora.#nMas ainda assim――"
201050-11 = "Eu falo no sentido literal e biológico."
201050-12 = "Isto é um primeiro contato oficial. A minha memória não a reconhece.#nSeu rosto, sua voz, o seu DNA, nada."
201050-13 = "A Presidente Geral do Conselho que domina a minha memória definitivamente não é a senhorita."
201050-14 = "E se isso for um show de comédia ou um teste, o seu mau gosto acaba de cruzar a linha da paciência do Estado."
201050-15 = "……Algo quebrou dentro do seu cérebro."
201050-16 = "Com licença... Aoi... ou melhor, chame a Chefe de Finanças aqui imediatamente!"
201050-17 = "Preciso despachar um inquérito clínico sobre a saúde mental da Chefe Administr――"
201050-18 = "（O que as engrenagens dessa invasora estão calculando?）"
201050-19 = "（Se mais olhos cruzarem com ela, a fraude será exposta em segundos. Por que ela exige convocar o alto escalão?）"
201050-26 = "Ora, ora... então você bateu ponto aqui, Oficial Rin."
201050-27 = "A ronda me reportou que a sua cama no dormitório amanheceu vazia.#nNão me diga que você cedeu aos seus vícios doentios, jogou a folga no lixo e virou a noite engolindo burocracia de novo?!"
201050-28 = "A gente derrama sangue pra aprovar férias pro seu corpo, e você sabota a própria saúde... Inacreditável."
201050-29 = "A pauta disciplinar fica pra depois. Foque nesta invasora civil――"
201050-30 = "Mas enfim... do que você precisa, [ruby=・   ・   ・   ・   ・   ・]Presidente[/ruby]?"
201050-31 = "……Perdão?"
201050-32 = "Aoi, repita o título que a sua boca acabou de..."
201050-33 = "Teve algum derrame nos seus canais auditivos?"
201050-34 = "Eu me dirigi à Presidente Geral do Conselho Estudantil."
201050-35 = "Aoi..."
201050-36 = "O seu cérebro reconhece esta estranha usurpando o nome da Presidente Desaparecida?!"
201050-37 = "Rin-senpai, que delírio febril é esse que você tá balbuciando?"
201050-38 = "Questionar as leis da gravidade ou da biologia agora..."
201050-39 = "Esta é a nossa Presidente Geral e a Coroa Absoluta do Conselho. Sempre foi."
201050-44 = "……Hã? A aparência da Presidente? Ué, os traços dela sempre foram aqueles."
201050-45 = "Tá, admito que hoje a aura dela tá emanando uma vibe meio esquisita... mas tirando isso, a casca física é a mesma, né?"
201050-47 = "Lógico que eu tenho a paleta de cores dela gravada! Como eu esqueceria aquele loiro platinado que lembra salgadinho de ovas?!"
201050-48 = "Hã? Como assim azul-piscina...?"
201050-49 = "Os seus neurônios não tão trocando os fios não?"
201050-51 = "O rosto da Presidente?! Eu nunca apagaria a face da salvação da memória!"
201050-52 = "Cabelo rosa chiclete e olhos verdes cintilantes... a cara do anjo――"
201050-53 = "Opa, erro de arquivo, essa paleta é da maluca da Ex-Chefe Kaya. Hummm, peraí... a Presidente era..."
201050-54 = "Cabelo preto betume... não era?"
201050-56 = "S-Senpai... Mesmo que você interrogue e esprema o meu cérebro mil vezes... eu não tenho provas em contrário..."
201050-57 = "O rosto e as digitais da Presidente Geral do Conselho continuam imutáveis desde os tempos de outrora."
201050-61 = "Bem... me perdoe a audácia clínica, Rin..."
201050-62 = "Mas talvez a asfixia das suas noites em claro tenha corrompido os seus blocos de memória e gerado essa alucinação destrutiva...?"
201050-64 = "……Os seus batimentos já pacificaram?"
201050-65 = "Esse pânico histérico e negação da realidade não casam com os meus relatórios sobre a sua personalidade, Rin."
201050-69 = "Como a biologia permite... que todo o Conselho tenha a mente lavada assim?"
201050-70 = "Vocês lamberam as botas e respiraram o mesmo ar de liderança que Ela por anos a fio... Como o DNA se esquece disso?!"
201050-71 = "Melhor ainda... Se toda a população carimbou que as engrenagens de Kivotos pertencem a você...#nQue espécie de monstro alienígena é a senhorita?"
201050-72 = "Isso... As suas sinapses quebradas são punição para os meus pecados corporativos, não são?"
201050-73 = "Abandonar a minha coroa e fugir das responsabilidades esmagou a sua alma frágil e fritou os seus circuitos biológicos..."
201050-74 = "Os laudos provam que estresses contínuos reescrevem as memórias das vítimas em prol da sobrevivência. Então... se o seu trauma escolheu esquecer o meu rosto e apagar a minha identidade――"
201050-75 = "Negativo."
201050-76 = "A lavagem cerebral pode ter infectado o cérebro orgânico de todas elas... mas o papel e os pixels dos registros arquivados que Ela deixou não podem mentir."
201050-77 = "As fotografias na galeria de servidores que eu tirei ao lado da Presidente provarão――"
201050-83 = "Por quê...?"
201050-84 = "A silhueta Dela... Os dados dela na foto... estão evaporando...?"
201050-85 = "……Perdão pelos meus fardos, Rin."
201050-86 = "Você está isenta dos pesos burocráticos e administrativos do conselho.#nEu recupero a coroa e mastigo a carga a partir de hoje."
201050-87 = "A ordem burocrática é: volte pro quarto e curta a folga médica por tempo indeterminado."
201050-88 = "As anomalias que consumiram essa imagem precisam de auditoria..."
201050-93 = "[ns1] \"Bom dia, flor do dia!\"\n[ns2] \"Deixou as planilhas de lado e conseguiu dormir igual um anjinho essa noite?\""
201050-97 = "Sensei da Schale...!!"
201050-98 = "O seu surgimento salva o meu cérebro do abismo. Eu imploro a sua auditoria numa anomalia existencial."
201050-99 = "O banco de dados de reconhecimento facial do senhor... aponta esta desconhecida como a Presidente do Conselho Estudantil?"
201050-103 = "[ns3] \"Essa garotinha aí...?\"\n[ns4] \"Meu cérebro nunca registrou esse rosto no mapa.\""
201050-106 = "……Eu sabia."
201050-107 = "A minha lógica depositava as fichas na imunidade biológica que só o senhor tem contra a loucura."
201050-108 = "Se o seu testemunho valida, os meus arquivos de memória e a integridade do meu passado não estão corrompidos... Certo?"
201050-109 = "[s5] \"Rin, trava a respiração e controla o pânico.\"\n[s6] \"Essa garotinha parece tão assustada quanto a gente com toda essa gritaria.\""
201050-115 = "[ns] \"O que acha da gente abaixar as armas e deixar ela cuspir a versão dela?\""
201050-116 = "Vejam só..."
201050-117 = "Testemunhar a rígida e desconfiada Rin terceirizando suas dores e dobrando os joelhos para o julgamento de um civil... as planilhas jamais preveriam tal anomalia."
201050-118 = "É uma mutação evolutiva plausível, porém... a visão dessa dependência emocional injeta uma melancolia fúnebre no meu peito. Fufu."
201050-119 = "[s] \"……Pra começar, qual é o seu RG e afiliação? Quem é você?\""
201050-120 = "Prazer em cruzar os olhares."
201050-121 = "O meu cargo oficial é Monarca regente e engrenagem principal da governança desta cidade, Kivotos."
201050-122 = "Soa como ostentação de ego... mas o meu rosto deveria estampar a biometria de todo cidadão. Topar de frente com seres humanos que repudiam a minha imagem deveria ser estatisticamente nulo..."
201050-123 = "Essas taxas de erro na percepção de vocês atiçam a minha curiosidade analítica."
201050-124 = "Dedução biológica: o seu corpo cruzou as fronteiras e migrou do exterior de Kivotos?"
201050-125 = "Se possível, exijo um depoimento sobre a topografia externa de onde você rastejou."
201050-126 = "[s] \"Me chamam de [USERNAME], eu cuido dos pepinos de rua como o atual Sensei em cargo na Schale.\""
201050-127 = "Schale...?"
201050-128 = "A que classe ou sindicato civil essa sigla responde?"
201050-129 = "[s7] \"O título no papel é 'Departamento Federal de Investigação com imunidade e jurisdição Extrajudicial'.\"\n[s8] \"Mas na prática, o meu trampo é catar as angústias das alunas e estripar as tretas da rua.\""
201050-132 = "Uma agência paramilitar supranacional, desvinculada dos grilhões e leis acadêmicas locais...?"
201050-133 = "Forjar e outorgar uma facção extrajudicial com um arsenal burocrático letal desses... exigiria a assinatura e as digitais irrevogáveis da Presidente do Conselho Estudantil."
201050-137 = "Contudo... a minha caneta jamais sangrou a tinta para autenticar essa milícia civil."
201050-138 = "As leis criminais dizem que usurpadores e agências armadas ilegais são fuzilados no paredão cívico. Vocês não marcharão impunes."
201050-139 = "[s] \"……Hã?\""
201050-144 = "[ns] \"O QUEEE?!! ALGEMA NÃO!!\""
201050-146 = "Próximo Episódio: O Retorno do Übermensch"