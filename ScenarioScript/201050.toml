[translation]
201050-1 = "Episode 5;Memory Error"
201050-3 = "Are you... the General Student Council President?"
201050-4 = "Yes, that's right... Is something the matter, Rin?"
201050-5 = "It is true that I have been away from my post for a long time. #nBut to treat me as if we are 'meeting for the first time'..."
201050-6 = "No. I do not know you."
201050-8 = "...Rin."
201050-9 = "Have you been worried about me disappearing so suddenly all this time?"
201050-10 = "Anything I say might just sound like an excuse. #nBut—"
201050-11 = "No, I mean exactly what I said."
201050-12 = "This should be our first meeting. I do not know you. #nYour face, your voice, nothing at all."
201050-13 = "The General Student Council President I know is not you."
201050-14 = "Even if this is a joke, it has gone beyond the realm of what I can laugh off."
201050-15 = "...Something must have happened."
201050-16 = "Excuse me, could you call Aoi... no, the Head of the Finance Department, right now?"
201050-17 = "I have something to discuss regarding the administrator—"
201050-18 = "(What is this person thinking?)"
201050-19 = "(It would be cleared up the moment someone else arrives, so why call the Head of Finance—)"
201050-26 = "Oh... Administrator Rin. So you were here."
201050-27 = "I heard you didn't return to the dorms yesterday, so I was worried. #nDon't tell me you pulled an all-nighter right after your vacation ended?"
201050-28 = "You went through the trouble of taking time off, so that would defeat the purpose, wouldn't it?"
201050-29 = "Right now, more importantly, this outsider—"
201050-30 = "And so... what is it you need, General Student Council President?"
201050-31 = "...Huh?"
201050-32 = "Aoi, what did you just..."
201050-33 = "Is something wrong?"
201050-34 = "I'm talking to the General Student Council President."
201050-35 = "Aoi..."
201050-36 = "You... you think this person is the General Student Council President!?"
201050-37 = "What are you saying, Rin-senpai?"
201050-38 = "To confirm something so obvious..."
201050-39 = "This is our General Student Council President, isn't she?"
201050-44 = "...The General Student Council President? She was always like that, wasn't she?"
201050-45 = "I feel like her vibe has changed a little, but... that's about it, right?"
201050-47 = "Of course I remember. There's no way I'd forget that platinum-blonde hair that looks like mentaiko-flavored potato chips."
201050-48 = "Huh? Her hair was light blue...?"
201050-49 = "Aren't you mistaken?"
201050-51 = "What the General Student Council President looks like? Of course I remember!"
201050-52 = "Pink hair and green eyes—"
201050-53 = "Wait, that was former Acting President Kaya, wasn't it? Hmm, let's see, the General Student Council President was..."
201050-54 = "Black hair... was it?"
201050-56 = "S-Senpai... even if you ask me so many times, I really don't know."
201050-57 = "The General Student Council President hasn't changed, now or in the past."
201050-61 = "With all due respect..."
201050-62 = "Could it be that you're experiencing confusion in your memory because you've been pushing yourself too hard lately?"
201050-64 = "...Have you calmed down a little?"
201050-65 = "You don't seem like yourself today, Rin."
201050-69 = "Why... why doesn't anyone remember?"
201050-70 = "We spent so much time together... why?"
201050-71 = "No, that's exactly why... who are you, the person everyone thinks is the General Student Council President?"
201050-72 = "This... might be my fault."
201050-73 = "Because I was away for so long, I placed too great a burden on you all."
201050-74 = "People's memories can easily change due to excessive stress or fatigue. #nSo, even if Rin doesn't remember me—"
201050-75 = "No."
201050-76 = "Even if everyone else doesn't remember... the traces and records she left behind still exist."
201050-77 = "If you look at the photo I took with the President—"
201050-83 = "Why...?"
201050-84 = "Only the President... is gone...?"
201050-85 = "...I'm sorry, Rin."
201050-86 = "You don't need to worry about work for a while. #nI will take care of it."
201050-87 = "Since you're already off, please enjoy the rest of your vacation."
201050-88 = "Indeed, this photo is..."
201050-93 = "[ns1] \"Good morning!\"\n[ns2] \"Did you sleep well last night?\""
201050-97 = "Sensei...!"
201050-98 = "You've come at the perfect time. There is something I would like to confirm with you, Sensei."
201050-99 = "Is this person... the General Student Council President?"
201050-103 = "[ns3] \"This girl...?\"\n[ns4] \"I don't think I know her...\""
201050-106 = "...As I thought."
201050-107 = "I knew you would say that."
201050-108 = "The General Student Council President I remember... I'm not wrong, am I?"
201050-109 = "[s5] \"Rin, calm down.\"\n[s6] \"It looks like she's troubled, too.\""
201050-115 = "[ns] \"Why don't we start by listening to what she has to say?\""
201050-116 = "Oh my..."
201050-117 = "It's rare for Rin to rely on an adult like this."
201050-118 = "I think it's a good change, but it also makes me feel a little lonely. Hehe."
201050-119 = "[s] \"...Could you tell us about yourself first?\""
201050-120 = "Yes. Nice to meet you."
201050-121 = "I am the head of the General Student Council, which manages the academy city of Kivotos—the General Student Council President."
201050-122 = "It's embarrassing to say it myself, but I'm fairly well-known in Kivotos. #nI thought it would be rare for someone not to know me..."
201050-123 = "That's quite an interesting reaction."
201050-124 = "Did you come from outside of Kivotos?"
201050-125 = "If you don't mind, I'd like to hear about that as well."
201050-126 = "[s] \"I'm [USERNAME], the Sensei at Schale.\""
201050-127 = "Schale...?"
201050-128 = "What kind of organization is that?"
201050-129 = "[s7] \"The Federal Investigation Department, which holds extra-legal authority.\"\n[s8] \"My job is to listen to students' troubles and help solve them.\""
201050-132 = "An extra-legal organization that transcends academies..."
201050-133 = "If you hold that much authority, you should require the permission of the General Student Council President."
201050-137 = "However, I do not recall granting any such permission."
201050-138 = "This... I cannot simply turn a blind eye to this."
201050-139 = "[s] \"...Huh?\""
201050-144 = "[ns] \"What!?\""
