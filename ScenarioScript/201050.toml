201050-107 = "Eu sabia que você diria isso."
201050-108 = "A Presidente do Conselho Estudantil Federal de quem me lembro... não está errada, está?"
201050-109 = "[s5] \"Rin, acalme-se.\"\n[s6] \"Parece que ela também está confusa.\""
201050-115 = "[ns] \"Primeiro, vamos ouvir o que ela tem a dizer?\""
201050-116 = "Ora..."
201050-117 = "É raro ver a Rin depender tanto de um adulto."
201050-118 = "Acho que é uma boa mudança, mas também me sinto um pouco solitária. Fufu."
201050-119 = "[s] \"...Poderia começar se apresentando?\""
201050-120 = "Sim. Prazer em conhecê-lo."
201050-121 = "Eu sou a Presidente do Conselho Estudantil Federal, a líder que administra esta cidade acadêmica, Kivotos."
201050-122 = "É um pouco embaraçoso dizer isso eu mesma, mas meu rosto é bastante conhecido em Kivotos.#nAcho que seria mais raro alguém não me conhecer..."
201050-123 = "Que reação interessante."
201050-124 = "Você veio de fora de Kivotos?"
201050-125 = "Se não se importar, eu gostaria de ouvir sobre isso também."
201050-126 = "[s] \"Eu sou o [USERNAME], o sensei do Schale.\""
201050-127 = "Schale...?"
201050-128 = "Que tipo de organização é essa?"
201050-129 = "[s7] \"O Departamento de Investigação Federal com autoridade extrajudicial.\"\n[s8] \"Meu trabalho é ouvir e resolver os problemas dos alunos.\""
201050-132 = "Uma organização extrajudicial que transcende as escolas..."
201050-133 = "Se possui tanta autoridade, deveria ser necessária a permissão da Presidente do Conselho Estudantil Federal."
201050-137 = "No entanto, não me lembro de ter dado tal permissão."
201050-138 = "Isso... não é algo que eu possa ignorar."
