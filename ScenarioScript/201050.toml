[translation]
201050-1 = "Эпизод 5;Ошибка памяти"
201050-3 = "Вы... Президент Генерального Студенческого Совета?"
201050-4 = "Да, всё верно... Что-то не так, Рин?"
201050-5 = "Я действительно долгое время отсутствовала на своём посту. #nНо относиться ко мне так, словно мы \"встречаемся впервые\"..."
201050-6 = "Нет. Я вас не знаю."
201050-8 = "...Рин."
201050-9 = "Ты всё это время так сильно переживала из-за моего внезапного исчезновения?"
201050-10 = "Что бы я сейчас ни сказала, это может прозвучать как оправдание. #nНо —"
201050-11 = "Нет, я имею в виду именно то, что сказала."
201050-12 = "Это должна быть наша первая встреча. Я вас не знаю. #nНи вашего лица, ни вашего голоса — вообще ничего."
201050-13 = "Президент Генерального Студенческого Совета, которую знаю я, — это не вы."
201050-14 = "Даже если это шутка, она вышла далеко за рамки того, над чем я могу посмеяться."
201050-15 = "...Что-то определённо произошло."
201050-16 = "Прошу прошения, не могли бы вы прямо сейчас позвать Аои... нет, главу Финансового департамента?"
201050-17 = "Мне нужно кое-что обсудить касательно администратора —"
201050-18 = "(О чём думает этот человек?)"
201050-19 = "(Всё прояснится в то же мгновение, как придёт кто-то ещё, так зачем звать именно главу Финансового...)"
201050-26 = "О... Администратор Рин. Так вы были здесь."
201050-27 = "Я услышала, что вы вчера не вернулись в общежитие, и заволновалась. #nТолько не говорите, что вы устроили всенощную сразу же после окончания отпуска?"
201050-28 = "Вы с таким трудом взяли выходной, так что это сводит на нет всю его цель, не находите?"
201050-29 = "Прямо сейчас, что более важно, этот посторонний —"
201050-30 = "И раз уж на то пошло... что вам угодно, Президент Генерального Студенческого Совета?"
201050-31 = "...А?"
201050-32 = "Аои, что ты только что..."
201050-33 = "Что-то не так?"
201050-34 = "Я разговариваю с Президентом Генерального Студенческого Совета."
201050-35 = "Аои..."
201050-36 = "Ты... ты считаешь, что этот человек — Президент Генерального Студенческого Совета?!"
201050-37 = "Что вы такое говорите, Рин-семпай?"
201050-38 = "Подтверждать столь очевидные вещи..."
201050-39 = "Это ведь наша Президент Генерального Студенческого Совета, разве нет?"
201050-44 = "...Президент Генерального Студенческого Совета? Она ведь всегда была такой, верно?"
201050-45 = "Мне кажется, её аура немного изменилась, но... на этом, пожалуй, всё?"
201050-47 = "Конечно я помню. Я ни за что не забыла бы эти платиновые волосы, похожие на картофельные чипсы со вкусом ментайко."
201050-48 = "А? У неё были светло-голубые волосы...?"
201050-49 = "Вы ничего не путаете?"
201050-51 = "Как выглядит Президент Генерального Студенческого Совета? Конечно я помню!"
201050-52 = "Розовые волосы и зелёные глаза —"
201050-53 = "Погодите, это ведь была бывшая исполняющая обязанности Президента Кайя, да? Хм, дайте подумать, Президент Генерального Студенческого Совета была..."
201050-54 = "С чёрными волосами... кажется?"
201050-56 = "С-Семпай... даже если вы спросите меня столько раз, я правда не знаю."
201050-57 = "Президент Генерального Студенческого Совета не менялась, ни сейчас, ни в прошлом."
201050-61 = "При всём уважении..."
201050-62 = "Может ли быть так, что вы испытываете путаницу в воспоминаниях из-за того, что в последнее время слишком сильно себя изнуряли?"
201050-64 = "...Ты немного успокоилась?"
201050-65 = "Ты сегодня сама не своя, Рин."
201050-69 = "Почему... почему никто не помнит?"
201050-70 = "Мы провели вместе столько времени... почему?"
201050-71 = "Нет, именно поэтому... кто вы, человек, которого все считают Президентом Генерального Студенческого Совета?"
201050-72 = "В этом... может быть моя вина."
201050-73 = "Из-за того, что я отсутствовала так долго, я возложила на всех вас слишком тяжкое бремя."
201050-74 = "Человеческая память может легко измениться под влиянием чрезмерного стресса или усталости. #nТак что даже если Рин меня не помнит —"
201050-75 = "Нет."
201050-76 = "Даже если все остальные не помнят... следы и записи, которые она оставила, всё ещё существуют."
201050-77 = "Если взглянуть на фотографию, которую я сделала с Президентом —"
201050-83 = "Почему...?"
201050-84 = "Только Президент... исчезла...?"
201050-85 = "...Мне жаль, Рин."
201050-86 = "Тебе не нужно беспокоиться о работе какое-то время. #nЯ обо всём позабочусь."
201050-87 = "Поскольку у тебя уже выходной, пожалуйста, наслаждайся оставшейся частью отпуска."
201050-88 = "И правда, эта фотография..."
201050-93 = "[ns1] «Доброе утро!»\n[ns2] «Как тебе спалось прошлой ночью?»"
201050-97 = "Сенсей...!"
201050-98 = "Вы пришли как нельзя вовремя. Есть кое-что, что я хотела бы подтвердить с вами, Сенсей."
201050-99 = "Этот человек... Президент Генерального Студенческого Совета?"
201050-103 = "[ns3] «Эта девушка...?»\n[ns4] «Не думаю, что я её знаю...»"
201050-106 = "...Как я и думала."
201050-107 = "Я знала, что вы так скажете."
201050-108 = "Президент Генерального Студенческого Совета, которую помню я... я ведь не ошибаюсь, верно?"
201050-109 = "[s5] «Рин, успокойся».\n[s6] «Похоже, она тоже озадачена»."
201050-115 = "[ns] «Почему бы нам для начала не выслушать, что она скажет?»"
201050-116 = "О боже..."
201050-117 = "Редко когда увидишь, чтобы Рин вот так полагалась на взрослого."
201050-118 = "Я считаю это хорошей переменой, но от этого мне также становится немного одиноко. Хи-хи."
201050-119 = "[s] «...Не могла бы ты для начала рассказать нам о себе?»"
201050-120 = "Да. Рада знакомству."
201050-121 = "Я глава Генерального Студенческого Совета, который управляет академическим городом Кивотосом — Президент Генерального Студенческого Совета."
201050-122 = "Смутительно говорить это самой, но я довольно известна в Кивотосе. #nЯ думала, что редко встретишь того, кто меня не знает..."
201050-123 = "Довольно интересная реакция."
201050-124 = "Вы прибыли из-за пределов Кивотоса?"
201050-125 = "Если вы не против, я бы хотела послушать и об этом тоже."
201050-126 = "[s] «Я [USERNAME], Сенсей из Шале»."
201050-127 = "Шале...?"
201050-128 = "Что это за организация?"
201050-129 = "[s7] «Федеральное расследовательское управление, обладающее внесудебными полномочиями».\n[s8] «Моя работа — выслушивать проблемы студентов и помогать в их решении»."
201050-132 = "Внесудебная организация, превосходящая академии..."
201050-133 = "Если вы обладаете столь широкими полномочиями, вам должно требоваться разрешение Президента Генерального Студенческого Совета."
201050-137 = "Однако я не помню, чтобы давала подобное разрешение."
201050-138 = "На это... я не могу просто закрыть глаза."
201050-139 = "[s] «...А?»"
201050-144 = "[ns] «Что?!»"
201050-146 = "Следующий эпизод;Возвращение сверхчеловека"