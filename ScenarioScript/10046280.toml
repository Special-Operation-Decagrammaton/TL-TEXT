[translation]
10046280-3 = "I-Ichika-senpai!"
10046280-4 = "Ah, precisa de algo? Está perdida ou algo assim...?"
10046280-5 = "N-não!"
10046280-6 = "Bem, é que eu ouvi dizer que a Ichika-senpai estava patrulhando sozinha..."
10046280-7 = "Ah, entendi."
10046280-8 = "E-eu reuni toda a minha coragem para vir aqui..."
10046280-9 = "Digo... eu estou te atrapalhando...?"
10046280-10 = "Minha força não é lá grande coisa... e..."
10046280-11 = "............"
10046280-12 = "Pode me dar uma mãozinha com algo?"
10046280-13 = "Eh...!?"
10046280-14 = "Na verdade, eu também já estava chegando no meu limite."
10046280-15 = "Sinto muito por te incomodar durante sua folga, mas preciso que me acompanhe um pouco."
10046280-16 = "S-sim! Com certeza!"
10046280-17 = "Hehe, que alívio. Então, vamos nessa!"
10046280-18 = "S-sim!"
