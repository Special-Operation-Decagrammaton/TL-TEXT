[translation]
10046280-3 = "い、イチカ先輩！"
10046280-4 = "あれ、何か用っすか？道に迷ったとか……？"
10046280-5 = "い、いえ！"
10046280-6 = "えっと、イチカ先輩が一人でパトロールしてるって聞いて……。"
10046280-7 = "ああ、なるほど。"
10046280-8 = "ゆ、勇気を振り絞って来たんですけど……。"
10046280-9 = "その……ご迷惑でしたか……？"
10046280-10 = "私の力なんて、大したことない……ですし……。"
10046280-11 = "…………。"
10046280-12 = "ちょっと手伝ってもらってもいいっすか？"
10046280-13 = "えっ……！？"
10046280-14 = "実は、私もそろそろ限界だったんすよね。"
10046280-15 = "休暇中のところ申し訳ないっすけど、少しつきあって欲しいっす。"
10046280-16 = "は、はい！ぜひ！"
10046280-17 = "ふふっ、助かるっす。じゃ、行くっすよ！"
10046280-18 = "は、はいっ！"
