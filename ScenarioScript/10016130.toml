[translation]
10016130-1 = "後日談その3;ゲヘナ学園・風紀委員会編"
10016130-10 = "……ヒナ委員長！！"
10016130-17 = "今までどこにいらしたんですか。ずっと探してたんですよ！"
10016130-18 = "大事な試合を前に突然いなくなられて……私たちがどれだけ心配したか……"
10016130-19 = "……それは、その――"
10016130-20 = "連絡もつきませんでしたし、他の風紀委員に聞いても知らないようで……"
10016130-21 = "[ruby=パンデモニウムソサエティー]万魔殿のタヌ[/ruby]キたちの罠にでもハマったのではないかと、生きた心地がしませんでしたよ！"
10016130-22 = "待って、アコ。#nそうじゃないから、一旦落ち着いて――"
10016130-23 = "もちろん、万魔殿が寄ってたかって襲ってきたところで、委員長の髪一本にすら触れられないでしょうけど……"
10016130-24 = "決してそれを疑ったり、委員長を過小評価しているわけではありませんが！"
10016130-28 = "それでも、委員長の身に何かあったら、私は――！"
10016130-34 = "……アコ。"
10016130-35 = "……は、はい！？"
10016130-37 = "落ち着いて。全部説明するから。"
10016130-38 = "……はい……すみません。"
10016130-40 = "まずは……ごめんなさい。何も言わずに、席を外してしまって。"
10016130-41 = "結果的に仕事をアコに押し付けたことも。"
10016130-42 = "押し付けただなんて……"
10016130-43 = "そんな風に思っていらっしゃったのですね。"
10016130-44 = "いつも委員長がこなしている激務に比べたら、大したことではありませんよ。"
10016130-45 = "大運動会を妨害する問題児を取り締まって、委員長が参加予定だった競技の出場選手を調整したくらいですし……"
10016130-46 = "……やっぱり迷惑をかけたわね、ごめんなさい。"
10016130-47 = "いえ。それで試合中、委員長はどこにいらっしゃったんですか？"
10016130-48 = "実行委員会の事務所や、委員長が行かれそうな場所を手当り次第に見て回りましたが……"
10016130-49 = "……トリニティの救護騎士団と救急医学部が運営する合同医療本部にいた。"
10016130-50 = "場内で発見した患者を送ることになっ……"
10016130-51 = "合同医療本部？#nどこかお怪我でもされたんですか？"
10016130-52 = "跡でも残ったら大変です、急いで傷の治療を――"
10016130-56 = "アコ、落ち着いて。"
10016130-58 = "さっきも言ったけど、最初は合同医療本部に患者を送り届けて戻ろうと思ってたの。#nでも、突然大規模なテロの予告が入って、しばらく留まってただけ。"
10016130-59 = "急いで手当が必要なほどの怪我をしたわけじゃない。#n実際、テロは起こらなかったし。"
10016130-60 = "大規模なテロの予告……"
10016130-61 = "妙ですね。日中、他の実行委員と一緒にいましたが、そのような話は……"
10016130-62 = "実行委員会には伝わってないだろうね。#n……あれはセナの嘘みたいなものだから。"
10016130-63 = "とにかく、十分休んで軽く診察を受けてきたわ。"
10016130-64 = "おかげで今は、普段より調子が良いくらい。"
10016130-65 = "それなら……良いのですが……"
10016130-66 = "私がいない間、風紀委員だけで大丈夫だった？"
10016130-67 = "戦車の競技場乱入やゲヘナの総合優勝……色々あったと聞いてる。"
10016130-68 = "はい。委員長不在の間、様々な問題が発生しましたが、どれも速やかに解決しています。"
10016130-69 = "他の実行委員にお願いして、不良生徒は無事に取り締まれましたし……"
10016130-70 = "空いた出場枠は、美食研究会に頼んで出てもらいました。"
10016130-71 = "美食研究会に……？"
10016130-72 = "はい。取り締まりのとき、いつも俊足を見せるジュンコさんのことは覚えていらっしゃいますよね？"
10016130-73 = "足が速いのは前から知っていましたが、予想以上の活躍を見せてくださって、ゲヘナは総合優勝を果たしました。"
10016130-74 = "……美食研究会のような問題児集団に助けを求めるなんて不本意でしたが、万魔殿に頼るよりはマシですから。"
10016130-75 = "……そうじゃなくて。"
10016130-76 = "アコが、他の生徒と協力を……？"
10016130-77 = "……何か問題でもあったでしょうか……？"
10016130-78 = "いや、何でもない。"
10016130-79 = "今までアコは、全部一人で仕事を抱え込んでいたのに……"
10016130-81 = "……変わったね、アコ。周りを頼れるようになったんだ。"
10016130-82 = "委員長に「変わった」と言われるのは、少し複雑です……"
10016130-83 = "……うん？"
10016130-84 = "な、何でもありません！"
10016130-88 = "ご案内申し上げます。まもなく、「後夜祭」のキャンプファイヤーを点火します。"
10016130-89 = "フォークダンスに参加される皆様は、中央フィールドまでお集まりください。"
10016130-90 = "繰り返します。まもなく……"
10016130-91 = "今日は、ずっと一人にさせちゃったわね。"
10016130-92 = "アコ、一緒に見に行かない？"
10016130-93 = "……えっ。よ、よろしいのですか？"
10016130-94 = "だって、一緒に行きたそうな目をしてるじゃない。"
10016130-100 = "ほら、ぼーっとしてないで。"
10016130-106 = "……はい！"
