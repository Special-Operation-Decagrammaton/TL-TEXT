[translation]
10016130-1 = "Epílogo parte 3; Comitê de Disciplina da Academia Gehenna"
10016130-10 = "……Presidente Hina!!"
10016130-17 = "Onde a senhora estava até agora? Eu a procurei por toda parte!"
10016130-18 = "Desaparecer de repente antes de uma partida tão importante... você não faz ideia do quanto nos preocupamos..."
10016130-19 = "……Isso é, bem――"
10016130-20 = "Não conseguíamos contato, e perguntei aos outros membros do Comitê de Disciplina, mas ninguém sabia de nada……"
10016130-21 = "Eu quase morri de preocupação achando que você tinha caído em alguma armadilha daqueles tanukis do Pandemonium!"
10016130-22 = "Espere, Ako. #nNão é nada disso, acalme-se um pouco――"
10016130-23 = "Claro, mesmo que o Pandemonium atacasse em bando, eles não conseguiriam tocar nem em um fio de cabelo da presidente……"
10016130-24 = "Eu nunca duvidaria disso, nem subestimaria a presidente!"
10016130-28 = "Mas ainda assim, se algo acontecesse com a senhora, eu――!"
10016130-34 = "……Ako."
10016130-35 = "……S-sim!?"
10016130-37 = "Acalme-se. Vou explicar tudo."
10016130-38 = "……Sim…… me desculpe."
10016130-40 = "Primeiro…… me desculpe. Por ter saído sem dizer nada."
10016130-41 = "E por ter acabado deixando o trabalho todo para você, Ako."
10016130-42 = "Deixar o trabalho para mim……"
10016130-43 = "Então era assim que a senhora via as coisas."
10016130-44 = "Comparado ao trabalho exaustivo que a presidente faz todos os dias, isso não foi nada."
10016130-45 = "Eu só lidei com os alunos problemáticos que estavam atrapalhando o Grande Festival Esportivo e ajustei os participantes das competições em que a presidente ia competir……"
10016130-46 = "……Ainda assim, causei problemas, me desculpe."
10016130-47 = "Não, tudo bem. Mas onde a senhora estava durante a partida?"
10016130-48 = "Eu procurei no escritório do comitê executivo e em todos os lugares que a senhora costuma frequentar……"
10016130-49 = "……Eu estava no quartel-general médico conjunto, operado pelo Esquadrão de Socorro de Trinity e pelo Departamento de Medicina de Emergência."
10016130-50 = "Eu tive que levar um paciente que encontrei no local……"
10016130-51 = "Quartel-general médico conjunto? #nA senhora se feriu em algum lugar?"
10016130-52 = "Seria terrível se ficasse alguma cicatriz, deixe-me tratar seus ferimentos imediatamente――"
10016130-56 = "Ako, acalme-se."
10016130-58 = "Como eu disse antes, a princípio eu só ia levar o paciente ao quartel-general e voltar. #nMas, de repente, recebi um aviso de um ataque terrorista em larga escala, então acabei ficando lá por um tempo."
10016130-59 = "Não foi porque eu me machuquei a ponto de precisar de tratamento urgente. #nNa verdade, o ataque nem chegou a acontecer."
10016130-60 = "Um aviso de ataque terrorista em larga escala……"
10016130-61 = "Que estranho. Eu estava com os outros membros do comitê executivo durante o dia, e não ouvimos nada sobre isso……"
10016130-62 = "Provavelmente não foi repassado ao comitê executivo. #n……Porque aquilo foi basicamente uma mentira da Sena."
10016130-63 = "De qualquer forma, descansei o suficiente e passei por um check-up rápido."
10016130-64 = "Graças a isso, agora estou me sentindo até melhor do que o normal."
10016130-65 = "Se é assim…… então está bem……"
10016130-66 = "Enquanto eu estava fora, o Comitê de Disciplina deu conta de tudo?"
10016130-67 = "Ouvi dizer que houve várias coisas, como a invasão de tanques na arena e a vitória geral de Gehenna……"
10016130-68 = "Sim. Durante a ausência da presidente, vários problemas surgiram, mas todos foram resolvidos rapidamente."
10016130-69 = "Pedi ajuda aos outros membros do comitê executivo e conseguimos conter os alunos delinquentes……"
10016130-70 = "E para as vagas de competição que ficaram vazias, pedi ao Clube de Pesquisa Gastronômica que participasse."
10016130-71 = "Ao Clube de Pesquisa Gastronômica……?"
10016130-72 = "Sim. A senhora se lembra da Junko, que sempre mostra ser muito rápida quando a contemos, não é?"
10016130-73 = "Eu já sabia que ela era rápida, mas ela teve um desempenho acima das expectativas, e Gehenna conquistou a vitória geral."
10016130-74 = "……Foi relutante pedir ajuda a um grupo de encrenqueiros como o Clube de Pesquisa Gastronômica, mas ainda é melhor do que depender do Pandemonium."
10016130-75 = "……Não é isso."
10016130-76 = "A Ako, cooperando com outros alunos……?"
10016130-77 = "……Houve algum problema com isso……?"
10016130-78 = "Não, não é nada."
10016130-79 = "Até agora, a Ako sempre carregava todo o trabalho sozinha..."
10016130-81 = "...Você mudou, Ako. Agora você consegue confiar nos outros."
10016130-82 = "É um pouco complicado ouvir da Presidente que eu 'mudei'..."
10016130-83 = "...Hm?"
10016130-84 = "N-não é nada!"
10016130-88 = "Atenção, por favor. Em breve, acenderemos a fogueira do 'Festival Noturno'."
10016130-89 = "Todos os que forem participar da dança folclórica, por favor, reúnam-se no campo central."
10016130-90 = "Repetindo. Em breve..."
10016130-91 = "Hoje, eu te deixei sozinha o tempo todo, não foi?"
10016130-92 = "Ako, você não quer ir ver comigo?"
10016130-93 = "...Ah. V-você tem certeza?"
10016130-94 = "Ora, você está com um olhar de quem quer ir junto, não está?"
10016130-100 = "Vamos, não fique aí parada."
10016130-106 = "...Sim!"
