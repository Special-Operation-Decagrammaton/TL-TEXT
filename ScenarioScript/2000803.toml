[translation]
2000803-1 = "とにかく急用です！"
2000803-2 = "（約束した場所へ向かうと、すでにアコがそこで待っていた。）"
2000803-6 = "……………………。"
2000803-7 = "[s] \"目が死んでる……！\""
2000803-8 = "……あぁ。いらっしゃいましたか、先生。"
2000803-9 = "何かあったのか……ですか？"
2000803-13 = "はい、ありました。それはもうありましたとも。"
2000803-14 = "はぁ……。"
2000803-15 = "まずは今朝、学園に到着した時です。"
2000803-16 = "風紀委員会の教室に向かおうとしたその時、"
2000803-17 = "何と……"
2000803-18 = "エレベーターが壊れていたんです！"
2000803-19 = "[s] \"なんと。\""
2000803-20 = "そのせいで私が今日一日中、階段をどれだけ上り下りしたことか……！どうしても役職柄、会う方も行く場所も多いので、本当にとんでもない回数でした……。"
2000803-21 = "すでにもう100フロア分は移動したはずです！"
2000803-22 = "[s] \"お疲れ様……。\""
2000803-23 = "それだけではありません！お昼に買ったコロッケは何故か少し焦げていましたし、"
2000803-24 = "パトロールを始めた途端に夕立に会い、"
2000803-25 = "冷蔵庫に大事にとっておいたパンはいつの間に賞味期限が切れ、"
2000803-26 = "いつものルートが工事中で遠回りを強いられ……"
2000803-27 = "全部が全部そんな感じだったんです！"
2000803-28 = "何という悪意、何という陰謀……！"
2000803-29 = "[s1] \"何だかその、ちょっと「悪意」とは違うような……？\"\n[s2] \"少なくともパンは自分の責任では……？\""
2000803-30 = "いいえ、これは明白な悪意です！風紀委員会の行政官に対する、嫌がらせに違いありません！"
2000803-31 = "いいえ、これは明白な悪意です！風紀委員会の行政官に対する、嫌がらせに違いありません！"
2000803-32 = "何なら賭けますか？この陰謀を暴けたら、先生には裸でダンスでもしていただきましょうか？"
2000803-33 = "[s] \"いや、賭けない賭けない……。\""
2000803-34 = "終い[ruby=パンデモニウム・ソサエティー]には万魔殿から[/ruby]意味不明な文書が届きますし……。"
2000803-35 = "「風紀委員たちのそれぞれの靴のサイズと、10年後の年間降水量の相関関係を調査してもらおう」って、一体何を言っているんですか！？"
2000803-36 = "10年後の年間降水量を私がどうやって知れって言うんです！？それに靴のサイズとは何の関係性も無いでしょう！百歩譲って関係があったところで、それを知ってどうするんですか！？"
2000803-37 = "[s3] \"大変だね……。\"\n[s4] \"確かにそれは悪意を感じる……。\""
2000803-38 = "これだけではありません、その文書が届いた直後に……"
2000803-39 = "これだけではありません、その文書が届いた直後に……"
2000803-40 = "[s] \"まだあるんだ……。\""
2000803-42 = "（アコの愚痴は、その後もしばらく続いた）"
2000803-45 = "……まあ、そういうことがあったわけです。"
2000803-46 = "それで今に至る、と。"
2000803-47 = "ああ、もうこんな時間ですね……そろそろ行かなくては。"
2000803-48 = "[s] \"あれ、用事があるって言ってなかった？大丈夫？\""
2000803-49 = "何を言ってるんですか、用事ならちょうど今終わったでしょう？"
2000803-50 = "[s] \"……なるほど。\""
2000803-55 = "それでは。またご連絡しますね、先生。"
2000803-57 = "（最初よりもどこかすっきりしたような面持ちで、アコは帰っていった。）"
