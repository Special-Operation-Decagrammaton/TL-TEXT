[translation]
2000803-1 = "É uma emergência, de qualquer forma!"
2000803-2 = "（Ao chegar no local combinado, Ako já estava esperando lá.）"
2000803-6 = "……………………."
2000803-7 = "[s] \"Seus olhos estão mortos……!\""
2000803-8 = "……Ah. Você chegou, Sensei."
2000803-9 = "Se algo aconteceu…… você pergunta?"
2000803-13 = "Sim, aconteceu. E como aconteceu."
2000803-14 = "Haa……."
2000803-15 = "Primeiro, foi hoje de manhã, quando cheguei na escola."
2000803-16 = "No momento em que eu ia em direção à sala do Comitê de Disciplina,"
2000803-17 = "Inacreditavelmente……"
2000803-18 = "O elevador estava quebrado!"
2000803-19 = "[s] \"Nossa.\""
2000803-20 = "Por causa disso, nem imagino quantas vezes tive que subir e descer as escadas hoje……! Por causa do meu cargo, tenho muitas pessoas para encontrar e lugares para ir, então foi um número absurdo de vezes……."
2000803-21 = "Eu já devo ter percorrido o equivalente a 100 andares!"
2000803-22 = "[s] \"Meus pêsames…….\""
2000803-23 = "E não é só isso! O croquete que comprei no almoço estava um pouco queimado por algum motivo,"
2000803-24 = "Assim que comecei a patrulha, fui pega por uma chuva repentina,"
2000803-25 = "O pão que guardei com tanto cuidado na geladeira venceu sem eu perceber,"
2000803-26 = "E a rota de sempre estava em obras, me forçando a dar uma volta enorme……"
2000803-27 = "Tudo, absolutamente tudo foi assim!"
2000803-28 = "Que maldade, que conspiração……!"
2000803-29 = "[s1] \"De alguma forma, isso não parece exatamente uma \"maldade\"……?\"\n[s2] \"Pelo menos o pão não foi culpa sua……?\""
2000803-30 = "Não, isso é uma maldade clara! Com certeza é um assédio contra a oficial administrativa do Comitê de Disciplina!"
2000803-31 = "Não, isso é uma maldade clara! Com certeza é um assédio contra a oficial administrativa do Comitê de Disciplina!"
2000803-32 = "Quer apostar? Se você descobrir essa conspiração, que tal dançar pelado para mim, Sensei?"
2000803-33 = "[s] \"Não, sem apostas…….\""
2000803-34 = "E para completar, recebi um documento sem sentido da Sociedade Pandemônio……."
2000803-35 = "Dizia: \"Investigue a correlação entre o tamanho do sapato de cada membro do Comitê de Disciplina e a precipitação anual daqui a 10 anos\". O que eles têm na cabeça!?"
2000803-36 = "Como eu deveria saber a precipitação anual daqui a 10 anos!? Além disso, não tem relação nenhuma com o tamanho do sapato! E mesmo que tivesse, o que eu faria com essa informação!?"
2000803-37 = "[s3] \"Você está passando por maus bocados…….\"\n[s4] \"Realmente, isso parece maldade…….\""
2000803-38 = "E não é só isso, logo depois que esse documento chegou……"
2000803-39 = "E não é só isso, logo depois que esse documento chegou……"
2000803-40 = "[s] \"Ainda tem mais…….\""
2000803-42 = "（As reclamações de Ako continuaram por um bom tempo depois disso）"
2000803-45 = "……Bem, foi isso que aconteceu."
2000803-46 = "E é por isso que chegamos até aqui."
2000803-47 = "Ah, já está nessa hora…… preciso ir."
2000803-48 = "[s] \"Ué, você não disse que tinha um assunto para tratar? Está tudo bem?\""
2000803-49 = "O que você está dizendo? O assunto acabou de ser resolvido, não foi?"
2000803-50 = "[s] \"……Entendi.\""
2000803-55 = "Então é isso. Entrarei em contato novamente, Sensei."
2000803-57 = "（Com uma expressão um pouco mais leve do que quando chegou, Ako foi embora.）"
