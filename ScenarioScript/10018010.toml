[translation]
10018010-1 = "第1話;助けが必要です！"
10018010-6 = "いつぶりなんだろうってくらい、全てがうまくいっていた……。"
10018010-7 = "お休みの日でぐっすり眠れたし、朝ごはんの準備もして……#n今日は料理に問題もなかったし。"
10018010-8 = "だから、着替えてお参りに行こうと思ってたのに……。"
10018010-9 = "なのに、それなのに……。"
10018010-13 = "どうしてまたこんな事に……！！"
10018010-14 = "先輩……。"
10018010-21 = "思い通りにいかないのが人生というものですわ。"
10018010-22 = "襲い来る試練を乗り越えたと思えば、また次の波が……。"
10018010-23 = "人間とは、そのように克服されなければならない何かなのですよ。"
10018010-24 = "誘拐した張本人にそんな事言われても……。"
10018010-25 = "うふふ……"
10018010-26 = "それよりも。#nその着物、似合っておりますよフウカさん。"
10018010-27 = "……ありがとう。ハルナもその着物きれいだね。"
10018010-28 = "ふふ、ありがとうございます。年末ですからね。#nいつもよりおめかししてみました。"
10018010-32 = "さて――そろそろ本題に移りましょうか。"
10018010-33 = "こうして美食研究会があなたたちを「お迎え」したのは……。"
10018010-34 = "お願いしたいことがあるからなのです。"
10018010-35 = "なにがお迎えよ……こんなの誘拐でしょ……。"
10018010-36 = "もう、いつものことだから感覚が麻痺してしまってる自分がいる……。"
10018010-37 = "「人は環境に適応する生き物」というけど……こんな適応したくない！"
10018010-38 = "先日、私たちは素敵な食堂を見つけたんですの。"
10018010-39 = "ですが、せっかく出会ったスズメ亭という食堂が……今年いっぱいで閉店してしまうそうなんです。"
10018010-44 = "フウカさんは、トリュフが常温で放置されていたとしたら……"
10018010-45 = "一人の料理人として、どうなさいますか？"
10018010-46 = "オイルで香りとりをするかな……"
10018010-47 = "もちろん、早く調理した方がいいけど。"
10018010-48 = "ええ、味が失われてしまわないようにするでしょう？#nそれと同じです。"
10018010-49 = "詳しい事情は分かりませんが、あんなに素敵な食堂が閉まってしまうなんて……"
10018010-50 = "美食研究会にとって……いえ、私たち以外の多くの人にとっての損失と言えますわ。"
10018010-51 = "ところで……話の前に、この縄を解いてくれない？"
10018010-52 = "あの……お店を閉めると決めたのは、女将さんですよね？#nそれなら、私たちが口出しをすることじゃないんじゃ……"
10018010-53 = "食堂の行く末は女将次第……"
10018010-54 = "たしかにその通りではあります。"
10018010-59 = "ですが！誰が納得しようとも、この[ruby=くろだて]黒舘[/ruby]ハルナが許しません！"
10018010-60 = "ええ、たとえ神様が許そうとも！"
10018010-62 = "いや、許そうよ。#nそれと、早く縄を解いてほしいんだけど。"
10018010-67 = "そういえば、そろそろ着く頃かしら……"
10018010-72 = "あ、来た来た、先生。"
10018010-74 = "やっほー！"
10018010-76 = "お元気でしたか？"
10018010-78 = "[s] \"こんにちは。\""
10018010-80 = "[ns] \"みんな、きれいな格好だね。\""
10018010-85 = "先生！私たちを助けに来てくださったんですか！？"
10018010-86 = "[s] \"そうしたい気持ちは山々なんだけど……。\""
10018010-90 = "[ns] \"私も捕まってしまったんだ。\""
10018010-94 = "せ、先生まで……。#n大丈夫です。私、泣きませんから……。"
10018010-95 = "私は泣いてもいいですよね、先輩？"
10018010-97 = "お待ちしておりました、先生。#nさて、これで全員揃いましたので、会議を始めましょうか。"
10018010-98 = "……どうすればスズメ亭を廃業の道から救うことができるのか。"
10018010-99 = "それが今回の議題となります！"
10018010-103 = "[ns] \"普通に連絡してくれたら、引き受けたのに……。\""
10018010-104 = "決意と覚悟を分かっていただくためですわ。"
10018010-105 = "少々手荒な真似をしてしまいましたが、これこそ、私たちの本気度の表れ。"
10018010-106 = "私の気持ち……先生に伝わったでしょうか？"
10018010-108 = "……そういう事ばっかしてたら、いつか先生が倒れちゃうよ。"
10018010-109 = "（こくこく）"
10018010-112 = "[ns1] \"その前に、私たちだけで話すより……。\"\n[ns2] \"まずは女将さんの話を聞いてみるのはどうかな？\""
10018010-115 = "なるほど。問題解決には当事者の意見を聞くことが大切だと……。"
10018010-116 = "気持ちがはやるあまり、大切なことを見落としておりました。"
10018010-117 = "流石は先生です。"
10018010-118 = "やはり誘……"
10018010-119 = "いえ、「お迎え」した甲斐がありましたわ。"
10018010-121 = "（いや、ちょっと考えたらそれくらい分かるんじゃない……？）"
10018010-127 = "あら……なんでしょうか？"
10018010-128 = "何か雰囲気が変じゃない……？"
10018010-135 = "なぁ女将さんよぉ……まだ分かんねぇのか？"
10018010-136 = "早く店を立ち退いてくれよなぁ！#n一体いつまで居座るつもりだよ？"
10018010-138 = "すみません、すみません……整理に時間がかかってしまっていて……。"
10018010-139 = "先日、最後のお客様がお越しくださっていたので……早く片付けますから。"
10018010-140 = "ったくよぉ……あたしらも好きでこういう事してるんじゃねぇんだからさぁ。"
10018010-141 = "そうそう。女将さんのためを思って言ってるんだよ？"
10018010-142 = "簡単な話だろ？#nあんたは、あたしらの言うことに従ってくれたらいいんだからさ。"
10018010-146 = "今度こそ理解できたよなぁ？#n穏便に済ませようぜ……お互いに、なぁ？"
10018010-153 = "うふふ……。"
10018010-154 = "は、ハルナ……？"
10018010-155 = "先客がいらっしゃるようですね……#nそれも、あまり良くない先客が。"
10018010-156 = "どうしましょうか、ハルナ★"
10018010-157 = "美食研究会は、究極の美食を追求するためにあります。"
10018010-158 = "素敵なもてなしをしてくださった方が窮地に陥っているとあらば――"
10018010-159 = "見て見ぬふりをするなど、道理に反しますわ。"
10018010-160 = "私も大賛成！やっちゃおうー！"
10018010-161 = "まあ、こうなると思ってたわよ……。"
10018010-163 = "は、ハルナ？何を……！？"
10018010-164 = "先輩、私たちは下がったほうが……。"
10018010-165 = "[s] \"そうだね、危ないから私たちは少し下がろう。ジュリは賢いね。\""
10018010-169 = "あ、ありがとうございます先生！"
10018010-170 = "これは悲しいことに長年染み付いた反射のようなもので……。"
10018010-171 = "あの状態のハルナには、どんな言葉も通じませんからね……。"
10018010-177 = "何なんだよ！お前らはよぉ！"
10018010-178 = "今は営業中なんだけど！？見て分かんねぇのか？"
10018010-185 = "はい、分かりませんわ。"
10018010-186 = "美食の邪魔をするとは、不届き千万。"
10018010-187 = "そのような道理の分からぬ者たちの話など、興味もありませんし――#n聞く必要もありませんから。"
10018010-195 = "さあ、それでは。"
10018010-200 = "美食研究会、始めましょうか？"
