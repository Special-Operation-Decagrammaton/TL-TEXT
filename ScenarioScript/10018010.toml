[translation]
10018010-1 = "Episódio 1; Preciso de ajuda!"
10018010-6 = "Tudo estava indo tão bem... que eu nem me lembro da última vez que isso aconteceu."
10018010-7 = "Era meu dia de folga, dormi super bem, preparei o café da manhã... e hoje a comida nem deu problema."
10018010-8 = "Por isso, eu tinha planejado me trocar e ir visitar o santuário, mas..."
10018010-9 = "Mas, mesmo assim..."
10018010-13 = "Por que isso teve que acontecer de novo...!!"
10018010-14 = "Senpai..."
10018010-21 = "A vida é feita de coisas que não saem como planejamos."
10018010-22 = "Quando você acha que superou um desafio, outra onda vem logo em seguida..."
10018010-23 = "Os seres humanos são seres que precisam superar essas coisas."
10018010-24 = "Dizer isso logo você, que me sequestrou..."
10018010-25 = "Ufufu..."
10018010-26 = "Mas, deixando isso de lado. Esse quimono lhe cai muito bem, Fuuka-san."
10018010-27 = "...Obrigada. O seu quimono também é lindo, Haruna."
10018010-28 = "Fufu, obrigada. Como já é fim de ano, resolvi me arrumar um pouco mais que o habitual."
10018010-32 = "Bem, vamos ao que interessa."
10018010-33 = "A razão pela qual o Clube de Pesquisa Gastronômica trouxe vocês aqui é..."
10018010-34 = "Porque temos um favor a pedir."
10018010-35 = "Que \"trouxe\" o quê... isso é um sequestro, não é..."

10018010-36 = "Ai, já aconteceu tantas vezes que sinto que estou ficando anestesiada..."
10018010-37 = "Dizem que \"o ser humano é um ser que se adapta ao ambiente\", mas eu não queria me adaptar a isso!"
10018010-38 = "Recentemente, encontramos um restaurante maravilhoso."
10018010-39 = "Mas, infelizmente, o restaurante chamado Suzume-tei, que acabamos de descobrir... vai fechar as portas no final deste ano."
10018010-44 = "Fuuka-san, se trufas fossem deixadas em temperatura ambiente..."
10018010-45 = "Como uma chef, o que você faria?"
10018010-46 = "Eu tentaria extrair o aroma com óleo..."
10018010-47 = "Claro, o ideal seria preparar logo."
10018010-48 = "Exato, você faria isso para não perder o sabor, não é? É a mesma coisa."
10018010-49 = "Não conheço os detalhes, mas um restaurante tão maravilhoso fechar..."
10018010-50 = "Para o Clube de Pesquisa Gastronômica... não, para muitas outras pessoas além de nós, é uma perda irreparável."
10018010-51 = "A propósito... antes de continuar, pode soltar essas cordas?"
10018010-52 = "Ei... quem decidiu fechar o restaurante foi a dona, não foi? Então, não é algo em que devamos nos meter..."
10018010-53 = "O destino do restaurante depende da dona..."
10018010-54 = "Certamente, isso é verdade."
10018010-59 = "Mas! Não importa quem aceite isso, eu, Haruna Kurodate, não permitirei!"
10018010-60 = "Sim, mesmo que os deuses permitam!"
10018010-62 = "Não, deixe que eles permitam. E, aliás, eu gostaria que soltassem as cordas logo."
10018010-67 = "Falando nisso, acho que já estamos chegando..."
10018010-72 = "Ah, lá vem ele, Sensei."
10018010-74 = "Ei!"
10018010-76 = "Como você tem passado?"
10018010-78 = "[s] \"Olá.\""
10018010-80 = "[ns] \"Todos estão muito bem vestidos.\""
10018010-85 = "Sensei! Você veio nos salvar!?"
10018010-86 = "[s] \"Eu adoraria fazer isso, mas...\""
10018010-90 = "[ns] \"Eu também fui capturado.\""
10018010-94 = "N-não acredito, até o Sensei... Tudo bem. Eu não vou chorar..."
10018010-95 = "Eu posso chorar, né, Senpai?"
10018010-97 = "Estávamos à sua espera, Sensei. Bem, agora que todos estão aqui, vamos começar a reunião."
10018010-98 = "...Como podemos salvar o Suzume-tei do fechamento?"
10018010-99 = "Esse é o tópico da nossa discussão de hoje!"
10018010-103 = "[ns] \"Se tivesse entrado em contato normalmente, eu teria aceitado...\""
10018010-104 = "É para que compreenda nossa determinação e prontidão."
10018010-105 = "Agimos de forma um pouco brusca, mas isso é uma demonstração da nossa seriedade."
10018010-106 = "Meus sentimentos... será que chegaram ao Sensei?"
10018010-108 = "...Se continuar fazendo essas coisas, uma hora o Sensei vai acabar desmaiando."
10018010-109 = "(Assente)"
10018010-112 = "[ns1] \"Antes disso, em vez de conversarmos apenas entre nós...\"\n[ns2] \"Que tal ouvirmos o que a proprietária tem a dizer primeiro?\""
10018010-115 = "Entendo. Que para resolver um problema, é importante ouvir a opinião das partes envolvidas..."
10018010-116 = "Na pressa dos meus sentimentos, acabei deixando passar algo importante."
10018010-117 = "Como esperado do Sensei."
10018010-118 = "Realmente, o convite..."
10018010-119 = "Não, valeu a pena ter vindo te \"buscar\"."
10018010-121 = "(Não, se pensar um pouco, não daria para entender isso...?)"
10018010-127 = "Ora... o que foi?"
10018010-128 = "O clima não está estranho...?"
10018010-135 = "Ei, dona... ainda não entendeu?"
10018010-136 = "Desocupe logo o estabelecimento!#nAté quando pretende ficar aqui?"
10018010-138 = "Sinto muito, sinto muito... é que estou levando tempo para organizar as coisas..."
10018010-139 = "Como tivemos um último cliente outro dia... vou limpar tudo logo."
10018010-140 = "Fala sério... a gente também não faz isso porque quer, sabe?"
10018010-141 = "Pois é. Estamos dizendo isso pensando no seu bem, sabia?"
10018010-142 = "É simples, não é?#nVocê só precisa seguir o que a gente está mandando."
10018010-146 = "Agora entendeu, né?#nVamos resolver isso pacificamente... para o bem de ambos, certo?"
10018010-153 = "Ufufu..."
10018010-154 = "Ha, Haruna...?"
10018010-155 = "Parece que temos convidados indesejados...#ne, por sinal, convidados bem desagradáveis."
10018010-156 = "O que faremos, Haruna?"
10018010-157 = "O Clube de Pesquisa Gourmet existe para buscar a gastronomia suprema."
10018010-158 = "Se alguém que nos ofereceu uma hospitalidade maravilhosa está em apuros—"
10018010-159 = "Fingir que não vi seria contra os meus princípios."
10018010-160 = "Eu concordo plenamente! Vamos nessa!"
10018010-161 = "Bom, eu já imaginava que isso aconteceria..."
10018010-163 = "Ha, Haruna? O que você vai...!?"
10018010-164 = "Sênior, é melhor a gente se afastar..."
10018010-165 = "[s] \"É verdade, é perigoso, então vamos nos afastar um pouco. Juri, você é sensata.\""
10018010-169 = "Ah, obrigada, Sensei!"
10018010-170 = "Infelizmente, isso é como um reflexo que se enraizou ao longo dos anos..."
10018010-171 = "Porque, naquele estado, a Haruna não ouve palavra alguma..."
10018010-177 = "O que é isso! Quem vocês pensam que são!"
10018010-178 = "Estamos em horário de funcionamento, sabia!? Não está vendo?"
10018010-185 = "Sim, não vejo."
10018010-186 = "Interromper a gastronomia é um ato imperdoável."
10018010-187 = "Não tenho interesse em ouvir pessoas que não entendem de princípios—#ne não há necessidade de ouvir."
10018010-195 = "Muito bem, então."
10018010-200 = "Clube de Pesquisa Gourmet, vamos começar?"
