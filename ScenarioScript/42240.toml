[translation]
42240-1 = "Episódio 24; Epílogo"
42240-2 = "Escola Kronos, 7º Estúdio Compartilhado"
42240-4 = "Olá a todos que assistem ao canal!#nAqui é Kazamaki Mai, do Departamento de Notícias da Kronos!"
42240-5 = "Hoje, no canal 'Análise de Atualidades da Kazamaki Mai', vamos falar detalhadamente sobre a recente troca do Presidente Interino do Conselho Estudantil Geral e a tentativa de atentado na Estação Coelhinho."
42240-6 = "Como todos os cidadãos já sabem, no anúncio de emergência feito recentemente, a Administradora-Chefe Nanagami Rin foi destituída, e Shiranui Kaya, que era a Chefe do Gabinete de Defesa na época, assumiu como a nova Presidente Interina do Conselho Estudantil Geral."
42240-7 = "A Chefe Kaya tornou-se alvo de controvérsias devido à falta de coerência em várias ordens administrativas emitidas logo após sua posse — e, após a descoberta de que ela havia orquestrado o atentado terrorista na Estação Coelhinho, um julgamento de impeachment foi realizado e ela foi indiciada."
42240-8 = "Em relação a este incidente, foi revelado que a 'Kaiser Security', uma subsidiária da 'Kaiser Corporation', recebeu subornos vultosos da Chefe Kaya, colocando o Grupo Kaiser novamente no centro das discussões."
42240-9 = "No entanto, o representante do Grupo Kaiser declarou que 'foi apenas um ato imprudente de um executivo da subsidiária e não tem relação com as políticas da matriz'."
42240-10 = "Apesar da magnitude do incidente, o Conselho Estudantil Geral não deu uma resposta clara, o que tem gerado diversas suspeitas."
42240-11 = "Hoje, no canal 'Análise de Atualidades da Kazamaki Mai', convidamos um especialista em atualidades para nos explicar essas suspeitas de forma simples!"
42240-12 = "Especialista em atualidades — Descartes, por favor!"
42240-19 = "Saudações. Sou Descartes, o especialista em atualidades mais rápido de D.U. e líder do 'Grupo de Busca pela Felicidade Certa sem Posses'... ou 'Sokakuko' para abreviar!"
42240-20 = "O-olá, Descartes."
42240-21 = "É um nome... bem peculiar para um grupo."
42240-22 = "Ah, está interessada em nossas atividades?"
42240-23 = "Nós somos especialistas e o 'Grupo de Busca pela Felicidade Certa sem Posses', ou 'Sokakuko' para abreviar, é..."
42240-24 = "Não, não precisa explicar isso."
42240-25 = "Hoje, eu gostaria de perguntar sobre as várias suspeitas que cercam o Conselho Estudantil Geral."
42240-26 = "Poxa..."
42240-27 = "Primeira pergunta!"
42240-28 = "A Chefe de Defesa Kaya, detida por suspeita de corrupção e insurreição, nega veementemente que seus crimes tenham sido por interesse próprio."
42240-29 = "Mesmo quando estava sendo transferida para o Departamento Correcional, a Chefe Kaya continuava dizendo: 'Um verdadeiro super-humano aparecerá, e até mesmo pessoas ignorantes como vocês entenderão minha vontade'."
42240-30 = "A quem esse 'super-humano' se refere?#nAo Sensei do Schale...? Ou ao Presidente do Conselho Estudantil Geral...?"
42240-31 = "Ou será que... existe algum segredo que ainda não foi revelado!?"
42240-33 = "……Não tem como ser isso."
42240-34 = "Se fosse alguém capaz de manipular a Chefe de Defesa, não precisaria recorrer a meios tão trabalhosos como um golpe de estado."
42240-35 = "É apenas o uivo de um perdedor, não há necessidade de dar ouvidos."
42240-37 = "S-sério mesmo...?"
42240-38 = "Seguindo para a próxima pergunta."
42240-39 = "Dizem que, quando a Chefe Kaya foi detida, alguns cidadãos viram várias alunas de uniforme de marinheiro sendo escoltadas junto com os executivos da 'Kaiser Security'."
42240-40 = "A identidade dessas alunas de uniforme de marinheiro, de qual escola elas são, ainda não está clara."
42240-41 = "Segundo rumores — elas seriam agentes da extinta Academia SRT —"
42240-43 = "— Não tem como ser isso!?"
42240-48 = "P-por que você está tão brava de repente?"
42240-49 = "As agentes da Academia SRT são alunas corajosas que lutaram arriscando suas vidas pela justiça!"
42240-50 = "Tratar essas alunas como criminosas... que falta de respeito!"
42240-51 = "Não posso entrar em detalhes, mas dizer que aquelas alunas são da Academia SRT é tudo notícia falsa!"
42240-52 = "Juro pelo meu bento de carne assada vencido!"
42240-54 = "(...Isso não significa que você não tem certeza?)"
42240-58 = "Entendido. Então, por último..."
42240-59 = "Qual era o objetivo da Chefe Kaya ao chamar o Sensei do Schale no dia em que anunciou o comunicado de emergência?"
42240-60 = "Considerando que ela o chamou em uma linha pública, parece que ela não tinha intenção de esconder a relação com o Sensei, mas..."
42240-61 = "Será que a Chefe Kaya pretendia obter do Schale armas ou autoridade para controlar Kivotos livremente?"
42240-62 = "Ah, sobre isso eu posso responder com certeza!"
42240-63 = "O que a Chefe Kaya exigiu do Sensei do Schale foi... o bento que seria descartado na loja de conveniência do Schale!"
42240-67 = "O bento... que seria descartado...?"
42240-68 = "Sim. Como a loja de conveniência do Schale recebe poucos clientes em comparação ao seu tamanho, sempre há uma grande quantidade de bentos sendo descartados."
42240-69 = "Ao ver aquela quantidade enorme de bentos... qualquer um desejaria tê-los!"
42240-71 = "O fato de que as negociações de bentos entre o Schale e o Conselho Estudantil Geral fracassaram pode ser deduzido pelo fato de que, depois disso, nenhum bento foi entregue na loja do Schale por um tempo!"
42240-73 = "……."
42240-74 = "Mas pessoal! Mesmo sem negociar com o Conselho Estudantil Geral, existe uma maneira fácil de conseguir marmitas descartadas!"
42240-75 = "Se você se inscrever no \"Sokakuko\" agora mesmo, ganhará frango frito de graça e uma marmita de broto de feijão de brinde—"
42240-80 = "A transmissão está instável no momento. Por favor, aguarde um instante."
42240-81 = "O que vocês estão fazendo?!"
42240-82 = "Me tratar desse jeito..."
42240-86 = "Peço desculpas a todos. O especialista em atualidades que convidamos, Descartes, teve que se retirar devido a um compromisso urgente."
42240-87 = "O canal \"Análise de Atualidades de Maki Kazamaki\" de hoje será substituído pelo programa de emergência: \"O Mistério da Lula: O que a nutrição marinha nos diz\"."
42240-88 = "Por favor, não mudem de canal...!"
42240-92 = "De onde será que a Shinon tirou aquele especialista em atualidades excêntrico?"
42240-97 = "Departamento Correcional, Ala de Detenção Especial B, Sala 207"
42240-99 = "A vida no Departamento Correcional não é tão ruim quanto eu pensava."
42240-100 = "Acordar em horários definidos, cumprir as tarefas diárias, exercitar o corpo...#nNo que diz respeito a viver seguindo regras, talvez não seja tão diferente da Academia SRT."
42240-101 = "Mas é uma pena que não tenha inarizushi no cardápio."
42240-102 = "Ah... que saudade de um inarizushi feito na hora..."
42240-108 = "Prisioneira número 5021, chegou uma encomenda para você."
42240-113 = "Uma encomenda? De quem?"
42240-114 = "Não sei quem enviou. Veio diretamente de cima."
42240-118 = "Tem uma carta dentro, verifique."
42240-122 = "Que estranho... não tem ninguém fora do Departamento Correcional que me enviaria uma carta..."
42240-127 = "Miyako-chan?"
42240-130 = "Dia X, mês X, 04:00. RABBIT Squad, Capitã Miyuki Miyako.#nComo a vida no Parque dos Coelhinhos se estabilizou, venho relatar a situação atual."
42240-131 = "Todas do RABBIT Squad continuam em serviço sem acidentes ou doenças—"
42240-135 = "Não, acho melhor usar uma linguagem um pouco mais suave."
42240-136 = "Como vai, Senpai? É a Miyako."
42240-139 = "Naquele dia, depois que a operação terminou.#nNós voltamos para o Parque dos Coelhinhos."
42240-140 = "Conversamos por muito tempo sobre para onde deveríamos voltar, mas... no fim, só podíamos vir para cá."
42240-141 = "Não existe outra academia além da SRT onde possamos realizar nossos ideais..."
42240-142 = "Enquanto estivermos aqui, a luta pela justiça da SRT continuará."
42240-149 = "Após a detenção da Diretora Kaya, a Chefe Administrativa Rin retornou ao cargo de representante do Conselho Estudantil Geral."
42240-150 = "Todas as ordens administrativas forçadas foram revogadas e D.U. está gradualmente recuperando a estabilidade."
42240-151 = "Talvez porque as forças que se opunham à Rin diminuíram temporariamente, a opinião pública que a criticava também parece ter se acalmado um pouco, mas..."
42240-152 = "Kivotos ainda tem uma montanha de problemas que precisam ser resolvidos..."
42240-153 = "Os dias de trabalho árduo da Rin e dos oficiais do Conselho Estudantil Geral parecem que vão continuar."
42240-155 = "Decidimos não divulgar externamente, por enquanto, o fato de que nós subjugamos vocês e denunciamos os crimes da Diretora Kaya."
42240-156 = "O Conselho Estudantil Geral provavelmente não admitiria oficialmente que recebeu apoio da Academia SRT, que eles mesmos decidiram fechar..."
42240-157 = "E nós também não queríamos espalhar a vergonha de vocês."
42240-159 = "Por isso, externamente, atribuímos todo o mérito por encerrar a situação à Diretora Kanna."
42240-160 = "Graças a isso, a Diretora Kanna e as alunas do Departamento de Segurança Pública puderam retornar ao trabalho mais cedo do que o esperado."
42240-161 = "Fico aliviada em saber que a decisão dela foi recompensada, mesmo que um pouco."
42240-166 = "Falando nisso, parece que a Kirino, do Departamento de Segurança Pública, teve a chance de ser transferida para o Departamento de Guarda devido a esse mérito, mas, por algum motivo, ela recusou."
42240-167 = "Será que ela teve algum tipo de percepção durante a batalha anterior?"
42240-169 = "Em troca, o RABBIT Squad recebeu permissão oficial do Conselho Estudantil Geral para permanecer aqui, no Parque dos Coelhinhos, sem problemas."
42240-170 = "Como o parque estava programado para ser demolido e a questão da gestão da Cidade dos Coelhinhos ficou em aberto, a permissão foi concedida mais facilmente do que pensávamos."
42240-171 = "Graças a isso, conseguimos lidar com o pessoal da Valkyrie de forma mais descontraída."
42240-172 = "Claro, a vida no parque ainda tem muitas inconveniências e estamos contando com a ajuda do sensei [USERNAME]..."
42240-174 = "Schale - Sala de Descanso"
42240-176 = "Ah... que refrescante..."
42240-177 = "Obrigada pelo chuveiro, sensei."
42240-178 = "Com esse calor, é difícil ter que acender fogo só para esquentar a água do banho."
42240-179 = "[s1] \"De nada.\"\n[s2] \"Como eu disse antes, pode usar o chuveiro da Schale sempre que quiser.\""
42240-182 = "Hehe, já que estou aqui, acho que vou pedir para usar a geladeira também..."
42240-189 = "Sensei, trouxe os resultados da investigação das marcas de bala no local do acidente que você me pediu outro dia..."
42240-193 = "Moe, você... que traje é esse?"
42240-194 = "Não me diga que você entrou sozinha no chuveiro do Schale?"
42240-195 = "Ah, sobre isso..."
42240-196 = "Ontem à noite, o ventilador da minha barraca quebrou e eu estava toda suada..."
42240-197 = "Como você pôde se refrescar sozinha no Schale..."
42240-198 = "...Sua traidora!"
42240-199 = "[s3] \"Ah, é verdade. Saki.\"\n[s4] \"Comprei o shampoo com o aroma que você me pediu outro dia.\""
42240-204 = "Ah, obrigada... isso ajuda muito."
42240-209 = "...O que foi, Saki? Você também veio aqui?"
42240-210 = "Ah, puxa vida, quem é a traidora agora?"
42240-211 = "I-isso é, bem..."
42240-212 = "Outro dia, durante o turno no Schale, o interior do meu capacete ficou abafado, então eu só lavei o cabelo...!"
42240-213 = "Eu não tomei banho completo como certas pessoas!"
42240-214 = "O fato de ter usado o chuveiro já te torna igual a mim!"
42240-222 = "Bom dia, Sensei."
42240-223 = "Fiquei suada com a operação da manhã... será que poderia me emprestar o chuveiro...?"
42240-227 = "Ué...? Saki e Moe...?"
42240-235 = "Miyako――!?"
42240-242 = "Vai levar um tempo até nos acostumarmos, mas tenho certeza de que conseguiremos conviver bem."
42240-243 = "...Porque temos o Sensei [USERNAME] como nosso suporte confiável."
42240-245 = "Originalmente, é difícil devido aos regulamentos do Departamento Correcional, mas pedi uma exceção ao Sensei para lhe enviar uma pequena lembrança."
42240-246 = "É apenas uma marmita de loja de conveniência, nada comparável ao inari feito à mão pela veterana Niko, mas é tudo o que podemos oferecer no momento."
42240-247 = "O relatório termina aqui. Por favor, cuide-se."
42240-248 = "Do RABBIT Squad, capitã Tsukuyuki Miyako."
42240-253 = "Ahaha... dar uma marmita de loja de conveniência como primeiro presente para a veterana."
42240-254 = "Isso é um pouco demais, Miyako-chan..."
42240-258 = "...Mas fico feliz em saber que você está bem."
42240-265 = "Corrida da manhã, encerrada...!"
42240-266 = "Parece que minha resistência caiu bastante. #nEstou exausta só com a corrida..."
42240-267 = "Ué? Isso não é... sushi de inari?"
42240-268 = "Uau, esse aroma... faz tanto tempo que não sinto que quase chorei..."
42240-269 = "Isso... nós podemos comer?"
42240-271 = "Sim, eu ganhei."
42240-272 = "Vamos chamar a Yukino-chan e comer todo mundo junto."
42240-273 = "Eba!"
42240-275 = "Mas, uma marmita de loja de conveniência vinda do Departamento Correcional... que incomum."
42240-276 = "De quem é esse sushi de inari?"
42240-278 = "Hmm, é verdade... de quem eu deveria dizer que é... se eu tivesse que dizer..."
42240-285 = "――Acho que é um presente do \"amanhã\"."
