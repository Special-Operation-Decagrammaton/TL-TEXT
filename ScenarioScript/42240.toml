[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 11/06.
42240-1 = "Episódio 24: Epílogo"
42240-2 = "Escola Kronos - Estúdio Compartilhado Nº 7"
42240-4 = "Olá a todos os nossos telespectadores!#nDaqui fala Kazamaki Mai, do Departamento de Jornalismo da Kronos!"
42240-5 = "Hoje, no canal 'Análise de Atualidades com Kazamaki Mai', vamos nos aprofundar nos recentes acontecimentos envolvendo a troca da Presidência Interina do Conselho Estudantil e o atentado a bomba frustrado na Estação dos Coelhinhos."
42240-6 = "Como todos os cidadãos já sabem, a Chefe de Administração Nanagami Rin foi deposta após a declaração de emergência da semana passada, e a então Chefe de Defesa Shiranui Kaya assumiu o cargo de Nova Presidente Interina."
42240-7 = "A Presidente Kaya se tornou alvo de polêmicas pelas contradições em seus decretos executivos logo após a posse―― e, em seguida, sofreu impeachment e foi indiciada após descobrirem seu envolvimento como mandante do ataque terrorista à Estação dos Coelhinhos."
42240-8 = "Em relação a este incidente, foi revelado que a 'Kaiser Security', uma subsidiária da 'Kaiser Corporation', vinha recebendo propinas astronômicas da ex-Presidente, colocando o Grupo Kaiser de volta no centro das investigações."
42240-9 = "Entretanto, os representantes do Grupo Kaiser publicaram uma nota afirmando que 'a infração foi um ato isolado de diretores da subsidiária e não reflete as diretrizes da matriz'."
42240-10 = "Apesar das proporções gigantescas do escândalo, o Conselho Estudantil Geral ainda não emitiu uma resposta clara, o que tem gerado diversas teorias da conspiração."
42240-11 = "Portanto, no programa de hoje, convidamos um especialista em atualidades para nos explicar todos esses mistérios de forma didática!"
42240-12 = "Com a palavra: o nosso Especialista em Atualidades, Sr. Descartes!"
42240-19 = "Saudações burguesas. Eu sou o especialista político mais rápido de D.U. e líder da 'Irmandade pela Felicidade sem Bens Materiais'... vulgo 'FeliSem', Descartes!"
42240-20 = "O-Olá, Sr. Descartes."
42240-21 = "A sua organização tem um nome... muito peculiar."
42240-22 = "Oh, a nobre âncora sente interesse em nossas atividades anti-sistema?"
42240-23 = "Como sábios da FeliSem, a nossa missão de erradicar o consumis――"
42240-24 = "Ah, não, não precisa entrar em detalhes sobre isso agora."
42240-25 = "Gostaríamos de focar nas teorias envolvendo o Conselho Estudantil, se possível."
42240-26 = "Tsc..."
42240-27 = "Primeira pergunta!"
42240-28 = "A ex-Presidente Kaya, presa por corrupção e insurreição, nega veementemente que seus crimes tenham sido motivados por interesses egoístas e lucro pessoal."
42240-29 = "Até mesmo durante sua transferência para o Departamento Correcional, ela gritava que 'o verdadeiro Übermensch surgirá e a plebe ignorante entenderá minhas intenções'."
42240-30 = "A quem exatamente ela estaria se referindo com esse tal 'Übermensch'?#nAo Sensei da Schale...? À Presidente Desaparecida...?"
42240-31 = "Ou será que... existe um figurão secreto nos bastidores que ainda não conhecemos?!"
42240-33 = "……Isso é obviamente uma baboseira."
42240-34 = "Se houvesse um titereiro tão absoluto a ponto de manipular a cabeça da Chefe de Defesa daquela forma, ele não precisaria armar um circo barato e bagunçado como esse Golpe de Estado."
42240-35 = "É só o uivo desesperado de uma vira-lata derrotada tentando parecer grandiosa. Não vale um segundo de ibope."
42240-37 = "V-Você acha mesmo...?"
42240-38 = "Certo, passando para a próxima."
42240-39 = "No momento da prisão da Ex-Presidente, várias testemunhas afirmaram ter visto um grupo de cadetes de uniforme naval sendo escoltadas sob custódia junto com os diretores da Kaiser."
42240-40 = "As identidades e a escola dessas estudantes permanecem sob sigilo absoluto."
42240-41 = "Mas os rumores das ruas dizem que―― elas eram ninguém menos que a Tropa de Elite da fechada Academia SRT――"
42240-43 = "――OBVIAMENTE É MENTIRA!!"
42240-48 = "E-Eita, por que a agressividade de repente?!"
42240-49 = "As cadetes da SRT são anjos de justiça que arriscaram a vida na escuridão pra nos salvar e bateram de frente com o perigo!!"
42240-50 = "Colocar o nome sagrado delas na mesma frase que aqueles terroristas de terno... é uma ofensa criminosa!"
42240-51 = "Eu não posso vazar a logística tática dos bastidores, mas afirmo: associar as presas de naval à SRT é pura Fake News plantada pela mídia marrom!!"
42240-52 = "Eu juro isso pela minha marmita de churrasco vencida!!"
42240-54 = "（……Jurar pela marmita não passa muita credibilidade sobre a sua fonte...）"
42240-58 = "T-Tudo bem, a gente entende. Vamos para a última pergunta..."
42240-59 = "No dia em que fez a declaração de emergência na TV, qual foi o verdadeiro motivo da Ex-Presidente ter convocado o Sensei da Schale?"
42240-60 = "O convite foi feito em rede aberta de televisão, o que indica que ela queria exibir a 'aliança' publicamente..."
42240-61 = "A intenção dela era sugar a autoridade da Schale e absorver as armas burocráticas do Sensei para dominar Kivotos de vez?"
42240-62 = "Ah, essa é a pergunta mais fácil do dia! Eu respondo com clareza!"
42240-63 = "O que a ex-Presidente Kaya queria roubar do Sensei da Schale... eram as Marmitas Vencidas que iam pro lixo da loja de conveniência deles!!"
42240-67 = "Marmitas... Vencidas...?!"
42240-68 = "A matemática é simples! A lojinha da Schale é enorme mas não tem fluxo civil diário, o que significa que o descarte de bentôs fritos ao fim do expediente é colossal!"
42240-69 = "Qualquer líder político com o mínimo de sanidade babaria por aquele estoque imenso de carboidratos!"
42240-71 = "O fato de as prateleiras do Angel 24 terem sido misteriosamente bloqueadas por dias prova que o Tratado Internacional das Marmitas colapsou e a Kaya fechou o cerco econômico por vingança!"
42240-73 = "……"
42240-74 = "MAS ATENÇÃO, POVO DE KIVOTOS! Vocês não precisam virar presidentes corruptos pra saborear os dejetos da sociedade com dignidade!"
42240-75 = "Liguem agora, unam-se à FeliSem e ganhem, de graça, uma porção de pele de frango frita e uma marmita de broto de feijão na facha――!!"
42240-80 = "*[Cartela: Problemas Técnicos - Por favor, aguarde]*"
42240-81 = "[Voz ao fundo] Ei, me soltem! O que vocês tão fazendo?!"
42240-82 = "[Voz ao fundo] Como ousam censurar a palavra do Grande Descartes――!"
42240-86 = "Pedimos imensas desculpas pelo inconveniente técnico. O nosso ilustre Especialista, Sr. Descartes, teve que se retirar do estúdio às pressas devido a um compromisso inadiável com a segurança do prédio."
42240-87 = "O nosso programa de hoje será interrompido para dar lugar ao documentário especial: 'Os Mistérios da Lula: Nutrição do Fundo do Mar'."
42240-88 = "Por favor, não mudem de canal...!"
42240-92 = "……De que bueiro maldito a Shinon desenterrou esse tal 'Especialista Político'...?"
42240-97 = "Departamento Correcional - Cela 207 do Pavilhão Especial B"
42240-99 = "……Até que a vida carcerária tem os seus luxos."
42240-100 = "A gente acorda na alvorada militar, cumpre as tarefas rígidas, faz calistenia pesada...#nTer uma rotina algemada nas regras não é tão diferente dos tempos de cadete na velha SRT."
42240-101 = "O que me entristece de verdade é a falta de inarizushi no refeitório prisional."
42240-102 = "Haaah... Que vontade de amassar e fritar tofu..."
42240-108 = "Detenta 5021. Pacote de fora na grade."
42240-113 = "……Pacote externo? Qual o remetente?"
42240-114 = "Desconhecido. O pacote furou as barreiras e desceu do alto comando direto pra cá."
42240-118 = "Tem um bilhete lacrado junto do pacote. Leia no tempo da sua cela."
42240-122 = "Que estranho... Não existe um único ser vivo lá fora disposto a mandar cartas de amor pra nós..."
42240-127 = "……É da Miyako-chan?"
42240-130 = "Data [CONFIDENCIAL], 04:00. RABBIT 1, Capitã Tsukiyuki Miyako reportando.#nA logística no Parque dos Coelhinhos foi estabilizada. Segue relatório situacional oficial."
42240-131 = "Todos os efetivos do Esquadrão RABBIT operam em 100% da capacidade médica e tática, sem baixas ou epidem――"
42240-135 = "……Não. Acho melhor eu apagar essa formalidade de robô da carta."
42240-136 = "Vocês estão se cuidando, veteranas? Aqui é a Miyako."
42240-139 = "Após neutralizarmos o centro de comando do silo e o inferno daquela noite acabar...#nNós catamos as tralhas e voltamos pro asfalto do Parque dos Coelhinhos."
42240-140 = "O Esquadrão sentou na grama e nós discutimos longamente sobre que direção a nossa vida seguiria. O resultado foi unânime: esse chão frio é o nosso verdadeiro quartel."
42240-141 = "O asilo político em outra academia mancharia os nossos ideais e a nossa honra."
42240-142 = "E, enquanto houver ao menos uma barraca estendida nesta calçada... a Justiça da SRT nunca fechará as portas."
42240-149 = "Após a prisão da Ex-Chefe Kaya, a Oficial Rin foi tirada do cárcere e coroada como Presidente Interina novamente."
42240-150 = "O pacote genocida de Decretos da Kaya foi incinerado na primeira hora, e o ar nas avenidas de D.U. voltou a ser respirável."
42240-151 = "Como a queda da ditadura assustou a oposição da Rin, os uivos contra a liderança dela diminuíram de volume... por hora."
42240-152 = "Mas como Kivotos é uma terra amaldiçoada cheia de pólvora e problemas crônicos..."
42240-153 = "A rotina estressante da Oficial Rin e de quem limpa a bagunça do Conselho está longe do fim."
42240-155 = "O conselho assinou um pacto de silêncio. A nossa 'Guerra Civil' no subsolo e a queda da FOX foram extirpadas de todos os relatórios da mídia pública."
42240-156 = "O próprio Governo preferia morder a língua do que assinar no jornal que foi salvo das cinzas justamente por cadetes da SRT, a escola maldita que eles fecharam a força."
42240-157 = "E nós... nós jamais jogaríamos a vergonha militar de vocês nas mãos dos repórteres de rua."
42240-159 = "A solução pra varrer tudo pra baixo do tapete foi atribuir cem por cento da glória tática da invasão e prisão da Kaya à Chefe Kanna."
42240-160 = "Com essa injeção de heroísmo na ficha, ela e todo o batalhão amotinado da Segurança Pública tiveram as punições anuladas e os distintivos devolvidos bem mais rápido."
42240-161 = "……Eu deito a cabeça aliviada sabendo que aquele tiro suicida que a Chefe Kanna nos deu de cobertura compensou o sangue dela."
42240-166 = "Ah, uma fofoca: os laudos internos creditaram a Patrulheira Kirino pela cobertura do asfalto, e o comando ofereceu a ela a transferência e o luxo do Bureau de Trânsito Maior... mas, por algum milagre... ela rasgou o convite e ficou na Segurança Cidadã."
42240-167 = "Acho que a tempestade de chumbo daquela noite forjou uma resposta no fundo do coração puro dela também."
42240-169 = "Em contrapartida... como gorjeta governamental por calarmos a boca... o Conselho carimbou um alvará oficial dizendo que o nosso acampamento lixo no Parque dos Coelhinhos é 'área legalmente protegida e permitida'."
42240-170 = "Como a revitalização da favela da Kaiser miou e os canteiros de obra viraram lama inútil... a papelada pra nos deixar morando nas ruínas foi aprovada num piscar de olhos."
42240-171 = "Pelo menos agora, as patrulheiras da Valkyrie vêm inspecionar o parque rindo em vez de tentar arrancar a gente da barraca à força."
42240-172 = "Óbvio que a logística selvagem continua sendo um inferno de desconforto... e nós ainda dependemos das mangas da camisa do Sensei pra muita coisa suja..."
42240-174 = "Schale - Banheiros e Ducha"
42240-176 = "Haaah... Essa água quente lava a alma..."
42240-177 = "Valeu por liberar o box pra nós de novo, Sensei."
42240-178 = "Com esse mormaço de verão torrando o parque, a ideia de ficar socando lenha pra ferver a lata de banho no meio do mato tava me matando de preguiça."
42240-179 = "[s1] \"O prazer é meu.\"\n[s2] \"O convite continua de pé: a caldeira da Schale é de vocês sempre que o frio ou o barro incomodar.\""
42240-182 = "Fufu, já que a porteira da hospitalidade tá aberta, acho que vou saquear os gelados da sua geladeira t--"
42240-189 = "Sensei, a balística detalhada sobre as cápsulas largadas na cena do 'acidente' já tá assinada aqu-- "
42240-193 = "MOE... CARAMBA... DE QUEM É ESSA TOALHA E O QUE CÊ TÁ FAZENDO MEIO PELADA AQUI?!"
42240-194 = "Você rastejou até a base da Schale na encolha pra usurpar o banho quente sozinha e furar o esquema?!"
42240-195 = "Ah... veja bem, a logística..."
42240-196 = "O ventilador lixo da minha barraca pifou de madrugada, o tecido esquentou igual forno e eu tava exalando odor de coturno velho..."
42240-197 = "A sua traição de luxo material feriu o nosso voto de sofrimento coletivo no asfalto..."
42240-198 = "……VOCÊ É UM JUDAS IMUNDO!!"
42240-199 = "[s3] \"Ah, que bom que você apareceu, Saki.\"\n[s4] \"O xampu daquela marca e aroma especial que você me encomendou no rádio chegou da farmácia hoje.\""
42240-204 = "Eeeh, ah... Valeu, Sensei... salvou a pátria."
42240-209 = "……Aham, eu entendi a hipocrisia na hora. Quer dizer que a senhorita Saki é cliente VIP da farmácia e dos canos de água quente dele também?"
42240-210 = "Olha só, o sujo batendo no mal-lavado. Qual Judas é pior?"
42240-211 = "E-Ei, b-bota o freio nessa língua! O protocolo de banho é diferente..."
42240-212 = "Na última ronda que eu fiz no perímetro da Schale, o meu capacete cozinhou e eu só encostei a cabeça na pia pra tirar a caspa...!"
42240-213 = "Eu não invadi o box pra arrancar a farda e fazer spa termal igual umas e outras!!"
42240-214 = "Usou água de chuveiro chique pra não usar sabão de balde? Fuzilamento moral pras duas!!"
42240-222 = "Bom dia, Sensei."
42240-223 = "O trote tático da manhã inundou a minha farda de suor... O senhor me cede o uso tático do box do banheiro por dez minutos...?"
42240-227 = "Hã... Saki? Moe...?! Por que vocês estão de toalha na porta...?"
42240-235 = "MIYAKO... VOCÊ TAMBÉM?! A CAPITÃ CORROMPEU O ESPÍRITO?!"
42240-242 = "Enfim... as nossas almas demorarão para aceitar essa vida torta, mas eu sei que, no fim, as engrenagens da RABBIT continuarão moendo juntas com força."
42240-243 = "……Porque nós temos as mãos calejadas do Sensei pra não nos deixar cair no escuro."
42240-245 = "Sei que enviar produtos da rua fura todo o Manual de Contrabando da Segurança Prisional, mas nós puxamos os pauzinhos do Sensei para enviar este pacote clandestino até a sua grade."
42240-246 = "Eu sei que essas marmitas prontas de loja de conveniência são como areia se comparadas à obra-prima suprema do Inarizushi da Niko-senpai... mas é tudo o que a nossa verba mendiga consegue forjar hoje."
42240-247 = "Fim do Relatório. Sobrevivam nas sombras por nós."
42240-248 = "Comando do Esquadrão RABBIT. Capitã, Tsukiyuki Miyako."
42240-253 = "Ahahaha... Mandar um monte de marmita gelada de supermercado como o nosso 'Primeiro Grande Presente pra Veterana' é cômico..."
42240-254 = "Miyako-chan, o seu censo de misericórdia culinária às vezes é nulo..."
42240-258 = "……Mas saber que a cadelinha teimosa continua respirando me aquece por dentro."
42240-265 = "Corrida forçada matinal, encerrada e concluída!!"
42240-266 = "Minha resistência vascular foi pro lixo trancada nessa cela.#nSó umas voltinhas no pátio e eu sinto que tô infartando..."
42240-267 = "Eita? Mas o que as minhas narinas captam... É o Inarizushi original?!"
42240-268 = "Uau... a doçura avinagrada perfumando a cela... a nostalgia tá me fazendo salivar bicas!"
42240-269 = "Nós... nós podemos engolir os bentôs da caloura...?"
42240-271 = "Sim, a entrega de fora furou a vigilância."
42240-272 = "Vou gritar a Yukino-chan do pátio e nós vamos amassar as marmitas juntas em comunhão."
42240-273 = "GLÓRIA AO CARBOIDRATO!!"
42240-275 = "Mas olha... infiltrar produto ilegal de conveniência em cela de Segurança Máxima é uma façanha logística pesada."
42240-276 = "Afinal de contas, quem patrocinou o nosso almoço e assinou a caixa?"
42240-278 = "Hummm, como eu posso assinar os créditos desse presente... Bem... Acho que poeticamente..."
42240-285 = "――Nós ganhamos o lanche de presente do 'Amanhã'."