[translation]
2600605-1 = "O lugar onde se pode ver a chuva de meteoros"
2600605-2 = "Academia Red Winter - Antigo Prédio Escolar"
2600605-5 = "Ah... Sensei, bem-vindo de volta."
2600605-6 = "Por que estou tão desanimada, você pergunta?"
2600605-7 = "N-não é nada."
2600605-8 = "[s] \"Você estava ansiosa para ver a chuva de meteoros neste fim de semana, não estava?\""
2600605-9 = "É que... provavelmente não vamos conseguir ver a chuva de meteoros deste ano."
2600605-10 = "Pelo que vi na previsão do tempo, o dia da chuva de meteoros será nublado o dia todo em Kivotos."
2600605-11 = "A chuva de meteoros das Leônidas só acontece uma vez a cada 30 anos..."
2600605-12 = "É uma pena perder uma chance que não acontece muitas vezes na vida."
2600605-13 = "Ouvi dizer que se você fizer um pedido a uma estrela cadente, ele se realiza, então eu até queria fazer um pedido..."
2600605-14 = "Acho que pedidos são chamados de pedidos justamente porque nem sempre se realizam."
2600605-15 = "[s1] \"Ainda é cedo para desistir.\"\n[s2] \"Vamos encontrar outra maneira.\""
2600605-16 = "Eh? Mas, não importa quão bom seja o telescópio, se as nuvens estiverem densas, não dá para ver os meteoros do chão..."
2600605-17 = "Eh? Mas, não importa quão bom seja o telescópio, se as nuvens estiverem densas, não dá para ver os meteoros do chão..."
2600605-18 = "Se as nuvens escondem os meteoros... então devemos ir acima das nuvens, é isso?"
2600605-19 = "[s] \"Sim. Vamos ver os meteoros do topo de um prédio mais alto que as nuvens.\""
2600605-20 = "Mas, em Kivotos, um prédio mais alto que as nuvens seria..."
2600605-21 = "Por acaso você está falando daquele prédio do Schale, onde fica o seu escritório?"
2600605-22 = "I-essa é uma ótima ideia! Com certeza o terraço de lá fica acima das nuvens, então tenho certeza de que poderemos ver os meteoros!"
2600605-23 = "Ah... mas para entrar no Schale fora do horário de expediente, precisamos da permissão daquela pessoa assustadora do Conselho Estudantil, a Rin..."
2600605-24 = "S-será que vai dar certo...?"
2600605-25 = "[s3] \"Fique tranquila, deixe comigo.\"\n[s4] \"Já estou acostumado a ser repreendido pela Rin.\""
2600605-26 = "Ahaha... então fico mais aliviada."
2600605-27 = "Ahaha... então fico mais aliviada."
2600605-29 = "Com a permissão do Conselho Estudantil Geral, conseguimos entrar sem problemas."
