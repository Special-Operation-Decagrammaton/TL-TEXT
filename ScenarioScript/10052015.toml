[translation]
10052015-3 = "..."
10052015-4 = "..."
10052015-5 = "E, não é um sonho...?",
10052015-6 = "Hum, acho que é real. Ela se movia de forma estranha... foi incrível...".
10052015-7 = "Nós vamos conseguir voltar com segurança...?".
10052015-8 = "Não se preocupe. O professor está aqui.".
10052015-9 = "Com certeza, vai ficar tudo bem.".
10052015-10 = "D, porque você está tão calma...?".
10052015-11 = "Hum, as razões são várias... ".
10052015-12 = "Já aconteceu antes, talvez por isso.".
10052015-14 = "[ns] \"A propósito, onde está o núcleo da Bina?\" "
10052015-15 = "Sobre isso... ".
10052015-16 = "Para ser direto, precisamos descer um buraco. Pelo que reagi, o núcleo parece estar no fundo.".
10052015-17 = "Eeeh!?!? Descer!?".
10052015-18 = "Será que daqui pra frente vai ser assim sempre...?".
10052015-19 = "Não, como já falei, acho que a Bina é especial. #n É provavelmente algum tipo de segurança.".
10052015-20 = "B, uma medida física... ".
10052015-21 = "Mas, sem ver o fundo, descer assim seria ineficiente demais...".
10052015-22 = "Chefe, você pode mandar a pequena aeronave de apoio do navio? ".
10052015-23 = "Já estou enviando.".
10052015-24 = " ...Aliás, o Rio também está vindo. Não parei para perguntar.".
10052015-25 = "O presidente também vem?".
10052015-26 = "Sim. Durante a investigação adicional, descobrimos que não conseguimos ultrapassar o firewall por meio de rede... ".
10052015-27 = "Então, ir ao local é o mais lógico, disse ele...".
10052015-28 = "...Rio mesmo.".
10052015-31 = "(Em breve, a pequena aeronave de apoio chega e Rio aparece.)"
10052015-32 = "(Com os rostos inexpressivos de todos, Rio inclinou a cabeça para o lado.)"
