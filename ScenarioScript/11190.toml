[translation]
11190-2 = "Episódio 19; Eu não vou perdoar vocês!"

11190-3 = "Cidade destruída de Abidos"

11190-4 = "(Mokumoku...)"

11190-6 = "Goho, goho… Nossa, o prédio sumiu?"

11190-7 = "Uau... o que diabos é isso...?"

11190-8 = "(Guru Guru)"

11190-10 = "Gohon, gohon… uh, ahhh…."

11190-13 = "(O que é isso!? O que aconteceu!?)"

11190-14 = "...Al-chan... sério? Você realmente esmagou isso?"

11190-15 = "Sim?"

11190-16 = "Você explodiu a loja de ramen que foi tão gentil com você só porque você estava dominado pela emoção? #nVamos nessa! ?"

11190-17 = "Este é realmente um grande vilão sem sangue ou lágrimas! #n Um ato diabólico que ninguém como Sonjosoko jamais seria capaz de fazer! Ele é o pior dos bandidos!"

11190-18 = "Huh? ……um?"

11190-19 = "Este é um fora-da-lei durão! ! Isso é incrível, Al! Eu revisei!"

11190-20 = "Hã... ah...? ...Ah, ahahahaha! Bem, é claro! #nImplacável! Sem pena! Tudo está bem, desde que você receba o dinheiro! Esse é o nosso lema! !"

11190-21 = "Foi isso que aconteceu! !"

11190-25 = "Vocês...! ! Que coisa terrível de se fazer! !"

11190-26 = "……."

11190-27 = "……."

11190-28 = "Consegui confirmar que o general está seguro! Felizmente, seus ferimentos foram leves e ele foi levado para um abrigo próximo!"

11190-29 = "...Isso significa que não há problema em enlouquecer?"

11190-30 = "Eu não vou deixar vocês. Porque eu nunca vou te perdoar...! !"

11190-32 = "! ?"

11190-33 = "Ah, e se houver um boato."

11190-34 = "...O momento estava um pouco errado, mas ele é alguém com quem terei que lutar em algum momento."

11190-35 = "Vou ligar para os mercenários que consegui aqui."

11190-37 = "……."

11190-38 = "...Ah, isso mesmo! ! Agora você sabe, Abidos! Que canalha eu sou!"

11190-39 = "Agora vamos competir! ! Por favor, ligue!"

11190-40 = "Eu cuidarei de cada um de vocês, Sr. Al."

11190-43 = "Esteja preparado! ?"

11190-44 = "(Suchat)"

11190-45 = "É um castigo!"

11190-49 = "Essa é a minha linha! ! Vou te mostrar como é um verdadeiro bandido! !"

