[translation]
11190-2 = "第19話;あんたたち、許さない！"
11190-3 = "破壊されたアビドス市街地"
11190-4 = "（モクモク……）"
11190-6 = "ゴホッ、ゴホッ……うわあ、建物がなくなっちゃったよ？"
11190-7 = "ケホッ……これは一体……。"
11190-8 = "（グルグル）"
11190-10 = "ゴホン、ゴホン……う、うああ……。"
11190-13 = "（な、何これ！？何が起きたの！？）"
11190-14 = "……アルちゃん……マジで？マジでぶっ潰しちゃったの？"
11190-15 = "え……え？"
11190-16 = "情にほだされるからって、あんなに優しくしてくれたラーメン屋さんを吹っ飛ばしたの？#nやるじゃーん！？ "
11190-17 = "これぞまさに、血も涙もない大悪党！#nそんじょそこらのザコには到底できない鬼畜の所業！悪人中の悪人じゃん！"
11190-18 = "え、う？……あ？"
11190-19 = "これがハードボイルドなアウトローってやつだね！！すごいよ、アルちゃん！見直したよ！"
11190-20 = "へ……あ……？……あ、あはははは！とっ、当然でしょう！#n冷酷無比！情け無用！金さえもらえればなんでもオッケー！それがうちのモットーよ！！"
11190-21 = "そういうことだったのね！！"
11190-25 = "あんたたち……！！よくもこんなひどいことを！！"
11190-26 = "……。"
11190-27 = "……。"
11190-28 = "大将の無事を確認できました！幸い軽傷だったので、近くのシェルターに案内済みです！"
11190-29 = "……ってことは、大暴れしてもいいってことね？"
11190-30 = "あんたたち、許さない。ぜーったいに許さないから……！！"
11190-32 = "！？"
11190-33 = "おっと、噂をすれば。"
11190-34 = "……ちょっとタイミングはズレちゃったけど、どうせいつかは白黒つけないといけない相手だし。"
11190-35 = "確保しておいた傭兵をこっちに呼ぶ。"
11190-37 = "……。"
11190-38 = "……そっ、そうよ！！これでわかったでしょう、アビドス！私がどんなに悪党かを！"
11190-39 = "さあ、いざ勝負！！かかってきなさいよ！"
11190-40 = "私が一人残らず始末します、アル様。"
11190-43 = "覚悟はいい！？"
11190-44 = "（スチャッ）"
11190-45 = "お仕置きですよー！"
11190-49 = "それはこっちのセリフよ！！真のアウトローがどういうものか、見せてあげるわ！！"
