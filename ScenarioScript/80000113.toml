[translation]
80000113-1 = "両手いっぱいの感謝"
80000113-2 = "（バレンタインデー前日、ユカリからメッセージが届いた）"
80000113-8 = "先生！先生はご存知でしょうか！？"
80000113-9 = "明日訪れる特別な記念日を……！"
80000113-10 = "毎年2月14日は、世間で「ばれんたいんでー」と呼ばれているそうですの！"
80000113-11 = "[s1] \"うん、知ってるよ。\"\n[s2] \"なぜなら私はバレンタインマスターだからね！\""
80000113-14 = "わぁ、さすが先生ですわ！"
80000113-15 = "しかし、そうでしたか……#n今どき知らないのは、[ruby=みども]身共[/ruby]くらいですのね。"
80000113-16 = "今まで家で何も無かったのか、と……？"
80000113-17 = "う～ん。毎年この時期になると、使用人の皆様がちょこれーとを持ってきてくださりましたが……"
80000113-18 = "身共は、ただちょこれーとを好きなだけ食べてもいい日だと思っておりましたの。"
80000113-19 = "ですが、大切な方に心からの感謝を伝える日と聞きましたわ。"
80000113-20 = "そのような気持ちをちょこれーとに込めるだなんて、どなたが最初に考えたのか知りませんが……"
80000113-21 = "と～っても、胸が温かくなりましたわ！"
80000113-22 = "[s] （企業の戦略という説は話さないでいよう……）"
80000113-23 = "急ではありますが……#nどのような日か分かった以上、このままじっとしてはいられませんの！"
80000113-24 = "そこで申し訳ありませんが、よろしければ先生……明日お会いできませんか？"
80000113-25 = "[s] \"もちろん大丈夫だよ。どこで会おうか？\""
80000113-26 = "えっと、場所は……"
80000113-27 = "あ！ひとまず時間は午後！午後でお願いしますの！#n場所と合わせて、決まり次第連絡しますわ！"
80000113-29 = "（そうして翌日、お昼過ぎに待ち合わせ場所へ向かった）"
80000113-38 = "（行き先は他でもなく……）"
80000113-40 = "勘解由小路家・本邸"
80000113-41 = "お嬢様はご支度中ですので、少々お待ちください。"
80000113-42 = "[s] \"は、はい……\""
80000113-47 = "（立派なお屋敷と緊張感の漂う空気に飲まれていると……）"
80000113-54 = "[ns] \"あ、ユカリ。待ってた……\""
80000113-58 = "ようこそ、先生！お待たせしてしまい申し訳ありませんわ！"
80000113-59 = "[s] \"そ、それは構わないんだけど、どうして巫女の衣装を……？\""
80000113-62 = "昨日も申し上げた通り、今日は「ばれんたいんでー」。"
80000113-63 = "大切な方に心からの感謝を伝える日。"
80000113-64 = "そこで、どうすれば身共の思いを伝えられるのか……"
80000113-65 = "……このいっぱいの気持ちを全て伝えきれるのか。"
80000113-66 = "昨日から一晩中、悩みに悩んだ末……！"
80000113-67 = "[s] \"……悩んだ末？\""
80000113-68 = "ようやく浮かんだのが、この姿……"
80000113-69 = "[ruby=かでのこうじ]勘解由小路[/ruby]ユカリとしてのふるぱわーばーじょんですの！"
80000113-70 = "その名も、ユカリまーくつー！"
80000113-71 = "これなら、身共の気持ちも伝わると思いましたの！"
80000113-72 = "そこで先生、これを受け取ってくださいまし！"
80000113-76 = "[ns] \"これは……お守り？\""
80000113-77 = "はい！夜が明ける前から澄んだ水を汲んでお祈りをし、運気を込めた勘解由小路家に伝わるお守りですの！"
80000113-78 = "なんと！その効能は家内安全、無病息災、学業成就、さらには大漁祈願まで！"
80000113-79 = "先生に気に入ってもらえましたら……身共はとても嬉しいですの！"
80000113-80 = "[s3] \"もちろん、とっても嬉しいんだけど……\"\n[s4] \"こんなにすごい物を受け取ってもいいのかな……？\""
80000113-83 = "ふふ……むしろ身共の気持ちは、お守りだけでは足りませんわ！"
80000113-84 = "勘解由小路家のお守りだけでは、まだ半分。"
80000113-85 = "身共の気持ちを全て伝えるには……！"
80000113-90 = "[ns] \"！？\""
80000113-91 = "そのお守りは、勘解由小路家のユカリとして先生に送る感謝の気持ち。"
80000113-95 = "そして……これは百花繚乱のユカリとして、先生に送る感謝の気持ちです。"
80000113-96 = "[s] \"チョコ味の駄菓子だね、美味しそう。\""
80000113-97 = "はい！なんと限定版の「うんめえ棒・でらっくすちょこれーとぱふぇ味」ですの！"
80000113-98 = "いくつもお店を回って、ようやく見つけましたの！"
80000113-99 = "[s] \"あ、だから午後がいいって……\""
80000113-104 = "勘解由小路ユカリとしてだけでなく、百花繚乱のユカリとして居られるのは、先生のおかげですわ。"
80000113-105 = "ですから、このように贈り物を二つ用意したかったんですの。"
80000113-106 = "ふふ、身共は欲張りですから。"
80000113-107 = "どうか……受け取っていただけませんか、先生？"
80000113-108 = "[s] \"ありがとう。ユカリの気持ち、本当に嬉しいよ。\""
80000113-109 = "ふふふっ！それなら良かったですの！"
80000113-110 = "[s] \"それじゃあ一緒に食べようか、ユカリ。\""
80000113-111 = "はい！喜んで！"
