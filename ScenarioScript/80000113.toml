[translation]
80000113-1 = "Gratidão de mãos cheias"
80000113-2 = "（Na véspera do Dia dos Namorados, uma mensagem chegou de Yukari）"
80000113-8 = "Professor! O senhor sabia!?"
80000113-9 = "Sobre a data comemorativa especial que chega amanhã...!"
80000113-10 = "Dizem que todo dia 14 de fevereiro é conhecido pelo mundo como \"Dia dos Namorados\"!"
80000113-11 = "[s1] \"Sim, eu sei.\"\n[s2] \"Porque eu sou um mestre do Dia dos Namorados!\""
80000113-14 = "Uau, como esperado do Professor!"
80000113-15 = "Mas é mesmo assim...? #nAcho que a única que não sabia disso era eu."
80000113-16 = "Quer dizer que até hoje não havia nada em casa...?"
80000113-17 = "Hum. Todo ano, nessa época, os criados traziam chocolates para mim, mas..."
80000113-18 = "Eu achava que era apenas um dia em que eu podia comer o quanto quisesse de chocolate."
80000113-19 = "Mas ouvi dizer que é um dia para expressar gratidão sincera a alguém importante."
80000113-20 = "Não sei quem foi o primeiro a pensar em colocar sentimentos assim dentro de um chocolate, mas..."
80000113-21 = "Fiquei com o coração muito quentinho!"
80000113-22 = "[s] （Melhor não contar a teoria de que é uma estratégia corporativa...）"
80000113-23 = "É repentino, mas... #nAgora que sei que tipo de dia é, não consigo ficar parada!"
80000113-24 = "Por isso, peço desculpas, mas se não for incômodo, Professor... podemos nos encontrar amanhã?"
80000113-25 = "[s] \"Claro, sem problemas. Onde vamos nos encontrar?\""
80000113-26 = "Bem, o local é..."
80000113-27 = "Ah! Por enquanto, o horário é à tarde! À tarde, por favor! #nAssim que eu decidir o local, entrarei em contato!"
80000113-29 = "（Assim, no dia seguinte, fui ao local de encontro logo após o meio-dia）"
80000113-38 = "（O destino não era outro senão...）"
80000113-40 = "Residência da Família Kadenokouji"
80000113-41 = "A senhorita está se preparando, por favor, aguarde um momento."
80000113-42 = "[s] \"S-sim...\""
80000113-47 = "（Enquanto era engolido pela atmosfera tensa e pela mansão imponente...）"
80000113-54 = "[ns] \"Ah, Yukari. Estava esperando...\""
80000113-58 = "Bem-vindo, Professor! Peço desculpas por fazê-lo esperar!"
80000113-59 = "[s] \"I-isso não é problema, mas por que você está com essa roupa de sacerdotisa...?\""
80000113-62 = "Como eu disse ontem, hoje é o \"Dia dos Namorados\"."
80000113-63 = "Um dia para expressar gratidão sincera a alguém importante."
80000113-64 = "Então, pensei em como poderia transmitir meus sentimentos..."
80000113-65 = "...Como poderia transmitir todos esses sentimentos que transbordam."
80000113-66 = "Depois de pensar e pensar a noite toda desde ontem...!"
80000113-67 = "[s] \"...Depois de pensar?\""
80000113-68 = "O que finalmente me veio à mente foi esta forma..."
80000113-69 = "É a versão de força total da Kadenokouji Yukari!"
80000113-70 = "O nome dela é Yukari Mark II!"
80000113-71 = "Achei que assim meus sentimentos seriam transmitidos!"
80000113-72 = "Então, Professor, por favor, aceite isto!"
80000113-76 = "[ns] \"Isto é... um amuleto?\""
80000113-77 = "Sim! É um amuleto tradicional da família Kadenokouji, para o qual busquei água pura antes do amanhecer, rezei e infundi sorte!"
80000113-78 = "Incrível! Seus efeitos incluem segurança familiar, saúde, sucesso acadêmico e até mesmo oração por uma boa pesca!"
80000113-79 = "Se o Professor gostar... ficarei muito feliz!"
80000113-80 = "[s3] \"Claro, fico muito feliz, mas...\"\n[s4] \"Será que posso aceitar algo tão incrível...?\""
80000113-83 = "Fufu... na verdade, meus sentimentos não cabem apenas em um amuleto!"
80000113-84 = "O amuleto da família Kadenokouji é apenas a metade."
80000113-85 = "Para transmitir todos os meus sentimentos...!"
80000113-90 = "[ns] \"!?\""
80000113-91 = "Esse amuleto é o sentimento de gratidão que envio ao Professor como Yukari da família Kadenokouji."
80000113-95 = "E... isto é um gesto de gratidão que lhe ofereço, Sensei, como Yukari da Hyakkiyako."
80000113-96 = "[s] \"Um doce de chocolate, parece delicioso.\""
80000113-97 = "Sim! É a edição limitada do \"Unmee-bou: Sabor Parfait de Chocolate Deluxe\"!"
80000113-98 = "Passei por várias lojas até finalmente conseguir encontrar!"
80000113-99 = "[s] \"Ah, então foi por isso que você disse que a tarde seria melhor...\""
80000113-104 = "Não apenas como Kageyuki Yukari, mas como a Yukari da Hyakkiyako, só estou aqui graças a você, Sensei."
80000113-105 = "Por isso, eu queria preparar dois presentes como este."
80000113-106 = "Fufu, é que eu sou um pouco gananciosa."
80000113-107 = "Por favor... você poderia aceitar, Sensei?"
80000113-108 = "[s] \"Obrigado. Fico muito feliz com o seu gesto, Yukari.\""
80000113-109 = "Fufufu! Que bom, fico aliviada!"
80000113-110 = "[s] \"Então, vamos comer juntos, Yukari?\""
80000113-111 = "Sim! Com todo o prazer!"
