[translation]
10046060-1 = "第6話;今再び、交渉の先、手にするモノ"
10046060-3 = "……ダメっぽいっすね。"
10046060-4 = "地面が完全に陥没してるっす。#n施設の再建どころか、このビーチの安全性すら怪しいくらい――"
10046060-9 = "どうしてこうなっちゃうんだろ……。"
10046060-10 = "なんで……どうして、よりによって今日なの？"
10046060-11 = "ミカ様……。"
10046060-12 = "…………。"
10046060-13 = "……ううん、誰も悪くない。"
10046060-14 = "私も知ってるよ。だから、大丈夫。"
10046060-15 = "……ごめんね、みんな手伝ってくれたのに。"
10046060-16 = "でも……なんでこうなっちゃうかなぁ……。"
10046060-20 = "こんなの、事故じゃないですか。"
10046060-21 = "ミカ様の頑張りが無駄になるわけじゃ……！"
10046060-22 = "ありがとう、イチカちゃん。"
10046060-23 = "でもさ、こうなったら……のんきに遊ぶのは無理だよね。"
10046060-24 = "素直に……ナギちゃんとセイアちゃんに言おう。"
10046060-25 = "帰る準備、始めよっか。寮に着くのが遅くなっても良くないもんね。"
10046060-31 = "いや、でも……それは……。"
10046060-32 = "…………。"
10046060-33 = "先生……何かないですか？"
10046060-34 = "ほらその、全部解決できちゃう秘策とか……#nせめて、ミカ様を元気づける何かとか……。"
10046060-35 = "[s1] \"ごめん、今回ばかりはさすがに……。\"\n[s2] \"みんなの安全が第一だよ。\""
10046060-40 = "……ですよね。"
10046060-41 = "地盤が不安定ってことは、ここら一帯が危ないってことですし。"
10046060-42 = "先生の立場からして――#nいえ、護衛の私からしても、ここで中止にするのが賢明な判断ですね。"
10046060-47 = "…………。"
10046060-48 = "……地盤。"
10046060-49 = "地盤の安全さえ確保できれば……？"
10046060-50 = "可能性が……あるかも、しれないっす。"
10046060-51 = "でも、この手だけは……使いたくなかったのに……！"
10046060-52 = "……。"
10046060-53 = "…………。"
10046060-54 = "……………………。"
10046060-55 = "使いたくなかったのにっ！！！"
10046060-56 = "[s3] \"イチカ……大丈夫？\"\n[s4] \"そこまで嫌なら無理しなくても……。\""
10046060-59 = "いえ。もう覚悟はできてるっす。"
10046060-60 = "いつもヘラヘラしてる私でも……。"
10046060-61 = "誠意を見せる時くらい分かってます。"
10046060-66 = "先生、一つお願いがあります。"
10046060-73 = "なるほど、なるほど……。"
10046060-74 = "説明ご苦労。状況は理解したよ。"
10046060-75 = "依頼内容は地盤の調査と……別荘の再建だね？"
10046060-77 = "温泉開発部ほどの専門家はいないと思ってるっす。#nあんまり認めたくはないっすけど……。"
10046060-78 = "努力が認められるというのは、ふむ……実に心地良いものだ。"
10046060-82 = "ただ……取引には、対価が必要だろう？"
10046060-83 = "…………。"
10046060-84 = "まず、君たちが押収した資材を返してもらおうか。"
10046060-85 = "……私が保証するっす。"
10046060-86 = "次に……ビーチの一部を少しばかり譲って欲しいんだ。#nまだ開発する場所が残っていてね。"
10046060-87 = "……それは、私の一存では決められないっす。"
10046060-88 = "残念だなぁ？その程度の覚悟だったなんて……。#n交渉のテーブルから降りてしまいそうだ。"
10046060-89 = "…………。"
10046060-90 = "おや？そう睨まないでおくれよ。"
10046060-91 = "……睨んでないっす。"
10046060-92 = "ビーチの件……なんとか説得してみるっす。"
10046060-96 = "……安請け合いは身を滅ぼすぞ？"
10046060-100 = "でもなぁ、私は欲張りなんだ。#nこうなると、ついつい欲が出ちゃってなぁ？"
10046060-104 = "…………私に。"
10046060-105 = "うん？"
10046060-106 = "私にできることなら、なんでもします。#nだから……。"
10046060-112 = "は？"
10046060-113 = "まさか、そこまで切羽詰まっているのかい？"
10046060-114 = "ふむ……。#nいいだろう。助けてあげるとしようか。"
10046060-118 = "ほんとっすか！？"
10046060-119 = "他でもないイチカちゃんの頼みじゃあ仕方ない。"
10046060-120 = "……その代わり、追加で要求を一つ。"
10046060-121 = "きちんと説明してもらおうか。#n一体なぜ、ここまでするのかね？"
10046060-122 = "特に理由はないっすよ。"
10046060-123 = "いや、ある。"
10046060-129 = "それに……なんでもする、と言っただろう？"
10046060-130 = "まさか、舌の根も乾かぬうちに……自分の言ったことを撤回などしないよなぁ？"
10046060-131 = "さあ、私の気が変わる前に――素直に言ったほうが賢明だぞ？"
10046060-137 = "はぁ……一生分かり合える気がしないっすね。"
10046060-138 = "ミカ様を助けたい。それだけっすよ。"
10046060-139 = "おぉ……それは実に素晴らしい。"
10046060-140 = "だが足りないな。まだ本音を隠すつもりかね。"
10046060-141 = "恥ずかしがり屋のイチカちゃんのために……私が手伝ってあげようじゃないか。"
10046060-142 = "これは風の噂で聞いたんだが――#nあのミカというお嬢さん、相当やんちゃだったらしいじゃないか。"
10046060-143 = "…………。"
10046060-144 = "そう怖い顔をしないでくれ。#n私とてトリニティの恥部を暴くつもりはないさ。"
10046060-145 = "ただ……評判の通りであるならば――"
10046060-146 = "果たして、そこまでの忠誠を尽くすような相手なのだろうか？と思ってしまってね。"
10046060-147 = "……忠誠じゃないっす。"
10046060-148 = "ほぉ？じゃあ、友達にでもなったつもりかね？"
10046060-149 = "……友達。"
10046060-150 = "……は。"
10046060-160 = "よくもまぁ思ってもないことがぽんぽん出てくるっすね。"
10046060-161 = "……おっ、ちょっとは話す気になってくれたのかな？"
10046060-162 = "で、なぜだ？"
10046060-163 = "これまでは……ミカ様のこと、正直よく知らなかったんすよ。"
10046060-164 = "それが今日初めて、隣で補佐することになって。"
10046060-165 = "この人が噂のティーパーティーか、と。#n最初の感想なんてそんなもんっすよ。"
10046060-166 = "でも、今日ずっと一緒にいて……。"
10046060-171 = "…………。"
10046060-172 = "輝いてるなぁ……まぶしいなぁ……って思ったんです。#n……私と違って。"
10046060-173 = "普通、友達のためにここまでする？私にはできる？って。#n……できないっすよ、あんなこと。"
10046060-174 = "私は、あの輝きが消えてほしくない。"
10046060-175 = "……それだけっす。"
10046060-180 = "…………。"
10046060-181 = "なるほどな。"
10046060-182 = "柄じゃないことは自分が一番分かってるっすよ。"
10046060-186 = "……似た者同士、か。#n我ながらよく言ったものだな。"
10046060-187 = "…………。"
10046060-188 = "いいだろう。自分のした約束は守らねばな。"
10046060-192 = "助けてくれるんすか……？"
10046060-193 = "ああ、この業界は信頼ありきだ。二言は無いさ。"
10046060-194 = "とはいえなぁ……悪いが私一人でどうにかできる気がしないんだな、これが。"
10046060-199 = "こらこら、話は最後まで聞くものだぞ？"
10046060-200 = "私も、私なりに誠意を見せる時が来たってことさ。"
10046060-208 = "こほん。"
10046060-209 = "おーい、みんな～集まってくれ！"
10046060-216 = "なになに～？"
10046060-217 = "奪還作戦は今晩じゃなかったっけ。"
10046060-219 = "あぁ、それはボツになった。"
10046060-220 = "……奪還作戦？"
10046060-221 = "一つ、建築の案件を請け負うことになった。"
10046060-222 = "あらかじめ言っておくが、これは温泉とは何の関係もない。"
10046060-223 = "だから強要はしない。#nこのビーチでボランティアをしたいやつは、手を挙げてくれ。"
10046060-228 = "私やるよ！部長のことだし、きっと何かあるんでしょ？"
10046060-229 = "失敗してきた温泉は数知れず……建物を建てるだけなら余裕だからね～"
10046060-231 = "うーん、話難しくて途中からよく分かんなかったけど……#nカスミ部長の友達を助けよう！ってことだよね？"
10046060-232 = "それならいつでも歓迎だよ！"
10046060-238 = "はっ……。"
10046060-239 = "……ははっ、ハーハッハッハ！！なんて頼もしい部員なんだ！"
10046060-240 = "よかったな、イチカちゃん！"
10046060-245 = "だ――"
10046060-246 = "誰が友達っすか！！！！"
