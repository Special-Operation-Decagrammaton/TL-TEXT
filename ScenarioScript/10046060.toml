[translation]
10046060-1 = "Episódio 6; Mais uma vez, além da negociação, o que temos em mãos"
10046060-3 = "……Parece que não vai dar."
10046060-4 = "O solo cedeu completamente. #nAlém de reconstruir as instalações, a própria segurança desta praia é questionável――"
10046060-9 = "Por que as coisas acabam assim……."
10046060-10 = "Por que…… por que tinha que ser logo hoje?"
10046060-11 = "Mika-sama……."
10046060-12 = "…………."
10046060-13 = "……Não, ninguém tem culpa."
10046060-14 = "Eu sei disso. Por isso, está tudo bem."
10046060-15 = "……Desculpe, mesmo com todos vocês me ajudando."
10046060-16 = "Mas…… por que as coisas têm que ser assim……."
10046060-20 = "Isso é um acidente, não é?"
10046060-21 = "O esforço da Mika-sama não pode ter sido em vão……!"
10046060-22 = "Obrigada, Ichika-chan."
10046060-23 = "Mas, agora que chegamos a esse ponto…… não dá para brincar despreocupadamente, né."
10046060-24 = "Vamos ser sinceras…… e contar para a Nagi-chan e a Seia-chan."
10046060-25 = "Vamos começar a nos preparar para voltar. Não é bom chegar tarde no dormitório, né."
10046060-31 = "Não, mas…… isso é……."
10046060-32 = "…………."
10046060-33 = "Sensei…… não tem nada que possa fazer?"
10046060-34 = "Sabe, aquela estratégia secreta que resolve tudo…… #nou pelo menos, algo para animar a Mika-sama……."
10046060-35 = "[s1] \"Desculpe, desta vez realmente não dá…….\" \n[s2] \"A segurança de todos vem primeiro.\""
10046060-40 = "……É, tem razão."
10046060-41 = "Se o solo está instável, significa que toda essa área é perigosa."
10046060-42 = "Do ponto de vista do Sensei―― #nnão, mesmo como sua guarda-costas, a decisão sensata é cancelar tudo aqui."
10046060-47 = "…………."
10046060-48 = "……Solo."
10046060-49 = "Se conseguirmos garantir a segurança do solo……?"
10046060-50 = "Talvez…… exista uma possibilidade."
10046060-51 = "Mas, eu não queria…… usar esse método de jeito nenhum……!"
10046060-52 = "……."
10046060-53 = "…………."
10046060-54 = "……………………."
10046060-55 = "Eu não queria usar isso!!!"
10046060-56 = "[s3] \"Ichika…… você está bem?\" \n[s4] \"Se você não quer tanto assim, não precisa se forçar…….\""
10046060-59 = "Não. Eu já estou preparada."
10046060-60 = "Mesmo eu, que estou sempre brincando……."
10046060-61 = "Sei muito bem quando é hora de mostrar sinceridade."
10046060-66 = "Sensei, tenho um pedido."
10046060-73 = "Entendo, entendo……."
10046060-74 = "Obrigado pela explicação. Entendi a situação."
10046060-75 = "O pedido é sobre a investigação do solo e…… a reconstrução da casa de veraneio, certo?"
10046060-77 = "Não acho que existam especialistas melhores que o Departamento de Desenvolvimento de Fontes Termais. #nEmbora eu não queira admitir isso……."
10046060-78 = "Ter o esforço reconhecido é, hum…… algo realmente agradável."
10046060-82 = "Só que…… negociações exigem uma contrapartida, não é?"
10046060-83 = "…………."
10046060-84 = "Primeiro, devolvam os materiais que vocês confiscaram."
10046060-85 = "……Eu garanto isso."
10046060-86 = "Depois…… quero que cedam uma parte da praia. #nAinda me resta um lugar para desenvolver, sabe."
10046060-87 = "……Isso, eu não posso decidir por conta própria."
10046060-88 = "Que decepção. Então era só esse o seu nível de determinação...#nSinto que vou acabar saindo da mesa de negociações."
10046060-89 = "…………."
10046060-90 = "Ora, ora? Não precisa me olhar desse jeito."
10046060-91 = "……Eu não estou te olhando feio."
10046060-92 = "Sobre o caso da praia…… eu vou tentar convencer eles de alguma forma."
10046060-96 = "……Prometer algo que não pode cumprir vai acabar com você, sabia?"
10046060-100 = "Mas veja bem, eu sou uma pessoa gananciosa.#nQuando as coisas chegam a esse ponto, acabo ficando com mais vontade ainda, sabe?"
10046060-104 = "…………Em mim."
10046060-105 = "Hm?"
10046060-106 = "Se for algo que eu possa fazer, eu farei qualquer coisa.#nPor isso……."
10046060-112 = "Hã?"
10046060-113 = "Não me diga que você está tão desesperada assim?"
10046060-114 = "Hum…….#nTudo bem. Acho que vou te ajudar."
10046060-118 = "Sério mesmo!?"
10046060-119 = "Não tem como recusar um pedido da Ichika-chan."
10046060-120 = "……Em troca, quero um pedido adicional."
10046060-121 = "Poderia me explicar direito?#nPor que, afinal, você está indo tão longe?"
10046060-122 = "Não tem um motivo especial."
10046060-123 = "Não, tem sim."
10046060-129 = "Além disso…… você disse que faria qualquer coisa, não disse?"
10046060-130 = "Não vai me dizer que já está voltando atrás no que disse antes de a tinta secar, vai?"
10046060-131 = "Vamos lá, antes que eu mude de ideia — seria mais sensato falar a verdade, não acha?"
10046060-137 = "Haa…… sinto que nunca vamos nos entender."
10046060-138 = "Eu quero ajudar a Mika-sama. É só isso."
10046060-139 = "Oh…… isso é realmente admirável."
10046060-140 = "Mas não é o suficiente. Você ainda pretende esconder o que realmente pensa?"
10046060-141 = "Para a Ichika-chan, que é tão tímida…… eu vou te dar uma mãozinha."
10046060-142 = "Ouvi dizer por aí, através de boatos —#nque aquela senhorita chamada Mika era bem rebelde, não era?"
10046060-143 = "…………."
10046060-144 = "Não faça essa cara de assustada.#nEu não tenho a menor intenção de expor as sujeiras da Trinity."
10046060-145 = "É só que…… se os boatos forem verdadeiros —"
10046060-146 = "Fiquei me perguntando se ela é realmente alguém que mereça tanta lealdade assim."
10046060-147 = "……Não é lealdade."
10046060-148 = "Oh? Então você acha que viraram amigas?"
10046060-149 = "……Amigas."
10046060-150 = "……Ha."
10046060-160 = "Como você consegue dizer coisas que nem pensa com tanta facilidade assim?"
10046060-161 = "……Oh, parece que você finalmente está disposta a conversar, não é?"
10046060-162 = "Então, por quê?"
10046060-163 = "Até agora…… eu não conhecia a Mika-sama muito bem, para ser sincera."
10046060-164 = "Foi só hoje, pela primeira vez, que eu a auxiliei ao lado dela."
10046060-165 = "Pensei: 'Então essa é a famosa Tea Party'.#nMinha primeira impressão foi só isso."
10046060-166 = "Mas, passando o dia todo com ela……."
10046060-171 = "…………."
10046060-172 = "Eu pensei: 'Ela brilha tanto…… é tão deslumbrante……'.#n……Diferente de mim."
10046060-173 = "Normalmente, alguém faria tanto assim por uma amiga? Eu seria capaz?#n……Eu não seria capaz de fazer aquilo."
10046060-174 = "Eu só não quero que aquele brilho se apague."
10046060-175 = "……É só isso."
10046060-180 = "…………."
10046060-181 = "Entendo."
10046060-182 = "Eu sou a primeira a saber que isso não combina comigo."
10046060-186 = "……Pessoas parecidas, é?#nAté eu me surpreendo com o que acabei de dizer."
10046060-187 = "…………。"
10046060-188 = "Muito bem. Uma promessa feita deve ser cumprida."
10046060-192 = "Você vai me ajudar……?"
10046060-193 = "Sim, este ramo depende da confiança. Não volto atrás na minha palavra."
10046060-194 = "Dito isso…… sinto muito, mas não sinto que consigo resolver isso sozinha, sabe como é."
10046060-199 = "Ei, ei, você deve ouvir a história até o fim, sabia?"
10046060-200 = "Chegou a hora de eu mostrar minha sinceridade, do meu próprio jeito."
10046060-208 = "Ehem."
10046060-209 = "Ei, pessoal~ venham aqui!"
10046060-216 = "O que foi, o que foi?"
10046060-217 = "A operação de resgate não era hoje à noite?"
10046060-219 = "Ah, isso foi cancelado."
10046060-220 = "……Operação de resgate?"
10046060-221 = "Aceitamos um projeto de construção."
10046060-222 = "Já vou avisando, isso não tem nada a ver com fontes termais."
10046060-223 = "Por isso, não vou forçar ninguém.#nQuem quiser ser voluntário nesta praia, levante a mão."
10046060-228 = "Eu topo! Sendo a nossa presidente, com certeza tem algum motivo, né?"
10046060-229 = "Já falhamos em tantas fontes termais…… construir um prédio é moleza, né~"
10046060-231 = "Hmm, o assunto é complicado e eu não entendi muito bem desde o começo, mas……#né para ajudar a amiga da presidente Kasumi, certo?"
10046060-232 = "Se for isso, então eu topo na hora!"
10046060-238 = "Ah……."
10046060-239 = "……Haha, Hahaha!! Que membros tão confiáveis eu tenho!"
10046060-240 = "Que bom para você, Ichika-chan!"
10046060-245 = "Quem――"
10046060-246 = "Quem é sua amiga, afinal!!!!"
