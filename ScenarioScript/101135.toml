[translation]
101135-7 = "撤退、撤退だ！ "
101135-8 = "建物内部に撤退して再整備だ！"
101135-17 = "1階のコンビニ、確保しました！"
101135-18 = "あっ、以前「廃棄品」を持って行ってくださった方々ですよね？#n助けに来てくれたんですね！"
101135-19 = "……えっと。"
101135-20 = "ここはいつも物騒な事件ばかりなので……#n隠れ方ばっか上手くなってく気がします。もう慣れっこ、ですけど……。"
101135-21 = "……それは災難でしたね。"
101135-22 = "あ！そうだ。廃棄弁当いりますか？#n今回も大量に余ってしまってて。"
101135-23 = "……ありがとうございます、後で是非。"
101135-25 = "よし、入口もクリア！"
101135-26 = "助けていただいて、ありがとうございます。公安局のみなさん。"
101135-27 = "というか、ルールを破って私たちの手助けをして本当に大丈夫なの？"
101135-28 = "「ルールも守れない警察だ」って、犯罪者にバカにされるんじゃない？"
101135-29 = "あはは……「RABBIT小隊」にこんな事を言われるのは不本意ではありますが……"
101135-30 = "問題ありません。カンナ局長のお力になれるのなら。"
101135-31 = "それに、ヴァルキューレの生徒が犯罪者にバカにされるのは、日常茶飯事ですし……"
101135-32 = "後続の部隊は私たちが相手しますので、建物の奪還の方をお願いします！"
101135-33 = "みなさん、ありがとうございます。"
101135-35 = "では、私たちは今からシャーレの建物に突入します。#nここからは2つの任務を同時に遂行しなくてはなりません。"
101135-36 = "1つ目、建物の地下にある「クラフトチェンバー」をPMCから奪還。"
101135-37 = "2つ目、建物のどこかに幽閉されている、リン行政官の救出。"
101135-38 = "でも……行政官がどこにいるのか全然分からないんだよ？"
101135-39 = "人質の位置を把握せずに開始するのはちょっと……#n安全の保証が難しいと思うんだけど。"
101135-40 = "それはこっちに任せて。"
101135-41 = "だ……誰……？"
101135-42 = "わ、私たちは連邦生徒会です。"
101135-43 = "[s] \"モモカ、アユム！無事だったんだ！\""
101135-45 = "うん。ここはサンクトゥムタワーの地下通信センター。#n監視の目を避けてここまで来るの、ほんと大変だったよ。"
101135-46 = "サボる時に使ってた、通風孔がここで役に立つとはね！あははっ！"
101135-47 = "モモカちゃん……。"
101135-48 = "どうにか通信ログを復旧して、リン先輩の位置を突き止めたよ。"
101135-49 = "シャーレ居住区の北部、今は使われてない3番目の部屋。#nそこに先輩はいる。"
101135-50 = "先生……どうか、リン先輩を……"
101135-52 = "[ns] \"うん、任せて。\""
101135-53 = "……はい！"
101135-55 = "次回;[ruby=S.C.H.]シャーレ[/ruby]奪還作戦（２）"
