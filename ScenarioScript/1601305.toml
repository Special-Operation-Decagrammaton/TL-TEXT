[translation]
1601305-1 = "O céu noturno de Koharu"
1601305-4 = "（Enquanto esperava na praia, Koharu se aproximou timidamente）"
1601305-9 = "Ugh... V-você estava aqui, Sensei."
1601305-10 = "Quer dizer, o que você está fazendo aqui fora a uma hora dessas da noite...!?"
1601305-11 = "……Eh?"
1601305-12 = "Veio ver as estrelas...?#nPorque as estrelas são bem visíveis aqui...?"
1601305-13 = "Não é como se você não pudesse ver as estrelas em qualquer outro lugar..."
1601305-14 = "Você só está dando desculpas, não é! Eu não vou cair nessa!"
1601305-15 = "……Eh, não é? Sério mesmo?"
1601305-16 = "O que exatamente..."
1601305-17 = "[s1] \"Olhe para o céu, Koharu.\"\n[s2] \"As estrelas só ficam bem visíveis quando nos afastamos da cidade.\""
1601305-20 = "Isso é..."
1601305-21 = "O que exatamente..."
1601305-26 = "……！！"
1601305-29 = "O-o que é isso!? As estrelas... tantas assim!"
1601305-30 = "Deveria ser o mesmo céu que eu sempre vejo em Trinity..."
1601305-31 = "É só porque mudamos de lugar... por que isso..."
1601305-32 = "[s3] \"Se houver outras luzes por perto, as estrelas desaparecem.\"\n[s4] \"Quanto mais profunda a escuridão da noite, mais as estrelas brilham.\""
1601305-37 = "É mesmo... eu não sabia."
1601305-38 = "Então, o Sensei veio aqui sozinho para ver isso...?"
1601305-39 = "Hmm..."
1601305-40 = "Uma desculpa bem convincente."
1601305-41 = "[s5] \"Por que você está aqui, Koharu?\"\n[s6] \"Você precisava de mim para algo?\""
1601305-46 = "E-eu!?#nN-não tem um motivo específico, tá!?"
1601305-47 = "Quer dizer, precisa de um motivo para vigiar o Sensei!?#nPor que você está perguntando isso agora!"
1601305-48 = "Está perguntando se tudo bem eu ter deixado as outras pessoas dormindo?"
1601305-49 = "Isso é... bem, é..."
1601305-50 = "É que... mas..."
1601305-51 = "Quando eu acordei, o Sensei não estava lá..."
1601305-52 = "E-eu pensei que talvez algo pudesse ter acontecido..."
1601305-56 = "O-o que foi! Essa sua cara!!"
1601305-57 = "Esquece o que eu disse agora mesmo!!#nEu não estava nem um pouco preocupada com você, Sensei!"
1601305-58 = "Já chega! Tanto faz! Eu vou embora!!#nFique aí vendo suas estrelas o quanto quiser!!"
1601305-68 = "…………."
1601305-69 = "[s7] \"Koharu?\"\n[s8] \"Não vai voltar?\""
1601305-74 = "I-isso é..."
1601305-75 = "É que..."
1601305-76 = "Bem..."
1601305-80 = "[ns9] \"Eu também já vou voltar. Quem me dera se alguém me acompanhasse...\"\n[ns10] Volta para casa junto com Koharu em silêncio."
1601305-86 = "Ugh... É mais longe do que eu pensava... E está tão escuro..."
1601305-87 = "Se eu soubesse que estava tão escuro, deveria ter chamado o Sensei..."
1601305-88 = "……Sensei? Você está bem do meu lado, né?"
1601305-89 = "[s11] \"Estou segurando sua mão. Está tudo bem.\"\n[s12] \"Se está com medo, quer que a gente ande mais devagar?\""
1601305-94 = "E-eu não estou com medo!!"
1601305-95 = "É só que, bem..."
1601305-96 = "É-é perigoso!! Está escuro, e eu posso acabar me machucando!"
1601305-97 = "Por isso... é que..."
1601305-98 = "Bem..."
1601305-99 = "Mas, enfim... se estou com o Sensei, vai ficar tudo bem mesmo se algo acontecer."
1601305-100 = "Se algo acontecer, você vai dar um jeito, né..."
1601305-104 = "……Hehe."
1601305-105 = "Ehehe……"
1601305-109 = "Hya!?"
1601305-110 = "Q-que foi!? Ouvi um barulho vindo do lado agora pouco……"
1601305-115 = "[ns13] \"Calma, Koharu. É só...\"\n[ns14] \"Está tudo bem, é só um animalzinho.\""
1601305-120 = "Hyaaaaaaaaaaaaaa!?!?"
1601305-121 = "Sensei!!! Me ajuda!!!!"
1601305-127 = "[ns15] \"K-Koharu! Cuidado na frente!!\"\n[ns16] \"Está tudo bem, se acalma!!\""
1601305-130 = "[ns] \"Desse jeito……!\""
1601305-137 = "(Tentei acalmar a Koharu, mas acabei batendo a cabeça nela enquanto ela se debatia, e minha consciência começou a apagar……)"
1601305-141 = "(Quando acordei, o sol já estava começando a nascer……)"
1601305-145 = "[ns17] Olho ao redor apressadamente.\n[ns18] \"Koharu……? Onde você está……?\""
1601305-154 = "……Hehe……uhehe."
1601305-155 = "Isso também…… aquilo também…… que delícia…… não aguento mais comer……"
1601305-156 = "Hehe……uhehe……"
1601305-157 = "………Sensei."
1601305-162 = "(Coloquei a Koharu, que dormia tranquilamente, nas costas e voltei para o acampamento.)"
