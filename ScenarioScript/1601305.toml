[translation]
1601305-1 = "コハルの夜空"
1601305-4 = "（浜辺で待っていると、コハルが恐る恐るやってきた）"
1601305-9 = "うう……こ、ここにいたのね、先生。"
1601305-10 = "というか、こんな夜遅くに外に出て何してるのよ……！？"
1601305-11 = "……え？"
1601305-12 = "星を見に来たの……？#nここは星がよく見えるから……？"
1601305-13 = "別に星なんてどこでも見れるのに……"
1601305-14 = "そうやって言い訳してるだけでしょ！私は騙されないんだからね！"
1601305-15 = "……えっ、違うの？本当に？"
1601305-16 = "一体何が……"
1601305-17 = "[s1] \"空を見上げてごらん、コハル。\"\n[s2] \"星は、街から離れないとよく見えないんだよ。\""
1601305-20 = "それは……"
1601305-21 = "一体どういう……"
1601305-26 = "……！！"
1601305-29 = "な、何これ！？星が……こんなにいっぱい！"
1601305-30 = "トリニティでいつも見てた空のはずなのに……"
1601305-31 = "場所が変わっただけでしょ……どうしてこんな……"
1601305-32 = "[s3] \"他に光が残っていると、星は消えちゃうから。\"\n[s4] \"夜闇が深ければ深いほど、星は輝くものだからね。\""
1601305-37 = "そうなんだ……知らなかった。"
1601305-38 = "じゃあ、先生はこれを見るために一人で……？"
1601305-39 = "ふぅん……"
1601305-40 = "もっともらしい言い訳ね。"
1601305-41 = "[s5] \"コハルはどうしてここに？\"\n[s6] \"何か私に用事があったの？\""
1601305-46 = "わ、私！？#nと、特に理由はないけど！？"
1601305-47 = "というか、先生を監視するのに理由って必要！？#nなんで今さら聞くのよ！"
1601305-48 = "他の人と一緒に寝てたのにいいのかって？"
1601305-49 = "それは……そうだけど……"
1601305-50 = "その……でも……"
1601305-51 = "目が覚めた時に、先生がいなかったから……"
1601305-52 = "も、もしかしたら何かあったのかもって思ったの……"
1601305-56 = "な、何よ！その顔！！"
1601305-57 = "やっぱさっきのはナシ！！#n先生のことなんて全然心配してなかったんだから！"
1601305-58 = "もう！いいわよ！私は帰るからね！！#n先生は好きなだけ星でも見てたら！！"
1601305-68 = "…………。"
1601305-69 = "[s7] \"コハル？\"\n[s8] \"帰らないの？\""
1601305-74 = "そ、それは……"
1601305-75 = "その……"
1601305-76 = "えっと……"
1601305-80 = "[ns9] \"私もそろそろ帰ろっかな。誰かが一緒についてくれたらな～\"\n[ns10] 無言でコハルと一緒に帰る。"
1601305-86 = "うう……思ってた以上に遠い……真っ暗だし……"
1601305-87 = "こんなに暗いって知ってたら、先生を呼び出せばよかった……。"
1601305-88 = "……先生？ちゃんと隣にいるよね？"
1601305-89 = "[s11] \"ちゃんと手を繋いでるよ。大丈夫。\"\n[s12] \"怖いなら、ゆっくり歩こうか？\""
1601305-94 = "こ、怖くないわよ！！"
1601305-95 = "ただ、その……"
1601305-96 = "あ、危ないから！！暗いし、怪我しちゃうかもしれないし！"
1601305-97 = "だから……その……"
1601305-98 = "えっと……"
1601305-99 = "まあでも……先生と一緒なら、何かあっても大丈夫か。"
1601305-100 = "何かあっても、どうにかしてくれるし……"
1601305-104 = "……ふふ。"
1601305-105 = "えへへ……"
1601305-109 = "ヒャッ！？"
1601305-110 = "な、何！？今、横から音が……"
1601305-115 = "[ns13] \"落ち着いて、コハル。ただの……\"\n[ns14] \"大丈夫だよ、ただの小動物だから。\""
1601305-120 = "ひゃぁああああああああ！？！？"
1601305-121 = "先生！！！助けて！！！！"
1601305-127 = "[ns15] \"コ、コハル！前が！！\"\n[ns16] \"大丈夫だから落ち着いて！！\""
1601305-130 = "[ns] \"このままでは……！\""
1601305-137 = "（コハルを落ち着かせようとするも、暴れるコハルと頭をぶつけてしまい、意識が薄れていった……）"
1601305-141 = "（目を覚ますと、既に朝日が昇りはじめていて……）"
1601305-145 = "[ns17] 慌てて周囲を見る。\n[ns18] \"コハル……？どこ……？\""
1601305-154 = "……ふふ……うふふ。"
1601305-155 = "あれも……これも……美味しい……もう食べられないよぉ……。"
1601305-156 = "ふふ……うふふ……"
1601305-157 = "………先生。"
1601305-162 = "（気持ちよさそうに眠っているコハルを背負って、キャンプに戻った）"
