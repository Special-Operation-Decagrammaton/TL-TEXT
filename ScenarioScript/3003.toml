[translation]
3003-1 = "Resquícios de Conservas (3)"
3003-4 = "……Desde quando isso está tão inchado?"
3003-5 = "Eu não sei. Deixei ali por um tempo e acabou ficando assim..."
3003-6 = "Mais importante, tem certeza de que é seguro comer isso?"
3003-7 = "Uma lata em condições normais não deveria inchar desse jeito, né?"
3003-9 = "Eu sabia que não era uma lata comum... Com certeza tem alguma criatura terrível selada aqui dentro..."
3003-10 = "Como tentáculos de Kraken ou a cauda de uma serpente marinha gigante..."
3003-11 = "Talvez seja até uma forma de vida desconhecida das profundezas do oceano..."
3003-12 = "É ração de combate produzida em massa na fábrica. Não tem como ser algo desconhecido."
3003-13 = "De qualquer forma... vamos verificar os ingredientes."
3003-17 = "“...Nossa lata de 'Molho de Frutos do Mar' contém frutos do mar frescos inteiros para manter o sabor e a textura originais.”"
3003-18 = "“O conteúdo inclui arenque, sardinha, polvo, etc., e não adicionamos nenhum processo de esterilização extra para preservar o sabor autêntico...”"
3003-19 = "Nove entre dez chances de que os frutos do mar lá dentro apodreceram ou fermentaram..."
3003-20 = "Eca, que nojo..."
3003-21 = "Então, quer dizer que agora essa lata está cheia de gases de peixe?"
3003-22 = "Se der algo errado, a lata pode explodir..."
3003-24 = "Ai... nem quero pensar nisso..."
3003-25 = "A gente realmente deveria jogar isso fora em algum lugar..."
3003-30 = "Pessoal, esperem um pouco."
3003-36 = "Se o que a Saki disse for verdade, essa lata é, sem dúvida, um explosivo que liberará gases ao menor toque."
3003-37 = "Se jogarmos essa lata irresponsavelmente em uma lixeira... podemos causar um grande dano aos faxineiros ou aos moradores locais que tocarem nela sem saber."
3003-38 = "E-então, o que a gente faz com isso? Não dá para comer..."
3003-39 = "A missão de EOD para desarmar IEDs e explosivos não detonados dentro de Kivotos também é uma das operações que a SRT deve realizar..."
3003-40 = "Não posso ignorar o fato de uma bomba bioquímica tão hedionda cair nas mãos de alguém."
3003-42 = "Miyako, não me diga que..."
3003-43 = "Por acaso, você quer que a gente..."
3003-44 = "Sim... nós vamos assumir a responsabilidade e descartar essa lata de frutos do mar!"
3003-46 = "A partir de agora, iniciaremos a operação 'Arenque Podre' para o descarte seguro da lata."
3003-47 = "O básico do descarte de explosivos é minimizar os danos e tornar o artefato inoperante..."
3003-48 = "A maior parte dos componentes do mau cheiro gerado pelos peixes é solúvel em água. Portanto, vamos colocar a lata em um tanque de água e remover o gás lentamente para processá-la."
3003-49 = "O método não importa, mas..."
3003-50 = "……Então, Saki, por favor."
3003-54 = "Espera aí, por que sobrou para mim fazer isso?"
3003-55 = "É que... a Saki é a única no Esquadrão RABBIT que concluiu o treinamento de EOD."
3003-56 = "Se for treinamento de EOD, a Moe também deve ter feito."
3003-57 = "Isso é verdade, mas deixar a Moe encarregada de lidar com explosivos é..."
3003-61 = "O que foi, o que foi? Querem minha ajuda? Se for bomba, pode deixar comigo, hehe."
3003-63 = "……Não tem jeito, né."
3003-64 = "……Sim, não tem jeito."
3003-65 = "Mas Saki, não se preocupe. Nós estaremos ao seu lado para dar suporte caso algo aconteça."
3003-67 = "Nós compartilhamos o mesmo destino, somos companheiras de batalha...!"
3003-68 = "Não precisava ser tão dramático só para abrir uma lata..."
3003-72 = "……Pensei isso, mas agora que chegou a hora de lidar com isso, estou ficando nervosa."
3003-73 = "Primeiro, vou fazer um pequeno furo no fundo da lata para liberar o gás."
3003-74 = "E-e se eu errar e fizer 'PUM!'... o que eu faço...?"
3003-76 = "A ruína vindo acompanhada de um banho de líquido fedorento e viscoso, isso também é... ah, ah..."
3003-77 = "Err, sobre isso..."
3003-78 = "Espere, Saki. Ao fazer um furo no fundo da lata inchada, você deve perfurar a borda mais grossa do fundo para evitar que a lata se rompa devido à pressão."
3003-79 = "Uuu, que medo... estamos perdidas..."
3003-81 = "Já que chegamos a esse ponto, vamos fazer tudo de uma vez! Ah, ah..."
3003-82 = "Aaah, cala a boca!! Se você continuar falando assim, eu não vou conseguir me concen――"
3003-86 = "Ah."
3003-91 = "（O conteúdo da lata explodida se espalhou, causando um desastre biológico imenso no Parque dos Coelhinhos）"
3003-93 = "（Depois disso, embora tenham conseguido limpar os destroços com muito esforço, dizem que o mau cheiro impregnado nos corpos das integrantes do Esquadrão RABBIT não saiu por mais de 4 dias...）"
3003-94 = "Resquícios da lata"
