[translation]
10019010-12 = "Uwaaaah! Apareceu!!"
10019010-13 = "Vamos, corram!"
10019010-14 = "Vou atraí-lo até o ponto alvo~"
10019010-21 = "Reação de energia!?#nCuidado, o laser vem aí!!"
10019010-22 = "E-está vindo para cá!?"
10019010-23 = "Não consigo calcular o tempo de esquiva!#n――Hoshino-senpai!"
10019010-36 = "Nossa, aquilo foi um acerto direto...?"
10019010-37 = "A-Aru-sama...!"
10019010-44 = "...Hmph."
10019010-45 = "Não tem como ela ser derrotada por algo desse nível. Vamos seguir com o plano, como planejado."
10019010-46 = "É-é mesmo...?#n...Certo, entendi!"
10019010-47 = "...Entendi.#nEntão, vamos continuar avançando~☆"
10019010-51 = "Uwaaaah!? Levou um direto na frente, isso é perigoso!!"
10019010-52 = "...Não, com aquele nível de dano, provavelmente..."
10019010-53 = "Hoshino-senpai, como está a situação?"
10019010-66 = "Nossa, isso doeu um pouco~#nMas bem, acho que estamos salvas."
10019010-67 = "Sim, sim, estamos bem, Ayane-chan."
10019010-68 = "Algo desse nível não é nada para mim."
10019010-70 = "Ela aguentou aquele ataque...!?"
10019010-71 = "Sério, foi por pouco~#nMinha lombar tem ficado fraca ultimamente, não posso exagerar... e o preço das compressas não é brincadeira, sabe..."
10019010-72 = "Por isso eu disse que não temos tanta diferença de idade assim!!"
10019010-74 = "...Incrível, a presidente de vocês... não, o pessoal de Abydos é todo forte, né."
10019010-75 = "Eh, é mesmo?"
10019010-76 = "Ahaha... como não temos com o que comparar, não sabemos muito bem..."
10019010-80 = "...Com isso, os preparativos para a estratégia estão concluídos! Bom trabalho."
10019010-81 = "O combate contra o guardião do 1º Sanctum pode começar imediatamente!"
10019010-82 = "Então, vamos acabar logo com isso."
