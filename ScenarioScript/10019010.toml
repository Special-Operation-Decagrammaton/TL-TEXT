[translation]
10019010-12 = "うわぁぁっ！出たわよ！！"
10019010-13 = "さあ、走りましょう！"
10019010-14 = "目標地点まで引きつけるよ～"
10019010-21 = "エネルギー反応！？#nき、気をつけて、レーザーが来るよ！！ "
10019010-22 = "こ、こっちに来てるわよ！？"
10019010-23 = "回避タイミングが計算できません！#n――ホシノ先輩！"
10019010-36 = "うっわ、アレ直撃……？"
10019010-37 = "あ、アル様……！"
10019010-44 = "……ふん。"
10019010-45 = "あの程度でやられる訳ないわ。予定通り、計画を進めるわよ。"
10019010-46 = "そ、そうなんですか……？#n……そ、そうですね、分かりました！"
10019010-47 = "……なるほどねぇ。#nんじゃ、引き続き前進～☆"
10019010-51 = "うわぁああっ！？正面から食らっちゃってるよ、ヤバいって！！"
10019010-52 = "……いえ、あの程度ならおそらく――"
10019010-53 = "ホシノ先輩、状況はどうですか？"
10019010-66 = "いやぁ、なかなか痛いねぇ～#nでもまあ、セーフかな。"
10019010-67 = "うんうん、私たちは無事ですよ、アヤネちゃん。"
10019010-68 = "この程度、どうってことないわよ。"
10019010-70 = "あの攻撃を、耐えた……！？ "
10019010-71 = "ほんと、危ないとこだったよぉ～#n最近腰も弱ってきてるし、無理はできないんだけどなぁ……湿布代もバカにならないしさぁ～"
10019010-72 = "だからそんなに歳変わらないでしょうが！！"
10019010-74 = "……すごいね、あなた達の委員長……いや、アビドスってみんな強いんだね。"
10019010-75 = "えっ、そうなの？ "
10019010-76 = "あはは……比較するものが無いから、あまりよく分からないんですけどね……"
10019010-80 = "……これで攻略準備は完了です！お疲れ様でした。"
10019010-81 = "第1サンクトゥムの守護者との交戦、すぐにでも開始できます！"
10019010-82 = "じゃあ、ちゃちゃっと行っちゃおっか。"
