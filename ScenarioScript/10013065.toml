[translation]
10013065-3 = "イズナ流忍法！超強力シュート！です！"
10013065-13 = "ぐぅぅぅぅっ！？この力は……一体……！？"
10013065-14 = "イズナは、主殿に出会ったことでもっと強くなりました！"
10013065-15 = "主殿はイズナの夢を理解し、認めてくれた！"
10013065-16 = "そのおかげでイズナは一皮むけて成長したんです！"
10013065-17 = "なるほど……だから、水着姿なのか……！"
10013065-18 = "[s] \"いや、それはちょっと違うけど！\""
10013065-27 = "ぐぁぁぁぁぁっ！！"
10013065-32 = "さあ、これで終わりよ！"
10013065-33 = "イズナたちの勝利です！"
10013065-38 = "な、なぜだぁぁぁ！！なぜ儂らが後れを取る！？"
10013065-39 = "以前とは何もかも違ったはずなのだ！！"
10013065-40 = "黒亀組だけでなく、カイザーPMCの兵力まで雇って備えていたというのに！！"
10013065-41 = "[s] （カイザーPMC……？）"
10013065-42 = "そのことなんですけど……#n実は昨日の夕方に来たお客さんの中に、キツネのお面を被ったやつがいまして……"
10013065-43 = "そいつに椅子に座った分の料金を請求しようとしたんですよ。#nそしたら、いきなり襲いかかってきまして……"
10013065-44 = "そのせいで、カイザーPMCから雇った兵力の大半を失っちゃいました……"
10013065-45 = "なぜそれを早く言わん！？仕事において最も重要なのは報連相だろう！#nそんなことも知らんのか！？"
10013065-46 = "[s1] \"何か……デジャヴのような……。\"\n[s2] \"キツネのお面を被ったお客さんって……。\""
10013065-50 = "さあ、ここまでよ！ニャン天丸！"
10013065-51 = "正義と忍者は常に勝つものです！ニンニン！"
10013065-52 = "うぐぐぐ……！……いや、そうか。なるほど……そうくるか。"
10013065-56 = "ふ……ふふふ……はははは！はははははははは！"
10013065-57 = "[s] \"その笑い……切り札でもあるの？\""
10013065-58 = "みんな、油断しないで！"
10013065-59 = "はい！なんたって相手は、あの百鬼夜行商店街の会長ですからね！"
10013065-60 = "（ごくり！）"
10013065-66 = "あー、コホン。"
10013065-67 = "シズコ君、おぬしの手腕にはいつも感心しているよ。"
10013065-71 = "聞くところによると、この群島でフランチャイズ事業を展開しておるそうじゃないか。"
10013065-72 = "ははは！それは実に良い姿勢だと思うぞ！そこで、どうかね？#nこのニャン天丸とも契約を結ぶというのは！"
10013065-76 = "おぬしは金が必要なんじゃろう？"
10013065-77 = "ならば、ちょうど儂の手元に黒亀組という兵力がいる。こいつを活用すれば、もっと効率よく事業が回せるぞ！"
10013065-81 = "過ぎし日のわだかまりは全て水に流して、共に金を稼ごうじゃないか！"
10013065-82 = "互いに手を取り合い、より広い世界へ羽ばたこう！"
10013065-83 = "ええ、それは嬉しい申し出ね。"
10013065-84 = "おぉ！さすがシズコ君！話がわかる！"
10013065-85 = "おかげで迷わずにこいつをキメられるわ！"
10013065-86 = "寝言は寝て言えぇぇぇぇっ！#nシズコ[ruby=マジギレ]本気の[/ruby]看板娘パーーンチ！夏バージョン！！"
10013065-95 = "――ってな感じで、ここを管理していた勢力がバラバラに逃げちゃってね。#n少し人手を貸してほしいの。"
10013065-96 = "まあ、そういうことなら構わんよ。ちょうど手が空いてる子もいるしな。"
10013065-97 = "ありがとう。それじゃ、お願いね。"
10013065-101 = "くっそぉ、ニャン天丸め……ちょっと目を離した隙に逃げ出すなんて……"
10013065-103 = "イズナもびっくりしました！すごく逃げ足が速くて！#nあれはまるで忍者……じゃなくて、その……"
10013065-104 = "……ムカデ？"
10013065-105 = "たしかにそれっぽいですね！"
10013065-106 = "あはは……"
10013065-107 = "[s] \"またどこかで会う日が来るかもね……。\""
10013065-108 = "それだけは……勘弁願いたいです……"
10013065-112 = "よし！ひとまず、この話はここまで！"
10013065-116 = "やることはまだ残ってるし、どんどんいきましょう！"
