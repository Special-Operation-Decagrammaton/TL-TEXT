[translation]
10013065-3 = "Ninpo estilo Izuna! Disparo superpoderoso! É isso!"
10013065-13 = "Guhhh!? Esse poder... o que é... afinal...!?"
10013065-14 = "Eu me tornei muito mais forte depois de conhecer o Mestre!"
10013065-15 = "O Mestre entendeu e reconheceu o meu sonho!"
10013065-16 = "Graças a isso, eu consegui superar meus limites e crescer!"
10013065-17 = "Entendo... Então é por isso que você está de roupa de banho...!"
10013065-18 = "[s] \"Não, não é bem por isso!\""
10013065-27 = "Guaaaaaaah!!"
10013065-32 = "Muito bem, é o fim para vocês!"
10013065-33 = "A vitória é nossa!"
10013065-38 = "Ma-mas por quê!! Por que estamos ficando para trás!?"
10013065-39 = "Deveria estar tudo diferente de antes!!"
10013065-40 = "Mesmo tendo contratado não só o Grupo Kurokame, mas também as forças da Kaiser PMC para nos prepararmos!!"
10013065-41 = "[s] (Kaiser PMC...?) "
10013065-42 = "Sobre isso... #nNa verdade, entre os clientes que vieram ontem à noite, havia um usando uma máscara de raposa..."
10013065-43 = "Quando tentei cobrar a taxa do assento dele, #nele começou a atacar do nada..."
10013065-44 = "Por causa disso, perdemos a maior parte das forças que contratamos da Kaiser PMC..."
10013065-45 = "Por que não me contou isso antes!? O mais importante no trabalho é a comunicação! #nVocê nem sabe disso!?"
10013065-46 = "[s1] \"Isso me dá um certo... déjà vu...\"\n[s2] \"Um cliente com máscara de raposa...\""
10013065-50 = "Chega de brincadeira! Nyantenmaru!"
10013065-51 = "A justiça e os ninjas sempre vencem! Nin-nin!"
10013065-52 = "Ughhh...! ...Não, espere. Entendo... Então é assim que vai ser."
10013065-56 = "Fu... fufufu... Hahahaha! Hahahahahaha!"
10013065-57 = "[s] \"Essa risada... você tem um trunfo na manga?\""
10013065-58 = "Pessoal, não baixem a guarda!"
10013065-59 = "Sim! Afinal, o oponente é o presidente da Associação Comercial de Hyakkiyako!"
10013065-60 = "(Gulp!)"
10013065-66 = "Ah, *cof cof*."
10013065-67 = "Shizuko, sempre admiro a sua competência."
10013065-71 = "Ouvi dizer que você está expandindo seus negócios de franquia por este arquipélago."
10013065-72 = "Hahaha! Acho essa atitude excelente! Então, o que me diz? #nQue tal fechar um contrato com este Nyantenmaru!"
10013065-76 = "Você precisa de dinheiro, não é?"
10013065-77 = "Se for assim, eu tenho o Grupo Kurokame à minha disposição. Se você os utilizar, poderá gerir seus negócios com muito mais eficiência!"
10013065-81 = "Vamos esquecer as mágoas do passado e ganhar dinheiro juntos!"
10013065-82 = "Vamos dar as mãos e voar para um mundo ainda maior!"
10013065-83 = "Sim, essa é uma proposta tentadora."
10013065-84 = "Oh! Como esperado da Shizuko! Você entende como as coisas funcionam!"
10013065-85 = "Graças a isso, posso decidir isso sem hesitar!"
10013065-86 = "Vá sonhar em outro lugar! #nSoco da Garota-Propaganda da Shizuko, versão de verão, com força total!!"
10013065-95 = "— E foi assim que as forças que controlavam este lugar fugiram para todos os lados. #nPreciso que me emprestem um pouco de mão de obra."
10013065-96 = "Bem, se é assim, não vejo problema. Tenho algumas pessoas livres agora."
10013065-97 = "Obrigada. Então, conto com vocês."
10013065-101 = "Droga, aquele Nyantenmaru... fugir assim que eu me distraí um pouco..."
10013065-103 = "Eu também fiquei surpresa! Ele fugiu muito rápido! #nParecia um ninja... não, na verdade..."
10013065-104 = "...Uma centopeia?"
10013065-105 = "Faz sentido, parece mesmo!"
10013065-106 = "Ahaha..."
10013065-107 = "[s] \"Talvez a gente se encontre de novo em algum lugar...\""
10013065-108 = "Só espero que... isso não aconteça..."
10013065-112 = "Muito bem! Por enquanto, vamos encerrar o assunto por aqui!"
10013065-116 = "Ainda temos coisas para fazer, então vamos continuar!"
