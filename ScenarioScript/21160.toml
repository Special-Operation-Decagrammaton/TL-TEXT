[translation]
21160-1 = "Episódio 16; Só mais um passo!"
21160-2 = "Millennium - Depósito de Itens Confiscados do Conselho Estudantil"
21160-5 = "Haa, haa, conseguimos fugir...!?"
21160-6 = "Sensei, Midori, Aris, vocês estão bem!?"
21160-7 = "O meu HP está suficiente."
21160-8 = "Eu e o Sensei estamos bem."
21160-9 = "Ainda bem... Mas falando nisso, aqui é o Depósito de Itens Confiscados? Parece que tá tudo meio destruído."
21160-10 = "O vidro está quebrado, e as prateleiras também estão caídas..."
21160-11 = "Devem ser as balas ricocheteadas da Karin-senpai... O impacto da batalha e das explosões deve ter chegado até aqui."
21160-12 = "A Yuuka já deve estar achando que a Aris pegou o 'Espelho' na confusão de agora há pouco... Então ela com certeza deve achar que nós já fugimos de volta pra sala do clube. Ela nunca vai imaginar que nós viemos pra cá."
21160-13 = "De qualquer forma, se nós conseguirmos levar o 'Espelho' com a gente, a Veritas deve dar um jeito no resto...!"
21160-15 = "Ah, achei, o 'Espelho'! Se a gente tiver isso...!"
21160-16 = "Beleza! Agora, vamos voltar logo―"
21160-17 = "......?"
21160-18 = "......Silêncio, fiquem mutadas, por favor."
21160-19 = "Hm?"
21160-21 = "......Alguém está vindo para cá. Considerando os passos, provavelmente é apenas uma pessoa."
21160-22 = "Hmmm... Se nós ficarmos aqui e a Yuuka voltar junto com o Clube das Maids, vai ser um problema. Se for só uma pessoa, vamos forçar a passagem nós quatro juntas."
21160-23 = "......"
21160-24 = "E-Espera um pouco."
21160-25 = "A Hare-senpai mandou uma mensagem."
21160-27 = "'Fujam, não, se escondam! Rápido! Não importa como façam isso $!#^&!@#'"
21160-28 = "Eh, como assim...?"
21160-29 = "O que será que deu na Hare-senpai, que sempre tá calma. Será que apareceu um rato?"
21160-30 = "Alvo em aproximação identificado. Buscando na lista de alunas da Millennium... Alvo compreendido."
21160-31 = "146cm de altura, duas submetralhadoras e uma jaqueta com um dragão bordado sobre uma roupa de maid..."
21160-32 = "Eh...?"
21160-33 = "N... Não pode ser...!?"
21160-35 = "Se escondaam!!"
21160-38 = "Sensei, a sua bunda está de fora!"
21160-39 = "R-Rápido! Depressa!"
21160-43 = "......"
21160-44 = "Hmmm, tá tudo uma zona."
21160-45 = "(É, é, é a Neru-senpai!!)"
21160-46 = "(P-Por quê!? Por que aquela pessoa tá aqui!)"
21160-47 = "Hnn...?"
21160-48 = "Senti que, ouvi uma voz vindo de algum lugar..."
21160-49 = "(!?)"
21160-50 = "(Hiii...!)"
21160-51 = "(......)"
21160-52 = "(Esta pessoa, tem algo de diferente nela...)"
21160-53 = "(Medo... Uma emoção que sinto pela primeira vez...)"
21160-54 = "(Nesta situação atual, a probabilidade de sucesso caso ocorra um combate é... quase de 0%...!)"
21160-56 = "Hmmm..."
21160-57 = "Tem uma presença sim... Embaixo da mesa?"
21160-59 = "(Passos...)"
21160-61 = "(Passos...)"
21160-62 = "(O, o que a gente faz...!)"
21160-63 = "(Desta vez é o fim...!?)"
21160-64 = "(S-Sensei! O que a gente faz!?)"
21160-65 = "(Ela tá bem na nossa frente... Se, se ela olhar pra baixo...!)"
21160-68 = "C-Com licença!"
21160-69 = "Hã?"
21160-71 = "N-Neru-senpai! É uma emergência!"
21160-72 = "(!?)"
21160-73 = "(Y-Yuzu-chan!?)"
21160-74 = "E quem é você...?"
21160-75 = "S-Sou a Yuzuki, da 'Seminar', do Conselho Estudantil."
21160-76 = "Os robôs de combate saíram de controle e agora, tá tudo um caos em todo lugar!"
21160-77 = "A Akane-senpai e a Karin-senpai estão, tentando controlá-los, mas..."
21160-78 = "Que merda, perderam o controle? Eles apreenderam essas coisas há um tempão, e a manutenção ainda não tinha terminado?"
21160-79 = "A-Achei que, dada a situação, precisaríamos de ajuda... Então, como eu ouvi que a senhora estaria aqui..."
21160-80 = "Haa, que saco."
21160-81 = "E-Eu ficarei aqui arrumando a sala. B-Bom, eu tenho medo de lutar... E também, não tenho muita experiência nisso..."
21160-82 = "Não ligo pra nada disso, mas você aí..."
21160-83 = "Lembre-se disso. A coisa mais importante numa batalha, não são armas ou experiência."
21160-84 = "S-Sim...?"
21160-85 = "É ter coragem."
21160-86 = "E nesse ponto, não acho que você não tenha talento para isso."
21160-87 = "Eu sei muito bem como as pessoas me veem por aí. E também sei muito bem que você é bem medrosa. Mesmo assim, falar comigo logo no primeiro encontro desse jeito requer uma boa dose de coragem, concorda?"
21160-88 = "S-S-Sim! M-Muito obrigada!?"
21160-89 = "Até mais, a gente se vê por aí."
21160-91 = "Fuuuuh..."
21160-93 = "(Baque)"
21160-95 = "A-Achei que eu fosse morrer..."
21160-96 = "Yuzuuuuuuu-!!"
21160-97 = "Yuzu-chan, você foi incrível! Graças a você, nós escapamos da morte!"
21160-98 = "A-Ainda bem, que pude ajudar..."
21160-99 = "M-Mais importante que isso, o que a Aris-chan tá segurando agora é..."
21160-102 = "Sim."
21160-103 = "Esta é a nossa nova arma, que salvará a humanidade e o mundo."
21160-104 = "O 'Espelho'!"
21160-105 = "F-Finalmente...!"
21160-106 = "Vamos deixar as comemorações para depois, temos que correr! Se a Neru-senpai voltar, aí sim é que vai ser o fim de verdade!"
21160-107 = "Existem muitos robôs de combate daqui pra frente... Tomem cuidado!"
21160-108 = "Isso mesmo, a missão ainda não acabou!"
21160-109 = "O nosso objetivo não é o 'Espelho'... É a 'G.Bible'! Temos que voltar para a sala da Veritas rápido...!"
21160-110 = "A retaguarda ficará por minha conta. Sensei, dê as ordens!"
21160-113 = "[ns1] \"Vamos todos voltar em segurança para a sala do clube!\"\n[ns2] \"Todos, preparem-se para o combate!\""
21160-116 = "Sim!"
21160-117 = "Com certeza... nós voltaremos em segurança!"
21160-118 = "Aris, iniciando o combate!"