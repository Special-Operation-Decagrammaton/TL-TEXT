[translation]
21160-1 = "Episódio 16; Só mais um passo!"
21160-2 = "Grêmio de Millennium - Depósito de Itens Apreendidos"
21160-5 = "Haa, haa, conseguimos escapar...!?"
21160-6 = "Sensei, Midori, Alice, vocês estão bem!?"
21160-7 = "Meu HP está em um nível aceitável."
21160-8 = "Eu e o Sensei estamos bem."
21160-9 = "Que bom... Mas, então, este é o depósito de itens apreendidos? Está tudo uma bagunça completa."
21160-10 = "Tem vidros quebrados e prateleiras caídas..."
21160-11 = "Será que foram os ricochetes da Karin-senpai...? As consequências da batalha ou das explosões devem ter chegado até aqui."
21160-12 = "A Yuuka deve estar convencida de que a Alice está com o 'Espelho' desde aquela hora... Com certeza ela acha que fugimos para a sala do clube. Ela nunca imaginaria que viemos parar aqui."
21160-13 = "De qualquer forma, se conseguirmos levar o 'Espelho', o Veritas dará um jeito no resto...!"
21160-15 = "Ah, achei! O 'Espelho'! Com isso, finalmente...!"
21160-16 = "Beleza! Vamos, vamos embora logo..."
21160-17 = "...?"
21160-18 = "...Silêncio, por favor, coloquem no mudo."
21160-19 = "Hm?"
21160-21 = "...Alguém está vindo para cá. Pelos passos, imagino que seja apenas uma pessoa."
21160-22 = "Hum... Se ficarmos aqui parados e a Yuuka ou o Maid Club voltarem todos de uma vez, estaremos encrencados. Se for só uma pessoa, acho que podemos passar à força."
21160-23 = "..."
21160-24 = "Es-espera um pouco."
21160-25 = "Recebi uma mensagem da Hare-senpai."
21160-27 = "'Fujam, não, escondam-se! Rápido! Custe o que custar, aí $!#^&!@#'"
21160-28 = "Hã, o que isso significa...?"
21160-29 = "A Hare-senpai, que é sempre tão calma, o que será que aconteceu? Será que apareceu um rato?"
21160-30 = "Alvo detectado, pesquisando no registro de alunos de Millennium... Alvo identificado."
21160-31 = "146cm de altura, duas submetralhadoras, uma jaqueta estilo sukajan com estampa de dragão por cima do uniforme de empregada..."
21160-32 = "Eh...?"
21160-33 = "Não... não pode ser...!?"
21160-35 = "Escondam-se!!"
21160-38 = "Sensei, seu bumbum está aparecendo!"
21160-39 = "R-rápido! Depressa!"
21160-43 = "..."
21160-44 = "Hum, que bagunça total."
21160-45 = "(É, é a Neru-senpai!!)"
21160-46 = "(P-por que!? Por que ela está aqui!)"
21160-47 = "Hmm...?"
21160-48 = "Tive a impressão de ter ouvido uma voz..."
21160-49 = "(!?)"
21160-50 = "(Iiiih...!)"
21160-51 = "(...)"
21160-52 = "(Essa pessoa, tem algo diferente nela...)"
21160-53 = "(Medo... é a primeira vez que sinto isso...)"
21160-54 = "(Nesta situação, se uma batalha começar, a taxa de sucesso é... quase 0%...!)"
21160-56 = "Hum..."
21160-57 = "Realmente senti uma presença... Debaixo da mesa?"
21160-59 = "(Passo...)"
21160-61 = "(Passo...)"
21160-62 = "(O-o que a gente faz...!)"
21160-63 = "(Desta vez é o fim...!?)"
21160-64 = "(S-Sensei! O que a gente faz!?)"
21160-65 = "(Bem na minha frente... se ela olhar para baixo agora...!)"
21160-68 = "A-ah, com licença!"
21160-69 = "Hã?"
21160-71 = "N-Neru-senpai! É uma emergência!"
21160-72 = "(!?)"
21160-73 = "(Y-Yuzu-chan!?)"
21160-74 = "Quem é você...?"
21160-75 = "E-eu sou Yuzuki, do conselho estudantil, o 'Seminário'."
21160-76 = "Um robô de combate entrou em pane e agora está tudo uma bagunça por toda parte!"
21160-77 = "Akane-senpai e Karin-senpai estão tentando contê-lo, mas..."
21160-78 = "O quê? Pane? Faz um tempão que apreenderam aquilo, ainda não terminaram a manutenção?"
21160-79 = "B-bem, achei que precisariam de ajuda com a situação... e ouvi dizer que você estava por aqui..."
21160-80 = "Ah, que seja, não tenho escolha."
21160-81 = "E-eu vou organizar as coisas por aqui. E-é que... eu tenho medo de combate... e não tenho muita experiência..."
21160-82 = "Não me importa nada disso, mas escuta aqui..."
21160-83 = "Guarde bem isso. O mais importante em um combate não é a arma nem a experiência."
21160-84 = "S-sim...?"
21160-85 = "É coragem."
21160-86 = "Nesse ponto, não acho que você não tenha talento."
21160-87 = "Eu sei muito bem o que pensam de mim. E também percebo que você é bem medrosa. Mesmo assim, ter vindo falar comigo logo de primeira... isso exige uma certa coragem."
21160-88 = "S-s-sim! A-ah, muito obrigada!?"
21160-89 = "Até mais, nos vemos por aí."
21160-91 = "Ufa..."
21160-93 = "(Plaft)"
21160-95 = "A-achei que ia morrer..."
21160-96 = "Yuzu-uuuuuu!!"
21160-97 = "Yuzu-chan, você foi incrível! Graças a você, escapamos por pouco!"
21160-98 = "F-foi bom ter conseguido ajudar..."
21160-99 = "M-mas, o que a Alice-chan está segurando agora é..."
21160-102 = "Sim."
21160-103 = "Esta é a nossa nova arma para salvar a humanidade e o mundo."
21160-104 = "O 'Espelho'!"
21160-105 = "Fi-finalmente...!"
21160-106 = "Deixem a comemoração para depois, vamos logo! Se a Neru-senpai voltar, aí sim estaremos perdidas!"
21160-107 = "Tem muitos robôs de combate à frente... tomem cuidado!"
21160-108 = "É verdade, a missão ainda não acabou!"
21160-109 = "Nosso objetivo não é o 'Espelho'... é a 'G.Bible'! Precisamos ir logo para a sala do clube da Veritas...!"
21160-110 = "Eu cuidarei da retaguarda. Sensei, dê as ordens!"
21160-113 = "[ns1] \"Vamos todos voltar para a sala do clube em segurança!\"\n[ns2] \"Todos, preparem-se para o combate!\""
21160-116 = "Sim!"
21160-117 = "Com certeza... vamos voltar em segurança!"
21160-118 = "Alice, iniciando combate!"
