[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21160-1 = "Episódio 16: Falta Só Mais um Passo!"
21160-2 = "Millennium · Conselho · Depósito de Apreensões"
21160-5 = "Hah, hah, conseguimos escapar……!?"
21160-6 = "Sensei, Midori, Aris, tão todas bem!?"
21160-7 = "Os HP estão de sobra."
21160-8 = "Eu e o Sensei, tudo certo."
21160-9 = "Que bom…… aliás, é aqui o depósito de apreensões?\nTá bem destruído, hein."
21160-10 = "Os vidros tão quebrados, as prateleiras caídas……"
21160-11 = "Deve ser ricochete da Karin…… talvez a onda de\nchoque do combate e das explosões tenha\nchegado até aqui."
21160-12 = "A Yuuka, desde aquele momento, já deve estar\nconvencida de que a Aris está com o \"Espelho\"……\nentão com certeza ela acha que a gente fugiu pra\nsala do clube. Nem vai imaginar que viemos pra cá."
21160-13 = "Por ora, se a gente só conseguir levar o \"Espelho\",\no resto a Veritas dá um jeito……!"
21160-15 = "Ah, achei, o \"Espelho\"! Com isto……!"
21160-16 = "Boa! Vamos, bora voltar logo……"
21160-17 = "……?"
21160-18 = "……Quietas, no mudo, por favor."
21160-19 = "Hm?"
21160-21 = "……Alguém está vindo pra cá. Pelo som dos passos,\nprovavelmente é uma pessoa só."
21160-22 = "Hmm…… ficar aqui e a Yuuka ou o Clube das Maids\nvoltarem todos juntos seria ruim; se for só uma\npessoa, a gente rompe na marra, todas juntas."
21160-23 = "……"
21160-24 = "P-peraí um pouco."
21160-25 = "Chegou contato da Hare."
21160-27 = "\"Foge, não, se esconde! Rápido! Custe o que custar,\naí $！#^&！@#\""
21160-28 = "Hã, que história é essa, afinal……?"
21160-29 = "A Hare, sempre tão calma, o que será que deu nela.\nSerá que apareceu um rato?"
21160-30 = "Alvo em aproximação confirmado, buscando na lista\nde alunas da Millennium…… alvo identificado."
21160-31 = "1,46 m de altura, duas SMGs, uma jaqueta sukajan\nde dragão por cima do vestido de maid……"
21160-32 = "Hã……?"
21160-33 = "N-não me diga……!?"
21160-35 = "Se esconde!!"
21160-38 = "Sensei, o seu bumbum tá pra fora!"
21160-39 = "R-rápido! Anda logo!"
21160-43 = "……"
21160-44 = "Hmm, tá tudo um caos já."
21160-45 = "(É a N-N-Neru!!)"
21160-46 = "(P-por quê!? O que aquela pessoa tá fazendo aqui!)"
21160-47 = "Hmm……?"
21160-48 = "Tive a impressão de ouvir uma voz……"
21160-49 = "(!?)"
21160-50 = "(Iii……!)"
21160-51 = "(……)"
21160-52 = "(Essa pessoa, tem algo diferente……)"
21160-53 = "(Medo…… uma emoção inédita……)"
21160-54 = "(A probabilidade de sucesso, caso ocorra combate\nnesta situação agora…… quase 0%……!)"
21160-56 = "Hmm……"
21160-57 = "De fato, tem uma presença ali…… debaixo da mesa?"
21160-59 = "(Tép……)"
21160-61 = "(Tép……)"
21160-62 = "(E-e agora……!)"
21160-63 = "(Dessa vez é o fim……!?)"
21160-64 = "(P-Sensei! E agora!?)"
21160-65 = "(Bem na nossa frente…… se ela der uma espiada……!)"
21160-68 = "E-ei, com licença!"
21160-69 = "Hã?"
21160-71 = "N-Neru! É uma emergência!"
21160-72 = "(!?)"
21160-73 = "(Y-Yuzu!?)"
21160-74 = "Você é……?"
21160-75 = "S-sou a Yuzuki, da \"Seminar\", o Conselho."
21160-76 = "Por causa de um robô de combate que descontrolou,\nagora tá tudo um caos pra todo lado!"
21160-77 = "A Akane e a Karin estão tentando conter, mas……"
21160-78 = "Que é isso, descontrolou? Aquilo ali foi apreendido\nfaz um tempão, e ainda não terminaram a manutenção?"
21160-79 = "P-pela situação, achei que ia precisar de ajuda……\ne aí, como ouvi que você estava aqui……"
21160-80 = "Haah, não tem jeito, né."
21160-81 = "E-eu vou organizar as coisas por aqui.#nÉ que, sabe, combate me dá medo……\ne experiência também, eu não tenho muita……"
21160-82 = "Isso aí pouco importa, mas, mais que isso, você……"
21160-83 = "Guarda bem isto. O mais importante num combate\nnão é arma, nem experiência."
21160-84 = "S-sim……?"
21160-85 = "É a coragem."
21160-86 = "Nesse ponto, eu não acho que você seja sem talento."
21160-87 = "Como as pessoas me veem, isso até eu sei. E que\nvocê é bem medrosa, também dá pra perceber. Mesmo\nassim, vir falar comigo, logo eu, no primeiro encontro,\né coisa que exige uma certa dose de coragem."
21160-88 = "S-s-sim! M-muito obrigada!?"
21160-89 = "Falou, a gente se vê de novo em algum lugar."
21160-91 = "Fuáá……"
21160-93 = "(Desaba)"
21160-95 = "A-achei que ia morrer……"
21160-96 = "Yuzuuuuuu——!!"
21160-97 = "Yuzu, você é demais! Graças a você a gente\nescapou da morte!"
21160-98 = "F-fico feliz de ter sido útil……"
21160-99 = "M-mais importante, isso que a Aris tá segurando\nagora é……"
21160-102 = "Sim."
21160-103 = "Esta é a nossa nova arma, que vai salvar\na humanidade e o mundo."
21160-104 = "O \"Espelho\"!"
21160-105 = "A-até que enfim……!"
21160-106 = "Deixa a comemoração pra depois, bora! Se a Neru\nvoltar, aí sim é o fim da picada!"
21160-107 = "Mais pra frente tem um monte de robô\nde combate…… cuidado!"
21160-108 = "É isso, a missão ainda não acabou!"
21160-109 = "O nosso objetivo não é o \"Espelho\", é a \"G.Bible\"!\nRápido, a gente tem que ir pra sala da Veritas……!"
21160-110 = "A retaguarda fica comigo. Sensei, as ordens!"
21160-113 = "[ns1] \"Vamos todas voltar sãs e salvas pra sala do clube!\"\n[ns2] \"Todas, preparar pra combate!\""
21160-116 = "Sim!"
21160-117 = "A gente vai voltar…… sãs e salvas, com certeza!"
21160-118 = "Aris, vou iniciar o combate!"