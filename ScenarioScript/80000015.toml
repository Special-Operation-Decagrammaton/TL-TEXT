[translation]
80000015-1 = "効率主義者のおやつ"
80000015-2 = "ミレニアムサイエンススクール"
80000015-4 = "（ミレニアムの校内で、ひとりで何かを食べているエイミを見かけた。）"
80000015-5 = "[s] \"おはよう、エイミ。\""
80000015-6 = "あ、おはよう先生。"
80000015-7 = "ちょうど仕事を終えて帰り道だけど……偶然だね。"
80000015-8 = "[s] \"何を食べてるの？\""
80000015-9 = "チョコレート。"
80000015-10 = "任務中は結構カロリーを消費するから……任務が終わった後は、糖分がいっぱい入ったチョコレートを食べるのが効率的なの。"
80000015-16 = "先生も一つ食べる？"
80000015-22 = "[ns] \"このチョコレートはいったい……？\""
80000015-23 = "どうしたの？"
80000015-24 = "そういえば甘いものが好きな子も、なぜかこのチョコレートだけは避けてるんだよね……。"
80000015-25 = "だからなのか売店に行ったら、このチョコレートだけすごい割引されてるのに、たくさん積まれてて……。"
80000015-26 = "[s] \"その、形がちょっと……。\""
80000015-27 = "チョコレートを食べるのに、形が問題なの？"
80000015-28 = "どんな形であれ、中の成分は基本的に同じだよ？"
80000015-29 = "むしろ割引されてるなら、そっちの方を選ぶのは効率的な選択。"
80000015-30 = "はい、先生。このチョコレートたくさん買ったから、先生にもおすそ分けするね。"
80000015-32 = "（その後エイミにもらったチョコレートを持ってシャーレに帰る途中、ヴァルキューレの子に誤解されて質問攻めにあった……。）"
