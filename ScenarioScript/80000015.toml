[translation]
80000015-1 = "O lanche do pragmático"
80000015-2 = "Millennium Science School"
80000015-4 = "（Encontrei a Eimi comendo algo sozinha dentro do campus da Millennium.）"
80000015-5 = "[s] \"Bom dia, Eimi.\""
80000015-6 = "Ah, bom dia, Sensei."
80000015-7 = "Acabei de terminar o trabalho e estou voltando para casa... que coincidência."
80000015-8 = "[s] \"O que você está comendo?\""
80000015-9 = "Chocolate."
80000015-10 = "Eu gasto muitas calorias durante as missões... então, depois que elas terminam, comer um chocolate cheio de açúcar é a forma mais eficiente de repor."
80000015-16 = "Quer um pouco, Sensei?"
80000015-22 = "[ns] \"O que é exatamente esse chocolate...?\""
80000015-23 = "O que houve?"
80000015-24 = "Pensando bem, até as alunas que gostam de doces evitam esse chocolate por algum motivo..."
80000015-25 = "Talvez seja por isso que, quando fui à loja, esse chocolate estava com um desconto enorme e ainda assim tinha pilhas dele..."
80000015-26 = "[s] \"É que, o formato dele é um pouco...\""
80000015-27 = "O formato importa na hora de comer chocolate?"
80000015-28 = "Não importa o formato, os ingredientes são basicamente os mesmos, não são?"
80000015-29 = "Na verdade, se está com desconto, escolher esse é a decisão mais eficiente."
80000015-30 = "Aqui, Sensei. Comprei bastante, então vou dividir com você."
80000015-32 = "（Depois disso, enquanto voltava para o Schale com o chocolate que a Eimi me deu, fui parado por uma aluna da Valkyrie que me encheu de perguntas por causa de um mal-entendido...）"
