[translation]
901010800330-7 = "Primeiro, os documentos encontrados na entrada do depósito..."
901010800330-8 = "Era um manual de segurança comum, mas tinha uma instrução estranha."
901010800330-9 = "'Uma vez por semana, o plantonista deve dar uma volta no porto rolando um tambor à meia-noite.'"
901010800330-10 = "Antes de entrar no depósito, eu vi uns caras rolando tambor."
901010800330-11 = "O que será que os líderes da Família Carpaccio estavam pensando com essa instrução?"
901010800330-12 = "O exemplo mais parecido que eu conheço..."
901010800330-13 = "Em Odisseia, rolavam projéteis no convés à noite em protesto contra o conselho estudantil."
901010800330-14 = "Talvez seja algo parecido?"
901010800330-15 = "Protesto ou intimidação? Contra quem?"
901010800330-16 = "Rolar tambor num porto vazio de madrugada, quem é que vai ver?"
901010800330-18 = "Mas se uma única pessoa ver, o boato se espalha rapidinho."
901010800330-19 = "Então o objetivo era criar um boato..."
901010800330-20 = "Então o motivo de a Família Carpaccio rolar tambor de madrugada é –"
901010800330-28 = "Então o motivo de a Família Carpaccio rolar tambor de madrugada é –\n[as1] Para transportar coisas para outro lugar.\n[as2] Para treinar os membros.\n[as3] Para espalhar o boato sobre o tambor."
901010800330-29 = "Não, a instrução era só para rolar, não para levar para outro lugar."
901010800330-30 = "E se fosse pra transportar, precisava ser de madrugada?"
901010800330-31 = "Pense mais um pouco."
901010800330-40 = "É verdade que rolar tambor pesado dá um exercício, mas..."
901010800330-41 = "Se fosse para treinar, não usariam equipamento adequado?"
901010800330-42 = "E rolar tambor enferrujado pode machucar, é perigoso."
901010800330-49 = "Isso mesmo. Exatamente, o boato do 'Caranguejo do Tambor'."
901010800330-50 = "Mesmo de madrugada, se você fizer barulho rolando tambor, alguém vai ver."
901010800330-51 = "No contexto atual, com os boatos do Caranguejo do Tambor circulando no Porto Kanezaki, se alguém ver um membro da Família Carpaccio rolando tambor de madrugada... o que as pessoas vão pensar?"
901010800330-52 = "'A Família Carpaccio está transportando o caranguejo monstro.'"
901010800330-53 = "Com essa imagem, os negócios deles não vão sofrer?"
901010800330-54 = "Eu, hein, não quero nem chegar perto desse povo."
901010800330-55 = "Uma pessoa normal pensaria assim."
901010800330-56 = "Mas para uma organização que atua na fronteira da agiotagem, isso pode ser conveniente."
901010800330-57 = "Ah... tipo marcar o tanque de guerra?"
901010800330-58 = "Mas nesse caso não houve vítimas."