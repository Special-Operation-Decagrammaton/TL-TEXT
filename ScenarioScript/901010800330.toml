[translation]#[Texto Final. - Filipe 05/07.]
901010800330-7 = "Primeiro, os documentos que encontramos na entrada do armazém……"
901010800330-8 = "Era um manual de segurança comum, mas tinha uma instrução estranha."
901010800330-9 = "'Uma vez por semana, o plantão noturno deve dar uma volta no porto rolando um tambor à meia-noite'"
901010800330-10 = "De fato, antes de entrarmos no armazém, vimos membros rolando tambor."
901010800330-11 = "O que a liderança da Família Carpaccio pretendia com isso?"
901010800330-12 = "O caso mais parecido que conheço é……"
901010800330-13 = "Em Odysseia, rolavam projéteis no convés à noite como protesto contra o conselho estudantil."
901010800330-14 = "Será que aqui é algo parecido?"
901010800330-15 = "Protesto ou intimidação? Mas contra quem?"
901010800330-16 = "E, num porto vazio de madrugada, rolar tambor…… quase ninguém vê."
901010800330-18 = "Mas se uma pessoa vê, o boato se espalha rápido."
901010800330-19 = "Então o objetivo seria justamente criar boato?"
901010800330-20 = "Então, o motivo de a Família Carpaccio rolar tambor de madrugada é――"
901010800330-28 = "Então, o motivo de a Família Carpaccio rolar tambor de madrugada é――\n[as1] Para transportar objetos.\n[as2] Para treinar os membros.\n[as3] Para espalhar o boato do tambor."
901010800330-29 = "Não, a instrução não era pra levar o tambor pra lugar nenhum, só rolar."
901010800330-30 = "E se fosse transporte, precisava ser de madrugada?"
901010800330-31 = "Pensa melhor."
901010800330-40 = "É, rolar tambor pesado dá um exercício, mas……"
901010800330-41 = "Se o objetivo é treino, não seria melhor usar equipamento de academia?"
901010800330-42 = "E um tambor enferrujado pode machucar."
901010800330-49 = "É. Mais precisamente, pra espalhar o boato do 'Caranguejo do Tambor'."
901010800330-50 = "Mesmo de madrugada, rolar tambor fazendo barulho vai chamar atenção de alguém."
901010800330-51 = "Com o boato do Caranguejo do Tambor se espalhando pelo porto de Kanezaki, se alguém vir os membros da Família Carpaccio rolando tambor de madrugada…… é fácil imaginar o que vão pensar."
901010800330-52 = "'A Família Carpaccio está transportando um caranguejo monstro'"
901010800330-53 = "Mas criar essa imagem não atrapalharia os negócios?"
901010800330-54 = "Eu não ia querer me envolver com gente assim……"
901010800330-55 = "Uma pessoa normal pensaria assim."
901010800330-56 = "Mas pra uma organização que opera na linha da agiotagem, isso é até vantajoso."
901010800330-57 = "Ah…… tipo marcar tanque?"
901010800330-58 = "Só que nesse caso não houve vítimas."