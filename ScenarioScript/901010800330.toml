[translation]
901010800330-7 = "First, the documents I found at the warehouse entrance were..."
901010800330-8 = "They were just standard security manuals, but there was one strange entry."
901010800330-9 = "“Once a week, the night watchman must roll a drum can around the harbor at midnight.”"
901010800330-10 = "I actually saw a member rolling a drum can before we entered the warehouse."
901010800330-11 = "I wonder what the Carpaccio Family executives were thinking when they gave that order?"
901010800330-12 = "The most similar case I know of is..."
901010800330-13 = "Apparently, at Odyssey, they used to roll artillery shells across the deck at night as a protest against the student council."
901010800330-14 = "Couldn't this have a similar purpose?"
901010800330-15 = "A protest or intimidation? Directed at whom?"
901010800330-16 = "Besides, even if you roll a drum can through a deserted harbor at night, there's hardly anyone around to see it..."
901010800330-18 = "But if even one person sees it, the rumor would spread in no time."
901010800330-19 = "So the goal was to start a rumor, then..."
901010800330-20 = "Then, the reason the Carpaccio Family was rolling drum cans at night is—"
901010800330-28 = "Then, the reason the Carpaccio Family was rolling drum cans at night is—\n[as1] To transport goods to another location.\n[as2] To train their members.\n[as3] To spread rumors about the drum cans."
901010800330-29 = "No, the instructions were just to roll them, not to transport them anywhere, right?"
901010800330-30 = "And if the goal was to transport goods, why do it in the middle of the night?"
901010800330-31 = "Think about it a bit more."
901010800330-40 = "Sure, rolling heavy drum cans is a workout, but..."
901010800330-41 = "If training was the goal, wouldn't they use proper gym equipment?"
901010800330-42 = "Plus, it's dangerous to get injured on a rusty drum can."
901010800330-49 = "Exactly. To be precise, rumors about the 'Drum Can Crab'."
901010800330-50 = "Even in the middle of the night, if you make a racket rolling a drum can, someone is bound to notice."
901010800330-51 = "With rumors of the Drum Can Crab spreading around Kanezaki Harbor lately, if people saw Carpaccio Family members rolling drum cans at night... it's easy to imagine what they'd think, right?"
901010800330-52 = "“The Carpaccio Family is transporting a monster crab.”"
901010800330-53 = "If that image sticks, wouldn't it get in the way of their business?"
901010800330-54 = "I wouldn't want to get involved with people like that..."
901010800330-55 = "Most people wouldn't."
901010800330-56 = "But for an organization that operates like a loan shark, maybe that's actually convenient?"
901010800330-57 = "Ah... like carving kill marks onto a tank?"
901010800330-58 = "Though no one was actually a victim in this incident."