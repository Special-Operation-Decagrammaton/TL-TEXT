[translation]
90101070-1 = "Episode 7: Public Notice of Periodic Bidding"
90101070-2 = "Kanezaki Port, Akita Fisheries"
90101070-5 = "Welcome!"
90101070-6 = "Hmm? And who might you be, young lady—"
90101070-11 = "Hello. Thank you for your continued business."
90101070-12 = "It's a bit early, but... are you open yet?"
90101070-13 = "Aye. I just opened up, but..."
90101070-14 = "If the delivery girl is here, does that mean an order came in from somewhere?"
90101070-15 = "No, I thought I'd have a meal here today."
90101070-16 = "Hehe, I brought some friends along, too."
90101070-23 = "Is this the place Niko was talking about?"
90101070-24 = "It doesn't look that different from the other shops around here."
90101070-25 = "There isn't a single smudge on the fish tank. The stove is clean, too. They really care about hygiene."
90101070-26 = "I don't think we need to worry about the freshness of the fish."
90101070-27 = "Oh, well now, that's music to my ears!"
90101070-28 = "I don't have many menu items that would appeal to young students, but I can whip something up quickly. Order whatever you like!"
90101070-29 = "Ah, except for the fried food on the back of the menu. The ingredients haven't arrived yet."
90101070-30 = "[ns] \"I was looking forward to the fried horse mackerel... what a shame.\""
90101070-31 = "And... who are you?"
90101070-32 = "Walking around the port with a bunch of schoolgirls first thing in the morning... you look a bit suspicious."
90101070-33 = "[s1] \"I am their guardian—\"\n[s2] \"And... sort of like Niko's employer!\""
90101070-36 = "Ah, the boss of that 'Fox Delivery' outfit! My apologies!"
90101070-37 = "Your delivery staff has been a big help to us."
90101070-38 = "They always anticipate what we need and bring us business proposals. They're quite the go-getters."
90101070-39 = "[s3] \"You have a keen eye.\"\n[s4] \"All of my students are excellent.\""
90101070-42 = "Why are you acting so proud...?"
90101070-43 = "Direct compliments really work, don't they?"
90101070-44 = "Niko's ears are turning bright red."
90101070-45 = "Se-Sensei! Let's hurry and decide! Please, just pick something and order!"
90101070-50 = "[ns5] \"W-well then...\"\n[ns6] \"Five 'Whimsical Seafood Bowls', please!\""
90101070-53 = "Five 'Whimsical Seafood Bowls'. Coming right up!"
90101070-62 = "This... why is it called a 'Whimsical Seafood Bowl'?"
90101070-63 = "Because the toppings aren't set in stone."
90101070-64 = "Seafood bowls at a place like this are made from the scraps of sashimi or smaller fish."
90101070-65 = "The contents change depending on what fish comes in that day. #nIt's called 'whimsical' because it's decided by the owner's mood."
90101070-66 = "It's the cheapest option, and some customers order it just to test their luck."
90101070-67 = "Wait, does that mean there's a chance it could just be a mountain of horse mackerel sashimi?"
90101070-68 = "Kurumi hasn't seen the dark side of society yet. #nIt's not guaranteed to be 'just sashimi'."
90101070-69 = "There's a chance it could come with imitation crab or canned tuna to balance the cost."
90101070-70 = "Can you even call that a seafood bowl!?"
90101070-71 = "A tuna mayo bowl doesn't taste bad, either. Though the high calorie count is a drawback."
90101070-76 = "Here you go, five 'Whimsical Seafood Bowls'!"
90101070-77 = "This is..."
90101070-78 = "Um, is there a mistake?"
90101070-79 = "Did this get swapped with another customer's tuna bowl...?"
90101070-80 = "What are you talking about? This is the first order of the day."
90101070-81 = "I slipped up while filleting the tuna this morning. #nJust ended up with more scraps than I expected."
90101070-82 = "...It's not like this happens every day. Don't go expecting it every time."
90101070-87 = "Hehe, we're lucky today."
90101070-88 = "Well then, let's dig in!"
90101070-94 = "Th-this taste...!"
90101070-95 = "[s] \"Can you tell what it is!?\""
90101070-96 = "No, I'm not really sure."
90101070-97 = "But this tuna... it seems like a high-quality cut. It tastes expensive!"
90101070-98 = "I'm not an expert either, but... I can tell this is definitely good tuna."
90101070-99 = "It's so fatty, it feels like it's melting in my mouth—"
90101070-100 = "Could it be...! #nIs this what they call 'Otoro' (fatty tuna)? I've never had it before, so I don't know."
90101070-101 = "The soy sauce glaze on it is delicious, too."
90101070-102 = "There's a faint scent of yuzu... the acidity doesn't overpower the fish, and it goes well with the other ingredients."
90101070-103 = "Indeed. The flavor is well-balanced."
90101070-104 = "It seems quite elaborate for something called 'whimsical'."
90101070-105 = "Hehe, it makes me happy to see you all eating so heartily."
90101070-106 = "I'm confident in my other menu items, too. Come back and try something else next time."
90101070-110 = "...Though that's assuming this shop is still here next month."
90101070-114 = "Is this shop going to close?"
90101070-115 = "No, nothing's been decided yet."
90101070-116 = "But, the shops inside Kanezaki Port are required to renew their contracts through periodic bidding."
90101070-117 = "The location is great and there's a lot of foot traffic. The competition is fierce. #nThe next bidding is coming up soon, and business has been slow lately."
90101070-118 = "I was debating giving up, but... you girls gave me a boost. #nI've decided to give it another shot next month."
90101070-119 = "That's good to hear."
90101070-123 = "...Well, the Carpaccio Family seems to have it worse than us, though."
90101070-124 = "They got hit pretty hard recently, didn't they? #nI'm sure people are going to start popping up, aiming for the port's 'security' contract in the next round of bidding..."
90101070-125 = "...The next bidding, you say?"
90101070-126 = "...I messed up."
90101070-127 = "My bad. Just pretend you didn't hear that."
90101070-128 = "If they find out I was badmouthing the Carpaccio Family, they won't leave this shop alone..."
90101070-129 = "No, that's not it—"
90101070-130 = "Is the security work handled by the Carpaccio Family also obtained through the bidding process?"
90101070-131 = "Aye. Most of the work at Kanezaki Port is decided by the General Student Council's bidding."
90101070-132 = "But until now, no one dared to step into the competition. #nThey were too afraid of the Carpaccio Family's retaliation."
90101070-133 = "But after the recent conflict, everyone knows they're 'toothless tigers' now. #nI'm sure there will be people willing to try their luck."
90101070-134 = "Oh man, I can't keep my mouth shut. What is wrong with me..."
90101070-139 = "[ns] \"...Yukino.\""
90101070-140 = "Yes."
90101070-141 = "If the Carpaccio Family is concerned about their public image."
90101070-142 = "Then they have plenty of motive to spread 'fear'."
90101070-146 = "Thank you for the meal!"
90101070-147 = "You don't have to eat so fast—"
90101070-148 = "We just remembered we have an urgent errand to run."
90101070-149 = "We'll be back!"
90101070-155 = "...No way."
90101070-156 = "Those girls... they aren't affiliated with the Carpaccio Family, are they...?"
90101070-158 = "Next Episode: The Secret of the Carpaccio Family"