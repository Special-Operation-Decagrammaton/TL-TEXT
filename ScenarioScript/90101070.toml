[translation]
90101070-1 = "Episódio 7; Aviso de Leilão Regular"
90101070-2 = "Porto Kanezaki, Peixaria Akita"
90101070-5 = "Sejam bem-vindos!"
90101070-6 = "Hã? Se não é a nossa"
90101070-11 = "Olá. É sempre um prazer ver o senhor."
90101070-12 = "Pode ser um pouco cedo... mas a peixaria já abriu?"
90101070-13 = "Sim. Acabei de abrir as portas, na verdade..."
90101070-14 = "Você aparecer por aqui, menina das entregas... quer dizer que algum pedido rolou em algum lugar?"
90101070-15 = "Não, hoje nós viemos apenas almoçar."
90101070-16 = "Hehe, e eu trouxe algumas amigas, como pode ver."
90101070-23 = "É aqui que a Niko disse que vinha?"
90101070-24 = "Numa primeira olhada, não parece muito diferente das outras lojas por perto."
90101070-25 = "Os tanques de água estão sem nenhuma manchinha. Além disso, as grelhas tão num brinco de limpo. Eles claramente dão uma atenção muito grande à higiene."
90101070-26 = "Nesse caso, a gente nem precisa esquentar a cabeça com o quão fresco o peixe tá."
90101070-27 = "Olha só, mas que alegria ter vocês por aqui!"
90101070-28 = "A gente não tem muitos pratos que um bando de alunas mais jovens curtiriam, mas é rápido pra preparar qualquer coisa da casa. Fiquem à vontade pra pedir o que quiserem!"
90101070-29 = "Ah, só ignora as frituras da parte de trás do cardápio. Os ingredientes ainda não deram as caras por aqui."
90101070-30 = "[ns] \"Eu tava crente que ia comer peixe frito... Que pena.\""
90101070-31 = "E... quem é você?"
90101070-32 = "É no mínimo estranho ver um marmanjo passeando pelo porto rodeado de alunas logo de manhã."
90101070-33 = "[s1] \"Eu sou quem as protege\"\n[s2] \"E sou o chefe da Niko... tipo isso!\""
90101070-36 = "Ah, então você é o presidente da \"Fox Delivery\" ou sei lá qual o nome! Peço desculpas pela falta de modos!"
90101070-37 = "A sua entregadora aí já salvou a nossa pele várias vezes."
90101070-38 = "Ela se antecipa com os nossos B.O.s e vem já com a solução. Ela é uma pessoa de negócios nata, sem caô."
90101070-39 = "[s3] \"O senhor tem um olho muito bom. \"\n[s4] \"Todas as alunas aqui presentes são excelentes no que fazem.\""
90101070-42 = "Como ele consegue soltar uma dessa num ar de orgulhoso...?"
90101070-43 = "Um elogio na lata é batata, né?"
90101070-44 = "As orelhinhas da Niko tão vermelhinhas, olha."
90101070-45 = "S-Sensei! Bora decidir logo! Pode escolher por mim e fazer os pedidos já!"
90101070-50 = "[ns5] \"B-Bom, nesse caso...\"\n[ns6] \"Pode me ver 5 'Tigelas de Frutos do Mar Aleatórias'!\""
90101070-53 = "5 Tigelas de Frutos do Mar Aleatórias saindo pra já!"
90101070-62 = "Mas fala aí... por que \"Tigela de Frutos do Mar Aleatórias\"? Tem algum motivo?"
90101070-63 = "Pois a gente não fixa os ingredientes que vem nela."
90101070-64 = "Num restaurante como o nosso, essas tigelas são feitas de sobras de sashimi, um peixinho vagabundo, essas paradas..."
90101070-65 = "Então o que vem nela varia de dia pra dia dependendo do que for fisgado. Como o prato é definido de acordo com o meu humor, nós a batizamos de \"Aleatória\"."
90101070-66 = "Mas ó, é a mais barata do menu, e tem uns clientes que pedem isso de propósito pra ver se a sorte sorri pra eles."
90101070-67 = "Espera aí, então a gente pode acabar ganhando só um monte de sashimi de peixe, e só?"
90101070-68 = "Kurumi, você ainda não conhece as bizarrices da sociedade. Ninguém disse que tem garantia de vir \"só sashimi\", né?"
90101070-69 = "Pode ser que seja entupido de carne de caranguejo imitação ou atum enlatado só pro custo caber no bolso."
90101070-70 = "Cê pode chamar uma lixeira dessas de prato de frutos do mar?!"
90101070-71 = "Um prato de atum e maionese pode ser aceitável. Embora o seu alto grau de calorias seja uma infelicidade pra contar."
90101070-76 = "Aí, peguei. 5 Tigelas de Frutos do Mar Aleatória!"
90101070-77 = "Isso é..."
90101070-78 = "Com licença, o senhor não acabou trocando os pratos?"
90101070-79 = "Digo... não teria se confundido com os pratos de atum de outro cliente?"
90101070-80 = "Do que cês tão falando? Esse é o primeiro pedido que me fizeram hoje."
90101070-81 = "É que eu acabei deslizando a faca sem querer enquanto tava fatiando uns atuns hoje mais cedo. Aí sobrou mais restos do que eu esperava, só isso."
90101070-82 = "...Não é sempre que rola isso, tá. Então não venham me cobrar essa montoeira toda vez."
90101070-87 = "Hehe, é o nosso dia de sorte."
90101070-88 = "Então, hora de bater um rango!"
90101070-94 = "E-Esse sabor é...?!"
90101070-95 = "[s] \"Dá pra perceber alguma coisa diferente?!\""
90101070-96 = "Não, eu não faço ideia do que eu comi..."
90101070-97 = "Contudo, parece vir de alguma parte nobre do atum. O gosto remete uma coisa bem cara!"
90101070-98 = "Eu também não entendo, mas... é certeza que é atum da melhor qualidade."
90101070-99 = "Tinha o balanço perfeito de gordura, quase que a carne derreteu de vez quando entrou na minha boca――"
90101070-100 = "Peraí...! Isso por acaso... é aquele tal de \"Otoro\"?! É a primeira vez que experimento..."
90101070-101 = "A calda de molho de soja que ele passou também é maravilhosa."
90101070-102 = "Dá pra sentir um toque meio sútil de yuzu nela... a acidez não emparelha com o sabor do peixe, é uma sinergia ideal com o resto do prato."
90101070-103 = "Sim. O balanço é sem igual."
90101070-104 = "É difícil acreditar que ele serviu uma perfeição dessa assim aleatoriamente, com tanta dedicação aparente da parte dele."
90101070-105 = "Hehe, é uma satisfação enorme ver vocês saboreando tudo isso."
90101070-106 = "Os outros pratos também são ótimos. Apareçam outro dia pra pedir um deles."
90101070-110 = "...Isso se a peixaria estiver aqui mês que vem."
90101070-114 = "Você vai fechar as portas?"
90101070-115 = "Não, ainda não tem nada na pedra."
90101070-116 = "A parada é que a gente precisa renovar as nossas vagas num leilão periodicamente se a gente quiser continuar no Porto Kanezaki."
90101070-117 = "E não tem nem lugar melhor que o porto, já que aqui lota de pessoas de montão. A concorrência é acirrada que só a peste. E o próximo leilão tá aí dobrando a esquina, mas a nossa peixaria quase não andou tendo movimento ultimamente."
90101070-118 = "Eu tava na dúvida em entregar as rédeas no próximo leilão, sabe... mas cês me preencheram de determinação agorinha mesmo. Vou botar as mãos na massa pra pegar a minha vaga de novo mês que vem."
90101070-119 = "Fico feliz em ouvir."
90101070-123 = "...Sabe, quem deve tá mais na lama que a gente é a tal Família Carpaccio lá."
90101070-124 = "Eles não levaram uma bela de uma surra naqueles dias? Acho que, de agora em diante, uma manada de babuínos vai tentar morder as vagas das \"Patrulhas Terrestres\" no leilão que vai rolar..."
90101070-125 = "...Próximo leilão?"
90101070-126 = "...Eita, escapou da boca."
90101070-127 = "Gente, mals aí, podem fingir que não escutaram o que eu falei agora pouco?"
90101070-128 = "A gente estaria lascado sem precedentes se eles sonharem que eu espalhei por aí o estrago na reputação da Família Carpaccio..."
90101070-129 = "Não é sobre isso"
90101070-130 = "Me diga, por acaso a Família Carpaccio também garantiu o monopólio da jurisdição sobre as patrulhas por esse leilão?"
90101070-131 = "Sim, praticamente tudo é decidido pela Federação nesses leilões deles no Porto Kanezaki."
90101070-132 = "Mas o esquema era, as pessoas tinham receio demais pra sequer peitarem a Família. Já que, né, sofrer a retaliação deles e tudo o mais."
90101070-133 = "Mas graças a essa guerra deles aí, tá todo mundo com a percepção deles lá embaixo. Todos os chamando de \"o tigre sem dentes\" e esses negócios. Isso deve animar uns malucos pra tomar a vaga lá no porto."
90101070-134 = "Droga, lá vai eu falando mais do que a boca deixa de novo. Pra que eu fui fazer isso..."
90101070-139 = "[ns] \"...Yukino.\""
90101070-140 = "Sim."
90101070-141 = "Se for verídico o fato de que a Família Carpaccio estiver importando demais com a sua reputação em público."
90101070-142 = "Temos o motivo perfeito pra espalhar o \"Medo\" aos cantos."
90101070-146 = "Obrigada pela comida!"
90101070-147 = "Cês não precisam ser apressadinhas em mandar tudo pra de..."
90101070-148 = "Acabamos de lembrar de um recado pendente que a gente tinha esquecido."
90101070-149 = "A gente volta logo logo~"
90101070-155 = "...Pera aí."
90101070-156 = "Elas não devem ser gente da Família Carpaccio disfarçadas, não é...?"
90101070-158 = "No próximo episódio: Os Segredos da Família Carpaccio"