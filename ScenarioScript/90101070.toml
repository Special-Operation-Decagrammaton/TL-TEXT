[translation]#[Texto Final. - Filipe 05/07.]
90101070-1 = "Episódio 7: Edital de Licitação Periódica"
90101070-2 = "Porto de Kanezaki - \"Pescados Akita\""
90101070-5 = "Bem-vindooos!"
90101070-6 = "Uhn? A mocinha ali é――"
90101070-11 = "Bom dia. Obrigada por sempre cuidar\nda gente."
90101070-12 = "Ainda é cedo, mas…… já está aberto?"
90101070-13 = "Tô. Acabei de abrir agorinha……"
90101070-14 = "Se a mocinha das entregas apareceu,\né porque pintou pedido de algum lugar?"
90101070-15 = "Não, hoje viemos comer aqui mesmo."
90101070-16 = "Fufu, e eu trouxe os amigos!"
90101070-23 = "É aqui a loja que a Niko falou?"
90101070-24 = "De aparência, nem difere muito\ndas do lado."
90101070-25 = "Nenhuma mancha no aquário. E a boca do\nfogão está limpa. Higiene levada a sério."
90101070-26 = "Assim, nem o frescor do peixe preocupa."
90101070-27 = "Opa, que é isso, vou até me gabar!"
90101070-28 = "Não tenho muito prato que agrade menina\nnova, mas sai rápido. Peçam o que quiserem!"
90101070-29 = "Ah, só as frituras do verso do cardápio que\nnão. O ingrediente ainda não chegou."
90101070-30 = "[ns] \"E eu de olho no carapau empanado…… que pena.\""
90101070-31 = "E…… você aí?"
90101070-32 = "Rondando o porto de manhã cedo com um bando\nde alunas…… meio suspeito, hein."
90101070-33 = "[s1] \"Sou o responsável por essas meninas e――\"\n[s2] \"o patrão da Niko…… algo assim!\""
90101070-36 = "Aah, o chefão da \"Entregas da Raposa\", ou\nsei lá o quê! Perdão, perdão!"
90101070-37 = "A entregadora de vocês vive me quebrando\nuns galhos."
90101070-38 = "Ela se antecipa ao problema e já chega\ncom proposta de negócio. Talento puro."
90101070-39 = "[s3] \"O senhor tem bom olho.\"\n[s4] \"Nossas alunas são todas excelentes.\""
90101070-42 = "Por que é que VOCÊ tá todo orgulhoso……"
90101070-43 = "Elogio na lata funciona, né~"
90101070-44 = "As orelhas da Niko tão vermelhinhas."
90101070-45 = "S-Sensei! Vamos logo! Escolhe aí\ne faz o pedido!"
90101070-50 = "[ns5] \"E-Então……\"\n[ns6] \"Cinco 'Kaisendon Surpresa', por favor!\""
90101070-53 = "Cinco \"Kaisendon Surpresa\". É pra já!"
90101070-62 = "Esse…… \"Kaisendon Surpresa\", por que\nesse nome?"
90101070-63 = "Ora, porque o recheio não é fixo."
90101070-64 = "Kaisendon de loja como a minha se faz com\nsobra de sashimi e peixe miúdo."
90101070-65 = "Aí o recheio muda conforme o peixe do dia.#nComo depende do humor do dono,\né \"surpresa\"."
90101070-66 = "Em troca, é o mais barato. Tem cliente que\npede de propósito, pra testar a sorte."
90101070-67 = "Quê? Então pode vir só uma montanha\nde sashimi de carapau?"
90101070-68 = "A Kurumi ainda não conhece o lado sombrio\nda sociedade, né~#nNão tá garantido nem que venha\nsó sashimi."
90101070-69 = "Pra fechar o preço, pode vir kani kama\ne até atum de latinha por cima."
90101070-70 = "E pode chamar isso de kaisendon?!"
90101070-71 = "Tigela de atum com maionese não é ruim.\nO defeito é o tanto de caloria."
90101070-76 = "Aqui, ó: cinco \"Kaisendon Surpresa\"!"
90101070-77 = "Isto é……"
90101070-78 = "Moço, não veio errado?"
90101070-79 = "Tipo, trocado com a tigela de atum\nde outro cliente……"
90101070-80 = "Que conversa. É o primeiro pedido do dia!"
90101070-81 = "Hoje cedo, cortando um atum, minha mão\nescorregou.#nSobrou mais apara nobre do que\neu esperava, só isso."
90101070-82 = "……Não é todo dia que sai assim.\nNão criem expectativa."
90101070-87 = "Fufu, hoje é nosso dia de sorte."
90101070-88 = "Então, bom apetite!"
90101070-94 = "E-Esse sabor é……?!"
90101070-95 = "[s] \"Você sabe o que é?!\""
90101070-96 = "Não, não faço ideia."
90101070-97 = "Mas esse atum…… parece corte caro.\nTem gosto de coisa cara!"
90101070-98 = "Também não entendo, mas…… esse é um atum\nbom com certeza."
90101070-99 = "Cheio de gordurinha, derrete na boca――"
90101070-100 = "Não me diga……!#nIsso é o famoso \"ootoro\"?! Nunca comi,\nentão não sei dizer."
90101070-101 = "O molho de shoyu por cima também tá\numa delícia."
90101070-102 = "Tem um aroma suave de yuzu…… a acidez não\natrapalha o peixe e casa com o resto."
90101070-103 = "Sim. O equilíbrio dos sabores está correto."
90101070-104 = "Para um prato \"surpresa\", parece\nbem elaborado."
90101070-105 = "Hehe, dá gosto ver vocês comendo\ntão bem!"
90101070-106 = "O resto do cardápio também é garantido.\nVoltem pra provar outros pratos!"
90101070-110 = "……Isso, claro, se a loja ainda existir\nmês que vem."
90101070-114 = "A loja vai fechar?"
90101070-115 = "Não, nada decidido ainda."
90101070-116 = "Mas as lojas dentro do porto de Kanezaki\nprecisam renovar o contrato em\nlicitação periódica."
90101070-117 = "A localização é ótima e passa muita gente:\na concorrência é de matar.#nA próxima licitação tá chegando, e\nultimamente a clientela caiu."
90101070-118 = "Eu tava pensando em desistir da próxima……\nmas vocês me deram ânimo, mocinhas.#nMês que vem eu vou tentar de novo."
90101070-119 = "Fico feliz em ouvir isso."
90101070-123 = "……Bom, quem tá pior que eu é a\nFamília Carpaccio."
90101070-124 = "Eles apanharam feio outro dia, né?#nNa próxima licitação vai brotar gente\nquerendo a vaga da \"segurança\" do porto……"
90101070-125 = "……Próxima licitação?"
90101070-126 = "……Falei demais."
90101070-127 = "Foi mal. Finge que não ouviu nada."
90101070-128 = "Se descobrem que eu falei mal dos\nCarpaccio, eles não deixam\na loja em paz……"
90101070-129 = "Não, não é isso――"
90101070-130 = "O serviço de segurança da Família Carpaccio\ntambém passa por licitação?"
90101070-131 = "Sim. A maioria dos serviços do porto de\nKanezaki é decidida em licitação\ndo Conselho Estudantil Geral."
90101070-132 = "Só que, até hoje, ninguém ousava competir.#nMedo da vingança dos Carpaccio."
90101070-133 = "Mas, com a briga recente, se espalhou que\neles viraram \"tigre sem presas\".#nVai aparecer gente disposta a tentar."
90101070-134 = "Ah, droga, essa língua solta.\nLogo eu……"
90101070-139 = "[ns] \"……Yukino.\""
90101070-140 = "Sim."
90101070-141 = "Se a Família Carpaccio se preocupa\ncom a imagem externa……"
90101070-142 = "há motivo de sobra pra semear o \"medo\"."
90101070-146 = "Obrigada pela comida!"
90101070-147 = "Ei, não precisa comer nessa pressa――"
90101070-148 = "Lembramos de um compromisso urgente."
90101070-149 = "A gente volta~"
90101070-155 = "……Peraí."
90101070-156 = "Aquelas meninas…… não eram ligadas\naos Carpaccio, eram……?"
90101070-158 = "Próximo Episódio: O Segredo da Família Carpaccio"
