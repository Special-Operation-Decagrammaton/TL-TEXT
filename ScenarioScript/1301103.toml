[translation]
1301103-1 = "Condições para um bom roteiro"
1301103-2 = "Departamento de Desenvolvimento de Jogos do Millennium"
1301103-3 = "＜Gamemaniac：O roteiro é realmente tão importante assim em jogos retrô?＞"
1301103-4 = "＜Waga-mama：Não, o roteiro é muito antigo, isso não cola nos dias de hoje＞"
1301103-5 = "＜ikusa007：O que aconteceu com a heroína?＞"
1301103-6 = "＜tensaiko：Sem nenhuma reviravolta no final? Acho que até eu escreveria algo melhor que isso＞"
1301103-7 = "[s] \"……O que é isso?\""
1301103-8 = "Tem um monte de gente que não entende nada fazendo barulho!"
1301103-9 = "[s] \"Como assim……?\""
1301103-10 = "Explicando desde o começo,"
1301103-11 = "Ultimamente, com a moda do financiamento coletivo, vários jogos retrô começaram a ser produzidos."
1301103-12 = "Pessoalmente, eu até queria apoiar esse movimento."
1301103-13 = "Eu realmente quero que as pessoas que aceitam esse desafio se esforcem ao máximo."
1301103-14 = "Olha só isso!"
1301103-15 = "Todo mundo só fica falando mal dos novos jogos estilo retrô assim!"
1301103-16 = "[s] \"Não seria melhor simplesmente não pesquisar sobre isso……?\""
1301103-17 = "I-isso é, é que eu acabei vendo por acaso……."
1301103-18 = "Sabe, quando tem comida estragada há meses, a gente não acaba dando uma olhadinha antes de jogar fora……?"
1301103-19 = "E-e além disso, não é como se eu tivesse pesquisado porque quis!"
1301103-20 = "É só uma parte da pesquisa de mercado, sabe……."
1301103-21 = "Mas não é isso! Esse pessoal só fala um monte de besteira!"
1301103-22 = "Dizem coisas como: 'Já que é um jogo retrô, o roteiro não é importante'."
1301103-23 = "Ou: 'Por que a heroína desaparece no meio do jogo?!'"
1301103-24 = "Ou: 'Fiquei decepcionado porque não teve nenhuma reviravolta!'"
1301103-25 = "[s] \"Hmm…….\""
1301103-26 = "Pra começar, os critérios de avaliação deles são superficiais!"
1301103-27 = "Se for assim, então o roteiro do herói que parte em uma jornada para derrotar o rei demônio é cafona por ser clichê?"
1301103-28 = "É possível que não seja permitido seguir o padrão, e que seja obrigatório ter uma surpresa ou uma reviravolta que quebre toda a lógica da história?!"
1301103-29 = "Eles ficam dizendo coisas vagas como 'Um bom roteiro de jogo é aquele que deixa um impacto no usuário',"
1301103-30 = "mas é claro que é fácil falar quando não se tem responsabilidade, né?!"
1301103-31 = "Se eles entendem tanto assim, por que não param de reclamar e escrevem eles mesmos?!"
1301103-32 = "[s] \"Ei, Momoi, se acalma…….\""
1301103-33 = "Ufa, ufa……."
1301103-34 = "Ugh……"
1301103-36 = "[s] \"Ugh……?\""
1301103-37 = "Waaaaah! Que frustração! Que frustração!"
1301103-38 = "Eu queria escrever um roteiro que desse um choque nesses caras que ficam falando essas coisas!"
1301103-39 = "Mas eu não consigo escrever nada do jeito que eu quero! Estou com tanta raiva de mim mesma!!"
1301103-40 = "[s] \"Então você estava perto do prazo final…….\""
1301103-41 = "……Desculpe, Sensei."
1301103-42 = "Fiquei brava sozinha e acabei descontando em você……."
1301103-43 = "[s1] \"Não, tudo bem,\"\n[s2] \"Na verdade, eu fico feliz.\""
1301103-44 = "……Feliz? Por quê?"
1301103-45 = "……Feliz? Por quê?"
1301103-46 = "[s] \"Porque significa que você confiou em mim quando estava passando por um momento difícil.\""
1301103-47 = "……E-eh, isso é, bem……."
1301103-48 = "……Sim, obrigada, Sensei."
1301103-49 = "Na verdade, eu acabei ficando confusa."
1301103-50 = "Sobre o que escrever, ou como escrever."
1301103-51 = "Desse jeito, eu não sirvo como roteirista do Departamento de Desenvolvimento de Jogos……."
1301103-52 = "[s3] \"Eu não entendo muito sobre roteiros, mas...\"\n[s4] \"Se tem uma coisa que eu penso sobre isso...\""
1301103-53 = "……？"
1301103-54 = "……？"
1301103-55 = "[s5] \"O roteiro que a Momoi quer escrever,\"\n[s6] \"provavelmente será o melhor roteiro de todos, não acha?\""
1301103-56 = "……。"
1301103-58 = "……。"
1301103-60 = "É, é mesmo... entendi..."
1301103-61 = "O roteiro que eu quero escrever..."
1301103-62 = "Sim, isso mesmo...!"
1301103-63 = "Acho que comecei a entender!"
1301103-64 = "Beleeeeza! Motivação carregada ao máximo!"
1301103-65 = "Conversar com o Sensei clareou minha mente, sinto que consigo escrever agora!"
1301103-66 = "Um roteiro clássico, mas que supera todos os outros clássicos, o roteiro que eu quero escrever!"
1301103-69 = "Da próxima vez, leia meu roteiro e me diga o que achou, tá? Sensei!"
1301103-70 = "[s] \"Claro, estou ansioso por isso.\""
1301103-73 = "（Alguns dias depois, recebi uma mensagem da Momoi）"
1301103-74 = "O que eu faço, Sensei!?"
1301103-75 = "A ideia que eu tive com tanto esforço está cheia de contradições, e não consigo pensar em nada para resolver isso! Me ajudaaaa!"
1301103-76 = "Waaaaah!!!"
1301103-77 = "（Era a Momoi de sempre）"
