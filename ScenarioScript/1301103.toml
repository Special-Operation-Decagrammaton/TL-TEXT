[translation]
1301103-1 = "良いシナリオの条件"
1301103-2 = "ミレニアム・ゲーム開発部"
1301103-3 = "＜Gamemaniac：レトロなゲームでシナリオってそんなに重要？＞"
1301103-4 = "＜Waga-mama：いやシナリオ古っ、このご時世にこれは無いわ＞"
1301103-5 = "＜ikusa007：ヒロインはどうしたの？＞"
1301103-6 = "＜tensaiko：最後にどんでん返しも無し？私でもこれより良いの書けそう＞"
1301103-7 = "[s] \"……これ、何？\""
1301103-8 = "何も分かってないやつらが騒いでるの！"
1301103-9 = "[s] \"どういうこと……？\""
1301103-10 = "順を追って説明すると、"
1301103-11 = "最近クラウドファンディングの流行で、レトロなゲームがいくつか作られるようになってきてるの。"
1301103-12 = "個人的にこの流れは応援したいっていうか。"
1301103-13 = "その挑戦をする人たちには、ぜひとも頑張ってほしいなって思ってるんだけど。"
1301103-14 = "見てこれ！"
1301103-15 = "新しく出るレトロ風ゲームに対して、みんなこうやって悪口ばかり言ってるの！"
1301103-16 = "[s] \"わざわざ検索しなければいいんじゃ……？\""
1301103-17 = "そ、それは、ふと目に止まっちゃったっていうか……。"
1301103-18 = "ほら、何か月も放置して腐った食べ物とか、捨てる前に一応見てみたいじゃん……？"
1301103-19 = "そ、それに、好き好んで検索したわけじゃないし！"
1301103-20 = "あくまでも市場調査の一環っていうか……。"
1301103-21 = "それよりも！こいつら、めちゃくちゃなことばっかり！"
1301103-22 = "レトロなゲームなんだからシナリオなんて重要じゃないー、とか。"
1301103-23 = "どうして途中でヒロインが出てこなくなるのかー、とか！"
1301103-24 = "どんでん返しがなくてがっかりしたー、とか！"
1301103-25 = "[s] \"うーん……。\""
1301103-26 = "そもそも評価の基準が薄っぺらいの！"
1301103-27 = "もしその通りだとすると、勇者が魔王を倒しに旅立つシナリオは王道的だからダサいってことにならない？"
1301103-28 = "お決まり通りは良くなくて、そこまでの流れを全部壊すような意外性とかどんでん返しとかがないと絶対にダメだなんて、そんなことある！？"
1301103-29 = "「良いゲームシナリオは、ユーザーにインパクトを残せるシナリオだ」とか、ふわふわしたそれっぽいこと言ってるけど、"
1301103-30 = "口だけならどうとでも言えるに決まってるでしょ！？"
1301103-31 = "そこまで分かってるなら文句ばっかり言ってないで、そっちだって書けばいいじゃん！？"
1301103-32 = "[s] \"えっと、モモイ、落ち着いて……。\""
1301103-33 = "ふぅ、ふぅ……。"
1301103-34 = "うっ……"
1301103-36 = "[s] \"うっ……？\""
1301103-37 = "うあああんっ！悔しい！悔しいよぉ！"
1301103-38 = "こんなこと言ってるようなやつらに、ガツンと衝撃を与えるようなシナリオを書いてやりたいのに！"
1301103-39 = "全然思ったように書けないし！自分で自分に腹が立つ！！"
1301103-40 = "[s] \"締め切り前だったんだね……。\""
1301103-41 = "……ごめん、先生。"
1301103-42 = "勝手に一人で怒って、先生に八つ当たりして……。"
1301103-43 = "[s1] \"ううん、\"\n[s2] \"むしろ嬉しいよ。\""
1301103-44 = "……嬉しい？どうして？"
1301103-45 = "……嬉しい？どうして？"
1301103-46 = "[s] \"モモイが大変な時に、頼りにしてくれたってことだから。\""
1301103-47 = "……え、と、それは、その……。"
1301103-48 = "……うん、ありがとう。先生。"
1301103-49 = "実は、よく分かんなくなっちゃって。"
1301103-50 = "何を書けばいいのか、どう書けばいいのか。"
1301103-51 = "このままじゃ、ゲーム開発部のシナリオライターとして失格だよ……。"
1301103-52 = "[s3] \"私には、シナリオのことはあんまり分からないけど……。\"\n[s4] \"一つだけ、思うところがあるとすれば……。\""
1301103-53 = "……？"
1301103-54 = "……？"
1301103-55 = "[s5] \"モモイが書きたいと思ってるシナリオ、\"\n[s6] \"それがきっと、一番良いシナリオになるんじゃないかな。\""
1301103-56 = "……。"
1301103-58 = "……。"
1301103-60 = "そ、そっかー……ふーん……。"
1301103-61 = "私が書きたいと思ってるシナリオ……。"
1301103-62 = "うん、うん……！"
1301103-63 = "ちょっと分かってきたかも！"
1301103-64 = "よーーーし！やる気充電MAX！"
1301103-65 = "先生と話してたらちょっと頭がスッキリしたし、今なら書けそう！"
1301103-66 = "王道で、それでいて今までの王道を超えるような、私が書きたいシナリオ！"
1301103-69 = "今度また私のシナリオを読んで、感想を聞かせてね！先生！"
1301103-70 = "[s] \"うん、楽しみにしてる。\""
1301103-73 = "（それから数日後、モモイからメッセージが届いた）"
1301103-74 = "どうしよう先生！？"
1301103-75 = "せっかく浮かんだアイデアが思いっきり矛盾してて、それを打破する次のアイデアが全然浮かばない！助けてーー！"
1301103-76 = "うわあぁぁぁん！！！"
1301103-77 = "（いつものモモイだった）"
