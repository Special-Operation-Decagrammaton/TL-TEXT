[translation]
10038085-9 = "恐悦至極に、存じます……"
10038085-16 = "ご苦労じゃった、カグヤ。"
10038085-20 = "怪我人を治療せよ。#n特にカグヤの状態がよくない。安全な場所に移送し、手厚く看護するのじゃ。"
10038085-21 = "これらすべての裁決と処分は、事が終わった後に行うものとする。"
10038085-24 = "承知いたしました！"
10038085-26 = "玄龍門、集合！各々、やるべきことを為せ！"
10038085-27 = "道は開けた！このチャンスを逃してはならない！"
10038085-29 = "六和閣を取り返すぞ！門主様に仕えよ！"
10038085-37 = "ご苦労じゃった。ミナ。"
10038085-38 = "とんでもございません。やっと、お力になることができ、安心いたしました。"
10038085-39 = "……良いのか？我らは背水の陣じゃ。ひとたび失敗すれば、後はない。"
10038085-40 = "いざとなったら門主様を切り捨てて一人で生きる道を探せ、と？"
10038085-41 = "……。"
10038085-42 = "心配しないでください、とは言いません。#n門主様は、心優しいお方ですから。"
10038085-47 = "門主様が私を見捨てることはあっても、私が門主様を見限ることは絶対にありません。"
10038085-53 = "……そうか。"
10038085-54 = "さあ、次はどこに行きますか？#nやはり錬丹術研究会ですか？"
10038085-58 = "――地下牢へ参る。"
10038085-59 = "地下牢……ですか？"
