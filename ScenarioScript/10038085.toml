[translation]
10038085-9 = "Sinto-me extremamente honrada..."
10038085-16 = "Bom trabalho, Kaguya."
10038085-20 = "Tratem os feridos. #nEspecialmente Kaguya, o estado dela não é bom. Levem-na para um local seguro e cuidem dela com dedicação."
10038085-21 = "Todos esses julgamentos e punições serão realizados após o término dos eventos."
10038085-24 = "Entendido!"
10038085-26 = "Genryumon, reunir! Cada um, faça o que deve ser feito!"
10038085-27 = "O caminho está aberto! Não podemos desperdiçar esta chance!"
10038085-29 = "Vamos retomar o Rokuwakaku! Sirvam à nossa Mestra!"
10038085-37 = "Bom trabalho, Mina."
10038085-38 = "Não há de quê. Finalmente, sinto-me aliviada por poder ser útil."
10038085-39 = "......Tem certeza? Estamos em uma situação desesperadora. Se falharmos uma vez, não haverá volta."
10038085-40 = "Está me dizendo para abandonar a Mestra e buscar um caminho para sobreviver sozinha, caso as coisas fiquem difíceis?"
10038085-41 = "......"
10038085-42 = "Não vou dizer para não se preocupar. #nAfinal, a Mestra é uma pessoa de bom coração."
10038085-47 = "A Mestra pode até me abandonar, mas eu jamais abandonarei a Mestra."
10038085-53 = "......Entendo."
10038085-54 = "Bem, para onde vamos agora? #nSerá que vamos ao Clube de Pesquisa de Alquimia?"
10038085-58 = "――Vamos para a masmorra."
10038085-59 = "A masmorra...?"
