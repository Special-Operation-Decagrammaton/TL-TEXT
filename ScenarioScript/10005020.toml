[translation]
10005020-1 = "Episódio 2; O mesmo padrão de pensamento de sempre"
10005020-2 = "（Cerca de 30 minutos depois...）"
10005020-9 = "……Guh!?"
10005020-10 = "Uau!?"
10005020-15 = "……Limpo."
10005020-16 = "Aqui também está limpo, estamos indo bem."
10005020-21 = "……Hã?"
10005020-22 = "Já acabou? Não foi rápido demais?"
10005020-23 = "Quando você diz \"já acabou\", você não nocauteou um monte de gente no caminho até aqui, Líder...?"
10005020-24 = "Parece que você ainda tem muita energia de sobra."
10005020-25 = "Haa..."
10005020-26 = "Se for sempre assim, não tem graça nenhuma, chega a ser cansativo..."
10005020-27 = "Bem, talvez seja porque não podemos fazer um estrago maior..."
10005020-29 = "É bom que a operação esteja correndo bem."
10005020-30 = "Aliás, Líder, olhando bem para esse seu visual..."
10005020-31 = "Cala a boca. Qual é o problema de usar uma jaqueta sobre o traje de coelhinha? A Akane já me disse isso agora há pouco."
10005020-32 = "Disso eu não abro mão."
10005020-33 = "E nem é como se estivesse tudo correndo tão bem, ainda nem encontramos aquela pirralha..."
10005020-34 = "Que irritante... Se a gente explodir tudo, não seria mais fácil de achar?"
10005020-35 = "Se forem só esses caras, mesmo que venham todos de uma vez fazendo barulho, dá para derrotar num instante, não dá?"
10005020-36 = "[s1] \"Tenha paciência, tenha paciência.\"\n[s2] \"Tenho certeza de que isso também faz parte da nossa competência.\""
10005020-37 = "Tsc...!"
10005020-38 = "Tsc...!"
10005020-39 = "……Tá, tá bom. Só falei por falar."
10005020-41 = "Ei, vocês aí, agradeçam pela presença do Sensei. Se não estivéssemos juntos agora, vocês estariam..."
10005020-42 = "Líder. Não adianta chutar, eles já estão todos desmaiados, não estão ouvindo."
10005020-43 = "De qualquer forma, vamos nos mover assim que assumirmos o controle do sistema."
10005020-44 = "Akane, como está o progresso?"
10005020-46 = "Sim, pode deixar comigo. Está tudo correndo bem."
10005020-47 = "[s3] \"Como esperado da Akane.\"\n[s4] \"Você é confiável.\""
10005020-48 = "Fufu. Obrigada, Sensei."
10005020-49 = "Fufu. Obrigada, Sensei."
10005020-50 = "Sendo elogiada assim, até me sinto um pouco animada, mesmo estando em missão."
10005020-52 = "Ai, aquela pirralha... Me fazendo passar por esse trabalho todo. Quando eu a pegar, vou dar uma surra nela até chorar."
10005020-53 = "Mesmo que a gente não faça nada, se voltarmos para o Seminário, sinto que a Yuuka seria capaz de fazer algo parecido..."
10005020-54 = "……Hm? Sensei?"
10005020-55 = "Que nós e a Coelho Branco parecemos nos dar bem...?"
10005020-56 = "Ah, é verdade, não posso negar."
10005020-57 = "Embora ela cause vários problemas, ela não é exatamente uma existência perigosa ou maligna."
10005020-59 = "Depois de nos encontrarmos várias vezes, ela começou a nos chamar de \"senpai\"."
10005020-60 = "Aquela garota fica o tempo todo gritando: \"A Neru-senpai está me perseguindo!\" ou \"A Neru-senpai me bateu!\", é tão irritante..."
10005020-61 = "Se não quer apanhar, é só não causar problemas."
10005020-62 = "Ela é só uma pirralha mimada e ignorante. E a força dela também não é nada além do que parece."
10005020-63 = "……?"
10005020-64 = "Ah, entendi. Por um momento, achei que você estivesse falando de si mesma."
10005020-65 = "……Hã?"
10005020-66 = "Ei, Karin, não me diga que você..."
10005020-67 = "Sim, sim, vamos nos mover agora~."
10005020-68 = "Controle do sistema concluído? Foi bem rápido."
10005020-69 = "Obrigada, então por favor, venha por aqui."
10005020-70 = "Por causa da localização, é perigoso por aqui."
10005020-71 = "Por favor, venha por aqui. Um pouco mais para cá."
10005020-73 = "Certo, então... *clique*."
10005020-77 = "OK, parece que o funcionamento está normal."
10005020-78 = "……？"
10005020-79 = "……Akane?"
10005020-80 = "O que você acabou de apertar? E esse som é……?"
10005020-87 = "……？"
10005020-88 = "……？"
10005020-89 = "[s5] \"Que som é esse……?\"\n[s6] \"Akane, você não tinha assumido o controle do sistema……?\""
10005020-90 = "Bem,"
10005020-91 = "Bem,"
10005020-92 = "Eu só estou fazendo o procedimento de sempre……?"
10005020-93 = "Como sempre, usando C4."
10005020-94 = "Entendi, C4 então."
10005020-98 = "……C4? Aquele explosivo C4?"
10005020-99 = "Akane, por que você usou C4 aqui agora……?"
10005020-100 = "……? Bem, obviamente para explodir este lugar……?"
10005020-101 = "Faz sentido. Mas o que eu quero saber é, já que esta operação exige discrição, por que você usou C4 como sempre faz……?"
10005020-102 = "……Ah?"
10005020-103 = "Bem, será que eu……"
10005020-104 = "Cometi algum erro grave……?"
10005020-105 = "Pelo contexto da situação, não teria sido melhor hackear o sistema de vigilância e usá-lo a nosso favor……?"
10005020-110 = "Ei, então para isso logo! Quanto tempo falta?"
10005020-111 = "B-bem……"
10005020-112 = "Tempo restante……"
10005020-113 = "……Zero segundos."
