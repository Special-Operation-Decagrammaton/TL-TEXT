[translation]
10005020-1 = "第2話;いつも通りの思考回路"
10005020-2 = "（約30分後……）"
10005020-9 = "……ぐっ！？"
10005020-10 = "うわっ！？"
10005020-15 = "……クリア。"
10005020-16 = "こちらもクリア、順調ですね。"
10005020-21 = "……あん？"
10005020-22 = "これで終わりか？早くねぇか？"
10005020-23 = "「これで終わり」って、ここに来るまでの間にも、リーダーは結構な数を気絶させてなかったか……？"
10005020-24 = "まだまだ力が有り余っているみたいですね。"
10005020-25 = "はぁ……。"
10005020-26 = "こんなんばっかりだと、張り合い無くて逆に疲れんな……"
10005020-27 = "まあ、派手にやれねえってのも理由かもしんねぇけど……。"
10005020-29 = "作戦が順調なのは良いことだ。"
10005020-30 = "ところでリーダー、あらためて見るとその格好……。"
10005020-31 = "るせぇ。良いだろうがよ、バニーにスカジャン羽織っても。つかそれさっきアカネにも言われたっての。"
10005020-32 = "これだけは譲れねぇ。"
10005020-33 = "ってか別に順調ってわけでもねぇだろ、まだあのチビを見つけたわけでもねぇし……。"
10005020-34 = "じれってー……全部吹っ飛ばせば、すぐ見つかるんじゃねぇか？"
10005020-35 = "この程度のやつらなら、騒いでまとめて来たところで一蹴できるだろ？"
10005020-36 = "[s1] \"我慢我慢。\"\n[s2] \"こういうのも実力のうちだよ、きっと。\""
10005020-37 = "ちっ……！"
10005020-38 = "ちっ……！"
10005020-39 = "……わーったわーった。言ってみただけだよ。"
10005020-41 = "おいてめぇら、先生の存在に感謝しとけよ。こうして一緒にいなかったらてめぇらは今頃……"
10005020-42 = "リーダー。足蹴にしたところで、もう全員気絶してるんだから聞こえてない。"
10005020-43 = "とにかく、システムを掌握したらすぐに移動しよう。"
10005020-44 = "アカネ、進捗は？"
10005020-46 = "はい、お任せください。順調です。"
10005020-47 = "[s3] \"流石はアカネ。\"\n[s4] \"頼もしい。\""
10005020-48 = "ふふっ。ありがとうございます、先生。"
10005020-49 = "ふふっ。ありがとうございます、先生。"
10005020-50 = "そこまで褒められると、任務中なのに何だか浮かれてしまいそうです。"
10005020-52 = "ったく、あのチビ……めんどくせぇことさせやがって。捕まえたらボコボコにして泣かせてやる。"
10005020-53 = "わざわざ私たちがやらなくても、セミナーに戻ればユウカがそれに近いことをやりかねない気がするけど……。"
10005020-54 = "……ん？先生？"
10005020-55 = "私たちと白兎の仲が良さそう……？"
10005020-56 = "ああ、確かに否定はできないかもしれない。"
10005020-57 = "色々と問題を起こすとは言え、別に危険な存在だとか、悪の存在ってわけでもない。"
10005020-59 = "何度も会っているうちに、私たちのこと「先輩」なんて呼ぶようになりましたしね。"
10005020-60 = "あいつ「ネル先輩が追いかけてくるー！？」とか、「ネル先輩が叩いたー！」とか、いちいちうるせぇんだよな……。"
10005020-61 = "殴られたくないなら問題を起こすんじゃねぇっつの。"
10005020-62 = "ただの世間知らずで甘えん坊のチビだ。腕っぷしも別に、見た目通りのな。"
10005020-63 = "……？"
10005020-64 = "あ、そういうことか。途中まで、てっきり自分の話をしてるのかと。"
10005020-65 = "……はぁ？"
10005020-66 = "おいカリン、まさかとは思うがてめぇ……？"
10005020-67 = "はいはい、そろそろ動きますよ～。"
10005020-68 = "システムの掌握完了？だいぶ早かったな。"
10005020-69 = "ありがとうございます、ではこちらへどうぞ。"
10005020-70 = "ちょっと場所的に、その辺は危ないので。"
10005020-71 = "こちらへどうぞ。もう少しこちらへ。"
10005020-73 = "はい、ではポチっと。"
10005020-77 = "OKです、動作も問題無さそうですね。"
10005020-78 = "……？"
10005020-79 = "……アカネ？"
10005020-80 = "今何を押した？それにこの音って……？"
10005020-87 = "……？"
10005020-88 = "……？"
10005020-89 = "[s5] \"この音は……？\"\n[s6] \"アカネ、システムを掌握したんじゃなかったの……？\""
10005020-90 = "えっと、"
10005020-91 = "えっと、"
10005020-92 = "いつも通りの処理をしているだけですが……？"
10005020-93 = "いつも通り、C4を。"
10005020-94 = "そうか、C4か。"
10005020-98 = "……C4って、あの爆薬のC4？"
10005020-99 = "アカネ、どうして今ここでC4を……？"
10005020-100 = "……？それは当然、ここを爆破させるためですが……？"
10005020-101 = "そうだろうな。ただ私が聞きたいのは、今回色々と静かに動かないといけない作戦で、何でいつもみたいにC4を使ったのか、という……。"
10005020-102 = "……あら？"
10005020-103 = "えっと、もしかして今の私……。"
10005020-104 = "何か、大きなミスを……？"
10005020-105 = "話の流れ的に、監視システムをハッキングして逆に利用とかした方が良かったんじゃ……？"
10005020-110 = "おい、じゃあ早く止めろよ。あと何秒残ってんだ？"
10005020-111 = "え、えっと……。"
10005020-112 = "残り時間……"
10005020-113 = "……０秒です。"
