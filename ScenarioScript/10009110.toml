[translation]
10009110-1 = "Epílogo 4: Atividades de socorro com o método da cenoura e do chicote"
10009110-4 = "Com orgulho e convicção gravados no peito!"
10009110-20 = "Ufa... Por favor, me perdoe. #nIsso tudo é para o bem de vocês—"
10009110-24 = "Se há alguém ali que precisa de \"socorro\", #nnós da Brigada de Socorro nunca pararemos de caminhar!"
10009110-25 = "Ei, ei, espere aí!"
10009110-27 = "Por causa da capitã, o número de feridos só aumenta— guah!?"
10009110-28 = "Você está bem? #nVou passar um antisséptico, então não se mova, por favor."
10009110-29 = "Seria um problema se a ferida abrisse! #nSenpai, será que não seria melhor imobilizar o corpo todo?"
10009110-31 = "Isso é o método da cenoura e do chicote!? #nOu você só quer nos prender usando a desculpa de \"socorro\"!?"
10009110-32 = "Droga... #nEu já sabia que o pessoal da Brigada de Socorro não estava do nosso lado, mas..."
10009110-34 = "Muito obrigado! #nGraças ao pessoal da Brigada de Socorro, a situação parece estar sob controle!"
10009110-35 = "Apenas cumpri com o meu dever, não precisa se preocupar."
10009110-36 = "Mas, por mais que continuemos patrulhando, isso não tem fim..."
10009110-38 = "Se a Chefe do Departamento de Segurança estivesse aqui, isso não teria acontecido...!"
10009110-39 = "Mas parece que o Departamento de Segurança não pode agir neste caso..."
10009110-40 = "Ouvi dizer agora há pouco que houve um problema com os trâmites da papelada."
10009110-41 = "Disseram que faltava um carimbo no relatório de campo e que o certificado necessário para a solicitação de apoio não foi entregue..."
10009110-42 = "Deixando de lado o carimbo, o certificado parece ter sido perdido em um incidente no local anterior, então acho que não tem como evitar..."
10009110-43 = "Às vezes, coisas se perdem quando estamos em campo, né."
10009110-44 = "A emissão de certificados é feita toda quarta-feira. #nEmbora, em casos de emergência, seja possível emitir um provisório..."
10009110-45 = "Mas para emitir um certificado provisório, também precisamos de uma autorização da Sala de Defesa..."
10009110-46 = "— O que isso significa?"
10009110-47 = "Mesmo com uma confusão acontecendo de verdade, #npor que é necessário seguir procedimentos tão formais?"
10009110-48 = "Respeitar as regras é importante, mas não é por causa disso que o \"socorro\" não está chegando a quem precisa!?"
10009110-49 = "M-mas... como se trata de um assunto administrativo, precisamos seguir os trâmites..."
10009110-50 = "Sendo assim, eu mesma falarei diretamente com o alto escalão da Academia de Polícia Valkyrie!"
10009110-51 = "N-não, isso já é demais...!"
10009110-52 = "Exato. Pela posição da Capitã Mine, isso... #nInterferência nos assuntos internos de terceiros pode acabar gerando um conflito entre as academias...!"
10009110-54 = "...Estou muito triste! #nPor que vocês não conseguem entender?"
10009110-55 = "O resultado de se apegar a essas \"formas\" e \"procedimentos\" é que o \"socorro\" não está chegando a quem precisa!"
10009110-57 = "(Depois disso, Mine acabou encontrando por acaso a Chefe do Departamento de Segurança que veio inspecionar o local—)"
10009110-58 = "(Ignorando as tentativas das alunas de Valkyrie de impedi-la, Mine protestou contra a Chefe do Departamento de Segurança)"
10009110-59 = "(A Chefe respondeu que \"o departamento responsável é outro\", mas essas palavras apenas aumentaram o ímpeto de Mine—)"
10009110-60 = "(Embora tenha ocorrido uma pequena confusão— essa é uma outra história)"
10009110-62 = "Hum... parece que está barulhento por aqui."
10009110-63 = "Se aquela Chefe do Departamento de Segurança e a unidade de escolta não estão aqui... então."
10009110-64 = "Ufufu... esta é a chance perfeita."
10009110-71 = "Então, vamos recomeçar, que tal?"
