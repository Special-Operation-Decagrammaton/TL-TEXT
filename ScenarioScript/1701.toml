[translation]
1701-1 = "無人フロアの幽霊さん（１）"
1701-2 = "聖テレサ総合病院・病室"
1701-3 = "救護騎士団、到着しました！"
1701-4 = "患者さんはどこですか？具合の悪い方は、手を上げて大きな声でお返事をしてください！"
1701-5 = "しーっ……！ハナエちゃん、声が大きすぎます。#nここは具合の悪い方がたくさんいらっしゃる病棟なんですから、もう少し静かにしましょう？"
1701-6 = "それはそうですが、先輩、#n病は気からと言いますし、笑顔は万病の薬って言葉もあるじゃないですか？"
1701-7 = "笑顔でおしゃべりしたり歌ったりすれば、きっとみんなすぐに元気になりますよ！"
1701-8 = "はは、確かに。#nハナエちゃんが元気に話しかけてくれるおかげで、入院生活も退屈じゃないからねぇ。"
1701-9 = "ハナエちゃんの笑顔を見ていると、自然と元気が出てくるよ。"
1701-10 = "ふふっ、皆さんにそう思っていただけるなら良かったです。"
1701-11 = "あら、シロヤギさん。お昼のパンがまだ……残されてしまったのですか？"
1701-12 = "なんだか、お腹が空かなくって……。"
1701-13 = "ですが、栄養を十分に摂取しないと傷も早く治りませんよ？"
1701-17 = "さあ、私が手伝ってあげますから、あ～んってしてください！"
1701-18 = "なにそれ、ずるい！セリナちゃん、私にもあ～んしてくれ！"
1701-19 = "お、おいらにも！"
1701-20 = "もうっ、皆さんそんな風に甘えてばかりですと、看護師長に言いつけますよ！そんな目で見てもダメです！"
1701-21 = "じゃあ代わりに、手を怪我された方には、ハナエがパンを食べさせてあげます！"
1701-25 = "学園でも忙しいはずなのに、毎週のように週末は病院に来て、ボランティアで患者の面倒を見てくれるなんて……救護騎士団の子たちは本当に天使だねぇ。"
1701-26 = "本当にそうだな。見てると心まで浄化される感じがする……こんな天使の前では、どんな邪悪なやつでも、あの子たちの前では大人しい子犬みたいになること間違いなしだね。"
1701-27 = "ああ、そうに違いない。"
1701-29 = "聖テレサ総合病院・ロビー"
1701-30 = "師長、3階の巡視終わりました。皆さん、着実に回復されています。"
1701-31 = "二人ともお疲れ様。何かいたずらしたり、怒ったりするような患者さんはいませんでしたか？"
1701-32 = "いえ、みなさん優しくて親切に接してくださったので、楽しかったです！"
1701-33 = "それは良かったです。確かに最近、病棟の雰囲気も前より明るくなりましたし、文句を言ったりする患者さんもだいぶ減りました。これも、救護騎士団の方のおかげですね。"
1701-34 = "私たちは、やるべきことをやっただけですから。ふふっ。"
1701-35 = "具合の悪い方がいたら、いつでも救護騎士団をお呼びください！"
1701-37 = "あの……一つだけ、気になることがあるのですが。"
1701-38 = "はい、何ですか？"
1701-39 = "この病院に来ると、毎回3階までの患者さんの見回りをしてますが、この上、4階に患者さんはいないのですか？"
1701-40 = "中央ロビーの案内図ですと、4階にも病室があるように記載されていたのですが……。"
1701-41 = "……それはですね、以前、4階に入院されていた患者さんたちの間で良くない噂が広まっていまして。"
1701-42 = "良くない噂、ですか？"
1701-43 = "それが、深夜12時の鐘が鳴ると……体中に包帯を巻いた、幽霊が現れると。"
1701-44 = "ゆ、幽霊ですか！？本当に！？"
1701-45 = "もちろん本物の幽霊だとは思いませんが……不安がる患者さんが多すぎて、仕方なく病室を移すしかありませんでした。"
1701-46 = "それで今は4階は使われず、無人のフロアになっています。"
1701-47 = "こ、怖いですね……。#nで、でしたら4階には近寄らないようにします……。"
1701-49 = "ダメですよ先輩。たとえ幽霊だとしても、体に包帯を巻いてるってことは、患者さんってことですよ！？"
1701-50 = "私たち救護騎士団が、具合の悪い患者さんを知らんぷりして逃げただなんて、ミネ団長が知ったらきっと悲しみます！"
1701-51 = "で、でも私たちは生きてる方を治療する救護騎士団であって、幽霊を相手にする除霊集団ではないじゃないですかぁ……。"
1701-52 = "や、やっぱりこの件は聞かなかったことに……。"
1701-53 = "いえ、この目で確認するまでは、幽霊かどうかも分かりません！"
1701-54 = "それに、このまま幽霊騒ぎが続いて4階の病室が使えないままだと、その分患者さんを受け入れることができません――これは、患者さんのためでもあるのです！"
1701-55 = "うう……正論……！"
1701-56 = "ふふっ、それでは決まりですね！#n今夜11時にもう一度集合して、無人フロアの幽霊さんを確認しに行きましょう、先輩！"
1701-58 = "ほ、ほ、本当に幽霊が出たら私、帰りますからね！？#n何がどうなっても振り返らずに全速力で逃げますからね！！"
