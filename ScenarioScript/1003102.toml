[translation]
1003102-1 = "Antes que este ano termine"
1003102-2 = "（Alguns dias antes do Ano Novo）"
1003102-3 = "Ah, Sensei. Por aqui, por aqui."
1003102-4 = "[s1] \"Desculpe a demora. Aliás, para onde vamos hoje?\"\n[s3] \"Cancelei todos os meus outros compromissos e vim correndo.\""
1003102-5 = "Fufufu, o que foi, Sensei? Está curioso... sobre o porquê de eu ter te chamado?"
1003102-6 = "Bem, é natural ficar curioso. Sim, é óbvio que você estaria...!"
1003102-7 = "[s2] \"Talvez eu não esteja tão curioso assim.\""
1003102-8 = "O quêêê!?"
1003102-9 = "É-é brincadeira, Sensei! Eu só estava tentando te provocar...!"
1003102-10 = "Então, pelo menos, não responda com essa cara séria! Fique um pouco curioso!"
1003102-11 = "Hã? Era isso?"
1003102-12 = "E-e, bem, me desculpe... Afinal, te chamar assim no mesmo dia foi muito repentino, não foi?"
1003102-13 = "É verdade, o Sensei já está sempre tão ocupado..."
1003102-14 = "Eu deveria ter avisado com mais antecedência para marcar esse compromisso..."
1003102-15 = "Me desculpe por te chamar assim, de repente e sem aviso."
1003102-16 = "[s4] \"Não, está tudo bem. Na verdade, eu não tinha nenhum plano além de 'descansar'.\""
1003102-17 = "Fufu. Mesmo nessas horas, o Sensei sempre diz que \"está tudo bem\"."
1003102-18 = "……Hm? Ué?"
1003102-19 = "（Hã, ué? Será que eu acabei de ser provocada pelo Sensei!?）"
1003102-23 = "B-bem, esquece. De qualquer forma, voltando ao assunto..."
1003102-24 = "Sensei. Como eu disse antes, falta pouco para o ano acabar."
1003102-25 = "O que significa que..."
1003102-26 = "[s] \"Significa?\""
1003102-27 = "Significa que o Ano Novo já está logo ali!"
1003102-28 = "Fufufu, entendeu? Sensei."
1003102-29 = "Está tão perto que já é uma situação de emergência, não é exagero dizer isso."
1003102-30 = "[s5] \"Entendi, então você quer dizer que vamos causar um alvoroço no Ano Novo.\"\n[s6] \"Eu estava esperando por este dia, Presidente! Vamos fazer algo grandioso!\""
1003102-31 = "Eu não vou causar alvoroço nenhum, nem fazer nada disso!?"
1003102-32 = "Eu não vou causar alvoroço nenhum, nem fazer nada disso!?"
1003102-33 = "O que você pensa de mim, afinal!?"
1003102-34 = "Eu só pensei em alugar um quimono para usar no Ano Novo...!"
1003102-35 = "[s] \"Alugar um quimono?\""
1003102-36 = "Sim. O Ano Novo é um momento especial para uma empresária como eu."
1003102-37 = "É o momento de preparar o corpo e a mente para o novo ano que começa, e de dar início a várias coisas novamente..."
1003102-38 = "Nessas horas, é claro que preciso vestir algo apropriado, não acha?"
1003102-39 = "[s] \"Entendi, então é por isso que vai alugar um quimono.\""
1003102-40 = "Fufufu. Isso mesmo, ajustar a aparência de acordo com o tempo, lugar e ocasião."
1003102-41 = "Seguir o TPO também é um requisito para uma empresária. A confiança começa por essas coisas."
1003102-42 = "Por isso, ou melhor, é que..."
1003102-43 = "Em vez de decidir sozinha, pensei em ouvir a opinião de outra pessoa..."
1003102-44 = "Ou seja, chamei você porque queria a opinião do Sensei... Tudo bem?"
1003102-45 = "[s] \"Claro, não tem como eu recusar.\""
1003102-46 = "Ugh, respondeu na hora... Nossa, você é muito injusto..."
1003102-47 = "Bem, tudo bem."
1003102-48 = "Vamos lá, Sensei."
1003102-51 = "[ns7] \"Então, que tipo de quimono você pretende alugar?\"\n[ns8] \"Tem alguma marca em mente?\""
1003102-52 = "Fufufu. O que importa nessas horas é o senso de equilíbrio de uma empresária."
1003102-53 = "Fufufu. O que importa nessas horas é o senso de equilíbrio de uma empresária."
1003102-54 = "Só porque estou procurando um quimono para o Ano Novo, escolher apenas o mais caro é uma armadilha em que os iniciantes costumam cair."
1003102-55 = "Por outro lado, alugar algo barato apenas para se ajustar a um orçamento limitado também não é algo que uma verdadeira empresária faria."
1003102-56 = "[s] \"Entendo?\""
1003102-57 = "O importante é saber como encontrar esse equilíbrio."
1003102-58 = "Você precisa verificar a qualidade do tecido e da roupa, e avaliar se o preço é justo."
1003102-59 = "Especialmente nesta época, em que as pessoas ficam embriagadas com a atmosfera de fim de ano e tendem a gastar sem pensar, é preciso ter cuidado redobrado."
1003102-60 = "Se você der um passo em falso, pode cair em uma armadilha gigante chamada \"marketing\" e acabar tendo despesas inesperadas."
1003102-61 = "Que tal um quimono para passar o Ano Novo de um jeito especial~?"
1003102-62 = "Como um novo código de vestimenta para receber um dia especial com a família, amigos ou seu par! Estamos com um serviço de aluguel por um preço especial agora mesmo~!"
1003102-63 = "Fufu, isso é perfeito. Observe, Sensei, vou te mostrar do que sou capaz."
1003102-66 = "Com licença. Eu gostaria de alugar um quimono."
1003102-67 = "Ah, sim! Seja bem-vinda, cliente! O que exatamente você está procurando?"
1003102-68 = "Para aluguel, meu orçamento é na faixa dos 5 mil ienes..."
1003102-69 = "Ah, este parece bom. O preço também é justo."
1003102-70 = "Oh. Você tem um ótimo gosto, cliente. A propósito, para que tipo de ocasião pretende usá-lo?"
1003102-71 = "Que tipo de reunião seria? Um compromisso com amigos? Ou talvez um encontro com seu par!?"
1003102-72 = "U-um encontro com meu par...?"
1003102-73 = "Cof, cof. Não, é que eu pretendo usá-lo em um local importante, onde se discute negócios..."
1003102-75 = "Ei! Você pretende ir a um evento tão importante vestindo uma peça de aluguel tão barata assim!?"
1003102-77 = "Ehh!? M-mas você acabou de dizer que eu tinha um ótimo gosto...!"
1003102-78 = "Claro, se fosse um compromisso com amigos, não haveria problema algum."
1003102-79 = "Mas, tratando-se de um local importante para negócios..."
1003102-80 = "Ou seja, um lugar onde a roupa que você veste fala eloquentemente sobre o seu valor, e os acessórios que usa simbolizam a sua dignidade. Para tal ocasião, uma peça como esta não é adequada!"
1003102-81 = "O-o valor de uma pessoa não é decidido pelo que ela veste..."
1003102-82 = "E, além disso, o Ano Novo é uma ocasião especial que só acontece uma vez por ano!"
1003102-83 = "É também o dia de criar memórias preciosas com quem está ao seu lado, não é mesmo!?"
1003102-84 = "Uééé!?"
1003102-85 = "E você, cliente, não concorda!?"
1003102-86 = "[s9] \"O que será que ele acha...?\"\n[s10] \"Talvez você tenha razão.\""
1003102-87 = "Se-Sensei...!"
1003102-88 = "Se-Sensei...!"
1003102-89 = "Muito bem, como algo adequado para tal ocasião, que tal este aqui?"
1003102-93 = "Foi bordado à mão, ponto por ponto, por um artesão. É a peça mais magnífica da nossa loja!"
1003102-94 = "Espere! O preço é literalmente um dígito acima do que eu esperava!?"
1003102-95 = "Pode ser. Mas se você usar isso, terá prosperidade nos negócios, segurança familiar e saúde!"
1003102-96 = "E-esse quimono tem todo esse efeito!?"
1003102-97 = "Não é só isso! Além disso, você vai capturar o coração daquela pessoa especial! Não há dúvida de que você vai despertar sentimentos lindos e curativos!"
1003102-98 = "Capturar o coração lindo e curativo do Sensei...!?"
1003102-99 = "Se-Sensei, o que você acha...?"
1003102-100 = "[s11] \"Com certeza, se eu visse a Aru de quimono, ficaria empolgado.\"\n[s12] \"Mas não está um pouco caro demais...?\""
1003102-101 = "……!"
1003102-102 = "……!"
1003102-103 = "Se você é uma verdadeira empresária, deve saber identificar o valor oculto neste quimono e investir nele! E por apenas este preço!"
1003102-104 = "É-é verdade... fazer um investimento antecipado em algo valioso também é uma estratégia correta para uma empresária..."
1003102-105 = "T-tudo bem! Quando eu decido fazer algo, eu faço! Vou levar este!"
1003102-106 = "Obrigado pelo aluguel! Cliente!"
1003102-112 = "[ns13] \"...Tem certeza mesmo?\"\n[ns14] \"E quanto à sua habilidade como empresária...?\""
1003102-113 = "Está tudo bem, isso também faz parte do investimento!"
1003102-114 = "Está tudo bem, isso também faz parte do investimento!"
1003102-115 = "Sim, está tudo bem!"
1003102-116 = "Tudo bem...! P-provavelmente..."
1003102-118 = "(Depois disso, Aru foi embora caminhando com confiança, mas suas pernas estavam tremendo um pouco)"
