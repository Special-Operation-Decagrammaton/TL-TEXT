[translation]
61110-1 = "Episódio 11; Estudo Externo (1)"
61110-5 = "[ns1]\"Muito bem, vamos começar a aula de hoje!\"\n[ns2]\"Vamos estudar nos divertindo!\""
61110-8 = "Se é divertido ou não, depende da pessoa..."
61110-9 = "Eu... me esforcei e estudei um pouquinho...!"
61110-10 = "[s]\"Oh, que ótimo que você veio preparada!\""
61110-11 = "Ehehe... ele... fez carinho na minha cabeça..."
61110-12 = "Mas, não há garantia de que amanhã será igual...#nNão há garantia em lugar nenhum..."
61110-13 = "Assim como o sol nasceu no leste hoje...#nnão significa que ele nascerá no leste amanhã também..."
61110-14 = "[s3]\"Você estudou bastante.\"\n[s4]\"Isso é o que chamamos de empirismo cético.\""
61110-17 = "Ehehe... eu estudei com o livro que o Sensei me deu...!"
61110-23 = "Agora, vamos fazer um pequeno teste."
61110-28 = "Eh... um... teste?"
61110-29 = "Pequeno teste significa... que é uma prova...?"
61110-35 = "Exato. Pense nele como uma prova simplificada."
61110-36 = "Vou ler as perguntas agora, então escrevam as respostas no caderno."
61110-39 = "Hum...? Eu deveria ter aprendido isso..."
61110-40 = "Ugh... sinto que consigo lembrar, mas não consigo..."
61110-43 = "Ah, é isso! Se eu não souber, é só perguntar, né? Ei, me dá a resposta."
61110-44 = "Aquilo? Hum, se não me engano..."
61110-46 = "Ei, nada de colar."
61110-48 = "Colar... o que é isso?"
61110-50 = "É trapacear durante uma prova. Pedir ajuda para os outros também não pode."
61110-52 = "Mas você disse para perguntar quando eu não soubesse...!"
61110-54 = "Isso foi na hora de estudar..."
61110-56 = "Estudar e fazer prova são coisas diferentes!? Devia ter dito isso antes!"
61110-58 = "Bem, é para verificar o seu próprio conhecimento, então se pensar um pouco, você entende...#nAh, estou começando a ficar preocupado..."
61110-65 = "[ns]\"...Hoje.\""
61110-67 = "[ns]\"O tempo está bom, né?\""
61110-68 = "Está um céu nublado sem um raio de sol sequer."
61110-73 = "[ns5]\"A forma como sentimos as coisas varia de pessoa para pessoa...\"\n[ns6]\"Eu acho que o tempo está bom.\""
61110-76 = "É mesmo..."
61110-77 = "E então, precisa de algo?"
61110-78 = "[s]\"Quando o tempo está bom, sinto que é um desperdício ficar parado.\""
61110-79 = "Desculpe, não entendi muito bem o rumo da conversa—"
61110-83 = "[ns]\"Certo, vamos fazer um estudo externo hoje.\""
61110-84 = "Estudo externo...?"
61110-88 = "...Será que isso foi realmente a escolha certa?"
61110-89 = "...Sim?"
61110-90 = "Existem coisas que não podem ser aprendidas na sala de aula...?#nTudo o que fazemos durante a aula é uma extensão da aula...?"
61110-91 = "Essa é uma explicação bem conveniente."
61110-92 = "[s]\"Porque, na verdade, é exatamente assim.\""
61110-93 = "Não estou muito convencida, mas..."
61110-94 = "[s]\"Isso é o que chamamos de privilégio dos adultos.\""
61110-95 = "A senpai não vai se sentar? Você está de pé esse tempo todo..."
61110-96 = "O Sensei também. Seus pés não estão doendo?"
61110-97 = "Obrigada. Eu estou bem."
61110-102 = "...Sinto uma sensação estranha."
61110-103 = "Sair para o \"mundo exterior\" de novo..."
61110-104 = "..."
61110-105 = "Mas, é uma sensação completamente diferente de antes..."
61110-109 = "Ugh...!"
61110-110 = "Você está bem?"
61110-111 = "E-estou bem. #nSó me lembrei de algumas coisas do passado... eh, ehehe..."
61110-112 = "..."
61110-113 = "[s]\"Coisas do passado?\""
61110-114 = "..."
61110-115 = "Não é nada, Sensei."
61110-116 = "..."
61110-117 = "Parece que Maia teve um pesadelo ontem à noite."
61110-118 = "[s]\"Mas...\""
61110-119 = "Não precisa se preocupar."
61110-123 = "[ns]\"Tem certeza?\""
61110-124 = "Sim."
61110-125 = "Aconselhar essas crianças sempre foi o meu papel, afinal."
61110-126 = "S-sim... estou bem, de verdade..."
61110-131 = "Então, Sensei. Para onde vamos hoje?"
61110-132 = "Eu não entendo nada do que está acontecendo..."
61110-134 = "..."
61110-135 = "Você vai cuidar de tudo, não vai, Sensei?"
61110-136 = "Foi você quem sugeriu essa \"excursão escolar\", afinal."
61110-137 = "[s]\"Pode deixar comigo!\""
61110-138 = "Aquele prédio... será que é feito de vidro? #nEle brilha tanto..."
61110-139 = "Se construíssemos algo assim na nossa escola, provavelmente quebraria ou ficaria sujo num instante..."
61110-140 = "O pessoal do esquadrão devia ver coisas assim todo dia, né..."
61110-141 = "Deveriam ter vindo com a gente."
61110-142 = "Não tem como. Não podemos deixar Arius desprotegida."
61110-143 = "Mas será que tudo bem deixar o pessoal do esquadrão lá sozinho...?"
61110-144 = "..."
61110-145 = "Isso também... é responsabilidade sua, Sensei."
61110-146 = "Não é?"
61110-147 = "[s]\"Pode deixar!\""
61110-148 = "..."
61110-149 = "Haa..."
61110-151 = "(O esquadrão ficou em Arius sob o pretexto de \"cuidar da casa\")"
61110-152 = "(No entanto, havia outro motivo para não terem acompanhado a excursão)"
61110-154 = "Você esqueceu que estamos sendo procuradas?"
61110-155 = "Quero evitar ao máximo expor nossa existência. #nNaturalmente, nossa liberdade de movimento é limitada."
61110-156 = "Eu queria ter ido na excursão com o Sensei..."
61110-157 = "Mas não tem jeito, né... Tudo bem. #nEstou acostumada com isso..."
61110-162 = "É irônico que nós tenhamos mais liberdade de movimento que elas."
61110-163 = "Aliás... até quando vocês pretendem continuar vivendo escondidas desse jeito?"
61110-164 = "Está querendo briga...?"
61110-165 = "..."
61110-166 = "Pare, Misaki."
61110-167 = "...Tsc."
61110-171 = "Você estava pensando no esquadrão?"
61110-172 = "[s]\"!?\""
61110-173 = "Você está com uma cara de quem quer saber como eu adivinhei."
61110-174 = "É fácil ler o seu rosto, Sensei. Especialmente em momentos como este."
61110-175 = "..."
61110-176 = "Posso lhe perguntar uma coisa?"
61110-177 = "Para o Sensei, o esquadrão é Arius?#nOu talvez..."
61110-178 = "Não, não tem um significado especial. Só fiquei pensando nisso de repente."
61110-179 = "[s]\"Isso é...\""
61110-183 = "Ora, que Senseis parecem se dar bem.#nDeve ser difícil cuidar dos alunos, bom trabalho para vocês."
61110-184 = "Sim...?"
61110-185 = "Sim!?"
61110-186 = "O-o que você está dizendo!?"
61110-187 = "Entendo... Você é uma estagiária de educação?#nObserve bem o trabalho do Sensei e aprenda bastante."
61110-188 = "Eu nem sou Sensei...! Ei! Sensei, corrija isso também!"
61110-189 = "E por que você está sorrindo gentilmente!?"
61110-190 = "Hahaha, que inocência, é bom ver isso. Desculpe atrapalhar o trabalho de vocês."
61110-191 = "Eu já disse que não é nada disso!!"
61110-197 = "..."
61110-198 = "..."
61110-199 = "In-incrível...!"
61110-200 = "Não tem nenhum prédio quebrado aqui!?"
61110-201 = "Normalmente, a gente tem que ficar remendando as coisas que estão caindo aos pedaços para continuar usando..."
61110-202 = "Quanto tempo será que isso dura até desmoronar..."
61110-203 = "[s]\"Certo, vamos atravessar a rua todos juntos!\""
61110-204 = "Vou ali para— ugh."
61110-209 = "Sensei! Por que você me puxou de repente!?"
61110-210 = "[s]\"Não se pode atravessar quando o sinal está vermelho!\""
61110-211 = "Sinal vermelho...?"
61110-212 = "Então é assim que as coisas funcionam aqui..."
61110-213 = "Mas nós não nos machucamos tão facilmente, sabe?#nSomos bem resistentes..."
61110-214 = "Hã? Pensar nos carros e em quem está dirigindo?#nAcho que entendo... ou talvez não..."
61110-219 = "Isso aqui... se chama piscina...?"
61110-220 = "O que será que se faz aqui..."
61110-221 = "Hã!? É uma instalação para nadar!"
61110-223 = "Tanta água limpa assim... é liberada para beber...!"
61110-230 = "Hã? Sensei, por que essa cara...?"
61110-231 = "[s]\"A água da piscina não pode ser bebida...\""
61110-236 = "Mesmo tendo tanta assim!?"
61110-237 = "Não parece que vai dar dor de barriga, e tem um cheiro fresco..."
61110-238 = "Hã? Isso é cheiro de cloro, um desinfetante?"
61110-242 = "Água precisa ser desinfetada!?"
61110-248 = "É alto!!!!"
61110-249 = "Olhem para o céu! É muito azul...!"
61110-250 = "Então aquilo é um rio... Uau..."
61110-251 = "Será que aquilo é uma ponte? Como será que construíram isso..."
61110-252 = "[s7]\"Vamos tomar cuidado para não incomodar os outros.\"\n[s8]\"Vamos tentar não falar muito alto.\""
61110-255 = "Tá bom!"
61110-259 = "Sensei, o que houve? Agora você está com cara de quem vai chorar."
61110-260 = "Você está muito feliz porque eu te escutei...?"
61110-261 = "Pensando bem, é estranho...#nAntes, eu nem queria ouvir o que os adultos diziam..."
61110-262 = "Porque, naquela época, eles só sabiam bater ou ameaçar..."
61110-264 = "Eu conheço isso! É um hambúrguer, né!"
61110-265 = "Ah! Eu já comi! É aquele que a veterana compra de vez em quando!"
61110-272 = "O sabor deveria ser o mesmo, mas... parece diferente. Por que será...?"
61110-273 = "Será que é porque o lugar de comer é diferente...?"
61110-274 = "Sim, pode ser isso mesmo."
61110-279 = "[ns9]\"Espere um pouco! Pare!\"\n[ns10]\"Não pode colocar a boca direto no dispensador!\""
61110-282 = "Mas disseram que eu podia beber à vontade..."
61110-283 = "...É porque outras pessoas também vão usar, é isso?"
61110-284 = "..."
61110-285 = "Agora que você falou... talvez seja..."
61110-287 = "Hã? Você está me elogiando por ficar na fila direitinho...?"
61110-288 = "Ser elogiada por algo tão óbvio assim... é um pouco vergonhoso."
61110-289 = "Porque, pelo contrário, se não ficássemos na fila ou se furássemos a vez na hora da distribuição... #nrecebíamos punições até desmaiar..."
61110-292 = "P-Sensei...? O que é este lugar...?"
61110-293 = "É tão barulhento, e brilha tanto... uau..."
61110-294 = "Centro de jogos...? O que é... isso?"
61110-295 = "..."
61110-296 = "N-Não minta para mim, Sensei! #nNão existe algo como um dispositivo eletrônico feito para diversão!"
61110-297 = "Hã...? Tudo o que está aqui é..."
61110-298 = "E-Espere um pouco! Precisa pagar dinheiro para jogar cada vez que for usar!?"
61110-299 = "Usar um dinheiro tão precioso para algo assim... será que tudo bem...?"
61110-300 = "[s]\"Hoje eu vou pagar, então pode jogar sem se preocupar!\""
61110-301 = "Sério mesmo!?"
61110-309 = "Para ser sincera, eu também não entendo... #nIsso é realmente uma excursão escolar...?"
61110-310 = "...Sim? Uma aula para aprender o conceito de funções na prática...? #nEr, do que você está falando?"
61110-311 = "Hã? Porque uma função é um mecanismo onde o resultado é determinado pelo que é inserido...? #nE daí, o que isso tem a ver...?"
61110-312 = "Um centro de jogos, onde você pode experimentar intuitivamente os resultados trazidos pelas ações do jogador, é..."
61110-313 = "...o lugar perfeito para \"aprender na prática\" o conceito de funções?"
61110-314 = "..."
61110-315 = "Isso é criativo, inovador... e um absurdo..."
61110-316 = "Hã? O mundo não é só isso...?"
61110-317 = "..."
61110-318 = "Nesse caso, acho que é melhor continuar sem saber..."
61110-322 = "Uauuu!? O que é isso!? Não acredito!!"
61110-326 = "Mais uma vez! Só mais uma vez!!!"
61110-328 = "[ns]\"E-estou cansada...\""
61110-330 = "Bom trabalho."
61110-331 = "...Por enquanto."
61110-332 = "E então, que tipo de aprendizado há neste parque?"
61110-333 = "\"Quando for descansar, descanse de verdade\"... com certeza, é algo necessário..."
61110-334 = "Mesmo no \"treinamento\" de Arius, nós garantíamos pelo menos o tempo de descanso."
61110-340 = "[ns]\"Todo mundo é tão cheio de energia...\""
61110-341 = "Por que você não se junta a eles, Sensei?"
61110-342 = "Bem, sim... eu digo isso sabendo que é impossível."
61110-343 = "Hã, eu...? "
61110-344 = "..."
61110-345 = "...Sim, eu também estou me divertindo à minha maneira."
61110-346 = "Por enquanto, pelo menos."
61110-349 = "(Um breve silêncio se seguiu)"
61110-350 = "(Sem dizer nada, ficamos lado a lado, olhando para o céu)"
61110-354 = "O céu... é azul."
61110-355 = "Devido à localização, o céu de Arius costuma ser cinzento."
61110-359 = "..."
61110-360 = "Sensei, hum..."
61110-361 = "Se, por acaso, alguém..."
61110-362 = "Realmente, verdadeiramente, sinceramente...#nDesejasse desistir da própria vida."
61110-363 = "Existe alguma forma de impedir essa pessoa...?"
61110-367 = "[ns]\"……！？\""
61110-368 = "Fufu, você fez uma expressão e tanto."
61110-369 = "Por que estou falando disso de repente?#n...Apenas por acaso, eu acho."
61110-370 = "Não precisa de um motivo especial para puxar assunto, precisa?"
61110-371 = "Eh? Hum, é verdade..."
61110-372 = "Pelo menos, eu estou falando sério."
61110-373 = "Por isso, ficaria feliz se o Sensei também respondesse com seriedade."
61110-374 = "Veja bem, considere isso como uma \"aula\" também."
61110-376 = "（Por um instante, o rosto de alguém passou pela minha mente）"
61110-380 = "（Como parte da aula, decidi encarar isso de frente）"
61110-382 = "[ns11]\"Para ser sincero――\"\n[ns12]\"Acho que não existe tal coisa.\""
61110-385 = "Hã...?"
61110-386 = "Espere um pouco, é isso que um educador diz!?"
61110-387 = "[s]\"Será que você queria me ver em apuros com a resposta?\""
61110-388 = "Eh? N-não! Não tive essa intenção..."
61110-389 = "……。"
61110-390 = "Embora não possa dizer que não tive intenção alguma..."
61110-391 = "M-mas!"
61110-392 = "[s13]\"Esse tipo de assunto geralmente é sobre a 'felicidade'.\"\n[s14]\"Tipo, se devemos viver mesmo sem ser felizes.\""
61110-395 = "É... verdade."
61110-396 = "Eh...?#nA \"felicidade\" é, de certa forma, como uma utopia...?"
61110-397 = "A utopia é um lugar onde um dia devemos chegar, mas――"
61110-398 = "Não é algo que se alcança facilmente agora.#nViver para ser feliz é a mesma coisa..."
61110-399 = "……。"
61110-400 = "Então, e a realidade?"
61110-401 = "[s15]\"Acho que precisamos da felicidade para viver.\"\n[s16]\"Mas não é algo fácil de se obter.\""
61110-404 = "……É verdade."
61110-405 = "Porque, mesmo que você se esforce, não há garantia de que será recompensado."
61110-406 = "[s17]\"Por isso, se alguém estiver realmente sofrendo.\"\n[s18]\"E desejar parar de viver...\""
61110-409 = "……。"
61110-410 = "Então... nem o Sensei tem uma resposta..."
61110-411 = "[s]\"Além disso, acho que a pessoa não conseguiria se perdoar.\""
61110-412 = "Sim? O que quer dizer com isso...?"
61110-413 = "Não conseguiria se perdoar por ter deixado aquela pessoa chegar a esse ponto...#nPor não ter conseguido ajudá-la mais cedo...#nÉ... assim, então..."
61110-414 = "……。"
61110-415 = "[s]\"Talvez, nós tenhamos――\""
61110-419 = "[ns]\"O dever de nos tornarmos a razão de viver um do outro.\""
61110-420 = "……！"
61110-421 = "Então, isso..."
61110-422 = "……。"
61110-423 = "Isso é apenas uma suposição, mas..."
61110-424 = "Sensei... você também poderia se tornar a minha razão?"
61110-425 = "[s19]\"Eu adoraria que isso acontecesse.\"\n[s20]\"Assim como as crianças de Arius são a razão de viver de Subaru.\""
61110-428 = "E-eu não pretendia dizer tanto assim...!?"
61110-429 = "Os adultos conseguem entender...?"
61110-430 = "……！！"
61110-431 = "Sensei! Venha aqui～!"
61110-432 = "[s]\"Espere! Já estou indo!\""
61110-436 = "……。"
61110-437 = "Francamente……."
61110-438 = "Sem saber de nada……."
61110-439 = "Mas…… não é como se estivesse dizendo apenas coisas erradas……."
61110-440 = "Sério……."
61110-441 = "Senpai! Você estava aqui!#nPreciso de uma ajudinha com uma coisa……."
61110-442 = "Ah…… sim, claro. O que foi?"
61110-444 = "Próximo episódio: Estudo de Campo (2)"
