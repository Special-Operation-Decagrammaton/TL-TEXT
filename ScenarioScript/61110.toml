[translation]
61110-1 = "第11話;校外学習（１）"
61110-5 = "[ns1]\"それじゃあ今日も授業を始めるよ！\"\n[ns2]\"楽しく勉強しようね！\""
61110-8 = "楽しいかどうかは人によるでしょ……。"
61110-9 = "私……がんばって、ちょっとだけ勉強してきました……！"
61110-10 = "[s]\"おっ、予習してきて偉いね！\""
61110-11 = "えへへ……頭……撫でてもらっちゃいました……。"
61110-12 = "でも、明日も同じように過ごせる保証なんて……#nどこにもないんですよね……。"
61110-13 = "今日東から日が昇ったからといって……#n明日も同じように東から昇るとは限らない……みたいに……。"
61110-14 = "[s3]\"よく勉強してるね。\"\n[s4]\"それが懐疑的経験論ってやつだよ。\""
61110-17 = "えへへ……先生がくれた本で勉強したので……！"
61110-23 = "これから小テストをやるよ。"
61110-28 = "え……小……テスト？"
61110-29 = "小テストって……テストってこと……？"
61110-35 = "そうだ。簡略化されたテストだと思ってくれ。"
61110-36 = "今から問題を読み上げるから、答えをノートに書いてね。"
61110-39 = "えっと……？たしか習ったはずなんだけど……。"
61110-40 = "うぅ……思い出せそうで思い出せない……。"
61110-43 = "あ、そうだ！分からなかったら聞けばいいんだっけ。ねえ、答え教えて。"
61110-44 = "それ？えーと、たしか……。"
61110-46 = "そこ、カンニング禁止。"
61110-48 = "カンニング……って何ですか？"
61110-50 = "試験中にズルをすることだよ。他の人に聞くのもダメ。"
61110-52 = "でも分からない時は聞けって……！"
61110-54 = "それは勉強の時の話で……。"
61110-56 = "勉強とテストって違うの！？最初に言ってよ！"
61110-58 = "いや、自分の学力を確認するものだからちょっと考えたら分かるでしょ……#nはぁ、心配になってきたな……。"
61110-65 = "[ns]\"……今日さ。\""
61110-67 = "[ns]\"良い天気だよね。\""
61110-68 = "晴れ間一つない曇り空ですけど。"
61110-73 = "[ns5]\"感じ方は人それぞれだから……。\"\n[ns6]\"私は良い天気だなって思うよ。\""
61110-76 = "そうですか……。"
61110-77 = "それで、何か用ですか？"
61110-78 = "[s]\"天気が良いと、何かもったいなくてさ。\""
61110-79 = "すみません、話の流れがいまいち――"
61110-83 = "[ns]\"よし、今日は校外学習に行こうか。\""
61110-84 = "校外学習……？"
61110-88 = "……本当に、これで良かったんでしょうか。"
61110-89 = "……はい？"
61110-90 = "教室では学べないものがある……？#n授業中にやることは、すべて授業の延長……？"
61110-91 = "ずいぶん都合の良い説明ですね。"
61110-92 = "[s]\"実際にその通りだからね。\""
61110-93 = "なんだか釈然としませんが……。"
61110-94 = "[s]\"これが、大人の特権ってやつだよ。\""
61110-95 = "先輩は座らないんですか？ずっと立ってますけど……。"
61110-96 = "先生もです。足、痛くないですか？"
61110-97 = "ありがとうございます。私は大丈夫です。"
61110-102 = "……なんだか、不思議な気分です。"
61110-103 = "また「外」に出るなんて……。"
61110-104 = "……。"
61110-105 = "でも、前とは全然違う感じで……。"
61110-109 = "うっ……！"
61110-110 = "大丈夫ですか？"
61110-111 = "だ、大丈夫です。#n少し、昔のことを思い出しちゃって……え、えへへ……。"
61110-112 = "……。"
61110-113 = "[s]\"昔のこと？\""
61110-114 = "……。"
61110-115 = "何でもありませんよ、先生。"
61110-116 = "……。"
61110-117 = "昨晩、マイアが悪夢を見たそうでして。"
61110-118 = "[s]\"でも……。\""
61110-119 = "ご心配には及びません。"
61110-123 = "[ns]\"本当に？\""
61110-124 = "はい。"
61110-125 = "この子たちの相談にのるのは、もともと私の役目でしたから。"
61110-126 = "は、はい……大丈夫、ですから……。"
61110-131 = "それで、先生。今日はどこに行くんですか？"
61110-132 = "何がなんだか全然分からなくて……。"
61110-134 = "……。"
61110-135 = "すべて先生が上手くやってくれるんですよね？"
61110-136 = "「校外学習」に行こうと言い出したのも、先生ですし。"
61110-137 = "[s]\"任せてよ！\""
61110-138 = "あの建物……ガラスでできてるのかな？#nすっごくキラキラしてる……。"
61110-139 = "私たちの学園であんなの建てても、すぐ割れたり汚したりしちゃいそう……。"
61110-140 = "スクワッドの皆さんは、こんなのを毎日のように見てたんでしょうね……。"
61110-141 = "一緒に来ればよかったのに。"
61110-142 = "仕方ありません。アリウスを空けるわけにはいきませんから。"
61110-143 = "でも、スクワッドの皆さんに任せても大丈夫なんでしょうか……？"
61110-144 = "……。"
61110-145 = "それも……先生が責任をもってくれます。"
61110-146 = "そうですよね？"
61110-147 = "[s]\"任せて！\""
61110-148 = "……。"
61110-149 = "はぁ……。"
61110-151 = "（スクワッドは「お留守番」という名目でアリウスに残っている）"
61110-152 = "（しかし、校外学習に同行しなかった理由は別にあった）"
61110-154 = "私たちが指名手配中なの忘れてない？"
61110-155 = "存在を晒すのは、できるだけ避けたいんだ。#n自ずと、自由に動ける範囲は限られてしまう。"
61110-156 = "先生と校外学習、行きたかったな……。"
61110-157 = "でも、仕方ないですよね……大丈夫です。#nこういうの、慣れてますから……。"
61110-162 = "私たちのほうが自由に動けるというのも、皮肉な話ですね。"
61110-163 = "ところで……いつまでそんな風に、隠れて生き続けるつもりなんですか？"
61110-164 = "ケンカ売ってる……？"
61110-165 = "……。"
61110-166 = "やめろ、ミサキ。"
61110-167 = "……チッ。"
61110-171 = "スクワッドのことを考えていたんですか？"
61110-172 = "[s]\"！？\""
61110-173 = "どうして分かったのか、という顔をされていますね。"
61110-174 = "先生は顔に出やすいんですよ。特に、こういう時は。"
61110-175 = "……。"
61110-176 = "一つ、お聞きしてもいいですか？"
61110-177 = "先生にとって、スクワッドはアリウスですか？#nそれとも……。"
61110-178 = "いえ、特に意味はありません。ただ、ふと気になっただけです。"
61110-179 = "[s]\"それは……。\""
61110-183 = "おや、仲の良さそうな先生たちだ。#n生徒の面倒を見るのは大変だろうに、ご苦労さんだねぇ。"
61110-184 = "はい……？"
61110-185 = "はい！？"
61110-186 = "なっ、何を言ってるんですか！？"
61110-187 = "なるほど……君は教育実習生なのかな？#n先生の仕事ぶりを見て、よく学ぶんだよ。"
61110-188 = "私はそもそも先生では……！ちょっと！先生も一緒に訂正してください！"
61110-189 = "って、なんで優しく微笑んでいるんですか！"
61110-190 = "はっはっは、初々しくていいこった。仕事の邪魔をして悪かったね。"
61110-191 = "本当に違うんですってば！！"
61110-197 = "……。"
61110-198 = "……。"
61110-199 = "すっ、すごい……！"
61110-200 = "壊れた建物が一個もないよ！？"
61110-201 = "いつもは、ボロボロなのをなんとか補修しながら使ってるのに……。"
61110-202 = "崩れ落ちるまで、何年使い続けられるんだろう……。"
61110-203 = "[s]\"さあ、みんなで道路を渡るよ！\""
61110-204 = "あっちに行くんで――ぐえっ。"
61110-209 = "先生！なんで急に掴むんですか！"
61110-210 = "[s]\"赤信号のときは渡っちゃダメだよ！\""
61110-211 = "あかしんごう……？"
61110-212 = "ここではそうしないといけないんですね……。"
61110-213 = "でも私たち、ちょっとやそっとじゃケガしないですよ？#n結構頑丈ですし……。"
61110-214 = "えっ？車とか、運転してる人のことも考えろって？#n分かるような……分からないような……。"
61110-219 = "ここ……プールって言うんですか……？"
61110-220 = "何をするところなんだろう……。"
61110-221 = "えっ！？泳ぐために使う施設なんだって！"
61110-223 = "きれいな水がこんなに……飲み放題じゃん……！"
61110-230 = "えっ？先生、どうしてそんな顔を……？"
61110-231 = "[s]\"プールの水はね、飲んじゃダメなんだよ……。\" "
61110-236 = "こんなにあるのに！？"
61110-237 = "飲んでもお腹を壊さなさそうだし、なんか新鮮なにおいもするし……。"
61110-238 = "え？これは塩素っていう消毒の匂いなの？"
61110-242 = "水って、消毒するんですか！？"
61110-248 = "高い！！！！"
61110-249 = "空を見て！すっごく青いよ……！"
61110-250 = "あれが川なんだね……。わぁ……。"
61110-251 = "じゃあもしかして、あれが橋なのかな？どうやって作ったんだろう……。"
61110-252 = "[s7]\"周りに迷惑はかけないように気をつけようね。\"\n[s8]\"あんまり大きな声で騒がないようにしようね。\""
61110-255 = "は～い！"
61110-259 = "先生、どうしたんですか？今度は泣きそうな顔して。"
61110-260 = "素直に言うこと聞いてくれて、すごく嬉しい……？"
61110-261 = "そういえば、不思議ですね……。#n前は大人の言うことなんて、聞きたくもなかったのに……。"
61110-262 = "だって、あの頃は殴るか脅すかしかされなかったから……。"
61110-264 = "これ知ってる！ハンバーガーだよね！"
61110-265 = "あっ！食べたことある！先輩がたまに買ってきてくれるやつだ！"
61110-272 = "味は同じはずなのに……なんか違う感じがするね。なんでだろう……？"
61110-273 = "食べる場所が違うからかな……？"
61110-274 = "うん、それはあるかもね。"
61110-279 = "[ns9]\"ちょっと待って！ストップ！\"\n[ns10]\"ディスペンサーに直接口をつけちゃダメだよ！\" "
61110-282 = "自由に飲んでいいって言ってたのに……。"
61110-283 = "……他の人も使うから、ってことですか？"
61110-284 = "……。"
61110-285 = "言われてみれば……そうかも……。"
61110-287 = "えっ、ちゃんと並べて偉いね……って？"
61110-288 = "そんな当たり前のことを褒められると……ちょっと恥ずかしいです。"
61110-289 = "だって逆に、配給の時にちゃんと並ばなかったり、割り込んだりすると……#n気絶するまで罰を受けてたから……。"
61110-292 = "せ、先生……？ここって、何なんですか……？"
61110-293 = "すっごくうるさくて、ピカピカしてて……うわぁぁぁ……。"
61110-294 = "ゲームセンター……？って……なんですか？"
61110-295 = "……。"
61110-296 = "う、嘘つかないでください先生！#n娯楽のための電子装置なんて、あるわけないじゃないですか！"
61110-297 = "え……？ここにあるのが、全部……？"
61110-298 = "ちょっ、ちょっと待ってください！これ、一回遊ぶごとにお金がかかるんですか！？"
61110-299 = "貴重なお金を、こんなことに使うなんて……いいんでしょうか……？"
61110-300 = "[s]\"今日は私がお金を出すから、気にせず遊んでいこう！\""
61110-301 = "ほんとですかっ！？"
61110-309 = "私も正直、理解しかねるんですが……#nこれ、本当に校外学習なんですか……？"
61110-310 = "……はい？関数の概念を身体で学ぶ授業……？#nえっと、何を言ってるんですか？"
61110-311 = "え？関数とはインプットに対してアウトプットが定まる仕組みのことだから……？#nだから、なんなんです……？"
61110-312 = "プレイヤーの操作がもたらす結果を、直感的に体験できるゲームセンターこそ――"
61110-313 = "関数の概念を「身体で学ぶ」のに最適な場所……と？"
61110-314 = "……。"
61110-315 = "それは独創的で、斬新な……でたらめですね……。"
61110-316 = "え？世の中はこんなもんじゃない……？"
61110-317 = "……。"
61110-318 = "それなら、知らないままの方が幸せな気がしますね……。"
61110-322 = "うわぁぁぁ！？何これ！？信じられない！！"
61110-326 = "もう一回！あと一回だけ！！！"
61110-328 = "[ns]\"つ、疲れた……。\""
61110-330 = "お疲れ様でした。"
61110-331 = "……ひとまずは。"
61110-332 = "それで、この公園にはどんな学びが？"
61110-333 = "「休むときはしっかり休む」……たしかに、必要なことですね……。"
61110-334 = "アリウスの「訓練」でも、休憩時間だけは確保していましたから。"
61110-340 = "[ns]\"みんな、元気だなぁ……。\""
61110-341 = "先生も混ざってきてはいかがですか？"
61110-342 = "まぁ、はい……無理だと分かったうえで言っていますが。"
61110-343 = "え、私ですか……？"
61110-344 = "……。"
61110-345 = "……はい、私もそれなりに楽しんでますよ。"
61110-346 = "今は、ですが。"
61110-349 = "（短い沈黙が訪れた）"
61110-350 = "（何を言うでもなく、隣に並んで、空を見上げていた）"
61110-354 = "空……青いですね。"
61110-355 = "土地柄、アリウスの空は灰色が多いんです。"
61110-359 = "……。"
61110-360 = "先生、あの……。"
61110-361 = "もし仮に、誰かが……。"
61110-362 = "本当に、本当に、本当に……#n自分の人生を諦めたいと願っていたら。"
61110-363 = "その人を止める術はあるのでしょうか……。"
61110-367 = "[ns]\"……！？\""
61110-368 = "ふふっ、すごい表情をされますね。"
61110-369 = "急にどうしてこんな話をするのかって？#n……ただなんとなく、ですかね。"
61110-370 = "話を振るのに、特別な理由なんて必要ないでしょう？"
61110-371 = "え？うーん、そうですね……。"
61110-372 = "少なくとも、私は真剣です。"
61110-373 = "なので先生も、真剣に答えていただけると嬉しいのですが。"
61110-374 = "ほら、これも「授業」だと思ってください。"
61110-376 = "（一瞬、誰かの顔が頭をよぎった）"
61110-380 = "（授業の一環として、ちゃんと向き合うことにした）"
61110-382 = "[ns11]\"正直に言えば――\"\n[ns12]\"そんなもの、ないと思う。\""
61110-385 = "は……？"
61110-386 = "ちょっと待ってください、それが教育者の言うことですか！？"
61110-387 = "[s]\"返答に困ってる私が見たかったのかな？\""
61110-388 = "え？い、いえっ！別にそんなつもりじゃ……。"
61110-389 = "……。"
61110-390 = "まったく無かったわけでも、ないですけど……。"
61110-391 = "で、でも！"
61110-392 = "[s13]\"そういうのは普通、「幸せ」に関する話だから。\"\n[s14]\"幸せでなくとも生きるべきか、とかね。\""
61110-395 = "そう……ですね。"
61110-396 = "え……？#n「幸せ」は、ある意味で理想郷みたいなもの……？"
61110-397 = "理想郷は、いつか辿り着くべき場所ではあるけど――"
61110-398 = "今すぐには……なかなか届かない。#n幸せになるために生きるのも、同じこと……。"
61110-399 = "……。"
61110-400 = "では、現実は？"
61110-401 = "[s15]\"生きるためには、幸せが必要なんだと思う。\"\n[s16]\"でも、なかなか手に入るものじゃない。\""
61110-404 = "……本当ですね。"
61110-405 = "努力しても、必ずしも報われるとは限りませんから。"
61110-406 = "[s17]\"だから、もしも誰かが本当に苦しんでいて。\"\n[s18]\"生きるのをやめたいと願っていても……。\""
61110-409 = "……。"
61110-410 = "先生でも答えられない……ということですか……。"
61110-411 = "[s]\"それに、きっと自分を許せないと思う。\""
61110-412 = "はい？それはどういう……？"
61110-413 = "その人を、そこまで追い込んでしまった自分を……。#nもっと早くに助けてあげられなかった自分を……きっと、許せない……。#nそう……ですか……。"
61110-414 = "……。"
61110-415 = "[s]\"たぶん、私たちには――\""
61110-419 = "[ns]\"「お互いの生きる理由になる」って義務があると思うからね。\""
61110-420 = "……！"
61110-421 = "なら、その……。"
61110-422 = "……。"
61110-423 = "これは、たとえ話として聞くんですけど……。"
61110-424 = "先生が……私の理由になってくれることも、あるんですか？"
61110-425 = "[s19]\"なれたらいいな、と思ってるよ。\"\n[s20]\"アリウスの子たちが、スバルの理由であるみたいに。\""
61110-428 = "そ、そこまで言ったつもりは……！？"
61110-429 = "大人には分かってしまう……？"
61110-430 = "……！！"
61110-431 = "先生！こっちに来てください～！"
61110-432 = "[s]\"待ってて！すぐ行くよ！\""
61110-436 = "……。"
61110-437 = "まったく……。"
61110-438 = "何も知らないくせに……。"
61110-439 = "でも……間違ったことばかり言ってるわけじゃなくて……。"
61110-440 = "本当に……。"
61110-441 = "先輩！ここにいたんですね！#nちょっと手伝ってもらいたいことがあって……。"
61110-442 = "あ……はい、もちろんです。なんですか？"
61110-444 = "次回;校外学習（２）"
