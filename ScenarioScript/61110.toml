[translation]
61110-1 = "Episódio 11; Excursão Escolar (1)"
61110-5 = "[ns1]\"Então vamos começar a aula de hoje!\"\n[ns2]\"Bora estudar e se divertir!\""
61110-8 = "Se vai ser divertido ou não, depende de cada um, né..."
61110-9 = "Eu... dei o meu melhor e dei uma estudadinha antes...!"
61110-10 = "[s]\"Opa, que orgulho, estudou adiantada!\""
61110-11 = "Ehehe... eu ganhei... cafuné..."
61110-12 = "Mas não tem garantia nenhuma de que o dia de amanhã vai ser igual... #nem lugar nenhum, né."
61110-13 = "Só porque o sol nasceu no leste hoje... #nnão quer dizer que ele vai nascer no leste amanhã... algo assim..."
61110-14 = "[s3]\"Você estudou bastante, hein.\"\n[s4]\"Isso é o que chamam de empirismo cético.\""
61110-17 = "Ehehe... É que eu estudei com o livro que o Sensei me deu...!"
61110-23 = "Agora vamos ter um testinho surpresa."
61110-28 = "Eh... um... testinho?"
61110-29 = "Testinho... quer dizer, uma prova...?"
61110-35 = "Isso aí. Pensa nisso como uma prova simplificada."
61110-36 = "Vou ler as perguntas em voz alta agora, então anotem as respostas no caderno."
61110-39 = "Ué...? Tenho certeza que a gente aprendeu isso..."
61110-40 = "Ugh... tá quase vindo na memória, mas não vem..."
61110-43 = "Ah, é mesmo! Se eu não souber, é só perguntar. Ei, me passa a resposta."
61110-44 = "Isso? Hmmm, acho que é..."
61110-46 = "Opa, nada de colar aí."
61110-48 = "Colar...? O que é isso?"
61110-50 = "É trapacear durante a prova. Perguntar pros outros também não pode."
61110-52 = "Mas você disse pra perguntar quando a gente não souber...!"
61110-54 = "Isso é na hora de estudar..."
61110-56 = "Estudar e fazer prova são coisas diferentes!? Devia ter avisado antes!"
61110-58 = "Poxa, é pra testar o que você aprendeu, pensando um pouquinho dá pra sacar... #nAi ai, tô começando a ficar preocupado..."
61110-65 = "[ns]\"...Sabe, hoje.\""
61110-67 = "[ns]\"O tempo tá mó bom, né.\""
61110-68 = "O céu tá nubladão, sem uma brecha de sol sequer."
61110-73 = "[ns5]\"Cada um sente de um jeito...\"\n[ns6]\"Eu acho que o tempo tá ótimo.\""
61110-76 = "Sério..."
61110-77 = "E aí, precisa de algo?"
61110-78 = "[s]\"Com um tempo bom desses, dá até dó de ficar aqui.\""
61110-79 = "Foi mal, mas não tô acompanhando o raciocínio—"
61110-83 = "[ns]\"Beleza, hoje a gente vai fazer uma excursão.\""
61110-84 = "Excursão...?"
61110-88 = "...Tem certeza de que isso foi uma boa ideia?"
61110-89 = "...Oi?"
61110-90 = "Tem coisas que não dá pra aprender na sala de aula...? #nTudo que a gente faz no horário de aula é uma extensão da aula...?"
61110-91 = "Que desculpinha mais conveniente, hein."
61110-92 = "[s]\"Mas é a pura verdade.\""
61110-93 = "Ainda não tô muito convencida, mas..."
61110-94 = "[s]\"Isso é o que a gente chama de privilégio de adulto.\""
61110-95 = "Senpai, você não vai sentar? Tá em pé esse tempo todo..."
61110-96 = "O Sensei também. Não tão com dor na perna?"
61110-97 = "Valeu, mas eu tô de boa."
61110-102 = "...Que sensação doida."
61110-103 = "Sair pro 'lado de fora' de novo..."
61110-104 = "..."
61110-105 = "Mas a vibe tá totalmente diferente de antes..."
61110-109 = "Ugh...!"
61110-110 = "Você tá bem?"
61110-111 = "T-Tô de boa. #nSó lembrei de umas paradas do passado... e-ehehe..."
61110-112 = "..."
61110-113 = "[s]\"Coisas do passado?\""
61110-114 = "..."
61110-115 = "Não é nada, Sensei."
61110-116 = "..."
61110-117 = "Pelo visto a Maia teve um pesadelo na noite passada."
61110-118 = "[s]\"Mas...\""
61110-119 = "Não precisa esquentar a cabeça com isso."
61110-123 = "[ns]\"Jura?\""
61110-124 = "Aham."
61110-125 = "Ajudar essas meninas já era meu papel desde o começo, afinal."
61110-126 = "S-Sim... Eu tô bem, sério..."
61110-131 = "Mas e aí, Sensei. Pra onde a gente vai hoje?"
61110-132 = "Eu tô boiando total..."
61110-134 = "..."
61110-135 = "Você já tem tudo esquematizado, né, Sensei?"
61110-136 = "Foi você quem inventou essa história de 'excursão', no fim das contas."
61110-137 = "[s]\"Deixa comigo!\""
61110-138 = "Aquele prédio... será que é todo de vidro? #nTá brilhando muito..."
61110-139 = "Se a gente construísse um desses na nossa academia, iam quebrar ou sujar rapidinho..."
61110-140 = "O pessoal do Esquadrão devia ver essas coisas todo santo dia..."
61110-141 = "Elas deviam ter vindo com a gente."
61110-142 = "Fazer o quê. Não dá pra deixar a Arius vazia."
61110-143 = "Mas será que tem problema deixar tudo nas mãos do Esquadrão...?"
61110-144 = "..."
61110-145 = "O Sensei... assume a bronca por isso também."
61110-146 = "Né?"
61110-147 = "[s]\"Pode deixar!\""
61110-148 = "..."
61110-149 = "Aiai..."
61110-151 = "(O Esquadrão ficou na Arius com a desculpa de 'tomar conta da casa')"
61110-152 = "(Mas o motivo real pra não terem vindo na excursão era outro)"
61110-154 = "Vocês não esqueceram que a gente tá sendo procurada, né?"
61110-155 = "Queremos evitar aparecer o máximo possível. #nNaturalmente, nossa área de circulação fica limitada."
61110-156 = "Queria ter ido na excursão com o Sensei..."
61110-157 = "Não tem jeito... mas de boa. #nA gente já tá acostumada com isso..."
61110-162 = "Chega a ser irônico que a gente seja quem pode andar mais livremente."
61110-163 = "Aliás... até quando vocês pretendem viver se escondendo assim?"
61110-164 = "Tá querendo arrumar treta...?"
61110-165 = "..."
61110-166 = "Para com isso, Misaki."
61110-167 = "...Tsc."
61110-171 = "Tava pensando no Esquadrão?"
61110-172 = "[s]\"!?\""
61110-173 = "Sua cara tá tipo 'como você adivinhou?'."
61110-174 = "Você é um livro aberto, Sensei. Principalmente nessas horas."
61110-175 = "..."
61110-176 = "Posso te fazer uma pergunta?"
61110-177 = "Pra você, Sensei, o Esquadrão é a Arius? #nOu será que..."
61110-178 = "Deixa pra lá, não tem nenhum significado oculto não. Só me bateu a curiosidade."
61110-179 = "[s]\"Isso é...\""
61110-183 = "Olha só, que Senseies mais unidos. #nCuidar dos alunos deve dar um trabalhão, bom serviço pra vocês."
61110-184 = "Como é...?"
61110-185 = "Hein!?"
61110-186 = "D-Do que o senhor tá falando!?"
61110-187 = "Saquei... Você é estagiária, né? #nPresta atenção no trabalho do Sensei pra aprender direitinho."
61110-188 = "Eu nem sou Senseia pra começo de conversa...! Ei! Sensei, me ajuda a desmentir isso aqui!"
61110-189 = "Pera, por que você tá aí com esse sorrisinho fofo?!"
61110-190 = "Hahaha, essa inocência é uma beleza. Desculpa atrapalhar o trabalho de vocês."
61110-191 = "Tô falando que não é nada disso!!"
61110-197 = "..."
61110-198 = "..."
61110-199 = "Q-Que daora...!"
61110-200 = "Não tem um único prédio destruído!?"
61110-201 = "Normalmente, a gente usa os prédios caindo aos pedaços, dando um jeitinho de remendar..."
61110-202 = "Quantos anos será que dá pra usar isso até desabar..."
61110-203 = "[s]\"Bora lá, todo mundo atravessando a rua junto!\""
61110-204 = "Eu vou lá pra— gué."
61110-209 = "Sensei! Por que me puxou do nada!"
61110-210 = "[s]\"Não pode atravessar quando o sinal tá vermelho!\""
61110-211 = "Sinal vermelho...?"
61110-212 = "Então é assim que funciona aqui..."
61110-213 = "Mas a gente não se machuca com qualquer coisinha, sabia? #nSomos bem duronas..."
61110-214 = "Hã? É pra pensar nos carros e nas pessoas que tão dirigindo? #nAcho que entendi... ou não..."
61110-219 = "Isso aqui... se chama piscina, é...?"
61110-220 = "O que será que o pessoal faz aqui..."
61110-221 = "Sério!? Disseram que é um lugar pra nadar!"
61110-223 = "Tem tanta água limpa... É open bar...!"
61110-230 = "Ué? Sensei, por que essa cara...?"
61110-231 = "[s]\"Sabe o que é, não pode beber a água da piscina...\""
61110-236 = "Mesmo tendo tanta água assim!?"
61110-237 = "Parece que não daria dor de barriga se bebesse, e até tem um cheiro meio refrescante..."
61110-238 = "Quê? Esse é o cheiro de um desinfetante chamado cloro?"
61110-242 = "A água é desinfetada!?"
61110-248 = "Que alto!!!!"
61110-249 = "Olha o céu! Tá muito azul...!"
61110-250 = "Então aquilo é um rio, né... Uau..."
61110-251 = "Será que aquilo ali é uma ponte? Como será que construíram..."
61110-252 = "[s7]\"Vamos tomar cuidado pra não incomodar as pessoas em volta, beleza?\"\n[s8]\"E vamos tentar não fazer muito barulho.\""
61110-255 = "Beleza!"
61110-259 = "Sensei, qual é? Agora tá com cara de choro."
61110-260 = "Você tá super feliz que a gente tá sendo obediente...?"
61110-261 = "Pensando bem, é meio louco isso... #nAntes a gente nem queria saber de ouvir o que adulto falava..."
61110-262 = "É que naquela época eles só batiam e ameaçavam a gente..."
61110-264 = "Isso aqui eu conheço! É hambúrguer!"
61110-265 = "Ah! Eu já comi isso! É aquilo que a Senpai compra pra gente de vez em quando!"
61110-272 = "O gosto devia ser o mesmo... mas parece diferente. Por que será...?"
61110-273 = "Será que é porque a gente tá comendo num lugar diferente...?"
61110-274 = "É, pode ser isso."
61110-279 = "[ns9]\"Pera aí! Parou!\"\n[ns10]\"Não pode botar a boca direto na máquina!\""
61110-282 = "Mas você disse que era à vontade..."
61110-283 = "...É porque as outras pessoas também usam?"
61110-284 = "..."
61110-285 = "Pensando bem... faz sentido..."
61110-287 = "Hã? Mandou bem fazendo a fila direitinho... você diz?"
61110-288 = "Ganhar elogio por uma coisa tão básica assim... dá até um pouco de vergonha."
61110-289 = "Porque na hora da distribuição, se a gente não fizesse a fila direito ou furasse... #nGanhava castigo até desmaiar..."
61110-292 = "S-Sensei...? Que lugar é esse...?"
61110-293 = "Mó barulhão, cheio de luzes piscando... uauuu..."
61110-294 = "Fliperama...? O que... é isso?"
61110-295 = "..."
61110-296 = "P-Para de mentir, Sensei! #nÉ óbvio que não existe aparelho eletrônico só pra diversão!"
61110-297 = "Hã...? Tudo isso aqui é... pra isso...?"
61110-298 = "P-Pera aí um instante! Tem que pagar toda vez que for jogar!?"
61110-299 = "Gastar dinheiro suado com uma coisa dessas... será que rola mesmo...?"
61110-300 = "[s]\"Hoje eu pago, então bora jogar sem peso na consciência!\""
61110-301 = "Sério mesmo!?"
61110-309 = "Na real, até eu tô achando difícil de engolir... #nIsso é uma excursão escolar mesmo...?"
61110-310 = "...Oi? Uma aula pra aprender o conceito de função na prática...? #nComo assim, do que você tá falando?"
61110-311 = "Hã? Porque uma função é um sistema que determina um output a partir de um input...? #nE daí...?"
61110-312 = "O fliperama, onde você experimenta de forma intuitiva os resultados que os controles do jogador causam, é o lugar perfeito—"
61110-313 = "Pra 'aprender na prática' o conceito de funções... é isso?"
61110-314 = "..."
61110-315 = "Isso é criativo, original... e uma baita conversa fiada..."
61110-316 = "Hã? O mundo não é tão simples assim...?"
61110-317 = "..."
61110-318 = "Sendo assim, acho que eu era mais feliz na ignorância..."
61110-322 = "Uauuuu!? Que daora!? Não tô acreditando!!"
61110-326 = "Mais uma! Só mais uma!!!"
61110-328 = "[ns]\"C-Cansei...\""
61110-330 = "Bom trabalho."
61110-331 = "...Por enquanto."
61110-332 = "E aí, que lição esse parque tem pra ensinar?"
61110-333 = "'Quando for descansar, descansa direito'... É, faz sentido..."
61110-334 = "Até nos 'treinos' da Arius, a gente fazia questão de garantir os horários de pausa."
61110-340 = "[ns]\"Pelo visto tá todo mundo com a corda toda...\""
61110-341 = "Por que você não se junta a elas, Sensei?"
61110-342 = "Pois é, né... Tô falando isso sabendo que é impossível."
61110-343 = "Ué, eu...?"
61110-344 = "..."
61110-345 = "...Sim, eu tô me divertindo do meu jeito também."
61110-346 = "Pelo menos por agora."
61110-349 = "(Ficou um breve silêncio.)"
61110-350 = "(Sem dizer nada, ficamos lado a lado, olhando pro céu.)"
61110-354 = "O céu... tá bem azul."
61110-355 = "Por causa da região, o céu da Arius é quase sempre cinza."
61110-359 = "..."
61110-360 = "Sensei, então..."
61110-361 = "Só na teoria, se alguém..."
61110-362 = "Tivesse mesmo, de verdade, de coração... #nvontade de desistir da própria vida."
61110-363 = "Teria algum jeito de impedir essa pessoa...?"
61110-367 = "[ns]\"...!?\""
61110-368 = "Hehe, que cara é essa que você fez."
61110-369 = "Tá se perguntando por que eu toquei nesse assunto do nada? #n...Foi só um pensamento aleatório."
61110-370 = "Não precisa ter um motivo especial pra puxar assunto, né?"
61110-371 = "Hã? Hmm, é..."
61110-372 = "Mas, eu tô falando sério."
61110-373 = "Então eu ia ficar feliz se você me respondesse sério também, Sensei."
61110-374 = "Saca só, encara isso como uma 'aula' também."
61110-376 = "(Por um instante, o rosto de alguém passou pela minha cabeça.)"
61110-380 = "(Como parte da aula, decidi encarar a pergunta de frente.)"
61110-382 = "[ns11]\"Sendo bem sincero—\"\n[ns12]\"Acho que não existe nada do tipo.\""
61110-385 = "Hã...?"
61110-386 = "Peraí, isso é coisa que um educador diga!?"
61110-387 = "[s]\"Queria me ver sem saber o que responder?\""
61110-388 = "Hã? N-Não! Longe de mim..."
61110-389 = "..."
61110-390 = "Quer dizer, não é que eu não tenha pensado nisso..."
61110-391 = "M-Mas mesmo assim!"
61110-392 = "[s13]\"É que normalmente, esse tipo de papo gira em torno de 'felicidade'.\"\n[s14]\"Tipo, se a gente deve viver mesmo sem ser feliz.\""
61110-395 = "Entendi..."
61110-396 = "Hã...? #n'Felicidade' é tipo uma utopia, é isso...?"
61110-397 = "A utopia é um lugar onde a gente tem que chegar um dia, mas—"
61110-398 = "No momento... tá meio inatingível. #nViver pra ser feliz dá no mesmo..."
61110-399 = "..."
61110-400 = "Mas e na vida real?"
61110-401 = "[s15]\"Acho que a gente precisa de felicidade pra viver.\"\n[s16]\"Mas não é uma coisa tão fácil de conseguir.\""
61110-404 = "...Pior que é verdade."
61110-405 = "Mesmo se esforçando, não é garantia de que vai dar certo."
61110-406 = "[s17]\"Por isso, se alguém estiver sofrendo de verdade.\"\n[s18]\"E quiser desistir de viver...\""
61110-409 = "..."
61110-410 = "Nem você tem a resposta, Sensei... é isso que você tá dizendo..."
61110-411 = "[s]\"Além disso, com certeza eu não conseguiria me perdoar.\""
61110-412 = "Hã? Como assim...?"
61110-413 = "Eu não ia me perdoar por ter deixado a pessoa chegar nesse ponto... #nPor não ter conseguido ajudar antes... Tenho certeza que não ia me perdoar... #nEntendo..."
61110-414 = "..."
61110-415 = "[s]\"Talvez, todos nós—\""
61110-419 = "[ns]\"Tenhamos o dever de nos tornarmos 'o motivo de viver' um do outro.\""
61110-420 = "...!"
61110-421 = "Então, er..."
61110-422 = "..."
61110-423 = "Só por curiosidade mesmo, mas..."
61110-424 = "Tem alguma chance de você... virar o meu motivo também, Sensei?"
61110-425 = "[s19]\"Espero que sim.\"\n[s20]\"Igual as crianças da Arius parecem ser o motivo da Subaru.\""
61110-428 = "E-Eu não quis chegar a tanto...!?"
61110-429 = "Os adultos simplesmente sacam essas coisas...?"
61110-430 = "...!!"
61110-431 = "Sensei! Chega mais!"
61110-432 = "[s]\"Peraí! Já tô indo!\""
61110-436 = "..."
61110-437 = "Fala sério..."
61110-438 = "Fica aí se fazendo de desentendido..."
61110-439 = "Mas... não é como se ele só falasse besteira..."
61110-440 = "Sinceramente..."
61110-441 = "Senpai! Então era aqui que você tava! #nPreciso de uma mãozinha sua com uma parada..."
61110-442 = "Ah... claro, pode falar. O que foi?"
61110-444 = "Próximo Episódio: Excursão Escolar (2)"