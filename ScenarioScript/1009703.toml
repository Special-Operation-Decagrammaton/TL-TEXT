[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1009703-1 = "Perigo Próximo" 
1009703-2 = "（Ao ver a mensagem da Moe, fui correndo para o lugar que ela me mandou.）" 
1009703-7 = "[ns] \"Moe, você está bem!?\"" 
1009703-8 = "Ah, Sensei.\nChegou mais rápido do que eu pensei." 
1009703-9 = "......Pera aí, você veio correndo?" 
1009703-10 = "[s1] \"Mas é claro, você mandou que as explosões não paravam...!\"\n[s2] \"E aí, conseguiu dar um jeito?\"" 
1009703-13 = "Explosões...?" 
1009703-14 = "Aaah~, cê entendeu errado, Sensei." 
1009703-15 = "A explosão não parou, ou melhor... ela tá rolando nesse exato segundo." 
1009703-16 = "[s] \"...Nesse exato segundo?\"" 
1009703-20 = "[ns] \"Que barulho é esse!?\"" 
1009703-21 = "Aaah, isso, é isso. É exatamente esse som...!" 
1009703-22 = "Como eu pensava, se você quer assar mariscos, tem que ser no fogo alto!" 
1009703-23 = "[s] \"Mariscos...?\"" 
1009703-24 = "É, eu tava assando mariscos na brasa." 
1009703-25 = "Eu ajudei os moradores com algumas coisas e eles me deram uns mariscos em agradecimento." 
1009703-26 = "Eles são fresquinhos, então daria pra comer cru de boa, mas...\nAssar eles na brasa é a melhor opção, né!" 
1009703-27 = "E quando o fogo tá altão, de vez em quando eles estouram tipo um PÁ! e soltam umas explosões maneiras..." 
1009703-28 = "......Haa, haa.\nEssa tensão de não saber quando vai explodir, é um tesão que eu não consigo parar de sentir." 
1009703-29 = "[s] \"...Então a explosão que você falou era o som dos mariscos assando no fogo...\"" 
1009703-33 = "[ns3] \"Não seria melhor assar em fogo baixo com calma?\"\n[ns4] \"Assim eles não vão explodir――\"" 
1009703-36 = "O que cê tá falando, Sensei!?" 
1009703-37 = "Assar marisco em fogo baixo..." 
1009703-38 = "Isso pode até impedir eles de explodirem,\nMas ia ressecar toda a água e a carne ia ficar dura igual sola de sapato!" 
1009703-39 = "Se você tem medo de umas explosões, nunca vai chegar no verdadeiro ápice do sabor." 
1009703-40 = "Coisas deliciosas sempre vêm acompanhadas de explosões! Fato!" 
1009703-41 = "[s5] \"Vindo da Moe, essa frase teve um nível bizarro de persuasão...\"\n[s6] （E por que eu sinto que já ouvi uma frase parecida em outro lugar...?）" 
1009703-44 = "Ah, enquanto a gente batia papo, o fogo já assou tudo." 
1009703-45 = "Come aí, Sensei.\nComo foram pescados agorinha, é uma delícia até sem tempero." 
1009703-46 = "[s7] \"Opa, é verdade...\"\n[s8] \"Tá cheio do umami e do sabor natural do marisco.\"" 
1009703-49 = "Fufu, não disse?" 
1009703-50 = "A parada é tão fresca que nem precisa botar mais nada em cima." 
1009703-51 = "[s9] \"Mas comer só marisco dá uma fomezinha de outras coisas...\"\n[s10] \"Você tem mais algum ingrediente sobrando?\"" 
1009703-54 = "Pra ser sincera, eu trouxe uma coisinha pra servir de sobremesa..." 
1009703-55 = "......Mochis congelados!" 
1009703-56 = "[s] Mochi congelado...?" 
1009703-57 = "Os moradores tinham me dado uns mochis antes, e eu joguei no freezer pra guardar." 
1009703-58 = "......Pô, tão branquinhos de tanto gelo grudado." 
1009703-62 = "Kuhi, kuhihi.\nSe eu jogar isso no fogo alto agora..." 
1009703-63 = "[s] \"Espera aí, Moe!\"" 
1009703-70 = "Aah, aaah..." 
1009703-71 = "O mochi congelado tá estufando bizarramente rápido, parece que vai pipocar a qualquer segundo...!" 
1009703-75 = "E junto com os estalos dos mariscos explodindo...!" 
1009703-76 = "Haa, haa... É isso, é EXATAMENTE isso...!" 
1009703-77 = "O aroma da ruína e do apocalipse tá subindo direto do carvão...!" 
1009703-78 = "[s] \"O cheiro é só o dos mariscos e mochis queimando, né!?\"" 
1009703-80 = "（Depois disso, eu e a Moe nos deliciamos com uma refeição barulhenta, com os estalos das explosões dos mariscos e mochis ao nosso redor.）" 