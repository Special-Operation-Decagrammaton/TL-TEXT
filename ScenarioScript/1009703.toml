[translation]
1009703-1 = "Danger close"
1009703-2 = "（モエのメッセージを見て、教えてもらった場所に急いで向かった）"
1009703-7 = "[ns] \"モエ、大丈夫！？\""
1009703-8 = "あ、先生。#n思ったより早かったね。"
1009703-9 = "……それより、走ってきたの？"
1009703-10 = "[s1] \"だって、爆発が止まらないって……！\"\n[s2] \"もう何とかなったの？\""
1009703-13 = "爆発……？"
1009703-14 = "あ～、誤解だよ先生。"
1009703-15 = "爆発はまだというか、進行中というか。"
1009703-16 = "[s] \"……進行中？\""
1009703-20 = "[ns] \"何の音！？\""
1009703-21 = "ああ、これこれ。この音……！"
1009703-22 = "やっぱり、貝は強火で焼かないとね！"
1009703-23 = "[s] \"貝……？\""
1009703-24 = "うん、炭火で貝を焼いていたの。"
1009703-25 = "住民の手伝いをしたら、お礼に貝を分けてくれてさ。"
1009703-26 = "新鮮な貝だし、そのまま食べても美味しいけど……。#n焼いて食べるのが一番だよね！"
1009703-27 = "強火だと、たまにパッ！って爆発することもあるし……。"
1009703-28 = "……はぁ、はぁ。#nいつ爆発するか分からない緊張感で、興奮が止まらないね。"
1009703-29 = "[s] \"爆発って、貝の話だったんだ……。\""
1009703-33 = "[ns3] \"弱火でじっくり調理したら良いんじゃない？\"\n[ns4] \"そうすれば、爆発せずに――\""
1009703-36 = "なに言ってるの、先生！？"
1009703-37 = "貝を弱火で焼くなんて……。"
1009703-38 = "たしかに爆発は防げるかもしれないけど、#n水分が飛んで身が固くなるでしょ！"
1009703-39 = "爆発を恐れてちゃ、本当の美味しさにたどり着けないよ。"
1009703-40 = "美味しいものには、爆発が付きものだからね！"
1009703-41 = "[s5] \"モエに言われると、謎の説得力が……。\"\n[s6] （どこかで似たようなセリフを聞いたような……？）"
1009703-44 = "あ、話しているうちに火が通ったね。"
1009703-45 = "先生も食べてみて。#n採れたてだから、このままでも美味しいよ。"
1009703-46 = "[s7] \"あ、本当だ……。\"\n[s8] \"貝の旨味が詰まってるね。\""
1009703-49 = "ふふっ、そうでしょ？"
1009703-50 = "新鮮だから、余計な味付けは不要なの。"
1009703-51 = "[s9] \"でも、貝だけだと寂しいな……。\"\n[s10] \"ほかにはどんな食材がある？\""
1009703-54 = "実は、デザートに用意してきた物が……。"
1009703-55 = "……冷凍餅だよ！"
1009703-56 = "[s] 冷凍餅……？"
1009703-57 = "前に住民の人からもらったお餅を、冷凍保存してたんだ。"
1009703-58 = "……わ、氷がいっぱい付いてる。"
1009703-62 = "くひっ、くひひ。#nもし、これを強火で焼いたら……。"
1009703-63 = "[s] \"待って、モエ！\""
1009703-70 = "ああ、あぁ……。"
1009703-71 = "冷凍餅が急に膨らんで、今にも飛び跳ねそう……！"
1009703-75 = "一緒に貝が爆発する音まで……！"
1009703-76 = "はあ、はあ……これだよ、これ……！"
1009703-77 = "炭の上で破滅の匂いが立ち上ってる……！"
1009703-78 = "[s] \"貝と餅を焼く匂いだよね！？\""
1009703-80 = "（その後、モエと一緒に爆発する貝やお餅を囲みながら、騒がしくも楽しい食事を楽しんだ）"
