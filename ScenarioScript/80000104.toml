[translation]
80000104-1 = "Não podemos perdoar isso."
80000104-2 = "Sensei! Por aqui, aqui!"
80000104-3 = "Fufu, eu estava te esperando! Você sabe que dia é hoje, não sabe?"
80000104-4 = "……Hm? Esqueceu?#nBem, acontece às vezes."
80000104-5 = "Hoje é……"
80000104-6 = "[s1] \"……Ah! Dia dos Namorados!\"\n[s2] \"Por acaso, é o Dia dos Namorados?\""
80000104-9 = "……?"
80000104-10 = "……Sensei?"
80000104-11 = "O que você disse……?"
80000104-12 = "[s3] \"……Eh?\"\n[s4] \"E-eu me enganei……?\""
80000104-15 = "……Sensei."
80000104-16 = "Você realmente achou que eu, a chefe do Departamento de Obras, que não sou ninguém menos que..."
80000104-17 = "Celebraria um evento que é a personificação do capitalismo criado pela burguesia?"
80000104-18 = "[s] \"Mas, por apenas um dia……\""
80000104-19 = "Absolutamente não!"
80000104-20 = "Se for só por um dia, os consumidores acabam desistindo e comprando mesmo que o preço do chocolate esteja alto!"
80000104-21 = "Além disso! Muitos fabricantes apenas mudam a embalagem dos chocolates e os vendem como se fossem de Dia dos Namorados!"
80000104-22 = "Isso não passa da tirania de grandes empresas que tratam os sentimentos das pessoas como forma de ganhar dinheiro!"
80000104-23 = "Não podemos perdoar isso de jeito nenhum!#nSe pudesse, eu apagaria esse dia do calendário!"
80000104-24 = "[s5] \"Sinto que já ouvi alguém dizer isso antes……\"\n[s6] \"Então, por que você me chamou hoje……?\""
80000104-27 = "Você realmente não se lembra……"
80000104-28 = "Hoje é o dia em que eu disse que te levaria a um restaurante de katsudon delicioso."
80000104-29 = "Vamos logo. Tem um lugar muito bom aqui perto."
80000104-30 = "Sempre tem fila, então é melhor nos apressarmos!"
80000104-35 = "（Depois disso, comi com a Minori em um restaurante próximo）"
80000104-36 = "（Como a Minori disse, o lugar era nota dez tanto no sabor quanto na quantidade）"
80000104-38 = "Ah, estava delicioso hoje também! Eu adoro aquele sabor simples!"
80000104-39 = "Ah, é verdade, você está ocupado hoje, não está?#nQuando marcamos, você disse que tinha compromissos depois."
80000104-40 = "Então, antes de você ir, pegue isto……"
80000104-45 = "[ns7] \"……Hm? Posso aceitar?\"\n[ns8] \"Você não disse que não celebrava o Dia dos Namorados?\""
80000104-48 = "I-isso é, bem……"
80000104-49 = "Eu não perdoo a tirania das empresas, mas isso não significa que eu não possa te dar um chocolate……"
80000104-50 = "É uma barra de chocolate que costumo comer depois de trabalhar no Departamento de Obras.#nO nível de doçura é perfeito."
80000104-51 = "Por isso……"
80000104-55 = "P-por que você está olhando tanto?#nÉ constrangedor ser encarada assim!"
80000104-56 = "E-eu já vou indo!! Tenha um bom dia, Sensei!!"
80000104-57 = "……Até mais!!"
80000104-64 = "（……De fato, a doçura era requintada e deliciosa）"
