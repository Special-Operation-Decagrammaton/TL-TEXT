[translation]
80000104-1 = "許してはいけない"
80000104-2 = "先生！こっちだ、こっち！"
80000104-3 = "ふふ、待ってたぞ！今日が何の日かくらい分かっているだろう？"
80000104-4 = "……ん？忘れたのか？#nまあ、そういうときもあるか。"
80000104-5 = "今日は……"
80000104-6 = "[s1] \"……あ！バレンタインデー！\"\n[s2] \"もしかして、バレンタインデー？\""
80000104-9 = "……？"
80000104-10 = "……先生？"
80000104-11 = "何だって……？"
80000104-12 = "[s3] \"……えっ？\"\n[s4] \"ま、間違えてたかな……？\""
80000104-15 = "……先生。"
80000104-16 = "まさか、他の誰でもない工務部の部長である私が……"
80000104-17 = "ブルジョワの作った資本主義の塊のようなイベントを祝うとでも思ったか？"
80000104-18 = "[s] \"でも、一日くらいなら……\""
80000104-19 = "絶対にダメだ！"
80000104-20 = "一日だけならと、消費者はチョコレートの値段が高くても諦めて買うことになるんだぞ！"
80000104-21 = "しかも！バレンタインチョコは包装変えただけのものを販売するメーカーも多いじゃないか！"
80000104-22 = "これは人の心を金儲けとして扱う巨大企業の横暴に他ならない！"
80000104-23 = "絶対に許してはいけない！#nできることなら、カレンダーからこの日を消し去ってしまいたいくらいだ！"
80000104-24 = "[s5] \"そう言っていた人が居たような気も……\"\n[s6] \"じゃあ、今日は何の用で……？\""
80000104-27 = "本当に覚えていないのか……"
80000104-28 = "今日は美味しいカツ丼屋を紹介すると言った日じゃないか。"
80000104-29 = "早く行こう。この近くに、すごく美味しいお店があるんだ。"
80000104-30 = "いつも行列ができてるくらいだ、急いで行くとしよう！"
80000104-35 = "（その後、近くの食堂でミノリとご飯を食べた）"
80000104-36 = "（ミノリの言う通り、味も量も満点のお店だった）"
80000104-38 = "あぁ、今日も美味しかった！あの素朴な味が気に入ってるんだ！"
80000104-39 = "そうだ、先生は今日も忙しいんだろう？#n約束したとき、後ろに予定があると言っていたからな。"
80000104-40 = "じゃあ、行く前にこれを……"
80000104-45 = "[ns7] \"……ん？もらっていいの？\"\n[ns8] \"バレンタインデーは祝わないって言ってなかった？\""
80000104-48 = "そ、それは、その……"
80000104-49 = "企業の横暴を許しはしないが、チョコレートを渡してはいけないわけじゃないからな……"
80000104-50 = "工務部で働いた帰りによく食べるチョコレートバーだ。#nちょうどいい甘さが美味しいぞ。"
80000104-51 = "だから……"
80000104-55 = "な、何をそんなに見てるんだ？#nそんなに見られると困るじゃないか！"
80000104-56 = "わ、私は先に行く！！先生も良い一日を！！"
80000104-57 = "……じゃあ、また！！"
80000104-64 = "（……たしかに、絶妙な甘さが美味しかった）"
