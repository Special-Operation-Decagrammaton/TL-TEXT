[translation]
1012105-1 = "Linda floração debaixo d'água"

1012105-2 = "(Cheguei um pouco mais cedo para não deixar Yukari esperando.)"

1012105-3 = "(No entanto, de forma incomum, Yukari não apareceu mesmo quando a hora marcada se aproximava.)"

1012105-7 = "(De repente, vi algo se movendo em direção ao mar.)"

1012105-11 = "...? #n...!"

1012105-12 = "[ns1] (Essa é Yukari...!?)\n[ns2] (Afogamento...!?)"

1012105-15 = "[ns] Pule na água."

1012105-19 = "[ns] Abra os olhos."

1012105-22 = "[wa:880]― [log=유카리 수영복] (Sensei! [wa:1660] Você veio [wa:1320] nos procurar!) [/log]"

1012105-25 = "[wa:1530]― [log=유카리 수영복] (Normalmente [wa:1220] o mar eu só conseguia ver de longe...)[/log]"

1012105-27 = "― [log=유카리 수영복] (Não posso acreditar que havia um [wa:1160]cenário tão lindo escondido[wa:1410])[/log]"

1012105-30 = "[wa:790]― [log=유카리 수영복] (Não acredito que posso assistir com meu [wa:1600] professor [wa:1020] assim [wa:810]...)[/log]"

1012105-32 = "― [log=유카리 수영복] (Ah, [wa:2070] minha família está [wa:1260] que feliz [wa:490]) [/log]"

1012105-35 = "[wa:210]― [log=유카리 수영복] (Uh... [wa:1520] Professor? [wa:1650] De alguma forma [wa:810] você parece pálido...?) [/log]"

1012105-37 = "― [log=유카리 수영복] (Ambos, [wa:850]Há algo estranho?)[/log]"

1012105-40 = "[wa:180]― [log=유카리 수영복] (Acima...? [wa:1250]Há apenas o sol acima...)[/log]"

1012105-42 = "― [log=유카리 수영복] (O que...? [wa:830] Não é mesmo...?) [/log]"

1012105-45 = "Puhah!"

1012105-46 = "Hehe! Estou encharcado até o topo da cabeça!"

1012105-47 = "[ns3] \"Estou feliz que você não estava se afogando.\"\n[ns4] \"O que você estava fazendo?\""

1012105-50 = "Afogamento...?"

1012105-51 = "Ha... é por isso que você correu com pressa! ? #nLamentamos sua preocupação...!"

1012105-52 = "Sem nem pensar nisso, fiquei absorto olhando as flores..."

1012105-53 = "Bem...cheguei um pouco antes do horário prometido, então estava olhando para o mar..."

1012105-54 = "Quando vi as flores refletidas no mar límpido, meu coração deu um pulo, e sem mais nem menos..."

1012105-55 = "Sinto muito por causar preocupação a você."

1012105-56 = "Estou feliz por você estar preocupado comigo...#nÉ uma sensação muito estranha."

1012105-57 = "[s5] \"Enquanto Yukari estiver segura, tudo bem.\"\n[s6] \"Vamos jogar o máximo que pudermos hoje!""

1012105-60 = "Sim……! Sim! Claro!"

1012105-62 = "(Depois disso, nadamos no mar até o pôr do sol)"

