[translation]
1012105-1 = "水中に咲く艶やかな"
1012105-2 = "（ユカリを待たせないように、少し早めに到着した）"
1012105-3 = "（しかし珍しく、約束の時間が近づいてもユカリは姿を見せなかった）"
1012105-7 = "（ふと、海の方で何かが動いているのが見えた）"
1012105-11 = "……？#n……！"
1012105-12 = "[ns1] （あれはユカリ……！？）\n[ns2] （まさか溺れて……！？）"
1012105-15 = "[ns] 水の中へ飛び込む。"
1012105-19 = "[ns] 目を開ける。"
1012105-22 = "[wa:880]― [log=유카리 수영복]（先生！[wa:1660]身共を探しにいらして[wa:1320]くださったのですね！）[/log]"
1012105-25 = "[wa:1530]― [log=유카리 수영복]（いつもは[wa:1220]遠くから見ていただけの海が……）[/log]"
1012105-27 = "― [log=유카리 수영복]（こんなにも[wa:1160]美しい光景を秘めて[wa:1410]いたなんて）[/log]"
1012105-30 = "[wa:790]― [log=유카리 수영복]（それを、[wa:1600]先生と[wa:1020]こうして二人で[wa:810]眺めることができるだなんて……）[/log]"
1012105-32 = "― [log=유카리 수영복]（ああ、[wa:2070]身共は[wa:1260]なん[wa:490]て幸せ者なのでしょう）[/log]"
1012105-35 = "[wa:210]― [log=유카리 수영복]（あれ……[wa:1520]先生？[wa:1650]なんだか[wa:810]顔色が……？）[/log]"
1012105-37 = "― [log=유카리 수영복]（身共、[wa:850]何かおかしなことでも？）[/log]"
1012105-40 = "[wa:180]― [log=유카리 수영복]（上……？[wa:1250]上にはお日様しかありませんよ……）[/log]"
1012105-42 = "― [log=유카리 수영복]（え……？[wa:830]そうじゃない……？）[/log] "
1012105-45 = "ぷはっ！"
1012105-46 = "ふふっ！頭の先まで、びしょ濡れですの！"
1012105-47 = "[ns3] \"溺れていたわけじゃなくてよかった。\"\n[ns4] \"何をしてたの？\""
1012105-50 = "溺れて……？"
1012105-51 = "はっ……それで慌てて駆けつけてくださったんですの！？#nご心配をおかけしました……！"
1012105-52 = "そんなこととも思わず、花を見ることに夢中になっておりまして……。"
1012105-53 = "それが、その……約束の時間より少し早く着いたので、#n海を眺めておりまして……。"
1012105-54 = "透き通る海の中に映る花々が目に留まって、心が躍ってしまい、#nそのまま……どぼん、と。"
1012105-55 = "ご心配をおかけして申し訳ない気持ちと――"
1012105-56 = "心配していただけて嬉しい気持ちが交ざり合って……#nなんだか、とても不思議な心地ですわ。"
1012105-57 = "[s5] \"ユカリが無事ならそれでいいよ。\"\n[s6] \"今日は思いっきり遊ぼう！\""
1012105-60 = "ええ……！ええ！もちろんですの！"
1012105-62 = "（その後、日が暮れるまで海水浴を満喫した）"
