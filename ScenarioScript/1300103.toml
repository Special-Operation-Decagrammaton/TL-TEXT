[translation]
1300103-1 = "陰陽部のアイドル"
1300103-5 = "（チセと合流して本屋に向かう途中、事件は起こった）"
1300103-6 = "あっ、も、もしかしてチセ様ですか！？"
1300103-7 = "ん……？"
1300103-8 = "ほ、本物だ！本物のチセ様！"
1300103-9 = "なに、チセ様だと！？"
1300103-10 = "こんなところにチセ姫が！？どこ！？どこにいらっしゃるんだ！？"
1300103-13 = "[ns] \"な、なになに！？\""
1300103-14 = "んー？"
1300103-15 = "きゃー！チセ様ーー！！"
1300103-18 = "チセ様、こっち見て笑ってください！"
1300103-19 = "笑う……"
1300103-21 = "こう？"
1300103-23 = "はあっはあっ！天使だ！チセ様、本物の天使！"
1300103-25 = "チセ様！俳句！俳句を詠んでくれませんか！？"
1300103-26 = "……詠めた。"
1300103-27 = "やあみんな"
1300103-28 = "ちゃんと歯磨き"
1300103-29 = "してるかな？"
1300103-31 = "わあああぁぁっ……！チセ様の即吟……！"
1300103-32 = "ああ…め、めまいが……！"
1300103-33 = "チセ様！チセ様ー！C・H・I・S・E！チセ姫ぇぇぇっ、愛してますっ！！"
1300103-34 = "ん。先生、動けない。どうしよう。"
1300103-35 = "[s] \"えっと、一旦落ち着いてもらって……。\""
1300103-36 = "ん？あなた、誰ですか？どうしてそんなにチセ様のそばにいるんですか？"
1300103-37 = "もしかしてマネージャー？"
1300103-38 = "いや、もしかしたら悪質なストーカーかもしれない！"
1300103-39 = "違いない！"
1300103-40 = "[s] \"違うよ！\""
1300103-42 = "[s1] \"見ての通り私は、チセのマネージャー！\"\n[s2] \"見ての通り私は、チセの先生！\""
1300103-43 = "そうは見えないけど……本当に？"
1300103-44 = "そうは見えないけど……本当に？"
1300103-46 = "[s3] \"くっ、信じてもらえそうにない……！\"\n[s4] \"チセ、逃げよう！\""
1300103-47 = "え？うん、わかった～。"
1300103-48 = "え？うん、わかった～。"
1300103-49 = "あっ、逃げるぞ！追いかけろ！"
1300103-52 = "[ns] \"はあ、はあ、危ないところだった……。\""
1300103-53 = "先生、災難だったね？"
1300103-54 = "[s] \"いや、この件は私というか……。\""
1300103-55 = "んー？"
1300103-56 = "[s] \"……まあいっか。こういうことはよくあるの？\""
1300103-57 = "道を歩いてると、たまに。"
1300103-58 = "陰陽部の部員だからかな？"
1300103-59 = "[s5] \"そういえば陰陽部って、観光PRのために、\"\n[s6] \"あちこちで色々活動してるって言ってたね。\""
1300103-60 = "うん。さっきの人たちもみんな、応援してくれてるみたいだし、"
1300103-61 = "うん。さっきの人たちもみんな、応援してくれてるみたいだし、"
1300103-62 = "頑張らないと、って思う。"
1300103-63 = "[s7] \"そうなんだ……。\"\n[s8] \"チセは人気者なんだね。\""
1300103-64 = "人気……？"
1300103-65 = "人気……？"
1300103-67 = "[s] \"みんな、チセのことを好きなんだなって。\""
1300103-68 = "……うん、そうかも。"
1300103-69 = "好きでいてくれるのは、嬉しいこと。"
1300103-70 = "あっ、見つけた！チセ様ぁー！"
1300103-71 = "[s] \"しまった、追いつかれた！\""
1300103-72 = "チセ様～～！！！せめて握手だけでも～！！"
1300103-73 = "[s9] \"くっ、仕方ない！チセ、逃げて！\"\n[s10] \"ここは私に任せて！\""
1300103-74 = "うん、分かった。"
1300103-75 = "うん、分かった。"
1300103-78 = "あっ。"
1300103-79 = "[s] \"どうしたの！？\""
1300103-82 = "先生見て、アリの行列。"
1300103-83 = "[s] \"チセ！？今はそんな場合じゃないから……！\""
1300103-85 = "（てんやわんやしつつもその後、なんとかチセとその場から逃れることに成功した）"
