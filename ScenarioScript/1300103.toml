[translation]
1300103-1 = "A ídolo do Departamento Yin-Yang"
1300103-5 = "（O incidente aconteceu enquanto eu me encontrava com Chise e íamos em direção à livraria）"
1300103-6 = "Ah, n-não pode ser... É a senhorita Chise!?"
1300103-7 = "Hmm...?"
1300103-8 = "É-é ela mesmo! A verdadeira senhorita Chise!"
1300103-9 = "O quê? Disse a senhorita Chise!?"
1300103-10 = "A Princesa Chise está aqui!? Onde!? Onde ela está!?"
1300103-13 = "[ns] \"Q-que foi, o que está acontecendo!?\""
1300103-14 = "Hmm?"
1300103-15 = "Aaaah! Senhorita Chiseee!!"
1300103-18 = "Senhorita Chise, olhe para cá e sorria!"
1300103-19 = "Sorrir..."
1300103-21 = "Assim?"
1300103-23 = "Haaah, haaah! Um anjo! Senhorita Chise, um anjo de verdade!"
1300103-25 = "Senhorita Chise! Um haiku! Poderia recitar um haiku para nós!?"
1300103-26 = "......Recitarei."
1300103-27 = "Olá, pessoal"
1300103-28 = "Escovaram bem"
1300103-29 = "os dentes hoje?"
