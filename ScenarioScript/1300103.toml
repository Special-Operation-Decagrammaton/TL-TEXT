1300103-32 = "Ah... e-estou ficando tonta...!"
1300103-33 = "Senhorita Chise! Senhorita Chise! C-H-I-S-E! Princesa Chise, eu te amo!!"
1300103-34 = "Hmm. Sensei, não consigo me mover. O que eu faço?"
1300103-35 = "[s] \"Bem, peça para eles se acalmarem primeiro...\""
1300103-36 = "Hmm? Quem é você? Por que está tão perto da senhorita Chise?"
1300103-37 = "Será que é o empresário dela?"
1300103-38 = "Não, talvez seja um stalker perigoso!"
1300103-39 = "Deve ser isso!"
1300103-40 = "[s] \"Não é nada disso!\""
1300103-42 = "[s1] \"Como pode ver, sou o empresário da Chise!\"\n[s2] \"Como pode ver, sou o Sensei da Chise!\""
1300103-43 = "Não parece... é verdade mesmo?"
1300103-44 = "Não parece... é verdade mesmo?"
1300103-46 = "[s3] \"Droga, eles não vão acreditar em mim...!\"\n[s4] \"Chise, vamos fugir!\""
1300103-47 = "Eh? Sim, entendi~."
1300103-48 = "Eh? Sim, entendi~."
1300103-49 = "Ah, eles estão fugindo! Peguem eles!"
1300103-52 = "[ns] \"Ufa, essa foi por pouco...\""
1300103-53 = "Sensei, que situação, não é?"
1300103-54 = "[s] \"Bem, esse caso foi mais por minha causa do que...\""
1300103-55 = "Hmm?"
1300103-56 = "[s] \"...Bem, deixa pra lá. Isso acontece com frequência?\""
1300103-57 = "Às vezes, quando estou andando pela rua."
1300103-58 = "Será porque sou do Departamento Yin-Yang?"
1300103-59 = "[s5] \"Falando nisso, você disse que o Departamento Yin-Yang\"\n[s6] \"faz várias atividades para promover o turismo, né?\""
1300103-60 = "Sim. E parece que todas aquelas pessoas estavam torcendo por mim,"
1300103-61 = "Sim. E parece que todas aquelas pessoas estavam torcendo por mim,"
1300103-62 = "então sinto que preciso me esforçar ainda mais."
1300103-63 = "[s7] \"Entendo...\"\n[s8] \"A Chise é muito popular, hein?\""
1300103-64 = "Popular...?"
1300103-65 = "Popular...?"
1300103-67 = "[s] \"Percebi que todos gostam da Chise.\""
1300103-68 = "……Sim, talvez seja isso."
1300103-69 = "Fico feliz que gostem de mim."
1300103-70 = "Ah, achei! Chise-samaaa!"
1300103-71 = "[s] \"Droga, me alcançaram!\""
1300103-72 = "Chise-samaaa!!! Pelo menos um aperto de mão, por favor!!"
1300103-73 = "[s9] \"Droga, não tem jeito! Chise, fuja!\"\n[s10] \"Deixe isso comigo!\""
1300103-74 = "Sim, entendi."
1300103-75 = "Sim, entendi."
1300103-78 = "Ah."
1300103-79 = "[s] \"O que houve!?\""
1300103-82 = "Sensei, olhe, uma fila de formigas."
1300103-83 = "[s] \"Chise!? Agora não é hora para isso……!\""
1300103-85 = "(Apesar da confusão, depois disso, conseguimos escapar daquele lugar com a Chise.)"
