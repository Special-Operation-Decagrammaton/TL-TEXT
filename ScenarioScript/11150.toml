[translation]
11150-2 = "第15話;行こう、夕日に向かって！"
11150-3 = "市街地"
11150-8 = "はひー、息苦しい。もう脱いでいいよね？"
11150-9 = "のんびりしてらんないよー、急げ急げ。追っ手がすぐ来るだろうからー。"
11150-10 = "できるだけ早く離れないと……間もなく道路が封鎖されるはずです……。"
11150-11 = "ご心配なく。万全の準備を整えておきましたから☆"
11150-12 = "こっち、急いで。"
11150-13 = "あの、シロコ先輩……覆面脱がないの？邪魔じゃない？"
11150-14 = "天職を感じちゃったって言うか、もう魂の一部みたいなものになっちゃって、脱ぎたくないんじゃなーい？"
11150-15 = "シロコ先輩はアビドスに来て正解だわ……#n他の学校だったら、ものすごい事をやらかしてたかも……。"
11150-18 = "そ、そうかな……。"
11150-20 = "……！？"
11150-23 = "……。"
11150-25 = "封鎖地点を突破。この先は安全です。"
11150-26 = "やった！大成功！"
11150-27 = "本当にブラックマーケットの闇銀行を襲っちゃうなんて……ふう……。"
11150-28 = "シロコちゃん、集金記録の書類はちゃんと持ってるよね？"
11150-29 = "う、うん……バッグの中に。"
11150-31 = "（カチャッ）"
11150-32 = "……へ？なんじゃこりゃ！？カバンの中に……札束が……！？"
11150-33 = "うえええええっ！？シロコ先輩、現金を盗んじゃったの！？"
11150-34 = "ち、違う……目当ての書類はちゃんとある。#nこのお金は、銀行の人が勝手に勘違いして入れただけで……。"
11150-35 = "どれどれ……うへ、軽く1億はあるね。本当に5分で1億稼いじゃったよー。"
11150-36 = "やったあ！！何ぼーっとしてるの！運ぶわよ！"
11150-37 = "……。"
11150-39 = "ちょ、ちょっと待ってください！そのお金、使うつもりですか！？"
11150-40 = "アヤネちゃん、なんで？借金を返さなきゃ！"
11150-41 = "そんなことしたら……本当に犯罪だよ、セリカちゃん！！"
11150-42 = "は、犯罪だから何！？このお金はそもそも、#n私たちが汗水流して稼いだお金なんだよ！#nそれがあの闇銀行に流れてったんだよ！"
11150-43 = "それに、そのままにしておいたら、犯罪者の武器や兵器に変えられてたかもしれない！#n悪人のお金を盗んで、何が悪いの！？"
11150-44 = "……。"
11150-45 = "私はセリカちゃんの意見に賛成です。#n犯罪者の資金ですし、私たちが正しい使い方をした方がいいと思います。"
11150-46 = "ほらね！これさえあれば、学校の借金をかなり減らせるんだよ！？"
11150-47 = "んむ……それはそうなんだけど……シロコちゃんはどう思う？"
11150-48 = "……自分の意見を述べるまでもない、ホシノ先輩が反対するだろうから。"
11150-49 = "へ！？"
11150-50 = "さすがはシロコちゃん。私のこと、わかってるねー。"
11150-51 = "私たちに必要なのは書類だけ。お金じゃない。"
11150-52 = "今回のは悪人の犯罪資金だからいいとして、次はどうする？その次は？"
11150-53 = "……。"
11150-54 = "こんな方法に慣れちゃうと……#nゆくゆくは、きっと平気で同じことをするようになるよ。"
11150-55 = "……。"
11150-56 = "そしたら、この先またピンチになった時……#n「仕方ないよね」とか言いながら、やっちゃいけないことに手を出すと思う。"
11150-57 = "うへ～、このおじさんとしては、カワイイ後輩がそうなっちゃうのはイヤだなー。"
11150-58 = "そうやって学校を守ったって、何の意味があるのさ。"
11150-59 = "……。"
11150-60 = "こんな方法を使うくらいなら、最初からノノミちゃんが持ってる燦然と輝くゴールドカードに頼ってたはずー。"
11150-61 = "……私もそう提案しましたが、ホシノ先輩が反対されて……。"
11150-62 = "先輩の気持ち、わかります。いくら頑張ったって、きちんとした方法で返済をしない限り、アビドスはアビドスじゃなくなってしまう……。"
11150-63 = "うへ、そういうこと。"
11150-64 = "だから、このバッグは置いてくよ。頂くのは必要な書類だけね。これは委員長としての命令だよー。"
11150-67 = "うわああっ！！もどかしい！意味わかんない！こんな大金を捨ててく！？変なところで真面目なんだから！！"
11150-68 = "うん、委員長としての命令なら。"
11150-69 = "私はアビドスさんの事情をよく知りませんが……このお金を持っていると、何か他のトラブルに巻き込まれるかもしれません。"
11150-70 = "災いの種、みたいなものでしょうから……。"
11150-71 = "あは……仕方ないですよね。このバッグは、私が適当に処分します。"
11150-72 = "ほい、頼んだよー。"
11150-73 = "……！！待ってください！何者かがそちらに接近しています！"
11150-74 = "……！！追っ手のマーケットガード！？"
11150-75 = "……い、いえ。敵意はない様子です。"
11150-77 = "調べますね……あれは……"
11150-78 = "べ、便利屋のアルさん！？"
11150-81 = "はあ、ふう……ま、待って！！"
11150-82 = "……！！"
11150-84 = "あ、落ち着いて。私は敵じゃないから……。"
11150-85 = "（何であいつが……？）"
11150-86 = "（撃退する？）"
11150-87 = "（どうかな。戦う気がないって相手を叩くのもねえ）"
11150-88 = "（お知り合いですか……？）"
11150-89 = "（まあねー、そこそこー）"
11150-90 = "あ、あの……た、大したことじゃないんだけど……。"
11150-91 = "銀行の襲撃、見せてもらったわ……。#nブラックマーケットの銀行をものの5分で攻略して見事に撤収……あなたたち、稀に見るアウトローっぷりだったわ。"
11150-92 = "……！？"
11150-93 = "正直、すごく衝撃的だったというか、このご時世にあんな大胆なことができるなんて……#n感動的というか。"
11150-94 = "わ、私も頑張るわ！法律や規律に縛られない、本当の意味での自由な魂！#nそんなアウトローになりたいから！"
11150-95 = "（一体……何の話？）"
11150-96 = "そ、そういうことだから……な、名前を教えて！！"
11150-97 = "名前……！？"
11150-98 = "その、組織っていうか、チーム名とかあるでしょ？#n正式な名称じゃなくてもいいから……私が今日の雄姿を心に深く刻んでおけるように！！"
11150-99 = "（うへ……なんか盛大に勘違いしてるみたいだねー……）"
11150-100 = "……はいっ！おっしゃることは、よーくわかりましたっ！"
11150-101 = "（のっ、ノノミ先輩！？）"
11150-102 = "私たちは、人呼んで……覆面水着団！"
11150-103 = "……覆面水着団！？"
11150-104 = "や、ヤバい……！！超クール！！カッコ良すぎるわ！！"
11150-105 = "（……）"
11150-106 = "うへ～本来スクール水着に覆面が正装なんだけどね、ちょっと緊急だったもんで、今日は覆面だけなんだー。 "
11150-107 = "（なんか妙な設定を付け足してる！？）"
11150-108 = "そうなんです！普段はアイドルとして活動してて、夜になると悪人を倒す正義の怪盗に変身するんです！"
11150-109 = "そして私はクリスティーナだお♧"
11150-110 = "「だ、だお♧」……！？きゃ、キャラも立ってる……！？"
11150-111 = "うへ、目には目を、歯には歯を。無慈悲に、孤高に、#n我が道の如く[ruby=まきょう]魔境[/ruby]を行く。#nこれが私らのモットーだよ！！"
11150-112 = "な、なんですってー！！"
11150-114 = "……何してるの、あの子たち……。"
11150-115 = "わー、アルちゃんドはまりしちゃってるじゃん。#n特撮モノのイベントに連れてってもらった子供みたいな顔してる！"
11150-118 = "（もういいでしょ？てきとうに逃げようよ！）"
11150-119 = "それじゃあこの辺で。アディオス～☆"
11150-120 = "行こう！夕日に向かって！"
11150-121 = "夕日、まだですけど……。"
11150-122 = "（ササーッ）"
11150-123 = "……。"
11150-124 = "よし！我が道の如く魔境を……その言葉、魂に刻むわ！私も頑張る！"
11150-127 = "……。"
11150-128 = "……。"
11150-129 = "（事実を伝えるべきなんだろうけど……いつ言おうか？）"
11150-130 = "（面白いからしばらく放置で）"
11150-133 = "あ、あの……。"
11150-134 = "このバッグ、どうしましょう？あの人たちが置いて行ったみたいなんですけど……。"
11150-135 = "ん？これはまさか……覆面水着団が私のために……？"
11150-136 = "いや、それはないわ……ただの忘れ物じゃない？"
11150-137 = "結構重いよ？何が入ってるんだろ。"
11150-138 = "（カチャ）"
11150-139 = "……！！"
11150-140 = "ひょええ！？"
11150-141 = "！！こ、これは……！！"
11150-143 = "……あれ？現金のバッグ……置いてきちゃいました。"
11150-144 = "えーっ！？"
11150-145 = "うへ～いいんじゃない？どうせ捨てるつもりだったんだし。気にしない、気にしない。"
11150-146 = "うん。誰かに拾われるでしょ、きっと。"
11150-147 = "ですよね☆お金に困ってる人が拾ってくれるといいですね。"
11150-148 = "あはは……良いことしたって思いましょう。#nお腹を空かせた人が、あのお金でお腹いっぱいになれると思えば……。"
11150-149 = "うう……もったいない……どう考えてももったいなさすぎる！！まったくもう、みんなお人好しなんだから！！"
11150-151 = "ええええーっ！？"
11150-152 = "うわわわわーっ！？"
11150-153 = "これって……"
11150-156 = "……？"
11150-157 = "……もしかしてこれで、もう食事抜かなくてもいいんですか？"
11150-159 = "（便利屋オフィス）"
11150-160 = "なあああああにいいいいーーっ！！？？"
11150-161 = "覆面水着団がアビドスだったですってええ！！？？"
11150-162 = "あはははー、アルちゃんショック受けてるー！超ウケる！"
11150-163 = "はあ……。"
11150-164 = "（結局教えてあげた）"
11150-166 = "次回;明かされる真実"
