[translation]
11150-2 = "Episódio 15; Vamos em direção ao pôr do sol!"
11150-3 = "área urbana"
11150-8 = "Ei, estou tendo dificuldade para respirar. Você pode tirar agora, certo?"
11150-9 = "Não posso ir com calma, se apresse! Os perseguidores estarão aqui em breve."
11150-10 = "Se não sairmos o mais rápido possível...a estrada será fechada em breve..."
11150-11 = "Não se preocupe. Eu fiz todos os preparativos possíveis☆"
11150-12 = "Aqui, rápido."
11150-13 = "Hum, Shiroko-senpai... ele não está desmascarado? Não é um incômodo?"
11150-14 = "Acho que você poderia dizer que senti que tinha um chamado, ou talvez ele tivesse se tornado parte da minha alma e eu não quisesse tirá-lo."
11150-15 = "Shiroko-senpai tomou a decisão certa ao vir para Abydos...#nSe ela estivesse em outra escola, ela poderia ter feito algo terrível..."
11150-18 = "Ah, eu acho..."
11150-20 = "...! ?"
11150-23 = "……."
11150-25 = "Romper o ponto de bloqueio. É seguro daqui."
11150-26 = "Yay! Grande sucesso!"
11150-27 = "Não acredito que eles realmente atacaram um banco do mercado negro... hmmm..."
11150-28 = "Shiroko-chan, você tem todos os documentos de registro da coleção?"
11150-29 = "Hum, sim... na minha bolsa."
11150-31 = "(clique)"
11150-32 = "...... peido? O que é isso? ? Na minha bolsa... há um maço de notas...! ?"
11150-33 = "Yay! ? Shiroko-senpai, você roubou algum dinheiro! ?"
11150-34 = "Não, não... os documentos que procuro estão aí. #nEsse dinheiro foi simplesmente colocado pelo banqueiro por engano..."
11150-35 = "Qual deles... Uau, facilmente 100 milhões. Eu realmente ganhei 100 milhões em 5 minutos!"
11150-36 = "Yay! ! O que você está fazendo distraidamente? Eu vou carregá-lo!"
11150-37 = "……."
11150-39 = "Ei, espere um minuto! Você está planejando gastar esse dinheiro? ?"
11150-40 = "Ayane-chan, por quê? Tenho que pagar minha dívida!"
11150-41 = "Se você fizer isso... é realmente um crime, Celica-chan! !"
11150-42 = "O que, é um crime! ? Em primeiro lugar, esse dinheiro é o dinheiro que ganhamos com nosso suor e trabalho duro! #nIsso foi para aquele banco escuro!"
11150-43 = "Além disso, se eu tivesse deixado como estava, poderia ter se transformado em arma ou arma de criminosos! #nO que há de errado em roubar dinheiro de pessoas más? ?"
11150-44 = "……."
11150-45 = "Concordo com a opinião da Celica. #nÉ dinheiro criminoso, então acho que devemos usá-lo adequadamente."
11150-46 = "Ver! Com isso, você pode reduzir significativamente o seu endividamento escolar! ?"
11150-47 = "Hmm... isso é verdade... mas o que você acha, Shiroko-chan?"
11150-48 = "...Não há necessidade de expressar sua opinião, porque Hoshino-senpai provavelmente irá se opor."
11150-49 = "peido! ?"
11150-50 = "Como esperado de Shiroko-chan. Você me entende."
11150-51 = "Só precisamos dos documentos. Não é dinheiro."
11150-52 = "Supondo que esteja tudo bem, porque desta vez são os fundos criminosos dos bandidos, o que devemos fazer a seguir? O que vem a seguir?"
11150-53 = "……."
11150-54 = "Depois de se acostumar com esse método...#nEventualmente, você definitivamente estará fazendo a mesma coisa sem qualquer hesitação."
11150-55 = "……."
11150-56 = "Então, quando eu estiver em apuros novamente no futuro... #nAcho que vou começar a fazer coisas que não deveria, dizendo coisas como \"Não consigo evitar\"."

11150-57 = "Uau, como velho, não quero que isso aconteça com meu lindo júnior."
11150-58 = "Qual é o sentido de proteger a escola assim?"
11150-59 = "……."
11150-60 = "Em vez de usar esse método, eu deveria ter confiado no brilhante cartão dourado de Nonomi-chan desde o início."
11150-61 = "...Eu sugeri isso também, mas Hoshino-senpai se opôs..."
11150-62 = "Eu entendo como você se sente. Não importa o quanto você tente, Abydos não será mais Abydos, a menos que você retribua de maneira adequada..."
11150-63 = "Ei, é isso mesmo."
11150-64 = "Então vou deixar essa bolsa para trás. Tudo que você precisa são os documentos necessários. Esta é a minha ordem como presidente."
11150-67 = "Uau! ! Tão frustrante! Eu não entendo! Estou jogando fora tanto dinheiro! ? Ele está falando sério de um jeito estranho! !"
11150-68 = "Sim, se for uma ordem do presidente."
11150-69 = "Não sei muito sobre a situação do Sr. Abydos, mas se ele tiver esse dinheiro, poderá ter outros problemas."
11150-70 = "Deve ser algo como as sementes do desastre..."
11150-71 = "Ah... não posso evitar. Vou descartar esta bolsa de forma adequada."
11150-72 = "Ei, eu pedi isso."
11150-73 = "...! ! Por favor, aguarde! Alguém está se aproximando de você!"
11150-74 = "...! ! Guarda do Mercado Chaser! ?"
11150-75 = "……não. Não parece haver qualquer hostilidade."
11150-77 = "vou dar uma olhada nisso..."
11150-78 = "Ei, faz-tudo Al! ?"
11150-81 = "Hã... espere! !"
11150-82 = "...! !"
11150-84 = "Ah, acalme-se. Porque eu não sou seu inimigo..."
11150-85 = "(Por que ele está...?)"
11150-86 = "(Repulsa?)"
11150-87 = "(Não sei. Não critique seu oponente por não querer lutar.)"
11150-88 = "(Vocês se conhecem...?)"
11150-89 = "(Bem, é isso)"
11150-90 = "Ah, uh... não é grande coisa..."
11150-91 = "Foi-me mostrado o ataque ao banco... #nVocês capturaram um banco do mercado negro em apenas 5 minutos e evacuaram com sucesso...Vocês eram um tipo raro de bandido."
11150-92 = "...! ?"
11150-93 = "Para ser sincero, foi realmente chocante, ou melhor, foi impressionante que algo tão ousado pudesse ser feito nos dias de hoje."
11150-94 = "Eu também farei o meu melhor! Uma alma verdadeiramente livre, não sujeita a leis ou regulamentos! #nPorque eu quero ser aquele bandido!"
11150-95 = "(Do que diabos você está falando?)"
11150-96 = "Bem, é isso que significa...Diga-me seu nome! !"
11150-97 = "nome……! ?"
11150-98 = "Existe uma organização, ou melhor, um nome de equipe, certo? #nNão precisa ser um nome oficial... para que eu possa manter a imagem heróica de hoje profundamente gravada em meu coração! !"
11150-99 = "(Uau... parece que há um grande mal-entendido...)"
11150-100 = "...Sim! Eu entendo perfeitamente o que você está dizendo!"
11150-101 = "(Não, Nonomi-senpai!?)"
11150-102 = "Estamos chamando... Equipe de Maiôs Mascarados!"
11150-103 = "... Grupo de maiô mascarado! ?"
11150-104 = "Ah, isso é perigoso...! ! Muito legal! ! Isso é muito legal! !"
11150-105 = "(...)"
11150-106 = "Uau ~ Normalmente, eu usaria um maiô escolar e uma máscara, mas foi uma emergência, então hoje estou apenas usando uma máscara."
11150-107 = "(Você está adicionando algumas configurações estranhas?)"
11150-108 = "Isso mesmo! Normalmente ela trabalha como uma ídolo, mas à noite ela se transforma em uma ladra fantasma justa que derrota bandidos!"
11150-109 = "E eu sou Cristina♧"
11150-110 = "“Da, dao♧”…! ? Bem, os personagens também estão de pé...! ?"
11150-111 = "Ei, olho por olho, dente por dente. Implacável, solitário, #nPassando por Makyo como se fosse do meu jeito. #nEste é o nosso lema! !"
11150-112 = "O que é aquilo? !"
11150-114 = "...O que vocês estão fazendo...?"
11150-115 = "Nossa, Alchando é viciado nisso. #nVocê parece uma criança que foi levada para um evento de efeitos especiais!"
11150-118 = "(Já chega, certo? Vamos fugir!)"
11150-119 = "Pois bem, por aqui. Adeus~☆"
11150-120 = "vamos! Em direção ao pôr do sol!"
11150-121 = "O pôr do sol ainda não chegou..."
11150-122 = "(Cheirar)"
11150-123 = "……."
11150-124 = "OK! Como se fosse do meu jeito, vou te levar ao território do diabo... vou gravar essas palavras na minha alma! Farei o meu melhor também!"
11150-127 = "……."
11150-128 = "……."
11150-129 = "(Acho que deveria lhe contar a verdade... mas quando devo dizê-la?)"
11150-130 = "(É interessante, então deixe isso de lado por um tempo)"
11150-133 = "Ah, uh..."
11150-134 = "O que devemos fazer com esta bolsa? Parece que essas pessoas deixaram isso para trás..."
11150-135 = "sim? Eu nunca esperei isso... o grupo de maiôs mascarados era para mim...?"
11150-136 = "Não, não é isso... não é apenas algo que você esqueceu?"
11150-137 = "É muito pesado? O que há nele?"
11150-138 = "(Kachá)"
11150-139 = "...! !"
11150-140 = "Ei! ?"
11150-141 = "! ! Isso é...! !"
11150-143 = "...Huh? Deixei minha sacola de dinheiro para trás."
11150-144 = "Eh! ?"
11150-145 = "Uau, isso não é bom? Eu estava pensando em jogá-lo fora de qualquer maneira. Eu não me importo, eu não me importo."
11150-146 = "Sim. Tenho certeza que alguém vai atender."
11150-147 = "Isso mesmo ☆ Espero que alguém que esteja com problemas de dinheiro pegue."
11150-148 = "Haha... vamos pensar que fizemos algo de bom. #nSe você acha que uma pessoa faminta consegue encher a barriga com essa quantia de dinheiro..."
11150-149 = "Ugh... é um desperdício... não importa o que você pense sobre isso, é um desperdício! ! Afinal, todo mundo é tão amigável! !"
11150-151 = "Yeah, yeah! ?"
11150-152 = "Uau! ?"
11150-153 = "Isso é..."
11150-156 = "...?"
11150-157 = "...Talvez agora eu não precise mais pular refeições?"
11150-159 = "(Escritório do faz-tudo)"
11150-160 = "É tão bom! ! ? ?"
11150-161 = "Sim, o grupo de maiôs mascarados era Abydos! ! ? ?"
11150-162 = "Hahaha, Al-chan está em choque! Super divertido!"
11150-163 = "Suspirar..."
11150-164 = "(acabei contando para ele)"
11150-166 = "Da próxima vez: a verdade revelada"
