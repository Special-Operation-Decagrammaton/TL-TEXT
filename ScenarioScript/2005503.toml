[translation]
2005503-1 = "A má fase da UZQueen"
2005503-2 = "A caminho do Departamento de Desenvolvimento de Jogos"
2005503-3 = "（Não acredito que a Yuzu disse algo assim）"
2005503-4 = "（Incrédulo com a situação, fui apressado para o Millennium）"
2005503-9 = "Você jogou aquele jogo que lançou mês passado?"
2005503-11 = "[ns]（Ué, falando de jogos...）"
2005503-12 = "Está falando do novo jogo de luta, o 'Simulion Quest'?"
2005503-13 = "O cenário é um futuro próximo estilo cyberpunk, e a construção do mundo é incrível, né?#nÉ tudo muito detalhado e as animações são super fluidas."
2005503-14 = "Mas, não está meio estranho?"
2005503-15 = "Estranho? Por causa dos bugs?#nA fabricante até avisou sobre isso outro dia..."
2005503-16 = "Não, não é isso... É que a UZQueen não está no ranking."
2005503-17 = "— Já faz uma semana que o ranking abriu, e nada."
2005503-19 = "（UZQueen...?）"
2005503-20 = "Ah, é verdade! Nunca aconteceu de a UZQueen não estar no ranking de um jogo de luta antes...!"
2005503-21 = "Será que aconteceu alguma coisa com a UZQueen?"
2005503-23 = "（Assim que ouvi a conversa, sem perceber, comecei a andar mais rápido）"
2005503-27 = "Departamento de Desenvolvimento de Jogos - Sala do Clube"
2005503-28 = "[ns] \"Yuzu! Você está bem!?\""
2005503-29 = "Hiiie!? Sensei!?"
2005503-33 = "O-o que aconteceu, afinal!?"
2005503-34 = "Por que está tão apressado assim..."
2005503-35 = "[s] \"Yuzu, o que aconteceu exatamente?\""
2005503-36 = "Hã!? Não aconteceu nada de especial!"
2005503-37 = "O-olha, eu até já estou conseguindo entrar no armário direitinho."
2005503-42 = "N-não me diga que...#nVocê veio até aqui por causa daquele Momotalk de agora pouco...?"
2005503-43 = "Eu até reclamei que o jogo estava difícil, mas..."
2005503-44 = "Eu estava agindo de um jeito tão estranho assim...?"
2005503-48 = "Com certeza... é verdade."
2005503-49 = "Até hoje, eu nunca tinha achado um jogo difícil..."
2005503-50 = "[s1] \"Sobre esse jogo, será que...\"\n[s2] \"É o 'Simulion Quest'?\""
2005503-53 = "C-como você sabia!?"
2005503-55 = "（Contei a ela o que ouvi no caminho）"
2005503-56 = "Ah... e-entendo..."
2005503-57 = "É que... eu ainda não consegui jogar o#n'Simulion Quest' direito..."
2005503-58 = "É que..."
2005503-59 = "...Você quer dar uma olhada?"
2005503-61 = "（Yuzu iniciou o 'Simulion Quest'）"
2005503-62 = "（Assim que o jogo começou, senti que entendi por que a Yuzu estava com dificuldade）"
2005503-64 = "[ns3] \"Esse jogo é do tipo que você precisa mover os braços e pernas para lutar...\"\n[ns4] \"...É um jogo de VR!\""
2005503-67 = "Sim. Preciso usar o corpo todo para atacar e desviar..."
2005503-68 = "Mas eu... tudo bem mover as mãos, mas#ncorrer e usar o corpo todo é um pouco difícil para mim..."
2005503-69 = "Eu queria muito jogar, mas não consegui nem passar do tutorial..."
2005503-70 = "Hã? O Sensei também quer tentar?"
2005503-71 = "B-bem, tem um modo cooperativo para 2P, mas..."
2005503-72 = "Você tem alguma ideia...?"
2005503-77 = "P-por que você está vestindo isso de novo...!?"
2005503-78 = "Porque parece com o protagonista do jogo e fica mais fácil de jogar?#nE-eu entendo o seu ponto, mas...!"
2005503-79 = "[s5] \"Então, vamos começar--\"\n[s6] \"Suba nos meus ombros, Yuzu.\""
2005503-82 = "Hã!?"
2005503-83 = "H-hiiie!?"
2005503-88 = "（Levanta a Yuzu e a coloca nos ombros）"
2005503-91 = "Uau... é, é alto...!"
2005503-92 = "Ma-mas, não acho que o modo cooperativo para 2 jogadores seja assim..."
2005503-93 = "[s7] \"Está sendo refletido corretamente no jogo, não está?\"\n[s8] \"Olha, a personagem da Yuzu também está sendo carregada nos ombros dentro do jogo.\""
2005503-96 = "Is-isso é verdade, mas...!"
2005503-97 = "[s9] \"Eu cuido dos movimentos físicos, piloto.\"\n[s10] \"A Yuzu só precisa se concentrar no que faz de melhor!\""
2005503-100 = "……！"
2005503-101 = "Sendo assim, eu cuidarei da busca de alvos e do briefing, então, Sensei, por favor, cuide da movimentação e dos ataques."
2005503-102 = "[s] \"Certo, vamos nessa!\""
2005503-107 = "（E assim, depois de começar a jogar em modo cooperativo com a Yuzu――）"
2005503-108 = "（Não levou nem um dia para entrarmos no ranking dos melhores jogadores）"
2005503-109 = "（Depois disso...）"
2005503-111 = "（No fórum online de 'Simulion Quest', começaram a surgir inúmeros relatos de testemunhas sobre uma dupla que desafiava os chefes enquanto um carregava o outro nos ombros）"
2005503-112 = "（...Dizem que, a única que conseguia realizar tal proeza, era a UZQueen）"
