[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 11/06.
42200-1 = "Episódio 20: A Caverna de Caerbannog (1)"
42200-2 = "Sala de Operações e Controle do Silo"
42200-5 = "「……As coelhinhas morderam a isca.」"
42200-6 = "FOX 1 emitindo ordem de engajamento tático.#nCada unidade deve travar a posição e reportar variação no terreno de imediato."
42200-10 = "Aqui é FOX 4. Radar detectou o sobrevoo de um drone não-tripulado inimigo no Ponto Alpha. Disparei e neutralizei o alvo."
42200-11 = "Eu já tava jurando que elas iam invadir batendo a cabeça na porta numa carga suicida direta... mas a Capitã Miyako tá segurando os nervos. Veio engatilhada e metódica."
42200-12 = "Porém, depois que o drone virou poeira, os radares silenciaram de vez."
42200-13 = "O que será que aquela mente brilhante tá arquitetando no escuro?"
42200-14 = "FOX 4, mantenha a frequência cardíaca baixa. Elas vestem a farda de calouras, mas carregam o instinto de morte da SRT."
42200-15 = "Copiado e entendido."
42200-16 = "A rajada sônica do meu disparo pode ter desenhado a minha localização pro contra-ataque.#nVou reposicionar o ninho e te dou retorno visual em breve."
42200-20 = "Aqui é FOX 3. Ancora lançada no Ponto Lima―― Estou travando as catracas no túnel de acesso central do elevador que desce pro seu andar, na Sala de Operações."
42200-21 = "A topografia desse corredor é afunilada pelas grades e o teto é baixo. O meu escudo pesado e minha submetralhadora vão entupir a veia sozinhas."
42200-22 = "Ainda que as pestinhas escapem milagrosamente das garras da sua sniper, não passarão pela minha parede de aço."
42200-23 = "Ouououou, peraí, FOX 3. Isso ofendeu o meu ego como profissional de extermínio."
42200-24 = "Você realmente tem a coragem de duvidar da minha capacidade balística de derrubar um alvo encurralado num corredor e ousa dizer que elas 'escapariam'?!"
42200-25 = "Não é falta de fé no seu chumbo pesado, querida.#nMas o manual de assalto tático dita que o esquadrão RABBIT pode fazer uma blitz cega conjunta usando todo mundo como isca ao mesmo tempo, não é?"
42200-26 = "A não ser que você tenha modificado seu rifle sniper de precisão absurda para cuspir fogo usando um cano duplo de espingarda, acho que vai faltar buraco pra tanta coelhinha."
42200-27 = "Opa. Cano duplo de 12.7mm?! Eu confesso que me sinto excitada com a viabilidade teórica disso..."
42200-29 = "Atenção FOX 4. Aborte a ofensiva solo e recalcule seu foco tático.#nDê prioridade de fogo cruzado para cobrir as costas e retardar o fluxo no ponto cego da FOX 3."
42200-30 = "Nossas inimigas escutaram a sua bala. Elas sabem que um franco-atirador bloqueia o sol. E como boas operadoras, elas não furarão a linha sem contra-medidas letais."
42200-31 = "……Na pior projeção logística... as calouras podem optar por usar uma rota morta para nos flanquear."
42200-33 = "A bíblia da guerra especial se resume a uma regra: Sufoque as anomalias no campo de batalha dinâmico e mantenha a supremacia matemática."
42200-34 = "Em armamento bélico, vantagens geográficas e frieza mental, a nossa equação destrói a delas.#nContenham as variáveis malucas, e a nossa vitória é inquebrável."
42200-36 = "……Burocrático, mas letal."
42200-37 = "Quando foi que a Yukino... a FOX 1, pronunciou uma tática que não fosse perfeita e sufocante?"
42200-38 = "É por essas e outras que nós desligamos a cabeça e deitamos nossa vida na palma das suas mãos vendadas."
42200-40 = "Se absorveram a estratégia, cortem as brincadeiras fora da frequência.#nPreparem as armas. O Relógio Tático do Juízo Final bate agora."
42200-46 = "Aqui é FOX 2! Puxei o plug e afoguei a rede no Elevador Central que desce até o seu covil."
42200-47 = "Isso isola o poço. Se a gênia digital da Moe bater a cabeça no teclado tentando invadir nosso sistema pra arrombar a porta, ela não vai achar nem o roteador."
42200-48 = "……Mas não acha que nós estamos usando marretas de chumbo contra formigas?#nEu confio nas calouras, mas furar nosso ninho dessa forma beira a impossibilidade biológica..."
42200-49 = "Estar preparado não custa a vida. Soldados de elite moldam seu cérebro presumindo que o cenário mais devastador possível brotará na porta a qualquer instante."
42200-50 = "……"
42200-51 = "Yukino-chan..."
42200-52 = "Vem cá. Por acaso, num recanto remoto do seu cérebro tático, a FOX 1 acha que o nosso esquadrão pode... ser suprimido pela RABBIT?"
42200-53 = "……A estatística de anomalia nunca é nula. E o inferno nunca obedece as regras do homem."
42200-57 = "Na hipótese de colapso... Se as paredes quebrarem e a retaguarda da FOX 2 virar pó."
42200-58 = "Todos os membros deverão evacuar pela rota de fuga para a superfície e buscar abrigo.#nAguardem meus novos decretos de rádio sob a luz da lua."
42200-63 = "Opa, opa?! Como assim evacuar pra superfície?! O protocolo não era mergulhar até a Sala de Operações pra fazer parede humana ao seu lado e defender o núcleo?!"
42200-64 = "Mesmo se o nosso chumbo esgotar, nós temos sangue pra estancar balas na linha de defesa com você..."
42200-66 = "Negativo. Se o cerco for perfurado e elas pisarem na zona limpa da Sala de Operações, o laudo matemático da nossa missão decreta 'Derrota Estratégica' para a FOX."
42200-67 = "E eu não quero que vocês apodreçam debaixo da terra no desespero.#nFujam para o asfalto superior com a saúde intacta e abram uma rota de escape segura pra nós."
42200-69 = "Mas... a lógica militar..."
42200-70 = "Se a Deusa Tática deu a palavra definitiva... é porque os algoritmos da mente dela encontraram o futuro de que precisamos."
42200-72 = "Mas FOX 1... será que você no fundo não tá--"
42200-74 = "……Isso foi uma Ordem, Niko."
42200-75 = "Ajoelhe-se diante do silêncio. Por favor."
42200-81 = "……Entendido, Capitã."
42200-84 = "Operadoras, o nosso fardo primário neste abismo é infiltrar o silo, neutralizar ou arrancar o núcleo da ogiva termobárica <A.N.T.I.O.C.H.>, e afogar a cadeia de detonação no silêncio absoluto."
42200-85 = "A bomba balística já está soldada e engatilhada na carcaça do silo. A sala onde os mercenários da morte operam os controles vitais fica afundada no útero deste complexo."
42200-86 = "Pra congelarmos os relógios antes da cidade explodir, as nossas botas precisam chutar as portas da Sala de Operações inferior..."
42200-92 = "……Nossa, e eles cavaram as entranhas da terra. É muito mais fundo do que eu imaginava."
42200-94 = "Sim. O epicentro da ogiva repousa no abismo mais letal do silo.#nPara alcançá-lo, dependemos exclusivamente da velocidade de descida do Elevador Central de Cargas."
42200-95 = "E há uma armadilha poética: o corredor linear que liga nós ao elevador é liso e carece de concreto pra flanquear... E esse vazio mortífero o deixa desprotegido aos olhos da franco-atiradora oculta."
42200-96 = "As sacadas altas e poços de ventilação são ninhos férteis pra sniper... Descobrir onde aquele rifle ferve na fumaça vai ser como pescar no escuro."
42200-97 = "A doutrina convencional exige que o nosso batedor varra o terreno e amordace a sniper com um tiro certeiro antes da infantaria cruzar a rota cega. Mas... os ponteiros do relógio da ogiva estão a segundos de encostar na meia-noite."
42200-98 = "……Portanto, anularemos a furtividade tática e daremos um choque agressivo nas veteranas. Lançaremos o Esquadrão em um assalto coordenado frontal e massivo!"
42200-99 = "Rasteje furtivo com os ventos frios da madrugada... mas quando mostrar as garras, devaste as trincheiras como um vulcão furioso.#nA Velha Arte da Guerra em estado puro, Capitã."
42200-100 = "Passe o croqui de combate e as orientações."
42200-104 = "Nós temos isso. A topografia sugere que o gargalo tático que engasga no Ponto Lima abriga emboscadas mortais."
42200-105 = "Saki, como nossa RABBIT 2, o seu dever é esmagar o bloqueio frontal e neutralizar as ameaças para que eu consiga assegurar e limpar o controle mestre do Elevador Central."
42200-106 = "No seu rastro de destruição, Moe. A nossa RABBIT 3 assumirá o posto quando os inimigos cederem.#nO seu dever é estripar o cérebro das placas do elevador, decifrar os bloqueios e escravizar a máquina para nós."
42200-108 = "Copiado na lata. Os códigos morrem nos meus dedos!"
42200-109 = "M-Mas e e-eu?! Qual é a função da garota inútil no inferno...?"
42200-111 = "Você não é inútil, RABBIT 4."
42200-112 = "O seu dever exige frieza. Esconda-se nas frestas das escadas periféricas e mantenha seu dedo leve.#nQuando o rifle letal da inimiga atirar na armadura da nossa vanguardista Saki... eu confio na sua capacidade de mapear o clarão do tiro e abater a franco-atiradora delas na retaguarda."
42200-113 = "Mapear o rastro supersônico do disparo e mandar o chumbo de volta na fumaça é a minha especialidade instintiva... m-mas..."
42200-114 = "E se... e se a precisão do meu abate atrasar... e as balas perfurarem o escudo e a carne da Saki por minha culpa...?"
42200-115 = "Tá duvidando de mim?! Soldados que mijam na calça e choram com medo do barulho das balas rasgando o vento nunca foram Vanguardistas Ponta de Lança."
42200-116 = "Eu carrego as marcas na minha alma e o chumbo no meu capacete pra segurar as portas da morte por vocês! Não treme a base, Miyu!!"
42200-117 = "E-Entendido! O meu fuzil não falhará!"
42200-119 = "Eita, o manual tá chique, a formação também... mas o elefante branco tá na sala. Qual é a tática do Plano B se o choque desmoronar?"
42200-120 = "Tipo, se a Saki for esmagada pelas veteranas da linha de frente, se o terminal do elevador fritar minhas senhas, ou se a retaguarda da Miyu não quebrar a sniper a tempo... O que impede a gente de ir pro caixão?"
42200-125 = "Nós não perderemos a linha de combate. As cartas do Plano B não existem."
42200-126 = "Como é que é?! O manual tático de segurança foi pro ralo?!"
42200-127 = "Com todo o meu sangue e com todas as minhas cicatrizes, vocês são a Força de Ataque Absoluta debaixo dos meus comandos."
42200-128 = "A furtividade, os ossos blindados e o poder massivo que vocês ostentam deixam o resto do mundo a comer poeira. A derrota humilhante num campo onde vocês cospem chumbo unidas... não é uma possibilidade no meu radar."
42200-130 = "Por isso... fechem os olhos, respirem fundo e depositem as suas vidas nas costas de quem está lutando do lado.#nAcreditem com unhas e dentes na supremacia do Esquadrão antes do sangue sujar a roupa."
42200-131 = "……Porque a minha fé inquebrável em cada uma de vocês... nunca esteve tão cega e tão forte."
42200-133 = "……Meu Deus. Depois de tantos ensaios técnicos, a nossa Capitã Miyako pariu a tática de combate mais primária, maluca e infantil de todas."
42200-134 = "O-O meu sermão empolgado soou tão amador e irracional assim...?"
42200-135 = "Hahaha. Que nada... Mas quer saber a beleza disso?#n――A palavra da nossa Líder é uma metralhadora intocável."
42200-139 = "RABBIT 2 deitando chumbo no alvo e assumindo a vanguarda."
42200-140 = "……Moe, Miyu. Cubram as minhas costas e que o inferno derreta."
42200-143 = "Missão dada é missão cumprida!"
42200-148 = "Fuzis engatilhados! Começando Invasão Total do Silo!!"