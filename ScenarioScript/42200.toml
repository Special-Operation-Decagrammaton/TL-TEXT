[translation]
42200-1 = "Episódio 20: A Caverna de Caerbannog (1)"
42200-2 = "Sala de Operações do Silo"
42200-5 = "«…As coelhas morderam a isca.»"
42200-6 = "FOX1, iniciando protocolo de combate.#nCada unidade, mantenha posição e reporte quaisquer anomalias no terreno."
42200-10 = "Aqui FOX4. Detectei e abati um drone inimigo no Ponto Alfa."
42200-11 = "Confesso que esperava uma investida mais inconsequente… Mas a comandante Miyako está mais contida do que eu pensava. Determinada."
42200-12 = "Só que depois disso, nenhum movimento digno de nota."
42200-13 = "O que será que essa cabeça iluminada está tramando na escuridão?"
42200-14 = "FOX4, mantenha o foco, não afrouxe.#nElas são calouras, sim, mas também são SRT. Sangue do mesmo sangue."
42200-15 = "Entendido."
42200-16 = "Meu disparo anterior pode ter entregado minha posição.#nVou mudar de posto e retomo contato em breve."
42200-20 = "Aqui FOX3. Posicionada no Ponto Lima, próximo ao acesso do elevador central que desce para a Sala de Operações."
42200-21 = "O corredor é estreito, com grades. Consigo segurar a posição sozinha."
42200-22 = "Mesmo que, por um milagre, escapem da mira da atiradora, não vão passar por mim."
42200-23 = "Opa, peraí, FOX3. Isso eu não posso deixar passar."
42200-24 = "Você está duvidando da minha capacidade de acertar alvos móveis em corredor apertado?"
42200-25 = "Não é desconfiança da sua mira, querida.#nMas e se as coelhas resolverem avançar em massa, todas ao mesmo tempo?"
42200-26 = "Se o seu rifle fosse de cano duplo, quem sabe…"
42200-27 = "Ora, essa ideia não é de todo ruim…"
42200-29 = "FOX4, priorize o apoio à FOX3. Foque em retardar o avanço inimigo."
42200-30 = "Elas sabem que temos uma atiradora. Não vão vir sem uma contra-medida."
42200-31 = "…Na pior das hipóteses, podem tentar flanquear por uma rota inesperada."
42200-33 = "O básico da guerra especial é controlar as variáveis no campo de batalha mutável e manter a supremacia numérica."
42200-34 = "Com a vantagem geográfica e o poder de fogo que temos, nosso coeficiente de combate é superior ao delas.#nSe neutralizarmos as variáveis, a vitória é certa."
42200-36 = "…Discurso impecável, como sempre."
42200-37 = "Bem, a Yukino… digo, a FOX1 nunca dá pitaco errado."
42200-38 = "É exatamente por isso que podemos entregar nossas vidas a ela de olhos fechados, não?"
42200-40 = "Se entenderam o recado, silêncio na linha.#nAgora, preparem os rifles. A Hora H está chegando."
42200-46 = "Aqui FOX2. Desativei remotamente o painel de controle do elevador central."
42200-47 = "Com isso, nem a Moe-chan em seus dias mais inspirados consegue hackear essa porta."
42200-48 = "…Mas não acha que isso é um exagero, Niko? Elas são nossas kouhais, não vão chegar até aqui…"
42200-49 = "O seguro morreu de velho, FOX2. Um operador de elite treina o cérebro para esperar o pior cenário possível, sempre."
42200-50 = "………"
42200-51 = "Yukino-chan…"
42200-52 = "Digo, FOX1. Você está imaginando que a RABBIT pode, de fato, nos vencer?"
42200-53 = "…Nada neste mundo é absolutamente impossível. Portanto, a derrota existe como possibilidade."
42200-57 = "No improvável cenário de colapso… se a FOX2 também for neutralizada e a linha for rompida…"
42200-58 = "Todas vocês evacuarão para a superfície e aguardarão novas ordens."
42200-63 = "Ora, não era para nos unirmos a você e contra-atacarmos?"
42200-64 = "Com um efetivo reduzido, faria mais sentido dar apoio da retaguarda do que –"
42200-66 = "Negativo. Se elas puserem os pés na Sala de Operações, a missão já terá falhado."
42200-67 = "Quero que estejam em solo firme, garantindo nossa rota de fuga."
42200-69 = "Isso é verdade, mas…"
42200-70 = "Se a nossa comandante está falando… é porque já pesou algo na mente dela."
42200-72 = "FOX1, por acaso você está…"
42200-74 = "…É uma ordem, Niko."
42200-75 = "Por favor, apenas obedeça, sem questionamentos."
42200-81 = "…Entendido."
42200-84 = "O objetivo principal desta operação é neutralizar ou desativar a ogiva termobárica <A.N.T.I.O.C.H.>, impedindo sua detonação."
42200-85 = "No momento, a ogiva já está alojada no silo. Todas as operações críticas são realizadas na Sala de Operações, no nível inferior."
42200-86 = "Para desarmá-la, primeiro precisamos tomar o controle da Sala de Operações… o que nos leva ao próximo problema."
42200-92 = "…A cova do coelho é mais funda do que eu imaginava."
42200-94 = "Sim. A Sala de Operações fica no ponto mais profundo do silo, exigindo o uso do elevador central."
42200-95 = "O corredor de acesso ao elevador é um beco sem saída, sem cobertura… a rota é fixa e exposta, um prato cheio para atiradores."
42200-96 = "Há muitos pontos de emboscada para um franco-atirador… será difícil identificar a posição dela."
42200-97 = "Idealmente, primeiro neutralizaríamos a atiradora para depois avançar com segurança… mas o tempo até a detonação está se esgotando."
42200-98 = "…Portanto, para não dar trégua à inimiga, atacaremos com todas as forças, em um assalto coordenado e fulminante."
42200-99 = "Movam-se como o vento, ataquem como o fogo.#nO básico da arte da guerra, senhoras."
42200-100 = "Quais os pontos específicos de atenção?"
42200-104 = "Bem… o Ponto Lima à frente é um gargalo natural, provável local de emboscada."
42200-105 = "RABBIT2, após neutralizarmos a resistência, você deve assegurar o painel de controle do elevador central."
42200-106 = "RABBIT3, assim que o painel estiver seguro, você o hackeará e assumirá o controle do elevador."
42200-108 = "Sem problemas. Pode deixar comigo~"
42200-109 = "E-e eu? O que eu faço?"
42200-111 = "RABBIT4…"
42200-112 = "Você se esconderá em um ponto de sniper nas escadas externas. Se a atiradora inimiga disparar contra nossa ponta de lança… você calculará a distância e o quadrante e dará o tiro de contrasniper."
42200-113 = "Calcular a distância e o quadrante é minha especialidade, mas…"
42200-114 = "E se… e se eu errar o timing, e a Saki-chan levar um tiro por minha causa?"
42200-115 = "Não se preocupe comigo. Quem tem medo de levar chumbo não pode ser ponta de lança."
42200-116 = "Eu visto este capacete e colete balístico justamente para isso. Estou preparada!"
42200-117 = "E-e-entendido…!"
42200-119 = "Hmm… o plano está bem amarrado, mas e se tudo der errado? Não temos um Plano B?"
42200-120 = "Se a Saki for abatida, se eu falhar no hackeamento, se a Miyu não acertar o contrasnipe… o plano vai por água abaixo, não vai?"
42200-125 = "…Não preparei um plano alternativo."
42200-126 = "Hã? Como assim?"
42200-127 = "Cada uma de vocês é a ponta de lança do esquadrão que eu comando. Somos a RABBIT – a tropa de elite."
42200-128 = "Somos mais rápidas, mais fortes e mais furtivas do que qualquer outra unidade. Por isso, uma derrota em combate assimétrico… é algo que não consigo nem conceber."
42200-130 = "Portanto, confiem umas nas outras e acreditem que venceremos. É nessa premissa que devemos atuar."
42200-131 = "…Porque eu também confio em cada uma de vocês."
42200-133 = "…De todos os planos que a Miyako já fez, esse é o mais absurdamente ingênuo."
42200-134 = "F-foi tão retórico assim…?"
42200-135 = "Mas fazer o quê… é ordem da nossa comandante, né?"
42200-139 = "RABBIT2, executando a ordem."
42200-140 = "…Moe, Miyu. Fico devendo o apoio de vocês."
42200-143 = "Pode deixar!"
42200-148 = "Certo, então… INVADINDO!"