[translation]
42200-1 = "Episódio 20; Caverna de Cvar-nog (1)"
42200-2 = "Sala de Operações do Silo"
42200-5 = "“...O coelho caiu na armadilha.”"
42200-6 = "FOX1, iniciando a operação. #nCada membro do esquadrão deve manter sua posição e relatar a situação conforme necessário."
42200-10 = "Aqui é FOX4. Avistei e abati um drone inimigo no Ponto Alfa."
42200-11 = "Eu estava preocupada que elas fossem avançar de repente, mas... como esperado da líder de esquadrão Miyako, ela é cautelosa. Está bem focada."
42200-12 = "No entanto, não houve nenhum movimento significativo depois disso."
42200-13 = "Será que estão planejando algo interessante?"
42200-14 = "FOX4, não baixe a guarda. #nEmbora sejam alunas do primeiro ano, o adversário também é da SRT."
42200-15 = "Entendido."
42200-16 = "Minha posição pode ter sido revelada pelo disparo de agora, então #nvou mudar de lugar e entro em contato novamente."
42200-20 = "Aqui é FOX3, aguardando atualmente no Ponto Lima — perto da entrada do elevador central que leva à Sala de Operações."
42200-21 = "Como o caminho à frente é estreito por causa do corrimão, parece que dou conta sozinha."
42200-22 = "Mesmo que tenham sorte e evitem o tiro, não deixarei que passem pelo meu escudo."
42200-23 = "Espere, FOX3. Não posso deixar passar essa."
42200-24 = "Você realmente acha que eu não conseguiria acertar um alvo correndo em um corredor estreito?"
42200-25 = "Não é que eu duvide da sua habilidade, mas #né possível que as integrantes do RABBIT Squad apareçam de repente em grupo, não é?"
42200-26 = "Se o seu rifle de precisão fosse de cano duplo, talvez eu considerasse."
42200-27 = "Oh, essa não é uma ideia bem interessante?"
42200-29 = "FOX4, priorize o suporte à FOX3 e concentre-se em impedir o avanço inimigo."
42200-30 = "O adversário sabe que temos um atirador. Eles devem tomar medidas antes de invadir."
42200-31 = "...Na pior das hipóteses, há a possibilidade de nos pegarem de surpresa e contornarem o caminho."
42200-33 = "O básico da guerra especial é controlar as variáveis em um campo de batalha em constante mudança e #nmanter a superioridade numérica."
42200-34 = "Apenas pela vantagem geográfica e pelo desempenho dos equipamentos, nosso poder de combate já supera o delas. #nSe conseguirmos lidar bem com as variáveis, o sucesso da operação é garantido."
42200-36 = "...Faz sentido."
42200-37 = "Bem, Yukino... não, a FOX1 sempre diz apenas o que é correto."
42200-38 = "É justamente por isso que podemos confiar e seguir suas ordens, não é?"
42200-40 = "Se entenderam, chega de conversa. #nVamos, o H-Hour está próximo."
42200-46 = "Aqui é FOX2, mudei o modo de controle remoto do elevador central que leva à Sala de Operações para offline."
42200-47 = "Fazendo isso, não importa o truque que a Moe use, ela não conseguirá hackear."
42200-48 = "...Mas, pensando bem, será que isso não é exagero? #nPor mais que sejam nossas veteranas, não acho que elas chegariam a esse ponto..."
42200-49 = "Quem se prepara não sofre; como agentes de forças especiais, devemos sempre considerar o pior cenário."
42200-50 = "..."
42200-51 = "Yukino-chan..."
42200-52 = "Não, a FOX1 acha que podemos perder para o RABBIT Squad?"
42200-53 = "...Como nada neste mundo é absoluto, não é algo impossível."
42200-57 = "Na eventualidade de... a FOX2 ser derrotada e o local ser invadido."
42200-58 = "Todos devem ir para a superfície e aguardar a próxima ordem."
42200-63 = "Ué? Não era para nos unirmos à FOX1 e contra-atacar?"
42200-64 = "Mesmo que estejamos com as forças reduzidas, se ainda pudermos nos mover, seria melhor dar suporte na retaguarda..."
42200-66 = "Não, se permitirmos que o inimigo se aproxime da Sala de Operações, na prática, a operação terá falhado."
42200-67 = "Quero que subam para a superfície e garantam uma rota de fuga para que possamos sair rapidamente."
42200-69 = "É verdade, mas..."
42200-70 = "Já que a líder disse isso... parece que ela tem algo em mente."
42200-72 = "FOX1, por acaso..."
42200-74 = "...É uma ordem, Niko."
42200-75 = "Sobre isso, peço que não me pergunte o motivo."
42200-81 = "...Entendido."
42200-84 = "O objetivo desta operação é capturar ou neutralizar a ogiva termobárica <A.N.T.I.O.C.H.> trazida para este silo e impedir sua detonação."
42200-85 = "Atualmente, a ogiva já está instalada no silo e todas as operações estão sendo realizadas na Sala de Operações, no nível inferior da instalação."
42200-86 = "Para neutralizar a ogiva, primeiro precisamos tomar a sala de operações, mas..."
42200-92 = "……Está mais fundo do que eu pensava."
42200-94 = "Sim. Como a sala de operações fica na parte mais profunda do silo, precisamos usar o elevador central para chegar lá."
42200-95 = "Além disso, não há cobertura no caminho até o elevador... a rota é fixa e, por ser um local aberto, ficaremos expostas diretamente aos atiradores."
42200-96 = "Tem pontos de sniper demais aqui... vai ser difícil identificar as posições."
42200-97 = "O ideal seria neutralizar os atiradores antes de avançar, mas... temos pouco tempo antes que a ogiva seja detonada."
42200-98 = "……Portanto, para não dar chance aos inimigos, todo o esquadrão tentará um ataque surpresa."
42200-99 = "Rápida como o vento ao se mover, impiedosa como o fogo ao atacar. #nÉ o básico da estratégia militar."
42200-100 = "Quais são os pontos específicos de atenção?"
42200-104 = "Bem... há uma alta probabilidade de inimigos estarem de tocaia no Ponto Lima."
42200-105 = "RABBIT 2, após neutralizar os inimigos, garanta o console de controle do elevador central."
42200-106 = "Em seguida, RABBIT 3, assim que o console for garantido, tente hackeá-lo para assumir o controle do elevador."
42200-108 = "Sem problemas. Deixa comigo~"
42200-109 = "E-eu, o que devo fazer...?"
42200-111 = "RABBIT 4..."
42200-112 = "Esconda-se nos pontos de sniper da escadaria externa e, assim que um atirador disparar contra o ponto de frente... calcule a distância e a direção para realizar um contra-sniper."
42200-113 = "Eu consigo calcular a direção e a distância do tiro, mas..."
42200-114 = "E se a Saki-chan se machucar com esse disparo...?"
42200-115 = "Não se preocupe. Se você tiver medo de balas, não pode ser a linha de frente."
42200-116 = "Este capacete e colete à prova de balas servem justamente para isso. Não se preocupe!"
42200-117 = "E-entendido...!"
42200-119 = "Hmm, entendi o plano, mas... não tem um Plano B caso algo dê errado?"
42200-120 = "Se a Saki for neutralizada, ou se eu falhar no hackeamento, ou se a Miyu errar o contra-sniper, a operação vai por água abaixo, não vai?"
42200-125 = "Não preparei... um plano alternativo."
42200-126 = "Hã? Como assim?"
42200-127 = "Vocês são o esquadrão mais forte que eu comando."
42200-128 = "Como uma unidade especial capaz de ser mais rápida, forte e furtiva que qualquer outra, não consigo nem imaginar perdermos em uma operação especial."
42200-130 = "Por isso, quero que confiem umas nas outras e encarem a missão partindo do princípio de que todas teremos sucesso."
42200-131 = "……Eu também confio em todas vocês."
42200-133 = "……Esse é o plano mais idiota que a Miyako já criou."
42200-134 = "I-isso soou tão teimoso assim...?"
42200-135 = "Bem, mas... é uma ordem da nossa capitã, né?"
42200-139 = "RABBIT 2, executando ordens."
42200-140 = "……Moe, Miyu. Conto com o suporte na retaguarda."
42200-143 = "Pode deixar!"
42200-148 = "Então... início da invasão!"
