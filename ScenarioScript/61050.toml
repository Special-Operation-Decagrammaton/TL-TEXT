[translation]
61050-1 = "Episódio 5; Desculpas"
61050-3 = "A patrocinadora é... aquela [ruby=Kirifuji]Kirifuji[/ruby] Nagisa...?"
61050-4 = "Sensei... por que você guardou segredo sobre algo tão importante?"
61050-5 = "Waaaaaahhh! Já era! É o fim!#nNós vamos ser levadas para Trinity e vão arrancar as nossas unhas...!"
61050-9 = "Não... nós não fazemos mais esse tipo de coisa hoje em dia..."
61050-10 = "Hoje em dia...? Quer dizer que vocês já fizeram isso antes, né?#nAté os apócrifos de Arius tinham descrições desse tipo de coisa..."
61050-23 = "S-Sensei...?"
61050-24 = "Sensei?"
61050-26 = "[ns1]\"Pessoal, acalmem-se.\"\n[ns2]\"Nem eu nem a Nagisa estamos pensando em fazer nada suspeito.\""
61050-30 = "Isso não foi nada convincente!"
61050-31 = "Waaaaaahhh!"
61050-33 = "Ahem. Deixe-me cumprimentá-las novamente. Boa tarde, membros do Esquadrão Arius."
61050-34 = "Sou a anfitriã do Tea Party, [ruby=Kirifuji]Kirifuji[/ruby] Nagisa."
61050-35 = "Olá, Nagisa-san.#nSou a [ruby=Hakari]Hakari[/ruby] Atsuko, do Esquadrão Arius."
61050-36 = "É um prazer conhecê-la, Atsuko-san."
61050-40 = "[ruby=Imashino]Imashino[/ruby] Misaki."
61050-41 = "T-Tsuchinaga Hiyori... sou eu. Ehehe."
61050-42 = "...[ruby=Joumae]Joumae[/ruby] Saori."
61050-43 = "Você já me conhece bem, não é?"
61050-45 = "Sim. Não apenas a Saori-san, mas todas vocês.#nPelo menos no papel, estou ciente de tudo."
61050-46 = "Mas acredito que todas também conheçam o meu [ruby=histórico]passado[/ruby]."
61050-47 = "...Por que você tem que falar desse jeito?"
61050-48 = "E-Eek..."
61050-49 = "Misaki, vamos ouvir o que ela tem a dizer um pouco mais?#n—Você também, Saori."
61050-51 = "...Entendido."
61050-52 = "...Tomarei cuidado."
61050-54 = "Vamos mudar de ares um pouco. Por favor, entrem."
61050-55 = "E-Entrar... dentro do navio...?"
61050-56 = "Sim. Eu o reservei para o dia todo hoje, então não precisam se preocupar com olhares alheios."
61050-58 = "!?"
61050-59 = "!?"
61050-60 = "..."
61050-61 = "[ns3]\"Você alugou um navio de cruzeiro inteiro!?\"\n[ns4]\"Acho que você exagerou um pouco...\""
61050-64 = "Estou apenas alugando as instalações e o espaço enquanto ele está ancorado."
61050-65 = "Isso está dentro do orçamento de despesas normais, então não se preocupem.#nPor favor, vamos lá."
61050-69 = "A-Assustador... isso é assustador demais... então isso é o que significa ser rico...#nIsso... não é um sonho, né...?"
61050-70 = "A escala de grandeza é de outro mundo..."
61050-71 = "O que devemos fazer numa hora dessas...?"
61050-73 = "[ns]\"Por enquanto... vamos apenas aceitar a gentileza dela...\""
61050-75 = "É verdade. Ei, se não formos rápido, a Nagisa-san vai nos deixar pra trás."
61050-76 = "Hã? Estou calma? Eu?"
61050-77 = "Hehe, ver até o Sensei em pânico me fez perceber que isso realmente foi inesperado."
61050-78 = "Sendo assim, o melhor a fazer é só deixar rolar, não é?"
61050-79 = "[ns]\"Vou seguir o seu exemplo, Atsuko...\""
61050-83 = "W-Waaah..."
61050-84 = "Bem, antes de entrarmos no assunto principal... vocês estão com fome? Este restaurante não tem cardápio, então, por favor, peçam o que quiserem."
61050-86 = "Como assim...? Se não tem cardápio, como a gente vai pedir?"
61050-87 = "[ns5]\"Não é isso... é que...\"\n[ns6]\"Eles podem preparar qualquer coisa que você pedir...!\""
61050-90 = "Isso é realmente possível...?"
61050-91 = "Espero que isso não seja a \"Última Ceia\".#nSério, o que tá acontecendo..."
61050-93 = "N-Não, essa não é a intenção..."
61050-94 = "Desculpe. É que nós não estamos acostumadas com esse tipo de lugar."
61050-95 = "Então, podemos deixar os pedidos com você, Nagisa-san?"
61050-96 = "Sim, é claro. Mestre, por favor?"
61050-101 = "O que as senhoritas desejarem."
61050-102 = "Sendo assim—"
61050-104 = "（Após um tempo, os pratos começaram a chegar um após o outro）"
61050-110 = "（Nagisa aproveitava a comida como quem estava acostumada, mas nós, que não estávamos, não conseguíamos nem distinguir direito os sabores）"
61050-111 = "（...Com a exceção de uma pessoa）"
61050-115 = "I-Iffo tá uma delífia~! Nnfu~~!"
61050-116 = "Hiyori? Falar de boca cheia é... um pouco falta de educação, sabia...?"
61050-117 = "M-Mpf, gulp! D-Desculpe...!#nMas tá muito gostoso...! É a primeira vez que provo algo assim!"
61050-118 = "Sim, coma o quanto quiser. Fico feliz que tenha gostado."
61050-120 = "Como estava a comida?"
61050-121 = "[s]\"Estava incrível...\""
61050-122 = "...Obrigada pela refeição."
61050-123 = "Será que tem problema nós aproveitarmos um luxo desses sozinhas...?"
61050-127 = "A-Ah, com licença... Será que eu poderia... levar só um pouquinho pra casa...?"
61050-128 = "Eu entendo como se sente, mas você vai ter que se segurar."
61050-129 = "Uuu... O-Ok..."
61050-131 = "Então, que tal tomarmos um chá após a refeição?"
61050-132 = "Preparei algumas folhas de chá da companhia Twilight, uma das minhas favoritas.#nEla é conhecida por ter um aroma bem forte."
61050-133 = "Gostaria que eu preparasse?"
61050-134 = "Não, obrigada.#nPessoal, vou preparar o chá, então aguardem um momento."
61050-136 = "（Nagisa começou a preparar o chá com grande habilidade）"
61050-141 = "（O aroma agradável envolveu suavemente toda a sala）"
61050-143 = "Desculpem a demora. É um chá modesto, mas por favor, sirvam-se."
61050-147 = "Ehehe... é quentinho e gostoso...#nUuu... me faz lembrar da \"Hora da Água\" dos velhos tempos..."
61050-148 = "...Verdade. Tinha isso também."
61050-150 = "Hora da água...?"
61050-152 = "Em Arius, aqueles que iam bem no treinamento recebiam [ruby=á g u a  q u e n t e]água quente[/ruby]."
61050-153 = "Era mais ou menos nessa mesma hora."
61050-155 = "[ns]（Água... quente?）"
61050-156 = "N-Naquela época... eu bebia um golinho de cada vez... com todo o cuidado..."
61050-157 = "Era só água quente... mas era a coisa mais deliciosa do mundo...#nÉ meio estranho, né...?"
61050-158 = "Ah! Mas é claro que o chá da Nagisa... san...?#nNagisa-sama...? é mais gostoso!"
61050-160 = "Podem me chamar como preferirem."
61050-161 = "Afinal, fui eu quem chamou vocês aqui."
61050-162 = "...Como assim?#nEssa reunião não foi uma ideia do Sensei?"
61050-163 = "..."
61050-164 = "Essa história toda... começou quando as alunas transferidas foram se consultar com o Sensei, não foi?#nComo é que você sabe disso?"
61050-166 = "[ns]\"B-Bom, sobre isso...\""
61050-167 = "Não, Sensei. Acho que eu mesma deveria falar sobre isso."
61050-168 = "Afinal, foi para isso que o senhor preparou esta reunião."
61050-169 = "Por onde devo começar..."
61050-170 = "Sem medo de ser mal interpretada, o departamento de inteligência de Trinity é excelente.#nEspero que entendam o que isso significa."
61050-171 = "...Vocês receberam um relatório no momento em que as alunas transferidas se encontraram com o Sensei."
61050-172 = "Isso quer dizer que elas estão sendo vigiadas?"
61050-173 = "Isso é..."
61050-174 = "[ns7]\"A partir daqui, eu explico.\"\n[ns8]\"Acho que é um pouco cedo, mas é melhor antes que as coisas se compliquem.\""
61050-177 = "S-Sensei?"
61050-178 = "[s9]\"Se ela mesma falar sobre isso, só vai causar o efeito contrário.\"\n[s10]\"Eu ouvi o que ela tinha a dizer e confirmei os fatos eu mesmo.\""
61050-181 = "...Por favor."
61050-186 = "[ns11]\"É verdade que tem uma aluna responsável designada para as alunas transferidas.\"\n[ns12]\"Mas não como uma 'vigia', e sim como um 'suporte'.\""
61050-189 = "[ns13]\"E mais, sobre a conversa que tiveram comigo――\"\n[ns14]\"Foram as próprias meninas transferidas quem relataram isso.\""
61050-192 = "...E a gente deveria acreditar nisso?"
61050-193 = "Eu entendo que vocês não consigam confiar em Trinity... ainda mais em mim, membro do Tea Party. No entanto..."
61050-195 = "[ns]\"Poderiam pelo menos confiar em mim?\""
61050-197 = "..."
61050-198 = "E-Eu confio... É o Sensei, afinal..."
61050-199 = "Hiyori..."
61050-200 = "M-Mas o Sensei sempre nos ajudou..."
61050-201 = "E se ele quisesse mesmo, poderia ter ligado para a Valkyrie ou para qualquer outro lugar..."
61050-202 = "Ele poderia nos mandar para a Secretaria de Correções ou para um lugar bem mais assustador agora mesmo..."
61050-203 = "...Gasp!? E-Então era isso!?#nO Sensei sendo bonzinho com a gente era tudo uma armadilha pra isso...!?"
61050-204 = "Waaaaaaahhh! Já era! É o fim! Nós realmente nunca tivemos sonhos ou esperanças, no final das contas! Pelo menos me deixem terminar esse chá primeiro――!"
61050-211 = "E-Erm... Sensei? Isso é..."
61050-212 = "[s15]\"Isso acontece sempre...\"\n[s16]\"Pode ficar tranquila.\""
61050-215 = "A-Ah, entendo..."
61050-216 = "Hã...? \"Não se preocupe com isso e faça o que decidiu fazer\", é isso?"
61050-217 = "..."
61050-218 = "Sim, tem razão.#nCaso contrário... não haveria sentido em armar tudo isso escondida das outras alunas de Trinity."
61050-219 = "Meninas.#nNão vou dar a desculpa conveniente de que \"vim como indivíduo\"."
61050-220 = "De qualquer forma, não importa o que eu faça ou diga, a minha intenção sempre será questionada.#nAfinal, é isso que significa ser Presidente do Conselho Estudantil."
61050-221 = "Portanto..."
61050-226 = "...Minhas mais sinceras desculpas."
61050-230 = "...Hã?"
61050-231 = "Eeeh...!?"
61050-232 = "..."
61050-233 = "Você disse que sua posição exige que questionem suas intenções o tempo todo."
61050-234 = "Sendo assim, posso perguntar qual a sua verdadeira intenção com esse pedido de desculpas?"
61050-236 = "...É exatamente o que eu disse."
61050-237 = "Como uma aluna de Trinity. E como a anfitriã do Tea Party."
61050-238 = "...E também como a representante atual de Trinity."
61050-239 = "Eu peço desculpas a vocês, e à Escola Satélite Arius."
61050-240 = "Por que você está se desculpando?#nFomos [ruby=nós]o Esquadrão Arius[/ruby] que causamos aquele ataque terrorista."
61050-241 = "De fato, se olharmos apenas para aquele incidente, a Atsuko-san tem razão."
61050-242 = "No entanto... eu sei que havia razões que forçaram vocês a agir daquela maneira."
61050-243 = "Não, em vez de \"havia\", seria mais correto dizer que essas razões \"ainda existem\"."
61050-244 = "Após o \"Primeiro Concílio\", a relação entre Trinity e Arius mudou."
61050-245 = "Mas ainda deve haver algo entre nós que prove que \"já fomos uma só\"."
61050-246 = "E por isso o pedido de desculpas? O sentimento de culpa bateu agora?"
61050-247 = "――Misaki."
61050-249 = "Tudo bem. Acredito que vocês tenham o direito de dizer essas palavras para mim."
61050-250 = "Nós expulsamos Arius apenas por diferenças de interpretação.#nIsso foi, sem dúvida... um erro cometido por Trinity."
61050-251 = "Porém, isso não me dá o direito de desviar o olhar do problema.#n...Pelo menos, não deveria."
61050-252 = "O pensamento que cruzou minha mente foi que... [ruby=e u]eu[/ruby] talvez tenha ignorado pessoas que sofriam bem ao meu lado... apenas por razões políticas e posições de poder."
61050-253 = "Mesmo sabendo que a dor e o sofrimento ainda continuam...#nIgnorar isso seria o mesmo que fazer a coisa errada."
61050-255 = "Não dá pra engolir uma história dessas."
61050-256 = "Eh, eeh!?"
61050-257 = "Eu não gosto muito de desenterrar coisas do passado, mas."
61050-258 = "A vítima daquele incidente foi [ruby=Kirifuji]Kirifuji[/ruby] Nagisa... você."
61050-259 = "E, como não é novidade, [ruby=nós]o Esquadrão Arius[/ruby] fomos as agressoras."
61050-260 = "Não acha estranho? A vítima pedindo desculpas primeiro... e logo pras agressoras.#nSe a gente parar pra pensar, não faz sentido nenhum."
61050-261 = "Nessas histórias que não fazem sentido, com certeza... tem algum motivo escondido."
61050-263 = "...Misaki, meça suas palavras."
61050-264 = "..."
61050-265 = "A dúvida da Misaki-san é bem compreensível."
61050-266 = "E eu... tenho tanto a resposta \"que todos aceitariam\" quanto a que não aceitariam."
61050-267 = "Eu gostaria de ouvir primeiro a resposta \"que todos aceitariam\"."
61050-268 = "Pois bem..."
61050-269 = "As \"alunas restantes da Escola Satélite Arius\", o estopim de Trinity.#nSe as preocupações envolvendo vocês pudessem ser extintas com um único pedido de desculpas meu――"
61050-270 = "Vocês não acham que isso seria uma manobra política com um custo-benefício incrível?"
61050-271 = "...Você devia ter dito isso desde o início."
61050-272 = "Espera. A Nagisa-san ainda não terminou."
61050-273 = "Qual é a \"outra resposta\"?"
61050-275 = "..."
61050-276 = "A aluna encarregada de ser a anfitriã do Tea Party estava pensando consigo mesma."
61050-277 = "O porquê daquele incidente peculiar conhecido como o Tratado do Éden ter terminado daquela forma."
61050-278 = "Investigando os registros do passado... acessíveis apenas ao Tea Party, e reexaminando tudo desde o começo――"
61050-279 = "De repente, enquanto olhava para o pátio de Trinity, ela pensou que \"deveria fazer aquilo\"."
61050-280 = "Essas duas escolas... não podem continuar do jeito que estão."
61050-281 = "Se vamos consertar as coisas, devemos começar pela raiz do problema."
61050-282 = "Trinity, a escola que carrega os \"erros do passado\", deveria dar o primeiro passo e mostrar que deseja a reconciliação de alguma forma... Foi isso que eu pensei."
61050-283 = "...Parece o tipo de coisa que a princesa cor-de-rosa diria."
61050-284 = "Sim... Talvez eu finalmente tenha começado a entender um pouco os sentimentos dela."
61050-286 = "..."
61050-287 = "..."
61050-288 = "Ehehe..."
61050-292 = "Bom, então acho que agora é a minha vez."
61050-296 = "...!"
61050-297 = "Como uma daquelas que um dia já foram chamadas de Royal Blood."
61050-298 = "Ou... da mesma forma que você, como Presidente do Conselho Estudantil――"
61050-299 = "Como a pessoa da Escola Satélite Arius que talvez estivesse mais próxima disso."
61050-300 = "Peço desculpas por todos os atos de terrorismo que nós causamos."
61050-301 = "Agradeço por dizer essas palavras."
61050-302 = "É claro que... não acho que apenas pedir desculpas a [ruby=vocês]o Esquadrão Arius[/ruby] vá resolver todos os problemas."
61050-303 = "Há as alunas de Arius que se transferiram para Trinity."
61050-304 = "E também há aquelas que ficaram na Escola Satélite... Terei de preparar uma oportunidade para me desculpar com elas em algum momento."
61050-305 = "Além do mais, um pedido de desculpas―― traz consigo responsabilidade."
61050-306 = "A responsabilidade é algo que frequentemente devemos demonstrar através de \"ações\"."
61050-307 = "Isso é algo que... ninguém menos que o Sensei me ensinou."
61050-309 = "...Compreendi o que quer dizer.#nTambém tenho uma montanha de coisas pelas quais devo me desculpar..."
61050-310 = "Mas se eu começar a falar sobre elas, esse vai ser o único assunto de hoje.#nVamos prosseguir."
61050-311 = "Se você interveio nessa \"conversa\" de propósito...#nTem mais alguma coisa que gostaria de nos dizer?"
61050-312 = "Se quisesse apenas saber o conteúdo da \"conversa\", você teria outras maneiras de fazer isso mais tarde.#nNão haveria motivo para dar tanto trabalho ao Sensei para preparar esse local, haveria?"
61050-313 = "Você adivinhou muito bem."
61050-314 = "Então, a partir daqui, irei entrar no assunto principal."
61050-315 = "Acredito que o Sensei tocou no assunto de \"exames\" mais cedo."
61050-316 = "...Não me diga."
61050-317 = "Exatamente."
61050-318 = "Isso também pode ser uma ideia... complacente, presunçosa e arrogante de minha parte, mas..."
61050-319 = "Assim como o Sensei, eu também gostaria que [ruby=vocês]o Esquadrão Arius[/ruby]..."
61050-320 = "E também... as alunas que continuam na Escola Satélite Arius."
61050-321 = "Pudesse se tornar, com muito orgulho, uma parte desta sociedade."
61050-322 = "Obrigada pela preocupação. Eu recebo os seus sentimentos de coração aberto."
61050-323 = "Mas, dependendo de como você olha para isso, pode ser interpretado como \"caridade\"."
61050-327 = "Escondida por trás da gentileza e bondade, há uma noção de que \"eu sou superior a você\"――"
61050-328 = "E sem nem ao menos perceber, eu acabo tentando ensinar e guiar os outros."
61050-329 = "A atitude de tentar medir a vida dos outros com a própria régua...#nIsso também pode acabar sendo arrogante, às vezes."
61050-330 = "Mas esse não é o seu caso, Nagisa-san, não é mesmo?"
61050-331 = "Atsuko-san..."
61050-332 = "Acho que consigo confiar numa pessoa que seja capaz de perceber sozinha que \"talvez esse seja o caso\".#nComo por exemplo... o Sensei."
61050-333 = "Não é, Misaki?"
61050-335 = "...Não acho que você esteja errada."
61050-336 = "A Nagisa-san nos serviu comida gostosa, então..."
61050-337 = "Eu... hum. Acho que não tem problema a gente confiar nela..."
61050-342 = "...Muito obrigada."
61050-343 = "Parece que todas estamos na mesma página."
61050-344 = "E então... o que eu, o Sensei e as meninas temos de fazer agora?"
61050-345 = "Hã? E-Eu ainda não cheguei nessa parte...#nComo você...?"
61050-346 = "Bom..."
61050-347 = "Quando se vive rastejando pelo chão, é possível enxergar certas coisas."
61050-349 = "...Acho que eu diria algo do tipo."
61050-351 = "L-Líder...!"
61050-352 = "O que você disse foi bem legalzinho, mas..."
61050-353 = "É. E eu vou ter que tirar uns pontos de você por isso."
61050-355 = "É mais forte do que eu..."
61050-357 = "Próximo Episódio; A Cadeira do Outro Lado"