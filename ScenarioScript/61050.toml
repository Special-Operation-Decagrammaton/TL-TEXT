[translation]
61050-1 = "第5話;謝罪"
61050-3 = "スポンサーって……あの[ruby=きりふじ]桐藤[/ruby]ナギサ……？"
61050-4 = "先生……なんでこんな大事なことを黙ってたわけ？"
61050-5 = "うわぁぁぁぁぁぁああん！もうダメです！おしまいです！#nこのままトリニティに連れていかれて、爪を剥がされるんです……！"
61050-9 = "いえ……今はもう、そういうのはしておりませんので……。"
61050-10 = "今は……？それ、やってたことはあるってことでしょ？#nアリウス外典にも、それっぽい記述はあったけど……。"
61050-23 = "せ、先生……？"
61050-24 = "先生？"
61050-26 = "[ns1]\"みんな、落ち着いて。\"\n[ns2]\"私もナギサも、怪しいこと考えてるわけじゃないから。\""
61050-30 = "全然説得力ないんだけど！"
61050-31 = "うわぁぁぁぁぁぁああん！"
61050-33 = "コホン、では改めてご挨拶を。こんにちは、アリウススクワッドの皆さん。"
61050-34 = "ティーパーティーのホスト、[ruby=きりふじ]桐藤[/ruby]ナギサと申します。"
61050-35 = "こんにちは、ナギサさん。#nアリウススクワッド[ruby=はかり]の秤ア[/ruby]ツコだよ。"
61050-36 = "よろしくお願いいたしますね、アツコさん。"
61050-40 = "[ruby=いましの]戒野[/ruby]ミサキ。"
61050-41 = "つ、[ruby=つちなが]槌永[/ruby]ヒヨリ……です。えへへ。"
61050-42 = "……[ruby=じょうまえ]錠前[/ruby]サオリだ。"
61050-43 = "私のことは、よく知っているだろう？"
61050-45 = "はい。サオリさんだけでなく、皆さんのことも。#n少なくとも書類上では、すべて把握しております。"
61050-46 = "ですが皆さんも、私の[ruby=いきさつ]経緯[/ruby]についてはご存じですよね。"
61050-47 = "……なんでそういう言い方するかな。"
61050-48 = "ひ、ひいぃ……。"
61050-49 = "ミサキ、もう少し話を聞こう？#n――サオリもだよ。"
61050-51 = "……分かった。"
61050-52 = "……気をつけよう。"
61050-54 = "少し場を移しましょうか。皆さん、中へどうぞ。"
61050-55 = "な、中って……船の中ですか……？"
61050-56 = "はい。今日一日貸し切っていますので、他人の目を気にする必要はありませんよ。"
61050-58 = "！？"
61050-59 = "！？"
61050-60 = "……。"
61050-61 = "[ns3]\"クルーズ船を貸し切りにしたの！？\"\n[ns4]\"さすがに無理しすぎなんじゃ……。\""
61050-64 = "停泊させたまま施設と空間を借りているだけですから。"
61050-65 = "この程度は、通常の支出の範囲内ですのでお構いなく。#nさあ、どうぞ。"
61050-69 = "こ、こわい……こわすぎます……これがお金持ち……。#nこれ……夢じゃないですよね……？"
61050-70 = "スケールが違いすぎる……。"
61050-71 = "こういう時はどうすれば……。"
61050-73 = "[ns]\"とりあえず……ご厚意ってことにしておこうか……。\""
61050-75 = "そうだね。ほら、早く行かないとナギサさんに置いていかれちゃう。"
61050-76 = "え？落ち着いてる？私が？"
61050-77 = "ふふっ、先生まであたふたしてるのを見たら、本当に想定外のことなんだなって思えたんだ。"
61050-78 = "それなら、流れに身を任せるのが一番でしょ？"
61050-79 = "[ns]\"アツコを見習わせてもらうよ……。\""
61050-83 = "わ、わあぁ……。"
61050-84 = "さて、本題に入る前に……お腹は空いていませんか？このレストランにメニューはありませんので、何でもお好きなものをご注文ください。"
61050-86 = "どういう意味……？メニューがないのに、どうやって注文するの？"
61050-87 = "[ns5]\"違うよ……これは……。\"\n[ns6]\"どんな注文にも応えられるってことだよ……！\""
61050-90 = "そんなことが本当に可能なのか……？"
61050-91 = "これが「最後の晩餐」じゃないといいけど。#nほんと、何なんだか……。"
61050-93 = "い、いえ、そんなつもりでは……。"
61050-94 = "ごめんなさい。私たち、こういう場所には慣れてないんだ。"
61050-95 = "だから、ナギサさんにお任せしてもいい？"
61050-96 = "ええ、もちろんです。マスター、よろしいですか？"
61050-101 = "ご希望をなんなりと。"
61050-102 = "それでは――"
61050-104 = "（しばらくすると、コース料理が次々と運ばれてきた）"
61050-110 = "（ナギサは手慣れた様子で料理を楽しんでいたが、慣れていない私たちは、味がよく分からなくなっていた）"
61050-111 = "（……一人を除いて）"
61050-115 = "お、おいひぃでふぅ～……！んふ～～！"
61050-116 = "ヒヨリ？食べながらしゃべるのは……ちょっとお行儀が悪いよ……？"
61050-117 = "も、もぐもぐっ、ごっくん！す、すみません……！#nでも、すっごく美味しいんです……！こんなの初めてです！"
61050-118 = "ええ、たくさん召し上がってくださいね。私も嬉しいです。"
61050-120 = "お食事はいかがでしたか？"
61050-121 = "[s]\"すごかった……。\""
61050-122 = "……ごちそうさまでした。"
61050-123 = "私たちだけでこんな贅沢をしてしまっていいのだろうか……。"
61050-127 = "あ、あの……少しだけ、持って帰ったりとか……できますか……？"
61050-128 = "気持ちは分かるけど、ここは我慢だよ。"
61050-129 = "うぅぅ……は、はいぃ……。"
61050-131 = "では、食後のティータイムをご一緒にいかがですか？"
61050-132 = "私が贔屓にしているトワイライト社の茶葉をご用意しました。#n香り高いのが特徴でして。"
61050-133 = "お淹れしましょうか？"
61050-134 = "いえ、結構です。#n皆さん。準備しますので、少々お待ちくださいね。"
61050-136 = "（ナギサは見事な手際で紅茶を淹れはじめた）"
61050-141 = "（芳しい香りが部屋全体を優しく包んだ）"
61050-143 = "お待たせしました。粗茶ですが、どうぞ召し上がってください。"
61050-147 = "えへへ……あったかくて、おいしいです……。#nうぅぅ……昔の「ウォータータイム」を思い出しますね……。"
61050-148 = "……あったね。そんなのも。"
61050-150 = "ウォータータイム、ですか……？"
61050-152 = "アリウスだと、訓練の優秀者には[ruby=・   ・   ・   ・]温かい水[/ruby]が支給されてたの。"
61050-153 = "ちょうど今くらいの時間だったはず。"
61050-155 = "[ns]（温かい……水？）"
61050-156 = "あ、あのときは……一口ずつ大事に……大事に飲んでましたね……。"
61050-157 = "ただのお湯だったのに……何よりも美味しくて……。#n不思議ですよね……。"
61050-158 = "あっ！もちろん、ナギサ……さん……？#nナギサ様……？のお茶の方が、美味しいです！"
61050-160 = "好きに呼んでいただいて構いませんよ。"
61050-161 = "皆さんをお呼び立てしているのは、こちらなのですし。"
61050-162 = "……それ、どういうこと？#nこの集まりは先生の発案じゃなかったの？"
61050-163 = "……。"
61050-164 = "この話……編入生が先生に相談したのがきっかけだったんでしょ？#nなんでそれをあなたが知ってるわけ。"
61050-166 = "[ns]\"そ、それについてなんだけど……。\""
61050-167 = "いえ、先生。これは私からお話しすべきことだと思っています。"
61050-168 = "少なくとも、そのためにこの席を設けていただいたのですから。"
61050-169 = "どこからお話ししましょうか……。"
61050-170 = "誤解を恐れずに言うならば、トリニティの情報部は優秀なので。#nご理解いただけますでしょうか。"
61050-171 = "……編入生が先生に会った時点で、報告は上がってたんだ。"
61050-172 = "それ、監視がついてるってことでいいの？"
61050-173 = "それは……。"
61050-174 = "[ns7]\"ここから先は、私が説明するね。\"\n[ns8]\"ちょっと早い気もするけど、話がこじれる前にね。\""
61050-177 = "せ、先生？"
61050-178 = "[s9]\"こういうのは、本人が言うとかえって逆効果だから。\"\n[s10]\"話は聞いてるし、私もちゃんと事実確認したからね。\""
61050-181 = "……お願いします。"
61050-186 = "[ns11]\"編入生に、担当の生徒がついてるのは事実だよ。\"\n[ns12]\"「監視」じゃなくて、「サポート役」としてね。\""
61050-189 = "[ns13]\"それに、私に相談したことは――\"\n[ns14]\"編入生の子たちが自分で報告したんだよ。\""
61050-192 = "……それ、信じられると思う？"
61050-193 = "皆さんがトリニティを……それも、ティーパーティーである私を信用できないことは理解しています。ですが……。"
61050-195 = "[ns]\"せめて私のことは、信じてくれないかな？\""
61050-197 = "……。"
61050-198 = "わ、私は信じます……先生、ですから……。"
61050-199 = "ヒヨリ……。"
61050-200 = "だ、だって先生は、いつも私たちのことを助けてくれましたし……。"
61050-201 = "それに本気を出せば、ヴァルキューレとか、あちこちに連絡して……。"
61050-202 = "今からでも私たちを矯正局とか、もっと怖いところに送り込めるわけですし……。"
61050-203 = "……はっ！？ま、まさかそういうことだったんですか！？#n今まで優しくしてくれたのは、そのための罠……！？"
61050-204 = "うわぁぁぁぁぁぁああん！もうダメです！終わりです！やっぱり夢も希望もなかったんです！せめて、最後にこの紅茶だけは飲み干してから――！"
61050-211 = "あ、あの……先生？これは……。"
61050-212 = "[s15]\"いつものことだから……。\"\n[s16]\"安心して大丈夫だよ。\""
61050-215 = "そ、そうですか……。"
61050-216 = "え……？気にせず、自分の決めたことをやれ、ですか？"
61050-217 = "……。"
61050-218 = "はい、そうですね。#nでなければ……トリニティの皆さんには内緒にしてまで、この場を設けた意味がなくなってしまいます。"
61050-219 = "皆さん。#n私は「個人として来た」などと、都合のいい言い訳はしません。"
61050-220 = "どのみち何をしても、どう言っても、それに込めた意図を問われるものです。#n生徒会長というのは、そういう立場ですから。"
61050-221 = "ですから……。"
61050-226 = "……申し訳ございませんでした。"
61050-230 = "……え？"
61050-231 = "えぇっ……！？"
61050-232 = "……。"
61050-233 = "どんな言動にも真意を問われる立場……あなたはそう言ったよね。"
61050-234 = "それなら、謝罪の真意を聞いてもいい？"
61050-236 = "……言葉の通りですよ。"
61050-237 = "一人のトリニティ生として。そして、ティーパーティーのホストとして。"
61050-238 = "……今のトリニティを代表する者としても。"
61050-239 = "私は皆さん、そしてアリウス分校に、謝罪を申し上げます。"
61050-240 = "どうしてあなたが謝るの？#nテロを起こしたのは、[ruby=私たち]アリウススクワッド[/ruby]だったはずだけど。"
61050-241 = "たしかに、あの事件だけを見ればアツコさんのおっしゃる通りです。"
61050-242 = "ですが……そうせざるを得なかった理由があったことを、私は知っています。"
61050-243 = "いいえ、「あった」のではなく、「今もあり続けている」と言うべきでしょうか。"
61050-244 = "「公会議」を境に、トリニティとアリウスの関係は変わってしまいました。"
61050-245 = "しかし今なお私たちの間には、「一つだった」と言える部分が残されているはずです。"
61050-246 = "それで謝罪？今さら罪悪感でも湧いたの？"
61050-247 = "――ミサキ。"
61050-249 = "構いません。皆さんには、その言葉を投げかける資格があると思っています。"
61050-250 = "解釈の違いという理由で、アリウスを追放した。#nそれは紛れもなく、トリニティの……過ちだったのですから。"
61050-251 = "ですがそれは、私が目を背けていい理由にはなりません。#n……ならないはずでした。"
61050-252 = "すぐ傍で苦しんでいた方々を……政治的な事情や立場という理由で、[ruby=・   ・]私が[/ruby]軽んじていたのではないかと、そんな考えがよぎったのです。"
61050-253 = "その苦しみや痛みが、今もなお続いているというのに……#nそれを放っておいたままでいるというのは、正しくない行いであると。"
61050-255 = "それだと納得はできないよね。"
61050-256 = "え、えぇっ！？"
61050-257 = "終わったことを今さら掘り返すのは、あんまり好きじゃないけど。"
61050-258 = "あの事件での被害者は、[ruby=きりふじ]桐藤[/ruby]ナギサ……あなただよ。"
61050-259 = "言うまでも無く、[ruby=私たち]アリウススクワッド[/ruby]が加害者だった。"
61050-260 = "おかしいでしょ？被害者が、加害者に。それも、先に謝るなんて。#n普通に考えて、理屈が通らない。"
61050-261 = "こういう筋の通らない話には、どうせ……何か裏がある。"
61050-263 = "……ミサキ、言葉を慎め。"
61050-264 = "……。"
61050-265 = "ミサキさんの疑問は、もっともです。"
61050-266 = "そして私は……「誰もが納得できる」返答とそうでないもの両方を持っています。"
61050-267 = "「誰もが納得できる返答」から聞かせてほしいな。"
61050-268 = "そうですね……。"
61050-269 = "「アリウス分校の残存生徒」という、トリニティの火種。#nその懸念を、私一人の謝罪で消すことが叶うのならば――"
61050-270 = "それは、非常にコストパフォーマンスの良い政治的手段だとは思いませんか？"
61050-271 = "……最初からそう言えばよかったのに。"
61050-272 = "待って。まだナギサさんの話は終わってないよ。"
61050-273 = "もう一つ、「そうでない返答」というのは？"
61050-275 = "……。"
61050-276 = "ティーパーティーのホストを務める一生徒は、考えていました。"
61050-277 = "エデン条約という特異な事件は、なぜあのような顛末になってしまったのか、と。"
61050-278 = "ティーパーティー以外の者では触れられない……過去の記録にまで手を伸ばして、始まりから見つめ直した末に――"
61050-279 = "ふと、トリニティの校庭を見下ろしながら「そうすべきだ」と思ったのです。"
61050-280 = "この2校は……今のままの関係を続けてはいけない。"
61050-281 = "関係を正すのならば、その根本から。"
61050-282 = "「過去の過ち」を抱えるトリニティから、何らかの形で、和解の意思を示すべきだと……そう思ったのです。"
61050-283 = "……ピンク色のお姫様が言いそうな話だね。"
61050-284 = "はい……。ようやく、彼女の気持ちが少しだけ分かってきたのかもしれません。"
61050-286 = "……。"
61050-287 = "……。"
61050-288 = "えへへ……。"
61050-292 = "じゃあ、次は私の番だね。"
61050-296 = "……！"
61050-297 = "かつてロイヤルブラッドと呼ばれた者として。"
61050-298 = "あるいは……あなたと同じ生徒会長という立場に――"
61050-299 = "アリウス分校で、最も近かったかもしれない者として。"
61050-300 = "私たちが起こしたすべてのテロ行為を、謝罪します。"
61050-301 = "そのように言っていただき、ありがとうございます。"
61050-302 = "もちろん……[ruby=皆さん]アリウススクワッド[/ruby]に謝るだけで、すべてが解決するとは思っておりません。"
61050-303 = "トリニティに編入されたアリウスの皆さんにも。"
61050-304 = "まだ分校に残っている皆さんにも、いずれは謝罪の機会を設けなければならないでしょう。"
61050-305 = "そして、謝罪には――責任が伴います。"
61050-306 = "責任は、往々にして「行動」で示さなければならないもの。"
61050-307 = "これは……他でもない先生から教わったことです。"
61050-309 = "……話は理解した。#n私からも謝るべきことが山ほどあるが……。"
61050-310 = "それを話し出したら、今日はそれだけで終わってしまいそうだ。#n話を先に進めよう。"
61050-311 = "わざわざこの「相談」に介入したということは……#nなにか、他に私たちに言いたいことでもあるのか？"
61050-312 = "「相談」の内容を知りたいだけなら、後からいくらでもやりようがあったはずだ。#nわざわざ先生を使ってまで、場を設ける必要はないだろう？"
61050-313 = "ご推察のとおりです。"
61050-314 = "では、ここからは本題に入らせていただきます。"
61050-315 = "先ほど、先生から「試験」の話があったかと思います。"
61050-316 = "……まさか。"
61050-317 = "はい。"
61050-318 = "これも、私の独りよがりで……独善的で傲慢な考えかもしれませんが……。"
61050-319 = "それでも、私も先生と同じく、[ruby=皆さん]アリウススクワッド[/ruby]に……。"
61050-320 = "そして……アリウス分校に残る皆さんにも。"
61050-321 = "堂々と、この社会の一員であってほしいと願っているのです。"
61050-322 = "心遣い、ありがとう。気持ちは受け取るよ。"
61050-323 = "ですが見方によれば、「施し」と捉えられてしまうかもしれません。"
61050-327 = "優しさや親切の裏に、「私はあなたより優位にある」という意識が潜んでいる――"
61050-328 = "そんなことにすら気づかずに、つい他人を教え導こうとしてしまう。"
61050-329 = "自分の物差しで、他人の人生まで測ろうとする態度……#nそれは時に、傲慢にもなり得ます。"
61050-330 = "でも、ナギサさんはそうじゃないよね？"
61050-331 = "アツコさん……。"
61050-332 = "「そうかもしれない」って、自分で気づける人なら、私は信じられると思う。#nたとえば……先生がそうだから。"
61050-333 = "そうでしょ、ミサキ？"
61050-335 = "……間違ってるとは思わないけど。"
61050-336 = "ナギサさんは美味しいものをごちそうしてくれたので……。"
61050-337 = "私は……うん。信じてもいいのかな……って思います……。"
61050-342 = "……ありがとうございます。"
61050-343 = "みんな、思いは同じようだな。"
61050-344 = "それで……私たちと先生は、これから何をすればいい？"
61050-345 = "えっ？わ、私はまだ、そこまでお話したつもりはないのですが……#n何故……。"
61050-346 = "そうだな……。"
61050-347 = "地べたを這いずり回って生きていると、見えてくるものもある。"
61050-349 = "……とでも言っておこうか。"
61050-351 = "リ、リーダー……！"
61050-352 = "今のセリフ、かっこよかったところもあったけど……。"
61050-353 = "うん。でも、ちょっと減点かな。"
61050-355 = "ままならないな……。"
61050-357 = "次回;向こう側の椅子"
