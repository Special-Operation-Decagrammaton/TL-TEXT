[translation]
61050-1 = "Episódio 5; Pedido de desculpas"
61050-3 = "A patrocinadora é... aquela Kirifuji Nagisa...?"
61050-4 = "Sensei... por que você não me contou algo tão importante?"
61050-5 = "Waaaaaaah! Já era! Acabou para mim! #nVão me levar para Trinity e arrancar minhas unhas...!"
61050-9 = "Não... agora eu não faço mais esse tipo de coisa..."
61050-10 = "Agora...? Isso significa que você já fez antes, né? #nAté nos Apócrifos de Arius tinha algo parecido com isso..."
61050-23 = "Se, Sensei...?"
61050-24 = "Sensei?"
61050-26 = "[ns1]\"Pessoal, acalmem-se.\"\n[ns2]\"Nem eu nem a Nagisa estamos planejando nada suspeito.\""
61050-30 = "Isso não é nada convincente!"
61050-31 = "Waaaaaaah!"
61050-33 = "Cof, cof. Então, vamos nos apresentar formalmente. Olá, pessoal do Esquadrão Arius."
61050-34 = "Eu sou Kirifuji Nagisa, anfitriã do Chá das Cinco."
61050-35 = "Olá, Nagisa-san. #nEu sou Atsuko, do Esquadrão Arius."
61050-36 = "É um prazer conhecê-la, Atsuko-san."
61050-40 = "Misaki Ikari."
61050-41 = "Eu, Hiyori Tsuchinaga... é. Ehehe."
61050-42 = "...Saori Joumae."
61050-43 = "Você já sabe quem eu sou, não sabe?"
61050-45 = "Sim. Não apenas sobre você, Saori-san, mas sobre todas vocês. #nPelo menos nos documentos, eu tenho total conhecimento."
61050-46 = "Mas vocês também sabem sobre o meu histórico, não sabem?"
61050-47 = "...Por que você fala desse jeito?"
61050-48 = "I-iiih..."
61050-49 = "Misaki, vamos ouvir o que ela tem a dizer? #n— Saori, você também."
61050-51 = "...Entendido."
61050-52 = "...Vamos ter cuidado."
61050-54 = "Vamos mudar de lugar. Por favor, entrem."
61050-55 = "En-entrar... quer dizer, entrar no navio...?"
61050-56 = "Sim. Reservei o navio para o dia todo, então não precisam se preocupar com olhares alheios."
61050-58 = "!?"
61050-59 = "!?"
61050-60 = "..."
61050-61 = "[ns3]\"Você reservou um navio de cruzeiro!?\"\n[ns4]\"Isso não é exagero demais...?\""
61050-64 = "Estou apenas alugando o espaço e as instalações enquanto ele está ancorado."
61050-65 = "Isso está dentro do meu orçamento normal, então não se preocupem. #nVamos, entrem."
61050-69 = "Is-isso é assustador... assustador demais... é assim que os ricos vivem... #nIsso... não é um sonho, né...?"
61050-70 = "A escala é grande demais..."
61050-71 = "O que a gente deveria fazer numa hora dessas..."
61050-73 = "[ns]\"Por enquanto... vamos considerar isso um gesto de boa vontade...\""
61050-75 = "É verdade. Vamos, se não formos logo, a Nagisa-san vai acabar indo embora sem a gente."
61050-76 = "Hã? Eu estou calma? Eu?"
61050-77 = "Fufu, ver o Sensei todo atrapalhado me fez perceber que isso é algo realmente inesperado."
61050-78 = "Nesse caso, o melhor é só seguir o fluxo, não é?"
61050-79 = "[ns]\"Vou seguir o seu exemplo, Atsuko...\""
61050-83 = "U-uau..."
61050-84 = "Bem, antes de entrarmos no assunto principal... vocês não estão com fome? Este restaurante não tem cardápio, então podem pedir o que quiserem."
61050-86 = "O que isso significa...? Se não tem cardápio, como vamos pedir?"
61050-87 = "[ns5]\"Não é isso... é que...\"\n[ns6]\"Significa que eles podem preparar qualquer pedido...!\""
61050-90 = "Isso é realmente possível...?"
61050-91 = "Espero que essa não seja a minha \"última ceia\". #nSério, o que é tudo isso..."
61050-93 = "N-não, não foi isso que eu quis dizer..."
61050-94 = "Desculpe. Nós não estamos acostumadas com lugares como este."
61050-95 = "Então, podemos deixar por sua conta, Nagisa-san?"
61050-96 = "Sim, é claro. Mestre, tudo bem por você?"
61050-101 = "Pode pedir o que desejar."
61050-102 = "Então..."
61050-104 = "(Pouco tempo depois, os pratos do menu foram servidos um após o outro)"
61050-110 = "(Nagisa desfrutava da refeição com naturalidade, mas nós, que não estamos acostumadas, já não conseguíamos distinguir bem os sabores)"
61050-111 = "(...exceto por uma pessoa)"
61050-115 = "M-muito bom...! Nhuuu~!"
61050-116 = "Hiyori? Falar enquanto come é... um pouco falta de educação, sabe...?"
61050-117 = "M-mnh, engoli! D-desculpe...!#nMas está muito gostoso...! É a primeira vez que provo algo assim!"
61050-118 = "Sim, por favor, coma bastante. Fico feliz que tenha gostado."
61050-120 = "Como estava a refeição?"
61050-121 = "[s]\"Foi incrível...\""
61050-122 = "...Estava uma delícia."
61050-123 = "Será que podemos mesmo ter esse luxo todo só para nós...?"
61050-127 = "A-ah, com licença... será que... daria para levar um pouco para casa...?"
61050-128 = "Eu entendo como se sente, mas temos que nos conter aqui."
61050-129 = "Uuu... s-sim..."
61050-131 = "Então, que tal um chá após a refeição?"
61050-132 = "Preparei folhas de chá da empresa Twilight, que eu aprecio muito.#nElas são conhecidas pelo aroma intenso."
61050-133 = "Gostariam que eu servisse?"
61050-134 = "Não, não precisa se incomodar.#nPessoal, eu vou preparar, então esperem um pouco, por favor."
61050-136 = "(Nagisa começou a preparar o chá com uma habilidade impressionante)"
61050-141 = "(Um aroma perfumado envolveu suavemente toda a sala)"
61050-143 = "Desculpem a demora. É um chá simples, mas por favor, sirvam-se."
61050-147 = "Ehehe... está quentinho e gostoso...#nUuu... isso me lembra do \"momento da água\" de antigamente..."
61050-148 = "...É verdade. Tinha isso também."
61050-150 = "Momento da água...?"
61050-152 = "Em Arius, os alunos que se destacavam no treinamento recebiam água quente como recompensa."
61050-153 = "Deve ter sido mais ou menos nessa hora do dia."
61050-155 = "[ns] (Água... quente?)"
61050-156 = "Ah, naquela época... nós bebíamos cada gole com muito... muito cuidado..."
61050-157 = "Mesmo sendo só água quente... era mais saboroso do que qualquer outra coisa...#nÉ estranho, não é?"
61050-158 = "Ah! É claro, o chá da Nagisa... san...?#nNagisa-sama...? É mais gostoso!"
61050-160 = "Podem me chamar como preferirem."
61050-161 = "Afinal, fui eu quem as convidei."
61050-162 = "...O que você quer dizer com isso?#nEsse encontro não foi ideia do Sensei?"
61050-163 = "..."
61050-164 = "Essa história... começou quando a aluna transferida consultou o Sensei, não foi?#nPor que você sabe disso?"
61050-166 = "[ns]\"B-bem, sobre isso...\""
61050-167 = "Não, Sensei. Acho que sou eu quem deve explicar isso."
61050-168 = "Pelo menos, foi para isso que preparei este encontro."
61050-169 = "Por onde devo começar..."
61050-170 = "Sem medo de ser mal interpretada, o departamento de informações de Trinity é muito eficiente.#nEspero que compreendam."
61050-171 = "...Então, desde o momento em que a aluna transferida encontrou o Sensei, vocês já tinham o relatório."
61050-172 = "Isso significa que estamos sendo vigiadas?"
61050-173 = "Isso é..."
61050-174 = "[ns7]\"Deixe que eu explico daqui em diante.\"\n[ns8]\"Acho que ainda é um pouco cedo, mas é melhor antes que as coisas se compliquem.\""
61050-177 = "P-Professor?"
61050-178 = "[s9]\"Coisas assim, se a própria pessoa disser, acaba tendo o efeito contrário.\"\n[s10]\"Eu ouvi o que aconteceu e também verifiquei os fatos corretamente.\""
61050-181 = "……Por favor."
61050-186 = "[ns11]\"É verdade que os alunos transferidos estão sob a responsabilidade de alunos designados.\"\n[ns12]\"Não como uma 'vigilância', mas como um 'papel de suporte'.\""
61050-189 = "[ns13]\"Além disso, sobre o que você me consultou――\"\n[ns14]\"Foram as próprias alunas transferidas que relataram isso.\""
61050-192 = "……Você acha que dá para acreditar nisso?"
61050-193 = "Eu entendo que vocês não podem confiar na Trinity... e muito menos em mim, que sou do Chá das Partes. Mas……."
61050-195 = "[ns]\"Pelo menos, você não poderia confiar em mim?\""
61050-197 = "……."
61050-198 = "E-Eu confio…… Professor, por isso……."
61050-199 = "Hiyori……."
61050-200 = "M-Mas o Professor sempre nos ajudou……."
61050-201 = "E se ele falasse sério, poderia entrar em contato com a Valkyrie e com vários outros lugares……."
61050-202 = "Poderia nos enviar para o Departamento Correcional ou para lugares ainda mais assustadores agora mesmo……."
61050-203 = "……Hã!? N-Não me diga que era isso!? #nToda a gentileza que você demonstrou até agora era uma armadilha para isso……!?"
61050-204 = "Waaaaaah! Já era! Acabou! Eu sabia que não havia sonhos nem esperanças! Pelo menos, deixe-me terminar este chá antes que o fim chegue――!"
61050-211 = "A-Ah…… Professor? Isso é……."
61050-212 = "[s15]\"É sempre assim…….\"\n[s16]\"Pode ficar tranquilo.\""
61050-215 = "É-É mesmo……."
61050-216 = "Hã……? Para não me preocupar e fazer o que eu decidi, é isso?"
61050-217 = "……."
61050-218 = "Sim, é isso mesmo. #nCaso contrário…… não teria sentido ter criado esta oportunidade, mesmo que tenha sido escondido de todos da Trinity."
61050-219 = "Pessoal. #nEu não vou dar desculpas convenientes como dizer que 'vim como um indivíduo'."
61050-220 = "De qualquer forma, não importa o que eu faça ou diga, a intenção por trás disso será questionada. #nComo presidente do conselho estudantil, essa é a minha posição."
61050-221 = "Por isso……."
61050-226 = "……Sinto muito."
61050-230 = "……Hã?"
61050-231 = "Eeeeh……!?"
61050-232 = "……."
61050-233 = "Uma posição onde a verdadeira intenção de cada palavra e ação é questionada... foi isso que você disse, não foi?"
61050-234 = "Sendo assim, posso perguntar qual é a verdadeira intenção desse pedido de desculpas?"
61050-236 = "……É exatamente o que as palavras dizem."
61050-237 = "Como uma aluna da Trinity. E como anfitriã do Chá das Partes."
61050-238 = "……E também como alguém que representa a Trinity atual."
61050-239 = "Eu peço desculpas a vocês e à filial de Arius."
61050-240 = "Por que você está se desculpando? #nQuem causou o terrorismo fomos nós, o Esquadrão Arius."
61050-241 = "Certamente, se olharmos apenas para aquele incidente, você está certa, Atsuko-san."
61050-242 = "Mas…… eu sei que havia razões pelas quais vocês não tiveram escolha a não ser fazer aquilo."
61050-243 = "Não, talvez eu devesse dizer que não é que 'havia', mas que 'ainda continua existindo'."
61050-244 = "Após o 'Concílio Público', a relação entre Trinity e Arius mudou."
61050-245 = "No entanto, ainda hoje, deve haver partes entre nós que podem ser chamadas de 'um só'."
61050-246 = "E é por isso que você pede desculpas? Bateu um sentimento de culpa agora?"
61050-247 = "――Misaki."
61050-249 = "Não tem problema. Acho que vocês têm o direito de me dizer essas palavras."
61050-250 = "Expulsamos Arius sob o pretexto de diferenças de interpretação. #nIsso foi, sem dúvida, um erro da Trinity."
61050-251 = "Mas isso não é motivo para eu desviar o olhar. #n……Não deveria ser."
61050-252 = "Pessoas que estavam sofrendo bem ao meu lado…… por razões políticas e de posição, me veio o pensamento de que talvez eu tenha subestimado o sofrimento delas."
61050-253 = "Mesmo que esse sofrimento e dor ainda continuem…… #nignorar isso é uma atitude incorreta."
61050-255 = "Isso não é algo que nos convence, né?"
61050-256 = "E-Eeeeh!?"
61050-257 = "Não gosto muito de ficar desenterrando coisas que já acabaram."
61050-258 = "A vítima daquele incidente foi Kirifuji Nagisa... ou seja, você."
61050-259 = "Nem preciso dizer que o Arius Squad foi o agressor."
61050-260 = "Estranho, não é? A vítima se desculpar primeiro com o agressor.#nPensando bem, isso não faz o menor sentido."
61050-261 = "Histórias que não fazem sentido assim, no fundo... sempre têm algo por trás."
61050-263 = "……Misaki, meça suas palavras."
61050-264 = "……。"
61050-265 = "A dúvida da Misaki é perfeitamente compreensível."
61050-266 = "E eu... tenho duas respostas: uma que "todos podem aceitar" e outra que não."
61050-267 = "Eu gostaria de ouvir a "resposta que todos podem aceitar" primeiro."
61050-268 = "Pois bem……."
61050-269 = "Os "alunos remanescentes da filial de Arius" são como uma faísca para Trinity. #nSe o meu pedido de desculpas individual puder apagar essa preocupação――"
61050-270 = "Você não acha que esse é um meio político com um excelente custo-benefício?"
61050-271 = "……Poderia ter dito isso desde o começo."
61050-272 = "Espere. A conversa da Nagisa ainda não acabou."
61050-273 = "E quanto à outra, a "resposta que não é assim"?"
61050-275 = "……。"
61050-276 = "Uma aluna que serve como anfitriã do Tea Party ficou pensando."
61050-277 = "Por que o incidente peculiar conhecido como Tratado de Eden terminou daquela maneira?"
61050-278 = "Cheguei a investigar registros do passado que ninguém além do Tea Party poderia acessar, e depois de repensar tudo desde o início――"
61050-279 = "De repente, enquanto olhava para o pátio de Trinity, pensei: "É isso que devo fazer"."
61050-280 = "Essas duas escolas... não podem continuar com o relacionamento que têm agora."
61050-281 = "Se é para corrigir o relacionamento, que seja desde a raiz."
61050-282 = "Pensei que Trinity, carregando seus "erros do passado", deveria, de alguma forma, demonstrar sua intenção de reconciliação."
61050-283 = "……É o tipo de coisa que aquela princesa cor-de-rosa diria."
61050-284 = "Sim... Talvez eu finalmente tenha começado a entender um pouco dos sentimentos dela."
61050-286 = "……。"
61050-287 = "……。"
61050-288 = "Hehehe……."
61050-292 = "Bem, então agora é a minha vez."
61050-296 = "……！"
61050-297 = "Como alguém que já foi chamada de Sangue Real."
61050-298 = "Ou talvez... na mesma posição de presidente do conselho estudantil que você――"
61050-299 = "Como alguém que talvez tenha sido a mais próxima da filial de Arius."
61050-300 = "Peço desculpas por todos os atos de terrorismo que cometemos."
61050-301 = "Agradeço por dizer isso."
61050-302 = "Claro que... não acho que tudo será resolvido apenas pedindo desculpas ao Arius Squad."
61050-303 = "Tanto para vocês do Arius que foram transferidos para Trinity."
61050-304 = "Quanto para aqueles que ainda permanecem na filial, eventualmente, precisaremos criar uma oportunidade para pedir desculpas."
61050-305 = "E, pedir desculpas... exige responsabilidade."
61050-306 = "A responsabilidade, muitas vezes, deve ser demonstrada através de "ações"."
61050-307 = "Isso é algo que aprendi com ninguém menos que o Sensei."
61050-309 = "……Entendi a conversa. #nEu também tenho um monte de coisas pelas quais deveria pedir desculpas, mas……."
61050-310 = "Se eu começar a falar sobre isso, o dia inteiro vai acabar só nisso. #nVamos seguir em frente."
61050-311 = "Já que você se deu ao trabalho de intervir nesta "consulta"... #nExiste algo mais que você queira nos dizer?"
61050-312 = "Se você só quisesse saber o conteúdo da "consulta", poderia ter feito isso de várias outras formas depois. #nNão precisaria ter usado o Sensei para marcar este encontro, precisaria?"
61050-313 = "Como você bem supôs."
61050-314 = "Então, entrarei no assunto principal agora."
61050-315 = "Acredito que o Sensei mencionou algo sobre um "exame" anteriormente."
61050-316 = "……Não pode ser."
61050-317 = "Sim."
61050-318 = "Isso também pode ser apenas um pensamento egoísta, presunçoso e arrogante da minha parte..."
61050-319 = "Ainda assim, assim como o Sensei, eu também desejo que o Esquadrão Arius..."
61050-320 = "E também... que todos que permaneceram na filial de Arius."
61050-321 = "Possam, de cabeça erguida, ser membros desta sociedade."
61050-322 = "Obrigado pela preocupação. Aceito seus sentimentos."
61050-323 = "No entanto, dependendo do ponto de vista, isso pode ser interpretado como uma 'esmola'."
61050-327 = "Por trás da gentileza e da bondade, esconde-se a consciência de que 'estou em uma posição superior à sua'—"
61050-328 = "Sem nem perceber isso, acabamos tentando ensinar e guiar os outros."
61050-329 = "A atitude de tentar medir a vida alheia com a nossa própria régua...#nIsso, às vezes, pode se tornar arrogância."
61050-330 = "Mas a Nagisa-san não é assim, né?"
61050-331 = "Atsuko-san..."
61050-332 = "Se é alguém que consegue perceber por si mesma que 'talvez seja assim', então eu acho que posso confiar. #nPor exemplo... porque o Sensei é assim."
61050-333 = "Não é, Misaki?"
61050-335 = "......Não acho que esteja errada."
61050-336 = "A Nagisa-san nos convidou para comer coisas gostosas, então..."
61050-337 = "Eu... sim. Acho que... talvez eu possa confiar..."
61050-342 = "......Muito obrigada."
61050-343 = "Parece que todas pensam da mesma forma."
61050-344 = "E então... o que nós e o Sensei devemos fazer a partir de agora?"
61050-345 = "Eh? E-eu ainda não pretendia ter chegado a esse ponto da conversa...#nPor que..."
61050-346 = "Bem..."
61050-347 = "Quando você vive rastejando pelo chão, há coisas que acabam ficando visíveis."
61050-349 = "......Vamos dizer que seja isso."
61050-351 = "L-Líder...!"
61050-352 = "Essa fala de agora até que foi legal, mas..."
61050-353 = "Sim. Mas acho que perdeu alguns pontos."
61050-355 = "As coisas não saem como planejado..."
61050-357 = "Próximo episódio: A Cadeira do Outro Lado"
