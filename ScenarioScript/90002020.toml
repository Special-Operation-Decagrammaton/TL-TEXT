[translation]
90002020-1 = "Episódio 2: Nuvens de Tempestade"
90002020-3 = "Bom dia a todos os passageiros. #nAqui quem fala é Toki, a capitã desta aeronave."
90002020-4 = "Estamos voando a uma altitude de 8.000 metros e não há previsão de problemas na rota."
90002020-5 = "Chegaremos ao nosso destino, o Continente de Aço, em breve. #nPor favor, apertem os cintos em caso de turbulência inesperada."
90002020-6 = "Além disso, por segurança, peço que #nretornem as mesas à posição original."
90002020-7 = "Ué? Não tem mesa aqui, tem?"
90002020-8 = "Sim. Só quis dizer por dizer."
90002020-9 = "Fufu. A capitã Toki tem um lado brincalhão, hein?"
90002020-10 = "Então, eu também vou me apresentar — #nSou Himari, responsável pela operação e assistência de voo♪"
90002020-11 = "No momento, a previsão é de que chegaremos no horário previsto."
90002020-12 = "Bem, sobre essa viagem pelos céus... como vocês se sentem comparado àquela vez?"
90002020-18 = "Naquela época, estávamos em um lugar tão alto que não consegui sentir direito..."
90002020-19 = "M-mas agora, sinto que estou realmente voando, hehe..."
90002020-21 = "Ei, Presidente. #nEu estou sentada no banco do copiloto como você pediu, mas precisava mesmo disso?"
90002020-22 = "Não é um pouco ineficiente?"
90002020-23 = "Não, isso é mais racional."
90002020-24 = "Com o aumento do pessoal, há mais coisas com as quais se preocupar. #nPrecisava reduzir a carga de trabalho da Toki na mesma proporção."
90002020-25 = "Como sou uma empregada perfeita, acredito que não teria tido problema algum sozinha."
90002020-26 = "Devemos considerar o pior cenário. #nPrecisamos estar preparados para todas as variáveis."
90002020-27 = "Se a Rio-sama insiste..."
90002020-29 = "Ainda assim, essa nave de transporte... é incrível!"
90002020-31 = "E-eu também... é a primeira vez que vejo o interior de uma nave assim..."
90002020-32 = "Hum, já que estamos aqui, devíamos ter explorado mais."
90002020-33 = "Não tem como, dadas as circunstâncias."
90002020-39 = "Por enquanto, vamos apenas seguir nossas memórias. #nAo sair da cabine, o saguão ficava logo ali, não é?"
90002020-43 = "Sinceramente, estava mais limpo que o meu quarto..."
90002020-44 = "...O quão bagunçado é o seu quarto? Por favor, limpe-o direito."
90002020-45 = "É... percebi novamente que a limpeza é importante."
90002020-46 = "Pfft!?"
90002020-47 = "É você quem está dizendo isso..."
90002020-50 = "O hangar é o espaço mais vulnerável e importante da nave de transporte."
90002020-51 = "Sim. Como há uma escotilha que dá para o exterior e cápsulas de descida."
90002020-52 = "Os AMAS que trouxemos também estão todos no hangar, certo? #nFalando nisso, vi algo... em formato de cone?"
90002020-53 = "Isso é..."
90002020-54 = "...Não precisa se preocupar com isso."
90002020-55 = "Hmm?"
90002020-56 = "Fiquei surpresa por quase não ouvir o barulho do motor no hangar."
90002020-57 = "Sim... dá até para pensar que seria um bom lugar para se esconder em uma emergência..."
90002020-58 = "Esse é o lugar mais perigoso em caso de emergência, então não faça isso, entendeu...?"
90002020-65 = "[ns1] \"Ainda acho incrível...\"\n[ns2] \"Como você preparou tudo isso?\""
90002020-68 = "Não é nada demais. Apenas apliquei a tecnologia que a Millennium cultivou."
90002020-69 = "Pesquisar e materializar áreas que se pode imaginar... não é algo tão difícil."
90002020-70 = "O problema é quando se pesquisa áreas que nem sequer conseguimos imaginar."
90002020-71 = "Sim. O fato de conseguir imaginar já é a prova de que há um ponto de partida."
90002020-72 = "O desespero de ser confrontado com um fato que você nem sequer imaginava..."
90002020-73 = "[s] \"Isso já aconteceu com você?\""
90002020-74 = "Ao fazer pesquisas, isso acontece às vezes."
90002020-75 = "A gravidade é um bom exemplo. #nTodos nós vivemos presos à gravidade, mas o gráviton, que pode ser considerado sua raiz—"
90002020-76 = "Para! Começar a falar de coisas técnicas do nada é um péssimo hábito da Presidente Rio! #nDesse jeito, todo mundo vai acabar te odiando!"
90002020-77 = "É, é mesmo...?"
90002020-78 = "Mas... eu já estou acostumada a ser odiada..."
90002020-80 = "Essa resposta não foi muito apropriada..."
90002020-85 = "...Vamos mudar de assunto. #nToki, como está a situação de voo?"
90002020-87 = "Não há anormalidades na rota. O sinal do Continente de Aço está ficando cada vez mais forte."
90002020-88 = "Se é que posso dizer, o sinal está forte demais. Pode ser difícil decidir um local de pouso."
90002020-90 = "Não dá para pousar em qualquer lugar?"
90002020-92 = "Não podemos fazer isso. #nSe por acaso formos para um local com um sistema de defesa aérea completo, estaremos acabadas."
90002020-93 = "Esta nave de transporte foca em 'transporte' e 'pesquisa'. #nPor isso, sua defesa é um pouco baixa."
90002020-95 = "Além disso, como o oponente é o Continente de Aço... ou seja, o 7º Profeta 'Netzach'—"
90002020-96 = "É muito provável que nosso senso comum não se aplique aqui."
90002020-97 = "Exatamente. Na verdade, já está difícil até mesmo determinar a altitude de voo."
90002020-99 = "Atualmente, estamos voando escondidas entre as nuvens, tentando confundir luz visível, infravermelho e radares."
90002020-100 = "...Nós também não conseguimos visualizar o Continente de Aço a olho nu."
90002020-102 = "Não é possível detectar Netzach ativamente?"
90002020-104 = "Para isso, precisaríamos emitir ondas de rádio. #nAcho que seríamos detectadas imediatamente."
90002020-105 = "Além disso, o sinal está tão forte que está causando outro problema."
90002020-106 = "Não importa que tipo de sinal detectemos, tudo converge para um só. #nNem faz sentido analisar mais."
90002020-107 = "[s] \"Então... o que devemos fazer?\""
90002020-108 = "..."
90002020-110 = "..."
90002020-111 = "Não temos escolha a não ser seguir em frente."
90002020-112 = "Dava para ter dito isso de um jeito melhor..."
90002020-113 = "Algum problema?"
90002020-114 = "...Não."
90002020-115 = "De qualquer forma, chegaremos em breve."
90002020-121 = "A partir de agora, vamos reduzir a altitude—"
90002020-133 = "Aaaah!?"
90002020-134 = "Toki, o que está acontecendo!?"
90002020-135 = "Emergência! Detectei uma reação... gigantesca!"
90002020-136 = "Aquilo é... um braço mecânico?"
90002020-137 = "Análise de sinal concluída—é o 9º Profeta, 'Yesod'!"
90002020-139 = "Yesod!?"
90002020-145 = "Uwaaaah!?"
90002020-146 = "Uwaaan!?"
90002020-152 = "Awawawawa...!"
90002020-153 = "Q-que é aquilo!!"
90002020-154 = "H-hiii...!"
90002020-156 = "Todas, segurem-se em qualquer coisa! #nEimi! Qual a situação dos danos?"
90002020-159 = "Danos no motor. Mas o motor principal ainda mantém a potência. #nO motor auxiliar já era..."
90002020-160 = "Incêndio no motor! Vou ativar o sistema de combate a incêndio!"
90002020-165 = "Não consigo manter a altitude e o equilíbrio da nave... Presidente! Se continuar assim—!"
90002020-166 = "Vamos cair!"
90002020-171 = "Como está o incêndio!?"
90002020-172 = "O fogo no motor foi contido! Mas o revestimento externo da nave está pegando fogo!"
90002020-173 = "Reversão de empuxo nos motores até o limite!"
90002020-177 = "Reversão de empuxo nos motores até o limite! #nSequência de pouso de emergência ativada! Preparem-se para o impacto—!"
90002020-191 = "[ns] \"Estão todas bem!?\""
90002020-192 = "Ai, ai, ai... minha cabeça está girando..."
90002020-193 = "Então é por isso que o cinto de segurança é importante..."
90002020-194 = "Nunca odiei tanto o fato de termos apenas uma roda..."
90002020-195 = "A-além disso... onde estamos...?#nNão parece o Continente de Aço que me descreveram..."
90002020-196 = "É a borda do Continente de Aço... parece ser um dos poucos pedaços de terra que restaram."
90002020-197 = "Nós fomos atacadas pelo braço gigante de Yesod e..."
90002020-199 = "E, como resultado, fizemos um pouso forçado aqui."
90002020-212 = "D-de novo!?"
90002020-213 = "Muitas reações hostis no radar!#nToki, conecte às câmeras externas!"
90002020-214 = "Conectando."
90002020-229 = "Aqueles são... os mesmos indivíduos que nos atacaram."
90002020-230 = "Estamos cercadas. Se continuar assim...!"
90002020-231 = "Está tudo bem, Rio-senpai! A Aris protegerá a todos!"
90002020-236 = "Ah, ah...!"
90002020-237 = "Aris-chan!?"
90002020-242 = "..."
90002020-243 = "Departamento de Desenvolvimento de Jogos! Entrar em ação!"
90002020-245 = "Irmã!?"
90002020-246 = "N-nós vamos...?"
90002020-248 = "Isso mesmo! Não podemos deixar tudo nas mãos da Aris, né?#nSensei, já voltamos!"
90002020-254 = "I-irmã!... Eu também vou!"
90002020-255 = "Um por todos... e todos... por um..."
90002020-260 = "Pessoal, esperem!"
90002020-261 = "[s] \"...\""
90002020-263 = "[ns] \"Eimi, pode cuidar do pessoal do Departamento de Desenvolvimento de Jogos?\""
90002020-264 = "Eu?"
90002020-265 = "..."
90002020-266 = "Certo, pode deixar."
90002020-272 = "[ns] \"Rio e Toki, por favor, tentem consertar a nave de transporte o máximo que puderem.\""
90002020-273 = "Sim... entendi."
90002020-274 = "Vamos, Rio-sama. Começaremos pelo motor."
90002020-276 = "O que nós faremos?"
90002020-277 = "[s] \"Kei e Himari... fiquem de prontidão por enquanto.\""
90002020-278 = "Ora, é um pouco solitário não ser requisitada..."
90002020-279 = "Não, eu entendo. Deixe a análise geral da situação conosco."
90002020-287 = "Ah, chega! Isso não tem fim!"
90002020-288 = "Mas não podemos recuar agora! Pelo Sensei e por todos!"
90002020-293 = "Pessoal, recuem um pouco. Momoi, venha comigo."
90002020-297 = "Eh...?"
90002020-298 = "Essa voz... é a Eimi-san!"
90002020-299 = "Vim ajudar.#nDeixem a linha de frente comigo e com a Momoi."
90002020-300 = "Aris, por favor, dê suporte de fogo da retaguarda."
90002020-301 = "Midori e Yuzu, quero que cubram o meio da formação."
90002020-302 = "Sim! Contamos com você, Eimi!"
90002020-303 = "Certo. Vamos fazer o que pudermos."
90002020-305 = "S-será que vai dar certo...?"
90002020-313 = "Ora."
90002020-314 = "Isso é moleza para mim."
