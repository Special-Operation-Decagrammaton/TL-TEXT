[translation]
101120-1 = "第12話;脱出（２）"
101120-3 = "こっちです！"
101120-5 = "[ns] \"アロナ、他の生徒と連絡取れたりしない？\""
101120-6 = "難しいです……#n通信網のシャットダウンは、サンクトゥムタワーから出された命令なので……"
101120-7 = "でも、このスーパーアロナがサンクトゥムタワーに劣るはずがありません！#n試してみます……！"
101120-8 = "ううっ……"
101120-9 = "ぐぬぬぬ……。"
101120-10 = "はぁ、はぁ……ダメです。#n物理的に近い場所ならまだ、なんとかなりそうですが……"
101120-11 = "この状況では……ううう……"
101120-12 = "あっ！繋がった！"
101120-13 = "1秒だけでも、どうか……！！どうか……！！"
101120-17 = "……はぁ、切れちゃいました。"
101120-18 = "一番近くにいる人になら、なんとか届いたかもしれません……"
101120-19 = "お役に立てず、すみません……。"
101120-20 = "[s1] \"ううん、それで十分だよ。\"\n[s2] \"ありがとう。とても助かったよ、アロナ。\""
101120-23 = "そ、そうなんですか……？"
101120-31 = "たったた大変です……！#nこ、こっちにも……！！"
101120-32 = "す、すごい数……"
101120-33 = "ここまでか……。"
101120-38 = "速やかに投降しろ。#n投降しないのであれば、掃射する。"
101120-42 = "……なんだこれは。#nドローン……？"
101120-43 = "ドローン稼働中。小隊は爆発に注意を。"
101120-45 = "ぐ、ぐはっっ！？な、何だ……！？"
101120-46 = "どりゃあぁぁぁ――！！！"
101120-56 = "この煙幕弾は痛いだろう？#nRABBIT2、現場に到着！"
101120-57 = "RABBIT1、先生と要人を確保。#nRABBIT3、敵ターゲットの位置を確認してください。"
101120-59 = "な、何だお前たちは！？"
101120-60 = "RABBIT3、受信完了！今ポインターで座標を送る。#nRABBIT4、敵指揮官から処理お願い！"
101120-61 = "全部隊、一斉――"
101120-66 = "[ruby=Tango]タンゴー[/ruby]、ダウン……み、みんな大丈夫？"
101120-67 = "[s] \"RABBIT小隊！！来てくれたんだ！ありがとう！\""
101120-68 = "勘違いするな。#n別に、先生が助けを求めたから来たわけではない。"
101120-69 = "そうそう。先生から連絡があったから、食後の運動がてらに寄っただけ。"
101120-70 = "そ、それにしてはみんなすごい急いでたけど……"
101120-74 = "RABBIT小隊。先生の救助要請を確認し、参上いたしました。"
101120-75 = "へぇ～ここで援軍だなんて、先生もやるじゃん♪"
101120-76 = "SRTの方々がご一緒してくださるのなら、もう怖いもの無しです！"
101120-81 = "ここから逃げられると思うな！ "
101120-82 = "ヘリまで動員しているのですか……それにこの兵力は……？#n先生、一体何があったのですか？"
101120-83 = "どうせ、いつもみたいに変なトラブルに巻き込まれたんだろ。"
101120-84 = "ふふっ……まーた何かやらかしたの？#n危険なにおいがするなぁ……くひひっ。"
101120-85 = "……そうですね。[USERNAME]先生のことですし、妙に納得しました。"
101120-86 = "う、うん……先生のことだもんね……。"
101120-87 = "[s] \"そう言われるとちょっと傷つくなぁ……。\""
101120-88 = "――カンナ局長。 "
101120-89 = "RABBIT小隊……。"
101120-90 = "この間は、お世話になりました。#nまたお会いできてよかったです。"
101120-91 = "……今は戒厳令で行政の兵は動かせないのでは……"
101120-92 = "えっと……私たちは今、公園で野宿中ですので……"
101120-93 = "正式な指揮系統も整ってないし……"
101120-94 = "戒厳令？一部のサイトが接続できないと思ったら、そういうことだったんだ。"
101120-95 = "し、知らなくても仕方ないだろ。#nなんたって、誰からも聞いてないからな！"
101120-96 = "連絡をくれるのは先生だけですし……"
101120-97 = "まずここを抜けて、先生と局長を安全な場所まで護衛します。#nRABBIT小隊、戦闘準備。"
101120-98 = "ラジャー。"
101120-99 = "う、うん……私も準備できた。"
101120-100 = "はぁ、はぁ……火力支援、準備完了。#nこれで……もっと派手な花火が撃てる。"
101120-101 = "申し訳ありませんが、生活安全局のヴァルキューレの方々も、#n一旦こちらの指示に従っていただければと思います。"
101120-102 = "はい、分かりました！"
101120-103 = "ま、この間世話になったし。いいよ。"
101120-104 = "では、交戦を開始します。"
