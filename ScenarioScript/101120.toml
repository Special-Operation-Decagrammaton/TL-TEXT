[translation]
101120-1 = "Episódio 12; Fuga (2)"
101120-3 = "É por aqui!"
101120-5 = "[ns] \"Arona, você não consegue entrar em contato com outras alunas?\""
101120-6 = "É difícil...#nO desligamento da rede de comunicação foi uma ordem emitida pela Torre Sanctum..."
101120-7 = "Mas a Super Arona aqui não vai perder para a Torre Sanctum de jeito nenhum!#nVou tentar...!"
101120-8 = "Ugh..."
101120-9 = "Nnnngh..."
101120-10 = "Haa, haa... Não dá.#nSe for em um lugar fisicamente próximo, talvez eu ainda consiga dar um jeito..."
101120-11 = "Mas nesta situação... uuu..."
101120-12 = "Ah! Conectou!"
101120-13 = "Nem que seja por 1 segundo, por favor...!! Por favor...!!"
101120-17 = "......Haa, a ligação caiu."
101120-18 = "Talvez a mensagem tenha chegado a quem estivesse mais perto..."
101120-19 = "Sinto muito por não ser de muita ajuda..."
101120-20 = "[s1] \"Não, isso já é o bastante.\"\n[s2] \"Obrigado. Você ajudou muito, Arona.\""
101120-23 = "S-Sério...?"
101120-31 = "É u-uma emergência...!#nT-Tem mais deles aqui também...!"
101120-32 = "Q-Quantos deles..."
101120-33 = "É o nosso fim..."
101120-38 = "Rendam-se imediatamente.#nSe não se renderem, vamos abrir fogo."
101120-42 = "……O que é isso?#nUm drone...?"
101120-43 = "Drone ativado. Esquadrão, cuidado com a explosão."
101120-45 = "G-Guh!? O-O que é isso...!?"
101120-46 = "Toma essa――!!!"
101120-56 = "Essa granada de fumaça deve ter doído, não é?#nRABBIT2, chegando no local!"
101120-57 = "RABBIT1, Sensei e a VIP assegurados.#nRABBIT3, por favor confirme a posição dos alvos inimigos."
101120-59 = "Q-Quem são vocês!?"
101120-60 = "RABBIT3, mensagem recebida! Enviando as coordenadas pelo pointer agora.#nRABBIT4, elimine os comandantes inimigos primeiro, por favor!"
101120-61 = "Todas as unidades, preparem-se e――"
101120-66 = "Tango abatido... t-todo mundo bem?"
101120-67 = "[s] \"Esquadrão RABBIT!! Vocês vieram! Muito obrigado!\""
101120-68 = "Não vá entender mal.#nNão viemos porque o senhor pediu ajuda ou algo do tipo."
101120-69 = "Isso aí. O Sensei mandou uma mensagem, então a gente só deu uma passada aqui pra fazer um exercício depois de comer."
101120-70 = "M-Mas pra quem veio só pra isso, todo mundo parecia estar com muita pressa..."
101120-74 = "Esquadrão RABBIT. Confirmamos o pedido de resgate do Sensei e nos apresentamos para o dever."
101120-75 = "Heh~ Conseguir reforços numa hora dessas, o Sensei manda bem mesmo♪"
101120-76 = "Se o pessoal da SRT está com a gente, não temos mais nada a temer!"
101120-81 = "Não achem que vão conseguir fugir daqui!"
101120-82 = "Até mobilizaram helicópteros...? E de onde veio toda essa tropa...?#nSensei, o que diabos aconteceu?"
101120-83 = "Com certeza ele se meteu em algum problema estranho de novo, como sempre."
101120-84 = "Hehe... O que você aprontou dessa vez, hein?#nIsso tem cheiro de perigo... Kuhihi."
101120-85 = "……Tem razão. Vindo do Sensei [USERNAME], isso faz bastante sentido, estranhamente."
101120-86 = "É-É... A cara do Sensei mesmo..."
101120-87 = "[s] \"Ouvir isso de vocês me machuca um pouquinho...\""
101120-88 = "――Diretora Kanna."
101120-89 = "Esquadrão RABBIT..."
101120-90 = "Agradecemos pela ajuda da última vez.#nÉ bom vê-la novamente."
101120-91 = "……A lei marcial não deveria estar impedindo o movimento das tropas do governo agora?"
101120-92 = "Err... Bem, nós estamos dormindo em um parque no momento, então..."
101120-93 = "E a nossa cadeia de comando oficial nem existe mais, então..."
101120-94 = "Lei marcial? Achei que alguns sites estivessem fora do ar, então era isso."
101120-95 = "N-Não tem problema não sabermos.#nAfinal, ninguém nos avisou de nada!"
101120-96 = "O único que entra em contato com a gente é o Sensei..."
101120-97 = "Primeiro, vamos sair daqui e escoltar o Sensei e a Diretora até um local seguro.#nEsquadrão RABBIT, preparar para o combate."
101120-98 = "Entendido."
101120-99 = "S-Sim... Eu também tô pronta."
101120-100 = "Haa, haa... Suporte de fogo, pronto.#nCom isso... vou poder soltar uns fogos de artifício ainda mais espalhafatosos."
101120-101 = "Sinto muito pedir isso, mas o pessoal da Valkyrie do Departamento de Segurança Pública#ntambém poderia seguir as nossas ordens por enquanto?"
101120-102 = "Sim, entendido!"
101120-103 = "Bom, vocês nos ajudaram da última vez. Por mim, tudo bem."
101120-104 = "Então, iniciando o combate."