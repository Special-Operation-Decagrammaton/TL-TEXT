[translation]
1014102-1 = "An Unexpected Encounter"
1014102-3 = "(On the way home after finishing work)"
1014102-10 = "(Haruka was pacing back and forth in front of what looked like an exhibition hall)"
1014102-17 = "(Seeing Haruka not entering for some reason—)"
1014102-19 = "(I decided to go talk to her for now)"
1014102-25 = "S-Sensei!?"
1014102-30 = "[ns] \"Hello, Haruka.\""
1014102-31 = "H-Hello!"
1014102-32 = "I-I'm so sorry! I didn't notice you were here...!"
1014102-33 = "[s] \"Is this some kind of exhibition?\""
1014102-34 = "Eh? Oh, yes... something like that."
1014102-35 = "Um, as for what kind of exhibition it is..."
1014102-36 = "It's called the Kivotos Horticultural Expo—"
1014102-37 = "I heard it's a major event where they display and sell street trees, shrubs, and gardening supplies."
1014102-38 = "[s] \"I see, so that's why you're all dressed up.\""
1014102-39 = "Eh?"
1014102-40 = "Ehhhhhh!?"
1014102-41 = "B-Beautiful!? N-No way!"
1014102-42 = "E-Even if the dress is lovely, someone as gloomy as me wearing it...!"
1014102-43 = "[s] \"You really do look beautiful.\""
1014102-44 = "W-Waaaaah...!"
1014102-45 = "Y-You don't have to say things you don't mean just for someone like me..."
1014102-46 = "[s] \"But I mean it...\""
1014102-47 = "Uwaaaaaah...!"
1014102-48 = "I'm sorry, I'm sorry, I'm sorry...!"
1014102-50 = "(I gently comforted the panicking Haruka)"
1014102-52 = "Uuuu..."
1014102-53 = "I'm sorry... I lost control again..."
1014102-54 = "Eh? Why am I not going inside, you ask?"
1014102-55 = "W-Well, that is..."
1014102-56 = "I don't have the qualifications to enter..."
1014102-57 = "[s1] \"Eh?\"\n[s2] \"What do you mean you don't have the qualifications?\""
1014102-60 = "N-No, it's just..."
1014102-61 = "I'm here as security for this place today, so..."
1014102-62 = "I don't really need to go inside in the first place..."
1014102-63 = "[s] \"Security...?\""
1014102-64 = "Ah, wait, did I misunderstand the meaning of security!?"
1014102-65 = "Should I have become the gate itself instead of a gatekeeper!?"
1014102-66 = "[s] \"That's not what security means at all!\""
1014102-68 = "(After hearing her out, it turned out Haruka had been hired as a security guard for the expo)"
1014102-72 = "[ns] \"So, that's why you're wearing a dress...\""
1014102-73 = "Yes, it's the dress code... so to speak."
1014102-74 = "It seems security guards are required to dress somewhat formally..."
1014102-75 = "...Wait, was this outfit not formal enough!?"
1014102-76 = "[s] \"No, that's not it at all.\""
1014102-77 = "I-I see."
1014102-78 = "Then I can rest easy—"
1014102-82 = "BOOM!"
1014102-86 = "[ns] \"An explosion...!?\""
1014102-87 = "It's from inside the venue!"
1014102-88 = "Is it a fight!?"
1014102-92 = "The best street tree in Kivotos is the ginkgo, and nothing else! Everything else is heresy!"
1014102-93 = "Hmph, you stubborn old fool! What's so good about that stinky tree!?"
1014102-94 = "What, stinky!? Even that plane tree you're pushing scatters those dirty, hair-like seeds in the spring!"
1014102-95 = "What did you say...!? Dirty hair!?"
1014102-96 = "I've had enough! Fire!!"
1014102-101 = "I-It seems they're fighting over street trees..."
1014102-102 = "What should we do? Should we stop them?"
1014102-103 = "Uuu, this isn't in the manual at all..."
1014102-107 = "[ns] \"Huh? A piece of wood is coming this way—\""
1014102-111 = "[ns] \"Ouch.\""
1014102-113 = "[ns] \"Ow... wait, Haruka? What's wrong?\""
1014102-114 = "Y-You..."
1014102-115 = "You pieces of trash—!!!"
1014102-116 = "[s5] \"Haruka!?\"\n[s6] \"I'm really fine, so—\""
1014102-127 = "How dare you scratch Sensei's face!?"
1014102-128 = "H-Hey, who are you!?"
1014102-129 = "Die, die, die, die, die!!"
1014102-130 = "I'll bury you all under the trees!!!"
1014102-131 = "H-Help me!!"
1014102-139 = "(Just like that, Haruka suppressed the disturbance in an instant)"
1014102-140 = "(...As a price, the venue was completely destroyed)"
1014102-142 = "Expo Venue - Back Alley"
1014102-144 = "[ns] \"Good work, Haruka.\""
1014102-145 = "U-Uuuu..."
1014102-146 = "I-I'm sorry, I'm sorry, I'm sorry."
1014102-147 = "You even had to apologize to the organizers for my sake..."
1014102-148 = "[s] \"Haruka, you just did your job.\""
1014102-149 = "Uuu..."
1014102-150 = "Thank you, Sensei..."
1014102-152 = "(After sitting on a bench and resting for a while)"
1014102-153 = "(I walked Haruka back to the Problem Solver office)"