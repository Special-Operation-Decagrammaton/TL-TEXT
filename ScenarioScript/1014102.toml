[translation]
1014102-1 = "思いがけない出会い"
1014102-3 = "（仕事を終え帰る途中）"
1014102-10 = "（なにかの博覧会場？の前でハルカがうろうろしていた）"
1014102-17 = "（なぜか入場しないハルカを見て――）"
1014102-19 = "（とりあえず、話しかけてみることにした）"
1014102-25 = "せ、先生！？"
1014102-30 = "[ns] \"こんにちは、ハルカ。\""
1014102-31 = "こ、こんにちは！"
1014102-32 = "す、すみません！いらっしゃっているのに気付かず……！"
1014102-33 = "[s] \"これって、なにかの博覧会？\""
1014102-34 = "え？あ、はい……そんな感じです。"
1014102-35 = "えっと、どのような博覧会かというと……。"
1014102-36 = "キヴォトス園芸博覧会といって――"
1014102-37 = "街路樹や低木、園芸用品などを展示し販売する一大イベント……だと聞きました。"
1014102-38 = "[s] \"なるほど、それで綺麗にドレスアップしてきたんだね。\""
1014102-39 = "え？"
1014102-40 = "ええええ！？"
1014102-41 = "き、綺麗って！そ、そんな！"
1014102-42 = "い、いくら素敵なドレスでも、私みたいな根暗が着たところで……！"
1014102-43 = "[s] \"本当に綺麗だよ？\""
1014102-44 = "ふ、ふええぇぇ……！"
1014102-45 = "わ、私なんかのために、心にもないことを言ってくださらなくても……。"
1014102-46 = "[s] \"本気なのに……。\""
1014102-47 = "うあああああ……！"
1014102-48 = "すみませんすみませんすみません……！"
1014102-50 = "（慌てるハルカを優しくなだめてあげた）"
1014102-52 = "うぅぅぅ……。"
1014102-53 = "すみません……また暴走しちゃって……。"
1014102-54 = "え？どうして入場しないのか、ですか？"
1014102-55 = "そ、それは……。"
1014102-56 = "私には、入る資格がないので……。"
1014102-57 = "[s1] \"え？\"\n[s2] \"入る資格がないって、どういうこと？\""
1014102-60 = "い、いえ、その……。"
1014102-61 = "今日の私は、ここのセキュリティとして来ているので……。"
1014102-62 = "そもそも入場する必要がないんです……。"
1014102-63 = "[s] \"セキュリティ……？\""
1014102-64 = "はっ、もしかして私、セキュリティの意味を誤解してますか！？"
1014102-65 = "門番じゃなく、門そのものになったほうがよかったですか！？"
1014102-66 = "[s] \"もはやそれはセキュリティじゃないよ！？\""
1014102-68 = "（話を聞いてみると、ハルカは博覧会の警備員として雇われているとのことだった）"
1014102-72 = "[ns] \"じゃあ、ドレスを着ている理由も……。\""
1014102-73 = "はい、ドレスコード……といいますか。"
1014102-74 = "警備員もある程度フォーマルな格好をする必要があるみたいで……。"
1014102-75 = "……もしかして、この格好はフォーマルじゃなかったですか！？"
1014102-76 = "[s] \"ううん、そんなことないよ。\""
1014102-77 = "そ、そうですか。"
1014102-78 = "なら安心して――"
1014102-82 = "ドッカァァン！"
1014102-86 = "[ns] \"爆発音……！？\""
1014102-87 = "会場の中からです！"
1014102-88 = "喧嘩でしょうか！？"
1014102-92 = "キヴォトスで一番優れている街路樹はイチョウしかない！その他はすべて邪道だぁ！"
1014102-93 = "ふんっ、この頑固頭が！あんな臭い木のどこがいいんだよ！"
1014102-94 = "なっ、臭い！？お前が推しているプラタナスだって、春になれば汚い毛みたいな種をばら撒くくせに！"
1014102-95 = "なんだと……！？汚い毛！？"
1014102-96 = "もう我慢できん！撃て！！"
1014102-101 = "が、街路樹のことで喧嘩しているみたいですね……。"
1014102-102 = "どうしましょう？止めるべきでしょうか？"
1014102-103 = "うぅぅ、こんなのマニュアルに載ってないのに……。"
1014102-107 = "[ns] \"あれ？木片がこっちに――\""
1014102-111 = "[ns] \"痛っ。\""
1014102-113 = "[ns] \"いたた……ってハルカ？どうしたの？\""
1014102-114 = "こ……。"
1014102-115 = "この虫けらどもが――！！！"
1014102-116 = "[s5] \"ハルカ！？\"\n[s6] \"私は本当に大丈夫だか――\""
1014102-127 = "よくも先生の顔に傷をつけましたね！？"
1014102-128 = "あ、あんた誰だよ！"
1014102-129 = "死んでください死んでください死んでください死んでください！！"
1014102-130 = "全員木の下に埋めてやるうううぅぅぅ！！！！"
1014102-131 = "た、助けてくれぇ！！"
1014102-139 = "（そうやって、ハルカは騒動を瞬く間に制圧した）"
1014102-140 = "（……代償として、会場は大破してしまった）"
1014102-142 = "万博会場・路地裏"
1014102-144 = "[ns] \"お疲れ様、ハルカ。\""
1014102-145 = "う、ううぅぅ……。"
1014102-146 = "す、すみませんすみませんすみません。"
1014102-147 = "私のために運営側に弁明までしてくださって……。"
1014102-148 = "[s] \"ハルカは自分の仕事を全うしただけだよ。\""
1014102-149 = "うう……。"
1014102-150 = "ありがとうございます、先生……。"
1014102-152 = "（ベンチに座って、しばらく休憩したあと）"
1014102-153 = "（ハルカを便利屋の事務所まで送ってあげた）"
