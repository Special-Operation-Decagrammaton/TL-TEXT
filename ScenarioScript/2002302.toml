[translation]
2002302-1 = "Rumores sobre a Chefe"
2002302-2 = "Schale - Escritório"
2002302-8 = "Olá, professor(a) [USERNAME]."
2002302-9 = "Hoje, serei a responsável pelo turno no Schale. Sou Kanna Ogata, da Academia de Polícia Valkyrie, do Departamento de Segurança Pública."
2002302-10 = "Como é meu primeiro turno, imagino que possa haver algumas falhas, mas conto com sua colaboração."
2002302-11 = "[s1] \"Conto com você, Kanna.\"\n[s2] \"Conto com... você?\""
2002302-12 = "Falando nisso, ouvi dizer que alunas da minha Academia de Polícia Valkyrie já estiveram aqui para o turno..."
2002302-13 = "P-por que está tão tenso(a)...?"
2002302-14 = "Falando nisso, ouvi dizer que alunas da minha Academia de Polícia Valkyrie já estiveram aqui para o turno..."
2002302-15 = "Mesmo estando na frente do professor, parece que elas esqueceram seu dever como policiais e agiram de forma desleixada..."
2002302-16 = "Em vez de ajudar, fico preocupada se elas não acabaram atrapalhando."
2002302-17 = "Elas não cometeram nenhuma gafe, cometeram?"
2002302-20 = "H-hein? A Chefe Kanna, você diz...?"
2002302-21 = "Por favor, mantenha em segredo que fui eu quem te contou... Dentro da academia, ela é um símbolo de terror."
2002302-22 = "Além de ter uma personalidade rigorosa, aquela expressão assustadora dela só piora as coisas..."
2002302-27 = "（Sussurrando）... Ela até tem o apelido de Cão Raivoso."
2002302-28 = "Professor(a), quando encontrar a Chefe Kanna, tome cuidado para não irritá-la!"
2002302-29 = "Em hipótese alguma, aconteça o que acontecer...!"
2002302-34 = "[ns] \"N-nada em especial...!\""
2002302-35 = "Se é assim, então tudo bem..."
2002302-36 = "Sua expressão não parece muito boa desde agora... Você não está se sentindo bem?"
2002302-37 = "[s3] \"Talvez seja porque está um pouco quente...\"\n[s4] \"V-vou ligar o ar-condicionado?\""
2002302-40 = "Tanto faz, mas..."
2002302-41 = "Bem, vou continuar processando os documentos. Se precisar de algo, é só me chamar."
2002302-47 = "[ns] (Preciso tomar cuidado para não irritar a Kanna...)"
2002302-53 = "Professor(a). Gostaria de organizar as despesas das atividades de manutenção da ordem que a Academia de Polícia Valkyrie e o Schale realizaram juntas na semana passada..."
2002302-54 = "Onde estão os recibos que o Schale mantém sob sua gestão?"
2002302-55 = "[s5] \"Ah, os recibos de despesas...\"\n[s6] \"Estão na gaveta da mesa.\""
2002302-63 = "Ah, são estes aqui."
2002302-64 = "Mochila Momo Friends edição limitada, 5 mil ienes..."
2002302-65 = "Cartão da loja de jogos, 10 mil ienes..."
2002302-66 = "3 caixas de pacotes de expansão de cartas da Princesa Besouro Mushiqueen \"O Retorno do Besouro Gigante\", 5 mil ienes...?"
2002302-71 = "Professor(a), e estes recibos aqui...?"
2002302-72 = "[s7] \"Hã!?\"\n[s8] \"D-deve ter sido algum erro e acabaram se misturando...!\""
2002302-81 = "...Acho melhor guardar recibos pessoais em outro lugar para que não se misturem."
2002302-82 = "Se for inevitável guardá-los no mesmo lugar, recomendo que, pelo menos, os separe em pastas."
2002302-83 = "[s] \"S-sim...\""
2002302-84 = "Haa... Bem, vou voltar ao trabalho."
2002302-90 = "Professor(a). A triagem dos recibos e o resumo das informações sobre avistamentos de procurados que você pediu foram concluídos."
2002302-91 = "Coloquei pinos nas áreas correspondentes para facilitar a visualização das informações de avistamento, por favor, verifique também."
2002302-92 = "[s] \"...Já terminou? Que rápido.\""
2002302-93 = "Comparado ao trabalho na Academia de Polícia Valkyrie, isso não é nada."
2002302-94 = "Aqui, os documentos não são rejeitados por regras minuciosas. Além disso, na Valkyrie, ainda temos o trabalho de enviar cópias para a sala de registros..."
2002302-95 = "O trabalho no Schale é mais flexível, então é mais fácil de realizar."
2002302-96 = "[s] \"A Valkyrie deve ser difícil...\""
2002302-97 = "...De fato, pode ser. Mas seguir os procedimentos corretos também é um dos deveres de um policial."
2002302-98 = "Ah, os pinos no mapa não estão fixos, então tenha cuidado ao visualizar—"
2002302-103 = "[ns] \"D-desculpe! Eu ia colocar no quadro!\""
2002302-109 = "...Foi um pouco tarde demais."
2002302-110 = "Não se preocupe. A responsabilidade também é minha por não ter avisado antes."
2002302-111 = "Vou prender novamente."
2002302-116 = "[ns] （Que desconfortável...）"
2002302-118 = "Ufa...#nCom isso, o trabalho urgente está praticamente terminado."
2002302-119 = "[s9] \"Bom trabalho!\"\n[s10] \"Que tal um café?\""
2002302-122 = "Então, aceitarei sua gentileza."
2002302-123 = "Pode me trazer um café gelado?"
2002302-124 = "[s11] \"Sim, com prazer!\"\n[s12] \"Espere pela melhor xícara que já tomou.\""
2002302-131 = "Ei, talvez eu esteja me intrometendo, mas..."
2002302-132 = "Tem papéis caídos perto dos seus pés, Sensei. Cuidado para não escorreg――"
2002302-135 = "[ns] \"A-ahhh!?\""
2002302-139 = "[ns] \"D-desculpe! Você se molhou, não foi?\""
2002302-145 = "……Está tudo bem.#nSó preciso trocar de roupa."
2002302-146 = "Vou usar o vestiário."
2002302-147 = "Com licença."
2002302-155 = "[ns] \"Ei...\""
2002302-156 = "O que foi?"
2002302-157 = "[s] \"É que... pensei que talvez eu tivesse te deixado brava...\""
2002302-158 = "Eu, brava com você, Sensei?"
2002302-159 = "De fato, pareceu que você cometeu muitos erros hoje, mas...#nnão é algo que me deixaria brava."
2002302-160 = "Aliás, você estava trabalhando enquanto observava minha expressão, não estava?#nParece que foi por isso que não conseguiu se concentrar."
2002302-161 = "Se há algo que queira me dizer, por favor, fale à vontade."
2002302-162 = "[ns] (Falar sobre os rumores que ouviu de outros alunos)"
2002302-163 = "Fufu, fufufu..."
2002302-164 = "O rumor do \"Cão Raivoso\", é?"
2002302-165 = "Não se preocupe com isso.#nSão apenas boatos."
2002302-166 = "Não importa o quanto me chamem de \"Cão Raivoso do Departamento de Segurança\", estou em uma posição de guiar os cidadãos de acordo com a lei.#nComo executiva da Academia de Polícia Valkyrie, não descuido da distinção entre o público e o privado."
2002302-167 = "É verdade que... minha expressão natural é severa e sou rigorosa com meus subordinados, então...#nparece que muitos alunos me acham intimidadora..."
2002302-168 = "Mas não fico brava por coisas triviais como o que aconteceu agora."
2002302-169 = "Além disso... eu não culpo as pessoas por pequenos erros."
2002302-170 = "Deixando de lado crimes cometidos com malícia... erros acidentais podem ser refletidos e corrigidos.#nNa verdade, se eu os repreender, a oportunidade de melhoria desaparece."
2002302-171 = "Por isso, Sensei, não precisa se preocupar à toa, pode falar qualquer coisa."
2002302-172 = "[s] \"Obrigado. É uma determinação admirável.\""
2002302-173 = "Afinal, sou a chefe do Departamento de Segurança."
2002302-174 = "E como sou um exemplo para os oficiais...#nmesmo que o uniforme não sirva perfeitamente, preciso vesti-lo com elegância."
2002302-175 = "[ns] \"Entendi... Você se esforça muito, né.\""
2002302-177 = "[ns] \"Posso perguntar qualquer coisa mesmo?\""
2002302-178 = "Sim, não hesite."
2002302-179 = "[ns13] \"Eu entendo que você tenha um uniforme reserva...\"\n[ns14] \"Mas... e a parte de baixo... como você fez...?\""
2002302-182 = "！？"
2002302-187 = "Isso..."
2002302-188 = "Isso é apenas assédio sexual!"
2002302-190 = "(Depois disso, recebi uma bronca extremamente severa de Kanna...)"
