[translation]
2002302-1 = "局長の噂"
2002302-2 = "シャーレ・執務室"
2002302-8 = "こんにちは、[USERNAME]先生。"
2002302-9 = "本日、シャーレ当番を担当いたします、#nヴァルキューレ警察学校、公安局の[ruby=おがた]尾刃[/ruby]カンナです。"
2002302-10 = "初めての当番のため至らない点もあるかと思いますが、よろしくお願いいたします。"
2002302-11 = "[s1] \"よろしくね、カンナ。\"\n[s2] \"よろしく……お願いします？\""
2002302-12 = "そういえば、我がヴァルキューレ警察学校の生徒が、#n既に当番を担当したと伺っております……。"
2002302-13 = "な、何故、そう畏まっているのですか……？"
2002302-14 = "そういえば、我がヴァルキューレ警察学校の生徒が、#n既に当番を担当したと伺っております……。"
2002302-15 = "先生の前だというのに、警察としての本分を忘れ、腑抜けた姿を見せているようなので……。"
2002302-16 = "手伝うどころか、邪魔をしていないか心配です。"
2002302-17 = "彼女たち、何か粗相をしたりはしていませんか？"
2002302-20 = "は、はいっ？#nカンナ局長、ですか……？"
2002302-21 = "私が話したということは、内緒にしてくださいね……。#n警察学校内じゃ、恐怖の象徴ですよ。"
2002302-22 = "ただでさえ厳しい性格なのに、あのおっかない顔つきも合わさって……。"
2002302-27 = "（こそこそ）……[ruby=・ ・]狂犬[/ruby]、なんてあだ名もあるくらいです。"
2002302-28 = "先生も、カンナ局長に会ったら、機嫌を損ねないよう気をつけてくださいね！"
2002302-29 = "絶対に、何があっても、ですよ……！"
2002302-34 = "[ns] \"と、特に何も……！\""
2002302-35 = "それなら良いのですが……。"
2002302-36 = "先ほどから顔色があまり良くないようですが……#nお加減が優れないのでしょうか？"
2002302-37 = "[s3] \"ちょっと暑いからかな……。\"\n[s4] \"く、クーラーでもつけようか？\""
2002302-40 = "どちらでも構いませんが……。"
2002302-41 = "それでは、私は書類を処理しておりますので。#n何かありましたらお申し付けください。"
2002302-47 = "[ns] （カンナの機嫌を損ねないようにしないと……)"
2002302-53 = "先生。先週、ヴァルキューレ警察学校とシャーレが共同で実施した#n治安維持活動の経費をまとめたいのですが……"
2002302-54 = "シャーレ側で管理している領収証はどちらでしょうか？"
2002302-55 = "[s5] \"ああ、経費の領収書なら……。\"\n[s6] \"デスクの引き出しに入ってるよ。\""
2002302-63 = "あ、これですね。"
2002302-64 = "モモフレンズ限定ピンキーパカリュック、5千円……。"
2002302-65 = "ゲームストアカード、1万円……。"
2002302-66 = "甲虫王女ムシクイーンカードブースターパック#n「巨大甲虫の復活」のボックス3つ、5千円……？"
2002302-71 = "先生、こちらの領収証は……？"
2002302-72 = "[s7] \"えっ！？\"\n[s8] \"な、何かの手違いで混ざっちゃったのかな……！\""
2002302-81 = "……個人の領収証は、混ざらないよう別の場所で保管されたほうが良いかと。"
2002302-82 = "やむを得ず同じところに保管するのでしたら、#nせめてファイルで分けておくことをオススメします。"
2002302-83 = "[s] \"は、はいっ……。\""
2002302-84 = "はぁ……それでは、作業に戻ります。"
2002302-90 = "先生。領収証の仕分けと、先ほど頼まれた指名手配者の目撃情報のまとめが完了しました。"
2002302-91 = "目撃情報は、把握しやすいよう該当区域にピンを置きましたので、#n併せてご確認ください。"
2002302-92 = "[s] \"……もう終わったの？早いね。\""
2002302-93 = "ヴァルキューレ警察学校の業務に比べれば、これくらい何でもありません。"
2002302-94 = "ここでは細かい決まりで書類が弾かれることもないですから。#nそれにヴァルキューレでは文書記録室に写しを送付する手間もあるので……。"
2002302-95 = "シャーレの業務は、融通が利くので進めやすいですね。"
2002302-96 = "[s] \"ヴァルキューレは大変だね……。\""
2002302-97 = "……たしかに、そうかも知れません。#nですが、正しい手順を踏むことも警察の義務の一つです。"
2002302-98 = "あっ、地図のピンは固定されておりませんので、閲覧の際は慎重に――"
2002302-103 = "[ns] \"ご、ごめん！ボードに貼ろうと思って！\""
2002302-109 = "……少し、遅かったですね。"
2002302-110 = "お気になさらず。#n事前にお伝えしなかった私にも責任がありますので。"
2002302-111 = "もう一度、留め直しておきます。"
2002302-116 = "[ns] （居心地が悪い……）"
2002302-118 = "ふぅ……。#nこれで急ぎの仕事は一通り片付きましたね。"
2002302-119 = "[s9] \"お疲れさま！\"\n[s10] \"コーヒーでもどうかな？\""
2002302-122 = "では、お言葉に甘えて。"
2002302-123 = "アイスコーヒーを頂けますか？"
2002302-124 = "[s11] \"はい、喜んで！\"\n[s12] \"最高の一杯を期待しててね。\""
2002302-131 = "あの、余計なお世話かもしれませんが……。"
2002302-132 = "先生の足元に書類が落ちているので、滑らないように気をつけ――"
2002302-135 = "[ns] \"う、うわあっ！？\""
2002302-139 = "[ns] \"ご、ごめん！濡れちゃったよね？\""
2002302-145 = "……大丈夫です。#nただ、着替えないといけませんね。"
2002302-146 = "更衣室をお借りします。"
2002302-147 = "それでは、失礼いたします。"
2002302-155 = "[ns] \"あの……。\""
2002302-156 = "何でしょうか？"
2002302-157 = "[s] \"その、怒らせちゃったかなって……。\""
2002302-158 = "私が、先生にですか？"
2002302-159 = "たしかに、本日の先生はミスが多かったように見えますが……#n別段、怒るようなことではありません。"
2002302-160 = "そういえば、私の顔色を窺いながらお仕事をされていましたよね？#nどうにも、そのせいで集中できていなかったように見受けられました。"
2002302-161 = "私に何かあるのでしたら、何なりと仰ってください。"
2002302-162 = "[ns] （他の生徒から聞いた噂について話す)"
2002302-163 = "ふふっ、ふふふ……。"
2002302-164 = "「狂犬」の噂、ですか。"
2002302-165 = "お気になさらないでください。#nただの噂ですから。"
2002302-166 = "いくら「公安局の狂犬」と呼ばれようと、私は法に則って市民を導く立場にあります。#nヴァルキューレ警察学校の幹部として、公私の分別は怠りません。"
2002302-167 = "たしかに……生まれつき顔が険しいですし、後輩たちには厳しく接しているので、#n多くの生徒から苦手意識を持たれているようですが……。"
2002302-168 = "先ほどのような、些細なことで怒ったりはしません。"
2002302-169 = "それに……私は多少のミスで人を責めたりもしません。"
2002302-170 = "悪意を持った犯罪は別として……偶発的なミスは、反省して改善に繋げられます。#nむしろ、責めてしまっては、改善の機会がなくなってしまいますから。"
2002302-171 = "なので先生も、変に気を遣わず何でも仰ってください。"
2002302-172 = "[s] \"ありがとう。立派な志だね。\""
2002302-173 = "仮にも、公安局の局長ですから。"
2002302-174 = "それに隊員の見本となるのですから――#n多少身の丈に合わない服であっても、着こなさなければなりませんので。"
2002302-175 = "[ns] \"そっか……頑張ってるんだね。\""
2002302-177 = "[ns] \"本当に何でも聞いていいの？\""
2002302-178 = "はい、遠慮せずどうぞ。"
2002302-179 = "[ns13] \"予備の制服を持ってるのは分かるんだけど……。\"\n[ns14] \"その……下はどうしたの……？\""
2002302-182 = "！？"
2002302-187 = "そっ……。"
2002302-188 = "それはただのセクハラです！"
2002302-190 = "（その後、カンナから大変厳しいお叱りを受けた……) "
