[translation]
1001703-1 = "Pimentão e Hambúrguer"
1001703-2 = "Academia Federal Red Winter - Gabinete"
1001703-3 = "Fufu, fufufu..."
1001703-4 = "Uhahahahaha!"
1001703-5 = "Eles também não são nada mal, conseguindo me deixar tão empolgada assim!"
1001703-6 = "[s] \"Aconteceu algo de bom?\""
1001703-7 = "Hum, muito bem notado, camarada!"
1001703-8 = "Como você previu, algo muito aguardado me espera hoje."
1001703-9 = "Ora vejam só..."
1001703-10 = "No almoço de hoje, vai ter hambúrguer!"
1001703-11 = "O que foi, camarada? Por que essa cara? Você não gosta de hambúrguer?"
1001703-12 = "[s] \"Não, eu também gosto.\""
1001703-13 = "Hum, hum! É isso aí!"
1001703-14 = "Não deve existir ninguém no mundo que não goste de hambúrguer!"
1001703-15 = "E o hambúrguer feito pelo departamento de merenda da nossa Academia Federal Red Winter é tão delicioso quanto o bife de um restaurante de luxo!"
1001703-16 = "B-bem, eu nunca comi um bife de restaurante de luxo de verdade, mas... com certeza não existe prato mais saboroso que o hambúrguer da nossa academia em todo o Kivotos."
1001703-17 = "E se, além disso, colocarmos uma fatia de queijo por cima..."
1001703-18 = "Ah, e um ovo frito com gema mole também é indispensável!"
1001703-19 = "Fufufu, mal posso esperar!"
1001703-20 = "Hambúrguer~, hambúrguer~, delicioso hambúrguer~♪"
1001703-23 = "Academia Federal Red Winter - Refeitório"
1001703-25 = "...Q-que é isso..."
1001703-27 = "...Que tipo de atrocidade fizeram com o meu hambúrguer...!!!"
1001703-28 = "A-algum problema, Presidente Cherino?"
1001703-29 = "Claro que tem! Olhe bem para este prato!"
1001703-30 = "Você disse que hoje no almoço teria hambúrguer, não disse!"
1001703-31 = "É hambúrguer, sim, mas por que... por que tem pimentão servido ao lado dele!"
1001703-32 = "B-bem, é que sobraram mais pimentões do que o esperado da última compra... e para consumirmos tudo esta semana, não tivemos escolha..."
1001703-33 = "Se era assim, deveriam ter usado como alvo de tiro! #nJusto com um hambúrguer tão delicioso, cometer uma atrocidade dessas!"
1001703-34 = "M-mas, \"carne com pimentão\" é uma combinação muito comum na culinária. O pimentão ajuda a reduzir a gordura da carne e..."
1001703-35 = "Não quero ouvir desculpas! O crime do departamento de merenda de arruinar o hambúrguer que eu tanto esperava é grave, cem expurgos não seriam suficientes! Todos vocês estão condenados à classe especial 227, no prédio antigo!"
1001703-36 = "[s] \"Calma, calma... se acalme, Cherino.\""
1001703-39 = "O que foi, camarada?"
1001703-40 = "Mesmo que você goste de pimentão, isso é algo imperdoável!"
1001703-41 = "...O quê? Se eu for seletiva com a comida, não vou crescer mais?"
1001703-42 = "E ainda faz mal para a pele, e meu rosto lindo vai acabar sofrendo as consequências...?"
1001703-43 = "I-isso eu já sei!"
1001703-44 = "Mas... mas..."
1001703-45 = "Mas o fato de que pimentão não é gostoso não muda! O que quer que eu faça, sendo tão amargo assim!"
1001703-46 = "Não importa o que você diga, camarada, eu não consigo comer pimentão!"
1001703-47 = "[s] \"Se você comer, eu compro um pudim para você depois.\""
1001703-50 = "S-sério mesmo!? Pode ser aquele pudim de edição limitada da L'oiseau Bleu!?"
1001703-51 = "Hum... o pudim que vou comer com a camarada, ou o pimentão..."
1001703-52 = "Ah, quer saber! Comer isso não vai me matar!"
1001703-56 = "(Mastiga, mastiga...)"
1001703-57 = "Ué, estranho? Diferente do pimentão que comi antes, não está amargo?"
1001703-58 = "S-sim! Como deixei o pimentão de molho no molho de soja antes, o amargor saiu..."
1001703-59 = "Entendo... deve ser porque meu paladar ficou mais maduro sem eu perceber! Como esperado de mim!"
1001703-60 = "Hm? Disse alguma coisa, chefe do departamento de merenda?"
1001703-61 = "Não disse nada, Presidente Cherino! #nConseguir até comer pimentão... é impressionante, um exemplo de líder!"
1001703-62 = "Hehe, não adianta me elogiar tanto, não vai ganhar nada com isso!"
1001703-63 = "Mas eu não vou esquecer essa vingança por ter colocado pimentão no meu hambúrguer!"
1001703-64 = "Por isso, hoje, como uma exceção, vou levar dois pudins de sobremesa!"
1001703-66 = "Depois disso, Cherino comeu os dois pudins, e quando pensei que tinha acabado, ela trouxe outro de algum lugar e comeu também."
