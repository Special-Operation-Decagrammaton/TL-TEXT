[translation]
84312101304-6 = "Eu nunca fui recebida com tanta alegria... estou um pouco surpresa, na verdade."
84312101304-7 = "……Hã? É gostoso, não é? É refrescante e faz a gente se sentir bem."
84312101304-8 = "N-né?! Eu também acho... embora pareça que as outras pessoas não concordam."
84312101304-9 = "Acho que muita gente no Millennium gostaria. Essa sensação refrescante espanta o sono."
84312101304-13 = "Então... era para espantar o sono."
84312101304-15 = "(...Sobre o que será que eles estão falando?)"
