[translation]
10046190-3 = "Ichika."
10046190-4 = "Senpai Tsurugi!?"
10046190-5 = "A missão... quer que eu assuma?"
10046190-6 = "N-não! Não é algo que precise da sua intervenção, Senpai Tsurugi!"
10046190-7 = "Eu dou um jeito nisso aqui."
10046190-8 = "Não há necessidade de se forçar tanto aqui."
10046190-9 = "...Haha, você sempre vê através de mim, né."
10046190-10 = "É verdade, a situação está um pouco difícil. #nMas..."
10046190-11 = "..."
10046190-12 = "...Hmm, normalmente eu seguiria suas ordens sem questionar."
10046190-13 = "Está insatisfeita?"
10046190-14 = "Não, não é isso."
10046190-15 = "Desta vez, eu tenho um motivo pelo qual não posso ceder..."
10046190-16 = "Por isso, pelo menos me deixe ajudar ao seu lado!"
10046190-17 = "...Entendo."
10046190-18 = "Então era disso que Hasumi estava falando quando mencionou uma colheita inesperada... Kihi!"
10046190-19 = "Kihihihi...!!"
10046190-20 = "...Eu não vou pegar leve. Entendido?"
10046190-21 = "Sim! Eu vou te seguir até o fim!"
10046190-22 = "...Essa determinação, não é ruim."
10046190-26 = "Então, vamos começar."
10046190-27 = "Kihihihi..."
10046190-33 = "Kieeeeeeeeeee!!!"
