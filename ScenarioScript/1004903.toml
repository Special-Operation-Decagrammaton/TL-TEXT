[translation]
1004903-1 = "Apesar da aparência, sou um membro do Clube de Doces depois da aula."
1004903-2 = "(Saí para caminhar um pouco para relaxar no meio do trabalho.)"
1004903-3 = "(Vi uma silhueta familiar no ponto de ônibus do outro lado da rua.)"
1004903-4 = "[s1] \"Ué? Kazusa?\"\n[s2] \"Boa noite.\""
1004903-5 = "……Ué, Sensei?"
1004903-6 = "……Ué, Sensei?"
1004903-7 = "O que você está fazendo a essa hora da noite... por acaso está passeando?"
1004903-8 = "……Hm? Eu?"
1004903-9 = "Bem... como pode ver, estou esperando o ônibus."
1004903-10 = "O intervalo entre os ônibus que vão para o dormitório daqui é muito longo. #nSe eu tiver azar, tenho que esperar uns 20 minutos inteiros."
1004903-11 = "Bem, se eu pegasse o metrô, chegaria um pouco mais cedo, mas..."
1004903-12 = "……Não gosto de multidões. #nVeja, não tem ninguém por aqui, certo? O ônibus também é vazio assim."
1004903-13 = "Mesmo que demore um pouco mais, prefiro quando tem menos gente. Assim fico mais tranquila."
1004903-14 = "Além disso, tem um banco neste ponto de ônibus."
1004903-15 = "Ou seja..."
1004903-19 = "Como você pode ver, também tenho tempo para sentar e comer um lanche... é isso. Fufu."
1004903-20 = "Aqui, Sensei, pode pegar."
1004903-21 = "[s3] \"Tem certeza?\"\n[s4] \"Não é o suco da Kazusa?\""
1004903-22 = "Não precisa se preocupar comigo. Tenho mais, então está tudo bem."
1004903-23 = "Não precisa se preocupar comigo. Tenho mais, então está tudo bem."
1004903-27 = "Tcharam! Eu costumo carregar macarons comigo assim."
1004903-28 = "Fufu. Apesar da aparência, sou um membro do Clube de Doces depois da aula. #nIsso significa que não tenho apenas suco na minha bolsa."
1004903-29 = "\"Doces são muito mais gostosos quando comemos juntos do que sozinhos\"..."
1004903-30 = "...foi o que aquelas garotas disseram. Haha."
1004903-31 = "Ah, isso foi sobre o meu Clube de Doces."
1004903-32 = "[s5] \"Então a Kazusa também gosta de doces.\"\n[s6] \"Pensei que você só gostasse da atmosfera do clube.\""
1004903-33 = "Hmm... então é assim que parece, né? #nEu mesma acho um pouco estranho, mas..."
1004903-34 = "Hmm... então é assim que parece, né? #nEu mesma acho um pouco estranho, mas..."
1004903-35 = "Mas você acha que existe alguma estudante que não goste de doces neste mundo? #nAcho que é só uma questão de preferência pelo tipo de doce."
1004903-36 = "Eu realmente não como só para acompanhar as outras integrantes. #nEu gosto de bolo de morango e também adoro macarons."
1004903-37 = "Na verdade, eu gosto tanto de doces que... evito produtos baratos produzidos em massa."
1004903-38 = "Já que estamos falando disso, um dia quero te mostrar a minha \"loja favorita\", Sensei."
1004903-39 = "Tenho certeza de que você vai gostar... #nAh, bem... se você não for muito fã de coisas doces, talvez seja só mais ou menos."
1004903-40 = "……Hmm, mas talvez você goste, surpreendentemente. Não é enjoativo."
1004903-41 = "Ou talvez algo um pouco mais leve seja melhor..."
1004903-45 = "……Ah."
1004903-46 = "O ônibus chegou enquanto conversávamos. Eu achei que ele demoraria um pouco mais..."
1004903-47 = "Se eu não pegar este, vou ter que esperar mais uns 20 minutos..."
1004903-48 = "……Não tem jeito. Ainda sobrou bastante lanche e suco, mas preciso ir."
1004903-52 = "Hmm..."
1004903-53 = "Sensei, hum... só por precaução. Não tenho nenhuma segunda intenção, de verdade."
1004903-54 = "Bem... é que..."
1004903-55 = "[s7] \"Já terminei todo o meu trabalho de hoje.\"\n[s8] \"Posso ficar aqui por uns 20 minutos.\""
1004903-60 = "……Haa."
1004903-61 = "Sério... Sensei, você..."
1004903-62 = "……Eu sempre me pergunto, você fala assim com as outras também?"
1004903-63 = "Se um dia alguém te atacar, a culpa será toda sua. #nColoque isso na cabeça, entendeu?"
1004903-64 = "Hmm... mas, bem..."
1004903-65 = "Se algo assim realmente acontecer... #npode me ligar. Se não for horário de aula, eu te ajudo."
1004903-66 = "……Hm?"
1004903-67 = "Pareceu uma piada?"
1004903-68 = "Ah, de novo com isso..."
1004903-69 = "Bem, tudo bem. Vou deixar passar por enquanto."
1004903-70 = "Então..."
1004903-76 = "...vamos continuar, Sensei?"
