[translation]
1004903-1 = "こう見えても放課後スイーツ部の一員"
1004903-2 = "（仕事の途中、息抜きに散歩をすべく外へ出た）"
1004903-3 = "（道路の片側にあるバス停で、見慣れた人影が見えた）"
1004903-4 = "[s1] \"あれ？カズサ？\"\n[s2] \"こんばんは。\""
1004903-5 = "……あれ、先生？"
1004903-6 = "……あれ、先生？"
1004903-7 = "どうしたのこんな遅い時間に……もしかして散歩？"
1004903-8 = "……ん？私？"
1004903-9 = "えっと……見ての通りバス待ち中。"
1004903-10 = "ここから寮に向かうバスは間隔がすごく長くて。#n運が悪かったらまるまる20分は待たないといけないの。"
1004903-11 = "まあ、地下鉄乗ればちょっと早く帰れるけど……。"
1004903-12 = "……人混みは苦手で。#nほら、この辺人いないでしょ？バスも同じでガラガラだから。"
1004903-13 = "時間が少しかかっても、人が少ないほうが好き。その方が余裕も出るし。"
1004903-14 = "それに、このバス停には椅子がある。"
1004903-15 = "つまり……。"
1004903-19 = "ご覧のとおり、座っておやつを食べる時間もある……ということだよ。ふふ。"
1004903-20 = "はい、先生もどうぞ。"
1004903-21 = "[s3] \"いいの？\"\n[s4] \"カズサのジュースでしょ？\""
1004903-22 = "私の心配はしなくていいよ。他にもあるから大丈夫。"
1004903-23 = "私の心配はしなくていいよ。他にもあるから大丈夫。"
1004903-27 = "ジャーン！こういう風に、マカロンとかも持ち歩いているの。"
1004903-28 = "ふふっ。こう見えても放課後スイーツ部の一員だよ。#nカバンの中のおやつはジュースだけじゃないって事。"
1004903-29 = "「スイーツは一人で食べるより、みんなで食べる方がもっとおいしいもの」……。"
1004903-30 = "……って、あいつらが言ってたし。ははっ。"
1004903-31 = "あ、今のはうちのスイーツ部の話。"
1004903-32 = "[s5] \"カズサもスイーツが好きなんだね。\"\n[s6] \"部活のそういう雰囲気だけ楽しんでいるのかと思った。\""
1004903-33 = "ん～……やっぱそう見えるのかな。#nそりゃ自分でもちょっと不思議だとは思うけど……。"
1004903-34 = "ん～……やっぱそう見えるのかな。#nそりゃ自分でもちょっと不思議だとは思うけど……。"
1004903-35 = "でもスイーツが嫌いな女子高生って、この世にいると思う？#n好きなスイーツの種類が違うだけだと思うな。"
1004903-36 = "本当に、他のメンバーにただ付き合うために食べてるわけじゃないからね。#nイチゴが乗ったショートケーキも好きだし、マカロンも大好き。"
1004903-37 = "むしろスイーツが好きすぎて……安物の量産品は避けるぐらいっていうか。"
1004903-38 = "話が出たついでに。いつか、先生にも私の「オススメ店」を教えてあげたいな。"
1004903-39 = "きっと先生も好きだと思う……#nあ、まあ……甘いものが好みじゃなかったら、まあまあかもしれない。"
1004903-40 = "……うーん、でも意外と大丈夫かも。くどい甘さじゃないし。"
1004903-41 = "それかもう少しあっさりした方が……。"
1004903-45 = "……あ。"
1004903-46 = "話してたらバス来ちゃった。もうちょっと後で来ると思ってたのに……"
1004903-47 = "これに乗らないと、また20分くらい待たないといけないし……"
1004903-48 = "……仕方ない。まだおやつもジュースも結構残ってるけど、行かなきゃ。"
1004903-52 = "んー……。"
1004903-53 = "先生、その……一応、念のため。本当に何の他意もないんだけど。"
1004903-54 = "えっと……その。"
1004903-55 = "[s7] \"今日の仕事は全部終わってるから。\"\n[s8] \"20分ぐらいは大丈夫だよ。\""
1004903-60 = "……はぁ。"
1004903-61 = "本当に……先生は……"
1004903-62 = "……いつも思うけど、他の子にもそんな風に言ってるの？"
1004903-63 = "いつか誰かが先生に襲いかかったとしても、その時は自業自得だからね。#n肝に銘じておきなよ、分かった？"
1004903-64 = "うーん……でも、まあ……。"
1004903-65 = "もし本当にそんな事が起きたら……。#n連絡してきてもいいよ。授業時間じゃなければ助けてあげるから。"
1004903-66 = "……ん？"
1004903-67 = "冗談に聞こえた？"
1004903-68 = "はぁ、またそんな風に……"
1004903-69 = "ま、いいよ。今はそういう事にしといてあげる。"
1004903-70 = "それじゃ……"
1004903-76 = "……続けよっか、先生？"
