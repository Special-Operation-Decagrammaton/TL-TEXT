[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
1002715-1 = "Um Presente Inesperado"
1002715-3 = "......Entendi a situação."
1002715-4 = "Então... uma agência criminosa disfarçada de ONG de proteção animal está usando o dinheiro arrecadado dos alunos――"
1002715-5 = "Para fazer coisas ilícitas, e nós precisamos pegá-los de surpresa. É isso?"
1002715-6 = "[s] \"Exatamente!\""
1002715-7 = "......"
1002715-8 = "Eu sei que a missão é importante."
1002715-9 = "Mas tem uma coisa que não entendi..."
1002715-10 = "Realmente tinha a necessidade da gente vestir roupas de coelhinha para isso?"
1002715-11 = "[ns1] \"Por que os guardas de lá também usam!\"\n[ns2] \"Fica muito mais fácil de se infiltrar!\""
1002715-22 = "T-Tem razão."
1002715-23 = "O fato de o uniforme dos guardas ser uma roupa de coelhinha é bem suspeito, mas..."
1002715-24 = "Provavelmente nem deve ter um motivo lógico pra isso."
1002715-25 = "......Vamos focar na missão."
1002715-26 = "Antes que aconteça a 'situação' que o Sensei tanto teme."
1002715-31 = "（Um tempo depois...）"
1002715-39 = "（......Só continuei usando porque foi a primeira que me deram......）"
1002715-122 = "Eu só continuei usando ela porque foi a primeira que me deram..."
1002715-123 = "[s11] \"Se você passou esse tempo todo usando o mesmo modelo...\"\n[s12] \"Não significa que você acabou gostando dela?\""
1002715-126 = "Hmmm...?"
1002715-127 = "Talvez... eu tenha começado a achar inconscientemente que esse era o visual certo para uma coelhinha."
1002715-131 = "O que você acha, Sensei?"
1002715-132 = "A meia arrastão... combina comigo?"
1002715-133 = "[s] \"Sim! Ficou perfeita em você, Karin!!\""
1002715-134 = "......!"
1002715-135 = "S-Sério?"
1002715-136 = "Se o Sensei acha que ficou bom... então eu também acho."
1002715-140 = "（Se vão ficar de namorico, podiam pelo menos fazer isso em outro lugar...）"
1002715-143 = "[ns] \"Então vamos comprar e você já veste logo!\""
1002715-148 = "Agora mesmo?"
1002715-149 = "Bom... acho que aqui não tem problema."
1002715-150 = "Já decidiram? O caixa fica logo aqui."
1002715-154 = "......"