[translation]
1002715-1 = "思わぬプレゼント"
1002715-3 = "……状況は理解した。"
1002715-4 = "つまり……動物保護団体を装った悪徳事業者が、生徒から集めた金銭を――"
1002715-5 = "良からぬことに使ってるから、早く捕まえたいということだな？"
1002715-6 = "[s] \"その通り！\""
1002715-7 = "……。"
1002715-8 = "重要な任務だと思う。"
1002715-9 = "だが、一つ疑問がある……。"
1002715-10 = "バニーガールの衣装を着る必要があったのか？"
1002715-11 = "[ns1] \"あっちもバニーガールだから？\"\n[ns2] \"潜入しやすいし？\""
1002715-22 = "た、たしかに。"
1002715-23 = "守衛の服装がバニーガールというのは、気になるけど……。"
1002715-24 = "まぁ、理由などないんだろうな。"
1002715-25 = "……任務に取りかかろう。"
1002715-26 = "先生が心配するような「状況」が起きる前に。"
1002715-31 = "（しばらくして……）"
1002715-39 = "（……たった数発の弾丸で、カリンは全てを片づけた）"
1002715-45 = "くうっ！こ、このまま終わるわけにいかない！"
1002715-46 = "私だけのバニーガール帝国を作るという、偉大なる野望が……！"
1002715-47 = "黙ってさっさと乗りなさい！"
1002715-51 = "バニーガール……帝国？"
1002715-52 = "[s3] \"きょ、今日はお疲れさま！\"\n[s4] \"おいしいものでも食べに行こう！\""
1002715-55 = "ああ。だが……この格好のままでは難しいな。"
1002715-56 = "タイツが少し破れてしまって……。"
1002715-57 = "[s] \"えっ！大丈夫？\""
1002715-58 = "問題ない。"
1002715-59 = "網タイツは繊細だから、少し擦れただけでも破れるんだ。"
1002715-60 = "これだと歩き回れないから、着替えないと……。"
1002715-64 = "……何故そんな残念そうな目を？"
1002715-65 = "まさか、先生は破れているほうが好きなのか？"
1002715-66 = "[s5] \"そ、そういうわけじゃないよ！\"\n[s6] \"……黙秘させて。\""
1002715-69 = "そ、そうか。"
1002715-70 = "着替えてくるから、ちょっと待っててくれ。"
1002715-75 = "（しばらくして……）"
1002715-81 = "お待たせしたな。"
1002715-82 = "それで……どこへ行くんだ？"
1002715-83 = "私が行きたい所……？"
1002715-84 = "じゃあ……家庭料理専門店にしよう。"
1002715-85 = "家庭料理は、立派なメイドの必須条件だから……。"
1002715-86 = "専門店で味わうだけでも、勉強になるはずだ。"
1002715-87 = "[s7] \"家庭料理の勉強か……。\"\n[s8] \"カリンは家庭的な人になりそうだね。\""
1002715-90 = "う、うん……！"
1002715-91 = "目的地も決まったし、早く出発しよう。"
1002715-95 = "（そうして到着した場所は……）"
1002715-97 = "ショッピングモールのファッションコーナー"
1002715-98 = "……？"
1002715-99 = "どうしてここに？家庭料理の店に行くんじゃないのか？"
1002715-100 = "[s9] \"ちょうどお店があったからね。\"\n[s10] \"まずはタイツを探そう！\""
1002715-106 = "[ns] \"私の手伝いで破れちゃったんだから、贈らせてよ！\""
1002715-107 = "先生からのプレゼント……？"
1002715-108 = "まあ……悪くは、ないけど……。"
1002715-113 = "いらっしゃいませ。お探しの物はありますか？"
1002715-114 = "あ……その……。"
1002715-115 = "バニーガールの時は、いつも網タイツだから……同じもので。"
1002715-116 = "[s] \"カリンは、網タイツが好きなの？\""
1002715-121 = "別に好きというわけじゃ……。"
1002715-122 = "最初に支給されたから、履き続けてるだけだ……。"
1002715-123 = "[s11] \"これまでずっと同じデザインのものを履いていたなら……。\"\n[s12] \"気に入っているってことじゃないかな？\""
1002715-126 = "うーん……？"
1002715-127 = "無意識に……バニーガールにはこれ、だと思っていたのかもしれない。"
1002715-131 = "先生はどう思う？"
1002715-132 = "網タイツ……私に似合うと思うか？"
1002715-133 = "[s] \"うん！カリンにピッタリだよ！！\""
1002715-134 = "……！"
1002715-135 = "そ、そうか。"
1002715-136 = "先生が良いと思うなら……私も。"
1002715-140 = "（イチャイチャするなら別のところでしてほしい……）"
1002715-143 = "[ns] \"じゃあ、早速買って履いてみよう！\""
1002715-148 = "今すぐ？"
1002715-149 = "まあ……ここなら大丈夫か。"
1002715-150 = "お決まりですか？お会計はこちらで承ります。"
1002715-154 = "……。"
1002715-155 = "じゃあ……試着室に行ってくる。"
1002715-160 = "（しばらくして……）"
1002715-166 = "ど、どうだろう？"
1002715-167 = "やっぱりバニーガールには、これだろうか？"
1002715-168 = "[s] \"完璧！”"
1002715-169 = "う、うん。"
1002715-170 = "じゃあ……これからもバニーガールの時は網タイツを履くことにする。"
1002715-171 = "先生が良いって言ってくれたし。"
1002715-172 = "[s] \"それなら……もう10足ぐらい買おうか？\""
1002715-173 = "そんなに？"
1002715-177 = "まさか……先生もバニーガール帝国を作るのが目的なのか？"
1002715-178 = "[s] \"タイツは消耗品だから、替えがたくさんあるほうが良いんじゃない？\""
1002715-179 = "まあ……それもそうだが……。"
1002715-180 = "先生がそんなに気遣ってくれているなら……。"
1002715-181 = "1足ぐらいは、大事に保管したいと思っている。"
1002715-182 = "[s] \"え？網タイツを記念に残すってこと？\""
1002715-183 = "うん。先生が似合うって言ってくれたから。"
1002715-184 = "だが、これは消耗品だし……。いつかは全部破れて捨てることになる。"
1002715-185 = "それは、すごくもったいない。"
1002715-186 = "だから……1足ぐらいは大事に持っていても良いと思う。"
1002715-187 = "[s] \"ありがとう、カリン……！\""
1002715-192 = "お礼を言うのは、私のほうだ。ずっとお世話になってるし。"
1002715-193 = "……いつもありがとう、先生。"
1002715-198 = "（だから、人がいない所で……）"
1002715-200 = "（それから、カリンが行きたがっていた家庭料理の店で食事をした）"
1002715-204 = "（思い出に残る楽しい日になった）"
