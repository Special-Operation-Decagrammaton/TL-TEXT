[translation]
2001703-1 = "A garota, ainda assim, não desiste"
2001703-2 = "Distrito de reurbanização, dentro de um prédio marcado para demolição"
2001703-3 = "Ah, ah...!?"
2001703-4 = "Se-Sensei, por que você está aqui...!?"
2001703-5 = "Saber onde estou não importa onde eu vá... é como se eu estivesse na palma da sua mão, Sensei."
2001703-6 = "Assustador... isso é o que significa ser um adulto..."
2001703-7 = "[s] \"Fiquei curioso sobre o que seriam essas 'coisas boas'.\""
2001703-8 = "Ah, ehehe... é verdade. Mesmo vivendo assim, aconteceram coisas felizes, então eu queria te contar..."
2001703-9 = "Teria sido melhor se eu pudesse ter enviado uma foto também... mas bem, já que pude te encontrar pessoalmente, o resultado foi positivo."
2001703-10 = "Na verdade, hoje eu tive uma colheita incrível... eu queria me gabar para você, Sensei... ehehe..."
2001703-11 = "[s] \"Colheita...?\""
2001703-12 = "Sim, primeiro é isto."
2001703-16 = "(Hiyori tirou um maço de papéis velhos amarelados)"
2001703-17 = "[s] \"Isso é... papel velho...?\""
2001703-18 = "S-sim... eu peguei na caixa de coleta de papel usado. Este é um exemplar combinado da revista mensal \"ron-ro\". Do ano passado, claro."
2001703-19 = "É uma revista rara... nem sei se as grandes livrarias de D.U. ainda têm..."
2001703-20 = "Além disso, como somos nômades, não podemos fazer compras online, e mesmo que quiséssemos comprar e-books, não temos como pagar... para nós, é como algo inalcançável..."
2001703-21 = "E eu encontrei oito exemplares desse item super raro!"
2001703-22 = "[s1] \"P-parabéns.\"\n[s2] \"Tantos assim... Hiyori, você gosta de revistas de moda, né?\""
2001703-23 = "Ehehe... tem muitas coisas curiosas, não fico entediada olhando... os artigos especiais também são interessantes..."
2001703-24 = "Ehehe... tem muitas coisas curiosas, não fico entediada olhando... os artigos especiais também são interessantes..."
2001703-25 = "Não só a \"ron-ro\", mas também juntei mais de 20 exemplares da \"BiBi\"."
2001703-26 = "Quando fomos atingidas por aquela onda de frio, acabei usando tudo como combustível..."
2001703-27 = "Eram coisas que eu valorizava muito... mas é melhor do que morrer congelada..."
2001703-28 = "Mas eu queria muito ter lido os artigos \"Pequena Diaba da Praia! Review de novos trajes de banho!\" e \"De perto! Os 5 melhores itens recomendados pelos líderes de moda de D.U.\"..."
2001703-29 = "Mas tudo virou cinzas... cinzas às cinzas, pó ao pó... a vida é assim mesmo... é doloroso... pensando agora, talvez houvesse outro jeito... a vida é cheia de arrependimentos..."
2001703-30 = "[s] \"C-calma, Hiyori...\""
2001703-31 = "..."
2001703-32 = "...Ah, ah. Eu estava começando a divagar de novo."
2001703-33 = "E-então, resumindo! Eu só queria te contar sobre essa sorte!"
2001703-34 = "De qualquer forma, a única pessoa para quem posso contar é você, Sensei... as outras pessoas só reagem com um \"tá bom\" frio..."
2001703-35 = "Ah, tem mais uma coisa!"
2001703-39 = "(Hiyori tirou uma caixa de ferro enferrujada)"
2001703-40 = "[s] \"Isso é... um kit de primeiros socorros...?\""
2001703-41 = "Ehehe... exatamente. A caixa é velha, mas dentro tem remédios de uso comum. Remédio para estômago, para gripe, antitérmico, álcool antisséptico..."
2001703-42 = "Produtos médicos são caros quando você compra normalmente, né! Por isso, coisas assim são muito valiosas e raras!"
2001703-43 = "Ter remédios de uso comum é muito importante... da última vez que fiquei três dias de cama por comer uma maçã meio podre, se eu tivesse remédio para estômago..."
2001703-44 = "[s3] \"Acho que o problema não é bem esse...?\"\n[s4] \"Você comeu uma maçã podre!?\""
2001703-45 = "Naquela hora eu estava com muita fome... normalmente eu não como essas coisas."
2001703-46 = "Naquela hora eu estava com muita fome... normalmente eu não como essas coisas."
2001703-47 = "Se eu tivesse remédios, acho que conseguiria até comer comida estragada..."
2001703-48 = "[s](N-não, não pode. Se eu deixar ela continuar assim, algo terrível vai acontecer...!)"
2001703-49 = "Esse remédio aqui é incrível..."
2001703-50 = "Ué, ah, hã? Sensei...?"
2001703-51 = "[s] \"Hiyori, você poderia vir comigo por um instante?\""
2001703-52 = "S-sim!? Entendido... mas, p-por que...!?"
2001703-55 = "Remédio líquido para gripe, remédio para estômago, antisséptico, antitérmico..."
2001703-56 = "Sim, obrigado pela compra."
2001703-57 = "..."
2001703-58 = "[s] \"Medicamentos também têm prazo de validade... então use estes aqui.\""
2001703-59 = "……Dá para comprar remédios até na loja de conveniência, né."
2001703-60 = "E-eu acabei dando trabalho para o Sensei de novo. Ah... será que eu já era?"
2001703-64 = "S-será que eu não consigo mais escapar das garras do adulto!?"
2001703-65 = "Waaah! Já que vai ser assim... por favor, compre isto também..."
2001703-66 = "[s] \"……por favor, isto também.\""
2001703-70 = "A última edição da \"ron-ro\" e da \"BiBi\", certo? Obrigado pela compra."
2001703-71 = "Waaah... pronto, agora acabou de vez. Mas, vou ler com gratidão, Sensei!"
2001703-73 = "(Levei Hiyori, que repetia pedidos de desculpas e lamentos ininteligíveis, para fora da loja de conveniência)"
