[translation]
2001703-1 = "少女はそれでも諦めない"
2001703-2 = "再開発地区・撤去予定の建物の中"
2001703-3 = "あ、あっ……！？"
2001703-4 = "せ、先生がどうしてこちらに……！？"
2001703-5 = "どこにいても場所が分かってしまうなんて……まるで先生の手の平の上ですね。"
2001703-6 = "怖い……これが、大人……。"
2001703-7 = "[s] \"「良いこと」の中身が気になって。\""
2001703-8 = "あ、えへへ……そうなんです。こんな生活の中でも幸せなことがあったので、伝えたくって……。"
2001703-9 = "写真も転送できればより良かったのですが……まあ、こうして直接お会いできたのですから、結果オーライです。"
2001703-10 = "実は今日、収穫がすごくて……先生に自慢したかったというか……えへへ……。"
2001703-11 = "[s] \"収穫……?\""
2001703-12 = "はい、まずはこれです。"
2001703-16 = "（ヒヨリが黄ばんだ古紙束を取り出した）"
2001703-17 = "[s] \"これは、古紙……？\""
2001703-18 = "は、はい……古紙の回収箱から拾ってきました。……これは月刊雑誌「ron-ro」の合併号です。昨年度のですが。"
2001703-19 = "珍しい雑誌なんですよ……D.U.市内の大型書店でも扱ってるかどうか……。"
2001703-20 = "それに私たちは流れの身ですから、通販なんかもできないし、電子書籍で買おうにも決済方法がないし……私たちにとっては高嶺の花のような存在なのです……。"
2001703-21 = "そんな超レア品を拾ったんです！8冊も！"
2001703-22 = "[s1] \"お……おめでとう。\"\n[s2] \"そんなにたくさん……ヒヨリはファッション雑誌が好きなんだね。\""
2001703-23 = "えへへ……不思議なものが多くて、見ていて退屈しないんです……特集記事も面白くて……。"
2001703-24 = "えへへ……不思議なものが多くて、見ていて退屈しないんです……特集記事も面白くて……。"
2001703-25 = "「ron-ro」だけじゃなく、「BiBi」も20冊以上集めました。"
2001703-26 = "この前寒波に襲われた時、燃料として全部使っちゃったんですけど……。"
2001703-27 = "すごく大事にしていたものだったんですが……凍え死ぬよりはマシなので……。"
2001703-28 = "でも、「渚の小悪魔！新作水着レビュー！」と「密着！D.U.ファッションリーダーに聞いた厳選ベストバイtop.5」の記事は読みたかったです……。"
2001703-29 = "でも、全部焼けてしまいました……灰は灰に、土は土に……人生とはそういうもの……辛いですね……今思えば他の方法があったかもしれないとも思うのですが……人生は後悔ばかりで……。"
2001703-30 = "[s] \"お、落ち着いてヒヨリ……。\""
2001703-31 = "……。"
2001703-32 = "……あ、ああ。また変な方に行ってしまうところでした。"
2001703-33 = "え、えっとつまり！このラッキーをお伝えしたかったんです！"
2001703-34 = "どうせ伝えられる人は先生しかいませんし……他の方は、「ふーん」という冷ややかな反応で……。"
2001703-35 = "あ、他にもまだありまして！"
2001703-39 = "（ヒヨリが錆びついた鉄製箱を取り出した）"
2001703-40 = "[s] \"これは、救急箱……？\""
2001703-41 = "えへへ……そうなんです。ケースは古いですが、中には常備薬が入ってるんです。胃腸薬、風邪薬、解熱剤、消毒用アルコール……。"
2001703-42 = "医療用品って普通に買うと高いじゃないですか！だからこういうのはすごく貴重で珍しいんですよ！"
2001703-43 = "常備薬を用意しておくのはとっても大事です……この前半分くらい腐ったリンゴを食べて3日寝込んだ時も、胃腸薬が手元にあれば……。"
2001703-44 = "[s3] \"それはちょっと違うと思うんだけど……？\"\n[s4] \"腐ったリンゴを食べちゃったの！？\""
2001703-45 = "その時は本当にお腹が空いてしまっていて……普段はそんなに食べません。"
2001703-46 = "その時は本当にお腹が空いてしまっていて……普段はそんなに食べません。"
2001703-47 = "常備薬があれば、腐った食べ物でもなんとか食べられそうですし……。"
2001703-48 = "[s]（だ、ダメだ。このまま放っておいたら大変なことになってしまう……！）"
2001703-49 = "このお薬なんてすごいんですよ……"
2001703-50 = "って、あ、あれ？先生……？"
2001703-51 = "[s] \"ヒヨリ、ちょっと私についてきてくれるかな。\""
2001703-52 = "は、はい！？わかりました……えっと、ど、どうして……！？"
2001703-55 = "液体風邪薬、胃腸薬、消毒薬、解熱剤……"
2001703-56 = "はい、お買い上げありがとうございました。"
2001703-57 = "……。"
2001703-58 = "[s] \"医薬品も使用期限があるから……こっちを使ってね。\""
2001703-59 = "……コンビニでも薬が買えるんですね。"
2001703-60 = "ま、また先生にお世話になっちゃいました。ああ……もう私はおしまいなんでしょうか。"
2001703-64 = "お、大人の魔の手から抜け出せなくなったんでしょうか！？"
2001703-65 = "うわぁん！いっそのこと、そうなってしまうなら……どうか、これも買ってください……。"
2001703-66 = "[s] \"……これもお願いします。\""
2001703-70 = "「ron-ro」と「BiBi」最新号ですね。お買い上げありがとうございました。"
2001703-71 = "うわぁん……もう、完全に終わりですね。でも、ありがたく読ませていただきます、先生！"
2001703-73 = "（言葉にならない謝罪と悲観を繰り返すヒヨリを連れて、コンビニを後にした）"
