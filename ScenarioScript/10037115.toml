[translation]
10037115-2 = "予"
10037115-4 = "告"
10037115-6 = "編"
10037115-15 = "京劇の舞台で一体何が起きたのでしょう？#n会長は何か知っていますか？"
10037115-19 = "うーん……やっぱこの話題はここまで！今はお祭りの準備が最優先だからね。"
10037115-23 = "ま、待ってほしいのだ！絶対おかしいのだ！#n錬丹術研究会は今回の事件とは関係ないのだ！"
10037115-24 = "あなたは重要参考人となっています。ご同行、願えますか――[ruby=やくし]薬子[/ruby]サヤ会長。"
10037115-27 = "「猿の手」にまつわる話を――知っておるか？"
10037115-30 = "[ns1] \"単純に割り切れるような話ではないけれどね。\"\n[ns2] \"山海経の過去がそうであるように。\""
10037115-35 = "京劇部は、京劇の為に存在する部活です。"
10037115-38 = "心配しないでください、とは言いません。#n門主様は、心優しいお方ですから。"
10037115-39 = "門主様が私を見捨てることはあっても、私が門主様を見限ることは絶対にありません。"
10037115-42 = "私なら、君を治すことができるとも――なあ、キサキ？"
10037115-43 = "だって……君がそうなったのは――"
10037115-47 = "私のせいだからなあ？"
10037115-50 = "多くの生徒が苦しみ、山海経は混沌に陥った。"
10037115-51 = "惨劇を生み出した其方を――妾一人の安息のために、再び受け入れろと？"
10037115-56 = "こんにちは、先生！"
