10037115-15 = "O que será que aconteceu no palco da ópera de Pequim?#nPresidente, você sabe de alguma coisa?"
10037115-19 = "Hmm... bem, vamos encerrar esse assunto por aqui! Agora, a prioridade máxima é a preparação para o festival."
10037115-23 = "E-espere um pouco! Isso é um absurdo!#nO Clube de Pesquisa de Alquimia não tem nada a ver com esse incidente!"
10037115-24 = "Você é considerada uma testemunha importante. Poderia nos acompanhar, Presidente Saya?"
10037115-27 = "Você conhece a história... sobre a 'Pata de Macaco'?"
10037115-30 = "[ns1] \"Não é uma história que possa ser explicada de forma simples.\"\n[ns2] \"Assim como o passado de Shanhaijing.\""
10037115-35 = "O Clube de Ópera de Pequim é um clube que existe por causa da ópera de Pequim."
10037115-38 = "Não vou pedir para você não se preocupar.#nAfinal, a Mestra do Portão é uma pessoa de bom coração."
10037115-39 = "Mesmo que a Mestra do Portão me abandone, eu jamais abandonarei a Mestra do Portão."
10037115-42 = "Eu seria capaz de curar você, não seria... Kisaki?"
10037115-43 = "Afinal... o motivo de você ter ficado assim foi..."
10037115-47 = "Por minha causa, não é?"
10037115-50 = "Muitos alunos sofreram, e Shanhaijing mergulhou no caos."
10037115-51 = "Você, que causou tal tragédia... quer que eu te aceite de volta apenas para o meu próprio conforto?"
10037115-56 = "Olá, Sensei!"
