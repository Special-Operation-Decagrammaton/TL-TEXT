[translation]
2001405-1 = "大は小を兼ねる？"
2001405-3 = "[ns] \"あれ。サキ、何か良いことでもあった？\""
2001405-4 = "ああ、先生。"
2001405-5 = "ああ、ちょっとな……これを見てくれ。"
2001405-6 = "今朝、近所のフリーマーケットで珍しいものを見つけたんだ。"
2001405-7 = "見て驚くなよ……"
2001405-8 = "「37mmシャベル迫撃砲」だ！"
2001405-9 = "[s] \"……何それ？\""
2001405-10 = "なるほど、先生は初めて見るものかもしれないな。"
2001405-11 = "この迫撃砲は昔、とあるレッドウィンター連邦学園出身の物好きが作ったもので、シャベルとしても使える迫撃砲なんだ！"
2001405-12 = "もう生産記録もほとんど残ってない珍しいものだし、知らなくてもおかしくはない。"
2001405-13 = "普段はこの砲身を取っ手みたいに握って、シャベルとして使って……敵が現れたらこう構えて、迫撃砲として使うことができる。"
2001405-14 = "シャベルにも迫撃砲にもなるなんて、凄いと思わないか？"
2001405-15 = "これ一つで色んな事態に対応できる、まさに夢のような発明品！"
2001405-16 = "という感じで、素晴らしいものなのに……どうして生産終了になったんだか。全くもって理解できない。"
2001405-17 = "[s] \"思ったより使い道が無かったから……とか？\""
2001405-18 = "む、それは聞き捨てならないな。"
2001405-19 = "シャベルに迫撃砲だぞ、機能は多ければ多い方が良い！一度でも塹壕を作ったことがあれば、誰だって共感してくれるはず！"
2001405-20 = "そういった経験も無いお偉いさん方のせいで、生産終了に追い込まれたんだろうな……。"
2001405-21 = "よし、決めた。私が実際に上手く使うことで、この装備の有用性をあらためて証明してやる！"
2001405-22 = "[s] \"ならまずは、錆を落とした方が良さそうだね。\""
2001405-23 = "たしかに……よく見るとすごいさび付いてるな。まぁ、倉庫にずっと放置されてたらしいから仕方ない。"
2001405-24 = "まあ、これくらいなら私の方で手入れできる。まずは分解して、掃除して、油を塗って……"
2001405-25 = "ちゃんと整備すれば、新品同然になるはずだ！"
2001405-26 = "よし、じゃあ迫撃砲の手入れを開始する！手伝ってくれ、先生！"
2001405-27 = "[s] \"うん、初めてだけど頑張るね。\""
2001405-30 = "― んっ、[wa:700]くぅっ……！"
2001405-33 = "― ……ちっ。"
2001405-35 = "― 中が詰まってるのか、[wa:1350]全然抜けない。"
2001405-38 = "[wa:500]― もっと、[wa:600]滑りを良くしないと……。"
2001405-40 = "[wa:100]― 先生、[wa:1100]そこにある潤滑油を[wa:1450]こっちの方にくれるか？"
2001405-43 = "[ns] 潤滑油を手渡す。"
2001405-44 = "[wa:200]― おっ、[wa:800]これならいけるんじゃ……？"
2001405-47 = "[wa:500]― あぁ……[wa:1500]こうして錆をはがしてる瞬間は、"
2001405-49 = "[wa:100]― 本当に[wa:800]気持ち良い……"
2001405-52 = "[wa:200]― ……何だか手つきが気になって、[wa:1950]ちょっと[wa:450]直視できない？"
2001405-55 = "[wa:150]― っ、[wa:300]はぁぁっ！？"
2001405-58 = "― これは[wa:200]神聖な[wa:600]手入れの作業だぞ！"
2001405-60 = "[wa:50]― 何言ってんだ[wa:500]バカ！？"
2001405-63 = "終わった！！"
2001405-64 = "見てくれ。このきらめく砲身、そしてシャベルの刃……美しい……。"
2001405-65 = "やはりクラシカルな武器には、それならではの魅力があるな。"
2001405-66 = "さて。綺麗になったところだし、一度射撃テストでもしてみるか。"
2001405-67 = "照準良し、装填完了……"
2001405-68 = "発射！"
2001405-72 = "……。"
2001405-73 = "……は？まさか、不発……？"
2001405-74 = "そ、そんなはずは……"
2001405-75 = "もう一度……！"
2001405-80 = "ど、どうしてこんなことに……？威力も弱いし……。"
2001405-81 = "どうしてだ、37mm榴弾がダメなのか……？こんな威力じゃトーチカどころか、鉄帽も貫けない……。"
2001405-82 = "だ、大丈夫だ。威力はちょっとアレだけど……この迫撃砲には、まだ「シャベルとしても使える」っていうメリットが……！"
2001405-83 = "例えばほら、ここの土をこんなに軽々と……"
2001405-88 = "軽々と……"
2001405-93 = "……ああもう、砲身が邪魔！しかも重い！"
2001405-94 = "こんなので塹壕を掘るくらいなら、いっそ素手でやった方が速いだろ！？"
2001405-95 = "[s] \"やっぱり使われなくなった武器には、それなりの理由があるんだね。\""
2001405-96 = "くうっ……でもせっかく手に入れた、珍しい装備なのに……。"
2001405-97 = "きっと、きっと何か、使い道が……！"
2001405-99 = "（その後サキはしばらくの間、シャベル迫撃砲を持ち歩いて使い道を探していたものの……）"
2001405-100 = "（結局、無理に使うことは諦めたのか、近くの物置でひっそりと埃をかぶることになった）"
