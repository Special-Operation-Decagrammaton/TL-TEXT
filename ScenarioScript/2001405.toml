[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
2001405-1 = "Quem Pode Mais, Pode o Menos?" 
2001405-3 = "[ns] \"Opa. Saki, aconteceu alguma coisa boa?\"" 
2001405-4 = "Ah, Sensei." 
2001405-5 = "Aah, um pouco sim... Dá uma olhada nisso aqui." 
2001405-6 = "Hoje de manhã, eu achei um negócio raríssimo no mercado de pulgas perto daqui." 
2001405-7 = "Veja e chore de inveja..." 
2001405-8 = "Um 'Morteiro-Pá de 37mm'!" 
2001405-9 = "[s] \"......O que é isso?\"" 
2001405-10 = "Entendo, acho que deve ser a sua primeira vez vendo algo do tipo, Sensei." 
2001405-11 = "Esse morteiro foi criado antigamente por uns malucos apaixonados por armas da Academia Red Winter,\ne é um morteiro que também serve como uma pá!" 
2001405-12 = "É um equipamento tão raro que quase não sobrou nenhum registro de produção, então não é surpresa que você não conheça." 
2001405-13 = "Normalmente você segura o cano do morteiro como se fosse o cabo e usa como pá... mas quando o inimigo aparece, você monta assim e usa como morteiro." 
2001405-14 = "Servir tanto como uma pá quanto como um morteiro,\nnão acha que é uma ideia incrível?" 
2001405-15 = "Um equipamento capaz de lidar com inúmeras situações diferentes de uma só vez,\né simplesmente uma invenção dos sonhos!" 
2001405-16 = "É uma arma fantástica...\nNão consigo entender por que pararam de produzi-la. Não faz o menor sentido." 
2001405-17 = "[s] \"Talvez não tivesse tantas utilidades na prática quanto imaginavam...?\"" 
2001405-18 = "Hm, eu não posso deixar você dizer uma heresia dessas." 
2001405-19 = "É uma pá e um morteiro,\nquanto mais funções tiver, melhor! Qualquer um que já tenha cavado uma trincheira na vida concordaria na hora!" 
2001405-20 = "Com certeza pararam a produção por causa das decisões estúpidas daqueles engravatados arrogantes que nunca pisaram no campo de batalha..." 
2001405-21 = "Certo, está decidido. Vou mostrar e provar a real utilidade deste equipamento utilizando ele da forma certa!" 
2001405-22 = "[s] \"Nesse caso, acho melhor tirar todo esse ferrugem primeiro.\"" 
2001405-23 = "Tem razão... olhando de perto, tá bem enferrujado.\nBem, parece que ficou mofando num armazém por anos a fio, então não tem como evitar." 
2001405-24 = "Mas, até aí eu mesma posso limpar. Primeiro a gente desmonta as peças, tira a sujeira, lubrifica com óleo..." 
2001405-25 = "Se fizermos a manutenção direitinho, vai ficar novinho em folha!" 
2001405-26 = "Beleza, vou começar a manutenção do morteiro! Dá uma força aí, Sensei!" 
2001405-27 = "[s] \"Certo, vai ser a minha primeira vez, mas vou dar o meu melhor.\"" 
2001405-30 = "― Nnnh, [wa:700]kuuh...!" 
2001405-33 = "― ......Tch." 
2001405-35 = "― Tá entupido por dentro? [wa:1350]Não quer sair de jeito nenhum." 
2001405-38 = "[wa:500]― Preciso deixar... [wa:600]mais escorregadio..." 
2001405-40 = "[wa:100]― Sensei, [wa:1100]pode me passar o óleo lubrificante que [wa:1450]está aí?" 
2001405-43 = "[ns] Passo o lubrificante para ela." 
2001405-44 = "[wa:200]― Opa, [wa:800]acho que agora vai, não...?" 
2001405-47 = "[wa:500]― Aah... [wa:1500]o instante em que arrancamos toda a sujeira e a ferrugem assim," 
2001405-49 = "[wa:100]― É uma sensação muito... [wa:800]muito gostosa..." 
2001405-52 = "[wa:200]― ......Por algum motivo o movimento das minhas mãos tá te distraindo [wa:1950]e você não consegue [wa:450]olhar direto pra mim?" 
2001405-55 = "[wa:150]― Tsk, [wa:300]hããã!?" 
2001405-58 = "― Esse é [wa:200]um trabalho de manutenção [wa:600]sagrado, sabia!?" 
2001405-60 = "[wa:50]― O que você tá pensando na sua cabeça suja, [wa:500]seu imbecil!?" 
2001405-63 = "Pronto, acabamos!!" 
2001405-64 = "Dá só uma olhada nisso. O brilho desse cano, a lâmina afiada da pá... é lindo demais..." 
2001405-65 = "Como eu pensava, as armas clássicas têm um charme único e irresistível." 
2001405-66 = "Pois bem. Agora que está limpinho, vamos fazer um teste de tiro." 
2001405-67 = "Mira ajustada, carregamento completo..." 
2001405-68 = "Fogo!" 
2001405-72 = "......" 
2001405-73 = "......Hã? Não me diga que, falhou...?" 
2001405-74 = "N-Não tem como..." 
2001405-75 = "Mais uma vez...!" 
2001405-80 = "C-Como isso foi acontecer...? A potência do tiro também tá muito fraca..." 
2001405-81 = "Por que os projéteis de 37mm não funcionam...? Com uma potência dessas, ele não penetraria nem um capacete de aço, muito menos um bunker..." 
2001405-82 = "M-Mas tá tudo bem. A potência dele pode ser meio broxa, mas... esse morteiro ainda tem a incrível vantagem de 'poder ser usado como pá'...!" 
2001405-83 = "Por exemplo, olha, eu consigo cavar a terra daqui tão facilmente assim..." 
2001405-88 = "Facilmente..." 
2001405-93 = "......Aargh, o cano do morteiro atrapalha demais! E pra piorar é pesado pra caramba!" 
2001405-94 = "Se for pra tentar cavar uma trincheira com uma porcaria dessas, seria mais rápido usar as próprias mãos, caralho!?" 
2001405-95 = "[s] \"Como eu imaginei, existem fortes motivos para as armas pararem de ser usadas...\"" 
2001405-96 = "Kuhhh... Mas é um equipamento tão raro e eu dei duro pra encontrar..." 
2001405-97 = "Com certeza... Com certeza deve ter alguma utilidade escondida...!" 
2001405-99 = "（Depois disso, a Saki andou pra cima e pra baixo carregando o morteiro-pá por um bom tempo tentando achar alguma utilidade para ele, mas...）" 
2001405-100 = "（No final das contas, acho que ela desistiu de se forçar a usá-lo, e ele acabou no depósito mais próximo para acumular poeira silenciosamente.）" 