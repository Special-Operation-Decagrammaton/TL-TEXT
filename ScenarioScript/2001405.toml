[translation]
2001405-1 = "O maior engloba o menor?"
2001405-3 = "[ns] \"Ora. Saki, aconteceu algo de bom?\""
2001405-4 = "Ah, Sensei."
2001405-5 = "Ah, é só que... dê uma olhada nisto."
2001405-6 = "Hoje de manhã, encontrei algo raro em um mercado de pulgas aqui perto."
2001405-7 = "Prepare-se para ficar impressionado..."
2001405-8 = "É um \"Morteiro-Pá de 37mm\"!"
2001405-9 = "[s] \"...O que é isso?\""
2001405-10 = "Entendo, talvez seja a primeira vez que você vê algo assim, Sensei."
2001405-11 = "Este morteiro foi criado antigamente por um excêntrico da Academia Federal de Red Winter, e é um morteiro que também pode ser usado como pá!"
2001405-12 = "Quase não restam registros de produção, é algo tão raro que não é de se estranhar que você não conheça."
2001405-13 = "Normalmente, você segura o cano como se fosse um cabo para usar como pá... e, se um inimigo aparecer, você o posiciona assim para usar como morteiro."
2001405-14 = "Não acha incrível servir tanto como pá quanto como morteiro?"
2001405-15 = "Com isso, é possível lidar com várias situações; é um invento digno de um sonho!"
2001405-16 = "Dito isso, é algo tão maravilhoso, mas... por que será que pararam de produzir? Não consigo entender de jeito nenhum."
2001405-17 = "[s] \"Talvez porque... não fosse tão útil quanto parecia?\""
2001405-18 = "Hum, não posso deixar passar essa."
2001405-19 = "É uma pá e um morteiro, quanto mais funções, melhor! Qualquer um que já tenha precisado cavar uma trincheira entenderia!"
2001405-20 = "Deve ter sido por causa dos figurões que nunca tiveram esse tipo de experiência que a produção foi encerrada..."
2001405-21 = "Certo, decidi. Vou provar a utilidade deste equipamento usando-o com maestria!"
2001405-22 = "[s] \"Então, primeiro, acho melhor tirar essa ferrugem.\""
2001405-23 = "Verdade... olhando bem, está bem enferrujado. Bem, dizem que ficou abandonado no depósito por muito tempo, então não tem jeito."
2001405-24 = "Bom, eu mesma posso cuidar disso. Primeiro, vou desmontar, limpar, passar óleo..."
2001405-25 = "Se eu fizer a manutenção direito, vai ficar como novo!"
2001405-26 = "Certo, então vamos começar a manutenção do morteiro! Me ajude, Sensei!"
2001405-27 = "[s] \"Sim, é a minha primeira vez, mas vou dar o meu melhor.\""
2001405-30 = "― Hnn, [wa:700] guhh...!"
2001405-33 = "― ...Tsc."
2001405-35 = "― Será que está entupido por dentro? [wa:1350] Não sai de jeito nenhum."
2001405-38 = "[wa:500]― Preciso... [wa:600] deixar mais lubrificado..."
2001405-40 = "[wa:100]― Sensei, [wa:1100] pode me passar o óleo lubrificante [wa:1450] que está aí?"
2001405-43 = "[ns] Entrega o óleo lubrificante."
2001405-44 = "[wa:200]― Oh, [wa:800] será que agora vai...?"
2001405-47 = "[wa:500]― Ah... [wa:1500] o momento em que estou removendo a ferrugem assim,"
2001405-49 = "[wa:100]― é realmente [wa:800] muito satisfatório..."
2001405-52 = "[wa:200]― ...Por que está olhando para as minhas mãos desse jeito? [wa:1950] Está com vergonha de [wa:450] encarar?"
2001405-55 = "[wa:150]― O quê, [wa:300] hããã!?"
2001405-58 = "― Este é um [wa:200] trabalho de manutenção [wa:600] sagrado!"
2001405-60 = "[wa:50]― Do que você está falando, [wa:500] idiota!?"
2001405-63 = "Terminei!!"
2001405-64 = "Dê uma olhada. Este cano brilhante, e a lâmina da pá... lindo..."
2001405-65 = "Como esperado, armas clássicas têm um charme único."
2001405-66 = "Bem, agora que está limpo, vamos fazer um teste de disparo."
2001405-67 = "Mira ajustada, carregamento concluído..."
2001405-68 = "Fogo!"
2001405-72 = "..."
2001405-73 = "...Hã? Não me diga que... falhou?"
2001405-74 = "I-isso não é possível..."
2001405-75 = "Mais uma vez...!"
2001405-80 = "P-por que isso aconteceu...? E a potência está tão fraca..."
2001405-81 = "Por que não funciona? A granada de 37mm não é boa o suficiente...? Com esse poder de fogo, não consigo atravessar nem um capacete, muito menos um bunker..."
2001405-82 = "T-tá tudo bem. O poder de fogo pode ser meio questionável, mas... esse morteiro ainda tem a vantagem de poder ser usado como uma pá...!"
2001405-83 = "Por exemplo, olha só, consigo cavar essa terra aqui com tanta facilidade..."
2001405-88 = "Com tanta facilidade..."
2001405-93 = "Ah, chega! O cano está atrapalhando! E ainda por cima é pesado!"
2001405-94 = "Se for para cavar uma trincheira com isso, é mais rápido fazer com as próprias mãos, não é!?"
2001405-95 = "[s] \"Realmente, armas que caíram em desuso têm seus motivos.\""
2001405-96 = "Droga... mas foi tão difícil conseguir esse equipamento raro..."
2001405-97 = "Com certeza, com certeza deve ter algum uso para isso...!"
2001405-99 = "(Depois disso, Saki passou um tempo carregando o morteiro-pá para tentar encontrar uma utilidade para ele...)"
2001405-100 = "(No fim, talvez por ter desistido de tentar usá-lo à força, ele acabou ficando esquecido e acumulando poeira em um depósito próximo.)"
