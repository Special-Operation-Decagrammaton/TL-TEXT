[translation]
10009120-1 = "Epílogo 5: Um mundo como este está errado"
10009120-2 = "……."
10009120-4 = "A razão pela qual me tornei uma delinquente... foi porque eu buscava a \"liberdade\"."
10009120-5 = "Viver a vida como bem entender, sem ser presa por regras."
10009120-6 = "Assumir a responsabilidade por si mesma — e descontar na sociedade as partes que não consegue resolver —"
10009120-7 = "A vida como delinquente não é ruim. #nAcima de tudo, tornou-se muito mais interessante do que naqueles tempos em que eu vivia entediada."
10009120-8 = "Às vezes sinto que é um pouco difícil de viver, mas uma vida onde tudo dá certo é entediante."
10009120-9 = "Por isso, eu gosto de ser uma delinquente. #nMas..."
10009120-12 = "Não tem como dar um jeito nesse comprimento de saia antiquado!?"
10009120-13 = "O que é isso, sério! É um estorvo e difícil de se mover!"
10009120-17 = "Não é nem um pouco fofa, e nem dá para esconder nada nela! #nEm dias de chuva, a barra sempre molha e fica grudando!"
10009120-21 = "E mesmo assim, dizem que se não for esse comprimento de saia, é uma violação do código de vestimenta ou algo do tipo..."
10009120-22 = "Uma delinquente não pode se vestir como quer!? #nNão importa o que eu vista, não deveria ser problema, certo!?"
10009120-24 = "Ufufu... Suas lamentações, eu ouvi com clareza."
10009120-26 = "Q-quem está aí!?"
10009120-29 = "Talvez, alguém que possa resolver seus problemas..."
10009120-30 = "Poderia me chamar de uma ajudante, talvez?"
10009120-35 = "Então... você quer que eu vista essa roupa e essa máscara, e cause um tumulto aqui?"
10009120-37 = "Exatamente."
10009120-38 = "Mas... por que usar o mesmo traje que você?"
10009120-39 = "Fufu, pensei que talvez você gostasse mais disso do que daquela saia..."
10009120-40 = "É apenas uma sugestão, não vou forçá-la."
10009120-41 = "……."
10009120-42 = "Sabe de uma coisa? Eu gostei."
10009120-43 = "Esse uniforme estilo quimono é fofo, e a máscara também... bem, não é ruim."
10009120-44 = "Além disso, causar tumultos é a marca registrada das delinquentes."
10009120-48 = "Eu aceito a proposta!"
10009120-56 = "Ufufu... Então, conto com você."
10009120-60 = "Hm, ela já foi embora."
10009120-65 = "Muito bem... então —"
10009120-72 = "Vamos causar um pouco de confusão!"
