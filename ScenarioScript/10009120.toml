[translation]
10009120-1 = "後日談その5;こんな世界は間違っている"
10009120-2 = "……。"
10009120-4 = "私がスケバンになった理由……それは、「自由」を求めたからだ。"
10009120-5 = "ルールに縛られず、気ままに人生を謳歌する。"
10009120-6 = "自分のことは自分で責任を取って――#n責任を取りきれない部分は社会にぶつけて――"
10009120-7 = "スケバンとしての生活は悪くない。#n何より退屈していたあの頃と比べて、何倍も面白くなった。"
10009120-8 = "多少は生きづらいと感じることもあったが、何もかもがうまくいく人生なんてつまらない。"
10009120-9 = "だから、私はスケバンが好きだ。#nでも――"
10009120-12 = "この前時代的なスカート丈はなんとかならねえのかよ！？"
10009120-13 = "本当に何だよこれ！邪魔で動きづれえし！"
10009120-17 = "可愛くもなけりゃ、何か仕込めるわけでもねえ！#n雨の日なんていつも裾が濡れて張りつくし！"
10009120-21 = "なのに、このスカート丈じゃないと服装違反だとか、何とかよぉ……。"
10009120-22 = "スケバンは着飾っちゃいけねえのか！？#nどんな格好したって別にいいだろ！？"
10009120-24 = "うふふ……あなたの悩み声、しかと聞き届けました。"
10009120-26 = "だ、誰だ！？"
10009120-29 = "もしかしたら、あなたの悩みを解決できる……"
10009120-30 = "助け人、とでも申しましょうか？"
10009120-35 = "それで……この服と仮面を被って、ここで暴れろって？"
10009120-37 = "左様です。"
10009120-38 = "でも……なんで、あんたと同じ格好を？"
10009120-39 = "ふふっ、そちらのスカートよりはお気に召すかもしれないと思いまして……。"
10009120-40 = "あくまで提案ですので、無理強いは致しません。"
10009120-41 = "……。"
10009120-42 = "そうだな、気に入った。"
10009120-43 = "この着物風の制服も可愛いし、仮面も……まあ、悪くはない。"
10009120-44 = "それに暴れるのはスケバンの専売特許だしな。"
10009120-48 = "その提案、乗った！"
10009120-56 = "うふふっ……では、お願いしますね。"
10009120-60 = "ん、もう行っちまったのか。"
10009120-65 = "さてと……それじゃあ――"
10009120-72 = "ちょっくら、ひと暴れといきますか！"
