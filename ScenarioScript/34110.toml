[translation]
34110-1 = "Episódio 11; A Perseguida"
34110-2 = "Mika... Misono..."
34110-3 = "Acho que é a entrada da vilã☆! ......Ainda se lembram de mim?"
34110-4 = "Não parece que estão felizes em me ver... O que foi?"
34110-5 = "Por que essa cara de quem viu uma bruxa?"
34110-6 = "......Ouvi dizer que você estava em uma gaiola."
34110-7 = "Eu saí☆#n......Eu queria tanto, mas tanto ver vocês logo."
34110-8 = "Afinal, sabe... Acho que ainda temos algumas coisas para conversar, não é?"
34110-13 = "......"
34110-14 = "......Onde está o Sensei?"
34110-15 = "E-Ele está vindo logo atrás... Provavelmente chegará em instantes..."
34110-17 = "Eu andei com vocês por um bom tempo, sabem. Eu saquei na hora que viriam para cá."
34110-19 = "......Até a passagem se fechar?"
34110-20 = "Restam cerca de 28 minutos... Não me diga que pretendem lutar? Entrar em combate com aquela mulher agora é pura imprudência."
34110-21 = "S-Será que é imprudência mesmo...?"
34110-22 = "......"
34110-23 = "Nossa estamina já está no limite só de fugir da Arius com a Princesa.#nSem liderança, não estamos em condições de lutar direito."
34110-24 = "Até agora há pouco, conseguimos nos virar graças ao comando do Sensei, mas..."
34110-25 = "A Mika Misono... Ela possui uma força de combate anormal, de longe a maior entre as integrantes da Tea Party. Para piorar, uma situação caótica como essa é o campo de batalha mais vantajoso para ela."
34110-27 = "Ahaha☆ Por acaso me subestimaram achando que sou uma mulher estúpida? Entendo.#nMas, sabe, eu consigo pelo menos decifrar os códigos de vocês."
34110-28 = "Ainda lembro dos pontos de encontro, das bases e tudo mais.#nApesar das aparências, eu fui a responsável por iniciar aquele golpe de estado, lembram!"
34110-29 = "Ahaha. É provável que me achassem uma idiota.#n......Fui fácil de usar? Bem, isso eu não posso negar."
34110-32 = "E se recuarmos e tentarmos de novo?"
34110-33 = "Impossível, não temos tempo. A passagem vai se fechar em breve."
34110-34 = "E se ganharmos tempo até o Sensei chegar?"
34110-35 = "Isso é..."
34110-37 = "Ei, ei, vocês estão me ouvindo? Vão me ignorar?#nIgnorar os outros é muita maldade, não acham? E olha que nós chegamos até a armar um golpe juntas."
34110-38 = "Isso não seria... me deixar de fora da brincadeira?"
34110-48 = "Hiii! E-Ela está vindo para cá!?"
34110-50 = "Dispersem! Não a enfrentem de frente!"
34110-61 = "[ns1] (Não consigo entrar em contato com o Esquadrão, que deveria ter entrado primeiro para informar a situação)\n[ns2] (Aquele som de tiros agora há pouco...)"
34110-67 = "[ns] (Preciso correr atrás delas)"
34110-76 = "U-Ugh... Ela é rápida demais..."
34110-83 = "Ugh..."
34110-88 = "Ei? Ei, ei, Saori? Vai acabar assim mesmo?"
34110-89 = "Até uma boneca de enfeite lutaria melhor do que você agora, não acha?#nO 'Esquadrão' não é só isso, né. Ei, o que foi que aconteceu?"
34110-94 = "Ugh..."
34110-95 = "Ué, agora que parei para notar, falta uma, né? Onde está aquela garota calada da máscara?"
34110-97 = "......!!"
34110-99 = "Ahhh... Ficaram sem balas?#nVamos, atirem mais! Eu estou aqui, super desprotegida, vamos lá!"
34110-103 = "G-Gah..."
34110-104 = "Misaki...!"
34110-105 = "Nossa... Então as companheiras de vocês também são importantes?#nEu achei que estivessem juntas apenas pela missão."
34110-106 = "Todo mundo tem alguém importante, né. Sim, sim, eu entendo, porque eu também tinha.#n――Estou falando da Seia-chan, a garota que vocês tentaram matar."
34110-107 = "Sabiam? A Seia-chan é um gênio em irritar os outros.#nEu já perdi a conta de quantas vezes deu vontade de dar um soco nela!"
34110-108 = "Mas... mesmo achando ela chata no dia a dia, quando ela se machuca, eu fico preocupada.#nFico ansiosa, pensando se ela está bem."
34110-109 = "Quando ouvi que a Seia-chan tinha morrido, foi tão doloroso.#n......Estranho, né. Eu ficava irritada só de conversar com ela, mas não fiquei nem um pouco feliz com isso."
34110-110 = "Claro que eu odiava a Seia-chan! Ela só falava coisas que eu não entendia.#nMas ela era alguém importante para mim.#n――Eu não queria que ela morresse. Eu não queria me tornar uma assassina."
34110-111 = "Mas, agora... Tudo, absolutamente tudo foi por água abaixo..."
34110-122 = "Guh―――!!"
34110-124 = "Misaki!!"
34110-126 = "Sabe... Eu só disse para dar um 'susto' nela, lembram?#nQuando foi que eu mandei destruírem o halo dela?"
34110-127 = "Bem, embora eu mesma tenha agido por conta própria e estragado tudo, parecer que estou me fazendo de vítima a essa altura é meio patético..."
34110-128 = "Mas..."
34110-129 = "Minhas... coisas preciosas... tudo, tu-di-nho desapareceu, sabia?"
34110-130 = "A academia... as minhas amigas... os meus tesouros... o lugar para onde voltar... e até mesmo a minha promessa com o Sensei..."
34110-131 = "Eu acreditava que, quando o amanhã chegasse, tudo pudesse voltar a ser como antes...#nMas coisas assim só existem em contos de fadas... ahaha... parece que meu destino já está selado."
34110-132 = "Por isso, sabe... Vocês do 'Esquadrão'... Especialmente você, Saori.#nVocês também precisam sentir a mesma dor que eu."
34110-133 = "Percam o mesmo tanto que eu perdi. Senão――seria injusto, não acham?"
34110-138 = "......!!"
34110-146 = "[ns] \"Espera aí!!\""
34110-151 = "S-S-Sensei...!?"
34110-152 = "Sensei..."
34110-153 = "[ns] \"Mika... o que diabos você está fazendo aqui?\""
34110-154 = "E-Eu... bem... hum..."
34110-155 = "Esquece isso, por que você...? "
34110-156 = "E-Ei... Sensei!? Por que o Sensei está com o Esquadrão...?"
34110-157 = "N-Não era pra ser assim..."
34110-158 = "Ei... por que as coisas acabaram assim...?#nDe todas as formas, que você me visse logo desse jeito... por quê..."
34110-164 = "Por aqui!"
34110-165 = "A Mika Misono também está aqui! Fogo!!"
34110-175 = "[ns] \"Mika...!\""
34110-176 = "*Cof*... Sensei, não temos tempo... Precisamos entrar logo."
34110-177 = "[s3] \"De qualquer forma, volte para a Trinity, Mika! Depois eu te explico tudo!\"\n[s4] \"Fique me esperando na Trinity! Eu prometo que vou voltar!\""
34110-178 = "Ali estão! É o 'Esquadrão'!"
34110-179 = "Ali estão! É o 'Esquadrão'!"
34110-183 = "P-Precisamos nos apressar! A passagem vai se fechar logo!"
34110-184 = "[s] Entra nas catacumbas com o Esquadrão."
34110-185 = "Corram!"
34110-203 = "Haa, haa... Q-Quase..."
34110-204 = "......Ainda temos um tempinho até a passagem fechar completamente. Precisamos correr antes que as perseguidoras cheguem."
34110-205 = "Vamos nos mover. Sensei, tome cuidado a partir daqui, os caminhos são complexos."
34110-206 = "E-E o sinal também não pega aqui... Se nos perdermos, é o nosso fim..."
34110-207 = "Logo à frente é o distrito autônomo de Arius. Vamos."
34110-212 = "[ns] (Mika...)"
34110-214 = "[ns5] (Não me diga que ela fugiu da prisão para se vingar do Esquadrão?)\n[ns6] (O que diabos aconteceu na Trinity...?)"
34110-218 = "Elas fugiram para as catacumbas! Devemos persegui-las?"
34110-219 = "Ainda temos tempo, vamos atrás delas!"
34110-225 = "Ah, fala sério, isso dói!"
34110-227 = "Mika Misono...!?"
34110-233 = "Hum, reforços?"
34110-234 = "Mika Misono... Houve um tempo em que você forneceu apoio ao nosso distrito autônomo.#nLevando isso em consideração, se você sumir daqui agora mesmo, não faremos nada contra você."
34110-235 = "O que foi? Estão achando que conseguem lidar comigo só com essa quantidade de gente? Tem miolos nessa cabeça?"
34110-236 = "Engraçado! Acham que podem ganhar só porque eu estou sozinha?#nCom esse nível de inteligência, não deve ser difícil viver o dia a dia de vocês?"
34110-237 = "Para onde o 'Esquadrão' foi? Ei, por acaso estão tentando ganhar tempo?"
34110-238 = "Não... Quem nós estamos caçando é o 'Esquadrão'."
34110-239 = "......Hã?"
34110-241 = "O 'Esquadrão' traiu a Arius e fugiu. Nossa missão é eliminá-las."
34110-242 = "Espera aí... Do que você está falando? Traíram? Fugiram?"
34110-247 = "......"
34110-248 = "Ahaha☆ Entendi... Que engraçado, vocês foram abandonadas pelos próprios aliados?"
34110-249 = "......Saori, então esse é o seu fim."
34110-250 = "......Entendi. Os cães de caça que falharam na caçada não têm mais utilidade, é isso."
34110-251 = "O Sensei..."
34110-252 = "Está se sacrificando de novo por crianças que estão em perigo."
34110-253 = "Sinceramente, ele não tem jeito mesmo..."
34110-254 = "......Sem salvação."
34110-255 = "Saia da frente! Se sair agora, fecharemos os olhos para isso."
34110-256 = "Um relatório! O Sensei da 'Schale' está acompanhando o Esquadrão!"
34110-257 = "O-O que disse!? Relate isso a ela imediatamente..."
34110-266 = "Ei, ei, não ouviram o que eu disse? O Esquadrão é MEU.#nEu não vou entregá-las para ninguém."
34110-267 = "――Então, poderiam desaparecer daqui?"
34110-272 = "A-Atirem!!"
34110-289 = "Próximo Episódio; Distrito Autônomo de Arius"