[translation]
34110-1 = "Episódio 11; A Perseguidora"
34110-2 = "Misono Mika..."
34110-3 = "A vilã chegou☆ É assim que se diz, né! ...Ainda se lembram de mim, não é?"
34110-4 = "Não parecem muito felizes em me ver... o que houve?"
34110-5 = "Não precisam ficar com essa cara, como se tivessem visto uma bruxa."
34110-6 = "...Ouvi dizer que você estava na cela."
34110-7 = "Eu saí☆#n... É que eu queria muito ver vocês logo."
34110-8 = "Porque, sabe... acho que ainda temos algumas coisas para conversar."
34110-13 = "..."
34110-14 = "...E o Sensei?"
34110-15 = "E-ele está vindo logo atrás... acho que deve chegar em breve..."
34110-17 = "Eu também passei um bom tempo agindo com vocês, então sabia exatamente para onde viriam."
34110-19 = "...Até o corredor fechar?"
34110-20 = "Faltam cerca de 28 minutos... Vocês pretendem lutar? Acho imprudente enfrentar aquela mulher agora."
34110-21 = "I-imprudente, será...?"
34110-22 = "..."
34110-23 = "Nossa energia já estava no limite depois de fugir de Arius com a Princesa.#nSem o comando, não estamos em condições de lutar direito."
34110-24 = "Até agora pouco, conseguimos lutar graças ao comando do Sensei, mas..."
34110-25 = "Misono Mika... Para alguém do Tea Party, ela possui um poder de combate anormal, algo que supera todos os outros. Além disso, essa situação de confusão é o campo de batalha mais favorável para ela."
34110-27 = "Ahaha☆ Vocês me subestimaram achando que eu era uma mulher estúpida? É, faz sentido.#nMas eu entendo os códigos de vocês, pelo menos."
34110-28 = "Ainda me lembro dos locais de encontro e das bases.#nMesmo que não pareça, eu fui a responsável pelo golpe de estado, afinal!"
34110-29 = "Ahaha. Acho que me viam como uma idiota.#n...Fui fácil de usar? Bem, não vou negar isso."
34110-32 = "E se recuarmos e tentarmos de novo?"
34110-33 = "Impossível, não temos tempo. O corredor vai fechar em breve."
34110-34 = "E se ganharmos tempo até o Sensei chegar?"
34110-35 = "Isso é..."
34110-37 = "Ei, ei, vocês estão me ouvindo? Ignorando?#nIgnorar é muita maldade, não acham? Mesmo sendo parceiros de golpe de estado."
34110-38 = "Isso não é... exclusão?"
34110-48 = "Hii! E-ela veio para cá!?"
34110-50 = "Dispersem! Não recebam o ataque de frente!"
34110-61 = "[ns1] (Não consigo contato com o esquadrão que deveria ter entrado antes para informar a situação)\n[ns2] (Aquele disparo de agora foi...)"
34110-67 = "[ns] (Preciso correr para alcançá-los)"
34110-76 = "U-ugh... ela é rápida demais..."
34110-83 = "Droga..."
34110-88 = "Ei? Ei, ei, Saori? É realmente o fim?"
34110-89 = "Até uma boneca decorativa lutaria melhor que você agora, não acha?#nO \"Esquadrão\" não é só isso, né? Ei, o que houve?"
34110-94 = "Droga..."
34110-95 = "Ah, falando nisso, falta uma, né? Aquela garota silenciosa de máscara?"
34110-97 = "...!!"
34110-99 = "Ah, puxa... já acabaram as balas?#nVamos, atirem mais! Estou aqui parada, totalmente indefesa, vamos lá!"
34110-103 = "G-gh..."
34110-104 = "Misaki...!"
34110-105 = "Hee... então vocês também se importam com seus companheiros?#nEu achei que estivessem juntos apenas por causa da missão."
34110-106 = "Todo mundo tem alguém importante, né? Sim, sim, eu entendo porque eu também tinha.#n— Estou falando da Seia-chan, aquela que vocês tentaram matar."
34110-107 = "Sabiam? A Seia-chan é um gênio em irritar as pessoas.#nNão sei quantas vezes tive vontade de dar um soco nela!"
34110-108 = "Mas... mesmo achando que ela é uma chata no dia a dia, quando ela se machuca, eu fico preocupada.#nFico ansiosa, pensando se ela está bem."
34110-109 = "Quando ouvi que a Seia-chan tinha morrido, foi muito doloroso.#n...É estranho, né? Mesmo que só de conversar com ela eu já ficasse irritada, não fiquei nem um pouco feliz."
34110-110 = "Claro que eu não gostava da Seia-chan. Ela só falava coisas que ninguém entendia.#nMas, para mim, ela era uma pessoa importante.#n— Eu não queria que ela morresse. Eu não pretendia me tornar uma assassina."
34110-111 = "Mas agora... tudo, absolutamente tudo foi em vão..."
34110-122 = "Ghh---!!"
34110-124 = "Misaki!!"
34110-126 = "Eu disse... que queria que elas sentissem um pouco de dor, não foi?#nQuando foi que eu disse para quebrarem o halo delas?"
34110-127 = "Bem, eu mesma saí por aí causando confusão e estragando tudo, então é meio hipócrita da minha parte bancar a vítima agora, né?..."
34110-128 = "Mas..."
34110-129 = "As minhas... coisas preciosas... desapareceram todas, sabe?"
34110-130 = "A escola... as amigas... os tesouros... o lugar para onde voltar... até a promessa que fiz ao Sensei..."
34110-131 = "Eu acreditei que, quando amanhecesse, tudo voltaria ao normal...#nMas isso só acontece em histórias... Ahaha... parece que o destino já está selado."
34110-132 = "Então... vocês do \"Squad\"... especialmente a Saori.#nVocês também precisam sentir a mesma dor que eu."
34110-133 = "Perdam tanto quanto eu perdi. Se não for assim... não seria injusto?"
34110-138 = "...!!"
34110-146 = "[ns] \"Espere um pouco!!\""
34110-151 = "Se, se, Sensei...!?"
34110-152 = "Sensei..."
34110-153 = "[ns] \"Mika... o que você está fazendo aqui?\""
34110-154 = "Eu, eu estou... bem... é que..."
34110-155 = "E mais importante, por que você...?"
34110-156 = "Ei, ei... Sensei!? Por que você está com o Squad...?"
34110-157 = "Is, isso não era para acontecer..."
34110-158 = "Ei... por que as coisas terminaram assim?...#nLogo agora, sendo vista desse jeito... por quê..."
34110-164 = "Ali!"
34110-165 = "A Mika Misono também está lá! Atirem!!"
34110-175 = "[ns] \"Mika...!\""
34110-176 = "Cof... Sensei, não temos tempo... precisamos entrar logo."
34110-177 = "[s3] \"Mika, volte para Trinity agora! Eu te explico depois!\"\n[s4] \"Espere em Trinity! Eu prometo que vou voltar!\""
34110-178 = "Ali! O \"Squad\" está ali!"
34110-179 = "Ali! O \"Squad\" está ali!"
34110-183 = "R, rápido! A passagem vai fechar em breve!"
34110-184 = "[s] Entrar nas catacumbas junto com o Squad."
34110-185 = "Corram!"
34110-203 = "Haah, haah... u, ufa..."
34110-204 = "...Ainda temos um pouco de tempo antes que a passagem feche completamente. Precisamos nos apressar antes que os perseguidores cheguem."
34110-205 = "Vamos nos mover. Sensei, o caminho daqui para frente é complicado, é melhor ter cuidado."
34110-206 = "A, aqui não tem sinal de rádio... se nos perdermos, estamos acabados..."
34110-207 = "Ali na frente é o Distrito Autônomo de Arius. Vamos."
34110-212 = "[ns] (Mika...)"
34110-214 = "[ns5] (Será que ela fugiu da prisão para se vingar do Squad?)\n[ns6] (O que diabos aconteceu em Trinity...?)"
34110-218 = "Eles fugiram para as catacumbas! Vamos atrás deles?"
34110-219 = "Ainda temos tempo, vamos persegui-los!"
34110-225 = "Ai, isso dói!"
34110-227 = "Mika Misono...!?"
34110-233 = "Hum, reforços?"
34110-234 = "Mika Misono... você já apoiou nosso distrito por um tempo.#nLevando isso em consideração, se você desaparecer daqui agora, não vamos te atacar."
34110-235 = "O quê, o quê? Vocês acham que podem me enfrentar com esse número de pessoas? O cérebro de vocês está funcionando?"
34110-236 = "Que engraçado! Acham que podem ganhar só porque estou sozinha?#nCom esse nível de inteligência, a vida cotidiana de vocês deve ser bem difícil, né?"
34110-237 = "Para onde o \"Squad\" foi? Ei, será que vocês estão tentando ganhar tempo?"
34110-238 = "Não... nós estamos atrás do \"Squad\"."
34110-239 = "...Hã?"
34110-241 = "O \"Squad\" traiu Arius e fugiu. Nossa missão é eliminá-las."
34110-242 = "Espere um pouco... do que você está falando? Traição? Fugiram?"
34110-247 = "..."
34110-248 = "Ahaha☆ É mesmo... Que interessante, você foi abandonada pelos seus aliados?"
34110-249 = "……Saori, este é o seu fim."
34110-250 = "……Entendo. Então, um cão de caça que falha na caçada é descartável."
34110-251 = "Sensei está……."
34110-252 = "Sacrificando-se novamente por uma criança em perigo, não é?"
34110-253 = "Sério, não dá para acreditar……."
34110-254 = "……Não tem salvação."
34110-255 = "Saia da frente! Se sair agora, eu deixo passar."
34110-256 = "Relatório! Recebemos a informação de que o Sensei do 'Schale' está acompanhando o esquadrão!"
34110-257 = "O-o quê!? Rápido, informe ela imediatamente……."
34110-266 = "Ei, ei, você não estava me ouvindo? O esquadrão é meu. #nNão vou entregá-lo a ninguém."
34110-267 = "――Então, por que você não desaparece?"
34110-272 = "A-atirem!!"
34110-289 = "Próximo episódio: Distrito Autônomo de Arius"
