[translation]
34110-1 = "Episódio 11;A Perseguidora"
34110-2 = "Mika…… Misono……."
34110-3 = "Entrada da vilã☆ é mais ou menos isso! ……Então vocês ainda lembravam de mim?"
34110-4 = "Não parece uma cara de \"que bom te ver\"…… que foi?"
34110-5 = "Essa cara, como se tivessem visto uma bruxa."
34110-6 = "……Ouvi dizer que você estava na jaula."
34110-7 = "Saí☆#n……É que eu tava com pressa de ver vocês."
34110-8 = "Porque, ó…… achei que a gente ainda tinha um assunto pra conversar."
34110-13 = "……."
34110-14 = "……E o Sensei?"
34110-15 = "V-vem vindo atrás…… deve chegar logo……."
34110-17 = "Eu também andei um bom tempo junto de vocês, né. Saquei na hora que vocês viriam pra cá."
34110-19 = "……Quanto falta pra passagem fechar?"
34110-20 = "Uns 28 minutos…… não me diga que você pretende lutar? Combater aquela mulher agora é insensato, eu acho."
34110-21 = "I-insensato, é……?"
34110-22 = "……."
34110-23 = "Já de saída, a nossa energia, de tanto fugir da Arius com a Hime, chegou ao fundo.#nSem comando, a gente não tá em estado de lutar direito."
34110-24 = "Até agora há pouco, com o comando do Sensei, dava pra lutar com esforço, mas……."
34110-25 = "A Mika Misono…… ela tem um poder de combate anormal pra alguém do Tea Party, fora de série mesmo. E, de quebra, esta situação de batalha caótica é o campo mais favorável pra ela."
34110-27 = "Ahaha☆ Vocês me subestimavam como uma mulher lerda, né? Pois é.#nMas o código de vocês, ao menos, eu entendo."
34110-28 = "Ponto de encontro, bases; eu ainda lembro.#nPor mais que não pareça, fui eu que armei o golpe, viu!"
34110-29 = "Ahaha. Vocês deviam me achar burra, né.#n……Fácil de usar, era? Bom, isso eu não nego."
34110-32 = "E se a gente recuar e tentar de novo depois?"
34110-33 = "Impossível; não há tempo. A passagem logo se fecha."
34110-34 = "E ganhar tempo até o Sensei chegar?"
34110-35 = "Isso……"
34110-37 = "Ei, ei, vocês tão me ouvindo? Ignorando?#nIgnorar não é maldade? Sendo que a gente foi parceira de golpe e tudo."
34110-38 = "Isso não é…… me deixar de fora?"
34110-48 = "Hi! E-ela veio pra cá!?"
34110-50 = "Dispersem! Não recebam de frente!"
34110-61 = "[ns1] （Sem contato com o Squad, que devia ter entrado antes e reportado a situação lá de dentro）\n[ns2] （Os tiros de agora……）"
34110-67 = "[ns] （Preciso alcançá-las, rápido）"
34110-76 = "U-uu…… rápida demais……."
34110-83 = "Gh……"
34110-88 = "Ei? Ei, ei, Saori? É só isso mesmo?"
34110-89 = "Até um boneco de enfeite lutaria melhor que você agora, não acha?#nO \"Squad\" não é só isso, né. Ei, que foi?"
34110-94 = "Gh……."
34110-95 = "Ué, aliás, tá faltando uma, né? Aquela calada, de máscara?"
34110-97 = "……!!"
34110-99 = "Aah…… já acabou a munição?#nVamos, atira mais? Eu tô aqui, paradinha, tão desprotegida; anda!"
34110-103 = "G-uah……."
34110-104 = "Misaki……!"
34110-105 = "Hmm…… então vocês também prezam as companheiras?#nEu tinha certeza de que só ficavam juntas por causa das missões."
34110-106 = "Todo mundo tem alguém importante, né. Sim, sim, eu também tinha, então eu entendo.#n――A Seia, aquela que vocês tentaram matar."
34110-107 = "Sabia? A Seia é uma gênia em irritar os outros.#nNem sei contar quantas vezes quase saiu um soco!"
34110-108 = "Mas…… no dia a dia eu a acho insuportável, e, quando ela se machuca, eu me preocupo.#nBate aquela aflição de \"será que ela tá bem\"."
34110-109 = "Quando eu ouvi que a Seia tinha morrido, doeu muito.#n……Estranho, né. Só de conversar com ela eu já me irritava, e, mesmo assim, não senti alegria nenhuma."
34110-110 = "Claro que eu não gostava da Seia, viu? Ela só fala coisa sem pé nem cabeça.#nMas, pra mim, ela era alguém querido.#n――Eu não queria que ela morresse. Nem pretendia virar assassina."
34110-111 = "Mas, agora…… foi tudo, tuuudo por água abaixo……."
34110-122 = "Gh―――!!"
34110-124 = "Misaki!!"
34110-126 = "Eu falei algo tipo…… \"vão sentir só um pouquinho de dor\", né?#nQuando foi que eu mandei destruir a aureola?"
34110-127 = "Bom, eu também destruí tudo me descontrolando sozinha, e agora venho bancar a vítima? é o que parece, mas……."
34110-128 = "Mas……."
34110-129 = "as minhas coisas queridas…… sumiram tooodas, sabia?"
34110-130 = "A academia…… as amigas…… os tesouros……… o lugar pra voltar…… até a promessa com o Sensei……."
34110-131 = "Eu acreditava que, quando amanhecesse, tudo poderia voltar ao normal……#nIsso só existia nas histórias…… ahaha…… parece que o destino já tá decidido."
34110-132 = "Por isso…… o \"Squad\"…… principalmente você, Saori.#nVocês também precisam sentir a mesma dor que eu."
34110-133 = "Na medida do que eu perdi, vocês também percam. Senão――é injusto, não é?"
34110-138 = "……!!"
34110-146 = "[ns] \"Espera aí!!\""
34110-151 = "S-s-Sensei……!?"
34110-152 = "Sensei……."
34110-153 = "[ns] \"Mika…… o que você tá fazendo aqui, afinal?\""
34110-154 = "E-eu…… é que…… deixa ver……."
34110-155 = "Mais do que isso, por quê……?"
34110-156 = "E-ei…… Sensei!? Por que você tá junto com o Squad……?"
34110-157 = "N-não era pra ser assim……."
34110-158 = "Ei…… por que dá nisto……?#nE, logo, nesta cena…… por quê……."
34110-164 = "É por aqui!"
34110-165 = "A Mika Misono também está aqui! Fogo!!"
34110-175 = "[ns] \"Mika……!\""
34110-176 = "Cof…… Sensei, não há tempo…… temos que entrar já."
34110-177 = "[s3] \"Mika, por ora, volta pra Trinity! Eu explico depois!\"\n[s4] \"Espera em Trinity! Eu volto, sem falta!\""
34110-178 = "É por ali! O \"Squad\" está ali!"
34110-179 = "É por ali! O \"Squad\" está ali!"
34110-183 = "T-temos que correr! A passagem já vai fechar!"
34110-184 = "[s] Entra nas catacumbas junto com o Squad."
34110-185 = "Corram!"
34110-203 = "Haa, haa…… s-salvos……."
34110-204 = "……Ainda há uma folga até a passagem se fechar por completo. Temos que correr antes que os perseguidores cheguem."
34110-205 = "Vamos nos mover. Sensei, daqui pra frente o caminho é complexo; melhor tomar cuidado."
34110-206 = "A-aqui nem sinal pega…… se a gente se perder, acabou……."
34110-207 = "Adiante fica o distrito autônomo de Arius. Vamos."
34110-212 = "[ns] （Mika……）"
34110-214 = "[ns5] （Não me diga que ela fugiu da prisão pra se vingar do Squad?）\n[ns6] （O que aconteceu em Trinity, afinal……?）"
34110-218 = "Elas fugiram pras catacumbas! Perseguimos?"
34110-219 = "Ainda resta tempo; atrás delas!"
34110-225 = "Ai, isso dói, oras!"
34110-227 = "Mika Misono……!?"
34110-233 = "Hmm, reforços?"
34110-234 = "Mika Misono…… você, por um tempo, apoiou o nosso distrito autônomo.#nEm consideração a isso, se sumir daqui agora mesmo, não encostaremos em você."
34110-235 = "Que, que é? Com esse punhadinho de gente, vocês acham que dão conta de mim? Tem cérebro aí dentro?"
34110-236 = "Que engraçado! Só porque eu tô sozinha, acham que ganham?#nDesse jeito, a vida de vocês não deve ser fácil, hein?"
34110-237 = "Cadê o \"Squad\"? Ei, não me digam que vocês tão ganhando tempo?"
34110-238 = "Não…… quem nós perseguimos é o \"Squad\"."
34110-239 = "……Hã?"
34110-241 = "O \"Squad\" traiu a Arius e fugiu. Dar cabo delas é a nossa missão."
34110-242 = "Peraí…… do que vocês tão falando? Traição? Fugiram?"
34110-247 = "……."
34110-248 = "Ahaha☆ Ah é…… que engraçado; foram descartadas pelos próprios aliados, é?"
34110-249 = "……Saori, então este é o seu fim."
34110-250 = "……Sei. O cão de caça que falhou na caçada não serve mais; é isso, né."
34110-251 = "E o Sensei………"
34110-252 = "de novo sacrificando o próprio corpo por alguém em apuros."
34110-253 = "Francamente, esse……."
34110-254 = "……não tem salvação."
34110-255 = "Saia da frente! Se for agora, fazemos vista grossa."
34110-256 = "Reporte! Dizem que o Sensei da \"Schale\" acompanha o Squad!"
34110-257 = "Q-o quê!? Reportem a ela imediatamente……."
34110-266 = "Ei, ei, vocês não ouviram o que eu disse? O Squad é meu.#nNão entrego a ninguém."
34110-267 = "――Então, dá pra sumirem?"
34110-272 = "F-fogo!!"
34110-289 = "Próximo Episódio;O Distrito Autônomo de Arius"
