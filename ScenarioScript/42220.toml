[translation]
42220-1 = "Episódio 22: Nós de Ontem e de Amanhã"
42220-9 = "<Aviso! Sistema de interceptação automática de intrusos neutralizado.>"
42220-10 = "<Os agentes de segurança do silo devem selar as comportas primárias, destruir documentos confidenciais e proceder com as medidas contra intrusos…>"
42220-16 = "(…Por que eu ainda estou aqui?)"
42220-17 = "(Eu só… cumpri as ordens cegamente, tentando ressuscitar a SRT…)"
42220-19 = "(……Então por que diabos estou aqui parada, segurando o detonador manual?)"
42220-29 = "<Repetindo o aviso. Condição Zeca acionada. Os agentes de segurança do silo devem selar as comportas primárias…>"
42220-34 = "……Isso mesmo. Não há necessidade de pensar demais."
42220-35 = "Exatamente como sempre fiz… focar apenas no que é essencial para o sucesso tático da missão, e descartar o resto."
42220-36 = "O objetivo primário desta operação é…"
42220-37 = "……Detonar essa ogiva termobárica."
42220-45 = "……Fizemos você esperar!"
42220-57 = "FOX4…?#nO que vocês estão fazendo aqui…"
42220-58 = "A gente teve que dar a volta pelos dutos de ventilação pra não trombar com as calouras, por isso demoramos um pouco."
42220-59 = "Pelo visto, nem durante um alarme de emergência a Área W fica trancada…"
42220-60 = "Aii, que dor… Aquela Saki sádica… meteu cinco tiros na minha barriga mesmo depois de eu já estar caída, que ódio!"
42220-61 = "Eu sei que a gente ensina a neutralizar o inimigo até ele parar de se mexer… mas não acha que foi um pouco de exagero?"
42220-63 = "Tratar inimigos abatidos com displicência e levar um contra-ataque letal nas costas é clássico em combate em corredores fechados."
42220-64 = "A Saki-chan só agiu exatamente de acordo com o manual tático de CQB. Não fique tão brava com ela."
42220-69 = "Por que…"
42220-70 = "Por que vocês não bateram em retirada?"
42220-71 = "Hã…"
42220-72 = "……Porque a nossa comandante está aqui?"
42220-73 = "Eu fui clara: se a linha de defesa rompesse, a ordem absoluta era evacuar para a superfície e――"
42220-75 = "……Yukino. Você pretendia assumir toda a culpa e detonar a ogiva aqui embaixo sozinha, não é?"
42220-76 = "――Mesmo sabendo perfeitamente que essa detonação ceifaria a sua vida."
42220-77 = "……"
42220-78 = "……Isso é informação inútil para a missão.#nVocês não precisam saber――"
42220-80 = "Nós precisamos sim!"
42220-84 = "Antes de ser a máquina letal chamada Comandante do Esquadrão FOX… a Yukino é a nossa melhor amiga, lembra?"
42220-85 = "Saber que nossa amiga está prestes a mergulhar no abismo sozinha para carregar as cinzas e a culpa do mundo nas costas… nós jamais viraríamos as costas pra isso."
42220-86 = "Esse discurso sentimental não condiz com veteranas da elite das Forças Especiais."
42220-87 = "O julgamento moral e a decisão de vida e morte não cabem aos subordinados, mas sim a quem detém a responsabilidade de comand――"
42220-89 = "Yukino."
42220-90 = "Toda essa missão e a nossa ideologia já estavam desmoronando há muito tempo."
42220-91 = "Nós sujamos as mãos e a alma com sangue demais em nome da 'Grande Causa' de reviver a SRT."
42220-92 = "Com as mãos tão manchadas e a ética corrompida, fica difícil olhar no espelho e pregar a 'Justiça Inabalável' que a gente jurou defender…"
42220-93 = "Mas nós definitivamente não queremos carregar o pecado infernal de sacrificar a vida de uma amiga… só para fugirmos confortavelmente das consequências das nossas escolhas sujas."
42220-94 = "E, mais importante… largar esse peso de chumbo e cinzas no colo das nossas calouras assustadas é uma opção ainda mais repulsiva."
42220-99 = "Vamos abraçar esse estigma de traidoras e limpar o asfalto nós mesmas… Deixem as crianças voltarem em paz."
42220-104 = "……Entendo."
42220-110 = "Então… tudo isso é…"
42220-114 = "Pela Glória e pelo Renascimento da Academia SRT!!"