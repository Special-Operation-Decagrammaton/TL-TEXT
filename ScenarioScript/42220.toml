[translation]
42220-1 = "Episódio 22: Nós, de ontem e de amanhã"
42220-9 = "<Aviso! O sistema de interceptação automática de intrusos foi desativado.>"
42220-10 = "<Os responsáveis pela segurança do silo devem fechar as anteparas principais, destruir os documentos confidenciais e, em seguida, lidar com os intrusos...>"
42220-16 = "(...Por que eu ainda estou aqui?)"
42220-17 = "(Eu só continuei cumprindo ordens... para reviver a Academia Especial SRT...)"
42220-19 = "(...Por que estou aqui, segurando o botão de autodestruição?)"
42220-29 = "<Aviso repetido. Iniciando protocolo Z. Os responsáveis pela segurança do silo devem fechar as anteparas principais...>"
42220-34 = "...É isso. Não preciso pensar muito."
42220-35 = "Como fiz até agora... só preciso manter o que é necessário para o sucesso da operação e descartar o resto."
42220-36 = "O objetivo desta operação é..."
42220-37 = "...detonar esta ogiva."
42220-45 = "...Desculpe a demora!"
42220-57 = "FOX4...?#nPor que você está aqui..."
42220-58 = "Tive que dar a volta pelos dutos para não encontrar as novatas, então me atrasei um pouco."
42220-59 = "Pelo visto, a área W não foi bloqueada nem em situação de emergência."
42220-60 = "Ai, ai... Saki, que horror! Eu já estava caída e ela ainda disparou cinco vezes na minha barriga!"
42220-61 = "Eu ensinei que deveriam neutralizar o alvo até que ele parasse de se mover, mas... não foi um pouco exagerado?"
42220-63 = "Lidar mal com um inimigo caído e acabar sofrendo um contra-ataque é algo comum em combates internos, sabe."
42220-64 = "A Saki-chan só seguiu o manual, então não fique tão brava com ela."
42220-69 = "Por que..."
42220-70 = "Por que não voltaram?"
42220-71 = "Hã..."
42220-72 = "...Porque a capitã está aqui?"
42220-73 = "Eu ordenei que fossem para a superfície assim que os inimigos rompessem a defesa, mas..."
42220-75 = "...Yukino. Você pretende ficar aqui e assumir a responsabilidade de detonar a ogiva, não é?"
42220-76 = "— Mesmo sabendo que pode perder a vida."
42220-77 = "..."
42220-78 = "...Essa informação é desnecessária para a operação.#nNão há necessidade de vocês..."
42220-80 = "Há, sim!"
42220-84 = "Antes de ser a capitã do Esquadrão FOX, a Yukino é... nossa melhor amiga, não é?"
42220-85 = "Uma melhor amiga está prestes a mergulhar no abismo para assumir a responsabilidade sozinha... e você acha que vamos simplesmente deixar?"
42220-86 = "Essa não é uma fala digna de uma veterana de forças especiais."
42220-87 = "Quem julga isso não é o membro individual, mas sim quem pode assumir a responsabilidade—"
42220-89 = "Yukino."
42220-90 = "Esta operação já estava fadada ao fracasso desde o início."
42220-91 = "Nós sujamos demais nossas mãos pelo grande objetivo de reviver a SRT."
42220-92 = "É difícil falar sobre a justiça da SRT com mãos tão sujas, mas..."
42220-93 = "Não quero carregar o pecado de ter sacrificado uma amiga para fugir da responsabilidade."
42220-94 = "E, claro, detesto ainda mais a ideia de empurrar essa responsabilidade para as novatas."
42220-99 = "Vamos carregar essa infâmia nós mesmas... e deixar que elas voltem para casa."
42220-104 = "...Entendo."
42220-110 = "Tudo isso..."
42220-114 = "Pela restauração da Academia Especial SRT!"
