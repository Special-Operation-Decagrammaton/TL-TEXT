[translation]
10027070-1 = "Episódio 7: Engrenagens"
10027070-2 = "Academia Federal Red Winter - Biblioteca"
10027070-5 = "Ela já foi?"
10027070-6 = "[s] \"Sim. A Takane já foi embora.\""
10027070-7 = "Entendo... é mesmo..."
10027070-13 = "[ns] \"Meru!?\""
10027070-14 = "Tô bem, tô bem. Só fiquei com sono e acabei cambaleando um pouco. #nÉ normal quando a tensão passa, não se preocupe."
10027070-15 = "Disse que ser mangaká é difícil? #nHehe... fico feliz em ouvir isso de você, Sensei."
10027070-16 = "Bom, vou tirar um cochilo agora... #nNão me incomode, a menos que seja o fim de Kivotos... por favor..."
10027070-21 = "（Meru desabou ali mesmo e caiu no sono novamente...）"
10027070-27 = "（Coloquei a Meru, que desmaiou, na cama e me sentei na cadeira da biblioteca por um tempo.）"
10027070-34 = "[ns] \"Um telefone...? Quem será...\""
10027070-37 = "[ns] \"Momiji!?\""
10027070-42 = "Academia Federal Red Winter - Trilha da Montanha"
10027070-44 = "O-olá, Sensei. Como tem passado?"
10027070-45 = "Sim. Eu estou... bem. Estou ótima."
10027070-46 = "..."
10027070-47 = "Bem, Sensei. Ultimamente, tenho tido um... problema. #nQueria pedir um conselho ao senhor..."
10027070-48 = "É que..."
10027070-49 = "..."
10027070-50 = "Sobre a Meru-senpai..."
10027070-51 = "[s] \"Sobre a briga com a Meru?\""
10027070-52 = "S-sim!? C-como o senhor sabia disso...!?"
10027070-53 = "Hã? O senhor já está... na biblioteca da \"Frente de Libertação do Conhecimento\" agora!? #nO-o que isso significa!?"
10027070-62 = "Então foi isso. #nA Meru-senpai..."
10027070-63 = "Bem, Sensei..."
10027070-64 = "Eu também... quero fazer as pazes com a Meru-senpai."
10027070-65 = "Claro, a Meru-senpai é egoísta, tem uma visão limitada, é barulhenta e arrogante, além de ser covarde em momentos estranhos, mas..."
10027070-66 = "No fundo, ela não é uma pessoa má..."
10027070-67 = "Sobre \"Luna\", eu só acabei sendo emocional demais... #nNo fim, entendo que aquele tipo de opinião possa existir."
10027070-71 = "A Meru-senpai é... uma escritora, afinal."
10027070-72 = "Provavelmente... acho que temos perspectivas diferentes sobre a obra."
10027070-73 = "Só que, como falaram mal da obra, eu perdi a cabeça... e acabei sendo um pouco dura com a Meru-senpai..."
10027070-74 = "Haha... além disso, a Meru-senpai não sabe pedir desculpas, então talvez seja melhor eu pedir primeiro."
10027070-78 = "[ns1] \"Sobre isso, Momiji.\"\n[ns2] \"A Meru está desenhando um doujinshi de spin-off do volume final de 'Luna' agora.\""
10027070-82 = "O quê!? O que isso significa?"
10027070-83 = "O que aconteceu enquanto eu estava longe da \"Frente de Libertação do Conhecimento\"...!?"
10027070-85 = "（Expliquei para a Momiji tudo o que aconteceu até agora...）"
10027070-94 = "..."
10027070-95 = "............"
10027070-96 = "...................."
10027070-97 = "[s] \"Tudo bem, Momiji...?\""
10027070-98 = "Eu não sei bem como reagir a esse tipo de situação..."
10027070-99 = "[s] \"Eu sinto que entendo esse sentimento...\""
10027070-100 = "A Meru-senpai fez algo assim... e o senhor viu tudo, não foi? #nO doujinshi já está quase pela metade e faltam apenas 2 dias para o prazo...?"
10027070-101 = "Isso é real, não é? #nEu não estou tendo um sonho estranho, estou?"
10027070-102 = "É um fato inegável? Como... por que a realidade é tão cruel e rigorosa conosco?"
10027070-103 = "Digo, a Meru-senpai também... ninguém pediu para ela chegar a esse ponto..."
10027070-104 = "Sinceramente, eu sempre penso nisso... quando ela decide algo, não para por nada, não importa o que digam..."
10027070-105 = "[s] \"Mas a Meru desenhou esse doujinshi por sua causa, Momiji.\""
10027070-106 = "……Sim."
10027070-107 = "Isso eu... entendo. Hehe, é uma sensação meio estranha."
10027070-108 = "Não sei sobre as outras coisas, mas... eu realmente adoraria ler 'Luna' da Mel-senpai um dia."
10027070-112 = "Isso é... verdade?"
10027070-113 = "！？"
10027070-114 = "[s] \"！？\""
10027070-119 = "……."
10027070-120 = "Me, Mel-senpai!?"
10027070-121 = "Não, é que... eu acabei acordando. #nAí vi que o Sensei saiu correndo da biblioteca de repente..."
10027070-122 = "E-então você ouviu toda a nossa conversa!?"
10027070-123 = "Toda não, mas... uma boa parte..."
10027070-125 = "Fueeeee..."
10027070-126 = "Uuu..."
10027070-131 = "[ns] \"Uuuuuuun...\""
10027070-132 = "Se, Sensei!? Pelo menos diga alguma coisa... não fique sem jeito junto comigo!"
10027070-133 = "É, isso mesmo, Sensei! Dê um jeito nesse clima!"
10027070-134 = "[s] \"Só porque sou adulto, não significa que consigo lidar com tudo...\""
10027070-136 = "Não é hora de fugir com generalidades assim!"
10027070-142 = "Então... Mel-senpai, eu..."
10027070-143 = "S-sim. É..."
10027070-144 = "……."
10027070-145 = "……."
10027070-146 = "[s] \"Que tal pensarem nisso depois de se encontrarem pessoalmente?\""
10027070-147 = "Sensei!?"
10027070-148 = "Sensei!?"
10027070-149 = "O... olhar no rosto e conversar é importante...?"
10027070-150 = "Ma-mas, tão de repente... sabe, a gente precisa de preparação mental e tudo mais!"
10027070-151 = "Pode ser verdade que nada avança se ficarmos hesitando, mas..."
10027070-152 = "……."
10027070-153 = "……."
10027070-154 = "Ei, Momiji..."
10027070-155 = "S-sim?"
10027070-159 = "Por enquanto... vamos nos encontrar e conversar?"
10027070-160 = "É, vamos... fazer isso?"
