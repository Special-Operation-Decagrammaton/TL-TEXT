[translation]
80000103-1 = "Por isso, na verdade"
80000103-2 = "（Recebi um contato de Nagisa e fui em direção a Trinity）"
80000103-3 = "（O local marcado, ao contrário do habitual, era em frente ao portão principal de Trinity）"
80000103-4 = "……Seja bem-vindo, Sensei. Eu estava à sua espera."
80000103-5 = "Fufu. Você está com uma expressão de surpresa. Mas, é compreensível."
80000103-6 = "Normalmente, eu não chamaria você a um horário como este."
80000103-7 = "Claro, existe um motivo para isso. #nEu poderia explicar primeiro, mas……"
80000103-8 = "Antes disso, poderia aceitar isto?"
80000103-13 = "[ns1] \"Não esperava que fosse ganhar algo da Nagisa.\"\n[ns2] \"……Obrigado, fico muito feliz.\""
80000103-16 = "Sinta-se à vontade para interpretar o chocolate que lhe dei como preferir. A única coisa que posso dizer é que... coloquei nele todo o meu sentimento de gratidão por tudo o que aconteceu até agora."
80000103-17 = "Você pode achar que é apenas um chocolate comum vindo de mim, mas……"
80000103-18 = "Por favor, entenda que também há um motivo para isso."
80000103-19 = "O fato de eu ter chamado você até aqui também tem relação com isso……"
80000103-20 = "Bem…… vou explicar passo a passo."
80000103-21 = "Na verdade, não é um motivo tão grandioso assim……"
80000103-22 = "É que…… eu evitei os olhares das pessoas para lhe entregar o chocolate porque……"
80000103-23 = "Como você deve imaginar, eu não queria que soubessem que Kirifuji Nagisa, do Tea Party, entregou chocolates ao Sensei do Schale."
80000103-24 = "[s3] \"Não queria que soubessem?\"\n[s4] \"Queria manter em segredo?\""
80000103-27 = "Não é que eu queira esconder a todo custo. Se fossem apenas boatos, não haveria problema."
80000103-28 = "Mas, considerando a posição em que estamos…… tudo se torna muito complicado."
80000103-29 = "Como representante de Trinity, presenteei o Sensei."
80000103-30 = "Como Tea Party, ostentei meu relacionamento e influência sobre o Sensei para outras escolas, servindo como uma forma de intimidação."
80000103-31 = "Além dessas questões políticas, certamente diriam que estamos tendo um relacionamento pessoal."
80000103-32 = "Isso, por si só…… não me incomoda. #nJá estou acostumada, e às vezes até usei isso a meu favor."
80000103-33 = "No entanto…… bem."
80000103-34 = "Eu realmente não quero ser mal interpretada, especialmente por você, Sensei."
80000103-35 = "É por isso que marquei este encontro em um horário em que não há ninguém por perto."
80000103-36 = "Neste horário, ninguém virá me procurar, e todos estão em suas salas de aula."
80000103-37 = "……Embora essa calma temporária não dure mais do que alguns minutos."
80000103-38 = "……Fufu."
80000103-39 = "Como eu disse antes, esse chocolate é genuinamente um gesto de gratidão pessoal da minha parte."
80000103-40 = "Não tenho a intenção de ostentar meu relacionamento com você para os outros, nem de fortalecer os laços entre Schale e Trinity."
80000103-41 = "……Se quiser esquecer este momento, não me importo."
80000103-42 = "Sensei……"
80000103-43 = "……Muito, muito obrigada por tudo."
80000103-47 = "Acho que está na hora de voltar. Peço desculpas por não poder acompanhá-lo, mesmo você tendo vindo até aqui, mas não nos resta muito tempo……"
80000103-48 = "Então, até mais……"
80000103-49 = "[s] \"…….\""
80000103-51 = "[ns] \"Nagisa……\""
80000103-52 = "……Sim?"
80000103-53 = "[s5] \"Vou fingir que encontrei apenas a 'Nagisa'.\"\n[s6] \"Sem qualquer relação com o Tea Party ou Trinity, entende?\""
80000103-56 = "……Fufu."
80000103-57 = "Sim, Sensei."
80000103-58 = "……Muito obrigada."
80000103-59 = "Eu já imaginava que você diria isso."
80000103-60 = "Mas, mesmo eu tendo tomado cuidado para não forçar você a dizer isso……"
80000103-62 = "No fim das contas, começo a detestar o fato de estar usando minha posição política."
