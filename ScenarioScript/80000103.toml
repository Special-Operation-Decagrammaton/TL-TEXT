[translation]
80000103-1 = "なので、むしろ"
80000103-2 = "（ナギサから連絡をもらい、トリニティに向かった）"
80000103-3 = "（呼び出された場所は、いつもとは異なりトリニティの正門前だった）"
80000103-4 = "……ようこそ、先生。お待ちしておりました。"
80000103-5 = "ふふ。意外、という表情をしていますね。ですが、それもそうでしょう。"
80000103-6 = "普段なら、こんな時間にお呼び立てすることはありませんから。"
80000103-7 = "もちろん、これには理由があります。#n先に説明しても良いのですが……"
80000103-8 = "それよりも、まずはこちらを受け取っていただけますか？"
80000103-13 = "[ns1] \"まさか、ナギサからもらえるとは思ってなかったよ。\"\n[ns2] \"……ありがとう、嬉しいよ。\""
80000103-16 = "私からのチョコレートを、どのように捉えていただいても構いません。ただ、私から言えるのは……これまでのこと、たくさんのことに対する感謝の気持ちを込めてあります、とだけ。"
80000103-17 = "私からの贈り物としては平凡なチョコレートだと思われるかもしれませんが……"
80000103-18 = "それにもまた、理由がありますのでご了承ください。"
80000103-19 = "先生をこのような所にお呼び立てしたのも、関係がありまして……"
80000103-20 = "そうですね……順を追って説明いたします。"
80000103-21 = "実はそんなに大した理由ではないのですが……"
80000103-22 = "その……人目を避けて、チョコレートを渡したのは……"
80000103-23 = "ご想像の通り、ティーパーティーの[ruby=きりふじ]桐藤[/ruby]ナギサがシャーレの先生にチョコレートを渡したという事実を周囲に知られたくなかったからです。"
80000103-24 = "[s3] \"知られたくない？\"\n[s4] \"秘密にしておきたかったんだ？\""
80000103-27 = "そこまで隠し通したいわけではありません。噂される程度でしたら、別に何も。"
80000103-28 = "ですが、私たちの置かれた立場を考慮すると……色々と面倒になりますから。"
80000103-29 = "トリニティの代表として、先生に贈り物をした。"
80000103-30 = "ティーパーティーとして、先生との関係性や影響力を他の学園に誇示し、牽制した。"
80000103-31 = "そのような政治的な話はもちろん、プライベートな関係を持とうとしたとも噂されるでしょう。"
80000103-32 = "それ自体……私としては構いません。#nもう慣れておりますし、時には利用してきましたから。"
80000103-33 = "しかし……そうですね。"
80000103-34 = "やはり先生にだけは、誤解されたくありませんので。"
80000103-35 = "だからこそ、こうして誰も居ない時間に約束を取り付けたのです。"
80000103-36 = "この時間なら誰も私を探しに来ませんし、皆さんは教室に居ますから。"
80000103-37 = "……この穏やかな猶予だって、あと数分も残されていませんが。"
80000103-38 = "……ふふ。"
80000103-39 = "先ほども申し上げましたが、そのチョコレートは本当に私からの個人的な感謝の気持ちです。"
80000103-40 = "周囲に対して、先生との関係性を誇示したいわけでも、シャーレとトリニティの関係性を強くしたいという意図もありません。"
80000103-41 = "……この場で忘れていただいても、構いません。"
80000103-42 = "先生……"
80000103-43 = "……いつも、本当に、ありがとうございます。"
80000103-47 = "そろそろ戻ろうと思います。来ていただいたのに、お見送りもできず申し訳ありませんが、あまり時間が残されていませんので……"
80000103-48 = "それでは、また……"
80000103-49 = "[s] \"……。\""
80000103-51 = "[ns] \"ナギサ……\""
80000103-52 = "……はい？"
80000103-53 = "[s5] \"「ナギサ」に会ったことにしておくね。\"\n[s6] \"ティーパーティーやトリニティとは関係なく、ね。\""
80000103-56 = "……ふふ。"
80000103-57 = "はい、先生。"
80000103-58 = "……ありがとう、ございます。"
80000103-59 = "そう言ってくださると、思っていました。"
80000103-60 = "ですが、私からは言わせないよう気をつけていたのに……"
80000103-62 = "結局、政治的な立場を利用している自分が、少し嫌になりそうです。"
