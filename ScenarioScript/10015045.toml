[translation]
10015045-4 = "Sala de Descanso da Veritas"
10015045-11 = "Ah... hum..."
10015045-12 = "Eu disse que ajudaria com o Grande Festival Esportivo o quanto fosse preciso, mas..."
10015045-13 = "Pedir para eu usar roupa de líder de torcida é algo que eu vou ter que recusar, viu?"
10015045-15 = "É um mal-entendido, Chi-chan."
10015045-16 = "Ninguém nos pediu para usar isso; estamos vestindo essas roupas por vontade própria."
10015045-17 = "Seria mais correto dizer que estamos usando para pagar pelo erro que cometemos!"
10015045-18 = "Ou seja, é como um \"castigo\"..."
10015045-23 = "...Sensei, você tem esse tipo de fetiche?"
10015045-24 = "[s] \"É um mal-entendido!\""
10015045-25 = "Fufu. Eu queria observar por mais um tempo, mas... não temos muito tempo."
10015045-26 = "É que..."
10015045-33 = "Tudo bem que criamos um robô original para ajudar na torcida, mas..."
10015045-34 = "É verdade que o robô começou a agir de forma descontrolada assim que vocês conectaram a comunicação sem fio de curto alcance?"
10015045-35 = "Ah, exatamente. #nA Noa verificou os diagramas e confirmou que não há problemas no projeto."
10015045-39 = "O valor mínimo de entropia está configurado alto no protocolo de negociação da chave de criptografia?"
10015045-40 = "...Não."
10015045-41 = "E a verificação dos pacotes recebidos durante o processo de reconexão ao servidor de segurança?"
10015045-42 = "Não fizemos."
10015045-43 = "A atualização de firmware que corrige a vulnerabilidade descoberta no mês passado... também não fizeram, né?"
10015045-49 = "Vocês vivem adicionando funções desnecessárias nas suas invenções... #nPor que são tão descuidados com a segurança?"
10015045-50 = "Eu tenho algumas coisas a dizer sobre essa expressão \"funções desnecessárias\", mas..."
10015045-51 = "O robô que desenvolvemos desta vez precisava se adaptar a diversos ambientes, então... pensamos em flexibilizar um pouco as medidas de segurança."
10015045-52 = "No fim das contas, isso foi um erro..."
10015045-53 = "Bem, além disso... talvez tenha havido um descuido por saber que, se surgisse algum problema, uma consultora de segurança talentosa nos ajudaria."
10015045-55 = "Não me culpe só nessas horas. #nFrancamente, por isso que..."
10015045-56 = "Uau! Foi a Hibiki que desenhou esse traje?"
10015045-57 = "O design ousado e o uso das cores... ficou incrível!"
10015045-58 = "Na minha opinião, sinto que o comprimento da saia está um pouco curto, mas..."
10015045-59 = "Não é nada disso! De acordo com o relatório do Departamento de Pesquisa de Ciências Esportivas, há resultados de análises que indicam que quanto mais curta a saia da líder de torcida, maior a eficiência da torcida!"
10015045-60 = "Ou seja, é uma escolha racional que a equipe de torcida, que reza pela vitória do time, use saias curtas!"
10015045-62 = "É só porque a roupa foi feita há muito tempo e o tamanho ficou pequeno..."
10015045-63 = "Ugh... se tivéssemos um pouco mais de tempo, eu teria alongado a saia..."
10015045-64 = "...Não, se tem tempo para consertar a roupa, não seria melhor usar esse tempo para perseguir o culpado?"
10015045-65 = "É verdade. #nO mais importante agora é encontrar o culpado que hackeou o robô."
10015045-66 = "Sinto muito por pedir novamente... #nVocês conseguem identificar onde está o culpado que hackeou o robô do Departamento de Engenharia?"
10015045-67 = "Deixa comigo. Rastrear a origem é fácil."
10015045-68 = "Kotama, conecte-se aos módulos de RF instalados na área de estudo do Millennium. Consegue?"
10015045-69 = "Se eles estão hackeando a comunicação sem fio de curto alcance à distância, devem estar usando uma antena direcional. Nesse caso, se interferirmos no sinal, podemos calcular a localização aproximada da origem."
10015045-70 = "Sobre os módulos de RF instalados na área de estudo..."
10015045-71 = "Não se faça de desentendida. #nEu sei que você estava grampeando a conversa do Sensei com um módulo externo agora há pouco."
10015045-72 = "[s] \"...Hein? Eu estava sendo grampeada?\""
10015045-73 = "...Se não quiser colaborar, eu mesma posso confiscar e verificar."
10015045-77 = "Conectado. De quais dados devemos começar a verificar?"
10015045-78 = "[s] \"Ei, Kotama...?\""
10015045-79 = "Desculpe, Sensei. Vou verificar isso direito depois..."
10015045-83 = "Primeiro, Kotama, organize por horário a localização dos módulos onde houve interferência de sinal frequente, focando na sala de prática industrial."
10015045-87 = "Vocês duas, verifiquem se houve acesso anormal ao servidor. #nSó precisam checar os registros recentes, então não deve demorar muito."
10015045-88 = "Muito obrigada. #nÉ vergonhoso ter que pedir ajuda à Veritas tantas vezes..."
10015045-89 = "Não precisa se preocupar com isso."
10015045-90 = "Como eu disse antes, eu também espero que este Grande Festival Esportivo se torne uma celebração que todos possam aproveitar."
10015045-91 = "Só que... sinto que estamos deixando passar algum fato muito importante..."
10015045-93 = "Como se um grande problema estivesse surgindo em algum lugar que não percebemos..."
