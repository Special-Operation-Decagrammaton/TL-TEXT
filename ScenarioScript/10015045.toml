[translation]
10015045-4 = "ヴェリタス・ハッカー休憩室"
10015045-11 = "あー……えっと……"
10015045-12 = "大運動会のためなら、いくらでも手伝ってあげるとは言ったものの……"
10015045-13 = "チアの格好をしてほしいとかは、流石に断るけど？"
10015045-15 = "誤解だよ、チーちゃん。"
10015045-16 = "私たちは誰かに頼まれたわけじゃなく、自分の意志でこの服を着ているんだ。"
10015045-17 = "犯した過ちの代償を払うために着ている、と言った方が正しいかもです！"
10015045-18 = "つまり、「罰ゲーム」みたいな……。"
10015045-23 = "……先生、こういう趣味あったの？"
10015045-24 = "[s] \"誤解です！\""
10015045-25 = "ふふ。もう少し見守っていたかったですが……時間もあまりないので。"
10015045-26 = "これはですね……"
10015045-33 = "応援に使うオリジナルロボットを作るまではよかったけど……"
10015045-34 = "近距離無線通信を繋げたら、いきなりロボットが暴走し始めたって事で合ってる？"
10015045-35 = "ああ、その通り。#nノアが図面をチェックしてくれて、設計上の問題がない事も確認している。"
10015045-39 = "暗号化キーの交渉プロトコルで、エントロピーの最小値は高く設定してある？"
10015045-40 = "……いや。"
10015045-41 = "セキュリティサーバーに再接続する過程で受け取ったパケットのチェックは？"
10015045-42 = "やってないよ。"
10015045-43 = "先月発見された脆弱性を改善したファームウェアのアップデート……してないか。"
10015045-49 = "普段は発明品に余計な機能をいっぱい追加しておいて……#nどうしてセキュリティに関してはこんなに不用心なの？"
10015045-50 = "「余計な機能」という表現には言いたいことがあるけれど……"
10015045-51 = "今回開発したロボットは、多様な環境に柔軟に対応しなければならなかったから……セキュリティ対策を少し緩めようと考えたんだ。"
10015045-52 = "結果的にそれは、間違っていたのだが……。"
10015045-53 = "まあ、あとは……問題が生じても、優秀なセキュリティ顧問が手伝ってくれるという油断もあったかもしれないね。"
10015045-55 = "こんな時だけ私のせいにしないで。#nまったく、これだから……"
10015045-56 = "わぁ！この衣装、ヒビキがデザインしたの？"
10015045-57 = "大胆なデザインと色使い……すっごく良いね！"
10015045-58 = "私としては、スカート丈が多少短いように感じますが……"
10015045-59 = "そんなことないです！スポーツ科学研究部の報告書によると、チアリーダーのスカートが短いほど応援の効率が高くなるという分析結果もありますからね！"
10015045-60 = "つまりチームの勝利を祈願する応援団が短いスカートを穿くのは、合理的な選択だと言えます！"
10015045-62 = "だいぶ昔に作った服だから、サイズが小さいだけだけど……"
10015045-63 = "うぅ……もう少し時間があったら、スカートの丈をもっと伸ばしたのに……"
10015045-64 = "……いや、衣装を直す時間があるなら、その間に犯人を追いかけた方がいいんじゃない？"
10015045-65 = "そうですね。#nいま一番重要なのは、ロボットをハッキングした犯人を見つけることですから。"
10015045-66 = "重ねてのお願いとなり申し訳ありません……#nエンジニア部のロボットをハッキングした犯人が、どこにいるのか特定できますか？"
10015045-67 = "任せて。発信元を追跡すること自体は簡単だから。"
10015045-68 = "コタマ、ミレニアムのスタディーエリアに設置されているRFモジュールに接続。できるよね？"
10015045-69 = "遠くから近距離無線通信をハッキングしているなら、相手は指向性アンテナを使っているはず。それなら、電波に干渉すれば発信源の大まかな位置を算出できる。"
10015045-70 = "スタディーエリアに設置したRFモジュール、というのは……"
10015045-71 = "とぼけないで。#nさっき、外部モジュールで先生の会話を盗聴してたの知ってるよ？"
10015045-72 = "[s] \"……え？私、盗聴されていたの？\""
10015045-73 = "……協力したくないなら、私が押収して確認しても良いけど。"
10015045-77 = "接続しました。どのデータから確認しましょう？"
10015045-78 = "[s] \"あの、コタマさん……？\""
10015045-79 = "ごめん、先生。この件はあとでちゃんと確認するから……"
10015045-83 = "まずコタマは、工業実習室を中心に電波干渉が頻繁に発生したモジュールの位置を時間帯別にまとめて。"
10015045-87 = "ふたりは、サーバーに異常アクセスがなかったか確認してみて。#n最近の記録だけ確認すればいいから、そう時間はかからないはず。"
10015045-88 = "ありがとうございます。#nヴェリタスに何度も助けていただいて、面目ないですね……。"
10015045-89 = "気にしなくていいよ。"
10015045-90 = "さっきも言ったけど、私も今回の大運動会がみんなで楽しめるお祭りになることを願っているからね。"
10015045-91 = "ただ……何だか、もっと重大な事実を見逃しているような気が……。"
10015045-93 = "気づいていないところで、大きな問題が発生しているような……"
