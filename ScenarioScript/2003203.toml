[translation]
2003203-1 = "ファッション実践編"
2003203-3 = "あ、先生、こっち。"
2003203-4 = "早速、お店に入ろう。"
2003203-5 = "[s] \"あ、うん……水着ね……\""
2003203-7 = "水着の販売店"
2003203-12 = "ん……"
2003203-13 = "やっぱり、どれが良いのか分からない。#n順番に試着するから、先生が選んでくれる？"
2003203-18 = "……今回は更衣室の外で着替えないで、って？"
2003203-19 = "でも……更衣室の中は狭くて苦手。"
2003203-20 = "それに何回も着替えるし、更衣室まで往復するよりもその場で着替えた方が効率的。"
2003203-21 = "[s1] \"それはダメ！！\"\n[s2] \"私が取りに行くから！！\""
2003203-25 = "（更衣室のカーテンを開けたまま着替えようとするエイミを止めるところから、水着選びが始まった）"
2003203-29 = "先生、ちゃんとこっち見て返事して。"
2003203-30 = "ほら、これとかどう？"
2003203-32 = "じゃあ……これは？"
2003203-33 = "あ、それならこっちは？"
2003203-34 = "……今度はそっち？"
2003203-36 = "あれ、持ってきた覚えが無いのも混ざってる。"
2003203-37 = "牛柄の水着……？#nファッションはよく分からないけど、これを選ぶ人は流石に居ないんじゃないかな。"
2003203-39 = "（その後も、様々な水着を試着し……）"
2003203-40 = "（そこから気に入った物を購入した）"
2003203-42 = "先生のおかげで可愛い水着が買えた。ありがとう。"
2003203-43 = "氷海用の水着は、これでバッチリ。"
2003203-44 = "今回の作戦も、うまくいきそうだね。"
2003203-48 = "[ns3] \"今回の作戦……？\"\n[ns4] \"まさか、その水着で行くつもり……？\""
2003203-51 = "そのつもりだよ？"
2003203-52 = "海と言えば水着だから。"
2003203-53 = "[s] \"そ、そうかもしれないけど……\""
2003203-54 = "だから先生もちゃんと用意してきてね、水着。"
2003203-58 = "[ns] \"って、大丈夫じゃないでしょ！！！\""
2003203-59 = "先生？"
2003203-60 = "このままじゃ帰せない……？#nいや、まだ帰る気は……"
2003203-61 = "先生、どこ行くの？"
2003203-63 = "ここは……アウトドアウェア用品店……？"
2003203-64 = "[s5] \"ちょっと待ってて。\"\n[s6] エイミに必要な物を選ぶ。"
2003203-72 = "先生、重いよ……"
2003203-73 = "ダウンジャケットにマフラー……スキー用のパンツ、ブーツ、ニット帽……防寒、対策……？"
2003203-74 = "たしかに可愛いけど……暑そう。#n私、別に寒がりじゃないし大丈夫だよ。"
2003203-75 = "[s7] \"ダメです！必ず着てください！！\"\n[s8] \"先生との約束！！\""
2003203-78 = "念のため試着した方がいい……？"
2003203-79 = "……うん、分かった。"
2003203-83 = "……そんな目で見ないで。#nちゃんと更衣室で着替えてくるから。"
2003203-85 = "先生、着替えたよ。"
2003203-93 = "[ns] \"えっと、さっきの服は……？\""
2003203-94 = "ロングパンツまで履いたら、水着じゃないよ。"
2003203-95 = "[s9] \"水着かどうかってそこじゃなくない！？\"\n[s10] \"まぁ……さっきよりは……\""
2003203-98 = "うん。"
2003203-99 = "ありがとう、先生。"
2003203-101 = "（買い物を終え、カフェで雑談をしてからシャーレに戻った）"
