[translation]
2003203-1 = "Prática de Moda"
2003203-3 = "Ah, Sensei, por aqui."
2003203-4 = "Vamos entrar na loja logo."
2003203-5 = "[s] \"Ah, sim... roupa de banho, né...\""
2003203-7 = "Loja de roupas de banho"
2003203-12 = "Hmm..."
2003203-13 = "No fim das contas, não sei qual é a melhor. #nComo vou experimentar uma por uma, você pode escolher para mim, Sensei?"
2003203-18 = "...Você disse para não me trocar fora do provador desta vez?"
2003203-19 = "Mas... o provador é apertado e eu não gosto."
2003203-20 = "Além disso, vou trocar várias vezes, então é mais eficiente trocar aqui mesmo do que ficar indo e voltando do provador."
2003203-21 = "[s1] \"Isso não pode!!\"\n[s2] \"Eu vou buscar para você!!\""
2003203-25 = "(A escolha da roupa de banho começou depois de impedir Eimi de tentar se trocar com a cortina do provador aberta)"
2003203-29 = "Sensei, olhe para cá e me responda direito."
2003203-30 = "Olha, o que acha desta?"
2003203-32 = "Então... e esta?"
2003203-33 = "Ah, e se for esta aqui?"
2003203-34 = "...Desta vez é aquela?"
2003203-36 = "Ué, tem algumas aqui que não me lembro de ter trazido."
2003203-37 = "Uma roupa de banho com estampa de vaca...? #nNão entendo muito de moda, mas acho que ninguém escolheria isso, né."
2003203-39 = "(Depois disso, experimentou várias outras roupas de banho...)"
2003203-40 = "(E comprou as que mais gostou)"
2003203-42 = "Graças ao Sensei, consegui comprar uma roupa de banho fofa. Obrigada."
2003203-43 = "Com isso, a roupa de banho para o mar gelado está perfeita."
2003203-44 = "A operação desta vez também parece que vai dar certo."
2003203-48 = "[ns3] \"A operação desta vez...?\"\n[ns4] \"Não me diga que você pretende ir com essa roupa de banho...?\""
2003203-51 = "É essa a intenção, por quê?"
2003203-52 = "Porque mar combina com roupa de banho."
2003203-53 = "[s] \"B-bem, pode até ser, mas...\""
2003203-54 = "Por isso, Sensei, prepare a sua também, viu? A roupa de banho."
2003203-58 = "[ns] \"Isso não vai dar certo de jeito nenhum!!!\""
2003203-59 = "Sensei?"
2003203-60 = "Não posso te deixar ir embora assim...? #nNão, eu ainda não pretendo ir embora..."
2003203-61 = "Sensei, onde você vai?"
2003203-63 = "Aqui é... uma loja de artigos de aventura...?"
2003203-64 = "[s5] \"Espere um pouco.\"\n[s6] Escolher o que Eimi precisa."
2003203-72 = "Sensei, está pesado..."
2003203-73 = "Jaqueta, cachecol... calça de esqui, botas, gorro de lã... proteção contra o frio...?"
2003203-74 = "É fofo, com certeza, mas... parece quente. #nEu não sou friorenta, estou bem."
2003203-75 = "[s7] \"Não pode! Você tem que usar!!\"\n[s8] \"É uma promessa com o Sensei!!\""
2003203-78 = "É melhor experimentar por precaução...?"
2003203-79 = "...Entendi."
2003203-83 = "...Não me olhe assim. #nEu vou me trocar no provador direitinho."
2003203-85 = "Sensei, já me troquei."
2003203-93 = "[ns] \"Bem, e a roupa de antes...?\""
2003203-94 = "Se eu colocar até a calça comprida, não é mais roupa de banho."
2003203-95 = "[s9] \"A questão não é se é roupa de banho ou não!?\"\n[s10] \"Bom... comparado a antes...\""
2003203-98 = "Sim."
2003203-99 = "Obrigada, Sensei."
2003203-101 = "(Após terminar as compras e conversar no café, voltamos para o Schale)"
