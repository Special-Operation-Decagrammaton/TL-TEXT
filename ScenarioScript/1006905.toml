[translation]
1006905-1 = "接客業の悩み"
1006905-2 = "玄武商会"
1006905-3 = "（山海経の仕事を終えてから、玄武商会に向かった)"
1006905-7 = "いらっしゃい、先生。"
1006905-8 = "ご注文は？"
1006905-9 = "[s] \"日替わりランチか料理長のオススメで！\""
1006905-10 = "へぇ、オススメ、ねぇ。"
1006905-11 = "日替わりランチすぐに出せるけど……"
1006905-12 = "う～ん……よし！#nいいアイデアが思いついたから、オススメ料理にしちゃおっかな。"
1006905-13 = "[s] \"き、今日は「試食」じゃないよね？\""
1006905-14 = "あははっ。大丈夫だよ、今日は期待してていいよ。"
1006905-18 = "ちょっとあんた！料理長を呼んでくれ！"
1006905-20 = "[ns] \"……？\""
1006905-21 = "……何かトラブルかな。行ってくるね。"
1006905-27 = "料理に髪の毛が入ってるんだけど……ここの衛生管理はどうなってるんだ？"
1006905-28 = "まったく……人気店と聞いていたのに……これだなんて。"
1006905-29 = "そ、そんなはずは……！#n従業員一同、徹底しておりますが……"
1006905-30 = "じゃあ、この髪の毛はどう説明するつもりなんだ？#nコレも料理の一部だっていうのか？"
1006905-32 = "それとも、アンタの両目は節穴なのかい？"
1006905-33 = "……他のお客様の迷惑になりますので、お静かにお願いします。"
1006905-35 = "おっと？そうだよなぁ。他の客に聞かれたら、困るよな？"
1006905-36 = "――お客様。"
1006905-37 = "私が料理長です。この度は、大変申し訳ございませんでした。#n心よりお詫び申し上げます。"
1006905-39 = "本日のお代は結構ですので、どうかお許しを。"
1006905-40 = "このようなことが二度とないように、より一層気をつけてまいります。"
1006905-42 = "そっ、そうか！#n仕方ないな、それなら今回は許してやろうじゃあないか。"
1006905-47 = "会長！あれは私たちの髪の毛ではありません！"
1006905-48 = "うん……そうだね。#nみんなが衛生管理を徹底してるのは、あたしが一番よく知ってる。"
1006905-49 = "悔しい気持ちは分かるよ。#nでも、騒ぎになってしまっては、他のお客様に迷惑がかかってしまうからね。"
1006905-50 = "よく覚えておいて。"
1006905-51 = "……はい。ありがとうございます、会長。"
1006905-55 = "[ns] （さっきの客、どこかで見覚えが……)"
1006905-57 = "（静かに客を尾行することにした)"
1006905-62 = "ふっふっふ……"
1006905-63 = "これで今日もタダ飯だな。"
1006905-64 = "やっぱ、人気店ほどああいうのが効くもんだな。"
1006905-69 = "[ns] \"ちょっといいかな？\""
1006905-70 = "あん？誰だよ、アンタ。"
1006905-71 = "[s1] \"ヴァルキューレ生活安全局の事件記録で見たよ。\"\n[s2] \"食事に異物を入れて、無銭飲食する常習犯の記録を。\""
1006905-74 = "な、何のことだ？#nそもそも、アンタは一体何者なんだ？"
1006905-75 = "一般人が、どうしてそんな記録を……！"
1006905-76 = "もしかして……アンタが噂の「シャーレの先生」なのか……？"
1006905-77 = "[s] \"はじめまして、シャーレの先生です。\""
1006905-78 = "くっ……！"
1006905-79 = "は、はっ！だからどうした！？#nアンタ1人で一体何ができるってんだ！"
1006905-81 = "たしかに先生だけじゃ、キミを捕まえられないかもしれないけど……#nあたしが来たら、話は別だよね。"
1006905-82 = "だ、誰だっ！？"
1006905-86 = "またお会いしましたね……お客様？"
1006905-87 = "お、お前は……！"
1006905-88 = "い、今さら金を払えなんて言われても無理だからな！#nお代は要らないんだろう！？"
1006905-89 = "そうだね。別にお金を返してもらいに来たわけじゃないよ。#nま、最初から怪しいなとは思ってたけど……"
1006905-90 = "あそこでは、お店の責任者としての対応をするしかなかった。"
1006905-91 = "でも今は、あたしが個人的な「挨拶」に来ただけ。"
1006905-95 = "な、何をする気だっ！？それ以上近づくな！"
1006905-97 = "それは無理なお話だよ。"
1006905-98 = "その嘘を、あたしは絶対に許さない。"
1006905-99 = "まずは生徒として、先生を軽んじた言動は許せないし――"
1006905-100 = "先輩として――あたしの大事な後輩に嫌な思いをさせたことも許せない。"
1006905-101 = "――最後に、料理長として、お店の衛生管理にケチをつけたことも許せない。"
1006905-103 = "うわああああああ！"
1006905-108 = "（ルミのパンチが、無銭飲食客の真横の壁にめりこんだ)"
1006905-110 = "ふぅ……ありがと、先生。"
1006905-111 = "先生が諦めずに追いかけてくれたおかげだよ。"
1006905-112 = "[s3] \"大したことじゃないよ。\"\n[s4] \"ヴァルキューレ警察学校が、すぐ来てくれるって。\""
1006905-115 = "はははっ。本当に抜かりないね、先生は。"
1006905-116 = "それじゃ、お礼に……"
1006905-117 = "[s5] \"いや、今日は気持ちだけ受け取るよ。\"\n[s6] \"そろそろシャーレに戻らないといけないんだ。\""
1006905-120 = "うん、だから、シャーレまで届けに行くよ。"
1006905-121 = "お昼ご飯も途中で邪魔が入っちゃったしさ。#nデザートもサービスしとくよ。"
1006905-122 = "[s] \"ルミはみんなに料理を振る舞うのが好きだよね。\""
1006905-123 = "好き……というか、もうクセみたいなものかな。"
1006905-124 = "なんたって、あたしは料理長だからね！"
