[translation]
1006905-1 = "Problemas do setor de atendimento ao cliente"

1006905-2 = "O Genbutsu Shokai"

1006905-3 = "(Depois de terminar seu trabalho no Shanhai Sutra, ele foi para a Câmara de Comércio de Xuanwu)."

1006905-7 = "Bem-vindo, doutor."

1006905-8 = "O que você quer pedir?"

1006905-9 = "[s]\"Almoço diário ou recomendação do chef! \""

1006905-10 = "Heh, recomendações, ei."

1006905-11 = "O almoço diário poderá ser servido em breve, mas ......"

1006905-12 = "Hmmm ...... ok! #nTenho uma boa ideia, vou transformá-la em um prato recomendado."

1006905-13 = "[\"Ki, você não está 'provando' hoje, está? \""

1006905-14 = "Haha. Tudo bem, você pode contar comigo hoje."

1006905-18 = "Ei, você! Traga-me o chefe de cozinha!"

1006905-20 = "[ns] \"......? \""

1006905-21 = "...... algum problema? Estou de folga."

1006905-27 = "Há cabelo em minha comida. ...... Qual é a política de higiene aqui?"

1006905-28 = "Eu nunca ...... ouvi dizer que era um restaurante popular em todos os ...... mas não posso acreditar nisso."

1006905-29 = "Bem, isso não pode ser verdade. ...... Embora todos os funcionários da #n sejam minuciosamente ......"

1006905-30 = "Então, como você vai explicar esse cabelo? Está dizendo que #n-isso faz parte do prato?"

1006905-32 = "Ou você tem dois olhos que são cegos?"

1006905-33 = "...... Não faça barulho, pois isso pode incomodar outros clientes."

1006905-35 = "Ops? É isso mesmo. Você não quer que outros clientes saibam disso, quer?"

1006905-36 = "-Cliente."

1006905-37 = "Eu sou o chefe de cozinha. Sinto muito pelo incômodo causado. #nPor favor, aceite minhas sinceras desculpas."

1006905-39 = "Por favor, me perdoe, não quero pagar por hoje."

1006905-40 = "Seremos mais cuidadosos para garantir que isso não ocorra novamente."

1006905-42 = "Ah, sim! #Não há escolha, então vamos perdoá-lo desta vez, certo?"

1006905-47 = "Presidente! Esse não é o nosso cabelo!"

1006905-48 = "Sim. ...... Sim, é isso mesmo. #Sei muito bem que todos são muito cuidadosos com a higiene."

1006905-49 = "Posso entender sua frustração. Mesmo na #n, se você fizer barulho, causará problemas para outros clientes."

1006905-50 = "Lembre-se bem."

1006905-51 = "...... Sim. Obrigado, Sr. Presidente."

1006905-55 = "(Eu me lembro desse cliente de antes, eu o conheço de algum lugar: ......)"

1006905-57 = "(Decidiu seguir o cliente em silêncio)"

1006905-62 = "Hmmm... ......"

1006905-63 = "Essa é outra refeição gratuita para você hoje."

1006905-64 = "Eu sabia que esse tipo de coisa funcionaria melhor nas lojas mais populares."

1006905-69 = "[ns] \"Você tem um minuto? \""

1006905-70 = "An? Quem é você, Anta?"

1006905-71 = "[s1] \"Eu vi nos registros de casos do Departamento de Segurança de Vida da Valkyrie. \"\n[s2] \"Registros de infratores habituais que colocam objetos estranhos em suas refeições e comem e bebem sem pagar. \"\n[s2]""

1006905-74 = "Do que você está falando? #nQuem diabos é você, afinal?"

1006905-75 = "Como um membro do público pode ter esse registro em ......!"

1006905-76 = "Será que ...... Anta é o suposto "professor de placa de Petri" ......?"

1006905-77 = "[\"Prazer em conhecê-lo, sou um professor de placa de Petri. \""

1006905-78 = "Droga. ......!"

1006905-79 = "Ha, ha! Então, qual é o problema com você! #nO que diabos você pode fazer sozinho?"

1006905-81 = "É verdade que o professor talvez não consiga pegar você sozinho, mas se ......#n eu for, a história é outra."

1006905-82 = "Quem é esse?"

1006905-86 = "Já nos encontramos com você novamente, cliente ......?"

1006905-87 = "Ah, você pode acessar o site ......!"

1006905-88 = "Não, você não pode me pedir para pagar por isso agora! #Você não quer pagar por isso!"

1006905-89 = "Certo. Não estou aqui para pedir meu dinheiro de volta. #nBem, achei que era suspeito desde o início. ......"

1006905-90 = "Lá, tive que lidar com o fato de ser o responsável pela loja."

1006905-91 = "Mas agora estou aqui apenas para um "olá" pessoal."

1006905-95 = "Que diabos está fazendo? Não se aproxime mais!"

1006905-97 = "Essa é uma história impossível."

1006905-98 = "Nunca vou perdoar essa mentira."

1006905-99 = "Em primeiro lugar, como aluno, não posso tolerar comportamentos que desrespeitem o professor e..."

1006905-100 = "Como veterano, não consigo nem me perdoar por fazer meus preciosos jovens se sentirem mal."

1006905-101 = "-Por fim, como chefe de cozinha, também é imperdoável que ele tenha sido mesquinho com a higiene do restaurante."

1006905-103 = "Aaahhh!"

1006905-108 = "(O soco de Lumi se chocou contra a parede ao lado do cliente não pago)."

1006905-110 = "Ufa. ...... Obrigado, doutor."

1006905-111 = "Isso se deve ao fato de o professor não ter desistido e ter ido atrás do objetivo."

1006905-112 = "[Não é nada demais. \"\n[s4] \"A Academia de Polícia de Valquíria disse que eles estarão aqui em breve. \""

1006905-115 = "Ha ha ha. O senhor é realmente muito meticuloso, doutor."

1006905-116 = "Bem, então, graças a ......"

1006905-117 = "[s5] \"Não, vou apenas aceitar seus sentimentos hoje. \"\n[s6] \"Tenho que voltar para a placa de petri em breve. \"\n[s6]""

1006905-120 = "Sim, então eu os entregarei à placa de petri."

1006905-121 = "E o almoço foi interrompido no caminho. Vou lhe servir #n-sobremesa também."

1006905-122 = "[\"A Lumi gosta de cozinhar para todos. \""

1006905-123 = "Gosto do site ...... ou é como um hábito agora."

1006905-124 = "Afinal, eu sou o chefe de cozinha!"

