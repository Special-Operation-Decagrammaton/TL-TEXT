[translation]
10040050-1 = "Episódio 5: O Vestiário do Terror"
10040050-10 = "Haa, haa... conseguimos chegar, de alguma forma..."
10040050-11 = "Conseguir subjugar os drones sem destruí-los... como esperado do Sensei!"
10040050-13 = "Bom trabalho. Está indo melhor do que o esperado."
10040050-14 = "Chegamos à \"entrada dos fundos\". #nEmbora existam outras entradas de serviço..."
10040050-15 = "Escolhi um lugar pouco utilizado. Não seremos encontrados aqui."
10040050-16 = "Agora, só precisamos abrir..."
10040050-22 = "...?"
10040050-23 = "Hm...?"
10040050-24 = "Ué...?"
10040050-32 = "Esta porta..."
10040050-33 = "Não abre..."
10040050-34 = "O que isso significa?"
10040050-35 = "Vou tentar também..."
10040050-41 = "Ué, por que..."
10040050-47 = "...!? #nO que é isso, o código está..."
10040050-48 = "...Hare! Estamos sofrendo um contra-ataque! #nPrecisamos agir rápido, ou nossa localização será revelada!"
10040050-49 = "Não pode ser, é rápido demais...! #nEssa pessoa está um passo à nossa frente...!"
10040050-50 = "[s1] \"Contra-ataque...!?\"\n[s2] \"Mais do que a Kotama e a Hare!?\""
10040050-53 = "Sensei, saia daí rápido! #nSe continuar assim, as câmeras de segurança vão voltar a funcionar!"
10040050-54 = "Não parece que venceremos em um confronto direto. Precisamos procurar outra rota. #nMas isso é como se..."
10040050-55 = "Esse método... eu já vi antes..."
10040050-60 = "...Não pode ser, a Vice-Presidente!?"
10040050-61 = "Vocês duas, fujam logo daqui!!"
10040050-63 = "Não acredito!"
10040050-64 = "Está dizendo para voltarmos!? #nNão tem como dar um jeito nisso!?"
10040050-65 = "Infelizmente, as chances são muito baixas...!"
10040050-75 = "...Rápido!"
10040050-79 = "[ns3] Segura a mão da Koyuki e foge.\n[ns4] \"Koyuki, vamos recuar por aqui!!\""
10040050-82 = "Aaaaaah!! Por queeee!!!"
10040050-103 = "Haa, haa... já corri o suficiente só por hoje..."
10040050-105 = "Eu baixei a guarda. #nPensando bem, era óbvio."
10040050-106 = "Sim. A Vice-Presidente também é responsável pela gestão de segurança do Seminar."
10040050-107 = "Mas ser derrotada tão facilmente, mesmo ela estando remotamente..."
10040050-108 = "...As coisas ficaram mais complicadas do que eu pensava."
10040050-109 = "É a Vice-Presidente, não tem como evitar."
10040050-111 = "Então, o que devemos fazer? #nVamos ter que ficar escondidos até de manhã?"
10040050-112 = "Será que nem de manhã isso vai se resolver...!? #nAaah! Estamos perdidos!!"
10040050-114 = "...Não."
10040050-115 = "Ainda tem um jeito. #nUm método para não ter que enfrentar a Vice-Presidente."
10040050-116 = "Exatamente... a partir de agora, usaremos um método analógico."
10040050-117 = "[s5] \"Analógico...?\"\n[s6] \"O que você quer dizer?\""
10040050-120 = "A Vice-Presidente está controlando o sistema de segurança remotamente agora, certo?"
10040050-121 = "Por outro lado, isso significa que ela não consegue alcançar lugares onde o sistema não está instalado. #nMesmo sendo a Vice-Presidente."
10040050-122 = "Por exemplo, o espaço privado onde estamos agora."
10040050-124 = "...O mesmo vale para instalações antigas que não possuem equipamentos de alta tecnologia ou lugares abandonados e deteriorados."
10040050-125 = "Instalações antigas e... lugares deteriorados...?"
10040050-126 = "Este é o maior complexo no centro de Millennium. #nIsso também significa que ele tem muita história."
10040050-128 = "Passamos por várias reformas e ampliações. #nExistem partes que não são bem monitoradas."
10040050-129 = "É um lugar que ninguém usa mais, mas... existe uma rota de fuga por lá."
10040050-130 = "Eu fui pesquisando enquanto navegava."
10040050-131 = "[ns7] \"Conseguiram pesquisar tudo isso em tão pouco tempo?\"\n[ns8] \"Vocês duas são incríveis.\""
10040050-134 = "É um lugar desolado e abandonado há muito tempo, mas... a situação é urgente."
10040050-135 = "É, mas eu não gosto de lugares sujos, sabe?#nNão tem como dar um jeito nisso?"
10040050-136 = "Olha só, eu estou de pijama. Lugares frios são um pouco..."
10040050-137 = "Ah, seria ótimo se tivesse uma máquina de venda automática no caminho!#nFiquei com sede!"
10040050-143 = "Ei, Sensei..."
10040050-144 = "...É mesmo necessário que ela venha junto?"
10040050-146 = "Eeeeeeeh!?!?#nPor que isso de repente!? Eu fiz alguma coisa errada!?!?"
10040050-147 = "[s9] \"Desculpa, é que...\"\n[s10] \"Espero que você possa relevar...\""
10040050-150 = "Tenho que começar a tratar a Maki com mais carinho..."
10040050-151 = "Voltando ao assunto, não existe outro caminho."
10040050-152 = "Por isso..."
10040050-153 = "...Espere um pouco."
10040050-154 = "Silêncio... estou ouvindo algo vindo dali."
10040050-155 = "Isso é..."
10040050-162 = "Tem alguém se aproximando...!"
10040050-163 = "Esconda-se rápido...!"
10040050-167 = "Eeh!? Quem é...!?"
10040050-168 = "Não importa, rápido...!"
10040050-170 = "Dizer isso é fácil, mas não tem onde se esconder aqui!?"
10040050-171 = "...É para eu colar na parede!?"
10040050-172 = "Assim seremos encontrados."
10040050-177 = "Ugh, desse jeito..."
10040050-178 = "[ns11] \"Tem uma porta ali.\"\n[ns12] \"Vamos entrar rápido.\""
10040050-181 = "Ah, certo... sim!"
10040050-182 = "Depressa...!"
10040050-183 = "Rápido...!"
10040050-191 = "[ns] \"Aqui é...\""
10040050-192 = "Um vestiário, é?"
10040050-193 = "Aqui deve estar seguro—"
10040050-198 = "...Psiu."
10040050-199 = "Eles estão bem perto."
10040050-201 = "Noa? Aconteceu alguma coisa?"
10040050-202 = "..."
10040050-203 = "Essa porta está estranha..."
10040050-207 = "Deveria estar sem uso há muito tempo, mas só aqui tem poeira..."
10040050-208 = "...!!!!"
10040050-209 = "!!!!!!"
10040050-210 = "...Você não está exagerando?"
10040050-211 = "Talvez. Mas, por precaução..."
10040050-212 = "Vamos dar uma olhada lá dentro."
10040050-213 = "Droga."
10040050-214 = "O quê...!!"
10040050-215 = "[ns13] Entrar rapidamente no armário.\n[ns14] Puxar Koyuki para dentro do armário."
10040050-222 = "Yuuka-chan, por favor, procure em outro lugar."
10040050-223 = "Entendido. Se encontrar algo, me avise imediatamente."
10040050-224 = "Tá bom."
10040050-228 = "Se-Sensei...! O que a gente faz—!?"
10040050-229 = "[ns15] \"...Psiu.\"\n[ns16] Tapar a boca de Koyuki rapidamente."
10040050-240 = "…………！！！"
10040050-241 = "[ns17] （……A Noah!）\n[ns18] （Não posso fazer barulho……）"
10040050-244 = "……………………。"
10040050-255 = "……ah!"
10040050-256 = "Se, Sensei…… ahn!"
10040050-257 = "Es, espere um pouco……!"
10040050-258 = "……ugh!"
10040050-259 = "É, é apertado demais……."
10040050-265 = "Nghhh!?"
10040050-266 = "Por que — por que isso está acontecendo……."
10040050-267 = "[ns19] \"……Shiu.\"\n[ns20] \"Fique quieto.\""
10040050-274 = "……………………。"
10040050-275 = "……Ora, que estranho."
10040050-276 = "Com certeza —"
10040050-277 = "A posição da cadeira está diferente de quando#n olhei aqui dentro, 11 dias e 2 horas e 31 minutos atrás."
10040050-278 = "[ns] （Por que ela lembra disso……）"
10040050-279 = "A maçaneta aqui também está um pouco……."
10040050-284 = "……Entendo."
10040050-285 = "Parece que alguém entrou aqui."
10040050-286 = "Fufu, está ficando divertido.#n Então……."
10040050-290 = "Que tal darmos uma olhadinha?"
10040050-291 = "[ns] （……！！！！）"
10040050-306 = "Fufu……."
10040050-307 = "……Hmm, será que já foram para algum lugar?"
10040050-313 = "[ns21] （……Será que foi embora?）\n[ns22] （E a Noah……?）"
10040050-322 = "[ns23] （Droga, ela está se aproximando……!）\n[ns24] （Ela está checando os armários um por um……！！）"
10040050-329 = "U, uaaaaa……!?"
10040050-336 = "Desta vez, é o fim de verdade……！！"
10040050-349 = "[ns25] （……！！！！！！）\n[ns26] （Será que é aqui que acaba……!）"
10040050-361 = "[ns27] （Parece que ela foi embora……）\n[ns28] （……Ela realmente foi, né?）"
10040050-368 = "……Fuuuuaaaaa!"
10040050-369 = "Achei que meu coração ia parar……."
10040050-370 = "Pois é. Parecia que eu estava jogando um jogo de terror."
10040050-371 = "Foi a primeira vez que concentrei todos os meus sentidos nos ouvidos assim."
10040050-372 = "……Mas, de alguma forma, conseguimos passar por isso."
10040050-373 = "Agora deve ser seguro nos movermos."
10040050-374 = "Concordo. Ela não deve estar mais por perto."
10040050-375 = "Eu adoraria usar um hack para verificar a situação lá fora, mas……."
10040050-376 = "Seria contraproducente.#n Vamos evitar um confronto direto com a vice-representante."
10040050-377 = "Ou seja, não temos escolha a não ser resolver isso nós mesmos, né?"
10040050-378 = "……O que faremos, Sensei?"
10040050-379 = "[s29] \"Vamos nos mover agora mesmo.\"\n[s30] \"Não podemos perder tempo.\""
10040050-382 = "Entendido. Vou dar todo o suporte que puder."
10040050-383 = "Eu também darei apoio até o fim."
10040050-384 = "Primeiro, saiam daí……."
10040050-386 = "…………。"
10040050-387 = "……Hm?"
10040050-388 = "[s31] \"……Koyuki?\"\n[s32] \"Aconteceu alguma coisa?\""
10040050-391 = "……Eh?"
10040050-392 = "Ah, não……."
10040050-393 = "Pode ser um mal-entendido, mas..."
10040050-394 = "Como posso dizer..."
10040050-399 = "Sinto como se estivessem me observando..."
