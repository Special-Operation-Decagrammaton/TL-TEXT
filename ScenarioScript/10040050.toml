[translation]
10040050-1 = "第5話;戦慄のロッカールーム"
10040050-10 = "はぁ、はぁ……なんとか、たどり着けましたね……。"
10040050-11 = "本当にドローンを壊さずに制圧できるなんて、さすが先生です！"
10040050-13 = "お疲れ様でした。予想より順調です。"
10040050-14 = "「裏口」まで来れたね。#n通用口は他にもいくつかあるんだけど……。"
10040050-15 = "あまり使われていない場所を選びました。ここなら見つからないでしょう。"
10040050-16 = "あとは開けるだけで……。"
10040050-22 = "……？"
10040050-23 = "ん……？"
10040050-24 = "あれ……？"
10040050-32 = "このドア……。"
10040050-33 = "開きません……。"
10040050-34 = "どういうこと？"
10040050-35 = "私もやってみる……。"
10040050-41 = "あれ、どうして……。"
10040050-47 = "……！？#nなにこれ、コードが……。"
10040050-48 = "……ハレ！逆ハッキングされています！#n急いで対処しないと、位置が！"
10040050-49 = "そんな、早すぎる……！#nこの人、私たちより一枚[ruby=うわて]上手[/ruby]だ……！"
10040050-50 = "[s1] \"逆ハッキング……！？\"\n[s2] \"コタマとハレよりも！？\""
10040050-53 = "先生、早くそこから離れて！#nこのままじゃ、監視カメラも復旧しちゃう！"
10040050-54 = "真っ向勝負じゃ勝ち目はなさそうです。別口を探さなくては。#nでも、これはまるで……。"
10040050-55 = "この手口……見覚えが……。"
10040050-60 = "……まさか、副部長！？"
10040050-61 = "二人とも、早く逃げてください！！"
10040050-63 = "そんなぁ！"
10040050-64 = "引き返せってことですか！？#nなんとかなったりしません！？"
10040050-65 = "残念ですが、分が悪すぎます……！"
10040050-75 = "……早く！"
10040050-79 = "[ns3] コユキの手を掴んで逃げる。\n[ns4] \"コユキ、ここは退こう！！\""
10040050-82 = "うあぁああああ！！なんで――！！！"
10040050-103 = "はぁ、はぁ……今日だけで相当走らされてるんですけど……。"
10040050-105 = "油断してた。#nよく考えれば当然だよね。"
10040050-106 = "ええ。副部長はセミナーのセキュリティ管理も担当していますから。"
10040050-107 = "でも向こうはリモートなのに、一蹴されてしまうなんて……。"
10040050-108 = "……思っていたより、面倒なことになってしまいました。"
10040050-109 = "相手は副部長だもん、仕方ないよ。"
10040050-111 = "じゃあ、どうすれば良いんですか？#n朝までずっと隠れてるしかないんです？"
10040050-112 = "もしかして、朝になっても解決しないんじゃ……！？#nあぁああ～！終わりだああああ！！"
10040050-114 = "……ううん。"
10040050-115 = "まだあるよ。#n副部長とやりあわなくてすむ方法が。"
10040050-116 = "そうですね……ここからは、アナログな手法でいきます。"
10040050-117 = "[s5] \"アナログ……？\"\n[s6] \"どういうこと？\""
10040050-120 = "副部長は今、リモートでセキュリティシステムを制御してるわけだよね。"
10040050-121 = "裏を返せば、システムを設置してないとこには手が届かないって言えるよね。#nたとえ副部長であっても。"
10040050-122 = "例えば、私たちのいるプライベート空間がそう。"
10040050-124 = "……ハイテク機器を導入していない古い施設や、老朽化して放置されたままの場所もそうです。"
10040050-125 = "古い施設や……老朽化した場所……？"
10040050-126 = "ここはミレニアムの中心にそびえる最大規模の施設です。#nこれも裏を返せば、それだけ年季が入っていることを意味します。"
10040050-128 = "増改築だって何度も繰り返してきたからね。#n管理の行き届いてない箇所も、ある。"
10040050-129 = "もう誰も使ってない場所だけど……逃げ道はちゃんとあるよ。"
10040050-130 = "ナビゲートしながら調べておいたんだ。"
10040050-131 = "[ns7] \"こんな短い時間で、よく調べられたね。\"\n[ns8] \"すごいよ、二人とも。\""
10040050-134 = "打ち捨てられて久しい荒んだ場所ですが……事態は急を要しますので。"
10040050-135 = "えぇ、汚いところは嫌なんですけど？#nもっとなんとかならないんですか？"
10040050-136 = "私なんてほら、パジャマですし。寒いところはちょっと……。"
10040050-137 = "あ、途中に自販機があるとうれしいです！#n喉が乾いてきちゃったんですよね！"
10040050-143 = "ねえ、先生……。"
10040050-144 = "……その子も一緒じゃなきゃダメなの？"
10040050-146 = "ええええええ！？！？#nいきなり何ですか！？私、何かやらかしました！？！？"
10040050-147 = "[s9] \"ごめんね、その……。\"\n[s10] \"大目に見てあげてほしい……。\""
10040050-150 = "マキにはこれから優しく接してあげなきゃ……。"
10040050-151 = "話を戻すけど、ほかに道はないよ。"
10040050-152 = "だから……。"
10040050-153 = "……待ってください。"
10040050-154 = "静かに……向こうから何か聞こえます。"
10040050-155 = "これは……。"
10040050-162 = "誰かが近づいてきます……！"
10040050-163 = "すぐ隠れてください……！"
10040050-167 = "ええっ！？誰なんです……！？"
10040050-168 = "いいから早く……！"
10040050-170 = "そうは言っても、隠れる場所なんてないですよ！？"
10040050-171 = "……か、壁に貼りつけばいいんです！？"
10040050-172 = "それでは見つかってしまいます。"
10040050-177 = "うぅ、このままじゃ……！！"
10040050-178 = "[ns11] \"そこに扉があるよ。\"\n[ns12] \"急いで入ろう。\""
10040050-181 = "え、あっ……はい！"
10040050-182 = "急いでください……！"
10040050-183 = "早く……！"
10040050-191 = "[ns] \"ここは……。\""
10040050-192 = "更衣室、ですか。"
10040050-193 = "ここなら大丈夫――"
10040050-198 = "……しっ。"
10040050-199 = "目と鼻の先まで来ています。"
10040050-201 = "ノア？どうかしたの？"
10040050-202 = "……。"
10040050-203 = "このドア、おかしいですね……。"
10040050-207 = "ずっと使われてないはずなのに、ここだけホコリが……。"
10040050-208 = "……！！！！"
10040050-209 = "！！！！！！"
10040050-210 = "……気にしすぎじゃない？"
10040050-211 = "そうかもしれません。#nでも、念のため……。"
10040050-212 = "少し、中を見てみましょう。"
10040050-213 = "まずい。"
10040050-214 = "なっ……！！"
10040050-215 = "[ns13] 急いでロッカーに入る。\n[ns14] コユキをロッカーの中に引っ張る。"
10040050-222 = "ユウカちゃんは、ほかの場所を探してみてください。"
10040050-223 = "分かったわ。何かあったらすぐ言ってね。"
10040050-224 = "は～い。"
10040050-228 = "せ、先生……！どうすれっ――！？"
10040050-229 = "[ns15] \"……しっ。\"\n[ns16] 急いでコユキの口を塞ぐ。"
10040050-240 = "…………！！！"
10040050-241 = "[ns17] （……ノアが！）\n[ns18] （声を出しちゃダメだ……）"
10040050-244 = "……………………。"
10040050-255 = "……っ！"
10040050-256 = "せ、先生……あうっ！"
10040050-257 = "ちょ、ちょっと待ってください……！"
10040050-258 = "……うぎゃっ！"
10040050-259 = "せ、狭すぎますよぉ……。"
10040050-265 = "んうっっっ！？"
10040050-266 = "どうして――どうして、こんなことに……。"
10040050-267 = "[ns19] \"……しっ。\"\n[ns20] \"静かにして。\""
10040050-274 = "……………………。"
10040050-275 = "……あら、おかしいですね。"
10040050-276 = "たしか――"
10040050-277 = "11日と2時間31分前に中を覗いた時とは、#n椅子の位置が違います。"
10040050-278 = "[ns] （なんで覚えてるの……）"
10040050-279 = "ここもドアノブが少し……。"
10040050-284 = "……なるほど。"
10040050-285 = "ここに誰か入ったようですね。"
10040050-286 = "ふふっ、楽しくなってきました。#nでは……。"
10040050-290 = "少し、調べてみましょうか？"
10040050-291 = "[ns] （……！！！！）"
10040050-306 = "ふふっ……。"
10040050-307 = "……うーん、もうどこかに行ってしまったのでしょうか。"
10040050-313 = "[ns21] （……行ったかな？）\n[ns22] （ノアは……？）"
10040050-322 = "[ns23] （まずい、近づいてくる……！）\n[ns24] （ロッカーをひとつずつ確認してる……！！）"
10040050-329 = "う、うああああ……！？"
10040050-336 = "今度こそ、本当に終わりです……！！"
10040050-349 = "[ns25] （……！！！！！！）\n[ns26] （ここまでか……！)"
10040050-361 = "[ns27] （出て行ってくれたみたいだ……）\n[ns28] （……本当に行ったんだよね？）"
10040050-368 = "……ふああぁぁぁぁ！"
10040050-369 = "心臓が止まるかと思いましたよ……。"
10040050-370 = "うん。ホラーゲームをプレイしてるみたいだった。"
10040050-371 = "ここまで耳に全神経を集中させたのは、私も初めてです。"
10040050-372 = "……でも、なんとかやり過ごせましたね。"
10040050-373 = "今なら安全に移動できるはず。"
10040050-374 = "そうだね。もうこのあたりにはいないはず。"
10040050-375 = "ハッキングであっちの状況を確認したいとこだけど……。"
10040050-376 = "逆効果でしょうね。#n副部長との真っ向勝負は避けましょう。"
10040050-377 = "つまり、私たちでなんとかするしかないってことだよね。"
10040050-378 = "……どうしよう、先生？"
10040050-379 = "[s29] \"今すぐ移動しよう。\"\n[s30] \"時間を無駄にはできない。\""
10040050-382 = "わかった。できるだけサポートするね。"
10040050-383 = "私も最後まで支援します。"
10040050-384 = "ひとまず、そこから出てもらって……。"
10040050-386 = "…………。"
10040050-387 = "……ん？"
10040050-388 = "[s31] \"……コユキ？\"\n[s32] \"どうかしたの？\""
10040050-391 = "……え？"
10040050-392 = "あ、いえ……。"
10040050-393 = "勘違いかも、しれませんが……。"
10040050-394 = "なんというか……。"
10040050-399 = "視線を感じるような、気がして……。"
