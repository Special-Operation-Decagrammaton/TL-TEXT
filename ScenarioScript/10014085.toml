[translation]
10014085-2 = "Estou com fome..."
10014085-3 = "Já que estamos à toa, vamos pedir algo para comer?"
10014085-4 = "Yo, Yoshimi-chan?#nNão tem nada na geladeira...?"
10014085-5 = "O que tem na geladeira não é para agora.#nCada coisa tem sua hora certa de ser comida."
10014085-6 = "Vou pedir pelo aplicativo, mas... todas vão querer comer, né?"
10014085-7 = "O que vamos comer? E você, Airi?"
10014085-8 = "Hmm~ então hoje..."
10014085-9 = "Que tal um parfait de chocolate com menta?"
10014085-10 = "Hoje \"é\"...?"
10014085-11 = "Entendido por enquanto... então a Airi vai querer isso..."
10014085-12 = "E a Natsu?"
10014085-19 = "Eu sou... \"Natsu\"."
10014085-20 = "...Yutori... Natsu."
10014085-21 = "Não estou perguntando sua identidade, estou perguntando o que você quer comer."
10014085-22 = "Ah... esquece."
10014085-23 = "Vou pedir por conta própria, então não reclamem."
10014085-24 = "Natsu e eu... vamos querer isso..."
10014085-25 = "Então, por último..."
10014085-26 = "\"Você\" vai comer o qu..."
10014085-30 = "...Ué, alguém chegou?"
10014085-31 = "[s1] \"Vocês estavam reunidas aqui.\"\n[s2] \"Oi, pessoal.\""
10014085-32 = "Eh? Sensei...?"
10014085-33 = "Eh? Sensei...?"
10014085-34 = "Oh, pedindo comida? Que sorte."
10014085-35 = "Já que está aqui, peça a nossa parte também..."
10014085-36 = "HA-HA-HA!! Como esperado, você voltou!#nEu estava te esperando! Kyoyama Kazusa!!"
10014085-37 = "...?"
10014085-38 = "[s3] \"É um idiota barulhento e sangue quente.\"\n[s4] \"Parece que estava te esperando.\""
10014085-39 = "...Eh, espera.#n...O quê?"
10014085-40 = "...Eh, espera.#n...O quê?"
10014085-41 = "Não... o que é isso?"
10014085-42 = "Por que você está aqui...?"
10014085-43 = "Então este era realmente o seu \"covil\"!!"
10014085-44 = "Ouvi tudo! Que você derrotou todas aquelas delinquentes sozinha...!#nVocê deixou sua marca na lenda novamente...!"
10014085-45 = "Cath Palug... a besta selada na Trinity!!"
10014085-46 = "Não, eu não estou entendendo nada do que você está falando!?"
10014085-47 = "E outra, o quê? Derrotei todas as delinquentes?#nQuem está dizendo isso e onde?"
10014085-48 = "Fufu... recebi uma mensagem.#nDo cavaleiro que diz estar te selando..."
10014085-49 = "Do nobre e corajoso \"Clube de Doces do Pós-Aula\"."
10014085-50 = "...?#nO que é isso..."
10014085-58 = "...Pff"
10014085-59 = "[s5] \"Entendo... de certa forma, não está errado.\"\n[s6] \"...É estranhamente difícil de negar.\""
10014085-64 = "YOSHIMI!!! NATSU!!!"
10014085-65 = "Vocês estão loucas!?#nCancelem isso logo e expliquem direito para ele!!"
10014085-66 = "Ele vai acreditar de verdade nisso!!#nVocês não sabem quando parar com as brincadeiras...!!"
10014085-71 = "É um \"duelo\"!! Kyoyama Kazusa!!"
10014085-75 = "...Ah."
10014085-76 = "...Vocês. Sério, depois eu vou acabar com todas..."
10014085-77 = "Ataque preventivo!!"
10014085-93 = "Prepare-se!!"
10014085-94 = "História dos Doces Depois da Aula ～Segredos Doces e Troca de Tiros～"
