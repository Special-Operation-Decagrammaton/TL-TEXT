[translation]
10014085-2 = "お腹すいたぁ……"
10014085-3 = "暇だし、出前取って何か食べる？"
10014085-4 = "よ、ヨシミちゃん？#n冷蔵庫にまだ色々入ってない……？"
10014085-5 = "冷蔵庫のヤツは今じゃないわ。#nそれぞれ食べ時ってものがあるのよ。"
10014085-6 = "アプリで注文するけど……みんな食べるよね？"
10014085-7 = "何食べる？アイリは？"
10014085-8 = "うーん～じゃあ今日は……"
10014085-9 = "チョコミントパフェかな？"
10014085-10 = "今日「は」……？"
10014085-11 = "とりあえず了解……じゃあアイリはそれで……"
10014085-12 = "ナツは？"
10014085-19 = "私は……「ナツ」。"
10014085-20 = "……[ruby=ゆとり]柚鳥[/ruby]……ナツ。"
10014085-21 = "あんたのアイデンティティじゃなくて、何食べるのか聞いてんのよ。"
10014085-22 = "はあ……もういいや。"
10014085-23 = "私が勝手に頼むから文句言わないでよ。"
10014085-24 = "ナツと私は……これで……"
10014085-25 = "じゃあ後は……"
10014085-26 = "「あんた」は何食べ……"
10014085-30 = "……あれ、誰か来たの？"
10014085-31 = "[s1] \"ここに集まってたんだ。\"\n[s2] \"みんなやっほ。\""
10014085-32 = "え？先生……？"
10014085-33 = "え？先生……？"
10014085-34 = "お、出前注文中？ラッキー。"
10014085-35 = "ついでに私たちの分も……"
10014085-36 = "ハッハッハ！！やはり戻ってきましたか！#n待ってましたよ！[ruby=きょうやま]杏山[/ruby]カズサ！！"
10014085-37 = "……？"
10014085-38 = "[s3] \"熱血でうるさいバカだ。\"\n[s4] \"待ってたみたいだね。\""
10014085-39 = "……え、ちょっと。#n……なに。"
10014085-40 = "……え、ちょっと。#n……なに。"
10014085-41 = "いや……アレ何？"
10014085-42 = "なんでここにいるの……？"
10014085-43 = "本当にここがあなたの「巣窟」だったんですね！！"
10014085-44 = "話は全て聞きました！一人であのスケバンたちを全員片付けたと……！#nまた伝説を残したのですね……！"
10014085-45 = "キャスパリーグ……トリニティに封印された魔獣！！"
10014085-46 = "いや何言ってるのかサッパリなんだけど！？"
10014085-47 = "ってか、なに？スケバンを全員片付けた？#n誰がどこで言ってるのそれ。"
10014085-48 = "ふふ……連絡があったのですよ。#nあなたを封印しているという騎士……"
10014085-49 = "崇高で勇敢な「放課後スイーツ団」から。"
10014085-50 = "……？#nなにそれ……"
10014085-58 = "……ふっ"
10014085-59 = "[s5] \"なるほど……ある意味、間違ってはないね。\"\n[s6] \"……妙に否定しづらいですね。\""
10014085-64 = "ヨシミ！！！ナツ！！！"
10014085-65 = "あんた達正気なの！？#n早く取り消して、こいつにちゃんと説明して！！"
10014085-66 = "こいつマジで信じちゃうの！！#n冗談通じないヤツなの……！！"
10014085-71 = "「勝負」です！！杏山カズサ！！"
10014085-75 = "……はぁ。"
10014085-76 = "……あんた達。ホント、後で私が全員……"
10014085-77 = "先手必勝！！"
10014085-93 = "覚悟してよね！！"
10014085-94 = "放課後スイーツ物語　～甘い秘密と銃撃戦～"
