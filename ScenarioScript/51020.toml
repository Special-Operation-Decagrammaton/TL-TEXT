[translation]
51020-1 = "Episódio 2; Um encontro inesperado (1)"
51020-4 = "[ns] \"……A atmosfera parece um pouco diferente do habitual.\""
51020-5 = "(Ao chegar na região autônoma da Academia Hyakkiyako, vi lanternas decorando toda a cidade)"
51020-10 = "Eu vi com meus próprios olhos!"
51020-15 = "[ns] \"……Hm?\""
51020-21 = "Eu já disse que não sei de nada."
51020-22 = "Você tem alguma prova de que roubamos a carteira?"
51020-25 = "Provas…… eu não tenho……#nMas eu realmente vi……!"
51020-26 = "Já chega, senhorita."
51020-27 = "Sinto muito por incomodá-la, sendo que você deve estar ocupada com os preparativos do festival."
51020-28 = "Não há nada a fazer quanto ao que foi perdido."
51020-30 = "Viu só? A própria vítima disse que está tudo bem!#nPodemos ir agora, né?"
51020-31 = "Já que você nos acusou falsamente, por que não pede desculpas? Hahaha!"
51020-32 = "Você não veio nos confrontar até aqui?"
51020-37 = "I-Isso não pode ser……!!"
51020-42 = "…………."
51020-44 = "……Ainda assim, não posso simplesmente ignorar!"
51020-45 = "Mesmo que este senhor diga que está tudo bem, os céus estão observando!"
51020-47 = "O quê? O que você quer? Quer brigar?"
51020-48 = "Parece que você só vai entender se levar uma surra!"
51020-52 = "[ns] \"Com licença, está acontecendo algum problema?\""
51020-56 = "Tsc! Quem é você agora!?"
51020-57 = "Se pretende continuar atrapalhando, então――"
51020-61 = "Abaixa a guarda!"
51020-67 = "Opa!?"
51020-74 = "……A carteira, eu a encontrei!"
51020-75 = "Nossa…… então aqueles jovens realmente……"
51020-77 = "Ei, ei! O que você está derrubando aí!"
51020-78 = "Droga…… ei, vocês! Vamos embora!"
51020-86 = "……Ah?"
51020-89 = "Vou fazer você ficar quieta antes que o barulho aumente……!"
51020-94 = "Uau!? De onde essas pessoas vieram!?"
51020-100 = "E você seria……?"
51020-101 = "[s] \"Vou ajudar.\""
51020-104 = "……!"
51020-105 = "Sim!"
