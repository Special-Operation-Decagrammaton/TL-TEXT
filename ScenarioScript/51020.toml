[translation]
51020-1 = "第2話;思いがけない出会い（１）"
51020-4 = "[ns] \"……いつもとなんだか雰囲気が違うような。\""
51020-5 = "（百鬼夜行連合学院の自治区に到着すると、街中を彩る提灯が目に入った）"
51020-10 = "この目で！[ruby=みども]身共[/ruby]は見たんですの！"
51020-15 = "[ns] \"……ん？\" "
51020-21 = "だから、知らないっつってんだろ。"
51020-22 = "こっちが財布を盗った証拠でもあんのか？"
51020-25 = "証拠は……ありません……#nですが、身共は本当に……！"
51020-26 = "もういいよ、お嬢さん。"
51020-27 = "お祭りの準備で忙しいだろうに、気を遣わせてしまってすまないのう。"
51020-28 = "失くしてしまったものは仕方あるまい。"
51020-30 = "ほら、本人もいいって言ってんだろ！#nもう行っていいよなぁ？"
51020-31 = "言いがかりつけたんだから、謝るくらいしたらどうだ？ハハッ！"
51020-32 = "ここまで俺らに突っかかってきたんだからなぁ？"
51020-37 = "そ、そんな……！！"
51020-42 = "…………。"
51020-44 = "……やはり、見て見ぬ振りはできません！"
51020-45 = "このお方が良いと仰っても、お天道様は見ていますのよ！"
51020-47 = "なっ、なんだよ。やんのか？"
51020-48 = "痛い目を見なきゃ分かんねぇようだな！"
51020-52 = "[ns] \"すみません、何かトラブルですか？\""
51020-56 = "チッ！一体今度は誰だ！？"
51020-57 = "これ以上、邪魔をしようってんなら――"
51020-61 = "隙あり！"
51020-67 = "おわっ！？"
51020-74 = "……お財布、ありましたの！"
51020-75 = "なんと……本当にあの若者たちが……"
51020-77 = "お、おい！なに落としてんだよ！"
51020-78 = "クソッ……おい、お前ら！来い！"
51020-86 = "……あら？"
51020-89 = "騒ぎが大きくなる前に黙らせてやる……！"
51020-94 = "わわっ！？この方々、一体どこから来ましたの！？"
51020-100 = "あなた様は……？"
51020-101 = "[s] \"手伝うよ。\""
51020-104 = "……！"
51020-105 = "はい！"
