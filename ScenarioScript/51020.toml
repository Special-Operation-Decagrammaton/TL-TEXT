[translation]
51020-1 = "Episódio 2; Um Encontro Inesperado (1)"
51020-4 = "[ns] \"......A atmosfera parece meio diferente do normal.\""
51020-5 = "(Ao chegar no distrito da Academia Combinada Hyakkiyako, as lanternas que coloriam as ruas chamaram a minha atenção.)"
51020-10 = "Eu vi com os meus próprios olhos!"
51020-15 = "[ns] \"......Hm?\" "
51020-21 = "Já disse que não sei de nada."
51020-22 = "Você tem alguma prova de que a gente roubou a carteira?"
51020-25 = "Provas... eu não tenho... #n Mas eu realmente...!"
51020-26 = "Já está bom, mocinha."
51020-27 = "Você deve estar ocupada com os preparativos do festival, sinto muito por causar problemas."
51020-28 = "Não há nada que se possa fazer sobre o que foi perdido."
51020-30 = "Olha só, o próprio dono disse que está tudo bem! #n Já podemos ir, né?"
51020-31 = "Já que você fez uma falsa acusação, que tal pelo menos pedir desculpas? Haha!"
51020-32 = "Depois de pegar tanto no nosso pé, né?"
51020-37 = "I-Isso não é justo...!!"
51020-42 = "............"
51020-44 = "......Como eu pensava, não posso fingir que não vi!"
51020-45 = "Mesmo que este senhor diga que está tudo bem, os céus estão observando!"
51020-47 = "O, o que foi? Quer brigar?"
51020-48 = "Parece que você só vai entender se levar uma surra!"
51020-52 = "[ns] \"Com licença, algum problema por aqui?\""
51020-56 = "Tsc! Quem é agora!?"
51020-57 = "Se quiser continuar atrapalhando――"
51020-61 = "Deixou uma brecha!"
51020-67 = "Uou!?"
51020-74 = "......A carteira, estava aqui!"
51020-75 = "Nossa... então foram realmente esses jovens que..."
51020-77 = "E-Ei! O que você tá deixando cair aí!"
51020-78 = "Droga... ei, vocês! Venham aqui!"
51020-86 = "......Ara?"
51020-89 = "Vou calar vocês antes que isso vire um tumulto maior...!"
51020-94 = "Uwaa!? De onde essas pessoas vieram!?"
51020-100 = "E você é...?"
51020-101 = "[s] \"Eu ajudo.\""
51020-104 = "......!"
51020-105 = "Sim!"
