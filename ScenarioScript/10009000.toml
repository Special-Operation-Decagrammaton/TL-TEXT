[translation]
10009000-1 = "プロローグ;バレンタインデーのお仕事"
10009000-2 = "（バレンタインデーを目前に控えたある日、フブキとキリノからメッセージが届いた）"
10009000-4 = "シャーレ・オフィス"
10009000-6 = "[ns] \"「パトロール業務の協力要請について」……？\""
10009000-7 = "バレンタインの季節になると、D.U.のあちこちで大規模なイベントが開かれるんだよね。"
10009000-8 = "有名なパティシエを招待して開かれる「チョコレートケーキ選手権」とか、キヴォトス各地から有名なチョコレートを集めて展示する「バレンタインチョコレート展示会」とか。"
10009000-9 = "あと「チョコレート大食い大会」とか、その場でチョコを溶かして作る「チョコレートデザイン選手権」とかもすごく人気なんですよ！"
10009000-10 = "あと何より、「ペットチョコレートコンテスト」は見逃せないよね。１年間大事に育ててきたチョコレートたちが、一斉に並んでアピールする様なんか圧巻だよ。"
10009000-11 = "[s] \"最後のやつが全然想像できない……\""
10009000-12 = "まあ細かいことはさておき、"
10009000-13 = "こういうイベント系の警備とかも生活安全局に回ってくるんだよね。"
10009000-14 = "その上、今年は例年より規模が大きいとかで……ただでさえ人不足なのにどうしよっかなって思ってた時に、先生のことを思い出してね。"
10009000-15 = "ってわけで先生、手伝ってくれない？どうせ先生は、バレンタインデーに予定とか無いでしょう？"
10009000-16 = "フブキ！？"
10009000-17 = "[s1] \"分からないけど、それなりに忙しくなるかも……。\"\n[s2] \"うん、ものすごく暇の予定！！\""
10009000-18 = "え、そうなの？"
10009000-19 = "まあまあ、可愛い生徒がこーんなにお願いしてるんだからさ？"
10009000-20 = "まさか断ったりしないでしょ？終わったらドーナッツ奢ってあげるからさ～。"
10009000-21 = "[s3] \"まあそれはそれとして、もちろん手伝うよ。ドーナッツ無しでも。\""
10009000-22 = "あはっ、先生のそういうとこ好きだな～。"
10009000-23 = "あ、ありがとうございます！"
10009000-24 = "先生！？"
10009000-25 = "いや、自分から言っておいて何だけどさ……。"
10009000-26 = "そんなに自信満々なのはどうなの……？手伝ってくれるのはありがたいけど……。"
10009000-27 = "と、とにかくありがとうございます！先生！"
10009000-28 = "[s] \"二人が頑張ってるなら、少しでも手伝えればなって。\""
10009000-29 = "まぁ、せっかくのバレンタインデーだからね。チョコレートを渡して、渡し合って、幸せを感じられる日。"
10009000-30 = "その笑顔は守ってあげないと、私たちはヴァルキューレなんだから。"
10009000-31 = "フブキ……！そんな殊勝なことを考えていたなんて、感動しました……！"
10009000-32 = "まー何よりその日だけ頑張っておけば、後から業者の人たちが売れ残りのドーナッツを山ほどくれるし！"
10009000-33 = "あー、ヴァルキューレ警察学校の生徒で本当に良かった～。"
10009000-34 = "フブキ……。"
10009000-35 = "ふふっ。とにかく、今度のバレンタインデー当日だからね。"
10009000-36 = "先生よろしく～。"
10009000-39 = "#video;10008"
10009000-42 = "（そうしてフブキとキリノと約束を交わし、バレンタインデー当日を迎え……）"
10009000-44 = "D.U.・商店街"
10009000-46 = "（バレンタインデーの商店街は、人混みで溢れかえっていた）"
10009000-47 = "ロゼチョコレートのセットが現在、通常価格から20％割引中です！"
10009000-48 = "チョコミントはいかがですかー？当店では現在、「チョコミントパフェ」をご注文のお客様に何と、パフェをもう一つ無料でご提供中！"
10009000-49 = "お友達、恋人、仲間、それから尊敬する方にも、ぜひチョコミントの素晴らしさをお伝えください！"
10009000-50 = "ハッピーバレンタインデー！ということで、恋人さんと一緒に当店へお越しの方々には……！！"
10009000-51 = "[s] \"すごい盛り上がりだ……。\""
10009000-52 = "（熱狂具合を肌で感じながら、周囲の様子を見て回っていた時……）"
10009000-61 = "うぃーっす。ちょっと聞いたんだけどさ、"
10009000-62 = "ここで「幸運のチョコレート」を売ってるんだって？"
10009000-63 = "あっ、はい！おそらくは当店で販売している、四つ葉のクローバーの形をした幸運のチョコレートのことかと。おひとついかがですか？"
10009000-64 = "へぇ。つまりそれって、食べたら「マジで」幸運になるんだよな？"
10009000-65 = "え、あ、いえその……幸運のチョコレートというのはあくまで名前と言いますか、「マジで」と申されましても……。"
10009000-66 = "ちょうどさっき宝くじを買ってきててさ、せっかくだしこのチョコを食べてからにしようかなって。"
10009000-67 = "まあ最初の番号だけ見た感じ、どの当選番号にも当たってなかったけど。"
10009000-68 = "ここのチョコレートを食べたら何とかなるかもしれないっしょ？なんせ「幸運のチョコレート」だもんなぁ！？"
10009000-69 = "[s] \"いやいやいや……。\""
10009000-70 = "……あん、何だお前？"
10009000-71 = "……シャーレの先生？パトロール？"
10009000-72 = "うるさいっ、バカにすんな！もう宝くじが外れたことくらい分かってるんだ！"
10009000-73 = "でも夢は諦めきれないだろ！？"
10009000-75 = "そうだ、このままじゃ終われねぇんだっ！"
