[translation]
10009000-1 = "Prólogo: Trabalho de Dia dos Namorados"
10009000-2 = "（Em um dia próximo ao Dia dos Namorados, recebi mensagens de Fubuki e Kirino）"
10009000-4 = "Escritório do Schale"
10009000-6 = "[ns] \"'Sobre o pedido de cooperação para o serviço de patrulha'...?\""
10009000-7 = "Quando chega a época do Dia dos Namorados, vários eventos de grande escala acontecem por toda D.U."
10009000-8 = "Tem o 'Campeonato de Bolo de Chocolate', que convida confeiteiros famosos, e a 'Exposição de Chocolates de Dia dos Namorados', que reúne e exibe chocolates famosos de todo o Kivotos."
10009000-9 = "Além disso, o 'Torneio de Comer Chocolate' e o 'Campeonato de Design de Chocolate', onde você derrete o chocolate na hora para criar formas, também são super populares!"
10009000-10 = "E, acima de tudo, o 'Concurso de Chocolate de Estimação' é imperdível. Ver os chocolates que foram criados com tanto carinho durante um ano inteiro alinhados para se exibirem é uma obra-prima."
10009000-11 = "[s] \"Não consigo nem imaginar esse último...\""
10009000-12 = "Bem, deixando os detalhes de lado,"
10009000-13 = "a segurança desses tipos de eventos também acaba caindo para o Departamento de Segurança Pública."
10009000-14 = "Além disso, dizem que este ano o evento é maior que o habitual... e como já estamos com falta de pessoal, eu estava pensando no que fazer, quando me lembrei de você, Sensei."
10009000-15 = "Então, Sensei, pode nos ajudar? Você não tem nenhum compromisso no Dia dos Namorados, tem?"
10009000-16 = "Fubuki!?"
10009000-17 = "[s1] \"Não sei, talvez eu fique um pouco ocupado...\n[s2] \"Sim, estou totalmente livre!!\""
10009000-18 = "Ah, é mesmo?"
10009000-19 = "Bem, bem, uma aluna fofa está pedindo com tanto carinho, sabe?"
10009000-20 = "Você não vai recusar, vai? Se ajudar, eu te pago uns donuts depois~."
10009000-21 = "[s3] \"Bem, deixando isso de lado, é claro que eu ajudo. Mesmo sem os donuts.\""
10009000-22 = "Ah, eu adoro esse seu jeito, Sensei."
10009000-23 = "Ah, muito obrigada!"
10009000-24 = "Sensei!?"
10009000-25 = "Não, eu mesma disse isso, mas..."
10009000-26 = "Como você pode estar tão confiante...? Agradeço por querer ajudar, mas..."
10009000-27 = "E-enfim, muito obrigada! Sensei!"
10009000-28 = "[s] \"Se vocês duas estão se esforçando, quero ajudar no que puder.\""
10009000-29 = "Bem, é o Dia dos Namorados, afinal. Um dia para dar e receber chocolates e sentir a felicidade."
10009000-30 = "Temos que proteger esses sorrisos, já que somos da Valkyrie."
10009000-31 = "Fubuki...! Fiquei emocionada por saber que você pensava de forma tão nobre...!"
10009000-32 = "Bom, acima de tudo, se a gente se esforçar só nesse dia, depois os fornecedores nos dão um monte de donuts que sobraram!"
10009000-33 = "Ah, como é bom ser uma aluna da Academia de Polícia Valkyrie~."
10009000-34 = "Fubuki..."
10009000-35 = "Fufu. Enfim, é no dia do próximo Dia dos Namorados, viu?"
10009000-36 = "Conto com você, Sensei~."
10009000-39 = "#video;10008"
10009000-42 = "（Assim, fiz a promessa com Fubuki e Kirino e o dia do Dia dos Namorados chegou...）"
10009000-44 = "D.U. - Área Comercial"
10009000-46 = "（A área comercial no Dia dos Namorados estava transbordando de gente）"
10009000-47 = "O conjunto de chocolates rosé está com 20% de desconto sobre o preço normal!"
10009000-48 = "Aceitam um chocolate com menta? Em nossa loja, quem pedir um 'Parfait de Chocolate com Menta' ganha outro de graça!"
10009000-49 = "Para amigos, namorados, colegas ou até para aquela pessoa que você admira, espalhe a maravilha do chocolate com menta!"
10009000-50 = "Feliz Dia dos Namorados! Por isso, para aqueles que vierem à nossa loja com seus namorados...!!"
10009000-51 = "[s] \"Que agitação incrível...\""
10009000-52 = "（Enquanto sentia o entusiasmo na pele e observava os arredores...）"
10009000-61 = "E aí. Ouvi dizer que..."
10009000-62 = "vocês vendem 'Chocolate da Sorte' aqui?"
10009000-63 = "Ah, sim! Provavelmente está falando do chocolate em formato de trevo de quatro folhas que vendemos. Gostaria de um?"
10009000-64 = "Entendi. Então, se eu comer isso, vou ter sorte 'de verdade', né?"
10009000-65 = "Ah, bem, não... O nome é apenas 'Chocolate da Sorte', então, sobre ser 'de verdade'..."
10009000-66 = "Acabei de comprar um bilhete de loteria, então pensei em comer esse chocolate antes de conferir."
10009000-67 = "Bem, só de olhar para o primeiro número, vi que não ganhei em nenhum dos sorteios."
10009000-68 = "Talvez as coisas melhorem se eu comer esse chocolate, né? Afinal, é um \"chocolate da sorte\", não é!?"
10009000-69 = "[s] \"Não, não, não...\""
10009000-70 = "...Hã, quem é você?"
10009000-71 = "...Sensei do Schale? Está em patrulha?"
10009000-72 = "Cala a boca, não me faça de idiota! Eu já sei que perdi na loteria!"
10009000-73 = "Mas não dá para desistir do sonho, né!?"
10009000-75 = "Isso mesmo, não posso terminar desse jeito!"
