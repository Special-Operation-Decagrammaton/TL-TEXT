[translation]
10012090-1 = "Episódio 9; A Verdade sobre o Voucher do Resort"
10012090-6 = "U-uuh..."
10012090-7 = "Eu não aguento mais... não dá..."
10012090-14 = "...Muito bem, acabou! Rendam-se pacificamente!"
10012090-15 = "Se vocês se renderem, não temos intenção de continuar lutando."
10012090-17 = "Droga... não pode ser... isso é impossível..."
10012090-18 = "Como perdemos para apenas seis pessoas...!?"
10012090-19 = "Como nós, o Grupo Capacete Splash, que estávamos em uma sequência de vitórias na caça aos resorts, fomos derrotadas...!?"
10012090-21 = "...Sequência de vitórias?"
10012090-22 = "...Caça aos resorts?"
10012090-23 = "Mais uma história estranha apareceu, hein..."
10012090-25 = "..."
10012090-26 = "[s] \"...\""
10012090-28 = "[ns] \"...Wakamo.\""
10012090-29 = "...Peço perdão, meu querido."
10012090-30 = "Tudo por causa da minha incompetência..."
10012090-31 = "Mas eu, Wakamo, jamais desistirei...! Eu certamente irei..."
10012090-32 = "Por favor, me dê mais tempo. Desta vez, desta vez eu certamente..."
10012090-33 = "[s1] \"Wakamo, isso é um mal-entendido.\"\n[s2] \"Eu estou bem, Wakamo.\""
10012090-34 = "...Eh?"
10012090-35 = "...Eh?"
10012090-39 = "...Mal-entendido... o que você quer dizer com..."
10012090-40 = "[ns3] Aproximar-se de Wakamo.\n[ns4] Fazer carinho na cabeça de Wakamo."
10012090-47 = "...!?"
10012090-48 = "Se-Sensei...!?"
10012090-49 = "[s5] \"Seu traje de banho é adorável.\"\n[s6] \"Eu recebi seus sentimentos, Wakamo.\""
10012090-54 = "...?...?"
10012090-55 = "...Oh?"
10012090-56 = "[s] \"...Oh...?\""
10012090-57 = "Pe-pe..."
10012090-58 = "Peço mil desculpas!!"
10012090-63 = "...O que foi que aconteceu no final!?"
10012090-65 = "............Não."
10012090-66 = "Eu não aceito... eu nunca vou aceitar isso!!"
10012090-67 = "Não pense que vou desistir por causa disso! Quando eu conquistar as outras ilhas..."
10012090-68 = "Eu definitivamente vou tomar esta ilha também...!"
10012090-69 = "Eu... eu vou unificar este \"Arquipélago de Resorts\" e me tornar a governante deste lugar...!!"
10012090-70 = "Não, não, não, espere um pouco!"
10012090-71 = "Não aceita... o quê?"
10012090-72 = "Nós viemos para cá porque ganhamos um voucher de resort... mas que história é essa de arquipélago?"
10012090-73 = "Unificação de resorts e o que mais... sobre o que vocês estão falando?"
10012090-78 = "Caramba... é sério isso..."
10012090-79 = "Vocês não são \"Caçadoras de Resorts\"...? E nós perdemos para pessoas assim? Isso é inacreditável..."
10012090-80 = "Bem, tanto faz... já que vocês não sabem de nada, eu vou explicar."
10012090-81 = "Mesmo que vocês não tenham intenção de caçar resorts, pessoas como nós continuarão atacando vocês."
10012090-82 = "Todo mundo que está neste \"Arquipélago\" é inimigo."
10012090-84 = "...Caça aos resorts?"
10012090-85 = "...Arquipélago?"
10012090-86 = "O que isso significa..."
10012090-87 = "Ei, escutem quando alguém estiver falando! Nós temos o direito de uso deste resort, entenderam?"
10012090-89 = "Se for sobre o direito de uso do resort, nós também temos um, sabia?"
10012090-90 = "Olha, é isto aqui."
10012090-92 = "……Hã!? I-isso é... o quê?"
10012090-93 = "O que é isso... é a mesma coisa que a gente tem...?"
10012090-95 = "Vocês não vieram para cá porque ganharam algum tipo de sorteio?"
10012090-97 = "……!!"
10012090-98 = "Como você sabia disso...?"
10012090-99 = "Todo mundo que está aqui conseguiu isso de alguma forma e acabou vindo parar no 'Arquipélago'."
10012090-100 = "Além da gente, tem outras pessoas que possuem o direito de 'usar' este resort..."
10012090-102 = "……Tem um monte delas espalhadas por todo este arquipélago!"
10012090-105 = "Eeeeeeeh!!??"
10012090-113 = "I-isso é verdade...? Espera, onde está o contrato!?"
10012090-114 = "Está aqui... como ela disse, está escrito detalhadamente nas cláusulas abaixo."
10012090-115 = "O vencedor deste contrato (doravante denominado contratante) obtém o 'direito de uso' do 'Lost Paradise Resort'."
10012090-116 = "O 'direito de uso' mencionado acima refere-se à autoridade sobre todas as terras, bens e instalações dentro do resort e..."
10012090-117 = "Como alguém que pode possuir todos os lucros e recursos gerados por isso..."
10012090-118 = "……Não me diga que o 'direito de uso' significava isso?"
10012090-119 = "……Finalmente entendi. Isso é claramente uma cláusula abusiva. O que chamamos de cláusula que coloca a própria pessoa em desvantagem."
10012090-120 = "À primeira vista, parece um negócio justo, já que está escrito como se cada um tivesse contratado uma ilha específica, mas..."
10012090-121 = "O 'Lost Paradise Resort' mencionado no contrato é todo este arquipélago. Ou seja, todos possuem o mesmo direito."
10012090-122 = "Como o mapa no contrato mostra locais divididos em várias ilhas, a gente não percebe isso de início..."
10012090-123 = "Mas, aos poucos... as pessoas que entenderam a 'brecha' do contrato começaram a atacar outros arquipélagos... é isso, não é?"
10012090-124 = "Exatamente. É por isso que estamos fazendo essa 'caça aos resorts' agora!! Vocês não começaram a entender também?"
10012090-125 = "……Sim. É uma situação onde todos estão lutando, alegando que cada ilha é sua própria propriedade."
10012090-126 = "Pessoal, isso é perigoso. Este contrato e esta ilha... é melhor não nos envolvermos mais nisso."
10012090-127 = "É melhor voltarmos para Abydos o quanto antes, antes que sejamos arrastadas ainda mais para isso..."
10012090-129 = "…………!!"
10012090-130 = "……Achei uma brecha!!"
10012090-134 = "……! Cof, cof!! Ugh!?"
10012090-135 = "Uma bomba de fumaça...!? Não acredito que elas ainda tinham isso escondido...!"
10012090-136 = "Não pensem que isso acaba aqui! Na próxima vez que nos encontrarmos, não vou ser pega assim de novo!!"
10012090-137 = "Até quando vocês vão ficar aí paradas!! Vamos recuar por enquanto!! Vamos, todo mundo, recuar!!"
10012090-138 = "H-hein!? Ah, r-recuar!"
10012090-139 = "Recuar para o aerodeslizador!!"
10012090-144 = "Nossa... elas foram embora..."
10012090-146 = "……Uhe."
10012090-148 = "……Que gente apressada, sério mesmo."
