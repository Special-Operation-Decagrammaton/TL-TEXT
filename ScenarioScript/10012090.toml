[translation]
10012090-1 = "第9話;リゾート使用券の真実"
10012090-6 = "う、ううっ……。"
10012090-7 = "もうこれ以上は……む～り～……。"
10012090-14 = "……さあ、もう終わりよ！おとなしく降伏しなさい！"
10012090-15 = "降伏するなら、私たちはこれ以上戦うつもりはありません。"
10012090-17 = "くっ……そんな……あり得ないわよ……。"
10012090-18 = "たった6人相手に、なんで……！？"
10012090-19 = "今までリゾート狩りで連勝してきた、うちらジャブジャブヘルメット団が負けるなんて……！？"
10012090-21 = "……連勝？"
10012090-22 = "……リゾート狩り？"
10012090-23 = "またなんか変な話がでてきたねぇ～"
10012090-25 = "……。"
10012090-26 = "[s] \"……。\""
10012090-28 = "[ns] \"……ワカモ。\""
10012090-29 = "……申し訳ありません、あなた様。"
10012090-30 = "私が至らないばかりに……。"
10012090-31 = "ですが、このワカモ、絶対に諦めません……！必ずあなた様を……！"
10012090-32 = "私にお時間をください。今度こそ、今度こそ必ず……！"
10012090-33 = "[s1] \"ワカモ、それは誤解だよ。\"\n[s2] \"私は大丈夫だよ、ワカモ。\""
10012090-34 = "……え？"
10012090-35 = "……え？"
10012090-39 = "……誤解……とは、どういう……。"
10012090-40 = "[ns3] ワカモに近づく。\n[ns4] ワカモの頭を撫でる。"
10012090-47 = "……！？"
10012090-48 = "せ、先生……！？"
10012090-49 = "[s5] \"水着姿、可愛いよ。\"\n[s6] \"ワカモの気持ちは、ちゃんと受け取ったから。\""
10012090-54 = "……？……？"
10012090-55 = "……あら？"
10012090-56 = "[s] \"……あら……？\""
10012090-57 = "し、し……。"
10012090-58 = "失礼いたしましたー！！"
10012090-63 = "……結局なんだったのよ！？"
10012090-65 = "…………いや。"
10012090-66 = "うちは認めない……絶対に認めないからね！！"
10012090-67 = "これで諦めると思わないでよね！他の島を攻略した暁には……"
10012090-68 = "絶対にこの島も手に入れてやるんだから……！"
10012090-69 = "うちは……うちは必ずこの「リゾート群島」を統一して、ここの支配者になってやるんだから……！！"
10012090-70 = "い、いやいやいや、ちょっと待ってよ！"
10012090-71 = "認めないって……何を？"
10012090-72 = "私達はリゾート券が当たってここに来たのですが……リゾート群島、とは？"
10012090-73 = "リゾートの統一とかなんとか……あんた達いったい何の話してんの？"
10012090-78 = "げぇ……マジか……。"
10012090-79 = "あんたら「リゾートハンター」じゃないの……？こんなんにうちら負けたの？マジあり得ないんだけど……。"
10012090-80 = "まぁ、いいよもう……何も知らないみたいだし、教えてあげる。"
10012090-81 = "あんたらがリゾート狩りをするつもりがなくても、うちらみたいなのには襲われ続けるわよ。"
10012090-82 = "この「群島」にいるやつらは全員敵ってワケ。"
10012090-84 = "……リゾート狩り？"
10012090-85 = "……群島？"
10012090-86 = "それは、どういう……。"
10012090-87 = "ちょっと、人の話を聞きなさいよね！私らにはちゃんとここのリゾート使用権があるのよ？"
10012090-89 = "リゾート使用権なら、うちも持ってるわよ？"
10012090-90 = "ほら、これでしょ。"
10012090-92 = "……えっ！？こ、これは一体……。"
10012090-93 = "なにこれ……私らと同じもの……？"
10012090-95 = "あんたら、何かの景品に当たってここに来たんじゃない？"
10012090-97 = "……！！"
10012090-98 = "どうしてそれを……？"
10012090-99 = "ここにいる連中は皆、同じようになんらかの手段でコレを手に入れたから「群島」にやってきてんだよ。"
10012090-100 = "このリゾートを「使用」する権利を持ったやつらはうちら以外にも……"
10012090-102 = "……この群島全体にごまんといるのよ！"
10012090-105 = "えーーーーーっ！！？？"
10012090-113 = "そ、それって本当なの……？ちょっと、契約書どこ！？"
10012090-114 = "ここにあります……あの方の言う通り、下の約款のところにびっしりと書かれています。"
10012090-115 = "本契約書の当選者（以下契約者）は、「ロストパラダイスリゾート」の「使用権限」を得る。"
10012090-116 = "上記の「使用権限」とはリゾート内全ての土地、物品及び設備全てに対する権限と……。"
10012090-117 = "それによって生み出された、すべての収益と資源を所有できるものとして……"
10012090-118 = "……まさか「使用権」ってそういう意味だったの？"
10012090-119 = "……やっと理解しました。これは、明白な毒素条項ですね。いわゆる、自身が不利益な条項のことです。"
10012090-120 = "一見すると、島それぞれを契約したように書いてあるから、公正な取引に見えますが……"
10012090-121 = "契約書の指す「ロストパラダイスリゾート」はこの群島全体。つまり、みんな同じ権利を持っているわけです。"
10012090-122 = "契約書にある地図の場所がいくつかの島に分かれているから、最初はそれに気づかないだけで……"
10012090-123 = "でも少しずつ……契約の「穴」を理解した人たちが、他の群島を攻撃し始めている……そういうことですね？"
10012090-124 = "そういう事。だから今うちらが「リゾート狩り」をしてるってワケ！！あんた達もそろそろ分かってきたんじゃない？"
10012090-125 = "……はい。お互いにそれぞれの島を自分のものだと主張して戦ってる状況なんですね。"
10012090-126 = "みなさん、ここは危険です。この契約書もこの島も……深入りしない方がいい。"
10012090-127 = "私たちもこれ以上巻き込まれる前に、早くアビドスに帰った方が……。"
10012090-129 = "…………！！"
10012090-130 = "……隙あり！！"
10012090-134 = "……！ゲホ、ゲホ！！ううっ！？"
10012090-135 = "煙幕弾……！？こんなものをまだ隠していたなんて……！"
10012090-136 = "これで終わりだと思わないでよね！次会った時は今みたいにやられないんだから！！"
10012090-137 = "いつまで寝てんのよ！！一旦退却するわよ！！ほら、総員退却！！"
10012090-138 = "は、はい！？あっ、た、退却！"
10012090-139 = "ホバークラフトへ退却ー！！"
10012090-144 = "あら……行ってしまいましたね……。"
10012090-146 = "……うへ。"
10012090-148 = "……忙しないねぇ、本当に。"
