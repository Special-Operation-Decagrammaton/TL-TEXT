[translation]
10023070-1 = "第7話;これは危険なゲームです"
10023070-4 = "うぅぅ……"
10023070-5 = "前が全然見えない……"
10023070-10 = "いたっ！誰か足踏んだでしょ！？"
10023070-12 = "お姉ちゃん、しーっ！静かに！"
10023070-18 = "っ！？皆さん、気をつけてください。足元が滑りやすくなっています。"
10023070-19 = "うわーん！それはアリスの髪の毛です！"
10023070-20 = "[s] \"この階段、どこまでも続いてるような……\""
10023070-22 = "もうかなり歩いたはずなのに……慎重に進んでいるからそう感じるのかもしれませんが……"
10023070-31 = "あぅ！なんかぶつかった……！"
10023070-32 = "えっ、それって……"
10023070-34 = "これは……"
10023070-35 = "ドアでしょうか……"
10023070-48 = "次のブツはどうした、早くせんか！"
10023070-49 = "今日の目玉はいつ出るんだ！？#n金なら持ってきたぞ！"
10023070-50 = "……落札できる自信はないが、一度くらい本物を拝んでおきたいものだ。"
10023070-51 = "そうです！我々は、アレのために来てるんですよ！"
10023070-52 = "早く見せてください……"
10023070-54 = "――「時計王の冠」を！"
10023070-56 = "え、えっ……？"
10023070-57 = "オークションは明日のはずじゃ……どうして、地下で……？"
10023070-59 = "まあまあ、皆様どうか落ち着いてください。#n他にも素敵な品を多数ご用意しておりますから。"
10023070-60 = "夜は長いですから、どうぞごゆるりとお楽しみください。#n「王冠」は一番最後のお楽しみということで――"
10023070-62 = "はんっ、見せるだけなら今でも構わないだろう！"
10023070-63 = "なにを勿体ぶる必要があるんですか、[ruby=めいたろう]明太郎[/ruby]さん！"
10023070-64 = "それに、昨日は「慈愛の怪盗」が現れたんだろう？#nオークションを開催して大丈夫なのか？"
10023070-65 = "そうですよ！一番不安なのは明太郎さんでしょうけど、私たちも同じ気持ちです！"
10023070-66 = "ハッハッハッ！予告状が届いたのですから、当然対策しておりますとも。#n――あのC&Cとシャーレを屋敷の警備に雇ったのですから！"
10023070-67 = "彼女たちが時間稼ぎをしてくれている間に、我々はオークションを終わらせる。"
10023070-68 = "もちろん怪盗を捕らえられるのなら、それに越したことはないですが……#n私としては共倒れになろうと一向に構いません！"
10023070-69 = "それに――もし「慈愛の怪盗」が彼女らを破ってここにたどり着いたとしても、それまでの戦闘で消耗している事でしょう。であれば、後は私の付き人で十分。"
10023070-74 = "たしかに……それであれば万全の対策と言えるでしょう。#n流石は明太郎さん。"
10023070-75 = "早く次のオークションに移りましょうよ。"
10023070-76 = "でないと、いつになっても「時計王の冠」を拝めないじゃないですか！"
10023070-77 = "ありがとうございます。"
10023070-78 = "次は……こちらの「ゴールデンカナリア」です！"
10023070-79 = "隕石から産出したイエローダイヤモンドを磨き上げた、こちらの逸品……なんと！"
10023070-80 = "ブラックマーケットで抗争の火種となってから、#n紆余曲折あり私のもとへ渡ってきた訳アリの品でして――"
10023070-85 = "明太郎さん……？"
10023070-86 = "なるほど。どこに行ったかと思えば、こんなところに居たのですね。"
10023070-87 = "そして、取引されている品は、どれも所在が不明になっている盗品ばかり……。"
10023070-89 = "RPGのオークション会場では、貴重なアーティファクトが取引されたり、敵の陰謀に繋がる手がかりが見つかる場所ですが……"
10023070-93 = "アリス、思い出しました！オークションに参加するには、フラグを立てないといけません！#n特殊なクエストをクリアするか、レアモンスターを倒して大量のクレジットを用意する必要があります！"
10023070-94 = "あそこに居るのが、このエリアのレアモンスターですか？"
10023070-95 = "[s] \"モンスターでは無いからね！？\""
10023070-100 = "むむ、何か騒がしいような……"
10023070-108 = "……はっ、何故ここにC&Cが！？"
10023070-109 = "あなた達は「慈愛の怪盗」を相手にしているはずでは……？"
10023070-111 = "し、C&Cだと？#n話が違うじゃないか、明太郎さん！"
10023070-112 = "私たちを騙していたのか？"
10023070-113 = "「時計王の冠」――C&Cが探していた盗品は、ここにあったのですね。"
10023070-114 = "！！！"
10023070-115 = "ふむ、どうやらそれだけではないようですね。#n「我が子を持ち上げるフラヌス」に「落葉拾いのイナンナ」。#n――「ウェヌスの石像」まであるだなんて。"
10023070-116 = "[s] \"トキ、何か心当たりがあるの？\""
10023070-117 = "ええ――全て、犯罪組織の間で違法に取引されていた美術品です。"
10023070-118 = "[s1] \"トキのもう一つの任務って……\"\n[s2] \"盗品の行方を追う事……？\""
10023070-121 = "はい、先生の仰る通りです。"
10023070-122 = "私の任務は「時計王の冠」をはじめ、盗品の行方を明らかにする事です。"
10023070-123 = "「慈愛の怪盗」を追えば盗品にたどり着くと考え、屋敷に来ましたが……#n――まさか地下で違法取引が行われていたとは。"
10023070-124 = "は、話と違うじゃないか！#nそんなの私は聞いとらんぞ！"
10023070-125 = "ええ、聞かれておりませんので。"
10023070-129 = "むむむ……！"
10023070-131 = "お前たち、C&Cの身柄を拘束しろ……くれぐれも「丁重」にな！"
