[translation]
10023070-1 = "Episódio 7; Este é um jogo perigoso"
10023070-4 = "Uuu..."
10023070-5 = "Não consigo ver nada à frente..."
10023070-10 = "Ai! Alguém pisou no meu pé, não foi!?"
10023070-12 = "Irmã, shiu! Fique quieta!"
10023070-18 = "!? Pessoal, tomem cuidado. O chão está escorregadio."
10023070-19 = "Uwaaan! Isso é o cabelo da Alice!"
10023070-20 = "[s] \"Essa escada parece não ter fim...\""
10023070-22 = "Deveríamos ter caminhado bastante já... Talvez eu sinta isso porque estamos avançando com cautela..."
10023070-31 = "Au! Algo bateu em mim...!"
10023070-32 = "Ei, isso é..."
10023070-34 = "Isto é..."
10023070-35 = "Será uma porta..."
10023070-48 = "O que houve com o próximo item? Andem logo!"
10023070-49 = "Quando vai aparecer a atração principal de hoje!? #nEu trouxe o dinheiro!"
10023070-50 = "...Não tenho confiança de que conseguirei o lance vencedor, mas quero ver o item real pelo menos uma vez."
10023070-51 = "Isso mesmo! Nós viemos por causa daquilo!"
10023070-52 = "Mostre logo..."
10023070-54 = "――A \"Coroa do Rei do Relógio\"!"
10023070-56 = "Eh, eh...?"
10023070-57 = "O leilão não era para ser amanhã...? Por que aqui no subsolo...?"
10023070-59 = "Ora, ora, por favor, acalmem-se todos. #nPreparamos muitos outros itens maravilhosos também."
10023070-60 = "A noite é longa, então, por favor, aproveitem com calma. #nA \"Coroa\" será a diversão final――"
10023070-62 = "Hmph, se é só para mostrar, pode ser agora mesmo!"
10023070-63 = "Por que precisa fazer tanto mistério, Meitaro-san!"
10023070-64 = "Além disso, ontem o \"Ladrão da Benevolência\" apareceu, não foi? #nÉ seguro realizar o leilão?"
10023070-65 = "É verdade! O mais preocupado deve ser o Meitaro-san, mas nós sentimos o mesmo!"
10023070-66 = "Hahaha! Como a carta de aviso chegou, é claro que tomamos medidas. #n――Contratamos a C&C e o Schale para a segurança da mansão!"
10023070-67 = "Enquanto elas ganham tempo, nós terminaremos o leilão."
10023070-68 = "Claro, se conseguirem capturar o ladrão, melhor ainda... #nMas, para mim, não me importo se ambos se destruírem!"
10023070-69 = "Além disso――mesmo que o \"Ladrão da Benevolência\" supere elas e chegue aqui, ele estará exausto das batalhas. Nesse caso, meus assistentes serão o suficiente."
10023070-74 = "De fato... Nesse caso, pode-se dizer que é uma medida infalível. #nComo esperado do Meitaro-san."
10023070-75 = "Vamos logo para o próximo item do leilão."
10023070-76 = "Senão, nunca vamos conseguir ver a \"Coroa do Rei do Relógio\"!"
10023070-77 = "Obrigado."
10023070-78 = "O próximo é... este \"Canário Dourado\"!"
10023070-79 = "Esta obra-prima, um diamante amarelo polido extraído de um meteorito... vejam só!"
10023070-80 = "Depois de ser o estopim de um conflito no mercado negro, #npassou por muitas reviravoltas até chegar a mim, um item com um passado complicado――"
10023070-85 = "Meitaro-san...?"
10023070-86 = "Entendo. Eu me perguntava para onde você tinha ido, e você estava aqui."
10023070-87 = "E os itens sendo negociados são todos produtos roubados com paradeiro desconhecido..."
10023070-89 = "No leilão de um RPG, é um lugar onde artefatos valiosos são negociados ou pistas que levam às conspirações dos inimigos são encontradas, mas..."
10023070-93 = "Alice, lembrei! Para participar do leilão, precisamos ativar um gatilho! #nPrecisamos completar uma missão especial ou derrotar monstros raros para conseguir uma grande quantidade de créditos!"
10023070-94 = "Aquele ali é o monstro raro desta área?"
10023070-95 = "[s] \"Não é um monstro, né!?\""
10023070-100 = "Hmm, parece que está barulhento..."
10023070-108 = "...Ah, por que a C&C está aqui!?"
10023070-109 = "Vocês não deveriam estar lidando com o \"Ladrão da Benevolência\"...?"
10023070-111 = "C, C&C? #nA história não era essa, Meitaro-san!"
10023070-112 = "Você nos enganou?"
10023070-113 = "「Coroa do Rei Relojoeiro」―― o item roubado que a C&C estava procurando estava aqui, não é?"
10023070-114 = "!!!"
10023070-115 = "Hum, parece que não é só isso. #n「Phlanus Levantando seu Filho」 e 「Inanna Coletora de Folhas Caídas」. #n―― até mesmo a 「Estátua de Vênus」 está aqui."
10023070-116 = "[s] \"Toki, você tem alguma ideia do que seja isso?\""
10023070-117 = "Sim ―― todas são obras de arte que estavam sendo negociadas ilegalmente entre organizações criminosas."
10023070-118 = "[s1] \"A outra missão da Toki é...\"\n[s2] \"...rastrear o paradeiro dos itens roubados?\""
10023070-121 = "Sim, como o Sensei disse."
10023070-122 = "Minha missão é revelar o paradeiro dos itens roubados, começando pela 「Coroa do Rei Relojoeiro」."
10023070-123 = "Pensei que chegaria aos itens roubados se seguisse o 「Ladrão da Benevolência」 e vim até a mansão, mas... #n―― quem diria que negociações ilegais estavam acontecendo no subsolo."
10023070-124 = "I-isso não é o que combinamos! #nEu não fiquei sabendo de nada disso!"
10023070-125 = "Sim, porque ninguém lhe contou."
10023070-129 = "Mmm...!"
10023070-131 = "Vocês, prendam o pessoal da C&C... e tratem-nos com bastante 「delicadeza」!"
