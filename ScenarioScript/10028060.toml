10028060-114 = "Nossa, isso é..."
10028060-115 = "Agora entendi o que as veteranas queriam dizer... hahaha..."
10028060-116 = "Depois de ouvir isso, não tenho mais nada a dizer."
10028060-117 = "Não consigo dizer nada... Sinto que tirei um peso das costas."
10028060-118 = "Você saber de tudo... mas, inesperadamente, isso não é ruim."
10028060-119 = "Hmm..."
10028060-120 = "..."
10028060-121 = "...Hehe."
10028060-122 = "Fiquei muito feliz por ter conversado com você hoje, Sensei."
10028060-123 = "Bem, eu falhei no trabalho, mas..."
10028060-124 = "Quanto a isso, parece que você vai se desculpar comigo também..."
10028060-125 = "Vou aceitar sua ajuda de bom grado!#n...Digo, hehe."
10028060-129 = "Diga... Sensei."
10028060-130 = "Já que estamos aqui, ou melhor..."
10028060-131 = "Se não for pedir muito, eu tenho um favor a lhe pedir."
10028060-132 = "Se... se você puder, é claro."
10028060-133 = "Aquele meu estado de agora há pouco..."
10028060-134 = "...Para o pessoal da Trinity, por favor..."
10028060-135 = "[s13] \"Tudo bem, não contarei a ninguém.\"\n[s14] \"Vamos manter isso como um segredo só nosso.\""
10028060-147 = "Ah, puxa..."
10028060-148 = "Nem precisava ter pedido, né... Você já sabia de tudo."
10028060-149 = "Sinto que você vê através de tudo, o que me deixa um pouco confusa e envergonhada.#nMas, ao mesmo tempo, um pouco feliz..."
10028060-150 = "...É um sentimento estranho."
10028060-154 = "...Acho que isso é perigoso. Se continuar assim, vou acabar dependendo demais de você, Sensei."
