10028060-210 = "Enquanto eu estiver aqui!"
10028060-215 = "……entendi."
10028060-216 = "Então era…… isso que estava acontecendo."
10028060-217 = "[s17] \"A Kasumi pretendia fugir desse jeito desde o começo, né……\"\n[s18] \"E a Kasumi, que deveria dar as ordens, está desmaiada……\""
10028060-220 = "Haha……hahaha……"
