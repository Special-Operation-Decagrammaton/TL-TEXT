[translation]
10028060-1 = "第6話;努力の存在"
10028060-3 = "……ははっ。"
10028060-15 = "ははは……"
10028060-16 = "いやぁ……疲れたっす。#nあれだけ暴れたんで、当然といえば当然っすけど。"
10028060-17 = "でも、なんとか先頭まで着いたっす！#nあとは列車を止めるだけっすね。"
10028060-18 = "……ははっ！"
10028060-19 = "[s1] \"い、イチカ……大丈夫？\"\n[s2] \"遺物は壊れちゃったみたいだけど……。\""
10028060-22 = "はは……そう、っすね……遺物……"
10028060-34 = "……ティーカップだかマグカップでしたっけ……#nもう、クビになろうがなんだって……いいっす……"
10028060-35 = "ただ持ってこいとは言われたけど、中身の状態までは言われてないんで！#nこのままでも大丈夫じゃないっすかね！ははっ！"
10028060-36 = "……はは、は。"
10028060-37 = "…………。"
10028060-38 = "……はぁ。"
10028060-39 = "なに言ってるんすかね、私。"
10028060-40 = "すみません、先生。こんな姿を見せるつもりじゃ……"
10028060-41 = "……久々にやらかしたっす……本当に酷かったっすよね。"
10028060-42 = "今日はいいとこを見せるだなんて言っといて……"
10028060-43 = "一番見せたくなかった姿が、ここぞってときに出ちゃいました。"
10028060-44 = "はあ……"
10028060-45 = "もうちょっと、我慢するべきだったのに……"
10028060-46 = "どうしてっすかね……"
10028060-50 = "……へ？"
10028060-51 = "ガッカリなんかしてないって……？"
10028060-52 = "んー……でも私、失敗したんすよ……？"
10028060-53 = "そうっすよね？"
10028060-54 = "それはそう、って……？"
10028060-55 = "や、やっぱ先生も失敗だって思ってるんじゃないっすか……"
10028060-56 = "……？"
10028060-57 = "な、何っすか……？"
10028060-58 = "[s] \"でも……\""
10028060-62 = "[ns3] \"十分我慢してたと思うよ。\"\n[ns4] \"私もイチカのおかげでスッキリしたから……共犯だね！\""
10028060-66 = "……ふっ。"
10028060-67 = "あははっ！"
10028060-68 = "何すかそれ！#n結局先生も、私と同じように感じてたってことすか？"
10028060-69 = "やっぱ、そうっすよね？#nさすがに、あれは限界だったというか……"
10028060-70 = "……そうっすよ！#nほんと、自分でもよく耐えた方だと思うっす！あはははっ！"
10028060-71 = "[s5] \"あはははっ！！\"\n[s6] \"ハーハッハッハッハ！！\""
10028060-72 = "はははっ！！"
10028060-73 = "……その笑い方は嫌っす。"
10028060-77 = "……あーあ。"
10028060-78 = "まあ、仕方ないっすね。後のことは、帰ってから考えますよ。"
10028060-79 = "先生は関係ないってちゃんと伝えるんで、そこは心配しなくても大丈夫っす。"
10028060-80 = "……はい？"
10028060-81 = "一緒に行く、ってどこにっすか？"
10028060-82 = "……ティーパーティーに？"
10028060-83 = "……何でですか？"
10028060-84 = "[s7] \"一緒に行って謝るよ。\"\n[s8] \"イチカ1人に行かせるわけにはいかないからね。\""
10028060-87 = "……？？"
10028060-88 = "いや……先生が一緒に謝る必要はどこにもないっすよ。"
10028060-89 = "カバンの輸送と先生のサポートを任されたのは私っすから……自業自得というか。"
10028060-90 = "私の性格に問題があるからなのに……#nなのに、どうして先生が――"
10028060-91 = "[s9] \"えっ？イチカは良い生徒だよ。\"\n[s10] \"イチカの性格に問題なんてないよ？\""
10028060-94 = "なに言ってるんすか……別に慰めてくれなくても大丈夫っすよ。"
10028060-95 = "自分の性格に問題があるのは、自分が一番知ってるっす。#nだから、なるべく普段は押さえてるわけで……"
10028060-96 = "けど、さっきも見たっすよね。#n結局、ああやって爆発するんすよ。"
10028060-97 = "生まれつきの性格はアレなんで……#nもしそう見えたとしたら、うまく取り繕えてるってことっすかね。"
10028060-98 = "「先生」のことだから、もう分かってると思ってたんすけど……"
10028060-99 = "もしかして、慰めてくれたんすか？"
10028060-100 = "……？#nそうじゃないなら、どういう意味で……"
10028060-101 = "[s11] \"イチカは我慢しようと頑張ってたよね。\"\n[s12] \"それは変わろう……変わりたいと思ってるってことだから。\""
10028060-107 = "……！"
10028060-108 = "……。"
10028060-109 = "……ええっと。"
10028060-110 = "本当に……"
10028060-111 = "……ははっ。"
10028060-112 = "まさか、そんな言葉が返ってくるだなんて……正直、思いもしなかったっす。"
10028060-113 = "先生は、なんというか……言葉の魔術師みたいっすね。"
10028060-114 = "いやぁ、これは……"
10028060-115 = "先輩方の言う意味が分かったっす……ははは……"
10028060-116 = "そこまで言われたら、もう。"
10028060-117 = "私には何も言えないっすね……なんか気持ちがスッキリしました。"
10028060-118 = "先生には全部バレてるとは……でも、案外これも悪くないというか。"
10028060-119 = "んー……"
10028060-120 = "……。"
10028060-121 = "……ひひっ。"
10028060-122 = "今日は先生と話せて、本当に良かったです。"
10028060-123 = "まあ、仕事は失敗したっすけどね……"
10028060-124 = "それに関しては、先生も一緒に謝ってくれるみたいですし……"
10028060-125 = "ここは素直に甘えさせてもらうっす！#n……なんて、へへっ。"
10028060-129 = "その……先生。"
10028060-130 = "せっかくというか、その……"
10028060-131 = "できればでいいんすが、一つお願いがありまして。"
10028060-132 = "もし……もし、よければなんですけど。"
10028060-133 = "さっきの私の姿……"
10028060-134 = "……トリニティの方たちには、その……"
10028060-135 = "[s13] \"大丈夫だよ、誰にも言わないから。\"\n[s14] \"2人だけの秘密にしておこう。\""
10028060-147 = "あー、もう……"
10028060-148 = "わざわざ言うまでもなかったっすね……全部お見通しかぁ。"
10028060-149 = "何もかも見透かされて、なんだか困るような、恥ずかしいような。#nでも、ちょっと嬉しいような……"
10028060-150 = "……不思議な感じっす。"
10028060-154 = "……マズい気がしますね。このままだと、もっと先生に甘えちゃいそうで。"
10028060-155 = "建前とかではなく、本当に危険なんっすよ。"
10028060-156 = "先生さえいれば、どうにでもなる――そんな風に思っちゃいそうっすから。"
10028060-157 = "大人に甘えるなんて、私らしくないっすよね。"
10028060-158 = "まあ別に、嫌ってわけじゃないんすけど……"
10028060-163 = "……ん？"
10028060-164 = "アレ、何すかね……？"
10028060-165 = "先生……あの、ほら、川の上に架かってる橋に……何かあるの見えます？"
10028060-166 = "……あれって。"
10028060-172 = "[ns15] \"温泉開発部、だよね……？\"\n[ns16] \"どう見ても爆発物だよね……\""
10028060-176 = "……へ？"
10028060-177 = "……何で？？"
10028060-178 = "何であそこに……爆発物があるんすか？"
10028060-179 = "こっちには、温泉開発部の部長が乗ってるんすよ……？"
10028060-180 = "……待った、部長が乗ってる……？"
10028060-184 = "……あ。"
10028060-187 = "元々の予定では、とある地点で爆弾を起爆し列車を横転させた後――"
10028060-189 = "そして騒ぎに乗じて部員たちと合流……っと。#nそれで逃げる計画だったんだが。"
10028060-191 = "そんな顔で見ないでもらいたいな！"
10028060-193 = "心配するな、私がいる限りそんなことは起きない！"
10028060-195 = "……私がいる限りはな！"
10028060-198 = "爆弾を起爆し列車を横転……"
10028060-204 = "そんなことは起きない！……私がいる限りはな！"
10028060-210 = "[ruby=・   ・   ・   ・   ・   ・]私がいる限り[/ruby]！"
10028060-215 = "……なる、ほど。"
10028060-216 = "こういうこと……だったんすね。"
10028060-217 = "[s17] \"最初からこの方法でカスミは逃亡するつもりだったもんね……\"\n[s18] \"指令を出すはずだったカスミは、気絶してるわけで……\""
10028060-220 = "はは……はははっ……"
10028060-221 = "あの人……最後の最後まで、やってくれますね……"
10028060-223 = "はぁ……本当にイヤになるっす……"
