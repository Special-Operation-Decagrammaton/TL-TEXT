10028060-184 = "……ah."
10028060-187 = "O plano original era detonar a bomba em um certo ponto para fazer o trem tombar e então——"
10028060-189 = "E aproveitar a confusão para me reunir com os membros do departamento…… é. Esse era o plano de fuga."
