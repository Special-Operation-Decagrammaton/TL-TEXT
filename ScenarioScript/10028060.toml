10028060-58 = "[s] \"Mas……\""
10028060-62 = "[ns3] \"Eu acho que você se segurou bastante.\"\n[ns4] \"Eu também me senti aliviado graças à Ichika…… então somos cúmplices!\""
10028060-66 = "……Pff."
10028060-67 = "Ahahaha!"
10028060-68 = "O que é isso! #nNo fim das contas, você sentiu a mesma coisa que eu?"
10028060-69 = "Pois é, né? #nAquele momento foi o meu limite, por assim dizer……"
10028060-70 = "……É isso mesmo! #nSinceramente, acho que até que aguentei bastante! Ahahahaha!"
10028060-71 = "[s5] \"Ahahahaha!!\"\n[s6] \"HA-HA-HA-HA!!\""
10028060-72 = "Hahaha!!"
10028060-73 = "……Eu não gosto desse jeito que você ri."
10028060-77 = "……Ah, droga."
10028060-78 = "Bem, não tem jeito. Vou pensar no que fazer depois que voltarmos."
10028060-79 = "Vou deixar bem claro que o Sensei não tem nada a ver com isso, então não precisa se preocupar."
10028060-80 = "……Sim?"
10028060-81 = "Você vai junto? Para onde?"
10028060-82 = "……Para a Festa do Chá?"
10028060-83 = "……Por que?"
10028060-84 = "[s7] \"Vou junto para pedir desculpas.\"\n[s8] \"Não posso deixar a Ichika ir sozinha.\""
10028060-87 = "……??"
10028060-88 = "Não…… não tem motivo nenhum para o Sensei pedir desculpas junto comigo."
10028060-89 = "Fui eu quem ficou responsável pelo transporte da mala e pelo seu suporte, Sensei…… então, foi minha própria culpa."
10028060-90 = "É porque a minha personalidade é problemática...#nMas, por que o Sensei..."
10028060-91 = "[s9] \"Ei? Ichika é uma boa aluna.\"\n[s10] \"A personalidade da Ichika não tem problema nenhum.\""
10028060-94 = "O que você está dizendo... Não precisa me consolar, eu estou bem."
10028060-95 = "Eu sou a primeira a saber que minha personalidade é problemática.#nPor isso, tento mantê-la sob controle na maior parte do tempo..."
10028060-96 = "Mas você viu agora há pouco, não viu?#nNo fim, eu acabo explodindo daquele jeito."
10028060-97 = "Minha personalidade natural é assim mesmo...#nSe pareceu diferente, talvez seja porque eu consegui disfarçar bem."
10028060-98 = "Sendo o \"Sensei\", achei que você já tivesse entendido..."
10028060-99 = "Por acaso, você estava me consolando?"
10028060-100 = "...?#nSe não foi isso, então o que você quis dizer..."
10028060-101 = "[s11] \"A Ichika estava se esforçando para aguentar, não estava?\"\n[s12] \"Isso significa que você quer mudar... que você está tentando mudar.\""
10028060-107 = "...!"
10028060-108 = "..."
