[translation]
10029005-1 = "プロローグ;もう一つの学園都市"
10029005-2 = "（仕事を終え休憩室のソファで横になっていた、とある日の午後）"
10029005-8 = "……あ、先生。いま時間大丈夫？"
10029005-9 = "[s1] \"どうしたの、エイミ？\"\n[s2] \"もちろん、大丈夫だよ。\""
10029005-12 = "うーん……#n通信で話しても良いんだけど、来てもらった方が早いかも。"
10029005-13 = "この後、ミレニアムに来てもらえる？"
10029005-14 = "……？"
10029005-15 = "ああ、ごめん。#nせめて概要だけでも説明したほうがいいか。"
10029005-16 = "ある程度把握していた方が、先生も移動中に考えることができるだろうし……"
10029005-17 = "その方が効率的だったね。#nちょっと重ための相談だし。"
10029005-18 = "……特異現象捜査部の活動で廃墟を調査してたら、遭難者を発見したの。#nそれで、ひとまずミレニアムに連れてきたんだけど……"
10029005-19 = "部長が言うには、その人たち……"
10029005-20 = "――どうやら、[ruby=・   ・   ・   ・]別の世界[/ruby]から来たみたい。"
10029005-22 = "#video;10029"
