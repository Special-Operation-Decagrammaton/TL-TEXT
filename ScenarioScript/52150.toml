[translation]
52150-1 = "Episódio 15: O Fim do Doce Sonho"
52150-7 = "Uaaah..."
52150-12 = "O que foi? Não conseguiu dormir bem?"
52150-13 = "Hmm... talvez seja porque eu tive um sonho?"
52150-15 = "...Um pesadelo?"
52150-16 = "Não é isso. Foi um sonho bom."
52150-17 = "Um mundo pacífico, sem pilhas de pedidos para resolver, sem incidentes repentinos..."
52150-22 = "Então, por que você parece tão triste...?"
52150-26 = "Pesadelos acabam quando você acorda..."
52150-27 = "Mas, quando você acorda de um sonho feliz, precisa encarar a realidade."
52150-28 = "É doloroso sentir saudade do sonho e querer negar a realidade..."
52150-29 = "...Ou algo assim que disseram em um filme!"
52150-31 = "Você sempre diz as coisas certas, Ayame..."
52150-32 = "Sonhos felizes são mais dolorosos do que pesadelos."
52150-33 = "Se aquilo fosse um sonho... eu preferiria que durasse para sempre..."
52150-49 = "...Parece que você acordou."
52150-55 = "...Ayame?"
52150-56 = "Quanto tempo, Nagusa."
52150-57 = "Onde é que eu estou..."
52150-61 = "Onde estão os outros...? E o Sensei do Schale?"
52150-62 = "Está tudo bem. Eles estão na sala ao lado."
52150-63 = "Todos estão a salvo. O Sensei do Schale só está dormindo."
52150-67 = "E a Ayame que estava comigo até agora...?"
52150-68 = "E esse \"quanto tempo\"..."
52150-69 = "Aquilo era algo criado pelo Hyakki Yakou, que se alimenta do medo."
52150-70 = "Eu não sinto medo daquela forma..."
52150-71 = "É mesmo? Mas foi o seu coração que criou aquilo."
52150-75 = "...No fundo, você já sabia, não é?"
52150-76 = "Que esse era um sonho que um dia desapareceria. E que a realidade cruel está bem diante dos seus olhos."
52150-78 = "E-eu não... não sabia de nada..."
52150-82 = "Já chega!"
52150-83 = "Sempre dando desculpas! Sempre dependendo de alguém!"
52150-84 = "Até quando você vai continuar com isso?"
52150-87 = "...Ah, mas o que aquela ilusão disse é verdade. #nNa verdade, eu senti que tinha chegado ao meu limite e fui procurar pela Lady Kuzunoha."
52150-88 = "Eu estava cansada dos \"desejos dos outros\"... naquela época."
52150-91 = "Sabe, eu detestava..."
52150-92 = "Aqueles que se agarram aos outros só porque não conseguem fazer nada sozinhos."
52150-93 = "Aqueles que fingem ser gentis, mas continuam jogando seus fardos nas costas dos outros."
52150-94 = "E você, que começa a chorar assim que algo acontece..."
52150-98 = "Eu realmente detestava."
52150-102 = "Mas, como presidente do Hyakka Ryoran, eu queria proteger \"esta realidade\". Por isso fui procurar a Lady Kuzunoha, mas... tudo o que encontrei foram contos de fadas inúteis."
52150-103 = "Então, eu decidi. Se a Grande Profetisa de Hyakki Yakou é apenas um conto de fadas... #nentão eu usarei o Livro Estranho para torná-la realidade."
52150-104 = "E assim, eu receberei os olhos que vigiam a todos..."
52150-105 = "Não faça isso, Ayame... Você com certeza está sendo enganada pela Kokuriko."
52150-106 = "Você nunca vai entender."
52150-107 = "O que eu sentia quando sorria para todos vocês."
52150-108 = "Não é verdade... isso não é verdade. Podemos conversar agora..."
52150-112 = "Que hipocrisia."
52150-113 = "Você virou as costas para mim e preferiu se divertir com aquela \"coisa\" conveniente."
52150-114 = "Ayame, eu..."
52150-115 = "Eu não te avisei?"
52150-116 = "Eu nunca..."
52150-121 = "Eu nunca te considerei uma amiga."
52150-126 = "Próximo episódio: Flores Artificiais"
