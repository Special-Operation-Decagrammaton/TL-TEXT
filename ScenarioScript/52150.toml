[translation]
52150-1 = "Episódio 15; O Fim do Doce Sonho"
52150-7 = "Piaaaa......"
52150-12 = "O que foi? Não conseguiu dormir muito?"
52150-13 = "Hmm...... talvez seja porque eu sonhei?"
52150-15 = "......Um pesadelo?"
52150-16 = "De jeito nenhum. Foi um sonho bom."
52150-17 = "Um mundo pacífico, sem pilhas de pedidos e sem incidentes repentinos......"
52150-22 = "Então por que você está com essa cara de quem está sofrendo......?"
52150-26 = "Pesadelos terminam quando acordamos......"
52150-27 = "Mas, quando acordamos de um sonho feliz, temos que encarar a realidade."
52150-28 = "A parte difícil é sentir saudade do sonho e querer negar a realidade......"
52150-29 = "......Pelo menos, foi o que disseram em algum filme!"
52150-31 = "Você sempre tem razão, Ayame......"
52150-32 = "Sonhos felizes são mais dolorosos que pesadelos."
52150-33 = "Se aquilo era um sonho...... eu preferia que fosse eterno......"
52150-49 = "......Parece que você acordou."
52150-55 = "......Ayame?"
52150-56 = "Há quanto tempo. Nagusa."
52150-57 = "Aqui é......"
52150-61 = "E os outros......? E o Sensei [USERNAME]?"
52150-62 = "Está tudo bem. Eles estão no quarto ao lado."
52150-63 = "Todos estão seguros. O Sensei da Schale está dormindo, mas."
52150-67 = "E a Ayame com quem eu estava até agora......?"
52150-68 = "E 'há quanto tempo'......"
52150-69 = "'Aquilo' foi algo criado pela Hyakumonogatari, que se alimenta de medo."
52150-70 = "Eu não tive medo daquela forma......"
52150-71 = "É mesmo? Mas 'aquilo' nasceu do seu próprio coração."
52150-75 = "......Na verdade, você já sabia disso há muito tempo, não sabia?"
52150-76 = "Que esse era um sonho que um dia desapareceria. E que a realidade cruel está bem na sua frente."
52150-78 = "I, isso não é...... eu não sei......"
52150-82 = "Já chega!"
52150-83 = "Sempre, sempre, sempre arrumando desculpas! Dependendo de alguém!"
52150-84 = "Até quando você vai continuar assim?"
52150-87 = "......Mas, o que aquele fantasma disse é verdade. #n Na verdade, eu estava sentindo meu limite quando fui procurar Kuzunoha-sama."
52150-88 = "Eu estava cansada dos 'desejos alheios'...... naquela época."
52150-91 = "Sabe, eu detestava isso......"
52150-92 = "Pessoas que se agarram aos outros porque não conseguem fazer nada sozinhas."
52150-93 = "Pessoas que se fingem de compreensivas com palavras bonitas, mas continuam empurrando seus fardos para mim."
52150-94 = "E você, que começa a chorar assim que algo acontece......"
52150-98 = "Eu realmente, detestava."
52150-102 = "Mas, como presidente da Hyakkaryouran, eu queria proteger 'esta realidade'. Por isso fui procurar Kuzunoha-sama...... mas tudo o que encontrei foram contos de fadas inúteis."
52150-103 = "Então, eu decidi. Se a Grande Profeta de Hyakkiyako era apenas um conto de fadas―― eu usaria o livro misterioso para torná-la real."
52150-104 = "E então, eu ganharia os olhos para observar a todos......"
52150-105 = "Não faça isso, Ayame...... com certeza você está sendo enganada por Kokuriko."
52150-106 = "Você nunca vai entender, nem em toda a sua vida."
52150-107 = "Com que tipo de sentimento eu sorria para todos vocês."
52150-108 = "Não é verdade...... não é verdade. Podemos conversar agora......"
52150-112 = "Engraçado ouvir isso."
52150-113 = "Você virou as costas para mim e passou todo o tempo se divertindo com aquele 'fantasma' conveniente."
52150-114 = "Ayame, eu......"
52150-115 = "Eu já disse, não disse?"
52150-116 = "Eu......"
52150-121 = "Nunca te considerei minha amiga."
52150-126 = "Próximo Episódio; Flor Artificial"

