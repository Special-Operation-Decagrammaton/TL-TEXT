[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1013503-1 = "Bem-vinda a Kivotos"
1013503-2 = "（Eu fui até a Millennium dar uma conferida\nem como a Kei estava lidando com tudo.）"
1013503-3 = "（Assim que percebeu minha presença,\nKei fez uma expressão de aborrecimento instantânea.）"
1013503-10 = "Vamos dar início à aula."
1013503-11 = "Nossa aula de hoje será sobre\n\"Ambiente de Convívio e Sociedade\"."
1013503-12 = "Em especial, vamos focar\nno conceito inseparável de uma \"Cidade\"."
1013503-13 = "Muito bem, sendo assim...\nSrta. Kei?"
1013503-14 = "Você poderia compartilhar com a turma\no que sabe sobre o conceito de \"Cidade\"?"
1013503-15 = "Eh, e-eu……？"
1013503-16 = "Isso mesmo,\npor favor."
1013503-17 = "Humm……。"
1013503-18 = "A Cidade é... um dos símbolos centrais da civilização,\nrepresentando o estado mais distante e oposto\nao que conhecemos como estado natural das coisas."
1013503-19 = "O próprio termo Civilização compartilha\nsua origem linguística com a Cidade.\nAmbas provêm da raiz 'Civil' — que tem sua essência\netimológica pautada na palavra 'Civitas'."
1013503-20 = "Sendo assim, caso as cidades não existissem...\nOu melhor, caso não existissem infraestruturas e fundações sólidas\npara amparar a vivência de múltiplas massas populacionais..."
1013503-21 = "Então, o mundo como conhecemos\njamais teria assumido a forma\nque possui nos dias de hoje."
1013503-22 = "Pois a humanidade é, de certa forma, um organismo\ncapaz de se aproveitar do pensamento coletivo e conjunto\npara transformar conceitos fictícios ou fantasiosos em realidades palpáveis."
1013503-23 = "（Eh... Eita?!）"
1013503-24 = "（B-Bem, tudo o que ela disse está\nperfeitamente correto e coerente com a matéria, mas...）"
1013503-26 = "――Por outro lado,\no grande fluxo habitacional que uma cidade abriga\ntraz consigo diversos malefícios."
1013503-27 = "Essa grande complexidade enraizada e multifacetada\nde inúmeros problemas faz com que a devida solução\nse torne um desafio inigualável."
1013503-28 = "Ainda assim, como exemplo prático e basilar...\nEu argumentaria que a melhora sistemática da infraestrutura de transportes\ndeveria ser o ponto inicial de abordagem em qualquer aglomerado urbano."
1013503-29 = "（Ela acabou de discursar sobre todo o conteúdo\nplanejado para a minha aula inteira...!）"
1013503-30 = "（O-O que eu devo fazer...?\nO que eu devo falar agora...）"
1013503-32 = "Isso me incomoda um pouco...\nmas como o tópico evoluiu de uma simples discussão de equações vetoriais\nem espaços lineares... para a aplicabilidade destas\nna física de partículas de um campo quântico...?"
1013503-33 = "Isso não passa de uma simples demonstração teórica\nexigindo a prova estritamente matemática\nde que o tal hiato de massa é invariavelmente maior que zero."
1013503-34 = "A questão aqui não se resume a apenas realizar os cálculos.\nO fator limitante da matemática envolvida nisso\na torna elementar para os parâmetros definidos."
1013503-35 = "Na verdade, essa exigência em si denota a insuficiência\ne as fronteiras intransponíveis inerentes à estrutura puramente matemática\npor trás das integrais de trajetória e de percurso... e é exatamente por isso que――"
1013503-36 = "C-Cof, cof……！"
1013503-37 = "A-Apesar de ser um pouco mais cedo\nque o horário habitual,\nterminaremos a aula de hoje por aqui!"
1013503-43 = "Isso foi incrível!"
1013503-44 = "A aluna nova já transmitia aquela aura de sabe-tudo,\nmas ela é realmente um monstro, hein?!"
1013503-46 = "Eh……？"
1013503-47 = "Oiii, o seu nome é Kei-chan, né?\nQue tipo de material de estudos você anda consumindo?\nMe conta os seus segredos de aprendizado!"
1013503-48 = "Aquele negócio sobre a equação e os problemas envolvendo a teoria do hiato de massa...\nVocê sabia que a nossa Academia foi inicialmente estabelecida\nsó com o propósito de lidar e provar os \"Desafios do Milênio\", né?!"
1013503-49 = "A-Ah...\nbem, na verdade, eu..."
1013503-51 = "（Meus olhos se cruzaram com os da Kei.）"
1013503-52 = "（Ela movia a boca tentando me passar\nalguma mensagem silenciosa.）"
1013503-53 = "（POR-FA-VOR-ME-TI-RA-DA-QUI!）"
1013503-55 = "（Para enviar uma resposta de volta,\neu também movi os lábios sem emitir som algum.）"
1013503-57 = "[ns] （VO-CÊ-É-SU-PER-PO-PU-LAR-HEIN!）"
1013503-59 = "（É HOJE QUE EU TE MATO\nE ME MATO DEPOIS!!）"
1013503-61 = "Ugh...\nEu estou exausta……。"
1013503-62 = "[s] \"Você sabe muitas coisas,\nnão é mesmo, Kei-chan!\""
1013503-63 = "Cale-se imediatamente!"
1013503-64 = "Haa……。"
1013503-65 = "Acho que essa é uma boa hora para confessar, Sensei...\nComo você deve ter notado,\neu possuo um intelecto abrangente capaz de englobar\npraticamente qualquer tópico de discussão conhecido."
1013503-66 = "……Conhecimento sempre foi uma ferramenta estritamente necessária\nno meu arsenal desde os tempos em que\neu apenas representava o papel de 'Sacerdotisa'."
1013503-67 = "Inclusive, quando as instalações de pesquisa e experimentos\nda Millennium Science School foram sendo moldadas nas Ruínas...\neu até mesmo acompanhei e participei do desenvolvimento\nde várias dessas pesquisas à distância e em segredo."
1013503-68 = "É por isso que……。"
1013503-69 = "Aonde eu quero chegar é……。"
1013503-70 = "……。"
1013503-71 = "Acredito que essas chamadas 'aulas'\nnão passam de formalidades completamente dispensáveis\nna minha presença."
1013503-72 = "[s] \"Você detesta\nfrequentar as aulas?\""
1013503-73 = "……。"
1013503-74 = "Detestar não seria o termo...\na questão é que eu simplesmente\nquestiono todo o propósito disso."
1013503-75 = "Qual é a necessidade de uma aluna frequentar essas aulas\nnum ambiente acadêmico... quando essa aluna possui\nos devidos domínios sobre tudo o que o lugar tem a lhe oferecer?"
1013503-76 = "[s] \"Claro que há\numa necessidade.\""
1013503-77 = "Qual?"
1013503-78 = "[s] \"Poder criar vínculos e brincar\ncom outras pessoas é divertido, afinal.\""
1013503-79 = "……Quê?"
1013503-80 = "E é só essa a grande razão...?"
1013503-81 = "[s1] \"Mas é claro.\"\n[s2] \"O dever de todo aluno engloba\no processo de absorver conhecimento\ne de se divertir enquanto passa por ele!\""
1013503-84 = "Você diz cada coisa ridícula e banal\ncom a maior naturalidade……。"
1013503-85 = "……。"
1013503-86 = "Ademais... acredito que existam certos indivíduos\nque simplesmente repudiam a exaustão\nprovinda de interações sociais e relacionamentos supérfluos."
1013503-87 = "[s3] \"É, de fato, pessoas assim existem.\"\n[s4] \"Porém, até pessoas reclusas\npossuem momentos de fragilidade...\"\n[s5] \"Onde desejam, mais do que tudo,\no conforto e a companhia de um amigo do peito.\""
1013503-91 = "……Então, a sua solução é manter e nutrir\num círculo social inútil e constante\napenas para se precaver em caso de um desses\nmomentos aleatórios e não previstos de fraqueza ocorrer?"
1013503-92 = "……Ugh."
1013503-93 = "Mas suponha que o indivíduo em questão\nseja de uma natureza intolerante...\npossuidor de critérios inflexíveis na hora de aceitar\nnovos aliados ao seu redor, o que então?"
1013503-94 = "Eh? O Sensei está sempre a postos para\natuar como apoio moral nessas ocasiões e cenários...?"
1013503-95 = "……。"
1013503-96 = "Compreendo o ponto da sua linha de pensamento irresponsável,\nmas peço que aceite a realidade de uma vez."
1013503-97 = "Existe apenas um Sensei disponível.\nTem alguma ideia do número descomunal\nde alunas vagando por Kivotos?!"
1013503-98 = "Suprir até mesmo as exigências e problemas de\napenas uma academia do calibre da Millennium inteira\njá beiraria o limite do que é humanamente possível.\nDe onde vem todo esse excesso desmedido de fé...?"
1013503-99 = "[s6] \"E você tem razão. É exatamente por isso que a Kei-chan――\"\n[s7] \"Poderia assumir meu lugar de vez em quando\ne agir como uma amiga valiosa!\""
1013503-102 = "E por que eu seria designada\npara um papel tão humilhante?!"
1013503-103 = "Eh? Porque a grande heroína Aris\ncertamente tomaria a mesma atitude\nse fosse requisitada para a tarefa...?"
1013503-104 = "……。"
1013503-105 = "…………。"
1013503-106 = "………………。"
1013503-107 = "Haa, francamente……。"
1013503-108 = "Você só é bom em tagarelar essas mentiras convenientes\nque te favorecem no final das contas..."
1013503-109 = "Certo...\nCerto... "
1013503-110 = "Sua petição fútil entrará sob a minha\ndeliberação e consideração por hora.\nE apenas isso, fique claro."
1013503-111 = "[s] \"Isso mostra o quão meiga e gentil\na Kei-chan é por dentro!\""
1013503-112 = "Eu disse apenas que iria considerar,\neu não fechei nenhum maldito contrato com você!!"