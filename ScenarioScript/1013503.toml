[translation]
1013503-1 = "Bem-vindo ao Kivotos"
1013503-2 = "(Fui ao Millennium para verificar Kei)"
1013503-3 = "(Kei percebeu isso e mostrou uma expressão descontente)"
1013503-10 = "Vamos começar a lição."
1013503-11 = "A aula de hoje é “Espaço de Vida e Sociedade”."
1013503-12 = "Entre elas, gostaria de falar de “cidades” que não podem ser esquecidas."
1013503-13 = "Bem, então... Kei-san?"
1013503-14 = "Por favor, me diga o que você sabe sobre \"cidade\"."

1013503-15 = "Hã, sou eu...?"
1013503-16 = "Sim, por favor."
1013503-17 = "você sabe……."
1013503-18 = "Uma cidade é um símbolo de civilização que está muito distante do estado natural."
1013503-19 = "A palavra \"Civilização\" inclui a raiz da palavra \"Cidade\", \"Civil\" e a palavra original \"Civitas\"."

1013503-20 = "Se a cidade não existisse. #nEm outras palavras, deve haver uma base para que muitas pessoas se reúnam e vivam juntas."
1013503-21 = "O mundo não poderia ter sido como é agora."
1013503-22 = "Os seres humanos são criaturas que transformam ideias fictícias em realidade por meio do pensamento coletivo."
1013503-23 = "(Eh... hein!?)"
1013503-24 = "(Bem, isso é verdade, mas...)"
1013503-26 = "--Por outro lado, também surgem problemas porque muitas pessoas se reúnem nas cidades."
1013503-27 = "Resolver o problema não é fácil porque os vários problemas estão intrinsecamente interligados."
1013503-28 = "Ainda assim, se você vai dar um exemplo... não deveríamos começar a lidar com isso melhorando os meios de transporte?"
1013503-29 = "(Eles me contaram tudo sobre a aula de hoje...!)"
1013503-30 = "(O que devo fazer... o que devo fazer...)"
1013503-32 = "Hum... por que deixamos de falar sobre vetores e passamos a falar sobre campos quânticos...?"
1013503-33 = "Afinal, trata-se de provar matematicamente que a diferença de massa é maior que 0."
1013503-34 = "Não estou dizendo que você deve calculá-lo. Porque é fácil."
1013503-35 = "Na verdade, isso se refere ao limite da estrutura matemática das integrais de caminho..."
1013503-36 = "Ei, ei...!"
1013503-37 = "É um pouco cedo, mas é tudo para a aula de hoje!"
1013503-43 = "Incrível!"
1013503-44 = "Havia uma aura nisso, mas Transfer Student é realmente incrível!"
1013503-46 = "Huh...?"
1013503-47 = "Ei, você disse Kei-chan, certo? #nO que você estudou até agora? Se você tiver alguma dica, me avise!"
1013503-48 = "A equação e o problema da lacuna de massa de que falamos anteriormente, certo? #nNossa escola foi criada originalmente para resolver o Problema do Millennium!"
1013503-49 = "Ah... bem, eu..."
1013503-51 = "(Eu encontrei os olhos de Kei)"
1013503-52 = "(Ele está tentando expressar algo através da sincronização labial)"
1013503-53 = "(Ta・su・ke・te・ku・da・sa・i!)"

1013503-55 = "(Eu também abri minha boca para responder)"
1013503-57 = "[ns](Da・i・ni・n・ki・da・ne!)"

1013503-59 = "(Hoje vou matar o sensei e morrer também!!)"
1013503-61 = "Ugh...estou cansado..."
1013503-62 = "[s] \"Kei-chan é experiente!\""
1013503-63 = "Por favor, cale a boca já!"
1013503-64 = "Suspirar..."
1013503-65 = "Esta é uma boa oportunidade para contar ao sensei, mas...#nComo você pode imaginar, eu sei a maioria das coisas."
1013503-66 = "...É algo que eu preciso desde que era uma “criada”."
1013503-67 = "Quando o centro de pesquisa da Escola de Ciências do Millennium foi construído nas ruínas, tentei várias coisas."
1013503-68 = "é por isso……."
1013503-69 = "O que eu quero dizer é..."
1013503-70 = "……."
1013503-71 = "Acredito que as aulas nada mais são do que uma formalidade."
1013503-72 = "[s] \"Você odeia aula?\""
1013503-73 = "……."
1013503-74 = "Não gosto...Antes disso, só tenho uma pergunta."
1013503-75 = "Esta é uma história sobre se os alunos que sabem tudo precisam ir à escola."
1013503-76 = "[s] \"Claro que existe.\"\"\n1013503-77 = \"Por que?\"\n1013503-78 = \"[s] \"É divertido brincar com todos.\""

1013503-79 = "……sim?"
1013503-80 = "Isso é tudo?"
1013503-81 = "[s1] \"Claro.\"\n[s2] \"O trabalho dos alunos é aprender e brincar!\""
1013503-84 = "Também apropriado...."
1013503-85 = "……."
1013503-86 = "Além disso, há algumas pessoas que acham cansativo estar perto de outras pessoas."
1013503-87 = "[s3] \"Isso mesmo.\"\n[s4] \"Mas às vezes as pessoas assim...\"\n[s5] \"Acho que há momentos em que você sente falta de alguém.\""
1013503-91 = "...É por isso que eu deveria ir para a escola nessas horas, certo?"
1013503-92 = "...... cormorão."
1013503-93 = "Mas e se você for realmente exigente e exigente?"
1013503-94 = "Huh? Existe sensei para esses tempos...?"
1013503-95 = "……."
1013503-96 = "Entendo o que você está tentando dizer, mas espero que o sensei também perceba isso."
1013503-97 = "Existe apenas um sensei. Você sabe quantos alunos há na Kivotos?"
1013503-98 = "Deve ser difícil ser um estudante do Millennium, mas onde você conseguiu esse tipo de confiança?"
1013503-99 = "[s6] \"Isso é verdade. É por isso que Kei-chan-\"\n[s7] \"Seria ótimo se você pudesse ser meu amigo em vez de mim!\""
1013503-102 = "Por que eu! ?"
1013503-103 = "foto? Tenho certeza que a corajosa Alice faria isso...?"
1013503-104 = "……."
1013503-105 = "…………."
1013503-106 = "………………."
1013503-107 = "Ha, sério..."
1013503-108 = "Eu só sou bom em conversar."
1013503-109 = "Eu entendo...."
1013503-110 = "Vou pensar sobre isso. por agora."
1013503-111 = "[s] \"Kei-chan é muito gentil!\""
1013503-112 = "Não estou dizendo que farei isso! !"
