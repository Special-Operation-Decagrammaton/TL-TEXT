[translation]
32020-1 = "Episódio 2: Sisterhood"
32020-2 = "Ah, Sensei！"
32020-3 = "[s] \"Desculpa, acabei me atrasando um pouco.\""
32020-4 = "Não, não……！ Ah, olha só！ Aqui estão os resultados do simulado que fizemos mais cedo！"
32020-5 = "[s] Olha os resultados da prova."
32020-7 = "2º Simulado do Clube de Reforço, Resultados――"
32020-9 = "Hanako―8 pontos[FF6666]（Reprovada）[-]"
32020-11 = "Azusa―58 pontos[FF6666]（Reprovada）[-]"
32020-13 = "Koharu―49 pontos[FF6666]（Reprovada）[-]"
32020-15 = "Hifumi―64 pontos[007eff]（Aprovada）[-]"
32020-17 = "……Foi por um triz."
32020-18 = "Sim！ Dessa vez foi realmente por pouco！ Azusa-chan, você chegou tão perto……！"
32020-19 = "Viu！？ Hifumi, eu melhorei bastante também！？"
32020-20 = "Sim, vi direitinho！ Koharu-chan, da última vez foi 15 e agora pulou pra 49…… você é quem mais evoluiu, incrível！"
32020-21 = "Fufun！ Eu não disse？ Estava escondendo meu verdadeiro poder."
32020-22 = "Maravilhoso……！"
32020-23 = "E, eh…… a Hanako-chan é……"
32020-24 = "Ara？ Hifumi-chan, por que sua voz ficou tão baixa de repente？"
32020-25 = "Primeira prova: 2 pontos. Segundo simulado: 4 pontos. Agora: 8 pontos."
32020-29 = "Se pensar como uma sequência, em mais 3 provas você com certeza chega na nota de aprovação♪"
32020-30 = "P-pode até ser, se pensar assim……"
32020-31 = "[s] \"Bom, todo mundo se esforçou bastante.\""
32020-32 = "Sim！ Nesse ritmo, talvez a gente consiga atingir o objetivo mais rápido do que imaginava……！"
32020-33 = "Vou cumprir a missão com sucesso e pegar aquele bichinho fofo. Esse é o motivo de eu estar aqui e o objetivo da minha luta."
32020-34 = "A-Azusachan！？ Nosso objetivo aqui é estudar e passar nas provas, não é caçar bichinhos fofos！？ Quando foi que mudou……！？"
32020-35 = "Ah, é verdade. Vou fazer isso também de quebra."
32020-36 = "「De quebra」！？ É só de quebra！？ Auuu…… b-bom, como fã dos Momo Friends, até fico feliz, mas……"
32020-42 = "……？"
32020-43 = "Ara, parece que temos visita."
32020-44 = "Realmente…… o que será que alguém veio fazer nesse anexo――"
32020-45 = "C-com licença……！"
32020-46 = "Ara, essa voz…"
32020-47 = "Intruso？ Tranquilo, tô preparada."
32020-48 = "Azusa-chan, preparada como……？"
32020-52 = "Kyaaah！？"
32020-53 = "Armadilha explosiva. Ativa quando detecta intruso."
32020-54 = "Azusa-chan！？"
32020-55 = "I-isso aqui é……？ Eh, ah, tem mais ali……！？"
32020-61 = "Kyaaaaahhh！！？"
32020-62 = "Fugir é inútil. Previ os caminhos de fuga e coloquei armadilhas em todos."
32020-63 = "Azusa-chan！！？！？"
32020-65 = "Entrada do Anexo"
32020-66 = "Cof…… cof, cof……"
32020-67 = "V-você tá bem……！？ N-não se machucou……？"
32020-68 = "Q-que hoje também haja…… paz e serenidade…… cof, cof…… ao seu lado……"
32020-69 = "Primeiro se preocupa com a sua própria serenidade！？"
32020-70 = "Espera, olhando melhor, esse uniforme é da Sisterhood……？"
32020-71 = "Ara, não é a Marie-chan？"
32020-72 = "Ah, H-Hanako-san……"
32020-74 = "Aqui, água."
32020-75 = "O-obrigada."
32020-79 = "（Gulp, gulp……）"
32020-80 = "……Fuu. Que susto, assim que entrei alguma coisa ativou……"
32020-84 = "Azusa-chan……"
32020-95 = "……。"
32020-96 = "Desculpa, achei que era um ataque."
32020-97 = "Eh, ehh……？"
32020-98 = "E-então, por que alguém da Sisterhood veio até aqui……？"
32020-99 = "Ah, é que……"
32020-100 = "Ouvi dizer que o Clube de Reforço estava aqui…… mas não sabia que a Hanako-san também estava……"
32020-102 = "……Eu também, minhas notas não estão boas."
32020-103 = "Entendi…… sim……"
32020-104 = "Hanako, você conhece ela？"
32020-105 = "Ahaha…… temos uma pequena conexão."
32020-106 = "Marie-chan veio visitar a Hanako…… não parece ser o caso. Qual o motivo da visita ao Clube de Reforço？"
32020-107 = "Ah, sim."
32020-108 = "Na verdade, vim entregar um recado de agradecimento para a Shirasu Azusa-san. Uma aluna que ela ajudou pediu pra transmitir isso pessoalmente."
32020-109 = "……Eu？"
32020-110 = "Sim. Parece que uma aluna estava sendo bullyingada pelos colegas… e naquele dia foi chamada pra trás do prédio. Azusa-san passou por acaso e ajudou ela."
32020-111 = "……？"
32020-112 = "Agradecimento……？"
32020-113 = "A aluna disse que Azusa-san interveio quando ela foi chamada pra um lugar isolado."
32020-115 = "U-um caso desses……！？"
32020-116 = "Bullying……っ！？"
32020-117 = "……Bom, não é algo incomum. Como fazem de forma dissimulada e cruel, raramente vem à tona."
32020-121 = "Nós só ficamos sabendo porque ela veio nos procurar…"
32020-122 = "E depois disso, parece que rolou um mal-entendido e o Comitê de Execução da Justiça acabou entrando em conflito com a Azusa-san…"
32020-123 = "……Foi aquele dia！？"
32020-124 = "……É, aconteceu uma coisa assim. Só achei irritante ver um monte de gente usando força contra alguém mais fraco."
32020-125 = "E depois disso a aluna contou pra gente e… parece que rolou uma batalha de 3 horas com armadilhas e gás lacrimogêneo…"
32020-126 = "！？"
32020-127 = "Foi aquele dia mesmo！？"
32020-130 = "Quando vendem briga, eu compro. Se não tivesse acabado a munição, teria durado mais e levado mais gente junto."
32020-131 = "A-auuu……"
32020-132 = "Enfim, a aluna pediu pra transmitir o agradecimento, e como não te encontrava na escola, vim até aqui."
32020-133 = "……Entendi."
32020-134 = "Não foi nada de mais. No final eu também fui capturada."
32020-135 = "A segunda parte não tem relação, mas…"
32020-136 = "De qualquer forma, é triste ver alguém sendo oprimido. Mesmo que pareça inútil, não se deve parar de resistir."
32020-137 = "……Talvez você tenha razão. Sim, vou transmitir isso pra ela."
32020-138 = "……。"
32020-139 = "Azusa-san, diziam que você era uma bruxa de gelo que adora violência…… mas parece que era só boato."
32020-143 = "Fufu. Pode até ser, mas a Azusa-chan tem mesmo um lado de «bruxa de gelo», sabia？ Olha, ela tem uma expressão difícil de ler."
32020-148 = "Hanako-san……"
32020-149 = "……Que bom que você tá bem, Marie-chan."
32020-150 = "Sim, eu estou…… mas……"
32020-151 = "Vou te acompanhar até a entrada. Vamos."
32020-152 = "Ah, sim……"
32020-153 = "Então, com licença. Sensei, desculpe aparecer de repente. Até mais."
32020-154 = "[s] \"Tá bom, vai com cuidado.\""
32020-160 = "（E assim, mais um dia estava chegando ao fim.）"
32020-162 = "Então, vamos começar a lavar roupa."
32020-163 = "Todo mundo coloca uniforme, calcinha, meia… tudo que precisa lavar nesse cesto, por favor."
32020-164 = "Obrigada, conta com a gente."
32020-165 = "Sim…… sim！？ Até a calcinha！？"
32020-166 = "Por quê！？ Calcinha cada um lava a sua, né！？"
32020-167 = "Lavar tudo junto economiza água e sabão. A Hanako não tá errada."
32020-168 = "A-auuu…… então… por favor……"
32020-169 = "Eh…… será que eu que tô errada……？"
32020-174 = "Sim, obrigada♡"
32020-175 = "Ah, e o Sensei……？"
32020-176 = "[s] \"Vou passar essa.\""
32020-177 = "Ara, tudo bem？ Então vou ligar a máquina."
32020-178 = "Se não tiver problema, até amanhã de manhã deve estar tudo seco♪"
32020-183 = "Então, vamos nos preparar pra dormir. Bom trabalho hoje."
32020-184 = "……Sim."
32020-191 = "Sensei, posso falar com você rapidinho…… depois posso passar no seu quarto……？ É sobre a Hanako-chan……"
32020-192 = "[s] Acena silenciosamente."
32020-195 = "Quarto do Sensei"
32020-197 = "……Com licença."
32020-198 = "[ns1] Levanta.\n[ns2] Abre a porta."
32020-202 = "Boa noite, Sensei."
32020-206 = "[ns] \"……！？\""
32020-207 = "Fufu, abriu tão fácil assim♡ Que descuido, hein♡"
32020-208 = "[s3] \"P-por que a Hanako tá aqui……！？\"\n[s4] \"E por que de biquíni……！？\""
32020-211 = "Ah, não se preocupe com isso. É meu pijama."
32020-212 = "[s] \"Pijama que é biquíni…… difícil não se preocupar……\""
32020-213 = "Ufufu. Mas Sensei, eu queria conversar sobre uma coisa……"
32020-214 = "Na verdade……"
32020-219 = "……é sobre a Azusa-chan."
32020-220 = "[s] \"Azusa……？\""
32020-224 = "C-com licença…… Sensei, você tá aí……？"
32020-228 = "Desculpa vir mais tarde que ontem…… na verdade……"
32020-232 = "……Eh."
32020-233 = "……Ara."
32020-234 = "[s] \"…………。\""
32020-235 = "……。"
32020-237 = "Desculpa de verdade！！？ M-mil desculpas！ Eu não fazia ideia……！ Juro que não sabia de nada！？ Desde quando isso está acontecendo！？"
32020-238 = "……Hifumi-chan, você disse «mais tarde que ontem»！？ Quer dizer que ontem à noite você também veio！？ Foi isso, né！？"
32020-240 = "Desculpa desculpa desculpa！！？ Depois não dá, né！？ O que eu faço, melhor não vir hoje à noite！？ Desculpa por não saber, desculpa por entrar no meio, desculpa por estragar o clima……！？"
32020-241 = "Espera Hifumi-chan, me conta em detalhes！ O que vocês dois fizeram ontem à noite？ O que iam fazer hoje！？ Por favor explica, ou melhor, reproduz agora na minha frente……！！"
32020-242 = "[s] \"Vocês duas, por favor se acalmem um pouco……\""
32020-244 = "（Depois de muita conversa, finalmente esclarecemos o mal-entendido.）"
32020-245 = "（De quebra, a Hanako levou bronca da Hifumi e trocou de roupa de verdade.）"
32020-247 = "Próximo; Encontro Secreto à Meia-Noite"