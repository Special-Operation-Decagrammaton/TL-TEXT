[translation]
32020-1 = "Episódio 2; Sisterhood"
32020-2 = "Ah, Sensei!"
32020-3 = "[s] \"Desculpe, acabei me atrasando um pouco.\""
32020-4 = "Não, não...! Ah, aliás, por favor, veja isto! Aqui estão os resultados do simulado que acabei de receber!"
32020-5 = "[s] Ver os resultados do teste."
32020-7 = "Resultados do 2º Simulado do Clube de Reforço —"
32020-9 = "Hanako — 8 pontos [FF6666](Reprovada)[-]"
32020-11 = "Azusa — 58 pontos [FF6666](Reprovada)[-]"
32020-13 = "Koharu — 49 pontos [FF6666](Reprovada)[-]"
32020-15 = "Hifumi — 64 pontos [007eff](Aprovada)[-]"
32020-17 = "…Foi por um triz."
32020-18 = "Sim! Desta vez foi realmente por um triz! Azusa-chan, você chegou muito perto...!"
32020-19 = "V-você viu!? Hifumi, eu também melhorei bastante, não foi!?"
32020-20 = "Sim, eu vi direitinho! Koharu-chan, você tirou 15 pontos da última vez e subiu para 49... Você é a que mais tem potencial de crescimento, é incrível!"
32020-21 = "Hmph, hehe! Eu não disse? Eu estava escondendo meu verdadeiro talento."
32020-22 = "É maravilhoso...!"
32020-23 = "E, bem... a, a Hanako-chan..."
32020-24 = "Ora? Hifumi-chan, por que o seu tom de voz baixou tanto?"
32020-25 = "O primeiro teste foi 2 pontos, o simulado seguinte foi 4, e desta vez foram 8, não é?"
32020-29 = "Se pensarmos nisso como uma progressão aritmética, com certeza chegarei à nota de aprovação em mais 3 tentativas♪"
32020-30 = "B-bem, pensando por esse lado, talvez, mas..."
32020-31 = "[s] \"Sim, todos se esforçaram muito.\""
32020-32 = "Sim! Se continuarmos assim, talvez alcancemos o objetivo mais rápido do que pensávamos...!"
32020-33 = "Com certeza completarei a missão e receberei aquela coisa fofa. Esse é o motivo de eu estar aqui e o meu objetivo ao lutar."
32020-34 = "A-Azusa-chan!? O motivo de estarmos aqui é por causa dos testes e dos estudos, e o objetivo é evitar a reprovação, não é!? Quando foi que isso mudou...!?"
32020-35 = "Teve isso também. Vou aproveitar e fazer isso também."
32020-36 = "\"Aproveitar\"!? Você vai aproveitar!? Augh... c-como fã dos Momo Friends, eu até fico feliz, mas..."
32020-42 = "…?"
32020-43 = "Ora, parece que alguém chegou?"
32020-44 = "É verdade... Que tipo de assunto alguém teria neste alojamento—"
32020-45 = "C-com licença...!"
32020-46 = "Ora, essa voz é..."
32020-47 = "Um invasor. Tudo bem, estou preparada."
32020-48 = "Azusa-chan, preparada como...?"
32020-52 = "Kyaa!?"
32020-53 = "Armadilha. Configurei para ativar caso detectasse a entrada de alguém."
32020-54 = "Azusa-chan!?"
32020-55 = "I-isso é o quê...? Ei, ah, aqui também...!?"
32020-61 = "Kyaaaaaa!?"
32020-62 = "É inútil fugir. Previ a direção da fuga e preparei armadilhas lá também."
32020-63 = "Azusa-chaaaan!!??"
32020-65 = "Alojamento - Entrada"
32020-66 = "Keho... keho keho..."
32020-67 = "V-você está bem...!? V-você se machucou...?"
32020-68 = "Q-que a paz e a tranquilidade... keho, keho... estejam com você hoje também, keho..."
32020-69 = "Por favor, preocupe-se primeiro com a sua própria tranquilidade!?"
32020-70 = "Ué, olhando bem, esse uniforme é da Sisterhood...?"
32020-71 = "Ora, não é a Mari-chan?"
32020-72 = "Ah, H-Hanako-san..."
32020-74 = "Aqui, água."
32020-75 = "Ah, muito obrigada."
32020-79 = "(Assente repetidamente...)"
32020-80 = "......Ufa. Que susto, assim que entrei algo foi ativado..."
32020-84 = "Azusa-chan..."
32020-95 = "......"
32020-96 = "Desculpe, achei que fosse um ataque."
32020-97 = "E-eh, bem...?"
32020-98 = "A-a propósito, por que alguém da Sisterhood está em um lugar como este...?"
32020-99 = "Ah, isso é porque..."
32020-100 = "Ouvi dizer que o pessoal do Clube de Estudos Suplementares estava aqui... embora eu não soubesse que a Hanako-san também estaria..."
32020-102 = "......Eu também, já que minhas notas não são boas."
32020-103 = "Foi... assim? Entendo..."
32020-104 = "Hanako, vocês se conhecem?"
32020-105 = "Ahaha... digamos que temos uma pequena conexão."
32020-106 = "Parece que a Mari-chan não veio exatamente para me visitar... Qual o motivo da sua vinda ao Clube de Estudos Suplementares?"
32020-107 = "Ah, sim."
32020-108 = "Hoje, vim visitar a Azusa Shirasu do Clube de Estudos Suplementares. Disseram-me que ela estaria aqui."
32020-109 = "Eu?"
32020-110 = "Sim. Na verdade, uma aluna que a Azusa-san ajudou outro dia gostaria de expressar sua gratidão. Por vários motivos, vim aqui em nome dela."
32020-111 = "......?"
32020-112 = "Gratidão...?"
32020-113 = "Havia uma aluna que estava sofrendo bullying de suas colegas de classe... e ouvi dizer que, naquele dia, ela foi subitamente chamada para trás do prédio."
32020-115 = "M-mas que coisa horrível...!"
32020-116 = "Bullying...!"
32020-117 = "......Bem, não é algo que eu nunca tenha ouvido falar. Como fazem isso de forma astuta e insidiosa, raramente vem a público."
32020-121 = "Nós só ficamos sabendo depois que ela nos procurou para pedir conselhos..."
32020-122 = "E naquele dia, quando ela foi chamada... a Azusa-san, que passava por lá por acaso, a ajudou."
32020-123 = "S-sério?"
32020-124 = "......Agora que você mencionou, aconteceu algo assim. Mas é só que eu não suporto ver gente usando o número para oprimir os mais fracos."
32020-125 = "E depois que a Azusa-san deu uma bronca nelas, elas entraram em contato com o Comitê de Justiça... não sei onde a informação foi distorcida, mas parece que acabou se transformando em um combate de grande escala entre o Comitê de Justiça e a Azusa-san..."
32020-126 = "!?"
32020-127 = "Foi assim que a Azusa-san ocupou o depósito de bombas de gás lacrimogêneo e, usando armadilhas contra os membros do Comitê de Justiça, lutou por mais de 3 horas..."
32020-128 = "Aquilo foi naquela época!?"
32020-130 = "Não importa o que aconteça, se me provocarem, eu revido. Naquela época, se minha munição não tivesse acabado, eu teria lutado por mais tempo e levado mais gente comigo."
32020-131 = "A-auuu..."
32020-132 = "Então, essa aluna nos visitou para relatar o ocorrido e queria agradecer à Azusa-san... mas como não conseguimos encontrá-la na escola, acabamos chegando aqui."
32020-133 = "......Entendo."
32020-134 = "Não é nada que mereça um agradecimento especial. No fim das contas, eu acabei sendo capturada."
32020-135 = "Acho que a segunda parte não tem muita relação..."
32020-136 = "Além disso, embora a situação dela seja lamentável, não se pode ficar sendo oprimida para sempre. Mesmo que pareça inútil, não se deve parar de resistir."
32020-137 = "......Talvez você tenha razão. Sim, transmitirei isso a ela."
32020-138 = "......"
32020-139 = "Havia rumores de que a Azusa-san era uma bruxa de gelo que acreditava na violência... mas, como esperado, rumores são apenas rumores."
32020-143 = "Fufu. É verdade, mas a Azusa-chan tem um lado que lembra um pouco uma \"bruxa de gelo\", não acha? Veja, para os outros, é um pouco difícil ler as expressões dela."

32020-148 = "Hanako-san..."
32020-149 = "......Fico feliz que a Mari-chan esteja bem."
32020-150 = "Sim, eu estou... mas..."
32020-151 = "Vou acompanhá-la até a entrada. Vamos, vamos juntas."
32020-152 = "Ah, sim..."
32020-153 = "B-bem, então, com licença. Sensei, peço desculpas pela visita repentina. Até mais."
32020-154 = "[s] \"Sim, tome cuidado.\""
32020-160 = "（Assim, o dia estava chegando ao fim.）"
32020-162 = "Muito bem, vamos começar a lavar as roupas."
32020-163 = "Por favor, coloquem todos os seus uniformes, roupas íntimas, meias e o que mais precisarem lavar nesta cesta."
32020-164 = "Obrigada, conto com vocês."
32020-165 = "Sim... Sim!? A-até as roupas íntimas!?"
32020-166 = "Por quê!? Cada uma deveria lavar a sua, não deveria!?"
32020-167 = "Lavar tudo de uma vez economiza água e sabão. O que a Hanako disse não está errado."
32020-168 = "A-ah, entendi... E-então, por favor..."
32020-169 = "Eh... E-eu que estou sendo estranha...?"
32020-174 = "Sim, muito obrigada♡"
32020-175 = "Ah, e o Sensei...?"
32020-176 = "[s] \"Vou deixar passar dessa vez.\""
32020-177 = "Ora, é mesmo? Então, vou ligar a máquina de lavar."
32020-178 = "Se não houver nenhum problema, com certeza estará tudo seco até amanhã de manhã♪"
32020-183 = "Bem, vamos nos preparar para dormir. Bom trabalho hoje."
32020-184 = "......Sim."
32020-191 = "Ei, Sensei, eu queria falar com você... Posso ir ao seu quarto mais tarde...? É sobre a Hanako-chan..."
32020-192 = "[s] Acena silenciosamente."
32020-195 = "Quarto do Sensei"
32020-197 = "......Com licença."
32020-198 = "[ns1] Levanta-se.\n[ns2] Abre a porta."
32020-202 = "Boa noite, Sensei."
32020-206 = "[ns] \"......!?\""
32020-207 = "Fufu, abrir assim tão facilmente...♡ Você é bem descuidado, não é?♡"
32020-208 = "[s3] \"P-por que a Hanako está aqui...!?\"\n[s4] \"E por que você está de roupa de banho...!?\""
32020-211 = "Ah, não se preocupe com isso. É o meu pijama."
32020-212 = "[s] \"Não tem como eu não me preocupar quando você diz que seu pijama é uma roupa de banho...\""
32020-213 = "Ufufu. Mas, Sensei, eu queria pedir um conselho sobre algo..."
32020-214 = "Na verdade..."
32020-219 = "......É sobre a Azusa-chan."
32020-220 = "[s] \"Azusa...?\""
32020-224 = "C-com licença... Sensei, você está aí...?"
32020-228 = "Desculpe por vir mais tarde do que ontem, na verdade..."
32020-232 = "......Eh."
32020-233 = "......Ora."
32020-234 = "[s] \"............\""
32020-235 = "......"
32020-237 = "Eu sinto muito mesmo!? D-desculpe! Eu não sabia de nada disso...! E-eu realmente não sabia, é verdade!? Desde quando isso está acontecendo!?"
32020-238 = "......Hifumi-chan, você acabou de dizer \"mais tarde do que ontem\"!? Isso significa que você veio ontem à noite também, não é!? É isso mesmo, não é!?"
32020-240 = "Desculpe, desculpe, desculpe!? Não dá para voltar mais tarde, né!? O que eu devo fazer, é melhor eu ir embora agora!? Desculpe por não saber, desculpe por interromper, desculpe por estragar o clima...!?"
32020-241 = "Espere um pouco, Hifumi-chan, me conte os detalhes! O que vocês dois estavam fazendo ontem à noite, e o que planejavam fazer hoje!? Por favor, me explique, ou melhor, que tal reproduzirem para mim agora mesmo...!!"
32020-242 = "[s] \"Por favor, as duas, acalmem-se um pouco...\""
32020-244 = "（Depois disso, conseguimos nos acalmar e esclarecer o mal-entendido.）"
32020-245 = "（Além disso, a Hanako levou uma bronca da Hifumi e foi se trocar de verdade.）"
32020-247 = "Próximo episódio: Encontro Secreto na Madrugada"
