[translation]
32020-1 = "Episódio 2;Sisterhood"
32020-2 = "Ah, Sensei!"
32020-3 = "[s] \"Desculpa, atrasei um pouquinho.\""
32020-4 = "Que nada……! Ah, aliás, olha só! Este é o resultado do simulado que a gente acabou de fazer agora há pouco!"
32020-5 = "[s] Vê o resultado da prova."
32020-7 = "2º Simulado do Clube de Aulas de Reforço, resultado――"
32020-9 = "Hanako―8 pts [FF6666]（Reprovada）[-]"
32020-11 = "Azusa―58 pts [FF6666]（Reprovada）[-]"
32020-13 = "Koharu―49 pts [FF6666]（Reprovada）[-]"
32020-15 = "Hifumi―64 pts [007eff]（Aprovada）[-]"
32020-17 = "……Foi por um fio de cabelo."
32020-18 = "Sim! Desta vez foi de verdade por um fio! Azusa, faltou pouquíssimo……!"
32020-19 = "V-viu!? Hifumi, eu também subi bastante, viu!?"
32020-20 = "Sim, vi com clareza! Koharu, da última vez você tirou 15 e agora, de repente, chegou a 49…… em margem de crescimento, você é a número um, incrível!"
32020-21 = "H-hunf-hunf! Eu não disse? Que eu tava escondendo o meu verdadeiro potencial."
32020-22 = "Maravilhoso……!"
32020-23 = "E, é que…… a-a Hanako……."
32020-24 = "Ora? Hifumi, por que o seu volume de voz baixou tanto assim?"
32020-25 = "A primeira prova foi 2 pontos, o simulado seguinte 4, e desta vez 8, viu?"
32020-29 = "Pensando como uma progressão numérica, se você fizer mais 3 vezes, com certeza chega na faixa de aprovação♪"
32020-30 = "P-pensando assim, talvez seja, mas……."
32020-31 = "[s] \"Sim, todo mundo se esforçou.\""
32020-32 = "Sim! Nesse ritmo, talvez a gente chegue ao objetivo mais rápido do que eu pensava……!"
32020-33 = "Vou cumprir a missão sem falta e receber aquele bichinho fofo. Esse é o motivo de eu estar aqui e o meu objetivo de luta."
32020-34 = "A-Azusa!? O motivo de a gente estar aqui é a prova e o estudo, e o objetivo é escapar da reprovação, viu!? Quando foi que mudou……!?"
32020-35 = "Ah, é, tinha isso também. De quebra, faço isso também."
32020-36 = "\"De quebra\"!? É de quebra!? Auu…… c-como fã de MomoFriends, até que me deixa feliz, mas……."
32020-42 = "……?"
32020-43 = "Ora, parece que chegou alguém?"
32020-44 = "Pois é…… a este alojamento de acampamento, com que tipo de assunto――"
32020-45 = "C-com licença……!"
32020-46 = "Ora, essa voz é……"
32020-47 = "Um invasor. Tranquilo, tá tudo preparado."
32020-48 = "Azusa, preparado como……?"
32020-52 = "Kyaa!?"
32020-53 = "Booby-trap. Deixei configurado pra disparar quando detecta a invasão de alguém."
32020-54 = "Azusa!?"
32020-55 = "M-mas o que é isso……? Hã, ah, aqui também……!?"
32020-61 = "Kyaaaah!?"
32020-62 = "Fugir é inútil. Eu prevejo a direção da fuga e já deixei armadilha montada mais adiante também."
32020-63 = "Azusaaa!!?!?"
32020-65 = "Alojamento de Acampamento - Entrada"
32020-66 = "Cof…… cof, cof……."
32020-67 = "V-você tá bem……!? N-não se machucou……?"
32020-68 = "Q-que hoje também a paz e a serenidade…… cof, cof…… estejam com você, cof……."
32020-69 = "Primeiro se preocupe com a sua própria serenidade!?"
32020-70 = "Ué, olhando bem, essa roupa é da Sisterhood……?"
32020-71 = "Ora, é a Marie, não é?"
32020-72 = "Ah, H-Hanako……."
32020-74 = "Toma, água."
32020-75 = "A-ah, obrigada."
32020-79 = "(gole, gole……)"
32020-80 = "……Ufa. Que susto, mal entrei e alguma coisa disparou……"
32020-84 = "Azusa……."
32020-95 = "……."
32020-96 = "Desculpa, achei que fosse um ataque."
32020-97 = "É-é que……?"
32020-98 = "E-e, aliás, por que alguém da Sisterhood num lugar desses……?"
32020-99 = "Ah, é que……."
32020-100 = "Ouvi que os membros do Clube de Aulas de Reforço estavam aqui…… só que eu não sabia que você estava aqui, Hanako……."
32020-102 = "……Eu também, porque minhas notas não são boas."
32020-103 = "Ah…… era isso. Sim……."
32020-104 = "Hanako, você a conhece?"
32020-105 = "Ahaha…… a gente tem um probleminha de ligação, digamos."
32020-106 = "Marie, você não veio me procurar…… pelo visto não é isso. Ao Clube de Aulas de Reforço, com que assunto?"
32020-107 = "Ah, sim."
32020-108 = "Hoje eu vim aqui procurar a Azusa Shirasu, do Clube de Aulas de Reforço. Ao perguntar, me disseram que ela estava aqui."
32020-109 = "Eu?"
32020-110 = "Sim. Na verdade, uma aluna que a Azusa salvou outro dia gostaria de expressar a sua gratidão. Por circunstâncias diversas, eu vim no lugar dela."
32020-111 = "……?"
32020-112 = "Gratidão……?"
32020-113 = "Havia uma aluna que estava sofrendo bullying dos colegas de turma…… e, naquele dia também, pelo visto, foi chamada de repente pros fundos do prédio, ouvi dizer."
32020-115 = "U-uma coisa dessas……!?"
32020-116 = "Bullying……!?"
32020-117 = "……Bom, não é uma história inédita. Como todas fazem de um jeito astuto e sórdido, é difícil vir à tona."
32020-121 = "A gente também só ficou sabendo quando essa aluna nos procurou pra conversar……."
32020-122 = "E, naquele dia em que ela foi chamada…… a Azusa, que passava por ali por acaso, a salvou."
32020-123 = "É-é mesmo?"
32020-124 = "……Aliás, teve isso mesmo. Só que era só porque um ato de oprimir um alvo fraco usando a superioridade numérica me incomodava."
32020-125 = "E, depois, quem levou bronca da Azusa entrou em contato com o Comitê de Realização da Justiça…… não sei onde a informação foi distorcida, mas parece que aquilo evoluiu pra um combate de porte considerável entre o Comitê de Realização da Justiça e a Azusa……."
32020-126 = "!?"
32020-127 = "E, assim, a Azusa ocupou o paiol das bombas de gás lacrimogêneo e, contra os membros do Comitê de Realização da Justiça, usando armadilhas, continuou lutando por mais de 3 horas……"
32020-128 = "Isso foi aquela vez!?"
32020-130 = "Seja como for, briga comprada, briga aceita. Naquela hora também, se a munição não tivesse acabado, eu teria lutado bem mais, e teria levado ainda mais gente junto comigo."
32020-131 = "A-auu……."
32020-132 = "E aí, essa aluna, também pra dar o relato, veio até a gente e disse que queria agradecer à Azusa…… só que não conseguiu achá-la na academia, e foi assim que ela chegou até aqui."
32020-133 = "……Sei."
32020-134 = "Não é nada que mereça um agradecimento especial. No fim, eu também acabei presa."
32020-135 = "A segunda parte não tem muita relação, eu acho……."
32020-136 = "E aquela situação é lamentável, mas ficar só sendo oprimida pra sempre não pode. Ainda que seja algo vão, não se deve parar de resistir."
32020-137 = "……Talvez seja mesmo. Sim, vou transmitir isso a ela também."
32020-138 = "……."
32020-139 = "Corria um boato de que a Azusa era a bruxa de gelo que idolatra a violência…… mas, pelo visto, boato é boato mesmo."
32020-143 = "Ufu. Isso é verdade, mas a Azusa, surpreendentemente, tem também as suas partes de \"bruxa de gelo\", viu? Ó, pras outras pessoas, a expressão dela é meio difícil de ler."
32020-148 = "Hanako……."
32020-149 = "……Que bom ver você bem, Marie."
32020-150 = "Sim, eu……. Mas……."
32020-151 = "Te acompanho até a porta. Vamos, vamos juntas."
32020-152 = "Ah, sim……."
32020-153 = "E-então, pessoal, desculpem o incômodo. Sensei, também me desculpe por aparecer de repente. Então, até mais."
32020-154 = "[s] \"Sim, cuide-se.\""
32020-160 = "(E, assim, um dia estava chegando ao fim.)"
32020-162 = "Muito bem, então vamos começar a lavar a roupa?"
32020-163 = "Pessoal, uniforme, roupa de baixo, meia, tudo que for lavar, ponham neste cesto, viu."
32020-164 = "Obrigada, conto com você."
32020-165 = "Sim…… siim!? R-roupa de baixo também!?"
32020-166 = "Por quê!? Roupa de baixo cada uma cuida da sua, né!?"
32020-167 = "Lavar tudo de uma vez economiza água e sabão. O que a Hanako disse não está errado."
32020-168 = "A-auu…… e-então, por favor……."
32020-169 = "Hã…… s-será que eu é que sou a estranha……?"
32020-174 = "Sim, muito obrigada♡"
32020-175 = "Ah, e o Sensei……?"
32020-176 = "[s] \"Eu passo, obrigado.\""
32020-177 = "Ora, é mesmo? Então, vou ligar a máquina de lavar."
32020-178 = "Se não houver nenhum problema, com certeza até amanhã de manhã fica tudo, inclusive seco♪"
32020-183 = "Então, vamos nos preparar pra dormir. Bom trabalho hoje também."
32020-184 = "……Sim."
32020-191 = "É que, Sensei, eu queria conversar um pouco…… depois posso ir ao seu quarto……? É que, é sobre a Hanako……."
32020-192 = "[s] Assente em silêncio."
32020-195 = "Quarto do Sensei"
32020-197 = "……Com licença."
32020-198 = "[ns1] Levanta-se.\n[ns2] Abre a porta."
32020-202 = "Boa noite, Sensei."
32020-206 = "[ns] \"……!?\""
32020-207 = "Ufu, abrir assim tão fácil♡ Que descuido, hein♡"
32020-208 = "[s3] \"P-por que a Hanako tá aqui……!?\"\n[s4] \"E, por que de maiô……!?\""
32020-211 = "Ah, quanto a isto, não se preocupe. É que é meu pijama."
32020-212 = "[s] \"Dizer que o pijama é um maiô e eu não me preocupar não dá…….\""
32020-213 = "Ufu. Mais do que isso, Sensei, tem uma coisa que eu queria consultar com você……."
32020-214 = "Na verdade……"
32020-219 = "……é sobre a Azusa."
32020-220 = "[s] \"A Azusa……?\""
32020-224 = "C-com licença…… Sensei, o senhor está aí……?"
32020-228 = "Desculpa vir numa hora mais tarde que ontem; é que, na verdade……"
32020-232 = "……Hã."
32020-233 = "……Ora."
32020-234 = "[s] \"…………\""
32020-235 = "……."
32020-237 = "M-me desculpe de verdade!? D-desculpa! Eu, sem saber de nada disso……! E-eu não sabia mesmo, é sério!? Hã, desde quando!?"
32020-238 = "……Hifumi, você acabou de dizer \"numa hora mais tarde que ontem\"!? Ou seja, ontem à noite você também veio, né!? É isso, né!?"
32020-240 = "Desculpa, desculpa, desculpa!? \"Depois\" também não pode, né!? O que eu faço, é melhor eu não vir hoje à noite!? Desculpa por não saber, desculpa por me meter, desculpa por estragar o clima……!?"
32020-241 = "Espera, Hifumi, me explica direitinho! Ontem à noite o que vocês duas fizeram, e hoje à noite o que vocês iam fazer!? Por favor, uma explicação, aliás, melhor, refaz agora mesmo na minha frente……!!"
32020-242 = "[s] \"Vocês duas, por favor, deem uma acalmada primeiro…….\""
32020-244 = "(Depois disso, com muito custo, conversaram com calma e desfizeram o mal-entendido de parte a parte.)"
32020-245 = "(De quebra, a Hanako levou bronca da Hifumi e foi trocar de roupa direitinho.)"
32020-247 = "Próximo Episódio;Encontro Secreto na Madrugada"
