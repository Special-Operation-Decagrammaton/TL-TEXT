[translation]
10025090-1 = "Episódio 9: Coelhos na Água"
10025090-3 = "Ei, rápido!"
10025090-4 = "Antes que a neblina se dissipe, troquem o conteúdo!"
10025090-5 = "Sim, capitão!"
10025090-7 = "……A neblina está mais densa do que eu pensava, que sorte. Assim, ninguém vai notar o que estamos fazendo."
10025090-8 = "Embora seja preocupante não conseguir ver o estado da vila daqui também..."
10025090-9 = "Bem, se parecer que vamos ser descobertos, é só fugir para o alto-mar."
10025090-14 = "Capitão, o que fazemos com os camarões congelados que estavam na caixa?"
10025090-15 = "Por que pergunta isso agora?"
10025090-16 = "— Jogue-os no mar ou algo assim."
10025090-17 = "Ma-mas... esses camarões ainda estão bons para comer..."
10025090-18 = "Desperdiçar comida traz azar, não acha..."
10025090-20 = "É por isso que você nunca amadurece. #nNão se preocupe com coisas que não dão dinheiro."
10025090-22 = "Se isso der certo, vou te dar de comer sashimi muito mais caro que esses camarões, quantas vezes quiser."
10025090-23 = "Entendeu agora? Jogue logo essa porcaria fora."
10025090-24 = "……Francamente, o que tem de tão bom naqueles crustáceos?"
10025090-25 = "……Entendido."
10025090-30 = "Capitão, um pequeno barco está se aproximando."
10025090-31 = "……Vamos ignorar?"
10025090-32 = "Os moradores desta vila no 'Navio do Retorno'...?"
10025090-33 = "Não, não parece ser um morador. Provavelmente é aquele turista."
10025090-34 = "Tsc, causando problemas até o fim."
10025090-36 = "Ei, contate a casa de máquinas. Vamos para o alto-mar a toda velocidade."
10025090-37 = "Casa de máquinas, estão me ouvindo? Agora, a toda velocidade—"
10025090-42 = "O que... que barulho foi esse!?"
10025090-43 = "A-aconteceu uma falha repentina no casco...! #nO propulsor não está funcionando!!"
10025090-44 = "……O que disse?"
10025090-45 = "Faça uma parada de emergência e tente o modo de direção manual!"
10025090-46 = "N-não dá...! O propulsor está completamente destruído!"
10025090-47 = "Não batemos em nenhum recife, então por que o propulsor deu problema!?"
10025090-48 = "Capitão, o barco está se aproximando! Já está bem na nossa frente!!"
10025090-49 = "Droga...!"
10025090-51 = "Ei, preparem-se para o combate! Aqueles idiotas, vou fazê-los se arrepender...!"
