[translation]
10025090-1 = "第9話;水中のウサギ"
10025090-3 = "おい、急げ！"
10025090-4 = "霧が晴れる前に、中身を入れ替えるんだ！"
10025090-5 = "はい、船長！"
10025090-7 = "……思ったより霧が濃くて助かったぜ。これなら何をしてようと気づかれないだろ。"
10025090-8 = "ただ、こっちからも村の様子が見えないのは気がかりだが……"
10025090-9 = "まあ、見つかりそうになったら沖に逃げれば済む話だ。"
10025090-14 = "船長、箱に入ってた冷凍エビはどうしましょう？"
10025090-15 = "何を今さら。"
10025090-16 = "――海にでも捨てておけ。"
10025090-17 = "で、でも……まだ食べれますよ、このエビ……"
10025090-18 = "食べ物を粗末にしたら、罰が当たるんじゃ……"
10025090-20 = "そんなんだから、いつまで経ってもお前は成長しねえんだよ。#n金にならんモノをいちいち気にするな。"
10025090-22 = "これがうまくいけば、エビの何倍も高価な刺し身を何食でも食べさせてやるさ。"
10025090-23 = "だから分ぁったか？んなモンさっさと捨てろ。"
10025090-24 = "……ったく、あんな甲殻類のどこが良いんだか。"
10025090-25 = "……了解。"
10025090-30 = "船長、小型ボート接近中です。"
10025090-31 = "……無視しますか？"
10025090-32 = "この村の住民が「再来の船」に……？"
10025090-33 = "いえ、それが村人ではなさそうでした。おそらく、あの観光客かと。"
10025090-34 = "チッ、最後まで面倒かけやがって。"
10025090-36 = "おい、機関室に連絡だ。全速力で沖に出ろ。"
10025090-37 = "機関室、聞こえてるか？今すぐ全速力で――"
10025090-42 = "なっ……なんだ、今の音は！？"
10025090-43 = "と、突然船底で異常が発生したようです……！#nプロペラが動きません！！"
10025090-44 = "……何だって？"
10025090-45 = "緊急停止して、手動操舵モードを試せ！"
10025090-46 = "だっ、ダメです……！プロペラが完全にイっちまってます！"
10025090-47 = "暗礁に乗り上げたわけでもないのに、どうしてプロペラにトラブルがっ！？"
10025090-48 = "船長、ボートが接近中です！もうすぐ目の前まで！！"
10025090-49 = "クッ……！"
10025090-51 = "おい、戦闘準備をしろ！アイツらめ、後悔させてやる……！"
