[translation]
10023040-1 = "第4話;ご挨拶を申し上げます、ぴょん"
10023040-8 = "[ns] \"お疲れ様、アリス。お掃除頑張ってるね。\""
10023040-9 = "もちろんです、先生！#n今のアリスはメイド勇者ですから！"
10023040-10 = "[s] \"メイド勇者？\""
10023040-11 = "メイドと勇者を極めた先にある最強の存在です！#n最強と最強が合わさった上級職です！"
10023040-12 = "[s] （アリスにとって、メイドって……？）"
10023040-13 = "ところで、先生はこんなに遅くまで起きてて大丈夫なんですか？"
10023040-14 = "いのちを大事にしてくださいね。#n宿屋で寝ないと体力は回復しません。"
10023040-15 = "アリスはへっちゃらです！#nモモイたちと、よく徹夜でゲームをしていますから！"
10023040-16 = "[s1] \"頑張ってるアリスに元気をもらってるから大丈夫だよ。\"\n[s2] \"モモイに徹夜でゲームはやめるよう言わないと……。\""
10023040-24 = "あ、今あくびをしました！#n掃除はアリスに任せて、先生は寝てください！"
10023040-25 = "もう、朝の5時20分を過ぎてるんですよ！"
10023040-26 = "アリスちゃん……そっちの棚を拭き終わったら、次はこっちをお願い出来る？"
10023040-27 = "分かりました、ユズ！#nアリス、床拭きモードに切り替えます！"
10023040-31 = "ふぁああああ……"
10023040-32 = "眠い……"
10023040-33 = "[s] \"みんな、こんな時間までお疲れ様……\""
10023040-34 = "あはは……5時20分から7時40分の間は、特に警戒してくれって言われてるからね……"
10023040-35 = "ついでに掃除も頼まれたので、身体を動かしている分眠気はマシな方ではありますが……"
10023040-36 = "掃除分報酬に上乗せされるらしいから、不満はないけど……"
10023040-37 = "ね～む～い～……"
10023040-39 = "（……そうして何事も無いまま午後を迎えた）"
10023040-40 = "（予定通り開催されたパーティーは、想像以上の混雑ぶりだった）"
10023040-42 = "おい、グラスが空いたままじゃないか。#nいつになったら注いでくれるんだ？"
10023040-43 = "え？あ、ごめ……"
10023040-44 = "も、申し訳ありません。すぐにお持ちします。"
10023040-45 = "メイドの失態は主人の評判に直結するというのに、まったく何をしているんだ！"
10023040-46 = "（うぐぐぐ……！言わせておけば言いたい放題！#n　そもそも本当はメイドじゃないのに！）"
10023040-47 = "そもそも、雇われメイドとはいえ、基本の所作くらい学んだらどうなんだい？#nその辺のロボットの方がまだ優雅だよ。"
10023040-48 = "あの……申し訳ございません。#nお客様のグラスは、既に注がれております。"
10023040-49 = "なにっ？そんなバカな。さっきまで確かに……！"
10023040-53 = "ほ、本当だ！いったい誰が淹れたというのだ……？#n音も気配も無かったのに……？"
10023040-55 = "（うそ！？一体何が起きたの？）"
10023040-56 = "（私も分からないよ……）"
10023040-65 = "うわーん！お客様が多すぎます！#nこのままではアリス、スネイルみたいになってしまいます！"
10023040-69 = "おい！こんな所に皿が落ちてるじゃないか！"
10023040-70 = "危ないだろ！早く何とかしてくれ！"
10023040-72 = "も、申し訳ありません！#nですが、アリス今は他のお客様の対応が……"
10023040-74 = "言い訳はそれだけか？私を誰だと思っているんだ！"
10023040-75 = "う、うぅ……"
10023040-79 = "ううぅ……申し訳ありません。お客様、少しお待ちください……"
10023040-87 = "あれ……？#nお皿が……どこにもありません。"
10023040-88 = "何を言ってるんだ？ここに……"
10023040-89 = "ど、どこにいったんだ！？"
10023040-90 = "ぐぬぬ……#nパーティーに文句をつけて、オークションで優遇を受ける計画が……！"
10023040-92 = "おい、一体何を作ってるんだ！#nこんな料理をお客様にお出しするつもりなのか？"
10023040-93 = "よく見ろ！これのどこが焼けてるっていうんだ？#n生焼けですらないぞ！？"
10023040-94 = "そこのメイド、お前もだ！#n給料を貰ってるんだから、もっとキビキビ動け！"
10023040-95 = "わあぁっ……すみません、すみません！"
10023040-96 = "謝ってる暇があるならさっさと料理を持っていけ！せっかくの料理が冷めるじゃねえかって……"
10023040-97 = "あ？"
10023040-98 = "ここにあった料理……どこ行った？"
10023040-101 = "全て私が運びました。他にご指示は？"
10023040-102 = "何だって？あの量を全部一人でか？"
10023040-103 = "もちろんです。私は優秀なメイドですから。"
10023040-104 = "メ、メイド……？#nバニーガール、じゃないのか？"
10023040-105 = "……よし、ホール班は交代で休憩に入って良いぞ！"
10023040-109 = "キッチン班は残れ！"
10023040-116 = "あれ……"
10023040-121 = "お久しぶりです。ピースピース。"
10023040-122 = "えええええっ！？"
10023040-124 = "[ns] \"なるほど、ネルが……\""
10023040-125 = "はい。「慈愛の怪盗」の情報を掴んだから、後は任せた、と。"
10023040-126 = "他にも任務があるのですが……"
10023040-127 = "それはさておき、まさか先生もいらっしゃるとは。"
10023040-128 = "[s] \"トキに会えて嬉しいよ。よろしくね。\""
10023040-129 = "ありがとうございます、先生。私も嬉しいです。"
10023040-130 = "また、先輩方からこのような言葉を言われました。"
10023040-131 = "「私たちの不在、トキちゃんに任せたよ！」#n「良い報せを期待してる」――"
10023040-132 = "――「道具と予算は存分に使って構いません。請求書は全て、セミナーの会計に回しておいてください」と。"
10023040-133 = "そして――「普段は口にしねぇけど、お前のことは信頼してる」とも。"
10023040-137 = "……ふっ。"
10023040-138 = "[s] \"う、うん……よかったね。\""
10023040-139 = "――「慈愛の怪盗」は、既に予告状を送ってきたそうで。"
10023040-140 = "私にも見せていただけますでしょうか。"
10023040-141 = "[s5] \"それは構わないけど、トキ……\"\n[s6] \"さっきから気になってるんだけど……\""
10023040-142 = "はい、何でしょうか？"
10023040-143 = "はい、何でしょうか？"
10023040-144 = "[s] \"……どうしてバニーガールなの？\""
10023040-145 = "……"
10023040-146 = "本気で仰っているのですか、先生。"
10023040-147 = "[s] \"えっ！？\""
10023040-148 = "C&Cの潜入作戦といえば、バニーでしょう？"
10023040-149 = "かつて、オデュッセイア海洋高等学校のクルーズ船に潜入した先輩方の記録からそうであると判断しておりますが……"
10023040-150 = "[s] \"あっ、それには色々な事情が……\""
10023040-151 = "……？"
10023040-152 = "[s] \"な、何でもないよ。トキはそのままで……\""
10023040-153 = "何故そのような苦い顔をされているのかは分かりませんが……"
10023040-154 = "先生がそう仰るなら、気にしない事としましょう。"
10023040-155 = "ともかく、今は怪盗の件を解決しなければなりませんから。#nそれと――"
10023040-159 = "あう……あ、あうううぅ……"
10023040-163 = "……い、居ません……こ、ここには誰も居ません……"
10023040-165 = "……"
10023040-166 = "こういう時、一体どうすれば良いのでしょうか？"
10023040-167 = "[s7] \"分からない事を聞いてくれるのは嬉しいけど……\"\n[s8] \"ごめんね、必ずしも大人が答えを知っているわけでは……\""
10023040-168 = "そうですか……ところで、皆さんは一体何故ここに？"
10023040-169 = "そうですか……ところで、皆さんは一体何故ここに？"
10023040-170 = "ぜ、全然怖くないし！#nいざとなったら格闘ゲームでボコボコにしてやるんだから！"
10023040-171 = "お姉ちゃん、気をつけて。#nこの人……不利になったらチート装備に変えてくるよ！"
10023040-173 = "アリスちゃんをまた奪われるわけには、いかない……けど……#nううぅ、でも……"
10023040-174 = "[ns] \"……私が代わりに説明するね。\""
10023040-177 = "C&Cに間違われ、依頼を引き受けてしまった、と……なるほど。#n先生がメイド服を借りていったのは、このためだったのですね。"
10023040-178 = "ど、どうしよう、お姉ちゃん？"
10023040-179 = "もう終わりだよぉぉぉ！#nどうしよう！？ネル先輩に怒られる！！"
10023040-180 = "うわーん！"
10023040-181 = "いえ、先輩方に報告はしません。#n私は任務を遂行しに来ただけですから。"
10023040-182 = "ゲーム開発部の存在は想定外でしたが……"
10023040-183 = "[s] \"本当に大丈夫なの？後で何か言われたり……\""
10023040-184 = "はい、大丈夫です。"
10023040-185 = "私を置いて行ったのは先輩方ですし……多少のイレギュラーがあろうとも、任務が達成できるなら問題ありません。"
10023040-189 = "[ns9] \"あれ、電気が……\"\n[ns10] \"ちょっと待って、もしかして……！\""
10023040-190 = "！？！？"
10023040-191 = "！？！？"
10023040-193 = "な、何が起きてるんだ？電気が全て消えた！"
10023040-194 = "一体何が起きているのですか？[ruby=めいたろう]明太郎[/ruby]さん？#n説明をお願いします！"
10023040-195 = "お、落ち着いてください！皆様、ご安心を。#n停電は一時的なものですから、すぐに復旧します。"
10023040-196 = "いえ、そうはさせませんよ――"
10023040-197 = "誰だ……？"
10023040-199 = "ある者は、こう言いました。#n――「価値ある物は、その手に収めてこそだ」と。"
10023040-200 = "たとえ人目に触れぬまま……何年、何十年と経過し――#nいつしか人々から忘れ去られようとも。"
10023040-201 = "しかし、それは本当に正しいのでしょうか？#n美術品とは、広く知られてこそ、その価値を証明できるのでは？"
10023040-202 = "まさか……！"
10023040-205 = "ある者は、[ruby=わたくし] 私 [/ruby]を[ruby=ぬすびと]盗人[/ruby]と蔑み――"
10023040-212 = "そしてまた、ある者は私を[ruby=とがびと]咎人[/ruby]と罵る。"
10023040-217 = "人は生まれながらにして名を持つわけではありません。#n呼び名とは、他者から与えられるもの。"
10023040-222 = "故に、私は――その名を受け入れました。"
10023040-224 = "そう、我が名は――"
10023040-236 = "――「慈愛の怪盗」。"
