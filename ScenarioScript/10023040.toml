[translation]
10023040-1 = "Episódio 4; Permita-me cumprimentá-lo, pyon"
10023040-8 = "[ns] \"Bom trabalho, Alice. Você está se esforçando bastante na limpeza.\""
10023040-9 = "Com certeza, Sensei!#nAgora a Alice é uma empregada heroína!"
10023040-10 = "[s] \"Empregada heroína?\""
10023040-11 = "É a existência mais forte que existe após dominar o caminho da empregada e do herói!#nÉ uma classe avançada que combina o mais forte com o mais forte!"
10023040-12 = "[s] (Para a Alice, o que é uma empregada... afinal?)"
10023040-13 = "Aliás, Sensei, tudo bem você ficar acordado até tão tarde?"
10023040-14 = "Por favor, cuide da sua vida.#nSe você não dormir na estalagem, sua energia não vai recuperar."
10023040-15 = "A Alice está bem!#nPorque eu costumo virar a noite jogando com a Momoi e as outras!"
10023040-16 = "[s1] \"Estou bem porque a dedicação da Alice me dá energia.\"\n[s2] \"Preciso dizer para a Momoi parar de virar a noite jogando...\""
10023040-24 = "Ah, você acabou de bocejar!#nDeixe a limpeza com a Alice e vá dormir, Sensei!"
10023040-25 = "Já passou das 5h20 da manhã!"
10023040-26 = "Alice-chan... depois que terminar de limpar aquela prateleira, pode cuidar desta aqui?"
10023040-27 = "Entendido, Yuzu!#nAlice, mudando para o modo de limpeza de chão!"
10023040-31 = "Fuaaaa..."
10023040-32 = "Estou com sono..."
10023040-33 = "[s] \"Pessoal, bom trabalho por ficarem até essa hora...\""
10023040-34 = "Ahaha... disseram para ficarmos em alerta máximo entre 5h20 e 7h40, então..."
10023040-35 = "Como também me pediram para limpar, o sono é um pouco mais suportável enquanto me movimento..."
10023040-36 = "Disseram que vão adicionar um bônus pela limpeza, então não tenho do que reclamar, mas..."
10023040-37 = "Estooooou... com... sooono..."
10023040-39 = "(...E assim, a tarde chegou sem incidentes)"
10023040-40 = "(A festa, realizada conforme o planejado, estava mais lotada do que o imaginado)"
10023040-42 = "Ei, o copo está vazio. Quando é que você vai servir mais?"
10023040-43 = "Eh? Ah, desculpe..."
10023040-44 = "Pe-peço perdão. Vou trazer agora mesmo."
10023040-45 = "A falha de uma empregada reflete diretamente na reputação do seu mestre, o que você está fazendo?!"
10023040-46 = "(Grrr...! Falando tudo o que quer só porque deixei!#nPara começar, eu nem sou uma empregada de verdade!)"
10023040-47 = "Além disso, mesmo sendo uma empregada contratada, por que não aprende o básico? Até os robôs por aí são mais elegantes."
10023040-48 = "Aquela... peço perdão.#nO copo do senhor já foi servido."
10023040-49 = "O quê? Não seja ridícula. Até agora há pouco, com certeza..."
10023040-53 = "É-é verdade! Quem foi que serviu...?#nNem ouvi barulho e nem senti presença..."
10023040-55 = "(Mentira!? O que aconteceu?)"
10023040-56 = "(Eu também não sei...)"
10023040-65 = "Uwaaa! Tem clientes demais!#nDesse jeito, a Alice vai acabar virando um caracol!"
10023040-69 = "Ei! Tem um prato caído aqui!"
10023040-70 = "É perigoso! Dê um jeito nisso logo!"
10023040-72 = "Pe-peço perdão!#nMas a Alice está atendendo outros clientes agora..."
10023040-74 = "Essa é a única desculpa que você tem? Sabe com quem está falando?"
10023040-75 = "U-uuh..."
10023040-79 = "Uuu... peço perdão. Senhor, por favor, espere um momento..."
10023040-87 = "Ué...?#nO prato... não está em lugar nenhum."
10023040-88 = "Do que está falando? Aqui..."
10023040-89 = "A-aonde foi parar!?"
10023040-90 = "Grrr...#nMeu plano de reclamar da festa para conseguir vantagens no leilão..."
10023040-92 = "Ei, o que você está fazendo!#nPretende servir esse tipo de comida para os clientes?"
10023040-93 = "Olhe bem! Onde é que isso está assado?#nNem cru está!"
10023040-94 = "Você aí, empregada, você também!#nJá que está recebendo um salário, mova-se com mais agilidade!"
10023040-95 = "Waaa... desculpe, desculpe!"
10023040-96 = "Se tem tempo para pedir desculpas, leve a comida logo! A comida vai acabar esfriando..."
10023040-97 = "Ah?"
10023040-98 = "A comida que estava aqui... para onde foi?"
10023040-101 = "Eu levei tudo. Alguma outra instrução?"
10023040-102 = "O quê? Você carregou tudo aquilo sozinha?"
10023040-103 = "Claro. Afinal, sou uma empregada exemplar."
10023040-104 = "Em-empregada...? #nNão é uma coelhinha?"
10023040-105 = "...Certo, o pessoal do salão pode revezar para fazer uma pausa!"
10023040-109 = "O pessoal da cozinha, fiquem!"
10023040-116 = "Ué..."
10023040-121 = "Há quanto tempo. Paz e amor."
10023040-122 = "Eeeeeeh!?"
10023040-124 = "[ns] \"Entendo, então a Neru...\""
10023040-125 = "Sim. Ela disse que, como conseguiu informações sobre a 'Ladra da Benevolência', o resto ficaria por minha conta."
10023040-126 = "Embora eu tenha outras missões para cumprir..."
10023040-127 = "Deixando isso de lado, não esperava que o Sensei também estivesse aqui."
10023040-128 = "[s] \"Fico feliz em te ver, Toki. Conto com você.\""
10023040-129 = "Obrigada, Sensei. Eu também estou feliz."
10023040-130 = "Além disso, recebi estas palavras das minhas veteranas."
10023040-131 = "'Nossa ausência fica por sua conta, Toki-chan!' #n'Estamos esperando boas notícias' —"
10023040-132 = "— 'Pode usar as ferramentas e o orçamento à vontade. Envie todas as faturas para a contabilidade do Seminar'."
10023040-133 = "E também... 'Não costumo dizer isso, mas confio em você'."
10023040-137 = "...Hmph."
10023040-138 = "[s] \"Oh, entendo... que bom.\""
10023040-139 = "— Parece que a 'Ladra da Benevolência' já enviou a carta de aviso."
10023040-140 = "Poderia me mostrar?"
10023040-141 = "[s5] \"Não me importo, mas Toki...\"\n[s6] \"Estou curioso sobre uma coisa desde agora...\""
10023040-142 = "Sim, o que seria?"
10023040-143 = "Sim, o que seria?"
10023040-144 = "[s] \"...Por que você está vestida de coelhinha?\""
10023040-145 = "..."
10023040-146 = "Você está perguntando sério, Sensei?"
10023040-147 = "[s] \"Hã!?\""
10023040-148 = "Quando se fala em missões de infiltração da C&C, não é o traje de coelhinha o padrão?"
10023040-149 = "Julguei que fosse assim com base nos registros das veteranas que se infiltraram no navio de cruzeiro da Escola Marítima Odyssey..."
10023040-150 = "[s] \"Ah, sobre isso, houve várias circunstâncias...\""
10023040-151 = "...?"
10023040-152 = "[s] \"N-não é nada. Pode continuar assim, Toki...\""
10023040-153 = "Não sei por que você está com essa cara de quem comeu algo amargo, mas..."
10023040-154 = "Se o Sensei diz, vou tentar não me preocupar com isso."
10023040-155 = "De qualquer forma, agora precisamos resolver o caso da ladra. #nE também—"
10023040-159 = "Au... a-auuuu..."
10023040-163 = "...N-não tem ninguém... n-não tem ninguém aqui..."
10023040-165 = "..."
10023040-166 = "O que se deve fazer em momentos como este?"
10023040-167 = "[s7] \"Fico feliz que me peça ajuda quando não sabe algo, mas...\"\n[s8] \"Sinto muito, mas os adultos nem sempre têm todas as respostas...\""
10023040-168 = "Entendo... A propósito, por que vocês estão aqui?"
10023040-169 = "Entendo... A propósito, por que vocês estão aqui?"
10023040-170 = "E-eu não estou nem um pouco assustada! #nSe for preciso, vou acabar com ela no jogo de luta!"
10023040-171 = "Irmã, cuidado. #nEssa pessoa... se ficar em desvantagem, ela troca para equipamentos trapaceiros!"
10023040-173 = "Não posso deixar que levem a Alice-chan de novo... mas... #nUuuu, mas..."
10023040-174 = "[ns] \"……Eu explicarei no lugar dele.\""
10023040-177 = "Confundido com a C&C e acabou aceitando o pedido, é... entendo. #nEntão foi por isso que o Sensei pegou o uniforme de empregada emprestado."
10023040-178 = "O-o que a gente faz, irmã?"
10023040-179 = "Já era, acabou tudo! #nO que eu faço!? A Neru-senpai vai ficar uma fera comigo!!"
10023040-180 = "Waaaaah!"
10023040-181 = "Não, eu não vou reportar isso às minhas superiores. #nEu só vim aqui para cumprir a minha missão."
10023040-182 = "A existência do Departamento de Desenvolvimento de Jogos não estava nos meus cálculos, mas..."
10023040-183 = "[s] \"Tem certeza mesmo? E se falarem algo depois...\""
10023040-184 = "Sim, estou bem."
10023040-185 = "Foram as minhas superiores que me deixaram para trás... e, mesmo que haja alguns imprevistos, não há problema desde que a missão seja concluída."
10023040-189 = "[ns9] \"Ué, a luz...\"\n[ns10] \"Espere um pouco, será que...!\""
10023040-190 = "！？！？"
10023040-191 = "！？！？"
10023040-193 = "O-o que está acontecendo? Todas as luzes se apagaram!"
10023040-194 = "O que está acontecendo, afinal? Senhor Meitaro? #nPor favor, nos explique!"
10023040-195 = "C-calma, por favor! Todos, fiquem tranquilos. #nA queda de energia é temporária, logo será restaurada."
10023040-196 = "Não, eu não vou deixar que isso aconteça—"
10023040-197 = "Quem está aí...?"
10023040-199 = "Alguém disse uma vez: #n—\"Coisas valiosas só têm valor quando estão em suas mãos.\""
10023040-200 = "Mesmo que fiquem escondidas da vista de todos... por anos, décadas — #ne mesmo que, com o tempo, sejam esquecidas pelas pessoas."
10023040-201 = "Mas será que isso é realmente correto? #nUma obra de arte não prova o seu valor justamente por ser amplamente conhecida?"
10023040-202 = "Não pode ser...!"
10023040-205 = "Alguns me desprezam, chamando-me de ladra —"
10023040-212 = "E outros me insultam, chamando-me de criminosa."
10023040-217 = "As pessoas não nascem com um nome. #nUm título é algo que nos é dado pelos outros."
10023040-222 = "Por isso, eu — aceitei esse nome."
10023040-224 = "Sim, o meu nome é —"
10023040-236 = "— \"A Ladra Fantasma da Benevolência\"."
