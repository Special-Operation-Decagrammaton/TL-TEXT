[translation]
10007080-1 = "第8話;温泉開発部の陰謀"
10007080-2 = "227号温泉郷・周辺の散歩道"
10007080-4 = "（チナツや他のみんなを捜しつつ、温泉郷の外に作られた散歩道に出てきた）"
10007080-5 = "（しかしチナツはもちろん、他の生徒たちの気配もほとんど感じられなかった）"
10007080-6 = "[s] \"みんな、どこに行ったんだろう……。\""
10007080-7 = "何をそんなに探してるんだ、カムラッド？"
10007080-12 = "そんな薄着でこの辺を歩き回ると、風邪をひくぞ？"
10007080-13 = "レッドウィンター連邦学園の冬を舐めると、大変なことになるからな。"
10007080-14 = "[s] \"そんなチェリノの方が寒そうだけど……大丈夫？\""
10007080-15 = "ふふふ……余計な心配だ、カムラッド。"
10007080-16 = "確かに常人なら、この寒さには耐えられないだろうが……。"
10007080-17 = "おいらはレッドウィンター連邦学園の生徒会長であり、書記長であり、環境美化部部長であり、"
10007080-18 = "あと、えっと……"
10007080-19 = "とにかく、色々と重大な職責をすべて任されている偉大な身！"
10007080-20 = "この程度の寒さ、"
10007080-21 = "たとえ半袖でも何とも無――"
10007080-22 = "……っくしゅん！"
10007080-23 = "そのままでは風邪を引いてしまいますよ、チェリノちゃん。もっと暖かい格好をした方が……。"
10007080-24 = "それとも、温かいコーヒー牛乳をお持ちしましょうか？"
10007080-25 = "よっ、"
10007080-26 = "余計な心配だトモエ！おいらはちっとも寒くないと言ったではないか！"
10007080-27 = "……でも、温かいコーヒー牛乳は飲む。砂糖もたっぷり頼むぞ！"
10007080-28 = "はい、すぐにご用意いたします。"
10007080-32 = "[ns] \"温泉、楽しめてるみたいで良かった。\""
10007080-33 = "うむ、まあ悔しいことではあるが……確かにこの温泉郷は楽しい。一日中遊んでも飽きないぐらいにな。"
10007080-34 = "様々なコンセプトの温泉はもちろん、卓球台やゲーム機器などしっかり備えられている。遊び疲れたらまた温泉に入って、という無限ループも……"
10007080-35 = "「227号特別クラスの貧乏な生徒たちが急いで作った施設」と舐めていたが、なかなかだな。"
10007080-36 = "[s] \"施設のほとんどは温泉開発部が建てたみたいだけど。\""
10007080-37 = "ああ、そういえばおいらもその話は聞いた。何やらゲヘナの生徒らしいな？"
10007080-38 = "校則に従うのなら、レッドウィンターの自治区でおいらの許可も無しに工事を進めるなんて、そいつらは普通だと厳重に粛清すべきなんだが……"
10007080-39 = "短期間でこんなに立派な温泉郷を建てるその能力は、ぜひとも欲しい。"
10007080-40 = "……少なくとも、常にストライキに明け暮れる「工務部」の労働者たちよりは、はるかに役立つだろう。"
10007080-41 = "うむ……どうすればあの温泉開発部を、レッドウィンター連邦学園に引き入れることができるものか……？"
10007080-46 = "そうだ！やつらに名誉ある勲章を授与したら、感動しておいらに忠誠を誓うはずだな！「1級髭労働章」ぐらいで十分だろう！"
10007080-47 = "温泉開発部がレッドウィンターに編入したら、"
10007080-48 = "ここの隣においら専用のさらに大きな温泉郷を建設して……！"
10007080-49 = "うむ、悪くない……その際には、「髭・温泉郷」と名付けよう！"
10007080-50 = "おいら専用の温泉郷だからな、おいらの権威を表す装飾物も欠かせない！"
10007080-51 = "温泉水が流れ出る髭の銅像と、髭の形をした灯籠、それから……。"
10007080-56 = "ドカアアァァァァン！"
10007080-57 = "ひ、ひゃあっ！？何の音だ？また地震か！？"
10007080-64 = "あははー、ごめんごめん！こんなところを通る人がいるとは思わなかったからさ！ちょうど開発作業を進めているところだから、ちょっと気をつけてねー！"
10007080-65 = "それで許されるとでも思ったか！？おいらの許可もなく勝手に工事を進めるなんて、いったいどこの部活のやつだ！？"
10007080-66 = "部員全員、まとめて粛清してやるからな！おとなしく所属を明か……ん？"
10007080-67 = "ゲヘナ学園の校章……？"
10007080-68 = "うん、私たちはゲヘナ学園の温泉開発部だよ！分かると思うけど、温泉を開発しに来たんだ！"
10007080-69 = "……で、そっちの髭をつけたおチビちゃんは？"
10007080-70 = "だっ、誰がおチビちゃんだ！おいらはレッドウィンター連邦学園の偉大なる生徒会長だぞ！"
10007080-71 = "それよりも……温泉開発部だと？つまり、この温泉郷を作ったのはお前たちか？"
10007080-72 = "そうそう！この温泉郷は私たちが建設したんだー！"
10007080-73 = "気合を入れたから、思ったより大きくて派手な作りになっちゃったけど……まあ、せっかくなら大きい方が良いよね！"
10007080-74 = "どう？会長から見ても立派な温泉郷でしょ？"
10007080-75 = "うむ、認めたくないが立派な温泉郷だ。レッドウィンター連邦学園の生徒たちも満足してるみたいだし、おいらもまあ、多少は楽しんだし……。"
10007080-76 = "他校の生徒に勲章を授与することなどほとんど無いが、今回は例外を設けることにしよう。"
10007080-81 = "トモエ！"
10007080-85 = "はい、チェリノ会長。"
10007080-86 = "レッドウィンター連邦学園に、新たな観光名所を建設したその功績を称えて……"
10007080-88 = "ゲヘナの温泉開発部に「1級髭労働章」と、「特別友好章」を授与する！"
10007080-95 = "1級髭……なんて？というか、"
10007080-96 = "勲章？それって何か良いものなの？"
10007080-98 = "ひ、髭労働章を貰って喜ばないだと！？"
10007080-99 = "何故だ？工務部も1年に7回しか貰えなかった、貴重な勲章なんだぞ？"
10007080-100 = "会長、ゲヘナ学園にはレッドウィンター連邦学園のように、叙勲制度が存在しませんので……。"
10007080-101 = "……つまり、勲章の価値が分からないと？"
10007080-102 = "これだからゲヘナの生徒たちは……。"
10007080-103 = "ところで、お前たちはここで何の工事をしているのだ？ 「227号温泉郷」の建設は終わったのだろう？"
10007080-104 = "それがね、水脈に何か異変があったのか、昨日からお風呂の水圧が弱くなってきちゃっててさー。"
10007080-105 = "このままだと、この辺の温泉が全部枯れちゃうかもしれないんだよね！"
10007080-106 = "そ、それは大変だな……せっかくの温泉が枯れてしまうとは……。"
10007080-107 = "でも、大丈夫！うちのカスミ部長に任せとけば何とかなるから！"
10007080-108 = "部長からの情報によると、えっーと……"
10007080-109 = "レッドウィンター連邦学園の地下には、巨大なマグマ地帯が隠されてるんだって！"
10007080-110 = "その地帯を一気に爆発させれば「227号温泉郷」の水脈が何とかなるのはもちろん、レッドウィンター全域に新しい温泉がたくさん建設できそう！これで万事解決だね！"
10007080-111 = "うむ、それは良い考えだな。"
10007080-112 = "マグマ地帯を爆発させて水脈を取り戻し、新しい温泉を建設……"
10007080-116 = "……待て、今何といった？何をすると？"
10007080-117 = "爆発。"
10007080-118 = "何を？"
10007080-119 = "レッドウィンターの地下を。"
10007080-120 = "そ、そんなことをしたら、その上にある学校はどうなるのだ？この自治区は？おいらの事務局は？"
10007080-121 = "よく分かんないけど……たぶん跡形もなく消えるんじゃない？"
10007080-122 = "でも大丈夫、大丈夫！その代わりに、新しい温泉郷を建設してあげるからさ！この温泉郷より何倍も大きくて派手なやつを！"
10007080-126 = "そっ……"
10007080-128 = "……それで良いわけが無いだろう！？"
10007080-130 = "ん？何で怒ってるの？素敵なリゾート地が無料で手に入るんだよ？"
10007080-131 = "いくら素敵なリゾート地ができるからといって、おいらの事務局が無くなったら何の意味も無いではないか！"
10007080-132 = "ええー、でもそうしないと「227号温泉郷」の温泉は枯れちゃうんだよ？温泉と事務局、どっちが大事なのさ？"
10007080-133 = "事務局に決まってる！そもそもおいらは、旧校舎の特別クラスのやつらが豪遊しているのが気に食わなかっただけだ！"
10007080-134 = "温泉開発なんか中止だ、中止！この温泉郷は、最初の計画通り撤去するぞ！"
10007080-138 = "マリナ！すぐにおいらの「粛清君1号」を持ってこい！"
10007080-140 = "では会長。"
10007080-141 = "跡形もなく、キレイに撤去しましょう！"
10007080-143 = "えー、絶対に事務局より温泉の方が良いのにー。"
10007080-144 = "仕方ないなぁ、温泉開発に協力してくれないなら……"
10007080-146 = "無理矢理、開発を続行させてもらおっと♪さあさあ、開発の時間だよっ！！"
