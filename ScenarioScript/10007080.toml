[translation]
10007080-1 = "Episódio 8: A Conspiração do Departamento de Desenvolvimento de Fontes Termais"
10007080-2 = "Termas 227 - Caminho ao Redor"
10007080-4 = "（Enquanto procuro por Chinatsu e os outros, acabo saindo em um caminho construído fora das termas）"
10007080-5 = "（No entanto, não sinto a presença de Chinatsu, nem de nenhum outro estudante）"
10007080-6 = "[s] \"Para onde será que todos foram...?\""
10007080-7 = "O que está procurando com tanta dedicação, camarada?"
10007080-12 = "Se ficar andando por aí com roupas tão leves, vai acabar pegando um resfriado, sabia?"
10007080-13 = "Subestimar o inverno da Academia Federal Red Winter pode trazer sérias consequências."
10007080-14 = "[s] \"A Cherino parece estar com mais frio que eu... você está bem?\""
10007080-15 = "Fufufu... isso é uma preocupação desnecessária, camarada."
10007080-16 = "É verdade que uma pessoa comum não suportaria este frio, mas..."
10007080-17 = "Eu sou a presidente do conselho estudantil da Academia Federal Red Winter, secretária-geral, chefe do departamento de embelezamento ambiental,"
10007080-18 = "e, bem..."
10007080-19 = "De qualquer forma, sou uma pessoa grandiosa encarregada de várias responsabilidades importantes!"
10007080-20 = "Este nível de frio,"
10007080-21 = "mesmo de mangas curtas, não é nada para m—"
10007080-22 = "……Atchim!"
10007080-23 = "Você vai acabar pegando um resfriado desse jeito, Cherino-chan. É melhor se agasalhar mais..."
10007080-24 = "Ou prefere que eu traga um leite com café quente?"
10007080-25 = "Ei,"
10007080-26 = "Preocupação desnecessária, Tomoe! Eu não disse que não estou nem um pouco com frio?!"
10007080-27 = "……Mas, aceito o leite com café quente. E capriche no açúcar!"
10007080-28 = "Sim, trarei imediatamente."
10007080-32 = "[ns] \"Fico feliz que esteja aproveitando as termas.\""
10007080-33 = "Hum, embora seja frustrante admitir... estas termas são realmente divertidas. Dá para passar o dia inteiro aqui sem enjoar."
10007080-34 = "Além de termas com vários conceitos, há mesas de pingue-pongue e máquinas de jogos bem equipadas. O ciclo infinito de brincar até cansar e depois entrar na água é..."
10007080-35 = "Eu subestimei, achando que eram apenas \"instalações feitas às pressas pelos estudantes pobres da Classe Especial 227\", mas são impressionantes."
10007080-36 = "[s] \"Parece que a maior parte das instalações foi construída pelo Departamento de Desenvolvimento de Fontes Termais.\""
10007080-37 = "Ah, agora que você mencionou, ouvi falar disso. Parece que são estudantes de Gehenna, não é?"
10007080-38 = "Se seguíssemos o regulamento escolar, eles deveriam ser rigorosamente expurgados por realizar construções na zona autônoma de Red Winter sem a minha permissão..."
10007080-39 = "Mas a habilidade deles de construir termas tão magníficas em pouco tempo é algo que eu adoraria ter."
10007080-40 = "……Pelo menos, seriam muito mais úteis do que os trabalhadores do \"Departamento de Obras\", que vivem em greve."
10007080-41 = "Hum... como será que posso trazer aquele Departamento de Desenvolvimento de Fontes Termais para a Academia Federal Red Winter...?"
10007080-46 = "Já sei! Se eu conceder a eles uma medalha de honra, eles ficarão emocionados e jurarão lealdade a mim! Uma \"Ordem do Trabalhador de Bigode de 1ª Classe\" deve bastar!"
10007080-47 = "Quando o Departamento de Desenvolvimento de Fontes Termais for incorporado à Red Winter,"
10007080-48 = "vou construir um complexo de termas ainda maior, exclusivo para mim, aqui ao lado...!"
10007080-49 = "Hum, nada mal... e vou chamá-lo de \"Termas do Bigode\"!"
10007080-50 = "Como é um complexo exclusivo para mim, não podem faltar decorações que representem a minha autoridade!"
10007080-51 = "Uma estátua de bigode de onde sai água termal, lanternas em formato de bigode, e então..."
10007080-56 = "CABUUUUM!"
10007080-57 = "Ai, meu Deus!? Que barulho é esse? Outro terremoto!?"
10007080-64 = "Ahaha, mal aí! Não achei que alguém fosse passar por aqui! Estamos no meio do trabalho de desenvolvimento, então tomem cuidado, hein!"
10007080-65 = "Você acha que isso é desculpa!? Quem são vocês para realizar construções sem a minha permissão?!"
10007080-66 = "Vou expurgar todos os membros de uma vez! Identifiquem-se... hã?"
10007080-67 = "O emblema da Academia Gehenna...?"
10007080-68 = "Isso mesmo, somos o Departamento de Desenvolvimento de Fontes Termais da Academia Gehenna! Como deve ter percebido, viemos desenvolver termas!"
10007080-69 = "……E quem é essa baixinha de bigode aí?"
10007080-70 = "Q-quem você chamou de baixinha?! Eu sou a grandiosa presidente do conselho estudantil da Academia Federal Red Winter!"
10007080-71 = "E mais importante... Departamento de Desenvolvimento de Fontes Termais? Quer dizer que foram vocês que construíram tudo isso?"
10007080-72 = "Isso mesmo! Fomos nós que construímos essas termas!"
10007080-73 = "Eu me empolguei um pouco e acabou ficando maior e mais chamativo do que eu pensava... mas, já que estamos fazendo, quanto maior, melhor, né!"
10007080-74 = "E então? Até na visão da Presidente, não é um resort de águas termais magnífico?"
10007080-75 = "Hum, odeio admitir, mas é um resort de águas termais magnífico. As alunas da Academia Federal Red Winter parecem satisfeitas, e eu também, bem, me diverti um pouco..."
10007080-76 = "Quase nunca concedo medalhas a alunas de outras escolas, mas desta vez abrirei uma exceção."
10007080-81 = "Tomoe!"
10007080-85 = "Sim, Presidente Cherino."
10007080-86 = "Em reconhecimento ao mérito de ter construído uma nova atração turística na Academia Federal Red Winter..."
10007080-88 = "Concedo ao Departamento de Desenvolvimento de Águas Termais de Gehenna a 'Medalha de Trabalho de Bigode de 1ª Classe' e a 'Medalha de Amizade Especial'!"
10007080-95 = "Bigode de 1ª... o quê? Digo,"
10007080-96 = "Medalha? Isso é algo bom?"
10007080-98 = "V-vocês não estão felizes em receber a Medalha de Trabalho de Bigode!?"
10007080-99 = "Por que? É uma medalha valiosa que até o Departamento de Obras só conseguiu receber 7 vezes em um ano, sabia?"
10007080-100 = "Presidente, na Academia Gehenna, não existe um sistema de condecorações como na Academia Federal Red Winter..."
10007080-101 = "...Ou seja, vocês não entendem o valor da medalha?"
10007080-102 = "É por isso que as alunas de Gehenna..."
10007080-103 = "Aliás, o que vocês estão construindo aqui? A construção do 'Resort de Águas Termais nº 227' já não tinha acabado?"
10007080-104 = "É que, parece que houve alguma anomalia no veio de água, e desde ontem a pressão da água das termas começou a ficar fraca."
10007080-105 = "Se continuar assim, todas as águas termais por aqui podem secar!"
10007080-106 = "I-isso é terrível... as águas termais, que tanto nos custaram, secarem..."
10007080-107 = "Mas não se preocupe! Se deixar com a nossa Chefe Kasumi, tudo vai dar certo!"
10007080-108 = "De acordo com as informações da chefe, hum..."
10007080-109 = "Dizem que, sob a Academia Federal Red Winter, existe uma enorme zona de magma escondida!"
10007080-110 = "Se explodirmos essa zona de uma vez, não só resolveremos o problema do veio de água do 'Resort de Águas Termais nº 227', como também poderemos construir muitas novas termas por toda a Red Winter! Problema resolvido!"
10007080-111 = "Hum, essa é uma boa ideia."
10007080-112 = "Explodir a zona de magma para recuperar o veio de água e construir novas termas..."
10007080-116 = "...Espere, o que você disse agora? O que vocês vão fazer?"
10007080-117 = "Explodir."
10007080-118 = "O quê?"
10007080-119 = "O subsolo da Red Winter."
10007080-120 = "S-se fizerem algo assim, o que acontecerá com a escola que está em cima? E com este distrito autônomo? E com a minha secretaria?"
10007080-121 = "Não sei bem... mas acho que vai desaparecer sem deixar vestígios, não?"
10007080-122 = "Mas não se preocupe, está tudo bem! Em troca, vamos construir um novo resort de águas termais para você! Um muito maior e mais chamativo do que este!"
10007080-126 = "I-isso..."
10007080-128 = "...Não tem como isso ser bom, tem!?"
10007080-130 = "Hm? Por que está brava? Você vai ganhar um resort maravilhoso de graça, sabia?"
10007080-131 = "Não importa o quão maravilhoso seja o resort, se a minha secretaria desaparecer, não faz sentido nenhum!"
10007080-132 = "Ah, mas se não fizermos isso, as águas do 'Resort de Águas Termais nº 227' vão secar, sabe? O que é mais importante, as termas ou a secretaria?"
10007080-133 = "A secretaria, obviamente! Para começo de conversa, eu só não gostava que o pessoal da classe especial do prédio antigo estivesse esbanjando por aí!"
10007080-134 = "O desenvolvimento das águas termais está cancelado, cancelado! Este resort será removido conforme o plano original!"
10007080-138 = "Marina! Traga meu 'Purificador nº 1' imediatamente!"
10007080-140 = "Entendido, Presidente."
10007080-141 = "Vamos remover tudo, sem deixar vestígios!"
10007080-143 = "Ah, mas as termas são definitivamente melhores que a secretaria."
10007080-144 = "Não tem jeito, se vocês não vão cooperar com o desenvolvimento das termas..."
10007080-146 = "Vou ter que continuar o desenvolvimento à força♪ Vamos lá, é hora de desenvolver!!"
