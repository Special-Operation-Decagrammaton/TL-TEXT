[translation]
33100-1 = "Episódio 10; Doce Mentira"
33100-3 = "Sensei, você veio de fora de Kivotos e é um adulto. Então, você deve saber muito bem da importância que 'acordos' como contratos e promessas carregam."
33100-4 = "Por exemplo, a expressão 'fazer um pacto com o diabo'?"
33100-5 = "Mesmo em lendas antigas, há várias histórias sobre 'um ser poderoso sendo derrotado por fazer uma promessa descuidada' ou o contrário, 'triunfando através dessas promessas'."
33100-6 = "A partir disso, você não consegue deduzir a seguinte ideia?"
33100-7 = "Mesmo que seja apenas um pedaço de papel ou uma promessa verbal... uma 'promessa' às vezes pode restringir e definir algo com muita força."
33100-8 = "Contratos, mandamentos, promessas... Assim como nessas lendas antigas, esses conceitos são muito importantes em Kivotos."
33100-9 = "Por exemplo, as escrituras da Trinity relatam sobre o 'divino' da origem primeva e os dez mandamentos celebrados em acordo com ele."
33100-10 = "Além disso, dizem que fomos expulsos do paraíso primordial porque quebramos uma 'promessa'... Tais coisas são passadas de geração em geração."
33100-12 = "...Mas eu não preciso te dizer isso. Afinal, você mesmo já usou esses conceitos para salvar alguém."
33100-14 = "Tente se lembrar. 'Gematria' não podia forçar nada às alunas de Abydos, eles apenas exigiam um 'contrato'."
33100-15 = "Se o contrato não fosse firmado, Gematria não teria escolha senão recuar."
33100-17 = "......"
33100-18 = "Este incidente também, no fim das contas, é a mesma coisa."
33100-19 = "O 'Tratado do Éden'... é fato que ele é uma promessa entre academias."
33100-20 = "No entanto, o 'local especial' onde este tratado está sendo realizado..."
33100-21 = "E as qualificações dos representantes reunidos para a assinatura do tratado."
33100-22 = "Esses elementos transformaram isso em uma 'promessa' de grande significado. Mesmo que distorcido, é claramente uma reencenação do 'Concílio'."
33100-23 = "E, por um método especial, materializaram uma 'Réplica' da Sociedade dos Santos Justina, que são as guardiãs do 'mandamento' dessa promessa."
33100-24 = "Em resumo, eles distorceram o contrato e forjaram o resultado que queriam... acho que podemos resumir assim."
33100-25 = "Este é o 'jeito dos adultos' que a Gematria tanto fala..."
33100-26 = "......"
33100-27 = "...Ah. Só para constar, eu não sabia de tudo isso de antemão. Apenas observei através do seu sonho."
33100-28 = "Afinal, aqueles seres são incompreensíveis e estão além do meu entendimento básico."
33100-29 = "Deixando as formalidades de lado, o que importa é... 'Gematria' está por trás de Arius."
33100-30 = "Arius obteve um exército poderoso que não cai nem morre. Essa é a situação atual e a verdade."
33100-32 = "No paraíso do qual fomos expulsos... 'Éden', sob o nome do tratado que carrega esse título."
33100-35 = "Aaaaaaaah!!"
33100-44 = "Ufa..."
33100-45 = "......"
33100-46 = "A-Aah... p-parece doer muito..."
33100-51 = "...Inexperiente como sempre."
33100-52 = "Atacar sem pensar em nada? Perdeu o juízo, Azusa?"
33100-53 = "A sua especialidade é a guerrilha, explorar as aberturas do inimigo. Você sabe disso, e mesmo assim achou que poderia me vencer num confronto direto?"
33100-57 = "Guh, urgh...!"
33100-58 = "Saori... qual o objetivo dessa situação toda...?"
33100-59 = "...Misaki, quanto tempo falta?"
33100-60 = "Cerca de 5 minutos. Acho que já entenderam a situação e as tropas de reserva das duas escolas devem estar chegando."
33100-61 = "É o suficiente... levantem-na."
33100-68 = "Pelo menos você me poupou o trabalho de ir te buscar."
33100-69 = "......"
33100-70 = "A sua traição causou alguns desvios no plano, mas... está dentro da margem de erro."
33100-71 = "A princípio, calculei que seria a Mika quem viria. Mas aquela idiota já não serve mais."
33100-72 = "Nesse caso, a Nagisa era o elemento perigoso, mas felizmente ela participou da cerimônia sem suspeitar de nada."
33100-73 = "Ter conseguido lidar até com a Irmandade de uma só vez foi um resultado inesperado."
33100-74 = "...Vou te explicar o que está acontecendo."
33100-75 = "Nós roubamos o 'Tratado do Éden'."
33100-76 = "......"
33100-77 = "Lançamos mísseis de cruzeiro no Tabernáculo onde o tratado seria assinado, varremos os estorvos e distorcemos o conteúdo do tratado."
33100-81 = "Pela sua cara, você 'não está entendendo'."
33100-82 = "...Azusa, esqueceu? Nós temos os mesmos direitos como 'Trinity'."
33100-83 = "......"
33100-84 = "Este tratado é a reencenação do 'Primeiro Concílio'. Até aquele momento, as várias facções detinham o poder independentemente. E no dia do Concílio, todas as facções se reuniram e formaram a nova Trinity... exceto nós, de 'Arius'."
33100-85 = "Portanto, para nós nada mudou. Ainda temos a autoridade, pelo menos formalmente."
33100-86 = "'Quando um conflito ocorrer entre Trinity e Gehenna, a Organização do Tratado do Éden intervirá e resolverá o conflito'..."
33100-87 = "Este é o Tratado do Éden. Mas nós apenas acrescentamos a cláusula de que 'a Organização do Tratado do Éden será gerida pelo Esquadrão Arius'. Só isso."
33100-88 = "S-Só isso não parece ter tanto significado assim, mas... como os mandamentos são reais, se for possível replicá-los..."
33100-99 = "'Sociedade dos Santos Justina'."
33100-100 = "As guardiãs dos mandamentos e o lendário grupo armado da Trinity."
33100-101 = "Sendo exata, são apenas réplicas, mas são entidades que protegem os mandamentos. Ou seja, elas vão auxiliar a nós, a 'Organização do Tratado do Éden'."
33100-102 = "As hostilidades entre a Trinity e Gehenna são uma violação dos mandamentos sagrados. Ou seja, são a causa do conflito e nossos alvos de supressão."
33100-104 = "...Agora entendi."
33100-105 = "Esse ataque não tinha como alvo apenas as cúpulas de cada escola, nem servia só para causar confusão."
33100-106 = "A reescrita do Tratado do Éden... garantir essa força militar misteriosa era o verdadeiro objetivo...?"
33100-107 = "(Sss, Sss, Sss...)"
33100-108 = "...Atsuko, você não pode fazer isso."
33100-109 = "Pare com isso, Princesa. É inútil agora. Não é tão fácil quebrar o espírito dela... como já sabemos há muito tempo."
33100-110 = "...Alguém devia estar inflando esse espírito e esses ideais bem do lado dela."
33100-111 = "Alguém que oculta a verdade do mundo, distorce os fatos e ensina mentiras... um adulto desprezível."
33100-112 = "Bom, esse tal de Sensei já era. Então, agora é só reensiná-la com calma."
33100-113 = "...!!"
33100-114 = "...Parece que você estava se divertindo na Trinity."
33100-115 = "Aquela vida era divertida? Estar com as pessoas que você gosta e com aqueles que te entendem?"
33100-116 = "...Tudo isso é vazio."
33100-117 = "Lembre-se. Nós somos as únicas que te compreendem e te aceitam. O seu lugar é aqui."
33100-118 = "Você desviou o olhar dessa verdade e se deixou cegar por mentiras doces. E essa sua fraqueza que está fazendo você perder aqui e agora."
33100-119 = "...Quer tentar nos parar?"
33100-120 = "Então tente destruir o meu halo, Azusa Shirasu."
33100-121 = "...!"
33100-122 = "Enquanto nós, que somos o pilar do tratado, existirmos, esses mandamentos perdurarão."
33100-123 = "A menos que alguém destrua nossos halos."
33100-124 = "O que te falta agora é a intenção assassina... mas será que você é capaz de algo assim? Você, que fugiu até da missão daquela tal de Seia."
33100-125 = "...!?"
33100-126 = "Tentar ficar naquele lugar imaculado até o ponto de nos enganar... isso é impossível para você."
33100-127 = "...Também encontrarei a Seia em breve. Vamos limpar a sua sujeira."
33100-132 = "...Um bicho de pelúcia?"
33100-138 = "!?"
33100-142 = "Vai fugir de novo, Azusa!!"
33100-143 = "Líder, acho que é a unidade de artilharia subordinada da Tea Party. Foram mais rápidos do que eu esperava."
33100-148 = "Dele outro lado estão morteiros de 50mm... deve ser as reservas do Comitê Disciplinar."
33100-149 = "Eles também foram muito rápidos, mesmo sem a Hina por lá..."
33100-153 = "Relataram que Gehenna nos atacou pelas costas agora há pouco! Precisamos eliminá-los o mais rápido possível...!!"
33100-154 = "Disparar mísseis contra o local da cerimônia, esse pessoal de Gehenna não tem limites...!"
33100-155 = "...! Batalhão de granadeiros de Gehenna avistado à frente!"
33100-157 = "Como ousam, como ousam fazer isso com a Presidente...! Eu nunca vou perdoar vocês! Vamos esmagar a Trinity e encontrar a Presidente o mais rápido possível...!"
33100-158 = "A retaguarda, continuem a busca e resgate de outros feridos! Eu já vou...!"
33100-159 = "Administradora, seu ferimento..."
33100-161 = "Eu não dou a mínima para a minha ferida! Vão logo procurá-la!! Rápido!!"
33100-169 = "C-Confirmamos a movimentação das forças de reserva de Gehenna e da Tea Party que estavam de prontidão do lado de fora do Tabernáculo...!"
33100-170 = "As divisões de tanques de ambas as academias logo devem passar por aqui..."
33100-171 = "Azusa..."
33100-172 = "Líder, a Azusa fica para depois. O que faremos agora?"
33100-173 = "......"
33100-174 = "Conseguimos assegurar a 'Sociedade dos Santos Justina'."
33100-175 = "A próxima é a Trinity. Vamos passar pelos túneis subterrâneos e contornar a área autônoma da Trinity, esmagando tudo a partir de lá."
33100-177 = "O lugar onde ela passou nem que seja um pouquinho de tempo... Vou apagar tudo sem deixar nem uma árvore ou um galho..."
33100-178 = "O-O preço da traição, né..."
33100-179 = "......"
33100-180 = "...Bom, uma Gehenna sem a Hina pode esperar. Nenhuma objeção aqui, líder."
33100-181 = "Nós invadimos a Trinity várias vezes durante os ataques à Seia e à Nagisa. Sem a Presidente do Comitê, Gehenna não passa de um bando desorganizado."
33100-182 = "...Nesse caso, vamos esperar até garantirmos a 'arma tática' que o boneco de madeira prometeu. Acho que dar conta dos tanques e das reservas das duas academias aqui vai ser o suficiente por enquanto."
33100-187 = "...Tem razão. Vamos dar as boas-vindas para quem chegou até aqui."
33100-188 = "Para as odiadas Trinity e Gehenna, que nos encurralaram nos confins do sofrimento..."
33100-189 = "E-Então a gente vai lutar mesmo?"
33100-190 = "P-Parece difícil... muito difícil mesmo, mas, n-não tem jeito, né... hehe."
33100-200 = "Avancem, 'Sociedade dos Santos Justina'. Auxiliem a 'Organização do Tratado do Éden' e suprimam os 'alvos de supressão'."
33100-207 = "Q-O que é aquilo...!?"
33100-208 = "Waaaah!? F-Fantasmas!?"
33100-216 = "Próximo Episódio; Confusão Acelerada (1)"