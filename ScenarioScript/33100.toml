[translation]
33100-1 = "Episódio 10;A Doce Mentira"
33100-3 = "Sensei, você é alguém vindo de fora de Kivotos, e um adulto. Sendo assim, contrato, negociação…… sobre a importância dessas \"promessas\", você deve saber bem."
33100-4 = "Por exemplo, existe a expressão \"fazer um pacto com o demônio\", não existe?"
33100-5 = "Nos contos antigos também há inúmeras histórias de \"um ser prodigioso que é derrotado por ter feito, por descuido, alguma promessa\", ou, ao contrário, de \"vencer por meio de uma dessas promessas\"."
33100-6 = "E daí também não se pode ler o seguinte?"
33100-7 = "Ainda que não passe de um pedaço de papel, ou de uma promessa de boca…… uma \"promessa\" às vezes amarra algo com força, e chega até a defini-lo."
33100-8 = "Contrato, preceito, promessa…… essas coisas, tal como nesses contos antigos, são conceitos importantes também em Kivotos."
33100-9 = "Por exemplo, nas escrituras de Trinity estão descritos a \"divindade\" do princípio dos tempos e os 10 mandamentos firmados com ela."
33100-10 = "Além disso, também está escrito que nós, na origem, fomos expulsos do paraíso por quebrarmos uma \"promessa\"……."
33100-12 = "……Talvez seja papo velho pra você. Afinal, na prática, você já salvou alguém usando esse tipo de conceito."
33100-14 = "Quero que se lembre. A \"Gematria\" não podia impor nada às alunas de Abydos; ela apenas exigia um \"contrato\"."
33100-15 = "Se esse contrato não se firmasse, à Gematria só restaria recuar."
33100-17 = "……."
33100-18 = "Este incidente também é, em suma, isso."
33100-19 = "O \"Tratado do Éden\", em si, é de fato uma promessa firmada entre academias."
33100-20 = "Mas o \"lugar especial\" onde este tratado se realiza……"
33100-21 = "e a qualificação dos representantes reunidos pra firmá-lo."
33100-22 = "Por esses elementos, isto se tornou uma \"promessa\" de grande significado. Ainda que distorcida, isto é, claramente, uma reprodução do \"Concílio\"."
33100-23 = "E o Conselho dos Santos de Justina, que guarda o \"preceito\" dessa promessa, foi manifestado, por um método especial, como \"réplica\"."
33100-24 = "No fim das contas, torceram o contrato, distorceram-no e forjaram o resultado que desejavam…… dá pra resumir assim."
33100-25 = "Isto é o que a Gematria chama de \"jeito dos adultos\"……."
33100-26 = "……."
33100-27 = "……Ah. Só pra garantir: não é que eu soubesse de tudo isto de antemão. Eu apenas observei, através do seu sonho."
33100-28 = "Porque aquelas são existências incompreensíveis, além da minha compreensão básica."
33100-29 = "Saindo do formalismo, em suma…… por trás da Arius está a \"Gematria\"."
33100-30 = "E a Arius obteve um exército poderoso, que não cai nem morre. Esta é a situação atual, e o fato."
33100-32 = "Sob o tratado que carrega o nome do paraíso de onde um dia fomos expulsos…… o \"Éden\"."
33100-35 = "Aaaaaah!!"
33100-44 = "Ufa……."
33100-45 = "……."
33100-46 = "A-ah…… p-parece doloroso……."
33100-51 = "……Imatura como sempre."
33100-52 = "Atacar sem pensar em nada; você tá sã, Azusa?"
33100-53 = "A sua especialidade é a guerrilha, aproveitar as brechas do adversário dentro dela. Você sabe disso, e mesmo assim achou que ia me vencer lutando de frente?"
33100-57 = "Gh, uh……!"
33100-58 = "Saori…… esta situação, qual é o objetivo……."
33100-59 = "……Misaki, quanto tempo resta?"
33100-60 = "Uns 5 minutos. Já deve estar na hora de eles entenderem a situação e as forças de reserva das duas academias chegarem."
33100-61 = "Suficiente…… levanta ela."
33100-68 = "Você vir até aqui por conta própria me poupou trabalho."
33100-69 = "……."
33100-70 = "Com a sua traição, o plano sofreu um certo desvio, mas…… bom, dentro da margem de erro."
33100-71 = "Originalmente, eu previa que quem viria aqui seria a Mika. Mas aquela idiota já não serve."
33100-72 = "Sendo assim, o elemento de risco era a Nagisa; mas, por sorte, ela participou da assinatura sem desconfiar de nada."
33100-73 = "Conseguir processar até a Sisterhood de uma vez foi, digamos, um resultado além do previsto."
33100-74 = "……Deixa eu te ensinar o que está acontecendo."
33100-75 = "Nós roubamos o \"Tratado do Éden\"."
33100-76 = "……."
33100-77 = "Enfiamos um míssil de cruzeiro na catedral antiga onde o tratado seria firmado, despachamos os estorvos, e torcemos o conteúdo do tratado."
33100-81 = "Cara de quem \"não entende\", né."
33100-82 = "……Azusa, esqueceu? Nós temos a qualificação de \"Trinity\"."
33100-83 = "……."
33100-84 = "Este tratado é a reprodução do \"Primeiro Concílio\". Até aquela época, cada facção tinha o próprio poder. E, no dia do concílio, todas as facções se reuniram e se tornaram a nova Trinity…… exceto nós, a \"Arius\"."
33100-85 = "Por isso, nós não mudamos em nada. Como formalidade, ainda detemos a autoridade."
33100-86 = "\"Quando houver conflito entre Trinity e Gehenna, a Organização do Tratado do Éden intervirá e o resolverá\"……"
33100-87 = "Este é o Tratado do Éden. Só que, ali, acrescentamos por escrito: \"a Organização do Tratado do Éden será exercida pelo Squad de Arius\". Só isso."
33100-88 = "S-só isso parece não ter lá muito significado, mas…… como os preceitos são verdadeiros, se der pra replicar……."
33100-99 = "O \"Conselho dos Santos de Justina\"."
33100-100 = "Os guardiões dos preceitos, o lendário grupo militar de Trinity."
33100-101 = "Pra ser exata, é a réplica dele; mas é uma existência que guarda os preceitos. Ou seja, vai ajudar a nós, a \"ETO\"."
33100-102 = "Os atos hostis entre Trinity e Gehenna são violação dos preceitos sagrados. Ou seja, causa de conflito, e alvo de supressão."
33100-104 = "……Enfim eu entendi."
33100-105 = "Este ataque não era só pra atingir as cúpulas de cada academia, nem pra semear o caos."
33100-106 = "A reescrita do Tratado do Éden…… e, com ela, assegurar aquela força militar incompreensível; era esse o objetivo……."
33100-107 = "(Suave, ssuave, suave……)"
33100-108 = "……Atsuko, isso não dá."
33100-109 = "Deixa, Hime. Agora é inútil. Quebrar a teimosia daquela ali não é tão fácil…… sempre foi assim, né?"
33100-110 = "……Devia haver alguém bem ao lado, atiçando essa teimosia, esses sentimentos."
33100-111 = "Alguém que esconde a verdade deste mundo, distorce os fatos e ensina mentiras…… um adulto mau desses."
33100-112 = "Bom, esse Sensei já foi despachado. Então, agora, é só reeducar com calma."
33100-113 = "……Gh!!"
33100-114 = "……Você parecia feliz em Trinity, né."
33100-115 = "Aquela vida era divertida? Estar junto de quem se gosta, estar junto de pessoas que te compreendem."
33100-116 = "……Que vão."
33100-117 = "Lembre-se. Quem te compreende e te aceita somos só nós. Aqui é o seu lugar."
33100-118 = "Você desviou os olhos dessa verdade e se deixou cegar por uma doce mentira. E é essa fraqueza que está te fazendo perder assim."
33100-119 = "……Quer nos deter?"
33100-120 = "Então destrua a minha aureola, Azusa Shirasu."
33100-121 = "……!"
33100-122 = "Enquanto nós, os sujeitos do tratado, existirmos, este preceito há de se perpetuar."
33100-123 = "A menos que destruam a aureola."
33100-124 = "O que te falta agora é instinto assassino…… mas, será que você consegue? Você, que fugiu até da missão da Seia."
33100-125 = "……!?"
33100-126 = "Tentar nos enganar só pra permanecer num lugar bonito…… pra alguém assim, é impossível."
33100-127 = "……A Seia também, logo depois disto, a gente acha. A sua bagunça, deixa que a gente limpa."
33100-132 = "……Um pelúcia?"
33100-138 = "!?"
33100-142 = "Vai fugir de novo, Azusa!!"
33100-143 = "Líder, parece a tropa de artilharia subordinada ao Tea Party. Mais rápido que o previsto."
33100-148 = "Do lado oposto, morteiros de 50mm…… a tropa de reserva do Comitê Disciplinar, imagino."
33100-149 = "Deste lado também, mais rápido do que imaginávamos; mesmo sem aquela Hina……."
33100-153 = "Chegou o relato de que Gehenna nos apunhalou pelas costas! Temos que dar cabo delas o quanto antes……!!"
33100-154 = "Disparar um míssil contra o local da cerimônia de assinatura; até onde vai essa gente de Gehenna……!"
33100-155 = "……! Tropa de granadeiros de Gehenna localizada à frente!"
33100-157 = "Como ousaram, como ousaram fazer aquilo com a presidente……! Jamais vou perdoar! Vamos varrer Trinity e encontrar a presidente o quanto antes……!"
33100-158 = "Tropa de retaguarda, busca e resgate dos demais feridos! Eu vou imediatamente……!"
33100-159 = "Administradora, o seu ferimento……."
33100-161 = "O meu ferimento agora não interessa! Vamos logo procurar!! Depressa!!"
33100-169 = "F-forças de reserva de Gehenna e do Tea Party, que aguardavam fora da catedral antiga, também confirmadas em movimento……!"
33100-170 = "Em breve, as tropas de tanques oficiais das duas academias devem passar por esta região……."
33100-171 = "Azusa……."
33100-172 = "Líder, a Azusa fica pra depois. E agora?"
33100-173 = "……."
33100-174 = "O \"Conselho dos Santos de Justina\" foi assegurado."
33100-175 = "A próxima é Trinity. Pelo corredor subterrâneo, contornamos por trás do distrito autônomo de Trinity e, de lá, vamos varrendo."
33100-177 = "O lugar onde aquela ali pôs os pés, nem que por um instante…… vou apagar sem deixar uma única árvore, um único galho……."
33100-178 = "O-o preço da traição, né……."
33100-179 = "……."
33100-180 = "……Bom, a Gehenna sem Hina pode ficar pra depois. Sem objeção, Líder."
33100-181 = "Em Trinity, a gente já se infiltrou várias vezes, nos ataques à Seia e à Nagisa. E a Gehenna sem a presidente do Comitê Disciplinar não passa de um bando de ajuntados."
33100-182 = "……Sendo assim, até assegurar a \"arma tática\" que aquela boneca de madeira prometeu, por ora, espera. Aqui, dá pra ir, na medida, enfrentando os tanques e as reservas das duas academias."
33100-187 = "……Pois é. Bom, vamos dar as boas-vindas aos que chegarem até aqui."
33100-188 = "À odiosa Trinity e à Gehenna, que nos empurraram ao extremo do sofrimento……."
33100-189 = "E-então, vamos mesmo lutar, né?"
33100-190 = "P-parece sofrido…… parece muito sofrido, mas, n-não tem jeito, né…… hehe."
33100-200 = "Vamos, \"Conselho dos Santos de Justina\". Ajudai a nós, a \"Organização do Tratado do Éden\", e suprimi o \"alvo de supressão\"."
33100-207 = "Q-que é aquilo……!?"
33100-208 = "Uwaaah!? F-fantasma!?"
33100-216 = "Próximo Episódio;O Caos que Acelera (1)"
