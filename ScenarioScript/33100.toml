[translation]
33100-1 = "Episódio 10; Doce Mentira"
33100-3 = "Sensei, você é um adulto que veio de fora de Kivotos. Sendo assim, você deve conhecer bem a importância que 'acordos', como contratos e negociações, possuem."
33100-4 = "Por exemplo, existe aquela expressão 'fazer um pacto com o diabo', não é?"
33100-5 = "Em contos antigos, existem muitas histórias onde 'uma existência fenomenal é derrotada por ter feito uma promessa descuidada', ou, inversamente, 'onde se triunfa através de tais promessas'."
33100-6 = "Não se pode interpretar dessa forma também?"
33100-7 = "Mesmo que não passe de um simples pedaço de papel ou de uma promessa verbal... um 'acordo' às vezes pode restringir e definir algo com muita força."
33100-8 = "Contratos, preceitos, promessas... assim como nessas histórias antigas, esses são conceitos importantes em Kivotos também."
33100-9 = "Por exemplo, nas escrituras da Trinity, estão descritas a 'divindade' do início dos tempos e os 10 mandamentos estabelecidos com ela."
33100-10 = "Além disso, também é transmitido que fomos expulsos do paraíso porque, no princípio, quebramos uma 'promessa'."
33100-12 = "……Talvez isso seja chover no molhado. Afinal, você mesmo já salvou alguém utilizando esses conceitos, não é?"
33100-14 = "Tente se lembrar. A 'Gematria' não podia forçar nada aos alunos de Abydos, apenas exigia um 'contrato'."
33100-15 = "Se aquele contrato não fosse estabelecido, a Gematria não teria outra escolha a não ser recuar."
33100-17 = "……."
33100-18 = "Este incidente também, em suma, é exatamente isso."
33100-19 = "O 'Tratado de Eden', por si só, é certamente um acordo realizado entre as escolas."
33100-20 = "No entanto, o 'lugar especial' onde este tratado é realizado..."
33100-21 = "E a qualificação dos representantes que se reuniram para a assinatura do tratado."
33100-22 = "Devido a esses elementos, isso se tornou um 'acordo' de grande significado. Embora distorcido, é claramente uma reprodução do 'Concílio'."
33100-23 = "E eles manifestaram a Associação de Santas Justina, que protege os 'preceitos' que são esse acordo, como uma 'cópia' através de um método especial."
33100-24 = "No fim das contas, eles interpretaram mal o contrato, distorceram-no e forjaram os resultados que desejavam... pode-se resumir dessa forma."
33100-25 = "Este é o 'jeito dos adultos', como diz a Gematria……."
33100-26 = "……."
33100-27 = "……Ah. Só para garantir, não é como se eu soubesse de tudo isso de antemão. Eu apenas observei através dos seus sonhos."
33100-28 = "Pois eles são existências incompreensíveis que superam minha compreensão básica."
33100-29 = "Deixando de lado as formalidades, no fim das contas... a 'Gematria' está por trás de Arius."
33100-30 = "Arius obteve um exército poderoso que não cai nem morre. Esta é a situação atual e o fato."
33100-32 = "Sob o tratado que leva o nome do paraíso do qual fomos expulsos... 'Eden'."
33100-35 = "Aaaaaaaahhh!!"
33100-44 = "Ufa……."
33100-45 = "……."
33100-46 = "Ah, ah... i-isso parece doloroso……."
33100-51 = "……Continua imatura como sempre."
33100-52 = "Atacar sem pensar em nada, você está sã, Azusa?"
33100-53 = "Sua especialidade é a guerra de guerrilha, atacar as brechas do oponente. Você tem consciência disso, então pensou mesmo que poderia vencer lutando de frente comigo?"
33100-57 = "Guh, ugh……!"
33100-58 = "Saori... qual é o objetivo desta situação……."
33100-59 = "……Misaki, quanto tempo resta?"
33100-60 = "Cerca de 5 minutos. Acho que logo eles entenderão a situação e as forças de reserva de ambas as escolas chegarão."
33100-61 = "É o suficiente... levante-a."
33100-68 = "Você se deu ao trabalho de vir, o que me poupou esforço."
33100-69 = "……."
33100-70 = "Devido à sua traição, houve um pequeno desvio no plano, mas... bem, está dentro da margem de erro."
33100-71 = "Originalmente, eu previa que quem viria a este lugar seria Mika. Mas aquela idiota não serve mais."
33100-72 = "Sendo assim, o elemento perigoso era Nagisa, mas, felizmente, ela participou da cerimônia de assinatura sem qualquer suspeita."
33100-73 = "Conseguir lidar com a Sisterhood de uma só vez foi, bem, um resultado inesperado."
33100-74 = "……Vou te contar o que está acontecendo."
33100-75 = "Nós roubamos o 'Tratado de Eden'."
33100-76 = "……."
33100-77 = "Lançamos mísseis de cruzeiro na antiga catedral onde o tratado seria assinado, eliminamos os estorvos e distorcemos o conteúdo do tratado."
33100-81 = "Essa é uma cara de quem 'não consegue entender'."
33100-82 = "……Azusa, esqueceu? Nós temos as qualificações como 'Trinity'."
33100-83 = "……."
33100-84 = "Este tratado é uma recriação do 'Primeiro Concílio'. Até aquele momento, cada facção detinha seu próprio poder. E no dia do concílio, todas as facções se reuniram e se tornaram a nova Trinity... exceto nós, da 'Arius'."
33100-85 = "Por isso, nada mudou para nós. Formalmente, ainda possuímos a autoridade."
33100-86 = "'Quando um conflito ocorrer entre Trinity e Gehenna, a 'Organização do Tratado de Eden' intervirá para resolvê-lo'……"
33100-87 = "Este é o Tratado de Eden. Apenas acrescentamos que 'a Organização do Tratado de Eden será assumida pelo Esquadrão Arius'. Só isso."
33100-88 = "M-mas isso não parece ter muito significado... já que os preceitos são reais, se pudermos replicá-los……."
33100-99 = "'Sociedade de Santos Justina'."
33100-100 = "Guardiãs dos preceitos e o lendário grupo armado de Trinity."
33100-101 = "Para ser exato, é uma réplica, mas é uma existência que protege os preceitos. Ou seja, eles ajudarão a nossa 'ETO'."
33100-102 = "Atos hostis entre Trinity e Gehenna são violações dos preceitos sagrados. Ou seja, são a causa do conflito e o alvo da supressão."
33100-104 = "……Finalmente entendi."
33100-105 = "Este ataque não visava apenas a liderança de cada escola, nem era apenas para causar confusão."
33100-106 = "A reescrita do Tratado de Eden... o objetivo era garantir aquela força militar misteriosa, não era……."
33100-107 = "(Sussurro, sussurro...)"
33100-108 = "……Atsuko, não pode fazer isso."
33100-109 = "Desista, Princesa. É inútil agora. Não é tão fácil quebrar a teimosia dela... sempre foi assim, não é?"
33100-110 = "……Havia alguém bem ao lado dela alimentando essa teimosia e esses sentimentos, não é?"
33100-111 = "Escondendo a verdade deste mundo, distorcendo os fatos e ensinando mentiras... um adulto tão desprezível."
33100-112 = "Bem, aquele Sensei já foi descartado. Então, agora só precisamos reeducá-la com calma."
33100-113 = "……!! "
33100-114 = "……Parecia que você estava se divertindo em Trinity."
33100-115 = "Aquela vida foi divertida? Estar com as pessoas que você gosta, estar com pessoas que te entendem."
33100-116 = "……Que vazio."
33100-117 = "Lembre-se. Apenas nós entendemos e aceitamos você. Aqui é o seu lugar."
33100-118 = "Você desviou o olhar da verdade e foi cegada por mentiras doces. E essa fraqueza é o que está te levando à derrota agora."
33100-119 = "……Quer nos parar?"
33100-120 = "Então tente destruir meu halo, Shirasu Azusa."
33100-121 = "……!"
33100-122 = "Enquanto nós, os sujeitos do tratado, existirmos, estes preceitos continuarão perpetuamente."
33100-123 = "A menos que você destrua o halo."
33100-124 = "O que falta em você agora é intenção assassina... mas você é capaz disso? Você, que até fugiu da missão da Seia."
33100-125 = "……!?"
33100-126 = "Tentar permanecer em um lugar bonito mesmo tentando nos enganar... isso é impossível para você."
33100-127 = "……Também encontraremos a Seia logo depois disso. Nós cuidaremos de terminar o serviço com você."
33100-132 = "……Um bicho de pelúcia?"
33100-138 = "¡?"
33100-142 = "Vai fugir de novo, Azusa!!"
33100-143 = "Líder, parece ser a unidade de artilharia sob o comando do Tea Party. Foi mais rápido do que o esperado."
33100-148 = "Do outro lado, morteiros de 50mm... talvez seja a unidade reserva do Comitê Disciplinar."
33100-149 = "Eles também são mais rápidos do que o imaginado, mesmo sem a Hina por perto……."
33100-153 = "Recebemos um relatório de que Gehenna nos atacou pelas costas! Precisamos acabar com elas o quanto antes……!!"
33100-154 = "Disparar mísseis contra o local da cerimônia de assinatura, o pessoal de Gehenna não tem limites……!"
33100-155 = "……! Unidade de granadeiros de Gehenna detectada à frente!"
33100-157 = "Como ousam, como ousam fazer isso com a Presidente...!! Eu nunca vou perdoar! Precisamos dispersar Trinity e encontrar a Presidente o mais rápido possível……!"
33100-158 = "Unidades da retaguarda, procurem e resgatem os outros feridos! Eu vou imediatamente……!"
33100-159 = "Administradora, o seu ferimento……."
33100-161 = "O meu ferimento não importa agora! Temos que ir encontrá-la logo!! Rápido!!"
33100-169 = "Confirmei que as forças reservas de Gehenna e do Tea Party, que estavam aguardando fora da Antiga Basílica, também começaram a se mover……!"
33100-170 = "Em breve, as unidades de tanques oficiais de ambas as escolas passarão por aqui……."
33100-171 = "Azusa..."
33100-172 = "Líder, vamos deixar a Azusa para depois. O que faremos agora?"
33100-173 = "..."
33100-174 = "A 'Irmandade de Justina' foi assegurada."
33100-175 = "O próximo é Trinity. Vamos contornar a área autônoma de Trinity pelos túneis subterrâneos e expulsá-los de lá."
33100-177 = "O lugar onde aquela pessoa passou um tempo que seja... vou apagar tudo, sem deixar nem uma árvore ou um galho sequer..."
33100-178 = "O, o preço da traição, é isso...?"
33100-179 = "..."
33100-180 = "...Bem, Gehenna sem a Hina pode esperar. Não tenho objeções, líder."
33100-181 = "Já invadimos Trinity várias vezes durante o ataque de Seia e Nagisa. Gehenna, tendo perdido sua Prefeita da Disciplina, não passa de um bando de desordeiros."
33100-182 = "...Sendo assim, vamos aguardar até garantirmos a 'arma tática' prometida por aquela boneca de madeira. Por enquanto, parece bom lidar com os tanques e as forças de reserva de ambas as escolas."
33100-187 = "...É verdade. Bem, vamos dar as boas-vindas a quem chegou até aqui."
33100-188 = "À odiada Trinity e à Gehenna, que nos levaram ao limite do sofrimento..."
33100-189 = "E, então, vamos lutar mesmo?"
33100-190 = "P, parece doloroso... parece muito doloroso, mas, n, não tem jeito, né... hehe."
33100-200 = "Vamos, 'Irmandade de Justina'. Ajudem nossa 'Organização do Tratado do Éden' e subjuguem os 'alvos de supressão'."
33100-207 = "O, o que é aquilo...!?"
33100-208 = "Aaaaaahhh!? F, fantasmas!?"
33100-216 = "Próximo episódio: Caos Acelerado (1)"
