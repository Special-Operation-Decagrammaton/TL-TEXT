[translation]
2000620-1 = "スケートボードを選んだ理由"
2000620-2 = "（サヤから連絡をもらい、近くの公園に向かったところ……）"
2000620-7 = "（静かな公園で、何かを準備しているサヤの姿を見つけた）"
2000620-15 = "……あ！先生！こっち、こっち！"
2000620-16 = "こんな早く来てくれるとは、やっぱり先生も期待してくれたのだ？"
2000620-17 = "よくぞ来てくれたのだ。この偉大な発明を一番に見るチャンスなのだ！"
2000620-18 = "……ん？これ……？"
2000620-19 = "何の発明品かって？ああ、これは……"
2000620-20 = "うーん、なんて言ったらいいのか……#n分かりやすく説明すると……"
2000620-21 = "一種の香水なのだ！"
2000620-22 = "そう、ここの公園を香水で包むのだ！"
2000620-23 = "[s1] \"……それって、ただの芳香剤じゃなくて？\"\n[s2] \"つまり、芳香剤だよね？\""
2000620-26 = "ええいっ！違う！#nそれじゃあまるで、ぼく様の発明がなんてことないみたいじゃないか！"
2000620-27 = "芳香剤なんかと違うのに！#n一度撒くだけで、長期間公園全体をほのかに包んでくれるのだ！"
2000620-28 = "香水と言ったら香水なのだ！"
2000620-29 = "実は今日の午後から、この公園でイベントがある予定なんだけど、あんまり花が咲いてなくて……"
2000620-30 = "でも、せっかく来てくれた人に香りだけでも楽しんでもらいたいという依頼が来て、特別にぼく様が手伝うことになったのだ。"
2000620-31 = "そこで「自然と身体から力が抜けて、気持ちがふわふわになる」成分を配合したのだ！"
2000620-32 = "[s3] \"なるほど、「今回は」良さそうだね。\"\n[s4] \"珍しく良いことを……\""
2000620-35 = "……今なんと？"
2000620-36 = "いや、それどころじゃないのだ！"
2000620-37 = "先生を呼んだのは、香水の出来をいち早く見せたかったからではないのだ！"
2000620-38 = "ちょっと手伝ってもらいたいのだ……#n公園に大量の香水を撒くには、助手の存在が不可欠で……"
2000620-39 = "ぼく様が香水を撒くから、戻ってくるまでに次の瓶を用意して手分けしてほしいのだ。"
2000620-40 = "……ん？"
2000620-41 = "それは分かったけど、どうしてそんな格好なのかって……？"
2000620-45 = "……？"
2000620-51 = "スケートボードがどうかしたのだ……？"
2000620-52 = "自転車やスクーターじゃなくて、スケートボードを選ぶ理由……？"
2000620-56 = "……はははっ！何を言ってるのだ、先生！今さらなのだ！"
2000620-62 = "当然、スケートボードの方が理に適ってるからなのだ！"
2000620-63 = "[s5] \"スケートボードが……？\"\n[s6] \"普通は逆じゃない……？\""
2000620-66 = "はぁ～"
2000620-67 = "いつも天才は理解されなくてつらいのだ。"
2000620-68 = "よく考えてほしいのだ、先生。自転車やスクーターはハンドルを握ってないとダメだし、ちょっと離しても真っ直ぐにしか進めないのだ。"
2000620-69 = "でも、広範囲に香水を撒くには、両手を使えた方がやりやすいのだ。"
2000620-70 = "両手に瓶を持たないといけないわけだし……"
2000620-71 = "その点、スケートボードなら両手が自由になるのだ！#nさらに自転車やスクーターでは通れないような狭い道も進める！"
2000620-72 = "もちろん先生の言う通り、あまり一般的ではないかもしれないけど……"
2000620-73 = "ぼく様は天才だから、何も問題ないのだ！"
2000620-74 = "スケートボードこそ、ぼく様のためにあると言っても過言ではない！"
2000620-75 = "さあ、先生！雑談はここまで！"
2000620-76 = "時間が無いのだ！人が集まる前に、香水を撒いておかないと！"
2000620-77 = "まずは、あっちの方から……"
2000620-81 = "じゃあ……行ってくるのだ！先生は次の瓶を用意して待ってるように！"
2000620-86 = "ぶーーーーん！"
2000620-95 = "う～ん……ん……？"
2000620-96 = "な、何だか……急に身体が……あれ……"
2000620-97 = "身体から力が抜けて、気持ちがふわふわするような……#nこれじゃあ、集中力が……"
2000620-98 = "え……？"
2000620-102 = "……うわぁぁぁぁ！？！？"
2000620-115 = "（急いでサヤの元に駆けつけると、自分まで身体から力が抜けそうになった）"
2000620-116 = "（幸い怪我は無かったので、気をつけながら手分けして香水を公園に撒いた）"
