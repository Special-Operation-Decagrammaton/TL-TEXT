[translation]
2000620-1 = "O motivo de ter escolhido o skate"
2000620-2 = "（Após receber uma mensagem de Saya, fui até o parque próximo...）"
2000620-7 = "（Encontrei Saya preparando algo em um parque silencioso）"
2000620-15 = "……Ah! Sensei! Por aqui, por aqui!"
2000620-16 = "Você veio tão rápido, então você estava mesmo ansioso pelo que eu preparei, não é?"
2000620-17 = "Fico feliz que tenha vindo. Esta é a chance de ver esta grande invenção em primeira mão!"
2000620-18 = "……Hm? Isso é...?"
2000620-19 = "Quer saber que invenção é essa? Ah, isso é..."
2000620-20 = "Hum, como posso explicar...#nPara ser mais simples..."
2000620-21 = "É um tipo de perfume!"
2000620-22 = "Isso mesmo, vou cobrir este parque inteiro com perfume!"
2000620-23 = "[s1] \"...Isso não é só um aromatizador de ambientes?\"\n[s2] \"Ou seja, é um aromatizador, né?\""
2000620-26 = "Ei! Não é!#nParece que você está dizendo que a invenção deste gênio aqui não é nada demais!"
2000620-27 = "É diferente de um aromatizador comum!#nBasta espalhar uma vez e ele envolverá todo o parque com uma fragrância suave por um longo tempo!"
2000620-28 = "Se eu disse que é perfume, então é perfume!"
2000620-29 = "Na verdade, haverá um evento neste parque hoje à tarde, mas não tem muitas flores desabrochando..."
2000620-30 = "Então, recebi um pedido para que as pessoas que vierem possam pelo menos aproveitar o aroma, e decidi ajudar pessoalmente."
2000620-31 = "Por isso, adicionei um componente que \"relaxa o corpo naturalmente e deixa a mente leve\"!"
2000620-32 = "[s3] \"Entendo, \"desta vez\" parece ser algo bom.\"\n[s4] \"Fazendo algo bom por um milagre...\""
2000620-35 = "……O que você disse agora?"
2000620-36 = "Não, não é sobre isso!"
2000620-37 = "Eu não chamei o Sensei só para mostrar o perfume!"
2000620-38 = "Preciso de uma ajudinha...#nPara espalhar essa quantidade enorme de perfume pelo parque, preciso de um assistente..."
2000620-39 = "Eu vou espalhando o perfume, e enquanto eu volto, quero que você prepare o próximo frasco e divida o trabalho comigo."
2000620-40 = "……Hm?"
2000620-41 = "Entendi, mas por que você está perguntando sobre esse meu traje...?"
2000620-45 = "……?"
2000620-51 = "O que tem o skate...?"
2000620-52 = "O motivo de eu ter escolhido um skate em vez de uma bicicleta ou patinete...?"
2000620-56 = "……Hahaha! O que você está dizendo, Sensei! Isso é óbvio!"
2000620-62 = "Naturalmente, porque o skate é mais lógico!"
2000620-63 = "[s5] \"O skate...?\"\n[s6] \"Normalmente não seria o contrário...?\""
2000620-66 = "Haa~"
2000620-67 = "É difícil ser um gênio que ninguém entende."
2000620-68 = "Pense bem, Sensei. Bicicletas e patinetes exigem que você segure o guidão, e se você soltar, eles só seguem em linha reta."
2000620-69 = "Mas, para espalhar perfume em uma área ampla, é muito melhor ter as duas mãos livres."
2000620-70 = "Afinal, preciso segurar um frasco em cada mão..."
2000620-71 = "Nesse ponto, o skate deixa as duas mãos livres!#nAlém disso, posso passar por caminhos estreitos onde bicicletas e patinetes não passam!"
2000620-72 = "Claro, como você disse, talvez não seja algo muito comum..."
2000620-73 = "Mas como eu sou um gênio, não há problema algum!"
2000620-74 = "Não é exagero dizer que o skate foi feito para mim!"
2000620-75 = "Vamos, Sensei! Chega de conversa!"
2000620-76 = "Não temos tempo! Precisamos espalhar o perfume antes que as pessoas cheguem!"
2000620-77 = "Primeiro, vamos começar por ali..."
2000620-81 = "Então... estou indo! Sensei, prepare o próximo frasco e me espere!"
2000620-86 = "Vruuum!"
2000620-95 = "Hum... hm...?"
2000620-96 = "P-por que... de repente meu corpo... ué..."
2000620-97 = "Meu corpo está relaxando e minha mente está ficando leve...#nDesse jeito, minha concentração..."
2000620-98 = "Eh...?"
2000620-102 = "……Uwaaaaaa！？！？"
2000620-115 = "（Ao correr apressado até onde Saya estava, senti minhas próprias forças se esvaírem）"
2000620-116 = "（Felizmente ela não estava ferida, então, tomando cuidado, dividimos as tarefas e espalhamos o perfume pelo parque）"
