[translation]
1300203-1 = "Como assim, sem alho?"
1300203-2 = "Schale - Escritório"
1300203-6 = "Após o almoço, Akari voltou com uma expressão mais alegre que o habitual."
1300203-7 = "Lá lá lá~, lá lá lá~♪"
1300203-8 = "Ah, o almoço de hoje estava delicioso~! Fazia tempo que eu não descobria um restaurante tão maravilhoso, estou me sentindo ótima."
1300203-9 = "Professor... você almoçou pão de novo?"
1300203-10 = "Isso não pode acontecer. Se não comer um almoço decente, não vai conseguir se concentrar no trabalho da tarde, não é? Você precisa comer algo mais nutritivo."
1300203-11 = "Mesmo que dê trabalho, é melhor ir a um restaurante de verdade em vez de comer algo da loja de conveniência. Da próxima vez, vou te apresentar um lugar delicioso perto do Schale!"
1300203-12 = "[s] \"Akari, você comeu lámen no almoço?\""
1300203-13 = "Oh, como você adivinhou?"
1300203-14 = "Exatamente, hoje eu comi lámen. Abriu uma loja de lámen nova bem na frente do Schale."
1300203-15 = "No cardápio dizia: 'Lámen gigante de 10 porções, grátis se comer em menos de 30 minutos', então eu acabei comendo duas tigelas! Estava delicioso~."
1300203-16 = "Tinha muitos acompanhamentos, o caldo era encorpado, um autêntico lámen de tonkotsu."
1300203-17 = "...Mas, professor, como você sabia que eu tinha comido lámen?"
1300203-18 = "Hã? O cheiro de alho, é?"
1300203-19 = "Ah... eu escovei os dentes direitinho, mas parece que o cheiro ainda ficou..."
1300203-20 = "Realmente, tinha o equivalente a uns três dentes de alho crus, e eu tomei o caldo todo... não é de se estranhar que o cheiro de alho tenha ficado."
1300203-21 = "É vergonhoso ficar com esse cheiro na sua frente, mas, por outro lado, um lámen de tonkotsu sem alho perde a graça... o que eu deveria fazer...?"
1300203-22 = "[s] \"Para mim, não tem problema nenhum.\""
1300203-23 = "Não, para uma donzela, esse é um problema delicado!"
1300203-24 = "Eu não consigo abrir mão de comidas deliciosas, mas também não quero ser lembrada pelo professor como a aluna que cheira a alho..."
1300203-25 = "Preciso encontrar uma solução..."
1300203-27 = "Na manhã seguinte. Assim que entrei no escritório do Schale, um cheiro intenso de alho atingiu meu nariz..."
1300203-28 = "Bom dia, professor! Estava te esperando!"
1300203-29 = "[s] \"E-esse cheiro intenso de alho, o que é isso...\""
1300203-30 = "Pesquisei várias formas depois que cheguei em casa ontem, e segundo a internet, o olfato humano para de distinguir um cheiro se ficarmos expostos a ele por muito tempo."
1300203-31 = "Então eu tive uma ideia: se eu fizer o professor sentir muito cheiro de alho, você não vai mais notar o meu cheiro!"
1300203-32 = "Veja só, preparei pratos cheios de alho especialmente para você, professor."
1300203-33 = "Torrada de alho, arroz frito com alho, guioza de alho, alho em conserva no shoyu..."
1300203-34 = "Vamos comer bastante alho e nos acostumar com esse cheiro juntos!"
1300203-36 = "A comida que a Akari preparou estava deliciosa, mas, depois disso, o cheiro de alho não saiu do escritório por quase uma semana..."
