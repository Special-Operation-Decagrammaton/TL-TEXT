[translation]#[Texto Final. - Filipe 08/07.]
70004030-1 = "O Presente Sem Dono (3)"
70004030-3 = "Haa……"
70004030-4 = "No fim não descobri quem perdeu……"
70004030-5 = "E se esse presente causar um caos em Kivotos……"
70004030-7 = "……Ouvi você mencionar 'caos'?"
70004030-8 = "Hyaa!?"
70004030-9 = "M-Miyako!? Desde quando você tá aí……?"
70004030-10 = "Acabei de chegar. Desculpa te assustar."
70004030-11 = "Mas, houve algum incidente?"
70004030-12 = "N-não, nada demais……!"
70004030-13 = "É-é que……#n……dizem que o novo 'Frango Explosivo Divino' lançado essa semana é apimentado demais!"
70004030-14 = "Dizem que tá causando sensação em Kivotos……#n……se todo mundo surtar com a pimenta, vai ser um caos, né……"
70004030-15 = "Ah, o novo produto."
70004030-16 = "Eu pensei que o Sensei tivesse sido alvo de algo."
70004030-17 = "Ahaha…… imagina……"
70004030-18 = "A-aliás, o que trouxe você aqui?#nSe for marmita vencida, tô juntando……"
70004030-19 = "Não, não é sobre as marmitas……"
70004030-20 = "Trouxe isto pra você, Sora."
70004030-21 = "O que é? Tem um cheiro defumado……"
70004030-22 = "Peru assado.#nGanhei carne dos vizinhos e fiz, mas veio muita quantidade……"
70004030-23 = "Trouxe como agradecimento pelas marmitas.#nFicaria feliz se aceitasse."
70004030-24 = "Ah!? Mas quem tem que agradecer sou eu pelas marmitas……#nM-muito obrigada!"
70004030-25 = "Ah, Miyako, por que não come comigo aqui?#nA essa hora quase não tem cliente."
70004030-27 = "……Não.#nNa verdade, quero dividir com o Sensei também……"
70004030-28 = "Vou até ele depois.#nDesculpa recusar o convite."
70004030-29 = "Entendo……"
70004030-31 = "……Fufu, imaginei."
70004030-35 = "Bom, não é como se eu nunca comesse doces com o Sensei……"
70004030-39 = "Mas isso é só como aluna e professor."
70004030-42 = "As alunas de Kivotos gostam muito do Sensei, né."
70004030-43 = "……Sim. Ele é gentil e atencioso com todos."
70004030-44 = "……Mas também ouço boatos estranhos.#nQue anda com delinquentes, ou que perambula por parques à noite com roupas estranhas……"
70004030-45 = "Fufu, não é possível."
70004030-46 = "Sempre me disseram: 'cuidado com quem é gentil sem motivo'."
70004030-47 = "Por isso…… não entendo como todo mundo confia no Sensei tão facilmente."
70004030-51 = "Talvez seja porque ele é um 'adulto pouco confiável'."
70004030-52 = "Adulto pouco confiável?"
70004030-53 = "Sim. O Sensei tem seus momentos desastrados,#n……e às vezes age de forma incompreensível.#nLonge de ser perfeito……"
70004030-54 = "Mas, mesmo sendo desajeitado, ele se dedica de corpo e alma aos alunos, e ouve com sinceridade."
70004030-55 = "Por isso, acho que podemos ser sinceras na frente dele."
70004030-59 = "Miyako……"
70004030-60 = "……O Sensei não tem algum segredo seu?"
70004030-61 = "N-não tem nada disso!"
70004030-62 = "Tudo bem então……#nAh, já que é assim, Miyako, uma pergunta……"
70004030-63 = "Você perdeu alguma coisa recentemente?"
70004030-64 = "Não…… não me lembro.#nJá perdi coisas, mas não esqueci nada."
70004030-65 = "……Desculpa, tenho que ir.#nEntão, Sora, tenha um bom Natal."
70004030-69 = "……"
70004030-70 = "[ns] \"Sora, boa noite.\""
70004030-71 = "Hyaa!? S-Sensei!?"
70004030-72 = "[s1] \"Vim dar uma pausa do trabalho……\"\n[s2] \"Por que esse susto?\""
70004030-73 = "Ah, é mesmo…… Bem-vindo à 'Angel 24'!"
70004030-74 = "Ah, é mesmo…… Bem-vindo à 'Angel 24'!"
70004030-75 = "[s3] \"Algum problema?\"\n[s4] \"Você tava com uma cara séria.\""
70004030-76 = "N-não é nada……"
70004030-77 = "N-não é nada……"
70004030-81 = "……Na verdade, tem uma coisa……"
70004030-82 = "Não consegui achar o dono deste presente que encontrei na loja……"
70004030-83 = "[s] \"Ué. Você ainda não abriu?\""
70004030-84 = "……Hã?"
70004030-85 = "Quer dizer……"
70004030-86 = "[s5] \"É, é um presente de Natal meu.\"\n[s6] \"Devia ter avisado antes.\""
70004030-87 = "M-mas…… receber um presente do nada……"
70004030-88 = "M-mas…… receber um presente do nada……"
70004030-89 = "Eu não tenho…… nada pra te dar em troca……"
70004030-90 = "……Ah! Lembrei que tenho uns cupons de desconto pra marmita――"
70004030-91 = "[s] \"Relaxa. Você sempre me ajuda.\""
70004030-92 = "Hã?"
70004030-93 = "[s7] \"Você sempre me recebe com um sorriso, né?\"\n[s8] \"Ver a conveniência aberta a qualquer hora me dá segurança.\""
70004030-94 = "Isso…… eu não faço nada de especial."
70004030-95 = "Isso…… eu não faço nada de especial."
70004030-96 = "Só…… faço o óbvio pra ganhar meu salário……"
70004030-97 = "[ns] \"O 'óbvio' é mais difícil do que parece.\""
70004030-99 = "[ns9] \"É porque você se esforça no 'óbvio'――\"\n[ns10] \"que todos podem aproveitar o 'dia a dia' em paz.\""
70004030-100 = "É verdade……"
70004030-101 = "É verdade……"
70004030-102 = "Então o Sensei via essa rotina comum assim."
70004030-103 = "O que tem dentro do presente……?"
70004030-107 = "……Luvas?"
70004030-108 = "[s11] \"Nessa época, as mãos esfriam rápido.\"\n[s12] \"Pensei que isso pudesse aquecer.\""
70004030-109 = "……Fufu, que design fofo."
70004030-110 = "……Fufu, que design fofo."
70004030-111 = "São leves, quentinhas…… e servem certinho.#nComo se tivesse medido antes――"
70004030-112 = "……Como sabia o tamanho da minha mão?"
70004030-113 = "[s13] \"Um professor tem que saber essas coisas!\"\n[s14] \"Fiquei de olho nas suas mãos toda vez que pegava o troco!\""
70004030-114 = "……Afinal, o Sensei é mesmo um adulto suspeito."
70004030-115 = "……Afinal, o Sensei é mesmo um adulto suspeito."
70004030-119 = "Mas o presente me deixou muito feliz."
70004030-120 = "Obrigado por sempre confiar em mim――#n……e na 'Angel 24'."
70004030-125 = "A 'Angel 24' vai continuar aberta 24 horas por dia para o Sensei!"
70004030-127 = "O Presente Sem Dono"