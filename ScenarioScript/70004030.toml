[translation]
70004030-1 = "Presente sem dono (3)"
70004030-3 = "Haa..."
70004030-4 = "No fim das contas, não descobri quem deixou isso cair..."
70004030-5 = "E se esse presente causar um caos total em Kivotos... o que eu faço?"
70004030-7 = "...Ouvi você dizer 'caos total', é isso?"
70004030-8 = "Aaaah!?"
70004030-9 = "Mi-Miyako-san!? Desde quando você está aí...?"
70004030-10 = "Cheguei agora pouco. Desculpe por te assustar."
70004030-11 = "Mas, aconteceu algum incidente?"
70004030-12 = "N-não, nada de mais...!"
70004030-13 = "É que... na verdade, o 'Frango Explosivo Divino' lançado esta semana está com fama de ser extremamente apimentado!"
70004030-14 = "Dizem que está causando uma sensação em todo o Kivotos... então pensei que seria um problema se todo mundo entrasse em pânico por causa da ardência..."
70004030-15 = "Ah, era sobre o novo produto."
70004030-16 = "Eu achei que o Sensei tinha se tornado alvo de alguma coisa."
70004030-17 = "Ahaha... que nada..."
70004030-18 = "A-a propósito, o que a traz aqui hoje? Se for sobre as marmitas descartadas, estou justamente organizando elas..."
70004030-19 = "Não, desta vez não é sobre as marmitas..."
70004030-20 = "Pensei em trazer isto para você, Sora-san."
70004030-21 = "O que é isso? Tem um cheiro muito bom..."
70004030-22 = "É um peru assado. Ganhei a carne de alguns vizinhos e fiz, mas acabou ficando muita comida..."
70004030-23 = "Trouxe como forma de agradecimento pelas marmitas de sempre. Ficaria feliz se você pudesse comer."
70004030-24 = "Sério!? Na verdade, sou eu quem deveria agradecer pelas marmitas... M-muito obrigada!"
70004030-25 = "Ah, Miyako-san, por que não come com a gente? Não tem quase nenhum cliente a esta hora."
70004030-27 = "...Não. Na verdade, eu gostaria de levar uma parte para o Sensei também..."
70004030-28 = "Vou até ele agora. Sinto muito, mesmo com o seu convite."
70004030-29 = "Entendo..."
70004030-31 = "...Hehe, eu sabia que você diria isso."
70004030-35 = "Bem, não é como se eu nunca comesse doces com o Sensei, mas..."
70004030-39 = "Mas isso é estritamente na nossa relação de aluna e professor."
70004030-42 = "As alunas de Kivotos realmente adoram o Sensei [USERNAME], não é?"
70004030-43 = "...Sim. Ele é gentil e atencioso com todo mundo."
70004030-44 = "...Mas, às vezes ouço rumores estranhos. Que ele anda com delinquentes, ou que vaga por parques de madrugada com roupas estranhas..."
70004030-45 = "Haha, nem pensar."
70004030-46 = "Sempre me disseram: 'Cuidado com quem é gentil com você sem motivo'."
70004030-47 = "Por isso... não entendo como todas vocês conseguem confiar no Sensei tão facilmente."
70004030-51 = "Isso é provavelmente porque... o Sensei é um 'adulto pouco confiável'."
70004030-52 = "Um adulto pouco confiável?"
70004030-53 = "Sim. O Sensei [USERNAME] tem seus momentos de imprudência e, às vezes, toma atitudes incompreensíveis. É difícil dizer que ele é uma pessoa perfeita, mas..."
70004030-54 = "Mesmo sendo desajeitado, ele se dedica ao máximo para lidar com as alunas e nos ouve com sinceridade."
70004030-55 = "Por isso, eu sinto que posso ser eu mesma na frente dele."
70004030-59 = "Miyako-san..."
70004030-60 = "...O Sensei tem algum segredo seu nas mãos?"
70004030-61 = "N-não, nada disso!"
70004030-62 = "Bom, se você diz... Ah, é verdade. Por precaução, queria te perguntar uma coisa..."
70004030-63 = "Você esqueceu algo em algum lugar ultimamente?"
70004030-64 = "Não... não me recordo. Posso ter perdido algumas coisas, mas esquecido, não."
70004030-65 = "...Desculpe, preciso ir agora. Então, Sora-san, tenha um bom Natal."
70004030-69 = "..."
70004030-70 = "[ns] \"Boa noite, Sora.\""
70004030-71 = "Aaaah!? Se-Sensei!?"
70004030-72 = "[s1] \"Vim fazer uma pausa do trabalho, mas...\"\n[s2] \"Por que está tão surpresa?\""
70004030-73 = "E-entendo... Bem-vindo à Angel 24!"
70004030-74 = "E-entendo... Bem-vindo à Angel 24!"
70004030-75 = "[s3] \"Algum problema?\"\n[s4] \"Você parecia estar com uma cara preocupada.\""
70004030-76 = "N-não é nada disso..."
70004030-77 = "N-não é nada disso..."
70004030-81 = "...Não. Na verdade, tem uma coisa sim..."
70004030-82 = "Encontrei este presente na loja, mas não consegui achar o dono..."
70004030-83 = "[s] \"Ah. Você ainda não abriu?\""
70004030-84 = "............Hã?"
70004030-85 = "Isso significa que, por acaso..."
70004030-86 = "[s5] \"Sim, é um presente de Natal meu para você.\"\n[s6] \"Eu deveria ter te avisado antes.\""
70004030-87 = "N-não pode ser... Receber um presente assim, de repente..."
70004030-88 = "N-não pode ser... Receber um presente assim, de repente..."
70004030-89 = "Eu... não tenho nada para retribuir ao Sensei..."
70004030-90 = "...Ah! Falando nisso, acho que tenho um cupom de desconto para marmitas..."
70004030-91 = "[s] \"Não se preocupe com isso. Você sempre me ajuda.\""
70004030-92 = "Hã?"
70004030-93 = "[s7] \"A Sora sempre me recebe com um sorriso, não é?\"\n[s8] \"Saber que a loja de conveniência está aberta a qualquer hora me traz paz.\""
70004030-94 = "Isso é... eu não estou fazendo nada de especial."
70004030-95 = "Isso é... eu não estou fazendo nada de especial."
70004030-96 = "Eu só estou fazendo o meu trabalho para ganhar meu salário..."
70004030-97 = "[ns] \"Fazer o 'normal' é surpreendentemente difícil, sabia?\""
70004030-99 = "[ns9] \"Como a Sora se esforça para manter esse 'normal'--\"\n[ns10] \"Todos podem aproveitar o 'cotidiano' com tranquilidade.\""
70004030-100 = "É mesmo..."
70004030-101 = "É mesmo..."
70004030-102 = "Então o Sensei vê este cotidiano comum dessa forma."
70004030-103 = "O que será que tem dentro do presente...?"
70004030-107 = "...Luvas?"
70004030-108 = "[s11] \"Nesta época, as mãos ficam geladas quando estamos lá fora.\"\n[s12] \"Pensei que isso ajudaria a te aquecer um pouco.\""
70004030-109 = "...Hehe, que design fofo."
70004030-110 = "...Hehe, que design fofo."
70004030-111 = "É leve, quentinha... e o tamanho é perfeito. #nComo se tivesse medido antes..."
70004030-112 = "...Como você sabia o tamanho da minha mão?"
70004030-113 = "[s13] \"Um Sensei precisa estar atento a esses detalhes!\"\n[s14] \"Eu sempre olhava para as mãos da Sora toda vez que recebia o troco!\""
70004030-114 = "............O Sensei é mesmo um adulto suspeito, não é?"
70004030-115 = "............O Sensei é mesmo um adulto suspeito, não é?"
70004030-119 = "Mas, eu estou muito feliz com o presente."
70004030-120 = "Muito obrigada por sempre confiar em mim--#ne na Angel 24."
70004030-125 = "Continuarei mantendo a Angel 24 aberta 24 horas para o Sensei!"
70004030-127 = "O presente sem dono"
