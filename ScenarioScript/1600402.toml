[translation]
1600402-1 = "任侠道の生徒"
1600402-2 = "……！！センセ……いえ、お頭！！"
1600402-3 = "エット、どんな姿勢でしたっけ……少々お待ちクダサイ！"
1600402-4 = "こうして……よっ。"
1600402-6 = "手は膝の上、腰を曲げて……OK！この姿勢デス！"
1600402-7 = "ふぅ……。"
1600402-9 = "お待ちしておりマシタ、お頭ァ！フィーナ、ここにあらためてご挨拶申し上げマス！！"
1600402-10 = "[s1] \"何か色々間違ってる気がする……。\"\n[s2] \"そういうのどこで覚えたの……？\""
1600402-11 = "……？え、へ、変デスか？"
1600402-12 = "……？え、へ、変デスか？"
1600402-13 = "そんなはずは……「任侠ニャンニャン伝」で見た通りのはず……。"
1600402-14 = "ハイ？これデスか？ふふ～ん、よくぞ聞いてくれマシた！"
1600402-15 = "ジャーン！！"
1600402-16 = "[s] \"……任侠映画？\""
1600402-17 = "ワオ、もしかして見たことありマスか！？これ本当にすごいデス！"
1600402-18 = "この主人公の台詞をワタシ、色々と……！"
1600402-19 = "……ハイ？見たことないデスか？でも色々と違う気がする……？"
1600402-20 = "そうデスか……。"
1600402-21 = "エエィッ！細かいことは気にしない！どうせ他にもいっぱいありマスから！"
1600402-22 = "とにかく、そういうことデス！「お祭り運営委員会」組へ、よくお戻りになりマシタ、お頭！"
1600402-23 = "……？「お頭」、駄目デスか？「センセイ」の方が？"
1600402-24 = "名前も普通に「お祭り運営委員会」が良いと思う……？"
1600402-25 = "デスが、お頭……。"
1600402-26 = "いえ、私がお頭の言葉に口答えするわけにはいきマセン。"
1600402-27 = "仰せの通りに！この世界では、センセイが白と言えば黒も白デス！"
1600402-28 = "……おお……今のは中々だったかもデス、良い感じデシタ、フフッ。"
1600402-29 = "……？"
1600402-30 = "芝居がかってる……？"
1600402-31 = "……。"
1600402-32 = "イエ、そ、そんなことはアリマセン！本当デス！！わ、ワタシは本当の任侠に……！"
1600402-33 = "エット、そのために……うーん……。"
1600402-34 = "その……。"
1600402-35 = "……エヘ。すみません、図星、デス。"
1600402-36 = "そうデス。映画の真似デス……まだ見様見真似でいっぱいいっぱいで、中途半端デス。"
1600402-37 = "どうして……？フフッ、そんなの決まっていマス！"
1600402-38 = "かっこいい任侠になるためデス！なぜなら任侠は最高にかっこいいので！！"
1600402-39 = "[s] \"任侠に「なる」……？\""
1600402-40 = "毎日毎日！朝も夜も！ずっと映画を見ながら眠れない夜を過ごしてきマシタ！"
1600402-41 = "百鬼夜行に来れば、こんな世界で暮らせる！ソウ信じて！！"
1600402-42 = "義理人情、切っても切れない絆……！悲劇的な結末と、大切な人たちのためのやむを得ない犠牲……！！"
1600402-43 = "最高デス！これこそ「浪漫」デス！！そのためにここに来たんデス、ワタシ！！"
1600402-44 = "分かりマスよね！？センセイなら、分かってくれるはずデス！"
1600402-45 = "……？"
1600402-46 = "任侠について、多分何か勘違いしてる……？"
1600402-47 = "そ、そうデスか？えっと、まだ見てない映画があるのデショウか？勧めてもらったのは、多分全部……。"
1600402-48 = "エッ……任侠とはどんな意味なのか？ンーーーー難しい質問デス……！"
1600402-49 = "みんなには避けられてしまうけれど、やらなきゃいけないことをやる人たち、デス……？"
1600402-50 = "「仁義」を重んじて行動スル……えっと、違いマスか……?"
1600402-51 = "[s3] \"意味はだいたい合ってると思うけど……\"\n[s4] \"何か全体的に勘違いしてるというか……\""
1600402-52 = "おかしいデスね……たしか映画はそう言われていたのデスが……。"
1600402-53 = "おかしいデスね……たしか映画はそう言われていたのデスが……。"
1600402-54 = "仁義に基づいて、人を見守り、助ける……ああっ！？"
1600402-55 = "あそこ、一人で重い荷物を持ったおばあちゃんが！"
1600402-56 = "ヘイおばあちゃん！フィーナが手伝いマス！イエ、気にしないでクダサイ！よっ……！"
1600402-57 = "……。"
1600402-59 = "あはは、只今デス。急デシタが、手伝えてよかっ……"
1600402-60 = "ああっ！今度はあそこで泣いてる子供が！！慰めてきマス！"
1600402-61 = "ふう～……今度こそ只今デ……"
1600402-63 = "ああっ！あそこに道に迷ったみたいな学生が……！"
1600402-65 = "あっちにはお腹を空かせてそうなワンちゃんが……！！"
1600402-66 = "[s] \"……。\""
1600402-69 = "……"
1600402-70 = "……ふう～！OKデス！"
1600402-71 = "す、スミマセン、センセイ。ああいうのを見ると、放っておけないと言いマスか……。"
1600402-72 = "えっと、何の話デシタっけ？"
1600402-73 = "あ、任侠デス！任侠とはどんな意味かという……"
1600402-74 = "……もう大丈夫、デスか？どういうことデス？"
1600402-75 = "フィーナの任侠はもう見ることができた……デスか？"
1600402-76 = "それはどういう意味なのか……ンーーー……フィーナのことなのに、フィーナが分かりマセン……。"
1600402-77 = "……デスが、センセイがそう言うならそうデスね！！エヘへッ！"
1600402-78 = "何だか認めてもらったようで、良い気分デス！"
1600402-79 = "センセイ！これからもフィーナの任侠、見守っていてクダサイ！"
1600402-81 = "（フィーナはそのまま、楽しそうにまた話し始めた）"
1600402-82 = "（その途中でもまた、困った人を見かけるたびに、彼女なりの「仁義」に基づいて色んな人を助けていた）"
