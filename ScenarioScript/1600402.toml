[translation]
1600402-1 = "Aluna do caminho da cavalaria"
1600402-2 = "……！！ Sensei…… não, Chefe!!"
1600402-3 = "Hum, qual era a postura mesmo…… espere um pouco, por favor!"
1600402-4 = "Assim…… pronto."
1600402-6 = "Mãos sobre os joelhos, cintura curvada…… OK! É esta a postura!"
1600402-7 = "Ufa……."
1600402-9 = "Estávamos esperando por você, Chefe! Fina, aqui para apresentar meus cumprimentos novamente!!"
1600402-10 = "[s1] \"Sinto que tem algo muito errado aqui…….\"\n[s2] \"Onde você aprendeu esse tipo de coisa……?\""
1600402-11 = "……? Eh, e-está estranho?"
1600402-12 = "……? Eh, e-está estranho?"
1600402-13 = "Não pode ser…… deveria estar exatamente como vi em \"Crônicas Ninkyo Nyan-Nyan\"……."
1600402-14 = "Hein? Isso aqui? Fufu~n, que bom que perguntou!"
1600402-15 = "Tcharam!!"
1600402-16 = "[s] \"……Filme de yakuza?\""
1600402-17 = "Uau, será que você já viu!? Isso é realmente incrível!"
1600402-18 = "Eu peguei várias falas do protagonista……!"
1600402-19 = "……Hein? Você nunca viu? Mas sente que tem algo diferente……?"
1600402-20 = "É mesmo……."
1600402-21 = "Ah! Não se preocupe com os detalhes! De qualquer forma, tem muitas outras por aí!"
1600402-22 = "De qualquer modo, é isso! Bem-vindo de volta ao grupo do \"Comitê de Gestão do Festival\", Chefe!"
1600402-23 = "……? \"Chefe\", não serve? Prefere \"Sensei\"?"
1600402-24 = "Acha que o nome deveria ser apenas \"Comitê de Gestão do Festival\"……?"
1600402-25 = "Mas, Chefe……."
1600402-26 = "Não, eu não posso desobedecer às palavras do Chefe."
1600402-27 = "Como desejar! Neste mundo, se o Sensei disser que branco é preto, então é preto!"
1600402-28 = "……Oh…… essa foi muito boa, ficou ótimo, fufu."
1600402-29 = "……?"
1600402-30 = "Está parecendo uma atuação……?"
1600402-31 = "……."
1600402-32 = "N-não, não é nada disso! É verdade!! E-eu realmente sou uma verdadeira cavaleira……!"
1600402-33 = "Hum, para isso…… hum……."
1600402-34 = "Isso……."
1600402-35 = "……Ehe. Desculpe, você acertou em cheio."
1600402-36 = "É isso mesmo. É uma imitação de filme…… ainda estou apenas aprendendo, está tudo pela metade."
1600402-37 = "Por que……? Fufu, isso já está decidido!"
1600402-38 = "Para me tornar uma cavaleira incrível! Porque a cavalaria é o auge do estilo!!"
1600402-39 = "[s] \"'Tornar-se' uma cavaleira……?\""
1600402-40 = "Todo santo dia! De manhã e de noite! Passei noites em claro assistindo a filmes!"
1600402-41 = "Se eu viesse para Hyakkiyako, poderia viver em um mundo assim! Eu acreditei nisso!!"
1600402-42 = "Dever e humanidade, laços inquebráveis……! Finais trágicos e sacrifícios inevitáveis pelas pessoas importantes……!!"
1600402-43 = "É o máximo! Isso é \"romance\"!! Foi por isso que vim para cá, eu!!"
1600402-44 = "Você entende, não é!? Se for o Sensei, com certeza vai entender!"
1600402-45 = "……?"
1600402-46 = "Sobre a cavalaria, acho que você está entendendo algo errado……?"
1600402-47 = "S-sério? Hum, será que tem algum filme que eu ainda não vi? Os que me recomendaram, acho que todos……."
1600402-48 = "Eh…… qual o significado de cavalaria? Hmmm, essa é uma pergunta difícil……!"
1600402-49 = "São pessoas que fazem o que precisa ser feito, mesmo que todos as evitem, não é……?"
1600402-50 = "Agir prezando pela \"justiça e honra\"…… hum, está errado……?"
1600402-51 = "[s3] \"Acho que o significado está mais ou menos certo, mas……\"\n[s4] \"É que você está entendendo tudo de um jeito meio errado……\""
1600402-52 = "Que estranho…… eu tinha certeza de que era isso que diziam nos filmes……."
1600402-53 = "Que estranho... Tenho certeza de que era isso que diziam no filme..."
1600402-54 = "Com base na justiça, observar e ajudar as pessoas... Ahh!?"
1600402-55 = "Ali, tem uma senhora carregando uma bagagem pesada sozinha!"
1600402-56 = "Ei, vovó! A Phina vai ajudar! Não, não se preocupe! Opa...!"
1600402-57 = "..."
1600402-59 = "Ahaha, voltei. Foi de repente, mas fico feliz por ter ajudado..."
1600402-60 = "Ahh! Agora tem uma criança chorando ali!! Vou lá consolar ela!"
1600402-61 = "Ufa... Agora sim, voltei..."
1600402-63 = "Ahh! Tem uma estudante ali que parece estar perdida...!"
1600402-65 = "E ali tem um cachorrinho que parece estar com fome...!!"
1600402-66 = "[s] \"...\""
1600402-69 = "..."
1600402-70 = "...Ufa! OK!"
1600402-71 = "D-desculpe, Sensei. É que, quando vejo essas coisas, não consigo simplesmente ignorar..."
1600402-72 = "Hum, sobre o que estávamos falando mesmo?"
1600402-73 = "Ah, sobre cavalheirismo! Sobre o que significa cavalheirismo..."
1600402-74 = "...Já está tudo bem? O que você quer dizer com isso?"
1600402-75 = "Você já conseguiu ver o cavalheirismo da Phina...?"
1600402-76 = "O que isso significa... Hmmm... É sobre mim, mas nem eu mesma entendo..."
1600402-77 = "...Mas, se o Sensei diz que é assim, então é assim mesmo!! Ehehe!"
1600402-78 = "Sinto que fui reconhecida, estou me sentindo muito bem!"
1600402-79 = "Sensei! Continue observando o cavalheirismo da Phina daqui para frente!"
1600402-81 = "(Phina continuou a falar alegremente como se nada tivesse acontecido)"
1600402-82 = "(No meio disso, toda vez que via alguém em apuros, ela ajudava várias pessoas com base em seu próprio senso de \"justiça\")"
