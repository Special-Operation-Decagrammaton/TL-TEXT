[translation]
84306100500-5 = "Terminou muito mais suavemente do que eu esperava."
84306100500-6 = "Vou rever a minha avaliação sobre você. #nNesse tipo de percepção, a Neru provavelmente é melhor que você."
84306100500-7 = "Você está me superestimando. Foi só por causa do equipamento."
84306100500-8 = "Então... qual é o problema com isso?"
84306100500-9 = "Parece apenas um brinquedo para mim."
84306100500-10 = "Bem... para dizer de forma direta —"
84306100500-11 = "É uma arma de raios que aumenta temporariamente o tamanho de objetos. O efeito parece durar apenas alguns minutos."
84306100500-12 = "É uma tecnologia difícil de acreditar."
84306100500-16 = "...Podemos mesmo recolher isso? Eu achava que a EXPO era um lugar para exibir novas tecnologias como essa."
84306100500-17 = "Se a utilidade estiver dentro de uma 'faixa aceitável', não há problema algum."
84306100500-18 = "Aceitável... então você está dizendo que isso ultrapassa esse limite."
84306100500-19 = "Novas tecnologias exigem muitos testes. Restrições severas demais acabam cortando o broto da inovação. No entanto..."
84306100500-20 = "Essa arma de raios tinha o potencial de aumentar o alvo em dezenas de metros."
84306100500-21 = "Entendo."
84306100500-22 = "Dezenas de metros...!?"
84306100500-23 = "Algo assim estava no estande de exibição até agora pouco?"
84306100500-24 = "Se eles queriam fazer uma demonstração para atrair o interesse de investidores, não existe lugar melhor que a EXPO."
84306100500-25 = "O anúncio dizia que 'um morango comum serviria para cem pessoas!', mas..."
84306100500-26 = "Não importa como se olhe, o impacto caso algo desse errado seria grande demais. Infelizmente, é um item de recolhimento."
84306100500-27 = "Então é assim que a Millennium funciona..."
84306100500-28 = "(Só de pensar que eu poderia ter atirado em mim mesmo, fico arrepiado.)"
84306100500-29 = "Por enquanto, está resolvido. Entrarei em contato se houver mais alguma coisa."
84306100500-30 = "Bom trabalho. Descanse um pouco."
