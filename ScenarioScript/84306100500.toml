[translation]
84306100500-5 = "予想よりもずっとスムーズに終わったわね。"
84306100500-6 = "貴女の評価を改めるわ。#nこの辺りの感覚は、きっとネルの方が優れているのでしょうね。"
84306100500-7 = "買い被りすぎだ。装備が良かっただけだよ。"
84306100500-8 = "それで……これには何の問題が？"
84306100500-9 = "ただのおもちゃに見えるのだが。"
84306100500-10 = "そうね……端的に言うのなら――"
84306100500-11 = "物体を一時的に大きくする光線銃よ。効果は数分程度のようね。"
84306100500-12 = "にわかには信じがたい技術だね。"
84306100500-16 = "……回収して良いのか？EXPOは、こういった新技術を披露する場であると思っていたのだが。"
84306100500-17 = "その効用が「許容できる範囲」であれば、何も問題ないわ。"
84306100500-18 = "許容……その範疇を逸脱している、と。"
84306100500-19 = "新技術は、多くのテストを必要とする。強すぎる制限は、革新の芽を摘んでしまう。けれど……。"
84306100500-20 = "この光線銃は、数十メートルの単位で対象を巨大化させる可能性があった。"
84306100500-21 = "そうか。"
84306100500-22 = "数十メートル……！？"
84306100500-23 = "そのような物がさっきまで展示ブースに？"
84306100500-24 = "投資家の興味を引くためにデモンストレーションを行うなら、EXPOほど適した場はそう無いでしょうから。"
84306100500-25 = "「普通のイチゴが百人分に！」という触れ込みだったけれど……。"
84306100500-26 = "いくらなんでも、トラブルが起きた時の影響が大きすぎる。残念ながら回収対象よ。"
84306100500-27 = "これがミレニアムなのだね……。"
84306100500-28 = "（自分に誤射していたらと思うとゾッとするね）"
84306100500-29 = "ひとまず、これで解決ね。また何かあれば連絡するわ。"
84306100500-30 = "お疲れ様。ゆっくり休んでちょうだい。"
