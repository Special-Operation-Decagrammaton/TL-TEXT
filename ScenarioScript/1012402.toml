[translation]
1012402-1 = "海は待ってくれない"
1012402-2 = "……というわけでして。"
1012402-7 = "（ハスミが持ってきたスケジュール表には、まったく空欄がない。#n全ての日に予定が書き込まれていた）"
1012402-8 = "[ns1] \"みんな、こんなに忙しいの？\"\n[ns2] \"ちょっとハードすぎないかな……。\""
1012402-11 = "いえ、そこまで多忙というわけではありません。"
1012402-12 = "あくまでこれは、委員会全体の予定ですから。#n各スケジュールごとに、担当者も異なります。"
1012402-13 = "（見直すと、スケジュールごとに担当者の名前が記載されていた）"
1012402-14 = "それに、活動時間外は自由に過ごすことが許されています。"
1012402-15 = "先生のおっしゃる通り、せっかくの海でもありますし。"
1012402-16 = "いつも頑張っているみなさんたちへの……ささやかな贈り物のつもりです。"
1012402-17 = "[s3] \"でも、ハスミは……。\"\n[s4] \"全部の予定に名前があるね……？\""
1012402-20 = "当然です。私は副委員長ですから。"
1012402-21 = "ですが、儀礼的な業務が大半ですし、音を上げるほどではありませんよ。"
1012402-22 = "巡回や事務作業から解放される分、普段より楽ではないでしょうか。"
1012402-23 = "……どうしましたか？"
1012402-24 = "私も自分の時間を過ごした方が良いと？"
1012402-25 = "ふふっ……お気遣いありがとうございます。#nでも、私にはこれで十分なのですよ。"
1012402-26 = "[s5] \"一応、水着くらい持っておいたら？\"\n[s6] \"予定に隙間ができることだって……。\""
1012402-29 = "……先生。"
1012402-30 = "[s7] \"それに、海辺で活動するんでしょ？\"\n[s8] \"もし制服が濡れでもしたら……！\""
1012402-33 = "はぁ……。"
1012402-34 = "そこまで、私に水着で海辺を満喫して欲しいのですか？"
1012402-35 = "[s9] \"……バレちゃった？\"\n[s10] （心が……読まれてる……！）"
1012402-38 = "生徒が絡むと……顔に出ますね、先生は。"
1012402-43 = "あっ、誤解しないでください。決して嫌なわけではありません。#nむしろ、嬉しいと思っております。"
1012402-44 = "最近気付いたことなのですが、私はこうした自己管理が……少々苦手なようでして。"
1012402-45 = "[s] （自覚はあったんだ……）"
1012402-46 = "それに、「制服が濡れたら困る」という先生の意見も、一理あるかと。"
1012402-47 = "分かりました。"
1012402-48 = "[s] \"ということは……！\""
1012402-51 = "ええ。先生のご厚意を無下にするわけにはいきません。"
1012402-52 = "いつもとは多少異なる服装で業務に臨んでも……問題はないでしょう。"
1012402-53 = "ですが、予定を変更するつもりはありません。"
1012402-54 = "私が抜ければ、誰かが代わりを務めなければなりませんから……。"
1012402-55 = "他の方に負担が掛かるのは、避けたいので。"
1012402-56 = "[s11] \"そこはハスミの判断を尊重するよ。\"\n[s12] \"それはそうと、水着は持ってるの？\""
1012402-59 = "そういえば……サイズが合わなくなっていますね……。"
1012402-60 = "いえ、体重はほとんど変わっていませんからね！？"
1012402-61 = "ただ、この一年で少し成長したと言いますか……。"
1012402-62 = "[s13] \"大丈夫、新しく用意すればいいよ。\"\n[s14] \"よし、今から水着を買いに行こう！\""
1012402-65 = "却下します。"
1012402-66 = "[s] \"あ、午後に予定ある？じゃあ明日なら……。\""
1012402-67 = "却下です。"
1012402-68 = "[s] \"は、ハスミ……？\""
1012402-69 = "一週間……。"
1012402-73 = "……一週間だけ、猶予をください！#n完璧な状態に仕上げてみせます！"
1012402-74 = "[s15] \"す、すごい気迫だ……！\"\n[s16] \"軽い気持ちで買いに行ってもいいんじゃ……？\""
1012402-77 = "準備をするに……越したことはないですから……！"
1012402-78 = "では、また来週。"
1012402-79 = "これで失礼します。"
1012402-84 = "（なにか決心をした様子で、ハスミは去って行った……）"
