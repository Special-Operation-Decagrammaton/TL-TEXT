[translation]
1000903-1 = "美味しいプリン"
1000903-3 = "わあ～！あっちもこっちも食べ物だらけ……！"
1000903-4 = "見渡す限り食べ物しかないよ、先生！もしかしてここが天国かな！？"
1000903-5 = "うわあっ、何から食べよう？……じゅるり。"
1000903-6 = "[s] \"プリンを食べるって言ってなかったっけ？\""
1000903-7 = "あっ！そうだ！プリン！"
1000903-8 = "うーん、他の物も全部美味しそうだけど……。"
1000903-9 = "今日のフェスに出品されてるプリンは、普段はなかなか食べられないすごく貴重なものだし……。"
1000903-10 = "[s] \"そんなにすごいんだ？\""
1000903-11 = "うん！お店自体がキヴォトスの辺境にあるから、まずそのお店の場所にたどり着くのがすごく大変だし、"
1000903-12 = "有名なお店だから、授業が終わってから買いに行っても毎回売り切れなの！"
1000903-13 = "だから今日のチャンスは絶対に逃せない！"
1000903-14 = "[s] \"すごく楽しみにしてたんだね。\""
1000903-15 = "うん、ずっと食べたかったっていうのもあるけど、やっぱり……。"
1000903-16 = "[s] \"やっぱり？\""
1000903-17 = "こうして、先生と食べたくって。"
1000903-18 = "美味しい物は、一緒に食べるともっと美味しくなるでしょ？"
1000903-19 = "[s] \"イズミ、なんて良い子……！\""
1000903-20 = "あははっ。あっ、あそこに並んでるみたい。先生、行こう！"
1000903-23 = "[ns] \"もうだいぶ長蛇の列だね。\""
1000903-24 = "うわっ、どうしよう……このプリンのお店は販売数が決まってるし、もう食べられないかも……。"
1000903-25 = "うう、せっかく先生と一緒に食べる計画が……。"
1000903-26 = "[s] \"イズミ、見て、あの看板。\""
1000903-28 = "「一人二個までの限定販売」？あっ、だったら……。"
1000903-29 = "[s] \"列は長いけど、大丈夫かも。\""
1000903-30 = "よかった！"
1000903-37 = "うう……お願い、プリン残ってて～……！"
1000903-38 = "[s] \"もう少しだね。\""
1000903-39 = "ちょっと、君。"
1000903-41 = "きょろきょろしてる君、そう、限定プリンの列に並んでる君のことだよ。"
1000903-42 = "え？私？"
1000903-43 = "そうだ。もしよかったら吾輩に列を譲ってくれないか？"
1000903-44 = "もし譲ってくれるなら、吾輩からお返しとして、貴重なものを差し上げよう。"
1000903-45 = "ほれ、キヴォトスラーメンの替え玉クーポン1年分だ。決して損な取引では無いと思うが、どうだね？"
1000903-46 = "（えっ！？）"
1000903-47 = "[s] \"イズミ……？\""
1000903-48 = "ち、違うよ先生！私はあんなので釣られたりしな……！"
1000903-49 = "それなら君、こちらのキヴォトスの有名な和菓子屋で使える「あんみつ6か月間無料チケット」はどうだい？"
1000903-50 = "私に列を譲ってくれないか？"
1000903-51 = "君！彼女は吾輩と話しているのだ！"
1000903-52 = "決めるのは彼女だろう？"
1000903-53 = "あ、あうう……替え玉……あんみつ……。"
1000903-54 = "あら、ではどちらも微妙なのであれば、あたしに譲ってくれませんか？このプリン、ずっと食べたいなって思ってたんです！"
1000903-55 = "もしお譲りいただけたら、あたしの会社で作ってるお菓子「キノコとタケノコ」を5年分……！"
1000903-57 = "あ、あうう……！み、みんな私を邪魔しようと……！"
1000903-58 = "先生、どうしよう……！？"
1000903-59 = "[s1] \"イズミが決めていいよ。\"\n[s2] \"どんな選択をしても責めたりしないから。\""
1000903-60 = "わ、私は……！先生と一緒にプリンを食べるために来たから！"
1000903-61 = "わ、私は……！先生と一緒にプリンを食べるために来たから！"
1000903-62 = "全部ダメ！ゆ、誘惑には負けないんだから！！"
1000903-64 = "ふぅ……危ないところだった……。"
1000903-65 = "でも私ずっと、先生とこのプリンを食べたいって思ってたから……。"
1000903-66 = "[s3] \"イズミ、お疲れ様。\"\n[s4] \"イズミがそこまでいうなら、ますます楽しみだね。\""
1000903-67 = "お待たせしました、次のお客様！"
1000903-68 = "お待たせしました、次のお客様！"
1000903-69 = "あっ、私たちの番！"
1000903-72 = "……やっと買えた、限定のウナギゼリープリン！"
1000903-73 = "[s] \"……え？ゼリー……プリン？\""
1000903-74 = "ウナギゼリーのプリンだよ？"
1000903-75 = "ほら先生、見て見て。この黒いツヤと、鼻に来る形容しがたい匂い……すぅー……。"
1000903-76 = "うん、独特で良いね！"
1000903-77 = "[s] \"ま、待ってイズミ、プリンとは聞いたけど、ウナギ……？\""
1000903-78 = "うん、ウナギ！食べたかったんだー！"
1000903-80 = "さあ、先生！先に一口どうぞ！"
1000903-82 = "[s] \"うぐっ……！？この、口の中に広がる……えぐみ！？\""
1000903-83 = "美味しい！？私もいただきまーす、パクっ！うんっ、美味しい！"
1000903-85 = "もっと食べていいよ、先生！まだいっぱいあるから！えへへっ！"
1000903-86 = "[s] \"ちょっ、イズミ、待って……！も、もう大丈夫だから！\""
1000903-88 = "（嬉しそうな顔で突き出してくるイズミに勝てず、結局ウナギゼリープリンは死ぬ気で食べきった）"
