[translation]
1000903-1 = "Pudim delicioso"
1000903-3 = "Uau~! Tem comida por todos os lados...!"
1000903-4 = "Só tem comida até onde a vista alcança, Sensei! Será que isso aqui é o paraíso!?"
1000903-5 = "Uau, por onde eu começo a comer? ...Babando."
1000903-6 = "[s] \"Você não disse que ia comer pudim?\""
1000903-7 = "Ah! É verdade! O pudim!"
1000903-8 = "Hum, as outras coisas também parecem deliciosas, mas..."
1000903-9 = "O pudim que está sendo vendido no festival de hoje é algo muito raro que não dá para comer sempre..."
1000903-10 = "[s] \"É tão incrível assim?\""
1000903-11 = "Sim! A loja fica nos confins de Kivotos, então só de chegar lá já é muito difícil,"
1000903-12 = "e como é uma loja famosa, toda vez que vou comprar depois da aula, já esgotou!"
1000903-13 = "Por isso, não posso perder a chance de hoje de jeito nenhum!"
1000903-14 = "[s] \"Você estava esperando muito por isso, hein.\""
1000903-15 = "Sim, eu queria comer há muito tempo, mas, na verdade..."
1000903-16 = "[s] \"Na verdade?\""
1000903-17 = "É que eu queria comer com você, Sensei."
1000903-18 = "Coisas gostosas ficam ainda mais saborosas quando comemos juntos, não ficam?"
1000903-19 = "[s] \"Izumi, que menina tão boa...!\""
1000903-20 = "Ahaha. Ah, parece que a fila é ali. Vamos, Sensei!"
1000903-23 = "[ns] \"A fila já está bem longa, hein.\""
1000903-24 = "Uau, o que eu faço... Essa loja de pudim tem um limite de vendas, talvez a gente não consiga comer..."
1000903-25 = "Uuu, logo agora que eu planejei comer com o Sensei..."
1000903-26 = "[s] \"Izumi, olha aquela placa.\""
1000903-28 = "\"Venda limitada de dois por pessoa\"? Ah, então..."
1000903-29 = "[s] \"A fila é longa, mas talvez dê certo.\""
1000903-30 = "Que bom!"
1000903-37 = "Uuu... Por favor, que ainda tenha pudim...!"
1000903-38 = "[s] \"Falta pouco.\""
1000903-39 = "Ei, você aí."
1000903-41 = "Você que está olhando para os lados, isso, você mesma na fila do pudim limitado."
1000903-42 = "Eh? Eu?"
1000903-43 = "Isso mesmo. Se não se importar, poderia ceder seu lugar na fila para mim?"
1000903-44 = "Se você ceder, em troca, eu lhe darei algo valioso."
1000903-45 = "Veja, um cupom de refil de macarrão do Ramen de Kivotos válido por 1 ano. Não acho que seja um mau negócio, o que me diz?"
1000903-46 = "(Eh!?)"
1000903-47 = "[s] \"Izumi...?\""
1000903-48 = "N-não é isso, Sensei! Eu não me deixaria levar por uma coisa dessas...!"
1000903-49 = "Então, que tal um \"ticket de 6 meses de anmitsu grátis\" que pode ser usado na famosa loja de doces japoneses de Kivotos?"
1000903-50 = "Poderia ceder seu lugar na fila para mim?"
1000903-51 = "Ei você! Ela está falando comigo!"
1000903-52 = "A decisão é dela, não é?"
1000903-53 = "A-auuu... Refil... Anmitsu..."
1000903-54 = "Ora, se ambos são indecisos, por que não cede para mim? Eu queria comer esse pudim há tanto tempo!"
1000903-55 = "Se você ceder, eu te dou 5 anos de \"Cogumelos e Brotos de Bambu\", o doce que minha empresa fabrica...!"
1000903-57 = "A-auuu...! T-todos estão tentando me atrapalhar...!"
1000903-58 = "Sensei, o que eu faço...!?"
1000903-59 = "[s1] \"Você decide, Izumi.\"\n[s2] \"Não vou te culpar, não importa a sua escolha.\""
1000903-60 = "E-eu...! Eu vim aqui para comer pudim com o Sensei!"
1000903-61 = "E-eu...! Eu vim aqui para comer pudim com o Sensei!"
1000903-62 = "Nada disso! E-eu não vou cair em tentação!!"
1000903-64 = "Ufa... essa foi por pouco..."
1000903-65 = "Mas eu queria muito comer esse pudim com você, Sensei..."
1000903-66 = "[s3] \"Izumi, bom trabalho.\"\n[s4] \"Se você insiste tanto, Izumi, agora estou ainda mais ansioso.\""
1000903-67 = "Obrigada por esperar, próximo cliente!"
1000903-68 = "Obrigada por esperar, próximo cliente!"
1000903-69 = "Ah, é a nossa vez!"
1000903-72 = "...Finalmente consegui comprar, o pudim de geleia de enguia de edição limitada!"
1000903-73 = "[s] \"...Hã? Pudim... de geleia?\""
1000903-74 = "É um pudim de geleia de enguia, sabe?"
1000903-75 = "Olha só, Sensei, veja. Esse brilho negro e esse cheiro indescritível que sobe pelo nariz... snif..."
1000903-76 = "Sim, é bem único, não é?"
1000903-77 = "[s] \"E-espera aí, Izumi, você disse pudim, mas... enguia...?\""
1000903-78 = "Sim, enguia! Eu queria muito comer isso!"
1000903-80 = "Vamos lá, Sensei! Dê a primeira mordida!"
1000903-82 = "[s] \"Ugh...!? Esse... esse amargor que se espalha pela boca...!\""
1000903-83 = "Está gostoso, né!? Vou comer também, nham! Hum, que delícia!"
1000903-85 = "Pode comer mais, Sensei! Ainda tem um monte! Ehehe!"
1000903-86 = "[s] \"Ei, Izumi, espera...! J-já chega, estou satisfeito!\""
1000903-88 = "(Sem conseguir resistir ao rosto feliz da Izumi, acabei comendo todo o pudim de geleia de enguia como se minha vida dependesse disso.)"
