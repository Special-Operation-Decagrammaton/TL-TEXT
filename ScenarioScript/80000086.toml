[translation]
80000086-1 = "Sweet Logistics"
80000086-2 = "（モエの手伝いでRABBIT小隊の補給品を整理している最中……）"
80000086-6 = "（突然の通り雨に遭い、びしょ濡れになってしまった）"
80000086-8 = "子ウサギ公園"
80000086-9 = "はぁ……天気予報では終日晴れって言ってたのにねぇ？"
80000086-10 = "先生のお陰で、武器や弾薬は無事だったけど……"
80000086-11 = "身体の方はびしょびしょだね。しかも、着替えは1枚もないし……。"
80000086-12 = "こんな破滅的な状況も悪くないけど、ちょっと寒いね……。"
80000086-13 = "[s] \"シャーレから体操着でも持ってこようか？\""
80000086-14 = "えぇ……っていうか、その状態で往復したら先生が風邪ひいちゃうでしょ。"
80000086-18 = "とりあえず、たき火で服を乾かさない？"
80000086-19 = "もう日が照り始めてるし、そんなに時間はかからないでしょ。#nちょっと待ってて。"
80000086-21 = "（モエは薪を集めて火を起こし始めた）"
80000086-23 = "はぁ……あったかい……。"
80000086-24 = "生き返ったって感じがするねぇ……。"
80000086-25 = "[ns] \"うん、暖かくて落ち着くね。\""
80000086-27 = "くひっ……くひひひ……。"
80000086-28 = "こうしていると、思い出しちゃう……。"
80000086-29 = "たき火の前でしか味わえない、甘い破滅……。"
80000086-30 = "はぁ、はぁ……どうしよう、先生……。"
80000086-31 = "やっぱり……"
80000086-32 = "我慢できない！"
80000086-35 = "[ns] \"ちょ、ちょっと待って、モエ！一旦ストップ――\""
80000086-39 = "……ん、先生は食べないの？スモア。"
80000086-40 = "[s] \"ス、スモア……？\""
80000086-41 = "うん。せっかくのたき火だし、作ってみるのもいいかなって。"
80000086-42 = "マシュマロを焼くともっちりとした食感と甘さが増して、#n更に美味しくなるんだよ……！"
80000086-43 = "隊員のみんなとキャンプでたき火をした時は、#n昔からよくマシュマロを焼いたりスモアクッキーを食べたりしてたんだ。"
80000086-44 = "でも……こうやって先生と一緒に食べるのも、なかなか悪くないね。"
80000086-45 = "[s] \"お菓子が作りたかっただけだったんだね……。\""
80000086-47 = "[ns] \"でも、これってそんなに破滅的かな？\""
80000086-48 = "くひひ……見て分からない？"
80000086-49 = "焼き菓子の上に、焼きマシュマロを乗せて……さらにそこへ甘～いチョコレートを……。"
80000086-50 = "一口食べるととろけちゃうくらい美味しいけど、そのカロリーは……。"
80000086-51 = "[s] \"……そういうことかぁ……。\""
80000086-52 = "うん、だからダイエット中には絶対NGなデザートってわけ。"
80000086-53 = "けど、この破滅の先でしか得られない快楽も存在する。#nということで――"
80000086-54 = "どう、先生？#nこの「破滅」……私と一緒に、味わってみない？"
80000086-56 = "（モエとたき火を囲み、スモアを仲良く分け合った）"
80000086-57 = "（それは「破滅」という言葉がぴったりなほど、甘くて美味しかった）"
