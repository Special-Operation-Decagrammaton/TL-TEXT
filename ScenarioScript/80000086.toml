[translation]
80000086-1 = "Logística Doce"
80000086-2 = "（No meio de ajudar Moe a organizar os suprimentos do Esquadrão RABBIT...）"
80000086-6 = "（Fomos pegos por uma chuva repentina e ficamos encharcados）"
80000086-8 = "Parque dos Coelhinhos"
80000086-9 = "Ah... a previsão do tempo disse que faria sol o dia todo, não disse?"
80000086-10 = "Graças ao Sensei, as armas e munições estão seguras, mas..."
80000086-11 = "Nós estamos encharcados. E não temos nenhuma muda de roupa..."
80000086-12 = "Uma situação tão catastrófica não é ruim, mas está um pouco frio..."
80000086-13 = "[s] \"Quer que eu vá buscar um uniforme de ginástica no Schale?\""
80000086-14 = "Ah... quer dizer, se você for e voltar nesse estado, Sensei, vai acabar pegando um resfriado."
80000086-18 = "Por enquanto, que tal secarmos as roupas na fogueira?"
80000086-19 = "O sol já está começando a sair, então não deve demorar muito. #nEspere um pouco."
80000086-21 = "（Moe juntou lenha e começou a acender uma fogueira）"
80000086-23 = "Ah... que quentinho..."
80000086-24 = "Sinto que estou voltando à vida..."
80000086-25 = "[ns] \"Sim, é quente e relaxante.\""
80000086-27 = "Hehe... hehehe..."
80000086-28 = "Estando assim, eu me lembro..."
80000086-29 = "Da doce ruína que só se pode provar na frente de uma fogueira."
80000086-30 = "Ah, ah... o que eu faço, Sensei..."
80000086-31 = "Definitivamente..."
80000086-32 = "Eu não consigo aguentar!"
80000086-35 = "[ns] \"E-espera um pouco, Moe! Pare por um instante--\""
80000086-39 = "...Hm, Sensei não vai comer? S'mores."
80000086-40 = "[s] \"S-S'mores...?\""
80000086-41 = "Sim. Já que estamos com uma fogueira, pensei que seria bom fazer alguns."
80000086-42 = "Assar o marshmallow deixa ele com uma textura macia e aumenta a doçura, #nficando ainda mais gostoso...!"
80000086-43 = "Quando eu fazia fogueiras no acampamento com o pessoal do esquadrão, #nnós sempre assávamos marshmallows e comíamos biscoitos de S'mores."
80000086-44 = "Mas... comer assim com o Sensei também não é nada mal."
80000086-45 = "[s] \"Então você só queria fazer doces...\""
80000086-47 = "[ns] \"Mas isso é tão catastrófico assim?\""
80000086-48 = "Hehehe... não consegue ver?"
80000086-49 = "Colocar um marshmallow assado sobre um biscoito assado... e então adicionar um chocolate bem doce..."
80000086-50 = "É tão delicioso que derrete na boca, mas as calorias..."
80000086-51 = "[s] \"...Entendi agora...\""
80000086-52 = "Sim, por isso é uma sobremesa proibida para quem está de dieta."
80000086-53 = "Mas existe um prazer que só pode ser obtido após essa ruína. #nSendo assim--"
80000086-54 = "O que acha, Sensei? #nEssa \"ruína\"... quer provar comigo?"
80000086-56 = "（Sentado ao redor da fogueira com Moe, dividimos os S'mores）"
80000086-57 = "（Era tão doce e delicioso que a palavra \"ruína\" combinava perfeitamente）"
