[translation]
1010503-1 = "マリー親衛隊"
1010503-2 = "（マリーの話が気になり、トリニティへ向かった）"
1010503-4 = "先生……？"
1010503-5 = "[s1] \"……マリー？\"\n[s2] 声がしたほうに振り向く。"
1010503-10 = "[ns3] \"···…マリー！？\"\n[ns4] \"後ろの人は……？\""
1010503-13 = "えっと、私もお名前は知らないのですが……。"
1010503-14 = "よく応援に来てくださる方なんです。"
1010503-15 = "ただ、なぜかプラカードを使った筆談しかされず……。"
1010503-16 = "「どちら様でしょう？」"
1010503-17 = "[s5] \"私はシャーレの先生です。\"\n[s6] \"マリーの応援に来ました。\""
1010503-20 = "「理解しました」"
1010503-21 = "「応援お願いいたします」"
1010503-22 = "「ここはお任せしました」"
1010503-23 = "「応援しております！」"
1010503-32 = "あっ、行ってしまいましたね。"
1010503-33 = "……悪い人ではないようなので、心配はいりませんよ。"
1010503-34 = "サクラコ様とミネ団長も、ご存知ですから。"
1010503-35 = "と言いますか、#nどうやらサクラコ様の指示で私の護衛をしているのだとか……。"
1010503-39 = "もしかしたら、シスターフッドの方なのかもしれませんね。"
1010503-40 = "[s7] \"……お疲れ様、マリー。\"\n[s8] \"何となく分かったよ……。\""
1010503-43 = "大丈夫だと申し上げたのですが、皆さん心配性で。"
1010503-44 = "何も、ここまで過保護に扱われずとも……。"
1010503-45 = "それより先生、今日はどうされました？"
1010503-46 = "……えっ？"
1010503-47 = "私のことが心配で……？"
1010503-48 = "……。"
1010503-49 = "[s9] \"ご、ごめん……。\"\n[s10] \"つい気になっちゃって。\""
1010503-52 = "……ふぅ。"
1010503-53 = "たしかに、私は至らない点も多いかもしれませんが……。"
1010503-54 = "そんなに頼りないのでしょうか……？"
1010503-55 = "……そうではない、と？"
1010503-56 = "ですが……。"
1010503-57 = "[s11] \"マリーの人望じゃないかな。\"\n[s12] \"マリーのことが大事だからだよ。\""
1010503-60 = "先生……。"
1010503-61 = "……そのお気持ちは嬉しいのですが、#nやはり私には頼りがいがないのでしょうね。"
1010503-62 = "あっ、そろそろ時間が……。"
1010503-63 = "……いえ、リハーサルは先ほど無事に終了しました。"
1010503-64 = "お二人は、先にお帰りになられましたが……。"
1010503-65 = "その、顔合わせと言えば良いのでしょうか？"
1010503-66 = "聖堂をよく訪れてくださる方々に、お話の機会が欲しいと言われまして。"
1010503-67 = "少し恥ずかしいのですが……アイドル衣装を見てみたい、と。"
1010503-68 = "[s13] \"ファンミーティングかな？\"\n[s14] \"マリーはみんなのアイドルだもんね。\""
1010503-71 = "か、からかわないでください、先生！"
1010503-72 = "……日頃お世話になっている方々に、ご挨拶をするだけです。"
1010503-73 = "それに、そういうのはお二人のほうが……。"
1010503-74 = "……あれ。"
1010503-75 = "たしか、着ぐるみの方が同行してくださると仰っていたような……。"
1010503-76 = "[s15] \"それじゃあ、私が一緒に行くよ。\"\n[s16] \"私に任せてくれたんじゃないかな？\""
1010503-79 = "せ、先生が！？"
1010503-80 = "えっと……。"
1010503-81 = "それは、つまり……。"
1010503-82 = "……先生が私をエスコートしてくださる、と。"
1010503-83 = "ほ、本当に良いのでしょうか……。"
1010503-87 = "……ふぅ。"
1010503-88 = "お、お願いいたします……先生。"
1010503-90 = "(その後、マリーを「エスコート」しながら移動した)"
1010503-94 = "（あまりの人の多さに、マリーは驚いた）"
