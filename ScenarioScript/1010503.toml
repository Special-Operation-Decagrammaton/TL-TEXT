[translation]
1010503-1 = "Maria SS"

1010503-2 = "(Eu estava curioso sobre a história de Marie, então fui para Trinity)"

1010503-4 = "Sensei……?"

1010503-5 = "[s1] \"...Marie?\"\n[s2] Me virei em direção à voz."

1010503-10 = "[ns3] \"···...Marie!?\"\n[ns4] \"Quem está atrás de você...?\""

1010503-13 = "Bem, eu também não sei seu nome..."

1010503-14 = "Ele é alguém que muitas vezes vem me apoiar."

1010503-15 = "No entanto, por alguma razão, só conseguimos nos comunicar por escrito usando cartazes..."

1010503-16 = "“Qual você gostaria?”"

1010503-17 = "[s5] \"Sou o Sensei da placa de Petri.\"\n[s6] \"Estou aqui para apoiar Marie.\""

1010503-20 = "\"entendido\""

1010503-21 = "“Obrigado pelo seu apoio.”"

1010503-22 = "\"Vou deixar isso para você.\""

1010503-23 = "\"Estamos torcendo por você!\""

1010503-32 = "Ah, eu fui embora."

1010503-33 = "...Não parece que ele seja uma pessoa má, então não precisa se preocupar."

1010503-34 = "Sakurako-sama e Capitão Mine também sabem."

1010503-35 = "Ou devo dizer, #nAparentemente, ela está agindo como minha acompanhante sob as instruções de Sakurako-sama..."

1010503-39 = "Talvez seja a Irmandade."

1010503-40 = "[s7] \"...Obrigado pelo seu trabalho duro, Marie.\"\n[s8] \"Eu meio que entendo...\""

1010503-43 = "Eu disse a eles que estava bem, mas todos estavam preocupados."

1010503-44 = "Não preciso ser tratado de forma tão superprotetora..."

1010503-45 = "A propósito, Sensei, como você se saiu hoje?"

1010503-46 = "...Eh?"

1010503-47 = "Você está preocupado comigo...?"

1010503-48 = "……."

1010503-49 = "[s9] \"Sinto muito...\"\n[s10] \"Fiquei curioso.\""

1010503-52 = "... Ufa."

1010503-53 = "Reconheço que pode haver muitas coisas que me faltam, mas..."

1010503-54 = "É realmente tão pouco confiável...?"

1010503-55 = "...Não é mesmo?"

1010503-56 = "Mas...."

1010503-57 = "[s11] \"Acho que é a popularidade de Marie.\"\n[s12] \"É porque Marie é importante.\""

1010503-60 = "Sensei……."

1010503-61 = "...Fico feliz em ouvir isso, mas acho que não sou confiável, afinal."

1010503-62 = "Ah, está quase na hora...."

1010503-63 = "...Não, o ensaio terminou com sucesso há algum tempo."

1010503-64 = "Vocês dois foram para casa primeiro, mas..."

1010503-65 = "Posso chamar isso de reunião cara a cara?"

1010503-66 = "Pediram-me que tivesse a oportunidade de conversar com algumas pessoas que visitam frequentemente a catedral."

1010503-67 = "Estou um pouco envergonhado, mas... quero ver a fantasia do ídolo."

1010503-68 = "[s13] \"É um fanmeeting?\"\n[s14] \"Marie é o ídolo de todos.\""

1010503-71 = "Ou não zombe de mim, senhor!"

1010503-72 = "...Só quero cumprimentar as pessoas que cuidam de mim diariamente."

1010503-73 = "Além disso, é melhor para vocês dois..."

1010503-74 = "...Que."

1010503-75 = "Se bem me lembro, ele disse que alguém fantasiado iria acompanhá-lo..."

1010503-76 = "[s15] \"Então eu irei com você.\"\n[s16] \"Acho que você deixou isso comigo.\""

1010503-79 = "Ah, Senseia! ?"

1010503-80 = "Bem..."

1010503-81 = "Isso significa..."

1010503-82 = "...Meu Sensei irá me acompanhar."

1010503-83 = "É realmente tão bom?"

1010503-87 = "... Ufa."

1010503-88 = "Ah, por favor... Sensei."

1010503-90 = "(Então ele se mudou enquanto \"acompanhava\" Marie)"

1010503-94 = "(Marie ficou surpresa com quantas pessoas havia.)"

