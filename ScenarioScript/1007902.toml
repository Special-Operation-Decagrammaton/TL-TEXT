[translation]
1007902-1 = "ビリビリ"
1007902-2 = "（[ruby=みさか]御坂[/ruby]から連絡をもらい、商店街にやって来た）"
1007902-7 = "（……何やら、色々な商品を見比べているようだ）"
1007902-11 = "…………。"
1007902-15 = "……あ、先生。#nこっちこっち。"
1007902-16 = "……ん？いや、別に電気屋さんに用事があったわけじゃないけど？"
1007902-17 = "なんとなくぶらぶらしてるだけよ。"
1007902-18 = "それにしても……案外、見てるだけでも楽しいわね。"
1007902-19 = "見た目は似てるんだけど、よく見たら細かいところが違ってて。"
1007902-20 = "ここに並んでる家電も、みんな初めて見るメーカーだし。"
1007902-21 = "けど、たぶん原理や設計に違いは無さそう。"
1007902-22 = "[s1] \"外国に来たような気分なのかな……。\"\n[s2] \"もう完全に観光客だね。\""
1007902-25 = "ふふっ。でも言葉は通じるんだから、本当に不思議よね。"
1007902-26 = "……ん？"
1007902-27 = "どうして構造が分かるのかって？#nああ、それは私の能力のおかげ。"
1007902-28 = "わざわざ分解しなくても、電気の流れを感じ取れば分かるのよ。"
1007902-29 = "……まあ、今はそれも制限されてるんだけど。"
1007902-34 = "ちょっとね……#n能力を使おうとすると頭がクラクラするっていうか、集中できないっていうか……"
1007902-35 = "こっちに来てから、ずっとなのよね。#n違う世界だからなのかな……"
1007902-36 = "あ、病気とか体調不良ってわけじゃないし大丈夫よ。#nただ、ちょっと調子が出なくて。"
1007902-37 = "能力を使おうとしても、うまく回路が繋がらないってだけで、先生が心配するほどのことじゃないわ。"
1007902-38 = "でも、うーん……"
1007902-39 = "今まで当たり前だった力が使えないのは、ちょっと不便ね。"
1007902-40 = "普段から、いろんなところで無意識に使ってたからなぁ……"
1007902-44 = "[ns3] \"何か力になれないかな……？\"\n[ns4] \"逆に能力があるから出来なかった事ができるかも？\""
1007902-47 = "ふふっ、ありがとう。#nでも、そこまで落ち込んでるわけじゃないから、安心してちょうだい。"
1007902-48 = "……ま、先生がそう言うんなら、考えてみようかしら。"
1007902-49 = "能力があったから出来なかったことね……"
1007902-50 = "うーん、電気のせいでかぁ……電気、電気……"
1007902-51 = "……あっ。"
1007902-55 = "もしかして……？"
1007902-56 = "たぶん、今なら……？"
1007902-57 = "[s5] \"……もしかして？\"\n[s6] \"何か思いついた？\""
1007902-60 = "せ、先生！ち、ちょっと待ってて！"
1007902-61 = "試してみたいことがあるの！すぐ戻るから！"
1007902-66 = "[ns] 御坂を待つ。"
1007902-68 = "（いくら待ってみても帰ってこないので、御坂を探すことにした）"
1007902-69 = "（御坂が向かった方面の路地裏で、彼女は落ち込んだ様子で座り込んでいた）"
1007902-77 = "[ns7] \"……御坂？\"\n[ns8] \"何があったの？\""
1007902-80 = "…………。"
1007902-84 = "[ns9] \"……猫？\"\n[ns10] \"この鳴き声は……。\""
1007902-87 = "はぁ……もしかしたら、と思ったんだけどね。#nちょっと力が弱まったくらいじゃ無理だったわ。"
1007902-88 = "……あ、悪かったわね、先生。#n急に飛び出しちゃって。"
1007902-89 = "私、能力で微弱な電磁波を常に放ってるから、動物には避けられちゃうのよ。"
1007902-90 = "弱体化した今なら、大丈夫かなと思ったんだけど……"
1007902-91 = "やっぱり、ダメみたいね。"
1007902-92 = "……はぁ。"
1007902-93 = "これじゃ、何も良い事なんて……"
1007902-94 = "…………。"
1007902-95 = "……ん？"
1007902-96 = "野良猫だから、逃げられたのかもって？"
1007902-97 = "そうね……電磁波は弱まってるし、警戒心が薄い子なら。"
1007902-104 = "……いけるかしら？"
1007902-105 = "[s11] \"確証はないけど……。\"\n[s12] \"試してみる価値はあるんじゃない……？\""
1007902-108 = "……それもそうね。"
1007902-109 = "よし！試さないで諦めるなんて、私らしくないわ！"
1007902-110 = "先生、どこか良いところ知らない？#nペットショップでも猫カフェでも大丈夫よ！"
1007902-111 = "案内してちょうだい、先生！"
1007902-113 = "（その後、期待に満ちた表情の御坂と一緒に、近くのペットショップや猫カフェを巡ったが……）"
1007902-124 = "（残念ながら、結果は同じだった）"
