[translation]
31010-1 = "Episódio 1: Prólogo"
31010-3 = "……Em suma. O Tratado de Eden é uma promessa de que \"vamos parar de nos odiar\"."
31010-4 = "Uma relação de hostilidade, quase um rancor, que existiu por muito tempo entre Trinity e Gehenna. É uma tentativa de colocar um ponto final nisso."
31010-5 = "Um processo para começar a construir uma nova confiança, substituindo o ódio que, por não conseguirem confiar um no outro, só pôde se acumular ao longo do tempo."
31010-6 = "Quer que eu simplifique? Em resumo, é um tratado de paz entre Gehenna e Trinity."
31010-7 = "No entanto, com o desaparecimento da Presidente do Conselho Estudantil Federal, este tratado perdeu todo o seu significado."
31010-8 = "“Eden”... esse é o nome do paraíso que aparece nas escrituras antigas. Não sei que tipo de significado ela colocou nisso, mas bem, deve ser o mau gosto de sempre da Presidente do Conselho Estudantil Federal."
31010-10 = "Você conhece os “Sete Antigos Preceitos” de Kivotos?"
31010-11 = "O quinto deles era justamente uma pergunta sobre o “Paraíso”."
31010-12 = "“É possível provar a verdade daqueles que alcançaram o paraíso?”"
31010-13 = "Assim como os outros preceitos, é uma sequência de palavras um tanto difícil de entender. Mas, como uma interpretação, pode-se ver isso como um “paradoxo sobre a prova da existência do paraíso”."
31010-14 = "Se o paraíso existe, aquele que o alcançou, por sentir a suprema satisfação e alegria, nunca sairá de lá."
31010-15 = "Se ele saiu do paraíso, significa que aquele lugar não era um “paraíso verdadeiro” capaz de proporcionar o prazer absoluto."
31010-16 = "Sendo assim, alguém que alcançou o paraíso nunca será observado fora dele. É impossível que sua existência seja capturada."
31010-19 = "É possível provar a verdade de alguém que não existe?"
31010-20 = "No fim das contas... este quinto preceito é uma “pergunta enigmática” sobre algo que, desde o início, não pode ser provado."
31010-21 = "Mas, ao mesmo tempo, penso em algo. Será que uma verdade que não pode ser provada não tem valor? Através deste texto que beira o cinismo, não haveria algo que se deseja perguntar de verdade?"
31010-22 = "Eden... o paraíso que aparece nas escrituras. Um lugar que não existe em lugar algum e que é impossível de encontrar."
31010-25 = "Uma imagem ilusória, doce, doce, pintada por sonhadores."
31010-26 = "O que acha? Ouvindo dessa forma, não parece que este próprio “Tratado de Eden” é exatamente algo assim?"
31010-28 = "……Sensei."
31010-29 = "Talvez a história que vai começar agora não seja adequada, ou não combine com alguém como você."
31010-30 = "Algo desagradável, desconfortável, abominável, que faz franzir a testa..."
31010-31 = "Algo que faz duvidar do próximo, duvidar das premissas, duvidar das suposições, duvidar da verdade..."
31010-32 = "Algo triste, doloroso, melancólico... e que, além de tudo, deixa um gosto amargo... é uma história assim."
31010-33 = "Mas, ao mesmo tempo, é também uma história de uma verdade inegável."
31010-34 = "Por favor, não vire as costas, não desvie o olhar... até o último momento, quero que observe atentamente."
31010-38 = "Essa é a sua obrigação, Sensei... você que escolheu “o que vem a seguir”."
31010-51 = "Capítulo do Tratado de Eden"
