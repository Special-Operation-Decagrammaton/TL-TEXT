[translation]
31010-1 = "Episódio 1;Prólogo"
31010-3 = "……No fim das contas. O Tratado do Éden é uma promessa: \"chega de nos odiarmos\"."
31010-4 = "A relação de hostilidade, quase uma rixa, que por longo tempo existiu entre Trinity e Gehenna. Algo que busca pôr um ponto final nisso."
31010-5 = "Um processo que, por elas não conseguirem confiar uma na outra e só acumularem ódio eternamente, tenta, em vez disso, começar a construir uma nova confiança."
31010-6 = "Dizendo de forma mais simples: é, em suma, um tratado de paz entre Gehenna e Trinity."
31010-7 = "Só que, com o desaparecimento da presidente do Conselho Estudantil Geral como estopim, este tratado perdeu todo e qualquer sentido."
31010-8 = "\"Éden\"…… é o nome do paraíso que aparece nas escrituras antigas. Que sentido ela pôs nisso, eu não sei; mas, bom, deve ser mais um daqueles gostos duvidosos de sempre da presidente do Conselho Estudantil Geral."
31010-10 = "Você conhece as \"sete regras antigas\" de Kivotos?"
31010-11 = "A quinta delas era justamente uma pergunta sobre o \"paraíso\"."
31010-12 = "\"É possível provar a verdade daquele que chegou ao paraíso?\""
31010-13 = "Assim como as outras regras antigas, é um amontoado de palavras um tanto difíceis de compreender. Mas, como uma interpretação, dá pra vê-la como um \"paradoxo sobre a prova da existência do paraíso\"."
31010-14 = "Se um paraíso de fato existe, aquele que a ele chegou, por sentir a mais suprema satisfação e alegria, jamais sairá para fora do paraíso, por toda a eternidade."
31010-15 = "E se saiu para fora do paraíso, então aquele lugar não era o \"verdadeiro paraíso\", onde se obtém o deleite supremo."
31010-16 = "Sendo assim, aquele que alcançou o paraíso jamais será observado fora dele. É impossível que a sua existência seja captada."
31010-19 = "É possível provar a verdade de alguém que não existe?"
31010-20 = "No fim das contas…… esta quinta regra antiga é uma \"pergunta indecifrável\" sobre algo que, desde o começo, não se pode provar."
31010-21 = "Mas, ao mesmo tempo, uma coisa me ocorre. Será que uma verdade que não se pode provar é destituída de valor? Através desta frase, quase um escárnio, não haverá algo que ela de fato quer perguntar?"
31010-22 = "Éden…… o paraíso que aparece nas escrituras. Um lugar que não existe em parte alguma, que não se pode sequer procurar."
31010-25 = "Uma imagem ilusória, doce, doce, que os sonhadores pintam."
31010-26 = "E aí? Ouvindo assim, este próprio \"Tratado do Éden\" não começa a parecer justamente uma coisa dessas?"
31010-28 = "……Sensei."
31010-29 = "Talvez a história que está prestes a começar não sirva para alguém como você, seja uma história que não lhe assente."
31010-30 = "Desagradável, incômoda, abominável, de fazer franzir a testa……"
31010-31 = "De duvidar do outro, duvidar das premissas, duvidar das próprias certezas, duvidar da verdade……"
31010-32 = "Triste, penosa, de dar melancolia…… e que, ainda por cima, deixa só um gosto amargo no fim…… é uma história assim."
31010-33 = "Mas, ao mesmo tempo, é também uma história de uma verdade inegável."
31010-34 = "Por favor, não vire as costas, não desvie o olhar…… até o último instante, observe com atenção."
31010-38 = "Isso, Sensei…… é o dever de você, que escolheu \"seguir em frente\"."
31010-51 = "Arco do Tratado do Éden"
