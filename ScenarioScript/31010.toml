[translation]
31010-1 = "Episódio 1: Prólogo"
31010-3 = "……Resumindo. O Tratado de Eden é, basicamente, um acordo que diz: «Vamos parar de se odiar»."
31010-4 = "É o ponto final que se tenta colocar numa rivalidade quase ancestral entre Trinity e Gehenna."
31010-5 = "É o processo de construir uma nova confiança no lugar do ódio que se acumulou por tanto tempo, justamente porque nenhum dos dois lados conseguia confiar no outro."
31010-6 = "Pra falar de um jeito mais simples: é um tratado de paz entre Gehenna e Trinity."
31010-7 = "Só que, depois do desaparecimento da presidente do Conselho Estudantil Geral, esse tratado perdeu completamente o sentido."
31010-8 = "「Eden»… o nome do paraíso que aparece nos textos antigos. Não sei que significado ela quis dar a isso, mas deve ser mais um dos gostos duvidosos dela."
31010-10 = "Você conhece as «Sete Leis Antigas» de Kivotos?"
31010-11 = "A quinta delas era justamente uma pergunta sobre o «Paraíso»."
31010-12 = "「É possível provar a verdade daquele que chegou ao Paraíso?」"
31010-13 = "Como as outras leis antigas, é uma sequência de palavras de difícil compreensão. Mas uma interpretação possível é vê-la como um «paradoxo sobre a prova da existência do Paraíso»."
31010-14 = "Se o Paraíso realmente existe, quem chega lá sentiria uma satisfação e alegria supremas, e por isso nunca mais sairia de lá."
31010-15 = "Se alguém saiu do Paraíso, então aquele lugar não era o verdadeiro Paraíso, capaz de proporcionar prazer absoluto."
31010-16 = "Portanto, quem chega ao Paraíso nunca pode ser observado de fora. Sua existência não pode ser capturada."
31010-19 = "É possível provar a verdade de alguém que não existe?"
31010-20 = "No fim… essa quinta lei antiga é, desde o começo, uma «pergunta impossível» sobre algo que não pode ser provado."
31010-21 = "No entanto, ao mesmo tempo, surge uma reflexão. Uma verdade que não pode ser provada seria sem valor? Será que, através dessa escrita quase sarcástica, não há algo que ela realmente queria perguntar?"
31010-22 = "Eden… o Paraíso dos textos sagrados. Um lugar que não existe em lugar nenhum e que ninguém consegue encontrar."
31010-25 = "A doce e ilusória imagem sonhada por idealistas."
31010-26 = "O que acha? Quando a gente pensa assim, não parece que o próprio «Tratado de Eden» é exatamente isso?"
31010-28 = "……Sensei."
31010-29 = "Talvez a história que vai começar agora não seja adequada pra alguém como você."
31010-30 = "Uma história desagradável, desconfortável, repulsiva, que faz a gente franzir a testa…"
31010-31 = "Uma história que faz a gente duvidar dos outros, duvidar das premissas, duvidar das próprias convicções, duvidar da verdade…"
31010-32 = "Uma história triste, dolorosa, deprimente… e que deixa um gosto amargo na boca."
31010-33 = "Mas, ao mesmo tempo, é uma história de verdades inegáveis."
31010-34 = "Por favor, não vire as costas, não feche os olhos… até o último momento, assista com atenção."
31010-38 = "Essa é a obrigação de quem… escolheu seguir em frente."
31010-51 = "Arco: Tratado de Eden"