[translation]
1000503-1 = "怠け者の朝"
1000503-2 = "対策委員会・教室"
1000503-3 = "（ホシノを探しに来たけど、誰もいなかった）"
1000503-4 = "ふにゃ……くぅ……。"
1000503-5 = "（隣の教室から声が聞こえる）"
1000503-6 = "[s] 隣の教室に行ってみる。"
1000503-8 = "アビドス高等学校・教室"
1000503-9 = "…………。"
1000503-10 = "…………ふにゃ、くぅ。"
1000503-11 = "（机を一か所に集めて作った簡易ベッドの上で、ホシノが横になっている）"
1000503-12 = "[s] 肩を揺らしてみる。"
1000503-15 = "……う、うん？"
1000503-18 = "わ、わあっ？！ビックリした！"
1000503-19 = "先生？急にどうしたの？"
1000503-20 = "[s] 事情を説明する。"
1000503-21 = "……私のメールを見て助けにきた？"
1000503-22 = "……うへ。そうだったっけ？寝ぼけてたかも、ごめんごめん。"
1000503-23 = "何とか起きて登校はしたんだけど、その後はあまり記憶にない……。"
1000503-24 = "気が付けばこんなところで眠ってたってことか。うへ、これまたすごいな。"
1000503-25 = "心配で来てくれて、そんなセリフを聞く時が来るなんて。おじさん感激だ～。"
1000503-26 = "来たついでに宝探しでもする、先生？"
1000503-27 = "ほら、遠慮しないで。今日はグラウンド側の雑草の中を探してみよう！"
1000503-29 = "（その後グラウンドの雑草の山を3時間も探してみたけど、これといった成果はなかった）"
1000503-30 = "（ホコリまみれになったまま見送るホシノを後に、シャーレへと帰った）"
