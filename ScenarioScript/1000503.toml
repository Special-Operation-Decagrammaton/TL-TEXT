[translation]
1000503-1 = "A manhã da preguiçosa"
1000503-2 = "Sala do Comitê de Contramedidas"
1000503-3 = "（Vim procurar a Hoshino, mas não tem ninguém aqui）"
1000503-4 = "Funya... kuu..."
1000503-5 = "（Ouço uma voz vindo da sala ao lado）"
1000503-6 = "[s] Ir até a sala ao lado."
1000503-8 = "Escola Secundária Abydos - Sala de Aula"
1000503-9 = "............"
1000503-10 = "............funya, kuu."
1000503-11 = "（Hoshino está deitada em uma cama improvisada feita com mesas juntas）"
1000503-12 = "[s] Sacudir o ombro dela."
1000503-15 = "......Uhn, hã?"
1000503-18 = "U-uau?! Que susto!"
1000503-19 = "Sensei? O que houve de repente?"
1000503-20 = "[s] Explicar a situação."
1000503-21 = "......Você veio me ajudar por causa do meu e-mail?"
1000503-22 = "......Uhe. Foi isso? Acho que eu estava sonhando acordada, desculpa, desculpa."
1000503-23 = "Eu consegui acordar e vir para a escola, mas depois disso não me lembro de muita coisa..."
1000503-24 = "Então eu acabei dormindo aqui sem perceber. Uhe, essa foi boa."
1000503-25 = "Fico feliz que tenha vindo por preocupação e que eu tenha ouvido essas palavras. O tio aqui está emocionado~."
1000503-26 = "Já que você veio, quer procurar um tesouro, Sensei?"
1000503-27 = "Vamos, não seja tímido. Hoje vamos procurar no meio do mato perto do campo!"
1000503-29 = "（Depois disso, passamos 3 horas procurando no meio do mato do campo, mas não encontramos nada de especial）"
1000503-30 = "（Deixei a Hoshino para trás, que se despedia toda coberta de poeira, e voltei para o Schale）"
