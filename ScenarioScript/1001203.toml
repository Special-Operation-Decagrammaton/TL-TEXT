[translation]
1001203-1 = "トレーナーと共に"
1001203-2 = "ミレニアム周辺のショッピングモール"
1001203-4 = "（寝坊してしまい、スミレとの約束の時間に30分ほど遅れてしまった）"
1001203-5 = "[s] スミレを探す。"
1001203-6 = "（この辺で会う予定だったのに、スミレが見当たらない）"
1001203-7 = "[s] \"……ん？\""
1001203-13 = "ふっ、ふっ……。"
1001203-14 = "あっ、トレーナー！"
1001203-15 = "お待ちしておりました。"
1001203-16 = "[s] \"遅れてごめんね。\""
1001203-17 = "大丈夫です、トレーナー。"
1001203-18 = "ちょうどこのお出かけのこともあって、今日は運動量が足りなくなりそうだなという懸念がありましたので。"
1001203-19 = "空いた時間で、少しスクワットをしていました。"
1001203-20 = "やっぱりスクワットって、いい運動になりますね。"
1001203-21 = "少しやっただけなのですが、もう下半身の筋肉がパンパンで、"
1001203-22 = "[s] \"えっと、周りの人のこととかは気にならないの？\""
1001203-23 = "だいぶ張っている感じが……はい？"
1001203-24 = "あ…………。"
1001203-25 = "……ああああっっっ！！！"
1001203-28 = "[s] \"ス、スミレ！\""
1001203-29 = "（スミレが消えていった方向に向かう）"
1001203-31 = "う、うううう……。"
1001203-32 = "す、すみません。トレーナー。"
1001203-33 = "待っている間に何をしようかと考えていたのですが、"
1001203-34 = "そうだ、スクワットをやろうと思い当たりまして。"
1001203-35 = "少しだけのつもりが、夢中になってしまっていました……。"
1001203-36 = "も、もし、その……。"
1001203-37 = "トレーナーが、私と一緒にいるのは恥ずかしいと感じるようでしたら……。"
1001203-38 = "[s1] \"ううん、そんなことないよ。\"\n[s2] \"頑張って運動してる姿は、素敵だと思うよ。\""
1001203-39 = "……優しいお言葉、ありがとうございます。"
1001203-40 = "……優しいお言葉、ありがとうございます。"
1001203-41 = "ですが、今後もし私のことで気になるようなことがあったら、"
1001203-42 = "ぜひ言っていただきたいです。"
1001203-43 = "私の筋肉も、もちろん大事ですが。"
1001203-44 = "それよりもトレーナーのことの方が、もっと……。"
1001203-45 = "……。"
1001203-46 = "[s] \"？\""
1001203-47 = "ち、違います！何でもありません！"
1001203-48 = "そ、それでは！プロテインを買いに行きましょうか！？"
1001203-49 = "さあ行きましょう！"
1001203-52 = "（なんだか気恥ずかしそうなスミレと一緒にショッピングをして、プロテインを買った）"
1001203-54 = "ミレニアム・近郊街"
1001203-55 = "今日はありがとうございました、トレーナー。"
1001203-56 = "おかげさまで、良い商品が買えました。"
1001203-57 = "特に、大特価セールで残り少なかったプロテインを遠くから見つけた瞬間、"
1001203-58 = "一瞬でショッピングモールの人波をかき分けて、残っていたプロテインを素早く手に取ったトレーナーの姿。"
1001203-59 = "あれは、判断力と行動力溢れる、真にカッコいい大人という感じでした。"
1001203-60 = "あのトレーナーの姿に、いったい何を買ったのかとざわつく周りの反応も面白かったですね。"
1001203-61 = "私にはあんな動きはできませんでした。"
1001203-62 = "[s3] \"あはは、恥ずかしいな。\"\n[s4] 思いっきり威張る。"
1001203-63 = "ふふっ、トレーナーは本当に面白い方ですね。"
1001203-64 = "ふふっ、トレーナーは本当に面白い方ですね。"
1001203-65 = "とりあえず、これぐらい買えれば十分だと思います。"
1001203-66 = "はい？プロテイン、買いすぎじゃないか、ですか？"
1001203-67 = "プロテインは思ったよりも、早くなくなるものですので。"
1001203-68 = "それに……。"
1001203-69 = "近いうちに、必要になる方がいると思いますし。"
1001203-70 = "うん？誰のこと、ですか？"
1001203-71 = "それは秘密です。"
1001203-72 = "多分、すぐに分かると思います。ふふっ。"
1001203-73 = "それでは私はそろそろ帰ります。"
1001203-74 = "気をつけて帰ってくださいね、トレーナー。"
1001203-77 = "（スミレが言った「誰か」は誰のことだろうと思いながら家に帰った）"
