[translation]
1001203-1 = "Com o Treinador"
1001203-2 = "Shopping center perto de Millennium"
1001203-4 = "（Acabei dormindo demais e me atrasei cerca de 30 minutos para o encontro com Sumire）"
1001203-5 = "[s] Procurar por Sumire."
1001203-6 = "（Deveríamos nos encontrar por aqui, mas não consigo ver a Sumire）"
1001203-7 = "[s] \"...Hm?\""
1001203-13 = "Huf, huf..."
1001203-14 = "Ah, Treinador!"
1001203-15 = "Eu estava esperando por você."
1001203-16 = "[s] \"Desculpe pelo atraso.\""
1001203-17 = "Não tem problema, Treinador."
1001203-18 = "Como íamos sair hoje, eu estava preocupada que meu volume de exercícios ficasse abaixo do ideal."
1001203-19 = "Então, aproveitei o tempo livre para fazer alguns agachamentos."
1001203-20 = "Agachamentos são realmente um ótimo exercício, não são?"
1001203-21 = "Fiz apenas um pouco, mas os músculos das minhas pernas já estão super inchados..."
1001203-22 = "[s] \"Err, você não se importa com as pessoas ao redor?\""
1001203-23 = "Sinto que estão bem tensionados... Hein?"
1001203-24 = "Ah..."
1001203-25 = "...Aaaaaah!!!"
1001203-28 = "[s] \"S-Sumire!\""
1001203-29 = "（Vou na direção para onde Sumire fugiu）"
1001203-31 = "U-uuu..."
1001203-32 = "D-desculpe, Treinador."
1001203-33 = "Eu estava pensando no que fazer enquanto esperava,"
1001203-34 = "e então pensei: 'Ah, vou fazer agachamentos'."
1001203-35 = "Era para ser só um pouco, mas acabei me empolgando..."
1001203-36 = "S-se, por acaso..."
1001203-37 = "Se você sente vergonha de estar comigo assim..."
1001203-38 = "[s1] \"Não, nada disso.\"\n[s2] \"Acho admirável ver você se esforçando tanto nos exercícios.\""
1001203-39 = "...Obrigada pelas suas palavras gentis."
1001203-40 = "...Obrigada pelas suas palavras gentis."
1001203-41 = "Mas, se houver algo que te incomode em relação a mim no futuro,"
1001203-42 = "por favor, não deixe de me dizer."
1001203-43 = "Meus músculos são importantes, é claro,"
1001203-44 = "mas o Treinador é muito mais..."
1001203-45 = "..."
1001203-46 = "[s] \"?\""
1001203-47 = "N-não é nada! Esqueça o que eu disse!"
1001203-48 = "B-bem, então! Vamos comprar proteína!?"
1001203-49 = "Vamos lá!"
1001203-52 = "（Fizemos compras com a Sumire, que parecia um pouco envergonhada, e compramos proteína）"
1001203-54 = "Arredores de Millennium"
1001203-55 = "Obrigada por hoje, Treinador."
1001203-56 = "Graças a você, consegui comprar ótimos produtos."
1001203-57 = "Especialmente aquele momento em que você avistou de longe a proteína que estava em promoção e quase esgotada,"
1001203-58 = "e em um instante atravessou a multidão do shopping para pegá-la rapidamente."
1001203-59 = "Aquilo foi muito legal, parecia um adulto cheio de discernimento e iniciativa."
1001203-60 = "Foi engraçado ver a reação das pessoas ao redor, curiosas sobre o que você tinha comprado."
1001203-61 = "Eu jamais conseguiria me mover daquele jeito."
1001203-62 = "[s3] \"Ahaha, que vergonha.\"\n[s4] Gabar-se com orgulho."
1001203-63 = "Hehe, você é uma pessoa realmente interessante, Sensei."
1001203-64 = "Hehe, você é uma pessoa realmente interessante, Sensei."
1001203-65 = "Por enquanto, acho que comprar essa quantidade é o suficiente."
1001203-66 = "Sim? Você está perguntando se eu não comprei proteína demais?"
1001203-67 = "É que a proteína acaba mais rápido do que se imagina."
1001203-68 = "Além disso..."
1001203-69 = "Acho que haverá alguém que precisará dela em breve."
1001203-70 = "Hm? De quem você está falando?"
1001203-71 = "Isso é segredo."
1001203-72 = "Provavelmente você vai descobrir logo. Hehe."
1001203-73 = "Bem, eu já vou indo."
1001203-74 = "Volte para casa com cuidado, Sensei."
1001203-77 = "(Voltei para casa pensando em quem seria a 'pessoa' de quem Sumire falou)"
