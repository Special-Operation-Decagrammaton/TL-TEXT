[translation]
2302-1 = "もう一度！お祭り運営委員会定例会議！"
2302-4 = "（とある休日の午後。百夜堂の片隅に、お祭り運営委員会が集まっていた）"
2302-10 = "ホワイトボードOK、マーカーも新品。#nうん、完璧ね！"
2302-14 = "じゃあ、フィーナ。"
2302-15 = "ハイっ！それでは委員長からの命令も受けマシタのでっ！"
2302-22 = "これより、お祭り運営委員会の定例会議を始めマースっ！"
2302-27 = "ふふ、ふふふふふふふっ……"
2302-28 = "この間は修行部に思いっきり振り回されたけど……"
2302-29 = "今回はひと味違うわ！"
2302-30 = "そう、私たちの切り札……"
2302-32 = "ウミカが帰ってきたもの！"
2302-33 = "お帰りなさい、ウミカ！"
2302-34 = "フィーナも待ってマシタっ！"
2302-36 = "こんにちは、社長！"
2302-37 = "フィーナもお久しぶりです！"
2302-38 = "「社長」じゃなくて「委員長」！"
2302-39 = "はぁ……"
2302-40 = "皆どうして社長って呼ぶのかしら……。"
2302-41 = "まあいいわ。来月「狐踊り商店街」でお祭りが開催されるんだけど――"
2302-42 = "そのお祭りの案を一緒に考えて欲しいの。#n特にウミカ！"
2302-50 = "なんたって、ウミカは百鬼夜行の外でお祭り調査に出ていたのだし……素敵なアイデアを期待してるわよ。"
2302-52 = "イェーイ！"
2302-57 = "任せてください！#nそれでは、各自治区で調査したお祭りの結果をお伝えしますね。"
2302-58 = "まず、先日ゲヘナ地区で開催された「血まみれ祭り」について、今まで秘匿されてきた情報を調べてきました！"
2302-65 = "（血まみれってことは……例の「トマト祭り」のことね）"
2302-66 = "（トマトを投げ合う姿が、まるで血まみれに見えることから名付けられたお祭り……いかにもゲヘナっぽいセンスだわ……）"
2302-67 = "（そんなお祭りに隠されていた情報って、一体……）"
2302-73 = "え、ええ！"
2302-74 = "ウミカがそこまで言うのなら、気になるわね……それで、どうだったの？"
2302-75 = "はい。"
2302-76 = "「血まみれ祭り」の起源は、文字通り、相手が血まみれになるまで銃撃戦を繰り広げたことに由来するそうです！"
2302-77 = "え……？"
2302-82 = "それは……まるで組織間の抗争みたいデスね。"
2302-83 = "さすがゲヘナ！怖いデスっ！"
2302-84 = "いやいやいや。そんなのがお祭りの起源なわけないでしょ！一体どこで聞いたのよソレ。"
2302-85 = "えっと……現地調査を行なった際に、街のヘルメット団に教えてもらったのですが……"
2302-86 = "1000円くれたら「血まみれ祭り」に隠された機密情報を教えてくれると言っていたので……！"
2302-87 = "それ、詐欺だよね！？観光客を騙す現地住民のよくある手口じゃないの！？"
2302-88 = "えっ？"
2302-89 = "と、とにかく……そのお祭りは時間の経過に伴い―[ruby=こんにち]―今日で[/ruby]はトマトを投げ合う形に変貌したそうですよ！"
2302-90 = "あらゆる手段を駆使し、全力でトマトを投げるお祭りなんですね！"
2302-94 = "トマト投擲機にトマト機関砲、対戦車トマト砲まで！"
2302-96 = "なんて素晴らしい想像力なんでしょう！"
2302-97 = "トマトを投擲するために用いられる手段を見ていると、もう……うっとりしちゃって……！"
2302-99 = "対戦車トマト砲って何なの！？"
2302-100 = "しかもですよ！あのミレニアムサイエンススクールとコネクションがあるって噂があるくらい、大規模なお祭りなんです！"
2302-101 = "ですから、私たちもあの「血まみれ祭り」を指標にしてみましょうよ！社長！"
2302-102 = "えっ？し、指標？"
2302-105 = "血まみれ祭りは、単にトマトを投げるだけのお祭りではありません。"
2302-106 = "市場には売り出せないトマトを処分すると共に、人々をたくさん呼び寄せる効果もあるらしいですから！"
2302-109 = "どうですか？社長！"
2302-110 = "これを取り入れたら……"
2302-111 = "トマトの処分に困っている百鬼夜行の農家のみなさんを助けるだけでなく……"
2302-112 = "町興しにもなるんですよ！"
2302-113 = "あっ！トマト料理を提供するのも良さそうですね！"
2302-119 = "もう売り物にならないトマトを購入し、経済を回す。"
2302-120 = "そして、農家さんと連携し、トマト料理を提供する！"
2302-121 = "そうすれば、トマトの消費を促進させることもできちゃいますね！まさに一石二鳥です！"
2302-122 = "閉幕後、トマトを掃除したり、衣類を洗濯する業者さんも必要となりますから……"
2302-127 = "その分野も、より賑わうこと間違いなしです！"
2302-128 = "さすがウミカ！"
2302-129 = "現地調査で見聞を広めたんデスね！"
2302-130 = "フィーナ、そこまでは思い至りませんデシタっ！"
2302-132 = "そ、そう……？"
2302-133 = "消費の活性化と掃除関連事業の活性化ねぇ……意外と、良いのかも……？"
2302-137 = "いや、やっぱり違うわ！"
2302-138 = "何より予算が足りないんだから！そもそも、怪我人が発生したらどうするの！他はないの？"
2302-139 = "では、次の案です！"
2302-140 = "ワイルドハント芸術学院では特別な学園祭が開催されるそうです！全学園が参加するビッグイベントですね！"
2302-141 = "学園祭。いい響きだわ。しかも、普通で良い。"
2302-142 = "でしょう？でしょう？"
2302-143 = "でも、ワイルドハントは少し特殊だそうです。仮に、演劇の場合は……"
2302-144 = "場合は……？"
2302-150 = "リアリティが命！"
2302-151 = "なので舞台ではMG5の実弾を使用します！100発全弾発射です！"
2302-152 = "それに負けず、反対側[ruby=しょういだん]は焼夷弾を[/ruby]発射！"
2302-153 = "舞台は燃え盛り、最後は爆発エンド！#nドッカーン！真の演劇が完成されるのです！"
2302-154 = "そうやって、あらゆる部活が各自の芸術を発揮し……"
2302-155 = "すべてが一か所に集まって、爆発！ドッカーン！破壊！ドゴーン！するのです！"
2302-156 = "流石はウミカ！芸術は爆発だ、デスね！"
2302-157 = "いえ、破壊デシタっけ？"
2302-159 = "それ、学園祭で使っちゃいけない単語じゃない！？"
2302-160 = "ちなみに、その情報はどこから……？"
2302-161 = "インターネットです！"
2302-166 = "ネットには信用できない情報がたくさんあるから、あまり鵜呑みにしないでね！？"
2302-167 = "えっと、それじゃあ！田舎の学園で開催される競走のお祭りとかはどうですか？"
2302-168 = "田舎の学園……いい響きね。ゆったりしていて、どこか癒される気分だわ。競走といえば……短距離走みたいな感じなの？"
2302-169 = "それは……テクニカルレース祭りです！"
2302-170 = "て、テクニカル！？"
2302-171 = "はい！まず、チューニングしたトラックに各種の武器を取り付けるんですね！対空砲、多連装ロケット砲、重機関銃など……車両に乗っけるものなら何でもありです！"
2302-172 = "重さのバランスが不安定でも、車両が転覆されないよう常に気をつけながらドライブする！それに、8気筒エンジンを使い、車両の限界まで挑戦する……"
2302-173 = "私はきっと！その姿が！"
2302-174 = "街に活気をもたらすに違いないと信じています！"
2302-176 = "おぉ～！フィーナもそのレースが見たいデス！"
2302-177 = "きっと迫力満点デスよね！"
2302-179 = "ダメ！そもそも、そんなの不正改造だから！それに、百鬼夜行でそういう武器の扱いは禁止されているんだから！"
2302-181 = "却下っ！"
2302-189 = "……ねぇ、ウミカ。その……もっと百夜堂のコンセプトに合いそうなアイデアはないの……？"
2302-190 = "うーん……残りのアイデアは、地味というか……大した内容じゃなくて……"
2302-191 = "あまり役に立つとは思わないんですよね……なにより規模も小さいですし……"
2302-192 = "商店街を劇的にドーン！と復興できそうなアイデアじゃないと思うんですが……"
2302-193 = "それでもいいって、おっしゃるのであれば……"
2302-198 = "「ヤナギ祭り」というのがありましたよ。"
2302-203 = "それはどんなお祭りデスカ？"
2302-208 = "えっと……参加者たちがヤナギの枝の形をした装飾をつくって、水辺を散策するお祭りです。"
2302-212 = "風に揺れるヤナギの枝と葉っぱを見ながら、川辺を歩き……"
2302-213 = "ゆったりとした、静かな時間を楽しむ。そんなお祭りですね。"
2302-214 = "そして、お腹が空いてきたら、お祭りの屋台で食べ物を食べる。そこには、ヤナギの形をした飴やお菓子も用意されているんです。"
2302-215 = "実はですね？ヤナギの枝には活力を高める効果がたくさんあるらしいですよ！"
2302-216 = "このお祭りも、そこから由来されたって言い伝えられるぐらいですからね！"
2302-218 = "オォ、ヤナギにそんな話があったなんて、初めて知りマシタ！"
2302-223 = "はい！それと、ヤナギには水質浄化の効果もありますし、"
2302-224 = "さらに、樹皮には薬の成分があるとも言われています！サリチル酸と呼ばれる物質ですね！"
2302-225 = "それを無水酢酸によりアセチル化すれば、アセチルサリチル酸、つまり解熱鎮痛剤が出来上がるらしいです！"
2302-226 = "その他にはですね。昔、喉が乾いた旅人がおり、女の人は旅人が水でむせるのを心配し、一葉のヤナギの葉っぱを水に入れてゆっくり飲むよう配慮した逸話もあるらしいです。"
2302-227 = "ロマンティックな話デス！"
2302-228 = "ふふっ、私もとっても気に入ってるお話です！"
2302-229 = "とにかく、昔はヤナギの枝を手に持って、川辺を散策する様なお祭りでしたけど……"
2302-230 = "今は枝を折るのは悪いから、代わりに模型品を作ってお祭りを楽しむ形になったそうですよ！"
2302-237 = "それよ！それ！"
2302-238 = "流石はウミカ！最高じゃない！"
2302-243 = "ウミカ！すごいデス！なんだか心がズキューン！ってなりマシタ！フィーナも大賛成デス！"
2302-244 = "ほ、本当ですか？"
2302-245 = "えへへっ、良かったです！"
2302-246 = "では、せっかくですし超大型のヤナギの枝模型を作りましょう！莫大な予算をつぎ込んだら、きっと……！"
2302-248 = "いや！それはいい！もう十分だから！"
2302-249 = "え？"
2302-250 = "でも……"
2302-252 = "いいからっ！"
2302-257 = "は、はい……。"
2302-261 = "では、これにて会議終了ね！"
2302-263 = "ハイ！ウミカのアイデアを元に、お祭りの準備開始デース！"
2302-264 = "え？ほ、本当に私の案でいいんですか……？"
2302-265 = "問題ありマセン！ウミカならできマス！なにせ、私たちも付いてますカラ！"
2302-266 = "お祭り運営委員会は、いつも一緒なのデス！"
2302-268 = "そう！お祭りは皆で楽しむものだからね！"
2302-273 = "行こう！フィーナ！ウミカ！お祭り運営委員会の腕の見せ所よ！"
2302-276 = "ウミカも行きまショウ！"
2302-277 = "は、はいっ！"
2302-280 = "（そうやってお祭り運営委員会の本格的な活動が……今まさに始まるのであった！）"
2302-281 = "もう一度！お祭り運営委員会定例会議！"
