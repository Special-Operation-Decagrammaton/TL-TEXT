[translation]
2302-1 = "Mais uma vez! Reunião regular do Comitê Organizador do Festival!"
2302-4 = "（Uma tarde de folga. Em um canto da Hyakkiyako, o Comitê Organizador do Festival estava reunido）"
2302-10 = "Quadro branco OK, marcadores novos. #nSim, está perfeito!"
2302-14 = "Então, Fina."
2302-15 = "Sim! Como recebi as ordens da presidente, vamos lá!"
2302-22 = "Dando início à reunião regular do Comitê Organizador do Festival!"
2302-27 = "Fufu, fufufufufufu..."
2302-28 = "Da última vez, fomos completamente manipuladas pelo Clube de Treinamento, mas..."
2302-29 = "Desta vez será diferente!"
2302-30 = "Isso mesmo, nosso trunfo..."
2302-32 = "A Umika voltou!"
2302-33 = "Bem-vinda de volta, Umika!"
2302-34 = "A Fina também estava esperando!"
2302-36 = "Olá, presidente!"
2302-37 = "Fina, quanto tempo!"
2302-38 = "Não é 'presidente', é 'comitê'! Quer dizer, 'chefe' não, 'presidente'!"
2302-39 = "Ah..."
2302-40 = "Por que todo mundo me chama de presidente..."
2302-41 = "Bem, não importa. Mês que vem teremos um festival na 'Rua Comercial da Dança da Raposa' —"
2302-42 = "Quero que pensem em ideias para esse festival comigo. #nEspecialmente você, Umika!"
2302-50 = "Afinal, a Umika esteve fora de Hyakkiyako pesquisando festivais... estou esperando ideias maravilhosas."
2302-52 = "Iêi!"
2302-57 = "Pode deixar comigo! #nEntão, vou apresentar os resultados da pesquisa sobre os festivais em cada distrito."
2302-58 = "Primeiro, sobre o 'Festival Sangrento' realizado recentemente no distrito de Gehenna, descobri informações que estavam sendo mantidas em segredo até agora!"
2302-65 = "（'Sangrento'... deve ser aquele 'Festival do Tomate'）"
2302-66 = "（Um festival nomeado assim porque as pessoas se atiram tomates e parecem estar cobertas de sangue... é bem o estilo de Gehenna...）"
2302-67 = "（Que tipo de informação secreta poderia estar escondida em um festival desses...）"
2302-73 = "S-sim!"
2302-74 = "Se a Umika diz isso, fico curiosa... Então, como foi?"
2302-75 = "Sim."
2302-76 = "A origem do 'Festival Sangrento' vem, literalmente, de um tiroteio que durou até que os oponentes ficassem cobertos de sangue!"
2302-77 = "Hã...?"
2302-82 = "Isso... parece uma disputa entre organizações."
2302-83 = "Típico de Gehenna! Que assustador!"
2302-84 = "Não, não, não. Não tem como essa ser a origem de um festival! Onde você ouviu isso?"
2302-85 = "Bem... quando fiz a pesquisa de campo, o Grupo do Capacete da cidade me contou..."
2302-86 = "Disseram que se eu desse 1000 ienes, me contariam as informações confidenciais escondidas no 'Festival Sangrento'..."
2302-87 = "Isso é um golpe, não é!? Não é aquele truque comum de moradores locais para enganar turistas!?"
2302-88 = "Hã?"
2302-89 = "B-bem, de qualquer forma... com o passar do tempo, o festival mudou para a forma atual de atirar tomates!"
2302-90 = "É um festival onde se usa todos os meios possíveis para atirar tomates com força total!"
2302-94 = "Lançadores de tomate, canhões de tomate, até canhões antitanque de tomate!"
2302-96 = "Que imaginação maravilhosa!"
2302-97 = "Ao ver os meios usados para lançar tomates, eu fico... fascinada..."
2302-99 = "O que é um canhão antitanque de tomate!?"
2302-100 = "E tem mais! Dizem que é um festival tão grande que há rumores de que eles têm conexões com a Millennium Science School!"
2302-101 = "Por isso, vamos usar o 'Festival Sangrento' como referência! Presidente!"
2302-102 = "Hã? R-referência?"
2302-105 = "O Festival Sangrento não é apenas um festival de atirar tomates."
2302-106 = "Parece que também serve para descartar tomates que não podem ser vendidos no mercado e, ao mesmo tempo, atrair muitas pessoas!"
2302-109 = "O que acha, Presidente?!"
2302-110 = "Se a gente adotar isso..."
2302-111 = "Não só vamos ajudar os agricultores de Hyakkiyako que não sabem o que fazer com o excesso de tomates..."
2302-112 = "Como também vamos revitalizar a cidade!"
2302-113 = "Ah! Servir pratos feitos com tomate também parece uma ótima ideia!"
2302-119 = "Comprar tomates que já não servem para venda e movimentar a economia."
2302-120 = "E então, colaborar com os agricultores para servir pratos de tomate!"
2302-121 = "Assim, a gente consegue até estimular o consumo de tomates! É matar dois coelhos com uma cajadada só!"
2302-122 = "Como também vamos precisar de empresas para limpar os tomates e lavar as roupas depois do evento..."
2302-127 = "Não tenho dúvidas de que esse setor também vai ficar bem movimentado!"
2302-128 = "Como esperado da Umika!"
2302-129 = "Você expandiu seus horizontes com a pesquisa de campo, não é!"
2302-130 = "Fina, eu não tinha chegado a pensar nisso!"
2302-132 = "É, é mesmo...?"
2302-133 = "Estimular o consumo e o setor de limpeza, hein... Talvez seja surpreendentemente bom...?"
2302-137 = "Não, na verdade não é!"
2302-138 = "Acima de tudo, não temos orçamento para isso! E para começar, o que faremos se alguém se ferir? Não tem outra ideia?"
2302-139 = "Então, aqui vai a próxima proposta!"
2302-140 = "Dizem que a Academia de Artes Wildhunt vai realizar um festival escolar especial! É um grande evento onde todas as academias participam!"
2302-141 = "Festival escolar. Soa bem. E, além disso, é algo normal."
2302-142 = "Não acha? Não acha?"
2302-143 = "Mas dizem que a Wildhunt é um pouco peculiar. Por exemplo, no caso de uma peça de teatro..."
2302-144 = "No caso de...?"
2302-150 = "O realismo é tudo!"
2302-151 = "Por isso, no palco, usamos munição real de MG5! Disparamos todas as 100 balas!"
2302-152 = "E para não ficar atrás, o outro lado dispara bombas incendiárias!"
2302-153 = "O palco entra em chamas e termina com uma explosão! #nBUM! A verdadeira peça de teatro é concluída!"
2302-154 = "Dessa forma, todos os clubes demonstram sua própria arte..."
2302-155 = "Tudo se reúne em um só lugar e explode! BUM! Destruição! CABRUM! É assim que funciona!"
2302-156 = "Como esperado da Umika! A arte é uma explosão, não é!"
2302-157 = "Não, era destruição, né?"
2302-159 = "Essa não é uma palavra que deveria ser usada em um festival escolar, não é!?"
2302-160 = "Aliás, de onde você tirou essa informação...?"
2302-161 = "Da internet!"
2302-166 = "Tem muita informação não confiável na rede, então não acredite em tudo o que lê, entendeu!?"
2302-167 = "Ah, entendi! Então, que tal um festival de corrida realizado em uma academia no interior?"
2302-168 = "Academia no interior... Soa bem. É relaxante e traz uma sensação de paz. Falando em corrida... é tipo uma corrida de curta distância?"
2302-169 = "Na verdade... é um festival de corrida técnica!"
2302-170 = "T-técnica!?"
2302-171 = "Sim! Primeiro, a gente instala vários tipos de armas em caminhões tunados! Canhões antiaéreos, lançadores de foguetes múltiplos, metralhadoras pesadas... vale tudo o que puder ser colocado no veículo!"
2302-172 = "Mesmo que o peso esteja desequilibrado, você precisa dirigir com cuidado constante para o veículo não capotar! Além disso, usando um motor de 8 cilindros, você desafia os limites do veículo..."
2302-173 = "Eu tenho certeza! Que essa cena!"
2302-174 = "Vai trazer muita energia para a cidade, eu acredito nisso!"
2302-176 = "Oh~! A Fina também quer ver essa corrida!"
2302-177 = "Deve ser emocionante, né!"
2302-179 = "Não! Para começar, isso é modificação ilegal! E além disso, o uso desse tipo de arma é proibido em Hyakkiyako!"
2302-181 = "Rejeitado!"
2302-189 = "...Ei, Umika. Você não tem... alguma ideia que combine mais com o conceito da Hyakkiyado...?"
2302-190 = "Hmm... as ideias que sobraram são meio sem graça, ou melhor... não são lá grandes coisas..."
2302-191 = "Não acho que sejam muito úteis... e, acima de tudo, a escala é bem pequena..."
2302-192 = "Não acho que seja uma ideia que vá revitalizar o centro comercial de forma dramática, tipo 'bum'..."
2302-193 = "Mas se vocês dizem que tudo bem..."
2302-198 = "Existia algo chamado 'Festival do Salgueiro'."
2302-203 = "Que tipo de festival é esse?"
2302-208 = "Bem... é um festival onde os participantes criam decorações em formato de galhos de salgueiro e passeiam pela beira da água."
2302-212 = "Caminhar pela margem do rio, observando os galhos e folhas de salgueiro balançando ao vento..."
2302-213 = "É um festival para aproveitar um tempo tranquilo e relaxante."
2302-214 = "E, quando a fome bate, comemos nas barracas do festival. Lá, também são servidos doces e balas em formato de salgueiro."
2302-215 = "Na verdade, sabia? Dizem que os galhos de salgueiro têm muitos efeitos que aumentam a vitalidade!"
2302-216 = "Dizem até que o festival surgiu por causa disso!"
2302-218 = "Oh, eu não sabia que existia uma história dessas sobre o salgueiro!"
2302-223 = "Sim! Além disso, o salgueiro também tem propriedades de purificação da água,"
2302-224 = "e dizem que a casca contém componentes medicinais! Uma substância chamada ácido salicílico!"
2302-225 = "Se você acetilar isso com anidrido acético, vira ácido acetilsalicílico, ou seja, um analgésico e antitérmico!"
2302-226 = "Fora isso, existe uma anedota de um viajante que estava com sede antigamente; uma mulher, preocupada que ele se engasgasse com a água, colocou uma folha de salgueiro nela para que ele bebesse devagar."
2302-227 = "Que história romântica!"
2302-228 = "Hehe, é uma história que eu gosto muito também!"
2302-229 = "Enfim, antigamente era um festival onde as pessoas seguravam galhos de salgueiro enquanto passeavam pelo rio, mas..."
2302-230 = "Como hoje em dia é ruim quebrar os galhos, parece que mudou para o uso de modelos decorativos para aproveitar o festival!"
2302-237 = "É isso! Isso mesmo!"
2302-238 = "Como esperado da Umika! Não é perfeito?!"
2302-243 = "Umika! Incrível! Meu coração deu um pulo! A Fina também concorda plenamente!"
2302-244 = "S-sério mesmo?"
2302-245 = "Ehehe, que bom!"
2302-246 = "Então, já que estamos nisso, vamos fazer um modelo de galho de salgueiro super gigante! Se investirmos um orçamento enorme, com certeza..."
2302-248 = "Não! Isso já basta! Já é o suficiente!"
2302-249 = "Eh?"
2302-250 = "Mas..."
2302-252 = "Já chega!"
2302-257 = "S-sim..."
2302-261 = "Então, a reunião termina aqui!"
2302-263 = "Sim! Vamos começar os preparativos do festival baseados na ideia da Umika!"
2302-264 = "Eh? A-a minha ideia é realmente boa o suficiente...?"
2302-265 = "Sem problemas! A Umika consegue! Afinal, nós estamos com você!"
2302-266 = "O Comitê Organizador do Festival está sempre junto!"
2302-268 = "Isso mesmo! Festivais são feitos para todos aproveitarem juntos!"
2302-273 = "Vamos lá! Fina! Umika! É hora de mostrar o valor do Comitê Organizador do Festival!"
2302-276 = "Vamos também, Umika!"
2302-277 = "S-sim!"
2302-280 = "（E assim, as atividades em grande escala do Comitê Organizador do Festival... começavam exatamente agora!）"
2302-281 = "Mais uma vez! Reunião regular do Comitê Organizador do Festival!"
