[translation]
10039070-1 = "第7話;[ruby=Antique Seraphim]アンティーク・セラフィム[/ruby]・ビギニング"
10039070-3 = "[log=마리]\"皆さん、どうか戦いをやめてください！\"[/log]"
10039070-8 = "……？"
10039070-9 = "せ、先生！？"
10039070-11 = "マリーさん……それに、先生……。"
10039070-12 = "どうして、こちらに？"
10039070-13 = "それよりも、そのバイクは……。"
10039070-18 = "事情は分かりませんが、戦いはやめてください！"
10039070-19 = "まずは話し合いをしましょう！#nシャーレの先生もお連れしましたから！"
10039070-20 = "……ほかでもない、平和と安全を象徴する[ruby=カーニバル]謝肉祭[/ruby]の開催期間中です！"
10039070-21 = "皆さん、どうか銃を下ろしてください！"
10039070-22 = "[ns1] \"みんな、とりあえず落ち着こうか。\"\n[ns2] \"何があったのか、説明してくれる？\""
10039070-25 = "……。"
10039070-26 = "……また、先生の手を煩わせてしまうとは。"
10039070-27 = "少し長くなるかもしれませんが、最初からご説明しましょう。"
10039070-28 = "トリニティにおいて、重大な――"
10039070-29 = "……よく来てくれました！"
10039070-30 = "実はマリーにお願いがあるのです。"
10039070-31 = "……？"
10039070-32 = "……はい？"
10039070-34 = "……？"
10039070-35 = "わ、私にですか……？"
10039070-36 = "はい……もちろん、無理強いはしません。"
10039070-43 = "……！"
10039070-44 = "ちょうど私も、サクラコさんと同じ考えでした。"
10039070-45 = "ふふ。ありがとうございます、ミネ団長。"
10039070-47 = "すみません……。"
10039070-48 = "お話が見えてこないのですが……。"
10039070-50 = "……ふふっ。"
10039070-51 = "おそらく私たちは同じ結論に至ったのでしょう。"
10039070-55 = "……マリー。"
10039070-56 = "マリーさん。"
10039070-57 = "……アイドルグループの[ruby=リーダー]指導者[/ruby]になってくれませんか？"
10039070-59 = "はい！？"
10039070-60 = "……！？"
10039070-61 = "[ns3] \"マリーをアイドルグループの……。\"\n[ns4] \"[ruby=リーダー]指導者[/ruby]に！？\""
10039070-64 = "まずは謝らせてください。#n今まで練習に必死だったあまりに、マリーの気持ちを考えられていませんでした。"
10039070-65 = "ですが、思い返すとアイドルについて話しているマリーは、#nとても楽しそうな表情をしていたと気づいたのです。"
10039070-66 = "私たちよりも、マリーのほうが……。"
10039070-67 = "「アイドル」に[ruby=ふさわ]相応[/ruby]しいと思うのです。"
10039070-68 = "……私なりに、アイドルとはどのような存在なのかを考えてみました。"
10039070-69 = "そして舞台に立ち、#n素敵なパフォーマンスで皆を笑顔にする者がそうなのだと思ったのです。"
10039070-70 = "まさしく、光のように。"
10039070-71 = "……この結論に至った時、ふとマリーの顔が浮かんだのです。"
10039070-72 = "マリーこそ、誰よりもアイドルに相応しい存在……。"
10039070-73 = "そして、私たちにとっての「アイドル」。"
10039070-74 = "もっと早く気づいていれば……。"
10039070-75 = "そもそも、グループの方向性やレッスンの内容は、#nマリーさんが決めてくれましたね。"
10039070-76 = "……ぜひ、リーダーになっていただけないでしょうか？"
10039070-77 = "私とサクラコさんの目標は、あくまでマイナスイメージを払拭するため。#nリーダーの座に拘っているわけではありませんから。"
10039070-78 = "マリーはシスターフッドでも、クラスでも信頼されているでしょう。"
10039070-79 = "だからこそ、任せられると思ったのです。"
10039070-81 = "え、えっと、つまり……。"
10039070-86 = "わ、私が……。"
10039070-87 = "私が、アイドルに……？"
10039070-89 = "……はい、その通りです。"
10039070-90 = "突然の提案で、混乱させてしまったかもしれませんが……。"
10039070-91 = "……マリー。"
10039070-92 = "一緒にアイドルをやりませんか？"
10039070-94 = "皆さん……。"
10039070-99 = "あれ……。"
10039070-100 = "では、この集まりは……。"
10039070-101 = "[ns5] \"指導者って……。\"\n[ns6] \"アイドルグループのリーダーのことだったんだね……。\""
10039070-104 = "……？"
10039070-105 = "そう、ですが……？"
10039070-106 = "まさか先生まで来てくださるとは思いませんでしたが、#n私たちの行く末を決める重大な場面でしたから助かりました。"
10039070-107 = "……？"
10039070-108 = "どうかされましたか……？"
10039070-109 = "……はっ。"
10039070-110 = "もしかして、私たちはマリーさんに無理強いを……！？"
10039070-111 = "……！"
10039070-112 = "そうだったのですか！？#n申し訳ありません、無理にとは……！"
10039070-114 = "い、いえ、違います！"
10039070-115 = "実は、やってみたいと思っていましたので……と、とても嬉しいです！"
10039070-120 = "……うぅ。"
10039070-121 = "い、今の言葉は忘れてください……！"
10039070-122 = "……ではなく、私もアイドルになって良いのでしょうか？"
10039070-123 = "歌のパートは決まっていますし、衣装の準備がこれからとなると……。"
10039070-129 = "[ns7] \"それなら心配いらないよ。\"\n[ns8] 写真を取り出す。"
10039070-133 = "……？"
10039070-139 = "……せ、先生！？"
10039070-141 = "これは……！"
10039070-142 = "事前にご用意してくださったのですね。"
10039070-143 = "……ありがとうございます、先生。"
10039070-145 = "で、ですが……！"
10039070-146 = "ううぅ……！"
10039070-147 = "[ns] \"……マリー。\""
10039070-149 = "[ns9] \"みんな、マリーを大事に思ってるんだよ。\"\n[ns10] \"正直に答えてくれると嬉しいな。\""
10039070-152 = "そんな……。"
10039070-153 = "……うぅ。"
10039070-154 = "で、では……。"
10039070-155 = "……………………。"
10039070-156 = "よ……。"
10039070-157 = "よろしく……お願い、しますね。"
10039070-161 = "……えへへっ。"
10039070-167 = "[ns11] \"この破壊力は……！\"\n[ns12] \"す、すごい……！\""
10039070-172 = "マリー！マリー！マリー！マリー！"
10039070-173 = "み、皆さん……！？"
10039070-174 = "う、うぅ……。"
10039070-177 = "……。"
10039070-178 = "ねえ、ナギちゃん。"
10039070-179 = "言いたいことは？"
10039070-183 = "み、ミカさん……。"
10039070-184 = "これは、その……。"
10039070-186 = "……なぁに？"
10039070-187 = "えっと……。"
10039070-188 = "……いえ。"
10039070-192 = "……ふ～ん☆"
10039070-193 = "とりあえず、帰ろっか。"
10039070-194 = "ずっとここにいても、お邪魔だろうし。"
10039070-195 = "……お話は、あとで聞かせてもらうね？"
