10039070-64 = "Primeiro, deixe-me pedir desculpas. #nEstávamos tão focadas nos treinos que não levamos em conta os sentimentos da Mari."
10039070-65 = "Mas, pensando bem, percebi que a Mari sempre ficava com uma expressão muito feliz quando falava sobre idols."
10039070-66 = "Mais do que nós, a Mari..."
10039070-67 = "Acho que ela é a mais adequada para ser uma \"idol\"."
10039070-68 = "……Eu refleti sobre o que significa ser uma idol."
10039070-69 = "E cheguei à conclusão de que é alguém que sobe ao palco e faz todos sorrirem com uma performance maravilhosa."
10039070-70 = "Exatamente como a luz."
10039070-71 = "……Quando cheguei a essa conclusão, o rosto da Mari me veio à mente."
10039070-72 = "A Mari é, mais do que qualquer outra pessoa, a existência mais adequada para ser uma idol..."
10039070-73 = "E, para nós, a nossa \"idol\"."
10039070-74 = "Se tivéssemos percebido isso antes..."
10039070-75 = "Afinal, a direção do grupo e o conteúdo dos treinos foram decididos pela Mari, não é?"
10039070-76 = "……Por favor, você não aceitaria ser a nossa líder?"
10039070-77 = "O objetivo meu e da Sakurako é apenas limpar a nossa imagem negativa. #nNão estamos apegadas ao cargo de líder."
10039070-78 = "A Mari é confiável tanto na Sisterhood quanto na turma, não é?"
10039070-79 = "É justamente por isso que achei que poderia confiar isso a você."
10039070-81 = "E-eh, bem, ou seja..."
10039070-86 = "E-eu..."
10039070-87 = "Eu, me tornar uma idol...?"
10039070-89 = "……Sim, exatamente."
