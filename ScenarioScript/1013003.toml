[translation]
1013003-1 = "primeiro passo"

1013003-4 = "Olá, sensei... hein?"

1013003-9 = "O que é isso! ?"

1013003-10 = "[ns] \"É a primeira festa comemorativa do Subaru!\""

1013003-11 = "Isso é um pouco exagerado, senhor. #nEu não sou bom nesse tipo de coisa..."

1013003-12 = "É meio doloroso ser tratado de forma tão especial..."

1013003-13 = "...Ah, mesmo que você me trate com frieza, ainda dói."

1013003-14 = "[s] \"難しいね……。\""

1013003-15 = "Ahaha. Parece que os estudantes da nossa idade são as criaturas mais difíceis deste mundo."

1013003-16 = "Pois bem, senhor. Esta é minha primeira vez em serviço, por isso agradeço sua orientação."

1013003-31 = "Ufa..."

1013003-32 = "[s1] \"Gostaria de fazer uma pausa?\"\n[s2] \"Sim, café.\""

1013003-35 = "Ah. Obrigado, senhor."

1013003-36 = "Café... hehe."

1013003-37 = "você sabe? professor. #nArius também bebia café e chá com frequência."

1013003-38 = "[s] \"Sério?\""

1013003-39 = "sim. Alface selvagem e dentes-de-leão, raízes de nabo murchas, cardos, folhas de amargura, restos de vegetais..."

1013003-40 = "Quando você torra e mói essas coisas... #n Algo da cor do café foi criado."

1013003-41 = "Eles bebem durante a “hora da água”, quando os alunos com alto desempenho recebem água morna."

1013003-42 = "Claro, se eles descobrissem, eu seria repreendido e orientado a não ser extravagante... então fiz isso secretamente."

1013003-43 = "[s3] \"……他に飲みたいものはない？食べ物でもいいよ！\"\n[s4] \"なんでも買ってあげる！好きなだけ言って！\""

1013003-46 = "さっきも言いましたけど、大げさですってば！"

1013003-48 = "(Se você se apressar para trazer comida e bebidas...)"

1013003-49 = "(Subaru estava comendo silenciosamente e parecia muito delicioso.)"

1013003-51 = "Hum... professor?"

1013003-52 = "[s] \"Sim?\""

1013003-53 = "Você disse outro dia que estaria disposto a me dar alguns conselhos, certo?"

1013003-54 = "[s] \"Sim! Que diabos!!\""

1013003-55 = "Então, por favor, pare de fazer isso!"

1013003-56 = "……."

1013003-57 = "O mundo exterior... está cheio de coisas que não conheço."

1013003-58 = "Eu acho que é óbvio."

1013003-59 = "Mas talvez seja por isso..."

1013003-60 = "Ultimamente meu coração tem estado..."

1013003-61 = "Fofinho? Está nervoso...? Eu me sinto desconfortável de alguma forma... #nParece que muitas coisas estão misturadas..."

1013003-62 = "Concordo……."

1013003-63 = "……."

1013003-64 = "Afinal, deve haver algo que não pode ser tolerado."

1013003-65 = "Tanto Trindade quanto Ário..."

1013003-66 = "Claro, para mim também."

1013003-70 = "Isso me faz sentir muito estranho."

1013003-71 = "Mesmo agora, em algum lugar do meu coração, há uma parte de mim que deseja que Trinity sofra."

1013003-72 = "Mas até o dia em que Arius derrotar Trinity..."

1013003-73 = "Eu também quero que ele fique sozinho e que nada aconteça com ele."

1013003-74 = "Não apenas Trinity, mas também cada aluno da Trinity."

1013003-75 = "Um dos meus objetivos é que todos em Arius, inclusive eu, vivam uma vida melhor do que Trinity."

1013003-76 = "...Mas não quero fazer nada radical para conseguir isso."

1013003-77 = "...Eh? Isso é "rivalidade" no bom sentido...?"

1013003-78 = "……."

1013003-79 = "Estou me sentindo um pouco irritado agora..."

1013003-80 = "Não, acho que as palavras do professor estão corretas. #nÉ por isso."

1013003-81 = "Suspirar..."

1013003-82 = "[s] \"É difícil para alunos dessa idade...\""

1013003-83 = "Você ainda se arrepende? Acabei dizendo que iria consultá-lo."

1013003-84 = "...Na verdade, estou feliz que você tenha dito isso honestamente? É porque você sempre sorri na frente dos seus juniores?"

1013003-85 = "...!"

1013003-86 = "Os professores são pessoas más..."

1013003-87 = "[s] \"Sim, a culpa é do professor!""

1013003-88 = "É realmente terrível..."

1013003-89 = "[ns] \"Sim, o professor é aquele que é terrível.\""

1013003-91 = "[ns] \"Além disso, é normal ter sentimentos contraditórios.\""

1013003-92 = "...?"

1013003-93 = "Muitas emoções diferentes ao mesmo tempo..."

1013003-94 = "いたって普通のこと……なんでしょうか？"

1013003-95 = "...Então, o que exatamente é correto?"

1013003-96 = "[s5] \"O que Subaru achou que era bom?\"\n[s6] \"O que Subaru achou que era certo?""

1013003-99 = "Se não escolher, pode pensar nisso depois...?"

1013003-100 = "O importante é assumir a responsabilidade pelas suas escolhas."

1013003-101 = "Mas se você sentir que não consegue dar conta de tudo, entre em contato comigo a qualquer hora...?"

1013003-102 = "Ahaha, o que é isso...? #nNo final nada se resolve, né?"

1013003-103 = "[s] \"Mas a vida é uma repetição desse processo.\""

1013003-104 = "...É assim mesmo?"

1013003-105 = "[s] \"Sim.""

1013003-106 = "Está muito mais confuso do que eu esperava."

1013003-107 = "[s7] \"Sim, mas...\"\n[s8] \"Todo mundo parece estar vivendo assim ao máximo.\""

1013003-110 = "……."

1013003-111 = "Isso mesmo."

1013003-112 = "[s9] \"Isso mesmo.\"\n[s10] \"Além disso, não se deixe enganar por pessoas que falam bem!\""

1013003-115 = "O que? Foi isso que a professora disse? ?"

1013003-116 = "Na verdade, o professor é uma pessoa estranha."

1013003-120 = "Sim……."

1013003-121 = "Realmente."

1013003-122 = "Pessoa estranha...."

1013003-123 = "……n / D."

1013003-124 = "[s] \"Subaru.\""

1013003-125 = "?"

1013003-126 = "[s] \"Foi difícil.\""

1013003-127 = "……foto?"

1013003-128 = "...Que."

1013003-130 = "Ei, por favor, olhe ali por um segundo!"

1013003-131 = "Huh? Há lenços de papel em cima da mesa...?"

1013003-132 = "Agora, senhor... não preciso dizer nada!"

