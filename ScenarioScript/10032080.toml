[translation]
10032080-1 = "Epílogo; Tem dias que são assim"
10032080-4 = "Udon de tempurá, saindo um!"
10032080-5 = "[s1] \"Ah, muito obrigado.\"\n[s2] Faço uma reverência e pego a comida."
10032080-8 = "Vocês estão vestindo roupas tão bonitas, mas estão todas sujas!#nEstavam em um canteiro de obras ou algo assim?"
10032080-9 = "Bem, vamos comer algo gostoso e esquecer as coisas ruins! Hahaha!"
10032080-10 = "[s3] \"Muito obrigado, chefe.\"\n[s4] \"Ahaha... bem, aconteceu de tudo um pouco.\""
10032080-15 = "......Conseguimos fazer todo mundo sentar, de alguma forma."
10032080-16 = "Sentar seis pessoas em uma barraca feita para cinco..."
10032080-17 = "N-não é apertado demais!? Eu vou comer em pé!#nN-não, na verdade, eu posso virar uma cadeira...!"
10032080-23 = "Não, Haruka-chan. Pode continuar sentada aí!"
10032080-24 = "Mas mudando de assunto, Aru-chan. O trabalho foi por água abaixo, o que vamos fazer agora?"
10032080-25 = "Não é Aru-chan, é Presidente!"
10032080-26 = "Você disse que ia completar o trabalho e se tornar mais 'hard-boiled', e várias outras coisas..."
10032080-27 = "No fim, falhamos em garantir o alvo e a casa de ópera desmoronou."
10032080-28 = "N-não é culpa minha! Com aquela explosão acontecendo..."
10032080-29 = "Já foi um milagre termos conseguido sair de lá vivas!? Se tivéssemos demorado um pouco mais..."
10032080-33 = "Hora das notícias. Hoje, houve uma grande explosão na casa de ópera, resultando no desabamento do prédio."
10032080-34 = "Segundo a Academia de Polícia Valkyrie, que respondeu ao chamado, a maioria dos espectadores e envolvidos tinha ligações com organizações criminosas..."
10032080-40 = "......A causa do incidente é vista como um conflito entre organizações. A Valkyrie deteve todos que estavam no local e está conduzindo os interrogatórios."
10032080-41 = "Poderíamos ter sido levadas para a Valkyrie junto com todo mundo.#nE ainda por cima, junto com aqueles gângsteres."
10032080-42 = "Com esse incidente, o Arancino... não, a aliança das gangues, praticamente acabou."
10032080-43 = "Bem, o cliente também foi preso, e a recompensa que deveríamos receber..."
10032080-44 = "Desculpem... foi por minha causa, por ter jogado a bomba na lixeira..."
10032080-45 = "Não, Haruka, não precisa se preocupar com isso. Na verdade, acho que foi até bom."
10032080-46 = "Se não fosse isso, eles teriam nos perseguido sem parar para recuperar o chefe..."
10032080-47 = "......Eu penso o mesmo."
10032080-51 = "Com licença..."
10032080-56 = "......Eu penso o mesmo."
10032080-57 = "Graças a isso, conseguimos escapar em segurança. Além disso, conseguimos cortar laços com eles."
10032080-58 = "[s5] \"Estão com fome, não estão? Podem pedir mais.\"\n[s6] \"Hoje é por minha conta.\""
10032080-61 = "......S-sério!?"
10032080-62 = "......Não, acho que deveria agradecer honestamente."
10032080-63 = "Obrigada, Sensei. Essa dívida será paga...!"
10032080-69 = "O que foi, o que foi? Está querendo dizer que agora somos aliados?"
10032080-70 = "Na verdade, acabamos nos tornando aliados no final.#nE, para começo de conversa, o motivo do conflito foi apenas por causa dos trabalhos que cada uma aceitou."
10032080-71 = "Se ficarmos nos preocupando com detalhes, não conseguiremos continuar trabalhando no submundo..."
10032080-72 = "......Você costuma dizer isso sempre, Presidente."
10032080-73 = "Hã? E-eu...!?"
10032080-74 = "S-sim, claro que sim! O que você pensa de nós!?#nNão misturamos assuntos pessoais com trabalho!"
10032080-75 = "......Por isso, não precisa se preocupar.#nSeja qual for o trabalho, nós o executamos e recebemos a recompensa."
10032080-76 = "Esse é o lema da nossa Problem Solver 68."
10032080-77 = "Bem, dessa vez nós falhamos, mas..."
10032080-78 = "E-eu disse para não se preocupar com detalhes!#nTem dias que são assim, não tem?"
10032080-79 = "Isso mesmo! Quando se trabalha nesse ramo, coisas assim acontecem!"
10032080-81 = "......!"
10032080-82 = "Entendo... então é assim que vocês lidam com isso."
10032080-83 = "Antigamente, havia muitos dias em que eu era enganado pelos clientes e não recebia a recompensa..."
10032080-84 = "Tem dias que são assim, é... Certo, vou me lembrar disso."
10032080-85 = "Não, você não deveria deixar passar batido. O que exatamente aconteceu com você..."
10032080-86 = "......Ah."
10032080-87 = "Falando nisso, Sensei."
10032080-88 = "E os BDs para o material didático...?"
10032080-89 = "Antes da peça, a própria casa de ópera desmoronou, então obviamente não dá, né?"
10032080-93 = "……Ah."
10032080-94 = "……Ah."
10032080-95 = "……Ah."
10032080-96 = "……Ah."
10032080-100 = "[ns] \"……Ahaha.\""
10032080-104 = "[ns] \"Bem……\""
10032080-110 = "[ns] \"……Tem dias que são assim.\""
10032080-111 = "0068 Com amor, da ópera!"
