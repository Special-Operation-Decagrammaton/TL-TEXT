[translation]
10032080-1 = "エピローグ;こういう日もある"
10032080-4 = "天ぷらうどん、いっちょ上がり！"
10032080-5 = "[s1] \"あ、どうも。\"\n[s2] 会釈して料理を受け取る。"
10032080-8 = "みんないい服を着てるってのに、汚れちまってるじゃないか！#n工事現場にでも居たのかい？"
10032080-9 = "まっ、美味いモン食ってイヤなことなんて忘れちまおう！はっはっは！"
10032080-10 = "[s3] \"ありがとうございます、大将。\"\n[s4] \"あはは……まあ色々と。\""
10032080-15 = "……なんとか全員座れたね。"
10032080-16 = "五人掛けの屋台に六人で座るなんて。"
10032080-17 = "や、やっぱり狭いですよね！？私だけ立って食べますので！#nい、いえ、いっそのこと椅子になれば……！"
10032080-23 = "ううん、ハルカちゃん。そのまま座ってていーよ！"
10032080-24 = "それより、アルちゃん。依頼全部パーになったけど、これからどうするの？"
10032080-25 = "アルちゃんじゃなくて、社長でしょ！"
10032080-26 = "依頼を成功させて、もっとハードボイルドになるとか、いろいろ言ってたけど……"
10032080-27 = "結局、ターゲットの確保も失敗したし、オペラハウスは崩壊しちゃったね。"
10032080-28 = "し、仕方ないじゃない！あんな爆発が起こったら……"
10032080-29 = "無事に抜け出せただけでも奇跡よ！？少しでも遅れてたら……"
10032080-33 = "ニュースの時間です。本日、オペラハウスで大規模の爆発があり、建物が倒壊しました。"
10032080-34 = "通報に駆けつけたヴァルキューレ警察学校によりますと、観客と関係者のほとんどが犯罪組織と関わっており……"
10032080-40 = "……事件の原因は組織間の対立と見られております。ヴァルキューレは、現場に残っていた全員の身柄を確保し、現在取り調べを行なっているとのことです。"
10032080-41 = "全員仲良く、ヴァルキューレに連行されてたかも。#nしかも、ギャングの奴らと一緒に。"
10032080-42 = "今回の事件で、アランチーノは……いや、ギャング連合は終わったも同然ね。"
10032080-43 = "まあ、依頼人も逮捕されちゃったし、私たちが受け取るはずだった報酬も……"
10032080-44 = "すみません……私が爆弾をゴミ箱に捨てたせいで……"
10032080-45 = "ううん、ハルカが気にする必要は無いよ。むしろ、良かったんじゃないかな。"
10032080-46 = "あいつら、ボスを取り返すためなら、ひたすら私たちを追いかけてきただろうし……"
10032080-47 = "[ruby=ああひも、おあじはんあえだ]……私も同じ考えだ。[/ruby]"
10032080-51 = "[ruby=ひふれい]失礼[/ruby]……"
10032080-56 = "……私も同じ考えだ。"
10032080-57 = "おかげで、無事に脱出できたからな。それに、奴らと手を切ることもできた。"
10032080-58 = "[s5] \"お腹空いたでしょ？もっと頼んでいいよ。\"\n[s6] \"今日は私の奢りだから。\""
10032080-61 = "……そ、そんな！？"
10032080-62 = "……いや、ここは素直に礼を言うべきか。"
10032080-63 = "ありがとう、先生。この恩は必ず……！"
10032080-69 = "なになに？もう私たちは仲間だって言いたいの？"
10032080-70 = "実際、最後は仲間になったからね。#nそもそも衝突してた原因は、お互いが引き受けていた依頼のせいだし。"
10032080-71 = "細かいこと気にしてたら、裏社会で仕事なんか続けられないって……"
10032080-72 = "……よく言ってるでしょ、社長。"
10032080-73 = "へ？わ、私……！？"
10032080-74 = "え、ええ、もちろんよ！私たちのことを何だと思っているのよ！#n仕事に私情を挟むわけないじゃない！"
10032080-75 = "……だから、気にしなくていいわ。#nどんな仕事であれ、依頼を遂行し報酬を受け取る。"
10032080-76 = "それが我々、便利屋68のモットーよ。"
10032080-77 = "まあ、今回は失敗しちゃったけどね～"
10032080-78 = "だ、だから細かいことは気にしないでって！#nこういう日もあるでしょう？"
10032080-79 = "ええ、そうよ！仕事を続けていると、これくらい起きるものなんだから！"
10032080-81 = "……！"
10032080-82 = "なるほど……そうやって受け流すのか。"
10032080-83 = "以前は、依頼人に騙されて報酬を受け取れない日も多々あったが……"
10032080-84 = "こういう日もある、か……よし、覚えておこう。"
10032080-85 = "いや、そこは流しちゃダメでしょ。いったい何があったの……"
10032080-86 = "……あ。"
10032080-87 = "そういえば、先生。"
10032080-88 = "教材用のBDは……？"
10032080-89 = "劇以前に、オペラハウスごと崩壊したんだし、当然無理じゃない？"
10032080-93 = "……あ。"
10032080-94 = "……あ。"
10032080-95 = "……あ。"
10032080-96 = "……あ。"
10032080-100 = "[ns] \"……あはは。\""
10032080-104 = "[ns] \"まぁ……\""
10032080-110 = "[ns] \"……こういう日もあるよ。\""
10032080-111 = "0068 オペラより愛をこめて！"
