[translation]
1001805-1 = "恥ずかしがり屋のアルバイト（１）"
1001805-2 = "ゲーム開発部・部室"
1001805-3 = "ふぅ……いつまでも部員のみんなにお世話になりっぱなしじゃダメなのに……#n……困ったなぁ。"
1001805-4 = "[s] \"何か悩み事でもあるの？\""
1001805-5 = "あ、先生。"
1001805-6 = "じ、実は、ゲーム開発部の新作のゲームを作るのに、開発費が足りなくて……。"
1001805-7 = "部員のみんなが開発費の足しにするためにってアルバイトをしてるのに、わ、わたしは人が怖いからって、まだアルバイトを探しに外に出ることすらできてない状態で……。"
1001805-8 = "一応、ゲーム開発部の部長なのに、力になれてなくて……。"
1001805-9 = "何か、部員のみんなの助けになれる良い方法はないでしょうか？"
1001805-10 = "[s] \"私が知ってるアルバイト先、紹介しようか？\""
1001805-11 = "む、無理です！"
1001805-12 = "ひ、人とちゃんと話すことすらままならないのに……！"
1001805-13 = "……。"
1001805-14 = "も、もちろん人前に出るのは……今も怖いですが……。"
1001805-15 = "……そうですね。ずっと、に、逃げてばかりでは、いられないので。"
1001805-16 = "先生が紹介してくださるアルバイトなら……#n大丈夫かもしれません！"
1001805-18 = "コンビニ「エンジェル24」・キヴォトスセントラル店"
1001805-19 = "次の日。キヴォトス市内、中心街のコンビニ「エンジェル24」の店内。"
1001805-21 = "む、無理です……！"
1001805-22 = "確かに大丈夫と言いましたが、よりにもよってコンビニ店員として接客業務だなんて、聞いてません……！"
1001805-23 = "先生を信じたのに……信じてたのに……！"
1001805-24 = "[s] \"私がずっとそばにいてあげるから、心配しないで。\""
1001805-25 = "ほ、本当ですか？アルバイト中、ずっと一緒にいてくださいますか……？"
1001805-26 = "そ、それでしたら、少しは頑張れるかもしれません……。"
1001805-27 = "うう、で、でも、怖いお客様が来たらどうしましょう……？"
1001805-30 = "ユズさん。レジの前の空いた棚に、お菓子を陳列してくれる？"
1001805-31 = "は、は、はいっ？の、の、飲み物でしょうか！？"
1001805-32 = "ううん、飲み物じゃなくてお菓子。飲み物はもう冷蔵庫に入れておいたから……。"
1001805-33 = "は、はいっ！の、の、飲み物を陳列棚に並べておきますね！"
1001805-36 = "……えっと。あの子、大丈夫かな……。"
1001805-38 = "数分後……"
1001805-39 = "あ、その唐揚げ弁当温めてください。"
1001805-40 = "そこの漫画雑誌、今月の新刊のやつを一冊お願いします。"
1001805-41 = "は、はい！"
1001805-42 = "こちら、温めた漫画雑誌と、ハ、ハンバーガー弁当です！"
1001805-43 = "私が頼んだのは唐揚げ弁当なんですが……。"
1001805-44 = "その、漫画雑誌は温めなくて大丈夫です……。"
1001805-45 = "え、あわわっ！？す、すみません！す、すぐに取り替えます……！"
1001805-46 = "すみません、こっちもレジお願いします～。"
1001805-50 = "（うう、人が多すぎる……怖い……逃げたい……）"
1001805-51 = "（で、でも今は先生がそばにいてくれるし……ゲーム開発部のみんなに迷惑をかけないためにも、逃げちゃダメ……！）"
1001805-52 = "（もう少し……もう少し……！）"
1001805-55 = "しょ、少々お待ちください！す、すぐに伺います！"
1001805-57 = "お、お疲れ様でした……。"
1001805-58 = "[s] \"ユズ、お疲れ様。\""
1001805-59 = "あ、はい、その……。"
1001805-60 = "うう……わたし、一日中ミスばかりで……お客様にもたくさん迷惑をかけて……やっぱりわたしは、アルバイトなんて一人前にできない、ぼっちでダメダメな子なんです……。"
1001805-61 = "[s] \"そんなことないよ、ユズは一生懸命頑張ってたから。\""
1001805-62 = "でも……。"
1001805-65 = "お疲れ様、ユズさん。"
1001805-66 = "いやー、今日はいつもよりお客さんが多かったね……こんな時に新しいアルバイトさんが来てくれて、ほんと助かったよ。"
1001805-67 = "ほ、本当ですか……？"
1001805-68 = "もちろん、ミスもあったけど、すぐにちゃんと謝って対応してくれたからね。"
1001805-69 = "お客様も、ユズさんの真面目な姿勢に感じるところがあったんじゃないかな。"
1001805-70 = "よ、良かったです……こんなわたしでも、お役に立てていたなんて……。"
1001805-71 = "それで、実は来週の週末も、お店の前で大規模なイベントが予定されててね。"
1001805-72 = "その時もお願いできないかな？"
1001805-73 = "……ひっ、いえっその……っ！こ、これ以上はもう無理ですっっ！"
