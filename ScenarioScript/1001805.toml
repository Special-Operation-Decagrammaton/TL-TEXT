[translation]
1001805-1 = "A Empregada Tímida (1)"
1001805-2 = "Sala do Clube de Desenvolvimento de Jogos"
1001805-3 = "Ufa... não dá para ficar dependendo dos outros membros do clube para sempre...#n...Que situação difícil."
1001805-4 = "[s] \"Você está com algum problema?\""
1001805-5 = "Ah, Sensei."
1001805-6 = "Na verdade, não temos dinheiro suficiente para desenvolver o novo jogo do Clube de Desenvolvimento de Jogos..."
1001805-7 = "Os outros membros estão fazendo trabalhos de meio período para ajudar com os custos de desenvolvimento, mas eu... como tenho medo de pessoas, ainda nem consegui sair para procurar um emprego..."
1001805-8 = "Mesmo sendo a presidente do Clube de Desenvolvimento de Jogos, não estou conseguindo ser útil..."
1001805-9 = "Será que existe alguma boa maneira de eu ajudar os outros membros?"
1001805-10 = "[s] \"Quer que eu te indique um lugar para trabalhar?\""
1001805-11 = "I-isso é impossível!"
1001805-12 = "Eu mal consigo conversar direito com as pessoas...!"
1001805-13 = "..."
1001805-14 = "C-claro, aparecer na frente dos outros... ainda me dá medo..."
1001805-15 = "...É verdade. Não posso ficar fugindo para sempre."
1001805-16 = "Se for um trabalho indicado pelo Sensei...#n talvez eu consiga!"
1001805-18 = "Loja de Conveniência \"Angel 24\" - Filial Kivotos Central"
1001805-19 = "No dia seguinte. Dentro da loja de conveniência \"Angel 24\", no centro da cidade de Kivotos."
1001805-21 = "I-isso é impossível...!"
1001805-22 = "Eu disse que tentaria, mas não me avisaram que seria um trabalho de atendimento ao cliente em uma loja de conveniência...!"
1001805-23 = "Eu confiei no Sensei... eu confiei em você...!"
1001805-24 = "[s] \"Eu vou ficar do seu lado o tempo todo, não se preocupe.\""
1001805-25 = "V-verdade? Você vai ficar comigo durante todo o trabalho...?"
1001805-26 = "S-se for assim, talvez eu consiga me esforçar um pouco..."
1001805-27 = "Uuu, m-mas e se um cliente assustador aparecer...?"
1001805-30 = "Yuzu, você pode colocar os doces na prateleira vazia em frente ao caixa?"
1001805-31 = "S-s-sim? B-bebidas, certo!?"
1001805-32 = "Não, não são bebidas, são doces. As bebidas eu já coloquei na geladeira..."
1001805-33 = "S-sim! V-vou colocar as bebidas na prateleira agora mesmo!"
1001805-36 = "...Bem. Será que ela vai ficar bem..."
1001805-38 = "Alguns minutos depois..."
1001805-39 = "Ah, por favor, esquente esse bento de frango frito."
1001805-40 = "Por favor, me vê uma revista de mangá, a edição nova deste mês."
1001805-41 = "S-sim!"
1001805-42 = "Aqui está, a revista de mangá aquecida e o bento de hambúrguer!"
1001805-43 = "Eu pedi um bento de frango frito..."
1001805-44 = "E não precisa esquentar a revista de mangá..."
1001805-45 = "E-eh, ahhh!? D-desculpe! V-vou trocar agora mesmo!"
1001805-46 = "Desculpe, pode me atender no caixa também?"
1001805-50 = "(Uuu, tem gente demais... que medo... quero fugir...)"
1001805-51 = "(M-mas agora o Sensei está aqui comigo... e para não causar problemas para o pessoal do Clube de Desenvolvimento de Jogos, não posso fugir...!)"
1001805-52 = "(Só mais um pouco... só mais um pouco...!)"
1001805-55 = "P-por favor, espere um momento! J-já vou atendê-lo!"
1001805-57 = "O-obrigada pelo trabalho de hoje..."
1001805-58 = "[s] \"Yuzu, bom trabalho.\""
1001805-59 = "Ah, sim, é que..."
1001805-60 = "Uuu... eu só cometi erros o dia todo... causei muitos problemas para os clientes... no fim das contas, eu não consigo nem fazer um trabalho de meio período direito, sou só uma garota solitária e inútil..."
1001805-61 = "[s] \"Não é verdade, Yuzu. Você se esforçou muito.\""
1001805-62 = "Mas..."
1001805-65 = "Bom trabalho, Yuzu."
1001805-66 = "Nossa, hoje teve mais clientes do que o normal... Foi uma grande ajuda ter uma nova funcionária de meio período chegando justamente agora."
1001805-67 = "S-sério mesmo...?"
1001805-68 = "Claro, você cometeu alguns erros, mas pediu desculpas e resolveu tudo prontamente."
1001805-69 = "Acho que os clientes também notaram a sua dedicação, Yuzu."
1001805-70 = "Q-que bom... Saber que alguém como eu conseguiu ser útil..."
1001805-71 = "Então, na verdade, teremos um grande evento em frente à loja no próximo fim de semana."
1001805-72 = "Será que você poderia nos ajudar de novo?"
1001805-73 = "...Hii, não, isso...! E-eu não aguento mais do que isso!"
