[translation]
80000131-1 = "A garota sem abrir a caixa"
80000131-3 = "[log=니야]Ao meu querido Sensei[/log]"
80000131-5 = "[log=니야]Faz tempo que não nos vemos[/log]"
80000131-7 = "[log=니야]Entrei em contato porque tenho algo a lhe dizer[/log]"
80000131-9 = "[log=니야]Estarei esperando na sala do Departamento de Yin-Yang, como sempre[/log]"
80000131-13 = "[log=니야]Da chefe do Departamento de Yin-Yang, Amachi Niya[/log]"
80000131-20 = "――Não faz nem um dia desde que recebi essa mensagem."
80000131-21 = "Não esperava que você viesse tão rápido."
80000131-22 = "Como esperado, o Sensei é alguém em quem se pode confiar."
80000131-23 = "……Será que é porque você estava morrendo de vontade de me ver?"
80000131-24 = "…………."
80000131-25 = "Nyaha, mudando de assunto."
80000131-26 = "Entre nós dois, não precisamos mais ficar fazendo joguinhos, certo?"
80000131-27 = "Você já sabe, não é?#nFique tranquilo, você acertou em cheio."
80000131-28 = "Então, por favor... é apenas uma lembrança."
80000131-29 = "[s1] \"I-isso parece caríssimo...!?\"\n[s2] \"Isso é uma lembrança simples...!?\""
80000131-32 = "Ora, ora, isso é apenas uma formalidade."
80000131-33 = "Considere como um agradecimento pelo seu dia a dia."
80000131-34 = "Eu só queria usar o Dia dos Namorados como desculpa."
80000131-35 = "Ah, o conteúdo é chocolate de verdade, viu?"
80000131-36 = "Bem... já que estamos aqui, por que não abre agora?"
80000131-37 = "Isso, vamos fazer assim. Vamos, vamos, vamos♪"
80000131-42 = "……O que achou?"
80000131-43 = "Era realmente apenas chocolate, não era?"
80000131-44 = "……Por acaso, você ficou decepcionado?"
80000131-48 = "[ns3] \"Eu nunca ficaria decepcionado com um presente de uma aluna querida.\"\n[ns4] \"Achei que isso era bem a sua cara, Niya.\""
80000131-51 = "Nyaha!#nQue espírito maravilhoso você tem."
80000131-52 = "Já que estamos aqui, poderia avaliar o sabor também?"
80000131-53 = "……Agora, aqui mesmo."
80000131-54 = "Sendo o Sensei, você não recusaria o pedido de uma aluna fofa... recusaria?"
80000131-55 = "[s5] \"Claro que não.\"\n[s6] Levar o chocolate à boca."
80000131-61 = "Ora... sem hesitação alguma."
80000131-62 = "A propósito, isso foi feito à mão, sabia?"
80000131-63 = "Chocolate feito à mão por uma aluna fofa."
80000131-64 = "Gostou?"
80000131-68 = "……Nyaha. Você não parece nada feliz."
80000131-69 = "Bem, é compreensível.#nColoquei bastante artemísia no chocolate amargo,#n então deve estar bem amargo, não é?"
80000131-70 = "[s7] \"Eu gostaria que você me explicasse direito...\"\n[s8] \"P-por que você fez isso...!?\""
80000131-73 = "Vou explicar de forma clara e precisa."
80000131-74 = "É porque o Sensei é... uma pessoa muito boa."
80000131-78 = "Oh... parece que você não está convencido."
80000131-79 = "Então, serei direta."
80000131-80 = "Você já parou para pensar no que as alunas pensam de você, Sensei?"
80000131-81 = "Você deve ter recebido muitos chocolates de outras pessoas também, não é?"
80000131-82 = "……Para alguém como o Sensei, isso é óbvio."
80000131-87 = "Gentil com todos, amigável e capaz de resolver qualquer problema."
80000131-88 = "――Como se fosse esta caixa de chocolates."
80000131-89 = "Mas será que é realmente assim?#nDiante das expectativas das alunas, será que o Sensei conseguirá responder perfeitamente para sempre?"
80000131-90 = "Nyaha... isso não seria difícil demais?#nMesmo sendo o Sensei, você não passa de um ser humano."
80000131-91 = "Mas as jovens garotas acabam esquecendo disso.#nOlham apenas para a superfície, acumulam mal-entendidos e criam expectativas..."
80000131-92 = "Você pegará o chocolate e terá sonhos doces, não é?"
80000131-93 = "……Sem saber o quão amarga a experiência pode ser no final."
80000131-94 = "……Não, não tenho a menor intenção de te culpar, sabe?"
80000131-95 = "O Sensei é uma pessoa muito boa. #nAo contrário de mim, você não tem segundas intenções, certo?"
80000131-96 = "Mas, bem, eu sou esse tipo de aluna."
80000131-97 = "Eu não gosto de chocolates amargos, sabe... Nyahaha."
80000131-103 = "……Posso te pedir apenas uma coisa?"
80000131-104 = "Você poderia não esquecer o gosto desse chocolate?"
80000131-108 = "[ns] \"……Sim, eu entendi.\""
80000131-110 = "[ns9] \"Se não me engano, o Departamento Yin-Yang tem uma cozinha, certo?\"\n[ns10] \"Poderia me emprestar um pouco?\""
80000131-113 = "Eu não me importo, mas... o que exatamente você vai fazer?"
80000131-114 = "[s11] \"Eu entendi o que você está pensando, Niya...\"\n[s12] \"Mas, deixando isso de lado, este chocolate...\""
80000131-120 = "[ns] \"Acho que vou pedir para a Niya comer também!!\""
80000131-121 = "Como assim!?"
80000131-123 = "(Encontrei um pouco de artemísia que sobrou e fiz um chocolate para a Niya)"
80000131-124 = "(No entanto, errei a medida e fiz demais, então acabamos comendo juntos)"
80000131-125 = "(Aquele chocolate, como esperado, estava muito amargo...)"
