[translation]
10016160-1 = "後日談その6;実行委員会編"
10016160-6 = "ふぅ……落ち着くわね……"
10016160-7 = "1日の疲れが、この一杯で癒やされていく……"
10016160-8 = "こんなに素敵な紅茶は初めて飲みます……不思議と落ち着く甘い香りがして、とっても美味しいです。"
10016160-9 = "適温で飲みやすいですし、良い香りが広がっていて……"
10016160-10 = "前に私が淹れたときは、こんなに豊かな香りはしなかったのですが……#nさすがです、ハスミさん。"
10016160-14 = "ふふ、ティーパーティーから素敵な茶葉を送っていただいたおかげです。"
10016160-15 = "まだありますので、お代わりされる方はお申し付けください。"
10016160-19 = "あら、カップが空いていますね。もう1杯いかがですか？"
10016160-20 = "はい、お願いします。"
10016160-29 = "……正義実現委員会の副委員長は、お茶に厳しいと伺っていましたが、あの噂は本当だったのですね。"
10016160-30 = "人の手で、これほど精巧で洗練された味を出せるとは思いませんでした。"
10016160-31 = "貴重な経験をさせていただき、ありがとうございます。"
10016160-32 = "気に入っていただけたようで、何よりです。"
10016160-36 = "その……[ruby=うしお]生塩[/ruby]ノアさん、ですよね……？"
10016160-37 = "何度かすれ違いはしましたが、こうして実行委員会の事務所でお会いしたことはなかったような。"
10016160-38 = "ええ。このように言葉を交わすのは初めてですが、ユウカちゃんからお話は伺っています。"
10016160-39 = "私は今回の「晄輪大祭」で主に現場管理をしていたので、事務担当のハスミさんとはほとんど接点がありませんでしたね。"
10016160-40 = "そうでしたか。ご挨拶が遅れてしまい、失礼いたしました。"
10016160-41 = "ハスミさんは最後のリレー以外、一切参加されませんでしたよね？"
10016160-43 = "射撃やボール投げといった、ハスミさんの特技を活かせる競技も多かったと思うのですが……"
10016160-44 = "あえて参加しなかった理由を聞いてもよろしいですか？"
10016160-45 = "それは……"
10016160-46 = "実行委員の立場上、みなさんと一緒になって楽しむのは心苦しく……"
10016160-47 = "私が楽しんでいる間にも、誰かが自分の分まで仕事をしていると考えたら……#nそのような思いで、今回は仕事に集中しておりました。"
10016160-48 = "……結果的に、最後は私も楽しんでしまいましたが。"
10016160-49 = "今回の開催期間中、そのようなお話を何度か耳にしました。"
10016160-50 = "自分が楽しんでいる裏で、誰かが苦労している。#n逆に自分が苦労しているから、誰かが楽しめている、といった内容を。"
10016160-51 = "みんなが楽しめるお祭りなんて、虚構に過ぎないと。"
10016160-52 = "ですが、私は自分の行動次第で何だって叶えられると思っています。"
10016160-54 = "合理的ではないと、ユウカちゃんからよく言われますが……#n私はこの不合理な考えが結構好きなんです。"
10016160-55 = "……。"
10016160-56 = "ハスミさんはどうでしょう？#nこの不合理なお祭りを楽しんでいただけましたか？"
10016160-57 = "はい、それはもちろん。#nとても楽しいお祭りでした。"
10016160-58 = "ふふ。そう言っていただけると、頑張って準備した甲斐があります。"
10016160-59 = "このように、学園外の方とお茶をして1日を終えるのも良いものですね。"
10016160-61 = "理由がなくとも、こういった場を今後も設けたいものです。"
10016160-65 = "ところでハスミさん、こんな言葉を聞いたことはありますか？"
10016160-67 = "……帰るまでが、晄輪大祭だと。"
10016160-68 = "……はい？それは、どういう……"
10016160-69 = "先ほども申し上げましたが……#n私は自分の行動次第で何だって実現できると思っています。"
10016160-70 = "気を抜かずにいきましょう。元気の有り余っている生徒たちが、「後夜祭」で何を起こすかまだ分かりませんからね。"
10016160-71 = "今日の出来事を振り返ると、ノアさんが懸念される気持ちも理解できますが……"
10016160-72 = "さすがに各学園の生徒会役員が集結している日に、わざわざ騒ぎを起こすような方は――"
10016160-77 = "ハスミさん、大変です！"
10016160-78 = "ゲヘナの生徒が「後夜祭」のキャンプファイヤーでバーベキューをすると言い出し、警備員と衝突しています！"
10016160-79 = "また、花火の色に不満を抱いた生徒が、たき火に金属粉を投げ入れようとしており……"
10016160-80 = "……。"
10016160-81 = "あら、それは一大事ですね。"
10016160-82 = "正義実現委員のみなさんを今すぐ呼んでください。"
10016160-83 = "それと、アスレチックスタジアム内にある消火設備を集めて、消火準備をお願いします。"
10016160-84 = "……ゲヘナの行政官はどちらに？"
10016160-85 = "それが……アコ行政官は、ヒナ委員長を探すと言ったきり戻ってこず……"
10016160-86 = "場内の消火設備は、ゲヘナの生徒が「温泉開発に使う」と訳の分からないことを言いながら、全て持って行ってしまいました……"
10016160-87 = "……。"
10016160-92 = "ねえ、ちょっと！#nゲヘナの給食室から謎の生命体が脱走したって……！"
10016160-93 = "……えっ！？パンケーキが空を飛んでない！？"
10016160-98 = "絶対に……"
10016160-99 = "絶対に許しません、ゲヘナ――！"
