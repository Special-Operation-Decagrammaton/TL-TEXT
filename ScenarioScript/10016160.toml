[translation]
10016160-1 = "Epílogo parte 6; Edição do Comitê Executivo"
10016160-6 = "Ufa... que tranquilidade..."
10016160-7 = "O cansaço do dia vai embora com esta xícara..."
10016160-8 = "Nunca bebi um chá tão maravilhoso... tem um aroma doce que acalma de forma misteriosa, é muito gostoso."
10016160-9 = "Está na temperatura ideal, fácil de beber, e o aroma se espalha..."
10016160-10 = "Quando eu preparei antes, não tinha um aroma tão rico...#nComo esperado de você, Hasumi-san."
10016160-14 = "Fufu, é graças às ótimas folhas de chá que recebi da Festa do Chá."
10016160-15 = "Ainda temos mais, então, se alguém quiser repetir, é só pedir."
10016160-19 = "Ora, sua xícara está vazia. Gostaria de mais uma?"
10016160-20 = "Sim, por favor."
10016160-29 = "...Ouvi dizer que a vice-presidente do Comitê de Justiça é rigorosa com chás, e parece que o boato era verdade."
10016160-30 = "Não imaginei que alguém pudesse extrair um sabor tão refinado e preciso manualmente."
10016160-31 = "Obrigada por me proporcionar uma experiência tão valiosa."
10016160-32 = "Fico feliz que tenha gostado, isso é o que mais importa."
10016160-36 = "Você é a... Ushio Noa-san, certo...?"
10016160-37 = "Já nos cruzamos algumas vezes, mas acho que nunca nos encontramos aqui no escritório do Comitê Executivo."
10016160-38 = "Sim. É a primeira vez que conversamos assim, mas já ouvi falar de você pela Yuuka-chan."
10016160-39 = "Como eu fiquei principalmente na gestão de campo durante este 'Festival Esportivo', não tive muito contato com você, Hasumi-san, que cuidou da parte administrativa."
10016160-40 = "Entendo. Peço desculpas por não ter me apresentado antes."
10016160-41 = "Hasumi-san, você não participou de nada além do revezamento final, não é?"
10016160-43 = "Acho que havia muitas competições onde você poderia ter aproveitado suas habilidades, como tiro e arremesso de bola..."
10016160-44 = "Poderia me dizer o motivo de ter escolhido não participar?"
10016160-45 = "Isso é..."
10016160-46 = "Pela minha posição no Comitê Executivo, sinto-me mal em me divertir junto com todos..."
10016160-47 = "Pensar que, enquanto eu me divirto, alguém está trabalhando no meu lugar...#nCom esse pensamento, concentrei-me no trabalho desta vez."
10016160-48 = "...Embora, no fim das contas, eu tenha acabado me divertindo também."
10016160-49 = "Durante o período do evento, ouvi esse tipo de conversa algumas vezes."
10016160-50 = "Que, por trás de quem se diverte, alguém está sofrendo. #nOu, inversamente, que alguém só consegue se divertir porque outra pessoa está se sacrificando."
10016160-51 = "Diziam que um festival onde todos se divertem não passa de uma ficção."
10016160-52 = "Mas eu acredito que, dependendo das minhas ações, posso realizar qualquer coisa."
10016160-54 = "A Yuuka-chan costuma dizer que isso não é racional...#nMas eu gosto bastante desse pensamento irracional."
10016160-55 = "..."
10016160-56 = "E você, Hasumi-san?#nConseguiu aproveitar este festival irracional?"
10016160-57 = "Sim, claro. #nFoi um festival muito divertido."
10016160-58 = "Fufu. Fico feliz em ouvir isso, valeu a pena todo o esforço na preparação."
10016160-59 = "É muito bom terminar o dia tomando um chá com alguém de fora da escola assim."
10016160-61 = "Mesmo sem um motivo específico, gostaria de criar momentos como este no futuro."
10016160-65 = "A propósito, Hasumi-san, você já ouviu essa frase?"
10016160-67 = "...O Festival Esportivo só acaba quando você chega em casa."
10016160-68 = "...Sim? O que isso quer dizer..."
10016160-69 = "Como eu disse antes...#nEu acredito que posso realizar qualquer coisa dependendo das minhas ações."
10016160-70 = "Vamos ficar alertas. Não sabemos o que as alunas cheias de energia podem causar no 'Festival Noturno'."
10016160-71 = "Relembrando os acontecimentos de hoje, entendo a sua preocupação, Noa-san, mas..."
10016160-72 = "É difícil acreditar que alguém causaria confusão justamente no dia em que os membros dos conselhos estudantis de todas as escolas estão reunidos—"
10016160-77 = "Hasumi-san, é uma emergência!"
10016160-78 = "As alunas de Gehenna disseram que vão fazer um churrasco na fogueira do 'Festival Noturno' e estão entrando em conflito com os seguranças!"
10016160-79 = "Além disso, uma aluna insatisfeita com a cor dos fogos de artifício está tentando jogar pó metálico na fogueira..."
10016160-80 = "..."
10016160-81 = "Ora, isso é um problema sério."
10016160-82 = "Chame os membros do Comitê de Justiça imediatamente."
10016160-83 = "Além disso, reúnam os equipamentos de combate a incêndio dentro do estádio atlético e preparem-se para apagar qualquer fogo."
10016160-84 = "……Onde está o oficial administrativo de Gehenna?"
10016160-85 = "Sobre isso…… a oficial administrativa Ako disse que ia procurar a presidente Hina e não voltou desde então……"
10016160-86 = "Os equipamentos de combate a incêndio do estádio foram todos levados por alunos de Gehenna, que disseram algo sem sentido sobre 'usá-los para o desenvolvimento de fontes termais'……"
10016160-87 = "……."
10016160-92 = "Ei, espera um pouco!#nDisseram que uma forma de vida misteriosa escapou da cozinha de Gehenna……!"
10016160-93 = "……Hã!? Panquecas não estão voando pelo céu!?"
10016160-98 = "Eu nunca……"
10016160-99 = "Eu nunca vou perdoar vocês, Gehenna——!"
