[translation]
1600806-1 = "A gentileza de uma policial preguiçosa"
1600806-2 = "（Já que vim até a Academia de Polícia Valkyrie, visitei o escritório do Departamento de Segurança Pública para ver como Fubuki estava）"
1600806-4 = "Academia de Polícia Valkyrie - Departamento de Segurança Pública"
1600806-5 = "Eu já disse, isso não é nosso trabalho..."
1600806-6 = "Mas me disseram que, se eu estivesse com problemas, deveria procurar o Departamento de Segurança Pública..."
1600806-7 = "Eu estou realmente em apuros!"
1600806-8 = "Mesmo que digam isso, esse tipo de problema é um pouco..."
1600806-9 = "Por favor, aquele grampo de cabelo é único no mundo, é muito importante..."
1600806-10 = "É um grampo precioso que minha avó fez para o meu aniversário...!"
1600806-11 = "...Gerenciar itens perdidos é trabalho do Departamento de Segurança Pública, mas sair por aí procurando um objeto perdido é outra história."
1600806-12 = "Quando foi que você percebeu que tinha perdido?"
1600806-13 = "Quando saí de casa, eu estava usando... mas quando cheguei na escola, nem percebi quando..."
1600806-14 = "Talvez em algum lugar no caminho para a escola...?"
1600806-15 = "...Entendi a situação, mas se nem você sabe onde perdeu, não posso sair por aí procurando sem rumo."
1600806-16 = "Mesmo sendo o Departamento de Segurança Pública, nossos recursos humanos são limitados."
1600806-17 = "Mentira! Eu sei que as alunas do Departamento de Segurança Pública não têm nada para fazer e passam o dia todo tirando cochilos!"
1600806-18 = "E mesmo assim, dizem que não têm tempo para procurar meu grampo... que horror!"
1600806-19 = "Bem, não vou negar a parte dos cochilos. Mas, para estar pronta para chamados de emergência, não posso deixar o escritório vazio por muito tempo."
1600806-20 = "...De qualquer forma, se algum item perdido parecido for entregue, entraremos em contato, então pode deixar seu contato aqui?"
1600806-21 = "...Policial chata, idiota!"
1600806-27 = "...Ah, levei bronca de novo."
1600806-28 = "...Espera, Sensei? H-há quanto tempo você estava aí...?"
1600806-29 = "[s] \"Desculpe, desde o começo, praticamente.\""
1600806-30 = Entendi, que vergonha ser vista em um momento desses..."
1600806-31 = "Bem, não se preocupe. Esse tipo de coisa acontece sempre."
1600806-32 = "Procurar objetos perdidos, abrir portas trancadas, procurar animais de estimação... se fôssemos atender a tudo, não teríamos fim."
1600806-33 = "[s] \"Não tem como você procurar o grampo dela?\""
1600806-34 = "...Se pelo menos soubéssemos o local exato, seria bom, mas o caminho que ela faz para a escola é bem longo."
1600806-35 = "Se fôssemos procurar em cada canto daquele caminho, acho que um dia inteiro não seria suficiente."
1600806-36 = "Se eu aceitar um pedido, outra pessoa pode ficar sabendo e perguntar 'por que não faz o meu também?'. Se ficarmos ocupados com isso e não pudermos atender ao que é realmente importante, seria contraproducente. Por isso, basicamente, temos que recusar."
1600806-37 = "[s1] \"Bem, faz sentido...\"\n[s2] \"A Fubuki é bem sensata.\""
1600806-38 = "...Ah."
1600806-39 = "Claro, mesmo sendo assim, sou uma policial profissional. Não posso me deixar levar por emoções triviais."
1600806-40 = "...Ah."
1600806-41 = "Falando nisso, Sensei, meus donuts acabaram."
1600806-42 = "Desculpe o incômodo, mas você poderia cuidar do escritório enquanto vou comprar mais? Volto antes da próxima troca de turno, por favor."
1600806-43 = "[s] \"Por mim tudo bem, mas e quanto a estar pronta para emergências?\""
1600806-44 = "B-bem, para isso tem a Kirino e as outras..."
1600806-45 = "Além disso, donuts são mais importantes que o trabalho do Departamento de Segurança Pública!"
1600806-46 = "De qualquer forma, volto logo. Então, conto com você."
1600806-55 = "No entanto, depois disso, Fubuki não voltou mesmo após o horário da troca de turno..."
1600806-56 = "[ns] Ir procurar a Fubuki."
1600806-59 = "D.U. Distrito Central - Perto da escola primária pública"
1600806-62 = "Encontrei a Fubuki procurando algo nos arbustos do caminho para a escola."
1600806-67 = "...Tsc, um abridor de garrafas."
1600806-69 = "Não é esse também..."
1600806-70 = "[s] \"Fubuki.\""
1600806-71 = "Hmm... ah, Sensei!? P-por que você está aqui...!?"
1600806-72 = "Ah, o horário?"
1600806-73 = "Ah... desculpe, desculpe, é que a fila estava enorme hoje."
1600806-74 = "Isso é, bem... eu deixei cair meu donut no caminho de volta."
1600806-75 = "Como é redondo, ele sai rolando, né? Tenho quase certeza de que foi por aqui..."
1600806-76 = "[s] \"...Quer que eu ajude?\""
1600806-77 = "Não, não precisa se incomodar, Sensei, veja bem...!"
1600806-79 = "...Hehe, acho que não dá para enganar o Sensei mesmo."
1600806-80 = "...Em princípio, não deveria. Mas dizer que meu coração não balançou ao ver aquela expressão seria mentira."
1600806-81 = "Bem, não dá para fazer isso sempre... e não teria graça nenhuma comer um donut me sentindo assim."
1600806-82 = "Então, estou apenas matando aula para poder comer um donut delicioso. É isso."
1600806-83 = "[s] \"Entendi, então eu vou ajudar.\""
1600806-84 = "..."
1600806-85 = "[s] \"Eu também quero comer um donut delicioso.\""
1600806-89 = "...Então não tem jeito. É um incômodo, mas não tenho escolha."
1600806-90 = "Certo, Sensei, cuide daquela área ali. Eu vou cuidar desta aqui."
1600806-93 = "(Alguns minutos depois...)"
1600806-98 = "Achei, é o grampo de cabelo!"
1600806-99 = "Que bom... obrigada."
1600806-100 = "Então, vamos dizer que foi \"entregue como um item perdido encontrado por acaso\"."
1600806-101 = "[s] \"Acho que não teria problema dizer que você encontrou, não é?\""
1600806-102 = "Porque dá muito trabalho..."
1600806-103 = "Se descobrirem, com certeza vão aparecer com mais casos problemáticos para eu resolver. Eu não quero isso de jeito nenhum."
1600806-104 = "Eu só quero poder comer meu donut em paz."
1600806-105 = "[s] \"Entendi. Então, quer ir comprar um donut agora?\""
1600806-106 = "Pode ser. Ah, por acaso o Sensei vai pagar para mim?"
1600806-107 = "[s3] \"Com certeza.\"\n[s4] \"Você se esforçou bastante, afinal.\""
1600806-108 = "Então, eu quero um donut glaceado da \"Master Donut\"!"
1600806-109 = "Então, eu quero um donut glaceado da \"Master Donut\"!"
1600806-110 = "É sempre delicioso, mas hoje, com esse problema resolvido e sendo por conta do Sensei... nossa, vai ser bom demais!"
1600806-112 = "Depois de devolver o grampo de cabelo para a garota, comi um donut delicioso junto com a Fubuki."
