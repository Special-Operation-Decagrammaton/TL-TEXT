[translation]
1600806-1 = "怠けがちな警察官の親切"
1600806-2 = "（せっかくヴァルキューレ警察学校に来ていたので、フブキの様子を見に生活安全局の事務所を訪れた）"
1600806-4 = "ヴァルキューレ警察学校・生活安全局"
1600806-5 = "だーから、それはうちらの仕事じゃなくって……。"
1600806-6 = "でも、困ったことがあったら生活安全局にって言われたし……。"
1600806-7 = "本当にすっごく困ってるの！"
1600806-8 = "そうは言われても、こういう問題はちょっと……。"
1600806-9 = "お願い、あのヘアピンは世界に一つだけの大切な……"
1600806-10 = "おばあちゃんが誕生日に作ってくれた、大事なヘアピンなの……！"
1600806-11 = "……忘れ物の管理とかは生活安全局の仕事だけど、わざわざ落とし物を探すのは別の話。"
1600806-12 = "気が付いたのは、いつなんだっけ？"
1600806-13 = "家を出る時は、ちゃんと付けてたのに……学校に着いたら、いつの間に……。"
1600806-14 = "通学路のどこか、かも……？"
1600806-15 = "……事情は分かったけど、どこで失くしたのかも微妙だとすると、そのためにむやみやたらに動くなんてのはできないよ。"
1600806-16 = "いくら生活安全局でも、人員リソースに限界はある。"
1600806-17 = "嘘つき！生活安全局の生徒はやることが無くて、毎日昼寝ばっかりだって知ってるもん！"
1600806-18 = "それなのに、私のヘアピンを探す時間は無いなんて……ひどい！"
1600806-19 = "まあ、昼寝については否定はしないけど。緊急出動に備える意味でも、事務所を長い時間留守にはできないの。"
1600806-20 = "……とりあえずそんな感じの遺失物が届いたら連絡するから、連絡先でも残しておいてくれる？"
1600806-21 = "……警察のお姉ちゃんのバカっ！"
1600806-27 = "……あーあ、また怒られた。"
1600806-28 = "……って、先生？い、いつから見てた……？"
1600806-29 = "[s] \"ごめん、結構最初の方から。\""
1600806-30 = "そっか、何だか恥ずかしいところ見られたな……。"
1600806-31 = "まあ気にしないで。ああいうのはよくあることだから。"
1600806-32 = "忘れ物を探してだとか、ドアの鍵を開けてだとか、ペットを探してだとか……全部対応してたらキリがない。"
1600806-33 = "[s] \"ヘアピンを探してあげることはできないの？\""
1600806-34 = "……せめて場所が特定できてるなら良いけど、あの子の通学路は結構な距離がある。"
1600806-35 = "その道を隅々まで探すとなると、一日あっても多分足りない。"
1600806-36 = "一回依頼を聞いちゃえば、それを知った誰かさんから「私のはどうして」って言われることになるかもしれない。それで忙しくなって大事なことに対応できなきゃ本末転倒。だから基本的には、断るしかない。"
1600806-37 = "[s1] \"それはまあ、そうなんだろうね……。\"\n[s2] \"フブキは冷静だね。\""
1600806-38 = "……あー。"
1600806-39 = "もちろん、私だってこれでもプロの警察だから。些細な感情に揺らいでられないの。"
1600806-40 = "……あー。"
1600806-41 = "そういえば先生、ちょっとドーナッツが切れててさ。"
1600806-42 = "悪いんだけど買ってくるまでの間、留守番しててくれる？次の交代の時間までには戻るからさ、お願い。"
1600806-43 = "[s] \"全然良いんだけど、緊急出動に備えるのは？\""
1600806-44 = "ま、まあそっちはキリノとかが……。"
1600806-45 = "それに生活安全局の仕事より、ドーナッツの方が大事！"
1600806-46 = "とにかく、早めに戻るからさ。じゃ、よろしく。"
1600806-55 = "しかしその後、フブキは交代の時間が過ぎても戻ってこなかった……。"
1600806-56 = "[ns] フブキを探しに行く。"
1600806-59 = "D.U.中央区・公立小学校付近"
1600806-62 = "通学路の茂みの中で、探し物をしてるフブキを見つけた。"
1600806-67 = "……ちっ、栓抜きか。"
1600806-69 = "これでもないし……。"
1600806-70 = "[s] \"フブキ。\""
1600806-71 = "んー……え、先生！？ど、どうしてここに……！？"
1600806-72 = "え、時間？"
1600806-73 = "あー……ごめんごめん、今日はやたら列が長くってさあ。"
1600806-74 = "これはえっと……帰り道に、ドーナッツを落としちゃって。"
1600806-75 = "やっぱ丸いから転がるんだよね、確かこの辺に行ったと思うんだけど……。"
1600806-76 = "[s] \"……じゃあ、手伝おうか？\""
1600806-77 = "いや、先生に手伝ってもらわなくても、ほらその……！"
1600806-79 = "……ふふっ、やっぱ先生は騙せなかったか。"
1600806-80 = "……原則的にはダメなんだよ。でもあんな表情を見て、心が動かないと言ったらそれは嘘。"
1600806-81 = "ま、毎回全部は無理だけどさ……あんな気分でドーナッツを食べたところで、美味しくないし。"
1600806-82 = "だからこれは、美味しいドーナッツを食べるためにサボってるだけ。そういうことだから。"
1600806-83 = "[s] \"うん、だから手伝うよ。\""
1600806-84 = "……。"
1600806-85 = "[s] \"私も、美味しいドーナッツが食べたいから。\""
1600806-89 = "……ならしょうがない。面倒だけど、背に腹は代えられないってね。"
1600806-90 = "じゃあ先生は、そっちの方をよろしく。こっちは私がやるから。"
1600806-93 = "（数分後……）"
1600806-98 = "あった、ヘアピンだ！"
1600806-99 = "良かった……ありがとね。"
1600806-100 = "じゃ、「偶然忘れ物として届いた」ってことで。"
1600806-101 = "[s] \"見つけてあげたって言っても良いと思うよ？\""
1600806-102 = "だってめんどくさいじゃん……。"
1600806-103 = "そんなことバレたら、またどっかからめんどくさい案件が持ち込まれるに決まってるし。そんなの絶対嫌。"
1600806-104 = "私はただ、ドーナッツが美味しく食べられればそれで。"
1600806-105 = "[s] \"そっか。じゃあ、今からドーナッツ買いに行く？\""
1600806-106 = "だね。あ、もしかして先生が奢ってくれたりする？"
1600806-107 = "[s3] \"もちろん。\"\n[s4] \"一生懸命頑張ったからね。\""
1600806-108 = "じゃあ、「マスタードーナッツ」のグレーズド・ドーナッツで！"
1600806-109 = "じゃあ、「マスタードーナッツ」のグレーズド・ドーナッツで！"
1600806-110 = "いつ食べても勿論美味しいものだけど、今日は面倒なことが片付いた上に先生の奢り……いやぁ、これは相当美味しいだろうなー！"
1600806-112 = "ヘアピンを持ち主の女の子に返してから、フブキと一緒にドーナッツを美味しく食べた。"
