[translation]
10026030-1 = "第3話;調査ポイントA「石造りの迷路」"
10026030-2 = "（まずは一番近い遺跡に向かった）"
10026030-6 = "こ、これが遺跡……ですか？"
10026030-7 = "たしかに、見えなくはありませんが……"
10026030-8 = "風化こそしていますが……この石模様は、聖徒会の遺跡に間違いないでしょう。"
10026030-13 = "そ、そうねっ。私もそう思ったわ。"
10026030-14 = "……あら？"
10026030-15 = "コハルちゃんは、ここがどこか知っていたのですか？"
10026030-16 = "んっ……！？も、もちろん！見れば分かるじゃない！？#nあ、あんた達も知ってたんでしょ……？"
10026030-17 = "ど、どうして私だけ知らないと思ったの！？"
10026030-18 = "たしかに、みんな知ってるのにコハルちゃんだけ知らないのもおかしなお話ですね。#nふふ、すごいです、コハルちゃん。"
10026030-19 = "こ、これくらい当然よ！"
10026030-23 = "……あれ。まさか、からかってるんじゃないよね……？"
10026030-28 = "[ns1] \"……ウイ？\"\n[ns2] \"何か気づいたことある……？\""
10026030-31 = "い、いえ……そうでは、ないのですが……"
10026030-32 = "ただ、少し考え事を……#nここがユスティナ聖徒会の遺跡だと仮定すると……"
10026030-33 = "うーん……地図に記された位置や規模感……それに迷路のような構造……"
10026030-34 = "……おそらく、試験場か訓練場のようなもの、かもしれません。#nもしくは、その両方でしょうか。"
10026030-35 = "とにかく、手分けして調査してみましょう。#n区切りの良いところで、またここに……"
10026030-36 = "では、私はあちらの方へ――"
10026030-40 = "う、ウイさん……？"
10026030-41 = "ふふ。ウイさんは元気なお方ですね。#nお一人で奥まで積極的に♡"
10026030-42 = "とりあえず、ウイさんが言っていたように……"
10026030-43 = "私たちも続きましょうか？"
10026030-51 = "（さっそく奥に進み、手がかりを探し始めた）"
10026030-52 = "（苔むしていたり、木の柱が倒れていたり、複雑に道が入り組んでいるようだ）"
10026030-53 = "（ところで……）"
10026030-57 = "[ns3] \"……今は手分けして調査するはずじゃ？\"\n[ns4] \"そんなに強く握られると、袖が伸びちゃうんだけど……。\""
10026030-60 = "な、何か問題でもあるの！？"
10026030-61 = "さっきも言ったでしょ！？先生とハナコを監視するのが私の使命なの！"
10026030-62 = "本当なら、ハナコも監視しないといけないんだけど……"
10026030-63 = "身体がひとつしか無いんだから、仕方ないじゃん！#nそれに、こんな遺跡で一人にされたら……"
10026030-64 = "……ん？"
10026030-65 = "ハナコじゃなくて、先生と一緒に居る理由……？"
10026030-66 = "な、なんでそんな質問するの！？エッチ！変態！！"
10026030-70 = "……ひっ！？"
10026030-75 = "……あっ。"
10026030-76 = "……あれ……？"
10026030-77 = "[s5] \"ウイだ。\"\n[s6] \"他にも誰かと会った？\""
10026030-80 = "はい。先ほど、ヒナタさんともすれ違いましたよ。"
10026030-81 = "興味深い造りですね。なぜ、わざわざ迷路にしたのか。その意図は……？"
10026030-85 = "そういえば先生、隣の方は……"
10026030-86 = "……！？"
10026030-87 = "あ、わっ、私？……えっと、その……"
10026030-88 = "[s7] \"さっき、そこで偶然ね。\"\n[s8] \"コハルには、私が頼んでついてきてもらったんだ。\""
10026030-91 = "……なるほど、そうでしたか。"
10026030-92 = "では、私はこれで……"
10026030-93 = "……え？私も、一緒に……ですか？"
10026030-94 = "一緒に……うーん、一緒に…………。"
10026030-101 = "いえ……すみません。私は一人で行動します。#n会ったばかりの方と行動するのは、まだ、ちょっと……"
10026030-102 = "それに、今は仕事に集中しないといけませんし……"
10026030-103 = "すみません……コハルさんが苦手、とかでは、ありませんので……で、では。"
10026030-107 = "ふぅ……びっくりした……。"
10026030-108 = "……ん？悪い人じゃないのは、分かるけど……"
10026030-109 = "べ、別に緊張なんかしてないわよ！？誰かに聞かれたらどうするつもりなの！#n私がすぐ緊張するような人に思われちゃ……"
10026030-113 = "ひぃっ！？"
10026030-118 = "……ん？"
10026030-119 = "あっ、先生。後ろの方は……コハルさん、ですよね？"
10026030-120 = "……。"
10026030-121 = "……あ……こ、こんに……ちは。"
10026030-122 = "はい、こんにちは。#n先ほどはウイさんともお会いしましたし、面白い遺跡ですね！"
10026030-123 = "は、はい……。"
10026030-124 = "[ns] \"…………。\""
10026030-128 = "（その後も石造りの迷路のような遺跡を歩いていると、何度もウイたちと会った）"
10026030-130 = "[ns9] \"この辺りを調べたら、集合場所に戻ろうか。\"\n[ns10] \"お疲れ様。頑張ったね、コハル。\""
10026030-133 = "ふぅ……って、そこまで疲れてるように見えた！？"
10026030-134 = "みんなに話しかけられてたから……？"
10026030-135 = "べ、別に私、人見知りじゃないからね！#n途中からは、ちゃんと挨拶できてたでしょ……？"
10026030-136 = "さ、流石にもう何回も会ったんだし……"
10026030-140 = "……！"
10026030-141 = "よ、よしっ。今度は私から挨拶するんだからっ！"
10026030-142 = "そこで見ててよね、先生！"
10026030-148 = "こ、こ……"
10026030-150 = "こんにち……わっ！？"
10026030-153 = "…………。"
10026030-154 = "…………。"
10026030-155 = "…………。"
10026030-159 = "きゃぁぁあああっ！！！！！！"
