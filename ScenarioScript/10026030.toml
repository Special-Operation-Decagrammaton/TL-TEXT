[translation]
10026030-1 = "Episódio 3; Ponto de Investigação A: \"Labirinto de Pedra\""
10026030-2 = "（Primeiro, fomos em direção às ruínas mais próximas）"
10026030-6 = "I-Isso é... uma ruína?"
10026030-7 = "Bem, não dá para dizer que não é, mas..."
10026030-8 = "Embora esteja desgastado pelo tempo... esses padrões na pedra, sem dúvida, pertencem às ruínas da Sociedade das Santas."
10026030-13 = "I-Isso mesmo. Eu também pensei o mesmo."
10026030-14 = "……Oh?"
10026030-15 = "Koharu-chan, você já sabia onde era este lugar?"
10026030-16 = "Ngh...!? C-Claro! Dá para saber só de olhar, não dá!?#nAh, vocês também sabiam, né...?"
10026030-17 = "P-Por que você achou que só eu não sabia?!"
10026030-18 = "É verdade, seria estranho se todos soubessem, menos a Koharu-chan.#nFufu, você é incrível, Koharu-chan."
10026030-19 = "I-Isso é o básico!"
10026030-23 = "……Ei. Vocês não estão me zoando, né...?"
10026030-28 = "[ns1] \"……Ui?\"\n[ns2] \"Notou alguma coisa……?\""
10026030-31 = "N-Não... não é isso..."
10026030-32 = "É só que, eu estava pensando um pouco...#nSe assumirmos que estas são as ruínas da Sociedade das Santas Justina..."
10026030-33 = "Hmm... a localização e a escala marcadas no mapa... além dessa estrutura de labirinto..."
10026030-34 = "……Talvez seja algum tipo de campo de testes ou de treinamento.#nOu talvez, ambos."
10026030-35 = "De qualquer forma, vamos nos separar para investigar.#nQuando terminarmos uma parte, nos encontramos aqui novamente..."
10026030-36 = "Bem, eu vou por ali――"
10026030-40 = "U-Ui-san...?"
10026030-41 = "Fufu. A Ui-san é uma pessoa bem energética, não é?#nIndo sozinha até o fundo com tanta disposição♡"
10026030-42 = "Bem, como a Ui-san disse..."
10026030-43 = "Devemos segui-la?"
10026030-51 = "（Imediatamente avançamos para o interior e começamos a procurar por pistas）"
10026030-52 = "（O caminho parece ser complexo, com musgo, pilares de madeira caídos e muitas voltas）"
10026030-53 = "（A propósito……）"
10026030-57 = "[ns3] \"……Não deveríamos estar investigando separados?\"\n[ns4] \"Se você apertar meu braço com tanta força, vai esticar a manga da minha roupa…….\""
10026030-60 = "A-Algum problema com isso!?"
10026030-61 = "Eu já disse antes, não disse!? Minha missão é vigiar o Sensei e a Hanako!"
10026030-62 = "Na verdade, eu deveria estar vigiando a Hanako também, mas..."
10026030-63 = "Eu não tenho o dom da onipresença, então não tem jeito!#nAlém disso, se eu ficar sozinha nessas ruínas..."
10026030-64 = "……Ngh?"
10026030-65 = "O motivo de eu estar com o Sensei em vez da Hanako...?"
10026030-66 = "P-Por que você está perguntando isso!? Pervertida! Tarada!!"
10026030-70 = "……Hii!?"
10026030-75 = "……Ah."
10026030-76 = "……Ué……?"
10026030-77 = "[s5] \"É a Ui.\"\n[s6] \"Você encontrou mais alguém?\""
10026030-80 = "Sim. Acabei de cruzar com a Hinata-san também."
10026030-81 = "É uma construção interessante. Por que se deram ao trabalho de fazer um labirinto? Qual seria a intenção...?"
10026030-85 = "Falando nisso, Sensei, quem é a pessoa ao seu lado..."
10026030-86 = "……!?"
10026030-87 = "A-Ah, e-eu?…… Bem, é que..."
10026030-88 = "[s7] \"Nos encontramos por acaso ali agora pouco.\"\n[s8] \"Eu pedi para a Koharu vir comigo.\""
10026030-91 = "……Entendo, foi assim então."
10026030-92 = "Bem, então eu vou indo..."
10026030-93 = "……Eh? Eu também, para ir junto……?"
10026030-94 = "Juntos…… hmm, juntos…………."
10026030-101 = "Não…… desculpe. Eu prefiro agir sozinha.#nAinda é um pouco difícil para mim agir junto com alguém que acabei de conhecer……"
10026030-102 = "Além disso, agora eu preciso me concentrar no trabalho..."
10026030-103 = "Desculpe... não é que eu não goste da Koharu-san, é que... b-bem, então..."
10026030-107 = "Ufa... que susto..."
10026030-108 = "...Hm? Eu sei que ela não é uma pessoa má, mas..."
10026030-109 = "E-eu não estou nervosa, tá bom!? E se alguém ouvir você falando isso! #nNão quero que pensem que eu sou o tipo de pessoa que fica nervosa facilmente..."
10026030-113 = "Iiiih!?"
10026030-118 = "...Hm?"
10026030-119 = "Ah, Sensei. A pessoa atrás de você é... a Koharu-san, não é?"
10026030-120 = "..."
10026030-121 = "...Ah... o-olá..."
10026030-122 = "Sim, olá. #nEu encontrei a Ui-san agora pouco também, que ruínas interessantes!"
10026030-123 = "S-sim..."
10026030-124 = "[ns] \"............\""
10026030-128 = "(Depois disso, enquanto caminhávamos pelas ruínas que pareciam um labirinto de pedra, encontramos a Ui e os outros várias vezes)"
10026030-130 = "[ns9] \"Vamos voltar para o ponto de encontro depois de investigar esta área.\"\n[ns10] \"Bom trabalho. Você se esforçou, Koharu.\""
10026030-133 = "Ufa... espera, eu parecia tão cansada assim!?"
10026030-134 = "Será que foi porque todo mundo veio falar comigo...?"
10026030-135 = "E-eu não sou tímida, tá bom! #nNo meio do caminho, eu consegui cumprimentar todo mundo direitinho, não consegui...?"
10026030-136 = "D-dá para ver que já nos encontramos várias vezes..."
10026030-140 = "...!"
10026030-141 = "T-tudo bem. Dessa vez eu vou cumprimentar primeiro!"
10026030-142 = "Fique aí olhando, Sensei!"
10026030-148 = "O-o..."
10026030-150 = "Olá... ué!?"
10026030-153 = "............"
10026030-154 = "............"
10026030-155 = "............"
10026030-159 = "Aaaaaaaahhhhhhh!!!!!!!!!!"
