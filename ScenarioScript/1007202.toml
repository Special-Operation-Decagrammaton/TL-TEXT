[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1007202-1 = "Operação de Abastecimento Subaquático (1)" 
1007202-3 = "（Após receber a mensagem da Saki, peguei o equipamento de pesca e fui até o cais.）" 
1007202-6 = "Sensei, por aqui." 
1007202-7 = "Trouxe os equipamentos que eu pedi?" 
1007202-11 = "Rede de imersão, rede de arrasto e uma faca de pesca..." 
1007202-12 = "Perfeito, tá tudo aqui." 
1007202-13 = "Eu vou fazer um alongamento rápido, então espere um minutinho." 
1007202-14 = "[s] \"Ahm, e o que exatamente nós vamos fazer com isso...?\"" 
1007202-15 = "Eu te disse antes, não disse?\nJá que viemos até a praia, nós vamos capturar peixes." 
1007202-16 = "Ainda agora, fui pedir permissão para o pessoal da vila." 
1007202-17 = "[s] \"Permissão...?\"" 
1007202-18 = "Sim. Os frutos do mar são propriedades administradas pela vila de pescadores.\nNós não podemos simplesmente pegar sem autorização." 
1007202-19 = "Por isso, perguntei se poderíamos pescar um pouco para o nosso jantar, e eles permitiram de bom grado." 
1007202-20 = "Eles são pessoas muito gentis, não é.\nMesmo a gestão da área de pesca sendo tão difícil..." 
1007202-21 = "Aliás, Sensei, tem algum peixe que você gostaria de comer?" 
1007202-22 = "Você está sempre cuidando da gente... então hoje eu vou trazer um banquete como forma de agradecimento por tudo." 
1007202-23 = "Até mesmo o cobiçado pargo, que é absurdamente caro nos mercados, vai sair de graça se formos nós mesmos que o pescar!" 
1007202-24 = "[s] \"Com mergulho livre (sem equipamentos)...?\"" 
1007202-25 = "O que foi? Tá duvidando das minhas habilidades?" 
1007202-26 = "Quando eu estava na Academia Especial SRT, eu obtive a licença de Master Diver da Associação de Mergulhadores de Kivotos para me preparar para operações navais." 
1007202-27 = "Um Master Diver é aquele capaz de lidar adequadamente com qualquer tipo de emergência subaquática.\nPegar um ou dois peixes vai ser mamão com açúcar." 
1007202-28 = "[s] \"Como eu imaginava, os membros da SRT são fantásticos...\"" 
1007202-30 = "[ns1] \"Eu não tenho frescura pra comida, então...\"\n[ns2] \"Pode ser qualquer peixe que estiver nadando por perto. Cuidado lá embaixo.\"" 
1007202-33 = "Você é realmente uma pessoa sem ambições, Sensei... Mas tudo bem." 
1007202-37 = "Fique no aguardo e espere pelos resultados!" 
1007202-48 = "（Poucos minutos depois...）" 
1007202-54 = "Fuu... Mergulhar depois de tanto tempo é realmente muito bom." 
1007202-58 = "Por enquanto, fique com isso." 
1007202-59 = "[s] \"Ah, é alga Kombu. Parece saborosa.\"" 
1007202-60 = "Sim. Tinha um monte nascendo por aqui." 
1007202-61 = "A alga Kombu é ótima pra fazer caldos (Dashi), mas não é só isso. Se você embrulhar sashimi com ela, a carne fica mais firme e o sabor fica mais profundo. É uma técnica muito usada em restaurantes de alto nível." 
1007202-62 = "Enfim, não é nada mal para um primeiro saque." 
1007202-66 = "Bom... Vou mergulhar de novo!" 
1007202-77 = "（Poucos minutos depois... de novo...）" 
1007202-82 = "......Haa, não era pra ter sido assim." 
1007202-86 = "......Aqui, tome." 
1007202-87 = "[s] \"......Alga Wakame?\"" 
1007202-88 = "Sim. A alga Wakame é rica em ferro e cálcio, sendo um ingrediente curinga usado em diversos pratos." 
1007202-89 = "Como ela encolhe quando desidratada, é excelente tanto para a conservação quanto para a distribuição." 
1007202-90 = "Acho que seria uma boa ideia levarmos frutos do mar com alta durabilidade como esse para o Parque dos Coelhinhos também..." 
1007202-94 = "E-Está tudo bem! Eu vou conseguir pegar um peixe da próxima vez...!" 
1007202-96 = "（Um tempo se passou...）" 
1007202-101 = "......Sensei." 
1007202-102 = "[s] \"Alga Tengusa...?\"" 
1007202-103 = "A alga Tengusa é usada como ingrediente pra fazer gelatina de ágar-ágar e Tokoroten." 
1007202-104 = "Claro que também dá pra comer pura.\nOuvi dizer que é boa pra beleza e pra saúde por ter poucas calorias." 
1007202-105 = "[s3] \"Isso me atrai bastante, mas...\"\n[s4] \"Parece que até agora você só pescou mato do mar...?\"" 
1007202-108 = "Ugh...!" 
1007202-109 = "E não é 'mato do mar', são algas marinhas! Não confunda as coisas!" 
1007202-110 = "Faz um tempo desde a última vez que mergulhei, então eu ainda não peguei o ritmo da coisa...\nEu só fui pegando o que tava nascendo por perto..." 
1007202-111 = "D-Dessa vez eu vou com certeza pegar um pargo gigante pra você!" 
1007202-116 = "（E então, esperando por dezenas de minutos...）" 
1007202-123 = "............Tô de volta." 
1007202-127 = "......Dessa vez, não são algas marinhas." 
1007202-131 = "[ns5] \"Saki...\"\n[ns6] \"Acho que a gente não vai conseguir comer essa estrela-do-mar, sabia...?\"" 
1007202-134 = "I-Isso eu já sei!" 
1007202-135 = "A cor dela era tão bonita que eu só queria te mostrar, Sensei!" 
1007202-136 = "E sobre os peixes..." 
1007202-141 = "......Me desculpe. Foi impossível pegar eles no mergulho livre." 
1007202-142 = "Eu já tive treinamento pra manusear explosivos debaixo d'água e disparar armas de fogo, mas...\nNunca tinha caçado peixes antes..." 
1007202-143 = "Eu não fazia a menor ideia de que os peixes eram tão ágeis daquele jeito." 
1007202-144 = "Não consegui pegar nem os peixinhos menores, muito menos o pargo..." 
1007202-145 = "[s7] \"Tá tudo bem, não se preocupe com isso.\"\n[s8] \"Vamos só comprar no mercado aqui perto e voltar, pode ser?\"" 
1007202-150 = "Isso está fora de cogitação!" 
1007202-151 = "Ficar me gabando de que ia pescar um peixe gigante pra no fim acabar comprando peixe no mercado..." 
1007202-152 = "É uma mancha imperdoável no meu título de Master Diver!" 
1007202-156 = "Se as coisas chegaram nesse ponto, terei que usar a minha arma...!" 
1007202-160 = "[ns] \"Saki, espera――!\"" 
1007202-167 = "[ns] \"......E então, conseguiu pegar algum peixe?\"" 
1007202-168 = "......Consegui, mas..." 
1007202-172 = "O peixe tá... cheio de buracos de bala..." 
1007202-173 = "Nesse estado, acho que não dá pra comer, não é...?" 
1007202-174 = "[s] \"Pois... é...\"" 
1007202-176 = "[ns] \"Já está tarde por hoje, então vamos só comer as algas que você pegou.\"" 
1007202-180 = "......Entendido." 
1007202-181 = "Mas na próxima vez, com toda certeza do mundo, eu vou fazer você saborear o peixe que eu pesquei...!" 
1007202-183 = "（Depois disso, voltamos para a pousada e tomamos uma sopa de alga Wakame e Kombu.）" 
1007202-184 = "（O caldo devia estar muito bem feito, porque estava tão delicioso que acabei comendo demais...）" 