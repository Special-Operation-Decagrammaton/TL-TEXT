[translation]
1007202-1 = "水中補給作戦（１）"
1007202-3 = "（サキから連絡をもらい、漁具を抱えて波止場へ向かった）"
1007202-6 = "先生、こっちだ。"
1007202-7 = "頼んだ装備は、ちゃんと持ってきてくれたか？"
1007202-11 = "タモ網、ネット、それとフィッシングナイフ……"
1007202-12 = "よし、揃ってる。"
1007202-13 = "私は準備運動をするから、ちょっと待っててくれ。"
1007202-14 = "[s] \"えっと、これで何を……？\""
1007202-15 = "前に言っただろう？#nせっかく海まで来たんだから、魚を獲る、って。"
1007202-16 = "さっき、村の人に許可をもらってきたんだ。"
1007202-17 = "[s] \"許可を……？\""
1007202-18 = "ああ。海産物は漁村で管理してるからな。#n許可を得ずに採取してはいけない。"
1007202-19 = "だから、夕食用に海産物を少し獲らせてもらえないか聞いたら、快く許可をくれたんだ。"
1007202-20 = "優しい人たちだよなぁ。#n漁場の管理はとても大変なのに……。"
1007202-21 = "ところで先生、食べたい魚はあるか？"
1007202-22 = "いつも世話になっているし……今日は私が日頃の礼も兼ねて獲ってくるよ。"
1007202-23 = "お店では高くて手が届かない鯛だって、自分で獲ればタダだからな！"
1007202-24 = "[s] \"素潜りで……？\""
1007202-25 = "なんだ、私の実力を疑ってるのか？"
1007202-26 = "SRT特殊学園にいた頃、海洋作戦に備えてキヴォトス海洋ダイバー協会のマスターダイバー資格を取得してるんだ。"
1007202-27 = "水中で緊急事態が起きても的確に対応できるのが、マスターダイバーだからな。#n魚の1匹2匹くらい、朝飯前だ。"
1007202-28 = "[s] \"SRTの隊員って、やっぱりすごいね……。\""
1007202-30 = "[ns1] \"私は好き嫌いとかないから……\"\n[ns2] \"近くを泳いでる魚で大丈夫だよ。気をつけてね。\""
1007202-33 = "先生は本当に欲がないな……まぁいいや。"
1007202-37 = "期待して待っててくれ！"
1007202-48 = "（数分後……）"
1007202-54 = "ふぅ……久しぶりのダイビングは、やっぱり楽しいものだな。"
1007202-58 = "とりあえず、これを受け取ってくれ。"
1007202-59 = "[s] \"昆布だ、美味しそう。\""
1007202-60 = "ああ、この辺りにたくさん生えてたぞ。"
1007202-61 = "昆布は出汁として重宝されているが、それだけじゃない。刺し身を包めば、身が締まって味が深くなる。高級料理店でも使われてる調理法だ。"
1007202-62 = "まあ、最初の獲物としては悪くないな。"
1007202-66 = "じゃあ……また潜ってくる！"
1007202-77 = "（再び数分後……）"
1007202-82 = "……はぁ、こんなはずじゃなかったんだが。"
1007202-86 = "……はい、これ。"
1007202-87 = "[s] \"……ワカメ？\""
1007202-88 = "ああ。ワカメは鉄分とカルシウムが豊富で、様々な料理に使われる万能食材だ。"
1007202-89 = "乾燥させれば縮むから、保存にも流通にも適している。"
1007202-90 = "こういう保存性の高い海産物なら、子ウサギ公園に持ち帰っても良さそうだな……"
1007202-94 = "だ、大丈夫！次は魚を獲ってくるから……！"
1007202-96 = "（しばらくして……）"
1007202-101 = "……先生。"
1007202-102 = "[s] \"テングサ……？\""
1007202-103 = "テングサは、ところてんや寒天の材料に使われている。"
1007202-104 = "もちろん、そのままでも食べられるぞ。#n低カロリーで、美容や健康にも良いと聞くからな。"
1007202-105 = "[s3] \"それは気になるけど……\"\n[s4] \"さっきからウミクサばかりのような……？\""
1007202-108 = "うっ……！"
1007202-109 = "それとウミクサじゃなくて海藻だ！間違えるんじゃない！"
1007202-110 = "久しぶりだから、まだ本調子じゃないんだ……#n近くに生えてるものを獲ってきただけだし……"
1007202-111 = "つ、次こそ本当に、すっごく大きい鯛を獲ってきてやる！"
1007202-116 = "（そして、待つこと数十分……）"
1007202-123 = "…………戻ったぞ。"
1007202-127 = "……今度は、海藻じゃない。"
1007202-131 = "[ns5] \"サキ……\"\n[ns6] \"流石にこのヒトデは食べられないんじゃないかな……？\""
1007202-134 = "そ、それくらい知っている！"
1007202-135 = "色が綺麗だったから、先生に見せようと思っただけだ！"
1007202-136 = "魚は……"
1007202-141 = "……すまない。 素潜りで獲るのは、無理だった。"
1007202-142 = "水中で爆弾を取り扱ったり、銃を撃った経験はあるが、#n魚を獲ったことは一度もなくて……"
1007202-143 = "魚があんなに素早いだなんて、知らなかった。"
1007202-144 = "鯛はおろか、小魚すら取れないなんて……"
1007202-145 = "[s7] \"気にしないで。\"\n[s8] \"近くの市場で、買って帰ろうか。\""
1007202-150 = "それはダメだ！"
1007202-151 = "大きな魚を獲るだなんて大口を叩いておいて、市場で買って帰るなんて……"
1007202-152 = "マスターダイバーの名が泣く！"
1007202-156 = "こうなったら、銃を使って……！"
1007202-160 = "[ns] \"サキ、待って――！\""
1007202-167 = "[ns] \"……それで、魚は獲れた？\""
1007202-168 = "……獲れた、けど……"
1007202-172 = "魚に……穴が……"
1007202-173 = "こんな状態じゃ、食べられないよな……？"
1007202-174 = "[s] \"そう、だね……。\""
1007202-176 = "[ns] \"今日はもう遅いし、サキが取ってくれた海藻を食べようか。\""
1007202-180 = "……分かった。"
1007202-181 = "でも今度は必ず、私が獲った魚を食べてもらうからな……！"
1007202-183 = "（その後、宿に戻ってワカメや昆布のスープを食べた)"
1007202-184 = "（出汁がよく効いているからか、美味しくて食べ過ぎてしまった……）"
