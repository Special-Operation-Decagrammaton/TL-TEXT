[translation]
1007202-1 = "Operações de abastecimento subaquático (1)."
1007202-3 = "(Saki entrou em contato comigo e fomos para o cais com nosso equipamento de pesca)"
1007202-6 = "Doutor, por aqui."
1007202-7 = "Você trouxe o equipamento que eu pedi?"
1007202-11 = "Uma rede de tamo, uma rede e uma faca de pesca. ......"
1007202-12 = "Ok, está tudo aqui."
1007202-13 = "Vou fazer um trabalho de preparação, me dê um minuto."
1007202-14 = "[s]\"Well, what's ...... with this? \""
1007202-15 = "Eu lhe disse antes. #nNós viemos até o mar, vamos pegar peixes."
1007202-16 = "Acabei de obter permissão dos moradores."
1007202-17 = "[s]\"Permissão ......? \""
1007202-18 = "Oh. Os frutos do mar são controlados nas vilas de pescadores. Você não pode pegá-los sem a permissão do #n."
1007202-19 = "Então, perguntei a ele se poderia pescar alguns frutos do mar para o jantar, e ele me deu o sinal verde."
1007202-20 = "Eles são pessoas muito gentis. Gerenciar uma pescaria #n é um trabalho muito difícil. ......"
1007202-21 = "A propósito, doutor, o senhor tem algum peixe que queira comer?"
1007202-22 = "Estou sempre cuidando de você e ...... Vou pegá-lo hoje para agradecer por tudo o que você faz por mim."
1007202-23 = "Até mesmo o dourado, que é caro e está fora do alcance das lojas, é gratuito se você mesmo o pescar!"
1007202-24 = "[s]\"Mal mergulhando ......? \""
1007202-25 = "O quê, está duvidando da minha competência?"
1007202-26 = "Quando eu estava na SRT Special School, sou um Master Diver certificado pela Kivotos Marine Diver Association em preparação para operações marítimas."
1007202-27 = "Um mergulhador mestre é aquele que pode responder adequadamente a emergências subaquáticas. Um ou dois #n-fish é muito fácil."
1007202-28 = "[s]\"A equipe da SRT ainda é incrível. ....... \""
1007202-30 = "[ns1]\"Não tenho gostos ou desgostos, portanto, não me importo com os peixes nadando perto de mim. ......\"\n[ns2]\"Não me importo com os peixes nadando perto de mim. Apenas tome cuidado. "
1007202-33 = "O sensei realmente não é ganancioso. ...... Bem, tudo bem."
1007202-37 = "Aguarde com expectativa!"
1007202-48 = "(Após alguns minutos, ......)"
1007202-54 = "Phew. ...... Já faz algum tempo que não mergulho, mas ainda é divertido."
1007202-58 = "Enquanto isso, veja isso."
1007202-59 = "[s]\"Kelp, gostoso. \""
1007202-60 = "Sim, muitos deles cresceram por aqui."
1007202-61 = "A alga marinha é valorizada como caldo de sopa, mas isso não é tudo. Embrulhar o sashimi nela aperta a carne e aprofunda o sabor. Ela também é usada em restaurantes sofisticados."
1007202-62 = "Bem, nada mal para uma primeira captura."
1007202-66 = "Depois, voltarei ao site ...... e mergulharei novamente!"
1007202-77 = "(novamente alguns minutos depois ......)"
1007202-82 = "...... Huh, não era para ser assim."
1007202-86 = "...... Sim, isso."
1007202-87 = "[s] \"...... wakame? \""
1007202-88 = "Oh. O wakame é rico em ferro e cálcio e é um ingrediente versátil usado em uma variedade de pratos."
1007202-89 = "Ele encolhe quando seco, o que o torna adequado para armazenamento e distribuição."
1007202-90 = "Esse tipo de frutos do mar bem preservado seria bom para levar de volta ao parque dos coelhos bebês. ......"
1007202-94 = "Não, está tudo bem! Da próxima vez, vou pegar um peixe. ......"
1007202-96 = "(Depois de um tempo, ......)"
1007202-101 = "...... Sensei."
1007202-102 = "[s] \"Tengusa......? \""
1007202-103 = "O Tengusa é usado para fazer tokoro-ten e ágar."
1007202-104 = "É claro que você pode comê-las como estão. É de baixa caloria e ouvi dizer que é bom para sua beleza e saúde."
1007202-105 = "[s3]\"Isso é preocupante, mas ......\"\n[s4]\"É como se tudo o que você estivesse fazendo fosse umiksa desde um tempo atrás ......? \"\"}"
1007202-108 = "Ugh. ......!"
1007202-109 = "E é alga marinha, não erva daninha! Não cometa esse erro!"
1007202-110 = "Já faz muito tempo, então ainda não estou em forma. ......#n Acabei de pegar algo que cresceu perto de mim. ......"
1007202-111 = "Da próxima vez, vou pegar um pargo muito, muito grande!"
1007202-116 = "(E depois de algumas dezenas de minutos de espera: ......)"
1007202-123 = "Estou de volta ao site ............."
1007202-127 = "...... Desta vez, não se trata de algas marinhas."
1007202-131 = "[ns5]\"Saki......\"\n[ns6]\"Acho que você não pode comer essa estrela-do-mar de uma pedra ......? \"\"ns6]"
1007202-134 = "Sim, eu sei disso!"
1007202-135 = "Eu só queria mostrar ao sensei porque as cores eram muito bonitas!"
1007202-136 = "Os peixes podem ser encontrados em ......"
1007202-141 = "...... Desculpe. Era impossível pegá-los mergulhando."
1007202-142 = "Já manuseei bombas e disparei armas embaixo d'água, mas nunca #n pesquei e nunca peguei um peixe. ......"
1007202-143 = "Eu não sabia que os peixes eram tão rápidos."
1007202-144 = "Não posso acreditar que não conseguimos nem mesmo peixes pequenos, quanto mais dourados. ......"
1007202-145 = "[s7] \"Não importa. \"\n[s8] \"Vamos até o mercado próximo, comprar algumas coisas e voltar para casa. \"\"\n[s7]]"
1007202-150 = "Isso não é bom!"
1007202-151 = "Você fala muito sobre a captura de peixes grandes, mas depois os compra de volta no mercado. ......"
1007202-152 = "O nome do mergulhador mestre grita!"
1007202-156 = "Se isso acontecer, use uma arma e acesse ......!"
1007202-160 = "[ns] \"Saki, espere--! \""
1007202-167 = "[ns] \"......So, você pescou algum peixe? \""
1007202-168 = "...... capturado, mas ......"
1007202-172 = "Os peixes têm ...... buracos ......"
1007202-173 = "Não dá para comer nessas condições, não é mesmo? ......"
1007202-174 = "[s]\"Sim, certo. ....... \""
1007202-176 = "[ns] \"Hoje está tarde, vamos comer as algas que a Saki pegou para nós. \""
1007202-180 = "...... entendeu."
1007202-181 = "Mas, da próxima vez, farei com que você coma os peixes que eu pescar. ......"
1007202-183 = "(Depois disso, eles voltaram para a pousada e comeram wakame e sopa de algas)."
1007202-184 = "(Talvez seja porque o caldo é bem temperado, ou talvez seja porque é tão bom que comi demais ......)"
