[translation]
10046130-4 = "大変そうですね、イチカ。"
10046130-5 = "ハスミ先輩……あはは、面目ないっす。"
10046130-6 = "先輩はもしかして……。"
10046130-7 = "ええ、手伝いに来ました。"
10046130-8 = "……申し訳ないです。"
10046130-9 = "いえ、十分よくやっていると思いますよ。#n状況が想定よりも悪かったというだけです。"
10046130-10 = "というと……？"
10046130-11 = "せいぜい各自治区の問題児が一堂に会して騒ぎを起こす程度だと考えていましたが……。"
10046130-12 = "混乱に乗じて、組織的に悪事を働く集団も確認されています。"
10046130-13 = "委員会がマークしていた勢力も含まれているようで……#nもはや個人で対応できるレベルを超えていると判断しました。"
10046130-14 = "まあ、ツルギが対応するなら話は違いますが。"
10046130-15 = "そうなるとまた別の問題が発生すると言いますか……。"
10046130-17 = "はは……何となく分かるっす。いつも大変っすよね。"
10046130-18 = "ツルギとはいくつもの修羅場を乗り越えてきましたから。#nもはや大抵のことでは、苦労とも思いませんよ。"
10046130-19 = "それはそれとして……しばし、私も加勢しましょう。"
10046130-20 = "先輩が、っすか？"
10046130-21 = "はい。できることなら交代してあげたかったのですが……。"
10046130-22 = "なにぶん、私一人でも手に余る状況。#nイチカ――力を貸してくれますか？"
10046130-23 = "こちらこそ、よろしくお願いするっす。"
10046130-24 = "それでは、行きましょうか。"
10046130-25 = "手早く済ませましょう。"
