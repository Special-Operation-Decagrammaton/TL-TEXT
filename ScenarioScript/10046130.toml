[translation]
10046130-4 = "Parece que está sendo difícil, Ichika."
10046130-5 = "Hasumi-senpai... ahaha, que vergonha."
10046130-6 = "Será que a senpai..."
10046130-7 = "Sim, vim para ajudar."
10046130-8 = "...Peço desculpas."
10046130-9 = "Não, acho que você está fazendo um ótimo trabalho. #nA situação apenas se mostrou pior do que o esperado."
10046130-10 = "O que quer dizer com isso...?"
10046130-11 = "Eu pensava que, no máximo, os encrenqueiros de cada distrito se reuniriam para causar confusão, mas..."
10046130-12 = "Confirmamos a presença de grupos que estão agindo de forma organizada para cometer crimes, aproveitando-se do caos."
10046130-13 = "Parece que forças que o Comitê estava monitorando também estão envolvidas... #nJulguei que isso já ultrapassou o nível que um indivíduo pode lidar."
10046130-14 = "Bem, se a Tsurugi fosse lidar com isso, a história seria outra."
10046130-15 = "Dizer que isso causaria outro tipo de problema, talvez...?"
10046130-17 = "Haha... eu entendo mais ou menos. Sempre é difícil, né?"
10046130-18 = "Já passei por muitas situações críticas ao lado da Tsurugi. #nPor isso, na maioria das vezes, nem considero isso um esforço."
10046130-19 = "Deixando isso de lado... por um tempo, eu também vou ajudar."
10046130-20 = "A senpai vai ajudar?"
10046130-21 = "Sim. Se fosse possível, eu gostaria de te substituir, mas..."
10046130-22 = "De qualquer forma, a situação é demais até para mim sozinha. #nIchika, você me empresta sua força?"
10046130-23 = "Eu que agradeço, conto com você."
10046130-24 = "Então, vamos lá."
10046130-25 = "Vamos terminar isso rapidamente."
