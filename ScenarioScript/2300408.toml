[translation]
2300408-1 = "マイスターの勲章"
2300408-2 = "シャーレ外郭・商店街"
2300408-4 = "仕事に必要な物を買うためにウタハと市内に来ていたら、商店街で見慣れないお店を発見した。"
2300408-5 = "ん？新しくオープンしたお店みたいだね。"
2300408-6 = "若い女性が集まっているようだけど、何のお店なのだろうか……。"
2300408-7 = "いらっしゃいませ！つい先日オープンしたばかりのネイルサロン、「モモネイル」です！"
2300408-8 = "オープン記念として、すべてのお客様に無料で爪のお手入れをさせていただいておりますので、どうぞー！"
2300408-9 = "なるほど、爪の手入れをするお店だね。"
2300408-10 = "そういえばミレニアムの生徒の中でも、ジェルネイルをしたり、パーツを付けたりして楽しむ生徒たちをたまに見かけるようになったな。"
2300408-11 = "[s] \"ウタハもやってみたら？\""
2300408-12 = "私が、ネイルを……？"
2300408-13 = "いや、私は大丈夫だよ。私の爪は、そうやって綺麗にするようなものでは無いし……。"
2300408-15 = "そこのお姉さん！すごくきれいなスタイルをされてますね！"
2300408-16 = "よろしければうち、今無料で爪のお手入れをしているのですが、いかがですか？"
2300408-17 = "わ、私かい？でも私は、今までそういうのは一度も……。"
2300408-18 = "ご心配なく！むしろそういうお客様でこそ、やりがいがあるというものです！"
2300408-19 = "ファッションは指先に始まり、指先で終わるもの！#n爪をキレイにお手入れすると気分まで良くなりますよ～！"
2300408-20 = "だ、だが……。"
2300408-21 = "[s1] \"せっかくだから、ね？\"\n[s2] \"マイスターが新しい挑戦を怖がっちゃダメだよ！\""
2300408-25 = "先生がそう言うのなら……。"
2300408-26 = "じゃあ軽く爪のお手入れだけ、お願いしようかな。"
2300408-27 = "はい、ではこちらへどうぞ！"
2300408-29 = "ばっちりです！いかがでしょう？"
2300408-30 = "すごいな……こんなにキレイな自分の爪を見るのも久しぶりだ。"
2300408-31 = "割れた跡も全く目立たないし、油もキレイに取れている。まるで違う人の手を見ているかのような……。"
2300408-32 = "ネイルアートというのは、すごいものだな……。"
2300408-33 = "[s] \"これを機に、頻繁に通ってみるのはどう？\""
2300408-34 = "……いや、それは遠慮させてもらおうかな。ネイルをしているとあまりに綺麗で、機械を操作する時にもつい気にしてしまいそうだ。"
2300408-35 = "それに、私には割れて油まみれの汚い手の方も似合っているだろうから。"
2300408-36 = "恥ずかしいわけではないんだ。#n不恰好だけれど……あの汚れた爪は、あれはあれで、マイスターとしての勲章みたいなものだから。"
2300408-37 = "……でも、そうだな。小指の爪だけは、記念に。"
2300408-40 = "お姉さん、左の小指だけにジェルネイルしてもらうのは可能だろうか？"
2300408-41 = "はい、大丈夫ですよ！少々お待ちください！"
2300408-43 = "その後、爪のお手入れを終えて、少しだけ嬉しそうなウタハと一緒にシャーレに戻った。"
