[translation]
2300408-1 = "Medalha do Meister"
2300408-2 = "Arredores de Schale - Distrito Comercial"
2300408-4 = "Eu tinha ido à cidade com Utaha para comprar algumas coisas necessárias para o trabalho, quando descobrimos uma loja desconhecida no distrito comercial."
2300408-5 = "Hm? Parece que é uma loja que acabou de abrir."
2300408-6 = "Tem várias jovens reunidas ali, mas que tipo de loja será..."
2300408-7 = "Sejam bem-vindos! Acabamos de inaugurar o salão de manicure 'Momo Nail'!"
2300408-8 = "Como promoção de inauguração, estamos oferecendo cuidados básicos para as unhas de graça para todos os clientes, venham conferir!"
2300408-9 = "Entendo, é um lugar para cuidar das unhas."
2300408-10 = "Pensando bem, comecei a ver algumas alunas do Millennium se divertindo com unhas em gel e aplicando acessórios nelas ultimamente."
2300408-11 = "[s] \"Por que você não tenta também, Utaha?\""
2300408-12 = "Eu... fazer as unhas...?"
2300408-13 = "Não, estou bem. Minhas unhas não são do tipo que ficam bonitas desse jeito..."
2300408-15 = "Ei, você aí! Você tem um estilo incrível!"
2300408-16 = "Se não se importar, estamos oferecendo cuidados gratuitos para as unhas agora, o que acha?"
2300408-17 = "V-você está falando comigo? Mas eu nunca fiz nada desse tipo antes..."
2300408-18 = "Não se preocupe! É justamente com clientes assim que temos mais prazer em trabalhar!"
2300408-19 = "A moda começa e termina nas pontas dos dedos! #nCuidar bem das unhas faz você se sentir melhor também!"
2300408-20 = "M-mas..."
2300408-21 = "[s1] \"Já que estamos aqui, por que não?\"\n[s2] \"Um Meister não deve ter medo de novos desafios!\""
2300408-25 = "Se você diz, Sensei..."
2300408-26 = "Então, acho que vou pedir apenas um cuidado básico."
2300408-27 = "Certo, por favor, venha por aqui!"
2300408-29 = "Ficou perfeito! O que achou?"
2300408-30 = "Incrível... faz tempo que não vejo minhas próprias unhas tão bonitas."
2300408-31 = "As marcas de rachaduras nem aparecem mais e o óleo foi todo removido. É como se eu estivesse olhando para as mãos de outra pessoa..."
2300408-32 = "A arte nas unhas é algo impressionante..."
2300408-33 = "[s] \"Já que está aqui, por que não começa a vir com frequência?\""
2300408-34 = "...Não, acho que vou recusar. Se eu fizer as unhas, elas ficarão bonitas demais e eu acabaria me preocupando com elas ao operar as máquinas."
2300408-35 = "Além disso, acho que minhas mãos rachadas e sujas de óleo combinam mais comigo."
2300408-36 = "Não é por vergonha. #nPor mais desajeitadas que sejam... aquelas unhas sujas são, à sua maneira, como uma medalha de honra para um Meister."
2300408-37 = "...Mas, pensando bem. Só a unha do dedo mindinho, como uma lembrança."
2300408-40 = "Moça, seria possível fazer uma unha em gel apenas no dedo mindinho da mão esquerda?"
2300408-41 = "Sim, claro! Por favor, aguarde um momento!"
2300408-43 = "Depois disso, terminamos os cuidados com as unhas e voltei para Schale com uma Utaha que parecia um pouco mais feliz."
