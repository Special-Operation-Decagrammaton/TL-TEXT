[translation]
10011045-2 = "はい、お疲れ様でしたー！"
10011045-3 = "……え、どういうこと？もう終わりで良いの？"
10011045-4 = "まあ別に、そういうアトラクションだし……？"
10011045-5 = "あ、そっか。"
10011045-9 = "ですがそれでも、胸が熱くなるようなバトルでした！フィーナ、感動デス！"
10011045-10 = "これが噂で聞く「ニンジャ」なのでデスネ！"
10011045-11 = "そうね、百夜ノ春ノ桜花祭の時は気づかなかったけど、"
10011045-12 = "これはもしかして集客になるかも……？"
10011045-13 = "[s] \"考える方向性がいつも通りだ……。\""
10011045-17 = "べ、別に悪いことじゃないじゃないですか！？"
10011045-18 = "……忍術研究部、だったわよね？"
10011045-19 = "忍者の部活とか、最初は何のことかと思ったけど……"
10011045-20 = "うん、良いんじゃない？まあ頑張ってね。"
10011045-21 = "あ、ありがとう……。"
10011045-22 = "先生とお話したいことが色々あるのですが、今日についてはそれはさておき……"
10011045-23 = "とにかく合格です！では、次のコースへどうぞ！"
10011045-24 = "よ、よし！"
10011045-28 = "じゃあ、張り切って進んでいこう！"
