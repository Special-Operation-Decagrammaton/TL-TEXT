[translation]
10011045-2 = "Sim, bom trabalho a todos!"
10011045-3 = "……Eh, como assim? Já podemos terminar?"
10011045-4 = "Bem, é uma atração desse tipo, então……?"
10011045-5 = "Ah, é verdade."
10011045-9 = "Mas, ainda assim, foi uma batalha de aquecer o coração! Fina está emocionada!"
10011045-10 = "Então isso é o que chamam de \"Ninja\" que ouvi falar!"
10011045-11 = "Pois é, eu não tinha percebido durante o Festival das Flores de Cerejeira de Hyakkiyako, mas..."
10011045-12 = "Será que isso pode atrair público……?"
10011045-13 = "[s] \"A linha de raciocínio dela continua a mesma de sempre…….\""
10011045-17 = "E-Ei, não tem nada de errado nisso, tem!?"
10011045-18 = "……Clube de Pesquisa de Ninjutsu, não é?"
10011045-19 = "No começo, eu não fazia ideia do que era um clube de ninjas, mas……"
10011045-20 = "Sim, acho que é bom. Bem, boa sorte."
10011045-21 = "Ah, obrigado……."
10011045-22 = "Tenho várias coisas para conversar com o Sensei, mas, por hoje, deixando isso de lado……"
10011045-23 = "De qualquer forma, você foi aprovado! Então, por favor, siga para o próximo curso!"
10011045-24 = "C-Certo!"
10011045-28 = "Então, vamos seguir em frente com entusiasmo!"
