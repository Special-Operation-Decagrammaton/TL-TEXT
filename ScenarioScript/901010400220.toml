[translation]#[Texto Final. - Filipe 05/07.]
901010400220-6 = "Com licença――"
901010400220-7 = "Ah, achou os sacos de serragem?"
901010400220-8 = "Foi rápido."
901010400220-9 = "Sim, estavam jogados num terreno baldio."
901010400220-10 = "Talvez tenham confundido com lixo."
901010400220-14 = "Sério? Que alívio…… obrigado!"
901010400220-15 = "Por pouco os caranguejos não iam pro lixo…… você salvou!"
901010400220-16 = "Que nada, fico feliz em ajudar."
901010400220-17 = "Mas, por que colocar caranguejo na serragem?"
901010400220-18 = "Caranguejo é sensível a impacto."
901010400220-19 = "Mesmo com a casca dura, um choque pequeno pode matar."
901010400220-20 = "Por isso a gente coloca bastante serragem pra amortecer."
901010400220-21 = "E a serragem absorve umidade.#nAjuda a manter o frescor."
901010400220-23 = "Entendi……!"
901010400220-24 = "A propósito, já ouviu falar de transportar caranguejo em tambor?"
901010400220-25 = "Tambor com caranguejo? Nunca."
901010400220-26 = "Não serve?"
901010400220-27 = "Não é que não sirva, mas tambor é pesado."
901010400220-28 = "Mais peso, mais custo de frete…… não faz sentido."
901010400220-29 = "E sem ventilação igual caixa de madeira, se entupir de caranguejo os de baixo morrem."
901010400220-30 = "É…… então 'Caranguejo do Tambor' é uma história de quem não entende de caranguejo."
901010400220-31 = "Caranguejo do Tambor? Que história é essa.…… as pessoas têm muito tempo livre."
901010400220-32 = "Fufu, cada um com seus interesses."
901010400220-33 = "Ah, ia esquecendo."
901010400220-37 = "Como agradecimento pela história interessante…… não que seja grande coisa, mas#naceite uma marmita de inarizushi do 'FOX EATS'."
901010400220-38 = "Isso! Ainda não te agradeci por encontrar os sacos…… não posso aceitar."
901010400220-39 = "Sem preocupação, é promoção."
901010400220-40 = "Se quiser me pagar, é só fazer uma avaliação nas redes sociais!"
901010400220-41 = "Ah, claro. Obrigado. Vou aceitar!"
901010400220-42 = "Sim, tenha um bom dia!"