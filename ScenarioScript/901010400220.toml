[translation]
901010400220-6 = "Um—"
901010400220-7 = "Oh, you found the bag of sawdust?"
901010400220-8 = "That was pretty fast."
901010400220-9 = "Yes, it had been discarded in a vacant lot."
901010400220-10 = "I suppose someone must have mistaken it for a bag of trash."
901010400220-14 = "Really? Oh, thank goodness... Thank you!"
901010400220-15 = "I was worried the crabs would all have to be thrown out... You really saved me!"
901010400220-16 = "Not at all, I'm just happy I could be of help."
901010400220-17 = "By the way, why do you put the crabs in sawdust?"
901010400220-18 = "Crabs are actually quite sensitive to impact."
901010400220-19 = "Even with their hard shells, a minor shock can sometimes kill them."
901010400220-20 = "That's why when we transport them, we pack them in plenty of sawdust to cushion them."
901010400220-21 = "Plus, sawdust absorbs moisture. #nIt's perfect for keeping the crabs fresh."
901010400220-23 = "I see...!"
901010400220-24 = "By the way, have you ever heard of transporting crabs in oil drums?"
901010400220-25 = "Transporting crabs in oil drums...? That's a first for me."
901010400220-26 = "Is there something wrong with using oil drums?"
901010400220-27 = "Well, it's not that you *can't*, but... oil drums are heavy."
901010400220-28 = "The extra weight increases shipping costs, so I don't see any reason to go out of your way to use them."
901010400220-29 = "Besides, unlike wooden crates, they don't have any airflow. If you packed them full, wouldn't the crabs at the bottom just die?"
901010400220-30 = "I suppose you're right... So, the 'oil drum crab' story is just something people who don't know much about crabs would believe."
901010400220-31 = "Oil drum crabs? What kind of story is that? ...People really have too much free time."
901010400220-32 = "Hehe, well, to each their own."
901010400220-33 = "Oh, I almost forgot."
901010400220-37 = "As a thank you for the interesting conversation—though it's not much—#nplease, have this 'Yoshino Inari' bento box, a huge hit at 'FOX EATS'."
901010400220-38 = "No, I couldn't! I haven't even thanked you properly for finding the sawdust yet... I can't accept a bento."
901010400220-39 = "Please, don't worry about it. We're currently running a promotion."
901010400220-40 = "If you really want to thank me... I'd be happy if you could post a review on social media!"
901010400220-41 = "Ah, of course. Thank you. I'll gladly accept it!"
901010400220-42 = "You're welcome, have a great day!"