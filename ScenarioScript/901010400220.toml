[translation]
901010400220-6 = "Com licença..."
901010400220-7 = "Ah! Achou o saco de serragem?"
901010400220-8 = "Foi bem rápido, hein."
901010400220-9 = "Sim, estava jogado num terreno baldio."
901010400220-10 = "Provavelmente alguém achou que era lixo."
901010400220-14 = "Sério? Ainda bem... Muito obrigado!"
901010400220-15 = "Corríamos o risco de ter que descartar todos os caranguejos... Você salvou a gente!"
901010400220-16 = "Imagina, fico feliz em poder ajudar."
901010400220-17 = "Aliás, por que vocês colocam os caranguejos dentro da serragem?"
901010400220-18 = "Caranguejo não aguenta impacto."
901010400220-19 = "Mesmo com a casca dura, qualquer pancada mais forte pode matar."
901010400220-20 = "Por isso, na hora do transporte, forramos bem com serragem pra amortecer."
901010400220-21 = "Fora que a serragem absorve água. É ótima pra manter o caranguejo fresquinho."
901010400220-23 = "Ah, entendi!"
901010400220-24 = "Por falar nisso, você já ouviu falar em transportar caranguejo dentro de tambor?"
901010400220-25 = "Tambor com caranguejo? Nunca ouvi falar."
901010400220-26 = "Não pode usar tambor, será?"
901010400220-27 = "Não é que não possa... mas tambor é pesado."
901010400220-28 = "Quanto mais peso, maior o frete. Não vejo por que usar tambor."
901010400220-29 = "Além disso, não tem ventilação igual caixa de madeira. Se empilhar muito, os de baixo morrem."
901010400220-30 = "Verdade... então 'Caranguejo do Tambor' é história pra quem não entende nada de caranguejo."
901010400220-31 = "Caranguejo do Tambor? Que história é essa? ... Nossa, o povo tá com muito tempo livre."
901010400220-32 = "Fufu, cada um com seus gostos."
901010400220-33 = "Ah, quase ia me esquecendo."
901010400220-37 = "Como agradecimento pela conversa interessante... não é grande coisa, mas aqui vai um bentô de inarizushi do 'Yoshino Inari', que é um sucesso no 'FOX EATS'."
901010400220-38 = "Ora essa! Eu ainda nem agradeci por ter achado o saco de serragem... Não posso aceitar o bentô."
901010400220-39 = "Não esquenta. Estamos em promoção."
901010400220-40 = "Se ficar com peso na consciência... pode divulgar a gente nas redes sociais!"
901010400220-41 = "Ah, claro. Valeu! Vou aceitar!"
901010400220-42 = "Tenha um bom dia!"