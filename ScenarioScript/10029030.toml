[translation]
10029030-1 = "Episódio 3: Como se fosse uma turista"
10029030-2 = "（Recebi um contato da Himari e fui até a sala de controle do Departamento de Investigação de Fenômenos Estranhos）"
10029030-11 = "……Uau, é um outro mundo!!"
10029030-12 = "Como se chama isso!?#nNunca vi nada parecido com o que tem ali também……!"
10029030-13 = "……Não é um sonho, né!?#nNão é um Indian Poker, é um fenômeno sobrenatural de verdade……!"
10029030-14 = "Ora, ora…… é perigoso tocar nisso.#nEntendo que você esteja impressionada com esta super gênio hacker frágil e com este mundo, mas…… podemos conversar um pouco?"
10029030-15 = "Do meu ponto de vista, você também é uma estrangeira.#nTenho algumas coisas para perguntar……"
10029030-16 = "A-aquilo é!? Tem algo flutuando no céu!#nEita…… tem animais ali!? E, robôs também!?"
10029030-18 = "Eu…… gostaria de conversar……"
10029030-22 = "……Ah. Sensei, eu estava esperando por você."
10029030-23 = "[s1] \"Desculpe a demora, Himari. Obrigado pelo trabalho de análise.\"\n[s2] \"Aquela pessoa é……?\""
10029030-26 = "……Sim. Ela é a última pessoa que foi encontrada nas ruínas do Millennium."
10029030-27 = "O nome dela é Ruiko Saten.#nEla é muito animada……"
10029030-28 = "……Opa! Olá a todos!!"
10029030-29 = "Ué……?#nPensando bem, acho que é a primeira vez que vejo um adulto desde que cheguei aqui……"
10029030-30 = "Hmm?#nSerá que o uniforme da pessoa atrás não é da escola Tokiwadai……"
10029030-31 = "Ei, Misaka-san!?"
10029030-32 = "[s3] \"Que bom, vocês se conheciam.\"\n[s4] \"Ela é uma garota muito amigável, né.\""
10029030-35 = "Ah, entendi. Então era a Saten-san."
10029030-36 = "……Haa."
10029030-37 = "Por que esse suspiro agora!?#nAh, eu sabia que sentiria falta da Shirai-san……"
10029030-38 = "P-por que você está mencionando o nome da Kuroko agora!?#nÉ o contrário! É um alívio que ela não esteja aqui!"
10029030-39 = "Se for a Saten-san, não precisamos ficar em alerta como com aquela Shokuhou ali."
10029030-41 = "E-eu já disse, eu não fiz nada, né?"
10029030-42 = "Se vocês vão me suspeitar tanto assim, então, sério……"
10029030-43 = "[s5] \"I-isso mesmo! Bem…….\" \n[s6] \"H-Himari……!\""
10029030-46 = "Fufu…… nossa, não tem jeito mesmo.#nBem, eu entendo o sentimento de querer contar com uma super gênio hacker frágil♪"
10029030-47 = "Sim, não se preocupe.#nPois não há ninguém além de mim que possa resolver este caso."
10029030-48 = "Claro, pode deixar este caso comigo também."
10029030-49 = "Diretora, a análise da \"instalação\" terminou, né?"
10029030-50 = "Sim. No dicionário de uma super gênio hacker frágil, não existe a palavra impossível."
10029030-52 = "……Ei, ei, espera aí.#nAgora pouco ela mesma……"
10029030-53 = "É mais sábio deixar pra lá, porque se você for retrucar esse tipo de pessoa, a conversa vai longe, viu?"
10029030-54 = "Fiquem tranquilos, pessoal.#nA análise da estrutura da \"instalação\" e de seus princípios já foi concluída."
10029030-55 = "Se conseguirmos consertar a parte que causou o mau funcionamento, vocês conseguirão voltar para o mundo original."
10029030-56 = "……Então precisa de reparos?#nMas nós não……"
10029030-57 = "Não se preocupem.#nJá preparei tudo o que é necessário."
10029030-58 = "……Sensei, pegue este chip."
10029030-59 = "[s7] \"Se eu instalar isso……?\"\n[s8] \"Então, depois disso……?\""
10029030-62 = "Sim, é simples, não é?#nEu sou perfeita em qualquer área, mas desta vez foi especialmente na minha área de especialização."
10029030-63 = "Também compartilharei a rota mais curta para chegar à \"instalação\" no seu terminal mais tarde."
10029030-64 = "Se possível, eu gostaria que vocês coletassem dados mais detalhados, mas……"
10029030-65 = "Se vocês mexerem onde não devem, pode acabar acontecendo algo irreversível."
10029030-66 = "Por isso…… primeiro, a prioridade máxima é mandar essas três de volta para o mundo original."
10029030-67 = "Além disso……"
10029030-73 = "……Talvez este encontro tenha sido obra do destino."
10029030-74 = "Já que estão aqui, por que não dão uma volta para conhecer este mundo antes de partir?"
10029030-75 = "Agora a reação de energia da \"instalação\" está estável, então um dia de passeio não causará quase nenhum impacto."
10029030-79 = "……Mesmo que, provavelmente, isso não fique na memória de vocês."
10029030-80 = "……?"
10029030-81 = "O que você quer dizer com "não vai ficar na memória"?"
10029030-82 = "Exatamente o que as palavras dizem. #nOs eventos que ocorreram neste mundo serão tratados como se nunca tivessem existido."
10029030-83 = "Embora isso não passe de uma hipótese..."
10029030-84 = "Provavelmente, uma reconstrução da memória será realizada. #nÉ isso que chamam de lei do mundo."
10029030-85 = "Hã!? Então isso não é a mesma coisa que um sonho... #nNão, na verdade, um sonho seria melhor!"
10029030-86 = "Já que estamos em outro mundo, não tem algum jeito de mudar isso!? #nQue decepção!!"
10029030-87 = "S-Saten-san. #nNós não viemos aqui a passeio, e só de saber que podemos voltar já é..."
10029030-88 = "Fufu, a passeio, é... Pois é."
10029030-89 = "Na verdade, é melhor que pensem assim. #nComo alguém que vive neste mundo, espero que tenham momentos maravilhosos."
10029030-90 = "O que vocês verão e o que sentirão... #nPor mais genial que eu seja, só posso desejar que aproveitem."
10029030-91 = "Sendo assim, tenho um pedido a fazer ao Sensei..."
10029030-92 = "……Sensei?"
10029030-93 = "[s9] \"……Certo, deixe isso comigo.\"\n[s10] \"Também é divertido servir de guia.\""
10029030-96 = "Fufu... Sim. Se posso deixar nas mãos do Sensei, não há com o que se preocupar. Então, conto com você."
10029030-101 = "……O que isso significa?"
10029030-102 = "Passeio? Guia? #nNão deveríamos ir direto para as ruínas?"
10029030-103 = "Se partirmos agora, chegaremos muito tarde. #nO combate provavelmente será inevitável. Além disso, é um ambiente ao qual vocês não estão acostumadas."
10029030-104 = "É prudente adotar uma medida de segurança e deixar a investigação para amanhã. #nSendo assim, gostaria que aproveitassem para conhecer este mundo com calma hoje."
10029030-105 = "……Hmm."
10029030-106 = "Não entendo."
10029030-107 = "Foi a Chefe quem disse que as memórias do que passarmos aqui não vão ficar, não foi? #nEntão, por que isso?"
10029030-108 = "Acho ineficiente."
10029030-109 = "Fufu. Eu imaginei que a Eimi diria isso."
10029030-110 = "Por isso, Eimi, acompanhe o Sensei também."
10029030-111 = "Tudo bem?"
10029030-113 = "……??? #nNão entendo nada do que a Chefe está pensando."
10029030-114 = "……Se a Chefe diz, eu obedeço."
10029030-115 = "Então eu sou uma guarda-costas?"
10029030-116 = "……Pode pensar assim, se quiser. #nAs outras três, têm algum pedido ou algo do tipo?"
10029030-117 = "…………Eh, eu que respondo?"
10029030-118 = "Não tem problema, né? Não é como se fôssemos ficar presas aqui se não formos para essa "instalação" agora mesmo."
10029030-119 = "Bem, pensando que vamos esquecer tudo de qualquer jeito, não estou muito animada..."
10029030-120 = "Já que viemos até aqui, vamos nos divertir! #nTalvez não fique na memória, mas com certeza vai ser divertido!!"
10029030-121 = "……Mesmo esquecendo, por que fazer isso?"
10029030-122 = "Parece que dá para passar um dia relaxante aqui, então eu apoio."
10029030-123 = "Mas, eu estou cansada... Será que posso ficar por aqui?"
10029030-124 = "Então, Misaka-san e as outras podem ir se divertir à vontade~"
10029030-125 = "…………."
10029030-126 = "Fufu, vocês se adaptam rápido. #nAcidentes assim são comuns no mundo de vocês?"
10029030-127 = "Acidentes... né... haha, talvez seja uma boa comparação."
10029030-128 = "Sensei! Já que ficou decidido, vamos logo..."
10029030-129 = "Se não nos apressarmos, vai escurecer! Vamos logo!!"
10029030-130 = "Deixamos a guia com você!"
10029030-131 = "……Eh?"
10029030-132 = "Antes disso, algo que você queria que eu recebesse...?"
10029030-133 = "……Ah. Falando nisso, eu tinha esquecido."
10029030-134 = "……Misaka-san? Do que você está falando?"
10029030-135 = "Disso aqui."
10029030-136 = "Disseram que aqui é "senso comum" andar armado."
10029030-137 = "Ah, entendo...?"
10029030-144 = "Isso é... o \"senso comum\"?#nNossa... é bem pesado."
10029030-145 = "Realmente, agora eu senti que este é um mundo diferente."
10029030-146 = "É como se fosse estranho não andar por aí com uma. #nMesmo dizendo isso, eu ainda estou meio cética."
10029030-147 = "Como foi que disseram mesmo... que não andar armado é mais estranho do que andar pelado pela cidade, ou algo assim."
10029030-148 = "……？"
10029030-149 = "……Hã?"
10029030-150 = "…………Pe-pelado!?"
10029030-154 = "――É verdade!?#nDesde que cheguei aqui, senti olhares estranhos o tempo todo..."
10029030-155 = "Então era porque achavam que eu era uma maluca!?"
10029030-156 = "[s11] \"A-acho que é só impressão sua...!\"\n[s12] \"Bo-bom, vamos indo... Shokuhou, venha com a gente!\""
10029030-161 = "…………。"
10029030-162 = "……Eimi."
10029030-163 = "Sim."
10029030-164 = "……Então, estou indo."
10029030-170 = "（Assim, acabei guiando-as pela cidade até o anoitecer）"
10029030-171 = "（Parece que elas se divertiram mais do que o esperado, e quando tirei os olhos delas por um momento ao retornar, as três estavam dormindo lado a lado pacificamente）"
