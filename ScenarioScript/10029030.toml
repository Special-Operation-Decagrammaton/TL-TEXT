[translation]
10029030-1 = "第3話;まるで観光客のように"
10029030-2 = "（ヒマリから連絡をもらい、特異現象捜査部の管制室に向かった）"
10029030-11 = "……すごい、異世界だぁ！！"
10029030-12 = "これ、なんて言うんですか！？#nあっちにあるのも見たことない……！"
10029030-13 = "……夢じゃないよね！？#nインディアンポーカーじゃなくて、本物の超常現象……！"
10029030-14 = "あらあら……それに触れると危ないですよ。#n私のような超天才病弱美少女ハッカーやこの世界に感激するのは分かりますが……一旦、お話をしませんか？"
10029030-15 = "私からすれば、あなたも異邦人なのです。#nいくつかお聞きしたいことが……"
10029030-16 = "あ、あれは！？空に何か浮いてますよ！#nえっ……あんなところに動物が！？ろ、ロボットも！？"
10029030-18 = "その……お話を、したいのですが……"
10029030-22 = "……あ。先生、お待ちしておりました。"
10029030-23 = "[s1] \"お待たせ、ヒマリ。解析お疲れ様。\"\n[s2] \"あの人が……？\""
10029030-26 = "……はい。彼女がミレニアムの廃墟で発見された、最後の1人。"
10029030-27 = "お名前は[ruby=さてん]佐天[/ruby][ruby=るいこ]涙子[/ruby]さん。#nとても溌剌とした……"
10029030-28 = "……おおーっ！皆さん、はじめまして！！"
10029030-29 = "あれ……？#nそういえば、こっちに来てから初めて大人を見るような……"
10029030-30 = "んん？#nもしかして、後ろの人の制服って常盤台中学じゃ……"
10029030-31 = "えっ、[ruby=みさか]御坂[/ruby]さん！？"
10029030-32 = "[s3] \"良かった、知り合いだったんだ。\"\n[s4] \"とてもフレンドリーな子だね。\""
10029030-35 = "ああ、なんだ。佐天さんだったのね。"
10029030-36 = "……はぁ。"
10029030-37 = "何ですか、今のため息は！？#nあっ、やっぱり[ruby=しらい]白井[/ruby]さんがいないと寂し……"
10029030-38 = "な、なんでそこで[ruby=くろこ]黒子[/ruby]の名前が出てくるのよ！#n逆だから！やっと安心できるなって！"
10029030-39 = "佐天さんなら、そこの[ruby=ヤツ]食蜂[/ruby]みたいに警戒する必要もないし。"
10029030-41 = "だ～か～らぁ、私、何もしてないわよねぇ？"
10029030-42 = "そこまで疑うんだったらぁ、本当に……"
10029030-43 = "[s5] \"そ、そうだ！えっと……。\" \n[s6] \"ひ、ヒマリ……！\""
10029030-46 = "ふふっ……まったく、仕方ありませんね。#nまぁ、超天才病弱美少女を頼りにしたくなる気持ちも理解できますとも♪"
10029030-47 = "ええ、構いませんよ。#nこの件を解決できるのは、この私をおいて他におりませんから。"
10029030-48 = "もちろん、今回の件もお任せください。"
10029030-49 = "部長、「施設」の解析は終わったんだよね？"
10029030-50 = "ええ。超天才病弱美少女ハッカーの辞書に不可能の文字はありませんからね。"
10029030-52 = "……ね、ねえ、ちょっと。#n今あの人、自分で……"
10029030-53 = "ああいうタイプに突っ込むと話が長くなるから、放っておいた方が賢明よぉ？"
10029030-54 = "ご安心ください、皆さん。#n「施設」の構造とその原理の解析は既に終わっております。"
10029030-55 = "誤作動を起こしてしまった部分さえ修理できれば、元の世界に戻れるでしょう。"
10029030-56 = "……修理が必要なんですね？#nでも私たちじゃ……"
10029030-57 = "心配無用です。#nすでに手はずは整えてありますので。"
10029030-58 = "……先生、こちらのチップをどうぞ。"
10029030-59 = "[s7] \"これを組み込めば……？\"\n[s8] \"それじゃあ、後はこれを……？\""
10029030-62 = "はい、簡単でしょう？#nどのような分野でも完璧な私ですが、その中でも特に今回は専門分野でして。"
10029030-63 = "「施設」にたどり着くまでの最短ルートも、後ほど端末に共有しておきます。"
10029030-64 = "できれば、より詳細なデータを集めてきていただきたいところですが……"
10029030-65 = "触れてはいけない部分に手を出したら、取り返しのつかない事態になってしまうかもしれません。"
10029030-66 = "ですので……まずは、そちらの3人を元の世界に帰す事を最優先といたします。"
10029030-67 = "それに……"
10029030-73 = "……こうして出会えたのも、きっと何かの縁かもしれません。"
10029030-74 = "せっかくですし、出発する前にこちらの世界を見て回ってはいかがですか？"
10029030-75 = "今は「施設」のエネルギー反応も安定していますし、一日程度なら影響はほとんどないでしょうから。"
10029030-79 = "……たとえ、皆さんの記憶には残らない可能性が高いとしても。"
10029030-80 = "……？"
10029030-81 = "記憶に残らないって、どういう意味かしらぁ？"
10029030-82 = "言葉通りの意味です。#nこの世界で発生した出来事は、存在しなかったものとして扱われるでしょう。"
10029030-83 = "仮説の域を出ませんが……"
10029030-84 = "おそらく、記憶の再構築が行われるはずです。#nそれが、世界[ruby=ことわり]の理と[/ruby]呼ばれるもの。"
10029030-85 = "はいぃ！？それなら夢と同じじゃないですか……#nいや、夢の方が良かったですよ！"
10029030-86 = "せっかくの異世界なのに……何か方法は無いんですか！？#nぬか喜びですよ！！"
10029030-87 = "さ、佐天さん。#n私たちは観光で来たわけじゃないし、戻れるのが分かっただけでも……"
10029030-88 = "ふふっ、観光ですか……そうですね。"
10029030-89 = "むしろ、そういった感覚でいてくださる方が良いでしょう。#nこの世界で暮らす者として、素敵なひと時になることを願っています。"
10029030-90 = "何を見て、何を感じるのか……#nそればかりはいくら私が天才と言えど、願うほかありませんからね。"
10029030-91 = "そこでひとつ、先生にお願いがあるのですが……"
10029030-92 = "……先生？"
10029030-93 = "[s9] \"……うん、こっちは任せて。\"\n[s10] \"ガイドするのも楽しいからね。\""
10029030-96 = "ふふっ……はい。先生にお任せできるのなら、何も心配する必要はありませんね。では、よろしくお願いいたします。"
10029030-101 = "……どういうこと？"
10029030-102 = "観光？ガイド？#nすぐ廃墟に向かうんじゃないの？"
10029030-103 = "今から出発しても、到着するのは遅い時間になってしまうでしょう。#n戦闘はおそらく避けられません。その上、彼女達にとっては慣れない環境。"
10029030-104 = "安全策を取って、調査は明日に回すのが賢明です。#nであれば、今日はこちらの世界をゆっくり見ていただけたらと。"
10029030-105 = "……うーん。"
10029030-106 = "理解できない。"
10029030-107 = "ここで過ごした記憶は残らないって言ったのは部長だよね。#nそれなのに、どうして？"
10029030-108 = "非効率的だと思う。"
10029030-109 = "ふふっ。エイミなら、そう言うと思いました。"
10029030-110 = "なので、先生と一緒にエイミも同行してください。"
10029030-111 = "よろしいですね？"
10029030-113 = "……？？？#n部長が何を考えてるのか、さっぱり分からない。"
10029030-114 = "……部長がそう言うなら、従うけど。"
10029030-115 = "私はボディーガードってこと？"
10029030-116 = "……そう思っていただいて構いませんよ。#nそちらの3人は、何かご要望等ありますか？"
10029030-117 = "…………え、私が答えるの？"
10029030-118 = "別に良いんじゃない？その「施設」ってところに今すぐ向かわないと、帰れなくなるわけじゃないんでしょ。"
10029030-119 = "まあ、どうせ全部忘れちゃうって考えたら、あんまり気乗りはしないけど……"
10029030-120 = "せっかくここまで来たんですから、遊んでいきましょうよ！#n記憶には残らないかもしれませんけど、絶対楽しいですよ！！"
10029030-121 = "……忘れちゃうのに、どうしてそんな。"
10029030-122 = "ここでなら癒やされる一日を過ごせそうだし、賛成だわぁ。"
10029030-123 = "でもぉ、私は疲れちゃったし……ここに残ろうかしら？"
10029030-124 = "それじゃ、御坂さん達は好きに遊んできて良いわよぉ～"
10029030-125 = "…………。"
10029030-126 = "ふふ、皆さん順応が早いですね。#nそちらの世界ではこういったアクシデントは日常茶飯事なのでしょうか？"
10029030-127 = "アクシデント……ねぇ……はは、結構良い勝負かもしれないわね。"
10029030-128 = "先生！そうと決まったら、さっそく……"
10029030-129 = "急がないと日が暮れちゃいますよ！早く行きましょう！！"
10029030-130 = "案内はお任せしました！"
10029030-131 = "……え？"
10029030-132 = "その前に、受け取ってほしい物……？"
10029030-133 = "……あぁ。そういえば、忘れてたわ。"
10029030-134 = "……御坂さん？何のことですか？"
10029030-135 = "コレのことよ。"
10029030-136 = "こっちじゃ銃を持ち歩くのが「常識」なんだって。"
10029030-137 = "はぁ、なるほど……？"
10029030-144 = "って……「常識」ですか？#nおぉ……ズッシリしてますね。"
10029030-145 = "やっぱり、ここは異世界なんだなって実感しました。"
10029030-146 = "持ち歩いてない方がおかしいみたいなのよね。#n自分で言っておいて、私もまだ半信半疑なんだけど。"
10029030-147 = "なんて言ってたっけ……銃を持ち歩かないのは、全裸で街を歩くよりもおかしいとか何とか。"
10029030-148 = "……？"
10029030-149 = "……えぇっ？"
10029030-150 = "…………ぜ、全裸！？"
10029030-154 = "――本当なんですか！？#nこっちに来てから、妙な視線をやけに感じてたんですけど……"
10029030-155 = "アレって、頭のおかしい人だと思われてたからだったんですね！？"
10029030-156 = "[s11] \"き、気のせいじゃないかな……！\"\n[s12] \"そ、そろそろ行こっか…[ruby=しょくほう]…食蜂も[/ruby]一緒に！\""
10029030-161 = "…………。"
10029030-162 = "……エイミ。"
10029030-163 = "うん。"
10029030-164 = "……じゃあ、行ってきます。"
10029030-170 = "（こうして、日が暮れるまで街を案内することになった）"
10029030-171 = "（思いのほか楽しんでもらえたようで、戻ってから少し目を離していたところ、3人とも仲良く並んで眠っていた）"
