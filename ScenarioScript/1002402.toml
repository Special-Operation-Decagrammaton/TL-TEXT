[translation]
1002402-1 = "Long Ride em Kivotos"
1002402-2 = "（Corri o máximo que pude até Abydos e, ao chegar no portão da escola, Shiroko estava saindo justamente enquanto empurrava sua bicicleta de estrada）"
1002402-5 = "……Hm? Professor?"
1002402-6 = "[s1] \"Shiroko!\"\n[s2] \"Ah, bem……?\""
1002402-7 = "Hm……? O que houve?"
1002402-8 = "Hm……? O que houve?"
1002402-9 = "Bem, eu estava dando umas 200 voltas na pista para checar as condições da bicicleta antes de partir……"
1002402-10 = "Por que o professor está aqui a essa hora……? E por que está tão ofegante……"
1002402-11 = "……!"
1002402-12 = "Será que……"
1002402-17 = "O professor finalmente se interessou por exercícios?"
1002402-18 = "Fico feliz. Então, o professor quer ir junto?"
1002402-19 = "Atravessar Kivotos."
1002402-20 = "[s] \"Atravessar Kivotos!?\""
1002402-21 = "Hm. Como eu enviei no MomoTalk agora pouco."
1002402-22 = "Graças ao professor, ultimamente tenho tido um pouco mais de tempo livre……"
1002402-23 = "Então pensei em tentar fazer aquele Long Ride que eu queria há algum tempo."
1002402-24 = "O nome pode soar exagerado, mas na verdade é só pedalar por aí seguindo as estradas de Kivotos."
1002402-25 = "Se eu tentasse atravessar literalmente, levaria meses, afinal."
1002402-26 = "[s] \"Entendi, que bom……\""
1002402-27 = "……Professor? O que houve, por que está com essa cara?"
1002402-28 = "Hm…… não entendi muito bem, mas parece que causei um mal-entendido. Desculpe."
1002402-29 = "Não imaginava que você ficaria tão preocupado comigo."
1002402-30 = "[s] \"Não, eu que peço desculpas. A propósito, você vai sozinha?\""
1002402-31 = "Hm…… eu até convidei as outras, mas elas não pareceram muito animadas."
1002402-32 = "Acho que percorrer 4000km em 3 semanas não é um cronograma tão impossível…… será que elas não gostam desse traje……"
1002402-33 = "Para pedalar por longas horas, esse tipo de traje funcional é essencial."
1002402-34 = "[s] \"……\""
1002402-35 = "……Hm, o que houve, professor? O jeito que estou vestindo está estranho……?"
1002402-38 = "De qualquer forma, estou pronta. Fiz a manutenção, tenho câmaras de ar reserva, ferramentas de reparo, bomba portátil, equipamentos de acampamento para dormir ao relento e itens de higiene……"
1002402-39 = "[s] \"Dormir ao relento!?\""
1002402-40 = "Hm, às vezes preciso pedalar por estradas desertas por vários dias."
1002402-41 = "Na verdade, eu consigo pedalar por uns 3 dias sem dormir, então estou bem. Mas descansar é importante, então é por precaução. Além disso, pretendo fazer pausas adequadas."
1002402-42 = "Ah, e por precaução, a máscara também……"
1002402-43 = "[s] \"A máscara está confiscada!\""
1002402-44 = "Hmm…… entendi, não tem jeito."
1002402-45 = "[s] \"Tem certeza de que ficará bem sozinha……?\""
1002402-46 = "Hm, acho que sim, mas……"
1002402-47 = "……"
1002402-48 = "Bem, quando o professor me olha assim, eu fico meio……"
1002402-49 = "O que eu faço, mas……"
1002402-50 = "……Hm?"
1002402-51 = "Não precisa cancelar……? Mas deixar o professor tão preocupado assim……"
1002402-52 = "[s3] \"Eu ficaria feliz se você me mandasse mensagens com mais frequência que o normal.\"\n[s4] \"Só de receber um MomoTalk seu, eu já fico tranquilo.\""
1002402-53 = "MomoTalk……"
1002402-54 = "MomoTalk……"
1002402-55 = "……É verdade, eu tinha esquecido. Mesmo sem ir à escola, podemos nos falar a qualquer momento."
1002402-56 = "Entendi. Então, nos intervalos da pedalada, quando eu parar para descansar……"
1002402-57 = "Mas não seria um incômodo para o professor? Se eu mandar mensagens com tanta frequência……"
1002402-58 = "[s5] \"Pelo contrário, eu ficaria feliz. Pode mandar sempre que parar para descansar.\"\n[s6] \"E se não for o caso, eu irei te encontrar se estiver passando por perto.\""
1002402-66 = "Obrigada, Sensei. Sinto-me muito melhor agora."
1002402-67 = "Assim que eu parar, entrarei em contato imediatamente."
1002402-68 = "Bem, eu já vou. Sensei."
1002402-69 = "[s] \"Sim, vá com cuidado.\""
1002402-70 = "……Sim, estou indo."
