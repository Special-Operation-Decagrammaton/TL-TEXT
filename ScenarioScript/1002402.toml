[translation]
1002402-1 = "キヴォトス・ロングライド"
1002402-2 = "（全力で急いでアビドスへと向かい、校門に到着すると、ちょうどシロコがロードバイクを引きながら出てくるところだった）"
1002402-5 = "……ん？先生？"
1002402-6 = "[s1] \"シロコ！\"\n[s2] \"あれ、えっと……？\""
1002402-7 = "ん……？どうしたの？"
1002402-8 = "ん……？どうしたの？"
1002402-9 = "えっと、私は今出発前にロードバイクの状態チェックを兼ねて、トラックを200周くらい回ってきたところだけど……。"
1002402-10 = "先生は、こんな時間にどうして……？それに、そんなに息を切らして……。"
1002402-11 = "……！"
1002402-12 = "もしかして……。"
1002402-17 = "先生も、ようやく運動に興味が湧いてきた？"
1002402-18 = "嬉しい。じゃあ、先生も一緒に行く？"
1002402-19 = "キヴォトス縦断。"
1002402-20 = "[s] \"キヴォトス縦断！？\""
1002402-21 = "ん。さっきモモトークで送った通り。"
1002402-22 = "先生のおかげで、最近は少し余裕があるから……。"
1002402-23 = "前からやってみたかった、ロングライドに挑戦してみようかなって。"
1002402-24 = "名前だけ聞くと大袈裟なものに聞こえるかもだけど、実際にはキヴォトスの公道に沿ってあちこちに行くだけ。"
1002402-25 = "本気で文字通りの縦断をしようと思ったら、何か月もかかるだろうし。"
1002402-26 = "[s] \"そっか、良かった……。\""
1002402-27 = "……先生？どうしたの、そんな顔して？"
1002402-28 = "ん……よく分からないけど、何か誤解させちゃったみたいだね。ごめん。"
1002402-29 = "こんなに心配してもらえるなんて思ってなかった。"
1002402-30 = "[s] \"ううん、こっちこそごめんね。ところで、一人で行くの？\""
1002402-31 = "ん……みんなのことも誘ってみたんだけど、あんまり乗り気じゃないみたいだったから。"
1002402-32 = "4000kmを3週間で走るくらいだから、そんなに無理な日程でもないと思うけど……もしかして、このウェアがあんまり好きじゃないのかな……。"
1002402-33 = "長時間走るためには、こういう機能性スーツが必須なのに。"
1002402-34 = "[s] \"……。\""
1002402-35 = "……ん、どうしたの、先生？何か着方とか、変かな……？"
1002402-38 = "とにかく、準備は万端。整備もきちんとしたし、予備のチューブや修理道具、携帯用のポンプ、野宿のためのキャンプ用品と洗面用具も……"
1002402-39 = "[s] \"野宿！？\""
1002402-40 = "ん、ひと気のない道路を何日も走らなきゃいけない時もあるから。"
1002402-41 = "そもそも私、3日ぐらいは寝なくても走れるから大丈夫。でも休むことは大事だから、念のため。それに、休憩もちゃんと取るつもり。"
1002402-42 = "あ、それと、万が一のために覆面も……"
1002402-43 = "[s] \"覆面は没収！\""
1002402-44 = "うーん……そっか、仕方ない。"
1002402-45 = "[s] \"本当にひとりで大丈夫……？\""
1002402-46 = "ん、大丈夫、だと思うけど……。"
1002402-47 = "……。"
1002402-48 = "えっと、先生にそんな表情をされると、なんだかその……。"
1002402-49 = "どうしよう、でも……。"
1002402-50 = "……ん？"
1002402-51 = "別に中止にする必要はない……？だけど、ここまで先生を心配させちゃうのは……。"
1002402-52 = "[s3] \"いつもより頻繁に連絡してくれると嬉しいな。\"\n[s4] \"モモトークが来るだけで、安心できるから。\""
1002402-53 = "モモトーク……。"
1002402-54 = "モモトーク……。"
1002402-55 = "……確かに、忘れてた。学校に行かなくても、いつでも連絡できるんだ。"
1002402-56 = "そうだね。じゃあライディングの隙間で、足が止まった時とかに……。"
1002402-57 = "でも、先生に迷惑じゃない？そんなに、頻繫に連絡すると……"
1002402-58 = "[s5] \"むしろ嬉しいよ。休憩する度に、とかでも全然。\"\n[s6] \"そうでなくても、近くを通ったら会いに行くね。\""
1002402-66 = "ありがとう、先生。なんだかスッキリした。"
1002402-67 = "足を止めたら、絶対にすぐ連絡する。"
1002402-68 = "じゃあ、行くね。先生。"
1002402-69 = "[s] \"うん、いってらっしゃい。\""
1002402-70 = "……ん、行ってきます。"
