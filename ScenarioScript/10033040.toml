[translation]
10033040-1 = "Episódio 4; Viu, é fácil, não é?"
10033040-2 = "Este é o setor de artesanato tradicional de Hyakkiyako!"
10033040-3 = "E aqui, especificamente, é onde fazemos artesanato usando argila."
10033040-4 = "É uma oficina que ostenta uma fama considerável como lembrança de Hyakkiyako!"
10033040-5 = "Desta vez, quero que todos vocês experimentem na prática, enquanto moldam a argila――"
10033040-10 = "Então quer dizer que podemos fazer qualquer coisa?"
10033040-11 = "Então, por enquanto, vou fazer assim..."
10033040-12 = "O que é isso, uma torre?#nPor que tem um rosto e dois braços?"
10033040-14 = "Porque é uma torre!"
10033040-15 = "Bem, observe, se eu colocar isso no topo também...!"
10033040-17 = "...Você sabe o significado da palavra 'torre'?"
10033040-18 = "É uma 'torre' de 'torre', né!?#nEu sei, tá bom!?"
10033040-20 = "Não tem jeito... Vou te mostrar como se faz.#nPrimeiro, faça uma água-viva e as pernas de um dinossauro..."
10033040-21 = "E-eh, bem...!?"
10033040-22 = "[ns1] \"Artesanato tradicional misturado com um futuro incerto.\"\n[ns2] \"Será que podemos deixar isso assim...?\""
10033040-25 = "T-tá tudo bem.#nIsso também é a base de uma nova cultura."
10033040-26 = "Afinal, a cultura se desenvolve misturando-se, colidindo e mudando."
10033040-28 = "Uma granada de mão, um fósforo branco e, para finalizar..."
10033040-29 = "Que tal uma mina antitanque?"
10033040-30 = "Essa é a ideia!#nAgora é só misturar com incendiários e estilhaços..."
10033040-31 = "...Tarde demais para perguntar, mas isso ainda é artesanato tradicional?"
10033040-32 = "Relaxa, a arte é uma explosão!"
10033040-34 = "[ns] \"...Será que isso é realmente seguro?\""
10033040-35 = "Hmm..."
10033040-37 = "Kirara-chan, o que você vai fazer?"
10033040-38 = "Hmm, já que estamos aqui, talvez uma bolsa?"
10033040-39 = "A sua cara, Kirara-chan... Espera, Sensei? O que foi essa cara?"
10033040-40 = "[s3] \"Não é nada, eu só estava me sentindo relaxado...\"\n[s4] \"Não é uma questão de ser bom ou ruim, é uma questão de cura...\""
10033040-43 = "Ahaha, o Sensei é muito engraçado mesmo!"
10033040-45 = "P-por que todos vocês tiraram explosivos de repente...!?"
10033040-47 = "Ah, isso é explosivo plástico, então tá tudo bem.#nMesmo que queime, não explode, provavelmente."
10033040-48 = "Se olhar só pela aparência, não parece argila??"
10033040-50 = "É essa a questão...!?"
10033040-55 = "...Como sempre, né."
10033040-56 = "Bem, o Sensei está aqui, então se algo acontecer, vai ficar tudo bem, né?#nEu confio no Sensei!"
10033040-57 = "[s] \"Vou dar o meu melhor...\""
10033040-59 = "Nossa, isso é por acaso uma 'katana'...!?"
10033040-60 = "Ah, sim, vi isso no caminho para cá.#nAchei bem legal."
10033040-61 = "Incrível, incrível!#nJá que estamos nisso, por que não adicionamos um besouro aqui!?"
10033040-62 = "Um besouro samurai... 'Besouro-Bushi'!#nEntão, aqui vamos colocar um general besouro-hércules...!"
10033040-64 = "Não fiquem tão distraídos a ponto de passar do tempo...#nZzz, zzz..."
10033040-65 = "Ah! Falando nisso, qual é o horário da próxima partida...!?#nA-ainda dá tempo..."
10033040-67 = "(E assim, quando todos começaram a ficar absortos...)"
10033040-69 = "...Agora!"
10033040-74 = "[ns] \"...Ei, isso é um artesanato, né?\""
10033040-75 = "Se moveu!?"
10033040-76 = "Está andando!?"
10033040-77 = "Em 'A Lenda do Ninkyo Nyan-Nyan: A Noite em que as Bonecas Voltaram a se Mover',#ntambém teve uma cena assim!"
10033040-79 = "Ei, o que é aquilo?#nPor que está se movendo?"
10033040-80 = "Isso também faz parte da experiência?"
10033040-85 = "P-pessoal, acalmem-se...!#nÉ perigoso levantar de repente!"
10033040-86 = "Além disso, temos que sair daqui em 23 minutos...!"
10033040-87 = "É nisso que você está pensando!?"
10033040-88 = "O \"nisso\" que você quer dizer é...?"

10033040-93 = "...P-por que as peças de artesanato estão se movendo!?"
10033040-95 = "Ué, o que é isso? Como funciona?"
10033040-96 = "Que tal a gente desmontar?#nAlguém me dá um detonador."
10033040-98 = "Q-quem são esses!? Por que não estão assustados!?"
10033040-99 = "N-na minha longa vida na oficina, é a primeira vez que vejo uma confusão dessas..."
10033040-103 = "Eu desvendei todo esse mistério!!"
10033040-104 = "[ns] \"Meg!?\""
10033040-107 = "Fufu...#nOs olhos do nosso Departamento de Desenvolvimento de Fontes Termais não podem ser enganados!"
10033040-108 = "A chefe Kasumi está sendo perseguida...#nQuer dizer, ela está ocupada demais para participar da viagem escolar, mas...!"
10033040-109 = "Se a chefe estivesse aqui, ela diria:#n\"Sempre há pistas para sonhos e fontes termais em qualquer lugar\"!"

10033040-114 = "Exatamente!"
10033040-120 = "[ns] \"Err... ou seja?\""
10033040-121 = "Por que as bonecas de artesanato estão se movendo..."
10033040-122 = "É porque existe um veio de água termal aqui embaixo!#nElas foram atraídas por essa energia!"
10033040-124 = "...Oi?"
10033040-125 = "[s] \"Ferrou, essa situação vai...!\""
10033040-128 = "Onde há uma fonte termal, nós estamos lá!#nNão, mesmo que não haja uma, nós estaremos lá!"
10033040-129 = "Se tem um veio de água, só precisamos escavar!"
10033040-130 = "...No fim das contas, o que faremos com esse artesanato?"
10033040-131 = "Quando a fonte termal sair, elas certamente vão se acalmar!#nAí a gente adota elas como mascotes daqui!"
10033040-135 = "Entendi!"
10033040-136 = "Vamos lá, explodam, escavem e desenvolvam!#nPessoal, pegaram os equipamentos!?"
10033040-140 = "É hora da fonte termal!!!"
10033040-142 = "Essas pessoas são malucas!?"
10033040-144 = "Ah... começou de novo."
10033040-145 = "Ahaha, o Departamento de Desenvolvimento de Fontes Termais é um perigo, né?"
10033040-147 = "I-isso não é uma situação grave...!?"
10033040-148 = "..."
10033040-149 = "Tudo o que acontece tem um motivo..."
10033040-150 = "Será que este também é o momento em que uma nova cultura nasce...!"
10033040-151 = "É mesmo!?"
10033040-152 = "[ns] \"Acho que não, hein!?\""
10033040-154 = "[ns] \"Por enquanto, equipe de guia, reunir!\""
10033040-156 = "É-é verdade!"
10033040-157 = "Vamos nessa, chefe!"
10033040-158 = "Nossa, que situação!"
10033040-159 = "Pessoal, fiquem atrás de mim por um instante..."
10033040-161 = "Demoramos, Sensei! Umika-chan!"
10033040-162 = "Ah... sinto muito mesmo."
10033040-163 = "[s] \"Kirara, Erika!\""
10033040-165 = "Por enquanto, pode cuidar do pessoal do Departamento de Desenvolvimento de Fontes Termais?"
10033040-166 = "Nós cuidamos do resto!"
