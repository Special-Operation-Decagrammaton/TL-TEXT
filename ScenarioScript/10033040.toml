[translation]
10033040-1 = "第4話;ね、簡単でしょう？"
10033040-2 = "こちらは、百鬼夜行の伝統工芸コーナーです！"
10033040-3 = "その中でもここは、粘土を使った工芸品を作っている場所でして。"
10033040-4 = "百鬼夜行のお土産として、かなりの知名度を誇っている工房なんです！"
10033040-5 = "皆さんには今回、粘土を捏ねながら実際に体験をしていただきつつ――"
10033040-10 = "何を作っても良いってこと？"
10033040-11 = "じゃあとりあえず、こうやって……。"
10033040-12 = "何それ、塔？#nなんで顔と両腕が付いてるの？"
10033040-14 = "塔だからだよ！"
10033040-15 = "まあ見てなって、こうやって頂上にも付けたら……！"
10033040-17 = "……「塔」って言葉の意味知ってる？"
10033040-18 = "「タワー」の「塔」でしょ！？#n知ってるけど！？"
10033040-20 = "仕方ないな……私が手本を見せてあげるよ。#nまずクラゲと、恐竜の足を作って……。"
10033040-21 = "え、えぇっと……！？"
10033040-22 = "[ns1] \"伝統工芸と、不確定な未来が混ざり合ってる。\"\n[ns2] \"これ、放置しても大丈夫でしょうか……？\""
10033040-25 = "だ、大丈夫ですよ。#nこれもまた、新しい文化の礎ですから。"
10033040-26 = "文化とは混ざり合い、衝突し、変化しながら発展していくものですから。"
10033040-28 = "手榴弾とー、白リン弾とー、あと仕上げに……。"
10033040-29 = "対戦車地雷はどう？"
10033040-30 = "それだ！#nあとは焼夷剤と榴散弾を混ぜてー。"
10033040-31 = "……今更だけど、これって伝統工芸なのかな？"
10033040-32 = "大丈夫、芸術は爆発だから！"
10033040-34 = "[ns] \"……本当に大丈夫でしょうか？\""
10033040-35 = "うーん……。"
10033040-37 = "キララちゃんは何作るの？"
10033040-38 = "んー、せっかくならバッグとか？"
10033040-39 = "キララちゃんらしいね……って、先生？どうしたのその顔？"
10033040-40 = "[s3] \"ううん、癒されてただけ……。\"\n[s4] \"良し悪しではなく、癒しの問題で……。\""
10033040-43 = "あははっ、先生はやっぱ面白いなー！"
10033040-45 = "ど、どうして皆さん、一斉に爆発物を取り出して……！？"
10033040-47 = "あー、これコンポジション爆薬だから大丈夫。#n燃えても爆発しないし、多分。"
10033040-48 = "見た目だけなら粘土っぽくない？？"
10033040-50 = "そういう問題ですかねぇ……！？"
10033040-55 = "……いつも通りだね。"
10033040-56 = "まぁ先生もいるんだし、問題が起きても大丈夫でしょ？#nあたしは先生のこと、信じてるから！"
10033040-57 = "[s] \"頑張るね……。\""
10033040-59 = "ナント、これはもしかして「刀」……！？"
10033040-60 = "あーうん、何かここに来る途中に見かけてさ。#nかっけーなーって。"
10033040-61 = "すごいすごーい！#nじゃあせっかくだし、ここにカブトムシ足さない！？"
10033040-62 = "カブトムシの武士……「カブト武士」か！#nそれなら、こっちにはクワガタ将軍も立てて……！"
10033040-64 = "夢中になって、時間オーバーしないようにね……#nすぅ、すぅ……。"
10033040-65 = "はっ！そ、そういえば次の移動時間は……！？#nま、まだ何とか……。"
10033040-67 = "（そうして、各位が夢中になり始めた頃……）"
10033040-69 = "……今だ！"
10033040-74 = "[ns] \"……あれ、工芸品だよね？\""
10033040-75 = "動いたぁ！？"
10033040-76 = "歩いてマスね！？"
10033040-77 = "『任侠ニャンニャン伝～再び動き出した人形たちの夜～』にも、#nこういうシーンがありマシタ！"
10033040-79 = "え、何あれ。#nどうして動いてんの？"
10033040-80 = "これも体験の一環？"
10033040-85 = "み、皆さん落ち着いて……！#n急に立ち上がると危ないですよ！"
10033040-86 = "それに、あと23分でここを出発しないと……！"
10033040-87 = "そっち！？"
10033040-88 = "そ、「そっち」というのは……？"
10033040-93 = "……な、なんで工芸品が動いてるんですかぁ！？"
10033040-95 = "えー何これ、どういう仕組み？"
10033040-96 = "ちょっとバラしてみない？#n誰か雷管ちょーだい。"
10033040-98 = "な、何だこいつら！？どうしてビビらない！？"
10033040-99 = "な、長い工房生活の中でも、ここまでのドタバタは初めてだよ……。"
10033040-103 = "その謎、全部お見通しだー！！"
10033040-104 = "[ns] \"メグ！？\""
10033040-107 = "ふふっ……#n私たち温泉開発部の目は騙せないよ！"
10033040-108 = "カスミ部長は追われる身……#nじゃなくて、忙しくて修学旅行には参加できなかったけど……！"
10033040-109 = "部長がいたら、こう言ってるはず！#n「どんな時でも、夢と温泉の手掛かりは必ずある」と！"
10033040-114 = "その通り！"
10033040-120 = "[ns] \"えぇっと……つまり？\""
10033040-121 = "なぜ、工芸品の人形が動いてるのか……。"
10033040-122 = "それはこの地下に、温泉の水脈があるからだよ！#nその気配にあてられたってわけ！"
10033040-124 = "……はいぃ？"
10033040-125 = "[s] \"マズい、この流れは……！\""
10033040-128 = "そこに温泉があるから我々がいる！#nいや、たとえ温泉がなくても我々がいる！"
10033040-129 = "水脈があるなら、あとは掘り起こすだけ！"
10033040-130 = "……結局、この工芸品はどうする？"
10033040-131 = "温泉が出てくれば、きっと落ち着くよ！#nそしたらここのマスコットとして採用しちゃおう！"
10033040-135 = "なるほど！"
10033040-136 = "さぁ、爆破して掘削して開発しよう！#nみんな、機材は持ったかな！？"
10033040-140 = "温泉の時間だーー！！！"
10033040-142 = "こいつら正気か！？"
10033040-144 = "あー……また始まった。"
10033040-145 = "あははっ、温泉開発部はヤバいねぇ？"
10033040-147 = "こ、これは、大変な事態なのでは……！？"
10033040-148 = "……。"
10033040-149 = "起きることには、全て理由がある……。"
10033040-150 = "これもまた、新しい文化が生まれる瞬間なのか……！"
10033040-151 = "そうなのですか！？"
10033040-152 = "[ns] \"違うと思うよ！？\""
10033040-154 = "[ns] \"とりあえず、ガイドチーム集合！\""
10033040-156 = "で、ですよねっ！"
10033040-157 = "行きマスか、お頭ぁ！"
10033040-158 = "いやぁ参ったねー！"
10033040-159 = "みんな、一旦私の後ろに……。"
10033040-161 = "お待たせ、先生！ウミカちゃん！"
10033040-162 = "はぁ……本当にごめんね。"
10033040-163 = "[s] \"キララ、エリカ！\""
10033040-165 = "とりあえず、温泉開発部の子を頼んでも良い？"
10033040-166 = "他の子はあたしたちで何とかするからさ！"
