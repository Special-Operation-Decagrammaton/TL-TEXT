[translation]
10024005-1 = "Prólogo; Recepção de Convidados"
10024005-3 = "（Enquanto trabalhava no Schale como de costume...）"
10024005-6 = "Trim, trim, trim!"
10024005-9 = "[ns] \"Quem será...?\""
10024005-11 = "[ns] \"Alô, aqui é o Schale.\""
10024005-14 = "É o Sensei do Schale, [USERNAME], certo?"
10024005-15 = "[s1] \"Sim, sou eu... quem gostaria?\"\n[s2] \"Vou transferir para a caixa postal. Após o sinal...\""
10024005-16 = "Desculpe ligar de repente."
10024005-17 = "Eu sou Akeshiro Rumi. Sou a presidente da Associação Genbu."
10024005-18 = "Nossa, então o Sensei é do tipo que faz piadas. Fiquei um pouco mais aliviada agora."
10024005-19 = "Bem, aquela piada não foi lá muito engraçada, mas... ahaha."
10024005-20 = "[s3] \"É... desculpe.\""
10024005-21 = "Ahaha. Então, da próxima vez, espero uma piada de primeira."
10024005-22 = "Bem, recomeçando — eu sou Akeshiro Rumi. Sou a presidente da Associação Genbu."
10024005-23 = "[s] \"Prazer, Rumi. Algum assunto para tratar hoje?\""
10024005-24 = "Mais do que um assunto, é um pedido..."
10024005-25 = "Nós da Associação Genbu temos um pedido para o Schale."
10024005-26 = "[s] \"...Sinto que vem um assunto pesado por aí.\""
10024005-27 = "Ahaha... é verdade. Este não é um pedido meu, mas sim da Associação Genbu."
10024005-28 = "Então a intuição do Sensei está correta."
10024005-29 = "Talvez o conteúdo acabe te deixando em apuros."
10024005-30 = "Incrível você saber que é um assunto pesado só por essa conversa! Será que você tem um sexto sentido...?"
10024005-31 = "[s4] \"Ahaha, foi só coincidência.\"\n[s5] \"Quem dera eu tivesse algo assim...\""
10024005-34 = "Entendi, que pena."
10024005-35 = "Mas, mesmo que tenha sido coincidência, é melhor que as coisas sejam diretas. Talvez o pedido nem seja tão difícil assim!"
10024005-36 = "[s] \"Eu queria que você tivesse afirmado isso com convicção!\""
10024005-37 = "Ahaha... então, eu gostaria de convidar o Sensei para a Associação Genbu, você tem disponibilidade?"
10024005-38 = "Estou curiosa para saber que tipo de pessoa é o famoso Sensei — e quero te cumprimentar pessoalmente."
10024005-39 = "[s6] \"Claro, estou livre a qualquer momento.\"\n[s7] \"Eu também quero saber que tipo de garota você é, Rumi.\""
10024005-42 = "Oh! Acho que nos damos bem melhor do que eu pensava."
10024005-43 = "Estou começando a ficar animada para te conhecer, Sensei."
10024005-44 = "[s] \"V-você não está planejando nada de ruim, está?\""
10024005-45 = "Ahaha. Se eu dissesse que sim... o que você faria?"
10024005-46 = "Mesmo assim... você confiaria em mim até o fim?"
10024005-47 = "Entendi... então é assim. Se eu realmente fizesse algo ruim, o Sensei me daria uma bronca, não é?"
10024005-48 = "..."
10024005-49 = "Que bom para os alunos do Sensei. Isso é... talvez eu sinta um pouco de inveja."
10024005-50 = "...Fufu. Então eu também já sou uma aluna do Sensei?"
10024005-51 = "É um pouco embaraçoso, mas fico feliz em ouvir isso."
10024005-52 = "Então — até o pedido ser concluído, eu vou proteger o Sensei."
10024005-53 = "[s] \"Essa frase me deixou um pouco envergonhado...!\""
10024005-54 = "Ahaha, desculpe, desculpe. Eu mesma não percebo muito bem."
10024005-55 = "[s] \"Eu gostaria que você tivesse consciência disso, mas...\""
10024005-56 = "Ahaha. Então vou me preparar, você poderia vir até a Associação Genbu em Shanhaijing?"
10024005-57 = "Já que não posso ir te buscar, prometo a melhor \"hospitalidade\". Fique no aguardo."
10024005-59 = "（Fui em direção à Associação Genbu de Shanhaijing）"
10024005-64 = "Shanhaijing - Associação Genbu"
10024005-65 = "[ns8] \"Então aqui é a Associação Genbu...\"\n[ns9] \"É exatamente como eu ouvi falar...\""
10024005-73 = "Dá para sentir o cheiro delicioso de especiarias, não dá?"
10024005-74 = "Dá para sentir o aroma de óleo tostado mesmo daqui...!"
10024005-75 = "[s] \"H-hã...?\""
10024005-76 = "Você não é da nossa escola, né?#nSeja bem-vindo à Associação Genbu!"
10024005-77 = "Este é um lugar onde você pode saborear muitas iguarias que não existem em outras escolas!"
10024005-79 = "Vamos, que tal começar pela loja Panda de Bambu?#nTemos uma grande variedade de pratos com tofu!"
10024005-80 = "O nosso carro-chefe é o tofu cozido em uma sopa de abóbora dourada com cogumelos e tofu, e..."
10024005-82 = "Nada disso!#nFrango cozido no vapor tailandês!"

10024005-84 = "O nosso Frango no Vapor é famoso por ser incrivelmente delicioso!#nCozinhamos o frango em uma panela especial, transformando o vapor em um caldo cheio de sabor!"
10024005-85 = "Essa sopa nutritiva, que aproveita ao máximo o sabor e o aroma dos ingredientes, vai curar o seu corpo cansado!"
10024005-86 = "E, claro, você pode saborear o frango até a última lasca!"
10024005-88 = "Humpf, quanta exagero só por causa de um frango cozido no vapor!"
10024005-89 = "O quê!? A sua loja também só serve tofu, não é?#nVocê pretende servir comida de hospital para um cliente que veio de tão longe até a Associação Genbu?"
10024005-91 = "Você não entende que usamos muitos cogumelos e vegetais da montanha para cuidar da saúde?#nNós nos preocupamos em usar ingredientes frescos colhidos na montanha!"
10024005-93 = "Com a nossa sopa, você obtém bastante proteína do frango e ainda aquece o corpo até a alma!"
10024005-99 = "[ns] \"Err, o que é isso...?\""
10024005-100 = "É bom que as duas tenham confiança na própria comida, mas...#nDesculpem, ele é meu convidado."
10024005-101 = "P-Presidente Reimy!?"
10024005-102 = "Por que a presidente está aqui!?"
10024005-103 = "[s] \"Reimy!\""
10024005-104 = "Desculpe a demora, Sensei.#nEu deveria ter vindo te buscar desde o início."
10024005-105 = "E-era um convidado da presidente!"
10024005-106 = "Pedimos desculpas! Já estamos indo!"
10024005-113 = "Francamente... eu sempre digo para não exagerarem na abordagem dos clientes."
10024005-114 = "Hum... entendi. Fico feliz que o Sensei tenha se divertido."
10024005-115 = "Mas, Sensei..."
10024005-116 = "A verdadeira 'hospitalidade' da Associação Genbu começa agora!"
10024005-117 = "Então, sendo assim..."
10024005-118 = "Seja bem-vindo à Associação Genbu!"
10024005-121 = "#video;10024"
