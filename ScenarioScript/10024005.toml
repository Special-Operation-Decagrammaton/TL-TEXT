[translation]
10024005-1 = "プロローグ;[ruby=きゃくじんかんたい]客人歓待[/ruby]"
10024005-3 = "（いつものようにシャーレで仕事をしていると……）"
10024005-6 = "プルルルルル！"
10024005-9 = "[ns] \"誰からだろう……？\""
10024005-11 = "[ns] \"はい、シャーレです。\""
10024005-14 = "シャーレの[USERNAME]先生で合ってるかな？"
10024005-15 = "[s1] \"はい、そうですが……どちら様でしょうか？\"\n[s2] \"留守番電話に接続します。ピーという発信音の後に……\""
10024005-16 = "突然連絡してごめんね。"
10024005-17 = "あたしは[ruby=あけしろ]朱城[/ruby]ルミ。#n玄武商会で会長をやってるんだ。"
10024005-18 = "なんだ、先生って冗談とか言う人なんだね。#nちょっと気が楽になったよ。"
10024005-19 = "まぁ、その冗談はあんまり面白くなかったけど……あはは。"
10024005-20 = "[s3] \"うん……ごめん。\""
10024005-21 = "ははは。それじゃあ、次はとっておきの冗談、期待してるよ。"
10024005-22 = "さて、仕切り直して――あたしは[ruby=あけしろ]朱城[/ruby]ルミ。#n玄武商会で会長をやってるんだ。"
10024005-23 = "[s] \"よろしくね、ルミ。今日は何か相談事？\""
10024005-24 = "相談というか、お願いというか……"
10024005-25 = "あたしたち玄武商会から、シャーレに依頼があってね。"
10024005-26 = "[s] \"……なんだか重たい相談の予感。\""
10024005-27 = "あはは……そうだね。#nこれはあたし個人じゃなくて、[ruby=・   ・   ・   ・]玄武商会[/ruby]としての依頼。"
10024005-28 = "だから先生の勘は正しいよ。"
10024005-29 = "もしかしたら、先生を困らせてしまう内容かもね。"
10024005-30 = "これだけのやり取りで重たい相談って分かるの、すごいね！#nもしかして第六感とかがあったり……？"
10024005-31 = "[s4] \"あはは、ただの偶然だよ。\"\n[s5] \"そういうのがあれば良かったんだけどね……。\""
10024005-34 = "そっか、それは残念。"
10024005-35 = "まぁでも、偶然にせよ話が早いに越したことはないからね。#n依頼内容はそんなに大変じゃないかもだし！"
10024005-36 = "[s] \"そこは言い切ってほしかったな！\""
10024005-37 = "あはは……それで、先生を玄武商会に招待したいんだけど、都合は大丈夫？"
10024005-38 = "噂の先生がどんな人なのか気になるし――改めて挨拶したいからさ。"
10024005-39 = "[s6] \"もちろん、いつでも大丈夫だよ。\"\n[s7] \"私も、ルミがどんな子なのか知りたいな。\""
10024005-42 = "おっ！あたし達、意外と気が合うかもね。"
10024005-43 = "先生に会えるのが楽しみになってきたよ。"
10024005-44 = "[s] \"な、何か悪いことを企んでるわけじゃないよね？\""
10024005-45 = "あははっ。もし、そうだよって言ったら……どうする？"
10024005-46 = "それでも――最後まで信じてくれる？"
10024005-47 = "うん……そっか。#n本当に悪いことをしたら、その時は先生が叱ってくれるんだね？"
10024005-48 = "……。"
10024005-49 = "いいなぁ、先生の生徒は。#nそういうの……ちょっと羨ましいかも。"
10024005-50 = "……ふふっ。あたしも、もう先生の生徒なんだ？"
10024005-51 = "照れくさいけど、そう言われると嬉しいね。"
10024005-52 = "それじゃ――依頼が終わるまで、先生のことはあたしが守ってあげる。"
10024005-53 = "[s] \"そのセリフ、ちょっと照れるかな……！\""
10024005-54 = "あははっ、ごめんごめん。#n自分じゃあんまり分からなくて。"
10024005-55 = "[s] \"そこは自覚してほしいところだけど……。\""
10024005-56 = "あはは。それじゃあ私は準備してるから、[ruby=せんがいきょう]山海経の[/ruby]玄武商会まで来てもらえるかな。"
10024005-57 = "迎えに行けない分、最高の「おもてなし」を約束するよ。#n楽しみにしててね。"
10024005-59 = "（山海経の玄武商会に向かった）"
10024005-64 = "山海経・玄武商会"
10024005-65 = "[ns8] \"ここが玄武商会……\"\n[ns9] \"聞いていた通りというか……\""
10024005-73 = "美味しそうなスパイスの香りがするでしょ？"
10024005-74 = "ここからでも香ばしい油の匂いが伝わってきますね……！"
10024005-75 = "[s] \"う、うん……？\""
10024005-76 = "学園外の方ですよね？#nようこそ、玄武商会へ！"
10024005-77 = "ここは、他の学園にはない珍味がたくさん味わえる場所！"
10024005-79 = "ささ、まずはタケノコパンダ店はいかがでしょう！#n様々な豆腐料理を取り揃えていますよ！"
10024005-80 = "なかでも金色のカボチャスープに、豆腐やキノコを入れて煮込んだ湯豆腐が看板メニューで――"
10024005-82 = "いやいや！#nここまで来たんですから、うちの[ruby=たいざんむしどりてん]泰山蒸鶏店[/ruby]にお越しください！"
10024005-84 = "ウチの[ruby=チーコージー]汽鍋鶏[/ruby]は、それはそれは美味しいと評判で！#n専用の鍋で鶏肉を蒸し、その蒸気を旨味たっぷりのスープにするんです！"
10024005-85 = "食材の風味や香りを存分に活かした栄養たっぷりのスープは、疲れた身体を癒してくれますよ！"
10024005-86 = "もちろん、鶏肉も余すことなく堪能できます！"
10024005-88 = "ふんっ、たかが鶏肉を蒸しただけで大げさな！"
10024005-89 = "なにを！？そういうアンタの店だって、豆腐ばっかりじゃない！#nせっかく玄武商会まで来てくれたお客さんに、病院食でも出すつもりかい？"
10024005-91 = "キノコや山菜をふんだんに使って、身体を気遣ってるのが分からないかなあ！#n採れたての山の幸に[ruby=こだわ]も拘っ[/ruby]てるんだぞ！"
10024005-93 = "ウチのスープなら、鶏肉でたんぱく質もたっぷり摂れて、#n身体も芯まで温めてくれるっ！"
10024005-99 = "[ns] \"えっと、これは一体……？\""
10024005-100 = "2人とも自分の料理に自信があるのはいい事だけど――#nごめんね、この人はあたしのお客さんなんだ。"
10024005-101 = "る、ルミ会長！？"
10024005-102 = "なんでここに会長が！？"
10024005-103 = "[s] \"ルミ！\""
10024005-104 = "お待たせ、先生。#n最初から迎えに行けば良かったね。"
10024005-105 = "か、会長のお客様だったんですね！"
10024005-106 = "失礼しました！私たちはこれで！"
10024005-113 = "まったく……客引きは程々にねって、いつも言ってるんだけどさ。"
10024005-114 = "ん……そっか、先生が楽しんでくれたなら良かった。"
10024005-115 = "でもね、先生……"
10024005-116 = "玄武商会の「おもてなし」は、ここからが本番だよ！"
10024005-117 = "ということで、改めて……"
10024005-118 = "ようこそ、玄武商会へ！"
10024005-121 = "#video;10024"
