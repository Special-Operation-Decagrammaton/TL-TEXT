[translation]
1013202-1 = "Modelo de novo...!"

1013202-2 = "Local/bastidores do desfile de moda"

1013202-4 = "(Ele deve ter largado o emprego de modelo... ele estava preocupado com Tsukuyo, então pediu para fazer um tour pelo site.)"

1013202-5 = "Ah, professora...! #nÉ isso!"

1013202-6 = "Não hesite, certo?"

1013202-7 = "[s] \"A equipe nos mostrou o local.\""

1013202-8 = "Ok, isso é bom..."

1013202-9 = "Na verdade, eu te disse isso com antecedência."

1013202-10 = "Tem gente incrível chegando, então por favor venha me ver..."

1013202-11 = "[s] \"Pessoa incrível!?\""

1013202-12 = "Ehehe...#n, tenho uma sensação estranha quando falo nos bastidores assim."

1013202-13 = "Parece que estamos nos encontrando secretamente..."

1013202-14 = "[s1] \"Claro.\"\n[s2] \"A propósito, como estão os preparativos para o show?\""

1013202-17 = "sim. #nTerminamos de arrumar os figurinos... então estávamos ensaiando."

1013202-18 = "No momento estou tentando me acostumar com a altura dos saltos...estou usando sapatos de verdade."

1013202-19 = "[s] \"Como esperado de um profissional!\""

1013202-23 = "Ah, é isso…!"

1013202-24 = "Nossa, tem muito profissional com carreira mais longa que a minha...!"

1013202-25 = "Além disso, este é meu último trabalho de modelo..."

1013202-26 = "Ah... o que você acha do ponto de vista do seu professor?"

1013202-32 = "Acho que posso usar bem esse vestido...?"

1013202-33 = "[s3] \"Combina com você!\"\n[s4] \"É um estilo de roupa Tsukuyo!""

1013202-36 = "Ei, ei…."

1013202-37 = "Ah, por favor, não levante muito..."

1013202-38 = "Mas...estou muito feliz em ouvir isso. #nEheheh..."

1013202-39 = "[s] \"A propósito, por que você está trabalhando como modelo de novo?\""

1013202-40 = "Na verdade, há poucos dias recebi uma oferta da Shine Cat Agency."

1013202-41 = "No começo tentei recusar, mas..."

1013202-42 = "Quando perguntei a ele sobre isso, ele disse que era apenas por um dia..."

1013202-43 = "Acima de tudo, isso..."

1013202-45 = "O organizador... apresentou-me certas condições."

1013202-46 = "[s] \"Certas condições...?\""

1013202-47 = "……sim."

1013202-48 = "Parei de modelar uma vez..."

1013202-49 = "Houve um pouco de resistência, mas..."

1013202-50 = "Se for esse o caso... eu aceito. Eu decidi."

1013202-51 = "[s] \"...Quais são as condições?\""

1013202-52 = "isso é--"

1013202-56 = "10 minutos antes do início do show, fique de prontidão."

1013202-57 = "Ah, mais sobre isso depois..."

1013202-58 = "Bem, vamos lá... Sensei!"

1013202-64 = "(Estou com uma sensação um pouco desagradável...)"

1013202-65 = "(Decidi assistir Tsukuyo o mais próximo possível.)"

1013202-67 = "local para evento de desfile de moda"

1013202-69 = "(Depois de esperar um pouco, a performance real começou)"

1013202-85 = "(Tsukuyo faz um ótimo trabalho como modelo...)"

1013202-86 = "(O show transcorreu sem incidentes)"

1013202-92 = "Local de desfile de moda/exterior"

1013202-93 = "(Depois do evento, encontrei-me com Tsukuyo fora do local.)"

1013202-97 = "professor!"

1013202-98 = "Desculpe, estou atrasado...!"

1013202-99 = "[s] \"Bem, obrigado pelo seu trabalho duro.\""

1013202-100 = "Hehehe..."

1013202-101 = "...Isso foi bom."

1013202-102 = "Tudo acabou bem e estou indo para casa..."

1013202-104 = "Ei, espere um minuto."

1013202-108 = "Huh...?"

1013202-109 = "De jeito nenhum... você não vai voltar para casa assim, não é, Tsukuyo-san?"

1013202-110 = "...?"

1013202-111 = "...O que aconteceu com essas condições?"

1013202-112 = "Você esqueceu?"

1013202-113 = "Ah! #nEu estava com pressa, então..."

1013202-114 = "[s] \"Essas condições são...!\""

1013202-118 = "...Ei, você também sabe?"

1013202-119 = "Então não há necessidade de se esgueirar..."

1013202-120 = "Sim, quais são as condições?"

1013202-124 = "Vou entregar o panfleto de prévia de ``Ninjas Live Seven Times'', o 13º filme dirigido por ``Shiba Inu Wanzo''!"

1013202-125 = "[s] \"………… hein?\""

1013202-126 = "``A Ninja Lives Seven Times''...É um trabalho excelente, mas a exibição prévia foi extremamente pequena, então os panfletos são agora difíceis de obter."

1013202-127 = "Mas mas! #nNão vamos esconder nada, nossa empresa foi a organizadora daquela exibição prévia!"

1013202-128 = "O Sr. Tsukuyo assinou um contrato com a condição de que usaria sua autoridade como presidente para retirar o panfleto do depósito da empresa e entregá-lo a ele, além do pagamento regular...!"

1013202-129 = "[s] \"É mesmo!?\""

1013202-131 = "sim! Este é um panfleto muito raro...! #nAcho que tanto o técnico quanto Izuna ficarão felizes se você exibi-lo na sala do clube!"

1013202-132 = "Ufa...aceitei o papel de modelo para esse fim..."

1013202-133 = "Quase acabei voltando para casa por engano...hehe."

1013202-134 = "A propósito, Tsukuyo."

1013202-135 = "Isso também é algum tipo de conexão, então por que você não pensa em voltar para a indústria?"

1013202-136 = "……sim?"

1013202-137 = "Na verdade, outro dia tive a oportunidade de conversar com Shine Cat em uma conferência de moda."

1013202-138 = "Parece que Tsukuyo ainda se arrepende. #nEles aceitaram desta vez também. Você poderia aproveitar esta oportunidade para pensar sobre isso?"

1013202-139 = "Ah, é isso..."

1013202-140 = "Estou muito grato por esta história, mas..."

1013202-144 = "Sinceramente, voltar àquela época é assustador..."

1013202-145 = "O treinamento infernal... as restrições alimentares... a tensão de caminhar sob as luzes..."

1013202-146 = "Bem, o trabalho de uma modelo de alta costura é algo que o talento sozinho não consegue lidar..."

1013202-147 = "ruim. Você disse algo desnecessário."

1013202-148 = "não! Obrigado por prestar atenção em mim!"

1013202-149 = "Pois bem, fiz questão de entregá-lo a você. Por favor, me desculpe. #nBom trabalho, obrigado!"

1013202-153 = "Bem, eu meio que sinto muito..."

1013202-158 = "Ah, uh, uh... na verdade, eu estive em restrição alimentar por alguns dias..."

1013202-159 = "[s] \"Então vou convidar você para um banquete hoje.""

1013202-160 = "Huh...?"

1013202-161 = "Isso é... está tudo bem?"

1013202-162 = "[s5] \"Aqueles que não trabalham não deveriam comer.\"\n[s6] \"Em outras palavras, Tsukuyo, que é um trabalhador esforçado, deveria comer muito!\""

1013202-165 = "...!"

1013202-166 = "Bem, se for esse o caso..."

1013202-167 = "Obrigado por suas amáveis ​​palavras, senhor!"

1013202-169 = "(Fiquei momentaneamente surpreso com a extensão do recibo que recebi...)"

1013202-170 = "(Quando vi o sorriso de Tsukuyo, pensei que não importava)"

