[translation]
2002902-1 = "夏の海の大和撫子"
2002902-2 = "ホテル・廊下"
2002902-5 = "パラソルもレジャーシートも持ってきましたし、椅子にクーラーボックス、食べ物、飲み物……"
2002902-6 = "ゴーグルに浮き輪、予備の水着もちゃんと用意してきました。準備はいくらしても足りないと言いますが、これだけ揃っていれば大丈夫そうですね。"
2002902-7 = "[s1] \"そう、だね……ありがとう。\"\n[s2] \"ちょっと多かったかもね。\""
2002902-10 = "いえ、これも修行部の副部長として当然です。"
2002902-11 = "え？荷物を持ってくださるのですか……？#nそ、それは少々申し訳ないのですが……"
2002902-12 = "むしろ、私が持っていると罪悪感が……？#nせ、先生がそう仰るのでしたら……お言葉に甘えさせてもらいますね。"
2002902-13 = "それでは先生、海に行く前に……"
2002902-19 = "（スッ）"
2002902-23 = "[ns] \"急に手を広げて、どうしたの……？\""
2002902-24 = "ふふっ、お出かけの前にハグをしてくださらないと。"
2002902-25 = "[s] \"もしかして……オキシトシンハグ！？\""
2002902-26 = "はい、その通りです。"
2002902-27 = "先生から……さあ早く。"
2002902-28 = "[s3] \"い、いくらなんでも、ここは廊下だし……。\"\n[s4] \"誰かに見られたら……ちょっと恥ずかしくない？\""
2002902-31 = "私とハグをしたくない、ということですか……？"
2002902-32 = "[s5] \"そ、そうじゃないんだけど……ね？\"\n[s6] \"と、とりあえず海に出よっか！\""
2002902-35 = "は、はい……"
2002902-41 = "海辺"
2002902-43 = "（歩きながら、ミモリの様子を窺ってみると……）"
2002902-47 = "（何も気にしていないような素振りだったが、どこか落ち込んでいるようにも見えた）"
2002902-51 = "レジャーシートもパラソルも、うまく設置できましたね。#nこれも先生が手伝ってくださったおかげです。"
2002902-52 = "……本当に大丈夫なのかって？#n特に問題はありませんが、急にどうされました……？"
2002902-53 = "先生の気のせいですから、大丈夫ですよ。"
2002902-54 = "さあ、何からしましょう？#n海水浴かシュノーケリングか……それとも、日光浴にしますか？"
2002902-55 = "[s] \"そ、それじゃあ日光浴で……。\""
2002902-56 = "はい、日光浴ですね。では、こちらで横になってください。#n日焼け止めを塗りますね。"
2002902-64 = "ふふっ、くすぐったいですか？少しだけ我慢してください。#nしっかり隅々まで塗らないと、お肌が焼けてしまいますよ？"
2002902-71 = "……はい、終わりました。#n先生は、そちらのサマーベッドをお使いください。"
2002902-72 = "私ですか？ふふっ、私はパラソルの下で先生を見守っています。"
2002902-73 = "あ、サングラスを忘れないでくださいね？"
2002902-75 = "（ミモリの優しさに甘えて、日光浴を始めた）"
2002902-81 = "（夏の日差しと波の音に眠気を誘われ、徐々に意識が……）"
2002902-92 = "（優しくて心地の良い風を受けながら、目を覚ます）"
2002902-93 = "（後頭部に、優しい人肌を感じた）"
2002902-98 = "あ、先生。お目覚めですか？"
2002902-101 = "[ns] \"ミモリ？\""
2002902-103 = "[ns7] \"……あ、ミモリがうちわで扇いでくれてたんだ。\"\n[ns8] \"それに膝枕まで……至れり尽くせりで、ありがとう。\""
2002902-106 = "いえ、大和撫子を目指し日々精進する修行部員として、これくらい当然のことですから。"
2002902-107 = "えっと、では……"
2002902-110 = "[ns] \"……。\""
2002902-111 = "（気まずい時間が続いた）"
2002902-114 = "[ns] \"ま、まだ時間もあるし、一緒に散歩でもしようか！\""
2002902-115 = "あっ、先生。そんな急に立ち上がったら……！"
2002902-118 = "[ns9] \"あれ……？\"\n[ns10] \"なんか、視界が……。\""
2002902-124 = "先生！"
2002902-131 = "[ns] \"あっ……ミモリ……？\""
2002902-132 = "（しばらくして冷静になると、自分がミモリに抱きとめられているのだと理解した）"
2002902-133 = "……。"
2002902-134 = "ふふっ……"
2002902-135 = "オキシトシンハグ、しちゃいましたね？"
2002902-136 = "[s] \"そ、そうなる……よね！？\""
2002902-137 = "はい、今度は気をつけてお立ちくださいね？"
2002902-138 = "私がお支えしますから♪"
2002902-142 = "（ミモリの助けを借りて身体を起こし、少し休んでから……）"
2002902-148 = "（2人で一緒に、海を眺めながら浜辺を歩いた）"
