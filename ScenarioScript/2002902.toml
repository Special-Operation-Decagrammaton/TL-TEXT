[translation]
2002902-1 = "A Yamato Nadeshiko na praia de verão"
2002902-2 = "Hotel - Corredor"
2002902-5 = "Trouxe o guarda-sol, a esteira de praia, a cadeira, a caixa térmica, comida, bebida..."
2002902-6 = "Óculos de natação, boia e até um traje de banho reserva. Dizem que nunca estamos preparados o suficiente, mas acho que com tudo isso, estamos prontos."
2002902-7 = "[s1] \"É, verdade... obrigado.\"\n[s2] \"Talvez tenha sido um pouco demais, não acha?\""
2002902-10 = "Não, isso é apenas o meu dever como vice-presidente do Clube de Treinamento."
2002902-11 = "Eh? Você vai carregar as malas para mim...?#nI-isso é um pouco constrangedor, mas..."
2002902-12 = "Na verdade, sinto-me culpada por você carregar tudo...?#nS-se o Sensei insiste... então aceitarei sua gentileza."
2002902-13 = "Então, Sensei, antes de irmos para a praia..."
2002902-19 = "(Desliza)"
2002902-23 = "[ns] \"Por que abriu os braços de repente...?\""
2002902-24 = "Fufu, você precisa me dar um abraço antes de sairmos."
2002902-25 = "[s] \"Será que é... um abraço de ocitocina!?\""
2002902-26 = "Sim, exatamente."
2002902-27 = "Do Sensei... vamos, rápido."
2002902-28 = "[s3] \"M-mas, estamos no corredor...\"\n[s4] \"Não seria um pouco vergonhoso se alguém nos visse?\""
2002902-31 = "Você está dizendo que não quer me abraçar...?"
2002902-32 = "[s5] \"N-não é isso... sabe?\"\n[s6] \"B-bem, vamos logo para a praia!\""
2002902-35 = "S-sim..."
2002902-41 = "Beira-mar"
2002902-43 = "(Enquanto caminhamos, observo o comportamento de Mimori...)"
2002902-47 = "(Ela agia como se não se importasse com nada, mas parecia um pouco desanimada)"
2002902-51 = "Conseguimos montar a esteira e o guarda-sol perfeitamente.#nIsso foi graças à sua ajuda, Sensei."
2002902-52 = "...Se estou realmente bem?#nNão há problema algum, mas por que a pergunta de repente...?"
2002902-53 = "É apenas impressão sua, Sensei, estou bem."
2002902-54 = "Bem, o que vamos fazer agora?#nNadar, mergulhar com snorkel... ou prefere tomar um banho de sol?"
2002902-55 = "[s] \"B-bem, então vamos de banho de sol...\""
2002902-56 = "Sim, banho de sol. Então, por favor, deite-se aqui.#nVou passar o protetor solar em você."
2002902-64 = "Fufu, está com cócegas? Tente aguentar só um pouco.#nSe eu não passar em todos os cantinhos, sua pele vai queimar, sabia?"
2002902-71 = "...Pronto, terminei.#nSensei, por favor, use aquela espreguiçadeira ali."
2002902-72 = "Eu? Fufu, eu ficarei aqui embaixo do guarda-sol cuidando de você."
2002902-73 = "Ah, não se esqueça dos óculos de sol, viu?"
2002902-75 = "(Aceitando a gentileza de Mimori, comecei a tomar banho de sol)"
2002902-81 = "(O sol de verão e o som das ondas me deram sono, e minha consciência foi se esvaindo...)"
2002902-92 = "(Acordo sentindo uma brisa suave e agradável)"
2002902-93 = "(Senti o calor reconfortante de alguém na parte de trás da minha cabeça)"
2002902-98 = "Ah, Sensei. Acordou?"
2002902-101 = "[ns] \"Mimori?\""
2002902-103 = "[ns7] \"...Ah, a Mimori estava me abanando com um leque.\"\n[ns8] \"E ainda por cima um travesseiro de colo... obrigado por cuidar tão bem de mim.\""
2002902-106 = "Não há de quê. Como uma integrante do Clube de Treinamento que busca se tornar uma Yamato Nadeshiko, isso é o mínimo que posso fazer."
2002902-107 = "Bem, então..."
2002902-110 = "[ns] \"...\""
2002902-111 = "(Um silêncio constrangedor se instalou)"
2002902-114 = "[ns] \"A-ainda temos tempo, vamos dar uma caminhada!\""
2002902-115 = "Ah, Sensei. Se levantar tão rápido assim...!"
2002902-118 = "[ns9] \"Ué...?\"\n[ns10] \"Minha visão está...\""
2002902-124 = "Sensei!"
2002902-131 = "[ns] \"Ah... Mimori...?\""
2002902-132 = "(Depois de um tempo, ao recuperar a calma, percebi que estava sendo segurado por Mimori)"
2002902-133 = "..."
2002902-134 = "Fufu..."
2002902-135 = "Você acabou de me dar um abraço de ocitocina, não foi?"
2002902-136 = "[s] \"I-isso acabou acontecendo... né!?\""
2002902-137 = "Sim, da próxima vez, por favor, tome cuidado ao se levantar, está bem?"
2002902-138 = "Eu vou te ajudar a se apoiar♪"
2002902-142 = "(Com a ajuda da Mimori, levantei-me e, depois de descansar um pouco...)"
2002902-148 = "(Nós dois caminhamos juntos pela praia enquanto observávamos o mar)"
