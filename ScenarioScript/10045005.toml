[translation]
10045005-1 = "Prólogo; A confraternização da Hyakkaryouran"
10045005-4 = "Um céu azul sem fim e um sol escaldante.#nO verão está aqui."
10045005-5 = "Esta é uma história de um verão, tecida pela amizade e pela juventude—"
10045005-8 = "O que eu estou fazendo da minha vida..."
10045005-9 = "Eu deveria estar passando o tempo tranquilamente no meu quarto, lendo livros de estratégia militar."
10045005-10 = "Por que eu vim parar na praia..."
10045005-11 = "O mar azul com as veteranas! Nuvens brancas! E trajes de banho refrescantes!#nÉ a situação com a qual eu sempre sonhei!"
10045005-12 = "Vamos! Não é hora de ficar de bobeira!#nDepressa! Vamos logo para a beira da água!"
10045005-13 = "Eu vou recusar."
10045005-17 = "O que houve? Você não estava animada também, Kikyou?"
10045005-18 = "Eu concordei com a confraternização, mas... ninguém me disse que viríamos à praia."
10045005-20 = "A veterana Kikyou não gosta do mar...?"
10045005-22 = "N-não é nada disso. É só que—"
10045005-23 = "Eu só não sou muito fã de atividades ao ar livre."
10045005-29 = "Você é do tipo caseira, não é, veterana Kikyou?"
10045005-30 = "Mas já que viemos até aqui, não brincar no mar é inaceitável!"
10045005-36 = "Vamos, veterana Kikyou! Vamos nessa!"
10045005-37 = "Haa..."
10045005-38 = "Bem, bem, vamos deixar por isso mesmo.#nNão é bom forçar ninguém a sair."
10045005-39 = "Nós vamos indo na frente, então venha quando estiver a fim!"
10045005-43 = "Estaremos esperando por você!"
10045005-47 = "Haa..."
10045005-51 = "...Desculpe. Deveríamos ter escolhido outro lugar."
10045005-52 = "Não, as outras queriam vir à praia."
10045005-53 = "Todo mundo está se divertindo tanto, eu não posso estragar o clima por causa do meu egoísmo, certo?"
10045005-54 = "Fufu. Entendi."
10045005-55 = "Mas talvez seja bom você fazer um aquecimento."
10045005-56 = "Vai começar em breve."
10045005-57 = "O evento tradicional de verão de Hyakkiyako—"
10045005-59 = "[log=나구사 수영복]Festival Aquático de Hyakki[/log]"
10045005-65 = "(Onde foi que eu errei...?)"
10045005-66 = "(Eu nem pretendia participar do festival...)"
10045005-67 = "(E, acima de tudo, por que eu, que não sei nadar, estou aqui...!)"
10045005-72 = "Eu não achei que todas seriam sorteadas.#nA taxa de seleção era altíssima, mesmo só para participar."
10045005-73 = "É. Foi totalmente inesperado..."
10045005-74 = "(Eu queria que pelo menos eu tivesse sido reprovada...)"
10045005-75 = "Kikyou? Está tudo bem? Está pensando em algo?"
10045005-76 = "...Eu estava formulando uma estratégia secreta."
10045005-77 = "Um plano para conquistar uma vitória absoluta e brilhante."
10045005-79 = "...Entendi."
10045005-80 = "Então, estou ansiosa por isso. Pelo plano que você criou, Kikyou."
10045005-81 = "(Eu preciso pensar...#nPelo nome da estrategista da Hyakkaryouran—)"
10045005-85 = "(Eu não posso deixar ninguém descobrir que tenho medo da água...!)"
