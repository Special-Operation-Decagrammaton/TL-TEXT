[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 11/06.
42100-1 = "Episódio 10: Fora de Controle"
42100-2 = "Escritório da Presidência Interina do Conselho Estudantil Geral"
42100-5 = "Fufu... Concluir as tarefas matinais e degustar uma xícara de Blue Mountain tem um sabor indescritível."
42100-6 = "Essa acidez delicada e o aroma perfeitamente equilibrado... Isso só é possível quando se torram os grãos sob um calor intenso e brutal, moendo-os depois com força uniforme."
42100-7 = "……Comandar pessoas segue a mesma lógica. Se você afrouxar o fogo por medo de perdê-las, a mistura fica amarga, caótica e imprestável."
42100-9 = "Os ratos da cidade estão choramingando agora porque não conseguem processar as mudanças bruscas... mas com o tempo, as massas aprenderão a amar a coleira."
42100-10 = "Eles vão descobrir a doçura infinita de abrir mão da liberdade em troca de submissão e disciplina..."
42100-12 = "……Expulsei os cães leais à Rin. Negociei perdões corporativos com a Kaiser em troca do poder de fogo do exército deles. Tudo se alinhou com precisão milimétrica."
42100-13 = "Agora é só colher as dívidas e pavimentar o tapete vermelho para me consagrar definitivamente como a Nova Presidente do Con--"
42100-18 = "Chefe Kaya―― digo, Presidente Interina. Peço perdão por invadir a sua sala assim, mas temos um alerta vermelho no painel."
42100-19 = "Vice-Diretora de Defesa, qual é o problema agora?"
42100-20 = "Se não for o mundo acabando, volte mais tarde. Meu café está esfriando."
42100-21 = "Mil desculpas, senhora... mas a situação tá escalando rápido e não dá mais pra segurar as pontas."
42100-22 = "Eu sei que a sua agenda tá lotada com a transição de governo, mas como a Oficial Rin sumiu do mapa... a bomba caiu no seu colo..."
42100-23 = "……Respire fundo e desembuche."
42100-24 = "Por volta das 11:00 desta manhã, na linha central ferroviária do Distrito Norte, um trem de transporte de valores blindado foi sequestrado por assaltantes armados e desapareceu dos nossos radares."
42100-25 = "O protocolo exige que a Presidente Interina faça a ponte com o Comitê de Trânsito para acionar os freios de emergência do sistema ferroviário e solicite uma força-tarefa dos distritos vizinhos, mas..."
42100-26 = "Ah, entendo. Um bando de mortos de fome sequestrando um trem..."
42100-30 = "……ESPERA. UM SEQUESTRO DE TREM?!"
42100-31 = "Por que infernos você guardou um desastre dessa magnitude na gaveta até agora?!"
42100-32 = "H-Hã...?!"
42100-33 = "Mas, senhora Presidente... a senhora mesma decretou que não receberia relatórios 'banais' durante a sua manhã de meditação com café..."
42100-34 = "E além do mais... assalto a trem é praticamente rotina em Kivotos. Acontece quase toda semana..."
42100-35 = "……Rotina? Você está me dizendo que a Rin perdia tempo preenchendo papelada para cada trem assaltado nessa cidade no meio do expediente?!"
42100-36 = "Exatamente, senhora."
42100-37 = "Haaah..."
42100-38 = "……Entendi. Deixe os freios do sistema comigo. Eu ligo para o Comitê de Trânsito e resolvo a burocracia."
42100-39 = "Quero que você mobilize a Academia Valkyrie imediatamente.#nTranque todas as estações num raio de dez quilômetros e cace esses terroristas até o último vagão. Vai!"
42100-40 = "Ahm... sobre isso, senhora..."
42100-41 = "……O que foi agora?"
42100-43 = "A Chefe de Segurança Pública, Kanna, que costumava varrer esse tipo de lixo, e toda a sua cúpula de elite... foram suspensas ontem por insubordinação contra os decretos do conselho."
42100-44 = "E com o novo Decreto Executivo que a senhora implementou hoje de madrugada... quase cem por cento da força policial está amarrada em blitzes de trânsito e detenção de civis nas ruas.#nNós não temos efetivo livre pra mandar atrás do trem."
42100-46 = "Arranque cadetes da folga! Use a patrulha comunitária! Faça milagre e bote gente armada na rua! Cuidar da segurança é o SEU emprego!"
42100-47 = "Se você se provar uma incompetente incapaz de lidar com um bando de assaltantes e sujar a credibilidade do meu novo regime nas primeiras horas..."
42100-48 = "Eu sugiro que comece a limpar a sua mesa e procurar uma nova academia para morar. Fui clara?"
42100-49 = "S-Sim senhora! Estou indo!!"
42100-53 = "Haaah... Essa coroa é muito mais suja e pesada do que eu imaginava..."
42100-57 = "Alô? Comitê de Trânsito, preciso de atenção imediata."
42100-58 = "Chefe Kaya? O que a rainha da Defesa quer com o setor de transportes a essa hora?"
42100-59 = "Eu não sou Diretora. Dirija-se a mim como Presidente Interina."
42100-60 = "Tanto faz, dá tudo no mesmo. Desembucha.#nO meu Ifood tá chegando daqui a pouco e eu não quero que meu almoço esfrie."
42100-61 = "……O assunto é muito mais grave que o seu delivery barato."
42100-62 = "A Vice-Diretora de Defesa me confirmou o sequestro de um trem de valores na linha central norte."
42100-63 = "Exijo que ativem o bloqueio de emergência nos trilhos da malha ferroviária e coordenem com os distritos vizinhos imediatamente."
42100-64 = "Uuuh..."
42100-65 = "……Que preguicinha."
42100-66 = "H-Hã?! Como é que é...?"
42100-67 = "Pensa comigo: se os bandidos já levaram o trem, o estrago tá feito, né?"
42100-68 = "Essa burocracia vai me dar uma dor de cabeça lascada.#nAcho melhor eu bater meu pratão de comida primeiro e ver isso com calma de tarde~"
42100-69 = "……Você é burra ou apenas cega para a gravidade da situação nacional?"
42100-70 = "Isso é uma recusa oficial a uma ordem direta?#nQuer que eu chame a polícia e assine sua ordem de prisão por prevaricação no cargo?!"
42100-71 = "Fique à vontade~#nSe eu for presa, aí mesmo que eu não preciso mais trabalhar. Win-win!"
42100-72 = "Ah, e só um aviso: se me mandarem pro xilindró, a malha viária de Kivotos vai colapsar e alguém vai ter que reescrever a tabela de rotas inteira do zero, no braço."
42100-73 = "E eu acho que no final do dia, a culpa de milhões de pessoas presas no engarrafamento vai cair no colo da Nova Presidente, fufu..."
42100-75 = "……Sua chantagista nojent――"
42100-79 = "Opa, o motoboy chegou com minha marmita!#nBjo, mais tarde a gente se fala~!"
42100-83 = "……"
42100-84 = "Fuuuuh..."
42100-85 = "……Controle a raiva. Controle a pressão arterial, Kaya."
42100-86 = "Você é o farol de Kivotos agora. O pedestal da próxima Presidente Absoluta."
42100-87 = "Mantenha o sangue frio... Os plebeus são ignorantes, eu preciso educá-los um a um..."
42100-91 = "……O que mais deu errado?!"
42100-92 = "……Nossa, parece que alguém acordou com os dois pés esquerdos hoje, Madame Presidente."
42100-94 = "Ah... Diretora de Finanças Aoi."
42100-95 = "Peço perdão. Apenas o estresse acumulado da transição lidando com vermes parasitas do conselho e incompetentes, releve."
42100-96 = "Espero que o motivo da sua visita traga um mínimo de inteligência e alívio para a minha sala. Assumo que não me trará dores de cabeça."
42100-97 = "Isso... depende do seu ponto de vista."
42100-98 = "Eu estou aqui por conta das papeladas financeiras de 'Solicitação de Orçamento Extraordinário para Execução dos Novos Decretos', que a sua gestão protocolou hoje cedo."
42100-99 = "Sim, exato. O dinheiro é vital para estabelecer a paz nas ruas. Exijo que os fundos sejam liberados imediatamente."
42100-103 = "……Rejeitado. Cada centavo foi vetado."
42100-105 = "O Q-QUE?! Como ousa?!"
42100-106 = "Ao auditar a papelada, notei que todos os cifrões e estimativas foram grafados usando numerais arábicos."
42100-107 = "Tendo em vista o risco brutal de falsificação com adição de zeros em formulários dessa magnitude... pedidos que não estejam escritos por extenso em caracteres japoneses clássicos (Kanji) vão direto pro triturador."
42100-108 = "Além disso, o carimbo presidencial de aprovação estava ligeiramente borrado na margem e o nome não estava 100% legível."
42100-109 = "Essas falhas estruturais invalidam qualquer trâmite contábil na minha mesa."
42100-110 = "Refaça toda a papelada, do zero."
42100-111 = "Ahm... veja bem... Diretora Aoi..."
42100-112 = "Eu me curvo às normas, mas o meu cronograma de contenção urbana e reuniões diplomáticas está estrangulando o meu pescoço."
42100-113 = "Eu imploro, abra uma exceção por conta da crise!#nEu prometo protocolar adendos corrigindo isso depois que――"
42100-115 = "A resposta é não."
42100-116 = "A coroa na sua cabeça não te exime do imposto de renda, Kaya.#nA Oficial Rin era esmagada pela burocracia também, mas ela virava a noite corrigindo os próprios papéis pra não quebrar as regras."
42100-117 = "I-Isso é absurdo..."
42100-118 = "Eu espero os formulários limpos na minha mesa até o pôr do sol.#nCaso contrário, o orçamento é cancelado para sempre."
42100-119 = "M-Mas eu não tenho tempo hábil pra reescrever tudo isso...!"
42100-124 = "Eu imploro... me dê até depois de amanhã? Só quarenta e oito horas de margem..."
42100-125 = "…………Você tem até o final do expediente de amanhã. Essa é a minha palavra final."
42100-129 = "ESSES MALDITOS INÚTEIS DE MEIA TIGELA!"
42100-130 = "Por que os deuses me cercaram de animais preguiçosos e burocratas sádicos num mar de incompetência?!"
42100-131 = "Pra onde foi o respeito que o meu cargo exigia...?!"
42100-135 = "……Estão encurralando você."
42100-136 = "……Esqueça. Não é nada fatal.#nSão só pedras minúsculas e ruidosas no meu caminho para o paraíso. Posso lidar com isso."
42100-137 = "Estava apenas gastando saliva reclamando de cães vadios que latem muito mas não sabem nem carregar uma caneta."
42100-138 = "No fim do dia, a única lâmina inquebrável que obedece a minha vontade cega é você e o Esquadrão FOX, Yukino."
42100-139 = "……Nosso sangue é frio. Nós operamos, executamos ordens e silenciamos inimigos."
42100-140 = "A virtude de uma arma é matar quando exigida, sem pensar."
42100-141 = "……Fufu, é por isso que o meu amor por você é absoluto."
42100-142 = "……Mudando de alvo."
42100-143 = "Quando... nós vamos voltar e reabrir as portas da SRT?"
42100-148 = "……E isso lá é prioridade de vida ou morte pra agora?"
42100-149 = "Claro que não. A nossa guerra agora é dominar os conselheiros estúpidos, consolidar a aprovação cega e varrer a poeira."
42100-150 = "Quando o Governo Estudantil ajoelhar no meu pé, eu construo dez Academias SRT novas pra você, se quiser."
42100-151 = "Foque na missão. Não inverta os ponteiros."
42100-155 = "……Copiado. Perdão pelo desvio."
42100-156 = "Respire. Eu entendo a dor do sacrifício e sou a única no mundo disposta a recompensar vocês."
42100-157 = "Seja o meu revólver. Atire na escuridão sob o meu comando."
42100-158 = "Tudo em nome da FOX...#nE em prol de salvar aquelas calouras imundas que você tanto quer proteger."
42100-159 = "……Copiado e entendido."
42100-166 = "PRESIDENTE!! PERDEMOS O CONTROLE DA SITUAÇÃO!!"
42100-167 = "……Depois de ser espancada por formulários em kanji, o inferno na terra não me assusta mais."
42100-168 = "O que tá em chamas dessa vez?"
42100-169 = "A coisa ficou preta na porta do conselho...!"
42100-170 = "A Diretora de Recursos Humanos foi espancada e feita de refém pela própria milícia!"
42100-172 = "O-O QUÊ...?!"
42100-174 = "（Algumas horas antes, no gramado principal do Conselho Estudantil Geral）"
42100-178 = "Atenção, Operários!! O sangue e o suor de vocês forjaram um milagre hoje!!"
42100-179 = "Se aquela tirana da Nanagami Rin foi decapitada politicamente em tempo recorde, a glória é de cada garganta que gritou nesses portões de ferro!!"
42100-180 = "UURAAAAAHHHH!!"
42100-181 = "E tudo porque eu clamei aos ventos da minha velha pátria acadêmica!#nEu jamais conseguiria prever que as alunas de Red Winter fariam uma barricada de dias sem pedir um único tostão.#nA dívida de gratidão do Governo Central com vocês é imensa!"
42100-184 = "Não precisa lamber nossas botas de poeira! A rebelião armada contra os porcos burgueses e a opressão injusta é o feijão com arroz da classe trabalhadora proletária!"
42100-185 = "Sempre que tiver ditador pra guilhotinar, Red Winter manda os machados!"
42100-186 = "Fufu, maravilhosas. A revolução pulsa forte nas veias de vocês."
42100-187 = "……Mas ei, o pescoço da maldita Rin rolou no tapete do conselho mesmo?"
42100-188 = "Rolou. E sem cerimônia."
42100-189 = "O eco da fúria de vocês despedaçou a defesa dela. Ela foi deposta e aprisionada pra apodrecer pelos crimes contra Kivotos."
42100-191 = "……Tá, a burguesa caiu. Quem foi o urubu que pegou a coroa?"
42100-192 = "A nossa salvadora, a heroína tática... a Presidente Shiranui Kaya!"
42100-194 = "……Entendi. Então, companheiras, o alvo mudou!"
42100-198 = "INICIAR PROCESSO DE DESTRUIÇÃO POLÍTICA E MOTIM CONTRA A PRESIDENTE KAYA!"
42100-199 = "ÀS ARMAS! DERRUBEM O MURO!! AVANTE PROLETARIADO!"
42100-200 = "P-PERA, QUÊ?!#nPor que diabos vocês tão pedindo a cabeça da minha chefe agora?!"
42100-201 = "O acordo era fuzilar a moral da Oficial Rin, e nós cumprimos! Qual o problema de vocês?!"
42100-202 = "……Nós esmagamos a Rin. Mas com ela fora da jogada...#nA Shiranui Kaya virou a burguesa nojenta que governa a elite opressora de Kivotos, não virou?"
42100-203 = "E sendo assim..."
42100-204 = "TODO O CAOS E SOFRIMENTO É CULPA DELA AGORA!"
42100-205 = "RE-NÚN-CIA! PUNIÇÃO!"
42100-206 = "V-VOCÊS SÃO DOENTES DA CABEÇA?! Cheiraram fumaça de pneu queimado e enlouqueceram?!"
42100-207 = "A Chefe Kaya sentou na cadeira tem um par de horas!#nComo raios ela tem culpa de qualquer coisa?!"
42100-208 = "Qualquer fracasso estrutural é culpa do líder de estado... ou seja, no fundo, todos os horrores de Kivotos derivam do Capitalismo Opressor da Chefe Kaya!"
42100-209 = "Se a semana letiva não foi reduzida pra 3 dias... Se meu casaco não esquenta no frio... E SE O MEU PUDIM VIER SÓ COM UMA CEREJA EM VEZ DE DUAS... A CULPA É DO SANGUE DA SHIRANUI KAYA!"
42100-210 = "APOIADO, COMPANHEIRA!"
42100-212 = "LIVREM AS ALGEMAS DOS TRABALHADORES! MAIS SALÁRIO E MENOS BURGUESIA!"
42100-213 = "LIVREM AS ALGEMAS DOS TRABALHADORES! MAIS SALÁRIO E MENOS BURGUESIA!"
42100-215 = "V-Vocês são terroristas selvagens e mimadas, isso sim!!"
42100-216 = "A revolta que eu paguei pra vocês acabou! Juntem as bandeiras e evaporem do meu gramado antes que eu chame a polícia!"
42100-217 = "Olhem lá! A capanga fardada do imperialismo mostrando os dentes!"
42100-218 = "Igualzinho às burocratas elitistas que cercam a Cherino lá no gelo!"
42100-219 = "Tá vendo?! Eu disse que funcionário público e milícia de colarinho branco não têm alma e só querem chicotear a gente!"
42100-220 = "Nós não vamos recuar um único milímetro!#nNós vamos banhar esse asfalto em fogo até o último capitalista engravatado de Kivotos ser extinto!!"
42100-225 = "NÃO DÊM MAIS UM PASSO PRA CIMA DE MIM!!"
42100-226 = "Se vocês pisarem na calçada, a tropa de choque da Chefe Kaya vai massacrar voc――"
42100-231 = "Haha... Você tá latindo pra gente? Usar a polícia como cão de guarda não assusta ninguém em Red Winter. É rotina matinal."
42100-233 = "Companheiras! Engatilhar os explosivos!"
42100-235 = "Sob a bandeira de ferro e sangue――"
42100-237 = "O DEPARTAMENTO DE OBRAS PÚBLICAS DE RED WINTER DECLARA GUERRA TOTAL CONTRA O ESTADO!!"
42100-238 = "UURAAAAAAHHHH!!"
42100-240 = "Próximo Episódio: Café Preto sem Açúcar"