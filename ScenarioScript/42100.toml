[translation]
42100-1 = "Episódio 10; Fora de Controle"
42100-2 = "Gabinete da Presidente Interina do Conselho Estudantil"
42100-5 = "Fufu, o sabor de um Blue Mountain tomado após terminar as tarefas da manhã é excepcional."
42100-6 = "Essa acidez suave e aroma refrescante são sabores que só podem ser obtidos após aquecer os grãos de café em #n altas temperaturas e moê-los com uma intensidade uniforme."
42100-7 = "……O jeito de lidar com as pessoas é o mesmo. Se você controlar o fogo por medo de que elas desapareçam, #n sabores amargos e adstringentes acabarão se misturando."
42100-9 = "Agora, eles não conseguem se adaptar às mudanças e ouço ruídos por toda parte, mas…… #n com o passar do tempo, os cidadãos de Kivotos também entenderão."
42100-10 = "O quão doce é uma vida que abandona a liberdade e se entrega à disciplina……."
42100-12 = "……Expulsar as forças de apoio da Administradora Rin e #n buscar a cooperação da Kaiser Corporation em troca de ajustes nas punições. #n――Tudo está conforme o planejado."
42100-13 = "Continuando a criar dívidas com aqueles ao meu redor, eventualmente alcançarei o posto de próxima Presidente do Conselho Estudantil――"
42100-18 = "Chefe Kaya――não, Presidente Interina do Conselho Estudantil. #nDesculpe incomodá-la, mas tenho um relatório urgente para lhe apresentar."
42100-19 = "Vice-Chefe de Defesa, o que houve?"
42100-20 = "Se não for algo urgente, gostaria que deixasse para depois."
42100-21 = "Peço perdão…… mas não posso mais adiar o tratamento disso……."
42100-22 = "Sei muito bem que está ocupada, mas #n como a Administradora Rin está ausente, pensei que deveria relatar agora……."
42100-23 = "……Não tem jeito, o que é?"
42100-24 = "Hoje, por volta das 11 da manhã, um trem de transporte de valores na Linha Central do sopé norte #n foi sequestrado por assaltantes armados e está desaparecido."
42100-25 = "Seguindo o processo operacional normal, #n a Presidente Interina deveria entrar em contato com a Sala de Tráfego para ativar o sistema de controle de trens de emergência #n e solicitar cooperação aos distritos autônomos vizinhos, mas……."
42100-26 = "Entendo, um caso de sequestro de trem por assaltantes, é……."
42100-30 = "……Caso de sequestro de trem?"
42100-31 = "Por que você está relatando algo tão importante só agora?"
42100-32 = "S-sim……?"
42100-33 = "Mas Chefe, você não disse que não aceitaria nenhum relatório durante a manhã de hoje……."
42100-34 = "Além disso, sequestros de trem são incidentes cotidianos que acontecem algumas vezes por mês……."
42100-35 = "……Cotidiano? Então, isso significa que até agora a Administradora Rin lidava com esse tipo de coisa várias vezes durante o trabalho?"
42100-36 = "Sim, exatamente."
42100-37 = "Haa……."
42100-38 = "……Entendido. Eu mesma entrarei em contato com a Sala de Tráfego."
42100-39 = "O Vice-Chefe de Defesa deve cooperar com os estudantes da Escola de Polícia Valkyrie, #n bloquear as estações próximas para não deixar os criminosos escaparem e identificar os suspeitos."
42100-40 = "Bem, sobre isso……."
42100-41 = "……Ainda há algo?"
42100-43 = "O Chefe do Departamento de Segurança Pública e os estudantes que cuidavam disso até agora #n estão suspensos por desobediência às ordens……."
42100-44 = "Além disso, devido à ordem administrativa implementada hoje, #n a maioria dos estudantes do Departamento de Vigilância está fora de seus postos devido às inspeções, #n então não restou pessoal para lidar com o sequestro."
42100-46 = "Pode ser alguém de folga ou estudantes do Departamento de Segurança da Vida. De qualquer forma, dê um jeito de reunir pessoal e proteger a ordem pública. Esse é o seu trabalho, não é?"
42100-47 = "Se você não consegue nem cumprir suas próprias obrigações #n e pretende manchar o nome do Conselho Estudantil……."
42100-48 = "Depois que o novo sistema estiver estável, em que posição você acha que estará?"
42100-49 = "S-sim, tratarei disso imediatamente!"
42100-53 = "Haa…… quem diria que o trabalho de interina seria tão trabalhoso……."
42100-57 = "Sala de Tráfego, tem um minuto?"
42100-58 = "Chefe Kaya? O que houve a essa hora?"
42100-59 = "Não sou Chefe, sou a Presidente Interina do Conselho Estudantil."
42100-60 = "Dá no mesmo. Então, o que foi? #n A entrega do almoço vai chegar logo, então seja breve."
42100-61 = "……Agora não é hora de falar de almoço."
42100-62 = "Recebi um contato do Vice-Chefe de Defesa agora pouco. #n Um trem de transporte de valores foi sequestrado na Linha Central do sopé norte e está desaparecido."
42100-63 = "Ativem imediatamente o sistema de controle de trens de emergência e emitam um pedido de cooperação aos distritos autônomos vizinhos."
42100-64 = "Hmm……."
42100-65 = "……Que chato."
42100-66 = "S-sim? O que você disse……?"
42100-67 = "Porque, se é um caso de sequestro de trem, não dá para resolver imediatamente, né?"
42100-68 = "De qualquer forma vai demorar, então pensei em almoçar e resolver com calma depois."
42100-69 = "……Você não tem noção de quão grave é a situação atual, tem?"
42100-70 = "Ou pretende fazer corpo mole?#nNesse caso, não poderei evitar detê-la por suspeita de negligência no dever."
42100-71 = "Fique à vontade.#nPara mim, seria uma maravilha se eu pudesse parar de trabalhar também."
42100-72 = "Ah, só um aviso: reescrever o cronograma de operações de Kivotos#npartindo do zero é um trabalho e tanto."
42100-73 = "Se expulsar a diretora da Sala de Tráfego agora,#nquem vai acabar em maus lençóis é a diretora Kaya, hein? Hehe..."
42100-75 = "……Se está tentando me ameaçar, então você……"
42100-79 = "Ah, o almoço chegou!#nEntão, nos falamos mais tarde~"
42100-83 = "……."
42100-84 = "Ufa……."
42100-85 = "……Não deveria se irritar por coisas tão triviais, Kaya."
42100-86 = "Você é a representante de Kivotos.#nA pessoa que se tornará a próxima Presidente do Conselho Estudantil Federal, respeitada por todos."
42100-87 = "Mantenha a calma…… Precisa resolver os problemas um por um, de forma racional……."
42100-91 = "……O que é agora?"
42100-92 = "……Você parece estar com os nervos à flor da pele, Presidente Interina do Conselho Estudantil Federal."
42100-94 = "Ah…… era a diretora da Sala de Finanças."
42100-95 = "Não se preocupe. É que, desde o primeiro dia em que assumi as funções interinas,#nproblemas não param de surgir, então estou apenas um pouco cansada."
42100-96 = "Como a diretora da Sala de Finanças é uma pessoa sensata, não vai me causar problemas, certo?"
42100-97 = "Sobre isso…… quem sabe?"
42100-98 = "Estou falando da \"Fatura de Custos Adicionais para Implementação de Nova Ordem Administrativa\"#nque a Presidente Interina enviou para a Sala de Finanças hoje de manhã……."
42100-99 = "Sim. São despesas necessárias para criar o novo sistema, então conto com sua colaboração."
42100-103 = "……Rejeitado, tudo isso."
42100-105 = "O-o quê? Por quê?"
42100-106 = "Ao verificar, notei que todos os valores da fatura estavam escritos em algarismos arábicos."
42100-107 = "Devido ao risco de falsificação ou leitura incorreta,#nnão posso processar faturas que não estejam escritas com numerais chineses."
42100-108 = "Além disso, o carimbo está borrado e não consigo ler o nome corretamente."
42100-109 = "Como não posso dizer que isso recebeu uma aprovação formal――"
42100-110 = "Refaça tudo."
42100-111 = "Ei…… hum…… diretora Aoi……?"
42100-112 = "Sinto muito mesmo, mas estou atolada com assuntos oficiais agora……."
42100-113 = "Poderia abrir uma exceção desta vez?#nSobre os problemas que mencionou, tratarei deles mais tarde――"
42100-115 = "Não."
42100-116 = "Mesmo sendo a Presidente Interina, não há exceções.#nAté a administradora Rin sempre fazia as correções ela mesma."
42100-117 = "I-isso……."
42100-118 = "Quero as correções feitas ainda hoje. Caso contrário, considerarei o pedido como inexistente."
42100-119 = "Ma-mas agora……."
42100-124 = "Até depois de amanhã…… poderia esperar até depois de amanhã?"
42100-125 = "…………Até amanhã. Não posso fazer mais do que isso."
42100-129 = "Francamente, todos eles……!"
42100-130 = "Por que não existe uma única pessoa decente ao meu redor?"
42100-131 = "Para onde foi todo o meu prestígio……!?"
42100-135 = "……Houve algum problema?"
42100-136 = "……Não, nada demais.#nOs problemas em si são todos triviais e não exigem minha intervenção."
42100-137 = "Estava apenas lamentando sobre meus subordinados,#nque não conseguem fazer o trabalho direito e só criam problemas."
42100-138 = "Os únicos que agem exatamente como eu quero são você e os membros do esquadrão."
42100-139 = "……Executar operações conforme as ordens é o nosso trabalho."
42100-140 = "Armas têm valor justamente porque não julgam por conta própria."
42100-141 = "……Hehe, é por isso que eu gosto de você."
42100-142 = "……A propósito."
42100-143 = "Quando…… quando poderemos voltar para a Academia Especial SRT?"
42100-148 = "……Isso é importante agora?"
42100-149 = "Não, não é?#nO que é mais importante agora é aumentar a taxa de aprovação da Sala de Defesa e tomar o poder real."
42100-150 = "Depois que eu assumir o controle do Conselho Estudantil Federal, poderei construir quantas escolas novas eu quiser."
42100-151 = "Não se esqueça da ordem das tarefas."
42100-155 = "……Peço desculpas."
42100-156 = "Não precisa se preocupar. #nAfinal, sou a única que realmente entende o valor de vocês."
42100-157 = "Você só precisa seguir as minhas ordens."
42100-158 = "Pelo bem dos seus subordinados do esquadrão. #nE também…… pela sua querida kouhai."
42100-159 = "……Entendido."
42100-166 = "Vice-presidente do Conselho Estudantil Federal, é uma emergência!"
42100-167 = "……Já aconteceu tanta coisa que nem me surpreendo mais quando dizem que é uma emergência."
42100-168 = "O que aconteceu desta vez?"
42100-169 = "É que……"
42100-170 = "O Chefe do Departamento de Recursos Humanos foi atacado pelos subordinados!"
42100-172 = "O-o que você disse……!?"
42100-174 = "（Algumas horas atrás, em frente ao prédio do Conselho Estudantil Federal）"
42100-178 = "Pessoal, bom trabalho!"
42100-179 = "A Vice-presidente do Conselho Estudantil Federal foi destituída com uma rapidez sem precedentes, #njustamente porque todos vocês levantaram suas vozes!"
42100-180 = "Waaaaaaaah!!"
42100-181 = "Mas, mesmo sendo de escolas diferentes, #naceitarem fazer manifestações por vários dias sem receber nada em troca…… #nDe agora em diante, não poderei nem dormir na direção de vocês."
42100-184 = "Não se preocupe. Lutar contra a injustiça e resistir ao poder é algo natural para um trabalhador."
42100-185 = "Manifestações para denunciar quem está no poder são sempre bem-vindas!"
42100-186 = "Fufu, como esperado dos alunos da 'Red Winter'."
42100-187 = "……A propósito, a Administradora Rin realmente caiu?"
42100-188 = "Sim, com certeza."
42100-189 = "Após nossos protestos, a Administradora Rin assumiu a responsabilidade pelo incidente e renunciou."
42100-191 = "……Então, quem está servindo como Vice-presidente do Conselho Estudantil Federal agora?"
42100-192 = "Hm? Bem, a Chefe do Departamento de Defesa, Shizunagi Kaya, foi nomeada como sucessora, mas……"
42100-194 = "……Entendo. Então, a partir de agora——"
42100-198 = "Começaremos a denunciar a Vice-presidente do Conselho Estudantil Federal, Kaya!"
42100-199 = "Começar, começar!"
42100-200 = "O quê……!? #nPor que precisam denunciar até a Vice-presidente Kaya!?"
42100-201 = "A pessoa que deveríamos denunciar não era a Administradora Rin!?"
42100-202 = "……De fato, até pouco tempo atrás era. #nMas agora, a Chefe do Departamento de Defesa, Kaya, se tornou a pessoa que representa o poder em Kivotos, não é?"
42100-203 = "Sendo assim——"
42100-204 = "Toda a responsabilidade é dela!"
42100-205 = "Assuma a responsabilidade! Assuma a responsabilidade!"
42100-206 = "O-o que vocês estão dizendo! Vocês, comeram algo estragado!?"
42100-207 = "A Chefe Kaya acabou de se tornar Vice-presidente! #nPor que exigir que ela assuma responsabilidade por algo agora?"
42100-208 = "O erro do subordinado é responsabilidade do superior…… ou seja, a responsabilidade por todos os problemas em Kivotos é da Vice-presidente do Conselho Estudantil Federal, Shizunagi Kaya!"
42100-209 = "O fato de a semana de 3 dias de trabalho não ter sido fixada em Kivotos, o fato de estar frio demais ultimamente, o fato de não podermos comer dois pudins—— é tudo culpa da Vice-presidente Kaya!"
42100-210 = "Isso mesmo!"
42100-212 = "Direitos dos trabalhadores! Mais garantias!"
42100-213 = "Direitos dos trabalhadores! Mais garantias!"
42100-215 = "Isso é…… que tipo de revolucionários egoístas são vocês!"
42100-216 = "A manifestação acabou, então dispersem logo! O papel de vocês terminou!"
42100-217 = "Olhem, o cão do poder maligno mostrou sua verdadeira face!"
42100-218 = "Não é igual à Presidente Cherino e os outros?"
42100-219 = "É por isso que não dá para confiar em funcionários públicos!"
42100-220 = "Nós não vamos parar a luta até que todos os poderosos e capitalistas desta terra desapareçam!"
42100-225 = "N-não cheguem perto!"
42100-226 = "Se chegarem mais perto, a Chefe Kaya não vai ficar quieta——"
42100-231 = "Esse tipo de ameaça ridícula não serve nem como cumprimento em Red Winter."
42100-233 = "Pessoal, estão todas prontas?"
42100-235 = "Então, a partir de agora—"
42100-237 = "Nós, do Departamento de Obras de Red Winter, daremos início a uma nova luta!"
42100-238 = "Waaaaaaah—!"
42100-240 = "Próximo episódio: Café Preto"
