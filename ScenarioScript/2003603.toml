[translation]
2003603-1 = "Princesa no barco"
2003603-7 = "……Ah, Sensei."
2003603-8 = "Por aqui."
2003603-9 = "Como você chegou cedo, eu já deixei tudo preparado."
2003603-10 = "[s1] \"……Um banana boat!\"\n[s2] \"……Posso brincar com isso!?\""
2003603-13 = "O-o quê?"
2003603-14 = "V-você gosta tanto assim disso?"
2003603-15 = "O Sensei às vezes tem um lado bem infantil, né?"
2003603-16 = "……Hum?"
2003603-17 = "Você está perguntando se eu te chamei para brincarmos juntos?"
2003603-18 = "Q-que bobagem você está dizendo!#nNão é nada disso!"
2003603-19 = "Quer dizer, é que, sabe……"
2003603-23 = "I-isso mesmo!#nUm teste! É para um teste!"
2003603-24 = "A aparência está boa, mas vai que algo está quebrado, né?#nPreciso verificar antes de todo mundo brincar!"
2003603-25 = "Chega de conversa, vamos testar logo!"
2003603-26 = "Com certeza! De verdade!#nNão é como se eu tivesse te chamado porque eu queria brincar!"
2003603-27 = "……Hã?"
2003603-28 = "Eu subo nele e você vai puxar, Sensei?"
2003603-29 = "Mas o Sensei já está fazendo esse favor para mim……"
2003603-30 = "[s3] \"Deixa comigo!\"\n[s4] \"Pode ser que tenha partes fundas, então cuidado.\""
2003603-33 = "Hum……"
2003603-38 = "Acho que está tudo bem, a água bate na cintura, mas……#nSe você diz, então tudo bem."
2003603-39 = "Então…… lá vou eu."
2003603-44 = "Está balançando mais do que eu pensava……"
2003603-45 = "Sensei, você está entendendo?"
2003603-46 = "É um teste, viu?#nNão puxe com muita força, entendeu?"
2003603-51 = "[ns5] \"Relaxa, pode confiar!\"\n[ns6] Puxar o banana boat."
2003603-55 = "E-ei, espera……! Sensei……!?#nE-está rápido demais!!"
2003603-56 = "Eu ainda não estava preparada mentalmente……!!"
2003603-57 = "Uau……!"
2003603-58 = "Ai, meu Deus……!?"
2003603-64 = "(Enquanto tomava cuidado para não cair, puxei o barco onde Serika estava sentada.)"
2003603-65 = "(Tive a impressão de que a Serika disse algo no caminho, mas o barulho da água impediu que eu ouvisse.)"
2003603-68 = "[wa:230]― [log=세리카 수영복]Já não está bom assim?[/log]"
2003603-69 = "[wa:1900]― [log=세리카 수영복]Vamos descer logo……[/log]"
2003603-72 = "― [log=세리카 수영복]Não é que eu queira parar ou algo assim,[/log]"
2003603-73 = "[wa:1610]― [log=세리카 수영복]mas é que……[wa:620] não é bem isso……[/log]"
2003603-76 = "[wa:130]― [log=세리카 수영복]Ei, [wa:170]ei, espera aí!![/log]"
2003603-77 = "[wa:600]― [log=세리카 수영복]Sensei! [wa:550]O que você está fazendo! [wa:840]Vai balançar![/log]"
2003603-80 = "― [log=세리카 수영복]Esse barco [wa:440]vira [wa:290]muito fácil!![/log]"
2003603-81 = "[wa:1060]― [log=세리카 수영복]Para com isso![/log]"
2003603-84 = "[wa:630]― [log=세리카 수영복]Não, [wa:720]não é porque eu acho divertido,[wa:870] não é isso.[/log]"
2003603-85 = "[wa:2310]― [log=세리카 수영복]Sensei, [wa:1270]não brinque comigo.[/log]"
2003603-88 = "― [log=세리카 수영복]……[wa:170]Ah.[wa:1200] Esquece, deixa pra lá.[/log]"
2003603-89 = "[wa:1320]― [log=세리카 수영복]O Sensei sempre foi desse tipo, né.[/log]"
2003603-92 = "― [log=세리카 수영복]Eu deveria ter previsto [wa:1570]que você faria isso……[/log]"
2003603-95 = "[ns7] \"……Serika?\"\n[ns8] \"……Por que de repente?\""
2003603-99 = "[wa:300]― [log=세리카 수영복]Bem, [wa:600]tudo bem.[/log]"
2003603-100 = "[wa:920]― [log=세리카 수영복]Eu também [wa:615]tive uma ideia [wa:540]agora.[/log]"
2003603-103 = "― [log=세리카 수영복]Vamos lá, [wa:595]Sensei! [wa:910]Agora é a sua vez!![/log]"
2003603-104 = "[wa:900]― [log=세리카 수영복]Agora é a vez do Sensei![wa:395][wa:305][wa:230][/log]"
2003603-109 = "[ns9] \"Se, Serika...?\"\n[ns10] \"Se for sobre o teste, já chega...\""
2003603-113 = "Entendi, é assim então?"
2003603-114 = "Finalmente entendi.#nIsso é mais divertido de puxar, não é!"
2003603-115 = "Agora é a minha vez, Sensei!"
2003603-119 = "......O quê?"
2003603-120 = "Sensei! Aonde você vai!!"
2003603-121 = "Ei, espera aí!"
2003603-122 = "Ugh!#nEu não posso simplesmente deixar o barco para trás...!"
2003603-126 = "Ei, você!!!!!!!!!!"
