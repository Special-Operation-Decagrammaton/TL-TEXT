[translation]
2003603-1 = "姫 on the boat"
2003603-7 = "……あ、先生。"
2003603-8 = "こっちよ。"
2003603-9 = "早く着いちゃったから、準備しておいたわ。"
2003603-10 = "[s1] \"……バナナボートだ！\"\n[s2] \"……遊んでいいの！？\""
2003603-13 = "な、何？"
2003603-14 = "そ、そんなに好きだったの？"
2003603-15 = "先生って、たまに子どもっぽいところあるわよね。"
2003603-16 = "……うん？"
2003603-17 = "一緒に遊ぶために連絡してくれたんじゃないのかって？"
2003603-18 = "な、なに言ってるのよ！#nそんなわけないでしょ！"
2003603-19 = "えっと、だからその……。"
2003603-23 = "そ、そう！#nテスト！テストのため！"
2003603-24 = "見た目は大丈夫だけど、どこか壊れてるかもしれないじゃない？#nみんなで遊ぶ前に確かめておかないと！"
2003603-25 = "いいから、すぐテストするよ！"
2003603-26 = "絶対！本当に！#n私が遊びたくて呼んだわけじゃないんだから！"
2003603-27 = "……えっ？"
2003603-28 = "私が上に乗って、それを先生が引っ張ってくれるの？"
2003603-29 = "先生は付き合ってくれてるのに……。"
2003603-30 = "[s3] \"任せて！\"\n[s4] \"深いところもあるかもしれないからね。\""
2003603-33 = "うーん……。"
2003603-38 = "腰くらいの深さだし大丈夫だと思うけど……#n先生がそう言うなら分かったわ。"
2003603-39 = "それじゃ……っと。"
2003603-44 = "思ったより揺れが……。"
2003603-45 = "先生、分かってる？"
2003603-46 = "テストだからね？#nあんまり勢い良く引っ張らないでよ？"
2003603-51 = "[ns5] \"大丈夫、安心して！\"\n[ns6] バナナボートを引っ張る。"
2003603-55 = "ち、ちょっ……！先生……！？#nは、速いってば！！"
2003603-56 = "まだ心の準備が……！！"
2003603-57 = "わっ……！"
2003603-58 = "ひぃ……！？"
2003603-64 = "（倒れないように注意しながら、セリカが乗ったボートを引っ張り回した）"
2003603-65 = "（途中でセリカが何か言っていたような気がするが、水の音でよく聞こえなかった）"
2003603-68 = "[wa:230]― [log=세리카 수영복]こ、[wa:620]これでもう良くない？[/log]"
2003603-69 = "[wa:1900]― [log=세리카 수영복]そろそろ降りようよ……[/log]"
2003603-72 = "― [log=세리카 수영복]もうやめたいとか、[/log]"
2003603-73 = "[wa:1610]― [log=세리카 수영복]そういうんじゃ[wa:620]ないんだけど……[/log]"
2003603-76 = "[wa:130]― [log=세리카 수영복]ちょ、[wa:170]ちょっと！！[/log]"
2003603-77 = "[wa:600]― [log=세리카 수영복]先生！[wa:550]何すんのよ！[wa:840]揺れるでしょ！[/log]"
2003603-80 = "― [log=세리카 수영복]このボート、[wa:440]ひっくり[wa:290]返りやすいんだから！！[/log]"
2003603-81 = "[wa:1060]― [log=세리카 수영복]やめて！[/log]"
2003603-84 = "[wa:630]― [log=세리카 수영복]いや、[wa:720]面白そうだからじゃ[wa:870]ないわよ。[/log]"
2003603-85 = "[wa:2310]― [log=세리카 수영복]先生、[wa:1270]人で遊ばないで。[/log]"
2003603-88 = "― [log=세리카 수영복]……[wa:170]はあ。[wa:1200]もういいわよ。[/log]"
2003603-89 = "[wa:1320]― [log=세리카 수영복]先生はそういう人だったわね。[/log]"
2003603-92 = "― [log=세리카 수영복]こういう事するって[wa:1570]予想できてたはずなのに……[/log]"
2003603-95 = "[ns7] \"……セリカ？\"\n[ns8] \"……急にどうしたの？\""
2003603-99 = "[wa:300]― [log=세리카 수영복]まぁ、[wa:600]いいわ。[/log]"
2003603-100 = "[wa:920]― [log=세리카 수영복]私もちょっと[wa:615]思いついたことが[wa:540]あるから。[/log]"
2003603-103 = "― [log=세리카 수영복]さあ、[wa:595]先生！[wa:910]交代よ！！[/log]"
2003603-104 = "[wa:900]― [log=세리카 수영복]今度は[wa:395]先[wa:305]生[wa:230]の番よ！[/log]"
2003603-109 = "[ns9] \"せ、セリカ……？\"\n[ns10] \"テストなら、もう充分……。\""
2003603-113 = "なるほどね～？"
2003603-114 = "ようやく分かったわ。#nこれ、引っ張るほうが楽しいやつじゃない！"
2003603-115 = "今度は私の番よ、先生！"
2003603-119 = "……なっ？"
2003603-120 = "先生！どこ行くの！！"
2003603-121 = "ちょっ、待ってってば！"
2003603-122 = "ううっ！#nボートを置いて行くわけにはいかないし……！"
2003603-126 = "ちょっとぉ！！！！！！！！！！"
