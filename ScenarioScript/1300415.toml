[translation]
1300415-1 = "内緒のノート"
1300415-2 = "（ある日、用事があって対策委員会の教室を訪れた）"
1300415-9 = "ふふん～ふっふふん～"
1300415-10 = "[ns] \"おはよう、ノノミ。\""
1300415-15 = "せ、先生！？"
1300415-16 = "いついらしたんですか！？"
1300415-17 = "つ、ついさっきですか……ドアの音にも気づかなかったなんて……"
1300415-18 = "先生がいらっしゃると知ってたら、お菓子くらい用意したのに……"
1300415-19 = "[s] \"それで、ノノミは何をしてたの？\""
1300415-23 = "えっと、その……"
1300415-24 = "ひ、秘密です。"
1300415-25 = "[s1] \"そっか、ちょっと気になったんだけど……\"\n[s2] \"きっと、何か事情があるんだよね。\""
1300415-30 = "うーん、事情と言うほどではありません。"
1300415-31 = "そうですね、ちょっと恥ずかしいんですけど……"
1300415-32 = "先生にだけ、特別に見せちゃいますね。"
1300415-38 = "[ns] \"何のノートなの……？\""
1300415-39 = "対策委員会のみんなと、いつかやってみたいことをメモしたウィッシュリストです。"
1300415-40 = "内緒のノートですから、秘密にしてくださいね？"
1300415-41 = "今日は誰も教室に来ないはずだったので、こっそり見てたんです。"
1300415-42 = "[s] \"どうしてみんなには秘密なの？\""
1300415-43 = "それは……"
1300415-44 = "私の目標を達成しようと、みんな助けてくれるに決まってますから。"
1300415-45 = "ただでさえ借金の返済で大変なのに、負担を増やすわけにはいきません。"
1300415-46 = "だから、これは私だけの内緒のノートなんです。"
1300415-47 = "と言っても、先生には見られてしまいましたけど……あはは。"
1300415-48 = "[s] \"そうだったんだ……ごめんね。\""
1300415-49 = "気にしないでください。#n教室で開いている以上、いつか見られてしまうとは思っていましたから☆"
1300415-50 = "この際ですし、先生も見てみませんか？"
1300415-51 = "[s3] \"見てもいいの？\"\n[s4] \"読んでもいいの？\""
1300415-54 = "もちろんです。実は、そんなに大した内容ではないので。"
1300415-55 = "うんうん、ぜひ一緒に見ましょう☆"
1300415-65 = "達成したものには、赤ペンで丸をつけてるんです。"
1300415-66 = "一緒にスイーツを食べに行く、学校中を大掃除する……#n何気ないことも、みんなで力を合わせて達成したことも、色々ありましたね。"
1300415-67 = "これを見ていると……みんなの笑顔を思い出して、とっても幸せな気持ちになるんです。"
1300415-71 = "あっ……「5辛のピザにチャレンジする」なんてのもありましたね。"
1300415-72 = "顔を真っ赤にしながら食べてたセリカちゃんが懐かしいです☆"
1300415-74 = "それから……こっちは、まだ達成できてない目標ですね。"
1300415-75 = "いつか、このリスト全部に赤い印をつけたいのですが……"
1300415-76 = "一つ達成しても、今度は二つ目標ができてしまって――"
1300415-77 = "どんどんリストが増えるばかりなんです。"
1300415-78 = "まだ達成できてないものが、100個も……あはは、どうしましょう。"
1300415-79 = "[s] \"むしろ、いいことじゃない？\""
1300415-83 = "[ns5] \"それだけ、これから思い出が作れるってことだから。\"\n[ns6] \"きっと、楽しい毎日が待ってるよ。\""
1300415-90 = "……そうですよね！"
1300415-91 = "いつも借金の返済に悩まされていますが……"
1300415-92 = "楽しい時間もいっぱいありますからね。"
1300415-93 = "うんうん。リストを達成できるよう、もっと頑張ります！"
1300415-97 = "せっかくですし、先生も一緒に思い出を作りませんか？"
1300415-98 = "[s] \"もちろんだよ。\""
1300415-99 = "ではまずは、スカイダイビングから！"
1300415-100 = "地上から約4000メートルのフリーフォール……#n想像しただけで楽しそうですよね！"
1300415-104 = "[ns] \"そ、それは遠慮したいかな……\""
1300415-107 = "ふふっ、冗談です☆"
