[translation]
1300415-1 = "Caderno Secreto"
1300415-2 = "（Certo dia, visitei a sala do Comitê de Contramedidas para tratar de alguns assuntos）"
1300415-9 = "Fufun~ fuffufun~"
1300415-10 = "[ns] \"Bom dia, Nonomi.\""
1300415-15 = "Se-Sensei!?"
1300415-16 = "Quando você chegou!?"
1300415-17 = "A-agora pouco...? Eu nem percebi o som da porta..."
1300415-18 = "Se eu soubesse que você viria, teria preparado alguns doces..."
1300415-19 = "[s] \"Então, o que a Nonomi estava fazendo?\""
1300415-23 = "Bem, isso é..."
1300415-24 = "É, é segredo."
1300415-25 = "[s1] \"Entendo, fiquei um pouco curioso...\"\n[s2] \"Com certeza deve haver algum motivo, não é?\""
1300415-30 = "Hmm, não diria que é um motivo importante."
1300415-31 = "Bem, é um pouco vergonhoso, mas..."
1300415-32 = "Vou mostrar apenas para você, Sensei."
1300415-38 = "[ns] \"Que caderno é esse...?\""
1300415-39 = "É uma lista de desejos com coisas que quero fazer com o pessoal do Comitê de Contramedidas algum dia."
1300415-40 = "É um caderno secreto, então por favor, mantenha em segredo, tá?"
1300415-41 = "Como ninguém deveria vir à sala hoje, eu estava dando uma olhadinha escondida."
1300415-42 = "[s] \"Por que é segredo para as outras?\""
1300415-43 = "É que..."
1300415-44 = "Se elas soubessem, com certeza tentariam me ajudar a realizar meus objetivos."
1300415-45 = "Já estamos sobrecarregadas com o pagamento da dívida, não posso aumentar o fardo delas."
1300415-46 = "Por isso, este é o meu caderno secreto."
1300415-47 = "Embora, no fim das contas, você tenha acabado vendo, Sensei... Ahaha."
1300415-48 = "[s] \"Entendo... Me desculpe.\""
1300415-49 = "Não se preocupe. #nJá que eu estava lendo na sala de aula, eu sabia que alguém acabaria vendo uma hora ou outra☆"
1300415-50 = "Já que estamos aqui, você não quer dar uma olhada, Sensei?"
1300415-51 = "[s3] \"Posso ver?\"\n[s4] \"Posso ler?\""
1300415-54 = "Claro. Na verdade, não é nada tão importante assim."
1300415-55 = "Sim, sim, vamos ver juntos☆"
1300415-65 = "Eu marco com uma caneta vermelha as coisas que já realizamos."
1300415-66 = "Ir comer doces juntas, fazer uma faxina geral na escola... #nTeve de tudo, desde coisas simples até objetivos que alcançamos unindo forças."
1300415-67 = "Quando olho para isso... lembro do sorriso de todas e me sinto muito feliz."
1300415-71 = "Ah... também tem aqui \"desafiar a pizza de nível 5 de pimenta\"."
1300415-72 = "Sinto saudades da Serika-chan com o rosto todo vermelho enquanto comia☆"
1300415-74 = "E então... estes aqui são os objetivos que ainda não alcançamos."
1300415-75 = "Quero colocar uma marca vermelha em toda a lista algum dia, mas..."
1300415-76 = "Assim que realizo um, surgem dois novos objetivos..."
1300415-77 = "A lista só aumenta cada vez mais."
1300415-78 = "Ainda tem 100 coisas que não realizei... Ahaha, o que eu faço?"
1300415-79 = "[s] \"Isso não é algo bom, na verdade?\""
1300415-83 = "[ns5] \"Significa que você ainda tem muitas memórias para criar.\"\n[ns6] \"Com certeza, dias divertidos estão por vir.\""
1300415-90 = "...É verdade!"
1300415-91 = "Sempre nos preocupamos com o pagamento da dívida, mas..."
1300415-92 = "Também temos muitos momentos divertidos, não é?"
1300415-93 = "Sim, sim. Vou me esforçar ainda mais para realizar todos os itens da lista!"
1300415-97 = "Já que estamos aqui, você não quer criar memórias comigo, Sensei?"
1300415-98 = "[s] \"Com certeza.\""
1300415-99 = "Então, primeiro, vamos começar com paraquedismo!"
1300415-100 = "Uma queda livre de cerca de 4000 metros do chão...#nSó de imaginar, parece divertido, não é?"
1300415-104 = "[ns] \"I-isso é algo que eu prefiro evitar...\""
1300415-107 = "Fufu, é brincadeira☆"
