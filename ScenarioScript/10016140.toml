[translation]
10016140-1 = "後日談その4;エンジニア部＆ヴェリタス編"
10016140-6 = "あ、チヒロ先輩！"
10016140-10 = "今ね、ちょうど競技に使われたロボットの返却が済んだところ。"
10016140-11 = "プログラムのデバッグはハレ先輩がやってるし、競技記録の内訳はマクロで処理してるから……"
10016140-12 = "これでセミナーに頼まれた仕事も全部終わり！"
10016140-13 = "お疲れ様、マキ。"
10016140-14 = "せっかくのお祭りなのに、色々お願いしちゃってごめんね。"
10016140-15 = "ううん、私は競技にちゃんと参加したし、絵も描けたし満喫してるよ。"
10016140-16 = "この大運動会を彩ることができて、すっごく楽しかった！"
10016140-17 = "それなら良かった。"
10016140-18 = "そういえばさっきの騎馬戦で、ミレニアム生がホログラム装置を持ち込んだとかで騒ぎになってたみたいなんだけど……"
10016140-22 = "相手の学園に聞いたら、それがハレの「アテナ3号」に似てる気がして。"
10016140-23 = "マキ、何か心当たりは――"
10016140-24 = "ああっ！コタマ先輩が設置した盗聴器を回収しに行くんだった……！#nうっかりしてた！"
10016140-26 = "い、急がないと！じゃあ私、もう行くから……！"
10016140-31 = "……やっぱり、うちの後輩の仕業だったか。"
10016140-32 = "後で厳しく言っておかないと。"
10016140-36 = "チヒロ、片付けは順調かい？"
10016140-37 = "うん、後輩たちが手伝ってくれたおかげでね。"
10016140-38 = "そっちは？観客の退場案内はもう終わった？"
10016140-39 = "無論終わってるよ。#n主催校の応援団長として、大会が終わるその瞬間まで役割をきちんと果たさないとね。"
10016140-40 = "……最初からまともな応援ロボットを作れば良かったのに。"
10016140-41 = "……ん？別に応援団長を嫌々やっているわけじゃないよ？"
10016140-42 = "たしかに応援団を任されたのは突然のことだった。#nけれど、とても素晴らしい経験になったよ。"
10016140-43 = "つい夢中になって、今日という1日があっという間に感じるくらいにはね。"
10016140-44 = "……でも、そろそろエンジニア部のマイスターに戻る時間だ……#n少し、寂しいな。"
10016140-45 = "その様子だと、ずいぶん楽しんだみたいだね。"
10016140-49 = "チーちゃんこそ、今日のお祭りは楽しかったかい？"
10016140-50 = "楽しいも何も……私は忙しすぎて、それどころじゃなかったよ。"
10016140-51 = "昨日は開催準備で徹夜だったし、今日は開会式からいろんな騒ぎが絶えなくて……"
10016140-52 = "救護所で少し仮眠を取るまで、何があったのか記憶が曖昧なくらい。"
10016140-53 = "……ウタハも徹夜してなかったっけ。疲れてないの？"
10016140-54 = "うむ。今ベッドで横になったら、一瞬で気絶したように眠れる自信があるとも！"
10016140-55 = "しかしこれくらい、気合と根性で乗り越えてみせるさ！"
10016140-56 = "はぁ、すごい精神力の持ち主なのか、それとも……"
10016140-57 = "そうだ。私が寝ている間に、エンジニア部が作ったあの「応援ロボット」、また問題を起こしたって聞いたよ。"
10016140-62 = "……もう一度聞くけど、なんで戦闘モードを入れたの？"
10016140-63 = "チヒロなら、私の答えなんて聞く前から分かってると思うがね……"
10016140-65 = "――そこにロマンがあるからだよ。"
10016140-66 = "ロマンで済む問題じゃないでしょ。#nそのせいで、SRT特殊学園の生徒が調査に来てたんだけど。"
10016140-67 = "ウタハ、本当に――"
10016140-73 = "……はぁ。私が言って直るんだったら、最初からこんな騒ぎ起こしてないか。"
10016140-74 = "ふふ、流石は私の古き友だ。よく理解してるじゃないか。"
10016140-79 = "……色々あって今回はまともに参加できなかったけど……#n後輩たちは楽しめたみたいだし。"
10016140-80 = "ハッカーがインドア派だからって、うちの子たち運動しなさすぎ。#n流石に健康が心配だったからさ。"
10016140-81 = "他の学園と交流して、いろんな生徒と競い合える大運動会での経験は、知識の幅を広げるのにも役立ったと思う。"
10016140-82 = "それには私も同感だ。"
10016140-83 = "この世界には、本や映像からは得られない……#n自分の身体を通してでしか得られない知識もあるのさ。"
10016140-87 = "そうだ。経験、といえば……"
10016140-91 = "チヒロもチアリーディングをやってみないかい？"
10016140-92 = "……急に何？"
10016140-93 = "みんなで応援をするのが、想像以上に楽しくてね。#n誰かと一緒にやりたくなったんだ。"
10016140-94 = "衣装なら、ヒビキに頼めばすぐ作ってくれる。"
10016140-95 = "この情熱と経験が、新しい発想を生んでくれるかもしれないだろう？"
10016140-96 = "遠慮しておく。他の運動ならともかく、チア服を着るのは……"
10016140-100 = "……ひょっとして、不規則な生活で増えてしまった体重が気になるのかい？"
10016140-101 = "心配無用だ。他人の体型に注目する人は、そういないからね。"
10016140-102 = "それと……意外に「そっち」の需要も少なくないらしい。"
10016140-103 = "別に体重を気にしてるわけじゃ……！"
10016140-104 = "まあ、いいじゃないか。先人は、こう言っていたことだし。"
10016140-106 = "恥ずかしがったら負け、とね。"
10016140-107 = "だから違うって――"
