[translation]
10016140-1 = "Epílogo parte 4; Engenharia e Veritas"
10016140-6 = "Ah, Chihiro-senpai!"
10016140-10 = "Acabei de terminar de devolver os robôs usados na competição."
10016140-11 = "A Hare-senpai está cuidando da depuração do programa, e os detalhes dos registros da competição estão sendo processados por macros, então..."
10016140-12 = "Com isso, todo o trabalho pedido pelo Seminário está concluído!"
10016140-13 = "Bom trabalho, Maki."
10016140-14 = "Sinto muito por ter pedido tantas coisas, mesmo sendo um festival."
10016140-15 = "Não se preocupe, eu participei da competição, consegui desenhar e aproveitei bastante."
10016140-16 = "Foi muito divertido poder dar cor a este Grande Festival Esportivo!"
10016140-17 = "Fico feliz em ouvir isso."
10016140-18 = "Falando nisso, na batalha de cavalaria de mais cedo, parece que houve um alvoroço porque diziam que uma aluna de Millennium trouxe um dispositivo de holograma..."
10016140-22 = "Quando perguntei à outra escola, tive a impressão de que se parecia com a 'Athena nº 3' da Hare."
10016140-23 = "Maki, você sabe de alguma coisa sobre isso—"
10016140-24 = "Ah! Eu tinha que ir buscar os dispositivos de escuta que a Kotama-senpai instalou...!#nEu esqueci completamente!"
10016140-26 = "E-eu preciso ir rápido! Então, já vou indo...!"
10016140-31 = "...Como eu pensei, foi obra das minhas subordinadas."
10016140-32 = "Vou ter que dar uma bronca nelas depois."
10016140-36 = "Chihiro, a limpeza está indo bem?"
10016140-37 = "Sim, graças à ajuda das minhas subordinadas."
10016140-38 = "E por aí? A orientação de saída dos espectadores já terminou?"
10016140-39 = "Claro que terminou.#nComo líder da torcida da escola anfitriã, preciso cumprir meu papel até o último momento do evento."
10016140-40 = "...Poderia ter feito um robô de torcida decente desde o início."
10016140-41 = "...Hm? Não é como se eu estivesse fazendo o papel de líder de torcida contra a minha vontade, sabe?"
10016140-42 = "É verdade que ser encarregada da torcida foi algo repentino.#nMas acabou sendo uma experiência maravilhosa."
10016140-43 = "Fiquei tão envolvida que o dia de hoje passou num piscar de olhos."
10016140-44 = "...Mas está na hora de voltar a ser a meister do Departamento de Engenharia...#nÉ um pouco solitário."
10016140-45 = "Pelo visto, você se divertiu bastante."
10016140-49 = "E você, Chi-chan, aproveitou o festival de hoje?"
10016140-50 = "Aproveitar? Nem me fale... eu estava ocupada demais para isso."
10016140-51 = "Ontem passei a noite em claro preparando tudo, e hoje, desde a cerimônia de abertura, não faltaram confusões..."
10016140-52 = "Minhas memórias do que aconteceu estão tão vagas que só lembro de ter tirado um cochilo na enfermaria."
10016140-53 = "...Utaha, você também não passou a noite em claro? Não está cansada?"
10016140-54 = "Hum. Se eu me deitasse numa cama agora, tenho certeza de que dormiria como se tivesse desmaiado em um segundo!"
10016140-55 = "Mas eu vou superar isso com garra e determinação!"
10016140-56 = "Haa, será que ela tem uma força mental incrível, ou será que..."
10016140-57 = "Ah, é verdade. Ouvi dizer que, enquanto eu dormia, aquele 'robô de torcida' que o Departamento de Engenharia criou causou problemas de novo."
10016140-62 = "...Vou perguntar de novo, por que você colocou um modo de combate nele?"
10016140-63 = "Acho que a Chihiro já sabe a resposta antes mesmo de eu dizer..."
10016140-65 = "—Porque é aí que reside o romance."
10016140-66 = "Isso não é um problema que se resolve com 'romance'.#nPor causa disso, alunas da Academia SRT vieram investigar."
10016140-67 = "Utaha, sério—"
10016140-73 = "...Haa. Se adiantasse eu falar, você não teria causado esse alvoroço desde o início."
10016140-74 = "Fufu, como esperado da minha velha amiga. Você entende bem, não é?"
10016140-79 = "...Aconteceram tantas coisas que não pude participar direito desta vez...#nMas parece que as meninas se divertiram."
10016140-80 = "Só porque hackers são caseiros, nossas alunas não fazem exercício nenhum.#nEu estava realmente preocupada com a saúde delas."
10016140-81 = "A experiência do Grande Festival Esportivo, de interagir com outras escolas e competir com várias alunas, acho que ajudou a ampliar o conhecimento delas."
10016140-82 = "Concordo plenamente."
10016140-83 = "Neste mundo, existem conhecimentos que não se obtêm através de livros ou vídeos...#nConhecimentos que só podem ser adquiridos através do próprio corpo."
10016140-87 = "É verdade. Falando em experiência..."
10016140-91 = "Chihiro, por que você não tenta fazer líder de torcida também?"
10016140-92 = "……De repente, por quê?"
10016140-93 = "Torcer por alguém em grupo é muito mais divertido do que imaginei. #nFiquei com vontade de fazer isso com mais pessoas."
10016140-94 = "Se for sobre o traje, é só pedir para a Hibiki que ela faz um rapidinho."
10016140-95 = "Essa paixão e experiência podem acabar gerando novas ideias, não acha?"
10016140-96 = "Vou ter que recusar. Posso até fazer outros exercícios, mas usar um traje de líder de torcida é..."
10016140-100 = "……Por acaso você está preocupada com o peso que ganhou por causa da vida irregular?"
10016140-101 = "Não se preocupe. Quase ninguém presta atenção no corpo dos outros, sabe?"
10016140-102 = "E além disso... parece que a demanda por \"esse tipo\" de coisa não é tão baixa assim."

10016140-103 = "Não é que eu esteja preocupada com o peso...!"
10016140-104 = "Bem, qual é o problema? Como diziam os antigos:"
10016140-106 = "Quem sente vergonha, perde."
10016140-107 = "Eu já disse que não é isso—"
