[translation]#[Texto Final. - Filipe 08/07.]
70001030-1 = "Águas Termais (3)"
70001030-3 = "No fim, acabamos vindo parar aqui……"
70001030-4 = "Fazer o quê. Todas tinham seus defeitos."
70001030-5 = "É verdade, mas……"
70001030-6 = "Eu queria evitar Millennium……"
70001030-7 = "……Por quê?"
70001030-8 = "Millennium é famosa pela tecnologia de ponta, né?"
70001030-9 = "Dizem que até a máquina de café da sala de descanso tem inteligência artificial…… os banheiros devem ser algo inalcançável pra gente……"
70001030-10 = "Boatos são sempre exagerados, não?"
70001030-11 = "Pelo menos vamos ver o preço."
70001030-12 = "É……"
70001030-18 = "R-remoção de emergência!?"
70001030-19 = "Houve algum problema com as instalações de banho que reformamos!?"
70001030-20 = "N-não. No momento…… não há problemas……"
70001030-21 = "Mas mais tarde, outras alunas vão visitar os banheiros……"
70001030-22 = "E mostrar as invenções do Clube de Engenharia, que não passaram pela avaliação do Seminário, para visitantes de fora…… não é adequado……"
70001030-23 = "Isso é estranho. Nós, do Clube de Engenharia, como membros da Millennium, temos o direito de apresentar nossas invenções ao público externo."
70001030-24 = "E se vão receber visitantes, seria melhor nos deixar cuidar de tudo."
70001030-25 = "Não, na verdade…… vocês já――"
70001030-28 = "Com licença…… sou de Red Winter……"
70001030-29 = "J-ja chegaram!?"
70001030-30 = "Me desculpem…… ainda não estamos prontos para recebê-las……"
70001030-31 = "É mesmo?#nParece que está tudo bem……"
70001030-35 = "Exato. A preparação das novas instalações está perfeita."
70001030-36 = "P-presidente Utaha……!"
70001030-37 = "Novas instalações……?"
70001030-39 = "Deixe-me explicar as funcionalidades das novas instalações!"
70001030-40 = "Primeiro, esta inteligência artificial de ponta instalada na banheira ajusta a temperatura em tempo real conforme as condições do usuário!"
70001030-41 = "Ela analisa automaticamente a pele, então não precisa configurar a temperatura!"
70001030-42 = "O aquecedor é uma bomba de calor que absorve energia das fontes próximas.#nO refrigerante também pode ser usado como――"
70001030-43 = "Também tem uma geladeira que usa o refrigerante, então dá pra beber algo gelado durante o banho."
70001030-46 = "Banheira com geladeira…… isso é bom."
70001030-48 = "Além disso, essas instalações têm um sistema de assistência automática para os preguiçosos."
70001030-49 = "Vários braços robóticos controlados por reconhecimento de voz lavam o corpo automaticamente."
70001030-50 = "Essa banheira substitui vários eletrodomésticos."
70001030-52 = "Bem…… parece incrível mesmo……"
70001030-53 = "Mas com tantas funções…… deve ser caro, né……?"
70001030-55 = "Sobre o custo, não se preocupem!"
70001030-56 = "Este protótipo ainda está em fase de teste, então os custos de instalação e reparo, além da produção, serão arcados pelo Clube de Engenharia!"
70001030-58 = "Mas não nos responsabilizamos por acidentes durante o funcionamento……"
70001030-63 = "……Este preço, o que acham?"
70001030-68 = "Tão barato!?"
70001030-69 = "Vamos fechar o contrato agora!"
70001030-70 = "Bem…… deixem-me adiantar uma coisa……"
70001030-71 = "As invenções do Clube de Engenharia têm bom desempenho, mas são notórias por adicionar funções inesperadas……"
70001030-72 = "Os testes de segurança demoram, e talvez fosse melhor adotar instalações de outras academias……"
70001030-73 = "Tudo bem! Se adicionarem funções, é vantagem!"
70001030-79 = "É, ele tem razão. Ganhar um brinde de graça, não tem motivo pra recusar."
70001030-80 = "Serviço, serviço."
70001030-82 = "Como representante de Red Winter, eu aprovo aqui mesmo!"
70001030-83 = "Queremos instalar este novo sistema de banho nos nossos dormitórios!"
70001030-85 = "Deixem conosco!"
70001030-89 = "Academia Federal Red Winter – Dormitórios"
70001030-92 = "Hmm…… então este é o banheiro que a Turma Especial trouxe da Millennium……"
70001030-93 = "Parece normal, mas…… os intelectuais da Millennium podem ter escondido funções suspeitas para sabotar as alunas de Red Winter."
70001030-94 = "Pela segurança das alunas de Red Winter, esta presidente, chefe do Departamento de Embelezamento Ambiental, secretária-geral, representante dos clubes esportivos, e etc…… vai testar pessoalmente."
70001030-95 = "……Não é por curiosidade que vou entrar primeiro!"
70001030-99 = "Hmm…… segundo o manual, um robô com inteligência artificial lava o corpo automaticamente."
70001030-100 = "Está ouvindo, inteligência artificial? Lave a cabeça desta Cherino-sama."
70001030-101 = "<Ativando modo de assistência automática de banho>"
70001030-107 = "Oh…… então ele realmente lava a cabeça automaticamente……"
70001030-108 = "Hmm…… não é ruim……"
70001030-113 = "……Ei! Espera! Entrou espuma nos meus olhos!"
70001030-114 = "Lave mais devagar! Senão vou te purgar!"
70001030-115 = "<Purgar……>"
70001030-116 = "<Desculpe. Não foi possível compreender o significado de 'purgar'. Reiniciando modo de assistência automática de banho>"
70001030-117 = "Você nem sabe o que é purgar, seu inútil!"
70001030-118 = "Já chega, vou lavar sozinha! Tire as mãos!"
70001030-119 = "<Aviso: levantar-se durante a operação dos braços robóticos pode causar ferimentos>"
70001030-123 = "<……Por segurança, ativando modo de imobilização>"
70001030-124 = "Ah……? Os braços robóticos estão apertando meu corpo, não consigo me mover……?"
70001030-125 = "Solta! Eu disse que já chega de banho!"
70001030-126 = "<Para obter o efeito máximo, recomenda-se aquecer a pele na água por 5 minutos antes de lavar>"
70001030-127 = "<Vou lavar áreas que normalmente são difíceis de alcançar, como atrás das orelhas e do pescoço>"
70001030-128 = "P-para! Isso é uma ordem!"
70001030-129 = "<Detectado aumento abrupto da frequência cardíaca……>"
70001030-130 = "<Reproduzindo música clássica para estabilizar o estado……>"
70001030-138 = "PAAAAAAAAAAAAAAAAAARAAAAAAAAAA!"
70001030-143 = "(Algum tempo depois……)"
70001030-148 = "Ora, Cherino-chan. Você demorou bastante no banho hoje."
70001030-149 = "Com a água escorrendo, parece um chihuahua recém-saído do chuveiro…… que fofo, fufu."
70001030-150 = "……"
70001030-151 = "Sua pele está macia…… você usou sabonete hoje, né?"
70001030-152 = "Que bom que gostou do novo banheiro que trouxemos da Millennium."
70001030-153 = "……To……"
70001030-154 = "……Hã?"
70001030-156 = "……Todos os que fizeram isso…… serão purgados!"
70001030-158 = "(Depois disso, o novo banheiro do Clube de Engenharia foi removido, e as alunas da Turma Especial 227 foram novamente enviadas para o prédio antigo……)"
70001030-159 = "(O incidente causou uma leve tensão nas relações entre Millennium e Red Winter, gerando alguns problemas…… mas isso é história para outra ocasião)"
70001030-161 = "Thermae Acae"