[translation]
2003802-1 = "A arte de ouvir"
2003802-3 = "Ah, Sensei."
2003802-4 = "É um tanto refrescante encontrar você com este visual."
2003802-5 = "[s] \"É verdade, combina muito com você.\""
2003802-6 = "Ora.#nSinto-me honrada com o seu elogio."
2003802-7 = "Como sempre, Sensei, você também é muito bom com as palavras."
2003802-8 = "[s] \"Também...?\""
2003802-9 = "Sim."
2003802-10 = "Por acaso, houve algo que lhe chamou a atenção?"
2003802-11 = "Fufu."
2003802-12 = "Criar hesitação no oponente para poder atacar em qualquer brecha é o básico da propaganda, afinal."
2003802-13 = "[s] \"Por favor, tenha piedade...\""
2003802-14 = "Ainda assim, este é um lugar maravilhoso."
2003802-15 = "A vista é boa e parece que a voz pode ser ouvida de longe."
2003802-16 = "......Está pensando se eu quero fazer um discurso?"
2003802-17 = "Fufufu."
2003802-18 = "[s] \"O fato de você apenas rir de volta é o que mais me assusta!?\""
2003802-19 = "É verdade que em Red Winter eu faço discursos com frequência, mas..."
2003802-20 = "Eu sei muito bem distinguir os lugares."
2003802-21 = "Um passo em falso pode acabar gerando problemas entre as escolas."
2003802-22 = "Por isso, pensei em passar o resto do tempo em silêncio."
2003802-23 = "[s] \"A Tomoe é realmente exemplar.\""
2003802-24 = "Obrigada por me elogiar mais uma vez."
2003802-25 = "Bem, por hoje, que tal eu assumir o papel de quem ouve?"
2003802-26 = "Vamos lá, Sensei."
2003802-29 = "Pessoal, esta é a instrutora por um dia, instrutora Tomoe Sashiro."
2003802-30 = "Vamos recebê-la com uma salva de palmas!"
2003802-34 = "[ns1] \"Assumir o papel de quem ouve...\"\n[ns2] \"Então era isso que significava ser instrutora no Jardim de Amehana.\""
2003802-37 = "Sim, pois as crianças são o futuro de Kivotos."
2003802-38 = "Ou seja, não existe existência mais adequada para ser utilizada em propaganda."
2003802-39 = "Claro, eu sei onde traçar o limite, então não se preocupe."
2003802-40 = "[s3] \"Estou começando a ficar muito preocupado...\"\n[s4] \"Você realmente não vai fazer nada estranho, vai?\""
2003802-43 = "Sim.#nPor favor, confie em mim, Sensei."
2003802-44 = "Pessoal do Jardim de Amehana, sobre o que vamos conversar hoje?"
2003802-45 = "Instrutora Tomoe!#nEste sapato brilha!"
2003802-46 = "Ora, que maravilhoso."
2003802-47 = "Sapatos precisam ter o pé direito e o esquerdo combinando!"
2003802-48 = "Por isso, se esconder um deles, não dá para sair!"
2003802-49 = "Não pode fazer isso, esconder o sapato do amigo."
2003802-50 = "Agora pouco, tinha uma borboleta voando ali!"
2003802-51 = "Sabia?#nDizem que as borboletas são completamente diferentes quando são bebês!"
2003802-52 = "Quando vocês crescerem, talvez também se tornem pessoas completamente diferentes de quem são agora."
2003802-53 = "O jardim de infância é um lugar para, digamos, controlar as crianças para que elas se encaixem na estrutura da sociedade."
2003802-54 = "É como o elefante que é amarrado por uma corda desde pequeno e, mesmo quando cresce, não tenta fugir..."
2003802-55 = "Ah, isso é segredo entre nós, viu?"
2003802-56 = "Então, agora somos amigos secretos?"
2003802-59 = "(Tomoe ouvia atentamente o que cada criança tinha a dizer)"
2003802-60 = "(Ao sair, ela recebeu palavras de agradecimento dos instrutores do Jardim de Amehana)"
2003802-63 = "Bom trabalho hoje, Sensei."
2003802-64 = "[s5] \"Bom trabalho para você também, Tomoe.\"\n[s6] \"Você é bem acostumada a cuidar de crianças, hein.\""
2003802-67 = "É mesmo?"
2003802-68 = "Você não sabia que eu, que geralmente sou quem fala, também sou boa em ouvir?"
2003802-69 = "Fufu."
2003802-70 = "Obrigada, Sensei."
2003802-71 = "Ser elogiada três vezes em um único dia... #nHoje é um dia memorável, não é?"
2003802-72 = "No entanto, a habilidade de ouvir é muito útil na hora de persuadir alguém."
2003802-73 = "Em qualquer situação, é preciso começar ouvindo o que a outra pessoa tem a dizer."
2003802-74 = "Além disso..."
2003802-75 = "[s] \"Além disso?\""
2003802-76 = "O tempo que passo conversando com crianças é divertido."
2003802-78 = "(A expressão de Tomoe estava mais suave do que o habitual)"
