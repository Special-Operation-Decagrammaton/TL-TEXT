[translation]
10027005-1 = "Prólogo: Um dia na Frente de Libertação do Conhecimento"
10027005-2 = "Academia Red Winter - Biblioteca"
10027005-13 = "Cof, cof!"
10027005-14 = "V-você está bem...?"
10027005-16 = "Tem poeira demais aqui!! Desse jeito, meus pulmões vão ficar pretos!"
10027005-17 = "Não tem jeito... limpeza e poeira são coisas inseparáveis..."
10027005-19 = "Mesmo que a gente limpe a biblioteca, ninguém vem aqui...#nEssa tarefa tem algum sentido?"
10027005-20 = "A única que fica feliz quando está limpo é a Presidente Cherino, que vem aqui para tirar uma soneca."
10027005-21 = "Já que ela é frequentadora assídua das sonecas, bem que ela poderia permitir que a gente trouxesse nossos próprios livros..."
10027005-22 = "É verdade... M-mas! Limpar é uma coisa boa!"
10027005-23 = "Nós vivemos na biblioteca, afinal...!"
10027005-24 = "Ué... Eu já estou fazendo um esforço enorme para limpar, não precisa dizer essas coisas~"
10027005-25 = "Além disso, às vezes a gente acaba descobrindo tesouros durante a limpeza..."
10027005-27 = "Sempre tem algo bom acontecendo enquanto fazemos isso!#nPodemos acabar encontrando livros raros que estão fora de catálogo há muito tempo!"
10027005-28 = "...Mesmo que você chame de livro raro, não faz sentido se não tiver valor para mim...?"
10027005-30 = "Para nós da \"Frente de Libertação do Conhecimento\", tem valor sim...!#nAlém disso, você pode acabar gostando se ler."
10027005-31 = "Estamos tão carentes de conteúdo novo que todo mundo está sempre faminto por novidades...!"
10027005-32 = "Não... não é que eu queira negar as coisas antigas, mas...#nNão é estranho chamar de \"conteúdo novo\" algo que é um livro ou mangá antigo que saiu de catálogo há eras?"
10027005-33 = "Por que você diz uma coisa dessas!"
10027005-46 = "...!#nSenpai Mel, venha aqui um pouco!"
10027005-47 = "Hã? O que foi?#nAchou alguma coisa?"
10027005-48 = "Sim! Do volume 4 ao 21 de \"Luna\"!#nQuem diria que um tesouro desses ainda estava adormecido na biblioteca...!"
10027005-49 = "...\"Luna\"?"
10027005-50 = "O quê...!? Não me diga que você não conhece \"Luna\"?#nSenpai Mel, você realmente faz parte da \"Frente de Libertação do Conhecimento\"!?"
10027005-51 = "Não, eu não conheço... Que tipo de obra é?"
10027005-52 = "É uma obra-prima de nível lendário!? Fiquei um pouco decepcionada com você, senpai..."
10027005-53 = "Trata-se de duas pessoas chamadas \"Luna\" que, por coincidência, acabam morando juntas pelo mesmo motivo, e lida com vários incidentes que surgem a partir daí..."
10027005-54 = "Amor, vida, punk, bandas, filmes... não é exagero dizer que é uma obra que reuniu o melhor de todos os gêneros!"
10027005-55 = "Por vários motivos, o volume final, o 22, é... um pouco, sabe como é..."
10027005-56 = "Enfim! Viver sem conhecer essa obra lendária... sinto pena do tempo da Senpai Mel!"
10027005-57 = "O meu tempo é que é digno de pena, e eu não sou!?"
10027005-59 = "Não é como se eu achasse que a Senpai Mel é digna de pena!"
10027005-60 = "Isso é verdade, mas mesmo assim!"
10027005-61 = "Como eu tenho do volume 1 ao 3, aproveite esta oportunidade para estudar \"Luna\" também, senpai!"
10027005-62 = "Eita... isso é algo que eu sou obrigada a estudar?"
10027005-63 = "Nós somos a \"Frente de Libertação do Conhecimento\". Todo conhecimento é igualmente importante!#nE \"Luna\" não é exceção!"
10027005-64 = "Isso é 100% desejo pessoal!!#nNão use a \"Frente de Libertação do Conhecimento\" para isso!"
10027005-79 = "Ah... terminei de ler...#nJá está nessa hora?"
10027005-80 = "Como foi? Como foi?"
10027005-81 = "Hum... resumindo..."
10027005-82 = "Resumindo?"
10027005-83 = "Não foi ruim."
10027005-84 = "Eu sabia! É uma lenda, afinal!"
10027005-85 = "Mas, sabe... isso aqui não abusa demais de piadas de uma nota só?"
10027005-86 = "O que você quer dizer com isso...?"
10027005-87 = "Como posso dizer... o enredo é bagunçado. Os personagens são movidos pela conveniência da história o tempo todo...#nProblemas surgem do nada só para criar conflito, ou personagens que não sabiam como usar são descartados de qualquer jeito..."
10027005-88 = "I-isso... embora sejam críticas que surgiram ocasionalmente na época da publicação..."
10027005-89 = "M-mas! Todos os personagens são retratados de forma cativante!#nA cena em que o empresário do estúdio e a Luna batem de frente no volume 16 é tão marcante...!"
10027005-90 = "Sim. Acho a construção dos personagens excelente.#nConsiderando a época em que foi lançado, deveria ser avaliado como algo que estava à frente do seu tempo."
10027005-91 = "Mas, como resultado disso, o roteiro dos capítulos focados nos personagens, que foram forçados na história, acabou entrando em colapso e criando contradições no cenário..."
10027005-92 = "O capítulo final não é especialmente assim? O volume 21 não tem uma história decente de jeito nenhum..."
10027005-93 = "Será que vai terminar mesmo no volume 22? Eles abriram tantas pontas soltas que estou preocupada se vão conseguir resolver tudo."
10027005-94 = "O volume 22... não existe."
10027005-95 = "Hã? Não tem volume final? Por quê?"
10027005-96 = "……É isso."
10027005-97 = "Momiji? O que houve?"
10027005-104 = "O que a Mel-senpai acha que sabe sobre 'Luna' para falar assim?!"
10027005-105 = "……E-ei, hein!?"
10027005-107 = "Por que o volume final não existe? É isso que eu queria perguntar para você!"
10027005-108 = "Além disso...!"
10027005-109 = "A-além disso...?"
10027005-110 = "A Mel-senpai, que critica tudo com tanta arrogância, por acaso já criou alguma obra-prima!?"
10027005-111 = "Você não é igual a mim, criando histórias com pontas soltas e abandonando o enredo?"
10027005-112 = "Você faz isso porque não desenvolve o cenário e monta a história a partir de cenas que quer desenhar!"
10027005-113 = "Você também manipula os personagens para servir à história que quer contar...#nComo pode criticar 'Luna' com tanta arrogância!?#nAté uma criança do primário consegue criticar!"
10027005-114 = "M-Momiji? O que deu em você de repente?"
10027005-116 = "Já chega... meu limite de paciência acabou. Já que chegamos a esse ponto, vou dizer tudo o que penso!"
10027005-124 = "Então foi a Mel-senpai quem comeu minha panqueca de tempurá!?#nEntendi, entendi, então você é esse tipo de pessoa..."
10027005-125 = "Estava ali largada há um dia, achei que podia comer...#nE outra, se não queria que comessem, devia ter escrito seu nome."
10027005-126 = "Antes de tudo, é senso comum não tocar nas coisas dos outros sem permissão, não é!?"
10027005-135 = "Você sempre... faz o que bem entende...!"
10027005-136 = "Eu odeio a Mel-senpai!"
10027005-137 = "……!"
10027005-138 = "Já que quer falar assim... acha que eu não tenho nada guardado sobre você!?"
10027005-140 = "Aliás, a Momiji também, daquela vez...!"
10027005-148 = "Eu me perguntava por que o mesmo livro chegou de novo, então foi você quem fez o pedido duplicado!?"
10027005-149 = "E-era necessário para conseguir a edição limitada!#nÉ muito difícil de conseguir, sabia!?"
10027005-151 = "Por causa disso, ficamos proibidos de solicitar novos livros por dois meses!"
10027005-158 = "Você diz que eu faço o que quero, mas a Momiji também não fica atrás!"
10027005-160 = "Uuu... isso é uma coisa, aquilo é outra!"
10027005-161 = "Não, é a mesma coisa."
10027005-163 = "Uuu...!"
10027005-164 = "Hmph...!"
10027005-169 = "Já chega! Não quero mais saber de você, senpai!"
10027005-171 = "Fique sozinha e faça o que quiser!"
10027005-180 = "É bem melhor ficar sozinha, assim fico mais tranquila!"
10027005-181 = "Não quero mais saber da Momiji!"
10027005-182 = "……."
10027005-183 = "……Ela realmente foi embora."
10027005-184 = "Bom, tanto faz! Sozinha eu consigo seguir no meu próprio ritmo!"
10027005-185 = "No meu próprio ritmo..."
10027005-186 = "……."
10027005-187 = "Não... isso não é bom, né!?"
10027005-190 = "#video;10027"
