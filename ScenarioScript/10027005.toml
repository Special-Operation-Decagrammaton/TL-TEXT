[translation]
10027005-1 = "プロローグ;知識解放戦線のとある一日"
10027005-2 = "レッドウィンター連邦学園・図書館"
10027005-13 = "げほっ、げほっ!"
10027005-14 = "だ、大丈夫ですか……？"
10027005-16 = "ホコリ多すぎ！！このままじゃ肺が真っ黒になっちゃうよ！"
10027005-17 = "仕方ないですよ……お掃除とホコリは切っても切り離せない関係ですから……"
10027005-19 = "図書館をきれいに片付けたって、誰も来ないのに……#nこの行為ってなんか意味あるの？"
10027005-20 = "きれいになって喜ぶの、昼寝に来るチェリノ会長くらいでしょ。"
10027005-21 = "昼寝常連なんだから、蔵書の持ち込みくらい許可してくれたっていいのに……"
10027005-22 = "そうですね……で、でも！お掃除するのは良いことですよ！"
10027005-23 = "私たちは図書館で生活してるわけですし……！"
10027005-24 = "うえぇ……重い腰あげて掃除してんだから、そういう事いわないでよ～"
10027005-25 = "それに、お掃除ってたまにお宝を発掘したりするし……"
10027005-27 = "やってるうちにいいことありますよ！#n絶版になって久しいレア本とか見つけたりするかもしれませんし！"
10027005-28 = "……レア本って言っても、自分にとって価値がなかったら意味ないんだけど……？"
10027005-30 = "私たち「知識解放戦線」にとっては、価値があるものですよ……！#nそれに、読んでみたら意外とハマるかもしれません。"
10027005-31 = "新しいコンテンツが不足しすぎて、みんないつも供給に飢えてるくらいですし……！"
10027005-32 = "いや……古いものを否定するつもりはないけどさぁ……#n新しいコンテンツって言って絶版になって久しい昔の本や漫画を渡されても困らない？"
10027005-33 = "なんでそんなこと言うんですか！"
10027005-46 = "……！#nメル先輩、ちょっと来てください！"
10027005-47 = "え？どうしたの？#n何か見つかった？"
10027005-48 = "はい！『ルナ』4巻から21巻が！#nこんな宝物がまだ図書館で眠っていたなんて……！"
10027005-49 = "……『ルナ』？"
10027005-50 = "えっ……！？まさか、『ルナ』を知らないんですか？#nメル先輩はそれで「知識解放戦線」を名乗っているんですか！？"
10027005-51 = "いや、知らないけど……どんな作品なの？"
10027005-52 = "レジェンド級の名作ですよ！？ちょっと先輩に失望しました……。"
10027005-53 = "『ルナ』という名の2人が、偶然、同じような理由で同居することになり、そこから起こる様々な事件を扱った……"
10027005-54 = "愛と人生とパンクとバンドと映画と……とにかくあらゆるジャンルの粋を集めたと言っても過言ではない作品なんですよ！"
10027005-55 = "諸事情で最終巻の22巻は……ちょっと、アレですが……"
10027005-56 = "とにかく！この伝説的な作品を知らずに生きてきたなんて……メル先輩の時間が可哀想です！"
10027005-57 = "私の時間は可哀想で、私は可哀想じゃないの！？"
10027005-59 = "私がメル先輩を可哀想だと思うわけないじゃないですか！"
10027005-60 = "それはそうだけどさ！"
10027005-61 = "ちょうど1巻から3巻までは私が持ってるので、この機会に先輩も『ルナ』を履修しましょう！"
10027005-62 = "え～それ絶対履修しなきゃダメなヤツ？"
10027005-63 = "私たちは「知識解放戦線」です。すべての知識は平等に大切なものです！#nそれは『ルナ』も例外ではありません！"
10027005-64 = "100%我欲じゃん！！#n「知識解放戦線」を利用すんな！"
10027005-79 = "ふぁあ……読み終わった……#nもうこんな時間？"
10027005-80 = "どうでした？どうでした？"
10027005-81 = "うーん……ざっくり言うと――"
10027005-82 = "ざっくり言うと？"
10027005-83 = "悪くはなかったよ。"
10027005-84 = "そうですよね！レジェンドですもの！"
10027005-85 = "でもさ、これ……一発ネタばっかり乱発してない？"
10027005-86 = "それはどういう……？"
10027005-87 = "なんというか……ストーリーラインが雑なんだよね。#nキャラが終始、物語都合で動かされてるっていうか……#n葛藤させるためにトラブルが急に湧いてきたり、扱いに困ったキャラを雑に退場させたり……"
10027005-88 = "そ、それは……連載当時もたまに挙がっていた批判では、ありますが……"
10027005-89 = "で、ですが！ちゃんとキャラは全員魅力的に描かれてますよ！#n16巻でスタジオのマネージャーとルナがぶつかった時のシーンなんて印象的で……！"
10027005-90 = "うん。キャラクター造形は秀逸だと思う。#n出た時代を考慮したら、むしろ流行を先取りしていたと評価すべきだろうね。"
10027005-91 = "でも、その結果無理矢理ねじ込まれたキャラ回のシナリオが破綻しちゃったり、設定矛盾起こしちゃったりしてるし……"
10027005-92 = "最終章なんか特にそうじゃない？#n21巻とかまともな話が全然ないんだけど……"
10027005-93 = "本当に22巻で完結するのコレ？風呂敷広げすぎてるから、ちゃんと伏線全部回収するのか気になって仕方ないんだけど。"
10027005-94 = "22巻は……ありません。"
10027005-95 = "え？最終巻ないの？なんで？"
10027005-96 = "……ですか。"
10027005-97 = "モミジ？どうしたの？"
10027005-104 = "メル先輩に『ルナ』の何がわかるって言うんですか！！"
10027005-105 = "……え、ええ！？"
10027005-107 = "最終巻がどうして存在しないのかなんて、むしろ私が聞きたいくらいです！！"
10027005-108 = "それに……！"
10027005-109 = "そ、それに……？"
10027005-110 = "偉そうに批判するメル先輩は、名作を作ってきたっていうんですか！？"
10027005-111 = "適当に風呂敷を広げて、伏線丸投げのストーリーを作るのは、先輩も同じじゃないですか！"
10027005-112 = "設定を作り込まないで描きたいシーンから適当に構成するからそうなるんですよ！"
10027005-113 = "やりたい物語のためにキャラを振り回してるのは、先輩だって同じなのに……#nどうして『ルナ』を偉そうに批判できるのか私にはわかりません！#n批判だけなら小学生だってできるんですよ！"
10027005-114 = "も、モミジ？急にどうしたの？"
10027005-116 = "もう……我慢の限界なんです。この際、言いたいことを言わせていただきます！"
10027005-124 = "私のパンケーキ天ぷらを食べたの、メル先輩だったんですね！？#nそうかそうか、あなたはそういう人だったんですね……"
10027005-125 = "その辺に1日置きっぱなしだったから食べていいものかと……#nというか、そんなに食べられたくないんだったら名前でも書いておきなよ。"
10027005-126 = "そもそも、自分で買ってないものを勝手に触らないのって常識ですよね！？"
10027005-135 = "いつも本当に……やりたい放題やって……！"
10027005-136 = "メル先輩なんて大嫌いです！"
10027005-137 = "……！"
10027005-138 = "言わせておけば……私に我慢してることが一つもないとでも！？"
10027005-140 = "大体、モミジだってこの前……！"
10027005-148 = "なんで同じ本がまた入ってきたのかと思ったら、二重で発注してたのあんただったのね！？"
10027005-149 = "げ、限定版のためには仕方なかったんです！#n入手が難しいんですよ！？"
10027005-151 = "そのせいで2ヶ月も蔵書申請禁止されちゃったじゃん！"
10027005-158 = "私が好き勝手してるって言うけど、モミジだって大概じゃん！"
10027005-160 = "うう……それはそれ、これはこれ、です！"
10027005-161 = "いや、一緒でしょ。"
10027005-163 = "ううっ……！"
10027005-164 = "はん……！"
10027005-169 = "もういいです！先輩なんか知りません！"
10027005-171 = "お一人でどうぞご自由になさってください！"
10027005-180 = "一人の方が気楽でいいわよ！"
10027005-181 = "モミジなんか知らない！"
10027005-182 = "……。"
10027005-183 = "……本当に出ていっちゃった。"
10027005-184 = "まぁ、別にいいんだけどさ！私一人の方が自分のペースで進められるし！"
10027005-185 = "自分のペースで……"
10027005-186 = "……。"
10027005-187 = "いや……よくないよ！？"
10027005-190 = "#video;10027"
