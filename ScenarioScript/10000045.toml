[translation]
10000045-2 = "きゃんっ！？"
10000045-6 = "い、イズナ、二度も負けてしまいました！？"
10000045-7 = "前回以上に万全の準備をして来たのに……！これでも敵わないなんて……！？"
10000045-8 = "まだまだ修行が足りないということですか……！？"
10000045-9 = "[s1] \"ねえイズナ、イズナは忍者になるのが夢って言ったのに、\"\n[s2] \"どうして魑魅一座と一緒にいるの？\""
10000045-10 = "それは……"
10000045-11 = "それは……"
10000045-12 = "イズナは今、忍者として雇い主からそのように命令を受けているからです！"
10000045-13 = "[s] \"雇い主……？\""
10000045-14 = "はい！邪魔者を倒し、任務を全うしなければなりません！"
10000045-15 = "例えどんな任務でも、命令とあらば完璧に行うのが忍びというもの！"
10000045-16 = "そうしていればいつか、イズナも真の主君に……！"
10000045-17 = "はっ！イズナは何故今こんなことを話して……！これも先生の策略！？"
10000045-18 = "ううっ！イズナは引き際を知っている忍者なので、今回は退きます……！"
10000045-19 = "次に会った時こそ、覚悟しておいてください！必ずや先生を倒してみせますので！"
10000045-20 = "[s] \"完全に三流の悪党の逃げ台詞だけど……。\""
10000045-21 = "い、イズナは三流の悪党などではありません！忍者ですから！"
10000045-22 = "忍者というのはきちんと戦略的……えっと、戦略的撤退をして、その後また何度でも挑戦する、そういう存在なのです！"
10000045-23 = "次は絶対に負けませんから！ニンニン！"
10000045-25 = "（ヒュッ！）"
10000045-27 = "（そして、またしてもイズナは消えてしまった）"
10000045-29 = "あっ、先生！大丈夫ですか、お怪我はありませんか！？"
10000045-30 = "[s] 頷く。"
10000045-31 = "ううっ、逃げられた……！"
10000045-32 = "全員、「くっ、次は必ず……！」みたいなこと言いながら逃げていったね……。"
10000045-33 = "これまでずっと苦戦続きでしたが、先生がいるだけでこんなに違うだなんて……。"
10000045-34 = "ごくり……これが大人の力！？"
10000045-35 = "うん、さすが。"
10000045-36 = "[s] \"あ、そういえばたしかこの前……。\""
10000045-39 = "待てー！逃がさないんだから！"
10000045-40 = "か、カエデちゃんもちょっと待ってください……はあ、はあ…は、速すぎます……。"
10000045-42 = "あれ？先生と会ってたの……？"
10000045-43 = "あ、パトロールしてた時にすれ違ったのかな？私たちここしばらくずっと、魑魅一座と戦いながら街中を回ってたから！"
10000045-44 = "パトロール？"
10000045-45 = "修行の一環で街を守ろう……ってことで。それも一応、うちの部活の趣旨の一つだから。"
10000045-46 = "あいつらの手から桜花祭を守らなきゃ！"
10000045-47 = "皆さんで楽しめてこその桜花祭ですからね。"
10000045-48 = "急にあちこちで魑魅一座・路上流が暴れ始めてしまって、困っていたところでした。"
10000045-49 = "それであなたたちも陰陽部に……。"
10000045-50 = "修行部がそんな活動をしてるなんて、全然知らなかった。"
10000045-51 = "いつも変なことばっかりしてる変わり者たちだとばかり……。"
10000045-52 = "[s] \"面と向かってそれはちょっと……。\""
10000045-53 = "と、とにかくです！"
10000045-54 = "やっぱり魑魅一座が暴れ出したのは「急に」ってことだったけど、あらためて考えてみるとどうして……！？"
10000045-55 = "んー……そういえば、最近ある噂があって。"
10000045-56 = "今までバラバラだった魑魅一座を、統率して動かしてる「雇い主」……みたいな人がいるとかなんとか。"
10000045-57 = "[s] （そういえば、たしかイズナも「雇い主」って……）"
10000045-60 = "イズナは今、忍者として雇い主からそのように命令を受けているからです！"
10000045-62 = "[ns] （イズナを雇って、命令してる人がいる……）"
10000045-63 = "雇い主って……あの問題児たちにわざわざお金を払って雇ってるの？それまたどうして？"
10000045-64 = "なるほど、よっぽど悪いやつに違いない！"
10000045-65 = "みんなが楽しそうに笑ってるのが気に食わないとか、そんな理由で暴れさせてるのかも！うん、絶対そう！絶対悪いやつ！"
10000045-66 = "カエデちゃんの言ってることはよく分からないですけど、この桜花祭を邪魔したがっている人がいることは確かみたいですね。"
10000045-67 = "その目的が何なのかは、まだ分かりませんが……。"
10000045-68 = "こうして魑魅一座と戦い続けるより、その元凶を見つけた方が良いのではないでしょうか？"
10000045-69 = "それは賛成～……でもその元凶、どうやって探そうか？"
10000045-70 = "元凶、元凶か……。"
10000045-71 = "私たちの桜花祭を邪魔しようとする、元凶を探すためだし……"
10000045-72 = "うん、断腸の思いだけど仕方ない。"
10000045-74 = "シンプルに行きましょう。魑魅一座を誘拐してから脅して、雇い主が誰なのかを聞き出す！"
10000045-76 = "うわー、血も涙も無い。"
10000045-77 = "さすが、お祭り運営委員会の委員長！"
10000045-78 = "お店の数字、お祭りの成功、なんだって欲しいもののためなら手段は選ばない！"
10000045-79 = "そういう噂を聞いてたけど、本当だった！"
10000045-80 = "カエデちゃん、それ褒めてないですから……。"
10000045-81 = "[s] \"……。\""
10000045-84 = "い、いや、流石にそこまではっていうか、そのっ！"
10000045-85 = "い、嫌ですね～、シズコは心優しい看板娘で……！"
10000045-88 = "……ああもうっ！とにかく、元凶を探しに行くわよ！！"
