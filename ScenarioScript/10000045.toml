[translation]
10000045-2 = "Kyaaa!?"
10000045-6 = "I-Izuna, eu perdi duas vezes seguidas!?"
10000045-7 = "Mesmo tendo me preparado melhor do que da última vez...! Como eu pude perder mesmo assim...!?"
10000045-8 = "Será que meu treinamento ainda não é suficiente...!?"
10000045-9 = "[s1] \"Ei, Izuna, você disse que seu sonho era se tornar uma ninja,\"\n[s2] \"então por que você está com o Grupo Chimi?\""
10000045-10 = "Isso é..."
10000045-11 = "Isso é..."
10000045-12 = "É porque, como ninja, eu recebi ordens do meu empregador para fazer isso!"
10000045-13 = "[s] \"Empregador...?\""
10000045-14 = "Sim! Eu preciso derrotar quem estiver no meu caminho e cumprir minha missão!"
10000045-15 = "Não importa qual seja a missão, um ninja deve executar suas ordens com perfeição!"
10000045-16 = "Se eu fizer isso, um dia, eu também poderei servir a um verdadeiro mestre...!"
10000045-17 = "Ah! Por que eu estou contando isso agora...! Será que isso também é uma estratégia do Sensei!?"
10000045-18 = "Ugh! Como uma ninja que sabe a hora de recuar, eu vou me retirar por hoje...!"
10000045-19 = "Prepare-se para a próxima vez que nos encontrarmos! Eu definitivamente vou derrotar você, Sensei!"
10000045-20 = "[s] \"Essa foi uma desculpa digna de um vilão de terceira categoria...\""
10000045-21 = "E-Eu não sou uma vilã de terceira categoria! Eu sou uma ninja!"
10000045-22 = "Ser um ninja significa fazer uma retirada estratégica... bem, uma retirada estratégica, e depois desafiar o oponente quantas vezes forem necessárias!"
10000045-23 = "Na próxima, eu não vou perder! Nin-nin!"
10000045-25 = "(Vupt!)"
10000045-27 = "（E, mais uma vez, Izuna desapareceu）"
10000045-29 = "Ah, Sensei! Você está bem? Não se machucou, não é!?"
10000045-30 = "[s] Acena com a cabeça."
10000045-31 = "Ugh, eles escaparam...!"
10000045-32 = "Todos eles fugiram dizendo coisas como 'Droga, na próxima eu com certeza...!', né..."
10000045-33 = "Até agora só tivemos dificuldades, mas pensar que a simples presença do Sensei faria tanta diferença..."
10000045-34 = "Gulp... Será que isso é o poder de um adulto!?"
10000045-35 = "Sim, como esperado."
10000045-36 = "[s] \"Ah, falando nisso, na verdade, da última vez...\""
10000045-39 = "Espere! Eu não vou deixar você escapar!"
10000045-40 = "Kaede-chan, espere um pouco também... haa, haa... v-você é rápida demais..."
10000045-42 = "Ué? Você estava com o Sensei...?"
10000045-43 = "Ah, será que nos cruzamos enquanto fazíamos a patrulha? É que faz um tempo que estamos rodando a cidade lutando contra o Grupo Chimi!"
10000045-44 = "Patrulha?"
10000045-45 = "Decidimos proteger a cidade como parte do nosso treinamento... Afinal, esse é um dos objetivos do nosso clube."
10000045-46 = "Temos que proteger o Festival Ouka das mãos deles!"
10000045-47 = "O Festival Ouka só faz sentido se todos puderem aproveitar, afinal."
10000045-48 = "O Grupo Chimi, Estilo de Rua, começou a causar confusão por toda parte de repente, e estávamos em apuros."
10000045-49 = "Então vocês também foram ao Departamento Yin-Yang por causa disso..."
10000045-50 = "Eu não fazia ideia de que o Clube de Treinamento fazia esse tipo de atividade."
10000045-51 = "Eu só achava que eles eram um bando de esquisitos que só faziam coisas estranhas..."
10000045-52 = "[s] \"Dizer isso na minha cara é um pouco...\""
10000045-53 = "E-enfim!"
10000045-54 = "A gente achou que o alvoroço do Grupo Chimi tinha começado \"do nada\", mas pensando bem, por que será...!?"
10000045-55 = "Hmm... agora que você falou, tem um boato circulando ultimamente."
10000045-56 = "Dizem que existe um \"empregador\" ou algo do tipo que está unindo e controlando o Grupo Chimi, que antes agia de forma independente."
10000045-57 = "[s] (Pensando bem, a Izuna também mencionou um \"empregador\"...)"
10000045-60 = "É porque a Izuna, como ninja, está seguindo as ordens do meu empregador!"
10000045-62 = "[ns] (Tem alguém que contratou a Izuna e está dando ordens a ela...)"
10000045-63 = "Um empregador, é...? Estão pagando dinheiro para contratar aqueles encrenqueiros? Mas por que fariam isso?"
10000045-64 = "Entendi, com certeza deve ser alguém muito mau!"
10000045-65 = "Talvez eles estejam causando esse caos só porque não suportam ver todo mundo se divertindo! É, com certeza é isso! É alguém muito mau!"
10000045-66 = "Não entendi muito bem o que a Kaede quis dizer, mas parece certo que tem alguém querendo atrapalhar o Festival Ouka."
10000045-67 = "Ainda não sabemos qual é o objetivo dessa pessoa, mas..."
10000045-68 = "Em vez de continuar lutando contra o Grupo Chimi, não seria melhor encontrar a causa raiz de tudo isso?"
10000045-69 = "Concordo... mas como vamos encontrar essa causa raiz?"
10000045-70 = "Causa raiz, causa raiz, é..."
10000045-71 = "É para encontrar quem está tentando atrapalhar o nosso Festival Ouka..."
10000045-72 = "É, é uma decisão dolorosa, mas não tem outro jeito."
10000045-74 = "Vamos ser diretos. Vamos sequestrar o Grupo Chimi, ameaçá-los e fazer com que revelem quem é o empregador!"
10000045-76 = "Uau, que crueldade."
10000045-77 = "Como esperado da presidente do Comitê Organizador do Festival!"
10000045-78 = "Os números da loja, o sucesso do festival... você não mede esforços para conseguir o que quer!"
10000045-79 = "Eu tinha ouvido boatos sobre isso, mas era verdade!"
10000045-80 = "Kaede-chan, isso não é um elogio..."
10000045-81 = "[s] \"……。\""
10000045-84 = "N-não, eu não chegaria a esse ponto, quer dizer, é que!"
10000045-85 = "Q-que isso, não seja assim! A Shizuko é uma atendente de bom coração...!"
10000045-88 = "……Ah, chega! De qualquer forma, vamos atrás do culpado!!"
