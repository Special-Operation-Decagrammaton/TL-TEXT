[translation]
1009105-1 = "私の担当です"
1009105-2 = "（午後、近くの踏切でカズサと待ち合わせをした）"
1009105-3 = "……やっほ、先生。"
1009105-8 = "[ns1] \"こんにちは、カズサ。\"\n[ns2] \"時間ピッタリだね。\""
1009105-11 = "ごめんね、待った？"
1009105-12 = "早めに練習切り上げたつもりなんだけど……先生は大体来るの早いよね。"
1009105-13 = "別に時間ぴったりか、少しくらい遅れても大丈夫だよ？"
1009105-14 = "[s] \"カズサを待つのは全然――\""
1009105-15 = "はいはい、ストップ。"
1009105-16 = "何を言おうとしてるのかは分かったけど、聞かないからね。#nカットカット。"
1009105-17 = "会ってすぐそんなんじゃ、今日一日持たないよ。"
1009105-18 = "で、今日食べたいものは決まった？"
1009105-19 = "……へぇ、結構あるね。"
1009105-20 = "んー、ちょっとそのリスト貸してもらえる？"
1009105-21 = "この辺のお店、閉店時間がバラバラでさ。#nちゃんと作戦組まないと上手く回れないんだよね。"
1009105-22 = "だから、ベテランのアドバイスに従うのがオススメだよ？"
1009105-27 = "どれどれ……。"
1009105-28 = "ああ、このお店……。"
1009105-29 = "ふふっ、なかなか良いチョイスじゃん。#n先生もそろそろ、一人前の放課後スイーツ部員だね。"
1009105-30 = "[s] \"うん、お陰様で。\""
1009105-31 = "おだてても何も出ないよ？"
1009105-32 = "……さて、と。"
1009105-33 = "じゃあ、時間がもったいないから……"
1009105-34 = "ほら、行こ！"
1009105-36 = "（その後、カズサと一緒にスイーツ巡りを始めた）"
1009105-37 = "（多少変わった動線だったが、カズサの言うとおり閉店時間ギリギリで間に合う「最適のルート」だった）"
1009105-39 = "（いつの間にか夕方になり、リスト最後のお店の前に到着した）"
1009105-44 = "……よし、間に合った。"
1009105-45 = "これで全部かな？"
1009105-46 = "……ん？"
1009105-47 = "ふふっ、これくらい朝飯前だよ。"
1009105-48 = "まぁ、他のみんなに比べたらまだまだだけど。"
1009105-49 = "先生に比べたら、これくらいはね。"
1009105-50 = "こういう時は――"
1009105-54 = "お姉さんに任せなさい、なんてね♪"
1009105-55 = "[s3] \"今日のカズサは頼もしいね。\"\n[s4] \"これは次回も期待かな。\""
1009105-58 = "でしょ？"
1009105-59 = "じゃあ、早く中に……"
1009105-61 = "いらっしゃいませ。"
1009105-66 = "……おや、これはこれは。"
1009105-67 = "歌手……？バンド……？を、されてる方でしょうか？"
1009105-68 = "……？"
1009105-72 = "……え、私のこと？"
1009105-73 = "[s5] \"服装からして、多分。\"\n[s6] \"まあ、私たちしかいないし。\""
1009105-76 = "最近は、学生でデビューされる方も多いですからね。"
1009105-77 = "若いのに夢を持ち、しっかりと頑張られて……素敵です！"
1009105-78 = "となると、隣の方は……"
1009105-79 = "あ、この人は、その……"
1009105-80 = "せん――"
1009105-82 = "……専属マネージャーの方ですね！？"
1009105-86 = "……！？"
1009105-90 = "[ns7] \"……え？\"\n[ns8] \"なるほど。\""
1009105-94 = "あ、えっと……その……。"
1009105-95 = "それは、[ruby=あた]中[/ruby]らずとも遠からずというか……。"
1009105-96 = "……？"
1009105-97 = "……？？？"
1009105-98 = "お、おっとすみません、どうやら出しゃばってしまったようで……。"
1009105-99 = "失礼いたしました……。"
1009105-100 = "……。"
1009105-101 = "…………。"
1009105-102 = "で、では、こちらの方は……。"
1009105-103 = "[s9] \"えっと、私は……。\"\n[s10] \"こちらの生徒の……。\""
1009105-106 = "……専属の人です。"
1009105-108 = "[ns11] \"……？\"\n[ns12] \"カズサ？\""
1009105-111 = "専属です！#n私の専属マネージャーです！"
1009105-112 = "間違ってないので、大丈夫です！！"
1009105-116 = "……だよね？"
1009105-121 = "私専属……でしょ？"
1009105-126 = " （……一応イエスと答えた後、お店で最後のスイーツを購入した）"
1009105-127 = "（お店を出てよそ見をしているうちに、カズサはどこかに行ってしまった）"
