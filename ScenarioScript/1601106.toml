[translation]
1601106-1 = "Correção de Postura"
1601106-2 = "（No dia de folga seguinte ao que recebi a mensagem, decidi entrar em contato com Hasumi para nos exercitarmos juntos）"
1601106-3 = "（Ao chegar no pequeno ginásio do centro da cidade, vejo Hasumi, que já tinha chegado）"
1601106-7 = "Ah, Sensei. Estava à sua espera."
1601106-8 = "……Eh?"
1601106-9 = "Eu deveria ter chegado cedo, mas a Hasumi já está aqui……?"
1601106-10 = "……Fufu, eu estava ansiosa por este dia. #nEstou totalmente preparada."
1601106-11 = "[s1] \"Fico feliz em ouvir isso, mas…… preparada?\"\n[s2] \"Além de se exercitar, tem mais alguma coisa para fazer?\""
1601106-14 = "Como eu disse, nos reunimos hoje para resolver a falta de exercícios do Sensei no dia a dia……"
1601106-15 = "Pensei que poderíamos fazer alongamentos para relaxar o corpo, que costuma ficar tenso pelo trabalho de escritório…… #nAprendi várias formas de fazer isso enquanto organizava o Grande Festival Esportivo."
1601106-16 = "Não é nada profissional, mas se for algo simples, eu sei como manter a postura correta e como fazer os alongamentos."
1601106-17 = "Posso mostrar como se faz, corrigir sua postura…… gostaria de poder ensinar essas coisas."
1601106-18 = "Ah, mas não pense em mim como uma treinadora, ficaria feliz se visse isso apenas como uma extensão de nos exercitarmos juntos."
1601106-19 = "Aquele…… por acaso, isso foi um incômodo desnecessário……?"
1601106-20 = "[s3] \"De jeito nenhum! Conto com você.\"\n[s4] \"Meu corpo estava um pouco tenso ultimamente, então veio a calhar.\""
1601106-23 = "Fufu…… fico feliz em ouvir isso."
1601106-24 = "É que, como o Sensei disse outro dia que queria que eu \"cuidasse de você\", pensei que, com todo o respeito, poderia ser útil."
1601106-30 = "……Então, vamos começar com um alongamento leve."
1601106-47 = "（Depois disso, completei uma série de alongamentos leves seguindo o exemplo da Hasumi）"
1601106-51 = "Ah, Sensei…… poderia me dar um momento?"
1601106-52 = "Nessa posição…… sim, por favor, mantenha essa postura……"
1601106-53 = "Parece que você precisa abaixar um pouco mais o corpo……"
1601106-54 = "Eu vou segurar você, então,"
1601106-61 = "Assim……"
1601106-65 = "Aqui um pouco mais, assim……"
1601106-70 = "[ns5] \"……Ha, Hasumi……!?\"\n[ns6] （!?……Senti algo macio encostar em mim……!?）"
1601106-75 = "……Sensei, o que houve? #nAconteceu alguma coisa……?"
1601106-76 = "……Eh? Você consegue fazer sozinho, é?"
1601106-77 = "Se, será que eu coloquei força demais……? #nOu então……"
1601106-81 = "……Ah."
1601106-87 = "（Será que foi porque eu empurrei o Sensei……）"
1601106-88 = "（Estava pesado……? Mas o Sensei é tão gentil que não conseguiu dizer nada……?）"
1601106-94 = "[ns7] \"……Hasumi?\"\n[ns8] \"O que houve?\""
1601106-97 = "De, desculpe, Sensei! #nEu nunca tive a intenção de……!!"
1601106-98 = "Eh, você está bem? #nMa, mas……!"
1601106-99 = "……Agora é o contrário?"
1601106-100 = "O Sensei vai verificar a minha postura? #nEu, eu não me importo, mas……"
1601106-101 = "[s9] \"Não seria justo se só eu fosse verificado.\"\n[s10] \"Como combinamos de fazer juntos, vamos revezar.\""
1601106-104 = "Si, sim……"
1601106-105 = "Entendido. En, então, agora o Sensei vai me apoiar……"
1601106-106 = "Es, esticando as costas……"
1601106-112 = "En, então……"
1601106-113 = "Conto com…… você……"
1601106-117 = "Ha, ha……"
1601106-118 = "Já fizemos umas 3 séries, então……"
1601106-119 = "Vamos parar por aqui hoje?"
1601106-120 = "……Ah."
1601106-121 = "Peço perdão."
1601106-122 = "Não tínhamos combinado nada específico, mas acabei……"
1601106-123 = "……Eh, você achava que esse era o plano desde o início?"
1601106-124 = "I-isso é... bem...#nClaro que eu, se o Sensei estiver de acordo..."
1601106-128 = "……Hehe, é verdade."
1601106-129 = "Sim. Então, está decidido."
1601106-130 = "Muito obrigada... Sensei."
1601106-132 = "……De agora em diante, conto com você também."
