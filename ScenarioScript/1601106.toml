[translation]
1601106-1 = "姿勢矯正"
1601106-2 = "（連絡をもらった次の休みの日、ハスミに連絡して一緒に運動することにした）"
1601106-3 = "（下町の小さな体育館を訪ねると、先に着いていたハスミの姿が見える）"
1601106-7 = "あ、先生。お待ちしておりました。"
1601106-8 = "……え？"
1601106-9 = "早く来たはずなのにもうハスミがいる……？"
1601106-10 = "……ふふ、今日という日を楽しみにしていたので。#n準備も万全ですよ。"
1601106-11 = "[s1] \"それは良かったけど……準備？\"\n[s2] \"運動以外に、何かやることがあるの？\""
1601106-14 = "申し上げた通り、今日は先生の日頃の運動不足を解消するために集まったので……"
1601106-15 = "デスクワークで凝りがちな身体を十全にほぐせるストレッチなどができたらな、と#n……大運動会の進行をしながら、色々とやり方を学びましたので。"
1601106-16 = "本格的なものとまではいきませんが、簡単なものでしたら、私も正しい姿勢やストレッチの仕方がわかりますから。"
1601106-17 = "お手本をお見せしたり、姿勢を正したり……そういった事をお教えできたらと思います。"
1601106-18 = "ああ、でも。コーチという感じではなく、一緒に運動する延長のようなものだと思っていただけますと幸いです。"
1601106-19 = "その……もしかして、余計なお世話だったでしょうか……？"
1601106-20 = "[s3] \"そんな事はないよ！よろしくね。\"\n[s4] \"最近ちょっと身体が凝ってたから、ちょうどよかった。\""
1601106-23 = "ふふ……それなら良かったです。"
1601106-24 = "その、先日先生が「面倒を見て欲しい」と言ってくださったので、僭越ながらお役に立てたらと思いまして。"
1601106-30 = "……それでは、軽いストレッチから始めてみましょうか。"
1601106-47 = "（その後、ハスミのお手本通りに軽いストレッチを1セットこなした）"
1601106-51 = "あ、先生……少しよろしいでしょうか。"
1601106-52 = "その状態で……はい、そのままの姿勢をキープしていただいて……"
1601106-53 = "これは、身体をもうちょっと下げなければいけないようで……"
1601106-54 = "私が掴んでいますから、"
1601106-61 = "こうやって……"
1601106-65 = "ここをもう少し、こう……"
1601106-70 = "[ns5] \"……ハ、ハスミ……！？\"\n[ns6] （！？……何かやわらかいものが当たったような……！？）"
1601106-75 = "……先生、どうしました？#n何かありましたか……？"
1601106-76 = "……え？一人でも大丈夫、ですか？"
1601106-77 = "も、もしかして私が力を入れすぎてしまいましたか……？#nそれとも……。"
1601106-81 = "……あっ。"
1601106-87 = "（まさか、私が先生を押したから……）"
1601106-88 = "（重たかったとか……？でも、先生はお優しいから口に出せず……？）"
1601106-94 = "[ns7] \"……ハスミ？\"\n[ns8] \"どうしたの？\""
1601106-97 = "ご、ごめんなさい、先生！#n決してそういうつもりでは……！！"
1601106-98 = "え、大丈夫、ですか？#nで、でも……！"
1601106-99 = "……今度は逆？"
1601106-100 = "先生が私の姿勢を見てくださるんですか？#nわ、私はそれでも構いませんが……"
1601106-101 = "[s9] \"見てもらってばかりだと申し訳ないからね。\"\n[s10] \"一緒にやるって話だったから、順番にね。\""
1601106-104 = "は、はい……。"
1601106-105 = "わかりました。で、では今度は先生が私を支えてくださるという事で……。"
1601106-106 = "せ、背筋をのばして……。"
1601106-112 = "そ、それでは……。"
1601106-113 = "よろしく……お願いします……。"
1601106-117 = "はあ、はあ……。"
1601106-118 = "一応3セットくらいやったので……"
1601106-119 = "今日はここまでにしましょうか？"
1601106-120 = "……あっ。"
1601106-121 = "申し訳ありません。"
1601106-122 = "先の約束をしているわけじゃないのに、つい……。"
1601106-123 = "……え、元々そういう予定だと思っていた？"
1601106-124 = "そ、それは……その……#nもちろん私は、先生さえよろしければ……。"
1601106-128 = "……ふふ、そうですね。"
1601106-129 = "はい。それでは、そういうことで。"
1601106-130 = "ありがとうございます……先生。"
1601106-132 = "……これからも、どうぞよろしくお願い致しますね。"
