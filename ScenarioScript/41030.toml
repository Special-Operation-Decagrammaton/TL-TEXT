41030-128 = "Registro de Interrogatório: 977-R-3"
41030-130 = "Oficial Responsável: Academia Polícial Valkyrie, 1º Ano, Nemugaki Fubuki"
41030-132 = "Suspeita: Academia Especial SRT, 1º Ano, Kasumizawa Miyu"
41030-136 = "Huum……#nO seu nome é……"
41030-137 = "K-Kasumizawa Miyu……#nAluna do primeiro ano da Academia Especial SRT……#nNo Esquadrão RABBIT, a-a minha função é ser a franco-atiradora……"
41030-138 = "Tenho 15 anos, nasci no dia 12 de julho……#nM-Meu hobby……#nMeu hobby é colecionar pedrinhas."
41030-139 = "Tá, beleza, mas eu não precisava de tanto detalhe assim não……"
41030-140 = "O-O que vai acontecer comigo agora……?"
41030-141 = "V-Vocês vão me mandar pra uma sessão de tortura aterrorizante……?!"
41030-142 = "Vão me obrigar a escutar a mesma música na repetição o dia inteiro,#nou me fazer cócegas a noite inteira até eu enlouquecer……?!"
41030-143 = "P-P-Por favor, tenham piedade de mim!#nE-Eu conto tudo que eu sei, eu juro……!"
41030-144 = "Relaxa, a gente não vai fazer nada disso……"
41030-145 = "Mas já que você tá tão disposta a falar,#nseria legal se me explicasse o motivo de tudo.#nPor que recusaram a transferência para a Valkyrie e por que fizeram um motim#nlá no parque?"
41030-146 = "É-É que……#nEu fiquei com muito medo de se transferir……"
41030-147 = "Medo de quê……?#nEu acho que a nossa academia nem tem meninas baderneiras,#né bem de boa."
41030-148 = "Não, b-bem……#nNão é medo desse tipo……"
41030-149 = "É que……#nEu tenho medo……#nDe ter que fazer amigos……"
41030-150 = "Mesmo no Esquadrão RABBIT eu não sou lá tããão próxima de ninguém, mas……#nPelo menos a Miyako-chan cuida de mim de vez em quando……"
41030-151 = "Mas se eu tivesse que transferir pra um lugar totalmente novo……"
41030-152 = "Tudo voltaria pra estaca zero……#nAlguém tão apagada e invisível como eu……#nNinguém ia nem querer falar comigo……"
41030-153 = "Se o meu destino for acabar sofrendo com isso,#neu preferia mil vezes acabar morando na rua naquele parque……"
41030-154 = "……Que menina esquisita.#nVocê tem medo de interagir com pessoas novas?"
41030-155 = "E-Eu não diria medo de interagir……#nO meu medo……#nÉ ser esquecida pelas pessoas."
41030-156 = "O pensamento de que ninguém sequer reconheceria a minha existência……#nSó de imaginar, eu já……"
41030-157 = "Eu entrei na SRT justamente pra tentar consertar essa minha personalidade,#ne aí a academia fecha do nada……#nO que eu faço agora da minha vida……?"
41030-158 = "Hum, saquei qual é a sua……"
41030-159 = "Então por que você não entra logo no#nDepartamento de Segurança Comunitária com a gente?#nA prova de transferência pra lá é facinha e não tem muita gente lá no departamento."
41030-160 = "Provavelmente você não vai ser \"esquecida\".#nLá o trampo é bem de boa, quase não dá problema,#ne a gente quase nem lida com o público."
41030-161 = "É-É mesmo……?"
41030-162 = "Dá pra levar uma vida escolar quieta e pacífica sem cruzar com quase ninguém……?"
41030-163 = "Eita, espera, \"quase ninguém\" é forçar um pouco a barra."
41030-164 = "No Departamento de Segurança Comunitária,#nvocê vai ter que aturar um monte de morador vindo reclamar#nde problemas bobos o dia todo……"
41030-168 = "A-Ah……#nEntão não vai dar, cancela……"
41030-172 = "Kasumizawa"
41030-174 = "Miyu"
41030-178 = "Resultado:"
41030-180 = "INADEQUADA"
41030-188 = ""
41030-192 = "Registro de Interrogatório: 977-R-4"
41030-194 = "Oficial Responsável: Schale, Sensei [USERNAME]"
41030-196 = "Suspeita: Academia Especial SRT, 1º Ano, Tsukiyuki Miyako"
41030-200 = "……Ah, você."
41030-201 = "[s1] \"Miyako…… certo?\"\n[s2] \"Surpresa em me ver aqui?\""
41030-202 = "Isso quer dizer que o senhor será o responsável pelo meu interrogatório,#ncorreto?"
41030-203 = "……Sendo honesta, estou um pouco surpresa sim.#nNão esperava encontrar com o senhor tão cedo."
41030-204 = "Isso quer dizer que o senhor será o responsável pelo meu interrogatório,#ncorreto?"
41030-205 = "Não que faça muita diferença.#nO interrogador não muda o fato de que as minhas respostas#ncontinuarão as mesmas."
41030-206 = "Pode fazer as perguntas."
41030-207 = "[s] \"Como é que tá aí? Falta alguma coisa para o seu conforto?\""
41030-208 = "……Que tipo de pergunta sem sentido é essa para começar?"
41030-209 = "Não se preocupe com isso.#nE mesmo que eu estivesse sofrendo alguma violação,#neu estou aqui na condição de capturada.#nNão vou reclamar de nada."
41030-210 = "Ou então, isso faz parte do seu teatrinho?#nTentar ganhar a minha simpatia oferecendo melhores condições#ne tentar extrair informações com isso?"
41030-211 = "Se o seu objetivo é tentar me fazer mudar de ideia,#neu sugiro que desista desde já."
41030-212 = "Não importa o tipo de acordo que você queira tentar propor,#nos nossos sentimentos e lealdade pela SRT nunca vão mudar."
41030-213 = "[s] \"Entendi. Mudando um pouco de assunto, por que você odeia tanto a Valkyrie, Miyako?\""
41030-214 = "……Acho que o senhor está enganado sobre os meus motivos."
41030-215 = "Eu não recusei a transferência porque eu odeio a Academia Polícial Valkyrie em particular."
41030-216 = "Eu a recusei porque eu odeio ter que abandonar a SRT."
41030-217 = "[s] \"Entendi. Posso saber o porquê disso?\""
41030-218 = "……Porque a SRT possui um senso de \"Justiça\" que só existe lá#ne em nenhum outro lugar."
41030-219 = "[s] \"Justiça……\""
41030-220 = "Quando colocamos em palavras assim,#npode parecer um conceito difícil de entender."
41030-221 = "Mas tenho certeza que o senhor já ouviu muitas definições de \"Justiça\"#nem outros lugares."
41030-222 = "Sei que as outras academias têm seus próprios comitês e grupos punitivos……#ne aqui na Valkyrie também,#ntodas essas alunas acreditam cegamente que estão agindo em nome da#n\"Justiça\"."
41030-223 = "……Mas eu acredito,#nlá no fundo, que a justiça pregada por elas não é a \"Verdadeira Justiça\"."
41030-224 = "A \"Justiça\" é o caminho da retidão, baseado na lógica e na razão."
41030-225 = "Se ela é fundamentada na verdade absoluta,#nentão as regras dela não podem ser distorcidas por conveniência,#ndependendo de quem é o alvo ou da situação em si."
41030-226 = "Mas a triste realidade das forças de segurança em Kivotos#né que todas elas estão presas em suas próprias correntes de interesses e políticas internas.#nE o resultado de tanto conflito de interesse……#né que cada academia continuou distorcendo e moldando a sua própria visão de \"Justiça\"#npara justificar as suas próprias ações."
41030-227 = "A única exceção a essa regra era a Academia Especial SRT……#nEles eram a única força que existia livre de laços e interesses políticos.#nUma organização que executava friamente a justiça pela qual acreditava."
41030-228 = "Uma organização que aplicava uma justiça universal.#nA qualquer hora, em qualquer lugar,#ne independente do peso do nome do infrator,#nusando a mesma balança cega para todos."
41030-229 = "Foi exatamente esse ideal inabalável que me fez ansiar#npor estudar lá."
41030-230 = "Uma justiça forte e inquebrável."
41030-231 = "Mas, agora……#na Academia Especial SRT foi fechada……"
41030-232 = "Se eu pelo menos tivesse comandado um pouco melhor……#nSe eu tivesse ajudado as meninas a extraírem o verdadeiro potencial#ndelas……"
41030-233 = "[s] \"Pelo o que eu vi de longe, Miyako, você se esforçou ao máximo para proteger as suas companheiras……\""
41030-237 = "……Ouvir isso de alguém que mal conheço não muda muita coisa."
41030-238 = "Eu ouvir elogios do senhor agora não tem nenhum valor."
41030-239 = "Em uma fração de tempo ridícula,#no senhor soube exatamente como maximizar as poucas forças que o seu lado tinha#ne como desmoronar as nossas fraquezas mudando a maré da batalha.#nComparado a isso……"
41030-240 = "A minha capacidade de comando é completamente inútil……"
41030-241 = "[s] \"Você não precisa carregar o peso do mundo nas costas, sabia……?\""
41030-243 = "[s] \"……Mas mudando de assunto. Tem alguma coisa que você precise agora? Qualquer coisa mesmo, é só pedir.\""
41030-244 = "……Não temos mais nada pra conversar.#nE como eu já falei antes,#nnão tenho do que reclamar sobre as condições daqui."
41030-245 = "Mas, se é pra pedir alguma coisa……#nEu quero que o senhor revogue a ordem de fechamento da Academia Especial SRT."
41030-246 = "[s] \"Comprar essa briga sozinho e reverter tudo num estalar de dedos…… é um milagre que eu não posso te prometer agora.\""
41030-247 = "……Nesse caso, nós voltaremos a nos armar e lutar pela ressurreição da SRT."
41030-248 = "Enquanto não desistirmos,#no nome e o legado da SRT não desaparecerão."
41030-249 = "[s] \"……Mesmo sabendo que é uma guerra onde a chance de vitória beira o zero absoluto?\""
41030-250 = "Sim."
41030-253 = "Tsukiyuki"
41030-255 = "Miyako"
41030-259 = "Resultado:"
41030-261 = "PENDENTE"
