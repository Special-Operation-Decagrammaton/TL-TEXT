[translation]
41030-1 = "Episódio 3: As Circunstâncias de Cada Uma"
41030-3 = "Registro de Interrogatório: 977-R-1"
41030-5 = "Oficial Interrogador: Academia Valkyrie, 3º ano, Ogata Kanna"
41030-7 = "Suspeita: Academia SRT, 1º ano, Sorai Saki"
41030-12 = "Sala de Interrogatórios da Academia Valkyrie"
41030-14 = "……Nome."
41030-15 = "……"
41030-16 = "Diga seu nome!"
41030-17 = "……Você já sabe. Não precisa perguntar."
41030-18 = "Não autorizei perguntas."
41030-19 = "Vou repetir. Seu nome?"
41030-20 = "……Sorai Saki."
41030-21 = "Afiliação?"
41030-22 = "Academia SRT, Esquadrão RABBIT… era. Até vocês fecharem a escola."
41030-23 = "……Atitude interessante. Sabe em que situação está?"
41030-24 = "Não deve desconhecer meu apelido: a 'Cão Louco' da Academia Valkyrie."
41030-25 = "Acha que essa ameaça funciona comigo? Se pensa, que decepção."
41030-26 = "O treinamento da SRT inclui simulação de cativeiro. Não são poucos os casos com informações confidenciais."
41030-27 = "Não importa o que faça, se pensa que vai conseguir alguma informação, está enganada."
41030-31 = "……Li seu dossiê do Conselho Estudantil. Aparentemente, seu desempenho na SRT era excelente."
41030-32 = "Notas quase perfeitas nas provas escritas, sem problemas nas práticas."
41030-33 = "Nunca violou as regras da escola… uma aluna exemplar, sem dúvida."
41030-34 = "Então por que uma aluna como você se recusa a ser transferida para a Valkyrie e ainda organiza um protesto desses?"
41030-35 = "……A Academia Valkyrie e a SRT são diferentes."
41030-36 = "Não respondeu à pergunta."
41030-37 = "Na SRT, mesmo após as aulas, vivemos sob regras rigorosas."
41030-38 = "Acordamos no horário, arrumamos a cama, treinamos e estudamos. Depois da aula, continuamos a treinar e manter os equipamentos nos alojamentos. É a mentalidade de 'sempre em estado de alerta' que faz a SRT ser a SRT."
41030-39 = "……É diferente da Academia Valkyrie."
41030-40 = "Mesmo no Bureau de Segurança, o mais rígido, vocês podem usar roupas casuais após a aula, certo? Mesmo que seja para não intimidar os cidadãos."
41030-41 = "Eu não vivo assim. Prefiro ser um lobo orgulhoso na SRT do que um cão doméstico na Valkyrie."
41030-42 = "……Essa é a sua resposta?"
41030-43 = "……Mais uma pergunta."
41030-44 = "Durante o confronto, Kazekura destruiu o drone de transmissão. Naquela hora, ela desperdiçou munição sem necessidade."
41030-45 = "Por que não a impediu? Alguém do seu nível deveria saber o valor da munição numa defesa como aquela."
41030-46 = "Isso também faz parte do regulamento da SRT?"
41030-47 = "……"
41030-48 = "Não dava pra desperdiçar munição nos treinos… queria fazer pelo menos uma vez…"
41030-52 = "Sa"
41030-54 = "ki"
41030-60 = "Sa"
41030-62 = "ki"
41030-64 = "Inapta"
41030-68 = "Registro de Interrogatório: 977-R-2"
41030-70 = "Oficial Interrogador: Academia Valkyrie, 1º ano, Nakatsukasa Kirino"
41030-72 = "Suspeita: Academia SRT, 1º ano, Kazekura Moe"
41030-76 = "Ahm… Senhorita Kazekura Moe."
41030-77 = "Hmm?"
41030-78 = "Aliás, preciso saber, quanto tempo vai durar isso?"
41030-79 = "Pode acabar logo? Meus estoques de bala estão acabando."
41030-80 = "N-Não pode ser assim!"
41030-81 = "Estamos numa situação dessas e você falando de bala?"
41030-82 = "Se continuar com essa atitude, vou confiscar as balas que restam!"
41030-83 = "Que chatice…"
41030-84 = "Senhorita Kazekura, vou ser direta. Por que ocupou o parque? Por que não atendeu ao chamado da Valkyrie?"
41030-85 = "Se tivesse abandonado as armas e se rendido desde o início, a situação não teria chegado a esse ponto."
41030-86 = "……Não queria sair da SRT."
41030-87 = "E-Entendo… realmente, se me dissessem para 'sair da Academia Valkyrie' de repente, eu também ficaria em dúvida."
41030-88 = "As memórias com os companheiros… não dá para simplesmente descartar… Compreendo. Nesse ponto, podemos considerar circunstâncias atenuantes――"
41030-89 = "Não, isso tanto faz."
41030-90 = "Na verdade, queria mesmo era me livrar logo do Esquadrão RABBIT."
41030-91 = "A Saki vive resmungando, a Miyu não para de chorar…"
41030-92 = "E-então, por que não quer sair da SRT?"
41030-93 = "Ué, por causa do arsenal, oras!"
41030-94 = "B-bem, a Academia Valkyrie também tem armas…"
41030-95 = "Não, não, não! A Valkyrie não chega nem perto!"
41030-96 = "Mísseis capazes de queimar um quarteirão inteiro! Munição que atravessa blindagem de tanque!"
41030-97 = "Só na SRT eu posso usar uma artilharia dessas à vontade!"
41030-98 = "N-não é bem 'à vontade' que se deve usar…"
41030-99 = "(Falando nisso, ouvi dizer que ela uma vez destruiu meio quarteirão com tiros indiscriminados…)"
41030-100 = "A SRT também é uma organização para proteger os cidadãos, assim como a Valkyrie…"
41030-101 = "E mesmo assim, o que mais importa são as armas…"
41030-102 = "Senhorita Kazekura, quer dizer que a segurança dos cidadãos não importa?"
41030-103 = "Isso."
41030-107 = "……"
41030-111 = "Ka"
41030-113 = "ze"
41030-117 = "ku"
41030-121 = "ra"
41030-125 = "Inapta"
41030-128 = "Registro de Interrogatório: 977-R-3"
41030-130 = "Oficial Interrogador: Academia Valkyrie, 1º ano, Nemugaki Fubuki"
41030-132 = "Suspeita: Academia SRT, 1º ano, Kasumizawa Miyu"
41030-136 = "Ahm… seu nome é…"
41030-137 = "C-Kasumizawa Miyu… primeiro ano da SRT… atiradora do Esquadrão RABBIT…"
41030-138 = "15 anos, aniversário em 12 de julho… meu hobby é… catar pedras…"
41030-139 = "Não, não precisa dizer tudo isso…"
41030-140 = "O-que vai ser de mim…?"
41030-141 = "Vão me torturar…?"
41030-142 = "Tipo, me forçar a ouvir a mesma música o dia todo… cócegas a noite toda…"
41030-143 = "P-Por favor, me perdoa! Eu conto tudo que sei…!"
41030-144 = "Não, não vamos fazer nada disso…"
41030-145 = "Se vai contar, comece pelo motivo. Por que se recusou a ser transferida para a Valkyrie? Por que protestou naquele parque?"
41030-146 = "P-Porque… tenho medo…"
41030-147 = "Medo? Não vejo muito perigo na Valkyrie…"
41030-148 = "Não, não é isso…"
41030-149 = "Eu… tenho medo de me aproximar de outras pessoas…"
41030-150 = "No Esquadrão RABBIT também não somos muito chegadas… mas a Miyako-chan às vezes cuida de mim…"
41030-151 = "Mas se for transferida para um lugar novo…"
41030-152 = "Será tudo do zero… uma pessoa tão insignificante como eu… ninguém vai falar comigo…"
41030-153 = "Então, melhor dormir na rua do que…"
41030-154 = "…Que garota estranha. Medo de encontrar novas pessoas?"
41030-155 = "Não é bem o encontro… é o medo de ser esquecida."
41030-156 = "De não ser notada por ninguém… quando penso nisso…"
41030-157 = "Entrei na SRT para tentar mudar essa personalidade… mas a escola fechou… O que eu faço…?"
41030-158 = "Hmm…"
41030-159 = "Que tal vir para o nosso Departamento de Segurança da Vida? O teste de transferência não é difícil, e a seção não é muito grande."
41030-160 = "Acho que você não seria esquecida. Também é um lugar com poucos problemas e pouco contato com o público."
41030-161 = "S-Sério…?"
41030-162 = "Quase não vejo ninguém… posso ter uma vida escolar tranquila…?"
41030-163 = "Ah, 'quase ninguém' é impossível."
41030-164 = "O Departamento de Segurança da Vida recebe reclamações de toda parte…"
41030-168 = "Ah, então não dá…"
41030-172 = "Kasumi"
41030-174 = "zawa"
41030-178 = "Mi"
41030-180 = "yu"
41030-188 = "Inapta"
41030-192 = "Registro de Interrogatório: 977-R-4"
41030-194 = "Oficial Interrogador: Schale, Professor [USERNAME]"
41030-196 = "Suspeita: Academia SRT, 1º ano, Tsukiyuki Miyako"
41030-200 = "……Aquele dia."
41030-201 = "[s1] \"Você é a Miyako… né?\"\n[s2] \"Se assustou?\""
41030-202 = "Quer dizer que quem me interroga é o Professor."
41030-203 = "……Sinceramente, estou um pouco surpresa. Não imaginava que o senhor estaria aqui."
41030-204 = "Quer dizer que quem me interroga é o Professor."
41030-205 = "Bem, tanto faz. Seja quem for, minha resposta não muda."
41030-206 = "Pode perguntar o que quiser."
41030-207 = "[s] \"Viver lá… não está sendo difícil?\""
41030-208 = "……Uma pergunta estranha para começar."
41030-209 = "Não se preocupe. Mesmo que estivesse, não vou reclamar na condição de prisioneira."
41030-210 = "Ou será que o senhor está tentando extrair informações em troca de melhores condições?"
41030-211 = "Se pensa em me fazer mudar de ideia, é melhor desistir."
41030-212 = "Não importa o que ofereçam, meus sentimentos pela SRT não mudam."
41030-213 = "[s] \"Entendo. Então me diga, Miyako, você odeia a Valkyrie?\""
41030-214 = "……Acho que o senhor está enganado."
41030-215 = "Não é que eu odeie a Valkyrie. Recusei a transferência porque não quero deixar a SRT."
41030-216 = "O que eu odeio é a ideia de abandonar a SRT."
41030-217 = "[s] \"Entendo. Posso saber o motivo?\""
41030-218 = "……Porque na SRT existe uma 'justiça' que não se encontra em nenhum outro lugar."
41030-219 = "[s] \"Justiça…\""
41030-220 = "É um conceito complicado."
41030-221 = "Mas o senhor também deve ter suas noções sobre 'justiça'."
41030-222 = "Sei que outras escolas também têm grupos similares… a Valkyrie, acredito, também age na crença de que suas ações são 'justas'."
41030-223 = "……Mas para mim, a justiça delas não é a 'verdadeira justiça'."
41030-224 = "'Justiça' é o que é certo e racional."
41030-225 = "E o que é certo deve ser baseado na verdade. Portanto, não pode mudar conforme a situação ou o interlocutor."
41030-226 = "No entanto, as organizações de segurança em Kivotos estão inseridas em diversos interesses. Com isso, continuam a distorcer a 'justiça' conforme lhes convém."
41030-227 = "Mas a SRT… não era afetada por relações ou interesses entre escolas. Executava sua própria justiça."
41030-228 = "Uma organização que busca uma única justiça, a qualquer hora, em qualquer lugar, seja quem for…"
41030-229 = "Eu admirava a SRT."
41030-230 = "Aquela justiça robusta, inabalável."
41030-231 = "Mas a SRT foi fechada…"
41030-232 = "Se eu tivesse sido um pouco mais competente… se tivesse usado melhor as habilidades delas…"
41030-233 = "[s] \"Pelo que ouvi, você se esforçou bastante…\""
41030-237 = "……Não adianta ouvir isso de um praticamente estranho."
41030-238 = "Não importa o quanto o senhor me elogie."
41030-239 = "Naquela ocasião, o senhor maximizou os pontos fortes dos seus em pouco tempo e explorou as nossas fraquezas, mudando o rumo do combate. Em comparação…"
41030-240 = "Eu não consegui fazer nada direito…"
41030-241 = "[s] \"Não precisa se culpar tanto…\""
41030-243 = "[s] \"…Mudando de assunto, precisa de alguma coisa? Algum desejo?\""
41030-244 = "……Não tenho mais nada a dizer. Como eu disse, não tenho queixas."
41030-245 = "Sequer, que revoguem a ordem de fechamento da SRT?"
41030-246 = "[s] \"Só eu, agora, não posso fazer nada…\""
41030-247 = "……Então continuaremos lutando. Pela restauração da SRT."
41030-248 = "Enquanto não desistirmos, o nome da SRT não desaparecerá."
41030-249 = "[s] \"……Mesmo que as chances sejam mínimas?\""
41030-250 = "Sim."
41030-253 = "Tsuki"
41030-255 = "Yuki"
41030-259 = "Mi"
41030-261 = "ya"
41030-263 = "ko"
41030-267 = "Pendente"
41030-270 = "Escritório do Bureau de Segurança Pública, Academia Valkyrie"
41030-271 = "……Acima, o registro de hoje."
41030-272 = "Agradeço a colaboração, Professor, mesmo estando ocupado. Isso nos poupou trabalho."
41030-273 = "[s] \"E essas meninas, o que vai acontecer com elas?\""
41030-274 = "Após um período de detenção, a princípio, recomendaríamos a transferência para a Valkyrie…"
41030-275 = "Mas o Conselho Estudantil está exigindo uma punição mais severa, devido à gravidade do incidente."
41030-276 = "No pior dos casos, podem ficar sem vaga em escola alguma…"
41030-277 = "[s] \"A restauração da SRT é mesmo impossível?\""
41030-278 = "……Primeiro, não concordo em ceder às exigências delas."
41030-279 = "De qualquer forma, o 'fechamento da SRT' é uma decisão do Conselho Estudantil. Alguém como eu não pode questionar… e mesmo a Schale, com seus 'poderes extrajudiciais', teria dificuldade."
41030-280 = "Mesmo a Schale, com seus 'poderes extrajudiciais', teria dificuldade."
41030-281 = "[s] \"Então… se eu falar com alguém do Conselho…?\""
41030-282 = "Isso, eu não posso afirmar…"
41030-283 = "Bem, então deixe que eu respondo."
41030-284 = "E-essa voz…"
41030-291 = "Prazer em conhecê-lo… Professor."
41030-292 = "Sou Kaya, do Escritório de Defesa do Conselho Estudantil de Kivotos."
41030-294 = "Próximo Episódio: Circunstâncias de Outro Lado"