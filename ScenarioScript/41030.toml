41030-128 = "Registro de Interrogatório: 977-R-3"
41030-130 = "Oficial Responsável: Academia de Polícia Valkyrie, 1º Ano, Nemugaki Fubuki"
41030-132 = "Suspeita: Academia Especial SRT, 1º Ano, Kasumizawa Miyu"
41030-136 = "Huum... O seu nome é..."
41030-137 = "K-Kasumizawa Miyu... Aluna do primeiro ano da Academia Especial SRT... No Esquadrão RABBIT, a-a minha função é ser a franco-atiradora..."
41030-138 = "Tenho 15 anos, nasci no dia 12 de julho... M-Meu hobby... Meu hobby é colecionar pedrinhas."
41030-139 = "Tá, beleza, mas eu não precisava de tanto detalhe assim não..."
41030-140 = "O-O que vai acontecer comigo agora...?"
41030-141 = "V-Vocês vão me mandar pra uma sessão de tortura aterrorizante...?!"
41030-142 = "Vão me obrigar a escutar a mesma música na repetição o dia inteiro, ou me fazer cócegas a noite inteira até eu enlouquecer...?!"
41030-143 = "P-P-Por favor, tenham piedade de mim! E-Eu conto tudo que eu sei, eu juro...!"
41030-144 = "Relaxa, a gente não vai fazer nada disso..."
41030-145 = "Mas já que você tá tão disposta a falar, seria legal se me explicasse o motivo de tudo. Por que recusaram a transferência para a Valkyrie e por que fizeram um motim lá no parque?"
41030-146 = "É-É que... Eu fiquei com muito medo de se transferir..."
41030-147 = "Medo de quê...? Eu acho que a nossa academia nem tem meninas baderneiras, é bem de boa."
41030-148 = "Não, b-bem... Não é medo desse tipo..."
41030-149 = "É que... Eu tenho medo... De ter que fazer amigos..."
41030-150 = "Mesmo no Esquadrão RABBIT eu não sou lá tããão próxima de ninguém, mas... Pelo menos a Miyako-chan cuida de mim de vez em quando..."
41030-151 = "Mas se eu tivesse que transferir pra um lugar totalmente novo..."
41030-152 = "Tudo voltaria pra estaca zero... Alguém tão apagada e invisível como eu... Ninguém ia nem querer falar comigo..."
41030-153 = "Se o meu destino for acabar sofrendo com isso, eu preferia mil vezes acabar morando na rua naquele parque..."
41030-154 = "……Que menina esquisita. Você tem medo de interagir com pessoas novas?"
41030-155 = "E-Eu não diria medo de interagir... O meu medo... É ser esquecida pelas pessoas."
41030-156 = "O pensamento de que ninguém sequer reconheceria a minha existência... Só de imaginar, eu já..."
41030-157 = "Eu entrei na SRT justamente pra tentar consertar essa minha personalidade, e aí a academia fecha do nada... O que eu faço agora da minha vida...?"
41030-158 = "Hum, saquei qual é a sua..."
41030-159 = "Então por que você não entra logo no Departamento de Segurança Comunitária com a gente? A prova de transferência pra lá é facinha e não tem muita gente lá no departamento."
41030-160 = "Provavelmente você não vai ser \"esquecida\". Lá o trampo é bem de boa, quase não dá problema, e a gente quase nem lida com o público."
41030-161 = "É-É mesmo...?"
41030-162 = "Dá pra levar uma vida escolar quieta e pacífica sem cruzar com quase ninguém...?"
41030-163 = "Eita, espera, \"quase ninguém\" é forçar um pouco a barra."
41030-164 = "No Departamento de Segurança Comunitária, você vai ter que aturar um monte de morador vindo reclamar de problemas bobos o dia todo..."
41030-168 = "A-Ah... Então não vai dar, cancela..."
41030-172 = "Kasumizawa"
41030-174 = "Miyu"
41030-178 = "Resultado:"
41030-180 = "INADEQUADA"
41030-188 = ""
41030-192 = "Registro de Interrogatório: 977-R-4"
41030-194 = "Oficial Responsável: Schale, Sensei [USERNAME]"
41030-196 = "Suspeita: Academia Especial SRT, 1º Ano, Tsukiyuki Miyako"
41030-200 = "……Ah, você."
41030-201 = "[s1] \"Miyako... certo?\"\n[s2] \"Surpresa em me ver aqui?\""
41030-202 = "Isso quer dizer que o senhor será o responsável pelo meu interrogatório, correto?"
41030-203 = "……Sendo honesta, estou um pouco surpresa sim. Não esperava encontrar com o senhor tão cedo."
41030-204 = "Isso quer dizer que o senhor será o responsável pelo meu interrogatório, correto?"
41030-205 = "Não que faça muita diferença. O interrogador não muda o fato de que as minhas respostas continuarão as mesmas."
41030-206 = "Pode fazer as perguntas."
41030-207 = "[s] \"Como está sendo aí? Falta alguma coisa pro seu conforto?\""
41030-208 = "……Que tipo de pergunta sem sentido é essa para começar?"
41030-209 = "Não se preocupe com isso. E mesmo que eu estivesse sofrendo alguma violação, eu estou aqui na condição de capturada. Não vou reclamar de nada."
41030-210 = "Ou então, isso faz parte do seu teatrinho? Tentar ganhar a minha simpatia oferecendo melhores condições e tentar extrair informações com isso?"
41030-211 = "Se o seu objetivo é tentar me fazer mudar de ideia, eu sugiro que desista desde já."
41030-212 = "Não importa o tipo de acordo que você queira tentar propor, os nossos sentimentos e lealdade pela SRT nunca vão mudar."
41030-213 = "[s] \"Entendi. Mudando um pouco de assunto, por que você odeia tanto a Valkyrie, Miyako?\""
41030-214 = "……Acho que o senhor está enganado sobre os meus motivos."
41030-215 = "Eu não recusei a transferência porque eu odeio a Academia de Polícia Valkyrie em particular."
41030-216 = "Eu a recusei porque eu odeio ter que abandonar a SRT."
41030-217 = "[s] \"Saquei. Posso saber o porquê disso?\""
41030-218 = "……Porque a SRT possui um senso de \"Justiça\" que só existe lá e em nenhum outro lugar."
41030-219 = "[s] \"'Justiça'...\""
41030-220 = "Quando colocamos em palavras assim, pode parecer um conceito difícil de entender."
41030-221 = "Mas tenho certeza que o senhor já ouviu muitas definições de \"Justiça\" em outros lugares."
41030-222 = "Sei que as outras academias têm seus próprios comitês e grupos punitivos... e aqui na Valkyrie também, todas essas alunas acreditam cegamente que estão agindo em nome da \"Justiça\"."
41030-223 = "……Mas eu acredito, lá no fundo, que a justiça pregada por elas não é a \"Verdadeira Justiça\"."
41030-224 = "A \"Justiça\" é o caminho da retidão, baseado na lógica e na razão."
41030-225 = "Se ela é fundamentada na verdade absoluta, então as regras dela não podem ser distorcidas por conveniência, dependendo de quem é o alvo ou da situação em si."
41030-226 = "Mas a triste realidade das forças de segurança em Kivotos é que todas elas estão presas em suas próprias correntes de interesses e políticas internas. E o resultado de tanto conflito de interesse... é que cada academia continuou distorcendo e moldando a sua própria visão de \"Justiça\" para justificar as suas próprias ações."
41030-227 = "A única exceção a essa regra era a Academia Especial SRT... Eles eram a única força que existia livre de laços e interesses políticos. Uma organização que executava friamente a justiça pela qual acreditava."
41030-228 = "Uma organização que aplicava uma justiça universal. A qualquer hora, em qualquer lugar, e independente do peso do nome do infrator, usando a mesma balança cega para todos."
41030-229 = "Foi exatamente esse ideal inabalável que me fez ansiar por estudar lá."
41030-230 = "Uma justiça forte e inquebrável."
41030-231 = "Mas, agora... a Academia Especial SRT foi fechada..."
41030-232 = "Se eu pelo menos tivesse comandado um pouco melhor... Se eu tivesse ajudado as meninas a extraírem o verdadeiro potencial delas..."
41030-233 = "[s] \"Pelo que vi de longe, Miyako, você se esforçou ao máximo para proteger as suas companheiras...\""
41030-237 = "……Eu ouvir isso de alguém que mal conheço não muda muita coisa."
41030-238 = "Eu ouvir elogios do senhor agora não tem nenhum valor."
41030-239 = "Em uma fração de tempo ridícula, o senhor soube exatamente como maximizar as poucas forças que o seu lado tinha e como desmoronar as nossas fraquezas mudando a maré da batalha. Comparado a isso..."
41030-240 = "A minha capacidade de comando é completamente inútil..."
41030-241 = "[s] \"Você não precisa carregar o peso do mundo nas costas, sabia...?\""
41030-243 = "[s] \"……Mas mudando de assunto. Tem alguma coisa que você precise agora? Qualquer coisa mesmo, é só pedir.\""
41030-244 = "……Não temos mais nada pra conversar. E como eu já falei antes, não tenho do que reclamar sobre as condições daqui."
41030-245 = "Mas, se é pra exigir alguma coisa... Eu quero que o senhor revogue a ordem de fechamento da Academia Especial SRT."
41030-246 = "[s] \"Comprar essa briga sozinho e reverter tudo num estalar de dedos... é um milagre que eu não posso te prometer agora.\""
41030-247 = "……Nesse caso, nós voltaremos a nos armar e lutar pela ressurreição da SRT."
41030-248 = "Enquanto não desistirmos, o nome e o legado da SRT não desaparecerão."
41030-249 = "[s] \"……Mesmo sabendo que é uma guerra onde a chance de vitória beira o zero absoluto?\""
41030-250 = "Sim."
41030-253 = "Tsukiyuki"
41030-255 = "Miyako"
41030-259 = "Resultado:"
41030-261 = "PENDENTE"
41030-263 = ""
41030-267 = ""
41030-270 = "Academia de Polícia Valkyrie - Escritório do Departamento de Ordem Pública"
41030-271 = "……E esses são os registros finais das nossas entrevistas com elas."
41030-272 = "Novamente, muito obrigada pela cooperação, mesmo sendo um homem tão ocupado, Sensei. Graças à sua presença as coisas se resolveram com muito mais facilidade."
41030-273 = "[s] \"O que vai acontecer com elas agora?\""
41030-274 = "Normalmente, após um período de confinamento preventivo, o procedimento seria forçá-las a aceitarem a transferência para a Valkyrie novamente, mas..."
41030-275 = "O Conselho Estudantil Geral enviou pedidos severos para lidar com elas de forma rígida, então acredito que a punição será expedida por lá, e não por nós. E levando em consideração o caos e os danos colaterais que elas causaram hoje, acredito que a sentença não será gentil."
41030-276 = "No pior dos cenários, a ficha delas pode ficar suja a ponto de nenhuma outra academia de Kivotos aceitar a matrícula delas..."
41030-277 = "[s] \"E a restauração da Academia Especial SRT, é algo impossível mesmo?\""
41030-278 = "……Sendo honesta com você, a simples ideia de aceitar as exigências que elas fizeram no parque já não me agrada em nada."
41030-279 = "Mas independente da minha opinião pessoal, o \"Fechamento da SRT\" foi um decreto absoluto do Conselho Estudantil Geral. Uma oficial do meu nível hierárquico não tem nenhum poder de voz contra algo assim, então..."
41030-280 = "E, acredito eu, mesmo que a Schale ostente sua \"autoridade acima da lei\", tentar bater de frente com esse decreto ainda seria muito difícil."
41030-281 = "[s] \"Então, e se eu tentar conversar com alguma das figurões do Conselho Estudantil Geral...?\""
41030-282 = "Não sei dizer como você se sairia com elas..."
41030-283 = "Bem, eu acho que posso te responder a isso."
41030-284 = "E-Essa voz..."
41030-291 = "Essa é a nossa primeira vez nos encontrando, correto, Sensei?"
41030-292 = "Eu sou a Chefe do Escritório de Defesa do Conselho Estudantil Geral de Kivotos, Kaya."
41030-294 = "Próximo Episódio: Por Trás dos Bastidores"#Circunstâncias de Outro Lado