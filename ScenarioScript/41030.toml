[translation]
41030-1 = "Episódio 3: Motivos Individuais"
41030-3 = "Registro de Interrogatório: 977-R-1"
41030-5 = "Responsável: Academia de Polícia Valkyrie, 3º ano, Ogata Kanna"
41030-7 = "Suspeita: Academia SRT, 1º ano, Sorai Saki"
41030-12 = "Academia de Polícia Valkyrie - Sala de Interrogatório"
41030-14 = "……Qual é o seu nome?"
41030-15 = "……."
41030-16 = "Diga o seu nome!"
41030-17 = "……Você já sabe, precisa mesmo perguntar?"
41030-18 = "Não permiti perguntas."
41030-19 = "Vou perguntar mais uma vez, qual é o seu nome?"
41030-20 = "……Sorai Saki."
41030-21 = "Qual é a sua afiliação?"
41030-22 = "Academia SRT, Esquadrão RABBIT…… era. Até vocês fecharem a escola por conta própria."
41030-23 = "……Bela atitude. Você entende a sua situação?"
41030-24 = "O fato de eu ser chamada de 'Cão Raivoso' da Academia de Polícia Valkyrie…… você não desconhece isso, certo?"
41030-25 = "Acha mesmo que esse tipo de ameaça funciona comigo agora? Se pensa assim, estou decepcionada."
41030-26 = "O treinamento na SRT inclui simulações para quando somos capturadas. O manuseio de informações confidenciais não é algo raro."
41030-27 = "Não importa o que você faça, achar que vai conseguir tirar alguma informação de mim é um grande erro."
41030-31 = "……Li os documentos do Conselho Estudantil Federal. Parece que você tinha notas excelentes, mesmo dentro da SRT."
41030-32 = "Quase gabaritou as provas escritas e não teve problemas nas práticas de exercícios."
41030-33 = "Na escola, nunca cometeu uma única violação do regulamento…… você é, sem dúvida, uma aluna exemplar."
41030-34 = "Por que alguém como você recusou a transferência para Valkyrie e causou uma manifestação?"
41030-35 = "……A Academia de Polícia Valkyrie é diferente da Academia SRT."
41030-36 = "Isso não é uma resposta."
41030-37 = "Na Academia SRT, vivemos sob regras rigorosas mesmo depois do horário de aula."
41030-38 = "Acordamos em horários fixos, arrumamos a cama e seguimos com o treinamento e as aulas teóricas do dia. Mesmo após o horário, espera-se que continuemos treinando e fazendo manutenção sem baixar a guarda no dormitório. Essa mentalidade de estar sempre no campo de batalha é a razão de ser da SRT."
41030-39 = "……É diferente da Academia de Polícia Valkyrie."
41030-40 = "Mesmo no Departamento de Segurança Pública, que dizem ser o mais rigoroso com a disciplina, vocês podem usar roupas civis e fazer o que quiserem depois da aula, não é? Mesmo que a desculpa seja para não deixar os cidadãos tensos."
41030-41 = "Eu não vou viver desse jeito. Em vez de me tornar um cão que recebe liberdade de bandeja, prefiro viver com orgulho como um lobo, mesmo em um ambiente rigoroso."
41030-42 = "……Essa é a sua resposta?"
41030-43 = "……Vou perguntar mais uma coisa."
41030-44 = "Durante o combate, Kazekura destruiu o drone de transmissão. Naquela hora, você desperdiçou munição sem motivo algum."
41030-45 = "Por que não a impediu? Sendo uma aluna exemplar como você, deveria saber o quanto a munição é valiosa em batalhas defensivas, não deveria?"
41030-46 = "Isso também fazia parte de algum tipo de disciplina da SRT?"
41030-47 = "……."
41030-48 = "No treinamento, não podíamos desperdiçar munição, então eu só queria tentar fazer isso uma vez……."
41030-52 = "So"
41030-54 = "rai"
41030-60 = "Sa"
41030-62 = "ki"
41030-64 = "Inapta"
41030-68 = "Registro de Interrogatório: 977-R-2"
41030-70 = "Responsável: Academia de Polícia Valkyrie, 1º ano, Nakatsukasa Kirino"
41030-72 = "Suspeita: Academia SRT, 1º ano, Kazekura Moe"
41030-76 = "Bem…… Kazekura Moe-san."
41030-77 = "Hmm?"
41030-78 = "Na verdade, eu queria saber, quanto tempo isso vai durar?"
41030-79 = "Não dá para terminar logo? Minhas balas de reserva estão acabando."
41030-80 = "I-Isso não é possível!"
41030-81 = "É hora de ficar falando de balas nesta situação?"
41030-82 = "Se continuar com essa atitude, vou confiscar essas balas que sobraram também!"
41030-83 = "Que saco..."
41030-84 = "Kazakura-san, serei direta. Por que você ocupou o parque naquela época? Por que não respondeu ao chamado da Valkyrie?"
41030-85 = "Se tivesse largado as armas e se rendido pacificamente desde o início, a situação não teria chegado a esse ponto."
41030-86 = "...Porque eu não queria sair da SRT."
41030-87 = "E-entendo... De fato, se eu recebesse ordens repentinas para 'sair da Academia de Polícia Valkyrie', eu também ficaria preocupada."
41030-88 = "As memórias com os companheiros que compartilharam alegrias e tristezas... não é algo que se possa descartar facilmente. Entendido. Quanto a esse ponto, considerarei atenuantes..."
41030-89 = "Não, na verdade, isso não importa nem um pouco."
41030-90 = "Na verdade, eu queria é me livrar logo daquele Esquadrão RABBIT."
41030-91 = "A Saki vive reclamando de tudo e a Miyu chora por qualquer coisa..."
41030-92 = "E-então, por que você não queria deixar a SRT...?"
41030-93 = "Ora, é claro que é por causa daquela quantidade enorme de armas!"
41030-94 = "A-armas? A Academia de Polícia Valkyrie também tem várias, mas..."
41030-95 = "Não, não, não! O nível é completamente diferente da Valkyrie!"
41030-96 = "Mísseis capazes de incinerar um quarteirão inteiro, munições que ignoram a blindagem de tanques...!"
41030-97 = "Só na Academia SRT você pode usar um poder de fogo tão destrutivo à vontade!"
41030-98 = "N-não, mesmo na Academia SRT, você não pode usar 'à vontade'!"
41030-99 = "(Pensando bem, ouvi dizer que ela quase destruiu um centro comercial com disparos indiscriminados uma vez...)"
41030-100 = "A SRT, assim como a Valkyrie, é uma organização feita para proteger a segurança dos cidadãos, não é...?"
41030-101 = "E mesmo assim, dizer que as armas são o mais importante..."
41030-102 = "Kazakura-san, você está dizendo que a segurança dos cidadãos não importa para você!?"
41030-103 = "Sim."
41030-107 = "..."
41030-111 = "Ka"
41030-113 = "zakura"
41030-117 = "Mo"
41030-121 = "e"
41030-125 = "Inapta"
41030-128 = "Registro de Interrogatório: 977-R-3"
41030-130 = "Responsável: Nemugaki Fubuki, 1º ano da Academia de Polícia Valkyrie"
41030-132 = "Suspeita: Kasumizawa Miyu, 1º ano da Academia SRT"
41030-136 = "Bem, qual é o seu nome..."
41030-137 = "Ka-Kasumizawa Miyu. Sou do 1º ano da Academia SRT... e no Esquadrão RABBIT, sou a atiradora de elite..."
41030-138 = "Tenho 15 anos, meu aniversário é 12 de julho... e meu h-hobby é procurar pedrinhas..."
41030-139 = "Não, não precisa de tanto detalhe..."
41030-140 = "O-o que vai acontecer comigo agora...?"
41030-141 = "Será que vou sofrer torturas terríveis...!?"
41030-142 = "Como ser obrigada a ouvir a mesma música o dia todo, ou ser feita de cócegas a noite inteira...!"
41030-143 = "P-por favor, me perdoe! Eu vou contar tudo o que sei...!"
41030-144 = "Não, não vou fazer nada disso..."
41030-145 = "Se você vai falar, eu gostaria que explicasse o motivo primeiro. Por que recusou a transferência para a Valkyrie e por que fez aquela manifestação no parque?"
41030-146 = "A-a transferência, é que... eu estava com medo..."
41030-147 = "Medo? Não acho que nossa escola tenha muitos delinquentes, sabe?"
41030-148 = "Não, não é nesse sentido..."
41030-149 = "Eu... tenho medo de tentar me aproximar de alguém..."
41030-150 = "Mesmo no Esquadrão RABBIT atual, não somos tão próximas assim... embora a Miyako-chan cuide de mim de vez em quando..."
41030-151 = "Mas se eu tivesse que me transferir para um lugar novo..."
41030-152 = "Tudo teria que começar do zero... e ninguém falaria com alguém tão apagada quanto eu..."
41030-153 = "Se for para passar por isso, prefiro mil vezes ficar acampada no parque..."
41030-154 = "……Você é uma criança estranha. Tem medo de conhecer pessoas novas?"
41030-155 = "Não diria que tenho medo de conhecê-las... tenho medo de ser esquecida pelas pessoas."
41030-156 = "Se ninguém mais me reconhecesse... só de pensar nisso, eu já..."
41030-157 = "Eu entrei na SRT justamente para mudar esse meu jeito, mas agora que a escola foi fechada... o que eu deveria fazer?"
41030-158 = "Entendo..."
41030-159 = "Então, por que não vem para o nosso Departamento de Segurança Pública? O exame de transferência não é difícil e não somos tantas pessoas assim."
41030-160 = "Acho que não teria esse risco de ser esquecida. É um departamento com poucos problemas e você não precisa lidar com tanta gente."
41030-161 = "S-sério...?"
41030-162 = "Viver uma vida escolar tranquila, quase sem encontrar ninguém...?"
41030-163 = "Bem, o \"quase sem encontrar ninguém\" acho que não vai rolar."
41030-164 = "O Departamento de Segurança Pública recebe reclamações de vários cidadãos, afinal..."
41030-168 = "Ah, então não dá..."
41030-172 = "Kasumi"
41030-174 = "Sawa"
41030-178 = "Mi"
41030-180 = "Yuko"
41030-188 = "Inapta"
41030-192 = "Registro de Interrogatório: 977-R-4"
41030-194 = "Responsável: Sensei [USERNAME] do Schale"
41030-196 = "Suspeita: Miyako Tsukiyuki, 1º ano da Academia Especial SRT"
41030-200 = "……Aquela pessoa de antes."
41030-201 = "[s1] \"Miyako... né?\"\n[s2] \"Ficou surpresa?\""
41030-202 = "Então, o responsável pelo interrogatório é o sensei."
41030-203 = "……Para ser sincera, fiquei um pouco surpresa. Não esperava que o sensei estivesse aqui."
41030-204 = "Então, o responsável pelo interrogatório é o sensei."
41030-205 = "Bem, não importa quem seja. Não importa com quem eu esteja falando, minhas respostas não mudarão."
41030-206 = "Se tiver algo que queira perguntar, pode falar."
41030-207 = "[s] \"Como está sendo a vida aí? Tem algum problema ou algo do tipo?\""
41030-208 = "……Que pergunta estranha para começar."
41030-209 = "Não se preocupe. Mesmo que houvesse, não pretendo dizer nada na minha posição de prisioneira."
41030-210 = "Ou será que é isso? Está tentando extrair informações em troca de melhorar minhas condições?"
41030-211 = "Se está tentando me fazer mudar de ideia, é melhor desistir."
41030-212 = "Não importa o que me proponham, nossos sentimentos pela SRT não mudarão."
41030-213 = "[s] \"Entendi. Mas, mudando de assunto, Miyako, você odeia a Valkyrie?\""
41030-214 = "……Acho que você está entendendo algo errado."
41030-215 = "Eu não recusei a transferência porque odeio a Valkyrie."
41030-216 = "O que eu odeio é ter que deixar a SRT."
41030-217 = "[s] \"Entendo. Posso saber o motivo?\""
41030-218 = "……Porque a SRT possui uma \"justiça\" que só existe lá."
41030-219 = "[s] \"\"Justiça\"...\""
41030-220 = "É um conceito difícil de explicar de repente."
41030-221 = "Mas o sensei também deve ter oportunidades de ouvir sobre a \"justiça\"."
41030-222 = "Ouvi dizer que outras academias também possuem grupos assim... e imagino que aqui na Valkyrie, as alunas também acreditem que suas ações são \"justiça\"."
41030-223 = "……Mas, para mim, a justiça delas não é a \"verdadeira justiça\"."
41030-224 = "\"Justiça\" é a razão correta e lógica."
41030-225 = "Essa razão é baseada na verdade. Sendo assim, ela não deveria mudar dependendo do oponente ou da situação."
41030-226 = "No entanto, as organizações de segurança em Kivotos estão envolvidas em diversos interesses. Como resultado, elas continuam distorcendo o que chamam de \"justiça\" para seus próprios fins."
41030-227 = "Mas apenas a Academia Especial SRT... não se deixava levar por relações entre academias ou problemas de interesses, e executava a justiça em que acreditava."
41030-228 = "Uma organização que busca uma única justiça, sem escolher tempo ou lugar, e tratando todos com o mesmo padrão..."
41030-229 = "Foi por essa Academia Especial SRT que eu me apaixonei."
41030-230 = "A essa justiça tão inflexível."
41030-231 = "No entanto, a Academia SRT foi fechada..."
41030-232 = "Se eu tivesse feito um trabalho melhor... se eu tivesse conseguido extrair o potencial delas corretamente..."
41030-233 = "[s] \"Pelo que ouvi, acho que a Miyako se esforçou bastante...\""
41030-237 = "...Dizer isso para alguém que você mal conhece não ajuda em nada."
41030-238 = "Não adianta nada ouvir elogios assim vindos do Sensei."
41030-239 = "Naquela época, o Sensei maximizou os pontos fortes dos seus aliados em pouco tempo e mudou o curso da batalha explorando nossas fraquezas. Comparado a isso..."
41030-240 = "Eu não consegui fazer nada direito..."
41030-241 = "[s] \"Você não precisa se culpar tanto assim...?\""
41030-243 = "[s] \"...Mudando de assunto, você precisa de alguma coisa? Algum item que queira?\""
41030-244 = "...Não tenho mais nada a dizer. Como eu disse antes, não tenho reclamações."
41030-245 = "Se for para insistir em algo, eu gostaria que revogassem a ordem de fechamento da Academia SRT, é possível?"
41030-246 = "[s] \"Sozinho, é um pouco difícil resolver isso agora...\""
41030-247 = "...Então continuaremos lutando pela restauração da Academia SRT."
41030-248 = "Enquanto não desistirmos, o nome da SRT não desaparecerá."
41030-249 = "[s] \"...Mesmo que as chances de vitória sejam mínimas?\""
41030-250 = "Sim."
41030-253 = "Tsuki"
41030-255 = "Yuki"
41030-259 = "Mi"
41030-261 = "Ya"
41030-263 = "Ko"
41030-267 = "Pendente"
41030-270 = "Escola Valkyrie - Escritório do Departamento de Segurança Pública"
41030-271 = "...Isso é tudo sobre o registro desta vez."
41030-272 = "Obrigada por colaborar mesmo estando ocupado, Sensei. Graças a você, economizei bastante trabalho."
41030-273 = "[s] \"O que vai acontecer com aquelas garotas agora?\""
41030-274 = "Após um período de detenção, o plano original era recomendar a reincorporação delas à Valkyrie, mas..."
41030-275 = "Como há uma forte demanda do Conselho Estudantil Geral, a punição será decidida por eles. Como os danos do incidente foram grandes, parece que será uma sentença pesada."
41030-276 = "Na pior das hipóteses, elas podem acabar em um estado onde não poderão ser transferidas para nenhuma escola..."
41030-277 = "[s] \"A restauração da Academia SRT é realmente impossível?\""
41030-278 = "...Para começar, eu mesma não gosto nem um pouco de atender às exigências delas."
41030-279 = "Deixando isso de lado, o \"fechamento da Academia SRT\" é uma decisão do Conselho Estudantil Geral. Pelo menos, não é algo que alguém como eu possa opinar..."
41030-280 = "Mesmo para o Schale, que possui \"autoridade extrajudicial\", seria difícil reverter isso."
41030-281 = "[s] \"Então, que tal perguntar para alguém do Conselho Estudantil Geral...?\""
41030-282 = "Sobre isso, eu não saberia dizer..."
41030-283 = "Nesse caso, permitam-me responder em seu lugar."
41030-284 = "E-essa voz..."
41030-291 = "Prazer em conhecê-lo... Sensei."
41030-292 = "Meu nome é Kaya, do Departamento de Defesa do Conselho Estudantil Geral de Kivotos."
41030-294 = "Próximo episódio: Circunstâncias de outro lado"
