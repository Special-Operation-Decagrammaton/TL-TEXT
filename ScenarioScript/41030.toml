[translation]
41030-1 = "Episódio 3;As Circunstâncias de Cada Uma"
41030-3 = "Registro de Interrogatório: 977-R-1"
41030-5 = "Oficial Responsável: Academia Polícial Valkyrie, 3º Ano, Ogata Kanna"
41030-7 = "Suspeita: Academia Especial SRT, 1º Ano, Sorai Saki"
41030-12 = "Academia Polícial Valkyrie - Sala de Interrogatório"
41030-14 = "……Nome."
41030-15 = "……"
41030-16 = "Diga o seu nome!"
41030-17 = "……Você já sabe muito bem, tem necessidade de perguntar ainda?"
41030-18 = "A suspeita não tem permissão para fazer perguntas."
41030-19 = "Vou perguntar mais uma vez. Nome."
41030-20 = "……Sorai Saki."
41030-21 = "Filiação?"
41030-22 = "Academia Especial SRT, Esquadrão RABBIT……#nOu pelo menos era.#nAté vocês decidirem fechar a nossa academia sem mais nem menos."
41030-23 = "……Bela atitude.#nVocê tem noção da situação em que se encontra?"
41030-24 = "Eu sou conhecida como a \"Cachorra Louca\" da Valkyrie……#nAcho que você não ignoraria esse detalhe, não é?"
41030-25 = "Acha mesmo que uma ameaça barata dessas vai funcionar numa hora dessas?#nSe for tentar me assustar, pelo menos se esforce mais,#nque decepção."
41030-26 = "O treinamento da SRT inclui protocolos rígidos para lidar com captura e interrogatório.#nAfinal, nós lidamos com muita informação confidencial."
41030-27 = "Não importa o que você tente fazer,#nse acha que vai arrancar alguma coisa de mim,#nestá muito enganada."
41030-31 = "……Eu li a ficha que o Conselho Estudantil Geral nos mandou.#nParece que, mesmo dentro da SRT, as suas notas eram impressionantemente altas."
41030-32 = "As notas teóricas beiravam a perfeição,#ne o seu desempenho nos testes práticos era impecável."
41030-33 = "Nem uma única advertência ou infração no histórico escolar……#nVocê é, sem sombra de dúvidas, uma aluna modelo."
41030-34 = "Sendo assim,#npor que você recusou a transferência para a Valkyrie e liderou um motim?"
41030-35 = "……A Academia Polícial Valkyrie#ne a Academia Especial SRT#nnão são a mesma coisa."
41030-36 = "Isso não responde à minha pergunta."
41030-37 = "Na Academia Especial SRT,#nmesmo depois da aula,#nnós vivemos sob regras extremamente rigorosas."
41030-38 = "Acordar num horário exato, organizar o alojamento, e passar o dia intercalando treinamento tático e aulas teóricas.#nMesmo depois do sinal, a ordem é voltar pro alojamento e continuar treinando e fazendo manutenção dos equipamentos sem baixar a guarda.#nÉ essa postura de \"campo de batalha constante\" que faz a SRT ser o que é."
41030-39 = "……E isso não existe na Academia de Polícia Valkyrie."
41030-40 = "Vocês dizem que o Departamento de Ordem Pública é o departamento mais rigoroso de vocês,#nmas depois do expediente, vocês andam à paisana e fazem o que der na telha, não é?#nMesmo que a desculpa de vocês seja \"não causar pânico nos civis\"."
41030-41 = "Eu me recuso a viver assim.#nSe a alternativa for virar um cão de guarda domesticado com \"liberdadezinha\" na Valkyrie,#neu prefiro continuar vivendo orgulhosa como um lobo solitário da SRT,#npor mais duras que sejam as condições."
41030-42 = "……Então essa é a sua resposta."
41030-43 = "……Deixe-me fazer só mais uma pergunta."
41030-44 = "Durante o confronto, a sua colega, Kazekura, destruiu o drone de transmissão.#nAo fazer isso, ela torrou o estoque de munição de vocês#nsem o menor propósito."
41030-45 = "Por que você não a impediu?#nSendo a aluna modelo que é,#nvocê sabia melhor do que ninguém o quão preciosa a munição é durante#numa operação de defesa e cerco."
41030-46 = "Deixar ela fazer aquilo também era algum tipo de#n\"código de honra\" da SRT?"
41030-47 = "……"
41030-48 = "No nosso treinamento, nunca era permitido gastar munição atirando atoa……#nEntão eu meio que queria ver como era fazer isso#npelo menos uma vez……"
41030-52 = "Sorai"
41030-54 = "Saki"
41030-60 = "Resultado:"
41030-62 = "INADEQUADA"
41030-64 = ""
41030-68 = "Registro de Interrogatório: 977-R-2"
41030-70 = "Oficial Responsável: Academia Polícial Valkyrie, 1º Ano, Nakatsukasa Kirino"
41030-72 = "Suspeita: Academia Especial SRT, 1º Ano, Kazekura Moe"
41030-76 = "Ahn…… Kazekura Moe, certo?"
41030-77 = "Huum?"
41030-78 = "Aproveitando a pausa,#nesse interrogatório vai durar quantas horas mesmo?"
41030-79 = "Dá pra agilizar isso não?#nO meu estoque de pirulito tá acabando."
41030-80 = "C-Claro que não dá pra agilizar!"
41030-81 = "Você acha que está em posição de se preocupar com doces#nno meio de um interrogatório policial?!"
41030-82 = "Se continuar com esse comportamento rebelde,#neu vou confiscar esse resto de pirulitos também!"
41030-83 = "Ai, que preguiça……"
41030-84 = "Kazekura, vou ser direta.#nPor que vocês ocuparam o parque daquele jeito?#nPor que não acataram às ordens da Valkyrie?"
41030-85 = "Se vocês tivessem largado as armas e se rendido pacificamente desde o início,#nas coisas não teriam escalado para aquele nível absurdo."
41030-86 = "……Porque eu não queria sair da SRT."
41030-87 = "E-Entendo……#nRealmente, se alguém chegasse do nada e me falasse#n\"saia da Academia Polícial Valkyrie hoje\",#neu também ficaria desesperada."
41030-88 = "As memórias criadas com os colegas que dividiram as dores e alegrias com você,#nnão dá pra jogar tudo isso fora tão fácil……#nEntendido.#nSobre esse ponto, eu vou relatar e pedir redução de……"
41030-89 = "Hã?#nNão, eu não ligo pra nada disso, não."
41030-90 = "Falando bem a real,#nse eu pudesse,#njá tinha vazado do Esquadrão RABBIT faz tempo."
41030-91 = "A Saki é insuportável reclamando de tudo o dia todo,#na Miyu chora por qualquer coisa……"
41030-92 = "E-Então, por que você não queria sair da SRT……?"
41030-93 = "Ué,#npor causa daquela montanha de armas f*das, óbvio!"
41030-94 = "M-Mas se o problema é armas,#nna Academia Polícial Valkyrie nós temos arsenais cheios delas……"
41030-95 = "Haha, não me faça rir!#nO arsenalzinho de vocês não chega nem aos pés dos brinquedos da SRT!"
41030-96 = "Vocês têm mísseis capazes de vaporizar um quarteirão inteiro numa piscada?#nMunições que furam blindagem de tanque de guerra que nem papel?!"
41030-97 = "O único lugar onde eu posso brincar com fogo pesado desse tipo#né na Academia Especial SRT!"
41030-98 = "N-N-Não, espera aí!#nMesmo na SRT, não existe essa de poder atirar \"o quanto quiser\" e#n\"quando quiser\"!!"
41030-99 = "(Pera, agora que parei pra pensar,#njá ouvi um boato de que uma aluna tinha destruído metade de um shopping#ndando tiros atoa uma vez……#nNão me diga que……)"
41030-100 = "Mas…… a SRT é igual à Valkyrie,#numa organização criada originalmente para#nproteger e garantir a segurança dos cidadãos……"
41030-101 = "Achar que brincar com as armas é a parte mais importante,#nisso é……"
41030-102 = "Kazekura, não me diga que……#nVocê não dá a mínima para a segurança da população?!"
41030-103 = "[ruby=Claro.]Yep.[/ruby]"
41030-107 = "……"
41030-111 = "Kazekura"
41030-113 = "Moe"
41030-117 = "Resultado:"
41030-121 = "INADEQUADA"
