41030-270 = "Academia Polícial Valkyrie - Escritório do Departamento de Ordem Pública"
41030-271 = "……E esses são os registros finais das nossas entrevistas com elas."
41030-272 = "Novamente, muito obrigada pela cooperação, mesmo sendo uma pessoa tão ocupada, Sensei.#nGraças à sua presença as coisas se resolveram com muito mais facilidade."
41030-273 = "[s] \"O que vai acontecer com elas agora?\""
41030-274 = "Normalmente, após um período de confinamento preventivo,#no procedimento seria forçá-las a aceitarem a transferência para a Valkyrie novamente,#nmas……"
41030-275 = "O Conselho Estudantil Geral enviou pedidos severos para lidar com elas de forma rígida,#nentão acredito que a punição será expedida por lá, e não por nós.#nE levando em consideração o caos e os danos colaterais que elas causaram hoje,#nacredito que a sentença não será gentil."
41030-276 = "No pior dos cenários,#na ficha delas pode ficar suja a ponto de nenhuma outra academia de Kivotos#naceitar a matrícula delas……"
41030-277 = "[s] \"E a restauração da Academia Especial SRT, é algo impossível mesmo?\""
41030-278 = "……Sendo honesta com você,#na simples ideia de aceitar as exigências que elas fizeram no parque#njá não me agrada em nada."
41030-279 = "Mas independente da minha opinião pessoal,#no \"Fechamento da SRT\" foi um decreto absoluto do Conselho Estudantil Geral.#nUma oficial do meu nível hierárquico não tem nenhum poder de voz#ncontra algo assim, então……"
41030-280 = "E, acredito eu, mesmo que a Schale ostente sua \"autoridade acima da lei\",#ntentar bater de frente com esse decreto ainda seria muito difícil."
41030-281 = "[s] \"Então, e se eu tentar conversar com alguma das figurões do Conselho Estudantil Geral……?\""
41030-282 = "Não sei dizer como você se sairia com elas……"
41030-283 = "Bem, eu acho que posso te responder a isso."
41030-284 = "E-Essa voz……"
41030-291 = "Essa é a nossa primeira vez nos encontrando, correto, Sensei?"
41030-292 = "Eu sou a Chefe do Escritório de Defesa do Conselho Estudantil Geral de Kivotos,#nKaya."
41030-294 = "Próximo Episódio;Por Trás dos Bastidores"