[translation]
10033065-2 = "痛ぁっ！？"
10033065-3 = "やったか！？"
10033065-4 = "[ns] \"それはフラグ！\""
10033065-5 = "……まぁ、マコト先輩が黙ってても変わらなかったでしょう。"
10033065-6 = "まだ全然動けそうです。"
10033065-7 = "……仕方ありませんね。#n百鬼夜行との政治的摩擦がどうこう言ってられません、こうなったら……！"
10033065-8 = "イロハちゃん！？#n何かヤバいこと考えてない！？"
10033065-9 = "と、とりあえず、万魔殿の方は一度お下がりください！#nフィーナ、こちらはお願いします！"
10033065-10 = "ウミカはどうするんデス！？"
10033065-11 = "私は……！"
10033065-15 = "わっ、何あれ？#n何かすごいのがいるんだけど？"
10033065-16 = "っ！？"
10033065-20 = "えーっと、時間になったから連れてきたんだけど……#nこれどういう状況！？"
10033065-22 = "ふぅ……キララちゃん。"
10033065-23 = "うん、また何か起きてるねー。#nこういう時は――"
10033065-28 = "何あれヤバーい！きもーい！！"
10033065-32 = "幽霊とかじゃないでしょ、あれ。#nねぇみんな、どう思う？"
10033065-34 = "え、なにあれ幽霊？"
10033065-35 = "いや、百鬼夜行だし「妖怪」じゃない？"
10033065-40 = "ま、とりあえず撃ってみようよ。"
10033065-41 = "確かに。それじゃ……！"
10033065-45 = "あ痛たたたたた！？#nちょっ、どうして怖がらないんだよ！？"
10033065-47 = "あれ、当たったっぽい。#nじゃあやっぱ怪物じゃなくない？"
10033065-49 = "まあ、もう少し撃ってみれば分かるでしょ。"
10033065-50 = "そうそう、せっかくなら派手にやろうよ！"
10033065-52 = "妖怪だかお化けだか知らないけど、#nせっかくなら楽しくしないとね！"
10033065-53 = "どうせだし、お祭り騒ぎと行こうよ！#nね、怪物さん！"
10033065-58 = "お祭り！？"
10033065-59 = "……お祭り？"
10033065-60 = "[s] \"……そう、お祭り！だからイブキ、怖がらないで！\""
10033065-61 = "！！"
10033065-62 = "そうです、こういった催しなんです！"
10033065-63 = "な、なるほど！#nお祭りだったのか……！"
10033065-64 = "そ、それなら仕方ないわね、私の催眠術が通じないのも！"
10033065-65 = "ほらイブキちゃん、お祭りは楽しまないと損だよ！"
10033065-70 = "こ、こいつら、何なんだ一体……！"
10033065-71 = "とにかく撤退だ！"
10033065-75 = "あ、逃げた！追えー！"
10033065-77 = "逃げるな卑怯者ー！逃げるな―！"
10033065-78 = "良いから追いかけよう、それか別の道から回り込む？"
10033065-83 = "じゃあ、道はこっちだよ～……#n案内するねー。"
10033065-84 = "はーい。"
10033065-88 = "本当にありがとうございました、ご迷惑も沢山……。"
10033065-89 = "キキキッ、構わん！#nこのマコト様にかかれば、大したことではない！"
10033065-90 = "……結構危なかったですけどね。"
10033065-91 = "あははっ、楽しかった～！"
10033065-92 = "こんなことになってしまいましたが、#nこの後の肝試しは是非楽しんでもらえればと……。"
10033065-94 = "りょーかい！#nあ、そしたら幽霊と写真撮っても良い？"
10033065-95 = "仮に良いんだとしても、幽霊が出てきてくれないと……。"
10033065-100 = "あははっ、優しい幽霊さんだ！"
10033065-101 = "……何だかすみません。"
10033065-102 = "じゃあ行くよー、はいチーズ！"
10033065-109 = "（……）"
10033065-110 = "（何とか今日一日は終わった……楽しんでくれてる、みたいだけど……）"
10033065-111 = "（色んなことが、めちゃくちゃで……）"
10033065-112 = "（明日から、大丈夫かな……？）"
