[translation]
10033065-2 = "Ai!?"
10033065-3 = "Será que funcionou!?"
10033065-4 = "[ns] \"Isso é um clichê!\""
10033065-5 = "……Bem, mesmo que a Senpai Makoto ficasse quieta, acho que não teria mudado nada."
10033065-6 = "Ainda consigo me mover perfeitamente."
10033065-7 = "……Não tem jeito. #nNão dá para ficar preocupada com atritos políticos com Hyakkiyako agora, se chegamos a esse ponto……!"
10033065-8 = "Iroha-chan!? #nVocê não está pensando em nada perigoso, está!?"
10033065-9 = "P-por enquanto, pessoal do Pandemonium, recuem por favor! #nFeena, cuide disso aqui!"
10033065-10 = "E o que a Umika deve fazer!?"
10033065-11 = "Eu vou……!"
10033065-15 = "Ué, o que é aquilo? #nTem algo incrível ali, não tem?"
10033065-16 = "¡?"
10033065-20 = "Bom, chegou a hora, então eu trouxe... #nQue situação é essa!?"
10033065-22 = "Ufa…… Kirara-chan."
10033065-23 = "Sim, algo aconteceu de novo, né. #nNessas horas――"
10033065-28 = "Que coisa bizarra! Que nojo!!"
10033065-32 = "Não é um fantasma nem nada do tipo, né? #nEi pessoal, o que vocês acham?"
10033065-34 = "Ué, o que é aquilo, um fantasma?"
10033065-35 = "Não, estamos em Hyakkiyako, não seria um \"Youkai\"?"
10033065-40 = "Bem, de qualquer forma, vamos atirar."
10033065-41 = "Verdade. Então……!"
10033065-45 = "Ai, ai, ai, ai, ai!? #nEi, por que vocês não estão com medo!?"
10033065-47 = "Ué, parece que acertou. #nEntão não é um monstro, afinal?"
10033065-49 = "Bem, se atirarmos um pouco mais, vamos descobrir."
10033065-50 = "Isso mesmo, já que estamos aqui, vamos fazer algo chamativo!"
10033065-52 = "Não sei se é um Youkai ou um fantasma, mas #njá que estamos aqui, temos que nos divertir!"
10033065-53 = "Já que estamos nisso, vamos fazer uma festa! #nEi, seu monstro!"
10033065-58 = "Uma festa!?"
10033065-59 = "……Uma festa?"
10033065-60 = "[s] \"……Isso, uma festa! Então Ibuki, não tenha medo!\""
10033065-61 = "!!"
10033065-62 = "É isso mesmo, é um evento como este!"
10033065-63 = "E-entendi! #nEntão era uma festa……!"
10033065-64 = "E-então não tem como evitar que meu hipnotismo não funcione!"
10033065-65 = "Vamos lá, Ibuki-chan, se você não aproveitar a festa, vai sair perdendo!"
10033065-70 = "Q-quem são essas pessoas, afinal……!"
10033065-71 = "De qualquer jeito, recuar!"
10033065-75 = "Ah, fugiram! Peguem eles!"
10033065-77 = "Não fujam, covardes! Não fujam!"
10033065-78 = "Esquece, vamos atrás deles, ou será que damos a volta por outro caminho?"
10033065-83 = "Então, o caminho é por aqui…… #nEu guio vocês."
10033065-84 = "Beleza."
10033065-88 = "Muito obrigada de verdade, causamos muitos problemas……"
10033065-89 = "Ki-ki-ki, não se preocupe! #nComigo, Makoto-sama, isso não é nada!"
10033065-90 = "……Mas foi bem perigoso, viu."
10033065-91 = "Ahaha, foi divertido~!"
10033065-92 = "Acabou acontecendo isso, mas #nespero que vocês aproveitem o teste de coragem depois disso……"
10033065-94 = "Entendido! #nAh, se for assim, posso tirar uma foto com o fantasma?"
10033065-95 = "Mesmo que pudesse, o fantasma teria que aparecer……"
10033065-100 = "Ahaha, que fantasma gentil!"
10033065-101 = "……Sinto muito por isso."
10033065-102 = "Então lá vou eu, digam xis!"
10033065-109 = "（……）"
10033065-110 = "（De alguma forma, o dia de hoje acabou…… parece que ela se divertiu, mas……）"
10033065-111 = "（Tantas coisas ficaram uma bagunça……）"
10033065-112 = "（Será que vai ficar tudo bem a partir de amanhã……？）"
