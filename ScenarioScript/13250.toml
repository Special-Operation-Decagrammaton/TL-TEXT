[translation]
13250-1 = "第25話;最後の戦い（１）"
13250-6 = "がはっ……！"
13250-9 = "げほっ、げほっ……！"
13250-10 = "ま、まだだ……うぐっ。"
13250-11 = "……。"
13250-12 = "なぜだ……なぜ、勝てない。"
13250-15 = "アビドスを否定するには、力が足りなかったか。"
13250-16 = "あれだけ砂漠を彷徨ったというのに、私は……。"
13250-19 = "……何がしたかったの？"
13250-20 = "はぁ、はぁっ……。"
13250-21 = "私と戦うためだとか言ってたよね。#nどこかで会ったことあるっけ？"
13250-22 = "……。"
13250-23 = "……ちなみに、手帳の話は本当？"
13250-24 = "手帳……？#nああ、生徒会長のアレか。"
13250-27 = "まさか、あんな物が本当にあると思ったのか？#n二年も見つかっていないのだろう？"
13250-33 = "……いつまでも過去に囚われているとは、愚かだな。"
13250-45 = "私は……。"
13250-46 = "最強にならなくてはいけない。"
13250-47 = "……この呪われた地とは、別れを告げて。"
13250-52 = "最強？"
13250-53 = "……ま、良いや。もう終わりだよね？"
13250-57 = "それじゃ、列車砲は破壊させてもら……"
13250-59 = "そうはさせないから！"
13250-63 = "あれ……？"
13250-68 = "おかえり、ホシノ先輩。"
13250-70 = "また、その言葉を聞く日が来るとはねぇ……。"
13250-71 = "けどまさか、こんなに早く来るとは思ってなかったよ。"
13250-72 = "[s] \"ホシノ、止めに来たよ。\""
13250-73 = "先生までいるし、手強そうだなぁ。"
13250-78 = "でも、どうして？#n列車砲を破壊しないと、アビドスは……いや、キヴォトスは大混乱に陥る。"
13250-79 = "それでも、勝手に学校を辞めないでください！"
13250-80 = "後輩に迷惑をかけるわけにはいかないからね。"
13250-81 = "誰が頼んだのよ！"
13250-83 = "そうです！どうして一人で決めてしまうんですか？#nこれでは、前と変わりません！"
13250-84 = "ん、私たちよりも年上なのに。"
13250-86 = "し、シロコちゃん……。"
13250-87 = "先輩が話し合いに応じないなら、"
13250-88 = "捕獲します！"
13250-90 = "元気だねぇ、アヤネちゃんも。"
13250-95 = "アヤネちゃん、アヤネちゃんって……。"
13250-96 = "う、うん……？"
13250-97 = "……？"
13250-103 = "今の私は、アヤネちゃんじゃありません……。"
13250-104 = "あ、アヤネちゃん……？"
13250-105 = "私のことは……。"
13250-110 = "アヤネ生徒会長と呼んでください！"
