[translation]
13250-1 = "Episódio 25; A Batalha Final (1)"
13250-6 = "Gah...!"
13250-9 = "Cof, cof...!"
13250-10 = "Ai, ainda não... Ugh."
13250-11 = "..."
13250-12 = "Por que... por que não consigo vencer?"
13250-15 = "Será que me faltou poder para negar Abydos?"
13250-16 = "Mesmo depois de vagar tanto pelo deserto, eu..."
13250-19 = "...O que você queria fazer?"
13250-20 = "Haah, haah..."
13250-21 = "Você disse que era para lutar comigo, não disse?#nA gente já se encontrou em algum lugar?"
13250-22 = "..."
13250-23 = "...A propósito, a história do caderno é real?"
13250-24 = "O caderno...?#nAh, aquele da presidente do conselho estudantil."
13250-27 = "Você realmente achou que aquilo existia de verdade?#nFaz dois anos que ninguém encontra, não é?"
13250-33 = "...Ficar preso ao passado para sempre é uma tolice."
13250-45 = "Eu..."
13250-46 = "Preciso me tornar a mais forte."
13250-47 = "...E dizer adeus a esta terra amaldiçoada."
13250-52 = "A mais forte?"
13250-53 = "...Bem, tanto faz. Já acabou, não é?"
13250-57 = "Sendo assim, vou destruir o canhão ferroviário..."
13250-59 = "Eu não vou deixar!"
13250-63 = "Ué...?"
13250-68 = "Bem-vinda de volta, Hoshino-senpai."
13250-70 = "Quem diria que eu ouviria essas palavras de novo..."
13250-71 = "Mas não esperava que fosse tão cedo."
13250-72 = "[s] \"Hoshino, vim te impedir.\""
13250-73 = "Até o Sensei está aqui, isso vai ser difícil."
13250-78 = "Mas por quê?#nSe não destruirmos o canhão ferroviário, Abydos... não, Kivotos entrará em um caos total."
13250-79 = "Mesmo assim, não saia da escola por conta própria!"
13250-80 = "Não posso deixar que vocês, minhas kouhais, tenham problemas por minha causa."
13250-81 = "Quem foi que te pediu isso?!"
13250-83 = "Exatamente! Por que você decide tudo sozinha?#nAssim não muda nada em relação ao que aconteceu antes!"
13250-84 = "Hmm, e olha que você é mais velha que a gente."
13250-86 = "Shi, Shiroko-chan..."
13250-87 = "Se a senpai não quer conversar,"
13250-88 = "nós vamos te capturar!"
13250-90 = "Você está cheia de energia, Ayane-chan."
13250-95 = "Ayane-chan, Ayane-chan..."
13250-96 = "H-hum...?"
13250-97 = "...?"
13250-103 = "A Ayane-chan de agora não é a mesma de antes..."
13250-104 = "A-Ayane-chan...?"
13250-105 = "Quanto a mim..."
13250-110 = "Por favor, me chame de Presidente do Conselho Estudantil Ayane!"
