[translation]
10014070-1 = "Episódio 7; Nós, o \"Clube de Doces Depois da Aula\""

10014070-8 = "Haa, haa...#nOra, ora..."
10014070-9 = "Como eu sempre sou a que vai até os outros, ser recebida assim me deixa um pouco sem jeito."
10014070-10 = "É uma pena, mas é a primeira vez que tantas pessoas querem algo de mim...!#nHaha..."
10014070-14 = "Que insistência irritante... Até quando esse cara pretende continuar?!"
10014070-15 = "Ele é tão resistente que não é de se admirar que tenha sobrevivido a duelos e coisas do tipo...#nSinceramente, é impressionante."
10014070-16 = "Por que você está admirando ele?! Se concentra, ele é o inimigo, sabia?!"
10014070-17 = "Não temos tempo. Mesmo sendo nos arredores, se continuarmos fazendo barulho, vamos ser descobertos."
10014070-18 = "Temos que arrancar informações sobre o Cath Palug antes que alguém apareça!"
10014070-19 = "Ah, é verdade."
10014070-20 = "Vocês, peguem suas armas!! Vamos continuar até ele falar!!"
10014070-25 = "Eu já disse... que não posso contar... haha..."
10014070-26 = "Quem diria que o dia em que a heroína de todos, Reisa Uzawa, lutaria pelo Cath Palug chegaria...#nÉ algo misterioso."
10014070-27 = "Sério, viver bastante traz surpresas."
10014070-28 = "——Embora eu só tenha 15 anos."
10014070-29 = "...Bem, tudo bem.#nVamos continuar... esse duelo até o amanhecer..."
10014070-30 = "Eu... posso continuar... o dia todo..."
10014070-31 = "...Para quem diz isso, sua voz não tem muita energia."
10014070-32 = "...?"
10014070-33 = "...Hm?#nSerá que ouvi errado?... Essa voz me é familiar..."
10014070-34 = "Eu já disse antes, não disse?#nQue ser insistente demais é chato. Tente se lembrar do que as pessoas dizem."
10014070-38 = "Haha... não acredito que estou até ouvindo alucinações do Cath Palug..."
10014070-39 = "Parece que, no fundo, eu estava bem solitária... meu coração é fraco, não é?"
10014070-40 = "Q-que foi? De quem é essa voz?#nDe onde veio?"
10014070-41 = "...?"
10014070-42 = "Ué...?"
10014070-43 = "Ali!!#nAtrás da parede, agora pouco..."
10014070-44 = "...?"
10014070-50 = "...!!"
10014070-51 = "!!!#nTodos, afastem-se!! É uma bomba!!"
10014070-56 = "Cof, cof, cof...!#nExplodir as coisas do nada...!"
10014070-57 = "Ei!! Vocês estão bem? Algum ferimento?"
10014070-58 = "Ah, bem... de alguma forma..."
10014070-59 = "Quem foi que fez isso...!"
10014070-62 = "...Certo, beleza."
10014070-63 = "Parece que viemos ao lugar certo."
10014070-64 = "Uzawa..."
10014070-65 = "Hm...?"
10014070-68 = "Ah..."
10014070-69 = "...Ué?"
10014070-70 = "[s1] \"Parece que ela desmaiou com o impacto da explosão.\"\n[s2] \"Que bom, parece que ela não se feriu.\""
10014070-71 = "...Sim."
10014070-72 = "...Sim."
10014070-75 = "Que porra é essa, cara! Quem é você?#nFoi você que fez isso?!"
10014070-76 = "Quer levar uma surra?! Hã?!#nO que você pensa que está fazendo? Sabe com quem está falando? Ei!"
10014070-80 = "Hã? O que é isso?#nAlô! Tá me ouvindo? É do tipo que não sabe falar?"
10014070-84 = "...O que foi?"
10014070-85 = "Essa baixinha..."
10014070-95 = "...Que falta de educação."
10014070-96 = "Vocês, por acaso sabem quem é esta pessoa?"
10014070-97 = "Esta pessoa é a imperatriz do submundo que escondia suas garras e vivia nas sombras."
10014070-98 = "Ela logo retornará para se tornar a fera aterrorizante que dominará toda esta área..."
10014070-102 = "……！？"
10014070-103 = "N-não! Espera!! Natsu!#nEi!! Pare, por favor...!"
10014070-110 = "Pode deixar!"
10014070-115 = "Vamos, pode continuar!"
10014070-121 = "Natsu, você é demais!"
10014070-125 = "……A fera aterrorizante."
10014070-126 = "……É a Lady \"Cath Palug\"!!!"
10014070-128 = "Ca-Cath Palug...!?#nVocê disse Cath Palug!? É sério!?"
10014070-129 = "E-então os rumores eram verdadeiros...#nOlha só! Eu disse que era verdade!!"
10014070-131 = "E nós somos os quatro reis celestiais, os subordinados dela, o \"Clube de Doces do Pós-Aula\"!!"
10014070-132 = "……Hã……? Espera aí?#nQuatro reis celestiais?"
10014070-133 = "[s3] \"Parece que eu também estou incluída.\"\n[s4] \"Membro dos quatro reis celestiais... será que fui promovida?\""
10014070-134 = "Hã!? Espera!! Eu não sou nada disso!!#nEu não sou subordinada daquela ali..."
10014070-135 = "Hã!? Espera!! Eu não sou nada disso!!#nEu não sou subordinada daquela ali..."
10014070-136 = "Yo-Yoshimi-chan!#nVamos entrar no clima e acompanhar o pessoal...?"
10014070-137 = "Nem pensar!! Não tem como eu ser tratada como subordinada dela!!"
10014070-138 = "[s5] \"Yoshimi, olhe para o rosto da Kazusa.\"\n[s6] \"Você consegue dizer isso olhando para aquela cara?\""
10014070-139 = "……Rosto?"
10014070-140 = "……Rosto?"
10014070-141 = "Que cara..."
10014070-145 = "Hmph……"
10014070-146 = "Não brinca comigo... sério, parem com isso...!!#nSério mesmo...! Vocês querem ser... espancados por mim...!?"
10014070-150 = "……."
10014070-151 = "Nós somos os quatro reis celestiais do \"Clube de Doces do Pós-Aula\"!!"
10014070-152 = "Pessoal, exceto o Sensei, todos para o ataqueeee!!"
10014070-153 = "Vamos nessa!!"
10014070-154 = "N-nós vamos mesmo!?"
10014070-155 = "Go, go!!"
10014070-160 = "[ns7] \"Go, go!\"\n[ns8] \"Ah, eu preciso ficar na retaguarda, né.\""
10014070-163 = "……Vocês."
10014070-164 = "Todos vocês... Uzawa, as delinquentes, o Sensei... todos..."
10014070-166 = "Preparem-se para as consequências depois..."
