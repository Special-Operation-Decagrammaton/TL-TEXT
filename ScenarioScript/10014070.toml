[translation]
10014070-1 = "第7話;我ら「放課後スイーツ団」"
10014070-8 = "はぁ、はぁ……。#nこれはこれは……"
10014070-9 = "いつも私から行ってましたから、こんなに歓迎されると少し困っちゃいますね。"
10014070-10 = "残念な事に、こんなにたくさんの方が私に用があるなんて初めてですから……！#nはは……"
10014070-14 = "マジでしつこいな……いつまで粘る気なんだよ、こいつは！！"
10014070-15 = "こんなに打たれ強いから、決闘だのなんだのやっても大丈夫だったんだな……#n純粋にすげえ。"
10014070-16 = "なに関心してんだよ！しっかりしろ、敵だぞ！？"
10014070-17 = "時間がねぇ。いくら郊外っつっても、ずっと騒いでたら見つかっちまう。"
10014070-18 = "人が来る前にキャスパリーグの事を聞き出さねえとな！"
10014070-19 = "ああ、そうだな。"
10014070-20 = "お前ら銃を持て！！あいつが話すまで続けるぞ！！"
10014070-25 = "だから、教えられないって……言ってるのに……はは……"
10014070-26 = "みんなのヒーロー[ruby=うざわ]宇沢[/ruby]レイサが、キャスパリーグのために戦う日がくるなんて……#n不思議なものです。"
10014070-27 = "本当、長生きしてみるもんですね。"
10014070-28 = "――私まだ15歳ですけど。"
10014070-29 = "……まあ、いいでしょう。#n朝まで……勝負を続けましょうか……"
10014070-30 = "私、は……一日中でも、できます……からね……"
10014070-31 = "……その割には、声に覇気がないね。"
10014070-32 = "……？"
10014070-33 = "……ん？#n空耳でしょうか……聞き覚えのある声が……。"
10014070-34 = "だから前にも言ったじゃん。#nしつこすぎるのは微妙だって。人の話、ちゃんと覚えてよ。"
10014070-38 = "はは……まさか、キャスパリーグの幻聴まで聞こえるとは……"
10014070-39 = "私、内心かなり寂しかったみたいです……心が弱いですね。"
10014070-40 = "な、何だ？誰の声だ？#nどこから聞こえてきた？"
10014070-41 = "……？"
10014070-42 = "あれ……？"
10014070-43 = "あっちだ！！#n壁の後ろから今……"
10014070-44 = "……？"
10014070-50 = "……！！"
10014070-51 = "！！！#n全員離れろ！！爆弾だ！！"
10014070-56 = "ゲホ、ゲホゲホ……！#n急に爆発させやがって……！"
10014070-57 = "おい！！お前ら大丈夫か？ケガは？"
10014070-58 = "ああ、まあ……何とか……。"
10014070-59 = "誰だよこんな事したの……！"
10014070-62 = "……うん、よし。"
10014070-63 = "ここで正解だったみたいだね。"
10014070-64 = "宇沢……"
10014070-65 = "ん……？"
10014070-68 = "あ……"
10014070-69 = "……あれ？"
10014070-70 = "[s1] \"爆発の衝撃で気絶しちゃったみたい。\"\n[s2] \"よかった、怪我はしてないみたい。\""
10014070-71 = "……うん。"
10014070-72 = "……うん。"
10014070-75 = "んだ、コラァ！なんだお前？#n今のお前の仕業か！？"
10014070-76 = "ぶっ飛ばされてぇのか！？アァ！？#n何してくれてんだよ？私たちが誰か分かってんのか？ゴラァ！"
10014070-80 = "ア？んだよ、こいつ。#nもしもーし！聞こえますかぁ？言葉話せない系？"
10014070-84 = "……なんだ？"
10014070-85 = "このちっこいの……"
10014070-95 = "……実に無礼だな。"
10014070-96 = "君らこそ、このお方が誰だか分かっているのか？"
10014070-97 = "このお方こそ、その爪を隠し潜伏していた暗黒街の女帝。"
10014070-98 = "まもなく復活を遂げ、この一帯を支配する恐怖の魔獣……"
10014070-102 = "……！？"
10014070-103 = "い、いや！ちょっと！！ナツ！#nコラ！！やめて、お願い……！"
10014070-110 = "いいよ！"
10014070-115 = "ほら、もっとやっちゃいな！"
10014070-121 = "ナツ最高ー！"
10014070-125 = "……恐怖の魔獣。"
10014070-126 = "……「キャスパリーグ」様だ！！！"
10014070-128 = "キャ、キャスパリーグ……！？#nキャスパリーグだって！？本当に！？"
10014070-129 = "や、やっぱり噂は本当だったんだ……#nほら見ろ！本当だって！！"
10014070-131 = "そして私たちは彼女の手下である「放課後スイーツ団」の四天王！！"
10014070-132 = "……え……？あれ？#n四天王？"
10014070-133 = "[s3] \"私まで含めてっぽいね。\"\n[s4] \"四天王の一員……私、出世した？\""
10014070-134 = "えっ！？ちょっと！！私は違うわよ！！#n私はあいつの手下なんかじゃ……"
10014070-135 = "えっ！？ちょっと！！私は違うわよ！！#n私はあいつの手下なんかじゃ……"
10014070-136 = "よ、ヨシミちゃん！#nここは空気を読んで合わせてあげよう……？"
10014070-137 = "いやよ！！いくらなんでもあいつの部下扱いは無理！！"
10014070-138 = "[s5] \"ヨシミ、カズサの顔を見て。\"\n[s6] \"あの顔を見てもそんな事いえる？\""
10014070-139 = "……顔？"
10014070-140 = "……顔？"
10014070-141 = "何の顔……"
10014070-145 = "ふっ……"
10014070-146 = "ざけないで……ほんと、やめなさいよ……！！#nマジで……！あんた達、全員……ぶっ飛ばされたいの……！？"
10014070-150 = "……。"
10014070-151 = "私たちは「放課後スイーツ団」の四天王よ！！"
10014070-152 = "諸君、先生を除いてみんなで突撃いいいー！！"
10014070-153 = "いっくわよーー！！"
10014070-154 = "い、いきますぅーー！？"
10014070-155 = "ごーごー！！"
10014070-160 = "[ns7] \"ごーごー！\"\n[ns8] \"あ、私は後ろにいないとね。\""
10014070-163 = "……たち。"
10014070-164 = "どいつもこいつも……宇沢もスケバンも先生も……全員……"
10014070-166 = "後で覚悟しておいてよね……"
