[translation]
1600102-1 = "Ela é do seu próprio ritmo"
1600102-2 = "Trim trim"
1600102-3 = "Ah, bem-vindo, Mestre! Vou te levar a uma mesa agora mesmo..."
1600102-4 = "……Ué?"
1600102-5 = "Uau, é o Mestre de verdade!? Você veio! Eu estava te esperando!"
1600102-6 = "Ah, mas primeiro, deixa eu te levar para uma mesa. Né, Mestre?"
1600102-7 = "……Hm? Mestre?"
1600102-8 = "Ué, mas 'Mestre' é..."
1600102-9 = "[s] \"……Asuna?\""
1600102-10 = "……Parece que aqui eles chamam os clientes de 'Mestre', mas, no fim das contas, você já é o Mestre da Asuna desde o começo, né?"
1600102-11 = "Você é o Mestre, mas como eu deveria te chamar?"
1600102-12 = "Mestre Mestre? Ou o Mestre do Mestre? Será que só 'Mestre' já basta?"
1600102-13 = "Mas antes de ser o Mestre, você é o Mestre, mas ao mesmo tempo você também é o Mestre...?"
1600102-14 = "[s1] \"O Mestre é o Mestre do Mestre...?\"\n[s2] \"Onde estou, quem sou eu...\""
1600102-15 = "Ahahahaha! Mestre, que cara é essa! Que fofo!"
1600102-16 = "Ahahahaha! Mestre, que cara é essa! Que fofo!"
1600102-17 = "Hmm, é complicado, né?"
1600102-18 = "Mas, de qualquer forma, como você é o Mestre, vou continuar te chamando de Mestre como sempre."
1600102-19 = "Hm? Se eu estou trabalhando aqui...?"
1600102-20 = "Não, eu só vim como cliente mesmo! Acho que é porque estou usando um uniforme de empregada, então todo mundo acha que sou funcionária."
1600102-21 = "Já que é um maid café, acabei entrando na brincadeira."
1600102-22 = "Hm? ...Salário? Contrato?"
1600102-23 = "Nada disso! Só estou fazendo por diversão."
1600102-24 = "Ah, que cara é essa! Ahahahaha!"
1600102-25 = "Ah, é sempre divertido estar com você, Mestre."
1600102-26 = "……Hm?"
1600102-27 = "Por que eu te chamei?"
1600102-28 = "……Ah, é verdade! Fui eu que te chamei, né?"
1600102-29 = "Não esqueci não, não se preocupe com detalhes!"
1600102-30 = "Enfim, hum, por que foi mesmo que eu te chamei..."
1600102-31 = "Ah, lembrei!"
1600102-32 = "Hoje eu tenho uma missãozinha, preciso rastrear e capturar uma pessoa..."
1600102-33 = "Por isso que eu vim para o café!"
1600102-34 = "……Hm? Não faz sentido lógico? Não entende o que eu quero dizer...?"
1600102-35 = "Por que estou no café se é uma missão?"
1600102-36 = "Hmm, bem... como eu posso explicar, hum..."
1600102-37 = "……Foi só um palpite, sabe?"
1600102-38 = "Senti que se eu estivesse aqui com você, Mestre, as coisas dariam certo?"
1600102-39 = "Isso, mais ou menos isso!"
1600102-40 = "Eeeh, você quer que eu seja séria..."
1600102-41 = "Eu não queeeero, eu quero brincar com o Mestre! É isso que eu quero!"
1600102-42 = "Ou será que você estava ocupado, Mestre? Eu te chamei à força mesmo estando ocupado?"
1600102-43 = "Ah, não é o caso? Que bom, sorte a minha! ☆"
1600102-44 = "Hm, já que você veio, vamos encerrar a brincadeira de trabalhar."
1600102-47 = "Pronto, vou sentar aqui do seu lado!"
1600102-48 = "Ah, moça! Um pedido, por favor!"
1600102-49 = "[s3] \"De empregada para Mestre num piscar de olhos.\"\n[s4] \"Tem certeza que pode brincar assim? E a missão?\""
1600102-50 = "Tá tudo bem, tá tudo bem~. O conjunto de sobremesa daqui é delicioso!"
1600102-51 = "Tá tudo bem, tá tudo bem~. O conjunto de sobremesa daqui é delicioso!"
1600102-52 = "……Trim trim"
1600102-53 = "Ah, bem-vindo de volta, mestre!"
1600102-54 = "……."
1600102-55 = "……Ufa. Certo, parece que despistei eles. Vou ficar aqui por um tempo."
1600102-56 = "Francamente, que gente insistente……."
1600102-57 = "Tem algum lugar……."
1600102-58 = "Está vazio…… espera, o que é aquilo? Uma empregada……?"
1600102-60 = "Ei, por que você está sentada aí? Por que não vem tirar o meu pedido?"
1600102-61 = "Eh? Eu?"
1600102-62 = "Por que uma empregada estaria sentada na mesa escolhendo o cardápio…… você enlouqueceu!?"
1600102-63 = "Levante-se logo……?"
1600102-64 = "……?"
1600102-65 = "……?"
1600102-66 = "[s] \"……Asuna?\""
