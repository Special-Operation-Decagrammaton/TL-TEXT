[translation]
1600102-1 = "マイペースな彼女"
1600102-2 = "カランカラン"
1600102-3 = "あ、おかえりなさいませご主人様！すぐにご案内……。"
1600102-4 = "……あれ？"
1600102-5 = "わっ、本当にご主人様じゃん！？来てくれたんだー！待ってたよ！"
1600102-6 = "あ、でもまずは席に案内しよっか。ね、ご主人様？"
1600102-7 = "……ん？ご主人様？"
1600102-8 = "あれ、ご主人様って……。"
1600102-9 = "[s] \"……アスナ？\""
1600102-10 = "……ここだとお客さんのことをご主人様って呼ぶみたいなんだけど、そもそもご主人様は最初からアスナのご主人様じゃん？"
1600102-11 = "ご主人様はご主人様だけど、ご主人様のことを何て呼べばいいのかな？"
1600102-12 = "ご主人様なご主人様？それともご主人様のご主人様？ただのご主人様でいいのかな？"
1600102-13 = "でもご主人様はご主人様である以前にご主人様だけど同時にご主人様だし……？"
1600102-14 = "[s1] \"ご主人様はご主人様のご主人様……？\"\n[s2] \"ここはどこ、私は誰……。\""
1600102-15 = "あはははは！ご主人様、なにその顔！可愛い！"
1600102-16 = "あはははは！ご主人様、なにその顔！可愛い！"
1600102-17 = "うーん、ややこしいね？"
1600102-18 = "でもとにかくご主人様はご主人様だから、ここではいつも通りご主人様って呼ぶね。"
1600102-19 = "ん？ここでバイトしてたの……って？"
1600102-20 = "ううん、普通にお客さんとして来てるだけ！ただメイド服を着てたせいかな、みんな私のこと従業員だと思ってるみたいで。"
1600102-21 = "せっかくのメイドカフェだし、なんとなく合わせてるの。"
1600102-22 = "ん？……時給？契約？"
1600102-23 = "特に何も？ただ面白くてやってるだけ。"
1600102-24 = "あはっ、何その顔！あははははっ！"
1600102-25 = "あー、やっぱりご主人様といると面白いなあ。"
1600102-26 = "……ん？"
1600102-27 = "呼んだ理由？"
1600102-28 = "……あ、そうだった！私がご主人様を呼んだんだったね？"
1600102-29 = "忘れてないよー、細かいことは気にしない気にしない！"
1600102-30 = "とにかくえっと、どうして呼んだんだっけ……"
1600102-31 = "あっ、そうそう！"
1600102-32 = "今日はちょっとした任務をやらないといけなくって、ある人を追跡して捕まえなきゃなんだけど……。"
1600102-33 = "だから、カフェに来たの！"
1600102-34 = "……んー？論理的に繋がってない？色々と意味が分からない……？"
1600102-35 = "任務なのにどうしてカフェにいるのかって？"
1600102-36 = "んー、えっと……何て言ったらいいのかなー、うーんと……。"
1600102-37 = "……なんとなく、って感じ？"
1600102-38 = "何となくここでご主人様といたら、何とかなりそうな感じがして？"
1600102-39 = "うん、だいたいそんな感じ！"
1600102-40 = "ええ～、真面目にって言われたってさー。"
1600102-41 = "や～だ～ご主人様と遊ぶの～！それがい～い～！"
1600102-42 = "それとも、もしかしてご主人様、忙しかった？忙しいのに無理やり呼んじゃった？"
1600102-43 = "あ、そういうわけじゃない？良かったー、ラッキー！☆"
1600102-44 = "んー、じゃあせっかくご主人様も来てくれたことだし、アルバイトごっこは終わりー。"
1600102-47 = "よいしょっ、隣座らせてー！"
1600102-48 = "あっ、メイドさん！注文お願いしま～す！"
1600102-49 = "[s3] \"メイドさんからご主人様に早変わり。\"\n[s4] \"本当に遊んでて大丈夫なの？任務は？\""
1600102-50 = "大丈夫大丈夫～。ここデザートセット、すっごく美味しいんだよ！"
1600102-51 = "大丈夫大丈夫～。ここデザートセット、すっごく美味しいんだよ！"
1600102-52 = "……カランカラン"
1600102-53 = "あ、おかえりなさいませご主人様～！"
1600102-54 = "……。"
1600102-55 = "……ふう。よし、無事に撒いたみたいだな。しばらくここに居よう。"
1600102-56 = "まったく、しつこいやつらだ……。"
1600102-57 = "席は……。"
1600102-58 = "空いてるな……って、なんだぁ？メイド……？"
1600102-60 = "おい、あんたは何で座ってんだ、注文を受けたらどうなんだ？"
1600102-61 = "え？私？"
1600102-62 = "どうしてメイドが席に座ってメニューを選んでるんだ……正気か！？"
1600102-63 = "さっさと立っ……？"
1600102-64 = "……？"
1600102-65 = "……？"
1600102-66 = "[s] \"……アスナ？\""
1600102-67 = "……！"
1600102-68 = "ターゲットはっけーん！！"
1600102-69 = "ヤッホー！ここで会ったが百年目！覚悟～！！"
1600102-70 = "なっ、待ち伏せだと！？ありえねえ！！"
1600102-71 = "待っ……！"
1600102-75 = "ガタッ、ドスッ、ドサッ！"
1600102-77 = "（結局その男はアスナに捕まり、アスナの任務は完了した）"
1600102-78 = "（最初から全部予想済みだったのかと聞いてみると……）"
1600102-79 = "……。"
1600102-81 = "まっさかー！"
1600102-83 = "（……）"
1600102-84 = "（……とりあえず任務を終えて、上機嫌のアスナと美味しいスイーツを食べて過ごした）"
