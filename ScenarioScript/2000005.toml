[translation]
2000005-1 = "Um strike no seu coração"
2000005-2 = "Millennium, Campo 12"
2000005-3 = "Bem-vindo de volta, Sensei."
2000005-4 = "Na verdade, é a primeira vez que recebo um pedido de apoio de um clube esportivo."
2000005-5 = "O problema é que não tenho muito conhecimento sobre o esporte chamado beisebol."
2000005-6 = "Pelo que entendi, é uma competição onde se usa um objeto chamado bastão para fabricar ou gerar coisas chamadas rebatidas e home runs."
2000005-7 = "[s1] \"Sinto que tem algo levemente errado nisso.\"\n[s2] \"Era... assim mesmo?\""
2000005-8 = "Tudo bem. #nBem, em resumo... é sobre rebater a bola lançada pelo arremessador para marcar pontos."
2000005-9 = "Tudo bem. #nBem, em resumo... é sobre rebater a bola lançada pelo arremessador para marcar pontos."
2000005-10 = "Para quem cria coisas, o mais importante é..."
2000005-11 = "Ter clareza sobre o \"objetivo\" do que se está criando."
2000005-12 = "Sendo assim, o que posso fazer pelo clube de beisebol de Millennium, que tem como objetivo a \"participação no Intercolegial\"?"
2000005-13 = "A conclusão foi..."
2000005-14 = "Desenvolver a habilidade de conseguir rebater mesmo contra o arremessador mais forte."
2000005-15 = "E foi por isso que preparei isto."
2000005-16 = "O nome é \"Máquina de Arremesso Nascida do Inferno\"."
2000005-17 = "Como preciso verificar o funcionamento da máquina aqui para os testes..."
2000005-18 = "Sensei."
2000005-20 = "Poderia ficar na posição de rebatedor?"
2000005-21 = "[s3] \"Tenho a sensação de que serei eu quem vai para o inferno no seu lugar.\"\n[s4] \"Pode esperar um home run.\""
2000005-22 = "Não se preocupe."
2000005-23 = "Eu também sei que o beisebol não serve para matar os rebatedores."
2000005-24 = "Heh, que bom espírito."
2000005-26 = "Certo, então vamos começar."
2000005-27 = "O modo de extermínio... ainda não existe, então..."
2000005-28 = "Então, recomeçando."
2000005-29 = "Lançar... não..."
2000005-30 = "Vou começar o arremesso."
2000005-32 = "Dizem que a velocidade média de um jogador da liga principal é de 139 km/h."
2000005-33 = "Ao mesmo tempo, é uma velocidade que um arremessador de nível de campeão do Intercolegial consegue atingir facilmente."
2000005-34 = "Mas a velocidade é algo relativo..."
2000005-35 = "Se você se acostumar a ver bolas mais rápidas... #na bola que vier a 139 km/h será fácil de rebater."
2000005-36 = "Então, primeiro arremesso..."
2000005-37 = "Como é a primeira vez... vou começar com \"Mach 2\"."
2000005-38 = "[s5] \"Espere, espere! Tem algo errado!\"\n[s6] \"Mas o beisebol não é feito apenas de bolas retas.\""
2000005-39 = "Não se preocupe."
2000005-40 = "Claro."
2000005-41 = "Esta máquina de arremesso também foi feita para lidar com preocupações sobre bolas curvas."
2000005-42 = "Se o arremessador apenas lança bolas rápidas, é fácil de superar."
2000005-43 = "Forkball, sinker, slider... e até mesmo knuckleball."
2000005-44 = "Lançar bolas com trajetórias imprevisíveis..."
2000005-45 = "As bolas curvas são mais lentas que as bolas rápidas, mas, às vezes, são ainda mais ameaçadoras."
2000005-46 = "Mas... apenas rebater \"bolas curvas comuns\" ou \"bolas retas comuns\","
2000005-47 = "não garante sucesso no Intercolegial."
2000005-48 = "Por isso, depois de muito pensar, decidi adicionar uma função mais especial."
2000005-49 = "...Não se assuste."
2000005-50 = "Esta máquina de arremesso consegue usar \"bolas mágicas\"."
2000005-51 = "Como uma bola mágica que desaparece no momento em que é lançada,"
2000005-52 = "uma bola que voa envolta em chamas,"
2000005-53 = "ou uma bola que se divide em dezenas, tornando impossível saber qual é a verdadeira,"
2000005-54 = "Tipo uma bola que gera um campo eletromagnético potente para eletrocutar o rebatedor."
2000005-55 = "[s7] \"Incrível! Mas como isso funciona!?\"\n[s8] \"A última não é uma falta clara?\""
2000005-56 = "Isso é um detalhe irrelevante."
2000005-57 = "Isso é um detalhe irrelevante."
2000005-58 = "O princípio é simples. A bola mágica que desaparece usa uma função de camuflagem óptica, e a bola que pega fogo é porque aplico um agente inflamável antes do lançamento e acendo no momento em que ela é disparada."
2000005-59 = "Sobre a bola mágica que se multiplica, acho que o Sensei já está acostumado com esse mecanismo. #nÉ aquele que projeta dezenas de hologramas da bola voando na mesma velocidade ao redor da bola real."
2000005-60 = "E quanto a que libera um campo eletromagnético potente..."
2000005-61 = "Hã? Não é um elogio, é... uma falta?"
2000005-62 = "Hmm... pelo visto, esportes não são baseados em racionalidade."
2000005-63 = "De qualquer forma, entendi. Vou melhorar um pouco as bolas curvas por enquanto."
2000005-64 = "Ter o Sensei por perto é realmente muito útil."
2000005-65 = "E por último, fiquei na dúvida sobre isso, mas..."
2000005-66 = "Isto é um alto-falante Bluetooth."
2000005-67 = "Parece que arremessadores experientes não apenas fazem arremessos de contenção,"
2000005-68 = "mas também criam strikes com palavras antes mesmo de lançar a bola."
2000005-69 = "Por isso, esta máquina de arremesso pode provocar o rebatedor dessa forma."
2000005-70 = "Por exemplo..."
2000005-71 = "\"Ei, franguinho, vem cá, vem cá!\""
2000005-72 = "\"Nossa, que lento! Com esse taco, acho que consigo três strikes antes de você balançar uma vez.\""
2000005-73 = "\"Vá treinar mais, seu nanico!\""
2000005-74 = "O que acha? Se eles conseguirem manter a calma mesmo com essas provocações,"
2000005-75 = "não acha que surgiria um rebatedor incrível?"
2000005-76 = "Hehe."
2000005-77 = "Parece bom, né? Sim, ótimo."
2000005-78 = "Que bom. Na verdade, eu estava um pouco preocupada, mas como o Sensei me ajudou, vai ficar algo muito bom."
2000005-79 = "Depois do teste final, vou levar para o clube de beisebol."
2000005-81 = "(Dizem que, depois disso, o clube de beisebol do Millennium participou do torneio nacional.)"
