[translation]
2000005-1 = "あなたの心にストライク"
2000005-2 = "ミレニアム・第12グラウンド"
2000005-3 = "おかえり、先生。"
2000005-4 = "実は運動部から支援の要請を受けたのは初めてで。"
2000005-5 = "問題は私が野球っていうスポーツに対して、あまり知識がないこと。"
2000005-6 = "とりあえずバットという素材を用いて、安打やホームランと呼ばれるものを製造・生成する競技だってことぐらいは分かった。"
2000005-7 = "[s1] \"何か微妙に間違えてる気もする。\"\n[s2] \"そう……だったっけ？\""
2000005-8 = "大丈夫。#nえっと、つまり……ピッチャーが投げた球を打って、点数を生み出すってことだね。"
2000005-9 = "大丈夫。#nえっと、つまり……ピッチャーが投げた球を打って、点数を生み出すってことだね。"
2000005-10 = "何かを作る人にとって一番大事なのは……"
2000005-11 = "自分が作る「目的」を明確にすること。"
2000005-12 = "それなら私は、「インターハイ出場」という目的を持つミレニアム野球部にどんなことをしてあげられるのか？"
2000005-13 = "結論は……"
2000005-14 = "最強のピッチャーを相手にしても、安打が打てる能力を養うこと、というところに至った。"
2000005-15 = "それで用意したのがこれ。"
2000005-16 = "名前は「地獄より生まれしピッチングマシン」。"
2000005-17 = "私はテストのために、ここで機械のチェックをしなきゃいけないから……。"
2000005-18 = "先生。"
2000005-20 = "打席に立ってくれない？"
2000005-21 = "[s3] \"私が交代で地獄行きになりそうな気がするね？\"\n[s4] \"ホームラン、期待してて。\""
2000005-22 = "心配しないで。"
2000005-23 = "私も、打者を殺すことが野球ではないってことぐらいは知ってるから。"
2000005-24 = "へえ、いい心意気だね。"
2000005-26 = "さ、じゃあ始めるよ。"
2000005-27 = "抹殺モード……は、まだ無いから……。"
2000005-28 = "じゃあ、あらためて。"
2000005-29 = "発射……いや……。"
2000005-30 = "投球、始めるね。"
2000005-32 = "メジャーリーガーの平均球速は139kmらしい。"
2000005-33 = "同時に、インターハイ優勝クラスのピッチャーなら、十分に出せる球速でもある。"
2000005-34 = "でも速度というのは相対的なものだから……。"
2000005-35 = "もっと速い球を目に慣れさせれば……#n139kmで飛んでくる球は、十分に打てるはず。"
2000005-36 = "それじゃ、第1球目……。"
2000005-37 = "初めてだから……「マッハ2」ぐらいで行くね。"
2000005-38 = "[s5] \"待って待って！何か間違ってる！\"\n[s6] \"でも野球は、直球だけで成り立ってるわけじゃない。\""
2000005-39 = "心配しないで。"
2000005-40 = "もちろん。"
2000005-41 = "このピッチングマシンは、変化球についての悩みにも対応できるようになってる。"
2000005-42 = "単純に速い球を投げるだけのピッチャーなら、攻略は簡単。"
2000005-43 = "フォーク、シンカー、スライダー……さらにナックルまで。"
2000005-44 = "軌道が予測できない球を投げること……。"
2000005-45 = "変化球は、直球の剛速球より遅いけど、時にはそれ以上に脅威的。"
2000005-46 = "でも……「ただの変化球」や「ただの直球」を打つだけでは、"
2000005-47 = "インターハイで通じる保証はない。"
2000005-48 = "だから、私は悩んだ末に、もっと特別な機能を入れることにした。"
2000005-49 = "……驚かないでね。"
2000005-50 = "このピッチングマシンは、「魔球」が使えるの。"
2000005-51 = "発射された瞬間、球が見えなくなる魔球とか、"
2000005-52 = "炎を纏いながら飛んでいく球とか、"
2000005-53 = "数十個に分かれて、本物がどれか分からなくさせる球とか、"
2000005-54 = "強力な電磁場を発生させて、打者を感電させる球とか。"
2000005-55 = "[s7] \"すごい！いったいどんな仕組みで！？\"\n[s8] \"最後のやつは明確な反則じゃない？\""
2000005-56 = "それは些細なことだよ。"
2000005-57 = "それは些細なことだよ。"
2000005-58 = "原理は簡単。消える魔球はボールに光学迷彩機能を適用したものだし、#nボールが燃え上がるのは発射直前に着火剤を塗って、点火と同時に発射するの。"
2000005-59 = "分身する魔球については、先生も見慣れてる仕組みだと思う。#n球の周囲に、同じ速度で飛んでいく数十個の球のホログラムを投射するあれ。"
2000005-60 = "それで、強力な電磁場を放出してるのは……"
2000005-61 = "え？褒めてるんじゃなくて……反則？"
2000005-62 = "うーん……やっぱりスポーツには合理性じゃなさそうだね。"
2000005-63 = "とりあえず分かった。一旦、変化球についてはもう少し改善することにする。"
2000005-64 = "やっぱり先生がいると、すごく参考になる。"
2000005-65 = "それから最後に、これは悩んだんだけど……。"
2000005-66 = "これ、Bluetoothスピーカー。"
2000005-67 = "経験の多いピッチャーは、単に牽制球を投げたりするだけじゃなく、"
2000005-68 = "球より先に、言葉でもストライクを生み出すものらしい。"
2000005-69 = "だから、このピッチングマシンはそんな風に打者を挑発できるの。"
2000005-70 = "例えば……。"
2000005-71 = "「ヘ～イ、チキンちゃ～んカモンカモ～ン」"
2000005-72 = "「う～わ、おっそ！そんなバット、一回振られる前に三回はストライクできそうだぜ」"
2000005-73 = "「出直してこいや、このチビが！」"
2000005-74 = "どう？こんな挑発に対しても冷静が保てるなら、"
2000005-75 = "すごい打者が誕生しそうじゃない？"
2000005-76 = "ふふっ。"
2000005-77 = "良さそうでしょ？うん、よし。"
2000005-78 = "良かった。実は少し心配してたんだけど、先生が手伝ってくれたから、良いものになりそう。"
2000005-79 = "最終テストをしたら、野球部に持っていってあげよう。"
2000005-81 = "（その後、ミレニアム野球部はインターハイに出場したらしい）"
