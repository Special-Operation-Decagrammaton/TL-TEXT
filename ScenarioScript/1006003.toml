[translation]
1006003-1 = "Garotas que não conseguem \"esperar\"."

1006003-2 = "(Em um canto pouco iluminado de um beco, ela avistou Meg)."
1006003-3 = "(Meg estava um pouco bêbada, talvez com pressa)"
1006003-12 = "[ns1] \"......Meg, você está bem? \"\n[ns2] \"Meg! O que aconteceu? "
1006003-20 = "Doutor, o senhor está aqui! Eu estava esperando por você!"
1006003-21 = "O quê? Você disse que isso parece sério?"
1006003-22 = "Sim, eu sei! #nTem sido muito difícil!"
1006003-23 = "O que há de errado?"
1006003-24 = "Hmmm. ......."
1006003-28 = "......."
1006003-29 = "...... Nada está acontecendo! O tempo todo!"
1006003-33 = "[ns3] \"......? \"\n[ns4] \"Nada é tão sério assim ......? \""
1006003-36 = "Eu sabia que o médico entenderia!"
1006003-37 = "É um trabalho árduo!"
1006003-38 = "[ns] \"............. \""
1006003-40 = "[ns5] \"}, é claro! Tem sido um período difícil, Meg. ...... \"\n[ns6] (eu não fazia ideia)."
1006003-43 = "O problema é que, na verdade, eu estava tentando cavar uma fonte termal mais cedo com o pessoal do departamento de desenvolvimento de spa, sob a direção do diretor do #n."
1006003-44 = "Mas assim que começamos a construção, todos os tipos de pessoas começaram a nos atacar. #nEram tantas pessoas!"
1006003-45 = "Eu estava pensando se iríamos lutar novamente desta vez, porque o diretor nos disse para nos espalharmos e nos escondermos. ......"
1006003-46 = "É assim que eles se escondem. ......"
1006003-50 = "O problema então se torna ......."
1006003-51 = "[s]\"Qual é o problema ......? \""
1006003-52 = "Eles me disseram para fazer isso o tempo todo e não ser pego. ......"
1006003-53 = "Estou me esforçando ao máximo para ficar quieto, mas acho que não aguento mais!"
1006003-57 = "[ns] \"............. \""
1006003-58 = "Teacher ...... Como faço para me manter maduro? #nNão faço ideia!"
1006003-59 = "[s7] \"...... Acho que é frustrante não ter tempo para fazer nada. \"\n[s8] \"Meg é muito ativa, então é difícil para ela fazer o contrário. \""
1006003-62 = "Hmmm, é isso mesmo ......?"
1006003-63 = "Não sei, mas provavelmente sim!"
1006003-64 = "O tempo não avança de jeito nenhum. #nÉ como quando você está preso em algum lugar!"
1006003-65 = "Mas, você sabe, às vezes eles me colocavam na cadeia da moral pública, mas mesmo assim não era tão difícil! #nHavia uma certa quantidade de coisas para brincar lá. ......"
1006003-66 = "E talvez porque havia outros membros do clube com eles?"
1006003-67 = "Mas agora você pode visitar ......!"
1006003-71 = "Uhhhhhhhhh!!!"
1006003-72 = "...... Hmmm, senhor?"
1006003-73 = "O que você disse?"
1006003-74 = "...... Ah, isso?"
1006003-78 = "Isso me foi dado quando construí um novo spa e me disseram para colocá-lo em algum lugar."
1006003-79 = "O que foi isso? Ken ...... Dama?"
1006003-80 = "Acho que era esse o nome."
1006003-81 = "Não sei bem os detalhes, mas é a que será decorada de uma forma bonita quando o spa estiver pronto!"
1006003-82 = "Por que você faz isso no site ......?"
1006003-83 = "Oh, talvez o senhor saiba o que é isso, doutor?"
1006003-84 = "O quê?"
1006003-85 = "...... Isso é um brinquedo? É um brinquedo? Como você brinca com isso?"
1006003-91 = "[Pegando emprestado um kendama da Meg. \n[ns10] \"Vou lhe mostrar um exemplo. \""
1006003-94 = "Oh! Deixe-me ver, deixe-me ver!"
1006003-104 = "............！！！！！！！！！！"
1006003-108 = "Ehhhh! O que é isso?"
1006003-109 = "Você pode fazer isso! Ei, como você fez isso!"
1006003-110 = "Eu também gostaria de fazer isso! #nNoNice, não é, doutor?"
1006003-111 = "[s11] \"Claro. \"\n[s12] Devolva o kendama para Meg."
1006003-118 = "Tudo bem, eu também tenho um ......!"
1006003-127 = "...... Woo, Huh?"
1006003-132 = "Não consigo fazer o que pensei que ia fazer. ...... Você tem alguma dica ou truque, sensei? #nTalvez você tenha que ser inteligente. ......"
1006003-133 = "Serei capaz de fazer isso com a prática?"
1006003-134 = "Sério? Então acreditarei no sensei e farei o meu melhor!"
1006003-135 = "Ótimo. ......!"
1006003-136 = "Observe-me corretamente, sensei! #nTenho certeza de que você será capaz de fazer isso!"
1006003-137 = "E mais uma vez!"
1006003-139 = "(Depois, passei horas com Meg praticando até que ela ficasse boa o suficiente para brincar com o kendama)."
1006003-140 = "(O telefone celular de Meg foi contatado várias vezes durante o processo, mas ela não pareceu perceber até o final. ......)"
