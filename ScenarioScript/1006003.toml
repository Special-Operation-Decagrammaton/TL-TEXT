[translation]
1006003-1 = "「待て」ができない女の子"
1006003-2 = "（薄暗い路地の片隅で、メグの姿を見つけた）"
1006003-3 = "（メグは焦っているのか、どこかソワソワしていた）"
1006003-12 = "[ns1] \"……メグ、大丈夫？\"\n[ns2] \"メグ！何があったの！？\""
1006003-20 = "先生、来てくれたんだ！待ってたよ！"
1006003-21 = "うん？深刻そうだねって？"
1006003-22 = "そうなの！#nすっごく大変なことになっちゃって！"
1006003-23 = "どうしたのかって？"
1006003-24 = "うーんとね……。"
1006003-28 = "……。"
1006003-29 = "……何も起きないの！ずっと！！"
1006003-33 = "[ns3] \"……？\"\n[ns4] \"何もないことが、そんなに深刻なのかな……。\""
1006003-36 = "先生なら分かってくれると思ってたよ～！"
1006003-37 = "大変なの！"
1006003-38 = "[ns] \"…………。\""
1006003-40 = "[ns5] \"も、もちろん！大変だったね、メグ……。\"\n[ns6]（まったく分からなかった）"
1006003-43 = "それがね、実はさっき温泉開発部のみんなと一緒に、#n部長の指示で温泉を掘ろうとしてたの。"
1006003-44 = "ところが工事を始めた途端、なんかいろんな人たちが襲ってきたんだ。#nもうほんと、すごい人数だったの！"
1006003-45 = "今回も戦うのか～って思ってたんだけどね、部長が散らばって隠れてろって言うから……。"
1006003-46 = "こうやって隠れてるんだけど……。"
1006003-50 = "問題はそのあと……。"
1006003-51 = "[s] \"問題って……？\""
1006003-52 = "ずーっとこうやって、バレないようにしとけって言われてさ……。"
1006003-53 = "頑張って、じーーーっと我慢してるんだけど、もう私、我慢できそうにないよ！"
1006003-57 = "[ns] \"…………。\""
1006003-58 = "先生……大人しく過ごすには、どうすればいいの？#n私にはさっぱり分かんないよ！"
1006003-59 = "[s7] \"……何もしてない時間がもどかしいってことかな。\"\n[s8] \"メグは活発だから、逆につらいんだね。\""
1006003-62 = "うーん、そうなのかな……？"
1006003-63 = "よく分かんないけど、たぶんそう！"
1006003-64 = "時間がちっとも進まないんだよね。#nどこかに閉じ込められた時みたいな感じに！"
1006003-65 = "でもね、たまに風紀委員の収監室に入れられることもあるけど、その時だってこんなにつらくはなかったの！#nあそこはそれなりに遊ぶものがあったし……。"
1006003-66 = "それに、他の部員も一緒だったからかな？"
1006003-67 = "でも今は……！"
1006003-71 = "ううううう～～～！！！"
1006003-72 = "……ん～、先生？"
1006003-73 = "何か言った？"
1006003-74 = "……あー、これ？"
1006003-78 = "これは新しく温泉を作ったら、どこかに飾っといてって言われて渡されたんだ。"
1006003-79 = "何だっけ。ケン……ダマ？"
1006003-80 = "確かそんな名前だったような。"
1006003-81 = "詳しいことはよく分からないんだけど、温泉が完成したらいい感じに飾る予定のやつ！"
1006003-82 = "どうしてそんなことを……？"
1006003-83 = "あっ、もしかして先生、これが何か知ってるの？"
1006003-84 = "えっ？"
1006003-85 = "……おもちゃなの？これが？どうやって遊ぶの？"
1006003-91 = "[ns9] メグにけん玉を借りる。\n[ns10] \"お手本を見せてあげるよ。\""
1006003-94 = "おぉ～！見せて見せて！"
1006003-104 = "…………！！！！！！！！！！"
1006003-108 = "えーーーっ！何それ！？"
1006003-109 = "そんなことできるの！？ねえ、どうやったの！？"
1006003-110 = "私もやってみたい！#nいいでしょ、先生？"
1006003-111 = "[s11] \"もちろんだよ。\"\n[s12] メグにけん玉を返す。"
1006003-118 = "よしっ、私も……！"
1006003-127 = "……うー、あれっ？"
1006003-132 = "思ったようにできない……。先生、何かコツとかないの？#nもしかして、頭が良くないとダメなのかな……。"
1006003-133 = "練習すればできるようになるの？"
1006003-134 = "ほんとっ？なら先生のこと信じて頑張るよ！"
1006003-135 = "よ～し……！"
1006003-136 = "ちゃんと見ててね、先生！#n絶対できるようになるから！"
1006003-137 = "じゃあ、もっかい！"
1006003-139 = "（その後、メグが上手にけん玉で遊べるようになるまで、何時間も練習に付き合った）"
1006003-140 = "（途中でメグの携帯に何度も連絡が来てたけど、最後まで気付く様子はなかった……)"
