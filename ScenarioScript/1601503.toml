[translation]
1601503-1 = "シュガーラッシュ"
1601503-2 = "（アイリのキーボード練習を手伝ったものの、問題は意外とすぐに解消された）"
1601503-3 = "（……真の問題は、練習が終わってからの帰り道で起きた）"
1601503-5 = "まさか急に、雨だなんて……。"
1601503-6 = "どうしましょう、ここから結構遠いですし……。"
1601503-7 = "コンビニも近くには……。"
1601503-8 = "すみません、私がお呼びしたせいで……。"
1601503-9 = "[s1] \"気にしないで、アイリのせいじゃないし。\"\n[s2] \"こういうのも良いよね。\""
1601503-12 = "あ、ありがとうございます……。"
1601503-13 = "でも、本当にタイミングが悪いですね……部室まではすぐなのに……。"
1601503-17 = "……。"
1601503-18 = "もしかしたら……。"
1601503-19 = "[s3] \"……も、もしかして。\"\n[s4] \"この土砂降りの中、走るつもり！？\""
1601503-22 = "もちろん、最低限カバーはします！"
1601503-23 = "ほら、これとか……。"
1601503-27 = "……雨除けにちょうど良いんじゃないでしょうか！"
1601503-28 = "[s5] \"これって……。\"\n[s6] \"アイリが着ていたジャケットだよね！？\""
1601503-31 = "はい！元々オーバーサイズのものなので、結構大きいんです。"
1601503-32 = "私と先生くらいならすっぽり入ると思います！"
1601503-33 = "……？"
1601503-34 = "雨脚が弱まるのを待つ……？"
1601503-35 = "ど、どうしてですか？ジャケットが濡れても、私は構いませんが……？"
1601503-36 = "うーん……。"
1601503-37 = "……ちょっと残念です。"
1601503-38 = "なんというか、楽しそうだったので……。"
1601503-42 = "[ns7] \"……やっぱり走ってみよっか！！\"\n[ns8] \"風邪ひくから、今回だけだよ？\""
1601503-45 = "……！！"
1601503-49 = "……はいっ！！"
