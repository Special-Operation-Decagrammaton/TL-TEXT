1601503-57 = "[wa:2100]― [log=아이리 밴드]Aconteceu alguma coisa?[/log]"
1601503-60 = "[wa:2050]― [log=아이리 밴드]Será que...[/log]"
1601503-61 = "[wa:2620]― [log=아이리 밴드]Eu te deixei [wa:620] desconfortável...?[/log]"
1601503-64 = "[wa:1900]― [log=아이리 밴드]Mu~! [wa:2675] E olha que eu criei coragem...[/log]"
1601503-67 = "― [log=아이리 밴드]Eu também tive culpa por sugerir algo tão imprudente...[/log]"
1601503-68 = "[wa:3450]― [log=아이리 밴드]Mas, [wa:1930] eu queria que você [wa:1300] entrasse na brincadeira.[/log]"
