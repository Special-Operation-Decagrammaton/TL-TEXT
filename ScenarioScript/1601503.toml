[translation]
1601503-1 = "Sugar Rush"
1601503-2 = "（Embora eu tenha ajudado Airi com a prática de teclado, o problema foi resolvido surpreendentemente rápido）"
1601503-3 = "（……O verdadeiro problema aconteceu no caminho de volta, depois que a prática terminou）"
1601503-5 = "Quem diria que começaria a chover de repente..."
1601503-6 = "O que faremos? Ainda estamos bem longe daqui..."
1601503-7 = "E não tem nenhuma loja de conveniência por perto..."
1601503-8 = "Sinto muito, é tudo culpa minha por ter te chamado..."
1601503-9 = "[s1] \"Não se preocupe, a culpa não é sua, Airi.\"\n[s2] \"Até que isso é legal, não é?\""
1601503-12 = "Ah, muito obrigada..."
1601503-13 = "Mas, que péssimo momento, não é? E pensar que a sala do clube está tão perto..."
1601503-17 = "……"
1601503-18 = "Talvez..."
1601503-19 = "[s3] \"……V-você não está pensando em...\"\n[s4] \"Você pretende correr nessa chuva torrencial!?\""
1601503-22 = "Claro, pelo menos vamos nos cobrir!"
1601503-23 = "Veja, algo como isto..."
1601503-27 = "……Não seria perfeito para se proteger da chuva?"
1601503-28 = "[s5] \"Isso é...\"\n[s6] \"Essa é a jaqueta que você estava usando, Airi!?\""
1601503-31 = "Sim! Ela já é um modelo oversized, então é bem grande."
1601503-32 = "Acho que cabe eu e o Sensei aqui dentro!"
1601503-33 = "……?"
1601503-34 = "Esperar a chuva diminuir...?"
1601503-35 = "P-por que? Eu não me importo se a jaqueta molhar...?"
1601503-36 = "Hmm..."
1601503-37 = "……É um pouco decepcionante."
1601503-38 = "É que, de certa forma, parecia divertido..."
1601503-42 = "[ns7] \"……Quer saber? Vamos correr!!\"\n[ns8] \"Só desta vez, porque você pode pegar um resfriado.\""
1601503-45 = "……!!"
1601503-49 = "……Sim!!"
1601503-52 = "[wa:330]― [log=아이리 밴드]Hehehe...[wa:3300] aqui, [wa:900] Sensei![/log]"
1601503-53 = "[wa:1500]― [log=아이리 밴드]Venha aqui! [wa:1100] Não se acanhe![/log]"
