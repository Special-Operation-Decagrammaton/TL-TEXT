1601503-74 = "[wa:1450]― [log=아이리 밴드]はい！[wa:660]どうぞ。[/log]"
1601503-77 = "― [log=아이리 밴드]（……[wa:1550]この雨に[wa:1500]感謝したいくらいかも）[/log]"
1601503-80 = "[wa:200]― [log=아이리 밴드]私が合図したら、[wa:1900]一緒に走りますよ！[/log]"
1601503-81 = "[wa:2100]― [log=아이리 밴드]準備はいいですね？[/log]"
1601503-84 = "― [log=아이리 밴드]それでは[wa:1800]いきますよ～！[/log]"
1601503-87 = "では……。"
