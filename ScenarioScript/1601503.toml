1601503-53 = "[wa:1500]― [log=아이리 밴드]こちらへ！[wa:1100]遠慮せず！[/log]"
1601503-56 = "[wa:200]― [log=아이리 밴드]……？[wa:1900]先生……？[/log]"
1601503-57 = "[wa:2100]― [log=아이리 밴드]どうかしました？[/log]"
1601503-60 = "[wa:2050]― [log=아이리 밴드]もしかして……[/log]"
1601503-61 = "[wa:2620]― [log=아이리 밴드]困らせて[wa:620]しまいました……？[/log]"
1601503-64 = "[wa:1900]― [log=아이리 밴드]む～！[wa:2675]せっかく勇気を出したのに……[/log]"
1601503-67 = "― [log=아이리 밴드]無茶を言った私も悪いですが……[/log]"
1601503-68 = "[wa:3450]― [log=아이리 밴드]でも、[wa:1930]少しは[wa:1300]乗ってほしいです。[/log]"
1601503-71 = "[ns9] \"……よし。\"\n[ns10] \"……覚悟はできた！\""
1601503-72 = "[wa:1130]― [log=아이리 밴드]……ふ[wa:300]ふふ。[/log]"
