[translation]
203-1 = "Júbilo replicado"
203-3 = "Dizem que, desde os tempos antigos, toda emoção possui uma 'emoção raiz' primordial, e que todos os sentimentos existentes surgem como réplicas dela."
203-4 = "Felicidade, júbilo, desejo, raiva... todos eles são apenas réplicas da emoção raiz."
203-6 = "Como artista, essa ideia me serviu de inspiração. Ainda não sei aonde essa sensação irá me levar, mas é algo profundo e repleto de euforia..."
203-7 = "……"
203-8 = "……Ah, perdão."
203-9 = "Recomeçando. Prazer em conhecê-lo, Sensei. Peço desculpas por esta aparência deplorável, mas fico feliz em encontrá-lo."
203-10 = "Não sou seu amigo, mas também não sou seu inimigo. Não estou aqui para ajudá-lo, mas tampouco pretendo atrapalhá-lo."
203-11 = "Eu sou o 'Maestro'. É assim que sou chamado dentro da Gematria."
203-14 = "Neste parque de diversões abandonado, a felicidade e o júbilo de muitas pessoas do passado permanecem como resquícios. E agora, eles se manifestaram aqui."
203-15 = "Finalmente, um significado foi atribuído a estas bonecas descartadas."
203-16 = "Eu os chamarei de Mimesis. São réplicas de júbilo que possuem atributos como uma faceta distinta do Mistério."
203-19 = "Vamos, Sensei. Por favor, prepare-se para os aplausos."
