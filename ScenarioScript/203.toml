[translation]
203-1 = "複製された歓喜"
203-3 = "古来より、全ての感情にはその原初たる「根源の感情」が存在し、ありとあらゆる感情はそれを複製する形で現れているのだという。"
203-4 = "幸せ、歓喜、熱望、怒り……いずれも、根源の感情のレプリカだということだ。"
203-6 = "芸術家として、私はこの考えにインスピレーションを受けた。この感覚が私をどこへ導くのかはまだ分からないが、深く、高揚に満ちた……。"
203-7 = "……。"
203-8 = "……おっと、失敬。"
203-9 = "あらためて。お初にお目にかかる、先生。こんなみっともない恰好で悪いが、出会えて嬉しい。"
203-10 = "私はそなたの友人ではないが、敵でもない。そしてそなたを助けることもないが、邪魔をしようというわけでもない。"
203-11 = "私は「マエストロ」。ゲマトリアの中ではそう呼ばれている。"
203-14 = "この閉鎖された遊園地には、かつての多くの人々の幸せが、歓喜が残滓として残っている。 そしてそれらの[ruby=ミメシス]複製[/ruby]が今、ここに顕現した。"
203-15 = "捨てられたドールに、ようやく意味が付与されたのだ。"
203-16 = "私はこれらをミメシスと呼ぼう。神秘の別側面として[ruby=テラー]恐怖[/ruby]の属性を持った、歓喜のレプリカだ。"
203-19 = "さあ、先生。どうか、喝采の準備を。"
