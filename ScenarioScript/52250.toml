[translation]
52250-1 = "第25話;三冊目の怪書"
52250-2 = "ほう……おもしろい余興さね。"
52250-3 = "悲劇と喜劇が合わさるとは。"
52250-4 = "喜劇が悲劇に勝り、みな恐怖には目もくれない。#n身も心も凍りつかせるはずの怪談は……#n忘れ去られ、朝靄のように消えた……か。"
52250-5 = "あの[ruby=がき]餓鬼[/ruby]、私の風流に泥を塗りやがって……！"
52250-6 = "コクリコ様、あれを野放しにしていいのでしょうか！？"
52250-7 = "シュロが、私の風流を喜劇へと変えています！"
52250-8 = "恐怖で新たなものを生み出すのが「稲亭物怪録」の真骨頂。#nそこに斯様な阿保らしい百物語を登場させては、誰がこの怪談を恐れるのです！"
52250-9 = "……そう熱くならんでええやろ、蛇女。"
52250-10 = "風流の価値を測るのは、触れる者の心。"
52250-11 = "大衆がシュロの物語に惹かれたのなら、おまえさんが至らなかったということやねえ。"
52250-12 = "足りぬ部分があったのなら、また新しい物語を書けばええやない？"
52250-13 = "私は……許せません。"
52250-17 = "今すぐあのバカを黄昏に放り投げて、泣き叫ぶ顔を――"
52250-27 = "……そこまでに、しとき。"
52250-28 = "あの子が我にとってどんな存在か――知らぬわけでもないだろう？"
52250-29 = "それとも、おまえさんの未熟を我に押しつけ、憂さ晴らしをする腹づもりかえ？"
52250-30 = "い、いえ……コクリコ様のことではなく……。"
52250-31 = "シュロを黄昏に、と言った。"
52250-32 = "それがどんな結果を招くのか……怪芸家のおまえさんはよぉく知っているはずだ。"
52250-33 = "……は、はい。"
52250-34 = "何をしようと、おまえさんの物語は力を失った。もう、恐怖を紡げないさね。"
52250-35 = "優秀な語り手は、不測の事態をも伏線に仕立て上げるもの……。#nおまえさんは、思い通りにいかないからと、観衆に怒りをぶつけるのかえ？"
52250-36 = "みっともないったら、ありゃしないわ。"
52250-37 = "も、申し訳ございません……！"
52250-38 = "決して、コクリコ様の意を疑ったわけでは！ "
52250-39 = "ただ……私めの鬱憤を、こらえきれず……。"
52250-45 = "……もうええよ。"
52250-46 = "百花繚乱とシャーレの先生がここに来た時点で、恐怖と分裂の章は幕を閉じた。"
52250-47 = "この後は[ruby=・]ヒ[/ruby][ruby=・]ト[/ruby][ruby=・]ツ[/ruby][ruby=・]メ[/ruby]に任せようかね。"
52250-48 = "あのバカ……いえ、シュロはいかがいたしましょう。"
52250-49 = "そうさねぇ……あの子が自分の道を見つけたんなら、無理に連れてくこともないのやけれど……。"
52250-57 = "ここが年貢の納め時だ！花鳥風月部！"
52250-58 = "[ruby=はぶ]土生[/ruby]アザミ……いや、蛇女。#nあんた達の不愉快な物語は、ここで終わり。"
52250-59 = "投降するなら、百花繚乱としても礼を持って対処する。#n……それが嫌なら、手加減はしないよ。"
52250-60 = "百花繚乱ども、いつの間に……！"
52250-61 = "怪書の力が弱まったからといって、お前たちごときが勝てるとでも？"
52250-62 = "そんな脅しで、身共たちが引き下がると思ったら大間違いですわ！"
52250-63 = "いまの身共たちには、怪異を撃ち抜く百蓮を扱えるナグサ先輩もおりますから！"
52250-64 = "怪[ruby=・]談[/ruby]家なんて、ちっとも怖くありませんの！"
52250-65 = "だから、私は怪[ruby=・]芸[/ruby]家だと言っているでしょう！？#nどいつもこいつも……！"
52250-66 = "……相も変わらず、人の心はわからぬ[ruby=もの]存在[/ruby]さね。"
52250-67 = "なにゆえ結末を知りながら、つまらぬ物語を追い求めるのかね。"
52250-68 = "ん？あの女、誰だ……？"
52250-69 = "あの方は――"
52250-74 = "花鳥風月部の部長、コクリコだね。"
52250-75 = "ようやく覚えてくれたのかえ？後輩さんや。"
52250-76 = "……私にあなたみたいな先輩はいない。"
52250-77 = "言葉ひとつで関係が消せるのならば、アヤメもそうしたはず。"
52250-78 = "……。"
52250-79 = "友と信じる者に縋りついているおまえさんが、我が先輩である……その事実を振り払えるのかえ？"
52250-80 = "だから、無能な上に傲慢と言ったのさ。"
52250-81 = "先輩、あの女の言葉に耳を貸しちゃだめ。"
52250-82 = "ああ。どうせ時間稼ぎに適当抜かしてるんだ。"
52250-83 = "早いとこ、やっつけちまえば――"
52250-84 = "お、お待ちくださいまし、レンゲ先輩！"
52250-85 = "花鳥風月部の部長から……おかしな気配を感じます。"
52250-86 = "己の責務を放棄していても、勘解由小路の血に変わりはない……か。"
52250-87 = "「怪書」の気配に気がつくとはねぇ。"
52250-88 = "[s] \"怪書……？\""
52250-89 = "まだ他にあるってこと……？"
52250-90 = "あのおチビは、2冊しかないって言ってただろ……。"
52250-91 = "もとより花鳥風月部には、3冊の書があったのさ。"
52250-94 = "人の欲望を映す「[ruby=いのうもののけろく]稲生物怪録[/ruby]」。"
52250-97 = "人の恐怖を映す「[ruby=とうていぶっかいろく]稲亭物怪録[/ruby]」。"
52250-101 = "そして、人そのものを映し出す……「[ruby=いのうれいかいろく]稲生霊怪録[/ruby]」。"
52250-102 = "シュロは、これが20年前の大雪原で消えたと思っとったみたいやけど……。"
52250-103 = "いいや、[ruby=・]な[/ruby][ruby=・]く[/ruby][ruby=・]し[/ruby][ruby=・]た[/ruby]というのも間違いとは言えんかな。"
52250-104 = "本来の形をなくし――散ってしまったものを無理やり再生させているからね。"
52250-105 = "[s] \"……？\""
52250-106 = "あんたたちがどれだけ怪書を持っていようと、引き下がるつもりはない。"
52250-107 = "クズノハ様と、[USERNAME]先生。それに……[ruby=みんな]百花繚乱[/ruby]の前で誓ったから。"
52250-108 = "これ以上、アヤメをひとりにしないって。"
52250-109 = "コクリコ、アヤメはどこ？"
52250-111 = "……まだ夢うつつかえ？"
52250-112 = "「クズノハ」、「完璧な委員長」、「消えない友情」……すべては絵空事にすぎぬのさ。"
52250-113 = "もしも本物[ruby=うそぶ]と嘯く[/ruby]のなら、我にも考えがある。"
52250-114 = "ひとつ……見てみるかえ？誰もが目を逸らそうとする、[ruby=・]現[/ruby][ruby=・]実[/ruby]を。"
52250-123 = "[ns] \"みんな気をつけて！\""
52250-130 = "次回;暗く、深い影の底から"
