[translation]
52250-1 = "Episódio 25: O Terceiro Livro Misterioso"
52250-2 = "Ora... que entretenimento interessante."
52250-3 = "Misturar tragédia com comédia, é?"
52250-4 = "A comédia superou a tragédia, e ninguém dá a mínima para o medo. #nAquelas histórias de fantasmas que deveriam congelar o corpo e a alma... #nforam esquecidas e desapareceram como a névoa da manhã... foi isso?"
52250-5 = "Aquela pirralha, sujando a minha elegância com lama...!"
52250-6 = "Senhorita Kokuriko, podemos mesmo deixar aquilo sem controle!?"
52250-7 = "Shuro está transformando a minha elegância em uma comédia!"
52250-8 = "A verdadeira essência do 'Inatei Monokairoku' é criar algo novo através do medo. #nSe você permite que uma história de cem contos tão ridícula quanto essa apareça, quem é que vai temer este conto de terror!"
52250-9 = "……Não precisa ficar tão exaltada, mulher-serpente."
52250-10 = "Quem mede o valor da elegância é o coração de quem a toca."
52250-11 = "Se o público se sentiu atraído pela história da Shuro, significa apenas que você não foi boa o suficiente."
52250-12 = "Se faltou algo, por que não escreve uma história nova?"
52250-13 = "Eu... não posso perdoar isso."
52250-17 = "Vou jogar aquela idiota no crepúsculo agora mesmo e ver a cara dela chorando e gritando—"
52250-27 = "……Já chega disso."
52250-28 = "Você sabe muito bem o que aquela criança significa para mim, não sabe?"
52250-29 = "Ou será que você pretende descontar a sua própria imaturidade em mim para aliviar o seu estresse?"
52250-30 = "N-não, não é sobre a senhorita Kokuriko..."
52250-31 = "Eu disse para jogar a Shuro no crepúsculo."
52250-32 = "Você, como uma contadora de histórias de terror, sabe muito bem que tipo de resultado isso traria."
52250-33 = "……S-sim."
52250-34 = "Não importa o que faça, suas histórias perderam o poder. Você não consegue mais tecer o medo."
52250-35 = "Um contador de histórias talentoso transforma até imprevistos em ganchos para a trama... #nVocê está descontando sua raiva no público só porque as coisas não saíram como planejou?"
52250-36 = "Que cena patética."
52250-37 = "P-peço perdão...!"
52250-38 = "Eu jamais duvidaria das intenções da senhorita Kokuriko!"
52250-39 = "É que... eu não consegui conter a minha frustração..."
52250-45 = "……Já chega."
52250-46 = "No momento em que o Hyakkiyako e o Sensei do Schale chegaram aqui, o capítulo do medo e da divisão chegou ao fim."
52250-47 = "De agora em diante, vamos deixar isso com o Hitotsume."
52250-48 = "Aquela idiota... digo, o que faremos com a Shuro?"
52250-49 = "Bem... se aquela criança encontrou o seu próprio caminho, não há necessidade de forçá-la a vir conosco..."
52250-57 = "Chegou a hora de pagar a conta! Clube Kachou Fuugetsu!"
52250-58 = "Azami Habu... não, mulher-serpente. #nAs histórias desagradáveis de vocês terminam aqui."
52250-59 = "Se se renderem, o Hyakkiyako tratará vocês com respeito. #n...Se não quiserem, não pegaremos leve."
52250-60 = "O pessoal do Hyakkiyako, desde quando...!"
52250-61 = "Só porque o poder do livro misterioso enfraqueceu, vocês acham que gente como vocês pode vencer?"
52250-62 = "É um grande erro pensar que vamos recuar com ameaças como essa!"
52250-63 = "Agora, nós temos a veterana Nagusa, que consegue manejar o Hyakuren para perfurar as aparições!"
52250-64 = "Não temos medo nenhum de contadores de histórias de terror!"
52250-65 = "Eu já disse que sou uma contadora de artes misteriosas, não de histórias de terror!? #nTodos vocês...!"
52250-66 = "……Como sempre, o coração humano é uma existência incompreensível."
52250-67 = "Por que buscam histórias tão sem graça, mesmo sabendo como elas terminam?"
52250-68 = "Hm? Quem é aquela mulher...?"
52250-69 = "Aquela pessoa é—"
52250-74 = "É a presidente do Clube Kachou Fuugetsu, Kokuriko."
52250-75 = "Finalmente se lembrou de mim? Minha querida veterana."
52250-76 = "……Eu não tenho uma veterana como você."
52250-77 = "Se fosse possível apagar uma relação apenas com palavras, Ayame já teria feito isso."
52250-78 = "……"
52250-79 = "Você, que se agarra a amigos e àqueles em quem confia, é meu veterano... consegue mesmo ignorar esse fato?"
52250-80 = "É por isso que eu disse que você é incompetente e arrogante."
52250-81 = "Veterano, não dê ouvidos ao que aquela mulher diz."
52250-82 = "Sim. Ela só está falando besteira para ganhar tempo."
52250-83 = "Vamos acabar logo com isso—"
52250-84 = "E-espere um pouco, veterana Renge!"
52250-85 = "Sinto uma presença estranha vindo da presidente do Clube Kachou Fuugetsu."
52250-86 = "Mesmo abandonando seus deveres, o sangue dos Kadenokouji continua o mesmo... é?"
52250-87 = "Então você percebeu a presença do 'Livro Estranho'."
52250-88 = "[s] \"Livro Estranho...?\""
52250-89 = "Isso significa que ainda existem outros...?"
52250-90 = "Aquela baixinha disse que só existiam dois, não disse?..."
52250-91 = "Desde o início, o Clube Kachou Fuugetsu possuía três livros."
52250-94 = "O 'Inou Mononoke Roku', que reflete os desejos das pessoas."
52250-97 = "O 'Toutei Bukai Roku', que reflete os medos das pessoas."
52250-101 = "E o que reflete as pessoas em si... o 'Inou Reikai Roku'."
52250-102 = "Shuro parecia pensar que este tinha desaparecido na grande planície nevada há 20 anos, mas..."
52250-103 = "Bem, dizer que foi perdido não deixa de ser um erro."
52250-104 = "Porque estou forçando a regeneração de algo que perdeu sua forma original e se dispersou."
52250-105 = "[s] \"...?\""
52250-106 = "Não importa quantos Livros Estranhos vocês tenham, não pretendo recuar."
52250-107 = "Porque fiz uma promessa diante da Srta. Kuzunoha, do sensei [USERNAME] e... de todos da Hyakka Ryouran."
52250-108 = "Que não deixaria Ayame sozinha nunca mais."
52250-109 = "Kokuriko, onde está Ayame?"
52250-111 = "...Você ainda está sonhando acordada?"
52250-112 = "'Kuzunoha', 'a presidente perfeita', 'amizade eterna'... tudo isso não passa de fantasia."
52250-113 = "Se você insiste em dizer que são reais, eu tenho uma ideia."
52250-114 = "Quer dar uma olhada? Na realidade que todos tentam desviar o olhar."
52250-123 = "[ns] \"Pessoal, cuidado!\""
52250-130 = "Próximo episódio: Do fundo da sombra escura e profunda"
