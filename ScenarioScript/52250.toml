[translation]
52250-1 = "Episódio 25; O Terceiro Livro Misterioso"
52250-2 = "Ho...... que entretenimento interessante."
52250-3 = "Tragédia e comédia misturadas, é?"
52250-4 = "A comédia superou a tragédia e ninguém mais dá atenção ao medo. #n Histórias de fantasmas que deveriam congelar o corpo e a alma...... #n foram esquecidas e desapareceram como a névoa da manhã...... foi isso?"
52250-5 = "Aquele pirralho, manchando a minha elegância com lama......!"
52250-6 = "Kokuriko-sama, será que podemos deixar isso passar impune!?"
52250-7 = "A Shuro está transformando a minha elegância em uma comédia!"
52250-8 = "A verdadeira essência do 'Inotei Mononokeroku' é dar origem a algo novo através do medo. #n Se você introduz uma farsa tão ridícula quanto essa ali, quem é que vai temer essas histórias de fantasmas!"
52250-9 = "......Não precisa ficar tão exaltada, mulher-serpente."
52250-10 = "O valor da elegância é medido pelo coração de quem a toca."
52250-11 = "Se o público se sentiu atraído pela história da Shuro, significa que você não foi competente o suficiente."
52250-12 = "Se você acha que faltou algo, por que não escreve uma história nova?"
52250-13 = "Eu...... não posso perdoar isso."
52250-17 = "Vou jogar aquele idiota no Crepúsculo agora mesmo e ver a cara dele gritando de pavor――"
52250-27 = "......Já chega disso."
52250-28 = "Você não sabe exatamente o que aquela criança significa para mim, sabe?"
52250-29 = "Ou será que você pretende descarregar sua frustração em cima de mim, usando a minha suposta imaturidade como desculpa?"
52250-30 = "N, não...... não é sobre a Kokuriko-sama......"
52250-31 = "Eu disse para jogar a Shuro no Crepúsculo."
52250-32 = "Você, como uma artista de histórias misteriosas, deveria saber muito bem o resultado que isso traria."
52250-33 = "......S, sim."
52250-34 = "Não importa o que você faça, sua história perdeu o poder. Você não consegue mais tecer o medo."
52250-35 = "Uma contadora de histórias talentosa transforma até imprevistos em ganchos para a trama...... #n Você está descontando sua raiva no público só porque as coisas não saíram como queria?"
52250-36 = "Que coisa feia."
52250-37 = "P, peço perdão......!"
52250-38 = "Eu nunca duvidaria da vontade da Kokuriko-sama!"
52250-39 = "É só que...... eu não consegui conter minha frustração......"
52250-45 = "......Já chega."
52250-46 = "No momento em que a Hyakkaryouran e o Sensei da Schale chegaram aqui, o capítulo do medo e da divisão se encerrou."
52250-47 = "Deixaremos o resto com Hitotsume."
52250-48 = "E aquele idiota...... não, o que faremos com a Shuro?"
52250-49 = "Bem...... se ela encontrou seu próprio caminho, não há motivo para arrastá-la à força, mas......"
52250-57 = "Chegou a hora de acertar as contas! Clube das Flores, Pássaros, Vento e Lua!"
52250-58 = "Azami Habu...... não, mulher-serpente. #n A história desagradável de vocês termina aqui."
52250-59 = "Se se renderem, a Hyakkaryouran tratará vocês com cortesia. #n ......Se não quiserem, não vamos pegar leve."
52250-60 = "Hyakkaryouran, quando foi que vocês......!"
52250-61 = "Só porque o poder do livro misterioso enfraqueceu, você acha mesmo que tipos como vocês podem vencer?"
52250-62 = "Se você acha que vamos recuar só com essa ameaça, está muito enganada!"
52250-63 = "Agora temos a Nagusa-senpai, que pode manejar a Hyakuren para abater as assombrações!"
52250-64 = "Não tenho medo nenhum de contadores de histórias!"
52250-65 = "Eu já disse que sou uma artista de histórias misteriosas, não uma contadora de histórias!? #n Todas vocês......!"
52250-66 = "......Como sempre, o coração humano é um ser incompreensível."
52250-67 = "Por que vocês perseguem uma história tão entediante, mesmo conhecendo o desfecho?"
52250-68 = "Hã? Quem é aquela mulher......?"
52250-69 = "Aquela é――"
52250-74 = "Kokuriko, a presidente do Clube das Flores, Pássaros, Vento e Lua."
52250-75 = "Finalmente se lembrou de mim? Minha cara sucessora."
52250-76 = "......Eu não tenho uma senpai como você."
52250-77 = "Se um simples relacionamento pudesse ser apagado com palavras, Ayame já teria feito isso."
52250-78 = "......"
52250-79 = "Você, que se agarra a quem acredita ser seu amigo, pode realmente afastar o fato de que eu sou sua senpai?"
52250-80 = "É por isso que eu disse que você é incompetente e arrogante."
52250-81 = "Senpai, não dê ouvidos ao que ela diz."
52250-82 = "Sim. Ela deve estar dizendo qualquer coisa só para ganhar tempo."
52250-83 = "Se a derrotarmos rápido――"
52250-84 = "E, espere, Renge-senpai!"
52250-85 = "Sinto uma aura estranha vindo da presidente do Clube das Flores, Pássaros, Vento e Lua."
52250-86 = "Mesmo tendo abandonado suas responsabilidades, você ainda é sangue da família Kadenokouji...... é isso?"
52250-87 = "Então você percebeu a aura do 'Livro Misterioso'."
52250-88 = "[s] \"Livro Misterioso......?\""
52250-89 = "Quer dizer que existem outros......?"
52250-90 = "Aquela pirralha disse que só haviam dois......"
52250-91 = "Desde o início, o Clube das Flores, Pássaros, Vento e Lua tinha três livros."
52250-94 = "O 'Inou Mononokeroku', que reflete os desejos humanos."
52250-97 = "O 'Inotei Mononokeroku', que reflete os medos humanos."
52250-101 = "E o que reflete as próprias pessoas...... o 'Inou Reikairoku'."
52250-102 = "Shuro achava que ele tinha desaparecido no Grande Campo de Neve há 20 anos, mas......"
52250-103 = "Bem, não podemos dizer que 'perdido' esteja errado."
52250-104 = "É porque estou forçando a regeneração do que perdeu sua forma original e se dispersou."
52250-105 = "[s] \"......?\""
52250-106 = "Não importa quantos livros misteriosos vocês tenham, não pretendo recuar."
52250-107 = "Porque prometi a Kuzunoha-sama, ao Sensei [USERNAME] e a toda a Hyakkaryouran."
52250-108 = "Que não deixaria a Ayame sozinha nunca mais."
52250-109 = "Kokuriko, onde está Ayame?"
52250-111 = "......Você ainda está sonhando acordada?"
52250-112 = "'Kuzunoha', 'uma presidente perfeita', 'uma amizade inquebrável'...... tudo isso não passa de fantasia."
52250-113 = "Se você insiste que é real, eu também tenho um plano."
52250-114 = "Quer dar uma olhada? Na 'realidade' que todos tentam desviar o olhar."
52250-123 = "[ns] \"Pessoal, cuidado!\""
52250-130 = "Próximo Episódio; Do Fundo das Sombras Profundas e Escuras"

