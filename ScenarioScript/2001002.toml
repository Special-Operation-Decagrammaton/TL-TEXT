[translation]
2001002-1 = "修行・会席料理編"
2001002-2 = "シャーレ・居住区"
2001002-3 = "（仕事を終えてシャーレに戻ると、ノドカが温泉郷の女将の姿で待っていた）"
2001002-4 = "お帰りなさいませ。お待ちしておりました、先生。"
2001002-5 = "本日も、お疲れ様でございました。"
2001002-11 = "さあ上着はこちらへ、シワにならないようハンガーにかけておきますので。"
2001002-12 = "[s] \"……ノドカ？\""
2001002-13 = "モモトークでお話した通りですよ、修行の一環です。"
2001002-14 = "いつか再び227号温泉郷を復活させた時のため、今のうちに温泉郷の女将としてのスキルをしっかり身につけておこうと思ったんです！"
2001002-15 = "ですが修行をしようにも、レッドウィンターには他に温泉がありませんし、かといってゲヘナに行くのも……。"
2001002-16 = "というわけで、シャーレで修行をさせていただこうかと！"
2001002-17 = "[s1] \"最後だけ一気に飛躍した気が……？\"\n[s2] \"どうしてシャーレで……？\""
2001002-18 = "ここシャーレの居住区には寝具類はもちろん、調理施設やお風呂もありますし。"
2001002-19 = "ここシャーレの居住区には寝具類はもちろん、調理施設やお風呂もありますし。"
2001002-20 = "温泉郷の女将としての修行には、ぴったりなんです！"
2001002-21 = "それに修行の合間合間に、先生の無防備な表情や真剣な横顔をすぐ近くで盗み見ることができますし……えへ、ぅえへへへ……"
2001002-22 = "……はっ！い、今のはお気になさらず……。"
2001002-23 = "と、ところで先生？お夕食はまだですよね？"
2001002-24 = "よろしければ修行の一環として、今日の夕食は私にご用意させてください！"
2001002-25 = "本日私がご用意するのは……"
2001002-26 = "なんと、会席料理です！"
2001002-27 = "[s3] \"……会席料理！？\"\n[s4] \"それ、すっごい高いやつでは……！？\""
2001002-28 = "ご心配なく。今日のために食費を削って、頑張って貯金しておきました。"
2001002-29 = "ご心配なく。今日のために食費を削って、頑張って貯金しておきました。"
2001002-30 = "ここでお金をケチった物をお出ししては、理想的な温泉郷運営はできませんので！"
2001002-31 = "すぐにご用意しますから、少々お待ちください！"
2001002-39 = "お待たせしました、先生。"
2001002-40 = "まずは食欲を増進させる、先付からお出しします。"
2001002-41 = "最初の料理は、明太子をふんだんに使った……"
2001002-42 = "……「うんめえ棒」です！"
2001002-43 = "[s] \"……「うんめえ棒」？\""
2001002-44 = "はい！旧校舎ではなかなか手に入らない、高級なお菓子なんですよ！"
2001002-45 = "この「うんめえ棒」はとっても美味しいのですが、そのしょっぱさのせいか、食べてみるとお腹がいっぱいになるどころかさらにお腹が空くんですよね……そこで、実は前菜料理的なものとしてバッチリなのではと！"
2001002-46 = "さあ先生、ぜひお早めに召し上がってください！"
2001002-51 = "いかがですか？美味しいですよね？"
2001002-52 = "[s5] \"「うんめえ棒」だからね……。\"\n[s6] \"いつも通り美味しいね……。\""
2001002-53 = "ふふっ、お口に合ったのでしたら何よりです。"
2001002-54 = "ふふっ、お口に合ったのでしたら何よりです。"
2001002-55 = "それでは引き続き、次のメニューをお持ちいたします。"
2001002-62 = "次は椀物です！"
2001002-63 = "今日は寒かったことですし、コンソメスープのように濃い出汁で作ったお吸い物をご用意いたしました。"
2001002-64 = "[s] \"お吸い物の割には、ちょっと濁ってる……？\""
2001002-65 = "それは秘伝の食材を使って出汁を取っているからですね。"
2001002-66 = "さあ、冷めてしまう前にぜひ。"
2001002-72 = "[ns7] \"この味って……？\"\n[ns8] \"まさか……。\""
2001002-75 = "あら、お口に合いませんでしたか？"
2001002-76 = "おかしいですね、コーンポタージュ味の「うんめえ棒」を使って豪勢に旨味を出したのですが……"
2001002-77 = "やっぱりカレー味の「うんめえ棒」の方が……？"
2001002-78 = "[s] \"えっと、味の問題以前にまた「うんめえ棒」……？\""
2001002-79 = "では最後に、お口直しの水菓子です。"
2001002-82 = "デザートにご用意したのは……"
2001002-83 = "レモン味の「うんめえ棒」です！"
2001002-84 = "[s] ”また出てきた！？あと水菓子じゃない！？”"
2001002-85 = "実は以前、思い切って大量のうんめえ棒セットを購入したんです。"
2001002-86 = "それ一つで10種類のうんめえ棒が楽しめるという、非常に豪勢なセットを……！"
2001002-87 = "ちょっと贅沢になってしまいましたが、温泉郷に来てくださったお客様のためであれば、これくらいの投資は惜しくありません！"
2001002-88 = "[s] （うんめえ棒は何も悪くない、悪くないけど……）"
2001002-91 = "そういうわけで、いかがでしたか先生？私の会席料理は、ご満足いただけましたでしょうか？"
2001002-92 = "ふふっ。どうやらあまりの美味しさに衝撃を受けて、何も言えないご様子ですね。"
2001002-93 = "この様子なら将来復活した227号温泉郷は、美食家たちの新たな聖地として注目を浴びれるかも……？"
2001002-95 = "その後ノドカと一緒に市内に向かい、夕食に会席料理をご馳走した。"
2001002-96 = "その時のノドカはまさに百面相という感じだったものの、衝撃でその後の数日間、食欲を失ってしまったらしい……。"
