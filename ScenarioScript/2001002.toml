[translation]
2001002-1 = "Capítulo de Treinamento: Culinária Kaiseki"
2001002-2 = "Schale - Área Residencial"
2001002-3 = "（Ao terminar o trabalho e voltar para o Schale, Nodoka estava esperando vestida como uma gerente de estalagem termal）"
2001002-4 = "Bem-vindo de volta. Estava à sua espera, Sensei."
2001002-5 = "Obrigada pelo seu trabalho duro hoje."
2001002-11 = "Por favor, deixe seu casaco aqui, vou pendurá-lo no cabide para não amassar."
2001002-12 = "[s] \"……Nodoka?\""
2001002-13 = "Como conversamos no MomoTalk, isso é parte do meu treinamento."
2001002-14 = "Para quando eu puder reabrir a Estalagem Termal 227 no futuro, decidi que preciso dominar as habilidades de uma gerente de estalagem agora mesmo!"
2001002-15 = "Mas, para treinar, não há outras fontes termais em Red Winter, e ir até Gehenna seria..."
2001002-16 = "Então, pensei em fazer meu treinamento aqui no Schale!"
2001002-17 = "[s1] \"Senti que o final dessa frase deu um salto enorme……?\"\n[s2] \"Por que no Schale……?\""
2001002-18 = "Aqui na área residencial do Schale, além de roupas de cama, há instalações de cozinha e até banheiros."
2001002-19 = "Aqui na área residencial do Schale, além de roupas de cama, há instalações de cozinha e até banheiros."
2001002-20 = "É o lugar perfeito para o meu treinamento como gerente de estalagem!"
2001002-21 = "Além disso, nos intervalos do treinamento, posso observar de perto suas expressões desprevenidas e seu perfil sério…… ehe, uhehehehe……"
2001002-22 = "……Ah! I-ignore o que eu disse agora……"
2001002-23 = "A-a propósito, Sensei? Você ainda não jantou, certo?"
2001002-24 = "Se não se importar, como parte do meu treinamento, deixe-me preparar o seu jantar de hoje!"
2001002-25 = "O que preparei para você hoje é……"
2001002-26 = "Nada menos que um banquete Kaiseki!"
2001002-27 = "[s3] \"……Kaiseki!?\"\n[s4] \"Isso não é algo extremamente caro……!?\""
2001002-28 = "Não se preocupe. Cortei gastos com comida e economizei bastante para este dia."
2001002-29 = "Não se preocupe. Cortei gastos com comida e economizei bastante para este dia."
2001002-30 = "Não posso oferecer algo barato se quero gerenciar uma estalagem termal ideal!"
2001002-31 = "Vou preparar tudo agora mesmo, por favor, aguarde um momento!"
2001002-39 = "Obrigada por esperar, Sensei."
2001002-40 = "Para começar, servirei o Sakizuke para abrir o apetite."
2001002-41 = "O primeiro prato é feito com bastante Mentaiko……"
2001002-42 = "……é um \"Unmee-bou\"!"
2001002-43 = "[s] \"……\"Unmee-bou\"?\""
2001002-44 = "Sim! É um doce de luxo que é difícil de encontrar no prédio antigo!"
2001002-45 = "Este \"Unmee-bou\" é muito gostoso, mas talvez por ser salgado, em vez de encher a barriga, ele abre ainda mais o apetite…… Por isso, achei que seria perfeito como um aperitivo!"
2001002-46 = "Vamos, Sensei, por favor, coma logo!"
2001002-51 = "O que achou? Está delicioso, não está?"
2001002-52 = "[s5] \"Bem, é um \"Unmee-bou\"……\"\n[s6] \"Está delicioso como sempre……\""
2001002-53 = "Fufu, fico feliz que tenha agradado ao seu paladar."
2001002-54 = "Fufu, fico feliz que tenha agradado ao seu paladar."
2001002-55 = "Então, continuarei trazendo o próximo prato."
2001002-62 = "O próximo é o Wanmono!"
2001002-63 = "Como hoje está frio, preparei uma sopa clara feita com um caldo rico, como um consomê."
2001002-64 = "[s] \"Para uma sopa clara, ela está um pouco turva……?\""
2001002-65 = "Isso é porque usei um ingrediente secreto para fazer o caldo."
2001002-66 = "Vamos, aproveite antes que esfrie."
2001002-72 = "[ns7] \"Este sabor é……?\"\n[ns8] \"Não pode ser……\""
2001002-75 = "Ora, não agradou ao seu paladar?"
2001002-76 = "Que estranho, usei o \"Unmee-bou\" sabor creme de milho para dar um toque luxuoso ao caldo……"
2001002-77 = "Será que o \"Unmee-bou\" sabor curry teria sido melhor……?"
2001002-78 = "[s] \"Bem, antes do sabor, é outro \"Unmee-bou\"……?\""
2001002-79 = "Então, por fim, aqui está a sobremesa para limpar o paladar."
2001002-82 = "Como sobremesa, preparei..."
2001002-83 = "Um bastão sabor limão!"
2001002-84 = "[s] ”De novo isso!? E nem é uma sobremesa de verdade!?”"
2001002-85 = "Na verdade, um tempo atrás, tomei coragem e comprei um conjunto enorme de bastões."
2001002-86 = "É um conjunto super luxuoso onde você pode aproveitar 10 tipos diferentes de bastões em um só...!"
2001002-87 = "Acabou sendo um pouco extravagante, mas pelos clientes que vieram visitar a estância termal, não me importo de fazer esse investimento!"
2001002-88 = "[s] (Os bastões não têm culpa, não têm culpa, mas...)"
2001002-91 = "Sendo assim, o que achou, Sensei? Ficou satisfeito com o meu banquete?"
2001002-92 = "Fufu. Parece que você ficou tão chocado com o sabor incrível que nem consegue dizer nada."
2001002-93 = "Desse jeito, a Estância Termal 227, quando for reaberta no futuro, talvez se torne o novo local sagrado dos gourmets...?"
2001002-95 = "Depois disso, fui com Nodoka até a cidade e a convidei para um banquete no jantar."
2001002-96 = "Nodoka fez várias expressões diferentes na hora, mas parece que o choque a deixou sem apetite pelos dias seguintes..."
