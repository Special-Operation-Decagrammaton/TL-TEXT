[translation]
1000305-1 = "ペロロ様救出作戦"
1000305-2 = "ゲームセンター"
1000305-5 = "先生、こちらです！こっち！"
1000305-6 = "見てください、巨大なペロロ様のぬいぐるみが！"
1000305-7 = "あの柔らかそうな足……。#nふああ……見てるだけで心がとろけそうです。"
1000305-8 = "あのぬいぐるみは確か、去年のペロロフェスティバルで限定販売されたもののはずですが……。"
1000305-9 = "ブラックマーケットでも中々手に入らないあのぬいぐるみが、どうしてここにあるんでしょうか？"
1000305-10 = "ふふっ。とにかく、ペロロ様を救出できる絶好のチャンスです！"
1000305-11 = "それでは……いきます！"
1000305-14 = "ああっ、もう少し……もう少し！"
1000305-16 = "……うう、良い感じだったのに失敗してしまいました。"
1000305-17 = "でも諦めません！次こそは……！"
1000305-18 = "はああっ！"
1000305-21 = "……うう、また失敗してしまいました。"
1000305-22 = "まだまだ挑戦したいのですが、もうお金が……。"
1000305-23 = "どうやら私とペロロ様の縁は、ここまでのようです……。"
1000305-24 = "[s] \"そろそろ私の出番かな。\""
1000305-25 = "え……？先生も、私のペロロ様のぬいぐるみを狙ってたんですか？"
1000305-26 = "[s] \"大人の力、見せてあげる。\""
1000305-27 = "大人の力……！ちょっと興奮してきました！"
1000305-28 = "果たして……。"
1000305-30 = "[USERNAME]、148回目の挑戦……。"
1000305-31 = "[s] \"今度こそ……！\""
1000305-32 = "あの、先生。大人の力ってもしかして……。"
1000305-33 = "[s] \"できない時は、できるまで挑戦するのが大人！\""
1000305-34 = "あはは……無謀なように見えますが、確かにある意味では一番確実な方法かもですね……。"
1000305-35 = "（使ったお金、もう五桁を超えているような気がしますが……）"
1000305-36 = "先生、ファイトです！頑張ってください！"
1000305-37 = "[s] \"はあぁぁぁぁっ！\""
1000305-43 = "ぬいぐるみが倒れました！やりました、先生！"
1000305-44 = "100回以上苦戦しましたが……見事に救出作戦成功ですね！"
1000305-45 = "[s] \"はい、プレゼント。\""
1000305-46 = "えぇ！？このペロロ様のぬいぐるみ、私にくれるんですか？"
1000305-47 = "でも、先生がせっかく大人の力を発揮して取ったぬいぐるみなのに……いいんですか？"
1000305-48 = "[s] \"こういうのは、本当に欲しい人の手に渡るのが一番だよ。\""
1000305-49 = "……そうかもしれません。先生のそういう、大切なことのためには何かを手放すことも辞さないところ、流石、本当の大人って感じがします。"
1000305-50 = "ありがとうございます、先生。"
1000305-51 = "そのお気持ちと一緒に、このぬいぐるみのこと、大事にしますね！"
