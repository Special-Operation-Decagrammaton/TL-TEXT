[translation]
1000305-1 = "Operação de Resgate do Peroro-sama"
1000305-2 = "Centro de Jogos"
1000305-5 = "Sensei, por aqui! Venha!"
1000305-6 = "Olhe só, é uma pelúcia gigante do Peroro-sama!"
1000305-7 = "Aquelas patinhas que parecem tão macias... #nAh... só de olhar, meu coração derrete."
1000305-8 = "Se não me engano, aquela pelúcia foi vendida como edição limitada no Festival Peroro do ano passado..."
1000305-9 = "Como ela veio parar aqui, se é algo tão difícil de conseguir até no mercado negro?"
1000305-10 = "Hehe. De qualquer forma, esta é a chance perfeita para resgatar o Peroro-sama!"
1000305-11 = "Então... lá vou eu!"
1000305-14 = "Ah, só mais um pouco... só mais um pouco!"
1000305-16 = "...Ugh, estava indo tão bem, mas acabei falhando."
1000305-17 = "Mas não vou desistir! Na próxima eu consigo...!"
1000305-18 = "Haaa!"
1000305-21 = "...Ugh, falhei de novo."
1000305-22 = "Eu queria continuar tentando, mas meu dinheiro acabou..."
1000305-23 = "Parece que o meu destino com o Peroro-sama termina aqui..."
1000305-24 = "[s] \"Acho que chegou a minha vez.\""
1000305-25 = "Hã...? Sensei, você também estava de olho na minha pelúcia do Peroro-sama?"
1000305-26 = "[s] \"Vou te mostrar o poder de um adulto.\""
1000305-27 = "O poder de um adulto...! Estou ficando empolgada!"
1000305-28 = "Será que vai dar certo..."
1000305-30 = "[USERNAME], 148ª tentativa..."
1000305-31 = "[s] \"Desta vez vai...!\""
1000305-32 = "Diga, Sensei. Esse tal de 'poder de um adulto' seria, por acaso..."
1000305-33 = "[s] \"Quando não se consegue, o adulto continua tentando até conseguir!\""
1000305-34 = "Ahaha... parece imprudente, mas, de certa forma, talvez seja o método mais garantido..."
1000305-35 = "(Tenho a impressão de que o dinheiro gasto já passou de cinco dígitos...)"
1000305-36 = "Sensei, força! Não desista!"
1000305-37 = "[s] \"Haaaaaa!\""
1000305-43 = "A pelúcia caiu! Conseguimos, Sensei!"
1000305-44 = "Depois de sofrer por mais de 100 tentativas... a operação de resgate foi um sucesso!"
1000305-45 = "[s] \"Aqui, um presente.\""
1000305-46 = "Hã!? Você vai me dar essa pelúcia do Peroro-sama?"
1000305-47 = "Mas, Sensei, você se esforçou tanto usando o poder de um adulto para pegá-la... tem certeza?"
1000305-48 = "[s] \"Coisas assim devem ficar com quem realmente as deseja.\""
1000305-49 = "...Talvez você tenha razão. Esse seu jeito de não hesitar em abrir mão de algo por uma causa importante... como esperado, você é um adulto de verdade."
1000305-50 = "Muito obrigada, Sensei."
1000305-51 = "Vou cuidar muito bem desta pelúcia, junto com o carinho que você me deu!"
