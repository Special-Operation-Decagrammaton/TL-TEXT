[translation]
12140-1 = "Episódio 14; Batalha de Abydos (1)"
12140-8 = "Seu desgraçado!!!"
12140-9 = "……."
12140-10 = "……."
12140-12 = "Detectamos uma aproximação... É o diretor da Kaiser!"
12140-14 = "Hum. Eu pretendia ir até a escola, mas que recepção calorosa. Fico lisonjeado."
12140-15 = "O que significa isso? Uma empresa atacando a cidade... Mesmo que vocês sejam os proprietários das terras, não deveriam ter esse direito!"
12140-16 = "Além disso, a escola ainda pertence a nós, de Abydos! Esse ataque é um ato ilegal evidente! Vamos denunciar vocês ao Conselho Estudantil Geral!"
12140-17 = "Então o recrutamento era mentira desde o começo? ...Não, esqueça isso, onde está a Hoshino-senpai?"
12140-18 = "Seu vilão... Devolva a Hoshino-senpai!"
12140-19 = "……Hehehe, do que você está falando?"
12140-20 = "Denunciar ao Conselho Estudantil Geral? Que ideia interessante, por que não tenta fazer isso agora mesmo?"
12140-21 = "Vocês já imploraram ao Conselho Estudantil Geral sobre essa situação várias vezes, não é? E, por acaso, eles moveram um dedo sequer?"
12140-22 = "……."
12140-23 = "Eu sabia que não. Afinal, o Conselho Estudantil Geral não pode agir agora."
12140-24 = "Não precisa ser o Conselho Estudantil Geral. Alguma outra escola já veio ajudar vocês até hoje? ...Acho que já entenderam, não é?"
12140-25 = "Ninguém, absolutamente ninguém, vai estender a mão para vocês."
12140-26 = "……."
12140-27 = "……."
12140-28 = "……."
12140-29 = "……."
12140-31 = "A última integrante do conselho estudantil de Abydos, Hoshino, se retirou. O conselho estudantil de Abydos, na prática, já não existe mais."
12140-32 = "Vocês não são mais nada."
12140-33 = "……！！"
12140-34 = "！！"
12140-35 = "Determinamos que Abydos, sem clubes oficiais, comitês, conselho estudantil ou mesmo um distrito autônomo, é incapaz de se manter como uma escola independente na cidade acadêmica..."
12140-36 = "Não tem jeito. Como proprietária deste distrito, a Kaiser Corporation assumirá o controle daquela escola."
12140-37 = "Que tal chamarmos a nova escola de 'Escola de Treinamento Profissional Kaiser'?"
12140-38 = "！！"
12140-39 = "O quê...? Do que você está falando...!?"
12140-40 = "Mesmo sem o conselho estudantil, Abydos ainda tem o Comitê de Contramedidas!! Nós ainda estamos aqui, não pode simplesmente decidir isso!"
12140-42 = "Isso é..."
12140-43 = "……Ayane-chan?"
12140-44 = "O Comitê de Contramedidas não é um comitê oficialmente reconhecido..."
12140-45 = "……O quê!?"
12140-46 = "Quando o Comitê de Contramedidas foi formado, Abydos já não tinha mais um conselho estudantil..."
12140-47 = "O-o quê...!?"
12140-48 = "Exatamente. No fim das contas, é apenas um comitê não oficial, sem aprovação documental formal. Ou seja, não há nada que comprove a existência de vocês."
12140-49 = "Mas alegrem-se. Se a Escola de Ensino Médio Abydos deixar de existir, vocês estarão finalmente livres daquele inferno de dívidas."
12140-52 = "Por, por que... o que você está fazendo!?"
12140-53 = "Por que atacar Abydos, por que atacar a cidade!!"
12140-56 = "Quanto ao 'porquê'..."
12140-57 = "Não há nada de estranho nisso, Hoshino-san."
12140-58 = "Nós pagaremos a maior parte daquela dívida, é claro. Afinal, essa foi a promessa que fizemos entre nós."
12140-59 = "Dito isso... como você se retirou, infelizmente não restou nenhum membro oficial do conselho estudantil na Escola de Ensino Médio Abydos. Sem isso, a escola não pode funcionar, não é?"
12140-60 = "……！！"
12140-61 = "Por que você acha que estávamos apoiando as ações fraudulentas daquela empresa insignificante?"
12140-62 = "Tomar as terras do distrito só criaria mais uma zona sem lei, como um mercado negro."
12140-63 = "Lugares assim existem aos montes em Kivotos."
12140-64 = "Mas... e se uma nova escola, gerida por uma empresa, nascesse aqui...?"
12140-65 = "Essa nova existência que surgiu em Abydos, que tipo de impacto será que ela trará a este Kivotos?"
12140-66 = "……!"
12140-67 = "……No entanto, isso não passa de um mero entretenimento."
12140-68 = "Hoshino-san, nosso objetivo desde o início era você."
12140-69 = "Fazer com que você assinasse o contrato e obter todos os direitos sobre você."
12140-70 = "Cooperamos com a Kaiser Corporation apenas porque nossos interesses coincidiam para esse fim. Foi só isso."
12140-71 = "Parece que houve um mal-entendido da sua parte... Peço desculpas se causei uma interpretação errada. Mas eu nunca fiz parte da Kaiser desde o início. Em momento algum eu disse que a 'nossa empresa' era a Kaiser Corporation."
12140-72 = "Mesmo tendo em mãos o maior mistério de Kivotos, como você, eu jamais desperdiçaria algo tão valioso de uma forma tão banal."
12140-75 = "Estudá-la como um espécime experimental, analisá-la e compreendê-la."
12140-76 = "Este experimento fascinante é exatamente o que ansiávamos observar."
12140-77 = "Em suma, é isso."
12140-83 = "……."
12140-84 = "……Entendi."
12140-85 = "Eu……"
12140-87 = "……Fui enganada por um adulto de novo."
12140-89 = "……."
12140-90 = "……Desculpem, pessoal. Por minha causa, tudo……"
12140-91 = "Shiroko-chan, Nonomi-chan, Serika-chan, Ayane-chan……"
12140-92 = "……Yume-senpai."
12140-93 = "……."
12140-94 = "Desculpe……"
12140-95 = "……."
12140-96 = "Eu……"
12140-98 = "…………."
12140-99 = "Sensei……"
12140-102 = "……."
12140-103 = "Não pode ser, se as coisas chegarem a esse ponto, todo o nosso esforço até agora……"
12140-104 = "……Ora, será que vocês estavam falando sério?"
12140-105 = "Vocês realmente pretendiam levar centenas de anos para quitar essa dívida?"
12140-106 = "Isso é surpreendente. Eu pensei que vocês estivessem se esforçando apenas o suficiente para ter uma desculpa e se consolarem dizendo 'pelo menos eu tentei' quando finalmente desistissem no final……"
12140-107 = "……!!"
12140-108 = "Por que, afinal, vocês se esforçaram tanto? Para quê?"
12140-109 = "Se você disser mais uma palavra……"
12140-112 = "Eu atiro."
12140-113 = "M-mas……"
12140-114 = "……Lutar aqui agora, será que isso mudaria alguma coisa?"
12140-115 = "Ayane-chan!?"
12140-116 = "Mesmo agora, um número enorme de tropas está vindo em nossa direção……"
12140-117 = "Mesmo que lutássemos e vencêssemos…… o que faríamos depois?"
12140-118 = "Se a escola desaparecer, não haverá mais motivo para lutar. E mesmo que conseguíssemos recuperar a escola de alguma forma, ainda carregaríamos uma dívida enorme……"
12140-119 = "……Ayane-chan."
12140-120 = "Ayane……"
12140-121 = "As terras que foram negociadas não voltarão. E acima de tudo, sem a Hoshino-senpai, sem o conselho estudantil, em um estado como este……"
12140-122 = "O que mais um comitê não oficial como o nosso poderia fazer……"
12140-123 = "Por que, por que só nós temos que passar por isso……"
12140-124 = "Hoshino-senpai…… o que devemos fazer……"
12140-125 = "Ayane-chan……"
12140-126 = "……."
12140-127 = "……."
12140-128 = "BOOOOM!!"
12140-129 = "！？"
12140-131 = "O quê!? C-confirmei uma grande explosão ao norte!"
12140-132 = "O Pelotão Bravo, que deveria se encontrar conosco, foi pego nela...!!"
12140-133 = "O quê!?"
12140-134 = "CABUUUUUM!!"
12140-135 = "Confirmei outra no leste! O Pelotão Mike, que também deveria se encontrar conosco, foi atingido por uma explosão massiva de C4...!!"
12140-136 = "O que está acontecendo!? O pessoal de Abydos deveria estar todo aqui..."
12140-141 = "Francamente... Se tivessem ficado quietos e ouvido, por que tanto chororô..."
12140-142 = "……!?"
12140-152 = "Olho por olho, dente por dente. Seguir o próprio caminho, impiedosa e solitariamente..."
12140-155 = "Não era esse o lema de vocês, o Grupo de Mascaradas de Roupa de Banho?"
12140-156 = "……V-você é...!?"
12140-157 = "Não sabem o que fazer, não sabem como agir. Tudo o que tentam acaba em fracasso..."
12140-158 = "Mesmo que consigam passar por isso, só haverá adversidades e sofrimento pela frente..."
12140-160 = "E daí, por acaso!?"
12140-161 = "E-eh...?"
12140-162 = "Seus amigos estão em perigo, não estão!? Mesmo assim, ficam pensando em bobagens e deixando que tirem tudo de vocês, é isso que vocês aceitam!?"
12140-163 = "Vocês eram um grupo tão patético assim!?"
12140-164 = "Não, não, Aru-chan, pega leve com elas. A garota de óculos é sensível, essas coisas acontecem."
12140-165 = "P-por que vocês estão aqui...!?"
12140-166 = "Ah. Mas, de qualquer forma, o pecado de ter feito minha querida garota de óculos chorar é grave, viu? Então, agora..."
12140-170 = "Só nos resta acabar com eles!!!"
12140-171 = "Fufu, fufufufufu... Estou pronta, Aru-sama. Ainda tenho muitas bombas preparadas..."
12140-172 = "Ah... E pensar que a gente só veio aqui para comer um lámen..."
12140-173 = "……Bloqueei os reforços inimigos com as bombas que enterrei. Enquanto isso, vamos neutralizar o comandante inimigo e destruir a cadeia de comando."
12140-174 = "Isso vai fazer o grupo deles desmoronar de uma vez... Era uma tática que eu deveria usar contra o Comitê Disciplinar, mas... bem, vamos considerar isso um ensaio."
12140-176 = "Abram os olhos. Vou mostrar a vocês, que estão aí todas desanimadas, como um verdadeiro fora da lei luta."
12140-177 = "Haruka."
12140-178 = "Sim!"
12140-179 = "CABUUUUUM!!"
12140-180 = "DODODODODODODON!!"
12140-181 = "CABUUUUUUUUUUUM!!"
12140-183 = "Uwaaa!?"
12140-187 = "Agora é a hora da nossa colaboração! Podemos contar com você, Sensei!?"
12140-188 = "Vamos mostrar a eles o verdadeiro poder de um 'hard-boiled'!"
12140-189 = "[ns] \"……Certo, vamos nessa!\""
