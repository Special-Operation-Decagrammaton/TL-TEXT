[translation]
12140-1 = "第14話;アビドス攻防戦（１）"
12140-8 = "こんにゃろっ！！！"
12140-9 = "……。"
12140-10 = "……。"
12140-12 = "何者かの接近を確認……カイザーの理事です！"
12140-14 = "ふむ。学校まで出向こうと思ったのだが、お出迎えとは感心だ。"
12140-15 = "これは何の真似ですか？企業が街を攻撃するなんて……いくらあなたたちが土地の所有者だとしても、そんな権利は無いはずです！"
12140-16 = "それに、学校はまだ私たちアビドスのものです！進攻は明白な不法行為！連邦生徒会に通報しますよ！"
12140-17 = "スカウトなんて、最初から嘘だったってこと？……いや、それよりもホシノ先輩はどこ？"
12140-18 = "この悪党め……ホシノ先輩を返して！"
12140-19 = "……くくくっ、何を言ってるのやら。"
12140-20 = "連邦生徒会に通報だと？面白いことを言うじゃないか、今すぐにでもやってみたらどうだ？"
12140-21 = "君たちはこの状況について、今まで何度も連邦生徒会に嘆願してきたのだろう？それで、一度でも動いてくれたことがあったか？"
12140-22 = "……。"
12140-23 = "無かったはずだ。何せ連邦生徒会は今、動けないからな。"
12140-24 = "連邦生徒会でなくても良い。今までどこか他の学園が、君たちのことを助けてくれたことはあったか？……そろそろ分かっただろう？"
12140-25 = "誰一人、君たちに手を差し伸べる者はいない。"
12140-26 = "……。"
12140-27 = "……。"
12140-28 = "……。"
12140-29 = "……。"
12140-31 = "アビドスの最後の生徒会メンバー、[ruby=たかなし]小鳥遊[/ruby]ホシノが退学した。アビドスの生徒会は、もう存在しないも同然。"
12140-32 = "君たちはもう、何者でもない。"
12140-33 = "……！！"
12140-34 = "！！"
12140-35 = "公的な部活も、委員会も、生徒会も、自治区すらも無いアビドスは、学園都市の学校として自立・存続が不可能だと判断……"
12140-36 = "仕方ないな、この自治区の主人である我がカイザーコーポレーションが、あの学校を引き受けるとしよう。"
12140-37 = "そうだな、新しい学校の名前は「カイザー職業訓練学校」にでもしようか。"
12140-38 = "！！"
12140-39 = "え……？な、何を言ってるの……！？"
12140-40 = "生徒会が無くても、アビドスには対策委員会がある！！私たちがまだいるのに、そんな言い分が通じるはずないでしょ！"
12140-42 = "それは……"
12140-43 = "……アヤネちゃん？"
12140-44 = "対策委員会は、公式に許可を受けている委員会じゃない……。"
12140-45 = "……えっ！？"
12140-46 = "対策委員会が出来た時には、もうアビドスには生徒会が無かったから……。"
12140-47 = "え、えっ……！？"
12140-48 = "そうだ。所詮非公認の委員会、正式な書類の承認も下りていない。つまり、君たちの存在を示すものは何も無い。"
12140-49 = "だが喜べ。アビドス高等学校が無くなれば、君たちはもうあの借金地獄からは解放されるのだからな。"
12140-52 = "な、何で……何をしてる！？"
12140-53 = "どうして、どうしてアビドスを、街を攻撃するんだ！！"
12140-56 = "どうしてと言われましても……。"
12140-57 = "何もおかしいことなどありませんよ、ホシノさん。"
12140-58 = "あの借金の大半はきちんと返済させていただきますとも。それが、私たちの間に交わされた約束ですから。"
12140-59 = "それはそうとして……あなたが退学してしまい、残念ながらアビドス高等学校にはこれ以上、公的な生徒会メンバーが残っていないようですね。それでは学校は成り立たないでしょう。"
12140-60 = "……！！"
12140-61 = "私たちが何故、あんなくだらない企業の、詐欺紛いの行為を支援していたのだと思いますか？"
12140-62 = "自治区の土地を奪ったところで、ブラックマーケットのような無法地帯が一つ増えるだけです。"
12140-63 = "そんな場所は、このキヴォトスにいくらでもあります。"
12140-64 = "しかし……もし、企業を主体とした新たな学園が誕生したら……？"
12140-65 = "アビドスに現れるその新しい存在は、果たしてこのキヴォトスにどんな影響をもたらすでしょうか？"
12140-66 = "……っ！"
12140-67 = "……しかし、これは単なる余興に過ぎません。"
12140-68 = "ホシノさん、私たちの目的は最初からあなたでした。"
12140-69 = "あなたに契約書へサインをしてもらうこと、あなたに関する全ての権利を頂くこと。"
12140-70 = "その目的のために利害関係が一致したので、カイザーコーポレーションに協力していた。ただそれだけのことです。"
12140-71 = "何か勘違いされていたようですね……誤解を招いたのなら謝罪しましょう。しかし私は最初から、カイザーの所属ではありません。「私共の企業」がカイザーコーポレーションだとは、一度も言っていないはずです。"
12140-72 = "あなたのようなキヴォトス最高の神秘を手に入れたというのに、まさか、勿体ない形で消耗させるなんてことは致しません。"
12140-75 = "あなたを実験体として研究し、分析し、理解する。"
12140-76 = "この興味深い実験こそが、私たちが観測を渇望していたもの。"
12140-77 = "つまりは、そういうことです。"
12140-83 = "……。"
12140-84 = "……そっか。"
12140-85 = "私は……"
12140-87 = "……また、大人に騙されたんだ。"
12140-89 = "……。"
12140-90 = "……ごめん、みんな。私のせいで、全部……。"
12140-91 = "シロコちゃん、ノノミちゃん、セリカちゃん、アヤネちゃん……。"
12140-92 = "……ユメ先輩。"
12140-93 = "……。"
12140-94 = "ごめん……。"
12140-95 = "……。"
12140-96 = "私は……。"
12140-98 = "…………。"
12140-99 = "先生……。"
12140-102 = "……。"
12140-103 = "そんな、そんなことになったら、今までの私たちの努力が……。"
12140-104 = "……ほう、まさか本気だったのか？"
12140-105 = "本気で何百年もかけて、借金を返済するつもりだったと？"
12140-106 = "これは驚きだ。てっきり、最後に諦める時「でも頑張ったから」と自分を慰める言い訳をするために、ほどほどに頑張っているのだと思っていたが……。"
12140-107 = "……っ！！"
12140-108 = "いったい君たちは、どうしてあんなに努力していたんだ？何のために？"
12140-109 = "あんた、それ以上言ったら……"
12140-112 = "撃つよ。"
12140-113 = "で、ですが……。"
12140-114 = "……今ここで戦って、何かが変わるんでしょうか？"
12140-115 = "アヤネちゃん！？"
12140-116 = "今も、すごい数の兵力がこちらに向かって来ています……。"
12140-117 = "たとえ、戦って勝てたとしても……その後はどうすれば……。"
12140-118 = "学校が無くなったら、もう戦う意味がありません。学校をどうにか取り戻せたとしても、私たちにはまだ、大きな借金が残ったまま……。"
12140-119 = "……アヤネちゃん。"
12140-120 = "アヤネ……。"
12140-121 = "取引された土地だって戻ってきません。何より、ホシノ先輩もいない、生徒会も無い、こんな状態で……"
12140-122 = "私たちみたいな非公認の委員会なんかに、これ以上、一体何が……。"
12140-123 = "どうして、どうして私たちだけ、こんな……"
12140-124 = "ホシノ先輩……私たち、どうすれば……"
12140-125 = "アヤネちゃん……。"
12140-126 = "……。"
12140-127 = "……。"
12140-128 = "ドカアアァァァァン！！"
12140-129 = "！？"
12140-131 = "なっ！？き、北の方で大きな爆発を確認！"
12140-132 = "合流予定のブラボー小隊が巻き込まれて――！！"
12140-133 = "何！？"
12140-134 = "ドカアアァァァァン！！"
12140-135 = "東の方でも確認！合流予定だったマイク小隊も、大量のC4の爆発で……！！"
12140-136 = "何が起きている！？アビドスの連中は、ここにいるので全員のはず……！！"
12140-141 = "全く……大人しく聞いていれば、何を泣き言ばっかり言ってるのかしら……。"
12140-142 = "……！？"
12140-152 = "目には目を、歯には歯を。無慈悲に、孤高に、我が道の如く[ruby=まきょう]魔境[/ruby]を行く……"
12140-155 = "それが、あなたたち覆面水着団のモットーじゃなかったの？"
12140-156 = "……あ、あなたは！？"
12140-157 = "何をすればいいのか分からない、どうすればいいのかも分からない。やる事なす事、全部失敗に終わる……"
12140-158 = "ここを潜り抜けたところで、この先にも逆境と苦難しかない……"
12140-160 = "だから何なのよっっっ！！！！"
12140-161 = "え、えっ……？"
12140-162 = "仲間が危機に瀕してるんでしょう！？それなのに、くだらないことばっかり考えて、このまま全部奪われて、それで納得できるわけ！？"
12140-163 = "あなたたちは、そんな情けない集団だったの！？"
12140-164 = "いやいや、アルちゃんその辺で勘弁してあげなよ。メガネっ娘ちゃんは繊細なんだから、こういう時もあるって。"
12140-165 = "ど、どうしてあなたたちが……！？"
12140-166 = "あはっ。それにしても、私の可愛いメガネっ娘ちゃんを泣かした罪は重いよ？だからもうこれは……"
12140-170 = "ぶっ殺すしかないよねっ！！！"
12140-171 = "ふふっ、ふふふふふ……準備はできています、アル様。仕込んだ爆弾もまだまだたくさんありますので……。"
12140-172 = "はあ。ただ、ラーメンを食べに来ただけのはずなのに……。"
12140-173 = "……埋めておいた爆弾で、敵の増援を遮断。その間に敵の指揮官を無力化させて、指揮体系を崩壊させる。"
12140-174 = "これで相手集団を一気に瓦解させる……本来なら、風紀委員会相手に使うはずの戦術だったけど。ま、予行演習ってことにしておこうか。"
12140-176 = "目を開けなさい。腑抜けた状態のあなたたちに今から、真のアウトローの戦い方を見せてあげるわ。"
12140-177 = "ハルカ。"
12140-178 = "はいっ！"
12140-179 = "ドカアアァァァァン！！"
12140-180 = "ドドドドドドドドォォン！！"
12140-181 = "ドカアアアァァァァァァァン！！"
12140-183 = "うわぁっ！？"
12140-187 = "さあ、今こそ協業の時よ！合わせられるわよね、先生！？"
12140-188 = "そこの[ruby=対策委員会]腰抜けたち[/ruby]に、今こそ真のハードボイルドの力を見せつけてやるわ！"
12140-189 = "[ns] \"……よし、やろう！\""
