[translation]
1007506-1 = "Bem-vindo à Frente de Liberação do Conhecimento!"
1007506-2 = "(O Momotalk da Mel estava curioso sobre ......)"
1007506-3 = "(Depois de fazer algumas tarefas, ele se dirigiu à Frente de Liberação do Conhecimento)."
1007506-6 = "Dentro da biblioteca"
1007506-8 = "Uau, doutor! Você está realmente aqui!"
1007506-9 = "Se eu soubesse que você viria, teria me preparado adequadamente. ......"
1007506-10 = "[s]\"Oh, isso foi irritante ......? Eu voltarei a sair! \""
1007506-11 = "Não, não, não! Se você disser isso para mim, vou sentir pena de você!"
1007506-12 = "...... O quê? Você disse isso de propósito? #nÉ por isso que os adultos são realmente. ......"
1007506-13 = "...... Hmmm, mas o que devo fazer? Não há nada na biblioteca da Knowledge Liberation Front que eu possa recomendar aos Senseies."
1007506-14 = "Se eu lhe mostrasse isso, você ficaria com raiva ...... ou ficaria bastante satisfeito ......?"
1007506-15 = "[\"Estou curioso para ouvi-lo dizer isso. \""
1007506-16 = "Não, não! Prefiro lhe mostrar isso a lhe mostrar a mim ......"
1007506-17 = "Ah! É isso aí! Lá estava aquela coisa!"
1007506-21 = "(Mudando repentinamente de ideia, Mel me levou para o fundo da biblioteca)"
1007506-24 = "Bem-vindo à sala de trabalho da Frente de Liberação do Conhecimento em ......!"
1007506-25 = "[s1]\"Ke, está bem bagunçado. ......\"\n[s2]\"Este é o campo de batalha do Mel. \"\"\n[s2]\"}\"\n1007506-28 = \"Um campo de batalha ou um lugar para voltar ao início, eu acho.\"\n1007506-29 = \"Mas você não sabe o que isso significa, não é mesmo? Vejamos: ......\"\n1007506-30 = \"...... Bem, tudo bem. Não preciso esconder isso.\"\n1007506-34 = \"...... Tenho vergonha de dizer isso, mas há muito mais coisas que não saem como eu quero em meu trabalho criativo.\"\n1007506-35 = \"Você fica deprimido por causa de coisas triviais ou fica preso sem poder fazer nada. ......\"\n1007506-36 = \"Às vezes, sinto vontade de jogar tudo fora, não apenas as fotos.\"\n1007506-37 = \"Você se sente como um soldado derrotado esperando a próxima ordem. O #nMorale está tão baixo que você não consegue nem mover a ponta dos dedos e, ainda assim, seus superiores lhe ordenam que saia e os apoie.\"\n1007506-38 = \"Quando isso acontece, tento voltar para cá e fazer meu manuscrito.\"\n1007506-39 = \"Quando me acalmei, disse que ainda posso fazer isso, que ainda posso dar o meu melhor. #nTreinamento e tipo de reabilitação mental?\"\n1007506-40 = \"É engraçado, não é? Eles estão sofrendo por causa das fotos e estão tentando fazer com que isso desapareça!\"\n1007506-41 = \"Os criadores são uma raça muito estranha! Wahaha!\"\n1007506-42 = \"[s3]\"Lutar contra esses sentimentos e continuar a criar é ......\"\n[s4]\"Tenho certeza de que é muito mais difícil do que eu imaginava. \"\n1007506-45 = \"Não o levante, senhor. Mesmo assim, no final das contas. ......\"\n1007506-46 = \"'Estou fazendo isso por mim mesmo'.\"\n1007506-47 = \"E? Às vezes é difícil, mesmo quando você está fazendo isso por si mesmo. ......?\"\n1007506-48 = \".......\"\n1007506-49 = \"O sensei de hoje está atingindo um ponto sensível.\"\n1007506-50 = \"[s5]\"Então, pelo menos, eu me lembrarei de que a Frente de Liberação do Conhecimento está lutando ......\"\n[s6]\"Eu me lembrarei de que a Frente de Liberação do Conhecimento está lutando. \"\"\n1007506-56 = \".......\"\n1007506-57 = \"Totalmente ......\"\n1007506-62 = \"[wa:1000]- [log=메루]Não que eu esteja [wa:1280]fazendo algo [wa:380]incrível. [/log]\"\n1007506-65 = \"[wa:550]- [log=메루]E qualquer outra coisa que você queira fazer,[/log].\"\n1007506-66 = \"[wa:1510]- [log=메루]Não tenho habilidades e ....... [/log]\"\n1007506-69 = \"[wa:500]- [log=메루]Então, eu sou ......[/log]\"\n1007506-71 = \"[wa:200]- [log=메루]Talvez eu continue [wa:610]criando [wa:470]. [/log]\"\n1007506-74 = \"[wa:500]- [log=메루]Algo ......[wa:800]assim [wa:450]não é ruim. [/log]\"\n1007506-77 = \"[wa:200]- [log=메루]Em lugares como este: ......[/log]\"\n1007506-78 = \"[wa:1200]- [log=메루]Eu tenho essas conversas com [wa:1030]Senseies. [wa:1630]Talvez isso seja bom. [/log]\"\n1007506-81 = \"[wa:1200]- [log=메루]Porque, veja você, ......[/log]\"\n1007506-83 = \"[wa:60]- [log=메루]A criação requer [wa:820]mudanças, certo? [/log]\"\n1007506-86 = \"[wa:1000]- [log=메루]Porque o sensei também é uma [wa:420]pessoa que [wa:1050]traz [wa:500]mudanças [wa:360]para mim. [/log]\"\n1007506-89 = \"[wa:400]- [log=메루]Wow...[/log].\"\n1007506-91 = \"- [log=메루]Posso ter acabado de dizer algo embaraçoso [wa:940]. [/log]\"\n1007506-94 = \"[wa:450]- [log=메루]Ah, agora nenhum! [wa:850]Esqueça isso [wa:220]Esqueça isso! [/log]\"\n1007506-96 = \"[wa:200]- [log=메루]Ha ha ha! [/log]\"\n1007506-99 = \"[ns7] \"mudar significa ......? \"\n[ns8] \"Especificamente ......? \"\n\""

1007506-103 = "Ele disse, esqueça isso agora."
