[translation]
1007506-1 = "知識解放戦線へ、ようこそ！"
1007506-2 = "（メルのモモトークが気になってしまい……）"
1007506-3 = "（用事が終わってから、知識解放戦線に向かった）"
1007506-6 = "図書館内部"
1007506-8 = "わっ、先生！？本当に来てくれたの！？"
1007506-9 = "来るって分かってたら、ちゃんと準備したのに……！"
1007506-10 = "[s] \"あれ、迷惑だった……？出直してきます！\""
1007506-11 = "いやいやいや！そんなこと言われたら逆に申し訳なくなるじゃん！"
1007506-12 = "……え？わざと言ったの？#nこれだから大人は本当にっ……！"
1007506-13 = "……うーん、でもどうしよっか。知識解放戦線の図書館には、先生にオススメできるようなものが無いんだよね。"
1007506-14 = "見せたら怒られそうな……いや、むしろ喜びそうな気も……？"
1007506-15 = "[s] \"そう言われると気になるなぁ。\""
1007506-16 = "だ、ダメ！あれを見せるくらいなら私……"
1007506-17 = "あ！そうだ！アレがあった！"
1007506-21 = "（急に気が変わったメルに連れられて、図書館の奥に入った）"
1007506-24 = "……知識解放戦線の作業室へ、ようこそ！"
1007506-25 = "[s1] \"け、結構散らかってるね……\"\n[s2] \"ここがメルの戦場なんだ。\""
1007506-28 = "戦場というか、初心に立ち返るための場所、かな。"
1007506-29 = "とかいっても意味わかんないか。えっと……"
1007506-30 = "……ま、いっか。隠す必要もないし。"
1007506-34 = "……自分で言うのも恥ずかしいけど、創作って思い通りにいかないことの方がずっと多くてさ。"
1007506-35 = "些細なことで落ち込んだり、どうしようもなく行き詰まったり……"
1007506-36 = "絵だけじゃなくて、何もかも全部投げ捨てちゃいたい衝動に駆られる時だってある。"
1007506-37 = "次の命令まで待機してる敗残兵にでもなったような気分になるんだ。#n士気はとっくに下がりきって、指先一つまともに動かせないような状態でも、上からやれ支援だの出撃だの命じられるような、ね。"
1007506-38 = "そんな時は、ここに戻って原稿するようにしてるんだ。"
1007506-39 = "一度冷静になって、私はまだやれる、頑張れるって。#n訓練兼メンタルのリハビリ的な？"
1007506-40 = "おかしな話でしょ。絵のせいで苦しんでるのに、それを絵で解消しようとするなんてさ！"
1007506-41 = "クリエイターって本当に変な人種だよね！ワハハ！"
1007506-42 = "[s3] \"そんな気持ちと戦いながら創作を続けるのは……\"\n[s4] \"きっと、私の想像以上に大変なんだろうね。\""
1007506-45 = "持ち上げないでよ、先生。そうは言っても結局さ……"
1007506-46 = "「自分のためにやってる」んだから。"
1007506-47 = "え？自分のためにやってても、大変なときはある……？"
1007506-48 = "……。"
1007506-49 = "今日の先生は、やたらと痛いところを突いてくるなぁ。"
1007506-50 = "[s5] \"それなら、せめて私だけでも……\"\n[s6] \"知識解放戦線が戦ってることを忘れないでいるよ。\""
1007506-56 = "……。"
1007506-57 = "まったく……"
1007506-62 = "[wa:1000]― [log=메루]別に私は、[wa:1280]すごいことを[wa:380]してるわけじゃないよ。[/log]"
1007506-65 = "[wa:550]― [log=메루]他にやりたいことも、[/log]"
1007506-66 = "[wa:1510]― [log=메루]スキルもないし……。[/log]"
1007506-69 = "[wa:500]― [log=메루]だから私は……[/log]"
1007506-71 = "[wa:200]― [log=메루]創作を[wa:610]続けている[wa:470]だけなのかも。[/log]"
1007506-74 = "[wa:500]― [log=메루]なんか……[wa:800]こういうのも[wa:450]悪くないね。[/log]"
1007506-77 = "[wa:200]― [log=메루]こういう場所でさ……[/log]"
1007506-78 = "[wa:1200]― [log=메루]こういう会話を、[wa:1030]先生とするの。[wa:1630]いいかも。[/log]"
1007506-81 = "[wa:1200]― [log=메루]だってほら……[/log]"
1007506-83 = "[wa:60]― [log=메루]創作には[wa:820]変化が必要じゃん？[/log]"
1007506-86 = "[wa:1000]― [log=메루]先生は、[wa:1050]私に[wa:500]変化を[wa:360]もたらしてくれる[wa:420]人でもあるから。[/log]"
1007506-89 = "[wa:400]― [log=메루]うわあー…[/log]"
1007506-91 = "― [log=메루]今恥ずかしいこと[wa:940]言っちゃったかも。[/log]"
1007506-94 = "[wa:450]― [log=메루]あー今のなし！[wa:850]忘れて[wa:220]忘れて！[/log]"
1007506-96 = "[wa:200]― [log=메루]あははは！[/log]"
1007506-99 = "[ns7] \"変化って……？\"\n[ns8] \"具体的に……？\""
1007506-103 = "もう、今のは忘れてって。"
1007506-104 = "はぁ……強いて言うなら、そう。"
1007506-105 = "これまでは気にも留めなかった世界に、さ……"
1007506-106 = "少しずつだけど、興味が湧いてきたというか。"
1007506-107 = "……もっとこう、自分の知らない世界を知って……いろんな表現をできるようになりたいんだ。"
1007506-108 = "きっかけは……その、先生で。"
1007506-109 = "[s] \"私？\""
1007506-110 = "そうだよ。私をこんな風に変えた責任を取って、ってこと。"
1007506-111 = "[s] \"そんなこと言われても……よく分からないなぁ。\""
1007506-112 = "はぁ……先生なら、そう言うと思った。"
1007506-113 = "でも、今の答えは減点。ピピーッ、イエローカード！"
1007506-114 = "[s] \"イエローカードもらっちゃった……。\""
1007506-115 = "ってなわけで、今日の先生は私の専属アシスタント！"
1007506-116 = "……なぜって？イエローカード分は働いてもらわないとね！"
1007506-117 = "こんな状態で帰っても、モヤモヤするでしょ？"
1007506-118 = "[s] \"いや、別にそうでも……\""
1007506-124 = "モヤモヤするでしょ？"
1007506-125 = "[s] \"本当にそんな事は……\""
1007506-126 = "モヤモヤするよね？"
1007506-127 = "[s] \"……そんな気もしなくはないような。\""
1007506-128 = "やっぱ、そうだと思った！#nさあて、どの作業をお願いしよっかな～"
1007506-130 = "（……その後、残った時間はメルの原稿を手伝って過ごした）"
