[translation]
80000027-1 = "貧者のチョコレート"
80000027-2 = "旧校舎付近の廃墟"
80000027-6 = "やってしまいました……。"
80000027-7 = "今日はバレンタインデー、どうにか先生に素敵なチョコレートをプレゼントしたかったのですが……。"
80000027-8 = "旧校舎ではチョコレートはおろか、チョコレートの原材料も中々手に入らなくて……頑張ったのですが……"
80000027-13 = "これを……。"
80000027-14 = "[s] \"……カカオ？\""
80000027-15 = "はい。実は給食部にお友達がいまして。"
80000027-16 = "それで「チェリョンカ」を作るためのカカオの実を、特別に譲ってもらったんです。"
80000027-17 = "しかし、これをどうすれば良いのかも見当つかず……。"
80000027-18 = "や、やっぱりガッカリされましたよね……すみません、ちゃんとしたものが用意できなくって……。"
80000027-19 = "[s] カカオの実を齧る。"
80000027-23 = "せ、先生！？それ、あまり生で食べるようなものではありませんよ！？"
80000027-24 = "せめて、お湯で温めるか何か……。"
80000027-25 = "[s] \"ノドカの気持ちがこもったプレゼントだから、大丈夫。\""
80000027-26 = "私の、気持ち……。"
80000027-27 = "先生はこれも、ちゃんとプレゼントとして受け取ってくれるんですね。"
80000027-28 = "私の好きな人は、こういう……。"
80000027-32 = "先生。私、決めました。"
80000027-33 = "今年は失敗してしまいましたが……来年こそは、必ず。カカオの実だけではなく、バターと砂糖も手に入れて、ちゃんとしたチョコレートをプレゼントしてみせますね！"
80000027-34 = "[s] \"原材料ではなく、チョコレートをっていう線は……？\""
80000027-36 = "（その後カカオの実のお返しとして、味の参考も兼ねてノドカに美味しそうなチョコレートをプレゼントした。）"
80000027-37 = "（それなりに高級だったこともあってか、どうやら半分も食べられなかったらしい……。）"
