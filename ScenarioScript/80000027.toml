[translation]
80000027-1 = "Chocolate do Pobre"
80000027-2 = "Ruínas perto do prédio antigo da escola"
80000027-6 = "Eu estraguei tudo..."
80000027-7 = "Hoje é Dia dos Namorados, e eu queria muito presentear o Sensei com um chocolate maravilhoso, mas..."
80000027-8 = "Perto do prédio antigo, não só é difícil achar chocolate, como também é quase impossível conseguir os ingredientes... Eu me esforcei tanto, mas..."
80000027-13 = "Tome isto..."
80000027-14 = "[s] \"...Cacau?\""
80000027-15 = "Sim. Na verdade, eu tenho uma amiga no Clube de Merenda."
80000027-16 = "Foi ela quem me deu, especialmente, esses frutos de cacau usados para fazer 'Cheryonka'."
80000027-17 = "Mas eu não faço a menor ideia do que fazer com isso..."
80000027-18 = "V-você ficou decepcionado, não ficou? Desculpe, eu não consegui preparar algo decente..."
80000027-19 = "[s] Morder o fruto de cacau."
80000027-23 = "S-Sensei!? Isso não é algo que se coma cru, sabia!?"
80000027-24 = "Pelo menos, deveria ter aquecido na água ou algo do tipo..."
80000027-25 = "[s] \"É um presente com os sentimentos da Nodoka, então está tudo bem.\""
80000027-26 = "Meus... sentimentos..."
80000027-27 = "Então o Sensei realmente aceita isso como um presente de verdade."
80000027-28 = "A pessoa que eu gosto é alguém que..."
80000027-32 = "Sensei. Eu decidi."
80000027-33 = "Este ano eu falhei, mas... no ano que vem, com certeza. Não vou conseguir apenas o cacau, mas também manteiga e açúcar, e vou te presentear com um chocolate de verdade!"
80000027-34 = "[s] \"E que tal tentar conseguir o chocolate pronto em vez dos ingredientes...?\""
80000027-36 = "(Depois disso, como retribuição pelo fruto de cacau e para servir de referência de sabor, presenteei a Nodoka com um chocolate delicioso.)"
80000027-37 = "(Como era um chocolate um tanto caro, parece que ela não conseguiu comer nem a metade...)"
