[translation]
41025-2 = "……Hm?"
41025-3 = "O que foi? Aconteceu algum problema?"
41025-4 = "Alguns soldados apareceram de novo."
41025-5 = "Eu achei que não tinha sobrado mais ninguém, mas..."
41025-6 = "Não pode ser, será que é o Departamento de Segurança Pública...?"
41025-7 = "Ah, então são só uns fracotes. Perdi meu tempo ouvindo."
41025-8 = "Se for só isso, a Miyu deve dar conta de resolver rapidinho, né?"
41025-9 = "É, eu sei, mas... é que tem algo me incomodando..."
41025-10 = "……Bem, talvez eu esteja preocupada demais."
41025-12 = "Está escuro, está assustador... Quero voltar logo para a escola..."
41025-13 = "……Ah, é verdade, a escola foi fechada. O lugar para onde eu posso voltar é..."
41025-14 = "Nesse ponto, nem para a Valkyrie eu consigo mais..."
41025-15 = "Será que vou acabar sendo esquecida aqui, sozinha...?"
41025-16 = "Até quando vamos ficar assim...?"
41025-20 = "……?"
41025-24 = "Hã, uma granada de fumaça...?"
41025-28 = "Ahhh!?"
41025-29 = "De, de onde veio...? Mas o inimigo já tinha..."
41025-30 = "Não recebi nenhum aviso nem nada... De, de qualquer forma, preciso reportar a situação...!"
41025-37 = "Que, quem está aí...!?"
41025-39 = "Err..."
41025-40 = "Ora, sou eu, sou eu. Do RABBIT Squad..."
41025-41 = "RABBIT Squad..."
41025-42 = "Hã, Saki-chan?"
41025-44 = "Isso mesmo!"
41025-46 = "Parece que uma granada de fumaça explodiu por engano, então vim dar uma olhada."
41025-47 = "Ma, mas Saki-chan, você não disse agorinha que era para 'nunca sair do seu posto'...?"
41025-48 = "Além disso, sua voz está..."
41025-50 = "Ah, é que eu inalei um pouco de fumaça... Cof, cof!"
41025-52 = "Bem, de qualquer jeito, está tudo bem. Então, que tal baixar a arma por enquanto?"
41025-53 = "(...Suspeito. O tom de voz e o jeito de falar, não parece nada com a Saki-chan...)"
41025-54 = "(É nessas horas que preciso usar a senha...)"
41025-58 = "……'Trevo'."
41025-60 = "……Hã?"
41025-61 = "A Saki-chan sabe muito bem, não sabe?"
41025-62 = "Se, se você não responder, eu vou atirar...!"
41025-64 = "'Trevo'!"
41025-65 = "……Hã, o quê?"
41025-67 = "Disse alguma coisa? Tem muito ruído por aqui e não deu para ouvir direito. Aliás... você sabe a resposta para essa palavra, né?"
41025-68 = "Hã, i, isso não pode ser...!?"
41025-70 = "Se não responder, eu vou atirar, viu?"
41025-71 = "Ce, 'Cenoura'!"
41025-73 = "Hmm, entendi. Compreendido."
41025-74 = "Hã, a, ah...?"
41025-76 = "Você é fraca quando é pressionada em um jogo psicológico... O Sensei tinha razão."
41025-83 = "Obrigada por me contar a senha. Até mais, coelhinha atiradora."
41025-88 = "Fu, fui enganada...!?"
41025-93 = "……O que foi esse tiro agora? Não foi perto?"
41025-94 = "Será que a Miyu foi derrotada...?"
41025-95 = "Impossível, é o Departamento de Segurança Pública, né? Considerando o equipamento e tudo mais, não é um nível que a Miyu seria derrotada."
41025-96 = "Eu sei que é, mas... não consigo entrar em contato com a Miyu."
41025-100 = "Estou indo."
41025-101 = "Moe, conto com o seu apoio."
41025-102 = "Não tem apoio nenhum, já que não sobrou munição, sabia?"
41025-103 = "...O quê, por que?!"
41025-104 = "Eu disse agora pouco, lembra? Para ser 'chamativo' e 'usar tudo'."
41025-105 = "Na hora de perseguir o drone, eu gastei tudo de uma vez só♪"
41025-106 = "Hã?! Você tá brincando, né?!"
41025-107 = "Desperdiçar tudo de uma vez sem pensar no que vem depois..."
41025-108 = "Aquelas faíscas são tão lindas, é tão empolgante... ah, ah..."
41025-109 = "Quem é que gasta 'tudo' literalmente, sua idiota! Precisamos pensar no futuro agora!"
41025-110 = "Com munição zero nessa situação, o que a gente vai fazer agora—"
41025-117 = "O que foi essa explosão agora há pouco...?"
41025-121 = "Saki, Moe, qual é a situação? Relatem!"
41025-125 = "Sem resposta... Será que foram emboscadas?"
41025-126 = "Eu avisei para ficarem em alerta..."
41025-127 = "Não tem jeito, primeiro vamos mudar de base e contra-atacar..."
41025-132 = "Parem onde estão!"
41025-133 = "Como o Sensei disse, era aqui mesmo...! Não se mexam!"
41025-134 = "Ocupar um parque usado pelos cidadãos e fazer uma manifestação usando armas ilegais..."
41025-135 = "Sinto muito, mas vou ter que prendê-las!"
41025-136 = "Sigam as instruções desta oficial, levantem as mãos e se rendam!"
41025-142 = "(Que situação problemática... pensar que já tinham chegado até aqui.)"
41025-143 = "(Só tenho minha pistola de serviço... Provavelmente, devo conseguir desviar do primeiro disparo...)"
41025-147 = "N-não se mova! Eu vou atirar de verdade, hein?!"
41025-148 = "...Eu não vou obedecer!"
41025-154 = "V-vou abrir fogo!"
41025-164 = "O quê!! Eu vi para onde a arma estava apontada...!"
41025-165 = "Elas miraram em outra direção de propósito até o último segundo, contando que eu fosse desviar...?"
41025-166 = "Então eu também... baixei a guarda..."
41025-171 = "...A-acertou o alvo?!?!?"
41025-172 = "S-será que, finalmente, minha habilidade de tiro melhorou...?"
41025-173 = "Como esperado, o esforço sempre dá frutos..."
41025-174 = "E a justiça também sempre sai vitoriosa... é isso!"
41025-178 = "Inacreditável..."
41025-179 = "Quem diria que apenas alunas do Departamento de Segurança Pública conseguiriam subjugar a SRT..."
41025-180 = "[s] \"As duas se esforçaram muito, afinal.\""
41025-181 = "Entendo... Então esse é o poder do Sensei [USERNAME]. E ainda por cima, com tanta humildade."
41025-182 = "Os rumores sobre as alunas também eram verdadeiros, pelo visto."
41025-183 = "...Em nome da Academia de Polícia Valkyrie, agradeço."
41025-192 = "Você viu, Sensei?! Meu tiro perfeito!"
41025-193 = "Foi um golpe brilhante, digno do pessoal do Departamento de Segurança...!"
41025-194 = "Nossa, pensar que um truque tão antigo ainda funciona..."
41025-195 = "Bem, embora tenha sido graças ao plano do Sensei... fico feliz que tenha dado certo."
41025-196 = "Será que agora eu consigo uns 20 dias de folga especial? Hehe..."
41025-198 = "...Ah."
41025-199 = "Reconheço o mérito de vocês. Mas isso não é algo que alguém na minha posição possa decidir. É uma questão para o alto escalão."
41025-200 = "Bom trabalho. Sobre a recompensa, aguardem o anúncio de prêmios e punições do próximo mês."
41025-202 = "O quê, não vamos receber agora...?"
41025-203 = "Que decepção."
41025-204 = "Mas o mês que vem já está logo ali! Vai que a gente acaba indo parar na Delegacia de Segurança mesmo...!"
41025-205 = "Ah, não, eu não quero ir para lá..."
41025-206 = "Eu prefiro recusar..."
41025-211 = "Nós, sob o comando daquele bando de idiotas...?"
41025-212 = "Olha quem fala, logo você que teve a atitude idiota de gastar toda a munição de uma vez só."
41025-213 = "Do que você está falando? Não existe nada mais importante do que um brilho momentâneo!"
41025-214 = "Já era, acabou..."
41025-215 = "A SRT, o RABBIT Squad, eu... tudo vai ser tirado de nós, e estamos destinadas a desaparecer no esquecimento..."
41025-216 = "..."
41025-217 = "[s1] \"Prazer em conhecê-las.\"\n[s2] \"Vocês são as alunas da Academia SRT... certo?\""
41025-218 = "...Não temos nada para conversar com você!"
41025-219 = "...Não temos nada para conversar com você!"
41025-220 = "O que foi? Veio zombar da gente? Ou veio aqui só para nos humilhar?"
41025-222 = "...Você é o \"adulto\" que comandou aquela Delegacia de Segurança Pública?"
41025-223 = "[s] \"Sim, sou eu.\""
41025-224 = "...Entendo. Então você é aquele \"Sensei do Schale\", que resolve os problemas de tantos alunos, que tem a confiança deles e que possui autoridade investigativa extrajudicial..."
41025-228 = "...Sensei. Nós somos o tipo de pessoa que mais odeia adultos como você."
41025-229 = "Vá para o inferno."
41025-230 = "Espero que nunca mais nos vejamos."
41025-237 = "[ns] \"Hmm, elas estão cheias de energia.\""
41025-238 = "Não precisa se preocupar. Elas só estão irritadas por terem sido derrotadas."
41025-239 = "[s] \"O que vai acontecer com elas agora?\""
41025-240 = "Primeiro, o interrogatório."
41025-241 = "Normalmente, depois disso, a Valkyrie decidiria a punição, mas..."
41025-242 = "Como o Conselho Estudantil Federal se envolveu até certo ponto, provavelmente não será assim. Acredito que o Chefe do Gabinete de Defesa decidirá o destino delas."
41025-243 = "Se desejar, posso permitir que você observe o interrogatório."
41025-244 = "Por enquanto, bom trabalho."
41025-250 = "Próximo episódio: As circunstâncias de cada uma"
