[translation]
41025-2 = "……Hã?"
41025-3 = "O que foi? Aconteceu alguma coisa?"
41025-4 = "O que foi, apareceu mais tropas."
41025-5 = "Pensei que não tivesse mais ninguém…"
41025-6 = "Não me diga que é o Departamento de Segurança da Vida…?"
41025-7 = "Ah, então é escória. Perdi tempo."
41025-8 = "Se é só isso, a Miyu dá conta."
41025-9 = "É… mas tem alguma coisa me incomodando…"
41025-10 = "…Bem, paranoia demais."
41025-12 = "Escuro, medo… quero voltar pra escola logo…"
41025-13 = "…Ah, a escola foi fechada, né. Eu não tenho mais para onde voltar…"
41025-14 = "E agora, nem para a Valkyrie…"
41025-15 = "Vou ser esquecida, sozinha, numa boa…"
41025-16 = "Até quando vamos continuar assim…"
41025-20 = "……?"
41025-24 = "Hã, granada de fumaça…?"
41025-28 = "Aaaah?!"
41025-29 = "O-ond… de onde…? Não tem mais inimigos, era pra…"
41025-30 = "Não avisaram nada… de qualquer forma, preciso relatar a situação…!"
41025-37 = "Q-quem é?!"
41025-39 = "Ahm…"
41025-40 = "Sou eu, ué. Do Esquadrão RABBIT…"
41025-41 = "Esquadrão RABBIT…"
41025-42 = "Hã, Saki-chan?"
41025-44 = "Isso aí!"
41025-46 = "Parece que a granada de fumaça explodiu sem querer, aí vim ver o que era."
41025-47 = "M-mas a Saki-chan tinha dito 'não saiam dos postos de jeito nenhum'…"
41025-48 = "E a voz…"
41025-50 = "Ah, é que inalei fumaça, então… cof, cof, cof!"
41025-52 = "Deixa isso pra lá. Tô de boa. Pode abaixar a arma?"
41025-53 = "(…Suspeito. O tom, a voz, não tem nada a ver com a Saki-chan…)"
41025-54 = "(Nessas horas, palavra-chave…)"
41025-58 = "…'Trevo'."
41025-60 = "…Hã?"
41025-61 = "A Saki-chan sabe, né?"
41025-62 = "S-se não responder… vou atirar…!"
41025-64 = "'Trevo'!"
41025-65 = "…Hã?"
41025-67 = "Falou alguma coisa? O barulho aqui tá confuso, não ouvi direito. Aliás… qual a resposta para essa palavra, você sabe, né?"
41025-68 = "H-hã… o quê…?"
41025-70 = "Se não responder, vou atirar, viu?"
41025-71 = "Cenoura! 'Cenoura'!"
41025-73 = "Hmm, certo. Entendi."
41025-74 = "H-hã… a-ah…?"
41025-76 = "Parece que você fraqueja sob pressão… o Professor tinha razão."
41025-83 = "Obrigada pela palavra-chave. Então… até mais, atiradora coelhinha."
41025-88 = "M-mentira… fui enganada…?!"
41025-93 = "…Que tiro foi esse agora? Tão perto…"
41025-94 = "Não me diga que a Miyu foi atingida…?"
41025-95 = "Que nada. É o Departamento de Segurança da Vida, né? Pelo equipamento, a Miyu não cairia tão fácil."
41025-96 = "É o que parece, mas ela não está respondendo."
41025-100 = "Vou lá."
41025-101 = "Moe, me dá apoio."
41025-102 = "Apoio o quê, se não tenho mais munição?"
41025-103 = "……Hã, por quê?"
41025-104 = "Você não falou 'com estrondo', 'gasta tudo'?"
41025-105 = "Quando fui atrás do drone, usei tudo de uma vez ♪"
41025-106 = "Haa?! Puta merda, mentira?!"
41025-107 = "Imbecil, gastar tudo de uma vez sem pensar no futuro…"
41025-108 = "A beleza do momento… não tem preço. Me arrepio… haaah, haaah…"
41025-109 = "Cuzona! Quem usa 'literalmente tudo' de uma vez?! Precisa pensar no futuro! Agora, imediatamente!"
41025-110 = "Com munição zero nessa situação, como é que nós vamos――"
41025-117 = "Aquela explosão agora…?"
41025-121 = "Saki, Moe, qual a situação? Me respondam!"
41025-125 = "Sem resposta… Fomos atacados?"
41025-126 = "Eu disse para ficarem alertas…"
41025-127 = "Fazer o quê. Vamos mudar de posição e revidar…"
41025-132 = "Pare aí!"
41025-133 = "Estava aqui, como o Professor disse…! Não se mexam!"
41025-134 = "Ocupação de um parque público… e protesto com armamento ilegal…"
41025-135 = "Desculpe, mas vou detê-las!"
41025-136 = "Obedeçam às minhas instruções, levantem as mãos e se rendam!"
41025-142 = "(…Complicou. Elas já chegaram até aqui…)"
41025-143 = "(Armamento: pistola padrão… devo conseguir desviar do primeiro tiro…)"
41025-147 = "N-não se mexam! Atiro, viu!"
41025-148 = "…Não vou obedecer!"
41025-154 = "V-Vou atirar!"
41025-164 = "O quê?! Eu vi a direção do cano… como ela…?!"
41025-165 = "Sabendo que eu desviaria, propositalmente mirou em outra direção até o último instante…?"
41025-166 = "Quem desviou… fui eu…"
41025-171 = "A-Acertei?!"
41025-172 = "S-será que até eu finalmente melhorei minha mira…?"
41025-173 = "O esforço sempre compensa…"
41025-174 = "E a justiça sempre vence… não é mesmo?!"
41025-178 = "Inacreditável…"
41025-179 = "Quer dizer que o Departamento de Segurança da Vida sozinho deteve a SRT…"
41025-180 = "[s] \"As duas se esforçaram, né.\""
41025-181 = "Entendo… então este é o poder do Professor [USERNAME]. E ainda com tamanha humildade."
41025-182 = "Os boatos sobre os alunos também eram verdadeiros."
41025-183 = "…Em nome da Academia Valkyrie, agradeço."
41025-192 = "Viu aquilo, Professor?! Meu tiro perfeito!"
41025-193 = "Digno do Esquadrão de Segurança, um disparo preciso!"
41025-194 = "Uau, ainda funciona um truque tão antigo…"
41025-195 = "Bem, com a estratégia do professor, até deu certo… ainda bem."
41025-196 = "Dá pra ganhar uns 20 dias de folga, né. Hehe…"
41025-198 = "…Haaah."
41025-199 = "Reconheço o mérito de vocês. Mas isso não cabe a mim decidir. É com os superiores."
41025-200 = "Bom trabalho. Aguardem o resultado das recompensas e punições do mês que vem."
41025-202 = "O quê, não é imediato? Que chatice…"
41025-203 = "Que decepção."
41025-204 = "Mas mês que vem é logo ali! Quem sabe até consigo ir para o Esquadrão de Segurança…!"
41025-205 = "Ah, essa parte eu dispenso…"
41025-206 = "Na verdade, recuso…"
41025-211 = "Aquelas caras de inteligência duvidosa… fomos derrotadas por elas?"
41025-212 = "Olha quem fala. Gastar munição de uma só vez é coisa de cérebro de ameba."
41025-213 = "O que é que tem? O brilho do momento é o que importa!"
41025-214 = "Está tudo acabado…"
41025-215 = "A SRT, o Esquadrão RABBIT, eu… tudo vai ser levado, e eu vou desaparecer numa boa…"
41025-216 = "……"
41025-217 = "[s1] \"Prazer.\"\n[s2] \"Vocês são da Academia SRT… né?\""
41025-218 = "…Não tenho nada para falar com você!"
41025-219 = "…Não tenho nada para falar com você!"
41025-220 = "O que foi, veio tirar sarro? Humilhar?"
41025-222 = "…Você é o 'adulto' que comandou o Departamento de Segurança da Vida?"
41025-223 = "[s] \"Sim.\""
41025-224 = "…Entendo. Você é o 'Professor da Schale' com poder de investigação extrajudicial, que resolve os problemas de tantas alunas e ganhou a confiança delas…"
41025-228 = "…Professor. Nós odiamos adultos como você."
41025-229 = "Vá para o inferno."
41025-230 = "Acho que não nos veremos nunca mais."
41025-237 = "[ns] \"Uau, animadas.\""
41025-238 = "Não se preocupe. Estão só irritadas porque perderam."
41025-239 = "[s] \"E agora, o que vai acontecer com elas?\""
41025-240 = "Primeiro, serão interrogadas."
41025-241 = "Normalmente, depois disso a Valkyrie decide a punição…"
41025-242 = "Mas como o Conselho Estudantil se envolveu, provavelmente não será assim. A Diretora do Escritório de Defesa deve decidir o destino delas."
41025-243 = "Se quiser, pode acompanhar o interrogatório."
41025-244 = "Bom trabalho por hoje."
41025-250 = "Próximo Episódio: As Circunstâncias de Cada Uma"