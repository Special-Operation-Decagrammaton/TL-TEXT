[translation]#[Texto revisado] Em aguardo de revisão de formatação de texto. - Filipe 09/06.
41025-2 = "……Hã?"
41025-3 = "Qual é o problema? Aconteceu alguma coisa?"
41025-4 = "Pelo visto, tem mais gente vindo."
41025-5 = "Eu achei que já tínhamos limpado a área, mas..."
41025-6 = "Não me diga que... é o pessoal do Departamento de Segurança Comunitária...?"
41025-7 = "Ah, então são só zés-ninguém. Esquece que eu perguntei."
41025-8 = "Se é só isso, a Miyu consegue dar um jeito neles brincando."
41025-9 = "É, eu sei, mas... Tem alguma coisa estranha..."
41025-10 = "……Bom, talvez eu só esteja pensando demais."
41025-12 = "Tá escuro, eu tô com medo... Eu quero voltar pra academia logo..."
41025-13 = "……Ah é, a nossa academia fechou. O único lugar para onde eu podia voltar..."
41025-14 = "E agora que a gente fez tudo isso, também não tem como eu ir para Valkyrie..."
41025-15 = "Pelo visto o meu destino é ser esquecida aqui, sozinha no escuro..."
41025-16 = "Até quando a gente vai ter que..."
41025-20 = "……?"
41025-24 = "Hã? Uma granada de fumaça...?"
41025-28 = "Aaaah?!"
41025-29 = "D-De onde isso veio...? As inimigas já deveriam ter sido todas..."
41025-30 = "Ninguém me avisou de nada por rádio... M-Mas de qualquer forma, eu tenho que reportar a situação...!"
41025-37 = "Q-Quem tá aí...?!"
41025-39 = "Ah, hã..."
41025-40 = "Sou eu, ué. Do Esquadrão RABBIT..."
41025-41 = "Esquadrão RABBIT..."
41025-42 = "Hã? Saki-chan?"
41025-44 = "Isso, eu mesma!"
41025-46 = "Parece que umas granadas de fumaça explodiram por engano, então eu vim verificar se tava tudo bem."
41025-47 = "M-Mas Saki-chan, você não tinha dito agorinha pra eu \"não abandonar meu posto de jeito nenhum\"...?"
41025-48 = "Fora que, a sua voz..."
41025-50 = "A-Ah, é que eu respirei um pouco de fumaça sem querer... (Cof, cof!)"
41025-52 = "Mas enfim, eu tô de boa. Então que tal você abaixar essa arma aí?"
41025-53 = "(……Suspeita. O jeito de falar e a voz, não parece nada com a Saki-chan...)"
41025-54 = "(Nessas horas... Eu tenho que testar a senha...)"
41025-58 = "……\"Trevo\"."
41025-60 = "……Hã?"
41025-61 = "Saki-chan, você sabe a resposta, né?"
41025-62 = "S-Se você não responder agora, eu atiro...!"
41025-64 = "\"Trevo\"!"
41025-65 = "……E-Eita."
41025-67 = "Você falou alguma coisa? Tem muita estática, não deu pra escutar direito. Enfim... Você sabe a resposta para aquela palavra, né?"
41025-68 = "Hã?! M-Mas como assim...?!"
41025-70 = "Se não responder, eu atiro, hein?"
41025-71 = "C-\"Cenoura\"!"
41025-73 = "Hum... Entendi. Copiado."
41025-74 = "Hã? A-Ah...?"
41025-76 = "Pelo visto elas fraquejam quando rola uma pressão psicológica... Exatamente como o Sensei falou."
41025-83 = "Valeu por me dar a senha. A gente se vê por aí, Senhorita. Franco-Atiradora Coelha."
41025-88 = "F-Fui enganada...?!"
41025-93 = "……Que tiro foi esse? Foi bem perto, não foi?"#que tiro foi esse! que tiro foi esse que tá arraso!!!
41025-94 = "Não me diga que pegaram a Miyu...?"
41025-95 = "Ah, imagina. São só as fracotes do Departamento Segurança Comunitária. Nem com o melhor equipamento do mundo elas dariam conta da Miyu."
41025-96 = "Faz sentido, mas... Eu não consigo entrar em contato com ela."
41025-100 = "Vou ir lá verificar."
41025-101 = "Moe, cobre a minha retaguarda."
41025-102 = "Cobrir com o quê? A gente já tá sem munição, esqueceu?"
41025-103 = "……Quê? Como assim?"
41025-104 = "Ué, você mesma falou agorinha: \"Vamo mandar tudo pros ares\", \"Usa tudo\"."
41025-105 = "Na hora de derrubar aquele drone, eu mandei todo o nosso estoque de munição, pum!♪"
41025-106 = "O QUÊ?! TÁ ZOANDO COM A MINHA CARA?!"
41025-107 = "Que tipo de imbecil torra a munição inteira de uma vez sem pensar no amanhã...?!"
41025-108 = "Mas ah, como aquelas explosões foram lindas... Só de lembrar eu já me arrepio... Ai, ai..."
41025-109 = "Por que alguém usaria LITERALMENTE tudo?! Usa a cabeça, a gente precisa de suprimentos para manter a posição, sua anta!"
41025-110 = "Como a gente vai se manter na linha de frente com zero de munição...?!"
41025-117 = "E essa explosão agora...?"
41025-121 = "Saki, Moe, qual é a situação?! Reportem!"
41025-125 = "Sem resposta... Será que fomos emboscadas?"
41025-126 = "E eu disse pra elas ficarem alertas..."
41025-127 = "Não tem jeito, primeiro eu preciso me reposicionar para revidar..."
41025-132 = "Parada aí!"
41025-133 = "O Sensei tava certo, você estava aqui mesmo...! Não se mova!"
41025-134 = "Pela ocupação indevida de um parque público, e pela realização de um motim portando armamento ilegal..."
41025-135 = "Sinto muito, mas eu vou ter que prender você!"
41025-136 = "Siga as ordens desta oficial, levante as mãos e renda-se!"
41025-142 = "(As coisas complicaram... Como elas chegaram tão perto sem eu notar?)"
41025-143 = "(Ela só tem uma pistola padrão... Eu provavelmente consigo desviar do primeiro tiro...)"
41025-147 = "N-Não se mova! Eu vou atirar de verdade, viu?!"
41025-148 = "……Eu me recuso!"
41025-154 = "V-Vou atirar!"
41025-164 = "Ghh!! Eu vi perfeitamente a direção em que ela apontou, mas...?!"
41025-165 = "Ela já calculou que eu iria desviar e atirou de propósito na direção oposta no último segundo...?"
41025-166 = "Pelo visto... Eu abaixei demais a guarda..."
41025-171 = "……A-Acertou?!?!"
41025-172 = "S-Será que o meu treinamento de tiro finalmente deu resultado...?!"
41025-173 = "Realmente, o esforço sempre é recompensado..."
41025-174 = "E no fim, a Justiça sempre vence... Era verdade!"
41025-178 = "Eu não tô acreditando nisso..."
41025-179 = "As alunas do Departamento de Segurança Comunitária conseguiram mesmo neutralizar a SRT inteira..."
41025-180 = "[s] \"Foi porque as duas se esforçaram bastante.\""
41025-181 = "Entendi... Então esse é o famoso poder do Sensei. E mesmo com tanto talento, você ainda continua sendo humilde."
41025-182 = "Pelo visto, os boatos das alunas eram todos verdadeiros."
41025-183 = "……Em nome da Academia de Polícia Valkyrie, eu agradeço profundamente."
41025-192 = "Sensei, você viu?! Meu tiro foi simplesmente perfeito!"
41025-193 = "Foi um golpe de mestre, parecia até que eu era uma oficial do Departamento de Ordem Pública...!"
41025-194 = "Nossa, quem diria que aquele truque velho de blefar a mira ainda funcionava..."
41025-195 = "Bom, o plano do Sensei era meio maluco, mas que bom que deu tudo certo no fim."
41025-196 = "Depois dessa eu mereço no mínimo uns 20 dias de folga remunerada. Hehe..."
41025-198 = "……*Suspiro*."
41025-199 = "Eu reconheço a bravura de vocês hoje. No entanto, decisões sobre promoções e recompensas não cabem a mim. Isso é jurisdição dos altos escalões."
41025-200 = "Bom trabalho. Aguardem o boletim disciplinar do mês que vem para saber a respeito da recompensa."
41025-202 = "Ah, qual é, achei que ia ganhar alguma coisa na hora..."
41025-203 = "Que decepção."
41025-204 = "Mas mês que vem já tá logo aí! Quem sabe eu não consigo a minha transferência pro Departamento de Ordem Pública...!"
41025-205 = "Cara, cruz credo, eu nunca aceitaria uma transferência dessa..."
41025-206 = "Na verdade eu recusaria na hora se oferecessem..."
41025-211 = "Eu me recuso a aceitar que a gente perdeu pra um bando de retardadas..."
41025-212 = "Olha quem fala. A retardada aqui torrou nossa munição inteira pra ver fogos de artifício, esqueceu?"
41025-213 = "Ai cala a boca, vocês não entendem nada sobre a beleza efêmera do momento!"
41025-214 = "É o fim..."
41025-215 = "A SRT, o Esquadrão RABBIT, eu mesma... Tiraram tudo de nós... Agora só nos resta sumir no esquecimento..."
41025-216 = "……"
41025-217 = "[s1] \"Oii, muito prazer!!\"\n[s2] \"Vocês são alunas da Academia Especial SRT... né?\""
41025-218 = "……Nós não temos absolutamente nada para conversar com você!"
41025-219 = "……Nós não temos absolutamente nada para conversar com você!"
41025-220 = "E aí, veio aqui só pra tirar uma com a nossa cara? Ou pra humilhar a gente de vez?"
41025-222 = "……Você seria o \"adulto\" que estava no comando daquelas meninas do Departamento de Segurança Comunitária?"
41025-223 = "[s] \"Sim, eu mesmo.\""
41025-224 = "……Entendi. Então você é o tal \"Sensei da Schale\", o queridinho das alunas que resolve problemas pra cima e pra baixo ostentando sua autoridade acima da lei..."
41025-228 = "……Sensei. Adultos manipuladores como você, são o tipo de pessoa que a gente mais odeia."
41025-229 = "Vá para o inferno."
41025-230 = "Espero que a gente nunca mais tenha que olhar pra essa sua cara."
41025-237 = "[ns] \"Nossa, quanto ódio no coração.\""
41025-238 = "Não leve isso para o pessoal. Elas só estão frustradas porque perderam feio."
41025-239 = "[s] \"O que vai acontecer com elas agora?\""
41025-240 = "Primeiramente, interrogatório."
41025-241 = "Normalmente, o procedimento seria a Valkyrie decidir a sentença depois disso, mas..."
41025-242 = "Como o Conselho Estudantil Geral está envolvido na situação desde o início, provavelmente não será o caso. Acredito que a Chefe do Escritório de Defesa vai determinar o que fazer com elas."
41025-243 = "Se quiser, você pode acompanhar os interrogatórios de perto."
41025-244 = "Mas por hora, bom trabalho, Sensei."
41025-250 = "Próximo Episódio: As Circunstâncias de Cada Uma"