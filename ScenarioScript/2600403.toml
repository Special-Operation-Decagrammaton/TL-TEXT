[translation]
2600403-1 = "O segredo dos dois"
2600403-2 = "Vou colocar este livro aqui... Ufa. Acho que terminei de organizar tudo."
2600403-4 = "……Ah? Oh, boa noite, Sensei! O que faz aqui a esta hora?"
2600403-5 = "Ah, acabei falando alto demais... Hehe, mas não se preocupe. O horário de funcionamento já passou."
2600403-6 = "Agora, só estamos eu e você nesta biblioteca."
2600403-7 = "Eu? Eu costumo passar o tempo na biblioteca mesmo depois de fechar. Ainda tenho que arrumar as coisas, afinal."
2600403-8 = "Além disso..."
2600403-9 = "……Hehe. Durante o dia fico ocupada com outras coisas e mal consigo tempo para ler."
2600403-10 = "Por isso, é a partir deste horário, quando todos vão embora, que começa a minha hora da leitura!"
2600403-11 = "É também por isso que as luzes desta biblioteca ficam acesas 24 horas por dia."
2600403-12 = "……Mas, sendo sincera, enviei aquela mensagem meio que na brincadeira, não achei que você viria mesmo. Obrigado por vir até aqui tão tarde."
2600403-13 = "Ainda está no meio do seu trabalho?"
2600403-14 = "[s1] \"Sim, pensei em continuar por aqui.\"\n[s2] \"Vim fazer companhia a uma colega de insônia.\""
2600403-15 = "Ahaha..."
2600403-16 = "Ahaha..."
2600403-17 = "Se for esse o caso, poderia esperar um pouco aqui? Vou preparar o lugar."
2600403-18 = "Ah, não se preocupe com nada. Digamos que é minha especialidade; já faz alguns anos que estudo a \"configuração ideal para ficar sentado por longas horas\"!"
2600403-19 = "Deixe comigo. Ah, vou preparar um café também. Com tampa e canudo, claro."
2600403-20 = "Vou colocar uma almofada aqui no encosto e este assento assim..."
2600403-22 = "(Graças às mãos de Shimiko, o assento foi modificado e, no final, ficou com uma aparência extremamente confortável apenas de olhar.)"
2600403-23 = "Tcharam, pronto! Fiz exatamente do meu jeito de sempre."
2600403-24 = "Deste jeito, você não vai se cansar nem um pouco, mesmo sentado a noite toda!"
2600403-25 = "[s3] \"É tão confortável que vou acabar dormindo enquanto trabalho.\"\n[s4] \"Parece um legítimo 'Shimiko Custom'.\""
2600403-26 = "Hehe, talvez seja mesmo."
2600403-27 = "Hehe, talvez seja mesmo."
2600403-28 = "Vamos, sente-se aqui. Estarei logo ao lado, então me avise se precisar de algo!"
2600403-30 = "(Depois disso, sentamos lado a lado com Shimiko e começamos a nos concentrar em nossas respectivas tarefas.)"
2600403-31 = "(A biblioteca de madrugada estava mais silenciosa do que nunca. O único som que se ouvia era o das páginas sendo viradas...)"
2600403-32 = "(E o som da respiração de Shimiko, ou dela tocando o próprio cabelo inconscientemente.)"
2600403-33 = "(...Graças a esse ambiente, consegui me concentrar no trabalho com tranquilidade.)"
2600403-35 = "……"
2600403-36 = "(De repente, percebi que Shimiko, que deveria estar lendo um livro ao meu lado, estava me observando fixamente.)"
2600403-37 = "[s] \"……Shimiko?\""
2600403-38 = "……Ah, d-desculpe! Eu te atrapalhei?"
2600403-39 = "É que... eu estava pensando se você não estava se sentindo desconfortável..."
2600403-40 = "Pensando bem, fui eu quem te convidei, então achei que talvez fosse indelicado ficar lendo em silêncio..."
2600403-41 = "Esse clima, onde ficamos sentados lado a lado em silêncio, apenas com o som das páginas sendo viradas..."
2600403-42 = "Essa situação de apenas estarmos no mesmo espaço é, como posso dizer, é..."
2600403-43 = "C-claro que eu fico muito feliz! Eu não me importo, mas..."
2600403-44 = "Ao mesmo tempo, fiquei pensando se isso era o certo..."
2600403-45 = "Talvez você tenha vindo só por minha causa, ou eu nem perguntei se você gosta desse tipo de coisa..."
2600403-46 = "Parando para pensar, parece que estou te forçando a participar das minhas preferências, e isso..."
2600403-47 = "……Seria isso um abuso da minha parte?"
2600403-48 = "Pensei que talvez eu estivesse abusando da sua bondade, Sensei..."
2600403-49 = "Era só isso, ahaha..."
2600403-50 = "[s5] \"Está tudo bem, eu também gosto disso.\"\n[s6] \"Sou o Sensei, então pode abusar um pouquinho de mim.\""
2600403-51 = "……!"
2600403-52 = "……!"
2600403-53 = "Fico feliz em ouvir isso, mas... é um pouco vergonhoso..."
2600403-54 = "……Hehe."
2600403-55 = "Não, está tudo bem. Já que insiste, vou aproveitar a sua gentileza, Sensei."
2600403-56 = "Mas, por favor, mantenha isso em segredo das outras pessoas, está bem?"
2600403-57 = "Eu também manterei em segredo o fato de que o Sensei está trabalhando aqui."
2600403-58 = "……A noite já está avançada, é o nosso momento secreto, não é?"
2600403-59 = "……Muito obrigada por hoje, Sensei."
2600403-60 = "Se não for um incômodo para o Sensei, bem."
2600403-61 = "……."
2600403-62 = "Poderia vir aqui assim de vez em quando?"
2600403-64 = "(Depois de terminar o trabalho, passei o resto da madrugada lendo vários livros com a Shimiko.)"
