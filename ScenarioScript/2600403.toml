[translation]
2600403-1 = "二人の秘密"
2600403-2 = "この本はここに置いて……ふう。片付けもそろそろ終わりそうです。"
2600403-4 = "……あれ？あ、こんばんは、先生！こんな時間にどうしたんですか？"
2600403-5 = "あ、つい声が大きく……ふふっ、でも大丈夫です。今はもう閉館時間も過ぎましたし。"
2600403-6 = "今この図書館にいるのは、先生と私だけですから。"
2600403-7 = "私ですか？私は閉館後も、だいたい図書館で過ごしてます。後片付けもしなきゃですし。"
2600403-8 = "それに……。"
2600403-9 = "……ふふっ。日中は他のことにかかりっきりで、なかなか本を読む時間が取れなくて。"
2600403-10 = "なので、みんなが帰ったこの時間から、私の読書タイムが始まるんです！"
2600403-11 = "それもあって、この図書館は24時間ずっと電気が点いてるんです。"
2600403-12 = "……それよりも、正直冗談半分で送ったメッセージだったのですが、本当に来てくださるなんて。こんな遅い時間までお疲れさまです。"
2600403-13 = "まだ残業の途中ですか？"
2600403-14 = "[s1] \"うん、ここで続きをさせてもらおうかなって。\"\n[s2] \"夜更かし仲間のところにね。\""
2600403-15 = "あはは……。"
2600403-16 = "あはは……。"
2600403-17 = "そういうことでしたら、ちょっとここで待っていただけますか？ちょっとセッティングをしますので。"
2600403-18 = "あ、全然お気になさらず。私の専門分野といいますか、「長時間座れるセッティング」を研究してはや数年という感じですので！"
2600403-19 = "お任せてください。あ、コーヒーもご用意しますね。もちろん蓋付きで、ストローも差しておきますから。"
2600403-20 = "ここの背もたれにクッションを置いて、こっちの座布団をこう……。"
2600403-22 = "（シミコの手によって座席が改造されていき、最終的にはパッと見ただけでも居心地の良さそうな状態へとセッティングされていった）"
2600403-23 = "じゃーん、完成です！私のいつものやり方と同じにしてみました。"
2600403-24 = "これなら一晩中座っていても、全然疲れませんよ！"
2600403-25 = "[s3] \"気持ち良すぎて、仕事しながら寝ちゃいそう。\"\n[s4] \"ザ・シミコカスタムって感じだね。\""
2600403-26 = "ふふっ、そうかもしれませんね。"
2600403-27 = "ふふっ、そうかもしれませんね。"
2600403-28 = "さあ、こちらへどうぞ。私も隣にいますので、何か必要なものがあれば言ってくださいね！"
2600403-30 = "（その後シミコと並んで座って、それぞれ目の前のものに集中し始めた）"
2600403-31 = "（深夜の図書館はいつも以上にずっと静かだった。耳に聞こえるのは紙をめくる音……）"
2600403-32 = "（そしてシミコの吐息や、無意識に髪を触る音だけ）"
2600403-33 = "（……その環境のおかげで、気持ちよく仕事に集中することができた）"
2600403-35 = "……。"
2600403-36 = "（ふと気が付くと、隣で本を読んでいたはずのシミコがじっとこちらを見ていた）"
2600403-37 = "[s] \"……シミコ？\""
2600403-38 = "……あ、す、すみません！お邪魔してしまいましたか？"
2600403-39 = "た、ただ、どうかな、居心地悪かったりしないかな、と思いまして……。"
2600403-40 = "考えてみたら、こっちから招待しておいて、無言で本だけ読んでるのもどうなのかなと思ってしまい……。"
2600403-41 = "静かに、ただ並んで座って、お互いのページをめくる音だけが響くこの雰囲気……。"
2600403-42 = "ただ同じ空間にいるというこの状況は、何と言いますか、その……。"
2600403-43 = "も、もちろん私はすごく嬉しいです！私は良いのですが……。"
2600403-44 = "同時に、これで良いのかな……と思ってしまったんです。"
2600403-45 = "もしかしたら、先生は私のために来てくれたのかな、とか、先生がこういうの好きなのかとか聞いてなかったな、とか……。"
2600403-46 = "よくよく考えたら、私の好きなことに付き合っていただいているみたいな形で、その……。"
2600403-47 = "……甘え、と言えば良いのでしょうか？"
2600403-48 = "先生に甘えさせてもらっているのかも……と思いまして。"
2600403-49 = "本当にそれだけです、あはは……。"
2600403-50 = "[s5] \"大丈夫、私も好きだから。\"\n[s6] \"先生だもん、ちょっとは甘えてほしいな。\""
2600403-51 = "……！"
2600403-52 = "……！"
2600403-53 = "それは良かったです、が、ちょっと恥ずかしいですね……。"
2600403-54 = "……ふふっ。"
2600403-55 = "いえ、大丈夫です。ではせっかくなので、先生に甘えさせてもらうことにします。"
2600403-56 = "でも、他のみんなには秘密にしてくださいね？"
2600403-57 = "私も先生がここでお仕事をされていることはもちろん秘密にしますので。"
2600403-58 = "……夜も深まってきましたし、秘密の時間、ですね。"
2600403-59 = "……今日はありがとうございます、先生。"
2600403-60 = "先生さえよろしければ、その。"
2600403-61 = "……。"
2600403-62 = "これからも時々、こうして来ていただけませんか？"
2600403-64 = "（その後仕事を終わらせてから、二人で明け方までシミコと色々な本を読んだ）"
