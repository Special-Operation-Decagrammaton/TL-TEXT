[translation]
10051090-1 = "Episódio 9; Coincidência Intencional"
10051090-2 = "Escritório do Schale"
10051090-3 = "Ah, Mestre...!"
10051090-4 = "Bem... é que..."
10051090-5 = "A Chefe... a Chefe está agindo de um jeito estranho...!"
10051090-6 = "[s1] \"Izuna, acalme-se primeiro.\"\n[s2] \"Então, o que houve com a Michiru?\""
10051090-9 = "Até outro dia, quando comemos lámen juntas e nos despedimos, ela estava bem..."
10051090-10 = "Mas, desde aquele dia, algo mudou nela!"
10051090-11 = "[s] \"Mudou?\""
10051090-12 = "Não sei explicar direito... #nÉ como se não houvesse brilho nos olhos dela... perdeu a motivação...? Ficou desanimada...?"
10051090-13 = "Ontem mesmo, aconteceu isso aqui!"
10051090-15 = "Distrito Comercial de Hyakkiyako"
10051090-17 = "Ufa, estava uma delícia!"
10051090-18 = "O \"Menu Ninja\" de hoje também não decepcionou!"
10051090-19 = "Não é, Chefe?"
10051090-20 = "..."
10051090-21 = "Chefe?"
10051090-22 = "Ah? O-uh, sim. É verdade, estava gostoso."
10051090-23 = "Aconteceu alguma coisa...?"
10051090-24 = "Hã? Não, não, não aconteceu nada. Estou bem."
10051090-28 = "(Não parece nada bem...)"
10051090-29 = "Então, que tal discutirmos o conteúdo do \"Diário Ninja da Michiru\" que vamos gravar semana que vem?"
10051090-30 = "Ah, é verdade! Abriu uma casa de chá nova ali do lado da loja de tecidos! #nVamos conversar lá!"
10051090-31 = "Não, eu não pretendo gravar vídeos semana que vem..."
10051090-32 = "Se ainda não temos o roteiro, precisamos planejar! #nIzuna está pronta para dar várias ideias!"
10051090-33 = "Não, é que eu..."
10051090-34 = "Ouvi dizer que o conjunto de bolinhos daquela casa de chá é recomendado!"
10051090-35 = "Vamos lá, Chefe! É bem ali..."
10051090-40 = "E-espere um pouco, Izuna, na verdade..."
10051090-45 = "BUM!"
10051090-47 = "O quê...!?"
10051090-48 = "Parece que alguém usou uma bomba de fumaça na frente da loja de tecidos!"
10051090-53 = "Beleza! O efeito da bomba de fumaça foi perfeito!"
10051090-54 = "Uma loja tão antipática assim, dá até pena dos clientes!"
10051090-55 = "Pois é! Ignora os pedidos dos clientes e só quer impor as próprias vontades!"
10051090-56 = "Uma loja dessas merece falir!"
10051090-60 = "Ei! O que vocês estão fazendo na frente da loja dos outros!?"
10051090-61 = "Como assim \"o que\"? É porque você ignora os pedidos dos clientes, não é?"
10051090-62 = "Eu... ignorei...?"
10051090-63 = "Como você quer que uma loja de tecidos atenda um pedido de takoyaki e café!?"
10051090-64 = "Se o cliente pediu, é só servir! Para de reclamar!"
10051090-65 = "Você acha mesmo que dá para fazer negócio sendo tão cabeça-dura?"
10051090-66 = "O que você está dizendo!? #nO motivo de não estarmos conseguindo fazer negócio são vocês, não é!?"
10051090-67 = "Droga... ela respondeu com lógica...!"
10051090-68 = "Não recuem! Nós só nos importamos com a recompensa!"
10051090-69 = "Espera, recompensa? De quem vocês estão recebendo isso?"
10051090-70 = "Ah, acabei falando demais...!"
10051090-75 = "Chefe! O Grupo Chimi está causando confusão na frente da loja de tecidos!"
10051090-76 = "Izuna e as outras foram... ué? Chefe?"
10051090-79 = "Hã? O quê?"
10051090-80 = "Chefe! Agora é a hora de agir!"
10051090-81 = "A-ah, é? Talvez seja, mas..."
10051090-82 = "Mas esse tipo de coisa não deveria ser responsabilidade do Comitê de Cem Flores...?"
10051090-83 = "Além disso, a Tsukuyo não está aqui agora..."
10051090-84 = "Só porque a Tsukuyo-dono não está aqui, não significa que perderemos o espírito ninja!"
10051090-85 = "Uuu, eu sei que é verdade, mas..."
10051090-90 = "Ch-chefe!"
10051090-95 = "Escritório do Schale"
10051090-96 = "...foi o que aconteceu."
10051090-97 = "A Chefe... ela está tão desanimada, parece não ter confiança em nada..."
10051090-98 = "É a primeira vez que vejo a Chefe assim, Izuna..."
10051090-99 = "[s] \"Realmente, essa não é a Michiru de sempre...\""
10051090-100 = "O Mestre também acha isso?"
10051090-101 = "Por que será que ela está assim...?"
10051090-102 = "[s] \"O que você acha, Izuna?\""
10051090-103 = "..."
10051090-104 = "Talvez... eu sinta que sei o motivo."
10051090-105 = "Acho que é porque a Tsukuyo-dono não voltou para o Clube de Pesquisa de Ninjutsu..."
10051090-106 = "Como a Chefe está tão deprimida... eu tentei agir de forma alegre de propósito."
10051090-107 = "Pensei que, se nós duas ficássemos para baixo, não conseguiríamos seguir em frente."
10051090-108 = "Mas... eu não sei mais o que fazer, Mestre...!"
10051090-109 = "Ainda não consigo entrar em contato com a Tsukuyo-dono...#nComo os vídeos de preparação do desfile de moda de Ano Novo continuam sendo postados, #nparece que ela está bem, pelo menos..."
10051090-110 = "[s] \"Então, que tal tentarmos encontrar o paradeiro da Tsukuyo juntos?\""
10051090-111 = "Eu adoraria, mas... acho que a Chefe não vai querer se mover."
10051090-112 = "Sinto que ela está evitando encontrar a Tsukuyo-dono de propósito..."
10051090-113 = "Mesmo assim, precisamos dar um jeito de fazer as duas se encontrarem."
10051090-114 = "Se não fizermos isso, acho que não encontraremos uma solução."
10051090-115 = "[s3] \"Você quer que a Michiru e a Tsukuyo se encontrem, certo?\"\n[s4] \"Nesse caso, acho que tive uma boa ideia.\""
10051090-121 = "Sério!?"
10051090-122 = "[s] \"Vou te avisar quando estiver pronto, pode me dar um tempo?\""
10051090-123 = "Sim! Estarei aguardando!"
10051090-128 = "Entendo... nesse caso, não será difícil."
10051090-129 = "Vou cuidar para que tudo corra bem."
10051090-130 = "[s] \"Desculpe te pedir isso de repente.\""
10051090-131 = "Nya-haha, não precisa se desculpar. Na verdade, eu é que deveria agradecer."
10051090-132 = "Afinal, com isso, é como se eu tivesse ganhado um \"Vale de Uso Ilimitado de 1 Vez\" do Sensei, não é?"
10051090-133 = "[s] \"Onde é que isso está sendo emitido...!?\""
10051090-135 = "Nya-haha, fique ansioso para ver o que vou pedir... pode deixar comigo?"
10051090-139 = "Deixando isso de lado.#nParece que o Grupo Chimi também estava causando problemas por aí."
10051090-140 = "Desde que o fim do ano chegou, eles estão passando um pouco dos limites.#nBem, vamos pensar nisso mais tarde."
10051090-141 = "Bom, para realizar o pedido do Sensei, com quem será que devo entrar em contato..."
10051090-142 = "Hmm..."
10051090-143 = "Comitê Organizador do Desfile de Moda de Ano Novo de Hyakkiyako... acho que começo por aqui."
10051090-145 = "(Alguns dias depois, a véspera de Ano Novo finalmente se aproximava)"
10051090-147 = "Quer dizer... que um evento ninja vai acontecer aqui?"
10051090-148 = "Exatamente!"
10051090-149 = "Será que precisávamos mesmo nos arrumar tanto para vir aqui...?"
10051090-150 = "Já é quase Ano Novo! Todos devem vir com roupas bonitas!#nNão podemos ser as únicas a vir com roupas comuns!"
10051090-151 = "Dito dessa forma, talvez você tenha razão, mas..."
10051090-152 = "Ué? Mas aqui não é a entrada dos fundos?#nA entrada principal do local do evento não é do outro lado...?"
10051090-158 = "Ah, eu estava esperando por vocês."
10051090-159 = "Michiru Chidori-san e Izuna Kuda-san, correto?"
10051090-160 = "Sim, somos nós!"
10051090-161 = "Izuna, você até fez uma reserva?"
10051090-162 = "[s] \"Olá, vocês duas.\""
10051090-163 = "Hyaaa!? Até o Sensei está aqui!?"
10051090-164 = "Isso significa que... é um evento muito importante, não é...!?"
10051090-165 = "Então, primeiro, por favor, coloquem estes comunicadores."
10051090-166 = "...Hm? Comunicadores?"
10051090-167 = "Oh, eles vão nos guiar pelo evento via rádio?"
10051090-168 = "O trabalho de vocês é simples. #nPatrulhem a multidão e, se virem algum suspeito, relatem ou neutralizem-no."
10051090-169 = "Se virmos um suspeito, neutralizar... espere um pouco."
10051090-170 = "Trabalho? Neutralizar!?"
10051090-171 = "Izuna, isso significa que, por acaso..."
10051090-175 = "Bem-vindas ao desfile de moda comemorativo de Ano Novo de Hyakkiyako, guardas de segurança."
10051090-180 = "O-o que é isso!?"
10051090-181 = "Guardas de segurança!? Fomos enganadas!? Isso é fraude trabalhista! É uma conspiração dos organizadores!"
10051090-182 = "Não é uma conspiração!"
10051090-183 = "Este trabalho foi aceito pela Izuna!"
10051090-184 = "Hã? O que isso significa...?"
10051090-185 = "E aliás, este prédio..."
10051090-186 = "Não é o local do desfile de moda onde a Tsukuyo vai aparecer!?"
10051090-187 = "O que isso tem de evento ninja!?"
10051090-188 = "Se um ninja participa, não importa o que seja, é um \"evento ninja\"!"
10051090-189 = "Não me diga, Chefe... que você está insinuando que a Tsukuyo-dono não tem o espírito ninja?"
10051090-190 = "I-isso não é verdade, mas...!"
10051090-191 = "Eu... a Tsukuyo..."
10051090-192 = "...Está na hora. Vamos."
10051090-193 = "Vamos nessa!"
10051090-197 = "G-grrr..."
