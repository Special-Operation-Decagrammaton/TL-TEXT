[translation]
1003506-1 = "Sem nome"
1003506-2 = "（Como Ui pediu, comprei bebidas energéticas e chicletes na loja de conveniência e fui em direção à biblioteca antiga.）"
1003506-3 = "（……Senti que a Ui parecia um pouco cansada, então também comprei algumas compressas.）"
1003506-5 = "Interior da biblioteca antiga"
1003506-8 = "……?"
1003506-9 = "A porta está…… alguém, por acaso……?"
1003506-10 = "[s1] \"……Ui?\"\n[s2] \"Sua voz parece tão cansada, você está bem?\""
1003506-11 = "……?"
1003506-12 = "……?"
1003506-13 = "Ah, d-desculpe. Era você, Sensei…… sinto muito, por pedir que fizesse algo como um recado……."
1003506-14 = "Por favor, entre……."
1003506-17 = "[wa:1600]— Ah, [wa:1600]muito obrigado, [wa:1800]Sensei……"
1003506-19 = "— Isso, [wa:1850]foi de grande ajuda……."
1003506-22 = "[wa:700]— ……Isso, [wa:1300]você pergunta?"
1003506-24 = "— Bem, [wa:2000]eu estava trabalhando na [wa:1300]decifração."
1003506-27 = "— Nesta biblioteca antiga……"
1003506-29 = "[wa:100]— Existem muitos [wa:2600]livros escritos em línguas antigas."
1003506-32 = "[wa:2700]— Essas crianças também, [wa:1800]carregam o que querem transmitir a alguém [wa:1500]enquanto"
1003506-34 = "— esperam, [wa:600]então……."
1003506-37 = "— Não há mais ninguém para fazer isso…… [wa:2700]então, [wa:1400]eu……."
1003506-40 = "[wa:700]— ……Desculpe, [wa:1500]é um assunto entediante…… [wa:2100]não é?"
1003506-43 = "[ns3] \"Não mesmo. Acho algo maravilhoso e importante.\"\n[ns4] \"A Ui é realmente incrível.\""
1003506-46 = "[wa:200]— ……! [wa:1800]Ah, [wa:1200]bem, [wa:1300]isso……"
1003506-48 = "— Ser elogiada até esse ponto, [wa:2800]isso……."
1003506-51 = "— Não sei como responder……"
1003506-53 = "[wa:500]— As palavras, [wa:1600]simplesmente somem…… [wa:3500]fufu……."
1003506-56 = "……De alguma forma, sinto-me estranha."
1003506-57 = "Trabalho com isso há bastante tempo, mas…… é a primeira vez que alguém me diz algo assim……."
1003506-58 = "E ainda por cima, vindo do Sensei……."
1003506-59 = "Eu pensava que todos achavam que era um \"trabalho irrelevante\"…… Na verdade, provavelmente não são poucas as pessoas que pensam assim……."
1003506-60 = "Mas eu pensava que tudo bem. Eu apenas faço o que preciso fazer……."
1003506-61 = "[s5] \"Não acho que seja 'irrelevante' de forma alguma.\"\n[s6] \"Acreditar nisso também é incrível, e acho que é algo bom.\""
1003506-62 = "Sensei……."
1003506-63 = "Sensei……."
1003506-64 = "[s7] \"Além disso, eu também entendi.\"\n[s8] \"Por que a Ui se tornou a presidente. Por que todos te apoiam.\"\n[s9] \"Esse é o lado incrível da Ui.\""
1003506-65 = "Ugh……."
1003506-66 = "Ugh……."
1003506-67 = "Ugh……."
1003506-68 = "……."
1003506-69 = "Ah, muito obrigada……."
1003506-70 = "Se houvesse mais pessoas como o Sensei lá fora…… talvez eu tivesse pensado em sair mais."
1003506-71 = "……Claro, eu sei. Nem todos lá fora são insensíveis ou pessoas ruins."
1003506-72 = "Eu sei disso, mas…… mesmo que minha mente entenda, não há nada que eu possa fazer. Esse tipo de coisa, inevitavelmente, acontece."
1003506-73 = "Minhas preciosas membras do clube também insistem para que eu saia……."
1003506-74 = "O fato de eu considerá-las preciosas é uma coisa, e essa insistência é outra."
1003506-75 = "Não diria que isso é necessariamente ruim, mas o Sensei……."
1003506-76 = "Mesmo sendo o Sensei…… não, talvez seja justamente por ser o Sensei."
1003506-77 = "Você se adaptou a mim e usou a mesma forma de me chamar……."
1003506-78 = "……Fiquei surpresa. Pensei: \"Existem pessoas assim?\""
1003506-79 = "Desde então, naturalmente, sinto uma espécie de expectativa…… e meu coração fica flutuando."
1003506-80 = "Não sei se a palavra \"expectativa\" é a correta, mas é um sentimento vago..."

1003506-81 = "...Quando chegar a hora, poderei decifrar. Falaremos sobre isso novamente, quando chegar o momento."
1003506-82 = "[s10] \"Com certeza.\"\n[s11] \"Leve as coisas com calma, na medida certa.\""
1003506-83 = "...Ufa."
1003506-84 = "...Ufa."
1003506-85 = "...Sim, farei isso."
1003506-86 = "...Muito obrigada, Sensei."
1003506-88 = "(Depois disso, ajudei Ui com o trabalho e observei o processo de decifração ao lado dela)"
1003506-89 = "(Quase no momento em que o trabalho terminou, Ui adormeceu. Cobri-a com um cobertor e saí silenciosamente da biblioteca antiga)"
