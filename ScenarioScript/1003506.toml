[translation]
1003506-1 = "名前も無いまま"
1003506-2 = "（ウイに言われた通り、コンビニでエナジードリンクとガムを買い、古書館へと向かった）"
1003506-3 = "（……何となくウイが疲れてそうな気もしたので、湿布なども買っておいた）"
1003506-5 = "古書館内部"
1003506-8 = "……？"
1003506-9 = "扉が……誰か、勝手に……？"
1003506-10 = "[s1] \"……ウイ？\"\n[s2] \"すごい疲れた声してるけど、大丈夫？\""
1003506-11 = "……？"
1003506-12 = "……？"
1003506-13 = "あ、す、すみません。先生でしたか……すみません、こんな、使い走りみたいなことを……。"
1003506-14 = "どうぞ、こちらへ……。"
1003506-17 = "[wa:1600]― あ、[wa:1600]ありがとうございました、[wa:1800]先生……"
1003506-19 = "― その、[wa:1850]助かりました……。"
1003506-22 = "[wa:700]― ……これ、[wa:1300]ですか？"
1003506-24 = "― えっと、[wa:2000]解読作業を[wa:1300]していまして。"
1003506-27 = "― この古書館には……"
1003506-29 = "[wa:100]― 昔の言葉で書かれた本が、[wa:2600]たくさんあるんです。"
1003506-32 = "[wa:2700]― この子たちも、[wa:1800]誰かに伝えたいことを[wa:1500]抱えたまま、"
1003506-34 = "― 待っている[wa:600]はずなので……。"
1003506-37 = "― 他にやる人もいませんし……[wa:2700]それで、[wa:1400]私が……。"
1003506-40 = "[wa:700]― ……すみません、[wa:1500]面白くない話……[wa:2100]でしたよね？"
1003506-43 = "[ns3] \"ううん。素敵だし、大事なことだと思う。\"\n[ns4] \"ウイは本当にすごいね。\""
1003506-46 = "[wa:200]― ……っ！[wa:1800]あ、[wa:1200]えっと、[wa:1300]その……"
1003506-48 = "― そこまで褒めていただけると、[wa:2800]その……。"
1003506-51 = "― 何と返せば良いのか……"
1003506-53 = "[wa:500]― 言葉が、[wa:1600]見つからなくなってしまいますね……[wa:3500]ふふっ……。"
1003506-56 = "……何だか、変な気分です。"
1003506-57 = "これまで結構長い時間、こういった作業をしていましたが……そんなことを言っていただけたのは、初めてで……。"
1003506-58 = "それも、まさか先生から……。"
1003506-59 = "みんなには、「どうでも良い作業」と思われてるんじゃないかと……そう思っていました。実際、そういう人は少なくないでしょうし……。"
1003506-60 = "それでも良いと、思っていたんです。私は、私がやるべきことをやるだけなので……。"
1003506-61 = "[s5] \"「どうでも良い」なんてことは無いと思うよ。\"\n[s6] \"そう信じられることもすごいし、良いことだと思う。\""
1003506-62 = "先生……。"
1003506-63 = "先生……。"
1003506-64 = "[s7] \"それと、私にも分かったよ。\"\n[s8] \"どうしてウイが部長になったのか。みんなに支えられてるのか。\"\n[s9] \"そういうのが、ウイのすごいところだね。\""
1003506-65 = "うっ……。"
1003506-66 = "うっ……。"
1003506-67 = "うっ……。"
1003506-68 = "……。"
1003506-69 = "あ、ありがとうございます……。"
1003506-70 = "外に、先生のような人が多ければ……外に出ようと、思えたかもしれませんね。"
1003506-71 = "……もちろん、分かってます。外の方だって、全員が無神経で悪い人ばかりではない、と。"
1003506-72 = "分かっては、いるのですが……頭では分かっていても、どうにもならない。そういうことはやはり、どうしてもあるので。"
1003506-73 = "私の大切な部員も、外に出るように強要してくることがありますし……。"
1003506-74 = "大切だと思っていることと、そういう強引な部分とは別の話です。"
1003506-75 = "一概にそれを悪いとも思いませんが、先生は……。"
1003506-76 = "先生なのに……いえ、先生だからですかね。"
1003506-77 = "私に合わせてくれて、同じ呼び方をしてくれた……。"
1003506-78 = "……びっくりしたんです。こういう人がいるのか、と。"
1003506-79 = "それからは自然とこう、期待と言いますか……何だか気持ちがフワフワしていて。"
1003506-80 = "「期待」、という言葉で合っているのかも分からない、漠然とした思いなのですが……。"
1003506-81 = "……時が来れば、解読できるでしょう。それについてはまた、その時に。"
1003506-82 = "[s10] \"もちろん。\"\n[s11] \"何事も、適度に気楽にね。\""
1003506-83 = "……ふう。"
1003506-84 = "……ふう。"
1003506-85 = "……はい、そうします。"
1003506-86 = "……ありがとうございます、先生。"
1003506-88 = "（その後ウイの作業を手伝わせてもらい、解読業務を横で見ていた）"
1003506-89 = "（作業が終わるとほぼ同時にウイは寝落ちてしまい、毛布を掛けてから静かに古書館を出た）"
