[translation]
1005602-1 = "サンタのセリナ"
1005602-5 = "お姉ちゃん、プレゼントー！"
1005602-6 = "私も、私も！"
1005602-7 = "私が先だよ！私が先に来たんだもん！"
1005602-8 = "ふふっ、大丈夫ですよ。"
1005602-9 = "プレゼントは沢山ありますので、安心してください。"
1005602-11 = "あ、先生。いらしてたんですね。"
1005602-12 = "[s1] \"お待たせ、セリナ。\"\n[s2] \"もしかして、今は……？\""
1005602-15 = "子どもたちにプレゼントを配っていました。"
1005602-16 = "あっ、お姉ちゃん！この子横入りしたー！悪い子！#n悪い子はプレゼント貰えないんでしょ？"
1005602-17 = "あ、あはは……#n横から割り込むのは良くないですよ。"
1005602-18 = "順番に並ぶというのは、人に優しくすることなんです。"
1005602-19 = "ちゃんと並んだら、プレゼントをもらえる？"
1005602-20 = "はい、もちろん！"
1005602-21 = "じゃあ、ちゃんと並ぶ！"
1005602-25 = "[ns] \"さすがはセリナ……。\""
1005602-26 = "いえいえ、これは救護騎士団のチャリティー活動の一部でもあるので。"
1005602-27 = "ですが、そうやって褒められると少し恥ずかしいですね……。"
1005602-28 = "優しい上に謙虚……？#nそ、そんな。"
1005602-29 = "これくらい、当然です。#n私は救護騎士団なんですから。"
1005602-31 = "それに……#n今日は特別な日ですし。"
1005602-32 = "たとえ年に1日だけでも、誰かが誰かのために願い……優しい気持ちになれるのなら。"
1005602-33 = "そのために、頑張りたいと思えるんです。"
1005602-35 = "サンタを信じる子供たちの夢を守ることも……#n私のするべきことの一つでもありますから。"
1005602-37 = "ねーねー、サンタさんってお髭の人じゃないの？"
1005602-38 = "そうだよ！#nお髭の人って聞いた！"
1005602-39 = "ねー、お髭の人はー？"
1005602-40 = "お姉ちゃん、お髭の人はどこ行ったの？"
1005602-42 = "えっ、えっ？"
1005602-43 = "そ、それは……。"
1005602-44 = "[s3] \"今日はサンタさんが忙しくてね……。\"\n[s4] \"代わりにこの、サンタのお姉さんが来たんだよ。\""
1005602-47 = "な、なるほど……？"
1005602-51 = "えっと、そ、そんな感じです。"
1005602-55 = "あらためまして、サンタのお姉さんです。"
1005602-59 = "みなさん、今まで良い子にしてましたね。#nでは、プレゼントをあげましょう。"
1005602-63 = "ちゃんと並んでる子からかな～？"
1005602-64 = "はい！はい！"
1005602-65 = "今度は割り込んでない……ちゃんと並んだよ！"
1005602-66 = "悪い子でも、頑張って良い子になったら、サンタさん来てくれる……？"
1005602-70 = "ふう、お疲れ様でした。先生。"
1005602-71 = "[s] \"セリナの方こそ。\""
1005602-72 = "い、いえいえ、これくらいでしたら全然。"
1005602-73 = "大変ですが、やり甲斐もありますし。"
1005602-74 = "[s5] \"お疲れ様、サンタさん。\"\n[s6] \"お疲れ様でした、サンタのお姉さん。\""
1005602-77 = "もう、先生まで……。"
1005602-81 = "えっと、忘れ物は……救援物資も入ってるし……。"
1005602-82 = "……？あ、あはは……まあ救援物資は、今日は出番がなくて良かったです。"
1005602-83 = "救急薬を持ち歩くサンタというのも、#n悪くないと思いませんか？"
1005602-84 = "[s] \"確かに。ところで、セリナはサンタって……。\""
1005602-88 = "ああ、えっと……。#n実は、救護騎士団に入る前までは、信じてましたね……。"
1005602-89 = "や、やっぱり変ですかね……！？"
1005602-90 = "そ、そんなに変じゃないです……？"
1005602-91 = "あ、ありがとうございます……。#nすみません、何だか先生相手だとものすごく素直に口から出てしまい……。"
1005602-95 = "救護騎士団に入ってから、#n私は色々な面で変わりました。"
1005602-96 = "多くのことを知ったんです……#nサンタさんの正体も含めて。"
1005602-97 = "[s] \"……がっかりした？\""
1005602-98 = "ふふっ、どうでしょう？"
1005602-99 = "少しは、気落ちしたところもあったかもしれませんが……。"
1005602-100 = "今はこうしてサンタになれて、みんなの夢を支えられて……"
1005602-101 = "これはこれで、とっても嬉しいんです。"
1005602-109 = "あれ？"
1005602-110 = "先生、雪です！"
1005602-112 = "ホワイトクリスマスですよ！"
1005602-113 = "は、はくしゅんっ……！"
1005602-115 = "うう、ちょっと寒いですね……。"
1005602-125 = "[wa:400]― せ、先生？"
1005602-127 = "― このマフラーを……[wa:1500]私に？"
1005602-130 = "― で、[wa:1000]でも……"
1005602-132 = "[wa:200]― 今日の私は[wa:1100]サンタさんですよ。"
1005602-135 = "[wa:1000]― 本当は、[wa:1200]私が"
1005602-137 = "― プレゼントを渡すほうなのに……"
1005602-140 = "[wa:100]― 先生からいただけるだなんて……"
1005602-143 = "[wa:200]― えっ、[wa:1600]サンタさんにも"
1005602-145 = "― ご褒美があってもいい……？"
1005602-148 = "[wa:1400]― そう[wa:1500]おっしゃるなら……"
1005602-150 = "― ふふっ。"
1005602-153 = "[wa:1100]― ありがとうございます、"
1005602-155 = "― 大切にしますね。"
1005602-160 = "マフラー……暖かいですね。"
1005602-161 = "迷惑をかけてしまったようで、#n申し訳ない気持ちもありますけど……。"
1005602-168 = "あの、先生。"
1005602-169 = "もう少し……#nそばにいてくれませんか？"
1005602-170 = "せっかくなので、今夜は……。"
