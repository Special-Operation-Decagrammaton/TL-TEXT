[translation]
10038055-16 = "[ns] \"キサキ！\""
10038055-17 = "動くな、先生！"
10038055-18 = "ここは……危険じゃ。離れておれ。"
10038055-19 = "其方、一体何をしたのじゃ……！#nその身体、まともではあるまい？"
10038055-25 = "ああ――仙丹を飲んだのさ。"
10038055-26 = "それより普段表に出ず、部下任せにしている君には――少々分が悪かったかな？"
10038055-27 = "何を……！"
10038055-32 = "そうだろう？#n現に今だって悩んでいるのではないのかね？"
10038055-33 = "玄武商会と山海経全体、そして月影祭のこと。#n統率がとれなくなりつつある、玄龍門と京劇部……。"
10038055-34 = "口では山海経の伝統を守ると言いながら――"
10038055-39 = "心の奥底では、違う考えを抱いているのではないかね？"
10038055-41 = "……！？"
10038055-42 = "ククッ。君は実に分かりやすいねぇ。全部、表情に出ているよ？"
10038055-43 = "戯言を……！"
10038055-45 = "ここまできて未だなお虚勢を張るというのかい？#nこれまでの君の行動が――その心を十分に証明しているというのに。"
10038055-46 = "玄龍門の君たちだって、うすうす気がついているのだろう？"
10038055-55 = "山海経の伝統を守らねければならない玄龍門の門主が――#n心の奥底では、別の考えを抱いているかもしれないってことをさ。"
10038055-60 = "……！"
10038055-61 = "（やっぱり……門主様は……！）"
10038055-62 = "（はぁ？あんな犯罪者の話を鵜呑みにするの？）"
10038055-63 = "（で、でも……）"
10038055-64 = "（……）"
10038055-68 = "ククッ、ハハハハハッ……！"
10038055-69 = "忠誠を捧げる者は、貫けばいい。#n疑念を抱く者は、そうすればいい。"
10038055-70 = "どれほど偉大な統治者であったとしても、人の心まではどうしようもないものさ。"
10038055-71 = "さあ、全てを詳らかにしようじゃあないか――君に、私と同じ経験を。"
10038055-72 = "なにを……？"
10038055-73 = "同じように――追放される苦しみを味わわせてやろう。"
10038055-74 = "同じように――無所属の生徒であるが故の苦難を経験させてやろう。"
10038055-75 = "同じように――どこにも属すことができず彷徨う虚しさを味わわせてやろう。"
10038055-76 = "それは、其方が……！"
10038055-78 = "君が私を[ruby=・   ・   ・   ・]こうした[/ruby]のだよ――キサキ。"
10038055-82 = "妾、が……？"
10038055-88 = "そうさ。#n他の誰でもない――君が。"
10038055-89 = "私が復讐に胸を燃やすのも――怨みを抱くのも。#nすべて――君のせいだ。"
10038055-90 = "そう――この情念は、門主が背負うものだろう？"
10038055-91 = "……っ！？"
10038055-92 = "花が散り洪水となっても――雷が落ちたとしても。#n天変地異でさえ、君の責任となる。"
10038055-93 = "それが――山海経の門主だろう？"
10038055-94 = "妾は……！"
10038055-95 = "山海経のため……生徒が苦しむのを救うために……。"
10038055-96 = "だから――大事の前の小事として、私を切り捨てたのだろう？"
10038055-97 = "……！！！"
10038055-98 = "ククッ……そう、それだ。#nその顔が見たかったんだよ、キサキ。"
10038055-99 = "見ろ、玄龍門。これが君たちの門主だ。#n君たちの山海経であり、過去に取り残された残滓だよ。"
10038055-100 = "伝統を守ることなど興味がなく――門主の意味すら正しく理解できていない。"
10038055-101 = "名利欲があったのなら、まだ理解ができたというのに――#n自身の真の望みにさえも気づけぬ愚か者だよ。"
10038055-107 = "……"
10038055-108 = "……！"
10038055-110 = "ククッ……私の知る玄龍門は、自らの思考を放棄した集団だった。"
10038055-117 = "しかし、今は自分で考える時ではないかね？"
10038055-118 = "君たちの足で歩き、君たちの口で答えるべきだ。#nその手で選び――その目で見届けよ。"
10038055-119 = "今の玄龍門に――キサキは必要か？"
10038055-120 = "山海経に――キサキは必要か？"
10038055-125 = "……！"
10038055-126 = "……！"
10038055-131 = "[ns] \"ミナ！レイジョ！\""
10038055-135 = "！？"
10038055-136 = "！？"
10038055-137 = "[s] \"この場から離れるよ！キサキをお願い！\""
10038055-141 = "わ、わかった。先生！"
10038055-142 = "はい！"
10038055-164 = "……"
10038055-165 = "興醒めだよ。#nあと少しだったというのに……。"
10038055-166 = "……。"
10038055-167 = "先手を打って行動するとは……ふむ。#nシャーレの先生は、思った以上に大きな変数として作用する人物だったのだねぇ。"
10038055-168 = "まあ、いいか。"
10038055-169 = "私の目標は、完璧な仙丹を生み出すこと。#n他がどうなろうと構わないからねぇ。"
10038055-173 = "ククッ……それではもう一度、すべてを始めよう。"
10038055-174 = "今度こそ、誰にも邪魔されずに成し遂げてみせようじゃあないか。"
