[translation]
10038055-16 = "[ns] \"Kisaki!\""
10038055-17 = "Não se mova, Sensei!"
10038055-18 = "Isto é... perigoso. Afaste-se."
10038055-19 = "O que exatamente você fez...!?#nEsse seu corpo, não deve estar em condições normais, não é?"
10038055-25 = "Ah... eu tomei o Elixir Imortal."
10038055-26 = "Mas, deixando isso de lado, para você que raramente aparece em público e deixa tudo nas mãos dos subordinados... acho que a situação não está muito favorável, não é?"
10038055-27 = "O que você...!"
10038055-32 = "Não é verdade?#nNa verdade, você não está preocupada agora mesmo?"
10038055-33 = "Sobre a Associação Genbu, toda a Shanhaijing e o Festival do Luar.#nA Genryumon e o Clube de Ópera de Pequim, que estão perdendo a liderança..."
10038055-34 = "Enquanto diz da boca para fora que protege as tradições de Shanhaijing..."
10038055-39 = "No fundo do seu coração, você não está abrigando pensamentos diferentes?"
10038055-41 = "……!?"
10038055-42 = "Hehe. Você é realmente fácil de ler. Está tudo estampado no seu rosto, sabia?"
10038055-43 = "Que absurdo...!"
10038055-45 = "Chegamos até aqui e você ainda vai continuar fingindo?#nMesmo que todas as suas ações até agora... provem o suficiente o que há no seu coração."
10038055-46 = "Até vocês da Genryumon já devem ter percebido, não é?"
10038055-55 = "Que a líder da Genryumon, que deveria proteger as tradições de Shanhaijing...#npode estar abrigando pensamentos diferentes no fundo do coração."
10038055-60 = "……!"
10038055-61 = "(Como eu pensei... a líder está...!)"
10038055-62 = "(Hã? Você vai acreditar nas palavras de uma criminosa como ela?)"
10038055-63 = "(Ma-mas...)"
10038055-64 = "(……)"
10038055-68 = "Hehe, hahahahaha...!"
10038055-69 = "Aqueles que juram lealdade, que continuem assim.#nAqueles que nutrem dúvidas, que façam o mesmo."
10038055-70 = "Não importa quão grande seja um governante, não há nada que se possa fazer quanto ao coração das pessoas."
10038055-71 = "Vamos lá, vamos revelar tudo... e fazer você passar pela mesma experiência que eu."
10038055-72 = "O que você...?"
10038055-73 = "Vou fazer você provar o sofrimento de ser banida, assim como eu."
10038055-74 = "Vou fazer você experimentar as dificuldades de ser uma aluna sem afiliação, assim como eu."
10038055-75 = "Vou fazer você sentir o vazio de não pertencer a lugar nenhum, assim como eu."
10038055-76 = "Isso foi porque você...!"
10038055-78 = "Foi você quem me fez isso... Kisaki."
10038055-82 = "Eu...?"
10038055-88 = "Exatamente.#nNinguém mais além de... você."
10038055-89 = "O fato de eu queimar de desejo por vingança... e de nutrir esse ressentimento.#nTudo... é culpa sua."
10038055-90 = "Sim... esse sentimento é algo que a líder deve carregar, não é?"
10038055-91 = "……!?"
10038055-92 = "Mesmo que as flores murchem e causem uma inundação... mesmo que um raio caia.#nAté mesmo desastres naturais se tornam sua responsabilidade."
10038055-93 = "Não é essa a função da líder de Shanhaijing?"
10038055-94 = "Eu...! "
10038055-95 = "Pelo bem de Shanhaijing... para salvar os alunos do sofrimento..."
10038055-96 = "Por isso... você me descartou como um mal menor em prol de um bem maior, não foi?"
10038055-97 = "……!!!"
10038055-98 = "Hehe... isso, exatamente. #nEu queria ver essa cara, Kisaki."
10038055-99 = "Olhem, Genryumon. Esta é a líder de vocês.#nÉ a sua Shanhaijing, um resquício deixado para trás pelo passado."
10038055-100 = "Não tem interesse em proteger as tradições... e nem sequer entende corretamente o significado de ser uma líder."
10038055-101 = "Se houvesse ganância por fama e lucro, eu até entenderia... mas você é uma tola que nem sequer percebe seus próprios desejos verdadeiros."
10038055-107 = "……"
10038055-108 = "……!"
10038055-110 = "Hehe... a Genryumon que eu conhecia era um grupo que havia abandonado o próprio pensamento."
10038055-117 = "Mas não seria agora o momento de vocês pensarem por si mesmos?"
10038055-118 = "Vocês devem caminhar com suas próprias pernas e responder com suas próprias bocas. #nEscolham com suas próprias mãos — e testemunhem com seus próprios olhos."
10038055-119 = "A Genryumon de agora... precisa da Kisaki?"
10038055-120 = "Shanhaijing... precisa da Kisaki?"
10038055-125 = "……！"
10038055-126 = "……！"
10038055-131 = "[ns] \"Mina! Reijo!\""
10038055-135 = "！？"
10038055-136 = "！？"
10038055-137 = "[s] \"Saiam daqui! Cuidem da Kisaki!\""
10038055-141 = "E-entendido, Sensei!"
10038055-142 = "Sim!"
10038055-164 = "……"
10038055-165 = "Que decepção. #nE pensar que faltava tão pouco……"
10038055-166 = "……。"
10038055-167 = "Agir antecipadamente, é? ...Hum. #nO Sensei do Schale acabou sendo uma variável muito maior do que eu imaginava."
10038055-168 = "Bem, tanto faz."
10038055-169 = "Meu objetivo é criar o elixir perfeito. #nO que acontecer com os outros não me importa."
10038055-173 = "Hehe... Então, vamos começar tudo de novo."
10038055-174 = "Desta vez, vamos ver se conseguimos concluir sem que ninguém nos atrapalhe."
