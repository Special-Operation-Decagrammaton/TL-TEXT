[translation]
1002205-1 = "Com a presidente em uma noite de verão"
1002205-2 = "Quarto da Hina"
1002205-4 = "Ufa... Com isso, o trabalho que eu precisava terminar hoje deve estar todo concluído...?"
1002205-5 = "Ah, que canseira..."
1002205-6 = "Talvez seja porque acordei cedo, mas já estou exausta mesmo sendo essa hora... Talvez seja melhor descansar um pouco antes do compromisso da tarde..."
1002205-7 = "Não posso me forçar e acabar preocupando o Sensei de novo..."
1002205-8 = "Só um pouquinho..."
1002205-20 = "(Hmm...)"
1002205-21 = "(Hmm... ah...)"
1002205-22 = "(Meu corpo está pesado... talvez eu esteja mais cansada do que pensava...)"
1002205-23 = "(Hmm... ufa. Mas, faz tempo que não dormia tão bem... bem, depois disso...)"
1002205-24 = "(Que horas são agora, afinal...?)"
1002205-25 = "(18h... perdi a hora do almoço...)"
1002205-27 = "(Bem, isso não importa, mas o compromisso de agora... ...!?) "
1002205-29 = "Ah!! O compromisso com o Sensei...!"
1002205-30 = "[s] \"Ah, bom dia, Hina. Conseguiu dormir bem?\""
1002205-31 = "......"
1002205-32 = "......?"
1002205-33 = "......!?"
1002205-34 = "Se-Sensei!? Po-por que o Sensei está aqui...!?"
1002205-35 = "E além disso, por que não me acordou...!? Já passou da hora...!"
1002205-36 = "[s1] \"É que parecia que você estava dormindo tão bem.\"\n[s2] \"Você esteve tão ocupada ultimamente, queria que descansasse um pouco.\""
1002205-37 = "Sensei..."
1002205-38 = "Sensei..."
1002205-39 = "......"
1002205-40 = "O compromisso de hoje... fui eu quem convidei para irmos juntos..."
1002205-41 = "Sinto muito, de verdade..."
1002205-42 = "Eu estava tão animada para ir à praia com o Sensei, mas por minha causa..."
1002205-43 = "O Sensei também deve estar ocupado..."
1002205-44 = "......?"
1002205-45 = "Ah, sim. É verdade, talvez meu tempo de sono tenha sido um pouco curto ultimamente...?"
1002205-46 = "Hoje, especialmente, esse..."
1002205-47 = "Ma-mas, isso foi algo que eu mesma escolhi fazer...!"
1002205-48 = "Uma coisa não tem nada a ver com a outra. Isso é um problema de como cuido da minha saúde...!"
1002205-49 = "Isso não serve de desculpa..."
1002205-50 = "Sinto muito mesmo, Sensei. Agora não temos mais tempo de ir à praia... por minha causa, o tempo do Sensei foi desperdiçado..."
1002205-51 = "Eu, eu..."
1002205-58 = "......? Se-Sensei...?"
1002205-59 = "O-o que foi? De repente segurar minha mão..."
1002205-60 = "[s] \"Ainda não acabou. A praia está logo ali.\""
1002205-61 = "Logo ali, você diz..."
1002205-62 = "Ah... agora que falou, dizem que dá para ver o mar do terraço deste hotel..."
1002205-63 = "Como não era necessário para o acampamento, eu tinha proibido o acesso..."
1002205-64 = "[s3] \"Vamos!\"\n[s4] \"O mar visto de lá também deve ser lindo!\""
1002205-65 = "...Por que o Sensei é tão gentil assim?"
1002205-66 = "...Por que o Sensei é tão gentil assim?"
1002205-67 = "............"
1002205-68 = "...Não, não é nada."
1002205-69 = "O Sensei sempre foi assim. Sempre fazendo isso comigo..."
1002205-70 = "...Sim, se o Sensei diz, vamos. Mesmo que seja agora."
1002205-71 = "Bem, então..."
1002205-75 = "Ah, hmm..."
1002205-76 = "Atchim...!"
1002205-77 = "O-o que foi...? Eu também espirro de vez em quando."
1002205-78 = "...Estou bem, não é um resfriado. É só porque acabei de acordar, então..."
1002205-85 = "Isso... é um cardigã? Você trouxe especialmente para mim?"
1002205-86 = "...Não, nada, obrigada."
1002205-87 = "(Como você sempre é tão atencioso comigo, eu...)"
1002205-88 = "...Então, vou aceitar sem cerimônia."
1002205-89 = "Sendo assim, vamos ver o mar que você disse com tanta confiança que era lindo."
1002205-95 = "[wa:500]— Por que será que todo mundo [wa:1450] gosta tanto do mar... [wa:1900] eu pensava,"
1002205-97 = "— Sempre pensei assim. [wa:150]"
1002205-100 = "— Todos parecem se divertir, mas,"
1002205-102 = "[wa:200]— Eu [wa:750] simplesmente não conseguia gostar..."
1002205-105 = "[wa:500]— Não dá para ver [wa:1300] direito dentro da água, [wa:1850] e fico ansiosa [wa:1350] quando não sinto o chão..."
1002205-107 = "— Você nunca [wa:1050] sentiu isso também, Sensei?"
1002205-110 = "[wa:500]— Especialmente [wa:1350] o mar à noite, [wa:1900] é sinistro [wa:550] como a escuridão..."
1002205-112 = "[wa:100]— Só de olhar [wa:1350] parece que vou ser sugada, [wa:2400] então nunca [wa:500] consegui gostar..."
1002205-115 = "[wa:500]— Mas... [wa:2900] agora, [wa:1750] sinto que entendo [wa:1850] um pouco do que todos sentem."
1002205-117 = "— O mar... [wa:1750] era tão lindo assim?"
1002205-120 = "[wa:500]— Que estranho... [wa:2250] até hoje, [wa:1000] eu nunca tinha pensado desse jeito."
1002205-123 = "— Obrigada, Sensei. [wa:2400] Por ficar comigo..."
1002205-125 = "[wa:200]— E por me ensinar [wa:900] tantas coisas."
1002205-128 = "(Assim, nós dois ficamos juntos, observando o mar que brilhava refletindo o pôr do sol, até que ele se escondesse no horizonte.)"
