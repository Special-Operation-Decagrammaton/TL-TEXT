[translation]
1002205-1 = "委員長と夏の夜に"
1002205-2 = "ヒナの部屋"
1002205-4 = "ふう……これで、今日やらなきゃいけない仕事は全部終わったはず……？"
1002205-5 = "はあ、めんどくさかった……。"
1002205-6 = "早起きしたからか、まだこんな時間なのにもう疲れた……午後の約束まで、少し休んでおいた方が良いかもしれない……。"
1002205-7 = "無理をして、また先生を困らせるわけにはいかないし……。"
1002205-8 = "少しだ、け……"
1002205-20 = "（ん……）"
1002205-21 = "（んんっ……ふぁ……）"
1002205-22 = "（身体が重い……思ったより、疲労が溜まってるのかも……）"
1002205-23 = "（んっ……ふぅ。でも、久しぶりによく寝た……えっと、この後は……）"
1002205-24 = "（今、そもそも何時……？）"
1002205-25 = "（午後6時……お昼、食べそびれた……）"
1002205-27 = "（まあそれは良いけど……この後の予定は…………っ！？）"
1002205-29 = "っ！！先生との……っ！"
1002205-30 = "[s] \"あ、おはよう、ヒナ。よく眠れた？\""
1002205-31 = "……。"
1002205-32 = "……？"
1002205-33 = "……！？"
1002205-34 = "せ、先生！？どっ、どうして先生がここに……！？"
1002205-35 = "それにっ、どうして起こさなかったの……！？もう時間が……！"
1002205-36 = "[s1] \"ヒナが気持ちよく眠れてそうだったから。\"\n[s2] \"ずっと忙しかったんだし、少しゆっくり寝てほしいなって。\""
1002205-37 = "先生……。"
1002205-38 = "先生……。"
1002205-39 = "……。"
1002205-40 = "今日の約束……私から、一緒にって誘ったのに……。"
1002205-41 = "本当に、ごめん……。"
1002205-42 = "せっかく先生と海に行けると思ったのに、私のせいで……。"
1002205-43 = "先生だって、忙しいはずなのに……。"
1002205-44 = "……？"
1002205-45 = "う、うん。確かに、最近は少し、睡眠時間が短かったかも……？"
1002205-46 = "今日は特に、その……。"
1002205-47 = "で、でも、それは私が自分で進んでしたことで……！"
1002205-48 = "それとこれとは話が別。これは、私の体調管理の問題で……！"
1002205-49 = "言い訳には、ならない……。"
1002205-50 = "本当にごめん、先生。今からじゃ海に行く時間も無いし……私のせいで、先生の時間を無駄にして……。"
1002205-51 = "私、私……。"
1002205-58 = "……？せ、先生……？"
1002205-59 = "な、何？急に手を握って……。"
1002205-60 = "[s] \"まだ終わってないよ。海はすぐそこにあるんだし。\""
1002205-61 = "すぐそこに、って……。"
1002205-62 = "あっ……そういえばここのホテル、テラスから海が見下ろせるって……。"
1002205-63 = "合宿には要らないから、出入り禁止にしてたけど……。"
1002205-64 = "[s3] \"行こう！\"\n[s4] \"そこから眺める海も、絶対に綺麗だよ！\""
1002205-65 = "……どうして、先生はそんなに優しいの？"
1002205-66 = "……どうして、先生はそんなに優しいの？"
1002205-67 = "…………。"
1002205-68 = "……ううん、何でもない。"
1002205-69 = "先生は、いつもそうだった。そうやって、いっつも私に……。"
1002205-70 = "……うん、先生がそう言うなら、行こう。今からでも。"
1002205-71 = "じゃあ、えっと……"
1002205-75 = "あ、んっ……。"
1002205-76 = "へくしゅっ……！"
1002205-77 = "な、何……？私だって、くしゃみくらいする。"
1002205-78 = "……大丈夫、風邪とかじゃない。これは、今起きたばっかりだから――"
1002205-85 = "これ……カーディガン？わざわざ持ってきてくれたの？"
1002205-86 = "……ううん、ありがとう。"
1002205-87 = "（いつもこうやって、気を遣ってくれるから、私は……）"
1002205-88 = "……なら、遠慮なく。"
1002205-89 = "それじゃあ、先生が自信満々に綺麗だって言った海、見に行こう。"
1002205-95 = "[wa:500]― 何でみんな、[wa:1450]そんなに海が好きなんだろう……[wa:1900]って、"
1002205-97 = "― ずっとそう思ってた。[wa:150] "
1002205-100 = "― みんなは楽しそうだけど、"
1002205-102 = "[wa:200]― 私は[wa:750]どうしても好きになれなくて……"
1002205-105 = "[wa:500]― 水の中は[wa:1300]よく見えないし、[wa:1850]足がつかないと[wa:1350]不安だし……"
1002205-107 = "― 先生も、[wa:1050]そう思ったことない？"
1002205-110 = "[wa:500]― 特に[wa:1350]夜の海は、[wa:1900]まるで[wa:550]暗闇みたいに不気味で……"
1002205-112 = "[wa:100]― 見てるだけで[wa:1350]吸い込まれそうで、[wa:2400]好きに[wa:500]なれなかったけど……"
1002205-115 = "[wa:500]― でも……[wa:2900]今は、[wa:1750]みんなの気持ちが[wa:1850]少しだけ分かった気がする。"
1002205-117 = "― 海って、[wa:1750]こんなに綺麗だったのね。"
1002205-120 = "[wa:500]― 不思議……[wa:2250]今まで、[wa:1000]こんな風に思ったことなかったのに。"
1002205-123 = "― ありがとう、先生。[wa:2400]一緒にいてくれて……"
1002205-125 = "[wa:200]― 色んなことを、[wa:900]教えてくれて。"
1002205-128 = "（そうやって二人で一緒に、夕日が沈むまで、きらきらと夕焼けを反射して輝く海を見つめていた）"
