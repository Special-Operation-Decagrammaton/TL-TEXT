[translation]
80000061-1 = "Momento precioso, lugar precioso"
80000061-7 = "（Ao entrar na sala do Comitê Disciplinar da Academia Gehenna, logo encontrei Chinatsu.）"
80000061-8 = "……Ah, Sensei. Obrigado por se dar ao trabalho de vir até aqui."
80000061-9 = "Aliás, não há mais ninguém aqui hoje. Estou cuidando do local sozinha."
80000061-11 = "Ah, sobre isso……"
80000061-12 = "Não é que eu tenha planejado isso para te deixar desconfortável, ou para que você tivesse que se preocupar comigo, é que……"
80000061-13 = "Bem, não é que eu não tenha pensado nisso, mas……"
80000061-14 = "De qualquer forma, Sensei, pegue isto."
80000061-20 = "[ns1] \"……Chocolate?\"\n[ns2] \"Biscoito da sorte?\""
80000061-21 = "Sim. É um biscoito da sorte sabor chocolate."
80000061-22 = "Sim. Sabor chocolate, isso mesmo."
80000061-23 = "……Eh?"
80000061-24 = "O motivo de eu ter escolhido isso, você pergunta?"
80000061-25 = "Bem, claro que é porque é Dia dos Namorados, e também……"
80000061-26 = "Além disso, meus sentimentos de gratidão, meu afeto……"
80000061-27 = "É difícil expressar isso com precisão hoje, ou melhor…… receio que, para o bem ou para o mal, acabe sendo transmitido de forma exagerada……"
80000061-28 = "Não, não é que eu não queira ou que eu ache indesejável, mas……"
80000061-29 = "……."
80000061-30 = "Desculpe, não ligue para isso…… De qualquer forma, por favor, aceite……"
80000061-31 = "[s3] \"Obrigado, vou aceitar.\"\n[s4] Abre um dos biscoitos da sorte."
80000061-40 = "Bem, o que saiu? Por precaução, posso ver também……?"
80000061-44 = "……Entendo."
80000061-45 = "「The time to be happy is now. The place to be happy is here」……"
80000061-46 = "O momento de ser feliz é agora. O lugar de ser feliz é aqui……"
80000061-47 = "Não acha que é uma frase bonita? Isso descreve exatamente como nós estamos agora……"
80000061-48 = "[s5] \"Sim, é muito bonita. Aliás……\"\n[s6] \"Posso abrir os outros?\""
80000061-49 = "……Eh!? I-isso é, bem……!"
80000061-50 = "……Eh!? I-isso é, bem……!"
80000061-51 = "Se-Sensei! Espere um pouco, isso……!!"
80000061-55 = "[ns7] \"The time to be happy is now. The place to be happy is here……。\"\n[ns8] \"……O mesmo papel?\""
80000061-56 = "I-isso é…… bem……"
80000061-57 = "I-isso é…… bem……"
80000061-62 = "Pa-pare com isso, por favor!? Se você abrir mais do que isso……!"
80000061-63 = "Eh, o mesmo conteúdo? Isso é, bem……"
80000061-64 = "[s9] \"Será que todos são assim?\"\n[s10] \"Chinatsu, isso significa……\""
80000061-65 = "……."
80000061-66 = "……."
80000061-70 = "……Bom trabalho!!"
80000061-75 = "[ns] \"Chinatsu!?\""
80000061-77 = "（Depois disso, consegui alcançar a Chinatsu e conversamos com calma.）"
