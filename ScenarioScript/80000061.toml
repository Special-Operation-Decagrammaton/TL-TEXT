[translation]
80000061-1 = "大切な時、大切な場所"
80000061-7 = "（ゲヘナ学園の風紀委員会の教室に入ると、すぐにチナツの姿を見つけた）"
80000061-8 = "……あ、先生。ご足労いただきありがとうございます。"
80000061-9 = "ちなみに、他の方は今日誰もいません。今日は私ひとりでお留守番なので。"
80000061-11 = "あ、その……。"
80000061-12 = "狙ったと言いますか、それで気を遣わせたり、気を遣ってもらったりというわけでは、その……。"
80000061-13 = "ないわけでは、ないのですが……。"
80000061-14 = "とにかく先生、これを。"
80000061-20 = "[ns1] \"……チョコレート？\"\n[ns2] \"フォーチュンクッキー？\""
80000061-21 = "はい。チョコレート味のフォーチュンクッキーです。"
80000061-22 = "はい。チョコレート味の、です。"
80000061-23 = "……え？"
80000061-24 = "これを選んだ理由、ですか？"
80000061-25 = "その、もちろんバレンタインだからというのもありますし……。"
80000061-26 = "それに、感謝の気持ちを、好意を……。"
80000061-27 = "今日それを正確に伝えるのは難しいと言いますか……その、良くも悪くも伝わってしまいすぎる懸念があると言いますか……。"
80000061-28 = "いえその、決して嫌ですとか、それを望ましく思わないわけではないのですが……"
80000061-29 = "……。"
80000061-30 = "ごめんなさい、気にしないでください……とりあえず、こちらをどうぞ……。"
80000061-31 = "[s3] \"ありがとね、いただきます。\"\n[s4] フォーチュンクッキーを一つ開ける。"
80000061-40 = "えっと、何が出ましたか？念のため、私も見ても良いです……？"
80000061-44 = "……なるほど。"
80000061-45 = "「The time to be happy is now. The place to be happy is here」……"
80000061-46 = "今が幸せな時間で、ここが幸せな場所……"
80000061-47 = "良い言葉だと思いませんか？これはまさに、今の私たちを……"
80000061-48 = "[s5] \"うん、すごく良いね。ちなみにだけど……\"\n[s6] \"他のも開けてみて良い？\""
80000061-49 = "……えっ！？そっ、それはあの……！"
80000061-50 = "……えっ！？そっ、それはあの……！"
80000061-51 = "せ、先生！少々お待ちを、その……っ！！"
80000061-55 = "[ns7] \"The time to be happy is now. The place to be happy is here……。\"\n[ns8] \"……同じ紙？\""
80000061-56 = "そ、それは……えっと……。"
80000061-57 = "そ、それは……えっと……。"
80000061-62 = "や、やめてください！？それ以上開けられてしまうと……！"
80000061-63 = "え、同じ内容？それは、その……"
80000061-64 = "[s9] \"もしかして、全部？\"\n[s10] \"チナツ、これって……\""
80000061-65 = "……。"
80000061-66 = "……。"
80000061-70 = "……お疲れ様ですっ！！"
80000061-75 = "[ns] \"チナツ！？\""
80000061-77 = "（その後何とかチナツに追いついて、ちゃんと落ち着いてお話をした）"
