[translation]
10035060-1 = "Episódio 6; Jacaré, fora de controle!"
10035060-3 = "[ns1] \"Que calor...\"\n[ns2] \"Está tão quente que sinto que vou derreter...\""
10035060-6 = "……Sinto muito, Sensei."
10035060-7 = "Aceita um takoyaki...?"
10035060-8 = "Não tem nenhum cliente por aqui também..."
10035060-9 = "É óbvio, né... Quem comeria takoyaki num tempo desses..."
10035060-10 = "Pessoal... sinto muito mesmo. A culpa é minha..."
10035060-11 = "N-não se preocupe! #nPoderei me gabar depois de ter comido um takoyaki feito pela própria diretora!"
10035060-12 = "É verdade. Dizer no Departamento de Segurança que aquela \"Cão Louco\" estava fazendo takoyaki... #nninguém vai acreditar, com certeza."
10035060-13 = "Vocês sempre cuidam de mim."
10035060-14 = "E o Sensei também..."
10035060-15 = "Sensei, o takoyaki que acabei de fazer... aceita um?"
10035060-16 = "É a única forma que tenho de retribuir..."
10035060-17 = "[s3] \"Eu compro, por que não comemos todos juntos?\"\n[s4] \"Não acho certo ganhar o produto de graça.\""
10035060-20 = "M-mas, ainda temos o trabalho de atendimento ao cliente..."
10035060-21 = "De qualquer forma, ninguém vem, então não tem problema, né?"
10035060-22 = "Além disso, se ficarem perto do fogo o tempo todo, vão acabar desmaiando."
10035060-23 = "Toda a água do meu corpo... vai evaporar..."
10035060-24 = "……É verdade. Vamos descansar um pouco."
10035060-26 = "Ufa, melhorou um pouco."
10035060-27 = "Estávamos trabalhando sem parar, né, puxa vida."
10035060-28 = "……."
10035060-29 = "[s] \"Pessoal, hoje foi um dia difícil, não é?\""
10035060-30 = "Pensei que vir para a piscina seria refrescante, mas não foi bem assim~."
10035060-31 = "Se eu soubesse que seria assim, teria ficado relaxando no escritório com ar-condicionado."
10035060-32 = "Mas eu fico feliz por ter vindo!"
10035060-33 = "Pude ver de perto os cidadãos se divertindo!"
10035060-34 = "……."
10035060-35 = "[s] \"Como você se sentiu, Kanna?\""
10035060-36 = "Para ser sincera..."
10035060-37 = "Foi a primeira vez que senti tanta impotência."
10035060-38 = "Cometi muitos erros no atendimento aos cidadãos também."
10035060-39 = "Por causa de um mal-entendido meu, acabei causando problemas a todos."
10035060-40 = "Pelo visto, eu levo mais jeito para o Departamento de Segurança mesmo."
10035060-41 = "[s] \"Eu acho que você está se saindo bem, Kanna.\""
10035060-45 = "Você é péssimo em mentir, Sensei."
10035060-46 = "Eu sou a primeira a saber que não tenho talento para salva-vidas."
10035060-47 = "Se eu não tivesse me deixado levar pelas palavras do vice-diretor, nada disso teria acontecido..."
10035060-49 = "O vice-diretor do Departamento de Segurança? #nO que aconteceu com ele...?"
10035060-50 = "Falando nisso, você ainda não me contou o motivo de o nome da diretora Kanna estar na lista de transferidos. #n"
10035060-51 = "Ele te enganou?"
10035060-52 = "……."
10035060-53 = "Acho que não preciso mais esconder."
10035060-58 = "……Naquela época, ainda era possível tomar uma atitude."
10035060-59 = "Eu poderia ter recusado. Mas... eu não fiz isso."
10035060-60 = "Ele disse que, se eu ainda tivesse o sentimento de quando me voluntariei para o Departamento de Segurança Pública, essa seria minha chance... #ne eu acabei caindo na conversa do vice-diretor."
10035060-61 = "É uma história realmente estúpida."
10035060-62 = "Hehe, no fim das contas, deve ter sido apenas um apego vergonhoso. #nO sentimento que ainda restava dentro de mim..."
10035060-65 = "……."
10035060-67 = "Bem, tanto faz."
10035060-68 = "Na verdade, talvez tenha sido melhor assim."
10035060-69 = "Consegui reafirmar que não sou capaz de lidar com os cidadãos."
10035060-70 = "[s] \"Não é verdade.\""
10035060-71 = "Sensei?"
10035060-72 = "[s] \"O seu desejo de ajudar os cidadãos não mudou, certo?\""
10035060-73 = "……Mas eu nem consigo fazer uma expressão amigável direito."
10035060-74 = "Quando me voluntariei, fui reprovada justamente porque minha aparência é intimidadora……."
10035060-75 = "[s] \"Ser capaz ou não, isso não é o mais importante.\""
10035060-77 = "[ns] \"O que importa é o que você quer fazer.\""
10035060-79 = "É mesmo?"
10035060-80 = "O Sensei sempre diz coisas que eu não espero."
10035060-81 = "[s] \"Tenho certeza de que todos pensam assim.\""
10035060-85 = "[ns] \"A Kirino também.\""
10035060-87 = "[ns] \"A Fubuki também.\""
10035060-89 = "[ns] \"A Love também.\""
10035060-91 = "[ns] \"……Hã?\""
10035060-93 = "Ah!?"
10035060-94 = "E-eu acabei……!"
10035060-98 = "Esse rosto me é familiar. É a Komakaze Love, uma executiva do grupo de delinquentes conhecido como \"Gangue dos Capacetes\"."
10035060-99 = "Ah! Aquele capacete! Eu já vi antes!"
10035060-100 = "Você estava no toboágua agora pouco, não estava!?"
10035060-102 = "E você é aquela que disse que ia contar até três, mas empurrou no dois!?"
10035060-103 = "Droga! A Valkyrie, nos perseguindo até aqui……!"
10035060-107 = "[ns5] \"Ei, e-espere!\"\n[ns6] \"E-ela fugiu!?\""
10035060-110 = "Eu vou atrás dela! Vamos, Fubuki, levante-se!"
10035060-111 = "Por que~ o takoyaki tinha acabado de esfriar……."
10035060-117 = "Espere! O alarme está tocando!"
10035060-118 = "A Gangue dos Capacetes já aprontou alguma coisa?"
10035060-119 = "Ah! Não é isso! Olhe ali!"
10035060-120 = "Na direção da piscina……!"
10035060-128 = "Aaaaaah!"
10035060-129 = "É um crocodilo! Tem um crocodilo na piscina!"
10035060-130 = "T-todos, fujam!"
10035060-131 = "É ele!"
10035060-132 = "A criatura perigosa que vimos antes!"
10035060-133 = "Mas a aparência parece mais com um robô!?"
10035060-134 = "Ah! Já está na beira da piscina!? Se continuar assim, os cidadãos estarão em perigo!"
10035060-135 = "O-o que é aquilo!?"
10035060-136 = "Onde será que o pessoal da Gangue dos Capacetes conseguiu algo assim……."
10035060-137 = "[s] \"Todos estão em perigo.\""
10035060-138 = "Sim! Como parte do Departamento de Segurança Pública, precisamos proteger a segurança dos cidadãos!"
10035060-140 = "Vamos!"
