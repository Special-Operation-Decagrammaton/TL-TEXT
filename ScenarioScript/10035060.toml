[translation]
10035060-1 = "第6話;ワニ、大暴走！"
10035060-3 = "[ns1] \"暑いね……。\"\n[ns2] \"暑くて溶けちゃいそう……。\""
10035060-6 = "……申し訳ありません、先生。"
10035060-7 = "タコ焼き、いかがですか……。"
10035060-8 = "お客様も、誰もいませんね……。"
10035060-9 = "当たり前でしょ……誰がこんな天気にタコ焼きなんか……。"
10035060-10 = "お前たち……本当にすまない。私のせいだ……。"
10035060-11 = "だ、大丈夫です！#n局長が焼いたタコ焼きを食べたって、あとで自慢できますから！"
10035060-12 = "そうそう。あの「狂犬」がタコ焼きを焼いてたんだよ～ってさ、#n公安局で言っても、きっと誰も信じないだろうね。"
10035060-13 = "お前たちには、世話になりっぱなしだな。"
10035060-14 = "それに、先生にも……。"
10035060-15 = "先生、先ほど作ったタコ焼き……一個いかがですか？"
10035060-16 = "私にお返しできることは、これしか……。"
10035060-17 = "[s3] \"私が買うから、みんなで食べない？\"\n[s4] \"商品をタダでもらうのは、あれだし。\""
10035060-20 = "し、しかし、我々はまだ接客の仕事が……。"
10035060-21 = "どうせ誰も来ないし、別にいいんじゃない？"
10035060-22 = "それに、ずっと火の近くに居たら、倒れちゃうって。"
10035060-23 = "体中の水分が……蒸発してしまいます……。"
10035060-24 = "……そうだな。少し休むか。"
10035060-26 = "ふぅ、すこしはマシになりましたね。"
10035060-27 = "ずっと働きっぱなしだったからねー、やれやれ。"
10035060-28 = "……。"
10035060-29 = "[s] \"みんな、今日は大変だったね。\""
10035060-30 = "プールに来れば涼しいと思ってたけど、そんなことなかったね～。"
10035060-31 = "こうなるとわかってたら、冷房の効いた事務所でのんびりしてたのに。"
10035060-32 = "でも、本官は来て良かったです！"
10035060-33 = "市民の皆さんが楽しむ姿を、すぐそばで見れましたから！"
10035060-34 = "……。"
10035060-35 = "[s] \"カンナはどうだった？\""
10035060-36 = "正直に言って……。"
10035060-37 = "これほど自分の無力を痛感したのは、初めてです。"
10035060-38 = "市民対応もミスばかりでしたし。"
10035060-39 = "私の勘違いから、皆に迷惑をかけてしまいました。"
10035060-40 = "やはり、私は公安局のほうが向いているようです。"
10035060-41 = "[s] \"カンナは上手くやっていると思うけど。\""
10035060-45 = "嘘が下手ですね、先生。"
10035060-46 = "私にライフセーバーの素質が無いことは、自分が一番わかっています。"
10035060-47 = "副局長の言葉に惑わされなければ、こんな事には……。"
10035060-49 = "公安局の副局長ですか？#nその方と何かあったんですか……？"
10035060-50 = "そういえば、出向者のリストにカンナ局長の名前が載っていた理由、#nまだ教えてもらえてなかったな。"
10035060-51 = "副局長にはめられたりしたの？"
10035060-52 = "……。"
10035060-53 = "もう隠す必要もないか。"
10035060-58 = "……あの時はまだ手を打つことは可能だった。"
10035060-59 = "断ることもできただろう。だが――私はそうしなかった。"
10035060-60 = "生活安全局に志願した時の気持ちがまだあるならチャンスだと……#nそう言う副局長の話に乗ってしまったんだ。"
10035060-61 = "本当に、バカみたいな話だ。"
10035060-62 = "ふふ、結局、ただの格好の悪い未練だったんだろうな。#n私のなかに残っていた気持ちは……。"
10035060-65 = "……。"
10035060-67 = "まあいい。"
10035060-68 = "むしろ、これで良かったのかもしれない。"
10035060-69 = "私なんかに市民対応はできないと、再認識することができた。"
10035060-70 = "[s] \"そんなことないよ。\""
10035060-71 = "先生？"
10035060-72 = "[s] \"市民を助けたい気持ちは変わっていないんだよね？\""
10035060-73 = "……しかし、私は笑顔すらまともに作れません。"
10035060-74 = "志願した時も、印象が怖いという理由で落とされていますし……。"
10035060-75 = "[s] \"できるかできないかは重要じゃないよ。\""
10035060-77 = "[ns] \"大事なのは、「何をしたいか」だからね。\""
10035060-79 = "そう、ですか。"
10035060-80 = "先生はいつも、予想外のことを言ってくださるのですね。"
10035060-81 = "[s] \"みんな、そう思っているはずだよ。\""
10035060-85 = "[ns] \"キリノも。\""
10035060-87 = "[ns] \"フブキも。\""
10035060-89 = "[ns] \"ラブも。\""
10035060-91 = "[ns] \"……うん？\""
10035060-93 = "はっ！？"
10035060-94 = "つ、つい……！"
10035060-98 = "見覚えのある顔だな。不良集団、通称「ヘルメット団」の幹部、[ruby=こまかぜ]河駒風[/ruby]ラブ。"
10035060-99 = "あっ！あのヘルメット！見たことあります！"
10035060-100 = "さっき、ウォータースライダーに乗ってましたね！？"
10035060-102 = "そういうあんたは、3つ数えるって言っておいて2で押したやつ！？"
10035060-103 = "ちっ！ヴァルキューレめ、ここまで追ってくるなんて……！"
10035060-107 = "[ns5] \"え、ま、待って！\"\n[ns6] \"に、逃げた！？\""
10035060-110 = "私が追いかけます！ほら、フブキも立ってください！"
10035060-111 = "なんで～タコ焼き、ちょうど冷めたところなのに……。"
10035060-117 = "待て！警報が鳴っている！"
10035060-118 = "ヘルメット団のやつ、もう何かやらかしたの？"
10035060-119 = "はっ！違います！あ、あちらを見てください！"
10035060-120 = "プールのほうに……！"
10035060-128 = "きゃぁぁぁ！"
10035060-129 = "ワニだ！プールにワニがいるぞ！"
10035060-130 = "み、みんな逃げて！"
10035060-131 = "あいつだ！"
10035060-132 = "さっき見た危険生物！"
10035060-133 = "見た目はロボットに近いようですが！？"
10035060-134 = "はっ！もうプールサイドに！？このままでは市民に危険が！"
10035060-135 = "な、なんなの、あれは！？"
10035060-136 = "ヘルメット団のやつら、どこであんなもんを……。"
10035060-137 = "[s] \"みんなが危険だ。\""
10035060-138 = "はい！生活安全局として市民の安全を守らなければ！"
10035060-140 = "行きましょう！"
