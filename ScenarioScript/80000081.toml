[translation]
80000081-1 = "O Dia dos Namorados também deve ser com espírito de ninja...!"
80000081-3 = "（Manhã do Dia dos Namorados）"
80000081-6 = "Finalmente, este dia chegou..."
80000081-7 = "Dia dos Namorados..."
80000081-8 = "O dia de presentear alguém especial com chocolates..."
80000081-12 = "Eu preparei os chocolates, mas..."
80000081-13 = "Apenas entregar não seria o suficiente para deixar alguém feliz, né..."
80000081-14 = "Disseram-me: \"Não se esqueça do espírito ninja nem no Dia dos Namorados!\"..."
80000081-15 = "Mas, o que seria um Dia dos Namorados ao estilo ninja...?"
80000081-16 = "Estilo ninja, estilo ninja... estilo nin..."
80000081-20 = "Ah... será que, se for assim...!"
80000081-25 = "[ns1] \"Ufa, o trabalho externo terminou, mas...\"\n[ns2] \"Agora tem a pilha de documentos...\""
80000081-31 = "[ns] \"Primeiro, uma folha...\""
80000081-33 = "…………."
80000081-37 = "[ns] \"Ouvi um barulho... será que ouvi errado?\""
80000081-39 = "[ns] \"Agora, o relatório...\""
80000081-43 = "............ Ugh."
80000081-45 = "[ns] \"...Hm? Não, preciso me concentrar agora.\""
80000081-47 = "[ns] \"De qualquer forma, vou começar pelos prazos mais curtos...\""
80000081-49 = "U-ugh..."
80000081-53 = "[ns] \"A-alguém está aí!?\""
80000081-54 = "Ugh, ugh... *sniff*..."
80000081-55 = "（Uma voz misteriosa na sala de trabalho, onde não deveria ter ninguém...）"
80000081-56 = "[ns] \"N-não me diga que é... um fantasma!?\""
80000081-57 = "Ugh... p-por favor, me ajude... Sensei..."
80000081-58 = "[s] \"Será que é dentro do armário...?\""
80000081-64 = "[ns] \"Por que você está em um lugar desses...?\""
80000081-65 = "S-Sensei... eu acabei ficando presa..."
80000081-66 = "P-pode me ajudar... por favor...? #n*sniff*..."
80000081-68 = "（Depois disso, ouvi a explicação de Tsukuyo）"
80000081-70 = "Bem... hoje é o Dia dos Namorados, não é..."
80000081-71 = "O dia de dar chocolates para alguém especial, uma vez por ano..."
80000081-72 = "Então... eu vim pensando no Sensei, mas..."
80000081-73 = "[s] \"Mas...?\""
80000081-74 = "Ugh... mas pensei que, se eu apenas entregasse normalmente, meus sentimentos não seriam transmitidos..."
80000081-75 = "Além disso, me disseram: \"Dê o seu melhor como ninja em tudo!\"..."
80000081-76 = "[s] \"Ah... acho que sei de quem foi esse conselho...\""
80000081-77 = "Fiquei pensando sozinha sobre como poderia deixar o Sensei feliz..."
80000081-78 = "[s] \"Então foi por isso que você se escondeu no armário.\""
80000081-79 = "Sim... e entrar foi fácil, mas... #nquando tentei entregar o chocolate ao Sensei, acabei ficando presa..."
80000081-80 = "É-é por causa do meu corpo, né...?"
80000081-81 = "Por eu ser grande... por causa disso..."
80000081-82 = "Acabei causando esse transtorno..."
80000081-83 = "Uuuuu... d-desculpe...!!"
80000081-84 = "[s] \"Não é nada disso. Fique tranquila, Tsukuyo.\""
80000081-86 = "[ns] \"Na verdade, fico feliz que tenha pensado em mim.\""
80000081-87 = "V-verdade...?"
80000081-88 = "Eu estava tão preocupada, pensando se isso era o certo... se o Sensei ficaria feliz..."
80000081-89 = "Mas..."
80000081-90 = "Regra de ouro dos ninjas, número um! #n\"Um ninja deve sempre enfrentar desafios sem hesitar, em qualquer situação\"!"
80000081-91 = "……sem esquecer desse sentimento…… eu me esforcei muito para fazer!"
80000081-96 = "[ns] \"……?\""
80000081-97 = "Hum, aconteceu alguma coisa……?"
80000081-98 = "Ah, será que……"
80000081-99 = "É que até agora…… eu fiquei apertando ele contra o meu peito……"
80000081-100 = "Ugh, uuu……"
80000081-101 = "Eu não acredito que chegou a esse ponto……"
80000081-102 = "Derreter com a temperatura do meu corpo……"
80000081-103 = "De, des, desculpe……!"
80000081-104 = "Acabou virando um presente assim……!"
80000081-105 = "[s] \"En, entendi…….\""
80000081-106 = "Eu não posso te entregar uma coisa dessas……!"
80000081-107 = "Es, espera, o chocolate, eu te dou outra hora…… não, talvez amanhã……!"
80000081-113 = "[ns] \"Espere, Tsukuyo!\""
80000081-114 = "Se, Sensei……?"
80000081-115 = "[s] \"Eu quero esse mesmo!\""
80000081-116 = "Sé, sério……?"
80000081-117 = "[s] \"Afinal, foi um chocolate que a Tsukuyo preparou para mim!\""
80000081-118 = "En, então……!"
80000081-122 = "[ns] \"Obrigado, Tsukuyo. Então, quando eu terminar o trabalho――\""
80000081-123 = "Aquele…… Se, Sensei!#nSe, se, se não for pedir muito……!"
80000081-124 = "Poderia…… me dizer o que achou, agora mesmo……?"
80000081-125 = "Não, não pode……?"
80000081-126 = "[s3] \"A, aqui mesmo……?\"\n[s4] (O chocolate derretido pela temperatura da Tsukuyo…… na frente dela!?) "
80000081-127 = "……Ah."
80000081-128 = "……Ah."
80000081-129 = "Como eu pensei……"
80000081-130 = "……Um chocolate assim……"
80000081-131 = "Pedir para você comer só vai te causar problemas, não é?"
80000081-132 = "Ah, ahaha…… desculpe.#nEu só vivo causando problemas……"
80000081-133 = "[s] \"Isso não é verdade!\""
80000081-134 = "Sim……?"
80000081-135 = "[s] \"Porque foi a Tsukuyo quem fez para mim!\""
80000081-136 = "Ah……."
80000081-137 = "(Deixando o constrangimento de lado, comi o chocolate)"
80000081-141 = "[ns] \"Hum, está delicioso, como esperado!\""
80000081-142 = "Uau……"
80000081-143 = "Que, que bom……!"
80000081-144 = "Eu vou continuar me esforçando ao máximo!"
80000081-145 = "Cada vez mais…… como uma ninja!"
80000081-146 = "[s] \"U, uhum! Estou ansioso por isso!\""
80000081-147 = "Ehehe!"
80000081-149 = "(Deixando de lado a premonição de que problemas parecidos acontecerão da próxima vez……)"
80000081-150 = "(Saboreei o chocolate que ganhei da Tsukuyo e aproveitei o Dia dos Namorados)"
