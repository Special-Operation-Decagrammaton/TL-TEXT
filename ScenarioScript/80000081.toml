[translation]
80000081-1 = "バレンタインも、忍者の、精神で……！"
80000081-3 = "（バレンタインデー当日の朝）"
80000081-6 = "ついに、この日が……"
80000081-7 = "バレンタインデー……"
80000081-8 = "大切な人に、チョコレートを贈る日……"
80000081-12 = "チョコレートは、用意、しましたが……"
80000081-13 = "ただ渡すだけでは、喜んでもらえない、ですよね……"
80000081-14 = "「バレンタインも忍者の精神を忘れずにね！」と、言われましたし……"
80000081-15 = "でも、忍者らしいバレンタインって……？"
80000081-16 = "忍者らしく、忍者らしく……忍者らし……"
80000081-20 = "あっ……もしかして、これなら……！"
80000081-25 = "[ns1] \"ふぅ、外回りの仕事は終わったけど……。\"\n[ns2] \"次は書類の山が……。\""
80000081-31 = "[ns] \"まずは一枚……。\""
80000081-33 = "…………。"
80000081-37 = "[ns] \"何か物音が……って、聞き間違えかな？\""
80000081-39 = "[ns] \"次は報告書を……。\""
80000081-43 = "…………うう。"
80000081-45 = "[ns] \"……ん？いや、今は集中しないと。\""
80000081-47 = "[ns] \"とにかく期限が近いものから……。\""
80000081-49 = "う、ううっ……"
80000081-53 = "[ns] \"だ、誰かいるの！？\""
80000081-54 = "うっ、うぅっ……ぐすん……"
80000081-55 = "（誰もいないはずの執務室に、謎の声が……）"
80000081-56 = "[ns] \"ま、まさか……お化け！？\""
80000081-57 = "うぅ……た、助けてください……先生ぃ……。"
80000081-58 = "[s] \"もしかして、ロッカーの中……？\""
80000081-64 = "[ns] \"どうしてこんなところに……？\""
80000081-65 = "せ、先生ぇ……出られなく、なってしまい……"
80000081-66 = "た、助けて……いただけませんか……？#nぐすん……。"
80000081-68 = "（その後、ツクヨから経緯を聞いた）"
80000081-70 = "その……今日は、バレンタインデー、ですよね……。"
80000081-71 = "一年に一度、大切な人に、チョコレートを渡す日……"
80000081-72 = "そこで……先生に、と思って来たのですが……"
80000081-73 = "[s] \"ですが……？\""
80000081-74 = "うぅ……でも、普通に渡すだけじゃ、気持ちが伝わらないのでは、と……"
80000081-75 = "それに「何事も忍者らしく頑張って！」と言われたので……"
80000081-76 = "[s] \"あー……誰の言葉か分かった気がする……。\""
80000081-77 = "どうすれば、先生が喜んでくれるか……自分なりに、悩んで……"
80000081-78 = "[s] \"それでロッカーに隠れてたんだね。\""
80000081-79 = "はい……それで、入るところまでは、良かったのですが……#nいざ、先生にチョコレートを渡そうとしたら、抜けられなくなって、しまって……"
80000081-80 = "や、やっぱり、この身体のせい……ですよね？"
80000081-81 = "私が大きいから……そのせいで……"
80000081-82 = "こんな風に、迷惑、かけてしまって……"
80000081-83 = "うううっ……す、すみません……！！"
80000081-84 = "[s] \"そんなことないよ。安心して、ツクヨ。\""
80000081-86 = "[ns] \"それより、私のためを思ってくれたのが嬉しい。\""
80000081-87 = "そ、そう、ですか……？"
80000081-88 = "ずっと、これで良いのか……先生に喜んでもらえるか、心配で、心配で……"
80000081-89 = "でも……"
80000081-90 = "忍者の鉄則その壱！#n「忍者とはいついかなる状況でも、躊躇わずに挑戦するもの」！"
80000081-91 = "……という心構えを、忘れずに……頑張って、作りました！"
80000081-96 = "[ns] \"……？\""
80000081-97 = "えっと、どうか、しましたか……？"
80000081-98 = "あっ、もしかして……"
80000081-99 = "さっきまで……胸元でギュって、してた、から……"
80000081-100 = "うっ、うぅ……"
80000081-101 = "こんなことに、なるとは……"
80000081-102 = "私の体温で、溶けちゃうなんて……"
80000081-103 = "す、すすっ……すみません……！"
80000081-104 = "こんな、贈り物に、なってしまって……！"
80000081-105 = "[s] \"そ、そっか……。\""
80000081-106 = "こんなもの、お渡しする、わけには……！"
80000081-107 = "ちょ、チョコレートは、また今度……いえ、明日にでも……！"
80000081-113 = "[ns] \"待って、ツクヨ！\""
80000081-114 = "せ、先生……？"
80000081-115 = "[s] \"私はそれが欲しい！\""
80000081-116 = "ほ、本当、ですか……？"
80000081-117 = "[s] \"ツクヨが用意してくれたチョコだもの！\""
80000081-118 = "でっ、では……！"
80000081-122 = "[ns] \"ありがとね、ツクヨ。じゃあ仕事が終わったら――\""
80000081-123 = "あの……せ、先生！#nよ、よ、よろしければ……！"
80000081-124 = "今、ここで感想を……聞かせて、いただき、たい、のですがっ……"
80000081-125 = "だ、ダメでしょうか……？"
80000081-126 = "[s3] \"こ、この場で……？\"\n[s4] （ツクヨの体温で溶けたチョコを……本人の目の前で！？）"
80000081-127 = "……あっ。"
80000081-128 = "……あっ。"
80000081-129 = "やっぱり……"
80000081-130 = "……こんな、チョコレート……"
80000081-131 = "食べてほしいなんて、言われても、困るだけ……ですよね。"
80000081-132 = "あ、あははっ……すみません。#n私、迷惑ばっかり、かけて……"
80000081-133 = "[s] \"そんなことない！\""
80000081-134 = "はい……？"
80000081-135 = "[s] \"だって、ツクヨが作ってくれたんだから！\""
80000081-136 = "あっ……。"
80000081-137 = "（気恥ずかしい気持ちを振り払って、チョコレートを食べた）"
80000081-141 = "[ns] \"うん、やっぱり美味しいよ！\""
80000081-142 = "わぁっ……"
80000081-143 = "よ、良かったぁ……！"
80000081-144 = "私、これからも精一杯、頑張ります！"
80000081-145 = "もっと、もっと……忍者として！"
80000081-146 = "[s] \"う、うん！楽しみにしてるね！\""
80000081-147 = "えへへっ！"
80000081-149 = "（また次も、似たようなトラブルが起こりそうな予感はさておき……）"
80000081-150 = "（ツクヨから貰ったチョコを味わい、バレンタインデーを楽しんだ）"
