[translation]
13225-5 = "くっ、こいつら……！"
13225-6 = "大破しました！#nど、どうすればっ！"
13225-7 = "くっ……本部に報告しろ！#nこんなところで足止め食らってる場合じゃない！"
13225-9 = "ターゲットです！"
13225-11 = "うわっ。降参、降参！"
13225-12 = "撃たないでー。#nまずは話し合いでしょー。"
13225-14 = "……違う、こいつらじゃない。#nアビドスの奴らはどこに行った？"
13225-16 = "アビドスって？"
13225-17 = "孤高の走り屋に乗客はいらなーい。"
13225-19 = "中にも見つかりません！"
13225-20 = "最初から列車に乗っていなかったのでは！？"
13225-22 = "そんなはずは……！"
13225-24 = "というか、お茶くらい出してくれたって良いじゃん？"
13225-25 = "お菓子食べたーい。"
13225-27 = "な、何だこいつら……。"
13225-33 = "[ns] \"みんな、大丈夫？\""
13225-37 = "ん、平気。"
13225-38 = "……はい、気づかれずに済んだみたいで良かったです。"
13225-39 = "ちょっとでも飛び降りるのが遅れてたら、見つかってたわね……。"
13225-41 = "ここからセクター35-9まで、1時間ほどかかる見込みです！"
13225-42 = "行きましょう！"
13225-48 = "アビドス砂漠閉鎖地区セクター35-9"
13225-50 = "……着きました。"
13225-51 = "ここが執事さんの言っていた分岐駅……。"
13225-52 = "けど、だいぶ前に閉鎖されてるのよね？"
13225-53 = "ん、あっちの扉が開いてる。"
13225-58 = "行ってみましょう！"
13225-65 = "ここは……。"
13225-66 = "管制室でしょうね。"
13225-72 = "なるほど……これを使えば、色々なエリアへ行けるようになっています。"
13225-77 = "アビドス市内や大オアシス駅だけでなく、ゲヘナにも。"
13225-78 = "すでに管理者権限でアクティベートされていますね……。#nおそらく、ノノミ先輩のカードを使って……。"
13225-80 = "スオウさんだと思います。"
13225-81 = "……数時間ほど前に、#n二つの列車が生徒会の谷方面に向かっています。"
13225-83 = "片方はホシノ先輩だね。"
13225-84 = "それでは……。"
13225-98 = "この車両に乗れば着けるはずです。"
13225-99 = "もう乗っても大丈夫なんでしょうか？"
13225-100 = "はい。自動運転で1時間後には、「生徒会の谷」に到着するようになっています。"
13225-102 = "日が暮れる前には着けそうだね。"
13225-103 = "その生徒会の谷に、列車砲があるんだよね？"
13225-104 = "うん。ホシノ先輩が何かする前に追いつかないと。"
13225-105 = "はぁ、手のかかる先輩ね。"
13225-107 = "スオウさんは、なぜあの場所にホシノ先輩を呼び出したのでしょう。#nいったい何を考えているのか……。"
13225-108 = "行けば分かるはず。"
13225-109 = "まずは行くしかありません！"
13225-110 = "[s] \"そうだね、出発しよう。\""
13225-122 = "ここで合ってるのかな？"
13225-126 = "もしかして、アレが……。"
13225-137 = "次回;生徒会の谷"
