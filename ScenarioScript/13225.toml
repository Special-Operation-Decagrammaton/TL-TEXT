[translation]
13225-5 = "Droga, esses caras...!"
13225-6 = "Sofremos danos críticos!#nO-o que a gente faz?!"
13225-7 = "Droga... Relatem ao quartel-general!#nNão temos tempo para ficar presos aqui!"
13225-9 = "É o alvo!"
13225-11 = "Uau. Eu me rendo, eu me rendo!"
13225-12 = "Não atirem.#nVamos conversar primeiro, né?"
13225-14 = "……Não, não são eles.#nPara onde foi o pessoal de Abydos?"
13225-16 = "Abydos?"
13225-17 = "Uma corredora solitária não precisa de passageiros."
13225-19 = "Não os encontramos lá dentro também!"
13225-20 = "Será que eles nem chegaram a embarcar no trem?!"
13225-22 = "Isso é impossível……!"
13225-24 = "Aliás, vocês podiam pelo menos servir um chá, né?"
13225-25 = "Quero comer um doce."
13225-27 = "Q-quem são essas pessoas……."
13225-33 = "[ns] \"Pessoal, estão todas bem?\""
13225-37 = "Hum, estou bem."
13225-38 = "……Sim, parece que conseguimos passar despercebidas, que bom."
13225-39 = "Se tivéssemos demorado um pouco mais para pular, teriam nos visto……."
13225-41 = "A previsão é de uma hora daqui até o Setor 35-9!"
13225-42 = "Vamos nessa!"
13225-48 = "Deserto de Abydos, Área Fechada, Setor 35-9"
13225-50 = "……Chegamos."
13225-51 = "Esta é a estação de ramal que o mordomo mencionou……."
13225-52 = "Mas ela não foi fechada há muito tempo?"
13225-53 = "Hum, aquela porta ali está aberta."
13225-58 = "Vamos dar uma olhada!"
13225-65 = "Isto é……."
13225-66 = "Deve ser a sala de controle."
13225-72 = "Entendo…… Usando isto, é possível ir para várias áreas diferentes."
13225-77 = "Não só para a cidade de Abydos e a estação do Grande Oásis, mas também para Gehenna."
13225-78 = "Já foi ativado com privilégios de administrador……#nProvavelmente usando o cartão da Nonomi-senpai……."
13225-80 = "Acho que foi a Suou."
13225-81 = "……Há algumas horas,#ndois trens seguiram em direção ao Vale do Conselho Estudantil."
13225-83 = "Um deles é a Hoshino-senpai, né."
13225-84 = "Então……."
13225-98 = "Se pegarmos este veículo, devemos conseguir chegar lá."
13225-99 = "Já é seguro embarcar?"
13225-100 = "Sim. Está configurado para seguir em modo automático e chegar ao \"Vale do Conselho Estudantil\" em uma hora."
13225-102 = "Devemos chegar antes do anoitecer."
13225-103 = "É nesse Vale do Conselho Estudantil que fica o canhão ferroviário, né?"
13225-104 = "Sim. Precisamos alcançá-la antes que a Hoshino-senpai faça alguma coisa."
13225-105 = "Ah, que senpai problemática."
13225-107 = "Por que será que a Suou chamou a Hoshino-senpai para aquele lugar?#nO que será que ela está pensando……."
13225-108 = "Vamos descobrir quando chegarmos lá."
13225-109 = "Não temos outra escolha a não ser ir!"
13225-110 = "[s] \"É verdade, vamos partir.\""
13225-122 = "Será que é aqui mesmo?"
13225-126 = "Será que aquilo é……."
13225-137 = "Próximo episódio: Vale do Conselho Estudantil"
