[translation]
51030-1 = "Episódio 3: Encontro Inesperado (2)"
51030-3 = "Tsc! Quem diria que era o professor do Schale!"
51030-4 = "E-eu disse que isso não ia dar certo!"
51030-5 = "Hã? Não foi você quem disse para aproveitar a confusão dos preparativos do festival para ganhar um dinheiro fácil!?"
51030-6 = "O-o quê? Desde quando eu disse isso...?! Eu ouvi isso de outra pessoa!"
51030-7 = "Droga! Esquece! Vamos recuar, todo mundo, retirar!"
51030-13 = "…N-nós vencemos."
51030-19 = "O que foi aquilo agora há pouco? Foi, tipo, incrível!"
51030-20 = "Cada instrução foi precisa, e a sensação de que nossa sintonia estava perfeita...#nParecia até que eu tinha reencontrado meu cãozinho de estimação da infância..."
51030-21 = "Será que... você é um amigo de infância...#nque se perdeu de mim há muito tempo?"
51030-22 = "[s] \"Acho que não sou nem seu cão, nem seu amigo de infância...\""
51030-23 = "Ah..."
51030-24 = "Entendo."
51030-25 = "[s] (Ela parece bem decepcionada...)"
51030-26 = "Nossa, os movimentos da senhorita também foram esplêndidos."
51030-27 = "Esse uniforme... você é da Hyakkiyako, não é?"
51030-31 = "[ns] (Falando em Hyakkiyako, se não me engano...)"
51030-32 = "Ah, bem..."
51030-33 = "Não, esquece, não deve ser. Ouvi dizer que elas estão de castigo por causa da tal \"Ordem de Dissolução\"."
51030-38 = "Não!"
51030-43 = "Isso seria um equívoco, ou melhor... estou verificando a situação agora..."
51030-44 = "Se souberem que estou aqui, vão descobrir que eu fugi...#nÉ melhor eu não dizer nada... ai, ai..."
51030-45 = "[s] \"...?\""
51030-46 = "...? Parece que há algum motivo por trás disso."
51030-47 = "Bem, não sei os detalhes, mas..."
51030-52 = "Vocês nos salvaram, obrigado."
51030-53 = "Eu achei que tinha perdido isso em algum lugar..."
51030-58 = "Não foi nada! Se precisar de ajuda, pode contar comigo a qualquer momento!"
51030-60 = "(O morador agradeceu e foi embora)"
51030-64 = "Permita-me apresentar-me formalmente."
51030-69 = "Eu sou, de..."
51030-73 = "Meu nome é Yukari. Obrigada pela ajuda de agora há pouco."
51030-74 = "[s] \"Ajudar alunos em apuros é o meu dever.\""
51030-75 = "Hã?"
51030-76 = "Ajudar os outros como se fosse algo natural e ainda por cima não querer crédito por isso..."
51030-77 = "…Ah!"
51030-78 = "Falando nisso, a veterana Renge me disse uma vez...!"
51030-79 = "…Que esse tipo de comportamento é uma armadilha sofisticada!"
51030-80 = "Dizem que existem pessoas mal-intencionadas que agem como se fossem gentis, mas depois aparecem dizendo \"Sou eu! Sou eu!\" e exigem quantias absurdas de dinheiro...!"
51030-81 = "…Será que estou em uma situação de perigo extremo?"
51030-82 = "[s] \"Não, não, eu não sou uma pessoa suspeita, sou o professor do Schale.\""
51030-86 = "…Peço perdão por não saber disso."
51030-87 = "Mas, graças ao professor, conseguimos ajudar quem precisava!"
51030-88 = "Hum... como posso retribuir esse favor?"
51030-92 = "—Já decidi!"
51030-93 = "Já que estamos aqui, vou te guiar por Hyakkiyako!"
51030-99 = "[ns] \"Bem, eu tenho alguns assuntos...\""
51030-100 = "Vamos, professor! Por aqui!"
51030-105 = "(E assim, acabei sendo guiado por Hyakkiyako pela Yukari)"
51030-108 = "Hyakkiyako é um distrito autônomo com um turismo muito próspero..."
51030-109 = "A atração mais popular aqui é..."
51030-118 = "（Sendo puxado pela mão por Yukari, que caminha alegremente à frente, voltamos ao local do festival）"
51030-126 = "Conecte aquilo primeiro! Segurem firme e priorizem a segurança!"
51030-127 = "Onde devo colocar este material...?#nPreciso liberar o espaço logo...!"
51030-130 = "Hum... a confirmação final dos participantes da apresentação não termina..."
51030-131 = "Ei, vocês aí! Não fiquem parados, mexam-se!"
51030-132 = "Ei, pessoal! Comam isso e depois continuaremos!"
51030-134 = "[ns] \"Parece que vocês estão muito ocupados.\""
51030-135 = "Sim, é que um festival será realizado em breve."
51030-136 = "[s] \"Mas... a atmosfera parece diferente dos festivais de sempre.\""
51030-140 = "Perceber isso... você tem um bom olho, não é?"
51030-141 = "Não é para menos, já que este festival é..."
51030-142 = "A ressurreição do \"Festival das Lanternas de Hyakkiyako\", que foi descontinuado há 20 anos.#nÉ algo muuuito especial."
51030-145 = "Esta é uma tradição passada pelo colégio, mas..."
51030-146 = "Há muito tempo, após superar a era dos conflitos, o Colégio Hyakkiyako mudou seu nome para Colégio Unificado Hyakkiyako e renasceu."
51030-149 = "No entanto, embora a luta tenha acabado, as feridas não cicatrizariam tão cedo..."
51030-150 = "Por isso, para aliviar a ansiedade das pessoas, a figura central do Hyakkiyako daquela época propôs este \"Festival das Lanternas de Hyakkiyako\"."
51030-153 = "Colocar as feridas do passado nas lanternas e desejar pelo futuro que virá...#nOuvi dizer que é assim que se conecta o coração de todos."
51030-154 = "[s] \"Mas por que foi descontinuado há 20 anos?\""
51030-155 = "Bem, isso é..."
51030-156 = "Eu mesma não ouvi os detalhes sobre a situação da época... até lá eu não..."
51030-162 = "Esses detalhes triviais não são importantes."
51030-167 = "Sim!?"
51030-169 = "Vocês são ajudantes?#nOu turistas que chegaram cedo demais?"
51030-170 = "Bem, não importa qual seja... esta vista é algo impressionante, não é?"
51030-171 = "[s] \"Sim, realmente.\""
51030-172 = "Não sei o que aconteceu há 20 anos...#nmas é gratificante poder reviver o festival assim."
51030-173 = "Ah, é verdade. Afinal, Hyakkiyako é o colégio dos festivais!"
51030-174 = "Como tivemos aquele incidente... todos estão se esforçando naturalmente, por assim dizer."
51030-178 = "Graças a isso, estou tão ocupado que estou ficando tonto!#nÉ o caso clássico de precisar de toda ajuda possível! Hahaha!"
51030-179 = "Especialmente a presidente do comitê organizador do festival, que tem se dedicado muito!#nEla é cheia de energia, uma pessoa realmente incrível."
51030-184 = "A presidente do comitê organizador do festival..."
51030-185 = "[s] \"Entendo, então a Shizuko...\""
51030-187 = "Além disso, ouvi dizer que aquela sacerdotisa realizará um ritual neste festival!"
51030-188 = "Sim!"
51030-189 = "Como o destaque deste \"Festival das Lanternas de Hyakkiyako\"—"
51030-196 = "Eu entendo que todos vocês têm um grande apego a isso, mas..."
51030-197 = "Mas... eu preciso ir para o Hyakkiyoran..."
51030-202 = "Senhorita!"
51030-203 = "A senhora estava aqui! Ouvi dizer que saiu correndo da mansão assim que soube da ordem de dissolução, e fiquei preocupada."
51030-207 = "……!! "
51030-212 = "[ns] \"……Hm?\""
51030-214 = "Ser encontrada tão cedo... não há o que fazer."
51030-215 = "Ehem... Professor [USERNAME]. Agradeço sinceramente pela sua ajuda hoje.#nEsta dívida, eu jamais esquecerei—"
51030-219 = "Haa, haa...! Não vou deixar você escapar desta vez!"
51030-220 = "—Ah, não há tempo suficiente para expressar meus sentimentos!"
51030-221 = "É uma pena, mas vou indo por aqui!"
51030-225 = "Senhorita, espere! Senhoritaaaaaa!!"
51030-231 = "[ns] \"Ela era como uma tempestade...\""
51030-234 = "Próximo episódio: No Departamento Yin-Yang"
