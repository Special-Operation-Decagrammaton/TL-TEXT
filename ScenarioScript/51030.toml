[translation]
51030-1 = "Episódio 3; Um Encontro Inesperado (2)"
51030-3 = "Tsc! Quem diria que era o Sensei da Schale!"
51030-4 = "E, eu sabia que isso ia dar ruim!"
51030-5 = "Hã? Foi você quem disse 'Vamos aproveitar a bagunça dos preparativos para o festival e ganhar uma grana preta!', não foi!?"
51030-6 = "O, o, o quê? Desde quando fui eu que disse isso...! Eu só ouvi um outro cara falando isso!?"
51030-7 = "Droga! Deixa pra lá! Vamos recuar por enquanto, todos recuem!"
51030-13 = "......V, vencemos."
51030-19 = "O que foi aquilo agora? Você foi incriíível!"
51030-20 = "Cada instrução foi tão precisa, a sincronia foi tão perfeita... #n Senti como se tivesse reencontrado o meu cachorrinho querido da infância..."
51030-21 = "Por acaso... o senhor não seria... #n um amigo de infância do qual me separei há muito tempo?"
51030-22 = "[s] \"Acho que não sou nem seu cachorro e nem amigo de infância...\""
51030-23 = "Ara..."
51030-24 = "Entendo."
51030-25 = "[s] (Ela parece muito decepcionada...)"
51030-26 = "Ora, ora, os movimentos da senhorita também foram esplêndidos."
51030-27 = "Essa roupa... você é uma das garotas da Hyakkaryouran, não é?"
51030-31 = "[ns] (Falando na Hyakkaryouran, se bem me lembro...)"
51030-32 = "Ah, ehm..."
51030-33 = "Não, isso não pode ser. #n Ouvi dizer que elas estão suspensas por causa de um tal de 'Decreto de Dissolução'."
51030-38 = "Não!"
51030-43 = "Digamos que isso não seja totalmente verdade... ou melhor, estamos no processo de verificar a situação..."
51030-44 = "Se descobrirem que estou aqui, vão saber que fugi... #n Pensando bem, é melhor eu não dizer nada... ugh..."
51030-45 = "[s] \"......?\""
51030-46 = "......? Parece que você tem seus motivos."
51030-47 = "Bem, não sei dos detalhes, mas... "
51030-52 = "Vocês me salvaram, aos dois. Obrigado."
51030-53 = "Eu tinha certeza de que tinha deixado cair em algum lugar..."
51030-58 = "De forma alguma! Isso não foi nada... #n Se precisar de ajuda, eu, Yukari, estarei sempre à disposição!"
51030-60 = "(O morador se despediu com palavras de gratidão e foi embora)"
51030-64 = "Gostaria de me apresentar formalmente."
51030-69 = "Eu me chamo Kade..."
51030-73 = "M, me chamo Yukari. #n Muito obrigada pela ajuda de agora há pouco."
51030-74 = "[s] \"Ajudar alunos com problemas é a coisa mais natural a se fazer.\""
51030-75 = "Eh? "
51030-76 = "Ajudar os outros como se fosse a coisa mais natural e nem sequer se gabar por isso..."
51030-77 = "......Ha!"
51030-78 = "Pensando bem, já ouvi falar disso da Renge-senpai...!"
51030-79 = "......Que esse tipo de atitude é uma armadilha muito bem elaborada!"
51030-80 = "Que no começo a pessoa parece ser gentil, mas depois vem com 'Sou eu! Sou eu!' e exige quantias absurdas de dinheiro, e que há vigaristas assim por aí...!"
51030-81 = "......Será que estou, por acaso, em um perigo mortal?"
51030-82 = "[s] \"Não, não, não sou ninguém suspeito, sou o Sensei da Schale.\""
51030-86 = "......Eu não sabia, sinto muito."
51030-87 = "Mas, graças ao senhor, conseguimos ajudar alguém em apuros!"
51030-88 = "Hmm... Como posso retribuir esse favor?"
51030-92 = "――Já sei!"
51030-93 = "Já que estamos aqui, farei uma visita guiada pela Hyakkiyako!"
51030-99 = "[ns] \"Ah, eu tenho um compromisso...\""
51030-100 = "Venha, Sensei! Por aqui!"
51030-105 = "(E assim, a Yukari acabou me guiando pela Hyakkiyako)"
51030-108 = "Hyakkiyako é um distrito com uma forte indústria de turismo..."
51030-109 = "A apresentação mais popular aqui é..."
51030-118 = "(Puxado pela Yukari, que caminhava animadamente à frente, retornamos ao local do festival)"
51030-126 = "Conectem aquilo primeiro! Segurem firme, segurança em primeiro lugar!"
51030-127 = "Onde eu devo colocar esses materiais...? #n Precisamos liberar espaço rápido...!"
51030-130 = "Ugh... a verificação final dos participantes das apresentações nunca acaba..."
51030-131 = "Ei, você aí! Não fique parado, vamos trabalhar!"
51030-132 = "Ei, pessoal! Vamos comer isso e depois continuar!"
51030-134 = "[ns] \"Parece que as coisas estão bem agitadas.\""
51030-135 = "Sim, haverá um festival em breve."
51030-136 = "[s] \"Mas... parece que a atmosfera está diferente do festival de costume.\""
51030-140 = "Notar isso... você tem um bom olho, Sensei."
51030-141 = "E não é para menos, o festival desta vez..."
51030-142 = "É o renascimento do 'Festival das Lanternas da Hyakkiyako', que foi cancelado há 20 anos. #n Portanto, é muuuito especial."
51030-145 = "Esta é uma lenda transmitida pela academia, mas..."
51030-146 = "Há muito tempo, a Academia Hyakkiyako sobreviveu a uma era de conflitos, mudou seu nome para Academia Combinada Hyakkiyako e renasceu."
51030-149 = "No entanto, embora o conflito tenha terminado, as feridas não curariam tão cedo..."
51030-150 = "Então, para aliviar a ansiedade do povo, a pessoa que era o centro da Hyakkiyako na época propôs este 'Festival das Lanternas da Hyakkiyako'."
51030-153 = "Confiar as feridas do passado às lanternas e desejar um futuro melhor... #n Foi assim que, pelo que ouvi, uniram os corações de todos."
51030-154 = "[s] \"Mas ser cancelado há 20 anos... por quê?\""
51030-155 = "Ehm, sobre isso... "
51030-156 = "Nem eu ouvi falar da situação detalhada da época... isso..."
51030-162 = "Detalhes tão pequenos não são importantes."
51030-167 = "Quê!?"
51030-169 = "Vocês estão ajudando? #n Ou são apenas turistas que chegaram muito cedo?"
51030-170 = "Bem, não importa... não é uma vista e tanto?"
51030-171 = "[s] \"Sim, realmente é.\""
51030-172 = "Não sei o que aconteceu há 20 anos... #n mas é motivo de alegria poder reviver o festival assim."
51030-173 = "Ah, sim. Afinal, Hyakkiyako é a academia dos festivais!"
51030-174 = "Com tudo o que aconteceu... é natural que todos se esforcem."
51030-178 = "Graças a isso, estou tão ocupado que sinto que vou desmaiar! #n Eu aceitaria até mesmo a ajuda de um gato! Hahaha!"
51030-179 = "Especialmente a presidente do comitê do festival, que se dedicou muito! #n Ela é muito enérgica, uma pessoa realmente incrível."
51030-184 = "A presidente do comitê do festival..."
51030-185 = "[s] \"Entendo, então a Shizuko...\""
51030-187 = "E ouvi dizer que, desta vez, aquela Miko apresentará um ritual?"
51030-188 = "Sim!"
51030-189 = "Como a principal atração do 'Festival das Lanternas da Hyakkiyako' desta vez――"
51030-196 = "Eu sei o quanto isso significa para todos vocês..."
51030-197 = "Mas... eu... na Hyakkaryouran..."
51030-202 = "Senhorita!"
51030-203 = "Você estava aqui! Estava preocupado, soube que você saiu correndo da mansão assim que ouviu sobre o Decreto de Dissolução."
51030-207 = "......!!"
51030-212 = "[ns] \"......Hm?\" "
51030-214 = "Ser encontrada tão rápido... não tem jeito."
51030-215 = "*Ahem*... Sensei. Agradeço imensamente pela ajuda de hoje. #n Jamais esquecerei desse favor――"
51030-219 = "*Haa, haa*...! Não vou deixar você escapar!"
51030-220 = "――Uau, não tenho tempo para expressar meus sentimentos de gratidão!"
51030-221 = "É uma pena, mas me despeço por aqui!"
51030-225 = "Senhorita, espere! Senhoritaaa~~~!!"
51030-231 = "[ns] \"Parecia um furacão...\""
51030-234 = "Próximo Episódio; No Clube Yin-Yang"
