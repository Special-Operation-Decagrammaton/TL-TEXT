[translation]
51030-1 = "第3話;思いがけない出会い（２）"
51030-3 = "チッ！まさかシャーレの先生だったとは！"
51030-4 = "や、やっぱ、こんなの良くねえって！"
51030-5 = "はぁ？お祭りの準備に紛れて一発儲けよう！とか言ってたのはお前だろ！？"
51030-6 = "なっ、い、いつの間に俺が言ったことになってんだよ……！俺は他の奴に言われたぞ！？"
51030-7 = "クソッ！もういい！一旦退くぞ、全員撤収！"
51030-13 = "……か、勝てましたわね。"
51030-19 = "さっきのは一体何ですの？とーっても、すごかったですわ！"
51030-20 = "一つひとつの指示が的確で、呼吸がぴたりと合うような感覚……#nまるで、幼い頃、共に過ごした愛犬と再会を果たしたような……"
51030-21 = "もしや……あなた様は遠い昔に生き別れになってしまった……#n幼馴染なのでしょうか？"
51030-22 = "[s] \"愛犬でも幼馴染でもないと思うよ……\""
51030-23 = "あら……"
51030-24 = "そうでしたか。"
51030-25 = "[s] （すごくガッカリしてるみたいだ……）"
51030-26 = "いやはや、お嬢さんの動きも素晴らしかった。"
51030-27 = "その格好……百花繚乱の子だね？"
51030-31 = "[ns] （百花繚乱といえば、たしか……）"
51030-32 = "ああ、ええっと……"
51030-33 = "いや、そんなわけないか。#n「解散令」とやらで、謹慎中だと聞いとるからなぁ。"
51030-38 = "いえ！"
51030-43 = "それは語弊があると申しますか……今、確認しているところといいますか……"
51030-44 = "身共がここに居ると知られたら、逃げてきたのがバレてしまう……#nやっぱり、ここは何も言わない方が……ううーん……"
51030-45 = "[s] \"……？\""
51030-46 = "……？どうやら事情があるみたいだな。"
51030-47 = "まあ、詳しいことは分からんが…… "
51030-52 = "助かったよ、お二人さん。ありがとう。"
51030-53 = "てっきり、どこかで落としたのかと思っていたから……"
51030-58 = "いえ！これくらい……#nもしお困りでしたら、いつでも身共が力になりますの！"
51030-60 = "（住民は感謝の言葉を残して帰っていった）"
51030-64 = "改めて、ご挨拶を申し上げますわ。"
51030-69 = "身共は、かで……"
51030-73 = "ユ、ユカリと申します。#n先ほどは助かりましたの。"
51030-74 = "[s] \"困っている生徒を助けるのは当然だからね。\""
51030-75 = "ええと？ "
51030-76 = "人助けを当然のように行ない、そのうえ誇ろうとすらしないなんて……"
51030-77 = "……ハッ！"
51030-78 = "そういえば身共、レンゲ先輩から聞いたことがありますの……！"
51030-79 = "……そういった行為は巧妙な罠なのだと！"
51030-80 = "初めは心優しい方だったのに、後になって「オレだよ！オレ！」と言い、あり得ない額の金銭を要求する不届き者が居るとか居ないとか……！"
51030-81 = "……もしや身共、絶体絶命のぴんちですの？"
51030-82 = "[s] \"いやいや、私は怪しい人じゃなくて、シャーレの先生だよ。\""
51030-86 = "……そうとは知らず、申し訳ありませんでした。"
51030-87 = "ですが、先生のおかげで困っている方を助けられましたの！"
51030-88 = "ふむ……このご恩は、どうすればお返しできるのでしょう。"
51030-92 = "――決めましたわ！"
51030-93 = "せっかくですから、百鬼夜行をご案内いたします！"
51030-99 = "[ns] \"えっと、私は用事が……\""
51030-100 = "さあ先生！こちらですわ！"
51030-105 = "（こうして、ユカリに百鬼夜行の案内をしてもらうことになった）"
51030-108 = "百鬼夜行は観光業が盛んな自治区で……"
51030-109 = "ここで一番人気の公演は……"
51030-118 = "（楽しそうに前を歩くユカリに手を引かれ、再びお祭り会場へ戻ってきた）"
51030-126 = "そっちを先に繋げろ！しっかり抑えて安全第一にな！"
51030-127 = "この資材はどこに置けば……？#n早く場所を空けないといけなくて……！"
51030-130 = "むぅ……公演参加者の最終確認が終わらない……"
51030-131 = "おいそこ！ボサッとしてないで動け！"
51030-132 = "おーい、みんな！これを食べたら続きにするぞ！"
51030-134 = "[ns] \"なんだかすごく忙しそうだね。\""
51030-135 = "ええ、近々お祭りが開かれる予定でして。"
51030-136 = "[s] \"でも……いつものお祭りとは雰囲気が違うような。\""
51030-140 = "そこに気づくだなんて……見る目がありますのね。"
51030-141 = "それもそのはず、今回のお祭りは……"
51030-142 = "20年前に廃止された「[ruby=ひゃっきやこうとうろうさい]百鬼夜行燈籠祭[/ruby]」を復活させたものなのですから。#nと～っても特別なのです。"
51030-145 = "これは、学院に伝わる伝承なのですが……"
51030-146 = "昔々、百鬼夜行学院は紛争の時代を乗り越えると、百鬼夜行連合学院に名を変え、生まれ変わりました。"
51030-149 = "しかし、争いが終わったとはいえ、すぐに傷が癒えるはずもなく……"
51030-150 = "そこで、人々の不安を解消するべく、当時の百鬼夜行で中心となっていた方が提案したのが、この「百鬼夜行燈籠祭」です。"
51030-153 = "過去の傷を燈籠に乗せ、これからの未来を願う……#nそうして、皆の心を通じ合わせるのだと聞きましたわ。"
51030-154 = "[s] \"でも20年前に廃止って……どうして？\""
51030-155 = "ええと、それは…… "
51030-156 = "当時の詳しい状況までは身共も聞いておらず……そこまでは……"
51030-162 = "そんな些細なこと、重要ではありませんよ。"
51030-167 = "はいっ！？"
51030-169 = "君らはお手伝いさんかい？#nそれとも、早く来ちゃっただけの観光客かな？"
51030-170 = "まあ、どちらでも構わんが……この光景はなかなかのもんだろう？"
51030-171 = "[s] \"ええ、本当に。\""
51030-172 = "20年前に何があったのかは知りませんが……#nこうしてお祭りを復活できるのは喜ばしいことです。"
51030-173 = "ああ、そうだな。なんたって、百鬼夜行はお祭りの学園だからな！"
51030-174 = "なにせ、あんな出来事がありましたから……自然とみんな、力が入るといいますか。"
51030-178 = "おかげで忙しくて目が回りそうだよ！#nまさに猫の手も借りたいとはこのことだな！ハッハッハ！"
51030-179 = "特にお祭り運営委員長が尽力してくださいましてね！#n元気いっぱいで、本当にすごいお方です。"
51030-184 = "お祭り運営委員長……"
51030-185 = "[s] \"なるほど、シズコが……\""
51030-187 = "しかも今回のお祭りは、あの巫女様が儀式を披露すると聞いたぞ？"
51030-188 = "ええ！"
51030-189 = "今回の「百鬼夜行燈籠祭」の目玉として――"
51030-196 = "皆様が、それだけ思い入れを持っているのは分かっておりますが……"
51030-197 = "でも……身共は百花繚乱に……"
51030-202 = "お嬢様！"
51030-203 = "ここにおりましたか！解散令の話を聞いた途端、屋敷を飛び出されたと伺って、心配しておりました。"
51030-207 = "……っ！！"
51030-212 = "[ns] \"……ん？\" "
51030-214 = "もう見つかってしまうなんて……致し方ありません。"
51030-215 = "こほん……[USERNAME]先生。本日はお力添えいただき、誠に感謝いたします。#nこのご恩、身共は一生忘れ――"
51030-219 = "はぁ、はぁ……！もう逃しませんよ！"
51030-220 = "――っと、身共の気持ちをお伝えするには時間が足りませんわね！"
51030-221 = "名残惜しいですが、身共はこれにて！"
51030-225 = "お嬢様、お待ちください！お嬢様ぁぁあ～～～！！"
51030-231 = "[ns] \"嵐のような子だった……\""
51030-234 = "次回;陰陽部にて"
