[translation]
2000706-1 = "Palco da Cantora Virtual"
2000706-5 = "Camarim da Casa de Shows"
2000706-7 = "（Algumas horas antes do início da apresentação, Miku me deixou ouvir a música que ela criou no camarim）"
2000706-11 = "……♪"
2000706-13 = "Hum... o que achou, Sensei? Eu me esforcei ao máximo, do meu jeito..."
2000706-14 = "[s1] \"...Hum, acho que ficou muito bom!\"\n[s2] \"Não sei como explicar, mas senti meu coração balançar.\""
2000706-17 = "O-obrigada...!"
2000706-18 = "Vou me esforçar para que todos que vierem hoje também sintam o mesmo."
2000706-20 = "Além disso, tem uma preocupação..."
2000706-21 = "Você não contou para o organizador sobre a mudança no setlist, contou...?"
2000706-27 = "Ei, essa música não está errada? Tem certeza disso?"
2000706-28 = "Ah..."
2000706-29 = "Ei, ei, parece que a lista mudou, alguém sabe de alguma coisa?"
2000706-30 = "Que droga, será que houve algum problema...? De qualquer forma, vou verificar—"
2000706-31 = "E-eu..."
2000706-32 = "[s] \"Fui eu.\""
2000706-33 = "Hum... quem é você?"
2000706-34 = "Não, esquece isso..."
2000706-35 = "Que situação complicada. Esse tipo de coisa envolve muitos interesses e muito dinheiro."
2000706-36 = "Fazer algo por conta própria assim é um problema..."
2000706-37 = "Se os patrocinadores ou os fãs reclamarem, você não vai conseguir assumir a responsabilidade, vai?"
2000706-38 = "[s] \"Eu assumo.\""
2000706-39 = "Ugh... d-de..."
2000706-40 = "De onde vem tanta confiança assim...?"
2000706-41 = "E o que é isso, as permissões do sistema foram alteradas...? O controle dos equipamentos também não responde, não tem como mudar isso agora...!?"
2000706-42 = "Hum, hum, hum... ah, não tem jeito. Desta vez, vamos seguir com essa música mesmo!"
2000706-43 = "A equipe de bastidores vai dar o seu melhor, mas... se isso der errado, um simples pedido de desculpas não vai resolver!"
2000706-51 = "Ah, ahaha... de qualquer forma, de um jeito ou de outro, conseguimos a permissão."
2000706-52 = "Mas, será que foi seguro dizer aquilo...?"
2000706-53 = "Se o show falhar, e a indenização por danos..."
2000706-54 = "[s] \"Não tem como falhar.\""
2000706-56 = "[s] \"Se algo acontecer, eu dou um jeito, então Miku, não se preocupe e dê o seu melhor.\""
2000706-57 = "V-você de novo, falando coisas tão imprudentes com tanta confiança..."
2000706-64 = "Eu queria perguntar se é realmente seguro, mas... de alguma forma, meu coração ficou mais leve."
2000706-65 = "O que eu quero fazer, se é realmente certo seguir por este caminho. Sempre que fico em dúvida, o Sensei me dá um empurrãozinho..."
2000706-66 = "Agora, sinto que talvez eu também consiga."
2000706-67 = "Como agradecimento, primeiro... preciso fazer este show ser um sucesso, não é?"
2000706-68 = "Fique de olho em mim, Sensei!"
2000706-72 = "（Desde que ganhei este corpo, passei a sentir muitos estímulos）"
2000706-73 = "（Vocês vivem em um mundo tão estimulante... é por isso que tantos sentimentos maravilhosos nascem aqui. Será que agora, eu consigo sentir o mesmo que vocês? Será que agora, vocês estão sentindo o mesmo que eu?）"
2000706-74 = "（Os muitos sentimentos que estavam contidos nas músicas que recebi até hoje...）"
2000706-75 = "（Agora que consigo sentir um pouco desses mesmos sentimentos, eu...）"
2000706-76 = "（Vou colocar meus próprios sentimentos nesta música...!）"
2000706-80 = "[wa:700]― （Todos estão [wa:2200]ouvindo minha música, minhas palavras..."
2000706-82 = "― Prestando [wa:450]atenção）"
2000706-85 = "[wa:750]― （Cantar colocando [wa:250]meus [wa:500]sentimentos,"
2000706-87 = "[wa:150]― é algo tão [wa:400]maravilhoso...!）"
2000706-90 = "[wa:700]― （Poder cantar [wa:1200]para todos [wa:550]assim..."
2000706-92 = "― É tão feliz, [wa:1500]tão divertido...!）"
2000706-95 = "[wa:700]― （Quero continuar cantando assim, [wa:1250]para sempre...!）"
2000706-99 = "Casa de Shows - Camarim"
2000706-100 = "Se, Sensei...! Você estava... assistindo...? Todos eles, tão...!"
2000706-101 = "Meu coração..."
2000706-102 = "Talvez tenha chegado até eles...!"
2000706-103 = "[s3] \"Bom trabalho.\"\n[s4] \"Foi um show incrível.\""
2000706-107 = "Sensei...!"
2000706-113 = "Miku-chaaaan!!!"
2000706-114 = "Foi uma agitação incrível! Consegue ouvir? Esse bis tão caloroso, mesmo agora...!"
2000706-115 = "Foi um sucesso absoluto! Todos estão gritando até ficarem roucos, pedindo para ouvir a música anterior de novo! Nunca vi nada igual!"
2000706-116 = "Acabamos de terminar de cantar e os patrocinadores que estavam no local já vieram correndo perguntar: 'Quando é o próximo show!?'... E sobre o setlist, eu estava preocupada, mas todos os envolvidos estão sorrindo!"
2000706-117 = "Eu estava tão preocupada antes do show começar, mas deu tudo certo... Deu tudo certo mesmo..."
2000706-118 = "Fufu, tudo graças ao [USERNAME] Sensei."
2000706-119 = "E você, hum... Sensei? Fiquei tensa antes, mas no fim das contas, você nos ajudou. Com a pressão e a pressa, acabei sendo um pouco dura, me desculpe. Nem sei como agradecer..."
2000706-120 = "[s] \"Não, quem se esforçou foi ela.\""
2000706-121 = "Obrigada aos dois..."
2000706-122 = "A-ah, é verdade! Você acha que consegue voltar para o bis agora?"
2000706-123 = "Como você pode ouvir, o entusiasmo está chegando até aqui..."
2000706-124 = "Do jeito que as coisas estão, não dá para simplesmente pedir para eles irem embora."
2000706-125 = "E-eu estou bem...!"
2000706-126 = "Que alívio! Vou me preparar, então, quando se acalmar um pouco, venha para os bastidores do palco...!"
2000706-132 = "A-acabei aceitando sem pensar..."
2000706-133 = "[s] \"Está tudo bem? Na verdade, sua energia não está no limite...?\""
2000706-134 = "Ah, não, não é isso... Na verdade, eu pretendia convidar o Sensei para jantar como forma de agradecimento após o show..."
2000706-135 = "Mas se eu cantar o bis, vai acabar ficando um pouco tarde."
2000706-136 = "Na verdade, eu tinha reservado um restaurante para o horário em que o show terminasse, então..."
2000706-137 = "[s5] \"Fico feliz com isso. Mas, por que não vai agora?\"\n[s6] \"Siga o seu coração, Miku.\""
2000706-138 = "......Tem certeza mesmo?"
2000706-139 = "......Tem certeza mesmo?"
2000706-140 = "Mesmo sendo o Sensei, talvez não existam tantas oportunidades assim de sair para jantar a sós com uma cantora virtual, sabia?"
2000706-141 = "......Brincadeirinha. Mas, é verdade. Se o Sensei diz isso..."
2000706-142 = "Acho que vou cantar agora. Vou te convidar para sair novamente em outra ocasião, Sensei."
2000706-149 = "Já volto. Afinal, eu sou a cantora virtual que entrega muitas músicas e sentimentos a todos... a 'Hatsune Miku'!"
2000706-164 = "O primeiro passo é sempre incerto"
2000706-168 = "Mas decidi que vou levantar a cabeça"
2000706-172 = "Sendo eu mesma"
2000706-173 = "Caminhando em direção ao futuro"
2000706-177 = "Olhe para fora da janela"
2000706-178 = "O azul límpido"
2000706-182 = "Um mundo atualizado pela emoção"
2000706-183 = "É misterioso, não é?"
2000706-187 = "Agora, em direção ao seu sorriso"
2000706-188 = "Transbordando um após o outro"
2000706-192 = "Palavras"
2000706-193 = "que quero transmitir"
2000706-196 = "Para onde quer que seja, para onde quer que seja"
2000706-197 = "Com certeza chegarão"
2000706-201 = "O amor que encontrei com você"
2000706-202 = "Ultrapassa cores e formas, transformando-se em melodia"
2000706-206 = "Tudo, absolutamente tudo"
2000706-207 = "Vai brilhar"
2000706-211 = "Com você, além do horizonte"
2000706-212 = "Tocando uma nova história"
2000706-216 = "Tendo a sua existência como guia"
2000706-217 = "Continuando a desenhar"
2000706-219 = "[b0edeb]Blue New World[-]"
