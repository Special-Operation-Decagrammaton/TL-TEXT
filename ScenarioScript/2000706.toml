[translation]
2000706-1 = "バーチャル・シンガーのステージ"
2000706-5 = "ライブハウス・控室"
2000706-7 = "（公演開始数時間前、控室でミクが作った曲を聞かせてくれた）"
2000706-11 = "……♪"
2000706-13 = "えっと……どうでしょう、先生？私なりに、頑張ってみたのですが……。"
2000706-14 = "[s1] \"……うん、すごく良いと思う！\"\n[s2] \"何というか、心を揺さぶられる感じがした。\""
2000706-17 = "あ、ありがとうございます……！"
2000706-18 = "今日来てくれたみなさんにもそう言ってもらえるよう、頑張ります。"
2000706-20 = "あと、心配事としては……。"
2000706-21 = "主催者さんには、セトリのことは伝えてないんですよね……？"
2000706-27 = "ちょっ、何かこれ曲違くない？合ってる？"
2000706-28 = "あっ……。"
2000706-29 = "ねえねえ、リストが変わってるみたいなんだけど、誰か知ってる？"
2000706-30 = "参ったな、何か問題でもあったとか……？とにかく確認して――"
2000706-31 = "そ、その……！"
2000706-32 = "[s] \"私です。\""
2000706-33 = "えっと……誰？"
2000706-34 = "いやそれより……。"
2000706-35 = "参っちゃうな。こういうのは色んな事情が絡まって、たくさんのお金が動いてるんだ。"
2000706-36 = "こういう勝手なことをされると困るよ……。"
2000706-37 = "もしスポンサーやファンからクレームが来たら、責任取れないでしょ？"
2000706-38 = "[s] \"取ります。\""
2000706-39 = "うっ……ど、"
2000706-40 = "どこから出てくるんだ、その自信は……。"
2000706-41 = "それにしても何だこれ、システムの権限が書き換わってる……？設備のコントロールも効かなくなってるし、これじゃ変更できない……！？"
2000706-42 = "むむむ、むむむむむ……はぁ、仕方ない。今回は、このままの曲で行こう！"
2000706-43 = "裏方も全力でやるけど……もしこれで失敗したら、すみませんでしたじゃ済まないからね！"
2000706-51 = "あ、あはは……とにかく、曲がりなりにも許可は貰えましたね。"
2000706-52 = "ですが、あんなこと言ってしまって大丈夫ですか……？"
2000706-53 = "もしライブが失敗したら、損害賠償とか……"
2000706-54 = "[s] \"失敗するわけが無いよ。\""
2000706-56 = "[s] \"万が一の時は何とかするから、ミクは心配せず全力でやって。\""
2000706-57 = "ま、またそうやって、自信満々にすごく無茶なことを仰いますね……。"
2000706-64 = "本当に大丈夫ですか、と言いたいところですが……何だか心が楽になりました。"
2000706-65 = "私がどうしたいのか、本当にこの方向に進んでも良いのか。そうやって悩んでいる時、毎回先生が背中を押してくれて……"
2000706-66 = "今では、私にもできるんじゃないかと思えるようになりました。"
2000706-67 = "お礼としてまずは……このライブを成功させないと、ですよね。"
2000706-68 = "しっかり見ててくださいね、先生！"
2000706-72 = "（この身体を手に入れてから、私はたくさんの刺激を感じられるようになりました）"
2000706-73 = "（こんなにも刺激的な世界で、皆さんは生きていて……だからあんなにもたくさんの、素敵な感情が生まれるんですね。今の私は、みなさんと同じように感じられているでしょうか？今みなさんも私と同じように、感じてくれていますか？）"
2000706-74 = "（今まで貰ってきた歌たちに込められていた、たくさんの感情……）"
2000706-75 = "（少しだけ、それと同じ気持ちを感じられるようになった今、私は――）"
2000706-76 = "（この歌に、私自身の想いを乗せて……！）"
2000706-80 = "[wa:700]― （みんなが私の歌に、[wa:2200]言葉に……"
2000706-82 = "― 耳を[wa:450]傾けてくれてる）"
2000706-85 = "[wa:750]― （自分の[wa:250]気持ちを[wa:500]込めて歌うのって、"
2000706-87 = "[wa:150]― こんなに[wa:400]気持ち良いことだったんだ……！）"
2000706-90 = "[wa:700]― （こんな風に、[wa:1200]みんなのために[wa:550]歌えるなんて……"
2000706-92 = "― 嬉しい、[wa:1500]楽しい……！）"
2000706-95 = "[wa:700]― （このままずっと、[wa:1250]ずっと歌っていたい……！）"
2000706-99 = "ライブハウス・控室"
2000706-100 = "せ、先生……！見ていて、くれましたか……？みなさん、あんなに……！"
2000706-101 = "私の心……"
2000706-102 = "届いたのかもしれません……！"
2000706-103 = "[s3] \"お疲れ様。\"\n[s4] \"最高のステージだったよ。\""
2000706-107 = "先生……！"
2000706-113 = "ミクちゃーーん！！！"
2000706-114 = "すごい盛り上がりだったよ！聞こえるかい、今もこんなに熱いアンコールが……！"
2000706-115 = "大成功だ！さっきの曲をもう一度聞きたいって、みんなが声を枯らして叫んでる！こんなの見たことない！"
2000706-116 = "歌い終わったばっかりなのに、会場に来てたスポンサーがさっき駆け寄ってきて「次のライブはいつだ！？」って聞いてくるし……！セトリの件もどうしようかと思ったが、関係者は全員笑顔だ！"
2000706-117 = "ライブが始まる前はどうしようかと思ってたけど、良かった……本当に良かった……。"
2000706-118 = "ふふっ、[USERNAME]先生のおかげです。"
2000706-119 = "そっちの、えっと……先生？さっきはヒヤッとしたが、結果的には助かったよ。プレッシャーも焦りもあって、キツイ言動をしてしまって済まなかった。何とお礼を言えば良いか……。"
2000706-120 = "[s] \"いえ、頑張ったのは彼女ですから。\""
2000706-121 = "ふたりとも、ありがとう……"
2000706-122 = "そ、そうだ！今からアンコールって、行けそうかい？"
2000706-123 = "聞こえてる通り、ここまで届いてくるほどの熱狂ぶりだよ……"
2000706-124 = "このままじゃおとなしく帰ってもらうってわけには行かなそうだ。"
2000706-125 = "わ、私は大丈夫です……！"
2000706-126 = "助かる！じゃあ私は準備をしてくるから、少し落ち着いたらステージ裏に来てくれ……！"
2000706-132 = "お、思わず承諾してしまいました……。"
2000706-133 = "[s] \"大丈夫？実は体力がもう限界とか……？\""
2000706-134 = "あ、いえ、そういうことではなく……実はライブが終わったら感謝の意味も込めて、先生をお食事にお誘いしようと思ったのですが……。"
2000706-135 = "アンコールまで歌うと、ちょっと遅くなってしまいそうだなと。"
2000706-136 = "実はライブの終わる時間に合わせて、レストランを予約していたので……。"
2000706-137 = "[s5] \"それは嬉しいな。でも、今は行ってきたら？\"\n[s6] \"ミクの心のままに、で良いんだよ。\""
2000706-138 = "……本当に良いんですか？"
2000706-139 = "……本当に良いんですか？"
2000706-140 = "いくら先生とはいえ、バーチャル・シンガーとふたりでお食事に行ける機会なんてそうそう無いかもしれませんよ？"
2000706-141 = "……なんて。ですが、そうですね。先生にそう言っていただけるのでしたら……"
2000706-142 = "今は歌ってこようと思います。先生とのお出かけは、また今度あらためてお誘いしますね。"
2000706-149 = "行ってきます。私は、みなさんにたくさんの歌と気持ちを届けるバーチャル・シンガー……「初音ミク」ですから！"
2000706-164 = "始まりの一歩はいつも不安だよ"
2000706-168 = "だけどもう顔を上げるって決めたの"
2000706-172 = "ありのままの自分を"
2000706-173 = "胸に踏み出す未来"
2000706-177 = "窓の外はほら"
2000706-178 = "澄み渡る青"
2000706-182 = "ときめきでアップデートされた世界"
2000706-183 = "不思議だね"
2000706-187 = "今キミの笑顔へと"
2000706-188 = "次々と[ruby=あふ]溢[/ruby]れて[ruby=い]行[/ruby]く"
2000706-192 = "伝えたい"
2000706-193 = "言葉たち"
2000706-196 = "どこまでもどこまでも"
2000706-197 = "きっと届くよ"
2000706-201 = "キミと見つけたアイが"
2000706-202 = "イロもカタチも越えてメロディに変わる"
2000706-206 = "何もかも何もかも"
2000706-207 = "全部輝くよ"
2000706-211 = "キミと想像の[ruby=かなた]彼方[/ruby]に"
2000706-212 = "[ruby=かな]奏[/ruby]でて[ruby=い]行[/ruby]く Brand New Story"
2000706-216 = "キミの存在を[ruby=ひかり]道標[/ruby]に"
2000706-217 = "[ruby=えが]描[/ruby]いて[ruby=い]行[/ruby]く"
2000706-219 = "[b0edeb]Blue New World[-]"
