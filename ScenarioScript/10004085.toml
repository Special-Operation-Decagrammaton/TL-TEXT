[translation]
10004085-1 = "Episódio 8; Shun e Shuerin"
10004085-2 = "Shanhaijing - Jardim das Ameixeiras"
10004085-3 = "Irmã mais velha, elas estão brigando de novo!"
10004085-4 = "Ora, nada de brigas. Vocês são amigas no mesmo Jardim das Ameixeiras, então vamos nos dar bem, certo?"
10004085-5 = "Qual é o motivo da briga?"
10004085-6 = "Ela me chamou de baixinha...!"
10004085-7 = "Antes disso, você disse que meus óculos eram feios!"
10004085-8 = "Não é certo falar mal da aparência ou das coisas que os outros usam. Cada uma tem sua própria personalidade e seus gostos. Entendido?"
10004085-9 = "...Desculpe. Na verdade, eu achava seus óculos bonitos... mas fiquei com inveja porque eu também queria um, e acabei falando sem pensar..."
10004085-10 = "Eu que peço desculpas... É que ultimamente eu tenho desejado tanto crescer logo..."
10004085-11 = "Quero crescer logo, igual à irmã Shun..."
10004085-12 = "É, a irmã Shun é alta, inteligente e muito estilosa, ela é incrível."
10004085-13 = "Eu também acho! Ei, irmã, o que eu preciso fazer para ser como você?"
10004085-16 = "(Hehe... é verdade, as crianças sempre querem crescer logo, não é?)"
10004085-19 = "Bem... mas, mesmo que vocês cresçam, nem tudo são flores, sabem?"
10004085-20 = "Ser alta também traz muitas inconveniências."
10004085-21 = "É mesmo? Mas você consegue alcançar lugares altos e subir no sótão facilmente."
10004085-22 = "Claro, é útil nessas horas, mas, por exemplo, eu vivo batendo a cabeça em colunas altas."
10004085-23 = "Além disso, eu, na verdade, sinto inveja de vocês por serem baixinhas."
10004085-24 = "Sério? Então é melhor continuar sendo criança e não crescer?"
10004085-25 = "Hum, essa é uma pergunta difícil... É verdade que ser alta tem suas desvantagens, mas nem tudo é ruim..."
10004085-26 = "Ué, como assim? Tem alguma coisa muito boa nisso?"
10004085-27 = "..."
10004085-28 = "Isso é..."
10004085-29 = "Hehe, é segredo! Quando vocês crescerem, vão entender naturalmente!"
10004085-30 = "Ahhh!?"
10004085-31 = "A irmã Shun é injusta!"
10004085-32 = "[s1] \"Bom dia, Shun.\"\n[s2] \"Todos estão bem hoje também, bom trabalho.\""
10004085-33 = "Ah, Sensei! O que o traz ao Jardim das Ameixeiras hoje?"
10004085-34 = "Ah, Sensei! O que o traz ao Jardim das Ameixeiras hoje?"
10004085-35 = "Ora, trouxe lanches da Associação Genbu? Muito obrigada, isso ajuda bastante."
10004085-36 = "Já que está aqui, por que não toma um chá e relaxa um pouco?"
10004085-37 = "Eu estava justamente querendo conversar sobre várias coisas com você, Sensei."
10004085-38 = "[s3] \"Desculpe, tenho um compromisso urgente logo depois...\"\n[s4] \"Fui chamado para um trabalho no Schale, mas depois disso...\""
10004085-41 = "Ah, entendo..."
10004085-42 = "Ué, não pode ficar nem um pouquinho...?"
10004085-43 = "A partir de amanhã, não vou ser mimada e farei tudo o que você pedir..."
10004085-44 = "Por favor...?"
10004085-48 = "[ns5] \"S-senti como se a sombra da Shuerin tivesse aparecido agora...!?\"\n[ns6] \"Será que os efeitos colaterais voltaram!?\""
10004085-49 = "...Brincadeirinha."
10004085-50 = "...Brincadeirinha."
10004085-51 = "Desculpe por te segurar. Mas até mesmo uma instrutora de Shanhaijing às vezes quer ser mimada."
10004085-52 = "Por isso..."
10004085-53 = "Pode me deixar ser mimada só mais um pouquinho?"
10004085-55 = "Enquanto lidava habilmente com as crianças que faziam barulho a seus pés, Shun não se afastou por um bom tempo e acabou ficando no Jardim das Ameixeiras até o último minuto."
10004085-56 = "Capturada na Terra do Nunca"
