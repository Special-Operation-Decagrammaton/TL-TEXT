[translation]
10004085-1 = "第8話;シュンとシュエリン"
10004085-2 = "山海経・梅花園"
10004085-3 = "おねえちゃん、あの子たちまた喧嘩してるー！"
10004085-4 = "ほら、喧嘩はダメですよ。同じ梅花園のお友達なんですから、仲良くしましょう？"
10004085-5 = "何が喧嘩の原因なんですか？"
10004085-6 = "あっちが私のことチビって……！"
10004085-7 = "その前に、私のメガネがカッコ悪いって言ったじゃん！"
10004085-8 = "外見や、身に着けているもののことを悪く言ってはダメですよ。それぞれ個性と、好きなものがあるんですから。ね？"
10004085-9 = "……ごめんなさい。実はそのメガネ、本当は可愛いなって思って……でも、私も欲しいな、ズルいなって思って、つい……。"
10004085-10 = "私こそ、ごめんなさい……私も、もっと大きくなりたいなって最近ずっと思ってて……。"
10004085-11 = "シュンおねえちゃんみたいに、早く大きくなりたい……。"
10004085-12 = "うん、シュンおねえちゃんって背も高いし頭もいいし、色々おしゃれだしすごいよね。"
10004085-13 = "私もそう思う！ねえおねえちゃん、どうすればおねえちゃんみたいになれるの？"
10004085-16 = "（ふふっ……そうですよね、逆に子どもたちは早く大人になりたいと思うものですよね）"
10004085-19 = "そうですねー……でも、もし背が高くなったとしても、良いことばかりではないんですよ？"
10004085-20 = "背が高いと、不便なこともたくさんあるんです。"
10004085-21 = "そうなの？高いところに手も届くし、屋根裏部屋とかにも簡単に登れるのに。"
10004085-22 = "もちろんそういう時には便利ですが、例えば高いところの柱に頭をぶつけたりすることもしょっちゅうです。"
10004085-23 = "それに、私としてはむしろ、みなさんみたいに背が低いのも羨ましいなって思いますよ。"
10004085-24 = "えー、そうなんだ。じゃあ大きくならないで、子どものままの方が良いの？"
10004085-25 = "うーん、それは難しいですね……確かに背が高くて不便なこともありますが、必ずしも悪いことばかりではありませんし……。"
10004085-26 = "え、どういうこと？何かすっごく良いことがあるの？"
10004085-27 = "……。"
10004085-28 = "それは……"
10004085-29 = "ふふっ、秘密です！大きくなれば、みなさんも自然と分かりますよ！"
10004085-30 = "えーっ！？"
10004085-31 = "シュンおねえちゃんずるーい！"
10004085-32 = "[s1] \"おはよう、シュン。\"\n[s2] \"今日もみんな元気だね、お疲れ様。\""
10004085-33 = "あ、先生！今日はどうして梅花園に？"
10004085-34 = "あ、先生！今日はどうして梅花園に？"
10004085-35 = "あら、玄武商会からおやつを？わざわざありがとうございます、助かります。"
10004085-36 = "せっかくですし、お茶でも飲んで少しゆっくりしていきませんか？"
10004085-37 = "私もちょうど、先生とお話ししたいことがたくさんあったんです。"
10004085-38 = "[s3] \"ごめん、ちょっとこの後も急ぎの用があって……。\"\n[s4] \"ちょっとシャーレの仕事で呼ばれてて、その後とかなら……。\""
10004085-41 = "え、そんな……。"
10004085-42 = "うぅ、少しくらいダメですか……？"
10004085-43 = "明日からはわがままも言わずに、先生の言うこともなんでも聞きますから……。"
10004085-44 = "ね……？"
10004085-48 = "[ns5] \"な、なんか今、シュエリンの影が重なった気が……！？\"\n[ns6] \"まさかまた副作用が……！？\""
10004085-49 = "……なんて。"
10004085-50 = "……なんて。"
10004085-51 = "引き留めてしまってすみません。ですが、[ruby=せんがいきょう]山海経[/ruby]の教官も、時には甘えたい時もあるんですよ。"
10004085-52 = "ですから……"
10004085-53 = "もう少しだけ、甘えさせてくれませんか？"
10004085-55 = "足元で騒ぐ子どもたちを上手にあしらいながら、それでもシュンはしばらくの間離れようとせず、ギリギリまで梅花園にいることになった。"
10004085-56 = "ネバーランドでつかまえて"
