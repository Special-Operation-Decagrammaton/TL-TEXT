[translation]
1600803-1 = "怠けがちな警察官のパトロール"
1600803-2 = "やる気のないフブキを応援するため、市内の中心街までやってきた。"
1600803-8 = "ううぅぅぅ……。"
1600803-9 = "暑い、めんどくさい、辛い、帰りたい……。"
1600803-10 = "こんなこと早く終わらせて、涼しい事務所でドーナッツとコーヒ―を堪能したい……。"
1600803-11 = "[s1] \"「こんなこと」とか言わないの……。\"\n[s2] \"パトロールもヴァルキューレ警察学校の大事な任務でしょ？\""
1600803-12 = "でもこの辺は無駄に広い上に、路地もやたら複雑で迷路みたいだし……。"
1600803-13 = "でもこの辺は無駄に広い上に、路地もやたら複雑で迷路みたいだし……。"
1600803-14 = "隅々まで回ろうとしたら、半日以上かかるって……。"
1600803-15 = "[s] \"力になるか分からないけど、私も手伝うから。\""
1600803-16 = "……本当？じゃあ先生に、一つだけお願いしてもいい？"
1600803-17 = "この大通り沿いの1丁目からあっちの5丁目まで、先生にパトロールしてほしいの。"
1600803-18 = "あっ、あと逆の向こう側も合わせてお願い。"
1600803-19 = "[s] \"その間フブキは？\""
1600803-20 = "ん、私？私は……"
1600803-21 = "そこのカフェでコーヒーを飲みながら、怪しい人が通らないか監視する！"
1600803-22 = "[s] \"ほぼ全部任せっきりじゃん……。\""
1600803-23 = "ダメか……。"
1600803-24 = "しょうがない。せっかく先生も休日返上で来てくれたわけだし、今回だけは真面目にやるとしよう。"
1600803-25 = "どうか今日はこの辺で、厄介な事件が起こりませんように……。"
1600803-29 = "あー、ほんっと行きたくない……。"
1600803-35 = "……この辺りも問題無し。今のところ平和だね。"
1600803-36 = "キヴォトスは基本こんなに平和なのに、どうして上層部はあんなに騒ぐのやら……。"
1600803-37 = "「あちこち不良たちで溢れてて喧嘩が絶えない」っていう風に見えるのは、それを見てる各自の心に余裕が無いからであって……"
1600803-41 = "んー、先生？どうして道のど真ん中で突っ立って……何か問題でもあった？"
1600803-42 = "[s] \"あそこの路地に、何だかちょっと怪しげな――\""
1600803-46 = "あぁん？誰が怪しいって！？"
1600803-47 = "何も知らねぇくせにイチャモン付けてきやがって……。"
1600803-48 = "怪我したくねぇならとっとと消えろ！"
1600803-53 = "（うっ……厄介な事件の匂いが……）"
1600803-54 = "はぁ……口調の荒いやつらだな。"
1600803-55 = "まあ、でも確かに怪しそうには見えない。"
1600803-56 = "きっと普通に、路地裏でお友達と遊んでるだけでしょ。そうだ。そうに違いない。"
1600803-57 = "ってことで私たちは気にせずに、パトロールを続けるとしよう。"
1600803-58 = "[s] \"口に何だか、怪しげな棒を咥えてない？\""
1600803-59 = "怪しい棒……？あ、あー……"
1600803-60 = "……あれはキャンディ！キャンディだよ絶対！"
1600803-61 = "年頃の女の子は甘いものが欲しくなることが多いからね……お友達と仲良く路地裏でキャンディを舐めるのは、女子高生によくある光景！"
1600803-62 = "っていうわけで邪魔しないように、早く行こう！"
1600803-63 = "[s] \"その棒の先から、煙が出てるような……？\""
1600803-64 = "そ、それは……"
1600803-65 = "そう、摩擦！"
1600803-66 = "キャンディがあまりに美味しすぎて、高速で舐めまくってたら摩擦で煙が出ることもある！結構よくある！"
1600803-67 = "絶対それ、間違いない！"
1600803-68 = "[s] \"でも……\""
1600803-69 = "大丈夫大丈夫、絶対怪しくないから！"
1600803-70 = "相手を外見だけで判断するのは良くないでしょ？偏見を持っちゃったら、何だって怪しく見えるものだよ。"
1600803-76 = "おい、そこのあんた……本気か？"
1600803-77 = "も、もちろん！私から見たら、別に怪しくも何とも無いね！"
1600803-78 = "だからわざわざ質問とかもしないし、ましてや任意同行なんかも絶対にしない！！"
1600803-79 = "……うちらを最初から疑ってかからずに、ここまで優しくしてくれたのはあんたが初めてだ。"
1600803-80 = "今までのヴァルキューレ警察学校は、どいつもこいつも最初から決めつけてくるようなやつらしかいなかったのに……。"
1600803-81 = "そこまでうちらの本心を理解しようとしてくれるなんて……泣けてきた……！"
1600803-82 = "え……はぁ？"
1600803-86 = "うちらが本当は何をしてるのか知ろうともせず、ただただ批判ばっかり。"
1600803-87 = "それに対してうちらもまた反抗して、さらに捻くれて……。"
1600803-88 = "でもあんたの言葉を聞いて思い出したよ、うちらだって最初からこうだったわけじゃない！"
1600803-89 = "うちらもあんたみたいに……社会の役にだって立ってみたいんだ！"
1600803-94 = "え、あ……それはまあ、良いんじゃない？"
1600803-95 = "そしたら、道に落ちてるゴミでも拾ったら？私は引き続きパトロールするから……。"
1600803-97 = "パトロール？それ、うちらが手伝うよ！"
1600803-99 = "そうだ、この辺の路地ならうちらが一番詳しいからな！"
1600803-101 = "見落としなんかしないように、隅々までパトロールしよう！"
1600803-102 = "[s3] \"すごいねフブキ。\"\n[s4] \"まさに求心力。\""
1600803-103 = "いや、これますますめんどくさくなったんじゃ……。"
1600803-104 = "いや、これますますめんどくさくなったんじゃ……。"
1600803-106 = "その後フブキは不良（？）の生徒たちに担がれながら、結局最後まで真面目にパトロールをした。"
1600803-107 = "彼女たちの熱心さもあり、パトロールは夜遅くまで続いた……。"
