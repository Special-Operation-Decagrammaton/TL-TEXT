[translation]
1600803-1 = "A patrulha da policial preguiçosa"
1600803-2 = "Vim até o centro da cidade para animar a Fubuki, que não está nem um pouco motivada."
1600803-8 = "Uuuuhhh..."
1600803-9 = "Está calor, é um saco, é cansativo, quero ir para casa..."
1600803-10 = "Queria terminar isso logo e aproveitar um donut com café no escritório fresquinho..."
1600803-11 = "[s1] \"Não diga 'isso' assim...\"\n[s2] \"Patrulhar também é uma missão importante da Academia de Polícia Valkyrie, não é?\""
1600803-12 = "Mas essa área é desnecessariamente grande, e os becos são tão complexos que parecem um labirinto..."
1600803-13 = "Mas essa área é desnecessariamente grande, e os becos são tão complexos que parecem um labirinto..."
1600803-14 = "Se eu tentasse cobrir cada cantinho, levaria mais de meio dia..."
1600803-15 = "[s] \"Não sei se serei de grande ajuda, mas eu te ajudo.\""
1600803-16 = "...Sério? Então, Sensei, posso te pedir um favor?"
1600803-17 = "Eu queria que você patrulhasse da 1ª rua até a 5ª rua ao longo desta avenida principal."
1600803-18 = "Ah, e por favor, faça o lado oposto também."
1600803-19 = "[s] \"E a Fubuki vai fazer o quê nesse meio tempo?\""
1600803-20 = "Hum, eu? Eu vou..."
1600803-21 = "Vou ficar naquele café tomando um café e vigiando para ver se não passa ninguém suspeito!"
1600803-22 = "[s] \"Você praticamente deixou tudo nas minhas mãos...\""
1600803-23 = "Não pode ser?..."
1600803-24 = "Não tem jeito. Já que o Sensei se deu ao trabalho de vir no seu dia de folga, vou levar isso a sério só desta vez."
1600803-25 = "Espero que nenhum incidente problemático aconteça por aqui hoje..."
1600803-29 = "Ah, eu realmente não quero ir..."
1600803-35 = "...Por aqui também está tudo bem. Por enquanto, está tudo em paz."
1600803-36 = "Kivotos é basicamente tão pacífica, por que o alto escalão faz tanto barulho?..."
1600803-37 = "A impressão de que 'está cheio de delinquentes por toda parte e as brigas não param' é só porque as pessoas não têm paz de espírito para observar as coisas..."
1600803-41 = "Hum, Sensei? Por que você está parado no meio do caminho... aconteceu algum problema?"
1600803-42 = "[s] \"Naquele beco ali, tem algo um pouco suspeito...\""
1600803-46 = "Ah, é? Quem você está chamando de suspeito!?"
1600803-47 = "Vem aqui encher o saco sem saber de nada..."
1600803-48 = "Se não quiser se machucar, suma daqui logo!"
1600803-53 = "(Ugh... sinto cheiro de um incidente problemático...)"
1600803-54 = "Haa... que pessoal com a língua afiada."
1600803-55 = "Bem, mas eles não parecem ser suspeitos de verdade."
1600803-56 = "Com certeza eles só estão brincando com os amigos no beco. É isso. Tem que ser isso."
1600803-57 = "Então, vamos continuar nossa patrulha sem nos preocupar com eles."
1600803-58 = "[s] \"Eles não estão com um bastão suspeito na boca?\""
1600803-59 = "Um bastão suspeito...? Ah, ah..."
1600803-60 = "...Aquilo é um doce! É um doce, com certeza!"
1600803-61 = "Garotas da idade delas costumam querer comer doces... ficar no beco com as amigas chupando um doce é uma cena comum entre estudantes!"
1600803-62 = "Por isso, vamos embora logo para não atrapalhar!"
1600803-63 = "[s] \"Parece que está saindo fumaça da ponta desse bastão...?\""
1600803-64 = "Is-isso é..."
1600803-65 = "Isso, atrito!"
1600803-66 = "O doce é tão gostoso que, se você chupar rápido demais, o atrito pode gerar fumaça! É bem comum!"
1600803-67 = "Com certeza é isso, não tem erro!"
1600803-68 = "[s] \"Mas...\""
1600803-69 = "Está tudo bem, está tudo bem, eles não são suspeitos de jeito nenhum!"
1600803-70 = "Não é bom julgar os outros apenas pela aparência, né? Se você tiver preconceito, tudo vai parecer suspeito."
1600803-76 = "Ei, você aí... está falando sério?"
1600803-77 = "C-claro! Do meu ponto de vista, não tem nada de suspeito aqui!"
1600803-78 = "Por isso não vou fazer perguntas, e muito menos levá-los para uma condução coercitiva!!"
1600803-79 = "……Você é a primeira pessoa que não nos tratou com suspeita desde o início e foi tão gentil conosco."
1600803-80 = "Até agora, todo mundo da Academia de Polícia Valkyrie só sabia nos julgar de cara……."
1600803-81 = "Você se esforçar tanto para entender o que realmente sentimos…… até me deu vontade de chorar……!"
1600803-82 = "Eh…… hã?"
1600803-86 = "Eles nem tentavam saber o que a gente estava fazendo de verdade, só sabiam criticar."
1600803-87 = "E em resposta, a gente também se rebelava e ficava cada vez mais amarga……."
1600803-88 = "Mas ouvir suas palavras me fez lembrar, a gente não era assim desde o começo!"
1600803-89 = "A gente também quer ser útil para a sociedade, igual a você!"
1600803-94 = "Eh, ah…… bem, isso não é bom?"
1600803-95 = "Então, que tal começar recolhendo o lixo da rua? Eu vou continuar com a patrulha……."
1600803-97 = "Patrulha? A gente te ajuda com isso!"
1600803-99 = "Isso mesmo, a gente conhece esses becos melhor do que ninguém!"
1600803-101 = "Vamos patrulhar cada cantinho para não deixar passar nada!"
1600803-102 = "[s3] \"Incrível, Fubuki.\"\n[s4] \"Puro poder de liderança.\""
1600803-103 = "Não, isso não acabou ficando ainda mais trabalhoso……?"
1600803-104 = "Não, isso não acabou ficando ainda mais trabalhoso……?"
1600803-106 = "Depois disso, Fubuki foi carregada pelas alunas delinquentes (?) e acabou fazendo a patrulha seriamente até o fim."
1600803-107 = "Graças ao entusiasmo delas, a patrulha continuou até tarde da noite……."
