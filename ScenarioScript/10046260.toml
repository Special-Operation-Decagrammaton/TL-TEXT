[translation]
10046260-3 = "サササッ……。"
10046260-4 = "シュババッ……。"
10046260-5 = "……。"
10046260-6 = "すみませ～ん……ちょっとお話いいっすか？"
10046260-7 = "は、はいっ！？イズナのことですか！？"
10046260-8 = "お名前はイズナさん……っと。ご所属は？"
10046260-9 = "忍者です！"
10046260-10 = "はい、忍者っすね……。"
10046260-11 = "……忍者？"
10046260-12 = "忍者……そんな学園、聞いたことないんすけど……。"
10046260-13 = "なんと！学園についてでしたか！#nイズナは百鬼夜行連合学院の生徒です！"
10046260-14 = "……！"
10046260-15 = "あっ、なるほど……つまり、ごっこ遊びってことっすね。"
10046260-16 = "なぁっ！？"
10046260-17 = "ごっこ遊びではありません！"
10046260-18 = "まだ未熟者ですが、イズナは正真正銘の忍者です！"
10046260-19 = "はい？え、まあ……はい……。"
10046260-20 = "……ところで、ここで何をしてたんすか？"
10046260-21 = "忍術修行をしていました！ニンニン！"
10046260-22 = "あれは数日前のこと……#nイズナはまだ修行が足りないことを痛感しました。#nもっと強くなるべきだと……！"
10046260-23 = "に、忍術、っすか……。"
10046260-24 = "ちなみに、あなたはどちら様でしょうか？"
10046260-25 = "イズナ流忍法――砂浜隠れ身の術！#n……を見破ったのですから、只者ではないとお見受けします！"
10046260-26 = "隠れ身の術……？#nああ、あの布を被ってたやつのことっすか……？"
10046260-27 = "あ、えと、私は正義実現委員会のイチカっす。#n今はビーチのパトロール中っすね。"
10046260-28 = "正義実現委員会……！#nイチカ殿は正義を実現するために暗躍しているのですね！#nまさに忍者のお手本のようなお方です！"
10046260-29 = "イズナは修行に没頭するあまり、その手があったことに気がつきませんでした……。"
10046260-30 = "イチカ殿さえよければ、イズナも暗躍に参加したいです！"
10046260-31 = "……はい？#nえっと……手伝ってくれるって意味っすか？"
10046260-32 = "ちょうど人手は足りなかったんで、助かるっすけど……。"
10046260-33 = "喜んでイズナもご一緒します！"
10046260-39 = "……この状況に慣れちゃってる自分が怖いなぁ。"
