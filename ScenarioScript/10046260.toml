[translation]
10046260-3 = "Vupt..."
10046260-4 = "Zás..."
10046260-5 = "..."
10046260-6 = "Com licença... pode falar um minutinho?"
10046260-7 = "S-sim!? É sobre a Izuna!?"
10046260-8 = "O nome é Izuna... entendi. E qual é a sua escola?"
10046260-9 = "Sou uma ninja!"
10046260-10 = "Sim, uma ninja, entendi..."
10046260-11 = "...Ninja?"
10046260-12 = "Ninja... nunca ouvi falar de uma escola com esse nome..."
10046260-13 = "Ora! Então era sobre a escola!#nEu sou uma aluna da Academia Hyakkiyako!"
10046260-14 = "...!"
10046260-15 = "Ah, entendi... então é só uma brincadeira de faz de conta."
10046260-16 = "O quê!?"
10046260-17 = "Não é uma brincadeira!"
10046260-18 = "Ainda sou uma aprendiz, mas sou uma ninja de verdade!"
10046260-19 = "Sim? É, bom... tá bom..."
10046260-20 = "...Mas enfim, o que você estava fazendo aqui?"
10046260-21 = "Estava treinando ninjutsu! Nin-nin!"
10046260-22 = "Foi há alguns dias...#nPercebi que meu treinamento ainda não é suficiente.#nPreciso ficar mais forte...!"
10046260-23 = "Ni-ninjutsu, é..."
10046260-24 = "A propósito, quem é você?"
10046260-25 = "Ninjutsu estilo Izuna — Técnica de Ocultação na Areia!#n...Já que você conseguiu me encontrar, vejo que não é uma pessoa comum!"
10046260-26 = "Técnica de ocultação...?#nAh, você está falando daquela vez que estava coberta por um pano...?"
10046260-27 = "Ah, bem, eu sou a Ichika, do Comitê de Realização da Justiça.#nEstou patrulhando a praia agora."
10046260-28 = "Comitê de Realização da Justiça...!#nEntão a senhorita Ichika trabalha nas sombras para realizar a justiça!#nVocê é o exemplo perfeito de uma ninja!"
10046260-29 = "Eu estava tão focada no meu treinamento que nem percebi que essa era uma opção..."
10046260-30 = "Se não for um incômodo, senhorita Ichika, eu adoraria participar das suas operações secretas!"
10046260-31 = "...Sim?#nQuer dizer... você quer me ajudar?"
10046260-32 = "Eu estou precisando de ajuda mesmo, então seria ótimo..."
10046260-33 = "Ficarei feliz em acompanhá-la!"
10046260-39 = "...Até que eu mesma estou me assustando por ter me acostumado com essa situação."
