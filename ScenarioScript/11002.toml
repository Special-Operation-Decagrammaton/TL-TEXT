[translation]
11002-4 = "A sala do clube de Schale está bem á frente!"
11002-5 = "Descobri a identidade da aluna que causou esta comoção."
11002-7 = "O seu nome é Wakamo. Ela é uma fugitiva que escapou da Agência Correcional depois de ser suspensa da Academia Aliada Hyakkiyako."
11002-8 = "Ela é uma pessoa perigosa com muitas ofensas criminais semelhantes passadas, então tenha cuidado."
11002-11 = "...Ara ara. Parece que o Conselho Estudantil Geral não apareceu. fufu~, não que importe."
11002-12 = "Não sei o que há naquele prédio, mas quando ouço que é algo que o Conselho Estudantil Geral valoriza... sinto que tenho que destruí-lo..."
11002-13 = "Ah... Mal posso esperar por o que estar por vir, uhhuhufu♥"