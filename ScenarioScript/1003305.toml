[translation]
1003305-1 = "Um encontro distorcido"
1003305-2 = "（Para garantir, cheguei mais cedo do que o horário combinado com Wakamo）"
1003305-3 = "[s] \"Bem, o local específico é...\""
1003305-4 = "Fufu... você chegou um pouco mais cedo do que o horário marcado."
1003305-5 = "[s] \"...Ué?\""
1003305-11 = "Ora, que expressão curiosa você tem..."
1003305-13 = "Cada vez que vejo uma nova expressão sua, esse sentimento doloroso transborda do fundo do meu peito... Não consigo evitar um suspiro."
1003305-15 = "Meu corpo fica tão quente que não consigo me conter..."
1003305-17 = "Se começarmos assim, vou acabar ficando em apuros..."
1003305-21 = "[ns] \"Não me diga que é você, Wakamo...?\""
1003305-22 = "Fufu, sim. É claro, sou eu, a sua Wakamo♡"
1003305-23 = "[s] \"Sua atmosfera está diferente do habitual...?\""
1003305-24 = "Ah,"
1003305-25 = "Este visual?"
1003305-26 = "Fufu, talvez seja verdade. Vestir-me assim é tudo pelo nosso tempo precioso juntos."
1003305-27 = "Se eu estivesse com minhas roupas de sempre, acabaria atraindo atenção por vários motivos..."
1003305-28 = "Não seria um problema se eu estivesse apenas seguindo o Sensei, mas como estamos frente a frente, bem."
1003305-29 = "Já que estou tendo o prazer de estar ao seu lado, preciso me preocupar com esses detalhes também."
1003305-30 = "[s] \"O-obrigado...\""
1003305-31 = "É por você, que não é ninguém menos que o meu amado, então isso é o mínimo que posso fazer♡"
1003305-32 = "Ah, não podemos ficar parados aqui. Preciso colocar em prática o plano de encontro que preparei perfeitamente!"
1003305-38 = "Então, conto com você hoje, Sensei."
1003305-39 = "[s] \"Sim, conto com você.\""
1003305-42 = "（Enquanto era guiado pela mão por Wakamo, chegamos ao restaurante que ela já havia reservado）"
1003305-45 = "Fufu, primeiro, o restaurante que reservei para hoje é este."
1003305-46 = "[s] \"Um restaurante de luxo...\""
1003305-47 = "Ora, isso é inesperado?"
1003305-48 = "Você esperava algo com uma atmosfera mais antiquada?"
1003305-49 = "Sim, entendo. É claro que também gosto de lugares com esse tipo de charme..."
1003305-50 = "Mas, de acordo com o guia de encontros, este é o tipo de lugar adequado para passar o tempo com a pessoa amada..."
1003305-51 = "[s] \"...Guia de encontros?\""
1003305-52 = "Vamos, não podemos perder tempo. Sensei, vamos entrar."
1003305-57 = "Ah, cliente...! Sinto muito, de verdade!"
1003305-58 = "...?"
1003305-59 = "Sinto muito, mas hoje estamos fechados temporariamente..."
1003305-60 = "Ora, eu deveria ter feito a reserva..."
1003305-61 = "Peço desculpas... É que hoje, de repente, um certo cliente decidiu nos visitar..."
1003305-62 = "[s] \"Um certo cliente?\""
1003305-63 = "Sim. Um dos maiores críticos gastronômicos de Kivotos, o senhor \"Amante de Croquetes\", virá de repente..."
1003305-64 = "Recebemos ordens da gerência para oferecer o menu completo perfeito nesta oportunidade, pois é uma chance de o nosso restaurante se tornar o assunto do momento...!"
1003305-65 = "Nesta época, não podemos perder essa chance!"
1003305-66 = "Sinto muito, mas por favor, entenda...!"
1003305-72 = "[ns] \"Wa-Wakamo...?\""
1003305-73 = "N-não, é claro que não queremos que vocês vão embora de mãos vazias!"
1003305-74 = "Vou lhes dar este vale-refeição!"
1003305-75 = "Se voltarem na próxima vez, tragam isso e serviremos o menu de luxo gratuitamente...!"
1003305-79 = "[ns] \"Wa-Wakamo! Vamos deixar para a próxima e ir para o próximo lugar!\""
1003305-82 = "（E assim, o dia começou com um pequeno acidente...）"
1003305-85 = "（No café que visitamos depois）"
1003305-86 = "Fufu,"
1003305-87 = "Embora não tenha sido intencional, o plano acabou saindo um pouco dos trilhos, mas..."
1003305-88 = "Sensei, por favor, não se preocupe."
1003305-89 = "Eu, Wakamo, pesquisei muito para este dia... e não encontrei apenas um restaurante, mas também o doce perfeito para degustarmos juntos."
1003305-90 = "Li em um guia turístico outro dia que, se visitarmos este café juntos, podemos pedir o 'menu exclusivo para casais'."
1003305-91 = "Fufu, tenho certeza de que o Sensei também vai gostar..."
1003305-92 = "Menu exclusivo para casais...?"
1003305-93 = "Ah, na verdade, as vendas disso foram encerradas no ano passado... Espera, um guia turístico?"
1003305-98 = "Ah, aquele que o presidente publicou por hobby há um ano...?"
1003305-99 = "Ku, fufu..."
1003305-100 = "Pe-peço perdão... Kuku...!"
1003305-101 = "Não, é que... quem ainda usa um guia turístico para planejar um encontro hoje em dia..."
1003305-102 = "De, de qualquer forma, sinto muito, mas não servimos mais esse menu... Por favor, dê uma olhada nas outras opções."
1003305-107 = "[ns] \"Wa, Wakamo! Vamos para o próximo lugar!\""
1003305-111 = "(E depois disso...)"
1003305-112 = "Es-"
1003305-113 = "Está tudo bem, Sensei."
1003305-114 = "Desta vez, com certeza...!"
1003305-115 = "Se pegarmos o trem daqui a 2 minutos, ainda conseguiremos chegar a tempo para a apresentação no parque de diversões—"
1003305-121 = "...?"
1003305-126 = "Ah, o quê!? Que droga, por que você esbarrou em mim do nada!"
1003305-127 = "O que foi, uma garotinha mimada passeando por aí? Não subestime o mundo, garota!"
1003305-128 = "Quer que eu te acompanhe nesse passeio, é!?"
1003305-134 = "[ns] \"PAREM!! Acalmem-se, por favor!?\""
1003305-137 = "Hah, como quer que a gente se acalme!? Quase deslocaram meu ombro com aquilo!"
1003305-138 = "É isso mesmo!"
1003305-139 = "Isso!"
1003305-144 = "[ns] \"Sinto muito por isso! Wakamo, vamos nos acalmar!\""
1003305-147 = "...?"
1003305-152 = "...Peço perdão."
1003305-158 = "Isso é o suficiente...?"
1003305-163 = "I-iiihhh!?"
1003305-164 = "Te, tenha mais cuidado da próxima vez, entendeu!?"
1003305-165 = "Fu, fujam!!"
1003305-170 = "Ufa..."
1003305-171 = "Ah, o horário do trem..."
1003305-174 = "(No fim, não conseguimos pegar o trem e não fomos ao parque de diversões)"
1003305-177 = "En, então vamos ver um filme!"
1003305-178 = "Ouvi dizer que um filme de ro, ro, romance acabou de estrear..."
1003305-182 = "Os, os ingressos estão todos esgotados...!?"
1003305-183 = "...Não vou desistir assim."
1003305-185 = "O próximo...!"
1003305-187 = "Desta vez, com certeza...!"
1003305-190 = "(O plano de Wakamo sofreu um acidente atrás do outro e, sem perceber, o dia escureceu...)"
1003305-194 = "[ns] \"Aqui, Wakamo. Qual bebida você prefere?\""
1003305-195 = "Ah... muito obrigada, Sensei."
1003305-196 = "Mesmo depois de tudo, você ainda se deu ao trabalho de comprar uma bebida para mim..."
1003305-197 = "[s] \"Não se preocupe. Bem... sabe, dias assim acontecem.\""
1003305-199 = "É verdade... mas, era um dia que eu deveria ter passado com você..."
1003305-200 = "O dia que deveria ter sido o melhor de todos acabou arruinado por causa dos meus erros..."
1003305-201 = "Tomei o seu tempo, e agora não sei como olhar para o Sensei... Sinto muito..."
1003305-202 = "[s1] \"Não houve nada que estragasse o dia.\"\n[s2] \"Na verdade, fiquei feliz por ver o quanto a Wakamo se esforçou.\""
1003305-203 = "……？"
1003305-204 = "……？"
1003305-205 = "……Ah, você quer dizer que, mesmo sendo envolvida em algo hoje, eu não causei nenhum alvoroço?"
1003305-206 = "Fufu, isso é natural da minha parte."
1003305-207 = "[s] \"……？\""
1003305-208 = "Claro, existe a nossa promessa anterior e... acima de tudo, hoje é um tempo que você, gentilmente, reservou especialmente para mim."
1003305-209 = "Não quero que um tempo tão precioso seja arruinado por confusões."
1003305-210 = "Entendo que, se minha verdadeira identidade for revelada aos outros, isso causará problemas para você."
1003305-211 = "Por isso, é natural que eu me esforce para que isso não aconteça."
1003305-212 = "Além disso, peço desculpas por dizer isso por conta própria, mas..."
1003305-213 = "Momentos como o de hoje certamente não serão os únicos."
1003305-214 = "Haverá muitos outros, dezenas, centenas de vezes... Pensando nisso, sinto que preciso me conter."
1003305-215 = "Na verdade, ver o seu rosto enquanto você me observava, preocupado... fez meu coração disparar. Afinal, pude ter essa expressão só para mim."
1003305-216 = "[s] \"E-entendo... então fico feliz.\""
1003305-217 = "Infelizmente, o dia acabou escurecendo sem que percebêssemos..."
1003305-223 = "Poderia, pelo menos, me deixar ser um pouco mimada no caminho de volta?"
1003305-224 = "[s] \"Claro.\""
1003305-225 = "Fufu, conto com você."
1003305-227 = "(Na manhã seguinte... exatamente quando eu estava prestes a começar o trabalho)"
1003305-234 = "Vamos sair, Sensei!"
1003305-235 = "[s] \"Wakamo!?\""
1003305-236 = "Aconteceu algo? Ah, de repente...?"
1003305-237 = "Não, nada disso. Eu, Wakamo, estava esperando por este momento como se cada dia fossem mil outonos."
1003305-238 = "Fufu, como conversamos ontem. Mesmo que o dia de ontem tenha terminado daquela forma, o futuro ainda continua..."
1003305-239 = "Por isso, Sensei. Vamos passar outro dia maravilhoso hoje, para não perder para o de ontem, certo?"
1003305-240 = "Claro, eu já planejei tudo cuidadosamente. Não precisa se preocupar com nada, viu? ♡"
1003305-244 = "[ns] \"...Entendi.\""
1003305-246 = "(E assim, um encontro repentino começou mais uma vez)"
