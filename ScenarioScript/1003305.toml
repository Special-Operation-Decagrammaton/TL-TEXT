[translation]
1003305-1 = "歪なデート"
1003305-2 = "（念のため、ワカモと約束していた時間よりも早めに到着した）"
1003305-3 = "[s] \"えっと、具体的な場所は……。\""
1003305-4 = "ふふっ……約束のお時間よりも、少々お早いですね。"
1003305-5 = "[s] \"……あれ？\""
1003305-11 = "あら、何やら不思議そうな表情……。"
1003305-13 = "新たなお顔を見るたびに、この胸の奥からこみあげてくる切ない気持ち……思わずため息がこぼれてしまいます。"
1003305-15 = "我慢できないほど、身体も熱くなって……。"
1003305-17 = "最初からこうなっては、困ってしまいます……。"
1003305-21 = "[ns] \"もしかしなくても、ワカモだよね……？\""
1003305-22 = "ふふっ、はい。もちろん、あなた様のワカモですよ♡"
1003305-23 = "[s] \"いつもと雰囲気が違うね……？\""
1003305-24 = "ああ、"
1003305-25 = "この格好ですか？"
1003305-26 = "ふふっ、確かにそうかもしれません。こうして着飾るのも、全てはあなた様との大切な時間のため。"
1003305-27 = "普段の格好ですと、やはり様々な理由で注目を浴びてしまいますので……。"
1003305-28 = "先生の後を追う時だけでしたら問題無いのですが、こうやって向き合うからには、はい。"
1003305-29 = "せっかくあなた様のお傍でご一緒するのですし、やはりこういったところも気にしなくては、と。"
1003305-30 = "[s] \"あ、ありがとう……。\""
1003305-31 = "他の誰でもないあなた様のためですから、これくらいは当然のことです♡"
1003305-32 = "ああ、こうしている場合ではありませんね。完璧に練ってきた私のデートプランを、早く実行せねば！"
1003305-38 = "それでは今日一日よろしくお願いしますね、先生。"
1003305-39 = "[s] \"うん、よろしく。\""
1003305-42 = "（手を引いてワカモに導いてもらいながら、すでに予約をしてくれていたというレストランに着いた）"
1003305-45 = "ふふっ、まず今日予約していたお店はこちらです。"
1003305-46 = "[s] \"高級レストランだ……。\""
1003305-47 = "あら、意外でしょうか？"
1003305-48 = "もう少し古風な雰囲気とか、ですか？"
1003305-49 = "はい、そうですね。もちろんそのような趣のお店も好きなのですが……。"
1003305-50 = "しかしデートに関する指南書で、こういう場所が愛する方との時間にはふさわしいと……"
1003305-51 = "[s] \"……指南書？\""
1003305-52 = "さあ、こうしている場合ではありません。先生、中へ入りましょう。"
1003305-57 = "あっ、お客様……！誠に申し訳ございません！"
1003305-58 = "……？"
1003305-59 = "大変恐縮なのですが、本日は臨時休業となってしまい……。"
1003305-60 = "あら、予約はできていたはずなのですが……？"
1003305-61 = "申し訳ありません……本日急に、とあるお客様がお越しになられることになりまして……。"
1003305-62 = "[s] \"とあるお客様？\""
1003305-63 = "はい。キヴォトスでもトップクラスの美食評論家のひとりである「コロッケラバー」様が突如お見えになるとのことで……。"
1003305-64 = "上層部からの命令もあり、この機会に完璧なコースを提供すれば当店も一気に話題になるチャンスでして……！"
1003305-65 = "このご時世、タイミングを逃すわけにはいかないのです！"
1003305-66 = "大変申し訳ないのですが、ここはどうか……！"
1003305-72 = "[ns] \"わ、ワカモ……？\""
1003305-73 = "もっ、もちろんそのままお帰りいただこうというわけではございません！"
1003305-74 = "こちらのお食事チケットをお渡しします！"
1003305-75 = "次回いらっしゃった場合にはそちらを頂ければ、無料で最高級のコースをご提供いたしますので……！"
1003305-79 = "[ns] \"わ、ワカモ！ここは次回の楽しみにして、次の場所に行こう！\""
1003305-82 = "（そうして、ちょっとしたアクシデントから一日が始まったのだが……）"
1003305-85 = "（その後に訪れたカフェでは）"
1003305-86 = "ふふっ、"
1003305-87 = "不本意ながら計画が少々狂ってしまいましたが……"
1003305-88 = "先生、どうかご心配なく。"
1003305-89 = "このワカモ、今日という日のために一生懸命調査を致しまして……レストランのみならず、あなた様と一緒に味わうための最高なスイーツを見つけたのです。"
1003305-90 = "こちらのカフェにふたりで訪れると「カップル限定メニュー」を頂けると、先日ガイドブックで読みました。"
1003305-91 = "ふふっ、きっと先生にもお気に召していただけるかと……"
1003305-92 = "カップル限定メニュー……？"
1003305-93 = "あ、実はそちら、去年で販売を停止しておりまして……え、ガイドブック？"
1003305-98 = "あぁ、社長が1年前に趣味で出したあの……？"
1003305-99 = "く、ふふっ……。"
1003305-100 = "も、申し訳ありません……くくっ……！"
1003305-101 = "いえ、まさか今時、ガイドブックでデートコースを吟味する方がいらっしゃるとは……。"
1003305-102 = "と、とにかく申し訳ございませんが、現在メニューは提供しておらず……他のメニューをご覧いただけますと。"
1003305-107 = "[ns] \"わ、ワカモ！次のところに行こう！\""
1003305-111 = "（その次には……）"
1003305-112 = "だ、"
1003305-113 = "大丈夫です先生。"
1003305-114 = "今度こそ……！"
1003305-115 = "2分後の電車に乗れれば、あの遊園地で開かれる公演に何とか間に合――"
1003305-121 = "……？"
1003305-126 = "あぁん！？何だこら、急にぶつかってきやがって！"
1003305-127 = "何だ、世間知らずのお嬢さんがお散歩か？世の中舐めてんじゃねぇぞ！"
1003305-128 = "お散歩に付き合ってやろうかぁ！？"
1003305-134 = "[ns] \"ストップ！！落ち着いて、ね！？\""
1003305-137 = "はぁ、落ち着いてられるか！？さっきのでこちとら肩が外れるかと思ったんだぞ！"
1003305-138 = "そうだぞ！"
1003305-139 = "ぞ！"
1003305-144 = "[ns] \"それはごめんなさい！ワカモは落ち着こう！\""
1003305-147 = "……？"
1003305-152 = "……失礼いたしました。"
1003305-158 = "これでよろしくって……？"
1003305-163 = "ひ、ひいいっ！？"
1003305-164 = "つ、次から気を付けろよ！？"
1003305-165 = "に、逃げろ！！"
1003305-170 = "ふぅ……"
1003305-171 = "あ、電車の時間が……。"
1003305-174 = "（結局電車には間に合わず、遊園地には行けなかった）"
1003305-177 = "で、では映画を見ましょう！"
1003305-178 = "ちょうど最近上映が始まった、れ、れれれ恋愛の映画があるそうで……！？"
1003305-182 = "ち、チケットがすべて売り切れ……！？"
1003305-183 = "……このままでは諦めません。"
1003305-185 = "次……！"
1003305-187 = "次こそは……！"
1003305-190 = "（ワカモの計画は次々にアクシデントが発生してしまい、いつの間にか日は暮れて……）"
1003305-194 = "[ns] \"はい、ワカモ。飲み物どっちが良い？\""
1003305-195 = "あ……ありがとうございます、先生。"
1003305-196 = "こんな私のために、わざわざ飲み物まで買ってくださるなんて……。"
1003305-197 = "[s] \"気にしないで。えっと……まあ、こういう日もあるよね。\""
1003305-199 = "そう、ですね……しかし、せっかくあなた様と共に過ごせる日だったのに……。"
1003305-200 = "最高の日になるはずだった一日が、私のミスでこんなにも台無しで……。"
1003305-201 = "先生のお時間を頂いておきながら、私、これでは先生に向ける顔が……申し訳ありません……。"
1003305-202 = "[s1] \"台無しなんてことは無かったよ。\"\n[s2] \"むしろワカモが色々と頑張ってくれて、嬉しかった。\""
1003305-203 = "……？"
1003305-204 = "……？"
1003305-205 = "……あぁ、今日は何かに巻き込まれても、騒ぎにしなかったからということですか？"
1003305-206 = "ふふっ、それについては当然です。"
1003305-207 = "[s] \"……？\""
1003305-208 = "もちろん以前の約束もございますし……何より本日はせっかくあなた様が、特別に私のために作ってくださったお時間なのですから。"
1003305-209 = "そんな貴重なお時間を、騒がしくなどさせたくありません。"
1003305-210 = "私の正体が周囲に知られては、あなた様を困らせてしまうことは理解しております。"
1003305-211 = "ですので、そうさせまいと努力するのは当然のことです。"
1003305-212 = "それに、私が勝手にこう言ってしまうのは大変恐縮ではありますが……。"
1003305-213 = "今日のようなお時間は、きっとこれだけではありませんから。"
1003305-214 = "この先何回も、何十回も、何百回もあるはず……そう考えると、やはり我慢せねばと。"
1003305-215 = "むしろ私の顔を見つめてハラハラされている……そんなあなた様の顔を見ていると、私はなんだかドキドキしてしまいました。その表情を、独り占めできたわけですし。"
1003305-216 = "[s] \"そ、そっか……なら良かった。\""
1003305-217 = "本日は残念ながら、こうしていつの間に日が暮れてしまいましたが……。"
1003305-223 = "せめて帰り道まで、私の甘えを聞いていただけませんか？"
1003305-224 = "[s] \"もちろん。\""
1003305-225 = "ふふっ、よろしくお願いいたします。"
1003305-227 = "（次の日の朝……仕事を始めようとした正にその時）"
1003305-234 = "さあ、お出かけしましょう先生！"
1003305-235 = "[s] \"ワカモ！？\""
1003305-236 = "どうかしましたか？え、急……？"
1003305-237 = "いえ、そのようなことはございません。このワカモ、一日千秋の思いでした。"
1003305-238 = "ふふっ、昨日お話した通りです。一日があのように終わってしまったとて、この先はまだまだ続きます……。"
1003305-239 = "ですので、先生。今日は昨日に負けないよう、また素敵な一日を過ごしましょう？"
1003305-240 = "もちろん、また計画はしっかり練ってきましたので。何も心配なさらなくて結構ですよ♡"
1003305-244 = "[ns] \"……そっかぁ。\""
1003305-246 = "（そうして突然のデートが、再び始まることになった）"
