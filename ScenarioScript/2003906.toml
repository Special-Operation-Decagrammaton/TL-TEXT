[translation]
2003906-1 = "Sondando o terreno"
2003906-2 = "Schale - Em frente ao portão principal"
2003906-4 = "Ah... por que o Genryumon e o Clube de Pesquisa de Alquimia têm que fazer tanto barulho assim..."
2003906-5 = "Eu só queria sair para passear com o Sensei..."
2003906-6 = "[s] \"Ei... o que houve?\""
2003906-7 = "Nada, não é nada demais."
2003906-8 = "É só que, por causa da minha saída, o Genryumon organizou um seminário de estudos de três dias e duas noites sem dormir."
2003906-9 = "[s] \"Três dias e duas noites sem dormir, tudo isso!?\""
2003906-10 = "Além disso, o Clube de Pesquisa de Alquimia..."
2003906-11 = "Eles até prepararam isto..."
2003906-16 = "[ns] \"Isso é... o quê?\""
2003906-17 = "Eles chamaram de \"inalador\".#nParece que serve para inalar medicamentos aromáticos."
2003906-18 = "Disseram que fizeram isso em cooperação com uma escola externa, sem avisar o Genryumon..."
2003906-19 = "[s] \"Então, você precisa cuidar bem disso hoje, né?\""
2003906-20 = "...Até você vai dizer isso, Sensei?"
2003906-21 = "Eu já disse que não sou mais uma criança..."
2003906-22 = "[s1] \"Todos estão preocupados com você, Kisaki.\"\n[s2] \"Claro, eu sou um deles.\""
2003906-25 = "Claro, eu entendo bem os sentimentos de todos.#nMas..."
2003906-26 = "Não, vamos encerrar esse assunto por aqui."
2003906-27 = "Bem, para onde você vai me levar hoje?"
2003906-28 = "Já passou da hora do almoço, mas—"
2003906-29 = "[s] \"Sim, deixe comigo!\""
2003906-30 = "Ah, estou ansiosa."
2003906-32 = "Isto é...?"
2003906-33 = "Ah, claro que sei pelo menos o nome.#nÉ um \"trem\", não é?"
2003906-34 = "Você quer dizer que é uma experiência nova?"
2003906-35 = "..."
2003906-36 = "Ah, é verdade."
2003906-37 = "Balança mais do que eu pensava e é barulhento, mas..."
2003906-39 = "...Um parque de diversões?"
2003906-40 = "Hm? Ah... não me culpe por reagir assim.#nEscolher um lugar como este—"
2003906-41 = "É simples demais!"
2003906-42 = "Mesmo eu, sei o que é um parque de diversões."
2003906-43 = "—Ver para crer, dizem. Mas..."
2003906-44 = "Bem, tudo bem. Vou confiar no Sensei.#nAliás, tem algo aqui que me parece estranhamente familiar..."
2003906-45 = "Entendo. É um \"parque temático\" que reproduz as características de cada escola."
2003906-46 = "Parece que tem até a minha Shanhaijing..."
2003906-50 = "Está um pouco estranho... hum, talvez a supervisão tenha sido descuidada! Quero falar com o responsável!"
2003906-52 = "(No começo eu não sabia o que esperar, mas Kisaki estava aproveitando muito o parque de diversões)"
2003906-53 = "(Ela parece ter gostado especialmente da montanha-russa, a ponto de irmos cinco vezes seguidas...)"
2003906-55 = "Isto é... um \"fliperama\"?"
2003906-56 = "É a primeira vez que toco nesse tipo de jogo..."
2003906-57 = "Hum, então até iniciantes podem se divertir? Se você diz, deve ser verdade."
2003906-58 = "Então é só apertar esses três botões repetidamente para completar o minijogo."
2003906-59 = "...Não posso avançar se tiver medo de coisas novas."
2003906-60 = "Tudo bem. Vamos tentar!"
2003906-68 = "...Quem diria que eu seria tão humilhada assim..."
2003906-69 = "Sensei, você não usou algum truque sujo, usou? Parece que só para mim está difícil..."
2003906-70 = "A velocidade mudou várias vezes no meio... eu mal conseguia acompanhar os botões..."
2003906-71 = "Isso também é um tipo de jogo...?#nReagir a mudanças instantâneas é o verdadeiro prazer de jogar...?"
2003906-72 = "……Se tudo foi intencional, então não há o que fazer."
2003906-73 = "Mas ainda assim, é frustrante. Sendo assim, da próxima vez, vou até o fim...!"
2003906-74 = "Sua agenda está cheia depois disso? #n... B-bem, então só mais uma vez."
2003906-76 = "Desta vez é o centro comercial, é?..."
2003906-77 = "Hum... certamente, pode ser que eu faça novas descobertas."
2003906-78 = "Mas é a primeira vez que venho a um lugar como este..."
2003906-79 = "Fufu, acho que vou seguir calmamente a orientação do Sensei."
2003906-80 = "Hm? Mesmo sem você insistir..."
2003906-81 = "……."
2003906-82 = "Sensei, você não está... pensando em algo estranho, está...?"
2003906-85 = "……!?"
2003906-86 = "I-isso é...!?"
2003906-87 = "Não, eu sei que é um presente..."
2003906-88 = "Isso... não é algo que não combina comigo...?"
2003906-89 = "M-mesmo que você diga isso... #nAlém disso, raramente tenho a oportunidade de me vestir assim em Shanhaijing..."
2003906-90 = "Mesmo que você diga que quer me ver com um visual diferente..."
2003906-91 = "Hum... p-posso considerar um pouco, mas..."
2003906-92 = "Hm? Quer que eu me lembre de você ao usar esta roupa...?"
2003906-93 = "……."
2003906-94 = "V-vou fazer o meu melhor..."
2003906-96 = "Acabou sendo uma refeição tardia. #nDizem que as pessoas só conseguem se mover se comerem, mas..."
2003906-97 = "Fufu, eu estava me divertindo tanto que nem percebi a fome."
2003906-98 = "Hum? Você está tão curioso assim sobre a minha opinião?"
2003906-99 = "……."
2003906-100 = "Se eu responder que foi divertido, o que você pretende fazer?"
2003906-101 = "Ah, eu sei. Você deve ter preparado outras coisas para hoje também."
2003906-102 = "Só se passou meio dia. #nNão pense que estou satisfeita só com isso, entendeu?"
2003906-103 = "Ah, o inalador... entendo."
2003906-104 = "Não precisa ser tão superprotetor."
2003906-105 = "……Eu já sei, mesmo sem você me dizer."
2003906-110 = "Está bom assim?"
2003906-111 = "Obrigada pela espera. Por favor, aproveite."
2003906-112 = "Hum. Então, vou começar a comer."
2003906-113 = "Fufu... tudo isso aqui, são coisas que vejo pela primeira vez."
2003906-116 = "[ns] \"…….\""
2003906-117 = "Sensei, que tipo de situação é esta, afinal?"
2003906-118 = "Você achou que eu gostaria? Ho... posso perguntar o verdadeiro motivo?"
2003906-119 = "Você queria ver como as crianças brincam...?"
2003906-120 = "Até os adultos querem brincar na piscina de bolinhas...?"
2003906-124 = "Isso não é uma explicação, sabia?"
2003906-126 = "……."
2003906-127 = "Bem, eu sei muito bem que você fez isso pensando em mim."
2003906-128 = "Haa... se é uma consideração do Sensei, não posso recusar."
2003906-129 = "Eu... na piscina de bolinhas..."
2003906-130 = "……."
2003906-138 = "Já vou indo."
2003906-140 = "(Dessa forma, Kisaki é, inesperadamente...)"
2003906-141 = "(Não, exatamente como esperado...)"
2003906-142 = "(Brincou alegremente...)"
2003906-144 = "Já é fim de tarde."
2003906-145 = "Fufu... realmente, muitas coisas aconteceram. #nO dia de hoje... jamais esquecerei."
2003906-149 = "……Ah, aquilo? Não se preocupe."
2003906-154 = "――É um mistério."
2003906-155 = "Aquele tempo, aqueles acontecimentos... para mim, tudo foi tão novo……."
2003906-156 = "Sou grata, Sensei."
2003906-157 = "Se você não estivesse aqui, eu…… provavelmente não teria conseguido ver esta paisagem."
2003906-163 = "Poderia se sentar ao meu lado por um instante?"
2003906-164 = "Já está tarde e o vento está frio."
2003906-165 = "……."
2003906-167 = "――Eu gosto."
2003906-168 = "Deste momento do crepúsculo."
2003906-169 = "Nem dia, nem noite, essa fronteira ambígua."
2003906-170 = "O sol se põe e tudo ao redor escurece―― neste instante, esconde-se uma beleza indescritível."
2003906-171 = "……."
2003906-172 = "Sensei, tenho um pedido."
2003906-173 = "――Poderia me acompanhar em uma caminhada?"
2003906-174 = "Quero passar este tempo com você, Sensei."
2003906-196 = "Sim. Estou muito satisfeita, Sensei."
2003906-197 = "[s] \"Você se divertiu?\""
2003906-198 = "Ah. O dia de hoje... não esquecerei por toda a minha vida."
2003906-199 = "Fufu, não faça essa cara de surpresa. #nIsso é apenas――"
2003906-208 = "[ns] \"Kisaki!?\""
2003906-209 = "……Ah."
2003906-210 = "Ah, perdão... agradeço a você, Sensei."
2003906-211 = "Não se preocupe tanto."
2003906-215 = "Mas, perdoe-me, Sensei. #nAgora... talvez eu precise de um pouco de descanso."
2003906-216 = "[s] \"Kisaki, tente aguentar só mais um pouco!\""
2003906-222 = "(Carregando Kisaki nas costas, você entra rapidamente em uma estalagem próxima)"
2003906-223 = "(Depois, você a coloca gentilmente no sofá)"
2003906-225 = "[ns] \"Vou acender o incenso medicinal agora mesmo……!\""
2003906-227 = "Ufa... sou grata, Sensei. Sinto-me um pouco melhor."
2003906-228 = "Quem diria que o dia terminaria desta forma... que vergonha."
2003906-229 = "Não precisa se preocupar...? #nFufu, essa é uma resposta bem típica sua."
2003906-230 = "……Sensei."
2003906-231 = "……Poderia me ouvir por um momento?"
2003906-236 = "[wa:1170]― [log=키사키]Fufu……[wa:1930] finalmente olhou para mim, não foi?[/log]"
2003906-237 = "[wa:3880]― [log=키사키]Mas, [wa:290]Sensei. [wa:1910]Poderia pensar sobre isso uma vez?[/log]"
2003906-240 = "[wa:1830]― [log=키사키]Eu posso estar, [wa:1710]neste momento, fragilizada……[/log]"
2003906-241 = "[wa:2790]― [log=키사키]Ou talvez eu esteja apenas [wa:690]fingindo estar fraca.[/log]"
2003906-244 = "[wa:1530]― [log=키사키]Ou talvez…… [wa:1620]eu esteja apenas [wa:1060]testando suas intenções.[/log]"
2003906-245 = "[wa:3980]― [log=키사키]Ou simplesmente―― [wa:1220]eu talvez esteja apenas [wa:1970]confiando em você de todo o coração, não é?[/log]"
2003906-248 = "[wa:1330]― [log=키사키]Mas…… [wa:1500]é verdade, [wa:1880]posso garantir uma coisa.[/log]"
2003906-251 = "[wa:880]― [log=키사키]Não importa o que aconteça aqui……[/log]"
2003906-252 = "[wa:3460]― [log=키사키]Eu jamais o culparei. [wa:3840]……Por toda a eternidade.[/log]"
2003906-257 = "[ns] \"…….\""
2003906-259 = "[ns3] \"Kisaki.\"\n[ns4] \"Você não deve se forçar ainda.\""
2003906-262 = "Se, Sensei?"
2003906-263 = "[s] \"Cuidar de um aluno que não está se sentindo bem. Esse é o papel do Sensei, afinal.\""
2003906-267 = "……É verdade."
2003906-268 = "Fufu. Quem diria que eu seria repreendida pelo Sensei. #nUma experiência nova."
2003906-269 = "Sendo assim... colocar a aluna para dormir também é um dos \"deveres\" do Sensei, não é?"

2003906-270 = "[s5] \"I-isso é verdade...!?\"\n[s6] \"Espera... o que você quer dizer com colocar para dormir!?\""
2003906-273 = "Você não vai retirar o que disse, sendo um educador como é... vai?"
2003906-278 = "Vamos lá, Sensei. Deixo que cuide de mim."
2003906-279 = "[s] \"Uau!?\""
2003906-283 = "（Consegui levar Kisaki, que se aproximou repentinamente, até a cama...）"
2003906-285 = "……."
2003906-286 = "Sensei."
2003906-289 = "Graças a você... acho que conseguirei dormir tranquilamente hoje..."
2003906-295 = "（Fiquei fazendo carinho na cabeça dela lentamente até que Kisaki adormecesse）"
2003906-296 = "（Talvez estivesse exausta, pois logo pude ouvir sua respiração profunda）"
