[translation]
2003906-1 = "水を向けて"
2003906-2 = "シャーレ・正門前"
2003906-4 = "はぁ……玄龍門も錬丹術研究会も、どうしてこうも騒ぎ立てるのやら……。"
2003906-5 = "[ruby=わらわ]妾[/ruby]はただ、先生と遊びに行くだけじゃというのに……。"
2003906-6 = "[s] \"え……どうしたの？\""
2003906-7 = "なに、大したことではない。"
2003906-8 = "ただ、妾の外出に伴って、玄龍門では2泊3日の徹夜勉強会が開かれてな。"
2003906-9 = "[s] \"徹夜で、2泊3日も！？\""
2003906-10 = "その上、錬丹術研究会は……"
2003906-11 = "こんなものまで用意しおって……"
2003906-16 = "[ns] \"これは……なに？\""
2003906-17 = "「吸入器」と呼んでおった。#nどうやら[ruby=こうやく]香薬[/ruby]を吸うことができるらしい。"
2003906-18 = "玄龍門に告げず、外部の学園と協力して作ったというのじゃが……。"
2003906-19 = "[s] \"じゃあ、今日はこれを大事にしないとだね。\""
2003906-20 = "……先生までそんな事をいうのか。"
2003906-21 = "妾はもう子供ではないと言っておるのに……。"
2003906-22 = "[s1] \"みんな、キサキのことが心配なんだよ。\"\n[s2] \"もちろん、私もその一人だし。\""
2003906-25 = "無論、皆の気持ちはよく分かっておる。#nじゃが……"
2003906-26 = "いや、この話はここまでとしよう。"
2003906-27 = "さて、今日はどこを案内してくれるのかえ？"
2003906-28 = "ちょうど昼の時間が過ぎてしまったが――"
2003906-29 = "[s] \"うん、私に任せて！\""
2003906-30 = "ああ、期待しておるぞ。"
2003906-32 = "これは……？"
2003906-33 = "ああ、もちろん名前くらいは知っておる。#n「電車」じゃろ？"
2003906-34 = "新鮮な体験ではないか、と？"
2003906-35 = "……。"
2003906-36 = "ああ、そうさな。"
2003906-37 = "思った以上に揺れて、騒々しいが……。"
2003906-39 = "……遊園地か。"
2003906-40 = "うん？ああ……反応が薄いのも仕方ないじゃろうて。#nこんな場所を選ぶとは――"
2003906-41 = "安直すぎる！"
2003906-42 = "いくら妾とて、遊園地くらいは知っておる。"
2003906-43 = "――百聞は一見に如かず。ではあるが……"
2003906-44 = "まぁよい。先生を信じるとしよう。#nところで、妙に見覚えのあるものがあるような……"
2003906-45 = "なるほど。各学園の特徴を再現した「テーマパーク」なのじゃな。"
2003906-46 = "我が山海経もあるようじゃが……"
2003906-50 = "微妙におかしいのう……ふむ、監修が甘いのやもしれぬな！責任者を出すのじゃ！"
2003906-52 = "（はじめはどうなるかと思ったけど、キサキは遊園地を満喫していた）"
2003906-53 = "（特にジェットコースターが気に入ったようで、5回も連続で乗ることになった……）"
2003906-55 = "ここは……「ゲームセンター」？"
2003906-56 = "この類の遊戯は初めて触るのじゃが……。"
2003906-57 = "ふむ、初心者でも楽しめるのか。其方が言うのなら、そうなのじゃろう。"
2003906-58 = "この3つのボタンを連打して、ミニゲームをクリアしていくのじゃな。"
2003906-59 = "……新しいものに怖気づいていては、前に進むことはできぬ。"
2003906-60 = "よい。やってみよう！"
2003906-68 = "……よもや、こうも翻弄されてしまうとは……。"
2003906-69 = "先生、なにか反則技でも使っておらぬか？妾だけなんだか難しいような……。"
2003906-70 = "途中で何度も速さが変わって……ボタンを押すのに精一杯じゃった……。"
2003906-71 = "それもゲームの一種……？#n瞬時の変化に対応するのが、ゲームプレイの[ruby=だいごみ]醍醐味[/ruby]……？"
2003906-72 = "……すべてが意図されておるというのなら、致し方あるまい。"
2003906-73 = "じゃが、悔しくもある。なれば、次は完遂するまで……！"
2003906-74 = "この後の予定が詰まっている？#n……な、ならばあと一回だけ。"
2003906-76 = "今回は商店街かの……。"
2003906-77 = "ふむ……たしかに、新たな発見があるやもしれぬ。"
2003906-78 = "じゃが、このような場所に来るのは初めてでの……。"
2003906-79 = "ふふ、ここは大人しく先生の案内に従うとしよう。"
2003906-80 = "うん？念押しなどせずとも……"
2003906-81 = "……。"
2003906-82 = "先生、なにか……変なことでも考えておらぬか……？"
2003906-85 = "……！？"
2003906-86 = "こ、これは……！？"
2003906-87 = "いや、贈り物であることは知っておる……。"
2003906-88 = "これは……妾には、似合わない、のではないか……？"
2003906-89 = "そ、そう言われてもじゃな……#nそれに、山海経でこのような姿になる機会など、滅多に無いのじゃが……"
2003906-90 = "普段と違う格好を見てみたい、と申されても……"
2003906-91 = "ふむ……た、多少考慮しても構わぬが……。"
2003906-92 = "うん？この服を着るときは先生のことを思い出してほしい……？"
2003906-93 = "……。"
2003906-94 = "ぜ、善処はしよう……。"
2003906-96 = "遅い食事になってしまったの。#n人は食べてこそ動けるものとは言うが……"
2003906-97 = "ふふ、ついつい楽しくて空腹に気づかなんだ。"
2003906-98 = "うむ？そんなに妾の感想が気になるのか？"
2003906-99 = "……。"
2003906-100 = "楽しかった――と答えたら、どうするつもりじゃ？"
2003906-101 = "ああ、知っておる。[ruby=そなた]其方[/ruby]が今日準備してくれたものは、他にもあるじゃろうて。"
2003906-102 = "まだ半日しか経ってないのじゃ。#nこれで満足したと思わぬようにな？"
2003906-103 = "ああ、吸入器か……そうさな。"
2003906-104 = "そんなに過保護になるでない。"
2003906-105 = "……其方に言われずとも分かっておる。"
2003906-110 = "これでいいかえ？"
2003906-111 = "お待たせいたしました。ごゆっくりどうぞ。"
2003906-112 = "うむ。では頂くとしようかの。"
2003906-113 = "ふふ……どれもこれも、初めて見るものばかりじゃ。"
2003906-116 = "[ns] \"……。\""
2003906-117 = "先生、これは一体どういう状況じゃ？"
2003906-118 = "妾なら気に入ってくれると思った？ほぉ……その真意を問うても？"
2003906-119 = "子供たちの遊ぶ姿が、見てみたかった……？"
2003906-120 = "大人だって、ボールプールで遊んでみたい……？"
2003906-124 = "説明になっておらぬのじゃが？"
2003906-126 = "……。"
2003906-127 = "まあ、妾のことを思ってくれておるというのは、重々承知しておる。"
2003906-128 = "はぁ……先生の配慮であれば、断れぬのう。"
2003906-129 = "妾が……ボールプールで……"
2003906-130 = "……。"
2003906-138 = "行ってくる。"
2003906-140 = "（そうやってキサキは、意外と……）"
2003906-141 = "（いや、想定通り……）"
2003906-142 = "（楽しく遊んでいた……）"
2003906-144 = "もう夕方か。"
2003906-145 = "ふふ……まこと色んなことがあった。#n今日のことは……ずっと忘れないじゃろう。"
2003906-149 = "……ああ、あれか。案ずるでない。"
2003906-154 = "――不思議じゃ。"
2003906-155 = "あの時間、出来事……妾にはすべてが新鮮じゃった……。"
2003906-156 = "感謝する、先生。"
2003906-157 = "其方がいなかったら、妾は……この景色を見ることは叶わなかったじゃろう。"
2003906-163 = "すこし、隣に座ってもいいかえ？"
2003906-164 = "もう時間も遅いし、風が冷たくての。"
2003906-165 = "……。"
2003906-167 = "――好きなんじゃ。"
2003906-168 = "この夕暮れの時間がな。"
2003906-169 = "昼でも夜でもない、曖昧な境界が。"
2003906-170 = "日が傾いて、あたりが暗くなる――この[ruby=せつな]刹那[/ruby]には、形容しがたい美しさが潜んでおる。"
2003906-171 = "……。"
2003906-172 = "先生、一つ頼みがある。"
2003906-173 = "――散歩に付き合ってはくれぬか？"
2003906-174 = "先生と、この時間を共にしたいのじゃ。"
2003906-196 = "うむ。とても満足したぞ、先生。"
2003906-197 = "[s] \"楽しめた？\""
2003906-198 = "ああ。今日のことは……一生、忘れぬ。"
2003906-199 = "ふふ、そう驚いた顔をするでない。#nこれはただ――"
2003906-208 = "[ns] \"キサキ！？\""
2003906-209 = "……っ。"
2003906-210 = "ああ、すまない……礼を言う、先生。"
2003906-211 = "そう心配するでない。"
2003906-215 = "じゃが、すまない先生。#n今は……少し、休息が必要かも、しれぬ。"
2003906-216 = "[s] \"キサキ、もうちょっと頑張って！\""
2003906-222 = "（キサキをおんぶして、近くの宿に飛び込んだ）"
2003906-223 = "（その後、キサキをゆっくりとソファに座らせる）"
2003906-225 = "[ns] \"すぐ香薬を焚くから……！\""
2003906-227 = "ふぅ……感謝する先生。少し楽になった。"
2003906-228 = "まさか、こんな形で一日が終わってしまうだなんて……面目ないのう。"
2003906-229 = "気にしなくてもよい……？#nふふ、如何にも其方らしい答えじゃ。"
2003906-230 = "……先生。"
2003906-231 = "……すこし、いいかえ？"
2003906-236 = "[wa:1170]― [log=키사키]ふふ……[wa:1930]ようやくこちらを見てくれたかの。[/log]"
2003906-237 = "[wa:3880]― [log=키사키]じゃが、[wa:290]先生。[wa:1910]一度考えてみてくれぬか？[/log]"
2003906-240 = "[wa:1830]― [log=키사키]妾は今、[wa:1710]弱っているのかもしれぬが……[/log]"
2003906-241 = "[wa:2790]― [log=키사키]弱っ[wa:690]たふりをしているだけかもしれぬ。[/log]"
2003906-244 = "[wa:1530]― [log=키사키]あるいは……[wa:1620]先生の出方を[wa:1060]伺っているだけなのやも。[/log]"
2003906-245 = "[wa:3980]― [log=키사키]単に――[wa:1220]其方を心から[wa:1970]信じているだけかもしれぬしな？[/log]"
2003906-248 = "[wa:1330]― [log=키사키]だが……[wa:1500]そうじゃな、[wa:1880]これだけは確約できる。[/log]"
2003906-251 = "[wa:880]― [log=키사키]此処で何が起こったとて……[/log]"
2003906-252 = "[wa:3460]― [log=키사키]妾が其方を責めることは無いじゃろう。[wa:3840]……永劫にな。[/log]"
2003906-257 = "[ns] \"……。\""
2003906-259 = "[ns3] \"キサキ。\"\n[ns4] \"まだ無理しちゃダメだよ。\""
2003906-262 = "せ、先生？"
2003906-263 = "[s] \"体調が良くない生徒の世話をする。それが先生の役目だからね。\""
2003906-267 = "……そう、じゃな。"
2003906-268 = "ふふ。まさか、先生に叱られるとはな。#n新鮮な経験じゃ。"
2003906-269 = "であれば――生徒を寝かせるのも、先生の「役目」であろう？"
2003906-270 = "[s5] \"そ、そうなるのかな……！？\"\n[s6] \"えっと……寝かせるって！？\""
2003906-273 = "よもや教育者たる先生が、自身の発言を撤回したりなど……せぬよな？"
2003906-278 = "さあ、先生。妾のことは……任せたぞ。"
2003906-279 = "[s] \"うわっ！？\""
2003906-283 = "（急に距離を詰めてくるキサキを、なんとかしてベッドに連れて行った……）"
2003906-285 = "……。"
2003906-286 = "先生。"
2003906-289 = "今日は……おかげで、ゆっくり眠れそうじゃ……。"
2003906-295 = "（キサキが眠りにつくまで、ゆっくりと頭を撫でてあげた）"
2003906-296 = "（疲れていたのか、すぐに寝息が聞こえてきた）"
