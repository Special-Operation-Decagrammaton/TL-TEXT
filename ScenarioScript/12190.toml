[translation]
12190-1 = "Episódio 19; Aquilo que ela não deixou para trás (2)"
12190-2 = "Consegui confirmar a localização da Hoshino-senpai!"
12190-3 = "Ali! No subsolo daquele bunker!"
12190-4 = "……Vamos."
12190-5 = "Sim, vamos nos apressar……!"
12190-10 = "Diretor da Kaiser……!!"
12190-11 = "Que insistência……."
12190-12 = "Ah, qual é, até quando vocês vão continuar atrapalhando?!"
12190-13 = "Saiam da frente! Ou então……!"
12190-15 = "Comitê de Contramedidas…… vocês sempre foram um estorvo."
12190-16 = "Até agora, tentei todos os meios possíveis……."
12190-17 = "Mesmo assim, vocês continuaram nessa escola à beira da falência, insistindo teimosamente e tentando pagar a dívida de qualquer jeito!"
12190-18 = "Mesmo depois de tantas lições, mesmo depois de tanto sofrimento, vocês continuam agindo como se estivessem se divertindo todos os dias!!!"
12190-19 = "Por causa de vocês, o plano!!! O meu planooooo!!!!"
12190-22 = "Humpf, não importa o que alguém tão desprezível e superficial como você faça, nossos corações não vão se quebrar!!!"
12190-23 = "Nós vamos trazer a Hoshino-senpai de volta."
12190-24 = "Sim! Nós não vamos perder para um adulto patético como você! De jeito nenhum!"
12190-28 = "Iniciando combate…… Sensei, contamos com você!"
