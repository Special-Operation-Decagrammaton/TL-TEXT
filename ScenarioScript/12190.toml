[translation]
12190-1 = "第19話;それでも手放さなかったもの（２）"
12190-2 = "ホシノ先輩の位置、確認できました！"
12190-3 = "あそこです、あのバンカーの地下に！"
12190-4 = "……行こう。"
12190-5 = "はい、急ぎましょう……！"
12190-10 = "カイザーの理事……！！"
12190-11 = "しつこい……。"
12190-12 = "ああもう、どこまで邪魔すれば気が済むのよ！"
12190-13 = "どいてください！さもないと……！"
12190-15 = "対策委員会……ずっとお前たちが目障りだった。"
12190-16 = "これまで、ありとあらゆる手段を講じてきた……。"
12190-17 = "それでもお前たちは、滅びかけの学校に最後まで残り、しつこく粘って、どうにか借金を返済しようとして！"
12190-18 = "あれほど懲らしめたのに、徹底的に苦しめたのに、毎日毎日楽しそうに！！！"
12190-19 = "お前たちのせいで、計画がっ！！！私の計画があぁぁっ！！！！"
12190-22 = "ふん、あんたみたいな下劣で浅はかなやつが何をしようと、私たちの心は折れたりしないわよ！！！"
12190-23 = "ホシノ先輩を、返してもらうよ。"
12190-24 = "はい！あなたみたいな情けない大人に、私たちは負けません！絶対に！"
12190-28 = "戦闘に入ります……先生、お願いします！"
