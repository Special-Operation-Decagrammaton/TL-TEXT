[translation]
2000308-1 = "Realização da Justiça"
2000308-2 = "Trinity - Telhado"
2000308-3 = "Hmm... está um pouco mais tarde do que eu esperava. #nTenho certeza de que já deveria ser a hora de passarem por aqui..."
2000308-4 = "Mas não posso baixar a guarda. #nO momento para mirar no inimigo dura apenas um instante!"
2000308-5 = "Hã? Mesmo que seja um executivo do mal cruel e hediondo, atirar nele com uma arma é demais...?"
2000308-6 = "Fique tranquila. As balas carregadas nesta arma são balas anestésicas para fazer a pessoa dormir."
2000308-7 = "Assim que o alvo cair, pretendo contê-lo imediatamente e pedir para a veterana Tsurugi realizar o interrogatório."
2000308-10 = "— Ufa... [wa:1200] Está quente justamente hoje."
2000308-13 = "[wa:700] — Para um disparo perfeito, [wa:1700] eu consigo suportar [wa:1000] esse calor tranquilamente."
2000308-16 = "— Será que... [wa:1300] estou com cheiro de suor...?"
2000308-19 = "— Em um dia de verão como este, [wa:2000] eu sinto inveja [wa:1000] dos uniformes brancos das outras alunas."
2000308-22 = "[wa:500] — Sensei... [wa:1500] Sinto que seu olhar está um pouco indiscreto..."
2000308-24 = "— Você está mantendo o foco [wa:1000] no alvo, não está?"
2000308-27 = "(Trim, trim, trim)"
2000308-28 = "Ah, um contato do Comitê de Justiça...?"
2000308-29 = "Mashiro? #nOnde você está e o que está fazendo agora?"
2000308-30 = "Ontem, a veterana Hasumi me disse que um executivo do mercado negro passaria perto da escola... #nEstou de prontidão em um ponto de sniper nas proximidades."
2000308-31 = "Nossa, então acabou sendo uma viagem perdida..."
2000308-32 = "Hã? O que você quer dizer com isso?"
2000308-33 = "Aquele vilão, a veterana Tsurugi o capturou ontem à noite."
2000308-34 = "A veterana Tsurugi também, realizar um ataque por conta própria assim..."
2000308-35 = "Não pode ser... Então, para que eu..."
2000308-36 = "Por enquanto, gostaria que você retornasse. Bom trabalho."
2000308-37 = "Uuu... sim."
2000308-39 = "Depois disso, voltei para a escola enquanto consolava Mashiro, que estava desanimada."
