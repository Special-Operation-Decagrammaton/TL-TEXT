[translation]
2000308-1 = "正義の実現"
2000308-2 = "トリニティ・屋上"
2000308-3 = "うーん……予想より少し遅いですね。#n確かそろそろ、ここを通るタイミングのはずなのですが……。"
2000308-4 = "しかし油断はできません。#n敵を狙えるタイミングは、一瞬しかありませんから！"
2000308-5 = "え？いくら極悪非道な悪の幹部だとしても、銃で撃ち抜くのはひどすぎる……？"
2000308-6 = "ご安心ください。この銃に装填された弾丸は、人を眠らせるための麻酔弾です。"
2000308-7 = "相手が倒れたらすぐに拘束し、ツルギ先輩に取り調べをお願いする予定です。"
2000308-10 = "― ふう……[wa:1200]今日に限って暑いですね。"
2000308-13 = "[wa:700]― 完璧な狙撃のためなら、[wa:1700]これぐらいの暑さは[wa:1000]十分耐えられますが。"
2000308-16 = "― 少し……[wa:1300]汗臭かったりしないかな……？"
2000308-19 = "― こんな夏の日には、[wa:2000]他の生徒たちの[wa:1000]白い制服が羨ましいですね。"
2000308-22 = "[wa:500]― 先生……[wa:1500]なんだか視線がいやらしい気がしますが……。"
2000308-24 = "― きちんと目標を[wa:1000]注視されているんですよね？"
2000308-27 = "（プルルルル）"
2000308-28 = "あれ、正義実現委員会から連絡が……？"
2000308-29 = "マシロさん？#n今はどこで何をされているところですか？"
2000308-30 = "昨日ハスミ先輩からブラックマーケットの幹部が学園近くを通るとお聞きして……#n付近の狙撃ポイントで待機中でした。"
2000308-31 = "なんと、それでは、無駄足になってしまいましたね……。"
2000308-32 = "え？それは、どういう意味ですか？"
2000308-33 = "例の悪党、昨夜ツルギ先輩が捕まえてきたんです。"
2000308-34 = "ツルギ先輩もまったく、勝手に襲撃を敢行されるなんて……。"
2000308-35 = "そんな……それでは私は何のために……。"
2000308-36 = "とりあえず帰還をお願いできればと思います、お疲れ様です。"
2000308-37 = "うう……はい。"
2000308-39 = "その後、落ち込んだマシロを慰めながら学園に戻った。"
