[translation]
84301200500-5 = "「家出したペット（ロボット）を探しています。見かけた方はこちらまで！」……だって。"
84301200500-6 = "家出するんだ……普通の犬探しみたい。"
84301200500-7 = "そういえば「晄輪大祭」の時も、小さなロボット犬がいたね。"
84301200500-8 = "ロボットの犬に自我は存在するのか……そもそも、存在の概念を定義するものは何か。"
84301200500-9 = "ナツちゃんが難しいこと考えてる……。"
84301200500-10 = "適当言ってるだけでしょ。"
84301200500-12 = "自我……それは己と他者の関係を指すのか、#nはたまた自ら思考できる能力を指すのか……。"
84301200500-13 = "誰とも関わりを持たずにいる場合、果たして「存在している」と言えるのだろうか。#nつまり「存在」とは「繋がり」を指す？"
84301200500-14 = "自ら思考が可能だとして、その「思考」を定義するものとは？#nプログラムされた計算と思考に違いとは……？"
84301200500-15 = "いや、私たちもまた、知覚できるものをインプットして、自分に都合のいい解釈で変換された情報をアウトプットするだけのプログラムなのかもしれない……。"
84301200500-16 = "あー、また始まった。"
84301200500-22 = "（……特に関係はなさそうだが）"
84301200500-23 = "（念のため声をかけてみよう）"
84301200500-32 = "失礼……少し、話を聞かせてはもらえないだろうか。"
84301200500-34 = "ほんっと、いっつも意味わかんないことばっか言ってさ。"
84301200500-35 = "しばらく口にテープでも貼っとく？"
84301200500-40 = "……ん？"
84301200500-41 = "うわっ！？い、いつの間に……？だっ、誰？"
84301200500-45 = "驚かせるつもりは無かったのだが……今の話を詳しく聞かせてもらいたくてね。"
84301200500-46 = "ペットを探すつもりなら、先んじて予測を立てておくと良いだろう。"
84301200500-47 = "あ、ありがとう……？で、あんた誰……？"
84301200500-49 = "か、カズサちゃん……ティーパーティーのセイア様……。"
84301200500-50 = "……ティーパーティー？何それ。"
84301200500-52 = "何それ、って。"
84301200500-53 = "名前はともかく「ティーパーティー」も知らないわけ？"
84301200500-54 = "あー、ティーパーティーでしょ。はいはい。"
84301200500-58 = "……ティーパーティー！？"
84301200500-59 = "……マジ！？"
84301200500-61 = "えっ、いやっ、全然知らなくて、その……！！"
84301200500-63 = "……それはSNSを風靡する「巡礼者」。"
84301200500-64 = "従来の己を逸したソレは、何を探し求め旅立ったのか。#nあるいは単なる青春の疾走なのか。"
84301200500-65 = "他とは異なる自身……いや、そもそも「自身」とは？#n何者でもない、はたまた総てか……という話さ。"
84301200500-66 = "いや何言ってんの！？"
84301200500-67 = "……ふむ。早く見つかることを願っているよ。"
84301200500-68 = "通じるの！？"
84301200500-69 = "その「家出したペット」の行方について、他に何か情報はあるのだろうか？"
84301200500-71 = "本当に通じてるんだ……。"
84301200500-72 = "えーっと、SNS見た感じ……川の近くみたい。"
84301200500-73 = "行ってみる？見つけたら飼い主も喜ぶと思うし。"
84301200500-74 = "まあ、喜ぶとは思うけど……。"
84301200500-75 = "大丈夫なの？私たち、あんまり離れないほうがいいんでしょ？"
84301200500-76 = "んー……。"
84301200500-77 = "行こうよ！見つかるかもしれないし。"
84301200500-79 = "アイリがそう言うなら。"
84301200500-80 = "はぁ……何なのよ。"
84301200500-88 = "じー……。"
84301200500-89 = "何か……？"
84301200500-91 = "な、ナツちゃん？そんなに見つめてどうしたの？"
84301200500-98 = "……ああ。行こう。"
84301200500-100 = "えっ怖っ。何のやり取りしてたの！？"
84301200500-101 = "巡礼の道を行く者同士、言葉は不要。"
84301200500-102 = "いや別に巡礼の道行ってないんだけど！？言葉必要なんだけど！"
84301200500-104 = "あはは……。"
84301200500-105 = "たぶん、大丈夫……だよね？"
84301200500-106 = "ま、見つからなかったらすぐ帰ってくればいいでしょ。"
84301200500-107 = "何もないって。"
