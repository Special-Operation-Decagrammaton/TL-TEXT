[translation]
84301200500-5 = "「Procura-se animal de estimação (robô) que fugiu. Quem o vir, entre em contato aqui!»... dizia."
84301200500-6 = "Um robô fugindo de casa... parece até procura de cachorro comum."
84301200500-7 = "Falando nisso, durante o Festival de Halo, também tinha um cachorrinho robô, né?"
84301200500-8 = "Será que um cão robô possui consciência própria? E, antes de tudo, o que define o conceito de existência?"
84301200500-9 = "A Natsu-chan está pensando em coisas complicadas de novo..."
84301200500-10 = "Ela só está falando qualquer coisa, não é?"
84301200500-12 = "Consciência... será que ela se refere à relação entre o eu e o outro, #n ou à capacidade de pensar por conta própria...?"
84301200500-13 = "Se alguém não mantém contato com ninguém, será que podemos dizer que essa pessoa 'existe'? #n Em outras palavras, 'existência' seria o mesmo que 'conexão'?"
84301200500-14 = "Assumindo que o pensamento próprio seja possível, o que define esse 'pensamento'? #n Qual a diferença entre um cálculo programado e o pensamento...?"
84301200500-15 = "Não, talvez nós também sejamos apenas programas que recebem informações perceptíveis e as transformam em saídas interpretadas da forma que nos convém..."
84301200500-16 = "Ah, lá vem ela de novo."
84301200500-22 = "(...Não parece ter relação nenhuma, mas)"
84301200500-23 = "(Por precaução, vou tentar falar com elas)"
84301200500-32 = "Com licença... poderiam me deixar ouvir um pouco da conversa de vocês?"
84301200500-34 = "Sério, você sempre fala umas coisas que não fazem sentido nenhum."
84301200500-35 = "Quer que eu cole uma fita na sua boca por um tempo?"
84301200500-40 = "...Hm?"
84301200500-41 = "Ué!? D-desde quando você está aí...? Q-quem é você?"
84301200500-45 = "Não era minha intenção assustá-las... mas eu gostaria de ouvir mais sobre o que vocês estavam falando."
84301200500-46 = "Se pretendem procurar o animal de estimação, seria bom traçar uma previsão antes."
84301200500-47 = "Ah, obrigado...? Mas, quem é você...?"
84301200500-49 = "K-Kazusa-chan... é a Seia-sama do Tea Party..."
84301200500-50 = "...Tea Party? O que é isso?"
84301200500-52 = "Como assim, 'o que é isso'?"
84301200500-53 = "Deixando o nome de lado, você nem sabe o que é o 'Tea Party'?"
84301200500-54 = "Ah, o Tea Party, né. Tá bom, tá bom."
84301200500-58 = "...Tea Party!?"
84301200500-59 = "...Sério!?"
84301200500-61 = "Ei, não, eu não sabia de nada, tipo...!!"
84301200500-63 = "...Esse é o 'Peregrino' que está dominando as redes sociais."
84301200500-64 = "Aquele que se desviou do seu eu convencional, o que ele partiu em busca? #n Ou seria apenas uma corrida da juventude?"
84301200500-65 = "Um eu diferente dos outros... não, afinal, o que é o 'eu'? #n Seria alguém que não é nada, ou seria tudo... é disso que se trata."
84301200500-66 = "Não, do que você está falando!?"
84301200500-67 = "...Hum. Espero que o encontrem logo."
84301200500-68 = "Ela entende o que ela diz!?"
84301200500-69 = "Sobre o paradeiro desse 'animal de estimação que fugiu', vocês têm mais alguma informação?"
84301200500-71 = "Ela realmente entende..."
84301200500-72 = "Bem, pelo que vi nas redes sociais... parece ser perto do rio."
84301200500-73 = "Vamos lá dar uma olhada? Se encontrarmos, o dono deve ficar feliz."
84301200500-74 = "Bom, acho que ele ficaria feliz, mas..."
84301200500-75 = "É seguro? A gente não deveria ficar muito longe, né?"
84301200500-76 = "Hm..."
84301200500-77 = "Vamos lá! Pode ser que a gente encontre."
84301200500-79 = "Se a Airi diz, então tudo bem."
84301200500-80 = "Ah... que seja."
84301200500-88 = "Encarando..."
84301200500-89 = "Algum problema...?"
84301200500-91 = "N-Natsu-chan? Por que está encarando tanto assim?"
84301200500-98 = "...Ah. Vamos."
84301200500-100 = "Nossa, que medo. Que tipo de conversa foi essa!?"
84301200500-101 = "Entre aqueles que seguem o caminho da peregrinação, palavras são desnecessárias."
84301200500-102 = "Ei, eu não estou seguindo caminho de peregrinação nenhum!? Palavras são necessárias, sim!"
84301200500-104 = "Ahaha..."
84301200500-105 = "Provavelmente, vai ficar tudo bem... né?"
84301200500-106 = "Bem, se não encontrarmos nada, é só voltar logo, não é?"
84301200500-107 = "Não tem nada aqui."
