[translation]
2003502-1 = "Mais um treinamento (?)."
2003502-5 = "Munya... munya..."
2003502-8 = "[ns] \"...Tsubaki-san?\""
2003502-9 = "Hmm...?"
2003502-13 = "Ah, Sensei... bem-vindo... eu estava te esperando..."
2003502-14 = "[s] \"Que traje é esse...\""
2003502-15 = "Sim, este é..."
2003502-19 = "Um uniforme... para induzir a um sono agradável...!"
2003502-23 = "Guiar todos a um sono profundo, a qualquer hora e em qualquer lugar..."
2003502-24 = "É exatamente esse o meu treinamento de guia... Fuaaa..."
2003502-25 = "[s] \"Sono, guia...?\""
2003502-26 = "Sim... originalmente, eu estava fazendo um treinamento de guia...#npara orientar as pessoas que visitam Hyakkiyako..."
2003502-27 = "Eu queria que você pensasse sobre isso também, Sensei..."
2003502-28 = "Ultimamente... a falta de sono se tornou um grande problema social, não é...?"
2003502-29 = "[s] \"Foi mesmo...?\""
2003502-30 = "Sim, parece que sim..."
2003502-31 = "E então... eu pensei..."
2003502-32 = "O trabalho de um guia é... levar as pessoas a algum lugar, certo...?"
2003502-33 = "Sendo assim..."
2003502-34 = "Como chefe do Clube de Treinamento... levar as pessoas a um sono melhor..."
2003502-35 = "Também não seria um trabalho de guia...?"
2003502-36 = "[s] \"Não entendi muito bem, mas é isso que o guia de sono da Tsubaki significa...\""
2003502-37 = "Sim... é isso.#nFuaaa..."
2003502-38 = "Então, Sensei... agora eu vou te guiar por Hyakkiyako~"
2003502-39 = "Hmm? Não é um guia de sono, não é...?"
2003502-40 = "Como eu disse antes...#nOriginalmente, eu estava fazendo um treinamento... para orientar as pessoas que visitam Hyakkiyako..."
2003502-41 = "Além disso, se você se esforçar no trabalho... vai conseguir dormir profundamente..."
2003502-42 = "Isso também faz parte... do meu treinamento de guia de sono..."
2003502-46 = "Zzz..."
2003502-47 = "[ns] \"Você não pode dormir ainda!\""
2003502-53 = "[ns1] \"Você disse que ia me guiar por Hyakkiyako...\"\n[ns2] \"Mas aqui não é a sala do Clube de Treinamento...? Tsubaki-san...?\""
2003502-56 = "..."
2003502-57 = "Aqui também... é Hyakkiyako, afinal..."
2003502-61 = "...Suu."
2003502-62 = "[s3] \"Você não está errada, mas...!\"\n[s4] \"Tsubaki... acorde!\""
2003502-65 = "Hmm...?"
2003502-66 = "É verdade... eu estava guiando o Sensei..."
2003502-67 = "[s] \"Sim, eu estava pensando que ainda não tinha sido guiado...\""
2003502-68 = "..."
2003502-69 = "Ei, Sensei..."
2003502-70 = "Dizem que os humanos... passam um terço da vida dormindo..."
2003502-71 = "Se você não dorme o suficiente... resíduos se acumulam e as células cerebrais são danificadas..."
2003502-72 = "E se ficar pior...#no cérebro bloqueia todos os sentidos e entra em estado de sono forçado..."
2003502-73 = "Além disso... quando falta sono..."
2003502-77 = "A imunidade do corpo não funciona direito...#ne você acaba ficando mais suscetível a vírus e bactérias..."
2003502-78 = "[s] \"A Tsubaki está falando de coisas muito técnicas! Então isso é um guia de sono...\""
2003502-79 = "Por isso, dormir bem é... importante para você mesmo e para o Sensei, eu acho..."
2003502-80 = "Sim...#nAgora eu sou a guia de sono Kasuga Tsubaki..."
2003502-84 = "Então, Sensei...?"
2003502-85 = "Vamos dormir aqui juntos...?"
2003502-91 = "（E assim, Tsubaki deitou-se na sala do Clube de Treinamento e caiu em um sono profundo）"
2003502-92 = "（Cobri a Tsubaki com um cobertor e voltei para o Schale...）"
