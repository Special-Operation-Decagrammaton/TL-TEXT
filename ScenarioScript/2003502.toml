[translation]
2003502-1 = "また別の修行（？）"
2003502-5 = "むにゃ……むにゃ……。"
2003502-8 = "[ns] \"……ツバキさん？\""
2003502-9 = "んん……？"
2003502-13 = "あ、先生だ……いらっしゃい……待ってたよ……。"
2003502-14 = "[s] \"その格好は……\""
2003502-15 = "うん、これが……"
2003502-19 = "心地よい睡眠に誘うための……ユニフォームだよ……！"
2003502-23 = "いつでも、どこでもみんなを熟睡に導く……"
2003502-24 = "それこそが私のガイドの修行だから……。ふぁぁ……。"
2003502-25 = "[s] \"睡眠、ガイド……？\""
2003502-26 = "うん……元々はね、百鬼夜行を訪ねてくる人たちを案内するっていう……#nガイドの修行をしてたんだけど……"
2003502-27 = "先生にも、考えてみてほしいんだ……。"
2003502-28 = "最近……睡眠不足がすごく社会問題になってるでしょ……？"
2003502-29 = "[s] \"そうだったっけ……？\""
2003502-30 = "うん、そうみたいだよ……。"
2003502-31 = "それでね……思ったの……。"
2003502-32 = "ガイドの仕事って……どこかに人を導くことだよね……？"
2003502-33 = "それなら……。"
2003502-34 = "修行部の部長として……よりよい睡眠に人を導いてあげるのも……。"
2003502-35 = "ガイドの仕事になるんじゃないかなあ、って……。"
2003502-36 = "[s] \"よくわからないけど、ツバキのいう睡眠ガイドはそういう事なんだね……。\""
2003502-37 = "うん……そうなの。#nふぁぁ……。"
2003502-38 = "それじゃあ先生……今から私が百鬼夜行をガイドしてあげるね～"
2003502-39 = "ん～？睡眠ガイドじゃないよ……？"
2003502-40 = "さっきも話した通り……。#n元々は百鬼夜行を訪ねる人たちを案内する……修行をしてたんだ……。"
2003502-41 = "それに仕事を頑張ったら……ぐっすり眠れるし……。"
2003502-42 = "これも、睡眠修行ガイドの……一環なの……。"
2003502-46 = "すやすや……。"
2003502-47 = "[ns] \"まだ眠っちゃダメだよ！\""
2003502-53 = "[ns1] \"百鬼夜行をガイドしてくれるって話だったけど……。\"\n[ns2] \"ここって修行部の部室だよね……？ツバキさん……？\""
2003502-56 = "……。"
2003502-57 = "ここも……百鬼夜行だからね……。"
2003502-61 = "……すぅ。"
2003502-62 = "[s3] \"たしかに間違ってはいないけど……！\"\n[s4] \"ツバキ……起きて！\""
2003502-65 = "んん……？"
2003502-66 = "そうだった……先生を案内してるところだった……。"
2003502-67 = "[s] \"うん、まだ案内してもらってないな～って……\""
2003502-68 = "……。"
2003502-69 = "ねえ、先生……。"
2003502-70 = "人間って……人生の3分の1を睡眠に使うんだって……。"
2003502-71 = "睡眠が不足したら……老廃物が蓄積されて脳細胞が損傷していって……"
2003502-72 = "さらにひどくなると……#n脳が全ての感覚を遮断して、強制的に睡眠状態に入っちゃうの……"
2003502-73 = "それに……睡眠が不足すると……。"
2003502-77 = "体内の免疫もちゃんと働かなくなっちゃうから……#nウィルスや細菌にも感染しやすくなるらしいよ……。"
2003502-78 = "[s] \"ツバキがものすごく専門的な話をしてる！これが睡眠ガイド……\""
2003502-79 = "だからね、よく寝るのは……自分のためにも、先生のためにも、#n大事なことだと思うんだ……。"
2003502-80 = "うん……。#n今の私は睡眠ガイド[ruby=かすが]春日[/ruby]ツバキ……。"
2003502-84 = "だからね、先生……？"
2003502-85 = "一緒に、ここで寝よ……？"
2003502-91 = "（そうしてツバキは修行部の部室で横になり、ぐっすりと深い眠りについた）"
2003502-92 = "（ツバキに布団をかけてやり、シャーレに帰ってきた……）"
