[translation]
2004805-1 = "夕陽に染まる翼"
2004805-2 = "プライベートビーチ"
2004805-3 = "（意味深な連絡が気になって、ナギサを探したけれど……）"
2004805-4 = "（どこにも見当たらなかった）"
2004805-5 = "（電話もメッセージも、反応なしだ……）"
2004805-9 = "[ns] \"……あっち側は、まだ見てなかったかも。\""
2004805-12 = "（海岸沿いの道に向かうことにした）"
2004805-13 = "（しばらく探していたところ……）"
2004805-14 = "[ns] \"あれは……？\""
2004805-15 = "（ナギサの後ろ姿が見えて、足を止めた）"
2004805-17 = "海岸沿いの道路"
2004805-18 = "[ns] \"……ナギサ？\""
2004805-20 = "せ、先生？"
2004805-21 = "どうして、こんなところまで……？"
2004805-22 = "え？私が、心配で……？"
2004805-23 = "そ、それはご迷惑をおかけしました……今から帰るところでして……。"
2004805-24 = "[s] \"どこか行きたいところがあったの？\""
2004805-25 = "え？"
2004805-26 = "[s] \"それなら、付き合うよ。\""
2004805-27 = "……。"
2004805-28 = "ふふ、さすがは先生ですね。"
2004805-29 = "今の気持ちを言い当てられてしまいました……。"
2004805-30 = "嬉しいご提案ですが、お断りさせていただきます。"
2004805-31 = "少し、どこか遠くに行きたい気持ちになっただけで、特に行きたい場所は……。"
2004805-35 = "……まるで、家出少女みたいですね。"
2004805-36 = "[s] \"確かに……否定はできないかも。\""
2004805-37 = "ふふっ。"
2004805-38 = "……。"
2004805-39 = "先生、今日は休暇の最終日です。"
2004805-40 = "明日の朝には、トリニティへ帰らなくてはなりません。"
2004805-41 = "サマーベッドから起き上がり、ティーパーティーのホスト[ruby=きりふじ]桐藤[/ruby]ナギサとして、再び歩み出します。"
2004805-42 = "ですが、ふと名残惜しくなってしまいまして。"
2004805-43 = "沈みゆく太陽を追い、あてどなく散歩をしていたのです。"
2004805-44 = "明日になればいつもの私に戻りますし、決して責任を放棄するつもりはありません。 "
2004805-45 = "権利というのは、責任を守ってこそ生まれるものですからね。"
2004805-46 = "ともあれただの散歩ですから、先生が余計な心配をしないで済むように、メッセージを送ったつもりだったのですが……。"
2004805-47 = "ですが、やはり……。"
2004805-48 = "その……。"
2004805-49 = "……いえ、何でもありません。"
2004805-50 = "太陽でさえ、昇り沈む日々を繰り返しているのですから――"
2004805-51 = "こんな気まぐれは起こさず、すぐ元の私に戻るべきなのでしょう。"
2004805-52 = "[s1] \"「毎日」は繰り返されるけど……。\"\n[s2] \"決して同じ日は来ないよ。\""
2004805-58 = "確かに、おっしゃる通りですね。 "
2004805-59 = "いつも同じ時が過ぎゆくものと、思い込んでいたのかもしれません……。"
2004805-60 = "たとえ、似たような日々だったとしても――"
2004805-61 = "こうして先生が来てくださるのであれば……。"
2004805-62 = "特別な日に……なりますね。"
2004805-63 = "ふふ。"
2004805-64 = "そろそろ、帰りましょう。"
2004805-65 = "……こうして共に歩く日が、再び訪れますように。"
