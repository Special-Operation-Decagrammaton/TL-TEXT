[translation]
2000520-1 = "Chá da meia-noite"
2000520-2 = "（Embora eu tenha vindo à praia para aproveitar a folga, por algum motivo acabei atendendo aos pedidos de cidadãos em apuros por onde quer que eu passasse...）"
2000520-8 = "Cliente, por acaso..."
2000520-9 = "Você seria o famoso Sensei do Schale, o resolvedor de problemas de Kivotos, [USERNAME]...?"
2000520-10 = "[s] \"Ah, sim... acho que sim.\""
2000520-11 = "Nossa, é uma honra imensa ter o famoso Sensei [USERNAME] em nossa loja!"
2000520-12 = "Mesmo que não fosse o caso, ouvi dizer que o Sensei estava por perto e fiquei na esperança de que viesse nos visitar."
2000520-13 = "Lançamos um novo menu recentemente, mas, por algum motivo, a reação das alunas não tem sido muito boa..."
2000520-14 = "Tentei várias coisas, mas não entendo muito bem o que está na moda..."
2000520-15 = "Se não for pedir muito, eu adoraria saber a sua opinião sobre este novo menu...!"
2000520-16 = "[s] \"Se a minha opinião for útil...\""
2000520-22 = "P-por favor, me ajude...! Um grupo de alunas delinquentes na praia roubou minha carteira...!"
2000520-23 = "Todo o meu dinheiro para a comida da semana estava lá..."
2000520-24 = "Se continuar assim, vou ter que passar o resto do mês até o próximo salário comendo apenas algas secas..."
2000520-25 = "[s1] \"Espere um pouco aqui.\"\n[s2] \"Vou recuperar sua carteira agora mesmo.\""
2000520-32 = "Buááá, mana... onde você está?"
2000520-33 = "Onde eu estou? Mana..."
2000520-34 = "[s3] \"O que houve? Você se perdeu?\"\n[s4] \"Não se preocupe! Vou trazer sua irmã aqui agora mesmo.\""
2000520-45 = "（Quando percebi, já era noite, depois de ter resolvido vários incidentes que surgiram...）"
2000520-47 = "（Enquanto tentava aproveitar uma caminhada um pouco mais tarde...）"
2000520-59 = "[ns] \"H-Hifumi...?\""
2000520-60 = "Ah, Sensei? O que faz aqui a esta hora?"
2000520-61 = "Uma caminhada para mudar de ares... entendo."
2000520-62 = "Ahaha... que coincidência. Eu também estava dando uma volta de carro sozinha."
2000520-63 = "[s5] \"Dirigir a uma hora dessas...\"\n[s6] \"Não é um pouco perigoso?\""
2000520-66 = "Está tudo bem! Eu trouxe várias coisas."
2000520-67 = "O holofote do Angry Adélie para iluminar a praia escura e..."
2000520-68 = "O cobertor do Peroro-sama! Com isso, não vou sentir frio!"
2000520-69 = "E também... para o caso de ser cercada por delinquentes, munição de estilhaços para a Crusader-chan..."
2000520-70 = "[s] \"Acho que não precisava desse último...\""
2000520-71 = "Ah, tem isso também...!"
2000520-77 = "É um bule de chá para tanques, lançado em comemoração ao 1º aniversário dos Momo Friends!"
2000520-78 = "Pensei que talvez desse vontade de tomar um chá durante o passeio, então trouxe comigo."
2000520-85 = "[ns] \"Um bule de chá para tanques...?\""
2000520-86 = "Sim, tanques costumam usar água quente com frequência."
2000520-87 = "Para tomar um chá enquanto dirige, ou para fazer uma limpeza..."
2000520-88 = "E assim... para preparar um chá quando encontro o Sensei por acaso em um lugar com uma bela vista noturna..."
2000520-92 = "Sensei, posso preparar um chá rapidinho... aceitaria um pouco?"
2000520-93 = "Tomar um chá enquanto observa o mar à noite também tem seu charme."
2000520-94 = "[s] \"Claro, eu aceito.\""
2000520-95 = "Certo, vou preparar agora mesmo!"
2000520-100 = "（Depois disso, tomei um chá com a Hifumi enquanto observávamos o luar refletido no mar.）"
