[translation]
2000520-1 = "深夜のティータイム"
2000520-2 = "（せっかくの休みで海に来たものの、なぜか行く先々で困っている市民の頼みを聞くことに……）"
2000520-8 = "お客さん、ひょっとして……"
2000520-9 = "キヴォトスのフィクサーとして名高い、#nシャーレの[USERNAME]先生でしょうか……？"
2000520-10 = "[s] \"あ、はい……多分。\""
2000520-11 = "いや～、かの有名な[USERNAME]先生が当店にいらっしゃるなんて、#n本当に光栄です！"
2000520-12 = "そうでなくても先生が近くに来られたと聞いて、#n当店にいらっしゃるのではないかと期待していたんですよ。"
2000520-13 = "この度、新メニューを開始したのですが、#nなぜか生徒の反応がイマイチでして……。"
2000520-14 = "色々と試行錯誤を重ねてみたのですが、#n今ひとつ私は流行りものに疎く……。"
2000520-15 = "もし宜しければ、こちらの新メニューについて、#n先生のご意見を頂戴できると幸いなのですが……！"
2000520-16 = "[s] \"私の意見なんかでよければ……。\""
2000520-22 = "た、 助けてください……！#n海辺の不良生徒に私の財布を奪われてしまって……！"
2000520-23 = "その中に1週間分の食費が入っているのです……。"
2000520-24 = "このままだと、次の給料日までずっと乾燥ワカメを食べて過ごすことになってしまいます……。"
2000520-25 = "[s1] \"少し待っててくださいね。\"\n[s2] \"すぐに財布を取り戻してきます。\""
2000520-32 = "うわーん、お姉ちゃん～どこにいるの～"
2000520-33 = "ここどこ～お姉ちゃん～"
2000520-34 = "[s3] \"どうしたの？道に迷ったの？\"\n[s4] \"大丈夫！お姉さんをすぐ連れて来るから。\""
2000520-45 = "（押し寄せてくる様々な事件を処理していたら、いつの間にか夜になっていた……）"
2000520-47 = "（少し遅めの散歩を楽しもうとしていたところ……）"
2000520-59 = "[ns] \"ひ、ヒフミ……？\""
2000520-60 = "あれ、先生？こんな時間にどうされたんですか？"
2000520-61 = "ちょっとした気分転換のお散歩……なるほど。"
2000520-62 = "あはは……奇遇ですね。#nちょうど私も、一人でドライブしていたところなんです。"
2000520-63 = "[s5] \"こんな遅い時間にドライブは……。\"\n[s6] \"ちょっと危ないんじゃないかな？\""
2000520-66 = "大丈夫です！色々持って来ましたので。"
2000520-67 = "暗い海辺を照らしてくれるアングリーアデリーさんのサーチライトと……"
2000520-68 = "ペロロ様のブランケット！これがあれば寒くないですから！"
2000520-69 = "それと……不良に囲まれた時のために、クルセイダーちゃん用の榴散弾も――"
2000520-70 = "[s] \"最後のはなくてもよさそう……。\""
2000520-71 = "あ、これもありました……！"
2000520-77 = "モモフレンズ1周年を記念して発売された戦車用ティーポットです！"
2000520-78 = "ドライブ中にお茶したくなるかもと思って、持ってきたんです。"
2000520-85 = "[ns] \"戦車用ティーポット……？\""
2000520-86 = "はい、戦車ではお湯を使うことが多いんです。"
2000520-87 = "走行中のティータイムとか、お掃除に使ったりとか……"
2000520-88 = "こうして……夜景の美しい場所で先生に偶然会った時にお茶を淹れたり、とか……。"
2000520-92 = "先生、紅茶ならすぐにご用意できますが……#nよろしければ、いかがでしょう？"
2000520-93 = "夜の海を眺めながら楽しむティータイムも、趣があっていいものですよ。"
2000520-94 = "[s] \"うん、お願いしようかな。\""
2000520-95 = "はい、すぐに用意しますね！"
2000520-100 = "（その後、海に映る月明かりを眺めながら、ヒフミと一緒に紅茶を楽しんだ）"
