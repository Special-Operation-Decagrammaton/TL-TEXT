[translation]
83306090500-11 = "はあ、はあ、はあっ……！遅れてマジゴメン、エリカちゃん！"
83306090500-12 = "遅すぎでしょ、キララちゃん。風紀委員長と一緒に終わらせちゃったよ。"
83306090500-13 = "ごめんってば！横断歩道の前で困ってるおばあちゃんが居たから……！"
83306090500-14 = "まあ、そんなとこだろうと思ってたからいいけど。"
83306090500-15 = "てか、あたしらの当番をヒナっちが手伝ってくれたってマジ？"
83306090500-16 = "えっ、まあ……"
83306090500-17 = "え～やば！ありがと！"
83306090500-18 = "お返しに～後であたしらがいつも食べてるクレープ奢ったげる！"
83306090500-19 = "いや、そこまでしてもらう必要は……"
83306090500-20 = "え～ダメなの？お返しくらいさせてよ！"
83306090500-21 = "こういう時のキララちゃんは頑固だから、素直に受け取っといた方がいいよ。"
83306090500-22 = "……じゃあ、分かった。今度時間がある時にでも。"
83306090500-23 = "うん！約束だよ～絶対！"
