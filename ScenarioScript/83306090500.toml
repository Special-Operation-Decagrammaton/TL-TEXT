[translation]
83306090500-11 = "Haa, haa, haa...! Desculpa mesmo pelo atraso, Erika-chan!"
83306090500-12 = "Você demorou demais, Kirara-chan. Eu já terminei tudo com a ajuda da Presidente do Comitê Disciplinar."
83306090500-13 = "Eu já disse que sinto muito! Tinha uma senhora com dificuldades na faixa de pedestres..."
83306090500-14 = "Bem, eu imaginei que fosse algo assim, então tudo bem."
83306090500-15 = "Mas sério, é verdade que a Hina-cchi ajudou com o nosso turno?"
83306090500-16 = "Ah, bem..."
83306090500-17 = "Eita, que demais! Obrigada!"
83306090500-18 = "Como agradecimento, depois a gente te paga aquele crepe que a gente sempre come!"
83306090500-19 = "Não, não precisa se dar a esse trabalho..."
83306090500-20 = "Ah, não pode? Deixa a gente retribuir!"
83306090500-21 = "A Kirara-chan é teimosa nessas horas, é melhor você aceitar logo."
83306090500-22 = "...Certo, entendi. Quando eu tiver um tempo livre, então."
83306090500-23 = "Isso! É uma promessa, hein! Com certeza!"
