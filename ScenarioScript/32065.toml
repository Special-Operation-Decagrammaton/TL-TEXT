[translation]
32065-2 = "O atumーーーーー!!!"
32065-3 = "Eu queria muito tê-lo servido como sashimi, mas acabou virando tempurá..."
32065-4 = "Hmm, parece que fomos cercadas, hein★ O que faremos?"
32065-6 = "Ah! E se a gente fugir cada uma para um lado? Assim a chance de sobrevivência aumenta, não aumenta!?"
32065-11 = "Entendo, é uma ótima ideia, Junko-san★ Bem, vai depender da velocidade de cada uma, mas que vença o mais forte♪"
32065-16 = "Fufufu, é verdade. Vai depender da sorte, mas isso também é como um tempero! Então, vamos nessa!"
32065-21 = "Hã!? E-espera! Espera aí! Não me deixem para trás sozinha!?"
32065-26 = "E-eu disse para não me deixarem para trás! Buááá! Ah, vocês me pagam! Um dia eu vou me vingar de vocês, ah se vou!!"
32065-33 = "Grr, que atrevidas...! Todas, separem-se e persigam-nas!!"
32065-34 = "Sim!"
32065-36 = "Aqui é o Distrito Autônomo de Trinity! É impossível fugir de nós!"
32065-38 = "Haa, haa..."
32065-39 = "C-chegando até aqui, acho que estou a salvo, né...?"
32065-45 = "...Hã?"
32065-46 = "Ora, Junko-san..."
32065-47 = "A-Akari!? O-o que aconteceu para você estar nesse estado de exaustão!?"
32065-48 = "Bem, sendo direta... não deu certo★"
32065-53 = "Akari!?"
32065-57 = "Kuhihi... kihihihihi..."
32065-58 = "...Hã? O-o que é isso!? Um demônio...!?"
32065-60 = "Kyahahahahaaaa!!!"
32065-61 = "Aaaaaaaahhhhhhh!? Me desculpeeeeeeeeee!?"
32065-66 = "Próximo episódio: Um novo ponto de vista"
