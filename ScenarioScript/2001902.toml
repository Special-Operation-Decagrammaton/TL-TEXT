[translation]
2001902-1 = "Caso 1. É uma coelhinha, né?"
2001902-2 = "（Bate na porta com cautela）"
2001902-11 = "Ah, é o mestre!"
2001902-12 = "Pulo, pulo!"
2001902-19 = "（Será que estou cansado... a ponto de ter alucinações...）"
2001902-23 = "（Esfreguei os olhos, respirei fundo e bati na porta novamente）"
2001902-29 = "O que houve, mestre?"
2001902-30 = "Pulo, pulo!"
2001902-37 = "（Ué, outra alucinação... Preciso dormir bem hoje）"
2001902-40 = "（No momento em que pensei isso）"
2001902-41 = "Bem-vindo de volta, mestre. Estive esperando por você o tempo todo."
2001902-45 = "[ns] \"...Err, Akane?\""
2001902-46 = "Sou a Akane, a sua empregada. Esqueceu de mim?"
2001902-47 = "Pulo, pulo!"
2001902-48 = "[s] \"Pulo, pulo...?\""
2001902-49 = "Sim, porque sou uma coelhinha, afinal."
2001902-50 = "Sensei, aconteceu alguma coisa com você?"
2001902-51 = "Parece que você viu um fantasma... ou talvez tenha acontecido algo inesperado..."
2001902-52 = "Por acaso, houve algo de ruim?"
2001902-53 = "Não, é só que a carga de trabalho no Schale está pesada demais."
2001902-54 = "Mestre, não se preocupe. Hoje eu irei servi-lo ainda mais."
2001902-55 = "[s1] \"É que, bem... o traje da Akane me deixou curioso.\"\n[s2] \"Coelhinha...?\""
2001902-56 = "Como eu disse antes, uma empregada é alguém que serve. #nE o uniforme de empregada é tanto uma vestimenta para servir ao mestre quanto um traje de combate."
2001902-57 = "Como eu disse antes, uma empregada é alguém que serve. #nE o uniforme de empregada é tanto uma vestimenta para servir ao mestre quanto um traje de combate."
2001902-58 = "A coelhinha também é uma existência criada para servir."
2001902-59 = "Servir é a missão de uma empregada."
2001902-60 = "Sendo assim, uma coelhinha não é a mesma coisa que uma empregada?"
2001902-61 = "Pode ser um traje um pouco incomum, mas..."
2001902-62 = "Hoje, servirei ao Sensei com este visual."
2001902-63 = "[s3] \"Não estou entendendo nada...\"\n[s4] \"Eu vou morrer... socialmente.\""
2001902-64 = "Está tudo bem, não se preocupe."
2001902-65 = "Está tudo bem, não se preocupe."
2001902-66 = "Então, que tipo de serviço você deseja?"
2001902-67 = "Limpeza? Lavanderia? Culinária? Escolta?"
2001902-73 = "Ou talvez uma 'limpeza'?"
2001902-74 = "Como uma empregada, estou sempre preparada para qualquer situação."
2001902-75 = "[s] \"Desculpe, Akane! Lembrei de um compromisso urgente!\""
2001902-76 = "Ora, mestre?"
2001902-77 = "O que será que aconteceu? Um compromisso urgente, diz ele..."
2001902-78 = "O trabalho no Schale é realmente exaustivo..."
2001902-79 = "Sendo assim, é ainda mais necessário que eu cuide de você."
2001902-90 = "Espere, mestre!"
