[translation]
2001902-1 = "Case1. ウサギですよ？"
2001902-2 = "（慎重にドアをノックする）"
2001902-11 = "あ、ご主人様ですね！"
2001902-12 = "ぴょんぴょん！"
2001902-19 = "（疲れているのかな……幻覚が見えるような……）"
2001902-23 = "（目をこすって深呼吸をしてから、再びドアをノックした）"
2001902-29 = "どうされましたか、ご主人様？"
2001902-30 = "ぴょんぴょん！"
2001902-37 = "（あれ、また幻覚だ……今日はしっかり寝ないと）"
2001902-40 = "（そう思った瞬間）"
2001902-41 = "おかえりなさいませ、ご主人様。ずっとお待ちしておりました。"
2001902-45 = "[ns] \"……えっと、アカネ？\""
2001902-46 = "ご主人様のメイド、アカネです。お忘れですか？"
2001902-47 = "ぴょんぴょん！"
2001902-48 = "[s] \"ぴょんぴょん……？\""
2001902-49 = "はい、ウサギですからね。"
2001902-50 = "先生こそ、どうかされましたか？"
2001902-51 = "狐につままれたような……何か思わぬ出来事でもあったのでしょうか……。"
2001902-52 = "もしかして、何か良くないことでもございましたか？"
2001902-53 = "いえ、シャーレの仕事量が多すぎるからですね。"
2001902-54 = "ご主人様、ご安心ください。本日は私がより一層ご奉仕いたします。"
2001902-55 = "[s1] \"その、えっと……アカネの格好が気になって。\"\n[s2] \"バニーガール……？\""
2001902-56 = "前にも申し上げましたが、メイドはご奉仕する者です。#nそしてメイド服とはご主人様に仕える者が着る衣服でもあり、戦いの装束でもあります。"
2001902-57 = "前にも申し上げましたが、メイドはご奉仕する者です。#nそしてメイド服とはご主人様に仕える者が着る衣服でもあり、戦いの装束でもあります。"
2001902-58 = "バニーガールもまた、ご奉仕のために作られた存在です。"
2001902-59 = "ご奉仕こそがメイドの使命。"
2001902-60 = "でしたらバニーガールもメイドと同じではありませんか？"
2001902-61 = "たしかに少し変わった装いかもしれませんが……"
2001902-62 = "本日はこの姿で先生にご奉仕いたします。"
2001902-63 = "[s3] \"訳が分からない……。\"\n[s4] \"私が死にます……社会的に。\""
2001902-64 = "大丈夫ですよ、心配ご無用です。"
2001902-65 = "大丈夫ですよ、心配ご無用です。"
2001902-66 = "さあ、どんなご奉仕をお望みですか？"
2001902-67 = "掃除？洗濯？料理？護衛？"
2001902-73 = "それとも『お掃除』でしょうか？"
2001902-74 = "メイドたる者、いつ何時でも準備は万全です。"
2001902-75 = "[s] \"ごめん、アカネ！急用を思い出して！\""
2001902-76 = "あら、ご主人様？"
2001902-77 = "どうなさったんでしょうか。急用だなんて……。"
2001902-78 = "シャーレのお仕事は本当に大変なのですね……。"
2001902-79 = "でしたらなおの事、私がご奉仕して差し上げなくては。"
2001902-90 = "お待ちください、ご主人様！"
