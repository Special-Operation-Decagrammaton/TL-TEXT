[translation]
2600502-1 = "Eu não vou ceder!"
2600502-2 = "……。"
2600502-3 = "Eu sei que fui eu quem te chamei, mas você foi rápido, hein."
2600502-4 = "Humpf. Você realmente não tem nada para fazer, Sensei?"
2600502-5 = "[s1] \"É um pedido da Yoshimi, afinal.\"\n[s2] \"É que eu estou à toa mesmo...\""
2600502-6 = "……Ah, chega!!!"
2600502-7 = "Tá, tá bom! A culpa foi minha! Esse assunto acaba aqui!!"
2600502-8 = "Eu nem fiz nada ainda e já estou cansada..."
2600502-9 = "Por que eu te chamei, você pergunta? Ah, bem, é um pedido pessoal, na verdade."
2600502-10 = "Hoje, aqui neste café, vai ser lançado aquele doce limitado que eles anunciaram faz tempo."
2600502-11 = "Como sempre tem gente que tenta comprar tudo de uma vez, a loja tomou medidas preventivas."
2600502-12 = "Ou seja, cada pessoa só pode comprar um."
2600502-13 = "Isso, parece que você entendeu. Eu te chamei porque queria que você comprasse um para mim. Algum problema?"
2600502-14 = "Por que não chamei minhas amigas do clube em vez de você? Nem pensar, né!?"
2600502-15 = "É óbvio que elas também iam querer comer! Olha, Sensei, nós somos amigas e colegas de clube, mas..."
2600502-16 = "Em eventos de itens limitados assim, nós somos inimigas! Todo mundo é rival!"
2600502-17 = "[s] \"Entendi, então você me usou para isso.\""
2600502-18 = "N-não é nada disso! Por que você tem que falar desse jeito toda vez!?"
2600502-19 = "……De qualquer forma, como fui eu quem te chamei, é claro que eu vou pagar pelo que você comprar. Tudo bem?"
2600502-20 = "Próximo cliente, por favor. O que deseja pedir?"
2600502-21 = "Dois mil-folhas de coco em formato de patinha, por favor."
2600502-23 = "Certo, dois mil-folhas de coco em formato de patinha. O total é 6.800 ienes."
2600502-24 = "……S-6.800 ienes!?"
2600502-25 = "(Mentira!? É tão caro assim!?)"
2600502-26 = "(6.800 ienes significa que... espera... 3.400 ienes cada!? Não acredito! Mesmo sendo um doce limitado novo...!)"
2600502-27 = "Hum, cliente...?"
2600502-28 = "……Ah, ué... é que..."
2600502-29 = "[s](Pega o cartão e paga no lugar dela)"
2600502-30 = "……！！"
2600502-31 = "Aceitarei o cartão. Certo, aqui está. Muito obrigado."
2600502-33 = "O-o que você está fazendo!? Por que o Sensei pagou!?"
2600502-34 = "Você é o Sensei, então é por sua conta... mas, mesmo assim! Fui eu que te chamei por conveniência própria...!"
2600502-35 = "……！！"
2600502-36 = "T-tá bom... dessa vez eu aceito. Mas na próxima, eu definitivamente vou pagar."
2600502-37 = "Ouviu!? É sério, eu prometo! Entendeu!?"
2600502-38 = "[s3] \"Sim, estarei esperando.\"\n[s4] (Entrega o mil-folhas para a Yoshimi)"
2600502-39 = "………！！"
2600502-40 = "………！！"
2600502-41 = "……Ah."
2600502-42 = "……! Ah, obrigada, Sensei. Então, a gente se fala, eu vou te chamar de novo, com certeza!"
2600502-47 = "(Segurando o mil-folhas, Yoshimi sorriu alegremente e desapareceu na multidão andando apressada)"
