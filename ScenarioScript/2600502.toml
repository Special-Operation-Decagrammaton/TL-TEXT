[translation]
2600502-1 = "譲れない！"
2600502-2 = "……。"
2600502-3 = "私から呼んでおいてなんだけど、早かったわね。"
2600502-4 = "ふ～ん。本当にやることないのね、先生？"
2600502-5 = "[s1] \"他でもないヨシミの頼みだし。\"\n[s2] \"だって私、暇人だし……。\""
2600502-6 = "……ああもうっ！！！"
2600502-7 = "わ、分かった！私が悪かった！この話はこれでもう終わり！！"
2600502-8 = "まだ何もしてないのにもう疲れた……。"
2600502-9 = "どうして呼んだのって？ああ、まあ本当に個人的な頼みなんだけど。"
2600502-10 = "今日はここのカフェで、前々から予告があった新作の限定スイーツが発売されるの。"
2600502-11 = "当然買い占めようとするやつが出てくるから、お店も対策をしてる。"
2600502-12 = "つまり、一人一つしか買えないの。"
2600502-13 = "そう、察したみたいね。先生にも一つ買ってもらうおうと思って呼んだの。悪い？"
2600502-14 = "どうして部活の友達じゃなくて先生なのか？呼べるわけないでしょ！？"
2600502-15 = "あの子たちだって食べたいに決まってる！あのね、先生、もちろん私たちは普段同じ部活の仲間で友達だけど……。"
2600502-16 = "こういう限定品とかのイベントでは敵よ、敵！みんなライバルなんだから！"
2600502-17 = "[s] \"なるほど、それで私なら利用できると。\""
2600502-18 = "ち、違うってば！だから、どうしていちいちそういう風に言うのよ！！"
2600502-19 = "……とにかく、私が呼んだんだし、もちろん先生に買ってもらう分も私が払うから。いい？"
2600502-20 = "次のお客様、お待たせいたしました。ご注文はいかがなさいますか？"
2600502-21 = "新作の「にくきゅう型ココ・ミルフィーユ」を二つお願いします。"
2600502-23 = "はい、二名様でにくきゅう型ココ・ミルフィーユ2つですね。合計で6,800円です。"
2600502-24 = "……ろっ、6,800円！？"
2600502-25 = "（嘘ぉ！？こんなに高いの！？）"
2600502-26 = "（6,800円ってことは、えっと……一個3,400円！？信じらんない！いくら新作の限定スイーツだからって……！）"
2600502-27 = "えっと、お客様……？"
2600502-28 = "……あ、う……その……。"
2600502-29 = "[s]（カードを取り出して代わりに支払う）"
2600502-30 = "……！！"
2600502-31 = "カードをお預かりいたします。はい、ではこちらで。ありがとうございました。"
2600502-33 = "な、何してるの！？何で先生が払っちゃうわけ！？"
2600502-34 = "先生だし奢り……って、で、でも！私が自分の都合で呼んだのに……！"
2600502-35 = "……！！"
2600502-36 = "わ、分かった……今回は大人しくもらっておく。でも、次は絶対に私が奢るから。"
2600502-37 = "いい！？絶対だからね、絶対！分かった！？"
2600502-38 = "[s3] \"うん、楽しみにしてるね。\"\n[s4] （ミルフィーユをヨシミに渡す）"
2600502-39 = "………！！"
2600502-40 = "………！！"
2600502-41 = "……あはっ。"
2600502-42 = "……っ！あ、ありがとう、先生。じゃあまた、絶対また連絡するから！"
2600502-47 = "（ミルフィーユを持ったヨシミは、嬉しそうに笑いながら早歩きで雑踏の中に消えていった）"
