[translation]#[Texto Final. - Filipe 05/07.]
901010400420-8 = "Ah, Sensei. Bem-vindo."
901010400420-9 = "Bom trabalho hoje!"
901010400420-10 = "[s1] \"Niko, bom trabalho também!\"\n[s2] \"Vocês foram no porto de Kanezaki hoje, né?\""
901010400420-13 = "Sim. Para descobrir a verdade por trás daquele boato."
901010400420-14 = "Ouvi várias histórias, então…… pode nos ajudar a organizar as informações?"
901010400420-15 = "[s3] \"Claro.\"\n[s4] \"Tô curioso pra saber o que vocês descobriram!\""
901010400420-21 = "Parece que todas voltaram."
901010400420-22 = "Então, cada uma reporte."