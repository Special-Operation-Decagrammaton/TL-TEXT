[translation]
901010400420-8 = "Ah, Sensei. Bem-vindo."
901010400420-9 = "Bom trabalho hoje também!"
901010400420-10 = "[s1] \"Bom trabalho, Niko!\"\n[s2] \"Você foi ao Porto Kanezaki hoje, não foi?\""
901010400420-13 = "Sim. Para investigar a verdade sobre o boato de que falamos outro dia."
901010400420-14 = "Ouvi várias histórias... pode nos ajudar a organizar as informações?"
901010400420-15 = "[s3] \"Claro.\"\n[s4] \"Estou animado para saber o que você ouviu!\""
901010400420-21 = "Parece que todos voltaram."
901010400420-22 = "Então, cada um faça o seu relatório."