[translation]
10012020-1 = "第2話;もう少しそれっぽい言い訳を"
10012020-5 = "……えっ！？な、何の音？"
10012020-6 = "何かが墜落した音に聞こえたけど……。ヘリ？飛行機？"
10012020-7 = "……とりあえず、自然の音ではないわね。"
10012020-8 = "人為的な音がするって事は、人がいるって事よ。"
10012020-9 = "……ラブ隊長！？"
10012020-11 = "うふふ……面白い流れになってきたわね。"
10012020-12 = "まだ誰も見つけてないポイントだと思ってたのに……他にライバルがいたなんてね。"
10012020-13 = "今回の「リゾート狩り」は……面白くなりそう。"
10012020-14 = "うちらジャブジャブヘルメット団のターゲットに近づくネズミは……"
10012020-15 = "文字通り……。"
10012020-16 = "ひどい目に遭わせてやるわよ！"
10012020-18 = "うう……油断した……。"
10012020-19 = "ちょっとよそ見した間にいなくなるなんて……。"
10012020-20 = "[s1] \"……セリカ？\"\n[s2] \"誰を探してるの？\""
10012020-21 = "あっ、先生！ちょうど良かった。ホシノ先輩見なかった？"
10012020-22 = "あっ、先生！ちょうど良かった。ホシノ先輩見なかった？"
10012020-23 = "アヤネちゃんと先輩たちがヘリに物を取りに行ってる間、二人でちょっとこの辺を片付けようと思ったんだけど……。"
10012020-24 = "[s3] \"かくれんぼでもしてるのかな。\"\n[s4] \"ホシノを探してくればいいんだね、任せて！\""
10012020-25 = "何でちょっと楽しそうなの……。"
10012020-26 = "うん。ちょっとお願い、先生。私はまだ片付けが残ってるから。"
10012020-27 = "そんなに遠くには行ってないはずだけど……もしかしたらこの建物のどこかにいるかも。"
10012020-28 = "あ！あと、先輩を見つけたら必ず私に連絡してね。"
10012020-29 = "ホシノ先輩に頼まれたからって、代わりに片付けとかしないでよ！"
10012020-30 = "分かった？ホシノ先輩を見つけたら私に連絡！約束だからね！！"
10012020-32 = "（その後、ホシノを探しに建物の中を一周してみた）"
10012020-33 = "（一度歩いたところだったから、それほど道に迷わなかった）"
10012020-40 = "（……？）"
10012020-41 = "……ありゃ、先生。どうしてここに？"
10012020-42 = "[s5] \"……ホシノ？\"\n[s6] \"ホシノを探してたんだ。\""
10012020-43 = "えっ……おじさんを探してたの？"
10012020-44 = "何かおじさんに用事でもあった？"
10012020-45 = "あー……セリカちゃんに何も言わなかったもんね、ごめんごめん。"
10012020-46 = "うへ～……おじさん、掃除道具を探してたらこんなとこまで来ちゃってさ。"
10012020-47 = "見えるとこにいないからって、サボってると思われるなんて……おじさん、ちょっと傷ついちゃったぞ。"
10012020-48 = "それに、セリカちゃんがあんなに頑張ってるのに、おじさん一人サボるなんてできると思う？"
10012020-49 = "普段の行い……？"
10012020-50 = "うへ～……その部分をちょっとこう、なんとか……ね？"
10012020-54 = "……うん？"
10012020-55 = "ああ、さっきまで見てたもの？"
10012020-56 = "……相変わらず鋭いねぇ、先生は。"
10012020-57 = "まあ、ここには後輩たちもいないし……先生だから、まあいっか。"
10012020-58 = "なんだかちょっと、気になることがあってね。"
10012020-62 = "[ns7] \"昔のお祭りのポスター……だね。\"\n[ns8] \"アビドスにも似たようなものがあったよね。\""
10012020-63 = "……うへ。"
10012020-64 = "……うへ。"
10012020-65 = "[s] \"……ホシノ。\""
10012020-66 = "……みんなには言わないでね。"
10012020-67 = "せっかくの休暇なのに、余計なことを気にしちゃったら、楽しめなくなっちゃうからさ。"
10012020-68 = "ここまで来て楽しめないなんて、そんなの悲しいじゃん。こういうのはおじさんの領分ってわけ。"
10012020-69 = "[s] \"……。\""
10012020-70 = "……だから、そんな顔しないでってば。"
10012020-71 = "大丈夫だからさ……おじさんにどーんと任せておいてよ。ね？"
10012020-72 = "[s9] \"……とりあえず一緒に整理しようか。\"\n[s10] \"せっかくだし、ここも掃除しよっか。\""
10012020-73 = "うへ……。"
10012020-74 = "うへ……。"
10012020-75 = "嬉しいけど、わざわざそこまでしなくていいのに。"
10012020-76 = "ここは端っこの部屋だし、片付けるならセリカちゃんがいる方にしようよ。"
10012020-80 = "……………………。"
10012020-81 = "うう……分かったよ先生。いいよ、一緒にやろう。"
10012020-82 = "も～、おじさんは先生にそうやって見つめられるのが一番困るんだよ～"
10012020-83 = "そしたら掃除道具を持ってきてもらおうかな。私は先に片付けてるから。"
10012020-84 = "……逃げないから、心配しないで。"
10012020-85 = "[s] 掃除道具を取ってくる。"
10012020-90 = "（その後、ホシノと一緒に周辺を掃除した）"
10012020-92 = "（まるでリゾートが運営されているかのような、キレイな室内になった）"
10012020-93 = "へえ……こんな広いところでも、二人でなんとか掃除できるもんだねぇ。"
10012020-94 = "先生もお疲れ様。手伝ってくれてありがとね～"
10012020-95 = "[s11] \"気にしないで。大したことないから。\"\n[s12] \"ホシノ掃除得意なんだね。\""
10012020-96 = "……いつもそんな風に引き受けちゃうと、どこまでもお願いしちゃうよ？"
10012020-97 = "……いつもそんな風に引き受けちゃうと、どこまでもお願いしちゃうよ？"
10012020-98 = "うへ……でも、どこか気分がいい感じ。"
10012020-99 = "……うん、そうだね。"
10012020-100 = "アビドスとは違って、片付ければちゃんと……"
10012020-101 = "見つけた！！ここにいたのね、先輩！！"
10012020-102 = "……う、うん？"
10012020-103 = "人がちょっとよそ見してる間にこんなところに！"
10012020-104 = "私一人で片付けながら探すの、どれだけ大変だったと……！たまには先輩も……"
10012020-105 = "掃除……を……って"
10012020-106 = "……え？"
10012020-107 = "すっごく綺麗に掃除されてる……？"
10012020-108 = "[s13] \"ほとんどホシノがやってたよ。\"\n[s14] \"私はちょっと手伝っただけだよ。\""
10012020-109 = "ほ、本当に……？ホシノ先輩が……？"
10012020-110 = "ほ、本当に……？ホシノ先輩が……？"
10012020-111 = "ふっふっふ。セリカちゃんが驚いた顔も可愛いねぇ～"
10012020-112 = "ホシノ先輩……。"
10012020-113 = "うへへ……そんなに喜んでくれるなんて……ちょっと照れるね。"
10012020-114 = "どうだい、セリカちゃん……おじさんのこと、見直したかな？"
10012020-115 = "先輩……あんまり掃除得意じゃないのかなって思ってたけど……"
10012020-116 = "こんなにできるなら……どうして……"
10012020-118 = "どうして……今まで、真面目にやってくれなかったの……？"
10012020-120 = "……え？"
10012020-121 = "あれ、えっ……。"
10012020-122 = "待って……先生……もしかして今、おじさんちょっとピンチだったり……？"
10012020-123 = "[s15] \"……自業自得かも。\"\n[s16] \"頑張れ、ホシノ\""
10012020-124 = "ええっ！？ここまで来ておじさんを裏切るの……！？"
10012020-125 = "ええっ！？ここまで来ておじさんを裏切るの……！？"
10012020-126 = "自業自得よ、ホシノ先輩。"
10012020-127 = "ちょっとこっちに来て話をするわよ！"
10012020-131 = "……え？"
10012020-132 = "……ありゃ、誰か来たのかな？"
10012020-133 = "先輩たちかな。ちょうど良かった！"
10012020-134 = "みんな聞いて、ホシノ先輩が……"
10012020-140 = "え？なんだ、人……！？"
10012020-141 = "……あっ！"
10012020-143 = "……えっ？"
10012020-144 = "ここだ！ヤツらがこっちにいるぞ！！"
10012020-145 = "隊長、ここです！ヤツらを見つけました！！"
10012020-146 = "な、なに！？何事！？"
10012020-148 = "まさかうちらより早くここを見つけるなんて……"
10012020-149 = "……ふふ。"
10012020-150 = "……あんたらも「リゾートハンター」なんでしょ？その目つき……見れば分かるよ。"
10012020-151 = "……？"
10012020-152 = "……なに？"
10012020-153 = "…………何の目つき？"
10012020-154 = "なんだ、隠してる系？"
10012020-155 = "まあ、構わないけどさ。ライバルがいるなら……"
10012020-156 = "……追い出して勝ち取るのが、ここの掟だからね！"
10012020-157 = "あんたら！！武器を持て！！"
10012020-159 = "総員、戦闘準備！！"
10012020-160 = "懲らしめてやるよ！！"
10012020-168 = "……えっ？"
10012020-169 = "な、なに！？こいつら、何なの！？"
10012020-174 = "……何だか分かんないけど、話し合ってどうにかできる雰囲気じゃないね～"
10012020-175 = "じゃあ……仕方ないから、まずは……"
10012020-176 = "……よいしょっと。"
10012020-177 = "よろしくね、先生。"
