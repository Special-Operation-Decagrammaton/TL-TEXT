[translation]
10012020-1 = "Episódio 2; Uma desculpa um pouco mais convincente"
10012020-5 = "……Hã!? Q-que barulho foi esse?"
10012020-6 = "Pareceu o som de algo caindo... Um helicóptero? Um avião?"
10012020-7 = "……De qualquer forma, não é um som natural."
10012020-8 = "Se há um som artificial, significa que tem gente por perto."
10012020-9 = "……Capitã Love!?"
10012020-11 = "Ufufu... As coisas estão ficando interessantes."
10012020-12 = "Eu achei que ninguém tinha descoberto este ponto ainda... Quem diria que teríamos rivais."
10012020-13 = "Esta \"Caça ao Resort\"... vai ser bem divertida."
10012020-14 = "Os ratos que se aproximarem do alvo do nosso Bando do Capacete de Mergulho..."
10012020-15 = "Literalmente..."
10012020-16 = "Vão se arrepender amargamente!"
10012020-18 = "Ugh... baixei a guarda..."
10012020-19 = "Como ela pôde sumir só de eu desviar o olhar por um segundo..."
10012020-20 = "[s1] \"……Serika?\"\n[s2] \"Quem você está procurando?\""
10012020-21 = "Ah, Sensei! Que bom que apareceu. Você viu a Hoshino-senpai?"
10012020-22 = "Ah, Sensei! Que bom que apareceu. Você viu a Hoshino-senpai?"
10012020-23 = "Enquanto a Ayane-chan e as outras foram buscar as coisas no helicóptero, nós duas íamos dar uma organizada por aqui, mas..."
10012020-24 = "[s3] \"Será que ela está brincando de esconde-esconde?\"\n[s4] \"Vou procurar a Hoshino, pode deixar comigo!\""
10012020-25 = "Por que você parece tão animado com isso..."
10012020-26 = "Certo. Por favor, Sensei. Eu ainda tenho que terminar a limpeza."
10012020-27 = "Ela não deve ter ido muito longe... mas talvez esteja em algum lugar deste prédio."
10012020-28 = "Ah! E quando encontrar a senpai, não deixe de me avisar."
10012020-29 = "E não vá fazer a limpeza no lugar dela só porque ela pediu!"
10012020-30 = "Entendido? Se encontrar a Hoshino-senpai, me avise! É uma promessa, hein!!"
10012020-32 = "(Depois disso, dei uma volta pelo prédio procurando pela Hoshino)"
10012020-33 = "(Como eu já tinha passado por ali, não foi difícil me localizar)"
10012020-40 = "(……?)"
10012020-41 = "……Ora, Sensei. O que faz aqui?"
10012020-42 = "[s5] \"……Hoshino?\"\n[s6] \"Eu estava te procurando.\""
10012020-43 = "Hã... estava procurando por mim?"
10012020-44 = "Precisava de algo?"
10012020-45 = "Ah... eu não avisei a Serika-chan, né? Foi mal, foi mal."
10012020-46 = "Uhe~... eu estava procurando ferramentas de limpeza e acabei vindo parar aqui."
10012020-47 = "Só porque não estou à vista, acharem que estou matando tempo... isso fere os sentimentos de uma tia aqui."
10012020-48 = "Além disso, a Serika-chan está se esforçando tanto, você acha mesmo que eu ficaria aqui sem fazer nada?"
10012020-49 = "O seu histórico...?"
10012020-50 = "Uhe~... vamos deixar essa parte de lado, né?"
10012020-54 = "……Hum?"
10012020-55 = "Ah, isso que eu estava olhando?"
10012020-56 = "……Você continua perspicaz, Sensei."
10012020-57 = "Bem, as outras não estão aqui... e como é você, Sensei, acho que tudo bem."
10012020-58 = "É que tem algo que me deixou curiosa."
10012020-62 = "[ns7] \"É um cartaz de um festival antigo... né?\"\n[ns8] \"Tinha algo parecido em Abydos também.\""
10012020-63 = "……Uhe."
10012020-64 = "……Uhe."
10012020-65 = "[s] \"……Hoshino.\""
10012020-66 = "……Não conte para ninguém, tá?"
10012020-67 = "Estamos nas férias, se começarmos a nos preocupar com coisas desnecessárias, não vamos conseguir aproveitar."
10012020-68 = "Seria triste vir até aqui e não aproveitar nada. Deixe esse tipo de coisa para mim."
10012020-69 = "[s] \"……。\""
10012020-70 = "……por isso, eu disse para não ficar com essa cara."
10012020-71 = "Vai ficar tudo bem... pode deixar que o titio aqui resolve. Tá bom?"
10012020-72 = "[s9] \"……Por enquanto, vamos organizar isso juntos.\"\n[s10] \"Já que estamos aqui, vamos limpar este lugar também.\""
10012020-73 = "Uhe..."
10012020-74 = "Uhe..."
10012020-75 = "Fico feliz, mas não precisava se dar ao trabalho."
10012020-76 = "Este é um quarto isolado, se for para limpar, vamos fazer onde a Serika-chan está."
10012020-80 = "……………………。"
10012020-81 = "Uuu... entendi, Sensei. Tudo bem, vamos fazer juntos."
10012020-82 = "Ah, não... o titio aqui fica sem jeito quando você me olha desse jeito, Sensei~"
10012020-83 = "Então, que tal você buscar os materiais de limpeza? Eu vou adiantando a organização por aqui."
10012020-84 = "……Eu não vou fugir, não se preocupe."
10012020-85 = "[s] Buscar os materiais de limpeza."
10012020-90 = "（Depois disso, limpei os arredores junto com a Hoshino）"
10012020-92 = "（O ambiente ficou tão limpo que parecia um resort em pleno funcionamento）"
10012020-93 = "Hee... quem diria que nós dois conseguiríamos limpar um lugar tão grande assim."
10012020-94 = "Bom trabalho, Sensei. Obrigado por ajudar~"
10012020-95 = "[s11] \"Não se preocupe. Não foi nada demais.\"\n[s12] \"Você é boa em limpar, hein, Hoshino.\""
10012020-96 = "……Se você sempre aceitar as coisas assim, vou acabar pedindo ajuda para tudo, sabia?"
10012020-97 = "……Se você sempre aceitar as coisas assim, vou acabar pedindo ajuda para tudo, sabia?"
10012020-98 = "Uhe... mas, de alguma forma, me sinto bem."
10012020-99 = "……É, você tem razão."
10012020-100 = "Diferente de Abydos, se a gente limpar, as coisas ficam..."
10012020-101 = "Te achei!! Você estava aqui, Senpai!!"
10012020-102 = "……Ué, hã?"
10012020-103 = "Enquanto eu estava distraída por um segundo, você veio parar aqui!"
10012020-104 = "Você não faz ideia de como foi difícil procurar enquanto eu limpava sozinha...! Às vezes, você também deveria..."
10012020-105 = "Limpar... o..."
10012020-106 = "……Hã?"
10012020-107 = "Está tudo incrivelmente limpo...?"
10012020-108 = "[s13] \"Foi a Hoshino quem fez quase tudo.\"\n[s14] \"Eu só ajudei um pouco.\""
10012020-109 = "S-sério...? A Hoshino-senpai fez isso...?"
10012020-110 = "S-sério...? A Hoshino-senpai fez isso...?"
10012020-111 = "Fufu, a cara de surpresa da Serika-chan é tão fofa~"
10012020-112 = "Hoshino-senpai..."
10012020-113 = "Uhehe... ver você tão feliz assim... até me deixa sem graça."
10012020-114 = "E então, Serika-chan... mudou de opinião sobre o titio aqui?"
10012020-115 = "Senpai... eu achava que você não era muito boa com limpeza, mas..."
10012020-116 = "Se você consegue fazer tão bem assim... por que..."
10012020-118 = "Por que... você nunca fez isso direito até agora...?"
10012020-120 = "……Hã?"
10012020-121 = "Ué, ah..."
10012020-122 = "Espera... Sensei... será que o titio aqui está em apuros agora...?"
10012020-123 = "[s15] \"……Talvez seja merecido.\"\n[s16] \"Boa sorte, Hoshino.\""
10012020-124 = "Eeeh!? Você vai me trair logo agora, Sensei...!?"
10012020-125 = "Eeeh!? Você vai me trair logo agora, Sensei...!?"
10012020-126 = "Você colheu o que plantou, Hoshino-senpai."
10012020-127 = "Venha aqui agora, vamos conversar!"
10012020-131 = "……Hã?"
10012020-132 = "……Ué, será que tem alguém vindo?"
10012020-133 = "Será que são as veteranas? Que sorte!"
10012020-134 = "Pessoal, escutem, a veterana Hoshino..."
10012020-140 = "Hã? O que foi, gente...!?"
10012020-141 = "……Ah!"
10012020-143 = "……Hã?"
10012020-144 = "É aqui! Eles estão aqui!!"
10012020-145 = "Capitão, é aqui! Encontramos eles!!"
10012020-146 = "O-o quê!? O que está acontecendo!?"
10012020-148 = "Não acredito que nos encontraram antes..."
10012020-149 = "……Hehe."
10012020-150 = "……Vocês também são "Caçadores de Resort", não são? Esse olhar... dá para ver de longe."
10012020-151 = "……?"
10012020-152 = "……O quê?"
10012020-153 = "…………Que olhar?"
10012020-154 = "O quê, do tipo que esconde as coisas?"
10012020-155 = "Bem, não importa. Se temos rivais..."
10012020-156 = "……A regra aqui é expulsá-los para vencer!"
10012020-157 = "Vocês!! Peguem suas armas!!"
10012020-159 = "Todos, preparem-se para o combate!!"
10012020-160 = "Vamos dar uma lição neles!!"
10012020-168 = "……Hã?"
10012020-169 = "O-o que é isso!? Quem são essas pessoas!?"
10012020-174 = "……Não sei o que está acontecendo, mas não parece que vamos resolver isso na conversa~"
10012020-175 = "Então... não tem jeito, primeiro..."
10012020-176 = "……Vamos lá."
10012020-177 = "Conto com você, Sensei."
