[translation]
90001170-1 = "Episódio 17: Reencontro"
90001170-3 = "……Foi assim que eu te acordei novamente."
90001170-4 = "Sim. Acredito que o mérito seja principalmente da Rio."
90001170-5 = "Hmph, a segunda pessoa que mais se esforçou fui eu, seguindo as palavras da Rio."
90001170-10 = "Quando você diz algo assim, fico um pouco preocupada com a posição de todos, mas……."
90001170-11 = "Será que eu disse algo errado, Toki?#nAcho que estou correta……."
90001170-17 = "Pessoal, parece que vocês não mudaram muito desde que eu adormeci……."
90001170-18 = "[s1] \"Bem…… olá, Kei-chan.\"\n[s2] \"Faz tempo desde aquela época, não é?\""
90001170-21 = "Kei-chan!?"
90001170-22 = "Aliás, onde estamos?#nNão é como se eu conhecesse todo o ambiente de Kivotos, mas……."
90001170-23 = "……Sinto que este lugar é estranho."
90001170-24 = "Estamos em uma geleira."
90001170-25 = "Por que estamos em um lugar como este……?"
90001170-26 = "Explicarei o motivo mais tarde."
90001170-27 = "Primeiro, que tal nos apresentarmos?#nEmbora eu imagine que você já saiba sobre mim e a Rio."
90001170-28 = "S-sim……."
90001170-29 = "Muito prazer. Meu nome é Asuma Toki."
90001170-30 = "Eu já sequestrei você e a Alice antes. Paz, paz."
90001170-31 = "Isso é uma apresentação pessoal?"
90001170-32 = "Eu sou Izumimoto Eimi, prazer em conhecê-la."
90001170-33 = "……Olá.#nBem…… muito prazer, eu sou a Kei."
90001170-34 = "Na verdade, meu nome é outro, mas……."
90001170-35 = "……A Princesa me chama assim."
90001170-38 = "Obrigada por guardarem meus dados."
90001170-39 = "O chaveiro balançou bastante, mas……."
90001170-40 = "Ugh. Parece que fui colocada na ponta de um esfregão e tratada de forma descuidada……."
90001170-41 = "[s] \"I-isso não seria algum tipo de mal-entendido……?\""
90001170-42 = "Por favor, invente uma desculpa melhor……."
90001170-43 = "Eu sei um pouco sobre vocês."
90001170-44 = "A Princesa compartilhou informações comigo.#nMas, sobre mim……."
90001170-45 = "Isso é algo que você pode descobrir daqui para frente, não é?"
90001170-46 = "……É verdade."
90001170-47 = "Falando nisso, onde está a Princesa?"
90001170-48 = "[s3] \"Ah, sobre isso…….\"\n[s4] \"Tem alguém que eu quero apresentar para a Kei-chan.\""
90001170-51 = "Eu gostaria que parassem de me chamar de Kei-chan……."
90001170-55 = "Haa…… esquece. Sensei, você sempre foi assim, não é?"
90001170-56 = "Por favor, pare com essa cara……."
90001170-57 = "Então, quem são as pessoas que você quer me apresentar?"
90001170-59 = "[ns] \"Bem…….\""
90001170-65 = "Ué, uma MomoTalk do Sensei?"
90001170-69 = "……Pessoal!"
90001170-70 = "Está na hora de voltarmos!"
90001170-71 = "Hã, já?"
90001170-72 = "É verdade, Momoi!#nA Alice quer brincar mais!"
90001170-73 = "E-eu já estou cansada……."
90001170-74 = "Olha, a Yuzu disse que está cansada também.#nQuando voltarmos, o Sensei vai fazer chocolate quente!"
90001170-75 = "Chocolate quente do Sensei……?#nIsso é um item raro! Vamos voltar!"
90001170-76 = "Viu só?#nVamos logo!"
90001170-80 = "Ei. Isso não vale, irmã! Espera! Vamos, Yuzu-chan, rápido!"
90001170-81 = "Chocolate quente…… parece delicioso."
90001170-87 = "Sensei, cheguei!"
90001170-88 = "Eu queria brincar mais, mas descansar também é importante!"
90001170-89 = "[s] \"Bem-vinda. Aqui, beba enquanto ainda está quente.\""
90001170-90 = "Muito obrigada, Sensei. #nUau, que cheiro bom."
90001170-91 = "O Sensei prefere café, não é? #nMesmo assim, você se deu ao trabalho de fazer um chocolate quente... muito obrigada."
90001170-96 = "Ah~ que delícia."
90001170-102 = "Então... Alice, quer ir primeiro?"
90001170-103 = "Hm? Por que a mudança repentina...?"
90001170-104 = "Achei que seria melhor se a Alice fosse a primeira a ver."
90001170-106 = "A Alice ser a primeira...?"
90001170-107 = "Será que...!"
90001170-108 = "..."
90001170-110 = "...?"
90001170-111 = "...!"
90001170-112 = "N-não pode ser...!"
90001170-113 = "[s] \"Talvez seja exatamente isso.\""
90001170-114 = "E-eu... gostaria que o Sensei fosse comigo..."
90001170-115 = "E também..."
90001170-120 = "Por favor, segure a mão da Alice bem firme."
90001170-121 = "A Alice está tremendo agora... está difícil até de ficar de pé."
90001170-124 = "...Muito obrigada, Sensei."
90001170-138 = "...!"
90001170-139 = "...!"
90001170-140 = "............"
90001170-141 = ".............."
90001170-142 = "Kei... é você?"
90001170-143 = "Princesa..."
90001170-144 = "É realmente... você, Kei..."
90001170-145 = "Princesa, eu..."
90001170-149 = "Kei!"
90001170-150 = "Por favor, nunca mais diga que você é uma existência que deveria desaparecer."
90001170-151 = "Se é certo ou errado, essas coisas não importam."
90001170-152 = "Isso é..."
90001170-153 = "Eu te peço. #nA Alice está tão feliz agora que nem consegue colocar em palavras."
90001170-154 = "...Eu pude encontrar a Kei de novo."
90001170-155 = "Ainda não consigo acreditar que estamos conversando."
90001170-156 = "Muito obrigada, Kei."
90001170-157 = "Estou tão feliz que você tenha voltado assim..."
90001170-158 = "Por isso, nunca mais, nunca mais..."
90001170-159 = "Snif, uuu..."
90001170-160 = "...Sim, Princesa."
90001170-161 = "Eu estou bem."
90001170-163 = "...Muito obrigada mesmo."
90001170-164 = "Você realizou o desejo da Alice e me permitiu encontrar a Kei... não sei como agradecer."
90001170-166 = "Só de ver a Alice feliz, já é o suficiente."
90001170-167 = "Sim. Além disso, a existência da Kei é a prova de que minha teoria estava correta. Não preciso de mais nada."
90001170-168 = "Rio, você..."
90001170-169 = "...Eu disse algo estranho?"
90001170-170 = "É verdade que foi você quem trouxe a Kei de volta, mas... ah."
90001170-175 = "Tcharam! Momoi chegou!"
90001170-176 = "Ah, é você."
90001170-177 = "Ei, irmã mais velha!?"
90001170-178 = "De-desculpe... eu tentei impedir, mas..."
90001170-180 = "Daquela vez, como você se atreveu a me derrotar!#nAchou mesmo que eu tinha esquecido!?"
90001170-182 = "Não, eu me lembro. #nAcho que este seria o momento de pedir desculpas, mas..."
90001170-183 = "É um pouco irritante ter que fazer isso com você. Saiba Momoi."
90001170-184 = "[s] \"Kei-chan!?\""
90001170-185 = "Ke-Kei!?"
90001170-186 = "Ho... e qual seria o motivo?"
90001170-188 = "――É porque você está sendo uma má influência para a princesa!"
90001170-189 = "[s] \"...Isso é...\""
90001170-190 = "Ah..."
90001170-191 = "Deixando a princesa jogar até tarde e indo dormir antes dela!"
90001170-192 = "Is-isso é porque somos o Clube de Desenvolvimento de Jogos...!"
90001170-193 = "Dando refrigerante para ela e não a deixando escovar os dentes!"
90001170-194 = "...Será que nem o refrigerante zero serve?"
90001170-195 = "E o que é aquilo, que tipo de dieta é aquela!? Você não pensa na saúde dela, não é!?"
90001170-196 = "Uuu, é que eu não gosto muito de vegetais..."
90001170-197 = "Pelo bem de vocês, cuidem melhor dos seus hábitos de vida!"
90001170-198 = "Cuidem melhor dos seus próprios corpos!#nSério, chega...! Haa... haa..."
90001170-199 = "Você não deveria precisar respirar, mas... talvez seja melhor aumentar a potência do seu sistema de resfriamento?"
90001170-204 = "Esse seu jeito de falar! Você é menos delicada do que eu, que não passo de um monte de dados!#nÉ exatamente por isso, Tsukatsuki Rio!"
90001170-205 = "Ke-Kei!?"
90001170-206 = "Uuu! Desculpe, Rio-senpai! A Kei não fez nada de errado!#nA culpa é toda da Alice! Por favor, não fique brava com ela!"
90001170-208 = "Minha princesa..."
90001170-209 = "Não se preocupe. #nParece que houve um ruído no circuito de pensamento da Kei. Vou identificar a causa."
90001170-211 = "...Ainda bem que a presidente tem esse tipo de personalidade."
90001170-213 = "Então... por que fui chamada?"
90001170-214 = "Bom, isso me poupa o trabalho de chegar ao ponto principal. #nSerei direta――"
90001170-218 = "――Eu quero que você e a Alice destruam a \"Barreira Multidimensional\" mais uma vez."
90001170-219 = "Rio, você precisa explicar a situação com mais detalhes...!"
90001170-220 = "Espere um pouco. O que você disse agora...?"
90001170-221 = "Barreira Multidimensional...?#nPor que estamos falando disso de novo?"
90001170-222 = "[s5] \"Pode ser um pouco longo, mas...\"\n[s6] \"Considerem isso uma revisão, pessoal.\""
90001170-225 = "Entendido, Sensei. #nVou tirar uma soneca por um tempo, então me chame quando terminar."
90001170-226 = "...Fique acordada, por favor."
90001170-227 = "Não se preocupe. Dada a minha relação com o Sensei, não há problema algum."
90001170-228 = "To-Toki-san, o que exatamente você quer dizer com isso!?"
90001170-230 = "(Depois de acalmar o ambiente agitado...)"
90001170-231 = "(Expliquei para a Kei, ponto por ponto, tudo o que aconteceu até agora)"
90001170-236 = "Em outras palavras..."
90001170-237 = "Como eu disse antes, quero que você e a Alice destruam a \"Barreira Multidimensional\"."
90001170-238 = "Desta vez, não é como da última, em que todo o Kivotos estava em perigo――"
90001170-239 = "Eu recuso."
90001170-240 = "!?"
90001170-241 = "!?"
90001170-242 = "..."
90001170-250 = "Lamber... esse é o gosto de alguém que afirma que algo está faltando."
90001170-251 = "Por que você começou a falar de gosto de repente...?"
90001170-252 = "É uma expressão que aprendi nos documentos que estavam na sala do C&C."
90001170-253 = "……Não entendo bem o que você quer dizer."
90001170-254 = "Vamos voltar ao assunto."
90001170-255 = "Destruir a \"Barreira Multidimensional\" foi como uma aposta de baixa probabilidade, arriscando a vida da princesa."
90001170-256 = "Naquela época, tivemos apenas sorte."
90001170-257 = "……Já que tudo terminou apenas com o meu sacrifício."
90001170-259 = "Hã!?"
90001170-260 = "O que você quer dizer com isso!?"
90001170-261 = "A, a Alice-chan e a Kei-chan...!?"
90001170-263 = "Até você a chama de Kei-chan..."
90001170-264 = "……Poderia nos explicar os detalhes?"
90001170-265 = "Sim. É algo que precisaria ser dito eventualmente."
90001170-267 = "(Kei explicou em um tom calmo o que aconteceu com ela e Alice na nave principal de Utnapishtim)"
90001170-268 = "(Todos que ouviram ficaram...)"
90001170-270 = "Uwaaa, Alice, me desculpa! Eu não sabia que tinha acontecido isso...!"
90001170-271 = "Alice-chan, Kei-chan..."
90001170-272 = "Snif, ugh..."
90001170-274 = "Nós fomos imprudentes. Me desculpe, Kei. #nSe soubéssemos disso..."
90001170-275 = "Não, está tudo bem. #nNão havia como vocês saberem."
90001170-276 = "A ignorância não é um crime. O problema é cometer uma tolice mesmo sabendo das consequências."
90001170-277 = "……Princesa."
90001170-278 = "S-sim!?"
90001170-279 = "Por que você aceitou?"
90001170-280 = "Você deveria ter entendido o significado disso."
90001170-281 = "……É verdade. #nMe desculpe, Kei."
90001170-282 = "De fato, a Alice sabia. #nMas eu não queria preocupar mais ninguém."
90001170-283 = "Mas, se algo tivesse acontecido com você durante o processo—"
90001170-284 = "Não se preocupe, Kei."
90001170-289 = "Desde que tenhamos coragem e amizade, tudo ficará bem!"
90001170-290 = "Rio-senpai, Himari-senpai, Eimi, Toki, todos do Clube de Desenvolvimento de Jogos..."
90001170-291 = "Além disso, o Sensei está conosco!"
90001170-292 = "Não, isso é..."
90001170-293 = "Não é nada. A princesa não tem culpa... a conclusão de que—"
90001170-294 = "Tudo é responsabilidade do Sensei!"
90001170-295 = "[s] \"Por quê!?\""
90001170-296 = "Porque ele deu esperanças desnecessárias à princesa!"
90001170-297 = "[s] \"Eeeh!?\""
90001170-301 = "Qualquer um que cause dano à princesa é um inimigo!"
90001170-302 = "Acalme-se, Kei!"
90001170-304 = "A destruição da \"Barreira Multidimensional\" tornou-se inviável."
90001170-305 = "……Mas a situação de que a barreira ainda permanece não mudou."
90001170-306 = "É verdade... vamos discutir o que devemos fazer a partir de agora."
90001170-308 = "Fiquei curiosa... qual é o problema com a \"Barreira Multidimensional\" e a existência do Profeta?"
90001170-310 = "Isso é..."
90001170-314 = "……De fato?"
90001170-315 = "……!"
90001170-317 = "Parece que você percebeu."
90001170-318 = "O Profeta está apenas escondido em sua concha. #nNão importa o que ele faça lá dentro, não está afetando Kivotos."
90001170-319 = "Hum... tipo um caracol ou uma tartaruga escondida na concha com medo?"
90001170-320 = "Um bom exemplo. Claro, o que ele está fazendo nos bastidores é algo que nos preocupa."
90001170-321 = "Até que haja algum movimento, acho que basta apenas ficarmos em alerta."
90001170-322 = "É verdade... eu estava pensando que precisávamos lidar com isso de alguma forma. #nMas, no fim das contas, eles não estão nos atacando, não é?"
90001170-323 = "Entendo por que você não chegou a essa conclusão. #nA ocorrência da \"Barreira Multidimensional\" no passado foi, sem dúvida, uma crise para Kivotos."
90001170-324 = "Como ela reapareceu, é natural que estejamos em alerta."
90001170-325 = "Afinal, os seres humanos são criaturas que aprendem com as experiências do passado."
90001170-327 = "Sim, concordo. Acho que essas são palavras muito sábias, mas..."
90001170-328 = "...o que devemos fazer a partir de agora?"
90001170-333 = "……."
90001170-334 = "……."
90001170-336 = "...Que tal jogarmos \"Tales Saga Chronicle\" todos juntos?"
90001170-337 = "Eu prefiro morrer a fazer isso!"
90001170-338 = "Talvez, se você tentar jogar de novo, tenha uma impressão diferente..."
90001170-339 = "Impossível! A Princesa sabe muito bem disso!"
90001170-340 = "B-bem, isso é verdade, mas..."
90001170-342 = "Decidir o rumo que tomaremos daqui para frente é importante."
90001170-343 = "É verdade... por enquanto, que tal construirmos um corpo para a Kei?"
90001170-348 = "...Sim?"
90001170-349 = "Sim...?"
90001170-350 = "Espere um pouco, por que a conversa tomou esse rumo!?"
90001170-351 = "As emoções não podem ser processadas apenas pelo cérebro. #nSe continuarmos assim, a insatisfação vai se acumular e não conseguiremos mais conversar. Um corpo físico é essencial para extravasar."
90001170-352 = "Entendo... de fato, se a Kei ficar emocional demais, a comunicação se tornará impossível. #nUma análise racional, Rio."
90001170-353 = "[s] \"Pensando bem, é verdade.\""
90001170-354 = "Agradeço pela compreensão rápida."
90001170-356 = "Não tomem decisões por mim..."
90001170-357 = "Para começar, o fato de a Rio estar participando dessa conversa já me deixa muito inquieta."
90001170-359 = "Como vamos construir o corpo da Kei?"
90001170-360 = "Como trouxe os AMAS comigo, não faltarão peças de reposição e estruturas básicas. #nDeixe isso comigo."
90001170-362 = "Por isso, escutem o que eu tenho a dizer!"
90001170-364 = "Qual dos AMAS você pretende usar?"
90001170-365 = "Não se preocupe. Apenas confie no senso único da Rio."
90001170-367 = "A expressão \"único\" também pode ter conotações negativas, sabia!?"
90001170-368 = "Vocês também sabem disso, não sabem!?"
90001170-373 = "Hii!?"
90001170-375 = "...Vocês vão mesmo construir um corpo para a Kei?"
90001170-376 = "A Alice... vai poder tocar na Kei...?"
90001170-377 = "P-Princesa!?"
90001170-379 = "Sim, eu sei que pode haver muitas incertezas, mas..."
90001170-385 = "Confie em mim, Alice."
90001170-386 = "Obrigada, Rio-senpai! Himari-senpai!"
90001170-387 = "Sim, faremos o nosso melhor."
90001170-388 = "Eu estou dizendo para me ajudarem logo!"
90001170-389 = "[s] \"Todos estão tentando ajudar a Kei.\""
90001170-390 = "Eu gostaria que ouvissem a opinião de quem está sendo ajudado!?"
90001170-391 = "Poderia ficar de olho para que ela não use a racionalidade como desculpa para impor seu senso estético!?"
90001170-395 = "[ns] \"É perigoso se você se mexer mais que isso...\""
90001170-399 = "Aaaaaah!"
90001170-403 = "Próximo episódio: Amanhecer"
