[translation]
90001170-1 = "第17話;再会"
90001170-3 = "……それで、あなたを再び起こしたの。"
90001170-4 = "はい。特にリオ様の功績が大きいかと。"
90001170-5 = "ふんす、2番目に頑張ったのはリオ様の言葉に従った私です。"
90001170-10 = "貴女がそこまで言うと、みんなの立場が少し心配になりますが……。"
90001170-11 = "トキは何か間違ったことでも言ったかしら？#n正しいと思うのだけれど……。"
90001170-17 = "みなさん、私が眠りについた時とあまり変わっていないようですね……。"
90001170-18 = "[s1] \"えっと……こんにちは、ケイちゃん。\"\n[s2] \"あの時以来だよね？\""
90001170-21 = "ケイちゃん！？"
90001170-22 = "というか、ここはどこですか？#nキヴォトスの環境を全て把握しているわけではありませんが……。"
90001170-23 = "……どこか異質な感じがします。"
90001170-24 = "ここは氷河よ。"
90001170-25 = "なぜこんなところに……？"
90001170-26 = "理由については後ほど。"
90001170-27 = "まずは自己紹介からしましょうか？#n私とリオのことは、すでに知っているとは思いますが。"
90001170-28 = "は、はい……。"
90001170-29 = "はじめまして。私は[ruby=あすま]飛鳥馬[/ruby]トキと申します。"
90001170-30 = "あなたとアリスを拉致したこともあります。ピース、ピース。"
90001170-31 = "それ、自己紹介なんですか？"
90001170-32 = "私は[ruby=いずみもと]和泉元[/ruby]エイミ、よろしくね。"
90001170-33 = "……こんにちは。#nえっと……はじめまして、ケイです。"
90001170-34 = "本当は、違う名前ですが……。"
90001170-35 = "……王女が、そう呼ぶので。"
90001170-38 = "私のデータを保管してくださって、ありがとうございました。"
90001170-39 = "キーホルダーの中はよく揺れましたが……。"
90001170-40 = "うっ。モップの先につけられて、粗雑に扱われていたような……。"
90001170-41 = "[s] \"そ、それは何かの誤解じゃないかな……？\""
90001170-42 = "もっとマシな言い訳をしてください……。"
90001170-43 = "あなたたちのことは多少知っています。"
90001170-44 = "王女から情報を共有してもらっていたので。#nですが、私に関する情報は……。"
90001170-45 = "それは、これから知っていけば良いではありませんか。"
90001170-46 = "……そうですね。"
90001170-47 = "そういえば、王女はどちらに？"
90001170-48 = "[s3] \"そうだ、それなんだけど……。\"\n[s4] \"ケイちゃんに紹介したい子がいるんだ。\""
90001170-51 = "ケイちゃん呼びをやめてほしいのですが……。"
90001170-55 = "はぁ……何でもありません。[USERNAME]先生は、こういう人でしたね。"
90001170-56 = "その顔やめてください……。"
90001170-57 = "それで、紹介したい方々というのは？"
90001170-59 = "[ns] \"えっと……。\""
90001170-65 = "あれ、先生からモモトーク？"
90001170-69 = "……みんな！"
90001170-70 = "そろそろ戻ろう！"
90001170-71 = "え、もう？"
90001170-72 = "そうですよ、モモイ！#nアリスはもっと遊びたいです！"
90001170-73 = "わ、わたしは、もう疲れた……。"
90001170-74 = "ほら、ユズも疲れたって言ってるじゃん。#n戻ったら、先生がココアを作ってくれるって！"
90001170-75 = "先生のココア……？#nそれはレアアイテムですね！戻ります！"
90001170-76 = "でしょ？#n早く行こう！"
90001170-80 = "えっ。ずるいよ、お姉ちゃん！待って！ほら、ユズちゃんも早く！"
90001170-81 = "ココア……美味しそう。"
90001170-87 = "先生、ただいま！"
90001170-88 = "もっと遊びたかったですが、回復も大事ですから！"
90001170-89 = "[s] \"おかえり。はい、冷めないうちに飲んでね。\""
90001170-90 = "ありがとうございます、先生。#nわぁ、良い香りがします。"
90001170-91 = "先生はコーヒーなんですね。#nそれなのに、わざわざココアを……ありがとうございます。"
90001170-96 = "はぁ～美味しい。"
90001170-102 = "それじゃ……アリス、先に入る？"
90001170-103 = "うん？急にどうしたんですか……？"
90001170-104 = "アリスが一番に会った方がいいかなって。"
90001170-106 = "アリスちゃんが一番に……？"
90001170-107 = "もしかして……！"
90001170-108 = "……。"
90001170-110 = "……？"
90001170-111 = "……！"
90001170-112 = "ま、まさか……！"
90001170-113 = "[s] \"その、まさかかも。\""
90001170-114 = "その……先生も一緒に行ってほしいです……。"
90001170-115 = "それと……。"
90001170-120 = "アリスの手を、しっかり握っていてください。"
90001170-121 = "アリスは今、体が震えて……まっすぐ立っているのも難しくて。"
90001170-124 = "……ありがとうございます、先生。"
90001170-138 = "……！"
90001170-139 = "……！"
90001170-140 = "…………。"
90001170-141 = "………………。"
90001170-142 = "け……ケイ、ですか？"
90001170-143 = "王女……。"
90001170-144 = "ほんとうに……ケイ、なんですね……。"
90001170-145 = "王女よ、私は……。"
90001170-149 = "ケイ！"
90001170-150 = "消えるべき存在だなんて、二度と言わないでください。"
90001170-151 = "正しいとか、正しくないとか、そんなものは関係ありません。"
90001170-152 = "それは……。"
90001170-153 = "お願いです。#nアリスは今、言葉にできないくらい嬉しいです。"
90001170-154 = "……ケイと、また会えました。"
90001170-155 = "お話できているだなんて、まだ信じられません。"
90001170-156 = "ありがとうございます、ケイ。"
90001170-157 = "こうして、帰ってきてくれて……本当に嬉しいんです。"
90001170-158 = "だからもう二度と、二度と……。"
90001170-159 = "うっ、うぅっ……。"
90001170-160 = "……はい、王女。"
90001170-161 = "私は、大丈夫です。"
90001170-163 = "……本当に、ありがとうございました。"
90001170-164 = "アリスのお願いを叶えて、こうしてケイに会わせてもらって……どうお礼を伝えれば良いのか分かりません。"
90001170-166 = "アリスが喜ぶ姿が見られただけで、十分ですよ。"
90001170-167 = "ええ。それに、ケイの存在は私の理論が正しかったという証左だもの。これ以上は必要ないわ。"
90001170-168 = "リオ、あなた……。"
90001170-169 = "……何かおかしなことを言ったかしら。"
90001170-170 = "ケイを生き返らせたのはたしかにあなたですが……はぁ。"
90001170-175 = "じゃじゃーん！モモイ登場！"
90001170-176 = "あっ、あなたは。"
90001170-177 = "ちょっとお姉ちゃん！？"
90001170-178 = "ご、ごめんなさい……止めようとしたんだけど……"
90001170-180 = "あの時は、よくも私を倒してくれたね！#n忘れたとでも思った！？"
90001170-182 = "いえ、覚えています。#nここは謝るところだとは思いますが……。"
90001170-183 = "あなたに……そうするのはなんだか癪です。[ruby=さいば]才羽[/ruby]モモイ。"
90001170-184 = "[s] \"ケイちゃん！？\""
90001170-185 = "け、ケイ！？"
90001170-186 = "ほう……その心は？"
90001170-188 = "――あなたが王女に悪影響を与えているからです！"
90001170-189 = "[s] \"……それは。\""
90001170-190 = "あっ……。"
90001170-191 = "王女に深夜までゲームをさせておいて、先に眠ったり！"
90001170-192 = "そ、それはゲーム開発部だから……！"
90001170-193 = "コーラを飲ませておいて、歯磨きをさせなかったり！"
90001170-194 = "……ゼロカロリーコーラでもダメかな。"
90001170-195 = "それに何ですか、あの食生活は！？健康を考えていませんよね！？"
90001170-196 = "ううぅ、野菜はあまり好きじゃないから……。"
90001170-197 = "あなたたちのためにも、生活習慣を大切にしてください！"
90001170-198 = "もっと自分の身体を大事にしてください！#n本当に、もう……！はぁ……はぁ……。"
90001170-199 = "今の貴女に、呼吸は必要ないはずなのだけれど……冷却装置の出力を上げた方が良いかしら？"
90001170-204 = "その言い方！ただのデータに過ぎない私よりもデリカシーがありませんよね！#nそういうところですよ[ruby=つかつき]調月[/ruby]リオ！"
90001170-205 = "け、ケイ！？"
90001170-206 = "うぅ！すみません、リオ先輩！ケイは何も悪くありません！#n全部アリスが悪いんです！怒らないであげてください！"
90001170-208 = "王女よ……。"
90001170-209 = "気にしないでちょうだい。#nケイの思考回路にノイズが発生したのね。原因を特定してみるわ。"
90001170-211 = "……会長がこういう性格で助かった。"
90001170-213 = "それで……なぜ私は呼ばれたのですか？"
90001170-214 = "本題に入る手間が省けて助かるわ。#n単刀直入に言うのだけれど――"
90001170-218 = "――貴女とアリスに、もう一度「多次元バリア」を破壊してほしいの。"
90001170-219 = "リオ、もう少し詳しく事情を説明しないと……！"
90001170-220 = "待ってください。今、なんと……？"
90001170-221 = "多次元バリア……？#nどうしてまたその話になっているのですか？"
90001170-222 = "[s5] \"少し長くなるかもしれないけど……。\"\n[s6] \"みんなは復習だと思って聞いてね。\""
90001170-225 = "分かりました、先生。#n私はしばらく寝ていますので、話が終わったら呼んでください。"
90001170-226 = "……ちゃんと起きてて。"
90001170-227 = "大丈夫です。私と先生の仲ですから何の問題もありません。"
90001170-228 = "と、トキさん、それは一体どういう意味ですか！？"
90001170-230 = "（騒がしくなった場を落ち着かせてから……）"
90001170-231 = "（今まで起きた出来事をケイに一つずつ説明した）"
90001170-236 = "つまり……。"
90001170-237 = "先ほどの繰り返しになるのだけれど、貴女とアリスに「多次元バリア」を破壊してほしいの。"
90001170-238 = "今回は前回のようにキヴォトス全体が危機に瀕しているわけでは――"
90001170-239 = "お断りします。"
90001170-240 = "！？"
90001170-241 = "！？"
90001170-242 = "……。"
90001170-250 = "ぺろっ……これは、何かが欠落していると主張する味ですね。"
90001170-251 = "どうして急に味の話を……？"
90001170-252 = "C&Cの部室に置かれていた資料で知った表現です。"
90001170-253 = "……何を言っているのかよく分かりませんが。"
90001170-254 = "話を戻しましょう。"
90001170-255 = "「多次元バリア」の破壊は、王女の命をベットして行う勝率の低い賭けのようなもの。"
90001170-256 = "あの時は、ただ運が良かっただけです。"
90001170-257 = "……私の犠牲だけで済んだのですから。"
90001170-259 = "え！？"
90001170-260 = "どういうこと！？"
90001170-261 = "あ、アリスちゃんとケイちゃんが……！？"
90001170-263 = "あなたまでケイちゃんと呼ぶのですか……。"
90001170-264 = "……詳細を説明してもらえるかしら？"
90001170-265 = "そうですね。いつかは話さなければならないことですし。"
90001170-267 = "（ケイは落ち着いた口調で、ウトナピシュティムの[ruby=もとぶね]本船[/ruby]で自分とアリスに起きたことについて話した）"
90001170-268 = "（それを聞いたみんなは……）"
90001170-270 = "うわーん、アリス、ごめんね！そんなことになってたなんて……！"
90001170-271 = "アリスちゃん、ケイちゃん……。"
90001170-272 = "うっ、ううっ。"
90001170-274 = "私たちの考えが軽率でしたね。ごめんなさい、ケイ。#nそうだと知っていたら……。"
90001170-275 = "いえ、大丈夫です。#n知る方法などなかったでしょうから。"
90001170-276 = "無知は罪ではありません。知ったうえで愚行に及ぶのは問題だと思いますが。"
90001170-277 = "……王女よ。"
90001170-278 = "は、はい！？"
90001170-279 = "なぜ、受け入れたのですか？"
90001170-280 = "あなたはこの意味を理解していたはずです。"
90001170-281 = "……そうですね。#nごめんなさい、ケイ。"
90001170-282 = "たしかに、アリスは知っていました。#nでも、これ以上心配をかけたくなかったのです。"
90001170-283 = "しかし、その過程であなたの身に何かあったら――"
90001170-284 = "心配いりません、ケイ。"
90001170-289 = "勇気と友情さえあれば大丈夫です！"
90001170-290 = "リオ先輩、ヒマリ先輩、エイミ、トキ、ゲーム開発部のみんな……。"
90001170-291 = "それに、先生が一緒にいてくれますから！"
90001170-292 = "いえ、それは……。"
90001170-293 = "何でもありません。王女は悪くない……その結論に至ったのは――"
90001170-294 = "全て先生の責任ですから！"
90001170-295 = "[s] \"なんで！？\""
90001170-296 = "王女に余計な希望を与えたからです！"
90001170-297 = "[s] \"ええっ！？\""
90001170-301 = "王女に害を与えるものは、全て悪です！"
90001170-302 = "落ち着いてください、ケイ！"
90001170-304 = "「多次元バリア」の破壊は現実的ではなくなりました。"
90001170-305 = "……ですが、依然としてバリアが残っている状況は変わりません。"
90001170-306 = "そうね……これから何をすべきかを話し合いましょう。"
90001170-308 = "気になったのですが……「多次元バリア」と預言者の存在の、何が問題になっているのですか？"
90001170-310 = "それは……。"
90001170-314 = "……たしかに？"
90001170-315 = "……！"
90001170-317 = "気づいたようですね。"
90001170-318 = "預言者は殻に閉じこもっているだけです。#n中で何をしようとも、キヴォトスに影響は与えていません。"
90001170-319 = "えっと……殻の中に隠れて怯えてるカタツムリやカメ的な感じ？"
90001170-320 = "良い例えです。もちろん、裏で何をしているのかは気になるところですが。"
90001170-321 = "動きがあるまでは、警戒するだけで良いのではないでしょうか。"
90001170-322 = "そうだね……どうにか対処しなくちゃって思ってたけど。#n別に、攻撃してきているわけじゃないもんね。"
90001170-323 = "その発想に至らないのも理解できます。#n過去に起きた「多次元バリア」の発生は、間違いなくキヴォトスの危機でした。"
90001170-324 = "それが再び現れたのですから、警戒して当然です。"
90001170-325 = "人は過去の経験を教訓とする生き物ですから。"
90001170-327 = "そうですね。それはとても良い言葉だと思いますが……。"
90001170-328 = "……これから何をすれば良いのでしょう？"
90001170-333 = "……。"
90001170-334 = "……。"
90001170-336 = "……みんなで『テイルズ・サガ・クロニクル』でもプレイしますか？"
90001170-337 = "私は死んでも嫌です！"
90001170-338 = "もう一度やってみたら、違う感想が出てくるかもしれません……。"
90001170-339 = "あり得ません、王女はよくご存知でしょう！"
90001170-340 = "そ、それはそうですが……。"
90001170-342 = "今後の方針を決めるのは重要よ。"
90001170-343 = "そうね……ひとまず、ケイの身体を作りましょうか。"
90001170-348 = "……はい？"
90001170-349 = "はい……？"
90001170-350 = "ちょっと待ってください、どうしてそんな流れになるのですか！？"
90001170-351 = "感情は脳だけで処理しきれないもの。#nこのままでは、不満が積もって会話にならなくなってしまうわ。発散するための肉体は必要不可欠よ。"
90001170-352 = "なるほど……たしかに、ケイが感情的になりすぎてしまえば、会話が成立しなくなる。#n合理的な分析ですね、リオ。"
90001170-353 = "[s] \"言われてみれば、たしかに。\""
90001170-354 = "迅速な理解に感謝するわ。"
90001170-356 = "勝手に話を進めないでください……。"
90001170-357 = "そもそも、この話題にリオが参加していること自体、とても不安なのですが。"
90001170-359 = "ケイの身体は、どのように作りましょうか？"
90001170-360 = "ちょうどAMASを連れてきているし、スペアパーツと素体には困らないと思うわ。#nここは私に任せてちょうだい。"
90001170-362 = "だから、私の話を聞いてください！"
90001170-364 = "どのAMASを使うつもりなの？"
90001170-365 = "ご心配なく。リオ様の唯一無二のセンスを信じてください。"
90001170-367 = "唯一無二という表現は、前向きな意味以外も含まれますよね！？"
90001170-368 = "そのくらい、皆さんもご存知ですよね！？"
90001170-373 = "ひぃっ！？"
90001170-375 = "……本当に、ケイの身体を作ってくれるんですか？"
90001170-376 = "アリスは……ケイと触れ合えるようになるのですか……？"
90001170-377 = "お、王女！？"
90001170-379 = "そうね、不安も多いかもしれないだろうけれど……。"
90001170-385 = "私を信じてちょうだい、アリス。"
90001170-386 = "ありがとうございます、リオ先輩！ヒマリ先輩！"
90001170-387 = "はい、最善を尽くしましょう。"
90001170-388 = "早く助けてと言っているんです！"
90001170-389 = "[s] \"みんな、ケイを助けようとしているんだよ。\""
90001170-390 = "助けられる側の意見を聞いてほしいのですが！？"
90001170-391 = "合理性を盾に自分の美的感覚を押しつけてこないように、見張っていてくれませんか！？"
90001170-395 = "[ns] \"それ以上動くと危ないから……。\""
90001170-399 = "うわああああ！"
90001170-403 = "次回;夜明け"
