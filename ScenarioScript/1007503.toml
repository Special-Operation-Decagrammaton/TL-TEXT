[translation]
1007503-1 = "創作の苦しみ（１）"
1007503-14 = "先生はさ、生まれて初めてデートに行くヒロインがどんな行動をすると思う？"
1007503-15 = "[s] \"それを私に聞かれましても……\""
1007503-16 = "だって分からないんだもん！先生は大人だから何か知ってるかなって……"
1007503-17 = "[s] \"急にどうしたの？\""
1007503-21 = "う～ん……やっぱちゃんと説明するか。"
1007503-22 = "ここにヒロインが1人いるとして……"
1007503-23 = "その子は何をやってもうまくいかない上に不器用で、自分に自信がない女の子なんだけど……"
1007503-24 = "色々あってデートに誘われたの！"
1007503-25 = "[s] \"色々の部分が気になるんだけど……\""
1007503-26 = "大事なのはそこじゃないでしょ！"
1007503-27 = "んで、ヒロインは人生初のメイクに挑戦したり……"
1007503-28 = "不器用なりに、手作りのお弁当を用意したりするのね。"
1007503-29 = "[s] \"なるほど……その後はどうなるの？\""
1007503-30 = "よくぞ聞いてくれました！問題はここからでさ！"
1007503-31 = "その時、ヒロインはどういう気持ちで玄関のドアを開けると思う？"
1007503-32 = "最初の一歩を踏み出す瞬間、何を考えて、何を感じるんだろう？"
1007503-33 = "そして……デート中に何が起きて、どんな反応をするのか？"
1007503-34 = "うあぁ……分からない！全然分からないよ！詰んだー！！"
1007503-35 = "[s3] \"なるほど、そういうことなら……\"\n[s4] \"今からレッドウィンターの外に行ってみる？\""
1007503-38 = "えっ！？急に何を言い出すのさ！"
1007503-42 = "先生？"
1007503-46 = "先生！？"
1007503-50 = "わ、分かった！分かったから腕を引っ張らないで～！"
1007503-51 = "キヴォトス・市内"
1007503-60 = "……。"
1007503-66 = "外に来てしまった……"
1007503-67 = "いったい何をするつもりなの、先生！！！"
1007503-68 = "[s5] \"いや～いい天気だね。\"\n[s6] \"まずはちょっと散歩でもしてみない？\""
1007503-71 = "ふむ……"
1007503-72 = "そうだね。引きこもってばっかじゃ、インスピレーションも湧かないだろうし。"
1007503-73 = "[s] \"そういう事。じゃ、行こっか。\""
1007503-74 = "おっ、エスコートしてくれるんだ！任せたよ～！"
1007503-75 = "ショッピングモール"
1007503-77 = "ショッピングモール……定番のスポットだね。"
1007503-78 = "漫画では何度も見たけど、実際に来てみると人が多い……レッドウィンターは敷地が広い割に、生徒はあんまり多くないから、ちょっと新鮮かも。"
1007503-79 = "おっ、あそこの生徒2人組、絵になるなぁ！"
1007503-80 = "コスメコーナーで、右の生徒が隣の子に色々合わせてあげてる……#n隣の子は恥ずかしがってるようで、どこか嬉しそうで……"
1007503-81 = "……"
1007503-86 = "キタ！スケッチタイムだっ！"
1007503-87 = "[s] \"な、なに！？急にどうしたの！？\""
1007503-88 = "つまりこういうことだよ！ヒロインにとって慣れないメイクだったから、なんだか不自然だったんだ！"
1007503-89 = "そうしてコスメショップに連れていかれるヒロイン……困惑してしまうよね？"
1007503-90 = "その姿を見て、もっと困らせたくなってしまった主人公は、ヒロインをそのままタッチアップに連れていき……見違えるほどに変わった姿に心を奪われてしまうんだ！"
1007503-91 = "違う、ここは変化球で……！#nヒロインが嫌がっていたのは、実はただの演技。意図的に相手を刺激していたのだ……"
1007503-92 = "自分の事を攻めだと思っていた主人公は、ヒロインの策略にハマって抜け出せなくなってしまい……！"
1007503-93 = "なるほど！先生は私にこれを見せたかったんだね！"
1007503-94 = "[s7] \"くっ、メルの役には立ちたかったけど……\"\n[s8] \"まさか、そんな解釈をされるとは……\""
1007503-101 = "えっ、先生？今いいとこなのに！引っ張らないでって～！"
1007503-105 = "遊園地"
1007503-107 = "遊園地かぁ、鉄板の場所だよね。"
1007503-108 = "どれどれ……青春を楽しんでる生徒は……って、あそこ！#n言ったそばから発見！"
1007503-109 = "観覧車の列に並んでる、仲良さそうな2人……#nうむうむ、いいよいいよ……！"
1007503-114 = "……キタキター！スケッチタイム！"
1007503-115 = "[s] \"スケッチタイムって一体……？\""
1007503-116 = "しーっ！今回は王道パターンだよ！"
1007503-117 = "最初は主人公とヒロインが向かい合って座ってる……#nけど、少しずつ観覧車が地上から離れて……"
1007503-118 = "お互いに見つめ合っているうちに、感情が高まってくるんだ。#nそう、観覧車の高度と一緒に……"
1007503-119 = "やがて、片方が隣にそっと座り……吐息さえ感じる距離に……"
1007503-120 = "心と体の距離が徐々に近づいていき……そして……！"
1007503-121 = "[ns] \"楽しそうにしてるところ申し訳ないんだけど……\""
1007503-123 = "[ns] \"私たちが乗る番だよ、メル。\""
1007503-124 = "え～！せっかく盛り上がってきたところなのに……！"
1007503-125 = "でもまぁ、ジェットコースターも良いよね。うんうん。"
1007503-126 = "並んで座る2人は、吊り橋効果で……"
1007503-128 = "お座席に着きましたら、シートベルトをご着用ください。"
1007503-138 = "ひやあっ～ははっ！楽しい～！"
1007503-139 = "カフェ"
1007503-141 = "次はカフェだね。カフェは最高にドキドキを高めてくれる空間だよ！#nテーブルで向かい合っている間は世界に2人だけかに思える時間も……"
1007503-142 = "実際は周囲の視線があるんだから……！"
1007503-143 = "思い切った言葉を口にしたくても、ここは公共の場……#n2人だけの世界との狭間で揺れる思考と感情が……ふふふ……これは期待できそう！"
1007503-144 = "[s] \"……とりあえず、注文どうしよっか？\""
1007503-145 = "うん？あ、忘れてた。んじゃ私はねぇ……"
1007503-153 = "先生、見て……あそこの2人……"
1007503-154 = "……あっ、今ストロー落とした！"
1007503-155 = "[s] \"店員さんに新しいストローを頼んでるね。\""
1007503-156 = "あーあー、つまんないの……"
1007503-161 = "でも、私のスケッチタイムは終わらないんだから！今度はヒロインのターン！偶然を装いストローを落とした流れで、2人が1つのストローで飲み物を分け合うように……"
1007503-162 = "あれ、違うかも？ここでヒロインの思惑通りに進んじゃったら、ありきたりのような？"
1007503-163 = "……じゃあこれなら？#nヒロインはストロー作戦を実行するつもりだったけど、その直前で怖気づいたんだ！"
1007503-164 = "だから店員さんにストローを頼んだの。#nホッとする一方で、もどかしさを感じてしまい……"
1007503-165 = "初々しくも切ない恋と友情の狭間で揺れるヒロインは――！"
1007503-166 = "[s] \"はい、飲み物が来たよ。\""
1007503-171 = "いやあ！お腹いっぱい！"
1007503-172 = "[s] \"……そんなに食べたっけ？\""
1007503-173 = "何を言ってるの、先生！「お腹いっぱい」の意味にも色々あるでしょ！"
1007503-174 = "……先生ってアシスタントの才能もあるんじゃない？#n今日案内してくれたスポットはどれも完璧だったし！"
1007503-175 = "[s] \"楽しいデートになったなら良かった。\""
1007503-179 = "…………え？"
1007503-180 = "な、なにっ……！？デ、デ、デート……！？"
1007503-181 = "そ、そういえば、今日私たちが回ったのは……ショッピングモールに遊園地に……"
1007503-182 = "……！？"
1007503-183 = "[s] \"初デートの参考にはなったかな？\""
1007503-184 = "……！"
1007503-185 = "も、ももも、もちろん！"
1007503-186 = "さ、作家にとってはただのロケハンみたいなもんだし！"
1007503-187 = "そ、それじゃ私は先に帰るから！先生、今日はありが――"
1007503-193 = "ぶあっ！？"
1007503-194 = "[s] \"い、痛そう……\""
1007503-195 = "ううう……痛い……！"
1007503-196 = "お、覚えてろっ！この恨み、絶対に晴らしてやるんだから！"
1007503-198 = "（さよならと言う間もなく走っていくメルの姿を静かに見送った……）"
