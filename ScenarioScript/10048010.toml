[translation]
10048010-1 = "第1話;くもりときどき交易品"
10048010-2 = "[log]時は2時間前に遡る……。[/log]"
10048010-4 = "ワイルドハント芸術学院・正門"
10048010-5 = "（まもなくワイルドハントで開催される「ベロニカ特別展」）"
10048010-6 = "（高級ブランド「ベロニカ」の財団が所有する、絵画コレクションの展示会だ）"
10048010-7 = "（関連業務のため、ワイルドハント芸術学院を訪ねたところ……）"
10048010-8 = "（厳しい検問が待っていた）"
10048010-11 = "カバンを開けてここに置いてください。両手は頭の上に。#n素直に従えば早く終わります。"
10048010-12 = "え、いや絵の具しか入ってないんだけど……。"
10048010-13 = "今回から校則が更新されまして……#nカフェイン濃度の高い飲み物の持込みが禁止となりました。"
10048010-14 = "だから、私のカバンには絵の具しか入ってないって。"
10048010-15 = "もし――絵の具にカフェインを混ぜていたら？"
10048010-16 = "なるほどね……。"
10048010-17 = "……って、誰が絵の具を食べるのさ！？"
10048010-18 = "かつて、そのようなことをした画家もいるという話です。"
10048010-19 = "なんで！？"
10048010-20 = "……とにかく。#n寮監隊長からの特別指示です。ご協力をお願いします。"
10048010-21 = "寮監隊の隊長が……！？"
10048010-22 = "あの方の指示なら、仕方ないか……。"
10048010-26 = "ご理解ありがとうございます。#nさて、これは……。"
10048010-27 = "ふむ、すべて学院から許可が下りているメーカーですね。#n開けた痕跡もなし、と。"
10048010-28 = "はい、どうぞお進みください。お疲れ様でした。"
10048010-33 = "では次の方……あら？"
10048010-34 = "シャーレの先生、ですよね？"
10048010-35 = "[s] \"こんにちは。忙しそうだね。\""
10048010-36 = "こんにちは。そうですね……たしかに忙しいかもしれません。"
10048010-37 = "ですが、これも上からの指示ですので。"
10048010-38 = "ということで、検問にご協力お願いします。"
10048010-39 = "[s] \"もちろん。よろしくお願いします。\""
10048010-40 = "それでは、カバンを確認しますね。"
10048010-44 = "……はっ！？"
10048010-45 = "[s] \"何か問題でもあった……？\""
10048010-46 = "申し訳ありませんが、こちらの陶器のマグカップはお預かりします。"
10048010-47 = "陶器類の持込みはすべて禁止となりまして……。"
10048010-48 = "[s] \"ええっ！？\""
10048010-49 = "先月、禁止された顔料の粉を固めて陶器にし、#n持ち込んだ者がいたため、全面禁止となりました。"
10048010-50 = "[s] \"それは……仕方ないね。\""
10048010-52 = "（しばらく厳しい検問が続き……）"
10048010-54 = "これで終わりです。お疲れ様でした。"
10048010-55 = "お預かりした物については、学院を出る際に返却いたしますので。#nその際に改めてお声がけください。"
10048010-56 = "ワイルドハントへようこそ。先生。"
10048010-57 = "[s] \"うん、ありがとう。お疲れ様。\""
10048010-59 = "（そうしてワイルドハントに入って1時間後）"
10048010-60 = "（無事に仕事を終えた）"
10048010-62 = "ワイルドハント・空き地"
10048010-64 = "（校庭を歩いていると、誰もいない空き地を見つけた）"
10048010-65 = "（正門まではまだ距離がある……）"
10048010-66 = "[ns] \"少し休んでいこうかな？\""
10048010-67 = "（ベンチに腰を下ろそうとしたその時）"
10048010-68 = "そこの人ー！避けて！！"
10048010-69 = "[ns] \"うん？\""
10048010-71 = "（空から何かが降ってくるのが見えた）"
10048010-72 = "（丸くて、緑色をした――）"
10048010-74 = "[ns] \"巨大な巾着……？\""
10048010-78 = "（――そして、気を失った）"
10048010-80 = "[ns] \"それで……目が覚めたらここにいたんだ。\""
10048010-81 = "お、思い出しましたか……？"
10048010-82 = "あの後、私たちが先生を寮にお連れしたんです。"
10048010-83 = "[s] \"あの巨大な袋は一体……？\""
10048010-84 = "ああ、それは……。"
10048010-85 = "ええっと……密輸品です。"
10048010-86 = "[s] \"み、密輸品！？\""
10048010-87 = "はい。#n校内に持ち込むために外から投石機で打ち上げたもので――"
10048010-88 = "[s] \"投石機！？\""
10048010-89 = "その着弾地点に先生がいて……#nこう、ドカッ！と……。"
10048010-90 = "うぅぅ……申し訳ありません……。"
10048010-91 = "特殊交易部の部長として、お詫び申し上げます……。"
10048010-92 = "こんな部活の部長なんて、したくないんですが……。"
10048010-93 = "[s] \"大丈夫だよ、大怪我もしなかったし。\""
10048010-94 = "ありがとうございます、先生。#nまぁ……そもそも、フユのせいなんですけど。"
10048010-95 = "危ないから、アレはなるべく使わないようにって言ったのに……はぁ。"
10048010-97 = "いや、この手しかなかったんだよ。"
10048010-101 = "あれ、いつの間に来たんですか。"
10048010-102 = "今回は投石機じゃないといけない理由があってね。"
10048010-103 = "なに？#nどうせまた適当なこと言うんでしょうけど……。"
10048010-104 = "ふふっ……それはね……。"
10048010-106 = "カッコイイからだよ！！"
10048010-107 = "もう一生黙っててください。"
10048010-108 = "なんでぇっ！？"
10048010-109 = "怪我人が出たからに決まってるでしょう！？"
10048010-110 = "緩衝材もいっぱい入れたんだよ！？"
10048010-111 = "それは品物を守るためですよね！？"
10048010-112 = "[s] \"えっと、二人とも落ち着いて……。\""
10048010-116 = "あっ、起きたんですね、先生。"
10048010-117 = "話をそらさないで！"
10048010-118 = "初めまして。私は特殊交易部の営業室長、[ruby=わかさ]若狭[/ruby]フユです。#n技術関連の統括もしております。"
10048010-119 = "室長も統括も、任せた覚えないんですけど……。"
10048010-123 = "まあまあ、こちらをどうぞ。#n保健室でもらった[ruby=やつ]軟膏[/ruby]です。"
10048010-124 = "あと、こちら名刺になります。"
10048010-125 = "いつ作ったの！？"
10048010-126 = "名刺はビジネスマナーでしょう？"
10048010-127 = "いや……この部活が校則に違反してるの、分かってますよね？"
10048010-128 = "うん。ミヨがその部活をまとめてることもね。"
10048010-129 = "私がなりたくてなったと思ってるの！？"
10048010-130 = "まあ落ち着きなって、部長。#nこうして丸く収まったんだし。"
10048010-131 = "でも、先生にはご迷惑をかけてしまいましたし……。"
10048010-132 = "じゃあこうしましょう。#n先生に「助け」が必要な際は、初回無料とさせていただきます！"
10048010-133 = "よくこの状況で営業できますね……。"
10048010-134 = "[ns1] \"あの。そもそもなんだけど……。\"\n[ns2] \"特殊交易部って、何をする部活なの？\""
10048010-137 = "良い質問ですね、先生。"
10048010-138 = "それでは、一つずつご説明いたしましょう！"
10048010-139 = "一つずつもなにも、校則で禁じられてる物を、こっそり売ってるだけですよね……。"
10048010-140 = "先生も学院に入る際、ご覧になったかと思います！"
10048010-141 = "話聞いてる？"
10048010-142 = "度を越した執拗な検査……そして、理不尽な押収。"
10048010-143 = "そのせいでワイルドハントの生徒は、欲しいものがあっても持ち込めないものばかり……。"
10048010-144 = "そこで私たちの出番です。"
10048010-145 = "私たちは依頼人が望む物を仕入れ、品代と手数料を受け取る。"
10048010-146 = "もちろん、適正価格ですよ？"
10048010-147 = "少々「特殊」な形で「交易」をする……#nそれが私たち「特殊交易部」のお仕事です。"
10048010-148 = "[s] \"でも、校則には違反してるんだよね……？\""
10048010-149 = "ふふっ。そう思われるのも無理はありません。"
10048010-150 = "そこで、もしご関心がおありならば――"
10048010-151 = "私たちの部活動を、見学してみませんか？"
10048010-152 = "我々の行いが本当に悪いことなのか、判断できるかと。"
10048010-153 = "まずはお試しということで……いかがでしょう？"
10048010-154 = "[s3] \"できるなら喜んで。\"\n[s4] \"実際、興味はあったからね。\""
10048010-157 = "で、部長の考えは？"
10048010-158 = "私たち2人が合意しても、最終決定権は部長にあるからね。"
10048010-159 = "……うん。"
10048010-160 = "……そうですね。#nまずは見てもらいましょうか。"
10048010-161 = "よーし、それでは……。"
10048010-168 = "ミヨちゃん！「埋めて」きたよ！"
10048010-172 = "[ns] \"……何を！？\""
