[translation]
10048010-1 = "Episódio 1: Nublado, com pancadas de mercadorias"
10048010-2 = "[log]O tempo volta duas horas...[/log]"
10048010-4 = "Academia de Artes Wildhunt - Portão Principal"
10048010-5 = "(A \"Exposição Especial Veronica\" será realizada em breve na Wildhunt)"
10048010-6 = "(É uma exposição de coleções de pinturas pertencentes à fundação da marca de luxo \"Veronica\")"
10048010-7 = "(Ao visitar a Academia de Artes Wildhunt para assuntos relacionados...)"
10048010-8 = "(Uma inspeção rigorosa me aguardava)"
10048010-11 = "Abra sua bolsa e coloque-a aqui. Mantenha as mãos sobre a cabeça. #nSe cooperar, terminará mais rápido."
10048010-12 = "Ei, não, só tem tintas aqui dentro..."
10048010-13 = "O regulamento escolar foi atualizado recentemente... #nÉ proibido trazer bebidas com alta concentração de cafeína."
10048010-14 = "Eu já disse, só tem tintas na minha bolsa."
10048010-15 = "E se... você tivesse misturado cafeína na tinta?"
10048010-16 = "Entendi..."
10048010-17 = "...Espera, quem comeria tinta!?"
10048010-18 = "Dizem que houve um pintor que fez exatamente isso no passado."
10048010-19 = "Por quê!?"
10048010-20 = "...De qualquer forma. #nEsta é uma instrução especial da capitã da guarda do dormitório. Por favor, colabore."
10048010-21 = "A capitã da guarda do dormitório...!?"
10048010-22 = "Se é uma instrução dela, não tem jeito..."
10048010-26 = "Obrigada pela compreensão. #nBem, vejamos isto..."
10048010-27 = "Hum, todos são fabricantes autorizados pela academia. #nE sem sinais de violação, também."
10048010-28 = "Sim, pode prosseguir. Bom trabalho."
10048010-33 = "Próximo, por favor... Oh?"
10048010-34 = "Você é o Sensei do Schale, certo?"
10048010-35 = "[s] \"Olá. Parece que estão ocupados.\""
10048010-36 = "Olá. Pois é... talvez estejamos ocupados mesmo."
10048010-37 = "Mas esta também é uma instrução vinda de cima."
10048010-38 = "Portanto, por favor, colabore com a inspeção."
10048010-39 = "[s] \"Claro. Conto com vocês.\""
10048010-40 = "Então, vou verificar sua bolsa."
10048010-44 = "...Ah!?"
10048010-45 = "[s] \"Algum problema...?\""
10048010-46 = "Sinto muito, mas terei que confiscar esta caneca de cerâmica."
10048010-47 = "A entrada de itens de cerâmica foi totalmente proibida..."
10048010-48 = "[s] \"Sério!?\""
10048010-49 = "No mês passado, alguém solidificou pigmentos proibidos em forma de cerâmica e os trouxe para dentro, então foi proibido totalmente."
10048010-50 = "[s] \"Isso é... compreensível.\""
10048010-52 = "(Após a inspeção rigorosa continuar por um tempo...)"
10048010-54 = "Isso é tudo. Bom trabalho."
10048010-55 = "Os itens confiscados serão devolvidos quando você sair da academia. #nPor favor, fale conosco novamente na saída."
10048010-56 = "Bem-vindo à Wildhunt, Sensei."
10048010-57 = "[s] \"Sim, obrigado. Bom trabalho.\""
10048010-59 = "(E assim, uma hora depois de entrar na Wildhunt)"
10048010-60 = "(Terminei o trabalho em segurança)"
10048010-62 = "Wildhunt - Terreno baldio"
10048010-64 = "(Enquanto caminhava pelo campus, encontrei um terreno baldio vazio)"
10048010-65 = "(Ainda falta um pouco para chegar ao portão principal...)"
10048010-66 = "[ns] \"Devo descansar um pouco?\""
10048010-67 = "(No momento em que ia me sentar no banco)"
10048010-68 = "Você aí! Saia da frente!!"
10048010-69 = "[ns] \"Hã?\""
10048010-71 = "（Vi algo caindo do céu）"
10048010-72 = "（Era redondo e verde...）"
10048010-74 = "[ns] \"Uma trouxa gigante...?\""
10048010-78 = "（...E então, apaguei）"
10048010-80 = "[ns] \"E aí... quando acordei, já estava aqui.\""
10048010-81 = "V-você se lembra...?"
10048010-82 = "Depois daquilo, nós levamos o Sensei para o dormitório."
10048010-83 = "[s] \"O que era aquele saco gigante...?\""
10048010-84 = "Ah, isso é..."
10048010-85 = "Bem... é contrabando."
10048010-86 = "[s] \"C-contrabando!?\""
10048010-87 = "Sim. Lançamos de fora da escola usando uma catapulta para trazer para dentro e..."
10048010-88 = "[s] \"Uma catapulta!?\""
10048010-89 = "O Sensei estava bem no ponto de impacto... e, tipo, POW!"
10048010-90 = "Uuuu... sinto muito..."
10048010-91 = "Como chefe do Departamento de Comércio Especial, peço desculpas..."
10048010-92 = "Eu nem queria ser chefe de um clube desses..."
10048010-93 = "[s] \"Está tudo bem, eu não me machuquei gravemente.\""
10048010-94 = "Obrigada, Sensei. Bem... na verdade, a culpa é da Fuyu."
10048010-95 = "Eu disse para ela não usar aquilo porque era perigoso... ai, meu Deus."
10048010-97 = "Não, não tinha outro jeito."
10048010-101 = "Ué, quando você chegou?"
10048010-102 = "Desta vez, havia um motivo para termos que usar a catapulta."
10048010-103 = "O quê? Aposto que vai dizer alguma bobagem de novo..."
10048010-104 = "Hehe... é que..."
10048010-106 = "É porque é estiloso!!"
10048010-107 = "Por favor, fique calado para sempre."
10048010-108 = "Por queee!?"
10048010-109 = "Porque alguém se feriu, é óbvio!"
10048010-110 = "Eu coloquei um monte de material de amortecimento, sabia!?"
10048010-111 = "Isso foi para proteger a mercadoria, não foi!?"
10048010-112 = "[s] \"Ei, vocês duas, se acalmem...\""
10048010-116 = "Ah, você acordou, Sensei."
10048010-117 = "Não mude de assunto!"
10048010-118 = "Muito prazer. Sou Wakasa Fuyu, gerente de vendas do Departamento de Comércio Especial. Também sou responsável pela parte técnica."
10048010-119 = "Eu não me lembro de ter te dado o cargo de gerente nem de responsável..."
10048010-123 = "Calma, calma, pegue isto. É uma pomada que peguei na enfermaria."
10048010-124 = "E aqui está o meu cartão de visitas."
10048010-125 = "Quando você fez isso!?"
10048010-126 = "Cartão de visitas é etiqueta de negócios, não é?"
10048010-127 = "Não... você sabe que este clube viola as regras da escola, né?"
10048010-128 = "Sim. E sei que a Miyo é quem comanda esse clube."
10048010-129 = "Você acha que eu virei chefe porque eu quis!?"
10048010-130 = "Relaxa, chefe. No fim, tudo deu certo."
10048010-131 = "Mas causamos problemas ao Sensei..."
10048010-132 = "Então vamos fazer o seguinte: quando o Sensei precisar de \"ajuda\", o primeiro serviço será por nossa conta!"
10048010-133 = "Como você consegue fazer propaganda numa situação dessas..."
10048010-134 = "[ns1] \"Ei. Antes de tudo...\"\n[ns2] \"O que o Departamento de Comércio Especial faz exatamente?\""
10048010-137 = "Boa pergunta, Sensei."
10048010-138 = "Então, vamos explicar um por um!"
10048010-139 = "Um por um, nada... vocês só estão vendendo escondido coisas proibidas pelo regulamento escolar, não é?..."
10048010-140 = "Sensei, tenho certeza de que você viu isso quando entrou na academia!"
10048010-141 = "Você está me ouvindo?"
10048010-142 = "Inspeções excessivamente persistentes... e confiscos irracionais."
10048010-143 = "Por causa disso, as alunas de Wildhunt não conseguem trazer nada do que querem..."
10048010-144 = "É aí que nós entramos."
10048010-145 = "Nós adquirimos o que o cliente deseja e recebemos o valor do produto e uma taxa de serviço."
10048010-146 = "Claro, por um preço justo, é claro."
10048010-147 = "Fazemos um \"comércio\" de uma forma um pouco \"especial\"... #nEsse é o trabalho do nosso \"Departamento de Comércio Especial\"."
10048010-148 = "[s] \"Mas isso viola o regulamento escolar, não é...?\""
10048010-149 = "Fufu. É compreensível que pense assim."
10048010-150 = "Então, se você tiver interesse—"
10048010-151 = "Que tal visitar as nossas atividades do clube?"
10048010-152 = "Assim, você poderá julgar se o que fazemos é realmente algo ruim."
10048010-153 = "Vamos começar com um teste... o que acha?"
10048010-154 = "[s3] \"Se for possível, ficarei feliz.\" \n[s4] \"Na verdade, eu estava curioso mesmo.\""
10048010-157 = "E então, qual é a opinião da presidente?"
10048010-158 = "Mesmo que nós duas concordemos, a decisão final cabe à presidente."
10048010-159 = "……Sim."
10048010-160 = "……É verdade. #nPrimeiro, vamos deixar que ele veja."
10048010-161 = "Muito bem, então..."
10048010-168 = "Miyo-chan! Eu já \"enterrei\"!"
10048010-172 = "[ns] \"……O que você enterrou!?\""
