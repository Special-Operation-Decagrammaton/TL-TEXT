[translation]
10054110-1 = "Episode 11;Fireworks"
10054110-3 = "Waaaaah!?"
10054110-4 = "Whyyyy...!"
10054110-5 = "Next time, I'm definitely going to make you pay! You just wait...!!"
10054110-9 = "Wait right there!"
10054110-10 = "They're so fast!"
10054110-11 = "Honestly! This is why kids these days!"
10054110-15 = "[ns] \"Is everyone okay? Any injuries?\""
10054110-16 = "Yes, I'm unharmed."
10054110-19 = "[ns] (What about Kisaki...?)"
10054110-20 = "I still worry about the manners of the fledgling group, though..."
10054110-21 = "I hope that if our paths cross again, I'll see them having grown."
10054110-22 = "..."
10054110-23 = "Sensei. Do not worry so much."
10054110-24 = "The fault for what happened this time lies with me as well."
10054110-25 = "Everyone, thank you for your hard work."
10054110-26 = "Kokon-chan, you were especially impressive."
10054110-27 = "W-what's with the sudden praise...?"
10054110-28 = "[s] \"You were a true lady. Well done.\""
10054110-29 = "Oh, come on... even you, Sensei."
10054110-30 = "Besides, I've been a proper lady for a long time now!"
10054110-31 = "[s] \"Yes, yes!\""
10054110-40 = "(As I patted her head, everyone praised Kokona.)"
10054110-46 = "(Kokona showed a beaming smile, despite being embarrassed.)"
10054110-51 = "—That is why! She was like that too, but discipline from a young age is so important!"
10054110-52 = "I think praising them too much actually has a negative effect."
10054110-53 = "And yet, lately, it seems everyone is overlooking that, and it worries me!"
10054110-54 = "Even I, from Shun-neesan..."
10054110-55 = "...Ugh..."
10054110-56 = "[s] \"...Are you okay?\""
10054110-57 = "Shun-neesan is... scary when she's angry..."
10054110-58 = "But if you don't make her angry, she's actually really kind!"
10054110-63 = "...I never thought I'd be able to come play with Shun-neesan."
10054110-64 = "She used to play with me a lot, but she's been so busy since she became an instructor."
10054110-65 = "That's why... I aimed to become an instructor too."
10054110-66 = "[s] \"You've really worked hard.\""
10054110-67 = "I-it wasn't that much! It was nothing special!"
10054110-68 = "...When I was studying a lot, Shun-neesan would often scold me, saying I should sleep at least seven hours."
10054110-69 = "After I became an instructor, we both got even busier..."
10054110-70 = "But... I like how things are now."
10054110-71 = "Sensei is here with us, too."
10054110-72 = "[s] \"Kokona, you're a good girl.\""
10054110-73 = "(Wait...? Did you just call me Kokona...?)"
10054110-74 = "Hmph, it seems you've finally realized my charm!"
10054110-75 = "[s] \"Yeah! Kokona-chan is the best!\""
10054110-76 = "Wait!? It's Kokona-chan again!?"
10054110-77 = "You called me by my name without the honorific just a moment ago..."
10054110-78 = "[s] \"Did I?\""
10054110-79 = "Geez! Don't tease me!"
10054110-84 = "Sensei, Kokona-chan."
10054110-85 = "Shun-neesan!"
10054110-86 = "Fufu, were you two on a date tonight?"
10054110-87 = "A-a-a-a-date!?!?"
10054110-89 = "[ns] \"Yes. I was on a date with Kokona.\""
10054110-90 = "Sensei!?"
10054110-91 = "I'm envious. Would you mind if I joined you?"
10054110-92 = "...!"
10054110-93 = "I-it's okay! Since it's Shun-neesan, I'll make an exception!"
10054110-94 = "Thank you."
10054110-96 = "(And so, we walked together with Kokona in the middle.)"
10054110-97 = "(Kokona seemed to be having fun, occasionally swinging on our hands.)"
10054110-99 = "Oh, looks like you're having fun."
10054110-100 = "Hmm? Sensei, are you curious about what we were doing?"
10054110-101 = "Hmph... A summer tradition—fireworks!"
10054110-102 = "Wow! Fireworks! That's amazing!"
10054110-103 = "Let's light them right away!"
10054110-109 = "Is everything going well?"
10054110-110 = "Thanks to you!"
10054110-111 = "The fireworks viewed from here are a spectacular sight. It's beautiful how they reflect on the river."
10054110-112 = "I'm looking forward to it."
10054110-113 = "Let's watch them together!"
10054110-114 = "...Thank you. I'm happy to see you're enjoying your time here."
10054110-115 = "I think that's something we should be thanking you for..."
10054110-116 = "This is also a gesture of gratitude for your investment, Black Tortoise Promenade."
10054110-117 = "Oh my. I intended to keep that a secret until the end... how long have you known?"
10054110-118 = "Hahaha... Merchants have their own regional networks, you see."
10054110-119 = "...I should have told you from the start. I apologize."
10054110-120 = "No, no. Everything happens for a reason... and things come full circle."
10054110-121 = "It all comes around... and that's how we arrived at this moment."
10054110-122 = "Whether it's goods or capital, keeping the economy moving is what matters, isn't it?"
10054110-123 = "The same goes for water."
10054110-124 = "Ahaha! Indeed."
10054110-125 = "Regarding the fledgling group... thank you for saving this place."
10054110-126 = "No, those children were merely the catalyst. If we had feared change for too long... this place would have gradually been forgotten by everyone."
10054110-127 = "We, the Black Tortoise Promenade, were the ones who decided to invest because we believed in the potential here. However—"
10054110-128 = "Without the cooperation of the Genryumon, I don't think we could have achieved this much."
10054110-130 = "No, that was all thanks to the Gatekeeper's power...!"
10054110-131 = "Wait, where is the Gatekeeper!? Gatekeeper-sama!!"
10054110-135 = "...I heard the Black Tortoise Promenade and the Genryumon didn't get along very well."
10054110-136 = "That is still the case."
10054110-137 = "Are you hoping for an improvement, even if it's just a little?"
10054110-138 = "Yes. In business, hostility produces nothing."
10054110-139 = "In that case, your earlier statement makes sense."
10054110-140 = "Who knows? Let's keep that a secret."
10054110-141 = "...I look forward to seeing what you do next. Or rather, as a fellow merchant, perhaps I should say I find it frightening."
10054110-142 = "You praise me too much. I still have so much to learn."
10054110-144 = "...Oh? It seems they've started."
10054110-145 = "Wow...!"
10054110-151 = "Actually... there are still many activities you haven't experienced yet."
10054110-152 = "Rafting, cave tours, boat tours..."
10054110-153 = "I intend to try them tomorrow."
10054110-154 = "Did you find the Gatekeeper?"
10054110-155 = "Yes. She will be here shortly."
10054110-156 = "Was she busy with other work? I hope the fireworks didn't get in the way."
10054110-157 = "Do not worry about it. Fireworks are enjoyable whenever they are set off."
10054110-158 = "You're late, Kisaki."
10054110-160 = "My apologies. I was taking a short nap."
10054110-161 = "You're quite the sleepyhead!"
10054110-162 = "I am here on vacation. One should heal their mind and body to the fullest, should they not?"
10054110-165 = "[ns] \"...Kisaki?\""
10054110-166 = "You need not worry so much."
10054110-167 = "...Ah, we had a promise to talk about this matter later, didn't we."
10054110-168 = "..."
10054110-169 = "Do not fret."
10054110-170 = "These are my true feelings, without any lies."
10054110-171 = "I was in such high spirits that I got a bit carried away."
10054110-172 = "[s] \"What do you mean...?\""
10054110-173 = "Hmm, in other words..."
10054110-174 = "..."
10054110-175 = "I was so absorbed in playing..."
10054110-176 = "...that I forgot the time for my medicine."
10054110-177 = "[s] \"...What?\""
10054110-178 = "Do not look at me with such eyes... besides, it is not as if I did not take it at all."
10054110-179 = "It is just... the timing was off, so the effect was delayed..."
10054110-180 = "[s] \"...\""
10054110-181 = "Actually... I had forgotten to take my medicine once before, and Saya scolded me for it."
10054110-182 = "But taking it at the same time every day, doing the exercises... if one is living, sometimes things slip through the cracks, don't you think...?"
10054110-183 = "[s] \"If you forget again, I'm really going to be angry, okay...?\""
10054110-184 = "Ugh... you say the same thing as Saya..."
10054110-185 = "...I will be careful from now on."
10054110-186 = "...Hmm? You want proof of my promise?"
10054110-187 = "I do not mind, but... what would you have me do?"
10054110-188 = "Wha... Report it to Saya myself? T-that is, no matter how you look at it...!"
10054110-189 = "[s] \"It's all for your own good, Kisaki!\""
10054110-190 = "Haa... I understand that much."
10054110-191 = "That I should be a model for everyone? W-well, that is true, but...!"
10054110-192 = "U-um..."
10054110-193 = "It cannot be helped..."
10054110-199 = "Gatekeeper Kisaki. Is your vacation... no, your inspection going well? You don't need to worry about the Alchemy Research Society!"
10054110-200 = "Hmm? You have something to say? To me?"
10054110-203 = "...Gatekeeper?"
10054110-204 = "Wait. There is a reason for this...!"
10054110-205 = "Long ago, I said this."
10054110-207 = "There is no \"reason\" more important than a doctor's orders!!"
10054110-213 = "Even though she looks like she has it all together, the Gatekeeper has a habit of slacking off in strange ways."
10054110-214 = "When you get back, I'll come to greet you myself! So you better wait for me!"
10054110-218 = "Uuu..."
10054110-219 = "[ns] \"Yes, very good.\""
10054110-220 = "I think Sensei is partly to blame for this, you know!?"
10054110-221 = "...No. It is entirely due to my own forgetfulness..."
10054110-222 = "[s] \"Come here.\""
10054110-228 = "..."
10054110-229 = "Pat me more..."
10054110-231 = "(It took a little while for Kisaki to regain her energy.)"
10054110-246 = "Raising a cup by the mountains and the river,"
10054110-247 = "We drink together."
10054110-249 = "Lifting my hand to welcome the moon,"
10054110-250 = "Our shadows merge into one."
10054110-252 = "This scenery intoxicates us all,"
10054110-253 = "We enjoy it together, and soon we shall part."
10054110-255 = "The path continues along the riverbank,"
10054110-256 = "And under the distant galaxy, we shall surely meet again."