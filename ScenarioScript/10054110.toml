[translation]
10054110-1 = "第11話;花火"
10054110-3 = "うわぁーん！？"
10054110-4 = "どうしてぇ……！"
10054110-5 = "次は絶対痛い目に遭わせてやる！覚えてろよ……！！"
10054110-9 = "待ちなさーい！"
10054110-10 = "逃げ足はっや！"
10054110-11 = "まったくもう！これだから最近の子供は！"
10054110-15 = "[ns] \"みんな、怪我はない？\""
10054110-16 = "ああ、無事だ。"
10054110-19 = "[ns] （キサキは……？）"
10054110-20 = "雛鳥組のお行儀は今後も心配じゃが……。"
10054110-21 = "また縁があれば、成長していてくれると嬉しいのう。"
10054110-22 = "……。"
10054110-23 = "先生。そう心配するでない。"
10054110-24 = "今回のことは、妾にも非があるのじゃから。"
10054110-25 = "皆さん、お疲れ様でした。"
10054110-26 = "特にココナちゃん、とてもすごかったですよ。"
10054110-27 = "い、いきなりどうしたの……？"
10054110-28 = "[s] \"まさにレディーだったよ。偉い。\""
10054110-29 = "もう……先生まで。"
10054110-30 = "そもそも、私は前から立派なレディーです！"
10054110-31 = "[s] \"うん、うん！\""
10054110-40 = "（頭を撫でながら、みんながココナを褒めた）"
10054110-46 = "（ココナは照れながらも、満面の笑みを見せてくれた）"
10054110-51 = "――ですから！あの子もそうでしたけど、小さい頃のしつけが大事なんです！"
10054110-52 = "褒めすぎるのは、かえって悪影響だと思います。"
10054110-53 = "なのに最近、みんなそれを看過しすぎているようで、心配なんですから！"
10054110-54 = "私だって、シュン姉さんから……。"
10054110-55 = "……うっ……。"
10054110-56 = "[s] \"……大丈夫？\""
10054110-57 = "シュン姉さん、怒ると……怖くて……。"
10054110-58 = "でも怒らせなければ、本当に優しいんですよ！"
10054110-63 = "……シュン姉さんと遊びに来れるなんて思ってもみませんでした。"
10054110-64 = "昔はよく遊んでくれましたけど、シュン姉さんが教官になってからは忙しくて。"
10054110-65 = "だから……私も教官を目指したんです。"
10054110-66 = "[s] \"本当によく頑張ったね。\""
10054110-67 = "そ、それほどでもないですよ？大したことなかったですし！"
10054110-68 = "……たくさん勉強してた時は、最低でも7時間は寝なさいって、#nよくシュン姉さんに叱られましたね。"
10054110-69 = "私も教官になってからは、お互いにもっと忙しくなってしまって……。"
10054110-70 = "でも……今がいいんです。"
10054110-71 = "先生も一緒ですし。"
10054110-72 = "[s] \"ココナは偉いね。\""
10054110-73 = "（あれ……？いま、[ruby=・   ・   ・]ココナ[/ruby]って……！？）"
10054110-74 = "ふふん、ようやく私の魅力に気づいたみたいですね！"
10054110-75 = "[s] \"うん！ココナちゃん最高！\""
10054110-76 = "あれ！？またココナちゃんですか！？"
10054110-77 = "さっきは呼び捨てにしてくれたのに……。"
10054110-78 = "[s] \"そうだったかなぁ～？\""
10054110-79 = "もう！からかわないでください！"
10054110-84 = "先生、ココナちゃん。"
10054110-85 = "シュン姉さん！"
10054110-86 = "うふふ、夜のデート中でしたか？"
10054110-87 = "で、ででで、デート！？！？"
10054110-89 = "[ns] \"そう。ココナとデートしてたんだ。\""
10054110-90 = "先生！？"
10054110-91 = "それは羨ましい。お姉さんも混ぜてくれますか？"
10054110-92 = "……！"
10054110-93 = "い、いいよ！シュン姉さんだから特別ね！"
10054110-94 = "ありがとうございます。"
10054110-96 = "（そうして、ココナを間に挟んで3人で一緒に歩いた）"
10054110-97 = "（たまに手つなぎブランコをして、ココナは楽しそうにしていた）"
10054110-99 = "お、楽しそうなことしてるね。"
10054110-100 = "うん？先生、私たちが何をしていたか気になるのか？"
10054110-101 = "フッ……夏の風物詩――花火だ！"
10054110-102 = "わあ！花火！すごいです！"
10054110-103 = "さっそく火をつけるぞ！"
10054110-109 = "上手くいってるかな？"
10054110-110 = "おかげさまで！"
10054110-111 = "ここから観る花火は絶景なんだ。川に映るのが綺麗でね。"
10054110-112 = "それは楽しみですね。"
10054110-113 = "一緒に観ましょう！"
10054110-114 = "……ありがとう。#nここを満喫してくれてるみたいで嬉しいよ。"
10054110-115 = "それは私たちが感謝すべきだと思うのだが……。"
10054110-116 = "これは、投資に対する感謝でもあるんだよ。玄武商会さん。"
10054110-117 = "おっと。最後まで秘密にするつもりだったんですけど……いつから？"
10054110-118 = "はっはっはっ……商人には、地域のネットワークがあってね。"
10054110-119 = "……最初から言うべきでしたね。ごめんなさい。"
10054110-120 = "いやいや。すべての物事には理由があって……巡りめぐるものさ。"
10054110-121 = "巡りめぐって……今があるんだよ。"
10054110-122 = "物資も資金も、経済を回すことが大事ですよね。"
10054110-123 = "水も同じだ。"
10054110-124 = "あはは！たしかに。"
10054110-125 = "雛鳥組の件……ここを救ってくれてありがとう。"
10054110-126 = "いや、あの子たちはきっかけに過ぎないな。#nずっと変化を恐れていたら……ここは人々から徐々に忘れられていただろうね。"
10054110-127 = "ここの可能性を信じて投資を決めたのはあたしたち、玄武商会です。#nですが――"
10054110-128 = "玄龍門の協力がなかったら、ここまでのことは難しかったと思います。"
10054110-130 = "いや、それは門主様のお力であって……！"
10054110-131 = "って、あれ！？門主様がいない！？門主様ー！！"
10054110-135 = "……玄武商会と玄龍門は、あまり仲が良くないと聞いていたが。"
10054110-136 = "今もそうですよ。"
10054110-137 = "少しずつでも、改善を願っているのか？"
10054110-138 = "ええ。商売をするのに、敵対は何も生みませんから。"
10054110-139 = "それなら、さっきの発言にも納得がいく。"
10054110-140 = "どうでしょう？そこは秘密ということで。"
10054110-141 = "……君こそ先が楽しみだよ。いや、同業者として、恐ろしいというべきか。"
10054110-142 = "褒めすぎですよ。まだまだ学ぶべきことだらけです。"
10054110-144 = "……あら？始まったようですね。"
10054110-145 = "わあ……！"
10054110-151 = "実は……体験してもらってないアクティビティがまだたくさん残ってるんだ。"
10054110-152 = "ラフティングに、洞窟ツアー、ボートツアー……。"
10054110-153 = "明日、体験させてもらうつもりだ。"
10054110-154 = "門主様は見つかったのかい？"
10054110-155 = "ああ。もうすぐここにいらっしゃる。"
10054110-156 = "何か、別の仕事をされていたのかい？#n花火で邪魔をしてしまったかな。"
10054110-157 = "気に病むことは無い。花火はいつやっても楽しいものじゃ。"
10054110-158 = "遅いよ、キサキ。"
10054110-160 = "すまぬ。少し昼寝をしておった。"
10054110-161 = "すっかり寝坊助だね！"
10054110-162 = "休暇に来ておるのじゃ。思う存分、心身を癒すべきじゃろう？"
10054110-165 = "[ns] \"……キサキ？\""
10054110-166 = "そんなに心配せずとも大丈夫じゃよ。"
10054110-167 = "……ああ、この問題については、後で話をする約束じゃったな。"
10054110-168 = "……。"
10054110-169 = "案ずるでない。"
10054110-170 = "嘘偽りのない本心じゃ。"
10054110-171 = "あまりに調子が良かったものでな。ついはしゃぎすぎてしまったのじゃ。"
10054110-172 = "[s] \"どういう意味……？\""
10054110-173 = "うむ、つまり……。"
10054110-174 = "……。"
10054110-175 = "遊びに夢中になり……。"
10054110-176 = "……薬の時間を失念しておったのじゃ。"
10054110-177 = "[s] \"……え？\""
10054110-178 = "そのような目を向けんでくれ……それに、飲んでおらんかったわけではない。"
10054110-179 = "ただ……時間がずれて、効き目が出るのが遅くなっただけなのじゃ……。"
10054110-180 = "[s] \"……。\""
10054110-181 = "実は……前にも薬を飲み忘れて、サヤに怒られたことがあったのじゃ。"
10054110-182 = "しかし、毎日決まった時間に飲むのも、体操をするのも……#n生きていれば、たまには疎かになることもあるじゃろう……？"
10054110-183 = "[s] \"今度また忘れたら、本当に怒るからね……？\""
10054110-184 = "うっ……サヤと同じことを申すのじゃな……。"
10054110-185 = "……以後、気をつけよう。"
10054110-186 = "……うむ？約束の証明がほしい？"
10054110-187 = "それは構わぬが……妾は何をすればいいのかえ？"
10054110-188 = "なっ……サヤに自分で報告する？#nい、いくらなんでもそれは……！"
10054110-189 = "[s] \"全部キサキのためだよ！\""
10054110-190 = "はぁ……それは理解しておるつもりじゃ。"
10054110-191 = "妾が皆の模範となるべきじゃと？そ、その通りではあるが……！"
10054110-192 = "う、うむ……。"
10054110-193 = "致し方あるまい……。"
10054110-199 = "キサキ門主。休暇……いや、査察は上手くいっているのか？#n錬丹術研究会のことなら心配しなくていいのだ！"
10054110-200 = "うん？話がある？ぼく様に？"
10054110-203 = "……門主？"
10054110-204 = "待つのじゃ。これにはそれなりの理由が……！"
10054110-205 = "昔、ぼく様は言ったのだ。"
10054110-207 = "医者の指示よりも大事な「理由」などないのだ！！"
10054110-213 = "しっかりしているように見えて、門主は変なところでサボるクセがあるのだ。"
10054110-214 = "帰ってきたら、ぼく様が直々に出迎えに行くから！ちゃんと待ってろなのだ！"
10054110-218 = "うぅ……。"
10054110-219 = "[ns] \"はい、よくできました。\""
10054110-220 = "先生にも少し原因があると思うのじゃが！？"
10054110-221 = "……否。すべては妾の失念によるもの……。"
10054110-222 = "[s] \"おいで。\""
10054110-228 = "……。"
10054110-229 = "もっと撫でてくりゃれ……。"
10054110-231 = "（キサキが元気を取り戻すには、少し時間がかかった）"
10054110-246 = "山と川辺で盃を掲げ、"
10054110-247 = "共に酌み交わす。"
10054110-249 = "手を挙げ月を迎えれば、"
10054110-250 = "影を合わせ五つとなる。"
10054110-252 = "此の景色が皆を酔わせ、"
10054110-253 = "共に楽しみ、やがて散らん。"
10054110-255 = "道は川のほとりに続き、"
10054110-256 = "遥かな銀河にて、必ずやまた逢わん。"
