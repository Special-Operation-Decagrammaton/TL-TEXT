[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10054110-1 = "Episódio 11: Fogos de Artifício"
10054110-3 = "Uwaaaah!?"
10054110-4 = "Por queee...!"
10054110-5 = "Da próxima vez a gente vai fazer vocês pagarem caro! Vocês vão ver só...!!"
10054110-9 = "Esperem aí!"
10054110-10 = "Como elas correm rápido!"
10054110-11 = "Francamente! Estas crianças de hoje em dia não têm jeito!"
10054110-15 = "[ns] \"Alguém se machucou?\""
10054110-16 = "Sim, estamos todos bem."
10054110-19 = "[ns] (E a Kisaki...?)"
10054110-20 = "Os modos da Gangue dos Passarinhos continuam sendo um motivo de preocupação..."
10054110-21 = "Mas eu ficaria muito feliz se elas estivessem um pouco mais crescidas na próxima vez que nossos caminhos se cruzarem."
10054110-22 = "......"
10054110-23 = "Sensei. Não precisa se preocupar tanto."
10054110-24 = "Eu também tenho a minha parcela de culpa pelo que aconteceu hoje."
10054110-25 = "Vocês fizeram um ótimo trabalho hoje."
10054110-26 = "Especialmente a Kokona-chan. Você foi incrível."
10054110-27 = "E-Eh, do nada...?"
10054110-28 = "[s] \"Você foi uma verdadeira dama. Estou muito orgulhoso.\""
10054110-29 = "Poxa... Até você, Sensei."
10054110-30 = "Para a sua informação, eu sempre fui uma dama esplêndida!"
10054110-31 = "[s] \"Isso mesmo, isso mesmo!\""
10054110-40 = "(Todos elogiaram a Kokona enquanto faziam cafuné na cabeça dela)"
10054110-46 = "(Mesmo meio envergonhada, ela nos retribuiu com um sorriso radiante)"
10054110-51 = "――Por essas e outras! A disciplina desde a infância é muito importante, assim como aconteceu com aquelas meninas!"
10054110-52 = "Elogiar demais acaba surtindo um efeito negativo, sabiam?"
10054110-53 = "Apesar disso, ultimamente todo mundo parece ignorar esse fato, e isso me deixa muito preocupada!"
10054110-54 = "Até eu já apanhei da Irmãzona Shun..."
10054110-55 = "......Ugh..."
10054110-56 = "[s] \"......Tudo bem?\""
10054110-57 = "Quando a Irmãzona Shun fica brava... ela dá muito medo..."
10054110-58 = "Mas se você não a deixar irritada, ela é um anjo de tão gentil!"
10054110-63 = "......Eu nunca imaginei que poderíamos vir brincar juntas assim."
10054110-64 = "Nós brincávamos muito no passado, mas depois que ela virou instrutora, ficou ocupada demais."
10054110-65 = "É por isso que... eu também decidi me tornar uma instrutora."
10054110-66 = "[s] \"Você se esforçou muito, não foi?\""
10054110-67 = "N-Não foi pra tanto assim, sabe? Não foi grande coisa!"
10054110-68 = "......Quando eu estudava bastante, ela vivia me dando bronca, dizendo: 'Você precisa dormir pelo menos 7 horas por noite'."
10054110-69 = "Mas desde que virei instrutora, nós duas acabamos ficando ainda mais ocupadas..."
10054110-70 = "Ainda assim... Eu adoro o momento de agora."
10054110-71 = "Afinal, o Sensei também está aqui."
10054110-72 = "[s] \"Você é uma ótima garota, Kokona.\""
10054110-73 = "(Ué...? Ele acabou de me chamar só de... Kokona!?)"
10054110-74 = "Fufun, parece que você finalmente percebeu o meu charme!"
10054110-75 = "[s] \"Isso aí! A Kokona-chan é a melhor!\""
10054110-76 = "Ué!? Você colocou o 'chan' de novo!?"
10054110-77 = "Você tinha acabado de tirar ele e falar o meu nome normal..."
10054110-78 = "[s] \"Será que eu tirei meeeesmo~?\""
10054110-79 = "Poxa vida! Pare de zombar de mim!"
10054110-84 = "Sensei, Kokona-chan."
10054110-85 = "Irmãzona Shun!"
10054110-86 = "Ufufu, por acaso atrapalhei o encontro noturno de vocês?"
10054110-87 = "E-E-E-Encontro!?!?"
10054110-89 = "[ns] \"Isso mesmo. Eu estava num encontro com a Kokona.\""
10054110-90 = "Sensei!?"
10054110-91 = "Que inveja. Vocês não teriam um espacinho para essa irmãzona aqui?"
10054110-92 = "......!"
10054110-93 = "S-Sim! Como é você, Irmãzona Shun, eu abro uma exceção!"
10054110-94 = "Muito obrigada."
10054110-96 = "(E assim, a Kokona ficou no meio e nós três caminhamos juntos de mãos dadas)"
10054110-97 = "(De vez em quando a balançávamos pelos braços, e a Kokona abria sorrisos de orelha a orelha)"
10054110-99 = "Opa, parece que estão se divertindo pra valer."
10054110-100 = "Uhm? Sensei, está curioso para saber o que nós estávamos arrumando aqui?"
10054110-101 = "Hmph... É um dos grandes clássicos do verão―― Fogos de artifício!"
10054110-102 = "Uau! Fogos de artifício! Que demais!"
10054110-103 = "Vou acender agora mesmo!"
10054110-109 = "Tudo certo por aí?"
10054110-110 = "Graças a você!"
10054110-111 = "Ver os fogos daqui é uma experiência e tanto. O reflexo na água do rio fica maravilhoso."
10054110-112 = "Mal posso esperar para ver."
10054110-113 = "Vamos assistir juntos!"
10054110-114 = "......Obrigado.\nFico feliz em ver que vocês estão aproveitando o nosso desfiladeiro."
10054110-115 = "Nós é que deveríamos estar agradecendo, não é mesmo...?"
10054110-116 = "É também uma forma de agradecer pelo investimento, Genbu Express."
10054110-117 = "Opa. E eu planejando manter esse segredo até o final... Quando você percebeu?"
10054110-118 = "Hahaha... Nós comerciantes temos as nossas próprias redes de contatos na região."
10054110-119 = "......Eu deveria ter falado desde o começo. Me desculpe."
10054110-120 = "Tudo bem, não se preocupe. Tudo acontece por um motivo... O mundo dá voltas, não é?"
10054110-121 = "E de volta em volta... nós chegamos no agora."
10054110-122 = "Tanto para bens quanto para fundos, fazer a economia girar é o que importa."
10054110-123 = "Assim como o fluxo da água."
10054110-124 = "Ahaha! Realmente."
10054110-125 = "Sobre a Gangue dos Passarinhos... Obrigado por salvarem este lugar."
10054110-126 = "Ah, aquelas crianças foram apenas o empurrãozinho.\nSe continuássemos com medo da mudança... este lugar acabaria esquecido pelas pessoas aos poucos."
10054110-127 = "Foi a Genbu Express que decidiu apostar no potencial daqui e investir.\nNo entanto――"
10054110-128 = "Acho que não teríamos chegado tão longe se não tivéssemos a cooperação da Xuanlong Office."
10054110-130 = "De forma alguma, o mérito é todo da Senhora Monshu e de suas capacidades...!"
10054110-131 = "Ué, peraí!? A Senhora Monshu sumiu!? Senhooraaa Monshuuuu!!"
10054110-135 = "......Eu sempre ouvi boatos de que a Genbu Express e a Xuanlong Office não se davam nada bem."
10054110-136 = "E nós ainda não nos damos."
10054110-137 = "Mas você espera que isso melhore, mesmo que aos poucos?"
10054110-138 = "Sim. Fazer inimizades não traz lucro algum para os negócios."
10054110-139 = "Nesse caso, a sua atitude de mais cedo faz todo o sentido."
10054110-140 = "Será? Vamos deixar isso como um segredinho nosso."
10054110-141 = "......Você tem um futuro brilhante pela frente. Ou devo dizer assustador, de colega para colega."
10054110-142 = "É muito elogio. Eu ainda tenho um universo de coisas para aprender."
10054110-144 = "......Ara? Parece que começou."
10054110-145 = "Uau...!"
10054110-151 = "Na verdade... ainda tem várias atividades aqui que vocês não experimentaram."
10054110-152 = "Temos o rafting, a exploração das cavernas, o passeio de barco..."
10054110-153 = "Vou ter o prazer de experimentar todos eles amanhã."
10054110-154 = "Conseguiram encontrar a Senhora Monshu?"
10054110-155 = "Sim. Ela já deve estar chegando."
10054110-156 = "Será que ela estava ocupada com algum outro trabalho?\nEspero não tê-la atrapalhado com os fogos de artifício."
10054110-157 = "Não se preocupe com isso. Fogos de artifício são sempre bem-vindos a qualquer hora."
10054110-158 = "Você demorou, Kisaki."
10054110-160 = "Mil perdões. Eu estava tirando uma sonequinha da tarde."
10054110-161 = "Mas que bela de uma dorminhoca, hein!"
10054110-162 = "Estamos de férias. O meu corpo e a minha mente merecem um merecido repouso, não?"
10054110-165 = "[ns] \"......Kisaki?\""
10054110-166 = "Não precisa me olhar com tanta preocupação."
10054110-167 = "......Ah, sim, nós prometemos que falaríamos sobre esse assunto mais tarde."
10054110-168 = "......"
10054110-169 = "Fique calmo."
10054110-170 = "Tudo que eu disse foi a mais pura verdade."
10054110-171 = "É que eu estava me sentindo tão bem que acabei passando dos limites."
10054110-172 = "[s] \"O que você quer dizer com isso...?\""
10054110-173 = "Umu, bem..."
10054110-174 = "......"
10054110-175 = "Eu me perdi tanto na diversão que..."
10054110-176 = "......Esqueci completamente o horário do meu remédio."
10054110-177 = "[s] \"......Hã?\""
10054110-178 = "Não me olhe com essa cara feia... e, para deixar claro, eu não deixei de tomar."
10054110-179 = "Só que... como eu tomei atrasado, ele demorou um pouco mais para fazer efeito..."
10054110-180 = "[s] \"......\""
10054110-181 = "Para falar a verdade... Eu já tomei uma bronca terrível da Saya por esquecer o meu remédio antes."
10054110-182 = "Mas, ter que tomar os remédios e fazer os exercícios rigorosamente no mesmo horário todos os dias...\nNinguém é perfeito e todo mundo acaba deslizando de vez em quando, não concorda...?"
10054110-183 = "[s] \"Se você esquecer de novo, eu vou ficar muito bravo de verdade, ouviu...?\""
10054110-184 = "Ugh... Até você está falando igualzinho à Saya..."
10054110-185 = "......Eu serei mais cuidadosa de agora em diante."
10054110-186 = "......Umu? Quer uma prova da minha promessa?"
10054110-187 = "Por mim tudo bem, mas... o que exatamente você quer que eu faça?"
10054110-188 = "Quê... Que eu mesma vá relatar o meu descuido para a Saya?\nI-Isso já é crueldade demais...!"
10054110-189 = "[s] \"Isso é tudo para o seu próprio bem, Kisaki!\""
10054110-190 = "Haaah... Se você diz, eu aceito."
10054110-191 = "Que eu deveria ser um exemplo imaculado para todas? S-Sim, é claro que eu deveria, mas...!"
10054110-192 = "U-Umu..."
10054110-193 = "Não tem jeito..."
10054110-199 = "Monshu Kisaki. As suas férias... digo, a sua inspeção, está indo bem?\nNão precisa se preocupar com o Clube de Alquimia, tá tudo sob controle da grande eu!"
10054110-200 = "Hã? Você quer conversar? Comigo?"
10054110-203 = "......Monshu?"
10054110-204 = "E-Espera aí. Eu tenho uma ótima justificativa para isso...!"
10054110-205 = "Não fui eu mesma quem te disse no passado, Monshu?"
10054110-207 = "Nenhuma desculpa, por melhor que seja, pode ser mais importante do que seguir as orientações médicas!!"
10054110-213 = "Você tem essa aura de perfeitinha o tempo todo, mas é craque em dar umas escorregadas nessas coisas bestas!"
10054110-214 = "Assim que você pisar aqui, eu mesma vou te receber pessoalmente! Então se prepara!"
10054110-218 = "Uuuuh..."
10054110-219 = "[ns] \"Isso mesmo, você foi muito bem.\""
10054110-220 = "Acho que uma parte dessa culpa também recai sobre você, não é mesmo, Sensei!?"
10054110-221 = "......Não. O esquecimento foi inteiramente meu..."
10054110-222 = "[s] \"Vem cá.\""
10054110-228 = "......"
10054110-229 = "Pode fazer mais carinho..."
10054110-231 = "(A Kisaki levou um bom tempo até recuperar a sua moral depois disso)"
10054110-246 = "Erguemos as taças diante das montanhas e das águas,"
10054110-247 = "E brindamos juntos em harmonia."
10054110-249 = "Ao levantar as mãos para acolher a lua,"
10054110-250 = "Nossas sombras se fundem em cinco."
10054110-252 = "Esta paisagem inebria os corações de todos,"
10054110-253 = "Alegremo-nos juntos agora, pois o vento logo nos espalhará."
10054110-255 = "Os caminhos se alinham à beira do rio contínuo,"
10054110-256 = "Tenho fé que nos encontraremos novamente nos confins da Via Láctea."