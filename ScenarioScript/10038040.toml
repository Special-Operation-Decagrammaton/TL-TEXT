[translation]
10038040-1 = "第4話;過去と今の境界線"
10038040-7 = "なに、これ……！"
10038040-8 = "クラクラする……いきが……くるしい……！"
10038040-12 = "……"
10038040-13 = "しばらく休んでいなさい。#nこれは命に支障はありません。"
10038040-18 = "まさか、戻ってきたのか……！？"
10038040-19 = "サヤ会長がいない時に……こんな！"
10038040-28 = "山川に面影あれど――人傑は無く。"
10038040-29 = "空虚な街に――人影一つ見えず。"
10038040-30 = "ククッ……"
10038040-35 = "全て整いました。"
10038040-36 = "山海経――錬丹術研究会……"
10038040-37 = "やっと、帰ってこれたよ。"
10038040-38 = "盛大な歓迎とならず、申し訳ありません。"
10038040-39 = "ああ構わないよ。それでは、行こうか。"
10038040-46 = "ああ、恋しかったよ。[ruby=・   ・]私の[/ruby]錬丹術研究会。"
10038040-47 = "すべてが変わっても、ここだけは何一つ変わっていない。"
10038040-48 = "これからいかがされますか？#nすぐにご出立を？"
10038040-49 = "そうだね。向かおうか――例の場所に。"
10038040-50 = "かしこまりました。ご案内いたします。"
10038040-56 = "ここは当時のままのようだね。"
10038040-57 = "……[ruby=やくし]薬子[/ruby]サヤから隠し通すのに多少骨が折れましたが、当時のまま保持しております。"
10038040-58 = "ククッ……あの子は勘が鋭いからねぇ。"
10038040-59 = "そんな彼女からこの施設を隠し通した君の手腕を讃えた方が良いかな？"
10038040-60 = "身に余るお言葉です。"
10038040-61 = "……やっと、戻ってこれた。"
10038040-62 = "真の錬丹術研究会――私のすべてが詰まったこの場所……"
10038040-64 = "存分にお使いください。#n錬丹術研究会は、カイ様のものですので。"
10038040-65 = "薬剤も施設も、カイ様が山海経を発った時から何一つ動かしておりません。"
10038040-67 = "お疲れ様。#nじゃあ、一つ再開するとしようか――"
10038040-71 = "――「仙丹」の研究を。"
10038040-79 = "はあ、はあ……！"
10038040-80 = "もう息が上がっているんです？#nあなた、それでも玄龍門の執行部長ですか？"
10038040-81 = "まあ、以前もそうでしたよね……あなた、見かけ以上に体力がないですから。"
10038040-82 = "う、うるさい！夜中に急に呼び出されたんだ！しょうがないだろ！"
10038040-83 = "まあ、それは私も同じですが……。"
10038040-84 = "しかし、門主様は一体何をお考えに……なぜ玄武商会の……#nよりによってこいつと共に任務を遂行するよう命じられたのだろう……"
10038040-85 = "全部聞こえてますよ……執行部長ともあろう人が、門主様の命令に背くつもりですか？"
10038040-86 = "その言葉、お前にだけは言われたくない！"
10038040-90 = "伝えられたのは、錬丹術研究会が襲撃されたという情報だけだ。#n具体的に何が起こっているかは分からない。"
10038040-91 = "なんだか普段と雰囲気が――"
10038040-100 = "……だいぶ、違うようですね。"
10038040-101 = "あれは……ブラックマーケットの傭兵？#nどうして錬丹術研究会に……！"
10038040-108 = "痛いじゃないか！"
10038040-109 = "考える手間が省けて良いですね。"
10038040-110 = "……お前の頭に入っているの、絶対筋肉だろ。"
10038040-111 = "……少なくとも、ノワール映画でぎゅうぎゅう詰めにしてはいませんよ。"
10038040-115 = "こいつら……"
10038040-121 = "……人が話をしている最中だぞ！"
10038040-132 = "正門から、玄龍門が来たとの報告がありました。"
10038040-137 = "既にブラックマーケットの傭兵を手配している。時間を稼ぐよう伝えてくれ。"
10038040-138 = "……承知しました。"
10038040-139 = "（いくらカイ様の命といえど、山海経に外部の兵を入れるのを良しとすべきなのか……）"
10038040-140 = "不安そうだねぇ。ククッ……"
10038040-144 = "ち、違います。私は……！"
10038040-145 = "発展のためには、混沌も必要なのだよ。#n薬剤が化学反応で生み出されるように、ね。"
10038040-146 = "山海経は閉じこもってばかりだったからねぇ。些かそれが足りていなかったのさ。"
10038040-147 = "留まってばかりでは前に進むことなどできない。#n時には外部の風が必要なのさ。"
10038040-152 = "……"
10038040-153 = "そう時間はかからないよ……そうさね、数時間ほどで一次仙丹の製造は終わるだろう。"
10038040-154 = "そんなに早く完成できるのに、なぜ今まで……？"
10038040-155 = "おや、知らなかったのかい？"
10038040-159 = "この仙丹は、キヴォトスでも[ruby=・   ・]ここ[/ruby]でしか作れないのだよ。"
10038040-160 = "それは……立地の問題ですか？それとも風水的なものですか？"
10038040-161 = "いや。錬丹術研究会秘伝の薬材と秘法が保管されている場所だからさ。"
10038040-162 = "[ruby=まんねんじん]萬年参[/ruby]の鮮度を落とすことなく手に入れられるのも、ここしかないからね。"
10038040-166 = "サヤはこれらを受け継げていなかったみたいだけど。ククッ……"
10038040-174 = "終わったか……？"
10038040-179 = "……どうやら、こいつらは先遣隊だったようです。"
10038040-187 = "……不愉快だ。"
10038040-188 = "何故これだけの外部勢力が山海経に入って来られたのだ！"
10038040-189 = "それは……玄龍門が山海経全体の立ち入り制限をしたせいでは……？#n他の警備が疎かになったのでしょう。"
10038040-193 = "……根に持ちすぎじゃないか！？#nたった数日、商会通りの立ち入りを制限しただけだというのに！"
10038040-194 = "うちの立場になってください！#nどれだけ赤字が出たと思っているんですか！？"
10038040-200 = "次から次へと……キリがないな。"
10038040-201 = "少なくとも、錬丹術研究会の内部に入ってほしくないのはたしかなようですね。"
10038040-205 = "強行突破だ。ついて来れるか？"
10038040-209 = "そちらこそ、遅れをとらないでくださいね。"
10038040-214 = "はっ。自信満々だな。#n……いくぞ！"
