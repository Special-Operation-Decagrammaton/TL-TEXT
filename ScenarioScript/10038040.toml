[translation]
10038040-1 = "Episódio 4: A Fronteira entre o Passado e o Presente"
10038040-7 = "O que é isso...!"
10038040-8 = "Estou tonta... minha respiração... está difícil...!"
10038040-12 = "……"
10038040-13 = "Descanse um pouco. #nIsso não coloca sua vida em risco."
10038040-18 = "Não me diga que você voltou...!?"
10038040-19 = "Justo quando a Presidente Saya não está... isso é!"
10038040-28 = "As montanhas e rios permanecem, mas os grandes homens se foram."
10038040-29 = "Na cidade vazia, nem uma alma se vê."
10038040-30 = "Hehe..."
10038040-35 = "Tudo está pronto."
10038040-36 = "Shanhaijing — Clube de Pesquisa de Alquimia..."
10038040-37 = "Finalmente, estou de volta."
10038040-38 = "Peço desculpas por não termos preparado uma recepção grandiosa."
10038040-39 = "Ah, não se preocupe. Então, vamos nessa?"
10038040-46 = "Ah, como senti saudades. Meu Clube de Pesquisa de Alquimia."
10038040-47 = "Mesmo que tudo tenha mudado, este lugar continua exatamente igual."
10038040-48 = "O que deseja fazer agora? #nPartirá imediatamente?"
10038040-49 = "É verdade. Vamos seguir para... aquele lugar."
10038040-50 = "Como desejar. Vou guiá-lo."
10038040-56 = "Parece que este lugar continua como era naquela época."
10038040-57 = "...Foi um pouco difícil esconder da Saya, mas mantive tudo como estava na época."
10038040-58 = "Hehe... Aquela garota tem um instinto muito aguçado, afinal."
10038040-59 = "Devo elogiar sua habilidade por ter escondido esta instalação dela?"
10038040-60 = "É um elogio generoso demais."
10038040-61 = "...Finalmente, voltei."
10038040-62 = "O verdadeiro Clube de Pesquisa de Alquimia... este lugar onde tudo o que sou está guardado..."
10038040-64 = "Por favor, use-o à vontade. #nO Clube de Pesquisa de Alquimia pertence a você, Kai."
10038040-65 = "Nem os medicamentos nem as instalações foram movidos desde que você deixou Shanhaijing."
10038040-67 = "Bom trabalho. #nEntão, vamos retomar uma coisa..."
10038040-71 = "— A pesquisa do 'Elixir'."
10038040-79 = "Haa, haa...!"
10038040-80 = "Já está ofegante? #nVocê é mesmo a Chefe Executiva do Xuanlongmen?"
10038040-81 = "Bem, antes também era assim... você tem menos resistência do que aparenta."
10038040-82 = "C-cala a boca! Fui chamada de repente no meio da noite! Não tenho culpa!"
10038040-83 = "Bem, comigo também foi igual, mas..."
10038040-84 = "Mas o que o Líder do Portão está pensando... Por que ordenar que eu realize uma missão com alguém da Associação Comercial Xuanwu... #njusto com essa pessoa..."
10038040-85 = "Estou ouvindo tudo... Como alguém no cargo de Chefe Executiva, pretende desobedecer às ordens do Líder?"
10038040-86 = "Não quero ouvir isso vindo justamente de você!"
10038040-90 = "A única informação que recebemos foi que o Clube de Pesquisa de Alquimia foi atacado. #nNão sabemos exatamente o que está acontecendo."
10038040-91 = "A atmosfera está um pouco diferente do habitual..."
10038040-100 = "...Parece bem diferente, de fato."
10038040-101 = "Aqueles são... mercenários do mercado negro? #nPor que eles estariam no Clube de Pesquisa de Alquimia...!"
10038040-108 = "Isso dói, sabia!"
10038040-109 = "É bom que nos poupa o trabalho de pensar."
10038040-110 = "...O que você tem na cabeça deve ser puro músculo."
10038040-111 = "...Pelo menos eu não estou cheia de clichês de filmes noir."
10038040-115 = "Esses caras..."
10038040-121 = "...Estamos no meio de uma conversa!"
10038040-132 = "Recebemos um relatório de que o Xuanlongmen chegou pelo portão principal."
10038040-137 = "Já providenciei mercenários do mercado negro. Diga a eles para ganharem tempo."
10038040-138 = "……Entendido."
10038040-139 = "（Mesmo sendo uma ordem do Lorde Kai, será que permitir a entrada de forças externas em Shanhaijing é realmente o certo a se fazer……）"
10038040-140 = "Parece preocupada, não é? Hehe……"
10038040-144 = "N-não, não é isso. Eu……!"
10038040-145 = "Para o progresso, o caos também é necessário. #nAssim como os medicamentos são criados através de reações químicas."
10038040-146 = "Shanhaijing sempre foi muito fechada, sabe? Faltava um pouco disso."
10038040-147 = "Não se pode avançar se você ficar parado no mesmo lugar. #nÀs vezes, é preciso um vento externo."
10038040-152 = "……"
10038040-153 = "Não vai demorar muito…… vejamos, a produção do elixir primário terminará em algumas horas."
10038040-154 = "Se pode ser concluído tão rápido, por que até agora……?"
10038040-155 = "Ora, você não sabia?"
10038040-159 = "Este elixir só pode ser feito aqui, em Kivotos."
10038040-160 = "Isso é…… por causa da localização? Ou algo relacionado ao Feng Shui?"
10038040-161 = "Não. É porque este é o lugar onde os ingredientes secretos e as técnicas ocultas do Clube de Pesquisa de Alquimia são guardados."
10038040-162 = "Além disso, este é o único lugar onde se pode obter o Ginseng Milenar sem perder o frescor."
10038040-166 = "Parece que Saya não conseguiu herdar nada disso. Hehe……"
10038040-174 = "Acabou……?"
10038040-179 = "……Ao que parece, eles eram apenas a vanguarda."
10038040-187 = "……Que desagradável."
10038040-188 = "Como tantas forças externas conseguiram entrar em Shanhaijing!"
10038040-189 = "Isso não foi…… por causa das restrições de entrada impostas pelo Xuanlongmen em toda Shanhaijing? #nA segurança em outros lugares deve ter ficado negligenciada."
10038040-193 = "……Você não está guardando rancor demais por causa disso!? #nFoi apenas por alguns dias que restringimos o acesso à rua comercial!"
10038040-194 = "Tente se colocar no nosso lugar! #nVocê tem ideia de quanto prejuízo isso causou!?"
10038040-200 = "Um atrás do outro…… isso não tem fim."
10038040-201 = "Pelo menos, é certo que eles não querem que entremos no Clube de Pesquisa de Alquimia."
10038040-205 = "Vamos romper à força. Consegue me acompanhar?"
10038040-209 = "Você é quem deve tomar cuidado para não ficar para trás."
10038040-214 = "Hah. Quanta confiança. #n……Vamos nessa!"
