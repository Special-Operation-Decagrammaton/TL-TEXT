[translation]
1601606-1 = "Desculpas mútuas"
1601606-2 = "（Terminei o trabalho mais cedo e fiquei esperando Mine no café）"
1601606-6 = "Você veio, Sensei."
1601606-11 = "……O que achou?"
1601606-12 = "[s1] \"Combina muito com você, Mine.\"\n[s2] \"Está um pouco nervosa?\""
1601606-17 = "I-Isso é……."
1601606-21 = "……Ufa."
1601606-22 = "Sim…… como disse, estou nervosa."
1601606-23 = "Faz tempo que não visto isso, mas ainda acho um traje muito bonito."
1601606-24 = "Foi um erro ter pensado em me desfazer dele."
1601606-25 = "Graças a você, Sensei."
1601606-26 = "Como posso agradecer por isso……."
1601606-27 = "[s3] \"Não se preocupe.\"\n[s4] \"Graças a isso, também estou aproveitando minha folga.\""
1601606-30 = "……Fufu."
1601606-31 = "Fico feliz em ouvir isso. #nVocê é tão gentil, Sensei……."
1601606-32 = "Fufu, para mim, é bom ter um pretexto para encontrar você assim, Sensei."
1601606-33 = "Só que……."
1601606-34 = "……Hmm."
1601606-38 = "[ns] \"Mine?\""
1601606-42 = "Bem, como posso dizer."
1601606-46 = "Depois que me dei conta de que é um traje especial, fiquei um pouco envergonhada……."
1601606-47 = "Não é como se houvesse um carnaval, uma sessão de fotos ou um show……."
1601606-48 = "Fico preocupada se as pessoas ao redor estão me olhando de um jeito estranho."
1601606-49 = "……Afinal, estou caminhando ao lado do Sensei."
1601606-53 = "？……Entendo."
1601606-54 = "Então não preciso me preocupar, é isso?"
1601606-56 = "[ns5] \"Você só está vestindo uma roupa bonita.\"\n[ns6] \"Na verdade, eu adoraria que você usasse mais vezes!\""
1601606-61 = "……！"
1601606-62 = "Não precisa dizer tanto assim!"
1601606-63 = "Eu não mereço ouvir essas palavras……."
1601606-68 = "……Fufu, fufufu."
1601606-69 = "[s7] \"……Mine?\"\n[s8] \"O que houve……?\""
1601606-74 = "Peço desculpas. #nAo pensar friamente sobre a situação, acabei rindo."
1601606-75 = "O tempo que passo com você, Sensei, me deixa relaxada."
1601606-76 = "Já que fizemos um esforço para arranjar tempo um para o outro……."
1601606-77 = "Agora, aceitarei com gratidão o seu tempo, Sensei."
1601606-81 = "Seria um desperdício ficar parada aqui."
1601606-82 = "Vamos nos mover?"
1601606-88 = "Sensei, deixe-me escoltá-lo."
1601606-89 = "Venha, por aqui."
1601606-96 = "（Segui a orientação de Mine até o rio próximo）"
1601606-100 = "（Talvez por causa do bom tempo, havia bastante gente）"
1601606-104 = "Tem mais gente do que eu pensava."
1601606-105 = "Seria melhor se estivesse um pouco mais calmo……."
1601606-109 = "……Tive uma boa ideia."
1601606-110 = "Sensei, vamos ali."
1601606-117 = "[ns9] \"……Isso é?\"\n[ns10] \"Um pedalinho……?\""
1601606-120 = "……Sim, Sensei."
1601606-121 = "Acho que aqui podemos passar um tempo a sós."
1601606-131 = "Sensei, vai balançar, então por favor, segure minha mão."
1601606-132 = "Você deve estar exausto, não há problema em tirar uma soneca. #nQuer que eu cante uma canção de ninar para você?"
1601606-136 = "Fufu."
1601606-137 = "Eu estarei vigiando, então pode ficar tranquilo."
1601606-142 = "……Descanse um pouco."
1601606-144 = "（Depois disso, comecei a remar o barco junto com Mine, mas……）"
1601606-148 = "（Enquanto ouvia a voz suave de Mine cantando, acabei adormecendo sem perceber）"
