[translation]
1601606-1 = "お互いの口実"
1601606-2 = "（早めに仕事を切り上げ、カフェでミネを待っていた）"
1601606-6 = "こちらにいらっしゃったのですね、先生。"
1601606-11 = "……どう、でしょうか？"
1601606-12 = "[s1] \"よく似合ってるよ、ミネ。\"\n[s2] \"少し緊張してる？\""
1601606-17 = "そ、それは……。"
1601606-21 = "……ふぅ。"
1601606-22 = "はい……仰る通り、緊張しております。"
1601606-23 = "久しぶりに袖を通しましたが、やはりとても可愛い衣装ですね。"
1601606-24 = "処分しようとしていたのは間違いでした。"
1601606-25 = "先生のおかげです。"
1601606-26 = "どうお礼を言ったら良いものか……。"
1601606-27 = "[s3] \"気にしないで。\"\n[s4] \"おかげで私も休暇を満喫できてるから。\""
1601606-30 = "……ふふっ。"
1601606-31 = "でしたら何よりです。#n先生は、本当にお優しい……。"
1601606-32 = "ふふ、私としてもこうして先生とお会いする口実ができるのは良いことです。"
1601606-33 = "ただ……。"
1601606-34 = "……うーん。"
1601606-38 = "[ns] \"ミネ？\""
1601606-42 = "その、なんて言いましょうか。"
1601606-46 = "特別な衣装だと意識してから、少し恥ずかしさを……。"
1601606-47 = "謝肉祭があるわけでもなく、撮影やライブがあるわけでもないので……。"
1601606-48 = "周囲から変な目で見られているのではないか、と気になってしまうのです。"
1601606-49 = "……先生のお隣を歩くわけですし。"
1601606-53 = "？……なるほど。"
1601606-54 = "気にする必要はないのですね。"
1601606-56 = "[ns5] \"可愛い服を着てるだけだからね。\"\n[ns6] \"むしろ、もっと着てもらいたいくらいだよ！\""
1601606-61 = "……！"
1601606-62 = "そこまで言ってくださらなくて大丈夫です！"
1601606-63 = "私に、そんなお言葉は……。"
1601606-68 = "……ふふ、ふふふっ。"
1601606-69 = "[s7] \"……ミネ？\"\n[s8] \"どうしたの……？\""
1601606-74 = "申し訳ありません。#n冷静にこの状況を考えてみたら、笑ってしまいました。"
1601606-75 = "先生と過ごす時間は、気を張らずにいられますね。"
1601606-76 = "せっかく、こうしてお互い時間を作ったわけですし……。"
1601606-77 = "今は、ありがたく先生の時間を頂戴いたします。"
1601606-81 = "ずっとここにいては、もったいありません。"
1601606-82 = "そろそろ移動しましょうか。"
1601606-88 = "先生、エスコートいたしましょう。"
1601606-89 = "さあ、こちらへ。"
1601606-96 = "（ミネの案内を受けて、近くの川に向かった）"
1601606-100 = "（天気が良かったからか、それなりに人がいた）"
1601606-104 = "思ったよりも人が多いですね。"
1601606-105 = "もう少し、静かだと良かったのですが……。"
1601606-109 = "……良い案を思いつきました。"
1601606-110 = "先生、あちらへ行きましょう。"
1601606-117 = "[ns9] \"……これは？\"\n[ns10] \"足漕ぎボート……？\""
1601606-120 = "……はい、先生。"
1601606-121 = "ここでなら、二人で過ごせるかと。"
1601606-131 = "先生、揺れますから、私の手をお掴みください。"
1601606-132 = "お疲れでしょうし、一眠りしても構いませんよ。#n子守唄でも歌って差し上げましょうか？"
1601606-136 = "ふふっ。"
1601606-137 = "私が見守っていますから、ご安心を。"
1601606-142 = "……ゆっくりお休みください。"
1601606-144 = "（その後、ミネと一緒にボートを漕ぎ始めたが……）"
1601606-148 = "（ミネの小さな歌声を聞いていると、いつの間にか眠ってしまっていた）"
