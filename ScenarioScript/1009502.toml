[translation]
1009502-1 = "Eu serei sua empregada, doutor!"

1009502-2 = "(O cronograma do Milênio está mais tranquilo do que o esperado ......)"

1009502-3 = "(Decidiu visitar o Departamento de Desenvolvimento de Jogos para chegar até Midori)"

1009502-7 = "[ns] \"Sorry to disturb you. \""

1009502-9 = "Se, se, se, se, se, professor!"

1009502-10 = "Eu disse que gostaria que você viesse, mas não tenho certeza agora. ......"

1009502-11 = "[s1] \"Olá, Midori. \"\n[s2] \"Então, hoje você está usando uma roupa de empregada. \"\n[s2]""

1009502-14 = "Ei, por que essa é uma reação tão normal?"

1009502-15 = "[\"Não, quero dizer, estou me acostumando com as pedras. \""

1009502-16 = "Isso é um pouco triste!"

1009502-17 = "[s]\"Por quê! \""

1009502-18 = "Porque, na minha opinião, isso está se movendo por si só. ......"

1009502-19 = "Também é possível se sentir lisonjeado por roupas incomuns. ......"

1009502-20 = "Mas, é claro, isso não é necessariamente uma coisa ruim. ......"

1009502-21 = "Bem, eu diria que estava esperando uma resposta diferente. ......"

1009502-22 = "[s]\"Quando você diz reação, quer dizer, por exemplo, ......? \""

1009502-23 = "Você vai me obrigar a dizer isso!"

1009502-24 = "Não, se o professor quiser perguntar, ficaremos felizes em responder. ......"

1009502-26 = "Bem, hum, bem, em resumo. ......!"

1009502-27 = "[\"Midori, não tenha pressa, está tudo bem, acalme-se. ...... \""

1009502-30 = "Eu estava pensando em um design de personagem para um jogo, no qual a empregada seria a protagonista."

1009502-31 = "Mas continuei pensando sobre isso e fiquei cada vez mais confuso. ......"

1009502-32 = "As roupas de empregada doméstica têm muitas referências. ......"

1009502-33 = "Já existe muito disso no mundo. ......"

1009502-34 = "Por isso, ao contrário, eu diria que não tinha certeza de qual deles deveria ser o foco."

1009502-35 = "Portanto, se você realmente se tornar uma empregada doméstica, poderá ter uma #nova perspectiva. ......"

1009502-36 = "[s]\"Estou vendo? \""

1009502-37 = "Ei, parece que você está olhando para mim de uma forma estranha. ......"

1009502-38 = "Isso é natural para um ilustrador!"

1009502-39 = "É chato ser uma empregada doméstica convencional, isso é o que acontece hoje em dia!"

1009502-40 = "Uma empregada que é forte, talentosa e demonstra fraqueza apenas para si mesma. ...... #nHá tantos desse tipo que até um cachorro pode andar e bater em uma vara."

1009502-41 = "Elas se infiltram, assassinam ...... e, no final, salvam o mundo - mesmo que essas empregadas sejam agora comuns!"

1009502-42 = "[s] (será que a última é uma peculiaridade? ......)"

1009502-43 = "Então, aqui estamos! #Pensei em virar o jogo e escolher uma empregada ortodoxa!"

1009502-44 = "Mas agora outras preocupações vieram à mente. ......"

1009502-45 = "...... O que exatamente é uma empregada doméstica ortodoxa?"

1009502-46 = "O que seus professores acham?"

1009502-47 = "[s]\"Uau, também não estou nem um pouco familiarizado com isso. ...... \""

1009502-48 = "De alguma forma, estou encontrando pistas."

1009502-49 = "A coisa mais importante para uma empregada ortodoxa ainda é o "mestre"!"

1009502-50 = "Dirija, gerencie e recompense o trabalho que excede as expectativas. ...... #n E punir o trabalho ruim!"

1009502-51 = "É somente com esses "mestres" que elas são empregadas legítimas!"

1009502-52 = "Em termos realistas, a #nMaid não pode existir sem um empregador remunerado!"

1009502-53 = "[\"Sim, pode ser que sim. \""

1009502-54 = "Certo? Fico feliz que o Dr. N entenda."

1009502-55 = "Voltando ao assunto, é importante para mim agora entender as empregadas. ......"

1009502-56 = "Para entender as empregadas domésticas, é preciso ser uma empregada doméstica."

1009502-57 = "E ser uma empregada doméstica..."

1009502-58 = "Preciso de um mestre!"

1009502-59 = "Portanto, serei uma empregada de professor por um tempo!"

1009502-60 = "[s]\"......Vamos nos acalmar um pouco! \""

1009502-61 = "Não, estou calmo! #nPorque essa é uma conclusão ponderada."

1009502-62 = "Pelo menos é mais lógico do que os cenários escritos por sua irmã!"

1009502-63 = "[s]\"Persuasivo é ......! \""

1009502-64 = "Ufa, não é mesmo?"

1009502-65 = "Portanto, de agora em diante, sou uma empregada de professor. Não sou um vagabundo, mas, por favor, cuide de mim de agora em diante."

1009502-66 = "Com o que devemos começar?"

1009502-67 = "Mestre?"

1009502-68 = "Podemos voltar para o condado com você agora e ajudá-lo com várias tarefas domésticas, no entanto. ......?"

1009502-72 = "...... Boa ideia, mesmo que você mesmo diga isso. Vamos #n fazer isso imediatamente!"

1009502-73 = "[\"Midori, acalme-se. ....... \""

1009502-74 = "......? #nEstou calmo, doutor?"

1009502-76 = "(Ela conseguiu fazer com que os mosquitos voltassem para suas placas de petri. ......)"

