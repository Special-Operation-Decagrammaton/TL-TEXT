[translation]
1009502-1 = "Serei sua empregada, professora!"

1009502-2 = "(Os planos do Milênio foram mais tranquilos do que eu esperava...)"

1009502-3 = "(Decidi visitar o departamento de desenvolvimento de jogos para ver Midori.)"

1009502-7 = "[ns] \"Desculpe incomodá-lo.\""

1009502-9 = "Se-se-se-se-sensei! ?"

1009502-10 = "Eu disse que queria que você viesse, mas agora...!"

1009502-11 = "[s1] \"Olá, Midori.\"\n[s2] \"Hoje você está vestindo uma fantasia de empregada doméstica.\""

1009502-14 = "P-por que é uma reação tão normal!? ?"

1009502-15 = "[s] \"Bem, acho que me acostumei com isso.\""

1009502-16 = "Isso é um pouco triste!"

1009502-17 = "[s] \"Por quê!?\""

1009502-18 = "Bem, agora você está dizendo que estou apenas ocupado sozinho...!"

1009502-19 = "Mesmo usando roupas diferentes do normal, ainda sou tratada como se estivesse tudo bem...!"

1009502-20 = "Bem, claro, isso não é uma coisa ruim..."

1009502-21 = "Acho que você poderia dizer que eu esperava uma reação diferente..."

1009502-22 = "[s] \"Quando você diz reação, por exemplo...?\""

1009502-23 = "Você está me fazendo dizer isso? ?"

1009502-24 = "Não, se o professor quiser perguntar, quem deve responder é Hayabusaka..."

1009502-26 = "Bem, isso é tudo...!"

1009502-27 = "[s] \"Midori, não há problema em não ter pressa, então acalme-se...\""

1009502-30 = "Eu estava pensando em um design de personagem para um jogo onde uma empregada seria a personagem principal."

1009502-31 = "Mas quanto mais eu pensava nisso, mais eu começava a não entender..."

1009502-32 = "Existem tantos materiais de referência para fantasias de empregada doméstica..."

1009502-33 = "Há tantos deles por aí que é incômodo..."

1009502-34 = "Por outro lado, eu diria que não sabia em qual focar."

1009502-35 = "Então, pensei que se eu realmente tentasse me tornar empregada doméstica, poderia conseguir uma nova perspectiva..."

1009502-36 = "[s] \"Entendo?\""

1009502-37 = "É como se eles estivessem me olhando de uma forma estranha..."

1009502-38 = "Como ilustrador, isso é natural!"

1009502-39 = "#nVivemos numa época em que empregadas domésticas comuns são chatas!"

1009502-40 = "Uma empregada forte e talentosa que só mostra sua fraqueza para si mesma... #nHá tantos desse tipo hoje em dia que até um cachorro vai dar de cara com um pedaço de pau se você andar por aí."

1009502-41 = "Elas se infiltram e assassinam... e no final, salvam o mundo - #n Até essas empregadas são comuns hoje em dia!"

1009502-42 = "[s] (Eu me pergunto qual é o último...)"

1009502-43 = "Então aqui está! #nPensei em ir com uma empregada ortodoxa com uma ideia completamente diferente!"

1009502-44 = "Porém, desta vez outro problema me veio à mente..."

1009502-45 = "...O que exatamente é uma empregada ortodoxa?"

1009502-46 = "O que você acha, professor?"

1009502-47 = "[s] \"E-eu também não sei muito sobre isso...\""

1009502-48 = "De alguma forma, encontrei uma pista."

1009502-49 = "O mais importante para uma empregada ortodoxa é o “mestre”!"

1009502-50 = "Dê instruções, gerencie e recompense o trabalho que supere as expectativas... #nE puna o trabalho insatisfatório!"

1009502-51 = "Ter tal “mestre” é o que torna uma empregada ortodoxa!"

1009502-52 = "Mesmo se você pensar nisso de forma realista, #nmaids não podem existir sem um empregador que as pague!"

1009502-53 = "[s] \"Bem, isso pode ser verdade.\""

1009502-54 = "Certo? #nFico feliz que o professor tenha entendido."

1009502-55 = "Voltando ao assunto, o que é importante para mim agora é entender as empregadas domésticas..."

1009502-56 = "Para entender uma empregada doméstica, você tem que se tornar uma."

1009502-57 = "E para se tornar uma empregada doméstica――"

1009502-58 = "Eu preciso de um mestre!"

1009502-59 = "Então serei sua empregada por um tempo!"

1009502-60 = "[s] \"...Vamos nos acalmar!\""

1009502-61 = "Não, estou calmo! #nEsta é a conclusão a que cheguei depois de pensar sobre isso."

1009502-62 = "Pelo menos é mais lógico que o cenário escrito pela sua irmã!"

1009502-63 = "[s] \"Tem algum poder persuasivo?\""

1009502-64 = "Hehe, é verdade, não é?"

1009502-65 = "Portanto, de agora em diante, sou a empregada doméstica da professora. #nSou uma pessoa insolente, mas espero seu apoio contínuo."

1009502-66 = "Por onde devemos começar?"

1009502-67 = "Mestre?"

1009502-68 = "Posso voltar para minha placa de Petri com você agora e ajudá-lo em várias tarefas domésticas, mas...?"

1009502-72 = "...Se assim posso dizer, é uma boa ideia. #nFaça agora!"

1009502-73 = "[s] \"Midori, acalme-se...\""

1009502-74 = "...? #nEstou calmo, senhor?"

1009502-76 = "(Consegui acalmar Midori e voltei para a placa de Petri...)"

