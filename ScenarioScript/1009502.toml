[translation]
1009502-1 = "メイドになりますよ、先生！"
1009502-2 = "（ミレニアムの予定が思ったよりスムーズに片付き……）"
1009502-3 = "（ミドリの元へ向かうため、ゲーム開発部を訪ねることにした）"
1009502-7 = "[ns] \"お邪魔します。\""
1009502-9 = "せ、せせせせ先生！？"
1009502-10 = "来てほしいとは言ったものの、今はちょっと……！"
1009502-11 = "[s1] \"こんにちは、ミドリ。\"\n[s2] \"今日はメイド服なんだね。\""
1009502-14 = "な、何でそんな普通の反応なんですか！？"
1009502-15 = "[s] \"いやその、流石に慣れてきたというか。\""
1009502-16 = "それはそれでちょっと悲しいです！"
1009502-17 = "[s] \"なんで！？\""
1009502-18 = "だ、だってこれでは、一人でバタバタしてるだけと言いますか……！"
1009502-19 = "いつもと違う服なのに、平然とされるのも……！"
1009502-20 = "も、もちろん、それが悪いわけではないんですけど……。"
1009502-21 = "その、別の反応を期待していたと言いますか……。"
1009502-22 = "[s] \"反応っていうと、例えば……？\""
1009502-23 = "それを言わせるんですか！？"
1009502-24 = "いえ、先生が聞きたいなら、お答えするのもやぶさかでは……。"
1009502-26 = "え、えっとその、要するにですね……！"
1009502-27 = "[s] \"ミドリ、ゆっくりで大丈夫だから落ち着いて……。\""
1009502-30 = "メイドが主人公になる、ゲームのキャラデザを考えていたんです。"
1009502-31 = "でもずっと考えてたら、段々よく分からなくなっちゃって……。"
1009502-32 = "メイド服って、すごく参考資料が多いんですよ……。"
1009502-33 = "もう、世に溢れすぎてて困るくらいで……。"
1009502-34 = "それで逆に、どれを軸にするか迷ってしまったと言いますか。"
1009502-35 = "そこで実際にメイドになってみたら、#n新しい視点が得られるかも、と……。"
1009502-36 = "[s] \"なるほど？\""
1009502-37 = "な、何だか不思議な目線をされてるような……。"
1009502-38 = "これくらい、イラストレーターとして当然です！"
1009502-39 = "ありきたりなメイドじゃつまらない、#nそういう時代なんですよ！"
1009502-40 = "強くて優秀で、自分にだけ弱い姿を見せてくれるメイド……。#nそのタイプは今や、犬も歩けば棒に当たるほど沢山います。"
1009502-41 = "潜入や暗殺をこなし……そして、最後は世界を救う――#nそんなメイドですら、今やありふれた存在です！"
1009502-42 = "[s] （後者は流石にどうなんだろう……）"
1009502-43 = "ですからここは！#n逆転の発想で、正統派メイドで行こうかと！"
1009502-44 = "しかし、今度は別の悩みが浮かんできてしまって……。"
1009502-45 = "……正統派のメイドとは、一体何なのでしょうか？"
1009502-46 = "先生はどう思いますか？"
1009502-47 = "[s] \"わ、私もちょっと詳しくないな……。\""
1009502-48 = "何となく、糸口は見つけてるんです。"
1009502-49 = "正統派メイドにとって大切なのは、やはり「ご主人様」！"
1009502-50 = "指示を出し、管理し、期待を超える仕事には報酬を……。#nそして、不十分な仕事には罰を与える！"
1009502-51 = "そういった「ご主人様」がいてこその正統派メイドなんです！"
1009502-52 = "現実的に考えても、報酬をくれる雇い主も無しに#nメイドは存在できません！"
1009502-53 = "[s] \"そ、それはそうかも。\""
1009502-54 = "ですよね？#n先生が理解してくださって嬉しいです。"
1009502-55 = "話は戻りますが、今の私にとって重要なのはメイドを理解すること……。"
1009502-56 = "メイドを理解するには、メイドになりきらないといけません。"
1009502-57 = "そして、メイドになりきるためには――"
1009502-58 = "ご主人様が必要なんです！"
1009502-59 = "だから私、しばらく先生のメイドになります！"
1009502-60 = "[s] \"……ちょっと落ち着こうか！\""
1009502-61 = "いえ、私は冷静です！#nこれは考えに考えた末の結論ですから。"
1009502-62 = "少なくとも、お姉ちゃんの書くシナリオよりは論理的です！"
1009502-63 = "[s] \"説得力が……ある！？\""
1009502-64 = "ふふっ、そうですよね？"
1009502-65 = "ですから、今から私は先生のメイドです。#n不束者ですが、以後よろしくお願いしますね。"
1009502-66 = "まず、何からいたしましょうか。"
1009502-67 = "ご主人様？"
1009502-68 = "今から一緒にシャーレに帰って、色々と家事をお手伝いすることも#nできますけど……？"
1009502-72 = "……自分で言っておいて何ですが、良い考えですね。#nすぐに実行しましょう！"
1009502-73 = "[s] \"ミドリ、落ち着いて……。\""
1009502-74 = "……？#n私は落ち着いてますよ、先生？"
1009502-76 = "（ミドリをなんとかなだめて、シャーレに戻った……）"
