[translation]
1602005-1 = "A Certain Sniper's Loneliness"
1602005-2 = "(After reading Otogi's ominous Momotalk, I immediately headed to the #nunderground where FOX Platoon is stationed.)"
1602005-7 = "FOX Platoon HQ"
1602005-8 = "(...However, everyone, including Otogi, was nowhere to be found.)"
1602005-10 = "(About 10 minutes after leaving Schale and running around the area...)"
1602005-13 = "(I found Otogi sitting on a park bench, staring blankly at a streetlamp.)"
1602005-15 = "[ns] \"Otogi!\""
1602005-16 = "...Oh? Sensei..."
1602005-17 = "What are you doing here?"
1602005-18 = "It's dangerous to wander around deserted places at night."
1602005-19 = "[s1] \"That's my line.\" \n[s2] \"Why are you out at this hour?\""
1602005-22 = "Hmm? Just for a change of pace—"
1602005-27 = "Ah, you saw my Momotalk."
1602005-28 = "...Seems like I made you worry."
1602005-29 = "Really, it's nothing big. I'm sorry."
1602005-30 = "I'm just taking a little walk, so it's okay for you to head back to Schale, Sensei."
1602005-31 = "You have an important meeting tomorrow morning, right? You should get to #nbed early."
1602005-32 = "[s3] \"There's nothing more important than listening to my student's worries.\"\n[s4] \"I was just in the mood for a night walk myself.\""
1602005-35 = "...You really just do whatever you want."
1602005-36 = "No, I guess I'm the one being selfish."
1602005-37 = "[ns5] \"What were you looking at here?\"\n[ns6] \"Doesn't seem like there's anything particularly interesting.\""
1602005-40 = "See that streetlamp over there by the entrance?"
1602005-41 = "The one on the right... the one with the slightly dim light."
1602005-42 = "I found out recently that the sensor on that streetlamp is old, so it breaks down #na lot."
1602005-43 = "These days, sensors react when the sun goes down and the lights turn on #nautomatically, right?"
1602005-44 = "But because that sensor is so old, it goes out once every hour."
1602005-45 = "So the person on duty has to check it on camera and manually turn the power #nback on. Really annoying, isn't it?"
1602005-46 = "But the other day, when I saw the light that had gone out turn back on, I suddenly thought—"
1602005-47 = "\"Ah, there's someone over there.\""
1602005-48 = "\"They're still keeping the streetlights on, even on a night like this.\""
1602005-49 = "That's why, when I get a little lonely, I come here and gaze at that streetlamp."
1602005-50 = "[s] \"Were you feeling lonely?\""
1602005-51 = "Yeah. Everyone is in the middle of a night operation, so I can't even contact them."
1602005-52 = "[ruby=Radio Silence]Blackout[/ruby]...#nIt's common to cut communications during the operations."
1602005-53 = "Especially for snipers, who should be cautious about their location."
1602005-54 = "I mentioned before that communication skills are important for a sniper, but... #nwhat's most necessary is enduring loneliness."
1602005-55 = "Even if you can't see your allies or your enemies... even if you feel like you're the #nonly one left in this world."
1602005-56 = "You have to stay at your post and wait patiently for your target to show up."
1602005-57 = "But I chose this path because I have good eyesight and swift hands."
1602005-58 = "So, occasionally, whenever I feel lonely like this for no reason—"
1602005-59 = "I wonder if I chose the wrong path."
1602005-60 = "[s7] \"There's no such thing as a wrong path.\"\n[s8] \"Moving toward possibilities is a student's true duty, after all.\""
1602005-63 = "But clinging to something you're not suited for is just a waste of time."
1602005-64 = "Aptitude is definitely a thing. When I think about how I might have been able to #ngrow more..."
1602005-65 = "...I just couldn't bear it."
1602005-66 = "[ns9] \"But didn't you say it before, Otogi?\"\n[ns10] \"That even if you make a mistake, you can recover from it.\""
1602005-69 = "[ns] \"It's okay. You all have endless potential.\""
1602005-70 = "But I'm already a third-year, you know?"
1602005-71 = "It's too late to change my path."
1602005-72 = "I can't stay being a student forever."
1602005-73 = "[s11] \"That's not true. As long as you have the desire to learn...\"\n[s12] \"Everyone can be a student.\""
1602005-76 = "If that's the case, does that mean you can be a student too, Sensei?"
1602005-77 = "What a strange theory."
1602005-78 = "You really are a weird adult."
1602005-79 = "...But, thank you.#nThanks to you, I'm feeling a lot less lonely."
1602005-80 = "Ah, the streetlamp went out."
1602005-81 = "...It's back on."
1602005-82 = "Right now, I have to be faithful to my orders."
1602005-83 = "It might just be a simple light turning ON and OFF, but..."
1602005-84 = "If I keep at it, I think I can surely light a small flame... in someone's heart."
1602005-86 = "(After that, as I watch the blinking streetlamp alongside Otogi, the feeling of #nloneliness of the dark night somehow soften.)"