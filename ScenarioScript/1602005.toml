[translation]
1602005-1 = "A solidão de uma atiradora"
1602005-2 = "（Após verificar a mensagem enigmática de Otogi no MomoTalk, fui imediatamente para o subsolo onde o FOX Squad está localizado）"
1602005-7 = "QG do FOX Squad"
1602005-8 = "（……No entanto, não havia ninguém lá, incluindo Otogi）"
1602005-10 = "（Saí do Schale e, após cerca de 10 minutos correndo pelos arredores……）"
1602005-13 = "（Encontrei Otogi sentada em um banco de praça, olhando fixamente para o poste de luz）"
1602005-15 = "[ns] \"Otogi!\""
1602005-16 = "……Ué? Sensei…….\r\n"
1602005-17 = "O que veio fazer aqui?"
1602005-18 = "É perigoso ficar andando por lugares desertos à noite."
1602005-19 = "[s1] \"Essa frase é minha.\"\r\n[s2] \"Por que você está fora a essa hora?\""
1602005-22 = "Hm? Só para espairecer――"
1602005-27 = "Ah, você viu o MomoTalk, né.\r\n"
1602005-28 = "……Parece que acabei te preocupando."
1602005-29 = "Sério, não é nada demais, desculpa."
1602005-30 = "Estou só dando uma caminhada, pode voltar para o Schale, Sensei."
1602005-31 = "Você tem uma reunião importante amanhã de manhã, não tem? Precisa dormir cedo."
1602005-32 = "[s3] \"Não há nada mais importante do que ouvir as preocupações de um aluno.\"\r\n[s4] \"Eu também estava com vontade de fazer uma caminhada noturna.\""
1602005-35 = "……Você é muito insistente, sabia?"
1602005-36 = "Não, quem está sendo insistente sou eu.\r\n\r\n"
1602005-37 = "[ns5] \"O que você estava olhando aqui?\"\n[ns6] \"Não parece ter nada de interessante.\""
1602005-40 = "Dá para ver aquele poste de luz na entrada?"
1602005-41 = "Aquele do lado direito…… o que a luz está meio fraca."
1602005-42 = "Descobri esses dias que o sensor daquele poste é antigo e vive dando defeito."
1602005-43 = "Ultimamente, quando escurece, o sensor deveria reagir e acender a luz sozinho, né?"
1602005-44 = "Mas como o sensor é muito velho, ele apaga a cada hora."
1602005-45 = "Por isso, o pessoal do plantão precisa verificar pelas câmeras e religar manualmente. É bem trabalhoso, né?"
1602005-46 = "Mas quando vi a luz acender depois de ter apagado, pensei comigo mesma――"
1602005-47 = "“Ah, tem alguém ali do outro lado.”"
1602005-48 = "“Mesmo em uma noite dessas, alguém continua mantendo a luz acesa.”"
1602005-49 = "Por isso, quando me sinto um pouco solitária, venho aqui observar aquele poste."
1602005-50 = "[s] \"Você se sentiu solitária?\""
1602005-51 = "Sim. Estão todos em operação noturna, então não consigo nem entrar em contato."
1602005-52 = "Blackout…… #n É comum cortarmos a comunicação durante as operações, mas."
1602005-53 = "Para uma atiradora, que é sensível a informações de localização, é ainda pior."
1602005-54 = "Eu disse antes que a capacidade de comunicação é importante para um atirador, mas…… o que é mais necessário é suportar a solidão."
1602005-55 = "Mesmo sem ver aliados ou inimigos…… mesmo sentindo que fui deixada sozinha neste mundo."
1602005-56 = "Tenho que ficar no meu posto, esperando pacientemente o alvo aparecer."
1602005-57 = "Mas eu escolhi esse caminho só porque tenho boa visão e mãos habilidosas."
1602005-58 = "Por isso, às vezes, toda vez que sinto essa solidão sem motivo――"
1602005-59 = "Penso se não escolhi o caminho errado."
1602005-60 = "[s7] \"Não existe erro no caminho que você escolheu.\"\r\n[s8] \"Seguir em direção às possibilidades é o dever de um aluno.\""
1602005-63 = "Mas se eu ficar me prendendo a algo para o qual não tenho aptidão, é perda de tempo, não é?"
1602005-64 = "Aptidão é algo real. Se eu pensar que poderia ter crescido mais em outra área……."
1602005-65 = "……Eu não aguento."
1602005-66 = "[ns9] \"Mas você mesma disse antes, não foi?\"\n[ns10] \"Que mesmo se cometer um erro, é possível dar a volta por cima.\""
1602005-69 = "[ns] \"Está tudo bem. Vocês têm possibilidades infinitas.\""
1602005-70 = "Mas eu já estou no terceiro ano, sabe?"
1602005-71 = "É tarde demais para mudar de rumo."
1602005-72 = "Não posso continuar sendo aluna para sempre."
1602005-73 = "[s11] \"Não é bem assim. Se você tiver vontade de aprender...\"\r\n[s12] \"Qualquer um pode se tornar um aluno.\""
1602005-76 = "Então isso significa que o Sensei também pode ser um aluno?"
1602005-77 = "Sério, que teoria estranha."
1602005-78 = "Você é mesmo um adulto esquisito."
1602005-79 = "……Mas, obrigada. #nGraças a isso, não me sinto mais tão sozinha."
1602005-80 = "Ah, o poste de luz apagou."
1602005-81 = "……Acendeu."
1602005-82 = "Agora, preciso ser fiel às ordens."
1602005-83 = "Pode ser apenas um simples ligar e desligar de luzes, mas..."
1602005-84 = "Se eu continuar fazendo isso sempre, acho que com certeza conseguirei acender uma pequena luz no coração de alguém."
1602005-86 = "(Depois disso, enquanto observava os postes de luz piscando junto com Otogi, senti como se a solidão da escuridão da noite tivesse diminuído.)\r\n"
