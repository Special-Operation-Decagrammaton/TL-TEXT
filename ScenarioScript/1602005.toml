[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1602005-1 = "A Solidão de uma Sniper" 
1602005-2 = "（Após ler a mensagem enigmática da Otogi no MomoTalk,\nfui direto para o subsolo onde o Esquadrão FOX se abriga.）" 
1602005-7 = "QG do Esquadrão FOX" 
1602005-8 = "（...Mas o lugar estava totalmente vazio. Otogi e o resto não estavam lá.）" 
1602005-10 = "（Saí da Schale e corri pela região\npor cerca de 10 minutos procurando por ela, até que...）" 
1602005-13 = "（Encontrei a Otogi sentada no banco de um parque,\nobservando distraidamente os postes de luz.）" 
1602005-15 = "[ns] \"Otogi!\"" 
1602005-16 = "……Ué? Sensei……\n" 
1602005-17 = "O que faz por aqui?" 
1602005-18 = "É perigoso ficar vagando por lugares\nsem ninguém à noite, sabia." 
1602005-19 = "[s1] \"Essa frase devia ser minha.\"\n[s2] \"Por que você está lá fora a essa hora?\"" 
1602005-22 = "Hmm? Só dando uma refrescada na cabeça――" 
1602005-27 = "Ah, você leu o meu MomoTalk, né.\n" 
1602005-28 = "……Parece que eu\nacabei te preocupando." 
1602005-29 = "Sério, não era nada demais. Foi mal." 
1602005-30 = "Eu só estou dando uma voltinha,\nvocê pode voltar para a Schale, Sensei." 
1602005-31 = "Você não tem uma reunião importante amanhã de manhã?\nTem que ir dormir logo." 
1602005-32 = "[s3] \"Não tem nada mais importante\ndo que ouvir os problemas das minhas alunas.\"\n[s4] \"E, por coincidência, eu também estava afim de dar\numa caminhada noturna.\"" 
1602005-35 = "……Você é muito teimoso,\nsabia?" 
1602005-36 = "Não, pensando bem,\na teimosa aqui sou eu.\n\n" 
1602005-37 = "[ns5] \"O que você estava\nolhando daqui?\"\n[ns6] \"Não parece haver nada de tão interessante...\"" 
1602005-40 = "Está vendo aquele\nposte de luz ali na entrada?" 
1602005-41 = "Aquele no lado direito... que tá\ncom uma luz meio fraca piscando." 
1602005-42 = "Fiquei sabendo esses dias que o sensor daquele poste é velho\ne vive quebrando." 
1602005-43 = "Sabe, hoje em dia, quando escurece os sensores\nligam a luz automaticamente, né?" 
1602005-44 = "Mas como aquele ali tem um sensor velho,\na luz desliga sozinha uma vez por hora." 
1602005-45 = "Aí o vigia do turno tem que ver pela câmera e\nligar de novo manualmente. É um saco enorme, né?" 
1602005-46 = "Mas, outro dia, quando eu vi a luz apagada se acendendo de novo,\neu acabei parando para refletir――" 
1602005-47 = "'Ah... quer dizer que existe\numa pessoa lá do outro lado, operando isso.'" 
1602005-48 = "'Até no meio dessa madrugada,\nalguém continua reacendendo essa luz.'" 
1602005-49 = "Por isso, de vez em quando, quando eu começo a me sentir sozinha...\nEu venho aqui para ficar olhando essa luz." 
1602005-50 = "[s] \"Você se\nsentiu sozinha?\"" 
1602005-51 = "Uhum. As meninas estão no meio de uma operação noturna,\nentão nem posso entrar em contato." 
1602005-52 = "Silêncio no rádio... o famoso Blackout.\nÉ bem comum a gente cortar as comunicações no meio da missão." 
1602005-53 = "Principalmente snipers, já que nós somos o pilar de informações no campo de batalha." 
1602005-54 = "Antes eu disse que habilidades de comunicação eram cruciais para um sniper...\nMas a verdade é que o mais importante de tudo é saber suportar a solidão." 
1602005-55 = "Mesmo quando não consigo ver meus aliados ou os meus inimigos...\nMesmo que sinta que eu sou a única pessoa que restou no mundo inteiro." 
1602005-56 = "Eu não posso abandonar a minha posição.\nDevo esperar imóvel até que o meu alvo apareça." 
1602005-57 = "Mas o único motivo pelo qual eu escolhi essa vida é porque\neu tenho olhos bons e mãos ligeiras." 
1602005-58 = "Então, às vezes, quando sinto essa solidão apertando o peito sem nenhum motivo――" 
1602005-59 = "Eu me pergunto se\nescolhi o caminho certo." 
1602005-60 = "[s7] \"Não existe caminho errado.\"\n[s8] \"Afinal, caminhar em direção a um mar de possibilidades...\nÉ exatamente a essência de ser uma aluna.\"" 
1602005-63 = "Mas se você se agarra a algo que não é o seu forte,\nisso não é desperdício de tempo?" 
1602005-64 = "Nós temos aptidões para certas coisas. Quando eu penso que\neu poderia ter crescido e sido mais útil se tivesse tentado outras coisas...\n" 
1602005-65 = "……Me dá\num desespero." 
1602005-66 = "[ns9] \"Mas você mesma\nme disse antes, Otogi...\"\n[ns10] \"Que mesmo que cometesse um erro, daria para consertar depois.\"" 
1602005-69 = "[ns] \"Vai ficar tudo bem.\nVocês têm um mundo de infinitas possibilidades pela frente.\"" 
1602005-70 = "Mas eu já sou do\nterceiro ano, sabe?" 
1602005-71 = "Já é tarde demais para eu\ntentar seguir por um outro caminho." 
1602005-72 = "Afinal, eu não vou poder\nser uma aluna para sempre." 
1602005-73 = "[s11] \"Isso não é verdade. Enquanto tiver a vontade de aprender...\"\n[s12] \"Qualquer um pode\ncontinuar sendo um aluno.\"" 
1602005-76 = "Isso quer dizer que você\ntambém pode ser um aluno, Sensei?" 
1602005-77 = "Francamente...\nSua lógica é bem louca." 
1602005-78 = "Como eu pensava,\nvocê é um adulto bem esquisito." 
1602005-79 = "……Mas, obrigada.\nGraças a você, já não me sinto mais tão sozinha." 
1602005-80 = "Ah, o poste de luz desligou de novo." 
1602005-81 = "……E ligou de novo." 
1602005-82 = "Acho que agora... eu devo apenas\npermanecer fiel à minha missão." 
1602005-83 = "Pode ser só um simples apagar e acender de luzes..." 
1602005-84 = "Mas, se eu continuar repetindo isso incansavelmente...\nAcho que algum dia eu poderei iluminar o coração de alguém... com uma pequena luz." 
1602005-86 = "（Depois disso, fiquei mais um tempo observando aquele poste piscante junto da Otogi,\ne senti como se o vazio daquela noite fria tivesse desaparecido por completo.）\n" 