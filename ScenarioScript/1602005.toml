[translation]
1602005-1 = "A Sniper's Loneliness"
1602005-2 = "(After checking Otogi's cryptic MomoTalk, I immediately headed to the underground area where the FOX Platoon is stationed.)"
1602005-7 = "FOX Platoon HQ"
1602005-8 = "(...However, everyone, including Otogi, was gone.)"
1602005-10 = "(After leaving Schale and running around the nearby area for about 10 minutes...)"
1602005-13 = "(I found Otogi sitting on a park bench, blankly staring at a streetlamp.)"
1602005-15 = "[ns] \"Otogi!\""
1602005-16 = "...Oh? Sensei...?\r\n"
1602005-17 = "What are you doing here?"
1602005-18 = "It's dangerous to wander around in places with so little foot traffic at night."
1602005-19 = "[s1] \"That's my line.\"\r\n[s2] \"Why are you out at this hour?\""
1602005-22 = "Hm? Just clearing my head—"
1602005-27 = "Ah, so you saw my MomoTalk.\r\n"
1602005-28 = "...I guess I ended up worrying you."
1602005-29 = "Really, it's nothing serious, sorry about that."
1602005-30 = "I'm just taking a walk, so it's fine for you to head back to Schale, Sensei."
1602005-31 = "You have an important meeting tomorrow morning, right? You should get some sleep."
1602005-32 = "[s3] \"There's nothing more important than listening to a student's troubles.\"\r\n[s4] \"Besides, I was in the mood for a night walk myself.\""
1602005-35 = "...You really are selfish, aren't you?"
1602005-36 = "No, I suppose I'm the selfish one.\r\n\r\n"
1602005-37 = "[ns5] \"What were you looking at here?\"\n[ns6] \"Doesn't look like there's anything particularly interesting.\""
1602005-40 = "See that streetlamp at the entrance?"
1602005-41 = "The one on the right... the one with the slightly dim light."
1602005-42 = "I found out recently that the sensor for that lamp is old and malfunctions often."
1602005-43 = "Usually, when the sun goes down, the sensor reacts and the light turns on automatically, right?"
1602005-44 = "But because that sensor is so old, it turns off once every hour."
1602005-45 = "So the person on duty has to check it via camera and manually turn the power back on. It's such a hassle, isn't it?"
1602005-46 = "But when I saw the light turn back on after it had gone out, I suddenly thought—"
1602005-47 = "“Ah, there’s someone on the other side of that.”"
1602005-48 = "“They’re keeping the streetlamp lit even in the middle of the night.”"
1602005-49 = "That’s why, whenever I feel a bit lonely, I come here to watch that streetlamp."
1602005-50 = "[s] \"Have you been feeling lonely?\""
1602005-51 = "Yeah. Everyone is on a night operation, so I can't even contact them."
1602005-52 = "Blackout... #nIt's common to cut communications during operations, though."
1602005-53 = "Especially for a sniper, who has to be sensitive to location data."
1602005-54 = "I said before that communication skills are important for a sniper, but... the most necessary thing is enduring solitude."
1602005-55 = "Even if you can't see your allies or enemies... even if you feel like you've been left all alone in this world."
1602005-56 = "You have to stay at your post and wait patiently for your target to arrive."
1602005-57 = "But I only chose this path because I have good eyes and nimble fingers."
1602005-58 = "So, every time I feel this inexplicable loneliness—"
1602005-59 = "I wonder if I chose the wrong path."
1602005-60 = "[s7] \"There's no such thing as a wrong path.\"\r\n[s8] \"Moving toward your potential is what being a student is all about.\""
1602005-63 = "But if you're clinging to something you're not suited for, it's just a waste of time."
1602005-64 = "Aptitude is a real thing, after all. When I think about how I could have grown more elsewhere..."
1602005-65 = "...I just can't take it."
1602005-66 = "[ns9] \"But you said it yourself before, didn't you?\"\n[ns10] \"That even if you make a mistake, you can always make up for it.\""
1602005-69 = "[ns] \"It's okay. You all have infinite potential.\""
1602005-70 = "But I'm already a third-year, you know?"
1602005-71 = "It's too late to change my path."
1602005-72 = "I can't stay a student forever."
1602005-73 = "[s11] \"That's not true. As long as you have the desire to learn...\"\r\n[s12] \"Anyone can be a student.\""
1602005-76 = "Does that mean you can be a student too, Sensei?"
1602005-77 = "Really, what a strange theory."
1602005-78 = "You really are a weird adult."
1602005-79 = "...But, thank you. #nThanks to you, I don't feel nearly as lonely anymore."
1602005-80 = "Oh, the streetlamp went out."
1602005-81 = "...And it's back on."
1602005-82 = "For now, I have to be faithful to my orders."
1602005-83 = "It might just be a simple light turning on and off..."
1602005-84 = "But if I keep repeating it, I'm sure I can light a small flame in someone's heart."
1602005-86 = "(After that, as I watched the flickering streetlamp with Otogi, I felt the loneliness of the night start to fade away.)\r\n"