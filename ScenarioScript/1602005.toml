[translation]
1602005-1 = "ある狙撃手の寂しさ"
1602005-2 = "（オトギの意味深なモモトークを確認後、すぐにFOX小隊がいる地下に向かった）"
1602005-7 = "FOX小隊HQ"
1602005-8 = "（……ところがオトギを含めた全員がいない状態だった）"
1602005-10 = "（シャーレの外に出て、近くを走り回って10分ほど過ぎた頃……）"
1602005-13 = "（公園のベンチに座って、ボーっと街灯を眺めているオトギを見つけた）"
1602005-15 = "[ns] \"オトギ！\""
1602005-16 = "……あれ？先生……。\r\n"
1602005-17 = "何しに来たの？"
1602005-18 = "夜に人通りの少ない場所をフラフラしてたら、危ないよ。"
1602005-19 = "[s1] \"それはこっちのセリフだよ。\"\r\n[s2] \"どうしてこんな時間に外にいるの？\""
1602005-22 = "ん？気分転換に――"
1602005-27 = "あー、モモトーク、見たんだ。\r\n"
1602005-28 = "……なんか、心配させちゃったみたいだね。"
1602005-29 = "ほんと、大したことないのに、ごめん。"
1602005-30 = "ちょっと散歩してるだけだから、先生はシャーレに戻って大丈夫だよ。"
1602005-31 = "明日午前中に大事な会議があるんだよね？早く寝ないと。"
1602005-32 = "[s3] \"生徒の悩みを聞く以上に大事なことなんてないよ。\"\r\n[s4] \"ちょうど私も夜の散歩をしたい気分だからさ。\""
1602005-35 = "……ほんとに勝手だねぇ。"
1602005-36 = "いや、勝手なのは私のほうか。\r\n\r\n"
1602005-37 = "[ns5] \"ここで何を見てたの？\"\n[ns6] \"特に面白いものは、なさそうだけど。\""
1602005-40 = "あそこ、入口にある街灯、見える？"
1602005-41 = "右側にある……少し明かりがぼんやりしてるほう。"
1602005-42 = "この間に知ったんだけど、あの街灯はセンサーが古くて、よく故障するんだって。"
1602005-43 = "最近は、日が暮れたらセンサーが反応して、勝手に明かりがつくじゃん？"
1602005-44 = "でも、あれだけセンサーが古いから、1時間に1回消えちゃうんだ。"
1602005-45 = "だから当直の人がカメラで確認して、手動で電源を入れ直すんだって。ほんと、めんどくさいよねぇ？"
1602005-46 = "でもこの間消えていた明かりがついたのを見た時、ふと思ったんだ――"
1602005-47 = "「あぁ、誰かがあの向こうにいるんだな」って。"
1602005-48 = "「こんな夜でも街灯をつけ続けてるんだなぁ」って。"
1602005-49 = "だから、ちょっと寂しくなった時、ここに来てあの街灯を眺めるんだ。"
1602005-50 = "[s] \"寂しくなったの？\""
1602005-51 = "うん。みんな、夜間作戦中だから連絡もできなくてね。"
1602005-52 = "[ruby=無線沈黙]ブラックアウト[/ruby]……。#n作戦上、通信を切ることは、よくあるんだけど。"
1602005-53 = "位置情報に敏感な狙撃手は、特にさ。"
1602005-54 = "狙撃手にとってコミュニケーション能力も大事だって、前に言ったけど……一番必要なのは、孤独に耐えること。"
1602005-55 = "味方や敵の姿が見えなくても……この世界に自分一人が残された気分になっても。"
1602005-56 = "持ち場から離れず、目標が来るのをじっと待たなきゃいけない。"
1602005-57 = "でも私がこの道を選んだのは、ただ目が良くて、手先が器用だからで。"
1602005-58 = "だから、たまに、こうしてわけもなく寂しさを感じる度に――"
1602005-59 = "進路間違えたかなって、思うんだ。"
1602005-60 = "[s7] \"進路に、間違いなんてないよ。\"\r\n[s8] \"可能性に向かって進むこと、それ自体が生徒の本分だからね。\""
1602005-63 = "けど、向いていないことにしがみついてたら、時間の無駄じゃん。"
1602005-64 = "適性ってやっぱりあるし。もっと成長できたんじゃないかなってて思ったらさ……。"
1602005-65 = "……耐えられなくて。"
1602005-66 = "[ns9] \"でも、前にオトギが言ってたよね？\"\n[ns10] \"たとえミスをしても、挽回できるって。\""
1602005-69 = "[ns] \"大丈夫。君たちには、無限の可能性があるんだから。\""
1602005-70 = "でも、私もう3年生だよ？"
1602005-71 = "進路を変えるには、遅すぎるよ。"
1602005-72 = "いつまでも、生徒のままではいられないし。"
1602005-73 = "[s11] \"そんなことないよ。学ぼうという気持ちがあれば……。\"\r\n[s12] \"誰だって生徒になれるんだから。\""
1602005-76 = "それなら、先生も生徒になれるってこと？"
1602005-77 = "ほんと、おかしな理論。"
1602005-78 = "やっぱ、変な大人だね。"
1602005-79 = "……けど、ありがと。#nおかげでだいぶ寂しくなくなった。"
1602005-80 = "あ、街灯が消えちゃった。"
1602005-81 = "……ついた。"
1602005-82 = "今は、命令に忠実でいないと。"
1602005-83 = "単純な明かりのON/OFFかもしれないけど……。"
1602005-84 = "ずっと繰り返してたら、きっと誰かの心に……小さな明かりを灯してあげられると思うし。"
1602005-86 = "（その後、オトギと一緒に点滅する街灯を見つめていると、なんだか夜闇の寂しさが和らぐような気がした）\r\n"
