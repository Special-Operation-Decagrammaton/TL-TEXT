[translation]
84304200300-5 = "……ネル！大丈夫！？状況は？"
84304200300-17 = "チッ……。"
84304200300-18 = "あたしは大丈夫だ。怪我もねえ。"
84304200300-19 = "でも、わりぃ……捕まえられたのは下っ端ばっかだ。ヤツと連絡を取れそうなやつらは全員逃しちまった。"
84304200300-20 = "思ったよりやるじゃねぇか、こんな手の込んだことまでして。何者だ？"
84304200300-21 = "……調べてみるわ。"
84304200300-22 = "その件は私に任せて、まずは戻ってきてちょうだい。"
84304200300-23 = "ん？どうした、元気がねぇな。"
84304200300-24 = "もしかしてさっきの味方どうこうの話か？気にしたりしてねぇよな？"
84304200300-25 = "いえ、そういうわけではないのだけれど。"
84304200300-29 = "……んじゃなんだよ。"
84304200300-30 = "それは……。"
84304200300-31 = "まずは帰ってきて。話が長くなりそうだわ。"
84304200300-32 = "……了解。"
