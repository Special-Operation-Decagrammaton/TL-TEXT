[translation]
2003402-1 = "目的のために"
2003402-2 = "……ということで。"
2003402-3 = "新年の大食い大会に参加したいと思います！"
2003402-4 = "参加資格の確認に申込書の提出、会場までの行き方、種目の調査まで……"
2003402-5 = "事前準備はぜ～んぶ、済ませておきました。"
2003402-6 = "ウフフ、今年の大会も楽しみですね★"
2003402-7 = "[s] \"今年の大会「も」？\""
2003402-8 = "はい★"
2003402-9 = "[s] \"……なんか意味深だね。\""
2003402-10 = "フフッ、なんのことでしょう★"
2003402-11 = "では先生、そろそろ行きましょうか。"
2003402-12 = "[s] \"私も行くの？\""
2003402-13 = "先生に見守っていただいたら、より一層思い出に残る大会になること間違いなしですから。"
2003402-14 = "もしかして先生は……お腹を空かせている生徒のお願いを、断るおつもりですか？"
2003402-15 = "[s] \"お腹、空かせてるんだ……。\""
2003402-16 = "もちろんです。大会に備えて今朝は朝ご飯を半合しか食べていませんから。"
2003402-17 = "それは一大事……？#nフフッ、分かっていただいて嬉しいです★"
2003402-19 = "……今年もいらしたんですね。[ruby=わにぶち]鰐渕[/ruby]アカリさん。"
2003402-20 = "大変申し上げにくいのですが……私どもは、アカリさんの大会参加を丁重にお断りさせていただきたく存じます。"
2003402-21 = "重ねてお詫び申し上げます。何卒、ご了承ください。"
2003402-22 = "あら？"
2003402-28 = "[ns] \"理由を聞かせてください。\""
2003402-29 = "……。"
2003402-30 = "アカリさんは去年の優勝者でしたよね。"
2003402-31 = "はい。食い出のあるこんにゃくを揚げることで、少量でもすぐに満腹感を感じられる……印象的な品目でした。"
2003402-32 = "一昨年の優勝者も、アカリさんでした。"
2003402-33 = "覚えています。潰したジャガイモと卵、魚の身を混ぜて腹持ちのいい特製おでんを作っていただいて。"
2003402-34 = "……このままでは、今年の優勝者もアカリさんになります。"
2003402-35 = "フフッ、それはやってみないと分かりませんよ？"
2003402-37 = "[ns1] （わざわざやらなくても……）\n[ns2] （結果が分かることって、あるよね……）"
2003402-40 = "私どもの新年商店街大食い大会は……"
2003402-41 = "より多くの方々に料理を楽しんでいただき、それが商店街の宣伝に繋がることを期待して始めたものなのです。"
2003402-42 = "しかし、アカリさんが参加してしまえば……優勝者は明白。"
2003402-43 = "主催側は、本来の目的である商店街宣伝を達成することは難しいと判断しました。"
2003402-44 = "優勝者が決まっている大会など……誰も興味を持たないのですから。"
2003402-46 = "……。"
2003402-47 = "その代わり、最高級の厳選おせち弁当10人前を差し上げます。#nこれでどうか、私どもの事情を考慮していただけないでしょうか？"
2003402-48 = "お願いします……。"
2003402-49 = "……。"
2003402-50 = "私は最高級おせち弁当を食べにきたわけではありません。"
2003402-51 = "こんにゃく唐揚げや玉子じゃがいもおでん……参加者のお腹をできるだけ早く膨らませるための小細工――失礼、スペシャルメニューを味わいにきたんです。"
2003402-52 = "な、なっ……！"
2003402-53 = "フフ……今年は何が用意されているのでしょう？楽しみですね★"
2003402-54 = "[s] \"……私に、いい考えがあるんだけど。\""
2003402-55 = "はい？"
2003402-56 = "あら？"
2003402-59 = "なるほど……去年の優勝者である私の「タイトル防衛戦」を。"
2003402-60 = "アカリさん対、他の挑戦者全員で大食いを競う……な、なんと……素晴らしい案です！"
2003402-61 = "ですが……本当によろしいのですか？いくらアカリさんでも、8名の挑戦者全員の相手をされるのは……。"
2003402-62 = "あら。これはまた愉快な……いえ、挑戦し甲斐のあるお話ですね。"
2003402-63 = "大丈夫です。最初から大会の勝利など、目的ではありませんでしたので。"
2003402-64 = "去年も、一昨年もそうでした。"
2003402-65 = "そうだったんですか！？"
2003402-66 = "[ns] （アカリらしいなぁ……）"
2003402-67 = "私は構いませんよ？#n今年の「スペシャルメニュー」が何なのか気になりますし。"
2003402-68 = "わ、分かりました。主催に聞いて参りますので、少々お待ちください！"
2003402-72 = "フフッ。"
2003402-73 = "先生のおかげで、今年も新鮮な体験ができそうです。"
2003402-74 = "[s] \"……お手柔らかにお願いね。\""
2003402-75 = "フフッ、何のことでしょう～★"
2003402-78 = "これより！新年恒例……商店街大食い大会を開催いたします！"
2003402-79 = "今年の大会は例年と異なる形で……#nテーマは、「チャンピオンに挑戦せよ！」です！"
2003402-81 = "まずはチャンピオンをご紹介します！3冠王に手がかかっているぞ！[ruby=わにぶち]鰐渕[/ruby]アカリ選手！"
2003402-85 = "フフ、よろしくお願いします～"
2003402-86 = "そして、彼女に挑むのは、8人の挑戦者！"
2003402-98 = "さあ始まりました！間髪を入れず猛烈に皿を空にしていく挑戦者たち！#nそれに比べ、チャンピオンは余裕のある姿を見せています！"
2003402-100 = "……なるほど、今年のスペシャルメニューはサトイモと豆をすりおろした大型卵焼き、と……"
2003402-101 = "他にもおせちの用意がありますし、1つずつ味わっていくとしましょう。"
2003402-108 = "おおっと！ここで挑戦者のペースが落ちていく！"
2003402-114 = "一方、アカリ選手！開始から今まで、食べるスピードに少しの変化も見受けられません！何があってもペースを乱さない！これがチャンピオンの貫禄かっ！"
2003402-115 = "……数の子も鮭の昆布巻きも、味がよくしみていて良いですね。気に入りました。"
2003402-116 = "お口直しにすまし汁をいただきますね……はい、次の料理をお願いします。"
2003402-130 = "ああっ！ギブアップする挑戦者が続出！無理はしないでください！救急車なら会場裏で待機してますので！"
2003402-136 = "そんな中、黙々と食べて、食べて、また食べ続けているアカリ選手！信じられない光景です！彼女の胃は限界を知らない！その胃は！一体！何でできているのだっ！"
2003402-137 = "あら皆さん、箸が止まってますよ？まだこんなに残ってるのに……"
2003402-138 = "すみません～あの方の分も持ってきてもらえますか？"
2003402-139 = "せっかくの食べ放題なのに、残すなんてもったいないです★"
2003402-147 = "勝負あり！"
2003402-148 = "途中から結果は見えていましたが……今年の優勝は！[ruby=わにぶち]鰐渕[/ruby]アカリ選手！3冠王です！"
2003402-149 = "フフ……商店街の宣伝も達成できたようで、よかったです。"
2003402-150 = "私も十分に食べられて満足でした。先生の名案のおかげです★"
2003402-152 = "先生、アカリさん、ありがとうございました。大会前は私どもの考えが及ばず、危うく無礼を働くところでした。大変失礼いたしました。"
2003402-156 = "……あっ、すみません。どうしたものか、大会の後半から私の携帯の通知が止まなくて……。"
2003402-157 = "[s3]  \"多分、それは大会の様子を撮った観客たちが……\"\n[s4]  \"動画をネットにアップロードして……。\""
2003402-160 = "え？その動画がバズってる……？"
2003402-161 = "ええっ！？"
2003402-162 = "……。"
2003402-163 = "あらま★いいことじゃないですか！これで商店街の宣伝効果はバッチリですね。"
2003402-165 = "で、ですがこんな予想外の状況……私どもはどう対応すれば……！"
2003402-167 = "フフッ。"
2003402-172 = "ワクワクしますね、予想外のことって★"
2003402-174 = "（すました顔で微笑むアカリは、少し怖くも思えた……）"
