[translation]
2003402-1 = "Pelo meu objetivo"
2003402-2 = "……Então é isso."
2003402-3 = "Eu gostaria de participar do concurso de comer do Ano Novo!"
2003402-4 = "Desde a verificação dos requisitos de participação, envio da inscrição, como chegar ao local, até a pesquisa sobre as categorias……"
2003402-5 = "Já cuidei de todos os preparativos."
2003402-6 = "Ufufu, estou ansiosa pelo torneio deste ano também★"
2003402-7 = "[s] \"Torneio deste ano 'também'?\""
2003402-8 = "Sim★"
2003402-9 = "[s] \"……Isso soa um tanto enigmático.\""
2003402-10 = "Fufu, do que será que você está falando?★"
2003402-11 = "Bem, Sensei, vamos indo?"
2003402-12 = "[s] \"Eu também vou?\""
2003402-13 = "Se o Sensei estiver lá para me observar, com certeza será um torneio ainda mais memorável."
2003402-14 = "Por acaso o Sensei pretende…… recusar o pedido de uma aluna que está com fome?"
2003402-15 = "[s] \"Você está com fome, é…….\""
2003402-16 = "Com certeza. Para me preparar para o torneio, só comi meia porção de arroz hoje de manhã."
2003402-17 = "Isso é um caso grave……?#nFufu, fico feliz que entenda★"
2003402-19 = "……Você veio de novo este ano. Akari Wanibuchi."
2003402-20 = "É muito difícil dizer isso, mas…… gostaríamos de recusar educadamente a sua participação no torneio, Akari."
2003402-21 = "Pedimos desculpas novamente. Por favor, compreenda a nossa situação."
2003402-22 = "Ora?"
2003402-28 = "[ns] \"Poderia me explicar o motivo?\""
2003402-29 = "……."
2003402-30 = "A Akari foi a vencedora do ano passado, não foi?"
2003402-31 = "Sim. Ao fritar konjac, que é bem pesado, você fez com que todos se sentissem cheios rapidamente mesmo com pouco…… foi um prato impressionante."
2003402-32 = "A vencedora do ano retrasado também foi a Akari."
2003402-33 = "Lembro-me bem. Você fez um oden especial com batatas amassadas, ovos e peixe, que saciava muito a fome."
2003402-34 = "……Se continuar assim, a vencedora deste ano também será a Akari."
2003402-35 = "Fufu, isso só saberemos se tentarmos, não é?"
2003402-37 = "[ns1] (Nem precisa tentar……)\n[ns2] (Às vezes o resultado já é óbvio……)"
2003402-40 = "O nosso concurso de comer do distrito comercial de Ano Novo……"
2003402-41 = "foi criado com a esperança de que mais pessoas pudessem aproveitar a comida e que isso servisse de propaganda para o distrito."
2003402-42 = "No entanto, se a Akari participar…… a vencedora já está clara."
2003402-43 = "Os organizadores julgaram que seria difícil atingir o objetivo original de promover o distrito."
2003402-44 = "Afinal, ninguém se interessa por um torneio onde o vencedor já está decidido."
2003402-46 = "……."
2003402-47 = "Em troca, daremos a você 10 porções da nossa melhor caixa de bento de Ano Novo. #nPoderia considerar a nossa situação com isso?"
2003402-48 = "Por favor……."
2003402-49 = "……."
2003402-50 = "Eu não vim aqui para comer uma caixa de bento de luxo."
2003402-51 = "O konjac frito, o oden de ovo e batata…… esses truques — perdão, esses menus especiais feitos para encher a barriga dos participantes o mais rápido possível — é isso que eu vim saborear."
2003402-52 = "Ma-mas……!"
2003402-53 = "Fufu…… o que será que prepararam para este ano? Estou ansiosa★"
2003402-54 = "[s] \"……Eu tenho uma boa ideia.\""
2003402-55 = "Sim?"
2003402-56 = "Ora?"
2003402-59 = "Entendo…… uma \"defesa de título\" minha, a vencedora do ano passado."
2003402-60 = "Akari contra todos os outros desafiantes em uma competição de comer…… que, que ideia maravilhosa!"
2003402-61 = "Mas…… tem certeza de que está tudo bem? Mesmo sendo a Akari, enfrentar todos os 8 desafiantes de uma vez é……."
2003402-62 = "Ora. Isso é algo bem divertido…… ou melhor, uma proposta que vale a pena aceitar."
2003402-63 = "Está tudo bem. Vencer o torneio nunca foi o meu objetivo, afinal."
2003402-64 = "Foi assim no ano passado e no ano retrasado também."
2003402-65 = "Sério mesmo!?"
2003402-66 = "[ns] （A cara da Akari...）"
2003402-67 = "Eu não me importo, sabe?#nEstou curiosa para saber qual será o \"menu especial\" deste ano."
2003402-68 = "E-entendido. Vou perguntar aos organizadores, por favor, aguarde um momento!"
2003402-72 = "Fufu."
2003402-73 = "Graças ao Sensei, parece que terei uma experiência refrescante este ano também."
2003402-74 = "[s] \"...Pegue leve comigo, por favor.\""
2003402-75 = "Fufu, do que será que você está falando~★"
2003402-78 = "Começando agora! O tradicional evento de Ano Novo... o Torneio de Comilões da rua comercial está aberto!"
2003402-79 = "O torneio deste ano será diferente dos anteriores...#nO tema é: \"Desafie o Campeão!\""
2003402-81 = "Primeiro, vamos apresentar a campeã! Ela está a um passo de conquistar o tricampeonato! A competidora Akari Wanibuchi!"
2003402-85 = "Fufu, conto com vocês~"
2003402-86 = "E, para desafiá-la, temos 8 competidores!"
2003402-98 = "E começou! Os competidores estão esvaziando seus pratos ferozmente, sem perder tempo!#nEm comparação, a campeã demonstra total tranquilidade!"
2003402-100 = "...Entendo, o menu especial deste ano é um omelete gigante feito com inhame e feijão ralados, é..."
2003402-101 = "Também tem o osechi, então vou saborear um por um."
2003402-108 = "Opa! O ritmo dos competidores está caindo aqui!"
2003402-114 = "Por outro lado, a competidora Akari! Desde o início até agora, não houve a menor mudança na sua velocidade de ingestão! Ela não perde o ritmo, aconteça o que acontecer! É essa a dignidade de uma campeã!"
2003402-115 = "...O kazunoko e o rolinho de alga com salmão estão muito bem temperados. Gostei."
2003402-116 = "Vou tomar um caldo para limpar o paladar... pronto, pode trazer o próximo prato."
2003402-130 = "Ah! Vários competidores estão desistindo! Por favor, não se esforcem demais! Temos uma ambulância de prontidão atrás do palco!"
2003402-136 = "Enquanto isso, a competidora Akari continua comendo, comendo e comendo em silêncio! É uma cena inacreditável! O estômago dela não conhece limites! Do que! Afinal! É feito esse estômago!"
2003402-137 = "Ora, pessoal, por que pararam de comer? Ainda tem tanto sobrando..."
2003402-138 = "Com licença~ Poderia trazer a porção daquela pessoa também?"
2003402-139 = "É um buffet livre, seria um desperdício deixar sobrar★"
2003402-147 = "Fim de jogo!"
2003402-148 = "O resultado já estava claro há algum tempo, mas... a vencedora deste ano é! A competidora Akari Wanibuchi! É o tricampeonato!"
2003402-149 = "Fufu... parece que conseguimos promover a rua comercial, fico feliz."
2003402-150 = "Eu também comi o suficiente e estou satisfeita. Graças à ótima ideia do Sensei★"
2003402-152 = "Sensei, Akari-san, muito obrigado. Antes do torneio, não pensamos direito e quase fomos rudes. Peço mil desculpas."
2003402-156 = "...Ah, perdão. Não sei o que está acontecendo, mas as notificações do meu celular não param desde a metade do torneio..."
2003402-157 = "[s3]  \"Provavelmente, são os espectadores que filmaram o torneio...\"\n[s4]  \"E subiram os vídeos na internet...\""
2003402-160 = "Hã? Esse vídeo está viralizando...?"
2003402-161 = "Eeeh!?"
2003402-162 = "..."
2003402-163 = "Ora, ora★ Isso não é ótimo? Agora a publicidade da rua comercial está garantida."
2003402-165 = "M-mas, com essa situação inesperada... como devemos reagir...!"
2003402-167 = "Fufu."
2003402-172 = "É empolgante, não é? Coisas inesperadas são ótimas★"
2003402-174 = "（O sorriso sereno da Akari parecia até um pouco assustador...）"
