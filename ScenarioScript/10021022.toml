[translation]
10021022-4 = "「脱出シーケンス」：残り1回"

10021022-13 = "[ns](ah......)"

10021022-14 = "…………！………………！！"
10021022-15 = "………………………………。"
10021022-19 = "[ns1] （No fim, é isso que acontece……）\n[ns2] （Não consegui transmitir o que deveria ter transmitido……）"
10021022-24 = "[ns] Mas…… eu preciso fazer isso."
10021022-26 = "[ns3] Cumprir a responsabilidade de um \"adulto\".\n[ns4] Cumprir o dever de um \"sensei\"."
10021022-32 = "O \"Cromatismo\" entrou em contato com o mestre da caixa!"
10021022-33 = "Esta situação não estava prevista…… Será que o Cromatismo reagiu ao \"sofrimento\" daquele ser, ou então――"
10021022-34 = "Impossível. Aquele ser não possui \"Sublime\", \"Mistério\" ou \"Terror\". Não há motivo para o \"Cromatismo\" entrar em contato com uma existência sem valor."
10021022-36 = "Ou seja―― o que isso significa?"
10021022-37 = "Será que aquele ser se tornará o \"Guia do Cromatismo\" no lugar do deus da morte?"
10021022-39 = "Não consigo compreender."
10021022-40 = "Não consigo compreender."
10021022-41 = "Não consigo compreender."
10021022-43 = "Não consigo compreender―― mas, se pudermos possuir aquela \"caixa\", não há necessidade de compreender."
10021022-44 = "Mestre da caixa―― conforme o seu desejo, lhe daremos o papel de \"Guia do Cromatismo\"."
10021022-46 = "Lhe daremos o nome de \"Plana-Pathes, o falso sensei\"."
10021022-47 = "O \"Guia do Cromatismo\" apenas expressa a vontade de nós, os Sacerdotes Sem Nome. #nNão pense que pode ter vontade própria."
10021022-48 = "Nós ficaremos com o poder da \"caixa\"."
10021022-50 = "Você se arrependerá desta escolha…… por toda a eternidade――!!"
10021022-56 = "[ns5] \"Parece que Plana-Pathes... tem algo a dizer.\"\n[ns6] \"O motivo de ter vindo até aqui, mesmo se tornando o 'Guia do Cromatismo'――\""
10021022-65 = "Sensei…… me desculpe…… por minha causa,"
10021022-66 = "Por eu estar viva…… por eu não ter conseguido morrer……"
10021022-67 = "Por eu ter errado……"
10021022-73 = "……Sensei?"
10021022-77 = "Não se arrependa―― nem se culpe pela sua própria vida."
10021022-81 = "Não negue―― o desejo de querer ser feliz."
10021022-85 = "Não diga algo tão triste como ter desistido de viver para se libertar do sofrimento."
10021022-89 = "Não pense―― que nasceu para sofrer."
10021022-90 = "Porque isso nunca é verdade."
10021022-91 = "Nenhum aluno precisa pensar assim."
10021022-95 = "Se o \"mundo\" de uma criança estiver transbordando de sofrimento……"
10021022-96 = "Se uma criança desejar encerrar sua vida no abismo do desespero e da tristeza――"
10021022-97 = "Se tal desejo ainda existir em algum lugar deste mundo――"
10021022-98 = "Isso é――"
10021022-102 = "Culpa do responsável por esse \"mundo\", não é algo que a criança deva carregar――"
10021022-103 = "É algo que quem \"assume a responsabilidade\" pelo mundo deve carregar."
10021022-107 = "Mesmo que tenha cometido um pecado, mesmo que tenha feito algo imperdoável――"
10021022-111 = "Não deveria existir um mundo onde o aluno assume a responsabilidade."
10021022-115 = "Em qualquer momento, em qualquer situação――"
10021022-116 = "É algo que o adulto que vive junto com a criança deve carregar."
10021022-126 = "N-não, pare……"
10021022-127 = "N-não…… pare…… por favor, pare……"
10021022-128 = "Ah…… aaaaaaaa……"
10021022-129 = "Profeeeessoooor――――！！！！!!!"
10021022-135 = "Não se deixe levar――!!"
10021022-136 = "Aquilo não é o aluno que você conhece!!"
10021022-138 = "Aquilo é a manifestação de um deus―― é \"Mistério\", é \"Terror\", é \"Sublime\"…… é \"Luz\", é o \"Absoluto\"!!"
10021022-139 = "Aquilo é um \"conceito\"…… é um objeto de temor que você não pode compreender!!"
10021022-140 = "Representado no imaginário e alcançando o mundo real — é um símbolo do simbólico e uma metáfora!!!"
10021022-141 = "[ns] (Não, isso está errado.)"
10021022-143 = "[ns7] (Aquela garota...)\n[ns8] (Aquela garota é apenas...)"
10021022-146 = "[ns9] (Alguém que puramente... ama bicicletas e exercícios...)\n[ns10] (Alguém que não hesita em fazer máscaras e cometer assaltos pelos seus amigos...)\n[ns11] (Ela é a Sunaookami Shiroko... da Escola de Ensino Médio de Abydos.)"
10021022-150 = "[ns] Ela é apenas uma \"criança\" que está sofrendo no meu \"mundo\"."
10021022-151 = "Você vai se arrepender dessa escolha... por toda a eternidade――!!"
10021022-152 = "[ns] Talvez seja verdade... mas,"
10021022-163 = "Como adulto―― para proteger as crianças, e como sensei, para proteger meus alunos.#nÉ para cumprir a responsabilidade de um adulto―― o dever de um sensei."
10021022-167 = "Não importa qual seja o método,#nindependentemente de qual seja o preço a pagar."
10021022-180 = "Sensei...?"
10021022-185 = "Entendido. Como desejar."
10021022-186 = "Mesmo que isso signifique trazer o fim do mundo."
10021022-192 = "[ns] Escutar as palavras de Phrenapates."
10021022-194 = "Por favor... cuide bem dos meus alunos."
10021022-198 = "[ns] Responder"
