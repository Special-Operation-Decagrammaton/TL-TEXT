[translation]
10021022-4 = "「脱出シーケンス」：残り1回"
10021022-13 = "[ns] （ああ……）"
10021022-14 = "…………！………………！！"
10021022-15 = "………………………………。"
10021022-19 = "[ns1] （結局こうなってしまうんだ……）\n[ns2] （伝えるべきことを、伝えられなかった……）"
10021022-24 = "[ns] でも……やらなくては。"
10021022-26 = "[ns3] 「大人」の責任を果たす。\n[ns4] 「先生」の義務を全うする。"
10021022-32 = "「色彩」が、箱[ruby=あるじ]の主と[/ruby]接触した！"
10021022-33 = "この事態は想定していない……色彩があの者の「苦しみ」に反応したのか、それとも――"
10021022-34 = "不可能だ。あの者は「崇高」、「神秘」、「恐怖」のいずれも有していない。「色彩」が無価値な存在に接触する理由など無い。"
10021022-36 = "つまり――何を意味する？"
10021022-37 = "あの者が、死の神の代わりに「色彩の[ruby=きょうどうしゃ]嚮導者[/ruby]」になるというのか？"
10021022-39 = "理解できぬ。"
10021022-40 = "理解できぬ。"
10021022-41 = "理解できぬ。"
10021022-43 = "理解できぬ――だが、あの「箱」を我々が所有できるのなら、理解する必要も無い。"
10021022-44 = "箱[ruby=あるじ]の主よ[/ruby]――お前の望み通り、「色彩の嚮導者」の役割を与えよう。"
10021022-46 = "お前に「[ruby=プレナパテス]偽りの先生[/ruby]」の名を、与える。"
10021022-47 = "「色彩の嚮導者」は我々無名の司祭の意志を代弁するのみ。#n己の意志を持てると思うな。"
10021022-48 = "「箱」の力は、我々が預かる。"
10021022-50 = "お前はこの選択を……未来永劫、後悔するだろう――！！"
10021022-56 = "[ns5] \"プレナパテスが……伝えたいことがあるみたい。\"\n[ns6] \"「色彩の嚮導者」になってまでここに来た理由を――\""
10021022-65 = "先生……ごめんなさい……私のせいで、"
10021022-66 = "私が生きている、せいで……私が、死ねなかったから……"
10021022-67 = "私が、間違ったせいで……"
10021022-73 = "……先生？"
10021022-77 = "自分の生を、悔やんだり――責めないで。"
10021022-81 = "幸せになりたいと願う気持ちを――否定しないで。"
10021022-85 = "生きることを諦めて、苦しみから解き放たれた――だなんて悲しい事を言わないで。"
10021022-89 = "苦しむために生まれてきた――なんて、思わないで。"
10021022-90 = "そんな事は絶対にないのだから。"
10021022-91 = "どんな[ruby=こども]生徒[/ruby]も、そう思う必要なんて無いのだから。"
10021022-95 = "子どもの「世界」が、苦しみで溢れているのなら……"
10021022-96 = "子どもが、絶望と悲しみの淵でその生を終わらせたいと願うのなら――"
10021022-97 = "そんな願いが、この世界のどこかにまだ存在するというのなら――"
10021022-98 = "それは――"
10021022-102 = "その「世界」の責任者のせいであって、子どもが抱えるものじゃない――"
10021022-103 = "世界の「責任を負う者」が抱えるものだよ。"
10021022-107 = "たとえ罪を犯したとしても、赦されないことをしたとしても――"
10021022-111 = "[ruby=こども]生徒[/ruby]が責任を負う世界なんて、あってはならないんだよ。"
10021022-115 = "いつ、いかなる時であっても――"
10021022-116 = "子どもと共に生きていく[ruby=・]大[/ruby][ruby=・]人[/ruby]が背負うべき事だからね。"
10021022-126 = "い、いや、だ……"
10021022-127 = "だ、だめ……や……やめ、てお願い……"
10021022-128 = "あ……あぁあああああああ……"
10021022-129 = "せん、せぇええええええええ――――！！！！！！！"
10021022-135 = "驕るな――！！"
10021022-136 = "アレは、お前の知る[ruby=こども]生徒[/ruby]ではない！！"
10021022-138 = "アレは神が顕現したもの――「神秘」であり、「恐怖」であり、「崇高」……「光」であり、「絶対者」！！"
10021022-139 = "アレは「観念」で……お前が理解できない、畏怖すべき対象なのだ！！"
10021022-140 = "想像界で表象され、現実界へと至る――象徴界の記号であり[ruby=メタファー]隠喩[/ruby]なのだ！！！"
10021022-141 = "[ns] （違う、）"
10021022-143 = "[ns7] （あの子は……）\n[ns8] （あの子は、ただ……）"
10021022-146 = "[ns9] （純粋に……自転車と、運動が大好きな……）\n[ns10] （仲間のために、覆面を作って強盗を行うことだって厭わない……）\n[ns11] （アビドス高等学校の……砂狼シロコだよ。）"
10021022-150 = "[ns] 私の「世界」で苦しんでいる、ただの「子ども」だよ。"
10021022-151 = "お前はこの選択を……未来永劫、後悔するだろう――！！"
10021022-152 = "[ns] そうなのかもしれない……でも、"
10021022-163 = "大人として――子供を守り、先生として生徒を守るため。#n大人の責任――先生の義務を、果たすためだよ。"
10021022-167 = "どんな方法だったとしても、#nいかなる代償を支払うことになったとしても。"
10021022-180 = "せん、せい……？"
10021022-185 = "分かりました。仰せの通りに。"
10021022-186 = "たとえ、世界の終焉を招くとしても。"
10021022-192 = "[ns] プレナパテスの言葉に耳を傾ける。"
10021022-194 = "生徒たちを……よろしく、お願いします。"
10021022-198 = "[ns] 応える"
