[translation]
2000303-1 = "O que é a justiça"
2000303-2 = "Trinity - Sala de Aula"
2000303-3 = "Justiça... é um termo que soa belo sempre que é pronunciado. #nExiste palavra mais maravilhosa neste mundo?"
2000303-4 = "Nós, do Comitê de Justiça, nos esforçamos constantemente para espalhar essa justiça por Kivotos e temos punido rigorosamente aqueles que cometem atos injustos."
2000303-5 = "Antigamente, eu pensava que o que as veteranas do comitê faziam era, por si só, a justiça, e que o que vilões como os da Academia Gehenna faziam era o mal, e lutava com esse pensamento... mas, recentemente, minha forma de pensar mudou um pouco."
2000303-6 = "M-mas, é claro, isso não significa que perdi a confiança nas minhas veteranas!"
2000303-7 = "É apenas que, quando elas se formarem, eu eventualmente liderarei o Comitê de Justiça, e, nessa hora, terei que executar a justiça com base no meu próprio julgamento."
2000303-8 = "Para isso, preciso entender claramente o que é a justiça."
2000303-9 = "Foi por isso que preparei este livro, uma obra que está dando o que falar: 'Vamos Falar Sobre Justiça'!"
2000303-10 = "[s] \"'Vamos Falar Sobre Justiça'... ?\""
2000303-11 = "Como esperado de um livro tão comentado, ele é muito bom. #nEste livro traz exemplos de como julgar o que é certo ou errado em diversas situações."
2000303-12 = "Por exemplo... delinquentes que intimidam pessoas são a existência do mal, mas médicos que salvam pessoas de doenças que as fazem sofrer são a existência da justiça. Dizem que comidas deliciosas que trazem alegria são justiça, enquanto comidas que causam desconforto são o mal."
2000303-13 = "Não acha muito claro? #nEsses pontos também são um dos motivos pelos quais eu amo a justiça."
2000303-14 = "No entanto, alguns exemplos escritos neste livro são difíceis de julgar com a minha capacidade, e levei bastante tempo para entender."
2000303-15 = "Se não se importar, poderia pensar nisso comigo e me ensinar que tipo de ação é a justiça?"
2000303-16 = "[s] \"Tudo bem, pode falar.\""
2000303-17 = "Sim, então aqui está o primeiro exemplo."
2000303-18 = "\"Você é o maquinista de um trem. Um dia, você percebe que há cinco pessoas amarradas nos trilhos por onde o trem vai passar.\""
2000303-19 = "\"Se você mudar a rota do trem, as cinco pessoas serão salvas, mas, nesse caso, uma outra pessoa que estava no trilho alternativo será atropelada. #nNesse caso, qual seria a escolha correta?\""
2000303-20 = "Hum... é um problema difícil. Mudar o trilho deveria ser o correto para salvar o maior número de pessoas, mas, se fizer isso, uma pessoa que não precisaria morrer acabará sendo atropelada pelo trem."
2000303-21 = "Evitar uma morte que não deveria acontecer ou salvar a vida de muitas pessoas. Das duas, qual é a escolha mais correta?"
2000303-22 = "[s] \"O que o livro diz?\""
2000303-23 = "Bem... como se trata de um experimento mental, dizem que não existe uma resposta."
2000303-24 = "Justiça sem uma resposta existente... isso é impossível."
2000303-25 = "A justiça deveria ser algo que sempre possui uma resposta única e clara..."
2000303-26 = "[s] \"Mashiro, qual escolha você faria?\""
2000303-27 = "Hum... não haveria um jeito de salvar a todos?"
2000303-28 = "Mesmo que vá contra a intenção de quem propôs o problema, eu não consigo desistir."
2000303-29 = "Não importa a situação, eu vou refletir profundamente, me esforçar e dar o meu melhor para salvar a todos."
2000303-31 = "Porque esse é o caminho da justiça!"
2000303-33 = "Passei um tempo agradável lendo o livro com a Mashiro."
