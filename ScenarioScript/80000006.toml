[translation]
80000006-1 = "狙撃手のチョコレート"
80000006-2 = "正義実現委員会・備品倉庫"
80000006-3 = "（マシロと一緒に、正義実現委員会の倉庫の整理をした。）"
80000006-4 = "ご協力ありがとうございました。"
80000006-5 = "正義実現委員会の備品倉庫は広いですし、私一人では一日かかっても終わらなかったと思います。"
80000006-6 = "[s] \"ううん、ちょうど時間あったから。\""
80000006-7 = "ありがとうございます、先生。いつも感謝しています。"
80000006-8 = "そのお返しというわけではありませんが、もしここで何か欲しいものを見つけられましたら、持って帰っていただいても大丈夫ですよ。"
80000006-9 = "この倉庫のものはすべて不用品と判断されたもので、帳簿にも記載されていないはずなので。"
80000006-10 = "[s] \"そうなんだ。それでも整理しないといけないんだね？\""
80000006-11 = "はい。状態に問題があるわけではないので、いつか改めて必要になるかもしれません。"
80000006-12 = "それに非常食などもしまわれているので、放置し続けると腐ってしまいますし。"
80000006-16 = "……あれ、これは？"
80000006-22 = "[ns1] \"何だろうこれ……？\"\n[ns2] \"レンガ……？\""
80000006-23 = "いいえ、これはチョコレートです。"
80000006-24 = "いいえ、これはチョコレートです。"
80000006-25 = "砂糖とオーツ麦を混ぜて作られた非常食用のチョコレートで、こんなに小さいのに、莫大なカロリーが得られる優れものなんです。"
80000006-26 = "ふふ、ちょうど良かったです。次の作戦に備えて非常食を新しく買おうか悩んでいたので……これを持っていけば良さそうですね。"
80000006-27 = "良かったら先生も、味見してみますか？"
80000006-31 = "[ns3] \"……何とも言えない味！\"\n[ns4] \"これ、賞味期限とかは……？\""
80000006-32 = "えっと……賞味期限は、まだだいぶ残ってますね。"
80000006-33 = "えっと……賞味期限は、まだだいぶ残ってますね。"
80000006-34 = "このチョコレートの目的は生存であって、味わいではありませんので。"
80000006-35 = "チョコレート本来の目的は「元気にするためのもの」とも言われています。そのコンセプトへの忠実さ……それを考えるとこのチョコレートは、他のどのチョコレートよりも「正義」に近いと言えます。"
80000006-36 = "……少し話が変わりますが、ご迷惑でなければこのチョコレート、受け取っていただけませんか？"
80000006-40 = "もちろん、味はあれですが……それはある意味……。"
80000006-41 = "その、先生に、私が思う「正義」を受け取っていただけたら……"
80000006-42 = "私は、すごく嬉しいです。"
