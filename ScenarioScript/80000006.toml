[translation]
80000006-1 = "O Chocolate do Atirador"
80000006-2 = "Comitê de Justiça - Depósito de Suprimentos"
80000006-3 = "（Ajudei Mashiro a organizar o depósito de suprimentos do Comitê de Justiça.）"
80000006-4 = "Muito obrigada pela sua colaboração."
80000006-5 = "O depósito do Comitê de Justiça é muito grande, e acho que eu não teria terminado nem em um dia se estivesse sozinha."
80000006-6 = "[s] \"Não foi nada, eu tinha tempo livre mesmo.\""
80000006-7 = "Obrigada, Sensei. Sou sempre grata a você."
80000006-8 = "Não que seja um presente de retribuição, mas se encontrar algo que queira aqui, pode levar para casa se quiser."
80000006-9 = "Tudo o que está neste depósito foi considerado desnecessário e não deveria estar registrado nos livros de inventário."
80000006-10 = "[s] \"Entendi. Mesmo assim, ainda precisa organizar tudo?\""
80000006-11 = "Sim. Não há nada de errado com o estado dos itens, então talvez precisemos deles novamente algum dia."
80000006-12 = "Além disso, também guardamos rações de emergência aqui, e se deixarmos abandonadas, elas vão estragar."
80000006-16 = "……Ué, o que é isso?"
80000006-22 = "[ns1] \"O que será isso...?\"\n[ns2] \"Um tijolo...?\""
80000006-23 = "Não, isso é chocolate."
80000006-24 = "Não, isso é chocolate."
80000006-25 = "É um chocolate de ração de emergência feito com uma mistura de açúcar e aveia. Apesar de ser tão pequeno, é excelente por fornecer uma quantidade enorme de calorias."
80000006-26 = "Hehe, veio a calhar. Eu estava pensando em comprar novas rações de emergência para a próxima operação... Acho que posso levar isso comigo."
80000006-27 = "Se quiser, Sensei, gostaria de provar?"
80000006-31 = "[ns3] \"……Um sabor indescritível!\"\n[ns4] \"E quanto à validade disso...?\""
80000006-32 = "Bem... ainda falta muito para a data de validade."
80000006-33 = "Bem... ainda falta muito para a data de validade."
80000006-34 = "O propósito deste chocolate é a sobrevivência, não o sabor."
80000006-35 = "Dizem que o propósito original do chocolate é \"trazer energia\". Considerando a fidelidade a esse conceito... acho que este chocolate está mais próximo da \"Justiça\" do que qualquer outro."
80000006-36 = "……Mudando um pouco de assunto, se não for um incômodo, você poderia aceitar este chocolate?"
80000006-40 = "Claro, o sabor deixa a desejar... mas, de certa forma..."
80000006-41 = "Bem, se você pudesse aceitar a \"Justiça\" que eu imagino, Sensei..."
80000006-42 = "Eu ficaria muito feliz."
