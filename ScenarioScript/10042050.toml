[translation]
10042050-1 = "第5話;WHAT A LOVELY DAY"
10042050-2 = "おかしいですね。"
10042050-3 = "[s] \"何が？\""
10042050-4 = "ある地点から痕跡が途切れています。#nネバネバも、ソースまみれになった生徒もいません。"
10042050-5 = "か、代わりに……。"
10042050-6 = "倒れている生徒が増えているような……？"
10042050-7 = "「パターン」に変化が生じたのでしょうか？"
10042050-8 = "[s1] \"「パターン」か……。\"\n[s2] \"チナツも大分慣れてきたね。\""
10042050-11 = "私、ですか……？"
10042050-12 = "まず、サンプルをひとつ確保するとしましょう。#nあちらで倒れている犠牲者にします。"
10042050-15 = "大丈夫ですか？#n……どうしよう、意識がないみたい。"
10042050-16 = "私にお任せください。"
10042050-21 = "どうにかできるんですね！？#n流石セナさんです！"
10042050-25 = "ひ、ひいっ！？"
10042050-26 = "痛っ！#n何するんだ！"
10042050-27 = "[s] \"そ、それは流石に……。\""
10042050-28 = "気付け薬代わりには最適かと。"
10042050-29 = "部長……それって、突然興奮する患者を鎮静化させたり、気絶したふりをする生徒を確かめる時のですよね……？"
10042050-30 = "ええ。どんな時でも使えるからこそ、万能法として知られているのですよ。"
10042050-31 = "それにゲヘナ生が相手なら、手加減する必要はありませんから。"
10042050-32 = "一応、患者なのに……。"
10042050-33 = "すみません、本当に悪気はないのですが……。"
10042050-34 = "と、とりあえず！#n目を覚ました生徒さんに話を聞いてみましょう！"
10042050-36 = "……どうして、私はこんなところに？"
10042050-38 = "あなたはしばらく意識を失っていたのです。#n動くパンケーキを見ませんでしたか？"
10042050-39 = "パンケーキ……？#n待って、何か思い出せそうな……。"
10042050-40 = "あれだ！#n暴れ回る紫の巨大パンケーキ！！"
10042050-41 = "厳密に言えば、あれはパンケーキではありません。#nパンケーキの形をした何かです。"
10042050-42 = "よろしければ、私たちと一緒に来ませんか？#n道案内をお願いしたいのですが。"
10042050-46 = "一緒に……？"
10042050-47 = "は、ははっ……。"
10042050-51 = "ふざけないで……！#nこのままじゃ、全員やられちまう！"
10042050-52 = "あんたも！私も！全員！#n逃げられっこない！"
10042050-53 = "[s3] \"い、いきなりどうしたの！？\"\n[s4] \"お、落ち着いて！\""
10042050-56 = "パニックに陥っていますね。"
10042050-60 = "！？"
10042050-61 = "皆さん、隠れてください！"
10042050-62 = "あちらに安全な場所が！"
10042050-68 = "全員逃げられましたか？"
10042050-69 = "あっ……。"
10042050-70 = "ど、どうかしましたか？"
10042050-71 = "……あれを。"
10042050-72 = "来た……ついに来たぁ！"
10042050-73 = "あぁ、これでようやく……！"
10042050-74 = "どうしたの、あれ？"
10042050-75 = "正気を失ったら、ああなることがあります。#n特に問題ではありません。"
10042050-77 = "いや、この状況を問題視してほしいんだけど！？"
10042050-82 = "終焉が訪れる！運命からは逃れられない！"
10042050-83 = "お前が歩んできた道には、ソースを残してきた！"
10042050-84 = "さあ、パンケーキよ！#n目を覚ませ！声をあげて銃を構えろ！"
10042050-85 = "私を見ろ！私はここにいる！"
10042050-86 = "嗚呼っ！なんて素晴らしい日だ！"
10042050-87 = "お前を遮るものがいれば、嘲笑うが良い！"
10042050-88 = "お前を追うものがいれば、引き裂くが良い！"
10042050-89 = "そして、お前を罵るものがいれば……。"
10042050-90 = "愛するが良い！！！！"
10042050-98 = "[ns5] \"……えっ。\"\n[ns6] \"……行っちゃった。\""
10042050-101 = "……大丈夫、でしょうか？"
10042050-102 = "先ほども言った通り、正気を失っているだけで、命に別状はないはずです。"
10042050-103 = "症状は特殊なようにも見えますが、致命傷というほどでもないでしょう。#nいたって自然治癒可能な範疇です。"
10042050-104 = "いやそんなことなくない……！？"
10042050-105 = "部活間の抗争やスケバン同士の衝突などと同程度の……日常茶飯事ですから。"
10042050-106 = "給食部の皆さんは普段忙しいので……。"
10042050-107 = "ゲヘナで起きている事件や事故の規模について、あまり詳しくないかもしれませんね。"
10042050-108 = "……知らなくて済むのなら、それに越したことはありませんが。"
10042050-109 = "（知らなくていいで済む問題じゃなくない？）"
10042050-113 = "[ns] \"相変わらず、ゲヘナはカオスだね……。\""
10042050-114 = "朝になれば日が昇り、昼になれば給食が出て、救急医学部には死体……いえ、負傷者が搬送される。"
10042050-115 = "そう――何があろうと、ゲヘナはいつものように回る、という意味です。#nもちろん、多少のノイズはあるかもしれませんが。"
10042050-116 = "それは、私たち風紀委員会とヒナ委員長の尽力の賜物であって……！"
10042050-117 = "……いえ、何でもありません。"
10042050-122 = "ところで……。#nさっき、振動を感じませんでしたか？"
10042050-123 = "振動、ですか？"
10042050-124 = "たしかに、なんか変な音が聞こえたような……？"
10042050-125 = "はい。"
10042050-126 = "……どうやら、もう探す必要はないのかもしれません。"
10042050-127 = "[s] \"……どういう意味？\""
10042050-128 = "直接、目にしたほうが早いかと。"
10042050-129 = "あちらです。"
10042050-132 = "[log]セナは無言のまま、とある方角を指し示す。[/log]"
10042050-135 = "[log]その先には――[/log]"
