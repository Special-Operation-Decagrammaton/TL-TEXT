[translation]
10042050-1 = "Episódio 5;WHAT A LOVELY DAY"
10042050-2 = "Que estranho."
10042050-3 = "[s] \"O que foi?\""
10042050-4 = "Os rastros desaparecem a partir de um certo ponto. #nNão há mais gosma, nem alunas cobertas de molho."
10042050-5 = "E, em vez disso..."
10042050-6 = "Parece que o número de alunas desmaiadas está aumentando...?"
10042050-7 = "Será que houve uma mudança no \"padrão\"?"
10042050-8 = "[s1] \"'Padrão', é...\" \n[s2] \"Chinatsu, você já se acostumou bastante com isso, hein.\""
10042050-11 = "Eu, será...?"
10042050-12 = "Primeiro, vamos garantir uma amostra. #nUsaremos aquela vítima desmaiada ali."
10042050-15 = "Você está bem? #n...O que eu faço, parece que ela está inconsciente."
10042050-16 = "Deixe comigo."
10042050-21 = "Você consegue dar um jeito nisso!? #nComo esperado da Sena!"
10042050-25 = "Ai, aiii!?"
10042050-26 = "Ai! #nO que você está fazendo?!"
10042050-27 = "[s] \"I-isso é um pouco demais...\""
10042050-28 = "Acho que é perfeito como um estimulante."
10042050-29 = "Chefe... isso não é o que você usa para acalmar pacientes que ficam agitados de repente ou para verificar se uma aluna está fingindo desmaio...?"
10042050-30 = "Sim. É conhecida como um método universal justamente porque pode ser usada em qualquer situação."
10042050-31 = "Além disso, se for contra uma aluna de Gehenna, não há necessidade de pegar leve."
10042050-32 = "Mesmo que ela seja uma paciente..."
10042050-33 = "Desculpe, eu realmente não tive a intenção de ser maldosa..."
10042050-34 = "B-bem! #nVamos perguntar para a aluna que acordou!"
10042050-36 = "...Por que eu estou em um lugar como este?"
10042050-38 = "Você ficou inconsciente por um tempo. #nVocê não viu uma panqueca andando por aí?"
10042050-39 = "Panqueca...? #nEspere, acho que consigo me lembrar de algo..."
10042050-40 = "É aquilo! #nA panqueca gigante roxa que está destruindo tudo!!"
10042050-41 = "Tecnicamente falando, aquilo não é uma panqueca. #nÉ algo que tem o formato de uma panqueca."
10042050-42 = "Se não se importar, gostaria de vir conosco? #nPrecisamos que nos guie pelo caminho."
10042050-46 = "Junto com vocês...?"
10042050-47 = "Ha, haha..."
10042050-51 = "Não brinquem comigo...! #nDesse jeito, todas nós seremos derrotadas!"
10042050-52 = "Você também! Eu também! Todas nós! #nNão tem como escapar!"
10042050-53 = "[s3] \"O-o que deu em você de repente!?\" \n[s4] \"C-calma!\""
10042050-56 = "Ela entrou em pânico."
10042050-60 = "!?"
10042050-61 = "Pessoal, escondam-se!"
10042050-62 = "Tem um lugar seguro ali!"
10042050-68 = "Todas conseguiram fugir?"
10042050-69 = "Ah..."
10042050-70 = "A-aconteceu alguma coisa?"
10042050-71 = "...Olhem aquilo."
10042050-72 = "Chegou... finalmente chegou!"
10042050-73 = "Ah, com isso finalmente...!"
10042050-74 = "O que há com ele?"
10042050-75 = "Às vezes, quando perdem a sanidade, elas ficam assim. #nNão é um problema em particular."
10042050-77 = "Não, mas eu queria que você considerasse essa situação um problema!?"
10042050-82 = "O fim está próximo! Não há como escapar do destino!"
10042050-83 = "No caminho que você percorreu, você deixou molho para trás!"
10042050-84 = "Vamos, panqueca! #nAcorde! Erga sua voz e prepare sua arma!"
10042050-85 = "Olhe para mim! Eu estou aqui!"
10042050-86 = "Ah! Que dia maravilhoso!"
10042050-87 = "Se houver alguém que te impeça, ria da cara dele!"
10042050-88 = "Se houver alguém que te persiga, despedace-o!"
10042050-89 = "E, se houver alguém que te insulte..."
10042050-90 = "Ame-o!!!!"
10042050-98 = "[ns5] \"...Hã.\"\n[ns6] \"...Eles foram embora.\""
10042050-101 = "...Será que eles estão bem?"
10042050-102 = "Como eu disse antes, eles só perderam a sanidade, não deve haver risco de morte."
10042050-103 = "Os sintomas parecem peculiares, mas não diria que são ferimentos fatais.#nEstão dentro de um limite que pode ser curado naturalmente."
10042050-104 = "Não, isso não é normal...!?"
10042050-105 = "É o mesmo nível de conflitos entre clubes ou brigas entre delinquentes... é algo do dia a dia."
10042050-106 = "O pessoal do Clube de Merenda costuma ser muito ocupado, então..."
10042050-107 = "Talvez eles não estejam muito familiarizados com a escala dos incidentes e acidentes que acontecem em Gehenna."
10042050-108 = "...Se eles puderem viver sem saber, melhor ainda."
10042050-109 = "(Isso não é um problema que se resolve apenas não sabendo, né?)"
10042050-113 = "[ns] \"Como sempre, Gehenna é um caos...\""
10042050-114 = "Quando chega de manhã, o sol nasce; quando chega o meio-dia, a merenda é servida; e quando chega no Departamento de Medicina de Emergência, cadáveres... digo, feridos são transportados."
10042050-115 = "É isso — significa que, não importa o que aconteça, Gehenna continua girando como sempre.#nClaro, pode haver um pouco de ruído, mas nada demais."
10042050-116 = "Isso é fruto dos esforços do nosso Comitê Disciplinar e da Presidente Hina...!"
10042050-117 = "...Não, esqueça."
10042050-122 = "A propósito...#nVocês não sentiram uma vibração agora pouco?"
10042050-123 = "Uma vibração?"
10042050-124 = "De fato, parece que ouvi um som estranho..."
10042050-125 = "Sim."
10042050-126 = "...Parece que talvez não precisemos mais procurar."
10042050-127 = "[s] \"...O que você quer dizer?\""
10042050-128 = "Acho que será mais rápido se virem com seus próprios olhos."
10042050-129 = "É ali."
10042050-132 = "[log]Sena aponta silenciosamente para uma certa direção.[/log]"
10042050-135 = "[log]Lá na frente —[/log]"
