[translation]
21200-1 = "Episódio 20; Millennium Prize"
21200-2 = "Departamento de Desenvolvimento de Jogos da Millennium"
21200-3 = "Ei, ei, Alice, olha só."
21200-4 = "Tcharam, roupa de empregada!"
21200-5 = "Iiiih!"
21200-6 = "（Vrum）"
21200-7 = "Ahaha, que boa reação!"
21200-8 = "O que você está fazendo, poxa! A Alice está completamente apavorada!"
21200-9 = "Alice, você está bem?"
21200-11 = "A-Alice não quer ver roupas de empregada por um bom tempo!"
21200-12 = "Parece que o corpo dela já está totalmente recuperado, mas a mente vai levar um pouco mais de tempo, hein."
21200-13 = "Bem, sobre o incidente de termos destruído o prédio, eu fui falar com o Conselho Estudantil..."
21200-14 = "Felizmente, eles trataram o caso como um 'acidente' durante as atividades do clube."
21200-15 = "Mentira, Yuzu, como você conseguiu isso!? Mesmo que o clube continuasse existindo, eu achei que teríamos que abrir mão do orçamento para pagar o prejuízo...!"
21200-16 = "Não fui eu, parece que o pessoal da C&C resolveu isso."
21200-17 = "E também... um recado da veterana Neru."
21200-18 = "'Vamos nos ver de novo'... foi o que ela disse."
21200-19 = "Iiiih!?"
21200-22 = "Ah, Alice! Não entra no armário! Você acabou aprendendo coisas estranhas vendo a Yuzu!"
21200-23 = "Ufa... bem, se foi assim, então está tudo bem. Aliás..."
21200-24 = "...Sim."
21200-26 = "O Millennium Prize começou."
21200-28 = "Se ganharmos, vamos estourar confetes. Mas, se não ganharmos..."
21200-29 = "...Teremos que fazer as malas imediatamente, né."
21200-30 = "Deixando a gente de lado, a Yuzu e a Alice estão..."
21200-31 = "..."
21200-32 = "..."
21200-34 = "Local da Cerimônia de Premiação do Millennium Prize"
21200-35 = "Daremos início agora ao Millennium Prize! Eu, Kotori, serei a responsável pela apresentação e condução do evento!"
21200-36 = "Desta vez, tivemos o maior número de inscrições na história do Millennium Prize."
21200-37 = "Acredito que isso se deva à mudança de diretrizes do Conselho Estudantil, que tornou necessário apresentar 'resultados' para manter as atividades dos clubes!"
21200-39 = "Departamento de Desenvolvimento de Jogos da Millennium"
21200-40 = "...Parece que o pessoal da Kotori também ficou bem."
21200-41 = "O Clube de Engenharia já é um clube com muitos méritos reconhecidos dentro da Millennium, então... mas, fico muito feliz por elas."
21200-42 = "Sim. Aliás, o maior número de inscrições da história..."
21200-43 = "Isso é um pouco preocupante..."
21200-45 = "A obra vencedora do ano passado, a 'Coletânea de Poemas de Memórias' da Noa, parece ter tido uma intenção um pouco diferente da original... mas aquela sucessão de palavras metafísicas foi avaliada como o melhor tratamento para insônia da Millennium."
21200-46 = "Desta vez também temos: 'Porta-queijo portátil que parece pasta de dente, mas sai queijo mussarela', 'Guarda-chuva de autodefesa com míssil embutido'..."
21200-47 = "'Carregador portátil em formato de gravata', 'Conjunto de roupa íntima com camuflagem óptica', 'Geladeira pessoal em formato de estojo que cabe exatamente uma lata'..."
21200-48 = "E! O jogo retrô que está causando sensação na internet de Kivotos, onde você pode jogar multiplayer pelo celular, 'Tales Saga Chronicle 2', e muito mais!"
21200-49 = "Das centenas de obras inscritas, apenas 7 conquistarão o lugar de honra!"
21200-50 = "(Gulp...)"
21200-51 = "Então, vamos anunciar as obras premiadas, começando pelo 7º lugar!"
21200-52 = "O 7º lugar vai para o Clube de Engenharia, com o 'Conjunto de roupa íntima com camuflagem óptica' da Utaha! É uma obra excêntrica, pois mesmo vestindo, a pele por baixo continua visível, deixando na dúvida se a pessoa está vestida ou não..."
21200-53 = "Foi muito bem avaliado pelo fato de permitir que pacientes com exibicionismo possam exercer seus hobbies legalmente... fico curiosa para saber quem foi o jurado que deu essa nota! De qualquer forma, 7º lugar!"
21200-54 = "Ufa..."
21200-55 = "Bem, nosso jogo não é digno de um 7º lugar, né."
21200-56 = "E o 6º lugar! Este produto é..."
21200-57 = "..."
21200-58 = "O 5º lugar é...!"
21200-59 = "Nossos nomes... não foram chamados."
21200-60 = "O próximo, 4º lugar...!"
21200-61 = "Uuuuh! Por favor, agora!"
21200-62 = "Muito bem, daqui em diante são os 3 melhores! O 3º lugar é...!"
21200-63 = "M-meu coração não vai aguentar!"
21200-64 = "Por favor... por favor..."
21200-65 = "Quem ganhou o 2º lugar por uma margem mínima foi...!"
21200-66 = "..."
21200-67 = "Por favor, digam nossos nomes...!"
21200-68 = "Droga, nem o 2º lugar...!"
21200-69 = "Isso significa que...!"
21200-70 = "...!"
21200-71 = "Por fim! O trabalho que recebeu a maior honra no Millennium Prize desta vez é!"
21200-72 = "Tum-tum..."
21200-73 = "O 1º lugar é...!"
21200-74 = "Uuu...!"
21200-78 = "Voltamos após os comerciais!"
21200-80 = "Alice!!!"
21200-81 = "Carregamento concluído, pronta para disparar a qualquer momento!"
21200-82 = "Eu entendo como se sente! Eu entendo, mas não pode atirar no local da premiação nem na tela...!"
21200-83 = "Uuu, não aguento mais essa tortura..."
21200-85 = "Muito bem! Então, vamos anunciar!"
21200-86 = "O tão esperado 1º lugar é... o Departamento de Desenvolvimento de Novos Materiais——"
21200-87 = "(Bang, bang, bang!)"
21200-88 = "Ahhh! Por que você atirou na tela de verdade!?"
21200-89 = "De qualquer forma, eles iam levar tudo, então não importa mais!"
21200-90 = "Ueeeee! Desta vez é o fim de tudo mesmo!!!!"
21200-92 = "Uuu..."
21200-93 = "No fim, acabar desse jeito..."
21200-96 = "Calma, irmã. Mas..."
21200-97 = "...Eu sei! Não significa que tudo foi negado, não precisamos desanimar..."
21200-98 = "A avaliação na internet não foi ruim, e desde aquela época em que éramos o 1º lugar no ranking de jogos ruins, nós crescemos de verdade."
21200-99 = "Tenho certeza de que continuaremos crescendo daqui para frente."
21200-100 = "Na próxima vez, teremos um resultado melhor e com certeza ganharemos uma sala de clube maior e mais digna! ...Mas,"
21200-101 = "Sim... porque se formos expulsas daqui, a Yuzu-chan e a Alice-chan..."
21200-102 = "...Não se preocupe, Midori."
21200-103 = "Eu vou voltar para o dormitório."
21200-105 = "Hã?"
21200-106 = "Acho que não tem mais ninguém que me chame de desenvolvedora de jogos ruins. Não, mesmo que houvesse, está tudo bem."
21200-107 = "Porque agora eu tenho... estas três e o Sensei."
21200-108 = "Muito obrigada, Sensei."
21200-109 = "Desde que o Sensei veio a esta sala de clube... nós conseguimos mudar muito."
21200-110 = "Só que, a Alice-chan..."
21200-114 = "[ns1] \"...Sim, deixe comigo.\"\n[ns2] \"Alice, você quer vir para o Schale?\""
21200-115 = "...Alice-chan."
21200-116 = "...Alice-chan."
21200-117 = "..."
21200-118 = "...Desculpe."
21200-119 = "Não."
21200-120 = "Porque eu posso confiar no Sensei."
21200-121 = "Mas..."
21200-122 = "Já..."
21200-124 = "Então... não poderemos mais ficar juntas, não é?"
21200-125 = "!!"
21200-126 = "Ah, me desculpa... me desculpa, Alice-chan!"
21200-127 = "Eu vou ao Schale todos os dias! Sério, eu vou absolutamente todos os dias!"
21200-128 = "Não importa para onde você vá! Vamos continuar criando jogos juntas!"
21200-130 = "Uuuuu...!"
21200-131 = "N-não, eu não quero!"
21200-132 = "Sensei! Você não pode levar a Alice embora!"
21200-133 = "E-eu vou levar ela para o meu quarto! Vamos usar a mesma cama! Vou dividir minha comida com ela também!"
21200-134 = "E-eu dou a minha parte também!"
21200-135 = "Vocês duas, parem de incomodar o Sensei... Além disso, se isso for descoberto, a Momoi e a Midori vão..."
21200-137 = "(Clack)"
21200-138 = "Momoi! Midori! Alice-chan! Yuzu!"
21200-139 = "Eek! A Yuuka já chegou!"
21200-140 = "E-espera um pouco! Não precisa ser tão rápido assim...!"
21200-141 = "Sua demônia! O conselho estudantil não tem coração, não!?"
21200-143 = "Parabéns!"
21200-144 = "...?"
21200-145 = "...Hã?"
21200-146 = "E-eh...?"
21200-149 = "?"
21200-150 = "Ué, por que essa reação?"
21200-151 = "Vocês não viram o resultado?"
21200-152 = "...Resultado?"
21200-153 = "Nós não conseguimos ficar entre as 7 primeiras..."
21200-154 = "Hã?"
21200-155 = "Do que você está falando? A transmissão ainda está rolando, olhe direito."
21200-156 = "É que a minha irmã explodiu o monitor..."
21200-157 = "Sério, o que vocês estão fazendo... Olha só. Eu estava acompanhando pelo celular e vim correndo para cá."
21200-159 = "Local da Cerimônia de Premiação do Millennium Prize"
21200-160 = "Até hoje, o Millennium Prize tem premiado obras criadas pelo talento e habilidade dos alunos, focando principalmente na \"praticidade\". Isso se baseia no princípio de buscar e concretizar um futuro melhor."
21200-161 = "No entanto, entre as obras desta edição, houve uma que nos fez sentir a \"praticidade\" sob uma nova perspectiva. Um certo \"jogo\" que, na prática, nos fez relembrar vividamente um passado nostálgico e sentir o potencial para o futuro."
21200-162 = "Portanto, decidimos tomar uma decisão excepcional desta vez."
21200-163 = "Criamos um \"Prêmio Especial\", e a obra vencedora é... \"Tales Saga Chronicle 2\" do Departamento de Desenvolvimento de Jogos."
21200-164 = "Sério, mentira!?"
21200-165 = "O que está acontecendo...?"
21200-166 = "Um conceito retrô que transcende eras, um desenvolvimento que ignora o senso comum e supera a imaginação, e uma visão de mundo misteriosa que, à primeira vista, não parece combinar com nada disso... No início, ficamos confusos..."
21200-167 = "Viajar por um novo mundo, formar novos laços um a um, e partir para derrotar o Rei Demônio..."
21200-168 = "Acredito que esta obra contém, de forma sólida, a diversão fundamental de um RPG."
21200-169 = "Enquanto jogava, lembrei vividamente da época em que me apaixonei por jogos pela primeira vez. Avaliando esses pontos, decidimos dar a esta obra..."
21200-171 = "O \"Prêmio Especial\" do Millennium Prize desta edição."
21200-174 = "Departamento de Desenvolvimento de Jogos do Millennium"
21200-175 = "Ah... oh..."
21200-176 = "Parabéns, de verdade! Sabe, eu também joguei. Não posso dizer que foi divertido do início ao fim, mas... pude sentir aquela sensação única que temos depois de jogar um bom jogo."
21200-178 = "Momo, Mido! Eu também joguei \"TSC2\", foi super divertido! A internet inteira está falando disso agora!"
21200-179 = "Segundo as pesquisas da Veritas, o número de buscas por \"TSC2\" já superou o nome de ídolos famosas!"
21200-180 = "S-sério mesmo...?"
21200-183 = "Confirmado."
21200-184 = "O 'Tales Saga Chronicle 2', que foi enviado há 3 horas, tinha 7705 downloads e um total de 1372 comentários até agora, mas..."
21200-185 = "Desde o anúncio do Millennium Prize, o número de downloads ultrapassou 10 mil em cerca de 26 segundos."
21200-186 = "!?"
21200-187 = "Cerca de 500 comentários foram adicionados. Pelo tom das palavras, 242 são negativos ou de dúvida, 191 são positivos ou de expectativa, e o restante é incerto ou está com a avaliação pendente."
21200-188 = "Ei, espera... Então, isso significa que nós... estamos acabadas, afinal!?"
21200-189 = "Não, não é bem assim."
21200-190 = "Yuzu...?"
21200-191 = "..."
21200-192 = "..."
21200-193 = "Olhem. Estes são os dois comentários mais bem avaliados, que estão empatados em empatia..."
21200-195 = "<chicken: No começo, fiquei muito em dúvida se deveria jogar ou não... Mas agora penso assim: fico feliz por ter conhecido este jogo.>"
21200-196 = "<Kotoha0507: Até agora, eu tinha preconceito contra o Millennium.>"
21200-197 = "<Kotoha0507: Posso afirmar que o preconceito de que os alunos do Millennium só têm frieza e racionalidade desapareceu completamente com este Millennium Prize e com 'Tales Saga Chronicle 2'.>"
21200-198 = "...!"
21200-199 = "Espera... isso significa que não seremos fechadas, certo!?"
21200-202 = "Sim, é isso. Ah, mas é apenas uma 'suspensão temporária'. Não é uma premiação oficial, então, como conselho estudantil, decidimos... 'adiar' o confisco da sala e o fechamento do Clube de Desenvolvimento de Jogos até o próximo semestre."
21200-203 = "Ah, e também..."
21200-204 = "Sobre isso..."
21200-205 = "Hm?"
21200-206 = "...Desculpe. Por ter chamado os consoles de videogame aqui de tralha..."
21200-207 = "Graças a vocês, eu me lembrei. De vários jogos que eu jogava quando era pequena. Pude sentir, depois de muito tempo, a alegria de viajar por aquele... novo mundo."
21200-208 = "...Obrigada. Bem, vocês precisarão solicitar a extensão do uso da sala e processar o recebimento da verba do clube, então venham ao conselho estudantil quando estiverem calmas. Até mais!"
21200-211 = "En-então...!"
21200-212 = "...!"
21200-213 = "Con..."
21200-214 = "Conseguimos!!!"
21200-215 = "Que bom...!"
21200-216 = "Conseguimos... estou tão feliz...!"
21200-218 = "???"
21200-219 = "Ei, espera...?"
21200-220 = "Alice! Nós ganhamos o prêmio especial! Este lugar continuará sendo a nossa sala de clube!"
21200-221 = "Espera, i-isso significa..."
21200-222 = "Alice pode... continuar ficando com todas vocês...?"
21200-225 = "Sim!"
21200-228 = "Vamos continuar juntas daqui para frente...!"
21200-229 = "..."
21200-230 = "Eu também... eu também estou feliz."
21200-231 = "Alice!!"
21200-232 = "Nós...!!"
21200-233 = "Vamos ficar juntas para sempre!"
21200-234 = "...Sim!"
21200-238 = "Conto com vocês daqui para frente...!"
21200-243 = "............"
21200-244 = "Taxa de recuperação de dados: 98,00%"
21200-245 = "Sistema em operação..."
21200-246 = "Preparação concluída"
21200-247 = "Configurando programa............"
21200-250 = "Divi:Sion..."
21200-251 = "..."
21200-253 = "[9b1e1e]AL-1S...[wa:1000] Não... eu..."
21200-255 = "[9b1e1e]Aris……[wa:1000]Minha……"
21200-257 = "[9b1e1e]Minha, preciosa…[wa:500]…[wa:500]…[wa:500]…[wa:1000]！@#$%$^&*（！@$！！"
21200-261 = "Romance Retrô"
