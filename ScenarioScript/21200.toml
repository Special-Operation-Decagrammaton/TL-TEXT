21200-159 = "Prêmio Millennium · Salão da#nCerimônia de Premiação"
21200-160 = "Até hoje, o Prêmio Millennium#npremiou as obras criadas pelo talento#ne pela capacidade das alunas tendo a#n\"utilidade prática\" como eixo. Isso#nse baseia no propósito de buscar e#nconcretizar um futuro melhor."
21200-161 = "Porém, entre as obras desta vez,#nhouve uma que nos fez sentir a#n\"utilidade prática\" sob um novo#nângulo. Um certo \"jogo\" de fato nos#nfez recordar, vívido, um passado#nnostálgico, e sentir a possibilidade do#nfuturo."
21200-162 = "Por isso, desta vez, decidimos#nfazer uma escolha excepcional."
21200-163 = "Desta vez instituímos um \"Prêmio#nEspecial\", e a obra premiada é…… o#n\"Tales Saga Chronicle 2\", do#nDepartamento de Desenvolvimento de#nJogos."
21200-164 = "Heein, mentira!?"
21200-165 = "O que tá acontecendo……?"
21200-166 = "O conceito atemporal do estilo#nretrô, os desdobramentos que, sem se#nprender ao senso comum, superam a#nimaginação um após o outro, e uma#nambientação inusitada que, à primeira#nvista, não pareceria combinar com tudo#nisso — no começo, foi uma sequência de#nperplexidades, mas……"
21200-167 = "Viajar por um mundo novo, atando,#numa a um, novos laços, e ir derrotar#no Rei Demônio……"
21200-168 = "É uma obra na qual essa diversão#nfundamental do RPG está bem#ncondensada, eu diria."
21200-169 = "Jogando, lembrei, vívida, da época#nem que, certa vez, me apaixonei por um#njogo pela primeira vez. Avaliando esses#npontos, a esta obra……"
21200-171 = "concedemos, desta vez, o \"Prêmio#nEspecial\" do Prêmio Millennium."
