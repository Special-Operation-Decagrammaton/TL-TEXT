21200-175 = "Hã…… ah……"
21200-176 = "Parabéns de verdade! Ãh, na real#neu também joguei. Não dá pra dizer#nque foi divertido sem ressalvas, mas……#ndeu pra sentir aquela sensação tão#nparticular de quando a gente termina#num bom jogo."
21200-178 = "Momo, Mido! Eu também joguei o#n\"TSC2\", foi divertidíssimo! Agora tá#num auê na internet também!"
