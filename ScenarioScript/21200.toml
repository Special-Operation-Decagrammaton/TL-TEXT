[translation]
21200-1 = "Episódio 20; Millennium Prize"
21200-2 = "Millennium - Depto. de Desenvolvimento de Jogos"
21200-3 = "Ei, ei, Aris, olha só~."
21200-4 = "Ta-daaaan, roupa de maid~!"
21200-5 = "Hiii!"
21200-6 = "(Swoosh)"
21200-7 = "Ahaha, bela reação!"
21200-8 = "O que você tá fazendo, para com isso! A Aris-chan tá morrendo de medo!"
21200-9 = "Aris-chan, você tá bem?"
21200-11 = "A-Aris não quer ver uma roupa de maid por um bom tempo!"
21200-12 = "O corpo dela parece já ter se curado completamente, mas acho que vai levar um tempinho pro coração se recuperar."
21200-13 = "Ehm, sobre o prédio que a gente destruiu, eu fui lá no Conselho Estudantil, mas..."
21200-14 = "Felizmente, eles registraram o caso como um 'acidente' durante as atividades de clube."
21200-15 = "Mentira, como você conseguiu isso, Yuzu!? Eu tinha certeza de que, mesmo se o clube continuasse, a gente ia ter que abrir mão do orçamento pra pagar os estragos...!"
21200-16 = "Não fui eu, parece que foi o pessoal da C&C que resolveu as coisas."
21200-17 = "E também... tem uma mensagem da Neru-senpai."
21200-18 = "'A gente se vê por aí'... foi o que ela disse."
21200-19 = "Hiii!?"
21200-22 = "Aah, Aris-chan! Não entra no armário! Aprendeu coisas estranhas vendo a Yuzu-chan!"
21200-23 = "Fuuu... Bom, se foi assim, menos mal. Mudando de assunto..."
21200-24 = "......Sim."
21200-26 = "O Millennium Prize já vai começar, né."
21200-28 = "Se a gente ganhar, vamos estourar confetes. Mas, se não ganharmos..."
21200-29 = "......Vamos ter que empacotar as nossas coisas logo."
21200-30 = "Deixando a gente de lado, a Yuzu-chan e a Aris-chan..."
21200-31 = "......"
21200-32 = "......"
21200-34 = "Millennium Prize - Local da Cerimônia de Premiação"
21200-35 = "A partir de agora, daremos início ao Millennium Prize! Sou a Kotori, e serei a mestre de cerimônias!"
21200-36 = "Desta vez, tivemos o maior número de inscrições de toda a história do Millennium Prize."
21200-37 = "Acredito que isso seja reflexo da mudança nas diretrizes do Conselho Estudantil, exigindo 'resultados' para a manutenção dos clubes!"
21200-39 = "Millennium - Depto. de Desenvolvimento de Jogos"
21200-40 = "......Parece que a Kotori-chan e o resto também estão bem."
21200-41 = "O Clube de Engenharia já era um clube com muitas conquistas reconhecidas na Millennium, mas... ainda bem que deu tudo certo."
21200-42 = "Uhum. Por falar nisso, maior número de inscrições da história..."
21200-43 = "Isso é um probleminha pra gente..."
21200-45 = "A obra vencedora do ano passado, a 'Antologia de Poesias de Lembranças' da senhorita Noa, acabou tendo um resultado um pouco diferente da sua intenção original, mas... aquela sequência de palavras metafísicas foi avaliada como o melhor tratamento contra a insônia da Millennium."
21200-46 = "Desta vez, também temos 'A queijeira portátil que parece pasta de dente, mas solta queijo mussarela', 'O guarda-chuva de autodefesa com mísseis embutidos'..."
21200-47 = "'O power bank em formato de gravata', 'O conjunto de roupas íntimas com camuflagem ótica', 'A geladeira pessoal em formato de estojo escolar que cabe exatamente uma lata'..."
21200-48 = "E! O jogo retrô com multiplayer para smartphones que está causando sensação na internet de Kivotos no momento, 'Tales Saga Chronicle 2', entre muitos outros!"
21200-49 = "Dentre as centenas de obras inscritas desta vez, apenas 7 ocuparão os assentos de glória!"
21200-50 = "(Gulp...)"
21200-51 = "Então, anunciaremos as obras premiadas a partir do 7º lugar!"
21200-52 = "O 7º lugar vai para a Utaha-san, do Clube de Engenharia, com o 'Conjunto de roupas íntimas com camuflagem ótica'! Esta é uma obra excêntrica em que, ao vesti-la, a pele nua por baixo fica visível, tornando impossível saber se a pessoa está ou não vestindo alguma coisa, mas..."
21200-53 = "Recebeu uma avaliação altíssima por permitir que pacientes com exibicionismo cultivem seus hobbies de forma legal... Ficamos curiosos para saber qual jurado deu essa avaliação! Enfim, 7º lugar!"
21200-54 = "Fuuu..."
21200-55 = "Bom, o nosso jogo não combina com o 7º lugar."
21200-56 = "E o 6º lugar! Este produto é..."
21200-57 = "......"
21200-58 = "O 5º lugar é...!"
21200-59 = "O nosso nome... não foi chamado."
21200-60 = "O próximo, 4º lugar...!"
21200-61 = "Uuuh! Já passou da hora, por favor!"
21200-62 = "E agora, o Top 3! O 3º lugar é...!"
21200-63 = "O-O meu coração não vai aguentar!"
21200-64 = "Por favor... por favor..."
21200-65 = "O vencedor do 2º lugar, por uma diferença mínima, é...!"
21200-66 = "......"
21200-67 = "Por favor, o nosso nome...!"
21200-68 = "Ugh, também não é o 2º lugar...!"
21200-69 = "Isso quer dizer que...!"
21200-70 = "......!"
21200-71 = "Por fim! A obra que recebeu a maior honraria deste Millennium Prize!"
21200-72 = "*Tum-tum...*"
21200-73 = "O 1º lugar é...!"
21200-74 = "Uuuh...!"
21200-78 = "Depois dos comerciais!"
21200-80 = "Ariiiiis!!!"
21200-81 = "Carregamento concluído, pronta para disparar a qualquer momento!"
21200-82 = "Eu entendo o seu sentimento! Eu também sinto o mesmo, mas você não pode atirar no local da premiação e nem nessa tela...!"
21200-83 = "Uuh, eu não quero mais que fiquem enrolando..."
21200-85 = "Muito bem! Então, vamos anunciar!"
21200-86 = "O tão aguardado 1º lugar é... O Clube de Desenvolvimento de Novos Materiais――"
21200-87 = "(Bam bam bam!)"
21200-88 = "Kyaah! O que você vai fazer atirando na tela de verdade!?"
21200-89 = "Já vão levar tudo mesmo, então não importa mais!"
21200-90 = "Buaaaaah! Dessa vez é o fiiiim de verdadeee!!"
21200-92 = "Uuuh..."
21200-93 = "No fim, tudo acabou assim..."
21200-96 = "Acalme-se, mana. Mas..."
21200-97 = "......Eu sei! Não é como se tudo tivesse sido negado, a gente não precisa se abater por isso..."
21200-98 = "A recepção na internet não foi ruim, nós crescemos muito desde a época em que ficamos em 1º no ranking de Piores Jogos."
21200-99 = "Nós com certeza continuaremos crescendo daqui pra frente."
21200-100 = "Da próxima vez nós vamos ter um resultado muito melhor, e com certeza vão nos dar uma sala maior e mais chique que essa! ......Mas,"
21200-101 = "Sim... Porque se formos expulsas daqui, a Yuzu-chan e a Aris-chan..."
21200-102 = "......Não se preocupe, Midori."
21200-103 = "Eu vou voltar pro dormitório."
21200-105 = "Eh?"
21200-106 = "Acho que não tem mais ninguém que me chame de desenvolvedora de jogos lixo. Não, mesmo se tiver, tá tudo bem."
21200-107 = "A eu de agora... tem vocês três, e o Sensei."
21200-108 = "Muito obrigada, Sensei."
21200-109 = "Desde o momento em que o Sensei veio a esta sala de clube... nós conseguimos mudar drasticamente."
21200-110 = "O único problema, é a Aris-chan..."
21200-114 = "[ns1] \"......Sim, deixem comigo.\"\n[ns2] \"Aris, quer vir para a Schale?\""
21200-115 = "......Aris-chan."
21200-116 = "......Aris-chan."
21200-117 = "......"
21200-118 = "......Desculpe."
21200-119 = "Não."
21200-120 = "A Aris pode confiar no Sensei."
21200-121 = "Mas..."
21200-122 = "Agora..."
21200-124 = "Não poderei... mais ficar junto com todo mundo, não é?"
21200-125 = "!!"
21200-126 = "Ugh, me desculpa... me desculpa, Aris-chan!"
21200-127 = "Eu vou pra Schale todo dia! De verdade, juro que vou todo dia!"
21200-128 = "Não importa onde a gente vá! Vamos criar jogos juntas!"
21200-130 = "Uuuuuuh...!"
21200-131 = "Não, eu não quero!"
21200-132 = "Sensei! Você não pode levar a Aris!"
21200-133 = "V-Vou levar ela pro meu quarto! A gente vai dividir a cama! E vamos dividir a comida também!"
21200-134 = "E-Eu também dou a minha parte pra ela!"
21200-135 = "Vocês duas, não compliquem as coisas pro Sensei... E além disso, se descobrirem, a Momoi e a Midori também..."
21200-137 = "(Clack!)"
21200-138 = "Momoi! Midori! Aris-chan! Yuzu!"
21200-139 = "Hiii! A Yuuka já tá aqui!"
21200-140 = "E-Espera um pouco! Não precisava ser tão rápido assim...!"
21200-141 = "Seu demônio! O Conselho Estudantil não tem coração!?"
21200-143 = "Parabéns!"
21200-144 = "......?"
21200-145 = "......Eh?"
21200-146 = "E-Eh...?"
21200-149 = "?"
21200-150 = "Eh, qual é a dessa reação?"
21200-151 = "Vocês não viram o resultado?"
21200-152 = "......Resultado?"
21200-153 = "Nós não conseguimos ficar entre os 7 primeiros..."
21200-154 = "Hã?"
21200-155 = "O que vocês tão dizendo? A transmissão ainda tá rolando, deem uma olhada direito."
21200-156 = "A mana atirou na tela e destruiu tudo..."
21200-157 = "O que raios vocês tão fazendo... Olhem aqui, olhem. Eu tava assistindo pelo celular e vim correndo na metade do caminho."
21200-159 = "Millennium Prize - Local da Cerimônia de Premiação"
21200-160 = "Até agora, o Millennium Prize tem premiado obras criadas com o talento e a capacidade dos alunos, tendo a 'praticidade' como foco. Isso é baseado no princípio de buscar e realizar um futuro melhor."
21200-161 = "No entanto, entre as obras desta vez, houve uma que nos fez sentir a 'praticidade' a partir de um ângulo diferente. Um certo 'jogo' nos trouxe à tona lembranças nostálgicas do passado de forma tão vívida e nos fez sentir possibilidades para o futuro."
21200-162 = "Portanto, decidimos fazer uma escolha excepcional desta vez."
21200-163 = "Estabelecemos um 'Prêmio Especial' para esta edição, e a obra vencedora é... o 'Tales Saga Chronicle 2', do Departamento de Desenvolvimento de Jogos."
21200-164 = "Eeeh, mentira!?"
21200-165 = "O que tá acontecendo...?"
21200-166 = "Um conceito retrô que transcende as épocas, desenvolvimentos que rompem o senso comum e superam a imaginação um após o outro, uma visão de mundo misteriosa que à primeira vista parece não combinar com nada... No começo, foi uma sucessão de confusões, mas..."
21200-167 = "Viajar por um novo mundo, formando novos laços um a um, para ir derrotar o Rei Demônio..."
21200-168 = "Acredito que esta obra capturou firmemente a diversão fundamental e essencial de um RPG."
21200-169 = "Enquanto jogava, lembrei-me vividamente da época em que fiquei fascinada por um jogo pela primeira vez. Avaliando esses pontos, nós concedemos a esta obra..."
21200-171 = "O 'Prêmio Especial' do Millennium Prize desta edição."
21200-174 = "Millennium - Depto. de Desenvolvimento de Jogos"
21200-175 = "Eh... a..."
21200-176 = "Meus parabéns! Bem, na verdade eu também joguei. Não dá pra dizer abertamente que foi divertido, mas... eu pude sentir aquela sensação única de depois de jogar um bom jogo."
21200-178 = "Momo, Mido! Eu também joguei o 'TSC2', achei superdivertido! Tá rolando um alvoroço gigante na internet agora!"
21200-179 = "De acordo com a pesquisa da Veritas, o número de buscas por 'TSC2' tá maior do que o nome de idols famosas!"
21200-180 = "D-De verdade...?"
21200-183 = "Eu confirmei."
21200-184 = "O 'Tales Saga Chronicle 2', que foi postado há 3 horas, estava com 7.705 downloads e um total de 1.372 comentários até agora há pouco..."
21200-185 = "Mas após o anúncio do Millennium Prize, o número de downloads ultrapassou os 10 mil em cerca de 26 segundos."
21200-186 = "!?"
21200-187 = "Cerca de 500 comentários também foram adicionados, e pela nuance das palavras, há 242 comentários negativos ou de suspeita, 191 comentários positivos e de expectativa, e os restantes são comentários indefinidos ou que reservaram a avaliação para depois."
21200-188 = "Ué...? E-Então a gente... no fim das contas não foi bem!?"
21200-189 = "Não, isso não é verdade."
21200-190 = "Yuzu-chan...?"
21200-191 = "......"
21200-192 = "......"
21200-193 = "Vejam. Há dois comentários principais empatados agora, com mais curtidas de concordância..."
21200-195 = "<chicken: No começo, eu estava em dúvida se deveria mesmo jogar isso... Mas agora eu sinto o seguinte: ainda bem que conheci este jogo.>"
21200-196 = "<Kotoha0507: Até agora, eu tinha alguns preconceitos em relação à Millennium.>"
21200-197 = "<Kotoha0507: Posso afirmar com toda a certeza que o preconceito de que os alunos da Millennium só ligavam para frieza e racionalidade desapareceu completamente, graças a este Millennium Prize e a este 'Tales Saga Chronicle 2'.>"
21200-198 = "......!"
21200-199 = "Ehm... isso quer dizer que o clube não vai mais ser fechado!?"
21200-202 = "Sim, exatamente. Ah, mas é só um 'período de carência temporário'. Como não foi um prêmio oficial, o Conselho Estudantil decidiu 'adiar' o confisco da sala do Departamento de Desenvolvimento de Jogos e o fechamento do clube... até o semestre que vem."
21200-203 = "E também..."
21200-204 = "Bem..."
21200-205 = "Hm?"
21200-206 = "......Me-me desculpem. Por ter chamado os consoles de videogame daqui de lixo..."
21200-207 = "Graças a vocês, eu me lembrei. Dos vários jogos que eu jogava quando era pequena. Há muito tempo eu não sentia aquela diversão... de viajar por um novo mundo."
21200-208 = "......Obrigada. Bom, vocês vão precisar preencher o pedido de prorrogação da sala do clube e os papéis para o recebimento do orçamento, então quando se acalmarem, passem na sala do Conselho Estudantil. Até mais tarde!"
21200-211 = "E-Então...!"
21200-212 = "......!"
21200-213 = "Aê..."
21200-214 = "Aêeeeee conseguiiiimoooos!"
21200-215 = "Ainda bem...!"
21200-216 = "Conseguimos... estou tão feliz...!"
21200-218 = "???"
21200-219 = "Eh, ehm...?"
21200-220 = "Aris-chan! Nós ganhamos o Prêmio Especial! Este lugar vai continuar sendo a sala do nosso clube!"
21200-221 = "Ehm, i-isso quer dizer que..."
21200-222 = "A Aris vai poder... continuar junto com todo mundo de agora em diante...?"
21200-225 = "Sim!"
21200-228 = "Contamos com você de novo...!"
21200-229 = "......"
21200-230 = "Eu também... Eu também, estou muito feliz."
21200-231 = "Aris-chaaan!!"
21200-232 = "Nós...!!"
21200-233 = "A gente vai ficar juntas pra sempre!"
21200-234 = "......Sim!"
21200-238 = "Conto com todas vocês de agora em diante...!"
21200-243 = "............"
21200-244 = "Taxa de recuperação de dados: 98.00%"
21200-245 = "Ativação do sistema..."
21200-246 = "Preparações concluídas"
21200-247 = "Configurando programa............"
21200-250 = "Divi:Sion......"
21200-251 = "......"
21200-253 = "[9b1e1e]AL-1S...[wa:1000] Não..."
21200-255 = "[9b1e1e]A r i s...[wa:1000] Minha..."
21200-257 = "[9b1e1e]Minha, preciosa...[wa:500]...[wa:500]...[wa:500]...[wa:1000]!@#$%$^&*(!@$!!"
21200-261 = "Romance Retrô"