[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21200-1 = "Episódio 20: Prêmio Millennium."
21200-2 = "Millennium · Clube de Desenvolvimento de Jogos"
21200-3 = "Ei, ei, Aris, olha, olha~."
21200-4 = "Tcharaaan, vestido de maid~!"
21200-5 = "Iih!"
21200-6 = "(Vuuum)"
21200-7 = "Ahaha, que reação boa!"
21200-8 = "Que isso, francamente! A Aris ficou\ncompletamente apavorada!"
21200-9 = "Aris, você tá bem?"
21200-11 = "A-Aris não quer ver vestido de maid\npor um bom tempo!"
21200-12 = "O corpo parece ter sarado tudo, mas a parte\nemocional ainda vai levar um tempinho, né."
21200-13 = "Ãh, sobre aquele caso de ter destruído o prédio,\neu fui até o Conselho resolver, e……"
21200-14 = "por sorte, conseguiram tratar como um \"acidente\"\nem atividade de clube."
21200-15 = "Mentira, Yuzu, como você conseguiu isso!? Mesmo\nque o clube continuasse, eu já tava me conformando\nem perder a verba como indenização……!"
21200-16 = "Não fui eu, parece que foi o C&C que resolveu."
21200-17 = "E, além disso…… um recado da Neru."
21200-18 = "\"A gente se vê de novo\"…… foi o que ela disse."
21200-19 = "Iih!?"
21200-22 = "Aah, Aris! Não entra dentro do armário! Você\naprendeu mania esquisita olhando a Yuzu!"
21200-23 = "Ufa…… bom, se é assim, então tá ótimo. Aliás……"
21200-24 = "……Sim."
21200-26 = "O Prêmio Millennium começou, né."
21200-28 = "Se a gente ganhar, bora estourar os confetes.\nMas, se não for o caso……"
21200-29 = "……a gente tem que fazer as malas, rapidinho."
21200-30 = "Nós à parte, a Yuzu e a Aris……"
21200-31 = "……"
21200-32 = "……"
21200-34 = "Prêmio Millennium · Salão da Cerimônia de Premiação"
21200-35 = "A partir de agora, damos início ao Prêmio\nMillennium! Quem assina a apresentação e a\ncondução sou eu, a Kotori!"
21200-36 = "Desta vez, tivemos o maior número de inscrições\nde toda a história do Prêmio Millennium."
21200-37 = "Provavelmente, é efeito da mudança de política do\nConselho, que passou a exigir \"resultado\" pra manter\nas atividades de clube!"
21200-39 = "Millennium · Clube de Desenvolvimento de Jogos"
21200-40 = "……A Kotori e companhia também parece que\nsaíram dessa bem, né."
21200-41 = "O Clube de Engenharia, originalmente, já é um clube\nbem reconhecido na Millennium, então…… mas,\nde verdade, que bom."
21200-42 = "Sim. Aliás, o maior número de inscrições\nda história……"
21200-43 = "Isso é meio preocupante……"
21200-45 = "A obra vencedora do ano passado, a \"Coletânea de\nPoemas das Memórias\" da Noa, teve um propósito\num pouco diferente do original, mas…… aquele\namontoado de palavras metafísicas foi avaliado como\no melhor tratamento da Millennium contra a insônia."
21200-46 = "Desta vez também temos: o \"porta-queijo portátil\nque parece pasta de dente mas solta muçarela\", o\n\"guarda-chuva de defesa pessoal com míssil embutido\"……"
21200-47 = "o \"power bank em formato de gravata\", o \"conjunto\nde roupa íntima com camuflagem óptica\", a\n\"mini-geladeira pessoal em formato de estojo, que\ncabe exatamente uma latinha\"……"
21200-48 = "E! Aquele que está causando sensação na internet de\nKivotos agora, o jogo estilo retrô com multiplayer no\ncelular, o \"Tales Saga Chronicle 2\", entre outros!"
21200-49 = "Das mais de cem obras inscritas desta vez, as que\nvão conquistar o lugar de glória são apenas 7!"
21200-50 = "(Engole em seco……)"
21200-51 = "Então, a partir do 7º lugar, vamos anunciar\nas obras premiadas!"
21200-52 = "O 7º lugar é do Clube de Engenharia, o \"conjunto de\nroupa íntima com camuflagem óptica\" da Utaha! Como,\nmesmo vestindo, a pele por baixo fica à mostra, é\numa obra excêntrica em que não dá pra saber se a\npessoa está vestida ou não……"
21200-53 = "Por permitir que pacientes exibicionistas exerçam\nseu hobby de forma legal, recebeu uma avaliação\naltíssima…… fico curiosa pra saber quem foi o jurado\nque deu essa nota! Enfim, 7º lugar!"
21200-54 = "Ufa……"
21200-55 = "Bom, o nosso jogo não combina mesmo\ncom um 7º lugar, né."
21200-56 = "E o 6º lugar! Este produto é……"
21200-57 = "……"
21200-58 = "O 5º lugar é……!"
21200-59 = "O nosso nome…… não foi chamado, né."
21200-60 = "O próximo, 4º lugar……!"
21200-61 = "Uuh! Já vai, por favor!"
21200-62 = "Bom, daqui pra frente é o Top 3! O 3º lugar é……!"
21200-63 = "M-meu coração não aguenta mais!"
21200-64 = "Por favor…… por favor……"
21200-65 = "Quem conquistou o 2º lugar, por pouca diferença, foi……!"
21200-66 = "……"
21200-67 = "Por favor, o nosso nome……!"
21200-68 = "Kh, também não é o 2º……!"
21200-69 = "Quer dizer que……!"
21200-70 = "……!"
21200-71 = "Por fim! A obra que conquistou a maior honraria\ndeste Prêmio Millennium!"
21200-72 = "Coração disparado……"
21200-73 = "O 1º lugar é……!"
21200-74 = "Uuh……!"
21200-78 = "Após os comerciais!"
21200-80 = "Arisss!!!"
21200-81 = "Carga concluída, posso atirar a qualquer momento!"
21200-82 = "Eu te entendo! Eu te entendo, mas não pode atirar\nno salão da cerimônia nem nessa tela……!"
21200-83 = "Uuh, parem de me deixar no suspense……"
21200-85 = "Bom! Então vamos ao anúncio!"
21200-86 = "O tão esperado 1º lugar é…… o Clube de\nDesenvolvimento de Novos Materiais——"
21200-87 = "(Pá-pá-pá!)"
21200-88 = "Kyaa! Atirar na tela de verdade, pra quê!?"
21200-89 = "Vão levar tudo embora mesmo, então\njá tanto faz!"
21200-90 = "Buááá! Dessa vez é o fim de verdadeee!!"
21200-92 = "Uuh……"
21200-93 = "No fim, acabar assim……"
21200-96 = "Calma, mana. Mas……"
21200-97 = "……Eu sei! Que nem tudo foi rejeitado, que não tem\nmotivo pra ficar acabada……"
21200-98 = "A avaliação na internet também não foi ruim; desde\naquela época do 1º lugar no ranking de jogo porcaria,\na gente cresceu de verdade."
21200-99 = "Daqui pra frente, com certeza, dá pra continuar crescendo."
21200-100 = "Da próxima a gente apresenta um resultado ainda\nmelhor, e até ganha uma sala bem maior e mais\ndecente!…… Mas,"
21200-101 = "é…… porque, se a gente for expulsa daqui,\na Yuzu e a Aris……"
21200-102 = "……Não se preocupa, Midori."
21200-103 = "Eu vou voltar pro dormitório."
21200-105 = "Hã?"
21200-106 = "Acho que já não tem mais ninguém que me chame de\ndesenvolvedora de jogo porcaria. Não, mesmo que\nhouvesse, tá tudo bem."
21200-107 = "Porque a Yuzu de agora……\ntem essas três, e o Sensei."
21200-108 = "Muito obrigada, Sensei."
21200-109 = "Desde a hora em que o Sensei veio pra esta sala\ndo clube…… nós conseguimos mudar muito."
21200-110 = "Só que a Aris……"
21200-114 = "[ns1] \"……Sim, deixa comigo.\"\n[ns2] \"Aris, você quer vir pra Schale?\""
21200-115 = "……Aris."
21200-116 = "……Aris."
21200-117 = "……"
21200-118 = "……Me desculpe."
21200-119 = "Não."
21200-120 = "Porque no Sensei eu posso confiar."
21200-121 = "Mas……"
21200-122 = "Já não……"
21200-124 = "Já não vou mais poder…… ficar junto de todas vocês, né."
21200-125 = "!!"
21200-126 = "Uh, me desculpa…… me desculpa, Aris!"
21200-127 = "Eu vou todo dia na Schale! De verdade, eu vou\ntodo santo dia!"
21200-128 = "Não importa pra onde a gente vá! Vamos\nfazer jogo juntas!"
21200-130 = "Uuuh……!"
21200-131 = "N-não, não quero mesmo!"
21200-132 = "Sensei! Pensando bem, não pode levar a Aris!"
21200-133 = "E-eu levo ela pro meu quarto! A gente divide a\ncama! E até a comida a gente divide entre as duas!"
21200-134 = "E-eu dou a minha parte também!"
21200-135 = "Vocês duas, parem de incomodar o Sensei……\ne, além disso, se isso for descoberto, a Momoi\ne a Midori também……"
21200-137 = "(Cláqui)"
21200-138 = "Momoi! Midori! Aris! Yuzu!"
21200-139 = "Iih! A Yuuka já!"
21200-140 = "P-peraí! Assim tão rápido, não……!"
21200-141 = "Sua demônia! O Conselho não tem coração, é!?"
21200-143 = "Parabéns!"
21200-144 = "……?"
21200-145 = "……Hã?"
21200-146 = "Hã, ãh……?"
21200-149 = "?"
21200-150 = "Hã, que reação é essa?"
21200-151 = "Vocês não viram o resultado?"
21200-152 = "……Resultado?"
21200-153 = "A gente não entrou no Top 7, e……"
21200-154 = "Hã?"
21200-155 = "Que é que vocês tão falando, ainda tá no ar agora,\nvão lá ver direito."
21200-156 = "A mana explodiu a tela……"
21200-157 = "Mas o que é que vocês ficam fazendo, francamente……\nó, olhem aqui. Eu tava vendo pelo celular e vim\ncorrendo no meio do anúncio."
21200-159 = "Prêmio Millennium · Salão da Cerimônia de Premiação"
21200-160 = "Até hoje, o Prêmio Millennium premiou as obras\ncriadas pelo talento e pela capacidade das alunas\ntendo a \"utilidade prática\" como eixo. Isso se baseia\nno propósito de buscar e concretizar um futuro melhor."
21200-161 = "Porém, entre as obras desta vez, houve uma que nos\nfez sentir a \"utilidade prática\" sob um novo ângulo.\nUm certo \"jogo\" de fato nos fez recordar, vívido, um\npassado nostálgico, e sentir a possibilidade do futuro."
21200-162 = "Por isso, desta vez, decidimos fazer\numa escolha excepcional."
21200-163 = "Desta vez instituímos um \"Prêmio Especial\", e a\nobra premiada é…… o \"Tales Saga Chronicle 2\",\ndo Clube de Desenvolvimento de Jogos."
21200-164 = "Heein, mentira!?"
21200-165 = "O que tá acontecendo……?"
21200-166 = "O conceito atemporal do estilo retrô, os desdobramentos\nque, sem se prender ao senso comum, superam a\nimaginação um após o outro, e uma ambientação\ninusitada que, à primeira vista, não pareceria combinar\ncom tudo isso — no começo, foi uma sequência de\nperplexidades, mas……"
21200-167 = "Viajar por um mundo novo, atando, um a um, novos\nlaços, e ir derrotar o Rei Demônio……"
21200-168 = "É uma obra na qual essa diversão fundamental\ndo RPG está bem condensada, eu diria."
21200-169 = "Jogando, lembrei, vívida, da época em que, certa vez,\nme apaixonei por um jogo pela primeira vez. Avaliando\nesses pontos, a esta obra……"
21200-171 = "concedemos, desta vez, o \"Prêmio Especial\"\ndo Prêmio Millennium."
21200-174 = "Millennium · Clube de Desenvolvimento de Jogos"
21200-175 = "Hã…… ah……"
21200-176 = "Parabéns de verdade! Ãh, na real eu também joguei.\nNão dá pra dizer que foi divertido sem ressalvas,\nmas…… deu pra sentir aquela sensação tão particular\nde quando a gente termina um bom jogo."
21200-178 = "Momo, Mido! Eu também joguei o \"TSC2\", foi\ndivertidíssimo! Agora tá um auê na internet também!"
21200-179 = "Segundo o levantamento da Veritas, o número de\nbuscas pelo \"TSC2\" já tá maior que o do nome\nde idols famosos!"
21200-180 = "S-sério……?"
21200-183 = "Confirmado."
21200-184 = "O \"Tales Saga Chronicle 2\", subido há 3 horas, até\nagora há pouco tinha 7705 downloads e um total de\n1372 comentários, mas……"
21200-185 = "depois do anúncio do Prêmio Millennium, em cerca de\n26 segundos o número de downloads ultrapassou 10 mil."
21200-186 = "!?"
21200-187 = "Cerca de 500 comentários a mais; pela nuance das\npalavras, 242 são comentários negativos/de desconfiança,\n191 são positivos/de expectativa, e o resto é\nindefinido, ou são comentários que suspendem o juízo."
21200-188 = "Hã, ué……? E-então, no fim das contas, a gente……\ntá ferrada mesmo!?"
21200-189 = "Não, não é nada disso."
21200-190 = "Yuzu……?"
21200-191 = "……"
21200-192 = "……"
21200-193 = "Olhem. Agora, empatados, os dois melhores\ncomentários, os que mais receberam apoio……"
21200-195 = "＜chicken: jogar de verdade ou não, no começo eu\nfiquei na maior dúvida…… mas agora eu penso assim:\nque bom que eu conheci este jogo＞"
21200-196 = "＜Kotoha0507: até hoje eu tinha um preconceito\ncontra a Millennium.＞"
21200-197 = "＜Kotoha0507: o preconceito de que as alunas da\nMillennium só têm frieza e racionalidade, através\ndeste Prêmio Millennium e deste \"Tales Saga\nChronicle 2\", eu posso afirmar que desapareceu\npor completo＞"
21200-198 = "……!"
21200-199 = "Ãh…… quer dizer que a gente não vai\nser dissolvido, né!?"
21200-202 = "Sim, isso. Ah, mas é só uma \"tolerância provisória\",\nviu. Não é uma premiação oficial, e o Conselho decidiu,\naté o próximo semestre…… \"suspender\" o confisco\nda sala e a dissolução do Clube de Desenvolvimento\nde Jogos."
21200-203 = "Ãh, e, além disso……"
21200-204 = "É que……"
21200-205 = "Hm?"
21200-206 = "……M-me desculpem. Por ter chamado os consoles\nque tem aqui de tranqueira……"
21200-207 = "Graças a vocês, eu lembrei. Dos vários jogos que\neu jogava quando pequena. Fazia tempo que eu não\nsentia aquilo…… a diversão de viajar por um mundo novo."
21200-208 = "……Obrigada. Bom, vai ser preciso fazer o pedido de\nprorrogação da sala e o processo de recebimento da\nverba, então, quando as coisas se acalmarem, passem\nna sala do Conselho. Então, até mais!"
