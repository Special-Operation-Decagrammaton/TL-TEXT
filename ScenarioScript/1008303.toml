[translation]
1008303-1 = "休息の重要性"
1008303-5 = "約束通り来たよ。"
1008303-6 = "[s1] \"急に驚いたよ……\"\n[s2] \"約束と言うには一方的だったような……\""
1008303-9 = "ふうん。"
1008303-10 = "生徒が来たのに嬉しくないんだ？"
1008303-11 = "……シャーレはどんな生徒でも歓迎してるって聞いたんだけど。"
1008303-12 = "ああ……つまり「生徒」は歓迎だけど……"
1008303-13 = "「私」とは会いたくなかったんだ？"
1008303-14 = "[s3] \"いやいや！そんな事これっぽっちも思ってないよ！？\"\n[s4] \"むしろ、毎日でも来てほしいくらい！\""
1008303-17 = "……そう。"
1008303-18 = "まあ……"
1008303-19 = "ちょっとした冗談だから。"
1008303-20 = "そんなに身構えなくても大丈夫。"
1008303-21 = "[s] \"キキョウの冗談はちょっと分かりづらいよ……。\""
1008303-22 = "……はいはい、悪かったですね。"
1008303-23 = "はぁ……とにかく、雑談は終わり。"
1008303-24 = "用事があって来ただけだから。"
1008303-25 = "……一体なにかって？"
1008303-26 = "単純な話だよ。"
1008303-30 = "この前、あんたが調停室を直してくれたでしょう？#nそれが結構、委員会の間で好評だったの。"
1008303-33 = "「雨が降ってもバケツを用意する必要がありませんの！」とか「もう歩く時に踏み抜く心配をしなくて良いのですね」とか。"
1008303-34 = "「ドアには雨風を凌ぐ役割がちゃんとあったんだな！」とか……"
1008303-35 = "[s] \"今までどうやって生活してたの！？\""
1008303-38 = "まあ、今のはちょっと大げさだけど……みんなが感謝してるのは本当。#n……もちろん、私も。"
1008303-39 = "だから今日は、あんたに借りを返しに来たの。"
1008303-40 = "百花繚乱の参謀担当、[ruby=きりゅう]桐生[/ruby]キキョウがあんたの仕事を手伝ってあげる。"
1008303-46 = "今なら何だってお願いできるチャンスだよ。"
1008303-47 = "どう？いい機会じゃない？"
1008303-48 = "[s5] \"元からお礼をもらうつもりは無かったから。\"\n[s6] \"お礼の話をするなら、こっちが夕食のお返しをしないとね。\""
1008303-51 = "……嘘。"
1008303-52 = "[s] \"……え？\""
1008303-53 = "最初から報酬は要らないとか、手料理で満足だとか。"
1008303-54 = "本当に、そんなもので十分なわけないでしょう。"
1008303-55 = "遠慮しなくていいよ。"
1008303-56 = "人と人の関係は、いつだって利害の一致で成り立っている。"
1008303-57 = "一方が与えるだけの関係は望ましくない。#n利害のバランスが崩れてしまえば人間関係もいずれ破綻する。"
1008303-58 = "誰しも大なり小なり欲望を持っているでしょう？#nだから、先生が何らかの損得勘定を持っていても否定はしない。"
1008303-59 = "本音を隠そうとしたって、私の目は欺けないよ。"
1008303-60 = "これ以上、無意味な会話を続けてもお互い疲れるだけ。#n早く素直になったら？"
1008303-61 = "「どんな手段だって厭わない」――私があんたを利用したように、今度は桐生キキョウを利用するチャンスだよ。"
1008303-62 = "こんな機会、二度と無いかもしれないけど？"
1008303-66 = "[ns7] \"……そこまで言うなら分かったよ。\"\n[ns8] \"せっかくのチャンスだからね。\""
1008303-69 = "……そう。#nやっぱり、あんたも所詮……"
1008303-70 = "……いいよ、好きにして。#nどんな内容だろうと必ず期待に応えてみせるから。"
1008303-75 = "（……これで良い）"
1008303-76 = "（大人しく言われた通りにすれば、借りを返せる）"
1008303-77 = "（それで私たちの関係は元に戻る……）"
1008303-78 = "[ns] \"じゃあ、今日は一日ゆっくり休んでもらおうかな。\""
1008303-82 = "……え？"
1008303-83 = "ちょっと待って、それは何の冗談？"
1008303-84 = "ちゃんと聞いてた？"
1008303-85 = "私を「利用」できるチャンスだって言ったはずだけど。"
1008303-86 = "……それとも、私のことを馬鹿にしてるの？"
1008303-87 = "[s] \"ううん、承知の上で「利用」してるだけだよ。\""
1008303-91 = "[ns] \"作戦参謀なら、休息の重要性を知ってるでしょ？\""
1008303-95 = "そ、それくらい分かってるけど！"
1008303-96 = "万全な状態で作戦に臨むには、補給や休息も大切……"
1008303-97 = "でも今はそんな話、してないでしょう？"
1008303-98 = "私をからかって何がした……"
1008303-99 = "[s] \"私は言われた通り、お願いしただけだよ。\""
1008303-100 = "選択権は私にあるって言うの？"
1008303-101 = "……呆れた。理解できない。"
1008303-102 = "[s] \"それとも、さっきの言葉を撤回する？\""
1008303-103 = "……！"
1008303-104 = "はぁ……。"
1008303-105 = "いいよ。それがあんたの望みなら――"
1008303-111 = "[ns] \"う、うわっ！キキョウさん……！？\""
1008303-115 = "……何言ってるの？"
1008303-116 = "まあ……今のは、あんたの後ろにある本を取っただけ。"
1008303-117 = "[s] \"それはつまり……？\""
1008303-121 = "あんたのお願いに付き合ってあげる。"
1008303-122 = "……今日は一日、おとなしくしてるわよ。"
1008303-131 = "しばらくの間、この本とソファ借りるから。#nいいでしょう？"
1008303-132 = "[s] \"あ、うん！そうだ、キキョウもコーヒーでいいかな？\""
1008303-133 = "……うん。"
1008303-140 = "はぁ……せっかくのチャンスを、こうやって無駄にするなんて。"
1008303-141 = "先生……"
1008303-142 = "あんたって、本当に……"
1008303-146 = "…………変な人。"
1008303-148 = "（そうして、キキョウの隣で静かな一日を過ごした）"
