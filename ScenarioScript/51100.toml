[translation]
51100-1 = "Episódio 10; Bochechas Vermelhas"
51100-6 = "[ns] \"Yukari, vamos descansar um pouco.\""
51100-10 = "Ah..."
51100-11 = "......Parece que eu... estou cansada...? #n Entendo..."
51100-12 = "Não, é que..."
51100-13 = "......Eu acabei ficando preocupada com a Renge-senpai..."
51100-14 = "......"
51100-15 = "......A Renge-senpai era a pessoa com o maior senso de responsabilidade de todas."
51100-16 = "Ouvir de alguém como a Renge-senpai... que a Hyakkaryouran já acabou..."
51100-17 = "O que eu... devo fazer daqui em diante..."
51100-21 = "......Eei!!"
51100-26 = "[ns] \"Y, Yukari!? Tudo bem!?\""
51100-29 = "Chega de ficar me preocupando com isso!"
51100-30 = "Sim! Eu sou a elite da Hyakkaryouran, não posso ficar deprimida por uma coisinha dessas!"
51100-31 = "A Renge-senpai com certeza só está confusa ainda."
51100-32 = "Uma verdadeira elite não fica presa ao passado para sempre, ela olha para frente!"
51100-33 = "Não conseguimos a ajuda da Renge-senpai, mas..."
51100-34 = "Ainda há outras senpais com quem podemos contar!"
51100-35 = "[s] \"......Agora vamos atrás da estrategista?\""
51100-36 = "Sim! A Kikyou-senpai com certeza será compreensiva em relação à 'Batalha de Sucessão'!"
51100-37 = "Além disso... a Kikyou-senpai e a Renge-senpai são amigas de infância."
51100-38 = "Ela com certeza vai nos ajudar a convencer a Renge-senpai também!"
51100-39 = "Hmm~! Isso é que é um plano perfect!"
51100-40 = "Portanto... Sensei [USERNAME]. #n Poderia me acompanhar por mais um tempinho?"
51100-41 = "[s] \"Sim, essa era a minha intenção desde o início.\""
51100-42 = "......! "
51100-43 = "Sim! Fufu."
51100-47 = "Então, vamos logo...!"
51100-54 = "――Senhorita, vim buscá-la."
51100-60 = "Ah..."
51100-61 = "Eu estava esperando a senhorita terminar seus afazeres, mas..."
51100-62 = "Já está tarde. Está na hora de voltarmos para casa."
51100-63 = "Porém, eu ainda tenho coisas a fazer..."
51100-64 = "A uma hora dessas? "
51100-65 = "Por acaso... essa pessoa aí tem algo a ver com isso?"
51100-66 = "Quem é você? #n Parece que está com a senhorita desde a manhã. "
51100-67 = "Se algo acontecer à senhorita, como serva da família Kadenokouji, não poderei deixar passar."
51100-68 = "[s] \"Me chamo Sensei [USERNAME] da Schale.\""
51100-69 = "O Sensei da Schale... aquele famoso...?"
51100-70 = "Sim, é ele mesmo! Portanto, não entenda mal! "
51100-71 = "O Sensei só está me acompanhando por causa dos meus caprichos!"
51100-75 = "Se a senhorita diz, então... compreendo."
51100-76 = "Peço desculpas, fui intrometida. "
51100-80 = "Agora, vamos para casa, senhorita."
51100-81 = "Mas eu ainda preciso...!"
51100-82 = "――Senhorita."
51100-83 = "............"
51100-84 = "[s1] \"Já é tarde, vamos para casa por hoje.\"\n[s2] \"Continuamos amanhã. É uma promessa.\""
51100-89 = "Senhorita... por acaso, ainda――"
51100-90 = "É verdade. Esta não é uma despedida para o resto da vida. #n Ainda temos tempo...!"
51100-91 = "Entendido!"
51100-92 = "Então, nos encontramos de novo amanhã!"
51100-93 = "......Obrigada por cuidar da senhorita. Com licença."
51100-101 = "[ns] \"Hoje fui chamado pela Niya, conheci a Yukari...\""
51100-103 = "(......Realmente aconteceram muitas coisas)"
51100-112 = "Não me importa! No fim das contas, fomos abandonadas!"
51100-114 = "(Aquelas palavras da Renge, naquela hora...)"
51100-117 = "......Antes disso, só mais uma coisa."
51100-118 = "A senhorita é uma pessoa ocupada com os deveres da família Kadenokouji."
51100-119 = "Por favor, peço a sua colaboração para que amanhã não fiquem até tarde. #n ......Com licença."
51100-124 = "(Enquanto eu estava imerso em pensamentos após ouvir tantas coisas...)"
51100-128 = "[log=???]<――É por aqui>[/log]"
51100-133 = "[ns] \"............?\""
51100-138 = "Hm? O que foi, o que foi? Logo nessa época tão ocupada."
51100-142 = "Disseram que a Trupe Sudama tá brigando com alguém no Distrito Oeste!"
51100-144 = "De novo?"
51100-145 = "Sempre, sempre, bem na época de um festival importante...! #n Com quem elas estão brigando dessa vez?"
51100-146 = "Pois é... parece que é com uma aluna da Hyakkaryouran!"
51100-150 = "[ns] \"......Hm?\" "
51100-154 = "Ficamos te procurando o dia todo hoje, sabia!"
51100-156 = "De dia confundimos a pessoa, mas... desta vez não vamos deixar escapar!"
51100-161 = "[ns] \"Aquilo é...?\""
51100-164 = "Próximo Episódio; Apenas Uma Aluna"
