[translation]
51100-1 = "Episódio 10; Bochechas Vermelhas"
51100-6 = "[ns] \"Yukari, vamos descansar um pouco?\""
51100-10 = "Ah..."
51100-11 = "......Eu pareço estar cansada...?#nÉ mesmo...?"
51100-12 = "Não, é que..."
51100-13 = "......Eu não consigo parar de pensar na Renge-senpai..."
51100-14 = "......"
51100-15 = "......A Renge-senpai era a pessoa com o maior senso de responsabilidade de todas."
51100-16 = "Se até ela me disse que... o Hyakkiyako Ryoran acabou..."
51100-17 = "Eu... o que devo fazer daqui em diante...?"
51100-21 = "......Ei!!"
51100-26 = "[ns] \"Yu, Yukari!? Você está bem!?\""
51100-29 = "Chega de ficar remoendo isso!"
51100-30 = "Sim! Eu sou uma elite do Hyakkiyako Ryoran, não posso ficar me sentindo derrotada por algo assim!"
51100-31 = "A Renge-senpai deve estar apenas confusa no momento."
51100-32 = "Uma verdadeira elite não se prende ao passado e segue sempre em frente!"
51100-33 = "Embora eu não tenha conseguido a cooperação da Renge-senpai..."
51100-34 = "Ainda existem outras senpais com quem posso contar!"
51100-35 = "[s] \"...A próxima seria a responsável pela estratégia?\""
51100-36 = "Sim! Se for a Kikyou-senpai, com certeza ela entenderá a importância da \"Guerra de Sucessão\"!"
51100-37 = "Além disso... a Kikyou-senpai e a Renge-senpai são amigas de infância."
51100-38 = "Ela certamente me ajudará a convencer a Renge-senpai!"
51100-39 = "Hmm~! Esse é o plano perfeito!"
51100-40 = "Por isso... Professor [USERNAME].#nVocê poderia me acompanhar por mais algum tempo?"
51100-41 = "[s] \"Sim, essa era a minha intenção desde o início.\""
51100-42 = "......!"
51100-43 = "Sim! Fufu."
51100-47 = "Então, vamos começar...!"
51100-54 = "――Ojou-sama, vim buscá-la."
51100-60 = "Ah..."
51100-61 = "Eu estava esperando a senhorita terminar seus afazeres, mas..."
51100-62 = "Já está tarde. Vamos voltar para casa."
51100-63 = "Mas eu ainda tenho coisas a fazer..."
51100-64 = "A esta hora da noite?"
51100-65 = "Por acaso... essa pessoa tem algo a ver com isso?"
51100-66 = "Quem seria o senhor?#nNotei que está com a Ojou-sama desde cedo."
51100-67 = "Como um servo da família Kadenokouji, não posso ignorar qualquer risco à segurança da Ojou-sama."
51100-68 = "[s] \"Meu nome é [USERNAME], professor do Schale.\""
51100-69 = "O professor do Schale... aquele famoso...?"
51100-70 = "Sim, é ele mesmo! Por favor, não entenda mal!"
51100-71 = "O professor está apenas me acompanhando nos meus caprichos!"
51100-75 = "Se a Ojou-sama diz... compreendido."
51100-76 = "Peço perdão pela minha intromissão."
51100-80 = "Vamos, é hora de voltar, Ojou-sama."
51100-81 = "Mas eu ainda..."
51100-82 = "――Ojou-sama."
51100-83 = "............"
51100-84 = "[s1] \"Já está tarde, vamos voltar.\"\n[s2] \"Continuaremos amanhã. É uma promessa.\""
51100-89 = "Ojou-sama... por acaso, ainda――"
51100-90 = "Você tem razão. Isso não é um adeus definitivo.#nAinda temos tempo...!"
51100-91 = "Entendido!"
51100-92 = "Então, nos vemos amanhã!"
51100-93 = "……Agradeço por cuidar da senhorita. Com licença."
51100-101 = "[ns] \"Hoje fui chamado pela Niya, conheci a Yukari……\""
51100-103 = "(……Realmente, muitas coisas aconteceram)"
51100-112 = "Como eu vou saber! No fim das contas, fomos abandonadas!"
51100-114 = "(As palavras da Renge naquele momento……)"
51100-117 = "……Antes disso, apenas uma coisa."
51100-118 = "A senhorita está ocupada com seus deveres na família Kadenokouji."
51100-119 = "Por favor, peço sua colaboração para que não se atrase amanhã. #n……Com licença."
51100-124 = "(Enquanto eu estava imerso em pensamentos, recebendo várias palavras……)"
51100-128 = "[log=???]＜――É por aqui＞[/log]"
51100-133 = "[ns] \"…………？\""
51100-138 = "Hm? O que foi, o que foi? Em uma época tão movimentada assim."
51100-142 = "Dizem que alguém está brigando com a Trupe Chimi no Distrito Oeste!"
51100-144 = "De novo?"
51100-145 = "Sempre, sempre durante um festival importante……! #nCom quem é desta vez?"
51100-146 = "Pelo que parece…… é uma aluna da Hyakkiyako!"
51100-150 = "[ns] \"……Hm?\" "
51100-154 = "Eu passei o dia inteiro te procurando, sabia!"
51100-156 = "Confundi você com outra pessoa durante o dia…… mas desta vez não vou deixar escapar!"
51100-161 = "[ns] \"Aquilo é……?\""
51100-164 = "Próximo episódio: Apenas uma aluna"
