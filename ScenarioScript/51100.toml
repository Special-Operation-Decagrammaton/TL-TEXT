[translation]
51100-1 = "第10話;赤い頬"
51100-6 = "[ns] \"ユカリ、ちょっと休もうか。\""
51100-10 = "あっ……"
51100-11 = "……[ruby=みども]身共[/ruby]が疲れているように、見える……？#nそう、ですか……"
51100-12 = "いえ、その……"
51100-13 = "……レンゲ先輩のことが、気になってしまい……"
51100-14 = "……。"
51100-15 = "……レンゲ先輩は誰よりも責任感の強いお方でした。"
51100-16 = "そんなレンゲ先輩から……百花繚乱はもう終わったのだと告げられたら……"
51100-17 = "身共は……この先、どうすれば……"
51100-21 = "……えいっ！！"
51100-26 = "[ns] \"ゆ、ユカリ！？大丈夫！？\""
51100-29 = "思い悩むのはこれでおしまいです！"
51100-30 = "ええ！身共は百花繚乱のえりーとですもの、これしきの事でへこんでなどいられませぬ！"
51100-31 = "レンゲ先輩はきっとまだ混乱していらっしゃるだけなのです。"
51100-32 = "いつまでも過去に囚われないで、前を向いてこそ真のえりーとですの！"
51100-33 = "レンゲ先輩にはご協力いただけませんでしたが……"
51100-34 = "他にも頼れる先輩はいらっしゃいますから！"
51100-35 = "[s] \"……次は参謀担当の子に？\""
51100-36 = "ええ！キキョウ先輩なら、きっと「継承戦」にも理解を示してくださるはずです！"
51100-37 = "それに……キキョウ先輩とレンゲ先輩は幼馴染ですので。"
51100-38 = "レンゲ先輩の説得も、きっと手伝ってくださります！"
51100-39 = "ん～！これぞ、ぱーふぇくとな計画！ですの！"
51100-40 = "ですので……[USERNAME]先生。#n今しばらく、身共にお付き合いいただけませんか？"
51100-41 = "[s] \"うん、最初からそのつもりだよ。\""
51100-42 = "……！ "
51100-43 = "はいっ！ふふ。"
51100-47 = "では、さっそく……！"
51100-54 = "――お嬢様、お迎えに参りました。"
51100-60 = "あっ……"
51100-61 = "お嬢様のご用事が終わるのを待っていたのですが……"
51100-62 = "もう良い時間です。そろそろ帰りましょう。"
51100-63 = "しかし、身共にはまだやるべきことが……"
51100-64 = "こんな時間に、ですか？ "
51100-65 = "もしかして……そちらの方が何か関係しているのでしょうか？"
51100-66 = "どちら様でしょうか？#n朝方からお嬢様とご一緒にいるようですが。 "
51100-67 = "お嬢様に万が一があっては、[ruby=かでのこうじ]勘解由小路[/ruby]家の使用人として見逃すわけにはいきません。"
51100-68 = "[s] \"シャーレの[USERNAME]先生と申します。\""
51100-69 = "シャーレの先生……あの有名な……？"
51100-70 = "ええ、そうですの！ですから誤解なきように！ "
51100-71 = "先生は身共のわがままに付き合ってくださっているのです！"
51100-75 = "お嬢様がそう仰るのでしたら……分かりました。"
51100-76 = "申し訳ございません、差し出がましい真似をいたしました。 "
51100-80 = "さあ、そろそろ帰りましょう、お嬢様。"
51100-81 = "ですが、身共にはまだ……！"
51100-82 = "――お嬢様。"
51100-83 = "…………。"
51100-84 = "[s1] \"今日はもう遅いから帰ろう。\"\n[s2] \"また明日、続きをやろう。約束だよ。\""
51100-89 = "お嬢様……もしや、まだ――"
51100-90 = "そうですね。これは今生の別れではありません。#nまだ時間はありますもの……！"
51100-91 = "分かりました！"
51100-92 = "それでは、また明日お会い致しましょう！"
51100-93 = "……お嬢様がお世話になりました。失礼いたします。"
51100-101 = "[ns] \"今日はニヤに呼ばれ、ユカリと出会い……\""
51100-103 = "（……本当にいろんなことがあった）"
51100-112 = "知るか！結局アタシたちは見放されたんだよ！"
51100-114 = "（あのときの、レンゲの言葉は……）"
51100-117 = "……その前に、ひとつだけ。"
51100-118 = "お嬢様は、勘解由小路家の務めで忙しい身です。"
51100-119 = "どうか明日は遅くならないよう、ご協力いただけますようお願い申し上げます。#n……それでは。"
51100-124 = "（様々な言葉を受け、考えに[ruby=ふけ]耽[/ruby]っていると……）"
51100-128 = "[log=???]＜――こっちだよ＞[/log]"
51100-133 = "[ns] \"…………？\""
51100-138 = "ん？なんだなんだ、こんな忙しい時期に。"
51100-142 = "西区で[ruby=すだまいちざ]魑魅一座[/ruby]と誰かがケンカしてるって！"
51100-144 = "またですか？"
51100-145 = "いつもいつも、大事なお祭りのときに……！#n今度は誰とですか？"
51100-146 = "それが……どうやら百花繚乱の生徒らしいんだ！"
51100-150 = "[ns] \"……ん？\" "
51100-154 = "今日はずっとお前を探し回ってたんだからな！"
51100-156 = "昼は人違いをしたが……今度こそ逃すものか！"
51100-161 = "[ns] \"あれは……？\""
51100-164 = "次回;ただの一生徒"
