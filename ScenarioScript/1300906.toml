[translation]
1300906-1 = "あなたとの修行にぴったりの"
1300906-3 = "（モモトークのメッセージをもらって約束の場所に来たけれど、ツバキが見当たらない）"
1300906-4 = "[s] \"うーん、ツバキはどこに行ったんだろう？\""
1300906-5 = "むにゃむにゃ……先生、そっちはダメ……。"
1300906-6 = "忙しい忙しいって言ってるウサギを追いかけたら、変な国に行っちゃう……。"
1300906-7 = "（なんだろう？）"
1300906-8 = "（どこからか聞こえてくる声を頼りに、茂みを越えて行ってみると）"
1300906-11 = "[wa:900]― 先生…[wa:4000]来てくれたんだね…"
1300906-14 = "[wa:850]― うん、[wa:2150]今は[wa:1850]修行[wa:1200]中…。[wa:2600]座禅をしてた…。"
1300906-17 = "[wa:700]― 居眠り[wa:700]してたんじゃないの、[wa:1850]って…？"
1300906-20 = "― 違うよ…。[wa:2300]これも、[wa:1750]れっきとした、[wa:1900]修行の[wa:870]一環だから…。"
1300906-23 = "[wa:800]― 近場に[wa:850]こんな、[wa:1400]修行に[wa:750]ぴったりの場所があったなんて…。"
1300906-26 = "― 幸せ。[wa:3000]まるで、[wa:1800]夢を見てるみたいな気分…。"
1300906-29 = "― この幸せも、[wa:3250]全部、[wa:1700]先生の[wa:1000]お陰なのかな…？"
1300906-32 = "[wa:800]― ん…[wa:3500]ほら、[wa:1900]先生も[wa:800]そんなところにいないで、"
1300906-34 = "― 私と[wa:800]一緒に…。[wa:2200]…寝よ？"
1300906-37 = "（そうやってツバキの手に引かれるまま、隣で横になり……）"
1300906-38 = "（その日はそのままツバキの隣で添い寝……ではなく、修行をした）"
