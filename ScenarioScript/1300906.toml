[translation]
1300906-1 = "Perfeito para o treinamento com você"
1300906-3 = "（Recebi uma mensagem no Momotalk e vim ao local combinado, mas não consigo encontrar a Tsubaki）"
1300906-4 = "[s] \"Hmm, para onde será que a Tsubaki foi?\""
1300906-5 = "Munya munya... Sensei, por aí não..."
1300906-6 = "Se eu perseguir o coelho que diz que está ocupado, vou acabar indo parar em um país estranho..."
1300906-7 = "（O que será isso?）"
1300906-8 = "（Seguindo a voz que ouvi de algum lugar, atravessei o arbusto e...）"
1300906-11 = "[wa:900]― Sensei...[wa:4000] você veio..."
1300906-14 = "[wa:850]― Sim, [wa:2150] estou no meio [wa:1850] do treinamento [wa:1200] agora... [wa:2600] Estava praticando meditação..."
1300906-17 = "[wa:700]― Você está perguntando [wa:700] se eu não estava apenas cochilando, [wa:1850] é...?"
1300906-20 = "― Não é isso... [wa:2300] Isso também [wa:1750] é, sem dúvida, [wa:1900] parte do [wa:870] treinamento..."
1300906-23 = "[wa:800]― Quem diria que [wa:850] existia um lugar [wa:1400] tão perfeito [wa:750] para treinar aqui perto..."
1300906-26 = "― Que felicidade. [wa:3000] É como se eu estivesse [wa:1800] sonhando..."
1300906-29 = "― Será que essa felicidade [wa:3250] também é [wa:1700] toda graças [wa:1000] ao Sensei...?"
1300906-32 = "[wa:800]― Hmm... [wa:3500] Vamos, [wa:1900] Sensei, não fique aí parado,"
1300906-34 = "― Venha [wa:800] comigo... [wa:2200] ...dormir?"
1300906-37 = "（Sendo puxado pela mão da Tsubaki, deitei-me ao lado dela...）"
1300906-38 = "（Naquele dia, passei o tempo ao lado da Tsubaki, não exatamente tirando uma soneca, mas treinando）"
