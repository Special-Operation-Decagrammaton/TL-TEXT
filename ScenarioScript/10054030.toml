[translation]
10054030-1 = "第3話;水遊びと査察、総合的に休暇（１）"
10054030-5 = "川は、「文明のゆりかご」とも言えます。"
10054030-6 = "遥か昔から農業や交通、暮らしの拠点として多くの役割を果たしてきました。"
10054030-7 = "そうじゃな。そして、山海経にとっても大きな意味を持つ。"
10054030-8 = "例えば、「治める」という字。本来は、水の流れを調整するという意味だったのじゃ。"
10054030-9 = "洪水の後、境界線が曖昧になった土地を如何にして再分配するかが大事だったそうじゃな。"
10054030-10 = "このことから、治水とは即ち、世を治めるという意味に拡張されたのです。"
10054030-11 = "この査察が渓谷で行われるのも、何かしらの意味を感じますね。"
10054030-18 = "[ns] \"わぁ……。\""
10054030-23 = "どう？先生。いいところでしょ。#nしばらくここで待っててくれる？"
10054030-24 = "あたしたちは水着に着替えてくるから。#nふふっ、楽しみにしててね？"
10054030-29 = "（楽しそうに走っていく後ろ姿を眺めながら）"
10054030-30 = "（自分なりの準備をして待つことにした）"
10054030-32 = "ココナちゃん？#nはしゃぎすぎて転ばないように気をつけてくださいね。"
10054030-33 = "大丈夫！私はもう立派なレディーだから！"
10054030-40 = "先生ー！！！"
10054030-41 = "[s] \"ココナちゃん！\""
10054030-42 = "もう！またココナちゃんって呼んで～！"
10054030-43 = "でも、それも今日までです！#n私はもう立派なレディーですから！"
10054030-44 = "[s] \"おぉっ！すっごく大人っぽい！\""
10054030-45 = "ふふん、当然です！"
10054030-46 = "って！違います！#n大人[ruby=・]っ[/ruby][ruby=・]ぽ[/ruby][ruby=・]い[/ruby]ではありません！レディーです！"
10054030-47 = "えっへん！レディーな私に似合う水着を用意したんですよ。"
10054030-48 = "[ns] （そういうところがココナちゃんだよね！）"
10054030-50 = "（喜びを隠しきれていないココナちゃんに……）"
10054030-52 = "（高い高いをしてあげた！）"
10054030-58 = "わあ！あははっ！"
10054030-59 = "先生！すごいです！"
10054030-63 = "お～、ココナちゃん、楽しんでるね。"
10054030-64 = "ルミお姉さんまで「ちゃん付け」だなんて……！"
10054030-65 = "だって、あたしたちは査察に来てるんだから。"
10054030-66 = "できる限り「普通の生徒」を装うべきでしょ？"
10054030-67 = "あ、たしかに……！"
10054030-68 = "仕方ありませんね！#n特別にココナちゃん呼びを許可します！"
10054030-69 = "うん、うん。やっぱりココナちゃんは大人だなぁ。"
10054030-70 = "当然です！ルミお姉さんも分かってますね！"
10054030-76 = "それで……どう？"
10054030-77 = "[s] \"な、何が？\""
10054030-82 = "ここでとぼけられるのは、ちょ～っと寂しいなぁ。"
10054030-83 = "先生のリクエスト、反映したつもりだけど……？"
10054030-84 = "[s] \"私、リクエストしたっけ……？\""
10054030-85 = "してなくてもさ、あたしたちの仲でしょ？"
10054030-86 = "先生の好きそうなやつにしたんだけど……どうかな。"
10054030-87 = "[s1] \"なんで私の好みが分かったの……すごく良い。\"\n[s2] \"うん、良いと思うよ。すごく似合ってる。\""
10054030-88 = "え、うん。ありがとう。"
10054030-93 = "や、あはは……率直な反応されると照れちゃうね。"
10054030-94 = "これだから先生は……。"
10054030-95 = "ま、今日のところはこれで良しかな。"
10054030-96 = "あらら、大人な対応。残念。"
10054030-101 = "まあ、先生のことはこれから知っていけばいいわけだもんね。"
10054030-102 = "だけど、その、似合ってるってストレートに言われると……あはは……うん。"
10054030-103 = "あ、ありがとう。"
10054030-104 = "妾も輪に入れてもらえるかの？"
10054030-105 = "門主様？"
10054030-106 = "はて。妾はキサキじゃが……。"
10054030-107 = "あ、そうでした！ごめんなさい、キサキお姉さん。"
10054030-108 = "ふふ。ココナからそう呼ばれる日がくるとは。#nこれもまた一興じゃな。"
10054030-111 = "[ns] \"キサキ……。\""
10054030-114 = "おっ、気合入れたね！"
10054030-115 = "妾はただの高校生、[ruby=りゅうげ]竜華[/ruby]キサキ。"
10054030-116 = "この程度の着こなしは普通じゃよ。"
10054030-121 = "それで……どうじゃろうか。"
10054030-122 = "思いは、言葉にせんと伝わらんぞ？"
10054030-123 = "[s] \"色々と、夢みたい……。\""
10054030-124 = "なるほど。好意は示しつつも明言は避け、解釈は相手に委ねる……。"
10054030-125 = "よかろう。合格点じゃ。"
10054030-126 = "ん？なんじゃ、体の調子か？ふむ……。"
10054030-131 = "（一瞬、キサキとルミの目が合った）"
10054030-134 = "心なしか、いつもより軽く感じる。皆には感謝しておるぞ。"
10054030-136 = "それはなによりです。門し――キサキさん。"
10054030-140 = "うふふ。こんな呼び方、なんだか失礼なことをしている気分ですね。"
10054030-141 = "シュンか。#n……ほう？これはまた。"
10054030-146 = "せっかくの機会ですから。キサキさんもよくお似合いですよ。"
10054030-147 = "それで、先生は見ているだけなんですか？#nたとえありきたりな言葉でも、言ってもらうと嬉しいのですよ？"
10054030-148 = "[s3] \"その前振りの後だとあれだけど……。\"\n[s4] \"すごく似合ってるよ。\""
10054030-151 = "ありがとうございます。嬉しいです。"
10054030-152 = "これで水着の感想は満足したので……この機会に、もう1つ。#n前々から言ってみたかったことがあるんです。"
10054030-153 = "なになに？"
10054030-154 = "皆さん、帰るまでが遠足ですよ？"
10054030-155 = "シュン姉さんらしいね……。"
10054030-156 = "そうじゃな。"
10054030-157 = "さて、準備はできたようだな！#nこの場の安全は私に任せて、それぞれの役割を果たしてくれ！"
10054030-161 = "[ns] \"よ～っし……。\""
10054030-162 = "わあ～川だ～！！"
10054030-163 = "遊びに来ているわけではないんだぞ……！"
10054030-165 = "[ns] \"行こう！！！\""
10054030-168 = "まあ、いいか……観光客を演じる必要もあるし……。"
10054030-171 = "……冷た～い！"
10054030-172 = "ココナちゃん？まずは準備体操ですよ？"
10054030-173 = "水に入る前の体操って何をしたらいいんだっけ。"
10054030-174 = "私も詳しくは……。"
10054030-175 = "ふむ。"
10054030-181 = "（キサキが目くばせをしてきた）"
10054030-182 = "では……ここは妾がお手本を見せるとしよう。"
10054030-183 = "もっ――キサキ……様！？"
10054030-184 = "あら。"
10054030-185 = "あれ？でも……。"
10054030-186 = "よろしく！"
10054030-188 = "（キサキのお手本にあわせて、みんなで「水辺のばんざい体操」をした）"
10054030-189 = "（査察という名の休暇が始まった！）"
