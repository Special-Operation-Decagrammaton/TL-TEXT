[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10054030-1 = "Episódio 3: Brincar, Inspecionar, Resumindo: Férias (1)"
10054030-5 = "Pode-se dizer que o rio sempre serviu como o grande 'berço da civilização'."
10054030-6 = "Desde os tempos mais longínquos, ele serviu como uma base insubstituível e vital para a agricultura e também para o transporte e a vida da população."
10054030-7 = "Sim. E para nós, de Shanhaijing, o significado dele carrega um peso enorme."
10054030-8 = "Por exemplo, o caractere usado para a palavra 'Governar' (治).\nNas suas raízes primitivas, ele foi desenhado originalmente com a simples e modesta intenção de descrever o nobre ato de 'regular e dominar a força dos cursos das águas'."
10054030-9 = "Quando o mundo era devastado por enchentes e a linha das terras era apagada, redistribuir com justiça os terrenos e domar a água era a tarefa mais importante da época."
10054030-10 = "Por conta disso, a habilidade de conseguir gerir as águas transformou-se no sinônimo da capacidade vitalícia e inquestionável de dominar e guiar a sociedade e o mundo."
10054030-11 = "Diante disso... realizar a nossa inspeção oficial nas margens desse desfiladeiro invoca um sentido muito especial, não acha?"
10054030-18 = "[ns] \"Uau...\""
10054030-23 = "E aí? O que me diz, Sensei. Aqui é um paraíso, não é?\nSe importa de esperar a gente aqui um pouquinho?"
10054030-24 = "As garotas vão se trocar e colocar os maiôs lá no fundo.\nFufu, a nossa volta vai valer a pena, então aguenta aí."
10054030-29 = "（Fiquei para trás e as observei partir com as roupas em mãos）"
10054030-30 = "（Enquanto o tempo passava, deixei meus preparativos pessoais organizados para quando elas retornassem）"
10054030-32 = "Kokona-chan?\nNão corra tanto assim que você vai tropeçar e cair."
10054030-33 = "Eu não sou tão descuidada! A sua irmãzinha aqui já é uma verdadeira dama agora!"
10054030-40 = "Senseeeeii!!!"
10054030-41 = "[s] \"Kokona-chan!\""
10054030-42 = "Poxa, Sensei! Não me chama de Kokona-chan~!"
10054030-43 = "Mas... vou perdoar e deixar passar só hoje!\nPorque eu me tornei uma verdadeira dama!"
10054030-44 = "[s] \"Oooooh! Você tem toda a presença de uma adulta madura hoje!\""
10054030-45 = "Fufun, mas é claro que sim!"
10054030-46 = "Espera aí! Retira o que disse!\nEu não 'tenho a presença' de uma adulta! Eu sou uma dama adulta!"
10054030-47 = "Ehem! Eu passei um tempão escolhendo um maiô chiquérrimo que combinasse perfeitamente com a minha postura de dama."
10054030-48 = "[ns] （Essa teimosia adorável é a cara da Kokona-chan mesmo...!）"
10054030-50 = "（A Kokona não conseguia esconder a sua felicidade radiante...）"
10054030-52 = "（Então, peguei ela e a levantei pro alto brincando!）"
10054030-58 = "Uwaah! Ahahahaha!"
10054030-59 = "Sensei! Você é muito forte!"
10054030-63 = "Oh~, Kokona-chan, já tá causando bagunça e se divertindo cedo, hein."
10054030-64 = "Até você resolveu me chamar de 'chan', Irmãzona Rumi...!?"
10054030-65 = "Mas é porque nós viemos até aqui como disfarce de inspeção."
10054030-66 = "O nosso papel principal não era imitar 'alunas normais' passeando e aproveitando a vida escolar sem títulos?"
10054030-67 = "Ah, f-faz sentido...!"
10054030-68 = "Você não me deixou outra alternativa!\nVou abrir a minha exceção magnânima e te dar permissão para me chamar assim hoje!"
10054030-69 = "Uhum, uhum. A Kokona-chan é uma verdadeira pessoa crescida mesmo, que maturidade pra compreender as desculpas."
10054030-70 = "Com certeza absoluta! Que bom que a Irmãzona Rumi entende quem eu sou!"
10054030-76 = "E aí... o que me diz?"
10054030-77 = "[s] \"E o que diz o quê?\""
10054030-82 = "Quando você finge demência comigo numa hora dessas, dói aqui dentro, sabia?"
10054030-83 = "Eu passei horas escolhendo algo e tentando encaixar todos os desejos difíceis que você me pediu... "
10054030-84 = "[s] \"Eu te pedi um modelo de maiô antes...?\""
10054030-85 = "Mesmo que você não tenha pedido diretamente... nós somos bem próximos, esqueceu?"
10054030-86 = "Eu tentei ao máximo pescar os seus gostos no ar e escolher a peça que você mais gostaria... Mas o que acha?"
10054030-87 = "[s1] \"Não sei como você sabe dos meus gostos... mas tá fantástico.\"\n[s2] \"Sim, sem dúvidas. A peça se encaixou como uma luva em você.\""
10054030-88 = "Ah, sério? Obrigada de coração."
10054030-93 = "Caramba, ahaha... Ser bombardeada com reações tão diretas do nada me deixa morrendo de vergonha."
10054030-94 = "Você é impossível, Sensei..."
10054030-95 = "Bom, por enquanto já estou mais que satisfeita."
10054030-96 = "Oh, que atitude madura de deixar o assunto pra lá. Que pena."
10054030-101 = "Calma, ainda temos tempo de sobra pela frente para descobrirmos mais sobre os gostos um do outro."
10054030-102 = "Mas assim... err, ouvir na lata que combinou comigo... ahaha... é."
10054030-103 = "A-Ahn, obrigada mesmo."
10054030-104 = "Tem espaço na rodinha de conversa para abrigar mais uma pessoa?"
10054030-105 = "Senhora Monshu!?"
10054030-106 = "Espere. O meu nome é Kisaki..."
10054030-107 = "Ah, claro, o combinado! Mil perdões, Kisaki-oneesan."
10054030-108 = "Fufu. Imaginar que chegaria o dia em que escutaria as palavras 'Irmãzona Kisaki' vindas da Kokona.\nIsso também tem o seu charme."
10054030-111 = "[ns] \"Kisaki...\""
10054030-114 = "Ooh, caprichou forte no visual, hein!"
10054030-115 = "Sou apenas uma mera garota normal curtindo a vida escolar, Ryuuge Kisaki."
10054030-116 = "Um nível de sofisticação como este nas roupas é completamente natural e mundano."
10054030-121 = "Dito isso... e então, o que achou?"
10054030-122 = "Os pensamentos jamais transparecerão se não assumirem a forma das palavras, entendeu?"
10054030-123 = "[s] \"Tudo isso parece um sonho...\""
10054030-124 = "Entendo. Expressa um pingo de admiração sem se comprometer a confirmar, deixando a interpretação final à mercê do interlocutor..."
10054030-125 = "Tudo bem. Considerarei isso como aprovação."
10054030-126 = "Hm? Pergunta se o meu corpo está bem? Fumu..."
10054030-131 = "（Por um breve momento, os olhares de Kisaki e Rumi se cruzaram silenciosamente）"
10054030-134 = "Posso estar sendo influenciada pela atmosfera, mas sinto meu corpo bem mais leve que o normal. Os meus agradecimentos a todas as senhoritas da sala."
10054030-136 = "Isso me alivia imensamente. Senhora Mon... quero dizer, Kisaki-san."
10054030-140 = "Ufufu. Dirigir a palavra a você com essa ausência de formalidades me causa uma agradável sensação de ousadia."
10054030-141 = "Shun.\n......Hou? Mas o que temos aqui."
10054030-146 = "Não é todo dia que saímos para relaxar assim. A propósito, a escolha do seu maiô lhe caiu muito bem, Kisaki-san."
10054030-147 = "E a nossa peça central aqui continuará apenas observando calado?\nMesmo que seja um elogio corriqueiro, ouvi-lo da sua boca me deixaria muito feliz, sabia?"
10054030-148 = "[s3] \"Depois dessa sua introdução toda, o que eu disser vai soar simples, mas...\"\n[s4] \"Ficou lindo em você.\""
10054030-151 = "Fico muito agradecida. Isso me traz uma grande alegria."
10054030-152 = "Visto que os comentários sobre o maiô me deixaram satisfeita... Gostaria de aproveitar a oportunidade para mencionar mais um detalhe.\nÉ algo que eu vinha querendo dizer a todas há um bom tempo."
10054030-153 = "O que foi?"
10054030-154 = "Lembrem-se, a nossa excursão não termina até voltarmos em segurança para casa, ok?"
10054030-155 = "A Shun nunca sai do papel dela... Mesmo num cenário paradisíaco desses..."
10054030-156 = "Deveras."
10054030-157 = "Pronto! O esquadrão está pronto e todos se apresentaram!\nDeixem a segurança do perímetro nas minhas mãos, e cada uma de vocês pode se espalhar para cumprir as suas funções e tarefas da nossa missão!"
10054030-161 = "[ns] \"Certo, vamos lá...\""
10054030-162 = "Waah~, é o riooooo!!"
10054030-163 = "Nós não viemos aqui a passeio...! Lembrem-se das investigações...!"
10054030-165 = "[ns] \"VAAAMOOOOS!!!\""
10054030-168 = "Hah, desisto... É verdade, se fingir de turista e brincar também faz parte do trabalho e da camuflagem..."
10054030-171 = "......Mas que aaaagua geeladaaa!"
10054030-172 = "Kokona-chan? Nem pense em entrar sem fazer a seu Exercício de aquecimento primeiro, ok?"
10054030-173 = "Quais exercícios eu tenho que fazer antes de entrar na água mesmo?"
10054030-174 = "Sendo franca, os pormenores desses exercícios não me vêm à memória com exatidão..."
10054030-175 = "Fumu."
10054030-181 = "（A Kisaki me deu uma leve piscadinha provocante）"
10054030-182 = "Pois muito bem... Permitam-me mostrar o exemplo perfeito de como executar o aquecimento."
10054030-183 = "M-Monshu――Kisaki...-sama!?"
10054030-184 = "Ara."
10054030-185 = "Ué? E eu imaginando que ela iria ficar de fora..."
10054030-186 = "Vamos nessa!"
10054030-188 = "（O esquadrão se alinhou aos passos de Kisaki e começamos a fazer a 'Ginástica Banzai da Beira do Rio' juntos）"
10054030-189 = "（Nossas falsas investigações de férias finalmente deram o pontapé inicial!）"