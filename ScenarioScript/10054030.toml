[translation]
10054030-1 = "Episode 3;Water Play, Inspections, and a Comprehensive Vacation (1)"
10054030-5 = "Rivers could be called the 'cradles of civilization'."
10054030-6 = "Since ancient times, they have served many roles as hubs for agriculture, transportation, and daily life."
10054030-7 = "Indeed. And they hold great significance for Shanhaijing as well."
10054030-8 = "For example, the character for 'govern' (治). Originally, it meant to regulate the flow of water."
10054030-9 = "After a flood, it was crucial to figure out how to redistribute the land where boundaries had become blurred."
10054030-10 = "From this, the concept of water management expanded to mean governing the world itself."
10054030-11 = "The fact that this inspection is taking place in a valley also feels meaningful."
10054030-18 = "[ns] \"Wow...\""
10054030-23 = "What do you think, Sensei? It's a nice spot, isn't it?#nCould you wait here for a little while?"
10054030-24 = "We're going to go change into our swimsuits.#nHehe, look forward to it, okay?"
10054030-29 = "(Watching their backs as they run off happily)"
10054030-30 = "(Decided to prepare in my own way while waiting)"
10054030-32 = "Kokona-chan?#nPlease be careful not to trip from getting too excited."
10054030-33 = "I'm fine! I'm a proper lady now!"
10054030-40 = "Sensei!!!"
10054030-41 = "[s] \"Kokona-chan!\""
10054030-42 = "Geez! You're calling me Kokona-chan again~!"
10054030-43 = "But that ends today!#nBecause I'm a proper lady now!"
10054030-44 = "[s] \"Whoa! You look so grown-up!\""
10054030-45 = "Hmph, obviously!"
10054030-46 = "Wait! No!#nI'm not 'grown-up'! I'm a lady!"
10054030-47 = "Ahem! I picked out a swimsuit that suits a lady like me."
10054030-48 = "[ns] (That's just so like Kokona-chan!)"
10054030-50 = "(To Kokona-chan, who can't hide her joy...)"
10054030-52 = "(I lifted her up high!)"
10054030-58 = "Whoa! Ahaha!"
10054030-59 = "Sensei! That's amazing!"
10054030-63 = "Oh, Kokona-chan, you're having fun, aren't you?"
10054030-64 = "Even Rumi-oneesan is using the '-chan' suffix...!"
10054030-65 = "Well, we are here for an inspection, after all."
10054030-66 = "We should try to act like 'normal students' as much as possible, right?"
10054030-67 = "Ah, that's true...!"
10054030-68 = "It can't be helped!#nI'll make an exception and allow you to call me Kokona-chan!"
10054030-69 = "Yeah, yeah. Kokona-chan really is an adult, isn't she?"
10054030-70 = "Obviously! Rumi-oneesan understands, too!"
10054030-76 = "So... what do you think?"
10054030-77 = "[s] \"W-what do you mean?\""
10054030-82 = "It's a little lonely to play dumb here."
10054030-83 = "I thought I incorporated your request, Sensei...?"
10054030-84 = "[s] \"Did I even make a request...?\""
10054030-85 = "Even if you didn't, we're close, aren't we?"
10054030-86 = "I picked one I thought you'd like... how is it?"
10054030-87 = "[s1] \"I don't know how you knew my taste... but it's amazing.\"\n[s2] \"Yeah, I think it's great. It suits you very well.\""
10054030-88 = "Oh, yeah. Thank you."
10054030-93 = "Ah, haha... I get embarrassed when you're so straightforward."
10054030-94 = "That's just like you, Sensei."
10054030-95 = "Well, I guess this is fine for today."
10054030-96 = "Oh my, such a mature response. A shame."
10054030-101 = "Well, I suppose I'll just have to get to know you better from here on out."
10054030-102 = "But, um, when you say it suits me so directly... ahaha... yeah."
10054030-103 = "Th-thank you."
10054030-104 = "Might I be allowed to join the circle as well?"
10054030-105 = "Monshu-sama?"
10054030-106 = "Hmm? I am Kisaki, though..."
10054030-107 = "Ah, that's right! I'm sorry, Kisaki-oneesan."
10054030-108 = "Fufu. To think the day would come where I'd be called that by Kokona.#nThis is quite interesting, too."
10054030-111 = "[ns] \"Kisaki...\""
10054030-114 = "Oh, you're really going for it!"
10054030-115 = "I am just a high school student, Ryuge Kisaki."
10054030-116 = "Wearing something like this is perfectly normal."
10054030-121 = "So... what do you think?"
10054030-122 = "Thoughts don't get across unless you put them into words, you know?"
10054030-123 = "[s] \"Everything feels like a dream...\""
10054030-124 = "I see. Showing affection while avoiding a clear statement, leaving the interpretation to the other party..."
10054030-125 = "Very well. You pass."
10054030-126 = "Hm? What is it, are you not feeling well? Hmm..."
10054030-131 = "(For a moment, Kisaki and Rumi's eyes met)"
10054030-134 = "I feel lighter than usual, for some reason. I am grateful to you all."
10054030-136 = "That is good to hear. Monshu—Kisaki-san."
10054030-140 = "Ufufu. Calling you that feels a bit disrespectful, somehow."
10054030-141 = "Shun, is it?#n...Oh? This is quite something."
10054030-146 = "It's a rare opportunity, after all. It suits you very well too, Kisaki-san."
10054030-147 = "And Sensei, are you just going to watch?#nEven if it's a cliché, it makes me happy to hear it, you know?"
10054030-148 = "[s3] \"It's hard to say anything after that setup...\"\n[s4] \"It suits you very well.\""
10054030-151 = "Thank you. I'm happy."
10054030-152 = "Since I'm satisfied with the feedback on my swimsuit... I'd like to take this opportunity to say one more thing.#nThere's something I've wanted to say for a while."
10054030-153 = "What is it?"
10054030-154 = "Everyone, remember that the field trip isn't over until you get home!"
10054030-155 = "That's so like Shun-oneesan..."
10054030-156 = "Indeed."
10054030-157 = "Now then, it seems we are ready!#nLeave the safety of this place to me, and everyone fulfill your respective roles!"
10054030-161 = "[ns] \"Alright...\""
10054030-162 = "Wow~ it's a river~!!"
10054030-163 = "We aren't here to play, you know...!"
10054030-165 = "[ns] \"Let's go!!!\""
10054030-168 = "Well, whatever... we do need to act like tourists..."
10054030-171 = "...It's cold!"
10054030-172 = "Kokona-chan? We need to do warm-up exercises first!"
10054030-173 = "What are you supposed to do for warm-ups before getting in the water again?"
10054030-174 = "I'm not entirely sure myself..."
10054030-175 = "Hmm."
10054030-181 = "(Kisaki gave a signal with her eyes)"
10054030-182 = "Then... I shall provide a demonstration."
10054030-183 = "Mo—Kisaki...-sama!?"
10054030-184 = "Oh my."
10054030-185 = "Huh? But..."
10054030-186 = "Ready!"
10054030-188 = "(Following Kisaki's lead, everyone did the 'Waterside Banzai Exercises')"
10054030-189 = "(The vacation disguised as an inspection has begun!)"