[translation]
2004206-1 = "Cartão de Ano Novo"
2004206-2 = "Café dentro da área de estudos do Millennium"
2004206-4 = "（No caminho de volta após deixar os recibos com a Yuuka...）"
2004206-8 = "（Maki parecia estar pensativa）"
2004206-9 = "Hmm..."
2004206-10 = "[s1] \"Maki, o que está fazendo?\"\n[s2] \"Pensando em algo...?\""
2004206-13 = "Ah, Sensei."
2004206-14 = "Que bom que apareceu!"
2004206-15 = "……Sensei, como você é um adulto, deve receber muitos cartões de Ano Novo, né?"
2004206-16 = "[s3] \"Não é porque sou adulto que recebo tantos assim...\"\n[s4] \"Mas, por causa do trabalho no Schale, acabo recebendo uma boa quantidade.\""
2004206-19 = "Já é o suficiente!"
2004206-20 = "Então, de todos os cartões que você já recebeu..."
2004206-21 = "Qual foi o mais marcante?"
2004206-22 = "[s] \"Hmm, não sei dizer...\""
2004206-24 = "[ns] \"Mas por que o interesse repentino em cartões de Ano Novo?\""
2004206-25 = "É que a Chihiro-senpai disse que, como somos estudantes, deveríamos escrever cartões para as pessoas que nos ajudaram."
2004206-26 = "Para o dono da loja de eletrônicos que eu frequento, para outros clubes, e por aí vai..."
2004206-27 = "Mas não é ineficiente enviar cartas desse jeito?"
2004206-28 = "A gente já se fala por mensagem o tempo todo, #npor que todo mundo insiste tanto em cartões de Ano Novo?"
2004206-29 = "[s5] \"Claro, eu entendo o seu ponto de vista...\"\n[s6] \"Mas acho que existem sentimentos que só podem ser transmitidos através de uma carta.\""
2004206-32 = "……Entendi, você tem razão. #nMas eu não faço ideia de que tipo de cartão criar."
2004206-33 = "A inspiração simplesmente não vem."
2004206-34 = "[s] \"Se quiser um design bonito, vendem vários prontos nas lojas.\""
2004206-35 = "Isso não serve!"
2004206-36 = "Com um design comum, ninguém vai notar."
2004206-37 = "Se é para fazer, tem que ser o melhor cartão de Ano Novo de todos!"
2004206-38 = "[s] \"Essa é a atitude certa!\""
2004206-39 = "Mas, mesmo pesquisando sobre cartões, só aparecem coisas clichês, tipo agradecer pelo ano que passou."
2004206-40 = "Como eu transformo gratidão em arte...?"
2004206-41 = "Sensei, que tipo de cartão você acha legal?"
2004206-42 = "[s7] \"Não existe uma resposta certa para o design...\"\n[s8] \"Mas para compartilhar sua gratidão e memórias, Maki...\""
2004206-45 = "[ns] \"Que tal desenhar o momento mais marcante deste ano?\""
2004206-46 = "Hmm..."
2004206-47 = "……Já sei!"
2004206-52 = "Espera um pouco, Sensei!"
2004206-61 = "……Terminei!"
2004206-62 = "O que achou, Sensei...?"
2004206-63 = "[s] \"É um design incrível.\""
2004206-65 = "[ns] \"Espere, será que isso é...\""
2004206-66 = "Isso é..."
2004206-67 = "O grafite que eu fiz com você pela primeira vez."
2004206-68 = "Eu fiz muitos grafites este ano, mas..."
2004206-69 = "O que mais me marcou foi o tempo que passei com você."
2004206-70 = "Ah, não, quer dizer... não é nesse sentido!"
2004206-71 = "Eu só queria expressar minha gratidão a você."
2004206-76 = "Você aceita...? #nO meu primeiro cartão de Ano Novo."
2004206-77 = "……Hehe. #nConto com você no ano que vem também, Sensei."
