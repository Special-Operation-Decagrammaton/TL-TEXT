[translation]
10048030-1 = "第3話;誰が紫、青を愛でるのか"
10048030-2 = "――前日。"
10048030-4 = "ワイルドハント自治区の外れ、とあるカフェ"
10048030-7 = "あの……あなたが「特殊交易部」の営業室長、ですよね？"
10048030-11 = "ふふっ、ええ。そうです。"
10048030-12 = "どうぞおかけください。"
10048030-13 = "ああ、はい。"
10048030-14 = "あの……本当に、なんでも手に入れてくれるんですか？"
10048030-15 = "ええ、「交易」が仕事ですから。"
10048030-16 = "実績については……「これまで失敗したことはない」とだけ言っておきます。"
10048030-17 = "おお……！"
10048030-18 = "では、さっそく本題に入りましょう。"
10048030-19 = "何をお求めですか？#n今まで、学院外の方から依頼を受けたことはなかったもので。"
10048030-20 = "ええと……これを交易と言っていいのか、少々悩ましいのですが。 "
10048030-24 = "……ワイルドハントの、とある絵画を持ち出していただきたいのです。 "
10048030-26 = "……。"
10048030-30 = "……この話は、なかったことに。"
10048030-31 = "ちょっ、ちょっと！まずは最後まで話を……！"
10048030-32 = "――それはただの窃盗です。"
10048030-33 = "そういったことは[ruby=うち]特殊交易部[/ruby]ではなく、強盗部や怪盗部にでもお願いしてください！"
10048030-34 = "なっ、そんな部活が！？"
10048030-35 = "あるわけないでしょう！"
10048030-36 = "は、話だけでも聞いてもらえませんか！#nお返事はそれからでも……！"
10048030-43 = "……分かりました。"
10048030-45 = "……私は画家をやっておりまして。"
10048030-46 = "今はそれなりに名前も売れ、生活もできていますが……。"
10048030-47 = "若い頃は違いました。"
10048030-48 = "当時は、生きるために仕事を選ぶ余裕はなく……。"
10048030-49 = "その一つとして――"
10048030-51 = "[ruby=がんさく]贋作[/ruby]を描いていたんです。"
10048030-52 = "贋作を……？"
10048030-53 = "ええ。有名な作品を忠実に模倣した絵を、高額で売っていたんです。"
10048030-54 = "他の仕事であれば気にすることはなかったのですが……。"
10048030-55 = "贋作を生み出したことだけは……ずっと心から消えないのです。"
10048030-56 = "自分の過去を……正したい……そう思っているんです。"
10048030-57 = "……それと今回の依頼に、何の関係が？"
10048030-58 = "今度開かれる、ワイルドハントの「ベロニカ特別展」……。"
10048030-59 = "そこに、私が描いた贋作も展示される予定なのです。"
10048030-60 = "……！"
10048030-61 = "つまり……ベロニカ財団が所蔵する絵の中に、あなたの贋作が混ざっていると？"
10048030-62 = "はい。あちらは真作だと思っているのでしょうが。"
10048030-63 = "ちなみに、どのような絵ですか？"
10048030-64 = "それは……。"
10048030-67 = "[log=시민 동물6 의뢰인]『誰が紫、青を愛でるのか』です。[/log]"
10048030-70 = "あの絵を！？"
10048030-71 = "おお、ご存じなのですね。"
10048030-72 = "今までは作品の名を言っても、通じない方がほとんどでした。"
10048030-73 = "ワイルドハントの生徒であれば、知らないわけがありません。"
10048030-74 = "美術史を学んだ者なら、みな一度は目にしていますよ。"
10048030-75 = "……ふふ。#n久しぶりに教養のある方と出会えて、安心しました。"
10048030-76 = "ほとんどの方は、そのような知識すらありませんから。"
10048030-77 = "……ともかく、私が生み出してしまった『誰が紫、青を愛でるのか』の贋作が、#n「ベロニカ特別展」で展示されるわけです。"
10048030-78 = "つまり……その絵を持ち出してほしい、と？"
10048030-79 = "ええ。"
10048030-80 = "正直に申し上げて、非常に難しいです。 "
10048030-81 = "なんとか持ち出せたとしても、それが発覚すれば……#n学院全体を巻き込んだ騒ぎとなるでしょう。"
10048030-82 = "真贋の前に、美術品の盗難事件が起きるのですから。"
10048030-83 = "……いっそのこと、財団側に贋作であると伝えてみてはいかがでしょう？"
10048030-84 = "依頼内容は少し違います。#n私は、あの絵の真作を持っているのです。"
10048030-88 = "……はい？"
10048030-89 = "少し前、地下オークションで『誰が紫、青を愛でるのか』の真作を買いました。"
10048030-90 = "こちらです。"
10048030-94 = "……！"
10048030-95 = "私の願いは一つ。#n贋作を持ち出し、真作をその場所に置いてほしいのです。"
10048030-96 = "それであれば、さほど騒ぎにはならないかと。"
10048030-97 = "真作があるのなら、なおさら財団側に伝えた方が良いのではないでしょうか……？"
10048030-98 = "いえ。私は、贋作を描いた画家として名を残したくはありません。"
10048030-99 = "……ただ、自分の過ちを正したいだけ。"
10048030-100 = "もちろん、大衆に真贋を見抜くことは難しいでしょう。"
10048030-101 = "ですが……私はどうしても、過去の汚点を消し去りたい。"
10048030-102 = "どうでしょうか……受けていただけますか？"
10048030-106 = "……正直、まだ引っかかることがあります。"
10048030-107 = "もし、その展示会に飾られる絵が……本物だとしたら？"
10048030-108 = "私を信じてもらえないのでしょうか。"
10048030-109 = "信用するには、まだ根拠が不足しています。"
10048030-110 = "あなたの言葉が嘘だった場合、私たちは本物を偽物とすり替えることになります。"
10048030-111 = "私の専攻は絵画ではありませんが――"
10048030-112 = "芸術に身を置くものですから。簡単に引き受けるわけにはいきません。"
10048030-113 = "では、これならいかがでしょう？"
10048030-114 = "持ち出した贋作の処分は、そちらにお任せします。"
10048030-115 = "保管するも燃やすもご自由に。\n世間に公開しなければ、どう扱っても構いません。"
10048030-116 = "は……！？"
10048030-117 = "考えてもみてください。ベロニカが本物を所有しているなら、#n私がこのような提案をすると思いますか？"
10048030-118 = "紛れもない贋作だと知っているからこそ、お願いしているのです。"
10048030-119 = "いかがでしょう、信用していただけますか？"
10048030-120 = "……。"
10048030-122 = "[log]そして現在。[/log]"
10048030-125 = "[ns] \"そんな依頼を受けていたんだ……。\""
10048030-126 = "それで結局どうしたんですか？"
10048030-128 = "ふふっ……。"
10048030-134 = "ちょっと、これ……。"
10048030-135 = "『誰が紫、青を愛でるのか』……！本当に！？"
10048030-136 = "おー。"
10048030-137 = "綺麗だね。"
10048030-138 = "こんな間近で見られるなんて……。"
10048030-139 = "……本当に本物！？"
10048030-140 = "もちろん。"
10048030-141 = "……ちょっと待って。"
10048030-142 = "これをフユが持ってるってことは……まさかオッケーしたんですか！？"
10048030-143 = "……いや。"
10048030-144 = "えっ？"
10048030-145 = "いくら営業室長とはいえ、この規模の仕事を独断で決めるのは……ねえ？ "
10048030-146 = "だから、部長と相談してから連絡するって伝えてるよ。"
10048030-147 = "じゃあどうしてこれを……。"
10048030-148 = "これは依頼人から押し付けられたというか……。"
10048030-149 = "でも、ミヨが嫌ならすぐに返してくるよ。"
10048030-150 = "……。"
10048030-151 = "気が引けるのもわかるけど……。"
10048030-152 = "でも、考えてもみてよ。"
10048030-153 = "贋作と真作をすり替えるだけだよ？#nなにも盗むわけじゃない。"
10048030-154 = "それに、これを見て。"
10048030-155 = "今回の報酬額は――なんと。"
10048030-159 = "へっ……！？"
10048030-160 = "ね？"
10048030-162 = "ひゃあ……。"
10048030-163 = "……カラカラ採石場の、一番高い大理石が買えちゃう！"
10048030-164 = "[s] \"すごい金額だ……。\""
10048030-165 = "ふっふーん……これが営業室長の腕ってやつです！"
10048030-166 = "フユ、わかってますよね？"
10048030-167 = "ん？なにが？"
10048030-168 = "先生……まだここにいるんですが。"
10048030-172 = "なんでいるんですか！？"
10048030-173 = "[s] \"な、流れでそのまま……！\""
10048030-174 = "え、えーと、これはその……。"
10048030-175 = "……いや、慌てることじゃないですし！？"
10048030-176 = "先生も、聞いていたなら分かりますよね！"
10048030-177 = "でも、お金のために盗むことには変わりないでしょ……。"
10048030-178 = "先生が見過ごすわけないですよ……。"
10048030-179 = "[s] \"ううん、私は構わないと思っているよ。\""
10048030-180 = "ええっ！？"
10048030-181 = "[s1] \"だって、フユは特に問題ないと思ったんだよね？\" \n[s2] \"なら、みんなを信じようと思って。\""
10048030-186 = "[ns] \"一応、見守らせてはもらうけど。\""
10048030-187 = "せ、先生……。"
10048030-188 = "先生まで、そうおっしゃるなんて……。"
10048030-189 = "うぅぅ……。"
10048030-193 = "イメージしてみよう、ミヨ！ "
10048030-194 = "キューティーベリー87が、デスクの上にある光景を！"
10048030-195 = "あんたは黙っててください！"
10048030-199 = "（これで本当に最後……絶対絶対絶対、足を洗う……！）"
10048030-203 = "分かりました。"
10048030-204 = "……やりましょう。"
10048030-208 = "……今回の「作品」を、書いてみます。"
