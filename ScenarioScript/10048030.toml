[translation]
10048030-1 = "Episódio 3: Quem admira o roxo e o azul?"
10048030-2 = "――No dia anterior."
10048030-4 = "Nos arredores do Distrito Autônomo de Wild Hunt, em um certo café."
10048030-7 = "Com licença... você é a chefe do Departamento de Comércio Especial, certo?"
10048030-11 = "Fufu, sim, sou eu."
10048030-12 = "Por favor, sente-se."
10048030-13 = "Ah, sim."
10048030-14 = "Diga-me... vocês realmente conseguem obter qualquer coisa?"
10048030-15 = "Sim, o "comércio" é o nosso trabalho."
10048030-16 = "Sobre o nosso histórico... direi apenas que nunca falhamos até hoje."
10048030-17 = "Oh...!"
10048030-18 = "Então, vamos direto ao ponto."
10048030-19 = "O que você deseja?#nAté hoje, nunca recebi pedidos de alguém de fora da academia."
10048030-20 = "Bem... não sei se posso chamar isso de comércio, estou um pouco hesitante."
10048030-24 = "...Eu gostaria que você recuperasse uma certa pintura de Wild Hunt."
10048030-26 = "..."
10048030-30 = "...Esqueça que essa conversa aconteceu."
10048030-31 = "Ei, espere! Pelo menos me deixe terminar de falar...!"
10048030-32 = "――Isso é apenas roubo."
10048030-33 = "Para esse tipo de coisa, por favor, procure o Departamento de Assaltos ou o Departamento de Ladrões, não o Departamento de Comércio Especial!"
10048030-34 = "O quê, existem clubes assim!?"
10048030-35 = "Claro que não existem!"
10048030-36 = "P-por favor, apenas me escute!#nVocê pode me dar sua resposta depois...!"
10048030-43 = "...Entendido."
10048030-45 = "...Eu trabalho como pintor."
10048030-46 = "Hoje em dia meu nome é reconhecido e consigo viver bem, mas..."
10048030-47 = "Quando eu era jovem, era diferente."
10048030-48 = "Naquela época, eu não tinha o luxo de escolher o trabalho para sobreviver..."
10048030-49 = "E uma dessas coisas foi..."
10048030-51 = "Pintar falsificações."
10048030-52 = "Falsificações...?"
10048030-53 = "Sim. Eu vendia pinturas que imitavam fielmente obras famosas por preços altos."
10048030-54 = "Se fosse qualquer outro trabalho, eu não me importaria, mas..."
10048030-55 = "O fato de ter criado falsificações... é algo que nunca sai do meu coração."
10048030-56 = "Eu quero... corrigir o meu passado... é isso que eu penso."
10048030-57 = "...E o que isso tem a ver com este pedido?"
10048030-58 = "Na próxima "Exposição Especial Veronica" em Wild Hunt..."
10048030-59 = "Uma das falsificações que eu pintei está programada para ser exibida lá."
10048030-60 = "...!"
10048030-61 = "Quer dizer que... entre as pinturas da Fundação Veronica, há uma falsificação sua?"
10048030-62 = "Sim. Eles devem achar que é a obra original."
10048030-63 = "A propósito, que pintura é essa?"
10048030-64 = "É..."
10048030-67 = "[log=시민 동물6 의뢰인]『Quem admira o roxo e o azul?』.[/log]"
10048030-70 = "Aquela pintura!?"
10048030-71 = "Oh, então você a conhece."
10048030-72 = "Até agora, a maioria das pessoas não sabia do que eu estava falando quando mencionava o nome da obra."
10048030-73 = "Se você é uma aluna de Wild Hunt, é impossível não conhecer."
10048030-74 = "Qualquer um que tenha estudado história da arte já a viu pelo menos uma vez."
10048030-75 = "...Fufu.#nEstou aliviado por encontrar alguém culto depois de tanto tempo."
10048030-76 = "A maioria das pessoas não tem nem esse tipo de conhecimento."
10048030-77 = "……De qualquer forma, a falsificação de 'Quem ama o roxo e o azul' que eu acabei criando será exibida na #n'Exposição Especial Veronica'."
10048030-78 = "Ou seja…… você quer que a gente roube esse quadro?"
10048030-79 = "Sim."
10048030-80 = "Para ser sincero, isso é extremamente difícil."
10048030-81 = "Mesmo que conseguíssemos tirá-lo de lá, se for descoberto…… #ncausará um alvoroço que envolverá toda a academia."
10048030-82 = "Porque, antes de ser uma questão de autenticidade, seria um caso de roubo de obra de arte."
10048030-83 = "……Por que não tenta contar à fundação que se trata de uma falsificação?"
10048030-84 = "O pedido é um pouco diferente. #nEu possuo a obra original daquele quadro."
10048030-88 = "……Sim?"
10048030-89 = "Há algum tempo, comprei a obra original de 'Quem ama o roxo e o azul' em um leilão clandestino."
10048030-90 = "Aqui está."
10048030-94 = "……!"
10048030-95 = "Meu desejo é um só. #nQuero que retirem a falsificação e coloquem a original no lugar."
10048030-96 = "Se for assim, não deve causar tanto alvoroço."
10048030-97 = "Se você tem a original, não seria melhor contar à fundação……?"
10048030-98 = "Não. Eu não quero ficar conhecida como a pintora que criou uma falsificação."
10048030-99 = "……Eu só quero corrigir o meu erro."
10048030-100 = "Claro, será difícil para o público distinguir o original da falsificação."
10048030-101 = "Mas…… eu preciso apagar essa mancha do meu passado a qualquer custo."
10048030-102 = "O que me diz…… aceita o pedido?"
10048030-106 = "……Sinceramente, ainda tem algo que me incomoda."
10048030-107 = "E se o quadro exibido na exposição…… for o verdadeiro?"
10048030-108 = "Você não confia em mim?"
10048030-109 = "Faltam fundamentos para que eu possa confiar."
10048030-110 = "Se o que você disse for mentira, acabaremos trocando o original por uma falsificação."
10048030-111 = "Minha especialidade não é pintura, mas――"
10048030-112 = "Como alguém que vive da arte, não posso aceitar isso facilmente."
10048030-113 = "Então, que tal isto?"
10048030-114 = "Deixo a disposição da falsificação que vocês retirarem por conta de vocês."
10048030-115 = "Podem guardar ou queimar, como preferirem. \nDesde que não exponham ao público, não me importo com o que façam."
10048030-116 = "O quê……!?"
10048030-117 = "Pense bem. Se a Veronica possuísse o original, #nacha que eu faria uma proposta dessas?"
10048030-118 = "Estou pedindo justamente porque sei que é uma falsificação inegável."
10048030-119 = "E então, pode confiar em mim?"
10048030-120 = "……."
10048030-122 = "[log]E agora.[/log]"
10048030-125 = "[ns] \"Então foi esse o pedido que você recebeu…….\""
10048030-126 = "E no fim, o que você fez?"
10048030-128 = "Fufu……."
10048030-134 = "Ei, isso é……"
10048030-135 = "'Quem ama o roxo e o azul'……! É sério!?"
10048030-136 = "Oh."
10048030-137 = "É lindo."
10048030-138 = "Poder ver de tão perto……"
10048030-139 = "……É mesmo o original!?"
10048030-140 = "Claro."
10048030-141 = "……Espere um pouco."
10048030-142 = "Se a Fuyu está com isso, significa que…… não me diga que você aceitou!?"
10048030-143 = "……Não."
10048030-144 = "Hã?"
10048030-145 = "Por mais que você seja a chefe do departamento comercial, decidir um trabalho dessa escala por conta própria é... sabe como é, né?"
10048030-146 = "Por isso eu disse que ia consultar a diretora antes de responder."
10048030-147 = "Então por que você trouxe isso..."
10048030-148 = "É que o cliente meio que empurrou isso pra gente..."
10048030-149 = "Mas, se a Miyo não quiser, eu devolvo na hora."
10048030-150 = "..."
10048030-151 = "Eu entendo que você esteja hesitante, mas..."
10048030-152 = "Pense bem."
10048030-153 = "É só trocar uma falsificação por uma obra original, não é?#nNão vamos roubar nada."
10048030-154 = "Além disso, olhe só isso."
10048030-155 = "O valor da recompensa desta vez é... veja só."
10048030-159 = "Hã...!?"
10048030-160 = "Viu?"
10048030-162 = "Uau..."
10048030-163 = "...Dá pra comprar o mármore mais caro da Pedreira Karakara!"
10048030-164 = "[s] \"Que quantia incrível...\""
10048030-165 = "Hehe... é disso que a chefe do departamento comercial é capaz!"
10048030-166 = "Fuyu, você está ciente, né?"
10048030-167 = "Hm? De quê?"
10048030-168 = "Sensei... ainda está aqui."
10048030-172 = "Por que você ainda está aqui!?"
10048030-173 = "[s] \"B-bem, eu acabei ficando por causa do fluxo da conversa...!\""
10048030-174 = "E-ei, isso é, tipo..."
10048030-175 = "...Não, não tem motivo pra entrar em pânico, né!?"
10048030-176 = "Sensei, se você ouviu tudo, então já sabe!"
10048030-177 = "Mas, no fim das contas, ainda é roubar por dinheiro..."
10048030-178 = "O Sensei não deveria deixar isso passar..."
10048030-179 = "[s] \"Não, eu acho que não tem problema.\""
10048030-180 = "O quê!?"
10048030-181 = "[s1] \"Afinal, a Fuyu achou que não teria problema, certo?\" \n[s2] \"Então, decidi confiar em vocês.\""
10048030-186 = "[ns] \"Vou ficar de olho, de qualquer forma.\""
10048030-187 = "S-Sensei..."
10048030-188 = "Até o Sensei dizer uma coisa dessas..."
10048030-189 = "Uuu..."
10048030-193 = "Vamos imaginar, Miyo!"
10048030-194 = "Imagine a cena da Cutie Berry 87 em cima da sua mesa!"
10048030-195 = "Fique quieta!"
10048030-199 = "(Essa é a última vez... com certeza absoluta, vou sair dessa vida...!)"
10048030-203 = "Entendido."
10048030-204 = "...Vamos fazer isso."
10048030-208 = "...Vou escrever a \"obra\" desta vez."
