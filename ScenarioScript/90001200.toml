[translation]
90001200-1 = "Episódio 20; Presságios"
90001200-6 = "Voltamos para a zona de tundra, não é?"
90001200-11 = "Alice sabe!#nDizem que existe um monstro gigante que se transforma por aqui!"
90001200-12 = "Se fosse um jogo, seria um sucesso garantido!"
90001200-13 = "Exatamente, Momoi!#nElementos de monstros, transformações e robôs são sempre muito populares em qualquer época!"
90001200-14 = "Com certeza seria um jogo lendário!"
90001200-15 = "……Posso perguntar uma coisa, Momoi?#nQue tipo de roteiro seria esse?"
90001200-16 = "B-bem, eu ainda vou pensar nisso, mas…… que tal começarmos destruindo o mundo?"
90001200-17 = "Rejeitado."
90001200-22 = "Por queee!?"
90001200-24 = "Rio-sama, descobri vestígios da ferrovia."
90001200-25 = "Vamos descer para dar uma olhada?#nOu prefere que eu faça o reconhecimento do ar?"
90001200-26 = "[s1] \"Acho que há coisas que não podemos ver daqui.\"\n[s2] \"Vamos descer com cuidado.\""
90001200-29 = "Fique tranquilo, Sensei.#nSe algo acontecer, eu certamente o protegerei."
90001200-30 = "[s] \"Obrigado, você é muito confiável.\""
90001200-31 = "Você pode demonstrar isso com ações, sabe?"
90001200-32 = "Por enquanto, estou pilotando……."
90001200-33 = "Não tem jeito. Vou seguir as palavras da Rio-sama."
90001200-34 = "Vou reduzir a altitude, então cuidado com a turbulência."
90001200-38 = "É uma paisagem um tanto solitária, não é……?"
90001200-39 = "Bem, este lugar já era desabitado desde o início."
90001200-40 = "Faz sentido. Construíram uma ferrovia em uma terra esquecida há muito tempo……."
90001200-41 = "E abandonaram as instalações assim que terminaram de coletar os recursos."
90001200-43 = "Os trilhos se dividem em dois caminhos.#n……Foram processados para que nunca mais pudessem ser usados."
90001200-44 = "Mas acho que ainda dá para entender a rota."
90001200-45 = "V-vamos continuar…… seguindo a pé a partir daqui……?"
90001200-46 = "Vamos usar o veículo.#nPosso chamar a nave de transporte de volta no piloto automático."
90001200-53 = "Entendido. Se a situação piorar, vamos recuar imediatamente."
90001200-59 = "……E assim, viveram felizes para sempre."
90001200-60 = "E-e depois disso?#nO que aconteceu com eles?"
90001200-61 = "A história acaba aqui, Ein……."
90001200-62 = "Não pode ser……."
90001200-63 = "Bem, contos de fadas são assim, não são? O final já está decidido.#nEmbora parecesse que a Ein ia chorar."
90001200-64 = "M-mas……!"
90001200-66 = "Ué? A Sof também não estava quase chorando?"
90001200-67 = "E-eu não estava, de jeito nenhum……!"
90001200-72 = "No entanto, como a Sof disse, o final já está decidido.#nÉ por isso que, já que vamos contar, que seja um final feliz."
90001200-73 = "É-é verdade…… hehe. A-além disso, a voz da irmã mais velha foi maravilhosa……."
90001200-74 = "Irmã mais velha, qual é a próxima história?"
90001200-76 = "Vocês gostam mesmo de contos de fadas, Ein, Sof e Owl."
90001200-77 = "S-sim……!#nComo a irmã mais velha leu para nós, passamos a gostar ainda mais!"
90001200-78 = "E ainda podemos coletar a \"realidade\" lá fora, matamos dois coelhos com uma cajadada só!"
90001200-79 = "Eu não tenho tanto interesse assim. Histórias sobre a tolice dos humanos são interessantes?"
90001200-80 = "Ah, mas eu gosto porque posso ouvir a voz da irmã mais velha."
90001200-82 = "O que faremos a seguir?#nQue tal a história de um grou da classe trabalhadora que lidera uma revolução contra uma raposa capitalista malvada?"
90001200-83 = "Ou talvez uma história onde o sol e o vento norte usam vários truques para tentar roubar o casaco de um viajante pobre?"
90001200-84 = "E-eu……."
90001200-89 = "Som de alarme?"
90001200-90 = "Vamos dar uma olhada…… ora, ora, o que temos aqui?"
90001200-91 = "Hã!? Aquele adulto e Rio Tsukatsuki e os outros…… na zona de tundra……?"
90001200-92 = "Isto é……."
90001200-93 = "Bem, é aquilo, né?#nDeve ser a resposta deles à \"declaração de guerra\" da Sof."
90001200-94 = "Voltar para a tundra significa que…… entendo, eles vão procurar pelos vestígios da ferrovia de transporte de recursos."
90001200-95 = "……Existe a possibilidade de que as coisas fiquem um pouco problemáticas."
90001200-96 = "Por isso eu disse que não precisava imitar esse vício humano de declarar guerra."
90001200-97 = "Ugh……."
90001200-98 = "Bem, tudo bem. #nPelo menos serviu de pretexto para provocar a Sof."
90001200-99 = "Ei, espera aí!?"
90001200-100 = "Ma-mas, o que tem depois daquele caminho é……."
90001200-101 = "Sim. É exatamente por isso que não estou preocupada."
90001200-102 = "Ah……!"
90001200-103 = "É isso mesmo. Se eles forem para lá, encontrarão muitas barreiras."
90001200-104 = "Mas parece que o grupo deles aumentou. #nTalvez seja melhor checar de novo."
90001200-105 = "Eu, eu vou verificar! #nÉ, bem…… essa pessoa é……."
90001200-110 = "Vejamos…… o nome é Saiba Momoi. Atributo: roteirista. Fora isso, sem características especiais. Isso parece inofensivo de qualquer ângulo."
90001200-115 = "Esta aqui é Saiba Midori. Irmã gêmea de Saiba Momoi. Atributo: ilustradora amadora. Fora isso, sem características especiais. O mesmo vale para ela."
90001200-120 = "E, por último…… Hanaoka, Yuzu? Atributo, bem, programadora……? Esta aqui também não parece ser uma ameaça……."
90001200-121 = "……Parece que dois sinais diferentes foram captados e depois desapareceram."
90001200-126 = "I-Irmã!? #nNão precisa se preocupar com esse tipo de coisa……!"
90001200-127 = "Isso é algo que nós fazemos. #nO poder da irmã deve ser usado em outro lugar……!"
90001200-128 = "Mas eu também quero ajudar vocês."
90001200-130 = "Ajudar a irmã mais nova é natural para uma irmã mais velha, não é?"
90001200-134 = "Ah, ah……."
90001200-135 = "Tão brilhante…… tão nobre."
90001200-136 = "Mas, irmã. Sinais como esse são comuns. #nProvavelmente foi apenas ruído."
90001200-137 = "Ouvi dizer que a causa costuma ser mésons vindos do espaço."
90001200-138 = "Teoricamente, qualquer circuito eletrônico pode sofrer erros. #nChamamos isso de \"inversão de evento único\"."
90001200-139 = "Po-por isso, ficaria muito feliz se vocês pudessem confiar um pouco mais na gente!"
90001200-140 = "Nós somos…… as irmãs mais novas que a irmã tanto se orgulha!"
90001200-142 = "……."
90001200-143 = "Entendido. Então, conto com vocês."
90001200-144 = "Se houver algo em que eu possa ajudar, me avisem imediatamente, prometem?"
90001200-145 = "Sim!"
90001200-152 = "Bem, então…… o que faremos?"
90001200-153 = "U-uh, bem……."
90001200-154 = "Hmm, bem."
90001200-155 = "Vamos deixar para lá?"
90001200-156 = "Eu meio que já esperava que você dissesse isso, mas você, hein……."
90001200-157 = "Se for para intervir de forma desajeitada e acabar reduzindo nossas forças――"
90001200-158 = "Não seria mais seguro deixar que eles continuem por conta própria e desperdicem tempo?"
90001200-159 = "Nosso maior objetivo é…… tornar a Netzach, que despertou, mais estável……!"
90001200-160 = "É verdade, precisamos aumentar a velocidade da expansão. #nPensando bem…… é melhor deixá-los perder tempo mesmo."
90001200-161 = "Além disso, mesmo que aquele grupo chegue ao \"Ponto de Grade\"."
90001200-162 = "Se não conseguirem superar a \"Tiferet\", eles nem sequer conseguirão pisar no Continente de Aço, não é?"
90001200-163 = "E, e mesmo que superem a Tifer-chan…… ainda tem o que vem depois……!"
90001200-164 = "É verdade. Mesmo que passem pelo guardião, o Continente de Aço é nossa base principal."
90001200-165 = "O guardião nunca será derrotado!"
90001200-166 = "Uau?…… Desculpe, Ain. #nEu não quis dizer que realmente acho que isso vai acontecer."
90001200-167 = "Veja bem, é melhor estarmos preparados para todos os cenários, não é?"
90001200-168 = "De-desculpe…… eu, eu acabei me empolgando……."
90001200-169 = "Está tudo bem, está tudo bem."
90001200-170 = "Pois é. Mesmo que o pior cenário possível se concretize..."
90001200-171 = "Basta terminar tudo no Continente de Aço."
90001200-172 = "...Só precisamos evitar que a Irmã saia."
90001200-173 = "Ué... C-certo, é verdade."
90001200-174 = "É, verdade. #nIsso, pelo menos, absolutamente..."
90001200-175 = "...!"
90001200-176 = "Owl. Você não quer pregar uma peça?"
90001200-177 = "Eu? Que raro. #nA Sof me pedindo para fazer uma \"travessura\"."
90001200-178 = "Tive uma ideia interessante, é o seguinte..."
90001200-184 = "...é mais ou menos assim, o que acha?"
90001200-185 = "U-uau..."
90001200-186 = "..."
90001200-187 = "A Sof realmente conhece bem os meus gostos!"
90001200-188 = "Pois é... Então, vai fazer?"
90001200-189 = "Com certeza! Além disso, se aquele grupo não conseguir superar nem isso, então é porque o limite deles é esse, não é?"
90001200-190 = "M-mas, não parece ser \"apenas isso\"..."
90001200-192 = "Isso, por sua vez, não é problema meu!"
90001200-193 = "S-sim, senhora..."
90001200-194 = "Vou começar os preparativos imediatamente. #nPode levar um pouco de tempo!"
90001200-198 = "Sim, sim... Boa sorte."
90001200-202 = "Sinto que já viajamos bastante, mas... até onde isso vai, afinal..."
90001200-203 = "[s] \"Parece um trem transcontinental.\""
90001200-208 = "Sem perceber, já anoiteceu. #nDevemos continuar...?"
90001200-209 = "Normalmente, deveríamos parar com o reconhecimento noturno, mas..."
90001200-210 = "...Desculpe. #nEnquanto estamos aqui, o Continente de Aço continua crescendo... Não posso recuar agora."
90001200-212 = "Vai ser uma agenda puxada."
90001200-213 = "Isso não seria um problema, mas... os trilhos terminam aqui."
90001200-214 = "Hã, e o que a gente faz agora!?"
90001200-215 = "Perdemos o rumo..."
90001200-216 = "...Tenho outra má notícia."
90001200-217 = "V-você está brincando, né...?"
90001200-218 = "Eu também gostaria que fosse uma brincadeira."
90001200-219 = "O sinal do GPS foi perdido há pouco."
90001200-220 = "!?"
90001200-221 = "É verdade, e olha que estou recebendo dados do meu satélite pessoal..."
90001200-222 = "[s] \"Você tem um satélite pessoal!?\""
90001200-223 = "Mais importante, agora precisamos encontrar o caminho..."
90001200-229 = "— Abaixem-se!"
90001200-238 = "Ótimo, funcionou!"
90001200-239 = "N-nós conseguimos...!"
90001200-240 = "O disparo daquela força proibida usando o drone da Ein... excelente. Com isso, aquele lugar está completamente isolado do mundo exterior."
90001200-241 = "Como se tivessem sofrido um ataque EMP em larga escala, todos os dispositivos eletrônicos devem ter parado de funcionar!"
90001200-242 = "Obrigada, Ein! Sempre nos ajudando!"
90001200-243 = "D-de nada... hehe. #nAs minhas volantes sempre se esforçam muito..."
90001200-244 = "O nome desta vez é relativamente fácil de entender..."
90001200-246 = "Como estão as coisas por aí!?"
90001200-247 = "Não dá, Presidente... nenhum circuito responde."
90001200-248 = "Deveríamos estar preparados contra EMP, então por que..."
90001200-249 = "Meu Abi-Eshuh também não liga. #nSe formos atacados nesta situação..."
90001200-250 = "……e, e se isso acontecer, o que será de nós?"
90001200-251 = "Ugh……."
90001200-253 = "Sensei, Kei……."
90001200-254 = "[s3] \"Vamos todos nos acalmar.\"\n[s4] \"Primeiro, vamos manter a calma.\""
90001200-260 = "[ns] (Mas…… o que devemos fazer?)"
90001200-261 = "Haa…… é impossível não se preocupar com vocês."
90001200-262 = "K-Kei!?"
90001200-264 = "[ns] \"Kei?\""
90001200-265 = "Está tudo bem, Princesa…… não, Alice."
90001200-266 = "Eu sei como lidar com isso."
90001200-267 = "S-Sério!?"
90001200-268 = "Primeiro, olhe nos meus olhos……."
90001200-269 = "Pronto, agora está tudo bem.#nEntão, vamos mostrar para aquela \"pirralha\" quem manda."
90001200-270 = "……vamos mostrar com quem ela está comprando briga!"
90001200-278 = "Próximo episódio: O Dever Final"
