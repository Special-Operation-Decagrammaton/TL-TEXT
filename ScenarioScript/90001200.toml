[translation]
90001200-1 = "第20話;兆候"
90001200-6 = "凍原地帯に戻ってきましたね。"
90001200-11 = "アリス、知っています！#nここに巨大変身怪獣がいるのだと！"
90001200-12 = "ゲームだったら大ヒット間違いなしだよ！"
90001200-13 = "その通りです、モモイ！#n怪獣、変身、ロボットの要素は、いつの時代も大人気です！"
90001200-14 = "間違いなく神ゲーになる！"
90001200-15 = "……一つ聞いてもいいですか、モモイ。#nそれはどんなシナリオになるんですか？"
90001200-16 = "そ、それはこれから考えるけど……とりあえず、一回世界を滅亡させようかなって？"
90001200-17 = "却下です。"
90001200-22 = "なんでぇ！？"
90001200-24 = "リオ様、鉄道の痕跡を発見しました。"
90001200-25 = "とりあえず降りてみる？#nそれとも、空から偵察する？"
90001200-26 = "[s1] \"ここからは見えないものもあると思う。\"\n[s2] \"気をつけながら、降りてみよう。\""
90001200-29 = "ご安心ください、先生。#nもしもの時は、私が必ずお守りします。"
90001200-30 = "[s] \"ありがとう、頼もしいね。\""
90001200-31 = "行動で示してくれても良いんですよ。"
90001200-32 = "一応、操縦中は……。"
90001200-33 = "仕方ありません。ここはリオ様の言葉に従います。"
90001200-34 = "高度を下げるので、揺れに注意してください。"
90001200-38 = "なんだか、寂しい風景ですね……。"
90001200-39 = "まあ、ここは元々誰もいなかったところだし。"
90001200-40 = "それもそのはずです。長らく忘れられていた土地に鉄道を作って……。"
90001200-41 = "資源回収が終わったら施設を放棄したのですから。"
90001200-43 = "線路は二手に別れていますね。#n……二度と利用できないように、処理がされています。"
90001200-44 = "ですが、ルートは分かりそうですね。"
90001200-45 = "こ、このまま……ずっと徒歩で追跡するんですか……？"
90001200-46 = "車を使いましょう。#n輸送船は自動操縦でまた呼べばいいわ。"
90001200-53 = "そうですね。状況が悪くなったら、すぐに撤退しましょう。"
90001200-59 = "……そして、いつまでも幸せに暮らしました。"
90001200-60 = "そ、その先は？#nそれで、どうなったのですか？"
90001200-61 = "この話はこれで終わりです、アイン……。"
90001200-62 = "そんな……。"
90001200-63 = "まあ、童話ってこういうものだよね？終わりが決まっているわけだし。#nアインなんか泣きそうだったけど。"
90001200-64 = "で、でも……！"
90001200-66 = "あれ？泣きそうだったのは、ソフも同じでは？"
90001200-67 = "わ、私は、別に……！"
90001200-72 = "しかし、ソフの言う通り終わりは決まっています。#nだからこそ、どうせならハッピーエンドがいいわけです。"
90001200-73 = "そ、そうですね……えへへ。そ、それに、お姉様の声が良かったです……。"
90001200-74 = "お姉様、次のお話は？"
90001200-76 = "童話が好きなんですね、アイン、ソフ、オウル。"
90001200-77 = "は、はい……！#nお姉様が読み聞かせてくれたから、もっと好きになりました！"
90001200-78 = "外の「現実」も収集できるし一石二鳥！"
90001200-79 = "私はそこまで興味はありませんが。人間の愚かな話なんて面白いんですか？"
90001200-80 = "ああでも、お姉様の声が聞けるので好きですよ？"
90001200-82 = "次はどんなものにしましょうか？#n邪悪な資本家のキツネに対して、労働者階級の鶴が革命を成功させる話にしましょうか。"
90001200-83 = "それとも、太陽と北風が貧しい旅人の上着を奪うために様々な手を繰り出す物語にしましょうか？"
90001200-84 = "わ、私は……。"
90001200-89 = "警報音？"
90001200-90 = "見てみましょう……へぇ、これはこれは？"
90001200-91 = "えっ！？あの大人と[ruby=つかつき]調月[/ruby]リオたちが……凍原地帯に……？"
90001200-92 = "これは……。"
90001200-93 = "まあ、あれですね。#nソフの「宣戦布告」に対する、向こうの回答でしょう。"
90001200-94 = "凍原に戻ったということは……なるほど、資源輸送鉄道の痕跡を探しに行く、と。"
90001200-95 = "……少し、面倒なことになる可能性も出てきましたね。"
90001200-96 = "だから宣戦布告なんて人間の悪癖を真似する必要はないと言ったじゃないですか。"
90001200-97 = "うっ……。"
90001200-98 = "ま、いいですけど。#nソフをからかう口実になりましたし。"
90001200-99 = "ちょっと！？"
90001200-100 = "で、でも、あの道を進んだ先は……。"
90001200-101 = "ええ。だからこそ、私は心配していないのですよ。"
90001200-102 = "あっ……！"
90001200-103 = "そういうことです。あそこに向かうのなら、障壁がたくさんありますから。"
90001200-104 = "けど、向こうも人が増えたみたいだね。#nもう一度チェックした方がいいかも。"
90001200-105 = "わ、私が調べます！#nえ、えっと……この人は……。"
90001200-110 = "どれどれ……名前は[ruby=さいば]才羽[/ruby]モモイ。属性はシナリオライター。その他、特徴なし。これはどう見ても無害ですね。"
90001200-115 = "こっちは[ruby=さいば]才羽[/ruby]ミドリ。[ruby=さいば]才羽[/ruby]モモイの双子の妹。属性はアマチュアのイラストレーター。その他、特徴なし。これも同じく。"
90001200-120 = "さ、最後は……[ruby=はなおか]花岡[/ruby]、ユズ？属性は、えっと、プログラマーですね……？こちらも、害はないかと……。"
90001200-121 = "……別の信号が二つ、捕捉されて消えたように見えますが。"
90001200-126 = "お、お姉様！？#nこんなこと気にしなくても……！"
90001200-127 = "これは私たちがやることだから。#nお姉様の力は、別のところで……！"
90001200-128 = "ですが、我もあなた達を助けたいのです。"
90001200-130 = "妹を助けるのは、姉として当然でしょう？"
90001200-134 = "あ、ああ……。"
90001200-135 = "眩しい……尊い。"
90001200-136 = "ですが、お姉様。このような信号は、よくあることなのです。#nおそらくノイズが入ってしまったのでしょう。"
90001200-137 = "原因は、宇宙から飛んでくる中間子だってよく聞くよね。"
90001200-138 = "理論上、あらゆる電子回路はエラーを起こす可能性があるのです。#n「単一事象反転」と言います。"
90001200-139 = "だ、だからここは……私たちのことをもう少し、信じてもらえると、う、嬉しいです！"
90001200-140 = "私たちは……お姉様の自慢の妹ですから！"
90001200-142 = "……。"
90001200-143 = "分かりました。では、よろしくお願いします。"
90001200-144 = "我に手伝えることがあったらすぐに言ってください、約束してもらえますか？"
90001200-145 = "は～い！"
90001200-152 = "さて、それじゃ……どうする？"
90001200-153 = "う、えっと……。"
90001200-154 = "うーん、まあ。"
90001200-155 = "放っておきましょうか？"
90001200-156 = "何となく、そう言いそうな気がしてたけど、あんたさぁ……。"
90001200-157 = "下手に手を出して、こちらの戦力が削がれるくらいなら――"
90001200-158 = "あのまま泳がせて、時間を無駄にさせたほうが安全でしょう？"
90001200-159 = "私たちの最大の目標は……覚醒したネツァクちゃんを、より安定させることですからね……！"
90001200-160 = "そうだね、拡張の速度を上げないといけないし。#nそう考えると……無駄足を踏ませた方がいいのか。"
90001200-161 = "それに、あの一行が「グリッドポイント」に到達したとしても。"
90001200-162 = "「ティファレト」を突破できなければ、鋼鉄大陸に足を踏み入れることすらできないのですよ？"
90001200-163 = "そ、それに、もしティファちゃんを突破したとしても……その先がありますし……！"
90001200-164 = "それもそうだね。門番を突破したとしても、鋼鉄大陸が私たちの本陣だもの。"
90001200-165 = "門番は絶対に突破されません！"
90001200-166 = "うわっ？……ごめん、アイン。#n本当にそう思ってるわけじゃないよ。"
90001200-167 = "ほら、あらゆる想定をしておいた方が良いでしょ？"
90001200-168 = "す、すみません……つ、つい熱く……。"
90001200-169 = "大丈夫大丈夫。"
90001200-170 = "そうですね。最悪の可能性が、全て実現したとしても――"
90001200-171 = "鋼鉄大陸で全て終わらせれば良いだけですから。"
90001200-172 = "……お姉様が外に出ることだけは避けましょう。"
90001200-173 = "う……そ、そうですね。"
90001200-174 = "そう、だね。#nそれだけは、絶対に……。"
90001200-175 = "……！"
90001200-176 = "オウル。あんた、ちょっといたずらしてみない？"
90001200-177 = "私が？珍しいですね。#nソフが私に「いたずら」しろと言うなんて。"
90001200-178 = "ちょっと面白いこと思いついてさ、えっとね――"
90001200-184 = "――って感じなんだけど、どう？"
90001200-185 = "う、うわぁ……。"
90001200-186 = "……。"
90001200-187 = "ソフったら、私の趣味をよ～く分かってますねぇ！"
90001200-188 = "そりゃね……それで、やるの？"
90001200-189 = "もちろんです！そもそもあの一行が、この程度も突破できなければ結局そこまでということですし？"
90001200-190 = "そ、その、「この程度」では、ないような……。"
90001200-192 = "それこそ、私の知ったことではありません！"
90001200-193 = "は、はい……。"
90001200-194 = "すぐに準備に取り掛かります。#n少し時間がかかるかもしれません！"
90001200-198 = "はい、はい……頑張って。"
90001200-202 = "ずいぶんと移動した気がしますが……一体どこまで続いているのでしょうか……。"
90001200-203 = "[s] \"気分は大陸横断鉄道みたいだね。\""
90001200-208 = "いつの間にか夜になってしまいました。#n続けるべきでしょうか……？"
90001200-209 = "本来であれば、夜間の偵察はやめるべきだけれど……。"
90001200-210 = "……ごめんなさい。#nこうしている間にも鋼鉄大陸は大きくなっていく……ここで退くわけにいかないわ。"
90001200-212 = "ハードスケジュールになるね。"
90001200-213 = "それは良いのですが……線路がここで途絶えています。"
90001200-214 = "えっ、じゃあどうするの！？"
90001200-215 = "行き先を見失ってしまいました……。"
90001200-216 = "……悪い知らせが、もう一つあります。"
90001200-217 = "じょ、冗談だよね……？"
90001200-218 = "私も冗談であってほしかったのですが。"
90001200-219 = "先ほどから、GPSの信号が失われています。"
90001200-220 = "！？"
90001200-221 = "本当だわ、私の個人衛星から受信しているのに……。"
90001200-222 = "[s] \"個人衛星なんて持ってるの！？\""
90001200-223 = "それより、今は道を――"
90001200-229 = "――伏せてください！"
90001200-238 = "よし、入った！"
90001200-239 = "や、やりました……！"
90001200-240 = "アインのドローンを使った、あの[ruby=エネルギー]禁じられた力[/ruby]の発射……良いですね。これであそこは、完全に外界と遮断されました。"
90001200-241 = "まるで大規模なEMP攻撃を受けたかのように、電子機器を使用できなくなったはずです！"
90001200-242 = "ありがとうございます、アイン！いつもお世話になっています！"
90001200-243 = "ど、どういたしまして……えへへ。#nうちのフライホイールちゃんたちは、いつも頑張ってくれるから……！"
90001200-244 = "今回の名前は、比較的分かりやすいですね……。"
90001200-246 = "そっちはどう！？"
90001200-247 = "ダメ、会長……どの回路も応答しない。"
90001200-248 = "EMPの対策はしていたはずなのに、どうして……？"
90001200-249 = "私のアビ・エシュフも起動できません。#nこの状況で襲撃でもされたら……。"
90001200-250 = "……そ、そうなったら私たちはどうなるんですか？"
90001200-251 = "うぅ……。"
90001200-253 = "先生、ケイ……。"
90001200-254 = "[s3] \"みんな落ち着こう。\"\n[s4] \"まずは冷静になろう。\""
90001200-260 = "[ns] （でも……どうすれば良いんだろう？）"
90001200-261 = "はぁ……危なっかしくて仕方ありませんね。"
90001200-262 = "け、ケイ！？"
90001200-264 = "[ns] \"ケイ？\""
90001200-265 = "大丈夫です、王女……いえ、アリス。"
90001200-266 = "私は対処法を知っています。"
90001200-267 = "ほ、本当ですか！？"
90001200-268 = "まずは、私の目を見てください……。"
90001200-269 = "これで大丈夫です。#nでは、あの「チビっ子」に分からせてあげましょう。"
90001200-270 = "……いったい誰に喧嘩を売っているのかを！"
90001200-278 = "次回;最後の責務"
