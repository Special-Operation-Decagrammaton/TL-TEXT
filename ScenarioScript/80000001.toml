[translation]
80000001-1 = "モモカの挑戦"
80000001-2 = "連邦生徒会・オペレーションルーム"
80000001-4 = "（シャーレの仕事もあって、連邦生徒会に寄って書類作業をしていた）"
80000001-5 = "……んまい。"
80000001-6 = "いやー、何か面白いことでも落ちてこないかな……。"
80000001-7 = "[s] \"………。\""
80000001-8 = "……え、何その目は？"
80000001-9 = "そんな目で見られても、先生の仕事を手伝ったりはしないからね。"
80000001-10 = "私は今お菓子を食べるので精いっぱいだから。（パリッ）"
80000001-11 = "[s] \"そのポテチ……。\""
80000001-12 = "え、まさか本当に狙ってるの？"
80000001-13 = "ダメ、これだけは譲れない！"
80000001-14 = "……え、そうじゃなくて、どうして私が明太子味のポテチしか食べないのかって？"
80000001-15 = "そんなの当然じゃん、美味しいからだよ。（パリッ）"
80000001-16 = "初めてこの明太子味のポテチに出会った瞬間、これは正に運命だと思ったね。"
80000001-17 = "程良い塩っけと明太子の旨味、そしてサクッとしたこの食感……"
80000001-18 = "こんなに完成された食べ物、私は他に見たこと無いよ。"
80000001-19 = "それなら、わざわざ他のを食べる必要なんて無いでしょ？食欲を無駄遣いすること無いし。"
80000001-20 = "[s] \"他の味のポテチも美味しいかもしれないよ？\""
80000001-21 = "うーん……まあ確かに、最近の新商品とかはあんまり食べてないけど……。"
80000001-27 = "……そういえばこの間おまけで貰ったな、これ。バレンタイン記念のチョコレート味のポテチ。"
80000001-28 = "まあちょっと味見するくらい……"
80000001-29 = "あむ……"
80000001-32 = "……。"
80000001-34 = "……ポテチなのに甘い。"
80000001-35 = "[s] \"そりゃチョコレート味だからね……？\""
80000001-36 = "信じらんない！ポテチなのにしょっぱくないとか！"
80000001-37 = "サワークリームとかならまだ許容範囲だけど、これは無理！"
80000001-38 = "これは無理……。"
80000001-42 = "んー、と言っても捨てるのも勿体ないし……。"
80000001-44 = "あ、そういえば今日バレンタインデーじゃん？"
80000001-48 = "はいこれ、私からのチョコレートってことで。"
80000001-49 = "[s] \"食べかけ！？\""
80000001-50 = "まあまあ恥ずかしがらないで良いから。"
80000001-51 = "ほら、遠慮しないで！"
80000001-52 = "その代わり、今度ここに来るときは明太子のポテチをダースで買ってきてね。"
80000001-53 = "ふふっ、楽しみにしてるよ？"
