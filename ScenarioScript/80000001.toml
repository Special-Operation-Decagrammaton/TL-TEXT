[translation]
80000001-1 = "O Desafio da Momoka"
80000001-2 = "Conselho Estudantil Federal - Sala de Operações"
80000001-4 = "（Tendo também o trabalho do Schale, passei no Conselho Estudantil Federal para cuidar da papelada）"
80000001-5 = "……Hum, que delícia."
80000001-6 = "Nossa, será que não cai nada de interessante por aqui……?"
80000001-7 = "[s] \"………。\""
80000001-8 = "……Ei, que olhar é esse?"
80000001-9 = "Mesmo que me olhe assim, não vou te ajudar com o trabalho do Sensei, viu."
80000001-10 = "Estou ocupada demais comendo meu salgadinho agora. (Crac)"
80000001-11 = "[s] \"Esse salgadinho…….\""
80000001-12 = "Ei, não me diga que você está mesmo querendo?"
80000001-13 = "Nem pensar, isso eu não divido com ninguém!"
80000001-14 = "……Ah, não é isso? Quer saber por que eu só como salgadinho sabor mentaiko?"
80000001-15 = "Isso é óbvio, é porque é gostoso. (Crac)"
80000001-16 = "No momento em que experimentei esse salgadinho de mentaiko pela primeira vez, soube que era destino."
80000001-17 = "O salgado na medida certa, o sabor do mentaiko e essa textura crocante……"
80000001-18 = "Nunca vi um alimento tão perfeito na minha vida."
80000001-19 = "Sendo assim, não tem por que comer outros, né? Não faz sentido desperdiçar meu apetite."
80000001-20 = "[s] \"Talvez outros sabores também sejam bons, não acha?\""
80000001-21 = "Hum…… bem, é verdade que não tenho experimentado muito os lançamentos recentes……."
80000001-27 = "……Falando nisso, ganhei isso aqui de brinde outro dia. Um salgadinho sabor chocolate comemorativo de Dia dos Namorados."
80000001-28 = "Bom, só uma provadinha não custa nada……"
80000001-29 = "Nhac……"
80000001-32 = "……."
80000001-34 = "……É um salgadinho, mas é doce."
80000001-35 = "[s] \"Bom, é sabor chocolate, né……?\""
80000001-36 = "Inacreditável! Como pode um salgadinho não ser salgado!"
80000001-37 = "Se fosse sour cream eu até tolerava, mas isso aqui não dá!"
80000001-38 = "Isso é impossível……."
80000001-42 = "Hum, mas também é um desperdício jogar fora……."
80000001-44 = "Ah, falando nisso, hoje é Dia dos Namorados, né?"
80000001-48 = "Toma, considere isso como o meu chocolate para você."
80000001-49 = "[s] \"Já está aberto!?\""
80000001-50 = "Ora, não precisa ficar com vergonha."
80000001-51 = "Anda, não seja tímido!"
80000001-52 = "Em troca, da próxima vez que vier aqui, traga uma dúzia de salgadinhos de mentaiko para mim."
80000001-53 = "Fufu, estou esperando, viu?"
