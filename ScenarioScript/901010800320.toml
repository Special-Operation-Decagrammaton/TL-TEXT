[translation]
901010800320-8 = "Sensei? O que o senhor faz acordado a essa hora?"
901010800320-9 = "[s1] \"Vi a luz do QG acesa.\"\n[s2] \"Vocês ainda não foram dormir?\""
901010800320-12 = "Sim. Hoje temos operação noturna."
901010800320-13 = "Estava tentando organizar os dados da investigação antes de dormir..."
901010800320-14 = "Desculpa, acabei preocupando vocês."
901010800320-15 = "[s3] \"Imagina, eu também estava fazendo hora extra.\"\n[s4] \"É que eu ainda não terminei o trabalho da tarde, sabe...\""
901010800320-18 = "Sensei, o senhor está bem?"
901010800320-19 = "Aqui a gente se reveza para dormir, mas o senhor tem descansado direito?"
901010800320-20 = "[s] \"Tudo bem! Estou tomando uns suplementos!\""
901010800320-21 = "Não, isso me preocupa mais ainda..."
901010800320-28 = "Então, para o Sensei conseguir dormir mais cedo, vou ser breve no relatório."