[translation]#[Texto Final. - Filipe 05/07.]
901010800320-8 = "Sensei? A essa hora……?"
901010800320-9 = "[s1] \"Vi a luz do QG acesa.\"\n[s2] \"Vocês ainda não foram dormir?\""
901010800320-12 = "Sim, hoje foi dia de operação noturna."
901010800320-13 = "Estava organizando os dados da investigação antes de dormir……"
901010800320-14 = "Desculpa, não queria te preocupar."
901010800320-15 = "[s3] \"Que nada, eu também tô fazendo hora extra.\"\n[s4] \"Fiquei com a conversa da tarde na cabeça e ainda não terminei o serviço……\""
901010800320-18 = "Sensei, você tá bem?"
901010800320-19 = "Aqui a gente se reveza pra dormir, mas você tá descansando direito?"
901010800320-20 = "[s] \"Tranquilo! Eu tomo suplemento!\""
901010800320-21 = "Não, isso só me preocupa mais……"
901010800320-28 = "Então, para o Sensei dormir cedo, vamos fazer o relatório rápido."