[translation]
1011602-1 = "新しいアルバイト"
1011602-2 = "（しばらくすると、サオリが大きなバッグを持ってシャーレに来た）"
1011602-9 = "時間を作ってくれて感謝する、先生。"
1011602-10 = "なぜ連絡したかと言うと――"
1011602-11 = "いや、見せた方が早いな。"
1011602-12 = "少し席を外してもらえないだろうか。"
1011602-13 = "準備が必要でな。"
1011602-14 = "[s1] \"了解！\"\n[s2] \"なんだか楽しみ！\""
1011602-17 = "それでは、終わったらまた声を掛ける。"
1011602-23 = "くっ……以前よりもきついな。"
1011602-27 = "まさか、また大きく……？#nこれは想定外だ……。"
1011602-28 = "[ns3] \"あ、あのー、サオリさん？\"\n[ns4] \"一体何を……？\""
1011602-31 = "まっ、まだだ……！"
1011602-32 = "もう少しそこで待っていてくれ！"
1011602-36 = "（しばらくして……）"
1011602-40 = "……待たせたな。#n入ってもらって構わない。"
1011602-43 = "……。"
1011602-44 = "[ns] \"んん……？\""
1011602-45 = "……先生、その顔はどうしたんだ？"
1011602-46 = "何かおかしいところでも……？"
1011602-47 = "[s5] \"ドレス！？\"\n[s6] \"ほ、本当にサオリなの！？\""
1011602-50 = "わ、私だ！！"
1011602-51 = "やはり、私には似合わないだろうか……。"
1011602-52 = "時間をとらせてすまなかった。この件は忘れてくれ……。"
1011602-56 = "[ns] \"ご、ごめん！ビックリしちゃって……とっても似合ってるよ！\""
1011602-60 = "そ、そうか……ありがとう。"
1011602-61 = "先に説明すればよかったな。"
1011602-62 = "実は、時給の良いアルバイトをすることになってな。"
1011602-63 = "ドレスを着て撮影を行うというものだ。#nあとで雑誌に載るのだとか。"
1011602-64 = "[s7] \"おお、モデルの仕事だね！\"\n[s8] \"本格的なやつだ！\""
1011602-67 = "ああ。しかし、準備がこちらに一任されていてな。"
1011602-68 = "ドレスは事前に渡されたものの……。"
1011602-69 = "ほかのことがさっぱり分からなくてな。"
1011602-70 = "[s9] \"それにしては……。\"\n[s10] \"綺麗に着こなしてるね。プロがやったみたい！\""
1011602-76 = "こ、これはたまたま上手くいっただけで……！"
1011602-77 = "とにかく……モデルについて、撮影時にポーズを取ることくらいしか知らないんだ。"
1011602-78 = "だから、先生に色々聞きたくて……。"
1011602-82 = "モデルとは、一体どういうポーズを取るのだろうか？"
1011602-83 = "[s11] \"うーん、普通はポーズ指定が入るけど……。\"\n[s12] \"ないなら今の自然体がサオリらしいんじゃない？\""
1011602-86 = "そ、そうか……？#n私らしい、とは……？"
1011602-87 = "強くて気高さを感じさせるが、どこか抜けているような……？"
1011602-88 = "ふ、普段の私はそう映っていたのか……！？"
1011602-89 = "[s13] \"悩みすぎなくていいよ！\"\n[s14] \"いつものサオリを出していこう！\""
1011602-92 = "いつもの自分……。"
1011602-93 = "……そうか。緊張せずに自然体で、ということだな。"
1011602-94 = "では……歩き方は、こういう感じだろうか。"
1011602-105 = "そして、背筋を伸ばして胸を張れば……どうだ？自信を感じられるだろうか。"
1011602-109 = "先生？その表情はどういう……。"
1011602-110 = "……やはり変か。私なりに考えてみたんだが。"
1011602-111 = "[ns] \"……写真撮ってもいいかな？\""
1011602-115 = "だっ、ダメだ！"
1011602-116 = "[s] \"ほかのみんなには見せないから！\""
1011602-117 = "なおさらダメだ！"
1011602-118 = "先生の手元に残るのなら、もう少しちゃんと……！"
1011602-119 = "……あっ。"
1011602-120 = "[s] \"今の表情、すごくよかったよ！\""
1011602-121 = "……な、何が良いというんだ？"
1011602-122 = "とにかく、まだダメだ。"
1011602-123 = "もう少し慣れてきたら、写真を送ろう。"
1011602-124 = "[s15] \"貰えるんだ！？嬉しい！\"\n[s16] \"じゃあ、私も頑張ってポーズを考えるね！\""
1011602-127 = "……先生には敵わないな。"
1011602-133 = "いいだろう、望むところだ！覚悟はできている！"
1011602-134 = "[ns] \"覚悟してねサオリ！私の指導は厳しいよ！\""
1011602-136 = "（その後、サオリとポーズの研究に勤しんだ）"
