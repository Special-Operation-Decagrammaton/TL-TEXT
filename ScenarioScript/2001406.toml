[translation]
2001406-1 = "Preparado"
2001406-2 = "Parque dos Coelhinhos - Montanha dos Fundos"
2001406-3 = "（Ao chegar na encosta da montanha, havia de fato alguns equipamentos de acampamento e suprimentos descartados ali）"
2001406-4 = "Hehe, isso não é nada mal..."
2001406-5 = "Uma capa de chuva, munição de rifle 7.62mm..."
2001406-6 = "Nesse estado, ainda dá para usar perfeitamente, e vai dar para economizar bastante coisa."
2001406-7 = "...Aliás, o que você está fazendo parado aí, Sensei?"
2001406-8 = "Se você se perder por aqui, vai ser um problemão."
2001406-9 = "Eu não quero que aconteça a mesma coisa que da última vez..."
2001406-10 = "[s] \"Não foi a Saki que se perdeu da última vez...?\""
2001406-11 = "C-cala a boca! Não fique trazendo isso à tona!"
2001406-12 = "Além disso, depois daquilo, eu revisei as técnicas de leitura de mapas e entendi a geografia da área."
2001406-13 = "E acima de tudo, eu tenho meu celular, então posso usar o GPS! Não tem como eu me perder desse jeito!"
2001406-14 = "...Bom, deixando isso de lado, nunca se sabe o que pode acontecer na montanha. Vamos voltar logo antes que escureça."
2001406-19 = "[ns] \"...\""
2001406-20 = "...Sensei?"
2001406-21 = "Você não está andando de um jeito estranho?"
2001406-22 = "Por acaso, você se machucou ou algo assim...?"
2001406-23 = "[s1] \"Não sei, meu ombro está um pouco...\"\n[s2] \"Talvez seja a alça da mochila apertando...\""
2001406-28 = "...Sente-se ali por um momento."
2001406-29 = "Tire a mochila e a jaqueta também."
2001406-30 = "[s3] \"Ei, tirar aqui...?\"\n[s4] \"Que vergonha...\""
2001406-31 = "Não é hora de hesitar!"
2001406-32 = "Não é hora de ficar com vergonha, idiota!"
2001406-37 = "...Entendi, uma bolha."
2001406-38 = "O Sensei não tem muita experiência em subir montanhas carregando bagagem pesada, né."
2001406-39 = "Quando se usa roupas com tecido fino assim, o peso da carga é sentido diretamente. É por isso que surgem bolhas ou lacerações na pele."
2001406-40 = "E olha que eu avisei para \"usar roupas adequadas\"..."
2001406-41 = "[s] \"É que estava meio quente...\""
2001406-42 = "É o contrário, idiota. É justamente nos dias quentes, quando a pele fica mais sensível, que você precisa tomar essas precauções."
2001406-43 = "Isso é algo que está escrito claramente nos manuais de instrução..."
2001406-44 = "...Você não tem alguma roupa para colocar por cima?"
2001406-45 = "Ou então, diminuir o peso da carga..."
2001406-46 = "[s5] \"Está tudo bem, não se preocupe.\"\n[s6] \"Já me sinto melhor depois de descansar um pouco.\""
2001406-47 = "Ah, tratando-se do Sensei, eu deveria ter preparado várias coisas..."
2001406-48 = "Ah, tratando-se do Sensei, eu deveria ter preparado várias coisas..."
2001406-49 = "Não tem jeito..."
2001406-53 = "Aqui, pegue isso."
2001406-54 = "É um \"acolchoado\" para absorver o impacto. Se você colocar na alça da mochila, acho que vai ficar bem mais confortável."
2001406-55 = "[s] \"Isso não é o que a Saki estava usando até agora...?\""
2001406-56 = "B-bem, é sim, mas...!"
2001406-57 = "Eu não tenho reserva, mas é melhor do que não usar nada..."
2001406-58 = "De qualquer forma, eu já estou acostumada com o treinamento da SRT, então não precisa se preocupar comigo."
2001406-59 = "[s] \"...Obrigado, então vou aceitar sua gentileza.\""
2001406-63 = "[ns] Observa atentamente o acolchoado recebido."
2001406-65 = "Ei, o que você está...!"
2001406-66 = "Você, não me diga que está cheirando isso!?"
2001406-67 = "É por isso que eu não queria dar, eu sabia que estava suado...!"
2001406-68 = "Devolve logo!!"
2001406-69 = "[s] \"Mas eu ainda nem fiz nada...!\""
2001406-73 = "Ei, não fuja! Eu disse para devolver!!"
2001406-75 = "（Graças ao tablet que a Saki acabou me entregando, conseguimos descer a montanha em segurança, mas...）"
2001406-79 = "（Mais tarde, quando a Saki me alcançou, levei um soco bem forte dela.）"
