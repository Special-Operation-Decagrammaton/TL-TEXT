[translation]
2001406-1 = "準備OK"
2001406-2 = "子ウサギ公園・裏山"
2001406-3 = "（山の中腹あたりに行くと、そこには確かに幾つかのキャンプ用品や物資が捨てられていた）"
2001406-4 = "ふふっ、これは中々悪くないな……。"
2001406-5 = "レインコートに、7.62mmライフル弾……"
2001406-6 = "これくらいの状態なら十分使えそうだし、色々と節約できそうだ。"
2001406-7 = "……ところで、先生はいつまでもそこで何してるんだ？"
2001406-8 = "こんなところで迷子になったら、大変なことになるぞ。"
2001406-9 = "もう前みたいなことになりたくないし……"
2001406-10 = "[s] \"この間道に迷ったのはサキだったような……？\""
2001406-11 = "う、うるさい！話を蒸し返すな！"
2001406-12 = "それにあの後読図法も復習したし、周りの地理も把握してきた。"
2001406-13 = "それに何より、スマホがあるからGPS機能が使える！この状態で道に迷うはずが無い！"
2001406-14 = "……まあそれはともかく、山は何が起きるか分からない。日が暮れる前に早く戻ろう。"
2001406-19 = "[ns] \"……。\""
2001406-20 = "……先生？"
2001406-21 = "何か変な歩き方してないか？"
2001406-22 = "もしかして、怪我でもしてるとか……？"
2001406-23 = "[s1] \"何だろう、肩がちょっと……。\"\n[s2] \"カバンの紐が食い込むからかな……。\""
2001406-28 = "……そこに一旦座れ。"
2001406-29 = "カバンも降ろして、上着を脱いで。"
2001406-30 = "[s3] \"え、ここで脱ぐの……？\"\n[s4] \"恥ずかしい……。\""
2001406-31 = "躊躇ってる場合か！"
2001406-32 = "恥ずかしがってる場合か、バカ！"
2001406-37 = "……なるほど、水ぶくれか。"
2001406-38 = "先生は、こうして重い荷物を背負いながらの登山は経験が少ないんだな。"
2001406-39 = "こういう生地が薄い服を着てると、荷物の重さが直に伝わる。それで水ぶくれになったり、皮膚に裂傷が生まれやすい。"
2001406-40 = "だから「しっかりした服装で」って言ったのに……。"
2001406-41 = "[s] \"何だか暑くて……。\""
2001406-42 = "逆だバカ。肌が柔らかくなる暑い日こそ、そういった対策はちゃんとしないといけないんだ。"
2001406-43 = "これくらい教範によく書いてることだっての……。"
2001406-44 = "……何か重ね着できる服とかは？"
2001406-45 = "それか、荷物を減らすか……。"
2001406-46 = "[s5] \"大丈夫、気にしないで。\"\n[s6] \"少し休んだら楽になったから。\""
2001406-47 = "はぁ、先生のことだし色々用意するべきだったか……"
2001406-48 = "はぁ、先生のことだし色々用意するべきだったか……"
2001406-49 = "仕方ない……。"
2001406-53 = "はい、これ。"
2001406-54 = "衝撃を吸収するための「パッド」。カバンの紐部分に当てれば、だいぶ楽になると思う。"
2001406-55 = "[s] \"これサキが今まで付けてたやつじゃ……？\""
2001406-56 = "そ、そうだけど……!"
2001406-57 = "予備とかは無いし、使わないよりマシだろうし……"
2001406-58 = "どうせ私はSRTの訓練で慣れてるから、別に気にしなくて良い。"
2001406-59 = "[s] \"……ありがとう、じゃあお言葉に甘えて。\""
2001406-63 = "[ns] 受け取ったパッドをまじまじと見つめる。"
2001406-65 = "ちょっ、何を……！"
2001406-66 = "お前っ、まさか匂い嗅いでないだろうな！？"
2001406-67 = "だから嫌だったんだ、汗かいたって分かってたのに……！"
2001406-68 = "やっぱり返せ！！"
2001406-69 = "[s] \"まだ冤罪なのに……！\""
2001406-73 = "ちょっ、逃げるな！返せって！！"
2001406-75 = "（最終的にサキが渡してくれたパッドのおかげで、無事下山することはできたものの……）"
2001406-79 = "（後で追いつかれたサキに、かなり強めのグーで殴られた）"
