[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
2001406-1 = "Preparativos Concluídos" 
2001406-2 = "Parque dos Coelhinhos - Montanha Atrás" 
2001406-3 = "（Caminhando até a metade da montanha, de fato, havia alguns equipamentos de acampamento e suprimentos abandonados por lá.）" 
2001406-4 = "Fufu, até que isso aqui não é nada mau..." 
2001406-5 = "Capas de chuva, munição 7.62mm para rifles..." 
2001406-6 = "Considerando o estado em que estão, dá pra usar de boa e vai nos ajudar a economizar bastante." 
2001406-7 = "......Falando nisso, o que você tá fazendo parado aí, Sensei?" 
2001406-8 = "Se você se perder num lugar como esse, vai dar uma baita dor de cabeça." 
2001406-9 = "Eu não quero que aconteça a mesma coisa da última vez..." 
2001406-10 = "[s] \"Mas quem se perdeu da última vez foi você, Saki...?\"" 
2001406-11 = "C-Cala a boca! Não vem reviver o passado!" 
2001406-12 = "E depois daquilo eu revisei as minhas leituras de mapas e memorizei a geografia local." 
2001406-13 = "E acima de tudo, eu tenho um celular com GPS! Não existe a menor chance de nos perdermos agora!" 
2001406-14 = "......Enfim, nunca se sabe o que pode acontecer na montanha. Vamos voltar antes que anoiteça." 
2001406-19 = "[ns] \"......\"" 
2001406-20 = "......Sensei?" 
2001406-21 = "Você não tá andando meio esquisito?" 
2001406-22 = "Por acaso, se machucou em algum lugar...?" 
2001406-23 = "[s1] \"Não sei, o meu ombro tá doendo um pouco...\"\n[s2] \"Acho que a alça da mochila tá machucando a pele...\"" 
2001406-28 = "......Senta aqui um pouco." 
2001406-29 = "Solta a mochila e tira o seu casaco." 
2001406-30 = "[s3] \"E-Espera, tirar a roupa aqui...?\"\n[s4] \"É meio vergonhoso...\"" 
2001406-31 = "Não é hora pra hesitar!" 
2001406-32 = "Não é hora pra ter vergonha também, idiota!" 
2001406-37 = "......Como imaginei, uma bolha." 
2001406-38 = "Isso acontece porque você não tem experiência em fazer trilhas carregando bagagem pesada." 
2001406-39 = "Se você usar roupas de tecido fino assim, o peso da mochila vai direto para a pele. Isso cria bolhas ou até lacerações num instante." 
2001406-40 = "Foi exatamente por isso que eu disse pra você 'vir com uma roupa adequada'..." 
2001406-41 = "[s] \"É que hoje tava muito quente...\"" 
2001406-42 = "É justamente o contrário, imbecil. Em dias quentes, a sua pele fica mais macia e frágil, e é aí que você precisa tomar essas precauções direito." 
2001406-43 = "Isso é o básico do básico que tá escrito em qualquer manual de operações..." 
2001406-44 = "......Tem alguma outra roupa que você possa vestir por cima?" 
2001406-45 = "Ou podemos reduzir o peso da sua bagagem..." 
2001406-46 = "[s5] \"Tá tudo bem, não precisa se preocupar.\"\n[s6] \"Fiquei melhor depois de descansar um pouquinho.\"" 
2001406-47 = "Haa... Sabendo como o Sensei é, eu deveria ter me preparado melhor..." 
2001406-48 = "Haa... Sabendo como o Sensei é, eu deveria ter me preparado melhor..." 
2001406-49 = "Não tem outro jeito..." 
2001406-53 = "Aqui, toma." 
2001406-54 = "É um 'Pad' (protetor) pra absorver impacto. Se você colocar nas alças da mochila, vai ficar muito mais confortável." 
2001406-55 = "[s] \"Mas não eram os protetores que você mesma tava usando agora a pouco...?\"" 
2001406-56 = "E-Era sim, mas...!" 
2001406-57 = "Eu não tenho um extra e é melhor do que não usar nada..." 
2001406-58 = "De qualquer forma, eu tô mais do que acostumada com isso pelo treinamento da SRT, não se preocupe comigo." 
2001406-59 = "[s] \"......Muito obrigado, vou aceitar de bom grado.\"" 
2001406-63 = "[ns] Fiquei encarando os protetores de ombro que recebi bem de perto." 
2001406-65 = "E-Ei, o que você tá...!" 
2001406-66 = "Você... por acaso você não tá cheirando isso, tá!?" 
2001406-67 = "Foi por isso que eu não queria te dar, eu sabia que tava suado...!" 
2001406-68 = "Ah, quer saber!? Me devolve isso!!" 
2001406-69 = "[s] \"Eu nem fiz nada, você tá me acusando injustamente...!\"" 
2001406-73 = "Ei, não foge! Me devolve isso agora!!" 
2001406-75 = "（No final das contas, graças aos protetores de ombro que a Saki me emprestou, consegui descer a montanha em segurança, mas...）" 
2001406-79 = "（A Saki me alcançou depois e me deu um soco bem forte na cara.）" 