[translation]
2601402-1 = "休むなら心のタガを外して"
2601402-2 = "作戦エリアを俯瞰的にカバーするなら……。"
2601402-3 = "こっちか……いや、反対のほうが……。"
2601402-4 = "[s] \"カリン。\""
2601402-5 = "ああ、先生。"
2601402-6 = "来ていたんだな。#n気がつかず、すまない。"
2601402-7 = "ああ、これか？"
2601402-8 = "使い勝手の良さそうな狙撃ポイントを見つけたから、メモを取っていたんだ。"
2601402-9 = "いや、任務中というわけではない。#nこれは習慣みたいなものだ。"
2601402-10 = "[s] \"今日はお休みなんだよね？\""
2601402-11 = "そ、それはそうだが……。"
2601402-12 = "[s1] \"ちゃんと休むことも任務のうちだよ。\"\n[s2] \"メモ帳は没収。\""
2601402-15 = "ああっ……！"
2601402-16 = "……でも、そうだな。#n……分かった。今日は任務と関係ないことをするとしよう。"
2601402-17 = "……えっと。"
2601402-18 = "……何をすればいいんだ？"
2601402-19 = "[s] \"いつも任務の後は何してるの？\""
2601402-20 = "後片付けや、次の任務の準備をしている。"
2601402-21 = "あとは、バイトをしたり……。"
2601402-22 = "[s] \"じゃあ、趣味に没頭してみるとか？\""
2601402-23 = "趣味か……掃除だな。"
2601402-24 = "……ただ、C&Cの任務の一環として、普段からも掃除をしている。"
2601402-25 = "結局普段と同じことをしているなら、休みとは言えないかもしれないな……。"
2601402-26 = "[s] \"今日は息抜きの日とします！\""
2601402-30 = "[ns] \"適度にガス抜きしないと、疲れが溜まっちゃうよ！\""
2601402-31 = "……そ、そうなのか？"
2601402-32 = "別に、疲れは感じていないが……。"
2601402-33 = "え？気が付かないうちに、溜まっているもの……？"
2601402-34 = "蓄積した疲労を放置しすぎると、いざという時、#n力を十分に発揮できなくなる……かもしれない……か。"
2601402-35 = "任務に支障をきたすのはよくないな……。"
2601402-36 = "……分かった。先生の言うとおりにしてみよう。"
2601402-37 = "ただ、休み方については、先生に教えてもらいたい。"
2601402-38 = "[s] \"任せて！まずは……。\""
2601402-42 = "[ns] \"美味しいものを食べに行こう！\""
2601402-45 = "お祭りか……任務ならまだしも、#n自分から積極的に参加したことは無かったな……。"
2601402-46 = "これまで、あまり縁がなかった場だ。"
2601402-47 = "ここで食事をするのか？"
2601402-48 = "[s] \"カリンにはぜひ、屋台料理を味わってほしくて。\""
2601402-52 = "[ns] \"気になるものがあったら、なんでも言って！\""
2601402-53 = "分かった。じゃあ、一緒に周ってくれるか？"
2601402-55 = "おいしい串焼き～いかがですか～"
2601402-56 = "揚げたてのアメリカンドッグ～焼きそばもありますよ～"
2601402-57 = "串焼き、アメリカンドッグ、焼きそば……どれもおいしそうだ。"
2601402-58 = "……よし、決めた。あの串焼きにしよう。"
2601402-59 = "すみません。串焼きを二本、お願いします。"
2601402-60 = "あい！毎度あり！"
2601402-61 = "……はい、こっちは先生の分だ。"
2601402-62 = "[s] \"へたっぴ……”"
2601402-63 = "え？"
2601402-67 = "[ns] \"カリンは……欲望の解放のさせ方が下手……！\""
2601402-68 = "えっ！？"
2601402-69 = "いきなり、何を……？"
2601402-70 = "[s] \"全部二つずつください！\""
2601402-71 = "あいよ！"
2601402-72 = "ありがとうございま～す！"
2601402-73 = "か、買いすぎじゃないのか……？"
2601402-74 = "いや、いらないわけではない。気になっていたのは事実だが……。"
2601402-75 = "全部、食べても……いいのか……？"
2601402-76 = "分かった……先生がそう言うのなら。"
2601402-77 = "あそこのベンチで食べよう。"
2601402-79 = "おいしい……ほら、先生も串焼きを食べてみてくれ。"
2601402-80 = "うん……焼きそばも、悪くない……。"
2601402-81 = "食べたいものを我慢しちゃダメ。本当にその通りだな。"
2601402-82 = "[s] \"まだまだ、アメリカンドッグもあるよ。\""
2601402-83 = "ああ。"
2601402-84 = "……こっちもおいしい。"
2601402-85 = "[s] \"よかった！じゃあ……\""
2601402-89 = "あっ！先生！危なっ――！"
2601402-94 = "キャッ……ッチ！"
2601402-95 = "[s] \"ナイス、カリン！\""
2601402-96 = "でも、えっと、これ……どうしよう……。"
2601402-99 = "[wa:400]― [log=카린 교복]……あっ！[wa:670]先生！[wa:900]ま、[wa:500]待ってくれ！[/log]"
2601402-100 = "[wa:2300]― [log=카린 교복]このまま渡すのは、[wa:1150]ちょっと……！[/log]"
2601402-103 = "[wa:500]― [log=카린 교복]その、[wa:2000]私が[wa:650]脚で挟んでしまったもの、[wa:1850]だから……[/log]"
2601402-104 = "[wa:2800]― [log=카린 교복]これは[wa:400]私が食べるから、[wa:1450]先生は[wa:700]こっちを……！[/log]"
2601402-107 = "[wa:1650]― [log=카린 교복]……あ。[/log]"
2601402-108 = "[wa:1400]― [log=카린 교복]これは[wa:900]私の[wa:700]食べかけ……[/log]"
2601402-111 = "[wa:550]― [log=카린 교복]ち、[wa:400]違う！[wa:900]そういう意味じゃ[wa:700]なくて……！[/log]"
2601402-114 = "― [log=카린 교복]やっぱ[wa:400]こっちの……[/log]"
2601402-115 = "[wa:1000]― [log=카린 교복]……！[wa:1500]では、[wa:300]なくて！[/log]"
2601402-118 = "[ns3] \"お、落ち着いて、カリン！\"\n[ns4] \"大丈夫。どっちでも、私は気にしないから\""
2601402-119 = "[wa:830]― [log=카린 교복]本当に、[wa:700]そんな[wa:750]つもりは……！[/log]"
2601402-120 = "[wa:830]― [log=카린 교복]本当に、[wa:700]そんな[wa:750]つもりは……！[/log]"
2601402-123 = "― [log=카린 교복]ど、[wa:1450]どちらを渡しても……[wa:2600]うう……[/log]"
2601402-124 = "[wa:1900]― [log=카린 교복]わ、[wa:1600]私は[wa:900]どうすれば……！[/log]"
2601402-127 = "（なんとかカリンを落ち着かせて、一緒にアメリカンドッグを食べた……）"
2601402-129 = "……もう大丈夫。"
2601402-130 = "アメリカンドッグ、おいしかった。"
2601402-131 = "[s] \"……うん、おいしかったね。\""
2601402-132 = "うう……変な間を置かれると、なんか気になるな。"
2601402-133 = "とにかく、今日はありがとう。"
2601402-134 = "おかげで休日を楽しむことができた。#n一人なら、こうはいかなかっただろうな。"
2601402-135 = "……もしよかったら、また教えてもらえると嬉しい。"
