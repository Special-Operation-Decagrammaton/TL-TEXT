[translation]
2601402-1 = "Se for descansar, relaxe a mente."
2601402-2 = "Se eu cobrir a área da missão de uma perspectiva panorâmica..."
2601402-3 = "Por aqui... não, talvez do lado oposto..."
2601402-4 = "[s] \"Karin.\""
2601402-5 = "Ah, Sensei."
2601402-6 = "Você veio. #nDesculpe, não percebi sua presença."
2601402-7 = "Ah, isso? "
2601402-8 = "Encontrei um ponto de sniper que parece ser bem útil, então estava fazendo algumas anotações."
2601402-9 = "Não, não estou em missão. #nIsso é quase um hábito."
2601402-10 = "[s] \"Hoje é seu dia de folga, não é?\""
2601402-11 = "B-bem, é verdade, mas..."
2601402-12 = "[s1] \"Descansar também faz parte da missão.\"\n[s2] \"Confiscando o bloco de notas.\""
2601402-15 = "Ah...!"
2601402-16 = "......Mas, você tem razão. #nEntendido. Vamos fazer algo que não tenha relação com missões hoje."
2601402-17 = "......Bem."
2601402-18 = "......O que eu deveria fazer?"
2601402-19 = "[s] \"O que você costuma fazer depois das missões?\""
2601402-20 = "Faço a limpeza e preparo a próxima missão."
2601402-21 = "Além disso, faço alguns bicos..."
2601402-22 = "[s] \"Então, que tal se dedicar a um hobby?\""
2601402-23 = "Hobby... seria limpeza."
2601402-24 = "......Só que, como parte das missões da C&C, eu já limpo normalmente."
2601402-25 = "Se no fim das contas estou fazendo a mesma coisa de sempre, talvez não possa chamar isso de descanso..."
2601402-26 = "[s] \"Hoje será um dia de relaxar!\""
2601402-30 = "[ns] \"Se você não aliviar a tensão de vez em quando, o cansaço vai se acumular!\""
2601402-31 = "......É, é mesmo?"
2601402-32 = "Eu não sinto que estou cansada, mas..."
2601402-33 = "Hã? O cansaço se acumula sem a gente perceber...?"
2601402-34 = "Se eu deixar o cansaço acumulado de lado, na hora H, #npode ser que eu não consiga usar todo o meu potencial... talvez..."
2601402-35 = "Não seria bom atrapalhar a missão..."
2601402-36 = "......Entendido. Vou fazer como você diz, Sensei."
2601402-37 = "Mas, sobre como descansar, eu gostaria que você me ensinasse."
2601402-38 = "[s] \"Deixa comigo! Primeiro...\""
2601402-42 = "[ns] \"Vamos comer algo gostoso!\""
2601402-45 = "Um festival... mesmo que fosse uma missão, #neu nunca participei ativamente de algo assim por conta própria..."
2601402-46 = "Até hoje, nunca tive muito contato com lugares assim."
2601402-47 = "Vamos comer aqui?"
2601402-48 = "[s] \"Eu queria muito que você experimentasse a comida das barracas, Karin.\""
2601402-52 = "[ns] \"Se vir algo que te interesse, é só falar!\""
2601402-53 = "Entendido. Então, você pode dar uma volta comigo?"
2601402-55 = "Espetinhos deliciosos~ quem vai querer~"
2601402-56 = "Hot dog frito na hora~ também temos yakisoba~"
2601402-57 = "Espetinho, hot dog, yakisoba... tudo parece delicioso."
2601402-58 = "......Certo, decidi. Vou querer aquele espetinho."
2601402-59 = "Com licença. Dois espetinhos, por favor."
2601402-60 = "Pois não! Obrigado pela preferência!"
2601402-61 = "......Aqui, este é o seu, Sensei."
2601402-62 = "[s] \"Que desajeitada...\""
2601402-63 = "Hã?"
2601402-67 = "[ns] \"Karin... você não sabe como liberar seus desejos...!\""
2601402-68 = "Hã!?"
2601402-69 = "De repente, o que você está..."
2601402-70 = "[s] \"Por favor, me dê dois de tudo!\""
2601402-71 = "Pode deixar!"
2601402-72 = "Muito obrigado!"
2601402-73 = "N-não é comida demais...?"
2601402-74 = "Não, não é que eu não queira. É verdade que eu estava curiosa, mas..."
2601402-75 = "Posso... realmente comer tudo isso...?"
2601402-76 = "Entendido... se você diz, Sensei."
2601402-77 = "Vamos comer naquele banco ali."
2601402-79 = "Está delicioso... aqui, Sensei, experimente o espetinho também."
2601402-80 = "Sim... o yakisoba também não é ruim..."
2601402-81 = "Não devemos nos privar do que queremos comer. Você tem toda razão."
2601402-82 = "[s] \"Ainda tem o cachorro-quente também.\""
2601402-83 = "Ah."
2601402-84 = "...Este também está gostoso."
2601402-85 = "[s] \"Que bom! Então...\""
2601402-89 = "Ah! Sensei! Cuidado—!"
2601402-94 = "Pega...ei!"
2601402-95 = "[s] \"Boa, Karin!\""
2601402-96 = "Mas, bem, isso... o que eu faço agora..."
2601402-99 = "[wa:400]― [log=카린 교복]...Ah! [wa:670]Sensei! [wa:900]E- [wa:500]espere![/log]"
2601402-100 = "[wa:2300]― [log=카린 교복]Te entregar assim, [wa:1150]é um pouco...![/log]"
2601402-103 = "[wa:500]― [log=카린 교복]É que, [wa:2000]eu [wa:650]acabei segurando com as pernas, [wa:1850]então...[/log]"
2601402-104 = "[wa:2800]― [log=카린 교복]Isso [wa:400]eu vou comer, [wa:1450]então Sensei, [wa:700]fique com este...![/log]"
2601402-107 = "[wa:1650]― [log=카린 교복]...Ah.[/log]"
2601402-108 = "[wa:1400]― [log=카린 교복]Este [wa:900]eu já [wa:700]tinha mordido...[/log]"
2601402-111 = "[wa:550]― [log=카린 교복]N- [wa:400]não! [wa:900]Não foi isso [wa:700]que eu quis dizer...![/log]"
2601402-114 = "― [log=카린 교복]Na verdade [wa:400]este aqui...[/log]"
2601402-115 = "[wa:1000]― [log=카린 교복]...! [wa:1500]Não, [wa:300]não é isso![/log]"
2601402-118 = "[ns3] \"Calma, Karin!\"\n[ns4] \"Está tudo bem. Eu não me importo com qual seja.\""
2601402-119 = "[wa:830]― [log=카린 교복]Sério, [wa:700]eu não [wa:750]tive essa intenção...![/log]"
2601402-120 = "[wa:830]― [log=카린 교복]Sério, [wa:700]eu não [wa:750]tive essa intenção...![/log]"
2601402-123 = "― [log=카린 교복]Q- [wa:1450]qualquer um que eu te entregar... [wa:2600]uuu...[/log]"
2601402-124 = "[wa:1900]― [log=카린 교복]O- [wa:1600]o que [wa:900]eu devo fazer...![/log]"
2601402-127 = "(Consegui acalmar a Karin de alguma forma e comemos o cachorro-quente juntos...)"
2601402-129 = "...Já estou bem."
2601402-130 = "O cachorro-quente estava gostoso."
2601402-131 = "[s] \"...Sim, estava mesmo.\""
2601402-132 = "Uuu... esse silêncio estranho me deixa um pouco inquieta."
2601402-133 = "De qualquer forma, obrigada pelo dia de hoje."
2601402-134 = "Graças a você, pude aproveitar meu dia de folga. #nSe estivesse sozinha, não teria sido assim."
2601402-135 = "...Se não se importar, ficaria feliz se pudesse me ensinar mais coisas no futuro."
