[translation]
1001906-1 = "Tiro ao alvo"
1001906-2 = "Sensei, aqui. Que bom que conseguiu chegar sem se perder."
1001906-3 = "[s] \"……Onde estamos?\""
1001906-4 = "Como pode ver, é um estande de tiro."
1001906-5 = "Então, aqueles números que você enviou antes eram……"
1001906-11 = "（Azusa tirou algumas folhas de papel e as mostrou）"
1001906-12 = "（Eram papéis com alvos impressos, cheios de furos de bala）"
1001906-13 = "[s1] \"Eram registros de pontuação, não é?\"\n[s2] \"Isso não é um nível de habilidade impressionante……?\""
1001906-14 = "Hehe."
1001906-15 = "Hehe."
1001906-16 = "……Ehem. Bem, mesmo que você me elogie, não fico tão feliz assim. Para mim, isso é o básico."
1001906-17 = "……Hm? Quer saber por que estou praticando tiro sozinha em um lugar desses?"
1001906-18 = "……Não importa o quanto eu me acostume com a vida aqui, não consigo simplesmente esquecer tudo."
1001906-19 = "A paz pode ser quebrada facilmente a qualquer momento. Por isso, é preciso estar preparada."
1001906-20 = "Além disso……"
1001906-21 = "Esta instalação não é nada mal…… é perfeita para treinar."
1001906-22 = "Antes, eu costumava praticar debaixo da ponte de ferro do rio. Comparado àquela época, é uma diferença enorme."
1001906-23 = "……Mas, falando nisso, parece que as alunas daqui não praticam muito. Quase não tem ninguém."
1001906-24 = "……Não é ruim viver em paz. Mas se acomodar demais com a paz é perigoso."
1001906-25 = "Desculpe, falei demais. Falta pouco para terminar esta série, então espere só um pouco, Sensei."
1001906-30 = "（O próximo alvo aparece）"
1001906-32 = "（Azusa respirou fundo para se concentrar e, com um movimento fluido, puxou o gatilho）"
1001906-41 = "（……）"
1001906-45 = "……Terminei."
1001906-46 = "O treino de hoje acaba aqui. Vamos voltar, Sensei."
1001906-47 = "[s3] \"Já terminou?\"\n[s4] \"Se quiser ficar mais, eu espero sem problemas.\""
1001906-48 = "……"
1001906-49 = "……"
1001906-50 = "Não, está tudo bem. Não é como se eu quisesse ficar muito tempo aqui."
1001906-51 = "Sinto que meu coração fica um pouco mais leve quando estou aqui, mas……"
1001906-52 = "……Não posso me deixar levar demais por esse sentimento. E, além disso, agora……"
1001906-53 = "Este não é o único lugar onde meu coração encontra paz."
1001906-54 = "E, para ser sincera, o lugar onde fomos juntos da última vez é muito mais divertido."
1001906-55 = "……Sim."
1001906-56 = "……Eu realmente penso assim."
1001906-57 = "Vamos logo, Sensei."
1001906-59 = "（Depois disso, saí do estande de tiro com Azusa e passamos no café da Momo Friends, que ficava ali perto, antes de voltarmos）"
