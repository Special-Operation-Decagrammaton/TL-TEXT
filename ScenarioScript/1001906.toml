[translation]
1001906-1 = "射撃"
1001906-2 = "先生、こっち。よく迷わずに来られたね。"
1001906-3 = "[s] \"……ここは？\""
1001906-4 = "見ての通り、射撃場。"
1001906-5 = "だから、さっき送った数字は……"
1001906-11 = "（アズサは、紙を何枚か取り出して見せてくれた）"
1001906-12 = "（的が印刷された紙で、銃弾の穴がある）"
1001906-13 = "[s1] \"点数の記録だったんだね。\"\n[s2] \"これ、かなりすごい実力なのでは……？\""
1001906-14 = "ふふっ。"
1001906-15 = "ふふっ。"
1001906-16 = "……こほん。まあ、褒められても、そんなに嬉しくないかな。私にとっては当たり前のことだ。"
1001906-17 = "……うん？どうしてこんなところで、一人で射撃の練習をしているのかって？"
1001906-18 = "……私がどれだけここでの生活に慣れ親しもうとも、全てを切り離せるわけじゃない。"
1001906-19 = "平和はいつだって、簡単に壊れる。だから備えは必要。"
1001906-20 = "それに……。"
1001906-21 = "この施設は結構悪くない……訓練にはもってこいだ。"
1001906-22 = "前は、川の鉄橋の下で練習していたから。その時に比べたら全然違う。"
1001906-23 = "……それにしても、ここの生徒たちはあんまり練習しないみたいだね。人がほとんどいない。"
1001906-24 = "……平和なのは悪いことじゃない。けど、平和に堕落するのは危険すぎる。"
1001906-25 = "ごめん、話し過ぎた。1セット終えるまでもう少しだから、ちょっと待ってて。先生。"
1001906-30 = "（次の的が出てくる）"
1001906-32 = "（アズサはゆっくりと呼吸を整えた後、流れるように引き金を引いた）"
1001906-41 = "（……）"
1001906-45 = "……終わり。"
1001906-46 = "これで今日の訓練は終了。帰ろうか、先生。"
1001906-47 = "[s3] \"もういいの？\"\n[s4] \"もっといたいなら、全然待ってるよ。\""
1001906-48 = "……。"
1001906-49 = "……。"
1001906-50 = "ううん、大丈夫。そんなに長居したいわけでもない。"
1001906-51 = "ここにいると、少しだけ心が楽になる気もするけど……"
1001906-52 = "……この気持ちに自分を預けすぎちゃいけない。それと、今はもう……"
1001906-53 = "ここだけが、心休まる場所じゃないから。"
1001906-54 = "それに、この前先生と一緒に行った場所の方が全然楽しい。"
1001906-55 = "……うん。"
1001906-56 = "……そう思うよ、本当に。"
1001906-57 = "早く行こう、先生。"
1001906-59 = "（その後アズサと射撃場を出て、すぐ近所にあったモモフレンズのカフェに立ち寄ってから帰った）"
