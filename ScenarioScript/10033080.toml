[translation]
10033080-1 = "第8話;舞い踊る最中の"
10033080-3 = "ついに来ました、神木祭……！"
10033080-4 = "これは百鬼夜行のお祭りであり、大事な儀式なのデス！"
10033080-5 = "場所はこの大きい桜の木！#n百鬼夜行のどこからでも見える、「ご神木」の下で開かれるんだよ！"
10033080-7 = "ふぁ……#nご神木に、今年一年のことを祈る日……。"
10033080-8 = "元々は、豊作を祈る儀式でした！"
10033080-9 = "今は変わってしまいましたが、#n「本来の神木祭」では各地でお神輿が作られ、#nそれが一斉に神木祭の元へ集まるんです！"
10033080-10 = "そのお神輿が、各地へ幸運を拾い上げてくれると言われていました。"
10033080-11 = "そうして集まったものが、このご神木から百鬼夜行全土へと広がるのです！"
10033080-12 = "こ、今回については、「各地のお神輿」は無い略式なのですが……。"
10033080-13 = "こちらの、全てのお神輿の代表とも言える巨大お神輿はありますので！"
10033080-18 = "そして広場で行う儀式についても、本来の通り行われます！"
10033080-19 = "奉献の巫女役は、もちろんこの方！"
10033080-23 = "ハイ！#n百鬼夜行では右に出る者のいないアイドル！"
10033080-24 = "チセさんデ～ス！"
10033080-25 = "呼んだ～？"
10033080-29 = "おー、あれがお神輿……。"
10033080-30 = "大きいね、上に20人くらいは登れるんじゃない？"
10033080-31 = "実際、お祭りだと人が乗るらしいね。#n楽器を演奏したり、叫んだりするんだとか。"
10033080-32 = "今回は誰も乗らないのかな、残念。"
10033080-36 = "（絶対に、ここで挽回しないと……！）"
10033080-37 = "（神木祭は、今回の修学旅行における最大のイベント……）"
10033080-38 = "（これさえ上手く行けば、良い思い出になるはず）"
10033080-39 = "（ひとまず、案内までは無事に終わったし……）"
10033080-40 = "（最後に打ち上げる花火も、前もって運んでおいたから大丈夫……！）"
10033080-47 = "あれ、なんか白い服の人たちが出てきた。"
10033080-49 = "屋根に上って……何してるんだろ？"
10033080-50 = "さっきの「幸運を運ぶ」っていう箱を取り出すんじゃない？"
10033080-51 = "あぁ、巫女さんが手を出すまで開けちゃダメってやつ？"
10033080-52 = "開けたらどうなるんだろうね、幸運が逃げちゃうのかな。"
10033080-53 = "ドアを開けるたびにつま先をぶつけたり、USBが絶対に一回で刺さらなかったり、電車の扉が目の前で閉まったり？"
10033080-54 = "恐ろしい……！#nなんて場所なんだ、百鬼夜行……！"
10033080-55 = "幸運が逃げる前に燃やすしか！#n焼夷手榴弾、投擲！"
10033080-56 = "こっちに投げるな！？"
10033080-59 = "箱を運ぶ際はこうして白い布で包み、#n手が直接触れないようにします。"
10033080-60 = "舞台まで運んだあとは、音楽を演奏するんです。"
10033080-61 = "これは幸運が逃げてしまわないよう、#n歌に聞き惚れてもらうためだと言われていますね。"
10033080-66 = "歌が必要ねぇ……#nどうする、校歌でも歌う？"
10033080-67 = "あんた、ゲヘナの校歌覚えてるの？"
10033080-68 = "そういえば知らないな……#nえ、そもそもあるっけ？一応あるよね？"
10033080-69 = "知らないなら無いと同じじゃない？"
10033080-71 = "まあ10人中10人が知らないだろうね……#nじゃあ無いってことで。"
10033080-74 = "そろそろ、時間かな……？"
10033080-82 = "……これ、花びら？"
10033080-83 = "ご神木の花びらだ……！"
10033080-87 = "イエス！#n伝承によると百鬼夜行に幸運が訪れる時、#nまるでそれを祝うかのように花びらが舞うと言われていマス！"
10033080-88 = "そのせいか分からないけど、この儀式で箱が到着するとこうなるの！#nすごいでしょ！"
10033080-90 = "お祭り担当のみんな、お疲れ様……。"
10033080-94 = "そしてここで、巫女役のチセ様が登場です！"
10033080-97 = "彼方より　曲がりし道も　此方へ至り"
10033080-101 = "ここはゆっくりと登らねばならないのデス！#nじっくりご覧クダサイ！"
10033080-102 = "ひらりと祓い　ふわりと抱き"
10033080-103 = "また、この歌は儀式の一つ。#n巫女が厄を払い、福を祈るためのものです！"
10033080-104 = "風の道から　花の道　丘を登りて　開かれよ"
10033080-108 = "それで、壇を登り切ると……！#n祭壇に、長い[ruby=しで]紙垂[/ruby]が出てくるの！"
10033080-113 = "へぇ、すご……ん、巫女さんが何か持ってる？#nあれは？"
10033080-114 = "はい、[ruby=ごへい]「御幣」[/ruby]と呼ばれる祭具ですね。#n厄を払い、不浄な気を追い出すと言われています！"
10033080-115 = "あれを振りながら、続けて「舞」が始まり――"
10033080-116 = "そこまでだ！#n偽物の神木祭なんか見てられない！！"
10033080-117 = "！？"
10033080-118 = "何奴！？"
10033080-119 = "えぇっ！！"
10033080-120 = "……。"
