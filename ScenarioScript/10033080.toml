[translation]
10033080-1 = "Episódio 8; No meio da dança"
10033080-3 = "Finalmente chegou, o Festival da Árvore Sagrada...!"
10033080-4 = "Este é o festival de Hyakkiyako, e é um ritual muito importante!"
10033080-5 = "O local é esta grande cerejeira!#nÉ realizado sob a \"Árvore Sagrada\", que pode ser vista de qualquer lugar de Hyakkiyako!"
10033080-7 = "Ah...#nO dia de rezar pela prosperidade do ano na Árvore Sagrada..."
10033080-8 = "Originalmente, era um ritual para pedir por uma boa colheita!"
10033080-9 = "Embora tenha mudado com o tempo,#nno \"Festival da Árvore Sagrada original\", santuários portáteis eram feitos em várias regiões#ne todos eram trazidos juntos para o festival!"
10033080-10 = "Dizia-se que esses santuários portáteis recolhiam a sorte de cada lugar por onde passavam."
10033080-11 = "E o que era reunido assim se espalhava da Árvore Sagrada para todo o território de Hyakkiyako!"
10033080-12 = "B-bem, desta vez, é uma versão simplificada sem os \"santuários portáteis de cada região\"..."
10033080-13 = "Mas temos este santuário gigante, que pode ser considerado o representante de todos eles!"
10033080-18 = "E quanto ao ritual realizado na praça, ele será feito exatamente como manda a tradição!"
10033080-19 = "A responsável por atuar como a sacerdotisa da oferenda é, claro, esta pessoa!"
10033080-23 = "Sim!#nA idol que não tem igual em toda Hyakkiyako!"
10033080-24 = "É a Chise-san!"
10033080-25 = "Me chamou~?"
10033080-29 = "Oh, aquele é o santuário portátil..."
10033080-30 = "É enorme, não caberiam umas 20 pessoas em cima?"
10033080-31 = "Na verdade, parece que as pessoas sobem nele durante o festival.#nDizem que tocam instrumentos ou gritam lá de cima."
10033080-32 = "Será que ninguém vai subir desta vez? Que pena."
10033080-36 = "(Eu preciso me redimir aqui, de qualquer jeito...!)"
10033080-37 = "(O Festival da Árvore Sagrada é o maior evento desta viagem escolar...)"
10033080-38 = "(Se isso der certo, com certeza será uma boa lembrança.)"
10033080-39 = "(Por enquanto, a parte da orientação terminou sem problemas...)"
10033080-40 = "(E os fogos de artifício para o final também já foram transportados, então está tudo bem...!)"
10033080-47 = "Ei, apareceram umas pessoas de roupas brancas."
10033080-49 = "Subiram no telhado... o que será que estão fazendo?"
10033080-50 = "Não vão tirar aquela caixa que \"traz sorte\" que mencionaram antes?"
10033080-51 = "Ah, aquela que não pode ser aberta até a sacerdotisa estender a mão?"
10033080-52 = "O que será que acontece se abrir? A sorte foge?"
10033080-53 = "Tipo, bater o dedinho toda vez que abrir uma porta, o USB nunca entrar de primeira, ou a porta do trem fechar bem na sua cara?"
10033080-54 = "Que horror...!#nQue tipo de lugar é esse, Hyakkiyako...!"
10033080-55 = "Temos que queimar antes que a sorte fuja!#nGranada incendiária, lançar!"
10033080-56 = "Não joga isso aqui!?"
10033080-59 = "Ao transportar a caixa, nós a envolvemos com este pano branco#npara que as mãos não toquem nela diretamente."
10033080-60 = "Depois de levá-la até o palco, tocamos música."
10033080-61 = "Dizem que isso é para que a sorte fique encantada com a música e não fuja."
10033080-66 = "Precisamos de música, hein...#nO que vamos fazer, cantar o hino da escola?"
10033080-67 = "Você sabe o hino da Gehenna?"
10033080-68 = "Pensando bem, não sei...#nUé, a gente tem um? Deve ter, né?"
10033080-69 = "Se ninguém sabe, não é a mesma coisa que não existir?"
10033080-71 = "Bem, 10 em cada 10 pessoas provavelmente não sabem...#nEntão vamos considerar que não existe."
10033080-74 = "Está quase na hora, será...?"
10033080-82 = "...Isso são pétalas?"
10033080-83 = "São pétalas da Árvore Sagrada...!"
10033080-87 = "Sim!#nSegundo a lenda, quando a sorte visita Hyakkiyako,#npétalas caem como se estivessem celebrando!"
10033080-88 = "Não sei se é por isso, mas sempre acontece quando a caixa chega no ritual!#nNão é incrível?"
10033080-90 = "Pessoal responsável pelo festival, bom trabalho..."
10033080-94 = "E agora, a sacerdotisa Chise-sama faz sua entrada!"
10033080-97 = "De longe, o caminho tortuoso também chega até aqui"
10033080-101 = "Aqui é preciso subir devagar!#nObserve com atenção!"
10033080-102 = "Com um movimento leve, afasto o mal; com um abraço suave, acolho a bênção"
10033080-103 = "Além disso, esta canção é parte de um ritual.#nÉ para que a sacerdotisa afaste o azar e ore pela boa sorte!"
10033080-104 = "Do caminho do vento ao caminho das flores, subindo a colina, que tudo se abra"
10033080-108 = "E então, quando terminar de subir o altar...!#nTiras de papel shide aparecerão no altar!"
10033080-113 = "Uau, incrível... hm, a sacerdotisa está segurando algo?#nO que é aquilo?"
10033080-114 = "Sim, é um instrumento ritual chamado \"Gohei\".#nDizem que ele afasta o azar e expulsa energias impuras!"
10033080-115 = "Enquanto ela balança aquilo, a \"dança\" continua e então—"
10033080-116 = "Até aqui!#nNão posso ficar assistindo a esse festival da árvore sagrada falso!!"
10033080-117 = "!?"
10033080-118 = "Quem está aí!?"
10033080-119 = "Ehh!!"
10033080-120 = "……."
