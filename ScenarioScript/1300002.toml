[translation]
1300002-1 = "Você é o meu mestre? (1)"
1300002-2 = "Mercado Negro"
1300002-4 = "(No meio de uma missão, sendo perseguido pelo Grupo dos Capacetes)"
1300002-5 = "Pare aí mesmo!"
1300002-6 = "O Sensei, hein? Hehe, por causa desse tal de Schale, a gente passou por uns bocados ultimamente."
1300002-7 = "Você vai ter que brincar um pouco com a gente também."
1300002-8 = "Ouvi dizer que você tem pagado lanches deliciosos para as alunas por aqui... que tal pagar para nós também...?"
1300002-9 = "Não."
1300002-10 = "Vocês não têm esse direito."
1300002-11 = "Q-quem é você!?"
1300002-14 = "Do Sensei que está diante de vocês... não,"
1300002-16 = "do meu mestre,"
1300002-17 = "a empregada!!"
1300002-18 = "……Hã?"
1300002-19 = "(BOOM!)"
1300002-20 = "Aaaargh! P-por que jogou uma bomba do nada...!?"
1300002-21 = "Ugh..."
1300002-24 = "(Ploft)"
1300002-25 = "……."
1300002-27 = "Ufufu♪"
1300002-28 = "Quanto tempo, mestre."
1300002-29 = "[s1] \"Akane?\"\n[s2] \"Uma... empregada misteriosa e bonita?\""
1300002-30 = "Sim, a misteriosa e bela empregada, Akane."
1300002-31 = "Sim, a misteriosa e bela empregada, Akane."
1300002-32 = "Eu estava em uma missão... quer dizer, em uma atividade de clube, quando vi o mestre e acabei seguindo você."
1300002-33 = "Estou feliz por poder servi-lo assim."
1300002-34 = "……Ah, falando nisso……"
1300002-35 = "Sinto uma sensação nostálgica."
1300002-36 = "Foi exatamente assim quando conheci o Sensei pela primeira vez, não foi?"
1300002-38 = "Schale - Escritório"
1300002-39 = "(Um pouco antes disso...)"
1300002-40 = "(Certo dia, o teto explodiu de repente)"
1300002-41 = "(CABRUUUUUM!!)"
1300002-42 = "Aaaah!"
1300002-43 = "O-o que foi?!"
1300002-47 = "……."
1300002-48 = "Você é o meu mestre?"
1300002-49 = "[s3] \"Sou o Sensei, mas...?\"\n[s4] \"Sinto que já vi essa cena em algum lugar...\""
1300002-50 = "Entendo."
1300002-51 = "Entendo."
1300002-52 = "Você parece ser uma pessoa bem humorada."
1300002-53 = "Muito prazer."
1300002-54 = "Sou a Akane, da C&C."
1300002-55 = "Vim até aqui para servir ao Sensei... ou melhor, ao meu mestre."
