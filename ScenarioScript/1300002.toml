[translation]
1300002-1 = "あなたが私のご主人様ですか？（１）"
1300002-2 = "ブラックマーケット"
1300002-4 = "（任務の途中、ヘルメット団に追われていた）"
1300002-5 = "そこで止まれ！"
1300002-6 = "先生か。へへっ、シャーレとかいう部活のせいで、最近ちょっと大変な目にあったんだ。"
1300002-7 = "少しは、私たちとも遊んでもらわないとね。"
1300002-8 = "聞いた話によれば、この辺の女子生徒たちに美味しいものをご馳走してくれたらしいじゃん……私たちにも……。"
1300002-9 = "いいえ。"
1300002-10 = "あなたたちに、そんな資格はありません。"
1300002-11 = "だ、誰だ！？"
1300002-14 = "あなたたちの目の前にいる先生の……いえ、"
1300002-16 = "ご主人様の、"
1300002-17 = "メイドです！！"
1300002-18 = "……はぁ？"
1300002-19 = "（ドカーーン！）"
1300002-20 = "ぐあああっ！きゅ、急に爆弾を……！？"
1300002-21 = "くうっ……。"
1300002-24 = "（ドサッ）"
1300002-25 = "……。"
1300002-27 = "うふふっ♪"
1300002-28 = "お久しぶりですね、ご主人様。"
1300002-29 = "[s1] \"アカネ？\"\n[s2] \"謎の……美女メイド？\""
1300002-30 = "はい、謎の美女メイド、アカネです。"
1300002-31 = "はい、謎の美女メイド、アカネです。"
1300002-32 = "任務を……いえ、部活動をしてる最中にご主人様を見かけたので、ついてきてしまいました。"
1300002-33 = "こうしてご奉仕ができて、嬉しいです。"
1300002-34 = "……あ、そういえば……。"
1300002-35 = "なんだか、懐かしい感じです。"
1300002-36 = "先生と初めてお会いした時も、こんな感じでしたね。"
1300002-38 = "シャーレ・執務室"
1300002-39 = "（少し前のこと……）"
1300002-40 = "（ある日、急に天井が爆発した）"
1300002-41 = "（ドカアアアアァァァン！！）"
1300002-42 = "キャアアッ！"
1300002-43 = "な、なに？！"
1300002-47 = "……。"
1300002-48 = "あなたが、私のご主人様ですか？"
1300002-49 = "[s3] \"先生だけど……？\"\n[s4] \"こういうシーンどこかで見たような……。\""
1300002-50 = "なるほど。"
1300002-51 = "なるほど。"
1300002-52 = "なかなか、ユーモラスな方のようですね。"
1300002-53 = "初めまして。"
1300002-54 = "C&Cのアカネです。"
1300002-55 = "先生に……いえ、ご主人様にご奉仕させていただくため、こちらに参りました。"
