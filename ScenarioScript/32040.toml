32040-70 = "……Obrigada. Realmente, melhor secar o cabelo também."
32040-74 = "……Ah."
32040-75 = "Koharu-chan？ Aconteceu alguma coisa？"
32040-76 = "……Não tenho mais roupa pra vestir."
32040-77 = "……Eh？"
32040-78 = "Agora que pensei, eu também não. O uniforme e esse de educação física estão encharcados, não tenho roupa extra."
32040-79 = "E-eu também…… auuu……"
32040-80 = "……Ara ara♡ Bom, estudar só de lingerie também é uma opção bem válida, né？"
32040-81 = "O que você tá falando！？ Idiota！ Esse tipo de safadeza é proibido！ Por que você sempre pensa nessas coisas！？"
