32040-285 = "Então tá decidido♡"
32040-286 = "Vamos nos arrumar logo e sair！ Tô animada pra esse passeio noturno peladinha……！"
32040-287 = "Não fica trocando as palavras assim！！ Coloca roupa！！"
32040-289 = "（E assim, de repente, começou o passeio noturno.）"
