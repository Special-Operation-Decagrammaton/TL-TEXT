32040-230 = "Porque esse mundo é todo sem sentido e vazio. Então, talvez……"
32040-231 = "Eu acabe traindo vocês um dia…… a confiança de vocês, o coração de vocês."
32040-235 = "……。"
32040-236 = "Azusa-chan……？"
32040-237 = "……？"
32040-241 = "Ah, a luz……"
32040-242 = "Voltou."
