32040-265 = "Ufufu♡ Acampamento é sinônimo de fugir do alojamento à noite…… isso também é um dos prazeres, não acha？"
32040-266 = "Eh……？"
32040-267 = "Vamos！ Agora todo mundo vai sair escondido pra um passeio noturno♡"
