[translation]
32040-1 = "Episódio 4; Festa na Piscina"
32040-3 = "Auu... está chovendo bastante, né..."
32040-4 = "Pois é."
32040-5 = "Nhu..."
32040-6 = "Ora, bom dia, Koharu-chan."
32040-7 = "Bom dia. A Azusa-chan... parece que ainda não consegue acordar."
32040-8 = "Nhh... nhnn..."
32040-9 = "O que houve? A Azusa costuma acordar bem cedo..."
32040-10 = "Talvez ela estivesse se esforçando demais até agora? Acho que deveríamos deixá-la dormir um pouco mais..."
32040-11 = "Nhh... não, coisas fofas... tão macias... isso não é bom..."
32040-12 = "Além disso, parece que ela está tendo um sonho muito bom♡"
32040-13 = "[s] \"Talvez seja por causa da chuva lá fora.\""
32040-19 = "A-auu... e agora até começou a trovejar..."
32040-20 = "...Ora."
32040-21 = "O que foi?"
32040-22 = "Eu tinha esquecido, as roupas estão lá fora...!"
32040-27 = "I-isso é um desastre...!?"
32040-32 = "...?"
32040-42 = "(Cerca de 1 hora depois...)"
32040-49 = "Muito bem, vamos começar a memorável 1ª Festa na Piscina do Clube de Reforço Escolar♡"
32040-50 = "Auu..."
32040-51 = "..."
32040-52 = "Por que, como chegamos a esse ponto..."
32040-58 = "[ns] \"Que situação incrível...\""
32040-59 = "Ufufu, não tem como evitar, né?♡"
32040-61 = "(Voltando um pouco, cerca de 40 minutos atrás...)"
32040-63 = "Acho que é tudo."
32040-64 = "Isso... foi um desastre total. Estão todas sujas de lama, vamos ter que lavar de novo."
32040-65 = "As roupas de ginástica também ficaram num estado... ugh, está tudo encharcado por dentro...!"
32040-66 = "Isso foi porque a Koharu tropeçou no caminho."
32040-67 = "Desculpe, eu acabei me esquecendo... a culpa é minha por ter sugerido que fizéssemos tudo juntas."
32040-68 = "Não, não é culpa sua, Hanako. É só lavar de novo e trocar de roupa. Não precisa se preocupar tanto."
32040-69 = "Sim, exatamente. Se ficarem com as roupas molhadas, vão acabar pegando um resfriado, então vamos nos trocar logo."
32040-70 = "...Obrigada. É verdade, também preciso secar o cabelo."
32040-74 = "...Ah."
32040-75 = "Koharu-chan? O que houve?"
32040-76 = "...Não temos mais nada para vestir."
32040-77 = "...Eh?"
32040-78 = "Pensando bem, eu também não. Tanto o uniforme quanto a roupa de ginástica estão encharcados, e não temos roupas extras."
32040-79 = "É-é verdade, eu também... auuu..."
32040-80 = "...Ora, ora♡ Bem, acho que estudar apenas de roupa íntima seria uma opção muito interessante, não acham?"
32040-81 = "O que você está dizendo!? Idiota! Isso é indecente, não pode! Por que você sempre pensa nessas coisas!?"
32040-82 = "Mas o raciocínio faz sentido. Temos bastante roupa íntima extra, e se usarmos meias, a temperatura corporal deve se manter estável."
32040-83 = "Não concorde com ela!? Estudar na sala de aula de roupa íntima é loucura, não é!?"
32040-84 = "Mas Koharu-chan, imagine só..."
32040-86 = "Já chega, cala a boca!!"
32040-90 = "É só lavar rápido e usar o secador para secar logo!"
32040-91 = "Enquanto isso, podemos nos enrolar em toalhas de banho! E se precisar de algo, é só pedir para o Sensei!"
32040-92 = "Além disso, não precisamos nos preocupar em estudar com pressa nessa situação! Por que você está tão ansiosa para estudar agora!?"
32040-94 = "Mesmo assim, não estaríamos de roupa íntima de qualquer jeito durante esse tempo?"
32040-95 = "Eu queria estudar logo, mas se não posso ir para a sala de aula até a lavagem terminar, não tem jeito. Vou tirar a roupa por enquanto."
32040-96 = "Auu, não tem jeito... de qualquer forma, só me resta tirar..."
32040-98 = "Por que todo mundo quer tirar a roupa desse jeito!? Exposição é crime, sabia!?"
32040-100 = "Sala do Sensei"
32040-101 = "（Decidi ficar no quarto por enquanto até a lavagem terminar.）"
32040-106 = "Hã!? Q-que foi isso!?"
32040-107 = "P-parece que houve um apagão...?"
32040-108 = "Será que foi um apagão causado por um raio?"
32040-112 = "Hã. Q-que barulho foi esse agora...!?"
32040-113 = "……Houve um problema."
32040-114 = "A máquina de lavar parou e a tampa não abre. Que problema."
32040-115 = "……!?"
32040-119 = "[ns] \"Bem, sinto que não há nada a ser feito...\""
32040-120 = "É isso mesmo. Já que chegamos a esse ponto, só nos resta fazer uma festa de trajes de banho, já que não podemos fazer uma festa do pijama♡"
32040-121 = "Auu... s-sinto que poderíamos fazer outras coisas, mas..."
32040-122 = "Entendo, uma festa de roupas íntimas também seria possível, não é?♡ Certamente, se pensarmos bem, existem outras opções, mas você tem certeza de que quer fazer isso...? Fufu."
32040-123 = "Nessas condições, fica difícil estudar... e que segurança terrível, um raio desses causar uma falha em todo o prédio."
32040-124 = "Bem, é um prédio antigo, afinal..."
32040-125 = "Quer dizer, espere! Não se deixe levar!? O que é essa história de festa de trajes de banho! Que obsceno!!"
32040-126 = "Concordo que não dá para estudar e que não temos roupas para vestir, mas se é assim, deveríamos apenas descansar quietas no quarto! Pensando logicamente!"
32040-127 = "Ora, mas você não acha que momentos como este são o ponto alto de um acampamento?"
32040-128 = "Todas juntas, revelando nossas partes mais profundas umas para as outras... Além disso, está chovendo e, com o apagão, não dá para ver nada, o clima está perfeito!"
32040-133 = "Ufufufu...♡ Já que é um tempo de descanso, por que não aproveitamos de forma significativa?"
32040-134 = "Ahaha... r-realmente, parece um clássico de acampamento."
32040-135 = "Entendo, então é isso que seria essa festa de trajes de banho."
32040-136 = "Não, não, não! Como você pode aceitar isso! Qual o sentido de misturar com trajes de banho!?"
32040-137 = "Auu, é verdade..."
32040-138 = "Bem, bem, já que estamos aqui, vamos aproveitar."
32040-139 = "Dito isso, é apenas uma conversa, então qualquer assunto está liberado♡"
32040-140 = "Fufu♡ Eu queria muito fazer algo assim. Por isso, estou um pouco empolgada, por assim dizer..."
32040-141 = "[s] \"Hanako, você parece estar realmente se divertindo.\""
32040-142 = "Eu entendo o sentimento. Na verdade, desde que entrei no Clube de Reforço, eu me sinto assim o tempo todo."
32040-143 = "Ora, é mesmo?"
32040-144 = "Sim. Aprender algo novo, comer com todas, lavar roupa, limpar... cada uma dessas coisas é divertida."
32040-145 = "Ora...♡"
32040-146 = "Eu achava que trajes de banho serviam apenas para nadar, mas descobri que existem outras formas de usá-los. Aprender coisas que eu não sabia é divertido."
32040-147 = "A-acho que a questão do traje de banho é um pouco diferente, mas..."
32040-148 = "Mas é fácil de se mover e é bem ventilado. Agora entendo por que a Hanako andava pela escola usando isso."
32040-149 = "Viu só? Foi por isso que eu disse, Koharu-chan."
32040-150 = "Não, andar na rua assim é crime! Não aceite isso! É atentado ao pudor público!?"
32040-151 = "Estudar com a Koharu também é divertido."
32040-152 = "!? Q-que foi isso de repente!? Por que você disse algo tão vergonhoso do nada!?"
32040-153 = "Ora, ora...♡"
32040-154 = "B-bem, estudar com uma elite como eu deve ser bem proveitoso, não acha?"
32040-155 = "Sim, é verdade."
32040-160 = "Azusa-chan... no começo eu não conseguia ler muito bem as mudanças nas suas expressões e fiquei preocupada, mas... fico feliz."
32040-164 = "Claro, a Hifumi também. Sempre cuidando de mim, obrigado."
32040-168 = "A-Azusa-chan!! Uwaaa!!"
32040-173 = "（Aperto）"
32040-174 = "H-Hifumi, estou ficando sem ar."
32040-176 = "（E assim, o pessoal do Clube de Estudos Suplementares continuou a conversa animadamente...）"
32040-178 = "Falando nisso, parece que um peixe raro chamado \"Atum Dourado\" está em exibição no aquário de Trinity agora."
32040-179 = "Ah, eu vi isso no panfleto! É aquele que chamam de \"peixe lendário\", né?"
32040-180 = "Sim, parece que foi descoberto no mar ali perto. Eu queria muito ir ver, mas o ingresso não é nada barato..."
32040-181 = "O mar, é... pensando bem, eu nunca fui lá."
32040-182 = "S-sério mesmo!? Nem uma vez...!?"
32040-184 = "E então, mesmo sendo um parque de diversões que faliu há muito tempo, dizem que à noite dá para ouvir sons barulhentos vindo de lá..."
32040-185 = "I-isso não é verdade! Você deve ter ouvido errado!"
32040-186 = "Bem, eu só ouvi isso como um boato, mas..."
32040-187 = "Não quero saber! É mentira! Tudo isso é brincadeira de mau gosto de alguém!"
32040-188 = "Ah, ahaha..."
32040-190 = "Andar pela cidade ou pela escola de roupa de banho não é algo tão estranho assim, sabe?"
32040-191 = "Não tem como isso ser normal!? Não mude o senso comum por conta própria!"
32040-192 = "Mas, isso é algo que ouvi das irmãs... parece que em algum lugar sem lei de Kivotos, existe um grupo criminoso que usa roupas de banho e máscaras, sabia?"
32040-193 = "R-roupa de banho e máscara...!? Isso é de um pervertido, não é!? O que é isso!?"
32040-194 = "E além do mais, eles são um \"grupo criminoso\"! Mesmo que não façam nada, só pela aparência já são criminosos!"
32040-195 = "É tão comum em outras regiões que existem grupos assim. Por isso, Koharu-chan, da próxima vez vamos juntas—"
32040-196 = "Não! Não sei o que você vai dizer, mas de qualquer forma, não quero!!"
32040-201 = "………………."
32040-203 = "Azusa-chan, acho que você deveria dormir melhor à noite, sabe?"
32040-204 = "...Sim. Acabei dormindo demais hoje de manhã e causando problemas."
32040-205 = "Eu quase nunca dormia demais em lugares aos quais não estava acostumada..."
32040-206 = "...Talvez seja porque este lugar não é mais um \"lugar ao qual não estou acostumada\"."
32040-207 = "...De qualquer forma, é melhor você dormir direito. Por favor, diminua as vigílias durante a madrugada."
32040-208 = "Vigília...? O que é isso?"
32040-209 = "Ah, é que toda noite eu fico vigiando um pouco..."
32040-210 = "[s] \"Hanako, ela estava muito preocupada com você, Azusa.\""
32040-211 = "É mesmo...?"
32040-212 = "...Desculpe."
32040-216 = "Na verdade, a vigília era uma desculpa... eu estava instalando armadilhas."
32040-218 = "Armadilhas...?"
32040-219 = "...?"
32040-220 = "Por que você faria algo assim...?"
32040-222 = "Não se preocupe, eu só instalei nas rotas onde alguém tentaria entrar com más intenções. Para a vida cotidiana, não há problemas de segurança."
32040-223 = "（Pensando no que aconteceu com a Mari-san ontem, não sinto que seja bem assim...）"
32040-224 = "Entendo... mas, se for assim, eu ficaria feliz se você me contasse. Eu não consigo evitar ficar preocupada."
32040-225 = "...Entendi. Sim, vou tomar cuidado a partir de agora."
32040-226 = "Porque eu não quero que o Sensei e todos sofram por minha causa."
32040-227 = "[s] \"A Azusa é gentil.\""
32040-228 = "Não... não me trate como criança, Sensei."
32040-229 = "Eu não sou... nada disso."
32040-230 = "Porque este mundo é todo sem sentido e vazio. Então, talvez..."
32040-231 = "Eu possa acabar traindo todos um dia... a todos, a confiança de vocês, os corações de vocês."
32040-235 = "..."
32040-236 = "Azusa-chan...?"
32040-237 = "...?"
32040-241 = "Ah, a luz..."
32040-242 = "Parece que voltou."
32040-243 = "Ah, a chuva também parou de repente...!"
32040-244 = "É verdade. Então, vamos lavar as roupas novamente?"
32040-248 = "Sim. Então, a 1ª Festa de Roupa de Banho termina aqui. Estou ansioso pela segunda."
32040-249 = "Não vai ter segunda rodada! Isso é algo que só acontece uma vez na vida!"
32040-251 = "(Terminei a lavagem e decidi descansar pelo resto do dia.)"
32040-252 = "(E assim, o dia passou...)"
32040-254 = "Não, ainda não! Não vou deixar o dia acabar assim, seria um desperdício!"
32040-255 = "S-sim...!?"
32040-259 = "O-o quê!? Você pulou de repente, que susto..."
32040-261 = "Foi algo repentino, mas é um dia de folga, não é? Já que todas nós nos conectamos sem nada, não podemos simplesmente dizer boa noite assim..."
32040-262 = "Não invente memórias! Nós não estávamos sem nada!"
32040-263 = "Deixando isso de lado, seria um desperdício dormir agora. Ainda estamos um pouco acaloradas, ou melhor, sentindo que falta algo..."
32040-264 = "Como assim, especificamente?"
32040-265 = "Ufufu♡ Falando em acampamento, o ponto alto não é justamente escapar do local de acampamento?"
32040-266 = "Eh...?"
32040-267 = "Vamos! Agora, vamos sair escondidas e dar um passeio♡"
32040-268 = "O centro comercial de Trinity tem várias lojas abertas até tarde, podemos comer algo ou fazer compras!"
32040-270 = "I-isso é contra as regras da escola! Não pode!"
32040-271 = "Não conheço as regras detalhadas, mas acho que todo mundo faz isso escondido, não é? Você não conhece ninguém assim por perto, Hifumi-chan?"
32040-272 = "A-ahahaha... é, talvez...?"
32040-273 = "M-mas, mesmo que fosse em um dia comum, agora estamos no acampamento do Clube de Reforço... será que podemos...?"
32040-274 = "Não vamos para longe, é logo ali. Koharu-chan, o que acha? Não parece divertido?"
32040-275 = "E-err... e-eu tenho interesse, mas..."
32040-276 = "Sim, vamos apenas dar uma volta rápida e voltar, então está tudo bem. O que acha, Sensei?"
32040-277 = "[s] \"Parece divertido, vamos nessa.\""
32040-279 = "S-sério!?"
32040-283 = "Estou pronta. Podemos sair agora mesmo."
32040-284 = "Azusa-chan!? Quando você se trocou...!"
32040-285 = "Então está decidido♡"
32040-286 = "Vamos, preparem-se logo! Está ficando divertido, um passeio noturno sem nada...!"
32040-287 = "Não tente mudar o assunto sutilmente!! Vistam roupas!!"
32040-289 = "(E assim, um passeio noturno começou de repente.)"
32040-291 = "Próximo episódio: A Grande Confusão da Meia-Noite (1)"
