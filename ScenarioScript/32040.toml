[translation]
32040-1 = "Episódio 4;Festa de Maiô"
32040-3 = "Auu…… tá chovendo bastante, né……."
32040-4 = "Pois é."
32040-5 = "Nnh……."
32040-6 = "Ora, bom dia, Koharu."
32040-7 = "Bom dia. A Azusa…… ainda parece que não consegue acordar, né."
32040-8 = "Nh…… nnh……."
32040-9 = "O que foi, a Azusa acordava bem cedo……."
32040-10 = "Até agora, ela não devia estar se forçando? Quero deixar ela dormir um pouquinho……."
32040-11 = "Nnh…… não pode, uma coisa fofa…… fofinha…… isso, não é bom……"
32040-12 = "Além disso, sei lá, ela parece estar tendo um bom sonho♡"
32040-13 = "[s] \"Deve ser em parte porque tá chovendo, né.\""
32040-19 = "A-auu…… sei lá, até trovão……."
32040-20 = "……Ora."
32040-21 = "O que foi?"
32040-22 = "Esqueci, a roupa lavada tá lá fora……!"
32040-27 = "I-isso é ruim……!?"
32040-32 = "……?"
32040-42 = "(E, então, cerca de 1 hora depois…….)"
32040-49 = "Muito bem, então, dou início à memorável 1ª Festa de Maiô do Clube de Aulas de Reforço♡"
32040-50 = "Auu……."
32040-51 = "……."
32040-52 = "Por que, como é que a gente foi parar nisso……."
32040-58 = "[ns] \"É uma situação e tanto, em vários sentidos……\""
32040-59 = "Ufufu, não tem jeito, né♡"
32040-61 = "(Voltando um pouco, uns 40 minutos antes…….)"
32040-63 = "Acho que é tudo isto."
32040-64 = "Isto…… foi um belo desastre total. Até respingou lama; parece que vai precisar lavar de novo."
32040-65 = "O uniforme de ginástica também tá numa situação…… uu, encharcado até por dentro……!"
32040-66 = "Isso é porque a Koharu tropeçou no meio do caminho."
32040-67 = "Me desculpem, eu me distraí…… foi por minha culpa, que sugeri fazer tudo junto."
32040-68 = "Não, não é culpa da Hanako. É só lavar de novo, e é só trocar de roupa. Não é algo pra ficar tão remoída."
32040-69 = "Sim, isso mesmo. Ficar com a roupa molhada assim faz pegar um resfriado, então, primeiro, vamos trocar logo de roupa."
32040-70 = "……Obrigada. Pois é, tem que secar o cabelo também."
32040-74 = "……Ah."
32040-75 = "Koharu? Aconteceu alguma coisa?"
32040-76 = "……Não tenho mais nada pra vestir."
32040-77 = "……Hã?"
32040-78 = "Aliás, comigo também é assim. Tanto o uniforme quanto este de ginástica tão encharcados, e não tenho outra roupa de reserva."
32040-79 = "A-aliás, comigo também, auu……."
32040-80 = "……Ora, ora♡ Bom, estudar de roupa de baixo também é uma opção totalmente válida, viu?"
32040-81 = "Que é que você tá falando!? Boba! Uma safadeza dessas não pode! Por que a coisa vai pra esse lado!?"
32040-82 = "Mas a ideia faz sentido. Eu trouxe bastante roupa de baixo, e, com as meias, dá pra manter a temperatura sem problema."
32040-83 = "Não concorda com ela desse jeito estranho!? De roupa de baixo na sala é um perigo, né!?"
32040-84 = "Mas, Koharu, imagina só――"
32040-86 = "Você fica quieta de uma vez!!"
32040-90 = "É só lavar rapidinho e secar logo com o secador!"
32040-91 = "Nesse meio-tempo, é só enrolar uma toalha de banho! E, se acontecer algo, é só pedir pro Sensei!"
32040-92 = "Além do mais, nessa situação, não precisa pensar em estudar com pressa! Por que você fica de repente querendo estudar!?"
32040-94 = "Mesmo assim, nesse meio-tempo, de qualquer jeito, não vai ser de roupa de baixo?"
32040-95 = "Eu quero estudar logo, mas, se não dá pra ir pra sala até a lavagem terminar, não tem jeito. Por ora, vamos tirar a roupa."
32040-96 = "Auu, não tem jeito mesmo…… enfim, só resta tirar……."
32040-98 = "Por que todo mundo quer tanto tirar a roupa!? Exposição é crime, viu!?"
32040-100 = "Quarto do Sensei"
32040-101 = "(Até a lavagem terminar, decidiram, por ora, ficar no quarto.)"
32040-106 = "Hã!? Q-que foi!?"
32040-107 = "P-parece que faltou luz……?"
32040-108 = "Um apagão por causa do raio, será?"
32040-112 = "Hã. Q-que barulho foi esse agora……!?"
32040-113 = "……Surgiu um problema."
32040-114 = "A máquina de lavar parou, e a tampa também não abre. Que situação."
32040-115 = "……!?"
32040-119 = "[ns] \"Bom, tenho a impressão de que não tem jeito……\""
32040-120 = "Isso mesmo. Nessas alturas, não sobra muito a fazer além de uma festa de maiô, em vez de festa do pijama♡"
32040-121 = "Auu…… t-tenho a impressão de que tem outras coisas, mas……."
32040-122 = "Sei, uma festa de roupa de baixo também é uma opção♡ De fato, pensando bem, acho que tem várias outras, mas é isso mesmo que você quer……? Ufu."
32040-123 = "Assim fica difícil dar aula também…… um apagão desses, e todos os prédios param de funcionar; que segurança mais precária."
32040-124 = "Bom, é um prédio velho……."
32040-125 = "Aliás, peraí! Eu não vou me deixar levar!? Que história é essa de festa de maiô! Que obsceno!!"
32040-126 = "Até o ponto de não dar pra ter aula nem ter roupa pra vestir, eu concordo, mas, então, é só descansar quietinha no quarto! Pensando normalmente!"
32040-127 = "Ora, mas não acha que é justamente uma hora dessas a flor de um acampamento?"
32040-128 = "Todo mundo juntinho, expondo as partes profundas uma da outra…… ainda por cima chovendo, e com o apagão não dá pra ver nada, o clima tá perfeito!"
32040-133 = "Ufufufu……♡ É um tempo de descanso e tanto, então não vamos passá-lo de forma proveitosa?"
32040-134 = "Ahaha…… d-de fato, dá aquela impressão de clássico de acampamento, né."
32040-135 = "Sei, e é isso essa festa de maiô."
32040-136 = "Não, não, não vai concordar! Qual é o sentido de combinar com maiô!?"
32040-137 = "Auu, de fato……."
32040-138 = "Calma, calma, já que é uma oportunidade, vamos aproveitar."
32040-139 = "Dito isso, é só uma conversa, e qualquer assunto é válido♡"
32040-140 = "Ufu♡ Uma coisa dessas eu queria muito, muito fazer. Por isso, tô meio empolgada, digamos……."
32040-141 = "[s] \"Hanako, você tá bem feliz mesmo.\""
32040-142 = "Entendo o sentimento. Eu também, aliás, desde que entrei no Clube de Aulas de Reforço, sinto isso o tempo todo."
32040-143 = "Ora, é mesmo?"
32040-144 = "Sim. Aprender alguma coisa, comer todo mundo junto, lavar roupa, limpar; cada uma dessas coisas é divertida."
32040-145 = "Ora……♡"
32040-146 = "Eu achava que maiô fosse só pra vestir na hora de nadar, mas nem sabia que existia uma forma de usar assim. Poder conhecer o que não se conhecia é uma coisa divertida."
32040-147 = "A-a questão do maiô eu acho que é meio diferente, mas……."
32040-148 = "Mas é fácil de se mexer e tem boa ventilação. Dá pra entender por que a Hanako andava pela escola vestindo isso."
32040-149 = "Pois é, foi o que eu disse, Koharu."
32040-150 = "Não, sair andando com isso é crime! Não concorda! É crime de obscenidade pública, viu!?"
32040-151 = "Estudar junto com a Koharu também é divertido."
32040-152 = "Gh!? D-do nada, o quê!? Por que você diz uma coisa vergonhosa dessas assim de repente!?"
32040-153 = "Ora, ora……♡"
32040-154 = "B-bom, estudar junto com uma elite que nem eu deve ser bem proveitoso, né?"
32040-155 = "Sim, é verdade mesmo."
32040-160 = "Azusa…… no começo eu não conseguia ler bem as mudanças da sua expressão e fiquei preocupada, mas…… que bom."
32040-164 = "Claro, a Hifumi também. Você sempre me ajuda muito mesmo, obrigada."
32040-168 = "A-Azusa!! Buááá!!"
32040-173 = "(abraço apertado)"
32040-174 = "H-Hifumi, tô sufocando um pouco."
32040-176 = "(E, assim, o pessoal do Clube de Aulas de Reforço mergulhou na conversa…….)"
32040-178 = "Aliás, dizem que agora, no aquário de Trinity, está em exposição um peixe raríssimo chamado \"Atum Dourado\"."
32040-179 = "Ah, eu também vi isso no folheto! É chamado de \"peixe lendário\", né?"
32040-180 = "Sim, pelo visto foi encontrado num mar aqui perto. Eu queria ir ver, mas a entrada não é barata, então……."
32040-181 = "Mar, é…… aliás, eu nunca fui nem uma vez."
32040-182 = "É-é mesmo!? Nenhuma vez……!?"
32040-184 = "E aí, apesar de ser um parque de diversões que faliu faz tempo, quando anoitece dá pra ouvir uns barulhos meio agitados……."
32040-185 = "I-isso não pode ser! Você ouviu errado!"
32040-186 = "Bom, eu também só ouvi isso como boato……."
32040-187 = "Não quero! Com certeza é mentira! É tudo brincadeira de mau gosto de alguém!"
32040-188 = "A-ahaha……."
32040-190 = "Andar de maiô pela cidade ou dentro da academia não é nada tão estranho assim, viu?"
32040-191 = "Claro que é! Não sai alterando o senso comum por conta própria!"
32040-192 = "Mas, isto foi uma história que eu ouvi das irmãs…… pelo visto, em alguma terra sem lei de Kivotos, existe um grupo criminoso que anda de maiô e máscara, viu?"
32040-193 = "D-de maiô e máscara……!? Que tarado do caramba!? Que é isso!?"
32040-194 = "Aliás, é um \"grupo de criminosos\", né! Uma coisa dessas, mesmo sem fazer nada, só pela aparência já é crime!"
32040-195 = "Existir um grupo desses é normal em outras regiões, viu. Então a Koharu também, da próxima, junto――"
32040-196 = "Não! Não sei o que você vai dizer, mas, por via das dúvidas, não quero!!"
32040-201 = "………………."
32040-203 = "Azusa, acho que você devia dormir direito de noite, viu?"
32040-204 = "……Sim. Hoje de manhã eu dormi demais e dei trabalho."
32040-205 = "Dormir demais num lugar estranho, uma coisa dessas quase nunca aconteceu antes……."
32040-206 = "……Talvez seja porque este lugar já não é mais um \"lugar estranho\"."
32040-207 = "……Enfim, é melhor dormir mais direito. E diminuir a vigília de madrugada."
32040-208 = "Vigília……? Que é isso?"
32040-209 = "Ah, toda noite, de madrugada, uma vigiazinha……."
32040-210 = "[s] \"Hanako estava muito preocupada com você, Azusa.\""
32040-211 = "É mesmo……?"
32040-212 = "……Desculpa."
32040-216 = "Na verdade, vigília era desculpa…… eu estava instalando booby-traps e tal."
32040-218 = "Booby-traps……?"
32040-219 = "……?"
32040-220 = "Por que uma coisa dessas……?"
32040-222 = "Não se preocupe; instalei só nas rotas por onde alguém tentaria invadir com má intenção. Pra vida normal, não há problema de segurança."
32040-223 = "(Pensando na Marie de ontem, acho que não é bem assim……)"
32040-224 = "Sei…… mas, sendo assim, eu ficaria feliz se você avisasse. Porque a gente acaba se preocupando."
32040-225 = "……Ah é. Sim, daqui pra frente eu tomo cuidado."
32040-226 = "Porque, por minha culpa, o Sensei e todo mundo sofrerem prejuízo, não é o que eu quero."
32040-227 = "[s] \"Você é gentil, Azusa.\""
32040-228 = "Gh…… n-não me trate como criança, Sensei."
32040-229 = "Eu não sou…… nada disso."
32040-230 = "Porque este mundo é todo sem sentido, algo vão. Por isso, quem sabe……."
32040-231 = "eu, um dia, talvez acabe traindo…… a todos, a confiança de vocês, o coração de vocês."
32040-235 = "……."
32040-236 = "Azusa……?"
32040-237 = "……?"
32040-241 = "Ah, a luz……."
32040-242 = "Parece que voltou."
32040-243 = "Ah, a chuva também, quando foi que……!"
32040-244 = "Pois é. Então, vamos lavar tudo de novo mais uma vez?"
32040-248 = "Sim. Então, a 1ª Festa de Maiô se encerra por aqui. Fico na expectativa da 2ª também."
32040-249 = "Não tem segundo round! Uma coisa dessas é a primeira e a última vez!"
32040-251 = "(Terminaram a lavagem e decidiram descansar no tempo que sobrou do dia.)"
32040-252 = "(E, assim, um dia se passou……)"
32040-254 = "Não, ainda não! Deixar o dia terminar assim, um desperdício desses eu não permito!"
32040-255 = "S-sim……!?"
32040-259 = "Q-que foi!? Você pulou de repente, me assustou……."
32040-261 = "Foi de repente, mas é uma folga e tanto, não é? Todo mundo se misturou pelada, e, assim, \"pronto, boa noite\"――"
32040-262 = "Não inventa memória por conta própria! Não foi pelada!"
32040-263 = "Enfim, dormir assim seria um desperdício. Ainda tô meio acesa, digamos, meio insatisfeita, digamos……."
32040-264 = "Concretamente?"
32040-265 = "Ufufu♡ Falando em acampamento, no fim, escapulir do alojamento…… não acha que isso também é uma das grandes graças?"
32040-266 = "Hã……?"
32040-267 = "Vamos! Agora, todo mundo sai escondido e vai dar um passeio♡"
32040-268 = "Na rua de comércio de Trinity tem bastante loja que fica aberta até tarde da noite, e dá pra comer andando, fazer compras!"
32040-270 = "I-isso é infração do regulamento! Não pode!"
32040-271 = "As regrinhas eu não sei, mas acho que muita gente faz isso escondido, viu? Não tem, surpreendentemente, gente assim em volta, Hifumi?"
32040-272 = "A-ahaha…… é, é verdade, né……?"
32040-273 = "M-mas, se fosse um dia normal até vá lá, mas agora é o acampamento do Clube de Aulas de Reforço…… será que pode……?"
32040-274 = "Não é que a gente vá longe; é logo ali. Koharu, o que acha? Não acha que parece divertido?"
32040-275 = "É-é que…… i-interesse eu tenho, mas……."
32040-276 = "Sim, é só ir e voltar rapidinho, então tá tudo bem. Pode ser, Sensei?"
32040-277 = "[s] \"Parece divertido, vamos?\""
32040-279 = "P-pode!?"
32040-283 = "Preparação feita. Já dá pra partir a qualquer momento."
32040-284 = "Azusa!? Quando foi que você trocou de roupa……!"
32040-285 = "Então tá decidido♡"
32040-286 = "Vamos, se apronta logo e vamos! Tá ficando divertido, um passeio pelada de madrugada……!"
32040-287 = "Não substitui as coisas sorrateiramente!! Veste a roupa!!"
32040-289 = "(E, assim, de repente, começou um passeio noturno.)"
32040-291 = "Próximo Episódio;A Grande Confusão da Meia-Noite (1)"
