32040-86 = "Cala a boca！！"
32040-90 = "É só lavar rápido, usar o secador e pronto！"
32040-91 = "Enquanto isso a gente fica enrolada na toalha！ Se precisar de algo, pede pro Sensei！"
32040-92 = "E nem precisa estudar agora, né！ Por que você tá tão ansiosa pra estudar de repente！？"
32040-94 = "Mesmo assim, enquanto isso vamos ficar de lingerie, né？"
32040-95 = "Quero estudar logo, mas se não dá pra ir pra sala até a roupa secar, não tem jeito. Vou tirar logo."
