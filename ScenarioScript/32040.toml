32040-114 = "A máquina de lavar parou e a tampa não abre. Que droga."
32040-115 = "……！？"
32040-119 = "[ns] \"Bom, não tem jeito mesmo……\""
32040-120 = "Isso mesmo. Já que estamos assim, só nos resta fazer uma Pool Party com biquíni♡"
32040-121 = "Auuu…… t-talvez tenha outras opções, mas……"
32040-122 = "Entendi, uma lingerie party também seria ótima♡ Pensando bem, tem várias outras possibilidades, mas você prefere assim mesmo…… fufu."
32040-123 = "Não dá pra ter aula assim… que segurança ruim, um raiozinho e o prédio inteiro para."
32040-124 = "Bom, é um prédio antigo……"
32040-125 = "Espera aí！ Não aceito isso！？ O que é essa Pool Party！？ Que coisa pervertida！！"
32040-126 = "Concordo que não dá pra estudar e que não temos roupa, mas então é só ficar quietinha no quarto descansando！ Pensa normalmente！"
32040-127 = "Ara, mas não acha que esse tipo de momento é o verdadeiro charme do acampamento？"
32040-128 = "Todo mundo juntinho, expondo as partes mais profundas umas das outras…… com chuva e apagão, ninguém vê nada, o clima tá perfeito！"
32040-133 = "Ufufufu……♡ É um tempinho livre, vamos aproveitar de forma bem significativa？"
32040-134 = "Ahaha…… t-tá, realmente parece uma coisa típica de acampamento."
32040-135 = "Entendi, então é isso que você chama de Pool Party."
32040-136 = "Não, não, não concorda não！？ Que sentido tem misturar com biquíni！？"
32040-137 = "Auuu, realmente……"
32040-138 = "Vamos lá, já que estamos assim, vamos nos divertir."
32040-139 = "Mesmo assim é só conversa, o tema pode ser qualquer coisa♡"
32040-140 = "Fufu♡ Eu sempre quis fazer algo assim. Então tô bem animada……"
32040-141 = "[s] \"Hanako, você tá realmente se divertindo, né.\""
32040-142 = "Entendo o sentimento. Eu também, desde que entrei no Clube de Reforço, tô sentindo isso."
32040-143 = "Ara……♡"
32040-144 = "Aprender coisas, comer junto, lavar roupa, limpar… cada coisinha é divertida."
32040-145 = "Ara……♡"
32040-146 = "Eu achava que biquíni era só pra nadar, mas descobri que tem outros usos. Descobrir coisas novas é divertido."
32040-147 = "M-mas o caso do biquíni é um pouco diferente……"
32040-148 = "Mas é confortável e respira bem. Agora entendo por que a Hanako andava pela escola de biquíni."
32040-149 = "Né, eu não disse, Koharu-chan？"
32040-150 = "Não！ Andar assim lá fora é crime！ Não concorda com isso！ É atentado ao pudor！"
32040-151 = "Estudar com a Koharu também é divertido."
32040-152 = "っ！？ D-de repente o que é isso！？ Por que você fala uma coisa tão vergonhosa assim de repente！？"
32040-153 = "Ara ara……♡"
32040-154 = "B-bom, estudar com uma elite como eu deve ser bem proveitoso, né？"
32040-155 = "Sim, realmente."
32040-160 = "Azusa-chan…… no começo eu ficava preocupada porque você não demonstrava muita emoção…… mas que bom que tá assim."
32040-164 = "Claro que a Hifumi também. Obrigada por sempre cuidar da gente."
32040-168 = "A-Azusachan！！ Uwaaah！！"
32040-173 = "（Aperta forte）"
32040-174 = "H-Hifumi, tá um pouco apertado."
32040-176 = "（E assim, o Clube de Reforço continuou conversando animadamente……）"
32040-178 = "Aliás, no aquário de Trinity tem uma exposição de um peixe raro chamado «Atum Dourado»."
32040-179 = "Ah, eu vi no panfleto！ Chamam de «Peixe Fantasma», né？"
32040-180 = "Sim, parece que foi encontrado no mar perto daqui. Queria ir, mas a entrada não é barata……"
32040-181 = "Mar, né…… na verdade eu nunca fui."
32040-182 = "S-sério！？ Nunca……！？"
32040-184 = "E mesmo sendo um parque de diversões abandonado, à noite dá pra ouvir barulhos estranhos……"
32040-185 = "Isso é mentira！ Com certeza alguém fazendo graça！"
32040-186 = "Bom, eu só ouvi como boato……"
32040-187 = "Não！ Com certeza mentira！ Tudo brincadeira de mau gosto！"
32040-188 = "Ahaha……"
32040-190 = "Andar pela escola ou pela rua de biquíni não é nada estranho, né？"
32040-191 = "É estranho pra caralho！？ Não fica mudando a realidade assim！"
32040-192 = "Mas, segundo as freiras, parece que tem uma gangue criminosa que anda de biquíni com máscara em alguma região sem lei de Kivotos."
32040-193 = "B-biquíni com máscara……！？ Que nível de pervertido！？ Que porra é essa！？"
32040-194 = "E ainda é «gangue criminosa»！ Só pela aparência já é crime！"
32040-195 = "Se tem uma gangue assim, quer dizer que em outras regiões é normal. Então Koharu-chan, da próxima vez vamos juntas――"
32040-196 = "Não！！ Não sei o que você vai propor, mas já tô contra！！"
32040-201 = "………………。"
32040-203 = "Azusa-chan, você devia dormir direito à noite, sabia？"
