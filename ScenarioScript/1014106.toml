[translation]#[Não revisado] - Filipe 09/06/26
1014106-1 = "Como uma erva daninha"
1014106-2 = "Museu · Saguão"
1014106-3 = "(Chegou ao saguão do museu onde combinou de se encontrar com Haruka)"
1014106-4 = "P-por... professor!"
1014106-8 = "[ns1] \"Haruka!\"\n[ns2] \"Você está linda hoje!\""
1014106-11 = "U-ueee..."
1014106-12 = "É... que... museu, acho que roupa mais formal é melhor..."
1014106-13 = "Tentei vestir..."
1014106-14 = "A-a-além disso, o senhor disse que eu estava linda..."
1014106-18 = "P-peraí, foi um engano!? Fui muito convencida!?"
1014106-19 = "[s3] \"Não.\"\n[s4] \"Nada disso.\"\n[s5] \"Está perfeita.\""
1014106-23 = "F-fueeee..."
1014106-24 = "P-perfeita... uuuh..."
1014106-25 = "[s] \"Aliás, qual é o tema deste museu?\""
1014106-26 = "Ah, é verdade..."
1014106-27 = "O tema é... 'ervas daninhas'."
1014106-28 = "Estão expostas várias obras de dez artistas famosos..."
1014106-29 = "Tem até alunos da Wild Hunt..."
1014106-30 = "... É o que diz o panfleto."
1014106-31 = "[s] \"Parece o tipo de assunto que você gosta, Haruka.\""
1014106-32 = "I-isso quer dizer..."
1014106-33 = "Que o senhor não tem interesse no tema, né..."
1014106-34 = "D-desculpa! Vou devolver o valor do ingresso..."
1014106-35 = "[s] \"V-vamos entrar!\""
1014106-36 = "Hã? Ah, sim!"
1014106-38 = "(Entrou com Haruka)"
1014106-40 = "Dentro do museu"
1014106-42 = "Uau..."
1014106-43 = "[s6] \"Haruka, olha isso.\"\n[s7] \"Tem uma erva daninha de verdade exposta.\""
1014106-46 = "Sério!?"
1014106-52 = "Professor. Isso não é verdade."
1014106-53 = "Parece, mas... não é de verdade."
1014106-54 = "[s8] \"... É mesmo!\"\n[s9] \"Foi feito com uma placa de metal!\""
1014106-57 = "Q-quem é de verdade é esse daqui."
1014106-58 = "É uma colagem de ervas daninhas sobre a tela."
1014106-59 = "Ah, e ali também..."
1014106-64 = "(Percorreu o museu com Haruka calmamente)"
1014106-65 = "(Trocaram impressões em voz baixa, só para os dois ouvirem)"
1014106-67 = "Todas as obras são lindas."
1014106-68 = "E o museu é bem grande também."
1014106-69 = "[s] \"Que tal descansarmos um pouco?\""
1014106-70 = "Hã? Ah, sim!"
1014106-72 = "(Saiu para o corredor com Haruka)"
1014106-74 = "[ns] \"O que achou, Haruka?\""
1014106-75 = "Foi legal."
1014106-76 = "Nunca imaginei que ervas daninhas pudessem virar arte..."
1014106-77 = "M-mas..."
1014106-78 = "É... hmm..."
1014106-79 = "[s] \"Tem alguma coisa te incomodando.\""
1014106-80 = "... Sim."
1014106-81 = "Mas... posso dizer?"
1014106-82 = "Pessoas muito mais inteligentes e incríveis que eu fizeram essas obras..."
1014106-83 = "E se eu falar besteira..."
1014106-84 = "[s] \"Não tem problema errar, né?\""
1014106-85 = "... Como?"
1014106-86 = "[s10] \"Todo mundo erra.\"\n[s11] \"Eu, você, e quem fez essas obras também.\""
1014106-89 = "..."
1014106-90 = "... Todas são obras maravilhosas, realmente."
1014106-91 = "Fiquei surpresa como conseguiram expressar tanta beleza usando ervas daninhas."
1014106-92 = "Mas..."
1014106-95 = "[wa:1237]– [log=하루카 드레스]... Eu não gosto de ervas daninhas [wa:2833]porque são [wa:2090]bonitas.[/log]"
1014106-97 = "– [log=하루카 드레스]Eu gosto [wa:1671]da [wa:978]força delas.[/log]"
1014106-100 = "[wa:637]– [log=하루카 드레스]De fincar raízes firmes [wa:1771]em qualquer terreno árido, [wa:1582]essa persistência –[/log]"
1014106-102 = "– [log=하루카 드레스]Esse é o meu [wa:1966]ideal.[/log]"
1014106-105 = "[wa:613]– [log=하루카 드레스]Não precisa ser bonita.[/log]"
1014106-107 = "– [log=하루카 드레스]Não precisa brilhar.[/log]"
1014106-110 = "[wa:1243]– [log=하루카 드레스]Se eu puder [wa:2355]passar o tempo com quem amo...[/log]"
1014106-112 = "– [log=하루카 드레스]Se eu puder [wa:2010]estar com o [wa:961]senhor...[/log]"
1014106-115 = "[wa:3643]– [log=하루카 드레스]Isso já é...[/log]"
1014106-117 = "– [log=하루카 드레스]... O suficiente [wa:1915]para mim.[/log]"
1014106-121 = "(Depois que voltaram para o museu e terminaram a visita, voltou para casa com Haruka)"