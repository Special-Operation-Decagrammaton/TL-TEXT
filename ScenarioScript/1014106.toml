[translation]
1014106-1 = "雑草のように"
1014106-2 = "美術館・ロビー"
1014106-3 = "（ハルカと約束した美術館のロビーに着いた）"
1014106-4 = "せ、先生……！"
1014106-8 = "[ns1] \"ハルカ！\"\n[ns2] \"今日も綺麗だね！\""
1014106-11 = "う、うえぇぇ……。"
1014106-12 = "そ、その……美術館なら、フォーマルな格好のほうが良いと思い……。"
1014106-13 = "き、着てみたのですが……。"
1014106-14 = "そ、それに、先生が綺麗っておっしゃってくださったので……。"
1014106-18 = "って、もしかして勘違いだったでしょうか！？調子に乗っていたり、しますか？"
1014106-19 = "[s3] \"ううん。\"\n[s4] \"そんなことない。\"\n[s5] \"完璧だよ。\""
1014106-23 = "ふ、ふえぇぇ……。"
1014106-24 = "か、完璧だなんて……うう……。"
1014106-25 = "[s] \"ところで、この美術館は何がテーマなの？\""
1014106-26 = "あっ、そうでした……。"
1014106-27 = "そ、その、今回のテーマは「雑草」です。"
1014106-28 = "著名な芸術家10人が作った様々な作品が展示されていて……。"
1014106-29 = "中には、ワイルドハントの生徒もいると……。"
1014106-30 = "……そう、パンフレットに書かれています。"
1014106-31 = "[s] \"たしかにハルカが好きそうな内容だね。\""
1014106-32 = "そ、それはつまり……。"
1014106-33 = "先生からすれば興味のないテーマだということですね……。"
1014106-34 = "す、すみません！チケット代はお返ししますので……！"
1014106-35 = "[s] \"と、とりあえず入ろうか！\""
1014106-36 = "え？あ、はい！！"
1014106-38 = "（ハルカと一緒に入場した）"
1014106-40 = "美術館の中"
1014106-42 = "わぁ……。"
1014106-43 = "[s6] \"ハルカ、これ見て。\"\n[s7] \"本物の雑草も展示してあるよ。\""
1014106-46 = "本当ですか！？"
1014106-52 = "先生。そ、それは違います。"
1014106-53 = "それっぽく作られていますが……本物じゃありません。"
1014106-54 = "[s8] \"……本当だ！\"\n[s9] \"金属の板に細工して作られている！\""
1014106-57 = "ほ、本物の雑草で作られているのはこっちです。"
1014106-58 = "雑草をキャンバスの上にくっつけて絵にしたものらしいです。"
1014106-59 = "あ、そういえばあっちには……。"
1014106-64 = "（ハルカと一緒に館内をゆっくり見て回った）"
1014106-65 = "（二人にしか聞こえない小さな声で、感想を交えながら）"
1014106-67 = "どれも素敵な作品ですね。"
1014106-68 = "それに……館内もすごく広くて。"
1014106-69 = "[s] \"ちょっと一休みしようか？\""
1014106-70 = "え？あ、はい！"
1014106-72 = "（ハルカと一緒に、廊下に出た）"
1014106-74 = "[ns] \"どうだった、ハルカ？\""
1014106-75 = "よ、よかったです。"
1014106-76 = "雑草でここまでアートになるんだって……。"
1014106-77 = "で、でも……。"
1014106-78 = "その、えっと……。"
1014106-79 = "[s] \"何か気になることがあるんだね。\""
1014106-80 = "……はい。"
1014106-81 = "でも……言ってもいいんでしょうか？"
1014106-82 = "私よりずっと賢くて凄い人たちが作ったものに、口出しなど……。"
1014106-83 = "それに、的はずれなことを言ってしまったら……。"
1014106-84 = "[s] \"間違ったっていいんじゃない？\""
1014106-85 = "……はい？"
1014106-86 = "[s10] \"誰だって間違えることはあるよ。\"\n[s11] \"私も、ハルカも、そしてこれを作った人たちも。\""
1014106-89 = "……。"
1014106-90 = "……本当に、全部素晴らしい作品だと思います。"
1014106-91 = "雑草を使ってこれほど美しく表現できることにも、驚きました。"
1014106-92 = "でも……。"
1014106-95 = "[wa:1237]― [log=하루카 드레스]……雑草が好きなのは、[wa:2833]美しいからじゃ、[wa:2090]ないです。[/log]"
1014106-97 = "― [log=하루카 드레스]私は、[wa:1671]雑草の[wa:978]硬いところが好きなんです。[/log]"
1014106-100 = "[wa:637]― [log=하루카 드레스]どんな荒地でも[wa:1771]強く根を張る、[wa:1582]粘り強さ――[/log]"
1014106-102 = "― [log=하루카 드레스]それこそが、[wa:1966]私の理想。[/log]"
1014106-105 = "[wa:613]― [log=하루카 드레스]美しくある必要はありません。[/log]"
1014106-107 = "― [log=하루카 드레스]輝かなくても[wa:1465]いいんです。[/log]"
1014106-110 = "[wa:1243]― [log=하루카 드레스]大切な人と、[wa:2355]ただ過ごせるなら……。[/log]"
1014106-112 = "― [log=하루카 드레스]せ、[wa:961]先生と[wa:2010]一緒にいられるのなら……。[/log]"
1014106-115 = "[wa:3643]― [log=하루카 드레스]私は、[wa:1681]それで……。[/log]"
1014106-117 = "― [log=하루카 드레스]……好き、[wa:1915]なんです。[/log]"
1014106-121 = "（その後、館内に戻り鑑賞を終えたあと、ハルカと一緒に帰ってきた）"
