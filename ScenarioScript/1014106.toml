[translation]
1014106-1 = "Like a Weed"
1014106-2 = "Art Museum - Lobby"
1014106-3 = "(I arrived at the art museum lobby where I promised to meet Haruka.)"
1014106-4 = "S-Sensei...!"
1014106-8 = "[ns1] \"Haruka!\"\n[ns2] \"You look beautiful today!\""
1014106-11 = "U-uueee..."
1014106-12 = "I-I thought... that for an art museum, it would be better to wear something formal..."
1014106-13 = "S-so I tried wearing this..."
1014106-14 = "A-and, since you said I looked beautiful, Sensei..."
1014106-18 = "Wait, was that a misunderstanding!? Am I getting ahead of myself?"
1014106-19 = "[s3] \"No, not at all.\"\n[s4] \"That's not true.\"\n[s5] \"You look perfect.\""
1014106-23 = "F-fueee..."
1014106-24 = "P-perfect... uuu..."
1014106-25 = "[s] \"By the way, what is the theme of this museum?\""
1014106-26 = "Ah, that's right..."
1014106-27 = "T-the theme this time is 'Weeds'."
1014106-28 = "They have various works created by ten famous artists on display..."
1014106-29 = "And apparently, some of the students from Wild Hunt are among them..."
1014106-30 = "...That's what it says in the pamphlet."
1014106-31 = "[s] \"That certainly sounds like something you'd like, Haruka.\""
1014106-32 = "D-does that mean..."
1014106-33 = "It's a theme you have no interest in, Sensei..."
1014106-34 = "I-I'm sorry! I'll pay you back for the ticket...!"
1014106-35 = "[s] \"L-let's just head inside!\""
1014106-36 = "Eh? Oh, yes!!"
1014106-38 = "(I entered the museum with Haruka.)"
1014106-40 = "Inside the Art Museum"
1014106-42 = "Wow..."
1014106-43 = "[s6] \"Haruka, look at this.\"\n[s7] \"They even have real weeds on display.\""
1014106-46 = "Really!?"
1014106-52 = "Sensei, t-that's not quite right."
1014106-53 = "It's made to look like one, but... it's not real."
1014106-54 = "[s8] \"...You're right!\"\n[s9] \"It's crafted out of metal plates!\""
1014106-57 = "T-the one made of real weeds is over here."
1014106-58 = "It seems they attached weeds to a canvas to create the painting."
1014106-59 = "Oh, come to think of it, over there..."
1014106-64 = "(I walked around the museum slowly with Haruka.)"
1014106-65 = "(Sharing our thoughts in voices only the two of us could hear.)"
1014106-67 = "Every piece is wonderful."
1014106-68 = "And... the museum is so spacious, too."
1014106-69 = "[s] \"Should we take a short break?\""
1014106-70 = "Eh? Oh, yes!"
1014106-72 = "(I went out into the hallway with Haruka.)"
1014106-74 = "[ns] \"How was it, Haruka?\""
1014106-75 = "I-it was good."
1014106-76 = "To think that weeds could become art like this..."
1014106-77 = "B-but..."
1014106-78 = "Um, well..."
1014106-79 = "[s] \"There's something on your mind, isn't there?\""
1014106-80 = "...Yes."
1014106-81 = "But... is it okay for me to say it?"
1014106-82 = "Who am I to criticize things made by people much smarter and more amazing than me..."
1014106-83 = "Besides, what if I say something completely off the mark..."
1014106-84 = "[s] \"Isn't it okay to be wrong sometimes?\""
1014106-85 = "...Yes?"
1014106-86 = "[s10] \"Everyone makes mistakes.\"\n[s11] \"Me, you, and even the people who made these.\""
1014106-89 = "..."
1014106-90 = "...They really are all wonderful works."
1014106-91 = "I was surprised that weeds could be used to express such beauty."
1014106-92 = "But..."
1014106-95 = "[wa:1237]― [log=하루카 드레스]...I don't like weeds because they're [wa:2833]beautiful, [wa:2090]Sensei.[/log]"
1014106-97 = "― [log=하루카 드레스]I like [wa:1671]the [wa:978]toughness of weeds.[/log]"
1014106-100 = "[wa:637]― [log=하루카 드레스]The tenacity to [wa:1771]take root strongly, [wa:1582]no matter how barren the land――[/log]"
1014106-102 = "― [log=하루카 드레스]That is [wa:1966]my ideal.[/log]"
1014106-105 = "[wa:613]― [log=하루카 드레스]They don't need to be beautiful.[/log]"
1014106-107 = "― [log=하루카 드레스]They don't even have to [wa:1465]shine.[/log]"
1014106-110 = "[wa:1243]― [log=하루카 드레스]As long as I can just spend time [wa:2355]with someone precious...[/log]"
1014106-112 = "― [log=하루카 드레스]As long as I can be [wa:961]with you, [wa:2010]Sensei...[/log]"
1014106-115 = "[wa:3643]― [log=하루카 드레스]That is [wa:1681]enough for me...[/log]"
1014106-117 = "― [log=하루카 드레스]...That's why [wa:1915]I like them.[/log]"
1014106-121 = "(After that, we returned to the gallery, finished our viewing, and headed home together.)"