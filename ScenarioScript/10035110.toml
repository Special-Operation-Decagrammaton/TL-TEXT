[translation]
10035110-1 = "Episódio 11; Epílogo"
10035110-3 = "Com licença!"
10035110-4 = "Kirino Nakatsukasa, do Departamento de Segurança Pública, veio aqui a negócios com o Departamento de Segurança!"
10035110-5 = "Posso entrar?!"
10035110-6 = "Eu já disse que não precisa disso."
10035110-7 = "É verdade... foi assim da última vez também, não tem ninguém para responder..."
10035110-8 = "Pois é, por isso é só entrar de uma vez."
10035110-9 = "Além disso, fomos chamadas pelo próprio Departamento de Segurança hoje."
10035110-10 = "Ah, é verdade!"
10035110-11 = "Por causa da recompensa especial pelo destacamento da última vez!"
10035110-12 = "Recompensa especial, que som maravilhoso..."
10035110-13 = "O que será que vão dar? 11 dias de férias especiais?#nOu talvez um mês de rodízio liberado no Master Donuts?"
10035110-14 = "Quem sabe, talvez finalmente!#nSejamos recrutadas especialmente para o Departamento de Guarda ou para o Departamento de Segurança!"
10035110-15 = "Disso eu prefiro passar..."
10035110-22 = "Vocês duas, o que estão fazendo?"
10035110-23 = "Não fiquem paradas na porta conversando.#nEntrem ou saiam da frente."
10035110-25 = "Ah! Chefe Kanna, do Departamento de Segurança!"
10035110-26 = "Com essa cara de cansada de sempre, hein."
10035110-28 = "Tanto faz, entrem logo."
10035110-29 = "O vice-chefe preparou uma recompensa especial para vocês."
10035110-30 = "Oh, essa é uma boa notícia."
10035110-31 = "Ei, ei, qual é a recompensa? Me conta em segredo."
10035110-32 = "Não, eu também não sei."
10035110-44 = "Atchim!"
10035110-49 = "Ah, você chegou, chefe."
10035110-50 = "...Pegou um resfriado?"
10035110-51 = "Atchim!"
10035110-52 = "É, bem, não se preocupe com isso.#nTem um motivo por trás."
10035110-53 = "De qualquer forma, timing perfeito. Estava esperando por vocês."
10035110-54 = "Bom dia! Vice-chefe!#nKirino Nakatsukasa, do Departamento de Segurança Pública!"
10035110-55 = "Ah~ a chefe sempre cuida bem de mim!"
10035110-56 = "Qualquer dia desses vamos comer um gyudon juntos."
10035110-58 = "Parem com a conversa fiada."
10035110-59 = "Elas vieram buscar a recompensa. Sejam rápidas."
10035110-60 = "É verdade. Então, por favor, peguem isto!"
10035110-62 = "Oh, finalmente!"
10035110-63 = "É um envelope pequeno, né?"
10035110-65 = "Tem um para mim também... O que é isso?"
10035110-66 = "Por favor, abra."
10035110-76 = "Isso é..."
10035110-77 = "Um ingresso para o parque aquático 'Aegir'?"
10035110-79 = "Acertou!"
10035110-80 = "Heroínas, retornem ao local das suas memórias!"
10035110-81 = "O parque aquático agora as receberá como clientes!"
10035110-82 = "...O que acham?#nAcho que será uma lembrança especial... ué, por que estão assim?"
10035110-83 = "Pessoal, por que estão com essas caras?"
10035110-84 = "Ir lá de novo? Já chega, não aguento mais."
10035110-89 = "Eu também, sabe... ainda estou com dor muscular..."
10035110-91 = "Para mim é desnecessário. Vou recusar."
10035110-96 = "A-ah, é mesmo?"
10035110-97 = "Por que isso, Senpai? Quando voltamos do parque aquático, você estava todo sorridente, não estava?"
10035110-98 = "A piscina não foi divertida para você?"
10035110-99 = "Sorridente? Não, eu não tenho interesse em brincar na água."
10035110-100 = "Se eu estava rindo... deve ter sido por outro motivo."
10035110-101 = "......Aconteceu alguma coisa boa?"
10035110-107 = "Hmph, isso é informação confidencial."
