[translation]
10035110-1 = "第11話;エピローグ"
10035110-3 = "失礼します！"
10035110-4 = "生活安全局の[ruby=なかつかさ]中務[/ruby]キリノ、公安局に用があって、参りました！"
10035110-5 = "入室してもよろしいでしょうか！"
10035110-6 = "だから、そういうの要らないって。"
10035110-7 = "たしかに……この前もそうでしたけど、返事してくれる人がいません……。"
10035110-8 = "そうそう、だから適当に入っちゃえばいいんだよ。"
10035110-9 = "それに、今日は公安局のほうから呼ばれて来てるんだからさ。"
10035110-10 = "あ、そうでしたね！"
10035110-11 = "この前の出向の特別報酬の件で！"
10035110-12 = "特別報酬、なんて素敵な響き……。"
10035110-13 = "何をくれるんだろうねー？11日間の特別休暇？#nそれとも、マスタードーナッツの1ヶ月食べ放題？"
10035110-14 = "もしかしたら、ついに！#n警備局か公安局に特別スカウトされるかもしれません！"
10035110-15 = "それは遠慮したいなぁ……。"
10035110-22 = "お前たち、何をしている。"
10035110-23 = "ドアの前で突っ立って話をするな。#n中に入るか避けるかにしろ。"
10035110-25 = "あっ！カンナ公安局長！"
10035110-26 = "相変わらず、疲れた顔だねぇ。"
10035110-28 = "いいから入れ。"
10035110-29 = "副局長が特別に報酬を用意しているそうだ。"
10035110-30 = "おぉ、それはいい知らせだ。"
10035110-31 = "ねえねえ、報酬ってなんなの？こっそり教えてよ。"
10035110-32 = "いや、私も知らないんだ。"
10035110-44 = "はっくしょん！"
10035110-49 = "あ、来たんすね、姉御。"
10035110-50 = "……風邪でも引いたか？"
10035110-51 = "はくしょん！"
10035110-52 = "ええ、ま、気にしないでほしいっす。#nちょいと事情がありまして。"
10035110-53 = "とにかく、ナイスタイミングっす。待ってたっすよ。"
10035110-54 = "おはようございます！副局長！#n生活安全局所属、中務キリノです！"
10035110-55 = "あぁ～いつも姉御が世話になってるっす！"
10035110-56 = "今度一緒に牛丼でも食べに行くとしましょう。"
10035110-58 = "雑談はやめろ。"
10035110-59 = "彼女たちは報酬を受け取りに来たんだ。手早く済ませろ。"
10035110-60 = "そうっすね。ではでは、これを受け取ってくださいっす！"
10035110-62 = "おぉ、ついに！"
10035110-63 = "小さな封筒ですね？"
10035110-65 = "私にもあるのか……。なんだ、これは？"
10035110-66 = "開けてみてください。"
10035110-76 = "これは……。"
10035110-77 = "ウォーターパーク「エーギル」の利用券？"
10035110-79 = "正解っす！"
10035110-80 = "功労者よ、思い出の地に戻れ！"
10035110-81 = "ウォーターパークは、今度は客として諸君らを歓迎する！"
10035110-82 = "……って言うのはどうっすか？#n特別な思い出になると思うんすけど……って、あれ？"
10035110-83 = "皆さん、顔色が悪くないっすか？"
10035110-84 = "まーたあそこに行けって？もうこりごりだよ。"
10035110-89 = "本官も、その……まだ筋肉痛でして……。"
10035110-91 = "私には不要だ。辞退しよう。"
10035110-96 = "あ、あれれ？"
10035110-97 = "なんでっすか。先輩。#nウォーターパークから帰ってきた時、ニコニコでしたよね？"
10035110-98 = "プール、楽しかったんじゃなかったんすか？"
10035110-99 = "ニコニコだった？いや、水遊びの趣味はない。"
10035110-100 = "笑っていたなら……、別の理由だ。"
10035110-101 = "……何かいいことがあったっすか？"
10035110-107 = "ふっ、機密事項だ。"
