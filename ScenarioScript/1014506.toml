[translation]
1014506-1 = "青い蝶"
1014506-2 = "[ns] \"呼ばれて来たけど……どこに行くの……？\""
1014506-3 = "うむ。"
1014506-4 = "せっかく水着を用意したのじゃ。"
1014506-5 = "この装いでこそ楽しめる場に行ってみたいのじゃが……。"
1014506-6 = "妾と一緒は嫌か？"
1014506-7 = "[s] \"そんなわけない！\""
1014506-11 = "[ns] \"どこ行こっか！！\""
1014506-12 = "ふむ……。"
1014506-13 = "とはいえ、こういったことには疎くてのう。"
1014506-14 = "其方なら、妾よりは詳しいじゃろうて。"
1014506-15 = "ここからは委ねてもよいか？"
1014506-17 = "（必死に候補をひねり出した）"
1014506-21 = "海……。"
1014506-22 = "噂に聞いた通りじゃ。"
1014506-23 = "たしかに――"
1014506-24 = "[s] \"たしかに？\""
1014506-25 = "暑い。"
1014506-26 = "刺すような強い日差し。"
1014506-27 = "白浜は熱され、裸足では危険じゃろうな。"
1014506-28 = "塩気を含んだ風は、水辺とはまた異なった香り……。"
1014506-29 = "肌にまとわりつく感覚は……汗と塩が混ざり合った結果かの。"
1014506-30 = "これが海、か……記憶に深く刻まれそうじゃ。"
1014506-31 = "[s] \"お気に……召しませんでしたか？\""
1014506-32 = "うむ。"
1014506-33 = "「日焼け止め」なるものを其方が塗ってくれれば、あるいは？"
1014506-35 = "（キサキに日焼け止めをくまなく塗ってあげた）"
1014506-37 = "海水……。"
1014506-41 = "……しょっぱいのう。"
1014506-42 = "どことなく、浮力も強いように思う。"
1014506-43 = "……。"
1014506-44 = "2人乗りの浮き輪を用意した。一緒にどうかえ？"
1014506-45 = "ん？流されないように外で掴んでおく……？"
1014506-46 = "……。"
1014506-47 = "それもそうじゃな。では頼む。"
1014506-48 = "ただ……。"
1014506-49 = "2人乗りなんじゃがのう……。"
1014506-52 = "おお……揺れる……。これが波じゃな。"
1014506-53 = "川とはまた異なる趣があるのう。"
1014506-54 = "あれはカモメと言ったか……ずっと頭上を飛んでおるな。"
1014506-55 = "ふむ……？#n食べ物を狙っているから与えてはならぬ……とはどういうことじゃ？"
1014506-56 = "ほう……1つを与えられれば2つを求めかねん、と。"
1014506-57 = "まったく……人も動物も、足るを知らん生き物じゃの。"
1014506-59 = "これが「海の家」か……ふむ、ふむ。"
1014506-60 = "かき氷に焼きそば、焼きトウモロコシとな……。"
1014506-61 = "……。"
1014506-62 = "観光地が故に、それなりに値が張るのも理解できよう。"
1014506-63 = "とはいえ、玄武商会の子らがこれを見てどのような反応をするかは――"
1014506-64 = "まあ良い。これも全て、風情の1つなのじゃろう。"
1014506-65 = "では先生。美味しくいただこうぞ。"
1014506-67 = "ウォーターパーク……話には聞いておったが……。"
1014506-68 = "これほどの施設が、娯楽の目的だけで建てられておるとは圧巻じゃな。"
1014506-69 = "そうさな。まずは「ウォータースライダー」なるものを体験するとしよう。"
1014506-75 = "ひあああああああっ！？！？"
1014506-78 = "受け止めてくれたこと、礼を言わせてくれ。"
1014506-81 = "ほう？温水のプールもあるとは……。"
1014506-82 = "冷えた体にはちょうど良いかの。"
1014506-83 = "[s] \"ゆっくり温まってきてね。\""
1014506-84 = "何を言っておる。"
1014506-85 = "其方も一緒じゃ。"
1014506-86 = "[ns] \"私も！？\""
1014506-88 = "（その足で温水プールへ入り……）"
1014506-89 = "（いつもより少し距離の近いキサキと一緒に温まった）"
1014506-91 = "波のプール……。"
1014506-92 = "海でおおかた体験はしたが、人工的な波とはな……。"
1014506-93 = "意図的な危険はスリルという娯楽になると聞く。"
1014506-94 = "あっ！気をつけて！火山が噴火しました！"
1014506-95 = "大きな波が押し寄せてきますよー！！"
1014506-96 = "波の高さはなんと最大2.4メートル！飲み込まれないように注意してね！"
1014506-97 = "受けて立つとしよう。"
1014506-102 = "わっぷ……。"
1014506-103 = "（あっという間に波にのまれたキサキをなんとか掴んだ）"
1014506-104 = "先生、礼を言う。"
1014506-105 = "ああ、大丈夫じゃ。其方が掴んでいてくれたからの。"
1014506-106 = "……。"
1014506-107 = "その……。"
1014506-108 = "もう一度……ダメかえ？"
1014506-109 = "[s1] \"いいけど……。\"\n[s2] \"一応気をつけようね。\""
1014506-112 = "もちろんだとも。"
1014506-113 = "と言っても……妾をひしと掴んだ手。#n怪我など其方が許さぬであろう？"
1014506-114 = "――また波がくるよ！！"
1014506-120 = "（キサキは心から波のプールを楽しんでいるようだった）"
1014506-122 = "ふう……。"
1014506-123 = "[ns] \"どうだった？\""
1014506-124 = "そうじゃの……。"
1014506-125 = "……記憶に深く刻まれるような、そんな1日じゃった。"
1014506-126 = "其方には感謝してもしきれぬな。"
1014506-127 = "もう、いつ終わりが来たとしても悔いはないのう。"
1014506-128 = "[s] \"え……？\""
1014506-129 = "ふふ、なんという顔をしておる。"
1014506-130 = "ただの冗談じゃよ。"
1014506-131 = "しかし……今日を振り返って、ある話を思い出した。"
1014506-132 = "――山海経に伝わる昔話じゃ。"
1014506-133 = "[s] \"どんなお話なの？\""
1014506-134 = "そうさな……。"
1014506-135 = "あるところに、学問を志す少女がいた。#nしかし家からは反対されていての。"
1014506-136 = "故に変装して家を後にし、少女は学び舎への入学を成し遂げる。#n念願が成就したのじゃ。そこからは学問に明け暮れた。"
1014506-137 = "その過程で、少女は1人の学友を得ることとなる。"
1014506-138 = "学問と絆を、決して諦めない。2人は固く誓い合った。"
1014506-139 = "しかし少女は家の者に見つかり、成す術もなく引き裂かれてしまう。"
1014506-140 = "孤独に耐えられなかった学友はというと……体を壊し、帰らぬ人となった。"
1014506-141 = "そして日が経った頃……少女は学友の墓を見つける。"
1014506-142 = "悲痛に耐え切れず、声を上げて泣いた。#nその瞬間、墓が動き出し……2人は蝶となり、どこかへ消えていったという。"
1014506-143 = "[s3] \"考えさせられる話だね……。\"\n[s4] \"でも……どうしてその話を？\""
1014506-146 = "なに、些か強引な世迷言じゃよ。"
1014506-147 = "妾は「水着」に身を包み、先生の案内を通じて「水着に相応しき場所」を訪れた。"
1014506-148 = "つまり……これは変装していると言えるのではないか？"
1014506-149 = "そして生徒の務めは勉強であり、すなわち学問を志す者じゃ。"
1014506-150 = "[s] \"なる、ほど……？\""
1014506-151 = "そういう反応かの。"
1014506-152 = "いいや、これくらいで丁度いいのやもしれぬな。"
1014506-153 = "ただ、覚えておくとよい。山海経において「蝶のペア」は特別な意味を有する。"
1014506-154 = "加えて「青い蝶」は、不滅の象徴じゃ。"
1014506-155 = "言い換えるのならば、「諦めを知らぬ」ということ。"
1014506-157 = "（キサキが伝えようとしてくれたことは、きっと半分も理解できなかった）"
1014506-162 = "（それでもキサキはいつもより楽しそうで、飾らない姿に見えた）"
