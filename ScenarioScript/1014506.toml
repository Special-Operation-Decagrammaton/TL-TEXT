[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
1014506-1 = "Borboleta Azul"
1014506-2 = "[ns] \"Você me chamou, mas... Onde exatamente nós estamos indo...?\""
1014506-3 = "Umu."
1014506-4 = "Tivemos todo o trabalho para preparar esses maiôs."
1014506-5 = "Achei que seria de muito bom grado visitar algum lugar adequado, para onde esse traje seja verdadeiramente apreciado..."
1014506-6 = "A minha companhia é desagradável para você?"
1014506-7 = "[s] \"De jeito nenhum!\""
1014506-11 = "[ns] \"Então, para onde vamos!?\""
1014506-12 = "Fufu..."
1014506-13 = "Na verdade... não sou muito familiarizada com esse tipo de destino."
1014506-14 = "Você com certeza tem muito mais experiência e conhecimento do que eu nesses assuntos."
1014506-15 = "Sendo assim, você guiaria os nossos passos daqui em diante?"
1014506-17 = "(Tive que espremer o meu cérebro para dar algumas boas opções de última hora)"
1014506-21 = "O mar..."
1014506-22 = "É exatamente como os contos e rumores diziam."
1014506-23 = "Decerto――"
1014506-24 = "[s] \"Decerto?\""
1014506-25 = "Faz bastante calor."
1014506-26 = "Esses raios de sol penetrantes chegam a perfurar a pele."
1014506-27 = "E a areia branca, fervilhando assim... pisar descalça por ali deve ser um perigo."
1014506-28 = "A brisa perfumada de sal traz um cheiro totalmente distinto do cheiro da beira do rio..."
1014506-29 = "Essa sensação pegajosa grudando na pele... Deve ser uma mistura do sal na brisa com o suor dos nossos corpos."
1014506-30 = "Então este é o mar... Acredito que ele ficará marcado profundamente nas minhas memórias."
1014506-31 = "[s] \"Você... não gostou muito daqui?\""
1014506-32 = "Umu."
1014506-33 = "Mas se você passar esse tal de 'protetor solar' no meu corpo... talvez isso mude?"
1014506-35 = "(Passei o protetor com cuidado e cobri cada centímetro da pele da Kisaki)"
1014506-37 = "A água do oceano..."
1014506-41 = "......É realmente muito salgada."
1014506-42 = "E não sei por que, mas parece que aqui as coisas flutuam com mais facilidade."
1014506-43 = "......"
1014506-44 = "Eu providenciei uma boia para duas pessoas. Quer vir boiar comigo?"
1014506-45 = "Hm? Você vai ficar agarrado pro lado de fora pra garantir que a gente não seja levado pela correnteza...?"
1014506-46 = "......"
1014506-47 = "Realmente, não podemos nos esquecer da segurança. Nesse caso, conto com você."
1014506-48 = "No entanto..."
1014506-49 = "Foi um baita desperdício eu ter arrumado uma boia para dois..."
1014506-52 = "Oh... isso está balançando bem mais do que eu pensava... Então são essas as famosas ondas."
1014506-53 = "A sensação é muito diferente de flutuar num rio."
1014506-54 = "Aqueles pássaros... você disse que são gaivotas? Elas estão voando em círculos sobre nós há um bom tempo."
1014506-55 = "Fufu...? \nEles querem a nossa comida, por isso não devemos alimentá-los... O que isso quer dizer?"
1014506-56 = "Entendo... Se dermos a mão, eles vão querer o braço, e isso acaba mal para todo mundo."
1014506-57 = "Meu Deus... Tanto humanos quanto animais são criaturas que não sabem quando estão satisfeitas."
1014506-59 = "Então isso é o que chamam de 'Casa de Praia'... Fascinante, fascinante."
1014506-60 = "Temos raspadinhas, yakisoba, milho assado..."
1014506-61 = "......"
1014506-62 = "Considerando que é um ponto turístico de luxo, posso entender os preços salgados."
1014506-63 = "Porém, não consigo nem imaginar a cara que as crianças da Genbu Express fariam se vissem esse cardápio... Bem, deixemos isso para lá."
1014506-64 = "Tudo bem, não vou me importar com isso. Suponho que os preços inflacionados também façam parte do charme do passeio."
1014506-65 = "Pois bem, Sensei. Vamos saborear isso sem remorsos."
1014506-67 = "Um parque aquático... Eu já tinha ouvido histórias sobre eles, mas..."
1014506-68 = "O fato de terem erguido instalações grandiosas como estas puramente para entretenimento e diversão... Chega a ser impressionante."
1014506-69 = "Bem, o que estamos esperando? Vamos começar indo naquele tal 'Toboágua' primeiro."
1014506-75 = "Hyaaaaaaaaaaaah!?!?!"
1014506-78 = "Agradeço do fundo do meu coração por você ter segurado e amortecido a minha queda ali no final."
1014506-81 = "Oho? Tem até uma piscina de águas termais... "
1014506-82 = "Talvez isso seja a coisa perfeita para aquecer um corpo gelado."
1014506-83 = "[s] \"Pode ir relaxar e esquentar o seu corpo com calma, vou te esperar aqui.\""
1014506-84 = "Mas de que loucura você está falando?"
1014506-85 = "Você vem junto."
1014506-86 = "[ns] \"Eu também!?\""
1014506-88 = "(E fomos arrastados para a piscina termal...)"
1014506-89 = "(Passei um tempo bem relaxante me aquecendo com a Kisaki numa distância muito mais íntima e próxima do que o habitual)"
1014506-91 = "Uma piscina de ondas..."
1014506-92 = "Acabamos de experimentar as verdadeiras no mar, então qual o sentido de criar ondas artificiais? Que peculiar."
1014506-93 = "Dizem que induzir situações de risco artificialmente e sentir um friozinho na espinha se tornou uma forma popular de diversão."
1014506-94 = "Oh! Pessoal, tenham cuidado! O vulcão ali atrás acabou de entrar em erupção!"
1014506-95 = "Uma onda gigante está chegando com tudo para engolir vocês!!"
1014506-96 = "A onda tem uma altura monstruosa de até 2,4 metros! Cuidado para não serem levados e engolidos pelo impacto!"
1014506-97 = "Muito bem, que venha. Deixe-me ver do que essa ondinha é capaz."
1014506-102 = "Pwahh... *glub*"
1014506-103 = "(Agarrei os braços da Kisaki por instinto assim que ela foi engolida e levada pela onda no mesmo piscar de olhos)"
1014506-104 = "Sensei. Receba os meus agradecimentos."
1014506-105 = "Sim, estou completamente a salvo. Graças às suas mãos firmes que não me soltaram de jeito nenhum."
1014506-106 = "......"
1014506-107 = "Ahn..."
1014506-108 = "Eu... nós... podemos ir de novo? Por favor...?"
1014506-109 = "[s1] \"Até podemos, mas...\"\n[s2] \"Vamos ter que prestar um pouco mais de atenção e tomar mais cuidado.\""
1014506-112 = "Mas é óbvio que sim."
1014506-113 = "Mas de qualquer forma... essas mãos fortes que se agarraram a mim me trazem muita segurança.\nVocê jamais permitiria que eu me machucasse, não é?"
1014506-114 = "――Vem aí outra onda gigante!!"
1014506-120 = "(A Kisaki parecia estar curtindo as ondas do fundo do coração)"
1014506-122 = "Ufa..."
1014506-123 = "[ns] \"E então, como foi a experiência de hoje?\""
1014506-124 = "Vejamos..."
1014506-125 = "......Eu sinto que vivi hoje um dia que ficará marcado em mim eternamente, cravado de forma profunda."
1014506-126 = "Não tenho nem palavras o suficiente para expressar o quão grata sou por você."
1014506-127 = "Neste momento, sinto que não deixaria absolutamente nenhum arrependimento para trás... mesmo se os meus dias chegassem ao fim."
1014506-128 = "[s] \"Eh...?\""
1014506-129 = "Fufu, por que ficou com o rosto tão pálido?"
1014506-130 = "Foi apenas uma brincadeirinha inofensiva."
1014506-131 = "No entanto... ao olhar para trás e absorver o que vivemos hoje, acabei lembrando de uma certa lenda."
1014506-132 = "――É uma história muito antiga de Shanhaijing."
1014506-133 = "[s] \"E que tipo de história seria essa?\""
1014506-134 = "Era assim... "
1014506-135 = "Era uma vez uma jovem que nutria um amor profundo pelo estudo e pela academia.\nMas a sua família era contra esse sonho e se opunha firmemente."
1014506-136 = "Por isso, a jovem se disfarçou com outras vestes e fugiu de casa,\nconseguindo finalmente ingressar em uma academia e alcançar seu sonho tão amado. Lá, ela dedicou toda a sua vida e todo o seu tempo apenas ao aprendizado."
1014506-137 = "E no meio de todos os estudos incessantes, a garota acabou ganhando e criando laços com um amigo de turma incrivelmente especial."
1014506-138 = "Os dois fizeram um pacto solene de que jamais, sob nenhuma hipótese, abandonariam os seus estudos e o forte vínculo que tinham formado."
1014506-139 = "Contudo, as pessoas da família logo a encontraram disfarçada... O que a deixou completamente impotente e incapaz de lutar contra a família, e ela foi levada embora, arrastada para longe da amizade e da vida de estudos."
1014506-140 = "Por outro lado, o seu grande amigo da escola que sobrou sozinho, não suportando a amarga solidão da separação... acabou adoecendo fisicamente, a dor foi tamanha que o corpo definhou... e a sua alma deixou a vida para sempre."
1014506-141 = "A garota também lutava contra a doença e a solidão, mas alguns dias depois... quando ela fugiu novamente... a única coisa que achou de seu melhor amigo... foi a lápide intocada onde ele descansava."
1014506-142 = "A garota se agarrou ao túmulo, gritando em prantos de dor, sua angústia não tinha mais limites.\nE então... de repente, a sepultura que guardava o seu amado amigo, se moveu... e se abriu.\nQuando os dois se reencontraram, eles deixaram os corpos carnais para trás, se transformaram em duas belas borboletas unidas e imortais, e sumiram sem deixar rastro pelos céus, fugindo para sempre desse mundo amaldiçoado..."
1014506-143 = "[s3] \"Uma história comovente, que traz muita reflexão...\"\n[s4] \"Mas... de onde tirou e por que se lembrou dessa lenda agora?\""
1014506-146 = "Deixe pra lá, é apenas um pensamento sem pé nem cabeça que me veio à mente... Pura bobagem."
1014506-147 = "No entanto... Se pensar bem: Eu me disfarcei num 'traje de banho' diferente e... com o Sensei me guiando com a mão... nós percorremos os 'lugares perfeitos para usar esse disfarce'."
1014506-148 = "Se eu fosse usar uma palavra mais forte... Isso poderia muito bem ser chamado de meu 'disfarce' e da 'minha fuga da família' para ter um tempo só nosso... não acha?"
1014506-149 = "Além disso... os deveres de nós, as alunas, é justamente os estudos, o conhecimento.\nLogo, também sou exatamente como ela: uma devota acadêmica que quer viver o que a escola tem a oferecer de melhor com você."
1014506-150 = "[s] \"É, eu imagino... que sim...?\""
1014506-151 = "Fufu. Isso foi uma reação curiosa."
1014506-152 = "Tudo bem, melhor que fique por isso mesmo, talvez seja o ideal no momento."
1014506-153 = "Apenas se lembre disso. Em Shanhaijing, um 'Par de Borboletas' possui um significado de suma importância para nós."
1014506-154 = "E além disso, as 'Borboletas Azuis' são os símbolos da eternidade. Da imortalidade de laços duradouros e inabaláveis."
1014506-155 = "E isso também quer dizer que... 'Se recusar a desistir' é a nossa única opção nesta vida mortal. Eu nunca vou desistir do que nós temos."
1014506-157 = "(Tenho a impressão de que não consegui capturar e decifrar nem metade de tudo o que a Kisaki realmente queria me falar de forma cifrada com essa história...)"
1014506-162 = "(Mas mesmo com todos os mistérios guardados nas borboletas, Kisaki... Eu percebi que ela parecia tão mais solta, transparente e incrivelmente mais viva e feliz do que nunca ao meu lado...)"