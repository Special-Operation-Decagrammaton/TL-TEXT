[translation]
10036050-1 = "第5話;ヘルメット団水鉄砲大会"
10036050-3 = "ただいま戻った。"
10036050-4 = "あっ[ruby=じょうまえ]、錠前さ[/ruby]ん！"
10036050-5 = "おかげでゆっくりできた、礼を言おう。"
10036050-6 = "次の仕事は……。"
10036050-7 = "だ、大丈夫だ！#nゆっくりしていてくれ！"
10036050-11 = "[ns] （さっきの印象が強かったのかな……）"
10036050-12 = "いや、給料をもらっている以上、#n何もしないわけにはいかない。"
10036050-13 = "ステージ近くの掃除でも……"
10036050-17 = "そこの君、手が空いてるのか？"
10036050-23 = "ちょっと助けてほしいんだ！"
10036050-24 = "実は人手が足りなくてな。"
10036050-26 = "すまない。"
10036050-27 = "ここを離れるわけには……。"
10036050-28 = "いやいや、私のことは気にしなくて良いぞ！#n行ってきなさい！"
10036050-29 = "ほ、本当に良いのか……？"
10036050-31 = "もちろんだ！"
10036050-32 = "私にできることがあれば手伝いたいのだが……。"
10036050-33 = "そういえば、何をするのか説明してなかったな。#n実は水鉄砲大会に出てもらいたいんだ！"
10036050-38 = "[ns] \"面白そうだね。\""
10036050-39 = "先生もそう言うのなら……。"
10036050-40 = "分かった、すぐ行こう。"
10036050-44 = "[ns] （三人のところへ行ってみよう……）"
10036050-47 = "あっ、先生。"
10036050-48 = "どこ行ってたの？#nお昼、一緒に食べたかったのに。"
10036050-49 = "[s1] \"ちょっと事情があって。\"\n[s2] \"ちょっと用事ができて。\""
10036050-52 = "ざ、残念です……実は、さっき何かに当選して……#n食べ物をたくさん頂いたんです。"
10036050-53 = "先生も、あの場にいらしたら……。"
10036050-54 = "[s] \"大丈夫だよ、私も食べてきたから。\""
10036050-55 = "じゃあ、またサッちゃんの様子を見に行こう。"
10036050-56 = "どうせまだステージの準備中でしょ。"
10036050-61 = "あーあー、こほん！#nヘルメット団からのお知らせだ！"
10036050-62 = "このあと、ビーチの競技場で各支部のチャンピオンを競う「水鉄砲大会」が開催される！"
10036050-63 = "盛り上がること間違いなし！#n揃って見に来てくれ！"
10036050-64 = "以上で放送を終了する！"
10036050-68 = "[ns] （なら、サオリはビーチに……）"
10036050-69 = "水鉄砲大会……？"
10036050-70 = "実弾は使わないのかな。"
10036050-71 = "[s] \"私たちも見に行こう！\""
10036050-72 = "あれ、サオリ姉さんのところに行くんじゃないんですか？"
10036050-73 = "呑気に大会なんて見ていても、良いんですかね……。"
10036050-74 = "[s] \"もしかしたら、サオリもいるんじゃないかな。\""
10036050-75 = "たしかに……。"
10036050-76 = "みんな、会場に向かってるね。"
10036050-79 = "現在、アウトロービーチにはヘルメット団が勢揃いです！"
10036050-80 = "観客も続々と集まってきましたね。"
10036050-81 = "皆さん、盛り上がっていますか！？"
10036050-82 = "今日、最強のヘルメット団が決定します！"
10036050-83 = "さあ、最後に立っているのは誰なのか！？"
10036050-84 = "これより、水鉄砲大会の開幕です――！"
10036050-91 = "お前ら、よく聞けよ。"
10036050-92 = "ウチらパタパタヘルメット団は、何もしなくて良い。"
10036050-93 = "分かったな？"
10036050-98 = "分かってるって。"
10036050-99 = "（どうしてこんな状況に……）"
10036050-104 = "まあ、どうせ結果は決まってるからな。"
10036050-105 = "それはどういう意味だ？"
10036050-106 = "……ん？"
10036050-107 = "えーと、呼ばれた時に聞いてなかったのか？"
10036050-108 = "……。"
10036050-109 = "ああ。"
10036050-110 = "もちろん任せてくれ。"
10036050-111 = "全力で行こう。"
10036050-112 = "……は？"
10036050-114 = "ルールは簡単！"
10036050-115 = "この水鉄砲を使って……え？本物に見えるって？#nどう見ても水鉄砲じゃないか！"
10036050-116 = "ともかく、これを使って最後まで立っていたチームが優勝です！"
10036050-117 = "それでは各自、スタート位置へ移動してください！"
10036050-120 = "うわっ……人が多すぎます……！"
10036050-121 = "こんなにたくさんの人が……。"
10036050-122 = "ヘルメット団のほとんどが来てるんじゃない？"
10036050-123 = "ど、どこか高いところに……#nあっ、先生、ちょっと良いですか……？"
10036050-124 = "[s3] \"おんぶで大丈夫？\"\n[s4] \"落ちないように気をつけてね。\""
10036050-132 = "え、えへへ……#nせっかくなので、肩車をしていただけませんか……？"
10036050-133 = "[s5] \"うん、分かった。\"\n[s6] ヒヨリを肩に乗せる。"
10036050-139 = "えへへ……高いですね、特等席です……！"
10036050-140 = "なんだかズルしてるような気も……。"
10036050-141 = "……あれ？"
10036050-143 = "どうかした？"
10036050-149 = "「パタパタヘルメット団」の旗を見てください！"
10036050-150 = "すぐ下に、サオリ姉さんが……！"
10036050-155 = "……本当だ。"
10036050-156 = "今度はどうしてこんなところに……。"
10036050-157 = "サオリ姉さん、目が怖いです……#n完全にリーダーの目をしています……！"
10036050-158 = "サッちゃん、大会に参加したんだね。"
10036050-159 = "……楽しんでるみたいで、良かった。"
10036050-160 = "楽しんでる……のかな？"
10036050-161 = "サオリ姉さん、勝てるんでしょうかね……？"
10036050-162 = "まぁ、ヘルメット団が相手なら心配ないと思うけど……。"
10036050-163 = "相手の数によるかな。"
10036050-164 = "もし負けちゃっても……。"
10036050-165 = "サッちゃんが楽しめたなら、それで良いと思う。"
10036050-168 = "なんか盛り上がってるなぁ。#n結果なんて決まりきってるのによ。"
10036050-169 = "本当だぜ、まったくよ。"
10036050-170 = "「トゲトゲヘルメット団」が勝つことになってんだよな？"
10036050-171 = "みんな知ってると思ってたぜ。"
10036050-172 = "ま、こういう雰囲気は嫌いじゃないし放っておくか。"
10036050-176 = "[ns] \"ヤラセ……？\""
10036050-181 = "……見過ごせない。"
10036050-182 = "サオリ姉さん、あんなに頑張ってるのに、ひどいです……！"
10036050-183 = "……リーダーに知らせないと。"
10036050-189 = "え、えへへ……#n先生、私はもう少し肩車をしてもらっても良いですか？"
10036050-192 = "よーい……。"
10036050-194 = "スタート！"
10036050-195 = "ふっ！"
10036050-199 = "は、早い！"
10036050-200 = "なんだアイツ！？"
10036050-210 = "次！"
10036050-211 = "こっちだぜ！"
10036050-216 = "なっ！？"
10036050-221 = "うわっ！"
10036050-227 = "ど、どうなってるんだ？"
10036050-228 = "台本と違うぞ……。"
10036050-229 = "スタッフ！スタッフはいないのか！？"
10036050-231 = "話が違うだろ！"
10036050-232 = "チッ！#nしゃあない、アイツを倒すしかねぇ！"
10036050-233 = "もしかして、ヤラセがバレないよう演技してるのか？"
10036050-234 = "知るか！#nとりあえず倒すぞ！"
10036050-236 = "数で押し込むのは良い作戦だが……。"
10036050-237 = "支部同士の争いなんじゃなかったか？"
10036050-244 = "やれ――！"
10036050-251 = "うわっ！？"
