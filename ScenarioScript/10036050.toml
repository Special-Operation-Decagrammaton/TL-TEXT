[translation]
10036050-1 = "Episódio 5: Torneio de Pistolas d'Água da Gangue dos Capacetes"
10036050-3 = "Voltei."
10036050-4 = "Ah, Srta. Joumae!"
10036050-5 = "Graças a você, pude descansar um pouco. Agradeço."
10036050-6 = "O próximo trabalho é..."
10036050-7 = "E-está tudo bem! #nPode continuar descansando!"
10036050-11 = "[ns] (Será que a impressão que causei antes foi muito forte...)"
10036050-12 = "Não, já que estou recebendo um salário, #nnão posso ficar sem fazer nada."
10036050-13 = "Talvez eu possa limpar perto do palco..."
10036050-17 = "Você aí, está com as mãos livres?"
10036050-23 = "Preciso de uma ajudinha!"
10036050-24 = "Na verdade, estamos com falta de pessoal."
10036050-26 = "Sinto muito."
10036050-27 = "Não posso sair daqui..."
10036050-28 = "Não, não, não se preocupe comigo! #nPode ir!"
10036050-29 = "V-você tem certeza...?"
10036050-31 = "Com certeza!"
10036050-32 = "Eu gostaria de ajudar se houver algo que eu possa fazer..."
10036050-33 = "Ah, esqueci de explicar o que é. #nNa verdade, quero que você participe do torneio de pistolas d'água!"
10036050-38 = "[ns] \"Parece divertido.\""
10036050-39 = "Se o Sensei diz isso..."
10036050-40 = "Entendido, vamos logo."
10036050-44 = "[ns] (Vamos até onde os três estão...)"
10036050-47 = "Ah, Sensei."
10036050-48 = "Onde você estava? #nEu queria ter almoçado com você."
10036050-49 = "[s1] \"Tive alguns imprevistos.\"\n[s2] \"Surgiu um compromisso.\""
10036050-52 = "Q-que pena... Na verdade, ganhamos um sorteio agora pouco... #ne recebemos muita comida."
10036050-53 = "Se o Sensei estivesse lá..."
10036050-54 = "[s] \"Está tudo bem, eu também já comi.\""
10036050-55 = "Então, vamos ver como a Sa-chan está."
10036050-56 = "Eles ainda devem estar preparando o palco, de qualquer forma."
10036050-61 = "Ahem, ahem! #nUm aviso da Gangue dos Capacetes!"
10036050-62 = "Em breve, o \"Torneio de Pistolas d'Água\" para decidir o campeão de cada filial será realizado na arena da praia!"
10036050-63 = "Com certeza será emocionante! #nVenham todos assistir!"
10036050-64 = "Encerramos a transmissão!"
10036050-68 = "[ns] (Então, a Saori está na praia...)"
10036050-69 = "Torneio de pistolas d'água...?"
10036050-70 = "Será que não usam munição real?"
10036050-71 = "[s] \"Vamos lá assistir também!\""
10036050-72 = "Ué, não vamos atrás da Saori-nee?"
10036050-73 = "Será que é seguro ficar assistindo a um torneio assim, sem preocupações...?"
10036050-74 = "[s] \"Talvez a Saori também esteja lá.\""
10036050-75 = "É verdade..."
10036050-76 = "Todos estão indo para o local."
10036050-79 = "Neste momento, a Gangue dos Capacetes está reunida na Outlaw Beach!"
10036050-80 = "O público também está chegando aos poucos."
10036050-81 = "Pessoal, vocês estão animados!?"
10036050-82 = "Hoje, a Gangue dos Capacetes mais forte será decidida!"
10036050-83 = "Vamos lá, quem será o último de pé!?"
10036050-84 = "O torneio de pistolas d'água começa agora—!"
10036050-91 = "Pessoal, escutem bem."
10036050-92 = "Nós, o Grupo do Capacete Pata-Pata, não precisamos fazer nada."
10036050-93 = "Entendido?"
10036050-98 = "Já entendi."
10036050-99 = "(Como chegamos a essa situação...)"
10036050-104 = "Bem, o resultado já está decidido de qualquer forma."
10036050-105 = "O que você quer dizer com isso?"
10036050-106 = "……Hm?"
10036050-107 = "Err, você não ouviu quando foi chamado?"
10036050-108 = "……."
10036050-109 = "Ah."
10036050-110 = "Claro, pode deixar comigo."
10036050-111 = "Vamos com tudo."
10036050-112 = "……Hã?"
10036050-114 = "As regras são simples!"
10036050-115 = "Usem esta pistola d'água... hein? Parece real?#nComo assim, é claramente uma pistola d'água!"
10036050-116 = "De qualquer forma, o time que ficar de pé por último usando isso vence!"
10036050-117 = "Agora, todos, dirijam-se às posições de largada!"
10036050-120 = "Uau... tem gente demais aqui...!"
10036050-121 = "Tanta gente assim..."
10036050-122 = "Será que quase todo o Grupo do Capacete veio?"
10036050-123 = "P-preciso ir para algum lugar alto...#nAh, Sensei, pode me ajudar um instante...?"
10036050-124 = "[s3] \"Quer que eu te carregue nas costas?\"\n[s4] \"Cuidado para não cair.\""
10036050-132 = "E-ehehe...#nJá que estamos aqui, você poderia me colocar nos seus ombros...?"
10036050-133 = "[s5] \"Sim, entendi.\"\n[s6] Coloca Hiyori nos ombros."
10036050-139 = "Ehehe... que alto, é um lugar privilegiado...!"
10036050-140 = "Sinto que estou trapaceando um pouco..."
10036050-141 = "……Ué?"
10036050-143 = "O que houve?"
10036050-149 = "Olhe para a bandeira do \"Grupo do Capacete Pata-Pata\"!"
10036050-150 = "Logo abaixo, a Saori-nee está lá...!"
10036050-155 = "……É verdade."
10036050-156 = "Por que ela está aqui desta vez..."
10036050-157 = "Saori-nee, o olhar dela está assustador...#nEla está com um olhar de líder total...!"
10036050-158 = "Sa-chan, então você participou do torneio."
10036050-159 = "……Fico feliz que pareça estar se divertindo."
10036050-160 = "Será que ela está se divertindo...?"
10036050-161 = "Saori-nee, será que ela vai ganhar...?"
10036050-162 = "Bem, se o oponente for o Grupo do Capacete, acho que não precisa se preocupar..."
10036050-163 = "Depende da quantidade de oponentes."
10036050-164 = "Mesmo que ela perca..."
10036050-165 = "Se a Sa-chan se divertiu, acho que isso é o que importa."
10036050-168 = "O clima está bem agitado. #nMesmo que o resultado já esteja decidido."
10036050-169 = "É verdade, nem me fale."
10036050-170 = "O \"Grupo do Capacete Espinhoso\" que tem que vencer, né?"
10036050-171 = "Achei que todos soubessem."
10036050-172 = "Bem, não desgosto desse clima, então vou deixar passar."
10036050-176 = "[ns] \"Uma farsa...?\""
10036050-181 = "……Não posso deixar isso passar."
10036050-182 = "Saori-nee está se esforçando tanto, isso é terrível...!"
10036050-183 = "……Preciso avisar o líder."
10036050-189 = "E-ehehe…… Sensei, eu poderia ficar mais um pouco no seu ombro?"
10036050-192 = "Preparar……."
10036050-194 = "Já!"
10036050-195 = "Hmph!"
10036050-199 = "E-ele é rápido!"
10036050-200 = "Quem é aquele cara!?"
10036050-210 = "Próximo!"
10036050-211 = "É por aqui!"
10036050-216 = "O quê!?"
10036050-221 = "Uau!"
10036050-227 = "O-o que está acontecendo?"
10036050-228 = "Isso não está no roteiro……."
10036050-229 = "Equipe! Não tem ninguém da equipe aqui!?"
10036050-231 = "Isso não foi o que combinamos!"
10036050-232 = "Tsc!#nNão tem jeito, só nos resta derrotar aquele cara!"
10036050-233 = "Será que eles estão atuando para que a armação não seja descoberta?"
10036050-234 = "Que se dane!#nVamos derrotá-lo de qualquer jeito!"
10036050-236 = "Atacar em grupo é uma boa estratégia, mas……."
10036050-237 = "Não era para ser uma disputa entre filiais?"
10036050-244 = "Ataquem――!"
10036050-251 = "Uau!?"
