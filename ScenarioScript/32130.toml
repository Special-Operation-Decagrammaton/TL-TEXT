[translation]
32130-1 = "Episódio 13; Mesmo Assim"
32130-2 = "(Depois disso, o Clube de Reposição continuou dando o sangue todos os dias pro 3º Exame Especial de Proficiência...)"
32130-24 = "Resultados do 4º Simulado do Clube de Reposição――"
32130-25 = "Hanako: 100 pontos [007eff](Aprovada)[-]"
32130-26 = "Azusa: 82 pontos [FF6666](Reprovada)[-]"
32130-27 = "Koharu: 74 pontos [FF6666](Reprovada)[-]"
32130-28 = "Hifumi: 79 pontos [FF6666](Reprovada)[-]"
32130-53 = "Resultados do 5º Simulado do Clube de Reposição――"
32130-54 = "Hanako: 100 pontos [007eff](Aprovada)[-]"
32130-55 = "Azusa: 94 pontos [007eff](Aprovada)[-]"
32130-56 = "Koharu: 90 pontos [007eff](Aprovada)[-]"
32130-57 = "Hifumi: 93 pontos [007eff](Aprovada)[-]"
32130-71 = "Resultados do 6º Simulado do Clube de Reposição――"
32130-72 = "Hanako: 100 pontos [007eff](Aprovada)[-]"
32130-73 = "Azusa: 91 pontos [007eff](Aprovada)[-]"
32130-74 = "Koharu: 83 pontos [FF6666](Reprovada)[-]"
32130-75 = "Hifumi: 89 pontos [FF6666](Reprovada)[-]"
32130-82 = "Faltam 6 dias para o Último Exame Especial de Proficiência"
32130-85 = "Faltam 5 dias para o Último Exame Especial de Proficiência"
32130-88 = "Faltam 4 dias para o Último Exame Especial de Proficiência"
32130-91 = "Faltam 3 dias para o Último Exame Especial de Proficiência"
32130-94 = "Faltam 2 dias para o Último Exame Especial de Proficiência"
32130-97 = "Falta 1 dia para o Último Exame Especial de Proficiência"
32130-100 = "...E finalmente chegamos, é amanhã."
32130-101 = "Pois é..."
32130-102 = "......"
32130-103 = "N-Não vão resolver mudar tudo de última hora de novo, né?"
32130-107 = "Bom, pelo menos até agora..."
32130-108 = "Sim. O conteúdo da prova é o mesmo de antes, e a nota mínima continua sendo 90."
32130-109 = "O local é a Sala 32, no 19º Prédio Anexo da Trinity. Fica um pouco distante do prédio principal, mas não é tão longe."
32130-110 = "O horário é às 9h da manhã. Até aqui, tudo como o esperado."
32130-111 = "Na verdade, a única coisa que me chama a atenção... é o silêncio absurdo no prédio principal desde ontem. Parece até que todo mundo desapareceu."
32130-112 = "...Por via das dúvidas, vou passar a noite vigiando o quadro de avisos."
32130-113 = "M-Mas Hanako-chan, você devia dormir..."
32130-114 = "Fufu, não se preocupe comigo. Afinal, isso é o mínimo que eu posso fazer por vocês..."
32130-115 = "N-Não diga isso! Se não fosse por você ensinando a gente com toda a paciência do mundo, nem eu, nem a Azusa-chan, nem a Koharu-chan teríamos melhorado tanto...!"
32130-116 = "Vocês só melhoraram porque se esforçaram muito."
32130-117 = "Estou impressionada com o quanto deram duro, mesmo dormindo tão pouco todos esses dias."
32130-118 = "[s] \"...Sim, vai dar tudo certo.\""
32130-119 = "É. As notas tão raspando nos 90, é verdade... mas se a prova de amanhã estiver fácil, a gente com certeza..."
32130-120 = "......"
32130-121 = "...! N-Não viaja, isso não vai acontecer! Eu ainda vou ficar estudando até de madrugada!"
32130-122 = "100! Se a gente tirar 100, ninguém vai poder abrir o bico!"
32130-123 = "K-Koharu-chan... eu entendo como você se sente, mas o melhor que a gente pode fazer hoje é descansar..."
32130-124 = "Isso mesmo. Todo mundo aqui sabe o quanto você se esforçou, Koharu-chan, então fique tranquila. O ideal é descansar para o grande dia."
32130-125 = "Descansar também faz parte da estratégia."
32130-126 = "Sim. E o mesmo vale pra você, Azusa-chan, tá bom?"
32130-127 = "...Tem razão. Acho que pelo menos por hoje eu vou dormir direito."
32130-131 = "Finalmente, amanhã... nosso destino será decidido."
32130-132 = "Se a gente... não, melhor não atrair azar. A gente vai passar."
32130-133 = "E-Eu também! Não vou perder de jeito nenhum!"
32130-134 = "Pois é. Chorando ou rindo, é a nossa última vez. Vamos com tudo."
32130-135 = "Sim. Nós nos esforçamos muito para chegar até aqui, agora é só darmos o nosso melhor até o fim."
32130-136 = "[s] \"...Vamos confiar em tudo que vocês conquistaram até agora. Vai dar bom.\""
32130-137 = "Sim."
32130-138 = "É verdade."
32130-139 = "Aham."
32130-140 = "......"
32130-142 = "Falta 1 dia para o Último Exame Especial de Proficiência"
32130-148 = "......"
32130-153 = "......"
32130-156 = "Azusa, mudança de planos."
32130-157 = "...?"
32130-159 = "Amanhã de manhã. Vá para o local combinado e espere minhas ordens."
32130-160 = "E-Espera, Saori, mas amanhã é..."
32130-161 = "Algum problema?"
32130-162 = "A-Ainda não estou pronta. Adiantar a data do plano tem muitos riscos."
32130-163 = "Não, vamos executar amanhã. É uma decisão final, então se prepare direito."
32130-164 = "......"
32130-165 = "Amanhã, tudo vai mudar. Tanto a nossa Arius quanto a Trinity vão sofrer uma mudança drástica e sem volta."
32130-166 = "Destruir o halo da anfitriã da Tea Party da Trinity, Nagisa [ruby=Kirifuji]Kirifuji[/ruby]... é pra isso que você está aí."
32130-167 = "......"
32130-168 = "Eu confio nas suas habilidades. Faça o seu trabalho, assim como fez com a Seia [ruby=Yurizono]Yurizono[/ruby]."
32130-169 = "...Entendido."
32130-170 = "Vou estar pronta."
32130-175 = "Azusa."
32130-176 = "...?"
32130-177 = "Você não esqueceu, não é? 'Vanitas vanitatum'."
32130-178 = "...Tudo é uma grande ilusão, e no fim, é tudo em vão."
32130-179 = "Qualquer esforço, sucesso ou fracasso... No fim das contas, tudo não passa de algo sem sentido."
32130-180 = "...Nunca esqueci."
32130-185 = "......"
32130-187 = "......"
32130-189 = "Próximo Episódio; Confissão"