[translation]
32130-1 = "Episódio 13;Ainda Assim"
32130-2 = "(E, depois disso também, o pessoal do Clube de Aulas de Reforço seguiu acumulando esforço, dia após dia, rumo ao 3º Exame Especial de Aptidão……)"
32130-24 = "4º Simulado do Clube de Aulas de Reforço, resultado――"
32130-25 = "Hanako―100 pts [007eff]（Aprovada）[-]"
32130-26 = "Azusa―82 pts [FF6666]（Reprovada）[-]"
32130-27 = "Koharu―74 pts [FF6666]（Reprovada）[-]"
32130-28 = "Hifumi―79 pts [FF6666]（Reprovada）[-]"
32130-53 = "5º Simulado do Clube de Aulas de Reforço, resultado――"
32130-54 = "Hanako―100 pts [007eff]（Aprovada）[-]"
32130-55 = "Azusa―94 pts [007eff]（Aprovada）[-]"
32130-56 = "Koharu―90 pts [007eff]（Aprovada）[-]"
32130-57 = "Hifumi―93 pts [007eff]（Aprovada）[-]"
32130-71 = "6º Simulado do Clube de Aulas de Reforço, resultado――"
32130-72 = "Hanako―100 pts [007eff]（Aprovada）[-]"
32130-73 = "Azusa―91 pts [007eff]（Aprovada）[-]"
32130-74 = "Koharu―83 pts [FF6666]（Reprovada）[-]"
32130-75 = "Hifumi―89 pts [FF6666]（Reprovada）[-]"
32130-82 = "Faltam 6 dias para o último Exame Especial de Aptidão"
32130-85 = "Faltam 5 dias para o último Exame Especial de Aptidão"
32130-88 = "Faltam 4 dias para o último Exame Especial de Aptidão"
32130-91 = "Faltam 3 dias para o último Exame Especial de Aptidão"
32130-94 = "Faltam 2 dias para o último Exame Especial de Aptidão"
32130-97 = "Falta 1 dia para o último Exame Especial de Aptidão"
32130-100 = "……Enfim, é amanhã, né."
32130-101 = "Sim……."
32130-102 = "……."
32130-103 = "N-não me diga que, de novo, de repente, vai mudar um monte de coisa?"
32130-107 = "Sim, por ora……."
32130-108 = "Pois é. A matéria da prova segue como antes, e a nota de corte também não mudou: 90 ou mais."
32130-109 = "O local é o Anexo 19 de Trinity, Sala 32. Fica afastado do prédio principal, mas não é tão longe."
32130-110 = "O horário é a partir das 9 da manhã; não mudou."
32130-111 = "O que mais me intriga, na verdade, é…… desde ontem, o prédio principal está estranhamente silencioso. Parece que ficou de repente sem ninguém."
32130-112 = "……Por precaução, hoje à noite também eu vou ficar de olho no mural o tempo todo."
32130-113 = "H-Hanako, você também é melhor dormir……"
32130-114 = "Ufu, eu tô bem. Além disso, isto é o pouco que eu consigo fazer……."
32130-115 = "N-não é nada disso! Foi graças à Hanako, que ensinou o estudo com tanto capricho, que eu, a Azusa e a Koharu melhoramos muito as notas……!"
32130-116 = "Isso foi porque vocês se esforçaram."
32130-117 = "Mesmo sem conseguir dormir direito por vários dias, vocês se esforçaram muito, eu acho."
32130-118 = "[s] \"……Sim, com certeza vai dar tudo certo.\""
32130-119 = "Sim. Ainda assim, 90 é no limite…… mas, se a prova de amanhã for fácil, com certeza……."
32130-120 = "……."
32130-121 = "……! U-uma coisa tão conveniente não vai acontecer! Eu ainda vou estudar até de madrugada!"
32130-122 = "100 pontos! Se eu tirar 100 pontos, ninguém pode reclamar de nada, né!?"
32130-123 = "K-Koharu…… eu entendo o sentimento, mas hoje é melhor descansar com calma……."
32130-124 = "Isso mesmo. Que a Koharu se esforçou, todo mundo sabe, tá tudo bem. Hoje é melhor descansar e se preparar pra amanhã."
32130-125 = "Descansar também faz parte da estratégia."
32130-126 = "Sim. E isso vale pra você também, Azusa, viu?"
32130-127 = "……Sim. Ao menos hoje, eu pretendo descansar com calma."
32130-131 = "Enfim, amanhã…… o nosso destino se decide."
32130-132 = "Se…… não, coisa de mau agouro é melhor não dizer. A gente vai passar, sem falta."
32130-133 = "E-eu também! Eu não vou perder de jeito nenhum!"
32130-134 = "P-pois é. Chorando ou rindo, é só mais uma vez. Vamos nos esforçar."
32130-135 = "Sim. A gente se esforçou direitinho até aqui, então agora é só dar o melhor até o fim."
32130-136 = "[s] \"……Vamos acreditar no esforço de até agora. Com certeza vai dar tudo certo.\""
32130-137 = "Sim."
32130-138 = "Pois é."
32130-139 = "Sim."
32130-140 = "……."
32130-142 = "Falta 1 dia para o último Exame Especial de Aptidão"
32130-148 = "……."
32130-153 = "……."
32130-156 = "Azusa, a agenda mudou."
32130-157 = "……?"
32130-159 = "É amanhã de manhã; espere as ordens no lugar combinado."
32130-160 = "E-espera, Saori, amanhã é……."
32130-161 = "Algum problema?"
32130-162 = "A-ainda não estou pronta. Adiantar a agenda em relação ao plano é um risco grande demais."
32130-163 = "Não; a execução é amanhã. Isto é ponto fechado, deixe tudo bem preparado."
32130-164 = "……."
32130-165 = "Amanhã, tudo vai mudar. Tanto na nossa Arius quanto nesta Trinity, uma grande mudança irreversível vai acontecer."
32130-166 = "Destruir a aureola de Nagisa Kirifuji, a host do Tea Party de Trinity…… é pra isso que você está aí."
32130-167 = "……."
32130-168 = "Eu confio na sua competência. Faça bem-feito, como na vez da Seia Yurizono."
32130-169 = "……Entendido."
32130-170 = "Vou me preparar."
32130-175 = "Azusa."
32130-176 = "……?"
32130-177 = "Você não esqueceu, né: \"vanitas vanitatum\"."
32130-178 = "……Tudo é vão."
32130-179 = "Qualquer esforço, qualquer sucesso, qualquer fracasso…… tudo, no fim, é só sem sentido."
32130-180 = "……Nem por um instante eu esqueci."
32130-185 = "……."
32130-187 = "……."
32130-189 = "Próximo Episódio;Confissão"
