32130-82 = "Faltam 6 dias para o último Exame Acadêmico Especial"
32130-85 = "Faltam 5 dias para o último Exame Acadêmico Especial"
32130-88 = "Faltam 4 dias para o último Exame Acadêmico Especial"
32130-91 = "Faltam 3 dias para o último Exame Acadêmico Especial"
32130-94 = "Faltam 2 dias para o último Exame Acadêmico Especial"
32130-97 = "Falta 1 dia para o último Exame Acadêmico Especial"
32130-100 = "……Finalmente é amanhã, não é?"
32130-101 = "Sim……."
32130-102 = "……."
32130-103 = "N-não vai acontecer de novo de mudarem tudo de repente, vai?"
32130-107 = "Sim, por enquanto……."
32130-108 = "Exatamente. O conteúdo do exame continua o mesmo de antes, e a nota de corte continua sendo 90 pontos ou mais."
32130-109 = "O local é a sala 32 do 19º anexo de Trinity. Fica longe do prédio principal, mas não é tão distante assim."
32130-110 = "O horário é às 9 da manhã, sem alterações."
32130-111 = "Se há algo que me preocupa, é que…… desde ontem, o prédio principal está estranhamente silencioso. Parece que não há mais ninguém por lá."
32130-112 = "……Por precaução, vou ficar de olho no quadro de avisos a noite toda."
32130-113 = "H-Hanako-chan, você também deveria dormir……."
32130-114 = "Fufu, eu estou bem. Além disso, é só isso que eu posso fazer……."
32130-115 = "N-não diga isso! Graças ao fato de a Hanako-chan ter nos ensinado a estudar com tanta dedicação, eu, a Azusa-chan e a Koharu-chan melhoramos muito nossas notas……!"
32130-116 = "Isso é porque vocês se esforçaram."
32130-117 = "Mesmo sem dormir direito por vários dias, vocês se esforçaram muito."
32130-118 = "[s] \"……Sim, com certeza vai dar tudo certo.\""
32130-119 = "Sim. Mesmo assim, 90 pontos é bem apertado…… mas se a prova de amanhã for fácil, com certeza……."
32130-120 = "……."
32130-121 = "……! N-não tem como algo tão conveniente acontecer! Eu vou continuar estudando até tarde da noite!"
32130-122 = "100 pontos! Se eu tirar 100 pontos, ninguém vai poder reclamar de nada, né!?"
32130-123 = "K-Koharu-chan…… eu entendo como se sente, mas hoje você deveria descansar um pouco……."
32130-124 = "É verdade. Todas nós sabemos o quanto a Koharu-chan se esforçou, vai ficar tudo bem. Acho melhor você descansar hoje e se preparar para amanhã."
32130-125 = "Descansar também faz parte da estratégia."
32130-126 = "Sim. E isso também vale para você, Azusa-chan, certo?"
32130-127 = "……Sim. Acho que vou descansar um pouco hoje."
32130-131 = "Finalmente amanhã…… nosso destino será decidido."
32130-132 = "Se…… não, melhor não dizer coisas que dão azar. Nós vamos passar, com certeza."
32130-133 = "E-eu também! Eu definitivamente não vou perder!"
32130-134 = "É, você tem razão. Querendo ou não, só falta mais uma. Vamos dar o nosso melhor."
32130-135 = "Sim. Já nos esforçamos muito até aqui, agora só nos resta dar o nosso melhor até o fim."
32130-136 = "[s] \"...Vamos acreditar no esforço que fizemos até agora. Vai dar tudo certo.\""
32130-137 = "Sim."
32130-138 = "Concordo."
32130-139 = "Sim."
32130-140 = "..."
32130-142 = "Falta 1 dia para o exame acadêmico especial final"
32130-148 = "..."
32130-153 = "..."
32130-156 = "Azusa, o cronograma mudou."
32130-157 = "...?"
32130-159 = "Será amanhã de manhã. Espere por ordens no local combinado."
32130-160 = "Es-espere, Saori, amanhã é..."
32130-161 = "Algum problema?"
32130-162 = "A-ainda não estou pronta. Adiantar o cronograma mais do que o planejado é arriscado demais."
32130-163 = "Não, a execução será amanhã. Isso é definitivo, prepare-se bem."
32130-164 = "..."
32130-165 = "Quando chegar amanhã, tudo mudará. Tanto para nós da Arius quanto para esta Trinity, ocorrerá uma mudança irreversível e significativa."
32130-166 = "Destruir o halo da anfitriã do Tea Party de Trinity, Nagisa Kirifuji... É para isso que você está aqui."
32130-167 = "..."
32130-168 = "Confio na sua habilidade. Faça bem feito, assim como foi com Seia Yurizono."
32130-169 = "...Entendido."
32130-170 = "Vou me preparar."
32130-175 = "Azusa."
32130-176 = "...?"
32130-177 = "Você não esqueceu, não é? \"Vanitas vanitatum\"."
32130-178 = "...Tudo é vaidade."
32130-179 = "Qualquer esforço, sucesso ou fracasso... no final, tudo é apenas sem sentido."
32130-180 = "...Eu nunca esqueci, nem por um segundo."
32130-185 = "..."
32130-187 = "..."
32130-189 = "Próximo episódio: Confissão"
