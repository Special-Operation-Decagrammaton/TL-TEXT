[translation]
10016090-1 = "Episódio 9: O Protagonista do Festival Esportivo"
10016090-2 = "Olá a todos que assistem ao Canal Chronos!#nFinalmente, o Festival Esportivo deste ano está chegando ao fim!"
10016090-3 = "A única modalidade que resta é o \"Revezamento Interescolar\", que encerrará o evento com chave de ouro!"
10016090-4 = "Quem será que levará para casa o título de campeão geral?!"
10016090-5 = "Digo isso de forma fingida, mas, com as pontuações divulgadas antes do início do revezamento,#njá dá para ter uma ideia de qual escola vai vencer..."
10016090-6 = "Bem, qual escola está mais próxima da vitória geral no momento...?"
10016090-7 = "Opa! Pessoal, não se surpreendam!#nQuem está em primeiro lugar na pontuação geral agora é..."
10016090-8 = "Nada menos que Gehenna, Trinity e Millennium, as três escolas!"
10016090-9 = "Sério!? Quer dizer que as três estão empatadas?"
10016090-10 = "Sim! Exatamente isso! Os revezamentos finais dos festivais esportivos passados eram sempre um confronto direto entre Gehenna e Trinity, mas..."
10016090-11 = "No festival deste ano, a Millennium mostrou um desempenho inesperadamente bom, tornando a disputa um combate a três!"
10016090-12 = "O \"Revezamento Interescolar\" promete ser ainda mais emocionante."
10016090-14 = "Espectadores, vamos acompanhar esta batalha até o fim junto com o Canal Chronos!"
10016090-16 = "Entendo. Então o vencedor da classificação geral será decidido neste revezamento."
10016090-17 = "Preciso planejar a escalação dos atletas com mais cuidado..."
10016090-18 = "Ei, você ouviu? O boato de que a Presidente Hina, do Comitê Disciplinar, desapareceu."
10016090-19 = "Sério? Aconteceu alguma coisa com o Comitê Disciplinar?"
10016090-20 = "Sendo a Presidente do Comitê Disciplinar, não acho que alguém tenha feito algo contra ela, mas..."
10016090-21 = "Digo, o revezamento final não vai ser um problema?#nSe a Presidente Hina não participar, quem será a corredora de Gehenna?"
10016090-22 = "É verdade... Acho que a vitória geral vai ser impossível agora."
10016090-23 = "E era a chance perfeita de vencer a Trinity..."
10016090-24 = "A Presidente Hina desapareceu...?"
10016090-25 = "Se uma das corredoras mais talentosas de Gehenna não participar do revezamento final..."
10016090-26 = "Para a Trinity, esta é a chance perfeita de conquistar a vitória geral...#nClaro, o desaparecimento em si não é algo tranquilo."
10016090-27 = "Se deixarmos uma corredora rápida como a primeira a largar para abrir distância das outras escolas,#ne depois apenas mantivermos o ritmo, teremos boas chances de vencer."
10016090-28 = "As atletas disponíveis agora são a Kazusa, do \"Clube de Doces Depois da Aula\", e#na Suzumi, da \"Patrulha\"..."
10016090-29 = "......É o que temos para hoje."
10016090-30 = "E quanto à âncora... vamos confiar na Tsurugi!"
10016090-32 = "Trinity - Sala de Espera dos Atletas"
10016090-33 = "......Não, eu não vou participar."
10016090-34 = "P-por que não!?"
10016090-35 = "Será que você se machucou durante a partida de agora há pouco..."
10016090-36 = "Não... estou bem. Não é nada relacionado a ferimentos."
10016090-37 = "É só que... eu já corri o suficiente."
10016090-38 = "É melhor dar uma chance para outras atletas."
10016090-39 = "Por acaso, Tsurugi... você está cansada?"
10016090-40 = "Não, não é que eu esteja cansada..."
10016090-41 = "......O Festival Esportivo não é um \"festival de todos, criado por todas as alunas de Kivotos enquanto se divertem juntas\"?"
10016090-42 = "Só porque tenho talento atlético, não acho certo eu monopolizar tudo..."
10016090-43 = "Pode haver alunas que queriam participar das competições, mas não conseguiram..."
10016090-44 = "Isso é..."
10016090-45 = "Além disso, a âncora atrai muita atenção..."
10016090-46 = "Esse tipo de olhar... é um pouco pesado..."
10016090-47 = "Entendo a situação. Mas, com tão pouco tempo até a prova, onde vamos encontrar uma substituta..."
10016090-49 = "......Substituta?"
10016090-50 = "Hasumi, por que você não vai?"
10016090-51 = "Eu!?"
10016090-52 = "Eu... serei a âncora?"
10016090-53 = "......Sim. Isso não seria bom?"
10016090-54 = "Tsurugi... agora, a Trinity não tem margem para erros."
10016090-55 = "Você entende que este revezamento é a partida crucial que decidirá o vencedor geral?"
10016090-56 = "Cada escola está reformulando suas estratégias para colocar os corredores mais rápidos possíveis, e ainda assim..."
10016090-57 = "Desculpe interromper a conversa..."
10016090-58 = "Eu também concordo com as palavras da senpai Tsurugi."
10016090-59 = "...Até a Mashiro!"
10016090-60 = "Por que, afinal..."
10016090-61 = "Vocês querem tanto assim me envergonhar?"
10016090-63 = "E-envergonhar?"
10016090-64 = "Não era essa a nossa intenção, mas..."
10016090-66 = "Como devem saber... eu não sou rápida."
10016090-67 = "Não tenho confiança de que conseguiria vencer qualquer competidora de Trinity ou Millennium em uma corrida."
10016090-68 = "Se, por minha causa, Trinity perder a vitória geral..."
10016090-69 = "Como esperam que eu suporte tal pressão?"
10016090-70 = "...Isso é algo tão importante assim?"
10016090-72 = "Claro que é!"
10016090-76 = "Senpai... antes de participar do Festival Esportivo, eu pesquisei sobre sua história e filosofia."
10016090-77 = "Dizem que este grande festival esportivo, com sua longa história, serve como um lugar para as alunas testarem seus limites e possibilidades."
10016090-78 = "No entanto, nem todas são boas em esportes. #nPara que as habilidades de cada uma possam ser plenamente demonstradas, as regras foram sendo ajustadas ao longo do tempo, renascendo como um festival para as alunas."
10016090-79 = "Mesmo assim, focar apenas na vitória e dar muitas chances a atletas específicas é..."
10016090-80 = "Isso pode ser chamado de um verdadeiro Festival Esportivo?"
10016090-81 = "Será que esse comportamento está realmente alinhado com a filosofia do Festival Esportivo!?"
10016090-82 = "I-isso é verdade, mas..."
10016090-87 = "Bem, além disso, ainda há outro motivo pelo qual quero que a senpai Hasumi participe."
10016090-88 = "Senpai Hasumi, você passou o dia inteiro trabalhando como membro do comitê executivo, então não participou de nenhuma partida, certo?"
10016090-89 = "É triste que, mesmo tendo trabalhado mais do que qualquer uma por este festival, ninguém tenha notado seu esforço."
10016090-90 = "Por isso... pelo menos no revezamento entre escolas, que é o destaque do Festival Esportivo, #neu quero que a senpai Hasumi brilhe."
10016090-91 = "Eu... quero ver a Hasumi-san correndo na última partida!"
10016090-92 = "E-eu também...!"
10016090-100 = "Na verdade, fiquei até surpresa com a precisão do tiro da vice-presidente Hasumi..."
10016090-104 = "Se for para fazer junto com a Hasumi-dono, não importa se somos inimigas ou aliadas! #nCom certeza será divertido! Ehehe."
10016090-108 = "\"Será uma nova experiência e, com certeza, será divertido.\""
10016090-110 = "...Pessoal, por que vocês são tão teimosas?"
10016090-111 = "Entendido... eu serei a âncora de Trinity."
10016090-112 = "Só porque não sou boa em esportes, não significa que vou pegar leve."
10016090-113 = "Já que chegamos a este ponto, vou conquistar a vitória geral para Trinity com minhas próprias mãos!"
10016090-115 = "Sim... isso é o suficiente."
10016090-116 = "Nós vamos torcer pela Hasumi na arquibancada."
10016090-117 = "Boa sorte, senpai Hasumi!"
10016090-120 = "Certo, o terceiro corredor acabou de partir!"
10016090-121 = "Últimos corredores, por favor, subam à pista!"
10016090-126 = "...Ué, vice-presidente Hasumi?"
10016090-127 = "...Yuuka?"
10016090-128 = "Se a vice-presidente Hasumi está aqui, isso significa que... você é a âncora de Trinity?"
10016090-129 = "S-sim... então, Yuuka também é a âncora de Millennium...?"
10016090-130 = "Sim, é verdade... ah, céus."
10016090-131 = "Eu não sou muito rápida... #nmas o pessoal do Seminar não parava de dizer que não participariam se eu não fosse a âncora..."
10016090-132 = "Temos uma chance de ouro para a vitória geral, por que todos são tão teimosos...!"
10016090-137 = "Pff, fufu..."
10016090-138 = "A-ah? Eu disse algo estranho agora?"
10016090-139 = "Não... é só que pensei que a Yuuka também tem muitas dificuldades."
10016090-140 = "……Por isso mesmo, não pretendo pegar leve."
10016090-141 = "E-Essa é a minha fala!"
10016090-142 = "Vou correr com tudo pela vitória geral da Millennium!"
10016090-143 = "Sua determinação é admirável, mas a vitória geral desta vez será da Trinity."
10016090-147 = "Uau! O terceiro corredor chegou à zona de troca!"
10016090-154 = "Ugh... Correr me deixou com tanta fome que perdi as forças..."
10016090-155 = "Desmaiei..."
10016090-156 = "O resto é com você!"
10016090-165 = "O bastão foi passado para o quarto corredor!"
10016090-166 = "E-Ei, espere... passe o bastão logo... A-Ah!"
10016090-171 = "A quarta corredora de Gehenna, Junko!#nEla se distraiu com o bastão e acabou caindo!"
10016090-172 = "Nossa! Que erro doloroso!#nSerá que Gehenna está fora da disputa pela vitória geral...!?"
10016090-173 = "Ah, Hasumi-dono! Fico feliz em correr com você de novo!"
10016090-174 = "Haa... haa!! Droga!!"
10016090-175 = "Uau, que energia incrível! Izuna também não vai perder!"
10016090-176 = "Eu... não... vou... perder...!"
10016090-177 = "Eu... não... vou... perder...!!"
10016090-178 = "Uhe, isso é juventude, hein."
10016090-179 = "Até eu estou começando a ficar um pouco empolgada..."
10016090-180 = "Hoshino-senpai! Se já terminou a troca, saia logo da pista!"
10016090-182 = "(Haa, haa... a quantos metros falta para a linha de chegada?)"
10016090-183 = "(Estou tão sem fôlego... minha visão está ficando turva... onde estão os outros corredores?)"
10016090-184 = "(Mas consigo ouvir o apoio de todos. Este estado de clareza, como uma calmaria...)"
10016090-185 = "(Será que isso é o que chamam de estado de transe?)"
10016090-186 = "(Mesmo tendo superado meus limites há muito tempo, a cada passo que dou, minhas emoções transbordam...)"
10016090-187 = "(Deste jeito, para qualquer lugar...!)"
10016090-189 = "……A corredora Hasumi acaba de cruzar a linha de chegada!"
10016090-190 = "……Eu, eu consegui!"
10016090-196 = "Academia Trinity — Corredora Hasumi, 6º lugar."
10016090-197 = "……Eh?"
10016090-198 = "Foi por pouco, mas a corredora Yuuka cruzou a linha primeiro."
10016090-199 = "Foi uma corrida maravilhosa até o fim! Bom trabalho."
10016090-203 = "E-Eu fiquei em 6º...?#nEntão... quem foi que venceu...?"
10016090-204 = "A corredora Junko, que ficou em 1º, teve uma arrancada final realmente incrível. #nEmbora tenha caído, a forma como ela se recuperou e ultrapassou todo mundo foi impressionante!"
10016090-205 = "Este é o momento em que nasce uma lenda no revezamento entre academias que encerra o Festival Halo!"
10016090-207 = "Todo mundo viu!?#nEu fiquei em 1º!"
10016090-208 = "Fufu... tudo saiu conforme o meu plano.#nEu tinha certeza de que a Junko conseguiria o 1º lugar!"
10016090-209 = "Ora, ora... mas há pouco, quando a Junko caiu, você disse: 'Por isso não devia ter confiado no Clube de Pesquisa Gastronômica'."
10016090-211 = "Fufu... você está com uma expressão muito boa.#nFico feliz que suas preocupações de antes tenham desaparecido."
10016090-212 = "A protagonista do Festival Halo deste ano é você, Junko."
10016090-213 = "Ei, ei! Com esse 'Vale-Refeição Universal', dá para comer qualquer coisa, né?"
10016090-214 = "Rápido, rápido! Temos que ir antes que acabe!"
10016090-216 = "No fim das contas, acabou assim..."
10016090-223 = "Haa... depois de tanta empolgação, terminar com um resultado tão patético..."
10016090-224 = "É por isso que eu não queria ser a última corredora..."
10016090-228 = "Bom trabalho, Yuuka."
10016090-229 = "Vice-presidente Hasumi, bom trabalho também..."
10016090-231 = "Bem, a contagem terminou, então vamos para o anúncio dos resultados!"
10016090-232 = "A academia que conquistou a vitória geral no Festival Halo deste ano foi..."
10016090-234 = "— A Academia Gehenna!"
