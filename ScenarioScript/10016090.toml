[translation]
10016090-1 = "第9話;晄輪大祭の主人公"
10016090-2 = "クロノスチャンネルをご覧の皆さん、こんにちは！#nいよいよ今年の晄輪大祭も終わりが近づいて参りました！"
10016090-3 = "残る種目はフィナーレを飾る「学園対抗リレー」だけ！"
10016090-4 = "果たして、総合優勝はどの学園が手にするのか！"
10016090-5 = "なんて白々しく言ってみましたが、リレーの開始前に公開されている点数から、#nおよそどの学園が優勝するのかは分かってしまうのですが……。"
10016090-6 = "さて、現在総合優勝に最も近い学園は……？"
10016090-7 = "むむっ！皆さん、驚かないでくださいね！#n現在総合得点で1位を獲得しているのは――"
10016090-8 = "なんとゲヘナ、トリニティ、ミレニアムの3校です！"
10016090-9 = "ええっ！？まさか3校が同点という事ですか？"
10016090-10 = "はい！そのまさかです！過去の晄輪大祭の最終リレーは、もっぱらゲヘナとトリニティの正面対決だったのですが……。"
10016090-11 = "今年の晄輪大祭はミレニアムが予想外の善戦を見せ、三つ巴の戦いとなりました！"
10016090-12 = "「学園対抗リレー」、これは一層目が離せませんね。"
10016090-14 = "視聴者の皆さん、最後までこの戦いをクロノスチャンネルと共に見届けましょう！"
10016090-16 = "なるほど。このリレーで総合優勝の勝者が決まるわけですね。"
10016090-17 = "出場選手の構成をもっと慎重に練らなければ……"
10016090-18 = "ねえ、聞いた？風紀委員会のヒナ委員長が失踪したって噂。"
10016090-19 = "えっ、本当？風紀委員会に何かあったの？"
10016090-20 = "あの風紀委員長だから、誰かが危害を加えたとかじゃないんだろうけど……"
10016090-21 = "というか、最終リレー、ヤバいんじゃない？#nヒナ委員長が出なかったら、誰がゲヘナの走者になるの？"
10016090-22 = "そうだね……総合優勝はもう無理なんじゃないかな。"
10016090-23 = "トリニティに勝つ絶好のチャンスだったのに……"
10016090-24 = "ヒナ委員長が失踪……？"
10016090-25 = "ゲヘナでも指折りの優秀な走者が最終リレーに参加しないのであれば……"
10016090-26 = "トリニティとしては総合優勝を獲得する絶好のチャンスですね……#nもちろん、失踪というのは穏やかではありませんが。"
10016090-27 = "足の速い選手にトップバッターを任せて他校と距離を広げてもらい、#n後はそれを維持し続ければ十分勝算がありそうです。"
10016090-28 = "今参加できる選手は「放課後スイーツ部」のカズサさんと#n「自警団」のスズミさん……"
10016090-29 = "……こんなものでしょうか。"
10016090-30 = "そして、アンカーは……ツルギに託しましょう！"
10016090-32 = "トリニティ・選手控え室"
10016090-33 = "……いや、私は出ない。"
10016090-34 = "ど、どうしてですか！？"
10016090-35 = "まさかさっきの試合中に怪我でも……"
10016090-36 = "いや……大丈夫。怪我とかじゃない。"
10016090-37 = "ただ……私は、もう十分走ったから。"
10016090-38 = "他の選手に、チャンスを与えた方が良い。"
10016090-39 = "もしかして、ツルギ……疲れたのですか？"
10016090-40 = "いや、疲れたわけじゃ……"
10016090-41 = "……大運動会――「晄輪大祭」は、「キヴォトスの全生徒が一緒に楽しみながら作っていく、みんなのお祭り」でしょう？"
10016090-42 = "運動神経がいいからって、私が全部独占するのは良くない……と思う。"
10016090-43 = "競技に出たかったけど、出れてない生徒だっているかもしれないから……。"
10016090-44 = "それは……"
10016090-45 = "それに、アンカーは注目されるから……"
10016090-46 = "そういった視線は……ちょっと負担……"
10016090-47 = "事情は分かりました。#nですが、試合までもう時間がないこの状態で、代打をどこで見つければ……"
10016090-49 = "……代打？"
10016090-50 = "ハスミ、あなたが出ればいいんじゃないか？"
10016090-51 = "はい！？"
10016090-52 = "私が……アンカー、ですか？"
10016090-53 = "……ああ。それじゃあダメなのか？"
10016090-54 = "ツルギ……今、トリニティには余裕がないのです。"
10016090-55 = "このリレーが総合優勝を決める重要な試合だということ、わかっていますか？"
10016090-56 = "各校、少しでも足の速い選手を出そうと作戦を立て直しているというのに――"
10016090-57 = "お話中失礼します……"
10016090-58 = "私もツルギ先輩の言葉に同意します。"
10016090-59 = "……マシロまで！"
10016090-60 = "一体なぜ……"
10016090-61 = "そんなに皆さんは私に恥をかかせたいんですか？"
10016090-63 = "は、恥ですか？"
10016090-64 = "そんなつもりじゃなかったけど……"
10016090-66 = "ご存知かと思いますが……私は足が速くありません。"
10016090-67 = "トリニティやミレニアムのどの選手とも、徒競走で勝てる自信がありません。"
10016090-68 = "もしも、自分のせいでトリニティが総合優勝を逃してしまったら……"
10016090-69 = "そんなプレッシャーにどうやって耐えろというのですか？"
10016090-70 = "……それがそんなに重要なことですか？"
10016090-72 = "もちろんです！"
10016090-76 = "先輩……私は「晄輪大祭」に参加する前に、歴史と理念を調べました。"
10016090-77 = "長い歴史を持つこの大運動会は、生徒たちが自分の限界と可能性を試す場として機能してきたそうです。"
10016090-78 = "しかし、皆が運動が得意というわけではありません。#nそれぞれの能力が十全に発揮できるよう、都度ルールを修正し続け、生徒のお祭りとして生まれ変わってきたのです。"
10016090-79 = "それなのに、試合の勝敗にこだわって、特定の選手に多くのチャンスを与えるのは……"
10016090-80 = "それは――正しい晄輪大祭と言えるのでしょうか？"
10016090-81 = "その行為が――正しく「晄輪大祭」の理念に沿っていると言えるのでしょうか！？"
10016090-82 = "そ、それはそう、ですが……"
10016090-87 = "まあ、それとは別にハスミ先輩に参加してほしいという理由はまだありますけど。"
10016090-88 = "ハスミ先輩、今日一日ずっと実行委員をしてたから試合に参加してませんよね？"
10016090-89 = "誰よりも今日のお祭りのために働いてたのに、誰の目にも留まらないなんて、悲しいです。"
10016090-90 = "だから……「晄輪大祭」の華である学園対抗リレーでくらい、#nハスミ先輩に輝いてほしいんです。"
10016090-91 = "私……最後の試合でハスミさんが走る姿、見たいです！"
10016090-92 = "わ、私も……！"
10016090-100 = "むしろ、ハスミ副委員長の精密な射撃に驚いたくらい……。"
10016090-104 = "ハスミ殿と一緒にできるなら、敵でも味方でも関係ありません！#nきっと楽しいです！えへへっ。"
10016090-108 = "\"新しい経験になるし、きっと楽しいよ。\""
10016090-110 = "……皆さん、どうしてこんなにワガママなんでしょう。"
10016090-111 = "分かりました……トリニティのアンカーは私が務めます。"
10016090-112 = "運動が苦手だからといって、手を抜くつもりはありません。"
10016090-113 = "こうなった以上、自分の手でトリニティの総合優勝を勝ち取ってみせます！"
10016090-115 = "うん――それで十分。"
10016090-116 = "私たちは応援席でハスミを応援するよ。"
10016090-117 = "ファイトです、ハスミ先輩！"
10016090-120 = "さあ、先ほど3番目の走者が出発しました！"
10016090-121 = "最終走者の皆さん、そろそろトラックに上がってきてください！"
10016090-126 = "……あれ、ハスミ副委員長？"
10016090-127 = "……ユウカ？"
10016090-128 = "ハスミ副委員長がここにいるって事は……あなたがトリニティのアンカー？"
10016090-129 = "は、はい……では、ユウカもミレニアムのアンカーとして……？"
10016090-130 = "うん、そうだけど……はあ。"
10016090-131 = "あんまり足速くないんだけど……#nセミナーのみんなが、私がアンカーをやらないなら参加しないって聞かなくて……。"
10016090-132 = "せっかく総合優勝のチャンスだっていうのに、みんなどうしてこんなにワガママなの……！"
10016090-137 = "ふっ、ふふ……。"
10016090-138 = "あ、あれ？私いま何か変なこと言った？"
10016090-139 = "いえ……ただ、ユウカも苦労が多いのだな、と思いまして。"
10016090-140 = "……だからといって手加減する気はありませんが。"
10016090-141 = "そ、それはこっちのセリフよ！"
10016090-142 = "ミレニアムの総合優勝のために全力で走るんだから！"
10016090-143 = "その心構えは立派ですが、今回の総合優勝はトリニティがいただきます。"
10016090-147 = "おお～っと！第三走者がテイクオーバーゾーンまで来ました！"
10016090-154 = "うぅ……走ったらお腹が空いて元気が……。"
10016090-155 = "ばたんきゅ～……"
10016090-156 = "後はお任せください！"
10016090-165 = "第四走者にバトンが渡りました！"
10016090-166 = "ちょ、ちょっと……早くバトンを……う、うわっ！"
10016090-171 = "ゲヘナの第四走者、ジュンコ選手！#nバトンに気を取られて転んでしまいました！"
10016090-172 = "おっと！手痛いミスですね！#nゲヘナは総合優勝争い脱落でしょうか……！？"
10016090-173 = "あっ、ハスミ殿！またご一緒できてうれしいです！"
10016090-174 = "はぁ、……はぁっ！！くっ！！"
10016090-175 = "おお、すごい勢いですね！イズナも負けません！"
10016090-176 = "ま、け、ないわよおおおっ……！"
10016090-177 = "ま、け、ませんっ……！！"
10016090-178 = "うへ、青春だねぇ～"
10016090-179 = "おじさんもなんだかちょっとドキドキしてきちゃったよ……"
10016090-180 = "ホシノ先輩！タッチ終わったならさっさとトラックから出てって！"
10016090-182 = "（はあ、はあ……ゴールテープまであと何メートルでしょうか？）"
10016090-183 = "（息が苦しくて……視界までぼやけてきました……他のランナーはどこへ……）"
10016090-184 = "（ですが、皆さんの声援が聞こえてきます。この凪のように澄んだ状態……）"
10016090-185 = "（もしやこれが俗に言う[ruby=ランナーズ・ハイ]無我の境地[/ruby]……）"
10016090-186 = "（限界なんてとうに超えているというのに、足を踏み出すたびに感情が溢れてきて……）"
10016090-187 = "（このまま、どこまでも……！）"
10016090-189 = "……ハスミ選手、いまゴールを通過しました！"
10016090-190 = "……や、やりました！"
10016090-196 = "トリニティ総合学園――ハスミ選手、6位です。"
10016090-197 = "……えっ？"
10016090-198 = "僅差でしたが、ユウカ選手が先にゴールしています。"
10016090-199 = "最後まで素晴らしい走りでした！お疲れさまです。"
10016090-203 = "わ、私が6位……？#nそれでは……優勝は一体誰が……？"
10016090-204 = "1位のジュンコ選手、怒涛の追い上げが本当に素晴らしかったですねぇ。#n転倒こそありましたが、すぐに立て直してからのごぼう抜きは圧巻でした！"
10016090-205 = "晄輪大祭のトリを飾る学園対抗リレーで、ドラマが誕生した瞬間です！"
10016090-207 = "みんな見てた！？#n私が1位だって！"
10016090-208 = "ふふ……私の計画通りですね。#nジュンコさんなら1位を取れると確信していました！"
10016090-209 = "あらあら……先ほどジュンコさんが転んだ時は「だから美食研究会なんて頼るんじゃなかった」と言っていましたのに。"
10016090-211 = "ふふ……良い表情をしていますね。#n先程までの悩みが吹き飛んだようで良かったですわ。"
10016090-212 = "今年の晄輪大祭の主役は、ジュンコさんですね。"
10016090-213 = "ねえねえ！この「万能食券」があれば何でも食べられるんだよね？"
10016090-214 = "早く早く！売り切れちゃう前に行かなきゃ！"
10016090-216 = "結局、こうなってしまいましたか……。"
10016090-223 = "はぁ……あんなに意気込んでたのに、こんな情けない結果で終わるなんて……。"
10016090-224 = "だからアンカーなんてやりたくなかったのに……。"
10016090-228 = "お疲れさまでした、ユウカ。"
10016090-229 = "ハスミ副委員長もお疲れ様……。"
10016090-231 = "それでは集計が終わりましたので、結果発表に移ります！"
10016090-232 = "今年の晄輪大祭で総合優勝を獲得したのは――"
10016090-234 = "――ゲヘナ学園です！"
