[translation]
10038105-11 = "Por que, afinal...?"
10038105-12 = "Ainda não entendeu?#nNesse caso, terei que lhe ensinar."
10038105-16 = "Lembra-se do que você causou em Shanhaijing — o que nós nomeamos de \"fenômeno de rejuvenescimento\"?"
10038105-17 = "Isso é... regredir a idade física e a estrutura, voltando à infância..."
10038105-21 = "Não pode ser!?"
10038105-22 = "Exatamente.#nGraças a isso, voltei à época em que estava no meu auge."
10038105-23 = "Desde quando...!?"
10038105-24 = "Ora, desde quando será?"
10038105-25 = "Kisaki...!"
10038105-26 = "Fufu, você cavou sua própria cova — Shintani Kai."
10038105-27 = "Bem, o que vai fazer?#nSe pretende continuar causando tumulto —"
10038105-31 = "Estarei disposta a acompanhá-lo pelo tempo que for preciso."
10038105-37 = "..."
10038105-41 = "Eu perdi — pelo menos desta vez."
10038105-42 = "Então — poderia me dizer como pretende me descartar?"
10038105-43 = "Já que Shanhaijing não conseguiu lidar comigo, me enviou para a Agência Correcional, não foi?"
10038105-44 = "..."
10038105-48 = "Pois é, você foi uma aluna que Shanhaijing não conseguiu controlar..."
10038105-49 = "No entanto, a decisão da Genryumon não mudará."
10038105-50 = "Você será transferida novamente para a Agência Correcional — e será encarcerada em um local ainda mais rigoroso."
10038105-52 = "Kuku... você não muda, Kisaki.#nSabe, existe um ditado por aí, não é?"
10038105-56 = "Que esperar resultados diferentes repetindo as mesmas ações — é insanidade."
10038105-58 = "...Diga o que quiser."
10038105-59 = "Não importa onde ou o que você faça, a Genryumon enfrentará você quantas vezes for necessário."
10038105-64 = "Que tédio... ah, que decepção.#nNesse caso, vou perguntar ao Sensei desta vez."
10038105-65 = "[s] \"Hm? Eu?\""
10038105-66 = "Isso mesmo. Tenho interesse no Sensei há muito tempo."
10038105-67 = "Dizem por aí que o Sensei é um adulto que se torna aliado de todos os alunos, não é?"
10038105-68 = "[s] \"Sim, é verdade.\""
10038105-69 = "Isso — também se aplica a mim?"
10038105-70 = "[s] \"Com certeza.\""
10038105-71 = "Oh?"
10038105-76 = "Sensei...!"
10038105-77 = "[s1] \"Se você prometer que não usará mais outros alunos.\"\n[s2] \"Eu serei seu aliado a qualquer momento, Kai.\""
10038105-80 = "Entendo... com condições, é?"
10038105-81 = "Mas, Sensei. Acho que não vou me arrepender, sabe?"
10038105-82 = "[s3] \"Nesse caso, Kai precisa de um pouco de 'estudo'.\"\n[s4] \"Quando precisar de orientação, me chame.\""
10038105-86 = "[ns] \"Porque, se possível... eu não quero desistir de nenhum aluno.\""
10038105-90 = "Sensei..."
10038105-91 = "..."
10038105-92 = "Hum... isso também é uma curiosidade pessoal..."
10038105-93 = "Apenas como uma hipótese."
10038105-94 = "Supondo que houvesse um aluno tão terrível e sem esperança —"
10038105-95 = "Que nunca se arrependeria — bem, usando a expressão popular, um aluno que fosse um verdadeiro monstro."
10038105-96 = "Mesmo assim, o Sensei faria a mesma escolha?"
10038105-100 = "[ns5] \"Mesmo assim, eu farei o meu melhor.\"\n[ns6] \"Porque não há nada mais que possamos fazer.\""
10038105-103 = "E se realmente — não houvesse nem uma chance em dez mil de melhora?"
10038105-104 = "[s] \"Tenho apenas um pedido, Kai.\""
10038105-111 = "[ns] \"Eu quero que você não desista de si mesma.\""
10038105-115 = "...!"
10038105-116 = "Heh, heheh... hahahaha! Fui pego de surpresa!#nEntendo, quem diria que você apareceria com isso aqui!"
10038105-117 = "Haha! Ah, não me importo. Pode me prender.#nPara salvar a sua cara, Sensei, vou cooperar de bom grado!"
10038105-118 = "Para que eu não desista de mim mesma, é... Ah, foi divertido. Foi realmente muito divertido."
10038105-119 = "Então, Shintani Kai. Você ainda tem algo a fazer antes do fim."
10038105-120 = "Ah, pode pedir o que quiser.#nEstou de muito bom humor agora, sabe."
10038105-121 = "Shanhaijing precisa de um antídoto completo para o fenômeno de rejuvenescimento."
10038105-122 = "Hum... assim como o fenômeno de rejuvenescimento possui propriedades de assimilação, o antídoto também pode ser formulado para ter as mesmas propriedades."
10038105-123 = "Não há problema algum em espalhá-lo. Posso fazer isso imediatamente."
10038105-124 = "Heheh... mas tem certeza?#nSe o antídoto se espalhar, você não voltará ao seu corpo doente de antes?"
10038105-125 = "Isso é um detalhe insignificante."
10038105-130 = "Se Shanhaijing puder ser normalizado e o Festival do Luar for realizado em segurança—"
10038105-131 = "Que motivo eu teria para não fazer isso?"
10038105-136 = "...Você pretende continuar sendo uma pessoa comum até o fim, não é?"
10038105-140 = "Bem, faça como quiser.#nSe um dia você se arrepender dessa escolha... eu não terei nada a ver com isso."
10038105-141 = "Ah, isso nem precisa ser dito."
