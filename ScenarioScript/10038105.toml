[translation]
10038105-11 = "いったい、何故……？"
10038105-12 = "まだ分からないのか？#nならば、教えてやらねばなるまいな。"
10038105-16 = "其方が山海経で発生させ――我々が「若返り現象」と名付けたものを覚えておるか？"
10038105-17 = "それは……身体年齢と構造を退行させ、子供時代に戻す……"
10038105-21 = "まさか！？"
10038105-22 = "その通り。#nお陰様で、一番調子が良かった頃に戻っておる。"
10038105-23 = "いつからだ……！？"
10038105-24 = "さて、いつからじゃろうな？"
10038105-25 = "キサキ……！"
10038105-26 = "ふふ、墓穴を掘ったのう――[ruby=しんたに]申谷[/ruby]カイ。"
10038105-27 = "さて、どうする？#nこのまま騒動を引き起こすつもりであるのなら――"
10038105-31 = "いつまででも、付き合ってやろうぞ？"
10038105-37 = "……。"
10038105-41 = "私の負けだ――少なくとも、今回は。"
10038105-42 = "それで――私をどう処分するつもりなのかお聞かせ願えるかね？"
10038105-43 = "山海経で手に負えないから矯正局に送ったのだろう？"
10038105-44 = "……。"
10038105-48 = "そうさな、其方は山海経では手に負えぬ生徒じゃった……"
10038105-49 = "しかし、玄龍門の裁決は変わらぬ。"
10038105-50 = "其方は再び矯正局に移送され――更に厳重な場所へ収監されるじゃろう。"
10038105-52 = "ククッ……変わらないね、キサキ。#n世間にはこんな言葉があるのを知っているかい？"
10038105-56 = "同じことを繰り返しながら、違う結果を期待するのは――正気の沙汰ではない、ということを。"
10038105-58 = "……なんとでも言うがよい。"
10038105-59 = "其方がどこで何をしようとも、玄龍門は何度でも其方を相手しよう。"
10038105-64 = "呆れた……ああ、興醒めだ。#nそれなら今度は先生に聞こうかね。"
10038105-65 = "[s] \"うん？私？\""
10038105-66 = "そう。先生には昔から興味があってねぇ。"
10038105-67 = "話によれば、先生は[ruby=・   ・   ・   ・   ・   ・   ・   ・   ・]すべての生徒の味方[/ruby]になってくれる大人だというじゃないか。"
10038105-68 = "[s] \"うん、そうだよ。\""
10038105-69 = "それは――私にも当てはまるのかな？"
10038105-70 = "[s] \"もちろん。\""
10038105-71 = "ほう？"
10038105-76 = "先生……！"
10038105-77 = "[s1] \"カイがこれ以上他の生徒を利用しないと約束してくれるのなら。\"\n[s2] \"私はいつでも、カイの味方になるよ。\""
10038105-80 = "なるほど……条件つきか。"
10038105-81 = "でも、先生。私は反省しないと思うがねぇ？"
10038105-82 = "[s3] \"それならカイには「勉強」が必要だね。\"\n[s4] \"指導が必要になったら、私を呼んで。\""
10038105-86 = "[ns] \"私はできれば……どんな生徒も諦めたくないから。\""
10038105-90 = "先生……"
10038105-91 = "……。"
10038105-92 = "ふむ……これも個人的な好奇心なのだが……"
10038105-93 = "あくまで、仮定の話として。"
10038105-94 = "どれほど無茶苦茶で、救いようがない生徒がいたとして――"
10038105-95 = "決して反省などせず――そうさね、世間の表現を借りるのなら化け物同然の生徒がいたとして。"
10038105-96 = "それでも先生は、同じ選択をするのかね？"
10038105-100 = "[ns5] \"だとしても私は最善を尽くすよ。\"\n[ns6] \"私たちにはそれ以外できることがないから。\""
10038105-103 = "それが本当に――万に一つも改善の見込みがない生徒だとしたら？"
10038105-104 = "[s] \"一つだけお願いがある、カイ。\""
10038105-111 = "[ns] \"君が、君自身を諦めないでほしい。\""
10038105-115 = "……！"
10038105-116 = "クッ、ククッ……ははははは！これは不意を突かれた！#nなるほど、ここでそう出るとは！"
10038105-117 = "ははっ！ああ、構わないよ。私を捕まえると良い。#n先生の顔を立てて、ここは素直に従おう！"
10038105-118 = "私自身を諦めないでほしい、か……ああ、楽しかった。本当に楽しかったよ。"
10038105-119 = "では、[ruby=しんたに]申谷[/ruby]カイ。其方には最後にやるべきことがある。"
10038105-120 = "ああ、なんでも言うと良い。#n今の私はとても機嫌がいいからねぇ。"
10038105-121 = "山海経には若返り現象の完全な治療薬が必要じゃ。"
10038105-122 = "ふむ……若返り現象が同化する性質を持っていたように、治療薬にも同じ性質を持つよう調剤もできる。"
10038105-123 = "それを散布することは何の問題もない。すぐにでもできるよ。"
10038105-124 = "ククッ……でもいいのかい？#n治療薬が広まれば、君も元の病弱な体に戻ってしまうんじゃないかね？"
10038105-125 = "些末な事じゃ。"
10038105-130 = "山海経が正常化し、月影祭を無事に開催できるのであれば――"
10038105-131 = "そうしない理由が、一体どこにあるというのじゃ？"
10038105-136 = "……最後まで凡夫の一人でいるつもりなんだねぇ。"
10038105-140 = "まあ、勝手にすれば良いさ。#nいつか君がこの選択を後悔したとしても――私は知らないよ。"
10038105-141 = "ああ、言うまでもないことじゃ。"
