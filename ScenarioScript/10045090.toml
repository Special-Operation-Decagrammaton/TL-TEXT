[translation]
10045090-1 = "第9話;最終戦：押し出しゲーム"
10045090-2 = "皆さ～ん！まずは、100人から勝ち残った4人に拍手を！"
10045090-6 = "そしてここからは……4人が1人になる戦い……！#nその第1試合が始まります！"
10045090-8 = "青コーナー！神機妙算な策で相手を翻弄する、百花繚乱の作戦参謀！"
10045090-9 = "水が苦手という噂は本当なのか！？[ruby=きりゅう]桐生[/ruby]キキョウ！"
10045090-10 = "誰？その噂流してるの。"
10045090-11 = "続いて赤コーナー！百花繚乱の突撃隊長にして猪突猛進の鬼教官！"
10045090-12 = "ピンク色のハートで青春を追いかけるのは……[ruby=ふわ]不破[/ruby]レンゲ！"
10045090-13 = "……誰だよ、この紹介文書いたの。"
10045090-15 = "[ns] \"…………！？\""
10045090-16 = "先生？どうかしました？"
10045090-17 = "[s] \"あ、いや、急に寒気がしただけ……。\""
10045090-18 = "そうですか……？"
10045090-19 = "まぁ、気を取り直して！選手のお二方。準備はよろしいですね……？"
10045090-20 = "いざ尋常に～#n――勝負！"
10045090-26 = "……何だよ、仕掛けてこないのか？"
10045090-27 = "それはこっちのセリフ。#n丸腰の私なんて怖くないでしょう？"
10045090-28 = "へっ、無策のやつがそんな目するかよ。"
10045090-29 = "……やっぱり諦めてなかったんだな？"
10045090-30 = "……真剣勝負がしたいって言ったのはあんたでしょ？#nなら、それに応えるのが「友達」だからね。"
10045090-31 = "じゃ、正々堂々戦って、勝ちをもらうとしようかな。"
10045090-32 = "さあ？それはどうだろうね。"
10045090-33 = "ふぅん？"
10045090-34 = "御託はもういいよ。来ないならこっちから行くけど。"
10045090-35 = "そうこなくっちゃ。それなら――"
10045090-37 = "直接確かめてやるよ……！"
10045090-45 = "さぁ始まりましたーっ！"
10045090-51 = "へぇ、意外とやるじゃん。#n部屋で本ばっか読んでたやつの力じゃないな？"
10045090-52 = "体力作りぐらい、私だってしてるから。"
10045090-53 = "それに……力さえ上回れば私に勝てると思った？#n本当、昔から何も変わらないね。"
10045090-54 = "昔？どのぐらい昔だ？"
10045090-55 = "あれは七歳の時……#n一緒にブランコに乗って、どっちが高く漕げるか競争したよね。"
10045090-56 = "……え？"
10045090-57 = "結果は私の勝ち。#nだってあなた、力任せに漕いでるだけだったもの。"
10045090-58 = "罰ゲームはたしか……一週間、お菓子を買いに行かされてたんだっけ。"
10045090-59 = "い、いつの話をしてるんだよ！？"
10045090-61 = "……今だけど！"
10045090-65 = "ぐっ！？"
10045090-70 = "ここでキキョウ選手の足払いが決まったぁ！#nレンゲ選手、倒れてしまいました！"
10045090-71 = "このまま決めさせてもらうよ。"
10045090-75 = "キキョウ選手、畳みかけます！#n寝技に持ち込まれたレンゲ選手、これは少々苦しいか～？"
10045090-76 = "[ns] \"相手の動きを封じて、じわじわと体力を奪う作戦だ！\""
10045090-77 = "まるでこんがらがった糸のように相手を絡めとる動き！#nもがくレンゲ選手ですが抜け出せません！"
10045090-78 = "くっ、なかなかやるじゃん……！"
10045090-79 = "でも、これで終わっちゃいられないよなっ……！"
10045090-85 = "完璧に押さえこんだと思ったのに。"
10045090-86 = "お前から学んだんだよ、頭を使って力を温存する方法をな。"
10045090-87 = "それに、何を狙ってんのかも見ておきたかったし。"
10045090-89 = "……レンゲも成長してるんだね。"
10045090-90 = "さっきの技、トライアングルチョークだったか？#nまさかあんな技まで仕込んでるとは思わなかったよ。"
10045090-91 = "あれは「あやとり」の応用よ。"
10045090-92 = "あんな「あやとり」があるかぁ！！"
10045090-93 = "複雑に絡み合うって意味では、似てるかも？"
10045090-94 = "……まぁ、そういうことにしてあげるよ。"
10045090-95 = "で、次はどうするつもりだ？#n忠告しておくけど、同じ手は食わないからな？"
10045090-104 = "キキョウ先輩……戦うことを選んだんですのね。"
10045090-105 = "チームじゃなくて、自分のために戦ってる。嬉しいね。"
10045090-106 = "ですが、このまま持久戦になったら、やはりレンゲ先輩のほうが有利でしょうか……。"
10045090-107 = "状況的にはそうだね。"
10045090-108 = "でも……キキョウにとってはそうじゃないかもしれない。#nなにせキキョウは――"
10045090-110 = "百花繚乱の作戦参謀！"
10045090-111 = "きっと奇策を駆使してレンゲ先輩の隙を突くはずですの！"
10045090-116 = "……こういうのはどう？"
10045090-120 = "どこ踏んでるのさ。そこには何も……。"
10045090-121 = "うわっ！？"
10045090-125 = "キキョウ選手！浮き島を揺らしてレンゲ選手の体勢を崩しましたっ！"
10045090-126 = "このまま押し出す……！"
10045090-127 = "させないよ……！！"
10045090-133 = "はぁ……はぁ……。"
10045090-134 = "ふうぅぅぅ……。"
10045090-135 = "……なあ、どうして急に本気で戦う気になったんだ？"
10045090-136 = "レンゲが真剣に戦いたいって言ったから。"
10045090-137 = "それだけじゃないだろ？"
10045090-138 = "それは……。"
10045090-139 = "……諦めたくなかったの。もう、私一人の戦いじゃない。"
10045090-141 = "……どういう意味だ？"
10045090-142 = "もちろん、最初は棄権しようと思ってた。"
10045090-143 = "ここでレンゲに勝ちを譲れば、百花繚乱としては優勝に近づくから。"
10045090-144 = "でも……よくよく考えたら、それじゃダメだって気づいたの。"
10045090-146 = "……みんなが、こんな私を応援してくれた。"
10045090-150 = "ナグサ先輩、ユカリ。"
10045090-155 = "力を貸してくれたみんな。"
10045090-160 = "先生と、たくさんの観客。"
10045090-165 = "あとは……レンゲ、あんたも。"
10045090-167 = "私は自分の弱さを隠すために必死になってた。#nそれでも、そんな私をみんなは応援してくれた。"
10045090-168 = "だから……最後まで諦めない。"
10045090-169 = "百花繚乱の誇りにかけて。"
10045090-170 = "私を信じてくれたみんなに応えるために。"
10045090-171 = "レンゲと私――みんなとの「友情」のために。"
10045090-172 = "そう！それだよそれ！#nやっとらしくなってきたじゃん！"
10045090-173 = "それじゃ、続きをやろうか。こっからは……。"
10045090-174 = "青春の時間だよ！"
10045090-190 = "す、凄まじい戦いです！目が追い付きません……！"
10045090-191 = "[ns1] \"「力」のレンゲか！\"\n[ns2] \"「技」のキキョウか！\""
10045090-195 = "くっ……！"
10045090-200 = "これで……決める！"
10045090-205 = "絶対に……負けない！"
10045090-211 = "あれは……！"
10045090-212 = "なんと……！！"
10045090-213 = "この勝負の行方は……！？"
10045090-217 = "勝者は……！"
10045090-218 = "[ns] \"[ruby=ふわ]不破[/ruby]レンゲ……！\""
10045090-222 = "（……）"
10045090-223 = "（……そっか。負けちゃったんだ、私）"
10045090-224 = "（体が重い。このまま、海の底へ沈んでいくみたい……）"
10045090-229 = "（……でも、ここで終わるわけにはいかない。#nレンゲに教えてもらったんだから）"
10045090-230 = "（証明するんだ。私も、やればできるんだって……！）"
10045090-232 = "ぷはぁっ……！"
10045090-233 = "おっ、うまくなってるじゃん！"
10045090-234 = "ふうぅぅぅ……。"
10045090-235 = "これで、もう水は怖くないな。"
10045090-236 = "うん、まだぎこちないけど。"
10045090-242 = "[ns] \"二人とも、最高だったよ！\""
10045090-244 = "感動的な試合でしたわ……！"
10045090-245 = "本当にお疲れ様。"
10045090-252 = "みんな……ありがとう。"
