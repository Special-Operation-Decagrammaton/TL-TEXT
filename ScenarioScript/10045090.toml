[translation]
10045090-1 = "Episódio 9; Batalha Final: Jogo de Empurrar"
10045090-2 = "Olá a todos! Primeiro, vamos aplaudir os 4 finalistas que sobreviveram entre os 100 participantes!"
10045090-6 = "E daqui em diante... é uma batalha onde 4 se tornarão 1...!#nA primeira partida vai começar!"
10045090-8 = "No canto azul! A estrategista da Hyakkiyako, que confunde seus oponentes com planos engenhosos!"
10045090-9 = "É verdade o boato de que ela não gosta de água!? Kiryu Kikyou!"
10045090-10 = "Quem? Quem está espalhando esse boato?"
10045090-11 = "A seguir, no canto vermelho! A capitã de ataque da Hyakkiyako e instrutora demoníaca que avança imprudentemente!"
10045090-12 = "Perseguindo a juventude com um coração cor-de-rosa... Fuwa Renge!"
10045090-13 = "...Quem foi que escreveu essa apresentação?"
10045090-15 = "[ns] \"…………！？\""
10045090-16 = "Sensei? Aconteceu alguma coisa?"
10045090-17 = "[s] \"Ah, não, só senti um calafrio de repente...\""
10045090-18 = "É mesmo...?"
10045090-19 = "Bem, mudando de assunto! Ambas as competidoras, estão prontas...?"
10045090-20 = "Preparem-se para o combate!#n――Começar!"
10045090-26 = "...O que foi? Não vai atacar?"
10045090-27 = "Essa é a minha fala.#nVocê não deveria ter medo de mim, já que estou desarmada?"
10045090-28 = "Heh, alguém sem estratégia não teria esse olhar."
10045090-29 = "...Então você não tinha desistido, afinal?"
10045090-30 = "...Foi você quem disse que queria uma luta séria, não foi?#nEntão, como \"amiga\", é meu dever responder a isso."
10045090-31 = "Então, vamos lutar de forma justa e honesta, e eu vou levar a vitória."
10045090-32 = "Ah é? Será mesmo?"
10045090-33 = "Hmm?"
10045090-34 = "Chega de conversa. Se você não vem, eu vou até você."
10045090-35 = "Era isso que eu esperava. Nesse caso――"
10045090-37 = "Vou verificar pessoalmente...!"
10045090-45 = "E começou!"
10045090-51 = "Heh, você é surpreendentemente boa nisso.#nNão parece a força de alguém que só fica lendo livros no quarto, não é?"
10045090-52 = "Eu também faço exercícios físicos, sabia?"
10045090-53 = "Além disso... você achou que me venceria só por ter mais força?#nSério, você não mudou nada desde antigamente."
10045090-54 = "Antigamente? Há quanto tempo?"
10045090-55 = "Foi quando tínhamos sete anos...#nNós subimos no balanço juntas e competimos para ver quem ia mais alto, lembra?"
10045090-56 = "...Eh?"
10045090-57 = "Eu ganhei.#nPorque você só usava força bruta para balançar."
10045090-58 = "O castigo, se não me engano... era ter que ir comprar doces para mim por uma semana."
10045090-59 = "D-de quando você está falando!?"
10045090-61 = "...De agora!"
10045090-65 = "Guh!?"
10045090-70 = "A rasteira da Kikyou foi certeira!#nA Renge caiu!"
10045090-71 = "Vou finalizar aqui mesmo."
10045090-75 = "Kikyou pressiona a vantagem!#nRenge foi levada para o chão, será que ela está em apuros?"
10045090-76 = "[ns] \"É uma estratégia para imobilizar o oponente e drenar sua energia aos poucos!\""
10045090-77 = "Movimentos que enredam o oponente como fios emaranhados!#nRenge tenta se soltar, mas não consegue!"
10045090-78 = "Droga, você é muito boa...!"
10045090-79 = "Mas eu não vou deixar terminar assim...!"
10045090-85 = "E eu que pensei que tinha te imobilizado perfeitamente."
10045090-86 = "Aprendi com você, a usar a cabeça para poupar energia."
10045090-87 = "Além disso, eu queria ver o que você estava planejando."
10045090-89 = "...Renge, você também cresceu."
10045090-90 = "Aquele golpe de agora, foi um triângulo?#nNão imaginava que você tinha aprendido uma técnica dessas."
10045090-91 = "Aquilo é uma aplicação de 'cama de gato'."
10045090-92 = "Que tipo de 'cama de gato' é essa?!"
10045090-93 = "No sentido de estar tudo entrelaçado, talvez seja parecido?"
10045090-94 = "……Bem, vamos deixar por isso mesmo."
10045090-95 = "Então, o que pretende fazer agora?#nJá aviso que não vou cair no mesmo truque duas vezes."
10045090-104 = "Kikyou-senpai... ela escolheu lutar."
10045090-105 = "Não pelo time, mas por si mesma. Fico feliz por ela."
10045090-106 = "Mas, se isso se tornar uma guerra de atrito, a Renge-senpai ainda terá a vantagem, não é...?"
10045090-107 = "Em termos de situação, sim."
10045090-108 = "Mas... para a Kikyou, pode não ser assim.#nPois a Kikyou é—"
10045090-110 = "A estrategista da Hyakkiyako!"
10045090-111 = "Com certeza ela vai usar uma estratégia inusitada para encontrar uma brecha na Renge-senpai!"
10045090-116 = "……Que tal isso?"
10045090-120 = "Onde você está pisando? Não tem nada aí..."
10045090-121 = "Ué!?"
10045090-125 = "Competidora Kikyou! Ela balançou a plataforma flutuante e desequilibrou a competidora Renge!"
10045090-126 = "Vou empurrar agora...!"
10045090-127 = "Não vou deixar...!!"
10045090-133 = "Haa... haa..."
10045090-134 = "Fuuu..."
10045090-135 = "……Ei, por que você decidiu lutar a sério de repente?"
10045090-136 = "Porque a Renge disse que queria lutar a sério."
10045090-137 = "Não é só isso, né?"
10045090-138 = "Isso é..."
10045090-139 = "……Eu não queria desistir. Já não é mais uma luta só minha."
10045090-141 = "……O que você quer dizer com isso?"
10045090-142 = "Claro, no começo eu pensei em desistir."
10045090-143 = "Se eu cedesse a vitória para a Renge aqui, a Hyakkiyako estaria mais perto do campeonato."
10045090-144 = "Mas... pensando bem, percebi que isso não estava certo."
10045090-146 = "……Todos torceram por mim, mesmo eu sendo assim."
10045090-150 = "Nagusa-senpai, Yukari."
10045090-155 = "Todos que me emprestaram sua força."
10045090-160 = "O Sensei e os muitos espectadores."
10045090-165 = "E também... Renge, você também."
10045090-167 = "Eu estava desesperada para esconder minha fraqueza.#nMesmo assim, todos torceram por mim."
10045090-168 = "Por isso... não vou desistir até o fim."
10045090-169 = "Pelo orgulho da Hyakkiyako."
10045090-170 = "Para retribuir a todos que acreditaram em mim."
10045090-171 = "Pela 'amizade' entre a Renge, eu e todos os outros."
10045090-172 = "Isso! É disso que eu estou falando!#nFinalmente você está agindo como você mesma!"
10045090-173 = "Então, vamos continuar. Daqui em diante..."
10045090-174 = "É hora da juventude!"
10045090-190 = "Q-que luta incrível! Meus olhos não conseguem acompanhar...!"
10045090-191 = "[ns1] \"Renge, a força bruta!\"\n[ns2] \"Kikyou, a técnica!\""
10045090-195 = "Droga...!"
10045090-200 = "Vou decidir isso... agora!"
10045090-205 = "Eu não vou... perder!"
10045090-211 = "Aquilo é...!"
10045090-212 = "Inacreditável...!!"
10045090-213 = "Qual será o desfecho dessa luta...!?"
10045090-217 = "O vencedor é...!"
10045090-218 = "[ns] \"Fuwa Renge...!\""
10045090-222 = "（……）"
10045090-223 = "（……Entendi. Eu perdi, não foi?）"
10045090-224 = "（Meu corpo está pesado. É como se eu estivesse afundando no fundo do mar...）"
10045090-229 = "（……Mas não posso terminar aqui. Afinal, a Renge me ensinou isso.）"
10045090-230 = "（Vou provar. Que eu também consigo se eu me esforçar...!）"
10045090-232 = "Puf...! "
10045090-233 = "Oh, você está melhorando!"
10045090-234 = "Fuuu..."
10045090-235 = "Com isso, você não precisa mais ter medo da água."
10045090-236 = "Sim, embora eu ainda esteja um pouco desajeitada."
10045090-242 = "[ns] \"Vocês duas foram incríveis!\""
10045090-244 = "Foi uma partida emocionante...!"
10045090-245 = "Bom trabalho, de verdade."
10045090-252 = "Pessoal... obrigada."
