[translation]
1300202-1 = "Marca-passo"
1300202-2 = "Refeitório da Academia Gehenna"
1300202-3 = "Sensei, falta pouco para o dia do concurso de comer tudo que vai acontecer no Shopping Central!"
1300202-4 = "Disseram que a categoria deste ano será 'hambúrguer', mas como nunca tentei comer hambúrgueres em grande quantidade, estou um pouco nervosa."
1300202-5 = "Mas, para manter meu título de campeã de comilança por três anos consecutivos, não posso desistir agora!"
1300202-6 = "Por isso, hoje, para me preparar para o torneio, decidi fazer um treino intensivo aqui no refeitório de Gehenna."
1300202-7 = "Só que, como não há outros competidores por perto, se eu comer tudo sozinha, corro o risco de passar mal... Sensei, você poderia ser meu marca-passo?"
1300202-8 = "[s] \"Marca-passo?\""
1300202-9 = "Ora, você não sabe o que é um marca-passo?"
1300202-10 = "Marca-passo é o termo usado para alguém que corre junto com atletas específicos em maratonas e outras provas, ajudando a ajustar o ritmo de forma adequada."
1300202-11 = "Dizem que, se você tentar correr rápido sem critério, acaba se cansando muito mais rápido do que se corresse devagar."
1300202-12 = "O concurso de comer tudo é igual a uma maratona. Se você perder o ritmo desde o início e comer com pressa, logo vai enjoar do sabor e, no pior dos casos, pode acabar tendo uma indigestão!"
1300202-13 = "Por isso, Sensei, por favor, coma hambúrgueres aqui do meu lado!"
1300202-14 = "[s] \"Mas eu não consigo comer a mesma quantidade que você, Akari...\""
1300202-15 = "Não se preocupe. Pensei nisso e preparei hambúrgueres em tamanho mini para você."
1300202-16 = "Enquanto você come um hambúrguer pequeno, eu comerei um destes hambúrgueres grandes."
1300202-17 = "Vamos lá, comece!"
1300202-19 = "Trigésimo primeiro, obrigada pela refeição!"
1300202-20 = "Muito bem, agora vamos para o trigésimo segundo..."
1300202-21 = "[s] \"Ugh...\""
1300202-22 = "Sensei, suas mãos pararam? Com esse tamanho, não dá para colocar tudo na boca de uma vez e engolir?"
1300202-23 = "Ainda falta muito caminho, não pode parar aqui. #nO objetivo são 100 unidades! Vamos manter o ritmo!"
1300202-24 = "Hã? ...O recorde histórico de comer hambúrgueres, você diz?"
1300202-25 = "Pelo que me lembro, antes de eu começar a participar... o vencedor do torneio de 10 anos atrás comeu '30 unidades', o que foi um novo recorde. Desde então, hambúrgueres não tinham sido escolhidos como categoria."
1300202-26 = "Hã? Então, já que o recorde foi batido, não poderíamos parar por aqui...?"
1300202-27 = "De jeito nenhum! Não podemos ser tão medíocres!"
1300202-28 = "Esta disputa não é contra o recorde... é uma batalha contra mim mesma!"
1300202-29 = "[s] \"Eu não aguento mais...\""
1300202-30 = "Vamos, Sensei. Não desista, fique de pé, vamos lá. Eu ainda estou longe de estar satisfeita."
1300202-31 = "Se suas mãos não se movem, eu mesma vou te dar a comida, então apenas abra a boca."
1300202-32 = "Vamos, Sensei. Diga 'ah', ahn~ ♥"
1300202-34 = "Depois disso, pressionado pelo ritmo da Akari, continuei comendo os mini hambúrgueres à força, mas cheguei ao meu limite antes mesmo de completar 40..."
