[translation]
2300615-1 = "百夜堂の看板娘はアンティークがお好き！"
2300615-2 = "（お昼ごろに、百夜堂を訪れた）"
2300615-7 = "[ns] \"おお……賑やかだ……。\""
2300615-9 = "わっ、先生……いえ、お帰りなさいませ、ご主人様！"
2300615-10 = "すみません、今ちょうどピークの時間で……！"
2300615-11 = "[s] \"大盛況だね！！\""
2300615-12 = "は、はい……お席へご案内しますね！#n一名様ご案内しまーす！"
2300615-17 = "（空いている席に案内され、座ることができた）"
2300615-18 = "ご注文は何になさいますか？"
2300615-19 = "おすすめは、特上林檎の皮を使った――"
2300615-20 = "[s] \"じゃあ、それで！\""
2300615-21 = "まだ全部紹介してないのに！？"
2300615-22 = "そ、それでいいんですか！？本当に！？"
2300615-23 = "[s1] \"だってシズコ、忙しそうだから。\"\n[s2] \"シズコがオススメしてくれるなら間違いはないからね。\""
2300615-26 = "ふ、ふふん～！#nもう……"
2300615-27 = "べ、別にそんなこと言われたって……#nふんだっ！サービス特盛にしちゃいますからねっ！"
2300615-28 = "[s] \"サービス特盛……！？\""
2300615-29 = "それでは、少々お待ちください！！"
2300615-34 = "それじゃあ先生スペシャルを……"
2300615-35 = "しゃ、社長！大変です！"
2300615-36 = "社長じゃなくて、委員長！#nどうしたの？"
2300615-37 = "すみません、委員長！#nその……お客様が多すぎて、食器が追いつかなくて……。"
2300615-38 = "ええっ！？"
2300615-39 = "限定メニューのアップルティーが人気すぎて……。"
2300615-40 = "これから準備するにしても、少なくとも20分はかかってしまうかと……。"
2300615-43 = "（参ったなぁ……今日に限って、こんなことになるだなんて……）"
2300615-44 = "（でも先生を20分も待たせるわけにはいかない）"
2300615-45 = "（百夜堂はいつ如何なる時も、最高のサービスを提供するんだから……！）"
2300615-46 = "（方法なら……）"
2300615-47 = "（あるっ！！）"
2300615-50 = "分かった。そっちは私がなんとかするから、あなたは5番テーブルの対応をお願い。#n花見だんご2個と、モチモチ林檎もなか1個の追加注文が入ってるから！"
2300615-51 = "はいっ！"
2300615-53 = "（しばらくして……）"
2300615-54 = "お待たせしました！#nご注文のアップルティーと、サービスの[ruby=ようかん]羊羹[/ruby]です！"
2300615-55 = "[s] \"おいしそう！\""
2300615-56 = "それでは、ごゆっくりどうぞ！えへへっ。"
2300615-60 = "[ns] \"あれ、なんだか……。\""
2300615-62 = "（普段提供されるものと違う感じがしたので、ティーセットを観察してみた）"
2300615-63 = "[ns3] \"これ、百夜堂で使われてるものじゃないのかも。\"\n[ns4] \"ちょっと古いけど、丁寧に手入れされてる。\""
2300615-66 = "（アップルティーも、サービスで出してくれた羊羹も、どれもすごく美味しかった）"
2300615-68 = "ふぅ、ようやく落ち着きましたね。"
2300615-69 = "みんなも休憩入っていいわよ。"
2300615-70 = "はい、委員長！"
2300615-74 = "ご主人さ……いえ、先生！"
2300615-75 = "今日はバタバタしちゃってすみません。"
2300615-76 = "えへへ、私の活躍……いかがでしたか？"
2300615-77 = "[s] \"うん、さっきのドジっ子演技とか、凄かった！\""
2300615-78 = "あれは演技じゃなくて本当に危なかったんですから！#nふふっ、百夜堂の看板娘、[ruby=かわわ]河和[/ruby]シズコでなきゃ大惨事になってたと思います。"
2300615-79 = "とにかく……お店も一旦落ち着いたんで、休憩しに来ちゃいました。えへへっ。"
2300615-80 = "[s5] \"お疲れ様。\"\n[s6] \"ところで、このティーセットって……。\""
2300615-86 = "あっ、あぁ……お気づきでしたか……。"
2300615-87 = "実は……"
2300615-89 = "本来であれば、こういう対応はしちゃダメなんですけど……。"
2300615-90 = "事前に対策をとっていなかった私の責任でもありますし……。"
2300615-91 = "なので……先生には、私物のティーセットで提供して、しまいました……。"
2300615-92 = "[s] \"それが、どうかしたの？\""
2300615-93 = "だ、だってぇ……"
2300615-98 = "この茶器のデザインって、イベントテーマとマッチしてないですし……。"
2300615-99 = "他のお客さんに出したティーセットは、ちゃんと雰囲気に合わせたデザインになっているのに……。"
2300615-100 = "先生にだけ、こんな地味な茶器で出してしまいましたから……。"
2300615-101 = "百夜堂のオーナーとしてあるまじき行為でした……。"
2300615-102 = "本当にごめんなさい……。"
2300615-103 = "[s7] \"ううん、全然。むしろ素晴らしい機転だったよ。\"\n[s8] \"おかげで、待つことなく美味しいお茶が楽しめたからね。\""
2300615-106 = "……もう、先生ったら……。"
2300615-107 = "[s] \"この茶器、古風というか、アンティークな感じがするね。\""
2300615-108 = "あ、はい、実は……"
2300615-109 = "これは、私が初めて揃えた茶器セットなんです。"
2300615-110 = "茶道を始めたのも、この子と一緒でして……"
2300615-111 = "うっ……あの時は失敗が多くて、茶葉をたくさん無駄にしちゃいました……。"
2300615-112 = "[s] \"つまり、これはシズコの歴史そのものなんだね。\""
2300615-113 = "ふふ、そうとも言えますね。"
2300615-114 = "まぁ……時間が経つにつれて、百夜堂の内装も変わり、可愛いデザインの茶器も次々と出てくる今からすれば……"
2300615-115 = "この子は……ちょっとダサいなぁ、って気もして……。"
2300615-116 = "それを先生に出したと思うと、うっ……。"
2300615-117 = "[s] \"ううん。\""
2300615-118 = "……？"
2300615-119 = "[s9] \"お茶については詳しくないけど。\"\n[s10] \"趣きのある味がして、良かったよ。\""
2300615-122 = "は、はい！？"
2300615-123 = "[s11] \"この茶器は、シズコの古い友人なんでしょ？\"\n[s12] \"シズコの思い出を、一緒に味わった気がしたからね。\""
2300615-126 = "う゛っ！？"
2300615-131 = "[ns] \"し、シズコ？大丈夫？\""
2300615-132 = "い、いえ……さっきのは……私なりに会心攻撃をくらった時のリアクション……！"
2300615-133 = "ふふ、百夜堂の看板娘でなければ、致命傷だったでしょう……！"
2300615-134 = "……と言っても、先生のことは、もう……。"
2300615-135 = "[s] \"うん？どうしたの？\""
2300615-136 = "な、なんでもありません！"
2300615-137 = "……さっきのお言葉、ちゃんと受け取りましたからね！"
2300615-138 = "思い出を味わうことができた――うん！#n百夜堂のオーナーとして、嬉しい限りです！"
2300615-139 = "……。"
2300615-140 = "……その、先生？"
2300615-146 = "せっかくですし、もし先生がよろしければ……"
2300615-147 = "これからも、この茶器で……お茶をお出ししても、いいでしょうか……？"
2300615-148 = "[s] \"うん、楽しみにしてるね。\""
2300615-149 = "……はい！"
2300615-150 = "この茶器にも……先生との新しい思い出が刻み込まれたら嬉しいです！"
