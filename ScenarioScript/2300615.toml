[translation]
2300615-1 = "A garota-propaganda da Hyakkiyako adora antiguidades!"
2300615-2 = "（Por volta do meio-dia, visitei a Hyakkiyako）"
2300615-7 = "[ns] \"Nossa... que movimento...\""
2300615-9 = "Ah, Sensei... digo, bem-vindo de volta, mestre!"
2300615-10 = "Desculpe, é que agora estamos no horário de pico...!"
2300615-11 = "[s] \"Está um sucesso total!!\""
2300615-12 = "S-sim... vou te levar até uma mesa! #nUm cliente chegando!"
2300615-17 = "（Fui levado a uma mesa vazia e consegui me sentar）"
2300615-18 = "O que vai querer pedir?"
2300615-19 = "Nossa recomendação é feita com a casca da maçã especial..."
2300615-20 = "[s] \"Então, vai esse mesmo!\""
2300615-21 = "Mas eu nem terminei de apresentar tudo!?"
2300615-22 = "T-tem certeza disso!? Sério mesmo!?"
2300615-23 = "[s1] \"É que você parece ocupada, Shizuko.\"\n[s2] \"Se você está recomendando, não tem como errar.\""
2300615-26 = "Hu, hufun~! #nOra essa..."
2300615-27 = "N-não é como se eu me importasse com o que você diz... #nHumpf! Vou caprichar na porção extra como cortesia, viu!"
2300615-28 = "[s] \"Porção extra de cortesia...?\""
2300615-29 = "Então, por favor, aguarde um momento!!"
2300615-34 = "Então, vou preparar o especial do Sensei..."
2300615-35 = "P-presidente! É uma emergência!"
2300615-36 = "Não sou presidente, sou a presidente do comitê! #nO que houve?"
2300615-37 = "Desculpe, presidente do comitê! #nÉ que... tem clientes demais e a louça não está dando conta..."
2300615-38 = "O quê!?"
2300615-39 = "O chá de maçã do menu limitado está fazendo muito sucesso..."
2300615-40 = "Mesmo se começarmos a preparar agora, vai levar pelo menos 20 minutos..."
2300615-43 = "（Que situação... logo hoje, tinha que acontecer isso...）"
2300615-44 = "（Mas não posso deixar o Sensei esperando por 20 minutos）"
2300615-45 = "（A Hyakkiyako sempre oferece o melhor serviço, não importa a situação...!）"
2300615-46 = "（Se houver um jeito...）"
2300615-47 = "（Eu vou encontrar!!）"
2300615-50 = "Entendido. Eu cuido disso, você cuida da mesa 5. #nTem um pedido extra de 2 bolinhos de hanami e 1 monaka de maçã macia!"
2300615-51 = "Sim!"
2300615-53 = "（Algum tempo depois...）"
2300615-54 = "Desculpe a demora! #nAqui está o seu chá de maçã e o Yokan de cortesia!"
2300615-55 = "[s] \"Parece delicioso!\""
2300615-56 = "Aproveite com calma! Ehehe."
2300615-60 = "[ns] \"Ué, que estranho...\""
2300615-62 = "（Como senti que era diferente do que costumam servir, observei o conjunto de chá）"
2300615-63 = "[ns3] \"Talvez isso não seja o que costumam usar na Hyakkiyako.\"\n[ns4] \"É um pouco antigo, mas está muito bem cuidado.\""
2300615-66 = "（Tanto o chá de maçã quanto o Yokan de cortesia estavam deliciosos）"
2300615-68 = "Ufa, finalmente acalmou."
2300615-69 = "Pessoal, podem fazer uma pausa também."
2300615-70 = "Sim, presidente do comitê!"
2300615-74 = "Mestre... digo, Sensei!"
2300615-75 = "Desculpe pela correria de hoje."
2300615-76 = "Ehehe, o que achou da minha atuação?"
2300615-77 = "[s] \"Sim, aquela sua atuação de atrapalhada foi incrível!\""
2300615-78 = "Aquilo não foi atuação, foi um perigo real! #nFufu, se não fosse pela garota-propaganda da Hyakkiyako, Kawa Shizuko, acho que teria sido um desastre total."
2300615-79 = "Enfim... o movimento deu uma acalmada, então vim aqui descansar um pouco. Ehehe."
2300615-80 = "[s5] \"Bom trabalho.\"\n[s6] \"A propósito, sobre esse conjunto de chá...\""
2300615-86 = "Ah, ah... você percebeu...?"
2300615-87 = "Na verdade..."
2300615-89 = "Em circunstâncias normais, eu não deveria fazer esse tipo de atendimento..."
2300615-90 = "É minha responsabilidade por não ter tomado as medidas necessárias com antecedência..."
2300615-91 = "Por isso... acabei servindo o Sensei usando meu conjunto de chá pessoal..."
2300615-92 = "[s] \"E o que tem de errado nisso?\""
2300615-93 = "M-mas é que..."
2300615-98 = "O design deste conjunto de chá não combina com o tema do evento..."
2300615-99 = "Enquanto os conjuntos de chá servidos aos outros clientes têm designs que combinam perfeitamente com a atmosfera..."
2300615-100 = "Eu acabei servindo o Sensei com este conjunto tão simples..."
2300615-101 = "Foi um comportamento indigno de uma proprietária da Hyakkiyako..."
2300615-102 = "Sinto muito mesmo..."
2300615-103 = "[s7] \"Não, de jeito nenhum. Na verdade, foi uma ótima improvisação.\"\n[s8] \"Graças a isso, pude desfrutar de um chá delicioso sem precisar esperar.\""
2300615-106 = "...Ora, Sensei..."
2300615-107 = "[s] \"Este conjunto de chá, ele tem um ar clássico, ou melhor, antigo, não é?\""
2300615-108 = "Ah, sim, na verdade..."
2300615-109 = "Este foi o primeiro conjunto de chá que eu comprei."
2300615-110 = "Comecei a praticar a cerimônia do chá junto com ele..."
2300615-111 = "Ugh... naquela época eu cometia muitos erros e desperdiçava muitas folhas de chá..."
2300615-112 = "[s] \"Ou seja, isso é a própria história da Shizuko, não é?\""
2300615-113 = "Fufu, pode-se dizer que sim."
2300615-114 = "Bem... com o passar do tempo, a decoração da Hyakkiyako mudou e, hoje em dia, com tantos conjuntos de chá de designs fofos surgindo..."
2300615-115 = "Eu sinto que este aqui... é um pouco antiquado..."
2300615-116 = "E pensar que eu servi o Sensei com ele, ugh..."
2300615-117 = "[s] \"Não, não é.\""
2300615-118 = "...?"
2300615-119 = "[s9] \"Não entendo muito de chá.\"\n[s10] \"Mas ele tem um sabor cheio de personalidade, foi muito bom.\""
2300615-122 = "H-hein!?"
2300615-123 = "[s11] \"Este conjunto de chá é um velho amigo da Shizuko, não é?\"\n[s12] \"Senti como se estivesse saboreando as memórias da Shizuko junto com o chá.\""
2300615-126 = "Ugh!?"
2300615-131 = "[ns] \"S-Shizuko? Você está bem?\""
2300615-132 = "N-não... aquilo foi... minha reação ao receber um ataque crítico, do meu jeito...!"
2300615-133 = "Fufu, se eu não fosse a garota-propaganda da Hyakkiyako, teria sido um golpe fatal...!"
2300615-134 = "...Dito isso, sobre o Sensei, eu já..."
2300615-135 = "[s] \"Hum? O que foi?\""
2300615-136 = "N-não é nada!"
2300615-137 = "...Eu recebi bem as suas palavras de agora há pouco!"
2300615-138 = "Poder saborear as memórias — sim! #nComo proprietária da Hyakkiyako, fico muito feliz!"
2300615-139 = "..."
2300615-140 = "...Digo, Sensei?"
2300615-146 = "Já que estamos aqui, se o Sensei não se importar..."
2300615-147 = "Daqui para frente, eu poderia... continuar servindo o chá com este conjunto...?"
2300615-148 = "[s] \"Sim, estarei esperando por isso.\""
2300615-149 = "...Sim!"
2300615-150 = "Ficaria muito feliz se novas memórias com o Sensei também fossem gravadas neste conjunto de chá!"
