[translation]
2000605-1 = "サヤのおいしいレストラン"
2000605-2 = "とあるラーメン屋"
2000605-3 = "ここがぼく様おすすめのラーメン屋さん！"
2000605-4 = "ここの店主はラーメン週間のたびに、独創的でびっくりするような新メニューを出してくれるのだ。"
2000605-5 = "今回新しく開発したラーメンも、さぞかし美味しいに違いないのだ♪"
2000605-6 = "ん、先生どうしたのだ？顔色が悪いけど……？"
2000605-7 = "もしかして先生、ラーメンは苦手なのだ？"
2000605-8 = "[s1] \"いや、全然好きなんだけど……。\"\n[s2] \"何かこの辺、すごい匂いが……。\""
2000605-13 = "おっ。サヤっち、来てくれたんだ！"
2000605-14 = "やあ。今日は先生と一緒に、今回の新メニューを食べに来たのだ！"
2000605-15 = "あー……サヤっち、それなんだけどさ。悪いけど今回は、新メニューの開発が上手くいかなくって……。"
2000605-16 = "んん、どうしたのだ？つい先週、新しい最高のスープが完成しそうだって喜んでなかったか？"
2000605-17 = "あの後、何か問題でも起きたのだ？"
2000605-18 = "そのスープにちょっと問題があって……。"
2000605-19 = "これ、なんだけど……。"
2000605-22 = "[s] \"さっきの匂い、これだ……！？\""
2000605-23 = "匂いで分かるかもしれないけど、今回のスープにはクサヤのエキスを使ったんだ。"
2000605-24 = "今まで作った中でも「うま味」はダントツなんだけど、クサヤの生臭さがどうしても処理できなくって……。"
2000605-25 = "流石にこれを、お客様にお出しするわけにはいかないなって……。"
2000605-26 = "むぅ、残念なのだ……新作ラーメン、期待してたのに……。"
2000605-28 = "……あ、そうだ。ねえサヤっち。この匂いを消せる方法とか、何か知らない？"
2000605-29 = "ん？どうしてそんなことをぼく様に？"
2000605-30 = "サヤっちはずっと錬丹術を研究してるから、色んな材料について詳しいっしょ？"
2000605-31 = "だからその辺の知識を、料理にも上手く応用できないかなって。"
2000605-32 = "それに、いつも色々と変な薬を持ってるって聞くから、そういう薬とかもあったりしないかなって。"
2000605-33 = "ぜ、前半部分はともかく、後半の「変な薬」とは心外なのだ！"
2000605-34 = "あ、でも……ふーっふっふっふ、ちょうど良かったのだ！"
2000605-35 = "そういえば、今偶然ぼく様の手元に、嫌な匂いを消せそうな薬品が幾つかあるのだ！"
2000605-36 = "[s3] \"それ、大丈夫……？\"\n[s4] \"やめておいた方が良いんじゃ……？\""
2000605-37 = "ど、どうしてそんなに疑うのだ？"
2000605-38 = "ど、どうしてそんなに疑うのだ？"
2000605-39 = "立派な研究者なら材料を持ち歩き、いつどこでも研究ができるようにしているのは当然のこと！こういうちょっとした調合くらいお手の物なのだ！"
2000605-40 = "ということで、すぐにやってみせよう！"
2000605-41 = "お、じゃあよろしく！"
2000605-42 = "ふーっふっふっふ、ぼく様に任せるのだ！"
2000605-45 = "[wa:600]― ふふ……[wa:1400]なるほど、[wa:1750]これは中々[wa:1000]すごい匂いなのだ……。"
2000605-47 = "[wa:100]― 確かに[wa:1100]このまま食べるのは[wa:950]難しそうだし……。"
2000605-50 = "[wa:650]― じゃあ、[wa:500]まず匂いを消すために[wa:1850]消臭剤を1さじ……。"
2000605-52 = "― あとは[wa:700]嗅覚を鈍らせるために、[wa:1950]からしの粉を2さじ……。"
2000605-55 = "[wa:500]― 美味しくなあれ～[wa:1500]なのだ～。"
2000605-58 = "[wa:100]― あ、[wa:750]あれっ？"
2000605-60 = "― 間違えて、[wa:1050]からし粉を[wa:400]入れすぎてしまったのだ！"
2000605-63 = "[wa:500]― まあ、[wa:950]気にするほどのことでも[wa:1000]無いのだ。"
2000605-65 = "― 代わりに[wa:400]消臭剤をもう少し入れれば、[wa:1850]多分[wa:400]大丈夫！"
2000605-68 = "完成なのだ！さあ、食べてみて！"
2000605-69 = "もう生臭さは消えてるだろう？"
2000605-70 = "確かに、匂いは消えてる……。"
2000605-71 = "どれどれ……。"
2000605-78 = "辛っっっっっっっっ！！！！！？！！？！？"
2000605-79 = "げほっ、げほっ……！？なんだこれ、めちゃくちゃ辛くて食べられたもんじゃないよ！？"
2000605-80 = "ふーっふっふっふ、それで良いのだ。"
2000605-81 = "匂いというものは、食べてる時も口内から入ってしまうのだ。"
2000605-82 = "だからこそ、それも含めて完全に匂いを感じられなくするために……。"
2000605-83 = "あまりの辛さに感覚が集中すれば、匂いの方に注意が向かなくなるのだ！"
2000605-84 = "やっぱりぼく様は天才なのだ！うーはっはっはっ！"
2000605-85 = "いや、でもこんな辛いスープ、誰も食べられないんじゃ……？"
2000605-88 = "……今、辛いスープと言ったかな？"
2000605-89 = "私はそういうのが好きでね、少し飲んでも良いだろうか？"
2000605-90 = "えっと、あんたは……？"
2000605-91 = "もちろんなのだ、ぼく様特製の調合をご賞味あれ！"
2000605-92 = "どれ……"
2000605-99 = "辛ああぁぁぁぁっ！？"
2000605-100 = "[s] \"また被害者が……。\""
2000605-101 = "けほっ、けほっ……確かに、今まで味わったことのない新しい辛さだ。並大抵の者であれば、一口で食べるのを諦めるだろう。"
2000605-102 = "だが……この辛さの奥に隠れた、深みのある特有のうま味。これは悪くない。"
2000605-103 = "むしろ辛さと合わさって食欲を刺激し、もっと食べ続けたいと思わせる魅力がある……！"
2000605-104 = "……決まりだな。"
2000605-105 = "今回のラーメン週間の優勝者は、この「激辛ラーメン」だ！"
2000605-106 = "はっ……！もしかしてあんた、あの伝説の美食家……猫原ユウニャンさんか！？"
2000605-107 = "ふっ、私が誰かなんて今は重要ではない。ここに美味いものがある……その事実の方がよっぽど重要だ。"
2000605-109 = "これは、騒がしくなるな……また近いうちに会おう。"
2000605-114 = "何だか急に色々と語り始めて、変な客なのだ。"
2000605-115 = "とにかく問題は解決したんだし、ぼく様は帰るとしようかな。"
2000605-118 = "すみません。ここがあの、猫原さんがSNSで絶賛した「激辛ラーメン」のお店ですか？"
2000605-119 = "激辛好きなら欠かせない新しいホットスポットと聞きました、一つお願いします！"
2000605-120 = "私にも、噂のあの新作ラーメンを！"
2000605-121 = "え、なんでみんな知って……ってことはもしかして、さっきのは本当に……！？"
2000605-122 = "ちょ、ちょっと待ってて！すぐ作るから！サヤっちも、さっきの頼む！"
2000605-124 = "かっっっっら！？でも美味しい！"
2000605-125 = "何だこの新しい刺激は……！？くっ、嫌いじゃない……！！"
2000605-126 = "苦しいのに、箸が止まらない……！"
2000605-130 = "え、それ、本当に美味しいのか……？"
2000605-131 = "（なんだか、ぼく様が思ってた反応とは違うのだ……）"
2000605-132 = "[s] \"もしかして、偶然の産物？\""
2000605-133 = "そ、そんなわけないだろう！？ぼく様は最初から、美味しくなると分かっててやったのだ！"
2000605-134 = "でも、あの反応を見るとお腹が空いてきたな……良かったら、一緒に食べる？"
2000605-136 = "その後ふたりで仲良く、サヤが調合した特製ラーメンを分け合いながら食べた。"
2000605-137 = "胃の中が燃えるような辛さで、その後一週間近く大変な思いをした……。"
