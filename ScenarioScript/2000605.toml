[translation]
2000605-1 = "O restaurante delicioso da Saya"
2000605-2 = "Uma certa loja de lámen"
2000605-3 = "Este é o restaurante de lámen que eu, a grande Saya, recomendo!"
2000605-4 = "O dono desta loja sempre traz um novo menu criativo e surpreendente a cada semana do lámen."
2000605-5 = "O lámen que ele desenvolveu desta vez deve estar delicioso também♪"
2000605-6 = "Hum, Sensei, o que houve? Você está com uma cara pálida..."
2000605-7 = "Será que você não gosta de lámen, Sensei?"
2000605-8 = "[s1] \"Não, eu gosto bastante, mas...\"\n[s2] \"Tem um cheiro muito forte por aqui...\""
2000605-13 = "Ah. Saya-chi, você veio!"
2000605-14 = "Olá. Hoje eu vim com o Sensei para provar o novo menu!"
2000605-15 = "Ah... sobre isso, Saya-chi. Sinto muito, mas desta vez o desenvolvimento do novo menu não deu muito certo..."
2000605-16 = "Hum, o que houve? Você não estava todo feliz na semana passada dizendo que estava quase terminando um novo caldo supremo?"
2000605-17 = "Algum problema aconteceu depois daquilo?"
2000605-18 = "Aquele caldo tem um pequeno problema..."
2000605-19 = "É isto aqui..."
2000605-22 = "[s] \"O cheiro de agora era isso...!?\""
2000605-23 = "Você deve ter percebido pelo cheiro, mas usei extrato de kusaya no caldo desta vez."
2000605-24 = "É o caldo com o maior \"umami\" que já fiz, mas não consegui me livrar do cheiro forte de peixe do kusaya de jeito nenhum..."
2000605-25 = "Não posso servir isso aos clientes, de jeito nenhum..."
2000605-26 = "Hum, que pena... eu estava esperando pelo novo lámen..."
2000605-28 = "...Ah, é verdade. Ei, Saya-chi. Você não conhece algum jeito de eliminar esse cheiro?"
2000605-29 = "Hum? Por que você está perguntando isso para mim?"
2000605-30 = "Como você estuda alquimia há tanto tempo, você entende muito de vários ingredientes, né?"
2000605-31 = "Então pensei que talvez pudesse aplicar esse conhecimento na culinária."
2000605-32 = "Além disso, ouvi dizer que você sempre carrega várias poções estranhas, então pensei que talvez tivesse algo assim."
2000605-33 = "A primeira parte até que vai, mas essa história de \"poções estranhas\" é um insulto!"
2000605-34 = "Ah, mas... fu-fu-fu-fu, veio na hora certa!"
2000605-35 = "Pensando bem, por acaso eu tenho algumas substâncias comigo agora que podem eliminar cheiros ruins!"
2000605-36 = "[s3] \"Isso é seguro...?\"\n[s4] \"Não seria melhor deixar pra lá...?\""
2000605-37 = "Po-por que você está duvidando tanto?"
2000605-38 = "Po-por que você está duvidando tanto?"
2000605-39 = "Para um pesquisador de verdade, é natural carregar materiais para poder pesquisar em qualquer lugar! Esse tipo de mistura simples é moleza para mim!"
2000605-40 = "Sendo assim, vou mostrar como se faz agora mesmo!"
2000605-41 = "Ah, então conto com você!"
2000605-42 = "Fu-fu-fu-fu, deixe comigo!"
2000605-45 = "[wa:600]― Fufu... [wa:1400] entendo, [wa:1750] este é um [wa:1000] cheiro bem forte..."
2000605-47 = "[wa:100]― Realmente, [wa:1100] comer assim [wa:950] parece difícil..."
2000605-50 = "[wa:650]― Então, [wa:500] primeiro, para eliminar o cheiro, [wa:1850] uma colher de desodorizante..."
2000605-52 = "― E agora, [wa:700] para entorpecer o olfato, [wa:1950] duas colheres de pó de mostarda..."
2000605-55 = "[wa:500]― Fique delicioso~ [wa:1500] ~."
2000605-58 = "[wa:100]― Ah, [wa:750] ué?"
2000605-60 = "― Sem querer, [wa:1050] coloquei [wa:400] mostarda demais!"
2000605-63 = "[wa:500]― Bem, [wa:950] não é nada para se [wa:1000] preocupar."
2000605-65 = "― Se eu colocar [wa:400] um pouco mais de desodorizante, [wa:1850] provavelmente [wa:400] vai ficar bom!"
2000605-68 = "Está pronto! Vamos, experimente!"
2000605-69 = "O cheiro de peixe já deve ter sumido, não é?"
2000605-70 = "Realmente, o cheiro sumiu..."
2000605-71 = "Vamos ver..."
2000605-78 = "Que ardidoooooooo!!!!!!?!!?!?"
2000605-79 = "Cof, cof...!? O que é isso, está tão picante que não dá nem para comer!?"
2000605-80 = "Fufufufu, é isso mesmo."
2000605-81 = "O cheiro acaba entrando pela boca enquanto comemos, sabe."
2000605-82 = "Por isso mesmo, para eliminar completamente a percepção do cheiro, incluindo isso..."
2000605-83 = "Se eu concentrar todos os sentidos em uma ardência extrema, a atenção não vai mais para o cheiro!"
2000605-84 = "Eu sou um gênio, como esperado! Uwahahahaha!"
2000605-85 = "Não, mas... será que alguém consegue comer uma sopa tão apimentada assim...?"
2000605-88 = "...Você disse sopa apimentada agora há pouco?"
2000605-89 = "Eu gosto desse tipo de coisa, poderia me deixar provar um pouco?"
2000605-90 = "Err, quem é você...?"
2000605-91 = "Claro que sim, aprecie a mistura especial feita por mim!"
2000605-92 = "Vejamos..."
2000605-99 = "Que ardênciaaaaaa!?"
2000605-100 = "[s] \"Mais uma vítima...\""
2000605-101 = "Cof, cof... De fato, é uma ardência nova que nunca senti antes. Uma pessoa comum desistiria de comer na primeira colherada."
2000605-102 = "Mas... escondido atrás dessa ardência, há um sabor profundo e único. Isso não é nada mal."
2000605-103 = "Pelo contrário, combina com a ardência para estimular o apetite, tem um charme que faz você querer continuar comendo...!"
2000605-104 = "...Está decidido."
2000605-105 = "O vencedor da Semana do Ramen desta vez é este \"Ramen Super Apimentado\"!"
2000605-106 = "Hã...!? Será que você é aquela lendária crítica gastronômica... Neko-hara Yuunyan-san!?"
2000605-107 = "Hum, quem eu sou não é importante agora. O fato de que há algo delicioso aqui... isso é muito mais importante."
2000605-109 = "Isso vai dar o que falar... Nos vemos em breve."
2000605-114 = "Que cliente estranha, começou a falar um monte de coisas de repente."
2000605-115 = "De qualquer forma, o problema foi resolvido, acho que vou voltar para casa."
2000605-118 = "Com licença. É aqui que fica o \"Ramen Super Apimentado\" que a Neko-hara-san elogiou tanto nas redes sociais?"
2000605-119 = "Ouvi dizer que é o novo ponto de encontro indispensável para quem ama pimenta, me vê um, por favor!"
2000605-120 = "Para mim também, aquele novo ramen que todo mundo comenta!"
2000605-121 = "Ué, por que todo mundo sabe... isso significa que, será que aquilo era realmente...!?"
2000605-122 = "E-esperem um pouco! Vou preparar agora! Saya-cchi, prepare aquele de antes!"
2000605-124 = "Que ardênciaaaaa!? Mas é delicioso!"
2000605-125 = "O que é esse novo estímulo...!? Droga, eu não desgosto disso...!!"
2000605-126 = "Mesmo sendo doloroso, não consigo parar de usar os hashis...!"
2000605-130 = "Ué, isso é realmente gostoso...?"
2000605-131 = "(De alguma forma, a reação é diferente do que eu esperava...)"
2000605-132 = "[s] \"Será que foi um golpe de sorte?\""
2000605-133 = "C-claro que não, né!? Eu sabia desde o início que ficaria delicioso!"
2000605-134 = "Mas, vendo essa reação, até que me deu fome... Se quiser, vamos comer juntos?"
2000605-136 = "Depois disso, os dois comeram juntos, dividindo o ramen especial preparado pela Saya."
2000605-137 = "A ardência queimava o estômago, e passei por maus bocados durante quase uma semana depois disso..."
