[translation]
10054005-1 = "プロローグ;ある夏の日"
10054005-7 = "[ns] \"……。\""
10054005-10 = "せ、先生？#n机に突っ伏すのは……ちょっと行儀が悪いですよ？"
10054005-11 = "[s] \"あ～つ～い～\""
10054005-12 = "たしかに、今日は少し暑いですね。"
10054005-17 = "はい、お茶をどうぞ！#n熱中症になっちゃいますから、水分補給をしてくださいね。"
10054005-19 = "（ありがたく受け取った）"
10054005-21 = "（しかし――）"
10054005-23 = "[ns] \"あっつぃ！？\""
10054005-24 = "えー、大げさですって。"
10054005-25 = "それに、ちょっと熱いくらいがいいんですよ？#nお冷は体に悪いです。"
10054005-26 = "いきなり冷たいものを入れると、お腹がびっくりしちゃいますし！"
10054005-27 = "夏は熱いものが腹の薬、ってやつです。"
10054005-32 = "[ns] \"でも暑いし……。\""
10054005-33 = "これでもクーラーはフル稼働なんだけどね。"
10054005-34 = "ほら、先生。あたし特製のやつ。飲んでみて。"
10054005-36 = "（そう言って、氷が入ったレモンティーを渡してくれた）"
10054005-38 = "[ns] \"ありがとう！最高！世界一！\""
10054005-39 = "またそうやって……。"
10054005-40 = "山海経だと冷たいのはあんまり飲まないんだよね。#nでも最近は、外からのお客さんも増えてるから。"
10054005-41 = "そこも考慮してこそ、真のおもてなしでしょ？"
10054005-42 = "商売は、お客様の1歩先を提供するものだからね。"
10054005-43 = "お代わりが必要な時は、お気軽にどうぞ。#n他にジャスミンティーやピーチ烏龍茶、柚子紅茶も用意してあります。"
10054005-49 = "（2人と夏の山海経について話した）"
10054005-51 = "[ns] \"山海経って、夏には何を食べるの？\""
10054005-52 = "あ、その話題は……。"
10054005-53 = "ふふっ。それ、半日は話せるネタだよ。#nまぁ定番といったら――"
10054005-60 = "うわ、玄龍門だ……。"
10054005-61 = "ただでさえ暑いんだから、面倒起こさないでほしいんだけど……。"
10054005-62 = "そんなこと言ったら――"
10054005-63 = "玄武商会に告げる！"
10054005-64 = "門主様が無事に夏を過ごせるよう……滋養強壮に良い食事を用意せよ！"
10054005-65 = "具体的に[ruby=フォーティャオチァン]は佛跳牆か[/ruby]、それに準ずるものだ！"
10054005-66 = "佛跳牆……？"
10054005-67 = "また無茶なことを……。"
10054005-68 = "言わんこっちゃない……。"
10054005-69 = "えっ、私のせい？"
10054005-71 = "[ns1] \"佛跳牆って？\"\n[ns2] \"ああ、佛跳牆ね。\""
10054005-74 = "干しアワビやフカヒレ、マツタケなどの高級食材を1日以上かけてじっくり煮込む料理です。"
10054005-75 = "準備が必要だから、3日前には言ってもらわないと作れないんだよね。"
10054005-76 = "ご存じでしたか。#n様々な高級食材を1日以上煮込む必要があるので、少々厄介な料理でして。"
10054005-77 = "そうなんだよね。3日前には言ってもらわないと、仕入れも間に合わないし。"
10054005-78 = "時間がかかるのはさておき、佛跳牆が滋養強壮に良いとされるのは事実です。"
10054005-79 = "滋養強壮って、つまりは疲れた体に栄養を補給することだからね。"
10054005-80 = "佛跳牆料理はたしかにちょうどいいんだけど……。"
10054005-81 = "使う食材の都合上、定番メニューにするには……。"
10054005-83 = "勝手なこと言わないでよ！#n作るのにどれだけ時間かかるか分かってる？"
10054005-84 = "そうだそうだ！3日前に言え、3日前に！"
10054005-85 = "それくらい察して、事前に準備しておくべきだろう！"
10054005-86 = "門主様の危機は、山海経の危機！"
10054005-87 = "お前らも山海経の端くれなら――#nいや……まさか！忠義に反することを企んでいるのか！？"
10054005-88 = "そんなわけないでしょ！？#nというか、未来予測はうちらの仕事じゃないし！"
10054005-89 = "そうだそうだ！うちらは料理人！占い師じゃない！"
10054005-91 = "会長、どうします？#n営業妨害として追い出しますか？"
10054005-92 = "もうちょっと様子見しよっか。#nキサキのためのやつ、実は用意してあるからさ。"
10054005-93 = "……いつの間に。"
10054005-97 = "[ns] \"……本当？\""
10054005-100 = "毎年のことだからね。この時期はいつも体調を崩しがちなんだよ。"
10054005-102 = "まあ、用意してあるといっても、佛跳牆に比べたら普通のやつだけど。#n[ruby=リャンピー]凉皮[/ruby]とか[ruby=リュードウタン]、緑豆湯と[/ruby]か。"
10054005-103 = "なるほど、夏らしい品ですね。"
10054005-104 = "モチっとした麺に、胡瓜と豆腐、もやしを添えて、#n酸味があるピリ辛のタレで和えた凉皮。"
10054005-105 = "煮込んだ緑豆を冷ましたあと、蜂蜜で味付けする緑豆湯。"
10054005-106 = "話していたら、なんだか食べたくなってきました。#n手に入りやすい材料ですし、後で作りましょうか。"
10054005-107 = "[s] \"……体に良いものを食べるのは大事だよね。\""
10054005-108 = "キサキが心配？#nうん、何が言いたいかは分かるよ。"
10054005-109 = "食事も大事だけど、根本的な解決のためには心身を癒さないと。"
10054005-110 = "たとえば、自然豊かで空気が澄んだところに行く……とか。"
10054005-111 = "……待って。"
10054005-112 = "あ！"
10054005-113 = "[ns] \"どうしたの？\""
10054005-114 = "ふふっ、良いこと思いついちゃった。"
10054005-115 = "先生、ちょっとキサキの様子を見てきてくれる？"
10054005-117 = "（ルミはキラキラと目を輝かせていた）"
10054005-119 = "（一抹の不安を覚えつつ、ルミを信じることにした）"
10054005-120 = "じゃあ、お願いね！"
10054005-121 = "急なことで申し訳ないのですが……私からも、よろしくお願いします。"
10054005-129 = "[ns] \"あっつ……。\""
10054005-131 = "さて、次はこっちに連絡をっと……。"
10054005-135 = "この番号は……うげっ。玄武商会……。#nはぁ……良い予感はしませんが、出ないわけにも……。"
10054005-139 = "これはこれはルミ会長～！どうかされましたか～？"
10054005-143 = "……へ？"
