[translation]
10054005-1 = "Prologue;A Summer Day"
10054005-7 = "[ns] \"…….\""
10054005-10 = "Se-Sensei?#nSlumping over on your desk like that... it's a bit unrefined, don't you think?"
10054005-11 = "[s] \"It's... so... hot...\""
10054005-12 = "It certainly is a bit hot today."
10054005-17 = "Here, have some tea!#nYou'll get heatstroke if you aren't careful, so make sure to stay hydrated."
10054005-19 = "(I accepted it gratefully.)"
10054005-21 = "(However—)"
10054005-23 = "[ns] \"It's hot!?\""
10054005-24 = "Geez, you're being dramatic."
10054005-25 = "Besides, a little heat is good for you, isn't it?#nIce-cold drinks are bad for your body."
10054005-26 = "If you put something cold in your stomach all of a sudden, it'll get a shock!"
10054005-27 = "They say in summer, hot food is medicine for the stomach."
10054005-32 = "[ns] \"But it's so hot...\""
10054005-33 = "Even so, the AC is running at full blast, you know."
10054005-34 = "Here, Sensei. My special blend. Give it a try."
10054005-36 = "(Saying that, she handed me an iced lemon tea.)"
10054005-38 = "[ns] \"Thank you! This is the best! World-class!\""
10054005-39 = "There you go again..."
10054005-40 = "In Shanhaijing, we don't really drink things that cold.#nBut lately, we've been getting more visitors from outside."
10054005-41 = "Providing true hospitality means taking that into account, right?"
10054005-42 = "Business is all about offering what the customer needs one step ahead of time."
10054005-43 = "Feel free to ask if you want a refill.#nI also have jasmine tea, peach oolong, and yuzu black tea ready."
10054005-49 = "(We talked about the two of them and summer in Shanhaijing.)"
10054005-51 = "[ns] \"What do people in Shanhaijing eat during the summer?\""
10054005-52 = "Ah, that topic is..."
10054005-53 = "Hehe. That's a topic we could talk about for half a day.#nWell, if we're talking staples—"
10054005-60 = "Ugh, it's the Xuanlongmen..."
10054005-61 = "It's already hot enough as it is, I really don't want them causing trouble..."
10054005-62 = "If you say things like that—"
10054005-63 = "Hear us, Xuanwu Association!"
10054005-64 = "To ensure the Gatekeeper spends the summer in good health... prepare a meal that is good for nourishment!"
10054005-65 = "Specifically, Buddha Jumps Over the Wall, or something equivalent to it!"
10054005-66 = "Buddha Jumps Over the Wall...?"
10054005-67 = "They're being unreasonable again..."
10054005-68 = "I knew this would happen..."
10054005-69 = "Wait, is this my fault?"
10054005-71 = "[ns1] \"What's Buddha Jumps Over the Wall?\"\n[ns2] \"Ah, Buddha Jumps Over the Wall, I see.\""
10054005-74 = "It's a dish where you slow-cook high-end ingredients like dried abalone, shark fin, and matsutake mushrooms for over a day."
10054005-75 = "It requires preparation, so I can't make it unless you tell me three days in advance."
10054005-76 = "So you were aware. It's a rather troublesome dish since it requires simmering various high-end ingredients for over a day."
10054005-77 = "Exactly. If you don't tell me three days in advance, I can't even get the ingredients in time."
10054005-78 = "Setting aside the time it takes, it is a fact that Buddha Jumps Over the Wall is good for nourishment."
10054005-79 = "Nourishment basically means replenishing nutrients for a tired body, after all."
10054005-80 = "Buddha Jumps Over the Wall is certainly a good choice, but..."
10054005-81 = "Due to the ingredients involved, making it a standard menu item is..."
10054005-83 = "Don't just say whatever you want!#nDo you have any idea how long it takes to make?"
10054005-84 = "Yeah, that's right! Tell us three days in advance, three days!"
10054005-85 = "You should be able to figure that out and prepare in advance!"
10054005-86 = "A crisis for the Gatekeeper is a crisis for Shanhaijing!"
10054005-87 = "If you're part of Shanhaijing—#nWait... don't tell me! Are you plotting something against your duty!?"
10054005-88 = "That's not it at all!?#nAnd besides, predicting the future isn't our job!"
10054005-89 = "Yeah! We're chefs! Not fortune tellers!"
10054005-91 = "Chairwoman, what should we do?#nShould we kick them out for interfering with business?"
10054005-92 = "Let's wait and see for a bit.#nI actually already have something prepared for Kisaki."
10054005-93 = "……Since when?"
10054005-97 = "[ns] \"...Really?\""
10054005-100 = "It happens every year. She tends to get sick around this time."
10054005-102 = "Well, even though I say I have it prepared, it's just standard fare compared to Buddha Jumps Over the Wall. Like Liangpi or Mung Bean Soup."
10054005-103 = "I see, those are very summery dishes."
10054005-104 = "Liangpi is chewy noodles served with cucumber, tofu, and bean sprouts, tossed in a tangy, spicy sauce."
10054005-105 = "Mung Bean Soup is made by cooling down boiled mung beans and seasoning them with honey."
10054005-106 = "Talking about it makes me want some. The ingredients are easy to get, so shall we make some later?"
10054005-107 = "[s] \"...Eating healthy food is important, isn't it?\""
10054005-108 = "Are you worried about Kisaki?#nYeah, I know what you're trying to say."
10054005-109 = "Food is important, but to solve the root of the problem, she needs to heal her mind and body."
10054005-110 = "For example, going somewhere with lots of nature and clean air..."
10054005-111 = "……Wait."
10054005-112 = "Ah!"
10054005-113 = "[ns] \"What's wrong?\""
10054005-114 = "Hehe, I just thought of something good."
10054005-115 = "Sensei, could you go check on Kisaki for me?"
10054005-117 = "(Rumi's eyes were sparkling.)"
10054005-119 = "(Feeling a hint of anxiety, I decided to trust Rumi.)"
10054005-120 = "Then, I'm counting on you!"
10054005-121 = "I'm sorry for the sudden request, but... I'm counting on you as well."
10054005-129 = "[ns] \"It's so hot...\""
10054005-131 = "Now, time to contact this person next..."
10054005-135 = "This number is... ugh. Xuanwu Association...#nHaa... I don't have a good feeling about this, but I can't just not answer..."
10054005-139 = "Well, well, Chairwoman Rumi~! Did something happen~?"
10054005-143 = "……Huh?"