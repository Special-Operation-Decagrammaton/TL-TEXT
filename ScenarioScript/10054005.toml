[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10054005-1 = "Prólogo: Um Certo Dia de Verão"
10054005-7 = "[ns] \"......\""
10054005-10 = "S-Sensei?\nDebruçar na mesa desse jeito...\nnão acha que é falta de educação?"
10054005-11 = "[s] \"Mas tá queeente demaaaaais...\""
10054005-12 = "De fato, o dia está\num pouco mais quente hoje."
10054005-17 = "Aqui, tome um chá!\nVocê precisa se hidratar para\nnão pegar uma insolação."
10054005-19 = "（Aceitei com gratidão）"
10054005-21 = "（No entanto――）"
10054005-23 = "[ns] \"TÁ FERVENDO!?\""
10054005-24 = "Poxa, quanta exagero."
10054005-25 = "Além disso, é melhor que\nesteja um pouco quente, sabia?\nÁgua gelada faz mal para a saúde."
10054005-26 = "Se você ingerir algo muito gelado\nde repente, o seu estômago\nvai levar um susto!"
10054005-27 = "Como diz o ditado,\nas coisas quentes são o melhor\nremédio para a barriga no verão."
10054005-32 = "[ns] \"Mas está muito calor...\""
10054005-33 = "E olha que o ar-condicionado\nestá no máximo."
10054005-34 = "Vem cá, Sensei.\nToma esse aqui, é uma\nespecialidade minha. Pode beber."
10054005-36 = "（Dizendo isso, ela me entregou\num chá de limão cheio de gelo）"
10054005-38 = "[ns] \"Muito obrigado! Perfeito!\nO melhor do mundo!\""
10054005-39 = "Lá vem você de novo... "
10054005-40 = "Sabe, em Shanhaijing nós não\ncostumamos tomar coisas geladas.\nMas, ultimamente, o número de\nvisitantes de fora tem aumentado."
10054005-41 = "Levar isso em consideração também\nfaz parte da verdadeira\nhospitalidade, não acha?"
10054005-42 = "O comércio existe para oferecer\naquilo que o cliente vai querer\num passo à frente."
10054005-43 = "Se quiser mais, fique à vontade.\nTambém temos chá de jasmim,\nchá oolong com pêssego\ne chá preto com yuzu."
10054005-49 = "（Nós conversamos um pouco\nsobre o verão em Shanhaijing）"
10054005-51 = "[ns] \"O que o pessoal de Shanhaijing\ncostuma comer no verão?\""
10054005-52 = "Ah, esse assunto... "
10054005-53 = "Fufu. Isso aí é papo pra\nrender o dia inteiro.\nMas, se for falar dos clássicos――"
10054005-60 = "Nossa, é o pessoal\nda Xuanlong Office..."
10054005-61 = "Já está um calor infernal,\neu queria muito que elas não\nviessem arrumar confusão hoje..."
10054005-62 = "Olha o que a senhora está dizendo――"
10054005-63 = "Nós trazemos um decreto\npara a Genbu Express!"
10054005-64 = "Para garantir que a Senhora Monshu\npasse pelo verão em segurança...\nPreparem uma refeição altamente\nnutritiva e revigorante!"
10054005-65 = "Mais especificamente, um Fotiaoqiang\n(Buda Pulando o Muro),\nou algo à altura disso!"
10054005-66 = "Fotiaoqiang...?"
10054005-67 = "Lá vêm elas com pedidos\nabsurdos de novo..."
10054005-68 = "Eu avisei que isso ia acontecer..."
10054005-69 = "Ué, a culpa é minha?"
10054005-71 = "[ns1] \"O que é esse Fotiaoqiang?\"\n[ns2] \"Ah, Fotiaoqiang, né.\""
10054005-74 = "É um prato feito com ingredientes\nde altíssima qualidade, como abalone seco,\nbarbatanas e cogumelos matsutake,\ncozidos lentamente por mais de um dia."
10054005-75 = "Exige muita preparação, então\nvocês precisam avisar com pelo\nmenos três dias de antecedência."
10054005-76 = "Oh, você conhecia.\nÉ um prato bem trabalhoso,\njá que exige o cozimento lento\nde iguarias raras por mais de um dia."
10054005-77 = "Pois é. Se não avisarem com\ntrês dias de antecedência, não dá nem\ntempo de comprar os ingredientes."
10054005-78 = "Deixando o tempo de preparo de lado,\né fato que o Fotiaoqiang é excelente\npara restaurar as energias."
10054005-79 = "No fim das contas, revigorar as\nenergias significa repor os nutrientes\nde um corpo cansado, né."
10054005-80 = "Para isso, o Fotiaoqiang\né perfeito, mas..."
10054005-81 = "Pelos ingredientes que ele leva,\nnão dá pra transformar isso\nnum prato do dia a dia..."
10054005-83 = "Parem de falar absurdos!\nVocês têm ideia de quanto\ntempo leva para preparar isso?"
10054005-84 = "Isso mesmo, isso mesmo!\nTrês dias de antecedência, no mínimo!"
10054005-85 = "Vocês deveriam ter sido espertas o\nsuficiente para prever isso e se\npreparar com antecedência!"
10054005-86 = "Uma crise para a Senhora Monshu\né uma crise para toda Shanhaijing!"
10054005-87 = "Se vocês também fazem parte daqui――\nNão... não me digam! Vocês estão\nplanejando uma traição contra nós!?"
10054005-88 = "É claro que não!\nE outra, prever o futuro\nnão faz parte do nosso trabalho!"
10054005-89 = "Isso aí! Nós somos cozinheiras,\nnão somos videntes!"
10054005-91 = "Presidente, o que a gente faz?\nExpulsamos elas por\nperturbação do comércio?"
10054005-92 = "Vamos esperar mais um pouquinho.\nNa verdade, eu já deixei\nalgo preparado para a Kisaki."
10054005-93 = "......Desde quando?"
10054005-97 = "[ns] \"......Sério?\""
10054005-100 = "Isso já virou rotina anual.\nEla sempre acaba ficando meio\nruinzinha nessa época do ano."
10054005-102 = "Bom, eu disse que preparei algo,\nmas são pratos bem normais.\nFiz Liangpi e Sopa de Feijão Mungo."
10054005-103 = "Entendi, são pratos\nbem a cara do verão."
10054005-104 = "Liangpi é feito com um macarrão\nborrachudo, acompanhado de pepino e tofu,\ntudo misturado num molho picante."
10054005-105 = "E a Sopa de Feijão Mungo\né feita esfriando o feijão cozido\ne adoçando com mel."
10054005-106 = "Falar sobre isso me deu até fome.\nSão ingredientes fáceis de achar,\nque tal prepararmos um pouco depois?"
10054005-107 = "[s] \"......Comer coisas saudáveis\né muito importante.\""
10054005-108 = "Está preocupado com a Kisaki?\nSim, eu sei muito bem\no que você quer dizer."
10054005-109 = "Comer bem é fundamental, mas\npara resolver isso de verdade, ela\nprecisa curar o corpo e a mente."
10054005-110 = "Por exemplo, ir para um lugar cheio de\nnatureza e com um ar bem puro... algo assim."
10054005-111 = "......Espera."
10054005-112 = "Ah!"
10054005-113 = "[ns] \"O que foi?\""
10054005-114 = "Fufu, acabei de ter\numa ideia brilhante."
10054005-115 = "Sensei, você poderia ir lá dar\numa olhadinha em como a Kisaki está?"
10054005-117 = "（Os olhos da Rumi estavam\nbrilhando de empolgação）"
10054005-119 = "（Apesar de sentir um leve frio\nna espinha, decidi confiar na Rumi）"
10054005-120 = "Então, deixo isso com você!"
10054005-121 = "Peço desculpas por pedir isso tão\nde repente... mas, cuide dela."
10054005-129 = "[ns] \"Ah, que calor...\""
10054005-131 = "Certo, agora vou ligar para cá..."
10054005-135 = "Esse número é... ugh. Da Genbu Express...\nHaah... Não estou com um bom pressentimento,\nmas não posso ignorar..."
10054005-139 = "Olha só, se não é a Presidente Rumi~!\nAconteceu alguma coisa~?"
10054005-143 = "......Hã?"