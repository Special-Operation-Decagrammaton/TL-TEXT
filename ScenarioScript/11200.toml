[translation]
11200-2 = "第20話;風紀委員会、参戦！"
11200-3 = "破壊されたアビドス市街地"
11200-4 = "社長！ムツキ！ハルカ！早く隠れよう！やつらが来た！"
11200-5 = "やつらって？"
11200-6 = "うちの風紀の連中だよ！ここまで追ってくるなんて！それもこのタイミングで……！"
11200-7 = "いや、こんなタイミングだからこそ……！？"
11200-8 = "（ズゴゴゴゴゴーーー！！）"
11200-9 = "ぐっ！"
11200-10 = "くぅっ……！"
11200-12 = "（ドゴゴオオオン！）"
11200-14 = "ターゲット、沈黙しました。"
11200-15 = "よし。歩兵、第2小隊まで突入。"
11200-16 = "……イオリ、あの方たちはどうします？"
11200-17 = "ん？ああ、向こう側の生徒？なんだっけ……アビドス？"
11200-18 = "そんなの当然、公務の執行を妨害する輩は全員敵だ。"
11200-19 = "ならば、おとなしくしていてもらいたいものですね……#nしかしこちらの事情を説明するのが先かと……。"
11200-20 = "説明？必要か、それ？"
11200-21 = "……。"
11200-22 = "うちの厄介者どもを取っ捕まえるための労力が惜しい。#nもし邪魔するなら、部外者とはいえ問答無用でまとめて叩きのめす。"
11200-23 = "……。"
11200-25 = "な、何っ？風紀委員会が便利屋を捕まえに来たってこと！？"
11200-26 = "まだわかりません……しかし私たちに友好的とは判断しかねます。"
11200-27 = "確かに。砲撃範囲内には私たちもいた、あからさまにこっちを狙ったわけじゃないけど。"
11200-28 = "そんな……。"
11200-29 = "冗談じゃないっての！便利屋は私たちの獲物なんだから！何なの一体！"
11200-30 = "でもゲヘナの風紀委員会は、他校の公認武力集団や、便利屋のような部活とは性質が異なります！"
11200-31 = "一歩間違えれば、政治的な紛争の火種になるかもしれません……。"
11200-32 = "アヤネちゃん、ホシノ先輩とはまだ連絡がつきませんか？"
11200-33 = "……はい。普段なら、ここまで連絡取れないことはないはずなのに……。"
11200-34 = "この状況……私たちはどうすればいいのでしょうか？"
11200-35 = "……。"
11200-36 = "……。"
11200-37 = "[s]  \"じゃあ便利屋をこのまま風紀委員会に引き渡しちゃう？\""
11200-38 = "それは、で、ですが……それにしても彼女たちと戦うわけには……。"
11200-39 = "じゃあどうしろっていうの？"
11200-42 = "他に選択肢はない、風紀委員会を阻止する。"
11200-43 = "シロコちゃん……？！"
11200-44 = "……。"
11200-45 = "……はい、その通りです。"
11200-46 = "風紀委員会が私たちの自治区ですでに戦術的行動をしたということは、#n政治的紛争が生じるということ……。"
11200-47 = "きっと、便利屋の皆さんが問題を起こしたのは事実です……。"
11200-48 = "しかし、だからといって、他の学園の風紀委員会が私たちの許可もなく、こんな暴挙を敢行してもいいという意味ではありません。"
11200-49 = "その通りだわ！よくもこんなことを！これは私たちの学校を権利を無視するような真似よ！"
11200-50 = "便利屋を罰するのは私たち！#n柴関ラーメンを壊した代償を払ってもらわないと！"
11200-52 = "……。"
11200-53 = "アビドスの生徒たち、臨戦態勢に突入しました。"
11200-54 = "はあ、面倒だな、たかが4人で。こっちは一個中隊級の兵力なのに。"
11200-55 = "だけど、売られた喧嘩を買わないなんてことは、風紀委員会としてできない。#n総員、戦闘準備！"
11200-56 = "……ちょ、ちょっと待ってください。イオリ。"
11200-57 = "ん？"
11200-58 = "アビドス側に民間人が映りました。確認中ですので、お待ちください。"
11200-59 = "え……！？"
11200-60 = "……あ、あの方は……まさかシャーレの[USERNAME]先生！？"
11200-61 = "ん？シャーレ？なんだそれ？"
11200-62 = "……ちょ、ちょっと待ってください。シャーレの先生があっちにいるとしたら……。"
11200-63 = "……この戦闘、行ってはいけません！"
11200-64 = "どういうことだ？"
11200-66 = "アビドス、こっちに接近中。発砲します！"
11200-67 = "（タタタタタターン！！）"
11200-68 = "ちっ、仕方ない。行くぞ！"
11200-70 = "あっ……。"
