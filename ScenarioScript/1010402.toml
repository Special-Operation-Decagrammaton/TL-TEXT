[translation]
1010402-1 = "日課"
1010402-3 = "（朝方、レイジョに言われた場所へ向かった）"
1010402-4 = "（すると、そこには……）"
1010402-9 = "[wa:1030]― [log=레이죠]あ、[wa:1380]来てくださったのですね。[/log]"
1010402-10 = "[wa:3200]― [log=레이죠]あと少しで朝練が終わりますので、[wa:1980]少々お待ちいただけますか？[/log]"
1010402-13 = "[wa:1330]― [log=레이죠]実はこれも、[wa:1350]連続した動作の一部なんですよ。[/log]"
1010402-14 = "[wa:2910]― [log=레이죠]流れを止め、[wa:1270]姿勢を維持することも。[/log]"
1010402-17 = "[wa:40]― [log=레이죠]精神を鍛えるのに役立つのでは、[wa:2580]と思い……[/log]"
1010402-20 = "[wa:2050]― [log=레이죠]……って、[wa:870]先生は[wa:830]どうしてそんなところに……？[/log]"
1010402-23 = "[wa:370]― [log=레이죠]え？[wa:970]修行中なら――[/log]"
1010402-24 = "[wa:1880]― [log=레이죠]周りの視線に動じず、[wa:1830]平常心を保つべき……？[/log]"
1010402-27 = "[wa:160]― [log=레이죠]それは、[wa:1410]そう……[wa:1290]なのですが……[/log]"
1010402-30 = "[wa:450]― [log=레이죠]……うっ、[wa:700]や、[wa:520]やはりこれは、[wa:1260]無理です……！[/log]"
1010402-33 = "（レイジョは朝練を終えても、しばらく目を合わせてくれなかった……）"
1010402-35 = "……修行中の姿を人に見られるのは恥ずかしいですね。"
1010402-36 = "特に今日は、別の意味でも！"
1010402-37 = "[s1] \"れ、レイジョは本当に頑張り屋さんだね！\"\n[s2] \"私は早起きも苦手なのに！\""
1010402-40 = "何だか話を逸らされているような……。"
1010402-41 = "……き、気のせいでしょうか？"
1010402-42 = "分かりました、先生がそう仰るのなら。"
1010402-43 = "そもそも、こんな時間から呼び出したのは私ですし。"
1010402-44 = "ただ、私も毎日欠かさずに修行をしているわけではありません。"
1010402-45 = "週末や天気が悪い日は、おとなしく休んでいます。"
1010402-46 = "[s] \"それでも、好きなことがあるのは素敵だね。\""
1010402-47 = "好きなこと、ですか……。"
1010402-48 = "あ、いえ……少し気になりまして。"
1010402-49 = "私が武術の修行を行なっていても、#n先生はあまり不思議に思っていないようですから。"
1010402-50 = "……考えてみれば、先生はキヴォトスの外から来た方でしたね。"
1010402-54 = "おそらく想像しているように、#nキヴォトスでカンフーは一般的ではありません。"
1010402-55 = "たいてい、銃があれば解決しますし。"
1010402-56 = "私の修行は、ただの体操だと思われても仕方ないでしょう。"
1010402-57 = "[s] \"でも、レイジョはこれからも修行を続けるんだよね？\""
1010402-58 = "……そう、ですね。"
1010402-59 = "ここまでカンフーの修行を私が続けてきた理由は……。"
1010402-60 = "精神の鍛錬にもなっているからです。"
1010402-61 = "体に負荷を与えながら、心を落ち着かせることができれば……。"
1010402-62 = "商会の仕事だけでなく、学校の試験にも役立ちます。"
1010402-63 = "私の成績、ですか……？"
1010402-67 = "そ、それは今お伝えしなきゃいけないのでしょうか……？"
1010402-68 = "とにかく、カンフーは素晴らしいのです！"
1010402-69 = "なかでも、格言が！"
1010402-70 = "たとえば、「忍耐力とは、積極性から生じるもの」という言葉があります！"
1010402-71 = "これには多くの人が共感してくれるでしょう。#nいつもいつも言いがかりをつけてくる玄龍門もいますが……！"
1010402-72 = "[s] \"お、落ち着いて……。\""
1010402-73 = "「失敗は大した問題じゃない。それを認める勇気さえあれば」#nという格言も、忘れてはいけませんね！"
1010402-75 = "（その後もレイジョは、楽しげな表情でカンフーについて語った）"
1010402-77 = "も、申し訳ありません、先生。#n私ばかり話してしまいましたね……。"
1010402-78 = "[s3] \"今さらだけど、そんなにカンフーが好きなら……。\"\n[s4] \"そういう部活に入ろうとは思わなかったの？\""
1010402-81 = "武術研究部や現代武道部は存在していますが……。"
1010402-82 = "先生は、ひとつ大事なことを忘れていませんか？"
1010402-83 = "カンフーは、飲食店の従業員がやってこそです！"
1010402-84 = "[s5] \"……！\"\n[s6] \"たしかに、その通りだね！\""
1010402-89 = "[ns] \"舞台は中央が吹き抜けの建物だよね！\""
1010402-90 = "ええ、二階建ての！"
1010402-91 = "[s] \"そこで喧嘩が起きたりして！\""
1010402-92 = "先生も詳しいですね！#n二階から人が落ちてきて、お店は混乱状態に……。"
1010402-93 = "[s] \"でも主人公は、黙々と食事を続けるんだよね！\""
1010402-94 = "はい！#n最終的には、主人公も参戦し喧嘩を鎮圧するんです！"
1010402-95 = "そして、その人物には伝説の料理人という設定もあったり……！"
1010402-97 = "（レイジョは、目をずっと輝かせながら話し続けた）"
1010402-98 = "（お互い時間を忘れ、会話に夢中になっていると……）"
1010402-99 = "（気づけばかなりの時間が過ぎていた）"
