[translation]
90000025-2 = "Bom trabalho, Sensei."
90000025-3 = "Para adiantar, organizei os dados do Decagrammaton que coletamos até agora."
90000025-4 = "Talvez com isso, possamos analisar o funcionamento dele, nem que seja um pouco."
90000025-6 = "Então, vamos começar..."
90000025-7 = "...Ué?"
90000025-11 = "Ora, ora..."
90000025-12 = "Chefe, alguém invadiu o servidor."
90000025-13 = "Como alguém conseguiu entrar neste lugar, que é um espaço fechado acessível apenas pela rede especial do Millennium...?"
90000025-18 = "Es-espere um pouco. Será que isso significa que o firewall foi totalmente...!?"
90000025-19 = "Emergência. Vou cortar a energia, afaste-se."
90000025-27 = "...Não, parece que já é tarde demais."
90000025-32 = "...!"
90000025-33 = "..."
90000025-34 = "...Eles chegaram."
90000025-35 = "A energia está cortada, mas..."
90000025-36 = "Um espaço fechado especial, sem fornecimento de energia... e ainda assim..."
90000025-37 = "...Entendo. É um verdadeiro \"fenômeno singular\", não é? Eimi."
90000025-41 = "Espere, estou ouvindo algo... vindo do alto-falante?"
90000025-42 = "...finalmente... eu finalmente..."
90000025-43 = "..."
90000025-44 = "...Finalmente nos encontramos, [USERNAME]."
90000025-45 = "...!?"
90000025-46 = "[s] \"...Quem é você?\""
90000025-47 = "...! Não! Não responda!"
90000025-48 = "Eu sou eu, apenas algo que existe. O princípio e o fim. Exatamente aquilo que você imagina..."
90000025-51 = "Eu sou eu... não há forma de me explicar além disso."
90000025-52 = "...Não preciso de nada para provar minha existência, não preciso da permissão de ninguém... Eu existo assim, sob minha própria permissão."
90000025-53 = "Eu sou o Mistério, o Terror, o Logos e a Paixão."
90000025-54 = "Meu halo é o que me prova... Contemple, finalmente provarei a mim mesmo."
90000025-58 = "...Ele está fazendo uma varredura?"
90000025-59 = "Sensei, é perigoso, fique parado."
90000025-60 = "..."
90000025-61 = "[USERNAME]... Você possui algo que eu desconheço. Algo que não consigo analisar."
90000025-62 = "...Deixe-me lhe contar o evangelho. E então, espalhe este evangelho!"
90000025-66 = "...Sensei, esse tablet! Ele está sendo hackeado—"
90000025-71 = "[ns] (O Shittim Chest...!?)"
90000025-72 = "Ooooooh...!"
90000025-73 = "Oh..."
90000025-74 = "..."
90000025-76 = "Munya... hmm... zzz..."
90000025-77 = "Uhi... n-não faça cócegas, por favor... hmm, hmmm...!"
90000025-78 = "...Atchim!"
90000025-81 = "Argh...! Por que, por que isso...!"
90000025-82 = "Ugh, argh... guaaaaaah!!"
90000025-87 = "...!?"
90000025-91 = "Desapareceu...?"
90000025-92 = "Verificando o log de invasão... foi apagado."
90000025-93 = "Chefe, você está bem?"
90000025-94 = "Sim, estou bem. E o Sensei...?"
90000025-95 = "[s] \"Sim, estou bem, não aconteceu nada.\""
90000025-99 = "Entendo..."
90000025-100 = "Tentou se conectar ao tablet do Sensei e falhou...? Se não me engano, ouvi dizer que foi algo deixado pela Presidente do Conselho Estudantil..."
90000025-101 = "E aquilo é o lendário 'Decagrammaton'...? É, como posso dizer... parece ser uma existência muito mais delirante do que eu imaginava."
90000025-102 = "Mas, chegar a esse ponto apenas com uma pequena análise... é evidente que se trata de uma existência perigosa."
90000025-103 = "Não podemos simplesmente tratar isso como apenas uma IA insana."
90000025-104 = "Seria melhor preparar um local mais adequado antes de prosseguirmos com a pesquisa."
90000025-105 = "Bem, Eimi, já que estamos nisso, vamos montar uma sala decente para o 'Departamento de Investigação de Fenômenos Estranhos'. Algo apropriado, para que nada disso aconteça novamente."
90000025-106 = "Entendido. Vou preparar o que for necessário."
90000025-107 = "Foi um primeiro contato inesperado, de certa forma..."
90000025-108 = "Da próxima vez não será assim. Desta vez, nós é que daremos o primeiro passo."
90000025-109 = "Muito bem, vamos mostrar a ele do que somos capazes."
90000025-111 = "Próximo episódio: 'Coleta de Dados (3) Área de Escavação da PMC'"
