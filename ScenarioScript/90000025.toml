[translation]
90000025-2 = "お疲れ様でした、先生。"
90000025-3 = "取り急ぎ、これまで収集したデカグラマトンのデータを整理してみました。"
90000025-4 = "もしかしたらこれで、少しでもその仕組みを解析できるかもしれません。"
90000025-6 = "では早速……"
90000025-7 = "……あら？"
90000025-11 = "あらあら……。"
90000025-12 = "部長、サーバーに誰か侵入してる。"
90000025-13 = "ミレニアムの特殊回線しか通っていない閉鎖空間であるこの場所に、入り込めた……？"
90000025-18 = "ちょ、ちょっと待ってください。もしかしてこれは、ファイヤーウォールが全て……！？"
90000025-19 = "緊急事態。電源を壊すから下がって。"
90000025-27 = "……いえ、すでに手遅れのようです。"
90000025-32 = "……！"
90000025-33 = "……。"
90000025-34 = "……到達されましたね。"
90000025-35 = "電源は落ちてるけど……。"
90000025-36 = "特殊な閉鎖空間、電源も供給されていない……それでも……。"
90000025-37 = "……なるほど。まさに「特異現象」、ですね。エイミ。"
90000025-41 = "待って、何か聞こえる……スピーカー？"
90000025-42 = "……のだ……ようやく………………"
90000025-43 = "……。"
90000025-44 = "……ようやく会えたな、[USERNAME]よ。"
90000025-45 = "……！？"
90000025-46 = "[s] \"……誰？\""
90000025-47 = "……っ！ダメです、応答してはいけません！"
90000025-48 = "私は私、ただ存在するもの。始まりであり終わり。汝が思うまさにそのもの……。"
90000025-51 = "私は私……これ以上に、私を説明する術はない。"
90000025-52 = "……私の存在証明には何も要らない、誰の許可も必要ない……私は私の許可の元、こうして存在する。"
90000025-53 = "私は[ruby=Mystery]神秘[/ruby]であり、[ruby=Terror]恐怖[/ruby]であり、[ruby=Logos]知性[/ruby]であり、[ruby=Pathos]激情[/ruby]でもある。"
90000025-54 = "私のヘイローこそが私を証明する……刮目せよ、私はついに私を証明してみせる。"
90000025-58 = "……何か、スキャンをしている？"
90000025-59 = "先生、危ないからジッとしてて。"
90000025-60 = "……。"
90000025-61 = "[USERNAME]……私が知らないものを、持っているな。私には解析できないものを。"
90000025-62 = "……福音を聞かせてやろう。そして、この福音を宣べ伝えよ！"
90000025-66 = "……先生、そのタブレット！ハッキングされ――"
90000025-71 = "[ns] （シッテムの箱を……！？）"
90000025-72 = "おおおおっ……！"
90000025-73 = "おぉ……"
90000025-74 = "……"
90000025-76 = "むにゃ……んん……くぅ……。"
90000025-77 = "うひっ……く、くすぐるのはダメ、ですよぉ……んっ、んんっ……！"
90000025-78 = "……くしゅんっ！"
90000025-81 = "ぐっ……！なぜ、なぜだ……！"
90000025-82 = "うっ、くぅっ……ぐあぁぁぁぁっ！！"
90000025-87 = "……！？"
90000025-91 = "消えた……？"
90000025-92 = "侵入ログを確認……消滅してる。"
90000025-93 = "部長、大丈夫？"
90000025-94 = "はい、私は大丈夫です。先生の方は……？"
90000025-95 = "[s] \"うん、特に何とも。\""
90000025-99 = "そうでしたか……。"
90000025-100 = "先生のそのタブレット端末に接続しようとして、失敗した……？確か、連邦生徒会長が残したものと聞きましたが……。"
90000025-101 = "そしてあれが、噂の「デカグラマトン」……？想像していたよりも何と言いますか……だいぶ誇大妄想に陥った存在、のようですね。"
90000025-102 = "しかし、少々分析しただけでこうなるとは……やはり危険な存在であることは確かなようです。"
90000025-103 = "ただの狂ったAI……で終わらせるわけにはいかなそうですね。"
90000025-104 = "もっとしっかりした場所を拵えてから、研究を進めた方が良いでしょう。"
90000025-105 = "ではエイミ、せっかくですしきちんと「特異現象捜査部」の部室を作るとしましょうか。もうこういったことにはならないよう、ちゃんとしたものを。"
90000025-106 = "分かった。必要なものは用意しておく。"
90000025-107 = "何だか、予想外のファーストコンタクトでしたが……"
90000025-108 = "次はこうはいきません。今度はこちらから。"
90000025-109 = "さあ、目にもの見せてやりましょう。"
90000025-111 = "次回;「データ収集（３）PMC発掘区域」"
