[translation]
1601403-1 = "イブキと楽しいピクニック！"
1601403-2 = "おまたせ、先生！イブキが居ない間も元気にしてた～？"
1601403-3 = "[s1] \"イブキと会えなくて寂しかった……\"\n[s2] \"首を長くしてイブキを待ってたよ……\""
1601403-6 = "あっ、ダメだよ先生！"
1601403-7 = "一人のときも元気でいられるようにって、マコト先輩が言ってた！"
1601403-8 = "そういうマコト先輩は、いつもイブキにベッタリだけどね～えへへ。"
1601403-9 = "でもイブキが来たから、もう大丈夫！"
1601403-10 = "[s] \"元気出たよ！はいこれ、プリン買っておいたよ！\""
1601403-11 = "わあ！ありがとう先生！"
1601403-12 = "[s] \"一緒に食べよう！\""
1601403-13 = "は～い！"
1601403-15 = "いただきま～す！"
1601403-22 = "日常の疲れを癒してくれる最高のパラダイスが、ここに！"
1601403-26 = "キヴォトス最大の遊園地！「ユニーク・スタジオ・キヴォトス」へようこそ！"
1601403-27 = "家族や友人と共に楽しいひと時をお過ごしください！"
1601403-28 = "……。"
1601403-29 = "[s] \"イブキ、プリンこぼしてるよ？\""
1601403-30 = "……。"
1601403-34 = "[ns] \"……遊園地、行く？\""
1601403-35 = "えっ！本当！？いいの？"
1601403-36 = "あ、でも……遊園地は……"
1601403-37 = "特別な日だけって……マコト先輩が……"
1601403-38 = "[s] \"イブキと会えた日は、いつでも特別な日だよ！\""
1601403-42 = "行きたい！"
1601403-43 = "イブキ、遊園地行きたい！"
1601403-44 = "先生とメリーゴーランドも乗りたいしパレードも見たい！"
1601403-45 = "[s3] \"よし、行こう！\"\n[s4] \"さっそく明日にしよう！\""
1601403-48 = "わあ！先生、大好き！"
1601403-49 = "じゃあじゃあ、チケット買って、お弁当も用意しなきゃ！"
1601403-50 = "[s] \"チケットは私が取っておくね。\""
1601403-51 = "お弁当はイブキが作る！自信あるよ！"
1601403-52 = "材料買いに行こ、先生！"
1601403-55 = "お弁当はね、イブキの好きなものでいっぱいにするの！"
1601403-62 = "くまさんのゼリーとオレンジのキャンディーと～#nキャラメルも入れて……デザートはプリン！"
1601403-63 = "[s5] \"お菓子もいいと思うんだけど……\"\n[s6] \"先生はおにぎりも食べたいな！\""
1601403-66 = "うん！イブキもおにぎり好き！"
1601403-67 = "イブキが作ったおにぎり、イロハ先輩も好きって言ってた！#n先生にも食べてもらいたい！"
1601403-68 = "[s] \"今から楽しみだよ！\""
1601403-69 = "えへへっ、楽しみにしてて！"
1601403-71 = "（食材を買ってから、シャーレに戻った）"
1601403-73 = "じゃあ早速お弁当を作るよ、先生！"
1601403-78 = "見てて。こうやって、お米を取ったら中にくまさんゼリーを……ぎゅうって……"
1601403-79 = "[s] \"く、くまさんゼリー！？\""
1601403-80 = "そう！イブキの大好きなくまさんゼリーおにぎり！#nイロハ先輩も美味しいって褒めてくれたの！"
1601403-81 = "[s7] \"な、なるほど……！\"\n[s8] \"せ、先生の好きな梅干しおにぎりも作ってもらいたいな。\""
1601403-84 = "分かった！梅干しおにぎりね！"
1601403-89 = "じゃーん！できたっ！#n先生も一緒に作ろ！"
1601403-90 = "[s] \"お米を手に取って……\""
1601403-91 = "そうそう！よくできました！"
1601403-92 = "でも先生のおにぎりだから、特別にもっと大きくしてあげる！"
1601403-93 = "んっ……こうして……"
1601403-98 = "できたあー！"
1601403-99 = "[s] \"美味しそう！食べてみてもいい？\""
1601403-100 = "あっ！ダメ！これは明日の遊園地で食べるの！"
1601403-101 = "イブキと一緒に我慢するんだよ！"
1601403-104 = "（翌日……）"
1601403-110 = "うぅ……"
1601403-111 = "雨、すごい……遊園地に行くって、約束したのに……"
1601403-112 = "先生とメリーゴーランド乗って、パレード見て、お弁当……食べたかった……"
1601403-116 = "う、うう……ぐすん……"
1601403-117 = "[s] \"……イブキ！\""
1601403-118 = "……うん？"
1601403-122 = "先生？どうしてシートを広げてるの？"
1601403-123 = "[s] \"シートを敷いた瞬間から、ここは遊園地だよ！\""
1601403-125 = "[ns] \"シャーレ・パークへようこそ！\""
1601403-126 = "……しゃーれ、ぱーく？"
1601403-127 = "[s9] \"「ユニーク・スタジオ・キヴォトス」には行けなくなったけど……\"\n[s10] \"今日は一日限定、シャーレ遊園地だよ！\""
1601403-130 = "シャーレが……遊園地に……？"
1601403-131 = "[s11] \"それでは、遊園地ピクニックをします！\"\n[s12] \"まずはお弁当を食べよう！\""
1601403-134 = "イブキも靴を脱いで上がればいいの……？"
1601403-139 = "……わぁ！ピクニックみたいだね！"
1601403-140 = "[s] \"イブキ、こっちにおいで。\""
1601403-141 = "うん！"
1601403-148 = "はい、先生のために作ったおにぎり！"
1601403-152 = "……。"
1601403-153 = "[s] \"イブキ？\""
1601403-154 = "……先生は、悲しくないの？"
1601403-155 = "[s] \"……たしかに、残念ではあったかな。\""
1601403-156 = "このおにぎり、ユニーク・スタジオで食べようと思って作ったのに……"
1601403-157 = "お外がずっと雨だから……"
1601403-158 = "[s13] \"どこで食べるのかよりも、誰と食べるのかが大切だから。\"\n[s14] \"イブキと一緒に食べられるなら、それが一番だよ。\""
1601403-161 = "……。"
1601403-162 = "うん！そうだね！"
1601403-163 = "イブキも先生と一緒ならどこでも楽しい！"
1601403-165 = "（その後、「シャーレ・パーク」でゲームやおもちゃで遊び、イブキと楽しい時間を過ごした）"
