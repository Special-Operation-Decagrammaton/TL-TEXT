[translation]
1601403-1 = "Um piquenique divertido com a Ibuki!"
1601403-2 = "Demorei, Sensei! Você ficou bem enquanto a Ibuki estava fora?"
1601403-3 = "[s1] \"Fiquei triste por não poder te ver...\"\n[s2] \"Fiquei esperando ansiosamente pela Ibuki...\""
1601403-6 = "Ah, não pode, Sensei!"
1601403-7 = "A Makoto-senpai disse que eu preciso ficar bem mesmo quando estiver sozinha!"
1601403-8 = "Embora a própria Makoto-senpai não desgrude de mim... hehe."
1601403-9 = "Mas agora que a Ibuki chegou, está tudo bem!"
1601403-10 = "[s] \"Já me sinto melhor! Toma, comprei um pudim para você!\""
1601403-11 = "Uau! Obrigada, Sensei!"
1601403-12 = "[s] \"Vamos comer juntos!\""
1601403-13 = "Eba!"
1601403-15 = "Itadakimasu!"
1601403-22 = "O paraíso perfeito para curar o cansaço do dia a dia está aqui!"
1601403-26 = "O maior parque de diversões de Kivotos! Bem-vindo ao \"Unique Studio Kivotos\"!"
1601403-27 = "Por favor, aproveite momentos divertidos com sua família e amigos!"
1601403-28 = "……."
1601403-29 = "[s] \"Ibuki, você está deixando o pudim cair?\""
1601403-30 = "……."
1601403-34 = "[ns] \"...Quer ir ao parque de diversões?\""
1601403-35 = "Ah! Sério!? Pode mesmo?"
1601403-36 = "Ah, mas... o parque de diversões..."
1601403-37 = "A Makoto-senpai disse que só em dias especiais..."
1601403-38 = "[s] \"Todo dia que eu encontro a Ibuki é um dia especial!\""
1601403-42 = "Eu quero ir!"
1601403-43 = "A Ibuki quer ir ao parque de diversões!"
1601403-44 = "Quero andar no carrossel com o Sensei e ver o desfile também!"
1601403-45 = "[s3] \"Certo, vamos lá!\"\n[s4] \"Vamos marcar para amanhã!\""
1601403-48 = "Uau! Eu te amo, Sensei!"
1601403-49 = "Então, então, temos que comprar os ingressos e preparar o almoço!"
1601403-50 = "[s] \"Eu cuido dos ingressos.\""
1601403-51 = "O almoço a Ibuki faz! Eu sou boa nisso!"
1601403-52 = "Vamos comprar os ingredientes, Sensei!"
1601403-55 = "O almoço vai ser cheio das coisas que a Ibuki mais gosta!"
1601403-62 = "Gelatina de ursinho, bala de laranja e...#ncaramelo também... e de sobremesa, pudim!"
1601403-63 = "[s5] \"Acho que doces são bons, mas...\"\n[s6] \"O Sensei também queria comer um onigiri!\""
1601403-66 = "Sim! A Ibuki também gosta de onigiri!"
1601403-67 = "A Iroha-senpai disse que gosta do onigiri que eu faço!#nQuero que o Sensei experimente também!"
1601403-68 = "[s] \"Já estou ansioso!\""
1601403-69 = "Hehehe, pode esperar!"
1601403-71 = "(Depois de comprar os ingredientes, voltamos para o Schale)"
1601403-73 = "Então vamos começar a fazer o almoço, Sensei!"
1601403-78 = "Olha só. Pega o arroz assim, coloca a gelatina de ursinho no meio... e aperta bem..."
1601403-79 = "[s] \"G-gelatina de ursinho!?\""
1601403-80 = "Isso! O onigiri de gelatina de ursinho que a Ibuki mais ama!#nA Iroha-senpai até elogiou dizendo que é delicioso!"
1601403-81 = "[s7] \"E-entendo...!\"\n[s8] \"P-poderia fazer um onigiri de umeboshi para o Sensei também?\""
1601403-84 = "Entendido! Onigiri de umeboshi!"
1601403-89 = "Tcharam! Ficou pronto!#nVamos fazer juntos, Sensei!"
1601403-90 = "[s] \"Pegando o arroz com a mão...\""
1601403-91 = "Isso mesmo! Muito bem!"
1601403-92 = "Mas como é o onigiri do Sensei, vou fazer um especial bem maior para você!"
1601403-93 = "Hmm... assim..."
1601403-98 = "Prontinho!"
1601403-99 = "[s] \"Parece delicioso! Posso experimentar?\""
1601403-100 = "Ah! Não pode! Isso é para comermos no parque de diversões amanhã!"
1601403-101 = "Você tem que aguentar firme junto com a Ibuki!"
1601403-104 = "(No dia seguinte...)"
1601403-110 = "Uuu..."
1601403-111 = "A chuva está tão forte... e nós tínhamos prometido ir ao parque de diversões..."
1601403-112 = "Eu queria andar no carrossel com o Sensei, ver o desfile e comer o nosso lanche..."
1601403-116 = "U, uuu... *sniff*..."
1601403-117 = "[s] \"...Ibuki!\""
1601403-118 = "...Hum?"
1601403-122 = "Sensei? Por que você está estendendo esse lençol?"
1601403-123 = "[s] \"A partir do momento em que estendemos o lençol, aqui se torna um parque de diversões!\""
1601403-125 = "[ns] \"Bem-vindo ao Parque Schale!\""
1601403-126 = "...Parque Schale?"
1601403-127 = "[s9] \"Embora não possamos mais ir ao 'Unique Studio Kivotos'...\"\n[s10] \"Hoje, por um dia, este é o Parque de Diversões Schale!\""
1601403-130 = "O Schale... virou um parque de diversões...?"
1601403-131 = "[s11] \"Então, vamos começar nosso piquenique no parque!\"\n[s12] \"Primeiro, vamos comer o nosso lanche!\""
1601403-134 = "A Ibuki também deve tirar os sapatos para subir...?"
1601403-139 = "...Uau! Parece um piquenique de verdade!"
1601403-140 = "[s] \"Ibuki, venha aqui.\""
1601403-141 = "Sim!"
1601403-148 = "Aqui, o onigiri que eu fiz para o Sensei!"
1601403-152 = "..."
1601403-153 = "[s] \"Ibuki?\""
1601403-154 = "...Sensei, você não está triste?"
1601403-155 = "[s] \"...Bem, é verdade que foi uma pena.\""
1601403-156 = "Eu fiz este onigiri pensando em comermos no Unique Studio..."
1601403-157 = "E como está chovendo lá fora o tempo todo..."
1601403-158 = "[s13] \"Mais importante do que onde comemos, é com quem comemos.\"\n[s14] \"Se eu puder comer com a Ibuki, isso é o que mais importa.\""
1601403-161 = "..."
1601403-162 = "Sim! É verdade!"
1601403-163 = "A Ibuki também se diverte em qualquer lugar se estiver com o Sensei!"
1601403-165 = "(Depois disso, passamos um tempo divertido com a Ibuki, brincando com jogos e brinquedos no \"Parque Schale\")"
