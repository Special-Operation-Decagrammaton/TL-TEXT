[translation]
1005803-1 = "趣味と実益"
1005803-6 = "（話の流れで、ミネの部屋に招待してもらうことになった）"
1005803-7 = "先生、お待ちしておりました。こちらが私の部屋です。"
1005803-8 = "[s] \"すごい数の医療用品が……。\" "
1005803-9 = "大した数ではありません。"
1005803-10 = "沢山の本を集める方もいれば、ビンやフタ、切手や記念品などを集める方もいます。それと同じですよ。"
1005803-11 = "私は医療用品に特化している、というだけで。"
1005803-12 = "どうです？どれも実用的なものばかりでしょう？"
1005803-13 = "[s] \"それにしても、この数は流石に多いような……！？\""
1005803-14 = "確かに、かなりの数が積み上がっていますが……。"
1005803-15 = "一般的な生徒からすると多く感じるかもしれません。"
1005803-16 = "ですが先生、私たちは「救護騎士団」です。"
1005803-17 = "いつどんなときも、救護ができるように備えておくべきではないでしょうか！？"
1005803-18 = "いつだって、あらゆる事態を想定しておかなくては！"
1005803-19 = "[s1] \"う、うん、それは良いと思うんだけど……。\"\n[s2] \"ただその、素人的にはどれも同じようなものに見えちゃうなというか……。\""
1005803-22 = "同じようなものに、見える……？"
1005803-27 = "その言葉は聞き捨てなりません！"
1005803-28 = "例えば、こちらの包帯とあちらの包帯はまったくの別物です！"
1005803-29 = "[s] \"えっ……？\""
1005803-30 = "こちらの目が細かい包帯は、かの有名な「セイント・アンド・メディカル」社の包帯です。"
1005803-31 = "かの会社が生産している医療用品はどれも高価なため、価格が下がったところでまとめて購入したいのですが、替えの利かない存在ですのでそうもいきません！"
1005803-32 = "特徴としては緊急時の処置に特化しており、優れた止血と消毒の効果を併せ持ち、その伸縮性から傷口の圧迫にも有用です！"
1005803-33 = "今の説明を聞くと、完璧な包帯だと思われるかもしれませんが……。"
1005803-34 = "なんと一般的に使われている包帯の、およそ五倍以上の値段を誇る代物でもあります！"
1005803-39 = "一方、こちらの包帯は「ロージュ」社の包帯です。"
1005803-40 = "薄手で巻きやすく緩みにくいことから固定に特化しており、幅の広さから様々な部位を圧迫することもできます。"
1005803-41 = "値段もセイント社と比較してお手頃ですから、気兼ねなく一般的な家庭でもストックしておけるでしょう。"
1005803-42 = "身近な包帯として、多くの人に勧められる商品と言えます！"
1005803-43 = "[s] \"な、なるほど……！\""
1005803-44 = "こちらの軟膏もそうです！"
1005803-48 = "この朱色のパッケージの軟膏は、細菌の増殖抑制に特化した商品でして。"
1005803-49 = "特に皮膚感染を引き起こす原因となる、グラム陽性菌の抑制に有効です。"
1005803-50 = "一方、緑色のパッケージの軟膏は、細菌の抑制効果で劣りますが……。"
1005803-51 = "細胞の再生を促すことにより、相対的に傷の治癒を早めます。"
1005803-52 = "少量ですがステロイド成分も含まれているので、炎症を抑える効果が高いです。"
1005803-53 = "もちろん副作用もあるので、適切な用法用量を守って使用する必要はあります。"
1005803-54 = "[s3] \"い、色々あるんだね……。\"\n[s4] \"そこまで覚えてるなんて、ミネはすごいね。\""
1005803-57 = "……。"
1005803-58 = "よく考えると口でご説明するだけでは、特性や違いの素晴らしさを理解するのは難しいでしょう。"
1005803-59 = "何か、先生にも分かっていただける別の方法……。"
1005803-68 = "……そうですね。一度、私の身体に傷を作ってみましょう！"
1005803-69 = "[s] \"どうして！？\""
1005803-70 = "何かを理解するのが難しいときは、見るだけ、聞くだけでなく、実際に試してみることが効果的と聞きます。"
1005803-71 = "私の身体を使って医療用品の効果を比較すれば……。"
1005803-72 = "きっと先生にも、これらの違いを理解していただけるでしょう！"
1005803-73 = "[s] \"お願いだからやめて！？\""
1005803-74 = "ほんの少しの傷ですよ？針かメスを使って――"
1005803-75 = "……はい？目の前で大切な生徒が傷付く姿を見たくない、ですか？"
1005803-79 = "そういうことでしたら……申し訳ありません、先生。#n私が興奮のあまり、少々先走りすぎてしまいました。"
1005803-80 = "ですが……万が一、応急処置が必要になりましたら、"
1005803-81 = "必ず私を訪ねてください。"
1005803-83 = "（その後もミネから医療用品に関する熱烈な説明を受けてから、シャーレに戻った）"
