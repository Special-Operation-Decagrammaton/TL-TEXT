[translation]
1601202-1 = "新年を新たな装いで！"
1601202-3 = "洋菓子店「ルワゾー・ブッレ」"
1601202-4 = "（ジュンコに呼ばれて「ルワゾー・ブッレ」を訪れた）"
1601202-5 = "いらっしゃいませ、「ルワゾー・ブッレ」です！"
1601202-6 = "あっ、先生！来てくれたんだ！早速だけど、どう、どう？"
1601202-7 = "[s] \"「どう？」っていうのは、つまり……。\""
1601202-8 = "そう、この着物のこと！"
1601202-9 = "新年ってことで特別に、着物姿で働くことになったの！"
1601202-10 = "別に強制じゃないから、着なくても良いんだけどね。"
1601202-11 = "[s] \"たしかに、言われてみれば店中が……。\""
1601202-15 = "うん！みんな半分以上、着物姿でしょ？"
1601202-16 = "……っていうか、先生。"
1601202-17 = "他の人じゃなくて、私を見なさいよ！先生を呼んだ意味が無いじゃない！"
1601202-18 = "……急にじっと見つめるのもやめて！どうしてそう極端に……。"
1601202-19 = "そ、それで、どう？"
1601202-20 = "な、何ってそりゃ……似合ってるかどうかよ！"
1601202-21 = "[s] \"もちろん、すごく似合ってるよ。\""
1601202-22 = "ふぅん……。"
1601202-23 = "……感想はそれだけ？"
1601202-24 = "うーん……まあ先生だし、そうかもしれないとは思ったけど。はぁ……。"
1601202-25 = "[s] \"世界一似合ってるよジュンコ！可愛い、最っ高に可愛い！テイクアウトしたい！！\""
1601202-26 = "な、何言ってんの！？私を持ち帰ってどうするつもり！？"
1601202-27 = "ああもう、だから何でそう極端なのよ！"
1601202-28 = "……とにかく。私としてもこの着物、結構気に入ってるの。"
1601202-29 = "しばらく借りて、お店の外でも着たいくらい。"
1601202-30 = "でもそのためには、レンタル費用とクリーニング代が必要で……。"
1601202-31 = "結局……いつも以上にバイトを頑張らないといけないわけ。"
1601202-32 = "[s1] \"世の中、そう簡単じゃないよね……。\"\n[s2] \"欲しいものを手に入れるために、犠牲はつきものだから……。\""
1601202-35 = "まあ、そういうことね。うーん……。"
1601202-36 = "こうなったらいっそ……一番高いメニューを先生に沢山買ってもらって、店の売上を爆上げさせるとか？"
1601202-37 = "[s3] \"なんて邪悪な手口を！仕方ないなぁ！\"\n[s4] \"ここからここまで、全部ください！\""
1601202-40 = "ま、冗談よ……って、え！？じょ、冗談だってば！なに本気にしてんの！？"
1601202-41 = "[s] \"せっかく可愛いウェイトレスさんがいるんだから、高いものを頼まないとね。\""
1601202-42 = "だ、だからそれは……！"
1601202-43 = "[s] \"それに私も、「ルワゾー・ブッレ」のお正月メニュー食べたい！\""
1601202-44 = "そ、それなら仕方ないけど……。"
1601202-45 = "にしても、こんなにたくさん頼む必要はないんじゃない？"
1601202-46 = "え、注文しちゃったんだから受け取る？う、うーん……。"
1601202-47 = "えっと、じゃあ、ご注文ありがとうございます……。"
1601202-57 = "……。"
1601202-58 = "だから言ったのに……。"
1601202-59 = "[s] \"やっぱり頼み過ぎたかも……？\""
1601202-60 = "まったく、聞く耳持たないから。"
1601202-61 = "これどうするのよ、半分以上手つかずじゃない。"
1601202-62 = "え、良いアイディア？何それ？"
1601202-63 = "増援を呼べば良い……？"
1601202-64 = "[s5] \"一緒に食べよう、ジュンコ。\"\n[s6] \"ジュンコも食べたくない？\""
1601202-67 = "はぁっ！？い、一応私はここの従業員だし、バイト中なんだけど……！？"
1601202-68 = "で、でもまあ、そこまで言うなら……。"
1601202-72 = "……なんで店長も遠くからオッケーサイン出してるのよ。"
1601202-73 = "ああもう、仕方ないわね！一緒に食べてあげる！"
1601202-76 = "（ジュンコと並んで座って、ゆったりケーキを食べた）"
1601202-81 = "（帰り際に「デート楽しかったね」と言ったら、なぜか殴られた）"
