[translation]
1601202-1 = "Ano novo com um visual novo!"
1601202-3 = "Confeitaria \"L'Oiseau Bleuet\""
1601202-4 = "（Visitou a \"L'Oiseau Bleuet\" após ser chamado por Junko）"
1601202-5 = "Bem-vindo à \"L'Oiseau Bleuet\"!"
1601202-6 = "Ah, Sensei! Você veio! Indo direto ao ponto, o que achou? O que achou?"
1601202-7 = "[s] \"O que eu achei? Bem, isso significa...\""
1601202-8 = "Isso mesmo, sobre este quimono!"
1601202-9 = "Como é Ano Novo, decidimos trabalhar vestindo quimonos como algo especial!"
1601202-10 = "Não é obrigatório, então não precisaria usar se não quisesse, mas..."
1601202-11 = "[s] \"Agora que você mencionou, toda a loja está...\""
1601202-15 = "Sim! Mais da metade de todo mundo está de quimono, né?"
1601202-16 = "Quer dizer... Sensei."
1601202-17 = "Não olhe para os outros, olhe para mim! Se não, não faria sentido eu ter te chamado!"
1601202-18 = "E pare de ficar me encarando assim de repente! Por que você tem que ser tão extremo..."
1601202-19 = "E, então, o que achou?"
1601202-20 = "O-o que eu quero dizer é... se ficou bom em mim!"
1601202-21 = "[s] \"Claro, ficou incrível em você.\""
1601202-22 = "Hum..."
1601202-23 = "Só isso de comentário?"
1601202-24 = "Hum... bem, é o Sensei, então eu imaginei que seria assim. Ah..."
1601202-25 = "[s] \"Você está a pessoa mais linda do mundo, Junko! Fofa, extremamente fofa! Quero levar para casa!!\""
1601202-26 = "O-o que você está dizendo!? O que pretende fazer me levando para casa!?"
1601202-27 = "Ah, meu Deus, por que você tem que ser tão extremo!"
1601202-28 = "De qualquer forma... eu até que gostei bastante deste quimono."
1601202-29 = "Dá vontade de alugar por um tempo e usar fora da loja também."
1601202-30 = "Mas para isso, preciso do dinheiro do aluguel e da lavanderia..."
1601202-31 = "No fim das contas... vou ter que me esforçar mais do que o normal no trabalho."
1601202-32 = "[s1] \"A vida não é tão fácil assim, né...\"\n[s2] \"Para conseguir o que quer, sempre há um sacrifício...\""
1601202-35 = "Bem, é isso. Hum..."
1601202-36 = "Já que chegamos a esse ponto... que tal se você comprasse vários dos itens mais caros do menu para aumentar as vendas da loja?"
1601202-37 = "[s3] \"Que tática maligna! Não tem jeito, né!\"\n[s4] \"Quero tudo, de um lado ao outro!\""
1601202-40 = "Ei, é brincadeira... espera, hein!? E-era brincadeira! Por que você está levando a sério!?"
1601202-41 = "[s] \"Já que temos uma garçonete tão fofa, preciso pedir algo caro.\""
1601202-42 = "E-então, isso é...!"
1601202-43 = "[s] \"Além disso, eu também quero comer o menu de Ano Novo da 'L'Oiseau Bleuet'!\""
1601202-44 = "B-bem, se é assim, não tem jeito..."
1601202-45 = "Mas mesmo assim, não precisava pedir tanto, né?"
1601202-46 = "Ah, você já pediu, então vai aceitar? E-entendi..."
1601202-47 = "Bem, então, obrigado pelo seu pedido..."
1601202-57 = "..."
1601202-58 = "Eu avisei..."
1601202-59 = "[s] \"Talvez eu tenha pedido demais...?\""
1601202-60 = "Nossa, você não me ouve mesmo."
1601202-61 = "O que vamos fazer com isso? Mais da metade nem foi tocada."
1601202-62 = "Ah, uma boa ideia? O que é?"
1601202-63 = "Chamar reforços...?"
1601202-64 = "[s5] \"Vamos comer juntos, Junko.\"\n[s6] \"Você não quer comer também, Junko?\""
1601202-67 = "Hã!? E-eu sou uma funcionária aqui e estou no meio do expediente, sabia...!?"
1601202-68 = "M-mas, bem, se você insiste tanto..."
1601202-72 = "...Por que a gerente está fazendo sinal de positivo lá de longe?"
1601202-73 = "Ah, que seja, não tem jeito! Eu como com você!"
1601202-76 = "(Sentei ao lado da Junko e comemos o bolo calmamente)"
1601202-81 = "(Ao me despedir, disse 'o encontro foi divertido', e por algum motivo, levei um soco)"
