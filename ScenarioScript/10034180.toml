[translation]
10034180-1 = "2 dias atrás: Intrusão"
10034180-10 = "Kazusa Kyoyama, olá!!"
10034180-11 = "Kazusa, sua amiga veio de novo."
10034180-12 = "Nossa amiga, na verdade."
10034180-13 = "Ahaha... bom dia, Reisa-chan."
10034180-14 = "...Ué, para onde ela foi?"
10034180-15 = "V-verdade..."
10034180-16 = "Eh... Kazusa Kyoyama, você não está aí?"
10034180-20 = "Ah... bem, é que..."
10034180-21 = "P-peço desculpas..."
10034180-23 = "Se você esperar, acho que ela logo aparece, sabe?"
10034180-24 = "É. De qualquer forma, ela deve estar na loja de conveniência ali perto."
10034180-26 = "O-o sentimento é gentil, mas... #nEu nem sou do Clube de Doces depois da aula..."
10034180-27 = "Mas você é do 'Grupo' de Doces depois da aula, não é? #nSim, ou seja, somos aliadas que juraram lealdade..."
10034180-28 = "Bem, deixando a Natsu de lado."
10034180-29 = "Como a Airi disse, não precisa se preocupar. #nPode ficar o quanto quiser."
10034180-31 = "...!!"
10034180-32 = "Sim! Pode vir brincar com a gente mesmo quando a Kazusa-chan não estiver!"
10034180-33 = "Se ficar cansada do trabalho da Brigada de Vigilância, vamos comer doces juntas?"
10034180-37 = "..."
10034180-38 = "...Sim!!"
10034180-43 = "Cheguei, comprei sorvete—"
10034180-47 = "...Ah, eu sabia que você estaria aqui."
10034180-49 = "Tive um palpite e comprei um a mais... #nAcho que acertei."
