[translation]
10034180-1 = "2日前：乱入"
10034180-10 = "[ruby=きょうやま]杏山カ[/ruby]ズサこんにちはぁ！！"
10034180-11 = "カズサ、またあんたの友達が来たわよ。"
10034180-12 = "「私たち」の友達、だよ。"
10034180-13 = "あはは……おはよう、レイサちゃん。"
10034180-14 = "……あれ、本人どこ行ったの？"
10034180-15 = "ほ、ほんとだ……。"
10034180-16 = "えっ……杏山カズサ、いないんですか？"
10034180-20 = "あ……えっと、その……。"
10034180-21 = "し、失礼しました……。"
10034180-23 = "待ってたら、すぐ来ると思うよ？"
10034180-24 = "そうよ。どうせ近くのコンビニとかだろうし。"
10034180-26 = "お、お気持ちは嬉しいのですが……。#n私は放課後スイーツ部でもないですし……。"
10034180-27 = "でも放課後スイーツ「団」ではある、でしょ？#nそう、即ち血盟を誓ったもの同士……。"
10034180-28 = "ま、ナツのことは置いといて。"
10034180-29 = "アイリも言ってる通り、気にする必要ないわよ。#n好きなだけいれば良いじゃない。"
10034180-31 = "……！！"
10034180-32 = "うん！カズサちゃんがいない時でも遊びにきてね！"
10034180-33 = "自警団の仕事で疲れたら、一緒にスイーツ食べよ？"
10034180-37 = "……。"
10034180-38 = "……はいっ！！"
10034180-43 = "ただいまー、アイス買ってき――"
10034180-47 = "……あ、やっぱりあんたもいたんだ。"
10034180-49 = "何となくそうかと思って、余分に買ってきたんだけど……#n正解だったね。"
