[translation]
84302300301-6 = "Posso te perguntar uma coisa?"
84302300301-7 = "Hm, o que foi?"
84302300301-8 = "Essa tal de Koyuki costuma causar problemas com frequência?"
84302300301-13 = "Bem... a Koyuki é..."
84302300301-15 = "Hum..."
84302300301-16 = "Desculpe, se houver algum motivo, não precisa responder."
84302300301-17 = "Não, não é isso. Hm, como eu deveria dizer..."
84302300301-18 = "De qualquer forma, ela é alguém que só causa confusão. Por isso a gente já está acostumada, mas..."
84302300301-19 = "Ela não pensa em nada, mas tem uma energia incrível para agir. E, para piorar, ela chama atenção sem necessidade. É esse tipo de pessoa."
84302300301-20 = "Ah, entendo."
84302300301-21 = "Nós também temos uma aluna assim..."
84302300301-23 = "(Será que ela tem alguém em mente...)"
