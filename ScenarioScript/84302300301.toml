[translation]
84302300301-6 = "一つ聞いてもいいだろうか。"
84302300301-7 = "ん、どした？"
84302300301-8 = "コユキ、という者はよく問題を起こすのだろうか？"
84302300301-13 = "そうね……コユキは……。"
84302300301-15 = "ふむ……。"
84302300301-16 = "済まない、事情があるなら答えなくていい。"
84302300301-17 = "いや、そうじゃねぇんだ。ん－、なんて言えばいいんだろうな……。"
84302300301-18 = "とにかくトラブルばっか起こす奴なんだ。だからあたしらも慣れてるんだけど……。"
84302300301-19 = "何も考えてねぇくせに、行動力だけは抜群。そのくせ、無駄に人目を引きやがる。そんな奴なんだよ。"
84302300301-20 = "ああ、なるほど。"
84302300301-21 = "こちらにもそういう生徒が……。"
84302300301-23 = "（思い当たる節でもあるのかしら……）"
