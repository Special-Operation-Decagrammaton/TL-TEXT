[translation]
34180-1 = "Episódio 18;As Outras Nós"
34180-9 = "Por aqui, Hiyori, Misaki.#nVamos nos esconder aqui."
34180-10 = "M-mana Saori……"
34180-11 = "Shhh! Silêncio. Abaixa mais a cabeça."
34180-12 = "S-sim…… aliás, quem é aquela ali no centro?#nE-ela tá com uma roupa…… m-muito bonita……."
34180-13 = "Eu também não sei direito…… deve ser alguém importante."
34180-14 = "Dizem que é uma princesa. Que carrega um sangue nobre, algo assim."
34180-15 = "P-princesa!? É uma princesa?"
34180-16 = "E-então existem princesas no mundo? Diferente da gente, que é o fundo do poço……."
34180-17 = "Ela não deve passar fome…… nem se machucar……#nn-nem dormir na beira da rua, né……? Né?"
34180-18 = "S-sim…… deve ser, né?"
34180-19 = "……Eu achava que no mundo só existia sofrimento…… e existe uma princesa tão linda, vivendo tão feliz…… que emocionante. Buááá!"
34180-20 = "N-não chora do nada! Vão descobrir a gente!"
34180-21 = "D-desculpa, mana Saori…… buááá!#nMas…… buááá!"
34180-22 = "……Princesa ou não, a situação dela deve ser igual à nossa; talvez até pior."
34180-23 = "……?"
34180-24 = "Parece um desfile, mas aquilo é um cortejo levando uma refém pro inimigo.#nSerá que é por ser tempo de guerra interna…… existe disso também, né."
34180-25 = "Aquela princesa também vai acabar passando fome numa prisão.#nA vida dela vai ser do tipo \"sorte se sobrar resto de comida\"."
34180-26 = "A-auu……."
34180-27 = "Para, Misaki. A Hiyori tá com medo, né."
34180-28 = "……E aí, o que a gente faz, mana Saori?#nA gente veio até aqui só pra olhar e ir embora?"
34180-29 = "Não; é claro que a gente vai atacar.#nA gente se mistura naquela aglomeração e pega emprestado o que parecer útil."
34180-30 = "Vamos."
34180-38 = "Parem!!"
34180-39 = "Saia, líder do 8º pelotão."
34180-40 = "Vocês pretendem quebrar a aureola dela!?#nParem!!"
34180-41 = "P-por favor…… por favor, chega…… uh, uuh……."
34180-42 = "Essa aí nos desafiou; é o natural.#nSe não sair da frente, vocês vão passar pelo mesmo."
34180-43 = "Cof…… cof.#nNão me façam rir…… quem é que……."
34180-44 = "Essa daí, como ousa!!"
34180-45 = "Espere!!"
34180-46 = "……Eu a instruo."
34180-47 = "Instruir……?"
34180-48 = "……De novo essa perda de tempo."
34180-49 = "A Hiyori e a Misaki são alunas que eu instruí. A Hime também――todas têm bom desempenho, não têm?"
34180-50 = "Por isso, deixem comigo――eu assumo a responsabilidade de instruir esta aqui."
34180-53 = "……Dói."
34180-54 = "Misaki…… nunca mais, nunca mais faça uma coisa dessas!#nNunca……!!"
34180-55 = "……Por quê?"
34180-56 = "Quê……?"
34180-57 = "Por que não pode?#nPor que a gente tem que continuar vivendo no meio deste sofrimento sem sentido?"
34180-58 = "――Com frio, com fome, sofrendo.#nDias que são só sofrimento repetido."
34180-59 = "Por que a mana nos impõe este sofrimento sem sentido?#nQue sentido há nisso, afinal?"
34180-60 = "I-isso é……"
34180-61 = "Isso…… é……."
34180-62 = "……Viu, não consegue responder.#nBanca a que sabe de tudo, mas a mana é igualzinha à gente."
34180-65 = "……M-Misaki! Espera……."
34180-66 = "Espera! E-eu……"
34180-68 = "……Perdoem-me…… sinto muitíssimo……."
34180-69 = "Nunca mais…… nunca mais uma coisa dessas……."
34180-70 = "Nunca mais desobedeço à palavra dos adultos…… não me rebelo…… vou me esforçar pra não nutrir esperança no futuro……."
34180-71 = "Nunca mais desejo felicidade…… nem rezo……."
34180-72 = "Por isso, por favor……"
34180-74 = "por favor…… piedade……."
34180-75 = "Piedade……."
34180-77 = "……Por que você resiste a esse ponto, Azusa?"
34180-78 = "Símbolo da reconciliação……? Não; isso não passa de embuste.#nVocê não é uma existência dessas."
34180-79 = "Tudo o que você preparou e estudou foi pra \"aquela missão\"."
34180-80 = "Por isso, desista e aceite――porque tudo é apenas vão."
34180-81 = "Azusa……?"
34180-82 = "O que você disse agora?#nEspera……."
34180-85 = "A-aonde? Azusa!"
34180-86 = "Espera! O que…… aonde você vai?#nSendo que nós ainda estamos \"aqui\"……."
34180-87 = "Azusa……"
34180-88 = "V-você…… descobriu?#nVocê…… conhece essa resposta………?"
34180-89 = "Me ensina; eu……"
34180-90 = "eu, afinal…… o que devo……"
34180-93 = "……Azusa."
34180-94 = "……Azusa?"
34180-95 = "……!!#nGh, uh……."
34180-99 = "……U, gh."
34180-103 = "……Com esse ferimento não dá, Saori."
34180-104 = "……Sei."
34180-105 = "Pois é…… eu perdi, então."
34180-106 = "……Já chega."
34180-107 = "Já…… chega?"
34180-108 = "……Sim. Eu já não sei mais o que é o certo."
34180-109 = "Até hoje, eu avancei acreditando que isto era o certo……#nmas, olhando pra trás, estava tudo errado……."
34180-110 = "……Azusa Shirasu."
34180-111 = "……?"
34180-112 = "O que você queria perguntar pra Azusa?"
34180-113 = "……Você ouviu."
34180-114 = "A Azusa do Clube de Aulas de Reforço.#nEla não era, no fim, a espiã escolhida pra ajudar no meu plano de golpe?"
34180-115 = "Sem a ajuda do Sensei, ela teria sido só mais uma peça……"
34180-116 = "……A Azusa."
34180-117 = "Não foi, na origem, escolhida como espiã."
34180-118 = "……Hã?"
34180-123 = "Aquela menina……"
34180-124 = "……ia ser o \"símbolo da reconciliação\"."
34180-125 = "……."
34180-126 = "Q-quê……"
34180-127 = "De Trinity e Arius…….#nQuem usou essa expressão primeiro foi você, Mika."
34180-128 = "Do que você tá falando…… isso……#nSim, lembrei…… foi um enfeite que eu inventei na hora pra enganar o Sensei……"
34180-129 = "――Não. Foi a expressão que você usou na primeira vez em que veio nos procurar."
34180-130 = "Antes do ataque à Seia――quando nem o Tratado do Éden, nem o seu plano de golpe, nada havia sido planejado ainda."
34180-131 = "……."
34180-132 = "Você, naquela hora, disse que queria se reconciliar com a Arius."
34180-134 = "Muito prazer☆ Não sei quem você é, mas você é aluna de Arius, né……?"
34180-135 = "Hoje o tempo tá ótimo, né? Tão tranquilo……"
34180-136 = "Diga logo o assunto, Trinity."
34180-137 = "Uau…… você odeia quebra-gelo, né.#n……Sim, então, sem escolha, direto ao ponto."
34180-142 = "――Eu quero me reconciliar com vocês, com a Arius."
34180-143 = "Reconciliar……?"
34180-144 = "Sim. Talvez seja uma proposta meio radical, mas……"
34180-145 = "vocês, provavelmente, ainda nos odeiam, né?"
34180-146 = "Por isso recusam tanto a nossa ajuda quanto a do Conselho Estudantil Geral, e vivem isoladas num distrito oculto, né? Porque o ódio do passado permanece."
34180-147 = "……."
34180-148 = "Mas, pra resolver isto…… o ódio de parte a parte é grande demais……#ne os mal-entendidos acumulados também devem ser enormes…… bom, não é simples, né."
34180-149 = "A Nagi e a Seia serem contra é o natural……."
34180-150 = "Mas, sabe…… ser amiga é assim tão difícil?#nSe cada lado ceder um pouquinho, um dia não se realiza?"
34180-151 = "Eu acho que sim…… por isso, resolvi me esforçar aos pouquinhos e vim até aqui."
34180-152 = "……E como quer que eu acredite que essas palavras são sinceras?"
34180-153 = "Sim…… essa reação eu também entendo.#nPor isso, eu pensei."
34180-154 = "Que tal transferir 1 aluna de vocês, da Arius, pra Trinity?#nEm segredo, claro."
34180-155 = "Se eu for a tutora, dá pra dar um jeito.#nPor mais que não pareça, eu sou do Tea Party, viu."
34180-156 = "……."
34180-157 = "E, aí, a gente prova que uma aluna de Arius pode viver sem problema nenhum na nossa academia, em paz e feliz."
34180-159 = "Ou seja, essa menina viraria o \"símbolo da reconciliação\".#nQue tal?"
34180-163 = "……Um plano absurdo."
34180-164 = "M-mas…… se existisse alguém assim, com certeza a Seia e a Nagi também aceitariam!"
34180-165 = "……."
34180-166 = "Que seja. Mas não é um problema que eu possa decidir sozinha.#nVocê vai ter que aguardar o próximo contato."
34180-167 = "Hã? P-peraí!#nEssa menina existe mesmo?"
34180-168 = "……."
34180-175 = "Azusa, missão."
34180-179 = "……Quê?"
34180-181 = "Reconciliação? Uma ideia ingênua de dar espanto. Se não for armadilha, seria até estranho."
34180-182 = "Hum…… bom, não há pressa.#nSe é ingenuidade ou uma cobra dissimulada, vamos observar por ora."
34180-183 = "Recuse por enquanto.#nE, com jeitinho, mantenha a relação e extraia informações de Trinity."
34180-184 = "Isso quer dizer…… recusar?"
34180-185 = "É claro. Símbolo da reconciliação? Que devaneio é esse?#nEla, vamos usá-la como ferramenta pra obter informações de Trinity."
34180-186 = "……."
34180-187 = "Saori…… algum problema?#nNão me diga que, sem a minha permissão, você andou preparando algo?"
34180-188 = "N-não…… nada disso, Madame."
34180-189 = "Você não se esqueceu, não é?#nDa razão pela qual vocês sofrem――da raiz do porquê de tremerem de frio e passarem fome?"
34180-190 = "……Sim. É tudo culpa de Trinity, que nos expulsou."
34180-191 = "Sim. Reconciliação com o algoz jamais existirá, por toda a eternidade.#n――Jamais, jamais esqueça esse ódio."
34180-192 = "Sim, Madame.#nEu não esqueço o ódio."
34180-194 = "Por que, nem eu sei bem…… mas, se fosse a Azusa……#naquela, a Azusa……."
34180-195 = "Eu…… devia desejar que a Azusa se tornasse uma existência assim……."
34180-196 = "……."
34180-197 = "Mas a chance de confirmar isso nunca chegou……."
34180-201 = "……A Seia está aqui."
34180-202 = "Em silêncio, basta mandarem-na pra um hospital……."
34180-203 = "É isso; conto com vocês, tá."
34180-205 = "……."
34180-206 = "……A Madame não deixou essa chance escapar.#nPorque a Seia era um estorvo aos olhos dela."
34180-207 = "Você devia nos achar um exército particular conveniente.#nSenão, jamais teria revelado a localização ultrassecreta da Seia."
34180-208 = "Mas nós não somos essa existência conveniente.#nNós somos……"
34180-210 = "um grupo que aprendeu e treinou o \"método de quebrar aureolas\", e que carrega as ferramentas disso………#num grupo de assassinas."
34180-212 = "A missão de matar a Seia com a \"bomba que destrói aureolas\" caiu sobre nós."
34180-216 = "A Azusa…… por deter muito conhecimento de Trinity, adquirido pra ser o símbolo da reconciliação, acabou designada pra essa missão."
34180-224 = "……A Nagi tá tramando uma coisa estranha."
34180-225 = "……."
34180-226 = "Desde que a Seia morreu, parece que ela perdeu o rumo.#nUm tratado de paz com Gehenna, francamente. Ai, Nagi……."
34180-227 = "Por isso――sim. Quero que vocês comecem aquele plano que eu propus outro dia."
34180-229 = "Infiltrar uma espiã dentro de Trinity.#nDiferente da vez da Seia, de um jeito cauteloso, tá."
34180-231 = "Mika……"
34180-232 = "Eu não conseguia te compreender.#nO que, afinal, você desejava; eu não fazia a menor ideia."
34180-233 = "Cheguei a pensar que você fosse só uma tola…… mas, se você pensava aquilo de verdade……"
34180-234 = "Quando eu ouvi de você, pela primeira vez, a palavra \"reconciliação\"…… mesmo entendendo, na cabeça, que era um delírio……"
34180-235 = "\"se um futuro desses existisse pra nós\", pensei……."
34180-236 = "Esse pensamento, eu nunca consegui apagar por completo……."
34180-237 = "……."
34180-238 = "Mika, você……"
34180-243 = "queria, de verdade, do fundo do coração, se reconciliar com a gente."
34180-244 = "……."
34180-245 = "Você veio até nós de boa vontade.#nQuem pisoteou esse seu coração, te enganou e te conduziu a este inferno fui eu."
34180-246 = "E você não conseguiu aceitar este inferno…… por isso, tampou a própria memória e a negou."
34180-247 = "Sim; e não só você……."
34180-248 = "……A Hime ter que viver escondendo a voz e o rosto,#neu ter arrastado a Hiyori e a Misaki pro Squad……"
34180-249 = "e a Azusa, mandada de novo a Trinity não como \"símbolo da reconciliação\", e sim como \"assassina\"――como a \"espiã\" que teria que enganar e pisotear a todos……"
34180-250 = "――é tudo culpa minha."
34180-251 = "Eu…… não sou um cão de caça. Eu sou……"
34180-252 = "uma praga…… que espalha sofrimento a tudo ao redor."
34180-253 = "……."
34180-254 = "O que eu queria perguntar pra Azusa, é……#nSim…… havia uma coisa……."
34180-255 = "Mesmo com tudo isso empurrado pras costas dela, a Azusa……"
34180-256 = "……parecia feliz."
34180-257 = "Aquela Azusa que não mostrava emoção a ninguém, que não nos aceitou até o fim,#nque se manteve na solidão……."
34180-259 = "Aquela menina, de coração fechado e duro como uma concha no fundo d'água……."
34180-270 = "Com amigas…… unindo forças com um adulto……"
34180-271 = "no fim, superando as adversidades……."
34180-272 = "seguiu em frente…… sob um céu azul radiante e cheio de felicidade……."
34180-274 = "Não…… nada disso.#nAquilo…… aquilo é mentira. É falso!"
34180-275 = "É uma felicidade de miragem, que um dia desaparece!"
34180-279 = "Abaixar a cabeça, rezar e se agarrar não muda nada!"
34180-280 = "Azusa, nós, no fim, não podemos ser felizes.#nVocê sabe bem, não sabe?――Que tudo é vão."
34180-282 = "Mas…… no fim, eu tive que admitir……."
34180-285 = "Ah…… entendo."
34180-286 = "O nosso ódio…… a frase \"tudo é vão\"……#ntudo o que fizemos……"
34180-287 = "――era tudo, tudo mentira……."
34180-288 = "Eu, lerda e fraca…… como uma praga, empurrei tudo ao redor pra ruína……."
34180-299 = "――Ah, então era isso, no fim.#nA causa de tudo era eu."
34180-300 = "A Azusa pôde ser feliz porque conseguiu se afastar de mim."
34180-301 = "E eu devia querer negar essa verdade até o fim……."
34180-303 = "Azusa, você…… conhece a resposta certa?"
34180-304 = "Azusa…… eu……."
34180-305 = "――será que posso ser feliz?"
34180-306 = "O que eu faço pra me tornar como você?#nEssa chance existe? Eu posso desejar uma coisa dessas……?"
34180-307 = "Se…… eu……."
34180-310 = "……tivesse encontrado um bom adulto um pouco mais cedo……."
34180-311 = "Será que até alguém como eu…… teria tido outra vida……?"
34180-312 = "Será que, em vez deste desfecho miserável, eu teria alcançado outro futuro……?"
34180-313 = "Será que eu também…… tinha…… essa chance……."
34180-314 = "Azusa…… o que era mesmo que você disse naquela hora……?"
34180-315 = "Eu…… isso……"
34180-319 = "……Mika."
34180-320 = "Já estou neste estado.#n――Faça como quiser. Na medida do que te roubaram, pode tomar de mim."
34180-321 = "Quem transformou você, que tinha um coração gentil, na \"bruxa\" do ódio#nfui eu, e mais ninguém."
34180-322 = "Eu roubei muito dos outros…… com isto, ao menos, fica justo……."
34180-332 = "Ah…… se esse papel coubesse a alguém, eu achava que seria a Azusa……#nmas era você, Mika."
34180-340 = "……?"
34180-341 = "……E-eu……"
34180-342 = "eu…… não consigo."
34180-343 = "Uma coisa dessas, eu não consigo……#nporque……"
34180-344 = "eu também……"
34180-345 = "desejava essa chance, como você……"
34180-346 = "Eu também…… queria ser feliz……."
34180-347 = "Eu também, como você…… se eu tivesse encontrado o Sensei um pouco mais cedo.#nAí…… será que eu teria conseguido reparar os meus erros…… eu pensava……."
34180-352 = "Eu aceitava isto como o castigo natural……#nmas, ainda assim, rezei por piedade mais vezes do que consigo contar."
34180-353 = "Mas…… foi inútil."
34180-354 = "As tantas coisas irreversíveis que eu cometi,#ncomo seriam perdoadas, eu não faço ideia……."
34180-355 = "Uma segunda chance……"
34180-356 = "O Sensei e todos se reunindo por mim…… poder recomeçar.#nEu acreditava que essa chance existia pra mim também…… mas não havia…… esse futuro não existia……."
34180-357 = "Neste mundo em que tudo é só vão, eu só sofria, desejando salvação……."
34180-359 = "Você é…… eu, Saori……."
34180-360 = "Você não pode ser feliz.#nAssim como eu não posso."
34180-361 = "Não dá. Pra nós, que já passamos do ponto do conserto, uma segunda chance jamais existiria."
34180-363 = "Por isso, talvez, eu desejasse pra você uma dor \"justa\"……."
34180-364 = "Mas é justamente por isso…… que eu não consigo……."
34180-365 = "Se eu decidir o seu desfecho deste jeito……."
34180-366 = "eu acabo provando, eu mesma, que não há salvação pra mim……."
34180-371 = "Mika…… você……."
34180-372 = "Ei, por que você não usou a \"bomba que destrói aureolas\"?"
34180-373 = "……!!"
34180-374 = "Ouvi dizer que você a tinha…… chance de usar não faltou, né?#nPor que você não usou?"
34180-375 = "Se você tivesse usado…… eu……."
34180-376 = "Isso…… pra começar, eu não a tenho."
34180-377 = "Porque o Sensei confiscou……."
34180-378 = "……Hã?"
34180-379 = "……Confiscou? O Sensei?"
34180-380 = "Hã, por quê……?"
34180-385 = "[ns] \"Coisas perigosas, o Sensei confisca.\""
34180-386 = "!?"
34180-387 = "S-Sensei……!?"
34180-388 = "S-Sensei…… p-por que o senhor aqui……!?"
34180-390 = "Próximo Episódio;Possibilidades Infinitas"
