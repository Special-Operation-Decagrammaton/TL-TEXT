[translation]
34180-1 = "Episódio 18; A Nossa Outra Versão"
34180-9 = "Por aqui, Hiyori, Misaki.#nVamos nos esconder aqui."
34180-10 = "S-Saori-nee-san..."
34180-11 = "Shh! Fiquem quietas. Abaixem mais a cabeça."
34180-12 = "S-Sim... A propósito, quem é aquela no centro?#nE-Ela está u-usando roupas t-tão bonitas..."
34180-13 = "Eu também não sei direito... Provavelmente alguém importante."
34180-14 = "Dizem que é uma princesa. Que tem sangue nobre ou algo assim."
34180-15 = "P-Princesa!? Ela é uma princesa?"
34180-16 = "E-Então princesas existem mesmo neste mundo? B-Bem diferente da gente, que tá na base do poço..."
34180-17 = "Ela não deve passar fome... nem se machucar...#nE-E não deve dormir no meio da rua, né...? Né?"
34180-18 = "S-Sim... acho que sim?"
34180-19 = "......Eu achava que este mundo só tinha sofrimento... mas existe uma princesa tão linda e vivendo feliz assim... Estou até emocionada. Uwaaaaah!"
34180-20 = "N-Não comece a chorar do nada! Vão descobrir a gente!"
34180-21 = "M-Me desculpe, Saori-nee-san... Uwaaaaah!#nMas... uwaaaaah!"
34180-22 = "......Mesmo sendo chamada de princesa, a situação dela deve ser igual a nossa, ou talvez até pior."
34180-23 = "......?"
34180-24 = "Pode parecer um desfile, mas aquilo é uma procissão para entregar uma refém ao inimigo.#nComo estamos no meio de uma guerra civil... esse tipo de coisa acontece."
34180-25 = "Aquela princesa também deve acabar passando fome numa prisão.#nTerá uma vida em que vai ter sorte se conseguir sobras de comida."
34180-26 = "A-Auuu..."
34180-27 = "Pare com isso, Misaki. A Hiyori tá ficando com medo."
34180-28 = "......E então, o que vamos fazer, Saori-nee-san?#nNós viemos até aqui só pra olhar e voltar?"
34180-29 = "Não, claro que vamos atacar.#nVamos nos infiltrar na multidão e pegar coisas emprestadas que possam ser úteis."
34180-30 = "Vamos lá."
34180-38 = "Pare com isso!!"
34180-39 = "Saia da frente, Líder do 8º Esquadrão."
34180-40 = "Você quer destruir o halo dela!?#nPara com isso!!"
34180-41 = "P-Por favor... Por favor, parem com isso... ugh, uhh..."
34180-42 = "Ela resistiu contra nós, então é o que ela merece.#nSe você não recuar, vocês terão o mesmo destino."
34180-43 = "*Cof*... *cof*.#nNão me faça rir... quem vai..."
34180-44 = "Sua pirralha, como ousa!!"
34180-45 = "Espera!!"
34180-46 = "......Deixe que eu a disciplino."
34180-47 = "Disciplinar...?"
34180-48 = "......Outra tentativa inútil."
34180-49 = "Tanto a Hiyori quanto a Misaki são alunas que eu disciplinei. A Princesa também――Todas têm boas notas, não têm?"
34180-50 = "Então, deixem comigo――Eu me responsabilizo por discipliná-la."
34180-53 = "......Dói."
34180-54 = "Misaki... Nunca mais, nunca mais faça algo assim de novo!#nEu proíbo você...!!"
34180-55 = "......Por quê?"
34180-56 = "O quê...?"
34180-57 = "Por que não posso?#nPor que eu tenho que continuar vivendo no meio dessa dor sem sentido?"
34180-58 = "――Com frio, com fome e sofrendo.#nSendo que meus dias são só um ciclo interminável de sofrimento."
34180-59 = "Por que você força a gente a aguentar essa dor sem sentido, Nee-san?#nQue sentido há nisso tudo?"
34180-60 = "I-Isso é..."
34180-61 = "Isso... é..."
34180-62 = "......Tá vendo, você não sabe responder.#nFinge que sabe tudo, mas no fundo é igual a nós."
34180-65 = "......M-Misaki! Espera..."
34180-66 = "Espera! E-Eu..."
34180-68 = "......Por favor, me perdoe... Sinto muito..."
34180-69 = "Nunca mais... eu nunca mais vou..."
34180-70 = "Nunca mais vou desobedecer às palavras de uma adulta... não irei me rebelar... Vou me esforçar para não ter esperanças no futuro..."
34180-71 = "Nunca mais desejarei a felicidade... não rezarei por isso..."
34180-72 = "Então, por favor..."
34180-74 = "Por favor... tenha piedade..."
34180-75 = "Piedade..."
34180-77 = "......Por que você resiste tanto, Azusa?"
34180-78 = "Símbolo de reconciliação...? Não, isso não passa de uma farsa.#nVocê não é esse tipo de existência."
34180-79 = "Tudo o que você preparou e estudou foi para 'aquela missão'."
34180-80 = "Então, desista e aceite――Afinal, tudo não passa de vaidade."
34180-81 = "Azusa...?"
34180-82 = "O que você disse agora?#nEspera..."
34180-85 = "P-Pra onde!? Azusa!"
34180-86 = "Espera! O que... Pra onde você vai?#nNós ainda estamos 'aqui'..."
34180-87 = "Azusa..."
34180-88 = "V-Você... descobriu?#nVocê... sabe a resposta...?"
34180-89 = "Me conte, eu..."
34180-90 = "O que... eu devo fazer..."
34180-93 = "......Azusa."
34180-94 = "......Azusa?"
34180-95 = "......!!#nG-Guh..."
34180-99 = "......U-Ugh."
34180-103 = "......Com esses ferimentos não vai dar, Saori."
34180-104 = "......Entendi."
34180-105 = "É verdade... Eu perdi."
34180-106 = "......Chega."
34180-107 = "Chega...?"
34180-108 = "......Sim. Eu não sei mais o que é o certo."
34180-109 = "Até agora, eu avancei acreditando que isso era o certo...#nMas quando olhei para trás, vi que tudo estava errado..."
34180-110 = "......Azusa Shirasu."
34180-111 = "......?"
34180-112 = "O que era que você queria perguntar para a Azusa-chan?"
34180-113 = "......Você estava ouvindo."
34180-114 = "A Azusa-chan do Clube de Reposição.#nOriginalmente, ela era a espiã escolhida para ajudar no meu plano de golpe de estado, não era?"
34180-115 = "Se não fosse pela ajuda do Sensei, ela deveria ter sido apenas mais um peão no tabuleiro..."
34180-116 = "......A Azusa."
34180-117 = "Nunca foi escolhida para ser uma espiã."
34180-118 = "......Hã?"
34180-123 = "Aquela garota..."
34180-124 = "......Deveria ter sido o 'símbolo da reconciliação'."
34180-125 = "......"
34180-126 = "O quê..."
34180-127 = "Entre Trinity e Arius...#nFoi você a primeira a usar essa expressão, Mika."
34180-128 = "Do que você está falando... isso...#nAh, me lembrei... foi algo que inventei na hora para enganar o Sensei..."
34180-129 = "――Não. Foram as palavras que você usou quando veio nos visitar pela primeira vez."
34180-130 = "Antes do ataque à Seia acontecer――antes mesmo de existir qualquer coisa sobre o Tratado do Éden ou seu plano de golpe."
34180-131 = "......"
34180-132 = "Você disse naquela época que queria se reconciliar com a Arius."
34180-134 = "Prazer em conhecer☆ Não sei quem você é, mas você é uma aluna da Arius, não é...?"
34180-135 = "O tempo tá tão bom hoje, né? Tão pacífico..."
34180-136 = "Vá direto ao ponto, Trinity."
34180-137 = "Nossa... Você odeia jogar conversa fora, né.#n......Ok, então vamos direto ao assunto."
34180-142 = "――Eu quero que a Trinity se reconcilie com vocês da Arius."
34180-143 = "Reconciliação...?"
34180-144 = "Sim. Pode parecer uma ideia radical, mas..."
34180-145 = "Aposto que vocês ainda odeiam a gente, não odeiam?"
34180-146 = "É por isso que vocês recusaram a nossa ajuda e a do Conselho Estudantil Geral, e continuam isoladas num distrito autônomo escondido, não é? Por causa do ódio do passado que ainda restou."
34180-147 = "......"
34180-148 = "Mas, para resolver isso... o ódio mútuo é grande demais...#nAlém dos vários mal-entendidos acumulados... pois é, não vai ser fácil."
34180-149 = "É claro que a Nagi-chan e a Seia-chan vão se opor..."
34180-150 = "Mas sabe... é tão difícil assim a gente se dar bem?#nSe nós duas dermos um passo de cada vez, não acha que um dia será possível?"
34180-151 = "É isso que eu acho... por isso vim até aqui, para começar a me esforçar aos poucos."
34180-152 = "......E como você quer que eu acredite que está falando a verdade?"
34180-153 = "É... eu entendo sua reação.#nPor isso, eu tive uma ideia."
34180-154 = "O que acha de transferirmos uma de vocês, alunas da Arius, para a Trinity?#nEm segredo, é claro."
34180-155 = "Se eu for a fiadora dela, vai dar tudo certo.#nApesar das aparências, eu faço parte da Tea Party."
34180-156 = "......"
34180-157 = "Aí, nós provaríamos que uma aluna da Arius pode viver bem e feliz na nossa academia sem nenhum problema."
34180-159 = "Seria como dizer que essa garota é o nosso 'símbolo de reconciliação'.#nO que me diz?"
34180-163 = "......Que plano absurdo."
34180-164 = "M-Mas... se uma pessoa assim existir, tenho certeza de que a Seia-chan e a Nagi-chan vão ser convencidas!"
34180-165 = "......"
34180-166 = "Tudo bem. Mas não é algo que eu possa decidir sozinha.#nVocê terá de aguardar pelo próximo contato."
34180-167 = "Eh? E-Espera um pouco!#nExiste mesmo alguém assim lá?"
34180-168 = "......"
34180-175 = "Azusa, você tem uma missão."
34180-179 = "......O quê?"
34180-181 = "Reconciliação? É uma ideia tão inocente e pura que chega a assustar. Seria estranho se não fosse uma armadilha."
34180-182 = "Hum... Bem, não há pressa.#nVamos apenas observar por um tempo se ela é apenas pura e ingênua, ou uma cobra traiçoeira."
34180-183 = "Recuse por enquanto.#nDepois, a enrole o suficiente para manter a relação e obter informações da Trinity."
34180-184 = "Isso quer dizer que... devo recusar?"
34180-185 = "É claro. Símbolo de reconciliação? Do que ela está falando.#nVamos usá-la como uma ferramenta para conseguir informações da Trinity."
34180-186 = "......"
34180-187 = "Saori... Algum problema?#nNão me diga que você está preparando algo sem a minha permissão?"
34180-188 = "N-Não... não é isso, Madame."
34180-189 = "Você não se esqueceu, não é mesmo?#nO motivo de vocês estarem sofrendo――A origem do por que tremem de frio e passam fome?"
34180-190 = "......Sim. Tudo isso é culpa da Trinity que nos expulsou."
34180-191 = "Sim. A reconciliação com o nosso inimigo é algo que jamais acontecerá pela eternidade.#n――Nunca, jamais se esqueça desse ódio."
34180-192 = "Sim, Madame.#nEu nunca me esquecerei desse ódio."
34180-194 = "Eu não entendo bem o porquê... mas se for a Azusa...#nSabe, a Azusa poderia..."
34180-195 = "Eu acho... que eu queria que a Azusa se tornasse essa pessoa..."
34180-196 = "......"
34180-197 = "Mas, a oportunidade para confirmar isso nunca chegou..."
34180-201 = "......A Seia-chan está aqui."
34180-202 = "Se vocês pudessem discretamente mandá-la para o hospital, ou coisa do tipo..."
34180-203 = "Acho que é só isso, conto com vocês."
34180-205 = "......"
34180-206 = "......A Madame não deixou essa oportunidade passar.#nPorque a Seia era um incômodo para ela."
34180-207 = "Você achou que nós éramos como um exército privado muito conveniente.#nSenão, não teria nos contado a localização ultrassecreta da Seia."
34180-208 = "Mas, nós não somos uma existência conveniente.#nNós somos..."
34180-210 = "Um grupo de assassinas...#nQue aprendeu 'como destruir um halo', treinou para isso e possui as ferramentas para fazer isso acontecer."
34180-212 = "A missão para matar a Seia com a 'bomba que destrói halos' foi dada a nós."
34180-216 = "A Azusa... por possuir bastante conhecimento sobre a Trinity para se tornar o símbolo de reconciliação, foi colocada nessa missão."
34180-224 = "......A Nagi-chan tá planejando algo estranho."
34180-225 = "......"
34180-226 = "Parece que ela perdeu a vontade desde que a Seia-chan morreu.#nTratado de Paz com Gehenna, fala sério. Nagi-chan..."
34180-227 = "Então――isso mesmo. Eu queria que você começasse o plano que eu propus da última vez."
34180-229 = "Enviaremos uma espiã para o interior da Trinity.#nDe uma forma bem mais cautelosa do que da vez da Seia-chan."
34180-231 = "Mika..."
34180-232 = "Eu não conseguia entender você.#nEu não tinha a menor ideia do que você realmente queria."
34180-233 = "Achei que você pudesse ser apenas uma idiota... mas se você estivesse falando sério..."
34180-234 = "Mesmo na primeira vez que ouvi a palavra 'reconciliação' de você... Embora minha mente dissesse que era apenas baboseira..."
34180-235 = "Se por acaso, tivéssemos um 'futuro assim'..."
34180-236 = "Eu não consegui apagar completamente esse pensamento da minha cabeça..."
34180-237 = "......"
34180-238 = "Mika, você..."
34180-243 = "Realmente, do fundo do seu coração, queria se reconciliar com a gente."
34180-244 = "......"
34180-245 = "Você nos procurou com boas intenções.#nE fui eu quem pisoteou o seu coração, te enganou, e te arrastou para esse inferno."
34180-246 = "E você não conseguiu aceitar esse inferno... então negou suas próprias memórias e as trancou no fundo de si mesma."
34180-247 = "Sim, e não foi só você..."
34180-248 = "......O fato de a Princesa ter de viver escondendo o rosto e a voz,#no fato de ter arrastado a Hiyori e a Misaki para o Esquadrão..."
34180-249 = "A Azusa sendo enviada de volta à Trinity não como um 'símbolo de reconciliação', mas como uma 'assassina'――Uma 'espiã' que teve de enganar e pisotear todas..."
34180-250 = "――Tudo isso é minha culpa."
34180-251 = "Eu não sou... um cão de caça. Eu sou..."
34180-252 = "Uma maldição ambulante... que só traz dor a todos ao seu redor."
34180-253 = "......"
34180-254 = "O que eu queria perguntar à Azusa, hein...#nÉ verdade... tinha isso..."
34180-255 = "Mesmo que tudo aquilo tenha sido imposto a ela, a Azusa..."
34180-256 = "......Parecia feliz."
34180-257 = "A Azusa, que nunca demonstrava suas emoções, que não nos aceitou até o final,#ne que preferia a solidão..."
34180-259 = "Aquela garota que fechou seu coração com tanta firmeza como a concha de um molusco no fundo do mar..."
34180-270 = "Trabalhou junto com seus amigos... e com um adulto..."
34180-271 = "E no fim, superando as dificuldades..."
34180-272 = "Avançou sob um céu azul, brilhante e cheio de felicidade..."
34180-274 = "Não... isso não pode ser verdade.#nIsso... isso é tudo uma mentira. É falso!"
34180-275 = "É uma felicidade como uma miragem que vai desaparecer um dia!"
34180-279 = "Mesmo que você abaixe a cabeça e reze, nada vai mudar!"
34180-280 = "Azusa, no fim nós não podemos ser felizes.#nVocê sabe muito bem disso, não sabe? ――Que tudo não passa de vaidade."
34180-282 = "Mas... no fim das contas, eu tive de admitir..."
34180-285 = "Ah... entendi."
34180-286 = "O nosso ódio... a frase de que 'tudo não passa de vaidade'...#ntudo o que fizemos até aqui..."
34180-287 = "――Foi tudo uma mentira..."
34180-288 = "Fui eu, tão tola e fraca... quem arrastou as pessoas ao redor para a ruína como uma verdadeira praga..."
34180-299 = "――Ah, no fim, foi isso que aconteceu.#nTudo foi por minha culpa."
34180-300 = "A Azusa só conseguiu ser feliz porque se afastou de mim."
34180-301 = "Talvez eu quisesse negar essa verdade até o fim..."
34180-303 = "Azusa... será que você... sabe qual é a resposta certa?"
34180-304 = "Azusa... será que eu..."
34180-305 = "――Serei capaz de ser feliz?"
34180-306 = "Como eu poderia me tornar como você?#nSerá que eu ainda teria essa oportunidade? Será que eu posso ao menos desejar algo assim...?"
34180-307 = "Se... eu tivesse..."
34180-310 = "......Se eu tivesse encontrado um bom adulto um pouco mais cedo..."
34180-311 = "Até alguém como eu... teria tido uma vida diferente...?"
34180-312 = "Será que eu poderia ter alcançado outro futuro em vez deste final trágico...?"
34180-313 = "Se eu também... tivesse uma chance dessas..."
34180-314 = "Azusa... o que você... me disse aquela vez?"
34180-315 = "Eu... escutei..."
34180-319 = "......Mika."
34180-320 = "Já chegamos a este ponto.#n――Faça como quiser. Você pode tomar na mesma medida daquilo que foi roubado de você."
34180-321 = "Porque não foi ninguém além de mim... quem transformou você, que tinha um coração tão gentil... em uma 'Bruxa' de puro ódio."
34180-322 = "Eu já tirei muito dos outros... pelo menos assim será justo..."
34180-332 = "Ah... eu sempre pensei que se chegasse a hora, seria a Azusa a fazer isso...#nMas no fim, era você, Mika."
34180-340 = "......?"
34180-341 = "......E-Eu..."
34180-342 = "Eu não posso..."
34180-343 = "Eu não posso fazer isso...#nPorque..."
34180-344 = "Eu também..."
34180-345 = "Eu também queria ter essa oportunidade, assim como você..."
34180-346 = "Eu também... queria ser feliz..."
34180-347 = "Assim como você, eu pensei... se eu tivesse encontrado o Sensei um pouco mais cedo.#nAí... eu teria conseguido consertar os meus erros..."
34180-352 = "Eu tinha aceitado que este castigo era o que eu merecia...#nMas, mesmo assim, eu rezei inúmeras vezes pedindo por perdão."
34180-353 = "Mas... não serviu de nada."
34180-354 = "Eu não faço a menor ideia de como poderei ser perdoada...#npelas inúmeras coisas imperdoáveis que eu fiz..."
34180-355 = "Uma segunda chance..."
34180-356 = "O Sensei e todo mundo iriam se juntar por mim... e eu poderia começar de novo.#nEu acreditei que eu também teria uma chance assim... mas não... não existia um futuro como esse..."
34180-357 = "Neste mundo cheio de coisas vazias, tudo o que eu fazia era desejar salvação enquanto sofria..."
34180-359 = "Você... é eu, Saori..."
34180-360 = "Você não será capaz de ser feliz.#nAssim como eu não poderei ser feliz."
34180-361 = "Isso é impossível. Não há como pessoas como nós, que não têm mais salvação, terem uma segunda chance."
34180-363 = "É por isso que, talvez, eu estivesse desejando causar uma dor 'justa' em você..."
34180-364 = "Mas é exatamente por isso... que eu não consigo..."
34180-365 = "Porque se eu determinar o seu fim dessa maneira..."
34180-366 = "Eu mesma estaria provando que não há salvação para mim também..."
34180-371 = "Mika... você..."
34180-372 = "Ei, por que você não usou a 'bomba que destrói halos'?"
34180-373 = "......!!"
34180-374 = "Eu ouvi que você estava com ela... e teve várias oportunidades de usar, não teve?#nPor que não usou?"
34180-375 = "Se você tivesse usado... eu..."
34180-376 = "Sobre isso... Eu já não a tenho mais comigo."
34180-377 = "Foi confiscada, pelo Sensei..."
34180-378 = "......Hã?"
34180-379 = "......Confiscada? Pelo Sensei?"
34180-380 = "Ué, mas por que...?"
34180-385 = "[ns] \"Coisas perigosas são confiscadas pelo Sensei.\""
34180-386 = "!?"
34180-387 = "S-Sensei...!?"
34180-388 = "S-Sensei... P-Por que você está aqui...!?"
34180-390 = "Próximo Episódio; Possibilidades Infinitas"