[translation]
1300305-1 = "Hora do crepúsculo"
1300305-2 = "Arredores de Trinity - Parque"
1300305-3 = "Ora...?"
1300305-4 = "Olá, Sensei. Por que você está aqui...?"
1300305-5 = "...Ah, entendo. Não é nada em especial, você só estava passeando?"
1300305-6 = "Sim, eu também estou na mesma situação. Antes de voltar para o dormitório após as atividades do comitê, decidi passar um pouco... aqui no parque."
1300305-7 = "E acabar encontrando o Sensei aqui. Que sorte a minha, hehe."
1300305-8 = "[s] \"O que você estava fazendo?\""
1300305-9 = "Nada em especial, na verdade. Eu só estava aproveitando um tempo sozinha."
1300305-10 = "O parque neste horário é perfeito para ficar um pouco só."
1300305-11 = "Por exemplo, quando você se senta e fica olhando para o céu,"
1300305-12 = "especialmente ao entardecer, o céu se tinge de um tom violeta..."
1300305-13 = "...Olhe só."
1300305-14 = "O sol se põe rapidamente, então essa cor só dura alguns minutos."
1300305-15 = "Eu não sou muito boa com as palavras, então não sei bem como descrever..."
1300305-16 = "Este momento é... curto, mas é um luxo..."
1300305-17 = "..."
1300305-18 = "...Será que eu disse algo estranho?"
1300305-19 = "[s] \"Não, está tudo bem.\""
1300305-20 = "Desculpe, e obrigada."
1300305-23 = "...Fico feliz por poder compartilhar este momento precioso com você, Sensei."
1300305-26 = "(Fiquei sentado no parque com Hasumi até escurecer, compartilhando o mesmo tempo, e depois voltei para o Schale.)"
