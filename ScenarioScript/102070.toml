[translation]
102070-1 = "Episódio 7;Defesa do Distrito de Shanhaijing"
102070-6 = "A-aaah!! É um monstro!!"
102070-11 = "Os inimigos chegaram!"
102070-12 = "Deixem a área do Plum Blossom Garden conosco!#nKokona-chan, cuide da evacuação dos civis!"
102070-14 = "T-tá bom! Entendi, irmã Shun!"
102070-20 = "Então vamos nessa~!"
102070-22 = "Ora, isso aqui está bem animado, hein."
102070-27 = "P-presidente Kisaki…!?"
102070-31 = "Mesmo sendo a líder do portão, não posso simplesmente ficar parada vendo Shanhaijing em perigo."
102070-32 = "Ah, é verdade. Também mandei a chefe do Comitê Disciplinar pras áreas com menos defesa.#nPodem usar ela como quiserem."
102070-33 = "Mestra… muito obrigada."
102070-43 = "Heh… isso sim é “mantenha os amigos por perto, e os inimigos mais perto ainda”…"
102070-44 = "Hã?… Do nada, do que você tá falando?"
102070-45 = "Lá vem você copiar fala de filme de novo."
102070-46 = "Cala a boca! É uma frase do clássico eterno \"Godmother\"!"
102070-47 = "Aff… enfim, vamos logo! É uma ordem da Mestra!"