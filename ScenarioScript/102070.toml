[translation]
102070-1 = "Episódio 7; Defesa da Região Autônoma “Shanhaijing”"
102070-6 = "Uau! ! É um monstro! !"
102070-11 = "O inimigo chegou!"
102070-12 = "Deixe isso para Baikaen! #n Cocona-chan, por favor oriente os cidadãos a evacuarem!"
102070-14 = "Ah, sim! Entendi! Irmã Shun."
102070-20 = "Pois bem, vamos lá!"
102070-22 = "Está bastante ocupado."
102070-27 = "Ei, presidente Kisaki...! ?"
102070-31 = "Mesmo que ele seja o chefe da família. Não podemos simplesmente ficar sentados e assistir à crise em Shanhai-jing."
102070-32 = "Ah, isso mesmo. Mandei o diretor executivo para um local com pouca proteção. Sinta-se à vontade para usá-lo como quiser."
102070-33 = "Senhor, muito obrigado."
102070-43 = "Huh... é exatamente isso que \"mantém seus amigos por perto e seus inimigos mais perto\"."

102070-44 = "foto? ...Do que você está falando de repente?"
102070-45 = "De qualquer forma, provavelmente é outra venda de filmes."
102070-46 = "Barulhento! É uma frase da obra-prima imortal “Madrinha”!"
102070-47 = "Com certeza... vamos! Esta é a ordem do mestre!"
