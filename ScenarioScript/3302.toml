[translation]
3302-1 = "全力で振り抜いて（２）"
3302-10 = "はぁ、はぁ……じゅう……よん！"
3302-11 = "さあ、もう少しです、レイさん。"
3302-12 = "このワンセットで終わりですから！"
3302-13 = "うっ……"
3302-18 = "……じゅう、ご！"
3302-19 = "よくできました！"
3302-20 = "では、最後にもうワンセット！"
3302-21 = "待ってください！今のが最後じゃなかったんですか？"
3302-22 = "増えてませんか！？増えてますよね！？"
3302-23 = "気のせいでしょう、次で最後ですから！"
3302-24 = "今日の痛みは、明日の筋肉につながるもの……"
3302-25 = "さあ、頑張りましょう！#nこれで明日には、きっと素敵な筋肉が手に入ります！"
3302-26 = "それ！さっきも聞きました！"
3302-27 = "いつの間にかワンセット増えてるし……"
3302-28 = "こ、これ以上は無理です！"
3302-29 = "分かりました。では、一度休憩しましょう！"
3302-30 = "水分を補給したら、身体が冷える前に次のトレーニングに移ります！"
3302-40 = "ふぅ……"
3302-41 = "……スミレ先輩。このトレーニングで本当にホームランが打てるようになるんですか？"
3302-42 = "腕や肩の筋肉よりも、足に負荷がかかっているような……"
3302-43 = "心配いりません。#nバーピーは足だけでなく、全身を鍛えられますから！"
3302-44 = "これを繰り返せば、腕や肩はもちろん、持久力までつきます！"
3302-45 = "レイさんの場合、まずは基礎体力を上げつつ全身を鍛えるためにも、バーピーが効率的なんです。"
3302-46 = "でも……"
3302-47 = "私はホームランを打ちたいだけで、体力をつけたり全身を鍛えるのが目的じゃないんですが……"
3302-48 = "腕力だけで打球を飛ばす有名なスラッガーも存在するのに……"
3302-52 = "……レイさん。"
3302-53 = "レイさんは、どうしてホームランを打ちたいんですか？"
3302-54 = "それは……カッコいいからです。"
3302-55 = "一回のスイングで試合をひっくり返せるって思うと……"
3302-56 = "それに、ダイヤモンドを一周してる時間は、自分だけのものじゃないですか。"
3302-57 = "だから、バッターとしてホームランに憧れるのは当然です。"
3302-58 = "……自分は野球部に入ると決めたとき、思ったんです。"
3302-59 = "いつか絶対にホームランを打って、試合に勝ってみせると！"
3302-63 = "最後にホームランを見たのは、いつですか？"
3302-64 = "えっと……たしか去年のシーズン終わりに、友達と見たのが最後です。"
3302-65 = "今でも、スタンドに吸い込まれるきれいなアーチが忘れられません。"
3302-66 = "あの一発で、チームは逆転勝利を……"
3302-67 = "……って、あれ？#n試合自体は負けたんだっけ……"
3302-72 = "（おかしいな……）"
3302-73 = "（あれだけ感動したはずなのに、球場の景色がよく思い出せない……）"
3302-74 = "（大きなアーチはしっかり覚えてるのに、試合結果は……）"
3302-76 = "……今日のトレーニングは、ここまでにしましょうか。"
3302-77 = "あ、はい……お疲れ様でした。"
3302-78 = "レイさん、今日のナイターはどこで行われますか？"
3302-79 = "今日は月曜日なので、レギュラーシーズンの試合は無いんですけど……#nゲヘナ自治区のスタジアムで二軍のリーグ戦がありますね。"
3302-80 = "では、一緒にその試合を見に行きましょう！"
3302-81 = "え？こ、こんな急に……！？"
3302-82 = "せっかく時間があるのですから、楽しみましょう。"
3302-83 = "そうと決まれば……"
3302-91 = "ゲヘナ自治区まで走っていきましょう！"
3302-93 = "それじゃ、今日中に会場までたどり着けませんって！"
