[translation]
3302-1 = "Balançando com força total (2)"
3302-10 = "Haa, haa... catorze!"
3302-11 = "Vamos lá, falta pouco, Rei-san."
3302-12 = "É só mais essa série e terminamos!"
3302-13 = "Ugh..."
3302-18 = "...quinze!"
3302-19 = "Muito bem!"
3302-20 = "Agora, mais uma série para finalizar!"
3302-21 = "Espere um pouco! Aquela não era a última?"
3302-22 = "Não aumentou!? Aumentou, não aumentou!?"
3302-23 = "Deve ser impressão sua, é a última agora!"
3302-24 = "A dor de hoje se transformará nos músculos de amanhã..."
3302-25 = "Vamos lá, dê o seu melhor! #nCom isso, amanhã você certamente terá músculos maravilhosos!"
3302-26 = "Isso! Eu já ouvi isso antes!"
3302-27 = "E do nada, mais uma série foi adicionada..."
3302-28 = "N-não aguento mais!"
3302-29 = "Entendido. Então, vamos fazer uma pausa!"
3302-30 = "Depois de se hidratar, vamos passar para o próximo treino antes que o corpo esfrie!"
3302-40 = "Ufa..."
3302-41 = "...Sumire-senpai. Esse treino realmente vai me ajudar a rebater um home run?"
3302-42 = "Parece que estou sobrecarregando mais as pernas do que os músculos dos braços ou ombros..."
3302-43 = "Não se preocupe. #nO burpee não trabalha apenas as pernas, mas o corpo todo!"
3302-44 = "Se repetir isso, você ganhará força nos braços e ombros, além de resistência!"
3302-45 = "No caso da Rei-san, o burpee é eficiente para aumentar a resistência básica e fortalecer o corpo todo."
3302-46 = "Mas..."
3302-47 = "Eu só quero rebater um home run, meu objetivo não é ganhar resistência ou fortalecer o corpo todo..."
3302-48 = "Existem rebatedores famosos que conseguem mandar a bola longe usando apenas a força dos braços..."
3302-52 = "...Rei-san."
3302-53 = "Por que você quer rebater um home run?"
3302-54 = "É que... é legal."
3302-55 = "Pensar que você pode virar o jogo com uma única tacada..."
3302-56 = "Além disso, o tempo que você passa correndo pelas bases é só seu, não é?"
3302-57 = "Por isso, é natural que, como rebatedora, eu admire o home run."
3302-58 = "...Quando decidi entrar para o clube de beisebol, eu pensei."
3302-59 = "Que um dia eu definitivamente bateria um home run e venceria o jogo!"
3302-63 = "Quando foi a última vez que você viu um home run?"
3302-64 = "Bem... acho que foi no final da temporada passada, quando assisti com um amigo."
3302-65 = "Até hoje, não consigo esquecer aquele arco perfeito sendo engolido pela arquibancada."
3302-66 = "Com aquela tacada, o time conseguiu a virada..."
3302-67 = "...Espera, ué? #nO time acabou perdendo o jogo, não foi..."
3302-72 = "(Que estranho...)"
3302-73 = "(Deveria ter ficado tão emocionada, mas não consigo me lembrar bem da paisagem do estádio...)"
3302-74 = "(Lembro-me bem do arco enorme, mas o resultado do jogo...)"
3302-76 = "...Vamos encerrar o treino de hoje por aqui."
3302-77 = "Ah, sim... bom trabalho."
3302-78 = "Rei-san, onde será o jogo noturno de hoje?"
3302-79 = "Hoje é segunda-feira, então não tem jogo da temporada regular... #nmas tem um jogo da liga da segunda divisão no estádio do distrito de Gehenna."
3302-80 = "Então, vamos assistir a esse jogo juntas!"
3302-81 = "Hã? T-tão de repente...!?"
3302-82 = "Já que temos tempo, vamos aproveitar."
3302-83 = "Já que decidimos isso..."
3302-91 = "Vamos correr até o Distrito Autônomo de Gehenna!"
3302-93 = "Desse jeito, não vamos chegar ao local hoje!"
