[translation]
2000306-1 = "狙撃手の試練（２）"
2000306-2 = "ある建物の屋上"
2000306-3 = "今日の訓練は……筋力トレーニングです！"
2000306-4 = "じっと座って敵を狙う狙撃手に、なぜ筋力が必要なのか、ですか？"
2000306-5 = "確かに狙撃を行う時は、じっと座って待機しなければいけません。ですが、最適な狙撃のポイントを探すためには、何度も階段を上り下りしなくてはならないので。"
2000306-6 = "先生、一度私の銃を持ってみますか？"
2000306-10 = "[s] \"お、重い……。\""
2000306-13 = "はい、対物ライフルの重さは、20kgを軽く超えます。"
2000306-14 = "このような重い銃を背負って建物を上り下りするためには、強靭な筋力も必須です。"
2000306-15 = "今日はこの30階建ての建物を、階段で5分で上ることとしましょう。"
2000306-16 = "銃器は私が持ちますので、先生は弾筒だけ持ったまま付いてきていただけますか？"
2000306-17 = "[s] \"ちょ、ちょっと待って……。\""
2000306-18 = "そんな余裕はありません！"
2000306-20 = "その後、ヘトヘトになるまでマシロと訓練した。"
