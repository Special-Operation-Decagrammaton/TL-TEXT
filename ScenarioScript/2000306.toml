[translation]
2000306-1 = "O Teste do Atirador (2)"
2000306-2 = "Telhado de um prédio"
2000306-3 = "O treinamento de hoje é... treino de força!"
2000306-4 = "Você pergunta por que um atirador, que fica sentado esperando o inimigo, precisa de força muscular?"
2000306-5 = "É verdade que, ao realizar um disparo, é preciso ficar sentado e aguardar. Mas, para encontrar o ponto de disparo ideal, é necessário subir e descer escadas várias vezes."
2000306-6 = "Sensei, gostaria de tentar segurar minha arma por um momento?"
2000306-10 = "[s] \"Q-que pesado...\""
2000306-13 = "Sim, o peso de um fuzil antimaterial ultrapassa facilmente os 20kg."
2000306-14 = "Para subir e descer prédios carregando uma arma tão pesada, uma força muscular robusta é essencial."
2000306-15 = "Hoje, vamos subir este prédio de 30 andares pelas escadas em 5 minutos."
2000306-16 = "Eu carregarei a arma, então, Sensei, poderia me acompanhar carregando apenas o carregador?"
2000306-17 = "[s] \"E-espere um pouco...\""
2000306-18 = "Não temos tempo para isso!"
2000306-20 = "Depois disso, treinei com Mashiro até ficar exausto."
