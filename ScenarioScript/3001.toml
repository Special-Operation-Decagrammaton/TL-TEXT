[translation]
3001-1 = "Resquícios de Enlatados (1)"
3001-4 = "Escritório da empresa de segurança 'Blackstone'"
3001-9 = "Hehe... Tudo está saindo conforme o planejado."
3001-10 = "Fazer os delinquentes da cidade atacarem pequenas escolas e, na hora certa, oferecer um contrato de segurança..."
3001-11 = "Tentei imitar as táticas antigas da Kaiser PMC, mas está sendo mais eficaz do que eu pensava."
3001-12 = "Se eu continuar expandindo os negócios nesse ritmo, será questão de tempo até me tornar uma empresa militar maior que a Kaiser—"
3001-19 = "Chefe... digo, Presidente! Estamos sendo atacados!"
3001-20 = "O quê? Quem são eles!?"
3001-21 = "Será que é a Valkyrie...? #nMesmo depois de subornar o Gabinete de Defesa do Conselho Estudantil Federal...!"
3001-23 = "N-não é a polícia. Parece que são... agentes especiais da SRT!"
3001-24 = "SRT!? A Academia SRT não tinha sido fechada pelo Conselho Estudantil Federal!?"
3001-25 = "Como eles descobriram nossa existência..."
3001-26 = "Grrr... Você tem ideia de quanto eu investi neste negócio?"
3001-27 = "Não posso recuar agora!"
3001-34 = "Aqui é a SRT! Todos com as mãos para o alto!"
3001-35 = "Aqui é RABBIT 1. Horário atual, 1330. Chegamos ao Ponto W."
3001-36 = "...Houve um pouco de resistência perto da saída, mas já neutralizamos. Continuaremos com a operação."
3001-38 = "Esses malditos... como se atrevem...!"
3001-40 = "Você é o representante desta empresa de segurança?"
3001-41 = "Graças a um relatório que obtivemos 'por acaso' da Academia de Polícia Valkyrie, garantimos provas de que vocês estão por trás dos recentes ataques às pequenas escolas."
3001-42 = "...A Academia de Polícia Valkyrie encontrou as evidências, mas como o Gabinete de Defesa não aprovou, eles perderam várias chances de realizar a prisão."
3001-43 = "Mas esse tipo de truque não funciona com os agentes da SRT!"
3001-45 = "Grrr... Quem diria que seríamos pegos por algo tão inesperado..."
3001-46 = "Mas não pensem que pirralhas como vocês vão tomar minha empresa!"
3001-47 = "Eu também fui o chefe de uma PMC que vivia de mercenários. #nTenho bastante confiança no combate corpo a corpo!"
3001-53 = "Vamos, venham para cima!"
3001-60 = "N-não pode ser, um tiro de sniper a essa distância..."
3001-66 = "...Aqui é RABBIT 4. Confirmo o impacto no alvo."
3001-67 = "Indo para o próximo alvo..."
3001-69 = "Ugh, o chefe foi derrotado..."
3001-70 = "Já que as provas foram descobertas, não tenho obrigação nenhuma de lutar até o fim contra agentes da SRT..."
3001-71 = "F-fujam!"
3001-72 = "Não vão escapar!"
3001-83 = "Setor A limpo. Parece que não restam inimigos no local."
3001-84 = "...Setor B também limpo. Exceto pelos que fugiram, todos foram neutralizados..."
3001-85 = "Pessoal, bom trabalho."
3001-86 = "Vamos prender os inimigos neutralizados e deixar o processamento pós-operação com o pessoal da Academia de Polícia Valkyrie."
3001-87 = "Bem, vamos retornar ao acampamento..."
3001-89 = "Aliás, isso aqui é uma base da PMC, né? Não tem nenhum suprimento útil por aqui?"
3001-90 = "Já que vai ser descartado de qualquer jeito, não podemos levar um pouco conosco?"
3001-91 = "Infelizmente, a maioria das armas aqui são de pequeno porte e, além disso, são equipamentos e munições incompatíveis com o que usamos..."
3001-92 = "Teremos que descartar ou deixar para a Valkyrie cuidar disso."
3001-94 = "Não que eu esteja atrás de recompensa, mas é um pouco decepcionante não ter nenhum espólio de guerra..."
3001-95 = "Ué? Miyako-chan, Saki-chan... e esta caixa?"
3001-96 = "Parece estar escrito 'Alimentos'..."
3001-102 = "Isto é... ração de combate."
3001-103 = "A data de validade ainda está bem longe."
3001-104 = "Hehe, quem diria que conseguiríamos comida em um lugar desses."
3001-105 = "O que, o que? É comida?"
3001-107 = "Rações de combate são alimentos preservados que passaram por um processamento especial para aumentar a durabilidade e a portabilidade..."
3001-108 = "É o alimento mais adequado para nós que estamos vivendo acampadas ao ar livre."
3001-109 = "E com essa quantidade toda... talvez eu não precise me preocupar com comida por um bom tempo."
3001-111 = "……Mas o cardápio é meio duvidoso."
3001-112 = "“Omelete de vegetais com queijo cheddar”, “aveia”, “arroz vermelho seco para regiões frias”……"
3001-117 = "Eca, tem até uma lata de molho de frutos do mar misturado. O sabor disso deve ser terrível……."
3001-118 = "……Rações de combate não são feitas para ter um bom sabor, não é?"
3001-119 = "Dizer que ração de combate é ruim é coisa do passado, hoje em dia não é bem assim."
3001-120 = "Uma refeição saborosa está diretamente ligada ao moral dos soldados. A menos que seja algo especial feito propositalmente para ser difícil de comer em situações extremas, quase nunca se faz algo ruim de propósito."
3001-121 = "É verdade que antigamente, devido às limitações da tecnologia de conservação, só era possível fazer rações duras e sem sabor, mas graças ao avanço tecnológico recente, agora é possível comer refeições úmidas e ricas em sabor mesmo em acampamentos sem fogo."
3001-122 = "Além disso, foram desenvolvidas carnes de tofu para vegetarianos e menus especiais para soldados com alergias, permitindo que cada um desfrute de várias rações de combate de acordo com suas preferências."
3001-124 = "A-ah, é mesmo……."
3001-125 = "Saki, você entende muito disso……"
3001-126 = "Mas só lendo o manual, não dá para saber o gosto, né……?"
3001-127 = "É verdade. No treinamento da SRT, eu só comi ração de combate umas duas vezes, sabe?"
3001-129 = "I-isso é, bem……"
3001-130 = "Ouvi dizer que rações de combate são o alimento principal das forças especiais e fiquei curiosa sobre o sabor……"
3001-131 = "Antes mesmo de entrar na Academia SRT, eu já comprava várias por conta própria para experimentar……"
3001-132 = "Ora, ora, você sempre fala de manuais, então achei que fosse super séria. No fim, a gente tem mais em comum do que parece, não tem?"
3001-133 = "Por que não admite logo, Saki? Você também entrou na SRT porque queria ter contato com vários equipamentos militares, não foi?"
3001-134 = "Como duas nerds, vamos conversar abertamente sobre isso. Kuhihi……"
3001-135 = "C-cala a boca! Eu não sou igual a você, Moe!"
3001-137 = "De qualquer forma, foi bom termos conseguido esses espólios."
3001-138 = "Vamos, levem as rações de combate de volta."
3001-140 = "（……Naquela noite）"
3001-147 = "……Hora atual, 0500. Em serviço de guarda, sem anormalidades……."
3001-151 = "Hoje o luar está fraco e quase não se ouve nenhum som……."
3001-152 = "Fazer guarda em dias assim é assustador, eu odeio……."
3001-153 = "Mas, quando o turno de hoje acabar, vou poder comer aquelas latas deliciosas…… só mais um pouco de esforço."
3001-154 = "Como a Saki disse…… fico feliz só de pensar que uma refeição gostosa me espera depois disso……."
3001-159 = "Esse barulho…… será que é um ladrão……?"
3001-160 = "Não pode ser, será que querem roubar a comida……?"
3001-166 = "P-pare aí! Se se mover, eu atiro!"
3001-170 = "Ué? Não tem ninguém……"
3001-175 = "Será que confundi com algum animal selvagem……"
3001-183 = "Clac……"
3001-184 = "Hã? Aquela lata de agora há pouco……"
3001-189 = "……Se moveu?"
3001-194 = "Não, não pode ser……"
3001-201 = "……Clac, clac, clac, clac!"
3001-202 = "…………！！？！＃％＄！"
