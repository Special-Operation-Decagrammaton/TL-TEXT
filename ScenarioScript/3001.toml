[translation]
3001-1 = "缶詰の残影（１）"
3001-4 = "セキュリティー業者「ブラックストーン」事務所"
3001-9 = "クク…… 計画通り進んでいるな。"
3001-10 = "街のスケバンに小さな学園を襲わせ、頃合いを見計らってセキュリティサービスを契約させる……"
3001-11 = "カイザーPMCの古い手法を真似てみたが、思ったより効果があるじゃないか。"
3001-12 = "この調子で事業を拡大していけば、カイザーを超える巨大な軍需企業になるのも時間の問題――"
3001-19 = "ボス……いえ、社長！襲撃です！"
3001-20 = "なんだと？どこのどいつだ！？"
3001-21 = "まさか、ヴァルキューレが……？#n連邦生徒会の防衛室には、賄賂を入れてやったというのに……！"
3001-23 = "け、警察ではありません。その……SRTの特殊隊員のようです！"
3001-24 = "SRT！？SRT特殊学園は、連邦生徒会の手で閉鎖されたんじゃなかったのか！？"
3001-25 = "何故我々の存在に……"
3001-26 = "ぐうっ……この事業にいくらかけたと思っているんだ。"
3001-27 = "このまま退くわけにはいかぬのだ！"
3001-34 = "SRTだ！全員手をあげろ！"
3001-35 = "こちらRABBIT1。現在時刻は1330、ポイン[ruby=ウィスキー]トWに[/ruby]到着。"
3001-36 = "……出口付近で多少抵抗はありましたが、鎮圧しました。作戦を続行します。"
3001-38 = "こいつら……よくも……！"
3001-40 = "あなたがこのセキュリティ会社の代表ですか？"
3001-41 = "先日、ヴァルキューレ警備局より「偶然」入手した報告書より、近日起きた小さな学園の襲撃事件――その背後に、皆さんがいたという証拠を確保しました。"
3001-42 = "……ヴァルキューレ警備局は証拠を見つけたにもかかわらず、防衛室の承認が降りなかったため、何度も逮捕の機会を逃してきたそうです。"
3001-43 = "しかしそのような手法、私たちSRTの隊員には通用しません！"
3001-45 = "ぐうっ……予想外のところから尻尾を掴まれるとはな……"
3001-46 = "だが、お前たちみたいなガキどもに俺の会社を奪われてたまるか！"
3001-47 = "俺だって以前は傭兵を生業にしてきたPMCの長。#n近接戦にはそれなりに自信がある！"
3001-53 = "さあ、かかってこい！"
3001-60 = "そ、そんな、この距離で狙撃が……"
3001-66 = "……こちらRABBIT4。目標への着弾を確認。"
3001-67 = "次の目標を……"
3001-69 = "うっ、ボスがやられた……"
3001-70 = "もう証拠を掴まれちまってる以上、SRTの特殊隊員たちと最後まで戦う義理なんてねぇし……"
3001-71 = "に、逃げろ！"
3001-72 = "させるか！"
3001-83 = "Aサイトクリア。室内に敵は残っていない模様。"
3001-84 = "……Bサイトもクリア。逃亡した敵を除いて、全員制圧……。"
3001-85 = "皆さん、お疲れ様でした。"
3001-86 = "無力化した敵は捕縛し、事後対応はヴァルキューレ警察学校の皆さんにお願いしましょう。"
3001-87 = "では、私たちはキャンプに復帰を……。"
3001-89 = "ところでここ、PMCの基地だよね？何か使えそうな物資とかないの～？"
3001-90 = "どうせ処分されるなら、私たちが少しくらい持って帰ってもいいんじゃない？"
3001-91 = "残念ですが、ここの武器はほとんどが小火器な上、私たちが所持している武器とは互換性のない装備と弾薬ばかりで……"
3001-92 = "このまま破棄するか、後はヴァルキューレに任せるしかないですね。"
3001-94 = "別に報酬目当てなわけじゃないが、戦利品が1つもないのは少し残念だな……。"
3001-95 = "あれ？ミヤコちゃん、サキちゃん……この箱は？"
3001-96 = "「食品」って書いてあるような……"
3001-102 = "これは……戦闘糧食ですね。"
3001-103 = "賞味期限もまだ十分余裕がある。"
3001-104 = "ふふ、こんなところで食糧が手に入るとはな。"
3001-105 = "なになに～？食べもの？"
3001-107 = "戦闘食糧は、保存性と携帯性を高めるために特殊処理が施された保存食……。"
3001-108 = "キャンプでの野営生活を続けている私たちに、最も適した食糧です。"
3001-109 = "それにこれだけ量があるなら……しばらくはご飯の心配しなくて済むかも。"
3001-111 = "……しかし、メニューが微妙だな。"
3001-112 = "「チェダーチーズ入り野菜オムレツ」、「オートミール」、「寒冷地用乾燥赤飯」……"
3001-117 = "げっ、海鮮混ぜソースの缶まである。これはちょっと味がヤバい……。"
3001-118 = "……戦闘食糧は、味を求めないものでは？"
3001-119 = "戦闘食糧がまずいというのは昔の話で、最近はそうでもないんだ。"
3001-120 = "美味しい食事は兵士たちの士気に直結するからな。極限状態に備えてわざわざ食べにくくした特殊なものでない限り、意図的にまずく作るケースはほぼない。"
3001-121 = "昔は保存技術に限界があって、固くて味の乏しい戦闘食糧しか作れなかったのも事実だが、最近は技術の発展のおかげで、火のない野営地でもしっとりした味わい豊かな食事が食べられるようになったんだ。"
3001-122 = "更にベジタリアンのための豆腐肉や、アレルギー持ちの兵士を配慮した特別メニューも開発されて、個々人の好みに合わせて様々な戦闘食糧を楽しめるようになっている。"
3001-124 = "そ、そうなんですね……。"
3001-125 = "サキちゃん、詳しい……"
3001-126 = "でも教範だけじゃ、味までは分からないんじゃ……？"
3001-127 = "そうだね。SRTの訓練で実際に戦闘食糧を食べたのって2回ぐらいしかなかったし？"
3001-129 = "そ、それは、その……"
3001-130 = "戦闘食糧が特殊部隊の主食という話を聞いて、どんな味か気になって……"
3001-131 = "SRT学園に入学する前から、個人でいろいろと買って食べてたから……"
3001-132 = "な～んだ、いつも教範、教範って言うから生真面目なんだとばかり思ってた。私たち案外、似てるところがあるじゃん？"
3001-133 = "そろそろ正直になったらどう、サキ？あんただって本当は、いろんな軍事装備に触れたくてSRTに入学したんでしょ？"
3001-134 = "同じオタク同士、ここは素直に、じっくり話そうよ。くひひ……"
3001-135 = "う、うるさい！私はモエとは違う！"
3001-137 = "なにはともあれ、戦利品が手に入ってよかったです。"
3001-138 = "さあ、皆で戦闘食糧を持って帰りましょう。"
3001-140 = "（……その日の夜）"
3001-147 = "……現在の時刻は0500。警戒勤務中、異常なし……。"
3001-151 = "今日は月明かりが少なくて、音もほとんど聞こえてこない……。"
3001-152 = "こんな日の警戒勤務は、怖くて嫌……。"
3001-153 = "でも、今日の警戒が終われば、美味しい缶詰が食べられる……あと少し頑張ろう。"
3001-154 = "サキちゃんの言った通り……この後美味しいご飯が待ってると思うと嬉しいな……。"
3001-159 = "この音は……もしかして、泥棒……？"
3001-160 = "まさか、食糧を盗もうと……？"
3001-166 = "と、止まってください！動いたら撃ちますよ！"
3001-170 = "あれ？誰もいない……"
3001-175 = "野生動物と見間違えたのかな……"
3001-183 = "カタン……"
3001-184 = "えっ、さっき、あの缶詰……"
3001-189 = "……動いた？"
3001-194 = "いや、そんなわけ……"
3001-201 = "……カタン、カタン、カタン、カタン！"
3001-202 = "…………！！？！＃％＄！"
