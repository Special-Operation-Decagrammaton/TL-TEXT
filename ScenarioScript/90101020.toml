[translation]
90101020-1 = "Episode 2: Crab-Flavored Fish Sausage"
90101020-2 = "Underground Schale, FOX Platoon Operations HQ"
90101020-7 = "FOX2 and FOX3, returning to base."
90101020-8 = "We're home~"
90101020-13 = "Oh, welcome back."
90101020-14 = "You're pretty late. What happened?"
90101020-15 = "Did something go wrong at the Valkyrie archives?"
90101020-16 = "Hmm, the infiltration itself was fine."
90101020-17 = "We had the Security Bureau badges and student IDs all ready."
90101020-18 = "But on the way back, we got cornered by a student who looked like she was from the Public Safety Bureau."
90101020-19 = "She said she'd never seen our faces in the Security Bureau before. Seriously, she was way too sharp."
90101020-20 = "Wait... did she actually figure it out?"
90101020-21 = "Nope. Niko managed to distract her by talking about donuts, but..."
90101020-22 = "While we were playing along, we ended up having to go buy limited-edition donuts with her..."
90101020-23 = "That's why we were late getting back to HQ. Sorry."
90101020-24 = "Don't apologize for that. Good work."
90101020-25 = "Wait, where's Yukino?"
90101020-26 = "She's with the General Student Council President. She hasn't returned yet."
90101020-27 = "She said she'd grab dinner while she's out, too."
90101020-28 = "In that case, Otogi, haven't you had dinner yet?"
90101020-29 = "You must be hungry, I'll get something ready for you."
90101020-30 = "Ah, it's fine. I already ate."
90101020-31 = "Is that—"
90101020-32 = "Isn't that a 'Crab-Flavored Fish Sausage' from 'Hamidashi Foods'? You really do love those, don't you?"
90101020-33 = "It's not so much that I love them, they're just convenient."
90101020-34 = "They're surprisingly filling and have a long shelf life."
90101020-35 = "Plus, they're easy to eat. As a sniper, I have to keep my presence hidden even while eating, so it's honestly a lifesaver."
90101020-36 = "Well, I suppose that makes sense... in a way?"
90101020-37 = "Just because it's convenient doesn't mean that's all you should eat. You're still growing, you need a proper meal."
90101020-38 = "I'll fix you something, just wait a bit."
90101020-39 = "Okay."
90101020-40 = "Hey, aren't those actually pretty expensive? I mean, they have crab in them, right?"
90101020-41 = "You aren't skimping on ammo money just to buy snacks, are you...?"
90101020-42 = "They aren't that expensive. They don't even cost 100 yen each."
90101020-43 = "What? Even cheap canned crab costs at least 1000 yen... Let me see that."
90101020-47 = "Oh."
90101020-48 = "This is just crab-flavored."
90101020-49 = "...Huh?"
90101020-50 = "Look at the ingredients list. There's almost no crab in here."
90101020-51 = "They just use crab extract to make it taste like it."
90101020-52 = "What... no way... there's no... crab...?"
90101020-53 = "My life is over..."
90101020-54 = "You should have been suspicious the moment you saw the price..."
90101020-55 = "Usually, there's a reason why things are cheap."
90101020-56 = "Oh, speaking of crab..."
90101020-57 = "I heard RABBIT Platoon solved an incident at a fishing village. They got a bunch of high-quality shrimp as a thank you—"
90101020-58 = "Wait. What do you mean by that?"
90101020-59 = "Uh... back when we were at the Correction Bureau... there was a time when the shrimp supply in D.U. was cut off—"
90101020-60 = "I'm not talking about the shrimp!"
90101020-61 = "Have you been secretly in contact with them?"
90101020-62 = "That's not fair, you're the only one!"
90101020-63 = "I-I was just writing back to the letters I received, and it turned into a pen-pal thing..."
90101020-64 = "You know, we couldn't use smartphones at the Correction Bureau, right? So Miyako would send me letters every now and then."
90101020-65 = "...Ah, I see."
90101020-66 = "Writing letters in this day and age, Miyako is so earnest."
90101020-67 = "I think being straightforward no matter the situation is one of Miyako's good points."
90101020-68 = "Though it can be a flaw if she takes it too far."
90101020-73 = "...Yeah, I guess you're right. It's both a strength and a weakness."
90101020-74 = "Still... shrimp sounds so good~"
90101020-75 = "Do you think the same thing would happen if we found some crab? If we just quickly solved an incident—"
90101020-76 = "Stop it. That's in poor taste."
90101020-77 = "Just kidding, just kidding. Don't give me that scary look."
90101020-78 = "But all that aside... I really want to eat some crab. Not imitation crab, not crab-flavored fish sausage, but real crab."
90101020-86 = "Oh, welcome back."
90101020-87 = "It's a crab."
90101020-91 = "...Huh?"
90101020-95 = "From here on out, we're going to war with a crab."
90101020-97 = "Next Episode: Crabs and Oil Drums"