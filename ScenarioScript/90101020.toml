[translation]#[Texto Final. - Filipe 05/07.]
90101020-1 = "Episódio 2; Salsicha de Peixe Sabor Caranguejo"
90101020-2 = "Subsolo da Schale - QG de operações do Esquadrão FOX"
90101020-7 = "FOX2 e FOX3, de volta à base."
90101020-8 = "Chegamos~"
90101020-13 = "Ooh, bom trabalho."
90101020-14 = "Demoraram, hein. Que houve?"
90101020-15 = "Deu algo errado no arquivo de registros da Valkyrie?"
90101020-16 = "Hmm, a infiltração em si foi tranquila."
90101020-17 = "Tanto o crachá do Departamento de Segurança quanto a caderneta estudantil estavam perfeitos."
90101020-18 = "Mas, na volta, uma aluna com cara de ser do Departamento de Segurança Comunitária veio pra cima."
90101020-19 = "\"Nunca vi você na Segurança\", disse. Olho clínico é pouco pra isso."
90101020-20 = "Quê…… vocês foram descobertas?"
90101020-21 = "Não. A Niko desviou o assunto pra donuts e deu certo…… só que……"
90101020-22 = "no meio do papo, acabamos tendo que ir juntas comprar os donuts de edição limitada……"
90101020-23 = "Por isso o atraso na volta ao QG. Desculpem."
90101020-24 = "Não é nada pra se desculpar. Bom trabalho."
90101020-25 = "Ué, e a Yukino?"
90101020-26 = "Foi falar com a Presidente do Conselho.#nAinda não voltou."
90101020-27 = "Disse que já resolvia o jantar por lá."
90101020-28 = "Então a Otogi ainda não jantou, né?"
90101020-29 = "Deve estar com fome. Já vou preparar algo."
90101020-30 = "Ahh, deixa. Já comi."
90101020-31 = "Isso é――"
90101020-32 = "a \"salsicha de peixe sabor caranguejo\" da \"Hamidashi Foods\", né.#nVocê ama isso, hein."
90101020-33 = "Mais que amar, é que é prático."
90101020-34 = "Enche a barriga mais do que parece e dura bastante."
90101020-35 = "E ainda é fácil de comer♪#nSniper precisa apagar a própria presença até na refeição, então me quebra um galhão."
90101020-36 = "Bom, faz sentido…… eu acho……?"
90101020-37 = "Praticidade não é tudo, viu? Você tá em fase de crescimento, tem que comer direito."
90101020-38 = "Vou preparar; espera um pouquinho."
90101020-39 = "Tá bem~"
90101020-40 = "Ei, mas esse negócio não é meio caro?#nTem caranguejo dentro, né?"
90101020-41 = "Você não anda economizando na munição pra gastar com lanche…… né?"
90101020-42 = "Nem é caro. Não custa nem 100 ienes a unidade."
90101020-43 = "Hã? Se até a lata de caranguejo mais barata custa 1000 ienes……?#nDeixa eu ver isso."
90101020-47 = "Ah."
90101020-48 = "Isso aqui é SABOR de caranguejo."
90101020-49 = "……Quê?"
90101020-50 = "Olha a lista de ingredientes. Quase não tem caranguejo."
90101020-51 = "É só extrato de caranguejo pra dar uma enganada."
90101020-52 = "Quê…… não…… não tem…… caranguejo……?"
90101020-53 = "Acabou tudo pra mim……"
90101020-54 = "O preço já devia ter te deixado desconfiada……"
90101020-55 = "Tudo que é barato tem seu motivo."
90101020-56 = "Ah, falando em caranguejo……"
90101020-57 = "Parece que o Esquadrão RABBIT resolveu um caso numa vila de pescadores.#nDe agradecimento, ganhou um monte de camarão de primeira――"
90101020-58 = "Peraí. Como assim?"
90101020-59 = "É que…… na época em que estávamos na Agência Correcional……#no fornecimento de camarão de D.U. chegou a ser interrompido e――"
90101020-60 = "Não é do camarão que eu tô falando!"
90101020-61 = "Você tava trocando mensagem escondida?"
90101020-62 = "Que injustiça! Só você!"
90101020-63 = "É, é que…… eu respondi a carta que recebi, e aí virou correspondência……"
90101020-64 = "Vocês sabem, celular é proibido na Agência Correcional.#nEntão a Miyako mandava cartas de vez em quando."
90101020-65 = "……Ahh, então era isso."
90101020-66 = "Carta, nos dias de hoje…… a Miyako é certinha até nisso."
90101020-67 = "Ser direta e correta em qualquer situação é o ponto forte da Miyako."
90101020-68 = "Quando passa do ponto, vira defeito."
90101020-73 = "……Pois é. É qualidade e defeito ao mesmo tempo."
90101020-74 = "Mas que inveja…… camarão~"
90101020-75 = "Será que não rola o mesmo com caranguejo?#nSe a gente resolvesse um caso rapidinho――"
90101020-76 = "Para com isso. Que mórbido."
90101020-77 = "Brincadeeeira. Não faz essa cara assustadora."
90101020-78 = "Mas, tirando a piada…… eu queria comer caranguejo.#nNão kani kama, não salsicha sabor caranguejo: caranguejo DE VERDADE."
90101020-86 = "Ah, bem-vinda de volta."
90101020-87 = "Caranguejo."
90101020-91 = "……Hã?"
90101020-95 = "A partir de agora, vamos à guerra contra um caranguejo."
90101020-97 = "Próximo Episódio;O Caranguejo e o Tambor"
