[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
90101020-1 = "Episódio 2: Salsicha de Peixe Sabor Caranguejo"
90101020-2 = "Subterrâneo da Schale, QG de Operações do Esquadrão FOX"
90101020-7 = "FOX 2 e FOX 3, de volta à base."
90101020-8 = "Chegamos~"
90101020-13 = "Opa, bem-vindas de volta."
90101020-14 = "Demoraram bastante, hein. Rolou alguma coisa?"
90101020-15 = "Deu algum B.O nos arquivos da Valkyrie?"
90101020-16 = "Hmm, a infiltração em si foi de boa, mas..."
90101020-17 = "A gente preparou direitinho os distintivos da Secretaria de Segurança e as carteirinhas de estudante e tal."
90101020-18 = "O problema é que, na saída, uma garota com cara de ser da Secretaria de Segurança Pública grudou na gente."
90101020-19 = "Ela mandou um \"nunca vi essas caras na Secretaria\". Sério, a garota tem olho de águia."
90101020-20 = "Eita... não me diga que descobriram vocês?"
90101020-21 = "Não. A Niko conseguiu contornar a situação mudando de assunto pra falar de rosquinhas... só que..."
90101020-22 = "De tanto dar corda, a gente acabou tendo que ir junto com ela comprar umas rosquinhas de edição limitada..."
90101020-23 = "Foi por isso que demoramos pra voltar pro QG, desculpa."
90101020-24 = "Imagina, não precisa se desculpar por isso. Bom trabalho."
90101020-25 = "Ué, cadê a Yukino?"
90101020-26 = "Tá com a Presidente do Conselho Estudantil Geral. Ainda não voltou."
90101020-27 = "Disse que já ia aproveitar pra jantar por lá mesmo."
90101020-28 = "E você, Otogi, já jantou?"
90101020-29 = "Deve tá morrendo de fome, vou preparar alguma coisa pra você num instante."
90101020-30 = "Ah, relaxa. Já comi."
90101020-31 = "Isso aí na sua mão é..."
90101020-32 = "Aquela \"Salsicha de peixe sabor caranguejo\" da \"Hamidashi Foods\"? Sério, você não enjoa disso, não?"
90101020-33 = "Não é nem questão de gostar, é que quebra um galho."
90101020-34 = "Dá uma baita saciada e dura bastante tempo."
90101020-35 = "Sem falar que é super prático pra comer♪ Como francos-atiradores têm que ocultar a presença até na hora das refeições, isso aqui salva a pátria."
90101020-36 = "Bom, faz sentido... Eu acho...?"
90101020-37 = "Pode até quebrar um galho, mas viver só disso não dá. A gente tá em fase de crescimento, tem que comer direito."
90101020-38 = "Vou arranjar alguma coisa pra você, guenta aí."
90101020-39 = "Tá boooom."
90101020-40 = "Ei, mas essa salsicha não é meio cara, não? Tem caranguejo nela, né?"
90101020-41 = "Você não tá economizando na munição pra torrar com lanchinho, tá...?"
90101020-42 = "Nem é tão cara assim. Não custa nem [ruby=uns R$2,50 reais...]100 ienes[/ruby] a unidade."
90101020-43 = "Ué? Até aquelas latas de caranguejo mais baratinhas custam uns [ruby=R$30 reais...]1000 ienes...[/ruby] Deixa eu dar uma olhada nisso."
90101020-47 = "Ah."
90101020-48 = "Tá escrito aqui, \"sabor artificial de caranguejo\"."
90101020-49 = "...Quê?"
90101020-50 = "Olha a lista de ingredientes. Tem quase nada de caranguejo aqui."
90101020-51 = "Eles só enfiaram extrato de caranguejo pra enganar trouxa."
90101020-52 = "Quê...? Como assim... não é caranguejo de verdade...?"
90101020-53 = "Minha vida é uma mentira..."
90101020-54 = "Era pra você ter desconfiado pelo preço, né..."
90101020-55 = "O barato costuma sair caro por um motivo."
90101020-56 = "Ah, falando em caranguejo..."
90101020-57 = "Fiquei sabendo que o Esquadrão RABBIT resolveu um caso numa vila de pescadores. Aí, de recompensa, ganharam um monte de camarão de primeira"
90101020-58 = "Ei, pera aí. Como é que é a história?"
90101020-59 = "É que... na época em que a gente tava lá no Departamento de Correção... Rolou um boato de que o estoque de camarão do [ruby=Distrito de Utnapishtim]D.U.[/ruby] tinha acabado"
90101020-60 = "Não tô falando do camarão!"
90101020-61 = "Você tava trocando ideia com elas escondida?!"
90101020-62 = "Sacanagem, só você?! Que inveja!"
90101020-63 = "E-Eu só tava respondendo às cartinhas que recebi, aí acabou virando costume..."
90101020-64 = "É que não dava pra usar o celular lá na detenção, lembra? Aí a Miyako me mandava umas cartas de vez em quando."
90101020-65 = "...Ah, entendi."
90101020-66 = "Trocar cartas em pleno século 21, a Miyako continua super certinha mesmo."
90101020-67 = "Acho que essa honestidade toda é a melhor qualidade dela."
90101020-68 = "Mas tudo em excesso faz mal, né?"
90101020-73 = "...Pois é. É uma faca de dois gumes."
90101020-74 = "Mas voltando ao assunto... camarão é bom demais, né~"
90101020-75 = "Será que não rola a mesma coisa com caranguejo? Se a gente fosse lá e resolvesse o problema num estalo"
90101020-76 = "Vira essa boca pra lá. Não brinca com isso."
90101020-77 = "Tô de zoeira, tô de zoeira. Não faz essa cara assustadora."
90101020-78 = "Mas brincadeiras à parte... queria tanto comer caranguejo. Não quero saber de kani, muito menos de salsicha com sabor artificial... Quero um caranguejo de verdade."
90101020-86 = "Ah, bem-vinda de volta."
90101020-87 = "É caranguejo."
90101020-91 = "...Oi?"
90101020-95 = "Preparem-se. Nós vamos lutar contra um caranguejo agora mesmo."
90101020-97 = "Próximo Episódio: O Caranguejo e o Tambor de Aço"