[translation]
10017030-1 = "第３話;ナイトメア・イン・クリスマス"
10017030-2 = "キヴォトス市内"
10017030-7 = "メリークリスマスです！#n募金をお願いしてまーす！"
10017030-12 = "どうかよろしくお願いしまーす！"
10017030-14 = "おお、救護騎士団の。今年もそんな季節か。"
10017030-15 = "ちょっと待ってな……はい、少ないけどよろしくな。"
10017030-20 = "ありがとうございます！#nちょっとしたお礼ですが、どうぞ！"
10017030-24 = "私たちが編んだ、帽子と手袋です！"
10017030-29 = "お、そうなのかい？#nそれはすごく良いプレゼントだな。"
10017030-30 = "ああ、じゃあまだ額が足りないな。"
10017030-32 = "いえいえ、そういうわけには……！"
10017030-33 = "お気持ちだけでも嬉しいです、ありがとうございます！#nメリークリスマス！"
10017030-37 = "[ns] \"……信頼されてるんだね。\""
10017030-38 = "ど、どうでしょう……？#n私たちはただ救護騎士団として、普通のことをと言いますか……"
10017030-39 = "はい！#n結果としてみなさんが喜んでくださると、すごく嬉しいです！"
10017030-40 = "[s] \"これがクリスマスの輝き……。\""
10017030-41 = "せ、先生？大丈夫ですか……？"
10017030-42 = "泣かないでください！はい、ハンカチです！"
10017030-44 = "何だかその、微笑ましいところに悪いんだが……"
10017030-50 = "あっ、どこか不良っぽい方々です、先輩！"
10017030-51 = "は、ハナエちゃん、先入観で人を判断しないように……。"
10017030-52 = "えっと、どこか怪我をされたりしましたか？"
10017030-53 = "手当てが必要でしたら、私たち救護騎士団にお任せください！"
10017030-55 = "いや、怪我は……そういやしてたわ。"
10017030-56 = "それもそうだけど、今は愚痴を聞いてほしくてよ。"
10017030-57 = "ほら、クリスマスだし……何かこう、辛い気持ちでいたくねぇなって思ってさ？"
10017030-58 = "えーっと……"
10017030-59 = "[s] \"とりあえず、聞いてみたら？\""
10017030-60 = "はい、そうですよね！"
10017030-62 = "そ、そんな……。"
10017030-63 = "正義実現委員会の方々が……？"
10017030-67 = "本当なんだ！私たちはただ、おとなしくしてただけなのに！"
10017030-68 = "クリスマスってことで、チキンを食べようと準備してただけで……"
10017030-69 = "ああ、特別なチキンを用意してたんだが……！"
10017030-70 = "[s1] \"特別なチキン……？\"\n[s2] （正義実現委員会の生徒たちが、何の理由もなくチキンを奪った……？）"
10017030-73 = "どうせ準備するなら、普段とは違ったものが良いと思ったんだ！"
10017030-74 = "ああ、そうなんだよ！"
10017030-75 = "なのにいきなり私たちを殴り倒して、#nチキンを全部持って行ったんだ！"
10017030-76 = "クリスマスにはチキンなのに、何がダメだったんだ？#nターキーじゃないとダメってか？"
10017030-77 = "頑張ってお金を貯めて、ようやく用意したチキンなのに……"
10017030-78 = "ちょっとした仕込みをしただけで#nあんなことを……！"
10017030-79 = "[s3] \"……仕込み？\"\n[s4] \"具体的には、どういう……？\""
10017030-82 = "そ、それはちょっと説明するには複雑というか……"
10017030-83 = "じゅ、重要なのは私たちの心が踏みにじられたことだろ！？"
10017030-84 = "そうだ、せっかくのクリスマスなのに！#n私たちの善意をあんな風に……!"
10017030-85 = "正義実現委員会の奴ら、血も涙も無いのか！？#nあんたらの血は何色だ！"
10017030-87 = "そ、それは本当ならひどいお話です……#nサンタさんも悲しむはず……。"
10017030-88 = "そうですね、善意は踏みにじられるべきではありません。"
10017030-89 = "聞く限り、それは良くない行いだと思います。"
10017030-90 = "[s5] \"何か、引っ掛かるような……。\" \n[s6] \"うぅーん……。\""
10017030-93 = "どうしたんですか、先生！#n今の可哀想だと思いませんか！？"
10017030-94 = "先入観を持って判断してはいけないと、先生が教えてくれたんですよ！#nサンタさんに怒られちゃいますよ！？"
10017030-95 = "[s] \"ご、ごめんなさい……。\""
10017030-96 = "とにかく、こちらの手袋と帽子をどうぞ。今日も寒いのに……"
10017030-102 = "うぅ、ありがとう……#n消えちまったチキンはどうしようもないとはいえ……"
10017030-103 = "ところで……#n救護騎士団長は今日いないのか？"
10017030-105 = "団長は多分、そろそろ来るかと！"
10017030-106 = "トリニティをぐるっと回ってからとのことで、後で合流するんです。"
10017030-107 = "ところで、どうして突然ミネ団長のことを？"
10017030-111 = "いや、まあ何となくな……"
10017030-112 = "とにかく、話を聞いてくれてありがとよ……#nチキンはもう無いけど……。"
10017030-114 = "わ、私たちに何か、手伝えることはありませんか……？"
10017030-115 = "何でも大丈夫ですので……！"
10017030-120 = "ただ、覚えててくれたらそれで良いさ。"
10017030-121 = "チキンも奪われて、クリスマスを寂しく過ごしたやつらがいたってことをよ……。"
10017030-130 = "行っちゃいましたね……。"
10017030-131 = "追いかけるべきでしょうか？"
10017030-132 = "[s7] \"追いかけても、特に好転はしなさそうな……。\"\n[s8] \"うーん、まあ追いかけてほしそうではなかったし……。\""
10017030-135 = "そうですよね……でも……。"
10017030-136 = "何だか心が痛いです……。"
10017030-137 = "……先生？何か考え事ですか？"
10017030-138 = "[s] \"正義実現委員会が、どうしてあんなことをしたんだろう……って。\""
10017030-139 = "そうですね、いつも良い方々なのに……"
10017030-140 = "まあ時々、すごいことをしますけどね！"
10017030-141 = "そ、それは確かに……正義実現委員会が出動したと連絡が来ると、私たちも色々と準備をするくらいなので。"
10017030-142 = "装備の点検、医薬品と担架の準備。#nそうこうしているうちに「ドーン！」と大きな音が！"
10017030-143 = "[s] \"いつもの流れって感じなんだね……。\""
10017030-144 = "か、必ずしもそういうわけではありませんが……#nそういう状況に備えるのが救護騎士団なので。"
10017030-145 = "うーん、それにしても今回のことは……。"
10017030-146 = "[s] \"元気出して、ハナエ。とりあえず後で、本人たちにも事情を聞いてみよう？\""
10017030-147 = "はい、そうですね！"
