[translation]
10017030-1 = "Episódio 3: Pesadelo de Natal"
10017030-2 = "Cidade de Kivotos"
10017030-7 = "Feliz Natal!#nEstamos aceitando doações!"
10017030-12 = "Por favor, contamos com a sua ajuda!"
10017030-14 = "Oh, o Esquadrão de Primeiros Socorros. Já é essa época do ano de novo?"
10017030-15 = "Espere um pouco... aqui, não é muito, mas aceite."
10017030-20 = "Muito obrigada!#nÉ uma pequena lembrança, por favor, aceite!"
10017030-24 = "São gorros e luvas que nós mesmas tricotamos!"
10017030-29 = "Oh, é mesmo?#nEsse é um presente maravilhoso."
10017030-30 = "Ah, então o valor ainda não é o suficiente."
10017030-32 = "Não, não, não podemos aceitar isso...!"
10017030-33 = "Só a sua intenção já nos deixa felizes, muito obrigada!#nFeliz Natal!"
10017030-37 = "[ns] \"...Vocês são bem confiáveis, hein.\""
10017030-38 = "V-você acha...?#nNós apenas fazemos o que é normal como parte do Esquadrão de Primeiros Socorros..."
10017030-39 = "Sim!#nFicamos muito felizes quando vemos que todos ficam contentes com o resultado!"
10017030-40 = "[s] \"Este é o brilho do Natal...\""
10017030-41 = "P-Professor? Você está bem...?"
10017030-42 = "Não chore! Aqui, pegue um lenço!"
10017030-44 = "Desculpe interromper esse momento comovente, mas..."
10017030-50 = "Ah, são pessoas que parecem ser delinquentes, veterana!"
10017030-51 = "H-Hanae-chan, não devemos julgar as pessoas por preconceito..."
10017030-52 = "Hum, vocês se machucaram em algum lugar?"
10017030-53 = "Se precisarem de curativos, deixem com o Esquadrão de Primeiros Socorros!"
10017030-55 = "Não, ferimentos... bem, na verdade, eu me machuquei sim."
10017030-56 = "Isso também, mas agora eu só queria desabafar um pouco."
10017030-57 = "Sabe como é, é Natal... e eu não queria ficar me sentindo mal, entende?"
10017030-58 = "Hum..."
10017030-59 = "[s] \"Por que não tenta ouvir o que eles têm a dizer?\""
10017030-60 = "Sim, você tem razão!"
10017030-62 = "I-isso não pode ser..."
10017030-63 = "O pessoal do Comitê de Justiça...?"
10017030-67 = "É a verdade! Nós só estávamos tentando ficar na nossa!"
10017030-68 = "Só estávamos nos preparando para comer um frango no Natal..."
10017030-69 = "É, tínhamos preparado um frango especial...!"
10017030-70 = "[s1] \"Um frango especial...?\"\n[s2] (As alunas do Comitê de Justiça roubaram o frango sem motivo algum...?)"
10017030-73 = "Já que íamos preparar algo, pensamos em fazer algo diferente do habitual!"
10017030-74 = "É, exatamente!"
10017030-75 = "Mas elas nos espancaram do nada e#nlevaram todo o nosso frango!"
10017030-76 = "Natal pede frango, o que tinha de errado nisso?#nPrecisava ser peru, por acaso?"
10017030-77 = "Juntamos dinheiro com tanto esforço para conseguir aquele frango..."
10017030-78 = "Só porque demos um toque especial nele,#nelas fizeram aquilo...!"
10017030-79 = "[s3] \"...Um toque especial?\"\n[s4] \"Poderia ser mais específico sobre o que...\""
10017030-82 = "B-bem, é um pouco complicado de explicar..."
10017030-83 = "O-o importante é que nossos sentimentos foram pisoteados, não é!?"
10017030-84 = "É isso aí, logo no Natal!#nNossa boa vontade sendo tratada desse jeito...!"
10017030-85 = "Aquele pessoal do Comitê de Justiça não tem coração!?#nDe que cor é o sangue de vocês!?"
10017030-87 = "I-isso é uma história terrível, se for verdade...#nAté o Papai Noel ficaria triste..."
10017030-88 = "Concordo, a boa vontade não deveria ser pisoteada."
10017030-89 = "Pelo que ouvi, acho que essa foi uma atitude muito ruim."
10017030-90 = "[s5] \"Tem algo estranho nessa história...\" \n[s6] \"Hmm...\""
10017030-93 = "O que houve, Sensei!#nNão acha que isso é uma pena?"
10017030-94 = "O Sensei me ensinou que não devemos julgar com base em preconceitos!#nO Papai Noel vai ficar bravo com você, sabia!?"
10017030-95 = "[s] \"De-desculpe...\""
10017030-96 = "De qualquer forma, por favor, fique com estas luvas e este gorro. Mesmo estando tão frio hoje..."
10017030-102 = "Ugh, obrigado...#nEmbora não haja nada a ser feito sobre o frango que desapareceu..."
10017030-103 = "A propósito...#nA Comandante da Cavalaria de Socorro não está aqui hoje?"
10017030-105 = "A Comandante provavelmente chegará em breve!"
10017030-106 = "Ela disse que daria uma volta por Trinity antes, então ela vai se juntar a nós mais tarde."
10017030-107 = "Aliás, por que a pergunta repentina sobre a Comandante Mine?"
10017030-111 = "Não, bem, só por curiosidade..."
10017030-112 = "De qualquer forma, obrigado por me ouvir...#nMesmo que o frango já tenha acabado..."
10017030-114 = "N-nós não podemos ajudar em nada...?"
10017030-115 = "Qualquer coisa serve...!"
10017030-120 = "Só de vocês se lembrarem, já está bom."
10017030-121 = "Que houve pessoas que tiveram seu frango roubado e passaram um Natal solitário..."
10017030-130 = "Ele foi embora..."
10017030-131 = "Deveríamos segui-lo?"
10017030-132 = "[s7] \"Mesmo que a gente siga, não parece que as coisas vão melhorar...\"\n[s8] \"Hmm, bem, ele não parecia querer ser seguido...\""
10017030-135 = "É verdade... mas..."
10017030-136 = "Sinto um aperto no coração..."
10017030-137 = "...Sensei? Está pensando em algo?"
10017030-138 = "[s] \"Estava pensando... por que o Comitê de Justiça fez aquilo?\""
10017030-139 = "Pois é, elas são pessoas tão boas, geralmente..."
10017030-140 = "Bem, às vezes elas fazem coisas impressionantes, né!"
10017030-141 = "I-isso é verdade... quando recebemos o aviso de que o Comitê de Justiça foi mobilizado, nós até nos preparamos para várias coisas."
10017030-142 = "Verificação de equipamentos, preparação de medicamentos e macas.#nEnquanto fazemos isso, ouvimos um \"BUM!\" de um barulho alto!"
10017030-143 = "[s] \"Parece que é a rotina de sempre, então...\""
10017030-144 = "B-bem, não é necessariamente sempre assim...#nMas como somos a Cavalaria de Socorro, precisamos estar preparadas para essas situações."
10017030-145 = "Hmm, ainda assim, sobre o que aconteceu desta vez..."
10017030-146 = "[s] \"Anime-se, Hanae. Por enquanto, vamos perguntar a elas sobre o que aconteceu mais tarde, certo?\""
10017030-147 = "Sim, tem razão!"
