[translation]
32140-1 = "Episódio 14; Confissão"
32140-2 = "Sala do Sensei"
32140-5 = "B-boa noite, Sensei... V-você ainda está acordado?"
32140-6 = "[s] \"Hifumi, você também não consegue dormir?\""
32140-7 = "S-sim..."
32140-12 = "Eu também vim! ♡"
32140-13 = "Hanako-chan..."
32140-18 = "O que vocês estão fazendo aqui..."
32140-19 = "Até a Koharu-chan..."
32140-20 = "Temos prova amanhã, o que vocês estão fazendo? Não foram vocês que disseram que descansar também é importante...!?"
32140-21 = "Bem, é verdade, mas..."
32140-22 = "Parece que a Azusa também foi para algum lugar..."
32140-23 = "Bem, eu entendo perfeitamente o nervosismo, mas..."
32140-24 = "..."
32140-25 = "Na verdade, acabei de me encontrar com o pessoal da Sisterhood. Tinha algumas coisas que eu queria investigar..."
32140-26 = "É sobre o Anexo 19, onde faremos a prova amanhã..."
32140-27 = "N-não me diga que o local mudou de novo...!?"
32140-28 = "Não, não é isso. É que, logo mais, um grande número de membros do Comitê de Justiça será enviado para lá para isolar todo o prédio."
32140-30 = "!!?"
32140-31 = "O prédio inteiro...?"
32140-32 = "Dizem que houve um pedido do Tea Party sob o pretexto de \"proteger documentos importantes necessários para o Tratado de Eden\", e que o Comitê de Justiça entrou em estado de alerta máximo para proteger o prédio todo."
32140-33 = "Além disso, parece que a lei marcial foi declarada no prédio principal também. Deve ser por isso que estava estranhamente silencioso desde ontem."
32140-34 = "L-lei marcial... É a primeira vez que ouço falar de algo assim..."
32140-35 = "Provavelmente, ninguém terá permissão para entrar ou sair daquele prédio. Até que o Tratado de Eden seja assinado."
32140-36 = "E-espera um pouco! Então como vai ficar a nossa prova!?"
32140-37 = "...Em outras palavras, é isso. Se quisermos fazer a prova, teremos que enfrentar o Comitê de Justiça..."
32140-38 = "Ah..."
32140-39 = "I-isso não pode ser... E-eu vou explicar a situação para a Hasumi-senpai...!"
32140-40 = "...Acho difícil. Provavelmente a Hasumi-san não sabe dos motivos ocultos por trás disso."
32140-41 = "Se a Hasumi-san nos ajudar, isso seria o mesmo que uma rebelião clara contra o Tea Party. Ela mesma não acabaria sendo expulsa do Comitê de Justiça?"
32140-42 = "Ugh, uuu..."
32140-43 = "Francamente... Parece que a Nagisa-san está realmente tentando nos expulsar da escola..."
32140-44 = "Por que chegar a esse ponto..."
32140-49 = "...A culpa é minha."
32140-50 = "Azusa-chan!? O-onde você estava...?"
32140-51 = "..."
32140-52 = "Pessoal, escutem. Tenho algo para contar."
32140-53 = "Azusa-chan...?"
32140-54 = "..."
32140-55 = "Azusa...? O-o que houve? Você está se sentindo mal?"
32140-56 = "Azusa-chan, você está tremendo...?"
32140-57 = "...Eu escondi algo de todas vocês por muito tempo."
32140-58 = "Mas, chegando a este ponto, não posso mais esconder..."
32140-64 = "...A \"traidora de Trinity\" que a Nagisa do Tea Party está procurando, sou eu."
32140-68 = "...Como é?"
32140-69 = "...Eh? Q-que conversa é essa de repente...?"
32140-70 = "..."
32140-71 = "Eu sou originalmente da filial de Arius. Agora, estou infiltrada em Trinity com uma identidade falsa nos documentos."
32140-72 = "A-Arius? Infiltrada...?"
32140-73 = "..."
32140-74 = "……。"
32140-75 = "Eita…… o que é isso? Arius……? O que você quer dizer com isso?"
32140-76 = "Escola Filial de Arius…… é uma facção escolar que, no passado, se opôs à união da Trinity."
32140-77 = "Por causa dessa oposição, houve problemas, e ouvi dizer que, desde então, eles se esconderam em algum lugar de Kivotos e vivem em segredo……."
32140-78 = "Sim. Até vir para cá, eu estive o tempo todo no distrito autônomo de Arius."
32140-79 = "Recebi uma missão como parte de Arius e, agora, estou infiltrada nesta escola……."
32140-81 = "Essa missão é…… destruir o halo de Kirifuji Nagisa, do Tea Party."
32140-82 = "……!?"
32140-83 = "Você está brincando, né!? I-isso significa que……."
32140-84 = "……。"
32140-86 = "Arius está disposta a fazer qualquer coisa para eliminar o Tea Party."
32140-87 = "Primeiro, Arius enganou Mika, que é membro do Tea Party, para me colocar nesta escola. Não sei os detalhes, mas com certeza contaram alguma mentira sobre querer se reconciliar com a Trinity."
32140-88 = "Entendo, enganaram a Mika-san…… de fato, diziam que ela não tem jeito para a política……."
32140-89 = "Provavelmente, depois que tudo terminar, eles pretendem colocar a culpa na Mika-san…… será que é esse o plano?"
32140-90 = "Eu sabia que Arius odiava a Trinity, mas entendo……."
32140-91 = "E-espera…… por que esse assunto de repente……? Não que eu ache que você está mentindo, mas isso não tem nada a ver com a gente agora, tem……?"
32140-92 = "Não sei muito sobre Arius, mas o que isso tem a ver com o nosso Clube de Aulas Suplementares……? Por que a Azusa está falando disso de repente……?"
32140-94 = "……。"
32140-95 = "……。"
32140-96 = "……。"
32140-101 = "Amanhã de manhã, os alunos da Escola Filial de Arius vão se infiltrar na Trinity para atacar a Nagisa."
32140-102 = "……Eu preciso proteger a Nagisa."
32140-103 = "……。"
32140-104 = "A-amanhã……!?"
32140-105 = "!?"
32140-106 = "Sim, eu preciso dar um jeito de impedir isso."
32140-107 = "O prédio principal está sob lei marcial…… e com as imprudências da Nagisa-san no exame final, o Comitê de Justiça não estará no prédio principal nesse momento……."
32140-108 = "Entendo, é o dia perfeito para um ataque a uma pessoa importante. Parece que o pessoal de Arius é bem inteligente."
32140-109 = "Hanako-chan……."
32140-110 = "E-espera! Isso não está estranho!?"
32140-111 = "E-eu não entendo direito, mas a Azusa não veio aqui para acabar com o Tea Party? Mas agora você diz que vai protegê-la? Isso não faz sentido!"
32140-113 = "É que……."
32140-114 = "……A própria Azusa-chan veio para a Trinity com esse objetivo desde o início. É isso, não é?"
32140-115 = "……。"
32140-116 = "Você participou da missão de atacar a Nagisa-san para, na verdade, protegê-la…… por assim dizer, você é uma agente dupla."
32140-117 = "Como contato para o lado de Arius, você sempre mentia nos relatórios dizendo que estava tudo bem…… enquanto, na verdade, preparava a traição."
32140-122 = "……Por que você quer proteger a Nagisa-san? Por ordem de quem?"
32140-123 = "……Isso não foi uma ordem de ninguém. É uma decisão minha."
32140-124 = "Se Kirifuji Nagisa não estiver aqui, o Tratado do Éden será cancelado. Se esse tratado de paz desaparecer, o caos em Kivotos só vai aumentar daqui para frente."
32140-125 = "E não acho que, nesse cenário, outra escola como Arius não vá surgir……."
32140-126 = "Então, é em nome da paz?"
32140-127 = "……É uma história muito doce e sonhadora. Soa tão vazio quanto o nome do tratado desta vez."
32140-128 = "……。"
32140-129 = "A Azusa-chan era uma mentirosa e uma traidora……"
32140-130 = "Você escondeu sua verdadeira face na Trinity e também escondeu suas verdadeiras intenções em Arius. Ao redor da Azusa-chan, só havia pessoas enganadas por você, você enganou a todos ao seu redor o tempo todo…… é isso mesmo?"
32140-132 = "Hanako-chan……."
32140-133 = "……Como eu disse um dia. Eu acabaria traindo a todos, a confiança de todos…… e o coração de todos."
32140-134 = "Azusa, chan……."
32140-135 = "Por isso, a 'traidora da Trinity' que ela está procurando sou eu. Por minha causa, o Clube de Aulas Suplementares está nessa crise."
32140-136 = "Sinto muito, de verdade. Quero que me odeiem. Toda essa situação atual foi causada por mim……"
32140-137 = "[s] \"……Isso não é verdade.\""
32140-138 = "……Sensei?"
32140-139 = "[s] \"A causa original, com certeza, foi o fato de não terem conseguido confiar um no outro.\""
32140-140 = "……."
32140-144 = "[ns] \"Se Nagisa tivesse confiado mais em Hifumi, em Hanako, em Azusa, em Hasumi e em Koharu.\""
32140-148 = "[ns] \"Se Mika tivesse confiado mais em Nagisa.\""
32140-152 = "[ns] \"Se todos tivessem confiado profundamente uns nos outros, nada disso teria acontecido.\""
32140-153 = "……."
32140-154 = "É verdade, talvez você tenha razão."
32140-155 = "É difícil mudar alguém que, como a Nagisa-san agora, tornou-se incapaz de confiar em qualquer pessoa. Afinal, confiar em alguém já é algo difícil por natureza."
32140-156 = "……Mas a Azusa-chan nos contou seus verdadeiros sentimentos aqui. Mesmo podendo ter continuado em silêncio, ela nos pediu desculpas."
32140-157 = "……Peço perdão, o que eu disse antes foi, como posso dizer, um impulso de ser maldosa. Ao ver o rosto sincero da Azusa-chan, meu coração ficou inquieto."
32140-158 = "……."
32140-159 = "O Clube de Estudos Suplementares nasceu como uma espécie de palco, atraindo atenção de uma forma um tanto peculiar."
32140-160 = "Em circunstâncias normais, uma \"espiã\" como a Azusa-chan não deveria permanecer por muito tempo em um lugar tão visado."
32140-161 = "Desaparecer sem que ninguém percebesse... você teve inúmeras oportunidades e momentos para fazer isso até agora."
32140-162 = "……Mas a Azusa-chan não fez isso."
32140-163 = "……."
32140-164 = "Eu sei o motivo."
32140-165 = "……Porque o tempo que passou no Clube de Estudos Suplementares foi divertido demais, não foi?"
32140-166 = "……!"
32140-167 = "Estudar juntas, comer, lavar roupas, limpar... tudo o que faziam era divertido."
32140-168 = "Por isso, você não queria destruir esse tempo feliz..."
32140-169 = "Esforçar-se em direção a um objetivo com todas... e aprender coisas novas junto com a Hifumi-chan, a Koharu-chan e o Sensei, era algo prazeroso..."
32140-170 = "Estou errada, Azusa-chan?"
32140-171 = "……."
32140-172 = "Isso é... eu..."
32140-173 = "……."
32140-174 = "……Não, é verdade."
32140-175 = "……Talvez seja isso mesmo."
32140-176 = "Aprender algo, fazer coisas com todas..."
32140-177 = "Eu não conseguia abrir mão desse tempo feliz..."
32140-178 = "……Ainda há tantas coisas que quero saber."
32140-179 = "O mar, festivais, parques de diversões... ainda há tantos lugares para ir e tantas coisas que quero descobrir..."
32140-180 = "Azusa-chan……."
32140-181 = "……."
32140-182 = "Falei como se soubesse de tudo, mas... eu entendo esse sentimento. Afinal... sim. Houve alguém que pensou da mesma forma."
32140-183 = "……?"
32140-187 = "Ela era do tipo que, por algum motivo, era muito habilidosa e recebia elogios de todos ao seu redor, não importava o que fizesse..."
32140-190 = "Urawa-san, você é realmente incrível! Conseguir resolver problemas como este tão facilmente...!"
32140-192 = "Urawa-sama, precisamos da sua cooperação neste plano. Fufu..."
32140-194 = "Urawa-san, por que não vem conosco? Para conter aquele Chá das Cinco, nós..."
32140-196 = "Prepare-se, Urawa Hanako-san. O assento no Chá das Cinco do próximo ano já está praticamente garantido para você."
32140-198 = "……Ah."
32140-199 = "Eu não sou esse tipo de pessoa..."
32140-201 = "Eu, eu..."
32140-203 = "Para aquela pessoa, a Academia Trinity era um espaço repleto de enganos, adornado com mentiras e falsidades."
32140-204 = "Sem poder contar seus verdadeiros sentimentos a ninguém, sem poder mostrar sua verdadeira face a ninguém..."
32140-206 = "……."
32140-207 = "……Isso não é solitário?"
32140-209 = "……。"
32140-210 = "Para aquela pessoa, tudo era sem sentido... e ela estava prestes a desistir da escola."
32140-211 = "Afinal, continuar vivendo daquela forma era o mesmo que estar em uma prisão."
32140-212 = "Mas... aquela pessoa era diferente da Azusa-chan."
32140-213 = "Mudando de assunto por um instante... Azusa-chan, quando tudo isso acabar, sua vida nesta escola também chegará ao fim, não é?"
32140-214 = "Considerando que você entrou falsificando documentos e que, no final, acabará traindo Arius, isso significa que você não terá um lugar para onde voltar, certo?"
32140-215 = "Ah..."
32140-216 = "……。"
32140-217 = "Mesmo sabendo disso, Azusa-chan... você sempre se esforçou ao máximo no Clube de Estudos Suplementares."
32140-218 = "Aquela pessoa tentou arruinar o exame de propósito para fugir da escola... enquanto você, Azusa-chan, deu tudo de si em sua curta vida escolar."
32140-219 = "Por que ir tão longe? Que sentido existe nisso..."
32140-220 = "Como você sempre dizia, tudo é vaidade, afinal."
32140-221 = "Mas, ao mesmo tempo... você sempre acrescentava algo mais depois disso."
32140-223 = "……Sim. Mesmo que tudo seja vaidade, isso não é motivo para não dar o seu melhor hoje."
32140-225 = "Além disso, embora aquela situação seja lamentável, não podemos ficar sendo oprimidas para sempre. Mesmo que seja algo fútil, não devemos parar de resistir."
32140-227 = "E assim... finalmente, aquela pessoa também percebeu."
32140-228 = "……A alegria da vida escolar."
32140-229 = "Limpar a piscina de roupa íntima, passear à noite todas de traje de banho, abrir o coração sobre várias coisas estando nuas... Percebi que fazer essas coisas comuns com pessoas com quem posso ser eu mesma era tão divertido."
32140-230 = "Sim... não, não estávamos nuas, mas..."
32140-231 = "O, o passeio também não foi de traje de banho...!?"
32140-232 = "Ei, então aquilo era mesmo roupa íntima!?"
32140-234 = "Fufu♡"
32140-235 = "……É como a Azusa-chan dizia. Mesmo que seja algo fútil, não devemos desistir de resistir até o fim."
32140-236 = "Hanako..."
32140-237 = "Azusa-chan, você quer aprender mais, não quer? Quer saber mais, não quer?"
32140-238 = "Você disse naquela época que queria fazer várias coisas com todas. Como ir à praia ou ficar até tarde no bar de bebidas."
32140-239 = "Você vai desistir disso?"
32140-240 = "……Não há necessidade de desistir de nada."
32140-245 = "Kirifuji Nagisa-san... vamos protegê-la do ataque de Arius."
32140-246 = "E nós, por nossa vez, faremos o exame em segurança e seremos aprovadas."
32140-247 = "Deixaremos as armadilhas que preparei exatamente onde estão, para que ninguém possa reclamar depois..."
32140-248 = "Mesmo assim, chegaremos ao local do exame, todas tiraremos mais de 90 pontos e seremos aprovadas com louvor."
32140-249 = "Essa não seria a única resposta que nos salvaria agora?"
32140-250 = "……Mas isso deveria ser fisicamente impossível..."
32140-251 = "O exame é às 9 horas. O horário de início da operação de Arius também está marcado para o mesmo horário."
32140-252 = "P, pedir ajuda para outras pessoas...?"
32140-253 = "……。"
32140-254 = "Isso também é verdade, mas... para que possamos passar no exame com sucesso, só isso não basta."
32140-255 = "……Primeiro, vamos agir por conta própria."
32140-256 = "Até agora fomos manipuladas por várias mentiras e estratégias... mas agora é a nossa vez de atacar."
32140-262 = "Afinal, aqui temos membros do Comitê de Implementação da Justiça, uma especialista em guerrilha, uma pessoa que se diz comum mas é a favorita do Chá das Cinco, e alguém que conhece quase tudo sobre Trinity."
32140-263 = "……?"
32140-264 = "F, favorita...!?"
32140-265 = "……?"
32140-269 = "Além disso, temos até o professor [USERNAME] do Schale, que é como uma chave mestra, não é?"
32140-270 = "[s] \"B, bem...\""
32140-271 = "Com essa combinação, certamente"
32140-272 = "……podemos derrubar Trinity em meio dia♡"
32140-273 = "……O quê!?"
32140-274 = "Ei, o que você quer dizer com isso!? O que você pretende fazer!?"
32140-275 = "……。"
32140-280 = "O que eu vou fazer? Ora, apenas fazer o exame e passar, é claro♡"
32140-281 = "Por enquanto, deixe os detalhes da estratégia comigo."
32140-282 = "Vamos lá, agora é a hora de unirmos nossas forças. Vamos!"
32140-283 = "[ns] \"Bem... b-bem, vamos dar o nosso melhor!\""
32140-286 = "Próximo episódio: O início das hostilidades"
