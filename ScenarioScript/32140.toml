[translation]
32140-1 = "Episódio 14;Confissão"
32140-2 = "Quarto do Sensei"
32140-5 = "B-boa noite, Sensei…… o-o senhor ainda estava acordado."
32140-6 = "[s] \"A Hifumi também não consegue dormir?\""
32140-7 = "S-sim……."
32140-12 = "Eu também vim♡"
32140-13 = "Hanako……."
32140-18 = "O que vocês tão fazendo……."
32140-19 = "Até a Koharu……."
32140-20 = "Amanhã é a prova, o que vocês tão fazendo. Descansar também é importante, quem falou isso foi você……!?"
32140-21 = "Bom, é verdade, mas……."
32140-22 = "E a Azusa também, parece que foi pra algum lugar……."
32140-23 = "Bom, o nervosismo eu entendo super bem, mas……."
32140-24 = "……."
32140-25 = "Na verdade, agora há pouco, eu fui encontrar o pessoal da Sisterhood. Tinha umas coisas que eu queria investigar……."
32140-26 = "É sobre o Anexo 19, onde a gente vai fazer a prova amanhã……"
32140-27 = "N-não me diga que o local mudou de novo……!?"
32140-28 = "Não, não é isso. É que, pra lá, depois disto, vai ser destacado um número e tanto de membros do Comitê de Realização da Justiça pra isolar o prédio inteiro."
32140-30 = "!!?"
32140-31 = "O prédio inteiro……?"
32140-32 = "Houve um pedido do Tea Party sob o pretexto de \"proteger documentos importantes necessários ao Tratado do Éden\", e o Comitê de Realização da Justiça entrou em estado de alerta máximo pra guardar o prédio inteiro."
32140-33 = "E, além disso, pelo visto, foi decretada lei marcial também no prédio principal. O silêncio estranho desde ontem parece ser por causa disso."
32140-34 = "L-lei marcial…… é a primeira vez que eu ouço uma coisa dessas……."
32140-35 = "Provavelmente, ninguém tem permissão de entrar ou sair daquele prédio. Até o Tratado do Éden ser assinado, o tempo todo."
32140-36 = "P-peraí! Então, e a nossa prova, como fica!?"
32140-37 = "……Ou seja, é o seguinte. Se querem fazer a prova, ponham o Comitê de Realização da Justiça como inimigo, é isso……."
32140-38 = "Ah……."
32140-39 = "N-não pode ser…… e-eu vou explicar a situação pra veterana Hasumi……!"
32140-40 = "……Acho difícil. A Hasumi provavelmente não foi informada do motivo por trás disso."
32140-41 = "Se a Hasumi nos ajudar, isso é sinônimo de uma deserção clara contra o Tea Party. A Hasumi também acabaria expulsa do Comitê de Realização da Justiça, não?"
32140-42 = "Uh, uu……."
32140-43 = "Francamente…… pelo visto a Nagisa quer, pra valer, nos expulsar……."
32140-44 = "Por que, a esse ponto……."
32140-49 = "……É por minha culpa."
32140-50 = "Azusa!? A-aonde você foi……?"
32140-51 = "……."
32140-52 = "Pessoal, escutem. Tem uma coisa que eu quero contar."
32140-53 = "Azusa……?"
32140-54 = "……."
32140-55 = "Azusa……? Q-que foi? Você tá passando mal?"
32140-56 = "Azusa, seu corpo tá tremendo……?"
32140-57 = "……Tem uma coisa que eu escondi de vocês esse tempo todo."
32140-58 = "Mas, tendo chegado até aqui, eu já não posso mais esconder……."
32140-64 = "……O \"traidor de Trinity\" que a Nagisa, do Tea Party, procura, sou eu."
32140-68 = "……Hã?"
32140-69 = "……Hã? D-do nada, que história é essa……?"
32140-70 = "……."
32140-71 = "Eu sou, de origem, da Filial de Arius. Agora, falsificando a minha identidade no papel, estou infiltrada em Trinity."
32140-72 = "A-Arius? Infiltrada……?"
32140-73 = "……."
32140-74 = "……."
32140-75 = "É que…… que é isso? Arius……? Como assim?"
32140-76 = "A Filial de Arius…… uma academia dissidente que, um dia, se opôs à união de Trinity."
32140-77 = "Por causa dessa rebeldia virou conflito e, depois, ouvi dizer que ela se escondeu em algum canto de Kivotos e vive quietinha, mas……."
32140-78 = "Isso. Até vir pra cá, eu estava sempre no distrito autônomo de Arius."
32140-79 = "Recebendo uma missão como membro da Arius, agora estou, assim, infiltrada nesta academia……."
32140-81 = "E essa missão é…… destruir a aureola de Nagisa Kirifuji, do Tea Party."
32140-82 = "……!?"
32140-83 = "Mentira!? I-isso quer dizer, então……."
32140-84 = "……."
32140-86 = "A Arius está disposta a fazer qualquer coisa, contanto que seja pra eliminar o Tea Party."
32140-87 = "A Arius, primeiro, enganou a Mika, membro do Tea Party, e me colocou nesta academia. Os detalhes eu não sei, mas com certeza mentiram algo tipo que queriam fazer as pazes com Trinity."
32140-88 = "Sei, a Mika…… de fato, diziam que ela não é boa pra política……."
32140-89 = "Provavelmente, depois que tudo terminasse, jogariam a culpa na Mika…… é esse o fluxo que devem estar prevendo."
32140-90 = "Que a Arius odeia Trinity eu já sabia, mas, sei……."
32140-91 = "P-peraí…… do nada, que história é essa……? Não, não é que eu ache mentira, mas isso não tem nada a ver com a gente de agora, tem……?"
32140-92 = "Sobre a Arius eu não entendo bem, mas o que isso tem a ver com o nosso Clube de Aulas de Reforço……? Azusa, por que você tá, de repente, contando uma história dessas……?"
32140-94 = "……."
32140-95 = "……."
32140-96 = "……."
32140-101 = "Amanhã de manhã, os alunos da Filial de Arius vão se infiltrar em Trinity mirando a Nagisa."
32140-102 = "……Eu preciso proteger a Nagisa."
32140-103 = "……."
32140-104 = "A-amanhã……!?"
32140-105 = "!?"
32140-106 = "Sim; eu tenho que impedir isso de algum jeito."
32140-107 = "O prédio principal está sob lei marcial…… e, com a loucura da Nagisa na última prova, é um momento em que o Comitê de Realização da Justiça não está no prédio principal……."
32140-108 = "Sei, é o dia perfeito pra atacar uma figura importante. A Arius também raciocina bem, pelo visto."
32140-109 = "Hanako……."
32140-110 = "P-peraí! Não tá estranho!?"
32140-111 = "N-não entendi direito, mas a Azusa veio pra derrubar o Tea Party, né? E aí, proteger, como assim? A história não bate!"
32140-113 = "Isso é……."
32140-114 = "……A PRÓPRIA Azusa, desde o começo, veio pra Trinity com esse objetivo. É isso, né?"
32140-115 = "……."
32140-116 = "Desde o começo, pra proteger a Nagisa, você entrou na missão de atacar a Nagisa…… uma agente dupla, digamos."
32140-117 = "Pro lado da Arius, como elo de comunicação, você sempre reportou, mentindo, que estava tudo em ordem…… quando, na verdade, se preparava pra trair."
32140-122 = "……Por que você quer proteger a Nagisa? E por ordem de quem?"
32140-123 = "……Isto não foi ordem de ninguém. É a minha própria decisão."
32140-124 = "Se não houver a Nagisa Kirifuji, o Tratado do Éden vai ser cancelado. Se aquele tratado de paz desaparecer, daqui pra frente a confusão em Kivotos vai se aprofundar ainda mais."
32140-125 = "E aí, não dá pra crer que não vá nascer, de novo, uma academia como a Arius……."
32140-126 = "Então, é pela paz, é isso?"
32140-127 = "……Uma história muito doce, quase um sonho, né. Um eco tão vão quanto o próprio nome deste tratado."
32140-128 = "……."
32140-129 = "A Azusa era uma mentirosa, e uma traidora……"
32140-130 = "Em Trinity, escondia a verdadeira forma; na Arius, escondia o que de fato sentia. Em volta da Azusa só havia gente enganada pela Azusa; esse tempo todo, você enganou tudo à sua volta…… é isso, tá certo?"
32140-132 = "Hanako……."
32140-133 = "……É como eu disse um dia. Que eu ia acabar traindo a todos, a confiança de todos…… e o coração de todos."
32140-134 = "A-Azusa……."
32140-135 = "Por isso, o \"traidor de Trinity\" que ela procura sou eu. Por minha culpa, o Clube de Aulas de Reforço caiu numa crise dessas."
32140-136 = "Me desculpem de verdade. Podem me odiar. Toda esta situação de agora fui eu que trouxe……."
32140-137 = "[s] \"……Isso não é verdade.\""
32140-138 = "……Sensei?"
32140-139 = "[s] \"A causa original, com certeza, foi mais o \"não ter conseguido confiar\".\""
32140-140 = "……."
32140-144 = "[ns] \"Se a Nagisa tivesse confiado mais na Hifumi, na Hanako, na Azusa, na Hasumi e na Koharu.\""
32140-148 = "[ns] \"Se a Mika tivesse confiado mais na Nagisa.\""
32140-152 = "[ns] \"Se todo mundo tivesse conseguido confiar mais fundo um no outro, não teria dado nisso.\""
32140-153 = "……."
32140-154 = "Pois é, talvez seja isso mesmo."
32140-155 = "Mudar uma pessoa que, como a Nagisa de agora, deixou de conseguir confiar em ninguém é difícil. Confiar em alguém já é, de origem, difícil."
32140-156 = "……Mas a Azusa nos contou, assim, o que de fato sente. Sendo que ela podia continuar calada, ela pediu desculpa."
32140-157 = "……Me desculpem, aquilo de agora, como dizer, eu simplesmente fiquei com vontade de implicar. Olhando o rosto sincero da Azusa, sei lá, meu coração fica inquieto."
32140-158 = "……."
32140-159 = "O Clube de Aulas de Reforço, num sentido meio peculiar, nasceu como uma existência que atrai atenção, como uma espécie de palco."
32140-160 = "Normalmente, uma \"espiã\" como a Azusa não deveria ficar muito tempo num lugar tão visado assim."
32140-161 = "Sumir sem que ninguém perceba…… meios e momentos pra isso houve aos montes até agora, com certeza."
32140-162 = "……Mas a Azusa não fez isso."
32140-163 = "……."
32140-164 = "E eu sei o motivo disso."
32140-165 = "……Porque o tempo no Clube de Aulas de Reforço foi bom demais. Não é?"
32140-166 = "……!"
32140-167 = "Estudar todo mundo junto, comer, lavar roupa, limpar…… porque, fizesse o que fizesse, era só coisa boa."
32140-168 = "Por isso, você não quis destruir esse tempo bom……"
32140-169 = "Se esforçar todo mundo junto rumo a um objetivo…… e aprender, com a Hifumi, a Koharu e o Sensei, coisas que a gente não sabia; porque isso era bom……"
32140-170 = "Não é, Azusa?"
32140-171 = "……."
32140-172 = "Isso é…… eu……."
32140-173 = "……."
32140-174 = "……Não, sim."
32140-175 = "……Talvez seja isso mesmo."
32140-176 = "Aprender alguma coisa, fazer alguma coisa todo mundo junto……."
32140-177 = "Esse tempo bom, eu não consegui largar……."
32140-178 = "……Ainda tem muita coisa que eu quero conhecer."
32140-179 = "Mar, festival, parque de diversões…… lugares que eu quero ir, coisas que eu quero conhecer, ainda tem muita……."
32140-180 = "Azusa……."
32140-181 = "……."
32140-182 = "Falei como se soubesse das coisas, mas…… eu entendo esse sentimento. Afinal…… sim. Houve alguém que sentiu a mesma coisa."
32140-183 = "……?"
32140-187 = "Do tipo que, sei lá por quê, é boa em tudo, e que, faça o que fizer, é bajulada por todos……."
32140-190 = "A senhorita Urawa é incrível de verdade! Resolver uma questão dessas com tanta facilidade……!"
32140-192 = "Senhorita Urawa, este plano precisa da sua colaboração. Ufu……."
32140-194 = "Senhorita Urawa, não quer vir conosco? Pra conter aquele Tea Party, nós――"
32140-196 = "Prepare-se, senhorita Hanako Urawa. O assento do Tea Party do ano que vem é seu, praticamente garantido."
32140-198 = "……Haa."
32140-199 = "Eu não sou uma pessoa dessas……."
32140-201 = "Eu, eu……."
32140-203 = "Pra essa pessoa, a Academia Geral de Trinity era um espaço cheio de embuste, enfeitado com mentiras e falsidades."
32140-204 = "Sem conseguir falar o que de fato sentia a ninguém, sem conseguir mostrar a verdadeira forma a ninguém……."
32140-206 = "……."
32140-207 = "……Isso não é solitário?"
32140-209 = "……."
32140-210 = "Pra essa pessoa, tudo era sem sentido…… e ela estava tentando abandonar a escola."
32140-211 = "Afinal, continuar aquela vida era o mesmo que estar numa prisão."
32140-212 = "Mas…… essa pessoa e a Azusa eram diferentes."
32140-213 = "Mudando de assunto por um instante…… na prática, quando isto tudo acabar, a sua vida nesta academia também vai acabar, né, Azusa?"
32140-214 = "Você entrou falsificando a papelada, e, se no fim vai trair também a Arius, então, no fim, você não tem lugar pra voltar nem pra onde retornar, né?"
32140-215 = "Ah……."
32140-216 = "……."
32140-217 = "Mesmo sabendo disso, a Azusa…… no Clube de Aulas de Reforço, esteve sempre se dedicando de corpo e alma."
32140-218 = "Essa pessoa estragava a prova de propósito e tentava fugir da escola…… já a Azusa deu tudo de si numa vida escolar tão curta."
32140-219 = "Por que fazer tanto assim, que sentido há nisso……"
32140-220 = "Sendo que, como a Azusa sempre dizia de bordão, tudo é vão."
32140-221 = "Mas, ao mesmo tempo…… a Azusa sempre acrescentava umas palavras depois disso."
32140-223 = "……Sim. Mesmo que tudo seja vão, isso não é motivo pra não dar o melhor hoje."
32140-225 = "E aquela situação é lamentável, mas ficar só sendo oprimida pra sempre não pode. Ainda que seja algo vão, não se deve parar de resistir."
32140-227 = "E, assim…… enfim, essa pessoa também percebeu."
32140-228 = "……A alegria da vida escolar."
32140-229 = "Limpar a piscina de roupa de baixo, todo mundo passear de maiô à noite, se abrir sobre várias coisas pelada…… fazer, com pessoas diante de quem se pode ser você mesma, essas coisas comuns com todas as forças, era tão bom assim."
32140-230 = "Sim…… não, mas não foi pelada……."
32140-231 = "O-o passeio também não foi de maiô……!?"
32140-232 = "Hã, então aquilo era mesmo roupa de baixo!?"
32140-234 = "Ufu♡"
32140-235 = "……É como a Azusa dizia. Mesmo que seja algo vão, não se deve parar de resistir até o fim."
32140-236 = "Hanako……."
32140-237 = "Azusa, você quer aprender mais, né? Quer conhecer mais, né?"
32140-238 = "A gente falou, naquela hora, que queria experimentar várias coisas todo mundo junto. Ir passear no mar, esticar num drink bar até de madrugada."
32140-239 = "Você vai desistir disso?"
32140-240 = "……Não é preciso desistir de nada."
32140-245 = "A Nagisa Kirifuji…… vamos protegê-la do ataque da Arius."
32140-246 = "E a gente, por sua vez, faz a prova em segurança e passa."
32140-247 = "Pra que depois ninguém possa reclamar de nada, as armadilhas que a gente montou ficam do jeito que estão……."
32140-248 = "E, mesmo assim, a gente chega ao local da prova, todo mundo tira 90 ou mais, e passa de cabeça erguida."
32140-249 = "Isso não é, pra gente de agora, a única resposta que serve de salvação?"
32140-250 = "……Mas uma coisa dessas é fisicamente impossível……."
32140-251 = "A prova é a partir das 9. O horário de início da operação da Arius também está previsto pra mesma hora."
32140-252 = "P-pedir ajuda pras outras pessoas……?"
32140-253 = "……."
32140-254 = "Isso também, mas…… pra gente passar direitinho na prova, só isso não basta."
32140-255 = "……Primeiro, vamos ser nós a agir."
32140-256 = "Até agora, a gente foi joguete de várias mentiras e artimanhas…… mas dessa vez é a nossa vez de tomar a iniciativa."
32140-262 = "Afinal, aqui, agora, tem uma membro do Comitê de Realização da Justiça, uma mestra de guerrilha, uma autointitulada pessoa comum que é alvo do amor obsessivo do Tea Party, e uma pessoa que conhece quase tudo de Trinity."
32140-263 = "……?"
32140-264 = "A-amor obsessivo……!?"
32140-265 = "……?"
32140-269 = "E, ainda por cima, tem até o Sensei [USERNAME], da \"Schale\", que é como uma espécie de chave-mestra, viu?"
32140-270 = "[s] \"B-bom……\""
32140-271 = "Com esta combinação, com certeza"
32140-272 = "……uma Trinity, a gente vira de cabeça pra baixo em meio dia♡"
32140-273 = "……Hã!?"
32140-274 = "Hã, como assim!? O que você pretende fazer!?"
32140-275 = "……."
32140-280 = "Fazer o quê; é só fazer a prova e passar♡"
32140-281 = "O conteúdo da operação, por ora, deixem comigo."
32140-282 = "Vamos, agora é a hora de juntar forças. Vamos lá!"
32140-283 = "[ns] \"É que…… e-enfim, vamos nos esforçar!\""
32140-286 = "Próximo Episódio;A Batalha Tem Início"
