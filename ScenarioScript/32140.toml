[translation]
32140-1 = "Episódio 14; Confissão"
32140-2 = "Quarto do Sensei"
32140-5 = "B-Boa noite, Sensei... v-você ainda tava acordado."
32140-6 = "[s] \"Você também não tá conseguindo dormir, Hifumi?\""
32140-7 = "S-Sim..."
32140-12 = "Eu também vim dar uma passadinha♡"
32140-13 = "Hanako-chan..."
32140-18 = "O que vocês tão fazendo..."
32140-19 = "Até você, Koharu-chan..."
32140-20 = "A gente tem prova amanhã, o que é que vocês tão inventando? Não foi você que disse que descansar era importante... !?"
32140-21 = "É, tem razão, mas..."
32140-22 = "Parece que a Azusa também foi pra algum lugar..."
32140-23 = "Bom, eu entendo perfeitamente esse nervosismo, mas..."
32140-24 = "......"
32140-25 = "Na verdade, acabei de ter um encontro rápido com o pessoal da Irmandade. Eu tinha umas coisinhas pra checar..."
32140-26 = "Sobre o 19º Prédio Anexo, onde nós vamos fazer a prova amanhã..."
32140-27 = "N-Não me diga que mudaram o lugar de novo...!?"
32140-28 = "Não, não é isso. Acontece que, daqui a pouco, um grande número de membros do Comitê de Realização da Justiça vai ser despachado pra isolar o prédio inteiro."
32140-30 = "!!?"
32140-31 = "O prédio... inteiro?"
32140-32 = "A desculpa da Tea Party foi 'proteger documentos vitais para o Tratado do Éden', e o Comitê de Realização da Justiça vai entrar em alerta máximo para proteger o prédio inteiro."
32140-33 = "Além disso, parece que a Lei Marcial foi decretada no Prédio Principal. O silêncio bizarro de ontem deve ser por causa disso."
32140-34 = "L-Lei Marcial... Eu nunca vi nada parecido..."
32140-35 = "Provavelmente, ninguém poderá entrar ou sair daquele prédio. Até que o Tratado do Éden seja assinado."
32140-36 = "E-Espera um pouco! E a nossa prova, como é que fica!?"
32140-37 = "...Na prática, significa o seguinte: se quiserem fazer a prova, vão ter que bater de frente com o Comitê de Realização da Justiça..."
32140-38 = "Ah..."
32140-39 = "I-Isso não pode ser verdade... e-eu vou falar com a Hasumi-senpai e explicar a situação...!"
32140-40 = "...Acho muito difícil. É provável que a Hasumi-san nem saiba dos verdadeiros motivos por trás disso."
32140-41 = "Se ela nos ajudar, seria considerado um ato claro de traição contra a Tea Party. E a própria Hasumi-san acabaria sendo expulsa do Comitê."
32140-42 = "Ugh, uuuuh..."
32140-43 = "Minha nossa... parece que a Nagisa-san está realmente disposta a fazer de tudo para nos expulsar..."
32140-44 = "Mas por que, pra chegar a esse ponto..."
32140-49 = "...A culpa é minha."
32140-50 = "Azusa-chan!? O-Onde você tava...?"
32140-51 = "......"
32140-52 = "Pessoal, escutem. Tem uma coisa que eu preciso falar."
32140-53 = "Azusa-chan...?"
32140-54 = "......"
32140-55 = "Azusa...? O-O que foi? Tá se sentindo mal?"
32140-56 = "Azusa-chan, você tá tremendo...?"
32140-57 = "...Eu escondi algo de vocês esse tempo todo."
32140-58 = "Mas a gente chegou num ponto onde eu não posso mais esconder isso..."
32140-64 = "...O 'traidor da Trinity' que a Nagisa, da Tea Party, tá caçando... sou eu."
32140-68 = "...Como é que é?"
32140-69 = "...Quê? D-Do nada, que papo é esse...?"
32140-70 = "......"
32140-71 = "Eu vim, originalmente, da Filial Arius. Agora eu me infiltrei na Trinity com uma identidade falsa nos documentos."
32140-72 = "A-Arius? Infiltrada...?"
32140-73 = "......"
32140-74 = "......"
32140-75 = "Hã... o que é isso? Arius...? O que cê tá falando?"
32140-76 = "A Filial Arius... foi a facção que se opôs à formação da Trinity no passado."
32140-77 = "Ouvi dizer que causaram problemas com a rebelião, e depois disso desapareceram em algum lugar de Kivotos e estão vivendo às escondidas..."
32140-78 = "Isso. Eu tava no Distrito Autônomo da Arius esse tempo todo antes de vir pra cá."
32140-79 = "Eu recebi uma missão de Arius e me infiltrei nesta escola assim..."
32140-81 = "A missão era... destruir o halo da Nagisa Kirifuji da Tea Party."
32140-82 = "...!?"
32140-83 = "Tá zoando, né!? E-Então quer dizer que..."
32140-84 = "......"
32140-86 = "Arius tá disposta a qualquer coisa pra eliminar a Tea Party."
32140-87 = "Primeiro eles enganaram a Mika da Tea Party pra me jogar aqui dentro. Eu não sei os detalhes, mas eles devem ter inventado alguma história de querer fazer as pazes com a Trinity ou algo assim."
32140-88 = "Entendi... enganaram a Mika-san. Realmente falavam que ela não levava jeito para a política..."
32140-89 = "Acho que a ideia era jogar toda a culpa nela depois que tudo terminasse... e usar isso de bode expiatório."
32140-90 = "Eu já sabia que a Arius odiava a Trinity, mas... faz sentido..."
32140-91 = "E-Espera aí... do nada, por que tamo falando disso...? Não é que eu não acredite em você, mas isso não tem nada a ver com a gente agora, tem...?"
32140-92 = "Eu não manjo de Arius, mas que que isso tem a ver com o Clube de Reposição...? Azusa, por que você tá falando disso do nada...?"
32140-94 = "......"
32140-95 = "......"
32140-96 = "......"
32140-101 = "Amanhã de manhã, alunas da Filial Arius vão se infiltrar na Trinity com o objetivo de matar a Nagisa."
32140-102 = "...Eu tenho que proteger a Nagisa."
32140-103 = "......"
32140-104 = "A-Amanhã...!?"
32140-105 = "!?"
32140-106 = "Sim, eu tenho que dar um jeito de impedir isso."
32140-107 = "O Prédio Principal vai estar sob Lei Marcial... o Comitê de Realização da Justiça não estará no prédio, devido à ideia estúpida da Nagisa-san sobre a nossa prova final..."
32140-108 = "Fez sentido. É o dia perfeito para o assassinato de um VIP. A Arius pensa rápido."
32140-109 = "Hanako-chan..."
32140-110 = "E-Espera aí! Isso não faz sentido!"
32140-111 = "E-Eu não entendi, Azusa. Você não disse que veio pra acabar com a Tea Party? Então por que você vai proteger ela? O papo não bate!"
32140-113 = "Isso é..."
32140-114 = "...Na verdade, o *seu* objetivo desde o princípio era vir pra Trinity. Era isso, não é?"
32140-115 = "......"
32140-116 = "Você aceitou a missão de assassinar a Nagisa-san já com o objetivo de protegê-la... virou, de certa forma, uma agente dupla."
32140-117 = "Você serviu de contato de Arius e reportou que tudo estava caminhando de acordo, enquanto se preparava para traí-los..."
32140-122 = "...Mas por que você tentaria proteger a Nagisa-san? Quem ordenou que você fizesse isso?"
32140-123 = "...Ninguém mandou eu fazer isso. Foi a minha decisão."
32140-124 = "Se a Nagisa Kirifuji sumir, o Tratado do Éden vai ser cancelado. Se não houver o Tratado, o caos em Kivotos só vai aumentar no futuro."
32140-125 = "Se as coisas ficarem assim, não tenho dúvidas que outras escolas como Arius vão acabar nascendo..."
32140-126 = "Ou seja, foi tudo em nome da paz?"
32140-127 = "...Que sonho doce e puro. Mas isso soa tão vazio quanto o nome desse tratado."
32140-128 = "......"
32140-129 = "Azusa-chan, você é uma mentirosa e uma traidora..."
32140-130 = "Escondeu quem realmente era na Trinity, e também escondeu sua verdadeira intenção da Arius. Azusa-chan só teve pessoas enganadas por você ao seu redor, sempre mentindo pra todos... é isso mesmo?"
32140-132 = "Hanako-chan..."
32140-133 = "...Como eu disse da última vez. Que eu iria trair todas vocês, trair a confiança de vocês... e trair o coração de todo mundo."
32140-134 = "Azusa... chan..."
32140-135 = "A 'traidora da Trinity' que ela tá procurando sou eu. O Clube de Reposição tá correndo risco de acabar por minha causa."
32140-136 = "Me desculpem, de verdade. Quero que vocês tenham raiva de mim. Toda essa situação agora é culpa minha..."
32140-137 = "[s] \"...Isso não é verdade.\""
32140-138 = "...Sensei?"
32140-139 = "[s] \"Tudo isso começou por causa daquela 'falta de confiança'.\""
32140-140 = "......"
32140-144 = "[ns] \"Se a Nagisa tivesse confiado mais na Hifumi, na Hanako, na Azusa, na Hasumi e na Koharu.\""
32140-148 = "[ns] \"Se a Mika tivesse confiado mais na Nagisa.\""
32140-152 = "[ns] \"Se todo mundo tivesse confiado um no outro, as coisas não teriam chegado a esse ponto.\""
32140-153 = "......"
32140-154 = "É, talvez o Sensei tenha razão."
32140-155 = "É muito difícil mudar uma pessoa que já não consegue confiar em mais ninguém, como a Nagisa-san está agora. Confiar em alguém é, por si só, uma coisa difícil de se fazer."
32140-156 = "...Apesar disso, a Azusa-chan contou tudo sobre si mesma para nós. Você podia simplesmente ficar calada, mas você escolheu nos pedir desculpas."
32140-157 = "...Ah, me perdoe por falar assim, é que, por algum motivo, eu senti vontade de te dar uma provocada. Eu estava vendo o seu rosto todo sério e isso fez meu coração bater mais forte."
32140-158 = "......"
32140-159 = "O Clube de Reposição, de uma forma um pouco diferente, se tornou algo que atrai os olhares de todo mundo, como se fôssemos o centro do palco."
32140-160 = "Se você é mesmo uma 'espiã' como você disse, você não deveria ficar num lugar que chamasse tanta atenção por tanto tempo."
32140-161 = "Existiram várias chances e métodos para você sumir sem que ninguém percebesse..."
32140-162 = "...Mas, Azusa-chan, você não fez isso."
32140-163 = "......"
32140-164 = "Eu sei o porquê."
32140-165 = "...Porque o tempo que passou no Clube de Reposição era divertido demais, não foi?"
32140-166 = "...!"
32140-167 = "Estudar junto com a gente, comer, lavar roupa, limpar as coisas... tudo era divertido pra você."
32140-168 = "E é por isso que você não queria que esse tempo divertido acabasse..."
32140-169 = "Você se divertiu aprendendo coisas que não sabia junto com a Hifumi-chan, a Koharu-chan, o Sensei e com todo mundo, em busca de um objetivo juntas..."
32140-170 = "Eu tô errada, Azusa-chan?"
32140-171 = "......"
32140-172 = "Isso... eu..."
32140-173 = "......"
32140-174 = "...Não, é."
32140-175 = "...Você tá certa."
32140-176 = "Aprender coisas novas, fazer as coisas junto com todo mundo..."
32140-177 = "Não fui capaz de soltar daquele tempo tão divertido..."
32140-178 = "...Eu ainda tenho muito o que aprender."
32140-179 = "A praia, festivais, parque de diversão... tem tantos lugares que quero conhecer e coisas pra eu aprender..."
32140-180 = "Azusa-chan..."
32140-181 = "......"
32140-182 = "Parece até que eu te entendo melhor que ninguém, mas eu sei... eu sei perfeitamente como você se sente. Sabe por quê...? É, porque tem alguém que se sentia igual a você."
32140-183 = "...?"
32140-187 = "Um certo alguém que, mesmo se não fizesse nada, era adorada por todos sem motivo..."
32140-190 = "A Urawa-san é realmente incrível! Dá pra acreditar que ela resolveu esse problema na maior facilidade...!?"
32140-192 = "Urawa-sama, precisamos de sua cooperação para este plano... fufu..."
32140-194 = "Urawa-san, você quer se juntar a nós? Pra gente conseguir bater de frente com a Tea Party, a gente..."
32140-196 = "Quero que você esteja pronta, Urawa Hanako-san. Nós conseguimos prever que no próximo ano, a cadeira da Tea Party com certeza vai ser sua."
32140-198 = "...Haa."
32140-199 = "Eu não sou o tipo de pessoa que vocês pensam..."
32140-201 = "Eu sou, eu sou..."
32140-203 = "Pra essa pessoa, o Instituto Geral Trinity era apenas um espaço cheio de mentiras e ilusões, cheio de coisas enganosas."
32140-204 = "Sem poder mostrar como se sentia de verdade, ou não poder mostrar seu verdadeiro eu..."
32140-206 = "......"
32140-207 = "...Sabe que isso soa meio solitário, não é?"
32140-209 = "......"
32140-210 = "Tudo parecia sem sentido para ela... então ela só queria abandonar a escola."
32140-211 = "Na verdade, ficar presa naquela vida era como estar presa em uma prisão de qualquer forma."
32140-212 = "Porém... a Azusa-chan não era igual a essa pessoa."
32140-213 = "Vamos voltar a falar de você... depois que isso tudo acabar, a Azusa-chan não vai ter mais vida escolar aqui, certo?"
32140-214 = "Você usou documentos falsos para se infiltrar, e se for pra trair Arius no fim das contas... você não teria mais nenhum lugar para voltar ou para viver... certo?"
32140-215 = "Ah..."
32140-216 = "......"
32140-217 = "E mesmo sabendo disso, você Azusa-chan... fez o seu melhor pelo Clube de Reposição todo esse tempo."
32140-218 = "Essa pessoa estava tentando estragar os exames propositalmente para tentar fugir da escola... e enquanto isso, a Azusa-chan continuava dando tudo de si por essa vida escolar curtinha."
32140-219 = "E qual seria o sentido por trás disso, afinal...?"
32140-220 = "E pra você, tudo... 'tudo é uma grande ilusão', e no fim, é tudo em vão."
32140-221 = "Mesmo assim... a Azusa-chan sempre falava algo logo depois disso."
32140-223 = "...É. E mesmo se no final tudo for em vão, não tem motivo pra não dar o seu melhor hoje."
32140-225 = "E também não se pode ficar aceitando apanhar para sempre. Mesmo que tudo seja apenas uma ilusão sem sentido, as pessoas devem continuar a resistir sem parar."
32140-227 = "E com isso... esse alguém finalmente se deu conta."
32140-228 = "...De como a vida escolar pode ser divertida."
32140-229 = "Limpando piscinas usando roupas de baixo, todo mundo usando moda praia no passeio da meia noite, ou ficando nua na frente de todo mundo e revelando segredos... tudo que nós fizemos enquanto a gente mostrava nosso verdadeiro eu, foi tudo divertido demais."
32140-230 = "É... quer dizer, eu não fiquei nua, mas..."
32140-231 = "A-A gente não tava de moda praia no passeio da noite... !?"
32140-232 = "Hã!? Então aquela vez foi... só com as roupas de baixo!?"
32140-234 = "Fufu♡"
32140-235 = "...É como a Azusa-chan falou. Mesmo se for tudo ilusão ou se for tudo em vão, nós não devemos parar de resistir."
32140-236 = "Hanako..."
32140-237 = "Azusa-chan, você não tem mais coisas pra aprender? Você quer saber mais coisas, não é?"
32140-238 = "Eu ainda não esqueci o que a gente falou sobre fazer um monte de coisa juntas. Sobre ir à praia juntas, pedir bebida ilimitada, madrugar juntas..."
32140-239 = "Vai desistir de tudo assim mesmo?"
32140-240 = "...Nós não precisamos desistir de nada."
32140-245 = "Nagisa Kirifuji-san... nós vamos protegê-la do ataque de Arius."
32140-246 = "E nós mesmas iremos passar em todos os exames em segurança."
32140-247 = "Sem abrir espaço pra nenhuma reclamação e também... passando por todos os obstáculos pelo caminho."
32140-248 = "Se nós chegarmos ao exame, tirarmos mais de 90 e passarmos com a cara limpa... de cabeça erguida..."
32140-249 = "Essa vai ser nossa única chance de salvação, não concordam?"
32140-250 = "...Mas o que você tá falando é impossível."
32140-251 = "O exame começa às 9. O ataque da Arius tá programado para a mesma hora."
32140-252 = "T-Talvez a gente pudesse pedir uma ajuda...?"
32140-253 = "......"
32140-254 = "Seria algo excelente... mas pra gente passar nesse exame sem dor de cabeça, nós precisamos de mais que isso."
32140-255 = "...Antes de mais nada, somos nós quem devemos dar o primeiro passo."
32140-256 = "Fomos feitas de bobas por conta de todo esse tempo cheios de mentiras e tramas... mas desta vez a gente vai brincar de verdade com as nossas regras."
32140-262 = "Afinal de contas, as garotas aqui agora são uma membra do Comitê de Realização da Justiça, uma deusa na guerra de guerrilha, uma garota normal que dizem receber o carinho cego da Tea Party, e um gênio que tem os laços da Trinity muito bem amarrados na ponta da língua."
32140-263 = "...?"
32140-264 = "C-Carinho cego...!?"
32140-265 = "...?"
32140-269 = "E ainda por cima, temos aqui também o nosso Sensei da Schale, que serve de uma super chave-mestra!"
32140-270 = "[s] \"E-Er, bom...\""
32140-271 = "Se a gente lutar unidas, eu não tenho dúvidas de que..."
32140-272 = "...Nós poderíamos derrubar a Trinity inteira com menos de meio dia, viu?♡"
32140-273 = "...Quê!?"
32140-274 = "Hã!? Como é que é!? O que que a gente vai fazer!?"
32140-275 = "......"
32140-280 = "Eu não tô falando de nada de perigoso, só precisamos fazer o exame e passar♡"
32140-281 = "Com a estratégia pra mim."
32140-282 = "Bom, vamos lá. É hora de unirmos forças! Let's go!"
32140-283 = "[ns] \"Isso... e-então, vamos lá, galera!\""
32140-286 = "Próximo Episódio; Faísca"