[translation]
1008805-1 = "子供の意地"
1008805-2 = "（便利屋から借りた資料を返しに、事務所を訪れた）"
1008805-10 = "……あれ、先生？"
1008805-11 = "[s1] \"カヨコ……その格好は……。\"\n[s2] \"ドレス気に入ったの？\""
1008805-14 = "……まあ、ちょっとね。"
1008805-15 = "そういう先生こそ、何か用なの？"
1008805-16 = "うん？資料を返しに？"
1008805-17 = "ああ、この前の件ね。"
1008805-18 = "あっちの机の上に置いて。あとは私が整理するから。"
1008805-22 = "……？"
1008805-23 = "なんでこれを着てるのか……？"
1008805-27 = "わざと聞かないであげたのに……どうして聞いちゃうかな。"
1008805-28 = "まあ……それも先生らしいというか……。"
1008805-29 = "……仕事で、ちょっとね。"
1008805-30 = "最近、なんだかこういうのが増えたような……。"
1008805-31 = "まあ、せっかくのドレスに使い道があるのは良いんだけど。"
1008805-32 = "とはいえ、大体の仕事は……"
1008805-33 = "や、全部って言っていいほど、目ぼしい収穫なんてなかったけど。"
1008805-34 = "[s3] \"カヨコも大変だね。\"\n[s4] \"……頑張ってね。\""
1008805-39 = "うーん。別にやりたくないとか、苦に感じることはないからね。"
1008805-40 = "……え？"
1008805-41 = "意外……？"
1008805-42 = "まあ……"
1008805-43 = "どんな格好でも、特に不満はないからね。"
1008805-44 = "自分には似合わないって思ったけど、服そのものが嫌いってわけでもないし。"
1008805-45 = "それに……"
1008805-50 = "先生が「似合う」って言ってくれたし……。"
1008805-51 = "お世辞じゃないってこと、私、信じるって決めたから……だから、こうしているわけ。"
1008805-56 = "[ns5] \"うん。本当に素敵だと思うから。\"\n[ns6] \"お世辞じゃないよ。本心だから。\""
1008805-61 = "……ほんと、思った通り。"
1008805-62 = "…………。"
1008805-63 = "……ふふ。"
1008805-64 = "そういえば、先生。今朝送ったメッセージ、まだ覚えてる？"
1008805-65 = "あとで時間ちょうだいって話。"
1008805-66 = "もし良かったら、今日はどう？前みたいに夕食とかしたいけど。"
1008805-67 = "ちょうど服も、あのときみたいになってるし……。"
1008805-68 = "……今回は、私が奢るから。"
1008805-69 = "[s7] \"食事なら、先生の私が買わないと。\"\n[s8] \"生徒に奢られるわけにはいかないからね。\""
1008805-72 = "ダメ。"
1008805-73 = "今回は私が買う。そうしなきゃ意味ないんだから。"
1008805-74 = "気にすることないって？"
1008805-75 = "そう言うと思ったよ。"
1008805-76 = "じゃあ私も、あのとき先生が言ったの、そのまま返そうかな。"
1008805-81 = "私の顔に免じて、ここは負けてあげて。生徒って、そういうものだからさ。"
1008805-85 = "[ns9] \"なるほど、そう来るのか……。\"\n[ns10] \"そこまで言われちゃぁ……。\""
1008805-86 = "……ふふ。"
1008805-87 = "……ふふ。"
1008805-88 = "どうやら効いたみたいね。"
1008805-89 = "本当に大したことじゃないから。ただ、一緒に食事をするだけ。"
1008805-90 = "そんなに気にすることないよ。こういう意地くらい、偶にはいいじゃん。"
1008805-91 = "……うん。今はこれで十分だから。"
1008805-95 = "その様子からして、オッケーってことでいいよね？"
1008805-96 = "良かった。そういう素直なところ、先生の長所でもあるからね。"
1008805-97 = "……ありがとう、先生。"
1008805-98 = "じゃあ……。"
1008805-104 = "……待っているからね。"
