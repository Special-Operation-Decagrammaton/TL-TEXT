[translation]
51130-1 = "Episódio 13; Kiryuu Kikyou e a Batalha de Sucessão (2)"
51130-8 = "*Haa... haa...*"
51130-9 = "[s] \"Yukari!\""
51130-10 = "E-Eu... estou bem..."
51130-11 = "V-Você precisava ir tão longe..."
51130-12 = "Isso não é crueldade demais!?"
51130-17 = "Esta é a batalha de sucessão da Hyakkaryouran."
51130-18 = "Agora você entendeu, esta é a realidade."
51130-19 = "Mesmo que você tivesse a 'Batalha de Sucessão' com a Nagusa-senpai, você não venceria."
51130-20 = "Seu desejo egoísta, no fim das contas, era só um sonho. #n Uma brincadeira solitária desde o começo."
51130-22 = "E-Eu..."
51130-23 = "Eu só..."
51130-24 = "Queria trazer de volta... aqueles dias em que éramos ativas na Hyakkaryouran..."
51130-26 = "Hah..."
51130-27 = "Não me faça rir."
51130-28 = "Dizendo que ia derrotar a Nagusa-senpai e se tornar a presidente..."
51130-29 = "Mas se você não consegue nem me derrotar, isso não pode nem ser chamado de sonho."
51130-30 = "......Diferente da Renge, eu não sou boazinha, então vou perguntar de uma vez."
51130-31 = "Você realmente acha que pode derrotar a Nagusa-senpai e trazer as coisas de volta ao que eram?"
51130-36 = "Não consegue responder, não é?"
51130-37 = "Pra começo de conversa, você só está na Hyakkaryouran #n como uma brincadeira até assumir os negócios da sua família."
51130-41 = "[ns1] \"Kikyou...\"\n[ns2] \"Isso é――\""
51130-44 = "Sensei da Schale, deixe-me perguntar uma coisa."
51130-45 = "Essa garota mimada aí pediu sua ajuda depois de te contar tudo?"
51130-46 = "Que ela é uma Kadenokouji e que tem o 'dever' de quem nasceu nessa família."
51130-47 = "――Mas que ela quer continuar as atividades na Hyakkaryouran por puro capricho."
51130-48 = "Você ouviu diretamente dela sobre essas circunstâncias familiares?"
51130-54 = "Claro que não."
51130-55 = "Porque tudo não passa de uma brincadeira."
51130-56 = "Você tem um lugar para voltar, mesmo se a Hyakkaryouran desaparecer."
51130-57 = "Você é diferente da gente desde o começo."
51130-58 = "Se coloque no nosso lugar por ter que aturar esse seu sonho inconsequente..."
51130-62 = "Sinceramente... me dá nojo. "
51130-63 = "Será que você pode acabar com essa brincadeira de garotinha mimada? #n E aí, já acordou do seu sonho?"
51130-64 = "............"
51130-66 = "Por que não admite logo?"
51130-67 = "Essa [ruby=·   ·   ·]brincadeira[/ruby] de Hyakkaryouran já acabou."
51130-68 = "Kikyou-senpai... você sempre... pensou isso de mim..."
51130-69 = "Isso mesmo. Você não sabe o quão irritante você era."
51130-70 = "Pelo visto você não tinha percebido."
51130-76 = "Desde o começo..."
51130-80 = "......Desde o começo, eu sabia que não tinha chance contra a Nagusa-senpai..."
51130-81 = "Que eu não tinha como vencer..."
51130-82 = "Eu já sabia disso..."
51130-83 = "............"
51130-84 = "[s] \"Yukari...\""
51130-88 = "Mesmo assim... mesmo assim, eu queria trazer de volta..."
51130-91 = "Por favor, sejam testemunhas da 'Batalha de Sucessão da Hyakkaryouran'!"
51130-93 = "Se a Batalha de Sucessão fosse aceita..."
51130-94 = "Se eu pudesse derrotar a Nagusa-senpai e assumir a posição de presidente..."
51130-98 = "Aquele dia... aquela época..."
51130-100 = "Eu achei que poderia recuperar aqueles dias pacíficos que passávamos juntas..."
51130-101 = "......Mas, tanto a Renge-senpai quanto a Kikyou-senpai..."
51130-102 = "Dizem que a Hyakkaryouran acabou... que não podemos mais voltar àqueles dias..."
51130-103 = "Eu só sentia falta do tempo que passávamos todas juntas...!"
51130-104 = "Ugh...!"
51130-109 = "......Sensei."
51130-110 = "Sinto muito... sinto muito mesmo... por causar tantos problemas."
51130-115 = "[ns] \"Espere! Yukari――\""
51130-117 = "Já que tudo acabou... por que ela tem que ir tão longe..."
51130-118 = "Estava óbvio que isso ia acontecer a partir do momento em que a Nagusa-senpai tentou devolver o 'Emblema'."
51130-119 = "E todas as outras diziam a mesma coisa... "
51130-120 = "Que esse era o fim da Hyakkaryouran, que tudo estava quebrado."
51130-121 = "Então, não é compaixão acabar com tudo antes que se quebre por completo...?"
51130-122 = "Antes que ela, que admirava a Nagusa-senpai mais do que ninguém, se machucasse ainda mais――"
51130-123 = "Para ela, que ainda tem um lugar para voltar... antes que se tornasse uma ferida profunda..."
51130-124 = "Por isso, foi melhor assim. #n Sim... assim é melhor."
51130-125 = "Aquilo que se quebrou uma vez não pode mais voltar à sua forma original."
51130-126 = "Portanto, só resta... eu, e isso é o bastante."
51130-128 = "[ns] \"Kikyou, você está errada.\""
51130-132 = "......?"
51130-133 = "[s] \"Isso não é algo que os outros possam decidir.\""
51130-135 = "[ns] \"Você realmente gosta da Hyakkaryouran, não é?\""
51130-136 = "Sim!"
51130-137 = "A Hyakkaryouran é――"
51130-138 = "Uma existência que eu admiro muito."
51130-140 = "[ns] \"Os sentimentos da Yukari pertencem a ela.\""
51130-141 = "......O que um forasteiro como você sabe sobre nós."
51130-146 = "Ehm... talvez eu não devesse me intrometer, mas..."
51130-147 = "......Até você."
51130-148 = "Quem decide qual é o seu próprio lugar..."
51130-153 = "Acho que não é outra pessoa, e sim ela mesma."
51130-159 = "Mesmo que você esteja pensando no bem da outra pessoa..."
51130-160 = "Acho que não se deve forçar isso nela. Pelo menos deveriam ter ouvido o que a outra pessoa tinha a dizer e discutido isso..."
51130-166 = "[ns] \"A Yukari também parecia saber que as chances de vitória eram mínimas.\""
51130-168 = "[ns] \"Mas ela com certeza só queria um motivo para ver todos novamente.\""
51130-169 = "......Não adianta me dizer isso agora."
51130-170 = "A Yukari já..."
51130-171 = "E além disso... eu não disse nada de errado――"
51130-172 = "[s] \"Você realmente acha que era só uma 'brincadeira', Kikyou?\""
51130-176 = "[ns3] \"Se você usou isso como desculpa achando que era para o bem dela...\"\n[ns4] \"Vocês só estão se machucando mutuamente.\""
51130-179 = "......!!"
51130-180 = "......Sensei! Não é hora para isso!"
51130-181 = "Kadenokouji-san... não, vamos atrás da Yukari-san!"
51130-182 = "[s] \"Certo. Vamos.\""
51130-200 = "......O que você quer que eu faça."
51130-205 = "............"
51130-206 = "Do que nós precisamos é. "
51130-207 = "Da Nagusa-senpai... e, no entanto."
51130-211 = "............"
51130-224 = "Renge...? Sim, sou eu."
51130-227 = "......Tsc!"
51130-228 = "Apanhar da Hyakkaryouran logo antes do festival, que droga!"
51130-233 = "Líder, vamos desistir logo..."
51130-234 = "É mesmo, vamos só curtir o festival de boa..."
51130-235 = "Concordo!"
51130-237 = "Hmm, acho que é melhor...?"
51130-238 = "Eu acho que alguma pessoa importante aí já disse pra 'saber a hora de parar'."
51130-243 = "(Quem será que foi...)"
51130-245 = "Porém!"
51130-246 = "Nós somos a Trupe Sudama, que faz até criança chorona rir! "
51130-251 = "(Isso parece que a gente tá sendo zoada...)"
51130-253 = "Não podemos recuar tão fácil assim...!"
51130-254 = "Como líder, eu tenho que dar o exemplo e não desistir nunca...!"
51130-255 = "Ninguém tá esperando isso de você, Líder..."
51130-259 = "O quê!? "
51130-263 = "E, eu sou contra os petelecos na testa!"
51130-264 = "Ugh... de qualquer forma, eu não vou conseguir dormir de tanta frustração se a gente deixar por isso mesmo!"
51130-269 = "......Ora, ora... isso é um problema, não é."
51130-270 = "Pensar que há pessoas sofrendo num dia de festival tão, tão feliz como este..."
51130-271 = "Sim. Eu sinto muito, mui~to mesmo."
51130-276 = "......Q-Quem tá aí!?"
51130-282 = "Posso oferecer uma ajudinha? #n Aceitam até ajuda de um gato, não é?"
51130-283 = "Fufu... embora eu não seja um gato."
51130-288 = "――Precisam de uma mãozinha felina?"
51130-290 = "Próximo Episódio; A Decisão de Uma Garota"
