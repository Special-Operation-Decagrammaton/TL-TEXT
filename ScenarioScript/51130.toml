[translation]
51130-1 = "Episódio 13; Kiryu Kikyou e a Batalha de Sucessão (2)"
51130-8 = "Haa... haa..."
51130-9 = "[s] \"Yukari!\""
51130-10 = "Eu, eu estou... estou bem..."
51130-11 = "Não, não havia necessidade de chegar a esse ponto..."
51130-12 = "Isso não é um pouco cruel demais!?"
51130-17 = "Esta é a Batalha de Sucessão do Hyakkiyako Ryoran."
51130-18 = "Entendeu agora? Esta é a realidade."
51130-19 = "Mesmo que você faça uma \"Batalha de Sucessão\" com a Nagusa-senpai, você não vai vencer."
51130-20 = "O seu egoísmo não passa de um sonho. #nDesde o início, não foi nada além de uma brincadeira de faz de conta."
51130-22 = "Eu, eu..."
51130-23 = "É que, eu..."
51130-24 = "Eu só queria recuperar aqueles dias em que atuávamos como o Hyakkiyako Ryoran com todas vocês..."
51130-26 = "Hah..."
51130-27 = "Não me faça rir."
51130-28 = "Você diz que vai derrotar a Nagusa-senpai e se tornar a presidente, mas..."
51130-29 = "Se você não consegue nem me vencer, isso nem pode ser chamado de sonho."
51130-30 = "...Diferente da Renge, eu não sou gentil, então vou perguntar claramente."
51130-31 = "Você realmente quer derrotar a Nagusa-senpai e fazer as coisas voltarem a ser como eram?"
51130-36 = "Não consegue responder, né?"
51130-37 = "Para começar, o fato de você estar no Hyakkiyako Ryoran é apenas um passatempo até você herdar a sua casa."
51130-41 = "[ns1] \"Kikyou...\"\n[ns2] \"Isso é...\""
51130-44 = "Vou perguntar uma coisa ao Sensei do Schale."
51130-45 = "Aquela senhorita ali te contou tudo antes de pedir sua ajuda?"
51130-46 = "Que ela é da família Kageyama e tem o \"dever\" de alguém nascida nessa linhagem."
51130-47 = "— Mas que, por puro egoísmo, ela quer continuar as atividades do Hyakkiyako Ryoran."
51130-48 = "Você ouviu sobre essas circunstâncias familiares diretamente da boca dela?"
51130-54 = "Claro que não, né?"
51130-55 = "Porque tudo isso não passa de um passatempo."
51130-56 = "Você tem um lugar para onde voltar, mesmo que o Hyakkiyako Ryoran deixe de existir."
51130-57 = "Desde o início, você é diferente de nós."
51130-58 = "Tente se colocar no meu lugar, tendo que acompanhar os sonhos ingênuos de alguém como você..."
51130-62 = "Sinceramente... chega a me dar ânsia."
51130-63 = "Não acha que já chega de brincadeiras de senhorita? #nEi, você já acordou desse sonho?"
51130-64 = "............"
51130-66 = "Por que não admite?"
51130-67 = "A brincadeira de Hyakkiyako Ryoran já acabou."
51130-68 = "Kikyou-senpai... você sempre me viu... dessa forma..."
51130-69 = "Exatamente. Você não faz ideia de quão irritante isso era."
51130-70 = "Pelo visto, você nem tinha percebido."
51130-76 = "Desde o início..."
51130-80 = "...Desde o início, eu sabia que não seria páreo para a Nagusa-senpai..."
51130-81 = "Que eu não tinha chance de vitória..."
51130-82 = "Eu estava ciente disso..."
51130-83 = "............"
51130-84 = "[s] \"Yukari...\""
51130-88 = "Mesmo assim... mesmo assim, eu queria recuperar..."
51130-91 = "Por favor, seja a testemunha da \"Batalha de Sucessão do Hyakkiyako Ryoran\"!"
51130-93 = "Se ao menos a Batalha de Sucessão for reconhecida..."
51130-94 = "Se eu conseguir derrotar a Nagusa-senpai e assumir o cargo de presidente..."
51130-98 = "Aquele dia... aquele momento..."
51130-100 = "Eu pensei que poderíamos recuperar os dias tranquilos que passávamos com todas vocês..."
51130-101 = "...Mas, a Renge-senpai e a Kikyou-senpai..."
51130-102 = "Disseram que o Hyakkiyako Ryoran já acabou... que não podemos mais voltar para aqueles dias..."
51130-103 = "Eu só... eu só sinto tanta falta do tempo que passávamos juntas...!"
51130-104 = "Ah...!"
51130-109 = "...Sensei."
51130-110 = "Sinto muito... por ter causado tantos problemas... eu realmente... sinto muito..."
51130-115 = "[ns] \"Espere! Yukari--\""
51130-117 = "Já acabou tudo, então por que ir tão longe..."
51130-118 = "No momento em que a Nagusa-senpai tentou devolver a \"Prova\", já estava claro que terminaria assim."
51130-119 = "Todas diziam a mesma coisa..."
51130-120 = "Que o Hyakkiyako Ryoran tinha acabado e que tudo tinha sido destruído."
51130-121 = "Sendo assim, não seria um ato de compaixão terminar tudo antes que fosse destruído por completo...?"
51130-122 = "Para que ela, que admirava a Nagusa-senpai mais do que ninguém, não se machucasse mais--"
51130-123 = "Ela ainda tem um lugar para onde voltar... antes que a ferida se torne profunda demais..."
51130-124 = "Por isso, foi melhor assim. #nSim... foi melhor assim."
51130-125 = "Algo que se quebrou uma vez não pode mais voltar à sua forma original."
51130-126 = "Portanto, que apenas eu... seja o suficiente para carregar isso."
51130-128 = "[ns] \"Kikyou, isso não é verdade.\""
51130-132 = "...?"
51130-133 = "[s] \"Isso não é algo que os outros devam decidir.\""
51130-135 = "[ns] \"A Yukari realmente ama o Hyakkiyako Ryoran, não é?\""
51130-136 = "Sim!"
51130-137 = "O Hyakkiyako Ryoran é--"
51130-138 = "Para mim, é uma existência que eu admiro."
51130-140 = "[ns] \"Os sentimentos da Yukari pertencem à Yukari, afinal.\""
51130-141 = "...O que um estranho como você poderia entender sobre nós?"
51130-146 = "Bem... talvez não seja da minha conta, mas..."
51130-147 = "...Até você."
51130-148 = "Eu acho que quem decide o seu próprio lugar..."
51130-153 = "Não é outra pessoa, mas você mesma."
51130-159 = "Só porque você está pensando no bem da outra pessoa..."
51130-160 = "Não significa que deva impor isso a ela... Eu acho que, pelo menos, seria melhor ouvir o lado dela e conversar..."
51130-166 = "[ns] \"A Yukari parecia saber que as chances de vitória eram pequenas.\""
51130-168 = "[ns] \"Mas, com certeza, ela queria um motivo para encontrar todas vocês.\""
51130-169 = "...Dizer isso agora não adianta nada."
51130-170 = "A Yukari já..."
51130-171 = "Além disso... eu não acho que disse algo errado--"
51130-172 = "[s] \"Chamar de 'brincadeira', a Kikyou realmente pensa assim?\""
51130-176 = "[ns3] \"Se isso for apenas uma fachada para proteger a outra pessoa...\"\n[ns4] \"Isso só vai acabar ferindo ambas.\""
51130-179 = "...!!"
51130-180 = "...Sensei! Não temos tempo para isso!"
51130-181 = "Kageyasu-san... não, vamos procurar a Yukari!"
51130-182 = "[s] \"Sim. Vamos lá.\""
51130-200 = "...O que você quer que eu faça?"
51130-205 = "............"
51130-206 = "O que nós precisamos."
51130-207 = "Nagusa-senpai... é de você."
51130-211 = "............"
51130-224 = "Renge...? Sim, sou eu."
51130-227 = "……Tsc!"
51130-228 = "Mesmo sendo véspera do festival, não acredito que fomos derrotadas pela Hyakkaryouran!"
51130-233 = "Líder, acho que já está na hora de desistir..."
51130-234 = "É verdade, vamos só aproveitar o festival normalmente..."
51130-235 = "Concordo plenamente!"
51130-237 = "Hmm, será que é isso mesmo que devemos fazer...?"
51130-238 = "Acho que alguém importante disse uma vez: 'saiba quando é o suficiente'."
51130-243 = "(Quem será que disse isso...)"
51130-245 = "Mas, ainda assim!"
51130-246 = "Nós somos a trupe Chimi, aquela que faz até as crianças chorosas rirem!"
51130-251 = "(Isso não soa como um insulto...?)"
51130-253 = "Não podemos recuar tão facilmente...!"
51130-254 = "Como líder, preciso dar o exemplo para vocês e não desistir...!"
51130-255 = "Não, ninguém espera isso da líder..."
51130-259 = "O que você disse!?"
51130-263 = "N-não me dê um peteleco!"
51130-264 = "Droga... de qualquer forma, não vou conseguir dormir de frustração desse jeito!"
51130-269 = "……Isso é, de fato... um problema."
51130-270 = "Em um dia tão, mas tão alegre de festival como este,#né lamentável ver alguém mergulhado em tristeza..."
51130-271 = "Sim. Eu, pessoalmente, estou muito, muito... decepcionada."
51130-276 = "……Q-quem está aí!?"
51130-282 = "Quer que eu lhe empreste minha força?#nVocê não está precisando de toda ajuda possível?"
51130-283 = "Hehe... embora eu não seja um gato, é claro."
51130-288 = "――Precisa de uma mãozinha?"
51130-290 = "Próximo episódio: A Determinação da Garota"
