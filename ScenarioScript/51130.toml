[translation]
51130-1 = "第13話;桐生キキョウと継承戦（２）"
51130-8 = "はぁ……はぁ……"
51130-9 = "[s] \"ユカリっ！\""
51130-10 = "み、身共は……大丈夫です、わ……"
51130-11 = "こ、ここまでする必要はないんじゃ……"
51130-12 = "ちょっと酷すぎませんか！？"
51130-17 = "これが百花繚乱の継承戦。"
51130-18 = "分かったよね、これが現実だよ。"
51130-19 = "ナグサ先輩と「継承戦」をしたところで、あんたじゃ勝てない。"
51130-20 = "あんたのわがままは所詮、夢物語。#n最初から独りよがりのままごとだったってこと。"
51130-22 = "み、身共、は…… "
51130-23 = "ただ、身共は……"
51130-24 = "皆様と百花繚乱として活動していたあの日々を……取り戻したくて……"
51130-26 = "ハッ……"
51130-27 = "笑わせないで。"
51130-28 = "ナグサ先輩を倒して委員長になる、だなんて言ってるけど……"
51130-29 = "私にも勝てないようじゃ、それは夢とすら言えない。"
51130-30 = "……私はレンゲと違って優しくないから、ハッキリ聞くよ。"
51130-31 = "本当にナグサ先輩を倒して、元に戻りたいと思ってる？"
51130-36 = "答えられないよね。"
51130-37 = "そもそも、あんたが百花繚乱に居るのだって、#n家を継ぐまでのお遊びなんだから。"
51130-41 = "[ns1] \"キキョウ……\"\n[ns2] \"それは――\""
51130-44 = "シャーレの先生に、一つ聞くけど。"
51130-45 = "そこのお嬢様は、あんたに全てを打ち明けた上で助けを求めたの？"
51130-46 = "自分は勘解由小路家の人間であり、家に生まれた者としての「義務」がある。"
51130-47 = "――けれど、自分のわがままで百花繚乱の活動を続けたいって。"
51130-48 = "そういった家の事情を、本人の口からちゃんと聞いた？"
51130-54 = "そんなわけないよね。"
51130-55 = "だって全部、お遊びなんだから。"
51130-56 = "あんたには、百花繚乱が無くなっても帰る場所がある。"
51130-57 = "初めから私たちとは違うの。"
51130-58 = "そんなあんたが語る、脳天気な夢につきあわされる身になってよ……"
51130-62 = "ほんと、正直……反吐が出る。 "
51130-63 = "お嬢様のお遊びはもうここまでにしといてくれないかな。#nねえ、そろそろ夢から覚めた？"
51130-64 = "…………。"
51130-66 = "認めたら？"
51130-67 = "百花繚乱[ruby=・   ・   ・]ごっこ[/ruby]は、もう終わったんだよ。"
51130-68 = "キキョウ先輩は……身共を、ずっとそんな風に……"
51130-69 = "そうだよ。どれだけ鬱陶しかったことか。"
51130-70 = "その様子じゃ、あんたは気づいてなかったみたいだけど。"
51130-76 = "最初から……"
51130-80 = "……最初から、身共ではナグサ先輩に歯が立たない事なんて……"
51130-81 = "勝ち目が、ないことなんて……"
51130-82 = "承知の上、でした……"
51130-83 = "…………。"
51130-84 = "[s] \"ユカリ……\""
51130-88 = "それでも……それでも、身共は取り戻したかったのです……"
51130-91 = "[ruby=ひゃっかりょうらんけいしょうせん]「百花繚乱継承戦」[/ruby]の証人となってくださいまし！"
51130-93 = "継承戦さえ認めてもらえれば……"
51130-94 = "ナグサ先輩を倒して、委員長の座に就くことさえできれば……"
51130-98 = "あの日……あの時を……"
51130-100 = "また皆様と過ごす穏やかな日々が取り戻せるのだと……"
51130-101 = "……ですが、レンゲ先輩も、キキョウ先輩も……"
51130-102 = "百花繚乱は、もう終わったのだと……もう、あの日々には戻れないのだと……"
51130-103 = "身共はただ、皆様と過ごしていた時間が恋しくて……！"
51130-104 = "っ……！"
51130-109 = "……先生。"
51130-110 = "ご迷惑をおかけして……本当に、申し訳……ありませんでした……っ。"
51130-115 = "[ns] \"待って！ユカリ――\""
51130-117 = "もう、何もかも終わったのに……どうしてあそこまで……"
51130-118 = "ナグサ先輩が「証」を返却しようとした時点で、こうなると分かりきっていたのに。"
51130-119 = "みんなも、口を揃えて言ってた…… "
51130-120 = "これで百花繚乱は終わり、全部壊れてしまったんだ、って。"
51130-121 = "なら、本当に壊れきってしまう前に終わらせるのが情というものでしょう……？"
51130-122 = "誰よりもナグサ先輩に憧れていた彼女が、これ以上傷つく前に――"
51130-123 = "まだ帰る場所がある、あの子には……深い傷になる前に……"
51130-124 = "だから、これで良かったの。#nそう……これで。"
51130-125 = "一度でも欠けてしまったものは、もう元の形には戻せない。"
51130-126 = "だから、残るのは……私だけで十分。"
51130-128 = "[ns] \"キキョウ、それは違うよ。\""
51130-132 = "……？"
51130-133 = "[s] \"それは他人が決めることじゃない。\""
51130-135 = "[ns] \"ユカリは本当に百花繚乱が好きなんだね。\""
51130-136 = "ええ！"
51130-137 = "百花繚乱は――"
51130-138 = "身共にとって、憧れの存在ですから。"
51130-140 = "[ns] \"ユカリの気持ちは、ユカリのものだからね。\""
51130-141 = "……余所者に一体私たちの何が分かるというの。"
51130-146 = "あのぉ……私が口を出すことではないかもしれませんが……"
51130-147 = "……あんたまで。"
51130-148 = "自分の居場所を決めるのは……"
51130-153 = "他の誰かじゃなくて、自分自身だと思います。"
51130-159 = "相手のためを思っているからといって……"
51130-160 = "それを押し付けるべきじゃ、ないと……思います。せめて、ちゃんと相手の言い分も聞いた上で、話し合ったほうがいいんじゃないかなって……。"
51130-166 = "[ns] \"ユカリも勝ち目が薄いことくらい分かってたみたいだからね。\""
51130-168 = "[ns] \"でもきっと、みんなに会う理由が欲しかったんだ。\""
51130-169 = "……今さら、そんな事を言われたって。"
51130-170 = "もう、ユカリは……"
51130-171 = "それに……私は間違った事を言ったとは――"
51130-172 = "[s] \"「お遊び」だなんて、本当にキキョウはそう思ってるの？\""
51130-176 = "[ns3] \"もしも、相手を思っての建前だとしたら……\"\n[ns4] \"それは互いを傷つけるだけだよ。\""
51130-179 = "……！！"
51130-180 = "……先生！こうしてる場合じゃ！"
51130-181 = "勘解由小路さん……いえ、ユカリさんを探しに行きましょう！"
51130-182 = "[s] \"うん。行こうか。\""
51130-200 = "……私にどうしろって言うの。"
51130-205 = "…………"
51130-206 = "私たちに必要なのは。 "
51130-207 = "ナグサ先輩……あんたなのに。"
51130-211 = "…………。"
51130-224 = "レンゲ……？うん、私。"
51130-227 = "……チッ！"
51130-228 = "お祭り前だっていうのに、百花繚乱にやられっぱなしなんて！"
51130-233 = "リーダー、そろそろ諦めましょうよぉ……"
51130-234 = "そうっすよ、もう普通にお祭りを楽しみましょうよ……"
51130-235 = "同意見っす！"
51130-237 = "ん～、やっぱそうするか……？"
51130-238 = "どこかの偉い人が「足るを知れ」って言ってた気がするし。"
51130-243 = "（誰だろう……）"
51130-245 = "だがしかし！"
51130-246 = "我らは泣く子も笑う[ruby=すだまいちざ]魑魅一座[/ruby]！ "
51130-251 = "（それってバカにされてるんじゃ……）"
51130-253 = "そう簡単に引き下がるわけには……！"
51130-254 = "ここはリーダーとして、諦めない姿でお前たちの手本に……！"
51130-255 = "いや、誰もリーダーにそんな期待は……"
51130-259 = "んだとっ！？ "
51130-263 = "で、デコピン反対っ！"
51130-264 = "くっ……ともかく、このままじゃ悔しくて眠れやしねぇ！"
51130-269 = "……それはそれは……困りますねぇ。"
51130-270 = "このように、とてもとても喜ばしいお祭りの日に、#n悲しみに暮れている方がいるだなんて……"
51130-271 = "ええ。手前、とても、とて～も……残念です。"
51130-276 = "……だ、誰だ！？"
51130-282 = "お力、お貸ししますよぉ？#n猫の手も借りたいのでしょ？"
51130-283 = "ふふっ……手前は猫じゃありませんけどもね。"
51130-288 = "――猫の手、ご入用です？"
51130-290 = "次回;少女の決心"
