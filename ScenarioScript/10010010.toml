[translation]
10010010-1 = "Episódio 1; Secretamente, de alguma forma..."
10010010-5 = "……Entendo."
10010010-6 = "Então foi por isso que vocês vieram até aqui. O livro em questão é este..."
10010010-7 = "Não, na verdade, é o que 'costumava ser um livro'..."
10010010-8 = "Uuu, me desculpe! Sinto muito mesmo...!!"
10010010-9 = "N-não, veja bem, eu não estou te culpando..."
10010010-10 = "P-primeiro, vamos nos acalmar, Hinata-san...!"
10010010-15 = "……E acima de tudo, por favor, fale um pouco mais baixo na biblioteca."
10010010-17 = "S-sim..."
10010010-19 = "Ufa. De qualquer forma, se continuarmos assim, algo terrível vai acontecer..."
10010010-20 = "Isso é algo extremamente importante para Trinity, e se descobrirem que as escrituras foram perdidas, imagine só o tamanho da confusão..."
10010010-24 = "Ah, falando nisso, o que aconteceu com a caixa?"
10010010-25 = "Pelo que ouvi até agora, não havia uma caixa para guardá-lo...?"
10010010-26 = "……Eh. No altar da catedral, onde será a cerimônia?"
10010010-27 = "Você quer dizer que deixou a caixa lá, mas vazia?"
10010010-28 = "……Entendo. Como ficaria óbvio que estava vazia ao toque, você colocou o 'Kamasutra' no lugar, é isso?"
10010010-29 = "Certamente isso enganaria alguém por um tempo, mas... hum..."
10010010-34 = "……Eh?"
10010010-35 = "……Você acabou de dizer 'Kamasutra'? P-por que...!?"
10010010-36 = "[s] \"Digamos que era o que eu tinha à mão...\""
10010010-37 = "É esse o tipo de livro que você tem à mão!?"
10010010-38 = "Por que o 'Kamasutra'!? Ah, não, não é que eu queira questionar isso, mas...!"
10010010-39 = "Espera, o Sensei estava guardando algo que a Hanako-san tinha...?"
10010010-40 = "[s1] \"Houve uma confusão na hora e acabou acontecendo um acidente...\"\n[s2] \"Não foi culpa da Hinata, foi porque eu estava segurando...\""
10010010-41 = "O-o que você quer dizer com isso..."
10010010-42 = "O-o que você quer dizer com isso..."
10010010-46 = "D-de qualquer forma, eu gostaria de trocar por outro livro imediatamente, mas..."
10010010-47 = "Se invadirmos o local várias vezes, as chances de sermos pegos pela segurança aumentam... e, contanto que as escrituras voltem ao normal, é um fato que, por enquanto, 'não importa o que esteja dentro da caixa'."
10010010-51 = "Restaurar essas escrituras despedaçadas antes da cerimônia e devolvê-las ao local. Se não conseguirmos fazer isso..."
10010010-66 = "A Sakurako-san vai acabar lendo o 'Kamasutra' na frente de todo mundo..."
10010010-67 = "N-não podemos deixar a Sakurako-sama passar por isso..."
10010010-69 = "Eu também não gostaria que isso causasse uma divisão em Trinity... Já que vocês confiaram em mim para pedir conselhos, eu vou dar uma mãozinha."
10010010-70 = "Eu realmente gostaria de dizer isso, mas, hum..."
10010010-76 = "Sinto muito, mas com a minha habilidade, isso é um pouco..."
10010010-77 = "Como bibliotecária, eu até faço alguns tipos de 'restauração de livros danificados', mas isso é apenas no nível de uma bibliotecária comum..."
10010010-78 = "Com esse nível de dano, não acho que esteja ao meu alcance..."
10010010-79 = "Mais do que uma 'restauração', isso é uma 'reconstituição'... parece difícil se não pedirmos a um 'especialista' de verdade."
10010010-80 = "[s3] \"Entendo...\"\n[s4] \"Um 'especialista'... ?\""
10010010-81 = "Sim. Se a 'restauração' é como colocar um curativo ou passar pomada em um ferimento, a 'reconstituição' seria como uma cirurgia de verdade..."
10010010-82 = "Sim. Se a 'restauração' é como colocar um curativo ou passar pomada em um ferimento, a 'reconstituição' seria como uma cirurgia de verdade..."
10010010-83 = "Portanto, acredito que seja uma área que exige um 'especialista' no assunto, e não uma bibliotecária como eu."
10010010-88 = "Além disso, este livro é um 'livro antigo'... em certo sentido, pode ser considerado uma 'relíquia antiga'."
10010010-89 = "Mesmo que tentássemos reconectar as páginas rasgadas, primeiro precisaríamos ser capazes de decifrar este documento antigo."
10010010-92 = "Não há muitas pessoas em Trinity... ou talvez em todo o Kivotos, que sejam capazes de realizar um trabalho desses."
10010010-93 = "V-você quer dizer que é impossível...!?"
10010010-94 = "Uuu! S-se continuar assim...!!"
10010010-95 = "Ah, Hinata-san."
10010010-96 = "……?"
10010010-98 = "……Silêncio."
10010010-100 = "Desculpe..."
10010010-101 = "[s5] \"Como esperado da Shimiko.\"\n[s6] \"Que incrível...\""
10010010-105 = "Ufa..."
10010010-106 = "Voltando ao assunto, não é como se não houvesse nenhum método."
10010010-107 = "Ou melhor, um contato... existe uma pessoa. Alguém capaz de restaurar isto."
10010010-108 = "Como posso dizer... é alguém um pouco difícil de pedir favores... alguém que conhece livros antigos como ninguém, que tem mais experiência nisso do que qualquer outra pessoa, e que não vejo o rosto há algumas semanas."
10010010-109 = "[s7] \"...?\"\n[s8] (Aquela última parte me deixou curiosa)"
10010010-110 = "É uma pessoa incrível, isso é certo. Afinal, ela é chamada de \"A Maga da Biblioteca Antiga\"."
10010010-111 = "É uma pessoa incrível, isso é certo. Afinal, ela é chamada de \"A Maga da Biblioteca Antiga\"."
10010010-112 = "Claro, ela não usa magia de verdade, mas é um \"apelido\" dado devido à sua habilidade e à forma como resolve problemas."
10010010-113 = "Só que, bem..."
10010010-115 = "Hmm..."
10010010-116 = "Ela é um pouco tímida, ou melhor, tem muita cautela com os outros, ou talvez deteste o sol..."
10010010-117 = "Basicamente, ela vive trancada na biblioteca antiga e quase nunca sai..."
10010010-118 = "Ela não é boa com relações interpessoais, ou a sua sociabilidade é... não, claro que ela não é uma má pessoa, mas..."
10010010-120 = "Bem, não adianta esconder."
10010010-121 = "Essa pessoa pertence ao mesmo \"Comitê de Biblioteca\" que eu, e é a líder..."
10010010-123 = "É a Presidente Ui."
