[translation]
10010010-1 = "第1話;秘密裏に何とか……"
10010010-5 = "……なるほど。"
10010010-6 = "そういった経緯でこちらにお越しになったと。その実際の本が、こちら……"
10010010-7 = "いえ、最早「本だったもの」ですね……。"
10010010-8 = "うぅ、すみません！本当にすみません……！！"
10010010-9 = "い、いえその、責めているわけではなく……。"
10010010-10 = "ま、まずは落ち着きましょうヒナタさん……！"
10010010-15 = "……あと何より、図書館ではもう少し声のボリュームを小さく。"
10010010-17 = "は、はい……。"
10010010-19 = "ふぅ。とにかく、このままでは大変なことになりますね……"
10010010-20 = "トリニティとしても相当重要なものですし、万が一経典が失われたなんてことが発覚したら、どれだけの騒ぎになることか……。"
10010010-24 = "あれ、そういえば箱はどうしたんですか？"
10010010-25 = "今までの話を聞く限り、入れ物の箱があったのでは……？"
10010010-26 = "……え。式典会場である、聖堂の祭壇に？"
10010010-27 = "中身が空のまま、箱だけ置いてきたということですか？"
10010010-28 = "……なるほど。空っぽだと触っただけでバレるので、代わりに『カーマスートラ』を入れてきた、と。"
10010010-29 = "確かにそれなら、少しはごまかせますが……うーん……。"
10010010-34 = "……え？"
10010010-35 = "……今、『カーマスートラ』って言いました？ど、どうして……！？"
10010010-36 = "[s] \"ちょうどあったっていうか……。\""
10010010-37 = "ちょうど持ってるような本ですかそれ！？"
10010010-38 = "どうして『カーマスートラ』を！？ああいえ、そちらをツッコみたかったわけではないのですが……！"
10010010-39 = "え、ハナコさんが持っていたもの先生が預かっていて……？"
10010010-40 = "[s1] \"ちょっとその場でバタバタしたこともあって、アクシデントが……。\"\n[s2] \"ヒナタのせいじゃなくって、私が持ってたせいで……。\""
10010010-41 = "ど、どういうことなんですかそれは……。"
10010010-42 = "ど、どういうことなんですかそれは……。"
10010010-46 = "と、とにかく今すぐにでも、それ以外の他の本に入れ替えたいところですが……。"
10010010-47 = "何度も忍び込めば、警備にバレる可能性も上がりますし……経典さえ元通りになれば、少なくとも今はまだ「代わりに箱に何が入っていても問題無い」というのは一応事実です。"
10010010-51 = "この粉々になった経典を式典までに「復元」して、会場に戻す。それができなければ……"
10010010-66 = "サクラコさんが公衆の面前で『カーマスートラ』を読む、と……。"
10010010-67 = "さ、サクラコ様に、そんなことをさせるわけには……。"
10010010-69 = "私としても、それでトリニティが分裂するような騒動になるのは嫌ですね……信用して相談してくださったことですし、私も一肌脱ぎましょう。"
10010010-70 = "と、言いたい気持ちは本当なのですが、うーん……。"
10010010-76 = "すみません、私の実力ではちょっと……。"
10010010-77 = "私も司書として、ある程度「壊れた本の修復」などは行うのですが、あくまで普通の司書のレベルと言いますか……。"
10010010-78 = "ここまでの破損状態ですと、私の手に負えるとはとても……。"
10010010-79 = "「修復」というより「復元」ですし……私よりもちゃんとした、「専門家」にお願いしないと難しそうです。"
10010010-80 = "[s3] \"なるほど……。\"\n[s4] \"「専門家」……？\""
10010010-81 = "はい。「修復」が傷口に絆創膏を貼ったり、薬を塗るようなものだとすると、「復元」は本格的な手術と言いましょうか……。"
10010010-82 = "はい。「修復」が傷口に絆創膏を貼ったり、薬を塗るようなものだとすると、「復元」は本格的な手術と言いましょうか……。"
10010010-83 = "ですので司書の私ではなく、その分野の「専門家」が必要な領域かと。"
10010010-88 = "それにこの本は「古書」……ある意味では「古代の遺物」とも言えるものです。"
10010010-89 = "破れたページを繋ぎ直そうにも、そもそもこの古文書の解読が出来なくてはなりません。"
10010010-92 = "こんな作業ができるのは、トリニティ……いえ、もしかしたらキヴォトス全体でもそう多くないかもしれません。"
10010010-93 = "つ、つまり無理ということでしょうか……！？"
10010010-94 = "ううっ！こっ、このままでは……！！"
10010010-95 = "あ、その、ヒナタさん。"
10010010-96 = "……？"
10010010-98 = "……お静かに。"
10010010-100 = "すみません……。"
10010010-101 = "[s5] \"さすがはシミコ。\"\n[s6] \"強い……。\""
10010010-105 = "ふぅ……。"
10010010-106 = "話を戻しますと、方法が全く無いわけではありません。"
10010010-107 = "伝手と言いますか……ひとり、いますので。これを修復可能な方が。"
10010010-108 = "何と言いますかその、やや頼みにくい方ではありますが……古書をこの上なく知り尽くし、誰よりもこの種の経験を積み、そしてもう数週間も顔を見ていない方が。"
10010010-109 = "[s7] \"……？\"\n[s8] （最後の方に、気になる言葉が）"
10010010-110 = "すごい方なのは確かです。「古書館の魔術師」と呼ばれるくらいですから。"
10010010-111 = "すごい方なのは確かです。「古書館の魔術師」と呼ばれるくらいですから。"
10010010-112 = "もちろん実際に魔法を使うわけではないのですが、その技量や問題解決の様から付けられた「あだ名」です。"
10010010-113 = "ただ、その……。"
10010010-115 = "うーん……。"
10010010-116 = "ちょっと人見知りと言いますか、他者への警戒が強いと言いますか、太陽嫌いと言いますか……。"
10010010-117 = "基本的に古書館に引きこもっていて、ほとんど外に出ないタイプでして……。"
10010010-118 = "対人関係が苦手、あるいは社会性がその……いえ、もちろん悪い方ではないのですが……。"
10010010-120 = "まあ、隠していても仕方ありませんね。"
10010010-121 = "その方は私と同じ「図書委員会」所属、そのトップ……"
10010010-123 = "ウイ委員長、です。"
