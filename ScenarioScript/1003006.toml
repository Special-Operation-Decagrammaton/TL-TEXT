[translation]
1003006-1 = "ふたりだけの"
1003006-2 = "あっ、先生。お疲れ様です。"
1003006-3 = "はい、こちらの旅館です。宿泊で予約をしておきました。"
1003006-4 = "ここはゲヘナにおいても指折りの由緒ある旅館で、キヴォトス全域からお客様が後を絶たないため、普段であれば予約すらままならないほどらしいんです。"
1003006-5 = "しかし幸いにも、風紀委員会として融通していただけたと言いますか、ちょっとした伝手で一泊分取っていただけました。"
1003006-6 = "[s1] \"そんなに素敵なところなのに、私が貰って大丈夫？\"\n[s2] \"ちょっと緊張してきた……。\""
1003006-7 = "先生からこれまでしていただいたことを考えると、これでは足りないくらいです。"
1003006-8 = "先生からこれまでしていただいたことを考えると、これでは足りないくらいです。"
1003006-9 = "しかし、ご多忙の先生から何日もお時間を頂くわけにもいきませんから、取り急ぎ一泊ということで。"
1003006-10 = "それに……そもそもこの旅館はどうやら、ひとりでの宿泊というのができないようでして……。"
1003006-11 = "誰かと一緒にということを考えたら、やはり、その……"
1003006-12 = "[s] \"じゃあ、ご厚意に甘えさせてもらおうかな。\""
1003006-13 = "はい、是非。今日は私が誠心誠意、先生のことをおもてなしいたします。"
1003006-19 = "いらっしゃいませ、本日はお越しいただき誠にありがとうございます。"
1003006-20 = "本日一泊でご予約の、[ruby=ひのみや]火宮[/ruby]チナツ様でお間違い無いでしょうか？"
1003006-21 = "はい、二名分で夕食と宿を。"
1003006-22 = "確認いたしました、ありがとうございます。"
1003006-23 = "ところでお客様。ただいま当旅館ではカップルのお客様に、貸切の露天風呂を無料でご提供しております。"
1003006-24 = "かなり豪華な露天風呂ですので、ぜひいかがでしょうか？"
1003006-25 = "かっ、カップルですか……！？"
1003006-26 = "は、はい。ご予約では、カップル専用プランをお選びいただいておりましたので……"
1003006-27 = "もしかして、予約に何か不備等ございましたでしょうか……？"
1003006-28 = "（そ、そんな……できるだけ早くと思い慌てて予約したせいで、プランの確認を怠ってしまった……？）"
1003006-29 = "（せ、先生とカップルだなんて……先生は、どう思って……）"
1003006-30 = "えっと、その、実は私が間違えて……。"
1003006-31 = "では、お二方はカップルではなく……？"
1003006-32 = "[s3] \"いえ、間違ってません。\"\n[s4] \"すみません、まだ慣れていないだけで。\""
1003006-35 = "せ、せせせ先生！？"
1003006-36 = "なるほど、左様でしたか。"
1003006-37 = "仲が良いようで羨ましいです。それではお伝えした通り、貸切の露天風呂をご用意いたしますね。"
1003006-38 = "露天風呂はすぐ裏手にございますので、お好きなタイミングでご利用なさってください。"
1003006-43 = "せ、先生！？どうしてあのような……！？"
1003006-44 = "……え？せっかく豪華な旅館で露天風呂なんだから、もったいない……？"
1003006-45 = "そ、それはそうですが……"
1003006-46 = "ふたりで貸切風呂というのはつまり、一緒にお風呂に入るという……。"
1003006-47 = "ま、まさかこんなことになるなんて……！"
1003006-51 = "あ……いえ、その、お気になさらず……。"
1003006-52 = "今日は先生への恩返しですから。その、私が駄々をこねてご迷惑をおかけするわけにはいきません。"
1003006-53 = "夕食まで少し時間がありますし……"
1003006-59 = "先生さえよろしければ、その……お風呂、一緒に入りますか？"
1003006-62 = "[wa:750]― こんなに[wa:400]豪華な温泉を[wa:1350]ふたりだけでだなんて……"
1003006-64 = "― 人生、[wa:900]何が起こるか[wa:600]分からないものですね。"
1003006-67 = "[wa:480]― いつかは……[wa:1800]もしかしたら、[wa:1820]こんな未来も……"
1003006-70 = "[wa:200]― あ、[wa:650]い、[wa:500]いえ！[wa:800]気にしないでください……！"
1003006-73 = "[wa:1300]― いえその、[wa:1350]もし[wa:650]本当にそうなれたら、[wa:1650]と……"
1003006-76 = "― そんな素敵な日々のことを、[wa:2200]想わないわけでは、"
1003006-78 = "[wa:50]― ないのですが…………。"
1003006-81 = "[wa:750]― 生徒と先生で、"
1003006-83 = "[wa:150]― 今は、[wa:950]十分すぎるほど幸せなんです。[wa:2750]本当に……"
1003006-86 = "ふふっ、良いお湯でしたね……。"
1003006-87 = "何だか、ここしばらくの疲れが一気に流し出されたようです。"
1003006-88 = "先生、この後はどうしますか？"
1003006-89 = "この旅館には温泉以外にも、色々と面白い施設がたくさんあるようでして……。"
1003006-90 = "……え？少ししたらもう一度お風呂に……？"
1003006-94 = "……でしたら、私も先生と一緒に入ります。"
1003006-95 = "先生が無茶をされて、万が一のぼせたりしたら大変ですからね。"
1003006-96 = "ゲヘナの救護担当として……それに今はその、カップルですし……先生のことは、私が守ります。"
1003006-98 = "その後のぼせる寸前まで、チナツと一緒に露天風呂を楽しんだ。"
