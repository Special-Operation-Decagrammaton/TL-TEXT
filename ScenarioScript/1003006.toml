[translation]
1003006-1 = "Apenas nós dois"
1003006-2 = "Ah, Sensei. Bom trabalho."
1003006-3 = "Sim, é esta pousada. Fiz uma reserva para passarmos a noite."
1003006-4 = "Esta é uma das pousadas mais tradicionais de Gehenna, e como recebe clientes de todo o Kivotos sem parar, dizem que normalmente é quase impossível conseguir uma reserva."
1003006-5 = "Mas, felizmente, como o Comitê de Disciplina conseguiu dar um jeitinho, ou melhor, graças a alguns contatos, conseguimos uma vaga para uma noite."
1003006-6 = "[s1] \"É um lugar tão maravilhoso, tem certeza de que posso aceitar?\"\n[s2] \"Estou começando a ficar um pouco nervosa...\""
1003006-7 = "Considerando tudo o que o Sensei fez por mim até agora, isso ainda não é o suficiente."
1003006-8 = "Considerando tudo o que o Sensei fez por mim até agora, isso ainda não é o suficiente."
1003006-9 = "Mas, como o Sensei é muito ocupado, não posso tomar muito do seu tempo, então será apenas uma noite por enquanto."
1003006-10 = "Além disso... pelo que parece, esta pousada não permite reservas para apenas uma pessoa..."
1003006-11 = "E pensando em vir com alguém, bem, eu..."
1003006-12 = "[s] \"Então, acho que vou aceitar sua gentileza.\""
1003006-13 = "Sim, por favor. Hoje, eu cuidarei de você com toda a minha sinceridade, Sensei."
1003006-19 = "Sejam bem-vindos, muito obrigado por virem hoje."
1003006-20 = "A reserva para esta noite está no nome de Hinomiya Chinatsu, correto?"
1003006-21 = "Sim, jantar e hospedagem para duas pessoas."
1003006-22 = "Confirmado, muito obrigado."
1003006-23 = "A propósito, clientes. Atualmente, estamos oferecendo um banho termal ao ar livre privativo gratuitamente para casais."
1003006-24 = "É um banho termal bastante luxuoso, que tal aproveitar?"
1003006-25 = "Ca-casal...!?"
1003006-26 = "Si-sim. Na reserva, vocês selecionaram o plano exclusivo para casais, então..."
1003006-27 = "Por acaso, houve algum erro na reserva...?"
1003006-28 = "(Não pode ser... Como eu estava com pressa para reservar o quanto antes, acabei não conferindo o plano...)"
1003006-29 = "(Um casal com o Sensei... O que o Sensei deve estar pensando...)"
1003006-30 = "Bem, na verdade, eu cometi um erro..."
1003006-31 = "Então, vocês dois não são um casal...?"
1003006-32 = "[s3] \"Não, não houve erro.\"\n[s4] \"Desculpe, é que ainda não estamos acostumados.\""
1003006-35 = "Se-se-se-Sensei!?"
1003006-36 = "Entendo, era isso então."
1003006-37 = "É invejável ver como vocês são próximos. Então, como mencionei, prepararei o banho termal privativo para vocês."
1003006-38 = "O banho termal fica logo atrás, podem usar quando quiserem."
1003006-43 = "Se-Sensei!? Por que você disse aquilo...!?"
1003006-44 = "...Eh? Já que estamos em uma pousada luxuosa com um banho termal, seria um desperdício...?"
1003006-45 = "Is-isso é verdade, mas..."
1003006-46 = "Um banho privativo para dois significa, basicamente, tomar banho juntos..."
1003006-47 = "Não acredito que isso foi acontecer...!"
1003006-51 = "Ah... não, bem, não se preocupe com isso..."
1003006-52 = "Hoje é uma forma de retribuir ao Sensei. Eu não posso causar problemas fazendo birra."
1003006-53 = "Ainda temos um tempo até o jantar..."
1003006-59 = "Se o Sensei não se importar, bem... quer entrar no banho comigo?"
1003006-62 = "[wa:750]― Um banho termal tão [wa:400]luxuoso [wa:1350]apenas nós dois..."
1003006-64 = "― Na vida, [wa:900]nunca sabemos [wa:600]o que pode acontecer."
1003006-67 = "[wa:480]― Algum dia... [wa:1800]quem sabe, [wa:1820]talvez um futuro assim..."
1003006-70 = "[wa:200]― Ah, [wa:650]n- [wa:500]não! [wa:800]Não leve a mal...!"
1003006-73 = "[wa:1300]― Não, é que, [wa:1350]se [wa:650]realmente pudéssemos ser assim, [wa:1650]eu pensei..."
1003006-76 = "― Não é que eu não [wa:2200]pense em dias tão maravilhosos,"
1003006-78 = "[wa:50]― mas............"
1003006-81 = "[wa:750]― Como aluna e professor,"
1003006-83 = "[wa:150]― agora, [wa:950]já sou feliz o suficiente. [wa:2750]De verdade..."
1003006-86 = "Fufu, a água estava ótima, não é..."
1003006-87 = "Sinto como se todo o cansaço que acumulei ultimamente tivesse sido levado embora de uma vez."
1003006-88 = "Sensei, o que faremos agora?"
1003006-89 = "Parece que este ryokan tem várias instalações interessantes além das fontes termais..."
1003006-90 = "……Eh? Você quer entrar no banho de novo daqui a pouco...?"
1003006-94 = "……Nesse caso, eu entrarei com você, Sensei."
1003006-95 = "Seria um problema se você exagerasse e acabasse passando mal pelo calor, não é?"
1003006-96 = "Como responsável pela ala médica de Gehenna... e além disso, agora somos, bem, um casal... eu vou cuidar de você, Sensei."
1003006-98 = "Depois disso, aproveitei o banho ao ar livre com Chinatsu até quase ficarmos tontos de tanto calor."
