[translation]
1013702-1 = "自己紹介は丁寧に"
1013702-2 = "（ヴァルキューレを訪れると……）"
1013702-3 = "こんにちは、先生！"
1013702-4 = "どうかされたんですか？"
1013702-5 = "[s1] \"コノカに相談があってね。\"\n[s2] \"どこにいるか知ってる？\""
1013702-8 = "あ、副局長でしたら出勤されているんですが……。"
1013702-9 = "今は他の[ruby=・]お[/ruby][ruby=・]仕[/ruby][ruby=・]事[/ruby]中で……地下にいると思います。"
1013702-10 = "[s] \"地下？\""
1013702-11 = "はい。地下でやる作業もあるので……。"
1013702-13 = "[ns3] \"ここは……留置場？\"\n[ns4] \"一体何の仕事を……。\""
1013702-16 = "ガー……クゴー……。"
1013702-17 = "（誰かのいびきが聞こえてきた）"
1013702-18 = "ゴガー……グー……。"
1013702-19 = "ガー……うおぉ……か、かかってこーい！#n……グゴー……。"
1013702-20 = "[ns5] \"コノカ……？\"\n[ns6] \"どうして留置場に……？\""
1013702-26 = "う、うわああっ！！！"
1013702-27 = "コラーッ！す、砂を撒くなんて卑怯な……。"
1013702-28 = "って、夢か……くっ、あとちょっとだったのに……。"
1013702-29 = "あれ？"
1013702-34 = "[ns] \"お、おはよう、コノカ……。\""
1013702-35 = "なんだ……まだ夢の中か……。"
1013702-36 = "最近先生が夢に出てくるんだよなぁ～"
1013702-37 = "[ns] \"現実だよ！起きて！\""
1013702-38 = "ふわぁ～あ……むにゃむにゃ……。"
1013702-39 = "うーん……？#nあー、寝落ちてたっす。"
1013702-40 = "[s7] \"それで、釈放はいつなの？\"\n[s8] \"本当にカツ丼って出てくるの？\""
1013702-43 = "あー、違うっす！違うっす！#n捕まってるんじゃなくて……いやほんと大したことじゃないんですけど。"
1013702-44 = "昨日、ちょーっとしたケンカがありまして……。"
1013702-45 = "出動したらいざこざに発展しちゃって……#nんで、明け方に退勤したばっかなんすよ。"
1013702-46 = "だから、ちょーっと仮眠しようと思ったんすけど……局内って騒がしいでしょ？#nだからここで寝てたんす。"
1013702-47 = "新入りの歓迎会やったり、顔合わせやらなんやらしないとなんですけど……#nど～にも忙しくて……。"
1013702-48 = "あ、そうだ。行政の手続きでしたよね？#n少々お待ちを～取ってくるっす。"
1013702-49 = "えーと……鍵は～～ど～こだっけかなぁ～"
1013702-56 = "て、手を上げろ！鉄格子から離れろ！#n動いたら撃つ！"
1013702-60 = "はぇ？"
1013702-61 = "警告はしたぞ！#n鍵に触れるな！"
1013702-62 = "先生も下がってください！#nどう見ても凶悪犯です！"
1013702-63 = "[s9] \"誤解だよ！\"\n[s10] \"そうかもしれないけど、誤解だよ！\""
1013702-66 = "あれ、あんた今回入局したヤツじゃない？#n名簿にいたよね。"
1013702-67 = "ていうか、あたし公安局の副局長なんだけど！？"
1013702-68 = "公安局！？#n副局長を騙るとは……！"
1013702-69 = "副局長とお会いしたことはないが、断じてお前などではないことだけは分かっている！"
1013702-70 = "モモトークで副局長に言いつけてやる！"
1013702-74 = "ほら、送ったぞ！"
1013702-79 = "んで、だーれが副局長を騙ってるって？"
1013702-80 = "えっと……。"
1013702-81 = "こちら公安ヒトフタマル！！容疑者が副局長の携帯を所持している模様！！"
1013702-82 = "いや、なんでよ！？"
1013702-83 = "副局長がそんな格好しているわけがないだろう！！"
1013702-84 = "最終警告だ！脱獄犯め！大人しく投降しろ！"
1013702-85 = "脱獄犯！？疑うのはいいことだけどさぁ……。#nカンナ局長とご飯もお風呂も一緒に行く脱獄犯がキヴォトスのどこにいるっつーの！"
1013702-86 = "く、来るな！催涙スプレー！！"
1013702-93 = "ぎゃああああっ！！め、目がぁ――！！！"
1013702-94 = "人が大人しくしていれば……！"
1013702-95 = "な、なんで効かないんだ！？"
1013702-96 = "訓練してるからに決まってるっしょ！催涙剤でうがいだってできるわい！#nあたしは[ruby=しま]志真[/ruby]コノカ――"
1013702-97 = "うるさい！テーザーガンを喰らえーっ！！！"
1013702-99 = "公安局の副局――あびゃぁっ――！！！"
1013702-103 = "長……なんす……けど……。"
1013702-105 = "こちら公安ヒトフタマル、地下留置場にて容疑者を逮捕しました！！"
1013702-109 = "あー……そういえば……今日の占い……自己紹介をちゃんとする、だったなぁ。"
1013702-111 = "（その後、駆けつけてきた公安局の後輩が、コノカの身分を証明してくれた）"
1013702-112 = "（新人は顔を真っ青にしながら謝っていた。コノカは特に気にした様子もなく笑って許していた）"
1013702-113 = "（催涙スプレーの影響なのか明後日の方を見ているコノカだったが、どこか機嫌がよさそうに見えた）"
