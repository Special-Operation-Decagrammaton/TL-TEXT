[translation]
10030005-1 = "Prólogo; Resoluções de Ano Novo"
10030005-2 = "Veritas - Sala de Descanso"
10030005-7 = "……Maki, como está a situação por aí?#nAcho que este bloco já era em termos de recursos."
10030005-8 = "Sim, aqui também. Parece que o que encontramos agora há pouco é tudo o que dá para usar."
10030005-9 = "Kotama-senpai, como está o progresso do circuito lógico?"
10030005-16 = "……Está mais complexo do que eu pensava.#nCom a última atualização, algumas regras mudaram e blocos desnecessários estão sendo gerados."
10030005-17 = "Ao que parece, será uma batalha difícil."
10030005-18 = "Droga... então realmente vai ser difícil terminar antes da virada do dia..."
10030005-19 = "Mas não podemos desistir.#nNão podemos desperdiçar todo o esforço que dedicamos a este plano."
10030005-21 = "É verdade. Vou ajudar esta noite também, então—"
10030005-30 = "Vocês..."
10030005-34 = "Ah, Chihiro-senpai! Bem-vinda de volta!"
10030005-35 = "Bem-vinda, senpai. Não é muito raro a gente se encontrar na sala do clube?"
10030005-36 = "Faz tanto tempo que eu quase esqueci o seu rosto."
10030005-38 = "Bem, é que estive ocupada com a auditoria de segurança de fim de ano ultimamente."
10030005-43 = "E por que vocês não respondem a nenhuma mensagem?"
10030005-44 = "Eu liguei três vezes só hoje... e como nem as mensagens foram respondidas, eu vim até aqui, sabe?"
10030005-51 = "Ah, é verdade... tem um monte de chamadas perdidas."
10030005-52 = "Desculpa, Chihiro-senpai.#nEstávamos tão concentradas no trabalho que nem olhamos o celular."
10030005-54 = "Nossa... nem vi que já tinha passado tanto tempo assim."
10030005-55 = "Mas é que este é um trabalho importante que só pode ser feito agora."
10030005-57 = "……Hm? Aconteceu alguma coisa?"
10030005-58 = "Ah, você está falando daquela verificação de segurança de fim de ano?"
10030005-59 = "É bom verificar com cuidado nesta época mesmo.#nNão faltam vírus do tipo worm que fazem estragos no fim de ano."
10030005-60 = "Fico até orgulhosa de ver que vocês finalmente estão tendo consciência como hackers éticas—"
10030005-62 = "Ah, sobre isso..."
10030005-63 = "Não é uma verificação de segurança..."
10030005-68 = "Estávamos testando o novo modo de \"Mineral Craft\"!"
10030005-73 = "……Hein?"
10030005-74 = "Senpai, você não conhece \"Mineral Craft\"!?#nÉ o jogo sandbox mais popular entre os gamers de Kivotos ultimamente, sabia?"
10030005-75 = "Não, eu conheço, mas..."
10030005-76 = "O que eu quero saber é por que \"Mineral Craft\" é um trabalho importante que só pode ser feito agora."
10030005-77 = "Porque um novo modo foi implementado agorinha mesmo!"
10030005-78 = "Adicionaram minérios para fabricar novos equipamentos e até regras que podem ser usadas nos circuitos..."
10030005-80 = "Faz tempo que não tem uma atualização tão grande, então só a análise já tomou muito tempo."
10030005-81 = "……Como membros da Veritas, achamos que deveríamos garantir o quanto antes as informações que muitos alunos querem saber."
10030005-82 = "Isso mesmo! Isso também é um trabalho digno da Veritas!"
10030005-88 = "Ou seja..."
10030005-89 = "Vocês passaram o dia todo... jogando?"
10030005-93 = "No fim das contas, pode-se dizer que sim, mas..."
10030005-98 = "Vocês vão acabar com a saúde vivendo assim!"
10030005-99 = "Mesmo sendo dia de folga, ficar trancadas no quarto só jogando..."
10030005-101 = "Ugh... é verdade, mas..."
10030005-102 = "Entendido. Assim que terminarmos o teste do novo modo, voltaremos ao normal, prometo..."
10030005-103 = "Dizer que vão voltar ao normal, sendo que não vai mudar nada do que é agora..."
10030005-104 = "Eu senti na pele a falta de preparo físico de vocês durante o Grande Festival Esportivo, sabia?"
10030005-105 = "Pode estar tudo bem agora, mas logo o corpo de vocês vai começar a cobrar a conta."
10030005-106 = "Por que não aproveitam para planejar o Ano Novo ou decidir as resoluções de ano novo?"
10030005-107 = "Ah, quanto a isso, não se preocupe."
10030005-108 = "Pode não parecer, mas já temos todos os planos para o Ano Novo definidos!"
10030005-109 = "……É mesmo? O que você vai fazer?"
10030005-114 = "Obviamente, eu vou ver o primeiro nascer do sol do ano!"
10030005-119 = "……Que inesperado. A Maki saindo logo no início do ano."
10030005-120 = "Se não se importar, eu gostaria de ir junto. Onde vocês vão ver?"
10030005-121 = "Este ano, o plano é na \"Zona das Planícies Orientais\"!"
10030005-122 = "……Onde é isso?"
10030005-124 = "Não, a \"Zona das Planícies Orientais\" é o nome de um mapa do MMORPG que a Maki joga, o \"World of Archive\"."
10030005-125 = "Em \"World of Archive\", o sol nasce todo dia às 6 da manhã, assim como na vida real, então a \"Zona das Planícies Orientais\" fica lotada de jogadores no dia de Ano Novo."
10030005-127 = "Como jogadores que não estão em alianças também se reúnem lá, o PVP que acontece até o sol nascer já virou uma tradição!"
10030005-128 = "Ver o primeiro nascer do sol depois de derrotar os guerreiros do Reino Ocidental com os membros da guilda...#nEu nunca vou esquecer..."
10030005-133 = "(Não pode ser... Se continuar assim, todos vão continuar vivendo dias de decadência no ano que vem...)"
10030005-137 = "Pessoal, deixem a véspera de Ano Novo livre."
10030005-143 = "Hã? Mas eu já combinei de passar a noite toda caçando nesse dia."
10030005-145 = "Nada disso. Isso é uma ordem como vice-presidente, não aceitarei exceções.#nTodas se reúnam na frente da sala do clube às 9 da manhã."
10030005-147 = "O que deu em você de repente...?"
10030005-148 = "Eu não tenho nada planejado, então tudo bem, mas... o que vamos fazer reunindo todo mundo?"
10030005-150 = "Parece que vocês estão tão presas aqui dentro que esqueceram do mundo lá fora, então—"
10030005-154 = "Neste Ano Novo, nós vamos ver o verdadeiro primeiro nascer do sol juntas."
10030005-160 = "O quê!?"
10030005-162 = "#video;10030"
