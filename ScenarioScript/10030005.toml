[translation]
10030005-1 = "プロローグ;新年の抱負"
10030005-2 = "ヴェリタス・休憩室"
10030005-7 = "……マキ、そっちの状況はどう？#nこっちのチャンクはリソース的にもうダメかも。"
10030005-8 = "うん、こっちも。使えそうなのは、さっき見つけたもので全部みたい。"
10030005-9 = "コタマ先輩、論理回路の進捗はどう？"
10030005-16 = "……思ったより複雑ですね。#n前回のアップデートでいくつかルールが変わって、不要なブロックが発生しています。"
10030005-17 = "どうやら厳しい戦いになりそうです。"
10030005-18 = "くっ……やっぱ、日付が変わる前に完成させるのは難しいか……"
10030005-19 = "でも諦めるわけにはいきません。#nこの計画にかけた労力を無駄にはできませんから。"
10030005-21 = "そうだね。今夜も手伝うから――"
10030005-30 = "あんた達……"
10030005-34 = "あ、チヒロ先輩！おかえり！"
10030005-35 = "おかえり、先輩。部室で会うのはすごい久しぶりじゃない？"
10030005-36 = "あまりにも久しぶりで、顔を忘れるところでした。"
10030005-38 = "まあ、ここしばらくは年末のセキュリティ監査で忙しかったから。"
10030005-43 = "で、どうしてあんた達は誰も連絡を返さないの？"
10030005-44 = "今日だけでも3回は電話をかけたんだけど……メッセージすら返ってこないから来たんだけど？"
10030005-51 = "あっ、本当だ……不在着信がいっぱい。"
10030005-52 = "ごめん、チヒロ先輩。#n作業に夢中でスマホ見てなかった。"
10030005-54 = "うわ……もうこんなに時間経ってたんだね。"
10030005-55 = "でも、これは今しかできない重要な作業ですから。"
10030005-57 = "……ん？何かあったの？"
10030005-58 = "あ、前に話してた年末のセキュリティチェック？"
10030005-59 = "この時期は念入りに確認した方がいいからね。#n年末年始に悪さするワームウイルスも少なくないし。"
10030005-60 = "あんた達がようやくホワイトハッカーとしての自覚を持つようになって、私も少し誇らし――"
10030005-62 = "あ、その……"
10030005-63 = "セキュリティチェックではなく……"
10030005-68 = "「ミネラルクラフト」の新モードを試してたの！"
10030005-73 = "……え？"
10030005-74 = "先輩、「ミネラルクラフト」知らないの！？#n最近キヴォトスのゲーマーたちの間で、一番人気のサンドボックスゲームだよ？"
10030005-75 = "いや、知ってはいるけど……"
10030005-76 = "なんで「ミネラルクラフト」が今しかできない重要な作業なのかって話。"
10030005-77 = "だって、ちょっと前に新モードが実装されたんだよ！？"
10030005-78 = "新しい装備の製作に使う鉱物とか、回路に使えるルールも追加されたし……"
10030005-80 = "ここまで大規模なアップデートは久しぶりだから、分析だけでもかなり時間がかかったの。"
10030005-81 = "……ヴェリタスの一員として、多くの生徒が知りたがっている情報をいち早く確保するべきだと考えました。"
10030005-82 = "そうそう！これもヴェリタスの立派な仕事だよ！"
10030005-88 = "つまり……"
10030005-89 = "一日中――ゲームしてたってこと？"
10030005-93 = "結果的には、そうとも言えるんだけど……"
10030005-98 = "そんな生活してたら身体壊すでしょ！？"
10030005-99 = "いくら休みの日とはいえ、部屋に閉じこもってゲームばっかして……"
10030005-101 = "うっ……そうだけどさぁ……"
10030005-102 = "分かったよ。新モードのテストだけ終わらせたら、ちゃんといつも通りにするからさぁ……"
10030005-103 = "いつも通りっていっても、今と変わらないでしょ……。"
10030005-104 = "この間の大運動会で、あんた達の体力の無さを痛感したところなんだけど……？"
10030005-105 = "今はよくても、そのうち身体にガタがくるようになるよ？"
10030005-106 = "今のうちに、正月の予定を立てるとか、新年の抱負を決めるとかしたら？"
10030005-107 = "あ、それなら大丈夫。"
10030005-108 = "こう見えて新年の予定はバッチリ決まってるから！"
10030005-109 = "……そうなんだ？何するの？"
10030005-114 = "当然、初日の出を見に行くに決まってるでしょ！"
10030005-119 = "……意外だね。マキが新年早々、でかけるなんて。"
10030005-120 = "良かったら私も一緒に行きたいんだけど、どこで見るの？"
10030005-121 = "今年も「東の平原地帯」の予定！"
10030005-122 = "……どこ？"
10030005-124 = "ううん、「東の平原地帯」はマキがやってるMMORPG「ワールドオブアーカイブ」のマップ名。"
10030005-125 = "「ワールドオブアーカイブ」は現実のように毎朝6時に日が昇るので、元旦の「東の平原地帯」は多くのプレイヤーで賑わいます。"
10030005-127 = "同盟を結んでないプレイヤーも集まるから、日が昇るまで行われるPVPも恒例なんだよね！"
10030005-128 = "ギルメンと西王国の戦士を倒して迎える初日の出……#n今でも忘れられない……"
10030005-133 = "（ダメだ……このままじゃみんな来年も堕落した日々を……）"
10030005-137 = "みんな、大晦日は全員予定を空けておくように。"
10030005-143 = "え？その日はオールで狩りに行く約束しちゃったんだけど。"
10030005-145 = "ダメ。これは副部長としての命令だから、例外は認めない。#n全員、朝9時に部室の前で集合ね。"
10030005-147 = "急にどうしたんですか……？"
10030005-148 = "私も特に用事は無いし大丈夫だけど……全員集めて何するの？"
10030005-150 = "みんな篭ってばかりで外の世界を忘れてるみたいだから――"
10030005-154 = "今度の元旦は、みんなで本物の初日の出を見に行くよ。"
10030005-160 = "えっ！？"
10030005-162 = "#video;10030"
