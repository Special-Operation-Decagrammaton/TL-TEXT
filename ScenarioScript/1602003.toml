[translation]
1602003-1 = "ある狙撃手の無線交信"
1602003-2 = "シャーレ・執務室"
1602003-3 = "（ある平凡な午後のひととき）"
1602003-4 = "（当番で来たオトギと一緒にSRTの作戦記録を分析しながら、報告書を作成していると……）"
1602003-11 = "＜ラジオ3番チャンネルに切替。＞"
1602003-12 = "＜こちらはFOX4。そちら応答良いか？＞"
1602003-13 = "＜任務番号M-X-9-2……いえ、SではなくエックスレイのX。＞"
1602003-14 = "＜……確認。作戦中止の隠語は、ノーベンバー、キロ――＞"
1602003-16 = "[ns] \"報告書は順調？\""
1602003-17 = "んー、ううん……通信感度が悪すぎて、はっきり聞こえない。\r\n"
1602003-18 = "いくらジャミング装置を使ってるからって、こんなに雑音がひどいとなぁ。"
1602003-19 = "次からは、もう少し大きな声で言ってもらわないと……。\r\n"
1602003-20 = "[s1] \"それ、オトギの声だよね？\"\r\n[s2] \"何かすごい話をしてるみたい。\""
1602003-23 = "そんな複雑な話じゃないよ。"
1602003-24 = "位置の再確認と、必要な隠語を共有しただけ。#n専門的な内容はほぼなかったし……。"
1602003-25 = "あ、音声コードを使うから、一般の人が聞いたら難しく感じるかも。"
1602003-26 = "[s] \"音声コード？\""
1602003-27 = "うん。「アルファ」、「チャーリー」、「マイク」みたいな単語、聞いたことあるでしょ？"
1602003-28 = "パッと聞いただけでは区別しづらいものを置き換えてるんだ。#n数字の「9」とアルファベットの「Q」とか。"
1602003-29 = "伝達に間違いが起きたら、とんでもない場所を爆撃するかもしれないし……。\n"
1602003-30 = "だから正しく伝えるために、音声コードを使うってわけ。"
1602003-31 = "例えば、FOX小隊のFOXは、[ruby=F]フォックストロット[/ruby]-[ruby=O]オスカー[/ruby]-[ruby=X]エックスレイ[/ruby]っていう風にねぇ。"
1602003-32 = "[ns] \"面白いなあ。\""
1602003-34 = "[ns3] \"だけど、単語が増えると――\"\r\n[ns4] \"内容を伝達するのに、時間がかかっちゃうんじゃ？\""
1602003-37 = "もちろん全部に使うわけじゃなくて「タンゴ」ダウン、ポイント「アルファ」みたいに、大事な部分だけ強調して使うんだ。"
1602003-38 = "先生も無線機で試してみる？\r\n"
1602003-39 = "[s] \"私にできるかな……。\""
1602003-40 = "大丈夫。雰囲気だけだし。\r\n"
1602003-46 = "こちらはFOX4。応答せよ。"
1602003-47 = "[s] \"こ、こちらはシャーレ――いえ、シエラ1。受信完了。\""
1602003-48 = "FOX4、確認。"
1602003-49 = "シエラ1、本日午後に配給予定の、間食は何？"
1602003-50 = "[s5] \"……間食？\"\r\n[s6] \"買っておいたケーキが冷蔵庫にあるので、それはどうか？\""
1602003-53 = "え～何？よく聞こえな～い。\r\n"
1602003-54 = "雑音がひどすぎて、「ケーキ」なのか「シェーキ」なのか、分かんないよ。オーバー。"
1602003-55 = "[ns] \"もう一度伝える、FOX4。\""
1602003-57 = "[ns] \"本日の間食は、チャーリー-アルファ-キロ-エコー。オーバー。\""
1602003-58 = "ふふ。今日のおやつはケーキってことだね。"
1602003-59 = "シエラ1、ケーキの種類は確認できる？"
1602003-60 = "[s] \"[ruby=Chocolate]チャーリー[/ruby]と、[ruby=Strawberry]シエラ[/ruby]の2種類。どちらのタイプに？"
1602003-61 = "それはもちろん、ストロベ――シエラでしょ！\r\n\r\n"
1602003-64 = "[ns7] \"はは、実際にやってみたら、すごく楽しいね。\"\n[ns8] \"思ったより難しくないかも。\""
1602003-67 = "そうそう。普段使わない用語が混ざってるだけだし、特殊部隊が使う隠語もこんな感じだから。"
1602003-68 = "先生も、慣れたらこっちのほうが楽かもね。"
1602003-69 = "[s] \"だけど私はやっぱり、使わないほうがいいかな。\""
1602003-70 = "どうして？セキュリティーにもなるし、電話口で伝えるの便利だよ？"
1602003-71 = "[ns] \"でも私は先生だから。\""
1602003-73 = "[ns9] \"信頼を得るためには、理解しやすい言葉を使わないと。\"\n[ns10] \"信頼を失わないようにするほうが大事だから。\""
1602003-76 = "わあ、今の言葉、完全にシエラ-ホテルだったなぁ。\r\n"
1602003-77 = "[s11] \"……S、H？\"\r\n[s12] \"どういう意味なの？\""
1602003-83 = "あ、えっと、その……。\r\n"
1602003-84 = "しゃ、シャーレの先生らしいって意味！"
1602003-85 = "あ、おしゃべりしてたら、もうこんな時間。"
1602003-86 = "席に戻って、報告書を作成しよーっと。"
1602003-92 = "（オトギは何か慌てた様子で作業を続け、こちらに見向きもしなかった）\r\n"
