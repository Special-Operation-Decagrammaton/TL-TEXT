[translation]
1602003-1 = "A Marksman's Radio Transmission"
1602003-2 = "Schale - Office"
1602003-3 = "(A quiet, ordinary afternoon)"
1602003-4 = "(While working on a report with Otogi, who is here for duty, and analyzing SRT operation logs...)"
1602003-11 = "<Switching to radio channel 3.>"
1602003-12 = "<This is FOX4. Do you copy?>"
1602003-13 = "<Mission number M-X-9-2... No, not S, X as in X-ray.>"
1602003-14 = "<...Confirmed. The code word for aborting the operation is November, Kilo—>"
1602003-16 = "[ns] \"Is the report coming along well?\""
1602003-17 = "Hmm, no... The signal sensitivity is so bad, I can't hear it clearly.\r\n"
1602003-18 = "Even with the jamming device on, the static is just terrible."
1602003-19 = "I'll have to ask them to speak a bit louder next time...\r\n"
1602003-20 = "[s1] \"That's Otogi's voice, right?\"\r\n[s2] \"Sounds like she's talking about something intense.\""
1602003-23 = "It's not that complicated."
1602003-24 = "I was just reconfirming positions and sharing the necessary code words. #nThere wasn't really anything technical involved..."
1602003-25 = "Oh, since I'm using phonetic codes, it might sound difficult to a civilian."
1602003-26 = "[s] \"Phonetic codes?\""
1602003-27 = "Yeah. You've heard words like 'Alpha,' 'Charlie,' or 'Mike' before, right?"
1602003-28 = "We use them to replace things that are hard to distinguish at a glance. #nLike the number '9' and the letter 'Q'."
1602003-29 = "If there's a mistake in transmission, we might end up bombing the wrong place...\n"
1602003-30 = "So, we use phonetic codes to make sure everything is communicated correctly."
1602003-31 = "For example, the FOX in FOX Platoon is Foxtrot-Oscar-X-ray, like that."
1602003-32 = "[ns] \"That's interesting.\""
1602003-34 = "[ns3] \"But if the words get longer—\"\r\n[ns4] \"Doesn't it take more time to convey the message?\""
1602003-37 = "Of course, we don't use it for everything. We only use it to emphasize important parts, like 'Tango' down or point 'Alpha'."
1602003-38 = "Sensei, want to try it out on the radio?\r\n"
1602003-39 = "[s] \"I wonder if I can do it...\""
1602003-40 = "It's fine. It's just for the atmosphere.\r\n"
1602003-46 = "This is FOX4. Respond."
1602003-47 = "[s] \"Th-this is Schale—no, Sierra 1. Transmission received.\""
1602003-48 = "FOX4, confirmed."
1602003-49 = "Sierra 1, what is the snack scheduled for distribution this afternoon?"
1602003-50 = "[s5] \"...A snack?\"\r\n[s6] \"There's cake in the fridge that I bought, how about that?\""
1602003-53 = "Eh~ what? I can't hear you very well.\r\n"
1602003-54 = "The static is so bad, I can't tell if you said 'cake' or 'shake.' Over."
1602003-55 = "[ns] \"Repeating, FOX4.\""
1602003-57 = "[ns] \"Today's snack is Charlie-Alpha-Kilo-Echo. Over.\""
1602003-58 = "Hehe. So today's snack is cake."
1602003-59 = "Sierra 1, can you confirm the type of cake?"
1602003-60 = "[s] \"Two types: Chocolate and Strawberry. Which one would you like?\""
1602003-61 = "That would be, of course, Strawber—Sierra!\r\n\r\n"
1602003-64 = "[ns7] \"Haha, it's actually really fun when you try it.\"\n[ns8] \"Maybe it's not as hard as I thought.\""
1602003-67 = "Exactly. It's just mixing in terms you don't usually use, and that's how the special forces use code words too."
1602003-68 = "Sensei, you might find it easier once you get used to it."
1602003-69 = "[s] \"But I think I'd rather not use them.\""
1602003-70 = "Why? It adds security, and it's convenient for talking over the phone, right?"
1602003-71 = "[ns] \"But I am Sensei.\""
1602003-73 = "[ns9] \"To earn trust, I need to use words that are easy to understand.\"\n[ns10] \"Because it's more important not to lose that trust.\""
1602003-76 = "Wow, that was totally Sierra-Hotel of you.\r\n"
1602003-77 = "[s11] \"...S, H?\"\r\n[s12] \"What does that mean?\""
1602003-83 = "Ah, um, well...\r\n"
1602003-84 = "It, it means you're just like the Sensei of Schale!"
1602003-85 = "Oh, look at the time while we were chatting."
1602003-86 = "I'm going to head back to my seat and finish the report."
1602003-92 = "(Otogi continued her work in a flustered manner and didn't even look my way.)\r\n"