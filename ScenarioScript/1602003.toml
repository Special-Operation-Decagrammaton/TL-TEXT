[translation]
1602003-1 = "A Certain Maskman's Radio Communication"
1602003-2 = "Schale - Office"
1602003-3 = "(A certain ordinary afternoon.)"
1602003-4 = "(While analyzing SRT operation records and writing reports with Otogi, #nwho is here for her shift...)"
1602003-11 = "<Switching to radio channel 3.>"
1602003-12 = "<This is FOX4. Do you read me?>"
1602003-13 = "<Mission number M-X-9-2... No, not S, X as in X-ray.>"
1602003-14 = "<...Confirmed. The code for aborting the operation is November, Kilo—>"
1602003-16 = "[ns] \"Is the report going well?\""
1602003-17 = "Mm-mm, no... The signal is too bad, I can't hear clearly."
1602003-18 = "Even if they're using jamming equipment, this much noise is..."
1602003-19 = "Next time, I'll have to ask them to speak a little louder..."
1602003-20 = "[s1] \"That's your voice, right, Otogi?\"\n[s2] \"Sounds like you're talking about something serious.\""
1602003-23 = "It's not that complicated."
1602003-24 = "Just reconfirming positions and sharing necessary code words.#nThere was hardly any technical stuff..."
1602003-25 = "Ah, we use phonetic alphabets, so it might sound difficult to a civilian."
1602003-26 = "[s] \"phonetic alphabets?\""
1602003-27 = "Yeah. You've heard words like \"Alpha,\" \"Charlie,\" and \"Mike\" before, right?"
1602003-28 = "We replace things that are hard to distinguish just by hearing them.#nLike the word \"bee\" and the letter \"B\"."
1602003-29 = "If there's a miscommunication, we might end up bombing the wrong place..."
1602003-30 = "So, to transmit information accurately, we use phonetic alphabets."
1602003-31 = "For example, the FOX in FOX Platoon becomes Foxtrot-Oscar-X-ray."
1602003-32 = "[ns] \"That's interesting.\""
1602003-34 = "[ns3] \"But if the words increase—\"\n[ns4] \"Wouldn't it take more time to transmit the message?\""
1602003-37 = "Of course, we don't use it for everything. We just emphasize the important parts, #nlike \"Tango down\" or \"Point Alpha.\""
1602003-38 = "Do you want to try it on the radio, Sensei?"
1602003-39 = "[s] \"I wonder if I can do it...\""
1602003-40 = "You'll be fine.#nIt's just to feel the vibe."
1602003-46 = "This is FOX4. Do you copy?"
1602003-47 = "[s] \"T-This is Schale—I mean, Sierra 1. Copied.\""
1602003-48 = "FOX4, confirmed."
1602003-49 = "Sierra 1, what are the rations scheduled this afternoon?"
1602003-50 = "[s5] \"...Rations?\"\n[s6] \"I have some cake I bought in the fridge, how about that?\""
1602003-53 = "Eh~ What? I can't hear you well~."
1602003-54 = "The noise is too bad, I can't tell if you said \"cake\" or \"shake\". Over."
1602003-55 = "[ns] \"I will repeat, FOX4.\""
1602003-57 = "[ns] \"Today's rations are Charlie-Alpha-Kilo-Echo. Over.\""
1602003-58 = "Hehe. So today's ration is cake."
1602003-59 = "Sierra 1, can you confirm the type of cake?"
1602003-60 = "[s] \"Two types: Charlie and Sierra. Which type do you prefer?\""
1602003-61 = "That would be Strawber—Sierra, of course!"
1602003-64 = "[ns7] \"Haha, it's actually really fun when you try it.\"\n[ns8] \"It might not be as difficult as I thought.\""
1602003-67 = "Right, right. It's just a mix of terms you don't normally use, and the secret codes #nused by special forces are just like this."
1602003-68 = "You might find this easier once you get used to it, Sensei."
1602003-69 = "[s] \"But I think it's better if I don't use it after all.\""
1602003-70 = "Why? It provides security and it's convenient for communicating over the phone, #nright?"
1602003-71 = "[ns] \"But I'm a teacher.\""
1602003-73 = "[ns9] \"To gain trust, I have to use words that are easy to understand.\"\n[ns10] \"Because it's more important to not lose trust.\""
1602003-76 = "Wow, those words just now were totally Sierra-Hotel."
1602003-77 = "[s11] \"...S, H?\"\n[s12] \"What does that mean?\""
1602003-83 = "Ah, er, well..."
1602003-84 = "I-It means it sounds very close to the Sensei from Schale!"
1602003-85 = "Ah, look at the time, we chatted for too long."
1602003-86 = "I should get back to my seat and write that report."
1602003-92 = "(Otogi continued working in what seemed to be a fluster, not even looking #nmy way.)"