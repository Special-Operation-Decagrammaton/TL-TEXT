[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1602003-1 = "A Comunicação de Rádio de uma Sniper" 
1602003-2 = "Schale - Escritório" 
1602003-3 = "（Em um momento de paz numa tarde comum.）" 
1602003-4 = "（Enquanto eu redigia um relatório analisando os registros de operação da SRT\njunto com a Otogi, que veio para seu turno de ajudante...）" 
1602003-11 = "＜Mudando para o canal de rádio 3.＞" 
1602003-12 = "＜Aqui é FOX 4. Na escuta?＞" 
1602003-13 = "＜Número da Missão M-X-9-2... não, X de X-ray, não S.＞" 
1602003-14 = "＜...Confirmado. A palavra em código para abortar a missão é: November, Kilo――＞" 
1602003-16 = "[ns] \"O relatório está\nandando bem aí?\"" 
1602003-17 = "Hmm, na verdade não... a recepção tá horrível,\nnão consigo ouvir direito.\n" 
1602003-18 = "Tudo bem que tem um equipamento de bloqueio de sinal no meio,\nmas não precisava de tanta estática." 
1602003-19 = "Vou ter que pedir para falarem\nmais alto da próxima vez...\n" 
1602003-20 = "[s1] \"A voz na gravação\né a sua, Otogi?\"\n[s2] \"Parece que vocês estavam\ndiscutindo coisas bem complexas.\"" 
1602003-23 = "Não era nada tão complexo assim." 
1602003-24 = "Só estávamos confirmando as posições e compartilhando as palavras em código.\nNão teve quase nenhum jargão técnico..." 
1602003-25 = "Ah, deve ter parecido difícil para uma pessoa comum\nporque a gente usa Código Fonético." 
1602003-26 = "[s] \"Código Fonético?\"" 
1602003-27 = "Sim. Você já deve ter ouvido termos\ncomo 'Alpha', 'Charlie', 'Mike', né?" 
1602003-28 = "É para substituir letras que são difíceis de distinguir só pelo som.\nPor exemplo, o número '9' (Nine) e a letra 'I' (Eye), ou coisas do tipo." 
1602003-29 = "Se houver uma falha de comunicação,\npodemos acabar bombardeando o lugar errado, né...\n" 
1602003-30 = "Por isso a gente usa o Código Fonético\npara garantir que a mensagem chegue certinha." 
1602003-31 = "Por exemplo, o FOX do Esquadrão FOX\nfica: Foxtrot-Oscar-X-ray." 
1602003-32 = "[ns] \"Nossa,\nque interessante.\"" 
1602003-34 = "[ns3] \"Mas se vocês usam palavras inteiras,\nisso não――\"\n[ns4] \"Demora muito mais tempo\npara transmitir a mensagem?\"" 
1602003-37 = "Claro que a gente não usa para tudo.\nSó para destacar partes importantes, tipo 'Tango' Down, ou Point 'Alpha'." 
1602003-38 = "Quer tentar falar pelo rádio também,\nSensei?\n" 
1602003-39 = "[s] \"Acha que eu\nconsigo...?\"" 
1602003-40 = "Relaxa.\nÉ só para pegar o jeito da coisa.\n" 
1602003-46 = "Aqui é FOX 4. Na escuta?" 
1602003-47 = "[s] \"A-Aqui é Schale――\ndigo, Sierra 1. Mensagem recebida.\"" 
1602003-48 = "FOX 4, copiado." 
1602003-49 = "Sierra 1, qual é o lanche planejado\npara a distribuição da tarde de hoje?" 
1602003-50 = "[s5] \"……Lanche?\"\n[s6] \"Eu tenho uns bolos guardados na geladeira.\nServe?\"" 
1602003-53 = "Hã~? O quê?\nNão tô conseguindo ouvir~.\n" 
1602003-54 = "Tem muita estática, não sei se você falou\n'Bolo' (Bolo) ou 'Rolo' (Rolo de queijo). Câmbio." 
1602003-55 = "[ns] \"Repetindo,\nFOX 4.\"" 
1602003-57 = "[ns] \"O lanche de hoje é\nCharlie-Alpha-Kilo-Echo. Câmbio.\"" 
1602003-58 = "Fufu. Então o lanchinho de hoje\nserá um bolo ('CAKE')." 
1602003-59 = "Sierra 1, pode confirmar os tipos de bolo?" 
1602003-60 = "[s] \"Temos dois tipos: Charlie (Chocolate)\ne Sierra (Morango/Strawberry). Qual prefere?\"" 
1602003-61 = "Isso é óbvio, eu quero o Morang―― Sierra!\n\n" 
1602003-64 = "[ns7] \"Haha, fazendo isso na prática,\né muito divertido.\"\n[ns8] \"Pode ser menos complicado\ndo que eu imaginava.\"" 
1602003-67 = "Né? É só um monte de jargões que a gente não usa no dia a dia,\nmas as gírias das forças especiais não passam muito disso." 
1602003-68 = "Quando você pegar a manha, Sensei,\npode até ser mais fácil se comunicar assim." 
1602003-69 = "[s] \"Mesmo assim, acho melhor eu\ncontinuar não usando isso.\"" 
1602003-70 = "Por quê?\nÉ ótimo por motivos de segurança e ajuda a entender pelo telefone." 
1602003-71 = "[ns] \"Porque eu sou um Sensei.\"" 
1602003-73 = "[ns9] \"Para ganhar a confiança das alunas,\neu preciso usar palavras que elas entendam fácil.\"\n[ns10] \"Afinal, não perder essa confiança\né o mais importante.\"" 
1602003-76 = "Uau. Isso que você disse agora foi tão\nSierra-Hotel.\n" 
1602003-77 = "[s11] \"……S, H?\"\n[s12] \"O que isso\nsignifica?\"" 
1602003-83 = "Ah, hã, bom...\n" 
1602003-84 = "S-Significa que foi exatamente o que\no 'Sensei da Schale' (Schale no Sensei) diria!" 
1602003-85 = "Ah, ficamos jogando conversa fora e olha só a hora." 
1602003-86 = "Vou voltar pro meu lugar\ne terminar esse relatório logo~." 
1602003-92 = "（De repente, Otogi virou de costas com uma expressão apressada\ne continuou a trabalhar sem olhar nos meus olhos novamente.）\n" 