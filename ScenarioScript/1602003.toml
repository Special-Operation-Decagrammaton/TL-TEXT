[translation]
1602003-1 = "Comunicação via rádio de uma atiradora"
1602003-2 = "Schale - Escritório"
1602003-3 = "（Um momento de uma tarde comum）"
1602003-4 = "（Enquanto analiso os registros de operações da SRT junto com Otogi, que veio para o seu turno, estamos preparando um relatório...）"
1602003-11 = "＜Mudando para o canal 3 do rádio.＞"
1602003-12 = "＜Aqui é FOX4. Está me ouvindo?＞"
1602003-13 = "＜Número da missão M-X-9-2... não, não é S, é X de X-ray.＞"
1602003-14 = "＜...Confirmado. O código para cancelar a operação é November, Kilo--＞"
1602003-16 = "[ns] \"O relatório está indo bem?\""
1602003-17 = "Hmm, não... a sensibilidade da comunicação está tão ruim que não consigo ouvir direito.\r\n"
1602003-18 = "Por mais que estejamos usando um dispositivo de interferência, é frustrante ter tanto ruído assim."
1602003-19 = "Da próxima vez, vou ter que pedir para falarem um pouco mais alto...\r\n"
1602003-20 = "[s1] \"Isso é a voz da Otogi, né?\"\r\n[s2] \"Parece que ela está falando de algo importante.\""
1602003-23 = "Não é nada tão complicado assim."
1602003-24 = "Só confirmei a posição e compartilhei os códigos necessários. #nNão teve quase nada de técnico..."
1602003-25 = "Ah, como usamos códigos fonéticos, talvez pareça difícil para quem não é da área."
1602003-26 = "[s] \"Códigos fonéticos?\""
1602003-27 = "Sim. Você já deve ter ouvido palavras como \"Alfa\", \"Charlie\" ou \"Mike\", né?"
1602003-28 = "Usamos para substituir coisas que são difíceis de distinguir só de ouvir. #nComo o número \"9\" e a letra \"Q\", por exemplo."
1602003-29 = "Se houver um erro na transmissão, podemos acabar bombardeando o lugar errado...\n"
1602003-30 = "Por isso usamos códigos fonéticos, para garantir que a mensagem seja transmitida corretamente."
1602003-31 = "Por exemplo, o FOX do FOX Squad é Foxtrot-Oscar-X-ray, entende?"
1602003-32 = "[ns] \"Que interessante.\""
1602003-34 = "[ns3] \"Mas, se o número de palavras aumentar--\"\r\n[ns4] \"Não acaba demorando mais para transmitir o conteúdo?\""
1602003-37 = "Claro, não usamos para tudo. Usamos apenas para enfatizar partes importantes, como \"Tango\" down ou ponto \"Alfa\"."
1602003-38 = "Quer tentar usar o rádio, Sensei?\r\n"
1602003-39 = "[s] \"Será que eu consigo...?\""
1602003-40 = "Não se preocupe. É só para entrar no clima.\r\n"
1602003-46 = "Aqui é FOX4. Responda."
1602003-47 = "[s] \"A-aqui é Schale... não, Sierra 1. Recepção concluída.\""
1602003-48 = "FOX4, confirmado."
1602003-49 = "Sierra 1, qual é o lanche que será distribuído hoje à tarde?"
1602003-50 = "[s5] \"...Lanche?\"\r\n[s6] \"Tem um bolo que comprei na geladeira, que tal ele?\""
1602003-53 = "Hã? O quê? Não estou ouvindo direito.\r\n"
1602003-54 = "Tem tanto ruído que não dá para saber se é \"bolo\" ou \"shake\". Câmbio."
1602003-55 = "[ns] \"Vou repetir, FOX4.\""
1602003-57 = "[ns] \"O lanche de hoje é Charlie-Alfa-Kilo-Echo. Câmbio.\""
1602003-58 = "Hehe. Então o lanche de hoje é bolo."
1602003-59 = "Sierra 1, consegue confirmar o sabor do bolo?"
1602003-60 = "[s] \"Tem dois tipos: Chocolate e Strawberry. Qual você prefere?\""
1602003-61 = "Isso é óbvio, o de Strawberry... digo, Sierra, claro!\r\n\r\n"
1602003-64 = "[ns7] \"Haha, é bem divertido quando a gente faz na prática.\"\n[ns8] \"Talvez não seja tão difícil quanto eu pensava.\""
1602003-67 = "Pois é. É só uma questão de se acostumar com os termos que não usamos no dia a dia, e é assim que as forças especiais usam os códigos."
1602003-68 = "Sensei, se você se acostumar, talvez até ache mais fácil assim."
1602003-69 = "[s] \"Mas, no meu caso, acho melhor não usar.\""
1602003-70 = "Por quê? Além de ser mais seguro, é prático para falar no telefone, não é?"
1602003-71 = "[ns] \"Porque eu sou o Sensei.\""
1602003-73 = "[ns9] \"Para ganhar a confiança dos outros, preciso usar palavras que sejam fáceis de entender.\"\n[ns10] \"É mais importante não perder a confiança deles.\""
1602003-76 = "Uau, essa sua fala foi totalmente Sierra-Hotel.\r\n"
1602003-77 = "[s11] \"...S, H?\"\r\n[s12] \"O que isso significa?\""
1602003-83 = "Ah, bem, é que...\r\n"
1602003-84 = "Q-quero dizer, é bem a cara do sensei do Schale!"
1602003-85 = "Ah, conversando assim, olha só que horas já são."
1602003-86 = "Vou voltar para o meu lugar e terminar o relatório."
1602003-92 = "（Otogi continua seu trabalho de forma apressada, sem nem olhar para mim）\r\n"
