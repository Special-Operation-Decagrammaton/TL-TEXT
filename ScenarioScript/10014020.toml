[translation]
10014020-1 = "第2話;誰だって一つや二つくらい"
10014020-2 = "もうすぐ正門だし、ここまで来たら安心。"
10014020-3 = "いくらあいつでも校内では騒がないと思うし……。"
10014020-4 = "うーん……。"
10014020-5 = "なんか、先生がエスコートしてくれたみたいになっちゃったね。"
10014020-6 = "……ご迷惑をおかけしてすみません。"
10014020-7 = "そして、手伝ってくださってありがとうございます。"
10014020-8 = "[s1] \"……礼儀正しいね、カズサは。\"\n[s2] \"急にかしこまってどうしたの？\""
10014020-9 = "え、そ、そうかな？"
10014020-10 = "え、そ、そうかな？"
10014020-11 = "そりゃ、先生だし……目上の人だし……。"
10014020-12 = "とにかく。今回の相談はここまで。#n後でまた時間作って会いに行くね。"
10014020-13 = "……ん？"
10014020-14 = "今更だけど過去のこと話して良かったのかって？#n……なにを？"
10014020-15 = "……スケバンの話？"
10014020-16 = "あー……「隠していた過去」じゃないのかって事か。"
10014020-20 = "そうだね……。"
10014020-21 = "まぁ、胸を張って言えるような事じゃないけど……。"
10014020-22 = "でも仕方ないでしょ。事実は事実だし。"
10014020-23 = "隠したいとかじゃないんだけど……ただ、あんまり思い出したくないかな。#nそんな感じ。"
10014020-24 = "思い出しても疲れるだけだし……。"
10014020-25 = "……[ruby=うざわ]宇沢[/ruby]もいい加減気づけばいいのに。"
10014020-26 = "私たち、もう高校生なのにさ。#nいつまでも子供みたいな事……。"
10014020-27 = "そろそろ、中学の時と違うってわかってほしいんだけどな。#n昔の感覚で突っかかって来られるの、いい加減ウザいんだよね。"
10014020-28 = "……高校生なんだから、もう中学の姿とか忘れてもいい頃じゃない？"
10014020-29 = "お互い忘れて、新生活を満喫すればいいのに……。#nどうしてあんな事するのか、心底理解できない。"
10014020-30 = "[s] \"……。\""
10014020-31 = "……？"
10014020-32 = "……どうしたの？"
10014020-33 = "……え？"
10014020-34 = "スケバンをやめたきっかけ……？"
10014020-35 = "あー……それは……。"
10014020-36 = "急に聞いてくるんだね……？#n……まぁ、その……。"
10014020-37 = "やっぱ、スケバンは……ちょっと……。"
10014020-47 = "っていうか、急に何でそんな事聞くの！？#n別にそんな珍しい事でもないでしょ？"
10014020-48 = "誰だって言いたくない過去の一つや二つくらいあるものじゃん……"
10014020-49 = "スパイだったとか、銀行を襲ったとか、メイドに見せかけたエージェントとか、#n忍者とか……。"
10014020-50 = "きっと、そういう人もたくさんいるだろうし。#n別に特別なことじゃないでしょ。"
10014020-51 = "[s3] \"そ、そうだね……。\"\n[s4] \"……微妙に否定しにくい。\""
10014020-52 = "ほらね。私だって変わらないよ。"
10014020-53 = "ほらね。私だって変わらないよ。"
10014020-54 = "ちゃんと『その時』になったら分別がつくようになる。#nだから、当時のことはもう聞かないで。……恥ずかしいから。"
10014020-55 = "……そう。#nああいうの、恥ずかしいの。"
10014020-59 = "……あ、時間が……。"
10014020-60 = "さすがに先生の前で遅刻はできないから、先に入るね。#nまたね、先生。"
10014020-61 = "今日は本当にありがとう、先生。#n相談して、少しスッキリした。"
10014020-62 = "……本当にありがとうございます。"
10014020-63 = "それじゃ。"
10014020-67 = "（…………）"
10014020-68 = "[ns] \"……自警団か。\""
10014020-76 = "……あ、先生。こちらです。"
10014020-81 = "お待ちしておりました、先生。#n聞きたい事とはなんでしょう？"
10014020-82 = "あ、いえ。負担だなんてとんでもないです。#nむしろ、私としてはこのような機会を頂けてとても嬉しいです。"
10014020-83 = "先生にはいつもお世話になっていますので……。"
10014020-84 = "私にできることなら、誠心誠意お手伝いさせてください。"
10014020-85 = "……あ、授業ですか？#n大丈夫です。今の時間はなにもないので。"
10014020-86 = "学年やクラスごとに時間割も違いますから。#nお気遣いありがとうございます。"
10014020-87 = "それで、聞きたい事とは……"
10014020-88 = "……え、自警団メンバーに関すること？#nなるほど……それで私に……。"
10014020-89 = "ですが、お役に立てるかどうか……。#n自警団は、普通の「組織」ではないので。"
10014020-90 = "文字通り「自警団」ですから。#n各々、近隣の治安を守ろうと自発的に集まって結成されました。"
10014020-91 = "誰が所属していて、どのような活動をしているのか。#n全てを把握するのは難しく……。"
10014020-92 = "……えっ？"
10014020-93 = "宇沢レイサ……さんですか？"
10014020-94 = "[s5] \"前に一緒にいるのを見たことがあって。\"\n[s6] \"スズミもレイサの事は知ってるかなって。\""
10014020-95 = "……そうですね。#nレイサさん……ですか。"
10014020-96 = "……そうですね。#nレイサさん……ですか。"
10014020-97 = "また何か問題を起こしたのですね。#n今度は大事ではないと良いのですが……。"
10014020-98 = "[s7] \"ちょっと待って。今「また」って……。\"\n[s8] \"問題児なの……？\""
10014020-99 = "決して悪い方ではありません。#n志はとても立派な方です。"
10014020-100 = "決して悪い方ではありません。#n志はとても立派な方です。"
10014020-101 = "その……少しエネルギッシュすぎて人と馴染めない部分もありますが……。"
10014020-102 = "でも意外ですね。#nいくらレイサさんでも、先生に迷惑をかけたりはしないと思っていたのですが……。"
10014020-103 = "……ああ、他の方に関する事……なるほど。"
10014020-104 = "そうですね。よろしければ、少し状況を聞かせていただけませんか。#nその方の個人情報は伏せていただいて大丈夫ですので……。"
10014020-105 = "[ns] 現状を説明する。"
10014020-108 = "……なるほど。"
10014020-109 = "レイサさんらしいですね。#nお相手も困っている事でしょう。"
10014020-110 = "それにしても驚きました。#nスケバンの事は詳しいと自負していたのですが……。"
10014020-111 = "「スケバン社会」というのも存在するとは。#nやはり世の中は広いようです。"
10014020-112 = "……ですが、結局その方はスケバンをやめたわけですよね。#nレイサさんはどうしてずっと追いかけているのでしょう？"
10014020-113 = "もうスケバンではない人に、決闘の申込みを……。#n何か理由でもあるのでしょうか。"
10014020-114 = "……これは、レイサさんに直接お聞きした方がよさそうですね。"
10014020-115 = "レイサさんなら私も連絡先を知っているので、呼べばすぐ来ると思います。"
10014020-116 = "先程も少しお話したように、行動力がある方ですから。"
10014020-117 = "それでは連絡を……。"
10014020-121 = "すみません、電話が……失礼します。"
10014020-122 = "……レイサさん？"
10014020-123 = "[s9] \"レイサから連絡が？\"\n[s10] \"どうしたの？\""
10014020-124 = "あ……"
10014020-125 = "あ……"
10014020-126 = "……これは支援要請、ですね。"
