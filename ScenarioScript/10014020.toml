[translation]
10014020-1 = "Episódio 2; Todo mundo tem um ou dois segredos"
10014020-2 = "Já estamos perto do portão principal, agora estou segura."
10014020-3 = "Acho que mesmo aquela pessoa não faria escândalo dentro da escola..."
10014020-4 = "Hmm..."
10014020-5 = "Parece até que o Sensei me escoltou até aqui, né?"
10014020-6 = "……Desculpe por causar problemas."
10014020-7 = "E obrigada por me ajudar."
10014020-8 = "[s1] \"……Você é bem educada, Kazusa.\"\n[s2] \"Por que essa formalidade toda de repente?\""
10014020-9 = "Eh, v-você acha?"
10014020-10 = "Eh, v-você acha?"
10014020-11 = "Bem, você é o Sensei... e meu superior..."
10014020-12 = "Enfim. A conversa de hoje termina aqui. #nVou arranjar um tempo depois para te ver de novo."
10014020-13 = "……Hm?"
10014020-14 = "Está perguntando se eu me arrependo de ter falado sobre o passado? #n……Sobre o quê?"
10014020-15 = "……Sobre ser uma delinquente?"
10014020-16 = "Ah... você quer dizer que não é um \"passado que eu escondia\"?"
10014020-20 = "Pois é..."
10014020-21 = "Bom, não é algo de que eu possa me orgulhar..."
10014020-22 = "Mas não tem jeito, né? Fatos são fatos."
10014020-23 = "Não é que eu queira esconder... é só que eu não gosto muito de lembrar. #nÉ mais ou menos isso."
10014020-24 = "Lembrar disso só me deixa cansada..."
10014020-25 = "……A Uzawa também já deveria ter se tocado."
10014020-26 = "Nós já somos estudantes do ensino médio. #nFicar agindo como criança o tempo todo..."
10014020-27 = "Eu queria que ela entendesse que as coisas são diferentes de quando estávamos no fundamental. #nÉ muito irritante ser provocada com base em coisas de antigamente."
10014020-28 = "……Já que somos do ensino médio, não está na hora de esquecer como éramos no fundamental?"
10014020-29 = "Deveríamos esquecer o passado e aproveitar a vida nova... #nEu realmente não consigo entender por que ela faz isso."
10014020-30 = "[s] \"…….\""
10014020-31 = "……?"
10014020-32 = "……O que foi?"
10014020-33 = "……Eh?"
10014020-34 = "O motivo de eu ter parado de ser uma delinquente...?"
10014020-35 = "Ah... isso é..."
10014020-36 = "Você pergunta as coisas de repente, né? #n……Bom, é que..."
10014020-37 = "No fim das contas, ser uma delinquente é... meio..."
10014020-47 = "Quer saber, por que você está perguntando isso do nada!? #nNão é como se fosse algo tão raro, né?"
10014020-48 = "Todo mundo tem um ou dois passados que não quer contar..."
10014020-49 = "Tipo ter sido uma espiã, ter assaltado um banco, ser uma agente disfarçada de empregada, #nou uma ninja..."
10014020-50 = "Com certeza tem muita gente assim por aí. #nNão é nada de especial."
10014020-51 = "[s3] \"B-bem, é verdade...\"\n[s4] \"……É difícil negar isso.\""
10014020-52 = "Viu só? Eu não sou diferente."
10014020-53 = "Viu só? Eu não sou diferente."
10014020-54 = "Quando chega a hora certa, a gente aprende a ter bom senso. #nPor isso, não me pergunte mais sobre aquela época. ...É vergonhoso."
10014020-55 = "……É. #nAquelas coisas, são vergonhosas."
10014020-59 = "……Ah, o tempo..."
10014020-60 = "Não posso me dar ao luxo de me atrasar na frente do Sensei, então vou entrar. #nAté mais, Sensei."
10014020-61 = "Muito obrigada por hoje, Sensei. #nConversar com você me deixou mais leve."
10014020-62 = "……Muito obrigada mesmo."
10014020-63 = "Até logo."
10014020-67 = "(…………)"
10014020-68 = "[ns] \"……O comitê disciplinar, hein.\""
10014020-76 = "……Ah, Sensei. Por aqui."
10014020-81 = "Estava à sua espera, Sensei. #nO que gostaria de me perguntar?"
10014020-82 = "Ah, não, de forma alguma é um incômodo. #nPelo contrário, fico muito feliz em ter essa oportunidade."
10014020-83 = "O senhor sempre cuida tão bem de mim, afinal……"
10014020-84 = "Se há algo que eu possa fazer, por favor, deixe-me ajudar de todo o coração."
10014020-85 = "……Ah, sobre a aula? #nEstá tudo bem. Não tenho nada agora."
10014020-86 = "Os horários variam de acordo com o ano e a turma. #nObrigada pela preocupação."
10014020-87 = "Então, sobre o que gostaria de perguntar……"
10014020-88 = "……Eh, sobre os membros do Grupo de Autodefesa? #nEntendo…… então é por isso que veio a mim……"
10014020-89 = "Mas não sei se serei de muita ajuda…… #nO Grupo de Autodefesa não é uma \"organização\" comum."
10014020-90 = "Como o nome diz, somos um \"Grupo de Autodefesa\". #nCada um se reuniu voluntariamente para proteger a segurança da vizinhança."
10014020-91 = "Saber quem pertence ao grupo e o que cada um faz…… #nÉ difícil ter controle total sobre tudo."
10014020-92 = "……Eh?"
10014020-93 = "Uzawa Reisa……-san?"
10014020-94 = "[s5] \"Já vi vocês juntas antes.\"\n[s6] \"Pensei que talvez Suzumi conhecesse a Reisa.\""
10014020-95 = "……Entendo. #nReisa-san…… é?"
10014020-96 = "……Entendo. #nReisa-san…… é?"
10014020-97 = "Ela causou algum problema de novo, não foi? #nEspero que desta vez não seja nada grave……"
10014020-98 = "[s7] \"Espere um pouco. Você disse 'de novo'……\"\n[s8] \"Ela é uma encrenqueira……?\""
10014020-99 = "Ela não é uma má pessoa, de forma alguma. #nSuas intenções são muito nobres."
10014020-100 = "Ela não é uma má pessoa, de forma alguma. #nSuas intenções são muito nobres."
10014020-101 = "É que…… ela é um pouco enérgica demais e às vezes tem dificuldade em se enturmar……"
10014020-102 = "Mas é surpreendente. #nMesmo sendo a Reisa-san, eu não achei que ela causaria problemas para o Sensei……"
10014020-103 = "……Ah, entendo, é sobre outra pessoa……"
10014020-104 = "Entendo. Se não se importar, poderia me contar um pouco da situação? #nPode omitir as informações pessoais da pessoa, não tem problema……"
10014020-105 = "[ns] Explicar a situação atual."
10014020-108 = "……Entendo."
10014020-109 = "Isso é bem a cara da Reisa-san. #nA outra pessoa deve estar em apuros."
10014020-110 = "Ainda assim, estou surpresa. #nEu me orgulhava de conhecer bem as Sukeban……"
10014020-111 = "Não sabia que existia uma \"sociedade Sukeban\". #nO mundo é realmente vasto."
10014020-112 = "……Mas, no fim das contas, essa pessoa deixou de ser uma Sukeban, certo? #nPor que a Reisa-san continua a perseguindo?"
10014020-113 = "Desafiar para um duelo alguém que nem é mais uma Sukeban…… #nSerá que existe algum motivo para isso?"
10014020-114 = "……Parece que seria melhor perguntar diretamente à Reisa-san."
10014020-115 = "Eu tenho o contato dela, então se eu a chamar, ela virá rapidamente."
10014020-116 = "Como mencionei antes, ela é uma pessoa com muita iniciativa."
10014020-117 = "Vou entrar em contato com ela então……"
10014020-121 = "Desculpe, meu telefone está…… com licença."
10014020-122 = "……Reisa-san?"
10014020-123 = "[s9] \"É a Reisa ligando?\"\n[s10] \"O que houve?\""
10014020-124 = "Ah……"
10014020-125 = "Ah……"
10014020-126 = "……Isso é um pedido de socorro, não é?"
