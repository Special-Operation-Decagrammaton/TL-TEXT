[translation]
80000050-1 = "Tudo o que sou, para você"
80000050-2 = "（Patrulhando a cidade para garantir que nada aconteça durante o Dia dos Namorados）"
80000050-3 = "（Pelo canto do olho...）"
80000050-8 = "[ns] \"……。\""
80000050-10 = "（Ao virar a esquina do beco...）"
80000050-16 = "[ns] \"…………。\""
80000050-23 = "[ns] \"……Wakamo?\""
80000050-25 = "Ora, ora……."
80000050-26 = "Tentei conter meu desejo de aparecer logo e me manter o mais discreta possível, mas……."
80000050-27 = "Fufu…… mas,"
80000050-28 = "Saber que você notou a minha presença é algo que faz meu peito arder de tanta felicidade."
80000050-29 = "Ah, desse jeito, sinto que não vou conseguir me segurar novamente……."
80000050-30 = "[s1] \"Wakamo, você chama muita atenção...\"\n[s2] \"A propósito, o que houve?\""
80000050-31 = "Ah, o motivo de eu ter vindo visitar você hoje é……"
80000050-32 = "Ah, o motivo de eu ter vindo visitar você hoje é……"
80000050-38 = "Como ousa vender chocolates no nosso território sem permissão, quer brigar!?"
80000050-40 = "Na verdade, é que……"
80000050-44 = "Do que você está falando? Esta área já é nossa!"
80000050-45 = "Hã!? Então vamos resolver isso agora mesmo!"
80000050-46 = "Bela coragem, venha para cima!"
80000050-53 = "……Está um pouco barulhento, não acha?"
80000050-54 = "[s] \"E-espere um pouco! Eu vou lá conversar com eles!\""
80000050-56 = "（Antes que Wakamo perdesse o controle, consegui acalmar a situação）"
80000050-58 = "Fufu…… bom trabalho, Sensei."
80000050-59 = "Como é um dia especial, pensei que poderia tolerar esse tipo de barulho, mas……."
80000050-60 = "[s] \"Ah, é mesmo?\""
80000050-61 = "Sim♡ Hoje é Dia dos Namorados. Se eu causasse uma confusão em um dia como este, você ficaria em apuros, não é?"
80000050-62 = "Exatamente. Mas, deixando isso de lado, só existe um motivo para eu ter vindo te ver."
80000050-63 = "Isto aqui……"
80000050-69 = "[ns] \"Ah, chocolate……。\""
80000050-70 = "Sim, eu queria muito entregar isto a você……."
80000050-71 = "Estive vagando por aí desde cedo à sua procura……."
80000050-72 = "Estou tão feliz por finalmente ter te encontrado……"
80000050-73 = "Fufu♡"
80000050-74 = "É realmente o destino……♡"
80000050-75 = "[s] \"Senti que estava sendo seguida desde que me encontrou, aquilo era...?\""
80000050-76 = "Esqueça isso, você não poderia provar aqui mesmo?"
80000050-77 = "E, por favor, eu adoraria saber o que achou……."
80000050-78 = "[s] \"Ah, claro. Então, aceitarei com prazer...\""
80000050-82 = "（Tentei colocar o chocolate na boca na frente da Wakamo, mas……）"
80000050-83 = "Fufu, fufufufu…… vamos, vamos……! Depressa, coma meu chocolate,"
80000050-84 = "me coloque dentro de você……!"
80000050-85 = "[s] （Tira o chocolate da boca）"
80000050-86 = "Ah…… você não vai comer……?"
80000050-87 = "[s3] \"Err...\"\n[s4] Tenta colocar na boca novamente."
80000050-88 = "Fufu, fufufu……♡ Ah, só mais um pouco……"
80000050-89 = "Fufu, fufufu……♡ Ah, só mais um pouco……"
80000050-90 = "Só mais um pouco para que o meu, tudo o que sou……!"
80000050-91 = "[s] （Tira o chocolate da boca novamente）"
80000050-92 = "Ah…… Sensei, por que……?"
80000050-93 = "[s5] \"Ei, só por precaução...\"\n[s6] \"Esse chocolate, tem algo nele que normalmente não deveria ter...?\""
80000050-94 = "Sim, tem de sobra...♡"
80000050-95 = "Sim, tem de sobra...♡"
80000050-96 = "[s] \"O quê!?\""
80000050-97 = "Quando pergunta o quê, é claro que é..."
80000050-98 = "Todo esse meu amor incontrolável!"
80000050-99 = "Eu queria que você provasse o quanto antes..."
80000050-100 = "Aconteceu alguma coisa?"
80000050-101 = "[s] \"Sinto muito mesmo...\""
80000050-102 = "……？"
80000050-103 = "(Sem pensar em nada estranho, comi o chocolate que a Wakamo me deu e estava delicioso)"
80000050-108 = "[ns] \"Sim, está delicioso. Obrigado, Wakamo.\""
80000050-109 = "Ah, você comeu... finalmente, o meu..."
80000050-110 = "Brincando tão intensamente com ele na boca,"
80000050-111 = "e engolindo algo que contém tudo o que sou..."
80000050-112 = "Todo o meu ser, agora, lentamente se tornando um só dentro de você...!"
80000050-113 = "[s] \"Ei, Wakamo...?\""
80000050-114 = "Fufu... não, não se preocupe."
80000050-115 = "É que estou tão feliz por você ter comido..."
80000050-116 = "Bem, isso não é o fim. Já que estamos aqui, por que não passamos o resto do dia juntos?"
80000050-117 = "[s] \"Eu adoraria, mas...\""
80000050-118 = "Ah, você que aceitou o que é meu, passará o dia todo comigo..."
80000050-119 = "Fufufu..."
80000050-120 = "Hoje, com certeza será um dia maravilhoso♡"
80000050-121 = "[s] \"...?\""
80000050-123 = "(Apesar de sentir um calafrio na espinha, passei o resto do dia me divertindo com a Wakamo)"
