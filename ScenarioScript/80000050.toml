[translation]
80000050-1 = "私のすべてをあなたに"
80000050-2 = "（バレンタインデーを迎え、何かの騒ぎが起きた時に備えて街をパトロールしてる時）"
80000050-3 = "（視角の端から……）"
80000050-8 = "[ns] \"……。\""
80000050-10 = "（路地裏を曲がると……）"
80000050-16 = "[ns] \"…………。\""
80000050-23 = "[ns] \"……ワカモ？\""
80000050-25 = "あらあら……。"
80000050-26 = "つい前に出たい気持ちを抑えつつ、できるだけ気づかれないようにと思ったのですが……。"
80000050-27 = "ふふっ……ですが、"
80000050-28 = "私の存在に気が付いてくださったというのは、胸が熱くなるほど嬉しいことですね。"
80000050-29 = "ああ、このままでは私、また我慢が出来なくなってしまいそうです……。"
80000050-30 = "[s1] \"ワカモ、結構目立つし……。\"\n[s2] \"ところで、どうしたの？\""
80000050-31 = "ああ、本日あなた様のもとを訪れたのは……"
80000050-32 = "ああ、本日あなた様のもとを訪れたのは……"
80000050-38 = "勝手にあたしらの縄張りでチョコなんか売りやがって、喧嘩売ってんのか！？"
80000050-40 = "実は、その……"
80000050-44 = "何言ってんだ、ここはもう私たちのエリアだっての！"
80000050-45 = "はぁ！？それならもう、今から白黒つけてやる！"
80000050-46 = "良い度胸だ、かかって来い！"
80000050-53 = "……少々騒がしいですねぇ？"
80000050-54 = "[s] \"ちょっ、ちょっと待ってて！話し合ってくるから！\""
80000050-56 = "（ワカモが暴れてしまう前に、何とか状況を落ち着かせることができた）"
80000050-58 = "ふふっ……お疲れ様でした、先生。"
80000050-59 = "こんな日ですし、これくらいの騒ぎでしたら我慢できるかと思ったのですが……。"
80000050-60 = "[s] \"あ、そうなの？\""
80000050-61 = "はい♡本日はバレンタインデー、このような日まで騒ぎを起こしては、あなた様も困ってしまうでしょう？"
80000050-62 = "そうです、そんなことよりもあなた様のことを訪れた理由はただ一つ。"
80000050-63 = "こちらを……"
80000050-69 = "[ns] \"あ、チョコレート……。\""
80000050-70 = "はい、どうしてもこれをあなた様にお渡ししたくって……。"
80000050-71 = "早朝よりあなた様を探して、彷徨い歩いていたのですが……。"
80000050-72 = "ようやく会うことができて、私は幸せです……"
80000050-73 = "ふふっ♡"
80000050-74 = "やはり運命ですね……♡"
80000050-75 = "[s] \"見つかってからしばらく尾行されてた気がするけど、あれは……？\""
80000050-76 = "そんなことより、ぜひこの場で味わっていただけませんか？"
80000050-77 = "そしてどうか、すぐにご感想をお伺いしたく……。"
80000050-78 = "[s] \"あ、うん。じゃあありがたく……\""
80000050-82 = "（ワカモの前でチョコを口に入れようとしたものの……）"
80000050-83 = "ふふっ、ふふふふふっ……さあ、さあ……！早く私のチョコを、"
80000050-84 = "私を、あなた様の体内に……！"
80000050-85 = "[s] （チョコレートを一旦口から離す）"
80000050-86 = "あっ……召し上がっては、いただけないのですか……？"
80000050-87 = "[s3] \"えーっと……\"\n[s4] 再び口の中に入れようとする。"
80000050-88 = "ふふっ、ふふふっ……♡ああ、もう少し……"
80000050-89 = "ふふっ、ふふふっ……♡ああ、もう少し……"
80000050-90 = "もう少しで私の、私のすべてを……！"
80000050-91 = "[s] （チョコレートをもう一度口から離す）"
80000050-92 = "あぁっ……先生、どうして……？"
80000050-93 = "[s5] \"あの、本当に念のためなんだけど……。\"\n[s6] \"このチョコ、何か普通は入れないものとか入ってる……？\""
80000050-94 = "はい、それはもうたっぷり……♡"
80000050-95 = "はい、それはもうたっぷり……♡"
80000050-96 = "[s] \"何を！？\""
80000050-97 = "何をと申されますと、それはもちろん……"
80000050-98 = "私のこの、抑えきれないほどの愛情です！"
80000050-99 = "それをいち早く味わっていただきたくって……"
80000050-100 = "どうかしましたか？"
80000050-101 = "[s] \"本当にごめん……。\""
80000050-102 = "……？"
80000050-103 = "（変なことは考えず、ワカモがくれたチョコレートを美味しく食べた）"
80000050-108 = "[ns] \"うん、美味しい。ありがとね、ワカモ。\""
80000050-109 = "あぁ、食べてくださったんですね……ようやく、私のが……。"
80000050-110 = "そんな激しく口の中で弄んで、"
80000050-111 = "私の全てがこもったものを飲み込まれて……。"
80000050-112 = "私のすべては、今あなた様のお腹の中でゆっくりと一つに……！"
80000050-113 = "[s] \"あの、ワカモさん……？\""
80000050-114 = "ふふっ……いえ、お気になさらず。"
80000050-115 = "あなた様に食べていただけたことが、あまりにも嬉しくって……。"
80000050-116 = "さぁ、これで終わりではありません。せっかくですのでこの後、ご一緒に過ごしませんか？"
80000050-117 = "[s] \"それは全然喜んでって感じなんだけど、その……。\""
80000050-118 = "ああ、私のものを受け入れてくださったあなた様と、今日一日ずっと……"
80000050-119 = "ふふふっ……"
80000050-120 = "今日は、最高の一日になりそうです♡"
80000050-121 = "[s] \"……？\""
80000050-123 = "（何だか背筋の凍る予感もありつつ、その後ワカモと楽しく過ごした）"
