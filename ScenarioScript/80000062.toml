[translation]
80000062-1 = "Sem rodeios, como é"
80000062-2 = "……Ah, Sensei. Boa noite."
80000062-3 = "Desculpe por chamá-lo a uma hora tão tardia. Como estou de prontidão, não posso me afastar muito."
80000062-4 = "[s1] \"Não, tudo bem. O que houve?\"\n[s2] \"Bom trabalho hoje também. A propósito, por que me chamou?\""
80000062-5 = "Obrigada."
80000062-6 = "Bem, é como sempre, e hoje não estou tão ocupada por enquanto, mas..."
80000062-7 = "O Sensei também está sempre ocupado, e imagino que hoje esteja ainda mais, então vamos direto ao ponto."
80000062-8 = "Aqui, pegue isto."
80000062-14 = "[ns3] \"Isso é... um chocolate de Dia dos Namorados?\"\n[ns4] \"Essa bandagem...\""
80000062-15 = "Sim, é um chocolate de Dia dos Namorados. Não queria me arrepender, então precisava te entregar."
80000062-16 = "Sim, é um chocolate de Dia dos Namorados. Não queria me arrepender, então precisava te entregar."
80000062-17 = "Eu queria ter dado algo mais adequado, mas..."
80000062-18 = "Infelizmente, não tive tempo de ir às lojas ultimamente, então dei um jeito com os materiais que tinha à mão."
80000062-19 = "[ns] \"Entendi, obrigado.\""
80000062-21 = "[ns] \"... 'Materiais que tinha à mão'?\""
80000062-22 = "Sim. Como sabe, na ambulância temos todo tipo de medicamentos e materiais. Se for apenas um chocolate como este, consigo preparar de alguma forma."
80000062-23 = "……?"
80000062-24 = "Aconteceu algo? Você está com uma cara de preocupação."
80000062-25 = "……Ah, já imagino o que está pensando. Mas não se preocupe."
80000062-26 = "Certamente é um \"composto com sabor de chocolate\". Mas não faz mal à saúde, na verdade, até faz bem."
80000062-27 = "Se for para falar de algo, talvez a \"embalagem\" seja o que mais te preocupa..."
80000062-28 = "Como não tinha nada apropriado, achei que a limpeza fosse o mais importante."
80000062-29 = "Pensando bem, a aparência também é importante, então agora estou preocupada se isso acabou sendo um ponto negativo."
80000062-30 = "[s5] \"Não, acho que é a sua cara, Sena.\"\n[s6] \"Fico feliz que tenha tentado de várias formas.\""
80000062-31 = "……Você continua sendo alguém que não esconde o que pensa, Sensei."
80000062-32 = "……Você continua sendo alguém que não esconde o que pensa, Sensei."
80000062-33 = "De qualquer forma, fico aliviada que tenha gostado. Se quiser, gostaria de experimentar agora mesmo?"
80000062-37 = "Ouvi dizer que, nessas ocasiões, é comum que quem dá o presente também o ofereça na boca do outro. Já que estamos aqui, vamos fazer isso."
80000062-38 = "……O que houve? Por que está hesitando?"
80000062-39 = "Não se preocupe, é seguro e higiênico. Não se mova."
80000062-45 = "……Não tem jeito, vou ter que forçar."
80000062-49 = "(Assim, fui forçado pela Sena a comer... e, de fato, o chocolate estava muito gostoso.)"
