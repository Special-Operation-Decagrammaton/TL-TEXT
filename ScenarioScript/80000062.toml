[translation]
80000062-1 = "包まずにありのまま"
80000062-2 = "……ああ、先生。こんばんは。"
80000062-3 = "深夜にお呼びしてしまってすみません。一応待機中の身でしたので、遠くまで動くわけにはいかず。"
80000062-4 = "[s1] \"ううん、大丈夫。どうしたの？\"\n[s2] \"今日もお疲れさま。ところで今日はどんな用事で？\""
80000062-5 = "ありがとうございます。"
80000062-6 = "まあいつも通りということもありますし、本日は今のところさほど忙しくはないのですが……。"
80000062-7 = "先生もいつも通り、いえ今日は特にお忙しいと思いますので、さっそく本題に入りましょう。"
80000062-8 = "さあ、こちらを。"
80000062-14 = "[ns3] \"これ、バレンタインの……？\"\n[ns4] \"包帯が……。\""
80000062-15 = "はい、バレンタインチョコレートです。後悔はしたくないので、渡さねばと。"
80000062-16 = "はい、バレンタインチョコレートです。後悔はしたくないので、渡さねばと。"
80000062-17 = "本来ならもっときちんとしたものを、と思ったのですが……。"
80000062-18 = "残念ながらこのところずっとお店に行く余裕も無く、手元にあった材料でどうにか。"
80000062-19 = "[ns] \"そうなんだ、ありがとね。\""
80000062-21 = "[ns] \"……「手元にあった材料」？\""
80000062-22 = "はい。ご存知の通り、救急車にはありとあらゆる薬品やら材料がありますから。このようなチョコレートぐらいでしたら、何とか作ることが可能です。"
80000062-23 = "……？"
80000062-24 = "どうかされましたか？不安そうなお顔ですが。"
80000062-25 = "……ああ、およそ見当はつきました。ですがご心配なく。"
80000062-26 = "確かにそれは「チョコレートの味がする化合物」です。しかし身体に害はありません、むしろ良いでしょう。"
80000062-27 = "どちらかというと、その「包装」の方が気になるかもしれませんが…"
80000062-28 = "ちょうど良い物が無かったので、とにかく清潔さが大事かと思いまして。"
80000062-29 = "よく考えるとこういったものはビジュアルも大切なので、今になって実は減点対象だったのではと心配です。"
80000062-30 = "[s5] \"ううん、セナらしくて良いと思う。\"\n[s6] \"色々試行錯誤してくれたんだね、嬉しい。\""
80000062-31 = "……そういうところで包み隠さないのは相変わらずですね、先生。"
80000062-32 = "……そういうところで包み隠さないのは相変わらずですね、先生。"
80000062-33 = "何にせよ喜んでいただけたようで、ホッとしました。よろしければ今すぐにでもいかがですか？"
80000062-37 = "こういったものは、渡した方から相手に食べさせてあげることも多いと聞きました。せっかくですし実施してみましょう。"
80000062-38 = "……どうしましたか？何を躊躇うのです？"
80000062-39 = "心配しないでください、安全ですし清潔です。動かないでください。"
80000062-45 = "……やむを得ません、強行しますか。"
80000062-49 = "（そうしてセナから強制的にあーん（？）をされ……確かに味はすごく美味しいチョコレートを味わった）"
