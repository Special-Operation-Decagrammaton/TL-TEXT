[translation]
80000135-1 = "É doce e durão"
80000135-2 = "Escritório do Schale"
80000135-4 = "Quanto tempo, Sensei!"
80000135-5 = "Aliás, hoje eu trouxe algo muito bom!"
80000135-6 = "[s] \"Por acaso, você estava voltando de uma negociação...?\""
80000135-7 = "Negociação, eu diria que fui buscar um item encomendado."
80000135-8 = "Mas hoje foi tranquilo. Era apenas um tipo."
80000135-9 = "Vamos, Sensei, dê uma olhada."
80000135-15 = "（Fuyu então mostrou o interior da sua bolsa）"
80000135-16 = "（Objetos esféricos suspeitos, embalados individualmente, estavam amontoados lá dentro）"
80000135-17 = "[ns] \"Isso é...?\""
80000135-18 = "Fufu, como pode ver..."
80000135-19 = "[s] \"Uma bomba?\""
80000135-20 = "Sim, exatamente—"
80000135-21 = "Não, não é!#nÉ bala, bala!"
80000135-22 = "O que você pensa que o Departamento de Comércio Especial é!?"
80000135-23 = "……Para começar, explosivos não dão lucro.#nE a demanda por eles é baixa."
80000135-24 = "[s] \"Entendo...\""
80000135-25 = "Sim. Se tiver munição caseira e granadas, é fácil de fazer."
80000135-26 = "[s] \"A propósito, que bala é essa...?\""
80000135-27 = "Isso se chama Gobstopper."
80000135-28 = "É apenas uma bala feita de 99% de açúcar..."
80000135-29 = "No entanto, é conhecida por ser muito \"dura\"."
80000135-30 = "Como é feita de várias camadas de açúcar derretido, é extremamente rígida."
80000135-31 = "……Por esse motivo, o comércio dela chegou a ser proibido."
80000135-32 = "[s] \"E por que isso...?\""
80000135-33 = "Sim. Houve casos de alunas que tentaram morder a bala e quebraram os dentes."
80000135-34 = "Por isso, o Comitê Disciplinar proibiu o manuseio."
80000135-35 = "[s] \"Entendo...\""
80000135-36 = "Mas, se você apenas chupar, é uma bala que dura bastante. É perfeita para quando você quer se concentrar em algo, então há demanda."
80000135-37 = "Graças a isso, nossos bolsos estão cheios... digo, não é isso..."
80000135-42 = "……Sensei, pegue isto."
80000135-44 = "（Ela me deu a maior bala de todas）"
80000135-45 = "（……É do tamanho de uma bola de beisebol）"
80000135-47 = "[ns] \"Isso é...?\""
80000135-48 = "Eu não disse antes?#nQue trouxe algo bom."
80000135-49 = "É uma edição limitada de tamanho extra grande, uma bala de chocolate Gobstopper."
80000135-50 = "Sabe, hoje é... Dia dos Namorados, não é?"
80000135-51 = "[s] \"Obrigado, Fuyu...!\""
80000135-52 = "……Fufu."
80000135-53 = "[s1] \"Mas com esse tamanho...\"\n[s2] \"Vou precisar de um martelo ou algo assim...\""
80000135-56 = "Não, não será necessário."
80000135-60 = "[ns] \"Uma arma...?\""
80000135-62 = "Bang!"
80000135-66 = "Vamos, por favor, aproveite!"
80000135-67 = "[s] \"Ah, obrigado...\""
80000135-69 = "（Ao colocar uma na boca...）"
80000135-70 = "（O sabor era melhor do que eu imaginava）"
80000135-71 = "[ns] \"É deliciosa...!\""
80000135-72 = "Não é?"
80000135-73 = "Como é uma edição limitada, dizem que se esforçaram mais do que o habitual!"
80000135-74 = "[s] \"Fuyu, você não quer comer comigo?\""
80000135-79 = "Ah...! S-sim!"
80000135-81 = "……Entendo. De fato, isso é delicioso."
80000135-82 = "[s] \"Parece que não vamos terminar de comer tão cedo, né?\""
80000135-83 = "Sim, esse momento doce vai durar bastante."
80000135-84 = "……Durante esse tempo, você vai ficar pensando em mim, não vai?"
80000135-88 = "Opa, já está na hora! Então, com licença!"
80000135-95 = "……"
80000135-96 = "Aaaaaahhhhh……!"
80000135-97 = "Que frase vergonhosa de se dizer……!"
80000135-98 = "……Ugh."
80000135-99 = "Bem, é melhor do que me arrepender de não ter tentado……"
80000135-103 = "……Certo, hora de ir embora! Vou embora agora mesmo! Antes que a gente se encontre!"
