[translation]
1602008-1 = "A Sniper's Secret Base"
1602008-2 = "(After finishing a meeting outside, I was heading back to Schale when...)"
1602008-7 = "[ns] \"Hello! What are you doing?\""
1602008-8 = "Oh, Sensei!"
1602008-9 = "Good work today."
1602008-10 = "We received a report, so I'm currently investigating the area."
1602008-11 = "[s] \"Is there some kind of incident?\""
1602008-12 = "No, not exactly an incident, but..."
1602008-13 = "Sensei, have you ever seen a pattern like this?"
1602008-18 = "[ns1] \"Is it graffiti...?\"\n[ns2] \"Maybe it's a cursed mark...\""
1602008-20 = "P-please don't say such ominous things!"
1602008-21 = "We've been getting reports that these patterns have been appearing all over D.U. lately, so we're investigating..."
1602008-22 = "There's almost nothing in common between the places where they've been drawn..."
1602008-23 = "There are no traces of crime, and it doesn't look like they're trying to communicate anything either..."
1602008-24 = "But since it's still suspicious, the Public Safety Bureau is stepping up patrols in this area."
1602008-25 = "[s] \"Good work...\""
1602008-26 = "No, it's just our job."
1602008-27 = "If you find a pattern like this, please let us know immediately!"
1602008-28 = "[s] \"Sure. I'll keep that in mind.\""
1602008-29 = "Thank you!"
1602008-34 = "(A while later...)"
1602008-36 = "[ns3] \"The forecast didn't say anything about rain...\"\n[ns4] \"I wonder if there's somewhere nearby to take shelter?\""
1602008-39 = "[ns] I head under the overpass."
1602008-42 = "(The overpass on a rainy day was quiet, with no signs of people, only the occasional sound of passing cars.)"
1602008-43 = "(It seems someone dumped construction waste here, as trash is scattered about.)"
1602008-44 = "(Looking at the pillar behind the trash...)"
1602008-45 = "[ns] \"What is this...?\""
1602008-47 = "(The pattern the Valkyrie student showed me is drawn above the ladder under the overpass.)"
1602008-51 = "(When I listened closely, I felt a faint presence from above.)"
1602008-52 = "[ns5] \"Maybe a wild animal...?\"\n[ns6] \"But it could also be a hideout for delinquent students...\""
1602008-55 = "[ns] I try climbing the ladder."
1602008-59 = "...Who's there!"
1602008-60 = "[ns7] \"W-wait, don't shoot!\"\n[ns8] \"I'm just passing through!\""
1602008-62 = "Then why go through the trouble of coming up here?"
1602008-63 = "...Wait, Sensei?"
1602008-67 = "[ns] \"Otogi?\""
1602008-68 = "Aw, you found me. And I just finished making it, too."
1602008-73 = "How did you know I was here?"
1602008-74 = "[s] \"Because there was a suspicious symbol drawn on the ladder.\""
1602008-75 = "Oh, you mean the hobo sign."
1602008-76 = "It's a type of sign used by wanderers."
1602008-77 = "It tells you who's here, or if it's a safe place."
1602008-78 = "During missions, I often end up in wanderers' spots, so I mark them with symbols, but..."
1602008-79 = "I can't believe it caught your eye, Sensei. I'll have to use a different method next time."
1602008-80 = "[s] \"Is this your secret base, Otogi?\""
1602008-81 = "Yeah. It's surprisingly spacious, right?"
1602008-82 = "I can keep ammo, batteries, and other things I need for operations here."
1602008-83 = "And there's even a coffee pot... for taking a break during missions!"
1602008-87 = "Hmm. It doesn't look like the rain is going to stop anytime soon..."
1602008-88 = "Want a cup of coffee?"
1602008-93 = "[wa:1590]― [log=오토기]Ugh...[wa:1250] so bitter...[/log]"
1602008-95 = "― [log=오토기]Why do old beans taste so bad?[/log]"
1602008-98 = "[ns9] \"I don't think it's that bad.\"\n[ns10] \"There's a certain romance to drinking it outside on a rainy day like this.\""
1602008-101 = "[wa:740]― [log=오토기]Romance...[wa:936] huh.[/log]"
1602008-103 = "― [log=오토기]...I guess you're right.[/log]"
1602008-106 = "― [log=오토기]If there wasn't any romance,[/log]"
1602008-108 = "― [log=오토기]I probably wouldn't have made it[wa:434] this far.[/log]"
1602008-111 = "[wa:930]― [log=오토기]When you were little,[/log]"
1602008-113 = "― [log=오토기]didn't you ever dream of having a secret base?[/log]"
1602008-116 = "― [log=오토기]But,[/log]"
1602008-118 = "― [log=오토기]when you actually build one, it's nothing like what you imagined...[/log]"
1602008-121 = "― [log=오토기]It's cramped,[/log]"
1602008-123 = "― [log=오토기]and there's not much you can actually do there.[/log]"
1602008-127 = "[wa:2500]― [log=오토기]It was like...[/log]"
1602008-129 = "― [log=오토기]being confronted with the difference between dreams and reality.[/log]"
1602008-132 = "― [log=오토기]The adult I wanted to be,[/log]"
1602008-134 = "― [log=오토기]and life in the SRT.[/log]"
1602008-137 = "[wa:1630]― [log=오토기]But,[/log]"
1602008-139 = "― [log=오토기]maybe that's why.[/log]"
1602008-142 = "― [log=오토기]No matter what form reality takes,[/log]"
1602008-144 = "― [log=오토기]I've come to think it has its own charm.[/log]"
1602008-147 = "[wa:1900]― [log=오토기]Sensei, [wa:1450]what do you think of this old coffee, filled with romance?[/log]"
1602008-149 = "― [log=오토기]What do you think?[/log]"
1602008-152 = "― [log=오토기]Hehe...[/log]"
1602008-154 = "― [log=오토기]Once again, [wa:1600]welcome to my world.[/log]"
1602008-157 = "(After that, I spent a pleasant time with Otogi, drinking coffee under the rainy overpass.)"