[translation]
1602008-1 = "A Certain Sniper's Secret Base"
1602008-2 = "(After finishing a meeting outside, I was heading back to Schale when...)"
1602008-7 = "[ns] \"Hello! What are you doing?\""
1602008-8 = "Ah, Sensei!"
1602008-9 = "Thank you for your hard work."
1602008-10 = "We received a report, so I am currently investigating this area."
1602008-11 = "[s] \"Has there been an incident?\""
1602008-12 = "No, nothing you could call an incident, but..."
1602008-13 = "Sensei, have you seen a pattern like this?"
1602008-18 = "[ns1] \"Graffiti, maybe...?\"\n[ns2] \"Maybe it's a cursed mark...\""
1602008-20 = "P-Please don't say such ominous things!"
1602008-21 = "Recently, we've received reports that patterns like this are being drawn all over the D.U., so we're investigating..."
1602008-22 = "There's almost nothing in common between the places where they're drawn..."
1602008-23 = "There are no traces of a crime, but it doesn't seem to be conveying a message #neither..."
1602008-24 = "However, it's still suspicious, so the Security Bureau is stepping up patrols in #nthis area."
1602008-25 = "[s] \"Thank you for your hard work...\""
1602008-26 = "Not at all. It's our duty."
1602008-27 = "If you see a pattern like this, please contact us immediately!"
1602008-28 = "[s] \"Yeah, I'll keep that in mind.\""
1602008-29 = "Thank you!"
1602008-34 = "(A little while later...)"
1602008-36 = "[ns3] \"It wasn't in the forecast, but it's raining...\"\n[ns4] \"Is there somewhere nearby where I can take shelter from the rain?\""
1602008-39 = "[ns] Head under the overpass."
1602008-42 = "(The overpass on a rainy day was quiet, with no signs of people, just the occasional sound of a passing car.)"
1602008-43 = "(It seemed someone had dumped construction debris, and the trash #nis scattered all over the place.)"
1602008-44 = "(Looking at the pillar beyond the trash...)"
1602008-45 = "[ns] \"This is...?\""
1602008-47 = "(The pattern the Valkyrie student showed me was drawn above the ladder #nunder the overpass.)"
1602008-51 = "(Listening closely, I felt a faint presence from above.)"
1602008-52 = "[ns5] \"A wild animal, maybe...?\"\n[ns6] \"But there's also the possibility that it's a hideout for delinquent...\""
1602008-55 = "[ns] Climb the ladder to take a look."
1602008-59 = "...Who's there!"
1602008-60 = "[ns7] \"P-Please don't shoot!\"\n[ns8] \"I'm just a passerby!\""
1602008-62 = "Then why go through the trouble of coming up here?"
1602008-63 = "...Huh, Sensei?"
1602008-67 = "[ns] \"Otogi?\""
1602008-68 = "Ah man, I've been found out. And I just made it, too."
1602008-73 = "How did you know I was here?"
1602008-74 = "[s] \"There was a suspicious symbol drawn on the ladder.\""
1602008-75 = "Ah, you mean the hobo sign."
1602008-76 = "It's a type of sign used by wanderers."
1602008-77 = "It communicates who is here and whether it's a safe place."
1602008-78 = "During missions, we often end up trespassing into wanderers’ areas, so we mark #nthem with a symbol..."
1602008-79 = "To think it would catch Sensei's eye. I'll have to use a different method next time."
1602008-80 = "[s] \"Is this your secret base, Otogi?\""
1602008-81 = "Yeah. It's surprisingly spacious, isn't it?"
1602008-82 = "I can store ammo, batteries, and other things I need for operations here."
1602008-83 = "I even have a... coffee pot to take a breather during operations!"
1602008-87 = "Hmm. It doesn't look like the rain will let up anytime soon..."
1602008-88 = "How about a cup of coffee?"
1602008-93 = "[wa:1240]― [log=오토기]Ugh...[wa:1250] so bitter...[/log]"
1602008-95 = "― [log=오토기]Why do old beans taste so bad?[/log]"
1602008-98 = "[ns9] \"I don't think it's that bad.\"\n[ns10] \"Besides, drinking it outside on a rainy day like this adds a touch of romance.\""
1602008-101 = "[wa:360]― [log=오토기]Romance...[wa:936] huh.[/log]"
1602008-103 = "― [log=오토기]...I suppose.[/log]"
1602008-106 = "― [log=오토기]Without that sense of wonder,[/log]"
1602008-108 = "― [log=오토기]I probably wouldn't have made it this far.[/log]"
1602008-111 = "[wa:520]― [log=오토기]When you were little,[/log]"
1602008-113 = "― [log=오토기]didn't you look up to secret bases?[/log]"
1602008-116 = "― [log=오토기]But,[/log]"
1602008-118 = "― [log=오토기]when I tried one, it's very different from what I expected...[/log]"
1602008-121 = "― [log=오토기]It’s cramped [/log]"
1602008-123 = "― [log=오토기]and there’s not much you can do.[/log]"
1602008-127 = "[wa:2050]― [log=오토기]Somehow...[/log]"
1602008-129 = "― [log=오토기]It felt like the gap between dreams and reality was hitting in my face.[/log]"
1602008-132 = "― [log=오토기]Both my ideal of an adult,[/log]"
1602008-134 = "― [log=오토기]and my life at SRT.[/log]"
1602008-137 = "[wa:1180]― [log=오토기]But,[/log]"
1602008-139 = "― [log=오토기]maybe that's exactly why.[/log]"
1602008-142 = "― [log=오토기]No matter what shape reality takes,[/log]"
1602008-144 = "― [log=오토기]I've started to feel like it has its own unique flavor, I guess.[/log]"
1602008-147 = "[wa:1900]― [log=오토기]Sensei, [wa:1450]What do you think of this old coffee packed with charm?[/log]"
1602008-149 = "― [log=오토기]What do you think?[/log]"
1602008-152 = "― [log=오토기]Hehe...[/log]"
1602008-154 = "― [log=오토기]Once again, [wa:1000]welcome to my world.[/log]"
1602008-157 = "(After that, I spent a pleasant time drinking coffee with Otogi under the overpass #nin the rain.)"