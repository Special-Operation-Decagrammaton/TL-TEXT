[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1602008-1 = "A Base Secreta de uma Sniper" 
1602008-2 = "（Voltando para a Schale após terminar\numa reunião externa...）" 
1602008-7 = "[ns] \"Olá! O que vocês\nestão fazendo?\"" 
1602008-8 = "Ah, Sensei!" 
1602008-9 = "Bom trabalho hoje." 
1602008-10 = "Recebemos uma denúncia,\nentão estamos investigando a área." 
1602008-11 = "[s] \"Aconteceu algum incidente?\"" 
1602008-12 = "Não, nada que possamos classificar como um incidente grave, mas..." 
1602008-13 = "Sensei, por acaso você já viu esse tipo de símbolo por aí?" 
1602008-18 = "[ns1] \"Uma pichação, talvez...?\"\n[ns2] \"Ou será a marca de alguma maldição...\"" 
1602008-20 = "P-Por favor, não diga algo\ntão sinistro assim!" 
1602008-21 = "Temos recebido relatos de que esses símbolos estão aparecendo\npor todo o Distrito D.U., e estamos investigando..." 
1602008-22 = "Mas os locais onde eles são desenhados\nquase não possuem nada em comum..." 
1602008-23 = "Não há sinais de crimes, mas também não parecem\nestar transmitindo nenhuma mensagem clara..." 
1602008-24 = "Mas, como não deixa de ser algo suspeito,\na agência de segurança está reforçando a patrulha por toda a área." 
1602008-25 = "[s] \"Obrigado pelo trabalho duro...\"" 
1602008-26 = "Imagina.\nÉ o nosso dever, afinal." 
1602008-27 = "Se avistar algum desses símbolos por aí,\nnos avise imediatamente, por favor!" 
1602008-28 = "[s] \"Pode deixar.\nVou ficar de olho.\"" 
1602008-29 = "Muito obrigada!" 
1602008-34 = "（Um tempo depois...）" 
1602008-36 = "[ns3] \"Não havia previsão de chuva para hoje...\"\n[ns4] \"Será que tem algum lugar para eu me abrigar por aqui?\"" 
1602008-39 = "[ns] Corro para debaixo de um viaduto." 
1602008-42 = "（Em dias de chuva, debaixo do viaduto é silencioso,\nouviam-se apenas os sons esporádicos dos carros passando lá em cima.）" 
1602008-43 = "（Alguém parecia ter descartado entulho de construção ali,\npois havia muito lixo espalhado de qualquer jeito.）" 
1602008-44 = "（Ao olhar para a pilastra atrás do lixo...）" 
1602008-45 = "[ns] \"Isso é...?\"" 
1602008-47 = "（O mesmo símbolo que as alunas da Valkyrie me mostraram\nestava desenhado logo acima de uma escada que subia pela pilastra.）" 
1602008-51 = "（Ao prestar atenção,\nouvi um ruído muito sutil vindo lá de cima.）" 
1602008-52 = "[ns5] \"Será algum animal selvagem...?\"\n[ns6] \"Mas pode ser o esconderijo de alguma gangue de delinquentes...\"" 
1602008-55 = "[ns] Decido subir as escadas." 
1602008-59 = "……Quem tá aí?!" 
1602008-60 = "[ns7] \"N-Não atire, por favor!\"\n[ns8] \"Eu sou só um mero transeunte!\"" 
1602008-62 = "Se é só um transeunte,\npor que se deu ao trabalho de subir?" 
1602008-63 = "……Opa, Sensei?" 
1602008-67 = "[ns] \"Otogi?\"" 
1602008-68 = "Ah, fui descoberta~\nE olha que eu acabei de montar esse lugar." 
1602008-73 = "Como foi que você descobriu\nque eu estava escondida aqui?" 
1602008-74 = "[s] \"Tinha um símbolo suspeito\ndesenhado perto da escada.\"" 
1602008-75 = "Ah, aqueles 'Hobo Signs' (Símbolos de Vagabundos)." 
1602008-76 = "É um tipo de código\nque andarilhos costumam usar." 
1602008-77 = "Eles servem para informar quem está no local,\nse o lugar é seguro, esse tipo de coisa." 
1602008-78 = "Durante as missões, eu acabo invadindo muito esses espaços de andarilhos,\nentão eu deixo esses símbolos marcados para avisar..." 
1602008-79 = "Mas pensar que isso chamaria a sua atenção, Sensei.\nVou ter que inventar um método diferente da próxima vez." 
1602008-80 = "[s] \"Essa aqui é a sua base secreta, Otogi?\"" 
1602008-81 = "Uhum. É bem mais\nespaçosa do que parece, não acha?" 
1602008-82 = "Dá para eu estocar munição, baterias,\ne todo tipo de material que preciso para as missões." 
1602008-83 = "Até mesmo... uma cafeteira\npara eu dar uma relaxada entre uma operação e outra!" 
1602008-87 = "Hmm. Parece que essa chuva não vai\nparar tão cedo..." 
1602008-88 = "Que tal\numa xícara de café?" 
1602008-93 = "[wa:1590]― [log=오토기]Ugh... [wa:1250]amargo...[/log]" 
1602008-95 = "― [log=오토기]Por que grãos velhos têm que ser tão ruins assim?[/log]" 
1602008-98 = "[ns9] \"Eu não acho\ntão ruim assim.\"\n[ns10] \"Tomar um café aqui fora num dia chuvoso assim\ntem o seu próprio charme romântico.\"" 
1602008-101 = "[wa:740]― [log=오토기]Romance... [wa:936]é?[/log]" 
1602008-103 = "― [log=오토기]...É, tem razão.[/log]" 
1602008-106 = "― [log=오토기]Se não houvesse nenhum pingo de romance...[/log]" 
1602008-108 = "― [log=오토기]Eu jamais teria chegado [wa:434]até aqui.[/log]" 
1602008-111 = "[wa:930]― [log=오토기]Quando você era criança,[/log]" 
1602008-113 = "― [log=오토기]Nunca sonhou em ter a sua própria base secreta?[/log]" 
1602008-116 = "― [log=오토기]Mas,[/log]" 
1602008-118 = "― [log=오토기]Quando finalmente tentei fazer uma, era totalmente diferente do que eu imaginava...[/log]" 
1602008-121 = "― [log=오토기]É um lugar apertado,[/log]" 
1602008-123 = "― [log=오토기]E não tem muita coisa para se fazer.[/log]" 
1602008-127 = "[wa:2500]― [log=오토기]De certa forma...[/log]" 
1602008-129 = "― [log=오토기]Foi como se tivessem esfregado a realidade na cara do meu sonho.[/log]" 
1602008-132 = "― [log=오토기]O adulto ideal que eu queria ser,[/log]" 
1602008-134 = "― [log=오토기]E a vida dentro da SRT.[/log]" 
1602008-137 = "[wa:1630]― [log=오토기]Mas,[/log]" 
1602008-139 = "― [log=오토기]Talvez seja exatamente por isso.[/log]" 
1602008-142 = "― [log=오토기]Não importa quão dura seja a realidade,[/log]" 
1602008-144 = "― [log=오토기]Eu aprendi a apreciar o sabor único de cada coisa.[/log]" 
1602008-147 = "[wa:1900]― [log=오토기]Diga, Sensei... [wa:1450]E esse café velho recheado de romance,[/log]" 
1602008-149 = "― [log=오토기]O que achou dele?[/log]" 
1602008-152 = "― [log=오토기]Fufu...[/log]" 
1602008-154 = "― [log=오토기]Novamente, [wa:1600]bem-vindo ao meu mundo.[/log]" 
1602008-157 = "（Depois disso, sob o viaduto chuvoso,\nbebemos o nosso café e passamos um tempo muito agradável juntos.）" 