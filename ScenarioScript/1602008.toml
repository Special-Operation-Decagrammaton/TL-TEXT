[translation]
1602008-1 = "A base secreta de uma atiradora"
1602008-2 = "（Após terminar uma reunião externa e retornar ao Schale...）"
1602008-7 = "[ns] \"Olá! O que está fazendo?\""
1602008-8 = "Ah, Sensei [USERNAME]!"
1602008-9 = "Bom trabalho."
1602008-10 = "Recebemos uma denúncia e estou investigando esta área no momento."
1602008-11 = "[s] \"Algum incidente?\""
1602008-12 = "Não. Não chega a ser um incidente, mas..."
1602008-13 = "Sensei, já viu um símbolo como este?"
1602008-18 = "[ns1] \"Será um pichação...?\"\n[ns2] \"Pode ser um símbolo de maldição...\""
1602008-20 = "P-por favor, pare de dizer coisas tão agourentas!"
1602008-21 = "Recebemos denúncias de que símbolos como este estão sendo desenhados por toda D.U. ultimamente, então estamos investigando..."
1602008-22 = "Quase não há pontos em comum entre os locais onde foram desenhados..."
1602008-23 = "Não há vestígios de crimes, e também não parece que estão tentando transmitir algo..."
1602008-24 = "Mas, como ainda é algo suspeito, a Academia de Polícia está reforçando as patrulhas nesta região."
1602008-25 = "[s] \"Bom trabalho...\""
1602008-26 = "Não há de quê. É o nosso dever."
1602008-27 = "Se encontrar um símbolo desses, por favor, entre em contato imediatamente!"
1602008-28 = "[s] \"Certo. Vou me lembrar disso.\""
1602008-29 = "Obrigada!"
1602008-34 = "（Algum tempo depois...）"
1602008-36 = "[ns3] \"A previsão não dizia que ia chover...\"\n[ns4] \"Será que não tem um lugar por perto para se abrigar da chuva?\""
1602008-39 = "[ns] Seguir para debaixo do viaduto."
1602008-42 = "（Debaixo do viaduto em um dia de chuva, o silêncio reinava, interrompido apenas pelo som ocasional dos carros passando）"
1602008-43 = "（Parece que alguém descartou entulhos de construção, deixando lixo espalhado por toda parte）"
1602008-44 = "（Ao olhar para o pilar atrás do lixo...）"
1602008-45 = "[ns] \"O que é isso...?\""
1602008-47 = "（O símbolo que a aluna da Valkyrie me mostrou está desenhado acima da escada sob o viaduto）"
1602008-51 = "（Ao inclinar a cabeça para ouvir, senti uma presença fraca lá em cima）"
1602008-52 = "[ns5] \"Será um animal selvagem...?\"\n[ns6] \"Mas também pode ser o esconderijo de alunas delinquentes...\""
1602008-55 = "[ns] Subir a escada."
1602008-59 = "……Quem está aí!"
1602008-60 = "[ns7] \"N-não atire!\"\n[ns8] \"Estou apenas de passagem!\""
1602008-62 = "Então, por que se deu ao trabalho de subir?"
1602008-63 = "……Ué, Sensei?"
1602008-67 = "[ns] \"Otogi?\""
1602008-68 = "Ah, droga, fui descoberta. E olha que acabei de montar isso."
1602008-73 = "Como você sabia que eu estava aqui?"
1602008-74 = "[s] \"Porque havia um símbolo suspeito na escada.\""
1602008-75 = "Ah, você fala do sinal de andarilho."
1602008-76 = "É um tipo de sinal usado por nômades."
1602008-77 = "Serve para indicar quem está aqui ou se é um lugar seguro."
1602008-78 = "Como costumo acabar entrando em lugares de andarilhos durante as missões, eu uso os símbolos para marcar..."
1602008-79 = "Quem diria que isso chamaria a atenção do Sensei... Da próxima vez, terei que usar outro método."
1602008-80 = "[s] \"Este é o seu esconderijo secreto, Otogi?\""
1602008-81 = "Sim. É surpreendentemente espaçoso, né?"
1602008-82 = "Dá para guardar munição, baterias e outras coisas necessárias para as operações."
1602008-83 = "E também tem... um bule de café para dar uma descansada durante as missões!"
1602008-87 = "Hmm. Não parece que a chuva vai parar tão cedo..."
1602008-88 = "Quer uma xícara de café?"
1602008-93 = "[wa:1590]― [log=오토기]Ugh... [wa:1250]amargo...[/log]"
1602008-95 = "― [log=오토기]Por que será que grãos velhos são tão ruins assim?[/log]"
1602008-98 = "[ns9] \"Eu não acho que sejam tão ruins assim.\"\n[ns10] \"Beber aqui fora, num dia de chuva, tem até o seu charme.\""
1602008-101 = "[wa:740]― [log=오토기]Charme... [wa:936]é.[/log]"
1602008-103 = "― [log=오토기]...É verdade.[/log]"
1602008-106 = "― [log=오토기]Se não fosse pelo charme,[/log]"
1602008-108 = "― [log=오토기]eu provavelmente não teria [wa:434]chegado até aqui.[/log]"
1602008-111 = "[wa:930]― [log=오토기]Quando você era pequeno,[/log]"
1602008-113 = "― [log=오토기]não sonhava em ter uma base secreta?[/log]"
1602008-116 = "― [log=오토기]Mas,[/log]"
1602008-118 = "― [log=오토기]quando você realmente tentava fazer uma, era totalmente diferente do que imaginava...[/log]"
1602008-121 = "― [log=오토기]Era apertado,[/log]"
1602008-123 = "― [log=오토기]e não tinha quase nada para fazer.[/log]"
1602008-127 = "[wa:2500]― [log=오토기]Parecia que...[/log]"
1602008-129 = "― [log=오토기]eu estava sendo confrontada com a realidade dos meus sonhos.[/log]"
1602008-132 = "― [log=오토기]Tanto o adulto ideal,[/log]"
1602008-134 = "― [log=오토기]quanto a vida na SRT.[/log]"
1602008-137 = "[wa:1630]― [log=오토기]Mas,[/log]"
1602008-139 = "― [log=오토기]talvez seja justamente por isso.[/log]"
1602008-142 = "― [log=오토기]Não importa a forma que a realidade tome,[/log]"
1602008-144 = "― [log=오토기]eu comecei a achar que ela tem o seu valor.[/log]"
1602008-147 = "[wa:1900]― [log=오토기]Sensei, [wa:1450]o que você acha desse café velho, cheio de charme?[/log]"
1602008-149 = "― [log=오토기]O que acha?[/log]"
1602008-152 = "― [log=오토기]Hehe...[/log]"
1602008-154 = "― [log=오토기]Mais uma vez, [wa:1600]bem-vindo ao meu mundo.[/log]"
1602008-157 = "(Depois disso, passei um tempo agradável bebendo café com Otogi sob o viaduto enquanto chovia)"
