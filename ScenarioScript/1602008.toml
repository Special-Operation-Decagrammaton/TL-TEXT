[translation]
1602008-1 = "ある狙撃手の秘密基地"
1602008-2 = "（外部でのミーティングを終えて、シャーレに戻っていると……）"
1602008-7 = "[ns] \"こんにちは！何をしているの？\""
1602008-8 = "あっ、[USERNAME]先生！"
1602008-9 = "お疲れさまです。"
1602008-10 = "通報が入りまして、現在この周辺を捜査しているんです。"
1602008-11 = "[s] \"何か事件でも？\""
1602008-12 = "いいえ。事件というほどのことではありませんが……。"
1602008-13 = "先生、このような模様をご覧になったことは？"
1602008-18 = "[ns1] \"落書きかな……？\"\n[ns2] \"呪いの印だったりして……。\""
1602008-20 = "そ、そんな不吉なことを言うのはやめてください！"
1602008-21 = "最近、D.U.の至る所にこのような模様が描かれていると通報があり、調査しているのですが……。"
1602008-22 = "描かれた場所に共通点と言えるものが、ほとんどなくて……。"
1602008-23 = "犯罪の痕跡もなく、だからと言って何かを伝えているようにも見えず……。"
1602008-24 = "ですが怪しいことには代わりはないので、警備局でこの一帯の巡回を強化中です。"
1602008-25 = "[s] \"ご苦労さま……。\""
1602008-26 = "いいえ。我々の業務ですから。"
1602008-27 = "このような模様を見つけたら、すぐにご連絡ください！"
1602008-28 = "[s] \"うん。覚えておくね。\""
1602008-29 = "ありがとうございます！"
1602008-34 = "（しばらくして……）"
1602008-36 = "[ns3] \"こんな予報じゃなかったのに、雨が……。\"\n[ns4] \"近くに雨宿りできる所はないかな？\""
1602008-39 = "[ns] 高架道路の下に向かう。"
1602008-42 = "（雨の日の高架道路は、たまに通る車の音が聞こえるだけで、人の気配はなく静かだった）"
1602008-43 = "（誰かが建築廃材を投棄したらしく、ゴミが乱雑に置かれている）"
1602008-44 = "（ゴミの向こうの柱を見ると……）"
1602008-45 = "[ns] \"これは……？\""
1602008-47 = "（ヴァルキューレの生徒が見せてくれた模様が、高架下の梯子の上に描かれている）"
1602008-51 = "（耳を傾けてみると、上のほうでかすかな気配を感じた）"
1602008-52 = "[ns5] \"野生動物かな……？\"\n[ns6] \"だけど、不良生徒たちのアジトの可能性もあるし……。\""
1602008-55 = "[ns] 梯子を上ってみる。"
1602008-59 = "……誰だ！"
1602008-60 = "[ns7] \"う、撃たないでください！\"\n[ns8] \"ただの通りすがりです！\""
1602008-62 = "じゃあ、なぜわざわざ上がってくるんだ？"
1602008-63 = "……あれっ、先生？"
1602008-67 = "[ns] \"オトギ？\""
1602008-68 = "あーあ、バレちゃったぁ。作ったばかりなのに。"
1602008-73 = "私がここにいるって、どうやって分かったのぉ？"
1602008-74 = "[s] \"梯子に怪しい記号が描かれていたから。\""
1602008-75 = "あ、ホーボーサインのことねぇ。"
1602008-76 = "これは、放浪者が使う、サインの一種。"
1602008-77 = "ここに誰がいるのか、安全な場所なのか、っていうのを伝えるんだよ。"
1602008-78 = "任務中には、放浪者の場所に入り込んでしまうことが多いから、記号で表示しておくんだけど……。"
1602008-79 = "それが先生の目を引いちゃうなんてねぇ、次からは別の方法にしなきゃ。"
1602008-80 = "[s] \"ここがオトギの秘密基地なの？\""
1602008-81 = "うん。意外と広いでしょ？"
1602008-82 = "弾薬とかバッテリーとか作戦に必要な物がおいておけるし。"
1602008-83 = "作戦中に一息つくための……コーヒーポットもあるんだ！"
1602008-87 = "うーん。当分、雨やみそうにないし……。"
1602008-88 = "コーヒーでも一杯、どう？"
1602008-93 = "[wa:1590]― [log=오토기]うっ……[wa:1250]にが……。[/log]"
1602008-95 = "― [log=오토기]古い豆ってどうしてこう美味しくないんだろ。[/log]"
1602008-98 = "[ns9] \"私はそれほど悪くないと思うよ。\"\n[ns10] \"こうして雨の日に、外で飲むからロマンもあるし。\""
1602008-101 = "[wa:740]― [log=오토기]ロマン……[wa:936]かぁ。[/log]"
1602008-103 = "― [log=오토기]……そうだね。[/log]"
1602008-106 = "― [log=오토기]ロマンがなかったら、[/log]"
1602008-108 = "― [log=오토기]ここまで[wa:434]来られなかっただろうし。[/log]"
1602008-111 = "[wa:930]― [log=오토기]小さい頃にさ、[/log]"
1602008-113 = "― [log=오토기]秘密基地に憧れたりしなかった？[/log]"
1602008-116 = "― [log=오토기]でも、[/log]"
1602008-118 = "― [log=오토기]実際に作ってみると思ってたのと全然違って……。[/log]"
1602008-121 = "― [log=오토기]狭いし、[/log]"
1602008-123 = "― [log=오토기]あんまりできることもなくてさ。[/log]"
1602008-127 = "[wa:2500]― [log=오토기]なんか……[/log]"
1602008-129 = "― [log=오토기]夢と現実を突きつけられたみたいだったんだよね。[/log]"
1602008-132 = "― [log=오토기]理想の大人も、[/log]"
1602008-134 = "― [log=오토기]SRTの生活も。[/log]"
1602008-137 = "[wa:1630]― [log=오토기]でも、[/log]"
1602008-139 = "― [log=오토기]だからこそっていうのかな。[/log]"
1602008-142 = "― [log=오토기]現実がどんな形でも、[/log]"
1602008-144 = "― [log=오토기]味があるって思うようになったっていうか。[/log]"
1602008-147 = "[wa:1900]― [log=오토기]先生はさ、[wa:1450]ロマンが詰まった古いコーヒー、[/log]"
1602008-149 = "― [log=오토기]どう思う？[/log]"
1602008-152 = "― [log=오토기]ふふっ……[/log]"
1602008-154 = "― [log=오토기]改めまして、[wa:1600]私の世界へようこそ。[/log]"
1602008-157 = "（その後、雨の降る高架道路の下でオトギと一緒にコーヒーを飲みながら、楽しい時間を過ごした）"
