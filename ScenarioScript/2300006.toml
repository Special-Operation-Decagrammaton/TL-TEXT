[translation]
2300006-1 = "Um pequeno encontro"
2300006-2 = "Schale - Escritório"
2300006-4 = "（A pilha de documentos que eu vinha adiando cresceu tanto que parecia uma criatura viva sentada ali）"
2300006-5 = "（Pelo visto, se eu não começar a trabalhar de verdade agora, as coisas vão ficar feias...）"
2300006-6 = "Plim♪"
2300006-7 = "[ns] \"Será que é o MomoTalk?\""
2300006-11 = "[ns] \"Mas agora eu preciso trabalhar...\""
2300006-15 = "（Depois disso, o celular notificou várias vezes, mas ignorei tudo e foquei no trabalho）"
2300006-17 = "（No dia seguinte）"
2300006-18 = "（Após virar a noite e passar do meio-dia, finalmente terminei toda a papelada acumulada）"
2300006-22 = "（Pensei em dormir, mas talvez por causa da quantidade de café que tomei, não sinto sono）"
2300006-23 = "（Depois de pensar um pouco, decidi sair para dar uma volta）"
2300006-26 = "（Em um caminho tranquilo perto de Schale, vejo um rosto familiar）"
2300006-28 = "[s] \"...Airi?\""
2300006-29 = "Ah, Sensei!?"
2300006-30 = "Uau! Quanto tempo!"
2300006-31 = "Você está indo para algum lugar?"
2300006-32 = "Ah, então estava apenas passeando."
2300006-33 = "Isso significa que o seu trabalho terminou?"
2300006-34 = "Que bom...! E, eu realmente queria te ver, Sensei!"
2300006-35 = "[s1] \"Você tem passado bem, Airi?\"\n[s2] \"Desculpe por ter te deixado preocupada.\""
2300006-36 = "Com certeza."
2300006-37 = "Como sempre, passei meus dias de forma divertida."
2300006-38 = "Ah, não, que isso...!"
2300006-39 = "Mas, fico muito feliz. Ehehe..."
2300006-40 = "E o Sensei, como está? Não está se sentindo mal?"
2300006-41 = "Eu também, até pouco tempo atrás, estava em casa estudando para as provas. Foi a primeira vez que consegui sair em um bom tempo."
2300006-42 = "Ah, você quer saber o que eu estava fazendo aqui...?"
2300006-43 = "Bem, não é como se eu tivesse algum compromisso específico."
2300006-44 = "Como as provas acabaram, pensei em fazer uma caminhada depois de tanto tempo."
2300006-45 = "..."
2300006-46 = "Se eu soubesse que poderia te encontrar..."
2300006-47 = "...Eh?"
2300006-48 = "Ah, não, é que eu não esperava te ver hoje,"
2300006-49 = "então pensei que não trouxe nenhum doce ou sobremesa comigo."
2300006-50 = "E não tem nenhum café por aqui também..."
2300006-51 = "（Embora eu tenha dito que estava tudo bem, Airi continuou com um semblante desanimado）"
2300006-52 = "[s] \"Ah, aquilo é... um caminhão de sorvete?\""
2300006-53 = "Eh? Ah, aquele caminhão?"
2300006-54 = "Uau, é verdade! Fazia tempo que eu não via um...!"
2300006-55 = "Eu comia muito quando era criança."
2300006-56 = "...Sensei?"
2300006-59 = "Eh, eh...?"
2300006-63 = "（Seguro a mão da Airi e vamos em direção ao caminhão）"
2300006-64 = "Aqui está, o sorvete que pediu."
2300006-66 = "（Peguei o sorvete com a Airi e decidimos descansar um pouco na beira do rio）"
2300006-69 = "[wa:1000]― Obrigado por comprar o meu também, [wa:2500] Sensei. [wa:1300] [wa:2500]"
2300006-70 = "― Ah, [wa:700] é doce e delicioso!"
2300006-73 = "[wa:1500]― Sinto que faz [wa:1000] muito tempo que não tomo sorvete [wa:2300] ao ar livre, [wa:700] em vez de um café. [wa:3000]"
2300006-74 = "― Além disso, [wa:1500] estou com o Sensei. [wa:3000] Ehehe."
2300006-77 = "[ns3] \"Desculpe não ser um doce de verdade.\"\n[ns4] \"Deixamos para ir a uma loja dessas em uma próxima vez.\""
2300006-80 = "[wa:500]― N-não, [wa:500]de jeito [wa:500]nenhum. [wa:1000]Não é nada disso. [wa:2500] "
2300006-81 = "[wa:500]― Pelo contrário, [wa:600]é nostálgico [wa:900]e fico feliz."
2300006-84 = "[wa:1500]― Estou feliz, [wa:2500]e, bem... [wa:3500] "
2300006-85 = "― Como posso dizer, [wa:2500]não tem quase ninguém por perto... [wa:3500] "
2300006-87 = "― É que, [wa:2000]meu coração está batendo muito forte, [wa:1000]sabe... [wa:3500] "
2300006-89 = "[wa:500]― ...N-não, [wa:500]n-nada, [wa:800]não é nada! [wa:2700] "
2300006-90 = "― Esqueça [wa:1000]o que eu disse agora! [wa:3000] "
2300006-92 = "― Haha, [wa:1000]ahaha..."
2300006-95 = "[wa:3000]― ...Muito obrigada, [wa:1500]Sensei. [wa:1800] "
2300006-96 = "― Graças ao Sensei, [wa:2200]hoje já se tornou [wa:1500]um dia feliz."
2300006-99 = "(Depois disso, passei o resto da tarde conversando alegremente com Airi na estrada à beira do rio)"
