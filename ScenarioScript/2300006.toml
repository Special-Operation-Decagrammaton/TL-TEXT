[translation]
2300006-1 = "ちょっとしたデート"
2300006-2 = "シャーレ・執務室"
2300006-4 = "（後回しにし続けていた書類が山のように重なり、まるで何かの生き物かのように鎮座していた）"
2300006-5 = "（どうやら、そろそろ本格的に取り組まないとマズそうだ……）"
2300006-6 = "ポーン♪"
2300006-7 = "[ns] \"モモトークかな？\""
2300006-11 = "[ns] \"でも今は仕事をしないと……。\""
2300006-15 = "（その後も何度かスマホに通知が来たが、脇目も振らずに仕事に集中した）"
2300006-17 = "（次の日）"
2300006-18 = "（徹夜をしてさらにお昼が過ぎた頃、ようやく積まれていた書類が全て片付いた）"
2300006-22 = "（寝ようかとも思ったが、コーヒーを大量に飲んだせいか眠気が来ない）"
2300006-23 = "（悩んだ末に、ちょっと外に出てみることにした）"
2300006-26 = "（シャーレ付近のひと気のない散歩道で、見慣れた顔が目に入る）"
2300006-28 = "[s] \"……アイリ？\""
2300006-29 = "あっ、先生！？"
2300006-30 = "わっ！お久しぶりです！"
2300006-31 = "これからどこかへ行かれるんですか？"
2300006-32 = "あ、お散歩でしたか。"
2300006-33 = "ということは、お仕事は終わったのでしょうか？"
2300006-34 = "それは良かったです……！それに、本当に会いたかったです、先生！"
2300006-35 = "[s1] \"アイリは元気だった？\"\n[s2] \"心配させちゃってごめんね。\""
2300006-36 = "もちろんです。"
2300006-37 = "いつも通り、楽しく過ごしてました。"
2300006-38 = "あ、いえ、そんな……！"
2300006-39 = "でも、本当に良かったです。えへへ……。"
2300006-40 = "先生はいかがですか、体調を崩してないですか？"
2300006-41 = "私の方もつい最近まで、試験勉強でずっとお家にいまして。久々に外に出かけることが出来ました。"
2300006-42 = "え、私がここで何をしていたのか……ですか？"
2300006-43 = "えっと、特に何か用事があったわけではなくって。"
2300006-44 = "試験も終わったので、久しぶりにお散歩でもしようかなって。"
2300006-45 = "……。"
2300006-46 = "お会いできると分かってたら……。"
2300006-47 = "……え？"
2300006-48 = "あ、いえ、ただ今日は会えると思ってなかったので、"
2300006-49 = "何もお菓子とかスイーツとか持ってないなって思いまして。"
2300006-50 = "この周辺にはカフェとかも無いですし……。"
2300006-51 = "（大丈夫だよとは伝えたものの、アイリはしゅんとした様子のままだった）"
2300006-52 = "[s] \"あ、あれって……アイスクリームの移動販売？\""
2300006-53 = "え？あ、あのトラックですか？"
2300006-54 = "わあ、本当だ！久しぶりに見ました……！"
2300006-55 = "子供の時はよく食べてましたね。"
2300006-56 = "……先生？"
2300006-59 = "え、えっ……？"
2300006-63 = "（アイリの手を取って、トラックの方へと向かう）"
2300006-64 = "はいどうぞ、ご注文のアイスクリームです。"
2300006-66 = "（アイリとアイスクリームを受け取って、川沿いの道で少し休むことにした）"
2300006-69 = "[wa:1000]― 私の分も買っていただいて[wa:2500]ありがとうございます、[wa:1300]先生。[wa:2500] "
2300006-70 = "― あ、[wa:700]甘くて美味しいです！"
2300006-73 = "[wa:1500]― カフェではなく、[wa:1000]外で食べるアイスクリームって[wa:2300]すごく[wa:700]久しぶりな気がします。[wa:3000] "
2300006-74 = "― それに、[wa:1500]先生と一緒ですし。 [wa:3000]えへへっ。"
2300006-77 = "[ns3] \"ちゃんとしたスイーツとかじゃなくてごめんね。\"\n[ns4] \"そういうお店のは、また今度で。\""
2300006-80 = "[wa:500]― い、[wa:500]いえ、[wa:500]全然[wa:1000]そんなことは。[wa:2500] "
2300006-81 = "[wa:500]― むしろ[wa:600]懐かしくて、[wa:900]嬉しいです。"
2300006-84 = "[wa:1500]― 嬉しいですし、[wa:2500]その……。[wa:3500] "
2300006-85 = "― 何と言えばいいんでしょう、[wa:2500]周りに人も少ないですし……。[wa:3500] "
2300006-87 = "― すごく、[wa:2000]ドキドキすると[wa:1000]言いますか……。[wa:3500] "
2300006-89 = "[wa:500]― ……な、[wa:500]なっ、[wa:800]なんでもありません！[wa:2700] "
2300006-90 = "― 今のは[wa:1000]忘れてください！[wa:3000] "
2300006-92 = "― はは、[wa:1000]あはは……。"
2300006-95 = "[wa:3000]― ……ありがとうございます、[wa:1500]先生。[wa:1800] "
2300006-96 = "― 今日も先生のおかげで、[wa:2200]もうすでに[wa:1500]幸せな一日になりました。"
2300006-99 = "（その後、夕方になるまでアイリと一緒に川沿いの道で楽しくおしゃべりをした）"
