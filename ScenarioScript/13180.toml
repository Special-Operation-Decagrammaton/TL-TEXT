[translation]
13180-1 = "Episódio 18; Grande Caos"
13180-13 = "É o fim, então?"
13180-18 = "Todas as forças que preparei, tudo..."
13180-19 = "Quem diria que eles seriam tão fortes..."
13180-20 = "Não, impossível. #nA Nephthys se aliar à Kaiser!"
13180-21 = "O que isso significa! #nEles não eram como cão e gato?"
13180-23 = "Sim, você tem toda razão."
13180-24 = "Mas você realmente acha que eles abriram mão dos títulos da ferrovia transdesértica sem pedir nada em troca?"
13180-25 = "Eles estavam negociando, por baixo dos panos."
13180-26 = "M-mesmo assim, usar a própria herdeira como refém!"
13180-27 = "Não havia outra escolha, é só isso."
13180-28 = "Pedirei desculpas mais tarde."
13180-29 = "Mas, considerando os danos que a senhorita causou no passado... #nacho que nem isso seria o suficiente."
13180-30 = "Agora, se apenas Takanashi Hoshino solicitar a anulação do contrato, #na posse do canhão ferroviário será nossa, da Nephthys."
13180-31 = "E a senhorita poderá viver dias felizes como aluna de Abydos #naté se formar."
13180-33 = "Nephthys...? #nNão vai ficar com a Kaiser?"
13180-34 = "...Eu achei que a Kaiser não tinha interesse no canhão ferroviário."
13180-35 = "A propósito, de onde veio a informação de que eu os traí?"
13180-36 = "I-isso é..."
13180-38 = "Fui eu."
13180-39 = "Suou...!?"
13180-45 = "O quê... não me diga que você mudou de lado!?"
13180-47 = "Não, não é isso."
13180-57 = "P-Presidente...?"
13180-63 = "Ela pertencia originalmente à Kaiser PMC."
13180-64 = "...Coisas do passado."
13180-66 = "Quem foi que te acolheu quando você não tinha para onde ir!? #nComo ousa retribuir o favor com ingratidão...!"
13180-68 = "Quem pediu para ser ajudado?"
13180-69 = "...General."
13180-70 = "Fique quieto."
13180-95 = "Ugh..."
13180-96 = "Argh..."
13180-98 = "Bom trabalho."
13180-99 = "Graças a você, obtivemos um lucro enorme."
13180-100 = "Presidente, aqui estão as informações."
13180-101 = "Oh."
13180-105 = "Canhão ferroviário... parece interessante. #nQuem diria que algo tão magnífico estaria em Abydos."
13180-106 = "...Por que não me contou?"
13180-108 = "Argh..."
13180-114 = "É muito mais realista do que aquela coisa absurda de encouraçado espacial."
13180-115 = "De acordo com a análise, parece ser uma arma de guerra assimétrica de poder inigualável."
13180-116 = "Já faz muito tempo desde que perdi o contato com o 'Black Suit'. #nJusto quando eu procurava por um novo poder, encontro o legado do Imperador do Trovão."
13180-117 = "Sim. Com isso, aquele outro projeto também..."
13180-118 = "...Entendo."
13180-119 = "Muito bem, o canhão ferroviário será nosso."
13180-121 = "O quê!"
13180-128 = "Localizem o canhão ferroviário imediatamente. #nDeve estar em algum lugar ao longo dos trilhos."
13180-129 = "Entendido."
13180-130 = "Vocês não têm direito à posse do canhão ferroviário!"
13180-131 = "Oh?"
13180-132 = "A Kaiser vendeu a dívida para um fundo privado, não foi!"
13180-133 = "Os direitos do canhão ferroviário dependem do contrato feito com o conselho estudantil de Abydos!"
13180-134 = "Ora, ora, o que você pensa que eu sou?"
13180-135 = "Tentar negociar termos de contrato com o topo da Kaiser Corporation..."
13180-136 = "I-Isso é...!"
13180-137 = "Por que o fundo privado convocou uma assembleia geral?"
13180-139 = "..."
13180-140 = "Deixe-me explicar."
13180-141 = "Existem três futuros possíveis."
13180-142 = "Primeiro, o conselho estudantil de Abydos comparece à assembleia e solicita a continuação do contrato de compra e venda."
13180-143 = "Nesse caso, o canhão ferroviário passará para as mãos do conselho estudantil de Abydos."
13180-144 = "Você estava desesperado para evitar exatamente isso, não estava?"
13180-146 = "..."
13180-147 = "..."
13180-149 = "Segundo, o 'conselho estudantil de Abydos' declara que não possuía autoridade como conselho estudantil e reivindica a anulação do contrato.#n"
13180-150 = "Nesse caso, os direitos do canhão ferroviário passam para a Nephthys, a proprietária original antes do contrato."
13180-151 = "Esse é o futuro que você desejava, não é?"
13180-152 = "..."
13180-153 = "Para isso, você deteve a senhorita da Nephthys e ameaçou Takanashi Hoshino..."
13180-154 = "Hahaha.#nOra, ora, até eu fiquei surpreso que você tenha chegado a esse ponto."
13180-155 = "..."
13180-156 = "Como esperado, não se pode baixar a guarda com o pessoal de Abydos.#nA Nephthys também não é nada mal."
13180-157 = "...Grr."
13180-158 = "E o terceiro, o conselho estudantil de Abydos falta à assembleia."
13180-159 = "Ou comparece e solicita a rescisão do contrato."
13180-160 = "Se a assembleia terminar sem problemas..."
13180-161 = "A propriedade da ferrovia trans-deserto passará a ser do fundo privado."
13180-163 = "Junto com o canhão ferroviário, que provavelmente está incluído nas instalações relacionadas à ferrovia."
13180-164 = "Esse era o objetivo original que vocês imaginaram, não era?"
13180-171 = "Mas, não resta uma dúvida?"
13180-172 = "Por que foi necessário realizar uma assembleia, mesmo gastando até o último centavo para contratar mercenários?#n"
13180-173 = "O contrato de compra e venda perde a validade após as 12 horas de hoje."
13180-174 = "Abydos deveria ter esquecido a existência do contrato."
13180-175 = "Mesmo assim, por que você as envolveu..."
13180-176 = "O motivo provavelmente é este, não é?"
13180-181 = "— Para que nós não soubéssemos da existência do canhão ferroviário."
13180-183 = "Droga..."
13180-185 = "No entanto, você foi descuidado."
13180-186 = "Desde que nos unimos, qualquer informação vaza para nós."
13180-192 = "Haha."
13180-193 = "Ha, Hahahaha!"
13180-195 = "...Bem, agora que a situação está esclarecida,#nassine estes documentos."
13180-201 = "I-Isso é...?"
13180-202 = "Uma aquisição!?#nA minha Indústria Tanukidaisuki...!?"
13180-203 = "I-Isso não pode ser!"
13180-205 = "A partir de agora, vocês serão nossa subsidiária."
13180-206 = "Claro, oferecerei um valor justo.#nVamos ver... que tal 1000 ienes?"
13180-208 = "O-O que você disse!?"
13180-209 = "Está zombando de nós...!?"
13180-216 = "...!"
13180-217 = "Ora, não precisa se preocupar. #nM&A é a nossa especialidade. O negócio será devidamente herdado."
13180-220 = "E, caso não saiba, deixe-me te informar."
13180-223 = "O motivo do emblema da Kaiser ser um 'polvo' é porque ele mantém tantas empresas sob seu controle."
13180-224 = "Não é ótimo? #nA partir de hoje, vocês se tornarão membros do nosso Grupo Kaiser."
13180-225 = "Assine logo ali."
13180-226 = "U-uma tirania dessas é permitida...!"
13180-227 = "Eu não deveria ter me metido nisso desde o início..."
13180-235 = "Com isso, o fundo privado agora é um membro do Grupo Kaiser! #nAh, é realmente gratificante."
13180-236 = "Naturalmente, o poder de representação também passa a ser meu, mas alguém tem alguma objeção?"
13180-238 = "……N-não, nenhuma."
13180-240 = "Bom trabalho. #nFique esperando por aí até que a assembleia termine."
13180-241 = "Afinal, seria um problema se você não estivesse presente aqui."
13180-255 = "Agora, se eu conseguir manter a posição até o meio-dia, o canhão ferroviário será meu."
13180-256 = "Existem inúmeros outros meios, mas #njá que estamos aqui, não há motivo para não aproveitar."
13180-257 = "General, atrase Abydos até as 12 horas."
13180-258 = "Entendido."
13180-260 = "Não baixe a guarda. #nEspecialmente aquela Takanashi Hoshino, ela é um talento que o Kurofuku desejava. #nNão deve ser uma força comum."
13180-262 = "Não precisa se preocupar. #nCertamente atenderei às suas expectativas."
13180-264 = "Como esperado de alguém em quem depositei minha confiança. #nEntão, deixo com você."
13180-266 = "Sim!"
13180-271 = "Preparem-se, partiremos imediatamente."
13180-275 = "Resta a localização do canhão ferroviário. #nAssim que encontrarem, relatem imediatamente."
13180-276 = "Sim!"
13180-280 = "Então, vamos ver como você se sai."
13180-286 = "P-por que não há contato do chefe?"
13180-287 = "Isso é estranho...?"
13180-291 = "Ugh...!"
13180-302 = "Eliminem quem estiver no caminho e tomem suas posições!"
13180-303 = "Ninguém deve passar daqui!"
13180-310 = "AM 10:4X"
13180-313 = "Novas forças confirmadas! #nÉ, é a Kaiser PMC!"
13180-314 = "Kaiser...?"
13180-315 = "E um grande número está indo em direção à estação...! #nPor algum motivo, eles estão em combate com as forças do fundo privado!"
13180-316 = "O-o que está acontecendo?"
13180-318 = "Briga interna?"
13180-319 = "Não, a Kaiser nem deveria estar participando disso."
13180-320 = "……"
13180-325 = "Hã!?"
13180-331 = "Uau, o que é isso?"
13180-332 = "O que está acontecendo?"
13180-333 = "Estamos cercados?"
13180-335 = "Forças do fundo privado confirmadas!"
13180-337 = "Hii!"
13180-338 = "N-nós não sabemos de nada!"
13180-340 = "Parece que a Highlander também está cercada pela Kaiser."
13180-342 = "Hã, será que são aquelas gêmeas?"
13180-343 = "Onde está a Hoshino-senpai?"
13180-348 = "Kaiser?"
13180-355 = "Hum. Encontrei você, Takanashi Hoshino."
13180-361 = "……Saia da frente."
13180-368 = "A veterana Hoshino está em combate contra as forças especiais da Kaiser PMC!"
13180-369 = "Sensei, o que faremos?"
13180-370 = "[s1] \"Não se preocupe, se o General for o oponente, a Hoshino vai vencer.\"\n[s2] \"Vamos ajudar a Highlander.\""
13180-375 = "10:5X da manhã"
13180-377 = "Temos pouco mais de uma hora até a assembleia geral..."
13180-378 = "Não se preocupe, vamos chegar a tempo, com certeza."
13180-379 = "Haa... bem, não tem jeito, né.#nNão posso ignorar aqueles caras também."
13180-381 = "...Entendido."
13180-382 = "Então, a partir de agora, vamos dar suporte à Academia Ferroviária Highlander!"
