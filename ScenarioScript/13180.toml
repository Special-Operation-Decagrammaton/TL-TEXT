[translation]
13180-1 = "第18話;大混乱"
13180-13 = "これで終わりでしょうか？"
13180-18 = "用意した戦力が、すべて……。"
13180-19 = "まさか、これほどの強さとは……。"
13180-20 = "いや、あり得ない。#nネフティスがカイザーと手を組むだなんて！"
13180-21 = "どういうことだ！#n犬猿の仲じゃなかったのか？"
13180-23 = "ええ、たしかに仰る通りです。"
13180-24 = "しかし、あの者たちが何も見返りを求めず、#n砂漠横断鉄道の債権を差し出したとでもお思いで？"
13180-25 = "取り引きをしていたのですよ、裏で。"
13180-26 = "だ、だとしても、自分たちの令嬢を人質にするとは！"
13180-27 = "致し方なかった、それだけです。"
13180-28 = "後ほど謝るとします。"
13180-29 = "ですが、かつてお嬢様が与えた損害を考えると……#nこれでも足りないくらいでしょう。"
13180-30 = "あとは[ruby=たかなし]小鳥遊[/ruby]ホシノが契約の無効を申し出さえすれば、#n列車砲の所有権は我々ネフティスの物に。"
13180-31 = "そして、お嬢様はアビドスの生徒として、#n卒業まで幸せな日々を送れることでしょう。"
13180-33 = "ネフティス……？#nカイザーの物になるのではなく？"
13180-34 = "……カイザーは列車砲に興味がないのかと。"
13180-35 = "ちなみに、私が裏切ったという情報はどちらから？"
13180-36 = "そ、それは……。"
13180-38 = "私だ。"
13180-39 = "スオウさん……！？"
13180-45 = "なっ……ま、まさか寝返って！？"
13180-47 = "いいや、そうじゃない。"
13180-57 = "ぷ、プレジデント……？"
13180-63 = "彼女は、もともとカイザーPMCに所属していた。"
13180-64 = "……昔の話だ。"
13180-66 = "行く当てのないあなたを誰が拾ったと！？#nまさか、恩を仇で返すとは……！"
13180-68 = "誰が助けてほしいだなんて頼んだ？"
13180-69 = "……ジェネラル。"
13180-70 = "大人しくしてもらおう。"
13180-95 = "ううっ……。"
13180-96 = "くっ……。"
13180-98 = "ご苦労だったな。"
13180-99 = "おかげで莫大な利益を得られたよ。"
13180-100 = "プレジデント、こちらが例の情報です。"
13180-101 = "ほう。"
13180-105 = "列車砲……面白そうじゃないか。#nこんなに素晴らしい物がアビドスにあるとは。"
13180-106 = "……なぜ、私に教えなかった？"
13180-108 = "ぐっ……。"
13180-114 = "宇宙戦艦などという荒唐無稽な代物より、#nよっぽど現実的じゃないか。"
13180-115 = "分析によると、類を見ないほど強力な非対称戦力兵器のようです。"
13180-116 = "「黒服」と連絡が途絶えてから、ずいぶんと経つ。#n新しい力を探していた矢先に、雷帝の遺産が見つかるとは。"
13180-117 = "はい。これがあれば、例のアレも……。"
13180-118 = "……うむ。"
13180-119 = "良いだろう、列車砲は我々の物とする。"
13180-121 = "なっ！"
13180-128 = "大至急、列車砲の位置を割り出せ。#n線路沿いのどこかにあるはずだ。"
13180-129 = "分かりました。"
13180-130 = "あなたたちに列車砲の所有権はありません！"
13180-131 = "ほう？"
13180-132 = "カイザーは債権を私募ファンドに売却したでしょう！"
13180-133 = "列車砲の権利は、アビドス生徒会と交わした契約書次第です！"
13180-134 = "まったく、君は私を何だと思っているのかね。"
13180-135 = "カイザーコーポレーションのトップに、契約の話で駆け引きしようとは。"
13180-136 = "そ、それは……！"
13180-137 = "なぜ私募ファンドは、総会を開いた？"
13180-139 = "っ……。"
13180-140 = "私が説明してやろう。"
13180-141 = "予測できる未来は3つ。"
13180-142 = "1つ目、アビドス生徒会が総会に出席し、売買契約の継続を申し出る。"
13180-143 = "すると、列車砲はアビドス生徒会の手に渡るわけだ。"
13180-144 = "これだけは避けようと、躍起になっていたのだろう？"
13180-146 = "……。"
13180-147 = "……。"
13180-149 = "2つ目、「アビドス生徒会」は生徒会としての権限を持たなかったと述べ、#n契約の無効を主張する。"
13180-150 = "そうなると、列車砲の権利は契約前の所有者であったネフティスに渡る。"
13180-151 = "これが君の望んでいた未来だろう、違うかね？"
13180-152 = "……。"
13180-153 = "そのためにネフティスのご令嬢を拘束し、小鳥遊ホシノを脅すとは……。"
13180-154 = "ハッハッハ。#nいやはや、まさかそこまでするとは私も驚いたよ。"
13180-155 = "……。"
13180-156 = "やはり、アビドス出身の者は油断ならないな。#nネフティスもなかなかやるじゃないか。"
13180-157 = "……ぐっ。"
13180-158 = "そして3つ目、アビドス生徒会が総会を欠席。"
13180-159 = "もしくは出席し、契約の解除を申し出る。"
13180-160 = "総会が無事に終了すれば……。"
13180-161 = "砂漠横断鉄道の所有権は、私募ファンドの物となる。"
13180-163 = "鉄道の関連施設に含まれるであろう、列車砲と共に。"
13180-164 = "これが、君たちの思い描いた当初の目的だろう？"
13180-171 = "だが、こんな疑問は残らないかね？"
13180-172 = "なけなしの金を[ruby=はた]叩[/ruby]いて兵を雇ってまで、#nなぜ総会を開催する必要があったのか。"
13180-173 = "売買契約書は、今日の12時を過ぎれば効力を失う。"
13180-174 = "アビドスは契約の存在など忘れていたはずだ。"
13180-175 = "なのに、なぜ彼女たちを巻き込んだのか……。"
13180-176 = "その理由は、おそらくこうだろう？"
13180-181 = "――列車砲の存在を、我々に知られないため。"
13180-183 = "くっ……。"
13180-185 = "しかし、詰めが甘かったな。"
13180-186 = "我々と手を組んだ以上、どんな情報も筒抜けだ。"
13180-192 = "ハハッ。"
13180-193 = "ハッ、ハーッハッハッハ！"
13180-195 = "……さて、状況が整理できたところで、#nこの書類にサインをしてもらおうか。"
13180-201 = "こ、これは……？"
13180-202 = "買収だと！？#nう、ウチのタヌキダイスキ工業を……！？"
13180-203 = "そ、そんなっ！"
13180-205 = "今から君たちは、我々の子会社となる。"
13180-206 = "もちろん、それ相応の金額は提示しよう。#nそうだな……1000円と言ったところか。"
13180-208 = "な、何だと！？"
13180-209 = "私たちをバカにしてるのか……！？"
13180-216 = "っ……！"
13180-217 = "なに、心配しなくても良い。#nM&Aは我々の専売特許だ。事業はしっかりと継承する。"
13180-220 = "それと、知らなかったのなら教えてやろう。"
13180-223 = "カイザーのエンブレムが「タコ」である理由は、それだけ多くの会社を従えているからだ。"
13180-224 = "良かったではないか。#nこれで今日から君たちは、我々カイザーグループの一員になれる。"
13180-225 = "早くそこにサインしたまえ。"
13180-226 = "こ、こんな横暴が許されるのか……！"
13180-227 = "最初から首を突っ込むんじゃなかった……。"
13180-235 = "これで私募ファンドは、我々カイザーグループの一員だ！#nあぁ、実に喜ばしいな。"
13180-236 = "当然、代表権限も私の物となるわけだが、異論はあるかね？"
13180-238 = "……っ、ありません。"
13180-240 = "ご苦労だったな。#n総会が終わるまで、その辺で待っていろ。"
13180-241 = "一応、この場にいてもらわなくては困るのでね。"
13180-255 = "あとは正午まで守り通せば、列車砲は私の物に。"
13180-256 = "ほかにも手段などいくらでもあるが、#nせっかくなら活かさない手はない。"
13180-257 = "ジェネラル、12時までアビドスを足止めしろ。"
13180-258 = "分かりました。"
13180-260 = "油断はするな。#n特に、あの小鳥遊ホシノは黒服が欲しがっていた人材だ。#n並大抵の力ではないだろう。"
13180-262 = "心配には及びません。#n必ずや、ご期待に応えましょう。"
13180-264 = "さすがは私が見込んだだけはある。#nでは、任せたぞ。"
13180-266 = "はっ！"
13180-271 = "準備しろ、すぐに出発する。"
13180-275 = "残るは列車砲の位置か。#n見つかり次第、すぐに報告しろ。"
13180-276 = "はい！"
13180-280 = "では、お手並み拝見といこうじゃないか。"
13180-286 = "な、なぜボスから連絡がない？"
13180-287 = "おかしいぞ……？"
13180-291 = "うっ……！"
13180-302 = "邪魔な者は排除して、配置につけ！"
13180-303 = "ここから先は一人も通してはならん！"
13180-310 = "AM 10:4X"
13180-313 = "新しい兵力を確認！#nか、カイザーPMCです！"
13180-314 = "カイザー……？"
13180-315 = "それも、かなりの人数が駅に向かっています……！#nなぜか私募ファンドの勢力と交戦中です！"
13180-316 = "ど、どうなってるのよ。"
13180-318 = "仲間割れ？"
13180-319 = "いえ、そもそもカイザーは参加していなかったはずです。"
13180-320 = "……"
13180-325 = "えっ！？"
13180-331 = "うぉー、何これー。"
13180-332 = "どうなってんの？"
13180-333 = "囲まれてるー？"
13180-335 = "私募ファンドの兵力を確認！"
13180-337 = "ひっ！"
13180-338 = "わ、私たちは何も知りません！"
13180-340 = "ハイランダーもカイザーに包囲されているようです。"
13180-342 = "えっ、もしかしてあの双子？"
13180-343 = "ホシノ先輩は？"
13180-348 = "カイザー？"
13180-355 = "ふっ。見つけたぞ、小鳥遊ホシノ。"
13180-361 = "……[ruby=ど]退[/ruby]いてもらうよ。"
13180-368 = "ホシノ先輩は、カイザーPMCの特殊部隊と交戦中です！"
13180-369 = "先生、どうする？"
13180-370 = "[s1] \"大丈夫、ジェネラルが相手ならホシノが勝つ。\"\n[s2] \"私たちはハイランダーを助けよう。\""
13180-375 = "AM 10:5X"
13180-377 = "総会まで、あと1時間ちょっとしかありません……。"
13180-378 = "大丈夫、絶対に間に合う。"
13180-379 = "はぁ……ま、仕方ないわね。#nあいつらも見過ごせないし。"
13180-381 = "……分かりました。"
13180-382 = "では、これよりハイランダー鉄道学園の手助けに回ります！"
