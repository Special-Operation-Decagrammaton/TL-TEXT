[translation]
10036090-1 = "Episódio 9; Esquadrão Arius, Reunido"
10036090-5 = "Ah...!"
10036090-7 = "Ei, aquele não é o atendente de antes?#nEnfrentar a lendária Sukeban sozinho..."
10036090-8 = "Parece que ele está se movendo para impedir que ela recarregue o lança-foguetes..."
10036090-9 = "Ah, provavelmente é por isso que ele continua atacando sem parar!"
10036090-16 = "Esses movimentos ágeis e elegantes, é como se..."
10036090-17 = "Como o meu esquilo-voador de estimação, o 'Carles'."
10036090-18 = "Eu até gostaria de cumprimentá-lo adequadamente, mas..."
10036090-19 = "Neste momento, ele é um estorvo insuportável!"
10036090-20 = "Basta você ir embora daqui."
10036090-25 = "V-vai, atendente!"
10036090-26 = "Contamos com você!"
10036090-32 = "...Haa."
10036090-33 = "Que situação realmente problemática."
10036090-34 = "Eu vim até aqui para me vingar do Grupo dos Capacetes por terem nos denunciado para a Agência Correcional, mas..."
10036090-35 = "Quem diria que eu seria interrompida em um lugar como este..."
10036090-36 = "...É, bem. Dizem que a vida é feita de altos e baixos."
10036090-37 = "Se eu desistir por causa disso, o nome da lendária Sukeban perderá o valor."
10036090-38 = "Ufufu!#nDe agora em diante, vou me esforçar de verdade."
10036090-39 = "Hmph!"
10036090-40 = "...?"
10036090-41 = "[s] \"...Meditando durante o combate?\""
10036090-48 = "Kurihama Akemi!#nNão vou mais pegar leve com você!"
10036090-49 = "...Haaah!"
10036090-53 = "...!"
10036090-54 = "[ns] \"Saori, você está bem!?\""
10036090-55 = "Droga!#nO que foi esse ataque agora...?"
10036090-56 = "O equipamento dela não mudou, mas..."
10036090-57 = "A intensidade está maior do que antes...!"
10036090-58 = "Sim."
10036090-59 = "A técnica de respiração que eu desenvolvi contém a essência de uma Sukeban!"
10036090-60 = "[s] \"...A, a essência de uma Sukeban?\""
10036090-65 = "Fu, fuu... Como esperado, essa habilidade exige muito esforço."
10036090-66 = "Mas, se eu não fizesse isso, não conseguiria derrotar você."
10036090-67 = "...Entendo."
10036090-68 = "Ufufu..."
10036090-69 = "Irmã mais velha!#nNós também vamos ajudar!"
10036090-70 = "Não vamos deixar a irmã mais velha lutar sozinha!"
10036090-71 = "Pessoal... mas esta é uma luta que eu comecei.#nNão posso envolver vocês..."
10036090-72 = "Não!#nA luta da irmã mais velha é a nossa vingança também!"
10036090-73 = "Seguiremos a irmã mais velha para sempre!"
10036090-75 = "...Surpreendente."
10036090-76 = "Recuperar o moral desse jeito após uma única troca de golpes."
10036090-77 = "Então isso é... confiança."
10036090-79 = "Vamos, pessoal!"
10036090-86 = "[ns] \"Saori...!\""
10036090-87 = "Droga...!"
10036090-92 = "...?"
10036090-97 = "Quanto tempo, Sa-chan. Parece que você está em apuros."
10036090-98 = "...Atsuko!"
10036090-100 = "Cuidado, tem mais deles por aí..."
10036090-105 = "Ugh..."
10036090-111 = "E-ehehe. #nEu acabei atirando de qualquer jeito... mas isso faz com que sejamos tratadas como inimigas de vez, né?"
10036090-116 = "...Vocês dão um trabalho."
10036090-118 = "Misaki, Hiyori..."
10036090-119 = "Não parece que teremos tempo para conversar com calma."
10036090-126 = "..."
10036090-127 = "Ah."
10036090-128 = "Deixaremos as conversas para depois."
10036090-132 = "Sensei, assuma o comando!"
10036090-133 = "[s3] \"Deixem comigo!\"\n[s4] \"Esquadrão Arius, avançar!\""
10036090-137 = "Nós também não podemos ficar para trás!"
10036090-138 = "Sigam-me, todos!"
