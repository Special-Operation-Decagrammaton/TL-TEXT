[translation]
10036090-1 = "第9話;アリウススクワッド、集結"
10036090-5 = "っ……！"
10036090-7 = "あれ、さっきのバイトじゃないか？#n伝説のスケバンを一人で相手するなんて……！"
10036090-8 = "ロケットランチャーをリロードさせないように立ち回っているような……。"
10036090-9 = "ああ、たぶんそのために攻撃を仕掛け続けてるんだろうな！"
10036090-16 = "その機敏で優雅な動きは、まるで……。"
10036090-17 = "私が飼っている、ムササビの「カルレス君」のようですわね。"
10036090-18 = "きちんとご挨拶したい気持ちもありましたが……。"
10036090-19 = "今ばかりは、目障りで仕方ありません！"
10036090-20 = "お前がここを立ち去ればよいだけの話だ。"
10036090-25 = "が、頑張れ！バイト！"
10036090-26 = "頼んだぜ！"
10036090-32 = "……はぁ。"
10036090-33 = "本当に困りましたわね。"
10036090-34 = "矯正局に密告したヘルメット団に復讐するために、#nわざわざ来たというのに……。"
10036090-35 = "まさか、こんなところで邪魔をされるとは……。"
10036090-36 = "……そうですわね。#n人生は、山あり谷ありと申しますし。"
10036090-37 = "この程度で音を上げては、伝説のスケバンの名が廃りますわ。"
10036090-38 = "うふふっ！#nこれからは、気合を入れて活動するといたしましょう。"
10036090-39 = "ふんっ！"
10036090-40 = "……？"
10036090-41 = "[s] \"……戦闘中に瞑想？\""
10036090-48 = "[ruby=くりはま]栗浜[/ruby]アケミ！#n加減せずにお相手いたしましょう！"
10036090-49 = "……はああっ！"
10036090-53 = "……！"
10036090-54 = "[ns] \"サオリ、大丈夫！？\""
10036090-55 = "くっ！#n今の攻撃は……？"
10036090-56 = "装備が変わったわけでもないのに……。"
10036090-57 = "さっきよりも勢いが……！"
10036090-58 = "ええ。"
10036090-59 = "私が編み出した呼吸法には、#nスケバンの真髄が込められていますから！"
10036090-60 = "[s] \"……す、スケバンの真髄？\""
10036090-65 = "ふ、ふぅ……やはり、このスキルは負担が大きすぎますわね。"
10036090-66 = "ですが、こうでもしなければ、あなたを倒すことはできませんでした。"
10036090-67 = "……そうか。"
10036090-68 = "うふふ……。"
10036090-69 = "姐様！#nウチらも加勢します！"
10036090-70 = "姐様を一人で戦わせたりしません！"
10036090-71 = "みんな……でも、これは私が始めた戦いですわ。#n皆さんを巻き込むわけには……。"
10036090-72 = "いえ！#n姐様の戦いは、ウチらの復讐も同然です！"
10036090-73 = "一生ついていきます、姐様！"
10036090-75 = "……驚いたな。"
10036090-76 = "一度の攻防で、ここまで士気を取り戻すとは。"
10036090-77 = "これが、信頼……か。"
10036090-79 = "行くぞ、お前たち！"
10036090-86 = "[ns] \"サオリ……！\""
10036090-87 = "くっ……！"
10036090-92 = "……？"
10036090-97 = "久しぶり、サッちゃん。大変そうだね。"
10036090-98 = "……アツコ！"
10036090-100 = "気をつけろ、ほかにも仲間が――"
10036090-105 = "うぐっ……。"
10036090-111 = "え、えへへ。#nとりあえず撃っちゃいましたけど……これで完全に敵扱いですよね？"
10036090-116 = "……世話が焼けるんだから。"
10036090-118 = "ミサキ、ヒヨリ……。"
10036090-119 = "ゆっくり話す余裕はなさそうだね。"
10036090-126 = "……。"
10036090-127 = "あぁ。"
10036090-128 = "つもる話は、あとにしよう。"
10036090-132 = "先生、指揮を！"
10036090-133 = "[s3] \"任せて！\"\n[s4] \"アリウススクワッド、出撃だ！\""
10036090-137 = "私たちも置いてかれるわけにはいかねぇ！"
10036090-138 = "全員ついてこい！"
