[translation]
41080-1 = "Episódio 8; Operação Cenoura (2)"
41080-2 = "Porto D.U."
41080-6 = "Aqui é RABBIT 1, horário atual 2100. Chegamos ao Ponto D."
41080-7 = "Não há problemas no momento, seguiremos para o Ponto E, onde a 'Cenoura' está localizada."
41080-8 = "Aqui é Acampamento RABBIT, confirmando o sinal de GPS de todas."
41080-9 = "Verifiquei os turnos da empresa de segurança, não houve grandes mudanças."
41080-10 = "Bem, não deve haver problemas até o Ponto E."
41080-11 = "[s] \"Posso falar uma coisa?\""
41080-12 = "……O que foi, Sensei?"
41080-13 = "Se veio até aqui apenas para reclamar, eu preferiria que fosse embora."
41080-14 = "Comentários estranhos podem acabar afetando a operação."
41080-15 = "[s] \"É que estou preocupado com várias coisas...\""
41080-16 = "……Por acaso achou que iríamos roubar algo?"
41080-17 = "Nós somos da SRT, não roubamos os bens dos cidadãos."
41080-18 = "Os tambores aqui estão marcados para descarte. Ou seja, levá-los não causará prejuízo financeiro a ninguém."
41080-19 = "Na verdade, para a empresa, isso deve até economizar custos de processamento."
41080-20 = "[s] \"Então, por que não pedir educadamente...?\""
41080-21 = "Isso é……"
41080-22 = "Daí para frente, é uma questão de orgulho."
41080-23 = "Não podemos depender da piedade dos outros!"
41080-24 = "[s] \"Hmm, entendi...\""
41080-25 = "B-bem, sobre aquele almoço de outro dia……"
41080-26 = "Aquilo foi apenas algo que nós 'garantimos'."
41080-27 = "É isso mesmo!"
41080-28 = "Pelo nosso orgulho, nós absolutamente……!"
41080-29 = "RABBIT 2, acalme-se. Estamos em operação."
41080-30 = "Está quase na hora. Por favor, faça o reconhecimento antes da invasão."
41080-31 = "Digo, Miyako, por que você está dando ordens normalmente?"
41080-32 = "……RABBIT 2, use seu codinome durante a operação."
41080-33 = "Tsc, é um argumento válido, mas……"
41080-34 = "Digo, mais importante, por que você está no comando?"
41080-35 = "Porque eu sou a líder da equipe……"
41080-36 = "Foi o que mandaram lá de cima, não foi?"
41080-37 = "Por ordens daquele Conselho Estudantil Federal que fechou a Academia Especial SRT."
41080-38 = "……."
41080-39 = "Mas agora a situação é esta, qualquer uma poderia estar no comando."
41080-43 = "……O que vocês acham?"
41080-45 = "Para mim, tanto faz. Não muda nada, na verdade."
41080-46 = "Eu, bem……"
41080-48 = "……Entendido."
41080-49 = "Então, deixarei a liderança desta vez com você."
41080-50 = "Assuma o comando, RABBIT 2."
41080-51 = "Humph. Bem, no fim das contas, são apenas guardas comuns…… isso é moleza."
41080-52 = "Já treinamos esse tipo de situação exaustivamente. Posso fazer isso até de olhos fechados."
41080-54 = "Bem, Saki-chan……"
41080-55 = "Quer dizer, RABBIT 2. Onde devo esperar……?"
41080-56 = "Hã? É, bem……"
41080-57 = "E-espera um pouco. A posição do atirador em combate urbano é…… acho que estava no caderno……."
41080-64 = "Ugh, bebi demais…… Preciso ir ao banheiro……."
41080-66 = "……Tem alguém se aproximando!"
41080-67 = "Hã!? Não era para ninguém vir por essa rota, não é!?"
41080-68 = "Ah, droga... por que será...? Hmm, não sei! Imprevisto!"
41080-69 = "Sa-Saki-chan! O que a gente faz...!?"
41080-70 = "Po-podemos fugir...!?"
41080-71 = "Is-isso é, bem..."
41080-72 = "Lugares altos! Vão para um lugar alto, agora!"
41080-73 = "De acordo com o manual, o básico do tiro de precisão é a 'garantia de campo de visão'. Se subirmos em um lugar alto, provavelmente em quase qualquer situação...!"
41080-75 = "Espere um pouco, Saki. Mesmo que aquele guindaste de torre seja bom para atirar, na hora de fugir..."
41080-76 = "Is-isso eu sei muito bem!"
41080-77 = "Hm? Que barulho é esse...?"
41080-85 = "O quê, invasores!?"
41080-86 = "Vieram roubar a carga, seus ladrõezinhos de meia-tigela!"
41080-87 = "Quem você está chamando de ladrãozinho!?"
41080-91 = "Ah, chega! Iniciando combate! Usem poder de fogo máximo e sigam direto para o ponto E!!"
