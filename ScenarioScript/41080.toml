[translation]
41080-1 = "Episódio 8;Operação Cenoura (2)"
41080-2 = "Porto de [ruby=Distrito de Utnapishtim]D.U.[/ruby]"
41080-6 = "Aqui é RABBIT 1. Horário atual: 2100. Chegamos no Ponto Delta."
41080-7 = "O perímetro tá limpo por enquanto. Iniciando a movimentação até o Ponto Echo para assegurar a \"Cenoura\" cilíndrica."
41080-8 = "Aqui é o Acampamento RABBIT, sinal de GPS de todo mundo na tela."
41080-9 = "Puxei a escala de ronda dos seguranças também, tá tudo nos conformes, zero surpresas."
41080-10 = "Relaxa, o caminho até o Ponto Echo tá safe pra gente pegar a nossa \"Cenoura\"."
41080-11 = "[s] \"Posso dar uma palavrinha com vocês?\""
41080-12 = "……O que foi agora, Sensei? Vai ofegar no rádio?"
41080-13 = "Se você abriu o canal confidencial pra sussurrar bobeiras ou fazer propostas absurdas de madrugada, pode ir tirando o cavalinho da chuva."
41080-14 = "Ficar escutando essa sua voz de aproveitador afetaria a pureza das nossas garotas na operação."
41080-15 = "[s] \"E-Eu não ia fazer nada disso! É que a índole do que vocês vão fazer a noite me deixou preocupado……\""
41080-16 = "……Não me diga que o senhor achou que a gente ia \"se vender\" e cometer assaltos na rua pra sobreviver?"
41080-17 = "Nós somos da SRT. A gente não se rebaixa a esse tipo de \"serviço noturno\" pros cidadãos."
41080-18 = "Esses tambores de aço que viemos pegar já tão marcados pra ir pro lixo. Ou seja, se a gente \"levar pra casa\", ninguém toma prejuízo."
41080-19 = "Pelo contrário, a gente tá fazendo um favor e economizando a grana do descarte pra empresa."
41080-20 = "[s] \"Se não tem prejuízo, não era mais fácil só ir lá e pedir com jeitinho……?\""
41080-21 = "Aí é que tá, seu tarado……"
41080-22 = "Se a gente for pedir com \"jeitinho\" no meio da noite, os adultos vão querer cobrar em favores indevidos, igualzinho a você!"
41080-23 = "A gente não vai ficar de joelhos e implorar pra qualquer macho que oferecer ajuda!!"
41080-24 = "[s] \"Q-Que imagem horrível que vocês têm de mim……\""
41080-25 = "E-E pra deixar bem claro, sobre aquele dia que a gente engoliu a sua comida quente……"
41080-26 = "Aquilo não foi o pagamento antecipado pra gente se entregar pra você! Nós taticamente \"confiscamos\" o seu…… digo, a sua refeição!"
41080-27 = "É exatamente isso e ponto final!"
41080-28 = "Pela nossa honra e castidade, a gente jamais vai ser corrompida por você……!!"
41080-29 = "RABBIT 2, baixa a bola e foca na missão. A gente tá em operação."
41080-30 = "Tá na hora do show. Faz o reconhecimento da área antes da gente invadir."
41080-31 = "Peraí, ô Miyako. Por que é que cê tá cantando as ordens assim, na maior naturalidade?"
41080-32 = "……RABBIT 2, mantenha a disciplina e use o codinome na rádio."
41080-33 = "Tsc. Não muda de assunto……"
41080-34 = "Eu perguntei com que autoridade cê tá bancando a chefinha abusiva agora."
41080-35 = "Ué, com a autoridade de Líder do Esquadrão……"
41080-36 = "Você só ganhou esse título porque os engravatados tarados lá de cima mandaram, não foi?"
41080-37 = "E não foi qualquer engravatado. Foi o mesmo Conselho Estudantil Geral lixo que passou o cadeado na SRT."
41080-38 = "……"
41080-39 = "Mas a gente não tá mais debaixo da saia deles, a escola fechou. Qualquer uma aqui pode assumir o posto de líder agora."
41080-43 = "……O que o resto do esquadrão acha disso?"
41080-45 = "Por mim tanto faz. Trocar seis por meia dúzia, não vai mudar minha vida mesmo."
41080-46 = "A-Ah, por mim……"
41080-48 = "……Compreendido."
41080-49 = "Então, passo o chicote de líder pra você nessa missão."
41080-50 = "Mostra o seu valor, RABBIT 2. O comando é seu."
41080-51 = "Heh. Os caras são só guardinhas noturnos de porto…… Vai ser mais fácil que tirar doce de criança."
41080-52 = "A gente cansou de limpar cenário assim no treinamento. Eu passo o rodo neles até de olho fechado."
41080-54 = "A-Ahm, Saki-chan……"
41080-55 = "Quer dizer, RABBIT 2! Onde é que eu armo o meu ninho de sniper……?"
41080-56 = "Hã? E-Err…… peraí……"
41080-57 = "G-Guenta a mão aí. Qual era a posição de sniper mais segura pra não ser vista trocando de roupa……? Pera, deixa eu achar a página no manual……"
41080-64 = "Uurgh, enchi a bexiga de água…… Preciso fazer xixi……"
41080-66 = "……Tem um homem se aproximando!!"
41080-67 = "QUE?! Mas não era pra ter pé de porco batendo ronda nessa rota!!"
41080-68 = "Ixi, que doidera, né~…… Hmmm, vai ver ele quer espiar! Fetiches da vida!"
41080-69 = "S-Saki-chan! O que que a gente faz……?!"
41080-70 = "E-Eu posso correr pras colinas……?!"
41080-71 = "I-Isso é, ahm…… veja bem……"
41080-72 = "Pro alto! Só sobe num raio de lugar alto pra ele não ver sua calcinha e se esconde!"
41080-73 = "A bíblia diz que o básico de sniper é \"assegurar a visão sem ser vista\". Se tu for pro alto, teoricamente cê tá a salvo de tarados……!"
41080-75 = "Peraí, Saki. Aquele guindaste ali pode até ser bom pra atirar, mas se o guarda tentar subir lá com ela presa――"
41080-76 = "E-Eu já tô ligada nisso, caramba!"
41080-77 = "Hã? Que barulheira é essa……?"
41080-85 = "Eita p***a, invasores de madrugada?!"
41080-86 = "Vieram roubar a carga, bando de ratazanas de cais?!"
41080-87 = "QUEM AQUI É RATAZANA, SEU TARADO DO CARAMBA?!"
41080-91 = "Ah, que se dane! Fogo liberado! Senta o dedo neles pra proteger a nossa pureza e rushão pro Ponto Echo!!"