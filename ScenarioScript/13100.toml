[translation]
13100-1 = "Episódio 10; Aquele dia"
13100-3 = "Mesmo que você resolva os problemas lutando, isso só servirá de faísca para o próximo conflito."
13100-4 = "Além disso, se começarmos a resolver tudo com força bruta, #nacho que acabarei me perdendo em algum momento."
13100-8 = "Eu aceitei porque eu quis."
13100-9 = "Acho que não é certo falar assim. #nAfinal, a culpada é a desertificação, não é?"
13100-13 = "Não é um sonho, né...?"
13100-23 = "Naquela época, eu sentia raiva de tudo."
13100-25 = "A situação de Abydos..."
13100-26 = "Tempestades de areia que chegavam sem dar tempo de respirar, e a desertificação que não parava."
13100-29 = "Cidadãos apáticos, alunas irresponsáveis, o antigo conselho estudantil incompetente."
13100-30 = "Adultos que só pensavam no próprio lucro e cometiam maldades..."
13100-32 = "E então,"
13100-34 = "Com a veterana que falhava todo santo dia —"
13100-37 = "E comigo mesma, que só tinha ideais bonitos, mas era impotente e não conseguia resolver nada."
13100-38 = "Eu só conseguia me entregar à raiva."
13100-40 = "Acreditando que, com isso, todos os problemas seriam resolvidos."
13100-44 = "Tcharam!"
13100-45 = "Hoshino-chan, olha só! Um pôster antigo do Festival de Areia de Abydos! Finalmente consegui um!"
13100-46 = "Naquela época, o oásis ainda se espalhava como um lago, né. Ah, esse pôster é um presente comemorativo para você!"
13100-47 = "Ehehe, não é maravilhoso? Se algum milagre acontecesse, talvez as pessoas voltassem a se reunir aqui como antigamente —"
13100-48 = "Milagres não existem, veterana."
13100-49 = "Não tem como algo assim acontecer. Em vez disso, por favor, encare a realidade!"
13100-50 = "H-hau..."
13100-51 = "Não tem como um monte de gente vir para o meio desse deserto agora, né!? #nPare de viver no mundo da lua!"
13100-52 = "Uéé, mas Hoshino-chan... d-desculpa, tá?"
13100-53 = "...!"
13100-54 = "Ficando aí toda avoada, falando de milagres, felicidade e sei lá mais o quê..."
13100-55 = "Por favor, seja mais sensata! Você é a presidente do conselho estudantil de Abydos, não é!? Que tal ter um pouco mais de consciência da responsabilidade que carrega nos ombros!"
13100-59 = "(Biri-biri!)"
13100-67 = "Um dia, como sempre, a veterana Yume se envolveu em problemas."
13100-68 = "..."
13100-69 = "E eu fui lá ajudar."
13100-70 = "O problema era..."
13100-74 = "...Bem, uma briga comum de valentões."
13100-75 = "E então, tentaram levar a veterana."
13100-76 = "Que horror..."
13100-77 = "Acho que eles a escolheram justamente por saberem que ela era a presidente do conselho estudantil."
13100-78 = "Mesmo que Abydos esteja cheia de dívidas agora, #nantigamente ela tinha o maior poder financeiro de Kivotos."
13100-79 = "Bem, no fim das contas, eu expulsei os valentões."
13100-82 = "A veterana Yume se envolver em problemas era algo comum, mas..."
13100-83 = "Naquele dia, eu estava um pouco irritada."
13100-84 = "Por isso, descontei minha raiva na veterana Yume e fui embora primeiro."
13100-87 = "Eu pretendia pedir desculpas logo depois, mas..."
13100-88 = "...Por mais que eu procurasse, não consegui encontrar a veterana Yume."
13100-91 = "Veterana Yume, voltei."
13100-92 = "Da próxima vez, é só tomar cuidado."
13100-93 = "Mas antes..."
13100-100 = "Veterana Yume...?"
13100-102 = "A partir daquele dia, passei a procurar pela veterana Yume, que havia desaparecido."
13100-117 = "Desculpa, Hoshino-chan #no sinal está meio @#$%"
13100-118 = "Quando eu estava no deserto, @#&% fui pega em uma tempestade de areia &#@"
13100-122 = "Hoshino-chan... me desculpe."
13100-123 = "Eu esqueci a bússola de novo."
13100-124 = "Eu deixei um bilhete, mas estou enviando por aqui também#nMeu caderno está bem ali"
13100-125 = "A Hoshino-chan conhece bem @$^$%@#$#nEu deixei em um lugar visível, então acho que você vai encontrar logo"
13100-126 = "Hoshino-chan, eu..."
13100-128 = "A veterana Yume foi encontrada no deserto de Abydos 33 dias depois."
13100-130 = "……."
13100-131 = "……."
13100-132 = "……."
13100-138 = "Provavelmente, ela foi ao deserto para atender ao pedido de alguém que estava em apuros e acabou sendo pega por uma tempestade de areia e se perdeu."
13100-139 = "Se você se perder no deserto sem uma bússola, é óbvio que não conseguirá voltar."
13100-140 = "E assim, ela vagou pelo mar de areia..."
13100-141 = "A veterana Yume morreu de exaustão devido à desidratação."
13100-147 = "Sério... eu procurei por você."
13100-148 = "……Veterana Yume."
13100-150 = "……Eu recuperei o corpo e os equipamentos da veterana Yume, mas não consegui encontrar o caderno da presidente do conselho estudantil."
13100-151 = "Na verdade, eu procurei por toda parte por vestígios para saber por que ela foi ao deserto e o que aconteceu, mas..."
13100-152 = "No fim, não encontrei nada."
13100-153 = "Onde será que a veterana deixou aquele caderno?"
13100-154 = "Eu fui a todos os lugares que imaginei, mas não estava em lugar nenhum."
13100-155 = "Tenho certeza de que, se eu tivesse aquele caderno, a verdade seria revelada."
13100-156 = "……Por que eu não consegui descobrir onde o caderno estava?"
13100-161 = "(Se a Nephthys esteve envolvida na morte da presidente do conselho estudantil...)"
13100-162 = "(Eu...)"
13100-165 = "Veterana Yume, por que..."
13100-180 = "！?"
13100-181 = "A campainha de novo!?"
13100-187 = "Sou eu, abra a porta."
13100-189 = "……Supervisor Suou?"
13100-191 = "Desculpe se te assustei. Mas não se preocupe, não vim aqui por causa de assuntos meus.#nVocê tem um compromisso com um executivo da Nephthys, não tem?"
13100-195 = "Senhorita..."
13100-197 = "Mordomo..."
13100-200 = "……Vim falar sobre a \"Ferrovia Trans-Deserto\"."
13100-202 = "……Sim, eu estava esperando."
13100-211 = "Vamos voltar para a sala de aula."
13100-212 = "……Hum."
13100-215 = "Próximo episódio: O segredo revelado"
