[translation]
13100-1 = "第10話;あの日"
13100-3 = "戦って問題を解決しても、それは次の争いの火種になるだけ。"
13100-4 = "それに、何でも武力で解決するようになったら、#nいつか自分を見失っちゃうと思うの。"
13100-8 = "私は望んで受け入れたの。"
13100-9 = "そういう言い方は良くないと思うの。#nだって、悪いのは砂漠化でしょ？"
13100-13 = "夢じゃないよね……？"
13100-23 = "当時の私は、何もかもに憤りを感じててさ。"
13100-25 = "アビドスの状況……。"
13100-26 = "息つく暇もなくやってくる砂嵐に、止まらない砂漠化。"
13100-29 = "無気力な市民、無責任な生徒、無能な前生徒会。"
13100-30 = "自分の利益だけを考えて、悪事を働く大人……。"
13100-32 = "そして、"
13100-34 = "毎日毎日失敗ばかりの先輩と――"
13100-37 = "理想だけは一丁前で、何も解決できない無力な自分に。"
13100-38 = "ただただ、怒りに身を任せるしかなかったんだ。"
13100-40 = "それで、すべての問題が解決できると信じて。"
13100-44 = "じゃーん！ "
13100-45 = "ホシノちゃん見て見てー！アビドス砂祭りの昔のポスター！やっと手に入れたよー！"
13100-46 = "この時はまだ、オアシスが湖みたいに広がってたんだよねー。あ、このポスターは記念にあげる！ "
13100-47 = "えへへ、すっごく素敵でしょー？もし何か奇跡が起きたら、またこの頃みたいに人がたっくさん集まって――"
13100-48 = "奇跡なんて起きっこないですよ、先輩。"
13100-49 = "そんなもの、あるわけないじゃないですか。それよりも現実を見てください！"
13100-50 = "は、はう……。 "
13100-51 = "こんな砂漠のド真ん中に、もう大勢の人なんて来るはずがないでしょう！？#n夢物語もいい加減にしてください！"
13100-52 = "うえぇ、だってホシノちゃーん……ご、ごめんね？"
13100-53 = "……っ。"
13100-54 = "そうやってふわふわと、奇跡だの幸せだの何だの……。"
13100-55 = "もっとしっかりしてください！あなたはアビドスの生徒会長なんですよ！？もう少し、その肩に乗った責任を自覚したらどうなんですか！"
13100-59 = "（ビリビリッ――！）"
13100-67 = "ある日いつものように、ユメ先輩がトラブルに巻き込まれたんだ。"
13100-68 = "……。"
13100-69 = "それを、私が助けに行ってさ。"
13100-70 = "トラブルというのは……。"
13100-74 = "……まあ、よくあるチンピラの喧嘩だよ。"
13100-75 = "それで、先輩が連れていかれそうになったんだ。"
13100-76 = "ひどい……。"
13100-77 = "たぶん、ユメ先輩が生徒会長だと知ったうえで、狙ったんだと思う。"
13100-78 = "今となっては借金まみれのアビドスも、#nずっと昔はキヴォトスで一番資金力があったからさ。"
13100-79 = "まあ結局、チンピラは私が追い払ったんだけどね。"
13100-82 = "ユメ先輩がトラブルに巻き込まれるのなんて、よくあることだったのに……。"
13100-83 = "あの日の私は、ちょっとイライラしてたんだ。"
13100-84 = "だから、私はユメ先輩に怒りをぶつけて先に帰った。"
13100-87 = "すぐ謝るつもりだったんだけど……。"
13100-88 = "……いくら探しても、ユメ先輩の姿は見つからなかった。"
13100-91 = "ユメ先輩、戻りましたよ。"
13100-92 = "次は気をつければ良いですから。"
13100-93 = "それより……。"
13100-100 = "ユメ先輩……？"
13100-102 = "その日から私は、行方不明になったユメ先輩を探し回った。"
13100-117 = "ごめんね、ホシノちゃん#n電波がうまく@#$%"
13100-118 = "砂漠にいたら@#&%砂嵐に遭って&#@"
13100-122 = "ホシノちゃん……ごめんね"
13100-123 = "またコンパスを忘れちゃった。"
13100-124 = "メモも残したけど、ここでも送るね#n私の手帳は、あそこにあるから"
13100-125 = "ホシノちゃんもよく知っている@$^$%@#$#n目立つ場所に置いたから、すぐわかると思う"
13100-126 = "ホシノちゃん、私は"
13100-128 = "ユメ先輩は、それから33日後にアビドス砂漠で発見された。"
13100-130 = "……。"
13100-131 = "……。"
13100-132 = "……。"
13100-138 = "たぶん、誰か困ってる人のお願いを聞いて砂漠に行った先で、#n砂嵐に襲われて遭難したんじゃないかな。"
13100-139 = "コンパスを持たずに砂漠で迷ったら、#n普通に考えて帰ってこられないし。"
13100-140 = "そのまま、砂の海を彷徨って……。"
13100-141 = "ユメ先輩は、脱水症状で衰弱死した。"
13100-147 = "まったく……探しましたよ。"
13100-148 = "……ユメ先輩。"
13100-150 = "……ユメ先輩の遺体や装備品は私が回収したけど、#n生徒会長手帳だけは見つからなかった。"
13100-151 = "本当は、どうして砂漠に行ったのか。#n何が起きたのか知るために、痕跡を探し回ったけど……。"
13100-152 = "結局、何も見つけられなかった。"
13100-153 = "あの手帳を、先輩はどこに残したのか。"
13100-154 = "心当たりのある場所には行ってみたけど、どこにもなかった。"
13100-155 = "きっと、あれさえあれば真相が分かるはずなのに。"
13100-156 = "……どうして、私には手帳の場所が分からなかったんだろう。"
13100-161 = "（もし、生徒会長の死にネフティスが関与していたら……）"
13100-162 = "（私は……）"
13100-165 = "ユメ先輩、どうして……。"
13100-180 = "！？"
13100-181 = "またチャイム！？"
13100-187 = "私だ、開けてくれ。"
13100-189 = "……スオウ監督官？"
13100-191 = "驚かせたのなら悪かったな。だが、用があるのは私ではないから安心してくれ。#nネフティスの幹部と約束があるんだろう？"
13100-195 = "お嬢様……。"
13100-197 = "執事さん……。"
13100-200 = "……「砂漠横断鉄道」について、お話に来ました。"
13100-202 = "……はい、お待ちしていました。"
13100-211 = "教室に戻ろっか。"
13100-212 = "……ん。"
13100-215 = "次回;明かされる秘密"
