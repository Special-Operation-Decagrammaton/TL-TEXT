[translation]
1002506-1 = "それは秘密の"
1002506-2 = "梅花園の近くの公園"
1002506-3 = "ここに私が昔、秘密基地にしてた場所があるんです。"
1002506-4 = "最後に来たのは、どれくらい前くらいでしょうか……"
1002506-5 = "とっても久しぶりな気がしますが、ほとんど変わっていませんね。"
1002506-6 = "私の秘密基地も、撤去されてなくて良かったです。"
1002506-7 = "[s] \"普通の公園に見えるけど……？\""
1002506-8 = "それはそうですよ、簡単に探せたら「秘密基地」ではありませんし。"
1002506-9 = "さあ先生、私の秘密基地を探し当ててみてください！"
1002506-16 = "[ns1] \"滑り台の下の、この木の茂みの奥に……！\"\n[ns2] \"全然分からない……。\""
1002506-17 = "残念、違います！"
1002506-18 = "そこはただの茂みですよ、何もありません……多分。"
1002506-19 = "あはは……まあ確かに、ぱっと見は本当にただの公園ですからね……。"
1002506-21 = "では、そろそろ教えちゃいますね。"
1002506-22 = "私の秘密基地は……"
1002506-24 = "ここです！"
1002506-25 = "[s] \"……土管？\""
1002506-26 = "はい、廃棄された工事用の土管みたいなのですが、ちょうど子どもなら出入りできるくらいのサイズでして。"
1002506-27 = "梅花園に通っていた昔の私は、何か悲しいことがあったり迷ったりすると、ここに来て心を落ち着かせていました。"
1002506-28 = "誰も来ないこの中にいると、不思議と心が落ち着いてくるんです。"
1002506-29 = "苦手な友達への愚痴を呟いてみたり、カッコいい教官になった未来の自分を想像してみたり……。"
1002506-30 = "[s] \"シュンは昔から良い子で、大人っぽい子だったんだね。\""
1002506-31 = "ふふっ、そうですかね？今思うと、自分としてはすごく子どもっぽい行動だったなあと思ってしまいますが……。"
1002506-32 = "しばらくして身体も成長すると、入るには窮屈そうだったので、少しずつ足が遠のいて……。"
1002506-35 = "ですが、今のこの身体なら、難なく入れそうです。"
1002506-36 = "……あ、別に太ったからとか、そういうわけではありませんよ……！？あくまで身長とか、そういう諸々のことでして……！"
1002506-37 = "[s] \"そ、そっか……。\""
1002506-38 = "はい、そこは誤解しないでいただけますとありがたいです。"
1002506-39 = "さて、では久しぶりに入ってみましょうか？先生はそこで待っていてくださいね。"
1002506-40 = "んしょ……。"
1002506-46 = "[wa:4100]― ふふ、[wa:1600]この中は[wa:750]ほとんど[wa:400]変わっていませんね。"
1002506-49 = "― 私が書いた、[wa:1550]自分との約束も……"
1002506-51 = "[wa:50]― あの時のままです。"
1002506-54 = "[wa:1350]― 懐かしい……。"
1002506-57 = "― この約束、[wa:1400]今こうして見てみると、"
1002506-59 = "― ほとんどは[wa:500]守ることができましたね。"
1002506-62 = "[wa:750]― では[wa:450]せっかくですし、"
1002506-64 = "― 今度はここに[wa:1200]将来の夢でも[wa:850]書いてみましょうか？"
1002506-67 = "[ns] \"将来の夢？どんな夢なの？\""
1002506-68 = "[wa:1850]― そ、[wa:650]それは教えられません！"
1002506-70 = "― 秘密です……！"
1002506-73 = "[wa:1150]― 大人には[wa:550]教えられない、"
1002506-75 = "[wa:50]― 子供だけの[wa:650]秘密……[wa:1270]ですから。[wa:980]ふふっ。"
1002506-78 = "ふふっ、何だか気持ちまで童心に返った気分です。"
1002506-79 = "久しぶりに、昔の私が考えていたことを思い出して……。"
1002506-80 = "まさに、初心に返ることができました。"
1002506-81 = "[s] \"私も頑張れば入れるかな……。\""
1002506-82 = "ダメです。この秘密基地は子どもだけの秘密の空間ですので。"
1002506-87 = "……その代わり、ではありませんが……これから先生と私だけの秘密を、たくさん作りましょう♡"
1002506-89 = "その後、日が暮れるまで人けのない場所でシュンとたくさん遊んだ。"
