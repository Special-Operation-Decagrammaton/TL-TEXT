[translation]
1002506-1 = "É um segredo"
1002506-2 = "Parque perto do Jardim da Ameixeira"
1002506-3 = "Aqui é onde eu costumava ter meu esconderijo secreto antigamente."
1002506-4 = "Faz quanto tempo desde a última vez que vim aqui...?"
1002506-5 = "Sinto que faz muito tempo, mas quase nada mudou."
1002506-6 = "Fico feliz que meu esconderijo não tenha sido removido."
1002506-7 = "[s] \"Parece um parque comum, mas...?\""
1002506-8 = "É claro que parece, não seria um \"esconderijo secreto\" se fosse fácil de achar."
1002506-9 = "Vamos lá, Sensei, tente encontrar meu esconderijo!"
1002506-16 = "[ns1] \"Atrás daquele arbusto, embaixo do escorregador...!\"\n[ns2] \"Não faço a menor ideia...\""
1002506-17 = "Que pena, errou!"
1002506-18 = "Isso é só um arbusto, não tem nada aqui... provavelmente."
1002506-19 = "Ahaha... bem, é verdade que, à primeira vista, parece apenas um parque comum..."
1002506-21 = "Então, acho que vou contar agora."
1002506-22 = "Meu esconderijo secreto é..."
1002506-24 = "Aqui!"
1002506-25 = "[s] \"...Um tubo de concreto?\""
1002506-26 = "Sim, parece um tubo de construção descartado, mas tem o tamanho perfeito para uma criança entrar e sair."
1002506-27 = "Quando eu frequentava o Jardim da Ameixeira, sempre que algo triste acontecia ou eu me sentia perdida, eu vinha aqui para acalmar meu coração."
1002506-28 = "Quando estou aqui dentro, onde ninguém vem, meu coração se acalma misteriosamente."
1002506-29 = "Eu costumava murmurar reclamações sobre amigos de quem não gostava, ou imaginar como seria meu futuro como uma instrutora incrível..."
1002506-30 = "[s] \"Shun, você sempre foi uma criança boa e madura, não é?\""
1002506-31 = "Fufu, você acha? Pensando agora, sinto que era um comportamento muito infantil da minha parte..."
1002506-32 = "Depois de um tempo, conforme meu corpo cresceu, ficou apertado para entrar, então parei de vir aos poucos..."
1002506-35 = "Mas, com este corpo atual, parece que consigo entrar sem problemas."
1002506-36 = "...Ah, não é porque eu engordei nem nada do tipo, viu...!? É apenas por causa da altura e de outras coisas...!"
1002506-37 = "[s] \"E-entendi...\""
1002506-38 = "Sim, eu agradeceria se você não entendesse errado."
1002506-39 = "Bem, então vamos entrar depois de tanto tempo? Sensei, espere aqui, por favor."
1002506-40 = "Heave-ho..."
1002506-46 = "[wa:4100]— Fufu, [wa:1600] aqui dentro [wa:750] quase [wa:400] nada mudou."
1002506-49 = "— A promessa que fiz [wa:1550] a mim mesma também..."
1002506-51 = "[wa:50]— Continua como naquela época."
1002506-54 = "[wa:1350]— Que nostálgico..."
1002506-57 = "— Olhando para essa promessa [wa:1400] agora,"
1002506-59 = "— Consegui cumprir [wa:500] quase tudo."
1002506-62 = "[wa:750]— Já que estamos aqui, [wa:450]"
1002506-64 = "— Que tal escrevermos [wa:1200] um sonho para o futuro [wa:850] aqui também?"
1002506-67 = "[ns] \"Um sonho para o futuro? Que tipo de sonho?\""
1002506-68 = "[wa:1850]— I- [wa:650] isso eu não posso contar!"
1002506-70 = "— É um segredo...!"
1002506-73 = "[wa:1150]— É um segredo [wa:550] que não posso contar"
1002506-75 = "[wa:50]— para adultos, [wa:650] apenas para crianças... [wa:1270] entende? [wa:980] Fufu."
1002506-78 = "Fufu, sinto como se meu coração tivesse voltado a ser o de uma criança."
1002506-79 = "Lembrar do que eu pensava antigamente depois de tanto tempo..."
1002506-80 = "Consegui, de fato, voltar às minhas origens."
1002506-81 = "[s] \"Será que eu consigo entrar se eu me esforçar...?\""
1002506-82 = "Não pode. Este esconderijo é um espaço secreto apenas para crianças."
1002506-87 = "......Mas, como compensação... de agora em diante, vamos criar muitos segredos só entre mim e você, Sensei♡"
1002506-89 = "Depois disso, brinquei muito com a Shun em um lugar deserto até o sol se pôr."
