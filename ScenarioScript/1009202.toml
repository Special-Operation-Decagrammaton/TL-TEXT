[translation]
1009202-1 = "美的感覚"
1009202-2 = "（ヨシミと約束した場所に来た）"
1009202-8 = "コーデは大切なんだから。#n先生も真面目に見なさいよね。"
1009202-9 = "間違っても、変な動物の服とか水着を選ばないでよ？"
1009202-10 = "[s1] \"そういうのを選ぶと思われてるんだ……。\"\n[s2] \"いやいや、そんな事はしないよ。\""
1009202-13 = "ふんっ、一応言っておかないと。#n何するか分かったもんじゃない。"
1009202-14 = "……ま、とにかく行くわよ。"
1009202-18 = "選ぶのは私がやるから、意見をちょうだい。"
1009202-23 = "まずはジャケット……"
1009202-24 = "その次は、えっと……。"
1009202-29 = "コンセプトを合わせないとだから、スカートと靴も要るわね。#n色違いで揃えたら可愛いかも。"
1009202-30 = "Ｔシャツは、後からバンドのロゴを入れるから無地で……。"
1009202-31 = "あとは、アクセサリーと……。"
1009202-35 = "……ん？何よ？"
1009202-36 = "……センス有る？"
1009202-37 = "そ、そう……？#nあ、ありがと。"
1009202-42 = "……ちょっと待った。"
1009202-43 = "それってつまり、前まではセンス無いと思ってたってこと？"
1009202-44 = "ねぇ、そういうことよね？"
1009202-45 = "確かに手先は器用じゃないけど、それとこれとは……。"
1009202-46 = "ま、他のみんなに比べたら少しはマシなんじゃない？"
1009202-47 = "……？"
1009202-48 = "他のみんなを呼ばなかった理由……？"
1009202-49 = "それは、その……。"
1009202-50 = "[ns3] \"ごめん。もしかして変な質問だった？\"\n[ns4] \"答えにくかったら聞かなかったことに……。\""
1009202-56 = "はぁ……。"
1009202-57 = "ほんと察し悪いわね。ちょっと考えたら分かるでしょ？"
1009202-58 = "あいつらを呼んだら――"
1009202-62 = "うっ、考えるだけで頭痛くなってきた……。"
1009202-66 = "はあぁ……。"
1009202-67 = "[s5] \"だ、大丈夫！？\"\n[s6] \"なんかごめん……。\""
1009202-72 = "……本当に何も知らないのね。"
1009202-73 = "呼ばなかったんじゃなくて、呼んじゃダメなの。"
1009202-74 = "絶対大変なことになるから。"
1009202-75 = "断言できるわ。"
1009202-76 = "ほんと、センスが壊滅的なのよ……"
1009202-77 = "具体的に言うと――"
1009202-81 = "「明後日方向のファッション」とか、「ミント＆チョコまみれファッション」とか、#n「バンギャ風のファッション」とか、もしかして見たいわけ？"
1009202-85 = "[ns7] \"……。\"\n[ns8] \"……なるほど。\""
1009202-88 = "[ns9] \"理解しました……。\"\n[ns10] \"一旦聞かなかったことにするね……。\""
1009202-91 = "別に大丈夫よ、本人たちにも言ってるし。"
1009202-92 = "だからこうして先生に頼ってるの。"
1009202-96 = "まぁ、そういうことだから。#nそれじゃ、気を取り直して……"
1009202-107 = "これとこれを合わせて……。"
1009202-108 = "……うーん……こんなものかしら？"
1009202-109 = "[s11] \"大体は揃ったかな？\"\n[s12] \"一回全部合わせてみたら？\""
1009202-112 = "んー……。"
1009202-113 = "確かに一回全部合わせてみたら、後はカラバリ揃えるだけでいいし……。"
1009202-117 = "そうね……。"
1009202-118 = "ここでちょっと待ってて、試着してくるから。"
1009202-127 = "……。"
1009202-128 = "大体イメージ通りなんだけど……。"
1009202-129 = "ど……どう？#n全体のバランスとか……。"
1009202-130 = "か……可愛い？"
1009202-131 = "ほ、本気で思ってる？#nもし[ruby=からか]揶揄[/ruby]ってるなら――"
1009202-132 = "[ns13] \"本当に可愛いよ。\"\n[ns14] \"冗談じゃなく、本当に。"
1009202-133 = "そ、そう？#nなら良いんだけど……。"
1009202-137 = "……ふぅん。"
1009202-138 = "ちょっとオーバーサイズ気味だけど……まぁこれは許容かな。"
1009202-143 = "んー……。"
1009202-144 = "よし、じゃあこれで。"
1009202-145 = "あ、でも4人分だと結構かさばるわね。持ち帰ろうにも……。"
1009202-150 = "……え？"
1009202-151 = "……手伝ってくれるの？"
1009202-152 = "[s15] \"そのために来たようなものだし。\"\n[s16] \"大人だからね。\""
1009202-155 = "え、えぇ……？"
1009202-156 = "べ、別に私は、そんなつもりで呼んだわけじゃないけど……。"
1009202-157 = "……結構重いし？"
1009202-162 = "[ns17] カゴを持つ。\n[ns18] \"レジへ行こっか。\""
1009202-167 = "あっ、ちょっ、待って！"
1009202-171 = "一緒に……！！"
1009202-176 = "（会計を済ませて、荷物を全部まとめた）"
