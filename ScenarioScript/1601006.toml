[translation]
1601006-1 = "マイスターの優しい子守唄"
1601006-2 = "今日もお疲れさま、先生。"
1601006-3 = "この前のフィードバックをもとに、新しい応援道具を作ったの。"
1601006-4 = "先生の意見を取り入れてみたから、最初に試してほしくて。"
1601006-5 = "[s] \"今日もチアリーダーなんだね……。\""
1601006-6 = "うん……応援に関わることだから。"
1601006-7 = "むしろ最近は、この服を着ないと新しい応援道具を作る気にならなくて。"
1601006-8 = "……いつの間にか、ルーティンになっちゃってたのかな？"
1601006-9 = "……とにかく。"
1601006-10 = "今回の新作はきっと先生も気に入ってくれるはず。"
1601006-11 = "この応援道具は今までの試作品と違って、みんなが必要とするような、#nそれも喉から手が出るほど、欲望を刺激する設計だから。"
1601006-12 = "……これだよ。"
1601006-16 = "[ns1] \"これって……応援用のポンポン？\n[ns2] \"もうポンポンは使わないんじゃ？\""
1601006-17 = "うん、普通のポンポンはね。"
1601006-18 = "うん、普通のポンポンはね。"
1601006-19 = "でも、このポンポンには特別な機能を追加してるんだ。"
1601006-20 = "それは……Bluetooth機能だよ。"
1601006-21 = "[s] \"Bluetooth？\""
1601006-22 = "うん。前に作った失神鉄パイプの機能を応用してみたの。"
1601006-23 = "十分な睡眠は脳の認知機能を活性化させて、集中を切らさず仕事と向き合えるようにするから……。"
1601006-24 = "それなら睡眠を促すことこそ、最も効率的な応援とも言える。"
1601006-25 = "[s] \"たしかに、言ってることは合ってるけど……。\""
1601006-26 = "さあ、先生。早く横になって……このポンポンを枕元に置いてみて。"
1601006-31 = "（ポンポンから聞き慣れた声の子守唄が流れてきた）"
1601006-32 = "[s] \"この声……。\""
1601006-34 = "……うん。"
1601006-35 = "……私の声。"
1601006-36 = "急いで内蔵する子守唄を探したんだけど、使えそうな音源が見つからなくて。"
1601006-37 = "クラシック音楽にしようかとも思ったんだけど……。"
1601006-38 = "……先生のために、子守唄を歌ったんだ。#nど、どうかな……？"
1601006-39 = "[s3] \"うん、すごくいい！\"\n[s4] \"こっちの方が断然いいよ！\""
1601006-44 = "……そっか、よかった。"
1601006-45 = "先生が気に入ってくれて嬉しい。"
1601006-46 = "使い方は簡単だよ。"
1601006-47 = "ベッドで横になったら、ポンポンを頭の近くに置いて電源をオンにするの。"
1601006-48 = "……このポンポンを使えば、きっと気持ちよく眠れるはず。"
1601006-55 = "……ん、先生。"
1601006-56 = "おやすみなさい。"
1601006-58 = "（……ヒビキの発明品のおかげで、久しぶりに熟睡できた）"
