[translation]
1601006-1 = "A canção de ninar gentil da Meister"
1601006-2 = "Bom trabalho hoje também, Sensei."
1601006-3 = "Com base no feedback da última vez, criei um novo item de torcida."
1601006-4 = "Como incorporei as opiniões do Sensei, queria que você testasse primeiro."
1601006-5 = "[s] \"Você está de líder de torcida de novo hoje...\""
1601006-6 = "Sim... porque tem a ver com a torcida."
1601006-7 = "Na verdade, ultimamente, se eu não estiver usando esta roupa, não sinto vontade de criar novos itens de torcida."
1601006-8 = "...Será que, sem perceber, isso virou uma rotina?"
1601006-9 = "...De qualquer forma."
1601006-10 = "Tenho certeza de que o Sensei vai gostar desta novidade."
1601006-11 = "Diferente dos protótipos anteriores, este item de torcida foi projetado para ser algo que todos precisam, #nalgo tão desejado que as pessoas fariam qualquer coisa para ter."
1601006-12 = "...É isto aqui."
1601006-16 = "[ns1] \"Isso é... um pompom de torcida?\n[ns2] \"Você não ia parar de usar pompons?\""
1601006-17 = "Sim, os pompons comuns, sim."
1601006-18 = "Sim, os pompons comuns, sim."
1601006-19 = "Mas adicionei uma função especial a este pompom."
1601006-20 = "É... uma função Bluetooth."
1601006-21 = "[s] \"Bluetooth?\""
1601006-22 = "Sim. Apliquei a função daquele cano de ferro de desmaio que fiz antes."
1601006-23 = "Um sono adequado ativa as funções cognitivas do cérebro, permitindo que você trabalhe sem perder a concentração..."
1601006-24 = "Sendo assim, promover o sono pode ser considerado a forma mais eficiente de torcida."
1601006-25 = "[s] \"Certamente, o que você diz faz sentido, mas...\""
1601006-26 = "Vamos, Sensei. Deite-se logo... e coloque este pompom perto do travesseiro."
1601006-31 = "(Uma canção de ninar com uma voz familiar começou a tocar no pompom)"
1601006-32 = "[s] \"Essa voz...\""
1601006-34 = "...Sim."
1601006-35 = "...É a minha voz."
1601006-36 = "Procurei às pressas por uma canção de ninar para integrar, mas não encontrei nenhuma fonte de áudio que servisse."
1601006-37 = "Pensei em usar música clássica, mas..."
1601006-38 = "...Eu cantei a canção de ninar para o Sensei. #nO-o que achou...?"
1601006-39 = "[s3] \"Sim, é muito boa!\"\n[s4] \"Essa é muito melhor!\""
1601006-44 = "...Entendo, que bom."
1601006-45 = "Fico feliz que o Sensei tenha gostado."
1601006-46 = "O modo de usar é simples."
1601006-47 = "Quando se deitar na cama, coloque o pompom perto da cabeça e ligue-o."
1601006-48 = "...Se usar este pompom, com certeza conseguirá dormir tranquilamente."
1601006-55 = "...Hum, Sensei."
1601006-56 = "Boa noite."
1601006-58 = "(...Graças à invenção da Hibiki, consegui dormir profundamente depois de muito tempo)"
