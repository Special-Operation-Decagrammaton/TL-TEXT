[translation]
1003402-1 = "É de manhã, por favor, acorde."
1003402-2 = "(Minhas pálpebras estão pesadas. Com a fadiga acumulada de noites seguidas sem dormir, meu corpo não parece querer se levantar...)"
1003402-3 = "(Nesse momento, ouvi a voz de alguém.)"
1003402-4 = "É de manhã, Sensei. Por favor, acorde."
1003402-5 = "[s] \"Hum... só mais 5 minutos...\""
1003402-6 = "Não pode."
1003402-7 = "Se continuar assim, você vai se atrasar. Precisa se levantar."
1003402-12 = "[ns] \"Hum... ué, onde estou...?\""
1003402-13 = "Acordou, Sensei? Bom dia."
1003402-14 = "[s] \"Ah... bom dia, Mimori.\""
1003402-15 = "Dormindo em um lugar desses... por que não foi dormir na cama do Schale?"
1003402-16 = "[s1] \"Tinha alguns documentos que eu precisava procurar por causa do trabalho...\"\n[s2] \"Aliás, por que a Mimori está aqui...?\""
1003402-17 = "Mais importante que isso, eu gostaria que você priorizasse a sua saúde..."
1003402-18 = "Mais importante que isso, eu gostaria que você priorizasse a sua saúde..."
1003402-19 = "Trabalhar até tarde da noite e acabar dormindo na mesa assim..."
1003402-20 = "Não faz bem para a sua coluna, e aposto que você nem conseguiu descansar direito, não é?"
1003402-21 = "Se continuar com esse estilo de vida, isso vai acabar afetando gravemente a sua saúde um dia, Sensei...?"
1003402-23 = "Já que chegamos a esse ponto... não terei escolha a não ser tomar medidas drásticas."
1003402-24 = "Realmente, foi uma boa decisão ter vindo pessoalmente."
1003402-25 = "[s] \"Hã, como assim?\""
1003402-26 = "Não é hora para isso."
1003402-27 = "Faltam menos de 30 minutos para o horário de expediente..."
1003402-28 = "Primeiro, que tal lavar o rosto, Sensei?"
1003402-29 = "[s] \"U-uh, tá bom...?\""
1003402-32 = "[ns3] \"Já lavei...\"\n[ns4] \"Mas, falando nisso, por que a Mimori está aqui...?\""
1003402-33 = "Certo, agora que lavou o rosto, o próximo passo é... sente-se aqui."
1003402-34 = "Certo, agora que lavou o rosto, o próximo passo é... sente-se aqui."
1003402-35 = "[s] \"Tá bom...\""
1003402-41 = "Antes de começar o expediente, você precisa tomar um café da manhã adequado, sabia?"
1003402-42 = "Por isso, eu trouxe algo que preparei antes de vir para cá♪"
1003402-44 = "[s] \"Isso é... um sanduíche?\""
1003402-45 = "Sim, é um sanduíche feito por mim."
1003402-46 = "[s] \"Feito pela Mimori...!\""
1003402-47 = "Como é de manhã, tomei cuidado com os ingredientes para não sobrecarregar o seu estômago."
1003402-48 = "Em vez de bacon gorduroso, usei alface, presunto e ovo como base, e em vez de molhos fortes, pincelei um pouco de shoyu e grelhei."
1003402-49 = "Na verdade, eu queria ter feito um café da manhã tradicional com sopa de missô e peixe grelhado, mas..."
1003402-50 = "[s] \"Não, eu estou muito feliz.\""
1003402-51 = "Fufu, fico feliz em ouvir isso."
1003402-52 = "Aqui, também trouxe um chá quente na garrafa térmica."
1003402-53 = "[s] \"Vou comer!\""
1003402-56 = "Por favor, aproveite. Se não for o suficiente, ainda tem bastante aqui."
1003402-59 = "Ai, ai, Sensei. Você comeu com tanta pressa que acabou sujando a bochecha com farelos..."
1003402-60 = "Pronto, não se mexa, está bem?"
1003402-67 = "Fufu."
1003402-70 = "[ns] \"Estava delicioso.\""
1003402-71 = "Fico feliz que tenha gostado."
1003402-72 = "Agora, vou massagear seus ombros."
1003402-73 = "[s] \"Hã...?\""
1003402-74 = "Você dormiu na mesa em uma postura estranha, então seus músculos devem estar bem tensos."
1003402-79 = "Hum... ah... como está? Seus ombros estão relaxando? Realmente, a parte de trás do seu pescoço está bem rígida..."
1003402-80 = "Se você não dormir em um lugar adequado e na postura correta, vai acabar ficando ainda pior, sabia?"
1003402-81 = "[s5] \"Hmm... que sensação boa...\"\n[s6] \"A massagem da Mimori é a melhor...\""
1003402-82 = "Fufu, fico feliz que diga isso."
1003402-83 = "Fufu, fico feliz que diga isso."
1003402-86 = "Bem, agora que você está um pouco mais relaxado, precisamos ir trabalhar, não é?"
1003402-87 = "Não faltam nem 10 minutos para o horário de início."
1003402-88 = "[s] \"Ah, já é essa hora?\""
1003402-90 = "Já preparei tudo e terminei de recolher o lixo."
1003402-91 = "Sensei, você não esqueceu nada, esqueceu?"
1003402-92 = "[s] \"Sim, está tudo certo.\""
1003402-93 = "Fufu, então os preparativos estão concluídos."
1003402-94 = "Agora só falta..."
1003402-95 = "(Desliza)"
1003402-96 = "[s] \"Hm? Mimori, por que você abriu os braços...\""
1003402-97 = "É um abraço antes do trabalho."
1003402-98 = "[s] \"Um abraço antes do trabalho!?\""
1003402-99 = "Sim, é um abraço de ocitocina para recarregar as energias antes de ir trabalhar."
1003402-100 = "Fufu, vi isso na internet outro dia. Dizia que as mulheres ideais fazem isso sempre."
1003402-101 = "..."
1003402-102 = "Ah...? Será que...?"
1003402-103 = "Será que eu entendi algo errado...?"
1003402-104 = "[s7] \"Não, não está errado. Vamos lá, abraço de ocitocina!\"\n[s8] \"Recarregar as energias antes do trabalho é importante, né!\""
1003402-114 = "Fufufu, então... *aperto*... Pronto, agora vá com cuidado, Sensei. Tenha um ótimo dia de trabalho!"
1003402-115 = "[s] \"Sim!!!\""
1003402-117 = "(Despedido por Mimori, saí e consegui chegar ao Schale na hora certa.)"
1003402-118 = "(Mas, pensando bem, não cheguei a perguntar por que a Mimori veio me visitar.)"
