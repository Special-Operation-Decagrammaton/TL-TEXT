[translation]
1003402-1 = "朝ですよ、起きてください？"
1003402-2 = "（まぶたが重たい。連日の徹夜で蓄積された疲労で、身体が持ち上がりそうにない……）"
1003402-3 = "（その時、誰かの声が聞こえた）"
1003402-4 = "朝ですよ、先生。起きてください？"
1003402-5 = "[s] \"うーん、あと5分……。\""
1003402-6 = "ダメですよ。"
1003402-7 = "このままでは遅刻してしまいます、起きていただかないと。"
1003402-12 = "[ns] \"ん……あれ、ここは……？\""
1003402-13 = "目が覚めましたか、先生？おはようございます。"
1003402-14 = "[s] \"あ……おはよう、ミモリ。\""
1003402-15 = "こんなところで寝て……どうしてシャーレのベッドで寝ないのですか？"
1003402-16 = "[s1] \"仕事で探さなきゃいけない資料があって……。\"\n[s2] \"ところで、どうしてミモリがここに……？\""
1003402-17 = "それよりも、ご自分の身体のことを第一に考えていただきたいです……。"
1003402-18 = "それよりも、ご自分の身体のことを第一に考えていただきたいです……。"
1003402-19 = "夜遅くまでお仕事をして、こうして机で寝るだなんて……。"
1003402-20 = "腰にも良くないですし、熟睡もできなかったのではありませんか？"
1003402-21 = "こんな生活を続けていたら、先生のお身体にいつか深刻な悪影響が出てしまいますよ……？"
1003402-23 = "こうなったら……実力行使もやむをえません。"
1003402-24 = "やはり実際に来てみて正解でしたね。"
1003402-25 = "[s] \"え、どういうこと？\""
1003402-26 = "こうしている場合ではありません。"
1003402-27 = "出勤時間まで30分を切っていますし……。"
1003402-28 = "まずは顔を洗ってきてはいかがですか、先生？"
1003402-29 = "[s] \"う、うん……？\""
1003402-32 = "[ns3] \"洗ってきました……。\"\n[ns4] \"それより、あらためてどうしてミモリがここに……。\""
1003402-33 = "はい、顔を洗ったら次は……こちらに座ってください。"
1003402-34 = "はい、顔を洗ったら次は……こちらに座ってください。"
1003402-35 = "[s] \"はい……。\""
1003402-41 = "出勤の前にまず、朝食をきちんと取らないといけませんよ？"
1003402-42 = "そこで、ちょうどこちらに来る前に作ってきたものがありますので♪"
1003402-44 = "[s] \"これ……サンドイッチ？\""
1003402-45 = "はい、私のお手製のサンドイッチです。"
1003402-46 = "[s] \"ミモリの手作り……！\""
1003402-47 = "朝ですので胃に負担をかけないよう、材料にも気を遣ってみました。"
1003402-48 = "脂っこいベーコンの代わりに、レタスとハム、それに卵をベースにしつつ、味の濃いソースに代えて、醬油をさっと塗って焼いてあります。"
1003402-49 = "本当はお味噌汁と焼き魚で伝統的な朝食をお作りしたかったのですが……。"
1003402-50 = "[s] \"ううん、すっごく嬉しい。\""
1003402-51 = "ふふっ、それはよかったです。"
1003402-52 = "はい、ポットに入れてきた温かいお茶もありますよ。"
1003402-53 = "[s] \"いただきます！\""
1003402-56 = "どうぞ、お召し上がりください。もし足りなければ、まだたくさん残ってますよ。"
1003402-59 = "もう先生ったら。焦って食べるから、パンくずが頬に付いてしまっていますよ……？"
1003402-60 = "ほら、動かないでくださいね？"
1003402-67 = "ふふっ。"
1003402-70 = "[ns] \"美味しかったー。\""
1003402-71 = "お口に合ったのでしたら良かったです。"
1003402-72 = "それでは、肩をお揉みしますね。"
1003402-73 = "[s] \"え……？\""
1003402-74 = "机の上で変な姿勢のまま寝てしまって、筋肉がこり固まっているはずですから。"
1003402-79 = "んっ……ふっ……いかがでしょう？肩、気持ちいいですか？やはり首の後ろ辺りが、だいぶ固いですね……。"
1003402-80 = "きちんとした場所で、きちんとした姿勢で寝ないと、もっとひどくなってしまいますよ？"
1003402-81 = "[s5] \"んっ……気持ちいい……。\"\n[s6] \"ミモリのマッサージ、最高……。\""
1003402-82 = "ふふっ、そう言ってくださると嬉しいです。"
1003402-83 = "ふふっ、そう言ってくださると嬉しいです。"
1003402-86 = "さあ、少しでも楽になったところで、そろそろ出勤しないとですね？"
1003402-87 = "始業時間まで、あと10分もありませんよ。"
1003402-88 = "[s] \"あ、もうそんな時間？\""
1003402-90 = "準備はできておりますし、ゴミの片付けも終えています。"
1003402-91 = "先生も、お忘れ物はありませんか？"
1003402-92 = "[s] \"うん、大丈夫。\""
1003402-93 = "ふふっ、ではおよそ準備は完了ですね。"
1003402-94 = "あとは……。"
1003402-95 = "（スッ）"
1003402-96 = "[s] \"ん？ミモリ、どうして両腕を広げて……。\""
1003402-97 = "お仕事前のハグです。"
1003402-98 = "[s] \"お仕事前のハグ！？\""
1003402-99 = "はい、お仕事に行く前にエネルギーを充填するための、オキシトシンハグです。"
1003402-100 = "ふふ、先日ネットで見たんです。大和撫子は普段から皆こうしているのだと。"
1003402-101 = "……。"
1003402-102 = "あれ……？もしかして……。"
1003402-103 = "私、何か間違えているのでしょうか……？"
1003402-104 = "[s7] \"ううん、間違ってないよ。やろう、オキシトシンハグ！\"\n[s8] \"お仕事前のエネルギーチャージ大事だよね、うん！\""
1003402-114 = "ふふふっ、では……ぎゅー……っ。はい、それではいってらっしゃいませ、先生。今日も一日頑張ってください！"
1003402-115 = "[s] \"うん！！！\""
1003402-117 = "（ミモリに見送られて外に出て、シャーレにも時間通り到着できた）"
1003402-118 = "（でもそういえば、どうしてミモリが私のもとを訪ねて来たのかは最後まで聞けなかった）"
