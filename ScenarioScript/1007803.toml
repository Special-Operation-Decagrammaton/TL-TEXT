[translation]
1007803-1 = "Gosto da operação de jateamento."

1007803-3 = "(À noite, Kasumi foi chamada a um canteiro de obras abandonado)."

1007803-4 = "[ns1]\"Estou aliviado por ver que não parece haver pessoas entrando e saindo da casa, mas ......\"\n[ns2]\"Agora vamos fazer uma cena aqui ......? \""

1007803-7 = "Oh, isso é ótimo, senhor! Você chegou bem na hora!"

1007803-11 = "Bem-vindo ao 89º Esconderijo Secreto do Mês!"

1007803-12 = "O quê? Você está perguntando se os números não aumentaram?"

1007803-13 = "Ha ha ha! Claro que sim! Porque tivemos que abandonar nosso esconderijo anterior!"

1007803-14 = "Bem, não são os números que importam."

1007803-15 = "Lamento que você tenha vindo, mas vamos seguir em frente. Não podemos ficar muito tempo."

1007803-16 = "Siga-me rapidamente, doutor! #nVocês precisam ouvir sobre meu plano brilhante!"

1007803-22 = "Você não os encontrará por aqui."

1007803-23 = "Desculpe-me por chamá-lo sempre para os confins apertados, mas tenho que me esconder ......."

1007803-24 = "Apesar das aparências, sou bastante popular e recebo visitantes de todos os lugares."

1007803-25 = "A Comissão de Serviço Público, empresas armadas, ...... esqueletos que estouraram um cano de água e foram pegos no meio de uma operação de detonação, e o Helmet Squad, ......"

1007803-26 = "Ha ha ha. Todos eles parecem infelizes no início, mas quando as fontes termais começam a jorrar, eles ficam felizes!"

1007803-27 = "...... Doutor? Qual é o problema, você está com essa aparência."

1007803-28 = "......?"

1007803-29 = "Por que você continua sendo perseguido dessa forma?"

1007803-30 = "Você pergunta se eles não se sentem frustrados e desapontados quando fracassam?"

1007803-34 = "...... haha."

1007803-35 = "Professor, talvez nossas percepções sejam um pouco diferentes."

1007803-36 = "Aparentemente, o professor acha que eu gosto de "tornar o desenvolvimento do spa um sucesso" ......"

1007803-37 = "É claro que você deve sempre almejar o sucesso. ......#n Não acredito que não tenha sentido se você não for bem-sucedido!"

1007803-38 = "...... Professor."

1007803-39 = "Gosto de explodir coisas. O que significa essa palavra - você a entende?"

1007803-40 = "Isso inclui ...... 'falhas'."

1007803-41 = "Grande e pequena escala. ...... Bem-sucedido e malsucedido."

1007803-42 = "Causas de ser perseguido, frustrado por sabotagem ou finalmente conseguir superar obstáculos. ......"

1007803-43 = "Gosto de explodir coisas em lugares que ninguém pode imaginar e criar novas paisagens."

1007803-44 = "Às vezes, os explosivos que foram calculados e preparados com tanto cuidado são eliminados devido à interferência do comitê de ordem pública. Eu adoro até mesmo essa tristeza!"

1007803-45 = "Qualquer lugar onde possa surgir uma fonte termal é bom! #nNão, desde que você tenha o desejo: "Seria lindo se uma fonte termal surgisse aqui"!"

1007803-46 = "Não é o resultado que importa. É tudo o que envolve a criação de um spa! #nO processo é onde reside a beleza do "desenvolvimento de spa"!"

1007803-47 = "Você sabe cavar? Não, eu quero cavar! Eu vou cavar! #n--você sabe qual é a sensação?"

1007803-48 = "E em meus olhos ......"

1007803-49 = "O edifício em ...... 'Schaale' também é bem mostrado."

1007803-53 = "[ns3] \"...... Espere, o que você acabou de dizer! \"\n[ns4] \"...... O quê! \"\""

1007803-56 = "Ha ha ha ha ha! Você parece surpreso."

1007803-57 = "...... Finalmente entendeu, doutor?"

1007803-58 = "Quero que eles participem dessas ações."

1007803-59 = "Você pode interpretar isso como uma ameaça. Estou acostumado a ser #nvigilante."

1007803-60 = "Você mudou a maneira como me olhava quando descobriu que eu era uma criança problemática? Eles começaram a não gostar de mim? #Não, mas acho que o mais importante não é o que eles pensam - é como eu me sinto."

1007803-61 = "Há algum tempo venho me perguntando quando devo cortá-lo."

1007803-62 = "Portanto, o site ...... deve ser levado a sério."

1007803-63 = "...... Você entendeu a gravidade do assunto, doutor?"

1007803-64 = "Para mim e para meus professores."

1007803-65 = "Agora, gostaríamos que vocês discutissem juntos os seguintes pontos do spa."

1007803-66 = "Para hoje e para amanhã."

1007803-67 = "...... Não importa quanto tempo leve, nós lhe faremos companhia, doutor."

1007803-68 = "[s] \"............. \""

1007803-70 = "[ns5] \"......\Ok, vou aceitar essa sugestão. \"\n[ns6] \"Nós vamos fazer isso. "

1007803-73 = "Hahahahahaha!!! #nOkay, ok! É assim que tem que ser!"

1007803-74 = "Então vamos procurar uma pesquisa séria!"

1007803-75 = "Eu, meu professor ...... e todos ficaremos felizes!"

1007803-76 = "Pontos de águas termais fantasmas!"

1007803-78 = "(Em seguida, discutiu o próximo ponto de águas termais no mapa com Kasumi até tarde)"

1007803-79 = "(Eles trocaram opiniões até o sol nascer em uma tentativa de guiá-los de alguma forma para um "lugar seguro" ......)"

1007803-82 = "(...... Finalmente encontrando um local satisfatório, Kasumi descansou satisfeita no mapa)."

