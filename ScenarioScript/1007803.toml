[translation]
1007803-1 = "Eu gosto de trabalho explosivo"

1007803-3 = "(À noite, recebi a ligação de Kasumi e fui para o canteiro de obras abandonado.)"

1007803-4 = "[ns1] \"Fiquei aliviado porque ninguém estava indo ou vindo...\"\n[ns2] \"Da próxima vez, você vai fazer barulho aqui...?\""

1007803-7 = "Ah, como esperado de você, Sensei! A hora é perfeita!"

1007803-11 = "Bem-vindo ao 89º Esconderijo Secreto deste mês!"

1007803-12 = "Sim? Os números estão aumentando?"

1007803-13 = "Hahahaha! Claro! Tive que abandonar o esconderijo anterior!"

1007803-14 = "Bem, não são os números que são importantes."

1007803-15 = "Lamento que você tenha vindo, mas vamos em frente. Eu não poderia ficar lá por muito tempo."

1007803-16 = "Apresse-se e siga-me, Sensei! #nPreciso que você ouça meu plano maravilhoso! !"

1007803-22 = "Hmm, você não conseguirá encontrá-lo por aqui."

1007803-23 = "Sinto muito por chamar você para um lugar apertado toda vez... mas tenho que me esconder."

1007803-24 = "Mesmo tendo essa aparência, sou bastante popular e os clientes vêm de todos os lugares."

1007803-25 = "O comitê disciplinar, as corporações armadas, os Sukeban que estouraram os canos de água durante a operação de bombardeio, a Brigada de Capacetes, etc..."

1007803-26 = "Ha ha ha. No início todos pareciam insatisfeitos, mas quando as fontes termais começaram a jorrar, todos ficaram felizes!"

1007803-27 = "……Sensei? O que há de errado com você, você está assim?"

1007803-28 = "...?"

1007803-29 = "Por que você continua sendo perseguido assim todas as vezes?"

1007803-30 = "Você não se sente frustrado ou frustrado quando falha?"

1007803-34 = "...Haha."

1007803-35 = "Sensei, talvez tenhamos um entendimento um pouco diferente."

1007803-36 = "Aparentemente, meu Sensei acha que eu gosto de \"fazer do desenvolvimento de fontes termais um sucesso\"..."

1007803-37 = "Claro, tenho certeza de que sempre busco o sucesso, mas...#nNão acho que “faça sentido se eu não tiver sucesso”."

1007803-38 = "……Sensei."

1007803-39 = "Eu gosto de explosões. Você entende o significado dessas palavras?"

1007803-40 = "Isso inclui... \"fracasso\"."

1007803-41 = "Coisas grandes, coisas pequenas... sucessos, fracassos."

1007803-42 = "A razão pela qual você está sendo perseguido, aquele que está bloqueado pela sabotagem, ou aquele que finalmente consegue superar os obstáculos...!"

1007803-43 = "Gosto de criar novos cenários detonando bombas em lugares que ninguém imagina."

1007803-44 = "Há momentos em que explosivos, cuidadosamente calculados e preparados, são descartados devido à interferência do comitê disciplinar. Eu amo até esse tipo de tristeza!"

1007803-45 = "Você pode ir a qualquer lugar, desde que as fontes termais jorrem! #nNão, tudo que você precisa é desejar que ``seria lindo se fontes termais surgissem aqui''!"

1007803-46 = "O que é importante não é o resultado. Tudo o que você precisa saber para criar uma fonte termal! #nA beleza do “desenvolvimento de fontes termais” está no processo!"

1007803-47 = "Você pode cavar? Não, eu quero cavar! Deixe-me cavar! #n――Você entende esse sentimento?"

1007803-48 = "E aos meus olhos..."

1007803-49 = "...O edifício da \"placa de Petri\" também é claramente visível."

1007803-53 = "[ns3] \"...Espere, o que você acabou de dizer!?\"\n[ns4] \"...O quê!?\""

1007803-56 = "Hahahahaha! ! Você parece surpreso."

1007803-57 = "...Você finalmente entendeu, Sensei?"

1007803-58 = "Quero que você esteja envolvido nessas ações."

1007803-59 = "Não me importo se você acha que isso é uma ameaça. #nEstou acostumado a ser vigiado."

1007803-60 = "Sua perspectiva mudou quando você percebeu que ele era uma criança problemática? Você começou a me odiar? #nMas acho que o importante não é o que a outra pessoa pensa – é como me sinto."

1007803-61 = "Eu estava pensando em quando começar."

1007803-62 = "Então... quero que você pense seriamente sobre isso."

1007803-63 = "...Você entendeu a seriedade do assunto, Sensei?"

1007803-64 = "Para mim e para meu Sensei."

1007803-65 = "Gostaria que você se juntasse a nós na discussão dos próximos pontos das fontes termais."

1007803-66 = "Para hoje e para amanhã."

1007803-67 = "...Não importa quanto tempo demore, vou pedir que você me acompanhe, Sensei."

1007803-68 = "[s] \"………….\""

1007803-70 = "[ns5] \"...Ok, aceitarei essa proposta.\"\n[ns6] \"Se vou fazer isso, farei ao máximo.\""

1007803-73 = "Hahahahahaha! ! ! #nOk, ok! Eu tenho que ir! !"

1007803-74 = "Então vamos procurar isso a sério!"

1007803-75 = "Eu, meu Sensei e todos os outros podemos ser felizes!"

1007803-76 = "Um fantástico ponto de águas termais! !"

1007803-78 = "(Depois, discuti o próximo ponto de fonte termal no mapa com Kasumi até tarde)"

1007803-79 = "(Trocamos opiniões até o sol nascer, tentando de alguma forma guiá-lo para um “lugar seguro”...)"

1007803-82 = "(... Kasumi finalmente encontrou um lugar que a deixou satisfeita e olhou para o mapa com uma expressão satisfeita no rosto.)"

