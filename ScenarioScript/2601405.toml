[translation]
2601405-1 = "休むなら特別な休日を"
2601405-2 = "あ、先生。"
2601405-3 = "来てくれて嬉しい。"
2601405-4 = "[s1] \"登校……するの……？\"\n[s2] \"休みの日なのに？\""
2601405-7 = "ああ。"
2601405-8 = "別に今日は行く必要無いんだが……。"
2601405-9 = "C&Cで活動していると、普通に登校する機会が少なくて。"
2601405-10 = "学園に行くにしても、毎日違う道を使ったり、そもそも現場に直行だったり……。"
2601405-11 = "[s] \"C&Cは忙しいもんね……\""
2601405-12 = "その生活に不満はないけど、今日は休日だから。"
2601405-13 = "制服姿で、久しぶりに通学路を歩いてみたくなったんだ……。"
2601405-14 = "それに……先生も一緒だったら、もっと有意義に過ごせるかなって。"
2601405-15 = "[s] \"できなかったことをする、特別な休日だね。\""
2601405-16 = "その……。"
2601405-17 = "今さらだけど、先生はよかったのか？"
2601405-18 = "私に付き合わせてしまっているだけのような……。"
2601405-19 = "[s3] \"そんなことないよ！\"\n[s4] \"カリンに誘ってもらえて嬉しい！\""
2601405-22 = "そうか。そう言ってくれるなら……。"
2601405-23 = "行こう。まずはこっちの道だ。"
2601405-24 = "[s] \"一緒に登校するなんて、幼馴染みたいだね。\""
2601405-25 = "えっ……！？"
2601405-26 = "きゅ、急に何を言ってるんだ……。"
2601405-27 = "さあ、こっちだ。"
2601405-29 = "先生、ストップ。一本、電車が通るのを待とう。"
2601405-30 = "踏切が鳴り始めたな……。"
2601405-31 = "ふ～ん、ふ～んふふ～ん……。"
2601405-34 = "よし、渡ろう。"
2601405-35 = "[s] \"さっきのは？\""
2601405-36 = "昔、よくやってたんだ。#n遮断機が上がるのと同じタイミングでちょうど歌い終わるように、鼻歌を歌う……。"
2601405-37 = "そういう遊び……今日はうまくいった。"
2601405-38 = "些細なことだけど、ちょっと面白くて。"
2601405-39 = "[s] \"楽しそう。私もやってみようかな\""
2601405-40 = "先生も、そう思ってくれるのか。"
2601405-41 = "それは……よかった。"
2601405-43 = "先生、そっちじゃない。この公園を抜けていくんだ。"
2601405-44 = "[s] \"あれ？学園とは別方向だよね？\""
2601405-45 = "ああ、その通り。"
2601405-46 = "でも、実はこの公園を通ったほうが早い。"
2601405-47 = "途中で、道が二手に分岐するんだ。"
2601405-48 = "公園の中に、特に大きな木が一本生えている場所がある。"
2601405-49 = "それを目印にして、花畑のほうに出れば近道だ。"
2601405-50 = "[s] \"すごいね。こんな道知らなかったよ\""
2601405-51 = "別に……すごいことではない。"
2601405-52 = "C&Cに入る前、いろんな通学路を試してたんだ。"
2601405-53 = "でも、誰かに教えたのは、先生がはじめてではある。"
2601405-55 = "次は、この階段を下りる。"
2601405-56 = "ここには、時短のための小技があるんだ。"
2601405-57 = "手すりに乗って、滑る。"
2601405-58 = "[s] \"手すりを？かなり傾斜がきついけど……\""
2601405-59 = "ここの手すりは途切れることなく階段の最後まで繋がっている。#n重心さえしっかり取れば、早く下りられる。"
2601405-60 = "……別に、毎回そうしているわけじゃない。ギリギリの時だけだ。"
2601405-61 = "[s] \"やってみてほしいな！\""
2601405-62 = "見ても面白くないだろう。"
2601405-63 = "それに、今日は急いでいるわけでもないんだ。普通に降りる。"
2601405-65 = "（そうして、カリンと学園まで来た）"
2601405-67 = "着いたな。"
2601405-68 = "だが……。"
2601405-69 = "[s] \"どうしたの？カリン。\""
2601405-70 = "やっぱり、先生には退屈だったんじゃないか？"
2601405-71 = "私ばっかり楽しんでしまっていたような気がする。"
2601405-72 = "久々に、ゆっくりと通学路を歩けた。それも、先生と一緒に。#n私はそれで充分に満足なのだが……。"
2601405-73 = "……先生にとっては、ただ通学路を歩いただけだろう？"
2601405-74 = "[s] \"私はそう思わないよ。\""
2601405-75 = "別に、気休めは……。"
2601405-76 = "え？違う？"
2601405-77 = "通学路の中にはいっぱい秘密があった……？"
2601405-78 = "秘密……？"
2601405-79 = "[s] \"電車を待っている時間。公園の近道。階段の手すり……\""
2601405-80 = "……そんなの、他愛もない――些細なものにすぎない。"
2601405-81 = "ちょっとした話題のひとつだろう？"
2601405-82 = "取り立てて面白いものでは……。"
2601405-83 = "[s] \"でも、カリンだけが知っている秘密だった。\""
2601405-84 = "私だけが……？"
2601405-85 = "……たしかに、これまで誰かに話したことはなかったけど。"
2601405-86 = "[s5] \"そして、その秘密を知っているのは――\"\n[s6] \"私とカリン、二人だけ。\""
2601405-89 = "二人だけ……。"
2601405-90 = "[s] \"だから、今日の時間は特別だったよ。\""
2601405-91 = "……そうか。"
2601405-92 = "……先生は、日常の中に特別を見つけるのが上手なんだな。"
2601405-93 = "先生と過ごす休日なら、いつだって「特別な休日」になる気がする。"
2601405-94 = "ありがとう、先生。"
2601405-95 = "[s] \"良ければ、次もまたご一緒させて欲しいな\""
2601405-96 = "次か……。"
2601405-97 = "ふふっ、それならすぐ叶えてあげられそうだ。"
2601405-98 = "[s] \"え？\""
2601405-99 = "登校したら、今度は下校しないといけないからな。"
2601405-103 = "帰り道も、よろしく。先生。"
