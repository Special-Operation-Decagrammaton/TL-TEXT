[translation]
2601405-1 = "Se for para descansar, que seja um feriado especial"
2601405-2 = "Ah, Sensei."
2601405-3 = "Fico feliz que tenha vindo."
2601405-4 = "[s1] \"Você vai... para a escola...?\"\n[s2] \"Mesmo sendo dia de folga?\""
2601405-7 = "Sim."
2601405-8 = "Não que eu precise ir hoje, mas..."
2601405-9 = "Trabalhando na C&C, raramente tenho a chance de ir à escola como uma aluna comum."
2601405-10 = "Mesmo quando vou ao campus, uso caminhos diferentes todos os dias, ou vou direto para o local da missão..."
2601405-11 = "[s] \"A C&C é bem ocupada, né...\""
2601405-12 = "Não tenho reclamações sobre essa vida, mas hoje é feriado."
2601405-13 = "Senti vontade de caminhar pelo caminho da escola de uniforme, depois de tanto tempo..."
2601405-14 = "Além disso... pensei que, se o Sensei estivesse comigo, seria um dia ainda mais proveitoso."
2601405-15 = "[s] \"Um feriado especial para fazer coisas que normalmente não conseguimos.\""
2601405-16 = "Sobre isso..."
2601405-17 = "Já é tarde para perguntar, mas... tudo bem para você, Sensei?"
2601405-18 = "Sinto que estou apenas te arrastando comigo..."
2601405-19 = "[s3] \"Claro que não!\"\n[s4] \"Fico feliz que a Karin tenha me convidado!\""
2601405-22 = "Entendo. Se você diz isso..."
2601405-23 = "Vamos lá. Primeiro, por este caminho."
2601405-24 = "[s] \"Ir para a escola juntos assim, parece até coisa de amigos de infância.\""
2601405-25 = "Hã...!?"
2601405-26 = "Po-por que disse isso de repente..."
2601405-27 = "Vamos, por aqui."
2601405-29 = "Sensei, pare. Vamos esperar o trem passar."
2601405-30 = "A cancela começou a tocar..."
2601405-31 = "Hmm, hmm-hmm-hmm..."
2601405-34 = "Certo, vamos atravessar."
2601405-35 = "[s] \"O que foi aquilo?\""
2601405-36 = "Eu costumava fazer isso antigamente. #nEu cantarolo uma música para terminar exatamente no momento em que a cancela sobe..."
2601405-37 = "É um tipo de brincadeira... hoje deu certo."
2601405-38 = "É algo trivial, mas acho um pouco divertido."
2601405-39 = "[s] \"Parece divertido. Acho que vou tentar também.\""
2601405-40 = "Você também acha, Sensei?"
2601405-41 = "Isso... é bom."
2601405-43 = "Sensei, não é por aí. Vamos atravessar este parque."
2601405-44 = "[s] \"Ué? Não é na direção oposta à da escola?\""
2601405-45 = "Sim, exatamente."
2601405-46 = "Mas, na verdade, passar por este parque é mais rápido."
2601405-47 = "O caminho se divide em dois mais à frente."
2601405-48 = "Tem um lugar no parque com uma árvore bem grande."
2601405-49 = "Se usá-la como referência e sair em direção ao jardim de flores, é um atalho."
2601405-50 = "[s] \"Incrível. Eu não conhecia esse caminho.\""
2601405-51 = "Não é... nada demais."
2601405-52 = "Antes de entrar na C&C, eu testava vários caminhos para a escola."
2601405-53 = "Mas você é a primeira pessoa para quem eu mostro isso, Sensei."
2601405-55 = "Agora, vamos descer estas escadas."
2601405-56 = "Existe um truque aqui para ganhar tempo."
2601405-57 = "Subir no corrimão e deslizar."
2601405-58 = "[s] \"No corrimão? Mas a inclinação é bem íngreme...\""
2601405-59 = "O corrimão aqui vai direto até o final da escada sem interrupções. #nSe você mantiver o centro de gravidade firme, consegue descer rápido."
2601405-60 = "……Não é como se eu fizesse isso sempre. Só quando estou muito apertada de tempo."
2601405-61 = "[s] \"Eu adoraria que você tentasse!\""
2601405-62 = "Não acho que seria interessante para você ver."
2601405-63 = "Além disso, não estou com pressa hoje. Vou descer normalmente."
2601405-65 = "（E assim, cheguei à academia com Karin）"
2601405-67 = "Chegamos."
2601405-68 = "Mas……"
2601405-69 = "[s] \"O que houve, Karin?\""
2601405-70 = "No fim das contas, não foi entediante para você, Sensei?"
2601405-71 = "Sinto que fui a única que se divertiu."
2601405-72 = "Faz tempo que não caminhava tranquilamente pelo caminho da escola. E ainda por cima, com você, Sensei. #nPara mim, isso já é satisfatório o suficiente, mas……"
2601405-73 = "……Para você, Sensei, deve ter sido apenas uma caminhada comum, não é?"
2601405-74 = "[s] \"Eu não penso assim.\""
2601405-75 = "Não precisa tentar me consolar……"
2601405-76 = "Hã? Não é isso?"
2601405-77 = "Que o caminho da escola estava cheio de segredos……?"
2601405-78 = "Segredos……?"
2601405-79 = "[s] \"O tempo esperando o trem. O atalho pelo parque. O corrimão da escada……\""
2601405-80 = "……Isso não passa de algo trivial — algo sem importância."
2601405-81 = "É só um assunto qualquer, não é?"
2601405-82 = "Não é nada particularmente interessante……"
2601405-83 = "[s] \"Mas eram segredos que só a Karin conhecia.\""
2601405-84 = "Só eu……?"
2601405-85 = "……É verdade, eu nunca tinha contado isso para ninguém antes."
2601405-86 = "[s5] \"E agora, quem conhece esses segredos é—\"\n[s6] \"Eu e você, apenas nós dois.\""
2601405-89 = "Apenas nós dois……"
2601405-90 = "[s] \"Por isso, o tempo de hoje foi especial.\""
2601405-91 = "……Entendo."
2601405-92 = "……Você é muito bom em encontrar o que é especial no cotidiano, Sensei."
2601405-93 = "Sinto que, se for um dia de folga passado com você, Sensei, ele sempre será um \"dia especial\"."
2601405-94 = "Obrigada, Sensei."
2601405-95 = "[s] \"Se não se importar, gostaria que me acompanhasse na próxima vez também.\""
2601405-96 = "Na próxima, é……"
2601405-97 = "Hehe, se for isso, acho que posso realizar seu desejo logo."
2601405-98 = "[s] \"Hã?\""
2601405-99 = "Já que, depois de chegar na escola, eventualmente teremos que voltar para casa."
2601405-103 = "Conto com você no caminho de volta também, Sensei."
