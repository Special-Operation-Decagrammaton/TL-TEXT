[translation]
1013802-1 = "早く脱ぎなさい！"
1013802-2 = "（レナに頼まれた材料を買って、ワイルドハント芸術学院へと足を運んだ）"
1013802-3 = "（……ところが）"
1013802-5 = "えっ！？な、何やってんの！？"
1013802-6 = "パスタに、ケチャップをかけてる……！？"
1013802-7 = "これ美味しいよ、食べる？"
1013802-8 = "あり得ない……そんなものワイルドハントに対する冒涜だ！！"
1013802-9 = "ってか、え……？そのご飯はなに？"
1013802-10 = "ああ、これパスタソースにめっちゃ合うんだよね～"
1013802-11 = "ぎゃあああっ！？！？信じられない！！決闘だ決闘！"
1013802-12 = "アハハハッ！いいよ！表出よっか！"
1013802-14 = "[ns] \"えっと……何してるの？\""
1013802-20 = "（通りすがりの生徒たちの喧嘩に巻き込まれてしまった）"
1013802-26 = "先生の前で喧嘩とは何事だ！？"
1013802-27 = "でもこいつ……ご飯にパスタソースをかけて食べるって言うんですよ！？"
1013802-28 = "そういう君はエスプレッソに水を足してただろう？"
1013802-29 = "なっ……！？おい、二人とも連行しろ！！"
1013802-35 = "[ns] \"センシティブな問題なんだね……。\""
1013802-36 = "ふぅ……これでワイルドハントの平和は守られました。"
1013802-37 = "先生、大丈夫ですか？"
1013802-38 = "[s] \"う、うん。大丈夫。\""
1013802-39 = "それならよかったです。"
1013802-40 = "お見苦しい場をお見せしました。彼女たちはみっちりと教育しておきますので！"
1013802-41 = "お前ら……ワイルドハントの規則を叩き込んでやるからな！"
1013802-46 = "（喧嘩はひと段落したものの……）"
1013802-47 = "（その場は荒れ果てたままだった）"
1013802-48 = "[ns] \"倒れたテーブルでも戻しておこうかな……。\""
1013802-50 = "（テーブルを片付けようとしゃがみ込むと……）"
1013802-54 = "[ns] \"……！？\""
1013802-55 = "（なんだかお尻がスースーするような！）"
1013802-56 = "（まさかこんな場所で……スーツが破けた！？）"
1013802-57 = "[ns] \"ど、どうしよう！？このままじゃ不審者に……！\""
1013802-58 = "（頭の中が真っ白になっていく……）"
1013802-59 = "（考えろ！この危機から脱する方法を！！）"
1013802-60 = "……？"
1013802-61 = "先生？こんなところで何してるの？"
1013802-64 = "[ns] \"……！！！\""
1013802-65 = "学院に来たっていうのに、全然来ないんだもん！探したわよ！"
1013802-66 = "電話にも出ないし……。"
1013802-67 = "……あれ？どうしたの？顔色悪いけど。#n姿勢も……なんか変だし。"
1013802-68 = "……。"
1013802-69 = "あ！何か隠してるんでしょ？"
1013802-70 = "なに？後ろに何があるの？見せなさい！"
1013802-71 = "[s] \"だっ、ダメこれはっ……！！\""
1013802-72 = "何がダメっていうのよ！"
1013802-73 = "イタズラでもしようってんなら、タダじゃおかな――"
1013802-77 = "……。"
1013802-78 = "……！？"
1013802-79 = "なっ……どうしてこんなことに！！"
1013802-80 = "破けたならそう言えばいいじゃない！！"
1013802-81 = "[s] \"い、言おうとしたんだけど……！\""
1013802-82 = "あーもう！"
1013802-83 = "ちょっと待ってなさい！すぐ戻るから……！"
1013802-88 = "（レナが持ってきたブランケットを腰に巻き、他の場所へ移った）"
1013802-90 = "ふぅ……ここなら大丈夫でしょ。"
1013802-91 = "[s] \"本当にありがとう、レナ。\""
1013802-92 = "その変な動き、やめて。"
1013802-93 = "というか、私なんもしてないんだけど。"
1013802-94 = "感謝するのは早いわよ。"
1013802-95 = "……はぁ。"
1013802-99 = "ほら、脱いで。"
1013802-100 = "[s] \"……ん？\" "
1013802-101 = "二度も言わせるつもり！？ "
1013802-102 = "早く脱ぎなさい！#n繕ってあげるから！"
1013802-103 = "[s] \"あっ、はいっ！！\""
1013802-106 = "（急いでこっそりズボンを脱ぎ、レナに渡した）"
1013802-107 = "（そうしてブランケットにくるまりながらレナが繕ってくれるのを眺める）"
1013802-109 = "へえ……テーブルを持ち上げようとしてこうなったってこと？"
1013802-110 = "ってかそれ、先生がやる必要ある？寮監隊の仕事でしょ？"
1013802-111 = "まったく、お人よしにも程があるっての。"
1013802-112 = "[s] \"それってつまり私のことが好きってこと！？\""
1013802-113 = "は、はあっ！？何言ってんの！？"
1013802-117 = "……あ。"
1013802-118 = "ちょ、ちょっと！間違えちゃったじゃん、もう！！"
1013802-119 = "仕事ばっか増やしてほんともう……。先輩たちと変わんないんだから。"
1013802-120 = "[s] \"つまり私も、大事な存在ってこと……？\""
1013802-121 = "……ポケット、全部縫いつけて塞いでいい？"
1013802-122 = "それが嫌なら、大人しくしててよね。"
1013802-123 = "針と糸を使ってる時は危ないんだから……もう。"
1013802-124 = "今から集中するから、静かに待っててよ！"
1013802-126 = "（レナの言う通り大人しく待つことにした）"
1013802-127 = "（……しばらくして）"
1013802-129 = "はい、できたよ。着てみて。"
1013802-136 = "着た？"
1013802-137 = "[s] \"はい、着たよ。\""
1013802-138 = "本当だよね？信じて大丈夫？"
1013802-139 = "[s] \"もちろん！\""
1013802-140 = "よ、よし。じゃあ信じるから。"
1013802-141 = "目開けるからね？"
1013802-142 = " ……。"
1013802-143 = "どう？動きやすい？"
1013802-144 = "[s] \"すごく楽になった！見て見て！\""
1013802-150 = "[ns] \"あ……。\""
1013802-153 = "あーっ、もうバカっっ！！"
1013802-154 = "そんなに動いたら破けるに決まってんじゃん！！"
1013802-155 = "脱いで！！ポケット塞がれたいの！？"
1013802-157 = "（……その後おとなしくレナにズボンを渡し、繕ってもらった）"
