[translation]
1013802-1 = "Tire isso rapidamente!"
1013802-2 = "(Comprei os materiais que Lena pediu e fui para a Wild Hunt Art Academy.)"
1013802-3 = "(...No entanto)"
1013802-5 = "Huh! ? O-o que você está fazendo! ?"
1013802-6 = "Colocando ketchup no macarrão...! ?"
1013802-7 = "Isso é delicioso, você gostaria de comê-lo?"
1013802-8 = "Isso é impossível... isso é um insulto à Caçada Selvagem! !"
1013802-9 = "Quero dizer...? O que é esse arroz?"
1013802-10 = "Ah, isso vai muito bem com molho de macarrão."
1013802-11 = "Gyaaaaah! ? ! ? não posso acreditar! ! Um duelo, um duelo!"
1013802-12 = "Ahahaha! Bom! Vamos mostrar!"
1013802-14 = "[ns] \"Hum... o que você está fazendo?\""
1013802-20 = "(Eu me envolvi em uma briga entre estudantes que passavam)"
1013802-26 = "Qual o sentido de brigar na frente do sensei? ?"
1013802-27 = "Mas esse cara... ele diz que come com molho de macarrão por cima do arroz! ?"
1013802-28 = "Você não teria adicionado água ao seu café expresso?"
1013802-29 = "O que...! ? Ei, leve os dois embora! !"
1013802-35 = "[ns] \"É um assunto delicado...\""
1013802-36 = "Ufa... A Paz na Caçada Selvagem agora está protegida."
1013802-37 = "Sensei, você está bem?"
1013802-38 = "[s] \"Uh, sim. Está tudo bem.\""
1013802-39 = "Isso seria ótimo."
1013802-40 = "Eu te mostrei um lugar feio. Eu lhes darei uma educação completa!"
1013802-41 = "Pessoal... vou te ensinar as regras da Caçada Selvagem!"
1013802-46 = "(Embora a luta tenha diminuído...)"
1013802-47 = "(O lugar permaneceu deserto)"
1013802-48 = "[ns] \"Talvez eu devesse colocar a mesa caída de volta...\""
1013802-50 = "(Quando me agacho para limpar a mesa...)"
1013802-54 = "[ns] \"...!?\""
1013802-55 = "(Minha bunda parece tão lisa!)"
1013802-56 = "(Eu nunca esperei que meu traje fosse rasgado em um lugar como este!?)"
1013802-57 = "[ns] \"O-o que devo fazer!? Se isso continuar, vou me tornar uma pessoa suspeita...!\""
1013802-58 = "(Minha cabeça fica completamente branca...)"
1013802-59 = "(Pense! Como escapar desta crise!!)"
1013802-60 = "...?"
1013802-61 = "sensei? O que você está fazendo aqui?"
1013802-64 = "[ns] \"...!!!\""
1013802-65 = "Mesmo tendo vindo para a academia, nunca vim! Eu procurei por isso!"
1013802-66 = "nem atendo o telefone...."
1013802-67 = "...Huh? o que aconteceu? Eu pareço pálido, no entanto. #nA postura também é... meio estranha."
1013802-68 = "……."
1013802-69 = "um! Você está escondendo alguma coisa?"
1013802-70 = "o que? O que está atrás de você? Mostre-me!"
1013802-71 = "[s] \"Não, não, isso é...!!\""
1013802-72 = "O que há de errado nisso?"
1013802-73 = "Se você está tentando pregar uma peça, acho que é grátis..."
1013802-77 = "……."
1013802-78 = "...! ?"
1013802-79 = "O que... por que isso aconteceu! !"
1013802-80 = "Se quebrar, é só dizer! !"
1013802-81 = "[s] \"E-eu estava prestes a dizer isso...!\""
1013802-82 = "Ah, já!"
1013802-83 = "Espere um minuto! Já volto...!"
1013802-88 = "(Lena enrolou o cobertor que havia trazido na cintura e foi para outro local)"
1013802-90 = "Ufa... está tudo bem aqui, certo?"
1013802-91 = "[s] \"Muito obrigado, Lena.\""
1013802-92 = "Pare esse movimento estranho."
1013802-93 = "Na verdade, eu não fiz nada."
1013802-94 = "É muito cedo para agradecer."
1013802-95 = "... Haa."
1013802-99 = "Aqui, tire isso."
1013802-100 = "[s] \"...Hmm?\""
1013802-101 = "Vou fazer você dizer isso duas vezes! ?"
1013802-102 = "Tire isso rapidamente! #nEu resolvo para você!"
1013802-103 = "[s] \"Ah, sim!!\""
1013802-106 = "(Ele rapidamente tirou as calças e as entregou para Lena.)"
1013802-107 = "(Ele então se enrola em um cobertor e observa Lena arrumar o cabelo.)"
1013802-109 = "Huh... você quer dizer que isso aconteceu quando você tentou levantar a mesa?"
1013802-110 = "Ou o sensei precisa fazer isso? Não é esse o trabalho do supervisor do dormitório?"
1013802-111 = "Há um certo limite para ser legal."
1013802-112 = "[s] \"Isso significa que você gosta de mim?\""
1013802-113 = "Ha, ha! ? O que você está falando? ?"
1013802-117 = "……um."
1013802-118 = "Ei, espere! Você já cometeu um erro! !"
1013802-119 = "É muito difícil aumentar minha carga de trabalho... Não sou diferente dos meus antecessores."
1013802-120 = "[s] \"Isso significa que também sou importante...?\""
1013802-121 = "...Posso costurar todos os bolsos fechados?"
1013802-122 = "Se você não gosta disso, fique quieto."
1013802-123 = "É perigoso usar agulha e linha..."
1013802-124 = "Vou me concentrar agora, então, por favor, espere em silêncio!"
1013802-126 = "(decidi esperar em silêncio como Lena disse)"
1013802-127 = "(...... depois de um tempo)"
1013802-129 = "Sim, eu fiz isso. Experimente."
1013802-136 = "Você usou?"
1013802-137 = "[s] \"Sim, coloquei.\""
1013802-138 = "Não é verdade? Está tudo bem em acreditar?\""
1013802-139 = "[s] \"Claro!\""
1013802-140 = "Ok, ok. Então eu acreditarei."
1013802-141 = "Você vai abrir os olhos?"
1013802-142 = "……."
1013802-143 = "cobre? É fácil se mover?"
1013802-144 = "[s] \"É muito mais fácil! Olha!\""
1013802-150 = "[ns] \"Ah...\""
1013802-153 = "Ah, você é um idiota! !"
1013802-154 = "Se se mover tanto, está fadado a quebrar! !"
1013802-155 = "Tire isso! ! Quero meus bolsos cobertos! ?"
1013802-157 = "(...Depois disso, ele humildemente entregou as calças para Lena e pediu para ela consertá-las.)"