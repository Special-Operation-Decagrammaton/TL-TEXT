[translation]
10044100-1 = "第10話;分からぬ世界で少女は笑う"
10044100-3 = "こんのガキどもが……！"
10044100-4 = "そ、総長……！もうダメかも！"
10044100-5 = "ち、ちくしょう……うちらの野望が……！！"
10044100-7 = "ククッ……これはこれは、賑やかな出迎えですね。"
10044100-10 = "こ、この声は――"
10044100-16 = "ハイランダー鉄道学園の皆さん、ご苦労様でした。"
10044100-17 = "ククッ、どうやら想定外のトラブルがあったようですな？"
10044100-18 = "依頼人！来ていたのか……！"
10044100-20 = "[ns] \"あ……。\""
10044100-22 = "あ、あなたが依頼人ですか……？"
10044100-23 = "ちょうどいいじゃん。さっさと書類にサインもらっちゃお！"
10044100-24 = "いやいやいや、待ってください！#n見るからに悪い人じゃないですか！"
10044100-25 = "それはそれー、これはこれー。"
10044100-27 = "ククッ……積荷を確認させてもらいましたが――"
10044100-28 = "品物には傷一つありませんでした。列車はひどい有様ですがね。"
10044100-29 = "ククッ、やはりハイランダーに任せて正解でしたなぁ。"
10044100-30 = "当然のことをしたまでさ。"
10044100-31 = "ククッ、流石です……。"
10044100-32 = "サインは……ああ、ここに。#nこれで、最後にあなた方がサインをすれば、依頼は完了です。"
10044100-33 = "皆さんは任務を終え、私は品物を受け取る。"
10044100-34 = "さあ、どうぞサインを。ククッ……。"
10044100-36 = "いいんですか！？本当に！？"
10044100-41 = "終わりー。"
10044100-42 = "任務完了～！"
10044100-44 = "ククッ、ククククッ……ガハハハッ！！"
10044100-45 = "この時をどれほど待ちわびたことか……！！"
10044100-46 = "せ、先生……本当によかったんでしょうか……。"
10044100-47 = "も、もう取り返しのつかないことに……！"
10044100-48 = "おや……？これはこれは……ククッ、先生ではありませんか。"
10044100-49 = "その節は大変お世話になりまして……ククッ！"
10044100-50 = "……え？"
10044100-51 = "[ns] \"お久しぶりです。奇遇ですね。\""
10044100-55 = "え、っと……。"
10044100-57 = "せ、先生の……お知り合いですか？"
10044100-58 = "[s1] \"社会福祉で有名な実業家の方だよ。\"\n[s2] \"奨学金にもたくさん援助してくれてるんだ。\""
10044100-64 = "……はい？？"
10044100-66 = "ククッ、そのように紹介されると気恥ずかしいですな。#n私はただ小さなビジネスをいくつか経営しているだけですから……。"
10044100-67 = "僅かばかりでも生徒の役に立てれば、と。ククッ……！！"
10044100-68 = "って、なんで誤解されるような喋り方してるんですか！勘違いしましたけど！？"
10044100-69 = "ああ、何故かよく言われますが――"
10044100-70 = "私には皆目見当もつきませんなぁ。ガハハハッ！！"
10044100-71 = "そ、その笑い方も原因の一つだと思うんですけど……！"
10044100-72 = "なんにせよ、無事に運んでくださった皆さんに感謝を。"
10044100-73 = "これが無ければ始まらないもので。"
10044100-74 = "おかげで、行事を滞りなく進められます。"
10044100-75 = "行事？これって何に使うの？"
10044100-76 = "ククッ、それはですな――"
10044100-77 = "「チャリティーオークション」というのを、ご存知でしょうか？"
10044100-78 = "知らなーい。"
10044100-79 = "慈善活動の一環として開催される貴重品のオークションでして。"
10044100-80 = "生じた収益は、公正なルートを経て、生徒の奨学金給付などに使われるのです。"
10044100-81 = "こういった美術品やら骨董品は、資産家らに大変人気がありましてな。"
10044100-82 = "資金集めの種にうってつけという訳ですよ。ククッ……。"
10044100-83 = "社会貢献できる上に、節税効果もある。"
10044100-84 = "ククッ、まさに一石二鳥ではありませんか！ガハハハッ！！"
10044100-86 = "だから、その喋り方なんとかしてほしいんですけど！？"
10044100-88 = "さて。キヴォトス・トランスポーター連盟……略して、ブロロロ疾走連合の皆さん？"
10044100-89 = "その呼び名、付き合ってあげるんだ……。"
10044100-90 = "うっ……。"
10044100-91 = "クククッ……。こうもトラブル続きでは――"
10044100-92 = "信頼関係を築き直す必要がありそうですね。ククッ……。"
10044100-93 = "さ、先に裏切ったのはお前のはずだ！"
10044100-94 = "そもそも、その荷物だって最初はうちらに任せるって話だったろ？"
10044100-95 = "それは……あなた方のサービスの質が悪いからでしょう……？"
10044100-96 = "昨日、私はお寿司を注文したはずですが……#nシャリとネタがバラバラになって、もはや海鮮丼になってましたからねぇ。"
10044100-98 = "うわ、ひっど。"
10044100-100 = "くっ……そ、それは……。"
10044100-101 = "そんなあなた方に、貴重品の輸送を任せられると本気でお考えで？"
10044100-102 = "で、でも、うちらはスピードが命なんだ！"
10044100-103 = "ええ。あなた方の強みは存じていますとも。"
10044100-104 = "ですから……ククッ、その長所を最大限活かせるよう、私がサポートして差し上げましょう。"
10044100-105 = "ほ、本当か！？"
10044100-106 = "ただし！それは、これまでのことを償ってからの話です。"
10044100-107 = "そ、それは……まだうちらにチャンスをくれるのか……？"
10044100-111 = "……分かった。できる限りの弁償をしよう。"
10044100-112 = "それから……初心に戻って一からやり直す。"
10044100-113 = "今度こそ、プロの配達屋として、誠実に働いてみせるから。"
10044100-115 = "そ、総長……。"
10044100-117 = "……夢を諦めるつもりじゃねぇよ。ただちょっとだけ、ゆっくり歩くのさ。"
10044100-118 = "お前らと一緒なら、できるはずだからな。"
10044100-120 = "総長……。"
10044100-122 = "あ、あの……いい話っぽいですけど……そんなことないですからね？"
10044100-123 = "くっ……！"
10044100-124 = "あ、ああ……そうだったな。#n一週間使える送料無料クーポンを受け取ってくれ。"
10044100-125 = "い、要らないんですけど……！"
10044100-126 = "い、一枚じゃ足りないか……？#nそ、それなら……に、二枚で……！"
10044100-128 = "今度こそ任務完了だね。"
10044100-129 = "ガスけつーはらへりー。"
10044100-131 = "[ns] \"みんな、本当にお疲れ様。\""
10044100-132 = "先生もお疲れ様ー、よしよしー。"
10044100-133 = "パヒャヒャッ！今回は結構楽しめたかな。"
10044100-134 = "先生、また呼んでもいいよね？"
10044100-136 = "ちょ、ちょっと……少しは遠慮というものを……。"
10044100-137 = "[ns3] \"いつでもどうぞ。\"\n[ns4] \"生徒の頼みに応えるのが先生だからね。\""
10044100-140 = "……え、えぇ？"
10044100-144 = "じゃ、じゃあ……。"
10044100-145 = "わ、私が呼んでも……来て、くれますか……？"
10044100-146 = "[s] \"もちろん。\""
10044100-147 = "……。"
10044100-148 = "はぁ……だ、ダメだって分かってるのに……。"
10044100-149 = "こ、こんなの、期待しちゃうじゃないですかぁ……。"
10044100-150 = "あ、そうだ。任務の報告書をまとめないと……。"
10044100-151 = "先生ーヘルプミー。"
10044100-152 = "[s] \"うっ、書類仕事……。\""
10044100-153 = "せっかくだし、シャーレでやるのはどう？"
10044100-154 = "パヒャヒャッ！いいじゃん！ヒカリ、行くよ！"
10044100-155 = "しゅっぱーつ。"
10044100-157 = "こ、これで任務完了、ですよね……？"
10044100-158 = "うん！最後のサインまでもらったし！#nまぁ、報告書は作んないとだけど……。"
10044100-160 = "ふぅ……本当に長い一日でした。"
10044100-161 = "……お二人も、お疲れ様でした。#n幹部のこと、現場の敵だって思ってたんですけど――"
10044100-162 = "責任感、ちゃんとあるんですね。#nちょっとだけ見直しました。ほんのちょっとだけ、ですけど……。"
10044100-163 = "んー？もっと大きな声で言ってー？"
10044100-164 = "な、なんでもないんですけど……！"
10044100-165 = "も、もちろん変な幹部も多いですし？#n幹部はやっぱり幹部だと思ってますけど……。"
10044100-166 = "それ褒めてんの？"
10044100-167 = "ま、まぁ……私なりに……。"
10044100-168 = "パヒャヒャッ！まっ、そういうことにしとこっか。"
10044100-169 = "アオバ、かっこよかったー。"
10044100-170 = "摩擦係数オーバードライブまたやろうねー。"
10044100-171 = "も、もうやりたくないんですけど……。"
10044100-172 = "じゃ、じゃあ、私は寮に戻りますね……では……。"
10044100-177 = "一緒に来ないの？"
10044100-179 = "え、わ、私もですか……？"
10044100-181 = "ワンチームー。"
10044100-183 = "で、でも任務は終わりましたし……。"
10044100-184 = "遠足は帰るまでが遠足、って言うっしょ？"
10044100-185 = "それは、どういう……。"
10044100-188 = "[ns] \"みんなで夜ご飯食べに行こっか。\""
10044100-189 = "い、いいんですか？一緒に行っても……。"
10044100-190 = "「みんなで」だよー？"
10044100-191 = "パヒャヒャッ！行こ行こ！好きなもん全部頼んでいい？"
10044100-192 = "え、遠慮って知ってます……？"
10044100-193 = "使える時に使うのがー先生チャンスー。"
10044100-194 = "うぅ、褒めたそばからこれですか……。"
10044100-195 = "[ns] \"ははっ……今日もお疲れ様！\""
10044100-198 = "ハイランダー鉄道爆走事件〜そして列車はなくなった〜"
