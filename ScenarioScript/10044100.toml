[translation]
10044100-1 = "Episódio 10: A garota sorri em um mundo que não compreende"
10044100-3 = "Seus pirralhos...!"
10044100-4 = "Ch-Chefe...! Acho que não vamos conseguir!"
10044100-5 = "D-Droga... nossa ambição..."
10044100-7 = "Hehe... Ora, ora, que recepção animada."
10044100-10 = "E-Essa voz..."
10044100-16 = "Pessoal da Academia Ferroviária Highlander, obrigado pelo trabalho duro."
10044100-17 = "Hehe, parece que houve alguns problemas inesperados, não é?"
10044100-18 = "Cliente! Você veio...!"
10044100-20 = "[ns] \"Ah...\""
10044100-22 = "V-Você é o cliente...?"
10044100-23 = "Isso é perfeito. Vamos logo pegar a assinatura nos documentos!"
10044100-24 = "Não, não, não, espere!#nEle não parece ser uma pessoa boa!"
10044100-25 = "Uma coisa é uma coisa, outra coisa é outra coisa."
10044100-27 = "Hehe... Dei uma olhada na carga, mas..."
10044100-28 = "Não havia um arranhão sequer na mercadoria. Embora o trem esteja em um estado deplorável."
10044100-29 = "Hehe, como esperado, foi a decisão certa confiar na Highlander."
10044100-30 = "Apenas fizemos o nosso trabalho."
10044100-31 = "Hehe, impressionante..."
10044100-32 = "A assinatura... ah, aqui.#nCom isso, se vocês assinarem agora, a missão estará concluída."
10044100-33 = "Vocês terminaram a missão e eu recebo a mercadoria."
10044100-34 = "Vamos, assinem aqui. Hehe..."
10044100-36 = "Tudo bem mesmo!? Sério!?"
10044100-41 = "Acabou."
10044100-42 = "Missão cumprida~!"
10044100-44 = "Hehe, hehehehe... Hahahaha!!"
10044100-45 = "O quanto eu esperei por este momento...!!"
10044100-46 = "S-Sensei... será que isso foi realmente certo..."
10044100-47 = "I-Isso não tem mais volta...!"
10044100-48 = "Oh...? Ora, ora... Hehe, não é o Sensei?"
10044100-49 = "Agradeço muito pela ajuda daquela vez... Hehe!"
10044100-50 = "...Eh?"
10044100-51 = "[ns] \"Há quanto tempo. Que coincidência.\""
10044100-55 = "E-Err..."
10044100-57 = "V-Você é... conhecido do Sensei?"
10044100-58 = "[s1] \"Ele é um empresário famoso pelo trabalho social.\"\n[s2] \"Ele também contribui muito para bolsas de estudo.\""
10044100-64 = "...Oi??"
10044100-66 = "Hehe, fico sem jeito sendo apresentado assim.#nEu apenas gerencio alguns pequenos negócios..."
10044100-67 = "Espero que isso possa ser útil para os alunos, mesmo que um pouco. Hehe...!!"
10044100-68 = "Espera, por que você está falando de um jeito que causa mal-entendidos! Eu entendi errado!"
10044100-69 = "Ah, dizem isso muito por algum motivo, mas..."
10044100-70 = "Eu não faço a menor ideia do porquê. Hahahaha!!"
10044100-71 = "E-Eu acho que esse seu jeito de rir é uma das causas..."
10044100-72 = "De qualquer forma, agradeço a todos por transportarem tudo em segurança."
10044100-73 = "Sem isso, nada poderia começar."
10044100-74 = "Graças a vocês, o evento poderá prosseguir sem problemas."
10044100-75 = "Evento? Para que isso vai ser usado?"
10044100-76 = "Hehe, é que..."
10044100-77 = "Vocês conhecem o \"Leilão de Caridade\"?"
10044100-78 = "Não conheço."
10044100-79 = "É um leilão de itens valiosos realizado como parte de nossas atividades de caridade."
10044100-80 = "Os lucros obtidos são destinados, através de canais justos, a bolsas de estudo para os alunos."
10044100-81 = "Essas obras de arte e antiguidades são extremamente populares entre os investidores, sabe."
10044100-82 = "É a oportunidade perfeita para arrecadar fundos. Hehehe..."
10044100-83 = "Além de contribuir com a sociedade, também traz benefícios fiscais."
10044100-84 = "Hehehe, não é como matar dois coelhos com uma cajadada só? Hahahaha!!"
10044100-86 = "Dá para parar de falar desse jeito, por favor!?"
10044100-88 = "Bem. Federação de Transportadores de Kivotos... ou, abreviando, pessoal da União de Velocidade Vrum-Vrum?"
10044100-89 = "Você realmente vai entrar na onda desse nome..."
10044100-90 = "Ugh..."
10044100-91 = "Hehehe... Com tantos problemas acontecendo um atrás do outro—"
10044100-92 = "Parece que precisamos reconstruir nossa relação de confiança. Hehehe..."
10044100-93 = "V-você foi quem nos traiu primeiro!"
10044100-94 = "Para começo de conversa, não era para a gente ficar responsável por essa carga desde o início?"
10044100-95 = "Isso é... porque a qualidade do serviço de vocês é péssima, não é...?"
10044100-96 = "Ontem, eu pedi um sushi... mas o arroz e o peixe estavam todos separados, parecia mais uma tigela de sashimi."
10044100-98 = "Nossa, que horror."
10044100-100 = "Droga... i-isso é..."
10044100-101 = "Vocês realmente acham que eu confiaria o transporte de itens valiosos a pessoas assim?"
10044100-102 = "M-mas a nossa prioridade é a velocidade!"
10044100-103 = "Sim. Eu conheço bem os pontos fortes de vocês."
10044100-104 = "Por isso... hehehe, eu vou dar o suporte necessário para que vocês possam aproveitar ao máximo essas qualidades."
10044100-105 = "S-sério mesmo!?"
10044100-106 = "No entanto! Isso só acontecerá depois que vocês compensarem pelo que fizeram até agora."
10044100-107 = "I-isso é... você ainda vai nos dar uma chance...?"
10044100-111 = "...Entendido. Vamos fazer o possível para compensar os danos."
10044100-112 = "E também... vamos voltar ao básico e recomeçar do zero."
10044100-113 = "Desta vez, como entregadores profissionais, vamos trabalhar com sinceridade."
10044100-115 = "C-chefe..."
10044100-117 = "...Não pretendo desistir dos meus sonhos. Só vou caminhar um pouco mais devagar, por enquanto."
10044100-118 = "Se for com vocês, eu sei que conseguiremos."
10044100-120 = "Chefe..."
10044100-122 = "A-ah... parece uma história bonita, mas... não é bem assim, sabe?"
10044100-123 = "Droga...!"
10044100-124 = "A-ah... é verdade. #nAceitem este cupom de frete grátis válido por uma semana."
10044100-125 = "E-eu não quero isso...!"
10044100-126 = "U-um não é o suficiente...? #nE-então... d-dois...!"
10044100-128 = "Missão cumprida, finalmente."
10044100-129 = "Sem gasolina e com fome."
10044100-131 = "[ns] \"Pessoal, muito obrigado pelo trabalho duro.\""
10044100-132 = "Obrigado pelo trabalho duro também, Sensei, bom trabalho, bom trabalho."
10044100-133 = "Pahyahya! Desta vez foi bem divertido."
10044100-134 = "Sensei, podemos te chamar de novo, né?"
10044100-136 = "Ei, espera... tenha um pouco de bom senso..."
10044100-137 = "[ns3] \"Sempre que quiserem.\"\n[ns4] \"Afinal, o papel do Sensei é atender aos pedidos dos alunos.\""
10044100-140 = "...H-hã?"
10044100-144 = "E-então..."
10044100-145 = "S-se eu te chamar... você... viria me ver...?"
10044100-146 = "[s] \"Com certeza.\""
10044100-147 = "..."
10044100-148 = "Ah... eu sei que não deveria..."
10044100-149 = "I-isso... acaba me dando esperanças, não é?..."
10044100-150 = "Ah, é verdade. Preciso terminar o relatório da missão..."
10044100-151 = "Sensei, help me."
10044100-152 = "[s] \"Ugh, papelada...\""
10044100-153 = "Já que estamos nisso, que tal fazermos no Schale?"
10044100-154 = "Pahyahya! Boa ideia! Hikari, vamos lá!"
10044100-155 = "Partiu."
10044100-157 = "C-com isso a missão está concluída, certo?..."
10044100-158 = "Sim! Até conseguimos a última assinatura! #nBem, ainda preciso fazer o relatório..."
10044100-160 = "Ufa... foi um dia realmente longo."
10044100-161 = "...Vocês duas também, bom trabalho. #nEu achava que os executivos eram apenas inimigos no campo de batalha, mas..."
10044100-162 = "Vocês realmente têm senso de responsabilidade. #nMudei um pouco a minha opinião sobre vocês. Só um pouquinho, claro..."
10044100-163 = "Hmm? Pode falar mais alto?"
10044100-164 = "N-não é nada, esquece...!"
10044100-165 = "C-claro, ainda tem muitos executivos estranhos, né? #nAinda acho que executivo é executivo..."
10044100-166 = "Isso foi um elogio?"
10044100-167 = "B-bem... do meu jeito..."
10044100-168 = "Pahyahya! Bem, vamos deixar por isso mesmo."
10044100-169 = "Aoba, você foi incrível."
10044100-170 = "Vamos fazer o 'Overdrive de Coeficiente de Atrito' de novo, hein."
10044100-171 = "E-eu não quero fazer isso de novo..."
10044100-172 = "B-bem, então eu vou voltar para o dormitório... até mais..."
10044100-177 = "Não quer vir junto?"
10044100-179 = "Eh, e-eu também?..."
10044100-181 = "Um time."
10044100-183 = "M-mas a missão já acabou..."
10044100-184 = "Não dizem que o passeio só acaba quando você chega em casa?"
10044100-185 = "O que isso quer dizer..."
10044100-188 = "[ns] \"Vamos todos jantar juntos.\""
10044100-189 = "S-sério? Posso ir com vocês?..."
10044100-190 = "Eu disse \"todos\", não disse?"
10044100-191 = "Pahyahya! Vamos, vamos! Posso pedir tudo o que eu quiser?"
10044100-192 = "Eh, você conhece a palavra 'moderação'?..."
10044100-193 = "Aproveitar a oportunidade quando ela aparece é o 'Sensei Chance'."
10044100-194 = "Ugh, acabei de elogiar e você já vem com isso..."
10044100-195 = "[ns] \"Haha... bom trabalho hoje também!\""
10044100-198 = "O Incidente do Trem de Alta Velocidade Highlander ~E então o trem desapareceu~"
