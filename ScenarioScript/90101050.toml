[translation]
90101050-1 = "Episode 5: A Record of a Certain Mystery"
90101050-2 = "Shiratori Ward, 3rd District Library Reading Room"
90101050-5 = "Excuse me, I'm looking for a compilation of articles..."
90101050-6 = "It appears that the records for the morning edition dated O/O are missing."
90101050-7 = "Oh? Huh? That's strange... I compile them every morning, so there shouldn't be any gaps..."
90101050-8 = "Oh, wait, I remember now!"
90101050-9 = "There was a day when someone from the newspaper company came to collect them, saying there was an error in the reporting."
90101050-10 = "Perhaps that's the day that's missing. #nIt's rare for them to recall an entire issue, though..."
90101050-11 = "I see... Do you happen to know what the article in question was about?"
90101050-12 = "I'm sorry... I make the scrapbooks, but I don't really remember the contents."
90101050-13 = "I understand. Thank you."
90101050-20 = "(...There is no doubt that there was information suppression.)"
90101050-21 = "(That is precisely why, when a mystery in the form of a strange bird mascot appeared—most people dismissed it as just a rumor.)"
90101050-22 = "(I thought so myself, but...)"
90101050-24 = "Um, so... to summarize what you told me, Sensei."
90101050-25 = "A limited-edition plushie named 'Perorozilla' manifested into reality due to the fans' wishes... #nAnd then, it headed toward D.U.?"
90101050-26 = "And you defeated it in cooperation with Valkyrie?"
90101050-27 = "Come to think of it, I recall seeing a report from the Valkyrie Police Academy that mentioned a large-scale deployment of their security forces."
90101050-29 = "(It is a fact that the monster that appeared that day attacked the coast. Sensei's testimony confirms it.)"
90101050-30 = "(What bothers me is... the fact that the monster looked like such a goofy bird.)"
90101050-31 = "(If it were to become an urban legend among the citizens, wouldn't it have a more terrifying appearance?)"
90101050-32 = "(A plushie that was only a topic among enthusiasts tried to cause a major disaster in D.U...?)"
90101050-36 = "...I don't understand."
90101050-37 = "(I'll look into the plushie and the information from that time.)"
90101050-38 = "(But there is absolutely no information left on social media or in the newspapers...)"
90101050-39 = "Are you looking for a book?"
90101050-43 = "No, not a book..."
90101050-44 = "If there is information you are looking for, I can help you. #nHelping those who seek knowledge is the job of us librarians."
90101050-46 = "Even for things that aren't left here..."
90101050-50 = "They might be in our library."
90101050-51 = "'Our' library...?"
90101050-52 = "Oh, excuse my late introduction. #nMy name is Shimiko Endou."
90101050-53 = "I belong to the Trinity Library Committee. #nI'm here today for the book exchange event."
90101050-54 = "Is there anything I can help you with?"
90101050-55 = "No, it's material that is no longer available."
90101050-56 = "It's a newspaper article from O/O. #nIt seems the newspaper company recalled it, and it's nowhere to be found..."
90101050-57 = "A recalled article from O/O..."
90101050-58 = "Could it be... the one about 'an unidentified monster appearing on the D.U. coast'?"
90101050-62 = "That's it. You know about it?"
90101050-63 = "Yes. I remember the general content of the article."
90101050-64 = "The reporter was a fisherman who was nearby. #nHe witnessed a giant shadow moving at high speed underwater and contacted the Port Management Office."
90101050-65 = "He said it was as big as a whale and as fast as a marlin..."
90101050-67 = "The Valkyrie Marine Police succeeded in returning the monster to the sea, but... #nIt seems the damage was immense, with multiple helicopters being destroyed."
90101050-68 = "The monster closely resembled 'Perorozilla,' a plushie made by the 'Momo Friends' company. #nJust like in the movie released last year, it fired a flash from its eyes—"
90101050-69 = "The plushie in question is apparently difficult to obtain now."
90101050-71 = "Thank you. That was a big help."
90101050-72 = "...I never expected to run into a librarian who remembers the contents of that article."
90101050-73 = "Do you remember everything you read in the newspapers...?"
90101050-74 = "Ahaha, no! It was just an interesting article, so I happened to remember it."
90101050-75 = "I also remembered it because the Vice Chair, whom I don't interact with much, suddenly asked me about it."
90101050-76 = "...Judging by what you've said, the origin of 'Perorozilla' is quite ordinary."
90101050-77 = "...Ordinary?"
90101050-78 = "I heard that the origin of the urban legend that became a hot topic online was in a local newspaper, so I was investigating it, but..."
90101050-79 = "To think that what was actually written in the article was just a monster movie story and a notice about the plushie being discontinued."
90101050-80 = "...Can you really say that's all there is to it?"
90101050-81 = "...Are you saying there is still something else that hasn't been revealed?"
90101050-82 = "No, rather than that..."
90101050-83 = "A monster movie and a plushie. To some, that in itself might not be 'ordinary'."
90101050-84 = "The tales of knights and dragons I read when I was young—at the time, I believed they were events that had actually happened somewhere."
90101050-85 = "As I grew up, I came to understand that they were just stories, but... #nWhile I was reading the books, I felt as if I had stepped into the world of the story."
90101050-86 = "Therefore, the plushie and the monster movie stories... #nTo someone, they might have been a world that truly existed."
90101050-87 = "I think urban legends are called legends precisely because they cannot be understood."
90101050-92 = "...That might be true."
90101050-93 = "If lore can be born from emotions other than fear... then that is certainly true."
90101050-94 = "Are there any other books you are looking for?"
90101050-95 = "If not, I'll be going now—"
90101050-96 = "Um, could I ask you one favor?"
90101050-97 = "Could you tell me about a work you've encountered recently that you'd recommend?"
90101050-98 = "A recommended work? #nHmm... it's hard to pick just one."
90101050-99 = "Well... if I had to pick a work I was very absorbed in..."
90101050-103 = "—Do you know of 'Magical Girl Heavy Caliber'?"
90101050-105 = "Next Episode: People of the Port (2)"