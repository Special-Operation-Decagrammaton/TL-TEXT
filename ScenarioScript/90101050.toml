[translation]#[Texto Final. - Filipe 05/07.]
90101050-1 = "Episódio 5: Registros de uma Anomalia"
90101050-2 = "Distrito de Shiratori - Sala de Leitura da 3ª Biblioteca Distrital"
90101050-5 = "Com licença, estou procurando a compilação\nde artigos……"
90101050-6 = "Parece que o registro da edição matutina\nde XX/XX está faltando."
90101050-7 = "Hã? Ué? Que estranho…… eu compilo toda\nmanhã, não deveria faltar nada……"
90101050-8 = "Ah, desculpa, lembrei!"
90101050-9 = "Teve um dia em que o pessoal do jornal veio\nrecolher a edição: \"erro na reportagem\",\ndisseram."
90101050-10 = "Deve ser esse dia que está faltando.#nRecolherem a edição inteira é raro……"
90101050-11 = "Entendo…… a senhorita sabe qual era\no conteúdo da matéria?"
90101050-12 = "Me desculpe…… eu faço os recortes,\nmas não decoro o conteúdo."
90101050-13 = "Compreendo. Obrigada."
90101050-20 = "(……Não há dúvida de que houve\ncensura de informação)"
90101050-21 = "(Por isso, quando surgiu a assombração com\nforma de mascote de passarinho―― a maioria\ntratou como mero boato)"
90101050-22 = "(Eu mesma pensava assim, mas……)"
90101050-24 = "Então, resumindo…… o que o Sensei contou."
90101050-25 = "Uma pelúcia de edição limitada chamada\n\"Perorodzilla\" ganhou vida pelo desejo\ndos fãs……#ne marchou pra cima de D.U.?"
90101050-26 = "E vocês derrotaram ela junto\ncom a Valkyrie?"
90101050-27 = "Agora que falou, no relatório do\nDepartamento de Segurança da Valkyrie\nque vi havia registro de uma\nmobilização enorme."
90101050-29 = "(O ataque do monstro ao litoral naquele dia\né fato. Há o testemunho do Sensei.)"
90101050-30 = "(O que me intriga é…… o monstro ter a forma\nde um passarinho completamente pateta)"
90101050-31 = "(Se vira lenda urbana entre os cidadãos,\nnão deveria ter uma aparência\naterrorizante?)"
90101050-32 = "(Uma pelúcia que só era assunto entre\ncolecionadores quase causou um desastre\nem D.U.……?)"
90101050-36 = "……Não consigo compreender."
90101050-37 = "(Vou atrás da pelúcia e das informações\nda época)"
90101050-38 = "(Mas não sobrou nada: nem nas redes\nsociais, nem nos jornais……)"
90101050-39 = "Procurando um livro?"
90101050-43 = "Não, não é um livro……"
90101050-44 = "Se procura alguma informação,\nposso ajudar.#nAjudar quem busca conhecimento também\né trabalho das bibliotecárias."
90101050-46 = "Mesmo algo que não restou aqui……"
90101050-50 = "pode ser que exista na nossa biblioteca."
90101050-51 = "\"Nossa\"……?"
90101050-52 = "Ah, esqueci de me apresentar.#nMeu nome é Endou Shimiko."
90101050-53 = "Sou do Comitê da Biblioteca de Trinity.#nVim para a feira de troca de livros\nde hoje."
90101050-54 = "Posso ajudar em algo?"
90101050-55 = "Não, é um material impossível\nde se obter."
90101050-56 = "Uma matéria de jornal de XX/XX.#nO próprio jornal recolheu a edição;\nnão há cópia em lugar nenhum……"
90101050-57 = "A matéria recolhida de XX/XX……"
90101050-58 = "Por acaso…… é aquela sobre \"o monstro não\nidentificado que surgiu no litoral\nde D.U.\"?"
90101050-62 = "Essa mesma. Você a conhece?"
90101050-63 = "Sim. Lembro do conteúdo geral da matéria."
90101050-64 = "Quem denunciou foi um pescador da região.#nEle viu uma sombra gigante em alta\nvelocidade debaixo d'água e avisou o\nEscritório de Administração Portuária."
90101050-65 = "Nas palavras dele: uma sombra grande como\numa baleia e veloz como um marlim……"
90101050-67 = "A polícia marítima da Valkyrie conseguiu\ndevolver o monstro ao mar, mas……#nvários helicópteros foram destruídos;\no prejuízo foi enorme."
90101050-68 = "O monstro era idêntico ao \"Perorodzilla\",\na pelúcia da MomoFriends.#nComo no filme lançado ano passado,\ndos olhos saíam raios――"
90101050-69 = "E a pelúcia em questão está em falta\naté hoje."
90101050-71 = "Obrigada. Você me ajudou muito."
90101050-72 = "……Encontrar por acaso uma bibliotecária\nque lembra o conteúdo da matéria."
90101050-73 = "Você memoriza tudo o que lê\nnos jornais……?"
90101050-74 = "Ahaha, não! Foi só porque a matéria\nera interessante, coincidência."
90101050-75 = "E a vice-presidente do comitê, com quem eu\nquase não convivia, tinha me pedido isso\ndo nada; por isso ficou na memória."
90101050-76 = "……Pelo que você conta, a origem do\n\"Perorodzilla\" é bem normal, não é?"
90101050-77 = "……NORMAL, você diz?"
90101050-78 = "Soube que a origem dessa lenda urbana\nfamosa da internet estava num jornal local,\ne vim pesquisar……"
90101050-79 = "No fim, o que havia na matéria era só uma\nhistória digna de filme de monstro e o\naviso de fim de produção da pelúcia."
90101050-80 = "……Será que dá pra dizer que era\n\"só\" isso?"
90101050-81 = "……Está dizendo que ainda existe algo\nnão revelado?"
90101050-82 = "Não, é mais que……"
90101050-83 = "Um filme de monstro e uma pelúcia. Isso,\npor si só, talvez não seja NORMAL\npara alguém."
90101050-84 = "A aventura do cavaleiro e do dragão que li\nna infância―― na época, eu acreditava que\ntinha acontecido de verdade em algum lugar."
90101050-85 = "Crescendo, entendi que era coisa\nde história……#nMas, enquanto lia, era como se eu entrasse\nno mundo do livro."
90101050-86 = "Por isso, tanto a pelúcia quanto a história\nde filme de monstro……#npodem ter sido, para alguém,\num mundo que existe."
90101050-87 = "A lenda urbana…… é chamada de lenda\njustamente porque não se compreende.\nÉ o que eu acho."
90101050-92 = "……Talvez você tenha razão."
90101050-93 = "Se um Lore pode nascer de outras emoções\nalém do medo…… realmente."
90101050-94 = "Procura mais algum livro?"
90101050-95 = "Se não, eu já vou indo――"
90101050-96 = "Espere. Posso pedir uma coisa?"
90101050-97 = "Me indique uma obra que você tenha lido\nrecentemente e recomende."
90101050-98 = "Uma recomendação?#nHmm…… escolher só uma é difícil."
90101050-99 = "Deixe-me ver…… uma obra que me\nprendeu de verdade……"
90101050-103 = "――Você conhece 'A Garota Mágica\nHeavy Caliber'?"
90101050-105 = "Próximo Episódio: O Povo do Porto (2)"
