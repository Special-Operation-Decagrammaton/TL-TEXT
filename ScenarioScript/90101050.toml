[translation]#[Texto Final. - Filipe 05/07.]
90101050-1 = "Episódio 5; Registros de uma Anomalia"
90101050-2 = "Distrito de Shiratori - Sala de Leitura da 3ª Biblioteca Distrital"
90101050-5 = "Com licença, estou procurando a compilação de artigos……"
90101050-6 = "Parece que o registro da edição matutina de XX/XX está faltando."
90101050-7 = "Hã? Ué? Que estranho…… eu compilo toda manhã, não deveria faltar nada……"
90101050-8 = "Ah, desculpa, lembrei!"
90101050-9 = "Teve um dia em que o pessoal do jornal veio recolher a edição: \"erro na reportagem\", disseram."
90101050-10 = "Deve ser esse dia que está faltando.#nRecolherem a edição inteira é raro……"
90101050-11 = "Entendo…… a senhorita sabe qual era o conteúdo da matéria?"
90101050-12 = "Me desculpe…… eu faço os recortes, mas não decoro o conteúdo."
90101050-13 = "Compreendo. Obrigada."
90101050-20 = "(……Não há dúvida de que houve censura de informação)"
90101050-21 = "(Por isso, quando surgiu a assombração com forma de mascote de passarinho―― a maioria tratou como mero boato)"
90101050-22 = "(Eu mesma pensava assim, mas……)"
90101050-24 = "Então, resumindo…… o que o Sensei contou."
90101050-25 = "Uma pelúcia de edição limitada chamada \"Perorodzilla\" ganhou vida pelo desejo dos fãs……#ne marchou pra cima de D.U.?"
90101050-26 = "E vocês derrotaram ela junto com a Valkyrie?"
90101050-27 = "Agora que falou, no relatório do Departamento de Segurança da Valkyrie que vi havia registro de uma mobilização enorme."
90101050-29 = "(O ataque do monstro ao litoral naquele dia é fato. Há o testemunho do Sensei.)"
90101050-30 = "(O que me intriga é…… o monstro ter a forma de um passarinho completamente pateta)"
90101050-31 = "(Se vira lenda urbana entre os cidadãos, não deveria ter uma aparência aterrorizante?)"
90101050-32 = "(Uma pelúcia que só era assunto entre colecionadores quase causou um desastre em D.U.……?)"
90101050-36 = "……Não consigo compreender."
90101050-37 = "(Vou atrás da pelúcia e das informações da época)"
90101050-38 = "(Mas não sobrou nada: nem nas redes sociais, nem nos jornais……)"
90101050-39 = "Procurando um livro?"
90101050-43 = "Não, não é um livro……"
90101050-44 = "Se procura alguma informação, posso ajudar.#nAjudar quem busca conhecimento também é trabalho das bibliotecárias."
90101050-46 = "Mesmo algo que não restou aqui……"
90101050-50 = "pode ser que exista na nossa biblioteca."
90101050-51 = "\"Nossa\"……?"
90101050-52 = "Ah, esqueci de me apresentar.#nMeu nome é Endo Shimiko."
90101050-53 = "Sou do Comitê da Biblioteca de Trinity.#nVim para a feira de troca de livros de hoje."
90101050-54 = "Posso ajudar em algo?"
90101050-55 = "Não, é um material impossível de se obter."
90101050-56 = "Uma matéria de jornal de XX/XX.#nO próprio jornal recolheu a edição; não há cópia em lugar nenhum……"
90101050-57 = "A matéria recolhida de XX/XX……"
90101050-58 = "Por acaso…… é aquela sobre \"o monstro não identificado que surgiu no litoral de D.U.\"?"
90101050-62 = "Essa mesma. Você a conhece?"
90101050-63 = "Sim. Lembro do conteúdo geral da matéria."
90101050-64 = "Quem denunciou foi um pescador da região.#nEle viu uma sombra gigante em alta velocidade debaixo d'água e avisou o Escritório de Administração Portuária."
90101050-65 = "Nas palavras dele: uma sombra grande como uma baleia e veloz como um marlim……"
90101050-67 = "A polícia marítima da Valkyrie conseguiu devolver o monstro ao mar, mas……#nvários helicópteros foram destruídos; o prejuízo foi enorme."
90101050-68 = "O monstro era idêntico ao \"Perorodzilla\", a pelúcia da MomoFriends.#nComo no filme lançado ano passado, dos olhos saíam raios――"
90101050-69 = "E a pelúcia em questão está em falta até hoje."
90101050-71 = "Obrigada. Você me ajudou muito."
90101050-72 = "……Encontrar por acaso uma bibliotecária que lembra o conteúdo da matéria."
90101050-73 = "Você memoriza tudo o que lê nos jornais……?"
90101050-74 = "Ahaha, não! Foi só porque a matéria era interessante, coincidência."
90101050-75 = "E a vice-presidente do comitê, com quem eu quase não convivia, tinha me pedido isso do nada; por isso ficou na memória."
90101050-76 = "……Pelo que você conta, a origem do \"Perorodzilla\" é bem normal, não é?"
90101050-77 = "……NORMAL, você diz?"
90101050-78 = "Soube que a origem dessa lenda urbana famosa da internet estava num jornal local, e vim pesquisar……"
90101050-79 = "No fim, o que havia na matéria era só uma história digna de filme de monstro e o aviso de fim de produção da pelúcia."
90101050-80 = "……Será que dá pra dizer que era \"só\" isso?"
90101050-81 = "……Está dizendo que ainda existe algo não revelado?"
90101050-82 = "Não, é mais que……"
90101050-83 = "Um filme de monstro e uma pelúcia. Isso, por si só, talvez não seja NORMAL para alguém."
90101050-84 = "A aventura do cavaleiro e do dragão que li na infância―― na época, eu acreditava que tinha acontecido de verdade em algum lugar."
90101050-85 = "Crescendo, entendi que era coisa de história……#nMas, enquanto lia, era como se eu entrasse no mundo do livro."
90101050-86 = "Por isso, tanto a pelúcia quanto a história de filme de monstro……#npodem ter sido, para alguém, um mundo que existe."
90101050-87 = "A lenda urbana…… é chamada de lenda justamente porque não se compreende. É o que eu acho."
90101050-92 = "……Talvez você tenha razão."
90101050-93 = "Se um Lore pode nascer de outras emoções além do medo…… realmente."
90101050-94 = "Procura mais algum livro?"
90101050-95 = "Se não, eu já vou indo――"
90101050-96 = "Espere. Posso pedir uma coisa?"
90101050-97 = "Me indique uma obra que você tenha lido recentemente e recomende."
90101050-98 = "Uma recomendação?#nHmm…… escolher só uma é difícil."
90101050-99 = "Deixe-me ver…… uma obra que me prendeu de verdade……"
90101050-103 = "――Você conhece 'A Garota Mágica Heavy Caliber'?"
90101050-105 = "Próximo Episódio;O Povo do Porto (2)"
