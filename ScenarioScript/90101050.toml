[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
90101050-1 = "Episódio 5: O Dossiê da Anomalia"
90101050-2 = "Sala de Leitura da 3ª Biblioteca Distrital, Distrito Shiratori"
90101050-5 = "Com licença, estou procurando por um compilado de artigos..."
90101050-6 = "Parece que a edição matinal do dia O do mês O tá faltando."
90101050-7 = "Hã? Ué? Que estranho... Como eu compilo eles toda manhã, não era pra ter nada faltando..."
90101050-8 = "Ah, lembrei!"
90101050-9 = "Teve um dia que o pessoal do jornal veio recolher os exemplares dizendo que tinha um \"erro na reportagem\"."
90101050-10 = "Talvez seja esse o dia que tá faltando. É meio raro eles recolherem tudo assim..."
90101050-11 = "Entendi... E você, por acaso, sabe sobre o que era a reportagem?"
90101050-12 = "Ai, desculpa... Eu até faço os recortes, mas não consigo lembrar do conteúdo."
90101050-13 = "Tudo bem. Muito obrigada."
90101050-20 = "(...Sem dúvida houve uma censura de informações.)"
90101050-21 = "(Por isso que, quando a anomalia em formato de mascote bizarro de passarinho apareceu a maioria achou que não passava de um boato.)"
90101050-22 = "(Eu mesma cheguei a pensar o mesmo, mas...)"
90101050-24 = "Bom, então, pra resumir o que o Sensei disse."
90101050-25 = "Uma pelúcia de edição limitada chamada \"Perorodzilla\" tomou forma física graças aos desejos dos fãs... E aí foi de encontro a D.U.?"
90101050-26 = "Isso quer dizer que... derrotaram ele junto com a Valkyrie?"
90101050-27 = "Pensando bem, no relatório da Secretaria de Segurança da Valkyrie que eu vi antes, tinha um registro de mobilização de uma equipe de segurança de grande escala."
90101050-29 = "(É fato que o monstro gigante que apareceu naquele dia atacou o litoral. E tem o depoimento do Sensei pra provar.)"
90101050-30 = "(O que me intriga é... o monstro ter a forma de um passarinho todo desengonçado.)"
90101050-31 = "(Pra virar uma lenda urbana contada pelos civis, ele não deveria ter uma aparência um pouco mais assustadora?)"
90101050-32 = "(Uma pelúcia que só era popular entre um nicho de fãs, causou um desastre no D.U...?)"
90101050-36 = "...A conta não fecha."
90101050-37 = "(Vou dar uma checada na pelúcia e nas informações da época.)"
90101050-38 = "(O duro é que... não tem nada sobrando. Nem nas redes sociais, nem nos jornais...)"
90101050-39 = "Está procurando algum livro?"
90101050-43 = "Não, não é um livro..."
90101050-44 = "Se estiver procurando alguma informação, posso te dar uma mãozinha. Ajudar quem busca conhecimento também é função das bibliotecárias."
90101050-46 = "Até mesmo coisas que não tem aqui..."
90101050-50 = "Afinal de contas, na nossa biblioteca pode ser que tenha."
90101050-51 = "Na \"nossa\"...?"
90101050-52 = "Ah, acabei nem me apresentando. Meu nome é Shimiko."
90101050-53 = "Faço parte do Comitê da Biblioteca de Trinity. Tô aqui hoje por causa de um evento de troca de livros."
90101050-54 = "Precisa de ajuda com alguma coisa?"
90101050-55 = "Não é nada, são só uns documentos que não se encontra mais."
90101050-56 = "Um artigo de jornal do dia O do mês O. Parece que o pessoal do jornal recolheu tudo, não acho em lugar nenhum..."
90101050-57 = "Um artigo recolhido no dia O do mês O..."
90101050-58 = "Por acaso não seria sobre... \"Um monstro gigante misterioso apareceu no litoral do D.U.\", né?"
90101050-62 = "Esse mesmo. Você sabe de alguma coisa?"
90101050-63 = "Sei sim. Lembro mais ou menos do que falava."
90101050-64 = "Quem ligou pra polícia foi um pescador que tava por perto. Ele relatou ter visto uma sombra gigante se movendo rápido debaixo d'água e chamou a gerência do porto."
90101050-65 = "Disse que... era uma sombra do tamanho de uma baleia e rápida que nem um peixe-espada..."
90101050-67 = "A Guarda Costeira da Valkyrie até conseguiu fazer o bicho voltar pro mar... Mas o prejuízo foi imenso, vários helicópteros foram pro saco."
90101050-68 = "O monstro era a cara cuspida e escarrada do \"Perorodzilla\", uma pelúcia da Momo Friends. E igualzinho ao filme que lançou ano passado, ele soltava uns raios pelos olhos"
90101050-69 = "Dizem que é bem difícil conseguir essa pelúcia hoje em dia."
90101050-71 = "Muito obrigada. Quebrou um galhão."
90101050-72 = "...Quem diria que eu ia dar de cara com uma bibliotecária que lembrasse de um artigo de jornal."
90101050-73 = "Você memoriza tudo que lê nos jornais...?"
90101050-74 = "Ahaha, que isso! Só foi coincidência, a matéria era bem interessante."
90101050-75 = "Mas o principal motivo de eu lembrar, foi que a vice-presidente, com quem eu não tenho tanto contato assim, me pediu de repente pra checar isso."
90101050-76 = "...Pelo que parece, a origem do \"Perorodzilla\" é bem normal, né."
90101050-77 = "...Normal, você diz?"
90101050-78 = "Fiquei sabendo que a lenda urbana que tava bombando nas redes sociais surgiu de um jornal local, aí fui dar uma fuçada..."
90101050-79 = "No fim das contas, a matéria não passava de um roteiro de filme de monstro gigante junto com o anúncio de que as pelúcias pararam de ser fabricadas."
90101050-80 = "...Mas será que se resumiu só a isso mesmo?"
90101050-81 = "...Cê acha que tem mais coisa escondida nessa história?"
90101050-82 = "Não, não é bem isso..."
90101050-83 = "Um filme de monstro gigante e uma pelúcia. Pra algumas pessoas, isso pode não ser nada \"normal\"."
90101050-84 = "Sabe as histórias de cavaleiros e dragões que eu lia quando criança? Naquela época, eu jurava de pé junto que aquilo tudo tinha acontecido de verdade em algum lugar."
90101050-85 = "Conforme fui crescendo, entendi que era só ficção, mas... Enquanto eu lia, era como se eu tivesse entrado no mundo da história."
90101050-86 = "Por isso, as pelúcias e os filmes de monstros gigantes... Pra alguém, talvez eles fossem mundos que existiam de verdade."
90101050-87 = "Acho que as lendas urbanas são chamadas assim... justamente porque a gente não consegue entender elas."
90101050-92 = "...Pode ser que sim."
90101050-93 = "Se sentimentos além do medo também geram Mitos... faz sentido."
90101050-94 = "Gostaria de procurar mais algum livro?"
90101050-95 = "Se não, eu já vou indo"
90101050-96 = "Espera, posso te pedir só mais uma coisa?"
90101050-97 = "Me indica alguma obra legal que você leu recentemente."
90101050-98 = "Uma recomendação de obra? Hmm... É complicado escolher uma só."
90101050-99 = "Deixa eu ver... Se for uma que me prendeu de verdade."
90101050-103 = "...Por acaso, você conhece a \"Garota Mágica: Artilharia Pesada\"?"
90101050-105 = "Próximo Episódio: O Pessoal do Porto (2)"