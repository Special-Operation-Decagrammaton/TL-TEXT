[translation]
80000024-1 = "Parafuso falso"
80000024-2 = "Schale - Área Residencial"
80000024-3 = "（A luz do Schale apagou de repente, então pedi ajuda para Utaha）"
80000024-10 = "Ufa, que bom que não foi nada grave."
80000024-11 = "Parece que a tampa do quadro de energia estava solta e acabou encostando no interruptor."
80000024-12 = "Verifiquei os outros lugares por precaução e está tudo bem, mas acho melhor trocar a tampa."
80000024-13 = "Sensei, pode segurar ali para mim, por favor?"
80000024-14 = "Vou apertar os parafusos deste lado, um por um."
80000024-15 = "[s] \"Sim, entendido.\""
80000024-19 = "Colocando aqui, e... pronto..."
80000024-24 = "Hm? Quebrou?"
80000024-25 = "Eu nem fiz tanta força... será que é um produto com defeito?"
80000024-26 = "Não tem jeito, vou pegar outro parafuso..."
80000024-31 = "...De novo?"
80000024-32 = "Duas vezes seguidas... tem algo muito errado aqui..."
80000024-33 = "A durabilidade está diretamente ligada à estabilidade do usuário."
80000024-34 = "Francamente, de qual empresa será que..."
80000024-38 = "Isto é..."
80000024-39 = "Ah, a culpa foi minha."
80000024-40 = "[s] \"O que houve?\""
80000024-41 = "Sensei, veja isto."
80000024-46 = "[ns] \"Isso... é duro, mas é chocolate por dentro?\""
80000024-47 = "Ah, exatamente, não é um parafuso de verdade."
80000024-48 = "Kotori e Hibiki acharam divertido um tempo atrás, então comprei pensando que serviria para repor o açúcar."
80000024-49 = "Por mais duro que seja, é normal que quebre se for chocolate. Na verdade, ainda bem que não entrou lá dentro."
80000024-50 = "Preciso voltar à sala do clube e pegar um parafuso de verdade."
80000024-55 = "..."
80000024-56 = "Desculpe, Sensei. Pode ir comendo enquanto eu vou buscar."
80000024-57 = "Deixando a aparência de lado, o sabor não deve ser tão ruim."
