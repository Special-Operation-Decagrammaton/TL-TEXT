[translation]
80000024-1 = "偽モノのネジ"
80000024-2 = "シャーレ・居住区"
80000024-3 = "（急にシャーレの電気が切れてしまい、ウタハに助けを求めた）"
80000024-10 = "ふう、大したことでなくて何より。"
80000024-11 = "どうやら分電盤のカバーが緩んでて、スイッチに触れてしまっていたらしいね。"
80000024-12 = "他のところも念のため見たけれど問題無し、まあカバーだけは付け替えておこうかな。"
80000024-13 = "先生、ちょっとそこを持って固定しておいてくれるかい？"
80000024-14 = "順番にこちら側からねじを締めるから。"
80000024-15 = "[s] \"うん、了解。\""
80000024-19 = "この中に入れて、よっと……"
80000024-24 = "ん？壊れた？"
80000024-25 = "そんなに力は入れてないのだけど……不良品かな？"
80000024-26 = "仕方ない、別のネジを……。"
80000024-31 = "……また？"
80000024-32 = "二回も連続だなんて、流石に何かがおかしいな……。"
80000024-33 = "耐久性はユーザーの安定性に直結する。"
80000024-34 = "全く、どこの企業の……"
80000024-38 = "これは……"
80000024-39 = "ああ、悪いのは私だったな。"
80000024-40 = "[s] \"どうかしたの？\""
80000024-41 = "先生、これを。"
80000024-46 = "[ns] \"これ……固いけど、中身はチョコレート？\""
80000024-47 = "ああ、つまり本物のネジではないのさ。"
80000024-48 = "以前コトリとヒビキが面白がっていたから、糖分補給に使えるかと思って買っていたんだ。"
80000024-49 = "いくら固いとしても、チョコレートなら壊れるのも仕方がない。むしろ中に入ってしまわなくて助かった。"
80000024-50 = "部室に戻って、ちゃんとしたネジを取ってこないとね。"
80000024-55 = "……。"
80000024-56 = "すまない、先生。私が行ってくる間に、食べていてくれ。"
80000024-57 = "見た目はともかく、味はそんなに悪くないはずさ。"
