[translation]
1300505-1 = "ロック・スピリッツ"
1300505-2 = "キヴォトス・街路"
1300505-4 = "道で下を向いたまま、何かに夢中になってるカヨコを見かけた。"
1300505-5 = "…………。"
1300505-6 = "[s] \"カヨコー！\""
1300505-7 = "…………。"
1300505-8 = "…………♫"
1300505-9 = "[s] \"カヨコ……？\""
1300505-11 = "……ん？先生？"
1300505-12 = "ごめん、音楽聞いてて、#n気がつかなかった。"
1300505-13 = "何の音楽を聞いてるか、って？"
1300505-14 = "ふふ、私の大好きなバンドの新曲が出たんだ。"
1300505-15 = "すごく良い曲だから、最近は登下校中もずっと聞くようになって。"
1300505-16 = "よかったら先生も聞いてみる？"
1300505-17 = "[s] カヨコからイヤホンを受けとって、耳に付ける。"
1300505-23 = "\"私が渇望するのは死っ！お前に要らないものは生っ！\""
1300505-24 = "\"相手の心臓をえぐり抜いて、溢れ出す血でのどを潤せええぇぇぇぇぇっ！\""
1300505-25 = "……。"
1300505-27 = "[ns] \"こ、これ、何の曲？\""
1300505-28 = "良い歌詞だと思わない？私が好きなヘビーメタルのグループ、「ブラック・デス・ポイズン」の新曲。"
1300505-29 = "ずっと新曲が出てなくて、解散するって噂もあったから心配してたけど……。"
1300505-30 = "やっぱり今回も、良い曲を持って帰ってきてくれた。"
1300505-31 = "歌詞が、教育に悪そうに聞こえる、って？"
1300505-32 = "そんなことはない、「ブラック・デス・ポイズン」の曲は多少過激に聞こえるかもしれないけど、人生において不可欠で、教訓的な良い内容が込められてる。"
1300505-33 = "先生も「ブラック・デス・ポイズン」のファーストアルバムを聞いたら、考えが変わると思う。"
1300505-34 = "さあ、一度聞いてみて。"
1300505-40 = "\"この世はゴミ！この音楽を聞くお前もゴミ！\""
1300505-41 = "\"すべて分別して世の中を掃除してやるぁぁぁああ！\""
1300505-42 = "……。"
1300505-43 = "その後、耳が痛くなるまでカヨコに勧めてもらった音楽を聞いた……。"
