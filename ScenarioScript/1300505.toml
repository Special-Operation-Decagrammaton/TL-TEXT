[translation]
1300505-1 = "Espírito do Rock"
1300505-2 = "Ruas de Kivotos"
1300505-4 = "Vi a Kayoko na rua, de cabeça baixa, totalmente concentrada em algo."
1300505-5 = "…………."
1300505-6 = "[s] \"Kayoko!\""
1300505-7 = "…………."
1300505-8 = "…………♫"
1300505-9 = "[s] \"Kayoko...?\""
1300505-11 = "……Hm? Sensei?"
1300505-12 = "Desculpe, eu estava ouvindo música e #n não percebi você."
1300505-13 = "Quer saber o que estou ouvindo?"
1300505-14 = "Hehe, a minha banda favorita lançou uma música nova."
1300505-15 = "É uma música tão boa que tenho ouvido o tempo todo no caminho para a escola."
1300505-16 = "Se quiser, você também pode ouvir, Sensei."
1300505-17 = "[s] Recebo os fones de ouvido da Kayoko e coloco nos ouvidos."
1300505-23 = "\"O que eu desejo é a morte! O que você não precisa é a vida!\""
1300505-24 = "\"Arrancarei o coração do meu oponente e molharei minha garganta com o sangue que jorraaaaaa!\""
1300505-25 = "……."
1300505-27 = "[ns] \"Q-que música é essa?\""
1300505-28 = "Não acha a letra boa? É a música nova do \"Black Death Poison\", meu grupo de heavy metal favorito."
1300505-29 = "Eles não lançavam nada há muito tempo e havia rumores de que iriam se separar, então eu estava preocupada, mas..."
1300505-30 = "Como esperado, eles trouxeram uma música incrível desta vez também."
1300505-31 = "A letra soa como uma má influência, você diz?"
1300505-32 = "Não é nada disso. As músicas do \"Black Death Poison\" podem soar um pouco extremas, mas contêm lições valiosas e essenciais para a vida."
1300505-33 = "Acho que se você ouvir o primeiro álbum do \"Black Death Poison\", Sensei, vai mudar de ideia."
1300505-34 = "Vamos, ouça só uma vez."
1300505-40 = "\"Este mundo é lixo! Você que ouve esta música também é lixo!\""
1300505-41 = "\"Vou separar tudo e limpar este mundo aaaaaa!\""
1300505-42 = "……."
1300505-43 = "Depois disso, ouvi a música que a Kayoko me recomendou até meus ouvidos doerem..."
