[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21080-1 = "Episódio 8: A Avaliação de Qualificação."
21080-2 = "Millennium · Clube de Desenvolvimento de Jogos"
21080-3 = "Pronto! Agora que a gente já escapou do risco\nde dissolução, dá pra curtir os jogos\nsossegada de vez!"
21080-4 = "Então, Aris, hoje bora numa raid! Tá pronta?"
21080-5 = "O método de superação está assimilado. Equipamento\nexclusivo de raid já adquirido. Anúncio postado:\n【Iniciantes bem-vindos / Expedição à 'Floresta\nem Chamas' / 4 jogadores / Recrutando healer e\natacante de longo alcance】. Ah, 【Perorochan32 entrou no grupo】."
21080-6 = "P-peraí, não é cedo demais\npra baixar a guarda!?"
21080-7 = "Você já avisou a Yuuka? Que agora a gente tem\n4 membros, e já cumpriu o requisito\nde qualificação do clube?"
21080-8 = "Claaaro. E por isso, hoje à tarde, ela vem fazer\na avaliação de qualificação da Aris…… ah, Aris!\nIsso é o movimento que antecede o ataque de sopro!\nCuidado!"
21080-9 = "Perigo detectado. Ativando a magia de barreira!"
21080-10 = "Agora a vida real é que tá perigosa! Que avaliação\nde qualificação é essa!? É a primeira vez\nque eu ouço falar disso!?"
21080-11 = "É dessa \"avaliação de qualificação\" que depende\na sobrevivência do nosso clube…… não é hora\nde ficar numa raid toda despreocupada!?"
21080-12 = "Você se preocupa demais. Os preparativos\nda Aris já estão perfeitos."
21080-13 = "Hã, é mesmo?"
21080-16 = "Aris, manda a sua apresentação!"
21080-18 = "Meu nome é Aris, a Olho Azul, lanceira-cavaleira\nda raça dos anões. Arma que utilizo: a gunlance\n\"Presa do Dragão de Fogo\"; terra natal: as Montanhas\nde Aço. Na infância, perdi minha família num ataque\nda tribo demoníaca e, sozinha, adentrei a mina em chamas……"
21080-19 = "Não, não é o perfil do seu avatar no jogo,\né o da Aris de verdade!"
21080-20 = "Ah, compreendido."
21080-22 = "Meu nome é Aris, aluna do 1º ano da Colégio de\nCiências Millennium. Como me transferi há pouco,\nperdi o prazo de inscrição nas aulas e ainda não\nconsegui me registrar nelas, mas pretendo participar\noficialmente a partir do mês que vem."
21080-23 = "Como me informaram que, mesmo sem poder participar\ndas aulas ainda, eu poderia participar de atividades\nde clube, entrei para o Clube de Desenvolvimento de Jogos."
21080-24 = "Ah, ficou bem convincente."
21080-25 = "O papel que desempenho no Clube de Desenvolvimento\nde Jogos é o de tank e atacante de atributo Luz……"
21080-26 = "Não, não, o papel é programadora!"
21080-27 = "P-programadora! Desde que nasci, antes mesmo\nda minha língua materna, eu já usava Jaba……"
21080-28 = "Uuh, será que vai dar certo mesmo……!?"
21080-29 = "……É impossível."
21080-31 = "Um membro novo ter entrado no Clube de\nDesenvolvimento de Jogos, isso é impossível……!"
21080-32 = "Sinto muito, mas é fato!"
21080-33 = "Yuuka……"
21080-36 = "……?"
21080-37 = "Você é a tal da Aris, né. A quarta membra\nque entrou no Clube de Desenvolvimento de Jogos."
21080-38 = "Hmm, eu achava que conhecia quase todos\nos alunos da Millennium, mas……"
21080-39 = "que eu não conhecesse uma garota tão fofinha\nassim, é meio difícil de acreditar."
21080-40 = "(Estremece)"
21080-41 = "……???"
21080-42 = "U-uma,"
21080-43 = "Uma fera apareceu……!"
21080-44 = "E-essa garota acabou de me chamar\nde \"fera\", né!?"
21080-45 = "É e-engano! Ela disse \"fada\", você ouviu errado,\naff, a Aris não sabe mentir mesmo."
21080-46 = "Kh…… por mais acostumada que eu esteja a ser\na vilã, ser tratada de \"fera\" logo por uma garota\nque encontro pela primeira vez……"
21080-47 = "Você tem coragem, hein……!"
21080-48 = "C-calma! O Conselho não pode deixar\nsentimentos pessoais entrarem nisso, né!?"
21080-50 = "Enfim, a gente cumpriu o número de membros\nexigido! Com isso o Clube de Desenvolvimento\nde Jogos continua existindo, tá tudo certo, né?"
21080-51 = "Continua existindo……"
21080-52 = "É verdade…… isso, se essa garota for mesmo\numa membra que veio até aqui por vontade própria."
21080-53 = "(Coração dispara)"
21080-54 = "Originalmente, bastava declarar a entrada\nde um membro novo, e já estava de bom tamanho……"
21080-55 = "Mas, ultimamente, as regras de gestão dos clubes\nmudaram um pouco, e passou a ser necessária\numa verificação um pouco mais rigorosa."
21080-56 = "Então, com a Aris, um simples interrogatório……\nepa, escapou uma palavra que eu não queria……"
21080-57 = "Bom, vou fazer algumas perguntas simples."
21080-59 = "Senti que o verdadeiro sentimento dela\nescapou com força total……"
21080-62 = "Não vai levar muito tempo."
21080-63 = "(Engole em seco)"
21080-64 = "D-dependendo da escolha, também é possível\nchegar a um final ruim?"
21080-65 = "Final ruim…… bom, pode ser que aconteça, sim.\nEntão…… Aris."
21080-68 = "Vamos começar as perguntas."
21080-70 = "Próximo episódio: As Perguntas de Yuuka."