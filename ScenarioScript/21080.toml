[translation]
21080-1 = "Episódio 8; Avaliação de Qualificações"
21080-2 = "Millennium - Depto. de Desenvolvimento de Jogos"
21080-3 = "Bom, já que escapamos do perigo de fechamento do clube, podemos jogar à vontade sem preocupações!"
21080-4 = "Então, Aris, vamos para a Raid hoje! Tudo pronto?"
21080-5 = "Compreendi a estratégia. Equipamento exclusivo de raid já obtido. Anunciado como [Iniciantes bem-vindos / Expedição para a 'Floresta em Chamas' / 4 pessoas / Recrutando Healer e Atacante à distância]. Ah, [Perorochan32 entrou no grupo]."
21080-6 = "E-Espera, não é cedo demais para relaxar!?"
21080-7 = "Vocês já avisaram a Yuuka? Que agora temos 4 membros e preenchemos os requisitos do clube."
21080-8 = "Claro que sim. E ela disse que viria hoje à tarde fazer a avaliação de qualificações da Aris... Ah, Aris! Essa é a animação do ataque de sopro! Cuidado!"
21080-9 = "Perigo detectado, ativando magia de barreira!"
21080-10 = "A realidade é muito mais perigosa agora! Como assim avaliação de qualificações!? É a primeira vez que ouço falar disso!?"
21080-11 = "A sobrevivência do nosso clube depende dessa 'avaliação de qualificações'... Não é hora de ficar jogando Raid de boa, né!?"
21080-12 = "Você se preocupa demais, a preparação da Aris já está perfeita."
21080-13 = "Ué, é mesmo?"
21080-16 = "Aris, apresente-se!"
21080-18 = "Meu nome é Aris The Blue Eye, lanceira da tribo dos anões. Arma utilizada: Gunlance 'Presa do Dragão de Fogo'. Cidade natal: Cordilheira de Aço. Quando criança, perdi minha família num ataque do exército do Rei Demônio e entrei sozinha nas minas em chamas..."
21080-19 = "Não é o perfil do seu avatar no jogo, é o seu de verdade, Aris!"
21080-20 = "Ah, compreendido."
21080-22 = "Meu nome é Aris, sou do 1º ano da Millennium Science School. Acabei de me transferir recentemente e perdi o prazo para me matricular nas disciplinas, então ainda não estou registrada nas aulas, mas planejo participar oficialmente a partir do mês que vem."
21080-23 = "Como me informaram que eu poderia participar de clubes mesmo sem frequentar as aulas ainda, entrei para o Departamento de Desenvolvimento de Jogos."
21080-24 = "Ah, soou bem convincente."
21080-25 = "Minha função no Departamento de Desenvolvimento de Jogos é Tank e Atacante do elemento Luz..."
21080-26 = "Não, não, sua função é programadora!"
21080-27 = "P-Programadora! Desde que nasci, eu uso Jaba antes mesmo da minha língua materna..."
21080-28 = "Uuuh, será que isso vai mesmo dar certo...!?"
21080-29 = "......Inacreditável."
21080-31 = "Um novo membro entrar para o Departamento de Desenvolvimento de Jogos, isso é inacreditável...!"
21080-32 = "Que pena pra você, mas é a verdade!"
21080-33 = "Yuuka..."
21080-36 = "......?"
21080-37 = "Então você é a famosa Aris-chan. A quarta integrante que entrou para o Departamento de Desenvolvimento de Jogos."
21080-38 = "Hmmm, eu achava que conhecia quase todos os alunos da Millennium, mas..."
21080-39 = "É um pouco difícil de acreditar que eu não conhecia uma garota tão fofa assim."
21080-40 = "(Estremece)"
21080-41 = "......???"
21080-42 = "U-"
21080-43 = "Um Yokai apareceu...!"
21080-44 = "E-Essa garota acabou de me chamar de 'Yokai', não foi!?"
21080-45 = "É-É um mal-entendido! Ela disse 'Fada', você deve ter escutado errado. Ai ai, a Aris não consegue contar mentiras mesmo~."
21080-46 = "Ugh... Tudo bem que eu estou acostumada a ser a vilã, mas ser tratada como um Yokai por uma garota que acabei de conhecer é demais."
21080-47 = "Você tem bastante coragem...!"
21080-48 = "C-Calma! O Conselho Estudantil não deve misturar sentimentos pessoais, não é!?"
21080-50 = "De qualquer forma, já cumprimos a cota de membros! Com isso, o Departamento de Desenvolvimento de Jogos continua, certo?"
21080-51 = "Continua..."
21080-52 = "É verdade... Isso se essa garota for mesmo um membro que veio para cá por vontade própria."
21080-53 = "(Gulp)"
21080-54 = "Originalmente, bastava apenas registrar a entrada de um novo membro, mas..."
21080-55 = "Recentemente, as regras de administração dos clubes mudaram um pouco, e agora é necessário fazer uma verificação um pouco mais rigorosa."
21080-56 = "Por isso, farei um rápido interrogatório com a Aris-chan... Oh, acabei usando uma palavra que não devia..."
21080-57 = "Bem, vou fazer algumas perguntas simples."
21080-59 = "Sinto que ela acabou revelando as verdadeiras intenções dela agora..."
21080-62 = "Não vai demorar muito."
21080-63 = "(Gulp)"
21080-64 = "D-Dependendo das escolhas, é possível cair num Bad End?"
21080-65 = "Bad End... Bem, pode-se dizer que sim. Então... Aris-chan."
21080-68 = "Vou começar as perguntas."
21080-70 = "Próximo Episódio; As Perguntas da Yuuka"