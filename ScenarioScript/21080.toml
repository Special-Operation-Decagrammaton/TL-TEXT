[translation]
21080-1 = "Episódio 8; Exame de Qualificação"
21080-2 = "Departamento de Desenvolvimento de Jogos de Millennium"
21080-3 = "Pronto, já escapamos da crise de fechamento, agora podemos jogar à vontade sem preocupações!"
21080-4 = "Então, Alice, vamos para a raid hoje! Está preparada?"
21080-5 = "Já entendi a estratégia. Equipamentos exclusivos de raid também já foram obtidos. Anunciei como: [Iniciantes bem-vindos/Expedição à 'Floresta Flamejante'/4 pessoas/Procurando healer e atacante de longa distância]. Ah, [Perorochan32 entrou no grupo]."
21080-6 = "Ei, não é cedo demais para baixar a guarda!?"
21080-7 = "Você já falou com a Yuuka? Como agora somos quatro membros, já cumprimos os requisitos para o clube."
21080-8 = "Claro que sim. Por isso ela vem hoje à tarde para fazer o exame de qualificação da Alice... Ah, Alice! Esse é o movimento de preparação para o ataque de sopro! Cuidado!"
21080-9 = "Perigo detectado, ativando magia de barreira!"
21080-10 = "O perigo real é agora! O que é esse exame de qualificação!? Nunca ouvi falar disso!"
21080-11 = "A sobrevivência do nosso clube depende desse 'exame de qualificação'... Não é hora de ficar jogando raid tranquilamente, né!?"
21080-12 = "Você está preocupada demais, a preparação da Alice já está perfeita."
21080-13 = "Sério?"
21080-16 = "Alice, apresente-se!"
21080-18 = "Meu nome é Alice the Blue Eye, uma cavaleira lanceira da tribo dos anões. Minha arma é a lança-arma 'Presa do Dragão de Fogo', e minha terra natal é a Cordilheira de Aço. Quando criança, perdi minha família em um ataque de demônios e entrei sozinha nas minas em chamas..."
21080-19 = "Não, não o perfil do seu avatar no jogo, o da Alice de verdade!"
21080-20 = "Ah, entendi."
21080-22 = "Meu nome é Alice, aluna do primeiro ano da Millennium Science School. Como acabei de me transferir e perdi o prazo de inscrição, ainda não estou matriculada nas aulas, mas pretendo participar oficialmente a partir do mês que vem."
21080-23 = "Disseram que, mesmo sem participar das aulas, é possível participar de clubes, então entrei para o Departamento de Desenvolvimento de Jogos."
21080-24 = "Ah, até que soou convincente."
21080-25 = "Meu papel no Departamento de Desenvolvimento de Jogos é tanque e atacante de atributo luz..."
21080-26 = "Não, não, seu papel é programadora!"
21080-27 = "P-programadora! Desde que nasci, uso Jaba antes mesmo da minha língua materna..."
21080-28 = "Ai, ai, será que isso vai dar certo mesmo...!?"
21080-29 = "...Impossível."
21080-31 = "É impossível que o Departamento de Desenvolvimento de Jogos tenha recebido um novo membro...!"
21080-32 = "Sinto muito, mas é verdade!"
21080-33 = "Yuuka..."
21080-36 = "...?"
21080-37 = "Então você é a tal Alice de quem todos falam. A quarta integrante que entrou para o Departamento de Desenvolvimento de Jogos."
21080-38 = "Hum, achei que conhecia quase todos os alunos de Millennium..."
21080-39 = "Não consigo acreditar que eu não sabia da existência de uma menina tão fofa."
21080-40 = "(Tremida)"
21080-41 = "...???"
21080-42 = "Um,"
21080-43 = "Um monstro apareceu...!"
21080-44 = "E-essa menina acabou de me chamar de 'monstro'!?"
21080-45 = "É-é um mal-entendido! Você ouviu errado, ela disse 'fada', né? Ai, ai, a Alice não sabe mentir mesmo."
21080-46 = "Droga... mesmo estando acostumada a ser a vilã, não esperava ser tratada como um monstro por alguém que acabei de conhecer."
21080-47 = "Você tem muita coragem, não tem...!?"
21080-48 = "C-calma! O conselho estudantil não pode deixar sentimentos pessoais interferirem, né!?"
21080-50 = "De qualquer forma, já atingimos o número mínimo de membros! Então, o Departamento de Desenvolvimento de Jogos está liberado para continuar, certo?"
21080-51 = "Continuar..."
21080-52 = "Certamente... isso se essa menina realmente tiver vindo para cá por vontade própria."
21080-53 = "(Batimento cardíaco)"
21080-54 = "Normalmente, bastaria declarar a entrada de um novo membro..."
21080-55 = "Mas as regras de funcionamento dos clubes mudaram um pouco recentemente, e precisamos verificar as coisas com um pouco mais de rigor."
21080-56 = "Por isso, farei um breve interrogatório com a Alice... nossa, que palavra estranha de se dizer..."
21080-57 = "Bem, vou fazer algumas perguntas simples."
21080-59 = "Sinto que ela falou exatamente o que pensava..."
21080-62 = "Não vai demorar muito."
21080-63 = "（Gulp）"
21080-64 = "A-as escolhas podem levar a um final ruim?"
21080-65 = "Um final ruim... Bem, talvez isso possa acontecer. Então... Alice."
21080-68 = "Vou começar as perguntas."
21080-70 = "Próximo episódio: As perguntas da Yuuka"
