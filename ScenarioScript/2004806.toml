[translation]
2004806-1 = "À beira da água, você e os peixes"
2004806-2 = "Piscina privativa do Chá das Cinco"
2004806-4 = "（Fui em direção à piscina onde Nagisa está）"
2004806-5 = "（Mas, afinal, o que a pesca tem a ver com uma piscina...?）"
2004806-6 = "Ah, Sensei.#nPor aqui."
2004806-10 = "Fico grata por ter vindo tão rápido..."
2004806-11 = "O motivo de eu ter chamado o Sensei hoje é..."
2004806-12 = "...Não, é melhor que veja com seus próprios olhos. Por favor, olhe aqui."
2004806-16 = "[ns] Olhar dentro da piscina."
2004806-18 = "[ns] \"...Peixes!?\""
2004806-19 = "（Dezenas de peixes nadavam dentro da piscina）"
2004806-23 = "A partir de agora, precisamos..."
2004806-24 = "Pescar estes peixes, um por um."
2004806-25 = "No entanto, sinto que sozinha eu nunca terminaria..."
2004806-26 = "Sinto muito pelo incômodo, mas gostaria de pedir a sua colaboração, Sensei..."
2004806-27 = "[s] \"Quem foi que fez isso...?\""
2004806-28 = "Fufu, foi..."
2004806-29 = "Fui eu."
2004806-33 = "[ns] \"...Como é?\""
2004806-34 = "Fui eu quem soltou os peixes na piscina."
2004806-35 = "Para ser exata, foi algo que pedi aos meus assistentes..."
2004806-36 = "[s] \"Po-por que?\""
2004806-37 = "Logo após retornar, comecei a sentir falta dos momentos que passei à beira da água..."
2004806-38 = "E, embora os peixes sejam importantes,..."
2004806-39 = "Olhe bem para mim."
2004806-40 = "Sendo o Sensei, você já deve ter notado, não é?"
2004806-41 = "[s] \"Err... o quê?\""
2004806-42 = "Que, após pensar muito, fui eu quem escolheu este traje de banho."
2004806-43 = "Porém, um traje como este, após ser exibido durante alguns dias de férias, estava destinado a dormir no armário até o próximo verão..."
2004806-44 = "Eu achei isso um pouco desperdício."
2004806-45 = "[s] \"...Então, por que não nadar um pouco?\""
2004806-46 = "...Não é possível conciliar a natação com o trabalho que chega como ondas."
2004806-47 = "É difícil assinar documentos enquanto se nada..."
2004806-48 = "E eu gostaria de evitar exercícios intensos."
2004806-49 = "[s] \"En-entendo.\""
2004806-50 = "Pensei que a pesca poderia ser feita paralelamente ao trabalho..."
2004806-51 = "E foi assim que providenciei os peixes que habitam nas redondezas..."
2004806-52 = "Mas, como há muitos para pescar sozinha, eu estava em apuros."
2004806-53 = "Ouvi dizer que existe um método de pesca que utiliza a bateria de um carro para atordoar muitos peixes de uma vez."
2004806-54 = "Mas, francamente, isso seria um pouco..."
2004806-55 = "[s] \"Ah, sim! É melhor não fazer isso...!\""
2004806-56 = "Sim. Concordo plenamente."
2004806-57 = "Sendo assim, Sensei, já que estamos aqui..."
2004806-62 = "Se não se importar, gostaria de pescar comigo?"
2004806-64 = "（E assim, desfrutamos da pescaria mais elegante do mundo...）"
2004806-65 = "（E devolvemos os peixes ao lugar de onde vieram.）"
