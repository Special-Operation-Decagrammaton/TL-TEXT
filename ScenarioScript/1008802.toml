[translation]
1008802-1 = "um momento tranquilo"

1008802-3 = "(O lugar que Kayoko me contou era um beco estreito perto da ópera.)"

1008802-4 = "(Kayoko está em um canto escondido de um beco)"

1008802-9 = "...Ah, Senseia."

1008802-10 = "Isso foi rápido. Por aqui."

1008802-17 = "[ns1] \"Kayoko?\"\n[ns2] \"Você está descansando em um lugar como este?\""

1008802-20 = "Bem... sim."

1008802-21 = "Tem muita gente perto da Ópera, então não consigo relaxar."

1008802-22 = "Porém, não quero ficar longe do trabalho enquanto estou trabalhando..."

1008802-26 = "É por isso que estou aqui."

1008802-27 = "Você tem alguma experiência semelhante como Sensei?"

1008802-28 = "O que devo dizer..."

1008802-29 = "Hmm... é como se você quisesse sair um pouco daí?"

1008802-30 = "[s3] \"Acho que é um segredo.\"\n[s4] \"Como Sensei, acho que não posso te contar.\""

1008802-33 = "...Hehe, entendo."

1008802-34 = "Você está bem. Eu entendi."

1008802-35 = "Bem, você não precisa se preocupar muito."

1008802-36 = "Volto logo depois de fazer uma pequena pausa."

1008802-40 = "……Sim?"

1008802-41 = "Ah, está tudo bem."

1008802-45 = "O Sensei não está atrapalhando."

1008802-46 = "Se você quisesse ficar sozinho, você não teria me contado em primeiro lugar."

1008802-47 = "Além disso... eu não teria ligado para você se não fosse pela Senseia."

1008802-48 = "Não se preocupe, o Sensei estará lá e não será um incômodo."

1008802-49 = "Na verdade, gosto desse tipo de coisa. #nBate-papo com alguém."

1008802-50 = "um……"

1008802-51 = "Como eu disse, não é com ninguém em particular."

1008802-55 = "n / D……."

1008802-56 = "Desculpe, acabei falando demais."

1008802-57 = "O Sensei também veio fazer uma pausa, mas não pode fazer uma pausa assim."

1008802-58 = "Bem, então..."

1008802-62 = "Vamos fazer uma pausa?"

1008802-69 = "(Depois disso, não conversei realmente com Kayoko e passei um tempo observando o pôr do sol.)"

1008802-70 = "(Por cerca de 10 minutos, o ar ficou suave e calmo.)"

1008802-76 = "... Já faz tanto tempo."

1008802-77 = "[s5] \"Vamos para casa agora.\"\n[s6] \"...Foi um momento de paz.\""

1008802-81 = "……n / D."

1008802-85 = "...Isso mesmo, vamos para casa."

1008802-89 = "……real."

1008802-93 = "……Concordo."

1008802-96 = "[wa:1150]― [log=카요코 드레스]……いいね。[/log]"
1008802-99 = "― [log=카요코 드레스]Assim...[/log]"

1008802-101 = "― [log=카요코 드레스]Passar [wa:1700]tempo [wa:800] atordoado com alguém...[/log]"

1008802-104 = "[wa:700]― [log=카요코 드레스]……ほとんど[wa:400]したことないかも。[/log]"
1008802-107 = "― [log=카요코 드레스]...Sim, [wa:900] Estou sempre sozinho. [/registro]"

1008802-109 = "― [log=카요코 드레스][wa:950]Achei que estava tudo bem. [/registro]"

1008802-112 = "[ns7] \"Esse tipo de coisa não é ruim.\"\n[ns8] \"Eu gostaria que houvesse mais tempo como este.\""

1008802-113 = "[wa:1050]― [log=카요코 드레스]……本当に？[/log]"
1008802-114 = "[wa:1050]― [log=카요코 드레스]……本当に？[/log]"
1008802-117 = "― [log=카요코 드레스]Hehe, [wa:850]Bom, [wa:1430]O Sensei também gostou. [/registro]"

1008802-120 = "[wa:800]― [log=카요코 드레스]いいよね、[wa:1750]こうやって[wa:1200]静かに過ごすのってさ。[/log]"
1008802-123 = "― [log=카요코 드레스]...Ah, [wa:1050][wa:570]Mas não é que eu não goste do [wa:1080] de sempre. [/registro]"

1008802-125 = "― [log=카요코 드레스]...Você entende [wa:830] se você é Sensei? [/registro]"

1008802-128 = "[wa:630]― [log=카요코 드레스]ふう……[wa:2270]あのさ……。[/log]"
1008802-131 = "― [log=카요코 드레스]...só um pouquinho... [/log]"

1008802-133 = "― [log=카요코 드레스] Só mais um pouquinho... [wa:2700] Fique aqui. [/registro]"

1008802-136 = "Obrigado por se juntar a mim, senhor. #nEu me senti muito relaxado hoje."

1008802-137 = "Eu me senti mais relaxado do que quando estava sozinho."

1008802-138 = "……Sim?"

1008802-139 = "Eu não preciso dizer nada assim? por que?"

1008802-140 = "[ns9] \"Não vou dizer, mas é uma flor.\"\n[ns10] \"Mesmo que você não diga, é o suficiente para transmiti-lo.\""

1008802-145 = "……um."

1008802-146 = "……n / D."

1008802-147 = "Eu sempre pensei, Sensei."

1008802-152 = "...É realmente interessante."

