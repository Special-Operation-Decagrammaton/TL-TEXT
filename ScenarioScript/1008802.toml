[translation]
1008802-1 = "静かなひととき"
1008802-3 = "（カヨコが教えてくれた場所は、オペラハウス付近の狭い路地だった）"
1008802-4 = "（人目の入らない、路地の奥まった場所にカヨコがいる）"
1008802-9 = "……あ、先生。"
1008802-10 = "早かったね。こっち。"
1008802-17 = "[ns1] \"カヨコ？\"\n[ns2] \"こんな所で休んでるの？\""
1008802-20 = "まあ……うん。"
1008802-21 = "オペラハウスの近くは人が多いし、ゆっくりできないから。"
1008802-22 = "かといって、仕事中にあんまり遠く離れるのもね……"
1008802-26 = "だからここにいるの。"
1008802-27 = "先生もそういう経験ない？"
1008802-28 = "なんて言えばいいのかな……"
1008802-29 = "うーん……ちょっと抜け出したくなる、みたいな？"
1008802-30 = "[s3] \"それは……内緒かな。\"\n[s4] \"先生の立場としては、言えないかな。\""
1008802-33 = "……ふふ、そっか。"
1008802-34 = "大丈夫。伝わったよ。"
1008802-35 = "まあ、そんなに心配しなくていいよ。"
1008802-36 = "ちょっと休んだら、すぐ戻るから。"
1008802-40 = "……うん？"
1008802-41 = "ああ、大丈夫。"
1008802-45 = "先生は邪魔になんてなってないよ。"
1008802-46 = "一人でいたいなら、そもそも教えてないし。"
1008802-47 = "それに……先生じゃなきゃ、呼んでなかったし。"
1008802-48 = "先生が居て邪魔とかじゃないから、心配しないで。"
1008802-49 = "むしろ、こういうの気に入ってるんだ。#n誰かと一緒に雑談するの。"
1008802-50 = "あ……"
1008802-51 = "言っとくけど、別に誰とでもってわけじゃないからね。"
1008802-55 = "ふふ……。"
1008802-56 = "ごめん、つい喋りすぎちゃった。"
1008802-57 = "先生も休憩しに来てるのに、これじゃ休めないよね。"
1008802-58 = "じゃあ……"
1008802-62 = "ちょっと休もうか。"
1008802-69 = "（その後、カヨコと特に喋ることなく、夕焼けを眺めながら時間を過ごした）"
1008802-70 = "（10分ほど、柔らかく穏やかな空気が流れていた）"
1008802-76 = "……もうこんな時間。"
1008802-77 = "[s5] \"そろそろ帰ろうか。\"\n[s6] \"……穏やかな時間だったね。\""
1008802-81 = "……ふふ。"
1008802-85 = "……そうだね、帰ろっか。"
1008802-89 = "……ほんと。"
1008802-93 = "……そうだね。"
1008802-96 = "[wa:1150]― [log=카요코 드레스]……いいね。[/log]"
1008802-99 = "― [log=카요코 드레스]こうやって……[/log]"
1008802-101 = "― [log=카요코 드레스]誰かと一緒に[wa:1700]ボーッと時間を[wa:800]過ごすなんて……[/log]"
1008802-104 = "[wa:700]― [log=카요코 드레스]……ほとんど[wa:400]したことないかも。[/log]"
1008802-107 = "― [log=카요코 드레스]……そう、[wa:900]いつも一人。[/log]"
1008802-109 = "― [log=카요코 드레스]別に[wa:950]それで良いと思ってたし。[/log]"
1008802-112 = "[ns7] \"こういうのも、悪くないね。\"\n[ns8] \"こういう時間、もっと増えてほしいね。\""
1008802-113 = "[wa:1050]― [log=카요코 드레스]……本当に？[/log]"
1008802-114 = "[wa:1050]― [log=카요코 드레스]……本当に？[/log]"
1008802-117 = "― [log=카요코 드레스]ふふ、[wa:850]良かった、[wa:1430]先生も気に入ってくれて。[/log]"
1008802-120 = "[wa:800]― [log=카요코 드레스]いいよね、[wa:1750]こうやって[wa:1200]静かに過ごすのってさ。[/log]"
1008802-123 = "― [log=카요코 드레스]……あ、[wa:1050]別に[wa:570]普段がイヤってわけでは[wa:1080]ないんだけど。[/log]"
1008802-125 = "― [log=카요코 드레스]……先生なら[wa:830]分かってるか。[/log]"
1008802-128 = "[wa:630]― [log=카요코 드레스]ふう……[wa:2270]あのさ……。[/log]"
1008802-131 = "― [log=카요코 드레스]……少しだけ……。[/log]"
1008802-133 = "― [log=카요코 드레스]もう少しだけ……[wa:2700]ここにいて。[/log]"
1008802-136 = "付き合ってくれてありがとう、先生。#n今日は本当に、ゆったりできた。"
1008802-137 = "ひとりで居るときより……リラックスできたかも。"
1008802-138 = "……うん？"
1008802-139 = "そういうのは別に言わなくてもいい？なんで？"
1008802-140 = "[ns9] \"言わぬが花ってやつだよ。\"\n[ns10] \"口にしなくても、十分伝わってるからさ。\""
1008802-145 = "……あ。"
1008802-146 = "……ふふ。"
1008802-147 = "いつも思ってたけど、先生って。"
1008802-152 = "……やっぱり、面白いね。"
