[translation]
1009505-1 = "覚えててくださいね、先生！"
1009505-2 = "先生、大変です！"
1009505-3 = "[s] \"どうしたの？\""
1009505-4 = "私が今回メイドになったのは、ゲームのキャラデザのためでした。"
1009505-5 = "それなのに、思い返してみると……。"
1009505-17 = "私、先生と遊んでばかりだった気がします！"
1009505-18 = "[s1] \"大丈夫、大丈夫……。\"\n[s2] \"遊びながら学んでいくものだよ。\""
1009505-21 = "でも、学生の本分は勉強のはずですよね？"
1009505-22 = "[s3] \"み、ミドリ……！\"\n[s4] \"そんな模範的な言葉、何だか泣けてくるよ……。\""
1009505-28 = "とにかく、このままじゃダメです！"
1009505-29 = "今日一日だけでも、きちんとメイドの仕事をしないと！"
1009505-30 = "先生！今からシャーレに戻るんですよね？#nご一緒させてください！"
1009505-31 = "[s] \"ま、待ってミドリ……！\""
1009505-34 = "そういえば、先生はメイドの種類についてご存知ですか？"
1009505-35 = "[s] \"全然知らないかも……。\""
1009505-36 = "私、調べてみたんです！"
1009505-37 = "まず……メイドのなかで一番良い待遇を受けていたのは、#n「レディースメイド」だったそうです。"
1009505-38 = "主な仕事は衣類やアクセサリの管理、着替えや化粧の手伝いで……。"
1009505-39 = "お屋敷の女主人から直接雇われて、管理されていたそうです。"
1009505-40 = "それと同じくらいの待遇を受けていたのが、「ハウスキーパー」。"
1009505-41 = "ハウスキーパーは正確にはメイドではなくて……。#n家事を取りまとめているマネージャーのようなものだったそうですが。"
1009505-42 = "他の使用人をまとめる一番偉い立場で、人事も担当していました。"
1009505-43 = "[s] \"沢山調べたんだね！\""
1009505-44 = "ふふっ、はい！"
1009505-45 = "ハウスキーパーの下には「ハウスメイド」#nこちらは部屋を整えたり、掃除したり……。#n主にお屋敷を綺麗に保つ仕事をしていたそうです。"
1009505-46 = "そして子どもの世話をする「ナースメイド」。#n厨房で料理や給仕をサポートする「キッチンメイド」。"
1009505-47 = "洗濯を担当する「ランドリーメイド」。#n雑務を担当する「チェインバーメイド」……などなど。"
1009505-48 = "こうして挙げると、色々なメイドがいたように思えますが……。"
1009505-49 = "最も一般的なメイドは、「メイド・オブ・オール・ワーク」と呼ばれる――"
1009505-50 = "すべての仕事を、一人でこなすメイドだったそうです。"
1009505-51 = "多分ですが……メイドを何人も雇うような力のあるお屋敷が、#nそれほど多くなかったからだと思います。"
1009505-52 = "[s] \"なるほど……勉強になった！\""
1009505-53 = "それは良かったです！#nイラストを描きながら、色々調べた甲斐がありました。"
1009505-60 = "下調べはばっちりです！あとは……#n今日一日だけでも、ちゃんとしたメイドになりきらないと！"
1009505-61 = "先生……いえ、ご主人様！#nシャーレの雑務は、すべて私にお任せください！"
1009505-63 = "（やる気にあふれたミドリの、一日メイド実習？が始まった……！）"
1009505-65 = "メイドの基本と言えば！まずは掃除ですね！"
1009505-69 = "……執務室の隅、ほこりがすごいですね。"
1009505-70 = "こういう場所は普段からちゃんと整理しないと、すぐにほこりが溜まりがちです。"
1009505-71 = "なにせ、ゲーム開発部の部室もそうで……。"
1009505-72 = "し、心配しないでください、先生！#n滑って転んでしまうほど、つるぴかに掃除しておきます！"
1009505-73 = "[s] \"滑らない程度にお願いします！\""
1009505-76 = "次は、お食事のサポートですね！"
1009505-77 = "これについては、出前の後片付けくらいになりますが……。"
1009505-78 = "出前の容器がちょっと……いえ、だいぶ積まれてますね。"
1009505-79 = "分別しておきます！"
1009505-80 = "[s] \"お手数おかけします……。\""
1009505-81 = "いえ、お任せください。#n私はご主人様の忠実なメイドですから！"
1009505-84 = "服の着替えを手伝うのも、メイドの仕事ですよね？"
1009505-85 = "[s5] \"えっと、ミドリさん……？\"\n[s6] \"何かちょっと怖いんだけど……？\""
1009505-88 = "大丈夫です、先生！#n身のまわりのことはすべて任せてください。"
1009505-95 = "この辺りが少し……整えますね。"
1009505-100 = "はい、さらに立派なお姿になりました！#nあ、鏡もお持ちしましょうか？"
1009505-103 = "皿洗いも、メイドの大事な仕事ですよね！"
1009505-107 = "マグカップが、えっと……5段重ねになっていますね……。"
1009505-108 = "[s] \"申し開きもございません！\""
1009505-109 = "いえ、お任せください。#n私はご主人様の忠実なメイドですから！"
1009505-110 = "[s] \"……一言一句同じセリフを、さっき聞いたような？\""
1009505-111 = "はい。キャラ立ちを考えると、決めセリフが必要かなと！"
1009505-120 = "今日は何だか、とっても充実していた気がします！"
1009505-121 = "このままずっと……。#n先生のメイドになってもいいんじゃないかな、って思うくらい……。"
1009505-122 = "[s] \"ミドリ、学生の本分を忘れちゃダメだよ！？\""
1009505-124 = "[ns] \"とにかく、ゲーム開発の勉強になったなら良かった。\""
1009505-125 = "……？"
1009505-129 = "……そ、そうでした！"
1009505-130 = "また本来の目的をすっかり忘れて……。"
1009505-131 = "……？た、確かに……。#nそれくらい熱中していた、ということかもしれません。"
1009505-132 = "良い経験になりました……！"
1009505-133 = "……そ、その、先生！"
1009505-134 = "最後にひとつ、お願いしても良いでしょうか……？"
1009505-135 = "[s] \"うん、何かな？\""
1009505-136 = "え、えっと、その……！"
1009505-137 = "……"
1009505-138 = "写真、を……。"
1009505-139 = "今この時を、残しておきたくって……。"
1009505-140 = "なので、よろしければ……。"
1009505-141 = "先生に写真を、撮っていただけないでしょうか……！"
1009505-146 = "（ミドリのオーダーに応え、まずはシャーレで良さそうな場所を探してみた）"
1009505-147 = "（やたら凝った設定を踏まえつつ、撮影が始まり……）"
1009505-151 = "[wa:790]― [log=미도리 메이드]も、[wa:1280]申し訳ございません。[wa:1680]ご主人様！[/log]"
1009505-152 = "[wa:2640]― [log=미도리 메이드]私、[wa:1400]また間違っちゃって、[wa:1780]転んじゃって……。[/log]"
1009505-155 = "[wa:1210]― [log=미도리 메이드]大丈夫……[wa:1100]です。[wa:1660]ご主人様からの、[wa:1660]お叱りなら……。[/log]"
1009505-156 = "[wa:3110]― [log=미도리 메이드]どんなものでも……[wa:2100]受け止めますから……。[/log]"
1009505-159 = "[wa:670]― [log=미도리 메이드]……ど、[wa:1360]どうでしょう？[/log]"
1009505-162 = "[ns] \"……何だかとっても良くない感じがする！\""
1009505-163 = "[wa:670]― [log=미도리 메이드]で、[wa:610]でもこれは[wa:1020]そういうシチュエーションですし！[/log]"
1009505-164 = "[wa:3330]― [log=미도리 메이드]写真を撮ってほしいと[wa:1360]お願いしたのは、[wa:2010]私ですし……。[/log]"
1009505-167 = "[wa:1330]― [log=미도리 메이드]えっと、[wa:1960]先生？[/log]"
1009505-168 = "[wa:2540]― [log=미도리 메이드]本日のメイドミドリは、[wa:2720]ご満足いただけたでしょうか？[/log]"
1009505-171 = "んんっ……なんだか、すっきりしました。"
1009505-172 = "ありがとうございます。先生も、お疲れ様でした。"
1009505-176 = "あの……どうかされましたか？"
1009505-177 = "[s] \"素数って、途中から数えるの難しくてちょうど良いなって。\""
1009505-178 = "……？"
1009505-179 = "……ふふっ。"
1009505-180 = "先生。私、今回のイラスト、全力で描き上げます。"
1009505-181 = "ですから、その……もしよろしければ……。"
1009505-182 = "完成したら、一番に先生に見てほしいんです。"
1009505-183 = "[s] \"うん、楽しみにしてるね。\""
1009505-184 = "はい！"
