[translation]
10012030-1 = "Episódio 3; Ataque Preventivo"
10012030-14 = "……Nosso resort até que,"
10012030-15 = "ficou bem limpo depois que arrumamos, né."
10012030-16 = "[s1] \"Ficou limpo, né, nosso resort\"\n[s2] \"Começou a criar um apego por ele?\""
10012030-17 = "E-eu só quis dizer isso por dizer! ……Dá para se hospedar aqui tranquilamente."
10012030-18 = "E-eu só quis dizer isso por dizer! ……Dá para se hospedar aqui tranquilamente."
10012030-19 = "Sim, sim! Como a Serika-chan disse. Está tão bom que daria até para receber clientes como um hotel☆"
10012030-20 = "I-isso ainda é cedo demais…… Só limpamos o local, as instalações e as máquinas ainda nem funcionam……"
10012030-21 = "Precisamos verificar a sala de controle e reativar os equipamentos e sistemas que ainda funcionam……"
10012030-22 = "E ainda temos que limpar os outros quartos……"
10012030-23 = "……Mas, é bom ver o quarto arrumado."
10012030-24 = "Sinto até que o quarto parece estar brilhando um pouco."
10012030-25 = "Já terminamos de arrumar o lugar onde vamos dormir, então está na hora de ir para a sala de controle……"
10012030-26 = "……Talvez a comida venha primeiro."
10012030-31 = "……Comida?"
10012030-33 = "Sim. Comida. A próxima coisa com a qual precisamos nos preocupar em uma ilha deserta é a questão da comida para sobreviver."
10012030-34 = "……Sobreviver?"
10012030-35 = "Não acho que estejamos em uma situação tão desesperadora assim…… O sinal do celular ainda pega aqui, e tem até um navio abandonado……"
10012030-36 = "Em lugares assim, o melhor é repor as proteínas animais com peixes."
10012030-37 = "……Sim. Vou pescar com certeza, pela \"sobrevivência\"."
10012030-38 = "……Shiroko-senpai, você não está ouvindo nada do que eu digo, né."
10012030-42 = "Ora, veja só, tem equipamento de pesca aqui."
10012030-46 = "……Estou pronta, vamos."
10012030-51 = "……Não vem com esse \"ora, veja só\". Você já veio totalmente preparada, não é?"
10012030-52 = "A Shiroko-chan está bem animada, hein."
10012030-53 = "……Ayane-chan, parece que vai ser melhor deixar a sala de controle para depois."
10012030-55 = "Bem, comida também é importante. A eletricidade podemos dar um jeito depois……"
10012030-56 = "É a primeira vez que ouço que a senpai tem interesse em pescar……"
10012030-57 = "É uma atividade de sobrevivência…… Pescar faz parte disso."
10012030-58 = "……Ah, então você queria praticar sobrevivência."
10012030-63 = "E se a Shiroko-chan for sozinha, pode ser perigoso se ela continuar insistindo……"
10012030-64 = "Sensei, pode nos fazer esse favor?"
10012030-65 = "[s3] \"Claro, pode deixar comigo.\"\n[s4] \"Estou indo nessa.\""
10012030-66 = "……Sensei?"
10012030-67 = "……Sensei?"
10012030-68 = "Você vai junto……?"
10012030-70 = "Obrigada~ Então, conto com você, Sensei."
10012030-71 = "Nós vamos explorar os arredores para ver se encontramos mais alguma coisa!"
10012030-72 = "Já que vai fazer isso, traga um peixe grande, hein!"
10012030-74 = "……Sim."
10012030-78 = "Pode deixar."
10012030-86 = "(Fui em direção à costa com a Shiroko)"
10012030-87 = "[ns5] \"Este lugar serve?\"\n[ns6] \"Tem muitos lugares bons por aqui.\""
10012030-88 = "……Sim, tudo bem. Aqui serve."
10012030-89 = "……Sim, tudo bem. Aqui serve."
10012030-90 = "Vara de pesca, isca, balde…… Podemos começar a qualquer momento."
10012030-91 = "[s] \"E a rede para tirar o peixe da água?\""
10012030-92 = "Isso não é problema."
10012030-93 = "Enquanto o Sensei segura a vara de pesca,"
10012030-94 = "eu só preciso atirar."
10012030-95 = "[s] \"Entendo...\""
10012030-99 = "[ns] \"...Atirar?\""
10012030-100 = "O método de pesca mais garantido. Peixe morto não escapa."
10012030-101 = "...Hm?"
10012030-102 = "Você está pensando que o peixe vai se despedaçar se eu atirar com a arma?"
10012030-103 = "...É verdade."
10012030-104 = "[s7] \"Você não tinha pensado nisso, né.\"\n[s8] \"...Vamos buscar a rede de pesca então.\""
10012030-105 = "...Sim."
10012030-106 = "...Sim."
10012030-107 = "...Está tudo bem, eu trouxe uma comigo."
10012030-108 = "...Ué, Ayane?"
10012030-112 = "Eu estava preocupada, então resolvi seguir vocês... e pelo visto, com razão."
10012030-113 = "[s9] \"Ayane, o que houve?\"\n[s10] \"Você veio até aqui?\""
10012030-114 = "B-bem, eu estava preocupada porque vocês duas estavam sozinhas..."
10012030-115 = "B-bem, eu estava preocupada porque vocês duas estavam sozinhas..."
10012030-116 = "As outras também disseram o mesmo... então, sabe..."
10012030-117 = "...Sim. Obrigada, Ayane."
10012030-119 = "Então eu fico com a vara de pescar e a Ayane atira com a pistola..."
10012030-120 = "Eu já disse que não pode atirar, Senpai... não é uma questão de potência."
10012030-121 = "Eu trouxe a rede de pesca, então por favor, use-a."
10012030-122 = "...Sim."
10012030-123 = "[s] \"Sinto que a Shiroko ouve bem o que a Ayane diz.\""
10012030-124 = "...Hã!?"
10012030-125 = "É-é mesmo...!?"
10012030-126 = "...Sim. O julgamento da Ayane geralmente está correto."
10012030-127 = "...Shiroko-senpai?"
10012030-128 = "Quando a Ayane diz que algo está errado, eu geralmente concordo. Acho que todas pensam assim."
10012030-129 = "Até sobre os peixes que pescamos aqui, se são comestíveis antes de preparar, se têm veneno..."
10012030-130 = "Ou se há chance de renderem dinheiro..."
10012030-132 = "Eu pretendia perguntar para a Ayane depois."
10012030-134 = "Senpai..."
10012030-135 = "Então vocês estavam aqui!!"
10012030-140 = "Ué, não parece ser o mesmo grupo de antes...?"
10012030-141 = "Eles tinham outros comparsas?"
10012030-142 = "Então, antes que chamem os outros..."
10012030-144 = "Com licença... bem, quem seriam vocês...?"
10012030-146 = "Fufufu... desta vez nós não vamos perder. Afinal, nós temos um \"esquadrão de apoio\" aqui!!"
10012030-147 = "Vamos lá, é a sua vez. Trabalhe pelo que você recebe, viu,"
10012030-148 = "Wakamo!!"
10012030-153 = "[ns] \"...?\""
10012030-155 = "[ns] \"...Hã\""
10012030-157 = "Ora, ora..."
10012030-158 = "Sinceramente, estou decepcionada. Vocês estavam tendo dificuldades contra um número tão pequeno de pessoas?"
10012030-159 = "Como pretendem caçar neste resort imenso assim... se nem contra três pessoas..."
10012030-160 = "...Hm?"
10012030-161 = "Essa... aparência."
10012030-162 = "...Será que"
10012030-163 = "...Sensei?"
10012030-164 = "[s11] \"...Wakamo?\"\n[s12] \"Que coincidência encontrar você aqui...\""
10012030-165 = "...?"
10012030-166 = "……？"
10012030-167 = "Eh…… q-que tipo de……? O que, afinal, está acontecendo aqui……?"
10012030-172 = "……。"
10012030-174 = "E-espere um pouco……? Primeiro, vamos organizar a situação……."
10012030-178 = "……H-hiin!?"
10012030-179 = "[s13] \"Shiroko!?\"\n[s14] \"Atacar do nada é um pouco……\""
10012030-182 = "……Hmm."
10012030-183 = "A melhor defesa é o ataque. Sensei, por favor, assuma o comando."
