[translation]
10012030-1 = "第3話;先手必勝"
10012030-14 = "……私たちのリゾートも、"
10012030-15 = "片付けたら案外キレイになったわね。"
10012030-16 = "[s1] \"キレイになったよね「私たちのリゾート」”\n[s2] \"ちょっと愛着が湧いてきた？\""
10012030-17 = "ちょ、ちょっと言ってみたかっただけよ！……これなら泊まるのに十分よね。"
10012030-18 = "ちょ、ちょっと言ってみたかっただけよ！……これなら泊まるのに十分よね。"
10012030-19 = "うんうん！セリカちゃんの言う通りです。このままホテルとしてお客様を迎えてもいいくらい☆"
10012030-20 = "そ、それはまだ早いですよ……掃除しただけで、施設も機械もまだ全然動いてないですし……。"
10012030-21 = "制御室を確認して、使える設備やシステムを再稼働させないと……"
10012030-22 = "他の部屋の掃除もまだありますし……"
10012030-23 = "……でも、部屋が片付いてるとスッキリしますね。"
10012030-24 = "なんだか少し、部屋の中が輝いて見えます。"
10012030-25 = "泊まる場所の片付けは終わりましたし、そろそろ制御室を……。"
10012030-26 = "……食料が先かも。"
10012030-31 = "……食料？"
10012030-33 = "うん。食料。無人島で次に気にしなきゃいけないのは生存のための食料問題。"
10012030-34 = "……生存？"
10012030-35 = "別にそんな切羽詰まった状況じゃないと思うけど……ここはスマホの電波も飛んでるし、捨てられた船もあるし……。"
10012030-36 = "こういうところでは、魚で動物性たんぱく質を補給するのが最善。"
10012030-37 = "……ん。必ず獲るよ「生存」のために。"
10012030-38 = "……シロコ先輩、聞く耳持ってないわね。"
10012030-42 = "なんと、ここに釣りの道具が。"
10012030-46 = "……準備はできてる、行こう。"
10012030-51 = "……「なんと、ここに」じゃないでしょ。完全に準備してきてるじゃない。"
10012030-52 = "シロコちゃんイキイキしてるねぇ。"
10012030-53 = "……アヤネちゃん、どうやら制御室に行くのは後にした方が良さそうだよ。"
10012030-55 = "まあ、食料も大事ですからね。電気は後からでもなんとかなりますし……。"
10012030-56 = "先輩が釣りに興味があるなんて……初耳でした。"
10012030-57 = "サバイバル活動だから……釣りもその一環。"
10012030-58 = "……ああ、サバイバルがしたかったのね。"
10012030-63 = "シロコちゃん一人じゃ危なくなっても続けそうだし……"
10012030-64 = "先生、お願いしてもいい？"
10012030-65 = "[s3] \"もちろん、任せて。\"\n[s4] \"行ってくるね。\""
10012030-66 = "……先生？"
10012030-67 = "……先生？"
10012030-68 = "一緒に行くの……？"
10012030-70 = "ありがとう～じゃ、よろしくね先生。"
10012030-71 = "私たちは他に何かないか、周辺を探してきますね！"
10012030-72 = "せっかくなら大物を頼んだわよ！"
10012030-74 = "……うん。"
10012030-78 = "任せて。"
10012030-86 = "（シロコと一緒に海岸に向かった）"
10012030-87 = "[ns5] \"この辺でいいかな？\"\n[ns6] \"良さそうな場所が多いね。\""
10012030-88 = "……うん、よし。ここで大丈夫。"
10012030-89 = "……うん、よし。ここで大丈夫。"
10012030-90 = "釣竿、餌、バケツ……いつでも始められるよ。"
10012030-91 = "[s] \"釣った魚を持ち上げるタモ網は？\""
10012030-92 = "それは大丈夫。"
10012030-93 = "先生が釣竿を支えてくれる間に、"
10012030-94 = "私が撃てばいいから。"
10012030-95 = "[s] \"なるほど……。\""
10012030-99 = "[ns] \"……撃つ？\""
10012030-100 = "いちばん確実な釣りの方法。死んだ魚は逃げられない。"
10012030-101 = "……うん？"
10012030-102 = "銃で撃ったら魚が砕けちゃうんじゃないかって？"
10012030-103 = "……たしかに。"
10012030-104 = "[s7] \"そこまでは考えてなかったのね。\"\n[s8] \"……タモ網を取りに行こっか。\""
10012030-105 = "……うん。"
10012030-106 = "……うん。"
10012030-107 = "……大丈夫です、私が持って来てます。"
10012030-108 = "……あれ、アヤネ？"
10012030-112 = "なんとなく心配でついて来てみたら……やっぱり。"
10012030-113 = "[s9] \"アヤネ、どうしたの？\"\n[s10] \"来てくれたの？\""
10012030-114 = "な、なんとなくお二人だけだと心配で……。"
10012030-115 = "な、なんとなくお二人だけだと心配で……。"
10012030-116 = "みんなもそう言ってたし……なので、あの……。"
10012030-117 = "……うん。ありがとう、アヤネ。"
10012030-119 = "じゃあ私が釣竿を持って、アヤネが拳銃で撃つってことで……。"
10012030-120 = "だから撃っちゃダメですってば先輩……威力の問題じゃないですよ。"
10012030-121 = "ちゃんとタモ網持ってきましたから、使ってください。"
10012030-122 = "……うん。"
10012030-123 = "[s] \"シロコはアヤネの言うことはよく聞いてる気がする。\""
10012030-124 = "……えっ！？"
10012030-125 = "そ、そうなんですか……！？"
10012030-126 = "……うん。アヤネの判断は大体正しいから。"
10012030-127 = "……シロコ先輩？"
10012030-128 = "アヤネが違うって言う時は、大体私も違うって思ってるし。みんなそうだと思うよ。"
10012030-129 = "ここで釣った魚たちも、調理をする前に食べていい魚なのか、毒はないのかとか……"
10012030-130 = "お金になる可能性はないのか……"
10012030-132 = "後でアヤネに聞くつもりだったの。"
10012030-134 = "先輩……。"
10012030-135 = "ここにいたのか！！"
10012030-140 = "あれ、さっきの連中じゃないような……？"
10012030-141 = "他に仲間がいたのかよ。"
10012030-142 = "なら、他の連中を呼ばれる前に……"
10012030-144 = "あの……えっと、どちら様でしょう……？"
10012030-146 = "ふっふっふ……今回はうちらも負けないわよ。なんたって、こっちには「応援部隊」がいるのよ！！"
10012030-147 = "さあ、出番よ。給料分はちゃんと働いてちょうだいね、"
10012030-148 = "[ruby=・  ・  ・]ワカモ[/ruby]！！"
10012030-153 = "[ns] \"……？\""
10012030-155 = "[ns] \"……えっ\""
10012030-157 = "あらあら……。"
10012030-158 = "正直、ガッカリです。たったこれっぽっちの人数に苦戦、されていたんですか？"
10012030-159 = "それでどうやってこの広いリゾートを狩り尽くすと言うんですか……たったの三人すら……"
10012030-160 = "……ん？"
10012030-161 = "その……お姿。"
10012030-162 = "……もしかして"
10012030-163 = "……先生？"
10012030-164 = "[s11] \"……ワカモ？\"\n[s12] \"こんなところで、奇遇だね……。\""
10012030-165 = "……？"
10012030-166 = "……？"
10012030-167 = "えっ……ど、どういう……？これは、一体どういう状況なのです……？"
10012030-172 = "……。"
10012030-174 = "ま、待ってください……？まずは状況の整理を……。"
10012030-178 = "……ひ、ひぃん！？"
10012030-179 = "[s13] \"シロコ！？\"\n[s14] \"いきなり攻撃はちょっと……\""
10012030-182 = "……ん。"
10012030-183 = "先手必勝。先生、指揮をお願い。"
