[translation]
22090-1 = "第9話;残酷な真実（１）"
22090-7 = "[ns] \"[ruby=つかつき]調月[/ruby]、リオ……？\""
22090-8 = "彼女は……ミレニアムの生徒会長です。"
22090-9 = "……か、会長が、なんで、こ、ここに……"
22090-10 = "…………。"
22090-12 = "ええ、私はミレニアムサイエンススクールの中枢――セミナーを率いる者。"
22090-13 = "そして、「千年難題」の解決を望み、星を追う者。"
22090-14 = "本来ならシャーレの先生とは、正式に挨拶を交わす席を設けたかったのだけれど――"
22090-15 = "今日は別の用事があるから、また次の機会に……"
22090-16 = "[s] \"「真実」とは、一体？\""
22090-17 = "そう――「真実」"
22090-18 = "貴方達は数日前の「事件」で一つの考えに到達したのではなくて？"
22090-19 = "今まで友人だと思っていた彼女が見せた――異なる姿。#nそして、同時に生じた破壊と混乱。"
22090-20 = "そして――貴方達はこう思ったのでは？"
22090-25 = "「今まで友人だと思っていたものは、そうではないのかもしれない」――と。"
22090-26 = "そうでしょう？#nシャーレの先生。"
22090-27 = "……！！"
22090-31 = "[ns] \"リオ、一体何を――\""
22090-32 = "単刀直入に言えば――"
22090-35 = "貴方の後ろにいるその少女……"
22090-36 = "――少女の外見を備えた「ソレ」は、普通の生徒ではないわ。"
22090-37 = "貴方たちがアリスと名付けたソレは――"
22090-40 = "――未知から侵略してくる[ruby=Divi:Sion]「不可解な軍隊」[/ruby]の指揮官であり、"
22090-41 = "「名もなき神」を信仰する無名の司祭が崇拝した「オーパーツ」であり――#n古の民が残した遺産――"
22090-42 = "その名も……"
22090-44 = "「名もなき神々の王女AL-1S」"
22090-51 = "[ns] \"名もなき……？\""
22090-52 = "アリスは……"
22090-53 = "アリスには……理解できません……。"
22090-54 = "そうですよ！何を言ってるんですか！？"
22090-55 = "一方的に脳内の独自設定を話さないでください！"
22090-56 = "よく、お姉ちゃんがそうやって話してきたから分かるんです。#n勝手にアリスに設定を付与しないで。"
22090-58 = "み、ミドリ……。"
22090-59 = "――ごめんなさい。私の配慮が足りなかったわね。"
22090-60 = "もっと理解しやすいよう、貴方たちの好きな「ゲーム」に例えましょう。"
22090-64 = "つまり、「アリス」。#n貴女は――"
22090-65 = "この世界を滅ぼすために生まれた「魔王」なのよ。"
22090-66 = "……！！"
22090-67 = "[s] \"アリスが……魔王？\""
22090-68 = "またそんな設定を……どうしてそんなことを言うんですか！？"
22090-69 = "いったい、何を企んでいるんですか！？"
22090-70 = "企んでなどいないわ。#n――むしろ、逆に聞きたいのだけど……"
22090-71 = "貴女たちは、直接見たのではなくて？#n[ruby=Divi:Sion]「不可解な軍隊」[/ruby]とアリスが接触した事で何が起きたのかを。"
22090-72 = "[s] \"[ruby=Divi:Sion]「不可解な軍隊」[/ruby]……。\""
22090-80 = "[ns] \"あの……ロボットのこと……？\""
22090-81 = "――その通り。"
22090-82 = "本来、あんな事になる予定ではなかったのだけれど……完全にこちらのミスよ。"
22090-83 = "C&CとAMASを通じて、全部追跡したと思っていたのに――#nまさか、監視網を掻い潜った個体がいたなんて。"
22090-84 = "それは完全に私の不手際によるもの。#n謝罪をここに。"
22090-88 = "えっ？謝罪？会長が！？#nえっ……？"
22090-89 = "――でも。"
22090-90 = "[s] \"でも？\""
22090-91 = "そのおかげで、私の仮説は証明された。"
22090-93 = "貴方たちが接触したソレは「廃墟」から溢れ出した「災禍」。"
22090-94 = "ミレニアムに――ひいては、キヴォトス全土に終焉をもたらす悪夢。"
22090-95 = "そして――アリスの存在が「廃墟」からヤツらを呼び寄せているという事が証明された。"
22090-97 = "今回は、運よく壊れかけの個体と接触するに留まったけれど……"
22090-98 = "次はこんなものでは済まないでしょうね。"
22090-110 = "[ns] \"…………。\""
22090-111 = "この脅威を解決する方法は一つだけよ、アリス。"
22090-112 = "解決、する方法……？"
22090-113 = "そう。#n――アリス、貴方が消えること。"
22090-114 = "この世界に貴方は存在してはいけない。"
22090-115 = "……そ……んな……。"
22090-116 = "アリスは……ただ……勇者に……"
22090-117 = "みんなと一緒に……ゲームを……。#nクエストを、したかった……それだけなのに……。"
22090-118 = "いいえ、それは叶わないわ。"
22090-119 = "私はゲームに詳しくはないけれど……辞書的な知識ならあるの。"
22090-123 = "だから、貴方に質問をするわね。"
22090-124 = "貴方は己を勇者と呼んでいるけれど……"
22090-128 = "「勇者」とは、友人に剣を向ける存在かしら？"
22090-130 = "むしろ、貴方のやった事は[ruby=魔王]悪役[/ruby]ではなくて？"
22090-134 = "……！"
22090-138 = "アリスちゃん！聞かなくていい！"
22090-139 = "生徒会長が変わり者だとは聞いていたけど……#nこんな人だとは思わなかった……！"
22090-141 = "せ……先生……！"
22090-143 = "[ns] \"……リオ、やめて。\""
22090-144 = "やめる？何を？"
22090-145 = "事実から目を背けるのは思いやりではないわ、先生。"
22090-146 = "それは単なる「現実逃避」に過ぎない――負うべき責任の放棄は、極めて非合理的な行動よ。"
22090-147 = "[s] \"合理、非合理の問題じゃないよ……。\""
22090-148 = "それじゃあ、アリスは……"
22090-149 = "アリスは……どうすればいいんですか……？"
22090-150 = "さっきも言った通り――"
22090-151 = "すべての元凶はアリス、"
22090-152 = "貴方がここにいるから起きている。"
22090-153 = "ならば、あとは簡単でしょう？"
22090-154 = "爆弾は――安全な場所で解体すればいいだけだもの。"
22090-155 = "爆弾を……解体……？"
22090-156 = "ああ……分かりづらかったかしら？"
22090-163 = "つまり――貴方のヘイローを破壊すれば解決する、という事よ。"
22090-170 = "！？！？"
22090-175 = "ああでも……貴方のソレは本当にヘイローなのかしら？"
22090-176 = "生徒ではない貴方が、どうしてヘイローを持っているのか……#n理由は分からないけれど――"
22090-177 = "ただの機械である貴方がヘイローを持っているのは……"
22090-178 = "そう、狂気に包まれたあのAIと同じ。"
22090-179 = "ええ……なおさら、貴方を放ってなどおけない。"
22090-180 = "[s] \"リオ。\""
22090-182 = "[ns] \"それ以上の言葉は、許せないよ。\""
22090-183 = "……私の言動が不愉快ならば、謝罪するわ。"
22090-184 = "昔から私の事が嫌いな人間は多かったもの。"
22090-185 = "――それは私に問題があるという事でしょうから。"
22090-186 = "でも、理解されなくても構わないわ。私は、皆を守りたいだけ。"
22090-187 = "さあ、貴方の出番よ――[ruby=みかも]美甘[/ruby]ネル。"
22090-194 = "……！"
22090-195 = "ネル……先輩……。"
22090-196 = "…………"
22090-200 = "[ns] \"ネル……？\""
22090-201 = "…………"
22090-202 = "あまり悪く思わないでやってね。"
22090-203 = "元々、C&Cはセミナー……正確には、私直属のエージェントなの。"
22090-204 = "そこに私的な感情はないわ。#n私の命令に粛々と従うだけ。"
22090-205 = "C&Cのリーダ――ネル相手では、いくら先生でもゲーム開発部だけでは抵抗できないでしょう？"
22090-206 = "たとえ外部に助けを求めたとしても――"
22090-214 = "この周囲は既に、AMASで掌握しているわ。#n救援が間に合う事はない。"
22090-215 = "さあ、仕事の時間よ。#nネル、アリスを回収してくれるかしら？"
22090-217 = "…………。"
22090-218 = "ネル先輩……。"
22090-222 = "……ふっ。"
22090-223 = "ふっ……？"
22090-227 = "くっそ、やってられっかよ！"
22090-231 = "ネル……一体何のつもり？"
22090-236 = "[ns] \"ネル……！\""
22090-238 = "……ネル先輩？"
22090-239 = "今までだって依頼内容を気に入ったことはあんまなかったけどよぉ。"
22090-240 = "同じ学園の生徒を――それも、なんもわかってねぇヤツを誘拐しろってか？"
22090-241 = "――んな依頼やってられっかよ。"
22090-242 = "もう、てめぇに付き合う義理はねぇよ――リオ！"
22090-243 = "ネル……ここで裏切るつもり？"
22090-244 = "裏切る？#nハッ！てめえの指示が気に入らねぇだけだ。"
22090-246 = "そう、そういうことなのね……。"
22090-247 = "ネル、貴方はいつもそう。"
22090-248 = "気分次第で命令を違反するその姿――"
22090-249 = "いつ爆発するかわからないかんしゃく玉のような側面があなたの長所であり……#n一番厄介だった。"
22090-250 = "……だから、この状況だって、すべて想定していたのだけれど。"
22090-251 = "最初からC&C全員ではなく、貴方だけを呼び出しておいて正解だった。"
22090-252 = "あぁ？んだって？"
22090-253 = "トキ――貴方の出番よ。"
22090-258 = "[ns] \"ネル、危ない！\""
22090-259 = "あぁ？"
22090-268 = "誰だてめぇは！？"
22090-274 = "はじめまして、先輩。#n――そして先生。"
22090-275 = "C&C所属、コールサインゼロフォー。ご挨拶申し上げます。"
22090-276 = "え……五番目……？"
22090-277 = "[s] \"C&C……？\""
22090-278 = "背後から奇襲たぁ、舐めた真似してくれるじゃねぇか。"
22090-279 = "覚悟はできてんだろうなぁ！？"
22090-280 = "[ns] \"ネル、待って……！\""
