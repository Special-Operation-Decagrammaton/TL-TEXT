[translation]
22090-1 = "Episódio 9; A Verdade Cruel (1)"
22090-7 = "[ns] \"Tsukatsuki Rio...?\""
22090-8 = "Ela é... a presidente do conselho estudantil do Millennium."
22090-9 = "......A-a presidente, por que, o que ela está fazendo aqui..."
22090-10 = "............"
22090-12 = "Sim, eu sou aquela que lidera o centro do Millennium Science School — o Seminar."
22090-13 = "E aquela que deseja resolver o \"Milênio de Dificuldades\" e persegue as estrelas."
22090-14 = "Em circunstâncias normais, eu gostaria de ter marcado uma reunião formal para cumprimentar o professor do Schale, mas..."
22090-15 = "Tenho outros assuntos para tratar hoje, então deixaremos para uma próxima oportunidade..."
22090-16 = "[s] \"O que seria essa 'verdade'?\""
22090-17 = "Exatamente — a \"verdade\"."
22090-18 = "Vocês não chegaram a uma conclusão após o \"incidente\" de alguns dias atrás?"
22090-19 = "A forma diferente que ela, a quem vocês consideravam uma amiga até então, revelou. #nE, ao mesmo tempo, a destruição e o caos que surgiram."
22090-20 = "E então... vocês não pensaram o seguinte?"
22090-25 = "\"Aquela que eu considerava minha amiga pode não ser quem eu pensava\" — foi isso, não foi?"
22090-26 = "Não é verdade? #nProfessor do Schale."
22090-27 = "......!!"
22090-31 = "[ns] \"Rio, o que exatamente você está...\""
22090-32 = "Para ser direta..."
22090-35 = "Aquela garota atrás de você..."
22090-36 = "— Esse \"ser\" que possui a aparência de uma garota não é uma estudante comum."
22090-37 = "Aquilo que vocês nomearam como Alice é..."
22090-40 = "— A comandante do \"Exército Inexplicável\" que invade a partir do desconhecido,"
22090-41 = "um \"OOPArt\" adorado pelos sacerdotes sem nome que cultuam o \"Deus Sem Nome\" — #num legado deixado pelo povo antigo —"
22090-42 = "seu nome é..."
22090-44 = "\"AL-1S, a Princesa dos Deuses Sem Nome\""
22090-51 = "[ns] \"Sem nome...?\""
22090-52 = "Alice é..."
22090-53 = "Alice... não consegue entender..."
22090-54 = "É isso mesmo! Do que você está falando!?"
22090-55 = "Não venha inventar teorias da sua própria cabeça unilateralmente!"
22090-56 = "Eu sei bem como é, porque a minha irmã sempre faz isso. #nNão imponha configurações à Alice por conta própria."
22090-58 = "Mi-Midori..."
22090-59 = "— Peço desculpas. Minha consideração foi insuficiente."
22090-60 = "Para que seja mais fácil de entender, vamos usar como exemplo um \"jogo\" que vocês gostam."
22090-64 = "Em suma, \"Alice\". #nVocê é..."
22090-65 = "o \"Rei Demônio\" que nasceu para destruir este mundo."
22090-66 = "......!!"
22090-67 = "[s] \"Alice é... o Rei Demônio?\""
22090-68 = "De novo com essas histórias... por que você diz essas coisas!?"
22090-69 = "O que exatamente você está planejando!?"
22090-70 = "Não estou planejando nada. #n— Na verdade, eu é que gostaria de perguntar..."
22090-71 = "Vocês não viram com os próprios olhos? #nO que aconteceu quando o \"Exército Inexplicável\" entrou em contato com a Alice."
22090-72 = "[s] \"O 'Exército Inexplicável'....\""
22090-80 = "[ns] \"Aquilo... sobre os robôs...?\""
22090-81 = "— Exatamente."
22090-82 = "Originalmente, não era para ter acontecido daquela forma... foi um erro totalmente meu."
22090-83 = "Eu pensei que tinha rastreado tudo através da C&C e da AMAS — #nquem diria que haveria indivíduos que escapariam da rede de vigilância."
22090-84 = "Isso foi inteiramente por minha negligência. #nPeço desculpas por isso."
22090-88 = "Hã? Desculpas? A presidente!? #nHã...?"
22090-89 = "――Mas."
22090-90 = "[s] \"Mas?\""
22090-91 = "Graças a isso, minha hipótese foi comprovada."
22090-93 = "Aquilo com que vocês entraram em contato é uma \"calamidade\" que transbordou das \"ruínas\"."
22090-94 = "Um pesadelo que trará o fim ao Millennium — e, por extensão, a todo o Kivotos."
22090-95 = "E então... ficou provado que a existência de Alice é o que atrai essas coisas das \"ruínas\"."
22090-97 = "Desta vez, tivemos a sorte de entrar em contato apenas com um exemplar danificado, mas..."
22090-98 = "Da próxima vez, não será algo tão simples assim."
22090-110 = "[ns] \"………….\""
22090-111 = "Só existe uma maneira de resolver essa ameaça, Alice."
22090-112 = "Uma maneira... de resolver?"
22090-113 = "Exato. #n――Alice, você precisa desaparecer."
22090-114 = "Você não deveria existir neste mundo."
22090-115 = "……Isso…… não pode ser……"
22090-116 = "Alice só queria... ser uma heroína..."
22090-117 = "Jogar... com todo mundo... #nCompletar missões... era só isso que eu queria..."
22090-118 = "Não, isso não será possível."
22090-119 = "Eu não entendo muito de jogos, mas... conheço as definições de dicionário."
22090-123 = "Por isso, vou lhe fazer uma pergunta."
22090-124 = "Você se autodenomina uma heroína, mas..."
22090-128 = "Será que uma \"heroína\" é alguém que aponta sua espada para os amigos?"
22090-130 = "Na verdade, o que você fez não seria algo de um vilão?"
22090-134 = "……!"
22090-138 = "Alice! Não precisa ouvir isso!"
22090-139 = "Eu ouvi dizer que a presidente do conselho estudantil era excêntrica, mas... #nEu não imaginava que ela fosse assim...!"
22090-141 = "Se... Sensei...!"
22090-143 = "[ns] \"……Rio, pare com isso.\""
22090-144 = "Parar? Com o quê?"
22090-145 = "Ignorar os fatos não é um ato de bondade, Sensei."
22090-146 = "Isso não passa de uma \"fuga da realidade\" — abdicar da responsabilidade que se deve assumir é um comportamento extremamente irracional."
22090-147 = "[s] \"Não é uma questão de ser racional ou irracional…….\""
22090-148 = "Então, a Alice..."
22090-149 = "O que a Alice... deve fazer...?"
22090-150 = "Como eu disse antes――"
22090-151 = "A causa de tudo é a Alice,"
22090-152 = "Tudo está acontecendo porque você está aqui."
22090-153 = "Sendo assim, o resto é simples, não é?"
22090-154 = "Uma bomba... basta ser desativada em um local seguro."
22090-155 = "Desativar... a bomba...?"
22090-156 = "Ah... fui pouco clara?"
22090-163 = "Em outras palavras―― o problema será resolvido se destruirmos o seu halo."
22090-170 = "！？！？"
22090-175 = "Ah, mas... será que isso que você tem é realmente um halo?"
22090-176 = "Você não é uma estudante, então por que possui um halo... #nEu não sei o motivo, mas――"
22090-177 = "O fato de você, uma simples máquina, possuir um halo..."
22090-178 = "Sim, é exatamente como aquela IA envolta em loucura."
22090-179 = "Sim... por isso mesmo, não posso deixar você solta por aí."
22090-180 = "[s] \"Rio.\""
22090-182 = "[ns] \"Não vou permitir que diga mais nada além disso.\""
22090-183 = "……Se minhas palavras foram desagradáveis, peço desculpas."
22090-184 = "Sempre houve muitas pessoas que me odiaram."
22090-185 = "――Isso provavelmente significa que o problema sou eu."
22090-186 = "Mas não me importo se não me entenderem. Eu só quero proteger a todos."
22090-187 = "Vamos, é a sua vez――Nerú Mikamo."
22090-194 = "……！"
22090-195 = "Nerú…… senpai……."
22090-196 = "…………"
22090-200 = "[ns] \"Nerú……?\""
22090-201 = "…………"
22090-202 = "Não leve para o lado pessoal, por favor."
22090-203 = "Originalmente, a C&C é um grupo do Seminar…… ou melhor, agentes sob meu comando direto."
22090-204 = "Não há sentimentos pessoais nisso. #nElas apenas seguem minhas ordens rigorosamente."
22090-205 = "Contra a líder da C&C, Nerú, nem mesmo você, Sensei, conseguiria resistir apenas com o Clube de Desenvolvimento de Jogos, certo?"
22090-206 = "Mesmo que pedisse ajuda externa――"
22090-214 = "Esta área já está sob o controle do AMAS. #nNenhum resgate chegará a tempo."
22090-215 = "Vamos, hora de trabalhar. #nNerú, você poderia capturar a Alice?"
22090-217 = "…………."
22090-218 = "Nerú senpai……."
22090-222 = "……Hmph."
22090-223 = "Hmph……?"
22090-227 = "Droga, eu não vou fazer isso!"
22090-231 = "Nerú…… o que você pensa que está fazendo?"
22090-236 = "[ns] \"Nerú……!\""
22090-238 = "……Nerú senpai?"
22090-239 = "Eu nunca gostei muito do conteúdo das missões até agora, mas..."
22090-240 = "Sequestrar uma aluna da mesma escola―― e ainda por cima, alguém que não entende nada do que está acontecendo?"
22090-241 = "――Eu não vou aceitar esse tipo de missão."
22090-242 = "Eu não tenho mais nenhuma obrigação de te seguir―― Rio!"
22090-243 = "Nerú…… você pretende me trair aqui?"
22090-244 = "Trair? #nHah! Eu só não gosto das suas ordens."
22090-246 = "Entendo, é assim então……."
22090-247 = "Nerú, você é sempre assim."
22090-248 = "Essa sua atitude de violar ordens conforme o seu humor――"
22090-249 = "Esse seu lado imprevisível, como uma bomba-relógio, sempre foi sua maior qualidade…… #ne também o seu maior defeito."
22090-250 = "……Por isso, eu já tinha previsto que essa situação aconteceria."
22090-251 = "Foi uma boa decisão chamar apenas você, em vez de toda a C&C desde o início."
22090-252 = "Ah? O que você disse?"
22090-253 = "Toki―― é a sua vez."
22090-258 = "[ns] \"Nerú, cuidado!\""
22090-259 = "Ah?"
22090-268 = "Quem é você!?"
22090-274 = "Prazer em conhecê-la, senpai. #n――E prazer, Sensei."
22090-275 = "Da C&C, codinome Zero-Four. Apresento-me."
22090-276 = "Eh…… a quinta……?"
22090-277 = "[s] \"C&C……?\""
22090-278 = "Um ataque surpresa pelas costas, que atitude covarde."
22090-279 = "Espero que esteja preparada para as consequências!"
22090-280 = "[ns] \"Nerú, espere……!\""
