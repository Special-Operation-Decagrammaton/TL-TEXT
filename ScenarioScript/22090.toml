[translation]
22090-1 = "Episódio 9; Verdade Cruel (1)"
22090-7 = "[ns] \"Tsukatsuki, Rio...?\""
22090-8 = "Ela é... a presidente do conselho estudantil da Millennium."
22090-9 = "......P, Presidente, por que, por que você está... aqui..."
22090-10 = "............"
22090-12 = "Sim, eu sou aquela que lidera o centro da Millennium Science School―― o Seminar."
22090-13 = "E aquela que deseja resolver o 'Milênio de Problemas' e busca as estrelas."
22090-14 = "Originalmente, eu gostaria de ter arranjado um momento para trocarmos saudações formais com o Sensei da Schale――"
22090-15 = "Mas tenho outros assuntos para tratar hoje, então ficará para uma próxima oportunidade..."
22090-16 = "[s] \"O que é essa tal de 'verdade'?\""
22090-17 = "Isso mesmo―― a 'verdade'."
22090-18 = "Vocês não chegaram a uma conclusão com o 'incidente' de alguns dias atrás?"
22090-19 = "A 'outra face' que ela, que vocês achavam ser uma amiga, revelou. #n E, ao mesmo tempo, a destruição e o caos que ocorreram."
22090-20 = "E então―― vocês não pensaram o seguinte?"
22090-25 = "'Aquela que pensávamos ser uma amiga, talvez não seja o que pensávamos.'――"
22090-26 = "Não é verdade? #n Sensei da Schale."
22090-27 = "......!!"
22090-31 = "[ns] \"Rio, o que você está――\""
22090-32 = "Sendo direta――"
22090-35 = "Aquela garota atrás de você..."
22090-36 = "――'Aquilo' que possui a aparência de uma garota, não é uma aluna comum."
22090-37 = "Aquilo que vocês nomearam de Aris é――"
22090-40 = "――A comandante de um '[ruby=Divi:Sion]Exército Misterioso[/ruby]' que invade o desconhecido,"
22090-41 = "É um 'Oopart' venerado pelos Sacerdotes Sem Nome que adoram o 'Deus Sem Nome'―― O legado deixado pelos povos antigos――"
22090-42 = "O seu nome é..."
22090-44 = "'A Princesa dos Deuses Sem Nome, AL-1S'."
22090-51 = "[ns] \"Deuses Sem Nome...?\""
22090-52 = "Aris é..."
22090-53 = "Aris... não consegue... entender..."
22090-54 = "É isso aí! Do que você está falando!?"
22090-55 = "Não venha inventando configurações mirabolantes da sua cabeça unilateralmente!"
22090-56 = "Eu sei bem porque a minha irmã sempre falava assim. #n Não coloque configurações na Aris por conta própria."
22090-58 = "Mi, Midori..."
22090-59 = "――Me desculpe. Falta de consideração da minha parte."
22090-60 = "Para que vocês compreendam melhor, vou usar o 'jogo' que vocês tanto gostam como exemplo."
22090-64 = "Ou seja, 'Aris'. #n Você é――"
22090-65 = "Uma 'Maou' (Rei Demônio) que nasceu para destruir este mundo."
22090-66 = "......!!"
22090-67 = "[s] \"A Aris... é uma Maou?\""
22090-68 = "De novo com essas configurações... Por que você está dizendo essas coisas!?"
22090-69 = "O que exatamente você está planejando!?"
22090-70 = "Não estou planejando nada. #n ――Pelo contrário, sou eu quem pergunto..."
22090-71 = "Vocês não viram com os próprios olhos? #n O que aconteceu quando Aris entrou em contato com o '[ruby=Divi:Sion]Exército Misterioso[/ruby]'."
22090-72 = "[s] \"O '[ruby=Divi:Sion]Exército Misterioso[/ruby]'......\""
22090-80 = "[ns] \"Você se refere àqueles... robôs...?\""
22090-81 = "――Exatamente."
22090-82 = "Originalmente, não era para ter acontecido daquela forma... Foi um erro totalmente meu."
22090-83 = "Eu achei que tinha rastreado todos eles através da C&C e do AMAS―― #n Quem diria que haveriam indivíduos que escapariam da nossa rede de monitoramento."
22090-84 = "Isso foi inteiramente por minha negligência. #n Peço desculpas aqui."
22090-88 = "Eh? Desculpas? A Presidente!? #n Eh...?"
22090-89 = "――Mas."
22090-90 = "[s] \"Mas?\""
22090-91 = "Graças a isso, a minha hipótese foi provada."
22090-93 = "Aquilo com que vocês entraram em contato é um 'Flagelo' que transbordou das 'Ruínas'."
22090-94 = "Um pesadelo que trará o fim à Millennium―― e consequentemente, a todo o mundo de Kivotos."
22090-95 = "E―― a existência da Aris provou que ela está atraindo eles para fora das 'Ruínas'."
22090-97 = "Desta vez, vocês deram a sorte de entrar em contato apenas com uma unidade danificada, mas..."
22090-98 = "Da próxima vez, não será tão simples quanto isso."
22090-110 = "[ns] \"………….\""
22090-111 = "Existe apenas uma forma de resolver essa ameaça, Aris."
22090-112 = "Resolver... o problema...?"
22090-113 = "Sim. #n ――Aris, a solução é você desaparecer."
22090-114 = "Você não pode existir neste mundo."
22090-115 = "......Isso... não pode ser..."
22090-116 = "A Aris... só queria ser uma heroína..."
22090-117 = "Queria jogar... com todo mundo... #n Queria fazer quests... Era só isso..."
22090-118 = "Não, isso não será realizado."
22090-119 = "Eu não entendo muito de jogos... Mas tenho conhecimento básico de dicionário."
22090-123 = "Por isso, vou te fazer uma pergunta."
22090-124 = "Você se autodenomina uma 'Heroína', mas..."
22090-128 = "'Heroína' é o tipo de existência que aponta sua espada para amigos?"
22090-130 = "Pelo contrário, o que você fez não é coisa de [ruby=Maou]vilão[/ruby]?"
22090-134 = "......!"
22090-138 = "Aris-chan! Não ouça o que ela diz!"
22090-139 = "Eu ouvi dizer que a presidente do conselho estudantil era excêntrica, mas... #n Não imaginava que ela fosse alguém assim...!"
22090-141 = "S... Sensei...!"
22090-143 = "[ns] \"......Rio, pare com isso.\""
22090-144 = "Parar? O quê?"
22090-145 = "Desviar o olhar dos fatos não é um ato de compaixão, Sensei."
22090-146 = "Isso não passa de uma 'fuga da realidade'―― Abandonar a responsabilidade que se deve assumir é um comportamento extremamente irracional."
22090-147 = "[s] \"Não é uma questão de racional ou irracional...\""
22090-148 = "Sendo assim, o que a Aris..."
22090-149 = "O que a Aris deve fazer...?"
22090-150 = "Como eu disse antes――"
22090-151 = "A causa de tudo é Aris,"
22090-152 = "Tudo está acontecendo porque você está aqui."
22090-153 = "Se é assim, o resto é simples, não é?"
22090-154 = "Uma bomba―― basta ser desmontada em um local seguro."
22090-155 = "Desmontar... a bomba...?"
22090-156 = "Ah... Fui pouco clara?"
22090-163 = "Ou seja―― se destruirmos o seu Halo, o problema estará resolvido."
22090-170 = "!?!?"
22090-175 = "Ah, mas... Será que esse 'Halo' que você tem é realmente um Halo?"
22090-176 = "Não sei a razão pela qual você, que não é uma aluna, possui um Halo... #n Mas――"
22090-177 = "O fato de você, uma simples máquina, possuir um Halo..."
22090-178 = "Sim, é exatamente como aquela IA envolta em loucura."
22090-179 = "Sim... Não posso deixá-la solta de jeito nenhum."
22090-180 = "[s] \"Rio.\""
22090-182 = "[ns] \"Eu não posso perdoar mais nenhuma palavra vinda de você.\""
22090-183 = "......Peço desculpas se as minhas palavras a ofenderam."
22090-184 = "Sempre houve muitas pessoas que me odiaram desde cedo."
22090-185 = "――Isso deve significar que o problema está em mim."
22090-186 = "Mas, mesmo que não me compreendam, não me importa. Eu só quero proteger a todas."
22090-187 = "Agora, é a sua vez―― Mikamo Neru."
22090-194 = "......!"
22090-195 = "Neru... senpai..."
22090-196 = "............"
22090-200 = "[ns] \"Neru...?\""
22090-201 = "............"
22090-202 = "Não fique levando isso muito para o lado pessoal."
22090-203 = "Originalmente, a C&C não é do Seminar... Para ser mais exata, elas são agentes diretamente sob o meu comando."
22090-204 = "Não há sentimentos pessoais nisso. #n Elas apenas seguem as minhas ordens rigorosamente."
22090-205 = "Contra a líder da C&C―― Neru, nem mesmo o Sensei, nem apenas o Departamento de Desenvolvimento de Jogos seriam capazes de resistir, não é?"
22090-206 = "Mesmo se pedirem ajuda externa――"
22090-214 = "Eu já tomei o controle desta área com o AMAS. #n Nenhum resgate chegará a tempo."
22090-215 = "Bem, hora de trabalhar. #n Neru, você poderia recuperar a Aris?"
22090-217 = "............"
22090-218 = "Neru-senpai..."
22090-222 = "......Hmpf."
22090-223 = "Hmpf...?"
22090-227 = "Que se dane, eu não vou fazer isso!"
22090-231 = "Neru... qual é a sua intenção aqui?"
22090-236 = "[ns] \"Neru...!\""
22090-238 = "......Neru-senpai?"
22090-239 = "Eu nunca gostei de ordens que eu não curto, nem antes e nem agora."
22090-240 = "Rapitar uma aluna da mesma escola―― e ainda por cima, alguém que não sabe de nada?"
22090-241 = "――Eu não vou fazer uma missão dessas."
22090-242 = "Eu não tenho mais obrigação de te obedecer―― Rio!"
22090-243 = "Neru... você pretende me trair aqui?"
22090-244 = "Trair? #n Hah! Eu só não gostei das suas ordens."
22090-246 = "Entendo, então é assim que vai ser..."
22090-247 = "Neru, você sempre foi assim."
22090-248 = "Aquele seu jeito de violar ordens dependendo do seu humor――"
22090-249 = "Aquele seu lado imprevisível, como uma bomba relógio que não se sabe quando vai explodir, é a sua maior virtude e... #n Também o seu maior defeito."
22090-250 = "......Por isso, eu já tinha previsto que isso aconteceria nesta situação."
22090-251 = "Foi a decisão certa chamar apenas você, e não a C&C inteira desde o início."
22090-252 = "Hã? O que você disse?"
22090-253 = "Toki―― agora é a sua vez."
22090-258 = "[ns] \"Neru, cuidado!\""
22090-259 = "Hã?"
22090-268 = "Quem é você!?"
22090-274 = "É um prazer conhecê-la, Senpai. #n ――E Sensei."
22090-275 = "Membro da C&C, Codinome Zero Quatro. Apresento-me."
22090-276 = "Eh... a quinta...?"
22090-277 = "[s] \"C&C...?\""
22090-278 = "Fazer um ataque surpresa pelas costas, que audácia."
22090-279 = "Você está preparada para as consequências, não está!?"
22090-280 = "[ns] \"Neru, espere...!\""