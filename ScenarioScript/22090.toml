[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
22090-1 = "Episódio 9: A Verdade Cruel (1)"
22090-7 = "[ns] \"Tsukatsuki… Rio……?\""
22090-8 = "Ela é…… a presidente do Conselho da Millennium."
22090-9 = "……A-a presidente, por que, a-aqui……"
22090-10 = "…………"
22090-12 = "Sim, eu sou quem comanda o núcleo da Colégio de\nCiências Millennium——a Seminar."
22090-13 = "E sou quem almeja resolver o \"Problema do Milênio\",\nquem persegue as estrelas."
22090-14 = "A rigor, com o Sensei da Schale, eu gostaria de\nter marcado uma ocasião pra nos cumprimentarmos formalmente——"
22090-15 = "mas hoje tenho outro assunto, então fica\npra uma próxima……"
22090-16 = "[s] \"A \"verdade\", afinal, é o quê?\""
22090-17 = "Sim—— a \"verdade\"."
22090-18 = "Pelo \"incidente\" de alguns dias atrás, vocês não\nchegaram a uma certa conclusão?"
22090-19 = "A face diferente que aquela que vocês tinham como\namiga revelou.#nE, ao mesmo tempo, a destruição e o caos que surgiram."
22090-20 = "E então—— vocês não pensaram o seguinte?"
22090-25 = "\"Aquilo que até agora a gente tinha como amiga,\ntalvez não seja\"—— foi isso."
22090-26 = "Não foi?#nSensei da Schale."
22090-27 = "……!!"
22090-31 = "[ns] \"Rio, o que é que você——\""
22090-32 = "Direto ao ponto——"
22090-35 = "essa garota aí atrás de você……"
22090-36 = "——\"Aquilo\", que tem aparência de garota, não\né uma aluna comum."
22090-37 = "\"Aquilo\" que vocês batizaram de Aris é——"
22090-40 = "——a comandante do \"exército incompreensível\"\nque invade a partir do desconhecido,"
22090-41 = "o \"OOPArt\" venerado pelo sacerdote sem nome que\ncultua o \"Deus Sem Nome\"——#numa herança deixada por um povo antigo——"
22090-42 = "cujo nome é……"
22090-44 = "\"A Princesa dos Deuses Sem Nome, AL-1S\"."
22090-51 = "[ns] \"Sem nome……?\""
22090-52 = "A Aris……"
22090-53 = "A Aris…… não consegue compreender……"
22090-54 = "Isso mesmo! O que é que você tá dizendo!?"
22090-55 = "Para de despejar a sua própria fantasia mental\nde forma unilateral!"
22090-56 = "Eu sei bem, porque a mana sempre falava assim.#nNão fica atribuindo características à Aris por conta própria."
22090-58 = "M-Midori……"
22090-59 = "——Me desculpem. Faltou consideração da minha parte."
22090-60 = "Pra ficar mais fácil de entender, vou usar como\nexemplo o \"jogo\" de que vocês tanto gostam."
22090-64 = "Ou seja, \"Aris\".#nVocê é——"
22090-65 = "o \"Rei Demônio\" que nasceu para destruir este mundo."
22090-66 = "……!!"
22090-67 = "[s] \"A Aris…… é o Rei Demônio?\""
22090-68 = "Lá vem você com mais uma fantasia dessas……\npor que você diz uma coisa dessas!?"
22090-69 = "Afinal, o que é que você está tramando!?"
22090-70 = "Eu não estou tramando nada.#n——Pelo contrário, é a vocês que eu gostaria de perguntar……"
22090-71 = "Vocês não viram com os próprios olhos? O que aconteceu\nquando o \"exército incompreensível\"#ne a Aris entraram em contato."
22090-72 = "[s] \"'O exército incompreensível'……\""
22090-80 = "[ns] \"Sobre…… aqueles robôs……?\""
22090-81 = "——Exatamente."
22090-82 = "A rigor, não era pra acontecer algo assim……\nfoi um erro inteiramente nosso."
22090-83 = "Eu achava que, através do C&C e do AMAS, tinha\nrastreado tudo——#ne quem diria que havia uma unidade que escapou da rede de vigilância."
22090-84 = "Isso se deu inteiramente por uma falha minha.#nEis as minhas desculpas."
22090-88 = "Hã? Desculpas? A presidente!?#nHã……?"
22090-89 = "——Mas."
22090-90 = "[s] \"Mas?\""
22090-91 = "Graças a isso, a minha hipótese foi comprovada."
22090-93 = "\"Aquilo\" com que vocês entraram em contato é a\n\"catástrofe\" que transbordou das \"Ruínas\"."
22090-94 = "Um pesadelo que traz o fim à Millennium—— e, por\nextensão, a toda a Kivotos."
22090-95 = "E—— ficou comprovado que a existência da Aris\natrai aqueles seres a partir das \"Ruínas\"."
22090-97 = "Desta vez, por sorte, ficou só no contato com uma\nunidade meio quebrada, mas……"
22090-98 = "da próxima, não vai ficar nisso."
22090-110 = "[ns] \"…………\""
22090-111 = "Só existe um jeito de resolver esta ameaça, Aris."
22090-112 = "Um jeito de…… resolver……?"
22090-113 = "Sim.#n——Aris, é você desaparecer."
22090-114 = "Você não pode existir neste mundo."
22090-115 = "……I……sso……"
22090-116 = "A Aris…… só…… queria ser…… uma heroína……"
22090-117 = "Junto de todo mundo…… jogar…… fazer quests……#nera só isso……"
22090-118 = "Não, isso não vai se realizar."
22090-119 = "Eu não entendo de jogos…… mas conhecimento de dicionário eu tenho."
22090-123 = "Então, deixa eu te fazer uma pergunta."
22090-124 = "Você se chama de heroína, mas……"
22090-128 = "um \"herói\" é alguém que aponta a espada\npara os amigos?"
22090-130 = "Pelo contrário, o que você fez não seria\npapel de uma vilã?"
22090-134 = "……!"
22090-138 = "Aris! Não precisa ouvir isso!"
22090-139 = "Eu tinha ouvido que a presidente do Conselho era\nexcêntrica, mas……#nnão imaginei que fosse uma pessoa dessas……!"
22090-141 = "P……Sensei……!"
22090-143 = "[ns] \"……Rio, para.\""
22090-144 = "Parar? Parar o quê?"
22090-145 = "Desviar os olhos dos fatos não é compaixão, Sensei."
22090-146 = "Isso não passa de mero \"escapismo\"—— renunciar à\nresponsabilidade que se deve assumir é uma atitude\nextremamente irracional."
22090-147 = "[s] \"Não é questão de racional ou irracional……\""
22090-148 = "Então, a Aris……"
22090-149 = "A Aris…… o que será que ela deve fazer……?"
22090-150 = "Como eu já disse——"
22090-151 = "a origem de tudo é a Aris;"
22090-152 = "tudo acontece porque você está aqui."
22090-153 = "Sendo assim, o resto é simples, não é?"
22090-154 = "Uma bomba—— basta desmontá-la num lugar seguro."
22090-155 = "Desmontar…… a bomba……?"
22090-156 = "Ah…… ficou difícil de entender?"
22090-163 = "Ou seja—— destruir o seu Halo resolve a questão."
22090-170 = "!?!?"
22090-175 = "Ah, mas…… será que aquilo aí em você é mesmo\num Halo?"
22090-176 = "Por que você, que não é uma aluna, possui um Halo……#no motivo eu não sei——"
22090-177 = "mas você, que é só uma máquina, ter um Halo……"
22090-178 = "Sim, é igual àquela IA tomada pela loucura."
22090-179 = "Sim…… mais uma razão para eu não poder te deixar à solta."
22090-180 = "[s] \"Rio.\""
22090-182 = "[ns] \"Palavras além disso, eu não vou tolerar.\""
22090-183 = "……Se as minhas palavras e atos te desagradam, eu peço desculpas."
22090-184 = "Desde sempre, foram muitos os que não gostaram de mim."
22090-185 = "——O que deve significar que o problema está em mim."
22090-186 = "Mas, mesmo sem ser compreendida, tudo bem. Eu só\nquero proteger todo mundo."
22090-187 = "Vamos, é a sua vez—— Neru Mikamo."
22090-194 = "……!"
22090-195 = "Veterana…… Neru……"
22090-196 = "…………"
22090-200 = "[ns] \"Neru……?\""
22090-201 = "…………"
22090-202 = "Não leve muito a mal, viu."
22090-203 = "Originalmente, o C&C é da Seminar…… mais precisamente,\numa agência sob o meu comando direto."
22090-204 = "Não há sentimento pessoal nisso.#nElas apenas seguem, disciplinadas, as minhas ordens."
22090-205 = "Contra a líder do C&C—— a Neru, nem o Sensei,\nnem o Clube de Desenvolvimento de Jogos sozinhos\nconseguem resistir, não é?"
22090-206 = "E, mesmo que peçam ajuda lá fora——"
22090-214 = "esta área inteira já está sob controle do AMAS.#nNão há como o socorro chegar a tempo."
22090-215 = "Vamos, hora do trabalho.#nNeru, pode recolher a Aris pra mim?"
22090-217 = "…………"
22090-218 = "Veterana Neru……"
22090-222 = "……Hunf."
22090-223 = "Hunf……?"
22090-227 = "Que droga, isso não dá!"
22090-231 = "Neru…… o que você pretende?"
22090-236 = "[ns] \"Neru……!\""
22090-238 = "……Veterana Neru?"
22090-239 = "Mesmo antes, eu quase nunca curtia o conteúdo das missões, mas……"
22090-240 = "Sequestrar uma aluna do mesmo colégio—— ainda por\ncima uma que não entende porra nenhuma do que tá rolando?"
22090-241 = "——Esse tipo de missão, não dá pra fazer."
22090-242 = "Já não tenho mais obrigação nenhuma de te seguir—— Rio!"
22090-243 = "Neru…… você vai me trair, aqui?"
22090-244 = "Trair?#nHá! Eu só não curti a tua ordem."
22090-246 = "Sim, então é isso……"
22090-247 = "Neru, você é sempre assim."
22090-248 = "Essa sua figura, que viola ordens conforme o humor——"
22090-249 = "Esse lado de bombinha, que ninguém sabe quando vai\nestourar, é a sua maior qualidade……#ne foi o mais incômodo."
22090-250 = "……Por isso, eu já tinha previsto também esta situação."
22090-251 = "Foi acertado ter convocado, desde o início, só você,\ne não o C&C inteiro."
22090-252 = "Hãã? O que você disse?"
22090-253 = "Toki—— é a sua vez."
22090-258 = "[ns] \"Neru, cuidado……!\""
22090-259 = "Hãã?"
22090-268 = "Quem é você!?"
22090-274 = "Muito prazer, veterana.#n——E Sensei."
22090-275 = "Do C&C, codinome Zero-Quatro. Apresento-lhes\nos meus cumprimentos."
22090-276 = "Hã…… a quinta……?"
22090-277 = "[s] \"C&C……?\""
22090-278 = "Atacar pelas costas, que jogada baixa, hein."
22090-279 = "Você tá preparada pras consequências, né!?"
22090-280 = "[ns] \"Neru, espera……!\""