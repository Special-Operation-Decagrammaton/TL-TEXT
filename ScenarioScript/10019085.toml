[translation]
10019085-6 = "……。"
10019085-7 = "……。"
10019085-8 = "……さ、最後のサンクトゥム、消滅を確認しました……！"
10019085-9 = "せ、成功した、の……？"
10019085-10 = "6つのサンクトゥムは全て消滅……#n「虚妄のサンクトゥム」の攻略がついに――"
10019085-14 = "――完了しました……！！"
10019085-16 = "はぁ……"
10019085-17 = "……。"
10019085-18 = "やりました、リン先輩……！！#nキヴォトスを守る事ができましたよ！！"
10019085-19 = "[s] \"リン、モモカ、アユム、本当にお疲れ様。\""
10019085-20 = "はい……！#n先生、本当にお疲れ様でした！！"
10019085-21 = "ほんと、先生もお疲れ様～"
10019085-22 = "……ですが、まだ終わってはおりません。"
10019085-23 = "この現象の原因解明と再発生の可能性を分析……破壊されたシラトリ区の再建も――"
10019085-24 = "私たちがやらなくてはならない仕事が山積みです。"
10019085-30 = "ですが、ひとまずは――"
10019085-31 = "……本当に、お疲れ様でした先生。"
