[translation]
10052105-2 = "Vim recuperar os dados principais."

10052105-3 = "Sim? Ah, o gerente disse: “Foi um erro selecionar a pessoa certa”, e rapidamente retornou ao navio de transporte."

10052105-4 = "[s] \"E quanto a Amy?\""

10052105-5 = "É uma sensação boa... mas ainda não é suficiente. Eu gostaria que fosse uma geleira de verdade."

10052105-6 = "Eu me pergunto se um ambiente criado não pode competir com a natureza real...?"

10052105-12 = "Do meu ponto de vista, o seu é mais antinatural..."

