[translation]
10015010-1 = "Episódio 1: O Meister do Millennium"
10015010-2 = "Millennium - Sala de Prática Industrial"
10015010-3 = "Sobre os preparativos para o Grande Festival Esportivo, o primeiro problema que precisamos resolver é..."
10015010-4 = "Sem dúvida, o conserto do robô de torcida danificado."
10015010-5 = "A Yuuka-chan disse que não era nada demais, mas parece que os danos no robô são bem graves..."
10015010-6 = "Na pior das hipóteses, talvez seja mais rápido construir um novo do que consertar."
10015010-7 = "[s] \"Dá para terminar até amanhã de manhã...?\""
10015010-8 = "Se fosse em tempos normais, eu diria que é impossível, mas... desta vez, tudo bem."
10015010-9 = "Chamei o grupo de \"Meisters\" mais talentoso do Millennium, que consegue consertar qualquer defeito em pouco tempo."
10015010-10 = "Isso mesmo... o pessoal do \"Departamento de Engenharia\"!"
10015010-17 = "Fufufu... Se for sobre fabricação e reparo de máquinas, pode deixar com a gente!"
10015010-18 = "Consertar um robô de torcida é fácil..."
10015010-19 = "Se usarmos todo o nosso poder, meio dia é o suficiente."
10015010-21 = "Obrigado por aceitarem prontamente este pedido repentino."
10015010-22 = "Agora estou tranquilo quanto ao robô."
10015010-23 = "Isso é moleza."
10015010-24 = "O Departamento de Engenharia também faz parte do Millennium. Não pouparemos esforços pelo sucesso do Grande Festival Esportivo."
10015010-25 = "...Na verdade, eu queria saber por que não pediram nossa ajuda antes."
10015010-26 = "Se tivessem deixado a fabricação do robô conosco desde o início, teríamos preparado um robô resistente o suficiente para aguentar a maioria das explosões..."
10015010-28 = "..."
10015010-30 = "...Provavelmente, eles julgaram com base no que o Departamento de Engenharia entregou até agora, não é?"
10015010-31 = "...O que nós entregamos?"
10015010-32 = "Acho que quase nada do que fizemos até hoje teve defeitos..."
10015010-33 = "Mais do que defeitos... no passado, ocorreram vários acidentes devido a funções inesperadas..."
10015010-34 = "Por exemplo, aquela broca enorme que colocaram na máquina de café da sala de descanso do Seminar..."
10015010-36 = "Aquilo não era uma broca, era um moedor para grãos de café!"
10015010-37 = "Como tem uma lâmina de serra com dureza de diamante embutida, dá para triturar uma grande quantidade de grãos num piscar de olhos!"
10015010-38 = "Ou aquele lança-chamas que, por algum motivo, vinha acoplado no aspirador de pó..."
10015010-39 = "Como o aspirador automático comum tem um limite de quanto lixo consegue sugar..."
10015010-40 = "É melhor incinerar o lixo inflamável na hora."
10015010-41 = "Bem, eu acho uma ideia interessante, mas... parece que a Yuuka-chan não pensava da mesma forma."
10015010-42 = "Teve também o acidente em que abriram um buraco enorme na parede da sala de descanso ao tentar tomar café..."
10015010-43 = "Para consolidar novas tecnologias, é preciso pagar um preço..."
10015010-44 = "Se tivermos medo de falhar, nunca alcançaremos uma mudança de paradigma!"
10015010-45 = "Fufu, eu concordo com esse pensamento, mas... se a Yuuka-chan ouvir isso, ela virá correndo com o recibo na mão. Então, vamos manter isso entre nós."
10015010-47 = "Hum... bem, por enquanto, vamos verificar o estado do robô de torcida."
10015010-48 = "Hmm... é mais grave do que eu pensava. O eixo foi completamente destruído pela explosão... Precisamos trocar todas as articulações."
10015010-49 = "A placa de circuito também está toda queimada. Temos que remontar do zero..."
10015010-50 = "Disseram que foi um acidente casual, mas... logo as peças mais importantes e difíceis de consertar foram as que quebraram..."
10015010-51 = "...É suspeito demais para ser apenas um acidente de explosão comum."
10015010-53 = "Eu também sinto o mesmo, mas, por enquanto, não temos provas físicas nem tempo para investigar..."
10015010-54 = "Planejo investigar isso com calma enquanto o festival esportivo acontece."
10015010-55 = "...Então, quanto tempo vai levar?"
10015010-56 = "Se consertarmos normalmente, deve dar tempo para a cerimônia de abertura, mas..."
10015010-57 = "Porém, se nos deixarem fazer um \"novo\", podemos entregar em menos de 3 horas."
10015010-58 = "É mais rápido refazer? Por quê...?"
10015010-59 = "Para o Seminar, tanto faz, mas... e quanto aos custos e ao tempo?"
10015010-60 = "Isso não é problema! É que tínhamos peças preparadas para modificar um novo tanque..."
10015010-66 = "...Não! É que tínhamos \"peças sobressalentes\" sobrando!"
10015010-67 = "Fufu, fico feliz que o pessoal do Departamento de Engenharia esteja tão motivado."
10015010-68 = "Mas, caso precise que projetemos do zero, #nexistem algumas condições."
10015010-70 = "……Condições?"
10015010-71 = "Sim. É um pedido repentino, mas #neste robô de torcida também é um \"produto\" encomendado pelo Seminar."
10015010-72 = "Como cliente, gostaria de fazer alguns pedidos... Tudo bem para vocês?"
10015010-73 = "――Desde que não sejam exigências absurdas."
10015010-74 = "A primeira condição é... que seja resistente."
10015010-75 = "Como o robô de torcida anterior foi danificado em um acidente inesperado, #ngostaríamos que o novo tivesse uma durabilidade maior."
10015010-76 = "Nesse caso, pode ficar tranquila. #nOs robôs feitos pelo Departamento de Engenharia têm fama de serem resistentes."
10015010-81 = "Hmm... será que seria melhor criar uma blindagem composta sobrepondo chapas de aço galvanizado e cerâmica?"
10015010-82 = "Isso aumentaria a durabilidade, mas se colocarmos muito enchimento, o robô ficará grande demais sem necessidade..."
10015010-83 = "E se a gente esticasse a chapa de aço para uniformizar a estrutura...?"
10015010-85 = "A segunda condição é... que ele consiga se mover livremente em qualquer terreno."
10015010-86 = "No local do evento, há muitos terrenos que não podem ser percorridos com rodas, incluindo escadas. #nQuero que ele seja capaz de lidar com qualquer tipo de superfície."
10015010-88 = "Embora dê um pouco de trabalho... isso também não é difícil. Fique tranquila."
10015010-91 = "Sendo assim, seria um modelo quadrúpede? #nConsiderando o tempo necessário para aprender o controle de postura, não sei se vamos conseguir terminar a tempo..."
10015010-92 = "……Então, talvez lagartas sejam melhores."
10015010-93 = "Se colocarmos lagartas sobre as rodas para aumentar a aderência, ele conseguirá superar inclinações e obstáculos facilmente..."
10015010-94 = "[s] \"As coisas estão ficando sérias...\""
10015010-96 = "E a condição mais importante é... que seja concluído dentro do prazo."
10015010-97 = "……Qual é o prazo?"
10015010-98 = "Como devem saber, não resta muito tempo até a Grande Competição Esportiva."
10015010-99 = "Dizem que a perfeição de uma obra é proporcional ao tempo dedicado a ela, mas #nmesmo que seja um excelente trabalho, não terá sentido se não puder ser exibido quando necessário."
10015010-100 = "Ah, isso é óbvio, claro. #nCumprir prazos é o básico para um profissional."
10015010-101 = "Pela honra do Departamento de Engenharia, vamos construir um robô de torcida perfeito dentro do prazo."
10015010-102 = "Fufu, fico mais tranquila ouvindo isso."
10015010-103 = "[s] \"Tem algo em que eu possa ajudar?\""
10015010-104 = "Hmm... acho que não precisaremos da ajuda do Sensei. #nPara um projeto desse porte, é algo que nós três fazemos habitualmente."
10015010-106 = "Na verdade, usamos várias ferramentas afiadas na fabricação do robô, #nentão pode ser perigoso se o Sensei estiver por perto."
10015010-107 = "……Sensei, ajude a Noa-senpai e as outras alunas."
10015010-109 = "Obrigada. #nBem, tenho outros assuntos para tratar, então... conto com vocês para o resto."
10015010-110 = "Voltarei aqui em 3 horas, então até lá, por favor, façam o reparo..."
10015010-111 = "Não, por favor, cuidem da fabricação do robô."
10015010-118 = "Fufu. Faz muito tempo que não fazemos um robô a pedido do Seminar."
10015010-119 = "Se é um robô de torcida para ser usado na Grande Competição Esportiva, #nesta é a nossa chance de exibir nossa invenção para todas as alunas de Kivotos!"
10015010-120 = "Vamos testar muitas das novas tecnologias que acabamos de desenvolver!"
10015010-121 = "Então eu quero testar a estabilidade do sensor giroscópico que fizemos outro dia..."
10015010-122 = "Calma, calma, se acalmem."
10015010-123 = "Primeiro, antes de começarmos o trabalho de hoje, #ntenho algo a dizer a vocês."
10015010-126 = "A Grande Competição Esportiva de Kivotos é o maior evento de Kivotos, realizado a cada dois anos..."
10015010-127 = "Para o sucesso disso, o pessoal do Seminar tem se esforçado imensamente."
10015010-128 = "Mesmo que seja para o desenvolvimento tecnológico, #nnão podemos permitir que o esforço delas seja desperdiçado por causa de nossos desejos pessoais."
10015010-129 = "Por isso, desta vez, vamos ser prudentes #nem prol do sucesso da Grande Competição Esportiva."
10015010-130 = "Entendo... faz sentido."
10015010-131 = "Eu estava morrendo de vontade de testar várias coisas, mas..."
10015010-132 = "……É, vamos fazer assim."
10015010-133 = "Obrigado, pessoal."
10015010-134 = "Muito bem, então, para começar..."
10015010-135 = "Vamos começar instalando um canhão automático de 15mm na parte frontal!"
10015010-138 = "Sim!"
