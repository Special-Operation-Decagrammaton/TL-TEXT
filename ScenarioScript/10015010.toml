[translation]
10015010-1 = "第1話;ミレニアムのマイスター"
10015010-2 = "ミレニアム・工業実習室"
10015010-3 = "大運動会の準備ですが、まず最初に解決しなければならない問題は……"
10015010-4 = "やはり、破損した応援ロボットの修理ですね。"
10015010-5 = "ユウカちゃんは大したことではないように言っていましたが、#nロボットの損傷はかなり大きいみたいで……。"
10015010-6 = "最悪の場合、修理するより新しく作った方が早いかもしれません。"
10015010-7 = "[s] \"明日の朝までにできるの……？\""
10015010-8 = "平時であれば不可能です、とお答えするところですが……今回は大丈夫です。"
10015010-9 = "どんな故障でも短時間で修理してくださる、#nミレニアム随一の「マイスター」集団を呼びましたので。"
10015010-10 = "そう……「エンジニア部」の皆さんです！"
10015010-17 = "ふっふっふ……機械の製作と修理に関することでしたら、私たちにお任せください！"
10015010-18 = "応援用ロボットの修理くらいなら簡単だから……。"
10015010-19 = "私たちが持っている力をすべて動員すれば、半日で足りるとも。"
10015010-21 = "急なお願いを快く受けてくださり、ありがとうございます。"
10015010-22 = "これでロボットに関しては安心ですね。"
10015010-23 = "これくらい朝飯前さ。"
10015010-24 = "エンジニア部もミレニアムの一員だからね。#n大運動会の成功のためなら協力は惜しまないよ。"
10015010-25 = "……むしろ、これまでどうして私たちを頼ってくれなかったのか聞きたいくらいだね。"
10015010-26 = "そもそもロボットの製作も私たちに任せてくれてたら、#n大抵の爆発には耐えられる頑丈なロボットを用意したというのに……。"
10015010-28 = "……。"
10015010-30 = "……おそらく、エンジニア部がこれまで納品してくださったものを見て、#n総合的に判断したのではないでしょうか？"
10015010-31 = "……私たちが納品したもの？"
10015010-32 = "今まで作ってきたものに、ほとんど欠陥はなかったと思うけど……。"
10015010-33 = "欠陥というよりは……#n過去に、想定外の機能によって事故が発生した事が何度かありまして……。"
10015010-34 = "例えば、セミナー休憩室のコーヒーマシンにつけられた大きなドリルとか……"
10015010-36 = "あれはドリルではなく、コーヒー豆用のグラインダーです！"
10015010-37 = "ダイヤモンド並の硬さの鋸刃が内蔵されているので、#n大量の豆もあっという間に粉砕できるんですよ！"
10015010-38 = "掃除機に何故か付属している、火炎放射器とか……。"
10015010-39 = "通常の全自動掃除機が吸い込めるゴミの量には、限度があるから……"
10015010-40 = "燃えるゴミはその場で焼却してしまった方が良い。"
10015010-41 = "まぁ、私としても面白い発想だと思いますが……#nユウカちゃんはそう思っていなかったみたいですから。"
10015010-42 = "コーヒーを飲もうとして、休憩室の壁に大きな穴をあけた事故もありましたし……"
10015010-43 = "新しい技術を定着させるためには本来、対価を支払わなければならないもの……"
10015010-44 = "失敗を恐れていては、パラダイムシフトは成し遂げられない！"
10015010-45 = "ふふっ、私もその考えには共感しますが……#nユウカちゃんがその言葉を聞いたら、領収書を持って駆けつけてきますよ。#nなので、ここだけの話という事で。"
10015010-47 = "ふむ……まあとりあえず、応援ロボットの状態を確認しようか。"
10015010-48 = "うーん……思ったより深刻ですね。爆発で軸が丸ごと壊れてしまってます……#n関節部をすべて交換しないといけません。"
10015010-49 = "基板も丸ごと焼けちゃってる。最初から組み直さないと……。"
10015010-50 = "偶発的な事故だと聞いてるけど、#nよりによって修理しにくい重要な部品だけが破損しているとは……"
10015010-51 = "……単純な爆発事故というには、疑わしい部分が多いね。"
10015010-53 = "私も何となくそう感じていますが、#n今のところ物証も、証拠を調べる時間も無く……。"
10015010-54 = "この問題は、体育祭を進行しながらじっくり調べる予定です。"
10015010-55 = "……それで、どのくらい時間がかかりそうですか？"
10015010-56 = "普通に修理すれば、開会式にはギリギリ間に合うだろうね……"
10015010-57 = "ただし、もし「新しく」作らせてくれるなら、3時間以内に納品できるよ。"
10015010-58 = "作り直した方が早いんですか、なぜ……？"
10015010-59 = "セミナーとしてはどちらでも構いませんが……費用と時間については大丈夫です？"
10015010-60 = "それなら大丈夫です！#nちょうど新型戦車を改造するために用意した部品が……"
10015010-66 = "……いえ！#nちょうど「予備の部品」が余っていたところですから！"
10015010-67 = "ふふ、エンジニア部の皆さんが意欲的に取り組んでくださって嬉しいです。"
10015010-68 = "ですが、一から設計していただく場合には、#nいくつかの条件があります。"
10015010-70 = "……条件？"
10015010-71 = "はい。急なお願いではありますが、#n一応この応援ロボットも、セミナーが発注する「商品」ですから。"
10015010-72 = "クライアントとして、いくつかのお願いをしたく……構いませんか？"
10015010-73 = "――あまりにも無茶な要求でなければ。"
10015010-74 = "一つ目の条件は……丈夫であること。"
10015010-75 = "前回の応援ロボットが不慮の事故で破損してる分、#n新しい応援ロボットには耐久力が欲しいところです。"
10015010-76 = "それなら安心すると良い。#nエンジニア部で作ったロボットは、丈夫さに定評があるからね。"
10015010-81 = "うーん……亜鉛鋼板とセラミックを重ねて、複合装甲を作った方がいいですかね？"
10015010-82 = "そうすると耐久性は高くなるけど、詰め物が増えるとロボットが無駄に大きくなるから……"
10015010-83 = "鋼板を伸ばして構造を均一化するのはどうかな……？"
10015010-85 = "二つ目の条件は……どんな地形でも自在に移動できること。"
10015010-86 = "会場には、階段を含め車輪で通れない地形がたくさんありますから。#nどんな足場でも対応できるようにしてほしいのです。"
10015010-88 = "少し手間がかかるとはいえ……それも難しくはない。大丈夫だよ。"
10015010-91 = "となると、やはり四足歩行型でしょうか？#n姿勢制御の学習にかかる時間を考慮すると、間に合うか怪しいですね……"
10015010-92 = "……なら、カタピラが良いかも。"
10015010-93 = "車輪の上にカタピラをつけて接地力を高めれば、高い傾斜や障害物があっても簡単に突破できるから……"
10015010-94 = "[s] \"何だかすごいことになってきた……。\""
10015010-96 = "そして最も重要な条件ですが……期限内に完成させること。"
10015010-97 = "……期限は？"
10015010-98 = "ご存知だとは思いますが、大運動会の開催まであまり時間が残っていません。"
10015010-99 = "作品の完成度は、かけた時間に比例すると言いますが、#nいくら良作でも必要な時に披露できなければ意味がないですから。"
10015010-100 = "ああ、それはもちろん当然さ。#n締切厳守はプロの基本だからね。"
10015010-101 = "エンジニア部の名誉にかけて、期限内に完璧な応援ロボットを作ってみせよう。"
10015010-102 = "ふふ、そう言ってくださると心強いです。"
10015010-103 = "[s] \"私が手伝える事はある？\""
10015010-104 = "うーん……先生の手を借りることにはならなそうかな。#nこれくらいの規模なら、私たち3人が普段からやっていることだから。"
10015010-106 = "むしろ、ロボット製作には様々な鋭い工具を使いますから、#n先生がそばにいると危ないかもしれません。"
10015010-107 = "……先生は、ノア先輩と他の生徒を手伝ってあげて。"
10015010-109 = "ありがとうございます。#nそれでは、他の件もありますので……後はよろしくお願いしますね。"
10015010-110 = "3時間後にまたこちらに戻りますので、それまでに修理を……"
10015010-111 = "いえ、ロボットの製作をよろしくお願いいたします。"
10015010-118 = "ふふっ。セミナーの依頼でロボットを作るのは、本当に久しぶりですね。"
10015010-119 = "大運動会で使われる応援ロボットということは、#nキヴォトス全生徒の前で私たちの発明品を披露できるチャンスですよ！"
10015010-120 = "開発したばかりの新技術をたくさん試しましょう！"
10015010-121 = "なら私は、この間のジャイロセンサーの安定性を試してみたい……"
10015010-122 = "まぁまぁ、落ち着いて。"
10015010-123 = "まず、今回の作業を始める前に、#n君たちに伝えておくことがある。"
10015010-126 = "キヴォトス大運動会は、2年に一度開かれるキヴォトス最大規模のイベント……"
10015010-127 = "その成功のために、セミナーの各位は膨大な努力を重ねてきた。"
10015010-128 = "いくら技術の発展のためだとしても、#n私欲を満たすために彼女らの努力を水の泡にしてしまうのはいただけない。"
10015010-129 = "だから、今回だけは大運動会の成功のために、#n私たちも配慮をしようじゃないか。"
10015010-130 = "なるほど……それもそうですね。"
10015010-131 = "色々と試してみたい気持ちはやまやまだけど……"
10015010-132 = "……うん、そうしよっか。"
10015010-133 = "みんな、ありがとう。"
10015010-134 = "さあ、それじゃあまず……"
10015010-135 = "前面に、15mm機関砲を設置するところから始めようか！"
10015010-138 = "はい！"
