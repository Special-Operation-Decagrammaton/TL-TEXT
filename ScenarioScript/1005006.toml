[translation]
1005006-1 = "……今回だけですよ。本当ですよ？"
1005006-2 = "昼の街"
1005006-3 = "（ココナとニンジン専門レストランにやってきた）"
1005006-4 = "来てしまいました……本当に……"
1005006-5 = "本当に……こういうレストランがあったんですね……衝撃です。"
1005006-6 = "入り口からもうニンジンの[ruby=きょうえん]饗宴[/ruby]が見えます……"
1005006-7 = "カーテンもニンジンで、階段にもニンジンが……。"
1005006-8 = "何より看板さえも！大きなニンジンです！"
1005006-9 = "先生、今からでも遅くないです。#nこの恐ろしい所から脱出しましょう。"
1005006-10 = "先生もきっと邪悪なニンジン協会の怪しい電波か何かで洗脳されているんですよ！"
1005006-11 = "私が先生を守ります！私を信じてください！"
1005006-15 = "（笑いながらココナの腕を掴んでレストランの中に歩を進めた）"
1005006-16 = "離して！離してください！#nレディーをどこに連れて行くつもりですか！"
1005006-17 = "エスコートですか？#nこんなエスコートは必要ありません！"
1005006-18 = "うわぁーん！"
1005006-20 = "レストラン内部"
1005006-21 = "本当に……すべてのメニューにニンジンが入っているなんて……"
1005006-22 = "ご注文承ります。"
1005006-23 = "注文ですか？えっと……"
1005006-24 = "この方がします。"
1005006-25 = "[s] \"私が？\""
1005006-26 = "私をここまで連れてきたじゃないですか。"
1005006-27 = "だから注文は先生が決めてください。"
1005006-28 = "……何が出ても、結局ニンジンだから、まずいでしょうけど。"
1005006-30 = "（笑いながらとっておきのメニューを選んだ）"
1005006-31 = "（まもなく料理が出てきた）"
1005006-33 = "[ns] \"いただきます！\""
1005006-34 = "いただきます……うう……"
1005006-35 = "（ココナが仕方なくニンジンを口に持っていった）"
1005006-36 = "（そして……！）"
1005006-37 = "あれ……？#nこの味……？"
1005006-38 = "甘いです！それに……やわらかくて、香ばしいです！"
1005006-39 = "どうなってるんですか？#nこれって本当にニンジンなんですか？"
1005006-40 = "ふむふむ……ニンジンをほどよく蒸して甘くし、バターで炒めてるのですね。"
1005006-41 = "今度はこのソースをつけて食べてみて？……分かりました。"
1005006-42 = "コクがよみがえりました！#n何ということでしょう……"
1005006-45 = "[wa:1400]― その……"
1005006-47 = "― 別に、[wa:1000]ニンジンを好きになったわけでは[wa:1300]ありませんからね。"
1005006-50 = "[wa:1000]― せっかく先生と一緒に[wa:1150]来たわけですし、"
1005006-52 = "― 一人前の教官として[wa:1700]仕方なく食べているだけです。"
1005006-55 = "[wa:200]― 分かりましたか？"
1005006-57 = "― 全く、[wa:1200]先生はいつも無理やり……。"
1005006-60 = "[wa:1200]― もしどうしても"
1005006-62 = "[wa:160]― ニンジンを食べないと[wa:900]いけない場合は……"
1005006-65 = "― 今度からは、"
1005006-67 = "― ここに来ます。"
1005006-70 = "[wa:800]― 先生と[wa:1000]一緒に来たお店、"
1005006-72 = "[wa:200]― ということも[wa:500]ありますし……"
1005006-75 = "[wa:300]― 良いですか？[wa:1400]好きになってはないですよ？"
1005006-77 = "― 分かってます？"
1005006-80 = "[wa:1400]― ただまあ……"
1005006-82 = "― ニンジンも、[wa:1200]そこまで悪くは[wa:1000]ないかもしれません。"
1005006-85 = "何とか食べ切りましたね……"
1005006-86 = "[s] \"満足した？\""
1005006-87 = "悔しいですけど……美味しかったです。"
1005006-88 = "今回は仕方なくやられましたが、覚えておいてください。"
1005006-89 = "次は必ず、先生にやり返しますから！"
1005006-90 = "だから……また付き合ってくださいね。"
1005006-91 = "わかりましたか？"
