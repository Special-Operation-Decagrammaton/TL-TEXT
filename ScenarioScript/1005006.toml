[translation]
1005006-1 = "……Só desta vez, viu. É sério!"
1005006-2 = "Cidade durante o dia"
1005006-3 = "（Cheguei com a Kokona em um restaurante especializado em cenouras）"
1005006-4 = "Eu realmente vim... de verdade..."
1005006-5 = "Sério... então existia um restaurante assim... que choque."
1005006-6 = "Já dá para ver o banquete de cenouras logo na entrada..."
1005006-7 = "As cortinas também são de cenoura, e tem cenouras até na escada..."
1005006-8 = "E o mais importante, até a placa! É uma cenoura gigante!"
1005006-9 = "Sensei, ainda não é tarde. #nVamos fugir deste lugar aterrorizante."
1005006-10 = "O Sensei deve ter sido hipnotizado por alguma frequência estranha da Associação Maligna de Cenouras!"
1005006-11 = "Eu vou proteger o Sensei! Por favor, confie em mim!"
1005006-15 = "（Rindo, segurei o braço da Kokona e caminhei para dentro do restaurante）"
1005006-16 = "Solte! Por favor, me solte! #nOnde você pretende levar uma dama?!"
1005006-17 = "Isso é um acompanhamento? #nEu não preciso de um acompanhamento desses!"
1005006-18 = "Waaaaah!"
1005006-20 = "Interior do restaurante"
1005006-21 = "Sério... pensar que todos os pratos levam cenoura..."
1005006-22 = "Aceito o seu pedido."
1005006-23 = "Pedido? Bem..."
1005006-24 = "Esta pessoa vai fazer."
1005006-25 = "[s] \"Eu?\""
1005006-26 = "Você não me trouxe até aqui?"
1005006-27 = "Então o Sensei que deve decidir o pedido."
1005006-28 = "……Não importa o que venha, como é cenoura, deve ser ruim de qualquer jeito."
1005006-30 = "（Rindo, escolhi o prato especial da casa）"
1005006-31 = "（Logo a comida foi servida）"
1005006-33 = "[ns] \"Itadakimasu!\""
1005006-34 = "Itadakimasu... ugh..."
1005006-35 = "（Kokona levou a cenoura à boca a contragosto）"
1005006-36 = "（E então...!）"
1005006-37 = "Ué...? #nEste sabor...?"
1005006-38 = "É doce! E além disso... é macio e saboroso!"
1005006-39 = "Como isso é possível? #nIsso é mesmo cenoura?"
1005006-40 = "Hum, hum... então eles cozinham a cenoura no vapor até ficar doce e depois refogam na manteiga."
1005006-41 = "Agora tente comer com este molho? ...Entendido."
1005006-42 = "O sabor ficou ainda mais rico! #nQue coisa incrível..."
1005006-45 = "[wa:1400]― Aquele... "
1005006-47 = "― Não é como se eu tivesse passado a gostar de [wa:1000]cenouras, [wa:1300]entendeu?"
1005006-50 = "[wa:1000]― Já que eu [wa:1150]vim com o Sensei,"
1005006-52 = "― como uma instrutora exemplar, [wa:1700]estou apenas comendo porque não tenho escolha."
1005006-55 = "[wa:200]― Entendeu?"
1005006-57 = "― Nossa, [wa:1200]o Sensei sempre me força a fazer as coisas..."
1005006-60 = "[wa:1200]― Se por acaso"
1005006-62 = "[wa:160]― eu precisar comer [wa:900]cenouras..."
1005006-65 = "― Da próxima vez,"
1005006-67 = "― eu virei aqui."
1005006-70 = "[wa:800]― Já que é um lugar que [wa:1000]vim com o Sensei,"
1005006-72 = "[wa:200]― e também por outros [wa:500]motivos..."
1005006-75 = "[wa:300]― Entendido? [wa:1400]Eu não passei a gostar, viu?"
1005006-77 = "― Está me ouvindo?"
1005006-80 = "[wa:1400]― Bem, mas..."
1005006-82 = "― As cenouras, [wa:1200] talvez não sejam [wa:1000] tão ruins assim."
1005006-85 = "Consegui terminar de comer, de alguma forma..."
1005006-86 = "[s] \"Satisfeita?\""
1005006-87 = "É frustrante admitir, mas... estava delicioso."
1005006-88 = "Desta vez eu fui forçada a ceder, mas guarde bem as minhas palavras."
1005006-89 = "Na próxima, eu definitivamente vou dar o troco, Sensei!"
1005006-90 = "Por isso... você vai ter que me acompanhar de novo."
1005006-91 = "Entendido?"
