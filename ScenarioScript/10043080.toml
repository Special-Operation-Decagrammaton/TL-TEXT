[translation]
10043080-1 = "Episódio 8; A vida também começa com 2 eliminados na parte baixa da 9ª entrada"
10043080-2 = "Deixe-me examinar."
10043080-6 = "Guuuh..."
10043080-8 = "E-então, como está?"
10043080-9 = "Está tudo bem, senpai?"
10043080-14 = "Hmm..."
10043080-15 = "Se-senpai?"
10043080-16 = "Não há nada de errado com os ossos."
10043080-17 = "No entanto, será difícil segurar um bastão hoje."
10043080-18 = "Se não tiver cuidado, você pode acabar lesionando os ligamentos."
10043080-19 = "I-isso não pode ser...!"
10043080-21 = "Por que o rebatedor número 4 está em um lugar como este!"
10043080-22 = "..."
10043080-23 = "Não, a culpa é minha..."
10043080-24 = "Se eu não tivesse planejado isso desde o início..."
10043080-25 = "Mas..."
10043080-26 = "Eu queria ver a vitória... ou pelo menos uma derrota que pudesse aceitar!"
10043080-27 = "...Não existe partida que possamos aceitar totalmente."
10043080-28 = "Só nos resta continuar acumulando esforços."
10043080-30 = "Treinador...!"
10043080-31 = "Que palavras maravilhosas."
10043080-36 = "Base por bolas! Os Braves chegam à base mais uma vez!"
10043080-37 = "2 eliminados na parte baixa da 9ª entrada... bases lotadas!"
10043080-38 = "Não querendo ser indelicado, mas..."
10043080-39 = "Nesta situação... a gente acaba esperando por 'aquilo', não é?"
10043080-41 = "O rebatedor número 4 vai para a caixa de rebatidas!"
10043080-42 = "Senhoras e senhores no estádio! Finalmente, este momento chegou!!"
10043080-45 = "[ns] \"S-sério que estamos com 2 eliminados e bases lotadas na parte baixa da 9ª entrada!?\""
10043080-46 = "...Às vezes dizemos por brincadeira que 'o beisebol começa de verdade com 2 eliminados na parte baixa da 9ª entrada', mas"
10043080-47 = "quem diria que chegaríamos a esse ponto..."
10043080-48 = "O-o que faremos, treinador! Não tem nenhum rebatedor substituto...?"
10043080-49 = "Q-quem sobrou de rebatedor agora?"
10043080-50 = "...Apenas um rebatedor com 6,9% de aproveitamento e outro com 5,3%."
10043080-51 = "...Bem, é melhor deixar qualquer um deles balançar o bastão."
10043080-52 = "Droga... vamos perder de novo...!"
10043080-56 = "[ns] \"...Existe um jeito!\""
10043080-61 = "Se-sensei...?"
10043080-62 = "Que jeito seria esse!?"
10043080-63 = "[s] \"Rei.\""
10043080-64 = "O que foi?"
10043080-65 = "[s] \"Vá para a caixa de rebatidas.\""
10043080-69 = "...Eh?"
10043080-70 = "E-eu...?"
10043080-71 = "A única pessoa que pode rebater aqui... sou eu?"
10043080-72 = "...Está dizendo que é a vez do rebatedor número 4 do clube de beisebol do Millennium!?"
10043080-73 = "Espere um pouco!"
10043080-74 = "Isso é pedir demais, não importa como você olhe!"
10043080-75 = "Você deveria saber qual é o meu nível de habilidade..."
10043080-80 = "Se-sensei!?!?"
10043080-84 = "(Segura os dois ombros de Rei com firmeza)"
10043080-85 = "P-Professor, não... não dói, mas..."
10043080-86 = "Você está... um pouco perto demais..."
10043080-87 = "[s] Encaro Rei nos olhos."
10043080-88 = "P-Prof..."
10043080-89 = "[s] \"Se você fizer como sempre, vai dar certo!\""
10043080-90 = "D-de onde vem tanta confiança!?"
10043080-91 = "[s1] \"A média de rebatidas da Rei é de 8%. Ou seja, 8 por cento.\"\n[s2] \"Você está mais perto de ser a líder de rebatidas do que qualquer um aqui!\""
10043080-94 = "……Eh?"
10043080-95 = "[ns3] \"Acredite em si mesma!\"\n[ns4] \"Ou então... acredite em mim!\""
10043080-99 = "[ns5] \"O fato de os Braves perderem...\"\n[ns6] \"Não é algo que acontece só hoje, né?\""
10043080-104 = "I-isso é verdade, mas...!"
10043080-105 = "N-não consigo contra-argumentar..."
10043080-106 = "U-ugh...!"
10043080-107 = "Hum... o beisebol moderno tem dado muita importância a estatísticas e teorias, mas..."
10043080-108 = "O que decide o jogo no final não são os números—"
10043080-109 = "—são as pessoas!"
10043080-111 = "Rei-san. Não importa quantas vezes percam, muitos fãs continuam apoiando este time."
10043080-112 = "Isso não é um fenômeno que não pode ser medido por probabilidades ou estatísticas?"
10043080-113 = "Como chefe do Departamento de Treinamento, eu também estou torcendo por você."
10043080-118 = "Senpai...!"
10043080-124 = "……Estou indo."
10043080-137 = "Oh!? Quem foi para o bastão foi uma jogadora que aparece pela primeira vez!"
10043080-138 = "Quem será essa pessoa...!? A expectativa no estádio só aumenta!"
10043080-142 = "Quem será que é a rebatedora substituta...?"
10043080-143 = "Com dois eliminados na parte baixa da nona entrada, pensar que ainda restava uma rebatedora principal..."
10043080-148 = "P-por favor! Faça alguma coisa!"
10043080-149 = "Ah, meu Deus... não consigo nem olhar de tanta tensão!"
10043080-150 = "Pelo amor de tudo que é mais sagrado... uuuuh...!"
10043080-153 = "3 bolas e 2 strikes... contagem cheia. E com as bases lotadas na parte baixa da nona."
10043080-154 = "Dá para dizer que tudo será decidido aqui."
10043080-159 = "……O arremessador tenta pegar o corredor na primeira base! Felizmente, o corredor é rápido!"
10043080-160 = "O arremessador também parece estar nervoso..."
10043080-166 = "(Os gritos de todos)"
10043080-167 = "(O calor intenso)"
10043080-168 = "(Para mim, agora, não consigo ouvir... nem sentir...)"
10043080-172 = "O arremessador tenta pegar o corredor de novo! Desta vez na terceira base!"
10043080-173 = "(O Professor disse para eu acreditar em mim mesma)"
10043080-174 = "(Ou para acreditar no julgamento dele)"
10043080-175 = "(Sinceramente, não sei se consigo...)"
10043080-179 = "Como chefe do Departamento de Treinamento, eu também estou torcendo por você."
10043080-180 = "(Mas a Senpai, e todos os outros, estão torcendo por mim)"
10043080-186 = "……Não existe jogo que te deixe totalmente satisfeito."
10043080-187 = "(……É verdade, né)"
10043080-193 = "Se o meu apoio puder dar coragem a alguém—"
10043080-194 = "(E também...)"
10043080-197 = "[log]Cuidar de todos é—[/log]"
10043080-199 = "[log]—porque eu gosto, eu acho.[/log]"
10043080-203 = "(Tentando desistir)"
10043080-204 = "(Mesmo assim, algo que não consigo abandonar...)"
10043080-205 = "(……)"
10043080-206 = "(……É só fazer como sempre faço)"
10043080-207 = "(……É isso mesmo)"
10043080-211 = "O arremessador se prepara…… e lança a bola decisiva!"
10043080-214 = "Boa sorte!"
10043080-215 = "Não precisa se preocupar com o resultado!"
10043080-216 = "Rei-san…… por favor, não desista e continue avançando!"
10043080-240 = "Ela rebateu!!!"
10043080-241 = "Isso é……!"
10043080-242 = "Voou! Essa foi longe……! Parece que vai passar por cima da cerca do campo externo!?"
10043080-243 = "Essa foi uma tacada perfeita!"
10043080-248 = "Passou! Passou! A trajetória da bola ultrapassou a cerca!"
10043080-249 = "Corgi Braves!! No último momento, um Grand Slam de virada para encerrar o jogo!!!"
10043080-250 = "Nossa, quem diria que um milagre desses aconteceria……!"
10043080-251 = "Corgi Braves!! A primeira vitória histórica foi gravada na história neste exato momento!"
10043080-254 = "(Não me lembro muito bem do que todos estavam dizendo)"
10043080-255 = "(Mas, depois de balançar o bastão com toda a minha força……)"
10043080-258 = "(Continuei acompanhando com os olhos aquela sombra branca desenhando um arco)"
10043080-263 = "Conseguimos! Nós vencemos!"
10043080-264 = "Issooooooo!"
10043080-266 = "U-uuh…… pensar que eu viveria para ver este dia……!"
10043080-272 = "……Hã? Com um walk-off!? Os Braves venceram!? É sério!?"
10043080-273 = "……Isso não é um sonho, né!?"
10043080-277 = "Muito obrigada……."
10043080-278 = "Quem diria que venceríamos de verdade……."
10043080-279 = "Este momento…… quantas vezes eu sonhei com ele……."
10043080-283 = "Foi uma longa jornada…… de verdade……."
10043080-284 = "N-não, ainda não! Isso é apenas o nosso começo!"
10043080-287 = "Que torcida incrível……!"
10043080-291 = "Todos parecem tão felizes, e isso é o que mais importa!"
