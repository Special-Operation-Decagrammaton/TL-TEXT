[translation]
10043080-1 = "第8話;人生も、9回裏2アウトから"
10043080-2 = "診せてください。"
10043080-6 = "ぐうぅっ……。"
10043080-8 = "ど、どうだ？"
10043080-9 = "大丈夫ですよね、先輩？"
10043080-14 = "うーん……"
10043080-15 = "せ、先輩？"
10043080-16 = "骨に異常はありません。"
10043080-17 = "ですが、今日バットを握るのは難しいでしょう。"
10043080-18 = "下手をすれば、靭帯を損傷してしまいます。"
10043080-19 = "そ、そんな……！"
10043080-21 = "なんで4番バッターがこんなところにいるんだ！"
10043080-22 = "……。"
10043080-23 = "いや、俺のせいだな……"
10043080-24 = "最初からこんな計画をしていなければ……。"
10043080-25 = "でも……。"
10043080-26 = "勝つ姿を……せめて、納得できる負けが見たかった！"
10043080-27 = "……納得いく試合なんてないさ。"
10043080-28 = "努力を積み重ねるしかない。"
10043080-30 = "監督……！"
10043080-31 = "素晴らしいお言葉です。"
10043080-36 = "フォアボール！ブレーブス、またしても出塁！"
10043080-37 = "9回裏2アウト……満塁です！"
10043080-38 = "こう言うのはなんですが……"
10043080-39 = "この状況……「あれ」を期待してしまいますね。"
10043080-41 = "打席に立つのは4番バッター！"
10043080-42 = "スタジアムにご来場の皆様！ついに、この瞬間が訪れました！！"
10043080-45 = "[ns] \"ほ、ほんとに9回裏2アウト満塁なの！？\""
10043080-46 = "……「野球は9回裏2アウトから本番！」と冗談で言ったりもしますけど、"
10043080-47 = "まさかこうなるとは……"
10043080-48 = "ど、どうしましょう、監督！誰か代打はいないんですか……？"
10043080-49 = "い、今残っているバッターは？"
10043080-50 = "……打率六分九厘の打者と、五分三厘の打者だけだ。"
10043080-51 = "……ま、そのへんのやつに振らせた方がマシだな。"
10043080-52 = "くっ……今回も負けるのか……！"
10043080-56 = "[ns] \"……1つだけ方法が！\""
10043080-61 = "せ、先生……？"
10043080-62 = "どんな方法ですか！？"
10043080-63 = "[s] \"レイ。\""
10043080-64 = "なんですか？"
10043080-65 = "[s] \"バッターボックスに立とう。\""
10043080-69 = "……え？"
10043080-70 = "わ、私……？"
10043080-71 = "ここで打てるのは……私しかいない、ですか？"
10043080-72 = "……ミレニアム野球部の4番バッターの出番ですって！？"
10043080-73 = "ちょっと待ってください！"
10043080-74 = "いくらなんでも無茶ぶりですよ！"
10043080-75 = "私の実力くらい、わかってるはずなのに……"
10043080-80 = "せ、先生！？！？"
10043080-84 = "（レイの両肩を力強く掴む）"
10043080-85 = "せ、先生、痛……くはないですが……。"
10043080-86 = "ちょっと……近いです……。"
10043080-87 = "[s] レイと目を合わせる。"
10043080-88 = "せ、せん……！"
10043080-89 = "[s] \"いつも通りやれば、大丈夫！\""
10043080-90 = "ど、どこからその自信が！？"
10043080-91 = "[s1] \"レイの打率は8分。つまり8パーセント。\"\n[s2] \"今いる誰よりも、首位打者に近い！\""
10043080-94 = "……ええ？"
10043080-95 = "[ns3] \"自分を信じて！\"\n[ns4] \"それか……私を信じて！\""
10043080-99 = "[ns5] \"ブレーブスが負けるのは……\"\n[ns6] \"今日に限った話じゃないんでしょ？\""
10043080-104 = "そ、それを言われると……！"
10043080-105 = "は、反論できない……。"
10043080-106 = "う、うっ……！"
10043080-107 = "うむ……最近の野球は、統計と理論が重視されつつあるが……。"
10043080-108 = "最後に勝負を決めるのは数字じゃない――"
10043080-109 = "――人だ！"
10043080-111 = "レイさん。何度負けても、多くのファンがこのチームを応援し続けています。"
10043080-112 = "これこそ、確率や統計では測れない現象ではないですか。"
10043080-113 = "トレーニング部の部長として、私も応援しています。"
10043080-118 = "先輩……！"
10043080-124 = "……行ってきます。"
10043080-137 = "おや！？打席に立ったのは、今回初登場の選手です！"
10043080-138 = "あの人物は一体誰なのか……！スタジアムの期待が高まります！"
10043080-142 = "代打の人、誰だろう……？"
10043080-143 = "9回裏2アウトで、まだ主力バッターが残っていたなんて……。"
10043080-148 = "た、頼む！なんとかしてくれっ！"
10043080-149 = "ああもう……ヒヤヒヤして見てられない！"
10043080-150 = "か、神様仏様なんとか様……ううぅ…！"
10043080-153 = "3ボール2ストライク……フルカウントです。そして、9回裏満塁。"
10043080-154 = "ここですべてが決まると言っていいでしょう。"
10043080-159 = "……ピッチャーが一塁へ牽制！幸い、ランナーの足が速かった！"
10043080-160 = "ピッチャーも緊張しているようですね……。"
10043080-166 = "（みんなの歓声も）"
10043080-167 = "（あふれる熱気も）"
10043080-168 = "（今の私には聞こえないし……感じない……）"
10043080-172 = "ピッチャー、再び牽制！今度は三塁！"
10043080-173 = "（先生は、自分を信じろって言っていた）"
10043080-174 = "（それか、先生の判断を信じてって）"
10043080-175 = "（正直、やれるかは分からない……）"
10043080-179 = "トレーニング部の部長として、私も応援しています。"
10043080-180 = "（でも、先輩が、みんなが、応援してくれてる）"
10043080-186 = "……納得いく試合なんてないさ。"
10043080-187 = "（……ほんと、そうだよね）"
10043080-193 = "私の応援が、誰かの勇気になるのなら――"
10043080-194 = "（そして……）"
10043080-197 = "[log]みんなを見守るのが――[/log]"
10043080-199 = "[log]――好きだから、かな。[/log]"
10043080-203 = "（諦めようとして）"
10043080-204 = "（それでも、諦めきれないこと……）"
10043080-205 = "（……）"
10043080-206 = "（……いつも通りやればいい）"
10043080-207 = "（……そうですよね）"
10043080-211 = "ピッチャー振りかぶって……勝負の一球！"
10043080-214 = "頑張ってください！"
10043080-215 = "結果なんて、気にしなくていいんです！"
10043080-216 = "レイさん……諦めずに、進み続けてください！"
10043080-240 = "打った！！！"
10043080-241 = "これは……！"
10043080-242 = "飛んだ！これは大きい……！外野フェンスを越えて行きそうだぞぉ！？"
10043080-243 = "これは会心の一発です！"
10043080-248 = "越えた！越えた！放物線がフェンスを越えました！"
10043080-249 = "コーギー・ブレーブス！！最後の最後で、逆転サヨナラ満塁ホームランです！！！"
10043080-250 = "いやぁ、こんな奇跡ってあるんですねぇ……！"
10043080-251 = "コーギー・ブレーブス！！歴史的初勝利が、今この瞬間、歴史に刻まれました！"
10043080-254 = "（みんながなんと言っていたのかは、あまり覚えていない）"
10043080-255 = "（ただ、全力でバットを振った後は……）"
10043080-258 = "（弧を描く白い影を、目で追い続けていた）"
10043080-263 = "やったあぁぁぁぁ！私たちの勝ちよーっ！"
10043080-264 = "っしゃああああぁぁっ！"
10043080-266 = "う、うぅっ……生きているうちにこの日を迎えられるなんて……！"
10043080-272 = "……え？サヨナラで！？ブレーブスが勝った！？マジ！？"
10043080-273 = "……これ、夢じゃないよね！？"
10043080-277 = "ありがとうございます……。"
10043080-278 = "まさか、本当に勝つなんて……。"
10043080-279 = "この瞬間を……何度夢見たことか……。"
10043080-283 = "長かった……本当に……。"
10043080-284 = "い、いや、まだだ！これは我々の始まりにすぎん！"
10043080-287 = "凄い歓声ですね……！"
10043080-291 = "皆さんとっても楽しそうで、なによりです！"
