[translation]
10010125-1 = "Episódio 12; It Serves You Right (2)"
10010125-6 = "……。"
10010125-11 = "[ns] \"……。\""
10010125-19 = "A-ah, desculpe... Sensei..."
10010125-20 = "Bem, não é como se eu tivesse alguma ideia brilhante, mas..."
10010125-21 = "M-mas, ainda assim, eu queria fazer algo..."
10010125-22 = "……Eh?"
10010125-23 = "Preocupação, você diz...?"
10010125-24 = "I-isso é..."
10010125-28 = "É verdade... é algo estranho, eu sei."
10010125-29 = "A-afinal, é a primeira vez que nos vemos hoje... nem eu mesma sei bem o que estou dizendo..."
10010125-30 = "De qualquer forma, eu não conseguia parar de pensar nisso... ou melhor, eu senti que precisava..."
10010125-31 = "B-bem, mesmo assim, é só isso que eu consigo fazer..."
10010125-37 = "……P-pronto. A restauração da escritura está concluída."
10010125-38 = "Se dependesse de mim, eu leria agora mesmo aqui, mas..."
10010125-39 = "Não estou com disposição para isso agora."
10010125-40 = "P-portanto, eu... vou entregar isso ao Sensei. O resto, bem..."
10010125-41 = "……Ei."
10010125-45 = "Se eu fosse o tipo de pessoa que sai mais por aí..."
10010125-46 = "S-se fosse assim, talvez eu tivesse terminado mais cedo... e esse resultado não teria acontecido...?"
10010125-47 = "N-não, bem, não é como se a culpa fosse minha... eu acho..."
10010125-48 = "Eu apenas ocupo esta posição..."
10010125-49 = "A-acho que fiz tudo o que estava ao meu alcance..."
10010125-50 = "……Mesmo assim."
10010125-51 = "Mesmo assim, se... se eu não tivesse mencionado o bolo e apenas continuado a trabalhar..."
10010125-53 = "Ou, se eu tivesse usado a \"Cola de Musgo\"... quebrando uma das janelas deste prédio para conseguir..."
10010125-54 = "Se eu tivesse economizado o \"Medicamento Sagrado\" desde o início..."
10010125-55 = "D-desculpe, acabei falando demais..."
10010125-57 = "D-desculpe, é que... meu raciocínio está um pouco confuso..."
10010125-58 = "N-não é que eu queira ser uma pessoa boa ou agir como tal..."
10010125-59 = "Desculpe, por favor, esqueça o que eu disse..."
10010125-60 = "[s] \"……。\""
10010125-64 = "[ns1] \"Bolo……。\"\n[ns2] \"Cola de Musgo……。\"\n[ns3] \"Medicamento Sagrado……。\""
10010125-65 = "S-Sensei...?"
10010125-66 = "S-Sensei...?"
10010125-67 = "S-Sensei...?"
10010125-90 = "Hum, Sensei...?"
10010125-91 = "D-desculpe, chamadas aqui são..."
10010125-92 = "Sensei...?"
10010125-93 = "P-para onde você está ligando...?"
10010125-94 = "……Eh?"
10010125-97 = "Para vários lugares...?"
10010125-103 = "A-ah, é ali..."
10010125-104 = "Está quase na hora de começar..."
10010125-105 = "Tenho que dar um jeito de entrar e contar a verdade..."
10010125-107 = "Espere um momento."
10010125-108 = "……?"
10010125-109 = "Quem seria você? Estamos no meio de uma cerimônia importante, poderia me dizer sua afiliação e nome?"
10010125-110 = "Ah, esse uniforme... você é da Sisterhood?"
10010125-111 = "B-boa noite... hum, do Comitê de Justiça...?"
10010125-112 = "Sim. Sou a Mashiro, do Comitê de Justiça."
10010125-113 = "Estou encarregada da segurança aqui hoje."
10010125-114 = "A propósito, por que você está aqui...?"
10010125-115 = "Ouvi dizer que todos os convidados já entraram no salão..."
10010125-116 = "Ah, sim. Eu não sou uma das convidadas, mas..."
10010125-117 = "Entendo."
10010125-118 = "Sinto muito. Mesmo sendo da Irmandade, ninguém além dos participantes autorizados pode entrar."
10010125-119 = "A segurança de hoje está bem rigorosa; até mesmo os membros do Comitê de Justiça responsáveis pela guarda não têm permissão para passar dos pontos determinados."
10010125-120 = "Não sei os detalhes, mas trata-se das escrituras. Acredito que você entenda que precisamos manter a segurança reforçada por causa disso..."
10010125-122 = "Sim, eu entendo..."
10010125-123 = "Mas, ainda assim... eu preciso falar pessoalmente, não tem outro jeito."
10010125-125 = "…Entendo?"
10010125-126 = "Seria algum tipo de recado...? Se for isso, eu posso transmitir para você."
10010125-127 = "Ah, isso, é que..."
10010125-128 = "Bem..."
10010125-129 = "…?"
10010125-130 = "Ei, as escrituras que estão lá dentro..."
10010125-131 = "…As escrituras?"
10010125-132 = "Eu, sabe, eu..."
10010125-133 = "Snif, snif..."
10010125-134 = "I-Irmã!? Por que você começou a chorar de repente... V-você está bem!?"
10010125-135 = "Snif, eu... por minha causa..."
10010125-136 = "Por minha causa, aquelas escrituras...!"
10010125-138 = "Nós somos o 'Grupo das Sete Quedas e Oito Levantadas', que se levanta não importa quantas vezes caia!!"
10010125-139 = "Sim, não importa quantas vezes caiamos...!"
10010125-143 = "…Eh?"
10010125-145 = "…Sim?"
10010125-146 = "I- 'Grupo das Sete Quedas e Oito Levantadas'...?"
10010125-147 = "I-Inimigos! Ataque inimigo!!"
10010125-156 = "O quê... tão de repente, sem aviso prévio!?"
10010125-157 = "Qual o tamanho do grupo inimigo!?"
10010125-158 = "E-eu não sei! Eles estão disparando tiros de intimidação a partir da escuridão e fugindo logo em seguida...!"
10010125-159 = "Droga, entendi...! Agir assim contra o Comitê de Justiça é um desafio direto!"
10010125-161 = "…???"
10010125-162 = "Irmã, sinto muito, por favor, espere um pouco. Ouvirei seu recado mais tarde."
10010125-164 = "Como os inimigos estão espalhados, não estamos conseguindo reagir a tempo! Precisamos de reforços!"
10010125-166 = "Espere! Mashiro, estou indo!!"
10010125-167 = "A-agradeço muito!"
10010125-171 = "…?"
10010125-173 = "Bem, isso... eu posso entrar...?"
