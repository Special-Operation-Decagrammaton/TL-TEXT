[translation]
10010125-1 = "第12話;イット・サーヴズ・ユー・ライト（２）"
10010125-6 = "……。"
10010125-11 = "[ns] \"……。\""
10010125-19 = "あ、あの……先生……。"
10010125-20 = "その、何か妙案があるわけではないのですが……。"
10010125-21 = "で、ですがその、それでも何かを……。"
10010125-22 = "……え？"
10010125-23 = "心配、ですか……？"
10010125-24 = "そ、それは……。"
10010125-28 = "そう、ですね……不思議なこと、ですが。"
10010125-29 = "そ、そもそも、今日初めて会った方ですし……自分でも何を言ってるのか、よく分かっていませんが……。"
10010125-30 = "とにかく、気になってしまったんです……感じ取れてしまった、と言いますか……。"
10010125-31 = "ま、まあそれでも、私にはこれくらいしかできないのですけれど……。"
10010125-37 = "……か、完成しました。経典の復元、完了です。"
10010125-38 = "何なら今すぐこの場で、私が読みたいところなのですが……"
10010125-39 = "今はそんな気分ではありませんね。"
10010125-40 = "で、ですので、これは……先生にお渡しします。あとは、その……"
10010125-41 = "……もし。"
10010125-45 = "もし私が、もっと外を歩き回るようなタイプだったら……。"
10010125-46 = "そ、そうだったら、もう少し早く終わって……こんな結果には、ならなかったのでしょうか……。"
10010125-47 = "い、いえ、まあ私のせいではない……のでしょうけれど……。"
10010125-48 = "私はあくまで、こういう立ち位置で……。"
10010125-49 = "じ、自分にできることは、やったつもりですが……。"
10010125-50 = "……それでも。"
10010125-51 = "それでも、もし……私がケーキなどと言い出さずに、ただ作業をしていれば……。"
10010125-53 = "あ、或いは、「[ruby=みずごけにかわ]水苔膠[/ruby]」を……この建物の窓をひとつ壊して、それを使うことにしていれば……。"
10010125-54 = "「精聖薬」を、普段から節約していれば……。"
10010125-55 = "そ、そんなことを、つい……。"
10010125-57 = "す、すみませんその、ま、まとまりのない話で……。"
10010125-58 = "べ、別に良い人になろうとか、そう振舞おうとか、そういったことではないのですが……。"
10010125-59 = "すみません、忘れてください……。"
10010125-60 = "[s] \"……。\""
10010125-64 = "[ns1] \"ケーキ……。\"\n[ns2] \"水苔膠……。\"\n[ns3] \"精聖薬……。\""
10010125-65 = "せ、先生……？"
10010125-66 = "せ、先生……？"
10010125-67 = "せ、先生……？"
10010125-90 = "えっと、先生……？"
10010125-91 = "す、すみません、ここでの通話は……。"
10010125-92 = "先生……？"
10010125-93 = "ど、どこにかけてるんですか……？"
10010125-94 = "……え？"
10010125-97 = "色んな所、に……？"
10010125-103 = "あ、あそこですね……。"
10010125-104 = "そろそろ始まる時間……。"
10010125-105 = "どうにか中に入って、本当のことを……。"
10010125-107 = "お待ちください。"
10010125-108 = "……？"
10010125-109 = "どちら様でしょうか？現在大切な式典の最中でして、所属とお名前を頂けますか？"
10010125-110 = "あれ、その服装……シスターフッドの方でしたか。"
10010125-111 = "こ、こんばんは……えっと、正義実現委員会の……？"
10010125-112 = "はい。正義実現委員会のマシロです。"
10010125-113 = "本日こちらの警備を担当しております。"
10010125-114 = "ところで、本日はどうしてここに……？"
10010125-115 = "出席予定の方々は、皆さんすでに会場に入られていると聞きましたが……。"
10010125-116 = "あ、はい。私は出席メンバーではないのですが……。"
10010125-117 = "左様でしたか。"
10010125-118 = "申し訳ありません。シスターフッドの方であっても、参加予定の方以外は入ることができないのです。"
10010125-119 = "本日のセキュリティは中々厳しく、警備担当の正義実現委員会のメンバーですら既定の場所より中には入れないことになってまして。"
10010125-120 = "詳細は知りませんが、何せ経典に関することです。ともすれば、警備を厳しくせざるを得ないというのは、恐らくご理解いただいているかなと思いますが……。"
10010125-122 = "はい、分かってます……。"
10010125-123 = "ですが、それでも……どうしても、私が直接言わないといけないんです。"
10010125-125 = "……なるほど？"
10010125-126 = "何か伝言……ということでしょうか？それでしたら、私の方からお伝えしますよ？"
10010125-127 = "あ、それは、その……。"
10010125-128 = "えっと……。"
10010125-129 = "……？"
10010125-130 = "あの、中にある経典が……。"
10010125-131 = "……経典？"
10010125-132 = "それをその、私が……。"
10010125-133 = "うっ、うぅっ……。"
10010125-134 = "し、シスターさん！？どうして急に泣かれて……だ、大丈夫ですか！？"
10010125-135 = "ぐすっ、私が……私のせいで……"
10010125-136 = "私のせいで、その経典が……！"
10010125-138 = "私たちは幾度倒れようとも立ち上がる、「七転八倒団」！！"
10010125-139 = "はい、幾度倒れようとも……！"
10010125-143 = "……え？"
10010125-145 = "……はい？"
10010125-146 = "し、「七転八倒団」……？"
10010125-147 = "て、敵襲！敵襲です！！"
10010125-156 = "なっ……こんな急に、前触れもなく！？"
10010125-157 = "相手の規模は！？"
10010125-158 = "わ、分かりません！暗いところから威嚇射撃と、逃走を繰り返されてしまい……！"
10010125-159 = "くっ、そうでしたか……！正義実現委員会に対してその行動、挑戦状と見ました！"
10010125-161 = "……？？？"
10010125-162 = "シスターさんすみません、少し待っていてください。伝言は後ほど聞きます。"
10010125-164 = "敵が散らばっているせいで、対応が間に合いません！兵力の補充を！"
10010125-166 = "お待ちください！マシロ、行きます！！"
10010125-167 = "あ、ありがとうございます！"
10010125-171 = "……？"
10010125-173 = "えっと、これ……私、入っても……？"
