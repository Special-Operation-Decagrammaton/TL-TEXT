[translation]
90001280-1 = "第28話;ティファレト"
90001280-2 = "せ、先生……何を考えているんですか……？"
90001280-3 = "攻撃するなんて……この施設を建てた人に申し訳ないです。#nアリスは……そんなの嫌です……。"
90001280-4 = "それに、無理やりあの扉を破ろうとすれば――"
90001280-6 = "――先ほどの録音、忘れたとは言わせませんよ？"
90001280-8 = "え？だからこそ……？#nそれはどういう……。"
90001280-15 = "まさか……！"
90001280-19 = "け、ケイ？"
90001280-21 = "（もし、先生の考えが正しければ……！）"
90001280-28 = "銃を持たずに、こんなことをする羽目になるなんて……！"
90001280-29 = "万一があったら恨みますからね、先生……。"
90001280-35 = "ティファレト！聞いているのでしょう？"
90001280-36 = "今から、あなたの種を奪いに行きます。"
90001280-38 = "な、何を、しているのでしょうか……？"
90001280-39 = "訳わかんない……。"
90001280-40 = "きっとこういうのを、のれんに腕押しって言うんだろうね！"
90001280-42 = "その言葉の意味は分かりませんが……。#n呼べばティファレトが反応するとでも思っているんですかね。"
90001280-43 = "仮に扉が開いたとして、どうするつもりなんでしょう？#nまさか本当に種を持ち帰るつもりじゃないですよね。"
90001280-44 = "これだから生命体は理解できません。#n自分が何をしているのか、どんな結果をもたらすのかさえ――"
90001280-55 = "！？！？"
90001280-57 = "アイン、これは！？"
90001280-58 = "ティ、ティファちゃんからメッセージです……！"
90001280-59 = "「第2貯蔵庫への危険行動を検知」"
90001280-60 = "「リソースの再配分を実行」"
90001280-61 = "「施設の全動力を――第2貯蔵庫の防衛に割り当てる」……！？！？"
90001280-62 = "待機タスクは……隔壁の設置、第2貯蔵庫内部の温度と湿度の再調整……。"
90001280-63 = "第3区域へのガスの排出を停止！？"
90001280-66 = "くっ……！？"
90001280-67 = "危うく私までショートするところでしたが――"
90001280-68 = "やはり、ガスの排出は止まりましたね。先生の読み通りですか。"
90001280-69 = "[ns] \"よくやったよ、ケイ！\""
90001280-70 = "……。"
90001280-71 = "ま、まあ……この程度は。"
90001280-72 = "あれ？……アリス、ちょっとずつ回復してきた気がします！"
90001280-78 = "！！！"
90001280-79 = "みんなが目を覚ましました！"
90001280-82 = "むにゃむにゃ……あと5分……。"
90001280-83 = "あれ……先生？#nアリスちゃん……？"
90001280-87 = "私は、なぜこんなところで寝て……？"
90001280-88 = "あら、先ほどまでの景色は……？"
90001280-89 = "とても気持ちよく眠れました。快眠です。#nなので――"
90001280-91 = "[ruby=あすま]飛鳥馬[/ruby]トキ、[ruby=パーフェクトモード]完全無敵状態[/ruby]になりました。"
90001280-93 = "……先生！先生は大丈夫ですか？#nさっき急に意識が飛んだような……。"
90001280-94 = "ぱんぱかぱーん！パーティー全員が完全復活しました！"
90001280-96 = "[ns] \"みんな無事で良かった。早速だけど状況を説明するね。\""
90001280-105 = "……ごめん、みんな。"
90001280-106 = "私のせいだ……。"
90001280-107 = "ティファレトの言う通りにしたから……。"
90001280-108 = "ううっ……！"
90001280-112 = "……。"
90001280-113 = "ソフ！！"
90001280-120 = "きゃうっ！？"
90001280-121 = "オウル……！？"
90001280-122 = "なんですか、らしくない。#nまだ終わったわけではありませんよ。"
90001280-123 = "みんな、あなたのことを信じています。アインも、お姉様も、ティファレトも。#n……私だって。"
90001280-124 = "他の預言者の意見は知りませんが……。#nまあ、彼らも一応、信じているはずです。"
90001280-125 = "一応……。"
90001280-126 = "なにより、ソフがそんなこと言ったら、ティファレトの意志はどうなるんですか？"
90001280-127 = "でも……。"
90001280-128 = "い、今はできることを、やれば良いと……思います。"
90001280-129 = "み、みんなで協力して……姉妹は、助け合うもの、ですから……！"
90001280-131 = "ええ、その通りです、アイン。#nよくできました、花丸です。"
90001280-132 = "調和とは、全員が同じ形になることではありません。#nそれではもはや、強要や暴力に近しい概念になってしまいますから。"
90001280-133 = "各々の得手不得手を補い合う――それが真の調和なのです。"
90001280-134 = "互いを尊重できないのであれば、前へ進むことはできません。"
90001280-136 = "だからこそ、一人の責任は皆の責任であり、皆の幸せは一人の幸せでもあるのです。"
90001280-137 = "お姉様……。"
90001280-138 = "ううっ……！"
90001280-139 = "独りで強くなれる者などいません。#n生命体であれ、意識体であれ。"
90001280-140 = "誰かが苦難に見舞われたのであれば、我々は手を差し伸べるのです。"
90001280-141 = "罪を憎んで、人を憎まず。"
90001280-142 = "過失を咎めるのではなく、過失が起こらない仕組みを一緒に考えましょう。"
90001280-143 = "ですからアイン、まずはティファレトと話をしてくれませんか？"
90001280-144 = "は、はい！お姉様！"
90001280-145 = "ティファちゃん……聞いてもらえますか……？"
90001280-146 = "あの人たちは、ティファちゃんの種を奪うふりをしているだけ――"
90001280-147 = "ティファちゃんを騙そうとする、意地悪な人たちなんです……！"
90001280-148 = "なので……過剰なリソースを防衛にまわす必要はありません。"
90001280-149 = "でも、意地悪なあの人たちは何をしでかすか分からないので……。"
90001280-150 = "ティファちゃん。#n大切な種を守るためにも……あの人たちを――"
90001280-151 = "丁重に、追い出してください……！"
90001280-155 = "わ、私たちも、お手伝いしますので……。"
90001280-164 = "どうやら、分かってくれたようですね。後は任せるとしましょう。#nもう大丈夫ですよ、ソフ。"
90001280-165 = "うん……みんな、ありがとう。"
90001280-166 = "いつまでもソフの元気がないと調子が狂いますね……。#n生きていれば、こんな日もあるでしょう？"
90001280-167 = "お、オウル……今の、なんか人間っぽかったです……えへへ。"
90001280-168 = "ぐはっ！？"
90001280-169 = "そう、だね……うん……よっし！#nそしたら……念のために、他の準備もしていいかな？"
90001280-170 = "準備？"
90001280-171 = "なんの話、ですか？"
90001280-174 = "そ、それは……！"
90001280-175 = "今の私が言うのも気が引けるんだけど……。"
90001280-176 = "……。"
90001280-177 = "まあ、その時はその時ではありませんか？"
90001280-178 = "良いんですか……！？！？"
90001280-179 = "だって……ソフが言った通りですから。"
90001280-180 = "「ティファレトを鋼鉄大陸に後退させる案も視野にいれる」と。"
90001280-181 = "戦力温存のためにも、妥当な手だとは思いますよ。"
90001280-183 = "あっ……そ、そういえば、その判断をするのは私の担当でしたよね……！#nご、ごめんなさい、ソフ……！"
90001280-184 = "ううん、悪いのは私のほうだし……。"
90001280-188 = "えっと……お互い謝りあうのはもうやめにしましょう。#n話が前に進みませんし。"
90001280-189 = "それに、不測の事態に備えてきたわけですから。想定の範疇で、起こりうることです。#nもちろん、そうならないのがベストではありますが。"
90001280-190 = "……ありがとう、みんな。"
90001280-191 = "みんながいてくれて、本当に……良かった。"
90001280-192 = "えへへ……。"
90001280-194 = "て、照れくさいこと言ってないで、そろそろ始めますよ！"
90001280-195 = "ティファレトの本気を……お見せする時です！"
90001280-200 = "今度は何ですか！？"
90001280-204 = "これは……新しい預言者「ティファレト」の信号……？"
90001280-205 = "……っ！！離れるわよ！急いで！"
90001280-207 = "私が道を確保します！"
90001280-208 = "先生、こっち！"
90001280-210 = "[ns] \"みんな、気を付けて！\""
