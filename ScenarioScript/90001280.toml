[translation]
90001280-1 = "Episódio 28: Tiferet"
90001280-2 = "P-Professor... o que você está pensando...?"
90001280-3 = "Atacar... sinto muito por quem construiu esta instalação. #nAlice... não quer fazer isso..."
90001280-4 = "Além disso, se tentarmos forçar aquela porta a abrir—"
90001280-6 = "—Não me diga que já esqueceu da gravação de agora pouco?"
90001280-8 = "Hã? É justamente por isso...? #nO que isso quer dizer..."
90001280-15 = "Não pode ser...!"
90001280-19 = "K-Kei?"
90001280-21 = "(Se o raciocínio do Professor estiver correto...!)"
90001280-28 = "Ter que fazer algo assim sem nem estar com uma arma em mãos...!"
90001280-29 = "Se algo der errado, eu vou te culpar, Professor..."
90001280-35 = "Tiferet! Você está ouvindo, não está?"
90001280-36 = "Estou indo buscar a sua semente agora mesmo."
90001280-38 = "O-o que você está fazendo...?"
90001280-39 = "Não entendo nada..."
90001280-40 = "Com certeza isso é o que chamam de 'falar com as paredes', não é?"
90001280-42 = "Não entendo o significado dessas palavras... #nVocê acha mesmo que a Tiferet vai responder só porque você a chamou?"
90001280-43 = "Mesmo que a porta abrisse, o que você pretende fazer? #nVocê não está pensando em realmente levar a semente embora, está?"
90001280-44 = "É por isso que não consigo entender os seres vivos. #nEles nem sabem o que estão fazendo ou quais resultados isso trará—"
90001280-55 = "！？！？"
90001280-57 = "Ain, o que é isso!?"
90001280-58 = "É uma mensagem da Ti-Tifa...!"
90001280-59 = "“Ação de risco detectada no 2º Armazém”"
90001280-60 = "“Executando redistribuição de recursos”"
90001280-61 = "“Toda a energia da instalação será... alocada para a defesa do 2º Armazém”...！？！？"
90001280-62 = "Tarefas em espera... instalação de anteparas, reajuste de temperatura e umidade dentro do 2º Armazém..."
90001280-63 = "Parando a liberação de gás para a 3ª Zona!?"
90001280-66 = "Droga...!?"
90001280-67 = "Por pouco eu não entrei em curto-circuito também, mas—"
90001280-68 = "Como esperado, a liberação de gás parou. Foi exatamente como o Professor previu."
90001280-69 = "[ns] \"Muito bem, Kei!\""
90001280-70 = "..."
90001280-71 = "B-bem... não foi nada demais."
90001280-72 = "Ué? ...Alice sente que está se recuperando aos poucos!"
90001280-78 = "!!!"
90001280-79 = "Todos acordaram!"
90001280-82 = "Mnham mnham... só mais 5 minutos..."
90001280-83 = "Ué... Professor? #nAlice...?"
90001280-87 = "Por que eu estava dormindo em um lugar como este...?"
90001280-88 = "Ora, onde foi parar a paisagem de agora pouco...?"
90001280-89 = "Dormi muito bem. Foi um sono revigorante. #nPor isso—"
90001280-91 = "Toki Asuma, em estado de invencibilidade total."
90001280-93 = "...Professor! O senhor está bem? #nPareceu que sua consciência se apagou de repente..."
90001280-94 = "Tcharam! Todos do grupo estão totalmente recuperados!"
90001280-96 = "[ns] \"Fico feliz que todos estejam bem. Vou explicar a situação agora mesmo.\""
90001280-105 = "...Desculpem, pessoal."
90001280-106 = "A culpa é minha..."
90001280-107 = "Porque eu fiz o que a Tiferet disse..."
90001280-108 = "Uuu..."
90001280-112 = "..."
90001280-113 = "Soph!!"
90001280-120 = "Kyaa!?"
90001280-121 = "Oul……!?"
90001280-122 = "O que foi? Isso não é do seu feitio.#nAinda não chegamos ao fim."
90001280-123 = "Todos acreditam em você. Ain, a Irmã Mais Velha e Tiphareth também.#n……E eu também."
90001280-124 = "Não sei a opinião dos outros profetas……#nBem, suponho que eles também acreditem, de certa forma."
90001280-125 = "De certa forma……"
90001280-126 = "E acima de tudo, se a Soph disser algo assim, o que acontecerá com a vontade de Tiphareth?"
90001280-127 = "Mas……"
90001280-128 = "A-acho que agora, só precisamos fazer o que está ao nosso alcance……"
90001280-129 = "Co-colaborando com todos…… afinal, irmãs servem para ajudar umas às outras……!"
90001280-131 = "Sim, exatamente, Ain.#nMuito bem, nota dez."
90001280-132 = "Harmonia não significa que todos devem ser iguais.#nIsso se tornaria um conceito próximo à coerção ou à violência."
90001280-133 = "Complementar as forças e fraquezas de cada um — essa é a verdadeira harmonia."
90001280-134 = "Se não pudermos respeitar uns aos outros, não poderemos seguir em frente."
90001280-136 = "É por isso que a responsabilidade de um é a responsabilidade de todos, e a felicidade de todos é a felicidade de um só."
90001280-137 = "Irmã Mais Velha……"
90001280-138 = "Uuu……!"
90001280-139 = "Ninguém consegue ser forte sozinho.#nSeja um ser vivo ou uma consciência."
90001280-140 = "Se alguém for atingido por dificuldades, nós estenderemos a mão."
90001280-141 = "Odie o pecado, não o pecador."
90001280-142 = "Em vez de culpar pelo erro, vamos pensar juntos em um sistema para que o erro não ocorra."
90001280-143 = "Portanto, Ain, você poderia começar conversando com a Tiphareth?"
90001280-144 = "S-sim! Irmã Mais Velha!"
90001280-145 = "Tifa-chan…… você poderia me ouvir……?"
90001280-146 = "Aqueles humanos estão apenas fingindo que querem roubar a sua semente——"
90001280-147 = "Eles são pessoas maldosas que estão tentando te enganar, Tifa-chan……!"
90001280-148 = "Por isso…… não há necessidade de destinar recursos excessivos para a defesa."
90001280-149 = "Mas, como não sabemos o que aquelas pessoas maldosas podem fazer……"
90001280-150 = "Tifa-chan.#nPara proteger a semente preciosa…… aquelas pessoas——"
90001280-151 = "Por favor, expulse-as educadamente……!"
90001280-155 = "N-nós também vamos ajudar, então……"
90001280-164 = "Parece que ela entendeu. Vamos deixar o resto com ela.#nJá está tudo bem, Soph."
90001280-165 = "Sim…… obrigada a todos."
90001280-166 = "Fica estranho quando a Soph não está animada……#nSe estamos vivos, dias assim acontecem, não é?"
90001280-167 = "O-Oul…… isso soou bem humano agora…… ehehe."
90001280-168 = "Guh!?"
90001280-169 = "É, você tem razão…… sim…… certo!#nEntão…… por precaução, posso fazer outros preparativos também?"
90001280-170 = "Preparativos?"
90001280-171 = "Do que você está falando?"
90001280-174 = "I-isso é……!"
90001280-175 = "Eu sei que é estranho eu dizer isso agora, mas……"
90001280-176 = "……"
90001280-177 = "Bem, não podemos resolver isso quando chegar a hora?"
90001280-178 = "Tudo bem……!?!?"
90001280-179 = "Porque…… é exatamente como a Soph disse."
90001280-180 = "“Considerar a proposta de recuar Tiphareth para o Continente de Aço”."
90001280-181 = "Acho que é uma medida razoável para preservar nossas forças."
90001280-183 = "Ah…… é verdade, a responsabilidade de tomar essa decisão era minha……!#nD-desculpe, Soph……!"
90001280-184 = "Não, a culpa foi minha……"
90001280-188 = "Bem... vamos parar de pedir desculpas um ao outro. #nAssim a conversa não vai a lugar nenhum."
90001280-189 = "Além disso, viemos preparados para imprevistos. É algo que pode acontecer e está dentro do esperado. #nClaro, o ideal seria que não acontecesse, mas..."
90001280-190 = "……Obrigada, pessoal."
90001280-191 = "Estou muito feliz... por ter todos vocês aqui."
90001280-192 = "Hehe..."
90001280-194 = "E-Ei, chega de dizer coisas constrangedoras, vamos começar logo!"
90001280-195 = "É hora de mostrar... o verdadeiro poder de Tiferet!"
90001280-200 = "O que é isso agora!?"
90001280-204 = "Isso é... o sinal da nova profetisa, \"Tiferet\"...?"
90001280-205 = "……!! Afastem-se! Rápido!"
90001280-207 = "Eu vou abrir caminho!"
90001280-208 = "Sensei, por aqui!"
90001280-210 = "[ns] \"Pessoal, cuidado!\""
