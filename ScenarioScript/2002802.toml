[translation]
2002802-1 = "落ち着かない心"
2002802-2 = "（待ち合わせ場所の海辺に到着すると……）"
2002802-9 = "（サマーベッドやパラソルが用意されているのに、なぜかその隣に立っているヒナタの姿があった）"
2002802-15 = "[ns1] \"……ヒナタ、どうしたの？\"\n[ns2] \"大丈夫？顔色が悪いけど……。\""
2002802-20 = "あ、先生！"
2002802-21 = "来てくださって、ありがとうございます。#nすみません、お忙しいところ……"
2002802-22 = "……あ、こちらですか？"
2002802-23 = "あ……はい。"
2002802-29 = "サマーベッドとパラソルで……"
2002802-30 = "って、これくらい先生が知らないはずありませんよね！失礼しました！"
2002802-31 = "ここにセットしてある理由は……えっと、その……"
2002802-32 = "……ど、どう説明すれば、良いのでしょうか……はは……"
2002802-33 = "あの……"
2002802-34 = "実は、自分で持ってきたのですが……コレに関して悩んでしまっていまして……"
2002802-35 = "とりあえず、こうして設置してみたところまでは良かったんです。"
2002802-36 = "[s3] \"ゆっくりで大丈夫だから、詳しくお願いできるかな？\"\n[s4] \"設置してみたところまでは……？\""
2002802-39 = "その……い、今は一応、休暇中ですし……"
2002802-40 = "せっかく無人島まで来たのだから、ゆっくりしようと考えたんです。"
2002802-41 = "シスターフッドのみなさんに見送っていただいた時、#n調査の手伝いを終えたら、しっかり休むようにと言われたのですが……"
2002802-42 = "うまく、できないんです。#n心の片隅にある罪悪感が[ruby=ぬぐ]拭[/ruby]いきれなくて……"
2002802-43 = "私だけ、こんな風に過ごしていても良いのだろうか、と思ってしまい……"
2002802-44 = "あまりにも日常と異なる時間を過ごしているのが原因かも、しれませんが……"
2002802-45 = "ここに来るまでは、朝早くに起きて、決められた日課をこなし……"
2002802-46 = "日暮れ頃には、みなさんと片付けを行い、一日を終える……そんな規則正しい生活をしていたので……"
2002802-47 = "……きっと、今も聖堂では、私以外の皆さんは同じように過ごしていると思います。"
2002802-48 = "そして、本来であれば私がやるべきことまで……他の方が、代わりにやってくださっているのでしょう。"
2002802-49 = "……………。"
2002802-50 = "[s5] \"自分だけ楽をしている気がする、とか？\"\n[s6] \"仕事を押し付けてしまった、と感じてるの？\""
2002802-55 = "も、もちろん、他の方がお休みされている時は、"
2002802-56 = "そういった気持ちにはならないのですが……"
2002802-57 = "……頭では、みなさんが本心から休んでほしいと言ってくださってるのだと理解しているのです。"
2002802-58 = "だから、みなさんを疑っているわけではなくて……"
2002802-62 = "……え？"
2002802-63 = "横に……ですか？"
2002802-64 = "い、いえ、まだ気持ちが落ち着かず……見ているだけで。"
2002802-65 = "まずは横になってから考えよう……？"
2002802-66 = "え、えっと……それは……"
2002802-70 = "い、いえ。先生が仰るからには、何か理由があるのですよね。"
2002802-71 = "でしたら、まずは試しに……"
2002802-75 = "よいしょっと……こうやって、足を伸ばして……"
2002802-82 = "[wa:200]― [log=히나타 수영복]ん……[wa:850]んん……？[wa:1250]あら……？[/log]"
2002802-85 = "― [log=히나타 수영복]ここ……[/log]"
2002802-87 = "― [log=히나타 수영복]思っていた以上に、[wa:1300]リラックスできる……。[/log]"
2002802-90 = "[wa:400]― [log=히나타 수영복]適度に涼しくて、[wa:1950]でも冷えすぎず……[/log]"
2002802-92 = "― [log=히나타 수영복]顔は[wa:400]影に隠れますし……。[/log]"
2002802-95 = "― [log=히나타 수영복]ポカポカしていて……[/log]"
2002802-97 = "― [log=히나타 수영복]横になっていると、[wa:1550]眠ってしまいそうです。[/log]"
2002802-100 = "[wa:550]― [log=히나타 수영복]ところで、[wa:850]その……[/log]"
2002802-102 = "― [log=히나타 수영복]先生の前で私だけ、[wa:2200]横になっているのは……[/log]"
2002802-105 = "― [log=히나타 수영복]な、[wa:750]なんだか……[wa:1180]申し訳ないような……。[/log]"
2002802-108 = "[ns7] \"気にしないで大丈夫。\"\n[ns8] \"今は自分のことだけ考えて良いんだよ。\""
2002802-109 = "[wa:150]― [log=히나타 수영복]か、[wa:850]かしこまりました。[/log]"
2002802-110 = "[wa:150]― [log=히나타 수영복]か、[wa:850]かしこまりました。[/log]"
2002802-112 = "― [log=히나타 수영복]それでは、[wa:1100]お言葉に甘えて……。[/log]"
2002802-115 = "― [log=히나타 수영복]リラックスして……[wa:1680]楽に……。[/log]"
2002802-118 = "[wa:350]― [log=히나타 수영복]……ふぅん……[wa:3750]んにゃぁ……[wa:1550]ふへへっ……。[/log]"
2002802-121 = "― [log=히나타 수영복]……はっ！？[wa:550]わ、[wa:850]私は今何を……！？[/log]"
2002802-124 = "[wa:150]― [log=히나타 수영복]わ、[wa:500]忘れてください、[/log]"
2002802-126 = "― [log=히나타 수영복]今のは[wa:400]忘れてください！[wa:950]先生！！[/log]"
2002802-130 = "先生～～～！！"
2002802-132 = "（その後、慌てて立ち上がろうとしたヒナタを落ち着かせ、再び横にさせると……）"
2002802-133 = "（そのまま、1分ほどですぐ眠りに落ちた）"
