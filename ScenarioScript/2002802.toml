[translation]
2002802-1 = "Coração inquieto"
2002802-2 = "（Ao chegar à praia, o local do encontro...）"
2002802-9 = "（Embora uma espreguiçadeira e um guarda-sol estivessem preparados, por algum motivo, Hinata estava de pé ao lado deles）"
2002802-15 = "[ns1] \"...Hinata, o que houve?\"\n[ns2] \"Está tudo bem? Você parece pálida...\""
2002802-20 = "Ah, Sensei!"
2002802-21 = "Obrigada por vir. #nSinto muito por incomodar, mesmo estando tão ocupado..."
2002802-22 = "...Ah, você se refere a isto?"
2002802-23 = "Ah... sim."
2002802-29 = "Com a espreguiçadeira e o guarda-sol..."
2002802-30 = "Quer dizer, o Sensei já deve saber o que é isso, não é? Peço desculpas!"
2002802-31 = "O motivo de eu ter montado isso aqui é... bem, é que..."
2002802-32 = "...Co-como devo explicar isso... haha..."
2002802-33 = "Bem..."
2002802-34 = "Na verdade, eu mesma trouxe, mas... estou me sentindo um pouco confusa em relação a isso..."
2002802-35 = "Por enquanto, a parte de montar até que foi fácil."
2002802-36 = "[s3] \"Não precisa ter pressa, pode me explicar com calma?\"\n[s4] \"Até a parte de montar...?\""
2002802-39 = "É que... b-bem, tecnicamente estou de férias agora..."
2002802-40 = "Já que vim até uma ilha deserta, pensei em relaxar um pouco."
2002802-41 = "Quando as integrantes da Sisterhood se despediram de mim, #nelas disseram para eu descansar bem depois de terminar de ajudar com a investigação, mas..."
2002802-42 = "Eu não consigo. #nNão consigo apagar a culpa que sinto no fundo do meu coração..."
2002802-43 = "Fico pensando se está tudo bem eu passar o tempo assim, sozinha..."
2002802-44 = "Talvez seja porque estou passando tempo demais fora da minha rotina habitual..."
2002802-45 = "Até vir para cá, eu acordava bem cedo e cumpria minhas tarefas diárias..."
2002802-46 = "Ao anoitecer, eu ajudava as outras com a limpeza e encerrava o dia... Eu levava uma vida tão regrada..."
2002802-47 = "...Tenho certeza de que, agora mesmo, todas as outras na catedral estão vivendo da mesma forma."
2002802-48 = "E, provavelmente, as outras pessoas estão fazendo o trabalho que, originalmente, deveria ser meu..."
2002802-49 = "……………。"
2002802-50 = "[s5] \"Você sente como se estivesse sendo a única a relaxar?\"\n[s6] \"Sente que acabou deixando o trabalho para as outras?\""
2002802-55 = "C-claro, quando as outras pessoas estão de folga,"
2002802-56 = "eu não me sinto assim, mas..."
2002802-57 = "...Na minha cabeça, eu entendo que elas realmente querem que eu descanse."
2002802-58 = "Por isso, não é que eu esteja duvidando delas..."
2002802-62 = "...Eh?"
2002802-63 = "Deitar...?"
2002802-64 = "N-não, ainda não estou me sentindo tranquila... só de olhar."
2002802-65 = "Que tal tentar deitar primeiro para pensar melhor...?"
2002802-66 = "Eh, bem... isso é..."
2002802-70 = "N-não. Se o Sensei está dizendo, deve haver um motivo, não é?"
2002802-71 = "Sendo assim, vou tentar..."
2002802-75 = "Pronto... assim, esticando as pernas..."
2002802-82 = "[wa:200]― [log=히나타 수영복]Hmm...[wa:850]hmmm...?[wa:1250]Nossa...?[/log]"
2002802-85 = "― [log=히나타 수영복]Aqui...[/log]"
2002802-87 = "― [log=히나타 수영복]É mais relaxante do que eu [wa:1300]imaginava...[/log]"
2002802-90 = "[wa:400]― [log=히나타 수영복]Está fresco na medida certa, [wa:1950]mas não frio demais...[/log]"
2002802-92 = "― [log=히나타 수영복]Meu rosto fica [wa:400]escondido na sombra...[/log]"
2002802-95 = "― [log=히나타 수영복]Está tão quentinho...[/log]"
2002802-97 = "― [log=히나타 수영복]Deitada assim, [wa:1550]sinto que vou acabar dormindo.[/log]"
2002802-100 = "[wa:550]― [log=히나타 수영복]Aliás, [wa:850]bem...[/log]"
2002802-102 = "― [log=히나타 수영복]Ficar deitada aqui, [wa:2200]apenas eu, na frente do Sensei...[/log]"
2002802-105 = "― [log=히나타 수영복]É, [wa:750]de alguma forma... [wa:1180]me sinto um pouco culpada...[/log]"
2002802-108 = "[ns7] \"Não se preocupe, está tudo bem.\"\n[ns8] \"Agora você só precisa pensar em si mesma.\""
2002802-109 = "[wa:150]― [log=히나타 수영복]C-certo, [wa:850]entendido.[/log]"
2002802-110 = "[wa:150]― [log=히나타 수영복]C-certo, [wa:850]entendido.[/log]"
2002802-112 = "― [log=히나타 수영복]Então, [wa:1100]vou aceitar sua gentileza...[/log]"
2002802-115 = "― [log=히나타 수영복]Relaxe... [wa:1680]fique à vontade...[/log]"
2002802-118 = "[wa:350]― [log=히나타 수영복]...Hmm... [wa:3750]nyaa... [wa:1550]hehe...[/log]"
2002802-121 = "― [log=히나타 수영복]...Hã!? [wa:550]O-o [wa:850]que eu estava fazendo agora...!?[/log]"
2002802-124 = "[wa:150]― [log=히나타 수영복]P-por [wa:500]favor, esqueça,[/log]"
2002802-126 = "― [log=히나타 수영복]Esqueça [wa:400]o que acabou de acontecer! [wa:950]Sensei!![/log]"
2002802-130 = "Sensei~~~!!"
2002802-132 = "(Depois disso, acalmei Hinata, que tentava se levantar apressada, e a fiz deitar novamente...)"
2002802-133 = "(Logo em seguida, ela adormeceu em cerca de um minuto)"
