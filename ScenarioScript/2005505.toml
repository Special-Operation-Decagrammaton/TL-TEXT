[translation]
2005505-1 = "Torneio de Jogos"
2005505-2 = "Clube de Desenvolvimento de Jogos - Sala do Clube"
2005505-3 = "Quem diria que o 'Chefe Virtual' seria o prêmio do torneio de jogos..."
2005505-4 = "...De fato, considerando a popularidade dele, faz sentido ser um prêmio."
2005505-5 = "N-não me diga que o método que o Sensei mencionou é..."
2005505-6 = "Conseguir o 'Chefe Virtual' no torneio...!?"
2005505-10 = "É um caminho árduo, não é..."
2005505-11 = "[s] \"Quer desistir?\""
2005505-12 = "Não. Por favor, deixe-me participar, Sensei! Se for um jogo, eu...!"
2005505-13 = "...Ah, é verdade. De qual jogo é o torneio?"
2005505-14 = "'Simulion Quest'...!? Aquele jogo de VR que jogamos juntos antes...!"
2005505-15 = "...De fato, talvez eu consiga vencer se for esse."
2005505-16 = "Mas ainda não tenho confiança para chegar ao topo sozinha..."
2005505-17 = "[s] \"Por isso eu te inscrevi na categoria de cooperação.\""
2005505-21 = "Sério!? O Sensei vai participar comigo?"
2005505-22 = "Não posso deixar uma aliada ir para o campo de batalha sozinha, certo?"
2005505-23 = "É verdade... Em 'Simulion Quest', seria difícil passar das eliminatórias sozinha..."
2005505-24 = "...Muito obrigada, Sensei. Vamos buscar a vitória juntos...!"
2005505-25 = "[s1] \"Aliás, Yuzu.\"\n[s2] \"Parece que há mais uma condição de participação no torneio de Simulion Quest.\""
2005505-28 = "Condição de participação... é?"
2005505-30 = "(Algum tempo depois, no dia do torneio de jogos)"
2005505-32 = "Entrada do local do torneio de jogos"
2005505-34 = "É impossível!"
2005505-35 = "Eu confiei no Sensei, mas...!"
2005505-36 = "[s] \"Calma, Yuzu.\""
2005505-40 = "[ns3] \"Todo mundo está apenas usando roupas de dentro do jogo, não é?\"\n[ns4] \"Se pensar que é um evento de cosplay comum, você fica bem.\""
2005505-43 = "M-mesmo dizendo isso... tem gente com roupas normais também..."
2005505-44 = "O Sensei também veio com as roupas de sempre, não veio!"
2005505-45 = "[s5] \"É o traje de um NPC cidadão que aparece no jogo.\"\n[s6] \"O terno é a armadura de um adulto, afinal.\""
2005505-48 = "E-então eu preferia ter vindo de uniforme..."
2005505-49 = "De fato, é verdade que esse traje é o mais fácil para jogar o jogo de VR, mas..."
2005505-50 = "[s] \"Ah, parece que vai começar. Vamos, Yuzu!\""
2005505-51 = "Feeeeen...!!"
2005505-53 = "(Depois disso, durante toda a partida, Yuzu ficou colada nas minhas costas)"
2005505-55 = "Interior do local do torneio de jogos"
2005505-56 = "Vamos lá! A empolgação está no nível máximo!"
2005505-57 = "Finalmente a final, vamos chamar as equipes para o palco!"
2005505-58 = "A dupla lendária que chegou ao topo no menor tempo possível—"
2005505-59 = "'UZQueen & Thrones'! Recebam-nos com uma salva de palmas!"
2005505-64 = "UZQueen...? Você disse UZQueen agora, não disse!?"
2005505-65 = "Eles vieram mesmo! Uau... incrível! Eles têm uma aura!"
2005505-66 = "Mas, o que é aquela pose...?"
2005505-72 = "A dupla que derrota os inimigos na posição de cavalinho... eram eles, a UZQueen!?"
2005505-73 = "Uma chance de ver a jogabilidade da UZQueen ao vivo... preciso gravar isso na memória!"
2005505-74 = "U-uuh... Sensei, ficar de cavalinho na frente de todo mundo é vergonhoso demais...!"
2005505-75 = "É-é tão vergonhoso que eu não consigo..."
2005505-76 = "N-não consigo me concentrar no jogo..."
2005505-77 = "[s] \"Yuzu.\""
2005505-78 = "S-sim!?"
2005505-79 = "[s] \"Apenas por agora, pense que o mundo de 'Simulion Quest' é a realidade.\""
2005505-80 = "Ma-mas..."
2005505-81 = "Se isso for a realidade... significa que estamos balançando espadas arriscando nossas vidas agora... honestamente, é assustador..."
2005505-82 = "Eu sei que a imersão é importante, mas..."
2005505-86 = "Ah, então a única forma de vencer é derrotar a UZQueen..."
2005505-87 = "Quem diria que aquele mestre estranho do cavalinho era a UZQueen... o que eu faço?"
2005505-88 = "Não tinha nada em nenhum site sobre como derrotar alguém que está fazendo cavalinho!"
2005505-89 = "Tudo bem, eu pesquisei uma estratégia infalível para momentos como este."
2005505-90 = "Não é a UZQueen, mas sim o lado do Thrones — o parceiro é um jogador comum, então se derrotarmos ele primeiro, temos uma chance!"
2005505-91 = "Certo...!"
2005505-93 = "Se-Sensei! Cuidado!"
2005505-94 = "[ns] \"Ué, estão mirando em mim...?\""
2005505-97 = "(Se este jogo fosse a realidade...)"
2005505-98 = "(Este traje e os olhares de todos não seriam nada constrangedores...)"
2005505-99 = "(O que eu realmente preciso me preocupar agora é...)"
2005505-100 = "...Cuidado!"
2005505-105 = "O-o que aconteceu...?"
2005505-106 = "Nossos pontos fracos foram atingidos...?"
2005505-110 = "Incrível! A partida foi decidida em um instante!#nVitória para \"UZQueen & Thrones\"!"
2005505-111 = "Vo-você viu isso? No momento em que o Thrones foi alvo, a UZQueen atingiu os pontos fracos dos dois com uma velocidade incrível...!"
2005505-112 = "Foi tão rápido que eu nem vi... será que esse movimento é possível na vida real...?"
2005505-114 = "Se-Sensei. Você está bem...?"
2005505-115 = "[s] \"Eu estou bem.\""
2005505-119 = "[ns] \"Como você fez aquele ataque agora?\""
2005505-120 = "Eu, eu também não sei..."
2005505-121 = "Quando pensei que o Sensei estava em perigo, minhas mãos se moveram sozinhas..."
2005505-122 = "Quando percebi, já estava mirando nos pontos vitais do oponente..."
2005505-123 = "[s] \"Foi uma concentração incrível...\""
2005505-124 = "Ma-mas ainda bem. #nAgora finalmente podemos conseguir o \"Chefe Virtual\" —"
2005505-131 = "UZQueen, você poderia mostrar aquele golpe de novo?"
2005505-132 = "...Eu, eu também peço! É a primeira vez que recebo um golpe desses na vida real!"
2005505-133 = "Pode usar meu corpo para praticar se quiser —"
2005505-134 = "Eu também quero! Quero sentir esse golpe!"
2005505-135 = "Eu, eu também quero!"
2005505-136 = "UZQueen, eu também adoraria!"
2005505-137 = "(Sinto que pedidos estranhos estão chegando aos montes...)"
2005505-138 = "Por favor, UZQueen!"
2005505-139 = "Se for para ser atingida pela UZQueen, eu até pago..."
2005505-140 = "Is-isso é um problema...!"
2005505-141 = "Sensei... me ajude...!"
2005505-142 = "UZQueen! UZQueen!"
2005505-147 = "Se-Sensei~!"
2005505-149 = "(Depois disso, carreguei a Yuzu, que estava cercada e em apuros, e consegui sair do local...)"
