[translation]
1014202-1 = "Water Gun Fun"
1014202-2 = "(On a hot day, I headed to the Hyakkaryouran clubroom to meet Nagusa.)"
1014202-6 = "Hm? Sensei?\r\n"
1014202-7 = "What brings you here so suddenly?"
1014202-8 = "[s] \"...I thought you'd be playing with water guns.\""
1014202-9 = "...It's a form of training, after all."
1014202-10 = "Besides, I only do it when it's hot out."
1014202-11 = "Well, it is hot today, though."
1014202-12 = "..."
1014202-13 = "Why the disappointed look?"
1014202-14 = "And you even brought a water gun."
1014202-15 = "[s] \"I brought a swimsuit, too!\""
1014202-16 = "...Were you planning on playing with water guns with me?"
1014202-17 = "[s1] \"I thought you were suffering from the heat...\"\r\n[s2] \"I just couldn't sit still...\""
1014202-20 = "..."
1014202-21 = "Sensei, you're surprisingly cunning."
1014202-22 = "I suppose... since you went through the trouble of coming here, I can't just send you back...\r\n"
1014202-23 = "Phew..."
1014202-24 = "...Wait here for a moment. #nI'm likely the only one here for a while today."
1014202-25 = "[s] \"Yes!\""
1014202-27 = "(A while later, we changed into our swimsuits and gathered in the garden.)"
1014202-31 = "Sensei, are you prepared?"
1014202-32 = "[s3] \"You're the one who should be!\"\r\n[s4] \"The loser has to buy shaved ice!\""
1014202-35 = "I think I'll seal away my Hyakkaryouran-style marksmanship—"
1014202-36 = "and just use my left hand."
1014202-37 = "A one-sided match wouldn't be any fun, after all."
1014202-38 = "[s] \"Don't come crying to me when you regret that!\""
1014202-39 = "Heh, I wonder about that?\r\n"
1014202-40 = "Well then... let's begin."
1014202-48 = "(The result was...)"
1014202-54 = "[ns] \"My total defeat...\""
1014202-55 = "Then, I'll be counting on that shaved ice.\r\n"
1014202-57 = "(As promised, I bought the shaved ice.)\r\n"
1014202-61 = "(A while later...)"
1014202-63 = "[ns] \"Hm? You're still in your swimsuit?\""
1014202-64 = "It's hot, and... there are things I want to ask you, Sensei."
1014202-65 = "For now, let's eat the shaved ice before it melts."
1014202-74 = "[ns] \"Shaved ice really is refreshing, isn't it?\""
1014202-75 = "Yeah. It's starting to cool me down."
1014202-76 = "Still, I was surprised when you suddenly suggested playing with water guns."
1014202-77 = "Playing in the garden to cool off..."
1014202-78 = "Was that such a strange thing to say?"
1014202-79 = "Well, usually people go to the beach or a pool, right?"
1014202-80 = "But... I don't feel comfortable in places like that."
1014202-81 = "Huh? The reason?"
1014202-82 = "Well..."
1014202-83 = "I mean..."
1014202-88 = "It's because my swimsuit appearance is just too dazzling, I suppose."
1014202-89 = "It's a bit too stimulating, and I think it would be a lot for the people around me."
1014202-90 = "[s] \"...\""
1014202-91 = "I wanted to ask you about that, too, Sensei."
1014202-92 = "Am I... too dazzling?"
1014202-93 = "[s] \"............\""
1014202-94 = "...Sensei?"
1014202-95 = "[s] \"Ahaha! Nagusa, you really are funny!\""
1014202-96 = "Hm, hmm...?"
1014202-97 = "[s5] \"It's okay! I don't think anyone is suffering because of you.\"\r\n[s6] \"They probably just think, 'What a beautiful person.'\""
1014202-100 = "You think so? Hmm..."
1014202-101 = "Why did I..."
1014202-102 = "become such a radiant girl..."
1014202-104 = "(Nagusa's dilemma continued until we finished our shaved ice...)\r\n"