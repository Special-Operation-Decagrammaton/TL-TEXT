[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1014202-1 = "Brincando com Armas de Água" 
1014202-2 = "（Em um dia quente. Fui até a sala do clube da\nHyakkaryouran para encontrar a Nagusa.）" 
1014202-6 = "Hm? Sensei?\n" 
1014202-7 = "O que faz aqui de repente?" 
1014202-8 = "[s] \"......Achei que vocês estivessem\nbrincando com armas de água.\"" 
1014202-9 = "......Tecnicamente, é um tipo de treinamento." 
1014202-10 = "Além disso, a gente só faz isso quando está quente." 
1014202-11 = "Bom, hoje realmente está quente." 
1014202-12 = "......" 
1014202-13 = "Por que você está com essa cara de decepcionado?" 
1014202-14 = "E ainda trouxe uma arma de água." 
1014202-15 = "[s] \"Eu também trouxe a minha roupa de banho!\"" 
1014202-16 = "......Por acaso você planejava brincar\nde arminha de água comigo?" 
1014202-17 = "[s1] \"Quando pensei que a Nagusa estaria sofrendo com o calor...\"\n[s2] \"Eu simplesmente não consegui ficar parado...\"" 
1014202-20 = "......" 
1014202-21 = "O Sensei é surpreendentemente astuto." 
1014202-22 = "Tem razão... Você se deu ao trabalho de vir até aqui,\nmandar você de volta seria...\n" 
1014202-23 = "Fuu..." 
1014202-24 = "......Me espere um pouco.\nPor hoje, serei apenas eu aqui por um tempo." 
1014202-25 = "[s] \"Isso!!\"" 
1014202-27 = "（Depois de um tempo, nós vestimos nossas\nroupas de banho e fomos para o jardim.）" 
1014202-31 = "Sensei, está preparado?" 
1014202-32 = "[s3] \"Pode vir com tudo, Nagusa!\"\n[s4] \"Quem perder paga a raspadinha!\"" 
1014202-35 = "Contra você, Sensei, vou selar o meu\nestilo de tiro da Hyakkaryouran――" 
1014202-36 = "E usar apenas a minha mão esquerda." 
1014202-37 = "Uma partida unilateral não tem graça nenhuma, afinal." 
1014202-38 = "[s] \"Não vá se arrepender depois, hein!\"" 
1014202-39 = "Fufu, será mesmo?\n" 
1014202-40 = "Então... vamos começar." 
1014202-48 = "（O resultado foi...）" 
1014202-54 = "[ns] \"Uma derrota humilhante...\"" 
1014202-55 = "Fico no aguardo da minha raspadinha.\n" 
1014202-57 = "（Conforme o combinado, comprei a raspadinha de gelo para ela.）\n" 
1014202-61 = "（Um tempo depois...）" 
1014202-63 = "[ns] \"Hm? Você ainda está de roupa de banho?\"" 
1014202-64 = "Está quente... e eu também tenho\numas coisas pra te perguntar, Sensei." 
1014202-65 = "Mas antes, vamos comer essa raspadinha\nantes que ela derreta." 
1014202-74 = "[ns] \"Raspadinha é sempre bem gelada, né.\"" 
1014202-75 = "Uhum. Estou bem mais refrescada graças a ela." 
1014202-76 = "Mesmo assim, fiquei surpresa por você sugerir\nbrincar de arminha de água do nada." 
1014202-77 = "Brincar com água no jardim para se refrescar..." 
1014202-78 = "Era algo que te deixava tão curioso assim?" 
1014202-79 = "Bom, é verdade que normalmente se vai à praia ou à piscina." 
1014202-80 = "Mas... eu não me sinto à vontade nesses lugares." 
1014202-81 = "Eh? O motivo?" 
1014202-82 = "É que..." 
1014202-83 = "Bom..." 
1014202-88 = "É porque... eu acabo ficando deslumbrante demais\nquando coloco roupa de banho..." 
1014202-89 = "O estímulo visual seria muito forte, e acho que\ncausaria problemas para as pessoas ao redor." 
1014202-90 = "[s] \"......\"" 
1014202-91 = "Eu também queria te perguntar sobre isso, Sensei." 
1014202-92 = "Por acaso... eu estou brilhando demais?" 
1014202-93 = "[s] \"............\"" 
1014202-94 = "......Sensei?" 
1014202-95 = "[s] \"Ahaha! A Nagusa é realmente muito engraçada!\"" 
1014202-96 = "Hã, hããã...?" 
1014202-97 = "[s5] \"Não se preocupe! Tenho certeza de que\nninguém vai sofrer por sua causa, Nagusa.\"\n[s6] \"Eles só vão pensar: 'Que moça bonita'.\"" 
1014202-100 = "Sério? Hmmm..." 
1014202-101 = "Por que será que..." 
1014202-102 = "Eu acabei me tornando\numa garota tão radiante e deslumbrante assim..." 
1014202-104 = "（Os dilemas da Nagusa continuaram\naté terminarmos de comer a raspadinha...）\n" 