[translation]
1014202-1 = "Water Gun Play"
1014202-2 = "(A hot day. I headed to the Hyakkaryouran club room to meet Nagusa.)"
1014202-6 = "Hm? Sensei?\r\n"
1014202-7 = "What's wrong all of a sudden?"
1014202-8 = "[s] \"...I thought you'd be playing with water guns.\""
1014202-9 = "...It is technically a kind of training, you know."
1014202-10 = "Besides, I only do it when it's hot."
1014202-11 = "Well, it's hot today too."
1014202-12 = "..."
1014202-13 = "What's with the disappointed look?"
1014202-14 = "And you are holding a water gun too."
1014202-15 = "[s] \"I brought my swimsuit too!\""
1014202-16 = "...You were planning to play with water guns with me?"
1014202-17 = "[s1] \"When I thought about you suffering in the heat, Nagusa...\"\r\n[s2] \"I just couldn't sit still...\""
1014202-20 = "..."
1014202-21 = "You're surprisingly sly, Sensei."
1014202-22 = "I see… It would be a shame to send you home when you came all this way...\r\n"
1014202-23 = "Phew..."
1014202-24 = "...Wait here a moment. #nI'm likely the only one here for a while."
1014202-25 = "[s] \"Yay!\""
1014202-27 = "(After a while, we changed into our swimsuits and gathered in the yard.)"
1014202-31 = "Sensei, are you ready?"
1014202-32 = "[s3] \"You're the one who should be!\"\r\n[s4] \"The loser has to buy shaved ice!\""
1014202-35 = "For you, Sensei, I'll seal away the Hyakkiyako-style shooting technique and—"
1014202-36 = "Maybe I'll just use my left hand."
1014202-37 = "A one-sided match isn't any fun, after all."
1014202-38 = "[s] \"Don't come crying to me if you regret that!\""
1014202-39 = "Fufu, we'll see about that\r\n"
1014202-40 = "Well then... let's begin."
1014202-48 = "(The result was...)"
1014202-54 = "[ns] \"My total defeat...\""
1014202-55 = "Well then, I'll be counting on that shaved ice.\r\n"
1014202-57 = "(As promised, I bought the shaved ice.)\r\n"
1014202-61 = "(A while later…)"
1014202-63 = "[ns] \"Hm? Still in your swimsuit?\""
1014202-64 = "It's hot... and I have something I want to ask you, Sensei."
1014202-65 = "For now, let's eat the shaved ice before it melts."
1014202-74 = "[ns] \"Shaved ice is really cold, isn’t it?\""
1014202-75 = "Yeah. I'm starting to cool down thanks to it."
1014202-76 = "Still, I was surprised when you suddenly asked to play with water guns."
1014202-77 = "Playing with water in the yard to cool off..."
1014202-78 = "Was that a really strange request?"
1014202-79 = "Well, normally it would be the sea or a pool."
1014202-80 = "But... I can't relax in places like that."
1014202-81 = "Eh? The reason?"
1014202-82 = "Um..."
1014202-83 = "Well..."
1014202-88 = "Because my swimsuit figure is just too dazzling... I guess"
1014202-89 = "It's too stimulating, so I think it would be tough for the people around me."
1014202-90 = "[s] \"...\""
1014202-91 = "I wanted to ask you too, Sensei."
1014202-92 = "Am I... shining too brightly?"
1014202-93 = "[s] \"......\""
1014202-94 = "...Sensei?"
1014202-95 = "[s] \"Ahaha! You really are funny, Nagusa!\""
1014202-96 = "Hm, hmm...?"
1014202-97 = "[s5] \"It's fine! I don't think anyone will suffer because of you, Nagusa.\"\r\n[s6] \"They'll just think \"what a pretty person.\"\""
1014202-100 = "Really? Hmm..."
1014202-101 = "Why did I..."
1014202-102 = "…end up becoming a shining girl..."
1014202-104 = "(Nagusa's worries continued until she finished eating the shaved ice...)\r\n"