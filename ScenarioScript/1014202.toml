[translation]
1014202-1 = "水鉄砲遊び"
1014202-2 = "（ある暑い日。ナグサに会うため、百花繚乱の部室に向かった）"
1014202-6 = "ん？先生？\r\n"
1014202-7 = "どうしたの急に？"
1014202-8 = "[s] \"……水鉄砲で遊んでると思ったのに。\""
1014202-9 = "……一応訓練の一種だからね。"
1014202-10 = "それに、暑いときしかやらないから。"
1014202-11 = "まあ、今日も暑いけど。"
1014202-12 = "……。"
1014202-13 = "がっかりした顔してどうしたの？"
1014202-14 = "それに水鉄砲も持って。"
1014202-15 = "[s] \"水着も持ってきたよ！\""
1014202-16 = "……私と水鉄砲で遊ぶつもりだった？"
1014202-17 = "[s1] \"ナグサが暑さに苦しんでると思ったら……。\"\r\n[s2] \"いてもたってもいられなくて……。\""
1014202-20 = "……。"
1014202-21 = "先生は意外としたたかだね。"
1014202-22 = "そうだね……せっかく来てくれたのに、そのまま帰すのも……。\r\n"
1014202-23 = "ふぅ……。"
1014202-24 = "……ちょっと待ってて。#n今日はしばらく、私しかいないだろうから。"
1014202-25 = "[s] \"やったあ！\""
1014202-27 = "（しばらくして、私たちは水着に着替えて庭に集まった）"
1014202-31 = "先生、覚悟はいい？"
1014202-32 = "[s3] \"ナグサこそ！\"\r\n[s4] \"負けた方がかき氷をおごるんだよ！\""
1014202-35 = "先生には、百花繚乱式射撃術を封印して――"
1014202-36 = "左手だけでやろうかな。"
1014202-37 = "一方的な展開は面白くないからね。"
1014202-38 = "[s] \"後悔しても知らないよ？\""
1014202-39 = "ふふっ、それはどうかな？\r\n"
1014202-40 = "それじゃ……始めようか。"
1014202-48 = "（結果は……）"
1014202-54 = "[ns] \"私の完敗……。\""
1014202-55 = "じゃあ、かき氷よろしくね。\r\n"
1014202-57 = "（約束どおり、かき氷を買ってきた）\r\n"
1014202-61 = "（しばらくして……）"
1014202-63 = "[ns] \"ん？まだ水着だったの？\""
1014202-64 = "暑いし……先生に聞きたいこともあるから。"
1014202-65 = "とりあえず、溶けちゃう前にかき氷を食べよっか。"
1014202-74 = "[ns] \"かき氷は、やっぱり冷たいね。\""
1014202-75 = "うん。おかげで涼しくなってきた。"
1014202-76 = "それにしても、突然水鉄砲で遊ぼうだなんて言うから驚いたよ。"
1014202-77 = "涼むために庭で水遊びをするって……。"
1014202-78 = "そんなに気になる話だったかな？"
1014202-79 = "まあたしかに、普通は海やプールだよね。"
1014202-80 = "だけど……そういう場所は落ち着かないんだ。"
1014202-81 = "え？理由？"
1014202-82 = "その……。"
1014202-83 = "まぁ……。"
1014202-88 = "私の水着姿は、どうしても輝いちゃうから……かな"
1014202-89 = "刺激が強くて、周りの人が大変だと思うし。"
1014202-90 = "[s] \"……。\""
1014202-91 = "先生にも、聞いてみたかったんだよね。"
1014202-92 = "私……輝きすぎてないかな？"
1014202-93 = "[s] \"…………。\""
1014202-94 = "……先生？"
1014202-95 = "[s] \"あはは！やっぱりナグサは面白いね！\""
1014202-96 = "ん、んん……？"
1014202-97 = "[s5] \"大丈夫！ナグサのせいで苦しむ人はいないと思うよ。\"\r\n[s6] \"「きれいな人」って思うだけで。\""
1014202-100 = "そう？うーん……。"
1014202-101 = "どうして私は……。"
1014202-102 = "光り輝く少女になってしまったのかな……。"
1014202-104 = "（ナグサの悩みはかき氷を食べ終わるまで続いた……）\r\n"
