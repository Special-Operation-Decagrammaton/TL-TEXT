[translation]
1007802-1 = "鬼怒川カスミ"
1007802-2 = "（カスミから送られてきた場所を訪ねると、そこには年季の入った建物があった）"
1007802-6 = "……おや、お客さんかな？"
1007802-7 = "……いや、先生だな！ちょうど良いタイミングじゃあないか。#nもしかしたら、波長が合っているのかもしれんな。"
1007802-8 = "先生！こっちだ、こっち！早く来てくれ～！！"
1007802-9 = "[s1] \"そっちにいたんだ、いま行くよ。\"\n[s2] 声がする方へ向かう。"
1007802-17 = "先生！！"
1007802-18 = "こっちだよ、こっち！"
1007802-19 = "いや、足音が遠ざかってるじゃないか！#nそっちじゃなくてこっちだ！！"
1007802-22 = "[wa:500]― [log=카스미]ハー[wa:500]ハッハッハッハ！[/log]"
1007802-24 = "― [log=카스미]ちょうど[wa:400]良いところに来たな！[/log]"
1007802-27 = "― [log=카스미]ようこそ、[wa:700]先生。[/log]"
1007802-29 = "― [log=카스미]ここが私の[wa:800]第86[wa:900]秘密アジトだ。[/log]"
1007802-32 = "[wa:600]― [log=카스미]ここで[wa:300]何をしているのかって？[/log]"
1007802-35 = "― [log=카스미]愚問だな、先生。[/log]"
1007802-37 = "― [log=카스미]私がすることといえば[wa:1100]ただ一つ。[/log]"
1007802-40 = "[wa:100]― [log=카스미]す[wa:200]な[wa:200]わ[wa:200]ち……[/log]"
1007802-42 = "― [log=카스미]新たな[wa:400]温泉ポイントを探しているのだ！[/log]"
1007802-45 = "[ns3] \"温泉ポイント？\"\n[ns4] \"それって、つまり……\""
1007802-46 = "[wa:300]― [log=카스미]ハハッ、[wa:700]先生。[/log]"
1007802-47 = "[wa:300]― [log=카스미]ハハッ、[wa:700]先生。[/log]"
1007802-49 = "[wa:150]― [log=카스미]話が早くて[wa:700]助かるな。[/log]"
1007802-52 = "― [log=카스미]ああ、[wa:500]その通り。[/log]"
1007802-54 = "― [log=카스미]実際に爆破する場所に[wa:1100]あたりをつけていたのだよ。[/log]"
1007802-57 = "[wa:1100]― [log=카스미]ふむ……[wa:1100]ここが良いだろうか？[/log]"
1007802-59 = "― [log=카스미]いや……[wa:800]こっちもなかなか……[/log]"
1007802-62 = "[wa:1400]― [log=카스미]なんだ、[wa:400]先生？[wa:1200]何故そんな目で私を見る？[/log]"
1007802-64 = "― [log=카스미]何か問題でも[wa:700]起きたのか？[/log]"
1007802-67 = "せっかくなら先生の意見も聞こうと思ってな。"
1007802-68 = "場所選びは、いつだって新鮮で刺激的だが……#nたまには別の視点も欲しくてな！"
1007802-69 = "もちろん誰でも良いわけじゃないぞ？#n[ruby=・  ・]先生[/ruby]の意見が欲しいんだ！"
1007802-70 = "……？"
1007802-71 = "そもそも、どうしてこんな所にいるのかって？#nなぜ「今月の第86秘密アジト」かって？"
1007802-72 = "ハーッハッハッハ！変なことを聞くのだな、先生は！#nそりゃあ私がお尋ね者だからさ。"
1007802-73 = "私はゲヘナで指名手配を受けていてね。"
1007802-74 = "その上、計画を立てるのには集中力が必要だから……"
1007802-75 = "こうやって、静かな場所で準備をしているというわけだよ。"
1007802-76 = "まあ、細かいことは気にするな！#n大事なのは計画だ、計画！"
1007802-77 = "それでは、今から私が候補地を挙げるから先生は意見を出してくれないか？"
1007802-78 = "さあて……どれどれ……"
1007802-79 = "ここはどうだ？デパートの地下！"
1007802-80 = "え？ちょっと微妙？#nそうか。ふむ……たしかに、そうかもしれん。"
1007802-81 = "じゃあ、ここはどうだ？地下鉄の乗換駅！#nすでに掘られているから、投資額も抑えられる！"
1007802-82 = "えっ？もっと新鮮な場所を探してみようって？#nう～～～む……"
1007802-83 = "そうだな……ふぅむ……"
1007802-84 = "むむむむむ～っ！！"
1007802-86 = "（その後もカスミは、人口が密集している地域や交通量の多い場所を提案していくので……）"
1007802-87 = "（どうにか人通りの少ない場所に誘導しようとするも、思い通りにはいかず……）"
1007802-89 = "むむ……っ！"
1007802-90 = "先生は本当に慎重だな。あれもダメ、これもダメ……"
1007802-91 = "しかし、これ以上は無理だ。#nもう私はこの欲を抑えられない！"
1007802-92 = "この場所が最後の候補地だ！"
1007802-93 = "よ～し！ここに行くとしよう。先生が反対しても実行するからな！#n全ての候補地を却下されてしまったんだ！もうここしかない！"
1007802-94 = "その場所は……"
1007802-95 = "[s5] \"そ、その場所は……？\"\n[s6] ごくりと唾を飲み込む。"
1007802-98 = "……ここだとも！！"
1007802-102 = "[ns7] \"ここは……空山の空き地……？\"\n[ns8] \"良かった、ここなら……\""
1007802-105 = "ハーハッハッハッハ！！！どうした、その顔は！#nなんだかホッとしているようだな！"
1007802-106 = "少なくとも、今までよりは良い反応で何よりだ。"
1007802-107 = "さあ！どうだ、先生。ここなら大丈夫だろう？#nまさか今回も反対とは言わないよな？"
1007802-108 = "[s9] \"ここなら大丈夫だと思う。\"\n[s10] [ruby=うなず] 頷 [/ruby]く。"
1007802-111 = "よし！最後の最後で、ようやく意見が一致したな！"
1007802-112 = "それではさっそく準備に取りかかろう！#n結果は改めて連絡するぞ！"
1007802-113 = "何度見ても素晴らしい候補地だ！#nうむ……満足！満足！"
1007802-114 = "付き合ってくれたお礼に、良い報告を持ってこよう！#nそれじゃあ失礼する！"
1007802-125 = "おおっと、うっかり地図を忘れるところだった。"
1007802-126 = "では……"
1007802-127 = "また！！"
1007802-133 = "（……さっきまでカスミが座っていた場所を見ながら、安堵のため息をついた）"
