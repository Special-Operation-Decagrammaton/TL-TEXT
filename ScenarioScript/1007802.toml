[translation]
1007802-1 = "Kinugawa Kasumi"

1007802-2 = "(Quando visitei o local que Kasumi me enviou, encontrei lá um prédio antigo.)"

1007802-6 = "...Ei, você é um cliente?"

1007802-7 = "...Não, é o Sensei! Não é o momento certo? #nTalvez estejamos na mesma sintonia."

1007802-8 = "Sensei! Por aqui, por aqui! Por favor, venha rápido! !"

1007802-9 = "[s1] \"Eu estava lá, vou agora.\"\n[s2] Vá na direção da voz."

1007802-17 = "Sensei! !"

1007802-18 = "É por aqui, por aqui!"

1007802-19 = "Não, os passos estão ficando longe! #nNão é isso, é isso! !"

1007802-22 = "[wa:500]― [log=카스미]ハー[wa:500]ハッハッハッハ！[/log]"
1007802-24 = "― [log=카스미]Você veio ao lugar certo [wa:400]! [/registro]"

1007802-27 = "― [log=카스미]Bem-vindo, [wa:700]Sensei. [/registro]"

1007802-29 = "― [log=카스미]Este é meu [wa:800]86º [wa:900] esconderijo secreto. [/registro]"

1007802-32 = "[wa:600]― [log=카스미]ここで[wa:300]何をしているのかって？[/log]"
1007802-35 = "― [log=카스미]Essa é uma pergunta estúpida, Sensei. [/registro]"

1007802-37 = "― [log=카스미]A única coisa que faço é [wa:1100]. [/registro]"

1007802-40 = "[wa:100]― [log=카스미]す[wa:200]な[wa:200]わ[wa:200]ち……[/log]"
1007802-42 = "― [log=카스미]Procurando por novos [wa:400] pontos de fontes termais! [/registro]"

1007802-45 = "[ns3] \"Ponto de fonte termal?\"\n[ns4] \"Isso significa...\""

1007802-46 = "[wa:300]― [log=카스미]ハハッ、[wa:700]先生。[/log]"
1007802-47 = "[wa:300]― [log=카스미]ハハッ、[wa:700]先生。[/log]"
1007802-49 = "[wa:150]― [log=카스미]話が早くて[wa:700]助かるな。[/log]"
1007802-52 = "― [log=카스미]Ah, [wa:500]Isso mesmo. [/registro]"

1007802-54 = "- [log=카스미]Eles marcaram o local real da explosão em [wa:1100]. [/registro]"

1007802-57 = "[wa:1100]― [log=카스미]ふむ……[wa:1100]ここが良いだろうか？[/log]"
1007802-59 = "― [log=카스미]Não...[wa:800]Esse também é muito bom...[/log]"

1007802-62 = "[wa:1400]― [log=카스미]なんだ、[wa:400]先生？[wa:1200]何故そんな目で私を見る？[/log]"
1007802-64 = "- [log=카스미]Aconteceu alguma coisa [wa:700]? [/registro]"

1007802-67 = "Gostaria de ouvir a opinião do Sensei também."

1007802-68 = "Escolher um local é sempre novo e emocionante, mas...#nÀs vezes quero uma perspectiva diferente!"

1007802-69 = "Claro que não é para todos, certo? #n Quero sua opinião!"

1007802-70 = "...?"

1007802-71 = "Por que você está aqui em primeiro lugar? #nPor que “O 86º esconderijo secreto deste mês”?"

1007802-72 = "Hahahahaha! É uma coisa estranha de se ouvir, Sensei! #nIsso é porque eu sou a pessoa procurada."

1007802-73 = "Sou procurado na Geena."

1007802-74 = "Além disso, fazer planos exige concentração..."

1007802-75 = "É assim que você se prepara em um lugar tranquilo."

1007802-76 = "Bem, não se preocupe com os detalhes! #nO importante é o plano, o plano!"

1007802-77 = "Pois bem, vou listar os locais candidatos agora, então você poderia dar sua opinião?"

1007802-78 = "Agora... qual..."

1007802-79 = "Como é aqui? No subsolo de uma loja de departamentos!"

1007802-80 = "foto? É um pouco estranho? #nEntendo. Hmm... isso pode ser verdade."

1007802-81 = "Então e aqui? Estação de transferência de metrô! #nComo já está minerado, o valor do investimento pode ser reduzido!"

1007802-82 = "Huh? Você está procurando um lugar mais fresco? #nUmmmm..."

1007802-83 = "Isso mesmo... hummm..."

1007802-84 = "Mmmmmmmmm! !"

1007802-86 = "(Depois disso, Kasumi continua sugerindo áreas densamente povoadas e áreas com tráfego intenso...)"

1007802-87 = "(Tentei levá-los para um local com menos trânsito, mas não saiu como planejado...)"

1007802-89 = "Hum...!"

1007802-90 = "O Sensei é muito cuidadoso. Isso não é bom, isso também não é bom..."

1007802-91 = "Mas nada mais é possível. #nNão consigo mais controlar esse desejo!"

1007802-92 = "Este local é o último local candidato!"

1007802-93 = "OK! Vamos aqui. Mesmo que o Sensei se oponha, eu farei isso! #nTodos os locais candidatos foram rejeitados! Este é o único lugar que resta!"

1007802-94 = "O lugar é..."

1007802-95 = "[s5] \"O-Onde é esse lugar...?\"\n[s6] Engoli em seco."

1007802-98 = "...Mesmo aqui! !"

1007802-102 = "[ns7] \"Este é... o terreno baldio de Sorayama...?\"\n[ns8] \"Bom, isso é...\""

1007802-105 = "Hahahahaha! ! ! O que aconteceu com aquele rosto? #nVocê parece meio aliviado!"

1007802-106 = "No mínimo, a resposta foi melhor do que antes."

1007802-107 = "aqui vamos nós! O que você acha, senhor? Está tudo bem aqui? #nAcho que você também não vai dizer não dessa vez, certo?"

1007802-108 = "[s9] \"Acho que está tudo bem aqui.\"\n[s10] Ku."

1007802-111 = "OK! No final, finalmente chegamos a um consenso!"

1007802-112 = "Agora vamos nos preparar! #nEntrarei em contato novamente com os resultados!"

1007802-113 = "É um ótimo site candidato, não importa quantas vezes eu olhe! #nHmm...satisfeito! satisfação!"

1007802-114 = "Como forma de agradecimento por se juntar a nós, vamos trazer-lhe um bom relatório! #nSe for esse o caso, por favor, com licença!"

1007802-125 = "Ops, quase esqueci meu mapa."

1007802-126 = "Então..."

1007802-127 = "Também! !"

1007802-133 = "(... dei um suspiro de alívio ao olhar para o lugar onde Kasumi estava sentada há pouco.)"

