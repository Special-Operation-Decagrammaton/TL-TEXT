[translation]
52050-1 = "Episódio 5: A Saudade Além das Memórias"
52050-10 = "Faz uns 10 meses, eu acho. #nAyame me confiou a Hyakuren e partiu para o norte em busca da Srta. Kuzunoha."
52050-11 = "Mas eu só sabia ficar confusa, sem conseguir fazer nada. #nNão consegui impedi-la, nem segui-la."
52050-12 = "……Eu não consigo ser um substituto para a Ayame. #nNão tem como eu ser a presidente do Comitê Hyakkiyako. #n……Era o que eu pensava."
52050-15 = "E então…… quando me dei conta, eu também estava indo em direção à grande planície nevada."
52050-26 = "Não me lembro mais de quanto caminhei ou quantas noites se passaram."
52050-27 = "Procurar pela Ayame na vasta planície nevada era pura imprudência, mas…… #nmesmo exausta, encontrei as ruínas do 'Templo do Crepúsculo'."
52050-39 = "A Ayame estava lá. Como se estivesse esperando por alguém――"
52050-40 = "Vocês também se lembram do rosto e da voz da Ayame, não é?"
52050-41 = "Mesmo em dias de chuva, aquele sorriso brilhante como o sol. #nAquela voz gentil que parecia envolver tudo……."
52050-42 = "Enquanto sentia até as pontas dos dedos congelarem, #nao ver aquele haori azul-claro, eu pensei."
52050-45 = "Eu, que fui uma tola ao abandonar tudo para vir aqui ser egoísta―― #nqueria que ela me envolvesse……."
52050-46 = "Eu queria vê-la rindo e dizendo: 'Não tem jeito mesmo'."
52050-47 = "Eu queria que ela voltasse a ser nossa presidente mais uma vez."
52050-49 = "Mas, a Ayame……."
52050-55 = "Por que você está aqui?"
52050-61 = "Foi a primeira vez que ouvi a Ayame usar um tom de voz tão frio."
52050-62 = "Um olhar gélido, carregado de desprezo pela outra pessoa."
52050-72 = "Aquela não era a Ayame que eu conhecia……."
52050-75 = "Por que você pergunta…… eu vim pela Ayame……."
52050-76 = "Eu não disse? Eu não vou voltar até encontrar a Srta. Kuzunoha."
52050-77 = "Mas, sem a Ayame…… todas estão preocupadas."
52050-78 = "Você é a presidente do Comitê Hyakkiyako em quem todas confiam."
52050-79 = "Vamos voltar logo."
52050-85 = "Porque, a Ayame também sabe, não é?"
52050-86 = "A Srta. Kuzunoha não existe. É apenas uma lenda――"
52050-87 = "……Talvez seja verdade."
52050-92 = "O Templo do Crepúsculo está neste estado. #nNão importa o quanto eu chame, não há resposta alguma."
52050-93 = "Ainda assim, eu preciso encontrar a Srta. Kuzunoha."
52050-94 = "Você não entenderia. #nPor que eu quero tanto encontrar a Srta. Kuzunoha."
52050-96 = "Não…… eu entendo sim."
52050-97 = "Você veio pedir conselhos à Srta. Kuzunoha para proteger a todas, não foi? #nA Ayame tem um senso de responsabilidade tão forte……."
52050-101 = "Haha…… ahaha……."
52050-102 = "……Haa."
52050-106 = "Sério mesmo…… Nagusa, você não sabe nada sobre mim."
52050-110 = "Não…… ou será que você nem tentou entender?"
52050-114 = "Ayame, por que você diz essas coisas……."
52050-119 = "Desde os tempos antigos, o coração humano é um mistério profundo."
52050-120 = "Fingir que compreende é pura arrogância. #nÉ algo frágil como vidro."
52050-121 = "Você é incompetente e, além disso, arrogante. #nNão existe remédio que cure isso."
52050-125 = "Quem é você……?"
52050-132 = "Eu sou um viajante que aprecia a elegância e as histórias."
52050-133 = "Vim buscar uma alma perdida, coberta pela neve."
52050-137 = "Você, você sabe onde a Srta. Kuzunoha está?"
52050-138 = "Nem eu consigo tocar a fronteira do outro lado. #nEu estava apenas observando a neve e me consolando com a elegância do momento."
52050-143 = "No entanto―― embora nossos destinos sejam diferentes, eu conheço o caminho para 'lá'."
52050-147 = "Então…… me guie."
52050-155 = "Espere……! #nNão leve a Ayame, minha amiga!"
52050-159 = "……Amiga?"
52050-166 = "Nagusa."
52050-171 = "Eu... nunca considerei você uma amiga."
52050-174 = "...Eu não consigo acreditar. #nQue a senpai Ayame diria algo tão terrível."
52050-175 = "Mesmo que estivesse com raiva, será que ela diria algo assim...?"
52050-176 = "Não consigo associar isso... à senpai Ayame que eu conheço."
52050-181 = "Com certeza, a Ayame de sempre nunca diria algo assim."
52050-182 = "Pensei várias vezes... que talvez eu estivesse apenas tendo um pesadelo."
52050-183 = "Mas o braço que foi engolido junto com a Ayame... #nesta cicatriz me diz que aquilo foi real."
52050-184 = "Foi essa a última vez que você viu a senpai?"
52050-185 = "Sim... depois disso, eu desmaiei."
52050-186 = "Perder a consciência em um campo de neve deserto, onde não há ninguém... #nmesmo que eu tivesse morrido, não seria estranho—"
52050-187 = "Mas a ajuda chegou e, de alguma forma, consegui sobreviver."
52050-189 = "Que sorte a sua ter alguém por perto em um lugar como aquele!"
52050-193 = "……"
52050-194 = "É verdade. Teria sido bom se fosse assim."
52050-199 = "...Hmm."
52050-203 = "Você acordou?"
52050-210 = "Se já consegue se mover, é melhor ir embora. #nAqui eu posso manter sua energia, mas não posso curá-la."
52050-211 = "Foi você quem me...?"
52050-212 = "Fufu... "Você" para uma veterana, que audácia."
52050-213 = "Bem, vou deixar passar por hoje. #nVocê se lembra do seu próprio nome?"
52050-214 = "Eu sou a... vice-presidente do Comitê de Mediação de Conflitos Hyakkiyako, Goryou Nagusa."
52050-220 = "Cerejeiras... no meio do inverno?"
52050-224 = "Ora. Você não percebeu até chegar aqui?"
52050-225 = "O fluxo do tempo no 'Templo do Crepúsculo' é diferente da realidade. #nÀs vezes, lírios-aranha e cerejeiras florescem juntos."
52050-229 = "Este lugar é...?"
52050-230 = "Então... você é aquela, a Grande Profetisa Kuzunoha?"
52050-232 = "Hum..."
52050-233 = "E se eu fosse realmente Kuzunoha, o que você faria?"
52050-234 = "Como sucessora da Hyakkiyako, você tem algo a me perguntar?"
52050-241 = "Não... você não é a senhora Kuzunoha."
52050-242 = "...Ho."
52050-243 = "Se fosse realmente a senhora Kuzunoha... #nela não ignoraria a Ayame, que continuou chamando por ela, e não salvaria alguém como eu."
52050-244 = "Uma atitude tão fria... #na primeira presidente da Hyakkiyako, Kuzunoha, não faria isso."
52050-245 = "Como você interpreta isso é escolha sua."
52050-246 = "Mas... você chegou na hora certa. #nPoderia me fazer um favor?"
52050-254 = "Isto é... um pergaminho?"
52050-255 = "Quero que entregue isto ao professor do 'Schale'."
52050-256 = "Parece que ele estava me procurando. #nO que está escrito aqui é—"
52050-260 = "um método para salvar certa pessoa."
52050-265 = "...Foi até aqui que eu vi."
52050-266 = "Em vez de salvar a Ayame, fui rejeitada por ela... #ne, por causa disso, meu braço direito também não funciona mais."
52050-267 = "Eu fiquei em silêncio até agora porque... #ntive medo de que, se soubessem a verdade, todos ficariam desapontados comigo."
52050-268 = "Mas... eu não vou mais fugir."
52050-269 = "Todos... podem me odiar. #nPodem me culpar o quanto quiserem."
52050-275 = "Não... isso não..."
52050-276 = "Não tem como eu odiar a senpai Nagusa!"
52050-280 = "Yu, Yukari...?"
52050-281 = "Enquanto todos estavam em confusão, #na senpai Nagusa foi a única que saiu para procurar a senpai Ayame."
52050-282 = "Ninguém nesta Hyakkiyako odeia a senpai... #npelo contrário, todos nós somos gratos!"
52050-283 = "...Você não tinha amadurecido com aquele incidente anterior?"
52050-284 = "A gentil presidente Ayame mudou completamente, #ne o Clube Kacho Fugetsu apareceu ali convenientemente..."
52050-285 = "Isso tem que ser um plano deles, não tem?"
52050-286 = "Sim! A veterana Ayame só está sendo enganada por pessoas más!"
52050-287 = "A Yukari tem razão. #nAlém disso, não adianta nada ficar se culpando, certo?"
52050-288 = "Vamos direto para a Grande Planície Nevada salvar a veterana Ayame. #nE claro, vamos recuperar o braço da veterana Nagusa também!"
52050-289 = "Que plano excelente! Eu concordo!"
52050-291 = "Ma-mas..."
52050-292 = "A Grande Planície Nevada é perigosa. #nE além disso, não podemos simplesmente deixar este lugar..."
52050-297 = "Com licença. O pessoal da Hyakkiyako está por aqui?"
52050-305 = "Ah, que bom que estão todos reunidos."
52050-306 = "Você é do Departamento Yin-Yang... o que houve?"
52050-307 = "Sim... por ordem da nossa chefe."
52050-312 = "Ela tem um assunto urgente para tratar... e está procurando por vocês."
52050-313 = "......A Srta. Niya?"
52050-315 = "Próximo episódio: O Festival e os Preparativos"
