[translation]
52050-1 = "第5話;憧れは記憶の彼方に"
52050-10 = "10か月くらい前かな。#nアヤメは私に百蓮を託して、クズノハ様を探しに北部へと向かった。"
52050-11 = "でも、私は戸惑うばかりで、何もできなかったの。#n彼女を止めることも、追いかけることも。"
52050-12 = "……アヤメの代わりにはなれない。#n私に百花繚乱の委員長なんてできるはずがない。#n……そう思ってた。"
52050-15 = "そうして……気づけば私も、大雪原に向かっていたの。"
52050-26 = "どれだけ歩いて、いくつの夜を越えたのか、もう覚えてない。"
52050-27 = "広大な大雪原でアヤメを探すなんて、無謀でしかなかったけど……#n私はボロボロになりながら、「黄昏の寺院」の跡地を見つけた。"
52050-39 = "そこにアヤメはいた。まるで誰かを待ってるみたいに――"
52050-40 = "みんなも、アヤメの顔と声は覚えてるよね？"
52050-41 = "雨の日でも、太陽のように明るい笑顔。#n何もかも包み込むような優しい声……。"
52050-42 = "私は指先さえも凍りついてしまいそうな中で、#nあの水色の羽織を目にして思ったんだ。"
52050-45 = "全部投げ捨てて、わがままを言いに来た馬鹿な私を――#n包み込んでほしい……って。"
52050-46 = "「しょうがないなあ」って笑う姿を見せてほしかった。"
52050-47 = "もう一度、私たちの委員長に戻ってほしかった。"
52050-49 = "でも、アヤメは……。"
52050-55 = "何で、ここにいるの？"
52050-61 = "あんなに冷たい声を出すアヤメは、初めてだった。"
52050-62 = "相手を軽蔑しきった、氷のような眼差し。"
52050-72 = "私の知ってるアヤメじゃなかった……。"
52050-75 = "何でって……私はアヤメを……。"
52050-76 = "言ったでしょ？私はクズノハ様に会えるまで帰らない。"
52050-77 = "でも、アヤメがいないと……みんな不安がってる。"
52050-78 = "あなたは、みんなが頼りにしてる百花繚乱の委員長なんだから。"
52050-79 = "もう帰ろうよ。"
52050-85 = "だって、アヤメも知ってるでしょ？"
52050-86 = "クズノハ様なんて、いない。ただの言い伝えで――"
52050-87 = "……そうかもね。"
52050-92 = "黄昏の寺院はこんな有様だし。#nいくら名前を呼んでも、返事一つないもの。"
52050-93 = "それでも、私はクズノハ様に会わなきゃいけないの。"
52050-94 = "あなたには分からないだろうね。#n私がどうしてクズノハ様に会いたいのか。"
52050-96 = "ううん……私にもわかるよ。"
52050-97 = "みんなを守るために、クズノハ様の助言を貰いに来たんでしょ？#nアヤメは責任感が強いから……。"
52050-101 = "ははっ……あははっ……。"
52050-102 = "……はあ。"
52050-106 = "ほんっと……ナグサって、私のことなにも知らないよね。"
52050-110 = "いや……分かろうともしなかったのか。"
52050-114 = "アヤメ、どうしてそんなこと……。"
52050-119 = "古来より、人の心とは摩訶不思議。"
52050-120 = "理解した[ruby=うそぶ]と嘯く[/ruby]も、それは傲慢。#n硝子のように脆いものさね。"
52050-121 = "おまえさんは無能で、その上傲慢ときた。#n付ける薬なんてありゃせんのさ。"
52050-125 = "あなたは……？"
52050-132 = "我は、風流と物語を慈しむ道行き人。"
52050-133 = "雪にまみれた、迷い子を迎えに来たのさ。"
52050-137 = "あなた、クズノハ様の居場所がわかるの？"
52050-138 = "我とて彼岸の境界には触れられない。#n雪を眺め、風流で己を慰めていたところさね。"
52050-143 = "しかし――互いに行き先は異なれど、「そこ」への道なら我にもわかる。"
52050-147 = "じゃあ……案内して。"
52050-155 = "待って……っ！#nアヤメを、私の友達を連れていかないで！"
52050-159 = "……友達？"
52050-166 = "ナグサ。"
52050-171 = "私は……あんたを友達だと思ったことなんて、ない。"
52050-174 = "……信じられませんわ。#nアヤメ先輩が、そんなひどいことを仰るだなんて。"
52050-175 = "いくら怒ってても、そんなこと言うか……？"
52050-176 = "私の知ってるアヤメ先輩とは……あんまり結びつかないけど。"
52050-181 = "たしかに普段のアヤメなら、あんなこと絶対言わない。"
52050-182 = "悪い夢でも見てたんじゃないか……って、何度も考えた。"
52050-183 = "でも、アヤメと一緒に呑まれた腕が……#nこの傷が、あれは現実なんだって訴えてくる。"
52050-184 = "それが、最後に見た先輩の姿？"
52050-185 = "うん……その後、倒れちゃって。"
52050-186 = "[ruby=ひとけ]人気[/ruby]のない大雪原で意識を失うなんて、#n死んでもおかしくなかったのに――"
52050-187 = "助けが来て、なんとか命拾いしたんだ。"
52050-189 = "そのような場所に人がいらっしゃるだなんて、幸運の持ち主なのですね！"
52050-193 = "……。"
52050-194 = "そうだね。そんなものがあればよかったのに。"
52050-199 = "……んん。"
52050-203 = "気がついたかの。"
52050-210 = "もう動けるのなら、帰るがよい。#nここでは気力を保持することはできても、治せはせぬ。"
52050-211 = "あなたが私を……？"
52050-212 = "ふふ……先達に対して「あなた」とは大きく出たのう。"
52050-213 = "まあ、今日のところは大目に見てやろうかの。#n己が名は覚えておるか？"
52050-214 = "私は百花繚乱紛争調停委員会の……委員長代理、[ruby=ごりょう]御稜[/ruby]ナグサ。"
52050-220 = "真冬に……桜？"
52050-224 = "おや。ここに来るまで気づかなんだか？"
52050-225 = "「黄昏の寺院」は現実と時間の流れが異なっていての。#n彼岸花と桜が共に咲き乱れることもある。"
52050-229 = "ここが……？"
52050-230 = "じゃあ……あなたがあの、大預言者クズノハ？"
52050-232 = "ふむ……。"
52050-233 = "妾が本当にクズノハだとすれば、どうするのじゃ？"
52050-234 = "百花繚乱の後継者として、聞きたいことでもあるのか？"
52050-241 = "いや……あなたはクズノハ様じゃない。"
52050-242 = "……ほう。"
52050-243 = "本当にクズノハ様なら……#n呼びかけ続けたアヤメを無視して、私なんかを助けない。"
52050-244 = "そんな冷たいこと……#n百花繚乱の初代委員長、クズノハはしない。"
52050-245 = "どう受け止めるかは、おぬしの自由じゃ。"
52050-246 = "だが……ちょうどいいときに来てくれた。#nひとつ、使いを頼まれてくれぬか？"
52050-254 = "これは……巻物？"
52050-255 = "「シャーレ」の先生に、これを渡して欲しい。"
52050-256 = "妾を探しているようじゃったからな。#nここに記されているのは――"
52050-260 = "ある者を、助ける方法じゃ。"
52050-265 = "……私が見たのはここまで。"
52050-266 = "私はアヤメを助けるどころか拒まれた……#nその影響で、右腕も使い物にならない。"
52050-267 = "今まで黙ってたのは……#n本当のことを知ったら、みんな私に失望するんじゃないかって、怖くて。"
52050-268 = "でも……私はもう、逃げないよ。"
52050-269 = "みんな……私のことを恨んでいいから。#n好きなだけ、責めて構わないよ。"
52050-275 = "そんな……そんな……。"
52050-276 = "ナグサ先輩のこと、恨むわけありませんの！"
52050-280 = "ゆ、ユカリ……？"
52050-281 = "みんなが混乱している中、#nアヤメ先輩を探しに行ったのはナグサ先輩だけです。"
52050-282 = "この百花繚乱に、先輩を恨む者などおりません……#nむしろ感謝しているくらいですの！"
52050-283 = "……以前の一件で成長したんじゃなかったの？"
52050-284 = "優しかったアヤメ委員長が豹変して、#nそこに都合良く現れた花鳥風月部……。"
52050-285 = "そんなの、あいつらの策に決まってるでしょ。"
52050-286 = "ええ！アヤメ先輩は悪者に騙されているだけですの！"
52050-287 = "ユカリの言うとおりだ。#nそれに、自分を責めたってしょうがないだろ？"
52050-288 = "今すぐ大雪原に向かって、アヤメ先輩を助けよう。#nもちろん、ナグサ先輩の腕も取り返す！"
52050-289 = "えっくせれんとな案ですわ！身共、賛成です！"
52050-291 = "で、でも……。"
52050-292 = "大雪原は危険だよ。#nそれに、みんなでここを離れるわけには……。"
52050-297 = "失礼します。百花繚乱の方はいらっしゃいますか？"
52050-305 = "ああ、ちょうどお揃いでしたか。"
52050-306 = "あなたは[ruby=おんみょうぶ]陰陽部[/ruby]の……どうしたの？"
52050-307 = "はい……部長の命で。"
52050-312 = "折り入ってご相談があるとかで――皆さんをお探しです。"
52050-313 = "……ニヤ様が？"
52050-315 = "次回;お祭りと準備"
