[translation]
52050-1 = "Episódio 5; Desejos Além das Memórias"
52050-10 = "Faz uns dez meses. #n Ayame me confiou a 'Hyakuren' e partiu para o norte em busca de Kuzunoha-sama."
52050-11 = "Mas eu fiquei apenas confusa, sem conseguir fazer nada. #n Nem impedi-la, nem segui-la."
52050-12 = "......Não posso substituir a Ayame. #n Não tem como eu assumir o cargo de presidente da Hyakkaryouran. #n ......Era o que eu pensava."
52050-15 = "E assim... quando me dei conta, eu também estava a caminho do Grande Campo de Neve."
52050-26 = "Já não me lembro de quanto andei, nem de quantas noites passei."
52050-27 = "Procurar pela Ayame na vastidão daquele campo de neve não passava de imprudência... #n mas, exausta e em frangalhos, encontrei o local onde ficava o 'Templo do Crepúsculo'."
52050-39 = "Ayame estava lá. Como se estivesse esperando por alguém――"
52050-40 = "Todas vocês se lembram do rosto e da voz dela, certo?"
52050-41 = "Um sorriso brilhante como o sol, mesmo em dias de chuva. #n Uma voz gentil que parecia envolver tudo..."
52050-42 = "Em meio ao frio, onde até as pontas dos meus dedos pareciam congelar, #n ao ver aquele haori azul-claro, eu pensei."
52050-45 = "Que eu queria que ela me envolvesse―― #n eu, a tola que veio até aqui jogando tudo para o alto e reclamando egoisticamente."
52050-46 = "Queria vê-la sorrir e dizer 'não tem jeito mesmo'."
52050-47 = "Queria que ela voltasse a ser nossa presidente mais uma vez."
52050-49 = "Mas, a Ayame......"
52050-55 = "Por que você está aqui?"
52050-61 = "Foi a primeira vez que vi a Ayame usar um tom de voz tão frio."
52050-62 = "Um olhar gélido, carregado de desprezo."
52050-72 = "Aquela não era a Ayame que eu conhecia......"
52050-75 = "Como assim 'por quê'... eu vim pela Ayame......"
52050-76 = "Eu já disse, não disse? Não vou voltar até encontrar Kuzunoha-sama."
52050-77 = "Mas, se você não voltar... todas ficarão preocupadas."
52050-78 = "Você é a presidente da Hyakkaryouran, de quem todas dependem."
52050-79 = "Vamos voltar logo."
52050-85 = "Porque, Ayame, você também sabe, não sabe?"
52050-86 = "Kuzunoha-sama não existe. É apenas uma lenda e――"
52050-87 = "......Talvez seja."
52050-92 = "O Templo do Crepúsculo está nesse estado. #n Não importa o quanto eu chame, não recebo uma única resposta."
52050-93 = "Mesmo assim, eu preciso encontrar Kuzunoha-sama."
52050-94 = "Você não entenderia. #n Por que eu preciso encontrar Kuzunoha-sama."
52050-96 = "Não... eu entendo sim."
52050-97 = "Você veio pedir conselhos a ela para proteger a todos, não veio? #n Porque a Ayame tem um forte senso de responsabilidade......"
52050-101 = "Haha... ahahaha..."
52050-102 = "......Haa."
52050-106 = "Sério mesmo... Nagusa, você não sabe nada sobre mim."
52050-110 = "Ou será que... você nem tentou entender?"
52050-114 = "Ayame, por que você diz essas coisas......"
52050-119 = "Desde tempos antigos, o coração humano é um mistério profundo."
52050-120 = "A arrogância de se vangloriar por compreender... é algo frágil como vidro."
52050-121 = "Você é incompetente e, para piorar, arrogante. #n Não existe remédio que cure isso."
52050-125 = "Você é...?"
52050-132 = "Eu sou uma viajante que preza a elegância e as histórias."
52050-133 = "Vim dar as boas-vindas a uma criança perdida coberta de neve."
52050-137 = "Você... você sabe onde está Kuzunoha-sama?"
52050-138 = "Eu também não posso tocar a fronteira do outro mundo. #n Apenas estava apreciando a neve e me consolando com a elegância."
52050-143 = "No entanto―― embora nossos destinos sejam diferentes, eu conheço o caminho para 'lá'."
52050-147 = "Então... me guie."
52050-155 = "Espere......! #n Não leve a Ayame, a minha amiga!"
52050-159 = "......Amiga?"
52050-166 = "Nagusa."
52050-171 = "Eu... nunca te considerei minha amiga."
52050-174 = "......Não consigo acreditar. #n Que a Ayame-senpai diria algo tão cruel."
52050-175 = "Mesmo brava, será que ela diria algo assim...?"
52050-176 = "Não combina nada com a Ayame-senpai que eu conhecia..."
52050-181 = "Com certeza, na vida normal, ela nunca diria algo assim."
52050-182 = "Pensei várias vezes que talvez estivesse tendo um pesadelo..."
52050-183 = "Mas o braço que foi engolido junto com a Ayame... #n essa ferida insiste que aquilo foi real."
52050-184 = "Essa foi a última vez que você viu a senpai?"
52050-185 = "Sim... depois disso, acabei desmaiando."
52050-186 = "Desmaiar naquele campo de neve deserto... #n eu poderia ter morrido, mas――"
52050-187 = "Recebi ajuda e consegui sobreviver."
52050-189 = "Que pessoa sortuda, ter alguém em um lugar daqueles!"
52050-193 = "......"
52050-194 = "É verdade. Teria sido bom se algo assim tivesse acontecido."
52050-199 = "......Hm."
52050-203 = "Acordou?"
52050-210 = "Se já consegue se mexer, vá embora. #n Posso manter sua energia aqui, mas não posso te curar."
52050-211 = "Você que me..."
52050-212 = "Fufu... 'Você' para alguém que veio antes? Que ousadia."
52050-213 = "Bem, vou deixar passar por hoje. #n Você se lembra do seu próprio nome?"
52050-214 = "Eu sou a... presidente interina do Comitê de Mediação de Conflitos Hyakkaryouran, Nagusa Goryou."
52050-220 = "Cerejeiras... em pleno inverno?"
52050-224 = "Ora. Não percebeu até chegar aqui?"
52050-225 = "O 'Templo do Crepúsculo' tem um fluxo de tempo diferente da realidade. #n É possível ver flores de cerejeira e lírios-aranha desabrochando juntos."
52050-229 = "Aqui é...?"
52050-230 = "Então... você é a Grande Profeta Kuzunoha?"
52050-232 = "Hmm......"
52050-233 = "E se eu for realmente Kuzunoha, o que você faria?"
52050-234 = "Como sucessora da Hyakkaryouran, você tem algo a perguntar?"
52050-241 = "Não... você não é Kuzunoha-sama."
52050-242 = "......Ho."
52050-243 = "Se você fosse realmente Kuzunoha-sama... #n não ignoraria a Ayame que tanto a chamava e não ajudaria alguém como eu."
52050-244 = "Uma atitude tão fria... #n Kuzunoha, a primeira presidente da Hyakkaryouran, não faria isso."
52050-245 = "Como levar isso é escolha sua."
52050-246 = "Mas... você veio no momento certo. #n Pode me fazer um favor?"
52050-254 = "Isso é... um pergaminho?"
52050-255 = "Entregue isso ao Sensei da 'Schale'."
52050-256 = "Parece que ele estava me procurando. #n O que está escrito aqui é――"
52050-260 = "uma maneira de salvar certa pessoa."
52050-265 = "......O que eu vi termina aqui."
52050-266 = "Em vez de salvar a Ayame, fui rejeitada... #n por conta disso, meu braço direito não serve para nada."
52050-267 = "Fiquei em silêncio até agora... #n porque tinha medo de que todos se decepcionassem comigo se soubessem a verdade."
52050-268 = "Mas... eu não vou fugir mais."
52050-269 = "Todas vocês... podem me odiar. #n Podem me culpar o quanto quiserem."
52050-275 = "Não... não é possível..."
52050-276 = "Nós jamais odiaríamos a Nagusa-senpai!"
52050-280 = "Yu, Yukari...?"
52050-281 = "No meio da confusão de todas, #n só a Nagusa-senpai foi procurar pela Ayame-senpai."
52050-282 = "Não existe ninguém na Hyakkaryouran que odeie você... #n na verdade, somos muito gratas!"
52050-283 = "......Você não tinha amadurecido com o último caso?"
52050-284 = "A bondosa presidente Ayame mudou repentinamente, #n e o Clube das Flores, Pássaros, Vento e Lua apareceu convenientemente......"
52050-285 = "Isso só pode ser um plano deles."
52050-286 = "Sim! A Ayame-senpai está apenas sendo enganada por vilões!"
52050-287 = "A Yukari tem razão. #n Além disso, de que adianta se culpar?"
52050-288 = "Vamos ao Grande Campo de Neve agora mesmo e salvar a Ayame-senpai. #n E claro, vamos recuperar o braço da Nagusa-senpai também!"
52050-289 = "Excelente plano! Eu apoio!"
52050-291 = "Ma, mas......"
52050-292 = "O Grande Campo de Neve é perigoso. #n E não podemos deixar este lugar assim..."
52050-297 = "Com licença. Algum membro da Hyakkaryouran está por aqui?"
52050-305 = "Ah, que bom que estão todas reunidas."
52050-306 = "Você é do... Clube Yin-Yang... aconteceu alguma coisa?"
52050-307 = "Sim... sob ordens da presidente."
52050-312 = "Precisamos discutir um assunto urgente―― e estamos procurando por vocês."
52050-313 = "......A Niya-sama?"
52050-315 = "Próximo Episódio; O Festival e os Preparativos"