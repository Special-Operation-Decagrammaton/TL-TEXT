[translation]#[Texto Final. - Filipe 08/07.]
70004010-1 = "O Presente Sem Dono (1)"
70004010-5 = "……Sensei? Cheguei na Schale agora."
70004010-6 = "É, hoje teve muita aluna problemática.#nVou passar na conveniência comprar bebida e já vou."
70004010-7 = "Ah…… Sensei, quer alguma coisa?"
70004010-11 = "……Fufu, imaginei que diria isso."
70004010-12 = "Vou o mais rápido possível. Estou animada para o plantão de hoje."
70004010-16 = "Duas bebidas energéticas e um café preto. Total 420 ienes!"
70004010-17 = "Vou pagar com cartão."
70004010-21 = "……Não precisa de sacola, obrigado."
70004010-26 = "(……Suspeito)"
70004010-30 = "……Aliás, Sensei. Já encomendou o bolo de Natal?"
