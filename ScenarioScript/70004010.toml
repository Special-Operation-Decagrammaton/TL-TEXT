70004010-32 = "Ah, trabalha no Natal também. Isso é……#n……bom trabalho."
70004010-37 = "Mandei o link por MomoTalk agora……#n……é uma loja de shortcake só delivery, bem recomendada."
70004010-38 = "É Natal, né.#nSe não comer um doce gostoso, é perda de tempo."
70004010-39 = "Um dacquoise, dois pudins, um#n……bolo de chocolate em camadas……"
70004010-40 = "Ah, desculpa. Isso junto também."
70004010-41 = "Leite, mais um item. Total 780 ienes!#nQuer sacola?"
70004010-42 = "Sim, por favor."
70004010-47 = "(Não importa como se olhe……)"
70004010-50 = "Se~n~sei~? Que recibo é esse?"
70004010-51 = "Não se faça de bobo! Nos recibos enviados ao Seminário ontem,#n……havia uma compra de um brinquedo robótico!"
70004010-52 = "No mês passado, foi um jogo……"
70004010-56 = "Hã? Presente de Natal para você?"
70004010-57 = "É claramente uma despesa pessoal!#nNão pode ser colocada no relatório de contas!"
70004010-58 = "……Haa, tudo bem.#nVou até aí agora e verifico os livros!"
70004010-59 = "Ah, são…… 30 munições 9mm#n……e um carregador rápido, certo?"
70004010-60 = "Sim, sem problemas. Desculpa gritar enquanto fazia o caixa."
70004010-61 = "Total 1810 ienes. Aqui, tenho o valor exato."
70004010-62 = "Ah, obrigada. A sacola――"
70004010-68 = "……Foi embora."
70004010-72 = "(Como eu suspeitava…… é muito suspeito!)"
70004010-75 = "Hoje, 10 alunas vieram……"
70004010-76 = "Contando as que não vieram na conveniência,#n……umas 20 devem ter ido à Schale."
70004010-77 = "Se têm algum assunto, até vai……#nmas vir sem motivo é estranho."
70004010-78 = "Dizem que o Sensei da Schale ajuda alunos em apuros#n……e protege os cidadãos."
70004010-79 = "Mas também ouço boatos estranhos…… que nadou pelado na piscina de todas as escolas, que lambeu os pés de alunas……"
70004010-80 = "Por que todos querem ver o Sensei?"
70004010-81 = "Será que ele usa meios suspeitos para seduzir……?"
70004010-82 = "Ouvi dizer que a Schale tem uma ferramenta para controlar pessoas――"
70004010-83 = "[s] \"Que história?\""
70004010-84 = "Hyaa!? S-Se-Sensei!?"
70004010-85 = "B-bem-vindo à 'Angel 24'!#n……Há quanto tempo está aí?"
70004010-86 = "[s1] \"Olá, Sora. Cheguei agora.\"\n[s2] \"Estava pensando em algo?\""
70004010-87 = "N-não, só estava vendo um post viral nas redes sociais……"
70004010-88 = "N-não, só estava vendo um post viral nas redes sociais……"
70004010-89 = "[s3] \"Posts nas redes são legais.\"\n[s4] \"Mas não se deve acreditar em tudo.\""
70004010-90 = "S-sim! Vou tomar cuidado!"
70004010-91 = "S-sim! Vou tomar cuidado!"
70004010-92 = "[ns] \"Aliás…… como vão as coisas?\""
70004010-93 = "Bem…… tá meio corrido."
70004010-94 = "O Natal está chegando.#nMuita gente comprando bolo e frango."
70004010-95 = "[s] \"Já é época?…… Ah, pode registrar isso.\""
70004010-99 = "Deixa comigo. Uma goma de hortelã, uma geleia de limão."
70004010-100 = "Esta geleia de limão está em promoção,#n……cada uma vem com uma bebida vitamínica de brinde."
70004010-101 = "[s] \"Então fica para você, Sora.\""
70004010-102 = "Hã, para mim?"
70004010-103 = "[s5] \"Você sempre se esforça.\"\n[s6] \"Quem trabalha no mesmo prédio tem que se ajudar.\""
70004010-104 = "……Muito obrigada."
70004010-105 = "……Muito obrigada."
70004010-106 = "(……O Sensei é um adulto suspeito, mas……)"
70004010-107 = "Sensei, queria perguntar uma coisa――"
70004010-112 = "Desculpa, o café com sabor de Monster MAX acabou?"
70004010-113 = "H-hã? Café com sabor de Monster MAX?"
70004010-114 = "V-vou verificar o estoque. Mas……"
70004010-119 = "[ns] \"Priorize o cliente, sem problemas.\""
70004010-120 = "Ah, obrigada! Então, com licença!"
70004010-125 = "(……Mas os clientes não paravam de chegar)"
70004010-127 = "Haa…… finalmente acalmou."
70004010-128 = "Não deu nem para limpar a loja.#nNunca teve tanto cliente."
70004010-129 = "……Acabei nem perguntando por que todos querem ver o Sensei."
70004010-130 = "Vou limpar agora."
70004010-138 = "Todo dia～ trazendo felicidade～♪#nHappy Happy Angel 24～♪"
70004010-145 = "Ué? Isso é……"
70004010-146 = "――um presente?"
70004010-147 = "Será que alguma aluna deixou cair?"
70004010-148 = "Vou colocar um aviso na porta――"
70004010-152 = "……Não, espera.#nE se for um presente para o Sensei?"
70004010-153 = "A maioria das alunas gosta dele.#nSe souberem que alguém está tentando se declarar#n……vai dar uma grande confusão."
70004010-154 = "E se a dona for uma figura importante……#n……pode até gerar conflitos entre escolas!"
70004010-155 = "O-que fazer? Não posso jogar fora,#n……mas caiu num ponto cego da câmera, então é difícil identificar."
70004010-159 = "……Só resta perguntar diretamente."
70004010-160 = "Lembro de todas que vieram.#nVou perguntar uma por uma, sem deixar escapar."
70004010-162 = "Encontrar a dona e proteger a paz de Kivotos!"