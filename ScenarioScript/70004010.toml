[translation]
70004010-1 = "Presente sem dono (1)"
70004010-5 = "……Sensei? Acabei de chegar no Schale."
70004010-6 = "Sim, hoje tem muitas alunas causando problemas. #nVou passar na loja de conveniência para comprar uma bebida e já vou para aí."
70004010-7 = "Ah…… o sensei também quer alguma coisa?"
70004010-11 = "……Fufu, eu imaginei que diria isso."
70004010-12 = "Vou o mais rápido que puder. Estou ansiosa pelo meu turno de hoje."
70004010-16 = "Dois energéticos e um café preto. Fica um total de 420 ienes!"
70004010-17 = "Vou pagar no cartão, por favor."
70004010-21 = "……Não preciso de sacola, obrigada."
70004010-26 = "（……Suspeito）"
70004010-30 = "……Falando nisso, sensei. Já encomendou o bolo de Natal?"
70004010-31 = "Ué, não vai comer bolo? Mentira…… você é do tipo que se contenta só com frango?"
70004010-32 = "Ah, então o Natal também vai ser trabalhando. Isso é, como posso dizer…… #nBom trabalho."
70004010-37 = "De qualquer forma, acabei de te enviar um link pelo Momotalk…… #nÉ uma loja especializada em entrega de bolos, recomendo bastante."
70004010-38 = "Já que é Natal, tem que aproveitar. #nÉ um desperdício não comer um doce gostoso."
70004010-39 = "Um dacquoise, dois pudins, #num bolo de chocolate Baumkuchen……"
70004010-40 = "Ah, desculpe. Pode incluir isso também."
70004010-41 = "Adicionando um leite, então. Fica um total de 780 ienes! #nVai querer sacola?"
70004010-42 = "Sim, por favor."
70004010-47 = "（Não importa como eu olhe para isso……）"
70004010-50 = "Profeeeessor? O que é aquele recibo!"
70004010-51 = "Não tente se fazer de desentendido! Entre os recibos enviados ao Seminar ontem, #nhavia um histórico de compra de um robô de brinquedo!?"
70004010-52 = "No mês passado você misturou o histórico de compra de jogos, não foi……?"
70004010-56 = "Como é? Um presente de Natal para si mesmo……?"
70004010-57 = "Isso é claramente uma despesa pessoal! #nNão é algo que se deva colocar no relatório de contas!"
70004010-58 = "……Ah, esquece. #nEstou indo para aí agora mesmo para conferir os livros contábeis pessoalmente!"
70004010-59 = "E-e-então…… 30 munições de 9mm e #num speedloader, está correto?"
70004010-60 = "Sim, está tudo bem. Desculpe por ter falado alto durante o pagamento."
70004010-61 = "Total de 1810 ienes, certo? Aqui, o valor exato."
70004010-62 = "Ah, muito obrigada. A sacola――"
70004010-68 = "……Ela foi embora."
70004010-72 = "（Definitivamente, é suspeito demais……！）"
70004010-75 = "Hoje, o total de alunas que vieram aqui foi de 10……"
70004010-76 = "Se contar as alunas que não passaram na loja de conveniência, #numas 20 pessoas devem ter ido ao Schale."
70004010-77 = "Se fossem alunas com assuntos pendentes, tudo bem, mas #nvir ao Schale sem motivo nenhum é muito estranho."
70004010-78 = "Dizem que o sensei do Schale é um adulto gentil que ajuda alunas em apuros #ne protege os cidadãos do perigo, mas……"
70004010-79 = "Também ouvi rumores suspeitos de que ele nadou pelado na piscina de todas as escolas, ou que lambeu os pés das alunas……"
70004010-80 = "Por que será que todas querem tanto ver o sensei?"
70004010-81 = "Será que…… ele as seduz com métodos duvidosos……?"
70004010-82 = "Falando nisso, ouvi dizer que no Schale existe um item capaz de controlar as pessoas――"
70004010-83 = "[s] \"Do que você está falando?\""
70004010-84 = "Aaaah!? P-p-p-sensei!?"
70004010-85 = "B-bem-vindo à Angel 24! #n……H-há quanto tempo você está aí?"
70004010-86 = "[s1] \"Olá, Sora. Acabei de chegar.\"\n[s2] \"Está pensando em algo?\""
70004010-87 = "N-não, é que eu estava apenas vendo uma postagem que está popular nas redes sociais……"
70004010-88 = "N-não, é que eu estava apenas vendo uma postagem que está popular nas redes sociais……"
70004010-89 = "[s3] \"Postagens em redes sociais são interessantes, né.\"\n[s4] \"Mas não acredite em tudo o que lê.\""
70004010-90 = "S-sim! Vou tomar cuidado……!"
70004010-91 = "S-sim! Vou tomar cuidado……!"
70004010-92 = "[ns] \"Aliás…… como vão as coisas ultimamente?\""
70004010-93 = "Pois é... estou um pouco ocupada."
70004010-94 = "O Natal está chegando, então tem muitos clientes vindo comprar bolos e frango."
70004010-95 = "[s] \"Já é essa época do ano... Ah, pode registrar minha compra, por favor?\""
70004010-99 = "Pois não. Um chiclete de menta e uma gelatina de limão, certo?"
70004010-100 = "Esta gelatina de limão faz parte da nossa promoção, então você ganha uma bebida vitamínica de brinde para cada unidade."
70004010-101 = "[s] \"Pode ficar para você, Sora.\""
70004010-102 = "Hã, para mim...?"
70004010-103 = "[s5] \"Você sempre se esforça muito, Sora.\"\n[s6] \"Como trabalhamos no mesmo prédio, temos que nos ajudar, não é?\""
70004010-104 = "......Muito obrigada."
70004010-105 = "......Muito obrigada."
70004010-106 = "(...O Sensei [USERNAME] é um adulto suspeito, mas...)"
70004010-107 = "Ei, Sensei. Eu queria perguntar uma coisa..."
70004010-112 = "Com licença. O Yokai MAX sabor café acabou?"
70004010-113 = "A-ah, sim? Yokai MAX sabor café...?"
70004010-114 = "V-vou verificar o estoque rapidinho. Mas..."
70004010-119 = "[ns] \"Pode atender o cliente primeiro, não tem problema.\""
70004010-120 = "A-ah, muito obrigada! Com licença então...!"
70004010-125 = "(...Mas, depois disso, os clientes continuaram chegando sem parar...)"
70004010-127 = "Ufa... finalmente acalmou..."
70004010-128 = "Nem consegui limpar a loja no meio disso tudo. Acho que nunca tive tantos clientes seguidos assim..."
70004010-129 = "...E acabei perdendo a chance de perguntar por que as alunas estão procurando o Sensei."
70004010-130 = "Bom, por enquanto, vou limpar a loja."
70004010-138 = "Todo dia, trazendo felicidade~♪#nHappy Happy Angel 24~♪"
70004010-145 = "Ué? O que é isso..."
70004010-146 = "— Um presente?"
70004010-147 = "Será que alguma aluna que veio ao Schale esqueceu aqui?"
70004010-148 = "Vou colocar um aviso na frente da loja por enquanto..."
70004010-152 = "...Não, espere um pouco. E se isso for um presente para o Sensei...?"
70004010-153 = "A maioria das alunas deve gostar do Sensei. Se descobrirem que alguém tentou sair na frente para se declarar, vai virar uma confusão enorme..."
70004010-154 = "E se a dona for alguém importante de alguma escola... pode acabar virando uma guerra entre escolas...!?"
70004010-155 = "O-o que eu faço...!? Não posso simplesmente jogar fora, mas como caiu num ponto cego da câmera de segurança, vai ser difícil descobrir de quem é..."
70004010-159 = "...Não tenho escolha a não ser perguntar diretamente."
70004010-160 = "Eu lembro do rosto de todos os clientes que vieram hoje. Então, vou perguntar um por um, sem deixar que saibam do presente."
70004010-162 = "Vou encontrar a dona e proteger a paz de Kivotos...!"
