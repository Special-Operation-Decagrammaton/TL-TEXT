[translation]
80000111-1 = "青春全力投球"
80000111-2 = "シャーレ執務室"
80000111-3 = "師匠も知っての通り、今日はバレンタインデーだ！"
80000111-4 = "[s] \"うん、そうだね。\""
80000111-5 = "バレンタインデーは青春イベントの代表と言っても過言じゃあない。"
80000111-6 = "「一年で最も青春らしい日は？」という質問があったとしたら……"
80000111-7 = "「入学式」、「卒業式」、「学園祭」、「花火大会」、「クリスマス」、「新年」と肩を並べる存在――"
80000111-8 = "それが、バレンタインデー。"
80000111-9 = "[s] \"代表って言うわりに候補が多いような……？\""
80000111-10 = "別におかしくないだろ？"
80000111-11 = "それに、アタシたち青春を追い求める者にとっては毎日が青春みたいなものだし。"
80000111-12 = "もし誰かにさっきの質問をされたら、アタシは迷うことなくこう答えるよ。"
80000111-13 = "今日が一番青春らしい日だと！"
80000111-14 = "先生……いや、師匠と過ごす時間はいつだって青春なんだけどさ。"
80000111-15 = "[s1] \"代表の話はどこに行ったの！？！\"\n[s2] \"もちろん、そう言ってもらえるのはすごく嬉しいけどね！？\""
80000111-18 = "まあ、そういうわけで……"
80000111-19 = "一大青春イベントのバレンタインデーを大人しく過ごすなんて、「青春師弟」にあるまじき行いだよ。"
80000111-20 = "それなら、やるべきことは一つじゃないか？"
80000111-21 = "[s] \"やるべきことって……？\""
80000111-22 = "師匠と共に「青春活動」に邁進する「青春経験者」として……"
80000111-23 = "今日を一生忘れられない最高のバレンタインデーにする！"
80000111-24 = "だから決めたんだ。"
80000111-25 = "最高のバレンタインチョコレートを作って、先生にプレゼントすると。"
80000111-26 = "どうだ、師匠？私の計画は！"
80000111-27 = "[s] \"レンゲからチョコレートをもらえるなんて、すごく嬉しいよ。\""
80000111-28 = "へへっ、そうだろう？"
80000111-29 = "今まで師匠と積み重ねてきた数々の青春イベントを活かして……"
80000111-30 = "[ruby=ふわ]不破[/ruby]レンゲの全力投球を楽しみにしててほしい！"
80000111-31 = "[s] \"もちろん、楽しみにし……\""
80000111-32 = "じゃあ先生、また後で会おう！"
80000111-36 = "[ns] \"……言い切る前に行っちゃった。\""
80000111-38 = "（その後、レンゲが来るのをシャーレで待っていたが……）"
80000111-42 = "（一向に音沙汰が無かった）"
80000111-45 = "（レンゲと別れてから3時間後……）"
80000111-50 = "[ns] \"もしもし、レンゲ？\""
80000111-54 = "ごめん、師匠！#nちょっと時間がかかりそうだから、先に電話だけでもと思って。"
80000111-55 = "問題なく進んではいるから、もう少し待っててくれ！"
80000111-56 = "[s] \"うん、分かったよ。あまり無理しないでね。\""
80000111-57 = "大丈夫、そろそろコツが掴めそうなんだ。じゃ！"
80000111-62 = "（電話をもらってから3時間後……）"
80000111-66 = "[ns] \"あ、レンゲ。チョコレート作りは順調？\""
80000111-67 = "その話なんだけど……"
80000111-68 = "ごめん、師匠！もう少し！本当にもう少し！#nすでにほぼ完成してるというか……"
80000111-69 = "大体80%くらい……78%……いや、67……ううん、50%くらいは……！"
80000111-70 = "[s] \"ほぼ完成って言葉はどこに行ったの！？\""
80000111-71 = "だ、大丈夫！#nほら、始めた時点で半分終わったようなもんって言葉があるだろ？"
80000111-72 = "[s] \"50%すら怪しく思えてきたような……\""
80000111-73 = "き、気のせいだから！#nそれにまだ今日は終わってない！"
80000111-74 = "じゃあ！師匠！今度は完成したら連絡する！"
80000111-79 = "（そして、また3時間後……）"
80000111-83 = "[ns] \"もしも……\""
80000111-84 = "ごめん！師匠！本当にもう少しなんだ……！"
80000111-85 = "ついさっき、湯煎って言葉を知ったところだから任せてほしい！"
80000111-86 = "どうやらチョコレートを直火に当てるのはマズかったみたい！"
80000111-87 = "青春って学びの連続なんだな！"
80000111-88 = "[s] \"う、うん……\""
80000111-89 = "それじゃ師匠……今度こそ完成したら連絡する！"
80000111-96 = "（最後に電話がかかってきてから3時間が経過した……）"
80000111-100 = "[ns] \"電話すら来なくなったけど……レンゲ、大丈夫かな。\""
80000111-101 = "（待ってみようかと思ったけど……）"
80000111-105 = "[ns] \"やっぱり、様子を見に行ってみよう。\""
80000111-109 = "百花繚乱・厨房"
80000111-110 = "[ns] \"電気が消えてる……\""
80000111-111 = "（レンゲの姿を探して、いろいろな場所を回っていると……）"
80000111-115 = "ううっ、どうしてもチョコレートの形が……#nこのままじゃ時間が……"
80000111-116 = "[s] \"……レンゲ？\""
80000111-120 = "せ、先生……？#nどうしてここに……？"
80000111-121 = "……電話が来なかったから心配で？"
80000111-122 = "……くっ。"
80000111-123 = "ごめん！先生！それが……！"
80000111-127 = "[ns] \"なかなか思い通りのチョコレートができなかったの？\""
80000111-128 = "ごめん、先生……！"
80000111-129 = "最高のバレンタインデーにするために、最強のバレンタインチョコレートを作りたかったのに……"
80000111-130 = "あんな自信満々に言っておいて、結局こんな時間まで先生を待たせて……"
80000111-131 = "……そりゃあ、ロクに料理ができない私にチョコレートを作れるわけ……ない、よな……"
80000111-132 = "あはは……自分が今すごく恥ずかしいよ……"
80000111-137 = "ごめん……みっともないよな……？"
80000111-138 = "そもそも、アタシなんかがチョコレートを渡そうとしたのが間違いだったん――"
80000111-139 = "[s] \"それは違うよ、レンゲ。\""
80000111-140 = "せ、先生……？"
80000111-141 = "[s3] \"チョコレートをくれるって聞いて……\"\n[s4] \"すごく嬉しかったんだ、レンゲの気持ちが。\""
80000111-144 = "……チョコレート作りに失敗したくらいじゃガッカリしないって？"
80000111-145 = "むしろ……？"
80000111-146 = "[s] \"失敗も青春の1ページだし、また挑戦すればいいだけだから。\""
80000111-148 = "[ns] \"一緒に作ろっか。だって、私はレンゲの師匠でしょう？\""
80000111-149 = "……ありがとう。"
80000111-153 = "先生……いや、師匠……！"
80000111-154 = "失敗ばかりで、ちょっと気が弱くなってたみたいだ！"
80000111-155 = "こんなのアタシらしくないな！"
80000111-156 = "……よし。"
80000111-157 = "……それじゃ、悪いけど師匠。"
80000111-158 = "チョコレート、一緒に作ってくれないか……？"
80000111-159 = "[s] \"うん、もちろんだよ。\""
80000111-165 = "（こうして、チョコレート作りを再開し……）"
80000111-169 = "おぉ……つ、ついに……"
80000111-174 = "先生のおかげで、なんとか日付が回る前に完成したよ……！"
80000111-175 = "[s] \"ふぅ……良かったね、レンゲ。\""
80000111-176 = "……うん。本当にありがとう、師匠。"
80000111-177 = "いつも思うんだ……師匠の教えが無かったらどうなってたんだろうって。"
80000111-178 = "師匠が居てくれて、良かった……本当に。"
80000111-179 = "あ！こうしてる場合じゃない。一緒に作ってもらったから、アタシのチョコレートとは言えないかもしれないけど……"
80000111-180 = "師匠！日付が変わる前に、このチョコレートを……"
80000111-181 = "[s] \"うん、一緒に食べよっか。\""
80000111-186 = "（そうしてレンゲと力を合わせて作ったチョコレートは、とても温かくて美味しかった）"
