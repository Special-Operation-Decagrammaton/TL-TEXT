[translation]
80000111-1 = "Juventude com força total"
80000111-2 = "Escritório do Schale"
80000111-3 = "Como você bem sabe, mestre, hoje é Dia dos Namorados!"
80000111-4 = "[s] \"Sim, é verdade.\""
80000111-5 = "Não é exagero dizer que o Dia dos Namorados é o evento máximo da juventude."
80000111-6 = "Se alguém perguntasse: \"Qual é o dia mais juvenil do ano?\"..."
80000111-7 = "Ele estaria no mesmo patamar que a \"Cerimônia de Entrada\", \"Formatura\", \"Festival Escolar\", \"Festival de Fogos de Artifício\", \"Natal\" e \"Ano Novo\"—"
80000111-8 = "Esse é o Dia dos Namorados."
80000111-9 = "[s] \"Não tem candidatos demais para um evento 'máximo'... ?\""
80000111-10 = "Não tem nada de estranho nisso, tem?"
80000111-11 = "Além disso, para nós que buscamos a juventude, todo dia é como se fosse juventude."
80000111-12 = "Se alguém me fizesse aquela pergunta agora, eu responderia sem hesitar."
80000111-13 = "Que hoje é o dia mais juvenil de todos!"
80000111-14 = "Professor... não, o tempo que passo com você, mestre, é sempre juventude, claro."
80000111-15 = "[s1] \"O que aconteceu com a história de ser o evento máximo?!?\"\n[s2] \"Claro, fico muito feliz que diga isso, mas né?!?\""
80000111-18 = "Bem, sendo assim..."
80000111-19 = "Passar o Dia dos Namorados, um grande evento da juventude, de forma pacata, não é algo que uma \"dupla de mestres da juventude\" faria."
80000111-20 = "Nesse caso, só tem uma coisa a se fazer, não é?"
80000111-21 = "[s] \"Uma coisa a se fazer... ?\""
80000111-22 = "Como uma \"veterana da juventude\" que se dedica às \"atividades juvenis\" junto com o mestre..."
80000111-23 = "Vou fazer de hoje o melhor Dia dos Namorados que jamais esqueceremos!"
80000111-24 = "Por isso eu decidi."
80000111-25 = "Vou fazer o melhor chocolate de Dia dos Namorados e dar de presente para o professor."
80000111-26 = "O que acha, mestre? O que acha do meu plano!"
80000111-27 = "[s] \"Fico muito feliz em receber um chocolate da Renge.\""
80000111-28 = "Hehe, não é?"
80000111-29 = "Aproveitando todos os eventos juvenis que acumulamos até agora..."
80000111-30 = "Pode esperar pela força total da Fuwa Renge!"
80000111-31 = "[s] \"Claro, estou ansioso...\""
80000111-32 = "Então professor, nos vemos mais tarde!"
80000111-36 = "[ns] \"...Ela foi embora antes de eu terminar de falar.\""
80000111-38 = "(Depois disso, fiquei esperando a Renge no Schale, mas...)"
80000111-42 = "(Não houve sinal de vida dela.)"
80000111-45 = "(Três horas depois de me despedir da Renge...)"
80000111-50 = "[ns] \"Alô, Renge?\""
80000111-54 = "Desculpa, mestre!#nVai demorar um pouco mais, então só queria ligar para avisar."
80000111-55 = "Está progredindo sem problemas, então espere só mais um pouco!"
80000111-56 = "[s] \"Entendi. Não se esforce demais, viu.\""
80000111-57 = "Tudo bem, estou quase pegando o jeito. Até!"
80000111-62 = "(Três horas depois da ligação...)"
80000111-66 = "[ns] \"Ah, Renge. Como vai a fabricação do chocolate?\""
80000111-67 = "Sobre isso..."
80000111-68 = "Desculpa, mestre! Só mais um pouco! De verdade, só mais um pouco!#nNa verdade, já está quase pronto..."
80000111-69 = "Mais ou menos 80%... 78%... não, 67... não, uns 50%...!"
80000111-70 = "[s] \"Onde foi parar o 'quase pronto'?!?\""
80000111-71 = "T-tá tudo bem!#nSabe, dizem que quando você começa, metade já está feita, não dizem?"
80000111-72 = "[s] \"Comecei a duvidar até desses 50%...\""
80000111-73 = "É-é impressão sua!#nAlém disso, o dia ainda não acabou!"
80000111-74 = "Então! Mestre! Entro em contato assim que terminar!"
80000111-79 = "(E, três horas depois, novamente...)"
80000111-83 = "[ns] \"Se ao menos...\""
80000111-84 = "Desculpa! Mestre! Falta só um pouquinho mesmo...!"
80000111-85 = "Acabei de descobrir o que é banho-maria, então pode deixar comigo!"
80000111-86 = "Pelo visto, colocar o chocolate direto no fogo não foi uma boa ideia!"
80000111-87 = "A juventude é um aprendizado constante, não é?"
80000111-88 = "[s] \"É, pois é...\""
80000111-89 = "Então, Mestre... assim que eu terminar, eu te aviso!"
80000111-96 = "(Três horas se passaram desde o último telefonema...)"
80000111-100 = "[ns] \"Nem o telefone toca mais... Renge, será que você está bem?\""
80000111-101 = "(Pensei em esperar um pouco mais, mas...)"
80000111-105 = "[ns] \"Acho melhor eu ir lá dar uma olhada.\""
80000111-109 = "Cozinha da Hyakkiyako"
80000111-110 = "[ns] \"As luzes estão apagadas...\""
80000111-111 = "(Enquanto procuro pela Renge em vários lugares...)"
80000111-115 = "Droga, o formato do chocolate não fica bom de jeito nenhum...#nDesse jeito, o tempo vai acabar..."
80000111-116 = "[s] \"...Renge?\""
80000111-120 = "Se-Sensei...?#nPor que você está aqui...?"
80000111-121 = "...Você ficou preocupado porque eu não liguei?"
80000111-122 = "...Droga."
80000111-123 = "Desculpa! Sensei! É que..."
80000111-127 = "[ns] \"Você não estava conseguindo fazer o chocolate como queria?\""
80000111-128 = "Desculpa, Sensei...!"
80000111-129 = "Eu queria fazer o melhor chocolate de Dia dos Namorados para que fosse um dia inesquecível..."
80000111-130 = "Depois de falar com tanta confiança, acabei te fazendo esperar até essa hora..."
80000111-131 = "...É, alguém como eu, que mal sabe cozinhar, não tinha como conseguir fazer chocolate, né..."
80000111-132 = "Ahaha... estou morrendo de vergonha de mim mesma agora..."
80000111-137 = "Desculpa... estou sendo patética, né...?"
80000111-138 = "No fim das contas, foi um erro eu tentar te dar chocolate..."
80000111-139 = "[s] \"Isso não é verdade, Renge.\""
80000111-140 = "Se-Sensei...?"
80000111-141 = "[s3] \"Quando ouvi que você queria me dar chocolate...\"\n[s4] \"Eu fiquei muito feliz com o seu gesto, Renge.\""
80000111-144 = "...Você quer dizer que não ficaria desapontado só porque eu falhei fazendo chocolate?"
80000111-145 = "Na verdade...?"
80000111-146 = "[s] \"Falhas também fazem parte da juventude, e é só tentar de novo.\""
80000111-148 = "[ns] \"Vamos fazer juntos? Afinal, eu sou o seu mestre, não sou?\""
80000111-149 = "...Obrigada."
80000111-153 = "Sensei... não, Mestre...!"
80000111-154 = "Parece que eu estava ficando desanimada por causa de tantos erros!"
80000111-155 = "Isso não é nada parecido comigo!"
80000111-156 = "...Certo."
80000111-157 = "...Então, desculpe o incômodo, Mestre."
80000111-158 = "Poderia fazer o chocolate comigo...?"
80000111-159 = "[s] \"Claro, com certeza.\""
80000111-165 = "(Assim, recomeçamos a fazer o chocolate...)"
80000111-169 = "Uau... fi-finalmente..."
80000111-174 = "Graças a você, Sensei, conseguimos terminar antes da meia-noite...!"
80000111-175 = "[s] \"Ufa... que bom, Renge.\""
80000111-176 = "...É. Muito obrigada, Mestre."
80000111-177 = "Eu sempre penso nisso... o que teria acontecido se eu não tivesse os seus ensinamentos?"
80000111-178 = "É muito bom ter você aqui... de verdade."
80000111-179 = "Ah! Não é hora de ficar parada. Como fizemos juntas, talvez eu não possa dizer que é o meu chocolate, mas..."
80000111-180 = "Mestra! Antes que o dia acabe, este chocolate..."
80000111-181 = "[s] \"Sim, vamos comer juntas.\""
80000111-186 = "(E assim, o chocolate que fiz com a ajuda da Renge estava muito quente e delicioso)"
