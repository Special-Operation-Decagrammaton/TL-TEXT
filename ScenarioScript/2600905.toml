[translation]
2600905-1 = "O convidado indesejado dentro do armário"
2600905-2 = "（Visitando o café de empregadas onde Yuzu trabalha）"
2600905-14 = "V-você realmente veio..."
2600905-15 = "B-bem-vindo de volta, Mestre...!#nE-este é o café \"Maidramatic\"...!"
2600905-16 = "[s1] \"Cheguei, Yuzu.\"\n[s2] \"O trabalho está indo bem?\""
2600905-19 = "S-sim! Ainda tem muitas partes que não consigo fazer direito, mas...#nGraças à ajuda do Sensei, estou conseguindo um pouco...!"
2600905-25 = "Sensei! Você veio me visitar depois de tanto tempo!"
2600905-26 = "Ah, a \"Queen\" tem me ajudado bastante.#nObrigado por me apresentar uma aluna tão boa."
2600905-27 = "[s] \"Queen...?\""
2600905-28 = "Ah, bem... é que temos que usar apelidos aqui no café..."
2600905-29 = "Eu acabei escrevendo o apelido que uso nos jogos,#ne por algum motivo, começaram a me chamar de Queen..."
2600905-30 = "Hahaha, quanto mais única for uma empregada de café, melhor!"
2600905-31 = "...No começo, eu estava preocupado porque ela parecia muito nervosa,#nmas agora ela não comete mais erros e é popular entre os clientes, então estou tranquilo."
2600905-32 = "Além disso, quando o programa de computador do café quebrou outro dia,#na Queen resolveu o bug e consertou tudo."
2600905-33 = "Naquela hora, deu vontade de chamá-la de \"Queen\" de verdade.#nHahaha!"
2600905-34 = "Auu..."
2600905-35 = "[s] \"Fico feliz que tenha se adaptado ao trabalho de meio período.\""
2600905-36 = "S-sim...!"
2600905-37 = "E-então, Sensei... não, Mestre.#nVou guiá-lo até a sua mesa...!"
2600905-39 = "（Porém, ao contrário das palavras do gerente, Yuzu cometeu vários erros...）"
2600905-42 = "O-o seu omelete especial do Maidramatic está servido...!"
2600905-43 = "Hm? Eu pedi um refrigerante de melão, não foi...?"
2600905-44 = "D-desculpe...! Vou trazer agora mesmo...!"
2600905-46 = "E-então, agora... vou lançar o feitiço mágico para deixar a comida mais gostosa..."
2600905-47 = "Fique gostoso..."
2600905-48 = "...Heal!"
2600905-49 = "Isso não parece um feitiço para deixar a comida gostosa...?"
2600905-60 = "Kyaa!? D-desculpe...!"
2600905-61 = "Ah... caiu suco na sua camisa..."
2600905-62 = "V-vou limpar agora mesmo...! Sinto muito mesmo...!"
2600905-68 = "...Estranho, a Queen nunca comete tantos erros assim."
2600905-69 = "Queen, pode vir aqui um instante?"
2600905-70 = "Uuu... desculpe...#nAcabei causando problemas para o cliente..."
2600905-71 = "Não precisa se preocupar tanto com isso."
2600905-72 = "Mas o que houve hoje?#nVocê parece mais nervosa que o normal..."
2600905-73 = "I-isso é... não, não é nada. Estou bem."
2600905-80 = "Se você diz..."
2600905-81 = "...Já está na hora do seu intervalo,#nvá até a sala de descanso e descanse um pouco."
2600905-82 = "Sim..."
2600905-87 = "[ns] \"Ela não é assim normalmente?\""
2600905-88 = "Sim, desde o primeiro dia ela tem se esforçado sem cometer erros."
2600905-89 = "Espero que ela recupere o ritmo à tarde..."
2600905-94 = "（...Porém, Yuzu não voltou mesmo após o fim do intervalo）"
2600905-95 = "[ns] Ir procurar a Yuzu."
2600905-97 = "（Procurei por todo o café, mas Yuzu não estava em lugar nenhum）"
2600905-98 = "（Então, ao sair pelo portão dos fundos para o beco...）"
2600905-102 = "Beco do café \"Maidramatic\""
2600905-104 = "P-por favor, saia daqui logo..."
2600905-108 = "Uuu, eu preciso voltar para o café logo...#nMinha saia está pesada..."
2600905-109 = "[ns] \"Yuzu...?\""
2600905-112 = "[wa:1300]― Bem, [wa:1300]isto é……"
2600905-114 = "[wa:700]― Parece que, enquanto eu dormia, [wa:1300]acabei [wa:500]entrando aqui……"
2600905-117 = "[ns] \"Mas por que dentro do armário……?\""
2600905-118 = "[wa:1900]― É que…… [wa:1700]na sala de descanso [wa:1400]tem outras pessoas [wa:900]também……"
2600905-120 = "[wa:1000]― Quando eu [wa:700]me sento, [wa:1100]começam a [wa:600]puxar conversa……."
2600905-123 = "[wa:1500]― \"Onde você comprou essa fita?\" [wa:2300]ou algo assim,"
2600905-125 = "[wa:500]― \"O que você faz nos seus dias de folga?\" [wa:3000]ou coisas do tipo……"
2600905-128 = "[wa:1000]― Como me fazem muitas perguntas, [wa:2400]eu acabei fugindo sem pensar……"
2600905-131 = "[wa:1000]― E o lugar que eu encontrei [wa:1300]foi este……."
2600905-133 = "[wa:1500]― Quem diria que…… [wa:1300]era um [wa:700]descanso para gatos [wa:1200]."
2600905-136 = "[wa:700]― Hya!? [wa:400]Es, [wa:500]espere [wa:500]um pouco!"
2600905-139 = "[wa:500]― Eu já saio! [wa:1600]E, [wa:200]estou [wa:700]saindo agora…… [wa:2500]faz cócegas!"
2600905-142 = "(Depois de levar os gatos, ajudei Yuzu a sair do armário)"
2600905-144 = "O-obrigada por me ajudar……."
2600905-145 = "Mas, por que o Sensei [USERNAME] está aqui……?"
2600905-146 = "[s3] \"Fiquei preocupado porque a Yuzu não voltava.\"\n[s4] \"Você parecia estar se sentindo mal, então achei que tivesse acontecido algo…….\""
2600905-149 = "Ah, não, eu estou bem de saúde!"
2600905-150 = "Como pode ver, não há problema algum!"
2600905-151 = "……Durante a manhã…… é que……."
2600905-152 = "Provavelmente, foi porque o Sensei estava lá……."
2600905-153 = "[s] \"Porque eu estava lá?\""
2600905-154 = "……Sim."
2600905-155 = "Graças ao treinamento especial, consegui ganhar um pouco de coragem para aparecer na frente dos clientes, mas só de pensar que o Sensei estava me observando, eu fiquei nervosa……."
2600905-156 = "Pensei que precisava me esforçar mais do que o normal e acabei ficando sobrecarregada…… no fim, cometi muitos erros."
2600905-157 = "Não sirvo para nada…… a única forma de retribuir ao Sensei, que sempre me ajuda, seria mostrando o quanto eu cresci……."
2600905-158 = "[ns] \"Não precisa se preocupar tanto com isso.\""
2600905-160 = "[ns5] \"Hoje eu não sou o Sensei…….\"\n[ns6] \"Estou aqui como um cliente!\""
2600905-169 = "……Fufu, é verdade. Talvez eu estivesse pensando demais nisso."
2600905-170 = "Afinal, meu papel nesta loja não é de estudante, mas de empregada."
2600905-171 = "Então, como o Sensei disse――"
2600905-172 = "Neste café, não serei Hanaoka Yuzu, mas sim a empregada \"Queen\" atendendo os clientes……!"
2600905-173 = "[s] \"Isso, esse é o espírito.\""
2600905-174 = "Fufu, obrigada. Mas sinto muito pelos clientes que vieram pela manhã……."
2600905-175 = "Por causa dos meus erros, eles devem ter ficado desapontados……."
2600905-176 = "[s7] \"Não se preocupe tanto.\"\n[s8] \"Se algo acontecer, eu peço desculpas junto com você.\""
2600905-179 = "Uuu…… sim……."
2600905-186 = "Ah, Queen! Que bom, estávamos te procurando! Onde você se meteu?"
2600905-187 = "De-desculpe……."
2600905-188 = "Não peça desculpas. Já que você voltou, está tudo bem."
2600905-189 = "Agora, prepare-se logo. Os clientes que viram a Queen pela manhã estão esperando ansiosamente."
2600905-190 = "Eh……? Se-será que houve reclamações pelos erros da manhã……?"
2600905-191 = "Não, não, nada disso."
2600905-192 = "Todos ficaram felizes ao ver a Queen. Dizem: \"É uma empregada desastrada clássica, algo raro hoje em dia!\". Assim que o turno da tarde começou, começaram a pedir por você."
2600905-193 = "Vamos, Queen, prepare-se e vá atender os clientes!"
2600905-194 = "Eh……? Ma-mas eu cometi erros, por que……?"
2600905-195 = "[s] \"Que bom que eles gostaram, Queen.\""
2600905-196 = "Uuuu…… não aguento mais!"
2600905-198 = "(Depois disso, Yuzu cometeu vários erros por causa da pressão, mas os clientes saíram todos muito satisfeitos)"
2600905-199 = "(Dizem que, naquele dia, Yuzu bateu o recorde de pedidos de atendimento……)"
