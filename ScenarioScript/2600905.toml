[translation]
2600905-1 = "ロッカーの中の招かれざる客"
2600905-2 = "（ユズがバイトをしているメイドカフェに訪れた）"
2600905-14 = "ほ、本当にいらっしゃるなんて……。"
2600905-15 = "お、おかえりなさい、ご主人様……！#nか、カフェ「メイドラマチック」です……！"
2600905-16 = "[s1] \"ただいま、ユズ。\"\n[s2] \"仕事は順調？\""
2600905-19 = "は、はい！まだうまくできない部分も多いのですが……#n先生が手伝って下さったおかげで少しは……！"
2600905-25 = "先生！久々に来てくださったのですね！"
2600905-26 = "ああ、「クイーン」にはいろいろ助けてもらってます。#n良い生徒を紹介してくださってありがとうございました。"
2600905-27 = "[s] \"クイーン……？\""
2600905-28 = "あ、ええと……お店ではニックネームを使わなければいけなくて……。"
2600905-29 = "つい、ゲームで使っているニックネームを書いたら、#nなぜかクイーンと呼ばれるようになってしまったんです……。"
2600905-30 = "ははは、メイドカフェのメイドは個性的なほどいいですからね！"
2600905-31 = "……最初はかなり緊張していたようで心配だったのですが、#n今ではミスもなくなりましたし、お客様からも人気で安心しました。"
2600905-32 = "それに、この前カフェの電算プログラムが故障したときは、#nクイーンがバグを解決し、修理してくれたのですよ。"
2600905-33 = "あの時は本当の意味で「クイーン」と呼びたくなりましたね。#nはははっ！"
2600905-34 = "あうぅ……。"
2600905-35 = "[s] \"バイト先に馴染めたみたいでよかった。\""
2600905-36 = "は、はい……！"
2600905-37 = "で、では先生……いえ、ご主人様。#nお席へご案内いたします……！"
2600905-39 = "（しかし店長の言葉とは裏腹に、ユズはミスを繰り返した……）"
2600905-42 = "ご、ご注文のメイドラマチック特製オムライスです……！"
2600905-43 = "む？ボクが注文したのはメロンソーダでござるが……？"
2600905-44 = "ご、ごめんなさい……！すぐにお持ちします……！"
2600905-46 = "で、ではこれから……料理が美味しくなる魔法の呪文をかけます……。"
2600905-47 = "おいしくなーれ……"
2600905-48 = "……ヒール！"
2600905-49 = "美味しくなる呪文とは違うような……？"
2600905-60 = "ひゃあっ！？す、すみません……！"
2600905-61 = "あっ……シャツにジュースが……。"
2600905-62 = "い、今すぐ拭きます……！本当に申し訳ございません……！"
2600905-68 = "……おかしいな、クイーンがこんなにミスをするなんて。"
2600905-69 = "クイーン、ちょっとこっちに来てもらえる？"
2600905-70 = "うぅ……すみません……。#nお客さんにご迷惑をかけてしまって……。"
2600905-71 = "あまり気にしすぎないでいいよ。"
2600905-72 = "それより今日はどうしたの？#nいつもより緊張しているように見えるけど……。"
2600905-73 = "そ、それは……いえ、何でもありません。大丈夫です。"
2600905-80 = "なら良いけれど……。"
2600905-81 = "……ちょうど休憩時間だし、#n休憩室へ行って少し休んできて。"
2600905-82 = "はい……。"
2600905-87 = "[ns] \"普段はこうではないんですか？\""
2600905-88 = "ええ、初日以降はミスもなく頑張ってくれていますから。"
2600905-89 = "午後には調子を戻してくれているといいのですが……。"
2600905-94 = "（……しかしユズは休憩時間が終わっても帰ってこなかった）"
2600905-95 = "[ns] ユズを探しに行く。"
2600905-97 = "（店内をくまなく探してみたが、ユズはどこにもいなかった）"
2600905-98 = "（そこで、裏門から路地に出てみると……）"
2600905-102 = "カフェ「メイドラマチック」路地裏"
2600905-104 = "そ、そろそろどいてください……。"
2600905-108 = "うう、早くお店に戻らないといけないのに……#nスカートが重い……。"
2600905-109 = "[ns] \"ユズ……？\""
2600905-112 = "[wa:1300]― えっと、[wa:1300]これは……"
2600905-114 = "[wa:700]― 寝ている間に、[wa:1300]入って[wa:500]きちゃったみたいで……"
2600905-117 = "[ns] \"でも、どうしてロッカーの中に……？\""
2600905-118 = "[wa:1900]― その……[wa:1700]休憩室には[wa:1400]他の方も[wa:900]いますから……"
2600905-120 = "[wa:1000]― 座って[wa:700]いると、[wa:1100]話し[wa:600]かけられちゃって……。"
2600905-123 = "[wa:1500]― 「リボンはどこで買ったの？」[wa:2300]とか、"
2600905-125 = "[wa:500]― 「お休みの日には何してるの？」[wa:3000]とか……"
2600905-128 = "[wa:1000]― いろいろ質問されるので、[wa:2400]思わず逃げてしまって……"
2600905-131 = "[wa:1000]― 見つけたのが、[wa:1300]ここだったんです……。"
2600905-133 = "[wa:1500]― まさか……[wa:1300]猫の[wa:700]休憩所だった[wa:1200]なんて。"
2600905-136 = "[wa:700]― ひゃっ！？[wa:400]ちょ、[wa:500]ちょっと[wa:500]待ってください！"
2600905-139 = "[wa:500]― 出ます！[wa:1600]い、[wa:200]今[wa:700]出ますから……[wa:2500]くすぐったい！"
2600905-142 = "（猫を運んだ後、ユズをロッカーから出してあげた）"
2600905-144 = "た、助けてくださってありがとうございます……。"
2600905-145 = "それより、[USERNAME]先生はどうして……？"
2600905-146 = "[s3] \"ユズが帰ってこなくて心配したんだ。\"\n[s4] \"体調が悪そうだったから、何かあったのかと……。\""
2600905-149 = "あ、いえ、体調は大丈夫です！"
2600905-150 = "この通り、何の問題もありません！"
2600905-151 = "……午前中は……その……。"
2600905-152 = "おそらく、先生がいらっしゃったから……。"
2600905-153 = "[s] \"私がいたから？\""
2600905-154 = "……はい。"
2600905-155 = "特訓のお陰でお客さんの前でも少しは勇気が#n出せるようになったのですが、それを先生に#n見られていると思うと緊張してしまって……。"
2600905-156 = "普段より頑張らないとって思ったら、頭がいっぱいになって……#n結局、たくさんミスをしてしまいました。"
2600905-157 = "ダメですね……いつも手伝ってくださる先生に恩返しする方法は、#n自分の成長した姿を見せることだけなのに……。"
2600905-158 = "[ns] \"そんなに気にしなくても大丈夫だよ。\""
2600905-160 = "[ns5] \"今日の私は先生じゃなくて……。\"\n[ns6] \"一人のご主人様として来ているのだから！\""
2600905-169 = "……ふふっ、そうですね。#n少し難しく考え過ぎていたのかもしれません。"
2600905-170 = "このお店でのわたしの役割は、生徒ではなくメイドというのに。"
2600905-171 = "では、先生の仰る通り――"
2600905-172 = "このカフェでは[ruby=はなおか]花岡[/ruby]ユズではなく、#nメイド「クイーン」として接客させていただきます……！"
2600905-173 = "[s] \"うん、その調子。\""
2600905-174 = "ふふっ、ありがとうございます。#nですが午前中にいらっしゃったお客さんには申し訳なかったですね……。"
2600905-175 = "ミスのせいで、きっとがっかりしてしまったでしょうし……。"
2600905-176 = "[s7] \"気にしすぎないで。\"\n[s8] \"万が一の時は、私も一緒に謝るから。\""
2600905-179 = "うう……はい……。"
2600905-186 = "ああクイーン！良かった、探してたんだよ！#n一体どこに行ってたの？"
2600905-187 = "ご、ごめんなさい……。"
2600905-188 = "そう謝らないで。#n帰って来てくれたから大丈夫。"
2600905-189 = "それより、早く準備して。午前中のクイーンを#n見たお客様が、首を長くして待ってるから。"
2600905-190 = "え……？ま、まさか午前のミスでクレームが……？"
2600905-191 = "いやいや、違うよ。"
2600905-192 = "みんなクイーンの姿を見て喜んでるんだ。#n「今どき珍しい正統派おっちょこちょいメイドだ！」って。#n午後の営業が始まった途端、一気に指名が入ってきたんだよ。"
2600905-193 = "さあクイーン、早く準備してお客様のところに行ってきて！"
2600905-194 = "えぇ……？み、ミスをしたのにどうして……？"
2600905-195 = "[s] \"喜んでもらえてよかったね、クイーン。\""
2600905-196 = "ううう……もう無理です！"
2600905-198 = "（その後、ユズはプレッシャーでミスを連発したが、#n客はみんな大満足して帰っていった）"
2600905-199 = "（その日のユズの指名回数は、新記録を更新したという……）"
