[translation]
10039150-1 = "後日談その7;騒がしい展覧会"
10039150-2 = "（展覧会が開かれているアートギャラリー会場に向かった）"
10039150-6 = "（謝肉祭開催期間中とは思えないほど閑散としていた）"
10039150-9 = "（しかし、飾られている作品の数はとても多かった）"
10039150-13 = "[ns] \"あ……。\""
10039150-16 = "[ns] \"……ナギサ？\""
10039150-21 = "先生……？"
10039150-28 = "おはようございます、先生。"
10039150-29 = "こちらには、どのようなご用件で……。"
10039150-30 = "[s] \"展覧会があるって聞いたから、気になって。\""
10039150-31 = "ふふ、そうでしたか。#nようこそいらっしゃいました。"
10039150-32 = "実は私が、この展覧会の主催者なんです。"
10039150-33 = "[s] \"ナギサは絵画が好きなんだね。\""
10039150-34 = "ええ、ここの学芸員をしております。#nせっかくですから、展示について説明してもよろしいでしょうか？"
10039150-37 = "（ナギサの説明は、とても分かりやすかった）"
10039150-40 = "――など、ティーパーティーが保有する作品が中心ですが、#n実は私が描いた絵も展示しているのですよ。"
10039150-41 = "[s] \"すごいね！？\""
10039150-42 = "そこまで褒められるほどの腕前ではありませんが……。"
10039150-47 = "……見に来てくださったワイルドハントの方からは、#nそれなりに好評でした。"
10039150-48 = "あそこの学院は芸術の都とも呼ばれております。"
10039150-49 = "そのような場所で学んでいる方からも好評で、喜ばしい限りです。#n作品のレベルも展示の動線も、一定の水準を超えられたようで安心しました。"
10039150-53 = "……。"
10039150-54 = "あ……。"
10039150-55 = "ごめんなさい……。"
10039150-56 = "先生には、このような回りくどい言い方をしたくなかったのですが……。"
10039150-57 = "[s1] \"大丈夫だよ。\"\n[s2] \"それだけこのギャラリーが好きなんだよね。\""
10039150-60 = "うぅ……。"
10039150-61 = "……は、はい。"
10039150-62 = "自分の好きな物事が、専門としている方に褒められる経験は貴重で……。"
10039150-63 = "素直に、嬉しかったのです。"
10039150-64 = "私自身が認められたようで……。"
10039150-65 = "[s] \"……うん。\""
10039150-66 = "普段は、こうして本音を打ち明ける機会などないのですが……。"
10039150-67 = "やはり先生の前では、自然と自分をさらけ出せるような気がしています。"
10039150-71 = "……。"
10039150-72 = "せっかくお越しいただいたわけですし、#nもう少しお話に付き合ってもらってもよろしいでしょうか？"
10039150-73 = "[s3] \"うん、私でよければ。\"\n[s4] \"ナギサと過ごす時間は楽しいからね。\""
10039150-76 = "……ふふっ、ありがとうございます。"
10039150-81 = "実は、この展覧会……#n謝肉祭の計画当初は存在しなかったのです。"
10039150-82 = "ティーパーティーの皆さんと議論するなかで、様々な策を考えておりました。"
10039150-83 = "利益の追求や政治的な影響をどのようにコントロールしていこうか、と。"
10039150-84 = "しかし、ふと気づいたのです。"
10039150-85 = "……一人の生徒として、純粋に謝肉祭を楽しみたい自分がいることに。"
10039150-86 = "……。"
10039150-87 = "そうして、展覧会の開催申し込みをしました。"
10039150-88 = "[s] \"そんな経緯があったんだね。\""
10039150-89 = "ええ。"
10039150-93 = "私が絵画を見て味わった感動を、皆さんと共有したかったのですが……。"
10039150-94 = "思った以上に来場される方が少なく……。"
10039150-95 = "[s] （それは……）"
10039150-97 = "[ns] \"こ、これからたくさん来てくれるよ！\""
10039150-98 = "でしたら良いのですが……。"
10039150-99 = "……先生が来てくださっただけでも、展覧会を開いた甲斐がありました。"
10039150-100 = "[s] \"頑張ったね、ナギサ。\""
10039150-104 = "[ns5] \"いつだって、私はナギサを応援してるよ。\"\n[ns6] \"一人の生徒として、ね。\""
10039150-109 = "先生……。"
10039150-114 = "……ありがとう、ございます。"
10039150-115 = "そのお言葉、大切にいたします。"
10039150-116 = "[s] \"……あと、ナギサを応援してるのは私だけじゃないよ。\""
10039150-120 = "それは、どういう……。"
10039150-126 = "あははっ！#nなに、このロールケーキの絵！"
10039150-127 = "如何にも、ナギサらしいね。"
10039150-131 = "この声は……。"
10039150-137 = "やっほ～ナギちゃん！#nセイアちゃんも連れて来ちゃった☆"
10039150-138 = "ああ、ここは落ち着くね。#nナギサにとっては、不本意だろうが……。"
10039150-140 = "ミカさん、セイアさん……。"
10039150-142 = "[ns] \"元気そうだね、二人とも。\""
10039150-146 = "せ、先生？"
10039150-147 = "やあ、先生。"
10039150-148 = "[ruby=カーニバル]謝肉祭[/ruby]を見にくるとは聞いていたが、#nまさかここで会うとは。"
10039150-149 = "え、そうなの……？#n私、聞いてないけど！？"
10039150-151 = "お二人とも、わざわざ来てくださったのですね。"
10039150-153 = "ああ、ミカが提案してくれんだ。#nどうせつまらなくて人がいないだろうから行ってあげよう、と言われてね。"
10039150-154 = "そ、そこまで言ってないよ！？"
10039150-156 = "なるほど……ミカさんはそう思っていたのですね？"
10039150-157 = "[s] \"大切な友達なんだね。\""
10039150-161 = "……。"
10039150-162 = "……あはは、感動した？#nハンカチ貸してあげよっか？"
10039150-163 = "……。"
10039150-164 = "…………。"
10039150-170 = "……お二人とも、今日は来ていただき、ありがとうございました。"
10039150-175 = "えっ？"
10039150-176 = "ん……？"
10039150-178 = "今日くらいは、素直になってみようと思いまして……。"
10039150-179 = "先生に作品の説明をしている途中だったのですが、#nよろしければ一緒にどうでしょう？"
10039150-185 = "うんっ！#nナギちゃんの説明、楽しみだね☆"
10039150-186 = "今日は特別な日になりそうだ。"
10039150-192 = "[ns] \"よろしくね、ナギサ。\""
10039150-193 = "こほん……。"
10039150-197 = "それでは皆さん、こちらの作品をご覧ください。"
10039150-199 = "（ナギサの説明が終わる頃には、少しずつ人が集まり始めた）"
10039150-200 = "（展覧会は、無事に成功を収める）"
10039150-204 = "（……ミカとセイアは途中から眠気と戦っていたが、ナギサは最後まで楽しそうに説明を続けた）"
