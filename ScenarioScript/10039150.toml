[translation]
10039150-1 = "Epílogo 7: Uma exposição barulhenta"
10039150-2 = "（Fui até a galeria de arte onde a exposição está sendo realizada）"
10039150-6 = "（Estava tão vazio que nem parecia que o Carnaval estava acontecendo）"
10039150-9 = "（No entanto, havia uma quantidade enorme de obras expostas）"
10039150-13 = "[ns] \"Ah...\""
10039150-16 = "[ns] \"...Nagisa?\""
10039150-21 = "Sensei...?"
10039150-28 = "Bom dia, Sensei."
10039150-29 = "O que o traz aqui...?"
10039150-30 = "[s] \"Ouvi dizer que haveria uma exposição, então fiquei curioso.\""
10039150-31 = "Fufu, entendo. #nSeja muito bem-vindo."
10039150-32 = "Na verdade, eu sou a organizadora desta exposição."
10039150-33 = "[s] \"Você gosta de pinturas, Nagisa?\""
10039150-34 = "Sim, sou a curadora deste local. #nJá que está aqui, gostaria que eu lhe explicasse sobre a exposição?"
10039150-37 = "（A explicação da Nagisa foi muito fácil de entender）"
10039150-40 = "— E assim por diante. Embora o foco sejam as obras mantidas pelo Chá das Cinco, #nna verdade, também estou exibindo pinturas que eu mesma fiz."
10039150-41 = "[s] \"Sério!?\""
10039150-42 = "Não é um talento digno de tantos elogios, mas..."
10039150-47 = "...o pessoal de Wildhunt que veio visitar, #nachou bastante interessante."
10039150-48 = "Aquela academia também é chamada de capital da arte."
10039150-49 = "Fico muito feliz que pessoas que estudam em um lugar desses tenham gostado. #nFico aliviada por ter conseguido manter um certo nível tanto na qualidade das obras quanto no fluxo da exposição."
10039150-53 = "..."
10039150-54 = "Ah..."
10039150-55 = "Desculpe..."
10039150-56 = "Eu não queria usar um tom tão indireto com você, Sensei..."
10039150-57 = "[s1] \"Está tudo bem.\"\n[s2] \"É porque você gosta muito desta galeria, não é?\""
10039150-60 = "Uuu..."
10039150-61 = "...S-sim."
10039150-62 = "É uma experiência rara ter algo que eu gosto elogiado por alguém que é especialista no assunto..."
10039150-63 = "Sinceramente, fiquei feliz."
10039150-64 = "Sinto como se eu mesma tivesse sido reconhecida..."
10039150-65 = "[s] \"...Entendo.\""
10039150-66 = "Normalmente, não tenho oportunidades de revelar meus sentimentos assim..."
10039150-67 = "Mas, na sua frente, Sensei, sinto que consigo me abrir naturalmente."
10039150-71 = "..."
10039150-72 = "Já que você se deu ao trabalho de vir, #npoderia me fazer companhia por mais um tempo?"
10039150-73 = "[s3] \"Claro, se eu puder ajudar.\"\n[s4] \"Passar um tempo com você é divertido, Nagisa.\""
10039150-76 = "...Fufu, obrigada."
10039150-81 = "Na verdade, esta exposição... #nNão existia quando o plano do Carnaval foi criado inicialmente."
10039150-82 = "Enquanto discutia com o pessoal do Chá das Cinco, pensamos em várias estratégias."
10039150-83 = "Como controlar a busca por lucros e as influências políticas, e coisas do tipo."
10039150-84 = "No entanto, de repente, percebi algo."
10039150-85 = "...Que, como aluna, havia uma parte de mim que queria apenas aproveitar o Carnaval puramente."
10039150-86 = "..."
10039150-87 = "Foi assim que fiz a inscrição para realizar a exposição."
10039150-88 = "[s] \"Então foi por isso.\""
10039150-89 = "Sim."
10039150-93 = "Eu queria compartilhar com todos a emoção que senti ao ver as pinturas, mas..."
10039150-94 = "Houve menos visitantes do que eu esperava..."
10039150-95 = "[s] （Isso é...）"
10039150-97 = "[ns] \"E-eles vão vir em grande número a partir de agora!\""
10039150-98 = "Se ao menos fosse assim..."
10039150-99 = "……Só de você ter vindo, Sensei, já valeu a pena ter aberto esta exposição."
10039150-100 = "[s] \"Você se esforçou muito, Nagisa.\""
10039150-104 = "[ns5] \"Eu sempre estarei torcendo por você, Nagisa.\"\n[ns6] \"Como uma aluna, é claro.\""
10039150-109 = "Sensei……."
10039150-114 = "……Muito, muito obrigada."
10039150-115 = "Guardarei essas palavras com muito carinho."
10039150-116 = "[s] \"……Além disso, não sou só eu quem está torcendo por você, Nagisa.\""
10039150-120 = "O que quer dizer com isso……?"
10039150-126 = "Ahaha!#nO que é esse desenho de rocambole!"
10039150-127 = "É a sua cara, Nagisa."
10039150-131 = "Essa voz……."
10039150-137 = "Iupii, Nagi-chan!#nTrouxe a Seia-chan comigo também☆"
10039150-138 = "Ah, este lugar é bem tranquilo.#nEmbora, para a Nagisa, isso possa não ter sido a intenção……."
10039150-140 = "Mika-san, Seia-san……."
10039150-142 = "[ns] \"Parecem estar bem, vocês duas.\""
10039150-146 = "Se-Sensei?"
10039150-147 = "Olá, Sensei."
10039150-148 = "Ouvi dizer que você viria ver o Carnaval, mas#nnão esperava te encontrar aqui."
10039150-149 = "Ué, é mesmo……?#nEu não estava sabendo de nada!?"
10039150-151 = "Vocês duas, obrigada por terem se dado ao trabalho de vir."
10039150-153 = "Ah, foi a Mika quem sugeriu.#nEla disse: 'Como deve estar chato e vazio, vamos lá fazer companhia'."
10039150-154 = "E-eu não disse exatamente isso!?"
10039150-156 = "Entendo…… Então era isso que a Mika-san pensava?"
10039150-157 = "[s] \"Vocês são amigas muito importantes, não são?\""
10039150-161 = "……."
10039150-162 = "……Ahaha, ficou emocionada?#nQuer que eu te empreste um lenço?"
10039150-163 = "……."
10039150-164 = "…………."
10039150-170 = "……Obrigada a ambas por terem vindo hoje."
10039150-175 = "Hã?"
10039150-176 = "Hm……?"
10039150-178 = "Pensei que, pelo menos hoje, eu deveria ser sincera……."
10039150-179 = "Eu estava no meio da explicação das obras para o Sensei,#nse não se importarem, por que não se juntam a nós?"
10039150-185 = "Claro!#nEstou ansiosa para ouvir a explicação da Nagi-chan☆"
10039150-186 = "Este dia promete ser especial."
10039150-192 = "[ns] \"Conto com vocês, Nagisa.\""
10039150-193 = "Ehem……."
10039150-197 = "Então, por favor, observem esta obra."
10039150-199 = "(Quando a explicação de Nagisa terminou, as pessoas começaram a se reunir aos poucos)"
10039150-200 = "(A exposição foi um sucesso)"
10039150-204 = "(……Mika e Seia lutaram contra o sono no meio do caminho, mas Nagisa continuou explicando tudo com entusiasmo até o fim)"
