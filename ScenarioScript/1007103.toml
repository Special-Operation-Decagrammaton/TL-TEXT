[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1007103-1 = "SRT, Iniciando Treinamento" 
1007103-3 = "Ao contrário das operações em terra, os incidentes marítimos possuem diversas restrições." 
1007103-4 = "Por exemplo, a bordo de um navio, os corredores são estreitos e há muitos pontos cegos, exigindo alerta constante contra ataques surpresa." 
1007103-5 = "Além disso, o balanço do navio torna muito fácil perder o equilíbrio.\nAté mesmo mirar corretamente se torna um desafio." 
1007103-6 = "A única forma de contornar esses problemas é através de treinamento constante, mas……" 
1007103-7 = "Infelizmente, como o período de treinamento do Esquadrão RABBIT foi curto, a nossa proficiência em operações navais é insuficiente." 
1007103-8 = "Já que estamos em uma vila de pescadores, eu estava pensando em um treinamento simulando um ambiente naval……" 
1007103-9 = "E, por muita gentileza, conseguiram nos emprestar um barco." 
1007103-10 = "[s] \"Que bom.\"" 
1007103-12 = "[ns1] \"Sendo assim, no que eu posso ajudar?\"\n[ns2] \"Acho que pilotar o barco vai ser um pouco difícil para mim……\"" 
1007103-15 = "Não se preocupe. Pode deixar a pilotagem do barco comigo." 
1007103-16 = "Gostaria de pedir que você faça o papel de refém, Sensei……" 
1007103-20 = "……Bem, acho que será mais rápido explicar no local do que aqui." 
1007103-21 = "Explicarei os detalhes quando chegarmos ao local alvo." 
1007103-22 = "[s] Subo a bordo." 
1007103-28 = "……Hmm, com licença. Vou apertar um pouco mais o cinto do seu colete salva-vidas.\nPronto. Com isso, não haverá problemas mesmo se cair na água. Vamos partir." 
1007103-33 = "（Depois de um tempo, quando a terra já não podia mais ser vista……）" 
1007103-37 = "……Acho que aqui está bom." 
1007103-38 = "Com essa distância da terra firme, é difícil se aproximar a nado, e o balanço causado pelas ondas cria uma situação ideal e bem próxima da realidade." 
1007103-39 = "O treinamento de hoje é sobre o resgate de um refém mantido cativo a bordo de um navio." 
1007103-40 = "Como você é o refém, Sensei, por favor, aguarde na cabine em estado de restrição." 
1007103-41 = "……Certo, vou te amarrar agora." 
1007103-47 = "[ns] \"N-Não está muito apertado?\"" 
1007103-48 = "Naturalmente. Se você puder se mexer, não fará sentido algum." 
1007103-49 = "O treinamento deve sempre simular uma situação real.\nA postura pode ser um pouco desconfortável, mas peço que suporte." 
1007103-50 = "Bom, agora que a restrição está concluída, vou me preparar para a invasão a partir do convés……" 
1007103-54 = "……Ah." 
1007103-55 = "[s] \"……O que foi?\"" 
1007103-56 = "Eu te pedi para fazer o papel de refém, mas acabei me esquecendo da força inimiga virtual……" 
1007103-57 = "Fiquei tão empolgada com a possibilidade de treinar em um navio que……" 
1007103-58 = "……Sem inimigos virtuais, não há como ser um treinamento de operação de resgate." 
1007103-59 = "[s3] \"Não tem jeito então.\"\n[s4] \"O treinamento de hoje será……\"" 
1007103-60 = "……Tem razão. Vamos deixar a operação de resgate de reféns para outra oportunidade e mudar para um treinamento de fuga e extração, escoltando um prisioneiro de volta." 
1007103-61 = "……Tem razão. Vamos deixar a operação de resgate de reféns para outra oportunidade e mudar para um treinamento de fuga e extração, escoltando um prisioneiro de volta." 
1007103-65 = "[ns5] \"Ahn…… Miyako-san?\"\n[ns6] \"Você não vai me desamarrar……?\"" 
1007103-68 = "Escute bem, Sensei.\nVocê é um prisioneiro agora, então deve obedecer às minhas instruções sem falhar." 
1007103-69 = "E, como eu disse antes……" 
1007103-74 = "Eu sempre levo o treinamento a sério, como se fosse uma situação real." 
1007103-76 = "（Depois disso, passei um momento muito divertido a bordo como prisioneiro da Miyako.）" 