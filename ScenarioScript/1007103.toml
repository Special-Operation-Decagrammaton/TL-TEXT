1007103-7 = "Infelizmente, o pelotão RABBIT não tem proficiência em operações marítimas devido ao curto período de treinamento."

1007103-8 = "Como estamos em uma vila de pescadores, estávamos pensando em treinar a bordo do navio. ......"

