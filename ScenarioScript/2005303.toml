[translation]
2005303-1 = "A garota ninja está envergonhada!"
2005303-2 = "Distrito Comercial de Hyakkiyako"
2005303-3 = "Sim, aqui está o vestido que você pediu."
2005303-4 = "Uau...!"
2005303-5 = "...Incrível, que lindo!"
2005303-6 = "Não dá nem para notar onde estava rasgado!"
2005303-7 = "Isso é trabalho de um profissional...!"
2005303-8 = "[s] \"Que bom, Michiru.\""
2005303-9 = "Hehe... mas não acaba por aqui."
2005303-10 = "Espere um pouco, Sensei!"
2005303-15 = "(5 minutos depois...)"
2005303-16 = "Sensei!"
2005303-18 = "Vamos, próxima parada!"
2005303-19 = "[ns] \"Por quê!?\""
2005303-20 = "Hehe, por que o quê..."
2005303-21 = "Roupas servem para serem \"vestidas\"."
2005303-22 = "Ou seja, para saber se o conserto ficou bom mesmo, preciso vesti-lo!"
2005303-23 = "[s] \"Isso faz... sentido!?\""
2005303-24 = "Mas... só vestir não basta!"
2005303-25 = "Preciso andar, correr, carregar coisas pesadas!"
2005303-26 = "Só depois de fazer vários movimentos..."
2005303-27 = "É que vou saber se está perfeito!"
2005303-28 = "[s] \"Faz sentido, mas...\""
2005303-29 = "Viu só?"
2005303-30 = "Por isso, preparei o percurso ideal para isso!"
2005303-31 = "Indo por ali, tem lojas que vendem vários tipos de produtos..."
2005303-32 = "E por aquele lado, tem a loja que fomos juntos antes..."
2005303-33 = "Se atravessarmos o distrito fazendo compras...!"
2005303-34 = "Andar, correr, carregar peso!#nÉ o plano perfeito para testar tudo!"
2005303-35 = "Além disso, chegaram novos produtos... quer dizer, ferramentas ninja!"
2005303-36 = "Nossa, com isso, muito mais gente vai descobrir o charme dos ninjas!"
2005303-37 = "[s] \"Então era esse o seu objetivo!?\""
2005303-38 = "Eu sabia que o Sensei viria comigo!"
2005303-39 = "[s] \"Eu nem disse nada ainda!?\""
2005303-40 = "Tudo bem, tudo bem! Então, vamos nessa!"
2005303-46 = "Hyakkiyako - Distrito Comercial"
2005303-47 = "(No fim, acabei sendo arrastado pelo distrito comercial pela Michiru)"
2005303-48 = "Vamos, vamos, foco total!"
2005303-49 = "Mesmo sendo o mesmo produto, o preço varia de loja para loja..."
2005303-50 = "Tem que ficar atento e saber escolher!"
2005303-51 = "Bom, as ferramentas nin... quer dizer, os produtos ninja, custam quase o mesmo preço."
2005303-52 = "Como tem pouca variedade, não tem muito o que comparar..."
2005303-53 = "...Hm?"
2005303-54 = "Ah, uma shuriken matryoshka!"
2005303-55 = "É uma ferramenta ninja especial que tem uma shuriken menor dentro da outra!"
2005303-56 = "Mesmo que você desvie da shuriken que vem voando,#nela revela outra shuriken, uma arma inevitável!"
2005303-57 = "Desde que apareceu na obra do diretor \"Kai-ken Gururu\",#ntem sido homenageada em todo lugar!"
2005303-58 = "Ah, e esta aqui... uma bomba de fumaça flamejante ninja!"
2005303-59 = "Ao explodir, ela solta chamas em vez de fumaça,#numa ferramenta rara que permite atacar enquanto bloqueia a visão!"
2005303-60 = "[s] \"Isso não é a mesma coisa que um míssil...?\""
2005303-61 = "Ora, ora, não se preocupe com detalhes, não se preocupe."
2005303-62 = "Ah, isso é... um pergaminho holográfico de um ninja antigo!?"
2005303-63 = "Eles têm até esse tipo de coisa aqui!?"
2005303-70 = "(Assim, passei um tempo olhando os itens ninja... ou melhor, as ferramentas ninja com a Michiru.)"
2005303-72 = "Nya~, foi divertido."
2005303-73 = "Como gastei dinheiro consertando minhas roupas, só deu para comprar shurikens..."
2005303-74 = "Mas foi muito divertido fazer compras com você."
2005303-75 = "...Ei, Sensei."
2005303-76 = "...Obrigada por atender aos meus caprichos."
2005303-77 = "[s] \"Não foi nada, eu também me diverti.\""
2005303-78 = "Sé-sério mesmo...?"
2005303-79 = "Hehe... Hehe!"
2005303-80 = "A-ah, é verdade...!"
2005303-81 = "Isto é para você, Sensei!"
2005303-82 = "[s] \"...Uma cápsula de brinquedo?\""
2005303-83 = "Eu peguei agora pouco!"
2005303-84 = "Pode acreditar, é uma cápsula ninja!"
2005303-85 = "Bem, não sei o que tem dentro..."
2005303-86 = "Mas o presente inclui essa emoção de descobrir!"
2005303-87 = "Vamos lá, abra logo!"
2005303-89 = "...Hã?"
2005303-92 = "[wa:1250]― [log=미치루 드레스]O que tem dentro é...[wa:2300] um anel,[wa:1080] é isso!?[/log]"
2005303-94 = "― [log=미치루 드레스]Tem um enfeite de shuriken nele,[wa:2440] é bem legal...[wa:1940] não é!?[/log]"
2005303-97 = "[ns] \"Já que ganhei, acho que vou experimentar.\""
2005303-98 = "[wa:440]― [log=미치루 드레스]...[wa:890] Hã?[wa:1210] Sensei,[wa:1800] você vai colocar...? [/log]"
2005303-100 = "― [log=미치루 드레스]Ah,[wa:1010] não,[wa:960] tudo bem, mas...[/log]"
2005303-103 = "[wa:1570]― [log=미치루 드레스](Espera...?[wa:1250] Dar um anel[wa:1180] para alguém...?) [/log]"
2005303-105 = "― [log=미치루 드레스](Isso é...[wa:1420] tipo uma confissão[wa:1540] de amor――!?) [/log]"
2005303-108 = "[wa:380]― [log=미치루 드레스]E-ei,[wa:400] espere um pouco,[wa:790] Sensei![/log]"
2005303-110 = "― [log=미치루 드레스]Eu não estava[wa:480] tentando fazer isso...![wa:1890] Mas, bem...![/log]"
2005303-113 = "[ns] \"O-o que houve!?\""
2005303-114 = "[wa:2040]― [log=미치루 드레스]Uuu...[wa:840] Uaaaaaah!![/log]"
2005303-117 = "Ah...!"
2005303-118 = "Ah, bem...!"
2005303-119 = "Ugh, ah, droga!"
2005303-120 = "Puf!"
2005303-121 = "[ns] \"...\""
2005303-123 = "(Quando a fumaça se dissipou, Michiru tinha desaparecido.)"
2005303-124 = "(...Na palma da minha mão, restava apenas a cápsula de brinquedo.)"
