[translation]
2002203-1 = "Um pouco mais tarde"
2002203-2 = "Academia Gehenna - Refeitório Estudantil"
2002203-3 = "（Como Fuuka pediu, visitei o refeitório de Gehenna）"
2002203-8 = "Olá, Sensei."
2002203-9 = "[ns] \"Ué, Fuuka. Essa roupa...?\""
2002203-14 = "O-o que achou...?"
2002203-15 = "[ns1] \"A mais fofa do mundo! Combina demais com você!\"\n[ns2] \"Fuuka-tan de quimono!\""
2002203-18 = "Ehehe... Fico feliz que diga isso."
2002203-19 = "M-mas ainda assim, é um pouco vergonhoso. Não estou acostumada com esse traje, então me sinto um pouco inquieta."
2002203-20 = "Ah, desculpe por te chamar mesmo sendo feriado...?"
2002203-21 = "Não! Para mim, este lugar é um campo de batalha e um local sagrado!"
2002203-22 = "Além disso, hoje posso usar o refeitório só para você, Sensei!"
2002203-23 = "Na verdade, estou até empolgada!"
2002203-24 = "[s] \"Mas, de certa forma, sinto que estou te fazendo trabalhar no feriado...\""
2002203-25 = "Está tudo bem, não se preocupe com isso!"
2002203-29 = "Então, por favor, espere só um pouco. Já deixei os preparativos prontos."
2002203-30 = "Vou preparar o melhor soba para você, Sensei!"
2002203-37 = "Caldo de peixe pronto..."
2002203-43 = "Coxa de frango e cebolinha já cortadas..."
2002203-49 = "Vou grelhar a cebolinha primeiro, depois grelhar o frango no óleo da cebola..."
2002203-50 = "Em outra panela, coloco açúcar, shoyu e mirin no caldo de peixe..."
2002203-55 = "Agora, é só passar o soba cozido na água fria... pronto."
2002203-61 = "Agora é só servir o caldo e colocar os temperos..."
2002203-62 = "Sensei, está pronto! É o seu soba de fim de ano!"
2002203-63 = "O sabor do frango com o aroma da cebolinha, está com um cheiro ótimo."
2002203-64 = "Na verdade, eu queria ter preparado tempurá de camarão também, mas..."
2002203-65 = "[s3] \"Não se preocupe com isso. Obrigado.\"\n[s4] \"Não, só isso já parece delicioso.\""
2002203-68 = "S-sério? Fico feliz então. Ehehe..."
2002203-69 = "Então, vamos dizer 'itadakimasu'!"
2002203-70 = "[s] \"Itadakimasu!\""
2002203-71 = "Sim, itadakimasu!"
2002203-73 = "（Tomei até a água do cozimento do soba e comi tudo até o fim）"
2002203-75 = "Como estava o sabor? Será que agradou o seu paladar, Sensei...?"
2002203-76 = "[s5] \"Estava incrível, como esperado da Fuuka.\"\n[s6] \"Talvez tenha sido o melhor que já comi na vida.\""
2002203-79 = "Sério mesmo? Muito obrigada!"
2002203-80 = "Eu... realmente gosto de ver as pessoas saboreando a comida que eu faço."
2002203-81 = "E se for para o Sensei, ainda mais..."
2002203-82 = "Eh...?"
2002203-83 = "Ah, não, não! Eu que deveria agradecer!"
2002203-84 = "Ah, falando nisso, embora esteja um pouco atrasado, esqueci de te cumprimentar."
2002203-90 = "Feliz Ano Novo, Sensei!"
2002203-91 = "[ns] \"Feliz Ano Novo, Fuuka.\""
2002203-93 = "（Depois disso, conversamos sobre coisas triviais por um tempo e levei a Fuuka de volta）"
