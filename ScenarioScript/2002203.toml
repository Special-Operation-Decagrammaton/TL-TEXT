[translation]
2002203-1 = "少し遅れて"
2002203-2 = "ゲヘナ学園・学生食堂"
2002203-3 = "（フウカに言われた通り、ゲヘナの食堂を訪れた）"
2002203-8 = "こんにちは、先生。"
2002203-9 = "[ns] \"あれ、フウカ。その服……？\""
2002203-14 = "ど、どうでしょうか……？"
2002203-15 = "[ns1] \"世界で一番可愛い！最高に似合ってる！\"\n[ns2] \"着物のフウカたん！\""
2002203-18 = "えへへっ……そう言っていただいてうれしいです。"
2002203-19 = "と、とはいえやはり恥ずかしいですね。慣れない格好なので落ち着かないというか。"
2002203-20 = "え、休日なのに申し訳ない……？"
2002203-21 = "いいえ！ここは私にとって戦場であり、聖地ですから！"
2002203-22 = "それに今日は、先生おひとりのために使えるので！"
2002203-23 = "むしろ張り切っちゃいます！"
2002203-24 = "[s] \"でも何というか、休日出勤させちゃってる感が……。\""
2002203-25 = "大丈夫です、お気になさらず！"
2002203-29 = "では、少しだけ待っていてください。下準備は済ませておきましたので。"
2002203-30 = "先生に最高のそばをお出ししますから！"
2002203-37 = "かつおだしはOK……。"
2002203-43 = "鶏もも肉と長ネギもカットしてあるから……。"
2002203-49 = "長ネギを先に焼いてから、ネギの油でもも肉を焼いて……。"
2002203-50 = "もう一つの鍋でかつおだしに砂糖、醤油、みりんを入れて……。"
2002203-55 = "あとは茹で上がったそばを水で締めて……っと。"
2002203-61 = "あとはつゆを注いだら、薬味を乗せて……。"
2002203-62 = "先生、できました！年越しそばです！"
2002203-63 = "鶏肉の旨味とネギの風味が合わさって、良い香りですね。"
2002203-64 = "本当は海老の天ぷらも用意しようと思ったのですが……。"
2002203-65 = "[s3] \"そんな、気にしないで。ありがとう。\"\n[s4] \"ううん、これだけでもすごく美味しそう。\""
2002203-68 = "そ、そうですか？なら良かったです。えへへっ……。"
2002203-69 = "それでは、「いただきます」をしましょうか！"
2002203-70 = "[s] \"いただきます！\""
2002203-71 = "はい、いただきます！"
2002203-73 = "（蕎麦湯も貰って、つゆまできれいに完食した）"
2002203-75 = "お味はいかがでしたか？先生のお口に合いましたでしょうか……？"
2002203-76 = "[s5] \"最高だったよ、流石はフウカ。\"\n[s6] \"今まで食べた中で一番美味しかったかも。\""
2002203-79 = "本当ですか？ありがとうございます！"
2002203-80 = "私……やっぱり、自分の作った料理をおいしく食べてもらうのが好きです。"
2002203-81 = "それが先生なら、尚のこと……"
2002203-82 = "え……？"
2002203-83 = "あ、いえいえ！お礼をするのはこちらの方です！"
2002203-84 = "あ、そういえば今さらですが、ご挨拶をしそびれていましたね。"
2002203-90 = "あけましておめでとうございます、先生！"
2002203-91 = "[ns] \"あけましておめでとう、フウカ。\""
2002203-93 = "（その後しばらく他愛のない話をしてから、フウカを送り届けた）"
