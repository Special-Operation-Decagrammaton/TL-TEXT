[translation]
2002905-1 = "夏の海の思い出"
2002905-2 = "海辺"
2002905-5 = "さあ、先生……いきますよ？"
2002905-6 = "せーの……！"
2002905-14 = "[ns] \"えいっ！\""
2002905-16 = "お上手です！次は……はいっ！"
2002905-25 = "[ns] \"ほっ！\""
2002905-27 = "（ミモリと一緒に、浜辺でビーチバレーをすることに）"
2002905-28 = "（しばらくラリーを続けていたところ……）"
2002905-31 = "きゃっ？"
2002905-39 = "[ns] \"大丈夫！？\""
2002905-40 = "はい、大丈夫です。少し足をくじいただけなので。"
2002905-41 = "ふふっ、今度は私の負けですね。"
2002905-42 = "……ラリーに勝ち負けはないのですか？"
2002905-43 = "たしかに、仰る通りですね。ですが、どうしてでしょう。"
2002905-44 = "今日の私は、勝負がしたい気分なんでしょうか？"
2002905-45 = "……ふふっ。少し、休憩しませんか？"
2002905-46 = "そちらのクーラーボックスで、パイナップルジュースを冷やしておきました。#nどうぞ、お飲みください。"
2002905-53 = "喉が乾いてるとは思いますが、ゆっくり飲んでくださいね。#nお腹がビックリするかもしれませんから。"
2002905-54 = "うーん……その表情は、もしかしてお腹が空きました？"
2002905-55 = "海の家で、焼きそばでも買ってきましょうか？"
2002905-56 = "[s1] \"ううん、そこまでしなくても大丈夫だよ。\"\n[s2] \"それに行くなら、ミモリと一緒がいいな。\""
2002905-59 = "……。"
2002905-60 = "も、もう。先生は、いつもそうやって……"
2002905-61 = "あ、違います。先生は何も悪くないので！#nこれは、私が勝手に意……"
2002905-62 = "……な、何でもありません！#nその……先生、お隣り失礼しますね！"
2002905-66 = "（急に慌てて隣に座ってきたミモリと肩を寄せ合い、押し寄せては引いていく波の様子を眺めていた）"
2002905-71 = "……。"
2002905-72 = "[ns] \"……。\""
2002905-73 = "……素敵ですね。"
2002905-74 = "[s] \"好きなの？\""
2002905-75 = "はい！？あ、海が……ですよね？"
2002905-76 = "その、もちろん海も好きなのですが……#nこうして、ゆったり過ごす時間が好きと言いますか……"
2002905-77 = "……ズルいです、先生は。"
2002905-78 = "[s] \"え、どうして私が！？\""
2002905-79 = "ふふっ。"
2002905-80 = "先生……？"
2002905-81 = "[s] \"どうしたの？\""
2002905-82 = "わ、私を捕まえてみてください！"
2002905-87 = "（突然ミモリが走り出した！）"
2002905-90 = "[ns] \"み、ミモリ！？……もしかして、また勝負？\""
2002905-91 = "ふふっ。こっちですよ、先生～！"
2002905-97 = "（ミモリと一緒に砂浜を走り回った）"
2002905-102 = "（しばらく2人で追いかけっこを楽しんでいたところ……）"
2002905-106 = "[ns] \"うわっ！？\""
2002905-108 = "（砂浜に足を取られて、盛大に転んでしまった……）"
2002905-109 = "せ、先生！？"
2002905-113 = "大丈夫ですか？すみません、私のせいで……"
2002905-114 = "うぅ……そんな、泣かないでなんて言われましても……"
2002905-115 = "すみません……本当にすみません、先生……"
2002905-116 = "[s3] \"あはは、本当に大丈夫だよ。\"\n[s4] \"久しぶりに気持ち良く走れて、楽しかったよ。\""
2002905-119 = "本当……ですか？"
2002905-120 = "本当、ですよね？"
2002905-121 = "ですが、そろそろお疲れでしょうし、追いかけっこは……"
2002905-122 = "あ、そうです！今度は、海の上に浮かんで遊びませんか？"
2002905-123 = "ふふっ。先生、付いてきてください♪"
2002905-128 = "こうして力を抜いて、空を眺めながら……"
2002905-129 = "息を深く吸うと……"
2002905-130 = "水の上でぷかぷか浮かぶことができるんです。"
2002905-131 = "先生も一度、やってみてください！"
2002905-132 = "（ミモリに言われた通り、身体の力を抜いてゆっくり息を吸い込んだ）"
2002905-137 = "どうでしょうか、先生？"
2002905-138 = "……このまま寝てしまいそうですか？"
2002905-139 = "き、気をつけてくださいね！？また海で眠ってしまっては……"
2002905-140 = "……いえ。いざとなったら、私が助けるのでご安心ください。"
2002905-141 = "それにしても、今日はとても気持ちが良い日ですね。"
2002905-142 = "…………ふふっ、先生と2人だからでしょうか？"
2002905-148 = "先生、今日はいかがでした？"
2002905-149 = "……楽しんでいただけましたか？それなら良かったです。"
2002905-150 = "……。"
2002905-151 = "[s] \"ミモリ？\""
2002905-152 = "……もう、こんな時間ですね。"
2002905-153 = "どんなに楽しい1日だとしても、終わりは訪れるものですが……"
2002905-154 = "[s] \"うん……そうだね。\""
2002905-155 = "あの、先生……"
2002905-156 = "もう少しだけで良いので、おそばに居ていただけますか？"
2002905-157 = "本当に、ほんの少しだけで良いんです。"
2002905-158 = "[s] \"それは良いんだけど、どうしたの？\""
2002905-159 = "すみません、先生。"
2002905-160 = "甘えているという自覚はあります。ですが……"
2002905-161 = "今日という1日が、本当に楽しくて……本当に……"
2002905-162 = "先生と一緒に過ごせるだけでも、私は朝からずっと嬉しい気持ちが抑えられず……"
2002905-163 = "[s5] \"まだ今日は終わってないよ。\"\n[s6] \"私も、ミモリと一緒に過ごせて楽しかったよ。\""
2002905-166 = "……ふふっ、はい。"
2002905-167 = "この時間の海も……綺麗ですね。"
2002905-168 = "[s] \"もう少し泳ごうか？\""
2002905-172 = "いえ……少し、歩きませんか？"
2002905-179 = "[wa:2250]― [log=미모리 수영복ND]このまま……[/log]"
2002905-181 = "[wa:300]― [log=미모리 수영복ND]この時間が[wa:1550]永遠になってしまえばいいのに。[/log]"
2002905-184 = "[wa:2350]― [log=미모리 수영복ND]このまま、[wa:1050]写真や[wa:450]絵のように[wa:1400]時が記録されて――[/log]"
2002905-186 = "[wa:100]― [log=미모리 수영복ND]そうしたら……[/log]"
2002905-189 = "[ns7] \"本当に、今日は楽しかったね。\"\n[ns8] \"……私も寂しくなってきたよ。\""
2002905-190 = "[wa:500]― [log=미모리 수영복ND]先生も[wa:1300]同じ気持ち、[wa:1400]なのですか？[/log]"
2002905-191 = "[wa:500]― [log=미모리 수영복ND]先生も[wa:1300]同じ気持ち、[wa:1400]なのですか？[/log]"
2002905-193 = "[wa:350]― [log=미모리 수영복ND]それは……[wa:1550]なんだか、[wa:1550]照れますね。[/log]"
2002905-196 = "[wa:1500]― [log=미모리 수영복ND]私は今日……[/log]"
2002905-198 = "[wa:100]― [log=미모리 수영복ND]修行を忘れるくらい……[wa:1600]幸せでした。[/log]"
2002905-201 = "[wa:1900]― [log=미모리 수영복ND]その……[wa:1650]先生。[/log]"
2002905-204 = "[wa:950]― [log=미모리 수영복ND]いつかまた……[/log]"
2002905-206 = "[wa:750]― [log=미모리 수영복ND]このような時間を作っていただけますでしょうか？[/log]"
2002905-210 = "陽が、落ちてしまいました……#nですが、これからはお月様の時間ですよね。"
2002905-211 = "……先生、明日は晴れるでしょうか？"
2002905-212 = "[s] \"うん、きっと晴れるよ。\""
2002905-213 = "ふふっ、ありがとうございます。"
2002905-214 = "今日は……先生に甘えてばかりでしたね。"
2002905-215 = "よろしければ、その……肩を貸していただけませんか？"
2002905-220 = "（月の光に照らされたミモリの横顔は、何よりも美しかった）"
