[translation]
2002905-1 = "Memórias de um verão no mar"
2002905-2 = "Beira-mar"
2002905-5 = "Vamos lá, Sensei... está pronto?"
2002905-6 = "No três...!"
2002905-14 = "[ns] \"Ei!\""
2002905-16 = "Muito bem! Agora... lá vai!"
2002905-25 = "[ns] \"Hup!\""
2002905-27 = "(Decidi jogar vôlei de praia com Mimori)"
2002905-28 = "(Depois de trocarmos algumas jogadas por um tempo...)"
2002905-31 = "Ah?"
2002905-39 = "[ns] \"Você está bem!?\""
2002905-40 = "Sim, estou bem. Só torci um pouco o pé."
2002905-41 = "Fufu, desta vez eu perdi."
2002905-42 = "...Não existe ganhar ou perder em um rali, existe?"
2002905-43 = "Você tem razão. Mas, por que será?"
2002905-44 = "Será que hoje eu estou com vontade de competir?"
2002905-45 = "...Fufu. Que tal fazermos uma pausa?"
2002905-46 = "Deixei um suco de abacaxi gelando naquela caixa térmica. #nPor favor, beba um pouco."
2002905-53 = "Sei que deve estar com sede, mas beba devagar, está bem? #nSeu estômago pode estranhar."
2002905-54 = "Hmm... essa expressão, será que você está com fome?"
2002905-55 = "Quer que eu vá comprar um yakisoba na barraca da praia?"
2002905-56 = "[s1] \"Não, não precisa se incomodar tanto.\"\n[s2] \"Se for, prefiro ir com você, Mimori.\""
2002905-59 = "..."
2002905-60 = "Ah, meu Deus. Sensei, você sempre faz isso..."
2002905-61 = "Ah, não, me desculpe. Você não fez nada de errado, Sensei! #nÉ que eu acabei me deixando levar..."
2002905-62 = "...N-não é nada! #nBem... Sensei, vou me sentar aqui ao seu lado, tudo bem?"
2002905-66 = "(Sentei-me ao lado de Mimori, que se apressou em sentar perto de mim, e ficamos observando as ondas que iam e vinham)"
2002905-71 = "..."
2002905-72 = "[ns] \"...\""
2002905-73 = "...É maravilhoso, não é?"
2002905-74 = "[s] \"Você gosta?\""
2002905-75 = "Ah!? Ah, do mar... você quer dizer?"
2002905-76 = "Bem, é claro que eu gosto do mar, mas... #nEu quis dizer que gosto de passar esse tempo tranquilo assim..."
2002905-77 = "...Você é injusto, Sensei."
2002905-78 = "[s] \"Hã, por que eu!?\""
2002905-79 = "Fufu."
2002905-80 = "Sensei...?"
2002905-81 = "[s] \"O que foi?\""
2002905-82 = "V-venha me pegar, se for capaz!"
2002905-87 = "(De repente, Mimori começou a correr!)"
2002905-90 = "[ns] \"M-Mimori!?... Será que é outra competição?\""
2002905-91 = "Fufu. É por aqui, Sensei~!"
2002905-97 = "(Corri pela areia junto com a Mimori)"
2002905-102 = "(Depois de brincarmos de pega-pega por um tempo...)"
2002905-106 = "[ns] \"Uau!?\""
2002905-108 = "(Meus pés prenderam na areia e eu caí de forma espetacular...)"
2002905-109 = "S-Sensei!?"
2002905-113 = "Você está bem? Sinto muito, a culpa foi minha..."
2002905-114 = "Uuu... não adianta me pedir para não chorar..."
2002905-115 = "Sinto muito... sinto muito mesmo, Sensei..."
2002905-116 = "[s3] \"Ahaha, estou bem, de verdade.\"\n[s4] \"Foi divertido correr um pouco depois de tanto tempo, me senti muito bem.\""
2002905-119 = "É... verdade?"
2002905-120 = "É verdade, não é?"
2002905-121 = "Mas você deve estar cansado, então essa brincadeira de pega-pega..."
2002905-122 = "Ah, já sei! Que tal flutuarmos no mar agora?"
2002905-123 = "Fufu. Sensei, venha comigo♪"
2002905-128 = "Relaxe o corpo assim, olhando para o céu..."
2002905-129 = "E quando você inspira profundamente..."
2002905-130 = "Você consegue flutuar sobre a água."
2002905-131 = "Sensei, tente fazer isso também!"
2002905-132 = "(Como Mimori instruiu, relaxei o corpo e inspirei lentamente)"
2002905-137 = "Como foi, Sensei?"
2002905-138 = "...Você está quase pegando no sono?"
2002905-139 = "C-cuidado, por favor!? Se você dormir no mar de novo..."
2002905-140 = "...Não, esqueça. Se algo acontecer, eu te ajudo, então não se preocupe."
2002905-141 = "Ainda assim, hoje é um dia muito agradável, não é?"
2002905-142 = "............Fufu, será que é porque estou a sós com o Sensei?"
2002905-148 = "Sensei, como foi o seu dia hoje?"
2002905-149 = "...Você se divertiu? Fico feliz em saber disso."
2002905-150 = "……"
2002905-151 = "[s] \"Mimori?\""
2002905-152 = "...Já está na hora, não é?"
2002905-153 = "Não importa o quão divertido seja o dia, ele sempre chega ao fim..."
2002905-154 = "[s] \"Sim... é verdade.\""
2002905-155 = "Ei, Sensei..."
2002905-156 = "Poderia ficar ao meu lado por só mais um pouquinho?"
2002905-157 = "De verdade, só um pouquinho mesmo."
2002905-158 = "[s] \"Por mim tudo bem, mas aconteceu alguma coisa?\""
2002905-159 = "Desculpe, Sensei."
2002905-160 = "Eu sei que estou sendo mimada. Mas..."
2002905-161 = "O dia de hoje foi tão divertido... tão..."
2002905-162 = "Só de poder passar o tempo com o Sensei, não consegui conter a alegria desde cedo..."
2002905-163 = "[s5] \"O dia de hoje ainda não acabou.\"\n[s6] \"Eu também me diverti muito passando o tempo com você, Mimori.\""
2002905-166 = "...Fufu, sim."
2002905-167 = "O mar a esta hora também... é lindo, não é?"
2002905-168 = "[s] \"Quer nadar mais um pouco?\""
2002905-172 = "Não... que tal caminharmos um pouco?"
2002905-179 = "[wa:2250]― [log=미모리 수영복ND]Se pudéssemos...[/log]"
2002905-181 = "[wa:300]― [log=미모리 수영복ND]fazer com que este momento [wa:1550] durasse para sempre.[/log]"
2002905-184 = "[wa:2350]― [log=미모리 수영복ND]Se o tempo pudesse ser registrado [wa:1050] como uma foto [wa:450] ou uma pintura [wa:1400] exatamente assim――[/log]"
2002905-186 = "[wa:100]― [log=미모리 수영복ND]Então...[/log]"
2002905-189 = "[ns7] \"Hoje foi realmente muito divertido.\"\n[ns8] \"...Eu também estou começando a me sentir triste.\""
2002905-190 = "[wa:500]― [log=미모리 수영복ND]Sensei, você [wa:1300] sente o mesmo, [wa:1400] não é?[/log]"
2002905-191 = "[wa:500]― [log=미모리 수영복ND]Sensei, você [wa:1300] sente o mesmo, [wa:1400] não é?[/log]"
2002905-193 = "[wa:350]― [log=미모리 수영복ND]Isso... [wa:1550] me deixa um pouco [wa:1550] envergonhada.[/log]"
2002905-196 = "[wa:1500]― [log=미모리 수영복ND]Hoje, eu...[/log]"
2002905-198 = "[wa:100]― [log=미모리 수영복ND]fiquei tão feliz [wa:1600] que até esqueci do meu treinamento.[/log]"
2002905-201 = "[wa:1900]― [log=미모리 수영복ND]Aquele... [wa:1650] Sensei.[/log]"
2002905-204 = "[wa:950]― [log=미모리 수영복ND]Algum dia...[/log]"
2002905-206 = "[wa:750]― [log=미모리 수영복ND]você poderia reservar um tempo como este para mim novamente?[/log]"
2002905-210 = "O sol se pôs... mas agora é a hora da lua, não é?"
2002905-211 = "……Sensei, será que amanhã fará sol?"
2002905-212 = "[s] \"Sim, com certeza fará sol.\""
2002905-213 = "Fufu, obrigada."
2002905-214 = "Hoje... eu só fiz depender de você, Sensei."
2002905-215 = "Se não for incômodo, você poderia... me emprestar seu ombro?"
2002905-220 = "(O perfil de Mimori iluminado pelo luar era mais belo do que qualquer outra coisa)"
