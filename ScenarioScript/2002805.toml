[translation]
2002805-1 = "2人きりの告白"
2002805-4 = "あ、先生。こちらです！"
2002805-5 = "来てくださって、ありがとうございます！それと、すみません。#n私のワガママに、付き合ってくださって……"
2002805-6 = "[s1] \"先生なんだから、当然だよ。\"\n[s2] \"ヒナタのワガママは貴重だからね。\""
2002805-7 = "はは……そう言っていただけると、嬉しいです。"
2002805-8 = "……そ、そうでしょうか……？"
2002805-9 = "その……"
2002805-10 = "お願いというのは、どこででも出来るような事ではなく……"
2002805-11 = "……他に誰かいらっしゃるところでは、難しいと言いますか……"
2002805-15 = "先生と、私の2人きりでなければ、いけなくって……"
2002805-16 = "そ、その……えっと……"
2002805-17 = "[s3] \"もっとリラックスして大丈夫だよ。\"\n[s4] \"何でも相談してね。\""
2002805-20 = "……！！"
2002805-21 = "で、では……！お、お伝えしますね……！"
2002805-25 = "こ……"
2002805-27 = "告解を！！練習したいのです……！！！"
2002805-32 = "[ns] \"告解……？\""
2002805-33 = "はい！じ、実は……聖堂でも、シスターフッドのみなさんに#n何度か相手をしていただいたのですが……"
2002805-34 = "いつも私が取り乱してしまい、最後までやり遂げられませんでした。"
2002805-35 = "回数を重ねるうちに緊張しなくなると、みなさん励ましてくださりましたが……#n今の私では、訪問していただいた方のご迷惑になってしまうので……"
2002805-36 = "告解の担当は、できるだけ避けてきたのです。"
2002805-37 = "シスターたる者として、いつまでも逃げてはいられませんが……"
2002805-38 = "かといって、シスターフッドのみなさんに何度も練習に付き合っていただくのは恥ずかしく……"
2002805-39 = "[s5] \"なら、ヒナタに告白すれば良いんだね？\"\n[s6] \"それじゃあ、今から始めようか？\""
2002805-44 = "は、はい！？今ですか……！？こ、ここで！？"
2002805-45 = "でも、周りに人が……"
2002805-52 = "……いませんね！"
2002805-53 = "このために、わざわざ先生にここまで来ていただいたのでした！"
2002805-54 = "うぅ……いざ始めるとなると、緊張してしまいます……。"
2002805-55 = "……練習だから、もっと気楽に……？"
2002805-56 = "そ、そうですよね。"
2002805-57 = "これは練習……練習……すぅ、はぁぁ……"
2002805-62 = "……それでは、始めます。"
2002805-67 = "告白の秘密は、いかなる理由に基づいても、決して口外されませんので、ご安心ください。"
2002805-68 = "……先生。"
2002805-69 = "今日は、どのようなお悩みをお持ちなのか……私に聞かせていただけますか？"
2002805-70 = "[s] \"正直な気持ちを聞いていただけるんですか？\""
2002805-71 = "もちろんです。どんな内容であれ、シスターとしてその告白をお聞きします。"
2002805-72 = "先生の率直なお言葉を聞かせてください。#n胸の奥に仕舞い込んでいる思いを、どうか。"
2002805-73 = "[s] \"では、お願いいたします。\""
2002805-74 = "はい、しっかりと聞いておりますので……"
2002805-75 = "いつでもどうぞ。"
2002805-76 = "[s7] \"……帰りたくないです。\"\n[s8] \"ずっと、ここで遊んでいたいです。\""
2002805-79 = "そうでしたか。帰らずに、ずっとここで……"
2002805-84 = "……えっ？"
2002805-85 = "先生……？今、何を仰って……"
2002805-86 = "[s9] \"何でも言っていいんだよね！\"\n[s10] \"もう帰りたくない！ずっと遊んでたい！\"\n[s11] \"お仕事なんて知らない！ヒナタと遊ぶ！\""
2002805-92 = "せ、先生……！？お、落ち着いて……まずは落ち着いてください！"
2002805-93 = "そのお気持ちは、十分理解できるのですが……！"
2002805-94 = "私だって、先生と2人きりでもっと過ごしたいと思っていますけど！"
2002805-95 = "……。"
2002805-96 = "……あっ。"
2002805-97 = "い、いえ！いえいえいえいえいえいえいえ！！"
2002805-98 = "今のはその、ち、違うんです！あっ、いえ……#nち、違わないんですが……えっと、その……！"
2002805-99 = "私、私ったら、なんて考えを……！？シスターの身でありながら……！"
2002805-100 = "[s12] \"だ、大丈夫だよ。これは告解だから、ね？\"\n[s13] \"い、いったん落ち着こう？\""
2002805-103 = "ごめんなさいごめんなさい！！みなさんごめんなさい！！先生もごめんなさい！！"
2002805-104 = "ひぅ……"
2002805-106 = "ひああぁぁああんーーー！！"
2002805-111 = "（その後、気を落としてしまったヒナタを[ruby=なだ]宥[/ruby]めて、残りの時間を過ごした）"
2002805-115 = "（告解の練習は、また別の機会にする事になった）"
