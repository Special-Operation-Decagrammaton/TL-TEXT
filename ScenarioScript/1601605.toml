[translation]
1601605-1 = "今の私と"
1601605-5 = "（休憩室で待っていると、ミネがやって来た）"
1601605-6 = "失礼いたします、先生。"
1601605-14 = "[ns1] \"……やっぱり。\"\n[ns2] \"衣装のことで悩んでるんだよね。\""
1601605-17 = "……はい。"
1601605-18 = "私の小さな悩みなど……。"
1601605-19 = "先生には、お見通しでしたか。"
1601605-20 = "……もっと早く、相談しておけば良かったです。"
1601605-21 = "では、単刀直入に申し上げます。"
1601605-22 = "先生、私は……。"
1601605-27 = "……この服の処分について悩んでいるのです。"
1601605-28 = "[ns] \"……。\""
1601605-30 = "[ns3] \"……いきなり処分！？\"\n[ns4] \"何か問題でもあったの！？\""
1601605-32 = "はい、処分です。"
1601605-34 = "そうなのです。"
1601605-35 = "ご存知の通り、私はトリニティ救護騎士団の団長を務めております。"
1601605-36 = "……アイドル活動は好きですが、#nだからと言って本来の活動を疎かにするわけにはいきません。"
1601605-37 = "果たして、両立できるのでしょうか？"
1601605-40 = "……本音では、この衣装をこれからも着続けたいです。"
1601605-41 = "ただ、そうすると救護騎士団の団長としてのアイデンティティが失われてしまいます。"
1601605-44 = "色々と理由を作ってはアイドル衣装を着て、#n私は問題を先送りにしてきました。"
1601605-45 = "しかし、このままではどちらかが疎かになってしまいます。#nそれはいけません。"
1601605-46 = "団員の皆さんは、#nたまにライブをやるくらいなら良いのではないかと言ってくれましたが……。"
1601605-47 = "……お断りしました。"
1601605-48 = "どっちつかずの状態でいるのが、#n一番良くないと自分でも分かっているからです。"
1601605-49 = "[s5] \"ミネの中で答えは決まってるんだね。\"\n[s6] \"両立はもう難しいと思ってるの？\""
1601605-52 = "はい、これが私なりの結論です。"
1601605-56 = "このままアイドル活動も救護活動も続ける未来を想像したところ……。"
1601605-57 = "……やはり、どちらか一方に偏りが出てしまうと判断しました。"
1601605-58 = "そこで、先生……。"
1601605-63 = "この衣装を預けてもよろしいでしょうか？"
1601605-67 = "[ns7] \"私が、これを……？\"\n[ns8] \"保管しておいてほしいの？\""
1601605-70 = "「封印」のようなものです。"
1601605-71 = "手元にあると常に衣装のことを考えてしまいますが、#n処分するほどの勇気はありません。"
1601605-72 = "……私にとって、今の姿を否定するつもりはありませんし、これは大切な思い出が詰まっていますから。"
1601605-73 = "先生に預かっていただくのが一番良いと思った次第です。"
1601605-77 = "先生……。"
1601605-78 = "……お願い、いたします。"
1601605-79 = "[s] \"……。\""
1601605-81 = "[ns] \"……ミネ。\""
1601605-85 = "[ns9] \"悪いけど、それはできないよ。\"\n[ns10] \"その衣装は、ミネが持っておくべきだよ。\""
1601605-90 = "……分かりました。"
1601605-91 = "先生がそう仰るのなら、仕方ありません。"
1601605-95 = "この衣装は、処分する方向で進め……。"
1601605-99 = "……その必要はない、と？"
1601605-100 = "ですが、このまま持っていては……。"
1601605-101 = "どうして……。"
1601605-105 = "……あ。"
1601605-106 = "もしかして、説得するおつもりでしょうか？"
1601605-107 = "私なりに考え尽くした結論が、これなのです。"
1601605-108 = "……えっ？"
1601605-109 = "そうではないのですか……？"
1601605-110 = "[s11] \"私もミネと一緒に考えるよ。\"\n[s12] \"私が着るべき時を伝えるよ。\""
1601605-113 = "……？"
1601605-117 = "先生が……。"
1601605-118 = "この衣装を着るべき時を教えてくださるのですか？"
1601605-119 = "なぜ、そこまで……。"
1601605-120 = "……申し訳ありません。"
1601605-121 = "先生のお考えが、正確には理解できず……。"
1601605-122 = "……なるほど。"
1601605-127 = "そうですね……。"
1601605-128 = "たしかに、先生が着るタイミングを教えてくださるのなら……。"
1601605-129 = "衣装について悩む必要はなくなりそうです。"
1601605-130 = "……ふふっ。"
1601605-131 = "分かりました。"
1601605-132 = "先生を信じようと思います。"
1601605-133 = "ただ、先生に着る服を選んでもらうだなんて……。"
1601605-134 = "……少し、恥ずかしい気もしますね。"
1601605-138 = "[ns13] \"こ、これは……！\"\n[ns14] \"あくまで、ミネの悩みを解決するために……！\""
1601605-143 = "ふふっ、冗談です。"
1601605-144 = "先生には、アイドルの蒼森ミネをお預けします。"
1601605-145 = "これから、先生と生徒の関係性だけではなく……。"
1601605-150 = "今の私と先生の関係としても、よろしくお願いいたします。"
