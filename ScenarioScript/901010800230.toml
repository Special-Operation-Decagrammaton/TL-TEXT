[translation]
901010800230-11 = "This is..."
901010800230-15 = "Heh, looks like I hit the jackpot."
901010800230-19 = "This is FOX2. I've discovered some interesting data at the loading dock by the exit."
901010800230-20 = "One is a roster of the members working in this warehouse, and the other is a breakdown of sales recording the branch's cash flow."
901010800230-24 = "—The sales ledger is the quickest way to grasp the organization's objectives."
901010800230-25 = "Well done, FOX2. Copy the data you've secured and transmit it to me."
901010800230-26 = "Roger, I'll be done in a second."
901010800230-27 = "FOX2. Is there anything notable in the sales breakdown? Any suspicious transaction details?"
901010800230-28 = "Hmm, nothing particularly stands out, but..."
901010800230-29 = "What's bothering me is that they seem to have been cutting back on expenses lately."
901010800230-30 = "They've switched the snacks provided to members to cheap rice crackers, and they haven't purchased their usual recurring order of ammunition this term."
901010800230-31 = "Did they suddenly run out of money?"
901010800230-32 = "Nope, their total holdings are actually higher than in previous years."
901010800230-33 = "Maybe they're planning to make a large purchase."
901010800230-34 = "And yet, buying a massive amount of crab they have no plans to eat... that's pretty suspicious, isn't it?"
901010800230-40 = "This is FOX3."
901010800230-41 = "FOX2, the two members who were talking at the back gate earlier, Tango 3 and Tango 4, have moved from their designated positions."
901010800230-42 = "They might be heading to the office. Get out of there, fast."
901010800230-43 = "But the data copy is still—"
901010800230-47 = "FOX2, someone is heading your way. Be careful."
901010800230-48 = "…!"
901010800230-57 = "Huh? The door is open?"
901010800230-63 = "Who's there!"
901010800230-71 = "Hello, this is FOX EATS!"
901010800230-72 = "...FOX EATS?"
901010800230-73 = "Ah, Capo, it's that thing we were talking about earlier. The delivery service that's been rumored around here lately."
901010800230-74 = "I think that's the delivery person right there."
901010800230-75 = "We didn't order anything like that! Why is an outsider in our office!"
901010800230-76 = "Who are you? A spy from another family!?"
901010800230-78 = "Oh, um..."
901010800230-82 = "I'm so sorry! I came to drop off a delivery, but there was no one at the entrance."
901010800230-83 = "I didn't want it to go bad if I left it outside, so I came in here looking for someone."
901010800230-84 = "Is that true? The guards at the main gate let you through?"
901010800230-85 = "Um... there wasn't anyone at the main gate?"
901010800230-86 = "Tch, those guys are slacking off again."
901010800230-87 = "So, who ordered what?"
901010800230-88 = "Um... two servings of Inari sushi!"
901010800230-89 = "I assume someone ordered it for a late-night snack. #nInari sushi is easy on the stomach even if you eat it at night, so it's perfect."
901010800230-90 = "Did anyone here order Inari sushi?"
901010800230-92 = "Well, I'll go ask around..."
901010800230-94 = "Fine. Just leave the Inari sushi there."
901010800230-95 = "If you sneak in again, I won't be so lenient!"
901010800230-96 = "Yes! Thank you for your order!"