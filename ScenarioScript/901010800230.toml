[translation]#[Texto Final. - Filipe 05/07.]
901010800230-11 = "Isto é……"
901010800230-15 = "Fufu, parece que dei sorte."
901010800230-19 = "Aqui FOX2, encontrei uns dados interessantes na doca de carga."
901010800230-20 = "Uma é a lista de membros que trabalham nesse armazém, a outra é o registro de fluxo de caixa da filial."
901010800230-24 = "――Para entender os objetivos de uma organização, o livro de vendas é o caminho mais rápido."
901010800230-25 = "Bom trabalho, FOX2. Copie os dados e transfira pra cá."
901010800230-26 = "Sim, já vou."
901010800230-27 = "FOX2. Tem algo suspeito no registro de vendas? Transações estranhas?"
901010800230-28 = "Hmm, nada muito chamativo……"
901010800230-29 = "Mas uma coisa que me chama atenção é que ultimamente eles estão reduzindo os gastos."
901010800230-30 = "Trocaram os petiscos dos membros por biscoitos baratos, e não compraram munição este período."
901010800230-31 = "Ficaram sem dinheiro do nada?"
901010800230-32 = "Não, o saldo total aumentou em relação aos anos anteriores."
901010800230-33 = "Talvez estejam planejando gastar uma grana alta."
901010800230-34 = "E mesmo assim compram caranguejo sem nem pretender comer…… suspeito, hein."
901010800230-40 = "Aqui FOX3."
901010800230-41 = "FOX2. Os dois membros que conversavam no portão dos fundos, Tango 3 e Tango 4, saíram da posição."
901010800230-42 = "Devem estar indo pro escritório. Sai daí rápido."
901010800230-43 = "Mas ainda não terminei de copiar――"
901010800230-47 = "FOX2, alguém está vindo na sua direção. Cuidado."
901010800230-48 = "……!"
901010800230-57 = "Hã? A porta tá aberta?"
901010800230-63 = "Quem é!"
901010800230-71 = "Olá, FOX EATS!"
901010800230-72 = "……FOX EATS?"
901010800230-73 = "Ah, Capo, é aquele negócio que eu falei. Tem um delivery novo fazendo fama por aqui."
901010800230-74 = "Deve ser a entregadora."
901010800230-75 = "Mas a gente não pediu nada! Por que uma estranha tá no nosso escritório!"
901010800230-76 = "Ei, você! É espiã de outra família?!"
901010800230-78 = "Ah, bem……"
901010800230-82 = "Desculpa~ vim trazer uma entrega, mas não tinha ninguém na entrada."
901010800230-83 = "Se deixasse do lado de fora ia estragar, então vim procurar alguém."
901010800230-84 = "É mesmo? E o segurança do portão te deixou passar?"
901010800230-85 = "Er…… não tinha ninguém no portão?"
901010800230-86 = "Tsc, aqueles vagabundos matando serviço de novo."
901010800230-87 = "E aí, quem pediu o quê?"
901010800230-88 = "Bom…… dois inarizushi!"
901010800230-89 = "Provavelmente alguém pediu como lanche noturno.#nInarizushi é leve pro estômago, deve cair bem."
901010800230-90 = "Alguém aqui pediu inarizushi?"
901010800230-92 = "Sei lá, vou perguntar……"
901010800230-94 = "Tá bom. Deixa o inarizushi aqui."
901010800230-95 = "Se entrar de novo sem permissão, não vou ser bonzinho!"
901010800230-96 = "Sim! Obrigada pela preferência!"