[translation]
2001202-1 = "Por causa dos feridos"
2001202-2 = "（Como fiquei preocupado, acabei indo até o local que a Sena mencionou）"
2001202-3 = "（Embora seja algo comum em Gehenna, vejo alunas levemente feridas por toda parte）"
2001202-6 = "（E, ao lado das alunas, vi a Sena comandando os membros do Departamento de Medicina de Emergência）"
2001202-7 = "Por favor, coloquem os cadáveres... digo, os feridos na ambulância. Quem puder andar, vá para aquele lado por enquanto."
2001202-8 = "Se alguma aluna fingir desmaio dizendo que 'está com preguiça de andar', disparem para confirmar se estão realmente inconscientes ou não."
2001202-9 = "……Muito bem, comecem."
2001202-11 = "Sim!!"
2001202-16 = "Aaaah!? Entendi, entendi! Eu ando, eu ando!"
2001202-17 = "Não atire só para confirmar! Eu realmente vou acabar sem conseguir andar!"
2001202-18 = "……Assim que terminarem o transporte, reúnam-se aqui novamente."
2001202-19 = "O combate ainda continua ali, então os cadáveres... digo, os feridos vão aumentar. Por isso, a seguir..."
2001202-23 = "……Escutem."
2001202-24 = "Sim!"
2001202-25 = "Eu vou me ausentar por um tempo. Vocês, continuem o trabalho conforme o planejado."
2001202-26 = "……Então, comecem."
2001202-27 = "Sim!!"
2001202-34 = "Quem diria que o Sensei viria. Por que você está aqui...?"
2001202-35 = "Você recebeu a mensagem, não recebeu? Aqui é perigoso, seria melhor se você fosse para outro lugar..."
2001202-36 = "……Sim?"
2001202-37 = "Veio porque estava preocupado...?"
2001202-38 = "……Ah."
2001202-39 = "Entendo, foi isso... Bem, de fato, na posição do Sensei, seria difícil ignorar..."
2001202-40 = "No fim das contas, acabei chamando o Sensei para cá. Desculpe, foi um erro meu."
2001202-41 = "Vou ajustar as configurações para que isso não aconteça novamente."
2001202-42 = "Não é sobre isso que você quer falar?"
2001202-43 = "Mesmo que você diga para não me preocupar..."
2001202-44 = "……Sim. Se o Sensei diz isso, então tudo bem."
2001202-45 = "……Algo em que possa ajudar?"
2001202-46 = "Agradeço a intenção, mas não precisa. Basicamente, é sempre assim."
2001202-47 = "De fato, desta vez a batalha está sendo mais longa do que o esperado, e os cadá..."
2001202-48 = "Não, é verdade que o número de feridos provavelmente vai aumentar."
2001202-49 = "O Comitê Disciplinar deve chegar em breve. Depois disso, estará praticamente fora da nossa jurisdição."
2001202-50 = "Ah, falando neles, acabaram de chegar."
2001202-56 = "Certo, todos capturados!!"
2001202-57 = "Eliminem tudo rapidamente e controlem a situação!"
2001202-67 = "……Bem, até aqui, é sempre o de costume."
2001202-68 = "[s1] \"É sempre assim, então...\"\n[s2] \"É a Gehenna de sempre...\""
2001202-69 = "Sim. E assim que as coisas se acalmarem, só nos resta atender aos feridos."
2001202-70 = "Sim. E assim que as coisas se acalmarem, só nos resta atender aos feridos."
2001202-71 = "Para pensar em qualquer outra coisa, infelizmente não temos mãos o suficiente no momento."
2001202-72 = "Bem, voltando ao trabalho..."
2001202-73 = "Ei, você aí!"
2001202-79 = "É do Departamento de Medicina de Emergência?"
2001202-80 = "Sim, sou a chefe, Sena Himuro. Algum problema?"
2001202-81 = "Che... Chefe...? Peço perdão pela indelicadeza."
2001202-82 = "Na verdade, entre os feridos deitados ali, há um dos mentores do incidente."
2001202-83 = "……Sim, entendo."
2001202-84 = "……E então?"
2001202-85 = "E então, quer dizer..."
2001202-86 = "Então, estou perguntando: o que exatamente você quer que eu faça?"
2001202-87 = "I-Isso é, obviamente, porque precisamos levá-lo para interrogatório, então eu gostaria que você nos entregasse a custódia..."
2001202-88 = "Eu recuso."
2001202-89 = "……Hã?"
2001202-90 = "Os feridos sob os cuidados do Departamento de Medicina de Emergência estão sob nossa jurisdição a partir daquele momento. Não há exceções."
2001202-91 = "Por favor, trate de qualquer medida em relação a esse aluno apenas após o término do tratamento."
2001202-92 = "M-Mas, nós também precisamos investigar as circunstâncias...!"
2001202-93 = "Droga, se é assim, teremos que usar a força..."
2001202-94 = "……Entendo."
2001202-100 = "[ns] \"Err, Sena...?\""
2001202-103 = "……Ele desmaiou."
2001202-104 = "Mais um paciente adicionado."
2001202-105 = "Levem-no na ambulância imediatamente."
2001202-106 = "Sim, senhora!!"
2001202-110 = "[ns3] \"Eh...?\"\n[ns4] \"Isso foi um pouco extremo demais...\""
2001202-111 = "Está tudo bem. Eu apenas o fiz desmaiar com o impacto; não atirei nele de verdade, nem causei ferimentos."
2001202-112 = "Está tudo bem. Eu apenas o fiz desmaiar com o impacto; não atirei nele de verdade, nem causei ferimentos."
2001202-113 = "Julguei que esta seria a melhor forma de resolver as coisas silenciosamente."
2001202-114 = "……Bem."
2001202-121 = "Parece que o carregamento dos corpos já terminou..."
2001202-122 = "[s5] \"Sena, você não corrigiu isso...\"\n[s6] \"Já nem dá mais para esconder...\""
2001202-127 = "De qualquer forma, peço desculpas, mas ainda temos a limpeza para fazer, então ficaremos por aqui."
2001202-128 = "Até mais..."
2001202-134 = "[ns] \"…….\""
2001202-136 = "(E assim, após colocar todos os \"feridos\" na ambulância, Sena e todo o Departamento de Medicina de Emergência desapareceram em alta velocidade...)"
