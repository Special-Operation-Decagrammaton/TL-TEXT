[translation]
1008302-1 = "調停室の番猫"
1008302-5 = "……以上が、今後の運営方針と訓練計画。"
1008302-6 = "これをたたき台にして詰めていけば、より良い協力関係が築けると思う。"
1008302-14 = "私からの話は終わり。"
1008302-15 = "……質問があるなら聞くけど。"
1008302-16 = "[s1] \"うーん、今のところは特にないかな。\"\n[s2] \"資料も説明も分かりやすかったし、完璧だったよ。\""
1008302-19 = "そう。"
1008302-20 = "[s] \"流石はキキョウだね。\""
1008302-21 = "お世辞はいらない。"
1008302-22 = "百花繚乱の作戦参謀だもの、これくらい当然。"
1008302-23 = "……それに私たちにとって、今が一番大事な時期だから。"
1008302-24 = "百花繚乱を以前のような活気に戻すためなら、どんな手段だって厭わない。"
1008302-25 = "先は長いけど、できることから順番にやっていくよ。"
1008302-26 = "[s] \"キキョウが居るなら、百花繚乱は安泰だね。\""
1008302-27 = "……私の話、聞いてなかったの？#n先生を利用するって言ったつもりなんだけど。"
1008302-28 = "それでも構わない？"
1008302-29 = "……お人好し。"
1008302-30 = "あんたがいいなら、ありがたく利用させてもらうけど。#nじゃ、今日の話はここまで。"
1008302-31 = "[s] \"あ、うん。お疲れ様、キキョウ。\""
1008302-32 = "…………。"
1008302-33 = "まあ……"
1008302-34 = "その……"
1008302-35 = "わざわざこっちまで来てくれて、ありが……"
1008302-44 = "……忘れ物が無いか、ちゃんと確認して帰って。"
1008302-45 = "[s] \"えっと……なんだか天井が崩れたような？\""
1008302-46 = "別に、あんたが気にすることじゃない。"
1008302-47 = "はい、出口はあっち。"
1008302-51 = "そこ、気をつけて。"
1008302-52 = "下手に体重をかけたら……"
1008302-59 = "[ns] \"今度は床板が！？\""
1008302-60 = "……大したことじゃないから。"
1008302-61 = "あんたが気にする必要は……"
1008302-67 = "[ns] \"いや、気にしないわけにはいかないけど！？\""
1008302-71 = "……はぁ。"
1008302-73 = "[ns] \"……調停室の老朽化？\""
1008302-74 = "……うん。"
1008302-75 = "調停室は、百花繚乱が設立してからずっと使ってる建物なんだけど……#nあんまり修繕されてなくて。"
1008302-76 = "それに、色んなゴタゴタでしばらく人がいなかったからね。#n急速に老朽化が進んだみたい。"
1008302-77 = "ここだけじゃなく、全体的に修繕しないといけないかも。"
1008302-78 = "でも、これはあくまで私たち百花繚乱の事情。#n先生が気にする必要は無い。"
1008302-79 = "だから、大人しく帰っ……"
1008302-80 = "[s] \"いや、手伝うよ。\""
1008302-84 = "え？"
1008302-85 = "……見て見ぬふりはできない？"
1008302-86 = "……どうして？"
1008302-87 = "[s] \"どうしてと言われても……\""
1008302-88 = "調停室を直したところで、あんたに何の得があるの？"
1008302-89 = "あんたが忙しいのは知ってる。"
1008302-90 = "なのに、わざわざ面倒事に首を突っ込むなんて……"
1008302-91 = "[s] \"生徒が困ってるなら助けたいから。\""
1008302-95 = "はあ……分かった。"
1008302-96 = "まあ、そんなにお節介を焼きたいなら勝手にして。"
1008302-97 = "私は他の仕事があるから手伝えないけど。"
1008302-98 = "……仕事が終わったら自分で直そうと思ってたのに、あんたが勝手に言い出したんだし。"
1008302-99 = "じゃあ、そういうことだから。#n工具なら好きに使っていいよ。"
1008302-100 = "[s] \"分かった、任せて！\""
1008302-113 = "（理解できない）"
1008302-114 = "（生徒が困っているなら助けるのが当たり前、なんて……）"
1008302-115 = "（どうせ、口先だけでしょ）"
1008302-116 = "（見て見ぬふりができないなんて言葉も、保身のためだろうし）"
1008302-117 = "（ずっと放置されてきた建物が、簡単に直るわけないのに）"
1008302-123 = "……ふん。"
1008302-124 = "どうせすぐに音を上げるはず。"
1008302-129 = "（そうして修理を始めてから5時間が経過し……）"
1008302-135 = "[ns] \"床の応急処置は済んだから、次は天井だね。\""
1008302-137 = "……ちょっと待って、まだ続けるの？"
1008302-138 = "[s] \"うん？まだ天井は終わってないよ？\""
1008302-139 = "もうこんな遅い時間なのに？#nあんたって、実は暇なの？"
1008302-140 = "たしかに、修繕を手伝うとは言ったけど……"
1008302-141 = "あと3時間で終わらせるから大丈夫？"
1008302-142 = "……本当、呆れた。"
1008302-146 = "…………。"
1008302-147 = "……分かった。"
1008302-152 = "……ハシゴくらいなら、押さえておいてあげるから。"
1008302-153 = "必要な道具があれば言って。下まで降りるのも大変でしょ。"
1008302-154 = "[s] \"仕事は大丈夫なの？\""
1008302-155 = "……私を誰だと思ってるの？もう終わってる。"
1008302-156 = "それに……あんた一人だと時間かかるでしょ。"
1008302-157 = "……だから、私も手伝う。"
1008302-158 = "[s] \"うん、ありがとう。\""
1008302-159 = "……ふん。"
1008302-166 = "[ns] \"よし、これで大丈夫そうだね。お疲れ様、キキョウ。\""
1008302-167 = "……あんたこそ、お疲れ様。"
1008302-168 = "本当に……今日だけで全部直しちゃうなんて……"
1008302-169 = "……私の負け。"
1008302-170 = "[s] \"そう言われると、ちょっと恥ずかしいかな。\""
1008302-175 = "[ns] \"とりあえず、今度こそ用は済んだし帰るね。\""
1008302-179 = "[ns] \"そんなに強く握られると、シワが……\""
1008302-183 = "……あ。"
1008302-187 = "……いや、その。"
1008302-188 = "もう時間も遅い、し……"
1008302-189 = "シャーレに戻る頃には、お店も閉まってるだろうから……"
1008302-190 = "……だから、今日のお礼に夕食くらい……"
1008302-191 = "……私が作ってあげる。"
1008302-192 = "それだけ。"
1008302-193 = "本当は相応の代価を支払うべきだし、急に夕食に誘われたところで迷惑かもしれないけど――"
1008302-195 = "[ns] \"キキョウの手料理！！！！！\""
1008302-199 = "……誘った私が言うのも何だけど、そこまで嬉しいもの？"
1008302-200 = "さっきから思っていたけど、あんたって本当に……"
1008302-201 = "……変な人。"
1008302-202 = "[s] \"……え！？だって、キキョウの手料理が食べられるんだよ？\""
1008302-203 = "……分かったから。"
1008302-204 = "手でも洗って待ってて。"
1008302-210 = "腕によりをかけて作ってあげる。"
1008302-212 = "（その後、他愛もない話をしながらキキョウと食卓を囲んだ）"
