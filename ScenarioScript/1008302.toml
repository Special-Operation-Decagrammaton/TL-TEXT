[translation]
1008302-1 = "Gato guarda da sala de mediação"

1008302-5 = "...O acima é a futura política de gestão e plano de formação."

1008302-6 = "Acredito que se utilizarmos isto como um trampolim para resolver as coisas, seremos capazes de construir uma melhor relação de cooperação."

1008302-14 = "Esse é o fim da minha história."

1008302-15 = "...Se você tiver alguma dúvida, eu perguntarei."

1008302-16 = "[s1] \"Hmm, não tenho nada em particular a dizer até agora.\"\n[s2] \"Os materiais e as explicações foram fáceis de entender e perfeitos.\""

1008302-19 = "sim."

1008302-20 = "[s] \"Como esperado de Kikyou.\""

1008302-21 = "Eu não preciso de bajulação."

1008302-22 = "É natural que ele seja a equipe estratégica das Cem Flores."

1008302-23 = "...E para nós, agora é o momento mais importante."

1008302-24 = "Estou disposto a fazer o que for preciso para trazer de volta a vibração de Hundred Flowers à sua antiga glória."

1008302-25 = "Temos um longo caminho a percorrer, mas faremos o que pudermos para que isso aconteça."

1008302-26 = "[s] \"Se Bellflower estiver aqui, Hyakka Ryouran estará segura.\""

1008302-27 = "...Você não me ouviu? #nPensei ter dito que usaria o Sensei."

1008302-28 = "Tudo bem?"

1008302-29 = "... Bem-humorado."

1008302-30 = "Se você concordar com isso, agradeceria se você pudesse usá-lo. #nOk, por hoje é tudo."

1008302-31 = "[s] \"Ah, sim. Obrigado pelo seu trabalho duro, Kikyo.\""

1008302-32 = "…………."

1008302-33 = "Oh céus……"

1008302-34 = "o……"

1008302-35 = "Obrigado por vir até aqui..."

1008302-44 = "...Certifique-se de verificar se não esqueceu nada antes de voltar para casa."

1008302-45 = "[s] \"Hum... parece que o teto desabou?\""

1008302-46 = "Não é realmente da sua conta."

1008302-47 = "Sim, a saída é ali."

1008302-51 = "Tenha cuidado aí."

1008302-52 = "Se você colocar seu peso mal nisso..."

1008302-59 = "[ns] \"As tábuas do piso desta vez!?\""

1008302-60 = "...Não é grande coisa."

1008302-61 = "O que você precisa se preocupar é..."

1008302-67 = "[ns] \"Não, não posso deixar de me preocupar com isso!?\""

1008302-71 = "... Haa."

1008302-73 = "[ns] \"...A sala de mediação está em ruínas?\""

1008302-74 = "……Sim."

1008302-75 = "A sala de arbitragem é um prédio que Hyakka Ryouran usa desde que foi fundada...#nNão foi muito reparado."

1008302-76 = "Além disso, não havia muitas pessoas por perto por um tempo devido a toda a bagunça. #nParece que está se tornando obsoleto rapidamente."

1008302-77 = "Pode ser necessário reparar tudo, não apenas esta parte."

1008302-78 = "No entanto, esta é apenas a nossa situação. #nNão há necessidade de o Sensei se preocupar."

1008302-79 = "Então, vá para casa em silêncio..."

1008302-80 = "[s] \"Não, eu vou te ajudar.\""

1008302-84 = "foto?"

1008302-85 = "...Você não pode simplesmente fechar os olhos?"

1008302-86 = "……Por que?"

1008302-87 = "[s] \"Não importa o que você pergunte...\""

1008302-88 = "O que você ganha consertando a sala de mediação?"

1008302-89 = "Eu sei que você está ocupado."

1008302-90 = "Mas por que se preocupar com tantos problemas..."

1008302-91 = "[s] \"Se um aluno estiver com problemas, quero ajudá-lo.\""

1008302-95 = "Ah... eu entendo."

1008302-96 = "Bem, se você quer fazer tanto barulho, faça o que quiser."

1008302-97 = "Não posso ajudar porque tenho outro trabalho a fazer."

1008302-98 = "...Eu estava planejando consertar sozinho depois do trabalho, mas você mesmo disse."

1008302-99 = "Bem, é isso que é. #nSe for uma ferramenta, você pode usá-la como quiser."

1008302-100 = "[s] \"Ok, deixe comigo!\""

1008302-113 = "(Eu não entendo)"

1008302-114 = "(Se um aluno está com problemas, é natural ajudá-lo...)"

1008302-115 = "(De qualquer forma, é apenas da boca para fora.)"

1008302-116 = "(O ditado de que você não pode fechar os olhos provavelmente é para autopreservação.)"

1008302-117 = "(Não há como um prédio que está abandonado há muito tempo ser reparado facilmente.)"

1008302-123 = "...Hmph."

1008302-124 = "Eu deveria levantar minha voz logo de qualquer maneira."

1008302-129 = "(Cinco horas se passaram desde que o reparo começou...)"

1008302-135 = "[ns] \"Agora que fizemos os primeiros socorros no chão, vamos passar para o teto.\""

1008302-137 = "...Espere um minuto, deseja continuar?"

1008302-138 = "[s] \"Sim? O teto ainda não está terminado?\""

1008302-139 = "Já é tão tarde? #nVocê realmente tem tempo livre?"

1008302-140 = "Eu disse que ajudaria nos reparos, mas..."

1008302-141 = "Tudo bem se eu terminar em 3 horas?"

1008302-142 = "...Fiquei muito decepcionado."

1008302-146 = "…………."

1008302-147 = "...Eu entendo."

1008302-152 = "...Se for apenas uma escada, eu seguro para você."

1008302-153 = "Deixe-me saber se você precisar de alguma ferramenta. Deve ser difícil chegar ao fundo."

1008302-154 = "[s] \"O trabalho está bem?\""

1008302-155 = "...Quem você pensa que eu sou? Já acabou."

1008302-156 = "Além disso... levaria muito tempo se você estivesse sozinho."

1008302-157 = "...É por isso que vou ajudar também."

1008302-158 = "[s] \"Sim, obrigado.\""

1008302-159 = "...Hmph."

1008302-166 = "[ns] \"Ok, parece que está tudo bem agora. Obrigado pelo seu trabalho duro, Kikyo.\""

1008302-167 = "... Obrigado pelo seu trabalho duro."

1008302-168 = "Sério... não acredito que vou consertar tudo só hoje..."

1008302-169 = "...Minha perda."

1008302-170 = "[s] \"Fico um pouco envergonhado quando você diz isso.\""

1008302-175 = "[ns] \"De qualquer forma, desta vez terminarei meus negócios e irei para casa.\""

1008302-179 = "[ns] \"Se você apertar com tanta força, vai ficar com rugas...\""

1008302-183 = "……um."

1008302-187 = "...Não, é isso."

1008302-188 = "Já é tarde..."

1008302-189 = "Quando eu voltar para a placa de Petri, a loja provavelmente estará fechada..."

1008302-190 = "...Então, como forma de agradecimento por hoje, vou jantar..."

1008302-191 = "...Eu farei isso para você."

1008302-192 = "É isso."

1008302-193 = "Na verdade, você deveria pagar um preço adequado, e pode ser um incômodo se você me convidar de repente para jantar, mas..."

1008302-195 = "[ns] \"A comida caseira do Kikyou!!!!!!!\""

1008302-199 = "...Não tenho certeza do que estou dizendo depois de convidá-la, mas estou realmente feliz com isso?"

1008302-200 = "Já venho pensando nisso há algum tempo, mas você está realmente..."

1008302-201 = "...Pessoa estranha."

1008302-202 = "[s] \"...Eh!? Porque você pode comer a comida da Kikyou, certo?\""

1008302-203 = "...Porque eu entendo."

1008302-204 = "Lave as mãos e espere."

1008302-210 = "Vou me apoiar no meu braço e fazer isso para você."

1008302-212 = "(Depois, sentei-me à mesa com Kikyou, conversando sobre coisas triviais.)"

