[translation]
1010702-1 = "万魔殿の書記"
1010702-3 = "やっほ～！#n「週刊万魔殿」でーす！"
1010702-4 = "[s] \"ドア開いてるから入っていいよ。\""
1010702-9 = "こんにちは～！"
1010702-10 = "あ、もしかして、お取込み中でしたか？"
1010702-11 = "[s] \"ううん、ちょうど暇だったんだ。\""
1010702-12 = "そうですか！では、失礼しますね～"
1010702-16 = "いやぁ～シャーレはいいですね！快適！#n先生はいつもここでお仕事してるんですか？"
1010702-17 = "空気が良いからか、先生の肌もツヤツヤしてますね～！"
1010702-18 = "[s] \"えと……肌はいつも通りかな。\""
1010702-19 = "まあまあ、細かいことは置いといて！"
1010702-20 = "では、先生へのプレゼント！イッツショータイムです！"
1010702-21 = "じゃーん！「週刊万魔殿」の最新号！"
1010702-22 = "え、初めて見た……？"
1010702-23 = "そうなんですか……？"
1010702-24 = "ゲヘナで絶大な人気を誇り、信頼できると評判の「週刊[ruby=ぱんでも]万魔殿[/ruby]」を……#nまだご覧になってないのですか……！？"
1010702-25 = "そんな……それはあんまりにも……。"
1010702-26 = "[s] \"チアキ？\""
1010702-27 = "最っっっっ高ですね！！"
1010702-28 = "初めて「週刊万魔殿」を読む瞬間をこの目に焼きつけられるなんて！"
1010702-29 = "先生の生々しい反応をすぐ隣で観察できる幸せ……テンション上がりますね！"
1010702-30 = "さあ、とくとご覧あれ！――「特集！万魔殿の休憩室訪問記」、#n「独占！イブキちゃんの砂遊び記録」などなど！今週も情報目白押し！"
1010702-31 = "ぜひお楽しみください！"
1010702-32 = "[s] \"あ、うん。ありがとう。\""
1010702-33 = "もしよかったら、私が朗読しましょうか？"
1010702-34 = "書記兼、「週刊万魔殿」の記者兼、編集長兼、発行人であるこの私、[ruby=もとみや]元宮[/ruby]チアキと一緒に読めちゃう特別なサービス！"
1010702-35 = "どうですか？やっちゃいます？"
1010702-36 = "[s1] \"大丈夫、一人で読むよ。\"\n[s2] \"じゃあ、頼んでみようかな。\""
1010702-37 = "え、そうですか？ほんとに？"
1010702-38 = "これ、滅多にないサービスなんですよ？この機会を逃したら後悔するかもですよ？"
1010702-42 = "え？冗談、ですか？"
1010702-43 = "ははっ！なんだ、そういうことですか！先生って面白いですね！"
1010702-44 = "ナイスチョイス～！"
1010702-45 = "では、お任せください！"
1010702-46 = "まず、1ページ目からですね！こ[ruby=パンデモニウム・ソサエティー]こが万魔殿の執[/ruby]務室です！"
1010702-47 = "私や他の議員たちが毎日訪れる場所ですね。授業がない時は大体ここにいますよ！"
1010702-48 = "ここのソファ、めっちゃふわふわしてて寝心地バツグンなんです！あとで先生も横になってみてください！"
1010702-49 = "執務室なのに仕事は、ですか？"
1010702-50 = "ま、まあ、私は書記ですし、会議の時はちゃんと……"
1010702-51 = "そういえば会議って滅多にやってないような……議事録っていつ書いてたっけ……ま、いっか。"
1010702-52 = "では、次のページ！"
1010702-53 = "あ、ここはかなり力を入れた記事なんですよ！読み上げますね～！"
1010702-55 = "（その後も、チアキと一緒に「週刊万魔殿」を読んだ……）"
1010702-57 = "あっ、もう最後のページだ。"
1010702-58 = "いやぁ～あっという間でしたね。"
1010702-59 = "どうですか、先生？初めて読んでみた感想は？"
1010702-60 = "[s] \"うん、面白かったよ。\""
1010702-61 = "へへ、やっぱり見る目ありますね～！"
1010702-62 = "ではでは～ここからが本題！"
1010702-63 = "定期購読、いかがですか？"
1010702-64 = "毎週新しい内容の「週刊万魔殿」をお届けしますよ！"
1010702-65 = "今なら豪華プレゼントもついてくる！"
1010702-66 = "[s] \"いいね。購読しようか。\""
1010702-67 = "ほ、本当ですか？"
1010702-68 = "やった！ありがとうございます～！ゲヘナ外の定期購読者、初めてかも！"
1010702-69 = "[s] \"購読料はいくらなの？\""
1010702-70 = "あ、無料です。"
1010702-71 = "別にお金儲けでやってるわけじゃないんで。半分は趣味ですね！"
1010702-72 = "印刷費や発行費などの諸経費は、すべて万魔殿の予算でカバーしています！"
1010702-73 = "[s] \"……大丈夫なの、それ？\""
1010702-74 = "マコト先輩も万魔殿の名が広まることに異論はないといってますし……"
1010702-75 = "ま、いいんじゃないですか？"
1010702-76 = "[s] （本当にいいのかな……）"
1010702-80 = "では！こちらにご署名をお願いします！"
1010702-81 = "これですか？購読者の名簿です！"
1010702-85 = "はい！ありがとうございます！"
1010702-86 = "まさかこんなに快く定期購読してくださるなんて……シャーレまで足を運んだ甲斐がありました！"
1010702-87 = "[s] \"いつもこんな風に宣伝してるの？\""
1010702-88 = "モモトークか電話での営業が多いですけど……時間ある時はこうやって訪問してますね。"
1010702-89 = "新しい生徒さんとお喋りするのって楽しいですし、読者が増える姿をこの目で見るのが好きなので！"
1010702-90 = "それに……"
1010702-91 = "「インタビュー！この人と会ってみた！」コーナーのネタ探しにもなるので、できるだけ人と接するようにしてるんです！"
1010702-92 = "……いつか先生のことも取材してみたいなぁ、とは思ってますけど～！"
1010702-93 = "[s] \"仕事がない時は、いつでも大丈夫だよ。\""
1010702-94 = "本当ですか？ありがとうございます！"
1010702-95 = "感謝のお礼に、次号の「週刊万魔殿」は2部お送りしますね！"
1010702-96 = "もしよかったら、他の生徒さんにもぜひ～！"
