[translation]
1010702-1 = "Secretário do Salão dos Demônios"

1010702-3 = "Yaho! #nÉ \"Weekly Manmaden\"!"

1010702-4 = "[s] \"A porta está aberta, então você pode entrar.\""

1010702-9 = "Olá!"

1010702-10 = "Ah, por acaso você estava ocupado?"

1010702-11 = "[s] \"Não, só tive um tempo livre.\""

1010702-12 = "é assim mesmo! Agora, por favor, me desculpe ~"

1010702-16 = "Bem, a placa de Petri é ótima! confortável! #nO Sensei sempre trabalha aqui?"

1010702-17 = "Talvez porque o ar esteja agradável, a pele da Senseia também esteja brilhando!"

1010702-18 = "[s] \"Hum... acho que minha pele está a mesma de sempre.\""

1010702-19 = "Bom, vamos deixar os detalhes de lado!"

1010702-20 = "Agora, um presente para o Sensei! É hora do show!"

1010702-21 = "Yay! A última edição do “Weekly Manmaden”!"

1010702-22 = "Huh, é a primeira vez que vejo isso...?"

1010702-23 = "É assim mesmo...?"

1010702-24 = "\"Weekly\" é extremamente popular na Gehenna e tem a reputação de ser confiável...#nVocê ainda não viu? ?"

1010702-25 = "Isso... isso é demais..."

1010702-26 = "[s] \"Chiaki?\""

1010702-27 = "É o mais caro! !"

1010702-28 = "Não acredito que me lembro do momento em que li “Weekly Manmaden” pela primeira vez!"

1010702-29 = "A alegria de poder observar as reações vívidas do Sensei bem ao seu lado... isso te deixa animado!"

1010702-30 = "Agora, dê uma olhada! --\"Recurso especial! Uma visita ao banheiro do Tenmaden\", #n \"Exclusivo! O recorde de Ibuki-chan brincando na areia\" e muito mais! Esta semana está recheada de informações!"

1010702-31 = "Por favor, aproveite!"

1010702-32 = "[s] \"Ah, sim. Obrigado.\""

1010702-33 = "Se quiser, posso ler em voz alta?"

1010702-34 = "Um serviço especial onde você pode ler comigo, Chiaki, que também é secretária, repórter, editora-chefe e editora do \"Weekly Manmaden\"!"

1010702-35 = "O que você acha? Você vai fazer isso?"

1010702-36 = "[s1] \"Tudo bem, vou ler sozinho.\"\n[s2] \"Então, acho que vou perguntar.\""

1010702-37 = "Ah, é mesmo? Realmente?"

1010702-38 = "Este é um serviço raro? Você pode se arrepender se perder esta oportunidade."

1010702-42 = "foto? você está brincando?"

1010702-43 = "Haha! O que, é isso que você quer dizer? Os Senseies são interessantes!"

1010702-44 = "Boa escolha!"

1010702-45 = "Pois bem, deixe comigo!"

1010702-46 = "Vamos começar pela primeira página! Este é o escritório!"

1010702-47 = "É um lugar que eu e outros membros do Congresso visitamos todos os dias. Geralmente estou aqui quando não tenho aulas!"

1010702-48 = "O sofá aqui é super fofinho e super confortável! Mais tarde, o Sensei também pode deitar!"

1010702-49 = "Você está trabalhando mesmo estando no escritório?"

1010702-50 = "Bem, eu sou secretária, então quando tenho uma reunião eu faço direitinho..."

1010702-51 = "Agora que penso nisso, parece que raramente temos reuniões... Quando você anotou as atas... Bem, tudo bem."

1010702-52 = "Então, próxima página!"

1010702-53 = "Ah, este é um artigo com muito esforço investido! Vou ler em voz alta!"

1010702-55 = "(Mesmo depois disso, li “Weekly Manmaden” com Chiaki…)"

1010702-57 = "Ah, é a última página."

1010702-58 = "Nossa, passou tão rápido."

1010702-59 = "O que você acha, senhor? O que você pensou quando leu pela primeira vez?"

1010702-60 = "[s] \"Sim, foi interessante.\""

1010702-61 = "Hehe, afinal você tem olhos para ver!"

1010702-62 = "Pois bem, aqui está o tópico principal!"

1010702-63 = "Que tal uma assinatura regular?"

1010702-64 = "Entregaremos novos conteúdos todas as semanas no \"Weekly Manmaden\"!"

1010702-65 = "Agora vem um presente luxuoso!"

1010702-66 = "[s] \"Gostei. Devo me inscrever?\""

1010702-67 = "Ah, é verdade?"

1010702-68 = "Yay! Muito obrigado! Este pode ser meu primeiro assinante fora da Gehenna!"

1010702-69 = "[s] \"Quanto é a taxa de assinatura?\""

1010702-70 = "Ah, é grátis."

1010702-71 = "Não estou fazendo isso para ganhar dinheiro. Metade disso é um hobby!"

1010702-72 = "Todas as despesas diversas, como custos de impressão e publicação, são cobertas pelo orçamento do Manmaden!"

1010702-73 = "[s] \"...Você está bem?\""

1010702-74 = "Makoto-senpai também diz que não tem nenhuma objeção ao nome de Manmaden se tornar mais difundido..."

1010702-75 = "Bem, não está bem?"

1010702-76 = "[s] (me pergunto se é realmente bom...)"

1010702-80 = "Pois bem! Assine aqui, por favor!"

1010702-81 = "É isso? Aqui está a lista de assinantes!"

1010702-85 = "sim! obrigado!"

1010702-86 = "Nunca esperei que as pessoas estivessem tão dispostas a se inscrever... valeu a pena ir até a placa de Petri!"

1010702-87 = "[s] \"Você sempre anuncia assim?\""

1010702-88 = "A maior parte dos meus negócios é feita através do MomoTalk ou por telefone, mas quando tenho tempo, visito-os desta forma."

1010702-89 = "É divertido conversar com novos alunos e adoro ver o número de leitores aumentar com meus próprios olhos!"

1010702-90 = "E..."

1010702-91 = "Também me ajuda a encontrar material para a \"Entrevista! Conheci essa pessoa!\" canto, então procuro interagir o máximo possível com as pessoas!"

1010702-92 = "...Eu gostaria de entrevistar o Sensei algum dia!"

1010702-93 = "[s] \"Se você não tem trabalho, está sempre tudo bem.\""

1010702-94 = "É verdade? obrigado!"

1010702-95 = "Como forma de agradecimento, enviarei a vocês dois exemplares da próxima edição do Weekly Manmaden!"

1010702-96 = "Se quiser, compartilhe com outros alunos!"

