[translation]
2004008-1 = "Kyogoku Satsuki está tremendo."
2004008-3 = "Olá? Sensei."
2004008-4 = "[s] \"Olá, Satsuki. Acho que as coisas vão ficar movimentadas, então conto com você.\""
2004008-5 = "Ufufu. Schale, uma das instituições mais importantes de Kivotos..."
2004008-6 = "Ou seja, pode-se dizer que é um lugar diretamente conectado a informações confidenciais que pessoas comuns não conseguiriam acessar."
2004008-7 = "E a chefe do Departamento de Informações de Gehenna, uma das instituições mais importantes. Esta Kyogoku Satsuki é a pessoa certa para este trabalho."
2004008-8 = "Vou conseguir o máximo de informações possíveis de Schale."
2004008-9 = "[s1] \"É só trabalho administrativo...\"\n[s2] \"Por favor, cuide disso.\""
2004008-15 = "Que quantidade enorme."
2004008-16 = "Será que o objetivo é encontrar a informação verdadeira no meio disso tudo?"
2004008-17 = "Não é apenas coleta de informações, mas também exigem capacidade de análise..."
2004008-18 = "Vou terminar isso num instante."
2004008-20 = "(Se fosse um trabalho que terminasse rápido dependendo da minha motivação, seria bom...)"
2004008-22 = "(No fim, já estava de noite quando terminei)"
2004008-25 = "O que achou? Minha capacidade de processamento. Foi num piscar de olhos, não foi?"
2004008-26 = "[s] \"É verdade... Bom trabalho.\""
2004008-27 = "Foi um dia em que pude demonstrar minhas habilidades como oficial de processamento de informações."
2004008-28 = "Pode ficar tranquilo quando eu estiver de plantão daqui em diante, viu? Ufufu."
2004008-29 = "Bem, já estou com fome, então está na hora de..."
2004008-35 = "Ué?"
2004008-46 = "……！！"
2004008-47 = "[ns] \"Ah, acabou a luz...\""
2004008-49 = "[ns] \"O trabalho já está terminado e eu salvei tudo, então está tudo bem.\""
2004008-50 = "……。"
2004008-51 = "[s] \"……Satsuki……?\""
2004008-52 = "……。"
2004008-53 = "[s3] \"Satsuki?\"\n[s4] \"Você está bem?\""
2004008-56 = "……！"
2004008-57 = "E-eu só me assustei um pouco porque ficou escuro de repente."
2004008-58 = "Que situação complicada, acabar a luz logo agora..."
2004008-59 = "[s] \"Pois é. E olha que já estamos saindo...\""
2004008-64 = "！！！"
2004008-70 = "[ns] \"O vento está forte. A janela abriu...\""
2004008-74 = "[ns] \"Sa, Satsuki!?\""
2004008-76 = "Ugh... Eu só me assustei com o barulho alto!"
2004008-80 = "Ufa... S-Sensei? Onde você está? #nEstá tão escuro que não consigo ver nada."
2004008-81 = "……É aí? #n……Espere, estou indo até você."
2004008-85 = "Poderia continuar fazendo algum barulho para que eu saiba onde você está?"
2004008-86 = "Assobiar, cantar, sapatear, qualquer coisa serve..."
2004008-87 = "[s] \"Não, acho que assim está tudo bem...\""
2004008-94 = "[ns] \"As coisas que estavam na mesa por causa do vento...\""
2004008-98 = "[ns] \"Satsuki, você está bem...?\""
2004008-100 = "E-estou bem, Sensei. Mas este lugar é perigoso. Está muito escuro..."
2004008-101 = "D-de qualquer forma, é perigoso, Sensei. Não se afaste de mim. #nAbsolutamente, não se afaste de jeito nenhum."
2004008-105 = "[ns] \"Satsuki, será que...\""
2004008-107 = "[ns] \"Você está com medo?\""
2004008-108 = "Como esperado, o Sensei percebe tudo..."
2004008-109 = "Descobrir meu ponto fraco num instante desses."
2004008-110 = "[s] \"Não, é que está bem óbvio...\""
2004008-111 = "Com certeza não adianta negar agora."
2004008-112 = "É... eu detesto lugares escuros e coisas assustadoras."
2004008-113 = "Exatamente como a situação de agora."
2004008-114 = "Se o Sensei não estivesse aqui... eu provavelmente teria desmaiado..."
2004008-118 = "Quanto tempo será que essa queda de energia vai durar..."
2004008-122 = "“Não sabe”...? Por que não? É sobre o Schale, não é? #nPelo menos isso você deveria saber..."
2004008-123 = "Ugh... não quero... continuar ficando em um lugar escuro assim..."
2004008-124 = "[s] \"Então vamos esperar juntos até que a energia volte.\""
2004008-125 = "É verdade. Parece melhor esperar ficar claro para nos movermos."
2004008-126 = "Sensei, venha aqui. Não se afaste! De jeito nenhum!"
2004008-128 = "(Segurei a mão de Satsuki até que ela parasse de tremer e tentei puxar vários assuntos)"
2004008-132 = "!!"
2004008-140 = "[ns] \"Oh, voltou.\""
2004008-141 = "Ufa... finalmente."
2004008-145 = "Então, Sensei. Vamos voltar?"
2004008-146 = "[s5] \"Fico feliz que você esteja bem.\" \n[s6] \"É verdade, vamos embora!\""
2004008-152 = "Ah... o Sensei descobriu meu ponto fraco de novo."
2004008-153 = "Quando estou com o Sensei, as coisas nunca saem como planejado."
2004008-154 = "Mas... será que está tudo bem?"
2004008-155 = "Pelo que parece, o Sensei não é o tipo de pessoa que usaria meu ponto fraco contra mim... não é?"
2004008-156 = "[s] \"Com certeza. Você é uma aluna importante.\""
2004008-157 = "Fufu... eu sabia que você diria isso."
2004008-158 = "Bem, se eu estivesse no seu lugar, eu usaria isso sem hesitar."
2004008-159 = "[s] \"O quê!?\""
2004008-160 = "Ahaha! Que boa reação. #nBem, já que ouvi o que queria..."
2004008-165 = "Vamos comer alguma coisa? Estou com fome!"
2004008-167 = "(Terminei uma refeição agradável com Satsuki e a levei até o dormitório)"
