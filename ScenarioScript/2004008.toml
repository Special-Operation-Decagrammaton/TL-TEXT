[translation]
2004008-1 = "京極サツキは震えている"
2004008-3 = "こんにちは？先生。"
2004008-4 = "[s] \"こんにちは、サツキ。忙しくなると思うけどよろしく。\""
2004008-5 = "うふふっ。キヴォトス最重要機関の一つであるシャーレ……"
2004008-6 = "つまり、普通の人では閲覧できないような機密情報と直結する場とも言えるわね。"
2004008-7 = "そして最重要機関の一つである、ゲヘナ情報部のトップ。#nこの[ruby=きょうごく]京極[/ruby]サツキこそ、この仕事にふさわしい人材。"
2004008-8 = "シャーレから得られる情報を最大限手に入れて見せるわ。"
2004008-9 = "[s1] \"ただの事務作業だよ……。\"\n[s2] \"これ、よろしくね。\""
2004008-15 = "すごい量だわ。"
2004008-16 = "この中から本物を見つけろ、ということかしら？"
2004008-17 = "情報収集だけでなく、分析能力も必要とされているのね……。"
2004008-18 = "こんなもの、すぐ終わらせてみせるわ。"
2004008-20 = "（やる気次第で早く終わる作業ならよかったものの……）"
2004008-22 = "（結局終わる頃には夜になっていた）"
2004008-25 = "どうかしら？私の処理能力。一瞬だったでしょう？"
2004008-26 = "[s] \"そうだね……お疲れ様。\""
2004008-27 = "情報処理員としての優秀な腕前を披露できた日だったわね。"
2004008-28 = "これからも私が当番の時は安心していいわよ？うふふっ。"
2004008-29 = "それじゃ、お腹も空いてきたしそろそろ……"
2004008-35 = "あら？"
2004008-46 = "……！！"
2004008-47 = "[ns] \"あ、停電だ……。\""
2004008-49 = "[ns] \"仕事は片づいてるし、保存もしたからよかった。\""
2004008-50 = "……。"
2004008-51 = "[s] \"……サツキ……？\""
2004008-52 = "……。"
2004008-53 = "[s3] \"サツキ？\"\n[s4] \"大丈夫？\""
2004008-56 = "……！"
2004008-57 = "い、いきなり暗くなったから、ちょっと驚いただけよ。"
2004008-58 = "このタイミングで停電なんて、困ったわね……。"
2004008-59 = "[s] \"そうだね。もう退勤なのに……。\""
2004008-64 = "！！！"
2004008-70 = "[ns] \"風が強いね。窓が開いちゃった……。\""
2004008-74 = "[ns] \"さ、サツキ！？\""
2004008-76 = "うっ……大きな音に驚いただけよ！"
2004008-80 = "ふぅ……せ、先生？どこにいるのかしら？#n暗くてよく見えないんだけど。"
2004008-81 = "……そっち？#n……待ってて、私がそっちに行くわ。"
2004008-85 = "先生の位置が分かるように、何か音を出し続けてもらえないかしら？"
2004008-86 = "口笛とか、歌うとか、タップダンスとか、何でもいいから……。"
2004008-87 = "[s] \"いや、このままで多分大丈……\""
2004008-94 = "[ns] \"机の上に置いた物が風で……。\""
2004008-98 = "[ns] \"サツキ、大丈夫……？\""
2004008-100 = "だ、大丈夫よ先生。ただここは危険ね。すごく暗いし……"
2004008-101 = "と、とにかく危ないわ、先生。私から離れないでちょうだい。#n絶対、絶対離れないでよ。"
2004008-105 = "[ns] \"サツキ、もしかして……\""
2004008-107 = "[ns] \"怖いの？\""
2004008-108 = "やっぱり、先生はなんでもお見通しなのね……。"
2004008-109 = "この一瞬で私の弱点を見破るなんて。"
2004008-110 = "[s] \"いや、すごく分かりやす……\""
2004008-111 = "きっとここで否定しても意味ないのでしょう。"
2004008-112 = "そう……私は暗い場所と怖いものが大の苦手よ。"
2004008-113 = "まさに今みたいな状況だわ。"
2004008-114 = "先生が居なければ……気を失っていたかもしれない……。"
2004008-118 = "この停電、いつまで続くのかしら……。"
2004008-122 = "「分からない」……？何でよ？シャーレのことでしょう？#nこれくらい知っといてよ……。"
2004008-123 = "うう……イヤよ……こんな暗い場所に居続けるのなんて……。"
2004008-124 = "[s] \"それじゃ復旧するまで一緒に待とっか。\""
2004008-125 = "そうね。明るくなってから動いた方がよさそうだわ。"
2004008-126 = "先生、こっちに来てちょうだい。絶っ対！離れないでよ。"
2004008-128 = "（サツキの震えが止まるまで手を握り、いろんな話題を振ってみた）"
2004008-132 = "！！"
2004008-140 = "[ns] \"おっ、戻った。\""
2004008-141 = "ふぅ…………やっとね。"
2004008-145 = "それじゃあ、先生。帰りましょうか？"
2004008-146 = "[s5] \"元気になってよかった。\"\n[s6] \"そうだね、帰ろう！\""
2004008-152 = "はぁ……先生にまた弱点がバレてしまったわ。"
2004008-153 = "先生といる時は、計画通りいかないことばかりね。"
2004008-154 = "でも……大丈夫かしら。"
2004008-155 = "見た感じ、先生は私の弱点を悪用するような人ではなさそうだし……そうよね？"
2004008-156 = "[s] \"そうだね。大事な生徒だから。\""
2004008-157 = "ふふっ……そう言うと思ったわ。"
2004008-158 = "まあ、私が逆の立場だったら、積極的に利用するけど。"
2004008-159 = "[s] \"ええっ！？\""
2004008-160 = "アハッ！いい反応。#nじゃあ、その言葉も聞けたことだし……"
2004008-165 = "何か食べに行きましょうか？お腹が空いたわ！"
2004008-167 = "（サツキとの楽しい食事を終え、寮まで送ってあげた）"
