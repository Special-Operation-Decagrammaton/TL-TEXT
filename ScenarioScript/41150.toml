[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 10/06.
41150-1 = "Episódio 15: Uma Derrota Discreta, mas Dolorosa"
41150-2 = "Parque dos Coelhinhos"
41150-6 = "Quem diria que ia aparecer um maluco querendo comprar aquela sucata enferrujada... que bizarro."
41150-7 = "E-E ele pagou tudo na hora, em dinheiro vivo..."
41150-8 = "É a primeira vez na vida que eu vejo um bolo de notas tão grosso..."
41150-10 = "……Mas não acharam aquele cara suspeito demais?"
41150-11 = "Ele tava com o rosto todo coberto, não fez vistoria pra checar o estado da mercadoria... e pagou o preço cheio na hora sem pechinchar um centavo."
41150-12 = "Vai ver que esse dinheiro é tudo nota falsa ou lavada, não acham?"
41150-13 = "Ah, que se dane de onde veio a grana! Contanto que dê pra comprar brinquedos explosivos novos, por mim tá suave."
41150-14 = "……Mas vem cá, Saki. A gente tá montada na grana, por que diabos a sua primeira compra foi combustível sólido e gasolina?!"
41150-15 = "A gente devia tá comprando C4 e explosivo plástico pra fazer um estrago!"
41150-16 = "Você pretende acender o fogão e cozinhar arroz com C4, sua psicopata?! E outra, a gente precisa de combustível pra botar o nosso helicóptero no ar."
41150-17 = "Nem tudo numa guerra se resolve só socando mais poder de fogo goela abaixo."
41150-18 = "Cê tá maluca?! Fogo e explosão resolvem 99% dos problemas num campo de batalha!"
41150-19 = "De qualquer forma, o saldo final foi positivo."
41150-20 = "Com isso, conseguimos recuperar uma parte do nosso poder tático."
41150-21 = "Se algum intruso tentar a sorte agora, a gente tem chumbo suficiente pra mandar de volta..."
41150-23 = "S-Socorro... me ajudem...!"
41150-35 = "Falando no diabo."
41150-36 = "Kuhihi... Timing perfeito. Que tal a gente testar o nosso chumbo novo no lombo dele?"
41150-38 = "Já esqueceram do meu rosto?! E eu acabei de gritar por 'socorro', vocês são surdas?!"
41150-39 = "……O que aconteceu dessa vez?"
41150-40 = "Por princípio, a SRT não tem jurisdição nem intenção de se envolver em rixas de civis."
41150-41 = "Pois é. Se a chapa esquentou pro seu lado, vai chorar pros seus amiguinhos da tal 'Feli-alguma coisa'."
41150-42 = "É FELISEM! 'Reunião Daqueles que Buscam a Felicidade Certa Mesmo Sem Possuir Nada'!"
41150-43 = "E, para a minha tragédia, a nossa irmandade foi completamente estraçalhada..."
41150-44 = "Nossos números já estavam caindo, e de repente, as tropas do Escritório de Segurança Pública da Valkyrie invadiram e passaram o rodo na gente...!"
41150-45 = "……Segurança Pública?"
41150-46 = "A elite da Valkyrie não ia descer do pedestal pra sujar as mãos batendo em mendigos de rua."
41150-47 = "S-Será que você não confundiu com a Guarda de trânsito...?"
41150-48 = "Não, eu tenho absoluta certeza! Eu vi com esses dois olhos que a terra há de comer!"
41150-49 = "Aquela 'Cachorra Louca' profanando e destruindo o nosso santuário usando um armamento bizarro que eu nunca vi na vida!"
41150-50 = "[s1] \"Cachorra Louca...\"\n[s2] \"Você tá falando da Kanna...?\""
41150-55 = "……Ei, fica quieto. Deixa eu analisar a marca de bala na sua roupa."
41150-61 = "Pelo padrão de queima e a dureza do impacto nesse ângulo de penetração..."
41150-62 = "Isso aqui é uma munição HEIAP (Alto Explosivo Incendiário Anti-Blindagem)."
41150-63 = "[s] \"Dá pra saber tudo isso só olhando pro buraco na roupa?\""
41150-64 = "Não 100%, mas isso é o ABC da balística avançada nos nossos manuais."
41150-65 = "……Mas eu nunca vi munição HEIAP desse calibre em circulação."
41150-66 = "Isso não é produzido em massa. O custo de fabricação pra munição de fuzil individual é absurdo e a logística é horrível."
41150-67 = "Se formos procurar a origem dessa bala... O único lugar provável..."
41150-68 = "Seria a 'Kaiser Industry'."
41150-73 = "Então, juntando as peças... O cliente anônimo que limpou o estoque bélico da Kaiser..."
41150-74 = "E-Era a própria Academia Valkyrie...? Mas com que dinheiro...?"
41150-80 = "（Flashback da Kirino: \"E pelo que falam por aí, a Valkyrie inteira tá no vermelho no banco... A gente pena até pra conseguir recarga de munição básica.\"）"
41150-81 = "（Flashback da Kirino: \"Se a coisa continuar assim, o arsenal da Academia Valkyrie vai acabar parecendo de brinquedo perto do deles.\"）"
41150-83 = "O que foi, Sensei? Viu um fantasma?"
41150-84 = "[s] \"Ah, desculpa. Apenas ligando uns pontos na cabeça.\""
41150-85 = "Achei que o velhote tivesse tirando um cochilo de olho aberto."
41150-86 = "Sonhar acordado é um talento pra poucos, hehe~."
41150-87 = "Enfim, meus pêsames por terem sido atropelados pela Valkyrie."
41150-89 = "Pêsames o caramba! Isso não é um problema só meu, suas antas!"
41150-90 = "A Segurança Pública não tá caçando só os mendigos! Elas tão varrendo o perímetro inteiro e enxotando quem tiver no caminho!"
41150-91 = "Se elas arrombarem os portões daqui agora mesmo, não seria uma surpre――"
41150-96 = "……Guhah!!"
41150-106 = "……Animais selvagens encurralados tendem a correr em direção à matilha mais forte para pedir abrigo."
41150-111 = "Então você veio engatinhando para cá. Poupou o meu tempo de farejar o rastro."
41150-113 = "Próximo Episódio: Propina"