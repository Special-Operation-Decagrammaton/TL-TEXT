[translation]
41150-1 = "Episódio 15; Uma derrota pequena, porém certa"
41150-2 = "Parque dos Coelhinhos"
41150-6 = "Quem diria que alguém iria querer aquele míssil enferrujado... é surpreendente."
41150-7 = "E, além disso, tudo em dinheiro vivo..."
41150-8 = "É a primeira vez que vejo essa quantidade de dinheiro..."
41150-10 = "……Aquele cara, ele parece suspeito."
41150-11 = "Ele escondeu o rosto com habilidade, nem checou o estado da arma... e nem tentou negociar o preço com essa quantia."
41150-12 = "Será que esse dinheiro não é falso?"
41150-13 = "Relaxa, não importa de onde o dinheiro veio. Se podemos comprar armas novas, não tem problema nenhum."
41150-14 = "……Aliás, Saki, por que a primeira coisa que você pediu foi combustível sólido e gasolina?"
41150-15 = "Já que temos tanto dinheiro, você deveria ter comprado bombas plásticas."
41150-16 = "Você pretende cozinhar arroz com bombas? E, para começo de conversa, isso é necessário para fazer o helicóptero funcionar."
41150-17 = "Não é como se quanto mais poder de fogo, melhor."
41150-18 = "Do que você está falando? No campo de batalha, o mais importante é o poder de fogo!"
41150-19 = "De qualquer forma, foi bom."
41150-20 = "Com isso, conseguimos recuperar um pouco do nosso poder de combate."
41150-21 = "Por enquanto, parece que conseguiremos repelir qualquer um que aparecer……"
41150-23 = "Po, por favor, me ajudem……."
41150-35 = "Falando no diabo, lá vem um invasor."
41150-36 = "Hehehe, que timing perfeito. Vamos testar o poder de fogo disso agora mesmo."
41150-38 = "Já se esqueceram de mim!? E além disso, eu disse \"me ajudem\", não disse!?"
41150-39 = "……Então, o que aconteceu desta vez?"
41150-40 = "Em princípio, nós não interferimos em disputas privadas entre cidadãos."
41150-41 = "É, pois é. Se houve um problema, por que não pede ajuda para aquele grupo de amigos que você mencionou?"
41150-42 = "É \"Shokakuko\"! \"Grupo que busca a felicidade certa sem possuir nada\", abreviado como \"Shokakuko\"!"
41150-43 = "Infelizmente, os membros do \"Shokakuko\" acabaram se separando……."
41150-44 = "Já éramos poucos, e então o Departamento de Segurança Pública da Valkyrie invadiu tudo……!"
41150-45 = "……Departamento de Segurança Pública?"
41150-46 = "O Departamento de Segurança Pública não viria brigar com andarilhos como vocês, viria?"
41150-47 = "Vo, você não quis dizer o Departamento de Segurança...?"
41150-48 = "Não, eu tenho certeza! Eu vi com meus próprios olhos!"
41150-49 = "Aquele \"cão raivoso\" com armas estranhas, causando destruição no nosso santuário!"
41150-50 = "[s1] \"Isso seria……?\"\n[s2] \"Kanna……?\""
41150-55 = "……Ei, me mostre essa marca de bala."
41150-61 = "Pelo estado da ignição e pelo ângulo, a dureza é alta……."
41150-62 = "Isso é uma munição HEIAP."
41150-63 = "[s] \"Você consegue saber só pela marca do tiro?\""
41150-64 = "Não totalmente, mas é algo que está nos manuais de instrução."
41150-65 = "……É a primeira vez que vejo uma munição HEIAP desse calibre."
41150-66 = "Para começar, não é algo produzido em massa. É caro demais para uma arma individual e tem pouca utilidade prática."
41150-67 = "Se for para chutar alguém..."
41150-68 = "Seria a \"Kaiser Industries\", não?"
41150-73 = "Então, isso significa que foi a Valkyrie que comprou um monte de armas da \"Kaiser Industries\"?"
41150-74 = "Ma, mas será que a Academia de Polícia Valkyrie tem esse tipo de orçamento……?"
41150-80 = "Pelo que parece, a situação financeira da Valkyrie como um todo não está boa…… até repor munição é um sufoco."
41150-81 = "De alguma forma, parece que, se continuar assim, o armamento da Academia de Polícia Valkyrie vai parecer bem precário."
41150-83 = "O que houve, Sensei?"
41150-84 = "[s] \"Ah, desculpe. Estava pensando em algo.\""
41150-85 = "Nossa, achei que você estava tirando uma soneca em pé."
41150-86 = "É bom poder sonhar mesmo estando acordado, né."
41150-87 = "De qualquer forma, meus pêsames pelo ocorrido com a Valkyrie."
41150-89 = "Não venha com "meus pêsames"! Isso não é problema só meu, é de vocês também!?"
41150-90 = "O alvo do Departamento de Segurança não somos apenas nós. Eles estão patrulhando toda essa área e tentando expulsar todo mundo!"
41150-91 = "Não seria nada estranho se eles aparecessem aqui agora—"
41150-96 = "……Argh!"
41150-106 = "……Quando animais selvagens estão em perigo, eles buscam proteção no bando mais forte."
41150-111 = "Então era aqui que vocês estavam. Me pouparam o trabalho de procurar."
41150-113 = "Próximo episódio: Suborno"
