[translation]
41150-1 = "Episódio 15: Uma Derrota Pequena e Certa"
41150-2 = "Parque dos Coelhinhos"
41150-6 = "Quem diria que alguém iria querer aqueles mísseis enferrujados… Que surpresa."
41150-7 = "E ainda por cima, tudo em dinheiro vivo…"
41150-8 = "Nunca vi tanto dinheiro assim…"
41150-10 = "…Aquele sujeito é meio suspeito."
41150-11 = "Escondendo bem o rosto, nem verificou o estado das armas… e nem negociou o desconto, com esse valor."
41150-12 = "Será que esse dinheiro é falsificado?"
41150-13 = "Que isso, de onde vem o dinheiro não importa. Se podemos comprar novas armas, não tem problema."
41150-14 = "…Aliás, Saki, por que você está comprando combustível sólido e gasolina?"
41150-15 = "Com todo esse dinheiro, podia comprar explosivos plásticos."
41150-16 = "Você vai cozinhar com bomba? E também, precisamos para mover o helicóptero."
41150-17 = "Fogo não é tudo."
41150-18 = "O que está dizendo? O mais importante num campo de batalha é o poder de fogo!"
41150-19 = "De qualquer forma, que bom."
41150-20 = "Com isso, nosso poder de combate se recuperou um pouco."
41150-21 = "Agora podemos repelir qualquer um que apareça…"
41150-23 = "S-socorro…"
41150-35 = "Falando nisso, um intruso."
41150-36 = "Kuhihi, ótimo timing. Vamos logo testar o poder de fogo desta coisa."
41150-38 = "Você já se esqueceu de mim?! E outra, eu pedi 'socorro', não foi?!"
41150-39 = "…E então, o que houve desta vez?"
41150-40 = "Em princípio, não interferimos em disputas privadas entre cidadãos."
41150-41 = "Isso aí, se tem problema, pede ajuda para aqueles 'tal e tal'."
41150-42 = "'FeliSem'! 'Irmandade que Busca a Felicidade Certa sem Possuir Nada' – abreviando, 'FeliSem'!"
41150-43 = "Infelizmente, os membros da 'FeliSem' já se dispersaram…"
41150-44 = "Já estávamos em número reduzido, e então aquele Bureau da Valkyrie invadiu…!"
41150-45 = "…Bureau?"
41150-46 = "Por que o Bureau viria brigar com andarilhos como vocês?"
41150-47 = "Não seria o Esquadrão de Segurança…?"
41150-48 = "Não, tenho certeza! Vi com estes olhos!"
41150-49 = "Aquele 'cão louco' com armas estranhas, destruindo nosso local sagrado!"
41150-50 = "[s1] \"Isso seria…?\"\n[s2] \"Kanna…?\""
41150-55 = "…Ei, mostre essa marca de bala."
41150-61 = "Pela forma como queimou, pelo ângulo… a dureza é alta também…"
41150-62 = "Isso é um 'HEIAP'."
41150-63 = "[s] \"Dá para saber só pela marca?\""
41150-64 = "Não totalmente, mas está no manual."
41150-65 = "…Nunca vi um HEIAP desse calibre."
41150-66 = "Aliás, não é algo que se produza muito. É caro demais para uma arma pessoal e tem pouca utilidade prática."
41150-67 = "Se tivesse que dizer de onde veio…"
41150-68 = "Seria da 'Kaiser Industry'?"
41150-73 = "Então quem comprou todas aquelas armas da 'Kaiser Industry' foi a Valkyrie?"
41150-74 = "M-mas a Academia Valkyrie teria esse dinheiro todo?"
41150-80 = "Ouvi dizer que a situação financeira da Valkyrie como um todo não vai bem… eles têm dificuldade até para repor munição."
41150-81 = "Desse jeito, vai parecer que o armamento da Valkyrie é uma piada."
41150-83 = "O que foi, Professor?"
41150-84 = "[s] \"Ah, desculpa. Só pensando em algo.\""
41150-85 = "Nossa, pensei que estava dormindo de olhos abertos."
41150-86 = "Conseguir sonhar acordado é uma coisa boa."
41150-87 = "De qualquer forma, meus pêsames pelo caso da Valkyrie."
41150-89 = "Não é 'meus pêsames'! Isso não é problema só seu!"
41150-90 = "O Bureau não está mirando apenas nós. Eles estão patrulhando a região e expulsando todo mundo!"
41150-91 = "Mesmo se viessem aqui agora, não teria nada de anormal――"
41150-96 = "…Ugh!"
41150-106 = "…Quando um animal selvagem se vê em perigo, ele se encosta à manada mais forte."
41150-111 = "Então estavam aqui. Poupa-me o trabalho de ficar procurando."
41150-113 = "Próximo Episódio: Propina"