[translation]#[Texto Final. - Filipe 08/07.]
70014040-1 = "A Andança do Farmacêutico (4)"
70014040-2 = "Taxa de proteção……? Vocês não fazem nada."
70014040-3 = "Nossa patrulha é pra evitar problemas.#nQuer que a gente deixe os ladrões entrarem?"
70014040-4 = "Então façam isso.#nSeja roubada por ladrões ou por vocês. A diferença é qual?"
70014040-5 = "Ah, não adianta falar com você.#nÉ por causa daquela Kai? Que ela te deu coragem?"
70014040-6 = "Aquela garota não tem nada a ver com isso!"
70014040-7 = "Já que a oportunidade surgiu, vou te contar. Aquela Shinatani Kai é――"
70014040-8 = "uma delinquente sem controle, uma criminosa tão perigosa que é chamada de Sete Prisioneiros!"
70014040-9 = "Dizem que ela causou um monte de confusão na Academia Sankakkei!"
70014040-10 = "E ainda contratou um monte de gente do Mercado Negro!"
70014040-11 = "Ela é muito mais perigosa do que você pensa!"
70014040-12 = "……!"
70014040-13 = "Ah, é mesmo."
70014040-14 = "Dizem que ela pode até curar a doença da véia, se quiser!"
70014040-15 = "……"
70014040-16 = "Ora…… você é bem informado."
70014040-17 = "Parece que ela é boa mesmo."
70014040-18 = "Então por que ela não cura a véia?"
70014040-19 = "É porque…… ela quer tomar a casa da véia!"
70014040-20 = "Aqui não tem como esconder nada."
70014040-21 = "Uma hora ou outra todo mundo fica sabendo no Mercado Negro!"
70014040-22 = "Aliás…… tenho uma conta a acertar com a Kai."
70014040-27 = "Desculpa, mas a véia vai ter que pagar por ela!"
70014040-31 = "……!!!"
70014040-33 = "[ns] \"Temos que impedir!\""
70014040-34 = "……"
70014040-35 = "[s] \"Kai……?\""
70014040-40 = "……Hunf, moleque."
70014040-41 = "Eu já sabia disso tudo faz tempo."
70014040-45 = "Q-quê!?!?"
70014040-46 = "……?"
70014040-47 = "……Não é à toa que moro aqui há tanto tempo."
70014040-48 = "Já vi tanta gente enganando e sendo enganada que nem imagina."
70014040-49 = "Não precisava me falar, eu já tinha percebido desde o começo."
70014040-50 = "E-então, por que……?"
70014040-51 = "Por que eu ia deixar a casa pra ela?"
70014040-52 = "Já é o bastante."
70014040-53 = "Não importa quem a Kai é ou o que faz lá fora, não me interessa."
70014040-54 = "Ela esteve aqui. Morou na minha casa, mesmo que por pouco tempo.#nIsso já é o suficiente. O que mais eu poderia querer?"
70014040-55 = "É melhor dois do que um. E melhor um do que ninguém.#nA casa deve pensar o mesmo."
70014040-56 = "Então―― não atrapalhem a limpeza!"
70014040-57 = "Eu tenho que passar essa casa pra ela!"
70014040-61 = "M-mas isso não é problema nosso!"
70014040-62 = "Chega de palestra!"
70014040-63 = "Foi a véia que começou!"
70014040-65 = "Ei, vocês! Saem daí!"
70014040-75 = "……Que irritante."
70014040-76 = "[s] \"Kai……?\""
70014040-77 = "Não gosto nada disso. Nada mesmo."
70014040-78 = "……"
70014040-79 = "A velha que fala em passar a herança."
70014040-80 = "Esses idiotas fazendo barulho. Tudo."
70014040-81 = "Sensei, não atrapalhe. Isso é um aviso."
70014040-85 = "……Não se preocupe, não vou matar ninguém."
70014040-86 = "Não vou matar NINGUÉM."
70014040-92 = "V-você!?#nKai! A Shinatani Kai está――!!"
70014040-93 = "E-eu não consigo―― respirar――!"
70014040-94 = "Huff…… o corpo todo…… coça――! Aaaah――!!!"
70014040-99 = "P-para…… não aguento mais――!!"
70014040-100 = "Alucinação……?#nN-não chega perto――!!!"
70014040-105 = "Chuva……! Ah, chuva……!"
70014040-106 = "P-parece que meu corpo tá derretendo……! As pernas……! Os braços……! O cabelo……!!!"
70014040-107 = "GAAAAAAAAAAAHHHHH!!!!!!"
70014040-111 = "[ns] \"Kai. Aquilo foi……?\""
70014040-112 = "Você viu."
70014040-113 = "……"
70014040-114 = "Todos estão vivos, né?#n……Pelo menos na aparência."
70014040-115 = "[s] \"Bem, é verdade, mas……!\""
70014040-116 = "Não se preocupe."
70014040-117 = "Eu não faço nada irreversível.#n……A menos que me provoquem muito."
70014040-118 = "Kai……?"
70014040-119 = "……!"
70014040-120 = "……"
70014040-121 = "Vamos voltar. Já está escurecendo."
70014040-125 = "……Sim."
70014040-131 = "Você está ferido?"
70014040-132 = "……Eu é que deveria perguntar isso."
70014040-133 = "Hohoho…… estou ótimo. Apesar de tudo, ainda sou morador daqui."
70014040-135 = "(A conversa entre Kai e a velha continuou naturalmente, sem interrupções)"
70014040-136 = "(Fiquei em silêncio ouvindo os dois)"
70014040-138 = "Já está tão tarde……"
70014040-139 = "Vou descansar primeiro."
70014040-140 = "Não fiquem acordados até muito tarde."
70014040-141 = "……Pode deixar."
70014040-145 = "(A velha voltou para o quarto, arrastando os pés, um pouco mais leve do que antes)"
70014040-146 = "(……Logo depois, ouvi seu ronco suave)"
70014040-147 = "……"
70014040-148 = "[s] \"Ela é forte, né.\""
70014040-149 = "……É, talvez."
70014040-150 = "[s] \"Você está bem?\""
70014040-151 = "……Pergunta estranha."
70014040-152 = "Essa pergunta não deveria ser pra aqueles idiotas de antes?"
70014040-153 = "[s] \"É que seu rosto parece complicado.\""
70014040-154 = "……!"
70014040-155 = "……"
70014040-159 = "Como dizer……"
70014040-160 = "……Não estou acostumado."
70014040-161 = "[s] \"A ajudar a velha?\""
70014040-162 = "……!"
70014040-163 = "……Não adianta tentar enganar o Sensei."
70014040-164 = "Mas não foi por 'fazer o bem' que eu agi."
70014040-165 = "Só segui meu coração, e o resultado foi esse."
70014040-166 = "……Assim como fiz hoje."
70014040-167 = "[s] \"E isso é o que importa.\""
70014040-168 = "O quê……?"
70014040-169 = "[s] \"Você não precisa ser uma boa pessoa pra fazer o bem.\""
70014040-170 = "É difícil de entender."
70014040-171 = "[s1] \"Às vezes o instinto também conta.\"\n[s2] \"Se o resultado é bom, tudo está bem.\""
70014040-174 = "Tudo bem pensar assim?"
70014040-175 = "[s] \"Pelo menos por agora, sim.\""
70014040-176 = "……!"