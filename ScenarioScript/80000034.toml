[translation]
80000034-1 = "Mesmo assim, eu queria te contar"
80000034-2 = "（No dia dos namorados, quase no fim do dia, recebi um contato da Hina）"
80000034-3 = "[ns] \"Se não me engano, era por aqui...\""
80000034-7 = "Ah, Sensei..."
80000034-8 = "[s] \"Hina!\""
80000034-9 = "Ei...! Sensei, fale baixo...!"
80000034-10 = "Fique quieto. Se alguém nos vir, vai virar um alvoroço..."
80000034-11 = "Além disso, se isso acontecer, vai causar problemas para você também, Sensei."
80000034-12 = "[s1] \"Eu não me importo nem um pouco...\"\n[s2] \"Se for um problema causado pela Hina, eu aceito de bom grado.\""
80000034-13 = "Ah, céus, de novo com isso..."
80000034-14 = "Ah, céus, de novo com isso..."
80000034-15 = "……Bem, não é como se fosse novidade."
80000034-16 = "Mas, de qualquer forma, desculpe por te chamar de repente."
80000034-17 = "É que... obrigado por vir."
80000034-18 = "Obrigado."
80000034-19 = "[s] \"Não foi nada. Mas o que faremos? Se você não quer ser vista...\""
80000034-25 = "Se, Sensei...!?"
80000034-26 = "[s3] \"Assim ninguém nos vê, não é?\"\n[s4] \"Então, por que me chamou hoje?\""
80000034-27 = "P, perto demais...! E, bem no meu ouvido...!?"
80000034-28 = "P, perto demais...! E, bem no meu ouvido...!?"
80000034-29 = "Espere!"
80000034-30 = "[s] \"……?\""
80000034-31 = "E, esse, se acalme um pouco, Sensei... bem, talvez quem precise se acalmar seja eu..."
80000034-32 = "P, por enquanto, essa distância está boa."
80000034-33 = "Então, eu chamei o Sensei hoje por causa disto."
80000034-38 = "[ns] \"Isso é...\""
80000034-39 = "É que, hoje é dia dos namorados... então, já que estamos aqui, eu tentei fazer."
80000034-40 = "Como pode ver,"
80000034-41 = "não ficou muito bonito..."
80000034-42 = "Bem, talvez combine com o fato de eu não ser nada fofa..."
80000034-43 = "Ah, mas o sabor, provavelmente,"
80000034-44 = "deve estar com gosto de chocolate mesmo."
80000034-45 = "Por isso, se não se importar, eu queria que você aceitasse..."
80000034-46 = "[s] \"Chocolate feito à mão pela Hina...!?\""
80000034-47 = "Se, Sensei!? Ei, não se empolgue tanto...!!"
80000034-48 = "[s] \"Feito pela Hina... vou guardar como uma relíquia...\""
80000034-49 = "Não, eu quero que você coma...?"
80000034-50 = "Ai, meu Deus..."
80000034-51 = "Fufu, pensando bem, você sempre foi assim..."
80000034-52 = "Não sei nem por que eu estava tão nervosa até agora..."
80000034-53 = "Obrigada, Sensei. Coma tudo, espero que goste."
80000034-54 = "É que eu me esforcei bastante..."
80000034-55 = "[s] \"Obrigado!\""
80000034-56 = "……Não guarde como relíquia, coma de verdade, entendeu?"
80000034-57 = "[s] \"Vou considerar o seu pedido.\""
80000034-58 = "Não é para considerar..."
80000034-59 = "Bem, se for assim, tudo bem..."
80000034-60 = "……Fufu."
