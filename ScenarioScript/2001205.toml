[translation]
2001205-1 = "Himuro Sena"
2001205-3 = "（Saí do Schale um pouco mais cedo do que o planejado）"
2001205-5 = "（……Deveria estar bem adiantado para o horário marcado, mas Sena já estava me esperando）"
2001205-6 = "……Ah, Sensei."
2001205-7 = "Bom trabalho."
2001205-8 = "[s1] \"Desculpe, te fiz esperar?\"\n[s2] \"Você chegou bem cedo……?\""
2001205-9 = "Bem, sim……."
2001205-10 = "Bem, sim……."
2001205-11 = "[s] \"……Sena?\""
2001205-12 = "……Não, não é nada. É só que estou esperando há 1 hora e 27 minutos."
2001205-13 = "Hoje não tenho outros compromissos ou tarefas, então pensei em aproveitar para relaxar um pouco."
2001205-14 = "Como eu estava ansiosa pelo nosso encontro, Sensei."
2001205-15 = "No fundo, eu estava com uma expectativa enorme, mas não posso mostrar esse meu lado para os outros membros do clube."
2001205-16 = "[s3] \"Você é bem direta…….\"\n[s4] \"Você chegou bem cedo, hein.\""
2001205-17 = "……Bem, sim."
2001205-18 = "……Bem, sim."
2001205-19 = "Deixando isso de lado, sobre aquela toalha de antes……"
2001205-20 = "……Sim?"
2001205-21 = "Antes disso……?"
2001205-22 = "Primeiro a toalha? Por que?"
2001205-23 = "……Uma marmita?"
2001205-24 = "……Ah, um piquenique. Você disse que era um agradecimento, não foi?"
2001205-25 = "Não, não é que eu não goste."
2001205-26 = "Na verdade, eu até gosto."
2001205-27 = "……Desculpe. Eu sou sempre assim, então é difícil transmitir o que sinto."
2001205-28 = "Estou realmente feliz. De tudo o que aconteceu ultimamente, este será o momento que ficará mais marcado na minha memória."
2001205-29 = "Já fiz refeições ao ar livre com o Departamento de Medicina de Emergência, mas como era uma extensão das atividades do clube, não tinha esse tipo de atmosfera."
2001205-33 = "Então um encontro é assim? Meu coração está acelerado."
2001205-34 = "Na verdade, nunca tive uma experiência dessas, então não sei se essa é a forma correta de expressar."
2001205-35 = "[s5] \"E-entendo…….\"\n[s6] \"Eu é que estou ficando nervoso……!\""
2001205-36 = "Bem, de qualquer forma."
2001205-37 = "Bem, de qualquer forma."
2001205-38 = "Sei que não sou boa com as palavras, então, ao falar tão abertamente assim, fico com medo de que acabe não sendo bem compreendido."
2001205-39 = "Mas também tenho a expectativa de que, sendo você, Sensei……."
2001205-40 = "……Você é uma pessoa misteriosa, Sensei."
2001205-41 = "Quando penso que você vai reagir como esperado, às vezes você diz ou faz algo totalmente inesperado……."
2001205-42 = "Mas, mesmo assim, não me sinto ansiosa ou com o coração pesado quando estou com você."
2001205-43 = "Ainda não passamos tanto tempo juntos, então é estranho até para mim sentir algo assim."
2001205-44 = "[s7] \"Você acha?\"\n[s8] \"Eu sinto o mesmo, talvez sejamos parecidos.\""
2001205-45 = "……?"
2001205-46 = "……?"
2001205-47 = "É mesmo? Parecidos……."
2001205-48 = "Eu e você, Sensei?"
2001205-49 = "Talvez eu ainda não tenha assimilado direito, mas vou aceitar isso como um elogio sincero."
2001205-50 = "……Falei demais. Vamos começar o piquenique?"
2001205-51 = "Sobre a toalha e as outras coisas, podemos ver na hora de ir embora……"
2001205-52 = "Na hora de ir embora……."
2001205-56 = "……."
2001205-57 = "[s9] \"……?\"\n[s10] \"……Sena?\""
2001205-58 = "……Não, não é nada."
2001205-59 = "……Não, não é nada."
2001205-60 = "Falaremos sobre isso na próxima oportunidade."
2001205-62 = "（Depois disso, aproveitei um pequeno piquenique junto com a Sena）"
2001205-63 = "（O almoço era algo que tínhamos comprado na loja de sempre, mas parecia mais saboroso do que o habitual）"
