[translation]
2001205-1 = "氷室セナ"
2001205-3 = "（予定よりも早めにシャーレを出発した）"
2001205-5 = "（……待ち合わせの時間よりかなり早かったはずなのだけれど、すでにセナが待っていた）"
2001205-6 = "……あ、先生。"
2001205-7 = "お疲れ様です。"
2001205-8 = "[s1] \"ごめん、待たせちゃった？\"\n[s2] \"ずいぶん早いね……？\""
2001205-9 = "まあ、はい……。"
2001205-10 = "まあ、はい……。"
2001205-11 = "[s] \"……セナ？\""
2001205-12 = "……いえ、何でもありません。1時間27分前からお待ちしていただけです。"
2001205-13 = "今日は他の予定や業務も無く、息抜きも兼ねてと言いますか。"
2001205-14 = "先生との約束を、楽しみにしておりましたので。"
2001205-15 = "内心かなり期待しておりまして、こういった姿は他の部員に見せられませんね。"
2001205-16 = "[s3] \"ストレートだ……。\"\n[s4] \"ずいぶん早くから来てくれたんだね。\""
2001205-17 = "……まあ、はい。"
2001205-18 = "……まあ、はい。"
2001205-19 = "それはさておき、以前のタオルなどを……"
2001205-20 = "……はい？"
2001205-21 = "その前に……？"
2001205-22 = "まずシートを？何故ですか？"
2001205-23 = "……お弁当？"
2001205-24 = "……ああ、ピクニックですか。お礼と仰ってましたね。"
2001205-25 = "いえ、好みでないなんてことは。"
2001205-26 = "むしろ、好きなくらいです。"
2001205-27 = "……すみません。私はどうしてもこういった感じですので、色々と伝わりにくいですね。"
2001205-28 = "本当に、嬉しいと思っています。ここしばらくの出来事の中で、一番心に残るでしょう。"
2001205-29 = "救急医学部でもこうして野外で食事をしたことはありますが、部活の延長線上なのでこういった雰囲気でもありませんでしたし。"
2001205-33 = "デートというのは、こんな感じなのでしょうか。胸がときめきますね。"
2001205-34 = "実はこのような経験は皆無でして、このような表現が合っているのかも分かりませんが。"
2001205-35 = "[s5] \"そ、そっか……。\"\n[s6] \"何か私が緊張してきた……！\""
2001205-36 = "まあ、とにかく。"
2001205-37 = "まあ、とにかく。"
2001205-38 = "口下手なのは自覚していますので、このように素直に申し上げると何だか、逆に上手く伝わらないのではとも思うのですが。"
2001205-39 = "まあ先生なら、という期待もありまして……。"
2001205-40 = "……不思議な方ですね、先生は。"
2001205-41 = "予想通りの反応をするかと思いきや、時々予想外の言動を取って……。"
2001205-42 = "ですが一緒にいて不安になったり、気持ちが淀むことがありません。"
2001205-43 = "まだ然程長い時間を過ごしていないにも関わらず、それでもこんな気持ちになるのは、自分でも不思議なのですが。"
2001205-44 = "[s7] \"そうかな？\"\n[s8] \"私もそう思うから、似た者同士なのかもね。\""
2001205-45 = "……？"
2001205-46 = "……？"
2001205-47 = "そうですか。似た者同士……。"
2001205-48 = "先生と私が、ですか。"
2001205-49 = "今いちしっかり飲み込めてないかもしれませんが、純粋に喜ばしい言葉として受け取っておきます。"
2001205-50 = "……話し過ぎましたね。ピクニックを始めましょうか。"
2001205-51 = "タオルなどはまた帰り際にでも……"
2001205-52 = "帰り際……。"
2001205-56 = "……。"
2001205-57 = "[s9] \"……？\"\n[s10] \"……セナ？\""
2001205-58 = "……いえ、何でもありません。"
2001205-59 = "……いえ、何でもありません。"
2001205-60 = "またそのタイミングでお話します。"
2001205-62 = "（その後セナと一緒に、ちょっとしたピクニックを楽しんだ）"
2001205-63 = "（お弁当はいつものお店から買ってきたものだったが、いつもよりも美味しく味わえた）"
