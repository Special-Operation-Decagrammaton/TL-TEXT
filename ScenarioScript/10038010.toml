[translation]
10038010-1 = "Episódio 1: O Incidente"
10038010-5 = "As barracas já foram organizadas? E os equipamentos para a apresentação?"
10038010-6 = "Vamos fazer uma coisa de cada vez... sinto que minha cabeça vai explodir."
10038010-7 = "Não temos gente suficiente... e o Festival do Luar já está logo ali!"
10038010-8 = "Eu queria estar cuidando das barracas..."
10038010-9 = "Calma, calma. A gente faz isso todo ano, talvez este ano termine um pouco mais rápido?"
10038010-10 = "Pensei nisso ano passado também, mas preparar um festival é realmente exaustivo."
10038010-11 = "Ouvi dizer que existe uma escola que passa o ano todo preparando festivais. Hyakkiyako, se não me engano?"
10038010-15 = "Nossa... como conseguem fazer isso o ano todo? Como será que é a vida delas?"
10038010-20 = "Como está o progresso de todas? #nA carga de trabalho está muito pesada?"
10038010-25 = "P-Presidente! E-este nível está perfeitamente sob controle!"
10038010-26 = "O Festival do Luar é o maior evento da Associação Genbu! Pode deixar com a gente!"
10038010-28 = "Se é assim, tudo bem... mas quando o festival acabar, vamos descansar bastante. #nSó mais um esforço, vamos lá."
10038010-37 = "É verdade que o Festival do Luar é a nossa época de maior lucro, mas..."
10038010-38 = "Isso não justifica nos empurrarem metade do trabalho, desde a montagem do local até a manutenção da ordem..."
10038010-39 = "Calma, calma. Em compensação, o pessoal da Genryumon não fica nos incomodando. #nÉ uma mão lava a outra, não é?"
10038010-40 = "Haa... não importa como eu analise, sinto que a sobrecarga está caindo toda sobre mim."
10038010-41 = "Ahaha... sempre posso contar com você, Reijo."
10038010-42 = "Espero que o pessoal da Genryumon não venha com acusações desnecessárias. #nMesmo sem isso, desde a reunião de intercâmbio..."
10038010-43 = "Bem, bem. Vamos deixar esse assunto de lado... ou melhor, vamos esquecê-lo por enquanto."
10038010-44 = "O que será que está acontecendo no palco da Ópera de Pequim? #nA presidente sabe de algo?"
10038010-48 = "A Genryumon insiste que foi apenas um pequeno acidente, mas..."
10038010-49 = "O clube de ópera, que era responsável pela apresentação, está todo sob suspensão."
10038010-50 = "Eu estaria mentindo se dissesse que não estou preocupada com o que aconteceu naquele dia..."
10038010-54 = "Hmm... é melhor parar por aqui! Agora, a prioridade máxima é a preparação do festival."
10038010-58 = "..."
10038010-59 = "Sim. Entendido, presidente."
10038010-60 = "(Se a Genryumon está tentando esconder isso a todo custo, é impossível descobrir a verdade...)"
10038010-66 = "Aaaaaah!?"
10038010-71 = "O que houve? Se queimou!?"
10038010-80 = "...Não pode ser."
10038010-81 = "Isso é... o que exatamente está acontecendo?"
10038010-86 = "V-você... essa sua aparência...!"
10038010-91 = "E-eu também não sei... quando percebi, eu tinha encolhido...!"
10038010-92 = "Até agora pouco você estava normal, não estava? #nComeu alguma coisa estranha?"
10038010-93 = "Não comi nada! Hoje passei o dia todo ocupada checando o local do festival, só comi arroz frito..."
10038010-97 = "Ué...? #nEi, você também...?"
10038010-103 = "Hã!? Eu também!? Por quê!?"
10038010-104 = "O que está acontecendo!?"
10038010-108 = "O-o que faremos? Presidente!"
10038010-109 = "Por enquanto, entrem em contato com a Genryumon... e também com o Clube de Pesquisa de Alquimia."
10038010-110 = "Com a Genryumon... sério!?"
10038010-111 = "Sim. É uma emergência. #nAlém disso..."
10038010-120 = "Hã...?"
10038010-121 = "Eeeh...!?"
10038010-122 = "Até eu!?!?"
10038010-124 = "O que... é isso!?"
10038010-125 = "— Isso é verdade?"
10038010-127 = "S-sim! No momento, centrando na Associação Genbu..."
10038010-131 = "Um fenômeno inexplicável de \"rejuvenescimento\" está ocorrendo!"
10038010-132 = "Os resultados da proteção e investigação da presidente da Associação Genbu, Akeshiro Rumi, são os seguintes!"
10038010-136 = "Hmm... mesmo sendo uma sala de proteção, sinto como se estivesse sendo interrogada... que sensação estranha."
10038010-137 = "Por favor, perdoe-nos, Presidente Rumi."
10038010-138 = "Sobre este fenômeno, você não tem nenhuma pista?"
10038010-139 = "Pista, é?..."
10038010-140 = "Não me lembro de ter comido nada estranho, nem de ter viajado para lugar nenhum."
10038010-141 = "E ultimamente nem sequer encomendamos nenhum \"ingrediente suspeito\", sabe?"
10038010-142 = "Não podemos nos dar ao luxo de servir pratos estranhos no Festival do Luar."
10038010-143 = "Isso significa que... os membros da Associação Genbu se tornaram crianças de repente, sem que vocês tenham feito absolutamente nada?"
10038010-144 = "Bem, é isso mesmo. #nPrimeiro foram as minhas garotas, e logo em seguida, eu também."
10038010-148 = "Como poderíamos acreditar cegamente nas palavras da Associação Genbu, que não mede esforços quando se trata de negócios!"
10038010-149 = "Com certeza há algo que eles estão escondendo!"
10038010-154 = "— Chega. Se este caso fosse realmente obra da Associação Genbu, não haveria como a Presidente Rumi sofrer danos."
10038010-155 = "Pois algo que prejudique a própria pessoa seria uma estratégia medíocre."
10038010-159 = "I-Isso... certamente... é verdade."
10038010-161 = "— Continue com o relatório."
10038010-166 = "Sim! Parece que este fenômeno tem a propriedade de assimilar tudo ao redor do alvo..."
10038010-167 = "Entre os membros que estão investigando no local, isso tem sido chamado de \"fenômeno de rejuvenescimento\"—"
10038010-168 = "— e parece estar se espalhando por toda Shanhaijing, tendo a Associação Genbu como centro!"
10038010-169 = "Hum... conseguiram descobrir o que desencadeou essa assimilação?"
10038010-170 = "I-Isso ainda não...! #nMas está claro que as alunas que mudaram primeiro foram o ponto de partida!"
10038010-171 = "Atualmente, nenhum outro fenômeno além do \"rejuvenescimento\" foi observado. Além disso, as crianças do Departamento de Apoio Educacional e do Jardim de Infância Meika não foram afetadas! É só isso!"
10038010-172 = "Ah, bom trabalho. #nSendo assim—"
10038010-177 = "Forneçam equipamentos que se ajustem aos corpos dos membros da Genryumon que estão no local. #nE garantam um estoque completo de equipamentos, para o caso de surgirem mais alunas afetadas pelo fenômeno."
10038010-178 = "Ao mesmo tempo — investiguem a causa o mais rápido possível."
10038010-179 = "Até que a investigação seja concluída, o acesso de pessoas não autorizadas à Associação Genbu está restrito."
10038010-181 = "Esta é a decisão da líder da Genryumon, Ryuge Kisaki."
10038010-186 = "Sim! Entendido!"
10038010-191 = "Mina. Parece que desta vez terei que contar com a sua ajuda."
10038010-192 = "Você poderia ir até o local?"
10038010-193 = "!!!"
10038010-194 = "Não se preocupe, Líder! #nCom certeza atenderei às suas expectativas!"
10038010-199 = "Huu..."
10038010-200 = "[s] \"Por que você enviou a Mina para o local?\""
10038010-201 = "Se olharmos apenas pelo lado prático, não havia necessidade de enviar a Mina para lá."
10038010-202 = "Mas, ao enviá-la... pretendo transmitir algo aos membros da Genryumon e às alunas."
10038010-203 = "Fufu, não é nada tão grandioso assim."
10038010-204 = "Mas, aconteça o que acontecer em Shanhaijing — a líder da Genryumon não trairá Shanhaijing."
10038010-205 = "[s1] \"O fato de Kisaki ter que dizer isso explicitamente...\"\n[s2] \"É um pouco triste, não é?\""
10038010-208 = "...Você pensa assim?"
10038010-209 = "Fufu, preciso agradecer ao Sensei do fundo do meu coração. #nBem... antigamente, não havia necessidade de fazer algo assim."
10038010-210 = "Mas agora — é necessário."
10038010-211 = "[s] \"Quer que eu ajude em algo no local?\""
10038010-212 = "O Sensei? Hum..."
10038010-213 = "Não vou impedi-lo, mas não posso recomendar."
10038010-217 = "Esta é apenas a minha suposição — mas, no momento, nem mesmo o Sensei seria uma presença bem-vinda por lá."
10038010-220 = "As coisas estão bem agitadas ultimamente, né?"
10038010-221 = "O acesso à rua da Associação Genbu está restrito..."
10038010-222 = "Dizem que, para entrar na rua comercial, é preciso um passe emitido pela Genryumon. #nAlém disso, parece que quase nenhuma loja está funcionando."
10038010-223 = "Eu gostava do mapo tofu de lá, que pena..."
10038010-224 = "Digo, será que a gente vai ficar bem?"
10038010-225 = "Como assim?"
10038010-226 = "Aquilo... sabe, aquele assunto."
10038010-227 = "……"
10038010-228 = "O Genryumon disse que a gente só vira criança e que não acontece nada de muito grave, mas..."
10038010-229 = "Mas, no fim das contas, não é um transtorno virar criança?"
10038010-230 = "Bem, é verdade..."
10038010-232 = "Aliás, não foi na rua da Associação Comercial Genbu que apareceu a primeira pessoa que virou criança?"
10038010-233 = "Será que não é porque estudantes de outras escolas estavam circulando por lá...?#nParece que aconteceu um monte de coisa por lá esses dias também."
10038010-236 = "Teve alguma confusão, não teve?#nNão seria estranho se algo tivesse acontecido..."
10038010-237 = "Será que o Festival do Luar vai ficar bem? Todo ano estudantes de outras escolas vêm visitar, sabe?#nSinto que vai dar problema..."
10038010-240 = "Falando nisso, ouvi dizer que o Sensei do Schale está no Rokukaku.#nMas, no fim das contas, o Sensei também é... alguém de fora, né?"
10038010-241 = "Já que a situação tomou essas proporções, será que eles já não estão tomando alguma medida?#nA própria Chefe Executiva Mina está em campo."
10038010-242 = "Bem, se for assim, fico mais tranquila..."
10038010-243 = "Além disso, não dá para afirmar com certeza que a Associação Comercial Genbu é a causa, né?#nParece que ainda estão investigando."
10038010-247 = "Mas não tem que ser um dos dois?#nSe não é a Associação Comercial Genbu, então, no fim das contas..."
10038010-256 = "E-esperem um pouco! Isso é um absurdo! O Clube de Pesquisa de Alquimia não tem nada a ver com esse incidente!"
10038010-257 = "Você é uma testemunha importante. Poderia nos acompanhar, Presidente Saya?"
10038010-258 = "Já que você é suspeita, gostaríamos da sua colaboração para esclarecer as coisas.#nÉ o nosso trabalho, então, por favor, compreenda."
10038010-259 = "……Como não é a Associação Comercial Genbu, os olhares de suspeita dos alunos estão se voltando para o Clube de Pesquisa de Alquimia."
10038010-264 = "Por isso eu disse que não é! O Clube de Pesquisa de Alquimia é... o Clube de Pesquisa de Alquimia é...!"
10038010-270 = "（S-será que! A informação sobre o \"elixir de rejuvenescimento\" que entreguei para a instrutora Shun vazou...?）"

10038010-273 = "Será que... é por causa daquele remédio para deixar a pele macia que fizemos no Clube de Pesquisa de Alquimia antes...?"
10038010-274 = "Vocês faziam esse tipo de coisa? É a primeira vez que ouço falar."
10038010-275 = "Fiquei curiosa sobre os ingredientes desse remédio. Da próxima vez, nem que seja uma amostra, eu gostaria de um pouco..."
10038010-279 = "Se eu der, vocês me dispensam do interrogatório?"
10038010-280 = "Uma coisa é uma coisa, outra coisa é outra coisa."
10038010-281 = "Eu sabia que você diria isso! Que crueldade!"
10038010-282 = "Uuuuu... quando acontece algum problema, é inevitável suspeitarem do Clube de Pesquisa de Alquimia, mas..."
10038010-283 = "É verdade que, olhando apenas pelos fatos objetivos, parece isso! Mas não é!"
10038010-284 = "É uma acusação falsa! Desta vez, eu não fiz absolutamente nada!"
10038010-286 = "“Desta vez”...?"
10038010-291 = "……Eu falei demais!"
10038010-292 = "Bem, é apenas um interrogatório, afinal."
10038010-293 = "Mas, no fim das contas, vocês não vão acabar me prendendo?"
10038010-294 = "Bem... não posso garantir que essa possibilidade não exista."
10038010-295 = "No fim das contas vai acabar nisso! Que crueldade!"
10038010-300 = "Vou apresentar o relatório parcial, Mestra do Portão."
10038010-301 = "A atual presidente do Clube de Pesquisa de Alquimia, Saya, está respondendo ao interrogatório de forma cooperativa, mas, até o momento, não houve nenhum depoimento que sirva de pista."
10038010-302 = "……Até o momento?#nTem algo que te incomoda?"
10038010-303 = "……Bem, é que.#nIsso é apenas uma impressão minha, que participei do interrogatório..."
10038010-308 = "Sinto que a Presidente Saya está escondendo \"alguma coisa\"."

10038010-309 = "Desta vez, ela não agiu como se não soubesse absolutamente nada sobre o \"fenômeno de rejuvenescimento\" de Shanhaijing."

10038010-310 = "Hum, ela não negou completamente, é? Isso é estranho.#nMesmo parecendo assim, a Saya não é boa em mentir..."
10038010-314 = "Hm? O que houve, Sensei? Você sabe de alguma coisa?"
10038010-315 = "[s] \"Ah, não! Não é nada! Sim!\""
10038010-316 = "Hum... Bem, tudo bem. Vamos acreditar nas palavras do Sensei."
10038010-317 = "Se o Sensei está se dando ao trabalho de esconder algo, deve haver um motivo apropriado para isso, não é?"
10038010-318 = "Entendido. Pode continuar."
10038010-319 = "Sim! E também... outro boato desagradável está se espalhando entre os alunos..."
10038010-320 = "Hum... não creio que bons boatos se espalhem nesta situação."
10038010-321 = "Se você se deu ao trabalho de relatar isso, deve haver um motivo correspondente, não é?"
10038010-325 = "S-sim! É que, bem..."
10038010-336 = "Ei, você ouviu aquele boato?"
10038010-337 = "Ah, tem tantos... qual deles?"
10038010-338 = "Aquele ali! O que diz que a presidente do Clube de Pesquisa de Alquimia voltou."
10038010-339 = "Hã? A presidente do Clube de Pesquisa de Alquimia não é a Saya Yakushi? Ela tinha ido para algum lugar?"
10038010-340 = "Não é ela, é a presidente anterior..."
10038010-341 = "Ué, quem...?"
10038010-342 = "Eu só ouvi dizer por alto, mas... era a Bikou dos Cinco Pecados, não era? Uma das Sete Prisioneiras."
10038010-346 = "Tinha uma das Sete Prisioneiras na nossa escola?"
10038010-347 = "Parece que sim. Ela era a presidente do Clube de Pesquisa de Alquimia, mas foi expulsa."
10038010-348 = "Primeira vez que ouço isso. Qual é o nome dela?"
10038010-349 = "— Kai Shintani."
10038010-350 = "Nunca ouvi falar..."
10038010-351 = "Dizem que as alunas do terceiro ano ainda se lembram dela."
10038010-355 = "Isso é... verdade?"
10038010-356 = "Sim... comparado à gravidade do assunto, o impacto sobre as alunas não é tão grande, mas o fato de tal boato estar se espalhando por si só é..."
10038010-357 = "..."
10038010-358 = "É difícil para uma aluna expulsa retornar à sua antiga escola sem qualquer procedimento formal."
10038010-359 = "E se for a Kai Shintani... é ainda mais improvável."
10038010-360 = "Para as alunas que se lembram do nome dela, isso se tornará um problema que não pode ser ignorado. Se isso for um boato falso, precisamos contê-lo o mais rápido possível."
10038010-364 = "Entendido, Mestra!"
10038010-368 = "Huu..."
10038010-369 = "[s] \"Posso perguntar uma coisa?\""
10038010-370 = "Hm? O que houve, Sensei?"
10038010-371 = "Ah, sobre a Kai Shintani, não é..."
10038010-372 = "..."
10038010-373 = "— Se eu dissesse que é difícil falar sobre a Kai, o que você faria?"
10038010-374 = "Você acreditaria, dizendo que se eu me dei ao trabalho de esconder algo, deve haver um motivo para isso, não é?"
10038010-378 = "Fufu. Você me pegou. #nAh... Sensei, você tem o direito de dizer isso."
10038010-382 = "...Poderia me dar um pouco de tempo? #nApenas um pouco, não peço mais que isso."
10038010-383 = "Não é um problema seu, Sensei. Isso é, acima de tudo, um problema meu e..."
10038010-384 = "— E, consequentemente, um problema relacionado ao passado de Shanhaijing."
