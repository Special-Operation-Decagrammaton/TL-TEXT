[translation]
10038010-1 = "第1話;異変"
10038010-5 = "屋台の手配は終わってる？公演の機材は？"
10038010-6 = "一つずつやろう……頭パンクしそう。"
10038010-7 = "人手が足りなさすぎる……月影祭は目の前なのに！"
10038010-8 = "屋台の運営に回りたい……。"
10038010-9 = "まあまあ。毎年やってるんだし、今年はちょっとは早く片付くかもよ？"
10038010-10 = "去年も思ったけど、お祭りの準備って本当に大変だよね。"
10038010-11 = "噂で聞いたんだけど、一年中お祭りの準備をしている学園もあるんだって。百鬼……夜行だったかな？"
10038010-15 = "すご……よく一年中できるね。どんな生活してるんだろ。"
10038010-20 = "みんな準備は進んでる？#nちょっと仕事量多いかな？"
10038010-25 = "か、会長！こ、この程度全然大丈夫です！"
10038010-26 = "月影祭は玄武商会最大のイベントですからね！任せてください！"
10038010-28 = "なら良いんだけど……お祭りが終わったらみんなでゆっくり休もうね。#nあと一踏ん張り、頑張ろっか。"
10038010-37 = "たしかに、月影祭はかきいれ時ではありますが……。"
10038010-38 = "だからといって、会場の設営から治安維持まで私たちに半分押しつけるなんて……。"
10038010-39 = "まあまあ。その代わり、玄龍門の子たちもうるさく言ってこないし。#n持ちつ持たれつって言うじゃん？"
10038010-40 = "はぁ……どう考えてもしわ寄せが私にきていると思いますが。"
10038010-41 = "あはは……いつも頼りにしてるよ、レイジョ。"
10038010-42 = "玄龍門側から余計な言いがかりがなければ良いのですが。#nそうでなくとも、交流会以来……。"
10038010-43 = "まぁまぁ。その話、今は……いや、当分はしまっておこっか。"
10038010-44 = "京劇の舞台で一体何が起きているのでしょう？#n会長は何か知っていますか？"
10038010-48 = "玄龍門は、些細な事故の一点張りで――"
10038010-49 = "公演を担当していた京劇部は、全員謹慎処分になっている。"
10038010-50 = "あたしだって、あの日の出来事が気にならないと言ったら嘘になるけど……。"
10038010-54 = "うーん……やっぱこの話題はここまで！今はお祭りの準備が最優先だからね。"
10038010-58 = "……。"
10038010-59 = "はい。承知いたしました、会長。"
10038010-60 = "（玄龍門が本気で隠そうとしているのなら、それを解き明かすのは不可能……）"
10038010-66 = "うわああああっ！？"
10038010-71 = "どうしたの？火傷でもした！？"
10038010-80 = "……まさか。"
10038010-81 = "これは……一体どういう事でしょう？"
10038010-86 = "あ、あんた……その姿……！"
10038010-91 = "わ、私にも分からない……気がついたら縮んでて……！"
10038010-92 = "さっきまでなんともなかったよね？#n何か変なものでも食べた？"
10038010-93 = "食べてないよ！今日は一日中、お祭りの現場チェックで忙しいからチャーハンしか……。"
10038010-97 = "あれ……？#nねえ、君も……？"
10038010-103 = "えっ！？私も！？なんで！？"
10038010-104 = "どういうこと！？"
10038010-108 = "ど、どうしましょう。会長！"
10038010-109 = "とりあえず、玄龍門に連絡を――それから、錬丹術研究会にも。"
10038010-110 = "玄龍門に……ですか！？"
10038010-111 = "うん。今は緊急事態だからね。#nそれに――"
10038010-120 = "えっ……？"
10038010-121 = "ええっ……！？"
10038010-122 = "あたしまで！？！？"
10038010-124 = "なん……だと！？"
10038010-125 = "――それは、まことか？"
10038010-127 = "は、はいっ！現在、玄武商会を中心に――"
10038010-131 = "原因不明の「若返り現象」が起こっています！"
10038010-132 = "玄武商会の会長、[ruby=あけしろ]朱城[/ruby]ルミの保護および調査結果は以下の通りです！"
10038010-136 = "うーん……保護室とはいえ、取り調べを受けているような……妙な気分。"
10038010-137 = "ご容赦ください、ルミ会長。"
10038010-138 = "この現象について、何か心当たりはありませんか？"
10038010-139 = "心当たり、ねぇ……。"
10038010-140 = "特に変なものを口にした覚えもないし、移動したりもしてない。"
10038010-141 = "最近は「怪しい食材」を入荷したりもしてないよ？"
10038010-142 = "月影祭で変な料理を出すわけにもいかないからね。"
10038010-143 = "ということは……本当に何もしていないのに、急に玄武商会のメンバーが子供になってしまった、ということですか？"
10038010-144 = "まあ、そうなるね。#n最初はうちの子たちがそうなって、続けてあたしもって感じ。"
10038010-148 = "商売のためなら形振り構わない玄武商会の言葉を、鵜呑みになどできるものか！"
10038010-149 = "きっと隠していることがあるはずだ！"
10038010-154 = "――そこまでじゃ。この件が本当に玄武商会の仕業であるのなら、ルミ会長に害が及ぶはずもない。"
10038010-155 = "本人に害が及ぶようなものは、下策じゃからの。"
10038010-159 = "そ、それは……たしかに……そう、ですね。"
10038010-161 = "――報告を続けるがよい。"
10038010-166 = "はっ！この現象は、対象を中心に同化していく性質があるようでして……。"
10038010-167 = "現地で調査を行っている構成員の間では、「若返り現象」と呼ばれ――"
10038010-168 = "――玄武商会を中心に、山海経全土に広がりつつあるようです！"
10038010-169 = "ふむ……同化のきっかけは突き止められたかの？"
10038010-170 = "そ、そこまではまだ……！#nですが、最初に変化した生徒たちが起点となったことは明らかなようです！"
10038010-171 = "現状、「若返る」以外の現象はまだ観察されておりません。また、例外的に訓育支援部、梅花園の園児は影響を受けないとのことです！以上です！"
10038010-172 = "ああ、ご苦労じゃった。#nであれば――"
10038010-177 = "現場の玄龍門の構成員に、身体に合う装備を支給せよ。#nまた、いつ現象が起こった生徒が現れても良いように装備の十全な確保を。"
10038010-178 = "それと同時に――可及的速やかに原因の調査を行なうように。"
10038010-179 = "調査がある程度完了するまで、関係者以外の玄武商会への立ち入りを制限する。"
10038010-181 = "これが、玄龍門の門主、[ruby=りゅうげ]竜華[/ruby]キサキの裁決じゃ。"
10038010-186 = "は！承知いたしました！"
10038010-191 = "ミナ。今回ばかりは其方の力を借りることになりそうじゃ。"
10038010-192 = "現場に立ってくれるかの？"
10038010-193 = "！！！"
10038010-194 = "ご心配なく、門主様！#n必ず期待に応えて見せましょう！"
10038010-199 = "ふう……"
10038010-200 = "[s] \"ミナを現場に行かせたのはどうして？\""
10038010-201 = "実利だけを見れば、ミナをわざわざ現場に派遣する必要はない。"
10038010-202 = "じゃが、現場に行かせることで……玄龍門の構成員と生徒に、あることを伝えようと思っての。"
10038010-203 = "ふふ、そんな大層なものではない。"
10038010-204 = "じゃが、山海経に何が起きようとも――玄龍門の門主は、山海経を裏切らないということじゃ。"
10038010-205 = "[s1] \"キサキがそれをわざわざ伝えなければならないというのが……。\"\n[s2] \"少し、悲しいね。\""
10038010-208 = "……そう思ってくれるのか。"
10038010-209 = "ふふ、先生には心から感謝しないといけないのう。#nそうさな――昔であれば、このようなことをする必要もなかった。"
10038010-210 = "じゃが、今は――しなければならない。"
10038010-211 = "[s] \"私も現地で何か手伝おうか？\""
10038010-212 = "先生が？ふむ……。"
10038010-213 = "止めはせぬが、勧めたくはないかの。"
10038010-217 = "これは妾の推測じゃが――今は、先生でさえも歓迎されない状況じゃろうからの。"
10038010-220 = "最近何か騒がしいね。"
10038010-221 = "玄武商会通りに立ち入り制限かかってるし……"
10038010-222 = "商会通りに行くには、玄龍門が発行した通行証が必要なんだって。#nそれに、ほとんどのお店は営業してないみたいだし。"
10038010-223 = "あそこの麻婆豆腐好きだったのになぁ、残念……"
10038010-224 = "というか、私たちは大丈夫なのかな？"
10038010-225 = "何が？"
10038010-226 = "例の……アレ、だよ。"
10038010-227 = "……"
10038010-228 = "玄龍門は、子供になるだけで大した異常が起こるわけじゃないって言ってたけど……。"
10038010-229 = "でもやっぱり、子供になったら色々不便なんじゃない？"
10038010-230 = "まぁ、そうだよね……"
10038010-232 = "というか、初めて子供になった人がでたのって、玄武商会通りらしいじゃん？"
10038010-233 = "やっぱ他校生が出入りしてたからなんじゃない……？#nこの前も何か色々あったみたいだし。"
10038010-236 = "なんか揉め事起きてたんだっけ？#n何かが起きたとしてもおかしくないよね……"
10038010-237 = "月影祭、大丈夫かな。毎年他校生が観光にくるじゃん？#n問題起きそう……。"
10038010-240 = "そういえば、六和閣にシャーレの先生が来てるんだって。#nでも、先生も結局は……外部の人だよね？"
10038010-241 = "ここまで事が大きくなってるんだし、もう何か対策立ててるんじゃないかな？#nミナ執行部長が現場に出てるくらいだし。"
10038010-242 = "まあ、それなら安心だけどさ……"
10038010-243 = "それに、玄武商会が原因だと断定もできないんじゃない？#nまだ調査中みたいだから。"
10038010-247 = "でも、どっちかなんじゃないの？#n玄武商会が原因じゃないなら、やっぱり……。"
10038010-256 = "ま、待ってほしいのだ！絶対おかしいのだ！錬丹術研究会は今回の事件とは関係ないのだ！"
10038010-257 = "あなたは重要参考人となっています。ご同行、願えますか――[ruby=やくし]薬子[/ruby]サヤ会長。"
10038010-258 = "嫌疑がかかっている以上、晴らすのであればご協力をお願いしたく。#n私どもとしても仕事ですので。ご容赦ください。"
10038010-259 = "……玄武商会が原因でないのなら、と生徒から錬丹術研究会に疑いの目が向いている状態です。"
10038010-264 = "だから違うのだ！錬丹術研究会は……錬丹術研究会は……！"
10038010-270 = "（も、もしかして！以前、シュン教官に渡した「若返りの秘薬」の情報が流出したのだ……？）"
10038010-273 = "その……前に錬丹術研究会で作った、肌が柔らかくなる薬のせい……だったり？"
10038010-274 = "そんなものを作っていたのですか？初耳です。"
10038010-275 = "薬の内容が気になりますね。今度、サンプルでもいいので少しだけ……"
10038010-279 = "そうしたら取り調べを免除してくれるのだ？"
10038010-280 = "それはそれ、これはこれです。"
10038010-281 = "そうだろうとは思っていたけど！ひどいのだ！"
10038010-282 = "うううう……何か面倒事が起きたら、錬丹術研究会を疑うのも仕方ないことだけど……。"
10038010-283 = "たしかに、客観的な事実だけ見たらそうだけど！そうではあるけど！"
10038010-284 = "でも、濡れ衣なのだ！今回ばかりは、ぼく様は何もしてないのだ！"
10038010-286 = "「今回ばかりは」……？"
10038010-291 = "……口が滑ったのだ！"
10038010-292 = "まあ、ただの取り調べですからね。"
10038010-293 = "でも、結局逮捕したりするんじゃないのか？"
10038010-294 = "まぁ……その可能性がないとは言い切れませんね。"
10038010-295 = "結局そうなっちゃうやつなのだ！ひどいのだ！"
10038010-300 = "中間報告をさせていただきます。門主様。"
10038010-301 = "現錬丹術研究会長のサヤは素直に尋問に応じていますが、今のところ特に手がかりになるような証言はありませんでした。"
10038010-302 = "……今のところ？#n何かひっかかるところでも？"
10038010-303 = "……ええと、その。#nこれは尋問に参加した私の感想でしかないのですが……"
10038010-308 = "サヤ会長が「何か」を隠しているような気がします。"
10038010-309 = "今回、山海経の「若返り現象」について、全く知らないような口ぶりではありませんでした。"
10038010-310 = "ふむ、完全に否定しなかった、と？それは妙じゃのう。#nサヤはああ見えて、嘘をつくのが苦手じゃというのに……。"
10038010-314 = "ん？どうしたのじゃ、先生。何か心当たりでもあるのかえ？"
10038010-315 = "[s] \"え、いや！何でもないよ！うん！\""
10038010-316 = "ふむ……？まあ、良い。先生の言葉を信じるとしよう。"
10038010-317 = "先生がわざわざ隠し立てているのであれば、それ相応の理由があるはずじゃからのう？"
10038010-318 = "あい分かった。続けるがよい。"
10038010-319 = "はい！そして……生徒たちの間で、また別のよからぬ噂が広まっておりまして……。"
10038010-320 = "ふむ――この状況で良い噂が流布するとは思えぬが。"
10038010-321 = "わざわざ報告したということは、それ相応の理由があるのじゃろう？"
10038010-325 = "は、はい！それが、その……"
10038010-336 = "ねぇ、あの噂聞いた？"
10038010-337 = "え、いっぱいあるけど……どれ？"
10038010-338 = "あれあれ！錬丹術研究会の会長が帰ってきたってヤツ。"
10038010-339 = "え？錬丹術研究会の会長って[ruby=やくし]薬子[/ruby]サヤでしょ。どっか行ってたの？"
10038010-340 = "じゃなくて、前代の会長……"
10038010-341 = "え、誰……？"
10038010-342 = "私も小耳に挟んだだけだけど。五塵の……[ruby=びこう]獼猴[/ruby]だっけ？七囚人の一人の。"
10038010-346 = "うちの学校に七囚人がいたの？"
10038010-347 = "らしいよ。元々彼女が錬丹術研究会の会長だったけど、退学させられたんだって。"
10038010-348 = "初めて聞いた。なんて名前？"
10038010-349 = "――[ruby=しんたに]申谷[/ruby]カイ。"
10038010-350 = "初めて聞いた……"
10038010-351 = "3年生だと、まだ知ってる人いるらしいよ。"
10038010-355 = "それは――まことか？"
10038010-356 = "はい……内容の重さに比べて、生徒への影響はそこまで大きくないのですが、このような噂が広まっているということ自体が……"
10038010-357 = "……"
10038010-358 = "退学になった生徒が、何の手続きもなく母校に戻るのは難しい。"
10038010-359 = "まして、それがあの[ruby=しんたに]申谷[/ruby]カイであれば……なおさらじゃ。"
10038010-360 = "彼の者の名を覚えている生徒の間では、看過できぬ問題となろう。これがデマであれば、可及的速やかに収める必要がある。"
10038010-364 = "承知しました、門主様！"
10038010-368 = "ふう……"
10038010-369 = "[s] \"聞いてもいいかな？\""
10038010-370 = "ん？どうしたのじゃ、先生。"
10038010-371 = "ああ、[ruby=しんたに]申谷[/ruby]カイのことか……。"
10038010-372 = "……。"
10038010-373 = "――カイについて語るのは難しい、と言ったら、其方はどうする？"
10038010-374 = "妾がわざわざ隠し立てしようとするのなら、それ相応の理由があるはずだから信じる、か。"
10038010-378 = "ふふ。これは一杯食わされたのう。#nああ――先生にはそれを言う資格がある。"
10038010-382 = "……妾に少しだけ時間をくれぬか？#n少しだけで構わぬ。"
10038010-383 = "先生の問題ではない。これはあくまで、妾自身の問題であり――"
10038010-384 = "――ひいては、山海経の過去に関する問題でもあるからの。"
