[translation]
1006803-1 = "Confie em mim, Leisa."
1006803-2 = "Placa de Petri e sala de descanso"
1006803-3 = "(Quando o trabalho se acalmou, chamei Leisa para a sala de descanso da placa de Petri)."
1006803-7 = "[ns1] \"Bem-vinda, Leisa. \"\n[ns2] \"A porta deve estar aberta. \"\n[ns2]\"\"\n1006803-13 = \"Olá, ...... sensei ......!\"\n1006803-14 = \"Obrigado por responder a ......, obrigado, obrigado ......\"\n1006803-15 = \"[s3] \"Reisa! Você parece um pouco trêmula, está bem? \"\n[s4] \"Que diabos há de errado com você! \"\"\n[s3]]\"\n1006803-18 = \"Seu ...... não que houvesse algo errado ......#nnnn, koho......\"\n1006803-19 = \"Ugh, desculpe-me. Estou um pouco ...... pesado ......\"\n1006803-20 = \"Hmmm! #n ah ......\"\n1006803-24 = \"Um pouco melhor! #nKohon, mais uma vez...\"\n1006803-25 = \"Hoje, pensei em pedir sua opinião sobre a \"recuperação da fadiga\"!\"\n1006803-26 = \"Que ...... vai à escola, brinca com os amigos depois da escola, ......#n patrulhas de vigilância da vizinhança à noite e ......\"\n1006803-27 = \"Se eu não pudesse dizer não a nenhum deles, não teria tempo para ...... descansar. ......\"\n1006803-28 = \"Os últimos três dias têm sido particularmente agitados, por isso não tenho conseguido dormir muito ......, então gostaria de saber se posso lhe perguntar sobre maneiras eficientes de se recuperar do cansaço. ......\"\n1006803-29 = \".........\"\n1006803-30 = \"Eu costumava dormir durante as férias escolares e estava tudo bem. ...... Haha.\"\n1006803-31 = \"[s5] \"I see...... you're quite overworked....... \"\n[s6] \"Então você está se sentindo mal. ...... \"\"\n1006803-34 = \"Haha: ......\"\n1006803-35 = \"Acreditávamos que um sensei entenderia!\"\n1006803-36 = \"Então, ......, você conhece algum item secreto, como remédios que podem eliminar a fadiga em um instante, ou energias espectrais secretas, etc.?\"\n1006803-37 = \"...... O quê?\"\n1006803-38 = \"Não existe um truque para se recuperar da fadiga. ...... Você precisa descansar adequadamente, certo?\"\n1006803-39 = \"Você tem razão, mas eu estava pensando se ...... poderíamos fazer algo a respeito disso. ......\"\n1006803-40 = \"Não são apenas a escola e o Neighbourhood Watch que são importantes para mim agora. ......\"\n1006803-41 = \"O tempo gasto jogando com os amigos é tão importante quanto ...... e ......\"\n1006803-42 = \"Se ......\"\n1006803-43 = \"Se você se distanciar de mim, poderá voltar para ...... e depois para ......\"\n1006803-44 = \"Talvez ...... certamente ......\"\n1006803-45 = \"[ns] \"............\"\"\n1006803-47 = \"[ns7] \"Você está mostrando os maus hábitos da Leisa. \"\n[ns8] \"Você não precisa se ajustar muito ao seu ambiente. \"\n1006803-50 = \"É ...... que ......?\"\n1006803-51 = \"Algo diferente, é o ......? #n especialmente em ......\"\n1006803-52 = \"Oh, .......\"\n1006803-53 = \"Lembro-me de que, recentemente, meus amigos da escola têm se preocupado cada vez mais com minha saúde. Eles me perguntam se quero mudar meu #n-horário, ou se tenho algum ...... problema, e eu os escuto. ......\"\n1006803-54 = \"Recentemente, a Vigilância do Bairro sugeriu que eu assumisse a patrulha no lugar da Leisa. ......\"\n1006803-55 = \"É claro que respondi que estava tudo bem. ......#n haha ......\"\n1006803-56 = \"[\"Estamos todos preocupados com você. \"\n[s10] \"Não quero que a Leisa fique sobrecarregada. \"\n1006803-59 = \"Então, é isso mesmo ......? #n that ...... Parece que estou exagerando ......?\"\n1006803-60 = \"...... haha, não é muito convincente nesse estado de coisas.\"\n1006803-64 = \"Tem certeza de que o ...... é seguro?\"\n1006803-65 = \"O que seus amigos e os vigilantes do ...... pensarão de você? ......\"\n1006803-66 = \"Estou disposto a ouvir seus conselhos, mas ...... estou um pouco assustado.\"\n1006803-67 = \"E se o relacionamento atual não der certo? ......\"\n1006803-71 = \"Também em .......\"\n1006803-72 = \"Sim, eu sei. E tem dado certo até agora quando escuto o que o médico diz!\"\n1006803-73 = \"Dessa vez, deve funcionar também, certo? #nTenho certeza de que sim!\"\n1006803-74 = \"[s11] \"Sim. Acho que você deveria confiar mais nas pessoas ao seu redor. \"\"\"Todos se preocupam com a Leisa mais do que você imagina. \"\n[s12]\""

