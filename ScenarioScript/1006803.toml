[translation]
1006803-1 = "信じて、レイサ"
1006803-2 = "シャーレ・休憩室"
1006803-3 = "（仕事が落ち着いたところで、シャーレの休憩室にレイサを呼んだ)"
1006803-7 = "[ns1] \"いらっしゃい、レイサ。\"\n[ns2] \"ドアなら開いてるよ。\""
1006803-13 = "こ、こんにちは……先生……！"
1006803-14 = "お返事くださり……ありがとう、ございます……"
1006803-15 = "[s3] \"レイサ！？なんかふらふらしてるけど、大丈夫？\"\n[s4] \"一体どうしたの！？\""
1006803-18 = "その……何かあったわけではないのですが……#nんっ、こほっ……"
1006803-19 = "うぅ、失礼しました。少し……身体が重くて……"
1006803-20 = "んっ、んん！#nぁあー……"
1006803-24 = "少しマシになりました！#nこほん、改めて――"
1006803-25 = "本日は、「疲労回復」に関してのアドバイスを頂こうと思いまして！"
1006803-26 = "その……学校に行って、放課後は友達と遊んで……#n夕方から自警団のパトロール、と……"
1006803-27 = "どれも断れずにいたら……休む時間がなくなってしまいまして……"
1006803-28 = "ここ3日間は特に事件が多かったので、あんまり眠れなくて……なので、効率の良い疲労回復の方法を伺えたら、と……"
1006803-29 = "………"
1006803-30 = "……今までは、学校の休み時間に寝ていたので、大丈夫だったんですけど……あはは。"
1006803-31 = "[s5] \"そっか……結構なオーバーワークだね……。\"\n[s6] \"だから体調を崩し気味なんだね……。\""
1006803-34 = "あはは……"
1006803-35 = "先生でしたら、ご理解いただけると信じておりました！"
1006803-36 = "それで……一瞬で疲労をポンと飛ばすような薬や、秘密の妖怪エナジーなど……そういった秘密アイテムはご存知でしょうか？"
1006803-37 = "……え？"
1006803-38 = "疲労回復にコツなんてない……ちゃんと休まないとダメ、ですか？"
1006803-39 = "仰る通りですが……そこを何とかできないかなって……"
1006803-40 = "今の私にとって大切なのは、学校と自警団だけではないんです……"
1006803-41 = "友達と遊ぶ時間も……同じくらい大切で……"
1006803-42 = "もし……"
1006803-43 = "もし、私から距離を置いてしまったら……その時は、また……"
1006803-44 = "たぶん……きっと……"
1006803-45 = "[ns] \"…………\""
1006803-47 = "[ns7] \"レイサの悪い癖が出てるよ。\"\n[ns8] \"周りに合わせすぎる必要はないんだよ。\""
1006803-50 = "それは……どういう……？"
1006803-51 = "何か変わったこと、ですか……？#n特には……"
1006803-52 = "……あっ。"
1006803-53 = "そういえば最近、学校で友達から体調を気遣われることが増えたような。#n予定を変えようか、とか……何か悩みがあるなら聞くよ、って……"
1006803-54 = "自警団のほうは先日、レイサさんの分のパトロールを代わりますよ、と提案されました……"
1006803-55 = "もちろん全部、大丈夫です、と答えましたけど……#nあはは……"
1006803-56 = "[s9] \"みんな、心配してるんだよ。\"\n[s10] \"レイサに無理してほしくないから。\""
1006803-59 = "そ、そう……でしょうか。#nあれ……私、無理してるように見えますかね……？"
1006803-60 = "……あはは、こんな状態ではあんまり説得力ないですね。"
1006803-64 = "本当に……大丈夫なんでしょうか。"
1006803-65 = "友達や……自警団の皆さんに、どう思われるのか……"
1006803-66 = "先生のアドバイスを聞きたい気持ちはありますが……ちょっと、怖いです。"
1006803-67 = "もし今の関係が崩れてしまったら、どうしようって……"
1006803-71 = "……でも。"
1006803-72 = "そうですね。今までも先生の言葉を聞いたら、うまくいきましたし！"
1006803-73 = "今回もうまくいくはずですよね！#nきっと、そうです！"
1006803-74 = "[s11] \"うん。もっと周りを信じて良いと思うよ。\"\n[s12] \"レイサが思ってる以上に、みんなはレイサの事を大切に想ってるよ。\""
1006803-77 = "……！！"
1006803-78 = "はい！！！"
1006803-79 = "……ふ、ふううぁ……"
1006803-85 = "[ns13] \"レイサ！？\"\n[ns14] \"あっ、危ない！\""
1006803-88 = "うう……緊張が解けたからか……"
1006803-89 = "きゅう、に、眠気、が……"
1006803-95 = "へへ……へへっ……一緒に行きましょう……#n絶対楽しいですよ……ひひっ……"
1006803-96 = "[ns] \"…………。\""
1006803-98 = "[ns] 休憩室の明かりを消す。"
1006803-102 = "（その後、レイサが起きないように、そっと部屋を出た)"
