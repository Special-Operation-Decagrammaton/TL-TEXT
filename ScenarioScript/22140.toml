[translation]
22140-1 = "第14話;要塞都市エリドゥ"
22140-2 = "思ったより早く現れてくれましたね。"
22140-3 = "私たちがここに来る事は最初からお見通しだったというわけだ。"
22140-5 = "はい。リオ様はすべて把握されておいでです。"
22140-6 = "C&Cの判断も、その動きも――"
22140-7 = "そしてもちろん――先生のねらいも、全て。"
22140-8 = "ですので、僭越ながら申し上げます。#n――これ以上の抵抗は無意味です。大人しく投降をお願い致します。"
22140-9 = "ほう……なるほど。"
22140-10 = "う～ん、それはちょっと難しいかなぁ？"
22140-20 = "……！？"
22140-21 = "わっ、ビックリした！"
22140-22 = "あら、この程度では相手にもなりませんか。"
22140-23 = "あ、アカネ……？"
22140-24 = "……[ruby=むろかさ]室笠[/ruby]アカネ先輩。"
22140-25 = "……戦闘では爆発物を利用した広域制圧を得意とする――"
22140-26 = "――C&Cの要注意人物。"
22140-27 = "ふふ、初対面の後輩にそう言われると少し照れくさいですね。"
22140-28 = "先程のは、あくまでも挨拶のつもりだったのですが……。"
22140-29 = "……。"
22140-30 = "はじめまして後輩さん。#nトキ……でしたね？"
22140-31 = "先日は部長が大変お世話になったと伺いました。"
22140-32 = "それに……投降しろという丁寧なご勧告まで頂くなんて……。"
22140-33 = "ふふ、あなたがリオ会長のボディーガードだということは伺っていましたが……#nまったく。"
22140-35 = "……C&Cを、見くびってもらっては困りますね。"
22140-36 = "……！"
22140-40 = "目には目を、歯には歯を。本日はそのために来ておりますから。"
22140-45 = "……もちろんここで大人しく投降するのでしたら、水に流す事もできますよ？"
22140-47 = "……それはできません。"
22140-48 = "私はリオ様から命令を受けております。"
22140-49 = "「指示に背いて行動しているC&Cを制圧せよ」と……。"
22140-50 = "そのため、この場から退く事はできません。"
22140-52 = "ふ～ん、真面目ちゃんなんだね、トキちゃんは♪"
22140-53 = "想定通りの反応だ。"
22140-54 = "C&Cは秘密エージェント組織……。"
22140-55 = "最初は、潜入によってこちらを[ruby=かくらん]撹乱[/ruby]すると踏んで、備えておりましたが……"
22140-56 = "まさかこんな正面からいらっしゃるとは……。"
22140-57 = "……想定外でした。#nですが、私がここにいる事もあなた方の作戦の内なのでは？"
22140-59 = "……そうなのか？"
22140-60 = "あはは♪そういうのじゃないかなぁ～？"
22140-62 = "あら、そうですねぇ……私たちとしても想定外ですよ。"
22140-63 = "――誤魔化そうとしても無駄です。"
22140-64 = "すでに先輩方の思惑など分かっております。"
22140-65 = "ネル先輩と先生がおりませんね。"
22140-66 = "つまり、そういう作戦なのでしょう？#n先輩方は私の足止めを任されている。"
22140-67 = "それはある意味で正しいです。リオ様の「武装」を纏った私との正面対決を避け、"
22140-68 = "その間にミレニアムの最強戦力であるネル先輩を自由にさせる――"
22140-69 = "それであれば、ええ……たしかに勝算はあるでしょう。"
22140-70 = "誰に勝算があるって？"
22140-78 = "あははっ！遅かったじゃん部長！"
22140-79 = "ネル……先輩が何故……ここに……？"
22140-80 = "あぁ？んなの決まってんだろ。"
22140-81 = "リベンジマッチだよ。"
22140-82 = "リベンジ……？"
22140-83 = "あたしが別行動してたら、てめぇは絶対止めに来るだろ？"
22140-84 = "面倒なのはごめんだからよぉ。"
22140-85 = "それなら、チビを助けに行くのは――"
22140-86 = "てめぇを倒した「後」でも、遅くねぇって事だ。"
22140-87 = "おい、後輩。この間はよくもやってくれたな。"
22140-88 = "先輩に楯突いたらどうなんのか、じ～っくり教えてやるよ。"
22140-95 = "……！！"
22140-96 = "対応、開始。"
22140-102 = "は！いいぜ！やってやろうじゃねーか！"
22140-106 = "これで……！"
22140-107 = "邪魔なドローンは、全部、倒した……！"
22140-108 = "[ns] \"みんな、気を引き締めて！そろそろ地上だよ……！\""
22140-114 = "よーーし！外に出れた！"
22140-115 = "それで、ここからどこに向かえばいいの？"
22140-117 = "アリスがいるのはおそらくエリドゥの中心部……。"
22140-118 = "そう、この中央にあるタワーだよ。"
22140-119 = "現在地からルートを算出しました。#n左手にある大通りをまっすぐ北に進めば辿り着けます。"
22140-120 = "[ns] \"サポートありがとう。じゃあ、行こうか。"
22140-131 = "どいたどいたー！！"
22140-139 = "道はこっちでナビするから。"
22140-140 = "どんどん行っちゃおー！GOGO～！"
22140-142 = "次回;罠"
