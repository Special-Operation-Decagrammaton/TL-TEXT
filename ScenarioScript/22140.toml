[translation]
22140-1 = "Episódio 14; Cidade-Fortaleza Eridu"
22140-2 = "Vocês apareceram mais rápido do que eu esperava."
22140-3 = "Então você já sabia desde o começo que nós viríamos aqui."
22140-5 = "Sim. A Presidente Rio previu cada passo."
22140-6 = "As decisões da C&C, cada movimento de vocês――"
22140-7 = "E, é claro―― os objetivos do Sensei, tudo."
22140-8 = "Portanto, com todo o respeito... #n ――Qualquer resistência a mais é inútil. Por favor, renda-se pacificamente."
22140-9 = "Oh... entendo."
22140-10 = "Hmm, acho que isso vai ser um pouco difícil..."
22140-20 = "......!?"
22140-21 = "Uau, que susto!"
22140-22 = "Ara, isso não foi nem o suficiente para me fazer começar?"
22140-23 = "A-Akane...?"
22140-24 = "......Murokasa Akane-senpai."
22140-25 = "......Especialista em supressão de área usando explosivos em combate――"
22140-26 = "――Uma figura de alto risco da C&C."
22140-27 = "Fufu, é um pouco embaraçoso ouvir isso de uma novata que acabei de conhecer."
22140-28 = "O que fiz há pouco foi apenas uma saudação, mas..."
22140-30 = "Prazer em conhecê-la, novata. #n Toki... não é?"
22140-31 = "Ouvi dizer que você cuidou muito bem da nossa líder outro dia."
22140-32 = "E, além disso... ainda nos dando conselhos tão gentis para nos rendermos..."
22140-33 = "Fufu, eu sabia que você era a guarda-costas da Presidente Rio, mas... #n Francamente."
22140-35 = "......É melhor não subestimar a C&C."
22140-40 = "Olho por olho, dente por dente. É para isso que viemos hoje."
22140-45 = "......É claro, se vocês se renderem pacificamente agora, podemos deixar isso passar."
22140-47 = "......Isso é impossível."
22140-48 = "Recebi ordens da Presidente Rio."
22140-49 = "'Suprima a C&C que está agindo contra as ordens'."
22140-50 = "Portanto, não posso sair daqui."
22140-52 = "Fufun, você é bem certinha, não é, Toki-chan♪"
22140-53 = "Reação conforme o esperado."
22140-54 = "A C&C é uma organização de agentes secretos..."
22140-55 = "Inicialmente, presumi que vocês tentariam nos confundir com uma infiltração e me preparei para isso..."
22140-56 = "Mas quem diria que vocês viriam assim, de frente..."
22140-57 = "......Foi inesperado. #n Mas, a minha presença aqui não faz parte do plano de vocês também?"
22140-59 = "......Sério?"
22140-60 = "Ahaha♪ Quem sabe?"
22140-62 = "Ara, é mesmo... #n Para nós, isso também foi inesperado."
22140-63 = "――Não adianta tentar disfarçar."
22140-64 = "Eu já entendi as intenções de vocês."
22140-65 = "A Neru-senpai e o Sensei não estão aqui."
22140-66 = "Ou seja, essa é a estratégia, não é? #n Vocês senpais foram incumbidas de me distrair."
22140-67 = "Isso está certo de certa forma. Evitar um confronto direto comigo, que visto o 'Armamento' da Rio,"
22140-68 = "Enquanto isso, deixam a Neru-senpai, a maior força da Millennium, livre――"
22140-69 = "Se for esse o plano, sim... vocês podem ter uma chance de vitória."
22140-70 = "Quem tem chances de vitória?"
22140-78 = "Ahaha! Demorou, Líder!"
22140-79 = "Neru... senpai... por que você está... aqui...?"
22140-80 = "Hã? É óbvio, não é?"
22140-81 = "É a revanche."
22140-82 = "Revanche...?"
22140-83 = "Se eu me separasse, você viria atrás de mim de qualquer jeito, né?"
22140-84 = "Não estou a fim de lidar com enrolação."
22140-85 = "Então, para ir salvar aquela nanica――"
22140-86 = "Não é tarde demais para fazer isso 'depois' de te derrotar."
22140-87 = "Ei, novata. Daquela vez você me pegou de surpresa."
22140-88 = "Vou te ensinar o que acontece quando você enfrenta uma veterana."
22140-95 = "......!!"
22140-96 = "Iniciando resposta."
22140-102 = "Haha! Beleza! Vamos ver do que você é capaz!"
22140-106 = "Com isso...!"
22140-107 = "Derrubei todos os drones que estavam no caminho...!"
22140-108 = "[ns] \"Pessoal, foco total! Estamos chegando na superfície...!\""
22140-114 = "Yaaaay! Conseguimos sair!"
22140-115 = "E agora, para onde devemos ir?"
22140-117 = "A Aris provavelmente está no centro de Eridu..."
22140-118 = "Isso, naquela torre bem no meio."
22140-119 = "Calculei a rota a partir da nossa localização atual. #n Se seguirmos reto para o norte pela avenida principal à esquerda, chegaremos lá."
22140-120 = "[ns] \"Valeu pelo suporte. Vamos nessa então.\""
22120-131 = "Saiam da frenteee!!"
22120-139 = "Eu vou guiando o caminho."
22120-140 = "Vamos em frente! GOGO~!"
22120-142 = "Próximo Episódio; Armadilha"