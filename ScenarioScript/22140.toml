[translation]
22140-1 = "Episódio 14; Cidade Fortaleza Eridu"
22140-2 = "Vocês apareceram mais rápido do que eu esperava."
22140-3 = "Então você já sabia desde o início que viríamos para cá."
22140-5 = "Sim. A Rio-sama tem total conhecimento de tudo."
22140-6 = "As decisões da C&C, seus movimentos..."
22140-7 = "E, claro... o objetivo do Sensei também, tudo."
22140-8 = "Portanto, peço desculpas pela ousadia, mas... #n— Qualquer resistência adicional é inútil. Por favor, rendam-se pacificamente."
22140-9 = "Ho... entendo."
22140-10 = "Hmm, acho que isso vai ser um pouco difícil, sabe?"
22140-20 = "...!?"
22140-21 = "Uau, que susto!"
22140-22 = "Ora, parece que esse nível não é o suficiente para me enfrentar."
22140-23 = "A-Akane...?"
22140-24 = "...Sênior Akane Murokasa."
22140-25 = "...Especialista em supressão de área usando explosivos em combate..."
22140-26 = "— Uma figura de alto risco da C&C."
22140-27 = "Fufu, fico um pouco envergonhada de ouvir isso de uma novata que acabei de conhecer."
22140-28 = "O que fiz agora há pouco foi apenas uma saudação, na verdade..."
22140-29 = "..."
22140-30 = "Prazer em conhecê-la, novata. #nToki... era esse o seu nome?"
22140-31 = "Ouvi dizer que você cuidou muito bem da nossa chefe outro dia."
22140-32 = "E além disso... receber uma recomendação tão educada para me render..."
22140-33 = "Fufu, eu sabia que você era a guarda-costas da presidente Rio, mas... #nfrancamente."
22140-35 = "...É um problema subestimar a C&C."
22140-36 = "...!"
22140-40 = "Olho por olho, dente por dente. É por isso que viemos hoje."
22140-45 = "...Claro, se vocês se renderem pacificamente aqui, posso deixar isso passar, sabe?"
22140-47 = "...Isso não é possível."
22140-48 = "Eu recebi ordens da Rio-sama."
22140-49 = "Dizendo: 'Suprima a C&C, que está agindo contra as instruções'..."
22140-50 = "Por isso, não posso sair deste lugar."
22140-52 = "Hmm, você é bem certinha, Toki-chan♪"
22140-53 = "Uma reação dentro do esperado."
22140-54 = "A C&C é uma organização de agentes secretos..."
22140-55 = "No início, eu estava preparada, prevendo que vocês tentariam nos confundir com uma infiltração..."
22140-56 = "Mas não esperava que viessem de forma tão direta..."
22140-57 = "...Isso foi inesperado. #nMas, o fato de eu estar aqui também não faz parte do plano de vocês?"
22140-59 = "...É mesmo?"
22140-60 = "Ahaha♪ Será que não é algo assim?"
22140-62 = "Ora, pois é... para nós também foi inesperado."
22140-63 = "— Não adianta tentar me enganar."
22140-64 = "Eu já entendi as intenções das minhas seniores."
22140-65 = "A sênior Neru e o Sensei não estão aqui."
22140-66 = "Ou seja, esse é o plano, não é? #nVocês foram encarregadas de me distrair."
22140-67 = "De certa forma, isso está correto. Evitar um confronto direto comigo, que visto o 'armamento' da Rio-sama,"
22140-68 = "e enquanto isso, deixar a sênior Neru, a força de combate mais poderosa do Millennium, livre..."
22140-69 = "Se for esse o caso, sim... certamente vocês têm chances de vencer."
22140-70 = "Quem é que tem chances de vencer?"
22140-78 = "Ahaha! Você demorou, Chefe!"
22140-79 = "Neru... sênior, por que você está... aqui...?"
22140-80 = "Ah? Isso já está decidido, não está?"
22140-81 = "É uma revanche."
22140-82 = "Revanche...?"
22140-83 = "Se eu agisse por conta própria, você viria me impedir, não viria?"
22140-84 = "E eu não estou a fim de lidar com esse incômodo."
22140-85 = "Então, salvar a pirralha..."
22140-86 = "Não será tarde demais se eu fizer isso depois de te derrotar."
22140-87 = "Ei, novata. Você me pagou caro da última vez."
22140-88 = "Vou te ensinar direitinho o que acontece quando você desafia uma veterana."
22140-95 = "……！！"
22140-96 = "Iniciando resposta."
22140-102 = "Ha! Beleza! Vamos ver do que você é capaz!"
22140-106 = "Com isso...!"
22140-107 = "Todos os drones incômodos foram derrotados...!"
22140-108 = "[ns] \"Pessoal, mantenham o foco! Já estamos chegando na superfície...!\""
22140-114 = "Issooo! Conseguimos sair!"
22140-115 = "E agora, para onde devemos ir?"
22140-117 = "A Alice provavelmente está no centro de Eridu..."
22140-118 = "Isso, naquela torre bem no meio."
22140-119 = "Calculei a rota a partir da nossa localização atual. #nSiga pela avenida à esquerda e continue direto para o norte para chegar lá."
22140-120 = "[ns] \"Obrigada pelo suporte. Então, vamos nessa."
22140-131 = "Saiam da frente!!"
22140-139 = "Eu vou guiando o caminho."
22140-140 = "Vamos seguir em frente! GOGO~!"
22140-142 = "Próximo episódio: Armadilha"
