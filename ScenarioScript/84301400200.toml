[translation]
84301400200-5 = "これは……。"
84301400200-6 = "ミレニアムでは何が起きてもおかしくない。そうは言ったが……。"
84301400200-7 = "ふむ……事なきを得られたのは二人のお陰だ。ありがとう。"
84301400200-8 = "楽しかったから気にしないで！"
84301400200-9 = "いや先輩、そういうことじゃなくて……。"
84301400200-11 = "なぜアバンギャルド君が暴走を……？"
84301400200-12 = "こんなパターンを入れた覚えは……。"
84301400200-18 = "それに、このタイミングは……。"
84301400200-23 = "それで、説明してもらえるのよね……？"
84301400200-27 = "やはり……。"
84301400200-28 = "いつかきっと、やらかすとは思ってたけど、よりによって今日だなんて……！"
84301400200-29 = "どうせ昨日チェックした後に機能追加したんでしょ！？"
84301400200-30 = "いや、セミナーのチェック以降、私たちは何もしていない。"
84301400200-31 = "じゃあどうして暴れてるのよ！"
84301400200-32 = "原因は判明していないが……少なくとも、私たちが何もしていないのだけは事実だよ。"
84301400200-33 = "こっそり計画してたものは、無事に昨日のチェックを通過しているし……。"
84301400200-34 = "はぁ！？それはそれで問題なんだけど。"
84301400200-35 = "あっ……口が滑った……。"
84301400200-37 = "（素直な人だ）"
84301400200-39 = "騒ぎを起こしたのは申し訳なく思っている。でも、今回の暴走に限っては本当に心当たりがないんだ。"
84301400200-43 = "……本当に違うの？"
84301400200-44 = "うーん……ウタハ先輩はこういう時に噓をつくタイプじゃないし……。"
84301400200-45 = "私が検証しようにも、専門外なのよね……せめて会長がいれば……。"
84301400200-46 = "たしかに、会長ならすぐ証明できただろうが……ここに居ない以上はしょうがない。#n責任をもって、この件は私たちに調査させてくれないかい？"
84301400200-48 = "（リオ……信頼されているのだね）"
84301400200-50 = "分かったわ。時間をあげるからきっちり原因を特定してちょうだい。"
84301400200-51 = "任せてくれ。"
84301400200-57 = "（……どうにも腑に落ちないな）"
84301400200-58 = "（少し、確認してみるとするか）"
