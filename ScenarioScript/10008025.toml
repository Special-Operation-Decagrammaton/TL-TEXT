[translation]
10008025-1 = "第2話;混乱はいつも突然に"
10008025-3 = "ちょっと！爆発音が聞こえたけど、どうしたの！？"
10008025-4 = "あ、バイトちゃんお疲れ～。ちょっとこいつらがねー……"
10008025-8 = "はっはっはっ！"
10008025-10 = "あ、あれって……！？"
10008025-11 = "……その反応だと、やっぱり予定してたイベントとかじゃないみたいだね。"
10008025-12 = "絶対違う！お正月のヒーローショーとか聞いたことないし！"
10008025-14 = "あいつら、カイテンジャーだ……！"
10008025-15 = "「一度現れたら周囲を焦土と化してしまう」という、あの！？"
10008025-16 = "ど、どうしてここに……！？"
10008025-18 = "あれさ、実はバイトちゃんのお仲間だったりしない？覆面水着団の新しいコスチュームとか。"
10008025-19 = "絶対に違うから！？あんなのが仲間とか嫌！"
10008025-20 = "あとそれは忘れて、黒歴史なのっ！！"
10008025-21 = "[s] \"カイテンジャー……！？\""
10008025-22 = "あれ、先生知ってるの？"
10008025-23 = "[s1] \"いや、初めて見るはずなんだけど……。\"\n[s2] \"BD、技術ノート……！うっ、頭が……！\""
10008025-26 = "ふはははっ、なかなかやるではないか！"
10008025-27 = "レッド、舐めてかかると痛い目見るぞ！"
10008025-28 = "ふん、だとしても問題は無い。"
10008025-29 = "ああ、"
10008025-30 = "我々の目的は戦うことではない！"
10008025-31 = "とうっ！"
10008025-44 = "さ、賽銭箱が……！？"
10008025-45 = "……え？"
10008025-46 = "ちょぉっ！？"
10008025-48 = "レッド、賽銭箱の奪取完了しました。しっかり成果給に反映しておいてください。"
10008025-49 = "流石、給料が絡むとしっかりしてるな！グリーン！"
10008025-50 = "これで第一目標は完了。"
10008025-51 = "はっはっはっ！よし、このお金は我々カイテンジャーが公明正大に使わせてもらうこととする！"
10008025-52 = "この賽銭箱、確かに貰い受けたぞ！"
10008025-54 = "ちょっ、何してんのよっ！？"
10008025-55 = "では、アディオス！"
10008025-60 = "[ns3] \"賽銭箱が……。\"\n[ns4] \"盗まれた……？\""
10008025-63 = "ええぇぇぇぇぇぇっ！？"
10008025-64 = "ちょっ、これ私の責任じゃないわよね！？これでバイト代無くなったりしないわよね！？"
10008025-65 = "くくっ、ふふふっ……！"
10008025-66 = "あははははっ！何あいつら、意味わかんない！賽銭箱持っていってるし、あははははははっ！"
10008025-67 = "何この状況……。"
10008025-69 = "あ、アル様！？ど、どどどどどうしましょう！？"
10008025-70 = "そんなの決まってるでしょう！すぐに追いかけるわよ！"
10008025-71 = "そうだよ、賽銭箱を取り返さないと！"
10008025-72 = "うーん……。"
10008025-73 = "……これ、追いかける必要ある？"
10008025-74 = "えぇっ！？"
10008025-75 = "盗まれたのは賽銭箱だし、取り返したってそれが私たちのお金になるわけでもない。"
10008025-76 = "それにあいつら、結構厄介だよ。指名手配されてる悪党だし、相手をするにはそこそこリスクがある。"
10008025-77 = "……っ！べ、別に良いわよ！どうせあんたたちに頼らなくたって、自分で何とかするから！"
10008025-78 = "自分の力で何とかする！アビドスのことも、今回のこともっ！"
10008025-79 = "じゃあ、私はもう行くから！"
10008025-80 = "[s] \"セリカ。\""
10008025-81 = "止めないで先生！早く行かないと……！"
10008025-86 = "……私たちも行くわ。"
10008025-87 = "えっ！？"
10008025-88 = "ど、どういうこと……！？"
10008025-89 = "……カヨコの言うことは、確かに正しいわ。"
10008025-90 = "もう私たちのお願いごとは済んだのだし、わざわざ自分たちから危険を背負う必要も無い。"
10008025-91 = "でもね……我々便利屋68はいつから、損得を計算して動く集団になったのかしら？"
10008025-92 = "ふぅ……。"
10008025-93 = "計算上はやる必要ないわ。"
10008025-94 = "でもね、これはあくまでも気分の問題……"
10008025-96 = "年明け早々、この私たちが入れたお金を盗むなんて許せない、それだけよ！！"
10008025-102 = "へぇ……。"
10008025-103 = "あ、アル様……！！"
10008025-104 = "……まあ、そう言うと思ったけど。"
10008025-105 = "逃走ルートは大体絞れた。今から急げば、15分以内には追いつけるはず。"
10008025-106 = "先生もいるから、もう少し早まるかもね。"
10008025-107 = "ふーん、なるほど～？"
10008025-108 = "カヨコちゃん。アルちゃんが最初っからそう言うの分かってて、調べてたんでしょ？"
10008025-109 = "……まあ、いつものパターンだから。"
10008025-111 = "な、何か色[ruby=しゃく]々癪な[/ruby]感じもするけど……"
10008025-112 = "今はお礼とか言わないから。賽銭箱を取り返して、全部終わってからね！"
10008025-113 = "[s] \"じゃあ、みんなで追いかけよっか。\""
10008025-115 = "さ、流石はアル様です！これが真のアウトローの振る舞いなんですね！また一つ学びました……！"
10008025-116 = "まあ、元々アルちゃんは衝動的なところあるからね～。"
10008025-117 = "ふふっ……それを言うなら「衝動」じゃなくて、「アウトローの気質」と言ってくれるかしら？"
10008025-120 = "（事業が潰れませんように、事業が潰れませんように、事業が潰れませんように、事業が潰れませんように、事業が潰れませんように、事業が潰れませんように……っ！！）"
10008025-125 = "「穢れ」が付いたりしたら……？"
10008025-126 = "蓄積された願いが丸っと裏返って、大変なことに……！"
10008025-129 = "（賽銭箱を取り返せなかったら、あの願いが裏返って……！）"
10008025-130 = "（ぜ、絶対に、何としてでも取り返さないと！！！）"
