[translation]
10008025-1 = "Episódio 2: A confusão sempre surge de repente"
10008025-3 = "Ei! Eu ouvi uma explosão, o que aconteceu!?"
10008025-4 = "Ah, bom trabalho, garota do bico. É que esses caras aqui..."
10008025-8 = "Hahahaha!"
10008025-10 = "A-aquilo é...!?"
10008025-11 = "...Pela sua reação, parece que não é um evento planejado, né."
10008025-12 = "Com certeza não! Nunca ouvi falar de um show de heróis no Ano Novo!"
10008025-14 = "Aqueles caras, são os Kaitenger...!"
10008025-15 = "Aqueles que dizem que \"onde aparecem, deixam tudo em terra arrasada\"!?"
10008025-16 = "P-por que eles estão aqui...!?"
10008025-18 = "Sabe, será que eles não são seus colegas, garota do bico? Tipo um novo traje do Grupo de Máscaras de Banho."
10008025-19 = "Com certeza não são! Eu não quero que gente daquele tipo seja minha colega!"
10008025-20 = "E esquece isso, aquilo é um passado sombrio!!"
10008025-21 = "[s] \"Kaitenger...!?\""
10008025-22 = "Ué, Sensei, você conhece eles?"
10008025-23 = "[s1] \"Não, era para ser a primeira vez que os vejo...\"\n[s2] \"BD, notas técnicas...! Ugh, minha cabeça...!\""
10008025-26 = "Fuhahahaha, vocês não são nada mal!"
10008025-27 = "Red, se você subestimar eles, vai se dar mal!"
10008025-28 = "Hum, mesmo assim, não há problema."
10008025-29 = "Ah,"
10008025-30 = "Nosso objetivo não é lutar!"
10008025-31 = "Hya!"
10008025-44 = "A-a caixa de oferendas...!?"
10008025-45 = "...Hã?"
10008025-46 = "Ei!?"
10008025-48 = "Red, a captura da caixa de oferendas foi concluída. Por favor, certifique-se de refletir isso no nosso bônus de desempenho."
10008025-49 = "Como esperado, quando envolve salário, você é bem eficiente! Green!"
10008025-50 = "Com isso, o primeiro objetivo foi concluído."
10008025-51 = "Hahahaha! Muito bem, nós, os Kaitenger, faremos um uso justo e honesto deste dinheiro!"
10008025-52 = "Esta caixa de oferendas, nós a aceitaremos!"
10008025-54 = "Ei, o que vocês estão fazendo!?"
10008025-55 = "Então, adios!"
10008025-60 = "[ns3] \"A caixa de oferendas...\"\n[ns4] \"Foi roubada...?\""
10008025-63 = "Eeeeeeeeeh!?"
10008025-64 = "Ei, isso não é minha responsabilidade, né!? Meu pagamento do bico não vai sumir por causa disso, né!?"
10008025-65 = "Hehehe, fufufu...!"
10008025-66 = "Ahahahaha! O que são aqueles caras, não faz sentido nenhum! Eles levaram a caixa de oferendas, ahahahaha!"
10008025-67 = "Que situação é essa..."
10008025-69 = "A-Aru-sama!? O-o-o-o que a gente faz!?"
10008025-70 = "Isso já está decidido! Vamos persegui-los agora mesmo!"
10008025-71 = "É verdade, temos que recuperar a caixa de oferendas!"
10008025-72 = "Hmm..."
10008025-73 = "...Precisamos mesmo perseguir eles?"
10008025-74 = "Hã!?"
10008025-75 = "O que foi roubado foi a caixa de oferendas, e mesmo que a gente recupere, não vai virar nosso dinheiro."
10008025-76 = "Além disso, eles são bem problemáticos. São criminosos procurados, e enfrentá-los traz um certo risco."
10008025-77 = "...! T-tudo bem, não importa! De qualquer forma, não preciso da ajuda de vocês, eu mesma dou um jeito!"
10008025-78 = "Vou resolver isso com minhas próprias forças! Tanto o caso de Abydos quanto isso!"
10008025-79 = "Então, eu já vou indo!"
10008025-80 = "[s] \"Serika.\""
10008025-81 = "Não me pare, Sensei! Se não formos logo...!"
10008025-86 = "……Nós também vamos."
10008025-87 = "Hã!?"
10008025-88 = "O-o que você quer dizer com isso...!?"
10008025-89 = "……O que a Kayoko disse está certamente correto."
10008025-90 = "Já terminamos o que tínhamos que pedir, e não há necessidade de nos colocarmos em perigo por conta própria."
10008025-91 = "Mas, sabe... desde quando nós, da Problem Solver 68, nos tornamos um grupo que age calculando lucros e perdas?"
10008025-92 = "Puff..."
10008025-93 = "Matematicamente, não precisamos fazer isso."
10008025-94 = "Mas, veja bem, isso é puramente uma questão de princípio..."
10008025-96 = "Roubar o dinheiro que nós mesmas depositamos logo no início do ano é imperdoável, só isso!!"
10008025-102 = "Heh..."
10008025-103 = "A-Aru-sama...!!"
10008025-104 = "……Bem, eu já imaginava que você diria isso."
10008025-105 = "Já reduzi as rotas de fuga. Se nos apressarmos agora, devemos alcançá-los em menos de 15 minutos."
10008025-106 = "Como o Sensei está aqui, talvez consigamos ser ainda mais rápidos."
10008025-107 = "Hmm, entendi~?"
10008025-108 = "Kayoko-chan. Você já sabia que a Aru-chan diria isso desde o começo e já estava investigando, não é?"
10008025-109 = "……Bem, é o padrão de sempre."
10008025-111 = "É, sinto que tem algo irritante nisso tudo, mas..."
10008025-112 = "Não vou agradecer agora. Vamos recuperar a caixa de ofertas e, depois que tudo terminar, a gente conversa!"
10008025-113 = "[s] \"Então, vamos todos atrás deles.\""
10008025-115 = "C-como esperado da Aru-sama! Esse é o verdadeiro comportamento de uma fora da lei! Aprendi mais uma coisa...!"
10008025-116 = "Bem, a Aru-chan sempre foi um pouco impulsiva, não é~."
10008025-117 = "Fufu... Se for para dizer algo, que tal chamar de \"temperamento de fora da lei\" em vez de \"impulso\"?"
10008025-120 = "(Que o nosso negócio não vá à falência, que o nosso negócio não vá à falência, que o nosso negócio não vá à falência, que o nosso negócio não vá à falência, que o nosso negócio não vá à falência, que o nosso negócio não vá à falência...!!)"
10008025-125 = "E se... algo \"impuro\" se apegar a ele...?"
10008025-126 = "Os desejos acumulados podem se inverter completamente e causar um desastre...!"
10008025-129 = "(Se eu não recuperar a caixa de ofertas, aquele desejo vai se inverter...!)"
10008025-130 = "(Eu preciso, de qualquer jeito, recuperar aquilo a todo custo!!!)"
