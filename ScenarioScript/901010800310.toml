[translation]#[Texto Final. - Filipe 05/07.]
901010800310-9 = "FOX2, de volta ao QG."
901010800310-13 = "Ah, bem-vinda."
901010800310-14 = "Bom trabalho hoje."
901010800310-15 = "Ué, com essa cara séria, o que foi?"
901010800310-16 = "Estava organizando a situação atual dos desaparecimentos em D.U."
901010800310-17 = "Felizmente, o paradeiro dos que sumiram no porto de Kanezaki foi esclarecido, mas……"
901010800310-18 = "Ainda há muitos desaparecidos na cidade."
901010800310-19 = "Então temos trabalho?"
901010800310-20 = "Não, não é isso……"
901010800310-25 = "É que ainda não tenho certeza se posso arcar com a responsabilidade desse caso."
901010800310-26 = "Mesmo que eu revele a verdade como sempre, não vou conseguir satisfazer todo mundo."
901010800310-27 = "Quando chegar a hora de arcar com as consequências dessa escolha――"
901010800310-28 = "será que vou aguentar sozinha?"
901010800310-32 = "Precisa aguentar sozinha?"
901010800310-33 = "Mas não posso jogar minha responsabilidade nos outros――"
901010800310-41 = "Não é responsabilidade só da Yukino-chan, é de todas nós."
901010800310-45 = "……É verdade."
901010800310-46 = "Primeiro, vamos focar no presente."
901010800310-47 = "A capitã pensa demais, isso é bom e ruim ao mesmo tempo."
901010800310-48 = "É."
901010800310-49 = "Primeiro, cuidar do que está na nossa frente."