[translation]
901010800310-9 = "FOX2, de volta."
901010800310-13 = "Ah, bem-vinda."
901010800310-14 = "Bom trabalho hoje também."
901010800310-15 = "Opa, com essa cara séria, o que foi?"
901010800310-16 = "Estava organizando a situação atual dos desaparecimentos na região do D.U."
901010800310-17 = "Felizmente, o paradeiro das pessoas que sumiram no Porto Kanezaki foi esclarecido..."
901010800310-18 = "Mas ainda há muitos desaparecidos nesta cidade."
901010800310-19 = "É muito trabalho?"
901010800310-20 = "Não, não é isso..."
901010800310-25 = "Ainda não tenho certeza se sou capaz de assumir a responsabilidade por este caso."
901010800310-26 = "Como sempre, mesmo que eu traga a verdade à tona, não conseguirei satisfazer todos."
901010800310-27 = "E quando chegar o momento em que eu tiver que arcar com as consequências das minhas escolhas..."
901010800310-28 = "Será que eu conseguirei suportar isso sozinha?"
901010800310-32 = "Precisa ser sozinha?"
901010800310-33 = "Mas eu não posso colocar minha responsabilidade nos outros –"
901010800310-41 = "Não é responsabilidade só sua, Yukino-chan. É responsabilidade de todas nós."
901010800310-45 = "... É mesmo."
901010800310-46 = "Primeiro, vamos focar no agora."
901010800310-47 = "O ponto forte da líder é pensar demais, mas isso também é um ponto fraco."
901010800310-48 = "Ah."
901010800310-49 = "Vamos, primeiro o trabalho na nossa frente."