[translation]
901010800310-9 = "FOX2, reporting back in."
901010800310-13 = "Ah, welcome back."
901010800310-14 = "Good work today."
901010800310-15 = "Wait, why the serious face? What's wrong?"
901010800310-16 = "I was organizing the current status of the disappearances occurring throughout D.U."
901010800310-17 = "Fortunately, the whereabouts of the people who vanished at Kanezaki Port have been clarified, but..."
901010800310-18 = "There is no doubt that there are still a significant number of missing persons in this city."
901010800310-19 = "Does that mean there's a lot of work to do?"
901010800310-20 = "No, it's not that..."
901010800310-25 = "I'm still not sure if I can take responsibility for this case."
901010800310-26 = "Even if I uncover the truth as I always do, I probably won't be able to satisfy everyone."
901010800310-27 = "The moment the time comes to bear the responsibility for those choices—"
901010800310-28 = "Will I be able to endure it alone?"
901010800310-32 = "Do you really need to endure it alone?"
901010800310-33 = "But I can't force my responsibilities onto others—"
901010800310-41 = "It's not just your responsibility, Yukino. It's all of our responsibility."
901010800310-45 = "...I suppose you're right."
901010800310-46 = "First, I need to focus on the present."
901010800310-47 = "Thinking about so many things is your strength as a squad leader, but it's also your weakness."
901010800310-48 = "Yeah."
901010800310-49 = "Let's start with the work right in front of us."