[translation]
2600203-1 = "A culinária dela"
2600203-2 = "Gehenna, 8º Refeitório Estudantil"
2600203-3 = "O prato que vou fazer hoje é..."
2600203-4 = "Curry!"
2600203-5 = "[s] \"Um menu mais direto do que eu esperava.\""
2600203-6 = "Já que é um prato que vou tentar fazer junto com o Sensei,"
2600203-7 = "pensei que um curry, que todo mundo gosta, seria uma escolha segura."
2600203-8 = "Ah, por acaso você não gosta de curry...?"
2600203-9 = "Podemos fazer aquele ajillo que fiz da outra vez, se preferir..."
2600203-10 = "[s] \"Não é isso! Escolha segura é bom! Viva o básico!!\""
2600203-11 = "Entendo, muito obrigada."
2600203-12 = "Então, vamos começar preparando os ingredientes!"
2600203-14 = "Trouxe os ingredientes."
2600203-15 = "Bloco de curry, carne de porco, três batatas, uma cebola..."
2600203-16 = "E também cenoura, temperos e tudo mais..."
2600203-17 = "Acho que é basicamente isso."
2600203-18 = "[s] \"Ainda está normal...\""
2600203-19 = "Ué, aconteceu alguma coisa, Sensei?"
2600203-20 = "[s] \"N-não, não é nada.\""
2600203-21 = "É mesmo? Então, vamos começar preparando os alimentos."
2600203-22 = "Primeiro, de acordo com a receita, a textura da carne é muito importante, especialmente para um curry mais adocicado."
2600203-23 = "Por isso, vamos deixar a carne de porco bem macia."
2600203-24 = "[s1] \"Entendi. Existem várias formas de amaciar, né.\"\n[s2] \"Como usar alho ralado ou leite.\""
2600203-25 = "Sim, existem vários métodos para amaciar a carne, mas..."
2600203-26 = "Sim, existem vários métodos para amaciar a carne, mas..."
2600203-27 = "Eu tenho um método perfeito."
2600203-28 = "A carne fica mais macia quanto mais impacto ela recebe, não é?"
2600203-29 = "Para isso, eu tenho a ferramenta ideal!"
2600203-31 = "[s] \"Ei... Juri? O que é isso que você está segurando...\""
2600203-32 = "Isto aqui é..."
2600203-33 = "Uma espingarda de cano duplo! Ela pode disparar dezenas de balas de uma vez! Com certeza vai deixar a carne super macia...!"
2600203-34 = "[s3] \"Mais do que macia!\"\n[s4] \"Vai virar pó, não vai!?\""
2600203-35 = "Ei!☆"
2600203-36 = "Ei!☆"
2600203-44 = "A carne ficou bem macia agora, não ficou?"
2600203-45 = "[ns5] \"Isso não é nem de longe o nível de 'bem macia'!?\"\n[ns6] \"Por que você usa uma arma na cozinha!?\""
2600203-46 = "Ah, n-não deu certo...!?"
2600203-47 = "Ah, n-não deu certo...!?"
2600203-48 = "É, eu imaginei..."
2600203-49 = "Toda vez que eu saco uma arma, todos tentam me impedir com muita agressividade, então eu já suspeitava que..."
2600203-50 = "Então o problema é o jeito que eu seguro a arma..."
2600203-51 = "[s] \"Não é o jeito de segurar, é o fato de usar uma arma!\""
2600203-52 = "Sensei! Saber usar as ferramentas é muito importante, sabia?"
2600203-53 = "Se você segurar uma faca de cozinha do jeito errado, pode acabar se machucando feio!"
2600203-54 = "[s] \"Isso é verdade, mas por que eu estou levando bronca!?\""
2600203-55 = "De qualquer forma, agora vai dar certo, não vou errar de novo!"
2600203-56 = "Bem, deixa eu ver a receita..."
2600203-57 = "Ah, achei."
2600203-58 = "O próximo passo é refogar os ingredientes."
2600203-59 = "A ordem para refogar é..."
2600203-60 = "Primeiro as cenouras, depois as batatas e, por fim, as cebolas."
2600203-61 = "[s] \"Certo, então vamos começar pelas cenouras...\""
2600203-62 = "Mas, você não acha que isso levaria tempo demais?"
2600203-63 = "[s] \"...Hã?\""
2600203-64 = "A merenda precisa ser servida em um horário específico, então nós, do Clube de Merenda, precisamos preparar muita comida rapidamente."
2600203-65 = "Por isso, eu parei para pensar."
2600203-66 = "E acabei descobrindo um método revolucionário!"
2600203-67 = "Ei!"
2600203-73 = "[s] \"Espera, espera, espera!?\""
2600203-74 = "Aconteceu alguma coisa?"
2600203-75 = "[s] \"Se colocar tudo de uma vez, o cozimento vai ficar desigual...!\""
2600203-76 = "Ah, é verdade, cada vegetal leva um tempo diferente para cozinhar,"
2600203-77 = "então você está dizendo que precisamos ter cuidado com isso, certo?"
2600203-78 = "[s] \"Você sabe disso muito bem! Então por que fez aquilo!?\""
2600203-79 = "Ehem, eu sou um membro do Clube de Merenda, afinal! É claro que eu sei disso~♪"
2600203-80 = "E esse problema pode ser resolvido com o método revolucionário que eu inventei!"
2600203-81 = "Tcharam, vou usar isto!"
2600203-82 = "[s] \"Isso é... um maçarico?\""
2600203-83 = "Sim, se o fogo do fogão a gás não é suficiente para cozinhar tudo por igual,"
2600203-84 = "então, se usarmos o maçarico também...!"
2600203-85 = "Combinando o fogão a gás com o maçarico, teremos o dobro da potência de uma vez só!"
2600203-86 = "[s] \"Culinária não é uma questão de somar forças, sabia!?\""
2600203-87 = "Eia!"
2600203-90 = "(O resultado foi desastroso. Embora tenha sido uma atitude perigosa, por que as coisas chegaram a esse ponto...)"
2600203-92 = "(Pó de curry queimado e escurecido espalhado por mais da metade do chão do refeitório...)"
2600203-93 = "(Chamas ardendo alto e intensamente...)"
2600203-94 = "(Algo que parece curry transbordando da panela, fervendo como se fosse magma)"
2600203-95 = "Hum, por que será que as coisas terminaram assim...?"
2600203-96 = "[s] \"Bom, acho que a causa está bem clara...\""
2600203-97 = "E-eu só queria fazer o curry rapidamente para todas vocês..."
2600203-98 = "[s] \"O resultado de priorizar a velocidade foi esse...\""
2600203-99 = "T-tá tudo bem! Vamos começar tudo de novo desde o início!"
2600203-100 = "Primeiro, hum, vamos dar um jeito nesse fogo...!"
2600203-101 = "Ei!"
2600203-102 = "[s] \"Juri! É melhor você não tocar em mais nada...!\""
2600203-104 = "Ah, explodiu e o sprinkler..."
2600203-108 = "(Por algum motivo, após uma explosão grandiosa, acabei discutindo calorosamente (?) com a Juri sobre onde foi que erramos, enquanto estávamos encharcadas)"
