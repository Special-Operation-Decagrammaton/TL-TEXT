[translation]
13380-1 = "第38話;約束"
13380-4 = "ユメ、先輩……？"
13380-7 = "この手紙は、未来のホシノちゃんに送る手紙だよ。"
13380-8 = "私は3年生になったホシノちゃんを見られないけど……。"
13380-9 = "きっと、立派な先輩になってるんだろうなぁ。"
13380-12 = "…………先輩。"
13380-19 = "どうどう？#n良い先輩になれた？"
13380-20 = "後輩の面倒は見られてる？#n守れるくらい頼もしい先輩になれたかな？"
13380-21 = "みんなと協力はできてる？"
13380-22 = "困った時に手を貸してくれる友達はできた？#nちゃんと未来に向かって進めてる？"
13380-23 = "……ちゃんと、「うへ～」って笑えてる？"
13380-27 = "ユメ先輩っ！！"
13380-28 = "せんぱい……せんぱいっ……！"
13380-29 = "私……わたし、ずっと……。"
13380-30 = "わ、わたし……っ……わたしっっ……！"
13380-31 = "ユメ、ぜんぱいっ……！"
13380-32 = "うっ……ううっ……！"
13380-33 = "うあああああああああっっ――！！"
13380-34 = "……いえ。"
13380-35 = "トラブルを起こしたり、心配をかけてばっかりです……。"
13380-36 = "役立たずで、バカな私は……。"
13380-37 = "後輩に、いつも迷惑を……。"
13380-39 = "何だか、私と似てるような……。"
13380-40 = "……ふふっ。#nそうですね、先輩みたいです。"
13380-41 = "良かった。#nやっと笑ってくれたね、ホシノちゃん。"
13380-42 = "……でも、私は知ってるよ？"
13380-43 = "ホシノちゃんは後輩のことをちゃんと守ってくれて、#n本当に困った時は、絶対に助けてくれる頼もしい子だって。"
13380-44 = "私の大切な後輩は、ちょっぴり意地悪だけど……。#n本当は誰よりも優しいんだって……ちゃんと、分かってるよ。"
13380-45 = "全然、違います……。"
13380-46 = "めっ。"
13380-47 = "……？"
13380-48 = "自分を責めないの。#nホシノちゃんはいつも頑張ってる、良い先輩だよ。"
13380-49 = "……。"
13380-50 = "お疲れ様、ホシノちゃん。"
13380-51 = "大変だったよね……ずっと、一人で頑張って。"
13380-52 = "……はい。"
13380-53 = "みんなのためになれば良いなと思って……ずっと、ずっと。"
13380-54 = "努力してきた、つもりです……。"
13380-55 = "先輩がいなくなって、つらかったですけど……それでも、私は……。"
13380-64 = "よしよし、ホシノちゃん。#nいっぱい頑張ってきたんだね。"
13380-65 = "……。"
13380-66 = "大丈夫……？#n息苦しくない？"
13380-67 = "ユメ先輩……。"
13380-68 = "会いたいです……。"
13380-69 = "……会いたいです、先輩。"
13380-73 = "うん……知ってるよ。"
13380-74 = "でも、ホシノちゃんにはまだやることがあるでしょ？"
13380-75 = "……やること。"
13380-76 = "うん。"
13380-78 = "後輩を守ってあげないと、ね。"
13380-84 = "ホシノ"
