[translation]
80000102-1 = "Chaveiro combinando"
80000102-2 = "（De repente, recebo uma mensagem da Momiji e, enquanto espero no Schale...）"
80000102-3 = "Sensei! Sinto muito por fazer você esperar..."
80000102-4 = "Está tudo bem, o Sensei diz, mas..."
80000102-5 = "Sim? Na verdade, você chegou 20 minutos mais cedo...?"
80000102-6 = "V-verdade. Pelo contrário, eu que peço desculpas... o que eu faço?"
80000102-7 = "[s1] \"Calma, Momiji.\"\n[s2] \"Então, aconteceu alguma coisa?\""
80000102-10 = "Ah, sim! É que eu finalmente consegui a reedição de um mangá que estava esgotado há muito tempo!"
80000102-11 = "É um mangá de romance sobre um chocolatier... e eu viciei muito nele ultimamente..."
80000102-12 = "Hehehe... foi difícil conseguir, mas fico feliz por ter conseguido três exemplares sem problemas."
80000102-13 = "Hã? Todos parecem o mesmo livro?"
80000102-14 = "Claro que sim! São três exemplares: um para guardar, um para ler e um para divulgar!"
80000102-15 = "Ah, claro, o exemplar para guardar ainda está com o plástico original, viu?"
80000102-16 = "Para o Sensei, eu vou dar este exemplar de divulgação!"
80000102-17 = "[s] \"O-oh, entendi. Obrigado...?\""
80000102-21 = "（Recebo o mangá da Momiji, que está sorrindo, e logo abro...）"
80000102-22 = "（...！）"
80000102-27 = "[ns] \"O que é isso?\""
80000102-28 = "Ah, isso é...! Parabéns, Sensei!"
80000102-29 = "É o chaveiro do protagonista e o chocolate que aparece na história!#nEles vêm de brinde aleatório para comemorar o relançamento!"
80000102-30 = "Hehe, o Sensei tem muita sorte mesmo.#n...Espere, será que eu também tive sorte por ter comprado o mangá?"
80000102-31 = "Hã? Você quer devolver para mim, que comprei...?"
80000102-32 = "N-não pode! Isso é do Sensei!#nNão precisa devolver! Pelo contrário, por favor, aceite!"
80000102-33 = "P-por que estou tão apressada, você pergunta?#nÉ que, bem..."
80000102-34 = "D-de qualquer forma! Sensei, aceite! É sério, viu?"
80000102-35 = "[s] \"O-ok... entendi.\""
80000102-36 = "..."
80000102-37 = "Ufa, que bom..."
80000102-38 = "Bem, então vou ler o meu exemplar de leitura."
80000102-42 = "（Momiji abre o mangá com uma expressão feliz...）"
80000102-47 = "..."
80000102-48 = "[s] \"...?\""
80000102-49 = "E-e-e-eh! I-isso é, bem...!"
80000102-50 = "N-não é que eu quisesse combinar com o Sensei!#nNão, quer dizer, não é que eu não goste... pelo contrário..."
80000102-51 = "Waaaaah... o que eu deveria dizer...?"
80000102-52 = "[s] \"Que bom, Momiji.\""
80000102-53 = "S-sim...?"
80000102-54 = "[s] \"Agora estamos combinando.\""
80000102-55 = "..."
80000102-56 = "Sim, é verdade."
80000102-57 = "Hehe... ehehe..."
80000102-58 = "..."
80000102-59 = "Ei, Sensei."
80000102-60 = "Você poderia deixar os dois chaveiros enfeitando a sua mesa...?"
80000102-61 = "Tipo, se possível, perto um do outro... alinhados."
80000102-62 = "[s] \"...Hm? Tudo bem, mas por quê?\""
80000102-63 = "V-verdade!?"
80000102-64 = "Ah..."
80000102-65 = "É que eu acho que a mesa fica mais alegre assim!"
80000102-66 = "Mentalmente... e para a eficiência do trabalho... com certeza deve ser isso!"
80000102-67 = "……。"
80000102-68 = "Sendo assim, vou deixar o chaveiro enfeitando a sua mesa, Sensei……"
80000102-69 = "E o chocolate…… é um desperdício comer sozinha, então, por que não comemos juntos?"
80000102-70 = "[s] \"Sim, vamos fazer isso.\""
80000102-71 = "……！"
80000102-72 = "Sim, vamos fazer isso! Vamos comer juntos!"
80000102-73 = "Você também vai ler o mangá comigo!?#nS-sério mesmo? Tudo bem, né!?"
80000102-74 = "Hehehe…… vir ao Schale hoje foi a melhor decisão que eu tomei."
80000102-76 = "(Comi o chocolate enquanto lia o mangá junto com a Momiji, que não parava de sorrir)"
