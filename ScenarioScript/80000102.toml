[translation]
80000102-1 = "お揃いのキーホルダー"
80000102-2 = "（突然モミジから連絡が来て、シャーレで待っていると……）"
80000102-3 = "先生！お待たせしてすみません……"
80000102-4 = "大丈夫、と先生は仰いますが……"
80000102-5 = "はい？むしろ20分早い……？"
80000102-6 = "ほ、本当ですね。逆に申し訳が……どうしましょう？"
80000102-7 = "[s1] \"落ち着いて、モミジ。\"\n[s2] \"それで、何かあったの？\""
80000102-10 = "あ、はい！それがですね、ずっと絶版だった漫画の復刻版をやっと手に入れたんです！"
80000102-11 = "ショコラティエを題材にした恋愛漫画なんですが……最近すごくハマってて……"
80000102-12 = "えへへ……手に入れるのは大変でしたが、無事に三冊手に入れられて良かったです。"
80000102-13 = "え？全部同じ本に見える？"
80000102-14 = "それはそうですよ！保存用と観賞用、布教用で三冊ですから！"
80000102-15 = "あ、もちろん保存用はシュリンクもそのままですよ？"
80000102-16 = "先生には、こちらの布教用を差し上げます！"
80000102-17 = "[s] \"う、うん。ありがとう……？\""
80000102-21 = "（笑顔のモミジから漫画を受け取り、さっそく開けてみると……）"
80000102-22 = "（……！）"
80000102-27 = "[ns] \"これは？\""
80000102-28 = "あ、それは……！おめでとうございます、先生！"
80000102-29 = "主人公のキーホルダーと作中に登場したチョコレートですよ！#n今回の再販を記念して、ランダムで封入されているんです！"
80000102-30 = "へへ、先生は本当に運がいいですね。#n……あれ、もしかして漫画を買ってきた私も運がいいのかも？"
80000102-31 = "え？これは買ってきた私に返す……？"
80000102-32 = "だ、ダメです！それは先生のものですから！#n返さなくて大丈夫です！むしろ受け取ってください！"
80000102-33 = "ど、どうしてそんなに慌ててるのかって？#nそれは、その……"
80000102-34 = "と、とにかく！先生が受け取ってください！絶対ですよ？"
80000102-35 = "[s] \"う、うん……分かったよ。\""
80000102-36 = "……。"
80000102-37 = "ふぅ、良かった……"
80000102-38 = "それじゃあ、私も観賞用を読むとしましょう。"
80000102-42 = "（モミジが嬉しそうな表情で、漫画を開いたところ……）"
80000102-47 = "……。"
80000102-48 = "[s] \"……？\""
80000102-49 = "え、ええええっ！こ、これは、その……！"
80000102-50 = "せ、先生とお揃いにしたかったわけじゃなくて！#nいえ、その、嫌とかでは……むしろ……"
80000102-51 = "ふええぇえん……なんて言えばいいんでしょう……？"
80000102-52 = "[s] \"良かったね、モミジ。\""
80000102-53 = "は、はい……？"
80000102-54 = "[s] \"これでお揃いだよ。\""
80000102-55 = "……。"
80000102-56 = "はい、そうですね。"
80000102-57 = "へへ……えへへ……"
80000102-58 = "……。"
80000102-59 = "えっと、先生。"
80000102-60 = "このキーホルダーは両方とも、先生の机の上に飾っておいてもいいですか……？"
80000102-61 = "その、できれば近くに……並べて。"
80000102-62 = "[s] \"……ん？大丈夫だけど、どうして？\""
80000102-63 = "ほ、本当ですか！？"
80000102-64 = "あ……"
80000102-65 = "その、机の上は賑やかな方がいいと思って！"
80000102-66 = "精神的にも……仕事の効率的にも……きっとそうに違いありません！"
80000102-67 = "……。"
80000102-68 = "でしたら、キーホルダーは先生の机に飾るとして……"
80000102-69 = "チョコレートは……もったいないので、一緒に食べませんか？"
80000102-70 = "[s] \"うん、そうしようか。\""
80000102-71 = "……！"
80000102-72 = "はい、そうしましょう！一緒に食べましょう！"
80000102-73 = "漫画も一緒に読んでくださるんですか！？#nほ、本当ですね？いいんですね！？"
80000102-74 = "えへへ……今日シャーレに来たのは大正解でした。"
80000102-76 = "（ずっと笑顔のモミジと一緒に、漫画を読みながらチョコレートを食べた）"
