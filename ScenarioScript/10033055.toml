[translation]
10033055-3 = "Ufa... não tem jeito, não é?#nVou ceder desta vez e aceitar as suas exigências."
10033055-4 = "Ceder ou não, eu ainda acho que esse \"parfait de baunilha com takoyaki de pepino-do-mar\" é perigoso demais..."
10033055-6 = "C-conseguimos resolver...?#nMas, falando nisso, o funcionamento da loja... ué?"
10033055-7 = "（A barraca inteira... desapareceu sem deixar vestígios...?）"
10033055-8 = "[ns] \"Umika?\""
10033055-9 = "Ah, não é nada..."
10033055-10 = "Umika, precisamos voltar para o refeitório agora!#nO próximo compromisso já está chegando!"
10033055-11 = "V-verdade!#nFeena e Kaede, por favor, ajudem a guiar o pessoal por aqui!#nEu cuido do refeitório!"
10033055-18 = "（Que droga, que droga...!）"
10033055-19 = "（Em vez de recuperar o tempo perdido, o cronograma está cada vez mais atrasado...!）"
