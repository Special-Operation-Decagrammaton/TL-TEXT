[translation]
1301001-1 = "Consuma com planejamento"
1301001-2 = "Schale - Escritório"
1301001-3 = "Olá, Sensei. Trouxe o modelo de fatura que mencionei outro dia. Por favor, dê uma olhada quando estiver livre."
1301001-4 = "Ah, vejo que está no meio da sua refeição. Peço desculpas por interromper."
1301001-5 = "[s] \"Não, não se preocupe, está tudo bem.\""
1301001-6 = "Então, enquanto você come, vou organizar sua mesa."
1301001-9 = "A propósito... Sensei, por acaso o seu almoço é apenas esse pãozinho?"
1301001-10 = "Se me permite a ousadia... acho que deveria comer algo mais nutritivo, não acha?"
1301001-11 = "Se continuar comendo apenas pão, pode acabar ficando doente."
1301001-12 = "...Sim? O saldo da sua conta está quase zerado e não pode gastar com comida até o fim do mês...?"
1301001-13 = "Eu não sabia que o trabalho de Sensei no Schale pagava tão pouco... Que inesperado."
1301001-16 = "Espere, o que é este recibo... de uma famosa loja de brinquedos no centro de Kivotos?"
1301001-17 = "A data da compra foi semana passada, e o item é... um robô transformável de edição limitada, 100 mil ienes?!"
1301001-18 = "Sensei! O que significa este recibo!? #nCom esse dinheiro, daria para pagar um mês inteiro de alimentação, tranquilamente!"
1301001-19 = "Pular refeições por causa de brinquedos é um absurdo!"
1301001-20 = "[s1] \"Não é apenas um brinquedo! É um item de necessidade básica!\"\n[s2] \"Já que consegui comprar esse robô, uma refeição a menos não é nada!\""
1301001-21 = "Nada disso! Você precisa consumir com planejamento!"
1301001-22 = "Nada disso! Você precisa consumir com planejamento!"
1301001-24 = "Não podemos continuar assim... Vou verificar pessoalmente o seu registro de despesas! #nOnde está o seu livro de contas?"
1301001-25 = "...Sim? Sensei, você não mantém um livro de contas?"
1301001-26 = "É por isso que você acaba fazendo compras por impulso!"
1301001-28 = "...Sensei, eu vou ajudar, então junte todos os recibos do mês passado."
1301001-29 = "Vou organizar os recibos agora mesmo e verificar seus gastos!"
1301001-32 = "[wa:1200]— Francamente... [wa:1200]Você é um adulto, [wa:1000]então aja como um adulto [wa:1300]e consuma com planejamento."
1301001-35 = "— Você não é uma criança [wa:1000]que recebe mesada [wa:1000]e gasta tudo de uma vez, sabia?"
1301001-38 = "[wa:1000]— Além disso, [wa:500]sou a única que te ajuda a organizar esses recibos, [wa:4000]então valorize..."
1301001-40 = "— Da próxima vez, [wa:1500]eu não vou ajudar de jeito nenhum!"
1301001-43 = "[wa:1000]— Há 15 dias, [wa:1500]comprou um sanduíche de frango [wa:1500]na loja de conveniência por 500 ienes..."
1301001-45 = "— Compra de um novo volume de mangá por [wa:2000]450 ienes..."
1301001-48 = "— Hum...? [wa:1500]Anteontem à noite, [wa:1500]no \"Club Fuwarin\", [wa:1500]20 mil ienes...?"
1301001-51 = "— Se, [wa:700]Sensei! [wa:800]O que é esse recibo?!"
1301001-53 = "— Um educador que deveria ser um exemplo para os alunos, [wa:2500]frequentando um lugar [wa:1500]tão, [wa:1000]tão suspeito como esse...!"
1301001-56 = "— Não acredito! [wa:1200]Isso é o fim da picada!"
1301001-59 = "— Ah, [wa:1000]\"Club Fuwarin\" é o nome de um [wa:2000]gacha de jogo de celular...?"
1301001-61 = "— ...Ufa. [wa:1500]Eu achei que você, [wa:1600]bem..."
1301001-64 = "— Quer dizer, não, não! [wa:1500]Mesmo assim, [wa:800]gastar 20 mil ienes de uma vez é demais!"
1301001-67 = "[wa:300]— Compras por impulso estão proibidas! [wa:1700]Consuma de forma [wa:1300]planejada!"
1301001-70 = "Veja só. Além daquele robô transformável, há mais de 50 mil ienes que poderiam ter sido economizados, sabia?"
1301001-71 = "De agora em diante, mantenha um livro de contas e verifique o saldo restante com frequência antes de comprar qualquer coisa. Assim, você não terminará comendo apenas pão como hoje."
1301001-72 = "E outra coisa, de agora em diante, se for comprar algo acima de 5000 ienes, consulte-me primeiro!"
1301001-73 = "[s] \"Tenho que consultar a Yuuka toda vez que for comprar algo...?\""
1301001-74 = "B-bem... para corrigir esses seus maus hábitos... eu preciso cuidar de você assim..."
1301001-75 = "De qualquer forma! Isso é para o seu próprio bem, então, por favor, obedeça!"
1301001-77 = "Depois disso, Yuuka deu mais algumas broncas e foi embora."
