[translation]
10046160-3 = "やあ、待ちわびたよ。"
10046160-4 = "ついに私の出番がきたようだね。"
10046160-5 = "……セイア様？"
10046160-6 = "さて、行こうか。"
10046160-7 = "ちょっ、行く？どこへっすか！？"
10046160-8 = "パトロールをするのではなかったのかい？"
10046160-9 = "私はそうっすけど……危ないっすから。#nセイア様は安全な場所に……。"
10046160-10 = "なるほど、理解した。"
10046160-11 = "それじゃあ――"
10046160-12 = "つまり、ティーパーティーの[ruby=ゆりぞの]百合園[/ruby]セイアが担うべき役割ではない――"
10046160-13 = "――そう言いたいのだね？"
10046160-14 = "えーっと……まあ、はい。"
10046160-15 = "ふむ……私をティーパーティーの百合園セイアと定義し――#n君を正義実現委員会の[ruby=なかまさ]仲正[/ruby]イチカと定義づける。#nその違い。その理由は、何だろうか。"
10046160-16 = "……はい？"
10046160-20 = "役割とは、実体を伴わないものだ。#n例えば……君と私が無人島に漂着したとしよう。#nその場所で、平時の肩書きは意味を成さないだろう？"
10046160-21 = "……？"
10046160-22 = "つまるところ、役割とは社会規範が作り上げた蜃気楼にすぎない。#n可変する以上、それは決して定数などではない。#n社会が変数であるならば、役割も変数であってしかるべきだ。"
10046160-23 = "……。"
10046160-24 = "即ち、定義の問題だ。#nここを二人だけの社会だと定義すれば……#n私が肯定するだけで、社会の半数が肯定を示したことになる。"
10046160-25 = "話はこれで十分だろう。さあ、行こうか。"
10046160-30 = "……い、いやいや！全然説明になってないっすよ！？"
10046160-31 = "腕が鳴るな。なに、後れを取るつもりは無いよ。"
10046160-32 = "セイア様！"
