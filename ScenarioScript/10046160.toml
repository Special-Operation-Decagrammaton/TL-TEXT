[translation]
10046160-3 = "Ei, eu estava esperando por você."
10046160-4 = "Parece que finalmente chegou a minha vez."
10046160-5 = "……Seia-sama?"
10046160-6 = "Bem, vamos nessa."
10046160-7 = "Espera, vamos? Para onde!?"
10046160-8 = "Não era para fazermos uma patrulha?"
10046160-9 = "Eu até ia, mas... é perigoso. #nSeia-sama deveria ficar em um lugar seguro……."
10046160-10 = "Entendo, compreendo."
10046160-11 = "Sendo assim――"
10046160-12 = "Em suma, você quer dizer que esse não é um papel que a Seia Yurizono do Chá deve assumir――"
10046160-13 = "――É isso que você quer dizer, não é?"
10046160-14 = "Err... bem, sim."
10046160-15 = "Hum... você me define como Seia Yurizono do Chá――#ne define você mesma como Ichika Nakamasa do Comitê de Justiça. #nEssa diferença. Qual seria a razão dela?"
10046160-16 = "……Hã?"
10046160-20 = "Um papel é algo que não possui substância real. #nPor exemplo... digamos que você e eu naufragássemos em uma ilha deserta. #nNesse lugar, títulos de tempos de paz não fariam sentido, não é?"
10046160-21 = "……?"
10046160-22 = "No fim das contas, um papel é apenas uma miragem criada pelas normas sociais. #nComo é algo variável, nunca será uma constante. #nSe a sociedade é uma variável, o papel também deveria ser."
10046160-23 = "……."
10046160-24 = "Ou seja, é uma questão de definição. #nSe definirmos este lugar como uma sociedade de apenas nós duas... #nbasta que eu afirme isso, e metade da sociedade terá dado seu consentimento."
10046160-25 = "Isso já basta de conversa. Vamos, vamos logo."
10046160-30 = "……N-não, não! Isso não explicou nada!?"
10046160-31 = "Estou empolgada. Ora, não pretendo ficar para trás."
10046160-32 = "Seia-sama!"
