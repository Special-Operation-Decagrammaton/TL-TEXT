10036045-25 = "Eu apenas paguei pelo que consumi."
10036045-26 = "...!"
10036045-27 = "P-prepararei imediatamente!"
10036045-31 = "[ns9] \"Saori, eu pago se for por dinheiro.\"\n[ns10] \"Pode usar o meu cartão.\""
10036045-34 = "Não, está tudo bem."
10036045-35 = "O Sensei já cuida muito bem de nós, afinal."
10036045-36 = "Além disso, eu quero pagar por isso."
10036045-37 = "[s] (Saori...)"
10036045-38 = "Certo, vamos ver como elas estão."
10036045-41 = "D-desculpem a demora!"
10036045-42 = "Aqui estão 3 yakisobas, milho assado, raspadinha e sorvete!"
10036045-48 = "...Nós só pedimos um yakisoba."
10036045-49 = "Não me diga que você está tentando nos empurrar produtos agora?"
10036045-50 = "Eek, não me diga que é verdade...!"
10036045-52 = "N-não!#nNão é essa a intenção!"
10036045-53 = "Bem, é isso!#nVocês foram nossas clientes de número 10.000!"
10036045-54 = "Não precisa pagar nada!"
10036045-58 = "...Ei, vocês também, entrem no jogo."
10036045-64 = "P-parabéns...!"
10036045-69 = "Suspeito... O que você está planejando?"
10036045-70 = "Uaaaaaah! Muito obrigada!"
10036045-71 = "Sempre passamos por tantas coisas difíceis!#nQuem diria que tanta felicidade viria até nós!"
10036045-72 = "Não entendi muito bem, mas fico feliz."
10036045-73 = "Vamos comer antes que esfrie."
10036045-74 = "Sim...! Isso é... yakisoba...!"
10036045-79 = "Uuu... que delícia!"
10036045-81 = "...Não é ruim."
10036045-82 = "Será que podemos ser tão felizes assim...?#nCom certeza algo vai acontecer depois disso...!"
10036045-84 = "..."
10036045-85 = "[s] \"Que bom, Saori.\""
10036045-86 = "É a primeira vez que compro algo para todos#nusando o dinheiro que eu mesma ganhei."
10036045-87 = "...Heh, é uma sensação muito boa."
10036045-88 = "[s] \"Vamos almoçar também?\""
10036045-92 = "Yakisoba?"
10036045-93 = "Quando você pediu isso...?"
10036045-94 = "[s] \"Eu queria pagar por isso.\""
10036045-95 = "...Entendo."
10036045-96 = "Então, aceitarei com gratidão."
