10036045-15 = "Não, não é isso."
10036045-20 = "Isso é...?"
10036045-21 = "Eu vou pagar, então entregue 3 yakisobas, um milho assado, uma raspadinha e um sorvete para aquelas garotas ali."
10036045-22 = "Não mencione que fui eu quem pagou."
