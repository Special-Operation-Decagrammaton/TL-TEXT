[translation]
10036045-4 = "ぐはっ！"
10036045-5 = "こ、降参する！"
10036045-10 = "呆気なかったな。"
10036045-11 = "メニューを見せてもらおうか。"
10036045-13 = "は、はい！#nすべて無料でお持ちください！"
10036045-15 = "いや、そうじゃない。"
10036045-20 = "これは……？"
10036045-21 = "お代は払うから、さっきの子たちに焼きそば3つ、焼きとうもろこしとかき氷とアイスクリームを1つ届けてくれ。"
10036045-22 = "私からだということは伏せるように。"
10036045-23 = "そ、それだけで良いのですか……？"
10036045-24 = "代金を頂けるとは……。"
10036045-25 = "私は対価を支払っただけだ。"
10036045-26 = "……！"
10036045-27 = "す、すぐに用意します！"
10036045-31 = "[ns9] \"サオリ、お金なら私が出すよ。\"\n[ns10] \"ここは私のカードで。\""
10036045-34 = "いや、大丈夫だ。"
10036045-35 = "ただでさえ、先生にはいつもお世話になっているからな。"
10036045-36 = "それに、ここは私が奢りたい。"
10036045-37 = "[s] （サオリ……）"
10036045-38 = "よし、みんなの様子を見に行こう。"
10036045-41 = "お、お待たせしました！"
10036045-42 = "こちら、焼きそば3つに焼きとうもろこし、かき氷、アイスクリームです！"
10036045-48 = "……私たち、焼きそば1つしか頼んでない。"
10036045-49 = "まさか、今度は押し売りするつもり？"
10036045-50 = "ひいっ、まさか本当に……！"
10036045-52 = "い、いえ！#nそんなつもりはありません！"
10036045-53 = "えっと、そうです！#n皆さんは1万人目のお客様だったんです！"
10036045-54 = "代金も不要ですので！"
10036045-58 = "……おい、お前たちも合わせるんだぞ。"
10036045-64 = "お、おめでとうございます……！"
10036045-69 = "怪しい……何を企んでるの？"
10036045-70 = "うわぁぁぁぁあああああん！ありがとうございますぅぅぅぅ！"
10036045-71 = "いつもつらいことばっかだったのに！#nまさかこんな幸せが訪れるなんてぇぇぇ！"
10036045-72 = "よく分からないけど、良かった。"
10036045-73 = "冷めないうちに食べよう。"
10036045-74 = "はい……！これが、焼きそば……！"
10036045-79 = "うぅぅ……美味ひいへふぅ！"
10036045-81 = "……悪くないね。"
10036045-82 = "こんなに幸せで良いんでしょうか……！#nやっぱり、このあと絶対何かされるんですよね……！"
10036045-84 = "……。"
10036045-85 = "[s] \"良かったね、サオリ。\""
10036045-86 = "自分で稼いだお金で、#nみんなに何かを買ったのは初めてだ。"
10036045-87 = "……ふっ、こんなにも嬉しいものなんだな。"
10036045-88 = "[s] \"私たちもそろそろお昼にしようか。\""
10036045-92 = "焼きそば、だと？"
10036045-93 = "いつの間に注文を……？"
10036045-94 = "[s] \"ここは私が奢りたかったんだ。\""
10036045-95 = "……そうか。"
10036045-96 = "では、ありがたく頂こう。"
