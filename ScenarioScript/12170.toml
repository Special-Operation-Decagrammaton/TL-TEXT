[translation]
12170-1 = "第17話;守りたいもの"
12170-2 = "ゲヘナ学園・正門"
12170-3 = "はぁ？風紀委員長に会いたい？ゲヘナの風紀委員長に、そんなに容易く会えるとでも思ってるのか？"
12170-4 = "そうだな、じゃあ土下座して私の足でも舐めたら……"
12170-8 = "ひゃんっ！？"
12170-9 = "ちょっ、まだ話しの途中……んっ！ちょっと！？"
12170-10 = "大人としてのプライドとか、人としての迷いとかは無いのか！？"
12170-11 = "[s1] \"そんなものは無い。\"\n[s2] \"元々はあったけど……。\""
12170-12 = "おかしい！ヘンタイ！歪んでる！"
12170-13 = "おかしい！ヘンタイ！歪んでる！"
12170-14 = "こんなヘンタイの大人に――"
12170-15 = "何だか楽しそうね？"
12170-16 = "い、委員長……？"
12170-17 = "……自分の望みのために膝をつく姿なら、これまで何度も見てきた。でも、生徒のために跪く先生を見たのは初めて。"
12170-18 = "顔を上げてちょうだい、先生。"
12170-19 = "言ってみて、私に何をしてほしい？"
12170-20 = "いや、その、委員長……先生は跪いてるんじゃなくて、その、足を、舐め……"
12170-21 = "……？"
12170-24 = "！！！！？？？"
12170-26 = "……。"
12170-27 = "なるほど、ご説明ありがとうございます。ヒフミさんが仰っていることはよく分かりました。"
12170-28 = "その先生の言葉が本当だとすると、このまま聞き流すわけにはいかなそうです。"
12170-29 = "例の条約も目前に迫っていますし、今は下手に動くわけにはいかないのですが……。"
12170-30 = "……ただ、そのPMCという企業の存在が、我が校の生徒たちに良くない影響を及ぼしそうなことは確かですね。"
12170-31 = "今回はちょっとした例外ということで、何か考えた方が良さそうです。"
12170-32 = "あ、ありがとうございます、ナギサ様……。"
12170-33 = "そうですね……確かちょうど、牽引式榴弾砲を扱う屋外授業の予定があったはずです。"
12170-34 = "せっかくですし、ちょっとしたピクニックなどいかがでしょう。"
12170-35 = "えっと、牽引式榴弾砲ということは……L118の……？"
12170-36 = "はい。他ならないヒフミさんですし、全てお任せします。細かいことは私の方で。"
12170-37 = "愛は巡り巡るもの……ヒフミさんがいつか私に愛をお返してくれる時を、楽しみにしてますね。ふふっ。"
12170-38 = "あ、あぅ……。"
12170-40 = "それにきっと……いえ、間違いなく、「シャーレの先生」には借りを作っておいた方が良さそうですからね……。"
12170-43 = "（テキパキ）"
12170-44 = "うん、大体こんなもんかな。"
12170-45 = "わっ、屋台も良い感じじゃん！"
12170-46 = "元々、柴関ラーメンは屋台から始めたこともあってな。懐かしい気分だよ。"
12170-47 = "わ、私が……私のせいでお店が……し、死にましょうか？死んでもいいですか？死にますっ！！！"
12170-48 = "まあまあ。それにしてもやめるって聞いてたけど、またお店を開くことにしてくれて良かったよ～。"
12170-49 = "ああ、ちょっと前にどっかの誰かさんが、お店の前にお金を置いて行ってくれたこともあったからな。"
12170-50 = "……。"
12170-51 = "本当なら引退して、ゆっくりしようと思ってたんだが……営業してほしいと言われちゃあ仕方ない。"
12170-52 = "……。"
12170-55 = "580円の柴関ラーメン4杯、お待ち！"
12170-56 = "これ、また量を間違ってる気が……？"
12170-57 = "あはっ、まあ良いじゃん良いじゃ～ん。"
12170-58 = "いただきまーす！"
12170-60 = "あー美味しかった。さて、じゃあそろそろ行く？"
12170-61 = "……社長、本当に行くの？"
12170-62 = "この戦い、私たちには何のメリットもない。報酬も無しに、PMCと戦うなんて……。"
12170-63 = "……ふん。"
12170-64 = "カヨコちゃん、よく見てみなよ。"
12170-65 = "ん？"
12170-66 = "アルちゃんのその顔を見れば分かるでしょ、「依頼料なんて、このラーメンが味わえただけで十分よ」って今にも言い出しそうじゃん！"
12170-67 = "……。"
12170-68 = "……。"
12170-69 = "な、なるほど！さすがアル様です！多くは語らず、一杯のラーメンで地獄へと赴くその姿、まさにハードボイルドです！"
12170-70 = "わ、私も真のアウトローになるために頑張ります！今度こそ、ちゃんと全部消してみせますっ！！"
12170-71 = "……ふふっ。"
12170-72 = "さあ、私と一緒に地獄の底までついてくる覚悟はできたかしら？"
12170-73 = "くふふっ……！"
12170-78 = "（言っちゃったーーーーー！！！）"
12170-79 = "（元々ラーメン食べたら帰るつもりだったのに、何だか流されてカッコいい台詞をーーー！！？）"
12170-80 = "（こ、これはもう今さら「やっぱ無しで」とか言えない雰囲気だし……！？）"
12170-81 = "（今から逃げるって手は……うぅ……で、でも……）"
12170-82 = "（あの後アビドスの連中から、「ありがとう」とか「見直した」とか、色々言ってもらっちゃったし……）"
12170-83 = "（それに今回の相手はマーケットガードどころかPMC……勝敗なんて目に見えてるじゃない！？）"
12170-84 = "（ど、どうすればいいのよこの状況！？）"
12170-86 = "ほら、じゃあ行こ！アルちゃん！"
12170-87 = "じ、地獄の底までお供します！"
12170-88 = "はぁ、何だか損してばっかりだけど……仕方ないね。"
12170-90 = "ん、準備完了。"
12170-91 = "補給も十分、おやつもたっぷり入れておきました！"
12170-92 = "こっちも準備できたわ！睡眠もしっかり取ったし、お腹もいっぱい！どっからでもかかってきなさい！"
12170-93 = "私の方も、アビドスの古い地図を全て最新化しておきました。"
12170-94 = "先生に教えていただいた情報ですと、ホシノ先輩はカイザーPMCの第51地区の中央あたりにいるはずです。"
12170-95 = "一番安全なルートで案内します、行きましょう！"
12170-96 = "[s] \"それじゃ、出発！\""
12170-97 = "はい！ホシノ先輩救出作戦……！"
12170-98 = "開始です！！"
12170-100 = "……そうだったな。"
12170-101 = "忘れていたよ……ダメになったんなら、またやり直せばいい。"
12170-102 = "大事なのは、ラーメンを食べに来てくれる人の方だ。"
12170-103 = "お客さんがいる限り、店は消えない。そういうもんだ。だから……"
12170-108 = "……行ってこい、対策委員会。"
