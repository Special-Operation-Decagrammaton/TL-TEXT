[translation]
12170-1 = "Episódio 17; O que eu quero proteger"
12170-2 = "Academia Gehenna - Portão Principal"
12170-3 = "Hã? Quer ver a presidente do Comitê Disciplinar? Você acha mesmo que é tão fácil assim encontrar a presidente do Comitê Disciplinar de Gehenna?"
12170-4 = "Já sei, então ajoelhe-se e lamba os meus pés se..."
12170-8 = "Hyan!?"
12170-9 = "Ei, eu ainda não terminei de falar... Nn! Ei!?"
12170-10 = "Você não tem orgulho como adulto, ou qualquer hesitação como ser humano!?"
12170-11 = "[s1] \"Não tenho nada disso.\"\n[s2] \"Eu até tinha, mas...\""
12170-12 = "Que absurdo! Pervertido! Você é distorcido!"
12170-13 = "Que absurdo! Pervertido! Você é distorcido!"
12170-14 = "Um adulto pervertido como esse..."
12170-15 = "Parece que vocês estão se divertindo, não é?"
12170-16 = "P-Presidente...?"
12170-17 = "...Já vi muitas pessoas se ajoelharem para conseguir o que querem. Mas é a primeira vez que vejo um Sensei se ajoelhar por causa de um aluno."
12170-18 = "Levante a cabeça, Sensei."
12170-19 = "Diga-me, o que você quer que eu faça?"
12170-20 = "Não, é que, Presidente... O Sensei não está se ajoelhando, ele está, bem, lambendo os... pés..."
12170-21 = "...?"
12170-24 = "!!!!???"
12170-26 = "..."
12170-27 = "Entendo, obrigada pela explicação. Entendi perfeitamente o que você disse, Hifumi-san."
12170-28 = "Se o que o Sensei disse for verdade, não posso simplesmente ignorar isso."
12170-29 = "O tal tratado está próximo, e não podemos agir de forma imprudente agora, mas..."
12170-30 = "...É certo que a existência dessa empresa chamada PMC pode acabar afetando negativamente as alunas da nossa escola."
12170-31 = "Vou considerar isso uma pequena exceção e pensar em algo."
12170-32 = "M-Muito obrigada, Nagisa-sama..."
12170-33 = "Bem... se não me engano, há uma aula prática ao ar livre agendada para o uso de obuseiros rebocados."
12170-34 = "Já que estamos nisso, que tal um pequeno piquenique?"
12170-35 = "Err, obuseiro rebocado... quer dizer o L118...?"
12170-36 = "Sim. Sendo você, Hifumi-san, deixarei tudo em suas mãos. Cuidarei dos detalhes por aqui."
12170-37 = "O amor sempre dá voltas... Estou ansiosa pelo dia em que você retribuirá esse amor, Hifumi-san. Fufu."
12170-38 = "A-Au..."
12170-40 = "Além disso, com certeza... não, sem dúvida, é melhor ter o \"Sensei do Schale\" em dívida conosco..."
12170-43 = "(Ágil)"
12170-44 = "Pronto, acho que é mais ou menos isso."
12170-45 = "Uau, a barraca também ficou ótima!"
12170-46 = "O Ramen Shibaseki começou como uma barraca, afinal. Traz boas lembranças."
12170-47 = "E-Eu... por minha causa, a loja... d-devo morrer? Posso morrer? Eu vou morrer!!!"
12170-48 = "Calma, calma. Mas, eu ouvi dizer que você ia fechar, fico feliz que tenha decidido abrir a loja de novo~."
12170-49 = "Ah, é que um tempo atrás, alguém deixou um dinheiro na frente da loja."
12170-50 = "..."
12170-51 = "Na verdade, eu pretendia me aposentar e descansar um pouco... mas se me pedem para continuar, não tenho escolha."
12170-52 = "..."
12170-55 = "Aqui estão 4 tigelas de Ramen Shibaseki de 580 ienes, aproveitem!"
12170-56 = "Não acha que errou na quantidade de novo...?"
12170-57 = "Ah, deixa pra lá, não tem problema~."
12170-58 = "Itadakimasu!"
12170-60 = "Ah, estava delicioso. Bem, vamos indo?"
12170-61 = "...Presidente, você vai mesmo?"
12170-62 = "Essa luta não nos traz benefício algum. Lutar contra a PMC sem recompensa nenhuma..."
12170-63 = "……Hum."
12170-64 = "Kayoko, olha só com atenção."
12170-65 = "Hm?"
12170-66 = "Dá para ver só pela cara da Aru-chan, né? Ela está quase dizendo: 'O pagamento pelo serviço? Só de poder saborear esse lámen, já estou mais do que satisfeita!'"
12170-67 = "……."
12170-68 = "……."
12170-69 = "E-entendi! Como esperado da Aru-sama! Sem dizer uma palavra, ela se prepara para ir direto ao inferno por causa de uma tigela de lámen... isso sim é ser hard-boiled!"
12170-70 = "E-eu também vou me esforçar para me tornar uma verdadeira fora da lei! Desta vez, eu vou apagar tudo direitinho!!"
12170-71 = "……Fufu."
12170-72 = "Então, você está preparada para me seguir até as profundezas do inferno?"
12170-73 = "Kufufu……!"
12170-78 = "(Ela falou mesmo issooooo!!!)"
12170-79 = "(Eu só ia comer o lámen e ir embora, mas acabei me deixando levar e soltei uma frase super descoladaーーー!!?)"
12170-80 = "(E agora, não tem mais como voltar atrás e dizer 'esquece o que eu disse' nesse clima...!?)"
12170-81 = "(Será que ainda dá para fugir...? Ugh... m-mas...)"
12170-82 = "(Depois daquilo, o pessoal de Abydos me agradeceu e disse que mudou a opinião sobre mim...)"
12170-83 = "(E além disso, o oponente dessa vez não é a guarda do mercado, é uma PMC... o resultado já está na cara, não está!?)"
12170-84 = "(O-o que eu faço nessa situação!?)"
12170-86 = "Vamos lá então! Aru-chan!"
12170-87 = "E-eu te acompanharei até as profundezas do inferno!"
12170-88 = "Ah, parece que só estou saindo no prejuízo... mas não tem jeito."
12170-90 = "Hm, preparação concluída."
12170-91 = "O suprimento está completo, e coloquei bastante lanche também!"
12170-92 = "Eu também estou pronta! Dormi bem e estou de barriga cheia! Pode vir quem quiser!"
12170-93 = "Eu também atualizei todos os mapas antigos de Abydos."
12170-94 = "De acordo com as informações que o Sensei nos deu, a Hoshino-senpai deve estar perto do centro do Distrito 51 da Kaiser PMC."
12170-95 = "Vou guiar vocês pela rota mais segura, vamos!"
12170-96 = "[s] \"Então, vamos partir!\""
12170-97 = "Sim! Operação de resgate da Hoshino-senpai...!"
12170-98 = "Começando!!"
12170-100 = "……É verdade."
12170-101 = "Eu tinha esquecido... se as coisas deram errado, é só começar de novo."
12170-102 = "O que importa são as pessoas que vêm aqui para comer o lámen."
12170-103 = "Enquanto houver clientes, o restaurante não desaparecerá. É assim que funciona. Por isso..."
12170-108 = "……Vão lá, Comitê de Contramedidas."
