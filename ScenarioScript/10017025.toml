[translation]
10017025-1 = "Episódio 2; Os Miseráveis……?"
10017025-10 = "Beco"
10017025-11 = "Haa, haa……!#nEi, você está bem!?"
10017025-16 = "Droga…… é um beco sem saída, estamos encurralados!"
10017025-19 = "……Alvo encurralado.#nMashiro, está me ouvindo?"
10017025-20 = "Sim, sem problemas!"
10017025-21 = "Por favor, forneça fogo de cobertura."
10017025-22 = "Entendido!"
10017025-23 = "Conto com você."
10017025-24 = "Hihi…… hyahaha……"
10017025-29 = "Ai!? De, de onde veio isso agora!?"
10017025-30 = "Nessa situação, não tem muitos lugares de onde poderiam mirar……!#nDroga, é aquele atirador do Comitê de Justiça!"
10017025-31 = "Nós nem fizemos nada tão ruim assim, fizemos!?"
10017025-32 = "É isso mesmo! Nós nem sequestramos ninguém para pedir resgate!"
10017025-33 = "Nem destruímos metade da cidade por causa de disputa de território!"
10017025-34 = "Nem causamos tumultos, protestos radicais ou agressões!"
10017025-35 = "Além disso, é Natal, então nós só queríamos ficar quietos――"
10017025-39 = "BOOOOOM!!!!"
10017025-40 = "Hii!?"
10017025-41 = "O, o que foi? O que aconteceu!?"
10017025-46 = "Kuku, kikikiki……."
10017025-47 = "Hihihihihihihi……!"
10017025-49 = "Aquilo é……!?"
10017025-50 = "A, ajudem-me!#nEu tenho alguém importante me esperando em casa――"
10017025-52 = "Kyahahahahahaaaaa!!!!"
10017025-64 = "Ufa……."
10017025-65 = "Missão cumprida.#nMashiro, Tsurugi, bom trabalho."
10017025-66 = "Sim, bom trabalho."
10017025-71 = "……E aquele item?"
10017025-76 = "Recuperamos com sucesso."
10017025-77 = "Ainda assim, pensar em fazer algo assim no Natal……."
10017025-78 = "Francamente, é algo diabólico, ou melhor, algo bem a cara da Gehenna……."
10017025-79 = "De qualquer forma, é algo terrível."
10017025-80 = "Só podemos chamar isso de desastre.#nTer que lidar com isso logo antes da festa de Natal……."
10017025-81 = "Dito isso, não podemos deixar isso nas mãos de qualquer um."
10017025-82 = "É nosso dever, como o \"Comitê de Justiça\", lidar com isso."
10017025-83 = "Afinal, a realização da justiça não escolhe hora nem lugar.#nMesmo que seja no dia de Natal."
10017025-84 = "Entendo, a realização da justiça não escolhe hora nem lugar……"
10017025-85 = "É verdade, sinto-me renovada em meu propósito."
10017025-86 = "Bem, eu gostaria de ter resolvido isso de forma mais pacífica……."
10017025-87 = "Mas agora, não há desculpas."
10017025-89 = "……Ficou tarde."
10017025-90 = "Falando nisso, acabamos nos atrasando bastante."
10017025-91 = "Já estávamos no limite desde que saímos, então o atraso é inevitável."
10017025-92 = "Devemos nos apressar? Todos devem estar nos esperando."
10017025-93 = "Então, vamos."
10017025-98 = "……Eles foram?"
10017025-99 = "Ai, ai, ai…… achei que ia morrer……."
10017025-100 = "Ah, droga, que perigo!#nSério, será que não podemos nem passar o Natal em paz……."
10017025-101 = "Sério, que tratamento horrível…….#nBem, o que vamos fazer agora?"
10017025-102 = "O plano foi por água abaixo e tiraram tudo da gente..."
10017025-103 = "De qualquer forma, é melhor mudarmos de lugar..."
10017025-112 = "Avenida Principal de Kivotos"
10017025-116 = "De você para mim, feliz Natal~♪#nDe mim para você, feliz Natal~♪"
10017025-117 = "Ha, Hanae-chan, você anda rápido demais...!"
10017025-118 = "Falando nisso, Senpai, hoje é o dia em que o Papai Noel vem, não é?#nSerá que tudo bem a gente estar vestida de Papai Noel?"
10017025-119 = "Está tudo bem. Mas justamente por isso, precisamos agir de uma forma que faça jus a esse traje."
10017025-120 = "Entendi!#nJá que estamos com essa roupa, significa que devemos assumir a responsabilidade que vem com ela!"
10017025-121 = "De alguma forma, ficou ainda mais divertido!#nVamos logo!"
10017025-125 = "Ha, Hanae-chan, cuidado!#nO caminho está escorregadio..."
10017025-131 = "...O Esquadrão de Socorro e o sensei do Schale?#nO que eles estão fazendo...?"
10017025-132 = "Esquadrão de Socorro... deve ser aquilo, né?#nAquela coisa de todo ano de colocar um caldeirão para arrecadar doações?"
10017025-133 = "Ah, entendi. Então o sensei está ajudando.#nDe certa forma, isso me faz sentir que o Natal chegou."
10017025-134 = "Esquadrão de Socorro... sensei... Natal..."
10017025-135 = "...Tive uma boa ideia."
10017025-136 = "Hm, que ideia é essa?"
10017025-137 = "Escuta só, isso provavelmente..."
10017025-142 = "...Você é um gênio."
10017025-143 = "Bem, talvez a sorte tenha virado para o nosso lado.#nEntão, estamos dentro?"
10017025-144 = "Ah, vamos nessa."
10017025-145 = "Primeiro, vamos parecer o mais miseráveis possível..."
10017025-146 = "Isso não vai ser problema.#nAfinal, tiraram tudo da gente e arruinaram nosso plano..."
10017025-147 = "Nós já somos miseráveis o suficiente."
10017025-148 = "...Até deu vontade de chorar."
10017025-149 = "Bem, se for chorar, que seja depois que tudo terminar."
