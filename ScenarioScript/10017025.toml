[translation]
10017025-1 = "第２話;Les Miserables……？"
10017025-10 = "裏通り"
10017025-11 = "はあ、はあっ……！#nおい、大丈夫か！？"
10017025-16 = "ちくしょう……行き止まりだ、追い込まれた！"
10017025-19 = "……追い詰めました。#nマシロ、聞こえますか？"
10017025-20 = "はい、問題ありません！"
10017025-21 = "支援射撃、お願いします。"
10017025-22 = "承知しました！"
10017025-23 = "よろしくお願いしますね。"
10017025-24 = "ひひっ……ひゃはは……"
10017025-29 = "痛っ！？ど、どこから飛んできたんだ今の！？"
10017025-30 = "この状況、狙えるような場所も早々無いだろ……！#nくそっ、例の正義実現委員会の狙撃手か！"
10017025-31 = "あたしら、別にそこまで悪いことしてないだろ！？"
10017025-32 = "そうだそうだ！誰かを攫って身代金を要求したわけでもないし！"
10017025-33 = "勢力争いで街を半壊させたわけでもないし！"
10017025-34 = "暴動も過激なデモも、暴行すら起こしてないのに！"
10017025-35 = "そもそもクリスマスなんだから、私たちだって静かに――"
10017025-39 = "ドカアアアアアァァァァン！！"
10017025-40 = "ひっ！？"
10017025-41 = "な、なんだ？どうした！？"
10017025-46 = "くくっ、ききききき……。"
10017025-47 = "ひひひひひひひっ……！"
10017025-49 = "あれは……！？"
10017025-50 = "た、助けてくれ！#n私には帰りを待っている大事な――"
10017025-52 = "きゃはははははははあぁ！！！！"
10017025-64 = "ふぅ……。"
10017025-65 = "任務完了。#nマシロ、ツルギ、お疲れ様でした。"
10017025-66 = "はい、お疲れ様でした。"
10017025-71 = "……例のモノは？ "
10017025-76 = "しっかり回収しました。"
10017025-77 = "それにしても、クリスマスにこんなことを考えるとは……。"
10017025-78 = "全く、悪魔的といいますか、ゲヘナっぽいことをといいますか……。"
10017025-79 = "どちらにしても、ひどいことですね。"
10017025-80 = "もう災難と言うしかありません。#nクリスマス会の直前に、こんなことになるとは……。"
10017025-81 = "とはいえ、誰かに任せるわけにもいきません。"
10017025-82 = "私たち「正義実現委員会」が対応するのが道理です。"
10017025-83 = "正義の実現は、時と場所を選ばないものですからね。#nそれがたとえ、クリスマス当日であったとしても。"
10017025-84 = "なるほど、正義の実現は時と場所を選ばない……"
10017025-85 = "たしかにそうです、あらためて身を引き締めました。"
10017025-86 = "まあ、もう少し穏便に収めたいところではありましたが……。"
10017025-87 = "今となっては、言い訳はできませんね。"
10017025-89 = "……遅くなったな。"
10017025-90 = "そういえば、すっかり遅れてしまいました。"
10017025-91 = "出発した段階からギリギリだったのに、これはもう遅刻確定ですね。"
10017025-92 = "急ぎましょうか、みんなが待ってくれているはずですし。"
10017025-93 = "では、行きましょう。"
10017025-98 = "……行ったか？"
10017025-99 = "いててて……死ぬかと思った……。"
10017025-100 = "ああもう、危ねぇなあ！#nまったく、私たちはクリスマスも穏便に過ごせないのか……。"
10017025-101 = "ほんと、酷い仕打ちだよ……。#nさて、これからどうする？"
10017025-102 = "計画は台無しだし、全部奪われちまったし……。"
10017025-103 = "とにかく、場所を変えるか……"
10017025-112 = "キヴォトス・大通り"
10017025-116 = "あなたっかーら、メリークリスマス～♪#nわたしっかーら、メリークリスマス～♪"
10017025-117 = "は、ハナエちゃん、歩くの速い……！"
10017025-118 = "そういえば先輩、今日はサンタさんが来る日なんですよね？#n私たち、サンタさんの格好をしてても良いんでしょうか？"
10017025-119 = "大丈夫ですよ。ただだからこそ、この格好に恥じないように活動しないと。"
10017025-120 = "なるほど！#nこの服装でいるからには、それなりの責任を負うべきってことですね！"
10017025-121 = "何だかより楽しくなってきました！#n早く行きましょう！"
10017025-125 = "ハ、ハナエちゃん気を付けて！#n道が滑りやすくなってるから……！"
10017025-131 = "……救護騎士団と、シャーレの先生？#n何をしているんだ……?"
10017025-132 = "救護騎士団ってことは、あれだろ。#n毎年なんか、鍋置いて募金活動してるやつだろ？"
10017025-133 = "ああ、なるほどな。先生は手伝いってところか。#n何だか、クリスマスを実感するな。"
10017025-134 = "救護騎士団……先生……クリスマス……"
10017025-135 = "……良いこと思いついた。"
10017025-136 = "ん、何だよ良いことって？"
10017025-137 = "まあ聞けよ、これは多分……"
10017025-142 = "……天才じゃん。"
10017025-143 = "ま、運が巡ってきたのかもな。#nじゃあ、乗るってことで良いか？"
10017025-144 = "ああ、やろうぜ。"
10017025-145 = "まずはできる限り、可哀想な感じに……"
10017025-146 = "それは大丈夫だろ。#nなにせ全部奪われて計画台無しにされて……"
10017025-147 = "もうあたしら、十分可哀想だし。"
10017025-148 = "……泣きたくなってきたな。"
10017025-149 = "まあ、泣くなら全部が終わってからだ。"
