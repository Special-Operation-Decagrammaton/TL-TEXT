[translation]
12130-1 = "Episódio 13; O que escapou por entre os dedos"
12130-4 = "Para todas do Comitê de Contramedidas de Abydos"
12130-5 = "Primeiro, peço que me perdoem por me despedir através de uma carta. É que, para uma velha como eu, esse método antigo acaba sendo mais natural."
12130-6 = "Tem algo que eu nunca contei para vocês."
12130-7 = "Na verdade, eu venho recebendo propostas de recrutamento há muito tempo."
12130-8 = "Trabalhar como mercenária para a Kaiser PMC em troca de assumir a maior parte da dívida que pesa sobre Abydos... era esse o acordo."
12130-9 = "Uhe, não acham que é uma condição bem interessante? Por mais que não pareça, minhas habilidades são bastante valorizadas, sabe?"
12130-10 = "Eu darei um jeito na dívida. Não posso resolver tudo de uma vez, mas, para começar, acho que isso vai aliviar bastante o fardo de vocês."
12130-11 = "Sinto muito por ter dito aquelas coisas atrevidas no mercado negro; não consegui cumprir com a minha palavra."
12130-13 = "[log=（スッ）][/log]"
12130-14 = "Isso serve?"
12130-15 = "Sim, está perfeito."
12130-16 = "Já que assinou o contrato... a partir de agora, todos os seus direitos como aluna foram transferidos para mim, Hoshino-san."
12130-19 = "Com isso, assumiremos oficialmente a maior parte da dívida que a escola Abydos carrega."
12130-21 = "Assim, o Comitê de Contramedidas deve ficar um pouco mais aliviado."
12130-22 = "Vou me afastar tanto da escola Abydos quanto de Kivotos, mas não se preocupem comigo."
12130-23 = "Desculpem-me por agir por conta própria."
12130-24 = "Mas tudo isso é algo pelo qual eu devo assumir a responsabilidade."
12130-25 = "Porque eu sou a última aluna do conselho estudantil de Abydos."
12130-26 = "Então, é aqui que nos despedimos. Até mais."
12130-28 = "Para o Sensei"
12130-29 = "Na verdade, eu não gostava de adultos. Eu não confiava muito neles."
12130-30 = "Até mesmo naquela vez em que a Shiroko-chan te trouxe nas costas, eu pensei: 'Lá vem um adulto inútil', sabe?"
12130-31 = "Mas, por ter conhecido um adulto como você no final, eu... não, chega de palavras melosas, né?"
12130-32 = "Sensei."
12130-33 = "Desculpe ser egoísta no final, mas tenho um pedido. A Shiroko-chan é uma boa menina, mas se não tiver alguém ao lado para apoiá-la, não sei o que pode acontecer com ela."
12130-34 = "Por favor, apoie-a para que ela não acabe seguindo um caminho errado."
12130-35 = "Como é você, Sensei, tenho certeza de que dará tudo certo."
12130-38 = "Vamos, suba."
12130-39 = "Para onde vamos?"
12130-40 = "Para o deserto de Abydos."
12130-45 = "Shiroko-chan, Nonomi-chan, Serika-chan, Ayane-chan"
12130-46 = "Por favor, protejam a nossa escola."
12130-47 = "Mesmo sendo um lugar cheio de areia... é o único lugar que restou para mim que ainda tem algum significado."
12130-48 = "E, se por acaso, em algum momento no futuro, acabarmos nos enfrentando como inimigas..."
12130-49 = "Nesse momento, 'quebre' o meu halo."
12130-50 = "Conto com vocês."
12130-52 = "Hoshino-senpai!!!!"
12130-54 = "O que é isso!? Depois de falar tudo aquilo com tanta arrogância!! Você sabia muito bem que faria qualquer coisa se fosse encurralada!!"
12130-55 = "Não tem como eu aceitar isso!!"
12130-56 = "...Precisamos salvá-la."
12130-57 = "Eu vou. Isso vai causar problemas para o Comitê de Contramedidas, então eu sozinha..."
12130-58 = "Por favor, acalme-se. Agora precisamos agir em conjunto...!"
12130-59 = "[wa:12130-59] (Som de explosão!!!)"
12130-60 = "O quê!?"
12130-61 = "Som de explosão...!?"
12130-62 = "Foi perto, onde é...!?"
12130-63 = "..."
12130-64 = "N-não pode ser!?"
12130-66 = "[wa:12130-66] (Som de explosão!!!)"
12130-68 = "Vão, vão!"
12130-69 = "Avancem!"
12130-71 = "Aaaaaah!?"
12130-72 = "Rápido, fujam logo!!"
12130-74 = "……A ordem de despejo para este distrito autônomo já foi emitida."
12130-77 = "Fufufu, fufufufufufu……."
12130-78 = "Finalmente, todas as condições foram cumpridas."
12130-79 = "O último conselho estudantil foi expulso de Abydos…… Com isso, na prática, a Escola de Ensino Médio Abydos deixou de existir!!"
12130-80 = "Agora, só resta a nós, Kaiser Corporation, absorver e fundir Abydos!"
12130-82 = "Vamos, ocupem a Escola de Ensino Médio Abydos!"
12130-84 = "Centenas de soldados da PMC estão avançando em nossa direção! Ao mesmo tempo, estão atacando a área urbana indiscriminadamente!"
12130-85 = "Kaiser PMC!? Por que logo agora……!?"
12130-86 = "N-nós temos que revidar!! De qualquer forma, não podemos simplesmente ignorar Abydos sendo atacada……!"
12130-87 = "Não temos tempo para pensar, vamos logo!"
12130-88 = "M-mas, somos poucos demais para repelir um exército desse tamanho……!"
12130-89 = "D-de qualquer forma, primeiro vamos evacuar os cidadãos!"
12130-93 = "Um ataque em larga escala como este…… Por que, de repente……."
12130-98 = "Encontramos o Comitê de Contramedidas! É por aqui!!"
12130-100 = "Argh!?"
12130-104 = "Os batedores já chegaram até aqui……."
12130-105 = "Confirmamos um grande número de soldados da Kaiser PMC ao redor da escola de Abydos! Eles já invadiram boa parte do campus!"
12130-106 = "Por enquanto, vamos acabar com quem invadiu a escola! Ayane-chan, conto com você!"
12130-107 = "Entendido! Vou garantir a segurança do Sensei enquanto repelimos os inimigos que invadiram a escola!"
12130-109 = "Depois de garantir a segurança dentro da escola, vamos evacuar os cidadãos!"
