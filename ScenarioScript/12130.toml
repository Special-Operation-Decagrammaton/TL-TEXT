[translation]
12130-1 = "第13話;手をすり抜けたもの"
12130-4 = "アビドス対策委員会のみんなへ"
12130-5 = "まずは、こうやって手紙でお別れの挨拶をすることになったこと、許してほしい。おじさんにはこういう、古いやり方が性に合っててさ。"
12130-6 = "みんなには、ずっと話してなかったことがあって。"
12130-7 = "実は私、昔からずっとスカウトを受けてたんだ。"
12130-8 = "カイザーPMCの傭兵として働く、その代わりにアビドスが背負っている借金の大半を肩代わりする……そういう話でね。"
12130-9 = "……うへ、中々良い条件だと思わない？おじさんこう見えて、実は結構能力を買われててさ～。"
12130-10 = "借金のことは、私がどうにかする。すぐに全部を解決はできないけど、まずはこれでそれなりに負担が減ると思う。"
12130-11 = "ブラックマーケットでは急に生意気なことを言っちゃったけど、あの言葉を私が守れなくてごめんね。"
12130-13 = "（スッ）"
12130-14 = "……これで良い？"
12130-15 = "……はい、確かに。"
12130-16 = "契約書にサインも頂いたことですし……これで、ホシノさんがお持ちの生徒としての全権利は、私の元に移譲されました。"
12130-19 = "これで正式に、アビドス高校が背負っている借金の大半は、こちらで負担することにしましょう。"
12130-21 = "これで対策委員会も、少しは楽になるはず。"
12130-22 = "アビドス高校からも、キヴォトスからも離れることになったけど、私のことは気にしないで。"
12130-23 = "勝手なことをしてごめんね。"
12130-24 = "でもこれは全部、私が責任を取るべきこと。"
12130-25 = "私は、アビドスの最後の生徒会だから。"
12130-26 = "だから、ここでお別れ。じゃあね。"
12130-28 = "先生へ"
12130-29 = "実は私、大人が嫌いだった。あんまり信じてなかった。"
12130-30 = "シロコちゃんが先生をおんぶして来たあの時だって、「なんかダメな大人が来たな」って思ったくらいだし？"
12130-31 = "でも、先生みたいな大人と最後に出会えて、私は……いや、照れ臭い言葉はもういいよね。"
12130-32 = "先生。"
12130-33 = "最後に我がままを言って悪いんだけど、お願い。シロコちゃんは良い子だけど、横で誰かが支えてないと、どうなっちゃうか分からない子で。"
12130-34 = "悪い道に逸れちゃったりしないように、支えてあげてほしい。"
12130-35 = "先生なら、きっと大丈夫だと思うから。"
12130-38 = "さあ、乗れ。"
12130-39 = "……どこに行くの？"
12130-40 = "アビドス砂漠だ。"
12130-45 = "シロコちゃん、ノノミちゃん、セリカちゃん、アヤネちゃん"
12130-46 = "お願い、私たちの学校を守ってほしい。"
12130-47 = "砂だらけのこんな場所だけど……私に残された、唯一意味のある場所だから。"
12130-48 = "それから、もしこの先どこかで万が一、敵として相対することになったら……"
12130-49 = "その時は、私のヘイローを「壊して」。"
12130-50 = "よろしくね。"
12130-52 = "ホシノ先輩っっっ！！！！"
12130-54 = "何なの！？あれだけ偉そうに話しておいて！！切羽詰まったら何でもしちゃうって、自分で分かってたくせにっ！！"
12130-55 = "こんなの、受け入れられるわけないじゃない！！"
12130-56 = "……助けないと。"
12130-57 = "私が行く。対策委員会に迷惑がかかるし、私一人で……"
12130-58 = "落ち着いてください、今はまず足並みをそろえないと……！"
12130-59 = "ドカアァァァァン！！！"
12130-60 = "うわあっ！？"
12130-61 = "爆発音……！？"
12130-62 = "近いです、場所は……！？"
12130-63 = "……。"
12130-64 = "……そ、そんな！？"
12130-66 = "ドカアァァァァン！！！"
12130-68 = "行け、行け！"
12130-69 = "進め！"
12130-71 = "うわあぁぁぁっ！？"
12130-72 = "早くっ、早く逃げろっ！！"
12130-74 = "……この自治区にはもう、退去命令が下った。"
12130-77 = "ふふふっ、ふふふふふふふ……。"
12130-78 = "ついに、条件は全てクリアした。"
12130-79 = "最後の生徒会がアビドスを退学……これで実質的に、アビドス高等学校は消えた！！"
12130-80 = "あとは我らカイザーコーポレーションが、アビドスを吸収合併するのみ！"
12130-82 = "さあ、アビドス高等学校を占拠せよ！"
12130-84 = "こちらに向かって、数百近いPMCの兵力が進攻中！同時に、市街地に無差別攻撃をしています！"
12130-85 = "カイザーPMC！？なんでこのタイミングで……！？"
12130-86 = "お、応戦しないとです！！何はともあれ、アビドスが攻撃されているのを見過ごすわけには……！"
12130-87 = "考えてる時間が惜しい、すぐに行こう！"
12130-88 = "で、ですが、私たちで撃退するにはあまりにも数が……！"
12130-89 = "と、とにかくまずは、市民の皆さんを避難させましょう！"
12130-93 = "こんな大規模な攻撃……一体どうして、急に……。"
12130-98 = "対策委員会を発見！こっちだ！！"
12130-100 = "ぐあっ！？"
12130-104 = "斥候が、もうこんなところにまで……。"
12130-105 = "アビドス高校周辺に、カイザーPMCの兵を多数確認！すでに校内にもかなり侵入されています！"
12130-106 = "とりあえず、学校に侵入したやつからやっつけよう！アヤネちゃん、お願い！"
12130-107 = "はい！先生の安全を確保しつつ、学校に侵入した敵を撃退します！"
12130-109 = "校内の安全を確保した後は、市民の皆さんの避難を！"
