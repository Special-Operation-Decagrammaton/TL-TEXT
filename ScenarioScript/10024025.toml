[translation]
10024025-3 = "そ、そんなバカな……！"
10024025-5 = "玄龍門も一枚岩じゃないってことかな。#nキサキの意志に反して、こんな勝手なことしていいの？"
10024025-7 = "き、貴様に門主様の何が分かるというのだ！"
10024025-8 = "たしかに、人の心を理解するのは難しいけど……"
10024025-9 = "言葉にされてたって、それが本心とも限らないし。"
10024025-10 = "でも、少なくともこの場でキサキのことを一番分かってるのは、あたしだと思うけど？"
10024025-11 = "どの口が！！"
10024025-12 = "それはこちらのセリフです。"
10024025-14 = "あなた達の独断専行……正式に玄龍門に抗議したら、どうなるのでしょうね。"
10024025-16 = "誰が犯罪者の言葉に耳を傾けるか！"
10024025-17 = "クソッ、覚えてろ。"
10024025-23 = "ありゃ、行っちゃった……"
10024025-24 = "[s] \"追わなくていいの？\""
10024025-25 = "放っといていいんじゃない？それに、ここはまだ玄龍門の敷地内だからね。#n気をつけないといけないのはあたし達の方。"
10024025-26 = "応援を呼んでこないといいんだけど……#nあ、でもそしたらキサキの耳に入るからしないか……。"
10024025-27 = "[s] \"これからどうしよっか？\""
10024025-28 = "まずは「萬年参」に詳しい人を当たろうかな。#nこういう時に頼りになる人がいてね。"
10024025-29 = "玄龍門に抗議するのは、後からでも遅くないし……"
10024025-30 = "まずは容疑を晴らさないと。"
10024025-32 = "それじゃ、行こっか！"
