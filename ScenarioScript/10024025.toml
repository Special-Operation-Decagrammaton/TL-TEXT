[translation]
10024025-3 = "I-Isso é impossível...!"
10024025-5 = "Parece que a Genryumon não é tão unida assim. #nVocês podem mesmo fazer algo tão egoísta contra a vontade da Kisaki?"
10024025-7 = "O-O que você sabe sobre a nossa líder, sua insolente!"
10024025-8 = "É verdade, entender o coração das pessoas é difícil, mas..."
10024025-9 = "Mesmo que algo seja dito, não significa que seja o que a pessoa realmente sente."
10024025-10 = "Mas, pelo menos aqui, eu acho que sou quem melhor entende a Kisaki, sabe?"
10024025-11 = "Como ousa dizer isso!!"
10024025-12 = "Essa é a minha linha."
10024025-14 = "A decisão arbitrária de vocês... imagino o que aconteceria se eu fizesse uma reclamação formal à Genryumon."
10024025-16 = "Quem daria ouvidos às palavras de uma criminosa!"
10024025-17 = "Droga, você me paga."
10024025-23 = "Ah, eles foram embora..."
10024025-24 = "[s] \"Não deveríamos segui-los?\""
10024025-25 = "Não é melhor deixar pra lá? Além disso, ainda estamos em território da Genryumon. #nQuem precisa ter cuidado somos nós."
10024025-26 = "Espero que eles não chamem reforços... #nAh, mas se fizerem isso, chegará aos ouvidos da Kisaki, então acho que não vão..."
10024025-27 = "[s] \"O que vamos fazer agora?\""
10024025-28 = "Primeiro, acho que vou procurar alguém que entenda sobre o \"Mannensan\". #nTem uma pessoa em quem posso confiar nessas horas."
10024025-29 = "Não é tarde demais para reclamar com a Genryumon depois..."
10024025-30 = "Primeiro, precisamos limpar o meu nome."
10024025-32 = "Então, vamos nessa!"
