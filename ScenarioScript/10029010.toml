[translation]
10029010-1 = "Episódio 1; Criadora de problemas?"
10029010-2 = "（Recebi um contato da Eimi e vim para o Millennium）"
10029010-3 = "……Ah. Sensei, por aqui."
10029010-4 = "Obrigada por vir. #nEu também ainda estou um pouco confusa."
10029010-5 = "Eu os trouxe temporariamente para a segunda enfermaria que a chefe preparou, logo ali na frente, mas……"
10029010-6 = "……Mas, um problema surgiu agora."
10029010-7 = "[s1] \"……Problema?\"\n[s2] \"Aconteceu alguma coisa?\""
10029010-10 = "Depois que entrei em contato com o Sensei e voltei……"
10029010-11 = "Hum…… É mais fácil você ver do que eu explicar."
10029010-18 = "[ns3] \"Ué…….\"\n[ns4] \"Não tem ninguém aqui……?\""
10029010-21 = "……Pois é."
10029010-22 = "Até agora pouco, as 3 pessoas que vieram de outro mundo estavam dormindo aqui."
10029010-23 = "Saí um pouco para entrar em contato com o Sensei e…… como pode ver, elas sumiram."
10029010-24 = "Será que acordaram e foram para algum lugar…… #nou será que estavam fingindo dormir desde o começo?"
10029010-25 = "Não sei a verdade, mas…… de qualquer forma, elas desapareceram."
10029010-26 = "Ah, eu já avisei a chefe. #nEla parecia estar incomumente abalada."
10029010-27 = "“Talvez haja uma distorção espaço-temporal nesta cidade……” —"
10029010-28 = "Foi o que ela disse. #nMas, primeiro, a prioridade é proteger as 3 pessoas como indivíduos não identificados."
10029010-29 = "Ela disse para encontrar e trazer todos assim que eu me encontrasse com o Sensei."
10029010-30 = "Por isso…… Sensei, pode me emprestar sua força?"
10029010-31 = "[s5] \"Claro. Se é assim, vamos nos apressar.\"\n[s6] \"Entendi a situação. Quais são as características dessas pessoas?\""
10029010-34 = "Obrigada, Sensei, é bom lidar com alguém que entende rápido."
10029010-35 = "Bem…… as 3 usavam uniformes que nunca vi antes. #nE ninguém estava portando armas."
10029010-36 = "Ah, mas…… por precaução, fique sempre alerta durante a busca."
10029010-37 = "Tinha uma garota de cabelo curto, mas……"
10029010-42 = "……Enquanto a transportávamos, eletricidade foi liberada do corpo dela de repente."
10029010-46 = "Sim, o som era exatamente como esse de agora."
10029010-47 = "[s7] \"Vamos nos apressar, Eimi!!\"\n[s8] \"Fale informações importantes assim antes!\""
10029010-53 = "（Corremos em direção ao local de onde veio o som da explosão）"
10029010-54 = "Provavelmente deve ser por aqui……"
10029010-58 = "……Sensei, ali."
10029010-62 = "……Haa."
10029010-63 = "Somos provocadas para brigar por onde passamos, e todo mundo anda por aí com armas como se fosse normal…… O que há de errado com esta cidade?"
10029010-64 = "……?"
10029010-65 = "O que foi, vocês? Algum problema?"
10029010-66 = "Aquela de cabelo rosa ali…… me parece familiar."
10029010-67 = "Sim. Com certeza, fui eu quem as trouxe das ruínas para o Millennium, mas……"
10029010-68 = "Como você se lembra? #nAcho que você estava inconsciente……"
10029010-69 = "Além disso…… não achei que causariam um incidente assim que acordassem."
10029010-70 = "……!?"
10029010-71 = "É um mal-entendido! Se falar assim, parece que a culpa é minha!!"
10029010-72 = "Foram eles que, de repente……"
10029010-73 = "U-ugh…… o-o que foi aquilo agora……"
10029010-74 = "Fomos pegos na explosão……? #nNão, foi como se meu corpo tivesse levado um choque……"
10029010-75 = "[s9] \"……Que bom.\"\n[s10] \"Felizmente, parece que todos estão conscientes.\""
10029010-79 = "……Entendi. É raro não estarem portando armas."
10029010-80 = "Não estou conseguindo ouvir direito desde agora? #nSe tem algo a dizer, pode falar claramente?"
10029010-81 = "……Bem, pelo fato de estarem carregando essas coisas, não parece que será uma conversa pacífica."
10029010-82 = "Se não quiserem acabar como o que está jogado ali……"
10029010-87 = "……?"
10029010-88 = "P-por que os meus poderes..."
10029010-89 = "...Será que é mesmo um mal-entendido?"
10029010-90 = "[s11] \"Por favor, mantenha a calma. Viemos aqui para conversar.\"\n[s12] \"Você não acha que ainda não processou bem a situação?\""
10029010-93 = "Hmm..."
10029010-94 = "...É, né. Primeiro, quem são vocês?"
10029010-95 = "E, aliás, onde estamos?#nIsso aqui não é a Cidade Acadêmica, né?"
10029010-96 = "Todo mundo andando por aí com coisas perigosas, e tem algo flutuando em cima das cabeças de vocês..."
10029010-97 = "Será que isso também é um Indian Poker..."
10029010-98 = "Não, analisando a situação, não é. As memórias não se conectam."
10029010-99 = "Será que é um sonho...?#nSe não for um sonho, como eu explico isso..."
10029010-100 = "[s13] \"Indian Poker...?\"\n[s14] \"...V-você está bem?\""
10029010-103 = "Talvez as memórias estejam confusas por causa do efeito da transferência."
10029010-104 = "...É como a chefe disse, Sensei."
10029010-105 = "[s15] \"Parece que ela ainda não está totalmente consciente.\"\n[s16] \"...Então, ela veio de outro mundo?\""
10029010-108 = "...?"
10029010-109 = "...Sensei?"
10029010-110 = "Você aí..."
10029010-111 = "Sensei?"
10029010-112 = "...Você era um professor?"
10029010-113 = "Então, quem é aquela ao seu lado...?"
10029010-114 = "Izumimoto Eimi, do 1º ano da Millennium Science School, do Departamento de Investigação de Fenômenos Estranhos."
10029010-115 = "...A-aluna??"
10029010-119 = "Você vai para a escola... vestida desse jeito?"
10029010-120 = "...?"
10029010-121 = "[s17] \"...Ah.\"\n[s18] \"E-espere. Isso é realmente um mal-entendido...!\""
10029010-127 = "...Um professor deixar uma aluna se vestir assim é um absurdo, não acha!?"
10029010-129 = "(...Depois de ter tido uma primeira impressão terrível)"
10029010-131 = "...Entendo."
10029010-132 = "Compreendi a situação geral.#nEmbora eu ainda não tenha chegado a uma explicação dos princípios, não há o que fazer quanto a isso."
10029010-133 = "As ruínas da Millennium... não é de se estranhar que fenômenos inexplicáveis ocorram lá."
10029010-134 = "Mas, ainda assim...#nQuem diria que uma pessoa seria transferida de um mundo diferente..."
10029010-135 = "Ao verificar os registros, encontrei um registro de uma grande reação energética vindo de uma \"instalação\" que nossas investigações ainda não alcançaram."
10029010-136 = "Você diz isso com tanta naturalidade, mas isso não é algo absurdo?"
10029010-137 = "Transferência para outro mundo... Você quer que eu acredite numa história tão ridícula?"
10029010-138 = "Sinceramente, parece tão irreal que eu acho que é mentira..."
10029010-139 = "Mas, bem... não ganham nada me enganando agora."
10029010-140 = "Ora, você está duvidando desta super gênio hacker, linda e doente?"
10029010-141 = "Eu entendo que você duvide depois de ouvir o comportamento lamentável da chefe...#nMas o que a chefe diz está correto. Não há outra explicação para a situação."
10029010-142 = "Eimi...!?"
10029010-143 = "Não é só desta vez; nosso Departamento de Investigação de Fenômenos Estranhos já confirmou vários fenômenos que não podem ser provados cientificamente."
10029010-144 = "Não há nada de estranho em ter mais um fenômeno inexplicável."
10029010-145 = "Na verdade, o que mais me surpreendeu, além da transferência, foi... bem."
10029010-147 = "...Misaka Mikoto."
10029010-148 = "...O fato de que Mikoto é uma \"esper\" que manipula eletricidade."
10029010-149 = "Me chamando pelo primeiro nome de repente..."
10029010-150 = "Bem, tanto faz."
10029010-151 = "De qualquer forma, esse... lugar não é a Cidade Acadêmica que eu conheço."
10029010-152 = "Então, não existem espers aqui?#nNem instituições de pesquisa ou instalações de desenvolvimento de habilidades?"
10029010-153 = "Pelo menos, não observamos nenhum poder chamado de \"habilidade\".#nDesenvolvimento de habilidades, mesmo que alguém pensasse nisso, provavelmente não seria executado."
10029010-154 = "Isso... não que eu queira negar, mas é normal ter coisas estranhas flutuando na cabeça e andar por aí com armas...?"
10029010-155 = "Ora, tem algo de errado?"
10029010-157 = "Do que a Mikoto está falando?"
10029010-158 = "……？？？？？？？？？？？？"
10029010-159 = "Hã? Sou eu quem está estranha……？？？"
10029010-160 = "Além disso, o halo que está flutuando…… também é o seu, não é, Mikoto?"
10029010-161 = "……？"
10029010-162 = "E-Ei, espera aí!? É verdade……!?#nDesde quando isso está aqui!?"
10029010-163 = "[s19] \"Falando nisso, onde estão as outras duas...?\"\n[s20] \"Você tem alguma ideia de onde elas possam estar?\""
10029010-166 = "……As outras duas?"
10029010-167 = "Minhas memórias ainda estão um pouco confusas……"
10029010-168 = "……Eu me lembro de ter me deitado usando o \"Indian Poker\".#nEu estava sozinha naquela hora……"
10029010-169 = "Usando…… o Indian Poker?"
10029010-170 = "Ah, desculpe. Você não deve conhecer."
10029010-171 = "Eu conheço o jogo de cartas. #nMas não é algo que se \"usa\"."
10029010-172 = "No nosso mundo, geralmente é assim também, mas……"
10029010-173 = "Existe uma tecnologia com esse nome. #nEla transmite sinais elétricos fracos para reproduzir os sonhos de outras pessoas, mas……"
10029010-174 = "Por isso, quando cheguei a este mundo, pensei que ainda estivesse dentro de um sonho."
10029010-175 = "As outras duas…… não sei quem são, mas acho que usaram o Indian Poker no mesmo momento que eu."
10029010-176 = "Entendo…… Então esse item, que funciona como um sonho lúcido chamado Indian Poker, interagiu com as \"instalações\" das ruínas."
10029010-177 = "Hum…… Que história fascinante. #nIsso parece valer a pena investigar a fundo."
10029010-178 = "Fascinante, é…… Tente se colocar no lugar de quem foi arrastado para esse incidente."
10029010-179 = "Parece que vou precisar ir até as \"instalações\" para conseguir voltar…… #nPosso contar com a sua cooperação?"
10029010-180 = "……Já que estamos nisso, por onde começamos? #nProcuramos as outras duas primeiro, ou buscamos pistas nas ruínas……"
10029010-181 = "É louvável que esteja motivada, mas vamos deixar as ruínas para depois. #nAs ruínas de Millennium são vastas; se não nos prepararmos, acabaremos nos perdendo."
10029010-182 = "Quanto às outras duas…… entendo. #nEu mesma vou reunir informações sobre elas."
10029010-183 = "Por isso, gostaria que vocês fossem na frente para……"
10029010-184 = "……Eimi."
10029010-185 = "Sim, entendi."
10029010-186 = "Já deixei tudo avisado, então é só ir buscar."
10029010-188 = "……Buscar o quê?"
10029010-189 = "Venha comigo. Explico no caminho."
10029010-190 = "Mesmo que você tenha vindo de outro mundo……"
10029010-191 = "Se continuar assim, vai acabar chamando atenção demais e se metendo em problemas. #nVocê não quer isso, quer, Mikoto?"
10029010-192 = "Para agir com segurança em Kivotos, precisamos de vários preparativos."
10029010-193 = "[s21] \"Entendi, então isso significa que……\"\n[s22] \"Em Roma, faça como os romanos, né?\""
10029010-196 = "……Do que você está falando?"
10029010-197 = "Mais cedo, você se meteu em problemas desnecessários porque estava desprevenida, Mikoto."
10029010-198 = "Para evitar que isso aconteça de novo……"
10029010-200 = "……Você precisa aprender o \"senso comum\" de Kivotos."
