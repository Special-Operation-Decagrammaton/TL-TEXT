[translation]
10029010-1 = "第1話;トラブルメーカー？"
10029010-2 = "（エイミから連絡をもらい、ミレニアムにやって来た）"
10029010-3 = "……あ。先生、こっち。"
10029010-4 = "来てくれてありがとう。#nこっちもちょっとまだ混乱してて。"
10029010-5 = "この先にある、部長が用意してくれた第二保健室に一旦連れてきたんだけど……"
10029010-6 = "……でも、今ちょっと問題が発生してて。"
10029010-7 = "[s1] \"……問題？\"\n[s2] \"何かあったの？\""
10029010-10 = "先生に連絡した後、戻ったら……"
10029010-11 = "うーん……説明するよりも、見てもらった方が早いね。"
10029010-18 = "[ns3] \"あれ……。\"\n[ns4] \"誰もいないけど……？\""
10029010-21 = "……そうなの。"
10029010-22 = "ついさっきまで、別の世界から来た3人がここで眠ってたんだけど。"
10029010-23 = "先生に連絡するために、少し席を外したら……見ての通りいなくなってて。"
10029010-24 = "起きて、どこかに行っちゃったのか……#nそれとも、最初から寝たフリをしていたのか。"
10029010-25 = "真相は分からないけど……とにかくいなくなっちゃった。"
10029010-26 = "あ、部長にはもう伝えてあるよ。#n珍しく動揺してたかも。"
10029010-27 = "「もしかすると、この街で時空の歪みが……」――"
10029010-28 = "とか言ってたような。#nでも、まずは身元不明人として3人を保護するのが先決。"
10029010-29 = "先生と合流したら、全員捜して連れてくるようにってさ。"
10029010-30 = "そういうわけで……先生、力を貸してくれない？"
10029010-31 = "[s5] \"もちろん。そうと決まったら急ごうか。\"\n[s6] \"状況は分かった。その人たちの特徴は？\""
10029010-34 = "ありがとう、先生は話が早くて助かる。"
10029010-35 = "えっと……3人とも、初めて見る制服を着てたよ。#nそれと、誰も銃を持ってなかった。"
10029010-36 = "あ、でも……念のため、捜索中は常に警戒してね。"
10029010-37 = "ショートカットの子がいたんだけど……"
10029010-42 = "……搬送中、突然その子の身体から電気が放たれたの。"
10029010-46 = "うん、まさに今みたいな音も一緒にしてた。"
10029010-47 = "[s7] \"急ごう、エイミ！！\"\n[s8] \"そういう大事な情報は先に話して！\""
10029010-53 = "（急いで爆発音が聞こえた方に向かった）"
10029010-54 = "たぶん、この辺りのはず……"
10029010-58 = "……先生、あそこ。"
10029010-62 = "……はぁ。"
10029010-63 = "行く先々で喧嘩を吹っかけられるわ、当たり前のようにみんな銃を持ち歩いてるわ……どうなってるのよ、この街は。"
10029010-64 = "……？"
10029010-65 = "何よ、アンタ達。なんか用？"
10029010-66 = "そっちのピンク髪は……見覚えあるわね。"
10029010-67 = "うん。たしかに、廃墟からミレニアムに連れてきたのは私だけど……"
10029010-68 = "どうして覚えてるの？#n意識はなかったと思うけど……"
10029010-69 = "それに……目が覚めた途端、事件を起こすとは思わなかった。"
10029010-70 = "……！？"
10029010-71 = "誤解よ！それじゃ、まるで私のせいみたいじゃない！！"
10029010-72 = "コイツらが、いきなり……"
10029010-73 = "う、うぐっ……な、何だったんだ、さっきのは……"
10029010-74 = "爆発に巻き込まれて……？#nいや、身体がビリッとしたような……"
10029010-75 = "[s9] \"……良かった。\"\n[s10] \"幸い、みんな意識はあるみたいだね。\""
10029010-79 = "……そっか。銃を持ってないの、珍しいから。"
10029010-80 = "さっきから、よく聞こえないんだけど？#n言いたいことがあるなら、ハッキリ言ってもらえる？"
10029010-81 = "……ま、そんなモノぶら下げてるってことは、穏便な話し合いってわけじゃなさそうだけど。"
10029010-82 = "そこに転がってるのと同じ目に遭いたくなかったら……"
10029010-87 = "……？"
10029010-88 = "な、なんで能力が……"
10029010-89 = "……本当に誤解なのかな。"
10029010-90 = "[s11] \"落ち着いてほしい。私たちは話し合いに来たんだ。\"\n[s12] \"まだうまく状況が飲み込めてないんじゃないかな？\""
10029010-93 = "うーん……"
10029010-94 = "……そう、ね。まず、アンタ達は誰なの？"
10029010-95 = "というか、そもそもここどこ？#n学園都市……じゃないわよね。"
10029010-96 = "みんなして物騒なモノ持ち歩いて、頭の上には何か浮かべてるし……"
10029010-97 = "もしかして、これもインディアンポーカーの……"
10029010-98 = "いや、状況からいって違う。前後の記憶がつながらないもの。"
10029010-99 = "やっぱり、夢……？#n夢じゃなかったら、どう説明を……"
10029010-100 = "[s13] \"インディアンポーカー……？\"\n[s14] \"……だ、大丈夫？\""
10029010-103 = "転移の影響で、記憶が混乱してるのかも。"
10029010-104 = "……部長の言った通りだね、先生。"
10029010-105 = "[s15] \"まだあんまり意識がハッキリしてなさそうだね。\"\n[s16] \"……つまり、彼女は別の世界から？\""
10029010-108 = "……？"
10029010-109 = "……先生？"
10029010-110 = "そっちのアンタが……"
10029010-111 = "先生？"
10029010-112 = "……アンタ、教師だったの？"
10029010-113 = "じゃあ、その隣にいるのは……？"
10029010-114 = "ミレニアムサイエンススクール1年、特異現象捜査部の[ruby=いずみもと]和泉元[/ruby]エイミ。"
10029010-115 = "……生……徒？？"
10029010-119 = "その格好で……学校に通ってるの？"
10029010-120 = "……？"
10029010-121 = "[s17] \"……はっ。\"\n[s18] \"ま、待って。これは本当に誤解で……！\""
10029010-127 = "……教師が生徒にこんな格好させるなんて、おかしいでしょうがよ！？"
10029010-129 = "（……最悪の印象で初対面を迎えてしまった後）"
10029010-131 = "……なるほど。"
10029010-132 = "おおよその状況は理解しました。#n原理の解明には至っておりませんが、そこは仕方ありません。"
10029010-133 = "ミレニアムの廃墟……いかに不可思議な現象が起きたとしても不思議ではありません。"
10029010-134 = "ですが、それにしても……#nまさか異なる世界から人が転移してくるとは……"
10029010-135 = "ログを確認したところ、私たちの調査が及んでいない「施設」から、大きなエネルギー反応の記録を見つけました。"
10029010-136 = "サラッと言ってるけど、とんでもない事じゃないのソレ。"
10029010-137 = "別の世界に転移だなんて……そんな馬鹿げた話を信じろって言うの？"
10029010-138 = "正直、あまりにも現実味がなくて、嘘なんじゃないかって思ってるけど……"
10029010-139 = "でもまぁ……今の私を騙したところで、何もメリットがないか。"
10029010-140 = "あら、この超天才病弱美少女ハッカーを疑っているのですか？"
10029010-141 = "部長の残念な言動を聞いて疑う気持ちは理解できるけど……#n部長の言ってることは正しいよ。そうでもないと説明がつかない状況だし。"
10029010-142 = "エイミ……！？"
10029010-143 = "今回に限らず、私たち特異現象捜査部は科学的に証明しがたい様々な現象をこれまで確認してきた。"
10029010-144 = "不思議な現象がひとつ増えたところで、何もおかしくはない。"
10029010-145 = "むしろ、転移よりも驚いたのは……えっと。"
10029010-147 = "……[ruby=みさか]御坂[/ruby][ruby=みこと]美琴[/ruby]よ。"
10029010-148 = "……美琴が電気を操る「超能力者」という事実のほう。"
10029010-149 = "いきなり下の名前で呼び捨て……"
10029010-150 = "ま、いっか。"
10029010-151 = "とにかく、その……ここは私の知ってる学園都市とは違うのね。"
10029010-152 = "じゃあ、ここには能力者がいないの？#n研究機関や能力開発施設も？"
10029010-153 = "少なくとも、「能力」と呼ばれる力は観測されておりません。#n能力開発なんて、考えはしても実行には至らないでしょう。"
10029010-154 = "その……別に否定するつもりはないんだけど、頭の上に変なのが浮かんでたり、銃を持ち歩くのは普通なの……？"
10029010-155 = "あら、何かおかしいところでも？"
10029010-157 = "美琴は何を言ってるの？"
10029010-158 = "……？？？？？？？？？？？？"
10029010-159 = "えっ？私の方が、おかしいの……？？？"
10029010-160 = "それに、ヘイローが浮かんでいるのは……美琴さんも、でしょう？"
10029010-161 = "……？"
10029010-162 = "え、ええっ！？ほ、本当だ……！？#nこれ、いつから！？"
10029010-163 = "[s19] \"そういえば、他の2人は……？\"\n[s20] \"どこにいるか、心当たりはないかな。\""
10029010-166 = "……他の2人？"
10029010-167 = "ちょっとまだ記憶が曖昧で……"
10029010-168 = "……たしか「インディアンポーカー」を使って横になったはず。#nその時は1人だったし……"
10029010-169 = "インディアンポーカーを、使って……？"
10029010-170 = "ああ、ごめん。知らないわよね。"
10029010-171 = "トランプのゲームなら知ってるよ。#nでも「使う」ものではないから。"
10029010-172 = "私たちの世界でも、一般的にはそうなんだけど……"
10029010-173 = "そういう名前の技術があってね。#n微弱な電気信号を流して他人の夢を再現する事ができるんだけど……"
10029010-174 = "だから、この世界に来た時も最初は夢の中なのかな――って思って。"
10029010-175 = "残りの2人も……誰かは分からないけど、たぶん同じタイミングでインディアンポーカーを使ったんだと思う。"
10029010-176 = "なるほど……そのインディアンポーカーと呼ばれる明晰夢のようなアイテムと廃墟の#n「施設」が相互に作用した、と。"
10029010-177 = "ふむ……とても興味深いお話ですね。#nこれは本格的に調べる価値がありそうです。"
10029010-178 = "興味深いって……事件に巻き込まれたこっちの身にもなってよね。"
10029010-179 = "戻るためには私も「施設」に行く必要がありそうだし……#n協力してくれる、と思って良いのかしら？"
10029010-180 = "……さっそくだけど、何から始める？#nまずは残りの2人を探すか、それとも廃墟で手がかりを……"
10029010-181 = "やる気があるのは喜ばしいのですが、廃墟に行くのは後にしましょう。#nミレニアムの廃墟は広大ですから、準備をしなくては遭難してしまいます。"
10029010-182 = "残りのお2人は……そうですね。#nそちらの情報も、私が集めておきましょう。"
10029010-183 = "ですので、皆さんには先に行ってもらいたいところが……"
10029010-184 = "……エイミ。"
10029010-185 = "うん、分かった。"
10029010-186 = "話は通しておきましたので、取りに行ってもらえればと。"
10029010-188 = "……取りに行くって、何を？"
10029010-189 = "ついてきて。移動しながら説明する。"
10029010-190 = "別の世界から来たとはいえ……"
10029010-191 = "そのままだと、余計目立ってトラブルに巻き込まれるから。#n美琴もそれは嫌でしょ？"
10029010-192 = "キヴォトスで安全に活動するためにも、色々と準備が必要。"
10029010-193 = "[s21] \"なるほど、ということは……。\"\n[s22] \"郷に入っては郷に従え、だね。\""
10029010-196 = "……何の話？"
10029010-197 = "さっきは、美琴が無防備だから余計なトラブルに巻き込まれたの。"
10029010-198 = "それを防ぐためにも……"
10029010-200 = "……キヴォトスの「常識」を身につけてもらわないと。"
