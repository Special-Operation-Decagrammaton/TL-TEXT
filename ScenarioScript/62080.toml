[translation]
62080-1 = "Episódio 8; Porta Pacis (2)"
62080-4 = "Um mistério sagrado...?"
62080-5 = "Não parece ser algo muito bom."
62080-6 = "Presidente!"
62080-7 = "U-Ugh..."
62080-12 = "De fato, eu também nunca ouvi falar disso."
62080-13 = "Porque isso é algo que, provavelmente, apenas eu sei."
62080-14 = "No começo, eu também achava que era só um tipo de história de terror ou lenda, mas..."
62080-15 = "Um pouco antes de o 'Tratado de Éden' ser assinado... a Beatrice foi até o arquivo de registros de Porta Pacis."
62080-16 = "De mansinho, sem dizer nada para mais ninguém além de mim."
62080-21 = "!"
62080-22 = "O queee?!"
62080-27 = "M-Mas... não era para aquele lugar ser proibido...?"
62080-28 = "Você acha que a Beatrice se importaria com uma coisa dessas?"
62080-29 = "B-Bem... pode até ser, mas..."
62080-30 = "A Beatrice guardava muitos segredos. Esse era um deles."
62080-31 = "Será que... a manifestação do [ruby=Mimesis]mimetismo[/ruby] do Conselho de Santa Justina também teve a ver com isso?"
62080-32 = "Quem sabe. Hoje em dia, quase não existem formas de descobrir a verdade sobre isso, mas..."
62080-33 = "...Não acho que tenha sido completamente sem relação."
62080-34 = "Afinal, foi a partir daquela época que os fenômenos anormais começaram a aumentar em Arius."
62080-35 = "Eu me lembro... Do nada, várias coisas que nunca tínhamos visto começaram a aparecer por aí... e armas eram fornecidas em abundância..."
62080-36 = "Naquela época... eu só conseguia pensar no quanto os adultos eram incríveis, e nem cheguei a questionar..."
62080-37 = "[s] \"…… Fire...\""
62080-38 = "A parte importante aqui é o 'começaram a aumentar'."
62080-39 = "Hã...? Não me diga que...?"
62080-40 = "Exatamente isso."
62080-41 = "Coisas estranhas já aconteciam em Arius desde o princípio. #nSó que não era com tanta frequência."
62080-43 = "Toda escola tem uma ou duas histórias de fantasma, mas... #nArius estava num nível muito além disso."
62080-44 = "Eu só percebi depois que saí de Arius. Aquilo não estava numa dimensão de ser apenas 'um pouquinho' estranho."
62080-49 = "[ns] \"E por que... será?\""
62080-50 = "Eu também não sei a razão exata."
62080-51 = "Mas..."
62080-52 = "Sinto que Arius acabou se tornando esse tipo de 'lugar'."
62080-53 = "Originalmente, já havia 'algo' aqui."
62080-54 = "Raiva, lamento, rancor, desespero, resignação... esses pensamentos foram se acumulando e se reuniram aqui."
62080-55 = "Dizem que sentimentos intensos acabam se manifestando de alguma forma, não dizem?"
62080-56 = "I-Isso não é... só uma força de expressão...?"
62080-57 = "Mas nós já presenciamos isso. O Conselho de Santa Justina, a Barbara..."
62080-58 = "Eu pensava que tudo era obra da Madame... da Beatrice, mas..."
62080-59 = "Não, talvez pensar assim fosse uma forma inconsciente de desviar os olhos da 'verdade oculta' de Arius..."
62080-60 = "Não quero tirar conclusões precipitadas... mas, às vezes, fico com medo."
62080-61 = "Fico pensando no que existirá no fundo de todos esses sentimentos intensos acumulados."
62080-62 = "Só de imaginar... dá medo."
62080-63 = "……."
62080-64 = "Uuugh..."
62080-69 = "*Cof cof*. #n...Então, vamos falar sobre o Apocalipse."
62080-70 = "Já que isso parece estar ligado ao cerne do 'fenômeno' que está acontecendo em Arius."
62080-71 = "Sim, obrigada... Shimiko-san."
62080-72 = "Não há de quê, Atsuko-san. #nBem, vamos começar com uma visão geral."
62080-73 = "O Apocalipse refere-se ao capítulo final das escrituras sagradas transmitidas tanto em Trinity quanto em Arius."
62080-74 = "As escrituras que as duas escolas possuem eram originalmente as mesmas. Elas compartilham a mesma raiz, apenas com interpretações diferentes."
62080-75 = "Em Trinity, o Apocalipse é tratado meramente como um texto de referência."
62080-76 = "Como um [ruby=livro de provérbios]livro de provérbios[/ruby] que reúne lições e conselhos... quase não tem nenhum peso além disso."
62080-77 = "Mas em Arius, o estudo do Apocalipse recebia uma importância especial."
62080-78 = "Afinal de contas... ele descreve o 'fim do mundo'."
62080-79 = "[s] \"Ou seja, isso significa que...!\""
62080-80 = "Se Arius desejava o fim do mundo, você pergunta?"
62080-81 = "……."
62080-82 = "Exatamente."
62080-83 = "M-M-M-M-Misaki-san?!"
62080-84 = "Não é motivo para espanto. É a realidade."
62080-86 = "...Acho que consigo compreender."
62080-87 = "Existe até aquele ditado que diz: a criança não acolhida pelo vilarejo queimará a todos para sentir o seu calor."
62080-88 = "Para quem não tem nada a perder... o fim do mundo pode ser uma forma de 'salvação'."
62080-89 = "Pelo menos, deve dar a sensação de que tudo finalmente se tornou 'justo'."
62080-90 = "Tanto faz se eu desaparecer ou se o mundo acabar. O resultado final, [ruby=para]para[/ruby][ruby=・]mim[/ruby], é o mesmo."
62080-91 = "...Sendo assim, não acho estranho que, em algum momento, a ordem das coisas tenha se invertido."
62080-93 = "É bem comum confundir os meios com os fins..."
62080-94 = "……."
62080-95 = "……."
62080-96 = "No Apocalipse, aparecem três grupos de sete anjos. Coletivamente, eles são chamados de 'Os Anjos do Apocalipse'."
62080-98 = "Não me diga que... eles realmente existem?"
62080-99 = "Eu achava que era apenas uma história... feita para incitar o medo e a dor..."
62080-100 = "Tem a ver com o que conversamos agora há pouco... sobre sentimentos intensos ganhando forma um dia?"
62080-102 = "Os anjos que anunciam o fim do mundo, conforme escrito no Apocalipse."
62080-103 = "Primeiro vêm os sete 'anjos que abrem os selos'. Depois, os sete 'anjos que tocam as trombetas'. E por fim, os sete 'anjos que derramam as taças'."
62080-104 = "Dentre eles, acho que desta vez são os 'anjos que tocam as trombetas'."
62080-105 = "O som da trombeta foi confirmado quatro vezes."
62080-106 = "Isso também bate com a voz que foi ouvida vinda do céu."
62080-107 = "Com as palavras: 'E ainda restam três anjos para tocar as suas trombetas'."
62080-108 = "[s] \"O que acontece se todos os sete tocarem as trombetas...?\""
62080-109 = "Fufu, o que será que acontece?"
62080-110 = "Se o conteúdo do Apocalipse se tornasse realidade exatamente como está escrito..."
62080-111 = "A seguir, seria a vez dos 'sete anjos com as sete taças de ouro cheias do furor de Deus'."
62080-112 = "Quando isso terminar, o mundo atual será destruído... e um novo mundo surgirá para aqueles que têm fé."
62080-113 = "...Foi isso o que nos ensinaram."
62080-114 = "...Sim. Se for de acordo com o Apocalipse, é isso o que acontece."
62080-115 = "Mas... será que eram mesmo os 'anjos que tocam as trombetas'?"
62080-116 = "...Quer dizer que pode ser alguma 'outra coisa'?"
62080-120 = "Hum... ainda não dá para afirmar nada por enquanto."
62080-121 = "Afinal, Arius é um lugar onde sempre que algo existe, alguma coisa acontece."
62080-127 = "E-Elas realmente vieram..."
62080-128 = "Uau... Uwaaa..."
62080-130 = "Silêncio, por favor. É apenas um edifício. Não há necessidade de ficarem ansiosas."
62080-132 = "S-Sim...!"
62080-134 = "Vou confirmar. Nosso destino é aqui — o arquivo de registros que dizem ficar no subsolo de Porta Pacis."
62080-135 = "Dizem que a 'verdade' de Arius repousa ali."
62080-136 = "Se for o caso, talvez possamos encontrar alguma pista também sobre os 'anjos que tocam as trombetas'."
62080-137 = "O problema é que este lugar está lacrado há mais de 100 anos..."
62080-139 = "V-Veterana? #nO portão... está aberto...?"
62080-141 = "...É sério? #nNão me diga que alguém já...?"
62080-145 = "...Hum, na verdade isso é conveniente."
62080-146 = "Aquele que abre uma porta fechada acaba perdendo algo――"
62080-147 = "Se alguém já abriu para nós, isso é uma preocupação a menos."
62080-149 = "Então, nós realmente..."
62080-150 = "Vamos descer... lá embaixo...?"
62080-152 = "……."
62080-153 = "Não, eu irei sozinha daqui em diante."
62080-154 = "...Porque coisas terríveis podem acontecer."
62080-156 = "……！"
62080-157 = "E-Entendido...!"
62080-158 = "Então, o que nós devemos fazer...?"
62080-160 = "Montem uma base aqui."
62080-162 = "Uma base...?"
62080-164 = "Sim. Vocês sabem como montar uma, não sabem?"
62080-165 = "Ah, mas além de ataques externos――"
62080-166 = "Por favor, montem de forma que também possam lidar com ataques vindos de dentro."
62080-168 = "I-Isso quer dizer...!"
62080-169 = "Para o caso de acontecer algo com você, veterana...?"
62080-171 = "...Não me façam repetir."
62080-173 = "!!!"
62080-174 = "E-Entendido!"
62080-179 = "[ns] \"Havia uma diferença... em como a trombeta era ouvida?\""
62080-180 = "Sim. Havia garotas que ouviam a trombeta e..."
62080-181 = "……."
62080-182 = "...garotas que não ouviam."
62080-183 = "Você sabe o motivo?"
62080-184 = "N-Não... não sei até esse ponto... #nAh, e-eu... fiquei do lado das que ouviram..."
62080-185 = "……."
62080-186 = "A veterana Subaru, provavelmente... acho que não ouviu..."
62080-187 = "...Ugh."
62080-188 = "Não comece a chorar do nada..."
62080-189 = "D-Desculpe... mas..."
62080-190 = "Aconteceu alguma coisa ontem, não foi?"
62080-191 = "?!"
62080-192 = "Ah, me desculpe. Não foi minha intenção te assustar."
62080-193 = "Mas... se você quiser, gostaria que me contasse."
62080-194 = "Por que só você veio até o Sensei, enquanto as outras garotas sumiram sem dizer nada――"
62080-195 = "Por que você tinha certeza de que elas foram para Porta Pacis."
62080-196 = "[s] \"Atsuko, isso é...\""
62080-197 = "Hum?"
62080-198 = "……."
62080-199 = "Entendi. O Sensei pretende esperar."
62080-201 = "(Maia se agachou. Seu corpo... tremia de leve)"
62080-202 = "(Ninguém conseguia dizer nada, mas...)"
62080-204 = "A-An... acho que... #nnão tem problema nenhum em contar para o Sensei..."
62080-205 = "Hiyori...?"
62080-206 = "Shiiiu."
62080-207 = "D-Desculpe... Sabe, eu... não sou muito boa em falar... ehehe..."
62080-208 = "Mas, bem... quando passamos por algo muito doloroso... ou muito difícil..."
62080-209 = "Não importa quem seja... a gente acaba desabafando o que está pensando. #e E d-depois... a gente se sente um pouco mais leve..."
62080-210 = "Não importa quem seja...?"
62080-211 = "Não importa quem. M-Mas... nessas horas, eu recomendo muito o Sensei! #n...Ah, se estivermos atrapalhando, a gente vai para lá...!"
62080-213 = "...Seria melhor nós desligarmos a chamada por um tempo também?"
62080-214 = "É verdade."
62080-216 = "T-Tudo bem! O Sensei é... alguém em quem se pode confiar. #nPelo menos, para mim..."
62080-217 = "Não importa o que eu fale, ele escuta direitinho... e me ajuda com todas as forças. #nEle me deu remédio de estômago, comprou revistas para mim..."
62080-218 = "M-Mas! O Sensei... não é que ele [ruby=faz]faça[/ruby][ruby=・]tudo[/ruby] por nós... #nO que a gente consegue fazer sozinha... a gente tem que se esforçar para fazer..."
62080-219 = "Às vezes eu penso... 'ah, que pena'..."
62080-220 = "Mas... o Sensei diz que, fazendo assim, as alunas aprendem a ser independentes..."
62080-221 = "Ugh... não sei explicar direito... #nM-Mas enfim! Coisas assim..."
62080-222 = "Se você guardar e sofrer sozinha... as coisas dolorosas só vão acumulando cada vez mais..."
62080-223 = "As garotas de Arius não são boas em depender de alguém ou em desabafar... #nEu também era assim... e ainda sou um pouco..."
62080-224 = "P-Por isso, pensei que se pudesse ajudar de alguma forma...! Ehehe..."
62080-226 = "Hiyori-san..."
62080-232 = "B-Bem, então nós vamos para lá... Tem muita coisa que a gente não quer que os outros fiquem ouvindo..."
62080-233 = "Aproveitando, vamos dar uma olhada em como estão as coisas lá fora."
62080-234 = "Sim, vamos fazer isso. Então――"
62080-236 = "E-Esperem um pouco, por favor...!"
62080-238 = "Hã?"
62080-239 = "S-Sim?"
62080-241 = "……."
62080-242 = "Quero contar... para todas vocês também..."
62080-244 = "N-Não precisa se forçar tanto..."
62080-245 = "É uma coragem que ela reuniu com muito custo, vamos escutá-la."
62080-246 = "B-Bem, se fosse eu, com certeza não contaria..."
62080-251 = "[ns] \"...Você está bem?\""
62080-252 = "...Sim."
62080-253 = "Se eu puder ouvir a opinião de várias pessoas... acho que vou conseguir decidir direito... o que devo fazer...!"
62080-255 = "(Maia começou a relatar calmamente os acontecimentos da noite anterior)"
62080-256 = "(Todas ouviam com a respiração suspensa...)"
62080-258 = "……."
62080-259 = "……."
62080-260 = "……."
62080-261 = "Ugh, ugh... Uwaaaaaan!!!"
62080-266 = "Hiyori?! Não chore tanto assim...!"
62080-267 = "Mas, mas! Isso é demais! É triste demaaaais! #nNão tem como ouvir uma coisa dessas e ficar indiferente! Uwaaaaaaaaaaan!!"
62080-274 = "H-H-H-H-Hiyori-san?! Estou ficando... sem ar..."
62080-275 = "Uwaaaan!"
62080-276 = "E-Eu estava me segurando tanto para não chorar..."
62080-277 = "É exatamente por issooooooo~~~~~~~!!!"
62080-279 = "A Hiyori é mesmo uma pessoa gentil, não é?"
62080-280 = "Sim... ela sempre foi assim. #n...Misaki?"
62080-281 = "N-Não foi nada. Não olhe para cá."
62080-282 = "Fufu. Tudo bem, não precisa se segurar."
62080-283 = "Eu já disse que não estou chorando!!"
62080-285 = "[ns] \"Obrigado por nos contar.\""
62080-286 = "Ah, não... eu é que... agradeço por terem me escutado... Muito obrigada..."
62080-287 = "Mas, falando assim, volto a pensar. O som da trombeta... por que será que eu consegui ouvir...?"
62080-288 = "...Deve haver algum ponto em comum entre aquelas que conseguem ouvir a trombeta."
62080-289 = "É apenas uma dedução com base nas informações obtidas, mas..."
62080-290 = "E qual seria esse ponto em comum...?"
62080-291 = "―― Provavelmente, as aulas do Sensei."
62080-292 = "Hã? Mas, se forem as aulas, todas assistiram juntas..."
62080-293 = "Só assistir às aulas não significa necessariamente compreender tudo... #nÉ o mesmo que ler um livro correndo, sem prestar atenção; você não vai entender."
62080-294 = "Existem pessoas assim... que só passam o olho pelas páginas e já saem falando como se tivessem entendido tudo, ou――"
62080-295 = "pessoas que acham que livros servem apenas como decoração...!"
62080-296 = "Para começo de conversa, o livro é um meio de diálogo entre o autor e o leitor! #nLer isso de qualquer jeito! Não tem como haver uma conexão verdadeira!"
62080-298 = "Deveriam ter mais! Respeito por essas páginas e――"
62080-300 = "Presidente, você está saindo do assunto."
62080-302 = "Hã?! Ah... ugh..."
62080-303 = "M-Me desculpem... Enfim... assim como a leitura, as aulas também funcionam dessa forma."
62080-304 = "Estudar é o ato de trazer para dentro de si algo que está além do seu próprio conhecimento..."
62080-305 = "E a aula é o momento em que o Sensei nos guia para auxiliar nesse aprendizado."
62080-306 = "Portanto, não importa quantas aulas você assista..."
62080-307 = "Se você apenas deixar o som passar ou esquecer tudo assim que terminar... #nnão se pode dizer que você realmente assistiu à aula."
62080-308 = "Ah...!"
62080-309 = "Por isso, as alunas que ouviram o som da trombeta — ou seja, usando as palavras do Apocalipse, as alunas que perceberam os 'sinais do fim do mundo' ――"
62080-310 = "Acredito que tenham sido aquelas que conseguiram aceitar o 'conhecimento de fora de Arius' sem resistência."
62080-311 = "Em outras palavras, são as alunas que tiveram menos reações de rejeição em relação a 'novas formas de pensar'."
62080-312 = "Claro, isso é apenas uma hipótese. #nE a única pessoa que pode provar isso... é você."
62080-313 = "O-O que você acha?"
62080-314 = "Sim! Com certeza pode ser isso mesmo! #nVocê é incrível, Ui-san!"
62080-315 = "N-Não... eu... só deduzi por conta própria..."
62080-316 = "Eu sempre digo que é melhor aceitar os elogios com sinceridade, não digo?"
62080-317 = "U-Ah, ugh..."
62080-318 = "A-Além disso... se elas começaram a aceitar o que vem de 'fora de Arius'..."
62080-319 = "Com certeza devem estar começando a questionar a 'Arius de agora'..."
62080-320 = "...Afinal, o conhecimento tem o poder de transformar as pessoas."
62080-325 = "Isso quer dizer..."
62080-326 = "Sim."
62080-327 = "Mais cedo ou mais tarde, as outras garotas também..."
62080-328 = "Há a possibilidade de serem vistas como 'inimigas' pelas alunas que não querem que Arius mude."
62080-330 = "Não quero nem pensar, mas os anjos que tocam as trombetas seriam...?"
62080-331 = "Isso eu já não sei. #nQuem sabe sejam realmente... os próprios anjos que aparecem no Apocalipse."
62080-332 = "Mas você não acha que também dá para interpretar de outra forma?"
62080-333 = "A hostilidade, a ansiedade, a raiva de Arius em relação ao 'mundo lá fora'... todas essas coisas se acumularam e――"
62080-334 = "se manifestaram como um único 'fenômeno'... existe essa possibilidade também..."
62080-335 = "……."
62080-336 = "De fato, isso também é possível."
62080-337 = "Mas... se os 'anjos que tocam as trombetas' forem esse tipo de existência――"
62080-338 = "Isso seria―― muito mais do que a Ui-san imagina..."
62080-340 = "uma existência imensuravelmente pesada e de raízes profundas."
62080-342 = "Próximo Episódio; Apocrypha"