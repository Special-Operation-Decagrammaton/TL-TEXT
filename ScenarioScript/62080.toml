[translation]
62080-1 = "Episódio 8; Porta Pacis (2)"
62080-4 = "Ritos...?"
62080-5 = "Não parece ser algo muito bom."
62080-6 = "Presidente!"
62080-7 = "U-uh..."
62080-12 = "De fato, eu também nunca ouvi falar disso."
62080-13 = "Acho que isso é algo que só eu sei."
62080-14 = "No começo, eu também achava que era apenas um tipo de história de fantasma ou lenda, mas..."
62080-15 = "Pouco antes do 'Tratado de Eden' ser assinado, #nBeatrice foi até o arquivo de registros de Porta Pacis."
62080-16 = "Sem dizer nada a ninguém além de mim, secretamente."
62080-21 = "!"
62080-22 = "Sério!?"
62080-27 = "M-mas, aquele lugar... não era proibido entrar...?"
62080-28 = "Você acha que a Beatrice se importaria com algo assim?"
62080-29 = "I-isso é... pode ser verdade, mas..."
62080-30 = "Beatrice tinha muitos segredos. Esse era um deles."
62080-31 = "Será que... a manifestação das réplicas da Escola de Justina também?"
62080-32 = "Quem sabe. Já quase não existem formas de saber a verdade sobre isso..."
62080-33 = "Mas não consigo acreditar que não tenha relação alguma."
62080-34 = "Porque foi a partir daquela época que os fenômenos anormais começaram a aumentar em Arius."
62080-35 = "Eu me lembro... De repente, começaram a aparecer muitas coisas que eu nunca tinha visto... E armas, que eram fornecidas em abundância..."
62080-36 = "Naquela época... eu só pensava que os adultos eram incríveis... e nem sequer questionava..."
62080-37 = "[s] \"...\""
62080-38 = "O ponto importante aqui é a parte do 'começaram a aumentar'."
62080-39 = "Hã...? Não pode ser...?"
62080-40 = "É exatamente isso."
62080-41 = "Originalmente, coisas estranhas já aconteciam em Arius. #nEmbora a frequência não fosse tão alta."
62080-43 = "Toda escola tem uma ou duas histórias de fantasmas, mas... #nArius estava muito além desse nível."
62080-44 = "Só entendi depois que saí de Arius. Aquilo não era algo que se pudesse chamar de 'um pouco'."
62080-49 = "[ns] \"Por que isso...?\""
62080-50 = "Eu mesma não sei o motivo exato."
62080-51 = "Mas..."
62080-52 = "Sinto que Arius acabou se tornando esse tipo de 'lugar'."
62080-53 = "Originalmente, já existia 'algo' aqui."
62080-54 = "Raiva, lamento, ressentimento, desespero, resignação... esses pensamentos se acumularam e se concentraram aqui."
62080-55 = "Dizem que sentimentos fortes acabam se manifestando de alguma forma, não é?"
62080-56 = "I-isso... não é só uma metáfora...?"
62080-57 = "Mas nós já vimos, não é? A Escola de Justina, Barbara e outras coisas."
62080-58 = "Eu pensava que tudo era obra da Madame... da Beatrice..."
62080-59 = "Não, talvez pensar assim tenha sido uma forma de desviar inconscientemente o olhar da 'verdade oculta' de Arius..."
62080-60 = "Não quero tirar conclusões precipitadas, mas... às vezes fico com medo."
62080-61 = "O que será que existe no fundo desses sentimentos fortes acumulados?"
62080-62 = "Só de imaginar... dá medo."
62080-63 = "..."
62080-64 = "Uuuu..."
62080-69 = "Ehem. #n...Então, vamos falar sobre o Apocalipse."
62080-70 = "Parece que isso está ligado ao cerne dos 'fenômenos' que estão ocorrendo em Arius."
62080-71 = "Sim, obrigada... Shimiko-san."
62080-72 = "Não há de quê, Atsuko-san. #nEntão, vamos começar com um resumo."
62080-73 = "O Apocalipse refere-se ao capítulo final das escrituras transmitidas tanto em Trinity quanto em Arius."
62080-74 = "As escrituras que as duas escolas possuem eram originalmente a mesma. Apenas a interpretação é diferente, mas a raiz é a mesma."
62080-75 = "Em Trinity, o Apocalipse é tratado apenas como uma referência bibliográfica."
62080-76 = "Como uma coletânea de provérbios contendo lições e conselhos... não tem quase nenhum peso além disso."
62080-77 = "Mas em Arius, o estudo do Apocalipse era especialmente valorizado."
62080-78 = "Afinal... é lá que está escrito sobre o \"fim do mundo\"."
62080-79 = "[s] \"Quer dizer que... isso significa...!\""
62080-80 = "Que Arius desejava o fim do mundo?"
62080-81 = "……."
62080-82 = "Exatamente."
62080-83 = "Mi, mi, mi, mi, Misaki-san!?"
62080-84 = "Não é algo para se surpreender. É um fato."
62080-86 = "……Acho que consigo entender."
62080-87 = "Existe aquela história sobre uma criança que não recebeu calor e, para obtê-lo, queimou a vila inteira."
62080-88 = "Para alguém que não tem nada a perder... o fim do mundo pode ser uma \"salvação\"."
62080-89 = "Pelo menos, deve dar a sensação de que tudo se tornou \"justo\"."
62080-90 = "Desaparecer e o mundo acabar. Para si mesmo, o resultado é o mesmo, não é?"
62080-91 = "……Se for assim, não acho estranho que, em algum momento, a ordem das coisas acabe se invertendo."
62080-93 = "Porque é comum confundirmos os meios com os fins……."
62080-94 = "……."
62080-95 = "……."
62080-96 = "No Apocalipse, aparecem três grupos de sete anjos. Coletivamente, nós os chamamos de \"Anjos do Apocalipse\"."
62080-98 = "Não me diga... que eles realmente existem?"
62080-99 = "Eu achava que eram apenas histórias... feitas para incitar medo e sofrimento……."
62080-100 = "Sobre o que você disse antes... aquela coisa de que desejos fortes acabam ganhando forma?"
62080-102 = "Os anjos que anunciam o fim do mundo, conforme escrito no Apocalipse."
62080-103 = "Primeiro, os sete \"anjos que abrem os selos\". Depois, os sete \"anjos que tocam as trombetas\". E, por fim, os sete \"anjos que derramam as taças\"."
62080-104 = "Dentre eles, acho que desta vez são os \"anjos que tocam as trombetas\"."
62080-105 = "O som das trombetas confirmado foi de quatro vezes."
62080-106 = "Isso coincide com a voz que ouvimos vinda do céu."
62080-107 = "Com as palavras: \"Ainda restam três anjos que estão prestes a tocar suas trombetas\"."
62080-108 = "[s] \"Se todos os 7 tocarem as trombetas... o que vai acontecer?\""
62080-109 = "Fufu, quem sabe o que vai acontecer."
62080-110 = "Se o conteúdo do Apocalipse se tornar realidade exatamente como está escrito……."
62080-111 = "Chegará a vez dos \"anjos que possuem as sete taças de ouro cheias da ira de Deus\"."
62080-112 = "Quando isso terminar, o mundo atual perecerá... e um novo mundo virá para aqueles que têm fé."
62080-113 = "……Foi isso que nos ensinaram."
62080-114 = "……Sim. Se for como no Apocalipse, é isso que acontecerá."
62080-115 = "Mas... será que aqueles eram realmente os \"anjos que tocam as trombetas\"?"
62080-116 = "……Você quer dizer que pode ser \"outra coisa\"?"
62080-120 = "Hmm... por enquanto, não dá para dizer com certeza."
62080-121 = "Afinal, Arius é um lugar onde algo acontece por causa de outra coisa."
62080-127 = "N-nós realmente chegamos……."
62080-128 = "Uau... uaaaaah……."
62080-130 = "Pessoal, por favor, mantenham a calma. É apenas um prédio. Não há necessidade de ficarem ansiosos."
62080-132 = "S-sim……!"
62080-134 = "Vou confirmar. Nosso destino é aqui — o arquivo de registros que supostamente fica no subsolo de Porta Pacis."
62080-135 = "Dizem que a \"verdade\" de Arius está adormecida lá."
62080-136 = "Se for esse o caso, talvez possamos encontrar alguma pista sobre os \"anjos que tocam as trombetas\"."
62080-137 = "O problema é que este lugar está selado há mais de 100 anos……."
62080-139 = "Se-senpai? #nA porta... está aberta……?"
62080-141 = "……Sério mesmo?#nNão me diga que alguém já…?"
62080-145 = "……Hum, na verdade, isso é conveniente."
62080-146 = "Aquele que abre uma porta trancada acaba perdendo algo――"
62080-147 = "Se alguém a abriu por nós, então uma das minhas preocupações diminuiu."
62080-149 = "Então, nós vamos realmente…."
62080-150 = "Descer… para baixo disso…?"
62080-152 = "……."
62080-153 = "Não, eu irei sozinha."
62080-154 = "……Pois algo terrível pode acontecer."
62080-156 = "……!"
62080-157 = "E-entendido…!"
62080-158 = "Então, o que devemos fazer…?"
62080-160 = "Construam uma base aqui."
62080-162 = "Uma base…?"
62080-164 = "Sim. Vocês sabem como fazer, certo?"
62080-165 = "Ah, mas além de ataques externos――"
62080-166 = "Por favor, façam de uma forma que também possa lidar com ataques internos."
62080-168 = "I-isso é…!"
62080-169 = "Para o caso de algo acontecer com a veterana…?"
62080-171 = "……Não me façam repetir."
62080-173 = "!!!"
62080-174 = "E-entendido!"
62080-179 = "[ns] \"Houve… uma diferença em como a trombeta foi ouvida?\""
62080-180 = "Sim. Teve as garotas que ouviram a trombeta e…."
62080-181 = "……."
62080-182 = "Teve as que não ouviram."
62080-183 = "Você sabe o motivo?"
62080-184 = "N-não… até aí eu não sei… Ah, e-eu… estava do lado que ouviu…."
62080-185 = "……."
62080-186 = "A veterana Subaru, provavelmente… acho que ela não ouviu…."
62080-187 = "……Ugh."
62080-188 = "Não comece a chorar de repente…."
62080-189 = "D-desculpe… mas…."
62080-190 = "Então, ontem… realmente aconteceu alguma coisa, não é?"
62080-191 = "!?"
62080-192 = "Ah, desculpe. Não tive a intenção de te assustar."
62080-193 = "Mas… se puder, eu gostaria que me contasse."
62080-194 = "Por que só você veio até o Sensei, enquanto as outras desapareceram sem dizer nada――"
62080-195 = "E como você sabia que elas tinham ido para Porta Paxis."
62080-196 = "[s] \"Atsuko, isso é….\""
62080-197 = "Hum?"
62080-198 = "……."
62080-199 = "Entendi. O Sensei pretende esperar, não é?"
62080-201 = "（Miya se agachou. Seu corpo… tremia levemente）"
62080-202 = "（Ninguém conseguia dizer nada, mas…）"
62080-204 = "A-ah… para o Sensei…#nacho que não tem problema contar…."
62080-205 = "Hiyori…?"
62080-206 = "Shiii."
62080-207 = "D-desculpe…. Eu, falar é algo que… não sou muito boa nisso… e-hehe…."
62080-208 = "Mas, bem… quando acontece algo muito doloroso… ou algo muito difícil…."
62080-209 = "Não importa com quem seja... eu acabo falando sobre o que estou pensando. #nE aí... eu me sinto um pouco melhor..."
62080-210 = "Com qualquer um...?"
62080-211 = "Com qualquer um. M-mas... para essas horas, o Sensei é a melhor recomendação! #n...Ah, se estivermos atrapalhando, nós podemos ir para lá..."
62080-213 = "...Nós também deveríamos desligar a chamada por um tempo?"
62080-214 = "É, talvez seja melhor."
62080-216 = "E-está tudo bem! O Sensei é... alguém em quem se pode confiar. #nPelo menos para mim..."
62080-217 = "Não importa o que eu diga, ele ouve com atenção... e me ajuda com tudo o que pode. #nEle me deu remédio para o estômago, comprou revistas para mim..."
62080-218 = "M-mas! O Sensei não faz tudo por mim... #nO que eu consigo fazer sozinha... eu tenho que me esforçar para fazer..."
62080-219 = "Eu até penso que, bem... é um pouco decepcionante que ele não faça tudo..."
62080-220 = "Mas... o Sensei diz que, fazendo assim, as alunas conseguem se tornar independentes..."
62080-221 = "Uu... eu não sei explicar muito bem... #nM-mas, de qualquer forma! Coisas assim..."
62080-222 = "Guardar tudo sozinha e ficar preocupada... só faz com que as coisas dolorosas aumentem cada vez mais..."
62080-223 = "As garotas de Arius não são boas em pedir ajuda ou conversar com alguém... #nEu também era assim... e ainda sou um pouco..."
62080-224 = "E-então, eu pensei que se pudesse ajudar nem que fosse um pouco...! E-ehehe..."
62080-226 = "Hiyori-san..."
62080-232 = "B-bem, então nós vamos para lá... Tem muitas coisas que não queremos que os outros ouçam..."
62080-233 = "Aproveitando, vou dar uma olhada lá fora."
62080-234 = "Ah, vamos fazer isso. Então..."
62080-236 = "E-esperem um pouco...!"
62080-238 = "Eh?"
62080-239 = "S-sim?"
62080-241 = "..."
62080-242 = "Eu também quero... falar com vocês..."
62080-244 = "N-não precisa se forçar tanto assim..."
62080-245 = "Ela finalmente reuniu coragem, vamos ouvir o que ela tem a dizer."
62080-246 = "B-bem, eu com certeza não faria isso, mas..."
62080-251 = "[ns] \"...Você está bem?\""
62080-252 = "...Sim."
62080-253 = "Acho que se eu ouvir a opinião de várias pessoas... eu também vou conseguir decidir... o que devo fazer!"
62080-255 = "(Maia começou a contar lentamente o que aconteceu na noite passada.)"
62080-256 = "(Todos ouviam prendendo a respiração...)"
62080-258 = "..."
62080-259 = "..."
62080-260 = "..."
62080-261 = "Ugh, uuu... Uwaaaaaa!!!"
62080-266 = "Hiyori!? Se você chorar desse jeito...!"
62080-267 = "Mas, mas! Isso é demais! É triste demais, uaaaaa! #nComo alguém pode ouvir isso e ficar bem!? Uwaaaaaaaaaa!!"
62080-274 = "H-hi-hi-hi-Hiyori-san!? E-está difícil... respirar..."
62080-275 = "Uwaaaaa!"
62080-276 = "E-eu estava tentando... não chorar..."
62080-277 = "É exatamente por isso que é tão triste, aaaaaaahhhhhh!!!"
62080-279 = "A Hiyori é realmente gentil, né."
62080-280 = "Ah... ela sempre foi assim. #n...Misaki?"
62080-281 = "N-não é nada. Não olhe para cá."
62080-282 = "Fufu. Tudo bem, você não precisa se segurar."
62080-283 = "Eu já disse que não estou chorando!!"
62080-285 = "[ns] \"Obrigado por compartilhar isso comigo.\""
62080-286 = "Eh, não... eu que agradeço... por ter me ouvido..."
62080-287 = "Mas, depois de falar sobre isso, penso novamente. O som da trombeta... por que será que eu consegui ouvir...?"
62080-288 = "...Deve haver algum ponto em comum entre aqueles que estão ouvindo a trombeta."
62080-289 = "É apenas uma dedução baseada nas informações obtidas, mas..."
62080-290 = "Esse ponto em comum é..."
62080-291 = "—Provavelmente, a aula do Sensei."
62080-292 = "Hã? Mas, se é a aula, todos participam juntos..."
62080-293 = "Só porque assistiram à aula, não significa que entenderam tudo... #nÉ o mesmo que ler um livro; se você apenas passar os olhos, não vai entender nada."
62080-294 = "Tem gente que faz isso... só passa os olhos e começa a falar como se tivesse entendido tudo —"
62080-295 = "Gente que acha que livro serve só de decoração...!"
62080-296 = "Para começo de conversa, um livro é um meio para o autor e o leitor dialogarem! #nLer de qualquer jeito e esperar que haja uma conexão? Isso não faz o menor sentido!"
62080-298 = "Deveriam ter mais respeito por esses livros e —"
62080-300 = "Presidente, você está mudando de assunto."
62080-302 = "Hã!? Ah... ugh..."
62080-303 = "P-perdão... De qualquer forma... assim como a leitura, a aula também funciona da mesma maneira."
62080-304 = "Estudar é o ato de absorver algo que está fora do seu conhecimento para dentro de si..."
62080-305 = "A aula é o tempo em que o Sensei nos guia para auxiliar nesse estudo."
62080-306 = "Por isso, não importa quantas aulas você assista..."
62080-307 = "Se você apenas ouvir sem prestar atenção ou esquecer tudo depois... #nnão se pode dizer que você realmente assistiu à aula."
62080-308 = "Ah...!"
62080-309 = "Portanto, os alunos que ouviram o som da trombeta, ou seja, usando as palavras do Apocalipse, os alunos que sentiram os \"sinais do fim do mundo\" —"
62080-310 = "Acredito que foram os alunos que conseguiram aceitar o \"conhecimento de fora de Arius\" sem resistência."
62080-311 = "Em outras palavras, são alunos que tiveram menos reação de rejeição a \"novas formas de pensar\"."
62080-312 = "Claro, isso é apenas uma hipótese. #nE quem pode provar isso... é apenas você."
62080-313 = "O-o que acha?"
62080-314 = "Isso! Pode ser exatamente isso! #nIncrível, Ui-san!"
62080-315 = "N-não... eu só presumi por conta própria, então..."
62080-316 = "Você sempre diz que é melhor aceitar elogios com sinceridade, não diz?"
62080-317 = "U-ah, ugh..."
62080-318 = "A-além disso... se eles começaram a aceitar o \"lado de fora de Arius\"..."
62080-319 = "Com certeza, eles também devem ter começado a questionar a \"Arius de agora\"..."
62080-320 = "...Porque o conhecimento tem o poder de mudar as pessoas."
62080-325 = "Isso significa que..."
62080-326 = "Sim."
62080-327 = "As outras crianças também, cedo ou tarde..."
62080-328 = "Podem ser vistas como \"inimigas\" por aqueles que não querem que Arius mude."
62080-330 = "Não me diga que o anjo que toca a trombeta é..."
62080-331 = "Isso eu não sei. #nTalvez seja realmente... o próprio anjo que aparece no Apocalipse."
62080-332 = "Mas não acha que existe outra interpretação?"
62080-333 = "A hostilidade, a ansiedade e a raiva de Arius em relação ao \"mundo exterior\"... tudo isso se acumulou —"
62080-334 = "E surgiu como um único \"fenômeno\"... existe essa possibilidade também..."
62080-335 = "..."
62080-336 = "De fato, isso também é possível."
62080-337 = "Mas... se o \"anjo que toca a trombeta\" for esse tipo de existência —"
62080-338 = "Isso pode ser... muito mais profundo e pesado do que você imagina, Ui-san."
62080-340 = "Pode ser uma existência imensurável e profundamente enraizada."
62080-342 = "Próximo episódio: Apocrypha"
