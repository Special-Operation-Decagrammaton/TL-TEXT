[translation]
10042040-1 = "Episódio 4; Lili Marleen"
10042040-2 = "Academia Gehenna - Sala do Comitê Disciplinar"
10042040-3 = "……."
10042040-4 = "[s1] \"Bem...\"\n[s2] \"Quer que eu explique de novo?\""
10042040-7 = "Não, acho que não mudaria nada, não importa quantas vezes eu ouça."
10042040-8 = "Essa situação... ou seja, o fato de terem usado a rede de contato de emergência do Comitê Disciplinar para me chamar é por causa de..."
10042040-9 = "……Um \"panqueca que fugiu de casa\", é isso?"
10042040-10 = "[s] \"B-bem, é...\""
10042040-11 = "Olha... eu estou no meio da minha terceira noite sem dormir."
10042040-15 = "Eu sei que os administradores são ocupados. #nE sei que nossa mobilização acabou aumentando a carga de trabalho de vocês..."
10042040-16 = "Não, eu não quero falar mal da Chinatsu..."
10042040-20 = "……Haa."
10042040-21 = "Parece que houve um mal-entendido. #nComo administradora, farei o trabalho que precisa ser feito..."
10042040-22 = "Só que... acho que casos desse nível acontecem em toda Gehenna."
10042040-23 = "Então... por favor, resolvam vocês mesmos."
10042040-24 = "……O Sensei também está aí com você, não está?"
10042040-25 = "[s3] \"É verdade, mas...\"\n[s4] \"A situação é complicada... eu realmente preciso que você veja isso, Ako.\""
10042040-28 = "Hã...?"
10042040-29 = "Isso é um pouco decepcionante. #nVocê comeu algo que te fez mal?"
10042040-30 = "Normalmente, você diria algo como \"Deixe comigo!\"..."
10042040-34 = "Ah, chega! #nVocê está me deixando curiosa!"
10042040-35 = "Isso não é uma pegadinha, é?"
10042040-36 = "Não é um plano que você armou só para me surpreender, né!?"
10042040-37 = "[s5] \"Você acha que eu faria algo assim...?\"\n[s6] \"A situação está realmente séria...\""
10042040-40 = "Então...!"
10042040-44 = "……Haa."
10042040-45 = "Entendido, eu entendi. #nDeixe-me respirar fundo um pouco..."
10042040-46 = "Se estou nervosa agora... é porque não dormi nada."
10042040-47 = "……Ou, para ser mais precisa, é porque alguém me contatou em uma emergência por causa de um caso desse nível."
10042040-48 = "[s7] \"Sinto muito mesmo. Depois eu te pago uns doces deliciosos.\"\n[s8] \"Ugh, que cruel! Isso é demais!\""
10042040-49 = "……Entendo."
10042040-50 = "Então, você vai me escoltar, é?"
10042040-51 = "Você tem moral para falar isso..."
10042040-52 = "De qualquer forma, conversaremos sobre os detalhes depois! #nCertifique-se de reservar um tempo na sua agenda, entendeu!?"
10042040-53 = "[s] \"A Sena tirou uma prova disso.\""
10042040-54 = "……Oh?"
10042040-55 = "Vou verificar aqui. Envie imediatamente."
10042040-60 = "……É uma montagem ou algo do tipo?"
10042040-64 = "Você acha que eu faria algo assim?"
10042040-65 = "……Não, peço desculpas. #nÉ que fiquei um pouco surpresa."
10042040-66 = "Entendo... é verdade."
10042040-67 = "Deixando o Sensei de lado... se a chefe do departamento de medicina de emergência diz isso, eu acredito."
10042040-68 = "Não, na verdade, é mais como se eu não tivesse escolha..."
10042040-69 = "[s] \"……Isso é demais.\""
10042040-70 = "Ah, chega! #nNão é como se eu não confiasse em você de jeito nenhum!"
10042040-71 = "De qualquer forma, entendi."
10042040-72 = "Com base nessa prova, nós também cooperaremos o máximo possível. #nEu irei ao local mais tarde."
10042040-73 = "Se isso for realmente uma pegadinha..."
10042040-74 = "Pelo menos dois dias você vai passar com o Comitê Disciplinar... não, comigo!"
10042040-75 = "……O que exatamente você pretende fazer com o Sensei?"
10042040-76 = "Bem, vamos conversar depois que terminar."
10042040-77 = "Vou cobrar um preço equivalente por isso."
10042040-78 = "[s9] \"Preço equivalente...?\"\n[s10] \"Ako...?\""
10042040-81 = "Bem, preciso me preparar agora."
10042040-82 = "……Tenho que garantir que tudo esteja perfeito."
10042040-83 = "Administradora...?"
10042040-84 = "Administradora Ako——"
10042040-91 = "Ordens para todos os membros do Comitê Disciplinar em espera."
10042040-92 = "Preparem todos os canhões antiaéreos 88mm FlaK36 disponíveis!"
10042040-93 = "Canhões antiaéreos, senhora?"
10042040-94 = "Sim, todos os Acht-Acht que puderem usar!"
10042040-95 = "Vamos fazer algo tão grandioso assim...?"
10042040-96 = "Até esta manhã, não havia nada sobre isso……."
10042040-97 = "Sensei—— é um pedido do Schale. #nIsso é o suficiente para entenderem?"
10042040-98 = "Do, do Sensei!?"
10042040-99 = "Entendido. Vamos preparar imediatamente!"
10042040-103 = "……Uma situação que exige o uso da rede de contato de emergência."
10042040-104 = "Vamos preparar um poder de fogo à altura para você."
10042040-105 = "Fufu... já que chegamos a esse ponto, vai custar caro, viu?"
10042040-106 = "Vou cobrar cada centavo depois!"
10042040-108 = "Distrito de Gehenna"
10042040-109 = "[ns] \"Que tipo de preparativos ela pretende fazer, afinal...\""
10042040-110 = "Já tenho uma ideia do que esperar."
10042040-111 = "Como ela disse que queria garantir que tudo estivesse perfeito... provavelmente vai trazer os canhões de 88mm."
10042040-112 = "Embora eu duvide da eficácia deles neste terreno, onde os prédios servem como barreiras."
10042040-113 = "Se o alvo se mover rapidamente entre os prédios, será difícil mirar com precisão."
10042040-114 = "……E, em último caso, existe a possibilidade de atirarem nos prédios também."
10042040-115 = "[s] \"Isso não é um problema!?\""
10042040-116 = "Quem sabe? Se fosse em outra escola, talvez."
10042040-117 = "Mas em Gehenna, prédios desabando é quase rotina."
10042040-118 = "O que me preocupa é como a Pandemonium Society vai reagir."
10042040-119 = "[s] \"…….\""
10042040-120 = "Se ocorrer algum dano por causa disso——"
10042040-121 = "Não dá para saber que tipo de reclamação a Presidente Makoto vai inventar."
10042040-122 = "Se fosse a Administradora Ako de sempre, ela já teria previsto e tomado medidas, mas..."
10042040-123 = "Agora, ela pode não estar conseguindo julgar direito por falta de sono……."
10042040-124 = "Desculpem. #nPor minha causa, causei problemas a todos vocês……."
10042040-125 = "……Não precisa se culpar. #nAs circunstâncias são o que são."
10042040-126 = "Além disso……."
10042040-127 = "Não importa o resultado, os corpos enviados ao Departamento de Medicina de Emergência——"
10042040-128 = "……Não, quero dizer, apenas o número de feridos vai aumentar um pouco."
10042040-129 = "E, está tudo bem com isso!?"
10042040-130 = "Pergunta boba. Esse nível de confusão é o nosso dia a dia."
10042040-131 = "Não vai exceder a capacidade do Departamento de Medicina de Emergência."
10042040-132 = "Entendo o que a chefe diz, mas nossa posição ficaria..."
10042040-133 = "……Peço perdão."
10042040-139 = "Sensei, recebi um contato da Administradora Ako."
10042040-140 = "Ela disse para rastrearmos o paradeiro da panqueca."
10042040-141 = "Se é para rastrear, não muda nada do que estávamos fazendo."
10042040-142 = "Então, vamos nessa."
