[translation]
10042040-1 = "第4話;リリー・マルレーン"
10042040-2 = "ゲヘナ学園・風紀委員会の教室"
10042040-3 = "……。"
10042040-4 = "[s1] \"えっと……。\"\n[s2] \"もう一度説明しようか？\""
10042040-7 = "いえ、何度聞いたところで変わらないと思いますし。"
10042040-8 = "この状況――つまり、風紀委員会の緊急連絡網を使ってまで呼び出したのは……。"
10042040-9 = "……「家出したパンケーキ」のためなんですね？"
10042040-10 = "[s] \"う、うん……。\""
10042040-11 = "あの……私、三徹目の真っ最中なのですけど。"
10042040-15 = "行政官が多忙なのは知っています。#n私たちが出動したせいで余計に負担を増やしてしまっているのも……。"
10042040-16 = "いえ、チナツを悪く言いたいわけでは……。"
10042040-20 = "……はぁ。"
10042040-21 = "誤解があったようですね。#n行政官として、やるべき仕事はやりますよ……。"
10042040-22 = "ただ……この程度の事案、ゲヘナ中で起きているかと。"
10042040-23 = "なので……そちらで処理してください。"
10042040-24 = "……ちょうど先生も一緒にいるのでしょう？"
10042040-25 = "[s3] \"たしかに、そうなんだけど……。\"\n[s4] \"状況が状況で……ちょっとアコにも見てほしいんだ。\""
10042040-28 = "はぁ……？"
10042040-29 = "なんだか拍子抜けしますね。#nなにか悪いものでも食べました？"
10042040-30 = "いつもなら、「私に任せて！」とか仰るはずなのに……。"
10042040-34 = "あぁ、もう！#n気になってしまうじゃないですか！"
10042040-35 = "これ、ドッキリとかじゃないですよね？"
10042040-36 = "私を驚かせるために一計を案じたとかじゃないんですよね！？"
10042040-37 = "[s5] \"私がそんなことすると思う……？\"\n[s6] \"本当に大変な状況になってるんだ……。\""
10042040-40 = "だから……！"
10042040-44 = "……はぁ。"
10042040-45 = "分かりました、分かりましたから。#n少し深呼吸させてください……。"
10042040-46 = "今、神経質になっているのは……少し眠れていないからなので。"
10042040-47 = "……より正確に言えば、そんな状況で誰かさんが「この程度の事案で緊急連絡をしてきたから」ですが。"
10042040-48 = "[s7] \"本当にごめん。今度、美味しいスイーツでも奢るよ。\"\n[s8] \"うぅ、ひどいよ！あんまりだ！\""
10042040-49 = "……なるほど。"
10042040-50 = "つまり、エスコートしてくださる、と？"
10042040-51 = "人のこと言えた立場ですか……。"
10042040-52 = "とにかく、詳しい話は後で聞きますから！#nちゃんと時間を空けておいてくださいね！？"
10042040-53 = "[s] \"セナが撮ってくれた証拠があるんだ。\""
10042040-54 = "……ほう？"
10042040-55 = "こちらで確認します。すぐ送ってください。"
10042040-60 = "……コラ画像か何かです？"
10042040-64 = "私がそのようなことをするとでも？"
10042040-65 = "……いえ、失礼しました。#n少し驚きまして。"
10042040-66 = "なるほど……そうですね。"
10042040-67 = "先生はさておき……救急医学部長がそう仰るのであれば信用します。"
10042040-68 = "いえ、むしろせざるを得ないというか……。"
10042040-69 = "[s] \"……あんまりだ。\""
10042040-70 = "あぁ、もう！#nまったく信用してないわけではありませんから！"
10042040-71 = "とにかく、分かりました。"
10042040-72 = "この証拠をもとに、こちら側も可能な限り協力いたします。#n後ほど私も現場へ向かいますので。"
10042040-73 = "もし、本当にドッキリだったら……。"
10042040-74 = "少なくとも、2日は風紀委員会に……いえ、私に付き合ってもらいますからね！"
10042040-75 = "……一体先生をどうするつもりですか？"
10042040-76 = "まあ、終わってから話しましょう。"
10042040-77 = "それ相応の対価を支払ってもらいます。"
10042040-78 = "[s9] \"それ相応……？\"\n[s10] \"アコ……？\""
10042040-81 = "それでは、準備がありますので。"
10042040-82 = "……万全を期して臨まなくては。"
10042040-83 = "行政官……？"
10042040-84 = "アコ行政――"
10042040-91 = "待機中の全風紀委員に命じます。"
10042040-92 = "使用可能な88ミリFlaK36の対空砲をあるだけ用意してください！"
10042040-93 = "対空砲、ですか？"
10042040-94 = "はい、使えるアハト・アハトを全て！"
10042040-95 = "そんなに大掛かりな事をするんですか……？"
10042040-96 = "今朝までそんな話一切なかったのに……。"
10042040-97 = "先生――シャーレの要請です。#nこれでご理解いただけたでしょうか。"
10042040-98 = "せ、先生から！？"
10042040-99 = "分かりました。すぐにご用意します！"
10042040-103 = "……緊急連絡網を使うほどの事態。"
10042040-104 = "それ相応の火力を用意して差し上げましょう。"
10042040-105 = "ふふ……ここまで動かしたのです。高くつきますよ？"
10042040-106 = "あとできっちりと返してもらいますからね！"
10042040-108 = "ゲヘナ自治区通り"
10042040-109 = "[ns] \"いったいどんな準備をするつもりなんだろう……。\""
10042040-110 = "おおかたの予想はついています。"
10042040-111 = "万全を期して、と言っていたので……おそらく88ミリ砲を持ってくるかと。"
10042040-112 = "ビルが壁として作用するこの地形において、あれがどれほど効力を発揮できるかは疑問ですが。"
10042040-113 = "ターゲットが建物間を素早く移動でもしたら、正確に狙うのは難しくなります。"
10042040-114 = "……もしもの時は、建物ごと撃つ可能性も。"
10042040-115 = "[s] \"それってマズいんじゃない！？\""
10042040-116 = "どうでしょう、他の学園ならともかく。"
10042040-117 = "ゲヘナでは、ほぼ日常的に建物が倒壊していますから。"
10042040-118 = "ただ[ruby=パンデモニウム・ソサエティー]……万魔殿がど[/ruby]う出るかが気になるところです。"
10042040-119 = "[s] \"……。\""
10042040-120 = "この件で何かしらの損害が発生した場合――"
10042040-121 = "マコト議長から一体どんな難癖をつけられるか、分かったものではありません。"
10042040-122 = "普段のアコ行政官なら、想定の上で対策しているでしょうが……。"
10042040-123 = "今は寝不足でまともな判断ができない可能性があります……。"
10042040-124 = "すみません。#n私のせいで、皆さんにご迷惑を……。"
10042040-125 = "……ご自身を責める必要はありません。#n事情が事情なのですから。"
10042040-126 = "それに……。"
10042040-127 = "どちらに転ぼうと、救急医学部に搬送される死体――"
10042040-128 = "……いえ、負傷者が少し増えるだけに過ぎません。"
10042040-129 = "そ、それでいいの！？"
10042040-130 = "愚問です。この程度の騒動、日常茶飯事ですから。"
10042040-131 = "救急医学部のキャパを超えることはありません。"
10042040-132 = "部長が仰ることは分かりますが、それでは私たちの立場が……。"
10042040-133 = "……失礼しました。"
10042040-139 = "先生、アコ行政官から連絡がありました。"
10042040-140 = "パンケーキの行方を追跡するように、と。"
10042040-141 = "追跡なら、先ほどまでと変わりませんね。"
10042040-142 = "では、行きましょう。"
