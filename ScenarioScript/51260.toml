[translation]
51260-1 = "Episódio 26; Com os Meus Desejos"
51260-2 = "(A situação que mergulhou Hyakkiyako no caos diminuiu um pouco――)"
51260-5 = "Tragam os materiais para cá!"
51260-6 = "Onde precisa do martelo?"
51260-10 = "Ah, por favor, tragam aqui!"
51260-13 = "Sim, estamos aceitando as inscrições aqui!"
51260-14 = "Por favor, preencham o formulário de solicitação para os equipamentos necessários aqui!"
51260-15 = "Ainda temos tempo, então façam tudo com calma e sem pressa!"
51260-16 = "[s] \"Pessoal, bom trabalho desde cedo.\""
51260-20 = "Ah, Sensei!"
51260-21 = "Olá, Sensei!"
51260-23 = "Fufu! Estamos trabalhando juntas no Comitê de Operações do Festival para trazê-lo de volta!"
51260-24 = "[s1] \"Acabou de acontecer tudo aquilo...\"\n[s2] \"Já decidiram realizar o festival novamente?\""
51260-27 = "Sim. Foi uma situação que ninguém poderia prever..."
51260-28 = "Com a compreensão de muitas pessoas, conseguimos seguir em frente com a reabertura."
51260-29 = "Mas... pensar que, no meio de todo aquele tumulto, todo o Comitê de Operações do Festival estava inconsciente..."
51260-30 = "É frustrante, não consigo perdoar isso!!!"
51260-32 = "Isso mesmo! Se não fosse por aquilo, teríamos lutado com tudo!"
51260-33 = "Sim, porque não dá para chamar aquilo de festival!"
51260-34 = "[s] \"Mas eu sei que todos do Comitê se esforçaram muito.\""
51260-36 = "Obrigada..."
51260-37 = "Mas não temos como agradecer o suficiente ao Sensei e a todos da Hyakkiyako por terem resolvido a situação."
51260-38 = "Bem, é exatamente por isso que vamos reiniciar o festival com tudo!"
51260-39 = "Mas... fico feliz que o caso da Hyakkaryouran tenha sido resolvido com segurança."
51260-41 = "Sim! Presidente!"
51260-42 = "As instalações foram destruídas e o local do festival ficou uma bagunça... mas o festival não acabou!"
51260-44 = "Isso mesmo! O que foi destruído, basta consertar."
51260-45 = "Não é, Sensei?"
51260-46 = "[s] \"Sim, como a Shizuko disse.\""
51260-47 = "Ehehe."
51260-51 = "Então, Comitê de Operações do Festival! Vamos nessa!"
51260-54 = "Ohhh!!"
51260-56 = "Ah! E Sensei."
51260-64 = "Muito obrigada por todo o seu trabalho duro desta vez também."
51260-65 = "[s] \"De nada.\""
51260-89 = "(Pessoas trabalhando incessantemente mesmo após a tragédia)"
51260-90 = "(O que foi destruído, basta consertar―― trabalhando juntas com todos para recuperar o cotidiano)"
51260-93 = "(E――)"
51260-99 = "[ns] \"Sim, alô?\""
51260-106 = "Ah, você atendeu, Sensei~"
51260-107 = "Mesmo tendo te chamado de repente, obrigada por atender."
51260-108 = "[s] \"É um chamado da Niya, então vim o mais rápido que pude.\""
51260-109 = "Nyaha. Essa sua língua rápida... é quase prazeroso de ouvir."
51260-110 = "Liguei para você hoje para..."
51260-111 = "Para lhe dar um relatório sobre o caso de outro dia."
51260-112 = "Sobre o Comitê de Mediação de Conflitos Hyakkaryouran..."
51260-116 = "A dissolução foi suspensa♪"
51260-117 = "[s] \"Suspensa? Não cancelada?\""
51260-118 = "Sim. É admirável que os membros principais tenham se reunido por causa do caso da Yukari-san, mas..."
51260-119 = "Nyaha. Como vários membros saíram em sequência, a preocupação com o futuro da Hyakkaryouran não mudou, desde que o problema não seja resolvido~"
51260-120 = "[s] \"Preocupação com o futuro, quer dizer...?\""
51260-121 = "Por exemplo, não receber verba para as atividades... ou algo assim?"
51260-122 = "[s] \"Isso é realmente preocupante!?\""
51260-123 = "Nyaha~, mas pelo clima atual..."
51260-124 = "Vai levar tempo, mas acho que elas vão se levantar de novo em breve."
51260-125 = "Ah, é mesmo... sobre as pistas de Kuzunoha――"
51260-126 = "[s] \"Isso não tem problema. Podemos ir com calma.\""
51260-127 = "......Entendo."
51260-128 = "De qualquer forma, a Shizuko e o pessoal estão continuando o trabalho de recuperação, e como tanto os envolvidos quanto as associações comerciais estão se esforçando, parece que o festival vai reabrir em breve."
51260-129 = "E mais――"
51260-130 = "Outra coisa―― se me permite falar seriamente."
51260-131 = "A aluna do Clube das Flores, Pássaros, Vento e Lua que lutou contra você e a Hyakkaryouran até o fim..."
51260-132 = "Yabuki Shuro, era esse o nome."
51260-136 = "Nós, do Clube Yin-Yang, tentamos rastrear o paradeiro dela depois que ela se ocultou."
51260-137 = "Infelizmente, os vestígios desapareceram assim que ela deixou o distrito da Hyakkiyako."
51260-138 = "Não sei que método ela usou, mas assim que cruzou a fronteira do distrito, foi como se ela tivesse se transformado em fumaça..."
51260-139 = "É como se estivéssemos sendo enganados por uma raposa."
51260-140 = "[s] \"Entendo... não seria pega tão facilmente, né.\""
51260-143 = "[ns] \"Bom trabalho, Niya. Por ora, vamos organizar o local...\""
51260-144 = "......Foi minha falha."
51260-145 = "[s] \"Hmm?\""
51260-146 = "Eu subestimei a situação."
51260-147 = "Eu não deveria ter ignorado o aviso do Clube das Flores, Pássaros, Vento e Lua. #n Como resultado, aconteceu essa tragédia."
51260-148 = "Por minha falha, deixei uma cicatriz profunda na Hyakkiyako..."
51260-149 = "Como eu poderia encarar o Sensei ou qualquer um da Hyakkiyako agora――"
51260-150 = "[s] \"Isso não é verdade.\""
51260-154 = "......Eh?"
51260-155 = "[s3] \"Você disse, não disse? Que o Clube das Flores, Pássaros, Vento e Lua era apenas uma existência lendária...\"\n[s4] \"E que normalmente nem valeria a preocupação.\""
51260-158 = "[ns5] \"Se você fosse ficar com medo de cada boato ou lenda, não conseguiria fazer nada.\"\n[ns6] \"A Niya julgou com base nas informações que tinha em mãos.\""
51260-159 = "Mas..."
51260-160 = "Mas..."
51260-163 = "[ns7] \"Além disso, você me chamou para a Hyakkiyako.\"\n[ns8] \"Porque você estava preocupada com todos, não estava?\""
51260-166 = "[ns9] \"Graças a isso eu pude estar presente...\"\n[ns10] \"Na verdade, eu me sinto orgulhoso dessa atitude sua, Niya.\""
51260-171 = "Sensei..."
51260-172 = "Mesmo tendo sido arrastada para tal situação..."
51260-173 = "Você me diz que me esforcei... que sente orgulho de mim."
51260-174 = "[s11] \"Porque é papel do Sensei elogiar quando necessário...\"\n[s12] \"E encorajar quando algo dá errado.\""
51260-177 = "......Em vez de remoer o fracasso, devo olhar para frente."
51260-178 = "Nyaha... se você insiste tanto assim."
51260-179 = "Agora que a existência do Clube das Flores, Pássaros, Vento e Lua foi confirmada, vou pesquisar os registros passados do Clube Yin-Yang para poder rastrear o paradeiro deles no futuro."
51260-180 = "Vou levar a sério a sua opinião, Sensei, e apoiarei a Schale com todo o meu esforço. Nyahaha~"
51260-181 = "[s] \"Ah, a propósito, eu ainda não recebi a minha recompensa, né!\""
51260-182 = "......Recompensa?"
51260-183 = "Hum, claro..."
51260-184 = "Já que pedimos a ajuda da Schale desta vez, deve ser necessária uma recompensa adequada, mas..."
51260-188 = "......Hm? Não é sobre isso...?"
51260-189 = "O carinho da Chise-nyan...? #n Ehm, o que você está querendo dizer――"
51260-190 = "[s] \"Mas, como a Chise está ocupada com o trabalho do Clube Yin-Yang...\""
51260-193 = "[ns] \"Vou deixar a Niya cuidar desse carinho por mim!\""
51260-197 = "Ehm, sobre isso... foi uma brincadeira, digamos assim~"
51260-198 = "Ehm, bem..."
51260-203 = "Ei, Sensei!?"
51260-209 = "Que cara assustadora...!?"
51260-214 = "(O ataque dos monstros bizarros que apareceram simultaneamente ao início do festival)"
51260-215 = "(As marcas desse incidente ainda permanecem por toda parte)"
51260-218 = "(Mesmo assim... o festival não vai acabar)"
51260-222 = "Ah, Sensei. Olá!"
51260-223 = "Estava te esperando. Pontual, hein."
51260-225 = "......Olá."
51260-226 = "[s] \"Hoje é a patrulha como Hyakkaryouran, certo?\""
51260-228 = "Ah! A primeira missão memorável da nova Hyakkaryouran! Algo assim."
51260-229 = "Você deveria ficar mais feliz, Sensei, já que pode testemunhar esse momento histórico!"
51260-230 = "Você tem energia para repetir isso centenas de vezes, Renge."
51260-234 = "Hã!?"
51260-235 = "[s] \"Ahaha, acalmem-se vocês duas...\""
51260-236 = "Se tivermos que ir ao festival centenas de vezes... o que eu vou fazer com a minha mesada, isso é um problema."
51260-237 = "[s] \"Você está preocupada com isso!?\""
51260-238 = "Não, isso é uma questão séria!? #n Não se pode subestimar o festival da Hyakkiyako!"
51260-239 = "Especialmente o organizado pelo Comitê de Operações do Festival, é cheio de armadilhas para o seu bolso! "
51260-241 = "Ah... entendi."
51260-242 = "[s] \"Ehm... onde está a Yukari...?\""
51260-244 = "Ah, se for a Yukari..."
51260-249 = "Kadenokouji Yukari! Apresentando-se!"
51260-251 = "Ah, Yukari! Você finalmente chegou!"
51260-252 = "......Bom dia, Yukari."
51260-253 = "Então, você resolveu o problema da família?"
51260-255 = "Sim. Passei em casa e contei aos criados."
51260-256 = "[s] \"Hm? O que você contou...?\""
51260-257 = "Sim, eu declarei!"
51260-258 = "Que eu não vou ser mais Miko!"
51260-260 = "Oh, você tomou uma decisão ousada."
51260-261 = "Sério... tem certeza?"
51260-262 = "......Você não decidiu isso por impulso, né?"
51260-263 = "Ei, vocês duas ainda estão falando disso! #n Nessas horas, respeitem a decisão da Yukari!"
51260-264 = "Mas..."
51260-266 = "Não foi por impulso. Eu pensei muito... mas a resposta foi sempre a mesma."
51260-267 = "Eu amo a Hyakkaryouran. #n Por isso, decidi que quero continuar dando o meu melhor como Hyakkaryouran!"
51260-272 = "......Entendi."
51260-274 = "Os criados entenderam quando eu disse que tinha me decidido."
51260-275 = "[s] \"Entendi, que bom.\""
51260-276 = "Sim! Por isso, hoje é o renascimento da verdadeira Hyakkaryouran! #n É o começo da lenda de Yukari!"
51260-280 = "Já que é assim, vamos logo! Senpai, Sensei!"
51260-281 = "[s] \"Hm? Onde?\""
51260-283 = "Ah, sobre isso."
51260-284 = "A Yukari disse que, antes de começarmos a patrulha, quer que os membros da Hyakkaryouran façam o maior evento deste festival."
51260-285 = "É o lançamento das lanternas da 'Despedida do Antigo e Boas-Vindas ao Novo'."
51260-286 = "[s] \"O festival das lanternas, né.\""
51260-288 = "Sim, então vamos! Todas nós!"
51260-293 = "(O festival que parou por um momento, recomeça seus passos)"
51260-303 = "(Consertar o que foi destruído e seguir em frente)"
51260-304 = "(E havia quatro pessoas avançando lentamente, mas com certeza)"
51260-317 = "Meu braço direito ainda está do mesmo jeito... mas..."
51260-318 = "Ayame... eu, junto com essas garotas――"
51260-325 = "(Lanternas lançadas com seus respectivos sentimentos)"
51260-326 = "(Mantendo seus sentimentos secretos em seus peitos, imaginando o futuro)"
51260-327 = "(As luzes com os desejos de todos flutuam)"
51260-328 = "(Sim, para sempre――)"
51260-343 = "Uwaaah! Kokuriko-samaaaaaa~~~~!"
51260-349 = "Shuro, você voltou."
51260-350 = "Eu... eu me esforcei tanto! #n Me esforcei muuuito, muuuito mesmo...!!"
51260-351 = "No final, não consegui criar a Hyakumonogatari...!!"
51260-352 = "Desculpaaaaaaaaa!!!"
51260-353 = "Kokuriko-sama, mesmo que você estivesse ansiosa por isso..."
51260-354 = "Fufu... não seja boba."
51260-355 = "Quanto a isso, não precisa se preocupar."
51260-356 = "Mesmo que a Hyakumonogatari não tenha sido criada... você conseguiu com sucesso a 'recriação do festival de 20 anos atrás', não conseguiu?"
51260-358 = "Ugh... você tem certeza de que está tudo bem?"
51260-359 = "Sim, é o suficiente."
51260-360 = "Um festival concluído recebe significado e se torna a semente de uma nova história."
51260-361 = "Por isso, para esta vez, já é o suficiente."
51260-363 = "Podemos ir completando pouco a pouco."
51260-367 = "Pouco a pouco... vamos criar juntas."
51260-368 = "A nossa 'História' que queimará o mundo."
51260-373 = "[log=코쿠리코][ff4444]＜A nossa própria 'Hyakumonogatari'――＞[-][/log]"
51260-378 = "Arco Hyakkaryouran; Para ser continuado no capítulo 2."
