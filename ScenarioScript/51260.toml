[translation]
51260-1 = "第26話;願いを込めて"
51260-2 = "（百鬼夜行を混乱に陥れた事態はひと段落し――）"
51260-5 = "こっちに材料を頼む！"
51260-6 = "金槌が必要なのはどこー？"
51260-10 = "あ、こっちお願いしますー！"
51260-13 = "はい、申込書はこちらで受け付けてます！"
51260-14 = "必要な機材などはここで申請書を書いてくだサーイ！"
51260-15 = "まだ時間はあるので、慌てずゆっくりお願いします！ "
51260-16 = "[s] \"みんな、朝早くからお疲れ様。\""
51260-20 = "あ、先生！"
51260-21 = "こんにちは、センセイ！"
51260-23 = "ふふっ！お祭り復活のために、お祭り運営委員会で力を合わせて頑張っています！"
51260-24 = "[s1] \"あんな出来事があったばかりだもんね。\"\n[s2] \"もう一度お祭りを開催するって決まったんだっけ？\""
51260-27 = "はい。誰も予想できなかった事態でしたし…… "
51260-28 = "たくさんの方のご理解を得て、なんとか再開できる運びとなりました。 "
51260-29 = "にしても……あの騒動の真っ最中、お祭り運営委員会は全員気絶してたなんて……"
51260-30 = "悔しいし、許せません！！！"
51260-32 = "そうデース！あんな事がなかったら、私たちも全力で戦いマシタ！"
51260-33 = "はい、あんなのお祭りとは言えませんから！"
51260-34 = "[s] \"でもお祭り運営委員会のみんなが頑張ってたのは知ってるよ。\""
51260-36 = "ありがとうございます……"
51260-37 = "でも、先生と百鬼夜行の皆さんが事態を収拾してくださったことに頭が上がりません。"
51260-38 = "まぁ、だからこそ私たちは全力でお祭りを再開させるんですが！"
51260-39 = "でも……百花繚乱の件、無事解決してよかったです。"
51260-41 = "ハイ！委員長！"
51260-42 = "施設が破壊され、お祭り会場がめちゃくちゃになってしまいましたが……お祭りが終わったわけではありませんので！"
51260-44 = "そうね！壊れたものは直せばいいわけですし。"
51260-45 = "そうですよね、先生！"
51260-46 = "[s] \"うん、シズコの言う通り。\""
51260-47 = "えへへっ。"
51260-51 = "それじゃあ、お祭り運営委員会！出動するわよ！"
51260-54 = "おーっ！！"
51260-56 = "あ！あと先生。"
51260-64 = "今回も本当にお疲れ様でした。"
51260-65 = "[s] \"どういたしまして。\""
51260-89 = "（惨事の後にもせわしなく動く人々）"
51260-90 = "（壊れたものは直せばいい――日常を取り戻すため、みんなと力を合わせて）"
51260-93 = "（そして――）"
51260-99 = "[ns] \"はい、もしもし？\""
51260-106 = "あ、いらっしゃいましたか、先生～"
51260-107 = "突然の呼び出しだったにもかかわらず、ありがとうございます。"
51260-108 = "[s] \"ニヤからの連絡だからね、それはもう全力で急いだよ。\""
51260-109 = "にゃは。そのよく回る口ときたら……もはや気持ちがいいくらいですねぇ。"
51260-110 = "今日こうしてご連絡を差し上げたのは……"
51260-111 = "この間の件について、報告しようと思いましてね。"
51260-112 = "百花繚乱紛争調停委員会についてですが……"
51260-116 = "解散は保留となりました♪"
51260-117 = "[s] \"保留？取り消しじゃなくて？\""
51260-118 = "ええ。ユカリさんの件を発端に主要メンバーが集結できたのは、あっぱれと言いたいところですが～"
51260-119 = "にゃはっ。メンバーの脱退が立て続けにあったのでね。やっぱりその問題を解決しない限り、これからの百花繚乱の先行きが不安なのは変わりません～"
51260-120 = "[s] \"先行き不安、というと……？\""
51260-121 = "たとえば、活動費を貰えない……とか～？"
51260-122 = "[s] \"たしかにそれは不安だね！？\""
51260-123 = "にゃはは～、しかし今の感じでしたら……"
51260-124 = "時間はかかるんでしょうけど、またすぐに立ち上がるんじゃないですかねぇ。"
51260-125 = "ああ、そうだ……クズノハの手がかりは――"
51260-126 = "[s] \"それなら大丈夫。ゆっくりやっていけばいいから。\""
51260-127 = "……そうですか。"
51260-128 = "ともかく、シズコさんたちは復旧作業を続けていますし、当事者はもちろん商会も頑張ってくれているので、お祭りは近いうちに再開されそうです。"
51260-129 = "あとは――"
51260-130 = "もう一つ――真面目な話をさせていただくと。"
51260-131 = "先生と百花繚乱が最後まで戦ったという、花鳥風月部の生徒……"
51260-132 = "[ruby=やぶき]箭吹[/ruby]シュロ、でしたっけ。"
51260-136 = "行方を[ruby=くら]晦[/ruby]ませた彼女を、陰陽部で追跡してみたのですが。"
51260-137 = "残念ながら、百鬼夜行自治区を出たところで痕跡は途絶えてしまいました。"
51260-138 = "どんな方法を使ったのかは分かりませんが、自治区の境目を過ぎると、煙にでもなったかのように……"
51260-139 = "まるで狐につままれたかのような心地ですねぇ。"
51260-140 = "[s] \"そっか……簡単に捕まりはしないよね。\""
51260-143 = "[ns] \"お疲れ様ニヤ。とりあえず、会場の整備を……\""
51260-144 = "……私の不手際です。"
51260-145 = "[s] \"うん？\""
51260-146 = "私が事態を甘く見てしまいました。"
51260-147 = "花鳥風月部からの警告を無視すべきじゃあなかった。#nその結果、ここまでの惨事になりました。"
51260-148 = "私の不手際で、百鬼夜行に大きな爪痕を残すことになり……"
51260-149 = "先生にはもちろん、百鬼夜行の皆さんに顔向けなんてできるはずが――"
51260-150 = "[s] \"そんなことないよ。\""
51260-154 = "……え？"
51260-155 = "[s3] \"言ってたよね。花鳥風月部はただの伝説上の存在で……\"\n[s4] \"本来なら懸念する価値もないって。\""
51260-158 = "[ns5] \"単なる噂や伝説にまでいちいち怯えてたら、何もできないからね。\"\n[ns6] \"ニヤは手元にある情報からそう判断したんだから。\""
51260-159 = "ですが……"
51260-160 = "ですが……"
51260-163 = "[ns7] \"それに、ニヤは私を百鬼夜行に呼んでくれた。\"\n[ns8] \"皆のことが心配だったからでしょ？\""
51260-166 = "[ns9] \"おかげで私も居合わせられたし……\"\n[ns10] \"むしろニヤのそういうところを誇らしいと思ってるよ。\""
51260-171 = "先生……"
51260-172 = "こんな事態に巻き込まれたのに…… "
51260-173 = "私に、頑張った、と……誇らしいと言ってくださるのですね。"
51260-174 = "[s11] \"必要な時には褒めて……\"\n[s12] \"失敗した時には励ますのが先生だからね。\""
51260-177 = "……失敗を振り返るのではなく、前を向くべき、だと。"
51260-178 = "にゃは……そこまで仰るのなら。"
51260-179 = "花鳥風月部の存在が確認できた今、今後彼らの行方を追跡できるよう陰陽部の過去の記録を探ろうと思います。"
51260-180 = "先生のご意見を重く受け止め、全力を尽くしてシャーレをサポートいたしますよ。にゃはは～"
51260-181 = "[s] \"あ、ちなみに報酬はまだ貰ってないからね！\""
51260-182 = "……報酬？"
51260-183 = "ふむ、もちろん……"
51260-184 = "今回シャーレのお力を借りたのですから、それ相応の報酬が必要なのでしょうけど……"
51260-188 = "……ん？そのことじゃない……？"
51260-189 = "チセにゃんのなでなで……？#nえっと、何を仰っているのか――"
51260-190 = "[s] \"でも、チセは陰陽部の仕事で忙しいから……\""
51260-193 = "[ns] \"代わりにニヤをなでなでするね！\""
51260-197 = "ええと、その件ですが……冗談だったといいますかぁ～"
51260-198 = "えっと、あの……"
51260-203 = "ちょっ、先生！？"
51260-209 = "顔が怖っ……！？"
51260-214 = "（お祭りの始まりと同時に現れた奇怪な怪物による襲撃）"
51260-215 = "（その事件の爪跡は確かにあちこちに残っている）"
51260-218 = "（それでも……お祭りが終わることはない）"
51260-222 = "あ、先生。こんにちは！"
51260-223 = "待ってたよ。時間通りだね。"
51260-225 = "……こんにちは。"
51260-226 = "[s] \"今日は百花繚乱としての見回りだっけ？\""
51260-228 = "ああ！新生、百花繚乱の記念すべき初任務！ってところかな。"
51260-229 = "その歴史的瞬間に立ち会えるんだから、先生はもっと喜んでくれ！"
51260-230 = "これから数百回と繰り返すだろうに元気だね、レンゲ。"
51260-234 = "はえっ！？"
51260-235 = "[s] \"あはは、2人とも落ち着いて……。\""
51260-236 = "数百回も祭りに行くことになったら……お小遣いどうしよう、困ったな。"
51260-237 = "[s] \"心配するのそっちなんだ！？\""
51260-238 = "いや、これは一大事だぞ！？#n百鬼夜行のお祭りを見くびってもらっちゃあ困る！ "
51260-239 = "特にお祭り運営委員会主催のヤツは、財布を狙った罠だらけなんだぞ！？"
51260-241 = "あっ……そう。"
51260-242 = "[s] \"えっと……ユカリは……？\""
51260-244 = "あ、ユカリなら……"
51260-249 = "[ruby=かでのこうじ]勘解由小路[/ruby]ユカリ！参上！ですの！"
51260-251 = "あっ、ユカリ！や～っと来たか！"
51260-252 = "……おはよう、ユカリ。"
51260-253 = "それで、家の方は解決した？"
51260-255 = "はい。家に寄って、使用人の方々にお伝えしてきました。"
51260-256 = "[s] \"ん？何を……？\""
51260-257 = "ええ、身共は宣言したのです！"
51260-258 = "巫女はもうやめてやるって！"
51260-260 = "おー、思い切ったじゃないか。"
51260-261 = "本当に……いいの？"
51260-262 = "……勢いで決めちゃったんじゃ、なくて？"
51260-263 = "おい、まだ2人ともそんなこと言ってるのか！#nこういう時はユカリの意思を尊重してあげろよ！"
51260-264 = "でも……"
51260-266 = "勢いではありません。身共は、何度も思い悩みました……でも、答えはいつも同じだったのです。"
51260-267 = "身共は百花繚乱が好きです。#nだから百花繚乱として！これからも頑張っていきたいと思ったのです。"
51260-272 = "……そっか。"
51260-274 = "使用人の皆様も、身共がそう決心したのなら、と理解してくださりました。"
51260-275 = "[s] \"そっか、良かった。\""
51260-276 = "はい！ですから、今日から真の百花繚乱の復活！#nユカリ伝説の始まりですの！"
51260-280 = "そういうことですから、早く参りましょう！先輩、先生！"
51260-281 = "[s] \"ん？どこに？\""
51260-283 = "あ、それなんだけど。"
51260-284 = "見回りをする前に、今回の祭りで一番大きなイベントを百花繚乱のメンバーでやっておきたいってユカリが言ってて。"
51260-285 = "[ruby=そうこげいしん]送故迎新[/ruby]の、燈籠流しだよ。"
51260-286 = "[s] \"燈籠祭のことだね。\""
51260-288 = "ええ、ですから参りましょう！皆様で！"
51260-293 = "（一度は立ち止まったお祭りが、再び歩み出す）"
51260-303 = "（壊れたものは直して、また歩いていけばいい）"
51260-304 = "（そして、ゆっくりとだけど確実に進んでいく4人がいた）"
51260-317 = "右腕は相変わらずだけど……でも……"
51260-318 = "アヤメ……私はこの子たちと共に――"
51260-325 = "（それぞれの思いを込めて送り出す燈籠）"
51260-326 = "（互いの胸に秘めたもの、未来を描きながら）"
51260-327 = "（みんなの願いを込めた灯が流れていく）"
51260-328 = "（そう、いつまでもずっと――）"
51260-343 = "うわぁぁあああん！コクリコさまぁああああ～～～～！"
51260-349 = "シュロ、帰ってきたんやね。"
51260-350 = "手前……頑張ったのに！#nすっごくすっごく、頑張ったのにぃ……！"
51260-351 = "結局、百物語、作れなくってぇ……！"
51260-352 = "ごめんなざいぃいいい！！！"
51260-353 = "コクリコ様、楽しみに、じでくだざった、のにっ……"
51260-354 = "ふふっ……愛いやつよのぉ。"
51260-355 = "そのことなら、気にせんでええわよぉ。"
51260-356 = "百物語は作れずとも……無事、「20年前のお祭りの再現」に成功したじゃあないかえ。"
51260-358 = "ぐずっ……本当に、それでいいんでずかぁ？"
51260-359 = "ああ、十分さね。"
51260-360 = "完成されたお祭りは、そのものに意味が与えられ、別の物語の種となる。"
51260-361 = "なればこそ、[ruby=こたび]此度[/ruby]はそれで十分十分。"
51260-363 = "改めて、完成させていけば良い。"
51260-367 = "少しずつ、少しずつ……共に作っていこうさね。"
51260-368 = "世界を燃やす、我らの「物語」を。"
51260-373 = "[log=코쿠리코][ff4444]＜我らだけの「百物語」を――＞[-][/log]"
51260-378 = "百花繚乱編;To be Continued in Chapter 2"
