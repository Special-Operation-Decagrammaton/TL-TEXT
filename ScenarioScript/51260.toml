[translation]
51260-1 = "Episódio 26; Com um desejo"
51260-2 = "（A situação que mergulhou Hyakkiyako no caos chegou a um momento de calmaria――）"
51260-5 = "Tragam os materiais para cá!"
51260-6 = "Onde precisam de um martelo?"
51260-10 = "Ah, por favor, tragam aqui!"
51260-13 = "Sim, estamos aceitando os formulários de inscrição aqui!"
51260-14 = "Por favor, escrevam os pedidos dos equipamentos necessários aqui!"
51260-15 = "Ainda temos tempo, então não se apressem, podem fazer com calma!"
51260-16 = "[s] \"Pessoal, obrigado pelo trabalho duro desde cedo.\""
51260-20 = "Ah, Sensei!"
51260-21 = "Olá, Sensei!"
51260-23 = "Hehe! Estamos unindo forças no Comitê Organizador do Festival para que ele possa ser realizado novamente!"
51260-24 = "[s1] \"Afinal, acabamos de passar por tudo aquilo.\"\n[s2] \"Já decidiram que o festival vai acontecer de novo?\""
51260-27 = "Sim. Foi uma situação que ninguém poderia prever, mas..."
51260-28 = "Com a compreensão de muitas pessoas, conseguimos seguir em frente com a reabertura."
51260-29 = "Ainda assim... pensar que, bem no meio daquela confusão, todo o Comitê Organizador do Festival ficou inconsciente..."
51260-30 = "É frustrante, eu não consigo perdoar!!!"
51260-32 = "É isso mesmo! Se não fosse por aquilo, nós teríamos lutado com todas as nossas forças!"
51260-33 = "Sim, porque aquilo não pode ser chamado de festival!"
51260-34 = "[s] \"Mas eu sei que todos do Comitê Organizador do Festival se esforçaram muito.\""
51260-36 = "Muito obrigada..."
51260-37 = "Mas não temos como agradecer o suficiente ao Sensei e a todos de Hyakkiyako por terem resolvido a situação."
51260-38 = "Bem, é exatamente por isso que vamos dar tudo de nós para retomar o festival!"
51260-39 = "Mas... fico feliz que o assunto da Hyakka Ryoran tenha sido resolvido com sucesso."
51260-41 = "Sim! Presidente!"
51260-42 = "As instalações foram destruídas e o local do festival ficou uma bagunça, mas... o festival não acabou!"
51260-44 = "É verdade! Se algo quebrou, é só consertar."
51260-45 = "Não é, Sensei?"
51260-46 = "[s] \"Sim, como a Shizuko disse.\""
51260-47 = "Ehehe."
51260-51 = "Muito bem, Comitê Organizador do Festival! Vamos à ação!"
51260-54 = "Certo!!"
51260-56 = "Ah! E Sensei."
51260-64 = "Muito obrigada pelo seu trabalho duro desta vez também."
51260-65 = "[s] \"Não há de quê.\""
51260-89 = "（Pessoas se movendo apressadamente mesmo após a tragédia）"
51260-90 = "（Se algo quebrou, é só consertar―― para recuperar o cotidiano, unindo forças com todos）"
51260-93 = "（E então――）"
51260-99 = "[ns] \"Sim, alô?\""
51260-106 = "Ah, você chegou, Sensei~"
51260-107 = "Obrigada por vir, mesmo sendo um chamado repentino."
51260-108 = "[s] \"É um contato da Niya, então eu vim o mais rápido que pude.\""
51260-109 = "Nyaha. Essa sua lábia... é quase prazeroso de ouvir."
51260-110 = "Eu entrei em contato hoje porque..."
51260-111 = "Pensei em lhe dar um relatório sobre o assunto de outro dia."
51260-112 = "Sobre o Comitê de Mediação de Conflitos da Hyakka Ryoran..."
51260-116 = "A dissolução foi suspensa♪"
51260-117 = "[s] \"Suspensa? Não foi cancelada?\""
51260-118 = "Sim. É admirável que os membros principais tenham conseguido se reunir por causa do caso da Yukari, mas~"
51260-119 = "Nyaha. Como houve várias saídas de membros em sequência, o futuro da Hyakka Ryoran continua incerto enquanto esse problema não for resolvido~"
51260-120 = "[s] \"Incerteza sobre o futuro, você diz...?\""
51260-121 = "Por exemplo, não receber verba para as atividades... ou algo assim?"
51260-122 = "[s] \"Com certeza isso seria preocupante, não é!?\""
51260-123 = "Nya-ha-ha~, mas pelo que parece agora..."
51260-124 = "Deve levar um tempo, mas acho que eles vão se reerguer logo."
51260-125 = "Ah, é verdade... as pistas sobre Kuzunoha estão..."
51260-126 = "[s] \"Se for isso, não tem problema. Podemos ir fazendo as coisas com calma.\""
51260-127 = "……Entendo."
51260-128 = "De qualquer forma, Shizuko e os outros continuam com o trabalho de restauração, e tanto os envolvidos quanto a associação comercial estão se esforçando, então o festival deve ser retomado em breve."
51260-129 = "Quanto ao resto..."
51260-130 = "Mais uma coisa... se me permite falar seriamente."
51260-131 = "A aluna do Clube Kachou Fuugetsu que lutou contra o Sensei e o Hyakkiyouran até o fim..."
51260-132 = "Yabuki Shuro, não é?"
51260-136 = "Nós, do Yin-Yang, tentamos rastreá-la depois que ela desapareceu."
51260-137 = "Infelizmente, os rastros desapareceram assim que ela saiu do Distrito Autônomo de Hyakkiyako."
51260-138 = "Não sei que método ela usou, mas depois de cruzar a fronteira do distrito, foi como se ela tivesse virado fumaça..."
51260-139 = "É como se tivéssemos sido enganados por uma raposa."
51260-140 = "[s] \"Entendi... ela não seria capturada tão facilmente, né.\""
51260-143 = "[ns] \"Bom trabalho, Niya. Por enquanto, vamos organizar o local...\""
51260-144 = "……Foi um erro meu."
51260-145 = "[s] \"Hm?\""
51260-146 = "Eu subestimei a situação."
51260-147 = "Eu não deveria ter ignorado o aviso do Clube Kachou Fuugetsu. #nO resultado foi esse desastre todo."
51260-148 = "Por minha falha, deixei uma marca profunda em Hyakkiyako..."
51260-149 = "Como eu poderia encarar o Sensei, ou qualquer pessoa de Hyakkiyako depois disso..."
51260-150 = "[s] \"Não diga isso.\""
51260-154 = "……Eh?"
51260-155 = "[s3] \"Você disse, não disse? Que o Clube Kachou Fuugetsu era apenas uma lenda...\"\n[s4] \"E que, originalmente, não valia a pena se preocupar com eles.\""
51260-158 = "[ns5] \"Se ficássemos com medo de cada boato ou lenda, não conseguiríamos fazer nada.\"\n[ns6] \"Você tomou essa decisão baseada nas informações que tinha em mãos.\""
51260-159 = "Mas..."
51260-160 = "Mas..."
51260-163 = "[ns7] \"Além disso, você me chamou para Hyakkiyako.\"\n[ns8] \"Foi porque você estava preocupada com todos, não foi?\""
51260-166 = "[ns9] \"Graças a isso, eu pude estar presente também...\"\n[ns10] \"Na verdade, eu me orgulho de você por ser assim.\""
51260-171 = "Sensei..."
51260-172 = "Mesmo tendo sido envolvida em uma situação dessas..."
51260-173 = "Você me diz que eu me esforcei... que se orgulha de mim."
51260-174 = "[s11] \"Elogiar quando necessário...\"\n[s12] \"E encorajar quando se falha, é isso que um Sensei faz.\""
51260-177 = "……Em vez de olhar para o erro, devo olhar para frente, é isso."
51260-178 = "Nya-ha... se você diz isso..."
51260-179 = "Agora que a existência do Clube Kachou Fuugetsu foi confirmada, pretendo pesquisar os registros antigos do Yin-Yang para que possamos rastrear o paradeiro deles no futuro."
51260-180 = "Vou levar a sério a opinião do Sensei e farei o meu melhor para apoiar o Schale. Nya-ha-ha~"
51260-181 = "[s] \"Ah, aliás, eu ainda não recebi minha recompensa!\""
51260-182 = "……Recompensa?"
51260-183 = "Hum, claro..."
51260-184 = "Já que contamos com a ajuda do Schale desta vez, uma recompensa apropriada é necessária, mas..."
51260-188 = "……Hm? Não é sobre isso...?"
51260-189 = "O carinho da Chise-nyan...? #nErr, o que você está dizendo..."
51260-190 = "[s] \"Mas a Chise está ocupada com o trabalho do Yin-Yang, então...\""
51260-193 = "[ns] \"Em vez disso, eu vou te dar carinho, Niya!\""
51260-197 = "Err, sobre isso... eu estava apenas brincando, sabe~"
51260-198 = "E-ei, tipo..."
51260-203 = "Ei, Sensei!?"
51260-209 = "Que cara assustadora...!?"
51260-214 = "（O ataque do monstro bizarro que surgiu logo no início do festival）"
51260-215 = "（As cicatrizes daquele incidente ainda estão espalhadas por toda parte）"
51260-218 = "（Mesmo assim... o festival não vai acabar）"
51260-222 = "Ah, Sensei. Olá!"
51260-223 = "Estávamos te esperando. Pontual como sempre."
51260-225 = "……Olá."
51260-226 = "[s] \"Hoje é a patrulha como Hyakkaryouran, certo?\""
51260-228 = "Isso! A primeira missão memorável da nova Hyakkaryouran! Acho que é por aí."
51260-229 = "Já que você pode testemunhar esse momento histórico, Sensei, deveria ficar mais feliz!"
51260-230 = "Você está bem animada, Renge, considerando que vamos repetir isso centenas de vezes."
51260-234 = "Hã!?"
51260-235 = "[s] \"Ahaha, calma vocês duas...\""
51260-236 = "Se eu tiver que ir ao festival centenas de vezes... o que eu vou fazer com a minha mesada? Que problema."
51260-237 = "[s] \"É com isso que você está preocupada!?\""
51260-238 = "Não, isso é um assunto sério!?#nVocê não pode subestimar os festivais de Hyakkiyako!"
51260-239 = "Especialmente os organizados pelo comitê do festival, são cheios de armadilhas para esvaziar a carteira!"
51260-241 = "Ah... entendi."
51260-242 = "[s] \"E então... e a Yukari...?\""
51260-244 = "Ah, sobre a Yukari..."
51260-249 = "Kadenokouji Yukari! Chegou! É isso!"
51260-251 = "Ah, Yukari! Finalmente chegou!"
51260-252 = "……Bom dia, Yukari."
51260-253 = "E então, resolveu o assunto em casa?"
51260-255 = "Sim. Passei em casa e avisei os criados."
51260-256 = "[s] \"Hm? Avisou o quê...?\""
51260-257 = "Sim, eu fiz uma declaração!"
51260-258 = "Que não serei mais uma sacerdotisa!"
51260-260 = "Oh, que decisão ousada."
51260-261 = "Você tem... certeza?"
51260-262 = "……Não foi só por impulso, foi?"
51260-263 = "Ei, vocês duas ainda estão falando disso!?#nNessas horas, respeitem a vontade da Yukari!"
51260-264 = "Mas..."
51260-266 = "Não foi por impulso. Eu refleti muito sobre isso... mas a resposta foi sempre a mesma."
51260-267 = "Eu amo a Hyakkaryouran.#nPor isso, como parte da Hyakkaryouran! Eu decidi que quero continuar me esforçando."
51260-272 = "……Entendi."
51260-274 = "Os criados também entenderam, contanto que essa seja a minha decisão."
51260-275 = "[s] \"Entendi, que bom.\""
51260-276 = "Sim! Por isso, a partir de hoje, a verdadeira ressurreição da Hyakkaryouran!#nO início da lenda de Yukari!"
51260-280 = "Sendo assim, vamos logo! Senpai, Sensei!"
51260-281 = "[s] \"Hm? Para onde?\""
51260-283 = "Ah, sobre isso."
51260-284 = "A Yukari disse que, antes de patrulhar, queria que os membros da Hyakkaryouran participassem do maior evento deste festival."
51260-285 = "O festival das lanternas flutuantes, para celebrar a despedida do velho e a chegada do novo."
51260-286 = "[s] \"Você quer dizer o festival das lanternas.\""
51260-288 = "Sim, então vamos! Todos nós!"
51260-293 = "（O festival que parou por um momento, começa a caminhar novamente）"
51260-303 = "（O que foi quebrado pode ser consertado, e podemos continuar caminhando）"
51260-304 = "（E então, havia quatro pessoas avançando, lentamente, mas com certeza）"
51260-317 = "Meu braço direito continua o mesmo, mas... mas..."
51260-318 = "Ayame... Eu, junto com essas crianças..."
51260-325 = "（Lanternas enviadas com os sentimentos de cada uma）"
51260-326 = "（O que cada uma guarda no peito, enquanto desenham o futuro）"
51260-327 = "（A luz que carrega os desejos de todas vai flutuando）"
51260-328 = "（Sim, para sempre, por muito tempo...）"
51260-343 = "Uaaaaaah! Kokuriko-samaaaaaa!"
51260-349 = "Shuro, você voltou, não foi?"
51260-350 = "Eu... eu me esforcei tanto!#nEu me esforcei, me esforcei tanto mesmo...!"
51260-351 = "No fim, eu não consegui criar as Cem Histórias...!"
51260-352 = "Desculpe-meeeee!!!"
51260-353 = "Kokuriko-sama, mesmo que você estivesse esperando por isso..."
51260-354 = "Fufu... Que criatura adorável."
51260-355 = "Quanto a isso, não precisa se preocupar."
51260-356 = "Mesmo sem ter criado as Cem Histórias... você conseguiu com sucesso a 'reprodução do festival de 20 anos atrás', não foi?"
51260-358 = "Snif... Sério, isso é o suficiente?"
51260-359 = "Sim, é mais do que suficiente."
51260-360 = "Um festival concluído recebe um significado próprio e se torna a semente de outra história."
51260-361 = "Sendo assim, desta vez, isso é mais do que suficiente."
51260-363 = "Podemos ir completando aos poucos."
51260-367 = "Pouco a pouco, pouco a pouco... vamos criar juntas."
51260-368 = "A nossa 'história' que queimará o mundo."
51260-373 = "[log=코쿠리코][ff4444]＜A nossa própria \"Cem Histórias\"――＞[-][/log]"

51260-378 = "Capítulo Hyakka Ryoran; To be Continued in Chapter 2"
