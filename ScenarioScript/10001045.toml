[translation]
10001045-1 = "Episódio 4: A Primeira Vitória"
10001045-2 = "Academia Federal Red Winter - Antigo Prédio Escolar"
10001045-3 = "Cerca de uma hora se passou desde que a \"competição de degustação\" começou..."
10001045-4 = "Ugh... ughhh..."
10001045-5 = "T-tão difícil... nunca ouvi falar de um compote como este..."
10001045-6 = "[s] \"Ué. Então tinha álcool misturado mesmo?\""
10001045-7 = "Não, o problema não é esse..."
10001045-8 = "Doce! É doce demais!"
10001045-9 = "O que é isso, Shigure?! Que tipo de compote é esse que faz meus dentes parecerem que vão derreter!?"
10001045-10 = "Compote é originalmente uma bebida feita conservando frutas em açúcar.#nAlém disso, para aguentar o frio extremo deste antigo prédio escolar, uma grande quantidade de açúcar é essencial!"
10001045-11 = "Mas isso é exagero! A cada gole, sinto o açúcar crocante na boca, parece que até meu cérebro vai derreter!"
10001045-12 = "Ugh, se eu tomar mais um gole, eu vou..."
10001045-13 = "Hehe... parece que você chegou ao seu limite."
10001045-14 = "Mas para mim, Cherino, que já comi todos os tipos de doces na secretaria, essa quantidade de açúcar não é nada!"
10001045-15 = "Se quiser desistir, a hora é agora!"
10001045-16 = "Ugh... eu não queria admitir a derrota, mas..."
10001045-18 = "N-não aguento mais, eu perdi..."
10001045-20 = "Viva! Eu venci!"
10001045-21 = "Uma vitória esplêndida, Presidente Cherino! Como esperado da nossa presidente!"
10001045-22 = "Vamos registrar esta vitória de hoje e deixá-la gravada para sempre na história da Academia Federal Red Winter!"
10001045-23 = "É uma ótima ideia, Chefe de Gabinete Tomoe!#nAssim, os alunos das gerações futuras também poderão exaltar a minha grandeza!"
10001045-24 = "Mas o que eu deveria escrever?#n'A grandiosa Presidente Cherino, da Academia Red Winter, enfrentou pessoalmente os alunos da classe especial e saiu vitoriosa...'"
10001045-25 = "Ué? Pensando bem, por que mesmo estávamos fazendo essa disputa?"
10001045-26 = "Bem, tanto faz. O importante é o fato de que eu venci, hahaha!"
10001045-29 = "Ugh, que frustrante... perder para uma tampinha como essa..."
10001045-30 = "Você ainda me chama de tampinha mesmo depois de perder a disputa?!"
10001045-31 = "Mas deixando isso de lado... embora não tanto quanto eu, você também se esforçou bastante."
10001045-32 = "Se eu não estivesse acostumada a comer pudim regularmente, teria sido difícil até para mim beber tanto daquele compote."
10001045-33 = "Além disso, devo dizer que respeito o fato de você ter aguentado tanto neste ambiente extremo."
10001045-34 = "Presidente Cherino..."
10001045-35 = "Sendo assim, assim que eu retornar em segurança para a secretaria, cancelarei a suspensão de vocês imediatamente!"
10001045-36 = "...Não, na verdade, você deveria cancelar logo de qualquer jeito, mesmo sem essa disputa!"
10001045-37 = "Ah, ué? Agora não era o momento de me exaltar?"
10001045-38 = "Haa... não tem jeito, né."
10001045-39 = "Precisamos da aprovação da Presidente Cherino para sair deste prédio antigo... e além disso, o Sensei também está aqui..."
10001045-40 = "Por enquanto, vamos cooperar com a Presidente Cherino."
10001045-42 = "Fufu, parece que a minha grandiosa liderança finalmente brilhou."
10001045-44 = "Não importa se são alunos suspensos da classe especial, diante do meu carisma, eles não conseguem evitar de me obedecer. Hahaha!"
10001045-46 = "...Eu sabia, que raiva! Essa tampinha é muito irritante!"
10001045-48 = "Eu já disse que não sou tampinha!"
