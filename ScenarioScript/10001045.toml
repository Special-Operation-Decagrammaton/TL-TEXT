[translation]
10001045-1 = "第4話;初めての勝利"
10001045-2 = "レッドウィンター連邦学園・旧校舎"
10001045-3 = "「飲み比べ勝負」を始めて、約1時間が過ぎた頃……。"
10001045-4 = "ううっ……ううう……。"
10001045-5 = "く、苦しい……こんなカンポットがあるなんて、聞いたことがない……。"
10001045-6 = "[s] \"え。やっぱりお酒が混ざってたの？\""
10001045-7 = "いや、そういう問題ではない……。"
10001045-8 = "甘っ！甘過ぎます！"
10001045-9 = "いったい何ですか、シグレちゃん！この歯が溶けそうなほど甘いカンポットは！？"
10001045-10 = "カンポットは元々、果物を砂糖に漬けて作る飲み物。#nそれに、この旧校舎の極寒に耐えるためには、大量の糖分は必須！"
10001045-11 = "でもこれはやりすぎですよ！飲むたびに口の中で砂糖がじゃりじゃりして、脳まで溶けそうです！"
10001045-12 = "ううっ、あと一口でも飲んだら、もう……。"
10001045-13 = "ふ、ふふ……お前はもう限界のようだな。"
10001045-14 = "だが、事務局であらゆるスイーツを食べてきたこのチェリノ様にとって、これぐらいの糖分は何てことない！"
10001045-15 = "諦めるなら今がチャンスだぞ！"
10001045-16 = "ううっ……敗北を認めたくはないですが……。"
10001045-18 = "も、もうこれ以上は無理です、私の負け……。"
10001045-20 = "ばんざーい！勝った！"
10001045-21 = "素晴らしい勝利です、チェリノ会長！さすが会長です！"
10001045-22 = "今日のこの勝負はきちんと記録して、レッドウィンター連邦学園の歴史に永遠に残しましょう！"
10001045-23 = "良い案だな、トモエ秘書室長！#nそうすれば遥か後世の生徒たちも、おいらの偉大さを讃えることができる！"
10001045-24 = "しかしなんと書けばいいのだ？#n「レッドウィンター連邦学園の偉大なるチェリノ会長、自ら特別クラスの生徒たちと対決をして勝利を……」"
10001045-25 = "あれ？そういえば何のためにこんな試合をしていたんだっけ？"
10001045-26 = "まあ、何でもいいか。重要なのは、おいらが勝利したという事実だからな、ははは！"
10001045-29 = "ううっ、悔しい……こんなチビに負けるなんて……。"
10001045-30 = "お前、勝負に負けてもまだおいらをチビ呼ばわりするのか！"
10001045-31 = "まあそれはそれとして……おいらほどではないが、お前もよく頑張った。"
10001045-32 = "普段からまめにプリンを食べていなかったら、いくらおいらでもあのカンポットをあれほど飲むのは難しかっただろう。"
10001045-33 = "それに、この極限の環境の中でここまで耐えてきたお前には、敬意を表したいぐらいだ。"
10001045-34 = "チェリノ会長……。"
10001045-35 = "ということで、おいらが事務局に無事に戻れた暁には、すぐにでもお前たちの停学は取り消してやるぞ！"
10001045-36 = "……いや、そもそもこんな勝負が無かったとしても、早く取り消してくださいよ！"
10001045-37 = "あ、あれ？今のはおいらを讃える流れじゃなかったのか？"
10001045-38 = "はあ……仕方ないですね。"
10001045-39 = "この旧校舎から出るにはチェリノ会長の承認が必要だし……それに、先生もいるし……。"
10001045-40 = "しばらくは、チェリノ会長に協力することにします。"
10001045-42 = "ふふ、やっぱりおいらの偉大なる指導力が光を放ったということか。"
10001045-44 = "いくら特別クラスの停学生だとしても、我がカリスマ性を前にして、従わずにはいられないものなのだな。はははっ！"
10001045-46 = "……やっぱりムカつく！このチビ、ムカつくんですけど！"
10001045-48 = "だからおいらはチビじゃない！"
