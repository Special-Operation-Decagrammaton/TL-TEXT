[translation]
10022005-1 = "復旧作業：D.U.シラトリ区"
10022005-3 = "せ、先生。お仕事、お疲れ様です。"
10022005-4 = "こうして今回の事件は幕を下ろしましたが、キヴォトスの自治区は――特にD.U.のシラトリ区は、深刻な被害を受けました。"
10022005-5 = "現在、シラトリ区の復旧が最優先事項となっています……。"
10022005-6 = "幸い、財務室長のアオイさんがシラトリ区の「緊急復興支援金」を承認してくれまして……統括室での執行が可能となったのですが、"
10022005-7 = "まだ、リン先輩の行政権限は停止状態で、一人では難しいという事もあり……"
10022005-8 = "今回も、先生のお力を借りられたら、と思いまして……。"
10022005-12 = "もちろん、私とリン先輩、モモカちゃんもこの復旧作業に参加します……！"
10022005-13 = "それでは……シラトリ区の復旧、よろしくお願いしますね、先生！"
