[translation]
10022005-1 = "Trabalho de restauração: Distrito Shiratori de D.U."
10022005-3 = "Se-Sensei. Bom trabalho com o serviço."
10022005-4 = "O incidente chegou ao fim, mas os distritos autônomos de Kivotos — especialmente o Distrito Shiratori de D.U. — sofreram danos graves."
10022005-5 = "No momento, a restauração do Distrito Shiratori é a nossa prioridade máxima..."
10022005-6 = "Felizmente, a chefe do departamento financeiro, Aoi, aprovou o 'Fundo de Apoio à Reconstrução Emergencial' para o Distrito Shiratori... e a execução pelo Gabinete de Controle tornou-se possível, mas,"
10022005-7 = "Como a autoridade administrativa da Rin-senpai ainda está suspensa, é difícil fazer tudo sozinha..."
10022005-8 = "Por isso, pensei em pedir a sua ajuda mais uma vez, Sensei..."
10022005-12 = "Claro, eu, a Rin-senpai e a Momoka também participaremos deste trabalho de restauração...!"
10022005-13 = "Então... conto com você para a restauração do Distrito Shiratori, Sensei!"
