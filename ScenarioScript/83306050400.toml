[translation]
83306050400-11 = "Parece que este é o último exemplar."
83306050400-14 = "Decidi que, a partir de hoje, vou me afastar do piano."
83306050400-15 = "O que eu podia fazer e o que eu queria fazer... é só que essas coisas não se alinharam."
83306050400-20 = "Eu não consegui me tornar nada, mas..."
83306050400-21 = "O sentimento de amor que tive pelo piano não é uma mentira."
83306050400-26 = "Rezo para que, algum dia, alguém encontre este diário e as partituras que escrevi."
83306050400-33 = "...Essa pessoa não conseguiu realizar o seu sonho, não é?"
83306050400-34 = "Mas esse tempo não foi desperdiçado..."
83306050400-35 = "Porque, desta forma, eu encontrei você."
83306050400-42 = "...Hoje, vou praticar com esta partitura."
