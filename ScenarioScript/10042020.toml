[translation]
10042020-1 = "第2話;フラグ"
10042020-4 = "おはようございます、先生。"
10042020-5 = "こんな形になってしまいましたが、お会いできて嬉しいです。"
10042020-6 = "一体何があったの？わざわざ私たちを呼び出すくらいなんだよね？"
10042020-7 = "ちゃんと仕事はするけど、くだらない内容だったら……分かるよね？"
10042020-8 = "[s1] \"非常に説明しづらいんだけど……。\"\n[s2] \"ちょっと奇妙な状況というか……。\""
10042020-17 = "チナツさん、イオリさん……。"
10042020-19 = "給食部？#n外にいるの珍しいね。"
10042020-20 = "てっきり、温泉開発部か美食研究会かと思っていたのですが……給食部とは。"
10042020-21 = "差し支えなければ、事情をお聞かせ願えるでしょうか？"
10042020-22 = "それが……。"
10042020-24 = "……はぁ。"
10042020-25 = "つまり……パンケーキが自我を持って飛び出していった、と？"
10042020-26 = "[s] \"信じ難いかもしれないけど……。\""
10042020-27 = "……いや、待てよ。"
10042020-28 = "たしか、前にも似たような話があったような……。"
10042020-29 = "[ruby=パンデモニウム・ソサエティー]万魔殿でパ[/ruby]ーティーを開いた時のことですね……。"
10042020-30 = "それ以前にも数件ほど類似した事件はありましたが……。"
10042020-31 = "じゃあ……これって、新手のテロってこと？"
10042020-32 = "ゲヘナには色んなテロリストがいるけど、まさか給食部もそうだったなんて……。"
10042020-33 = "て、テロリスト！？#nハルナと同じにしないでくれる！？！？"
10042020-34 = "いえ、テロではなく事故の可能性もあります。"
10042020-35 = "給食部は比較的大人しかったからこれまでそういった監視対象じゃなかったけど……。"
10042020-36 = "そういえば、衛生評価の時になんか変なオレンジジュースを飲まされた気もするし……？"
10042020-37 = "！？"
10042020-38 = "そ、それは、その……！"
10042020-39 = "イオリ落ち着いて。給食部の方々が悪意をもってテロ行為をしているのなら、真っ先に食堂利用者が倒れているはずです。#nそうじゃないのですから、信じましょう。"
10042020-40 = "一理あるね。食堂には私も普段お世話になってるし。#n故意にテロを起こすならもうやってるか。"
10042020-41 = "というか……この程度なら、私一人で対応できる。"
10042020-42 = "みんなはここで待機してて……先生も分かった？"
10042020-43 = "……何かあったら困るからな。"
10042020-44 = "[s] \"イオリが私を心配してくれるなんて！\""
10042020-45 = "は、はぁ！？#nぜ、絶対違うぞ！？"
10042020-46 = "とにかく、さっさと終わらせてやるからな！"
10042020-50 = "[log]イオリが叫んだ次の瞬間――[/log]"
10042020-53 = "[log]ある予感が先生の脳裏に閃いた！[/log]"
10042020-57 = "[ns5] \"い、イオリ！？\"\n[ns6] \"待って、ちょっと話が――\""
10042020-60 = "じゃあ、行ってくる！"
10042020-65 = "……行ってしまいましたか。"
10042020-66 = "せめて、先生の話を聞いてからでも……。"
10042020-67 = "ところで、給食部の事情を詳しく伺いたいのですが……大丈夫でしょうか？"
10042020-68 = "ひっ、ごめんなさい……。"
10042020-69 = "怒っているわけではありません。落ち着いてください。"
10042020-70 = "……ありがとうございます、チナツさん。"
10042020-71 = "……それに、このままでは事情聴取がしづらいですから。"
10042020-72 = "そっちですか！？"
10042020-73 = "……ふふっ。"
10042020-74 = "冗談です。"
10042020-76 = "――以上が、これまでの流れです。"
10042020-77 = "……給食部の休日、フウカさんの外出、ジュリさんのアルバイト。"
10042020-78 = "多忙を極める中、突如発生したキッチンの仕事。#nそして、普段よりうまくいった料理……。"
10042020-79 = "は、はい！その通りです！"
10042020-80 = "なるほど……。"
10042020-81 = "全て理解したとは言い切れませんが――"
10042020-82 = "え、えっと……。"
10042020-83 = "ジュリさんはアルバイトをしていただけですし……故意ではなかった。"
10042020-84 = "そうですね……やはり、これは事故でしょう。"
10042020-85 = "そ、そう言っていただけるのは、ありがたいのですが……。"
10042020-86 = "カフェの倉庫で爆発が起きたとも伺いましたが……。"
10042020-87 = "まあ、そちらはいつもの事ですね。"
10042020-88 = "[ns7] （いつもの事なんだ……）\n[ns8] （そういえば、ここはゲヘナだったね……）"
10042020-91 = "そろそろイオリも帰ってくるはずなんですが……遅いですね。"
10042020-92 = "連絡を入れてみます。#n少々お待ちくださいね。"
10042020-97 = "……？"
10042020-98 = "繋がりませんね。#nもう一度……。"
10042020-103 = "ダメですね。#n普段なら必ず電話に出るのに……。"
10042020-104 = "まさか……？"
10042020-105 = "もう一度……。"
10042020-110 = "やはり出ません。#nこれは……。"
10042020-111 = "……先生、ジュリさん。"
10042020-112 = "あのモンスターについて、お伺いしたいのですが……。"
10042020-113 = "最初に襲撃された方は、無事だったんですか？"
10042020-114 = "えっと……ソースまみれの状態で気絶していましたが、外傷はありませんでした。"
10042020-115 = "なるほど……。"
10042020-116 = "[ns] \"チナツ？\""
10042020-117 = "どうやら、想定以上の事態に発展しているかもしれません。"
10042020-118 = "でも……おかしいですね。"
10042020-119 = "ここまでイオリから連絡一つないなんて……。"
10042020-120 = "普段は、気づいたらすぐ折り返してくるのに。"
10042020-121 = "[s] \"私からも電話してみるね。\""
10042020-122 = "はい、お願いします。"
10042020-128 = "やはり、繋がりませんか……？"
10042020-129 = "そ、そんな……！"
10042020-130 = "[s9] \"まさかこんな事態になるなんて……。\"\n[s10] \"あの時、薄々感じてたけど……。\""
10042020-133 = "……どういうことですか、先生？"
10042020-134 = "あ、あの！#nまずはイオリさんを探しませんか？"
10042020-135 = "そうですね……それに、何だか不吉な予感が……。"
10042020-136 = "先生……差し支えなければ、伺っても良いですか？"
10042020-137 = "[s11] \"たぶん、イオリは今頃……。\"\n[s12] \"ネバネバまみれになってると思う……。\""
10042020-140 = "えぇっ！？"
10042020-141 = "ネバネバ、まみれ……？"
10042020-144 = "だいぶ離れたところまで来ましたが……。"
10042020-145 = "道中、至る所に緑のネバネバが落ちてたわね……。"
10042020-146 = "イオリさんいました！！あそこです！！"
10042020-149 = "[ns] \"うわっ！イオリ、大丈夫！？\""
10042020-150 = "状態を確認します……。"
10042020-155 = "……気を失っているだけですね。#n幸い、命に別状はないかと……。"
10042020-156 = "ですが、イオリにまとわりついてる液体はしばらく取れないでしょう……臭いもかなりひどいです。"
10042020-157 = "……それって大丈夫なの？"
10042020-158 = "まあ、よくあることです……。"
10042020-159 = "でも、一応専門家を呼んでおきましょうか。"
10042020-160 = "[s] \"専門家……？\""
10042020-161 = "チナツさん以外に、医療の専門家がいらっしゃるのですか……？"
10042020-162 = "はい、信頼できる方です。"
10042020-163 = "……少し、変わっているところもありますが。"
10042020-165 = "……なるほど、それで私を呼んだのですね。#n理解しました。"
10042020-166 = "チナツの言う通り、命に別状はありません。"
10042020-167 = "……気絶理由は「ソース」が口に合わなかっただけかと。"
10042020-168 = "そ、ソースが原因なんですか！？"
10042020-169 = "…………おそらく。"
10042020-170 = "大変、まずかったのかと。"
10042020-171 = "言い方変えただけじゃない！"
10042020-175 = "[ns13] \"ま、まあ、大丈夫なら良かったよ！\"\n[ns14] \"非番なのに、わざわざ来てくれてありがとう。\""
10042020-178 = "[ns] \"……それと、その格好も似合ってるね。\""
10042020-179 = "お気になさらず。#n救急医学部は、いつでも出動できるよう待機しておりますので。"
10042020-180 = "そして私服への感想、ありがとうございます先生。素直に嬉しいです。"
10042020-181 = "この死体……いえ、彼女は他の部員に搬送を手配しました。#nまもなく到着するでしょう。"
