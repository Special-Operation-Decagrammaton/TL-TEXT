[translation]
10042020-1 = "Episódio 2; Flag"
10042020-4 = "Bom dia, Sensei."
10042020-5 = "Acabou ficando assim, mas estou feliz em vê-lo."
10042020-6 = "O que aconteceu, afinal? É algo sério o suficiente para nos chamar aqui, não é?"
10042020-7 = "Eu farei meu trabalho, mas se for algo trivial... você sabe o que acontece, né?"
10042020-8 = "[s1] \"É muito difícil de explicar...\"\n[s2] \"É uma situação um tanto estranha...\""
10042020-17 = "Chinatsu-san, Iori-san..."
10042020-19 = "O Clube de Merenda? #nÉ raro ver vocês fora de lá."
10042020-20 = "Eu achei que fosse o Clube de Desenvolvimento de Fontes Termais ou o Clube de Pesquisa Gastronômica... mas o Clube de Merenda?"
10042020-21 = "Se não for incômodo, poderia nos explicar a situação?"
10042020-22 = "É que..."
10042020-24 = "...Haa."
10042020-25 = "Em outras palavras... uma panqueca ganhou consciência e saiu correndo?"
10042020-26 = "[s] \"Pode ser difícil de acreditar, mas...\""
10042020-27 = "...Não, espere."
10042020-28 = "Eu sinto que já ouvi uma história parecida antes..."
10042020-29 = "Foi quando fizemos uma festa na Pandemonium Society..."
10042020-30 = "Já houve alguns incidentes semelhantes antes disso, mas..."
10042020-31 = "Então... isso é um novo tipo de terrorismo?"
10042020-32 = "Gehenna tem vários tipos de terroristas, mas eu nunca imaginei que o Clube de Merenda fosse um deles..."
10042020-33 = "Te-terroristas!? #nNão me compare com a Haruna!!!!"
10042020-34 = "Não, não é terrorismo, pode ser um acidente."
10042020-35 = "O Clube de Merenda sempre foi bem tranquilo, por isso nunca foram alvos de vigilância até agora..."
10042020-36 = "Falando nisso, lembro que durante a avaliação sanitária me fizeram beber um suco de laranja estranho...?"
10042020-37 = "¡?"
10042020-38 = "Is-isso é, bem...!"
10042020-39 = "Iori, acalme-se. Se o pessoal do Clube de Merenda estivesse cometendo atos terroristas com más intenções, os frequentadores do refeitório já teriam passado mal. #nComo não é o caso, vamos acreditar neles."
10042020-40 = "Faz sentido. Eu também costumo comer no refeitório. #nSe quisessem causar um atentado, já teriam feito."
10042020-41 = "Além disso... se for só isso, eu mesma dou conta."
10042020-42 = "Fiquem todos esperando aqui... Sensei, entendeu?"
10042020-43 = "...É perigoso se algo acontecer."
10042020-44 = "[s] \"A Iori está preocupada comigo!\""
10042020-45 = "Ha, haa!? #nN-não é nada disso, de jeito nenhum!"
10042020-46 = "De qualquer forma, vou acabar logo com isso!"
10042020-50 = "[log]No momento seguinte ao grito de Iori—[/log]"
10042020-53 = "[log]Um pressentimento passou pela mente do Sensei![/log]"
10042020-57 = "[ns5] \"I-Iori!\"\n[ns6] \"Espere, precisamos conversar—\""
10042020-60 = "Então, estou indo!"
10042020-65 = "...Ela foi embora."
10042020-66 = "Pelo menos ela poderia ter ouvido o que o Sensei tinha a dizer..."
10042020-67 = "A propósito, eu gostaria de ouvir os detalhes sobre a situação do Clube de Merenda... seria possível?"
10042020-68 = "Hii, me desculpe..."
10042020-69 = "Não estou brava. Por favor, acalme-se."
10042020-70 = "...Obrigada, Chinatsu-san."
10042020-71 = "...Além disso, fica difícil fazer o interrogatório desse jeito."
10042020-72 = "É isso que te preocupa!?"
10042020-73 = "...Fufu."
10042020-74 = "Estou brincando."
10042020-76 = "—Esses são os fatos até agora."
10042020-77 = "...O dia de folga do Clube de Merenda, a saída da Fuuka-san, o trabalho de meio período da Juri-san."
10042020-78 = "Em meio a uma agenda lotada, um trabalho de cozinha surgiu de repente. #nE a comida acabou ficando melhor do que o habitual..."
10042020-79 = "S-sim! Exatamente!"
10042020-80 = "Entendo..."
10042020-81 = "Não posso dizer que entendi tudo, mas..."
10042020-82 = "B-bem..."
10042020-83 = "A Juri estava apenas fazendo um trabalho de meio período... não foi intencional."
10042020-84 = "É verdade... no fim das contas, deve ter sido um acidente."
10042020-85 = "E-eu agradeço por dizer isso, mas..."
10042020-86 = "Ouvi dizer que houve uma explosão no depósito do café também..."
10042020-87 = "Bem, isso é algo que acontece sempre."
10042020-88 = "[ns7] (É algo que acontece sempre...)\n[ns8] (Pensando bem, estamos em Gehenna, né...)"
10042020-91 = "A Iori já deveria ter voltado... ela está atrasada."
10042020-92 = "Vou tentar entrar em contato. #nPor favor, aguarde um momento."
10042020-97 = "...?"
10042020-98 = "Não atende. #nVou tentar mais uma vez..."
10042020-103 = "Não está dando certo. #nNormalmente ela sempre atende o telefone..."
10042020-104 = "Será que...?"
10042020-105 = "Mais uma vez..."
10042020-110 = "Ela realmente não atende. #nIsso é..."
10042020-111 = "...Sensei, Juri."
10042020-112 = "Eu gostaria de perguntar sobre aquele monstro..."
10042020-113 = "A pessoa que foi atacada primeiro está bem?"
10042020-114 = "Bem... ela desmaiou coberta de molho, mas não tinha ferimentos externos."
10042020-115 = "Entendo..."
10042020-116 = "[ns] \"Chinatsu?\""
10042020-117 = "Parece que a situação pode ter se agravado além do esperado."
10042020-118 = "Mas... é estranho."
10042020-119 = "A Iori não ter dado nenhum sinal de vida até agora..."
10042020-120 = "Normalmente, ela retorna as ligações assim que percebe."
10042020-121 = "[s] \"Vou tentar ligar também.\""
10042020-122 = "Sim, por favor."
10042020-128 = "Também não atende, não é...?"
10042020-129 = "N-não pode ser...!"
10042020-130 = "[s9] \"Quem diria que chegaríamos a esse ponto...\"\n[s10] \"Naquela hora, eu já sentia que algo estava errado...\""
10042020-133 = "...O que você quer dizer com isso, Sensei?"
10042020-134 = "A-ah! #nPrimeiro, não deveríamos procurar a Iori?"
10042020-135 = "É verdade... além disso, tenho um pressentimento ruim..."
10042020-136 = "Sensei... se não for incômodo, posso perguntar?"
10042020-137 = "[s11] \"Talvez a Iori esteja agora...\"\n[s12] \"Coberta de gosma...\""
10042020-140 = "Hã!?"
10042020-141 = "Coberta de... gosma?"
10042020-144 = "Viemos parar bem longe, mas..."
10042020-145 = "No caminho, havia gosma verde por toda parte..."
10042020-146 = "A Iori está ali!! É ela!!"
10042020-149 = "[ns] \"Uau! Iori, você está bem!?\""
10042020-150 = "Vou verificar o estado dela..."
10042020-155 = "...Ela só está desmaiada. #nFelizmente, não corre risco de vida..."
10042020-156 = "Mas esse líquido grudado nela não vai sair tão cedo... e o cheiro é bem forte."
10042020-157 = "...Isso é normal?"
10042020-158 = "Bem, é algo que acontece sempre..."
10042020-159 = "Mas, de qualquer forma, é melhor chamarmos um especialista."
10042020-160 = "[s] \"Um especialista...?\""
10042020-161 = "Além da Chinatsu-san, existe outro especialista em medicina...?"
10042020-162 = "Sim, é alguém de confiança."
10042020-163 = "……Embora seja uma pessoa um pouco peculiar."
10042020-165 = "……Entendo, foi por isso que me chamou. #nCompreendido."
10042020-166 = "Como a Chinatsu disse, a vida dela não corre perigo."
10042020-167 = "……A razão do desmaio parece ser apenas que o \"molho\" não agradou ao paladar dela."
10042020-168 = "O-o molho foi a causa!?"
10042020-169 = "…………Provavelmente."
10042020-170 = "Deve ter sido muito ruim."
10042020-171 = "Você só mudou o jeito de falar!"
10042020-175 = "[ns13] \"B-bem, se está tudo bem, fico aliviado!\"\n[ns14] \"Obrigado por vir, mesmo estando de folga.\""
10042020-178 = "[ns] \"……E, aliás, esse traje combina com você.\""
10042020-179 = "Não precisa agradecer. #nO Departamento de Medicina de Emergência está sempre de prontidão para qualquer chamado."
10042020-180 = "E sobre o comentário das minhas roupas civis, obrigada, Sensei. Fico genuinamente feliz."
10042020-181 = "Quanto a este cadáver... digo, a ela, já providenciei o transporte com os outros membros. #nEles devem chegar em breve."
