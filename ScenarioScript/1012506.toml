[translation]
1012506-1 = "魔法の画家"
1012506-2 = "（エリとの約束どおり、ワイルドハントの通りへとやってきた）"
1012506-8 = "おおっ、マスター！こちらです！"
1012506-9 = "準備はすべて整っております！さあ、参りましょう！"
1012506-10 = "[s] \"今日は絵を描くんだよね？\""
1012506-11 = "その通りです。"
1012506-12 = "よろしければ……マスターをモデルに、肖像画を描いてみようかと！"
1012506-13 = "[s] \"本当に！？楽しみ！\""
1012506-14 = "にゅふふ、期待していてください。#n今日はいつもと違う特別な環境ですから。"
1012506-15 = "できる限り、私の中に眠るマナだけで描いてみせます。"
1012506-16 = "[s1] \"実技試験の対策ってこと？\"\n[s2] \"まさか……帽子も脱ぐの？\""
1012506-22 = "ま、マスター……そんなに脱がせたいんですか……！？"
1012506-23 = "……いえ。#nマスターのご要望であれば……脱ぎますけど……。#nでも、人通りの多い場所はちょっと……。"
1012506-24 = "[s] \"……帽子の話だよね！\""
1012506-28 = "にゅふふふ……。"
1012506-29 = "[s] \"お願いだからそうだと言って！\""
1012506-30 = "にゅふ、もちろん帽子のことですよ！"
1012506-31 = "では、マスターへの歓迎の儀も済んだところで、アトリエに向かいましょうか。"
1012506-36 = "[ns] \"あれ？ こっちは逆方向じゃない？\""
1012506-37 = "いえ、合っていますよ？"
1012506-38 = "今日のアトリエは――こちらですから！"
1012506-39 = "ワイルドハントの中でもいちばん人通りの多い場所で、#nマスターの肖像を描いてみせます！"
1012506-40 = "ここで作品を描き上げれば、きっと自信もつくはず！"
1012506-41 = "[s3] \"たしかにこの方法なら……。\"\n[s4] \"注目されながら描くって、いい訓練になるかもね。\""
1012506-44 = "それでは、こちらのお席へどうぞ。すぐにキャンバスを用意しますね。"
1012506-51 = "ん？屋外実習か？"
1012506-52 = "ちょうど暇だったし、見ていこうか。"
1012506-57 = "[ns] \"もうギャラリーが集まり始めてる……。\""
1012506-59 = "だ、大丈夫です！これもすべて計算のうちですから！ "
1012506-63 = "……では、お見せしましょう。"
1012506-64 = "私の「世界創造魔法」を！"
1012506-67 = "[wa:5510]― [log=에리]……はじめて絵を描いた日を、[wa:1570]思い出します。[/log]"
1012506-70 = "― [log=에리]あのときは……[wa:1160]まっすぐ、[wa:700]純粋に、[/log]"
1012506-72 = "― [log=에리]キャンバスと向き合っていました。[/log]"
1012506-75 = "[wa:650]― [log=에리]今の私は……[wa:1790]違います。[/log]"
1012506-78 = "― [log=에리]何を描けばいいのか[wa:1280]分からなくなって、[/log]"
1012506-80 = "― [log=에리]自信を[wa:760]失って[wa:480]しまって……。[/log]"
1012506-83 = "[wa:660]― [log=에리]そんなとき、[/log]"
1012506-85 = "― [log=에리]マスターが[wa:560]教えてくれたんです。[/log]"
1012506-88 = "― [log=에리]「夢」という魔法は、[/log]"
1012506-90 = "― [log=에리]もう[wa:570]心の中に[wa:870]宿って[wa:290]るって。[/log]"
1012506-93 = "[wa:920]― [log=에리]夢があるなら……[wa:2170]これからは、[/log]"
1012506-95 = "― [log=에리]道に迷わずに[wa:970]済みそうです。[/log]"
1012506-98 = "― [log=에리]マスター……[wa:1570]よければ、[/log]"
1012506-100 = "― [log=에리]私と同じ道を[wa:1260]歩みませんか？[/log]"
1012506-103 = "[wa:610]― [log=에리]色とりどりの[wa:1450]夢でいっぱいの、[/log]"
1012506-105 = "― [log=에리]魔法の道を！[/log]"
1012506-109 = "……いかがでしたか？#n私の想い……届きました？"
1012506-110 = "[s5] \"うん。しっかり伝わったよ。\"\n[s6] \"言霊魔法の使い手は、エリの方だったね。\""
1012506-113 = "えへへ……。"
1012506-114 = "[s] \"ちょっとだけ見せてもらってもいい？\""
1012506-115 = "ま、まだ途中だからダメです！ 完成したらお見せしますから！"
1012506-120 = "あっ、エリちゃんだ！"
1012506-121 = "あれ？この絵って……？"
1012506-122 = "え、えええっ！？み、みなさん！？い、いつからそこに……！？"
1012506-123 = "わぁ、すっごく綺麗な肖像画だね！エリちゃんらしい色使いって感じ！"
1012506-124 = "ふふっ、恥ずかしがってたけど、とっても素敵な絵じゃない。"
1012506-125 = "そ、そうですか……？"
1012506-126 = "あっ、ごめんね！#n邪魔しちゃ悪いし、そろそろ行くね！"
1012506-127 = "かっこよかったよ、エリちゃん！応援してるから！"
1012506-131 = "え、えへへへ……。"
1012506-132 = "[s] \"いい友達だね。\""
1012506-133 = "ええ。みんな、本当に優しいです……。"
1012506-134 = "……やっぱり、私の心配は杞憂でしたね。"
1012506-139 = "それでは、続きを描きましょう！"
1012506-144 = "[ruby=しらお]白尾[/ruby]エリだけの、世界を創造します……！"
1012506-146 = "（多くの生徒たちに見守られながら、エリの作品は完成した）"
1012506-147 = "（それは誰が見ても「エリらしさ」が感じられる、素晴らしい作品だった）"
