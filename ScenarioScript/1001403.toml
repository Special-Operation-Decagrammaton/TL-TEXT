[translation]
1001403-1 = "そしてイズナは護衛する"
1001403-2 = "（久しぶりの休日）"
1001403-3 = "（なんとなくその辺の道を散歩している時……）"
1001403-5 = "ふんふんふん～♪"
1001403-7 = "[s] \"…………。\""
1001403-9 = "（街を散策している時……）"
1001403-11 = "ふふーん、ふふふんっ、ふっふふふっふっふん～♪"
1001403-13 = "[s] \"…………うーん。\""
1001403-15 = "（昼食のために食堂に寄った時……）"
1001403-16 = "主殿！イズナ、毒味も兼ねて先にお昼を頂いております！"
1001403-18 = "ちょうどイベント期間でして、今トッピングを注文するとエビ天2つを無料でもらえるそうです！"
1001403-19 = "あっ、うわっ！"
1001403-23 = "あ、うぅ……イズナの、イズナのエビ天が……。"
1001403-24 = "[s] \"新しいの買ってあげるから。泣かないで、イズナ。\""
1001403-25 = "えっ、本当ですか！？"
1001403-26 = "えへへっ！ありがとうございます！主殿！"
1001403-28 = "（仕事で使う資料を探すために、図書館に寄った時……）"
1001403-29 = "主殿！あそこから、こちらをじっと狙ってるような視線を感じます！"
1001403-30 = "まさか、主殿に良からぬ策略をしようと画策している刺客でしょうか！？"
1001403-31 = "[s1] \"司書さんだよ。\"\n[s2] \"イズナがずっと動き回るのが気になってるんだと思うよ。\""
1001403-32 = "す、すみません……。"
1001403-33 = "す、すみません……。"
1001403-35 = "（イズナがずっとそばにくっ付いたまま、離れようとしない）"
1001403-36 = "[s] （うーん、これは……）"
1001403-38 = "イズナ、こんこん、こんここ～ん♪"
1001403-39 = "[s] \"あの、イズナ……？\""
1001403-40 = "はいっ！お呼びですか主殿！？"
1001403-41 = "[s3] \"護衛はここまでで大丈夫だよ。\"\n[s4] \"せっかくの休日だし、イズナも休んだら？\""
1001403-42 = "えっ、ですが……。"
1001403-43 = "えっ、ですが……。"
1001403-44 = "いつ主殿の身に危機が迫るか分かりませんし……"
1001403-45 = "ここで護衛をやめるわけにはいきません！"
1001403-46 = "[s] \"危機？こんなところで？\""
1001403-47 = "油断はダメですよ、主殿！"
1001403-48 = "昨日放送していた忍者モノでも、似たような状況がありました！"
1001403-49 = "「もう護衛は要らないから下がりなさい」という主君の言葉に従った忍者が下がると同時に……。"
1001403-50 = "なんと！狙っていたかのように襲撃が！"
1001403-51 = "[s] \"メディアの影響……。\""
1001403-52 = "そこで不意を突かれてやや遅れつつも、忍者が主君を護衛しながら、"
1001403-53 = "飛んでくる矢を"
1001403-54 = "こうっ、"
1001403-55 = "こうやって！全て打ち返すのがすっごくカッコよかったんです！"
1001403-56 = "イズナもやってみたいです、あれ！"
1001403-57 = "どこからか矢が飛んでこないでしょうか？"
1001403-58 = "[s] \"飛んで来たら困るんだけど！？\""
1001403-59 = "それとも、もしかして……。"
1001403-60 = "イズナ、主殿の邪魔になっていますか……？"
1001403-61 = "[s5] \"ううん、別にそんなことはないけど……。\"\n[s6] \"そんなにぴったりついてこなくても大丈夫じゃない……？\""
1001403-62 = "それについてはお気になさらず！"
1001403-63 = "それについてはお気になさらず！"
1001403-64 = "イズナは主殿の忍者ですので！"
1001403-65 = "あっ！！"
1001403-66 = "[s] \"ん？\""
1001403-67 = "主殿っ！"
1001403-69 = "[ns] \"ど、どうしたの？\""
1001403-72 = "ふぅ……野良の犬が通り過ぎました……。"
1001403-74 = "無事でよかったです！主殿！"
1001403-75 = "[s] \"う、うん。ありがとう。\""
1001403-76 = "えへへっ。イズナ、お役に立ちましたか！？主殿！"
1001403-77 = "（こんな期待に満ちた満開の笑顔を前に、もうやめようとは言えなかった）"
1001403-78 = "[s] \"もちろん、助かったよ。\""
1001403-79 = "えへへっ、はいっ！これからも任せてくださいね、主殿！"
1001403-80 = "[s] \"う、うん、よろしく……。\""
1001403-82 = "（そうやって一日中、イズナに護衛をしてもらう休日を過ごした……）"
