[translation]
1001403-1 = "E Izuna faz a escolta"
1001403-2 = "（Um dia de folga depois de muito tempo）"
1001403-3 = "（Enquanto caminhava sem rumo por uma rua qualquer...）"
1001403-5 = "Hum, hum, hum~♪"
1001403-7 = "[s] \"…………。\""
1001403-9 = "（Enquanto passeava pela cidade...）"
1001403-11 = "Fufun, fufufun, fuffufufuffufun~♪"
1001403-13 = "[s] \"…………Hmm.\""
1001403-15 = "（Quando parei no refeitório para almoçar...）"
1001403-16 = "Mestre! Izuna está almoçando primeiro, também para verificar se a comida está segura!"
1001403-18 = "É que estamos em período de evento, e dizem que se pedir um acompanhamento agora, ganha dois camarões fritos de graça!"
1001403-19 = "Ah, uau!"
1001403-23 = "Ah, uuu... O camarão frito da Izuna, o camarão frito da Izuna..."
1001403-24 = "[s] \"Eu compro outro para você. Não chore, Izuna.\""
1001403-25 = "Sério, é verdade!?"
1001403-26 = "Ehehe! Muito obrigada! Mestre!"
1001403-28 = "（Quando passei na biblioteca para procurar materiais para o trabalho...）"
1001403-29 = "Mestre! Sinto um olhar vindo dali, como se estivessem nos observando atentamente!"
1001403-30 = "Será que é um assassino planejando algo ruim contra o Mestre!?"
1001403-31 = "[s1] \"É a bibliotecária.\"\n[s2] \"Acho que ela está incomodada com o fato de você não parar de se mexer.\""
1001403-32 = "D-desculpe..."
1001403-33 = "D-desculpe..."
1001403-35 = "（Izuna continua grudada ao meu lado e não quer se afastar）"
1001403-36 = "[s] （Hmm, isso é...）"
1001403-38 = "Izuna, kon-kon, kon-ko-kon♪"
1001403-39 = "[s] \"Ei, Izuna...?\""
1001403-40 = "Sim! Chamou, Mestre!?"
1001403-41 = "[s3] \"A escolta pode parar por aqui.\"\n[s4] \"Já que é seu dia de folga, por que não descansa também?\""
1001403-42 = "Ah, mas..."
1001403-43 = "Ah, mas..."
1001403-44 = "Não sei quando um perigo pode surgir para o Mestre..."
1001403-45 = "Não posso parar a escolta aqui!"
1001403-46 = "[s] \"Perigo? Aqui?\""
1001403-47 = "Não baixe a guarda, Mestre!"
1001403-48 = "No desenho de ninja que passou ontem, teve uma situação parecida!"
1001403-49 = "O ninja que obedeceu ao seu senhor, que disse \"Não preciso mais de escolta, pode se retirar\", assim que se afastou..."
1001403-50 = "Inacreditável! Um ataque aconteceu como se estivessem esperando por isso!"
1001403-51 = "[s] \"A influência da mídia...\""
1001403-52 = "Mesmo sendo pego de surpresa e um pouco atrasado, o ninja protegeu seu senhor enquanto..."
1001403-53 = "as flechas que vinham voando..."
1001403-54 = "assim,"
1001403-55 = "e assim! Rebater todas elas foi super legal!"
1001403-56 = "A Izuna também quer fazer isso, aquilo!"
1001403-57 = "Será que não tem flechas voando de algum lugar?"
1001403-58 = "[s] \"Eu ficaria preocupado se estivessem!\""
1001403-59 = "Ou então, será que..."
1001403-60 = "Izuna está atrapalhando o Mestre...?"
1001403-61 = "[s5] \"Não, não é nada disso...\"\n[s6] \"Não precisa ficar tão grudada assim, não é...?\""
1001403-62 = "Quanto a isso, não se preocupe!"
1001403-63 = "Quanto a isso, não se preocupe!"
1001403-64 = "A Izuna é a ninja do meu mestre, afinal!"
1001403-65 = "Ah!!"
1001403-66 = "[s] \"Hm?\""
1001403-67 = "Mestre!"
1001403-69 = "[ns] \"O-o que foi?\""
1001403-72 = "Ufa... um cachorro de rua acabou de passar..."
1001403-74 = "Que bom que está a salvo! Mestre!"
1001403-75 = "[s] \"Ah, sim. Obrigado.\""
1001403-76 = "Hehehe. A Izuna foi útil, não foi!? Mestre!"
1001403-77 = "(Diante de um sorriso tão radiante e cheio de expectativa, eu não consegui dizer para ela parar)"
1001403-78 = "[s] \"Claro, você me ajudou muito.\""
1001403-79 = "Hehehe, sim! Pode continuar contando comigo, mestre!"
1001403-80 = "[s] \"Ah, sim, conto com você...\""
1001403-82 = "(E assim, passei o resto do dia de folga sendo escoltado pela Izuna...)"
