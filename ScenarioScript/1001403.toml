[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
1001403-1 = "E a Izuna, O Protege"
1001403-2 = "(Uma folga depois de muito tempo)"
1001403-3 = "(Enquanto eu passeava pelas ruas sem rumo...)"
1001403-5 = "Humhumhum~♪"
1001403-7 = "[s] \"............\""
1001403-9 = "(Enquanto andávamos pela cidade...)"
1001403-11 = "Fuhuu~, fufuhun~, fufufufu~fun~♪"
1001403-13 = "[s] \"............Hmm.\""
1001403-15 = "(Quando paramos para almoçar...)"
1001403-16 = "Meu Mestre! A Izuna está comendo primeiro para provar se há veneno!"
1001403-18 = "Eles estão tendo um evento, e se você pedir o extra agora, ganha 2 tempurás de camarão de graça!"
1001403-19 = "Ah, uwaaah!"
1001403-23 = "Ah, uuh... Os tempurás... Os tempurás da Izuna caíram..."
1001403-24 = "[s] \"Eu compro outros para você. Não chore, Izuna.\""
1001403-25 = "Eh, sério!?"
1001403-26 = "Ehehe! Muito obrigada! Meu Mestre!"
1001403-28 = "(Quando fomos à biblioteca para procurar materiais de trabalho...)"
1001403-29 = "Meu Mestre! Sinto um olhar fixo vindo daquela direção!"
1001403-30 = "Será que é um assassino planejando alguma armadilha contra o Meu Mestre!?"
1001403-31 = "[s1] \"É o bibliotecário.\"\n[s2] \"Ele deve estar incomodado porque você não para quieta, Izuna.\""
1001403-32 = "M-Mil desculpas..."
1001403-33 = "M-Mil desculpas..."
1001403-35 = "(Izuna ficou colada em mim o tempo todo e não desgrudou nem por um segundo)"
1001403-36 = "[s] (Hmmm, isso é...)"
1001403-38 = "Izuna, kon-kon, kon-koko~n♪"
1001403-39 = "[s] \"Ei, Izuna...?\""
1001403-40 = "Sim! Chamou, Meu Mestre!?"
1001403-41 = "[s3] \"Você já pode parar a escolta por aqui.\"\n[s4] \"Hoje é dia de folga, por que você não descansa um pouco?\""
1001403-42 = "Eh, mas..."
1001403-43 = "Eh, mas..."
1001403-44 = "Nunca se sabe quando um perigo vai se aproximar do Meu Mestre..."
1001403-45 = "Não posso parar a escolta aqui!"
1001403-46 = "[s] \"Perigo? Em um lugar como este?\""
1001403-47 = "A distração é fatal, Meu Mestre!"
1001403-48 = "Isso sempre acontece nos programas de ninja da TV!"
1001403-49 = "Assim que o lorde diz: 'Não preciso mais de escolta, pode se retirar', e o ninja obedece..."
1001403-50 = "Nesse exato momento! Ocorre um ataque surpresa!"
1001403-51 = "[s] \"Isso é influência da TV...\""
1001403-52 = "Mesmo sendo pego de surpresa e atrasado, o ninja volta a proteger o seu lorde..."
1001403-53 = "E todas as flechas que voam na direção dele,"
1001403-54 = "Ele faz assim,"
1001403-55 = "E assim! Rebatendo todas as flechas, foi tão legal!"
1001403-56 = "A Izuna também quer tentar fazer isso!"
1001403-57 = "Será que não vai voar nenhuma flecha de algum lugar?"
1001403-58 = "[s] \"Se voasse, nós estaríamos em apuros!?\""
1001403-59 = "Ou, será que..."
1001403-60 = "A Izuna está atrapalhando o Meu Mestre...?"
1001403-61 = "[s5] \"Não, não é isso, mas...\"\n[s6] \"Você não acha que não precisa ficar tão colada em mim o tempo todo...?\""
1001403-62 = "Não se preocupe com isso!"
1001403-63 = "Não se preocupe com isso!"
1001403-64 = "A Izuna é a ninja do Meu Mestre!"
1001403-65 = "Ah!!"
1001403-66 = "[s] \"Hã?\""
1001403-67 = "Meu Mestre!"
1001403-69 = "[ns] \"O-O que houve?\""
1001403-72 = "Phew... Era um cachorro de rua passando..."
1001403-74 = "Ainda bem que você está seguro! Meu Mestre!"
1001403-75 = "[s] \"E-Eh, obrigado.\""
1001403-76 = "Ehehe. A Izuna foi útil!? Meu Mestre!"
1001403-77 = "(Diante desse sorriso radiante e cheio de expectativas, eu não conseguiria pedir para ela parar)"
1001403-78 = "[s] \"Com certeza, você ajudou muito.\""
1001403-79 = "Ehehe, sim! Deixe tudo comigo, Meu Mestre!"
1001403-80 = "[s] \"U-Uhum, conto com você...\""
1001403-82 = "(E assim, passei o meu dia de folga inteiro sendo escoltado pela Izuna...)"