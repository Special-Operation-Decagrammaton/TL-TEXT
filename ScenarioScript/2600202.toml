[translation]
2600202-1 = "O tempero mais importante"
2600202-2 = "Gehenna, 8º Refeitório Estudantil"
2600202-3 = "（Após conversar com Juri, visitei o refeitório estudantil de Gehenna）"
2600202-4 = "Sensei, seja bem-vindo!"
2600202-5 = "[s] \"Olá, Juri.\""
2600202-6 = "Obrigada por vir até aqui hoje."
2600202-7 = "Eu estive pensando sobre aquilo por um tempo desde então."
2600202-8 = "Mas, honestamente, não faço a menor ideia de qual seria a quantidade ideal de afeto..."
2600202-9 = "Mas, como o Sensei veio até aqui, talvez hoje eu finalmente encontre a resposta!"
2600202-10 = "[s1] \"Eu não queria dizer isso, mas...\"\n[s2] \"Será que existe mesmo uma quantidade ideal de afeto...?\""
2600202-11 = "Não podemos pensar de forma tão descuidada!"
2600202-12 = "Não podemos pensar de forma tão descuidada!"
2600202-13 = "Para criar pratos cada vez mais deliciosos,"
2600202-14 = "nós do Clube de Merenda de Gehenna estamos sempre nos esforçando e buscando a perfeição!"
2600202-15 = "（Diante da determinação de Juri, não consegui dizer mais nada para discordar）"
2600202-16 = "[s] \"Mas, se existisse, como você mediria essa 'quantidade ideal'...\""
2600202-17 = "Já preparei tudo para isso, pode deixar comigo."
2600202-18 = "Hoje, vou servir ao Sensei três pratos, cada um com uma quantidade diferente de afeto!"
2600202-19 = "[s3] \"A, a comida...\"\n[s4] \"Da Juri...!?\""
2600202-20 = "Sim, terminei de preparar tudo na cozinha agora pouco."
2600202-21 = "Sim, terminei de preparar tudo na cozinha agora pouco."
2600202-23 = "[s] \"Agora pouco, veio um som que parecia uma explosão lá da cozinha...\""
2600202-24 = "Hã? Você ouviu alguma coisa?"
2600202-25 = "Ah, já sei. Será que, desde que chegou aqui, seu subconsciente estava tão ansioso para provar minha comida que sua barriga acabou roncando?"
2600202-26 = "[s] \"Que tipo de barriga faz um barulho de explosão!?\""
2600202-27 = "Fufu♪ De qualquer forma, vamos começar!"
2600202-29 = "Aqui está o primeiro prato!"
2600202-31 = "（Quando Juri abriu a tampa da panela, um cheiro ácido e picante atingiu meu nariz）"
2600202-32 = "（Lá dentro, algo preto se movia freneticamente）"
2600202-33 = "[s] \"Só por precaução, que prato é esse...?\""
2600202-34 = "Como pode ver, é um Gambas al Ajillo!"
2600202-35 = "[s] \"...Entendi.\""
2600202-36 = "Neste prato, eu adicionei um pequeno toque final..."
2600202-37 = "Coloquei todo o meu carinho pelo Sensei nele."
2600202-38 = "Por favor, experimente!"
2600202-40 = "[s] \"...Bem, então. Vou comer...\""
2600202-43 = "[s] \"...\""
2600202-44 = "O que achou, Sensei?"
2600202-50 = "[ns] \"...Hã!?\""
2600202-51 = "（Quase perdi a consciência, mas consegui resistir por pouco）"
2600202-53 = "（Mas, vendo os olhos brilhantes da Juri, não consegui ser honesto sobre o que achei...）"
2600202-54 = "[s5] \"Bem, é que...\"\n[s6] \"É um sabor bem... único!\""
2600202-55 = "Ah, é mesmo...!?"
2600202-56 = "Ah, é mesmo...!?"
2600202-57 = "Hmm, mas a reação do Sensei não foi tão boa quanto eu esperava..."
2600202-58 = "Talvez não tenha sido o suficiente."
2600202-59 = "Então, vou trazer o próximo prato com ainda mais afeto!"
2600202-60 = "[s] \"Ainda mais afeto que isso... será que vai dar certo...?\""
2600202-63 = "Aqui está!"
2600202-64 = "Neste prato, coloquei todo o meu respeito e amor pelo Sensei!"
2600202-65 = "Aqui está o pão de alho para acompanhar o ajillo de agora pouco!"
2600202-66 = "[s] \"Pão de alho... costuma ser azul?\""
2600202-67 = "Não costuma?"
2600202-68 = "Eu segui exatamente o que estava no livro de receitas, mas..."
2600202-69 = "Ah, parece que o pão de alho fica ainda mais gostoso se você mergulhar no ajillo!"
2600202-70 = "Vamos, por favor, coma. Sensei!"
2600202-71 = "[s7] \"Combinar a comida da Juri com a comida da Juri...!\"\n[s8] \"Que tipo de casamento de sabores será esse...!\""
2600202-74 = "[s] \"...Muito bem! Itadakimasu...!\""
2600202-82 = "(Sensei? Aconteceu alguma coisa, Sensei? Sensei~?)"
2600202-83 = "((Hmm, não há resposta... talvez você não esteja me ouvindo...))"
2600202-84 = "(((Será que estava gostoso demais, ou será que ainda faltou um pouco de amor?)))"
2600202-85 = "(((Se for esse o caso, talvez você acorde quando comer o terceiro prato)))"
2600202-86 = "(((Então, o terceiro prato...)))"
2600202-87 = "(((Bem... é um prato onde coloquei, tipo... todo o meu carinho pelo Sensei, o máximo que pude...!)))"
2600202-88 = "(((Ah, é um pouco vergonhoso, na verdade...)))"
2600202-90 = "(((Bem, Sensei, você consegue comer? Sensei?)))"
2600202-95 = "[ns] \"...Hã!?\""
2600202-96 = "Ah, você acordou?"
2600202-97 = "[s] \"Onde estou... e a, a comida!?\""
2600202-98 = "Sensei, o trabalho no Schale deve ser muito difícil..."
2600202-99 = "Dormir durante a refeição..."
2600202-100 = "[s] \"Bem, eu... apaguei?\""
2600202-101 = "Será que eu forcei demais um Sensei tão cansado..."
2600202-102 = "[s9] \"Não, está tudo bem.\"\n[s10] \"É um pedido da Juri, eu quero atender.\""
2600202-103 = "...Muito obrigada, Sensei."
2600202-104 = "...Muito obrigada, Sensei."
2600202-105 = "Mas, por favor, não se esforce demais."
2600202-106 = "Ouvi dizer que você já é muito ocupado e costuma pular refeições."
2600202-107 = "[s] \"Ah... então é por isso que, hoje...\""
2600202-108 = "(Ronco...)"
2600202-109 = "Ora... Sensei, você ainda está com fome?"
2600202-110 = "(Pensando bem, percebi que não fiz uma refeição decente o dia todo até chegar aqui)"
2600202-111 = "Que bom."
2600202-112 = "[s] \"Que bom?\""
2600202-113 = "Como você é sempre um Sensei muito ocupado, pensei que talvez estivesse com muita fome hoje também,"
2600202-116 = "Ainda tem muito de todos os pratos!"
2600202-117 = "Vamos, coma sem cerimônia!"
2600202-118 = "[s] (Acho que tinha remédio para estômago na enfermaria...)"
2600202-120 = "[s] \"Estou... preparado!\""
2600202-121 = "Então, aqui está...!"
2600202-123 = "(Depois disso, enquanto comia a comida da Juri, aprendi um pouco mais sobre o que é o amor)"
