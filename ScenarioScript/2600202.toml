[translation]
2600202-1 = "一番大事な調味料"
2600202-2 = "ゲヘナ・第8学生食堂"
2600202-3 = "（そんなジュリとのやり取りを経て、ゲヘナの学生食堂を訪れた）"
2600202-4 = "先生、いらっしゃいませ～！"
2600202-5 = "[s] \"やあ、ジュリ。\""
2600202-6 = "今日はわざわざ来ていただいて、ありがとうございます。"
2600202-7 = "私、あれからもしばらく悩んでみたのですが。"
2600202-8 = "やはり愛情の適量というものは、皆目見当がつかず……。"
2600202-9 = "でもこうして先生も来てくださったことですし今日こそ、その答えが分かるかもしれません！"
2600202-10 = "[s1] \"ちょっと言いにくかったんだけど……。\"\n[s2] \"愛情に適量とかは無いんじゃないかな……？\""
2600202-11 = "そんな雑な考え方ではいけません！"
2600202-12 = "そんな雑な考え方ではいけません！"
2600202-13 = "より美味しい料理を作るため、"
2600202-14 = "日々切磋琢磨、追求を続けるのが私たちゲヘナの給食部ですから！"
2600202-15 = "（ジュリの気迫を前に、それ以上否定の言葉を継ぐことができなかった）"
2600202-16 = "[s] \"もしあるとして、「適量」なんてどうやって……。\""
2600202-17 = "それについては準備できてますので、お任せください。"
2600202-18 = "今日は先生を、私が作った「それぞれ注いだ愛情の量が異なる」三つのお料理でおもてなしさせていただきます！"
2600202-19 = "[s3] \"じゅ、ジュリの……！\"\n[s4] \"料理……っ！？\""
2600202-20 = "はい、先ほど厨房で調理は済ませてあります。"
2600202-21 = "はい、先ほど厨房で調理は済ませてあります。"
2600202-23 = "[s] \"今、厨房の方から何か爆発音みたいなものが……。\""
2600202-24 = "え？何か聞こえましたか？"
2600202-25 = "あっ、分かりました。もしかして、ここに来た時から潜在意識では私の料理を食べるのが楽しみで仕方なくて、先生のお腹が鳴ってしまったのではないでしょうか？"
2600202-26 = "[s] \"爆発音みたいなお腹の音って何！？\""
2600202-27 = "ふふっ♪とにかく始めましょう！"
2600202-29 = "では最初の料理です！"
2600202-31 = "（ジュリが鍋の蓋を開けると、辛いような酸っぱいような匂いが鼻を刺した）"
2600202-32 = "（中では、黒い何かがビクビクと動いている）"
2600202-33 = "[s] \"念のために聞くけど、これって何の料理……？\""
2600202-34 = "見ての通り、ガンバス・アル・アヒージョです！"
2600202-35 = "[s] \"……そっかぁ。\""
2600202-36 = "この料理にはですね、最後にほんの気持ちですが……。"
2600202-37 = "先生への親愛の気持ちを込めてみました。"
2600202-38 = "では、ご賞味ください！"
2600202-40 = "[s] \"……えっと、じゃ、じゃあ。いただきます……。\""
2600202-43 = "[s] \"……\""
2600202-44 = "いかがですか、先生？"
2600202-50 = "[ns] \"……ハッ！？\""
2600202-51 = "（危うく意識を失いそうになったけど、ギリギリのところでなんとか耐えた）"
2600202-53 = "（でも、目をキラキラさせているジュリに、そのことを素直に言うわけにもいかず……）"
2600202-54 = "[s5] \"えーっと、その……。\"\n[s6] \"こ、個性的な味だね……！\""
2600202-55 = "あっ、そうでしたか……！？"
2600202-56 = "あっ、そうでしたか……！？"
2600202-57 = "うーん、でも思ったより先生の反応がイマイチでしたし……。"
2600202-58 = "やっぱりこれくらいでは少し足りなかったのかもしれません。"
2600202-59 = "それでは次に、もっとたくさんの愛情を入れた料理をお持ちします！"
2600202-60 = "[s] \"これよりもたくさんの愛情……大丈夫かな……。\""
2600202-63 = "こちらです！"
2600202-64 = "この料理には、私から先生への敬愛の気持ちをたっぷり込めました！"
2600202-65 = "先ほどのアヒージョに添える、ガーリックパンです！"
2600202-66 = "[s] \"ガーリックパンって……青かったっけ？\""
2600202-67 = "違いましたっけ？"
2600202-68 = "レシピ本に載っていた通りなのですが……。"
2600202-69 = "あ、ガーリックパンは先ほどのアヒージョに浸して食べるとさらに美味しいみたいです！"
2600202-70 = "さあどうぞ、召し上がってください。先生！"
2600202-71 = "[s7] \"ジュリの料理にジュリの料理を組み合わせ……！\"\n[s8] \"一体どんなマリアージュが……！\""
2600202-74 = "[s] \"……よし！いただきます……っ！\""
2600202-82 = "（先生？どうかされましたか、先生？先生～？）"
2600202-83 = "（（うーん、お返事が無いですね……聞こえてないのかもしれません……））"
2600202-84 = "（（（これは美味しすぎたか、そうでなければやはりまだ愛情が足りなかったということでしょうか？）））"
2600202-85 = "（（（だとすると、三つ目の料理を食べたら戻るかもしれませんね）））"
2600202-86 = "（（（それでは、三つ目の料理……）））"
2600202-87 = "（（（えっと……私の、その……先生への想いを、これでもかというほどに込めた料理です……！）））"
2600202-88 = "（（（さ、流石に恥ずかしいですね……）））"
2600202-90 = "（（（えっと、先生、食べられますか？先生？）））"
2600202-95 = "[ns] \"……ハッ！？\""
2600202-96 = "あっ、お目覚めになりましたか？"
2600202-97 = "[s] \"ここはいったい……りょ、料理は！？\""
2600202-98 = "先生、シャーレのお仕事が大変なんですね……。"
2600202-99 = "食事中に眠ってしまうだなんて……。"
2600202-100 = "[s] \"えっと、私、[ruby=意識飛んでた]寝てた[/ruby]？\""
2600202-101 = "私、もしかしてお疲れの先生に無理を言ってしまったのでしょうか……。"
2600202-102 = "[s9] \"ううん、大丈夫。\"\n[s10] \"ジュリのお願いだもん、聞いてあげたいよ。\""
2600202-103 = "……ありがとうございます、先生。"
2600202-104 = "……ありがとうございます、先生。"
2600202-105 = "でも本当に、無理はなさらないでくださいね。"
2600202-106 = "ただでさえ先生は普段から忙しくてよく食事を抜いてるとお聞きしました。"
2600202-107 = "[s] \"あ……だから、今日こうして……。\""
2600202-108 = "（キュルル……）"
2600202-109 = "あらっ……先生、まだまだお腹が空いているのですか？"
2600202-110 = "（そういえば今日一日ここに来るまで、ちゃんとした食事を取っていないことに気づいた）"
2600202-111 = "良かったです。"
2600202-112 = "[s] \"よかったって？\""
2600202-113 = "いつもお忙しい先生ですから、もしかして今日もまたすごくお腹を空かせているのではないかと思って、"
2600202-116 = "どの料理もまだまだたくさんありますから！"
2600202-117 = "さあ、遠慮なく召し上がってください！"
2600202-118 = "[s] （たしか保健室に胃腸薬があったはず……）"
2600202-120 = "[s] \"覚悟は……できた！\""
2600202-121 = "ではこちらを……！"
2600202-123 = "（その後もジュリの料理を食べながら、愛情というものについてまた少し学んだ）"
