[translation]
1000405-1 = "Adultos e crianças"
1000405-2 = "Subúrbios de Gehenna - Pequeno shopping center"
1000405-6 = "……Hum."
1000405-7 = "O-Olá……?"
1000405-8 = "[s1] \"É tão refrescante te ver durante o dia!\"\n[s2] \"A Hina sob o céu azul!\""
1000405-9 = "Não precisa exagerar tanto……."
1000405-10 = "Não precisa exagerar tanto……."
1000405-11 = "Parece que você está falando de um fantasma que só aparece no meio da noite……."
1000405-12 = "Nós prometemos nos encontrar durante o dia, então não tem jeito."
1000405-13 = "[s] \"O trabalho no Comitê Disciplinar está bem?\""
1000405-14 = "……Está bem, eu não trabalho 24 horas por dia, 365 dias por ano, sabe."
1000405-15 = "Se eu ajustar minha agenda, consigo arranjar umas 3 horas."
1000405-16 = "[s3] \"……3 horas?\"\n[s4] \"Não é pouco?\""
1000405-17 = "……?"
1000405-18 = "……?"
1000405-19 = "Eh, pouco…… é mesmo……?"
1000405-20 = "Eu achei que fosse o suficiente…… afinal, é só para fazer compras."
1000405-21 = "[s] \"Não, obrigado. Então vamos lá!\""
1000405-22 = "Ah, sim……."
1000405-24 = "(Entrei no shopping com a Hina)"
1000405-27 = "(Tem pouca gente……)"
1000405-28 = "(Sensei, provavelmente escolheu este lugar por minha causa……)"
1000405-29 = "(Sério, essa pessoa……)"
1000405-30 = "……Então, qual é o assunto importante?"
1000405-31 = "[s5] \"Não tem nada além disso, na verdade.\"\n[s6] \"Um encontro não é um assunto importante?\""
1000405-32 = "……Haa."
1000405-33 = "……Haa."
1000405-34 = "Entendi…… eu meio que já suspeitava disso."
1000405-36 = "Loja de acessórios de personagens"
1000405-37 = "Acessórios……."
1000405-38 = "Tem muitos designs de animais estranhos……."
1000405-39 = "……? Não, não tem nada que eu tenha gostado em particular……."
1000405-40 = "Para começar, eu não gosto muito desse tipo de coisa."
1000405-41 = "Eu sei que tem alunas que acham fofo, mas eu não entendo muito bem. Nem sei o nome desses bichinhos……."
1000405-42 = "Hum, então vamos para outro lugar……."
1000405-44 = "Fliperama"
1000405-45 = "Fliperama……."
1000405-46 = "Não, eu quase nunca vim aqui. Nunca tive interesse."
1000405-47 = "É barulhento, cheio de luzes piscando e tem muita gente……."
1000405-48 = "Eu entendo que tem gente que gosta disso. Só não é do meu gosto, é só isso."
1000405-49 = "……Tudo bem? Então, vamos para outro lugar……."
1000405-51 = "Loja de roupas"
1000405-52 = "Isso é o que chamam de moda urbana, né……."
1000405-53 = "Eu sei que tem muitas alunas que usam essas roupas chamativas nos fins de semana……."
1000405-54 = "……Alguma coisa te chamou a atenção?"
1000405-55 = "……Nada."
1000405-56 = "Não tem necessidade de comprar coisas que eu não preciso."
1000405-57 = "Como eu tenho o uniforme, não preciso de tantas roupas casuais."
1000405-58 = "[s7] \"Não precisa comprar, só queria saber do seu gosto.\"\n[s8] \"Dentre essas, qual você acha bonita?\""
1000405-59 = "……?"
1000405-60 = "……？"
1000405-61 = "Bem……."
1000405-62 = "Hum……."
1000405-64 = "Hmm……."
1000405-66 = "……Desculpe."
1000405-67 = "Na verdade, nenhum deles……."
1000405-69 = "Shopping Center / Restaurante Familiar"
1000405-70 = "（Entramos em um restaurante familiar próximo para descansar um pouco）"
1000405-71 = "……."
1000405-72 = "………。"
1000405-73 = "…………。"
1000405-74 = "[s] \"O que houve?\""
1000405-75 = "Hã……?"
1000405-76 = "N-não…… é que, eu estava pensando se não era algo assim que você esperava, Sensei……."
1000405-77 = "Sinto que eu…… acabei estragando tudo, de certa forma……."
1000405-78 = "Desculpe, sou uma pessoa entediante…… eu tenho consciência disso."
1000405-79 = "[s9] \"Isso não é um traço da sua personalidade?\"\n[s10] \"Acho que isso também é a sua cara, Hina.\""
1000405-82 = "……."
1000405-83 = "（Sério, essa pessoa……）"
1000405-84 = "（Sempre sendo tão gentil assim……）"
1000405-85 = "O que desejam pedir?"
1000405-86 = "Ah…… eu vou querer um café, puro, sem açúcar ou leite."
1000405-87 = "E você, Sensei…… hum?"
1000405-88 = "O que foi, Sensei?"
1000405-89 = "[s11] \"É que a Hina parece tão madura.\"\n[s12] \"Você continua com um paladar de adulto, hein.\""
1000405-90 = "……Madura?"
1000405-91 = "……Madura?"
1000405-92 = "……."
1000405-93 = "Fufu, e eu aqui pensando no que você diria. O adulto aqui é você, Sensei."
1000405-94 = "Eu ainda sou…… baixa, só reclamo de tudo e não sou nada adorável, sou só uma criança."
1000405-96 = "（Essa sua consideração, que é o que te faz parecer tão maduro……）"
1000405-97 = "（O fato de eu pensar nisso já mostra que ainda sou uma criança……）"
1000405-100 = "Hoje eu estraguei tudo por minha causa também…… não precisa se esforçar tanto para agir assim……."
1000405-101 = "[s13] \"Não estou me esforçando, e ainda pude ver o seu sorriso, Hina.\"\n[s14] \"Hoje foi muito divertido.\""
1000405-102 = "……."
1000405-103 = "……."
1000405-104 = "……E-entendo. Se é assim, então tudo bem……."
1000405-108 = "（Parem de flertar e façam logo o pedido da outra pessoa……）"
