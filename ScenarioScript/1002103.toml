[translation]
1002103-1 = "Estou aqui com você"
1002103-2 = "（Murmúrios...）"
1002103-3 = "[s] \"……？\""
1002103-4 = "（Vim correndo às pressas, mas não havia nenhum combate acontecendo por ali, e, incomumente, nem mesmo o som de tiros ecoava）"
1002103-6 = "（Cheguei à casa de praia. Bem perto dali, estava Azusa, olhando ao redor de forma inquieta）"
1002103-7 = "……."
1002103-8 = "[s] \"……Azusa?\""
1002103-9 = "……Ah, Sensei."
1002103-10 = "Não achei que viria tão rápido, obrigada."
1002103-11 = "[s] \"Você disse que precisava de ajuda...\""
1002103-12 = "Sim, preciso da ajuda do Sensei. Estou em uma situação bem difícil agora..."
1002103-13 = "É que, como posso dizer..."
1002103-14 = "（Azusa olha de relance para a placa da casa de praia, em silêncio）"
1002103-15 = "（Lá estava escrito em letras grandes: \"Yakisoba de edição limitada! Por ordem de chegada!\"）"
1002103-16 = "（Pelo número de pessoas na fila, não sei se ainda dá tempo de conseguir um...）"
1002103-17 = "Bem, na verdade..."
1002103-18 = "É que..."
1002103-19 = "[s] \"Você está com vergonha de ter que entrar na fila para comprar?\""
1002103-20 = "……!"
1002103-21 = "[s1] \"Entendi, compreendido.\"\n[s2] \"Quando dizem que é 'limitado', a gente acaba ficando curioso, né?\""
1002103-22 = "Bem, é que não é que eu precise tanto assim..."
1002103-23 = "Bem, é que não é que eu precise tanto assim..."
1002103-24 = "……Eh? Você vai comprar para mim...? ……S-sério mesmo?"
1002103-25 = "[s3] \"Eu sou o Sensei da Azusa, afinal.\"\n[s4] \"Faço isso com o maior prazer!\""
1002103-26 = "Se você insiste tanto, então..."
1002103-27 = "Se você insiste tanto, então..."
1002103-28 = "……Por favor. Eu vou retribuir esse favor, com certeza."
1002103-29 = "……Obrigada, Sensei."
1002103-31 = "（Felizmente, conseguimos comprar antes que acabasse, e comi o yakisoba junto com a Azusa）"
1002103-32 = "（Para ser sincero, o sabor da edição limitada era um tanto indefinível...）"
1002103-33 = "……Ham."
1002103-34 = "[s] \"……Como está?\""
1002103-35 = "……Hm?"
1002103-36 = "Sim, está muito gostoso. Superou minhas expectativas."
1002103-37 = "E o seu, Sensei?"
1002103-38 = "……Você está com uma expressão meio estranha. Não era o que você esperava?"
1002103-39 = "[s5] \"Não, estava gostoso como qualquer outro.\"\n[s6] \"Se a Azusa gostou, isso é o que importa.\""
1002103-40 = "……Entendi."
1002103-41 = "……Entendi."
1002103-42 = "……Fufu."
1002103-43 = "[s] \"……Azusa?\""
1002103-44 = "Não, não é nada."
1002103-45 = "Estava delicioso. Mais do que qualquer yakisoba que comi até hoje."
1002103-48 = "……Por que será, né? Sinto isso de verdade, lá no fundo."
1002103-50 = "（Depois disso, como só o yakisoba não foi o suficiente, fomos juntos comprar uma raspadinha enquanto conversávamos sobre várias coisas）"
1002103-51 = "（De alguma forma, senti que aquela raspadinha estava mais gostosa do que qualquer outra que já provei）"
