[translation]
1002103-1 = "そばにいるから"
1002103-2 = "（ざわざわ……）"
1002103-3 = "[s] \"……？\""
1002103-4 = "（慌てて走ってきたけれど、そこでは特に戦闘が起きているわけでもなく、珍しく銃声も響き渡っていなかった）"
1002103-6 = "（たどり着いたのは海の家。そのすぐそばには、きょろきょろと忙しなく周囲を見ているアズサがいた）"
1002103-7 = "……。"
1002103-8 = "[s] \"……アズサ？\""
1002103-9 = "……あ、先生。"
1002103-10 = "こんなに早く来てくれると思わなかった、ありがとう。"
1002103-11 = "[s] \"助けが必要って……。\""
1002103-12 = "そう、先生の手助けが必要。今、だいぶ難しい状況に陥ってて……。"
1002103-13 = "その、何と言えば良いのか……"
1002103-14 = "（アズサは無言のまま、海の家の看板をチラッと見る）"
1002103-15 = "（そこには「限定焼きそば！先着順です！」と大きく書かれていた）"
1002103-16 = "（すでに並んでる人たちを見る限り、今から並んでもギリギリ間に合うかどうか……）"
1002103-17 = "えっと、実は……。"
1002103-18 = "その……。"
1002103-19 = "[s] \"並んでまで買うのがちょっと恥ずかしい……みたいな？\""
1002103-20 = "……っ！"
1002103-21 = "[s1] \"なるほど、了解。\"\n[s2] \"「限定」って書かれると気になっちゃうよね。\""
1002103-22 = "えっと、その、どうしてもってわけじゃなくて……。"
1002103-23 = "えっと、その、どうしてもってわけじゃなくて……。"
1002103-24 = "……え？買ってくれるの……？……ほ、本当に？"
1002103-25 = "[s3] \"私はアズサの先生だからね。\"\n[s4] \"これくらい、喜んで！\""
1002103-26 = "そこまで言ってくれるなら、じゃあ……。"
1002103-27 = "そこまで言ってくれるなら、じゃあ……。"
1002103-28 = "……お願い。この借りは、必ず返すから。"
1002103-29 = "……ありがとう、先生。"
1002103-31 = "（幸い、ギリギリのところで売り切れずに済み、アズサと一緒に焼きそばを食べた）"
1002103-32 = "（限定版の味は、正直何とも言えない感じだったけれど……）"
1002103-33 = "……はむ。"
1002103-34 = "[s] \"……どう？\""
1002103-35 = "……ん？"
1002103-36 = "うん、すごく美味しい。期待以上だ。"
1002103-37 = "先生は？"
1002103-38 = "……何だか微妙な表情だね。思っていたのとは違った？"
1002103-39 = "[s5] \"ううん、普通に美味しかったよ。\"\n[s6] \"アズサが美味しかったなら、それが何より。\""
1002103-40 = "……そっか。"
1002103-41 = "……そっか。"
1002103-42 = "……ふふっ。"
1002103-43 = "[s] \"……アズサ？\""
1002103-44 = "いや、何でもない。"
1002103-45 = "美味しかったよ。今まで食べてきた、どの焼きそばよりも。"
1002103-48 = "……何でだろうね。本当に、心からそう感じる。"
1002103-50 = "（その後焼きそばだけじゃ物足りず、二人でたくさん色々な話をしながら、仲良く追加でかき氷を買いに行った）"
1002103-51 = "（そのかき氷は何となく、今まで食べたどのかき氷よりも美味しかった気がする）"
