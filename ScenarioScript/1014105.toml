[translation]
1014105-1 = "Night Walk"
1014105-2 = "Schale - Main Entrance"
1014105-3 = "(Descending to the first floor)"
1014105-11 = "S-Sensei!?"
1014105-12 = "[s] \"Good evening, Haruka.\""
1014105-13 = "G-Good evening...!"
1014105-14 = "I'm sorry for bothering you so late at night..."
1014105-15 = "Did you need something?"
1014105-16 = "Um..."
1014105-17 = "Actually, I had a security part-time job today... and I happened to pass by Schale on my way home..."
1014105-18 = "[s] \"That's impressive. Did the job go well?\""
1014105-19 = "Yes! I didn't make any mistakes like last time."
1014105-20 = "I made sure to shoot anyone who looked even slightly suspicious!"
1014105-21 = "[s] \"...Huh?\""
1014105-22 = "My employer was even happy, saying it was quieter than usual!"
1014105-23 = "[s] \"So violence really does solve everything...\""
1014105-24 = "Yes?"
1014105-25 = "[s1] \"Well then, want to go for a walk?\"\n[s2] \"I'll walk you home.\""
1014105-28 = "W-Walk me home...?"
1014105-29 = "I-I couldn't...!"
1014105-30 = "I'm the one who called you out in the middle of the night, I can't possibly trouble you any further...!"
1014105-31 = "[s3] \"It's no trouble at all.\"\n[s4] \"Actually, I'm lucky to get away from my desk for a bit.\""
1014105-34 = "Oh... R-Really?"
1014105-35 = "Th-Then..."
1014105-36 = "I-I'll be in your care..."
1014105-38 = "(And so, I began a night walk with Haruka.)"
1014105-40 = "Uuu..."
1014105-41 = "Th-There's nobody around..."
1014105-42 = "It's dark, and it feels a bit lonely..."
1014105-43 = "I'm sorry... it's all because I was late to contact you..."
1014105-44 = "[s] \"It's fine, since you finished work late.\""
1014105-45 = "Um..."
1014105-46 = "Actually, the truth is..."
1014105-47 = "...I finished work two hours ago."
1014105-48 = "[s] \"Eh?\""
1014105-52 = "[ns] \"So you've been in front of Schale the whole time!?\""
1014105-53 = "Yes..."
1014105-54 = "The reason I didn't contact you right away was..."
1014105-55 = "I thought you might be busy with something urgent..."
1014105-56 = "Or maybe you were out on patrol..."
1014105-57 = "Or maybe you were on a break..."
1014105-58 = "That's why I hesitated to reach out..."
1014105-59 = "And if I just showed up suddenly, I might have surprised you..."
1014105-60 = "I was worried I might be a nuisance..."
1014105-61 = "[s] \"Yeah, that might be true.\""
1014105-62 = "I-I knew it...!"
1014105-63 = "[s5] \"But because you sent me that MomoTalk message.\"\n[s6] \"We're able to go for this walk together now, aren't we?\""
1014105-66 = "Y-Yes..."
1014105-67 = "[s] \"Thank you for finding the courage, Haruka.\""
1014105-68 = "Oh, no..."
1014105-69 = "C-Can I keep saying things like that from now on...?"
1014105-70 = "Y-You're right... I suppose you never know unless you say it out loud."
1014105-74 = "I-In that case..."
1014105-75 = "Even though I'm like this..."
1014105-76 = "Could I ask for one selfish favor...?"
1014105-82 = "(Haruka gently grabbed my sleeve.)"
1014105-86 = "Um, until we reach the destination..."
1014105-87 = "...I'd like to walk a little slower."
1014105-89 = "(I had no reason to refuse.)"
1014105-90 = "(I slowed my pace and fully enjoyed the time we had together.)"