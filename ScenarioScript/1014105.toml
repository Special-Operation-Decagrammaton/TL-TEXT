[translation]
1014105-1 = "夜の散歩"
1014105-2 = "シャーレ・正門"
1014105-3 = "（1階に降りてきた）"
1014105-11 = "せ、先生！？"
1014105-12 = "[s] \"こんばんは、ハルカ。\""
1014105-13 = "こ、こんばんは……！"
1014105-14 = "すみません、夜分遅くに……。"
1014105-15 = "何か用、ですか？"
1014105-16 = "えっと……。"
1014105-17 = "実は今日も警備のバイトがあって……帰り道に偶然、シャーレの前を通ったので……。"
1014105-18 = "[s] \"偉いね。バイトはうまくいった？\""
1014105-19 = "はい！前みたいなミスはありませんでした。"
1014105-20 = "ちょっとでも怪しいやつはすぐに撃ってやりましたので！"
1014105-21 = "[s] \"……うん？\""
1014105-22 = "雇い主さんも「いつもより静かだった」と喜んでくれました！"
1014105-23 = "[s] \"やはり暴力はすべてを解決するのか……。\""
1014105-24 = "はい？"
1014105-25 = "[s1] \"じゃあ、ちょっと歩かない？\"\n[s2] \"送っていくよ。\""
1014105-28 = "お、送る……？"
1014105-29 = "そ、そんな……！"
1014105-30 = "夜中に先生を呼び出しておいて、これ以上お手間をおかけするわけには……！"
1014105-31 = "[s3] \"手間なんかじゃないよ。\"\n[s4] \"むしろ職場から離れることができてラッキー。\""
1014105-34 = "え……？ほ、本当ですか？"
1014105-35 = "じゃ、じゃあ……。"
1014105-36 = "よ、よろしくお願いします……。"
1014105-38 = "（そうして、ハルカと二人で夜の散歩を始めた）"
1014105-40 = "ううぅ……。"
1014105-41 = "だ、誰もいないですね……。"
1014105-42 = "暗いし、なんだか寂しい感じがします……。"
1014105-43 = "すみません……連絡が遅れたせいで……。"
1014105-44 = "[s] \"仕事が遅くに終わったんだから、仕方ないよ。\""
1014105-45 = "えっと……。"
1014105-46 = "その、実は……。"
1014105-47 = "……仕事なら、2時間前に終わっていました。"
1014105-48 = "[s] \"え？\""
1014105-52 = "[ns] \"じゃあずっとシャーレの前に！？\""
1014105-53 = "はい……。"
1014105-54 = "その、すぐに連絡しなかったのは……。"
1014105-55 = "何か急用でお忙しいかも、とか……。"
1014105-56 = "外回りの最中かも、とか……。"
1014105-57 = "休憩中かも、とか……。"
1014105-58 = "そう思って、連絡するのを躊躇ってしまったからなんです……。"
1014105-59 = "かといって、急にお邪魔すると、先生をびっくりさせちゃうかもしれませんし……。"
1014105-60 = "迷惑かけてしまうんじゃないかと思って……。"
1014105-61 = "[s] \"うん、そうかもしれないね。\""
1014105-62 = "や、やっぱり……！"
1014105-63 = "[s5] \"でも、ハルカがモモトークをくれたから。\"\n[s6] \"今2人でお散歩できてるでしょう？\""
1014105-66 = "は、はい……。"
1014105-67 = "[s] \"勇気を出してくれてありがとう、ハルカ。\""
1014105-68 = "そ、そんな……。"
1014105-69 = "こ、これからも言っていいんですか……？"
1014105-70 = "そ、そうですね……口にしないと分からない、ですもんね。"
1014105-74 = "そ、それなら……。"
1014105-75 = "こんな私ですが……。"
1014105-76 = "一つだけ……[ruby=・]ワ[/ruby][ruby=・]ガ[/ruby][ruby=・]マ[/ruby][ruby=・]マ[/ruby]を言っていいでしょうか……？"
1014105-82 = "（ハルカがそっと袖をつかんできた）"
1014105-86 = "その、目的地まで……。"
1014105-87 = "……少し、ゆっくり歩きたい、です。"
1014105-89 = "（断る理由などなかった）"
1014105-90 = "（歩を緩めて、二人きりの時間を存分に楽しんだ）"
