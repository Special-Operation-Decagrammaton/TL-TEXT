[translation]#[Não revisado] - Filipe 09/06/26
1014105-1 = "Passeio noturno"
1014105-2 = "Schale · Portão principal"
1014105-3 = "(Desceu para o primeiro andar)"
1014105-11 = "P-Sensei!?"
1014105-12 = "[s] \"Boa noite, Haruka.\""
1014105-13 = "B-boa noite!"
1014105-14 = "Desculpa ligar tão tarde..."
1014105-15 = "É algum problema?"
1014105-16 = "Hmm..."
1014105-17 = "Na verdade, eu estava num trabalho de segurança hoje... e no caminho de volta, passei em frente ao Schale..."
1014105-18 = "[s] \"Que bom. O trabalho correu bem?\""
1014105-19 = "Sim! Não cometi os erros de antes."
1014105-20 = "Se alguém suspeito aparecesse, eu já atirava na hora!"
1014105-21 = "[s] \"... Hã?\""
1014105-22 = "O contratante também ficou feliz, disse que 'estava mais silencioso que o normal'!"
1014105-23 = "[s] \"Então a violência resolve tudo...\""
1014105-24 = "Como?"
1014105-25 = "[s1] \"Que tal darmos uma volta?\"\n[s2] \"Vou te acompanhar.\""
1014105-28 = "A-acompanhar?"
1014105-29 = "N-nem pensar...! Te chamei tarde da noite, não posso te dar mais trabalho..."
1014105-30 = "[s3] \"Não é trabalho nenhum.\"\n[s4] \"Aliás, até que é bom sair do escritório um pouco.\""
1014105-34 = "Hã... S-sério?"
1014105-35 = "Então..."
1014105-36 = "C-com licença..."
1014105-38 = "(Assim, começou o passeio noturno com Haruka)"
1014105-40 = "Uuuh..."
1014105-41 = "N-não tem ninguém, né..."
1014105-42 = "Está escuro... meio solitário..."
1014105-43 = "Desculpa... por ter demorado a avisar..."
1014105-44 = "[s] \"Terminou o trabalho tarde, não tem jeito.\""
1014105-45 = "Hmm..."
1014105-46 = "Na verdade..."
1014105-47 = "... O trabalho terminou há duas horas."
1014105-48 = "[s] \"Hã?\""
1014105-52 = "[ns] \"Então você ficou em frente ao Schale todo esse tempo!?\""
1014105-53 = "Sim..."
1014105-54 = "É que... não te chamei logo porque..."
1014105-55 = "Você podia estar ocupado com alguma urgência..."
1014105-56 = "Ou estava na rua a trabalho..."
1014105-57 = "Ou estava descansando..."
1014105-58 = "Fiquei com receio de te incomodar."
1014105-59 = "E também, se eu aparecesse de repente, poderia te assustar..."
1014105-60 = "Não queria atrapalhar..."
1014105-61 = "[s] \"É, pode ser.\""
1014105-62 = "Viu...!"
1014105-63 = "[s5] \"Mas você me chamou no Momotalk.\"\n[s6] \"E agora a gente está passeando junto, né?\""
1014105-66 = "S-sim..."
1014105-67 = "[s] \"Obrigado por ter tido coragem, Haruka.\""
1014105-68 = "N-nada..."
1014105-69 = "Posso continuar te chamando?"
1014105-70 = "É... se a gente não falar, não tem como saber."
1014105-74 = "Então..."
1014105-75 = "Mesmo eu sendo assim..."
1014105-76 = "Posso dizer uma [ruby=・]c[/ruby][ruby=・]o[/ruby][ruby=・]i[/ruby][ruby=・]s[/ruby][ruby=・]a[/ruby]...?"
1014105-82 = "(Haruka segurou suavemente a sua manga)"
1014105-86 = "É que... até chegarmos ao destino..."
1014105-87 = "... Queria andar mais devagar."
1014105-89 = "(Não havia motivo para recusar)"
1014105-90 = "(Diminuiu o passo e aproveitou ao máximo o tempo a sós)"