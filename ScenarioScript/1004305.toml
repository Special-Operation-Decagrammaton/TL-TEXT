[translation]
1004305-1 = "焚き火のそばでちらつく心"
1004305-3 = "これで準備は全て終わりです。"
1004305-4 = "皆さん、お疲れ様でした！"
1004305-10 = "[ns] \"ふう、やっと終わった。\""
1004305-11 = "（いろいろと騒ぎがあったけれど、最終的には無事、花火大会の準備を終えることができた）"
1004305-15 = "（しばらく時間に余裕ができたところで、ワカモにモモトークの返事を送った）"
1004305-16 = "[s] \"「仕事は全部終わったよ。ワカモはどこ？」\""
1004305-20 = "（いつもすぐ返ってくるのに、待てど暮らせどワカモから返事は来なかった）"
1004305-21 = "[s] \"ワカモから返事が来ないなんて珍しい……。\""
1004305-25 = "おや、天気が……。"
1004305-26 = "風の様子も怪しいですし、こりゃ海が荒れそうですなぁ。"
1004305-30 = "（ふと、漠然とした不安を感じた）"
1004305-34 = "[ns] \"……ちょっと出かけてきます。\""
1004305-35 = "あっ、先生お待ち下さい！雨風が強くなってきてます！"
1004305-48 = "（漠然とした不安に突き動かされるままに周辺を探し回っていると……）"
1004305-52 = "[ns] \"はぁはぁ……みつけた……。\""
1004305-55 = "あら、先生。いらっしゃったのですね♡"
1004305-58 = "[ns] \"……ワカモ、ここで何を？\""
1004305-59 = "何を…といいますと？"
1004305-60 = "うふふっ、ここでずうっと……あなた様をお待ちしておりました♡"
1004305-61 = "[s] \"この天気の中、ここで待っていたの……？どうして……。\""
1004305-62 = "うふふ、そんな質問をなさるなんて……あなた様も本当に意地の悪いお方。"
1004305-63 = "それは、申し上げるまでもなく……。"
1004305-64 = "あなた様と「約束」を、しましたから。"
1004305-65 = "「少しだけ待ってくれる？」"
1004305-66 = "あなた様がそう仰ってくださるのですから……。"
1004305-67 = "このワカモ。お言葉通り――雨が降ろうと、雪が降ろうと。あなた様を待つのは当然のこと。"
1004305-68 = "そういう「約束」なんですから。"
1004305-69 = "[s] \"約束……そういえば、この間の花火倉庫でも……。\""
1004305-72 = "うふふっ、ええ……あなた様に「約束」をしたので。今日という日を、特別なものにして差し上げる、と。"
1004305-73 = "ですから、私たちを邪魔し続けるこの障害物……。"
1004305-74 = "ええ……花火自体を、吹き飛ばします！"
1004305-77 = "[ns] \"それでワカモは約束を守ろうと……。\""
1004305-78 = "はい、その通りでございますが……。"
1004305-79 = "私……もしかして……何か間違ってしまったのでしょうか。"
1004305-80 = "あなた様にご迷惑をおかけするようなことを、してしまった……とか……？"
1004305-81 = "[s1] \"ううん、ミスなら私の方だよ。こんなところで待たせてしまうなんて。\"\n[s2] \"ワカモにもっとちゃんと説明すべきだったね。\""
1004305-82 = "えっ……"
1004305-83 = "えっ……"
1004305-84 = "そんな、この程度、私は何とも――"
1004305-92 = "うっ！？せ、先生……？"
1004305-95 = "[ns3] \"……大丈夫なわけ、ないでしょう。\"\n[ns4] \"身体をこんなに冷やしちゃって……！\""
1004305-96 = "先生……。"
1004305-97 = "先生……。"
1004305-98 = "あなた……様……。"
1004305-99 = "……熱い、です。"
1004305-100 = "[s] \"……ワカモ、ちょっと待ってね！\""
1004305-101 = "あっ、は、はい……?"
1004305-108 = "これは……たき火……？"
1004305-109 = "[s5] \"帰る前に、ここでちょっと冷えた身体を温めようか。\"\n[s6] \"その間、ワカモの傍に座っているから。\""
1004305-114 = "……！"
1004305-115 = "はっ、はぁい……♡"
1004305-121 = "で、では、失礼いたします。"
1004305-124 = "[wa:200]― ふふっ、[wa:2150]温かいですね……。"
1004305-127 = "[wa:120]― もちろん[wa:1450]焚火のせいも[wa:500]ありますが……。"
1004305-130 = "[wa:1300]― あなた様の声、[wa:1950]その言葉一つ一つが……。"
1004305-133 = "[wa:100]― 今は[wa:950]この私のためだけに、"
1004305-135 = "[wa:80]― 紡がれているのだと思うと……"
1004305-138 = "[wa:850]― ……まだ私は、"
1004305-140 = "― 色々と[wa:1000]至らぬ身ではあります。"
1004305-143 = "― あなた様の[wa:450]そばにいることで、[wa:2400]たくさん[wa:850]迷惑をかけ"
1004305-145 = "[wa:50]― また、[wa:1200]間違いを[wa:550]犯してしまうかも[wa:750]しれません。"
1004305-148 = "[wa:500]― それでも、[wa:2000]私は[wa:1350]こうしてあなた様の……"
1004305-150 = "― 先生のおそばにいても、[wa:2500]よろしいでしょうか……？"
1004305-153 = "[ns] \"もちろん……いくらでも。\""
1004305-154 = "[wa:400]― ありがとうございます……"
1004305-156 = "― そんな[wa:300]あなた様だから、[wa:2300]私は……"
1004305-160 = "（ワカモの凍った体が溶けるまで、一緒にたき火の揺れる水面を眺めていた）"
