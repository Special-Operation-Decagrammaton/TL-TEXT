[translation]
1004305-1 = "Coração tremeluzente ao lado da fogueira"
1004305-3 = "Com isso, terminamos todos os preparativos."
1004305-4 = "Pessoal, obrigado pelo trabalho duro!"
1004305-10 = "[ns] \"Ufa, finalmente acabou.\""
1004305-11 = "(Embora tenha havido muita confusão, no final, conseguimos terminar os preparativos para o festival de fogos de artifício em segurança.)"
1004305-15 = "(Agora que tive um tempo livre, enviei uma resposta para Wakamo no MomoTalk.)"
1004305-16 = "[s] \"Terminei todo o trabalho. Onde você está, Wakamo?\""
1004305-20 = "(Ela sempre responde na hora, mas, por mais que eu esperasse, a resposta de Wakamo não chegava.)"
1004305-21 = "[s] \"É raro a Wakamo não me responder...\""
1004305-25 = "Ora, o tempo está..."
1004305-26 = "O vento também está estranho, parece que o mar vai ficar agitado."
1004305-30 = "(De repente, senti uma inquietação vaga.)"
1004305-34 = "[ns] \"...Vou sair um pouco.\""
1004305-35 = "Ah, Sensei, espere! A chuva e o vento estão ficando mais fortes!"
1004305-48 = "(Enquanto procurava pelos arredores, movido por uma inquietação vaga...)"
1004305-52 = "[ns] \"Ofegante... te encontrei...\""
1004305-55 = "Ora, Sensei. Você veio até aqui, não é?♡"
1004305-58 = "[ns] \"...Wakamo, o que está fazendo aqui?\""
1004305-59 = "O que... estou fazendo?"
1004305-60 = "Ufufu, estou aqui há muito tempo... esperando por você♡"
1004305-61 = "[s] \"Neste tempo, você ficou esperando aqui...? Por quê...\""
1004305-62 = "Ufufu, fazer uma pergunta dessas... você também é uma pessoa muito maldosa."
1004305-63 = "Isso é, sem precisar dizer..."
1004305-64 = "Porque eu fiz uma \"promessa\" a você."
1004305-65 = "\"Pode esperar um pouco?\""
1004305-66 = "Já que foi você quem me pediu isso..."
1004305-67 = "Eu, Wakamo, farei como você disse — não importa se chova ou se neve. É natural que eu espere por você."
1004305-68 = "Porque essa é a nossa \"promessa\"."
1004305-69 = "[s] \"Promessa... falando nisso, lá no depósito de fogos também...\""
1004305-72 = "Ufufu, sim... como fiz uma \"promessa\" a você. De que tornaria o dia de hoje algo especial."
1004305-73 = "Por isso, esse obstáculo que continua nos atrapalhando..."
1004305-74 = "Sim... eu vou explodir os próprios fogos de artifício!"
1004305-77 = "[ns] \"Então a Wakamo estava tentando cumprir a promessa...\""
1004305-78 = "Sim, é exatamente isso, mas..."
1004305-79 = "Eu... será que... fiz algo errado?"
1004305-80 = "Será que fiz algo que causou problemas a você...?"
1004305-81 = "[s1] \"Não, o erro foi meu. Deixar você esperando em um lugar desses.\"\n[s2] \"Eu deveria ter explicado melhor para a Wakamo.\""
1004305-82 = "Ah..."
1004305-83 = "Ah..."
1004305-84 = "Não, isso não é nada para mim—"
1004305-92 = "Ah!? Se, Sensei...?"
1004305-95 = "[ns3] \"...Não tem como estar tudo bem.\"\n[ns4] \"Você deixou seu corpo esfriar tanto...!\""
1004305-96 = "Sensei..."
1004305-97 = "Sensei..."
1004305-98 = "Você..."
1004305-99 = "...Está quente."
1004305-100 = "[s] \"...Wakamo, espere um pouco!\""
1004305-101 = "Ah, s-sim...?"
1004305-108 = "Isso é... uma fogueira...?"
1004305-109 = "[s5] \"Antes de voltarmos, vamos aquecer o corpo que esfriou um pouco aqui.\"\n[s6] \"Enquanto isso, vou ficar sentado ao lado da Wakamo.\""
1004305-114 = "……！"
1004305-115 = "S-sim, senhor……♡"
1004305-121 = "E-então, com licença."
1004305-124 = "[wa:200]― Fufu, [wa:2150]está tão quente……."
1004305-127 = "[wa:120]― É claro que [wa:1450]é por causa da fogueira [wa:500]também, mas……."
1004305-130 = "[wa:1300]― A sua voz, [wa:1950]cada uma das suas palavras……."
1004305-133 = "[wa:100]― Ao pensar que, [wa:950]neste momento,"
1004305-135 = "[wa:80]― elas estão sendo tecidas [wa:850]apenas para mim……"
1004305-138 = "[wa:850]― ……Eu ainda,"
1004305-140 = "― sou alguém [wa:1000]cheia de falhas."
1004305-143 = "― Por estar [wa:450]ao seu lado, [wa:2400]acabo causando [wa:850]muitos problemas"
1004305-145 = "[wa:50]― e, [wa:1200]talvez, [wa:550]eu acabe cometendo [wa:750]erros novamente."
1004305-148 = "[wa:500]― Mesmo assim, [wa:2000]eu [wa:1350]gostaria de continuar assim, ao seu……"
1004305-150 = "― Posso continuar [wa:2500]ao lado do Sensei……?"
1004305-153 = "[ns] \"Claro…… o quanto você quiser.\""
1004305-154 = "[wa:400]― Muito obrigada……"
1004305-156 = "― É por você ser [wa:300]assim, [wa:2300]que eu……"
1004305-160 = "(Até que o corpo congelado de Wakamo se aquecesse, ficamos juntos observando o reflexo da fogueira na água)"
