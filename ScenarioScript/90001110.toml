[translation]
90001110-1 = "Episódio 11; Beco sem saída"
90001110-3 = "Como estão as coisas por aí, Rio?"
90001110-4 = "Está se referindo aos resultados da análise?"
90001110-5 = "Sim. O sinal desapareceu rápido demais para uma análise detalhada, mas..."
90001110-6 = "Entendo... Este é um Profeta completamente novo, diferente de Geburah ou Chokmah."
90001110-7 = "...Já é o terceiro Profeta desde que chegamos aqui."
90001110-12 = "Parece uma liquidação. Não são muitos, não?"
90001110-13 = "Eu queria um. Quanto custa?"
90001110-14 = "...Não sei se chamo isso de otimismo ou outra coisa."
90001110-15 = "Eu registrei as coordenadas do sinal. #nEstou enviando agora."
90001110-16 = "É bem longe, não é...? #nEu adoraria verificar com meus próprios olhos, mas mover o helicóptero só para isso..."
90001110-17 = "Além disso, deve haver algum motivo para terem emitido um sinal tão poderoso."
90001110-18 = "Quer dizer que estão nos atraindo?"
90001110-19 = "Como uma armadilha luminosa para insetos."
90001110-21 = "Não tenho certeza, mas é uma possibilidade que estou considerando."
90001110-22 = "[s] \"Se estamos sendo atraídos, pode ser uma armadilha...\""
90001110-23 = "Se for uma armadilha, o Departamento de Investigação de Fenômenos Estranhos avança de frente! #nÉ o que eu gostaria de dizer, mas..."
90001110-24 = "Eu sou contra. É irracional."
90001110-25 = "É. Eu também concordo com a presidente Rio."
90001110-26 = "Ah... Se ninguém vai me apoiar, desta vez vou respeitar a opinião da diretora Himari. #nPeço perdão, Rio."
90001110-30 = "É, é mesmo...?"
90001110-34 = "Poderia parar com essa falsa compaixão? #nEu ainda não decidi o que fazer!?"
90001110-36 = "Não seja indecisa, diretora."
90001110-37 = "É para quebrar o gelo, quebrar o gelo!"
90001110-38 = "Mesmo que fosse uma armadilha, eu estava curiosa, mas... o risco é grande demais. #nVamos deixar isso de lado."
90001110-39 = "Se for para reconhecimento, posso usar meus AMAS."
90001110-40 = "Tenho drones capazes de reconhecimento em alta velocidade."
90001110-41 = "Vamos enviá-los para as coordenadas do sinal."
90001110-42 = "Ora, parece que a cautela da Rio serve para alguma coisa."
90001110-43 = "Você não consegue ficar satisfeita sem soltar uma alfinetada, não é? #nAcho que é o método mais eficiente."
90001110-44 = "...Ah, chega! Entendi, eu estava errada! Me desculpe!"
90001110-47 = "Drone em cruzeiro. Chegará ao ponto alvo em cerca de 20 minutos."
90001110-48 = "Conectando a imagem de reconhecimento..."
90001110-49 = "—!?"
90001110-50 = "O que houve?"
90001110-51 = "...O sinal do drone desapareceu."
90001110-52 = "Como assim?"
90001110-53 = "Exatamente o que eu disse. #nO sinal do AMAS foi cortado."
90001110-54 = "Não há nenhuma informação do momento antes do corte?"
90001110-55 = "Estou analisando agora..."
90001110-56 = "Isso é..."
90001110-57 = "...O que aconteceu?"
90001110-58 = "Vou compartilhar os dados. #nHimari, venha ver comigo."
90001110-59 = "Você me pedindo ajuda... isso é realmente raro. #nOu seja..."
90001110-60 = "Sim... Espero que minha interpretação esteja errada."
90001110-65 = "[ns] \"Está tudo bem, né...?\""
90001110-66 = "Não pode ser... Isso é...!"
90001110-67 = "...Parece que eu não estava enganada."
90001110-68 = "É verdade, não há como você errar nisso. #nEu admito isso."
90001110-69 = "O que diabos aconteceu?"
90001110-70 = "Para ser direta, o que foi detectado naquelas coordenadas foi..."
90001110-71 = "— A \"Barreira Multidimensional\" que protegia a \"Arca de Atra-Hasis\"."
90001110-72 = "[s] \"A Arca de Atra-Hasis...!?\""
90001110-77 = "Sim, não há dúvidas."
90001110-78 = "Mas por que agora?#nKivotos vai ficar vermelha de novo ou máquinas estranhas vão aparecer?"
90001110-86 = "É difícil dizer se é um mal menor, mas... desta vez, acho que não será o caso."
90001110-87 = "Sim. Pelo menos, não há sinais de interferência dimensional ocorrendo."
90001110-88 = "Mas a \"Barreira Multidimensional\" existe, certo?"
90001110-89 = "Sim. E, julgando pelas informações que temos até agora..."
90001110-90 = "Podemos considerar que os profetas de Decagrammaton começaram a usar o poder do \"Deus Sem Nome\"."
90001110-91 = "E o fato de estarem usando uma Barreira Multidimensional, que é um dos \"fenômenos singulares\" mais fortes que já enfrentamos, significa que..."
90001110-92 = "Aquele é o esconderijo do inimigo?"
90001110-93 = "Pelo menos, é certo que há algo lá que eles querem esconder com a barreira.#n...Embora, mesmo sabendo disso, não haja muito que possamos fazer."
90001110-94 = "Para romper a Barreira Multidimensional, só podíamos contar com a \"Nave Mãe de Utnapishtim\" que o Sensei preparou."
90001110-95 = "Aquele tipo de \"fenômeno singular\" não acontece duas vezes."
90001110-99 = "[ns] \"É verdade... Eu também acho...\""
90001110-100 = "Não quero admitir, mas estamos em um beco sem saída."
90001110-101 = "A menos que encontremos uma forma de combater o poder do \"Deus Sem Nome\", não resolveremos a raiz do problema."
90001110-102 = "Exato. Mesmo ignorando a barreira, não há como lidar com os profetas que possuem uma capacidade de regeneração praticamente infinita através da reconstrução de matéria."
90001110-103 = "De fato, não importava quanto dano causássemos a Geburah ou Chokmah, eles se recuperavam instantaneamente."
90001110-104 = "Eles devem ter restaurado as partes danificadas em um instante."
90001110-105 = "Existe algo que possamos fazer contra um oponente assim?"
90001110-106 = "E, no fim das contas, ainda precisamos dar um jeito na Barreira Multidimensional."
90001110-107 = "[s] \"Como nós lidamos com isso naquela época mesmo?\""
90001110-108 = "Naquela época..."
90001110-111 = "Nosso objetivo era \"destruir a Arca de Atra-Hasis\" que estava acima de Kivotos."
90001110-114 = "No entanto, a Arca é protegida por uma barreira baseada na \"coexistência de estados\", que anula qualquer intervenção física."
90001110-115 = "Enquanto essa barreira existisse, qualquer abordagem física à Arca era considerada impossível — mas,"
90001110-117 = "Se colocássemos a \"Nave Mãe de Utnapishtim\" no mesmo estado, teoricamente seria possível atravessar a barreira."
90001110-119 = "No fim, como a Arca mudava de estado constantemente, não conseguimos nos sincronizar — e não atravessamos a barreira."
90001110-120 = "E, no final das contas..."
90001110-121 = "...!"
90001110-131 = "[ns] \"...!\""
90001110-136 = "Próximo episódio; Proposta"
