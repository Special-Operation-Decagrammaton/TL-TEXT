[translation]
90001110-1 = "第11話;行き止まり"
90001110-3 = "そちらはどうですか、リオ？"
90001110-4 = "分析結果のことかしら？"
90001110-5 = "はい。信号の消失が早すぎて詳細な分析ができませんでしたが……"
90001110-6 = "そうね……これはゲブラやコクマーとは別の、全く新しい預言者だわ。"
90001110-7 = "……ここにきてから3番目の預言者ですね。"
90001110-12 = "バーゲンセールみたい。いくらなんでも多くない？"
90001110-13 = "一つ欲しいですね。いくらですか？"
90001110-14 = "……能天気というかなんというか。"
90001110-15 = "信号の座標は記録しておいたわ。#n送信するわね。"
90001110-16 = "かなり離れていますね……？#n肉眼で確認したいところですが、そのためにヘリを移動させるのは……。"
90001110-17 = "あれほど強力な信号を発したこと自体、何らかの理由があるでしょうし。"
90001110-18 = "誘導してるってこと？"
90001110-19 = "[ruby=ゆうがとう]誘蛾灯[/ruby]ということですね。"
90001110-21 = "そうとは限りませんが、その可能性もあると思っています。"
90001110-22 = "[s] \"誘導されてるのなら、罠の可能性もあるよね……。\""
90001110-23 = "罠だろうと正面突破するのが特異現象捜査部！#nと言いたいところですが……。"
90001110-24 = "私は反対よ。非合理的だわ。"
90001110-25 = "うん。私もリオ会長の意見に賛成。"
90001110-26 = "はあ……誰も味方しないのなら、今回だけはヒマリ部長の意見を尊重します。#n申し訳ございませんリオ様。"
90001110-30 = "そ、そう……？"
90001110-34 = "適当な同情はやめていただけますか？#nまだどうするか決めてませんよ！？"
90001110-36 = "中途半端はダメだよ、部長。"
90001110-37 = "アイスブレイクですよ、アイスブレイク！"
90001110-38 = "罠だとしても気になるところではありましたが……リスクが大きすぎますね。#nやめておきましょう。"
90001110-39 = "偵察なら私のAMASを使えばいいわ。"
90001110-40 = "高速偵察を可能にしたドローンがあるの。"
90001110-41 = "それを信号の座標に送りましょう。"
90001110-42 = "あら、リオの用心深さが役立つこともあるんですね。"
90001110-43 = "いちいち嫌味を言わないと気が済まないのかしら？#n一番効率的な方法だと思うのだけれど。"
90001110-44 = "……もう！わかりました、私が悪かったですよ！ごめんなさい！"
90001110-47 = "ドローン巡航中。あと20分程度で目標地点に到着するわ。"
90001110-48 = "偵察映像を繋いで――"
90001110-49 = "――！？"
90001110-50 = "どうされました？"
90001110-51 = "……ドローンの信号が、消失したわ。"
90001110-52 = "どういうこと？"
90001110-53 = "言葉通りの意味よ。#nAMASの信号が途切れたの。"
90001110-54 = "途切れる直前の情報もないのですか？"
90001110-55 = "今、分析しているところよ……。"
90001110-56 = "これ、は……？"
90001110-57 = "……何があったのですか？"
90001110-58 = "資料を共有するわ。#nヒマリ、一緒に見てちょうだい。"
90001110-59 = "あなたが私に協力を要請するだなんて……本当に珍しいですね。#nつまり……。"
90001110-60 = "ええ……私は、自分の解釈が間違っていてほしいと願っているわ。"
90001110-65 = "[ns] \"大丈夫、なんだよね……？\""
90001110-66 = "まさか……これは……！"
90001110-67 = "……私の勘違いではなかったようね。"
90001110-68 = "そうですね、あなたがこれを間違えるはずがありません。#nそこは認めていますから。"
90001110-69 = "一体何があったのですか？"
90001110-70 = "結論から言うと、あの座標から検出されたのは――"
90001110-71 = "――「アトラ・ハシースの箱舟」を守っていた「多次元バリア」よ。"
90001110-72 = "[s] \"アトラ・ハシースの箱舟の……！？\""
90001110-77 = "ええ、間違いありません。"
90001110-78 = "でも、なんで今ここに？#nまたキヴォトスが真っ赤に染まったり、変な機械が出てきたりするの？"
90001110-86 = "不幸中の幸いというべきかは悩ましいですが……今回はそうはならないかと。"
90001110-87 = "ええ。少なくとも、次元干渉の兆候は起きていないわ。"
90001110-88 = "ですが、「多次元バリア」は存在するのですよね？"
90001110-89 = "はい。そして、これまでの情報から推測するに……。"
90001110-90 = "デカグラマトンの預言者が、「名もなき神」の力を使い始めたとみていいでしょう。"
90001110-91 = "そして、私たちが遭遇した「特異現象」の中でも最強格の多次元バリアを展開しているということは……。"
90001110-92 = "そこが敵の本拠地になるのかな？"
90001110-93 = "少なくとも、多次元バリアで隠すほどの何かがあるのは確実です。#n……それが判明したところで、私たちにできることはほとんどありませんが。"
90001110-94 = "多次元バリアを破るには、先生が用意してくださった「ウトナピシュティムの[ruby=もとぶね]本船[/ruby]」を頼るしかありませんでした。"
90001110-95 = "そんな「特異現象」は、二度も起こらないものです。"
90001110-99 = "[ns] \"そうだね……私もそう思う……。\""
90001110-100 = "認めたくはありませんが、八方塞がりです。"
90001110-101 = "「名もなき神」の力に対抗する方法が見つからない限り、事態の根本的な解決にはならないわ。"
90001110-102 = "そうですね。多次元バリアを抜きにしても、物質の再構築によって実質無限に近い回復力を持つ預言者はどうにもなりません。"
90001110-103 = "たしかに、ゲブラもコクマーもどれだけダメージを与えてもすぐに回復していました。"
90001110-104 = "破損した部分を一瞬で復元したのでしょうね。"
90001110-105 = "そんな相手に対して私たちができることってあるの？"
90001110-106 = "というか、結局多次元バリアもどうにかしないとだよね。"
90001110-107 = "[s] \"私たちはあの時どうやって対処してたんだっけ？\""
90001110-108 = "あの時は……。"
90001110-111 = "私たちの目標は、キヴォトス上空にある「アトラ・ハシースの箱舟を破壊する」こと。"
90001110-114 = "しかし、箱舟は物理的な介入を無効化する「状態の共存」によるバリアで保護されています。"
90001110-115 = "このバリアが存在する以上、箱舟に対しての物理的なアプローチは不可能とされていました――ですが、"
90001110-117 = "「ウトナピシュティムの[ruby=もとぶね]本船[/ruby]」を同様の状態にすれば、理論上はバリアを通過する事が可能です。"
90001110-119 = "結局、箱舟が常に状態を変化させていたため、それに合わせられず――バリアを通過できませんでした。"
90001110-120 = "そして、最終的には――"
90001110-121 = "……！"
90001110-131 = "[ns] \"……！\""
90001110-136 = "次回;提案"
