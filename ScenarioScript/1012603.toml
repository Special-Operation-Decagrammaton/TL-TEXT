[translation]
1012603-1 = "少女の声"
1012603-2 = "（いつも通り仕事をしていると……）"
1012603-6 = "[ns] \"知らない番号だ……。\""
1012603-7 = "（とりあえず出てみることにした）"
1012603-11 = "つ、つながった……！"
1012603-12 = "も、もしもしっ……？#n[USERNAME]先生ですか？"
1012603-13 = "[s] \"うん、そうだよ。こんにちは。\""
1012603-14 = "わあ！本当に[USERNAME]先生だ！えへへっ♡"
1012603-15 = "もしよろしければ、このまま少しお話しても……いいですか？"
1012603-16 = "[s] \"それはいいけど……君は？\""
1012603-17 = "ご、ごめんなさい！#nな、名前を言うのは……その、まだ恥ずかしくて……！"
1012603-18 = "で、でも！#n私……ずっと先生のことを見てたんです。"
1012603-19 = "先生は私のこと……ご存知ないかもしれませんけど、#n私は先生のことをよく知ってます。"
1012603-20 = "いつも優しく生徒に接している姿……#nそれがとってもカッコよくて……。"
1012603-21 = "その……ず、ずっと好きでした！#nわ、私と……おつきあいして……くれませんかっ？"
1012603-22 = "優しい先生と、毎日過ごせたらなって……ずっと憧れてて……！"
1012603-23 = "[s] （困ったな……）"
1012603-24 = "ううぅ……や、やっぱりダメですか……？"
1012603-25 = "[s1]（しっかり断らないと）\n[s2] \"とりあえず、シャーレの近くの公園で会おうか。\""
1012603-28 = "わあ！ありがとうございます！お待ちしていますねっ♪"
1012603-34 = "（仕事に区切りをつけて、約束の場所へ向かった）"
1012603-37 = "[ns] \"この辺にいると思うけど……。\""
1012603-38 = "ニャーオ……ンニャーオォ。"
1012603-39 = "ガァー！ガァー！"
1012603-40 = "[ns] \"猫とカラス、こんなに多かったっけ……？\""
1012603-41 = "不思議だよね……。#n外を歩いてると、いつも黒猫とカラスが寄ってくるんだ……。"
1012603-45 = "つまり、この子たちの鳴き声が聞こえたら、私が近くにいるってことだよぉ。"
1012603-46 = "[s] \"どうしてカノエがここに……？\""
1012603-47 = "待ってたよ……先生。"
1012603-48 = "[ns3] （何か、嫌な予感がする……）\n[ns4] （何かあったときのための退路を確認しよう……）"
1012603-51 = "イヒヒ、逃がさないよぉ。"
1012603-52 = "みんな……先生を捕まえて。"
1012603-53 = "ニャーオ！ンニャーオォ！"
1012603-54 = "ガァーッ！ガァァーッ！！"
1012603-67 = "（……あっという間に猫とカラスに取り囲まれてしまった）"
1012603-69 = "[ns] \"今日は先約があって……。\""
1012603-70 = "その約束の相手……私だよぉ。"
1012603-74 = "こんにちは、先生っ！来てくれてありがとうございます♪"
1012603-75 = "えへへっ、私とおつきあい……してくれるんですよねっ？"
1012603-76 = "[s5] \"あ、あの子が、カノエ……？\"\n[s6] \"声が全然違った……。\""
1012603-79 = "気づいたかなぁ……？#n私、声優専攻なんだぁ。"
1012603-80 = "今回は、恥ずかしがり屋さんな可愛い女の子を演じてみたけど――"
1012603-81 = "あの声を聞いてすぐに来るなんて……#n先生、ああいう子が好みだったんだねぇ……。"
1012603-82 = "[s] \"わ、私はやんわりと断るつもりだったんだよ！\""
1012603-86 = "そっかぁ。#nそれって、前世から結ばれてる私のために……？"
1012603-87 = "イヒッ、先生の思いはちゃあんと受け取ったよ。"
1012603-88 = "[s] \"結ばれてません！\""
1012603-89 = "でも、このまま先生を帰すわけにはいかないんだぁ……。"
1012603-90 = "実は、先生を呼びだしたのは……からかうためじゃなくて――"
1012603-94 = "今日は私が担当したASMRの発売日なんだぁ。"
1012603-95 = "だから、先生に感想聞きたくて。"
1012603-96 = "[s] \"CV板垣カノエのASMRってこと？\""
1012603-97 = "そう。#n自分で言うのもあれだけど、私、それなりの売れっ子なんだよぉ。"
1012603-98 = "イヒヒッ！どう？気になる？"
1012603-104 = "気になるよねぇ？#n……はい、イヤホン貸してあげる。"
1012603-106 = "（イヤホンをつけて、目を閉じ、音声に耳を澄ませると……）"
1012603-114 = "（……クール系の女の子が、照れながら子守唄を歌う内容だった）"
1012603-116 = "[ns] \"……こ、これもカノエの声なの！？\""
1012603-117 = "そ、そうだよ。"
1012603-118 = "やっぱり……私みたいな暗い女が歌う子守唄は……#n好みじゃなかった……？"
1012603-119 = "[s] \"そんなことないよ。すごくよかった。\""
1012603-123 = "イヒ、そっか……ありがと……。"
1012603-124 = "お礼に、音源をプレゼントするねぇ……。#nこれは、二人だけの秘密だよ……イヒヒッ。"
1012603-125 = "[s] \"言われなかったら、カノエだって気づけなかったよ。\""
1012603-126 = "他にも色んなものを演じられるよ。"
1012603-127 = "お化けや怪獣……環境音とかも。"
1012603-128 = "先生は……どんな声が好きぃ？"
1012603-129 = "なんでも言って？どんなものでも演じてみせるから。"
1012603-130 = "な・ん・で・も、ね。"
1012603-131 = "イヒッ……イヒヒヒッ……。"
1012603-133 = "（……その後、カノエの色んな声を聞きながら、#n束の間の休憩時間を過ごした）"
1012603-134 = "（周りの猫やカラスも、どこかくつろいでいるようだった……）"
