[translation]
10013010-1 = "第1話;やるべきことは一つ！"
10013010-6 = "みんな、ストッープ！止まってくださーい！"
10013010-7 = "あれ……アヤネちゃん？"
10013010-8 = "ちょっ、なんでここにいるの！？"
10013010-9 = "悪党に足止めされてるのかな。"
10013010-10 = "あら、それは大変ですね～。"
10013010-12 = "ち、違います！そうじゃなくて……"
10013010-14 = "あの……もしかして、先生のお知り合いですか……？"
10013010-15 = "[s] \"た、たぶん……？\""
10013010-16 = "覆面を被った見るからに怪しい方ともお知り合いだなんて……さすが主殿です！"
10013010-17 = "なっ！？誰が怪しいって！！"
10013010-18 = "[s] \"とりあえず、一旦状況を整理しようか。\""
10013010-20 = "（こうして互いに自己紹介をした）"
10013010-22 = "えっと……つまり、この人たちはアビドス高校の生徒ってこと？"
10013010-23 = "その覆面ってお祭り用品か何かですか？#nそれとも、アビドスにしかない独自の文化とか！？"
10013010-24 = "ゲヘナでは仮面をつけて参加するお祭りがあるらしいですが、アビドスは覆面なんですね！実にユニークです……ね、社長？"
10013010-26 = "あはは……別にそういうわけではないんですけど……"
10013010-28 = "だから、何度も言ってるけど私は委員長！社長じゃないわよ！"
10013010-29 = "それで、どうしてアビドスが襲ってくるわけ？私たちが何したって言うのよ！"
10013010-30 = "それはこっちの台詞よ！"
10013010-31 = "お祭り運営委員会ってことは、今回の「リゾート狩り」を起こした主犯でしょ？#nそれなのに、どうして先生はそんなやつらと一緒に――"
10013010-32 = "だから！それは誤解だって――"
10013010-40 = "あの……ひとまず落ち着いて……。"
10013010-41 = "あわ、あわわわ……い、イズナは……一体どうすれば……。"
10013010-48 = "あっ……ニヤ部長から電話だよ、先生。"
10013010-52 = "にゃはは～。ハロハロー、皆さん。お元気ですか～？"
10013010-53 = "私が席を外している間に、何やらトラブルの気配がプンプンしますねぇ～。#nそれは困るなぁ～。面白くならないか心配しとるんですけど。"
10013010-54 = "[s] \"心配してるようには見えないんだけど……。\""
10013010-55 = "ふむ。雰囲気から察するに、既に一悶着あったように見えますが～？"
10013010-56 = "……大事な時にちっとも顔を見せないくせによく言うわよ。#nそれで、陰陽部のトップが何の用？"
10013010-57 = "うふふっ、本題の前に棘のある言葉で盛り上げちゃうとこ、気に入りましたわぁ。"
10013010-58 = "とまぁ雑談はさておき……"
10013010-59 = "――実は先生がそちらへ出向いている間に、あれこれ調べてみたんですけどね。"
10013010-60 = "[ruby=かわわ]河和[/ruby]シズコさん、あなたが今巻き込まれてる騒動の大まかな概要が掴めましたよ～♪"
10013010-67 = "私が巻き込まれている……騒動……？"
10013010-68 = "最近、百夜堂で大きな事業に手を出してましたよね？"
10013010-69 = "……！なんでそれを知ってるのよ！？"
10013010-70 = "[s] \"大きな事業？シズコが？\""
10013010-71 = "先日、お祭り運営委員会が百鬼夜行の各サークルから調達した資金で、あるものを購入したことが判明しました。"
10013010-72 = "[s] \"投資……。\""
10013010-73 = "ただ、ここで問題なのは……シズコさんが買ったものが「架空の商品」だったということです。"
10013010-75 = "架空って……どういうこと？"
10013010-76 = "資料には、最近お祭り運営委員会が「ロスト・パラダイス・リゾートの使用権」を購入したと書いておりますけど……"
10013010-77 = "そもそも、この「ロスト・パラダイス・リゾート」は20年ほど前に倒産した会社の名前なんです。"
10013010-78 = "えっ……？"
10013010-79 = "さらに、この正体不明の使用権……お祭り運営委員会だけでなく他の人も手にしているという状況……"
10013010-80 = "おそらく、アビドスの皆さんもそうだったのではないですか？"
10013010-81 = "そ、そうよ！私たちも、商品が当たってここに……"
10013010-82 = "本当に私たちだけじゃなくて、アビドスも使用権を……？けど、そんなことって――"
10013010-83 = "……ここを見てください。私たちの契約書に、お祭り運営委員会の名前が……"
10013010-89 = "なになに……「ロスト・パラダイス・リゾートの投資及び経営統括：百鬼夜行連合学院 お祭り運営委員会」……？"
10013010-90 = "ちょ、ちょっと待って！なんで他の人が持ってる書類に私たちの名前が！？#nこれ、どう見てもニセモノ――"
10013010-94 = "って、あれ！？なんでうちの委員会のハンコが押されてるの！？#nえ、ええっ！？"
10013010-95 = "つまり、あなたは騙されたんですよ、シズコさん。"
10013010-96 = "お祭り運営委員会が購入した使用権が他のところにもばら撒かれ、不当条項と解釈せざるを得ない文章によって――"
10013010-97 = "[s] \"「リゾート狩り」が起きてしまった……？\""
10013010-98 = "つかぬことを聞きますが、その使用権……どこで買ったものなんです？"
10013010-99 = "それは……"
10013010-101 = "あとはここにハンコを……よし、これでいいのよね？"
10013010-102 = "ええ！これで、お祭り運営委員会の基金は私ども「オクトパスバンク」が管理する特別商品に投資されました！"
10013010-103 = "お客様は今夏、複合リゾート施設「ロスト・パラダイス」にて海の家を経営されたいとのことでしたね！素晴らしい計画だと思います！"
10013010-104 = "近々、リゾート施設の運営責任者も募集いたしますので、そちらも何卒よろしくお願いいたします。"
10013010-106 = "どこに問題があるの？ちゃんと契約書は隅から隅まで読んだわよ！？"
10013010-107 = "その契約書自体がお遊びだった、ってことですねぇ。"
10013010-108 = "こちらで調査した情報によると、そもそもオクトパスバンク自体に使用権を売る権利があるのかすら怪しいと申しますか……"
10013010-109 = "か、仮にそうだったとしても架空の商品なら、書類自体が違法って事でしょ？#nそれなら、このまま帰って契約を取り消せば……！"
10013010-111 = "ちょっと待って――今、オクトパスバンクって言った？"
10013010-112 = "えっ？う、うん……"
10013010-117 = "あー、そっかぁ……だとすると、そう簡単に事は進まないと思う。"
10013010-118 = "[s] \"ホシノ、どういう意味？\""
10013010-120 = "……"
10013010-121 = "実は、そのオクトパスバンクという社名は……"
10013010-122 = "……「カイザーローン」のダミー会社の一つです。"
10013010-123 = "[s] \"カイザーローン！？\""
10013010-124 = "はい。今、お話していたやり口は私たちもよく知っています……間違いなくカイザーローンの手法です。"
10013010-125 = "うん……おそらく、ここで起きている事件の背後にはカイザーコーポレーションがいる。"
10013010-126 = "あいつら全ッ然手口が変わってないじゃん！#n私ら、カイザーに何度も騙されたんだよ！"
10013010-128 = "まさか、こんなところで出くわすなんて……"
10013010-129 = "なるほどねぇ……そっか、あいつらが……"
10013010-130 = "おそらく、カイザーコーポレーションは最初からお祭り運営委員会を狙っていたんでしょうねぇ。"
10013010-131 = "お祭り運営委員会が持っている百鬼夜行連合学院の学園祭開催権限は、向こうにとっては美味しい獲物でしょうし――"
10013010-132 = "[s] \"アビドスの時みたいに、今度は百鬼夜行が……。\""
10013010-133 = "いやぁ～、やられちゃいましたね、シズコさん♪"
10013010-134 = "うぐぅ……！"
10013010-135 = "でも、ちょっと意外です。シズコさんらしくないと言いますかぁ……"
10013010-136 = "なんでそんな胡散臭いものに投資なんてしたんです？"
10013010-137 = "まさか――お金が必要だった、とか？"
10013010-138 = "それは……"
10013010-140 = "違います！社長は――"
10013010-141 = "……いや、いいよ、ウミカ。ニヤの言う通りだし。"
10013010-142 = "[s] \"シズコ？\""
10013010-143 = "……認めたくはないけど、もう起きちゃったことは仕方ないから。"
10013010-144 = "お金が必要だから事業に投資して……結局はこんなことになっちゃった。"
10013010-145 = "本当にそれだけのこと。言い訳をするつもりもないですし。"
10013010-146 = "社長……"
10013010-147 = "私のせいでこうなったのは事実だからね。だから――みんな、ごめんなさい。"
10013010-148 = "あ、いや、その……まあ、謝ってくれるなら……"
10013010-149 = "過ぎたことを責めても仕方ないよ、セリカ。"
10013010-150 = "真っ先に走っていった先輩がそれ言う！？"
10013010-151 = "[s] \"問題はこれからどうするか、だね。\""
10013010-153 = "ふむ……そうですねぇ、ひとまず学院に帰ってきてください、シズコさん。"
10013010-154 = "……えっ？"
10013010-155 = "外部勢力がお祭り運営委員会を狙ったということは、百鬼夜行連合学院への攻撃に他なりません。"
10013010-156 = "ですので、ここからは私たち陰陽部が引き継ぎます。向こうが汚い手を使うのなら、こちらも相応の対処をするまで。"
10013010-157 = "というわけで、そちらはすぐにでも帰還を――"
10013010-159 = "それはできない。"
10013010-163 = "……はい？"
10013010-164 = "……どういうことですか？"
10013010-165 = "たしかに、ここを離れたら問題は回避できるかもしれない。"
10013010-166 = "ええ。ですから、まずは帰還し、状況を整理してから次の手を――"
10013010-167 = "でも、それじゃあ何も解決しないのよ。"
10013010-168 = "……？"
10013010-169 = "もちろん、ニヤの言ってることも分かってるつもり。"
10013010-170 = "でも、学院に帰った所で契約書に百夜堂の名前が残っている限り、どんどん百鬼夜行の名前が……ブランド価値が下がってしまう。"
10013010-171 = "[s] \"それはかなり深刻だね……。\""
10013010-172 = "そうなんです！この件は、学院はもちろんの事、百鬼夜行の観光事業に対する信頼にも直結する問題なんです！"
10013010-173 = "だから、このまま黙って引き下がるわけにはいきません。私が直接解決します！"
10013010-174 = "つまり……ブランド価値が下がるのが嫌だから意地を張る、ということですか？"
10013010-175 = "そ、その言い方はないでしょ！"
10013010-176 = "やれやれ、理解できませんねぇ。なんでそんなに苦労して回りくどいことを……"
10013010-178 = "それは、私がそうしたいからよ。"
10013010-182 = "それに、ブランド価値以外にも理由があるというか……"
10013010-183 = "と、とにかく！そういうことなの！"
10013010-184 = "もちろん、今回の件はあくまで私のミスで起きたことだから――"
10013010-185 = "私一人で対処するわ。だから、みんなは何も心配しないで……"
10013010-186 = "[s] \"私たちも手伝うよ。\""
10013010-187 = "えっ……？いや、先生の手を借りなくても……"
10013010-188 = "何を言ってるんですか、シズコちゃん。#n私たちはシズコちゃんを手伝うためにここに来たんですよ。"
10013010-189 = "そうだよ～部長はケチだから、代わりに手伝ってあげる。"
10013010-191 = "ちょっ、チセ！？"
10013010-193 = "みなさん……！"
10013010-194 = "もちろん、イズナもお手伝いしますよ！主殿が一緒なら、百人力です！"
10013010-196 = "……一応聞きますけど、何か策はあるんです？"
10013010-197 = "彼女たちの話から、オクトパスバンクを問い詰めても無駄ってことは分かった。"
10013010-198 = "でも、ここで泣き寝入りしていても「リゾート狩り」が続くだけ……"
10013010-199 = "なら、発想を逆転させればいいのよ！"
10013010-200 = "発想を逆転、ですか……？"
10013010-201 = "やることは単純明快。私たちが直接「リゾート狩り」を乗っ取るだけよ！"
10013010-202 = "おー、大胆だねぇー。"
10013010-203 = "[s] \"そんなことして大丈夫なの！？\""
10013010-204 = "もちろん、ただ奪おうってわけじゃないですよ！"
10013010-205 = "「リゾート使用権」の権利者が私たちの名前になっているということは、裏を返せば、他の契約者たちは私たちの権利を一部譲り受ける形で契約してるって事です。"
10013010-206 = "おそらく、あの時銀行員が話していた「リゾート施設の運営責任者」っていうのが、これに該当するんだと思います。"
10013010-208 = "ふむふむ……たしかに、書面上ではそんな感じに書いてありますね～。"
10013010-209 = "この運営責任者って、元々はあの廃墟を管理するのが役目だったってこと？"
10013010-211 = "おそらくそうですね……現在、この群島にいる問題児たちは、"
10013010-212 = "各々何らかの形でオクトパスバンクと契約を結んでいると見ていいでしょう。"
10013010-213 = "ですが、運営責任者は私……つまり、彼女らはこのリゾートを不法占拠しているとも言い換えられます。"
10013010-214 = "――そう、契約書の隙を突きます！"
10013010-215 = "私たちが「リゾート狩り」をし、問題児から契約書を回収する！#nいわば敵対的[ruby=合併・買収]M&A[/ruby]、というやつです！"
10013010-216 = "それに、このまま退くなんてもっての外ですからね。#nこのままでは私の[ruby=こけん]沽券[/ruby]に関わります！"
10013010-217 = "今こそ百夜堂の実力を見せてやりましょう！"
10013010-218 = "ロスト・パラダイス・リゾートの全てを吸収して、"
10013010-219 = "百夜堂楽園リゾートという名前に変えてやります！"
10013010-220 = "[s] \"うん、一緒に頑張ろう！\""
10013010-224 = "……はい！"
10013010-226 = "うへ～……それじゃあ私たちも、ちょっとだけ手を貸そうか～"
10013010-227 = "はい！みんなでお手伝いしましょう～！"
10013010-228 = "まぁ……相手があのカイザーなら仕方ないわね。#nやられた分はきっちり返してやりたいし！"
10013010-230 = "みんな……"
10013010-231 = "ありがとう！それじゃ、まずは情報交換からしましょ！"
