[translation]
10013010-1 = "Episódio 1: Só há uma coisa a se fazer!"
10013010-6 = "Pessoal, parem! Por favor, parem!"
10013010-7 = "Ué... Ayane?"
10013010-8 = "Ei, por que você está aqui!?"
10013010-9 = "Será que foram detidas por vilões?"
10013010-10 = "Ora, isso é um problema, não é?"
10013010-12 = "N-não é isso! Não é nada disso..."
10013010-14 = "Diga-me... por acaso, vocês conhecem o Sensei...?"
10013010-15 = "[s] \"T-talvez...?\""
10013010-16 = "Conhecer alguém que usa máscara e parece tão suspeito... como esperado do meu mestre!"
10013010-17 = "O quê!? Quem você está chamando de suspeita!?"
10013010-18 = "[s] \"Por enquanto, vamos organizar a situação.\""
10013010-20 = "(Assim, eles se apresentaram uns aos outros)"
10013010-22 = "Hum... então, essas pessoas são alunas da escola Abydos?"
10013010-23 = "Essas máscaras são artigos de festival ou algo assim? #nOu seria uma cultura única de Abydos!?"
10013010-24 = "Em Gehenna, parece que existem festivais onde se usa máscara, mas em Abydos são máscaras faciais, né! É realmente único... não é, presidente?"
10013010-26 = "Ahaha... não é bem assim, na verdade..."
10013010-28 = "Já disse várias vezes, eu sou a presidente do comitê! Não sou presidente de empresa!"
10013010-29 = "E então, por que Abydos está nos atacando? O que nós fizemos para vocês!?"
10013010-30 = "Essa é a nossa pergunta!"
10013010-31 = "Se vocês são o Comitê de Operações do Festival, então são os principais culpados por essa \"Caça ao Resort\", certo? #nMesmo assim, por que o Sensei está com esse tipo de gente—"
10013010-32 = "Eu já disse! Isso é um mal-entendido—"
10013010-40 = "Ei... vamos nos acalmar por um instante..."
10013010-41 = "Ah, ahhh... o que, o que a Izuna deve fazer..."
10013010-48 = "Ah... é uma ligação da chefe Niya, Sensei."
10013010-52 = "Nya-haha~. Alô, alô, pessoal. Como vão?"
10013010-53 = "Enquanto eu estava fora, sinto um cheiro forte de problemas por aí~. #nIsso é um problema. Estou preocupada que as coisas não fiquem interessantes."
10013010-54 = "[s] \"Não parece que você está preocupada...\""
10013010-55 = "Hum. Pela atmosfera, parece que já houve um desentendimento, não é?"
10013010-56 = "...Você fala muito bem, considerando que nunca aparece nas horas importantes. #nE então, o que a líder do Departamento Yin-Yang quer?"
10013010-57 = "Ufufu, gostei de como você animou as coisas com palavras afiadas antes de entrar no assunto."
10013010-58 = "Bem, deixando a conversa fiada de lado..."
10013010-59 = "—Na verdade, enquanto o Sensei estava indo até aí, eu andei investigando algumas coisas."
10013010-60 = "Shizuko Kawawa, consegui entender o resumo da confusão em que você está envolvida~♪"
10013010-67 = "Confusão... em que estou envolvida...?"
10013010-68 = "Recentemente, a Hyakkiyako esteve envolvida em um grande projeto, não foi?"
10013010-69 = "...! Como você sabe disso!?"
10013010-70 = "[s] \"Um grande projeto? A Shizuko?\""
10013010-71 = "Descobrimos que, recentemente, o Comitê de Operações do Festival comprou algo usando fundos obtidos de vários clubes de Hyakkiyako."
10013010-72 = "[s] \"Investimento...\""
10013010-73 = "No entanto, o problema aqui é que... o que a Shizuko comprou era um \"produto fictício\"."
10013010-75 = "Fictício... o que você quer dizer com isso?"
10013010-76 = "Nos documentos, está escrito que o Comitê de Operações do Festival comprou o \"Direito de Uso do Resort Paraíso Perdido\"..."
10013010-77 = "Mas, para começar, esse \"Resort Paraíso Perdido\" é o nome de uma empresa que faliu há cerca de 20 anos."
10013010-78 = "Hã...?"
10013010-79 = "Além disso, esse direito de uso misterioso... parece que não apenas o Comitê de Operações do Festival, mas outras pessoas também o possuem..."
10013010-80 = "Provavelmente, o pessoal de Abydos também estava nessa situação, não é?"
10013010-81 = "I-isso mesmo! Nós também ganhamos o produto e viemos para cá..."
10013010-82 = "Sério que não fomos só nós, e Abydos também tem o direito de uso...? Mas, como isso é possível—"
10013010-83 = "...Olhem aqui. No nosso contrato, o nome do Comitê de Operações do Festival está..."
10013010-89 = "O que é isso... \"Investimento e Gestão Geral do Resort Paraíso Perdido: Comitê Executivo do Festival da Academia Hyakkiyako\"...?"
10013010-90 = "E-espera um pouco! Por que o nosso nome está em um documento que outra pessoa está segurando!?#nIsso, de qualquer jeito que se olhe, é falso—"
10013010-94 = "Espera, o quê!? Por que o carimbo do nosso comitê está aqui!?#nE-ei, o quê!?"
10013010-95 = "Em suma, você foi enganada, Shizuko-san."
10013010-96 = "O direito de uso que o Comitê Executivo do Festival comprou foi distribuído para outros lugares, e através de cláusulas que só podem ser interpretadas como abusivas—"
10013010-97 = "[s] \"Uma 'caça ao resort' aconteceu...?\""
10013010-98 = "Desculpe perguntar, mas esse direito de uso... onde você o comprou?"
10013010-99 = "Isso é..."
10013010-101 = "Agora, é só colocar o carimbo aqui... pronto, assim está bom, né?"
10013010-102 = "Sim! Com isso, o fundo do Comitê Executivo do Festival foi investido em um produto especial gerenciado por nós, o \"Octopus Bank\"!"
10013010-103 = "Você disse que gostaria de administrar uma casa de praia no complexo de resort \"Paraíso Perdido\" neste verão, não foi? Acho um plano maravilhoso!"
10013010-104 = "Em breve, também recrutaremos um responsável pela operação das instalações do resort, então contamos com a sua colaboração."
10013010-106 = "Onde está o problema? Eu li o contrato de ponta a ponta, sabia!?"
10013010-107 = "O problema é que o contrato em si era uma brincadeira."
10013010-108 = "De acordo com as informações que investigamos aqui, é duvidoso até mesmo se o Octopus Bank tem o direito de vender o direito de uso..."
10013010-109 = "M-mesmo que fosse esse o caso, se é um produto fictício, o documento em si é ilegal, certo?#nNesse caso, é só voltar lá e cancelar o contrato...!"
10013010-111 = "Espera um pouco— você disse Octopus Bank agora há pouco?"
10013010-112 = "Hã? S-sim, é..."
10013010-117 = "Ah, entendi... se for esse o caso, acho que as coisas não vão ser tão simples."
10013010-118 = "[s] \"Hoshino, o que você quer dizer?\""
10013010-120 = "……"
10013010-121 = "Na verdade, o nome da empresa Octopus Bank é..."
10013010-122 = "...uma das empresas de fachada da \"Kaiser Loan\"."
10013010-123 = "[s] \"Kaiser Loan!?\""
10013010-124 = "Sim. Nós conhecemos muito bem o modo de operação que você descreveu... é sem dúvida o método da Kaiser Loan."
10013010-125 = "Sim... provavelmente, a Kaiser Corporation está por trás do incidente que está acontecendo aqui."
10013010-126 = "Eles não mudaram nada o jeito de agir!#nNós já fomos enganadas pela Kaiser várias vezes!"
10013010-128 = "Quem diria que encontraríamos eles em um lugar desses..."
10013010-129 = "Entendi... então é isso, eles..."
10013010-130 = "Provavelmente, a Kaiser Corporation estava de olho no Comitê Executivo do Festival desde o início."
10013010-131 = "O direito de realizar o festival escolar da Academia Hyakkiyako que o Comitê Executivo do Festival possui deve ser uma presa deliciosa para eles—"
10013010-132 = "[s] \"Assim como aconteceu em Abydos, agora é a vez de Hyakkiyako...\""
10013010-133 = "Nossa, vocês foram pegas, Shizuko-san♪"
10013010-134 = "Ugh...!"
10013010-135 = "Mas, estou um pouco surpresa. Não parece ser a sua cara, Shizuko-san..."
10013010-136 = "Por que você investiu em algo tão suspeito?"
10013010-137 = "Será que... você precisava de dinheiro?"
10013010-138 = "Isso é..."
10013010-140 = "Não é isso! A presidente estava—"
10013010-141 = "...Não, tudo bem, Umika. A Niya está certa."
10013010-142 = "[s] \"Shizuko?\""
10013010-143 = "...Não quero admitir, mas o que aconteceu, aconteceu."
10013010-144 = "Eu precisava de dinheiro, então investi no negócio... e no fim, acabou assim."
10013010-145 = "É só isso. Não pretendo dar desculpas."
10013010-146 = "Presidente..."
10013010-147 = "É um fato que isso aconteceu por minha causa. Por isso... pessoal, me desculpem."
10013010-148 = "Ah, não, é que... bem, se você está pedindo desculpas..."
10013010-149 = "Não adianta culpar o que já passou, Serika."
10013010-150 = "A veterana que saiu correndo na frente é quem diz isso!?"
10013010-151 = "[s] \"O problema é o que faremos daqui para frente, né?\""
10013010-153 = "Hum... entendo. Por enquanto, por favor, retorne à academia, Shizuko-san."
10013010-154 = "……Eh?"
10013010-155 = "O fato de forças externas terem visado o comitê organizador do festival não é nada menos que um ataque à Academia Hyakkiyako."
10013010-156 = "Portanto, a partir daqui, nós do Departamento Yin-Yang assumiremos o controle. Se eles querem jogar sujo, nós também tomaremos as medidas cabíveis."
10013010-157 = "Sendo assim, retorne imediatamente para cá—"
10013010-159 = "Isso não é possível."
10013010-163 = "……Sim?"
10013010-164 = "……O que quer dizer com isso?"
10013010-165 = "Certamente, se sairmos daqui, talvez possamos evitar o problema."
10013010-166 = "Sim. Por isso, primeiro retorne, organize a situação e então decidiremos o próximo passo—"
10013010-167 = "Mas isso não resolveria nada."
10013010-168 = "……?"
10013010-169 = "Claro, eu entendo o que a Niya está dizendo."
10013010-170 = "Mas, se voltarmos para a academia enquanto o nome da Hyakkiyado estiver no contrato, o nome de Hyakkiyako... o valor da nossa marca, continuará caindo."
10013010-171 = "[s] \"Isso é bem sério...\""
10013010-172 = "Exatamente! Este assunto está diretamente ligado não só à academia, mas também à confiança no setor de turismo de Hyakkiyako!"
10013010-173 = "Por isso, não posso simplesmente ficar de braços cruzados. Eu mesma vou resolver isso!"
10013010-174 = "Em outras palavras... você está sendo teimosa só porque não quer que o valor da marca caia?"
10013010-175 = "E-essa não é uma forma de dizer as coisas!"
10013010-176 = "Puxa vida, eu não entendo. Por que se esforçar tanto e fazer algo tão complicado..."
10013010-178 = "É porque é isso que eu quero fazer."
10013010-182 = "Além disso, tem outros motivos além do valor da marca..."
10013010-183 = "E-enfim! É isso!"
10013010-184 = "Claro, como este caso aconteceu por um erro meu—"
10013010-185 = "Eu vou lidar com isso sozinha. Então, não se preocupem com nada..."
10013010-186 = "[s] \"Nós também vamos ajudar.\""
10013010-187 = "Eh...? Não, não precisa da ajuda do Sensei..."
10013010-188 = "O que está dizendo, Shizuko-chan? #nNós viemos aqui justamente para ajudar você."
10013010-189 = "É isso aí~ A chefe é muito mão de vaca, então vamos ajudar no lugar dela."
10013010-191 = "Ei, Chise!?"
10013010-193 = "Pessoal...!"
10013010-194 = "Claro, eu, Izuna, também ajudarei! Se o meu mestre estiver junto, valemos por cem!"
10013010-196 = "……Vou perguntar por precaução, você tem algum plano?"
10013010-197 = "Pelo que elas disseram, entendi que não adianta pressionar o Octopus Bank."
10013010-198 = "Mas, se ficarmos aqui chorando, a \"caça ao resort\" só vai continuar..."
10013010-199 = "Então, só precisamos inverter a lógica!"
10013010-200 = "Inverter a lógica, você diz...?"
10013010-201 = "O que faremos é simples e claro. Nós mesmas vamos tomar o controle da \"caça ao resort\"!"
10013010-202 = "Oh, que ousado."
10013010-203 = "[s] \"Fazer algo assim é seguro!?\""
10013010-204 = "Claro, não é como se fôssemos apenas roubar!"
10013010-205 = "O fato de o nosso nome constar como detentor do \"direito de uso do resort\" significa, por outro lado, que os outros contratantes assinaram o contrato recebendo uma parte dos nossos direitos."
10013010-206 = "Provavelmente, o \"responsável pela operação das instalações do resort\" que o bancário mencionou naquela hora se refere a isso."
10013010-208 = "Hum hum... De fato, está escrito algo assim nos documentos~."
10013010-209 = "Então, o papel desse responsável pela operação era originalmente gerenciar aquelas ruínas?"
10013010-211 = "Provavelmente sim... Podemos considerar que os encrenqueiros que estão neste arquipélago atualmente,"
10013010-212 = "assinaram contratos com o Octopus Bank de alguma forma."
10013010-213 = "Porém, a responsável pela operação sou eu... ou seja, pode-se dizer que elas estão ocupando este resort ilegalmente."
10013010-214 = "—Isso mesmo, vamos explorar as brechas do contrato!"
10013010-215 = "Nós vamos fazer a \"caça ao resort\" e recuperar os contratos dos encrenqueiros! #nÉ o que chamam de M&A hostil!"
10013010-216 = "Além disso, recuar agora está fora de cogitação. #nIsso mancharia a minha reputação!"
10013010-217 = "Agora é a hora de mostrar o verdadeiro poder da Hyakkiyako!"
10013010-218 = "Vamos absorver tudo do Lost Paradise Resort,"
10013010-219 = "e mudar o nome para Hyakkiyako Paradise Resort!"
10013010-220 = "[s] \"Sim, vamos nos esforçar juntos!\""
10013010-224 = "……Sim!"
10013010-226 = "Uhee... Então acho que nós também vamos dar uma mãozinha..."
10013010-227 = "Sim! Vamos todos ajudar!"
10013010-228 = "Bem... se o oponente é a Kaiser, não tem jeito. #nEu quero devolver na mesma moeda tudo o que fizeram com a gente!"
10013010-230 = "Pessoal……"
10013010-231 = "Obrigada! Então, vamos começar trocando informações!"
