[translation]
103060-1 = "第6話;ウトナピシュティムの本船（１）"
103060-6 = "……。"
103060-7 = "へぇ～、ここがブリッジかぁ。#n結構ちゃんとしてるんだね。"
103060-8 = "ここは……オペレーションルーム……？"
103060-16 = "あっ！これ、操縦席だよね？"
103060-17 = "想定よりも規模が大きいです……#nざっと見積もっても、10名以上いないと動かせないかと……"
103060-19 = "……戦艦内部の他にも、地上で管制する人員も考慮しなくてはなりませんね。"
103060-20 = "そ、そうですね……戦車1台でも4～5名は必要ですし、#nこれほどの規模となると……"
103060-21 = "それに、未知の領域が多いオーパーツでもあります……#n情報の解析・分析及び操作のサポートなど……人手は多いに越したことはありません。"
103060-26 = "「シャーレ」に協力を要請しましょう。"
103060-27 = "技術者やハッカー、戦略に戦術、管理者など……可能な限りの人員をお願いできますか？"
103060-28 = "[s] \"分かった。みんなを招集するね。\""
103060-29 = "チーちゃん、聞こえていますか？#n今からと～っても忙しくなりますよ？"
103060-33 = "はぁ……私たち、全然休めてないんだけど。#nそれも考慮しておいてくれる？"
103060-34 = "それにしても「宇宙戦艦」、ねぇ……#nあの子たちが知ったら、騒がしくなりそう……"
103060-41 = "う！"
103060-42 = "ちゅう～"
103060-43 = "せーん！"
103060-44 = "かん！"
103060-46 = "ほら、言わんこっちゃない……"
103060-47 = "これが戦艦なのですね！古代技術の賜物でしょうか？……詳しくは分かりませんが、今からじっくりぶん……解析しても良いのですね？ "
103060-48 = "宇宙戦艦……古代文明……ふふっ、これは研究のし甲斐があるね！"
103060-50 = "私たちの研究は無駄じゃなかった。みんなは「宇宙戦艦なんて」と馬鹿にしたけど……アリス、あなたのレールガンはその叡智の粋だよ。"
103060-52 = "はい、時代は「宇宙RPG」です！このジャンルは最高です！"
103060-56 = "ちょ、ちょっとアリスちゃん！？"
103060-57 = "なんでここにいるの！？"
103060-58 = "えっと……宇宙戦艦が発見されたと聞いたので、エンジニア部のみなさんと――"
103060-59 = "ダメよ！大人しくミレニアムにいるって約束したじゃない！#nリオ会長がどこにいるのかまだ分かってないのに――"
103060-60 = "会長に見つかったら、今度こそ危険な目に遭ってしまうかもしれないのよ？"
103060-61 = "で、ですが「宇宙勇者」が……"
103060-62 = "「宇宙勇者」とか変なこと言ってないで、ミレニアムに戻って！#nあそこはノアに任せてあるから……"
103060-64 = "この、冷酷算術妖怪！なんでそんなひどい事言えるのさ！"
103060-65 = "お、お姉ちゃん……それは言い過ぎ……"
103060-66 = "ま、またあだ名が…… "
103060-72 = "ユウカちゃん、そのお話でいくのなら――キヴォトスのどこよりも[ruby=そこ]宇宙戦艦[/ruby]が安全だと思いますよ？"
103060-73 = "あれ、ノア？"
103060-84 = "リオ会長はあらゆるものを掌握したがりますから。#nそれこそ、ミレニアム自治区は会長の掌の上ではないでしょうか？"
103060-85 = "そ、そうかしら……"
103060-86 = "はい。ですが、宇宙戦艦までは流石に会長も掌握できていないかと。#n会長から逃れるのであれば、そこが一番安全な場所になります。"
103060-87 = "ですので、アリスちゃんとゲーム開発部を送り出しました。#nユウカちゃんが面倒を見てくれるのであれば、大丈夫でしょう？"
103060-88 = "いや、急に言われても困るんだけど！？#nそれならそうと事前に共有して！"
103060-89 = "アリスちゃんを狙っているのは会長だけじゃないのよ？"
103060-90 = "まぁ私がいるから、まだマシかもしれないけど……"
103060-94 = "って、あれ？"
103060-100 = "あ、アリスちゃんはどこに！？ "
103060-102 = "ふふっ。では、よろしくお願いしますね、ユウカちゃん。#nそれと……あまり無理はしないでくださいね。"
103060-103 = "ノア……"
103060-104 = "ミレニアムのことはご心配なく。私たちに任せてください。"
103060-109 = "はぁ……遊びに来たわけじゃないのに、本当にもう……"
103060-113 = "ふむ……内部の構造はこうなっているのだね。 "
103060-114 = "配線や配管は、思ったより単純な構造ですね！オーパーツとはいえ、重力と物理法則は無視できないのでしょうか？"
103060-115 = "そうなのかもしれないね。ヴェリタスが戦艦のオペレーティングシステムを分析してくれている間に、私たちも戦艦のハードウェア解析を急ごうじゃないか。"
103060-116 = "はい！では私はあちらを見てきますね！"
103060-118 = "分かった。じゃあ、私はこっちを担当するね。"
103060-122 = "……コードアルゴリズムの分析完了。"
103060-123 = "コタマ、アクセスできる？"
103060-129 = "はい。中央処理装置へのアクセス成功。問題ありません。"
103060-132 = "副部長が手伝ってくれて助かったよ～！"
103060-133 = "正直、もっと時間かかると思ってた。"
103060-139 = "これが、戦艦のメインシステム……"
103060-140 = "見慣れない言語だけど、なんとか解析はできそう。"
103060-142 = "ヒマリ、アクセスに成功したよ。#n今から接続コードを送るから、ちょっと見てくれる？"
103060-143 = "ええ、分かりました。#nありがとうございます、チーちゃん。"
103060-147 = "ヒマリさん、いかがですか？"
103060-148 = "戦艦のメインシステムへの接続は完了しました。#nここから始めていきます。まだ、制御には至りませんが――"
103060-149 = "なるほど……中枢を制御できれば、全体の掌握が可能になる、と。"
103060-150 = "……ええ、その通りです。"
103060-155 = "では、教えてくださいな――古代技術によって生み出された、[ruby=あなた]オーパーツ[/ruby]の正体を。"
103060-161 = "これは……"
103060-164 = "……こちらが、この戦艦の全体像です。"
103060-165 = "たしかに、船のように見えますね。#nだから、ウトナピシュティムの「本船」と呼ぶのでしょうか……？"
103060-166 = "――全長135m×23m×13m。内部に15のエリアが存在するものの、詳細は不明…… "
103060-170 = "そして……この戦艦には、武器と呼べるものが見当たりません。"
103060-171 = "戦うために作られたわけではない、のでしょうか……#n「戦艦」ではない別の何か……？"
103060-172 = "……判断するのはまだ早いかと。もう少し解析を進めていきましょう。"
103060-178 = "ふむ……。"
103060-179 = "……。"
103060-181 = "……。"
103060-185 = "現在、キヴォトスに顕現しているアレは、私の認知領域に存在しない敵……"
103060-186 = "その正体は、「名もなき神」や「忘れられた神々」であろうと知ることのない不可解な存在。"
103060-187 = "ですが、一つだけ言えるのは――アレは、本来私たちの所有物である「アトラ・ハシースの箱舟」の能力をコピーしているという事。"
103060-188 = "そして……王女よ、あなたはご存知ないでしょうが――"
103060-189 = "今、あなたが立っている「オーパーツ」は……遠い昔、私たちの敵が箱舟に対抗すべく生み出した対箱舟用の「決戦兵器」なのです。"
103060-190 = "幸いにして、過去一度も使われたことはありませんが…… "
103060-191 = "王女よ……あなたは今――"
103060-195 = "自身の脅威である「天敵」に乗っているのです。"
103060-196 = "一刻も早く、ここから立ち去ってください。"
103060-197 = "あなたが私を拒絶したことは理解しています。私の存在を否定したことも。"
103060-198 = "ですが……私はあなたを「本来の存在理由」に導くために存在しております。"
103060-199 = "あなたが死ぬことを望みません。"
103060-200 = "早く、このウトナピシュティムから……離れてください。"
103060-201 = "この兵器は、起動した瞬間……「名もなき神々の王女」――あなたに牙を剥くでしょう。"
103060-203 = "あなたを、破壊しようとするでしょう。#nだから、早く逃げてください。"
103060-204 = "これは警告ではなく―― "
103060-208 = "――私の願い、です。"
103060-210 = "次回;ウトナピシュティムの本船（２）"
