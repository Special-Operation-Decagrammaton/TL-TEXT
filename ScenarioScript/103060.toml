103060-1 = "Episódio 6; Navio principal de Utnapishtim (1)"
103060-6 = "……."
103060-7 = "Ei, esta é a ponte. #nVocê está indo muito bem."
103060-8 = "Isto é... uma sala de operação...?"
103060-16 = "Ah! Esta é a cabine, certo?"
103060-17 = "É maior do que eu esperava...#nMesmo que eu faça uma estimativa aproximada, acho que seriam necessárias pelo menos 10 pessoas para executá-lo..."
103060-19 = "...Além do interior do navio de guerra, também temos que considerar o pessoal que controla o terreno."
103060-20 = "Bom, isso mesmo... são necessárias de 4 a 5 pessoas para apenas um tanque, e quando se trata dessa escala..."
103060-21 = "Além disso, Oparts tem muitas áreas desconhecidas... #nAnálise de informações, suporte às operações, etc....Mais mão de obra é melhor."
103060-26 = "Vamos solicitar a cooperação da \"Placa de Petri\"."

103060-27 = "Engenheiros, hackers, estratégias, táticas, administradores, etc... Você poderia fornecer o maior número de pessoas possível?"
103060-28 = "[s] \"Tudo bem. Vou ligar para todo mundo.\""
103060-29 = "Chi-chan, você pode me ouvir? #nVocê vai ficar muito ocupado de agora em diante, não é?"
103060-33 = "Suspiro... não conseguimos descansar de jeito nenhum. #nVocê poderia levar isso em consideração?"
103060-34 = "Enfim, \"Navio de Batalha Espacial\", hein...#nSe aquelas crianças descobrissem, provavelmente fariam barulho..."

103060-41 = "cormorão!"
103060-42 = "Chuu ~"
103060-43 = "Ver!"
103060-44 = "intuição!"
103060-46 = "Olha, não vou falar nada..."
103060-47 = "Este é um navio de guerra! É o resultado de tecnologia antiga? ...Não sei os detalhes, mas acho que está tudo bem se eu analisar com cuidado agora, certo?"
103060-48 = "Navios de guerra espaciais... civilizações antigas... hehe, vale a pena pesquisar!"
103060-50 = "Nossa pesquisa não foi em vão. Todos me ridicularizaram por chamá-lo de navio de guerra espacial, mas Alice, seu canhão elétrico é o epítome dessa sabedoria."
103060-52 = "Sim, a era é “RPG Espacial”! Esse gênero é o melhor!"
103060-56 = "Ei, ei Alice! ?"
103060-57 = "Por que você está aqui? ?"
103060-58 = "Bem... ouvi dizer que um navio de guerra espacial foi descoberto, então fui com todo mundo do departamento de engenharia..."
103060-59 = "Não! Você prometeu ficar quieto e ficar no Millennium! #nAinda não sabemos onde está o presidente Rio..."
103060-60 = "Se o presidente descobrir, você pode acabar em perigo desta vez, certo?"
103060-61 = "Mas, \"Herói do Espaço\"..."

103060-62 = "Não diga coisas estranhas como “herói espacial” e volte ao milênio! #nVou deixar essa parte para o Noah..."
103060-64 = "Este monstro aritmético implacável! Como você pôde dizer uma coisa tão terrível!"
103060-65 = "Ah, irmã... isso é demais..."
103060-66 = "Bem, outro apelido..."
103060-72 = "Yuka-chan, se você for abordar esse assunto, acho que Space Battleship é mais seguro do que qualquer outro lugar em Kivotos, certo?"
103060-73 = "Hum, Noé?"
103060-84 = "O presidente Rio quer controlar tudo. #nNão é exactamente isso que a Região Autónoma do Milénio está nas mãos do presidente?"
103060-85 = "Eu-eu acho que sim..."
103060-86 = "sim. No entanto, não creio que o presidente esteja no controle do navio de guerra espacial. #nSe você quiser fugir do Presidente, este será o lugar mais seguro."
103060-87 = "É por isso que mandei Alice-chan e o departamento de desenvolvimento de jogos. #nSe Yuka-chan cuidar de você, você ficará bem, certo?"
103060-88 = "Não, seria um problema se você me contasse de repente! ? #nSe sim, compartilhe com antecedência!"
103060-89 = "O presidente não é o único que tem como alvo Alice?"
103060-90 = "Bem, já que estou aqui, ainda pode ser melhor..."
103060-94 = "E daí?"
103060-100 = "Ah, onde está Alice! ?"
103060-102 = "Hehe. Pois bem, muito obrigado, Yuka-chan. #nE...por favor, não se esforce demais."
103060-103 = "Noé..."
103060-104 = "Não se preocupe com o Millennium. Deixe isso conosco."
103060-109 = "Suspiro...não vim aqui para brincar, mas estou mesmo..."
103060-113 = "Hmm... a estrutura interna é assim."
103060-114 = "A fiação e a tubulação são mais simples do que você pensa! Mesmo sendo uma parte O, a gravidade e as leis da física não podem ser ignoradas?"
103060-115 = "Talvez sim. Enquanto a Veritas analisa o sistema operacional do navio de guerra, vamos nos apressar e analisar o hardware do navio de guerra."
103060-116 = "sim! Depois vou dar uma olhada lá!"
103060-118 = "Entendi. Pois bem, eu ficarei encarregado disso."
103060-122 = "...Análise completa do algoritmo de código."
103060-123 = "Você pode acessar Kotama?"
103060-129 = "sim. Acesso bem-sucedido à unidade central de processamento. Sem problemas."
103060-132 = "O vice-gerente me ajudou, o que foi uma grande ajuda!"
103060-133 = "Sinceramente, pensei que demoraria mais."
103060-139 = "Este é o sistema principal do navio de guerra..."
103060-140 = "É uma linguagem desconhecida, mas acho que posso de alguma forma analisá-la."
103060-142 = "Himari, consegui acessá-lo. #nVou te enviar o código de conexão agora, então você poderia dar uma olhada?"
103060-143 = "Sim, eu entendo. #nObrigado, Chi-chan."
103060-147 = "Himari-san, como você está?"
103060-148 = "A conexão com o sistema principal do navio de guerra está completa. #nVamos começar por aqui. Embora ainda não esteja sob controle..."
103060-149 = "Entendo... se você pode controlar o centro, você pode controlar a coisa toda."
103060-150 = "...Sim, está certo."

103060-155 = "Então, por favor, diga-me - a verdadeira natureza do Ooparts, criado usando tecnologia antiga."
103060-161 = "isso é……"
103060-164 = "...Aqui está a imagem geral deste navio de guerra."
103060-165 = "Certamente parece um navio. #nÉ por isso que é chamado de \"navio principal\" de Utnapishtim...?"

103060-166 = "--Comprimento total 135m x 23m x 13m. Embora existam 15 áreas dentro, os detalhes são desconhecidos..."
103060-170 = "E... não vejo nada que possa ser chamado de arma neste navio de guerra."
103060-171 = "Não foi feito para lutar, foi... #n Outra coisa que não fosse um \"navio de guerra\"...?"

103060-172 = "...Acho que ainda é muito cedo para julgar. Vamos prosseguir um pouco mais com a análise."
103060-178 = "Hum..."
103060-179 = "……."
103060-181 = "……."
103060-185 = "O que está se manifestando atualmente em Kivotos é um inimigo que não existe no meu reino cognitivo..."
103060-186 = "Sua verdadeira identidade é uma existência misteriosa que é desconhecida, seja um “deus sem nome” ou “deuses esquecidos”."
103060-187 = "Porém, uma coisa que posso dizer é que ele está copiando as habilidades da ``Arca de Atlas Hasith'', que é originalmente nossa propriedade."
103060-188 = "E...Princesa, você provavelmente não sabe..."
103060-189 = "O \"Oparts\" em que você está agora... é uma \"arma decisiva\" criada por nossos inimigos no passado distante para lutar contra a Arca."

103060-190 = "Felizmente, nunca foi usado no passado..."
103060-191 = "Princesa... você está agora..."
103060-195 = "Eles estão montados no seu próprio “inimigo natural”, que é uma ameaça para eles."
103060-196 = "Por favor, saia daqui o mais rápido possível."
103060-197 = "Eu entendo que você me rejeitou. Ele até negou minha existência."
103060-198 = "Contudo...eu existo para guiá-lo à sua \"razão original de existência\"."

103060-199 = "Eu não quero que você morra."
103060-200 = "Por favor, afaste-se rapidamente deste Utnapishtim."
103060-201 = "No momento em que esta arma for ativada... a \"princesa sem nome dos deuses\" mostrará suas presas para você."

103060-203 = "tentará destruir você. #nEntão, por favor, fuja rapidamente."
103060-204 = "Isto não é um aviso..."
103060-208 = "--Esse é o meu desejo."
103060-210 = "Próxima vez; Navio principal de Utnapishtim (2)"
