[translation]
103060-1 = "Episódio 6; A Nave Principal de Utnapishtim (1)"
103060-6 = "……。"
103060-7 = "Ooooh~, então essa é a ponte de comando?#nÉ bem mais equipada do que eu esperava."
103060-8 = "Aqui é... a sala de operações...?"
103060-16 = "Ah! Esse é o assento do piloto, né?"
103060-17 = "É em uma escala bem maior do que imaginávamos...#nNuma estimativa rápida, diria que precisaríamos de pelo menos 10 pessoas para operar isso..."
103060-19 = "……Teremos que considerar não apenas a equipe interna, mas também a equipe de controle em terra."
103060-20 = "E-É verdade... Até mesmo um tanque precisa de 4 a 5 pessoas.#nCom essa escala, então..."
103060-21 = "Além disso, é um Oopart com muitas áreas desconhecidas...#nPara a análise e decodificação das informações, e suporte na operação... quanto mais gente, melhor."
103060-26 = "Vamos pedir o auxílio da \"Schale\"."
103060-27 = "Engenheiras, hackers, estrategistas táticas, gestoras... Podemos pedir o máximo de pessoas disponíveis possível?"
103060-28 = "[s] \"Entendido. Vou convocar o pessoal.\""
103060-29 = "Chi-chan, está me ouvindo?#nAs coisas vão ficar muuuuito corridas a partir de agora, hein?"
103060-33 = "Haa... Nós nem conseguimos descansar um pouco ainda.#nPodem levar isso em consideração também, por favor?"
103060-34 = "Mas, uau... uma \"nave de guerra espacial\", é...#nAs meninas vão fazer um escândalo quando descobrirem..."
103060-41 = "Na!"
103060-42 = "Vinha!"
103060-43 = "Es!"
103060-44 = "Pa!"
103060-46 = "Não disse..."
103060-47 = "Então essa é a nave de guerra! Será um presente das antigas tecnologias? ...Não tenho certeza dos detalhes, mas não tem problema se eu começar a desmontar... quer dizer, analisar ela devagarinho a partir de agora, né? "
103060-48 = "Nave de guerra espacial... Civilização antiga... Hehe, isso definitivamente vale a pena pesquisar!"
103060-50 = "Nossas pesquisas não foram em vão. Todo mundo fazia piada com coisas como \"nave de guerra espacial\"... Mas Aris, a sua railgun é o ápice da sabedoria delas."
103060-52 = "Sim, agora é a era do \"RPG Espacial\"! É o melhor gênero!"
103060-56 = "E-Espera aí, Aris-chan!?"
103060-57 = "O que você tá fazendo aqui!?"
103060-58 = "Err... ouvi dizer que descobriram uma nave de guerra espacial, então vim com o pessoal do Departamento de Engenharia――"
103060-59 = "Não pode! A gente não prometeu que você ia ficar quietinha lá na Millennium!?#nA gente ainda nem sabe onde a Presidente Rio tá――"
103060-60 = "Se a Presidente te encontrar, você pode acabar correndo perigo de novo, sabia!?"
103060-61 = "M-Mas as \"Heroínas Espaciais\"..."
103060-62 = "Deixa essa história de \"Heroínas Espaciais\" pra lá e volta pra Millennium!#nEu deixei a Noah cuidando de lá, então..."
103060-64 = "Sua demônia calculadora fria e sem coração! Como você pode dizer algo tão cruel!?"
103060-65 = "M-Mana... acho que você exagerou..."
103060-66 = "D-Deram outro apelido estranho pra mim..."
103060-72 = "Yuuka-chan, se for pensar por esse lado――Acredito que a nave de guerra espacial seja o lugar mais seguro de toda Kivotos no momento."
103060-73 = "Ué, Noah?"
103060-84 = "Como sabemos, a Presidente Rio é do tipo que gosta de ter o controle de tudo.#nE a essa altura, é bem provável que o distrito da Millennium já esteja na palma da mão dela, não acha?"
103060-85 = "S-Será..."
103060-86 = "Sim. Mas eu acho que até a Presidente não seria capaz de ter o controle sobre a nave de guerra espacial.#nSe for para escapar dela, esse seria o lugar mais seguro."
103060-87 = "Por isso eu mandei a Aris-chan e o Departamento de Desenvolvimento de Jogos para cá.#nJá que você estará aí cuidando dela, não deve ter problema, não é?"
103060-88 = "Não, assim você me complica! Me avisar do nada desse jeito!?#nVocê deveria ter falado comigo antes sobre isso!"
103060-89 = "E você sabe muito bem que a Presidente não é a única que tá atrás da Aris-chan, né!?"
103060-90 = "Bom, comigo aqui as coisas devem ficar um pouco melhores, mas..."
103060-94 = "Peraí, ué?"
103060-100 = "P-Pra onde a Aris-chan foi!? "
103060-102 = "Hehe. Então, conto com você, Yuuka-chan.#nE... não se esforce demais, ok?"
103060-103 = "Noah..."
103060-104 = "Não se preocupe com a Millennium. Deixe com a gente."
103060-109 = "Haa... e pensar que a gente não veio aqui pra brincar, sério mesmo..."
103060-113 = "Hmm... Então é assim que a estrutura interna funciona. "
103060-114 = "O cabeamento e a tubulação têm uma estrutura mais simples do que eu esperava! Embora seja um Oopart, parece que eles não conseguiram ignorar a gravidade e as leis da física, né?"
103060-115 = "Pode ser que sim. Enquanto a Veritas tá analisando o sistema operacional da nave, vamos adiantar a análise do hardware também."
103060-116 = "Sim! Então eu vou dar uma olhada por ali!"
103060-118 = "Beleza. Eu cuido dessa parte aqui."
103060-122 = "……Análise do algoritmo de código concluída."
103060-123 = "Kotama, consegue acessar?"
103060-129 = "Sim. Acesso à unidade central de processamento bem-sucedido. Sem problemas."
103060-132 = "Que bom que a Vice-Presidente veio ajudar~!"
103060-133 = "Sinceramente, achei que fosse demorar bem mais."
103060-139 = "Então esse é o sistema principal da nave..."
103060-140 = "A linguagem é meio desconhecida, mas acho que dá pra decifrar."
103060-142 = "Himari, o acesso foi um sucesso.#nVou te enviar o código de conexão agora, pode dar uma olhadinha?"
103060-143 = "Sim, entendido.#nMuito obrigada, Chi-chan."
103060-147 = "E então, Himari-san?"
103060-148 = "A conexão com o sistema principal da nave foi concluída.#nVou começar a trabalhar a partir daqui. Ainda não consigo controlar a nave, mas――"
103060-149 = "Entendo... Se conseguirmos assumir o controle do sistema central, conseguiremos controlar a nave toda."
103060-150 = "……Sim, exatamente."
103060-155 = "Então, por favor, me mostre... a verdadeira face desse Oopart criado pela tecnologia antiga."
103060-161 = "Isso é..."
103060-164 = "……Esta é a visão geral da nave de guerra."
103060-165 = "Realmente, parece um navio.#nSerá que é por isso que é chamada de \"Nave Principal\" de Utnapishtim...?"
103060-166 = "――Comprimento total: 135m × 23m × 13m. Parece ter 15 áreas internas, mas não dá pra saber os detalhes..."
103060-170 = "E... não encontrei nada que se pareça com uma arma nessa nave de guerra."
103060-171 = "Será que ela não foi feita para lutar...#nSeria algo diferente de uma \"nave de guerra\"...?"
103060-172 = "……Acho que ainda é cedo pra gente tirar conclusões. Vamos continuar com as análises."
103060-178 = "Hmm..."
103060-179 = "……。"
103060-181 = "……。"
103060-185 = "Aquilo que está se manifestando em Kivotos no momento é um inimigo que sequer existe na minha área de cognição..."
103060-186 = "Uma existência incompreensível, cuja verdadeira identidade jamais será conhecida até mesmo pelos \"Deuses Sem Nome\" ou pelos \"Deuses Esquecidos\"."
103060-187 = "Mas uma coisa é certa――Aquilo copiou as habilidades da nossa propriedade original, a \"Arca de Atrahasis\"."
103060-188 = "E... Princesa, você provavelmente não sabe, mas――"
103060-189 = "Esse \"Oopart\" em que você está pisando agora é... uma \"arma decisiva\" criada há muito tempo pelos nossos inimigos para combater a Arca."
103060-190 = "Felizmente, ela nunca foi usada no passado, mas... "
103060-191 = "Princesa... Neste exato momento, você――"
103060-195 = "Está a bordo do seu \"predador natural\", a sua maior ameaça."
103060-196 = "Por favor, saia daí o mais rápido possível."
103060-197 = "Eu entendo que você me rejeitou. E que negou a minha existência."
103060-198 = "Mas... Eu existo para guiá-la até a sua \"verdadeira razão de existir\"."
103060-199 = "Eu não desejo que você morra."
103060-200 = "Por favor... afaste-se dessa Utnapishtim o quanto antes."
103060-201 = "No instante em que essa arma for ativada... ela irá se voltar contra você――A \"Princesa dos Deuses Sem Nome\"."
103060-203 = "Eles tentarão destruí-la.#nPor isso, fuja o mais rápido possível."
103060-204 = "Isso não é um aviso――"
103060-208 = "――É o meu desejo."
103060-210 = "Próximo episódio; A Nave Principal de Utnapishtim (2)"