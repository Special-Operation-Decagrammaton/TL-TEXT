[translation]
13160-1 = "第16話;反撃"
13160-9 = "……。"
13160-10 = "ご令嬢、不便だろうがここで我慢していてくれ。"
13160-11 = "あなたは、いったい……。"
13160-19 = "……私だ。 "
13160-20 = "対策委員会は、予定通りそちらに向かうだろう。"
13160-21 = "万全の準備で迎え撃ってくれ。"
13160-23 = "それくらい分かっていますよ。#nわざわざ連絡をしてくるくらいですから、ほかにも何かあるのでしょう？"
13160-27 = "……ネフティスが裏切った。"
13160-31 = "なるほど……。 "
13160-32 = "やはり、アビドスの者は油断なりません。"
13160-33 = "……良いでしょう。#n警備をさらに強化します。"
13160-39 = "なるほど、そうでしたか。"
13160-40 = "裏切るとは思っていましたがね。"
13160-45 = "シャーレが絡んでこようと、関係はありませんよ。"
13160-47 = "……そうか。"
13160-48 = "バリケードを強化して、対戦車地雷の準備もしよう。"
13160-66 = "……分かった。#nまた何かあったら連絡してくれ。"
13160-67 = "はっ……列車砲なんかに興味はない。"
13160-68 = "私が求めているのは、あくまでも革新的な技術のほうだ。"
13160-69 = "あの天才「雷帝」が設計した構造を解き明かせば……。"
13160-70 = "大至急、マーケットガードを増員する。"
13160-80 = "ネフティスが裏切りを……？"
13160-81 = "ふっふっふ、むしろ好都合ですね。"
13160-87 = "はぁ、めんどーだから連絡してこないでよ。"
13160-92 = "非常事態って何なのさ。"
13160-97 = "砂漠横断鉄道の工事なら、始めたばっかじゃん。#n……って、本当か！？"
13160-98 = "ヒカリ！"
13160-102 = "早く準備して行くよ！"
13160-107 = "おー？"
13160-115 = "[ns] まばたきをする。"
13160-119 = "……！"
13160-120 = "[s] 体を起こす。"
13160-124 = "先生は爆発に巻き込まれたのです。#n奇跡的に傷ひとつなかったとはいえ、どうかご安静に。"
13160-125 = "せ、先生！？"
13160-132 = "どこへ行くのですか？"
13160-133 = "[s1] \"生徒と約束をしたんです。\"\n[s2] \"アビドスに行かないと……。\""
13160-136 = "……なるほど、何か事情があるのですね。#nですが、せめて簡単な検査だけはさせてください。"
13160-150 = "[ns] （グラウンドでヘリが燃えている……）"
13160-156 = "先生……。"
13160-157 = "……。"
13160-159 = "……。"
13160-160 = "先生、ホシノ先輩が……。"
13160-161 = "[s] \"大丈夫、落ち着いて。\" "
13160-162 = "う、うん……。"
13160-164 = "はい……。 "
13160-165 = "そうね……片付けもしないと。"
13160-168 = "（学校を軽く片付けてから、対策委員会の教室に集まることにした）"
13160-171 = "……ホシノ先輩は、一人で行ってしまいました。"
13160-172 = "みんなは付いてくるなって。"
13160-174 = "……私が勝てなかったから。"
13160-175 = "なに落ち込んでるのよ、シロコ先輩らしくないわね。#nホシノ先輩が強すぎただけ。"
13160-176 = "ん、セリカは優しいね。"
13160-177 = "素直になられても、これはこれでやりづらいわね！"
13160-178 = "……う、うん。"
13160-179 = "……先生。#nどうすればホシノ先輩を止められるんでしょうか？"
13160-180 = "[s] \"まずは状況を整理しよう。\""
13160-181 = "戦っても、止められなかった……。"
13160-182 = "最後には、副生徒会長として命令する、とまで……。"
13160-183 = "今もホシノ先輩は、書類上「アビドス生徒会」の所属になっていますが……。"
13160-184 = "……もし、アビドス生徒会が存在しなかったとしたら、#n契約そのものがなかったことになります。"
13160-185 = "先輩は総会で契約の無効を主張して、ノノミ先輩を救い、列車砲を破壊したら……#n責任を取って、私たちのもとから姿を消す、と。"
13160-186 = "どうすれば、ホシノ先輩を助けられますか？"
13160-187 = "大切な思い出を、自ら否定しなくてはいけないだなんて……。#n私たちにも、何かできないのでしょうか？"
13160-189 = "……。"
13160-190 = "……。"
13160-191 = "[s] \"みんな、覚悟はできてる？\""
13160-192 = "当たり前じゃない！ "
13160-193 = "ノノミもホシノ先輩も、私たちの仲間。"
13160-195 = "シロコ先輩の言う通りです！"
13160-196 = "[s] \"うん、分かった。\""
13160-197 = "ホシノ先輩は、また自分だけで解決しようとしています。"
13160-198 = "ですが、私たちではホシノ先輩に勝てません。"
13160-199 = "追いかけたところで、説得できなければ意味が……。"
13160-201 = "ん、昔の女が忘れられないみたい。"
13160-202 = "……急に昼ドラみたいなこと言わないでよ。"
13160-208 = "……はぁ、問題が山積みね。"
13160-209 = "先生がいれば大丈夫。"
13160-210 = "それでも、たったの四人で……。"
13160-211 = "私たちでやるしかない。"
13160-212 = "……そう、ね。"
13160-214 = "一度、問題を整理してみましょう。"
13160-215 = "まず、ノノミ先輩を助けなければいけません。"
13160-216 = "助けるにも居場所が分からないんだから、#nネフティスに言われた通り「アビドス生徒会」の存在を否定するしか……。"
13160-217 = "総会に出席するためには、#n私募ファンドの妨害を突破しないといけない。"
13160-219 = "一人で向かったホシノ先輩を止める必要もあります！"
13160-220 = "ノノミ先輩のことはホシノ先輩一人の問題ではありません……。"
13160-221 = "私達だって当事者なんですから。"
13160-222 = "それに、いくらホシノ先輩が強くても、#n数で押されてしまえば手も足も出ないはずです。"
13160-223 = "そして……アビドス砂漠のどこかにある「列車砲」を#n悪い人たちの手に渡らないようにしなければなりません。"
13160-224 = "そのためには、砂漠横断鉄道の権利問題も解決しないと……。"
13160-225 = "……そうだね。 "
13160-226 = "[s3] \"本当に難しいね……。\"\n[s4] \"ややこしい状況だね……。\""
13160-229 = "……曖昧になっていた、「アビドス生徒会」と「アビドス対策委員会」の扱い。"
13160-230 = "私たちにとって、#n弱点となる場所ばかり突かれているこの状況には……。"
13160-231 = "……誰かの執拗な悪意を感じます。"
13160-232 = "悪意なら最初からあったでしょ？"
13160-233 = "うーん、なんて言ったら良いのかな。"
13160-234 = "[s] \"……うまく言えないけど、私も感じてる。\""
13160-235 = "先生も……？"
13160-236 = "……大事なことがある。"
13160-237 = "何ですか、シロコ先輩？"
13160-238 = "ホシノ先輩にも、悲しい思いをしてほしくない。"
13160-239 = "私にとっての対策委員会と同じように、#nホシノ先輩にとってアビドス生徒会は大切な場所。"
13160-240 = "その存在を、先輩自身が否定するのは……。"
13160-242 = "うん、アビドス生徒会もちゃんと残さないと。"
13160-244 = "……ん。"
13160-245 = "[s] \"そうだね。\""
13160-246 = "……ごめん、先生。#n私のわがままで……。"
13160-247 = "[s] \"大丈夫だよ、シロコ。\""
13160-251 = "[ns] \"生徒のわがままを聞くのも、大人の役割だからね。\""
13160-252 = "……うん。"
13160-254 = "先生……。"
13160-255 = "……ありがとう。"
13160-256 = "……どうして。"
13160-260 = "アヤネちゃん？"
13160-264 = "どうして、こんなことに……。"
13160-265 = "アビドス生徒会は、対策委員会は……。"
13160-266 = "私たちは、これからどうなるんでしょうか。"
13160-268 = "……。"
13160-269 = "……。"
13160-274 = "[ns] \"……よし。\""
13160-278 = "先生……？"
13160-279 = "[s] \"まずは、そこから解決しよう。\""
13160-280 = "……？"
13160-281 = "そこって……？ "
13160-283 = "先生……？"
13160-284 = "[s] \"「アビドス生徒会」の会長は、ずっと空席だよね？\""
13160-285 = "は、はい。"
13160-286 = "[s5] \"なら、\"\n[s6] \"補欠選挙をしよう。\""
13160-292 = "補欠選挙……？"
13160-293 = "え、選挙？"
13160-298 = "補欠、選挙……。"
13160-304 = "……あっ、先生の仰りたい意味が分かりました！"
13160-306 = "アヤネちゃん……？"
13160-307 = "今ここには、全校生徒の60％がいるでしょ？"
13160-308 = "5分の3だから、間違ってはないけど……それで？"
13160-309 = "生徒会長がいれば、私たちの問題は解決できるんだよ！"
13160-311 = "[ns7] \"前にも生徒会長を選出した、\" \n[ns8] \"あの方法がある。\" "
13160-314 = "[ns] \"「シャーレ」の私が、正当性を保証するよ。\""
13160-316 = "……！！"
13160-317 = "はいっ！"
13160-324 = "私[ruby=おくそら]、奥空ア[/ruby]ヤネは――"
13160-329 = "――生徒会長に立候補します！"
13160-333 = "えっ！？"
13160-334 = "ユメ生徒会長は本当の生徒会長なので、#nこの選挙も正当性が認められるはずです！"
13160-335 = "[ns] \"では、挙手投票を行います！\""
13160-338 = "選挙の基本原則みたいなのは大丈夫なの？#nとりあえず、私は賛成！"
13160-339 = "ん、賛成。"
13160-340 = "私は立候補者なので、当然賛成です！"
13160-342 = "[ns9] \"それじゃあ……。\"\n[ns10] \"これでアヤネが生徒会長だね。\""
13160-346 = "[ns11] \"シャーレの顧問でもあり……。\"\n[ns12] \"アビドスの顧問でもある私が――\"\n[ns13] \"――立会人として、選挙結果を保証するよ。\""
13160-356 = "本当に、これでアヤネちゃんが生徒会長に？"
13160-357 = "ん。"
13160-358 = "ま、待って。#nじゃあアヤネちゃんは「アビドス生徒会」になったの？"
13160-359 = "[s] \"生徒会長、教えてくれる？\""
13160-365 = "対策委員会は……アビドス生徒会に吸収合併されました！"
13160-367 = "えっ！？"
13160-369 = "ですが、名前は「対策委員会」とします！"
13160-370 = "ん、分かった。#nこれで完璧。"
13160-371 = "ちょ、ちょっと無理やりすぎない？"
13160-372 = "生徒会長の決定に不満ですか、黒見セリカさん！"
13160-373 = "い、いえ……ありません。"
13160-374 = "対策委員会の生徒会長として、#n今後の方針を発表します！"
13160-375 = "て、鉄拳統治って、まさにこれよね……？"
13160-376 = "これから債権者団体の総会に乗り込み、#n前生徒会長が結んだ契約を維持します！"
13160-377 = "なぜなら、私たちには正当な権限があるからです！"
13160-378 = "そして、列車砲の権利はネフティスにも私募ファンドにも渡しません！"
13160-380 = "ん。 "
13160-381 = "同時に、ネフティスからノノミ先輩を返してもらえるように要求します。"
13160-382 = "この要求を受け入れなかった場合、#n敵対行為と見なし実力行使に出ます！"
13160-383 = "[s] \"ノノミの位置は、私が探してみるよ。\""
13160-384 = "はい！ "
13160-385 = "分かったわ！"
13160-386 = "アヤネ、ホシノ先輩は？"
13160-391 = "……。"
13160-396 = "あ、アヤネちゃん……？"
13160-403 = "ホシノ先輩は……。"
13160-406 = "う、うん……。"
13160-411 = "……書記に降格です！"
13160-413 = "（自分の仕事を先輩に押し付けた……！？）"
13160-414 = "ん、異議なし。"
13160-416 = "これで先輩が契約に関する話を進めても、効力はないです！"
13160-417 = "ただの書記に、そのような権限はありませんから！"
13160-418 = "ありがとうございます、先生。"
13160-419 = "これで問題解決の糸口が掴めました！"
13160-421 = "えっと、ノノミ先輩の居場所は先生が何とかしてくれて……。"
13160-422 = "ホシノ先輩は副生徒会長じゃなくなったから、契約をどうすることもできないんだよね？あとは私たちが契約を維持すれば、あいつらの手に列車砲は渡らない……？"
13160-423 = "アビドス生徒会も、対策委員会も、なくならずに済む。"
13160-424 = "これなら、全部の問題が解決できそうね。"
13160-426 = "まずは、本日12時の総会に出席します！"
13160-427 = "そして、ホシノ先輩を阻止し、ノノミ先輩を助けましょう！"
13160-428 = "そのためには、#nどうにか私募ファンドの妨害を突破しなくてはいけませんが……。"
13160-430 = "ん、分かった。"
13160-431 = "簡単には行かないだろうけど……。"
13160-432 = "[s] \"頑張ろう、みんな。\""
13160-434 = "はい！"
13160-435 = "[ruby=対策委員会]「アビドス生徒会」[/ruby]として、最初の任務を開始します！"
13160-441 = "アヤネちゃん、急に恥ずかしくなったの……？"
13160-442 = "[s] \"格好良かったよ？\""
13160-443 = "……はいぃ。 "
13160-444 = "わ、私はこういうアヤネちゃんも良いと思うけど。"
13160-445 = "キャラじゃないことしたかなって……。"
13160-446 = "あんなノリノリだったのに？"
13160-448 = "ん。ホシノ先輩捕獲作戦、開始。"
13160-450 = "……さっきからすごく楽しそうね、シロコ先輩。"
13160-452 = "[ns] \"よし、それじゃあ行こうか。\""
13160-453 = "はい、先生。#n新生対策委員会――"
13160-454 = "――出発します！"
13160-456 = "次回;追跡"
