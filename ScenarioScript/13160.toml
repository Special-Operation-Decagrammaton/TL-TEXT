[translation]
13160-1 = "Episódio 16; Contra-ataque"
13160-9 = "……。"
13160-10 = "Senhorita, pode ser desconfortável, mas aguente firme aqui."
13160-11 = "Quem é você, afinal……."
13160-19 = "……Sou eu."
13160-20 = "O Comitê de Contramedidas virá até aí conforme o planejado."
13160-21 = "Prepare-se para recebê-los com tudo o que tiver."
13160-23 = "Eu sei disso. #nJá que se deu ao trabalho de entrar em contato, deve haver algo mais, não é?"
13160-27 = "……A Nephthys nos traiu."
13160-31 = "Entendo……."
13160-32 = "Como esperado, não se pode baixar a guarda com o pessoal de Abydos."
13160-33 = "……Muito bem. #nReforçarei a segurança ainda mais."
13160-39 = "Entendo, então foi isso."
13160-40 = "Eu já imaginava que eles nos trairiam."
13160-45 = "Não importa se o Schale se envolver ou não."
13160-47 = "……Entendido."
13160-48 = "Reforce as barricadas e prepare as minas antitanque."
13160-66 = "……Entendido. #nEntre em contato novamente se algo acontecer."
13160-67 = "Hmph…… Não tenho interesse em canhões ferroviários."
13160-68 = "O que eu busco, acima de tudo, é a tecnologia inovadora."
13160-69 = "Se eu conseguir decifrar a estrutura projetada por aquele gênio, o \"Imperador do Trovão\"……."
13160-70 = "Aumente o número de guardas do mercado imediatamente."
13160-80 = "A Nephthys nos traiu……?"
13160-81 = "Hehehe, na verdade, isso é conveniente."
13160-87 = "Ah, que saco, não me ligue, é trabalhoso."
13160-92 = "Que tipo de emergência é essa?"
13160-97 = "A construção da ferrovia transdesértica mal começou. #n……Espera, é sério!?"
13160-98 = "Hikari!"
13160-102 = "Prepare-se logo, vamos!"
13160-107 = "Oh?"
13160-115 = "[ns] Pisca os olhos."
13160-119 = "……！"
13160-120 = "[s] Senta-se."
13160-124 = "Professor, você foi pego na explosão. #nEmbora seja um milagre que não tenha nenhum ferimento, por favor, descanse."
13160-125 = "P-Professor!?"
13160-132 = "Aonde você vai?"
13160-133 = "[s1] \"Fiz uma promessa a uma aluna.\"\n[s2] \"Eu preciso ir para Abydos…….\""
13160-136 = "……Entendo, você tem seus motivos. #nMas, por favor, deixe-me fazer pelo menos um exame rápido."
13160-150 = "[ns] (Um helicóptero está queimando no pátio……)"
13160-156 = "Professor……."
13160-157 = "……."
13160-159 = "……."
13160-160 = "Professor, a Hoshino-senpai……."
13160-161 = "[s] \"Está tudo bem, acalme-se.\""
13160-162 = "S-sim……."
13160-164 = "Sim……."
13160-165 = "É verdade…… precisamos arrumar as coisas também."
13160-168 = "(Decidimos arrumar a escola um pouco antes de nos reunirmos na sala do Comitê de Contramedidas)"
13160-171 = "……A Hoshino-senpai foi sozinha."
13160-172 = "Ela disse para ninguém segui-la."
13160-174 = "……Porque eu não consegui vencer."
13160-175 = "Por que você está tão deprimida? Isso não combina com você, veterana Shiroko. #nA veterana Hoshino só era forte demais."
13160-176 = "Hum, a Serika é gentil, né."
13160-177 = "Mesmo que você seja sincera assim, isso torna as coisas mais difíceis de lidar!"
13160-178 = "……S-sim."
13160-179 = "……Professor. #nO que devemos fazer para impedir a veterana Hoshino?"
13160-180 = "[s] \"Primeiro, vamos organizar a situação.\""
13160-181 = "Mesmo lutando, não conseguimos pará-la……."
13160-182 = "No final, ela até disse que, como vice-presidente do conselho estudantil, ela daria uma ordem……."
13160-183 = "Até agora, a veterana Hoshino ainda consta nos documentos como parte do \"Conselho Estudantil de Abydos\", mas……."
13160-184 = "……Se o Conselho Estudantil de Abydos não existisse, #no contrato em si nunca teria existido."
13160-185 = "A veterana pretende alegar a invalidez do contrato na assembleia geral, salvar a veterana Nonomi, destruir o canhão ferroviário e então…… #nassumir a responsabilidade e desaparecer de nossas vidas."
13160-186 = "Como podemos salvar a veterana Hoshino?"
13160-187 = "Ter que negar suas próprias memórias preciosas…… #nSerá que não há nada que possamos fazer?"
13160-189 = "……."
13160-190 = "……."
13160-191 = "[s] \"Pessoal, vocês estão preparadas?\""
13160-192 = "Claro que sim!"
13160-193 = "Tanto a Nonomi quanto a veterana Hoshino são nossas companheiras."
13160-195 = "A veterana Shiroko tem razão!"
13160-196 = "[s] \"Sim, entendi.\""
13160-197 = "A veterana Hoshino está tentando resolver tudo sozinha de novo."
13160-198 = "Mas, nós não conseguimos vencer a veterana Hoshino."
13160-199 = "Mesmo que a gente a persiga, se não conseguirmos convencê-la, não fará sentido……."
13160-201 = "Hum, parece que ela não consegue esquecer um antigo amor."
13160-202 = "……Não diga coisas que parecem novela das tarde de repente."
13160-208 = "……Ah, temos problemas acumulados."
13160-209 = "Se o professor estiver aqui, ficaremos bem."
13160-210 = "Mesmo assim, apenas nós quatro……."
13160-211 = "Não temos escolha a não ser fazer isso nós mesmas."
13160-212 = "……É, verdade."
13160-214 = "Vamos organizar os problemas de uma vez."
13160-215 = "Primeiro, precisamos salvar a veterana Nonomi."
13160-216 = "Mas não sabemos onde ela está, então, como a Nephthys disse, não temos escolha a não ser negar a existência do \"Conselho Estudantil de Abydos\"……."
13160-217 = "Para participar da assembleia geral, #nprecisamos romper o bloqueio do fundo de investimento privado."
13160-219 = "Também precisamos impedir a veterana Hoshino, que foi sozinha!"
13160-220 = "O caso da veterana Nonomi não é um problema apenas da veterana Hoshino……."
13160-221 = "Nós também somos partes interessadas nisso."
13160-222 = "Além disso, por mais forte que a veterana Hoshino seja, #nse ela for pressionada por números, não terá como reagir."
13160-223 = "E então…… precisamos garantir que o \"canhão ferroviário\" em algum lugar do deserto de Abydos #nnão caia nas mãos de pessoas más."
13160-224 = "Para isso, também precisamos resolver a questão dos direitos da ferrovia transdesértica……."
13160-225 = "……É verdade."
13160-226 = "[s3] \"É realmente difícil…….\"\n[s4] \"É uma situação complicada…….\""
13160-229 = "……O tratamento ambíguo do \"Conselho Estudantil de Abydos\" e do \"Comitê de Contramedidas de Abydos\"."
13160-230 = "Nesta situação, onde estão atacando apenas os nossos pontos fracos……."
13160-231 = "……Sinto a malícia persistente de alguém."
13160-232 = "Essa malícia já existia desde o começo, não é?"
13160-233 = "Hum, como eu deveria dizer isso."
13160-234 = "[s] \"……Não sei explicar bem, mas eu também sinto isso.\""
13160-235 = "Você também, professor……?"
13160-236 = "……Tenho algo importante a dizer."
13160-237 = "O que foi, Shiroko-senpai?"
13160-238 = "Não quero que a Hoshino-senpai também sofra."
13160-239 = "Assim como o Comitê de Contramedidas é para mim, #no Conselho Estudantil de Abydos é um lugar importante para a Hoshino-senpai."
13160-240 = "A própria senpai negar a existência dele é……."
13160-242 = "Sim, precisamos preservar o Conselho Estudantil de Abydos também."
13160-244 = "……Hum."
13160-245 = "[s] \"É verdade.\""
13160-246 = "……Desculpe, Sensei. #nPelo meu egoísmo……."
13160-247 = "[s] \"Está tudo bem, Shiroko.\""
13160-251 = "[ns] \"Ouvir o egoísmo dos alunos também faz parte do papel de um adulto.\""
13160-252 = "……Sim."
13160-254 = "Sensei……."
13160-255 = "……Obrigada."
13160-256 = "……Por que?"
13160-260 = "Ayane-chan?"
13160-264 = "Por que as coisas chegaram a esse ponto……."
13160-265 = "O Conselho Estudantil de Abydos, o Comitê de Contramedidas……."
13160-266 = "O que vai acontecer com a gente agora?"
13160-268 = "……."
13160-269 = "……."
13160-274 = "[ns] \"……Muito bem.\""
13160-278 = "Sensei……?"
13160-279 = "[s] \"Primeiro, vamos resolver isso.\""
13160-280 = "……?"
13160-281 = "Isso, o quê……?"
13160-283 = "Sensei……?"
13160-284 = "[s] \"O cargo de presidente do 'Conselho Estudantil de Abydos' está vago há muito tempo, não está?\""
13160-285 = "S-sim."
13160-286 = "[s5] \"Então,\"\n[s6] \"vamos fazer uma eleição suplementar.\""
13160-292 = "Eleição suplementar……?"
13160-293 = "Hã, uma eleição?"
13160-298 = "Eleição, suplementar……."
13160-304 = "……Ah, entendi o que o Sensei quer dizer!"
13160-306 = "Ayane-chan……?"
13160-307 = "Temos 60% de todos os alunos da escola aqui agora, certo?"
13160-308 = "São três quintos, então não está errado, mas…… e daí?"
13160-309 = "Se tivermos uma presidente do conselho estudantil, podemos resolver nossos problemas!"
13160-311 = "[ns7] \"Existe aquele método,\"\n[ns8] \"que usamos para eleger a presidente antes.\""
13160-314 = "[ns] \"Eu, do Schale, garanto a legitimidade.\""
13160-316 = "……!!"
13160-317 = "Sim!"
13160-324 = "Eu, Okusora Ayane――"
13160-329 = "――me candidato a presidente do conselho estudantil!"
13160-333 = "O quê!?"
13160-334 = "A presidente Yume é a verdadeira presidente, então #nesta eleição também deve ser reconhecida a legitimidade!"
13160-335 = "[ns] \"Então, vamos realizar uma votação por levantar de mãos!\""
13160-338 = "Os princípios básicos de uma eleição estão ok? #nDe qualquer forma, eu voto a favor!"
13160-339 = "Hum, a favor."
13160-340 = "Como sou a candidata, naturalmente voto a favor!"
13160-342 = "[ns9] \"Sendo assim...\"\n[ns10] \"Com isso, Ayane é a presidente do conselho estudantil.\""
13160-346 = "[ns11] \"Como consultor do Schale...\"\n[ns12] \"E também como consultor de Abydos, eu--\"\n[ns13] \"--garanto o resultado da eleição como testemunha.\""
13160-356 = "Sério, a Ayane-chan virou presidente do conselho estudantil com isso?"
13160-357 = "Sim."
13160-358 = "E-espera. #nEntão a Ayane-chan virou o \"Conselho Estudantil de Abydos\"?"
13160-359 = "[s] \"Presidente do conselho, pode nos explicar?\""
13160-365 = "O Comitê de Contramedidas... foi absorvido pelo Conselho Estudantil de Abydos!"
13160-367 = "Hã!?"
13160-369 = "Mas o nome continuará sendo \"Comitê de Contramedidas\"!"
13160-370 = "Sim, entendi. #nAgora está perfeito."
13160-371 = "Ei, isso não é forçar demais a barra?"
13160-372 = "Está insatisfeita com a decisão da presidente do conselho, Kuromi Serika?!"
13160-373 = "N-não... de jeito nenhum."
13160-374 = "Como presidente do conselho estudantil do Comitê de Contramedidas, #nanuncio as diretrizes futuras!"
13160-375 = "I-isso é literalmente um governo de mão de ferro, não é...?"
13160-376 = "Vamos invadir a assembleia geral do grupo de credores e #nmanter o contrato firmado pela ex-presidente do conselho!"
13160-377 = "Porque nós temos a autoridade legítima para isso!"
13160-378 = "E não entregaremos os direitos do canhão ferroviário nem para a Nephthys, nem para o fundo de investimento privado!"
13160-380 = "Sim."
13160-381 = "Ao mesmo tempo, exigiremos que a Nephthys nos devolva a Nonomi-senpai."
13160-382 = "Se não aceitarem essa exigência, #nconsideraremos um ato hostil e usaremos a força!"
13160-383 = "[s] \"Eu vou tentar descobrir a localização da Nonomi.\""
13160-384 = "Sim!"
13160-385 = "Entendido!"
13160-386 = "Ayane, e a Hoshino-senpai?"
13160-391 = "..."
13160-396 = "A-Ayane-chan...?"
13160-403 = "A Hoshino-senpai está..."
13160-406 = "S-sim..."
13160-411 = "...rebaixada a secretária!"
13160-413 = "(Ela jogou o próprio trabalho para a senpai...!?) "
13160-414 = "Sim, sem objeções."
13160-416 = "Com isso, mesmo que a senpai tente avançar com as negociações do contrato, não terá validade!"
13160-417 = "Porque uma simples secretária não tem tal autoridade!"
13160-418 = "Obrigada, Sensei."
13160-419 = "Com isso, conseguimos encontrar uma luz para resolver o problema!"
13160-421 = "Bem, o Sensei vai dar um jeito de encontrar a Nonomi-senpai..."
13160-422 = "Como a Hoshino-senpai não é mais a vice-presidente, ela não pode fazer nada com o contrato, certo? Se nós mantivermos o contrato, o canhão ferroviário não cairá nas mãos deles...?"
13160-423 = "O Conselho Estudantil de Abydos e o Comitê de Contramedidas não precisarão ser extintos."
13160-424 = "Desse jeito, parece que todos os problemas podem ser resolvidos."
13160-426 = "Primeiro, vamos comparecer à assembleia de hoje, às 12 horas!"
13160-427 = "E então, vamos impedir a Hoshino-senpai e salvar a Nonomi-senpai!"
13160-428 = "Para isso, #nprecisamos dar um jeito de superar a interferência do fundo de investimento privado, mas..."
13160-430 = "Sim, entendi."
13160-431 = "Não vai ser fácil, mas..."
13160-432 = "[s] \"Vamos nos esforçar, pessoal.\""
13160-434 = "Sim!"
13160-435 = "Como \"Conselho Estudantil de Abydos\", iniciaremos nossa primeira missão!"
13160-441 = "Ayane-chan, você ficou com vergonha de repente...?"
13160-442 = "[s] \"Você foi muito legal, sabia?\""
13160-443 = "……Simmm."
13160-444 = "E-Eu acho que a Ayane-chan desse jeito também é legal."
13160-445 = "Fico pensando se não fiz algo que não combina comigo……"
13160-446 = "Mesmo estando tão empolgada daquele jeito?"
13160-448 = "Sim. Operação de captura da Senpai Hoshino, iniciada."
13160-450 = "……Você parece estar se divertindo muito desde agora há pouco, Senpai Shiroko."
13160-452 = "[ns] \"Muito bem, então vamos nessa.\""
13160-453 = "Sim, Sensei. #nNova Força-Tarefa de Contramedidas——"
13160-454 = "——Partindo!"
