[translation]
1012006-1 = "Depois da escola \"Kodo\""

1012006-2 = "(O trabalho só termina tarde da noite...)"
1012006-3 = "(Fui dar uma caminhada para acordar da sonolência.)"
1012006-11 = "(Enquanto andava sem rumo...)"
1012006-12 = "Huh? sensei?"
1012006-16 = "O que você está fazendo a esta hora?"
1012006-17 = "Horas extras... acordar...?"
1012006-18 = "...É difícil para os adultos."
1012006-19 = "[s] \"O que Natsu estava fazendo?\""
1012006-20 = "Está correndo."
1012006-21 = "Tenho corrido todos os dias desde que comecei a banda."
1012006-22 = "Ser baterista é um teste de força física."
1012006-23 = "Preciso treinar pelo menos um pouco."
1012006-24 = "A performance real é como a prática, e a prática é como a performance real..."
1012006-25 = "[s] \"Natsu é um trabalhador esforçado.\""
1012006-26 = "……n / D."
1012006-27 = "Estou apenas fazendo o que posso."
1012006-28 = "[s1] \"Para os alunos que estão trabalhando duro...\"\n[s2] \"Precisamos recompensá-los.\""
1012006-36 = "(Comprei dois cafés enlatados em uma máquina de venda automática próxima e dei um para Natsu.)"
1012006-38 = "Ah, obrigado."
1012006-39 = "Café à noite...ambiente adulto..."
1012006-40 = "(Sentado em um banco próximo com Natsu)"
1012006-44 = "O tambor é um instrumento para o qual a palavra antinomia é perfeita."
1012006-45 = "Fica bem no fundo do palco e não se destaca visualmente."
1012006-46 = "Porém, é o som da bateria que cria a performance."
1012006-47 = "Numa banda, o ritmo da bateria conduz a música."
1012006-48 = "É por isso que a bateria é o núcleo da banda."
1012006-49 = "É importante manter sempre a calma e manter o seu ritmo."
1012006-50 = "Mesmo sendo o instrumento que emite o som mais alto, tem que ser tocado da forma mais calma."
1012006-51 = "Ah, é claro que não estou tentando julgar quais instrumentos são melhores ou piores."
1012006-52 = "Diz-se que cada um tem um papel."
1012006-53 = "...Surpreendentemente, acho que é um instrumento muito gratificante."
1012006-54 = "é por isso--"
1012006-61 = "(A sonolência que estava me distraindo voltou para me assombrar)"
1012006-62 = "(Eu tenho que ouvir Natsu-)"
1012006-72 = "(Ao contrário desse pensamento, minhas pálpebras ficam pesadas... minha consciência está retrocedendo...)"
1012006-76 = "S-Sensei...?"
1012006-77 = "Ombro..."
1012006-78 = "…………."
1012006-79 = "…………………!"
1012006-80 = "(Baque, baque, baque, baque)"
1012006-81 = "foto……."
1012006-82 = "S-Sensei...?"
1012006-83 = "Eca..."
1012006-84 = "……."
1012006-85 = "O que devo fazer..."
1012006-86 = "O ritmo não pode ser tão rápido... não adianta, mas..."
1012006-93 = "(Natsu esperou por mim até eu acordar.)"
1012006-94 = "(Depois disso, Natsu me acompanhou no caminho para casa...#nAssim que chegou na placa de Petri, ele saiu em grande velocidade.)"
