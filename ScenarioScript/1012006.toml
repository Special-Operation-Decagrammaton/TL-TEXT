[translation]
1012006-1 = "放課後「鼓動」"
1012006-2 = "（深夜になっても仕事が終わらず――）"
1012006-3 = "（眠気を覚ますため、散歩に出た）"
1012006-11 = "（あてどなく歩いていると……）"
1012006-12 = "あれ？先生？"
1012006-16 = "こんな時間にどうしたの？"
1012006-17 = "残業……眠気覚まし……？"
1012006-18 = "……大人は大変だねぇ。"
1012006-19 = "[s] \"ナツはなにをしてたの？\""
1012006-20 = "ジョギングだよ。"
1012006-21 = "バンドを始めてから、毎日走ってるんだ。"
1012006-22 = "ドラマーは体力勝負だからね。"
1012006-23 = "少しでも鍛えておかないと。"
1012006-24 = "本番は練習のように、練習は本番のように……ってね。"
1012006-25 = "[s] \"ナツは努力家なんだね。\""
1012006-26 = "……ふふ。"
1012006-27 = "できることをしているだけだよ。"
1012006-28 = "[s1] \"頑張っている生徒には……。\"\n[s2] \"ご褒美をあげないとだね。\""
1012006-36 = "（近くの自販機で缶コーヒーを二つ買って、一つはナツにあげた）"
1012006-38 = "おお、感謝ー。"
1012006-39 = "夜のコーヒー……大人の雰囲気……。"
1012006-40 = "（ナツと近くのベンチに座った）"
1012006-44 = "ドラムはさ、アンチノミーって言葉がぴったりな楽器なんだ。"
1012006-45 = "ステージの一番奥で、視覚的に目立つことはない。"
1012006-46 = "でも、演奏を作るのはドラムの音。"
1012006-47 = "バンドでは、ドラムのリズムが曲をリードしていく。"
1012006-48 = "だから、ドラムはバンドの要なんだよね。"
1012006-49 = "常に平常心で、自分のリズムを維持するのが大事。"
1012006-50 = "一番大きな音を出す楽器なのに、一番落ち着いて演奏しなきゃいけないんだ。"
1012006-51 = "あ、もちろん楽器に優劣をつけるつもりじゃないよ。"
1012006-52 = "それぞれに役割があるよねって話。"
1012006-53 = "……案外、やりがいのある楽器だなって、思ってるんだ。"
1012006-54 = "だから――"
1012006-61 = "（紛らわせていた眠気が、再び襲い掛かってきた）"
1012006-62 = "（ナツの話を聞かないと――）"
1012006-72 = "（その思いに反して瞼は重くなり……意識が遠のいていく……）"
1012006-76 = "せ、先生……？"
1012006-77 = "肩、に……。"
1012006-78 = "…………。"
1012006-79 = "……………………！"
1012006-80 = "（ドクン、ドクン、ドクン、ドクン）"
1012006-81 = "え……。"
1012006-82 = "せ、せんせ……？"
1012006-83 = "うぅ……。"
1012006-84 = "……。"
1012006-85 = "ど、どうしよう……。"
1012006-86 = "リズム、こんなに早まっちゃ……ダメ、なのに……。"
1012006-93 = "（目を覚ますまで、ナツは待ってくれていた）"
1012006-94 = "（その後、ナツは帰り道にまで付き添ってくれたものの……#nシャーレに着くなり、すごいスピードで帰っていった）"
