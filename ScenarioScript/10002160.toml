[translation]
10002160-1 = "Epílogo 3: Enganar, ser enganado e ser enterrado"
10002160-3 = "P. Por que você não fugiu naquela situação?"
10002160-9 = "Hã? O que é isso? Qual é a sua intenção?"
10002160-10 = "Ei... uma entrevista? Você está louco...? A gente acabou de ser detonada e estou furiosa, você quer morrer ou o quê!?"
10002160-11 = "O quê, como eu me sinto agora...? Você tá falando sério com essa pergunta!?"
10002160-12 = "Depois de ver a batalha de agora há pouco, e ainda por cima sendo você quem comandou, você pergunta isso!? É o quê, quer me provocar!?"
10002160-13 = "Que droga... bem, fomos nós que armamos a emboscada, mas..."
10002160-14 = "Não, mas, qualquer um pensaria que daria certo naquela situação... O que foi aquilo? Quer dizer que tudo aquilo era uma armadilha para nos atrair?"
10002160-17 = "Aquela é a presidente do Comitê de Justiça, sabia!? Não é sempre que temos a chance de dar uma lição nela!"
10002160-18 = "Se você sabe que alguém está se afogando, é óbvio que você vai atacar, não é!?"
10002160-19 = "E outra, ela parecia tão desesperada, ninguém ia imaginar que aquele afogamento era atuação!!"
10002160-25 = "Haa..."
10002160-26 = "Esquece... Então, o que você quer ouvir para ficar satisfeito? ...Por que não fugimos e atacamos naquela situação, é isso?"
10002160-27 = "Hmph..."
10002160-28 = "Não tem um grande motivo. Como eu disse, achei que dava para vencer se ela estivesse se afogando, e quando percebemos que era uma armadilha, já não dava mais para recuar..."
10002160-29 = "Não, eu só pensei... 'será que se pegarmos ela de surpresa, a gente ganha pelo menos uma vez?'"
10002160-30 = "A gente sempre apanha, e não dá para ficar quieta depois de ser humilhada daquele jeito..."
10002160-31 = "Toda vez que vamos a algum lugar, somos derrotadas, e isso virou uma rotina..."
10002160-32 = "Por isso, eu só queria ganhar uma vez, para ver se conseguia me sentir melhor e seguir em frente amanhã..."
10002160-33 = "Mas, no fim, acabou assim... que vergonha..."
10002160-34 = "..."
10002160-35 = "Soluço... buáá...!"
10002160-36 = "Waaaaaaahhh!!"
10002160-38 = "(Como a entrevistada ficou emocionalmente instável, decidi interromper a entrevista (e a consolei depois).)"
