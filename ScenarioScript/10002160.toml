[translation]
10002160-1 = "後日談その3;騙し騙され埋められて"
10002160-3 = "Ｑ．なんであの状況で逃げなかったの？"
10002160-9 = "はぁ？何これ、何のつもり？"
10002160-10 = "え……インタビュー？正気かあんた……？こちとら散々やられて頭に来てんだけど、死にてぇのか！？"
10002160-11 = "なに、今の心情……？おまっ、だからそれ本気で聞いてんの！？"
10002160-12 = "さっきまでの戦闘を見ておいて、っていうかあんたが指揮しておいて、そんなこと聞く！？あれか、嫌がらせか！？"
10002160-13 = "何なんだよったく……いや仕掛けたのはあたしらだけどさ……。"
10002160-14 = "いやでも、普通行けると思うじゃんあの状況……何あれ、あたしらをおびき寄せるための罠だったってこと？"
10002160-17 = "あの正義実現委員会の委員長だぞ！？あたしらが一泡吹かせるチャンスなんて滅多にないじゃん！"
10002160-18 = "そりゃ溺れてるって知ったら、攻撃くらいするでしょ！？"
10002160-19 = "っていうかあんだけ必死そうだったのに、あの溺れ方が演技だなんて思わないじゃん！！"
10002160-25 = "はぁ……。"
10002160-26 = "もういいよ……で、何を聞ければ納得してくれるわけ？……なんであの状況で逃げずに攻撃してきたのか、って？"
10002160-27 = "はんっ……。"
10002160-28 = "大した理由じゃねえよ。今言った通り、溺れてんなら勝てると思ったし、罠だと分かっても退ける状況じゃなくなっちまったし……。"
10002160-29 = "いや、不意を突けば一回くらい勝てるんじゃね？って思って……。"
10002160-30 = "あたしら、いっつもやられてばっかりだし、あそこまでコテンパンにされていつまでも黙ってられないっていうか……。"
10002160-31 = "毎回どこ行っても倒されてばっかりで、そんなことが毎回お決まりみたいに続いて……。"
10002160-32 = "だから、一回くらい勝ってみたくて、そうすればまた明日から明るい気持ちで頑張れっかなって……。"
10002160-33 = "でも、結局こんなんで……情け、なくて……。"
10002160-34 = "……。"
10002160-35 = "うっ……うぅっ……！"
10002160-36 = "うああぁぁぁぁぁ～～～ん！！"
10002160-38 = "（インタビュー相手が情緒不安定になってしまったため、インタビューは中断することにした（あと慰めてあげた）。）"
