[translation]
10044055-2 = "ば、バカな……！"
10044055-3 = "こんなガキどもに負けるなんて……。"
10044055-4 = "ま……まだだ！もうじき、うちらの総長が――"
10044055-13 = "パヒャヒャッ！いい指揮だったよ、先生！"
10044055-14 = "こ、これが先生……すごい……。"
10044055-15 = "でも、どうしてこの人たちは追いかけて来たんでしょうか……。"
10044055-16 = "ま、まさか本当にピザの恨みだけでここまで……？"
10044055-17 = "起こせば聞けるよー？"
10044055-18 = "そこまでしなくてもいいんじゃない？私らも暇じゃないし。"
10044055-19 = "うぅ……な、何か大変なことを見落としてる気がするんですけど……。"
10044055-21 = "大変です！所属不明の集団が多数接近中とのこと！"
10044055-22 = "早く出発を！線路は空けてあります！"
10044055-23 = "時間もあんまないし。出るよ！"
10044055-24 = "発車オーライー。"
10044055-25 = "せ、整備はなんとかしますので……。"
