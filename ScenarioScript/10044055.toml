[translation]
10044055-2 = "I-Impossível...!"
10044055-3 = "Perder para um bando de pirralhas como vocês..."
10044055-4 = "A-ainda não acabou! Logo, nossa líder vai..."
10044055-13 = "Pahyahya! Ótimo comando, Sensei!"
10044055-14 = "E-esse é o Sensei... incrível..."
10044055-15 = "Mas, por que será que essas pessoas nos perseguiram até aqui..."
10044055-16 = "N-não me diga que elas vieram até aqui só por causa de uma pizza...?"
10044055-17 = "Se a gente acordar eles, dá para perguntar, né?"
10044055-18 = "Não precisa ir tão longe, precisa? Nós também não temos tempo a perder."
10044055-19 = "Ugh... sinto que estamos deixando passar algo muito sério..."
10044055-21 = "É uma emergência! Relataram que um grande grupo de origem desconhecida está se aproximando!"
10044055-22 = "Partam logo! Os trilhos estão liberados!"
10044055-23 = "Não temos muito tempo. Vamos nessa!"
10044055-24 = "Partida autorizada."
10044055-25 = "A-a manutenção, eu dou um jeito, então..."
