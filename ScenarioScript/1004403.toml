[translation]
1004403-1 = "Desafio da colheita de cocos"
1004403-4 = "Ah, Sensei!"
1004403-5 = "Por aqui! Estávamos esperando por você!"
1004403-9 = "Olhe só!"
1004403-10 = "Todas aquelas árvores ali são coqueiros!"
1004403-11 = "Vamos colher um monte e comer todo mundo junto! ☆"
1004403-12 = "[s1] \"São árvores muito grandes, não são?\"\n[s2] \"Deveríamos ter trazido uma escada.\""
1004403-13 = "Sobre isso..."
1004403-14 = "Sobre isso..."
1004403-15 = "A escada está sendo usada em outra tarefa agora..."
1004403-16 = "Poderíamos esperar até que terminem de usá-la, mas..."
1004403-17 = "Tive uma ideia! E se pudéssemos beber suco de coco assim que o trabalho terminasse?"
1004403-18 = "[s3] \"Dá sede quando se trabalha, né?\"\n[s4] \"Sim, sim. É uma boa ideia!\""
1004403-21 = "Sim, sim! É exatamente isso!!"
1004403-22 = "Um jeito de colher cocos dos coqueiros sem uma escada..."
1004403-23 = "Alguma boa ideia... Ah!"
1004403-28 = "Isso! Que tal algo assim?"
1004403-32 = "Muito bem, vou pegar isto..."
1004403-36 = "[ns5] \"Espere... Nonomi?\"\n[ns6] \"Por que você pegou sua metralhadora de repente...?\""
1004403-37 = "Ufufu ☆"
1004403-38 = "Ufufu ☆"
1004403-39 = "Se não dá para subir..."
1004403-41 = "É só derrubar!"
1004403-45 = "Hora da limpeza! ☆"
1004403-58 = "...Ta-dã!! ☆"
1004403-62 = "[ns7] \"Isso não é um 'ta-dã'...!\"\n[ns8] \"Vamos procurar outro método...\""
1004403-65 = "Acho que fui um pouco bruta demais, né? Todos os cocos acabaram quebrando..."
1004403-66 = "Sinto que acabei destruindo o ambiente da ilha..."
1004403-67 = "Hmm, outro método... o que faremos?"
1004403-70 = "[ns9] \"Que tal um cavalinho?\"\n[ns10] \"Não daria para alcançar as árvores mais baixas com um cavalinho?\""
1004403-73 = "Hã..."
1004403-74 = "Um cavalinho? Entendido ☆"
1004403-75 = "Então, eu vou levantar o Sensei! Pode deixar comigo!"
1004403-76 = "...Ah, você quer dizer que eu subo nos ombros do Sensei...?"
1004403-80 = "É, é isso mesmo...!?"
1004403-81 = "N-não! Não é que eu não queira...! É só que eu nunca tinha pensado nisso antes...!"
1004403-82 = "Bem... então, conto com você, Sensei."
1004403-88 = "...Mesmo que eu esteja um pouco pesada, não reclame, viu? ☆"
1004403-91 = "(Coloquei Nonomi nos ombros e me aproximei de um coqueiro baixo)"
1004403-95 = "S-Sensei? Um pouco mais devagar..."
1004403-96 = "D-desculpe. É a primeira vez que subo em alguém assim... estou um pouco nervosa."
1004403-101 = "Hmm... só mais um pouquinho...!"
1004403-102 = "Mais um pouco, só mais um pouco...!"
1004403-108 = "...Ah!?"
1004403-114 = "Ai, ai, ai..."
1004403-115 = "V-você está bem, Sensei?"
1004403-116 = "Desculpe, acabei perdendo o equilíbrio..."
1004403-117 = "Não estou muito acostumada com esse tipo de coisa..."
1004403-121 = "Sensei...?"
1004403-122 = "...Ué?"
1004403-126 = "P-Sensei...!?"
1004403-130 = "V-você está bem, Sensei!? Me desculpe... eu acabei caindo em cima de você...!?"
1004403-131 = "Hum... o que eu deveria fazer numa hora dessas..."
1004403-132 = "[s11] \"Você está bem, Nonomi?\"\n[s12] \"Eu estou bem, em todos os sentidos.\""
1004403-133 = "S-sim... eu estou bem, graças ao Sensei..."
1004403-134 = "É mesmo...? Ahaha..."
1004403-135 = "Hmm, desse jeito vai ser difícil... Depois eu trago uma escada e tento de novo!"
1004403-136 = "Mesmo com a sua ajuda, Sensei, acabamos voltando de mãos vazias. Me desculpe."
1004403-137 = "...Não estamos de mãos vazias, você diz?"
1004403-138 = "Mas nós não conseguimos nada..."
1004403-139 = "[s13] \"Tudo aqui serve como experiência.\"\n[s14] \"O processo de tentativa e erro também faz parte da diversão.\""
1004403-144 = "...Fufu."
1004403-145 = "Sim, sim! Você tem toda razão! Como esperado do Sensei☆"
1004403-149 = "Então vamos voltar por enquanto... e na próxima, vamos vir colher juntos!"
1004403-150 = "Daquela vez..."
1004403-151 = "...Sim."
1004403-152 = "[s] \"...Nonomi?\""
1004403-153 = "...Não, não é nada."
1004403-154 = "É só que..."
1004403-156 = "Senti como se... daquela vez também, eu fosse acabar esquecendo de trazer a escada."
