[translation]
1004403-1 = "ココナッツ採りに挑戦"
1004403-4 = "あ、先生！"
1004403-5 = "こっちです～！お待ちしておりました！"
1004403-9 = "見てください！"
1004403-10 = "あの辺の木、ぜ～んぶヤシの木なんですよ！"
1004403-11 = "た～くさん採って、みんなで食べましょう～☆"
1004403-12 = "[s1] \"すごく大きい木ばかりだね。\"\n[s2] \"脚立を持ってくれば良かったね。\""
1004403-13 = "それが……"
1004403-14 = "それが……"
1004403-15 = "脚立は今、別の作業で使っちゃってて……。"
1004403-16 = "そっちが終わるのを待ってからでもいいのですが……"
1004403-17 = "作業が終わったタイミングで、ココナッツジュースをみんなで飲めたらな～って！ひらめいたんです！"
1004403-18 = "[s3] \"作業してたら喉が渇くもんね。\"\n[s4] \"うんうん。いいね！\""
1004403-21 = "うんうん！そういう事です！！"
1004403-22 = "脚立無しでヤシの木からココナッツを採る方法……"
1004403-23 = "何かいい案……あ！"
1004403-28 = "そうです！こういうのはどうでしょう？"
1004403-32 = "よいしょっと、これを持って……。"
1004403-36 = "[ns5] \"えっと……ノノミさん？\"\n[ns6] \"どうして急にミニガンを……？\""
1004403-37 = "うふふ☆"
1004403-38 = "うふふ☆"
1004403-39 = "登れないなら……"
1004403-41 = "落とせばいいんです！"
1004403-45 = "お掃除の時間ですよ～☆"
1004403-58 = "……じゃ、ジャーン！！☆"
1004403-62 = "[ns7] \"ジャーン……じゃなくない！？\"\n[ns8] \"他の方法を探そうか……。\""
1004403-65 = "やっぱりちょっと乱暴すぎました？ココナッツも全部割れちゃいましたし……。"
1004403-66 = "島の環境を壊しちゃったような……。"
1004403-67 = "う～ん、他の方法……どうしましょう？"
1004403-70 = "[ns9] \"肩車とかどうかな。\"\n[ns10] \"背が低い木は肩車で届くんじゃないかな？\""
1004403-73 = "えっ……"
1004403-74 = "肩車ですか？わかりました☆"
1004403-75 = "じゃあ、私が先生を持ち上げますね！任せてください！"
1004403-76 = "……あ、私が先生の上に乗る方……ですか？"
1004403-80 = "そ、そっちですか……！？"
1004403-81 = "い、いえ！嫌なわけじゃなくて……！今まで考えた事もなかっただけで……！"
1004403-82 = "ええと……で、では、よろしくお願いしますね、先生。"
1004403-88 = "……少し重たくても、文句言わないでくださいね☆"
1004403-91 = "（ノノミを肩に乗せて、背が低いヤシの木に近づいた）"
1004403-95 = "せ、先生？もう少しゆっくり……。"
1004403-96 = "す、すみません。肩車に乗るのは初めてで……なんだか緊張しますね。"
1004403-101 = "う～ん……あとちょっとで……！"
1004403-102 = "もうちょっと、あと少し……！"
1004403-108 = "……あっ！？"
1004403-114 = "あいたたた……"
1004403-115 = "だ、大丈夫ですか先生？"
1004403-116 = "すみません、バランスを崩してしまって……"
1004403-117 = "こういうのあまり慣れていなくて……。"
1004403-121 = "先生……？"
1004403-122 = "……あれ？"
1004403-126 = "せ、先生……！？"
1004403-130 = "だ、大丈夫ですか先生！？すみません……私、先生の上に……！？"
1004403-131 = "えっと……こういう時どうすれば……。"
1004403-132 = "[s11] \"ノノミこそ大丈夫？\"\n[s12] \"私は大丈夫だよ、色んな意味で。\""
1004403-133 = "は、はい……私は、先生のおかげで……。"
1004403-134 = "そうですか……？あはは……。"
1004403-135 = "う～ん、このままでは難しいですね……後で脚立を持ってきてチャレンジしてみます！"
1004403-136 = "せっかく先生に手伝ってもらったのに、手ぶらで帰ることになっちゃいましたね。すみません。"
1004403-137 = "……手ぶらではない、ですか？"
1004403-138 = "でも私たち、何も……。"
1004403-139 = "[s13] \"ここではなんでも経験になるよ。\"\n[s14] \"試行錯誤の過程もまた、遊びだからね。\""
1004403-144 = "……ふふっ。"
1004403-145 = "うんうん！おっしゃる通りです！さすが先生ですね☆"
1004403-149 = "それでは一旦戻って……また今度、一緒に採りに来ましょう！"
1004403-150 = "その時は……。"
1004403-151 = "……うん。"
1004403-152 = "[s] \"……ノノミ？\""
1004403-153 = "……ううん、何でもないです。"
1004403-154 = "ただ……。"
1004403-156 = "なんだか……その時も、脚立を持ってくるのを忘れそうな気がしただけです。"
