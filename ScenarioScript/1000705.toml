[translation]
1000705-1 = "Gênio e louco andam de mãos dadas"
1000705-2 = "Millennium - Sala de Aula"
1000705-3 = "E-então, eu tirei nota vermelha nessa prova não foi porque eu não estudei, mas sim porque..."
1000705-4 = "Para começo de conversa, as provas da Millennium são difíceis demais! #nSó tem questão que não leva em conta o nível de um estudante comum!"
1000705-5 = "[s] \"Se você fizer a prévia e a revisão direitinho, a Maki também consegue resolver.\""
1000705-6 = "Ugh, falando igual ao Sensei... #nAh, é, você é o Sensei. Faz sentido."
1000705-7 = "Mas não importa o quanto eu decore o livro didático, eu simplesmente não entendo a questão em si."
1000705-8 = "Principalmente em Língua Portuguesa! #nLer um texto e adivinhar o que o personagem está sentindo? Isso não é nível de leitura de mentes?"
1000705-9 = "Hm? Por que eu consigo hackear, mas não consigo resolver essas questões simples?"
1000705-10 = "Do que você está falando! Hackear é muito mais fácil!"
1000705-11 = "Se colocar água demais no balde, ela transborda. #nSe não tiver a chave certa para a fechadura, você pede para alguém que tenha abrir para você. #nHackear é só seguir esses métodos que fazem todo sentido lógico!"
1000705-12 = "Diz que resolver questões de Língua Portuguesa deveria ser mais fácil que hackear? Sério? #nHmm, deixa eu ver..."
1000705-13 = "Ah? Uh-huh, entendi, então quando tem muitas expressões assim, significa que o personagem está feliz? #nEntendi, saquei!"
1000705-14 = "Sensei, e essa parte aqui, o que significa...?"
1000705-16 = "Obrigada, Sensei! #nSe cair exatamente como você explicou, não vou ter problemas na próxima prova!"
1000705-17 = "Explicar questões tão difíceis de um jeito tão fácil... como esperado do Sensei!"
1000705-18 = "O quê? É porque eu aprendo rápido?"
1000705-19 = "Hehe, fico até com vergonha de ser elogiada assim."
1000705-20 = "Eu não sou inteligente como os veteranos da Veritas, mas não quero ficar para trás nas aulas e causar problemas para o clube."
1000705-21 = "Porque a Veritas é um dos poucos lugares importantes para mim, onde não me chamam de criança problemática e reconhecem o meu talento."
1000705-22 = "Claro que o Sensei também é uma existência especial para mim. #nPor isso, eu vou... me esforçar ainda mais."
1000705-23 = "Ah, ahaha! E-eu acabei falando algo meio vergonhoso... #nEsquece o que eu disse agora há pouco!"
1000705-24 = "Muito bem. Então, para memorizar o conteúdo que o Sensei organizou, #nque tal eu dar uma olhada no caderno de novo?"
1000705-25 = "\"Este caderno utiliza papel de desenho branco de 80g nas folhas internas. #nA especificação é de 297mm x 210mm, cortado no tamanho de papel A4, com 100 folhas numeradas...\""
1000705-26 = "Hm? Do que eu estou falando? #nÉ o texto que está escrito na primeira página do caderno, ué?"
1000705-27 = "Ah, não era para decorar essa parte? #nÉ que você disse para eu decorar o caderno inteiro..."
1000705-28 = "E-espera! Como assim é difícil saber se eu sou gênio ou idiota? #nO que é isso! Sensei!"
