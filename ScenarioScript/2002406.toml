[translation]
2002406-1 = "Se não há pão"
2002406-2 = "（Após terminar um trabalho, fui até a rua comercial para um almoço um pouco atrasado）"
2002406-4 = "Distrito de Trinity - Rua comercial dos arredores"
2002406-5 = "[ns] \"Ah, ainda tem 'chococorone' disponível?\""
2002406-6 = "S-sinto muito..."
2002406-7 = "O estoque de hoje já se esgotou."
2002406-8 = "A próxima fornada está prevista para daqui a três horas."
2002406-9 = "[s] \"Entendo... Sabe se tem outra padaria por aqui?\""
2002406-10 = "Sinto muito, mas creio que a nossa seja a única em toda esta área..."
2002406-11 = "Temos várias outras coisas além de pães, mas..."
2002406-12 = "[ns] \"Mas eu estava com tanta vontade de comer pão...\""
2002406-17 = "Ora, Sensei, que coincidência."
2002406-18 = "Quem diria que nos encontraríamos em um lugar como este."
2002406-19 = "O que o traz por aqui...?"
2002406-20 = "...Entendo, veio buscar um chococorone. De fato, ele é muito famoso."
2002406-21 = "[s] \"Eu queria comer pão hoje, então estava pensando no que fazer para o almoço...\""
2002406-22 = "Fufu, entendo... mas esse é um problema simples."
2002406-23 = "Se não há pão, por que não come bolo?"
2002406-24 = "[s] \"Isso soa como algo que uma certa tirana diria...\""
2002406-25 = "Fufu, mas não estou sendo sarcástica. O pão não é feito misturando farinha, água e alguns outros ingredientes e assando?"
2002406-26 = "O bolo é a mesma coisa. Como é feito misturando farinha e outros ingredientes e assado, creio que sirva perfeitamente como um substituto para o pão."
2002406-27 = "Eu mesma, às vezes, acabo comendo tanto bolo na hora do chá que nem preciso jantar."
2002406-28 = "Sendo assim... Sensei, se não se importar, que tal se juntar a mim para um chá agora?"
2002406-29 = "Eu tinha acabado de buscar um bolo inteiro que encomendei para a festa do chá da tarde... mas a reunião foi adiada de repente."
2002406-30 = "Eu estava justamente procurando alguém para comer este bolo comigo."
2002406-32 = "（Depois disso, aproveitei a festa do chá enquanto comia bolo com Nagisa）"
