[translation]
70014060-1 = "The Apothecary's Wanderings (6)"
70014060-2 = "Study?"
70014060-3 = "[s] \"Yes. Because you're smart, Kai.\""
70014060-7 = "[ns1] \"What do people rely on to live?\"\n[ns2] \"What is the foundation of people's lives?\""
70014060-10 = "[ns3] \"There are countless things.\"\n[ns4] \"Textbooks, research papers, and so on.\"\n[ns5] \"Everything humanity has accumulated up to this point.\""
70014060-14 = "You want me to study conventional methods? At this stage?"
70014060-15 = "[s] \"That's right.\""
70014060-16 = "……."
70014060-20 = "I already understand them. But that method is..."
70014060-21 = "It's like trying to consciously control every single breath you take."
70014060-22 = "For others, it should be a natural, innate way of breathing."
70014060-23 = "But for me, it isn't natural. #nEven so, you're telling me to try it?"
70014060-24 = "[s] \"Yes.\""
70014060-25 = "And if I refuse?"
70014060-26 = "To me, that process is nothing but agony."
70014060-27 = "Everyone has the right to refuse pain, don't they?"
70014060-28 = "[s6] \"That's true. I can't force you.\"\n[s7] \"But I want you to try it at least once.\""
70014060-31 = "Why...?"
70014060-32 = "[s] \"It's not good to expect different results from the same method, is it?\""
70014060-33 = "Hmph."
70014060-34 = "Heh... You got me there."
70014060-35 = "Let me make one thing clear."
70014060-36 = "I haven't been 'corrected,' and I won't be corrected in the future either."
70014060-37 = "[s] \"Well... I didn't think it would be that easy.\""
70014060-41 = "[ns] \"But I still want you to try that kind of practice just once.\""
70014060-42 = "……."
70014060-43 = "I see."
70014060-50 = "Oh, are you leaving?"
70014060-51 = "[s8] \"Yes. Thank you for everything.\"\n[s9] \"Please, take care of yourself.\""
70014060-54 = "Ho ho ho... No need to worry."
70014060-55 = "I have Kai here with me, after all."
70014060-56 = "……And I have nothing else to do for the time being."
70014060-57 = "But are you really sure? #nEven though I tried to take over this house?"
70014060-58 = "Are you still on about that? #nI wouldn't mind handing it over to you right now, actually."
70014060-59 = "I've managed to survive this long. No matter where I go now, I doubt I'll end up dying in the streets."
70014060-63 = "…………What a buzzkill."
70014060-64 = "Is that so? Ho ho ho."
70014060-66 = "(I said goodbye to Kai and the old man, then left the black market.)"
70014060-67 = "(On the way back, I ruminated on Kai's words.)"
70014060-68 = "(And, thinking of another student I was worried about—)"
70014060-69 = "(I returned to Schale with heavy footsteps.)"
70014060-73 = "Is it to your liking?"
70014060-74 = "Ho ho... So you even cooked."
70014060-75 = "It's just invalid food. People usually avoid it because it's bland."
70014060-76 = "On the contrary, I'm grateful that it's gentle on my stomach."
70014060-77 = "But still... why the sudden change of heart?"
70014060-78 = "Well, it's nothing major. It's just..."
70014060-82 = "……."
70014060-83 = "I thought I'd try practicing some breathing techniques for a change of pace."
70014060-84 = "Since I happen to have a good 'practice partner' right here."
70014060-86 = "The Apothecary's Wanderings"