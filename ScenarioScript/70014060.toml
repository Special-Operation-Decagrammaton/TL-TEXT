[translation]#[Texto Final. - Filipe 08/07.]
70014060-1 = "A Andança do Farmacêutico (6)"
70014060-2 = "Estudar?"
70014060-3 = "[s] \"Sim. Você é inteligente, Kai.\""
70014060-7 = "[ns1] \"Em que as pessoas se apoiam para viver?\"\n[ns2] \"Qual é a base da vida das pessoas?\""
70014060-10 = "[ns3] \"Existem incontáveis respostas.\"\n[ns4] \"Livros, artigos científicos.\"\n[ns5] \"Tudo o que a humanidade acumulou ao longo do tempo.\""
70014060-14 = "Estudar o método comum? Agora?"
70014060-15 = "[s] \"Isso.\""
70014060-16 = "……"
70014060-20 = "Eu já entendo. Mas esse método……"
70014060-21 = "É como tentar respirar prestando atenção em cada passo, com muito esforço."
70014060-22 = "Para os outros, a respiração é algo natural, dado de nascença."
70014060-23 = "Para mim, não é natural.#nMesmo assim, quer que eu tente?"
70014060-24 = "[s] \"Sim.\""
70014060-25 = "E se eu recusar?"
70014060-26 = "Para mim, esse processo é apenas sofrimento."
70014060-27 = "Qualquer um tem o direito de recusar o sofrimento, não tem?"
70014060-28 = "[s6] \"É verdade. Não posso forçar.\"\n[s7] \"Mas quero que você tente pelo menos uma vez.\""
70014060-31 = "Por quê……?"
70014060-32 = "[s] \"Esperar resultados diferentes fazendo a mesma coisa, não é certo, né?\""
70014060-33 = "Ora."
70014060-34 = "Kuku…… você me venceu nessa."
70014060-35 = "Deixa eu deixar uma coisa clara."
70014060-36 = "Não estou sendo 'corrigido' e não serei 'corrigido'."
70014060-37 = "[s] \"Bom…… não espero que seja fácil.\""
70014060-41 = "[ns] \"Mas quero que você tente esse exercício pelo menos uma vez.\""
70014060-42 = "……"
70014060-43 = "Entendo."
70014060-50 = "Ora, vai embora?"
70014060-51 = "[s8] \"Sim. Obrigado pela hospitalidade.\"\n[s9] \"Se cuide.\""
70014060-54 = "Hohoho…… não precisa se preocupar."
70014060-55 = "A Kai está aqui comigo."
70014060-56 = "……E também não tenho mais nada pra fazer."
70014060-57 = "Mas tem certeza?#nEu ia tomar sua casa, lembra?"
70014060-58 = "Essa história de novo?#nOlha, posso te dar a casa agora mesmo."
70014060-59 = "Sobrevivi até hoje. Não vou morrer na rua agora."
70014060-63 = "……Quebro o clima."
70014060-64 = "É mesmo? Hohoho."
70014060-66 = "(Me despedi de Kai e da velha e saí do Mercado Negro)"
70014060-67 = "(No caminho de volta, fiquei repetindo as palavras de Kai)"
70014060-68 = "(E, pensando em outra aluna que me preocupa――)"
70014060-69 = "(com passos pesados, voltei para a Schale)"
70014060-73 = "Está do seu gosto?"
70014060-74 = "Hohoho…… você também cozinha?"
70014060-75 = "É só comida de doente. Se for sem graça, ninguém come."
70014060-76 = "Pelo contrário, é leve e faz bem pro estômago."
70014060-77 = "Mas, por que fazer isso de repente?"
70014060-78 = "Bom, não é grande coisa. Só……"
70014060-82 = "……"
70014060-83 = "Pensei em praticar a respiração como um passatempo."
70014060-84 = "Até porque tenho um bom 'parceiro de treino' aqui."
70014060-86 = "A Andança do Farmacêutico"