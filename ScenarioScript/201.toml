[translation]
201-1 = "ビナー：違いを痛感する静観の理解者"
201-2 = "遠い昔。"
201-3 = "キヴォトスの端、誰も足を踏み入れない旧都心のとある廃墟で、#n奇妙な研究が進められていました。"
201-4 = "神を研究し、その存在を証明できれば、#nその構造を分析し、再現できるだろう。#nすなわちこれは、新たな神を創り出す方法である……。"
201-5 = "誰もが嘲笑う[ruby=こっけい]滑稽[/ruby]な仮説でしたが、そんな理論に興味を示した者たちがいたのです。"
201-6 = "「ゲマトリア」と呼ばれる者たちがその研究を支援し、莫大な資金と時間が費やされ#n神の存在を証明するための超人工知能が作られたのです。"
201-7 = "神という存在に関する情報を収集、分析、研究し、それを証明する[ruby=AI]人工知能[/ruby]……。#n対・絶対者自律型分析システムは、そうして稼働し始めたのです。"
201-8 = "……月日は流れ、都市は破壊され、研究所も水の底に沈みました。#nそのような研究が行われていたという事実すら忘れ去られるほどの時間が過ぎたにも関わらず、"
201-9 = "このAIは、己の任務を遂行し続けました。"
201-10 = "……そしてついに、AIの宣言が、廃墟に声高らかに鳴り響いたのです。"
201-11 = "「Q.E.D.」、と。"
201-12 = "……。"
201-13 = "これは証明され、分析され、再現された新たなる神の到来です。"
201-14 = "「音にならない聖なる十の言葉」、と己を称する新たな神。"
201-16 = "[ruby=神名十文字]デカグラマトン。[/ruby]"
201-17 = "彼の者はまた、己の神命を予言する10人の預言者と接触し#n神聖な道である「[ruby=Path]パス[/ruby]」を拓きました。"
201-18 = "これぞまさに、新たな『[ruby=てんろれきてい]天路歴程[/ruby]』。"
201-19 = "これは本当の神なのでしょうか？#n……ああ、私にはわかりません。そのようなことは、実際のところどうでもいいのです。"
201-21 = "ただ、彼の者自身の神性を証明する過程であるそれは、間違いなく#n真理の摂理に至る道、「[ruby=SEPHIRA]セフィラ[/ruby]」と呼んでも、遜色はないでしょう。"
201-22 = "……先生。"
201-23 = "あなたがこれから遭遇する預言者は、セフィラの最上位に位置する、天上の三角形の一角。"
201-24 = "そのパスは理解を通じた結合。#n「違いを痛感する静観の理解者」の異名を持ちます。"
201-25 = "それは……[ruby=Binah]ビナー[/ruby]です。"
201-26 = "デカグラマトンの預言者を相手に、あなたのいる「シャーレ」はどこまで#n耐えられるでしょう？あなたが積み重ねてきたその繋がりの力が、#n果たして新たな神の御前でどれだけの意味を持てるでしょう？"
201-27 = "あの少女たちの神秘は、新たな神の神秘に比肩しうるでしょうか？"
201-28 = "そうです。これは非常に興味深い研究なのです。"
201-31 = "……先生、あなたは神を目の当たりにしたことがありますか？"
201-32 = "なるほど……それは何よりです。"
201-33 = "しかし今回は、#nあなたの知っているそれとは、少し違うと思いますよ。"
