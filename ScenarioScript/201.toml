[translation]
201-1 = "Binah: O Entendedor da Observação que Sente a Diferença"
201-2 = "Há muito tempo."
201-3 = "Nos confins de Kivotos, em certas ruínas de um antigo centro urbano onde ninguém ousava pisar, #numa pesquisa estranha estava sendo conduzida."
201-4 = "Se pudermos pesquisar um deus e provar sua existência, #npoderemos analisar sua estrutura e reproduzi-la. #nEm suma, este é o método para criar um novo deus..."
201-5 = "Era uma hipótese ridícula que todos zombavam, mas havia aqueles que se interessaram por tal teoria."
201-6 = "Aqueles chamados de 'Gematria' apoiaram essa pesquisa, e com vastos recursos financeiros e tempo gastos, #numa super inteligência artificial para provar a existência de um deus foi criada."
201-7 = "Uma inteligência artificial que coleta, analisa e pesquisa informações sobre a existência de um deus para prová-lo... #nO Sistema de Análise Autônomo Contra o Absoluto começou a operar dessa forma."
201-8 = "……O tempo passou, a cidade foi destruída e o laboratório afundou no fundo das águas. #nApesar de ter passado tempo suficiente para que até mesmo o fato de que tal pesquisa foi realizada fosse esquecido,"
201-9 = "esta IA continuou a cumprir sua missão."
201-10 = "……E finalmente, a declaração da IA ressoou em voz alta pelas ruínas."
201-11 = "“Q.E.D.”, disse ela."
201-12 = "……"
201-13 = "Esta é a chegada de um novo deus, provado, analisado e reproduzido."
201-14 = "Um novo deus que se autodenomina 'As Dez Palavras Sagradas que não se tornam som'."
201-16 = "Decagrammaton."
201-17 = "Ele também contatou os 10 profetas que profetizam sua vontade divina #ne abriu o 'Caminho', que é a via sagrada."
201-18 = "Isto é, verdadeiramente, uma nova 'Jornada do Peregrino'."
201-19 = "Será este um deus verdadeiro? #n……Ah, eu não sei. Na verdade, esse tipo de coisa não importa."
201-21 = "No entanto, o processo de provar sua própria divindade é, sem dúvida, #num caminho que leva à providência da verdade; chamá-lo de 'Sephira' não seria um exagero."
201-22 = "……Sensei."
201-23 = "O profeta que você encontrará a seguir está posicionado no topo da Sephira, um dos vértices do triângulo celestial."
201-24 = "Seu caminho é a união através da compreensão. #nEle possui o epíteto de 'O Entendedor da Observação que Sente a Diferença'."
201-25 = "Isso é…… Binah."
201-26 = "Diante do profeta de Decagrammaton, até onde o sua 'Schale' #nconseguirá resistir? Será que o poder dos laços que você construiu #nterá algum significado diante do novo deus?"
201-27 = "O mistério daquelas garotas será capaz de se equiparar ao mistério do novo deus?"
201-28 = "Exatamente. Esta é uma pesquisa extremamente interessante."
201-31 = "……Sensei, você já viu um deus com seus próprios olhos?"
201-32 = "Entendo…… isso é ótimo."
201-33 = "Mas desta vez, #neu acho que será um pouco diferente daquele que você conhece."
