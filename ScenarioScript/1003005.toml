[translation]
1003005-1 = "お返し"
1003005-2 = "温泉郷・お土産屋さん"
1003005-3 = "あ、先生。来ていただいてありがとうございます。"
1003005-4 = "すみません、お忙しい中で。"
1003005-5 = "もしかしてお休みのところを、お邪魔してしまいましたか……？"
1003005-6 = "[s1] \"そんなこと無いよ、大丈夫。\"\n[s2] \"ちょうど時間があったから。\""
1003005-7 = "そうですか……なら、よかったです。"
1003005-8 = "そうですか……なら、よかったです。"
1003005-9 = "あ、実はこうして来ていただいたのはその……お返しを、選びたくって。"
1003005-10 = "[s] “お返し？\""
1003005-11 = "はい。半ば強引にいただいた休日とはいえ、休暇は休暇。"
1003005-12 = "他の部員たちが頑張っているときに私だけが休んでいたわけですから、風紀委員のみなさんにはお返しとして、お土産くらいは買って帰りたいなと。"
1003005-13 = "ただ、私はこういったことも今まであまり無かったので、いったい何を買っていけば良いのかと悩んでしまいまして……。"
1003005-14 = "経験豊富な大人である先生に、助言を頂きたく。"
1003005-15 = "[s3] \"なるほど。\"\n[s4] \"うーん、パッと良い物が思いつかない……。\""
1003005-16 = "なるほど……いつも生徒たちに囲まれている先生でも、やはり悩まれるんですね。"
1003005-17 = "なるほど……いつも生徒たちに囲まれている先生でも、やはり悩まれるんですね。"
1003005-18 = "[s] \"風紀委員のみんなが、共通して好きなものとかは？\""
1003005-19 = "それは、その……。"
1003005-20 = "ゲヘナは特にと言いますか、それぞれかなり個性が強いので、全員共通で喜んでくれそうなものというのは中々……。"
1003005-21 = "では……そうですね。"
1003005-22 = "まずはここにあるものを、一緒にひとつひとつ見ていきましょうか？"
1003005-25 = "まずはここにあるものを、一緒にひとつひとつ見ていきましょうか？"
1003005-27 = "温泉のお土産って色々あるものなんですね、驚きました。"
1003005-28 = "お菓子ひとつ取っても、味や形で何十種類も……。"
1003005-29 = "これは悩んでしまいそうです。"
1003005-30 = "[s] \"このペロロ饅頭とかどう？\""
1003005-31 = "この不思議な鳥、本当にどこにでもいるんですよね……どこが魅力的なのかいまいち理解しかねるのですが……。"
1003005-32 = "私は嫌いというほどでもないのですが、風紀委員の中にはかなり嫌がられる方もいますので、ちょっと難しいかもしれません。"
1003005-33 = "えっと、他には……。"
1003005-34 = "[s] \"この入浴剤とかどう？\""
1003005-35 = "「ゲヘナ特製地獄入浴剤。湿気に触れた瞬間に爆発し、周りの環境を一瞬で地獄へと変えることができます。冷水に入れてもOK」"
1003005-36 = "その、興味深くはあるのですが……風紀委員たちの手に渡ったら、何だか困った事態になりそうな気がしますね。ましてやそれ以外の、ゲヘナの特定の生徒たちが手に入れてしまったら……。"
1003005-37 = "な、何かもう少し、穏便なお土産を……。"
1003005-41 = "[ns] \"この温泉マークが描かれたリボンとかは？\""
1003005-42 = "これは……可愛らしい、ですね。"
1003005-43 = "温泉らしさもありますし、派手過ぎませんし、お土産としても悪くなさそうです。"
1003005-44 = "あ、ただ値段が……これですと、全員分は厳しいかもしれません。"
1003005-45 = "残念ですが、他のお土産を探さないといけないですね……。"
1003005-46 = "先生、あちらの方も見てみましょう。"
1003005-48 = "（その後、チナツとお土産屋さんの棚を一つ一つ物色した）"
1003005-51 = "抹茶羊羹……。"
1003005-52 = "確かに甘すぎなくて万人受けもしそうですが、こんな普通のお土産で大丈夫でしょうか……？"
1003005-53 = "[s5] \"お土産は中身より気持ちが大事、ってこともあるから。\"\n[s6] \"普通なのは良いことだと思うよ。\""
1003005-54 = "……ふふ、そうですね。"
1003005-55 = "……ふふ、そうですね。"
1003005-56 = "先生がそうおっしゃってくださって、安心しました。"
1003005-57 = "ありがとうございます、先生。おかげで何とか良い物を選べました。"
1003005-58 = "ところで、先生も先ほど何かを購入されたようでしたが……"
1003005-59 = "先生も、お土産を？"
1003005-65 = "[ns] \"これはチナツへのお返しだよ、はい。\""
1003005-66 = "……え、わ、私ですか！？"
1003005-68 = "これって……あ、先ほど見ていたリボン……。"
1003005-69 = "で、ですが私は、先生のお役に立つようなことはしていないのに、どうしてお返しを……。"
1003005-70 = "[s7] “普段から、私の健康を気遣ってくれてありがとう。\"\n[s8] \"それに、チナツのおかげで楽しい時間を過ごせたから。\""
1003005-75 = "……本当に、先生は不思議な方ですね。"
1003005-76 = "まるで私の心を読んでいるかのように……。"
1003005-77 = "あらためて、ありがとうございます。先生。"
1003005-78 = "このリボン……ずっと、大切にします。"
