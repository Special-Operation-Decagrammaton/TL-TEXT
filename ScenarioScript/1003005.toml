[translation]
1003005-1 = "Retribuição"
1003005-2 = "Estância Termal - Loja de Lembranças"
1003005-3 = "Ah, Sensei. Obrigado por ter vindo."
1003005-4 = "Desculpe incomodá-lo, mesmo com sua agenda cheia."
1003005-5 = "Por acaso eu interrompi o seu dia de folga...?"
1003005-6 = "[s1] \"Não é nada disso, está tudo bem.\"\n[s2] \"Eu só tinha um tempo livre agora.\""
1003005-7 = "Entendo... Fico aliviada então."
1003005-8 = "Entendo... Fico aliviada então."
1003005-9 = "Ah, na verdade, eu pedi para você vir porque... eu queria escolher um presente de retribuição."
1003005-10 = "[s] \"Retribuição?\""
1003005-11 = "Sim. Embora tenha sido um feriado forçado, ainda é um descanso."
1003005-12 = "Como eu fui a única que descansou enquanto as outras integrantes estavam trabalhando duro, eu queria comprar pelo menos uma lembrancinha para o pessoal do Comitê Disciplinar como forma de agradecimento."
1003005-13 = "No entanto, como nunca tive que fazer algo assim antes, fiquei sem saber o que seria bom comprar..."
1003005-14 = "Gostaria de pedir um conselho ao Sensei, que é um adulto experiente."
1003005-15 = "[s3] \"Entendo.\"\n[s4] \"Hmm, não consigo pensar em nada bom de imediato...\""
1003005-16 = "Entendo... Mesmo o Sensei, que está sempre cercado por alunas, também tem suas dúvidas, não é?"
1003005-17 = "Entendo... Mesmo o Sensei, que está sempre cercado por alunas, também tem suas dúvidas, não é?"
1003005-18 = "[s] \"Tem algo que todas do Comitê Disciplinar gostem em comum?\""
1003005-19 = "Isso é... bem..."
1003005-20 = "Gehenna tem personalidades muito fortes, então é difícil encontrar algo que agrade a todas igualmente..."
1003005-21 = "Então... vejamos."
1003005-22 = "Primeiro, que tal olharmos juntos o que tem aqui, um por um?"
1003005-25 = "Primeiro, que tal olharmos juntos o que tem aqui, um por um?"
1003005-27 = "Fiquei surpresa ao ver que existem tantas lembrancinhas de fontes termais."
1003005-28 = "Só de doces, existem dezenas de tipos, variando em sabor e formato..."
1003005-29 = "Isso vai ser difícil de decidir."
1003005-30 = "[s] \"Que tal esse Manju do Peroro?\""
1003005-31 = "Esse pássaro estranho está em todo lugar, não é... Eu não entendo muito bem o que ele tem de tão atraente..."
1003005-32 = "Eu não diria que odeio, mas algumas integrantes do Comitê Disciplinar detestam, então talvez seja complicado."
1003005-33 = "Bem, o que mais..."
1003005-34 = "[s] \"Que tal este sais de banho?\""
1003005-35 = "\"Sais de banho infernais especiais de Gehenna. Explodem ao entrar em contato com a umidade, transformando o ambiente ao redor em um inferno instantaneamente. Pode ser usado em água fria.\""
1003005-36 = "Bem, é interessante, mas... se cair nas mãos do Comitê Disciplinar, sinto que causará uma situação problemática. E se certas alunas de Gehenna colocarem as mãos nisso..."
1003005-37 = "A-algo um pouco mais inofensivo, por favor..."
1003005-41 = "[ns] \"Que tal essa fita com o símbolo de fonte termal?\""
1003005-42 = "Isso é... adorável."
1003005-43 = "Tem a cara das fontes termais, não é chamativo demais e parece ser uma boa lembrancinha."
1003005-44 = "Ah, mas o preço... por esse valor, talvez seja difícil comprar para todas."
1003005-45 = "Que pena, teremos que procurar outra coisa..."
1003005-46 = "Sensei, vamos olhar ali também."
1003005-48 = "(Depois disso, Chinatsu e eu vasculhamos as prateleiras da loja de lembranças, uma por uma.)"
1003005-51 = "Yokan de chá verde..."
1003005-52 = "Certamente não é doce demais e deve agradar a todos, mas será que uma lembrança tão comum está bom...?"
1003005-53 = "[s5] \"Às vezes, o sentimento é mais importante que o presente em si.\"\n[s6] \"Acho que ser algo comum é bom.\""
1003005-54 = "……Fufu, é verdade."
1003005-55 = "……Fufu, é verdade."
1003005-56 = "Fico aliviada por você dizer isso, Sensei."
1003005-57 = "Obrigada, Sensei. Graças a você, consegui escolher algo bom."
1003005-58 = "Aliás, parece que o Sensei também comprou algo agora pouco..."
1003005-59 = "Você também comprou uma lembrancinha, Sensei?"
1003005-65 = "[ns] \"Isto é um presente de retribuição para você, Chinatsu. Aqui.\""
1003005-66 = "……Eh, v-você está falando comigo!?"
1003005-68 = "Isto é…… ah, a fita que estávamos vendo mais cedo……."
1003005-69 = "M-mas eu não fiz nada que fosse realmente útil para o Sensei, então por que me dar um presente de retribuição……."
1003005-70 = "[s7] \"Obrigado por sempre se preocupar com a minha saúde.\"\n[s8] \"Além disso, graças a você, Chinatsu, eu pude passar momentos muito agradáveis.\""
1003005-75 = "……Sinceramente, o Sensei é uma pessoa misteriosa."
1003005-76 = "É como se você pudesse ler a minha mente……."
1003005-77 = "Mais uma vez, muito obrigada, Sensei."
1003005-78 = "Esta fita…… eu vou guardá-la com muito carinho para sempre."
