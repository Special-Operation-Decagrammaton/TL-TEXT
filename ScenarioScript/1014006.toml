[translation]
1014006-1 = "おめかしするキツネ"
1014006-4 = "FOX小隊HQ"
1014006-5 = "[ns] \"おはよう、みんな。\""
1014006-6 = "あれ、[USERNAME]先生？"
1014006-7 = "今日作戦はないはずなのに……何か用？"
1014006-8 = "[ns] \"こないだ害獣駆除でお手伝いした農家からお礼が届いてね。\""
1014006-12 = "[ns1] \"一人じゃ食べきれない量のジャガイモをもらったから……。\"\n[ns2] \"みんなにお裾分け。\""
1014006-15 = "あら、ありがとう！助かるわ！"
1014006-16 = "ジャガイモは色々料理できるものね。"
1014006-17 = "みんなで美味しくいただくわ。"
1014006-18 = "[s] \"ところで、今日はひとり？\""
1014006-19 = "ええ。みんな用事があって。"
1014006-20 = "みんなに要件でもあったの？"
1014006-21 = "[s3] \"特にないけど。\"\n[s4] \"クルミと二人きりって、なんか緊張しちゃって。\""
1014006-25 = "……急にキモイこと言わないでくれる？今更でしょ。"
1014006-26 = "[ns] \"クルミは何してたの？\""
1014006-27 = "ああ、盾の手入れをしてたのよ。"
1014006-28 = "最近よく作戦に出かけるから、キズとかペンキの剥がれが目立つようになっちゃって……。"
1014006-29 = "ちゃんと磨いて、色も新しく塗ろうと思ってね。"
1014006-30 = "[s] \"そうなんだ。お疲れ様。\""
1014006-34 = "[ns5] \"毎回こうやって盾の手入れを？\"\n[ns6] \"キズとかできやすいと思うけど……。\""
1014006-38 = "ああ、毎回塗る必要ないんじゃないってこと？"
1014006-39 = "たしかに銃弾を防ぐために作られたものだし、擦れたり壊れるものだから、毎回丁寧に手入れする必要はないけど……。"
1014006-40 = "私は綺麗にしておきたいのよね。"
1014006-41 = "作戦のとき、相手が最初に目にするのは、ポイントマンが持っているこの盾だもの。"
1014006-42 = "そういう意味では、この盾が小隊の印象を決定づけるのよ。#nなら、綺麗にしておきたいじゃない？"
1014006-43 = "まあ、戦闘に入ったらそんなこと気にする余裕なんてないでしょうけど。"
1014006-44 = "……やっぱり、自己満足にすぎないのかな。"
1014006-45 = "[s7] \"私は素晴らしいと思うよ。\"\n[s8] \"そういう心構えが、FOX小隊をより強くしたんだと思う。\""
1014006-48 = "そ、そう？先生なら分かってくれると思ったわ！"
1014006-49 = "そういった日頃からの心構えが大切よね。たとえ、相手が敵だとしても。"
1014006-50 = "……たまに、お気に入りのシールも貼ったりしてるの。"
1014006-51 = "見て。こないだの雑誌の付録でもらったやつ。かわいいでしょ？"
1014006-52 = "[s] \"かわいいね！\""
1014006-56 = "[ns] \"そういえば、景品でもらったシールがあるんだけど。\""
1014006-57 = "これは、ネコちゃんのシール？"
1014006-58 = "かわいい……。"
1014006-59 = "[s] \"これ、盾に貼って――\""
1014006-60 = "貼らない！"
1014006-61 = "銃弾が飛び交う戦場で使う盾に、こんなかわいいシールを貼るなんて……#n先生は人の心がないの？"
1014006-62 = "こんなものを貼ったら、FOX小隊は血も涙もない鬼集団って思われちゃうでしょ！"
1014006-63 = "[s9] \"ごめん、そこまでは考えてなかった。\"\n[s10] \"じゃあ、このシールは私が――\""
1014006-69 = "……イヤ。"
1014006-70 = "返さない。"
1014006-71 = "盾じゃなくても貼る場所はあるもの。日記帳とか、軍用手帳とか……。"
1014006-72 = "[s] \"クルミ、もしかして……。\""
1014006-73 = "べ、別に先生からもらったものだから大事にしてるわけじゃないわよっ！"
1014006-74 = "これはただ……ネ、ネコが好きなだけなんだから！"
1014006-75 = "か、勘違いしないでよ！バカ！"
1014006-77 = "（その後、クルミの罵倒を浴びせられながら楽しい手入れの時間を過ごした）"
