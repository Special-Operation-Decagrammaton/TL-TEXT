[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1014006-1 = "Uma Raposa Vaidosa" 
1014006-4 = "QG do Esquadrão FOX" 
1014006-5 = "[ns] \"Bom dia, pessoal.\"" 
1014006-6 = "Ué, Sensei?" 
1014006-7 = "Não tínhamos nenhuma operação agendada para hoje……\nO que o traz aqui?" 
1014006-8 = "[ns] \"Recebi um presente de agradecimento de um fazendeiro\nque ajudamos com o controle de pragas outro dia.\"" 
1014006-12 = "[ns1] \"Como eu ganhei batatas demais para comer sozinho……\"\n[ns2] \"Vim dividir com vocês.\"" 
1014006-15 = "Nossa, obrigada!\nVai ajudar muito!" 
1014006-16 = "Dá para fazer vários pratos diferentes\ncom batatas." 
1014006-17 = "Todas nós\nvamos comer com gosto." 
1014006-18 = "[s] \"A propósito,\nvocê está sozinha hoje?\"" 
1014006-19 = "Sim.\nAs outras tinham coisas para resolver." 
1014006-20 = "Você precisava falar\ncom o resto do esquadrão?" 
1014006-21 = "[s3] \"Não, nada em especial.\"\n[s4] \"Mas ficar a sós com você me deixa um pouco nervoso.\"" 
1014006-25 = "……Dá para parar de dizer coisas nojentas do nada?\nA essa altura do campeonato." 
1014006-26 = "[ns] \"O que você estava fazendo?\"" 
1014006-27 = "Ah, eu estava cuidando do meu escudo." 
1014006-28 = "Como temos saído bastante em operações recentemente,\nos arranhões e a tinta descascada começaram a ficar muito evidentes……" 
1014006-29 = "Achei que seria bom dar uma polida\ne uma pintura nova." 
1014006-30 = "[s] \"Entendi.\nBom trabalho.\"" 
1014006-34 = "[ns5] \"Você sempre faz essa manutenção no escudo?\"\n[ns6] \"Mesmo sabendo que ele vai arranhar de novo……\"" 
1014006-38 = "Ah, você quer dizer\nque não há necessidade de pintar toda vez?" 
1014006-39 = "É verdade que ele foi feito para barrar tiros,\nentão é inevitável que acabe arranhado e danificado.\nNão precisaria ser limpo com tanto cuidado toda vez, mas……" 
1014006-40 = "Eu gosto de mantê-lo apresentável." 
1014006-41 = "Durante uma operação, a primeira coisa que o inimigo vê\né o escudo nas mãos do Pointman." 
1014006-42 = "Nesse sentido, esse escudo é o que define a impressão inicial do nosso esquadrão.\nEntão, não é melhor deixá-lo impecável?" 
1014006-43 = "Bom, não que alguém vá ter tempo para prestar atenção nisso\nno meio do tiroteio." 
1014006-44 = "……Acho que no fim das contas\né só capricho meu." 
1014006-45 = "[s7] \"Eu acho isso admirável.\"\n[s8] \"É justamente essa mentalidade que tornou\no Esquadrão FOX tão formidável.\"" 
1014006-48 = "V-Verdade?\nEu sabia que você entenderia, Sensei!" 
1014006-49 = "Esse tipo de mentalidade diária é fundamental.\nMesmo que o alvo seja um inimigo." 
1014006-50 = "……Às vezes, eu até colo\nuns adesivos que eu gosto nele." 
1014006-51 = "Olha só. Esse aqui eu ganhei de brinde de uma revista outro dia.\nFofinho, não é?" 
1014006-52 = "[s] \"Muito fofo!\"" 
1014006-56 = "[ns] \"Isso me lembra que eu tenho\nuns adesivos que ganhei de brinde.\"" 
1014006-57 = "Um…… adesivo de gatinho?" 
1014006-58 = "Que adorável……" 
1014006-59 = "[s] \"Pode colar no escudo se――\"" 
1014006-60 = "Eu não vou colar isso!" 
1014006-61 = "Colar um adesivo fofo desses em um escudo balístico\nnum campo de batalha cheio de tiros……\nVocê não tem coração, Sensei?" 
1014006-62 = "Se eu aparecer com isso colado, vão achar que o Esquadrão FOX\né um bando de monstros sem coração brincando de guerra!" 
1014006-63 = "[s9] \"Desculpe, eu não tinha pensado por esse lado.\"\n[s10] \"Nesse caso, eu fico com o adesivo――\"" 
1014006-69 = "……Não." 
1014006-70 = "Não vou devolver." 
1014006-71 = "Existem outros lugares para colar além do escudo.\nComo o meu diário, meu bloco de notas militar……" 
1014006-72 = "[s] \"Kurumi, por acaso você……\"" 
1014006-73 = "N-Não pense que estou guardando\nsó porque foi você que me deu!" 
1014006-74 = "Eu só…… g-gosto muito de gatos,\né só isso!" 
1014006-75 = "N-Não vá entender tudo errado,\nseu idiota!" 
1014006-77 = "（Depois disso, passamos um tempo agradável cuidando do escudo\nenquanto eu era alvo dos xingamentos da Kurumi.）" 