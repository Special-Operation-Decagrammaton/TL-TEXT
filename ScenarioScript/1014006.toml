[translation]
1014006-1 = "Raposa vestida"
1014006-4 = "QG do Pelotão FOX"
1014006-5 = "[ns] \"Bom dia a todos.\""
1014006-6 = "Uh, [NOME DE USUÁRIO] sensei?"
1014006-7 = "Não deveria haver nenhuma operação hoje...Há algo que você precisa?"
1014006-8 = "[ns] \"Recebi uma nota de agradecimento do fazendeiro que ajudei a exterminar as pragas outro dia.\"\"\n1014006-12 = \"[ns1] \"Recebi mais batatas do que conseguiria comer sozinho...\"\n[ns2] \"Vou compartilhar com todos.\"\"\n1014006-15 = \"Ah, obrigado! Isso ajuda!\"\n1014006-16 = \"As batatas podem ser cozinhadas de muitas maneiras diferentes.\"\n1014006-17 = \"Teremos todos uma deliciosa refeição.\"\n1014006-18 = \"[s] \"A propósito, você está sozinho hoje?\"\"\n1014006-19 = \"Sim. Todo mundo tem algo para fazer.\"\n1014006-20 = \"Era uma exigência para todos?\"\n1014006-21 = \"[s3] \"Nada em particular.\"\n[s4] \"Estou meio nervoso por estar sozinho com Kurumi.\"\"\n1014006-25 = \"...Você poderia, por favor, parar de dizer coisas assustadoras de repente? Agora é tarde demais.\"\n1014006-26 = \"[ns] \"O que Kurumi estava fazendo?\"\"\n1014006-27 = \"Ah, eu estava cuidando do meu escudo.\"\n1014006-28 = \"Ultimamente, tenho saído em muitas missões, então arranhões e pintura descascada tornaram-se mais visíveis...\"\n1014006-29 = \"Estou pensando em polir bem e pintar com uma nova cor.\"\n1014006-30 = \"[s] \"Isso mesmo. Obrigado pelo seu trabalho duro.\""

1014006-34 = "[ns5] \"Você limpa seu escudo assim toda vez?\"\n[ns6] \"Acho que ele arranha facilmente...\""
1014006-38 = "Ah, então você não precisa aplicar sempre?"
1014006-39 = "É verdade que é feito para proteger contra balas, arranha e quebra, então não há necessidade de cuidar dele sempre..."
1014006-40 = "Eu quero mantê-lo limpo."
1014006-41 = "Durante uma estratégia, a primeira coisa que o oponente vê é este escudo segurado pelo apontador."
1014006-42 = "Nesse sentido, este escudo determina a impressão do pelotão. #n, você quer mantê-lo limpo, certo?"
1014006-43 = "Bem, depois de entrar na batalha, você provavelmente não terá o luxo de se preocupar com isso."
1014006-44 = "...Talvez seja apenas auto-satisfação, afinal."
1014006-45 = "[s7] \"Acho ótimo.\"\n[s8] \"Acho que esse tipo de mentalidade tornou o pelotão FOX ainda mais forte.\"\"\n1014006-48 = \"Oh sério? Achei que a Senseia iria entender!\"\n1014006-49 = \"É importante ter esse tipo de mentalidade no dia a dia. Mesmo que a outra pessoa seja seu inimigo.\"\n1014006-50 = \"...Às vezes também coloco meus adesivos favoritos nele.\"\n1014006-51 = \"Olhar. Recebi isso como suplemento de uma revista outro dia. Não é fofo?\"\n1014006-52 = \"[s] \"Tão fofo!\""

1014006-56 = "[ns] \"A propósito, tenho um adesivo que recebi como prêmio.\""
1014006-57 = "Isso é um adesivo de gato?"
1014006-58 = "bonitinho……."
1014006-59 = "[s] \"Coloque isso no seu escudo--\""
1014006-60 = "Não cole!"
1014006-61 = "Para colocar um adesivo tão fofo em um escudo usado em um campo de batalha onde as balas voam... #nO sensei não tem coração humano?"
1014006-62 = "Se você postar algo assim, as pessoas vão pensar que o pelotão da FOX é um grupo de demônios sem sangue nem lágrimas!"
1014006-63 = "[s9] \"Desculpe, não pensei tão longe.\"\n[s10] \"Então, esse adesivo é meu...\""
1014006-69 = "...Eu não gosto disso."
1014006-70 = "Eu não vou devolver."
1014006-71 = "Mesmo que não seja um escudo, há um lugar para colocá-lo. Diários, cadernos militares, etc..."
1014006-72 = "[s] \"Noz, talvez...\""
1014006-73 = "Ei, só porque ganhei do meu sensei não significa que eu valorize isso!"
1014006-74 = "Isso é simplesmente... não, eu adoro gatos!"
1014006-75 = "Ah, não me entenda mal! enganar!"
1014006-77 = "(Depois disso, nos divertimos limpando enquanto recebíamos insultos de Kurumi.)"
