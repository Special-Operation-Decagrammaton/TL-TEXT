[translation]
1014006-1 = "The Fox Getting Dressed Up"
1014006-4 = "FOX Platoon HQ"
1014006-5 = "[ns] \"Good morning, everyone.\""
1014006-6 = "Oh, Sensei?"
1014006-7 = "We don't have any operations scheduled for today... Did you need something?"
1014006-8 = "[ns] \"I received a gift from the farmers I helped with pest control the other day.\""
1014006-12 = "[ns1] \"They gave me more potatoes than I could ever eat on my own...\"\n[ns2] \"So I'm sharing them with you all.\""
1014006-15 = "Oh, thank you! That's a huge help!"
1014006-16 = "There are so many things you can make with potatoes."
1014006-17 = "We'll enjoy them together."
1014006-18 = "[s] \"By the way, are you here alone today?\""
1014006-19 = "Yeah. Everyone else is busy with something."
1014006-20 = "Did you have business with them?"
1014006-21 = "[s3] \"Not really.\"\n[s4] \"It's just... being here alone with Kurumi makes me a bit nervous.\""
1014006-25 = "...Could you not say such creepy things all of a sudden? It's a bit late for that, isn't it?"
1014006-26 = "[ns] \"What were you doing, Kurumi?\""
1014006-27 = "Oh, I was maintaining my shield."
1014006-28 = "I've been going on missions a lot lately, so the scratches and chipped paint have become pretty noticeable..."
1014006-29 = "I was planning on polishing it up and giving it a fresh coat of paint."
1014006-30 = "[s] \"I see. Thanks for your hard work.\""
1014006-34 = "[ns5] \"Do you maintain your shield like this every time?\"\n[ns6] \"I imagine it gets scratched up pretty easily...\""
1014006-38 = "Oh, are you saying I don't need to paint it every time?"
1014006-39 = "It's true that it was made to stop bullets, and it's bound to get scraped or damaged, so I don't necessarily need to maintain it so carefully every single time, but..."
1014006-40 = "I just like to keep it clean."
1014006-41 = "When we're on a mission, the first thing the enemy sees is this shield held by the point man."
1014006-42 = "In that sense, this shield defines the platoon's impression. #nSo, don't you think I should keep it clean?"
1014006-43 = "Well, I suppose once the fighting starts, there's no time to worry about things like that."
1014006-44 = "...I guess it really is just self-satisfaction, isn't it?"
1014006-45 = "[s7] \"I think it's wonderful.\"\n[s8] \"I believe that kind of mindset is what made FOX Platoon stronger.\""
1014006-48 = "R-really? I knew you'd understand, Sensei!"
1014006-49 = "That kind of daily mindset is important. Even if the opponent is an enemy."
1014006-50 = "...Sometimes, I even put my favorite stickers on it."
1014006-51 = "Look. I got this from a magazine supplement the other day. Isn't it cute?"
1014006-52 = "[s] \"It is cute!\""
1014006-56 = "[ns] \"Come to think of it, I have a sticker I got as a prize.\""
1014006-57 = "Is this... a kitty sticker?"
1014006-58 = "So cute..."
1014006-59 = "[s] \"Should I stick this on your shield--\""
1014006-60 = "Don't you dare!"
1014006-61 = "Putting a cute sticker like this on a shield used on a battlefield where bullets are flying... #nDo you have no heart, Sensei?"
1014006-62 = "If I put something like this on it, people will think FOX Platoon is a heartless, bloodthirsty group of demons!"
1014006-63 = "[s9] \"Sorry, I didn't think that far ahead.\"\n[s10] \"In that case, I'll just take this sticker back--\""
1014006-69 = "...No."
1014006-70 = "I'm not giving it back."
1014006-71 = "There are other places to put it besides a shield. Like my diary, or my military notebook..."
1014006-72 = "[s] \"Kurumi, could it be...\""
1014006-73 = "I-it's not like I'm cherishing it just because you gave it to me, okay!"
1014006-74 = "I just... I just really like cats, that's all!"
1014006-75 = "D-don't get the wrong idea! Idiot!"
1014006-77 = "(Afterward, I spent a pleasant time helping with the maintenance while being berated by Kurumi.)"