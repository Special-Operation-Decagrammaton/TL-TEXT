[translation]
1014006-1 = "A Dressing-Up Fox"
1014006-4 = "FOX Platoon HQ"
1014006-5 = "[ns] \"Good morning, everyone.\""
1014006-6 = "Oh, Sensei?"
1014006-7 = "We shouldn't have any operations today... Do you need something?"
1014006-8 = "[ns] \"I received a thank-you gift from the farmer we helped with pest control the other day.\""
1014006-12 = "[ns1] \"I got more potatoes than I can eat by myself, so...\"\n[ns2] \"I'm sharing them with everyone.\""
1014006-15 = "Oh, thank you! That helps a lot!"
1014006-16 = "You can cook a lot of different things with potatoes, after all."
1014006-17 = "We'll all enjoy eating them."
1014006-18 = "[s] \"By the way, are you alone today?\""
1014006-19 = "Yeah. Everyone else had things to do."
1014006-20 = "Did you need something from the others?"
1014006-21 = "[s3] \"Not particularly.\"\n[s4] \"Being all alone with you makes me a little awkward, Kurumi.\""
1014006-25 = "...Could you not say something creepy all of a sudden? It's a bit late for that."
1014006-26 = "[ns] \"What were you doing, Kurumi?\""
1014006-27 = "Ah, I was doing maintenance on my shield."
1014006-28 = "Since we've been going out on operations a lot lately, the scratches and #npeeling paint have become noticeable..."
1014006-29 = "I figured I'd polish it up properly and give it a fresh repaint."
1014006-30 = "[s] \"I see. Good work.\""
1014006-34 = "[ns5] \"Do you do maintenance on your shield like this every time?\"\n[ns6] \"I'd imagine it gets scratched easily, though...\""
1014006-38 = "Ah, you're saying there's no need to paint it every time?"
1014006-39 = "It's true that it's made to stop bullets, and it's something that gets scraped and #nbroken, so there's no need to carefully maintain it every single time, but..."
1014006-40 = "I just want to keep it looking nice."
1014006-41 = "During an operation, the first thing the enemy sees is this shield held by the #npointman."
1014006-42 = "In that sense, this shield determines the impression of the platoon.#nSo wouldn't you want to keep it clean?"
1014006-43 = "Well, once a battle starts, you probably won’t have time to worry about that #nanyway."
1014006-44 = "...I guess it really is just self-satisfaction."
1014006-45 = "[s7] \"I think it's wonderful.\"\n[s8] \"I think that kind of mindset is what made FOX Platoon even stronger.\""
1014006-48 = "R-Really? I knew you would understand, Sensei!"
1014006-49 = "That kind of daily mindset is important, right. Even if the opponent is an enemy."
1014006-50 = "...Sometimes, I even put my favorite stickers on it."
1014006-51 = "Look. I got this from a magazine supplement the other day. Cute, right?"
1014006-52 = "[s] \"It's cute!\""
1014006-56 = "[ns] \"Come to think of it, I have a sticker I got as a prize.\""
1014006-57 = "Is this... a kitty sticker?"
1014006-58 = "Cute..."
1014006-59 = "[s] \"Put this on your shield——\""
1014006-60 = "I won't!"
1014006-61 = "Putting such a cute sticker on a shield used on a battlefield where bullets fly...#nSensei, do you have no heart?"
1014006-62 = "If I stuck something like this on, people would think FOX Platoon is a group of #ncold-blooded demons!"
1014006-63 = "[s9] \"Sorry, I didn't think that far ahead.\"\n[s10] \"Then, I'll take this sticker——\""
1014006-69 = "...No."
1014006-70 = "I'm not giving it back."
1014006-71 = "Even if it's not on my shield, there are other places to put it. Like a diary, or a #nmilitary notebook..."
1014006-72 = "[s] \"Kurumi, could you be...\""
1014006-73 = "I-It's not like I'm treasuring it because I got it from you, Sensei!"
1014006-74 = "This is just... because I like c-cats!"
1014006-75 = "D-Don't get the wrong idea! Idiot!"
1014006-77 = "(After that, I spent a fun time doing maintenance while being insulted by Kurumi.)"