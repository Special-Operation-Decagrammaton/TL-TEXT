[translation]
80000017-1 = "甘い残業"
80000017-2 = "シャーレ・入口"
80000017-9 = "はあ……やっとサーバーの点検が終わった……。"
80000017-10 = "単なる定期メンテナンスだったはずなのに、日付が変わった途端急にすごい量のメッセージが飛んできて……。"
80000017-11 = "キャパオーバーにならないように対応してたら、結局ほぼ一日中サーバー室に釘付けになって疲れた……。"
80000017-12 = "[s] \"こんな遅くまでお疲れ様。\""
80000017-16 = "ありがと。でもハッカーにとっては、まだまだ遅い時間帯ではないよ。"
80000017-17 = "……体が疲れてること自体は、否定できないけど。"
80000017-18 = "先生、良かったらコーヒーでも一杯奢ってくれない？"
80000017-19 = "自販機の缶コーヒーでもいいから、とにかくカフェインを体に入れたい……。"
80000017-24 = "[ns] チヒロに缶コーヒーを渡す。"
80000017-30 = "……はぁ、これでちょっとはマシになった。"
80000017-31 = "それにしても、どうして今日に限って急に、あそこまで先生宛のメッセージが……。"
80000017-32 = "そういえばサーバー室にこもってるうちに、街の風景も変わったような……。"
80000017-33 = "……バレンタインデー？"
80000017-34 = "ああ、なるほどね。"
80000017-35 = "だからシャーレに、DDoS攻撃レベルの通知が……。"
80000017-36 = "……知ってるつもりだったけど。やっぱり人気者なんだね、先生。"
80000017-37 = "[s] \"何だかごめん……。\""
80000017-38 = "ううん。先生のせいでもないし。"
80000017-39 = "それより……結局サーバーの点検に釘付けで、チョコとか用意できてなかったな……。"
80000017-40 = "こんな時間じゃ開いてるお店も……。"
80000017-41 = "うーん、仕方ない。"
80000017-48 = "はい、先生。受け取って。"
80000017-49 = "[s] \"これは……。\""
80000017-50 = "私からのバレンタイン。"
80000017-51 = "厳密には「チョコレート」じゃないかもしれないけど……貰ってくれるよね？"
80000017-52 = "私はこの飲み物、結構好きでさ。"
80000017-53 = "真夜中に糖分とカフェインを欲した時に選べる、数少ない選択肢なんだ。"
80000017-54 = "普段は気づかないけど、困った時には頼れる。まるで私の……"
80000017-58 = "……なんて言ったら、受け取りづらいかな？"
80000017-59 = "ハッピーバレンタイン。ほら、気楽に飲んで。"
