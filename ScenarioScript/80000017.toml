[translation]
80000017-1 = "Hora extra doce"
80000017-2 = "Schale - Entrada"
80000017-9 = "Haa... finalmente a verificação do servidor terminou..."
80000017-10 = "Era para ser apenas uma manutenção de rotina, mas assim que o dia virou, uma quantidade absurda de mensagens começou a chegar..."
80000017-11 = "Tive que ficar presa na sala do servidor o dia quase inteiro para evitar que o sistema sobrecarregasse, estou exausta..."
80000017-12 = "[s] \"Trabalhou até tarde, hein?\""
80000017-16 = "Obrigada. Mas para um hacker, esse ainda não é um horário tão tarde assim."
80000017-17 = "...Embora eu não possa negar que meu corpo está cansado."
80000017-18 = "Sensei, se não se importar, poderia me pagar um café?"
80000017-19 = "Pode ser um café de lata da máquina mesmo, só preciso colocar um pouco de cafeína no corpo..."
80000017-24 = "[ns] Entrega uma lata de café para Chihiro."
80000017-30 = "...Ah, isso já me fez sentir um pouco melhor."
80000017-31 = "Mas, afinal, por que será que justo hoje chegaram tantas mensagens para o Sensei..."
80000017-32 = "Pensando bem, enquanto eu estava trancada na sala do servidor, a paisagem da cidade parece ter mudado..."
80000017-33 = "...Dia dos Namorados?"
80000017-34 = "Ah, entendi."
80000017-35 = "Então foi por isso que Schale recebeu notificações em nível de ataque DDoS..."
80000017-36 = "...Eu sabia que era essa a data, mas você é realmente popular, Sensei."
80000017-37 = "[s] \"Sinto muito por isso...\""
80000017-38 = "Não, não é culpa sua."
80000017-39 = "E além disso... acabei ficando presa na manutenção do servidor e nem consegui preparar nenhum chocolate..."
80000017-40 = "A essa hora, não deve ter nenhuma loja aberta..."
80000017-41 = "Hmm, não tem jeito."
80000017-48 = "Aqui, Sensei. Pode pegar."
80000017-49 = "[s] \"Isso é...\""
80000017-50 = "Meu presente de Dia dos Namorados."
80000017-51 = "Tecnicamente pode não ser um \"chocolate\", mas... você aceita, né?"
80000017-52 = "Eu gosto bastante dessa bebida."
80000017-53 = "É uma das poucas opções que escolho quando preciso de açúcar e cafeína no meio da madrugada."
80000017-54 = "A gente não nota no dia a dia, mas é algo com que podemos contar quando estamos em apuros. É como se fosse o meu..."
80000017-58 = "...Se eu disser isso, fica difícil de aceitar?"
80000017-59 = "Feliz Dia dos Namorados. Vamos, beba sem cerimônia."
