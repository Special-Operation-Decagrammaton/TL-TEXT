[translation]
52120-1 = "Episódio 12: A Sacerdotisa da Família Kageyuzukoji"
52120-5 = "（Depois de caminhar pelo campo nevado por cerca de meio dia, chegamos a uma casa）"
52120-11 = "Então esta é a tal \"Mansão Higan\"..."
52120-12 = "E-eu também... é a primeira vez que venho aqui."
52120-13 = "...Que estranho."
52120-18 = "Não há nem um fio de erva daninha no jardim. #nParece que alguém morou aqui até pouco tempo atrás."
52120-19 = "...As chances de este ser o esconderijo do Clube Kachou Fuugetsu estão ficando cada vez maiores."
52120-20 = "Ninguém moraria em um lugar desses se não tivesse algo a esconder."
52120-22 = "Verdade. #nSe fossem alunas delinquentes como as do Grupo Chimi, #nnão teriam se dado a tanto trabalho."
52120-23 = "Se este for mesmo o esconderijo, então Shuro..."
52120-30 = "............"
52120-31 = "Shuro...?"
52120-32 = "[s] \"Você não está se sentindo bem?\""
52120-36 = "Eu acabei vindo..."
52120-37 = "Não consigo nem olhar para a Kokuriko-sama..."
52120-38 = "Eu falhei duas vezes... ela deve estar tão decepcionada comigo..."
52120-39 = "Não... eu não quero... não quero ser descartada como se fosse lixo..."
52120-40 = "Ei, ei... essa tal de Kokuriko é tão assustadora assim?"
52120-44 = "Como ousa pronunciar esse nome?! #nA Kokuriko-sama é..."
52120-45 = "Ugh...!"
52120-46 = "[s] \"Você está bem?\""
52120-48 = "[ns] \"Desculpe, tudo bem se eu ficar aqui com a Shuro?\""
52120-53 = "Nós podemos cuidar da investigação sozinhas, mas..."
52120-54 = "Se este for realmente o esconderijo do Clube Kachou Fuugetsu, deixar o Sensei para trás é..."
52120-55 = "Nesse caso, eu irei junto."
52120-59 = "Combate não é minha especialidade, mas..."
52120-60 = "Se algo acontecer, levarei o Sensei e me juntarei a vocês imediatamente!"
52120-62 = "Não, só isso não me deixa tranquila."
52120-63 = "Eu mesma vou vigiar essa garota."
52120-64 = "[s1] \"Não se preocupem, vai ficar tudo bem.\" \n[s2] \"Afinal, estamos todos na mesma propriedade.\""
52120-67 = "Mas..."
52120-68 = "[s] \"Como a Azami disse, se algo acontecer, nos reuniremos imediatamente.\""
52120-73 = "Você sempre coloca as alunas acima de si mesma, como se você não importasse..."
52120-74 = "Esse é o seu pior defeito. ...Não se force demais."
52120-75 = "[s] \"Obrigado por se preocupar comigo.\""
52120-76 = "Bem, vamos nos dividir para investigar."
52120-77 = "Eu e Nagusa ficaremos com a casa principal e o pátio. Kikyou e Renge, fiquem com o anexo. #nYukari, por favor, verifique o escritório."
52120-78 = "Não toquem em nada suspeito. #nSe algo acontecer, chamem alguém imediatamente."
52120-80 = "Certo, vou tomar cuidado."
52120-81 = "Pode deixar comigo!"
52120-86 = "Então pessoal, vamos lá."
52120-93 = "É uma casa bonita."
52120-94 = "Sim. Não há nem poeira nos utensílios de chá ou na louça, parece que alguém esteve aqui."
52120-95 = "Mas agora... está silencioso de um jeito assustador."
52120-96 = "Talvez estejam planejando uma emboscada. Não baixem a guarda."
52120-97 = "Verdade."
52120-101 = "Mas, este prédio... não sei por que, mas me parece familiar..."
52120-106 = "Clube Kachou Fuugetsu~! Apareçam!"
52120-113 = "Você acha mesmo que elas vão sair só porque você chamou?..."
52120-114 = "E se elas fugirem por causa da sua voz, o que você vai fazer?"
52120-115 = "Hum, pode tentar fugir se quiser. #nA Mestra e a Azami estão na entrada, afinal."
52120-116 = "Ainda assim... essa casa, não parece familiar? #nSinto como se já tivesse vindo aqui antes..."
52120-117 = "Em um lugar tão remoto assim? Não pode ser..."
52120-121 = "Não... eu também sinto que já vi isso antes."
52120-130 = "Não é impressão sua..."
52120-136 = "O que está gravado aqui é..."
52120-140 = "O brasão da família..."
52120-141 = "Por que estaria em uma ruína como esta..."
52120-147 = "...Sim. #nA mansão Kadenokouji, no centro de Hyakkiyako, #nera originalmente uma residência secundária construída para ajudar os membros da família que se dedicavam aos estudos."
52120-148 = "Originalmente, a residência principal ficava em uma região distante ao norte."
52120-149 = "Nos dias de neve, a beleza do jardim, tingido de um branco puro, era algo indescritível..."
52120-150 = "Mas... devido a um certo incidente, fomos forçados a deixar aquele lugar."
52120-154 = "Foi uma desgraça absoluta, que manchou a história da família..."
52120-155 = "A sacerdotisa da época cometeu um ato escandaloso que sujou o nome Kadenokouji..."
52120-158 = "Não pode ser..."
52120-159 = "I-isso deve ter acontecido há mais de 20 anos...!"
52120-169 = "Este livro é o único que não está coberto de poeira..."
52120-170 = "Parece ser o diário de alguém..."
52120-180 = "Vinte anos atrás, a jovem que herdou o nome Kadenokouji transbordava senso de justiça."
52120-186 = "[log]『Como alguém da família Kadenokouji, viva com retidão.』[/log]"
52120-190 = "Para obter a força física e mental digna do nome da família, a jovem ingressou no Comitê de Mediação de Conflitos Hyakka Ryoran — #ne rapidamente ascendeu ao posto de presidente."
52120-195 = "[log]『A forma de viver como alguém da família Kadenokouji,』[/log]"
52120-197 = "[log]『é um meio para espalhar a fama.』[/log]"
52120-201 = "No entanto, a paixão da jovem por ajudar os outros contradizia os ensinamentos da família."
52120-204 = "Em um dia de festival, a jovem deveria realizar a dança da sacerdotisa durante o ritual."
52120-205 = "『O festival deveria ter terminado sem problemas. Mas, devido à expectativa pelo ritual grandioso, as pessoas ignoraram uma pequena faísca.』"
52120-206 = "A jovem percebeu a faísca e priorizou apagar o fogo em vez do ritual..."
52120-207 = "Não chegou a ser uma catástrofe, mas o festival terminou em decepção... #ne a reputação da família Kadenokouji, responsável pelo ritual, foi completamente destruída."
52120-212 = "[log]『Não importa o motivo,』[/log]"
52120-214 = "[log]『quem abandona suas obrigações é uma vergonha para a família.』[/log]"
52120-218 = "Incapaz de suportar as críticas da família, a jovem deixou a casa Kadenokouji. #nE então, ela se apegou ao único lugar que lhe restava: a presidência do Hyakka Ryoran."
52120-219 = "『Será que essa obsessão enfraqueceu suas habilidades?』"
52120-220 = "Alguém que percebeu que a jovem não tinha mais o vigor ou a força de antes desafiou-a para uma batalha de sucessão, #ne tomou o posto de presidente e a Hyakuren."
52120-225 = "[log]『A qualificação,』[/log]"
52120-227 = "[log]『é provada na batalha de sucessão.』[/log]"
52120-230 = "Das mãos da jovem, tudo começou a escapar."
52120-231 = "Mesmo tentando ser alguém \"reta\", algo ou alguém sempre a atrapalhava."

52120-232 = "Mas, se fosse a lendária grande profetisa — Kuzunoha, a criadora do Hyakka Ryoran, #nela certamente entenderia."
52120-237 = "[log]『Como alguém da família Kadenokouji, viva com retidão.』[/log]"
52120-241 = "Não importa o quanto ela percorresse as grandes planícies nevadas ou reunisse informações, #nos vestígios de Kuzunoha nunca foram encontrados."
52120-242 = "『Kuzunoha-sama é apenas uma lenda.』"
52120-247 = "Tudo era uma mentira."
52120-248 = "Tendo perdido a esperança, a jovem, sem perceber, foi tomada pelo desespero e pelo ódio."
52120-249 = "O início do Hyakka Ryoran... os ensinamentos da família Kadenokouji... se tudo não passava de uma farsa."
52120-250 = "Se aquilo que ela admirava e acreditava... era apenas a história de outra pessoa."
52120-256 = "[log][ff4444]Da próxima vez, eu mesma criarei a \"história\".[-][/log]"

52120-261 = "Usando os rumores e histórias de fantasmas que rastejam pelo mundo como sementes, farei florescer flores negras... #ne me tornarei \"aquela pessoa\"."

52120-264 = "...Eu, eu não consigo acreditar."
52120-265 = "A sacerdotisa de Kadenokouji que desapareceu há 20 anos... #né a presidente do Departamento de Flores, Pássaros, Vento e Lua...?"
52120-270 = "Demorar tanto para perceber... você é bem lenta, não é?"
52120-276 = "A casa que você tanto ama, a organização... tudo isso repousa sobre um passado imundo e submerso."
52120-277 = "Você é... a pessoa deste diário?"
52120-278 = "É a primeira vez que nos encontramos pessoalmente, não é?"
52120-282 = "Fufu... será que eu também tinha esse rosto antigamente?"
52120-283 = "（Preciso avisar as veteranas...！）"
52120-284 = "Ora, vai chamar as veteranas?"
52120-288 = "C-como você sabe o que estou pensando...?"
52120-289 = "Seus sentimentos, sua dor, sua tristeza, sua confusão... entendo tudo como se fosse meu."
52120-290 = "Afinal, eu também já fui uma filha da família Kadenokouji e membro do Comitê de Mediação de Conflitos Hyakkiyako."
52120-294 = "Um dia, você também será como eu..."
52120-301 = "……Isso não é verdade!"
52120-302 = "Eu admito que ainda sou inexperiente, lenta e fraca! Mas...!"
52120-303 = "Mesmo que tudo o que eu almejo... tudo o que eu sonho para o futuro seja apenas uma ilusão...!"
52120-304 = "Ainda assim, eu...!#nPrometi às minhas veteranas que não desistiria!"
52120-309 = "……Que admirável."
52120-310 = "Eu adoraria te deixar passar por ser tão fofa, mas não posso fazer isso."
52120-317 = "……Crianças que entram na casa dos outros sem permissão precisam de uma lição."
52120-319 = "Ah...!"
52120-320 = "Não importa o que aconteça... eu não vou perder!"
