[translation]
52120-1 = "Episódio 12; A Miko da Família Kadenokouji"
52120-5 = "(Depois disso, após meio dia avançando pelo campo de neve, chegamos a uma casa civil)"
52120-11 = "Aqui é a Mansão Higantei......"
52120-12 = "E, eu também, é a primeira vez que venho aqui."
52120-13 = "......É estranho, né?"
52120-18 = "Não tem nem um fio de erva daninha no jardim. #n Parece que alguém estava morando aqui até pouco tempo atrás."
52120-19 = "......Aumenta muito a possibilidade de ser a base do Clube das Flores, Pássaros, Vento e Lua."
52120-20 = "Ninguém moraria em um lugar assim se não tivesse algo a esconder."
52120-22 = "Verdade. #n Se fossem alunas delinquentes como a Trupe Chimi, #n não teriam se dado a esse trabalho todo."
52120-23 = "Se esta for a base, a Shuro――"
52120-30 = "............"
52120-31 = "Shuro......?"
52120-32 = "[s] \"Está se sentindo mal com alguma coisa?\""
52120-36 = "Eu acabei vindo......"
52120-37 = "Não consigo mais encarar a Kokuriko-sama......"
52120-38 = "Como falhei duas vezes...... com certeza ela está decepcionada comigo......"
52120-39 = "Não quero...... eu não quero...... ser descartada como lixo......"
52120-40 = "Ei, ei...... essa tal de Kokuriko é tão assustadora assim?"
52120-44 = "Não ouse dizer esse nome com essa sua boca! #n A Kokuriko-sama......"
52120-45 = "Ugh......!"
52120-46 = "[s] \"Tudo bem......?\""
52120-48 = "[ns] \"Desculpem, tudo bem se eu ficar aqui com a Shuro?\""
52120-53 = "Nós conseguimos fazer a investigação sozinhas, mas......"
52120-54 = "Se este for realmente o esconderijo do Clube das Flores, Pássaros, Vento e Lua, deixar o Sensei para trás é......"
52120-55 = "Nesse caso, eu irei junto."
52120-59 = "Lutar não é minha especialidade, mas......"
52120-60 = "Se acontecer alguma coisa, levarei o Sensei e nos reuniremos com vocês imediatamente!"
52120-62 = "Não, isso ainda não me deixa tranquila."
52120-63 = "Eu vou vigiar essa criança."
52120-64 = "[s1] \"Não se preocupem, estou bem.\"\n[s2] \"Afinal, estamos no mesmo terreno.\""
52120-67 = "Mas......"
52120-68 = "[s] \"Como a Azami disse, assim que acontecer algo, eu vou me reunir com vocês.\""
52120-73 = "Sacrificar-se pelos alunos――"
52120-74 = "Esse é o seu defeito. ......Não force a barra, ok?"
52120-75 = "[s] \"Obrigado por se preocupar.\""
52120-76 = "Bom, vamos dividir o grupo e investigar."
52120-77 = "Eu e Nagusa ficaremos com a casa principal e o pátio. Kikyou e Renge ficam com o anexo. #n Yukari, cuide da biblioteca."
52120-78 = "Tentem não tocar em nada suspeito. #n Se acontecer algo, chamem alguém imediatamente."
52120-80 = "Certo, vou tomar cuidado."
52120-81 = "Pode deixar comigo!"
52120-86 = "Então, pessoal, vamos lá."
52120-93 = "É uma casa linda."
52120-94 = "Sim. Não há nem poeira nos utensílios de chá ou louças, parece que alguém estava aqui."
52120-95 = "Mas agora...... é assustadoramente silencioso."
52120-96 = "Talvez queiram nos emboscar. Não baixem a guarda."
52120-97 = "Verdade."
52120-101 = "Mas, o que será este edifício...... parece familiar......"
52120-106 = "Clube das Flores, Pássaros, Vento e Lua~! Apareçam~!"
52120-113 = "Não tem como elas aparecerem assim, né......"
52120-114 = "O que você vai fazer se elas fugirem por causa dos seus gritos?"
52120-115 = "Hunf, se conseguirem fugir, que fujam. #n A Mestre e a Azami-san estão na entrada, afinal."
52120-116 = "Mas falando nisso...... não vimos essa casa em algum lugar? #n Parece que já estivemos aqui antes......"
52120-117 = "Em um lugar tão remoto? Não pode ser――"
52120-121 = "Não...... eu também sinto que já vi antes."
52120-130 = "Não estou vendo coisas......"
52120-136 = "O que está gravado aqui é......"
52120-140 = "O brasão da família Kadenokouji――"
52120-141 = "Por que isso estaria em uma ruína como esta......"
52120-147 = "......Sim. #n A Mansão Kadenokouji, localizada no centro de Hyakkiyako, #n é uma residência secundária construída originalmente para ajudar os membros da família que se dedicam aos estudos."
52120-148 = "Originalmente, a mansão principal ficava em uma terra distante ao norte."
52120-149 = "A beleza do jardim coberto de branco em um dia de neve era simplesmente......"
52120-150 = "Mas...... devido a um certo incidente, tivemos que deixar aquela terra."
52120-154 = "Uma desonra que manchou a história da família......"
52120-155 = "A miko da época cometeu um ato desordeiro que envergonhou o nome Kadenokouji e――"
52120-158 = "Não pode ser......"
52120-159 = "I, isso deve ser uma história de 20 anos atrás......!"
52120-169 = "Este livro é o único que não está coberto de poeira......"
52120-170 = "Parece ser o diário de alguém......"
52120-180 = "Vinte anos atrás, a jovem que herdou o nome Kadenokouji estava transbordando de senso de justiça."
52120-186 = "'Viva honestamente como um membro da família Kadenokouji'"
52120-190 = "Para obter a força de corpo e mente digna do nome da família, a jovem entrou no Comitê de Mediação de Conflitos Hyakkaryouran―― #n e num piscar de olhos, subiu ao posto de presidente."
52120-195 = "'A maneira de viver como um membro da família Kadenokouji é,' "
52120-197 = "'apenas um meio de espalhar a fama'"
52120-201 = "No entanto, a paixão da jovem por ajudar os outros era contrária aos ensinamentos da família."
52120-204 = "No dia de um festival, a jovem deveria apresentar a dança da miko durante o ritual."
52120-205 = "'O festival deveria ter encerrado sem problemas. Mas, por expectativa demais pela cerimônia grandiosa, as pessoas ignoraram uma pequena faísca.'"
52120-206 = "A jovem percebeu a faísca e priorizou apagar o fogo em vez da cerimônia......"
52120-207 = "Não se tornou uma tragédia, mas o festival encerrou em desapontamento...... #n e a honra da família Kadenokouji, que organizava o ritual, foi completamente destruída."
52120-212 = "'Seja qual for o motivo,' "
52120-214 = "'quem abandona seu dever é uma vergonha para a família'"
52120-218 = "Incapaz de suportar a censura da família, a jovem deixou a casa Kadenokouji. #n E começou a se apegar ao seu único lugar restante―― a 'Presidência da Hyakkaryouran'."
52120-219 = "'Será que essa obsessão tornou meus braços pesados?'"
52120-220 = "A jovem não tinha mais o vigor ou a força de antes...... uma pessoa que percebeu isso desafiou-a para uma Batalha de Sucessão, #n usurpando o posto de presidente e a Hyakuren."
52120-225 = "'A qualificação é,' "
52120-227 = "'provada na Batalha de Sucessão'"
52120-230 = "Tudo começou a escapar das mãos da jovem."
52120-231 = "Mesmo tentando ser 'honesta', algo ou alguém sempre entrava no caminho."
52120-232 = "Mas, se fosse Kuzunoha, a lendária Grande Profeta que criou a Hyakkaryouran, #n ela deveria entender."
52120-237 = "'Viva honestamente como um membro da família Kadenokouji'"
52120-241 = "Não importa o quanto eu corresse pelo Grande Campo de Neve ou o quanto reunisse informações, #n não encontrei nenhum vestígio de Kuzunoha."
52120-242 = "'Kuzunoha-sama é apenas uma lenda'"
52120-247 = "Tudo era mentira."
52120-248 = "Tendo perdido a esperança, a jovem acabou se envolvendo em desespero e ódio."
52120-249 = "O começo da Hyakkaryouran...... os ensinamentos da família Kadenokouji...... se tudo era mentira."
52120-250 = "Se aquilo que eu admirava e acreditava...... era apenas a história de alguém."
52120-256 = "Agora, sou eu quem criará a 'história'."
52120-261 = "Usando os boatos e histórias de fantasmas que vagam pelo mundo como sementes, farei florescer flores negras...... #n e me tornarei a 'Líder dos Espíritos Malignos'."
52120-264 = "......I, isso eu não consigo acreditar."
52120-265 = "A miko Kadenokouji que desapareceu há 20 anos...... #n é a presidente do Clube das Flores, Pássaros, Vento e Lua......?"
52120-270 = "Demorou para perceber, que garota lenta."
52120-276 = "A família e a organização que você tanto ama...... existem sobre um sedimento imundo que afunda no passado."
52120-277 = "Você é a do diário......?"
52120-278 = "É a primeira vez que nos encontramos assim, né."
52120-282 = "Fufu...... eu também já tive esse rosto antigamente."
52120-283 = "(Tenho que avisar as senpais rapidamente......!)"
52120-284 = "Ora, quer chamar suas senpais?"
52120-288 = "C, como você sabe o que eu estou pensando......?"
52120-289 = "Seus pensamentos, dores, tristezas, confusões...... eu entendo tudo como se pudesse tocar."
52120-290 = "Porque eu também já fui uma criança Kadenokouji e integrante do Comitê de Mediação de Conflitos Hyakkaryouran."
52120-294 = "Um dia, você também, como eu......"
52120-301 = "......Não, isso nunca vai acontecer!"
52120-302 = "Eu admito que ainda sou imatura, lenta e fraca! Mas......!"
52120-303 = "Mesmo que tudo aquilo que eu admiro...... mesmo que tudo fosse uma ilusão......!"
52120-304 = "Mesmo assim, eu......! #n Eu prometi para as senpais que não desistiria!"
52120-309 = "......Como é admirável."
52120-310 = "Por sua fofura, eu gostaria de deixá-la passar, mas não posso fazer isso."
52120-317 = "......Se você entra na casa dos outros sem permissão, precisa ser punida."
52120-319 = "......!"
52120-320 = "Não importa o que venha...... eu não vou perder!"

