[translation]
52120-1 = "第12話;勘解由小路家の巫女"
52120-5 = "（その後、半日ほどかけて雪原を進むと、民家に辿り着いた）"
52120-11 = "ここがあの「彼岸邸」……。"
52120-12 = "わ、私も、ここに来るのは初めてです。"
52120-13 = "……変だね。"
52120-18 = "庭園に雑草の一本も生えてないよ。#nつい最近まで誰かが住んでたみたい。"
52120-19 = "……いよいよ、花鳥風月部の拠点である可能性が高くなってきたね。"
52120-20 = "後ろ暗いところがなくちゃ、こんなところに住まないよ。"
52120-22 = "そうだね。#n魑魅一座みたいな不良生徒だったら、#nここまで手の込んだことはしないはず。"
52120-23 = "もしここが本拠地だとしたら、シュロが――"
52120-30 = "…………。"
52120-31 = "シュロ……？"
52120-32 = "[s] \"どこか具合でも悪い？\""
52120-36 = "来てしまいました……。"
52120-37 = "コクリコ様に、顔向けできない……。"
52120-38 = "二度も失敗しちゃったから……きっと失望されてる……。"
52120-39 = "やだ……やだよぉ……ゴミみたいに捨てられちゃうのは……。"
52120-40 = "おいおい……コクリコってやつはそんなに怖いのか？"
52120-44 = "[ruby=てめぇ]手前[/ruby]ごときがその名を口にするなぁ！#nコクリコ様はっ……。"
52120-45 = "ううっ……！"
52120-46 = "[s] \"大丈夫……？\""
52120-48 = "[ns] \"ごめん、私はシュロと残ってもいいかな。\""
52120-53 = "調査は私たちだけでもやれるけど……。"
52120-54 = "本当にここが花鳥風月部の本拠地なら、先生を残して行くのは……。"
52120-55 = "それでしたら、私も一緒に。"
52120-59 = "戦いは専門外ですが……。"
52120-60 = "何かあれば、先生を連れてすぐ皆さんと合流しますので！"
52120-62 = "いや、それだけじゃ安心できないよ。"
52120-63 = "この子の監視は私が。"
52120-64 = "[s1] \"心配しないでも大丈夫だよ。\"\n[s2] \"同じ敷地にいるわけだし。\""
52120-67 = "でも……。"
52120-68 = "[s] \"アザミの言う通り、何かあったらすぐ合流するから。\""
52120-73 = "生徒のためなら、自分なんてどうでもいい――"
52120-74 = "それ、あんたの悪い癖だから。……無理しないでね。"
52120-75 = "[s] \"心配してくれてありがとね。\""
52120-76 = "じゃ、手分けして調べよっか。"
52120-77 = "母屋と中庭は私とナグサが。はなれはキキョウとレンゲ。#nユカリは書斎をお願い。"
52120-78 = "怪しい物にはなるべく触れないこと。#n何か起きたら、すぐ誰かを呼んで。"
52120-80 = "うん、気をつけるね。"
52120-81 = "お任せくださいまし！"
52120-86 = "じゃあみんな、行こうか。"
52120-93 = "綺麗な家だね。"
52120-94 = "うん。茶器や食器にも埃一つないし、誰かがいた感じがする。"
52120-95 = "でも、今は……不気味なくらい静か。"
52120-96 = "奇襲するつもりかも。油断しないでね。"
52120-97 = "だね。"
52120-101 = "でも、この建物、なんだろう……見覚えがあるような……。"
52120-106 = "花鳥風月部～！出てこ～い！"
52120-113 = "のこのこ出てくるわけないでしょ……。"
52120-114 = "あんたの声で逃げたらどうするの？"
52120-115 = "ふん、逃げられるもんなら逃げてみろって。#n玄関には師匠とアザミさんがいるんだから。"
52120-116 = "にしてもさ……この家、どっかで見たことないか？#nなんか、来たことあるような……。"
52120-117 = "こんな辺鄙なところに？まさか――"
52120-121 = "いや……私も見覚えがある気がする。"
52120-130 = "見間違いじゃありませんわ……。"
52120-136 = "ここに刻まれているのは……。"
52120-140 = "[ruby=かでのこうじ]勘解由小路[/ruby]家の家紋――"
52120-141 = "なぜこんな廃墟に……。"
52120-147 = "……ええ。#n百鬼夜行の中心部にある勘解由小路邸は、#n本来学業に励む身内の者を助けるために建てられた、別邸です。"
52120-148 = "もともと、本邸は遠い北部の地にありました。"
52120-149 = "雪の降る日、真っ白に染め上げられたお庭の美しさといったら……。"
52120-150 = "ですが……とある一件から、彼の地を離れることになったのです。"
52120-154 = "一家の歴史に泥を塗った、醜態そのもの……。"
52120-155 = "当代の巫女が、勘解由小路の名を汚す乱行をして――"
52120-158 = "まさか……。"
52120-159 = "も、もう20年も前の話のはずですわ……！"
52120-169 = "この本だけは、埃をかぶっていませんわね……。"
52120-170 = "誰かの日記のようですが……。"
52120-180 = "二十年前、勘解由小路の名を継いだ少女は、正義感にあふれていた。"
52120-186 = "[log]『勘解由小路家の者としてまっすぐ在りなさい』[/log]"
52120-190 = "家名に恥じぬ心身の強さを得るため、少女は百花繚乱紛争調停委員会へと身を置き――#n瞬く間に委員長の座へと駆け上った。"
52120-195 = "[log]『勘解由小路家の者としての在り方は、』[/log]"
52120-197 = "[log]『名声を広めるための手段』[/log]"
52120-201 = "しかし、少女の人助けへの情熱は、家の教えと相反するものだった。"
52120-204 = "ある祭りの日、少女は儀式の中で巫女の舞を披露することになる。"
52120-205 = "『滞りなく幕を閉じるはずの祭り。だが、華々しい儀式に期待するあまり、人々は小さな火種を見落としていた』"
52120-206 = "少女は火種に気づき、儀式よりも火消しを優先した……。"
52120-207 = "大事には至らなかったが、お祭りは失望の内に幕を閉じ……#n儀式をとりまとめる勘解由小路家の面目は丸つぶれとなった。"
52120-212 = "[log]『どのような理由であれ、』[/log]"
52120-214 = "[log]『責務を放棄した者は一家の恥』[/log]"
52120-218 = "家からの非難に耐えられず、少女は勘解由小路家を出た。#nそして、自分に残された唯一の居場所――「百花繚乱の委員長」へと固執していく。"
52120-219 = "『その執着が、腕を鈍らせたのだろうか』"
52120-220 = "少女には、以前の覇気も強さもない……そう悟ったある者が継承戦を申し込み、#n委員長の座と百蓮を[ruby=さんだつ]簒奪[/ruby]した。"
52120-225 = "[log]『資格は、』[/log]"
52120-227 = "[log]『継承戦で証明されるもの』[/log]"
52120-230 = "少女の手から、何もかもがこぼれ落ちていった。"
52120-231 = "「まっすぐ」な者でいようとしても、何かが、誰かが邪魔をする。"
52120-232 = "でも、伝説の大預言者――百花繚乱を創ったクズノハならば、#nわかってくれるはず。"
52120-237 = "[log]『勘解由小路家の者としてまっすぐ在りなさい』[/log]"
52120-241 = "どれだけ大雪原を走り回り、どれだけ情報を集めても、#nクズノハの痕跡は見つからなかった。"
52120-242 = "『クズノハ様はただの言い伝えだよ』"
52120-247 = "すべて、嘘だったんだ。"
52120-248 = "希望を失った少女は、いつしか絶望と憎悪を身に纏っていた。"
52120-249 = "百花繚乱の始まり……勘解由小路家の教え……すべてが偽りなら。"
52120-250 = "自分が憧れ、信じてきたものが……誰かの物語なら。"
52120-256 = "[log][ff4444]次は、自分が「物語」を創り出す。[-][/log]"
52120-261 = "この世にうごめく風聞や怪談を種とし、黒い花を咲かせ……#n「[ruby=かちょうふうげつ]魑魅魍魎の頭領[/ruby]」になってみせる。"
52120-264 = "……し、信じられませんわ。"
52120-265 = "20年前に姿を消した、勘解由小路の巫女が……#n花鳥風月部の部長……？"
52120-270 = "ようやく気づくだなんて、鈍い子だわぁ。"
52120-276 = "おまえさんが愛してやまない家も、組織も……過去に沈む、薄汚い[ruby=おり]澱[/ruby]の上にあるのさ。"
52120-277 = "あなたが、この日記の……？"
52120-278 = "こうしてお目にかかるんは初めてやねぇ。"
52120-282 = "ふふっ……昔の我も、こんな顔をしてたかな。"
52120-283 = "（急いで先輩たちに……！）"
52120-284 = "あら、先輩たちを呼ぶのかえ？"
52120-288 = "ど、どうして身共の考えが……？"
52120-289 = "おまえさんの想い、痛み、悲しみ、戸惑い……どれも、手に取るようにわかるさ。"
52120-290 = "我もかつては勘解由小路の子にして、百花繚乱紛争調停委員会のひとりだったのだから。"
52120-294 = "おまえさんもいつの日か、我のように……。"
52120-301 = "……そんなことありません！"
52120-302 = "身共はたしかにまだ未熟で、鈍くて、弱いです！でも……！"
52120-303 = "いつの日か……と憧れるもの、そのすべてが幻だったとしても……！"
52120-304 = "それでも、身共は……！#n諦めないって、先輩たちと約束したのです！"
52120-309 = "……けなげやねぇ。"
52120-310 = "可愛さに免じて見逃したいとこやけど、そうもいかんのよぉ。"
52120-317 = "……人様の家に土足で上がる子には、折檻が必要さね。"
52120-319 = "っ……！"
52120-320 = "何が来ようと……身共は負けませんの！"
