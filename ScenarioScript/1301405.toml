[translation]
1301405-1 = "水着とキャンプファイヤー"
1301405-3 = "（待ち合わせ時間に合わせて、レンゲが待っている海岸に向かった）"
1301405-8 = "お、来たね。"
1301405-9 = "さあ、キャンプファイヤーを始めよう。"
1301405-13 = "ん？薪が組まれてないって？"
1301405-14 = "そこから始めてこそ、修練だからね！"
1301405-18 = "一緒に、あのあたりに薪を組もう！"
1301405-19 = "[s] \"う、うん！汗を流してこそ青春だね！\""
1301405-20 = "さすがは師匠！わかってるね！"
1301405-21 = "今回は、ちょっと特別な形に薪を組もうと思うんだ。"
1301405-22 = "そっちの方が思い出になるだろう？"
1301405-23 = "[s] \"形はもう決まってるの？\""
1301405-24 = "もちろん。設計図もあるよ！"
1301405-25 = "頑張ろう！アタシらの青春のために！"
1301405-26 = "[s] \"うん！青春のために……！\""
1301405-32 = "（やる気満々のレンゲと熱心にキャンプファイヤーの薪を組み始めた）"
1301405-34 = "（しばらくして……）"
1301405-38 = "よし、と……竜の完成だ！"
1301405-43 = "思ったよりデカくなっちゃったな。"
1301405-44 = "師匠がいるから、張り切りすぎたかも……。"
1301405-45 = "[s] \"火をつけるの、ちょっと勿体ないね……。\""
1301405-46 = "でも、燃やしてこそキャンプファイヤーだからね。"
1301405-47 = "炎を眺めるのも、醍醐味だし。"
1301405-48 = "[s] \"着火剤がちょっと多い気がするけど……。\""
1301405-50 = "[ns] \"まあ、大丈夫かな……？\""
1301405-51 = "よし、二人で火をつけよう！"
1301405-57 = "せーの！"
1301405-63 = "[log]（……そのとき、私たちはまだ知らなかった）[/log]"
1301405-67 = "[log]（怒り狂った竜の吐く炎は、）[/log]"
1301405-68 = "[log]（どこまでも燃え上がるのだ……）[/log]"
1301405-74 = "[ns] \"こ、これはまずいかも……。\""
1301405-75 = "お、思ったよりでかいな！？"
1301405-82 = "な、なんだあれ！？"
1301405-83 = "あっつ～！やばいよ！"
1301405-88 = "これは……まずいかも。"
1301405-89 = "[s] \"ちょ、ちょっと燃えすぎ……！\""
1301405-93 = "急いで火を消そう！"
1301405-105 = "[ns] \"火が消えるどころか、燃え上がってる！？\""
1301405-108 = "さ、さすが竜の炎……でも負けられない！"
1301405-112 = "いざ……勝負！"
1301405-116 = "必ず消してみせる！"
1301405-132 = "（……その後、レンゲと何とか薪の炎を消した）"
1301405-136 = "（思ったより強烈なキャンプファイヤーだった……）"
1301405-140 = "ふぅ、やっとおさまってきた。"
1301405-141 = "……ヒヤッとしたな。次からは気を付けるよ。"
1301405-142 = "[s] \"ちゃんと消火できたし、青春の教訓……ってことで！\""
1301405-146 = "そうだね……あれ？師匠、顔が……。"
1301405-147 = "……ぷっ。"
1301405-148 = "ふふふっ……！煤でパンダになってる！"
1301405-149 = "こっち来てよ。拭くからさ。"
1301405-150 = "[s] \"お、お願い。\""
1301405-156 = "顔が真っ黒だ……。"
1301405-157 = "ちょっと目つぶってて。"
1301405-167 = "……。"
1301405-168 = "（……こんな近くで、師匠の顔見たことあったかな？）"
1301405-169 = "（師匠が目の前に……）"
1301405-170 = "（……こ、これも青春？）"
1301405-171 = "[s] \"レンゲ、どうしたの？\""
1301405-175 = "な、何でもないよ！つい変な想像が……。"
1301405-176 = "あ、目つぶっててくれ！まだ煤が残ってるから！"
1301405-178 = "（レンゲは慌てた様子で、私の顔の煤を拭ってくれた）"
1301405-182 = "（この瞬間こそ青春……なのかもしれない）"
