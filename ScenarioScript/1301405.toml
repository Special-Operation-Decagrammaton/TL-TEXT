[translation]
1301405-1 = "Roupa de banho e fogueira"
1301405-3 = "（Seguindo o horário combinado, fui até a praia onde Renge estava esperando）"
1301405-8 = "Ah, você chegou."
1301405-9 = "Vamos começar a fogueira."
1301405-13 = "Hm? A lenha não está montada, você diz?"
1301405-14 = "Começar do zero é que é o verdadeiro treinamento!"
1301405-18 = "Vamos montar a lenha ali juntos!"
1301405-19 = "[s] \"C-certo! Suar a camisa é que é a juventude!\""
1301405-20 = "Como esperado do mestre! Você entende bem!"
1301405-21 = "Desta vez, pensei em montar a lenha em um formato um pouco especial."
1301405-22 = "Será uma lembrança melhor assim, não acha?"
1301405-23 = "[s] \"O formato já está decidido?\""
1301405-24 = "Claro. Eu até tenho um projeto!"
1301405-25 = "Vamos dar o nosso melhor! Pela nossa juventude!"
1301405-26 = "[s] \"Certo! Pela juventude...!\""
1301405-32 = "（Comecei a montar a lenha da fogueira com entusiasmo junto com a motivada Renge）"
1301405-34 = "（Algum tempo depois...）"
1301405-38 = "Muito bem... um dragão concluído!"
1301405-43 = "Ficou maior do que eu pensava."
1301405-44 = "Como o mestre estava aqui, talvez eu tenha me empolgado demais..."
1301405-45 = "[s] \"É até um desperdício acender o fogo...\""
1301405-46 = "Mas uma fogueira só é uma fogueira se for queimada."
1301405-47 = "Observar as chamas também é a melhor parte."
1301405-48 = "[s] \"Acho que tem um pouco de acendedor demais aqui...\""
1301405-50 = "[ns] \"Bem, será que vai dar tudo certo...?\""
1301405-51 = "Certo, vamos acender juntos!"
1301405-57 = "No três!"
1301405-63 = "[log]（...Naquele momento, nós ainda não sabíamos）[/log]"
1301405-67 = "[log]（Que as chamas cuspidas pelo dragão enfurecido,）[/log]"
1301405-68 = "[log]（iriam queimar sem parar...）[/log]"
1301405-74 = "[ns] \"I-isso pode ser um problema...\""
1301405-75 = "E-está maior do que eu pensava!?"
1301405-82 = "O-o que é aquilo!?"
1301405-83 = "Que calor! Isso é perigoso!"
1301405-88 = "Isso... pode ser um problema."
1301405-89 = "[s] \"E-está queimando demais...!\""
1301405-93 = "Vamos apagar o fogo rápido!"
1301405-105 = "[ns] \"Em vez de apagar, o fogo está subindo ainda mais!?\""
1301405-108 = "C-como esperado das chamas de um dragão... mas não vou perder!"
1301405-112 = "Vamos lá... desafio aceito!"
1301405-116 = "Eu vou apagar isso custe o que custar!"
1301405-132 = "（...Depois disso, consegui apagar as chamas da lenha com a Renge）"
1301405-136 = "（Foi uma fogueira bem mais intensa do que eu imaginava...）"
1301405-140 = "Ufa, finalmente acalmou."
1301405-141 = "...Que susto. Vou tomar mais cuidado da próxima vez."
1301405-142 = "[s] \"Conseguimos apagar, então vamos considerar como uma lição de juventude!\""
1301405-146 = "É verdade... ué? Mestre, seu rosto..."
1301405-147 = "...Pfft."
1301405-148 = "Hahaha...! Você está com a cara de panda por causa da fuligem!"
1301405-149 = "Vem aqui. Deixa que eu limpo para você."
1301405-150 = "[s] \"P-por favor.\""
1301405-156 = "Seu rosto está todo sujo de fuligem..."
1301405-157 = "Feche os olhos um pouco."
1301405-167 = "..."
1301405-168 = "(...Será que eu já vi o rosto do mestre tão de perto assim?)"
1301405-169 = "(O mestre está bem na minha frente...)"
1301405-170 = "(...I-isso também é juventude?)"
1301405-171 = "[s] \"Renge, o que houve?\""
1301405-175 = "N-não é nada! Acabei tendo um pensamento estranho..."
1301405-176 = "Ah, feche os olhos! Ainda tem fuligem aí!"
1301405-178 = "(Renge limpou a fuligem do meu rosto, parecendo um pouco nervosa)"
1301405-182 = "(Talvez este momento seja, de fato, a juventude...)"
