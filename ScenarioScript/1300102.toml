[translation]
1300102-1 = "O perfume das nuvens"
1300102-2 = "（Ao chegar no centro comercial, encontrei Chise com um olhar vago, andando de um lado para o outro no mesmo lugar）"
1300102-7 = "[s] \"Chise, o que você está fazendo...?\""
1300102-8 = "Ah, Sensei. Você veio?"
1300102-9 = "[s] \"Você ficou andando de um lado para o outro por aqui esse tempo todo...?\""
1300102-10 = "Bem, é que..."
1300102-11 = "Eu estava perseguindo uma nuvem."
1300102-12 = "[s] \"Uma nuvem?\""
1300102-13 = "Ah, ela se moveu de novo."
1300102-14 = "Vamos segui-la, Sensei."
1300102-18 = "（Chise começou a caminhar lentamente, seguindo a nuvem que flutuava）"
1300102-19 = "[s] \"Ah, espere um pouco, Chise...!\""
1300102-22 = "Nuvem..."
1300102-27 = "[ns] \"A nuvem que você disse que ia procurar é aquela ali?\""
1300102-28 = "Não, não é essa."
1300102-29 = "A nuvem que estou procurando é um pouco mais... suave."
1300102-30 = "Uma nuvem que fica balançando de um lado para o outro."
1300102-31 = "[s] \"Balançando...?\""
1300102-32 = "..."
1300102-36 = "[ns] \"E-espere! Chise!\""
1300102-38 = "（Depois disso, continuei andando por toda parte enquanto seguia Chise, que continuava atrás da nuvem）"
1300102-41 = "Também não é por aqui..."
1300102-50 = "Aqui também não é."
1300102-51 = "Hmm..."
1300102-53 = "[s] \"Chise, pode me ouvir um segundo?\""
1300102-55 = "Hm? O que foi?"
1300102-56 = "[s1] \"Pode me dizer as características dela?\"\n[s2] \"Como é essa nuvem, exatamente?\""
1300102-57 = "Características..."
1300102-58 = "Características..."
1300102-59 = "[s] \"Se eu souber, também posso ajudar a procurar.\""
1300102-60 = "...É verdade."
1300102-61 = "Sim, você tem razão."
1300102-62 = "Características... bem,"
1300102-63 = "Primeiro..."
1300102-64 = "[s] \"Primeiro...?\""
1300102-65 = "Ela é suave."
1300102-66 = "[s3] \"Falando nisso, você disse que era suave\"\n[s4] \"agora pouco. Mais alguma coisa?\""
1300102-67 = "Mais alguma coisa..."
1300102-68 = "Mais alguma coisa..."
1300102-69 = "Ela tem um perfume maravilhoso."
1300102-70 = "[s5] \"Entendo, um perfume maravilhoso...\n[s6] \"...Um perfume?\""
1300102-71 = "Sim."
1300102-72 = "Sim."
1300102-73 = "Quando você sente o cheiro, parece que vai flutuar até o céu, é tão fofinha e balança de um lado para o outro."
1300102-74 = "[s] \"Bem, mais alguma coisa? Algo um pouco mais... concreto?\""
1300102-75 = "Concreto..."
1300102-76 = "Ah."
1300102-77 = "Era um perfume assim, suave, como o do sol."
1300102-78 = "[s7] \"Um perfume como o do sol, hein...\"\n[s8] \"Não tem mais nada?\""
1300102-79 = "Mais... mais alguma coisa..."
1300102-80 = "E... mais alguma coisa..."
1300102-81 = "Ah."
1300102-82 = "[s] \"Oh, aconteceu alguma coisa?\""
1300102-83 = "Aquela nuvem, talvez ela se pareça com o Sensei."
1300102-84 = "Sim, era igualzinha ao Sensei."
1300102-85 = "[s9] \"????\"\n[s10] \"...Eu?\""
1300102-86 = "Sim, quente como o sol, com um cheiro bom, e quando estou perto, sinto uma felicidade..."
1300102-87 = "Sim, quente como o sol, com um cheiro bom, e quando estou perto, sinto uma felicidade..."
1300102-88 = "É como se eu gostasse muito de você, algo assim."
1300102-89 = "[s11] \"E-entendi.\"\n[s12] \"Você está falando da nuvem que viu... né?\""
1300102-90 = "Isso, falando da nuvem."
1300102-91 = "Isso, falando da nuvem."
1300102-92 = "O céu estava tão bonito hoje que pensei que talvez conseguíssemos encontrá-la."
1300102-93 = "Espero que a gente encontre."
1300102-95 = "(Depois disso, continuei andando por aí com Chise procurando pela nuvem, mas o sol se pôs antes que pudéssemos encontrá-la.)"
1300102-98 = "[ns] \"No fim, não encontramos a nuvem, né?\""
1300102-99 = "É."
1300102-100 = "[s] \"Não é como se fosse nossa única chance, podemos procurar de novo outra hora...\""
1300102-101 = "(Encarando fixamente)"
1300102-102 = "[s] \"Chise...?\""
1300102-103 = "(Encarando fixamente...)"
1300102-104 = "[s] \"Chise, o que você está olhando? Tem algo interessante aí?\""
1300102-107 = "Algodão-doce..."
1300102-108 = "[s] \"Algodão-doce?\""
1300102-110 = "[s] \"Quer um algodão-doce? Quer que eu compre um para você?\""
1300102-111 = "(Acena com a cabeça)"
1300102-114 = "Muito obrigada, aqui está!"
1300102-116 = "Nhac."
1300102-117 = "[s] \"E então, está gostoso?\""
1300102-118 = "Está gostoso."
1300102-119 = "[s13] \"Que bom.\"\n[s14] \"Vamos procurar a nuvem juntos outra hora.\""
1300102-122 = "Sim... nhac, nhac, nhac."
1300102-123 = "[s] \"Aliás, o que era aquela nuvem, afinal?\""
1300102-124 = "...É difícil explicar."
1300102-125 = "Mas agora está tudo bem..."
1300102-126 = "Eu também gostei desta nuvem."
1300102-127 = "[s] \"Desta nuvem?\""
1300102-128 = "O formato é um pouco diferente, mas... é a nuvem gostosa"
1300102-129 = "que o Sensei comprou para mim."
1300102-130 = "[s] \"...?\""
1300102-131 = "Ah..."
1300102-132 = "Minhas mãos ficaram todas grudentas, Sensei."
1300102-133 = "[s] \"Ah, espere um pouco, deixa eu ver se encontro um lenço umedecido...\""
1300102-134 = "...Para não ficar grudenta, acho que vou lavar o resto na água antes de comer."
1300102-135 = "[s] \"...Não, é melhor você não fazer isso!?\""
1300102-137 = "(Depois disso, impedi desesperadamente a Chise de correr até o bebedouro com o algodão-doce.)"
