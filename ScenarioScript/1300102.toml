[translation]
1300102-1 = "雲の香り"
1300102-2 = "（商店街に着いたら、ぼーっとした表情で同じようなところを右往左往しているチセを見つけた）"
1300102-7 = "[s] \"チセ、何してるの……？\""
1300102-8 = "あっ、先生。来てくれたんだ？"
1300102-9 = "[s] \"ずっとこの辺りを行ったり来たりしてたけど……？\""
1300102-10 = "えっとね……。"
1300102-11 = "雲を、追いかけてたの。"
1300102-12 = "[s] \"雲？\""
1300102-13 = "あっ、また動いた。"
1300102-14 = "追いかけよう、先生。"
1300102-18 = "（チセは流れる雲を追いかけて、ゆっくり歩き始めた）"
1300102-19 = "[s] \"あっ、ちょっとチセ、待って……！\""
1300102-22 = "雲……。"
1300102-27 = "[ns] \"チセが探しに行こうって言ってた雲って、あれのこと？\""
1300102-28 = "ううん、違う。"
1300102-29 = "私が探してる雲は、もう少し、柔らかい感じで。"
1300102-30 = "ゆらゆら～ってしてる雲。"
1300102-31 = "[s] \"ゆらゆら～……？\""
1300102-32 = "……。"
1300102-36 = "[ns] \"ま、待って！チセ！\""
1300102-38 = "（その後も雲を追いかけていくチセについていきながら、あちこちを歩き回った）"
1300102-41 = "こっちの方でもない……。"
1300102-50 = "こっちも、違う。"
1300102-51 = "う～ん……。"
1300102-53 = "[s] \"チセ、ちょっといい？\""
1300102-55 = "ん？なあに？"
1300102-56 = "[s1] \"特徴を教えてほしいな。\"\n[s2] \"具体的には、どんな雲なの？\""
1300102-57 = "特徴……。"
1300102-58 = "特徴……。"
1300102-59 = "[s] \"それが分かったら私も探せるし。\""
1300102-60 = "……確かに。"
1300102-61 = "うん、それもそうだね。"
1300102-62 = "特徴……えっと、"
1300102-63 = "まず……"
1300102-64 = "[s] \"まず……？\""
1300102-65 = "柔らかい。"
1300102-66 = "[s3] \"そういえばさっきも柔らかいって\"\n[s4] \"言ってたね。他には？\""
1300102-67 = "他には……。"
1300102-68 = "他には……。"
1300102-69 = "ものすごく良い香りがする。"
1300102-70 = "[s5] \"なるほど、良い香りね……。\"\n[s6] \"……良い香り？\""
1300102-71 = "うん。"
1300102-72 = "うん。"
1300102-73 = "匂いを嗅ぐと、空にふわっと浮いちゃいそうになる感じがして、ふわふわで、ゆらゆら～って。"
1300102-74 = "[s] \"えっと、他には？もっとこう、具体的な感じの……。\""
1300102-75 = "具体的な……。"
1300102-76 = "あ。"
1300102-77 = "こう、ふわってする、お日様みたいな香りだった。"
1300102-78 = "[s7] \"お日様みたいな香りかあ……\"\n[s8] \"あとは無さそう？\""
1300102-79 = "あと……あと何か……。"
1300102-80 = "あと……あと何か……。"
1300102-81 = "あっ。"
1300102-82 = "[s] \"おっ、何かあった？\""
1300102-83 = "その雲、先生に似てるかも。"
1300102-84 = "うん、先生みたいだった。"
1300102-85 = "[s9] \"？？？？\"\n[s10] \"……私？\""
1300102-86 = "うん、お日様みたいに暖かくて、良い香りがして、近くにいると幸せな気持ちにもなれて……。"
1300102-87 = "うん、お日様みたいに暖かくて、良い香りがして、近くにいると幸せな気持ちにもなれて……。"
1300102-88 = "大好きだなあって、そんな感じ。"
1300102-89 = "[s11] \"そ、そっか。\"\n[s12] \"チセが見た雲の話……だよね？\""
1300102-90 = "そう、雲の話。"
1300102-91 = "そう、雲の話。"
1300102-92 = "こんなに良い空だったから、今日なら見つけられるんじゃないかなって。"
1300102-93 = "見つかったらいいな。"
1300102-95 = "（その後もチセと一緒に、しばらくその雲を探して歩き回ったが、見つからない内に日が暮れてしまった）"
1300102-98 = "[ns] \"雲、結局見つからなかったね。\""
1300102-99 = "うん。"
1300102-100 = "[s] \"チャンスは今日だけじゃないし、また今度……。\""
1300102-101 = "（じーーっ）"
1300102-102 = "[s] \"チセ……？\""
1300102-103 = "（じーーーーっ）"
1300102-104 = "[s] \"チセ、何を見てるの？何か面白いものでもあった？\""
1300102-107 = "綿あめ……。"
1300102-108 = "[s] \"綿あめ？\""
1300102-110 = "[s] \"綿あめ、食べる？買ってこようか？\""
1300102-111 = "（こくり）"
1300102-114 = "ありがとうございます、どうぞ！"
1300102-116 = "はむっ。"
1300102-117 = "[s] \"どう、美味しい？\""
1300102-118 = "美味しい。"
1300102-119 = "[s13] \"よかったね。\"\n[s14] \"雲はまた今度一緒に探そう。\""
1300102-122 = "うん……はむっ、もぐもぐ。"
1300102-123 = "[s] \"ところで、結局その雲って何だったの？\""
1300102-124 = "……説明するの、難しい。"
1300102-125 = "でも、もう大丈夫……。"
1300102-126 = "この雲も、気に入ったから。"
1300102-127 = "[s] \"この雲？\""
1300102-128 = "形とかはちょっと違うけど……先生が買ってくれた、"
1300102-129 = "美味しい雲。"
1300102-130 = "[s] \"……？\""
1300102-131 = "あ……。"
1300102-132 = "両手がベタベタになっちゃった、先生。"
1300102-133 = "[s] \"あっ、ちょっと待って、お手拭きがどこかに……\""
1300102-134 = "……ベタベタにならないように、残りは水で洗ってから食べようかな。"
1300102-135 = "[s] \"……いや、それはやめた方が！？\""
1300102-137 = "（その後、綿あめを持って水飲み場へ走って行こうとするチセを必死で止めた）"
