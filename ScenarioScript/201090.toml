[translation]
201090-1 = "Episode 9;Good Evening, Mr. Orwell"
201090-2 = "Drink Bar 'Triad'"
201090-7 = "...Excuse me."
201090-11 = "[ns] \"It doesn't look like anyone's here....\""
201090-12 = "Indeed. I sense no presence of anyone."
201090-13 = "Since they've finished business for the day—"
201090-15 = "That is not the case. This place was never meant to call upon customers to begin with."
201090-19 = "A 'drink bar' is originally known as a 'place' to drink beverages. #nHowever, if one simply wishes to drink, there is no need to insist on a bar."
201090-20 = "Some enjoy socializing in dark places, while others bask in the pleasure of having the financial leeway to pay for expensive drinks."
201090-21 = "That is the very logic of 'signs' that can only exist in a consumer society."
201090-22 = "Did you visit this place as a 'tool'? Or as a 'sign'?"
201090-23 = "In the latter case, even as a mere predecessor, I believe I can provide a small amount of entertainment."
201090-28 = "...It has been a long time, Sensei."
201090-29 = "That’s how it is!!"
201090-33 = "[ns1] \"Are you... Golconda?\"\n[ns2] \"No, Francis...?\""
201090-36 = "Oh, come to think of it, I hadn't provided a new definition for myself. #nI understand why you would be confused, Sensei."
201090-37 = "That’s how it is!!"
201090-38 = "Where shall we begin? #nIt wouldn't be bad to ruminate on the final encounter of 'us'."
201090-40 = "When Golconda transformed into Francis through the Chroma, he perceived this world as a deconstructed genre."
201090-41 = "In an artificial world with no context, no structure, and no probability—"
201090-42 = "You thought that in the end, you would fall into the abyss as a being of nothingness."
201090-43 = "That’s how it is!!"
201090-45 = "But you—as the protagonist, you fulfilled that role sufficiently."
201090-46 = "...No, you surpassed the role of the protagonist. #nYou brilliantly consumed the sign of 'Sensei' and restored the text of this world into a 'story of school and youth'."
201090-47 = "Seeing that, Decalcomanie began a different line of reasoning."
201090-51 = "Unlike Francis's assessment, I came to think that this world might have value beyond its genre."
201090-52 = "Of course, Francis is merely a temporary phenomenon."
201090-53 = "To redefine the order that had become void and to establish authority, it was necessary to amplify the voice of Decalcomanie."
201090-54 = "That’s how it is!!"
201090-55 = "And so, Decalcomanie repeated inductive reasoning and began to absorb propositions."
201090-56 = "That his name, which pays homage to a great artist, is the same as the inventor of the proof that denies his existence... #nI suppose one could call that a kind of nonsense. Heh heh...."
201090-57 = "[s] \".......\""
201090-58 = "Pardon me. I was reminded of a rather ridiculous story."
201090-59 = "I am aware that you have encountered an old friend of Gematria before, Sensei."
201090-61 = "The Deceiver—he who profaned reality and treated the world as a Codex—served as a good simulation for us."
201090-62 = "But because you, through the Sublime, achieved yet another different, overarching intervention, #nthe attempt to judge this world as a single genre ended in failure once again."
201090-63 = "Observing the failure of the Deceiver, Decalcomanie stepped beyond the phantom image and began to observe the world for himself."
201090-65 = "Where is the place that consumes the signs, messages, and images that constitute this world? #nWhere is that place where nothing happens, yet everything exists—"
201090-104 = "—That is the media."
201090-105 = "The media, spread across this world like a spider's web, is an accumulation of panoply existing in the real world and a matrix pregnant with new mystery. #nIt could truly be called the 'power to define' in the new era."
201090-107 = "As a ritual to act on my behalf, what kind of sign will you provide? #nI cannot help but look forward to it."
201090-109 = "[ns] \"Are you Decalcomanie?\""
201090-110 = "That is nonsense. Before I am a single entity, I am a sign itself."
201090-111 = "I am the episteme of Decalcomanie, and its shadow. #nI perceive this world as reality."
201090-112 = "In this world where everything is consumed by desire, #nI twist the works of great artists once more to redefine myself."
201090-113 = "Good evening, Sensei."
201090-115 = "Please, call me Mr. Orwell."
201090-117 = "Next Episode;Masquerade"