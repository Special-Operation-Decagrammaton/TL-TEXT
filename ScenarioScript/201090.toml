[translation]
201090-1 = "Episódio 9: Boa Noite, Sr. Orwell"
201090-2 = "Bar de Sucos - 'Triad'"
201090-7 = "……Com licença."
201090-11 = "[ns] \"Parece que não tem ninguém aqui...\""
201090-12 = "Sim. Não sinto nenhum vestígio orgânico no perímetro."
201090-13 = "Devem ter encerrado o expediente comercial por hoje, portanto――"
201090-15 = "A dedução é falha. Afinal, as raízes deste estabelecimento nunca foram forjadas para atrair clientes."
201090-19 = "Um 'Bar de Sucos' é originalmente classificado como um 'Lugar' concebido para se consumir líquidos.#nContudo, se o objetivo orgânico fosse meramente ingerir fluidos, não haveria a menor necessidade de se prender ao conceito arquitetônico de um 'bar'."
201090-20 = "Há quem busque a catarse social e interações nas sombras deste antro, e há quem mergulhe na euforia e no status de poder pagar preços exorbitantes pelas taças."
201090-21 = "Essa é a pura lógica dos 'Símbolos'. Uma ilusão que só se sustenta de pé em uma sociedade regida pelo consumo cego."
201090-22 = "Vocês invadiram este espaço buscando uma 'Ferramenta'? Ou vieram atrás de um 'Símbolo'?"
201090-23 = "Se a vossa resposta abraça a segunda opção, mesmo eu sendo um mero espectador que chegou antes, acredito que posso lhes servir um modesto entretenimento para a noite."
201090-28 = "……Quanto tempo, Sensei."
201090-29 = "É ISSO AÍ!!"
201090-33 = "[ns1] \"Você é... Golconda?\"\n[ns2] \"Não, espera... Francis...?\""
201090-36 = "Oh, agora que a sua biologia demonstrou surpresa, recordo que não cheguei a estabelecer uma nova definição sobre os meus parâmetros.#nÉ compreensível que as sinapses do Sensei engasguem em confusão."
201090-37 = "É ISSO AÍ!!"
201090-38 = "Por onde os meus dados devem começar...?#nTalvez ruminar a poeira do nosso último encontro não seja uma má abertura pro debate."
201090-40 = "Quando Golconda foi transmutado na carne de Francis pela anomalia das 'Cores', ele passou a interpretar este mundo e as suas texturas como um mero gênero desconstruído."
201090-41 = "Em um teatro artificial e ensaiado, sem contexto, sem estrutura, despido de qualquer probabilidade――"
201090-42 = "Ele cravou a tese de que, no fim da peça, você despencaria no abismo de volta ao ostracismo, como um ser que não é ninguém."
201090-43 = "É ISSO AÍ!!"
201090-45 = "No entanto, as suas raízes o surpreenderam―― você cumpriu o seu roteiro com perfeição avassaladora como o Protagonista."
201090-46 = "……Fui leviano, você obliterou e transcendeu os grilhões do protagonismo.#nVocê mastigou o Símbolo de 'Sensei', o consumiu magistralmente, e provou o seu poder ao restaurar o tecido rasgado deste mundo para a sua fundação: uma 'História de Juventude e Academia'."
201090-47 = "Ao testemunhar essa anomalia empírica, Decalcomania engatilhou uma nova teia de raciocínios lógicos."
201090-51 = "Contrariando a tese podre de Francis, ele concluiu que as fundações deste mundo talvez ocultassem um valor místico que excede as barras de um simples gênero literário."
201090-52 = "Sob as leis naturais, Francis decaiu como apenas um fenômeno temporário e descartável."
201090-53 = "Para injetar sangue novo na ordem que colapsou num vácuo cinzento e reestabelecer o pilar da autoridade, tornou-se vital amplificar os decibéis da voz de Decalcomania."
201090-54 = "É ISSO AÍ!!"
201090-55 = "E assim... Decalcomania iterou deduções indutivas contínuas e abriu o tórax para absorver as proposições."
201090-56 = "A alcunha dele, outorgada em homenagem a um artista supremo, compartilha do mesmo título do inventor dos argumentos que ceifam a sua própria existência...#nSob a óptica clínica, pode-se cravar isso como uma certa espécie de nonsense. Kuku..."
201090-57 = "[s] \"…………\""
201090-58 = "Perdoem os meus dentes à mostra. Um lapso de memória cômico invadiu o meu córtex."
201090-59 = "Eu retenho os laudos de que o Sensei, há pouco tempo no relógio, cruzou baionetas com um velho fóssil e camarada da Gematria."
201090-61 = "O Habitante do Subterrâneo―― ele que profanou o oxigênio da realidade e tentou acorrentar o mundo para usá-lo como o seu Códex pessoal,#ntornou-se um excelente Simulacro de estudos para nós."
201090-62 = "No entanto, por meio do brilho do Sublime, o Sensei o esmagou e atingiu uma nova intervenção panorâmica divina. Consequentemente, a ambição nojenta de dissecar e aprisionar este mundo nas correntes de um único gênero desmoronou em cinzas mais uma vez."
201090-63 = "Anotando e dissecando a falha orgânica do Habitante do Subterrâneo, Decalcomania marchou por cima da falsa imagem dos cadáveres e,#ncom as próprias lentes, passou a dissecar e observar os códigos do mundo."
201090-65 = "Qual é a garganta negra que devora as mensagens, as imagens e os signos que costuram a teia deste mundo?#nOnde jaz a fundação onde nenhuma atrito ocorre, mas toda a existência está engarrafada?"
201090-104 = "――A resposta, meus caros: A Mídia."
201090-105 = "A mídia, espalhada e parasitando este mundo como uma teia de aranha silenciosa, é a panóplia regurgitada daquilo que é palpável no mundo real; a matriz uterina que carrega a gestação de novos Mistérios.#nNós podemos, sem medo da heresia, coroá-la como 'O Poder de Definição' para esta nova era tecnológica."
201090-107 = "Que deuses sintéticos e símbolos arquitetônicos ela servirá na bandeja como rito para espelhar a si mesma?#nO meu sangue ferve de curiosidade. Não ouso conter minhas expectativas."
201090-109 = "[ns] \"Você... é a consciência do Decalcomania?\""
201090-110 = "Classificação grotesca e irracional. Antes de existir como carne singular, eu sou a pura essência do Símbolo."
201090-111 = "Para rótulos didáticos, eu sou a Episteme do Decalcomania, a sua sombra.#nO filtro analítico que mastiga e reconhece os laudos reais deste mundo vivo."
201090-112 = "Dentro desta incubadora onde o sangue e as leis são triturados e consumidos pelo desejo carnal cego,#neu esmagarei e distorcerei a herança do grande artista mais uma vez... a fim de redefinir o meu próprio rosto no espelho."
201090-113 = "Boa Noite, Sensei."
201090-115 = "Peço que os seus registros batizem o meu nome como... Sr. Orwell."
201090-117 = "Próximo Episódio: Baile de Máscaras"