[translation]
201090-1 = "Episódio 9: Boa noite, Sr. Orwell"
201090-2 = "Bar de bebidas 'Triad'"
201090-7 = "……Com licença."
201090-11 = "[ns] \"Parece que não tem ninguém aqui…….\""
201090-12 = "Sim. Não sinto a presença de ninguém."
201090-13 = "Já encerramos o expediente de hoje, então――"
201090-15 = "Não é isso. Este lugar, originalmente, não era uma loja para atrair clientes."
201090-19 = "Um 'bar de bebidas' é conhecido, por natureza, como um 'lugar' para beber. #nMas, se for apenas para beber, não há necessidade de se prender a um bar."
201090-20 = "Há quem desfrute da interação em lugares escuros, e há quem se deleite com a folga financeira de poder pagar preços altos pelas bebidas."
201090-21 = "Isso nada mais é do que a lógica do 'símbolo' que só se sustenta em uma sociedade de consumo."
201090-22 = "Vocês visitaram este lugar como uma 'ferramenta'? Ou como um 'símbolo'?"
201090-23 = "No último caso, mesmo eu, que não passo de um cliente anterior, posso oferecer um pouco de entretenimento."
201090-28 = "……Há quanto tempo, Sensei."
201090-29 = "É exatamente isso!!"
201090-33 = "[ns1] \"Você é…… Golconda?\"\n[ns2] \"Não, Francis……?\""
201090-36 = "Ora, agora que menciona, eu não havia definido a mim mesmo novamente. #nEntendo que o Sensei esteja confuso."
201090-37 = "É exatamente isso!!"
201090-38 = "Por onde devemos começar…… #nNão seria ruim rememorar o nosso último encontro."
201090-40 = "Quando Golconda se transformou em Francis através da Cor, ele percebeu este mundo como um gênero desmantelado."
201090-41 = "Em um mundo artificial, sem nexo, sem estrutura e sem probabilidade――"
201090-42 = "Você pensou que, no fim, cairia no abismo como um ser sem identidade."
201090-43 = "É exatamente isso!!"
201090-45 = "Mas você―― como protagonista, cumpriu esse papel plenamente."
201090-46 = "……Não, você superou o papel de protagonista. #nVocê consumiu brilhantemente o símbolo chamado Sensei e conseguiu restaurar o texto deste mundo para uma 'história de escola e juventude'."
201090-47 = "Ao ver isso, Decalcomanie começou a formular outra inferência."
201090-51 = "Diferente da avaliação de Francis, ele chegou à conclusão de que este mundo pode ter um valor que vai além de um gênero."
201090-52 = "Claro, Francis não passa de um fenômeno temporário."
201090-53 = "Para redefinir a ordem que se tornou vazia e estabelecer autoridade, foi necessário amplificar a voz de Decalcomanie."
201090-54 = "É exatamente isso!!"
201090-55 = "Assim, Decalcomanie repetiu inferências indutivas e começou a absorver proposições."
201090-56 = "O nome pelo qual ele é chamado, em homenagem a um grande artista, é o mesmo nome do inventor da demonstração que nega sua existência…… #nIsso pode ser considerado um tipo de absurdo. Hehe……."
201090-57 = "[s] \"………….\""
201090-58 = "Perdão. É que me lembrei de uma história muito cômica."
201090-59 = "Sei que o Sensei encontrou um velho amigo da Gematria anteriormente."
201090-61 = "O Habitante do Subsolo―― aquele que profanava a realidade e tratava o mundo como um Codex, tornou-se uma boa simulação para nós."
201090-62 = "Mas, como o Sensei realizou uma intervenção panorâmica diferente através do Sublime, a tentativa de julgar este mundo como um único gênero falhou novamente."
201090-63 = "Observando o fracasso do Habitante do Subsolo, Decalcomanie superou a imagem ilusória e começou a observar o mundo por conta própria."
201090-65 = "Onde é o lugar que consome os símbolos, mensagens e imagens que compõem este mundo? #nOnde é esse lugar onde nada acontece, mas tudo existe――"
201090-104 = "――É a mídia."
201090-105 = "A mídia, espalhada como uma teia de aranha neste mundo, é um acúmulo de panóplias que existem na realidade e também é o útero que gesta novos mistérios. #nCertamente, pode-se dizer que é o 'poder de definir' na nova era."
201090-107 = "Como um ritual para representar a si mesmo, que tipo de símbolo você oferecerá―― #nNão consigo deixar de ter expectativas."
201090-109 = "[ns] \"Você é Decalcomanie?\""
201090-110 = "Que absurdo. Antes de ser uma existência única, eu sou o próprio símbolo."
201090-111 = "Eu sou a episteme de Decalcomanie, e sua sombra. #nComo uma existência real, percebo este mundo."
201090-112 = "Neste mundo onde tudo é consumido pelo desejo, eu distorço mais uma vez a obra do grande artista para redefinir a mim mesmo."
201090-113 = "Boa noite, Sensei."
201090-115 = "Por favor, chame-me de Sr. Orwell."
201090-117 = "Próximo episódio: Baile de Máscaras"
