[translation]#[Texto Final. - Filipe 13/07.]
201090-1 = "Episódio 9; Boa Noite, Sr. Orwell"
201090-2 = "Drink Bar \"Triad\""
201090-7 = "……Com licença."
201090-11 = "[ns] \"Parece que não tem ninguém……\""
201090-12 = "Sim. Não sinto presença alguma."
201090-13 = "O expediente de hoje já se encerrou――"
201090-15 = "Não é isso.#nEste, desde o princípio, nunca foi um estabelecimento que atrai clientes."
201090-19 = "O \"drink bar\" é conhecido, em essência, como um \"lugar\" onde se bebe.#nMas, se a questão fosse apenas beber, não haveria por que insistir num bar."
201090-20 = "Há quem venha desfrutar do convívio na penumbra;#nhá quem venha se deleitar no luxo de poder pagar por drinks caros."
201090-21 = "Eis a lógica do \"signo\", que só se sustenta numa sociedade de consumo."
201090-22 = "Vocês visitam este lugar como \"ferramenta\"?#nOu como \"signo\"?"
201090-23 = "No segundo caso, mesmo eu, um mero cliente que chegou antes#nposso oferecer um pequeno entretenimento."
201090-28 = "……Há quanto tempo, Sensei."
201090-29 = "É ISSO AÍ!!"
201090-33 = "[ns1] \"Você é…… Golconde?\"\n[ns2] \"Não, Francis……?\""
201090-36 = "Oh, é verdade: eu ainda não havia oferecido uma nova definição de mim.#nCompreendo a sua confusão, Sensei."
201090-37 = "É ISSO AÍ!!"
201090-38 = "Por onde começar……#nRuminar o último encontro de \"nós\" também não seria má ideia."
201090-40 = "Quando, pelas cores, Golconde se transformou em Francis#nele reconheceu este mundo como um gênero desmantelado."
201090-41 = "Num mundo artificial sem contexto, sem estrutura, sem verossimilhança――"
201090-42 = "ele concluiu que você, ao final, cairia no abismo como uma existência#nque não é ninguém."
201090-43 = "É ISSO AÍ!!"
201090-45 = "No entanto, você―― cumpriu plenamente o seu papel de protagonista."
201090-46 = "……Não. Você foi além do papel de protagonista.#nConsumiu com maestria o signo \"Sensei\" e, o texto deste mundo, você o#nrestaurou à \"história de escola e juventude\"."
201090-47 = "Ao presenciar isso, Decalcomanie deu início a uma inferência diferente."
201090-51 = "Ao contrário da avaliação de Francis#nele concluiu que este mundo talvez guarde um valor além do gênero."
201090-52 = "Francis, é claro, não passa de um fenômeno temporário."
201090-53 = "Para redefinir a ordem esvaziada e estabelecer autoridade#nera preciso amplificar a voz de Decalcomanie."
201090-54 = "É ISSO AÍ!!"
201090-55 = "Assim, Decalcomanie repetiu inferências indutivas e começou a absorver proposições."
201090-56 = "O seu nome, homenagem a um grande artista, é o mesmo do inventor da argumentação que nega tal existência……#nHá aí certo nonsense, é verdade. Kukuk……"
201090-57 = "[s] \"…………\""
201090-58 = "Perdão. Lembrei-me de uma história cômica demais."
201090-59 = "Sei que você, Sensei, já se encontrou antes com um velho amigo da Gematria."
201090-61 = "O Morador do Subsolo―― ele, que blasfemava contra o real e tratava o mundo como códex,#nfoi para nós uma excelente simulação."
201090-62 = "Mas você, Sensei, através do sublime, realizou outra intervenção de cima,#ne a tentativa de recortar este mundo em um único gênero fracassou mais uma vez."
201090-63 = "Observando o fracasso do Morador do Subsolo, Decalcomanie atravessou as ilusões#ne começou a observar o mundo por conta própria."
201090-65 = "Onde se consomem os signos, as mensagens e as imagens que compõem este mundo?#nOnde fica o lugar em que nada acontece, mas tudo existe――"
201090-104 = "――Ele é a mídia."
201090-105 = "A mídia, estendida sobre este mundo como uma teia de aranha, é o acúmulo das panóplias que existem no mundo real e o ventre que gesta novos mistérios.#nEla é, precisamente, o \"poder que define\" da nova era."
201090-107 = "Como ritual que me representa, que tipo de signo ela irá me oferecer――#nnão consigo conter a expectativa."
201090-109 = "[ns] \"Você é o Decalcomanie?\""
201090-110 = "Nonsense. Antes de ser uma existência, eu sou o próprio signo."
201090-111 = "Sou a episteme de Decalcomanie, e sua sombra.#nReconheço este mundo como algo real."
201090-112 = "Neste mundo em que tudo é consumido pelo desejo,#ndistorço mais uma vez a obra de um grande artista para me redefinir."
201090-113 = "Boa noite, Sensei."
201090-115 = "Por favor, me chame de Senhor Orwell."
201090-117 = "Próximo Episódio;Baile de Máscaras"