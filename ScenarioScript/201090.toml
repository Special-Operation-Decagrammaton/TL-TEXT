[translation]
201090-1 = "Эпизод 9;Доброй ночи, мистер Оруэлл"
201090-2 = "Питейный бар «Триада»"
201090-7 = "...Прошу прощения."
201090-11 = "[ns] «Похоже, здесь никого нет...»"
201090-12 = "Действительно. Я не ощущаю чьего-либо присутствия."
201090-13 = "Поскольку они уже закончили работу на сегодня —"
201090-15 = "Это вовсе не так. Это место изначально и не предназначалось для зазывания клиентов."
201090-19 = "«Питейный бар» изначально задумывался как «место», где пьют напитки. #nОднако, если хочется просто выпить, нет никакой нужды упорствовать именно на баре."
201090-20 = "Одни наслаждаются общением в тёмных местах, другие же упиваются удовольствием от обладания финансовой свободой, позволяющей покупать дорогие напитки."
201090-21 = "В этом и заключается сама логика «знаков», которые могут существовать только в обществе потребления."
201090-22 = "Вы посетили это место как «инструмент»? Или как «знак»?"
201090-23 = "В последнем случае, пусть даже в качестве всего лишь предшественника, я верю, что смогу предоставить вам скромное развлечение."
201090-28 = "...Давненько не виделись, Сенсей."
201090-29 = "Вот оно как!!"
201090-33 = "[ns1] «Ты... Голконда?»\n[ns2] «Нет, Фрэнцис...?»"
201090-36 = "О, если подумать, я ведь так и не дал себе нового определения. #nЯ понимаю, почему вы в замешательстве, Сенсей."
201090-37 = "Вот оно как!!"
201090-38 = "С чего бы нам начать? #nБыло бы неплохо предаться размышлениям о последней встрече «нас»."
201090-40 = "Когда Голконда превратился в Фрэнциса под воздействием Хромы, он воспринял этот мир как деконструированный жанр."
201090-41 = "В искусственном мире без контекста, без структуры и без доли вероятности —"
201090-42 = "Вы думали, что в конце концов низвергнетесь в бездну как порождение небытия."
201090-43 = "Вот оно как!!"
201090-45 = "Но вы — как протагонист, вы исполнили эту роль сполна."
201090-46 = "...Нет, вы превзошли роль протагониста. #nВы блистательно поглотили знак «Сенсея» и вернули тексту этого мира статус «истории о школе и юности»."
201090-47 = "Видя это, Декалькомания начал иную цепочку рассуждений."
201090-51 = "В отличие от оценки Фрэнциса, я пришёл к мысли, что этот мир может обладать ценностью, выходящей за рамки его жанра."
201090-52 = "Конечно, Фрэнцис — лишь временное явление."
201090-53 = "Чтобы заново определить порядок, который стал ничтожным, и установить авторитет, было необходимо усилить голос Декалькомани."
201090-54 = "Вот оно как!!"
201090-55 = "И потому Декалькомани повторял индуктивные рассуждения и начал впитывать суждения."
201090-56 = "То, что его имя, отдающее дань уважения великому художнику, совпадает с именем изобретателя доказательства, отрицающего его существование... #nПолагаю, это можно назвать своего рода абсурдом. Хе-хе..."
201090-57 = "[s] «.......»"
201090-58 = "Прошу прощения. Мне вспомнилась довольно нелепая история."
201090-59 = "Мне известно, что вы уже сталкивались со старым другом Гематрии, Сенсей."
201090-61 = "Обманщик — тот, кто осквернил реальность и отнёсся к миру как к Кодексу, — послужил для нас хорошей симуляцией."
201090-62 = "Но поскольку вы через Возвышенное достигли ещё одного, совершенно иного, всеобъемлющего вмешательства, #nпопытка расценить этот мир как единый жанр в очередной раз окончилась крахом."
201090-63 = "Наблюдая за неудачей Обманщика, Декалькомани шагнул за пределы призрачного образа и начал лично созерцать этот мир."
201090-65 = "Где то место, что поглощает знаки, послания и образы, составляющие этот мир? #nГде то место, где ничего не происходит, но при этом существует абсолютно всё —"
201090-104 = "— Это медиа."
201090-105 = "Медиа, опутавшее этот мир подобно паутине, представляет собой скопление доспехов, существующих в реальном мире, и матрицу, чреватую новой тайной. #nЕго поистине можно назвать «силой давать определения» в новую эпоху."
201090-107 = "Какой знак вы предоставите в качестве ритуала, чтобы действовать от моего имени? #nЯ просто не могу не ждать этого с нетерпением."
201090-109 = "[ns] «Ты Декалькомани?»"
201090-110 = "Это абсурд. Прежде чем быть отдельной сущностью, я сам являюсь знаком."
201090-111 = "Я эпистема Декалькомани и его тень. #nЯ воспринимаю этот мир как реальность."
201090-112 = "В этом мире, где всё пожирается желанием, #nя ещё раз извращаю творения великих художников, чтобы дать себе новое определение."
201090-113 = "Добрый вечер, Сенсей."
201090-115 = "Пожалуйста, зовите меня мистер Оруэлл."
201090-117 = "Следующий эпизод;Маскарад"