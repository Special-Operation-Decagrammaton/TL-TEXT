[translation]
61070-1 = "Episódio 7; Gaita"
61070-2 = "Ei, Sensei."
61070-3 = "O seu plano é fazer as alunas de Arius prestarem um exame, não é?"
61070-4 = "Este 'Exame Geral de Trinity'."
61070-10 = "[ns]\"Sim. De preferência com o nome 'Exame Geral de Arius'.\""
61070-11 = "Nomes são importantes, né."
61070-12 = "A Nagisa-san também disse isso."
61070-14 = "Se pensarmos se o pessoal de Arius vai aceitar o nome 'Exame Geral de Trinity'..."
61070-15 = "Provavelmente seria difícil."
61070-16 = "Porém, e se por algum acaso..."
61070-17 = "As cópias extras do 'Exame Geral de Trinity' acabassem parando na 'Escola Filial de Arius'?"
61070-18 = "E ainda por cima, através das entregadoras chamadas 'Esquadrão Arius'."
61070-19 = "Claro, Trinity não fará nenhum pronunciamento oficial sobre o assunto."
61070-20 = "Erros de impressão ou de entrega são coisas que acontecem de vez em quando.#nHmm... mesmo que tenha sido para economizar nos custos da escola, usar o Centro Nishikawa foi um erro."
61070-21 = "Puxa vida... administrar uma escola dá muito trabalho."
61070-23 = "Um erro de entrega, é...#nEntão o nosso trabalho dessa vez é de entregadoras e guarda-costas."
61070-24 = "...E o pagamento? Acabei esquecendo de perguntar."
61070-25 = "[s]\"Não se preocupe. Vou preparar uma quantia apropriada.\""
61070-26 = "..."
61070-27 = "Se você diz, Sensei."
61070-28 = "[s]\"Mas, na verdade, eu também estou pensando em outro plano.\""
61070-29 = "O-Outro plano...!?"
61070-30 = "Com certeza é mais alguma bobagem.#nNem vale a pena se preocupar."
61070-32 = "Eu estou um pouco animada. #nPosso criar expectativas, não é, Sensei?"
61070-34 = "...No entanto, ainda temos uma montanha de outros problemas."
61070-35 = "Primeiro. Para fazer o exame, é preciso ter estudado o suficiente."
61070-36 = "Será que as alunas de Arius receberam uma educação normal...?"
61070-37 = "Como esperado... seria pedir demais.#nÉ por isso que eu pedi ao Sensei para dar aulas para elas..."
61070-38 = "Mais uma vez, sou muito grata a você, Sensei.#nE... peço desculpas. A todas do Esquadrão Arius."
61070-42 = "...A princípio, talvez esse meu pedido nem faça muito sentido."
61070-43 = "Isso significa Trinity se intrometendo na administração da Escola Filial de Arius."
61070-44 = "Interferir nas políticas de outra escola é algo que normalmente não deveria acontecer."
61070-45 = "'Outra escola', hein..."
61070-46 = "O que você acha disso, Atsuko-san?"
61070-47 = "...Obrigada, Nagisa-san."
61070-51 = "Sinceramente, sou grata por essa sua decisão."
61070-52 = "Afinal, Trinity poderia ter reivindicado o domínio da Escola Filial de Arius a qualquer momento."
61070-53 = "Durante aquele incidente... mesmo que por pouco tempo, Arius esteve sob o controle de Trinity."
61070-55 = "Nós só [ruby=p o d e r í a m o s]poderíamos[/ruby] reivindicar.#nFazer isso na prática e torná-lo realidade é uma história completamente diferente."
61070-56 = "Por isso mesmo que eu, como 'indivíduo' chamada [ruby=Kirifuji]Kirifuji[/ruby] Nagisa, não tive outra escolha a não ser fazer um 'pedido' ao Sensei... não, à Schale."
61070-58 = "Que jeito mais complicado de fazer as coisas. Sendo que é algo tão simples."
61070-59 = "Isso é... o que chamam de política...? Q-Que medo... assustador demais..."
61070-61 = "Acho que esse é só mais um aspecto do nosso mundo.#nDeixando os detalhes de lado, para ser sincera, fiquei impressionada com a forma de agir da Kirifuji Nagisa."
61070-62 = "Foi um ótimo aprendizado."
61070-63 = "O que foi isso? Vai me dizer que vai ficar do lado do Tea Party agora?"
61070-64 = "I-Isso é..."
61070-66 = "Mas, se há algo a ser aprendido, acho que devemos aprender com qualquer um."
61070-67 = "...Afinal, somos cheias de coisas que ainda não sabemos."
61070-68 = "Haa..."
61070-70 = "Senpai, senpai! Toca gaita pra gente!"
61070-71 = "Ah! Eu também quero ouvir! Eu amo quando você toca, Senpai!"
61070-72 = "Eh!? I-Isso é..."
61070-73 = "Aaah, qual o problema!?#nDeixa a gente ouvir~!"
61070-74 = "N-Não. É que... bem..."
61070-75 = "Recentemente, eu andei pensando..."
61070-76 = "Ficar tocando gaita sozinha nas ruínas, cheia de sentimentalismo..."
61070-77 = "Isso me parece... querer pagar de legalzona demais..."
61070-78 = "Uau! A Senpai tá com vergonha!"
61070-79 = "Isso é raro! Esse rosto envergonhado... hehe, talvez hoje seja o nosso dia de sorte!"
61070-80 = "Hum, eu também... quero ouvir a música da Senpai...#nFaz tanto tempo, não é..."
61070-81 = "Guh...! Aí já é golpe baixo, não acham...!?"
61070-83 = "Não... pode?"
61070-84 = "I-Isso... é muito injusto!"
61070-85 = "...Não é que seja... totalmente proibido."
61070-86 = "Vivaaa!!!"
61070-91 = "Fala sério... vocês só são malvadas nessas horas..."
61070-92 = "Não tenho muita escolha... Então vamos lá..."
61070-101 = "Se sair uma nota estranha, por favor, não riam de mim... tá?"
61070-102 = "Eeeh, lá vem você de novo~"
61070-103 = "Você nunca tocou nenhuma nota estranha, Senpai~!"
61070-105 = "Antes, como a Madame nos proibia, não podíamos ouvir muito, mas..."
61070-106 = "Mas, quando ela não estava por perto, você sempre tocava escondida pra gente, não é?"
61070-107 = "Eu nunca achei que você tocava mal ou estranho."
61070-108 = "Não entendo muito de música, mas... acho que você tem talento!"
61070-112 = "Vocês não vão ganhar nada me enchendo de elogios, viu!?"
61070-113 = "..."
61070-114 = "Haa..."
61070-115 = "Bem, eu vou tocar... agora."
61070-127 = "Uauuu..."
61070-128 = "Hehe... eu realmente amo esse som."
61070-130 = "(...O que é isso?)"
61070-131 = "(Sinto que a ficha de que eu voltei finalmente caiu...)"
61070-148 = "...Voltamos, né."
61070-149 = "...Sim."
61070-150 = "Suu... Fuu..."
61070-151 = "...O que foi?"
61070-152 = "Não... só me deu vontade."
61070-153 = "..."
61070-154 = "...Entendi. É verdade."
61070-156 = "...Uhum."
61070-157 = "Uuu... a gente voltando pra Arius...#nSerá que vai ficar tudo bem mesmo...?"
61070-158 = "Eu sinto... que nós já tivemos essa conversa antes..."
61070-159 = "Mas agora que estamos voltando mesmo, eu me sinto meio...#nAnsiosa, sabe..."
61070-160 = "[ns]\"Eu também me sinto da mesma forma.\""
61070-161 = "Ah... afinal, não é a primeira vez que o Sensei vem aqui... "
61070-162 = "Mas, bom, se nós formos voltar para Arius..."
61070-163 = "Com quase toda a certeza... não seremos bem-vindas."
61070-165 = "Sim. Para o pessoal que ficou, nós somos o mesmo que traidoras."
61070-166 = "Acho que sim."
61070-167 = "...Talvez até façam uma recepção calorosa para a gente."
61070-168 = "Se me lembro bem, quem está no comando agora é a Subaru."
61070-169 = "Sim..."
61070-171 = "Antes de vir, enviamos mensageiros secretamente algumas vezes...#ne tentamos ter uma oportunidade para conversar."
61070-172 = "E o resultado?"
61070-173 = "...Digamos apenas que as Cavaleiras do Socorro tiveram que focar exclusivamente em missões de resgate."
61070-174 = "A única coisa que conseguimos descobrir foi o nome da aluna que está unindo aqueles que ficaram por lá.#nO nome dela é――"
61070-175 = "――[ruby=Kakehashi]Kakehashi[/ruby] Subaru."
61070-176 = "...!"
61070-178 = "[ns]\"Como essa Subaru era?\""
61070-179 = "A Satchan provavelmente é a que mais sabe sobre ela."
61070-180 = "..."
61070-181 = "Não é fácil descrever a personalidade dela em uma palavra, mas se eu me lembro bem..."
61070-182 = "Ela parecia do tipo que você conseguia dialogar, mas que ao mesmo tempo, era um tanto quanto fora de sintonia."
61070-184 = "Sério?"
61070-188 = "Mas, pensando bem... ela não está tão errada."
61070-189 = "[ns]\"Isso significa que é possível conversar com ela, não é?\""
61070-190 = "Pode-se ver por esse lado, mas..."
61070-191 = "Não, sendo você, Sensei...#nAcho que tentaria conversar independente de quem fosse."
61070-192 = "――Parem.#n...A partir de agora vamos passar para a formação de combate. Estão prontas?"
61070-196 = "Esquadrão Arius, iniciando a missão."
61070-200 = "Essa sensação... que nostalgia."
61070-205 = "Ei... Sensei."
61070-206 = "Essa pode ser a última vez que conseguiremos conversar com calma.#nPor isso, eu tenho uma coisa para perguntar."
61070-207 = "Por que você... está sempre se colocando em segundo plano e... assumindo o papel em que você sempre sai perdendo?"
61070-208 = "Ah, não. Não estou querendo te culpar por isso. Só que..."
61070-212 = "..."
61070-213 = "Eu não quero mais... ver o Sensei se machucando ou sofrendo."
61070-214 = "Seja uma ferida no coração ou no corpo... é a mesma coisa."
61070-215 = "[s]\"Saber que você se importa já me dá as forças que eu preciso. Deve ser por isso.\""
61070-216 = "É, é mesmo?#nEntão se eu continuar a me preocupar com o Sensei daqui em diante――"
61070-217 = "...Não, esquece.#nEu sei muito bem que as coisas não podem ser convenientes assim."
61070-218 = "Hm? Por que eu tô perguntando isso de repente... é isso?"
61070-219 = "..."
61070-220 = "Quando eu venho a este lugar, eu acabo me lembrando de muitas coisas."
61070-221 = "Afinal, passamos por muita coisa... "
61070-222 = "..."
61070-223 = "Escuta, Sensei?"
61070-224 = "..."
61070-225 = "Sinto que eu ainda preciso pedir desculpas a você propriamen――"
61070-229 = "[ns]\"Ah, é verdade! Sobre as alunas que foram transferidas para Trinity!\""
61070-230 = "Eh, ah, sim."
61070-231 = "[s]\"Elas estavam muito gratas a todas vocês.\""
61070-232 = "Eh...?"
61070-233 = "...Por quê?"
61070-235 = "Falar que foi porque [ruby=o Esquadrão]nós[/ruby] executamos aquela operação, isso é... só focar no resultado."
61070-236 = "Mesmo assim, serviu como um empurrão para que elas pudessem ter uma vida escolar fora de Arius..."
61070-238 = "Mas... isso foi...#numa coisa que nós fizemos, mas..."
61070-239 = "Não foi uma coisa... incrivelmente ruim...?"
61070-240 = "Sim. Foi terrorismo. É o tipo de coisa que você definitivamente não deve fazer."
61070-241 = "Waaaaahhhh! Sabia que era sim~!"
61070-243 = "[ns3]\"No entanto.\"\n[ns4]\"As alunas transferidas me deram uma mensagem de agradecimento para vocês.\"\n[ns5]\"E isso também é um fato indiscutível.\""
61070-247 = "..."
61070-248 = "Sensei...? O que você quer dizer com fato?"
61070-249 = "...Afinal, o que é a história?"
61070-250 = "[s6]\"Desculpe por não dar uma resposta direta, mas...\"\n[s7]\"Eu acho que nós estudamos justamente para descobrir coisas como essa.\""
61070-253 = "Hehe, você me pegou nessa."
61070-254 = "Isso foi bem a cara do Sensei, e soou um pouco legalzinho."
61070-255 = "Hã? Aproveitando que eu estou agindo como professor, quer perguntar outra coisa?"
61070-256 = "[s]\"Vocês costumam estudar direitinho?\""
61070-257 = "Não precisa se preocupar com isso. Eu até que gosto bastante de estudar."
61070-258 = "Ehehe... afinal, o Sensei nos enviava secretamente uns BDs educacionais e tudo mais..."
61070-259 = "...Bem, não é como se fosse nos fazer algum mal.#nEu estudo um pouco quando tenho tempo livre."
61070-260 = "Sim. O mesmo vale para mim. Não custa nada entender como o mundo funciona."
61070-261 = "...Pensando bem, isso também foi exatamente como o Sensei disse."
61070-263 = "[ns8]\"Que bom. Com isso, estamos um passo mais perto da conclusão.\"\n[ns9]\"Do meu plano grandioso...!\""
61070-266 = "Quando o Sensei fica animado assim, é quando eu fico mais preocupada..."
61070-267 = "E-Espera aí...!"
61070-268 = "O que foi?"
61070-269 = "...Ah, entendi. É isso então."
61070-270 = "Sim..."
61070-272 = "Finalmente..."
61070-273 = "Voltamos pra casa..."
61070-275 = "Haa... Foi incrível, Senpai."
61070-276 = "Bis! Bis!"
61070-277 = "...Me recuso."
61070-278 = "Não fique com vergonha! Foi muito legal!"
61070-279 = "Não, o negócio é o seguinte..."
61070-280 = "A verdade é que, eu não sei mais nenhuma música para tocar..."
61070-281 = "Ah... é que partituras não são algo fácil de se conseguir por aqui..."
61070-282 = "Bom, não há nada que possamos fazer então..."
61070-287 = "S-Senpai! T-Temos um problema!"
61070-288 = "Acalme-se.#nPor favor, respire e me explique tudo com calma."
61070-289 = "S-Sim!"
61070-290 = "...O Esquadrão entrou em Arius.#nE estão junto do Sensei da Schale."
61070-294 = "O Esquadrão...!?"
61070-295 = "Com que cara elas aparecem aqui...!"
61070-296 = "Eu ainda não consigo aceitar o que o Esquadrão..."
61070-298 = "..."
61070-299 = "É impossível... eu nem quero olhar na cara delas..."
61070-300 = "É, não quero vê-las."
61070-301 = "Achei que depois do pessoal de Trinity não viria mais ninguém, e agora o Esquadrão...?#nO que diabos elas querem aqui...!"
61070-303 = "Esperem um instante."
61070-304 = "...Você disse que o Sensei da Schale também está junto, certo?"
61070-305 = "I-Isso mesmo!"
61070-306 = "..."
61070-307 = "Entendo... então é assim."
61070-308 = "Será que o Esquadrão não acabou sendo arrastado para isso...?"
61070-309 = "O-O que você quer dizer, Senpai?"
61070-310 = "Meninas."
61070-311 = "Se fosse apenas o Esquadrão, não seria um problema tão grande."
61070-312 = "Mas, o problema é aquele adulto chamado 'Sensei da Schale'."
61070-313 = "Se ele também apareceu em Arius, não poderemos agir como vínhamos agindo."
61070-318 = "M-Mas, por quê...?"
61070-319 = "Por que, você pergunta... Pense bem.#nPor causa daquele adulto, no fim das contas..."
61070-320 = "A Madame... acabou desaparecendo, não foi...?"
61070-321 = "I-Isso é verdade, mas... Ah!"
61070-322 = "Sim."
61070-323 = "Nós não sabemos do que aquele adulto é capaz. Nem que tipo de poder possui."
61070-324 = "É impossível prever... o que a sua presença vai trazer para nós.#nAdultos são sempre assim, não é?"
61070-325 = "...Com certeza."
61070-326 = "Eles sempre fazem coisas que nem mesmo conseguimos imaginar."
61070-328 = "S-Senpai... o que devemos fazer...?"
61070-329 = "Primeiro, vamos nos acalmar. Depois..."
61070-330 = "..."
61070-331 = "Vamos dar uma 'recepção' para eles."
61070-332 = "I-Isso... será que é uma boa ideia...!?"
61070-333 = "Para ser sincera, ainda não sei dizer se é uma boa ideia ou não."
61070-334 = "No entanto... se nós não tentarmos, nunca vamos saber, não é mesmo?"
61070-335 = "Por ora, quero que deixem as travas de segurança de suas armas acionadas."
61070-336 = "...Por enquanto."
61070-337 = "Entendido, Senpai!"
61070-340 = "Próximo Episódio; O Estilo Arius"