[translation]
61070-1 = "Episódio 7; Gaita"
61070-2 = "Ei, Sensei."
61070-3 = "O plano do Sensei é fazer com que as alunas de Arius façam o exame, certo?"
61070-4 = "Este \"Exame Geral de Trinity\"."
61070-10 = "[ns]\"Sim. Se possível, com o nome de 'Exame Geral de Arius'.\""
61070-11 = "Nomes são importantes, não são?"
61070-12 = "A Nagisa-san também disse isso."
61070-14 = "Considerando se as alunas de Arius aceitariam o nome \"Exame Geral de Trinity\"..."
61070-15 = "Acho que seria difícil, de fato."
61070-16 = "Mas, e se por algum acaso..."
61070-17 = "Se cópias extras do \"Exame Geral de Trinity\" acabassem indo parar na \"Filial de Arius\"?"
61070-18 = "E isso, através de transportadores chamados \"Esquadrão de Arius\"."
61070-19 = "Claro que, sobre este assunto, Trinity não emitirá qualquer declaração."
61070-20 = "Erros de impressão ou de entrega são coisas que acontecem com frequência. #nHum... embora seja para economizar ao máximo as despesas operacionais da escola, usar o Centro Nishikawa foi um erro."
61070-21 = "Francamente... administrar uma escola é algo trabalhoso."
61070-23 = "Erro de entrega, é... #nEntão, este trabalho é de entregador e guarda-costas ao mesmo tempo."
61070-24 = "...E a recompensa? Esqueci de perguntar."
61070-25 = "[s]\"Não se preocupe. Vou preparar uma quantia justa.\""
61070-26 = "..."
61070-27 = "Se para o Sensei está bom assim."
61070-28 = "[s]\"Mas, na verdade, estou pensando em outras estratégias também.\""
61070-29 = "Ou-outra estratégia...?"
61070-30 = "Com certeza deve ser mais uma ideia absurda. #nNão vale a pena se preocupar com isso."
61070-32 = "Eu estou um pouco animada, na verdade. #nPosso criar expectativas, Sensei?"
61070-34 = "...Dito isso, há outros problemas acumulados."
61070-35 = "Primeiro: para realizar o exame, é necessário ter uma base de estudos adequada."
61070-36 = "Será que as alunas de Arius receberam uma educação geral...?"
61070-37 = "Como esperado, isso seria... impossível. #nÉ justamente por isso que pedi ao Sensei para dar as aulas..."
61070-38 = "Mais uma vez, agradeço ao Sensei. #nE... sinto muito, integrantes do Esquadrão de Arius."
61070-42 = "...Talvez este pedido nem devesse existir desde o início."
61070-43 = "Isso significa que Trinity está interferindo na administração da Filial de Arius."
61070-44 = "Interferir nas diretrizes de outra escola é algo que, originalmente, não deveria acontecer."
61070-45 = "\"Outra escola\", é..."
61070-46 = "O que você acha, Atsuko-san?"
61070-47 = "...Obrigada, Nagisa-san."
61070-51 = "Agora, agradeço sinceramente por essa decisão."
61070-52 = "Afinal, Trinity poderia ter reivindicado a posse da Filial de Arius a qualquer momento."
61070-53 = "Na época daquele incidente... embora tenha sido temporário, Arius esteve sob o controle de Trinity."
61070-55 = "Eu apenas pude reivindicar. #nNa prática, realizar isso ou fazer com que se concretize são coisas completamente diferentes."
61070-56 = "É por isso que o Sensei... não, que Kirifuji Nagisa, como um \"indivíduo\", teve que fazer um \"pedido\" ao Schale."
61070-58 = "Você faz as coisas de um jeito muito complicado, né? Sendo que é algo simples."
61070-59 = "Isso é... o que chamam de política...? I-isso é assustador... assustador demais..."
61070-61 = "Isso também deve ser uma das faces do mundo. #nDeixando os detalhes de lado, honestamente, fiquei impressionada com a forma como Kirifuji Nagisa agiu."
61070-62 = "Foi uma boa lição."
61070-63 = "O que é isso? Por acaso pretende ficar do lado do Tea Party?"
61070-64 = "Is-isso é..."
61070-66 = "Mas, se há algo a aprender, acho que devemos aprender com qualquer pessoa."
61070-67 = "...Já que nós não sabemos de quase nada."
61070-68 = "Ah..."
61070-70 = "Senpai, Senpai! Toque a gaita para mim!"
61070-71 = "Ah! Eu também quero ouvir! Eu adoro a sua música, veterano!"
61070-72 = "Hã!? I-isso é..."
61070-73 = "Ah, qual é, não seja assim! #nDeixa a gente ouvir!"
61070-74 = "N-não. É que... sabe..."
61070-75 = "Ultimamente, eu andei pensando..."
61070-76 = "Ficar tocando gaita sozinho em meio às ruínas, mergulhado em sentimentos..."
61070-77 = "Isso não é um pouco... forçar demais a barra no estilo...?"
61070-78 = "Uau! O veterano está corado!"
61070-79 = "Que raro! Esse rosto envergonhado... Hehe, talvez hoje seja meu dia de sorte!"
61070-80 = "Ei, eu também... queria ouvir... a sua música. #nFaz tanto tempo, afinal..."
61070-81 = "Guh...! Isso não é um pouco desleal...!?"
61070-83 = "Não... pode?"
61070-84 = "Isso... isso é realmente muito injusto!"
61070-85 = "...Não é que seja absolutamente proibido..."
61070-86 = "Eba!!!"
61070-91 = "Francamente... vocês só sabem ser malvados nessas horas..."
61070-92 = "Não tem jeito... então, vamos lá..."
61070-101 = "Se sair algum som estranho, por favor, não riam muito, tá...?"
61070-102 = "Ah, lá vem você de novo~"
61070-103 = "O veterano nunca tocou uma nota estranha na vida, sabia~!"
61070-105 = "Antes, a Madame proibia, então não podíamos ouvir muito..."
61070-106 = "Mas, quando ela não estava por perto, você tocava escondido, não tocava?"
61070-107 = "Eu nunca achei que fosse ruim ou estranho."
61070-108 = "Eu não entendo muito do assunto, mas... acho que você tem talento, sabe?"
61070-112 = "Não adianta me elogiar tanto, não vai ganhar nada com isso, viu!?"
61070-113 = "..."
61070-114 = "Haa..."
61070-115 = "Bem, vou tocar... então."
61070-127 = "Uau..."
61070-128 = "Hehe... eu realmente amo esse som."
61070-130 = "(...O que será isso?)"
61070-131 = "(Sinto que, finalmente, a ficha de que voltei para casa caiu...)"
61070-148 = "...Nós voltamos, né."
61070-149 = "...É."
61070-150 = "Suu... fuu..."
61070-151 = "...O que foi?"
61070-152 = "Nada... só por acaso, sabe."
61070-153 = "..."
61070-154 = "...Entendo. É verdade."
61070-156 = "...Sim."
61070-157 = "Uuu... será que... #nvoltar para Arius é realmente uma boa ideia...?"
61070-158 = "Eu sinto que já conversamos sobre isso antes..."
61070-159 = "Mas, agora que voltamos, sinto um pouco... #nde angústia, por assim dizer..."
61070-160 = "[ns]\"Eu sinto o mesmo.\""
61070-161 = "Ah... Sensei, você também não é um estranho por aqui, né..."
61070-162 = "Mas, bem, se nós vamos voltar para Arius..."
61070-163 = "É quase certo... que não seremos bem-vindos."
61070-165 = "É verdade. Para os que ficaram, somos praticamente traidores."
61070-166 = "Com certeza, eu penso o mesmo."
61070-167 = "...Talvez eles até nos preparem uma recepção calorosa, quem sabe."
61070-168 = "Se não me engano, quem está no comando agora é a Subaru."
61070-169 = "Sim..."
61070-171 = "Já enviamos emissários em segredo várias vezes no passado...#ne tentamos abrir um canal de diálogo."
61070-172 = "E o resultado?"
61070-173 = "...Direi apenas que a Esquadra de Socorro não teve outra escolha a não ser se dedicar às atividades de resgate."
61070-174 = "A única coisa que conseguimos descobrir foi o nome da aluna que está liderando aqueles que permaneceram lá.#nEssa aluna é..."
61070-175 = "—Subaru Kakehashi."
61070-176 = "...!"
61070-178 = "[ns]\"Como era a Subaru?\""
61070-179 = "Acho que a Sa-chan é quem melhor sabe sobre isso."
61070-180 = "..."
61070-181 = "Não é fácil descrever a personalidade dela em poucas palavras, mas, na minha memória..."
61070-182 = "Ela era o tipo de pessoa que parecia entender o que você dizia, mas que, ao mesmo tempo, era um pouco fora da casinha."
61070-184 = "Era mesmo?"
61070-188 = "Mas, pensando bem... acho que não está errado."
61070-189 = "[ns]\"Então quer dizer que não é impossível conversar com ela?\""
61070-190 = "Dá para ver por esse lado, mas..."
61070-191 = "Não, tratando-se do Sensei...#nvocê tentaria conversar com qualquer um, não é?"
61070-192 = "—Parem por aí.#n...A partir de agora, entraremos em regime de operação. Estão prontas?"
61070-196 = "Esquadrão Arius, início da missão."
61070-200 = "Essa sensação... é nostálgica."
61070-205 = "Diga... Sensei."
61070-206 = "Talvez esta seja a última vez que possamos conversar com calma.#nPor isso, tem algo que eu queria perguntar."
61070-207 = "Por que você... sempre se coloca em segundo plano desse jeito... e insiste em assumir papéis tão ingratos?"
61070-208 = "Ah, não. Não é que eu esteja te culpando por isso. É só que..."
61070-212 = "..."
61070-213 = "Eu não quero mais ver o Sensei se machucar ou sofrer."
61070-214 = "Seja uma ferida no coração ou no corpo... para mim, é a mesma coisa."
61070-215 = "[s]\"Só de ouvir isso, já me sinto melhor. Talvez seja por isso.\""
61070-216 = "S-sério?#nNesse caso, se eu continuar me preocupando com o Sensei daqui para frente—"
61070-217 = "...Não, esquece.#nEu sei muito bem que as coisas não funcionam de forma tão conveniente assim."
61070-218 = "Hm? Por que de repente eu disse isso... né."
61070-219 = "..."
61070-220 = "Quando venho a este lugar, acabo me lembrando de muitas coisas."
61070-221 = "Afinal, muitas coisas aconteceram aqui..."
61070-222 = "..."
61070-223 = "Diga, Sensei?"
61070-224 = "..."
61070-225 = "Eu ainda preciso pedir desculpas ao Sensei de verdade—"
61070-229 = "[ns]\"Ah, é verdade! Sobre as alunas que foram transferidas para Trinity!\""
61070-230 = "Eh, ah, sim."
61070-231 = "[s]\"Elas estavam todas muito gratas a vocês.\""
61070-232 = "Eh...?"
61070-233 = "...Por quê?"
61070-235 = "Dizer que foi porque nós executamos aquela operação... isso é apenas um argumento baseado no resultado, não é?"
61070-236 = "Ainda assim, isso acabou se tornando o motivo para elas conseguirem viver uma vida escolar fora de Arius..."
61070-238 = "Mas... isso...#nfoi algo que nós fizemos, mas ainda assim..."
61070-239 = "Não foi... algo terrivelmente ruim...?"
61070-240 = "Sim. Foi terrorismo. Foi algo que nunca deveria ter sido feito."
61070-241 = "Uaaaaaah! Eu sabia que era isso mesmo!"
61070-243 = "[ns3]\"Mas veja bem.\"\n[ns4]\"Recebi palavras de gratidão das alunas que foram transferidas.\"\n[ns5]\"Isso também é um fato concreto.\""
61070-247 = "……."
61070-248 = "Sensei……? O que quer dizer com fato?"
61070-249 = "……O que será que é a história?"
61070-250 = "[s6]\"Sinto muito por não dar uma resposta direta.\"\n[s7]\"Mas acho que é justamente para saber isso que estudamos.\""
61070-253 = "Fufu, você me pegou nessa."
61070-254 = "Isso foi bem a sua cara, Sensei. Foi até que legal."
61070-255 = "Ah? Já que estamos falando do seu jeito, quer perguntar mais uma coisa?"
61070-256 = "[s]\"Vocês costumam estudar direitinho?\""
61070-257 = "Quanto a isso, não precisa se preocupar. Eu gosto bastante de estudar."
61070-258 = "Hehehe…… O Sensei enviava BDs educacionais para mim escondido……."
61070-259 = "……Bem, não faz mal nenhum aprender. #nVou fazendo aos poucos quando tenho tempo."
61070-260 = "Ah. Eu também. Não faz mal nenhum entender como o mundo funciona."
61070-261 = "……Pensando bem, isso também foi exatamente como o Sensei disse."
61070-263 = "[ns8]\"Que bom. Com isso, demos mais um passo em direção à conclusão.\"\n[ns9]\"Do meu plano grandioso……!\""
61070-266 = "Quando o Sensei fica com esse ânimo, é quando eu fico mais preocupada……."
61070-267 = "E-espere um pouco……!"
61070-268 = "O que houve?"
61070-269 = "……Ah, entendi. Então é isso."
61070-270 = "Sim……."
61070-272 = "Finalmente……."
61070-273 = "Você voltou……."
61070-275 = "Ah…… Foi incrível, senpai."
61070-276 = "Bis! Bis!"
61070-277 = "……Eu recuso."
61070-278 = "Não seja tímido! Foi muito legal!"
61070-279 = "Não, é que……."
61070-280 = "Na verdade, não tenho mais nenhuma música para tocar……."
61070-281 = "Ah…… É verdade, partituras não são tão fáceis de conseguir……."
61070-282 = "Então, não tem jeito……."
61070-287 = "Se-senpai! É, é uma emergência!"
61070-288 = "Por favor, mantenha a calma. #nConte-me devagar e passo a passo."
61070-289 = "S-sim!"
61070-290 = "……O Esquadrão entrou em Arius. #nEles estão com o Sensei do Schale."
61070-294 = "O Esquadrão……!?"
61070-295 = "Com que cara eles têm a audácia de……!"
61070-296 = "Eu ainda não consigo lidar com o Esquadrão……."
61070-298 = "……."
61070-299 = "Não consigo…… Não quero nem ver o rosto deles……."
61070-300 = "É, eu não quero encontrá-los."
61070-301 = "Primeiro a Trinity aparece, e agora o Esquadrão……? #nO que eles vieram fazer aqui……!"
61070-303 = "Espere um pouco."
61070-304 = "……Você disse que o Sensei do Schale também está com eles, certo?"
61070-305 = "S-sim, isso mesmo!"
61070-306 = "……."
61070-307 = "Entendo…… Então é isso."
61070-308 = "Será que o Esquadrão também foi envolvido nisso……?"
61070-309 = "O-o que quer dizer com isso, senpai?"
61070-310 = "Pessoal."
61070-311 = "Se fosse apenas o Esquadrão, provavelmente não seria um grande problema."
61070-312 = "Mas o problema é aquele adulto, chamado de 'Sensei do Schale'."
61070-313 = "Já que esse adulto apareceu em Arius, nossos métodos habituais não vão funcionar."
61070-318 = "P-por que...?"
61070-319 = "Por que, você pergunta...? Pense um pouco. #nPor causa daquele adulto, no fim das contas..."
61070-320 = "A Madame... desapareceu, não foi...?"
61070-321 = "I-isso é, mas... ah!"
61070-322 = "Exato."
61070-323 = "Não sabemos o que aquele adulto pode fazer. Nem que tipo de poder ele possui."
61070-324 = "Nem que tipo de resultado ele pode trazer... é imprevisível. #nAdultos são assim, não são?"
61070-325 = "......É verdade."
61070-326 = "Eles sempre fazem coisas que nem conseguimos imaginar."
61070-328 = "Se-senpai... o que devemos fazer agora...?"
61070-329 = "Por enquanto, vamos nos acalmar. E então..."
61070-330 = "......"
61070-331 = "Vamos sair para dar as 'boas-vindas'."
61070-332 = "Is-isso... é seguro...!?"
61070-333 = "Para ser sincera, nem eu sei dizer se é seguro ou não."
61070-334 = "Mas... não saberemos se não tentarmos, certo? Não é assim?"
61070-335 = "Por enquanto, mantenham as travas de segurança de suas armas ativadas."
61070-336 = "......Por enquanto, ainda não."
61070-337 = "Entendido, Senpai!"
61070-340 = "Próximo episódio: Estilo Arius"
