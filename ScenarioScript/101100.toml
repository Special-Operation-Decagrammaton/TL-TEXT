[translation]
101100-1 = "Episódio 10; Colisão (2)"
101100-4 = "A moção de desconfiança da Rin-senpai foi aprovada...?#nNossa, as coisas não parecem nada calmas por aqui..."
101100-5 = "M-Mas... A Rin-senpai é a Administradora e a Presidente Interina ao mesmo tempo...!#nSe a autoridade da Rin-senpai for suspensa――"
101100-6 = "O Conselho Estudantil Geral ficará paralisado――exatamente como ficou logo após o desaparecimento da Presidente."
101100-7 = "……Não tínhamos escolha para impedir as suas atitudes precipitadas."
101100-8 = "Pelo menos até encontrarmos o Sensei e a Chefe de Defesa, esta é a nossa única opção."
101100-9 = "……。"
101100-10 = "……Discutiremos os detalhes amanhã.#nPretendo convocar todas as chefes."
101100-11 = "Por hoje, por favor, descanse, Rin-senpai.#n――Porque amanhã será um longo dia."
101100-12 = "……。"
101100-13 = "E você aí, não fique só parada com cara de tacho, volte ao trabalho!"
101100-14 = "……S-Sim!"
101100-15 = "V-Vamos logo...!"
101100-21 = "Momoka, Ayumu.#nVocês também devem ir para casa. É uma ordem oficial."
101100-22 = "……M-Mas."
101100-23 = "Uhh…… Err……"
101100-24 = "……Eu vou ficar bem.#nSinto muito por ter envolvido vocês duas nisso."
101100-25 = "Err... E-Então... amanhã eu chego cedo, Senpai...!"
101100-26 = "Haa... Sério, esse clima pesado tá me matando..."
101100-32 = "……Amanhã conversaremos novamente. Aoi."
101100-33 = "……。"
101100-51 = "……!?#nQ-Quem são vocês...!"
101100-57 = "Ora, ora. Tudo ocorreu muito mais rápido do que imaginei.#nE pensar que o Conselho Estudantil Geral estaria tão vazio assim."
101100-58 = "Eu até tinha me preparado para o pior, considerando a possibilidade de topar com aquela \"Raposa\"...#nMas, mesmo que isso acontecesse, o resultado não mudaria."
101100-59 = "Então há apenas uma Administradora aqui."
101100-60 = "……!#nVocês são da... Corporação Kaiser...!?"
101100-61 = "……E logo a Administradora Chefe."
101100-62 = "Ah, não faça resistência inútil.#nAs redes de comunicação e o sistema de alarme já foram desativados."
101100-63 = "……Tsc!"
101100-64 = "A partir de agora, nós da Corporação Kaiser assumiremos#ntoda a autoridade do Conselho Estudantil Geral."
101100-65 = "E quanto à Torre Sanctum?"
101100-66 = "Controle garantido!"
101100-67 = "Muito bem. Conectem-me ao Presidente."
101100-71 = "Ahem. Tudo indo maravilhosamente bem. Já confirmamos as comunicações aqui também.#nMas vai levar um tempinho para tomar todo o controle do sistema."
101100-72 = "Por enquanto, vamos declarar lei marcial em toda D.U.."
101100-73 = "A partir deste momento, todas as comunicações, transportes e logística de e para a D.U. serão suspensos.#nE, simultaneamente, todas as atividades das instituições governamentais serão interrompidas."
101100-74 = "Ninguém de fora vai saber o que está acontecendo aqui em D.U.... E então――"
101100-75 = "O que a Corporação Kaiser está planejando, afinal?"
101100-76 = "Queremos assumir o controle da Torre Sanctum."
101100-77 = "……!"
101100-78 = "……É que botamos as mãos em uma arma superantiga. Então a força da Torre Sanctum se tornou necessária, sabe."
101100-79 = "Com isso, Kivotos ficará sob o domínio da Corporação Kaiser.#nNão de Gematria, nem do Conselho Estudantil Geral... Nós seremos os governantes da cidade acadêmica."
101100-80 = "……!"
101100-82 = "Não acham que foi melhor assim para vocês também?#n\"Cidade corporativa\" tem um som muito melhor do que \"cidade acadêmica\", não acham? Kukuku――"
101100-86 = "[ns] \"A Corporação Kaiser está...\""
101100-87 = "As chefes se dispersaram, o Conselho Estudantil Geral foi efetivamente dissolvido e todo o contato foi perdido...#nAtualmente, ninguém sabe dizer qual é a situação da Torre Sanctum."
101100-88 = "Ugh... Que raiva de não poder entrar em ação em uma situação dessas..."
101100-89 = "Uau... as coisas estão feias..."
101100-90 = "Ei, a porta está aberta!"
101100-91 = "Revistem!"
101100-92 = "Tsc... Os caras da PMC estão vindo pra cá. Temos que nos apressar."
101100-93 = "V-Vamos!"
101100-94 = "……Ugh."
101100-95 = "[ns] \"Kanna, seus machucados...\""
101100-98 = "……Eu fico por aqui, Sensei."
101100-99 = "[ns] \"……!?\""
101100-100 = "M-Mas por que...!"
101100-101 = "Espera aí, o que você tá falando!?"
101100-103 = "Heh... Este lugar não mudou nada... É exatamente como era na época do acampamento de novatas..."
101100-104 = "Naquela época, eu sonhava em ser uma heroína da justiça, mas...#nPelo visto, fui a única que mudou com o tempo."
101100-105 = "Departamento de Segurança Pública... Agradeço pela ajuda."
101100-106 = "Diretora Kanna..."
101100-107 = "E-Espera... Eu odeio esse tipo de clima de despedida."
101100-108 = "Se vocês saírem deste prédio e andarem um pouco, chegarão a uma estação de trem de alta velocidade que leva para fora de D.U..#nÉ perto do \"Parque dos Coelhinhos\", acho que o senhor também conhece... Então depois――"
101100-109 = "――Ah, eu já ia me esquecendo. Aqui, os pertences do senhor que foram confiscados..."
101100-110 = "Um tablet e um celular. Aqui estão."
101100-115 = "[ns] \"A Caixa de Shittim... Como conseguiu isso?\""
101100-116 = "……Coletando informações ultrassecretas dentro da Valkyrie... descobri onde o senhor estava...#ne onde este dispositivo foi guardado..."
101100-117 = "Como o Grupo Kaiser me via apenas como uma policial corrupta trabalhando pra eles... consegui fazer isso sem levantar suspeitas. Fique... com ela..."
101100-118 = "[ns] Pego a Caixa de Shittim."
101100-121 = "Atualmente... a Corporação Kaiser atacou o Conselho Estudantil Geral#ne tomou o controle administrativo da Torre Sanctum..."
101100-122 = "Neste ritmo, esta cidade... cairá num caos sem precedentes..."
101100-123 = "Isso era o máximo que uma policial corrupta, que aceitou essa dura realidade, poderia fazer...#nSe não fossem as lições do senhor... Eu provavelmente teria recuado de novo."
101100-124 = "Sensei. Nem todos da Valkyrie são como eu."
101100-125 = "Ainda deve haver pessoas lutando pela justiça.#nAssim como essas duas..."
101100-126 = "……。"
101100-127 = "……。"
101100-132 = "[ns1] \"Isso não é verdade. Você também é uma excelente policial, Kanna.\"\n[ns2] \"Afinal, você está agindo de acordo com as suas próprias crenças e sem desistir.\""
101100-135 = "……。"
101100-136 = "[s3] \"Além do mais, agora que eu tenho isso aqui, não precisamos mais nos preocupar.\"\n[s4] \"Vai dar tudo certo.\""
101100-139 = "……?"
101100-140 = "Sensei...?"
101100-141 = "Hm? Esse negócio aí é importante?"
101100-146 = "[ns5] \"……Nós ansiamos pelos sete lamentos.\"\n[ns6] \"……Nós recordamos as antigas leis de Jericó.\""
101100-154 = "Sensei!! Uwaaaah!!! "
101100-155 = "Você está bem!? Eu fiquei tão preocupada!#nA energia caiu de repente e eu tomei um susto enorme...!"
101100-156 = "Além disso, as coisas estão muito feias aqui fora...!"
101100-157 = "[s7] \"Sim, eu sei.\"\n[s8] \"Ainda bem que você está a salvo, Arona.\""
101100-160 = "*Sniff*... Sim.#nEu estou bem, Sensei..."
101100-163 = "[ns] \"Certo, vamos retomar o comando.\""
101100-165 = "Próximo episódio; Fuga (1)"