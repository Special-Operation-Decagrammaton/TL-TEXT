[translation]
32110-1 = "Episódio 11; O 2º Exame Especial de Proficiência (2)"
32110-2 = "Distrito Autônomo de Gehenna"
32110-5 = "Bom, até conseguimos entrar, mas..."
32110-6 = "Por mais que seja de madrugada, não tá vazio demais por aqui?"
32110-10 = "...Tiros. Tá rolando uma luta em algum lugar."
32110-11 = "Hum... a gente não tem outra escolha a não ser seguir em frente pra chegar no local... vamos lá, então."
32110-15 = "Aquilo ali... é um posto de controle?"
32110-16 = "Parem aí mesmo! Entrada proibida daqui em diante!"
32110-17 = "Além do mais, a cidade inteira tá sob toque de recolher hoje! Deem o fora daqui, andem――"
32110-18 = "...Esse uniforme, vocês são da Trinity?"
32110-19 = "O que vocês tão fazendo aqui...! O que vieram fazer em Gehenna!? Qual é o objetivo de vocês!?"
32110-20 = "N-Não, veja bem, a gente só quer passar por aqui, é sério...!"
32110-21 = "Como se alunas da Trinity fossem vir pra Gehenna sem nenhum motivo!"
32110-22 = "Mas é a verdade, nós viemos apenas para fazer um exame. Não viemos causar nenhum problema..."
32110-23 = "E desde quando alunas da Trinity vêm pro distrito de Gehenna pra fazer uma prova!?! Se for pra mentir, pelo menos inventem uma desculpa melhor!"
32110-24 = "J-Justo... auuu..."
32110-25 = "...Opa! Você aí, não é do Comitê de Realização da Justiça!?"
32110-31 = "Nossa, é-é verdade! É um ataque! O Comitê de Realização da Justiça veio nos atacar!"
32110-33 = "Informem aos superiores! O Comitê de Realização da Justiça finalmente atacou!!"
32110-35 = "Eeeh!? Não, quer dizer, é-é verdade, mas agora não é bem assim, sabe, uuuuh...!"
32110-36 = "Não tem outro jeito, vamos ter que derrubar elas."
32110-37 = "Eeeh!? Mas isso não vai piorar ainda mais o mal-entendido!?"
32110-43 = "Noaaah!?"
32110-44 = "E-Essas garotas... como eu imaginava..."
32110-48 = "Azusa-chaaaaan!?"
32110-49 = "...Não, eu ainda nem fiz nada. Foi outra pessoa."
32110-50 = "É verdade, isso veio voando lá de trás. Mas afinal, quem será..."
32110-54 = "Ara★ Achei que fosse você mesmo, Sensei!"
32110-55 = "E eu acertei em cheio. Boa noite. O que você está fazendo aqui, Sensei?"
32110-56 = "[s] \"O pessoal da Sociedade de Pesquisa Gastronômica!\""
32110-58 = "U-Ué!? Se não me engano... a gente lutou contra vocês...!"
32110-59 = "Ora, aquelas garotas que atacaram o aquário..."
32110-60 = "H-Hã...? E-Eu não tô entendendo mais nada..."
32110-62 = "...Entendi, já compreendi a situação. Então vocês precisam ir para esse lugar de qualquer forma, certo?"
32110-63 = "[s] \"Sim.\""
32110-64 = "Entendo o motivo, mas vocês chegaram numa péssima hora... essa área está um caos agora."
32110-65 = "Parece que o Departamento de Desenvolvimento de Fontes Termais causou uma explosão KABOOM★ bem no meio do centro comercial, enfim, a situação tá uma bagunça."
32110-66 = "Por causa disso, o Comitê Disciplinar também está correndo pra lá e pra cá... mas foi graças a isso que nós conseguimos escapar da prisão deles. Fufu♪"
32110-67 = "Pois é. E como estamos numa situação de emergência, a Fuuka-san, do Clube de Culinária que acabou passando por lá por um acaso, nos emprestou o carro do clube de bom grado★"
32110-68 = "Nnhh!? Nnh-! Nnhhhh!!"
32110-69 = "Nos emprestar o carro que eles acabaram de comprar... isso sim é uma bela amizade★"
32110-70 = "Nnnh! Nnnh, nnhhhh!!!!"
32110-72 = "...Mas por acaso essa grande amiga não tá amarrada e jogada no porta-malas?"
32110-74 = "Não se preocupe, a Fuuka-san já está acostumada com esse tipo de coisa."
32110-75 = "Já dá até para dizer que ela é uma especialista na área★"
32110-76 = "Haruna, Akari! Onde vocês estão!? A gente conseguiu furar o cerco, dá pra gente se encontrar!?"
32110-77 = "Gyaaaah! O Comitê Disciplinar ainda tá na nossa cola!!"
32110-78 = "Junko-san, operação de fuga cancelada."
32110-79 = "Hã, por quê!?"
32110-80 = "Fufu, considere isso como um agradecimento por aquele dia. Nós faremos questão de levar o Sensei e as alunas da Trinity em segurança."
32110-81 = "É isso aí★ Então, entrem logo!"
32110-82 = "[s] \"Valeu, conto com vocês.\""
32110-84 = "H-Humm... então... conto com vocês...?"
32110-85 = "...É verdade, tá escrito 'Clube de Culinária'. Então, com licença... mas tem certeza que tá tudo bem deixar a garota do Clube de Culinária desse jeito?"
32110-89 = "Segurem-se firme, hein★ Vamos lá!"
32110-91 = "(E cerca de duas horas depois...)"
32110-95 = "Uwaaaaaaah!?"
32110-99 = "O que é isso, o que tá acontecendo!? Como a gente foi parar nessa situação!?"
32110-100 = "Hifumi, não balança! Não consigo mirar direito assim!"
32110-101 = "M-Mas não sou eu que tô balançando! É-É o chão que não para de tremer...!"
32110-105 = "Explodiu de novooo!?"
32110-108 = "Ei, aluna da Trinity, você manda muito bem na moto!"
32110-109 = "Manda ver, vai fundo, você consegue!"
32110-110 = "Não, eu tô no meu limiteee!?"
32110-111 = "Akari-san, o próximo bombardeio vai ser em 8 segundos."
32110-112 = "Deixa comigo, sem problemas★"
32110-117 = "Harunaaa! Larga esse carro e deixa a gente descer――!?"
32110-118 = "A Fuuka-san também está torcendo por nós, acho que podemos caprichar um pouco mais, não acham?"
32110-119 = "Verdade. Vamos transformar essa torcida em poder★ E em velocidade também♪"
32110-125 = "Tem até escavadeira e trator vindo pra cá!? Por quê!?"
32110-126 = "P-Por que até o Departamento de Desenvolvimento de Fontes Termais da Gehenna tá atrás da gente!?"
32110-127 = "Ferrou, o Comitê Disciplinar também chegou!"
32110-128 = "Aqui é o Time Bravo. Time Alfa, na escuta."
32110-129 = "A-Azusa-chan!?"
32110-130 = "Se você fala o nome, não tem por que eu usar código... mas de qualquer forma, desculpa. A distração falhou e nós estamos cercadas."
32110-131 = "Hã!?"
32110-132 = "Na nossa frente tem o Departamento de Desenvolvimento de Fontes Termais com lança-chamas, e atrás tem a membra do Comitê Disciplinar de rabo de cavalo que é bizarramente forte. Nossa rota de fuga foi cortada."
32110-133 = "Eu e a Hanako vamos dar um jeito de escapar por conta própria, depois a gente se encontra. Boa sorte."
32110-134 = "(Bip)"
32110-135 = "Azusa-chaaaaahn!?"
32110-136 = "N-Nós só viemos aqui pra fazer uma prova..."
32110-137 = "Por que isso tá acontecendo com a genteee!? Uwaaaaah!"
32110-150 = "A-Auuu..."
32110-151 = "O-O local da prova é aqui...?"
32110-152 = "[s] \"Ainda bem que vocês duas tão inteiras.\""
32110-153 = "Ah, Sensei!!"
32110-154 = "S-Sensei, você tá bem... Na correria de tentar se salvar, a gente acabou se perdendo, né..."
32110-155 = "Graças a Deus... quando o carro do Clube de Culinária mergulhou no rio, achei que fosse o nosso fim..."
32110-156 = "[s] \"A Haruna afundou fazendo um joia, espero que ela esteja bem...\""
32110-157 = "A-As duas, a Azusa e a Hanako!?"
32110-158 = "Desculpem a demora♡"
32110-162 = "2 e 45... Chegamos antes de começar, ufa. Mas eu tô quebrada."
32110-164 = "Ehh..."
32110-165 = "Q-O que foi que rolou com vocês...?"
32110-166 = "[s] (Achei melhor não perguntar detalhes agora.)"
32110-168 = "O lugar da prova é... aqui?"
32110-169 = "Rua 77 da Área 15, no Distrito Autônomo de Gehenna. 1º andar da ruína... É, o endereço bate. É esse prédio aqui."
32110-170 = "M-Mas por que um exame num lugar desses... Ah, e como a gente vai receber as provas? Tem alguém aqui...?"
32110-171 = "Não, não parece ter ninguém. Mas eles devem ter deixado alguma coisa pra gente."
32110-179 = "...Achei."
32110-180 = "Isso é... uma bomba que não explodiu?"
32110-181 = "É a ogiva de um obus rebocado L118. Devem usar pra espalhar panfletos ou algo assim, tiraram o detonador e o explosivo pra não explodir."
32110-182 = "Entendi. Se é um L118, quer dizer que é da Tea Party... ou seja, foi a Nagisa-san que mandou."
32110-183 = "Deve ter algo aqui dentro."
32110-184 = "Vamos abrir."
32110-188 = "(Clack)"
32110-189 = "Ah, tem uns papéis dentro... essas devem ser as provas!"
32110-190 = "Não parecem ter nenhum defeito. E isso aqui... é um rádio de comunicação."
32110-191 = "...Se estão vendo isso, significa que chegaram em segurança."
32110-192 = "N-Nagisa-sama!?"
32110-193 = "......"
32110-194 = "Hã? Então essa aí é a... da Tea Party?"
32110-195 = "[s] \"Nagisa...!\""
32110-196 = "Fufu... consigo ouvir as vozes de ressentimento daqui. Mas essa é uma mensagem gravada, não estou ouvindo vocês em tempo real. Portanto, é inútil tentar falar comigo."
32110-197 = "[s] \"......\""
32110-198 = "Bem, peço que concluam a prova antes do horário estipulado e retornem."
32110-199 = "Ah, só para constar, eu continuo monitorando vocês, não se esqueçam disso... Desejo boa sorte a todas do 'Clube de Reposição'."
32110-200 = "Espero que tenham uma boa viagem de volta."
32110-202 = "(Bip)"
32110-203 = "Auuu..."
32110-204 = "Foi impressão minha ou ela falou isso de um jeito meio... maldoso?"
32110-205 = "Enfim, não temos tempo a perder. Vamos começar."
32110-206 = "S-Sim! Vamos entrar, pessoal. Finalmente chegou a hora do 2º Exame Especial de Proficiência!"
32110-207 = "Isso aí."
32110-208 = "S-Sim!"
32110-209 = "[s] \"Vamos lá, pessoal, força!\""
32110-215 = "Então, é esse o lugar de que falaram?"
32110-216 = "Aham, o endereço é esse mesmo. Acho que é daqui até lá na frente."
32110-217 = "Hehe. Não sei quem deu a dica, mas foi muita gentileza avisar onde teria uma fonte termal escondida."
32110-218 = "Muito bem, preparar explosivos!"
32110-220 = "Hora de desenvolver a áreeeeaaa!!!!"
32110-226 = "Resultados do 2º Exame Especial de Proficiência――"
32110-228 = "Hanako: [FF6666]Prova perdida (Reprovada)[-]"
32110-230 = "Azusa: [FF6666]Prova perdida (Reprovada)[-]"
32110-232 = "Koharu: [FF6666]Prova perdida (Reprovada)[-]"
32110-234 = "Hifumi: [FF6666]Prova perdida (Reprovada)[-]"
32110-236 = "Nossa prova, a nossa provaaaa...!?"
32110-237 = "Voou pelos ares sem deixar nem rastro..."
32110-238 = "S-Sensei, você tá legal..."
32110-239 = "[ns] \"Eu tô de boa...\""
32110-240 = "Entendo, entendo, então é assim que vocês vão jogar... A coisa ficou interessante agora. Fufufu...♡"
32110-242 = "Clube de Reposição, 2º Exame Especial de Proficiência: Todas reprovadas!"
32110-246 = "Próximo Episódio; De Volta à Estaca Zero"