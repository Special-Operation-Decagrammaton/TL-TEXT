[translation]
32110-1 = "Episódio 11; 2º Exame Acadêmico Especial (2)"
32110-2 = "Distrito Autônomo de Gehenna"
32110-5 = "Bem, conseguimos entrar de alguma forma, mas..."
32110-6 = "Mesmo sendo no meio da noite, não está deserto demais?"
32110-10 = "...Tiros. Está acontecendo um combate em algum lugar."
32110-11 = "Hmm, para chegar ao nosso destino, só temos que seguir em frente... então, vamos indo por enquanto."
32110-15 = "Aquilo é um posto de controle...?"
32110-16 = "Parem! A partir daqui, a entrada é proibida!"
32110-17 = "Para começar, hoje foi decretado um toque de recolher em toda a cidade! Voltem logo—"
32110-18 = "...Esse uniforme, é da Trinity?"
32110-19 = "Por que vocês estão aqui...! O que vieram fazer em Gehenna? Qual é o objetivo de vocês?!"
32110-20 = "N-não, é que, nós só queremos passar por aqui mesmo...!"
32110-21 = "Como se a Trinity viesse a Gehenna sem nenhum objetivo!"
32110-22 = "Mas nós realmente só viemos para fazer um exame. Não viemos para causar problemas..."
32110-23 = "Por que uma aluna da Trinity viria ao distrito de Gehenna para fazer um exame?! Pelo menos invente uma mentira mais convincente!"
32110-24 = "I-isso é um argumento lógico... Auu..."
32110-25 = "...! Ei, você aí, não é do Comitê de Justiça?!"
32110-31 = "O quê, é-é verdade! Ataque! O Comitê de Justiça veio nos atacar!"
32110-33 = "Relatem ao alto escalão! O Comitê de Justiça finalmente chegou!!"
32110-35 = "Hã!? Não, é, b-bem, é verdade, mas agora é diferente, tipo, ugh...!"
32110-36 = "Não tem jeito, vamos derrotá-los."
32110-37 = "Hã!? Isso não vai piorar o mal-entendido!?"
32110-43 = "Noaaaah!?"
32110-44 = "E-esses caras, como esperado..."
32110-48 = "Azusa-chaaaan!?"
32110-49 = "...Não, eu ainda não fiz nada. Foi outra pessoa além de mim."
32110-50 = "É verdade, o que acabou de passar veio de muito longe atrás de nós. Mas, quem será..."
32110-54 = "Ora, ora★ Era o Sensei mesmo!"
32110-55 = "Que sorte a nossa. Como vai? O que está fazendo aqui, Sensei?"
32110-56 = "[s] \"Pessoal do Clube de Pesquisa Gourmet!\""
32110-58 = "A-ah, espera!? Se não me engano, lutamos contra elas outro dia...!?"
32110-59 = "Ora, aquelas que atacaram o aquário..."
32110-60 = "E-eu não sei... E-eu não entendo mais nada..."
32110-62 = "...Entendo, compreendi a situação em geral. De qualquer forma, vocês precisam ir para este lugar, certo?"
32110-63 = "[s] \"Sim.\""
32110-64 = "Entendi a situação, mas o momento é péssimo... Esta área está passando por uma confusão e tanto agora."
32110-65 = "Dizem que o Departamento de Desenvolvimento de Fontes Termais explodiu o centro da cidade com um estrondo★, está um caos total."
32110-66 = "Por causa disso, o Comitê Disciplinar está agindo às pressas... Bem, graças a isso, aproveitamos a chance para escapar da cela do Comitê Disciplinar. Fufu♪"
32110-67 = "Exatamente. E como é uma situação de emergência, a Fuuka, do Clube de Merenda, que estava no lugar por acaso, gentilmente nos emprestou o carro do clube★"
32110-68 = "Nnnn!? Nnn-! Nnnn-!!"
32110-69 = "Emprestar um carro que acabou de comprar... Isso sim é uma bela amizade★"
32110-70 = "Nnnn! Nnn, nnnnnn!!!!"
32110-72 = "...A pessoa dessa amizade não está amarrada dentro do porta-malas?"
32110-74 = "Não há problema, a Fuuka já está acostumada com esse tipo de coisa."
32110-75 = "Não seria exagero dizer que ela já é uma especialista★"
32110-76 = "Haruna, Akari! Onde vocês estão!? Nós também rompemos o cerco, dá para nos encontrarmos!?"
32110-77 = "Kyaaaa! O Comitê Disciplinar ainda está nos perseguindo!!"
32110-78 = "Junko-san, a operação de fuga foi cancelada."
32110-79 = "Hã, por quê!?"
32110-80 = "Fufu, considerem isso um agradecimento pelo que aconteceu naquela época. Nós cuidaremos de guiar o Sensei e o pessoal da Trinity."
32110-81 = "Entendido★ Então, de qualquer forma, suba logo!"
32110-82 = "[s] \"Obrigado, conto com você.\""
32110-84 = "E-eh, bem... então, conto com você...?"
32110-85 = "……É verdade, está escrito 'Departamento de Merenda'. Bem, com licença, mas... você do Departamento de Merenda, tem certeza de que está tudo bem assim?"
32110-89 = "Por favor, segure-se firme★ Vamos partir!"
32110-91 = "（E cerca de 2 horas depois...）"
32110-95 = "Waaaaaaah!?"
32110-99 = "O que é isso, o que está acontecendo!? Por que diabos chegamos a esse ponto!?"
32110-100 = "Hifumi, não balance! Eu não consigo mirar assim!"
32110-101 = "N-não sou eu que estou balançando! O, o chão não para de tremer desde agora...!"
32110-105 = "Explodiu de novo!?"
32110-108 = "Você da Trinity, dirige muito bem!"
32110-109 = "Isso aí, isso aí, força!"
32110-110 = "Mas eu estou no meu limite aqui!?"
32110-111 = "Akari-san, outro bombardeio virá em 8 segundos."
32110-112 = "Sim, sem problemas★"
32110-117 = "Haruna! Esquece o carro, me deixa descer――!?"
32110-118 = "Fuuka-san também está nos apoiando assim, então vamos fazer algo um pouco mais chamativo."
32110-119 = "Concordo, vamos transformar o apoio em força★ E em velocidade♪"
32110-125 = "Até escavadeiras e tratores apareceram!? Por quê!?"
32110-126 = "P-por que estamos sendo perseguidas até pelo Departamento de Desenvolvimento de Fontes Termais de Gehenna!?"
32110-127 = "Droga, o Comitê Disciplinar também chegou!"
32110-128 = "Aqui é a Equipe Bravo. Equipe Alpha, responda."
32110-129 = "A-Azusa-chan!?"
32110-130 = "Dizer meu nome derrota o propósito de usar um código... De qualquer forma, desculpe. A operação de distração falhou, estamos cercadas aqui."
32110-131 = "Sério!?"
32110-132 = "À frente, o Departamento de Desenvolvimento de Fontes Termais com lança-chamas, e atrás, uma integrante do Comitê Disciplinar de maria-chiquinha estranhamente forte. Nossa rota de fuga foi bloqueada."
32110-133 = "Hanako e eu daremos um jeito de escapar sozinhas, nos encontramos depois. Boa sorte."
32110-134 = "（Bip）"
32110-135 = "Azusa-chaaaaaan!?"
32110-136 = "N-nós só viemos aqui para fazer o exame..."
32110-137 = "Por que as coisas chegaram a esse ponto!? Waaaaaaah!"
32110-150 = "A-auuu..."
32110-151 = "O, o local do exame é aqui...?"
32110-152 = "[s] \"Fico feliz que as duas estejam bem.\""
32110-153 = "Ah, Sensei!!"
32110-154 = "S-Sensei, você está bem...? Enquanto tentávamos desesperadamente escapar, acabamos nos perdendo de você..."
32110-155 = "Que bom... Quando o carro do Departamento de Merenda mergulhou no rio, pensei que era o fim..."
32110-156 = "[s] \"A Haruna estava afundando fazendo um sinal de positivo, será que ela está bem...\""
32110-157 = "E a Azusa e a Hanako!?"
32110-158 = "Desculpem a demora♡"
32110-162 = "Duas e quarenta e cinco... Conseguimos chegar antes do horário de início. Estou exausta."
32110-164 = "Bem..."
32110-165 = "O, o que aconteceu com vocês..."
32110-166 = "[s] （Decidi não perguntar detalhes por enquanto.）"
32110-168 = "O local do exame é aqui...?"
32110-169 = "Distrito de Gehenna, Área 15, Rua 77, primeiro andar das ruínas... Sim, é aqui. É este prédio."
32110-170 = "P-por que fazer um exame em um lugar desses... Ah, o que será das folhas de prova? Será que alguém virá...?"
32110-171 = "Não, não parece ter ninguém. Mas eles devem ter preparado algum meio."
32110-179 = "……É isto."
32110-180 = "Isto é... uma bomba não detonada?"
32110-181 = "É uma ogiva de obus rebocado L118. Provavelmente usada para dispersar panfletos ou algo do tipo; o detonador e o explosivo foram removidos para que não exploda."
32110-182 = "Entendo. Se é um L118, então é do Chá... ou seja, da Nagisa-san."
32110-183 = "Deve haver algo aqui dentro."
32110-184 = "Vamos abrir."
32110-188 = "(Clique)"
32110-189 = "Ah, tem um papel aqui dentro... então esta é a folha de prova!"
32110-190 = "Não parece estar danificada. E isto aqui é... um comunicador?"
32110-191 = "...Se você está vendo isto, significa que chegou em segurança."
32110-192 = "Na-Nagisa-sama!?"
32110-193 = "..."
32110-194 = "Ei, então essa pessoa é do Chá...?"
32110-195 = "[s] \"Nagisa...!\""
32110-196 = "Fufu... consigo ouvir vozes de ressentimento. Bem, como esta é uma gravação, não consigo ouvir em tempo real. Portanto, não adianta falar comigo agora."
32110-197 = "[s] \"...\""
32110-198 = "Então, por favor, termine o exame antes do tempo estipulado e retorne."
32110-199 = "Continuarei monitorando vocês, não se esqueçam disso... Bem, desejo-lhes boa sorte, pessoal do \"Clube de Reforço Escolar\"."
32110-200 = "Por favor, tomem cuidado."
32110-202 = "(Bip)"
32110-203 = "Auu..."
32110-204 = "Aquele final soou um pouco suspeito, não acham...?"
32110-205 = "De qualquer forma, não temos tempo. Vamos começar logo."
32110-206 = "Si-sim! Pessoal, vamos entrar, é hora do 2º Exame Acadêmico Especial!"
32110-207 = "É verdade."
32110-208 = "U-uhum!"
32110-209 = "[s] \"Certo, vamos dar o nosso melhor!\""
32110-215 = "Então, é aqui o tal lugar?"
32110-216 = "Sim, o endereço parece bater. Deve ser daqui até ali adiante."
32110-217 = "Hehe. Não sei de onde veio essa informação, mas é muito gentil da parte deles nos dizer onde provavelmente há uma fonte termal."
32110-218 = "Muito bem, preparar para a detonação!"
32110-220 = "Hora do desenvolvimento!!!!"
32110-226 = "Resultados do 2º Exame Acadêmico Especial—"
32110-228 = "Hanako: [FF6666]Folha de prova perdida (Reprovada)[-]"
32110-230 = "Azusa: [FF6666]Folha de prova perdida (Reprovada)[-]"
32110-232 = "Koharu: [FF6666]Folha de prova perdida (Reprovada)[-]"
32110-234 = "Hifumi: [FF6666]Folha de prova perdida (Reprovada)[-]"
32110-236 = "A folha de prova, a folha de prova...!?"
32110-237 = "Foi pelos ares sem deixar rastros..."
32110-238 = "Se-Sensei, você está bem...?"
32110-239 = "[ns] \"Estou bem por aqui...\""
32110-240 = "Entendo, entendo, então é assim que vocês jogam... Isso está ficando interessante. Fufufu... ♡"
32110-242 = "Clube de Reforço Escolar, 2º Exame Acadêmico Especial — Todos reprovados!"
32110-246 = "Próximo episódio: De volta ao ponto de partida"
