[translation]
32110-1 = "Episódio 11;2º Exame Especial de Aptidão (2)"
32110-2 = "Distrito autônomo de Gehenna"
32110-5 = "Deixa ver, com esforço a gente conseguiu entrar, mas……."
32110-6 = "Por mais que seja madrugada, não tá vazio demais?"
32110-10 = "……Tiro. Tem combate acontecendo em algum lugar."
32110-11 = "Hmm, pra chegar ao destino, só seguindo em frente…… por ora, vamos indo."
32110-15 = "Aquilo é um checkpoint……?"
32110-16 = "Parem! Daqui pra frente é área proibida!"
32110-17 = "Aliás, hoje foi decretado toque de recolher na cidade inteira! Voltem logo――"
32110-18 = "……Esse uniforme, Trinity?"
32110-19 = "Por que estão aqui……! O que vieram fazer em Gehenna! Qual o objetivo!"
32110-20 = "N-não, é que, a gente de verdade só quer passar por aqui……!"
32110-21 = "Sem objetivo nenhum, Trinity não viria a Gehenna!"
32110-22 = "Mas a gente de verdade só veio fazer uma prova. Não veio pra causar problema……."
32110-23 = "Um aluno de Trinity vir pro distrito autônomo de Gehenna pra fazer prova!! No mínimo, inventem uma mentira mais decente!"
32110-24 = "A-argumento válido…… auu……."
32110-25 = "……! Você aí, não é do Comitê de Realização da Justiça!?"
32110-31 = "Q-é verdade! Ataque! O Comitê de Realização da Justiça veio atacar!"
32110-33 = "Reportem à cúpula! O Comitê de Realização da Justiça enfim chegou!!"
32110-35 = "Hãã!? Não, é que, é-é isso, mas agora é diferente, digamos, uu……!"
32110-36 = "Não tem jeito, vamos derrotá-los."
32110-37 = "Hãã!? Isso não aprofunda o mal-entendido!?"
32110-43 = "Noaaah!?"
32110-44 = "E-esses aí, como eu imaginava……."
32110-48 = "Azusaaa!?"
32110-49 = "……Não, eu ainda não ataquei. Foi outra pessoa, não eu."
32110-50 = "Pois é, aquilo agora veio lá de trás da gente, bem longe. Mas quem, afinal……."
32110-54 = "Ora★ Era o Sensei mesmo!"
32110-55 = "Acertei em cheio. Passar bem. O que você tá fazendo aqui, Sensei?"
32110-56 = "[s] \"Pessoal do Clube de Pesquisa Gastronômica!\""
32110-58 = "U-ué!? Essas não são as que a gente enfrentou outro dia……!?"
32110-59 = "Ora, aquelas que atacaram o aquário……."
32110-60 = "É-é que……? Já não entendo mais nada……."
32110-62 = "……Sei, compreendi a situação no geral. Enfim, vocês precisam ir até este lugar, é?"
32110-63 = "[s] \"Sim.\""
32110-64 = "Entendi a situação, mas o timing foi ruim…… esta região, agora, tá numa confusão e tanto."
32110-65 = "O Clube de Desenvolvimento de Termas explodiu★ bem no meio da área urbana, e tá tudo um caos."
32110-66 = "Por causa disso, o Comitê Disciplinar também tá numa correria…… bom, graças a isso, aproveitando a brecha, a gente também conseguiu escapar da cela do Comitê Disciplinar. Ufu♪"
32110-67 = "Pois é. E, como é uma emergência, mais uma vez a Fuuka, do Clube de Merenda, que por acaso estava no local, de bom grado nos emprestou o carro do clube★"
32110-68 = "Nnh!? Nnh! Nnnnh!!"
32110-69 = "Emprestar um carro recém-comprado…… isto é o que se chama de bela amizade★"
32110-70 = "Nnh! Nnh, nnnnnh!!!!"
32110-72 = "……Essa amiga da amizade não tá amarrada e jogada no porta-malas?"
32110-74 = "Sem problema; a Fuuka já tá acostumada com esse tipo de coisa."
32110-75 = "Já dá pra dizer que é especialista, sem exagero★"
32110-76 = "Haruna, Akari! Onde vocês tão agora!? A gente aqui também rompeu o cerco; dá pra se encontrar!?"
32110-77 = "Aaaah! O Comitê Disciplinar ainda tá vindo atrás!!"
32110-78 = "Junko, a operação de fuga tá cancelada."
32110-79 = "Hã, por quê!?"
32110-80 = "Ufu, é pra retribuir aquela vez. Do Sensei e do pessoal de Trinity, a gente cuida com toda a responsabilidade e leva vocês."
32110-81 = "Isso★ Então, enfim, entrem logo!"
32110-82 = "[s] \"Obrigado, conto com vocês.\""
32110-84 = "É-é que…… então, contamos com vocês……?"
32110-85 = "……É verdade, tá escrito \"merenda\". Então, com licença, mas…… você, do Clube de Merenda, tá bem mesmo desse jeito?"
32110-89 = "Segurem firme★ Vamos partir!"
32110-91 = "(E, cerca de 2 horas depois……)"
32110-95 = "Uwaaaaah!?"
32110-99 = "Que é isso, que é isso!? Por que é que a gente foi parar nisso!?"
32110-100 = "Hifumi, não balança! Não consigo mirar!"
32110-101 = "N-não sou eu que tô balançando! O-o chão tá tremendo sem parar faz um tempo……!"
32110-105 = "Explodiu de novo!?"
32110-108 = "Você, de Trinity, pilota moto muito bem!"
32110-109 = "Isso aí, isso aí, força!"
32110-110 = "Não, tô no meu limite!?"
32110-111 = "Akari, daqui a 8 segundos vem outro bombardeio."
32110-112 = "Sim, sem problema★"
32110-117 = "Harunaa! Chega de carro, deixa eu descer――!?"
32110-118 = "A Fuuka também tá torcendo assim, então vamos apimentar um pouco mais?"
32110-119 = "Pois é, a torcida como força★ E como velocidade♪"
32110-125 = "Até escavadeira e trator tão vindo!? Por quê!?"
32110-126 = "P-por que é que a gente tá sendo perseguida até pelo Clube de Desenvolvimento de Termas de Gehenna!?"
32110-127 = "Perigo, o Comitê Disciplinar também chegou!"
32110-128 = "Aqui é a Equipe Bravo. Equipe Alfa, responda."
32110-129 = "A-Azusa!?"
32110-130 = "Falando o nome, perde o sentido de usar código…… mas, deixando isso, desculpa. A operação de diversão falhou; aqui a gente tá cercada."
32110-131 = "Hãã!?"
32110-132 = "Na frente, o Clube de Desenvolvimento de Termas com lança-chamas; atrás, uma disciplinar de maria-chiquinha absurdamente forte. A rota de fuga foi bloqueada."
32110-133 = "Eu e a Hanako vamos dar um jeito de fugir por conta própria; a gente se encontra depois. Boa sorte."
32110-134 = "(bip)"
32110-135 = "Azusaaa!?"
32110-136 = "A-a gente, no fim, só veio fazer uma prova……."
32110-137 = "Por que é que a gente foi parar nisso!? Buááá!"
32110-150 = "A-auu……."
32110-151 = "O-o local da prova é aqui……?"
32110-152 = "[s] \"Que bom que vocês duas estão bem.\""
32110-153 = "Ah, Sensei!!"
32110-154 = "S-Sensei, o senhor está bem…… no meio do desespero, a gente acabou se separando sem perceber……."
32110-155 = "Que bom…… quando o carro do Clube de Merenda mergulhou no rio, eu achei que fosse o fim……."
32110-156 = "[s] \"A Haruna afundou fazendo joia com o polegar; será que ela tá bem……\""
32110-157 = "E-e a Azusa e a Hanako!?"
32110-158 = "Desculpem a demora♡"
32110-162 = "2h45…… com esforço, cheguei antes do horário de início. Cansei, confesso."
32110-164 = "Deixa ver……."
32110-165 = "E-e do lado de vocês, o que aconteceu……."
32110-166 = "[s] （Por ora, decidiu não perguntar a fundo.）"
32110-168 = "O lugar da prova é aqui……?"
32110-169 = "Distrito autônomo de Gehenna, Área 15, Rua 77, 1º andar de um prédio abandonado…… sim, é aqui. É este prédio."
32110-170 = "P-por que fazer prova num lugar desses…… ah, e as folhas de prova, como fica; será que tem alguém aqui……?"
32110-171 = "Não, parece não ter ninguém. Mas, de algum jeito, deve ter um meio preparado."
32110-179 = "……É isto."
32110-180 = "Isto é…… uma munição não detonada?"
32110-181 = "É a ogiva de um obus rebocado L118. Deve ser dessas de espalhar panfleto de slogan; tiraram a espoleta e o explosivo pra não detonar."
32110-182 = "Sei. Sendo L118, é do Tea Party…… ou seja, é da Nagisa."
32110-183 = "Deve ter alguma coisa aqui dentro."
32110-184 = "Vamos abrir."
32110-188 = "(clique)"
32110-189 = "Ah, tem um papel dentro…… é a folha de prova, então!"
32110-190 = "Não vejo nenhum dano. E isto…… é um rádio."
32110-191 = "……Se estão vendo isto, é porque chegaram em segurança, né."
32110-192 = "N-Nagisa!?"
32110-193 = "……."
32110-194 = "Hã, então esta pessoa é a do Tea Party……?"
32110-195 = "[s] \"Nagisa……!\""
32110-196 = "Ufu…… dá pra ouvir a voz do rancor. Bom, isto é uma gravação, então em tempo real eu não escuto. Por isso, falar comigo agora é inútil."
32110-197 = "[s] \"……\""
32110-198 = "Então, terminem a prova dentro do horário combinado e voltem, viu."
32110-199 = "De todo modo, continuo monitorando, então não se esqueçam disso…… então, boa sorte, pessoal do \"Clube de Aulas de Reforço\"."
32110-200 = "POR FAVOR, TOMEM MUITO CUIDADO."
32110-202 = "(bip)"
32110-203 = "Auu……."
32110-204 = "Sei lá, no fim, foi um jeito de falar meio cheio de segundas intenções, né……?"
32110-205 = "Enfim, não tem tempo, vamos começar logo."
32110-206 = "S-sim! Pessoal, vamos entrar; enfim, é o 2º Exame Especial de Aptidão!"
32110-207 = "Pois é."
32110-208 = "S-sim!"
32110-209 = "[s] \"Muito bem, vamos nessa!\""
32110-215 = "E aí, é aqui o tal lugar?"
32110-216 = "Sim, pelo endereço parece que é. Daqui até lá pra frente, tudo, acho."
32110-217 = "Hehe. Não sei bem de onde veio a informação, mas que gentileza nos avisar um lugar que parece ter termas."
32110-218 = "Muito be~m, preparar a detonação!"
32110-220 = "Desenvolvimentooo!!!!"
32110-226 = "2º Exame Especial de Aptidão, resultado――"
32110-228 = "Hanako―[FF6666]Folha de prova perdida (Reprovada)[-]"
32110-230 = "Azusa―[FF6666]Folha de prova perdida (Reprovada)[-]"
32110-232 = "Koharu―[FF6666]Folha de prova perdida (Reprovada)[-]"
32110-234 = "Hifumi―[FF6666]Folha de prova perdida (Reprovada)[-]"
32110-236 = "A folha de prova, a folha de prova……!?"
32110-237 = "Foi pelos ares sem deixar vestígio……."
32110-238 = "S-Sensei, o senhor está bem……."
32110-239 = "[ns] \"Aqui tá tudo bem……\""
32110-240 = "Sei, sei, então é pra ir a esse ponto…… tá ficando interessante, não é? Ufufu……♡"
32110-242 = "Clube de Aulas de Reforço, 2º Exame Especial de Aptidão – todas reprovadas!"
32110-246 = "Próximo Episódio;De Volta ao Ponto de Partida"
