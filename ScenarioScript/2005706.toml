[translation]
2005706-1 = "最高のお掃除方法"
2005706-3 = "それで、設置しておいたブロック型爆薬が――"
2005706-4 = "[s] \"えっと……それはいつ設置したの……？\""
2005706-5 = "もちろん、作戦に突入した際に。"
2005706-6 = "[s1] （最初から爆破する気満々だったんだ）\n[s2] （と返すのは流石に……）"
2005706-9 = "「お掃除」自体は問題なく進められたのですが……。"
2005706-10 = "どうしても、事後処理の費用が嵩むと怒られてしまって……。"
2005706-11 = "部長はそんなこと気にしなくていいと仰るのですが、いつまでもこのままではいられません。"
2005706-12 = "私自身も、パターンが固定化するのは望ましくありません。"
2005706-13 = "それに、「お掃除魔」だと思われたくもないですし……。"
2005706-14 = "[s] （一応、自覚はあったんだ……）"
2005706-15 = "一体どうすれば良いのでしょう……。"
2005706-16 = "私としても、平和的解決を望む気持ちはあるのですが……。"
2005706-26 = "ひゃぁ！？な、なんだ一体！？"
2005706-28 = "ブラックマーケットの近くだって分かっていたのに――"
2005706-29 = "うう……早く帰りたい。誰か助けてくれー！"
2005706-31 = "うるせえぞ！騒いでるのはどいつだ！"
2005706-32 = "静かにしねえと、新作ライフル弾の――"
2005706-33 = "死ぬまで脇腹と足の裏がくすぐったくなる、「こちょこちょ弾」をぶっ放すぞ！"
2005706-37 = "ひえええ……それだけは勘弁してくれ～！"
2005706-38 = "あの……先生……？"
2005706-39 = "[s] \"どうしてこんなことに……。\""
2005706-40 = "申し訳ありません……。#n私が不甲斐ないばかりに……。"
2005706-41 = "[s] \"このままだと、大勢の市民が巻き込まれてしまう……。\""
2005706-45 = "そこまでだ！お前たちは既に包囲されている！#nそこにいる人たちを早く解放しなさい！"
2005706-48 = "どうしましょう、ボス？"
2005706-49 = "ここまで来て白旗を上げるなんて、できるか！我々はやり遂げる！#nそれしか道はない！"
2005706-50 = "ってなわけだからヴァルキューレのお巡りさんよぉ！#nこっちの要求を飲まねえと、ここにいる奴らの安全は保障できないぞ！"
2005706-55 = "先生……。"
2005706-56 = "[s3] \"アカネ――\"\n[s4] \"今こそ、C&Cの出番だよ！\""
2005706-59 = "はい。"
2005706-60 = "……。"
2005706-61 = "今こそ、新しいやり方を試す時、ですね。"
2005706-66 = "あの……。"
2005706-67 = "あ？誰だお前？"
2005706-68 = "ヴァルキューレの方々と、まずは一度話し合ってみてはいかがでしょうか？"
2005706-69 = "言葉を交わせば、何か良い着地点を見つけられるのではないかと。"
2005706-70 = "は？何いってんだ？"
2005706-71 = "「テロリストとは交渉しません」って、あいつらが掲げてるの知らねぇのか？"
2005706-72 = "こっちだって同じだ！サツなんかと交渉してたまるか！いつ裏切られるか分かったもんじゃない！"
2005706-74 = "部外者はすっ込んでろ！"
2005706-75 = "あら……。"
2005706-76 = "[s] （そう甘くはないか……）"
2005706-79 = "私、ヴァルキューレ側にツテがありまして。#nいかがでしょう？私が連絡いたしましょうか？"
2005706-80 = "もしかしたら、円満に解決できるかもしれません。"
2005706-81 = "はぁ？信用できるわけないだろう。"
2005706-82 = "一目見れば分かるとも。君の顔にそう書いてある。"
2005706-83 = "……なるほど。 "
2005706-84 = "[s] （アカネの顔が……！？）"
2005706-88 = "でしたら、情状酌量を求めてみては？#n事情を伝えればあるいは――"
2005706-89 = "今さら引き下がれるわけねぇだろ！"
2005706-90 = "何も知らねえ民間人のくせに！"
2005706-94 = "[ns] （アカネが本気になったら、そんなこと言ってられないような……）"
2005706-97 = "ヴァルキューレの方々も、円満解決を望まれているかと。その方が双方にとって良いと思うのですが……。"
2005706-98 = "[ruby=・]取[/ruby][ruby=・]引[/ruby]を――"
2005706-99 = "ふざけないでくれるか！"
2005706-100 = "連中が我々に屈服しない限り、円満解決など望むべくもないだろう！"
2005706-101 = "ブラックマーケットは我々の管轄。ヴァルキューレを歓迎する者など一人もいないのだよ！"
2005706-102 = "ああ、いや？君がその一味か？"
2005706-103 = "ふふ……うふふ……。"
2005706-104 = "[s] （どうなっても知らない……）"
2005706-111 = "もう夜になってしまいましたね、先生。"
2005706-112 = "[s] \"そうだね。\""
2005706-113 = "明日は学園に行かなければなりませんし、復習もまだ終わっていません……。"
2005706-114 = "[s] \"そうだね。勉強が本分だし。\""
2005706-115 = "先生も明日の準備がありますよね……。"
2005706-116 = "いかがしましょう……？"
2005706-117 = "[s] \"アカネ。\""
2005706-118 = "はい、先生。"
2005706-119 = "[s] \"行っていいよ。\""
2005706-120 = "え？"
2005706-124 = "……。"
2005706-125 = "よろしいのですか？"
2005706-126 = "[s5] \"あれこれ試してダメなら……。\"\n[s6] \"諦めも肝心っていうからね。\""
2005706-129 = "かしこまりました。"
2005706-130 = "[ruby=・]ご[/ruby][ruby=・]主[/ruby][ruby=・]人[/ruby][ruby=・]様[/ruby]。"
2005706-150 = "うわああああっ！？！？！？"
2005706-151 = "何だ、こりゃ！一体何が起きて――！！！"
2005706-157 = "に、逃げろ！あいつ、いかれちまった！！！"
2005706-161 = "待ってくれ！ひいぃぃぃっ！！！"
2005706-168 = "ヴァルキューレ！た、頼む！助けてくれ！無条件降伏する！"
2005706-169 = "だから我々をあいつから守ってください！！！"
2005706-175 = "ふう。"
2005706-176 = "やはり、爆弾こそ――最高の「お掃除」方法、ですね。"
