[translation]
2005706-1 = "O melhor método de limpeza"
2005706-3 = "Então, o explosivo em bloco que eu instalei..."
2005706-4 = "[s] \"Espera... quando foi que você instalou isso...?\""
2005706-5 = "Claro, no momento em que iniciamos a operação."
2005706-6 = "[s1] (Ela estava planejando explodir tudo desde o início)\n[s2] (Responder isso seria um pouco demais...)"
2005706-9 = "A \"limpeza\" em si ocorreu sem problemas, mas..."
2005706-10 = "Sempre acabam me dando uma bronca por causa dos custos excessivos do pós-processamento..."
2005706-11 = "A chefe diz que não preciso me preocupar com isso, mas não posso continuar assim para sempre."
2005706-12 = "Eu mesma não quero que meus métodos se tornem previsíveis."
2005706-13 = "Além disso, não quero ser vista como uma \"maníaca da limpeza\"..."
2005706-14 = "[s] (Pelo menos ela tem consciência disso...)"
2005706-15 = "O que será que devo fazer..."
2005706-16 = "Eu também tenho o desejo de buscar uma solução pacífica, mas..."
2005706-26 = "Ahhh!? O-o que foi isso!?"
2005706-28 = "Eu sabia que era perto do mercado negro, mas..."
2005706-29 = "Uuu... quero ir para casa logo. Alguém me ajude!"
2005706-31 = "Cala a boca! Quem é que está fazendo esse barulho!"
2005706-32 = "Se não ficarem quietos, vou disparar a minha nova bala de rifle..."
2005706-33 = "A \"bala de cócegas\", que faz as costelas e as solas dos pés coçarem até você morrer!"
2005706-37 = "Iiiihhh... só isso não, por favor!"
2005706-38 = "Hum... Sensei...?"
2005706-39 = "[s] \"Como as coisas chegaram a esse ponto...\""
2005706-40 = "Sinto muito...#nÉ tudo por causa da minha incompetência..."
2005706-41 = "[s] \"Se continuar assim, muitos civis serão envolvidos...\""
2005706-45 = "Já chega! Vocês já estão cercados!#nLibertem as pessoas que estão aí agora mesmo!"
2005706-48 = "O que faremos, chefe?"
2005706-49 = "Chegamos até aqui, acha que vou levantar bandeira branca?! Vamos terminar o que começamos!#nNão há outro caminho!"
2005706-50 = "É isso aí, policial da Valkyrie!#nSe não aceitarem nossas exigências, não podemos garantir a segurança de quem está aqui!"
2005706-55 = "Sensei..."
2005706-56 = "[s3] \"Akane--\"\n[s4] \"Agora é a vez da C&C!\""
2005706-59 = "Sim."
2005706-60 = "..."
2005706-61 = "Agora é o momento de tentar uma nova abordagem, não é?"
2005706-66 = "Com licença..."
2005706-67 = "Hã? Quem é você?"
2005706-68 = "Que tal tentar conversar com o pessoal da Valkyrie primeiro?"
2005706-69 = "Acho que, se trocarmos algumas palavras, podemos encontrar um meio-termo."
2005706-70 = "Hã? Do que você está falando?"
2005706-71 = "Não sabe que eles vivem dizendo que \"não negociamos com terroristas\"?"
2005706-72 = "O mesmo vale para nós! Não vou negociar com a polícia! Nunca se sabe quando eles vão te trair!"
2005706-74 = "Forasteiros, caiam fora!"
2005706-75 = "Ora..."
2005706-76 = "[s] (Não seria tão fácil assim...)"
2005706-79 = "Eu tenho contatos na Valkyrie.#nO que acha? Quer que eu entre em contato com eles?"
2005706-80 = "Talvez possamos resolver isso de forma amigável."
2005706-81 = "Hã? Por que eu confiaria em você?"
2005706-82 = "Dá para ver só de olhar. Está escrito no seu rosto."
2005706-83 = "...Entendo."
2005706-84 = "[s] (O rosto da Akane está...!?)"
2005706-88 = "Sendo assim, que tal pedir uma redução de pena?#nSe explicarmos a situação, talvez..."
2005706-89 = "Não tem como eu recuar agora, tem?!"
2005706-90 = "Mesmo sendo só um civil que não sabe de nada!"
2005706-94 = "[ns] (Se a Akane ficar séria, acho que não vou conseguir dizer algo assim...)"
2005706-97 = "O pessoal da Valkyrie também deseja uma resolução pacífica. Acho que seria melhor para ambos os lados..."
2005706-98 = "Negociar—"
2005706-99 = "Não brinque comigo!"
2005706-100 = "Enquanto eles não se renderem a nós, não há como esperar uma resolução pacífica!"
2005706-101 = "O mercado negro é nossa jurisdição. Não há uma única pessoa aqui que receba a Valkyrie de braços abertos!"
2005706-102 = "Ah, não? Você é um deles?"
2005706-103 = "Fufu... ufufu..."
2005706-104 = "[s] (Não me responsabilizo pelo que acontecer...)"
2005706-111 = "Já ficou de noite, Sensei."
2005706-112 = "[s] \"É verdade.\""
2005706-113 = "Amanhã preciso ir para a escola, e ainda não terminei de revisar a matéria..."
2005706-114 = "[s] \"Verdade. Estudar é sua prioridade.\""
2005706-115 = "O Sensei também tem preparativos para amanhã, não é..."
2005706-116 = "O que faremos...?"
2005706-117 = "[s] \"Akane.\""
2005706-118 = "Sim, Sensei."
2005706-119 = "[s] \"Pode ir.\""
2005706-120 = "Eh?"
2005706-124 = "..."
2005706-125 = "Tem certeza?"
2005706-126 = "[s5] \"Se tentamos de tudo e não deu certo...\"\n[s6] \"Às vezes é preciso saber a hora de desistir.\""
2005706-129 = "Entendido."
2005706-130 = "Meu mestre."
2005706-150 = "Aaaaaaaahhh!?！？！？"
2005706-151 = "O que é isso! O que diabos está acontecendo—!!!"
2005706-157 = "F-fujam! Aquela ali enlouqueceu!!!"
2005706-161 = "Espere! Aaaaaahhh!!!"
2005706-168 = "Valkyrie! P-por favor! Me ajudem! Eu me rendo incondicionalmente!"
2005706-169 = "Por favor, nos protejam dela!!!"
2005706-175 = "Ufa."
2005706-176 = "Como esperado, bombas são... o melhor método de 'limpeza', não é?"
