[translation]
10029020-1 = "第2話;[ruby=キヴォトス]学園都市[/ruby]の常識"
10029020-2 = "……よし、完成だ。"
10029020-3 = "これが3人のために用意した、キヴォトスの「常識」さ。"
10029020-4 = "すごく楽しかった。#n思わず時間も忘れてしまうくらい。"
10029020-5 = "別世界から来た超能力者のために銃を作るなんて、滅多にないチャンスだからね。"
10029020-6 = "「超能力」については、まだ半信半疑だけど……"
10029020-7 = "まぁまぁ。他の誰でもない「全知」の言葉なのだから、信じようじゃないか。"
10029020-8 = "それでは……"
10029020-9 = "これは電気を自在に操ると噂の君に。#n残りの2本は、先生に預けるよ。"
10029020-10 = "う、うん……わっ。"
10029020-16 = "こ、これ……本物の銃よね？"
10029020-17 = "いくら何でも、ちょっと……"
10029020-19 = "遠慮する必要はないよ。#nこっちの世界では、みんな銃を持ってるものだから。"
10029020-20 = "私たちみたいにヘイローがあるのも、撃たれて平気なのもそう。"
10029020-21 = "もう美琴は、こっちの常識の中にいるんだよ。"
10029020-22 = "そ、そうなんだけど……"
10029020-23 = "うーん……"
10029020-24 = "……まあ、そうね。"
10029020-25 = "わざわざ私のために作ってもらったのに、突き返すのも申し訳ないし……"
10029020-26 = "……こんな物まで用意してもらっちゃって……#n今までの態度が恥ずかしくなってくるわ。"
10029020-27 = "……？"
10029020-28 = "……この銃に点いてるライトみたいなのは何？"
10029020-33 = "……先生、どうかしたかい？"
10029020-34 = "変な機能をつけてないか、って？"
10029020-38 = "…………つけてるわけないじゃないか。"
10029020-39 = "[s1] \"今の間は何！？\"\n[s2] \"何かあるよね！？絶対に何かあるよね！？\""
10029020-42 = "変な機能ではありません！#nとても素晴らしい機能です！"
10029020-43 = "なんと、これは電気を操る力に合わせて作り上げた特別な銃なのです！#n……名付けて、レールガン！"
10029020-44 = "……レール、ガン？"
10029020-45 = "待って、今レールガンって……"
10029020-46 = "もちろん通常の弾薬も撃てますが、その銃にはなんとオリジナルの機能が！#n電気をチャージして放つ事ができるのです！"
10029020-48 = "これ以上ピッタリの銃はないでしょう！！"
10029020-52 = "その……本当に体内で発電できるのなら、ですけど……"
10029020-53 = "も、もちろん疑ってるわけじゃないんだけど……でも……"
10029020-54 = "すまないが、許してほしい。#nエンジニアとして、まだ受け入れるのに時間がかかりそうなんだ。"
10029020-56 = "ああ。いいのよ、気にしないで。#nよく考えたら、これが普通の反応よね。"
10029020-57 = "でも、せっかく用意してくれたところ悪いんだけど……#nコレを使う気はないわ。"
10029020-58 = "無理に使えとは言わない。#nでも、美琴はきっと撃つよ。"
10029020-59 = "それに、先生が同行してる場合の戦闘は公務の一環になる。#nケンカを売られる事は少ないけど、それでもやむを得ず戦わなきゃいけない時もある。"
10029020-60 = "シレッと言うわね……#nそりゃまあ、ここに来るまでも何回か戦ったけど……"
10029020-61 = "……はぁ、夢じゃないのよね。#nインディアンポーカーのせいだったら良かったのに。"
10029020-62 = "学生が銃を握って当然の世界があるなんて……まだ信じられないわ。"
10029020-63 = "私たちからしたら、超能力の方が信じられないよ……。"
10029020-64 = "とりあえず銃は受け取ったし……#n部長が「施設」の調査をしてる間に残りの2人を探しに行こう。"
10029020-65 = "あ、その前に……"
10029020-66 = "どういう格好だったか教えてくれないかしら？#n私の知り合いかもしれないし。"
10029020-67 = "私とは違う世界から来た可能性もあるとは思うけど……"
10029020-68 = "たぶん同じ世界だと思う。#n美琴と同じ制服を着た、腰くらいまでの長さの金髪の子と――"
10029020-69 = "もう1人は、違う制服を着てたけど……#n黒髪に白い花飾りをつけてたのを覚えてる。"
10029020-71 = "あと……金髪の方は、リモコンを手に持ってた。"
10029020-72 = "常盤台の制服に……金髪……"
10029020-73 = "……リモコン？"
10029020-77 = "……あ。"
10029020-78 = "……はぁ。"
10029020-79 = "よりにもよって、なんでアイツが……"
10029020-80 = "……知り合い？"
10029020-81 = "まぁ、一応ね。"
10029020-82 = "もしアイツがここにいるなら、急いで見つけないと。"
10029020-83 = "……ん？どうしてって？"
10029020-84 = "人を操れるのよ、能力で。#n放っておいたら、何をしでかすか……"
10029020-85 = "マインドコントロール……！？#nそれは本当かい！？"
10029020-86 = "事前に知ってたら、脳波を増幅する装置も作ったのに……！"
10029020-87 = "[s3] \"危なかった……。\"\n[s4] \"知らなくて良かった……。\""
10029020-90 = "だから、運んでる時には何も感じなかったんだ。#n精神系の能力って聞いて、納得した。"
10029020-91 = "でも、大丈夫。"
10029020-92 = "部長から連絡入ってる……居場所、見つけたって。"
10029020-93 = "えっ……も、もう見つかったの？"
10029020-94 = "街中の防犯カメラにアクセスしたの。#n美琴もそうだったけど、やっぱり目立つからね――"
10029020-95 = "――銃を持たない生徒って。"
10029020-96 = "銃を持っていない生徒より、裸で歩いている生徒の方が統計的にも実際にも多いくらいですからね！"
10029020-97 = "……この街も大概ね。"
10029020-98 = "とりあえず、案内してくれる？"
10029020-102 = "この街の「常識」ってやつをアイツにも渡してやりましょ。"
10029020-103 = "[s5] \"だいぶ馴染んできたね。\"\n[s6] \"よし、さっそく行こうか。\""
10029020-106 = "……うん。"
10029020-107 = "出発しよう。"
