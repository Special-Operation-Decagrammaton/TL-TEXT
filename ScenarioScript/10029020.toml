[translation]
10029020-1 = "Episódio 2; O senso comum da Cidade Acadêmica de Kivotos"
10029020-2 = "……Muito bem, está pronto."
10029020-3 = "Isto é o \"senso comum\" de Kivotos que preparei para as três."
10029020-4 = "Foi muito divertido. #nA ponto de eu nem ver o tempo passar."
10029020-5 = "Não é sempre que se tem a chance de fabricar uma arma para uma superpoderosa que veio de outro mundo, afinal."
10029020-6 = "Sobre os \"superpoderes\", ainda estou meio cética, mas……"
10029020-7 = "Ora, ora. Já que são palavras de alguém \"onisciente\", por que não acreditar?"
10029020-8 = "Então……"
10029020-9 = "Esta é para você, que dizem ser capaz de manipular a eletricidade à vontade. #nAs outras duas, vou deixar com o Sensei."
10029020-10 = "Ah, sim…… Uau."
10029020-16 = "I-isso…… é uma arma de verdade, né?"
10029020-17 = "Por mais que seja, é um pouco……"
10029020-19 = "Não precisa se intimidar. #nNeste mundo, todo mundo carrega uma arma."
10029020-20 = "Assim como nós temos halos, e não nos machucamos mesmo sendo atingidas."
10029020-21 = "Mikoto, você já faz parte do senso comum daqui."
10029020-22 = "É, eu sei, mas……"
10029020-23 = "Hmm……"
10029020-24 = "……Bem, é verdade."
10029020-25 = "Já que se deram ao trabalho de fazer isso para mim, seria indelicado recusar……"
10029020-26 = "……Até prepararam algo assim para mim…… #nSinto vergonha da minha atitude de antes."
10029020-27 = "……?"
10029020-28 = "……O que é essa coisa que parece uma luz nesta arma?"
10029020-33 = "……Sensei, aconteceu alguma coisa?"
10029020-34 = "Está perguntando se eu coloquei alguma função estranha?"
10029020-38 = "…………Claro que não coloquei."
10029020-39 = "[s1] \"O que foi essa pausa!?\"\n[s2] \"Tem alguma coisa, né!? Com certeza tem alguma coisa, né!?\""
10029020-42 = "Não é uma função estranha! #nÉ uma função maravilhosa!"
10029020-43 = "Veja bem, esta é uma arma especial criada para se adaptar ao seu poder de manipular eletricidade! #n……Eu a chamo de Railgun!"
10029020-44 = "……Railgun?"
10029020-45 = "Espera, você disse Railgun agora há pouco……"
10029020-46 = "Claro que ela dispara munição comum, mas essa arma tem uma função original! #nVocê pode carregar eletricidade nela e disparar!"
10029020-48 = "Não existe arma mais perfeita que esta!!"
10029020-52 = "Bem…… isso se você realmente puder gerar eletricidade no próprio corpo……"
10029020-53 = "N-não que eu esteja duvidando, mas…… é que……"
10029020-54 = "Desculpe, mas me perdoe. #nComo engenheira, ainda vai levar um tempo para eu aceitar isso."
10029020-56 = "Ah, tudo bem, não se preocupe. #nPensando bem, essa é uma reação normal, né."
10029020-57 = "Mas, desculpe por terem se dado ao trabalho, mas…… #nNão pretendo usar isso."
10029020-58 = "Não vou te forçar a usar. #nMas, Mikoto, você certamente vai atirar."
10029020-59 = "Além disso, o combate quando o Sensei está acompanhando faz parte do dever oficial. #nÉ raro alguém nos provocar, mas ainda assim, há momentos em que é inevitável lutar."
10029020-60 = "Você diz isso com tanta naturalidade…… #nBem, é verdade que lutei algumas vezes até chegar aqui, mas……"
10029020-61 = "……Ah, não é um sonho, né. #nTeria sido melhor se fosse por causa de um Indian Poker."
10029020-62 = "Ainda não consigo acreditar que existe um mundo onde é normal estudantes portarem armas……"
10029020-63 = "Para nós, o que é difícil de acreditar são os superpoderes……"
10029020-64 = "De qualquer forma, já peguei a arma…… #nEnquanto a presidente investiga as \"instalações\", vamos procurar as outras duas."
10029020-65 = "Ah, antes disso……"
10029020-66 = "Poderia me descrever como elas são? #nPodem ser conhecidas minhas."
10029020-67 = "Embora eu ache que exista a possibilidade de terem vindo de um mundo diferente do meu……"
10029020-68 = "Acho que provavelmente são do mesmo mundo. Uma garota de cabelos loiros na altura da cintura, usando o mesmo uniforme que você, e――"
10029020-69 = "A outra usava um uniforme diferente, mas…… #nLembro que ela tinha cabelos pretos e usava um enfeite de flor branca."
10029020-71 = "Ah…… e a loira estava segurando um controle remoto."
10029020-72 = "O uniforme de Tokiwadai... e cabelo loiro..."
10029020-73 = "...Um controle remoto?"
10029020-77 = "...Ah."
10029020-78 = "...Haa."
10029020-79 = "Logo ela, por que tinha que ser ela..."
10029020-80 = "...Você a conhece?"
10029020-81 = "Bem, de certa forma."
10029020-82 = "Se ela está aqui, precisamos encontrá-la o quanto antes."
10029020-83 = "...Hm? Por que, você pergunta?"
10029020-84 = "Ela pode controlar pessoas com a habilidade dela.#nSe a deixarmos solta, quem sabe o que ela pode fazer..."
10029020-85 = "Controle mental...!?#nIsso é verdade!?"
10029020-86 = "Se eu soubesse disso antes, teria construído um dispositivo para amplificar as ondas cerebrais...!"
10029020-87 = "[s3] \"Foi por pouco...\"\n[s4] \"Ainda bem que eu não sabia...\""
10029020-90 = "Então é por isso que não senti nada enquanto a carregava.#nFaz sentido agora que ouvi que é uma habilidade do tipo mental."
10029020-91 = "Mas está tudo bem."
10029020-92 = "Recebi uma mensagem da chefe... ela disse que encontrou o paradeiro dela."
10029020-93 = "Sério... já a encontraram?"
10029020-94 = "Eu acessei as câmeras de segurança da cidade.#nAssim como a Mikoto, ela se destaca bastante, afinal—"
10029020-95 = "—por ser uma aluna que não carrega uma arma."
10029020-96 = "Na verdade, estatisticamente falando, é mais comum ver alunas andando por aí sem armas do que sem roupas nesta cidade!"
10029020-97 = "...Essa cidade é um caso perdido."
10029020-98 = "De qualquer forma, pode nos guiar?"
10029020-102 = "Vamos mostrar a ela o que é o \"senso comum\" desta cidade."
10029020-103 = "[s5] \"Você já se acostumou bastante, hein.\"\n[s6] \"Muito bem, vamos logo.\""
10029020-106 = "...Sim."
10029020-107 = "Vamos partir."
