[translation]
1011402-1 = "ウェイトレスの楽しさ"
1011402-2 = "（ジュリのアルバイト先を訪れると……）"
1011402-6 = "あ、先生！いらっしゃいませ！"
1011402-7 = "[s] \"おはよう、ジュリ！お店の前でどうしたの？\""
1011402-8 = "あ、その……。"
1011402-9 = "先生がいらしてくるのが見えたのでつい……。"
1011402-10 = "さ、さあ、中に入りましょうか！"
1011402-12 = "ご注文はお決まりでしょうか、[ruby=・   ・   ・]お客様[/ruby]？"
1011402-13 = "[s1] \"じゃあ、コーヒーで！\"\n[s2] \"じゃあ、パフェで！おすすめってありますか？\""
1011402-14 = "アイスとホットがございますが……。"
1011402-15 = "どちらになさいますか？"
1011402-16 = "……はい、アイスコーヒーですね。#nミルクとシロップはご利用でしょうか？"
1011402-17 = "かしこまりました、少々お待ちください。"
1011402-18 = "おすすめですか……そうですね。"
1011402-19 = "今の季節ですと、期間限定のチェリーチョコレートパフェがおすすめです。#nいかかでしょうか？"
1011402-20 = "はい、ありがとうございます！"
1011402-21 = "それでは、すぐお持ちいたしますね。"
1011402-23 = "（フードやドリンクを楽しみながら、ジュリの働く姿を見守った）"
1011402-24 = "（お店側に迷惑にならない程度に追加で注文をしていると……）"
1011402-27 = "……粉砂糖の在庫が切れてしまった。"
1011402-28 = "近くのスーパーで買ってきますね！"
1011402-33 = "売り切れ、ですか……？"
1011402-34 = "だ、大丈夫です！#nお砂糖を砕いて、でんぷんを加えれば……。"
1011402-35 = "砂糖もでんぷんもないんだ……。"
1011402-36 = "再入荷は明日になると言われてしまった……。"
1011402-37 = "ど、どうしましょう……？"
1011402-43 = "そうです、ドラッグストアに行きましょう！"
1011402-44 = "ど、ドラッグストア？"
1011402-45 = "はい！ブドウ糖のキャンディーがあるはずです！"
1011402-47 = "これを砕いて、粉状にすれば……。"
1011402-52 = "シュガーパウダーの代わりになるはず……！"
1011402-53 = "お砂糖より溶けやすいですし……。"
1011402-54 = "食感が違うので、もしかしたら気づかれてしまうかもしれませんが……。"
1011402-55 = "お食事を提供できないよりは……！"
1011402-57 = "バターが在庫切れ……？#nあんバタートースト、売り切れですか？"
1011402-58 = "……バターの代わりにマーガリンをのせるのはいかがでしょう？"
1011402-59 = "もちろん、味は少し違いますが……。"
1011402-60 = "バターに似ていますし！"
1011402-61 = "良いアイデアだけど、マーガリンも残り少なくて……。"
1011402-62 = "えぇ？#nど、どうしましょう……あっ！"
1011402-63 = "では、牛乳とレモン汁はありますか？"
1011402-64 = "ああ、それなら冷蔵庫に……。"
1011402-65 = "でしたら、何とかなるかもしれません！"
1011402-66 = "まずは牛乳を温めて……。"
1011402-67 = "ここにレモン汁を加えて混ぜると、牛乳が固形分と液体に分離されるので……。"
1011402-68 = "これを絞るとカッテージチーズができます！#nこれなら、クリームチーズの代用として使えるはずです！"
1011402-69 = "すごい……私もやってみよう！"
1011402-71 = "……。"
1011402-72 = "このパン、味が落ちています！"
1011402-73 = "えぇ？#n仕入先からは、今日焼き上げたって聞いているのだが……。"
1011402-74 = "サワードウで作ったパンは、当日焼いたのなら微かにアルコールの匂いがします。"
1011402-75 = "ですが、このパンからは感じられません！#n一度、仕入先に連絡してみてください！"
1011402-76 = "わ、分かった。"
1011402-79 = "ジュリさんの言う通りだったよ、二日前の売れ残り品だって……。"
1011402-80 = "そうでしたか……。"
1011402-81 = "はあ、新しい仕入先を探さなきゃ。#nそれより、よく気づいてくれたね！ありがとう！"
1011402-82 = "い、いえ、そんな……。"
1011402-83 = "[ns] \"ジュリの食材管理は素晴らしいですから。\""
1011402-84 = "せ、先生まで！？"
1011402-86 = "さっきまでは混んでいましたが、だいぶ落ち着きましたね……。"
1011402-87 = "ピークタイムが終われば、大体こんな感じです。#n忙しくて席に伺えませんでしたが……その、大丈夫でしたか？"
1011402-88 = "えっ、私の仕事ぶりを見ていたらあっという間だったなんて……#nえへへっ、嬉しいです。"
1011402-89 = "ジュリさん、休憩に入って良いよ。#n今日はとても助かった！"
1011402-90 = "分かりました、ありがとうございます！"
1011402-91 = "先生……お隣、失礼しても良いですか？"
1011402-92 = "[s] \"うん、もちろん。\""
1011402-93 = "では……遠慮なく。"
1011402-98 = "ちょ、ちょっと近いかもしれませんね。#nあはは……。"
1011402-99 = "[s] \"カフェの仕事、大変じゃなかった？\""
1011402-100 = "そうですね……大変なこともありますが、楽しいですよ。"
1011402-101 = "カフェは、給食部の仕事とは違う楽しさがあります。"
1011402-102 = "例えば――ホール仕事の場合、どの料理を先に運ぶか考えなくてはいけません。"
1011402-103 = "それに、カフェを利用するお客様は、甘いものを頼まれるケースが多いので……。"
1011402-104 = "付け合わせの飲み物をおすすめすると、喜んでくださるんです。"
1011402-105 = "中にはブラックコーヒーだけを注文するお客様もいらっしゃるので、#n無理にデザートを勧めたりはしませんが。"
1011402-106 = "あと、おすすめを聞かれた時……。"
1011402-107 = "お客様がよく開くメニューのページを参考にすると、だいたい当たるんです。"
1011402-108 = "注文前からお水をたくさん飲む方には、冷たいドリンクをご紹介したりもしますね。"
1011402-109 = "たまに、お腹からぐ～っと音が聞こえてくると、とても分かりやすいんです！"
1011402-110 = "……他にも、新商品を誰よりも先に試食できたり！"
1011402-111 = "この間は、桃とシャインマスカットとココナッツゼリーのジュースをいただきました！#nまだ商品名は決まっていませんが。"
1011402-112 = "フルーツの甘い味とゼリーの滑らかな食感が相まって……とっても美味しかったです！"
1011402-113 = "他にも……！"
1011402-115 = "（ジュリの話を聞いていると、あっという間に時間が経ち……）"
1011402-117 = "もう退勤時間だよ！みんな、お疲れ様！"
1011402-118 = "お疲れ様でした！"
1011402-119 = "お、お疲れ様でした！"
1011402-120 = "[ns] \"お疲れ、ジュリ。とっても頑張ってたね。\""
1011402-121 = "あ、ありがとうございます……。"
1011402-122 = "そう言っていただけると、嬉しいです。"
1011402-123 = "私もずっと見てたけど……やっぱり、ジュリさんならいけると思うんだ。"
1011402-124 = "な、何がですか……？"
1011402-125 = "それは……。"
1011402-126 = "――「今月のウェイトレス選抜大会」！"
1011402-127 = "……はい？"
1011402-128 = "地域ごとに一番優秀で魅力的なカフェのウェイトレスを決める大会……？"
1011402-129 = "選ばれた店は、その地域で有名になれる……？"
1011402-130 = "そ、そそそそ、そんなの、私には無理です！"
1011402-131 = "[ns] \"やりたくないんだ？\""
1011402-132 = "……まだ、よく分かりません。#n少し、考える時間を……。"
1011402-133 = "……。"
1011402-134 = "えっと、本当に嫌いなわけではありませんが……。"
1011402-135 = "でも、うまくやれるか、心配で……。"
1011402-136 = "[s3] \"じゃあ、一緒にやってみよう。私も手伝うから！\"\n[s4] \"今日みたいに頑張れば、きっといけると思う！\""
1011402-139 = "ほら、先生もこう言ってくれてるから、お願いできないかな？"
1011402-143 = "……。"
1011402-144 = "え、えええええ！？"
