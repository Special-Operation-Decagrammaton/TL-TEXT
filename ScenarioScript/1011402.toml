[translation]
1011402-1 = "A diversão de ser garçonete"

1011402-2 = "(Quando visito o trabalho de meio período de Juri...)"

1011402-6 = "Ah, Senseia! Bem-vindo!"

1011402-7 = "[s] \"Bom dia, Julie! O que aconteceu na frente da loja?\""

1011402-8 = "Ah, isso..."

1011402-9 = "Acabei de ver o Sensei chegando..."

1011402-10 = "Vamos, vamos para dentro!"

1011402-12 = "Você decidiu fazer seu pedido?"

1011402-13 = "[s1] \"Ok, vamos tomar um café!\"\n[s2] \"Ok, vamos tomar um parfait! Você tem alguma recomendação?\""

1011402-14 = "Temos sorvete e quentinho..."

1011402-15 = "Qual você gostaria?"

1011402-16 = "...Sim, é café gelado. #nVocê usa leite e xarope?"

1011402-17 = "Desculpe, aguarde um momento."

1011402-18 = "Você recomenda isso? Sim."

1011402-19 = "Durante esta temporada, recomendamos o parfait de chocolate cereja por tempo limitado. #nVocê gostaria?"

1011402-20 = "Sim, obrigado!"

1011402-21 = "Pois bem, vou trazê-lo para você imediatamente."

1011402-23 = "(Eu assisti Juri trabalhar enquanto saboreava comidas e bebidas)"

1011402-24 = "(Se você fizer um pedido adicional, na medida em que não cause problemas à loja...)"

1011402-27 = "...Ficamos sem açúcar de confeiteiro."

1011402-28 = "Vou comprar em um supermercado próximo!"

1011402-33 = "Está esgotado...?"

1011402-34 = "Não, está tudo bem! #nSe você esmagar o açúcar e adicionar amido..."

1011402-35 = "Não tem açúcar nem amido..."

1011402-36 = "Disseram-me que amanhã voltaria ao estoque..."

1011402-37 = "O que devo fazer...?"

1011402-43 = "Isso mesmo, vamos à farmácia!"

1011402-44 = "O que, drogaria?"

1011402-45 = "sim! Deveria haver doce de glicose!"

1011402-47 = "Se você esmagar isso e transformá-lo em pó..."

1011402-52 = "Deveria ser um substituto do açúcar de confeiteiro...!"

1011402-53 = "Dissolve-se mais facilmente que o açúcar..."

1011402-54 = "A textura é diferente, então talvez você não consiga perceber..."

1011402-55 = "É melhor do que não poder fornecer comida...!"

1011402-57 = "A manteiga está esgotada...? #nA torrada com manteiga está esgotada?"

1011402-58 = "...Que tal usar margarina em vez de manteiga?"

1011402-59 = "Claro que o sabor é um pouco diferente, mas..."

1011402-60 = "Parece manteiga!"

1011402-61 = "É uma boa ideia, mas não me resta muita margarina..."

1011402-62 = "Eh? #nO que devo fazer...Ah!"

1011402-63 = "Então, você tem leite e suco de limão?"

1011402-64 = "Ah, depois coloque na geladeira..."

1011402-65 = "Se sim, talvez algo possa ser feito!"

1011402-66 = "Primeiro, aqueça o leite..."

1011402-67 = "Se você adicionar suco de limão e misturar, o leite será separado em sólidos e líquidos..."

1011402-68 = "Aperte para fazer queijo cottage! #nVocê definitivamente pode usar isso como substituto do cream cheese!"

1011402-69 = "Incrível...vou tentar também!"

1011402-71 = "……."

1011402-72 = "Este pão não tem gosto!"

1011402-73 = "Eh? #nOuvi do fornecedor que eles assaram hoje..."

1011402-74 = "O pão feito com massa fermentada terá um leve cheiro de álcool se for assado no mesmo dia."

1011402-75 = "Mas você não pode sentir isso neste pão! #nEntre em contato com seu fornecedor uma vez!"

1011402-76 = "Ah, eu entendo."

1011402-79 = "Juri estava certo, era um item não vendido de dois dias atrás..."

1011402-80 = "Foi assim...?"

1011402-81 = "Ah, tenho que encontrar um novo fornecedor. #nVocê notou melhor que isso! obrigado!"

1011402-82 = "Não, não, é isso..."

1011402-83 = "[ns] \"A gestão alimentar de Juri é incrível.\""

1011402-84 = "Até a Senseia! ?"

1011402-86 = "Estava lotado até agora, mas já se acalmou um pouco..."

1011402-87 = "Depois dos horários de pico, geralmente fica assim. #nEu estava ocupado, então não pude ir até seu lugar... mas estava tudo bem?"

1011402-88 = "Nossa, não acredito que o tempo passou tão rápido quando vi como eu trabalhava...#nEhehe, estou tão feliz."

1011402-89 = "Julie, você pode fazer uma pausa. #nHoje foi muito útil!"

1011402-90 = "Entendido, obrigado!"

1011402-91 = "Sensei... posso desculpar meu vizinho?"

1011402-92 = "[s] \"Sim, claro.\""

1011402-93 = "Então... fique à vontade."

1011402-98 = "Ei, pode estar um pouco perto. #nAhaha…."

1011402-99 = "[s] \"Não foi difícil trabalhar no café?\""

1011402-100 = "Bem... às vezes pode ser difícil, mas é divertido."

1011402-101 = "Trabalhar em um café é um tipo de diversão diferente do que trabalhar na merenda escolar."

1011402-102 = "Por exemplo, ao trabalhar em um salão, você deve pensar primeiro em que comida levar."

1011402-103 = "Além disso, os clientes que frequentam o café costumam pedir algo doce..."

1011402-104 = "Quando recomendo uma bebida para acompanhar, eles ficam felizes."

1011402-105 = "Alguns clientes só pedem café preto, então não os forço a pedir sobremesa."

1011402-106 = "Além disso, quando solicitado por recomendações..."

1011402-107 = "Se você consultar as páginas do menu que os clientes visitam com frequência, geralmente obterá a resposta certa."

1011402-108 = "Para quem bebe muita água antes de pedir, poderemos oferecer bebidas geladas."

1011402-109 = "Às vezes, é muito fácil saber quando você ouve um som borbulhante vindo do estômago!"

1011402-110 = "...Você também pode experimentar novos produtos antes de qualquer outra pessoa!"

1011402-111 = "Outro dia tomei suco de pêssego, moscatel brilhante e geleia de coco! #nO nome do produto ainda não foi decidido."

1011402-112 = "O sabor doce da fruta e a textura macia da geleia combinados...ficou uma delícia!"

1011402-113 = "Além do mais...!"

1011402-115 = "(O tempo passa num piscar de olhos enquanto ouço a história de Julie...)"

1011402-117 = "É hora de sair do trabalho! Obrigado a todos pelo seu trabalho duro!"

1011402-118 = "obrigado pelo seu trabalho duro!"

1011402-119 = "Obrigado pelo seu trabalho duro!"

1011402-120 = "[ns] \"Bom trabalho, Julie. Você trabalhou muito duro.\""

1011402-121 = "Ah, obrigado...."

1011402-122 = "Fico feliz em ouvir você dizer isso."

1011402-123 = "Já faz um tempo que assisto, mas ainda acho que Juri consegue."

1011402-124 = "O-o que é isso...?"

1011402-125 = "isso é……."

1011402-126 = "--\"Concurso de seleção de garçonetes deste mês\"!"

1011402-127 = "……sim?"

1011402-128 = "Uma competição para determinar a garçonete de café mais talentosa e atraente de cada região...?"

1011402-129 = "A loja selecionada ficará famosa na região...?"

1011402-130 = "Bem, eu não posso fazer isso!"

1011402-131 = "[ns] \"Você não quer fazer isso?\""

1011402-132 = "...Eu ainda não entendo direito. #nTire um tempo para pensar..."

1011402-133 = "……."

1011402-134 = "Bem, eu realmente não gosto disso, mas..."

1011402-135 = "Mas estou preocupado se vou conseguir fazer isso bem..."

1011402-136 = "[s3] \"Então vamos tentar juntos. Eu também vou te ajudar!\"\n[s4] \"Se você trabalhar duro como hoje, tenho certeza que conseguirá!\""

1011402-139 = "Olha, a Senseia também fala isso, então posso te pedir um favor?"

1011402-143 = "……."

1011402-144 = "Ah, sim, sim! ?"

