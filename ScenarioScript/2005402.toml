[translation]
2005402-1 = "Life Staff (1)"
2005402-8 = "[ns] \"！？！？\""
2005402-11 = "Fufu, bom dia, Sensei."
2005402-12 = "O que achou deste despertador feito por esta Life Staff super genial, pura e frágil?"
2005402-13 = "[s] \"Graças a você eu acordei, mas... que susto.\""
2005402-14 = "É realmente gratificante obter os resultados esperados."
2005402-15 = "Bem, vamos começar com os preparativos matinais."
2005402-19 = "[ns] \"O que é isso...?\""
2005402-20 = "É um AMAS que modifiquei e melhorei à minha maneira."
2005402-21 = "O AMAS foi desenvolvido pela Rio, mas... dadas as circunstâncias atuais...#nNão acho que ela vá se importar se eu pegar emprestado um pouco."
2005402-22 = "Vamos lá, um dia revigorante começa com alongamentos.#nEsse AMAS vai te ajudar."
2005402-23 = "Primeiro, estique bem a cintura e—"
2005402-30 = "[ns1] \"！？！？\"\n[ns2] \"Ai, ai, ai!!\""
2005402-35 = "Fufu. Um pouco de dor é o ideal.#nVamos acordar o corpo lentamente."
2005402-39 = "Não se esqueça de lavar o rosto. Preparei o sabonete facial que eu uso."
2005402-40 = "É um tipo de baixa irritação, gentil até com a pele delicada da manhã, então não precisa se preocupar com problemas de pele."
2005402-41 = "É perfeito para remover a oleosidade e o suor acumulados durante o sono."
2005402-52 = "Entendo... então você está usando a mesma roupa de novo hoje..."
2005402-53 = "Dadas as circunstâncias, talvez não tenhamos luxo para nos preocupar com moda..."
2005402-54 = "Mas o mínimo de apresentação pessoal deve ser mantido.#nEssa roupa está toda amassada."
2005402-55 = "Você provavelmente vestiu assim que tirou do varal, não foi?#nMe empreste, vou passar um vapor."
2005402-59 = "Pronto, os preparativos terminaram. Vamos para a área de trabalho.#nEu, que sou a \"onisciência\", vou guiá-lo pelo melhor caminho."
2005402-60 = "Vou projetar setas no chão, então siga por elas, está bem?"
2005402-61 = "[s] \"...Eu não me perderia nem sozinho, sabe?\""
2005402-62 = "..."
2005402-63 = "Não é sobre isso."
2005402-64 = "[ns] \"Como assim...?\""
2005402-65 = "..."
2005402-66 = "De qualquer forma, não é isso!"
2005402-70 = "Estava à sua espera. Chegou em segurança, vejo."
2005402-71 = "Fufu. Uma hacker e Life Staff super genial e frágil tão prestativa quanto eu...#nNão deve existir outra em todo o mundo, não é?"
2005402-72 = "[s] \"Sim... agradeço a intenção...\""
2005402-73 = "Não precisa ser tão reservado..."
2005402-74 = "Como dizem, \"a honestidade é a melhor política\"."
2005402-75 = "De qualquer forma, pretendo continuar cuidando de você, então conto com sua colaboração."
2005402-76 = "[s] \"Err, e a minha vontade...?\""
2005402-77 = "..."
2005402-78 = "Não me diga que... você pretende ignorar os sentimentos dedicados de uma aluna...?#nPara proporcionar uma vida confortável ao Sensei—"
2005402-79 = "Eu hackeei o sistema que a Rio monopolizava... ou melhor, garanti recursos através de negociações eletrônicas..."
2005402-80 = "Não... tudo bem, não importa."
2005402-81 = "Afinal, isso é algo que estou fazendo por conta própria..."
2005402-82 = "Mesmo que você afaste a mão que estendi... se for o Sensei quem faz isso... eu suportarei até a dor que perfura o peito..."
2005402-83 = "[s] \"I-isso ajuda muito! Quero que continue me ajudando!\""
2005402-84 = "Fufu. É claro que sim."
2005402-85 = "Aliás, de acordo com a astrologia de hoje, a sorte na cor \"vermelha\" nos envolverá por um tempo."
2005402-86 = "Por isso, mudei o papel de parede do monitor para um vermelho sólido!"
2005402-87 = "[ns] \"Isso cansa a vista, então preferiria outro método...\""
