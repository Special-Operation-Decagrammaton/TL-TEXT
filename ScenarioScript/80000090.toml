[translation]
80000090-1 = "Medalha da Chefe do Comitê de Segurança"
80000090-3 = "Sensei, desculpe por chamá-lo tão de repente."
80000090-4 = "Surgiu um problema que não consigo resolver sozinha."
80000090-5 = "Eu realmente preciso da sua sabedoria, Sensei."
80000090-6 = "[s1] \"Sim, está tudo bem.\"\n[s2] \"Que tipo de problema aconteceu?\""
80000090-7 = "Sensei, você conhece o chocolate chamado \"Cheryonka\"?"
80000090-8 = "Sensei, você conhece o chocolate chamado \"Cheryonka\"?"
80000090-9 = "Ele é produzido na Academia Red Winter e, graças ao equilíbrio do leite, sua doçura é famosa e muito apreciada até fora da academia."
80000090-10 = "No entanto, o fornecimento de matéria-prima é instável... e existia o problema de que a produção não aumentava como o esperado."
80000090-11 = "Por isso, a Presidente Cherino me nomeou supervisora da fábrica de Cheryonka. #nEste mês, finalmente alcançamos 200% da produção em relação ao ano passado, mas..."
80000090-12 = "[s] \"Incrível, 200%!?\""
80000090-14 = "[ns] \"Mas você parece um pouco triste...\""
80000090-15 = "A Presidente Cherino, reconhecendo meus méritos, me deu uma medalha especial..."
80000090-16 = "……É esta aqui."
80000090-21 = "[ns] \"……Um chocolate?\""
80000090-22 = "Sim. Esta \"Medalha de Mérito Especial de Chocolate\", ao contrário de outras medalhas, é feita com o mesmo chocolate ao leite do Cheryonka."
80000090-23 = "Eu entendo o sentimento dela, já que aumentei a produção de chocolate, então ela me deu chocolate, mas..."
80000090-24 = "Se continuar assim, ele vai acabar estragando. #nMas, não posso simplesmente deixar a medalha que recebi da Presidente Cherino na geladeira..."
80000090-25 = "Em resumo, estou preocupada com a forma de guardar a medalha."
80000090-26 = "Sensei, você não teria alguma boa ideia?"
80000090-27 = "[s3] \"Já que é chocolate...\"\n[s4] \"Que tal comê-lo?\""
80000090-28 = "C-comer a medalha!? #nSe eu fizer isso, ela vai desaparecer!"
80000090-29 = "C-comer a medalha!? #nSe eu fizer isso, ela vai desaparecer!"
80000090-30 = "Passei meses de muito esforço até conseguir isso."
80000090-31 = "Se eu comê-la, não poderei mais provar meu esforço e meu orgulho..."
80000090-32 = "Não tem como eu fazer uma coisa dessas!"
80000090-33 = "[s] \"Mesmo sem a medalha, o esforço da Marina pode ser comprovado.\""
80000090-34 = "Oh... existe um jeito assim?"
80000090-35 = "A única coisa que recebi como recompensa foi esta medalha..."
80000090-36 = "[s] \"Tenho certeza de que todos se lembram do seu esforço, Marina.\""
80000090-38 = "[ns] \"Mesmo que a forma desapareça, ele permanecerá na memória.\""
80000090-40 = "……Sendo assim, eu quero que você coma esta medalha, Sensei."
80000090-41 = "[s5] \"Eu...?\"\n[s6] \"Algo tão importante para a Marina...?\""
80000090-42 = "Claro, ela continua sendo algo importante. #nMas, sem o seu conselho, Sensei, eu teria deixado a medalha estragar por ter pena de vê-la desaparecer."
80000090-43 = "Claro, ela continua sendo algo importante. #nMas, sem o seu conselho, Sensei, eu teria deixado a medalha estragar por ter pena de vê-la desaparecer."
80000090-44 = "Isso teria desperdiçado o valor da medalha... e a boa vontade da Presidente Cherino."
80000090-45 = "Eu queria retribuir o seu conselho, mas... infelizmente, tudo o que tenho agora é isto."
80000090-46 = "As outras alunas se lembram do meu esforço e do meu orgulho. #nFelizmente, esse valor não mudará."
80000090-47 = "Então, pelo menos, mesmo que esta medalha desapareça..."
80000090-48 = "Eu quero que você, Sensei, que me fez perceber isso, receba a minha honra."
