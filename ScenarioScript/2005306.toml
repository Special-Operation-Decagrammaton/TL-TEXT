[translation]
2005306-1 = "A garota ninja está antenada nas tendências!"
2005306-3 = "[ns] \"É a Michiru?\""
2005306-8 = "Domo, Sensei-dono."
2005306-12 = "[ns] \"！？\""
2005306-13 = "Que reação é essa!?"
2005306-14 = "Sou eu, a Michiru, Sensei-dono!?"
2005306-15 = "[s1] \"Bater na porta com tanta educação assim...\"\n[s2] \"Essa não é a Michiru que eu conheço!?\""
2005306-18 = "Unyaa!? #nO que você pensa de mim, hein!?"
2005306-19 = "...Não, esquece, melhor não dizer. Fico insegura."
2005306-20 = "De qualquer forma! Hoje eu estou diferente!"
2005306-21 = "Eu até preparei algo chamado \"briefing\"!"
2005306-22 = "[s] \"Briefing...!?\""
2005306-23 = "Isso mesmo!"
2005306-24 = "\"Diário Ninja da Michiru: Apresentação de Briefing sobre Segredos de Crescimento e Planejamento\"!"
2005306-25 = "Fufufu, ficou curioso, não ficou?"
2005306-26 = "[s] \"Era disso que você estava falando no MomoTalk?\""
2005306-27 = "Acertou em cheio!"
2005306-28 = "Sem recorrer a métodos estranhos, um segredo pensado com 100% de pureza...!"
2005306-29 = "Então, vamos começar o briefing!"
2005306-30 = "— Primeiro, a conclusão!"
2005306-31 = "[s] \"Já começou pela conclusão!?\""
2005306-32 = "É o seguinte—"
2005306-33 = "Ao criar vídeos, o melhor é refletir as tendências!"
2005306-34 = "Mesmo que o conteúdo sobre ninjas diminua um pouquinho..."
2005306-35 = "[s3] \"Mas o canal é sobre ninjas...?\"\n[s4] \"Tem certeza disso?\""
2005306-38 = "Dar um passo atrás para avançar dez passos... é disso que se trata!"
2005306-39 = "Porque, olha só, qual você acha que é o maior motivo para alguém querer assistir a um vídeo?"
2005306-40 = "...É, obviamente, o número de visualizações!"
2005306-41 = "[s5] \"Para conseguir visualizações, você precisa de visualizações...\"\n[s6] \"É tipo o dilema do ovo e da galinha...?\""
2005306-44 = "Mas, na prática, ninguém se interessa por vídeos com poucas visualizações...!"
2005306-45 = "Não pretendo usar ferramentas estranhas, mas #nfora isso, farei de tudo para aumentar as visualizações!"
2005306-46 = "Assim, os espectadores também vão se divertir! Provavelmente."
2005306-47 = "Por isso, hoje vou postar um vídeo que reflete as últimas tendências!"
2005306-48 = "[s] \"Por exemplo, que tipo de conteúdo?\""
2005306-49 = "Fufufu, ótima pergunta, Sensei-dono!"
2005306-50 = "A palavra-chave que escolhi desta vez é... \"Moda\"!"
2005306-51 = "[s] \"Moda...!\""
2005306-52 = "Sim, a era é da \"Moda\"."
2005306-53 = "Quando analisei os \"vídeos em alta\"..."
2005306-54 = "O topo do ranking estava cheio de conteúdos sobre moda!"
2005306-55 = "\"7 camisetas que você não cansa de usar\", \"Descubra sua granada ideal pela sua coloração pessoal\" ou \"O casaco que combina perfeitamente com aquela arma\"..."
2005306-56 = "Aproveitando essa onda, já planejei tudo!"
2005306-57 = "[s] \"Oh, que tipo de conteúdo?\""
2005306-58 = "É...!"
2005306-59 = "...Tcharam! #nUma colaboração entre moda e ninjutsu!"
2005306-60 = "Vou criar ninjutsus relacionados à moda e postar vídeos toda semana!"
2005306-61 = "Com esse conteúdo, vou atrair os espectadores..."
2005306-62 = "E, nesse meio tempo, se eu postar conteúdos ninjas de verdade..."
2005306-63 = "Todo mundo vai acabar se tornando um fã de ninjas sem nem perceber!"
2005306-64 = "Como um sapo sendo cozido aos poucos!"
2005306-65 = "[s] \"Que tipo de comparação é essa!?\""
2005306-66 = "Enfim, o briefing termina aqui...!"
2005306-67 = "Deixarei que os resultados falem por mim!"
2005306-68 = "Então, Sensei, pode ficar na expectativa!"
2005306-69 = "Vou me tornar uma influenciadora super famosa e te contratar como meu empresário!"
2005306-70 = "Dito isso, a conversa de hoje acaba aqui!#nAdios = SAYONARA!"
2005306-76 = "(Mesmo usando uma bomba de fumaça, deu para ver exatamente para onde ela foi...)"
2005306-78 = "(Alguns dias depois)"
2005306-80 = "(Enquanto eu organizava a pilha de documentos no limite do prazo...)"
2005306-81 = "Sensei..."
2005306-85 = "Me ajude..."
2005306-86 = "[s7] \"...Michiru! Você virou uma estrela e veio me buscar!?\"\n[s8] \"Me tire desse inferno de documentos...!\""
2005306-89 = "Hã!?#nNão, eu é que vim aqui porque queria que você me ajudasse...!"
2005306-90 = "[s] \"...Eh?\""
2005306-91 = "É que eu postei um vídeo misturando moda com ninjutsu outro dia..."
2005306-92 = "E a reação foi estranhamente ruim..."
2005306-93 = "Comparado aos vídeos anteriores, o número de avaliações negativas está enorme...!"
2005306-94 = "[s] \"Você chegou a verificar o vídeo e os comentários?\""
2005306-95 = "..."
2005306-96 = "É que... eu fiquei com medo..."
2005306-97 = "Por isso, pensei se você não poderia assistir comigo, Sensei..."
2005306-98 = "[s] \"Entendi, então vamos conferir.\""
2005306-99 = "Obrigada, Sensei..."
2005306-101 = "(E assim, decidimos assistir ao vídeo da Michiru)"
2005306-106 = "Hyakkiyako - Sala de aula no 38º prédio antigo"
2005306-107 = "Diário Ninja da Garota, Michiru-chi!"
2005306-108 = "Domo.#nEu sou Michiru."
2005306-109 = "Muito bem, o ninjutsu que vou apresentar hoje é... a \"Técnica de Troca Rápida de Roupa\"!"
2005306-110 = "Se usada corretamente, é um ninjutsu prático que permite trocar até roupas complexas em um instante!"
2005306-111 = "Ver para crer..."
2005306-112 = "Primeiro, vou mostrar um exemplo!"
2005306-113 = "Mas, por precaução..."
2005306-114 = "Harya!"
2005306-119 = "[ns] (A tampa da lente está... fechada?)"
2005306-121 = "E é isso, tcharam!"
2005306-122 = "Troquei de roupa num instante!"
2005306-123 = "Agora, vou revelar o truque..."
2005306-124 = "(Por causa da tampa na lente...)"
2005306-125 = "(...nada foi gravado até o final)"
2005306-126 = "Escritório do Schale"
2005306-127 = "..."
2005306-128 = "[ns] \"...\""
2005306-129 = "U-u-u-um erro tão básico assim...!!"
2005306-130 = "Nyaaaah!!"
2005306-136 = "(Talvez por estar chocada demais, ela desapareceu sem nem usar uma bomba de fumaça)"
