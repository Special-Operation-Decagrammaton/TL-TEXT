[translation]
1002605-1 = "視線"
1002605-2 = "（ネルが待っているという、ミレニアムの広場へと向かった）"
1002605-3 = "（元々生徒たちがたくさんいる場所なのだけど、何だか今日は普段以上に騒がしい）"
1002605-6 = "ねえねえ、何これ？何か面白いことでもあったの？"
1002605-7 = "わ、私もよく分からないんだけど……何かのイベント、みたいな？"
1002605-8 = "でも、今日は他のメンバーはいないし……なんであんな格好で……？"
1002605-9 = "……？ってあれ、C&Cの先輩……？"
1002605-10 = "え、なんでバニー姿で……。"
1002605-11 = "おぉ、先生。こっちこっち。"
1002605-16 = "……まあ時間通りだな、許してやる。"
1002605-17 = "[s1] \"……ネル？\"\n[s2] \"白昼堂々その格好、なかなかすごいね……。\""
1002605-18 = "やっぱ先生でもそういう反応すんのか。"
1002605-19 = "やっぱ先生でもそういう反応すんのか。"
1002605-20 = "ふーん、やっぱ目立つもんなんだな……。"
1002605-21 = "……ん？任務中？"
1002605-22 = "いや、別に？ただ何となく着てみただけだ。"
1002605-23 = "この靴も慣れてきて、それなりに普通に歩けるようになったからよ。"
1002605-24 = "とりあえず、その辺をてきとーに歩いてみっかなって。"
1002605-25 = "やっぱ何回も着てみねぇと分かんないこともあんだろーし。"
1002605-26 = "……ん？"
1002605-27 = "視線？"
1002605-28 = "いや、別に。"
1002605-29 = "確かに、いつもより見られてる気もするが……。"
1002605-30 = "にしても、やっぱり先生でもこの姿で目の前に現れると、ギョッとすんだな。参考になった。"
1002605-31 = "っていうか、どいつもこいつも物珍しそうに……見せもんじゃねぇっての。"
1002605-32 = "……あん？"
1002605-33 = "平然としてる？そりゃそうだろ、"
1002605-34 = "別に校則違反でもなければ、何かやべぇことをしてるわけでもねーし。"
1002605-35 = "それを言うなら、あたしらは普段からメイド服だしな。"
1002605-36 = "ま、どっちにしろ制服より楽だよ。あれ着るの、めちゃくちゃ息苦しいしな……。"
1002605-40 = "（ざわざわ……）"
1002605-43 = "あー、ったく……。"
1002605-44 = "だぁから、見せもんじゃねぇんだっての！さっさと散れ！！"
1002605-45 = "ひっ……！？"
1002605-49 = "それで逃げるなら、最初っから来んなっての。"
1002605-50 = "にしても……。"
1002605-51 = "んー……。"
1002605-52 = "[s3] \"……ネル？\"\n[s4] \"どうしたの？\""
1002605-53 = "……いや、何つーか。"
1002605-54 = "……いや、何つーか。"
1002605-55 = "先生的にこれって、どうなんだ？"
1002605-56 = "別に騒がれるのは良いんだけどよ、先生がどう思うかっつーか、変に見えるのかどうかっていうか……。"
1002605-57 = "……ん？"
1002605-58 = "すごくアリ……？"
1002605-59 = "……はっ、そうかよ。"
1002605-60 = "お世辞かどうかは分かんねぇけど、まあんなことはどうでも良いや。"
1002605-61 = "さーてじゃあ今日は授業も任務も終わってっし……。"
1002605-62 = "せっかくだしてきとーに、一緒に遊んでくか？先生。"
1002605-64 = "（その後ネルと夜まで、ミレニアム校内のあちこちで遊んでからシャーレへと戻った）"
1002605-65 = "（その間ずっと周りからの視線が突き刺さっていたけど、ネルが全く動じていなくて流石だった）"
