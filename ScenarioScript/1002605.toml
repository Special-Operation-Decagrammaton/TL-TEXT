[translation]
1002605-1 = "Olhares"
1002605-2 = "（Fui em direção à praça do Millennium, onde Neru estava me esperando）"
1002605-3 = "（É um lugar onde sempre tem muitos alunos, mas hoje está mais barulhento que o normal）"
1002605-6 = "Ei, ei, o que é isso? Aconteceu alguma coisa interessante?"
1002605-7 = "E-eu também não sei direito, mas... é tipo algum evento?"
1002605-8 = "Mas hoje não tem mais ninguém da equipe aqui... e por que ela está vestida assim...?"
1002605-9 = "……? Espera, aquela é a veterana da C&C...?"
1002605-10 = "Ué, por que ela está com roupa de coelhinha...?"
1002605-11 = "Ah, Sensei. Aqui, aqui."
1002605-16 = "……Bom, você chegou na hora, então vou te perdoar."
1002605-17 = "[s1] \"……Neru?\"\n[s2] \"Em plena luz do dia com esse traje, é algo bem impressionante...\""
1002605-18 = "Então até você tem esse tipo de reação, Sensei."
1002605-19 = "Então até você tem esse tipo de reação, Sensei."
1002605-20 = "Hmm, acho que realmente chama bastante atenção, né..."
1002605-21 = "……Hm? Está em missão?"
1002605-22 = "Não, por quê? Só resolvi vestir por vestir."
1002605-23 = "Já me acostumei com esses sapatos e agora consigo andar normalmente."
1002605-24 = "Pensei em dar uma volta por aí sem rumo."
1002605-25 = "Acho que tem coisas que a gente só entende se usar várias vezes."
1002605-26 = "……Hm?"
1002605-27 = "Olhares?"
1002605-28 = "Não, nada demais."
1002605-29 = "É verdade que sinto que estão me olhando mais do que o normal, mas..."
1002605-30 = "Ainda assim, até você se assustou quando apareci na sua frente assim, Sensei. Foi um bom parâmetro."
1002605-31 = "Quer dizer, todo mundo fica olhando como se eu fosse uma atração... eu não sou um espetáculo, sabia?"
1002605-32 = "……Ah?"
1002605-33 = "Se estou agindo naturalmente? Claro que estou,"
1002605-34 = "Não estou violando nenhuma regra escolar nem fazendo nada de errado."
1002605-35 = "Se for por isso, nós já usamos uniforme de empregada o tempo todo."
1002605-36 = "Bem, de qualquer forma, é mais confortável que o uniforme escolar. Aquele lá é sufocante demais..."
1002605-40 = "（Murmúrios...）"
1002605-43 = "Ah, droga..."
1002605-44 = "Eu já disse que não sou um espetáculo! Sumam daqui logo!!"
1002605-45 = "Hii...!?"
1002605-49 = "Se é para fugir assim, nem deveriam ter vindo desde o começo."
1002605-50 = "Ainda assim..."
1002605-51 = "Hmm..."
1002605-52 = "[s3] \"……Neru?\"\n[s4] \"O que houve?\""
1002605-53 = "……Não, é que..."
1002605-54 = "……Não, é que..."
1002605-55 = "O que você acha disso, Sensei?"
1002605-56 = "Não me importo com o barulho, mas... queria saber o que você pensa, se parece estranho ou algo assim..."
1002605-57 = "……Hm?"
1002605-58 = "Que combina muito...?"
1002605-59 = "……Hah, é mesmo?"
1002605-60 = "Não sei se é só educação, mas tanto faz."
1002605-61 = "Bom, já que as aulas e as missões acabaram por hoje..."
1002605-62 = "Que tal a gente passear um pouco por aí, Sensei?"
1002605-64 = "（Depois disso, passei o resto do dia com a Neru pelo campus do Millennium antes de voltarmos para o Schale）"
1002605-65 = "（Durante todo o tempo, os olhares das pessoas ao redor nos perseguiam, mas a Neru não se abalou nem um pouco, como esperado dela）"
