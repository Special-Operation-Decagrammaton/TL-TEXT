[translation]
2300208-1 = "アサガオの観察日記"
2300208-2 = "シャーレ・野外テラス"
2300208-3 = "いつもより早くシャーレに来てみたら、野外のテラスでハナエがジョウロを持っていた。"
2300208-4 = "ルンルン～♪いっぱい飲んで、すくすく育ってね～♪"
2300208-5 = "[s] \"早朝から何をしてるの？\""
2300208-6 = "あっ、先生。おはようございます！"
2300208-7 = "見ての通り、水やりをしてました！ここのテラスで、執務室に置けるような可愛いお花を育てようかなって！"
2300208-8 = "見に来るたびにぐんぐん育つお花たちが気になって、シャーレに着いたらまず真っすぐにテラスまで来ちゃいます。"
2300208-9 = "[s] \"なるほど。にしても、ずいぶん朝早くに来てるんだね？\""
2300208-10 = "だって、アサガオが咲いた姿は放課後には見られませんから！"
2300208-11 = "アサガオが咲いた姿をきちんと見るためには、ちゃんと朝早く起きなきゃいけないんです。"
2300208-12 = "見てください、先生。このアサガオのつぼみの感じからして、明日にはお花が咲くかもしれません。"
2300208-13 = "アサガオが満開になったら幾つか、シャーレの執務室に連れて行きますね！"
2300208-14 = "あっ。先生は、アサガオは好きですか？"
2300208-15 = "[s] \"うん、私も好きだよ。\""
2300208-16 = "えへへ、それは良かったです。"
2300208-17 = "では先生にも気に入ってもらえるよう、より丁寧に、心を込めてお世話しますね！"
2300208-19 = "その後、しばらくテラスでハナエと、アサガオのお手入れのやり方について話をした。"
