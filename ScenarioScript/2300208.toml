[translation]
2300208-1 = "Diário de observação das glórias-da-manhã"
2300208-2 = "Schale - Terraço ao ar livre"
2300208-3 = "Cheguei ao Schale mais cedo que o habitual e encontrei Hanae segurando um regador no terraço ao ar livre."
2300208-4 = "Lalala~♪ Beba bastante e cresça forte, tá bom?~♪"
2300208-5 = "[s] \"O que está fazendo tão cedo?\""
2300208-6 = "Ah, Sensei. Bom dia!"
2300208-7 = "Como pode ver, estou regando as plantas! Pensei em cultivar algumas flores bonitas aqui no terraço para colocar no escritório!"
2300208-8 = "Fico tão curiosa para ver como elas crescem a cada dia que, assim que chego ao Schale, venho direto para o terraço."
2300208-9 = "[s] \"Entendo. Mas você chegou bem cedo, não é?\""
2300208-10 = "É que não dá para ver as glórias-da-manhã florescendo depois da aula!"
2300208-11 = "Para conseguir ver as glórias-da-manhã desabrochando, preciso acordar bem cedo."
2300208-12 = "Olhe só, Sensei. Pelo estado dos botões, talvez elas floresçam amanhã."
2300208-13 = "Quando as glórias-da-manhã estiverem em plena floração, vou levar algumas para o seu escritório no Schale!"
2300208-14 = "Ah. Sensei, você gosta de glórias-da-manhã?"
2300208-15 = "[s] \"Sim, eu também gosto.\""
2300208-16 = "Ehehe, que bom."
2300208-17 = "Então, vou cuidar delas com ainda mais carinho e dedicação para que você também goste delas!"
2300208-19 = "Depois disso, passei um tempo no terraço conversando com Hanae sobre como cuidar das glórias-da-manhã."
