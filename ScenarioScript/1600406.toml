[translation]
1600406-1 = "こんな時の"
1600406-2 = "（待ち合わせ場所は、百鬼夜行のとある料理屋さんだった）"
1600406-3 = "（予約されているという部屋へと通してもらい、そこにはフィーナが座っていた）"
1600406-4 = "（……そのフィーナはどこか、普段とは違う雰囲気を纏っている）"
1600406-5 = "……いらっしゃいマシタか、センセイ。お待ちしておりマシタ。"
1600406-6 = "[s1] \"……？\"\n[s2] \"フィーナ？\""
1600406-7 = "このフィーナ、直接お伺いできず恐縮のキワミ……"
1600406-8 = "このフィーナ、直接お伺いできず恐縮のキワミ……"
1600406-9 = "こうしてワザワザお越しいただき、心より感謝しマス。"
1600406-10 = "[s3] \"えっと……？\"\n[s4] \"なんだかフィーナ、いつもと雰囲気が……。\""
1600406-11 = "今日は、特別デス。"
1600406-12 = "今日は、特別デス。"
1600406-13 = "先生との特別な儀式を行うため、この席を設けマシタ……。"
1600406-14 = "さあ、コレを……。"
1600406-15 = "[s5] \"……ウーロン茶？\"\n[s6] \"どうして急に？\""
1600406-16 = "……フフッ。"
1600406-17 = "……フフッ。"
1600406-18 = "急ではありマセン。今日はセンセイとワタシが……この絆をより強固にするための儀式を行う日。"
1600406-19 = "「盃事」、と言うやつデス。"
1600406-20 = "この盃を交わすことで、ワタシたちの間は遂に切っても切れない関係に……。"
1600406-21 = "……ハイ？"
1600406-22 = "中身がウーロン茶で良いのか……？"
1600406-23 = "……。"
1600406-24 = "そ、それはですね、何と言えば良いんデショウ……？"
1600406-25 = "その、つまり、エー……。"
1600406-26 = "お店の店主サンに、お酒はダメだと……。"
1600406-27 = "だから代わりに、これを……。"
1600406-28 = "や、やはり、ウーロン茶ではダメでしょうか！？"
1600406-29 = "たしかにどの映画でも、ウーロン茶は用いられていマセンでしたが……！"
1600406-30 = "で、デスが……！"
1600406-31 = "この状況、フィーナは一体どうすれば……！？"
1600406-32 = "……ハイ？"
1600406-33 = "お茶でも大丈夫、デスか？"
1600406-34 = "[s7] \"先生と生徒で、お酒はちょっとね。\"\n[s8] \"お酒そんなに好きじゃないから、お茶が嬉しいな。\""
1600406-35 = "あ……。"
1600406-36 = "あ……。"
1600406-37 = "そ、そうデシタか……。"
1600406-41 = "（興奮で立ち上がっていたが、落ち着いたフィーナが席に座る）"
1600406-42 = "で、ではあらためて！続けても良いんデスよね！？"
1600406-43 = "さ、さあセンセイ！どうぞお座りクダサイ！"
1600406-44 = "[ns] フィーナの向かい側に座る。"
1600406-48 = "こ、これは、誓いデス！命を賭けた、ワタシたちの……！"
1600406-49 = "い、至らない身ではありマスが、その、これからも……！"
1600406-50 = "……。"
1600406-52 = "……これからも、よろしくお願いいたしマス！！！"
1600406-56 = "[wa:500]― [log=피나]ふぅ……[wa:1700]なんだか少し、[/log]"
1600406-58 = "― [log=피나]から回ってしまった[wa:900]ようデスネ。[/log]"
1600406-61 = "[wa:300]― [log=피나]こうして落ち着いてみると、[/log]"
1600406-63 = "[wa:100]― [log=피나]何だか[wa:900]少々お恥ずかしいと[wa:1100]言いマスか……。[/log]"
1600406-66 = "[wa:200]― [log=피나]……フフッ。[wa:1500]実は……[wa:1600]前からずっと、[/log]"
1600406-68 = "[wa:100]― [log=피나]今日のこの日を[wa:1000]楽しみにしていたんデス。[/log]"
1600406-71 = "― [log=피나]ワタシ……[wa:1300]今日のこの日を[wa:1000]迎えられたこと、[/log]"
1600406-73 = "― [log=피나]本当に[wa:900]嬉しく思いマス。[/log]"
1600406-76 = "[wa:900]― [log=피나]……センセイはいつも、[/log]"
1600406-78 = "[wa:200]― [log=피나]ワタシが困った時に[wa:1400]導いてくれマシタ。[/log]"
1600406-81 = "― [log=피나]……今日だけでなく、[wa:1600]いつも。[/log]"
1600406-84 = "[wa:500]― [log=피나]大切なものは[wa:1000]何か、[/log]"
1600406-86 = "― [log=피나]自分のやり方とは[wa:1200]どうあるべきなのか……[/log]"
1600406-89 = "[wa:300]― [log=피나]センセイに会えず、[wa:1800]教えてもらえなかったら……[/log]"
1600406-91 = "[wa:300]― [log=피나]そう思うと、[wa:1200]胸が苦しくなりマス。[/log]"
1600406-94 = "[wa:700]― [log=피나]……ですから、[wa:1500]心から感謝してるんデス。[/log]"
1600406-96 = "[wa:400]― [log=피나]センセイ、[wa:1700]これからも[wa:500]フィーナを……[/log]"
1600406-99 = "……いえ。"
1600406-100 = "……私のことを、"
1600406-101 = "末永くよろしくお願いしマス。"
