[translation]
1600406-1 = "Num momento como este"
1600406-2 = "（O local de encontro era um certo restaurante em Hyakkiyako）"
1600406-3 = "（Fui levado até a sala reservada, e lá estava Phina sentada）"
1600406-4 = "（……Aquela Phina exala uma aura um pouco diferente do habitual）"
1600406-5 = "……Seja bem-vindo, Sensei. Estava à sua espera."
1600406-6 = "[s1] \"……?\"\n[s2] \"Phina?\""
1600406-7 = "Esta Phina sente-se profundamente envergonhada por não ter podido recebê-lo pessoalmente……"
1600406-8 = "Esta Phina sente-se profundamente envergonhada por não ter podido recebê-lo pessoalmente……"
1600406-9 = "Agradeço do fundo do coração por ter se dado ao trabalho de vir até aqui."
1600406-10 = "[s3] \"Bem……?\"\n[s4] \"Phina, você está agindo de um jeito meio estranho hoje……\""
1600406-11 = "Hoje é um dia especial."
1600406-12 = "Hoje é um dia especial."
1600406-13 = "Preparei este encontro para realizarmos um ritual especial com o Sensei……"
1600406-14 = "Vamos, pegue isto……"
1600406-15 = "[s5] \"……Chá Oolong?\"\n[s6] \"Por que de repente?\""
1600406-16 = "……Fufu."
1600406-17 = "……Fufu."
1600406-18 = "Não é de repente. Hoje é o dia em que o Sensei e eu…… realizaremos um ritual para fortalecer ainda mais nossos laços."
1600406-19 = "É o que chamam de \"troca de taças\"."
1600406-20 = "Ao bebermos desta taça, nossa relação se tornará finalmente inquebrável……"
1600406-21 = "……Hã?"
1600406-22 = "Tudo bem ser chá Oolong……?"
1600406-23 = "……"
1600406-24 = "I-isso é, como posso dizer……?"
1600406-25 = "Bem, ou seja, é que……"
1600406-26 = "O dono do restaurante disse que bebidas alcoólicas não eram permitidas……"
1600406-27 = "Por isso, em vez disso, trouxe isto……"
1600406-28 = "A-afinal, chá Oolong não serve!?"
1600406-29 = "É verdade que em nenhum filme eles usam chá Oolong, mas……!"
1600406-30 = "M-mas……!"
1600406-31 = "Nesta situação, o que a Phina deveria fazer……!?"
1600406-32 = "……Hã?"
1600406-33 = "Chá também serve, está bem?"
1600406-34 = "[s7] \"Entre sensei e aluno, álcool não seria bom mesmo.\"\n[s8] \"Eu não gosto muito de álcool, então fico feliz com o chá.\""
1600406-35 = "Ah……"
1600406-36 = "Ah……"
1600406-37 = "E-entendo……"
1600406-41 = "（Phina, que havia se levantado de empolgação, senta-se novamente, mais calma）"
1600406-42 = "E-então, recomeçando! Podemos continuar, certo!?"
1600406-43 = "V-vamos, Sensei! Por favor, sente-se!"
1600406-44 = "[ns] Sento-me de frente para Phina."
1600406-48 = "I-isto é um juramento! Um juramento que apostamos nossas vidas, o nosso……!"
1600406-49 = "E-embora eu ainda seja inexperiente, bem, daqui para frente……!"
1600406-50 = "……"
1600406-52 = "……Conto com você daqui para frente!!!"
1600406-56 = "[wa:500]― [log=피나]Ufa……[wa:1700]De alguma forma, acabei[/log]"
1600406-58 = "― [log=피나]me atrapalhando um pouco,[wa:900] parece.[/log]"
1600406-61 = "[wa:300]― [log=피나]Agora que me acalmei,[/log]"
1600406-63 = "[wa:100]― [log=피나]sinto-me um pouco[wa:900] envergonhada,[wa:1100] por assim dizer……[/log]"
1600406-66 = "[wa:200]― [log=피나]……Fufu.[wa:1500] Na verdade……[wa:1600] há muito tempo,[/log]"
1600406-68 = "[wa:100]― [log=피나]Eu estava esperando ansiosamente por este dia.[/log]"
1600406-71 = "― [log=피나]Eu... [wa:1300]poder ter chegado a este dia,[wa:1000][/log]"
1600406-73 = "― [log=피나]me deixa realmente [wa:900]feliz.[/log]"
1600406-76 = "[wa:900]― [log=피나]……O Sensei sempre,[/log]"
1600406-78 = "[wa:200]― [log=피나]me guiou quando eu estava [wa:1400]em apuros.[/log]"
1600406-81 = "― [log=피나]……Não apenas hoje, [wa:1600]mas sempre.[/log]"
1600406-84 = "[wa:500]― [log=피나]O que é importante,[wa:1000][/log]"
1600406-86 = "― [log=피나]e como eu deveria seguir [wa:1200]o meu próprio caminho……[/log]"
1600406-89 = "[wa:300]― [log=피나]Se eu não tivesse conhecido o Sensei [wa:1800]e ele não tivesse me ensinado……[/log]"
1600406-91 = "[wa:300]― [log=피나]Só de pensar nisso, [wa:1200]meu peito aperta.[/log]"
1600406-94 = "[wa:700]― [log=피나]……Por isso, [wa:1500]sou profundamente grata.[/log]"
1600406-96 = "[wa:400]― [log=피나]Sensei, [wa:1700]por favor, continue [wa:500]cuidando da Pina……[/log]"
1600406-99 = "……Não."
1600406-100 = "……Continue cuidando de mim,"
1600406-101 = "por muito tempo."
