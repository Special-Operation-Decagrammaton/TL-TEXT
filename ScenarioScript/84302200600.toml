[translation]
84302200600-5 = "Essa foi por pouco!"
84302200600-6 = "Se o Senpai não tivesse vindo, eu nem sei o que teria acontecido comigo agora!"
84302200600-7 = "Como esperado, a Neru-senpai é a melhor—"
84302200600-12 = "Gufh!!"
84302200600-13 = "Po-por que você me bateu!!!"
84302200600-14 = "Não vai me dizer que não sabe o porquê, vai?"
84302200600-15 = "Hã!? ...Você já sabe de tudo...?"
84302200600-16 = "Eu só sei da invasão não autorizada ao centro de dados."
84302200600-17 = "De qualquer forma, você está fazendo algo que vai te deixar encrencada, não está?"
84302200600-18 = "I-isso... talvez não seja o caso?"
84302200600-19 = "E então, o que você veio fazer aqui, afinal? Não é um lugar onde alguém como você deveria estar."
84302200600-20 = "Que horror! Eu sou do Seminar, sabia! Não acha que eu poderia ter algum assunto aqui?"
84302200600-21 = "Quem segue os procedimentos normais não é perseguido por drones de segurança."
84302200600-22 = "Você veio aqui para mexer em notas, contas ou algo do tipo, não foi?"
84302200600-26 = "...Ah."
84302200600-27 = "Então eu acertei..."
84302200600-28 = "Por favor, não conte nada para a Yuuka-senpai e a Noa-senpai!#nDessa vez é sério, eu estou realmente encrencada!"
84302200600-29 = "Se eu for pega de novo, vai ser o meu fim! Você sentiria minha falta se eu desaparecesse, não sentiria!?"
84302200600-30 = "Não seria mais fácil simplesmente não fazer isso desde o começo?"
84302200600-31 = "É que! A Yuuka-senpai disse que vai me obrigar a escrever uma carta de desculpas pelo que fiz este mês!"
84302200600-32 = "Então eu pensei: é só apagar os registros do banco de dados!#nSe não houver registro, não haverá motivo para escrever uma carta de desculpas!"
84302200600-37 = "Aaaaaah!! Você bateu de novo!!"
84302200600-38 = "...Você deveria mudar o seu jeito de pensar."
84302200600-39 = "E-e por que o Senpai está aqui, então!?"
84302200600-40 = "O Senpai também não deveria estar aqui, não é?"
84302200600-41 = "Isso, tive uma ideia! Senpai, vamos fazer um acordo!?"
84302200600-42 = "Se o Senpai me dedurar, eu também deduro você! É claro, se o Senpai ficar de bico fechado, eu também não direi nada!!"
84302200600-43 = "O que acha? Não é uma má ideia, né!? É um bom plano, não é!?"
84302200600-44 = "É mesmo?"
84302200600-48 = "Tudo bem, eu aceito."
84302200600-52 = "Hã, aceitou de cara!? Tem certeza!?"
84302200600-53 = "Capturar você não faz parte da minha missão desta vez."
84302200600-57 = "...Não, espere, essa é uma boa ideia."
84302200600-58 = "Você quer alterar os dados, não quer?"
84302200600-59 = "Ah, hã? Bem, sim, mas..."
84302200600-60 = "Entendo, entendo."
84302200600-61 = "O-o que... o que foi...!?"
84302200600-66 = "Hã, por que você está se aproximando...!?"
84302200600-67 = "...Não, não é nada demais."
84302200600-72 = "Codinome 'Coelho Branco'..."
84302200600-73 = "Que tal fazermos outro acordo?"
