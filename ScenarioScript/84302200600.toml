[translation]
84302200600-5 = "あっぶないところでした！"
84302200600-6 = "先輩が来てくれなかったら、今頃どうなってたことか！"
84302200600-7 = "やっぱ、ネル先輩がいちば――"
84302200600-12 = "ぐふっ！！"
84302200600-13 = "なっ、何でぶつんですか！！！"
84302200600-14 = "心当たりが無いとは言わせねぇぞ？"
84302200600-15 = "えーっ！？……全部バレちゃってますか……？"
84302200600-16 = "データセンターへの無断侵入くらいしか知らねぇけど。"
84302200600-17 = "どっちにしろ怒られるようなことしてんだろ？"
84302200600-18 = "そ、そんなことは……ないかもしれませんよ？"
84302200600-19 = "で、結局何しに来たんだよ？どう考えてもお前が来るような場所じゃねぇだろ。"
84302200600-20 = "ひどい！これでもセミナーなのに！用事があってもおかしくないと思いません？"
84302200600-21 = "正規の手順を踏んでる奴は、警備ドローンに追いかけられたりしねぇんだよ。"
84302200600-22 = "どうせ成績とか口座とか、なんかそんなのをいじりに来たんだろ？"
84302200600-26 = "……あー。"
84302200600-27 = "あってんのかよ……。"
84302200600-28 = "ユウカ先輩とノア先輩には絶対言わないでください！#n今度はほんっとーにヤバイんです！"
84302200600-29 = "今度バレたら流石に終わりですって！私がいなくなったら寂しいですよね！？"
84302200600-30 = "最初っからやらなきゃいいだけじゃねぇの？"
84302200600-31 = "だって！ユウカ先輩、「今月やったことの反省文を書かせる」って言うんですよ！"
84302200600-32 = "じゃあデータベースの記録を消せばいいやって！#n記録が無ければ、反省する内容も無くなりますからね！"
84302200600-37 = "ぎゃああああっ！！またぶった！！"
84302200600-38 = "……お前は考え方から改めたほうがいいぞ。"
84302200600-39 = "そ、そういう先輩は何でここにいるんですか！？"
84302200600-40 = "先輩もここにいちゃダメなんじゃないですか？"
84302200600-41 = "そうだ、その手があった！先輩、取引しませんか！？"
84302200600-42 = "先輩がチクったら私もチクります！もちろん、先輩が黙ってるなら私も言いません！！"
84302200600-43 = "どうですか悪くないですよね！？良い案ですよね！？"
84302200600-44 = "へえ？"
84302200600-48 = "いいぜ、乗ってやる。"
84302200600-52 = "えっ即決！？いいんですか！？"
84302200600-53 = "お前を捕まえることは、今回の任務に含まれてねぇからな。"
84302200600-57 = "……いや待て、その手があったか。"
84302200600-58 = "お前、データを修正してぇんだよな？"
84302200600-59 = "あっ、えっ？まぁ、そうですけど……。"
84302200600-60 = "なるほど、なるほど。"
84302200600-61 = "なっ……なんですか……！？"
84302200600-66 = "えっ、なんで近づいて……！？"
84302200600-67 = "……いや、大したことじゃねぇんだけどよ。"
84302200600-72 = "コードネーム「白兎」……。"
84302200600-73 = "もう一個、取引しねえか？"
