[translation]
10047090-1 = "第9話;作戦開始"
10047090-3 = "（時間は流れ、作戦当日……）"
10047090-10 = "マスター！ついにこの日が来ました！"
10047090-12 = "[ns] \"あれ？レナは？\""
10047090-13 = "レナちゃんは……今回は参加しません。"
10047090-14 = "今日は……他のとこで寝るってさ。"
10047090-15 = "仕方ありません、危険なのは本当ですから。"
10047090-16 = "それに、相手が信じないものを強要しても、芸術の発展につながるわけではありませんし。"
10047090-17 = "それぞれの感性を認めてこそ、前に進めるのです。"
10047090-22 = "にゅふふ。では、作戦を確認しながら夜を待ちましょうか。"
10047090-30 = "さあ、時は来ました。"
10047090-51 = "ふぁぁ～ねっむ……さっさとパトロール終わらせて寝よう……。"
10047090-52 = "だな。わざわざこんな明るい夜に、変なことするやつはいないだろ。"
10047090-58 = "にゅふふ。満月の夜は魔力が満ちる――#nそんな基本も知らないとは……。"
10047090-59 = "ともかく、監視の目が緩んでいるのは、チャンスですね。"
10047090-60 = "それじゃ……手はず通りに……。"
10047090-61 = "はいっ！各自、担当エリアに向かいましょう！"
10047090-62 = "無事に済んだら、合流ポイントで！"
10047090-63 = "みなさんに、魔法の加護があらんことを！"
10047090-68 = "[ns] （私も急いで移動しよう）"
10047090-73 = "[ns1] \"まず、ここからかな？\"\n[ns2] 魔法陣を描く材料を確認する。"
10047090-78 = "（地図に記された場所を掘ってみると、#nLEDのワイヤーライトと蓄光テープがたくさん出てきた）"
10047090-80 = "魔法陣は……LEDライトと蓄光テープで描いていくよぉ。"
10047090-81 = "ライトは信号を送れば点くようにしたからねぇ。"
10047090-82 = "どう、先生？ちゃんと安全な材料でしょ？イヒッ……。"
10047090-84 = "[ns3] \"……たしかに。\"\n[ns4] （寮監隊に気づかれる前に早く終わらせよう）"
10047090-102 = "（みんなで作業に励んだ）"
10047090-103 = "（全て順調かと思いきや……）"
10047090-105 = "[ns] \"ふぅ、あとは寮監隊の宿舎か……。\""
10047090-106 = "うん……？おい、そこ！誰だ！"
10047090-111 = "……あなたはシャーレの先生？こんな時間に何を？"
10047090-112 = "[s] \"えっと……そ、それがね……。\""
10047090-116 = "[ns5] \"あ！花壇をライトアップしたら、綺麗かなーって……！\"\n[ns6] \"つまり、芸術活動中……！\""
10047090-119 = "そんな予定は聞いていませんが……。"
10047090-123 = "こちらオウルスリー。今夜、野外活動の届け出は？"
10047090-127 = "……ラジャー。対応します。"
10047090-133 = "先生、以後はこちらの指示に従ってください。"
10047090-134 = "[ns] \"くっ……！\""
10047090-136 = "（同時刻……）"
10047090-159 = "先生、学院の各所から連絡が入っているのですが……#n404号室の奴らと何を企んでいたのですか？"
10047090-160 = "正直に話せば、情状酌量の余地も――"
10047090-161 = "[s] \"そ、それは……！\""
10047090-165 = "カァ！カァァッ！"
10047090-170 = "カラス？何を落としたんだ？"
10047090-174 = "……「寮の特別規則」？"
10047090-175 = "『万が一廃棄が容易でない場合……#n1階ロビーの赤い電話で「666」と押すべし』"
10047090-176 = "『専門家が現れ、本文書を廃棄する』……？"
10047090-177 = "666番は、特殊エージェントの秘密回線だぞ……漏れていたのか！？"
10047090-178 = "不吉な番号だから、誰も押さないと思っていたのに……！"
10047090-179 = "[ns7] （……チャンスだ！）\n[ns8] （よそ見をしてるうちに逃げよう！）"
10047090-185 = "あっ！待ってください！！"
