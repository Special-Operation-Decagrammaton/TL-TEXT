[translation]
10047090-1 = "Episódio 9: Início da Operação"
10047090-3 = "（O tempo passa, e chega o dia da operação...）"
10047090-10 = "Mestre! Finalmente este dia chegou!"
10047090-12 = "[ns] \"Ué? E a Rena?\""
10047090-13 = "A Rena... não vai participar desta vez."
10047090-14 = "Ela disse que... vai dormir em outro lugar hoje."
10047090-15 = "Não tem jeito, afinal, o perigo é real."
10047090-16 = "Além disso, forçar algo em quem não acredita não levará ao desenvolvimento da arte."
10047090-17 = "É reconhecendo a sensibilidade de cada um que podemos seguir em frente."
10047090-22 = "Nyufufu. Então, vamos esperar a noite chegar enquanto revisamos a operação."
10047090-30 = "Vamos lá, a hora chegou."
10047090-51 = "Yaaawn... que sono... vamos logo terminar essa patrulha e dormir..."
10047090-52 = "Pois é. Ninguém em sã consciência faria algo estranho numa noite tão clara assim."
10047090-58 = "Nyufufu. A noite de lua cheia é quando a magia atinge seu ápice...#nNão saber nem o básico assim..."
10047090-59 = "De qualquer forma, o fato de a vigilância estar relaxada é uma oportunidade."
10047090-60 = "Então... conforme o planejado..."
10047090-61 = "Sim! Cada um, sigam para suas áreas designadas!"
10047090-62 = "Se tudo correr bem, nos vemos no ponto de encontro!"
10047090-63 = "Que a proteção mágica esteja com todos vocês!"
10047090-68 = "[ns] （Eu também preciso me apressar）"
10047090-73 = "[ns1] \"Primeiro, começo por aqui?\"\n[ns2] Verificando os materiais para desenhar o círculo mágico."
10047090-78 = "（Ao cavar no local marcado no mapa, #nmuitas luzes de LED e fitas fotoluminescentes apareceram）"
10047090-80 = "O círculo mágico... vou desenhar usando luzes de LED e fita fotoluminescente."
10047090-81 = "Configurei as luzes para acenderem assim que receberem o sinal."
10047090-82 = "O que achou, Sensei? São materiais bem seguros, né? Ihi..."
10047090-84 = "[ns3] \"...Com certeza.\"\n[ns4] （Vamos terminar logo antes que o Comitê Disciplinar perceba）"
10047090-102 = "（Todos trabalharam duro na tarefa）"
10047090-103 = "（Quando parecia que tudo estava correndo bem...）"
10047090-105 = "[ns] \"Ufa, agora só falta o dormitório do Comitê Disciplinar...\""
10047090-106 = "Hum...? Ei, você aí! Quem está aí!"
10047090-111 = "...Você é o Sensei do Schale? O que está fazendo a esta hora?"
10047090-112 = "[s] \"Bem... é, sabe como é...\""
10047090-116 = "[ns5] \"Ah! Pensei que seria bonito iluminar o canteiro de flores...!\"\n[ns6] \"Ou seja, estou em uma atividade artística...!\""
10047090-119 = "Não fomos informados sobre tal planejamento..."
10047090-123 = "Aqui é Owl Three. Alguma notificação de atividade ao ar livre para esta noite?"
10047090-127 = "...Entendido. Vou lidar com isso."
10047090-133 = "Sensei, de agora em diante, siga nossas instruções."
10047090-134 = "[ns] \"Droga...!\""
10047090-136 = "（No mesmo instante...）"
10047090-159 = "Sensei, estamos recebendo relatos de várias partes da academia... #nO que vocês estavam planejando com o pessoal da sala 404?"
10047090-160 = "Se falar a verdade, talvez haja espaço para clemência..."
10047090-161 = "[s] \"I-isso é...!\""
10047090-165 = "Caw! Cawww!"
10047090-170 = "Um corvo? O que ele derrubou?"
10047090-174 = "...\"Regras Especiais do Dormitório\"?"
10047090-175 = "『Caso o descarte não seja fácil... #ndisque \"666\" no telefone vermelho do saguão do 1º andar』"

10047090-176 = "『Um especialista aparecerá para descartar este documento』...?"
10047090-177 = "O número 666 é a linha secreta dos agentes especiais... Como isso vazou!?"
10047090-178 = "Por ser um número agourento, achei que ninguém jamais discaria..."
10047090-179 = "[ns7] （...É a minha chance!）\n[ns8] （Vou fugir enquanto eles estão distraídos!）"
10047090-185 = "Ah! Espere, por favor!!"
