[translation]
10053030-1 = "第3話;幽霊バス"
10053030-5 = "うわぁ……。\r\n"
10053030-6 = "これ、大丈夫？\r\n"
10053030-11 = "本当にこの道で合ってるの？\r\n\r\n\r\n"
10053030-12 = "少なくとも地図上では正しいな。\r\n\r\n"
10053030-13 = "……騙されてるとかじゃないよね？\r\n\r\n\r\n"
10053030-14 = "信頼できるサイトで予約したし、今年のレビューも確認済みだ。\r\n"
10053030-15 = "この吊り橋が、山小屋に着く唯一のルートさ。\r\n"
10053030-16 = "渡ってる途中で切れたりしないよね……？\r\n\r\n\r\n\r\n"
10053030-20 = "まぁ、最悪落ちても下は川だし。泳げば渡れるっしょ。\r\n\r\n\r\n"
10053030-21 = "そんなわけないでしょ……。\r\n\r\n\r\n\r\n\r\n"
10053030-23 = "そこのお嬢さん方。\r\n\r\n\r\n"
10053030-28 = "もしや、向こうの山小屋に用があるのかね？"
10053030-30 = "こんなコテコテの展開あるんだ……。"
10053030-32 = "「あの山小屋」を目指しているのなら――"
10053030-33 = "やめておきなさい。"
10053030-35 = "えっ！？やっぱり詐欺なの！？騙された！？\r\n\r\n"
10053030-37 = "いいや、山小屋は確かに存在する。じゃが……泊まらない方がいい。"
10053030-38 = "理由は……言わなくても行けば分かるじゃろう。"
10053030-40 = "……！\r\n\r\n"
10053030-42 = "忠告はしたぞ。今からでも他所を探すことじゃな。"
10053030-48 = "ずいぶんと風変わりなご老人だな。"
10053030-49 = "まあいいか。#nさあ、急ごう。山は日が落ちるのが早い。"
10053030-50 = "いやいやいや！ちょっと待ってよ！#nまさか本当に行くつもり！？"
10053030-51 = "行かないのかね？\r\n"
10053030-52 = "「忠告」とか言ってたし……どう考えてもあたし達を「待ってた」感じじゃん！？\r\n"
10053030-53 = "コノカ君……。己を大切に思う気持ちは立派だ。だが――"
10053030-54 = "世界が自分を中心に回っていると思い込むのは、誇大妄想の始まりだよ。"
10053030-55 = "大丈夫、乗り越えられるさ。"
10053030-60 = "そういえば、コノカって結構怖がりだったわよね。\r\n"
10053030-61 = "この前なんて、ネットの怪談読んで眠れなくなった～って夜通し通話に付き合わされたし……。\r\n\r\n"
10053030-62 = "は！？絶対違うっすけど！？\r\n"
10053030-63 = "ほ、ほら！わざわざ忠告するってことは、相当危険なんじゃないかなーって……。\r\n"
10053030-64 = "ね、先生！先生も怪しいと思うっすよね！？"
10053030-65 = "[s1] \"たしかに……偶然にしては出来すぎてるかな……。\"\r\n[s2] \"ちょっと気にはなるかも。\""
10053030-68 = "やっぱそうっすよね！？\r\n"
10053030-70 = "……先に言っとくけど、この辺に他の宿はないよ。"
10053030-71 = "一番近いところでも歩いて1時間。"
10053030-72 = "げっ、それは嫌だな。"
10053030-73 = "もう腹をくくろう。#n当日キャンセルは返金されないんだし。"
10053030-75 = "先生は味方っすよね！？"
10053030-76 = "[ns3] \"歩いて1時間……。\"\r\n[ns4] \"タクシーなんて走ってないし……。\""
10053030-80 = "[ns] \"コノカ。\""
10053030-82 = "[ns] \"勇気を出さなきゃいけない時もあるんじゃないかな。\""
10053030-83 = "先生！？！？"
10053030-87 = "よし、行こう。幽霊が出ても、コノカ君は吾輩が守ってあげよう。\r\n"
10053030-88 = "ひぃ！やめて！そういうこと言うと「出る」んだから！\r\n\r\n\r\n\r\n"
10053030-89 = "言うだけで出るなら、とっくに観測されている。#nほら、手をつなごうじゃないか。\r\n"
10053030-90 = "わ、分かったから！引っ張らないで！自分のペースで歩くから！\r\n\r\n\r\n\r\n\r\n"
10053030-99 = "……中は思ったよりキレイなんだ。"
10053030-102 = "とんだあばら家を引かされたと思ったけど、意外と快適なんじゃない？\r\n"
10053030-103 = "れ、レナ……ここ……なんかゾクッとしない？\r\n"
10053030-104 = "……まださっきの引きずってるの？"
10053030-105 = "違うって！本当に感じるんだってば！#n空気が冷たいっていうか……！\r\n"
10053030-107 = "ふむ。局所的な低温――いわゆる「コールドスポット現象」か。#nたしかに幽霊が出現する時の典型的な兆候だ。"
10053030-112 = "だが、室内に不自然な温度変化は観測されていない。心配無用だよ。\r\n"
10053030-117 = "何それ、カメラ？\r\n"
10053030-118 = "正確には撮影機能付きの赤外線カメラだ。#nたとえ暗闇だろうと熱源を観測できる優れものさ。\r\n"
10053030-119 = "ガチすぎでしょ……。"
10053030-120 = "当然だろう？我々が追うのは、誰も捕らえたことのない伝説の生物なのだからね。"
10053030-121 = "さて、コノカ君。ここに異常は無い。安心してくれたまえ。"
10053030-123 = "さっすが所長！頼もしい～！\r\n"
10053030-124 = "ふふっ、プロだからな。\r\n"
10053030-129 = "……おや？先生、何か気になることでも？"
10053030-130 = "[ns5] \"いや、プロって言うから……。\"\r\n[ns6] \"部活動でやってるの？\""
10053030-133 = "……！\r\n"
10053030-134 = "そ、それは……良い質問だが……後にしよう！\r\n\r\n"
10053030-135 = "なにせ今は時間が惜しい！日が沈むと、今日1日を棒に振ってしまうからね！\r\n"
10053030-140 = "急にどうしたんすかね？"
10053030-141 = "部活の話はしたくない気持ち……私はめっちゃ分かる。\r\n"
10053030-142 = "[s7] \"あれ、2人も知らないの？\"\r\n[s8] \"ツバサがどんな部活に入ってるのか。\""
10053030-145 = "えっと……それは――\r\n"
10053030-149 = "あれ？思い返してみれば、ツバサのこと全然知らないっすね？"
10053030-150 = "当たり前じゃない？SNSの相互ってだけなんだから。"
10053030-151 = "[ruby=きぬい]衣斐[/ruby]レナ。ワイルドハント芸術学院の1年生、専攻はファッションデザイン。"
10053030-152 = "えっ、ちょっ、なに？\r\n"
10053030-156 = "学院内の寮の4棟、部屋番号は――"
10053030-157 = "不吉な……404号室に住んでる。#nルームメイトは先輩が3人。\r\n"
10053030-158 = "ん？ってことは、部屋番号だけじゃなくて人数も……うわ、縁起悪っ。\r\n"
10053030-159 = "ちょっと！なんで知ってるの！？#nまさか……ストーカー！？\r\n\r\n"
10053030-160 = "ちっちっち。SNSってのは情報の宝庫なんすよ。\r\n"
10053030-161 = "特にSNSなんてリアルタイムで色々呟くっしょ？#nぽろぽろと色々個人情報が漏れてくわけ。"
10053030-162 = "たとえばたまにアップする写真で自宅からコンビニまでの距離、通学路、坂道の有無――全部つなぎ合わせれば、#n寮の棟くらいは特定できるっすよ。"
10053030-163 = "へ、部屋番号までは分からないんじゃない！？"
10053030-164 = "前に「部屋番号がツイてない」って愚痴ってたじゃん？#n不吉な数字っていえば4か6。4棟住みなのは確実だし、そうなると404号室かな～って。#n606号室だとしても第4棟とは揃ってないし？"
10053030-165 = "……探偵？\r\n"
10053030-166 = "ん～惜しい！"
10053030-167 = "あたしは泣くスケバンも黙る公安局所属！#nだからこのくらいお茶の子さいさい～ってわけ。\r\n"
10053030-168 = "あ、本当にヴァルキューレだったんだ。#nただのファッションだと思ってたのに。"
10053030-169 = "え～「チンピラみたいでヴァルキューレっぽくない」って？"
10053030-170 = "そこまでは言ってないけど！？"
10053030-171 = "でも、少しは思ったんじゃない？"
10053030-172 = "違うってば！\r\n"
10053030-173 = "いや～でも全く考えてない訳じゃないでしょ～？#nほんの少しは思ったよねぇ？"
10053030-174 = "まぁ……ちょっとだけ……。\r\n"
10053030-175 = "せんせ～！レナがあたしのことチンピラって言いましたぁ！\r\n"
10053030-176 = "自分で誘導したんでしょ！！\r\n\r\n"
10053030-177 = "[s9] \"コノカ、レナをあんまりからかわないであげて。\"\r\n[s10] \"レナ、コノカは先輩なんだから……。\""
10053030-178 = "うっす！"
10053030-183 = "コノカの肩を持つの！？\r\n\r\n\r\n"
10053030-186 = "あぁもう！からかうのやめなさいってば！\r\n"
10053030-189 = "……報告によれば、ツチノコの目撃情報は白川山の渓流沿いに集中している。"
10053030-192 = "もしもツチノコが生物なら水辺の近くに生息していると考えるのが妥当だろう。#n加えて人の立ち入らない山や谷ならさらに可能性が高い。"
10053030-197 = "了解っす～！\r\n\r\n"
10053030-198 = "白川山ぁぁ～～白川山行きのバスはぁぁぁぁ～～"
10053030-202 = "……あれ？"
10053030-203 = "ここの路線、1日2本だけ？"
10053030-204 = "そんなもんでしょ。田舎だし。"
10053030-205 = "不便だ……。\r\n"
10053030-206 = "でもまぁ次が30分後だからまだマシかな。適当にだべってたらそのうち来るかぁ。"
10053030-211 = "おや？バスが来たみたいだ。\r\n"
10053030-212 = "おかしい。時刻表よりだいぶ早い……。"
10053030-217 = "……。\r\n"
10053030-220 = "…………。"
10053030-221 = "……はっ！"
10053030-222 = "まさか……！"
10053030-225 = "ツチノコに近づいたことで、失われたあたしの運勢が戻ってきたんだ！\r\n"
10053030-226 = "ヘビを追えっていうのは正しかったんだよ！"
10053030-231 = "こんなに早く来るの、運の良し悪しなのかな……。いや、偶然だよね。\r\n"
10053030-232 = "ちょっと待ってくれ。\r\n"
10053030-233 = "あのバスのナンバー……おかしいように思うのは吾輩だけかね？"
10053030-234 = "[s11] \"「し44‐66」……？\"\r\n[s12] \"なんか……不吉だね……。\""
10053030-237 = "知っているとは思うが、車のナンバーに「し」は使わない。#n[ruby=し]死[/ruby]を連想して縁起が悪いからね。\r\n"
10053030-238 = "しかも「44-66」だなんて……。"
10053030-239 = "あれ？もしかして……。\r\n"
10053030-240 = "何か知っているのかね？"
10053030-241 = "知ってるってほどじゃないけど……前にSNSで似た話が流行ってたの。\r\n"
10053030-242 = "幽霊が乗るバスだって……。\r\n"
10053030-243 = "幽霊……？"
10053030-244 = "よくある話。知らずに乗ったら幽霊だらけで、慌てて降りたとか……。"
10053030-245 = "寝過ごしたらキヴォトスそっくりの異世界に着いたとか……そういうよくある怪談話。"
10053030-246 = "しばらくそういう話がSNSで流行ってたのよ。"
10053030-247 = "で、その怪談に出てくるバスのナンバーが、どれも「し44-66」だったというわけか。"
10053030-251 = "た、たまたまでしょ！私は信じてないよ？\r\n"
10053030-252 = "昼間っから、初めて来た田舎で、怪談そっくりなバスが偶然来るとか……#n出来すぎてるから！"
10053030-253 = "だがもしも……目の前のあれが「本物」だとしたら……？"
10053030-254 = "……。"
10053030-259 = "乗らないんすかー？バス来てますけど～\r\n"
10053030-260 = "[ns13] \"そのバスじゃない気がする。\"\r\n[ns14] \"次のバスを待とう。\""
10053030-264 = "え？でもここには他の路線なんて……。"
10053030-265 = "……？\r\n"
10053030-266 = "なんだこれ。おかしいっすね。系統番号も行先表示もない……。"
10053030-267 = "すみませ～ん、運転手さん！このバス、白川山行きっすか？"
10053030-268 = "…………。\r\n"
10053030-269 = "もしも～し、聞こえてます？"
10053030-270 = "…………。\r\n"
10053030-274 = "怪しい……。"
10053030-275 = "……これは、出すしかないみたいっすね。\r\n"
10053030-277 = "出すって……銃？"
10053030-278 = "幽霊相手に喧嘩を売るのは得策ではない気がするが……。"
10053030-281 = "先生、コノカをしっかり見ていてください。"
10053030-282 = "「迷信」が絡むと、必ず「事件」を起こします。\r\n"
10053030-284 = "[ns15] （カンナの言ってた「事件」って……）\r\n[ns16] \"コノカ、一旦このバスは見送って――\""
10053030-289 = "いえ、先生。こういうときは、これが一番効くんすよ。"
10053030-290 = "やっぱこういう時に使わないと。"
10053030-295 = "[ns17] \"……それは？\"\r\n[ns18] \"生徒手帳？\""
10053030-298 = "いや～全然分かってないっすね。"
10053030-299 = "まぁ見ててください。キヴォトスで運転してる連中は、銃よりこれにビビるんすから。\r\n"
10053030-300 = "運転手さん、ヴァルキューレっす！免許証見せてもらってもいいっすか？\r\n"
10053030-302 = "…………。"
10053030-303 = "聞こえませんでしたか～？免許証の確認っすよ。#n拒否したら道路交通なんとか法の違反になるんで。切符切りますよ？"
10053030-305 = "…………。"
10053030-309 = "あっ！？おい！！こら、逃げんな！止まれって！\r\n\r\n"
10053030-314 = "……行っちゃった。"
10053030-315 = "幽霊でも、違反切符は怖いらしい……。\r\n"
10053030-317 = "ちぇっ……次に見つけたら覚えとけよ……。"
10053030-318 = "でも、よく怪しいって分かったっすね。見た目は普通のバスだったのに。"
10053030-319 = "[s19] \"レナが教えてくれたんだ。\"\r\n[s20] \"ツバサのおかげかな。\""
10053030-321 = "えっ！？そ、そうそう！なんか怪しかったっていうか……！\r\n"
10053030-322 = "（急に呼ばれたらびっくりするでしょ！？）\r\n"
10053030-327 = "ふーん？"
10053030-329 = "え？まぁ、これでも専門家だからな！そういう嗅覚があるというか……。\r\n"
10053030-330 = "へぇ？どうやって見分けるんだ？"
10053030-331 = "そ、それは……コノカ君にはまだ早いかな……！\r\n"
10053030-335 = "ふーん？"
10053030-342 = "あ、今度こそ本物っぽくないっすか？"
10053030-347 = "今度こそ……いや、別にさっきのが幽霊バスだったとか思ってないけど！？"
10053030-354 = "お待たせしました～足元お気をつけて～"
10053030-355 = "こんにちは。\r\n\r\n"
10053030-356 = "あの、ちょっと変な質問かもしれないんですけど……#nこの前にもバスって走ってますか？\r\n\r\n"
10053030-358 = "え？前に？それはおかしいですね。"
10053030-359 = "この路線、うちの1台しか走ってませんよ。"
10053030-360 = "……！？\r\n\r\n\r\n"
10053030-363 = "（――結局、あの怪しいバスはどこから来て、どこへ消えたのか。#n私たちは最後まで知ることはなかった。）"
