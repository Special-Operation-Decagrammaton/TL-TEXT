[translation]
51205-5 = "Configuração da transmissão OK..."
51205-9 = "Agora só falta――"
51205-14 = "Telefone...? ...Clube Yin-Yang?"
51205-18 = "Ué... desligaram."
51205-19 = "Será que não era nada importante...?"
51205-23 = "Pina, Umika! Vou deixar isso com vocês duas! #n Vou dar uma olhada no equipamento de transmissão!"
51205-25 = "Sim, presidente! #n Deixe com a gente! Vamos resolver isso com estilo!"
51205-26 = "Para corresponder às expectativas da presidente, vamos configurar tudo perfeitamente! "
51205-28 = "Eu já disse que não sou a presidente!"
51205-29 = "Poxa!"
51205-33 = "Então eu já volto!"
51205-38 = "Então, Umika, antes da meia-noite, movimento especial! #n Vamos começar os preparativos!"
51205-39 = "Sim, Pina!"
51205-45 = "――Finalmente vai começar."
51205-46 = "O desejo fervoroso que a família Kadenokouji não conseguiu realizar há 20 anos..."
51205-47 = "Ah, quão maravilhoso é isso! #n Sim, este é o caminho que a Kadenokouji deve trilhar!"
51205-48 = "......20 anos atrás."
51205-52 = "Ouvi dizer que no dia do festival que foi cancelado, a família Kadenokouji também estava programada para realizar a dança da Miko."
51205-53 = "Mas, no final, a dança não foi realizada, e o festival em si acabou sendo deixado de lado..."
51205-54 = "Por que será que isso aconteceu?"
51205-55 = "Ah... sobre isso... #n Digamos que é uma vergonha que isso seja conhecido por pessoas de fora..."
51205-56 = "Acredito que eu tenho o direito de saber..."
51205-57 = "......Hmm, é verdade. "
51205-58 = "Acho que o tempo já apagou isso."
51205-60 = "Como a senhorita disse, naquele dia, há 20 anos, a família Kadenokouji também iria dançar."
51205-61 = "No entanto, bem quando a dança estava prestes a começar..."
51205-64 = "A Miko-sama desapareceu de repente... #n e, no fim, não apareceu até o final do festival."
51205-67 = "Se foi devido à pressão do ritual..."
51205-68 = "Ou por causa de uma disputa familiar..."
51205-69 = "Como isso já ficou no passado, não sabemos o motivo ou as circunstâncias."
51205-70 = "Ficou apenas o registro de que, a partir daquele dia, a Miko-sama daquela época desapareceu."
51205-72 = "Isso é..."
51205-73 = "Sim, verdadeiramente..."
51205-75 = "É uma mancha na história da família Kadenokouji."
51205-79 = "Uma mancha...?"
51205-80 = "Ah, mas agora está tudo bem."
51205-81 = "Afinal, essa mancha será apagada hoje, após 20 anos, pela senhorita Yukari."
51205-82 = "......Entendo."
51205-83 = "Eh...?"
51205-84 = "O motivo para eu subir neste palco..."
51205-89 = "Certo! Os preparativos estão concluídos! "
51205-90 = "Sim! Por favor, suba assim mesmo!"
51205-92 = "Ah, já é essa hora."
51205-93 = "Então, Senhorita Yukari! Contamos com você!"
51205-94 = "Para limpar a mancha de 20 anos atrás e restaurar a honra dos Kadenokouji...! Por favor, nos mostre uma dança esplêndida!"
51205-101 = "(Desde o começo... a conversa sobre me quererem de volta em casa...)"
51205-102 = "(O motivo de precisarem de mim como a Miko da família Kadenokouji...)"
51205-103 = "(Foi apenas para apagar o fracasso―― a desonra de 20 anos atrás...?)"
51205-104 = "(Se era só para isso... por quê)"
51205-105 = "Por que eu..."
51205-107 = "Estou aqui...?"
51205-111 = "Eu entendo mui~to, mui~to bem esse seu sentimento, sabia? "
51205-117 = "Apesar de dizerem que precisavam tanto de você, no fim, o que eles precisavam era... de alguém para limpar a desonra de 20 anos atrás. Alguém para lavar o orgulho ferido deles!"
51205-118 = "Ninguém... ninguém mesmo! Ninguém se importa com os seus sentimentos ou com o que você está sofrendo."
51205-120 = "Ah, ah! Que garotinha lamentável você é... #n Está sofrendo, não está? Está frustrada, não está?"
51205-126 = "Essa sua emoção――"
51205-128 = "[log=???][ff4444]Eu quero devolver tudo na me~sma moeda―― não é o que você acha?[-][/log]"
51205-132 = "......Eu."
51205-135 = "Posso ouvir uma voz――"
51205-137 = "Próximo Episódio; Mesmo Assim, Para Você"
