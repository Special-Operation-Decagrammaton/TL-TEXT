[translation]
51205-5 = "Configuração da transmissão pronta..."
51205-9 = "E agora..."
51205-14 = "Um telefonema...? Do Departamento Yin-Yang?"
51205-18 = "Ué... a ligação caiu."
51205-19 = "Será que não era nada importante...?"
51205-23 = "Feena, Umika! Deixo isso com vocês! #nVou dar uma olhada nos equipamentos de transmissão!"
51205-25 = "Sim, chefe! #nDeixe conosco! Vamos fazer um trabalho incrível!"
51205-26 = "Vou configurar tudo perfeitamente para atender às expectativas da presidente!"
51205-28 = "Eu já disse que não sou presidente!"
51205-29 = "Ah, que droga!"
51205-33 = "Então, já vou indo!"
51205-38 = "Certo, Umika, antes que dê meia-noite, vamos começar! #nOs preparativos!"
51205-39 = "Sim, Feena!"
51205-45 = "— Finalmente vai começar."
51205-46 = "O desejo que a família Kadenokouji não conseguiu realizar há 20 anos..."
51205-47 = "Ah, que maravilhoso! #nSim, é este o caminho que a família Kadenokouji deve seguir!"
51205-48 = "...Há 20 anos."
51205-52 = "Ouvi dizer que, no dia do festival que foi cancelado, a família Kadenokouji também planejava realizar a dança da sacerdotisa."
51205-53 = "Mas a dança nunca aconteceu e o festival acabou sendo esquecido..."
51205-54 = "Por que será?"
51205-55 = "Ah... sobre isso... #nÉ um tanto vergonhoso para nós que outros saibam..."
51205-56 = "Acho que tenho o direito de saber..."
51205-57 = "...Não, você tem razão."
51205-58 = "Talvez já tenha passado tempo suficiente."
51205-60 = "Como a senhorita disse, naquele dia, há 20 anos, a família Kadenokouji também deveria ter dançado."
51205-61 = "No entanto, no momento em que a dança estava prestes a começar..."
51205-64 = "A sacerdotisa desapareceu repentinamente... #ne, no fim, não apareceu até o término do festival."
51205-67 = "Será que foi pela pressão do ritual..."
51205-68 = "Ou por causa de conflitos familiares..."
51205-69 = "Como já passou muito tempo, não sei os motivos ou as circunstâncias."
51205-70 = "A única coisa que restou nos registros é que, a partir daquele dia, a sacerdotisa da época desapareceu."
51205-72 = "Isso é..."
51205-73 = "Sim, é verdade..."
51205-75 = "É uma mancha na reputação da família Kadenokouji."
51205-79 = "Uma mancha...?"
51205-80 = "Ah, mas agora está tudo bem."
51205-81 = "Essa mancha, hoje, após 20 anos, será apagada pela senhorita Yukari."
51205-82 = "...É assim, então."
51205-83 = "Hã...?"
51205-84 = "O motivo pelo qual estou subindo ao palco..."
51205-89 = "Certo! Os preparativos terminaram!"
51205-90 = "Sim! Pode subir agora!"
51205-92 = "Ah, já está na hora, não é?"
51205-93 = "Então, senhorita Yukari! Contamos com você!"
51205-94 = "Para lavar a mancha de 20 anos atrás e recuperar a honra da família Kadenokouji...! Por favor, nos mostre uma dança magnífica!"
51205-101 = "(Desde o início... a história de querer que eu voltasse para casa...)"
51205-102 = "(O motivo de precisarem de mim como sacerdotisa da família Kadenokouji...)"
51205-103 = "(Era para apagar a falha — a desonra de 20 anos atrás...?)"
51205-104 = "(Se era apenas por isso... então por que)"
51205-105 = "Por que eu..."
51205-107 = "Você está aqui, não está...?"
51205-111 = "Esse seu sentimento, eu entendo muuuito, mas muuuito bem, sabe?"
51205-117 = "Depois de tanto dizerem que precisavam de você, no fim, o que eles queriam era... alguém para limpar o nome de 20 anos atrás. Alguém para lavar a honra deles!"
51205-118 = "Ninguém... absolutamente ninguém! Ninguém se importa com o que você sente, ou com o que está te fazendo sofrer."
51205-120 = "Ah, ah! Que pessoa tão lamentável você é...#nNão é doloroso? Não é frustrante?"
51205-126 = "Esse seu sentimento..."
51205-128 = "[log=???][ff4444]Você não acha que seria bom devolver tudo exatamente na mesma moeda?[-][/log]"
51205-132 = "......Eu."
51205-135 = "Uma voz pode ser ouvida..."
51205-137 = "Próximo episódio: Mesmo assim, para você"
