[translation]
51205-5 = "放送のセッティングOKっと……"
51205-9 = "後は――"
51205-14 = "電話……？……陰陽部？"
51205-18 = "あれ……切れちゃった。"
51205-19 = "特に用事があったわけじゃないのかしら……？"
51205-23 = "フィーナ、ウミカ！ここは2人に任せるわね！#n私はちょっと放送用の機材を見てくる！"
51205-25 = "はい、部長！#nお任せくだサイ！格好良くこなしてみせマス！"
51205-26 = "社長の期待に応えられるよう、完璧にセッティングしますね！ "
51205-28 = "だから社長じゃないってば！"
51205-29 = "もうっ！"
51205-33 = "それじゃ行ってきます！"
51205-38 = "それじゃウミカ、0時になる前に必殺！#n準備を始めマスよ！"
51205-39 = "はい、フィーナ！"
51205-45 = "――ついに始まるのですね。"
51205-46 = "20年前、[ruby=かでのこうじ]勘解由小路[/ruby]家が果たせなかった悲願を……"
51205-47 = "ああ、なんと素晴らしいのでしょう！#nそうです、これこそが勘解由小路が歩む道！"
51205-48 = "……20年前。"
51205-52 = "廃止となったお祭りの当日も、勘解由小路が巫女の舞をする予定だったとお聞きしました。"
51205-53 = "しかし最後まで舞は行なわれず、お祭り自体がうやむやになってしまった……と。"
51205-54 = "何故だったのでしょうか。"
51205-55 = "ああ……それは……#n外部に知られるのは恥と申しますか……"
51205-56 = "身共には聞く権利があると思いますが……"
51205-57 = "……ううん、そうですね。 "
51205-58 = "もう、時効でしょうか。"
51205-60 = "お嬢様のおっしゃる通り、20年前のあの日も、勘解由小路家が舞う予定でした。"
51205-61 = "しかし、舞が始まろうとしたその時……"
51205-64 = "巫女様が突如として行方を晦まし……#n結局、祭りの終わりまで姿を見せなかったのです。"
51205-67 = "儀式のプレッシャーによるものなのか……"
51205-68 = "それとも、家の確執のせいなのか……"
51205-69 = "今となっては過ぎたことなので、理由や事情は分かりませんが。"
51205-70 = "その日を境に、当代の巫女様は行方不明になってしまったという記録だけが残っています。"
51205-72 = "それは……"
51205-73 = "ええ、本当に……"
51205-75 = "勘解由小路家の汚点でございます。"
51205-79 = "汚点……？"
51205-80 = "ああ、でも今は大丈夫ですよ。"
51205-81 = "その汚点も、20年の時を経た今日、ユカリお嬢様が払拭してくださるのですから。"
51205-82 = "……そう、なのですね。"
51205-83 = "え……？"
51205-84 = "身共が舞台に立つ理由……"
51205-89 = "ヨシ！準備が終わりマシタ！ "
51205-90 = "はい！このままお上がりください！"
51205-92 = "あ、もうこんな時間なのですね。"
51205-93 = "それではユカリお嬢様！何卒よろしくお願いしますね！"
51205-94 = "20年前の汚点を[ruby=そそ]濯[/ruby]ぎ、勘解由小路の名誉を取り戻せるよう……！どうか素晴らしい舞をお見せくださいませ！"
51205-101 = "（最初から……家に戻ってきてほしいという話は……）"
51205-102 = "（勘解由小路の巫女として、身共を必要としていたのは……）"
51205-103 = "（20年前の失態を――不名誉を、払拭するため……？）"
51205-104 = "（それだけのことであれば……なぜ）"
51205-105 = "なぜ身共は……"
51205-107 = "ここにいるのでしょう……？"
51205-111 = "そのお気持ち、とてもとて～も理解できますよぉ？ "
51205-117 = "あれだけ必要だと言っていたのに、結局彼らが必要としていたのは……20年前の汚名を返上してくれる人。悔しさを晴らしてくれる人だったのです！"
51205-118 = "誰も……だぁれも！手前さんの気持ちなんて、手前さんが何に苦しんでいるのかなんて、興味がないのですよぉ。"
51205-120 = "ああ、ああ！なんてお可哀想な手前さん……#n苦しいのでしょ？悔しいのでしょ？"
51205-126 = "手前さんのその感情――"
51205-128 = "[log=???][ff4444]そのままそ～っくり返してやりたい――そうは思いませんかぁ？[-][/log]"
51205-132 = "……身共、は。"
51205-135 = "声が聞こえる――"
51205-137 = "次回;それでもあなたに"
