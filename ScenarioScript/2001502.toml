[translation]
2001502-1 = "O mascote do Clube de Treinamento"
2001502-2 = "Sinto que ultimamente tem aumentado o número de vezes que me chamam de \"estranha\"!"
2001502-3 = "Não é verdade, né, Sensei?"
2001502-4 = "[s1] \"É verdade.\"\n[s2] \"Será... que é?\""
2001502-5 = "Viu só! Eu adoro o fato de você sempre dizer isso, Sensei!"
2001502-6 = "[s3] \"Fico feliz em ouvir isso.\""
2001502-7 = "Hehehe! Bem, deixando isso de lado..."
2001502-8 = "Ei, que reação é essa~."
2001502-9 = "[s4] \"B-bem, não é nada legal ser chamado assim por um motivo ruim, né.\""
2001502-10 = "Sim, exatamente!"
2001502-11 = "De qualquer forma, sobre isso..."
2001502-12 = "Mesmo que a gente diga para essas pessoas que é um \"mal-entendido!\", isso não resolve o problema, né?"
2001502-13 = "Todo mundo só acredita no que quer acreditar..."
2001502-14 = "Para entender o que o outro sente de verdade, uma batalha intensa é o caminho mais rápido!"
2001502-15 = "...foi o que disseram na semana passada em \"Princesa Besouro Mushiqueen\"!"
2001502-16 = "[s5] \"Um anime, hein.\"\n[s6] \"Q-que será que eu digo...\""
2001502-17 = "Ué, uma reação inesperada. Não é bem assim?"
2001502-18 = "Ué, uma reação inesperada. Não é bem assim?"
2001502-19 = "Mas não tem problema, eu pensei em vários outros métodos!"
2001502-20 = "Ontem, enquanto jantávamos com o pessoal do Clube de Treinamento, tive um estalo!"
2001502-21 = "O que você acha que é? Como será que é? Ficou curioso~?"
2001502-22 = "[s] \"Estou curioso!\""
2001502-23 = "Fufu, sabia! Então, o que é...!"
2001502-24 = "Como você sabe, Sensei, eu sou fofa, inteligente e, além disso, sou o mascote super fofo do Clube de Treinamento, né?"
2001502-25 = "Então, pensei que seria uma boa ideia se eu fizesse o que chamam de \"relações públicas\"!"
2001502-26 = "O nome é: \"Grande Operação de Relações Públicas da Kaede, o Mascote do Clube de Treinamento\"!"
2001502-27 = "O que achou? Não parece bom? Com certeza vai ser um sucesso, né!?"
2001502-28 = "[s7] (Acho que ela disse \"operação\" duas vezes...)\n[s8] \"Que confiança...!\""
2001502-29 = "De qualquer forma, a partir de agora, você e eu somos parceiros unidos pela alma!"
2001502-30 = "De qualquer forma, a partir de agora, você e eu somos parceiros unidos pela alma!"
2001502-31 = "Então vamos começar a operação logo! Você vai me ajudar, né?"
2001502-32 = "[s] \"Sim, claro.\""
2001502-33 = "Oba, então vamos nessa!"
2001502-35 = "(E assim, junto com a Kaede, começou algo que parecia uma estratégia para melhorar a imagem do Clube de Treinamento)"
2001502-36 = "Primeiro, acho que seria bom mostrar o que o Clube de Treinamento faz no dia a dia e como somos úteis! Vamos fazer isso de um jeito mais chamativo! Mais legal!"
2001502-37 = "Primeiro, vamos recolher o lixo!"
2001502-38 = "[s] \"Muito bem.\""
2001502-39 = "Então aqui, pegue o pegador."
2001502-40 = "Usando isso..."
2001502-45 = "É só ir pegando o lixo assim, é fácil, né?"
2001502-46 = "Mas não baixe a guarda, não é estranho encontrar qualquer coisa em becos. Por exemplo, neste beco aqui, é comum..."
2001502-47 = "Ahhh!?"
2001502-48 = "[s] \"Kaede!?\""
2001502-49 = "O-olha só, Sensei!"
2001502-50 = "[s] \"Hum... um jogo de cartas colecionáveis?\""
2001502-51 = "Sim, são cartas de \"Mushiqueen\"! Ah, olhando bem, são todas cartas proibidas..."
2001502-52 = "É horrível jogar fora só porque não dá mais para usar!"
2001502-53 = "[s] \"Realmente, é verdade, jogadas em um beco como este...\""
2001502-54 = "O que acontece com os laços que foram criados com as cartas!? Os espíritos das cartas estão chorando!"
2001502-55 = "[s] \"É, v-você tem razão...\""
2001502-56 = "Ah, tem algo caído ali também...!"
2001502-59 = "（E assim, continuei a recolher o lixo junto com a Kaede por um tempo）"
2001502-64 = "É, acho que conseguimos juntar bastante!"
2001502-68 = "Será que agora o pessoal vai mudar de ideia sobre o Clube de Treinamento?"
2001502-69 = "[s9] \"É verdade que vocês se esforçaram, mas será que não é um pouco difícil conseguir isso tão rápido...?\"\n[s10] \"Acho que o importante é continuar fazendo isso aos poucos até que os resultados apareçam.\""
2001502-70 = "É mesmo!?"
2001502-71 = "É mesmo!?"
2001502-72 = "Hmm, divulgar as coisas é difícil, né..."
2001502-73 = "Mas não tem problema! Esse não é o único plano!"
2001502-74 = "O próximo é, hum..."
2001502-75 = "（Naquele momento, enquanto eu pensava na próxima ação junto com a Kaede...）"
2001502-76 = "Eu! Agora sou eu que vou subir~~!!"
2001502-77 = "Você acabou de trocar de lugar! Você podia me empurrar um pouco mais, né!?"
2001502-78 = "Mas agora é a minha vez! Eu vou subir de novo!!"
2001502-79 = "Espera um pouco aí!! Por que vocês estão brigando tanto?"
2001502-80 = "Ah, a moça do Clube de Treinamento."
2001502-81 = "Escuta, moça, a gente ia revezar no balanço, mas..."
2001502-82 = "Mentira, eu estou seguindo a vez!"
2001502-83 = "Ei, ei, não é divertido brigar entre irmãs, né? Se vocês brincarem juntas, vão conseguir se divertir muito mais!"
2001502-84 = "Vamos lá, peçam desculpas e voltem a brincar?"
2001502-85 = "Ah, tá bom..."
2001502-86 = "Desculpa..."
2001502-87 = "[s] \"Kaede, incrível!\""
2001502-88 = "Hehe, isso é normal para mim! A gente costuma brincar junto sempre!"
2001502-89 = "[s] \"Então vocês já eram amigas normalmente...!\""
2001502-90 = "Hmm, mas será que é difícil elas voltarem a brincar felizes tão rápido assim..."
2001502-91 = "Ah, tive uma ideia!"
2001502-95 = "Pronto, toma isso!"
2001502-96 = "O que é isso?"
2001502-97 = "Uma carta?"
2001502-98 = "Sim, achei agora pouco. Não dá para usar em torneios nem nada, mas que tal vocês duas brincarem com isso?"
2001502-99 = "Então, vou explicar as regras."
2001502-100 = "Primeiro, você faz isso... hum, fiquei com sede..."
2001502-101 = "[s] \"Esperem um pouco, vou comprar para todo mundo.\""
2001502-102 = "Sério!? Obrigada, Sensei!"
2001502-104 = "（Ao me dirigir à máquina de venda automática fora do parque...）"
2001502-105 = "Aquela ali é do Clube de Treinamento...?"
2001502-106 = "Ah, aquelas garotas estranhas..."
2001502-107 = "[s] （…………）"
2001502-108 = "Hehe. Brincar tão a sério com crianças pequenas, elas continuam sendo peculiares... mas, no fundo, são boas garotas."
2001502-109 = "Elas sempre se esforçam por toda a região de Hyakkiyako, afinal."
2001502-110 = "[s] （...É esse tipo de situação, então）"
2001502-114 = "Ora, de novo alguma coisa..."
2001502-116 = "Prestem atenção, quando for começar o 'Mushiking', vocês fazem essa pose!"
2001502-117 = "Se você fizer essa pose enquanto ataca o inimigo, o poder de ataque... não aumenta, mas parece que você fica mais forte!"
2001502-118 = "Oooooh!!"
2001502-119 = "Mushikiing..."
2001502-120 = "Ataaaaque!!!"
2001502-121 = "Mushikiing..."
2001502-122 = "Ataaaaque!!!"
2001502-124 = "Você é uma garota estranha mesmo..."
2001502-125 = "Ei..."
2001502-128 = "Ah, Sensei! De repente, um monte de gente se reuniu e estamos todos brincando!"
2001502-129 = "Ei, ei, mana Mushqueen!"
2001502-130 = "A mana é incrível!"
2001502-131 = "Ela não é só uma mana qualquer! De agora em diante, temos que chamá-la de Mestra Mushqueen!"
2001502-132 = "Mestra Mushqueen!!!"
2001502-133 = "Hehe!! Ei, Sensei, com isso, as atividades de relações públicas do Clube de Treinamento estão perfeitas, não estão!?"
2001502-134 = "[s] \"É, talvez...\""
2001502-135 = "(Em meio ao apoio fervoroso das crianças, não consegui dizer que o mal-entendido talvez tenha se aprofundado ainda mais)"
2001502-136 = "Ehehehe!"
