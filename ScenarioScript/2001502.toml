[translation]
2001502-1 = "修行部のマスコット"
2001502-2 = "最近また「変」って言われる回数が増えてる気がする！"
2001502-3 = "そんなことないのにね、先生！"
2001502-4 = "[s1] \"そうだね。\"\n[s2] \"そう……かも？\""
2001502-5 = "だよね！すぐそう言ってくれる先生のこと好き！"
2001502-6 = "[s3] \"それは嬉しいな。\""
2001502-7 = "えへへっ！まあそれはさておきー……"
2001502-8 = "えーなにその反応～。"
2001502-9 = "[s4] \"ま、まあ、悪い意味で言われるのは不本意だよね。\""
2001502-10 = "うん、そうそう！"
2001502-11 = "とにかく、それでなんだけどー……"
2001502-12 = "その人たちに「誤解だよ！」って言っても、それだけでOKってことにはならないでしょ？"
2001502-13 = "誰だって、信じたいことだけを信じるものだから……"
2001502-14 = "お互いの本心を理解するためには、燃え上るバトルが手っ取り早い！"
2001502-15 = "……って、先週の『甲虫王女ムシクイーン』で言ってた！"
2001502-16 = "[s5] \"アニメかー。\"\n[s6] \"ど、どうなんだろうね……？\""
2001502-17 = "あれ、予想外の反応。そういうものじゃないの？"
2001502-18 = "あれ、予想外の反応。そういうものじゃないの？"
2001502-19 = "でも大丈夫、それ以外にも色んな方法を考えてきたから！"
2001502-20 = "昨日修行部のみんなで晩ご飯を食べてる時に、ビビッと来たの！"
2001502-21 = "何だと思う？どんなことだと思う？気になる～？"
2001502-22 = "[s] \"気になる！\""
2001502-23 = "ふふっ、だよね！それが何かと言うと～！"
2001502-24 = "先生も知っての通り、私って可愛いし賢いし、その上すっごく可愛い修行部のマスコットじゃん？"
2001502-25 = "そんな私が、いわゆる「広報」ってやつをやれば良いんじゃないかなって！"
2001502-26 = "ずばり「修行部のマスコット、カエデちゃんの広報作戦大作戦」！"
2001502-27 = "どうどう？良さそうだと思わない？絶対に成功しそうでしょ！？"
2001502-28 = "[s7] （作戦って二回言った気がする……）\n[s8] \"すごい自信だ……！\""
2001502-29 = "とにかく今から、先生と私は魂で結ばれたパートナーね！"
2001502-30 = "とにかく今から、先生と私は魂で結ばれたパートナーね！"
2001502-31 = "じゃあ早速作戦、始めよっか！付き合ってくれるでしょ？"
2001502-32 = "[s] \"うん、もちろん。\""
2001502-33 = "やった、じゃあ出発～！"
2001502-35 = "（そしてカエデと一緒に、修行部のイメージアップ戦略のような何かが始まった）"
2001502-36 = "まずは修行部が日々どんなことをしてるのか、どんな風に役に立ってるのか、それを見せるのが良いと思うの！いつもよりこう、派手に！カッコよく！"
2001502-37 = "まずはゴミ掃除！"
2001502-38 = "[s] \"偉い。\""
2001502-39 = "じゃあはい、トング。"
2001502-40 = "これを使ってー……"
2001502-45 = "こうやってゴミを拾っていくの、簡単でしょ？"
2001502-46 = "でも油断しないでね、路地裏にはどんなものが落ちてても不思議じゃないの。たとえばこういう路地裏には、よく……"
2001502-47 = "ああっ！？"
2001502-48 = "[s] \"カエデ！？\""
2001502-49 = "み、見て先生！"
2001502-50 = "[s] \"えっと……トレーディングカードゲーム？\""
2001502-51 = "うん、「ムシクイーン」のカードたちだよ！あ、よく見ると禁止カードばっかり……"
2001502-52 = "もう使えないからって、捨てるなんてひどい！"
2001502-53 = "[s] \"たしかにそうだね、こんな路地裏に……。\""
2001502-54 = "カードと紡いできた絆はどうなるの！？カードの精霊たちが泣いてるよ！？"
2001502-55 = "[s] \"そ、それもそうだね……。\""
2001502-56 = "あ、あっちにも何かが落ちてる……！"
2001502-59 = "（そうしてしばらくカエデと一緒に、ゴミ拾いを続けた）"
2001502-64 = "うん、結構集まったかも！"
2001502-68 = "これでみんな、修行部のことを見直してくれるかな！"
2001502-69 = "[s9] \"頑張ったのはたしかだけど、すぐには難しいんじゃないかな……？\"\n[s10] \"こういうのは結果が出るまで、コツコツ続けるのが大事だと思うよ。\""
2001502-70 = "そうなの！？"
2001502-71 = "そうなの！？"
2001502-72 = "うーん、広報って難しいね……。"
2001502-73 = "でも大丈夫！作戦はこれだけじゃないから！"
2001502-74 = "次はね、えーっと……。"
2001502-75 = "（カエデと一緒に次の行動について悩んでいたその時……）"
2001502-76 = "わたしー！次はわたしが乗るの～～！！"
2001502-77 = "さっき代わったばっかりじゃん！もう少し押してくれても良いでしょー！？"
2001502-78 = "でも次はわたしの番なの！もう一回乗るの！！"
2001502-79 = "ちょぉっと待った―！！どうしてそんなに喧嘩してるの？"
2001502-80 = "あ、修行部のおねえちゃん。"
2001502-81 = "聞いてよおねえちゃん、順番にブランコに乗ろうとしてたのに……！"
2001502-82 = "違うもん、順番守ってるもん！"
2001502-83 = "ほらほら、姉妹でケンカしたら楽しくないでしょ？仲良く乗った方が、たくさん遊べるじゃん！"
2001502-84 = "ほら、ごめんなさいしてまた遊ぼう？"
2001502-85 = "う、うん……。"
2001502-86 = "ごめんなさい……。"
2001502-87 = "[s] \"カエデ、すごい！\""
2001502-88 = "ふふっ、これくらいいつものことだよ！普段からよく一緒に遊んでるし！"
2001502-89 = "[s] \"普通にお友達だったんだ……！？\""
2001502-90 = "うーん、でもまたすぐに楽しく遊ぶのも難しいのかなあ……。"
2001502-91 = "あ、良いこと思いついた！"
2001502-95 = "はい、これあげる！"
2001502-96 = "何これ？"
2001502-97 = "カード？"
2001502-98 = "うん、さっき拾ったの。大会とかじゃ使えないけど、次はふたり一緒にこれで遊ばない？"
2001502-99 = "それじゃあルールを説明するね。"
2001502-100 = "まずこれをー……んんっ、喉乾いてきちゃった……。"
2001502-101 = "[s] \"ちょっと待ってて、全員分買ってくるから。\""
2001502-102 = "ほんとに！？ありがとー先生！"
2001502-104 = "（公園の外にある自販機へと向かうと……）"
2001502-105 = "あれって、修行部の……？"
2001502-106 = "ああ、あの変な子たち……。"
2001502-107 = "[s] （…………）"
2001502-108 = "ふふっ。小さい子とあんなに本気で遊んで、相変わらず変わってる……けど、やっぱり良い子たちよね。"
2001502-109 = "普段から、百鬼夜行自治区のあちこちで頑張ってるものね。"
2001502-110 = "[s] （……そういう感じか）"
2001502-114 = "あら、また何か……"
2001502-116 = "よく見てて、『ムシクイーン』を始める時は、こういうポーズをするの！"
2001502-117 = "敵を攻撃しながらこのポーズをすると、攻撃力……は上がらないけど、何となく強そうだから！"
2001502-118 = "おおおっ！！"
2001502-119 = "ムシクイーーーン……"
2001502-120 = "アターーック！！！"
2001502-121 = "ムシクイーーーン……"
2001502-122 = "アターーック！！！"
2001502-124 = "やっぱり変な子ね……。"
2001502-125 = "ねぇ……。"
2001502-128 = "あ、先生！なんかいつの間にすごい集まってきて、みんなで遊んでるの！"
2001502-129 = "ねぇねぇ、ムシクィーンねえちゃん！"
2001502-130 = "ねぇちゃんすごい！"
2001502-131 = "ただのねえちゃんじゃないよ！これからはムシクィーン師匠って呼ばなきゃ！"
2001502-132 = "ムシクィーン師匠！！！"
2001502-133 = "えっへん！！ねえ先生、これで修行部の広報活動も完璧なんじゃないかな！？"
2001502-134 = "[s] \"そ、そうかもね……？\""
2001502-135 = "（子どもたちの熱烈な支持の中、さらに誤解が深まったかもしれないとは言い出せなかった）"
2001502-136 = "えへへへっ！"
