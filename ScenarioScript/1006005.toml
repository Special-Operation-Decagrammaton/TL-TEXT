[translation]
1006005-1 = "温泉開発部にお任せ！"
1006005-6 = "（仕事に区切りがついたから、シャワーを浴びるために居住区へ向かった)"
1006005-7 = "（冷水しか出ないことを思い出して、重い足取りで歩を進めていると……)"
1006005-13 = "[ns1] （……こんな時間に電話？）\n[ns2] \"メグ？\""
1006005-19 = "……あ、つながった！"
1006005-20 = "先生、まだシャーレだよね？#n電話に出られたってことは、仕事は大丈夫なのかな？"
1006005-21 = "[s3] \"うん、大丈夫だよ。\"\n[s4] \"シャーレだけど、どうしたの？\""
1006005-24 = "説明はあとでするから！時間がないの、先生！#nすぐに来て！！"
1006005-25 = "急いでるから早く！今すぐだよ！#nいい？場所は今から送るから！！"
1006005-32 = "[ns] \"……？？？\""
1006005-35 = "（メグから送られてきた場所は、シャーレからそう遠くない小さな山のふもとだった）"
1006005-45 = "（人影のない林道を抜け、目的地に到着すると……）"
1006005-51 = "[ns5] \"……もしかして。\"\n[ns6] \"あ、きっとメグだ。\""
1006005-59 = "……あっ、先生だ！#nお～～～いっ！"
1006005-60 = "せんせ～～～！#nここだよ～！こっちこっち！！"
1006005-61 = "[ns] 声がしたほうへ向かう。"
1006005-62 = "せんせ～～～い！！！"
1006005-65 = "[wa:600]― あ～！[wa:1000]やっぱ[wa:450]先生だったんだ！"
1006005-67 = "― 待ってたよ！"
1006005-70 = "― 忙しかった？[wa:1450]ごめん！"
1006005-72 = "― でも急いでて！"
1006005-75 = "[ns7] \"温泉……？\"\n[ns8] \"この温泉、メグが作ったの？\""
1006005-76 = "[wa:750]― ああ～[wa:550]それはそうなんだけど……"
1006005-77 = "[wa:750]― ああ～[wa:550]それはそうなんだけど……"
1006005-79 = "― これ、[wa:550]湧き続ける温泉じゃないんだ。"
1006005-82 = "― あと数時間しかなくて！"
1006005-84 = "― 枯れちゃう前に、[wa:1050]先生に来て欲しかったんだ！"
1006005-87 = "[wa:250]― ……え？[wa:950]そうだよ？"
1006005-89 = "― 一人で作ったよ！"
1006005-92 = "[wa:900]― こう見えても[wa:500]温泉開発部だし！"
1006005-95 = "― それに、[wa:750]お湯を求める人を"
1006005-97 = "― 見て見ぬふりなんて[wa:900]できないし。"
1006005-100 = "― なにより、"
1006005-102 = "― 先生が関わってるってなったらね！[wa:2200]……ひひっ！"
1006005-105 = "[wa:650]― ささ！[wa:400]遠慮しないで入って！"
1006005-107 = "― 今が[wa:250]一番いい温度だから！"
1006005-110 = "― メグ特製の[wa:1300]先生専用温泉だよ！！"
1006005-113 = "先生、どうしたの？"
1006005-114 = "そんなところでぼーっと突っ立って。#n入らなくていいの？"
1006005-115 = "え～？……いつから作ってたのかって？"
1006005-116 = "ん～、えっと……"
1006005-117 = "シャーレでお湯が出なくなったって知ったのが明け方だから……。"
1006005-118 = "……先生？"
1006005-119 = "そんな顔してどうしたの？"
1006005-120 = "……私？"
1006005-121 = "泥まみれになってるって？あははっ、当たり前じゃん。#n朝から大忙しだったからね！"
1006005-122 = "なになに、気にしないでって！#nこれくらい温泉開発部じゃいつものことだからさ！"
1006005-123 = "あっ、そうだ。せっかくだし、私も汗を流そっと♪#n先生も一緒に入るよね？"
1006005-124 = "2人くらいなら入れそうだし！#nちょっと狭いかもしれないけど……。"
1006005-125 = "……お先にどうぞって？#nえっ、私が？"
1006005-126 = "先生のために作ったのに……？"
1006005-130 = "うーん、よく分からないけど、先生がそう言うってことは何か理由があるんでしょ？#nまだ多少は源泉も余裕あると思うし……。"
1006005-131 = "じゃあ……お先に頂くね？#nちょっと待っててね、先生！！"
1006005-137 = "（その後、湯上がり姿のメグと交代して、温泉で1日の疲れを癒やした）"
1006005-138 = "（温泉開発部自慢の腕前で作られた温泉は、心まで温かくなっていくようだった）"
1006005-142 = "（帰り道に2人で歩きながらゴリゴリ君を食べた）"
