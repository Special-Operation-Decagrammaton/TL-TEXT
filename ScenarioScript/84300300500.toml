[translation]
84300300500-5 = "ミレニアムEXPOの破綻と……それによって発生する収益……。"
84300300500-6 = "空売りか、詐欺か……異なる何かか。いずれにせよ、考えられる稼ぎ方が多すぎるわね。"
84300300500-7 = "驚かないのか。"
84300300500-8 = "ええ。 "
84300300500-9 = "予想はしていたわ。それに備えるために来たようなものだから。"
84300300500-10 = "そして……結末は私たちに委ねられている。"
84300300500-14 = "今から状況を整理するわ。"
84300300500-15 = "現在、ミレニアムは「ミレニアムEXPO」という大規模なイベントの真っ只中。"
84300300500-16 = "けれど水面下では、安全な開催に支障をきたす可能性のある動きが確認されている。#n事態が表沙汰になる前に解決することが理想よ。"
84300300500-19 = "セイアには交流会の参加者という立場を活用して、#n会場とその周辺を調査してもらいたいの。"
84300300500-20 = "聞き込みをしてまわっても、貴女なら疑われることはないでしょう。#n黒幕につながる手がかりを調べる、重要な役割よ。"
84300300500-21 = "並行して私とネルは、より正確なデータの流れを掴むために、#nミレニアムのデータセンターを調査するわ。"
84300300500-24 = "すでにあちら側が動いている以上、無駄にできる時間は無い。#n……作戦を開始するわ。"
84300300500-28 = "作戦名は、そうね……「ヨーヨー作戦」でいきましょう。"
84300300500-32 = "……ヨーヨー？"
84300300500-33 = "陽動……ようどう……よーどー……ヨーヨー……。"
84300300500-34 = "冗談……では無さそうだね。"
84300300500-35 = "やっぱそう思うよな？まぁ慣れだ、慣れ。#nこいつと組むなら、これからもっと出てくるぞ。"
84300300500-36 = "慣れ……。"
84300300500-37 = "善処しよう。"
