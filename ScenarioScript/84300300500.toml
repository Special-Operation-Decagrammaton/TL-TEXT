[translation]
84300300500-5 = "O fracasso da Millennium EXPO e... os lucros gerados por isso..."
84300300500-6 = "Venda a descoberto, fraude... ou algo diferente? De qualquer forma, há formas demais de lucrar com isso."
84300300500-7 = "Você não está surpresa?"
84300300500-8 = "Sim."
84300300500-9 = "Eu já esperava por isso. Foi praticamente por isso que vim, para me preparar."
84300300500-10 = "E... o desfecho está em nossas mãos."
84300300500-14 = "Vou organizar a situação agora."
84300300500-15 = "Atualmente, a Millennium está no meio de um grande evento chamado 'Millennium EXPO'."
84300300500-16 = "No entanto, nos bastidores, foram confirmados movimentos que podem comprometer a segurança do evento.#nO ideal é resolver isso antes que a situação se torne pública."
84300300500-19 = "Quero que você use sua posição como participante da reunião social para investigar o local e seus arredores, Seia.#n"
84300300500-20 = "Mesmo que você saia por aí fazendo perguntas, ninguém suspeitará de você.#nÉ um papel importante para encontrar pistas que levem ao mentor por trás disso."
84300300500-21 = "Paralelamente, eu e Neru investigaremos o centro de dados da Millennium para obter um fluxo de dados mais preciso.#n"
84300300500-24 = "Já que o outro lado já está se movendo, não temos tempo a perder.#n...Iniciando a operação."
84300300500-28 = "O nome da operação será, vejamos... 'Operação Ioiô'."
84300300500-32 = "...Ioiô?"
84300300500-33 = "Diversão... não, digo, distração... ioiô..."
84300300500-34 = "Não parece ser uma piada..."
84300300500-35 = "Você também acha, né? Bem, é questão de costume. Se for trabalhar com ela, vai ouvir muito mais disso daqui para frente.#n"
84300300500-36 = "Costume..."
84300300500-37 = "Farei o possível."
