[translation]
10050050-1 = "Episódio 5: A Princesa do País do Inverno"
10050050-2 = "Algum ginásio"
10050050-4 = "A fila é por aqui! Ainda temos estoque disponível!"
10050050-8 = "Não corram! Mantenham a ordem!#nE, por favor, mantenham sigilo absoluto!"
10050050-11 = "Quem diria que o pessoal da Trinity nos ajudaria com a distribuição... Isso também deve ser o poder da 'cultura'. Mufufu."
10050050-12 = "Sim. Cultura... o 'soft power' tem seu maior charme no fato de mover as pessoas voluntariamente."
10050050-13 = "Já que estamos aqui, teria sido bom dar uma olhada na Biblioteca Central, dita como a maior de Kivotos, ou na biblioteca antiga..."
10050050-14 = "Uma oportunidade surgirá em breve. Entendo o porquê da crítica Takane ter se interessado."
10050050-15 = "A Chefe não está interessada?"
10050050-16 = "Não, nenhum pouco. Se eu pudesse fazer o que quisesse com elas e isso gerasse lucro, aí a história seria outra."
10050050-17 = "Digamos que não tenho tempo para dedicar a coisas que não têm potencial."
10050050-18 = "...Para quem diz isso, parece que você se dedica bastante à revisão e edição."
10050050-19 = "Não é apenas uma revisão ou edição, sabe? Estou polindo diamantes brutos. É a redescoberta do valor comercial."
10050050-20 = "E, como extensão disso... Takane, eu quero que você se esforce também!"
10050050-21 = "Ugh...! Vamos fazer aquilo de novo...?"
10050050-22 = "Se você realmente não quiser, não vou forçar... Mas, todos já sabem, não é?"
10050050-23 = "Princesa Ta-ka-ne?"
10050050-24 = "Hau!?"
10050050-26 = "Ah, é verdade. Princesa Takane! Gostaria de ouvir suas impressões sobre os volumes 3 e 4 desta vez."
10050050-27 = "Ha, hauui!? Tu-tudo bem... se minhas impressões forem o suficiente..."
10050050-28 = "Com certeza! Afinal, esta obra é rara em Trinity —"
10050050-29 = "Tem a persistência e o toque selvagem típicos de Red Winter, e é retratada de forma muito realista..."
10050050-30 = "Sente-se uma vontade forte, que não abre mão da beleza até o fim!#nÉ por isso que é tão popular!"
10050050-31 = "A única pessoa capaz de explicar a 'vontade' da obra de forma convincente é a Princesa Takane!"
10050050-32 = "E-e-eu fico feliz que diga isso, mas..."
10050050-33 = "Ora, que modéstia! Como esperado de Red Winter... não, a Princesa do País do Inverno é pura de corpo e alma!"
10050050-35 = "O que você pretende fazer com isso, Chefe!?#nEu sou apenas uma aluna comum de Red Winter!?"
10050050-36 = "Por que eu me tornei a 'filha caçula de uma família nobre falida de Red Winter'...!"
10050050-37 = "A resposta é simples, Takane. É claro que é porque..."
10050050-38 = "É isso que vende mais!"
10050050-39 = "Ouvi dizer que a Princesa Takane é a filha caçula de uma família nobre de Red Winter."
10050050-40 = "Após muitas reviravoltas, seguiu o caminho da falência..."
10050050-41 = "Toda a família foi expulsa de Red Winter após receber ordens de expulsão... É uma história de partir o coração."
10050050-42 = "S-sim. Agradeço a preocupação..."
10050050-43 = "Mesmo assim, graças a um acompanhante sério, apenas a Princesa Takane conseguiu sobreviver escondendo sua origem... É realmente incrível!"
10050050-44 = "Poder conversar com alguém que viveu uma vida tão cheia de altos e baixos, como uma história de livro..."
10050050-45 = "É uma verdadeira honra!"
10050050-46 = "(Afinal, baseei-me em histórias que li em livros...)"
10050050-47 = "Sinto muito pelo caso de suas irmãs... Bem, as iniciais das suas três irmãs e da Princesa Takane formavam 'OAMT' no diário, certo...? Mas todas vocês..."
10050050-48 = "Disseram que fotografia é um hobby, não é? Por favor, mostre-me algum dia!"
10050050-49 = "(Isso é a única coisa verdadeira... o resto é uma bagunça total)"
10050050-50 = "Na verdade, é a primeira vez que ouço uma crítica especializada. E vinda da boca de uma princesa..."
10050050-51 = "Tivemos sorte...! A propósito, há planos para publicar uma coletânea de críticas?"
10050050-52 = "Hum? Sinto cheiro de um novo negócio."
10050050-53 = "Parem com isso!!"
10050050-55 = "A-ah... ouvi falar daquele assunto através de um amigo e vim ver..."
10050050-56 = "Vá em frente, por favor. O importante é começar. Que tal um exemplar?"
10050050-57 = "O-obrigada...!"
10050050-58 = "...!!"
10050050-59 = "Q-que indecência é essa!?"
10050050-64 = "O-o que faremos, presidente? Será que está tudo bem……!?"
10050050-65 = "Está tudo bem, tudo bem. Ela vai voltar logo, logo. É um palpite."
10050050-66 = "Espero que sim……."
10050050-73 = "Não pode ser……!?"
10050050-74 = "Mufufufu."
10050050-75 = "Bem, não é como se eu tivesse voltado porque fiquei curiosa sobre o que vem a seguir, ou algo assim……."
10050050-76 = "É-é só que, já que comecei a ler, sinto que é meu dever acompanhar até o fim……."
10050050-77 = "Sim, sim! Com certeza. Eu entendo perfeitamente."
10050050-78 = "Ah…… muito obrigada. A continuação…… existe?"
10050050-79 = "Com certeza. Toda história merece uma continuação. Assim como o show deve continuar."
10050050-80 = "Na verdade, eu é que agradeço."
10050050-81 = "É, é mesmo?"
10050050-82 = "Se este livro tivesse continuado adormecido em Red Winter, tenho certeza de que ninguém teria reconhecido seu valor e ele teria sido esquecido para sempre."
10050050-83 = "……No ringue que é a prateleira, sem nem conseguir desferir um soco."
10050050-84 = "É revigorante perder, mas é uma situação triste quando você nem sequer tem a chance de lutar."
10050050-85 = "É, talvez você tenha razão……."
10050050-86 = "Sim! Para alguém como você, recomendo comprar duas cópias em vez de três."
10050050-87 = "Mas, dizem que o entendimento tácito aqui é de três cópias……."
10050050-88 = "Mas, espalhar a palavra é um pouco embaraçoso, não é? Duas não seriam o suficiente?"
10050050-89 = "E-então, por favor, me dê duas……."
10050050-91 = "——Portanto, é natural que surjam contradições ao excluir certas partes da vida e aceitar outras."
10050050-92 = "Não seriam justamente as coisas que sentimos vergonha e que são difíceis de discutir que explicam nossa essência de forma mais clara?"
10050050-93 = "Por exemplo, o \"amor\". Esse é um tópico que costuma ser tratado como difícil de discutir abertamente. No entanto, não há ninguém que não saiba que é um sentimento indispensável."
10050050-94 = "Porque, sem o amor…… vocês não estariam aqui hoje."
10050050-95 = "O mesmo vale para nossos corpos. Dizem que é um sinal de etiqueta de uma dama não falar sobre o que está sob as roupas, mas……."
10050050-96 = "Ainda assim, somos seres que vivem junto com nossos corpos."
10050050-97 = "E este livro tenta um diálogo direto, porém ativo, sobre essas contradições e os objetos que nos atraem."
10050050-98 = "Pode-se dizer que é uma obra-prima, imbuída de uma vontade pura que nos guia para um horizonte de percepção melhor."
10050050-99 = "Kyaaa~~!!"
10050050-100 = "Princesa Takane~~!!"
10050050-101 = "Como esperado de alguém tão nobre, é diferente!"
10050050-102 = "Podemos ser mais honestas com nós mesmas, não é……?"
10050050-103 = "(Meu estômago dói tanto que sinto que vou desmaiar……)"
10050050-108 = "Ora, um grande sucesso, pelo visto……."
10050050-109 = "Mas, parece que falta um pouco de algo…… hmm."
10050050-110 = "Com licença…… vocês não teriam um livro assim?"
10050050-111 = "Como seria esse livro?"
10050050-112 = "Bem……."
10050050-116 = "Hmm…… infelizmente, ainda não temos um livro que corresponda exatamente a isso……."
10050050-117 = "Entendo……."
10050050-118 = "Não…… espere…… \"ainda\" não tem?"
10050050-119 = "Espere um pouco! Talvez possamos dar um jeito!"
10050050-120 = "Sério!?"
10050050-121 = "Mas antes, você poderia me dar uma proposta de projeto?"
10050050-122 = "Proposta de projeto……? E-eu nunca fiz algo assim……."
10050050-123 = "Não se preocupe. Duas linhas já bastam. Algo como que tipo de personagem você quer ou que tipo de conteúdo seria legal, já serve."
10050050-124 = "E-entendido."
10050050-129 = "O que é agora? Yakumo. Não vai me dizer que parou de vender de repente, vai?"
10050050-130 = "Bem, com o que vendemos até ontem, conseguimos respirar um pouco. Vou te agradecer por isso."
10050050-131 = "Ora? Mel agradecendo por conta própria. E não se preocupe, as vendas continuam ótimas."
10050050-132 = "Deixando isso de lado, vou te enviar um esboço simples agora, então faça algo legal com ele. Quanto antes, melhor."
10050050-133 = "Hã? Por que eu? Você está tentando ganhar dinheiro com alguma coisa estranha de novo, não está?"
10050050-134 = "Escute bem, Meru. Estou recebendo pedidos no campo agora. Quanto mais rápido eu produzir isso, mais caro posso vender pelo preço que eu quiser!?"
10050050-135 = "……Em resumo, é uma comissão, né? Isso é um saco. Pedem demais, e depois que termina, ficam reclamando disso e daquilo……."
10050050-136 = "Não, é o oposto. Por isso recebi um esboço de duas linhas. Obviamente, está cheio de lacunas."
10050050-137 = "Essas lacunas…… você pode fazer o que quiser com elas, Meru!"
10050050-138 = "E você acha que o cliente vai ficar satisfeito com isso?!"
10050050-139 = "Com certeza vai. Porque a Takane vai convencer eles de que tudo faz sentido…… não, ela vai fazer uma crítica sobre isso."
10050050-141 = "Eu!?"
10050050-142 = "Meru, de certa forma, isso é uma criação original, não é?#nVocê sempre quis fazer uma criação original, não quis?"
10050050-143 = "!!!"
10050050-144 = "I-Isso é…… bem, é verdade, mas."
10050050-145 = "Claro, não é 100% original, mas há poucas exigências.#nO resto você pode fazer como quiser……."
10050050-146 = "Isso não pode ser considerado quase uma criação original?"
10050050-147 = "Claro, não é algo que se consegue do dia para a noite, mas……#nQue tal aproveitar esta oportunidade para dar um passo em direção ao seu objetivo?"
10050050-152 = "Eu topo!"
10050050-153 = "Ótimo, combinado. Então, por favor, faça o mais rápido possível."
10050050-154 = "Ah, droga, já vou começar agora mesmo! Então tá!"
10050050-158 = "Mais um caso resolvido…… mufufu."
10050050-159 = "……Mais uma vez, percebi que não se deve ter a presidente como inimiga."
10050050-160 = "Hmm~? Do que você está falando?"
10050050-162 = "Arredores da Trinity - Café"
10050050-163 = "Obrigada pelo trabalho duro, Sensei."
10050050-164 = "[s] \"Shimiko também deve ter tido bastante trabalho…….\""
10050050-165 = "Fufu, obrigada. Mas é uma pena que não tenhamos progresso."
10050050-166 = "[s] \"Qual será a causa……?\""
10050050-167 = "O que o Sensei acha?"
10050050-168 = "……."
10050050-169 = "Entendo. \"Parece que as alunas da Trinity estão protegendo os vendedores dos livros\"…… é isso?"
10050050-170 = "Entre nós, eu também pensei nisso. Talvez seja por isso que o Comitê de Justiça esteja com dificuldades."
10050050-171 = "Foi por isso que pedi para o Sensei vir até aqui, nos arredores da Trinity."
10050050-172 = "[s] \"Tem alguém que possa ajudar……?\""
10050050-173 = "Sim, provavelmente. E é alguém que o Sensei conhece bem.#nAh, falando nela, ali……."
10050050-178 = "Olá, Koharu-san."
10050050-179 = "Se-Se-Se-Sensei!? Por que o Sensei está aqui!?!?"
10050050-180 = "[s] \"Ué? É a Koharu.\""
10050050-181 = "Espere, se o Sensei está aqui, isso significa……."
10050050-182 = "Eu sabia……."
10050050-183 = "Eu sabia! É tudo culpa do Sensei, não é!#nNão pode me enganar, seu pervertido!!"
10050050-184 = "[s] \"Não! Desta vez, realmente não fui eu!\""
10050050-185 = "De-Desta vez!? Então todas as outras vezes foram culpa sua!? Pena de morte!!!"
10050050-187 = "[ns] \"Entendi, então foi por isso que a Koharu…….\""
10050050-188 = "Sim, a Koharu-san me entregou uma amostra. Graças a isso, consegui algumas pistas."
10050050-189 = "[s] \"A propósito, por que você não foi ao Comitê de Justiça, mas sim ao Comitê da Biblioteca?\""
10050050-190 = "I-Isso é……!"
10050050-191 = "Bem……."
10050050-192 = "De alguma forma, eu achei que todo mundo…… ficaria triste……."
10050050-193 = "Não tem outro motivo, tá!? Mesmo que todos tentem esconder os livros ou fingir que eles não existem……."
10050050-194 = "Mas…… parece que eles gostam desses livros……."
10050050-195 = "O-O Comitê de Justiça não é mau! Eles só estão fazendo o trabalho que lhes foi dado!"
10050050-196 = "Mas, além disso, acho triste tirar de todos um livro que tem tantos fãs..."
10050050-197 = "[s] \"Koharu, você também gosta desse livro?\""
10050050-198 = "P-por que você me meteu nisso?! Professor, seu idiota, pervertido, pena de morte!!"
10050050-199 = "E-e-eu não tenho interesse nenhum nesse tipo de coisa! De jeito nenhum!!"
10050050-200 = "Então, Koharu, quando o Comitê de Biblioteca conseguir todos os volumes, você gostaria de vir ver?"
10050050-201 = "Como uma \"elite\" do Comitê de Justiça, acho que deveria verificar o conteúdo."
10050050-202 = "……！"
10050050-203 = "Você sabe como as coisas funcionam! Já que não tem outro jeito, vou verificar especialmente para você!"
10050050-204 = "De forma alguma. Agradeço por tratá-lo com tanto cuidado."
10050050-205 = "N-não é nada! ...Aliás, todo mundo no Comitê de Biblioteca trata os livros assim?"
10050050-206 = "Sim. Todos nós. #nUm livro é como uma máquina do tempo."
10050050-207 = "[s] \"Uma máquina do tempo?\""
10050050-208 = "Sim. Uma máquina do tempo... falando metaforicamente, é claro."
10050050-209 = "O que você quer dizer com isso?"
10050050-210 = "Bem... existem muitos tipos de mídia no mundo, não é? Além dos livros."
10050050-211 = "Vídeos, filmes, jogos, música... #ne muitos outros que nem consigo listar."
10050050-212 = "Eles nos transmitem informações, histórias e, às vezes, emoções."
10050050-213 = "Dentre eles, a razão pela qual eu gosto de livros é... porque eles trazem paz ao coração."
10050050-214 = "Comecei a não entender nada..."
10050050-215 = "Filmes, jogos e vídeos exigem que você se concentre neles enquanto os assiste."
10050050-217 = "Eles tentam nos transmitir informações usando a visão, a audição e, às vezes, o tato."
10050050-218 = "Eles facilitam a imersão no mundo da história, mas..."
10050050-219 = "É justamente por isso que não permitem espaço para outras coisas."
10050050-220 = "Mas os livros são diferentes. De todas as mídias, são as que possuem mais limitações... #nÉ natural, já que um livro precisa expressar tudo com apenas algumas imagens e texto."
10050050-222 = "É verdade..."
10050050-223 = "É por isso que eles nos dão espaço para pensar. #nÉ uma mídia generosa, por assim dizer."
10050050-224 = "Para mim, o ato de ler um livro também é um diálogo com o passado."
10050050-225 = "Todos os escritores são pessoas que vieram do passado até o presente... por isso comparei a uma máquina do tempo."
10050050-226 = "[s] \"É verdade, os livros levam tempo para serem publicados, né?\""
10050050-227 = "Sim. Quando leio um livro, sinto como se o autor estivesse falando comigo de um passado distante."
10050050-228 = "Como eu disse antes, os livros nos dão o \"espaço para pensar por conta própria\"..."
10050050-229 = "Existe uma parte de mim que quer responder ao autor com meus próprios pensamentos e respostas..."
10050050-230 = "Acho que isso é algo realmente maravilhoso."
10050050-231 = "[s] \"Então é por isso que Shimiko cuida tão bem dos livros.\""
10050050-232 = "Sim. Por isso, talvez eu veja os livros não autorizados que estão circulando em Trinity..."
10050050-233 = "De uma forma um pouco mais favorável."
10050050-234 = "Embora eu seja uma péssima investigadora por pensar assim..."
10050050-235 = "M-mas eu... acho que tudo bem."
10050050-236 = "Koharu...?"
10050050-237 = "Bem, a parte rigorosa já é cuidada pelo Comitê de Justiça... então acho que não tem problema se pelo menos uma pessoa ficar do lado dos livros..."
10050050-238 = "[s] \"É isso aí, não existem pessoas más no mundo!\""
10050050-239 = "Isso mesmo! O Professor realmente entende!"
10050050-240 = "Obrigada. Professor, Koharu."
10050050-241 = "Aliás, como vamos resolver esse problema? Koharu, você descobriu algo desde então?"
10050050-242 = "Não... mas?"
10050050-243 = "Entendo... peço desculpas, talvez eu tenha te sobrecarregado."
10050050-244 = "Ah, não, por mim tudo bem, mas..."
10050050-245 = "[s] \"Hmm, se perguntar aos alunos não está funcionando...\""
10050050-246 = "O que foi, Professor? Lembrou de algo?"
10050050-247 = "[s] \"Koharu, posso te pedir um favor?\""
10050050-248 = "Um pedido? Por mim tudo bem, mas..."
10050050-249 = "M-mas nada de coisas indecentes! Eu não vou fazer isso de jeito nenhum!"
10050050-250 = "Acho que, pelo contexto, não vai chegar a esse ponto..."
10050050-251 = "Enfim!"
10050050-252 = "Hã? #n\"Quando as atividades do Comitê de Justiça se tornarem mais intensas, tente se aproximar das garotas do comitê\"...?"
10050050-253 = "M-mas agora eu não faço mais parte do Comitê de Justiça, não é...?"
10050050-254 = "[s] \"Não se preocupe, tenho certeza de que elas não vão se importar.\""
10050050-255 = "T-tá bom. Se o Sensei diz..."
10050050-257 = "Boa noite, Mashiro. Como está o progresso da investigação?"
10050050-258 = "...Peço perdão, está sendo mais difícil do que eu esperava..."
10050050-259 = "Sim, parece que sim. Já estou ciente da situação."
10050050-260 = "Se estiver difícil demais, o Chá das Cinco tomará as medidas necessárias, então não se sinta tão sobrecarregada."
10050050-261 = "(...!!)"
10050050-262 = "Sinto muito, Nagisa-sama! Deve ser preocupante, não é!"
10050050-264 = "Farei o meu melhor para encontrar, custe o que custar!! ...Com licença!"
10050050-268 = "Ma-Mashiro...!?"
10050050-272 = "Eu só pretendia dar um incentivo, mas..."
