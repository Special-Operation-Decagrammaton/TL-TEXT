1008403-59 = "[s3]\"Não, não é tanto um problema, mas ......\"\n[s4]\"Não seria mais rápido usar fósforos ou um isqueiro? \"\"\n[s3] \"s4]""

1008403-62 = "Sim, é mais eficiente dessa forma. ......"

1008403-63 = "Para registrar o processo de crescimento gradual de uma pequena faísca, é melhor acendê-la com um método de fricção."

1008403-64 = "Além disso, o som da madeira sendo raspada é uma das melhores partes de uma fogueira. #nNão pule esse processo."

1008403-65 = "[s]\"Se Kotama disser, não vou impedi-lo, mas ......\""

1008403-69 = "Agora vamos acender a fogueira novamente."

