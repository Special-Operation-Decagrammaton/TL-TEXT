[translation]
1008403-1 = "Sons da natureza (1)"

1008403-4 = "(No fim de semana seguinte, fui novamente às montanhas próximas...)"

1008403-7 = "(...encontrei Kotama novamente)"

1008403-8 = "[s] \"Kotama...\""

1008403-12 = "um."

1008403-13 = "Isto é... aquele mal-entendido."

1008403-14 = "[s] \"...Você está aqui para gravar a conversa do casal novamente?\""

1008403-15 = "Não! Eu definitivamente não tinha esse propósito hoje...!"

1008403-16 = "[s] \"Mas... é um gravador, certo?\""

1008403-17 = "Isso é, ah..."

1008403-18 = "Trouxe-o para gravar sons naturais, não vozes humanas."

1008403-19 = "[s] \"...Sons da natureza?\""

1008403-20 = "Sim, nas montanhas você pode ouvir vários sons naturais como o chilrear dos pássaros, o som da água corrente, o sussurro do vento, etc. que ajudam a acalmar a mente e o corpo..."

1008403-21 = "私が普段から聴いているプレイリストにも、こういった環境音がたくさん含まれています。"
1008403-22 = "No entanto, os sons ambientais são difíceis de gravar e muitos usam recursos gratuitos compartilhados na Internet..."

1008403-23 = "Vim me gravar para obter novos estímulos."

1008403-24 = "[s1] \"Parece que vai ser divertido.\"\n[s2] \"Não parece Kotama...mas é claro que estou falando sério no bom sentido!\""

1008403-26 = "O que você quer dizer com “não gosta de mim”?"

1008403-27 = "[s] \"Então, o que exatamente vamos gravar hoje?\""

1008403-28 = "Nesta época do ano, seria o som do chilrear dos pássaros da montanha ou o som de pisar na neve..."

1008403-29 = "Falando em inverno, não dá para perder o som de uma fogueira."

1008403-30 = "Ouvir o som de uma fogueira enrolado em um cobertor fará com que você adormeça como se estivesse balançando em uma cadeira em frente à lareira."

1008403-31 = "Então hoje vou gravar aqui cercando uma pequena fogueira."

1008403-32 = "[s] \"Tudo bem fazer uma fogueira aqui?\""

1008403-33 = "Sim, entrei em contato com a instalação próxima. Parece não haver problema se estiver dentro do acampamento."

1008403-34 = "Também preparei um extintor de incêndio caso algo acontecesse."

1008403-35 = "[s] \"Você está pronto.\""

1008403-36 = "...Seria indesejável fazê-lo sem permissão e causar ruído."

1008403-40 = "Agora vamos preparar a fogueira."

1008403-43 = "Se você coletar folhas mortas e galhos finos e torná-los em formato triangular..."

1008403-47 = "Coloque uma vara fina em uma placa de madeira fixa ......"

1008403-48 = "Se você girá-lo rapidamente com as duas mãos..."

1008403-53 = "[ns] \"E-espere um minuto, Kotama.\""

1008403-57 = "Houve algum problema?"

1008403-58 = "Por favor, diga-me agora, pois precisarei ficar quieto quando a gravação começar."

1008403-59 = "[s3] \"Não, não é realmente um problema...\"\n[s4] \"Não seria mais rápido usar fósforos ou um isqueiro?\""

1008403-62 = "Claro, é mais eficiente, mas..."

1008403-63 = "Para registrar o processo de uma pequena faísca que cresce gradualmente, é melhor acendê-la usando um método de fricção."

1008403-64 = "Além disso, o som da madeira raspando é uma das melhores partes de uma fogueira. #nNão pule esta etapa."

1008403-65 = "[s] \"Se Kotama diz isso, não vou impedi-lo...\""

1008403-69 = "Agora, vamos criar uma faísca novamente."

1008403-71 = "(30 minutos depois...)"

1008403-78 = "Grrr..."

1008403-82 = "Por que não há fumaça alguma..."

1008403-83 = "Quase consigo sentir meu braço..."

1008403-84 = "[s] \"Kotama, a voz...\""

1008403-88 = "……um."

1008403-89 = "O que eu fiz... tenho que editar e cortar depois..."

1008403-90 = "[s] \"Por que você não usa fósforos logo?\""

1008403-95 = "Não!"

1008403-96 = "Isso não o torna um som natural!"

1008403-97 = "Além disso, se eu desistir daqui... todos os meus esforços serão em vão."

1008403-98 = "Só mais um pouco... só mais um pouco de esforço...!"

1008403-100 = "(...No entanto, não pegou fogo mesmo depois de mais de uma hora.)"

1008403-104 = "……."

1008403-105 = "…………."

1008403-106 = "[s5] \"Vai esfriar logo.\"\n[s6] \"Vamos acender uma fogueira, ok?\""

1008403-113 = "Sim... por favor."

1008403-119 = "……É quentinho."

1008403-120 = "[s] \"Está quente.\""

1008403-121 = "Calor que pode ser facilmente obtido usando as ferramentas da civilização...#nÉ tão difícil criá-lo com suas próprias mãos..."

1008403-122 = "Afinal, a natureza nem sempre sai como planejado..."

1008403-124 = "(Depois, me aqueci com Kotama enquanto apreciava a dureza da natureza.)"

