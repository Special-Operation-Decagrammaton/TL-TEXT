[translation]
1008403-1 = "自然の音（１）"
1008403-4 = "（次の週末、再び近くの山に足を運んだところ……）"
1008403-7 = "（……またコタマに出会った）"
1008403-8 = "[s] \"コタマ……\""
1008403-12 = "あ。"
1008403-13 = "これは、その……誤解です。"
1008403-14 = "[s] \"……またカップルの会話を録音しに来たの？\""
1008403-15 = "違います！今日は決してそのような目的では……！"
1008403-16 = "[s] \"でも……それ、録音機だよね？\""
1008403-17 = "これは、ええと……"
1008403-18 = "人の声ではなく、自然の音を録音するために持ってきたんです。"
1008403-19 = "[s] \"……自然の音？\""
1008403-20 = "はい、山では鳥の鳴き声や水の流れる音、風のささやきなど……#n心身を落ち着かせるのに役立つ様々な自然の音が聞こえてきますから……"
1008403-21 = "私が普段から聴いているプレイリストにも、こういった環境音がたくさん含まれています。"
1008403-22 = "しかし、環境音は録音するのが難しく、多くはインターネット上に共有されている無料アセットを使っているので……"
1008403-23 = "新しい刺激を得るために、自分で録りに来たのです。"
1008403-24 = "[s1] \"なんだか楽しそうだね。\"\n[s2] \"コタマらしくないような……もちろん良い意味だけど！\""
1008403-26 = "私らしくないとは、一体どういう意味でしょうか……"
1008403-27 = "[s] \"それで、今日は具体的に何を録音するの？\""
1008403-28 = "今の時期でしたら、山鳥の鳴き声や積雪を踏む音などですが……"
1008403-29 = "やはり、冬といえば焚き火の音も外せません。"
1008403-30 = "毛布に包まれながら焚き火の音を聴いていると、暖炉の前でチェアに揺られているような気持ちで眠れるのです。"
1008403-31 = "なので今日は、ここで小さな焚き火を囲いながら録音しようと思います。"
1008403-32 = "[s] \"ここって焚き火をしても大丈夫なの？\""
1008403-33 = "はい、近くの施設に問い合わせておきました。キャンプ場の敷地内なら問題ないそうです。"
1008403-34 = "もしもの場合に備えて、消火器も用意してきました。"
1008403-35 = "[s] \"準備万端だね。\""
1008403-36 = "……無断でやって雑音が混ざるのは不本意ですから。"
1008403-40 = "では、焚き火の準備をしましょう。"
1008403-43 = "枯れ葉や細い枝を集めて三角の形にしたら……"
1008403-47 = "固定した木の板に細い棒を立てて……"
1008403-48 = "両手で素早く回転させると……"
1008403-53 = "[ns] \"ち、ちょっと待って、コタマ。\""
1008403-57 = "何か問題でもありましたか？"
1008403-58 = "録音を始めてからは静かにする必要があるので、今のうちに言ってください。"
1008403-59 = "[s3] \"いや、問題ってほどでも無いけど……\"\n[s4] \"マッチやライターを使った方が早くないかな？\""
1008403-62 = "たしかに、その方が効率的ではありますが……"
1008403-63 = "小さな火種が徐々に大きくなる過程を録音するためには、摩擦式で発火させる方が良いのです。"
1008403-64 = "それに、木を擦る音も焚き火の醍醐味ですから。#nこの過程を飛ばしてはいけません。"
1008403-65 = "[s] \"コタマがそう言うなら、止めはしないけど……\""
1008403-69 = "では、もう一度火種を作っていきましょう。"
1008403-71 = "（30分後……）"
1008403-78 = "ぐっ……ぅ……"
1008403-82 = "まったく煙が発生しないのは何故でしょう……"
1008403-83 = "そろそろ、腕の感覚が……"
1008403-84 = "[s] \"コタマ、声が……\""
1008403-88 = "……あ。"
1008403-89 = "私としたことが……後で編集してカットしなければ……"
1008403-90 = "[s] \"そろそろマッチを使わない？\""
1008403-95 = "いけません！"
1008403-96 = "それでは自然の音になりません！"
1008403-97 = "それに、ここで諦めたら……今までの努力が水の泡になってしまいます。"
1008403-98 = "あと少し……あと少し頑張れば……！"
1008403-100 = "（……しかし、1時間以上経過しても火はつかなかった）"
1008403-104 = "……。"
1008403-105 = "…………。"
1008403-106 = "[s5] \"そろそろ寒くなってきたね。\"\n[s6] \"火、つけるね？\""
1008403-113 = "はい……お願いします。"
1008403-119 = "……暖かいですね。"
1008403-120 = "[s] \"暖かいね。\""
1008403-121 = "文明の利器を使えば、こうも簡単に手に入る温もりも……#n自分の手で起こすとなると、こんなにも難しいなんて……"
1008403-122 = "やはり、自然とは思い通りにいきませんね……"
1008403-124 = "（その後、コタマと一緒に自然の厳しさを嚙みしめながら暖を取った）"
