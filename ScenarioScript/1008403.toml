1008403-16 = "[s]\"Mas ...... isso é uma máquina de gravação, certo? \""

1008403-17 = "Este é, hum, ......"

1008403-18 = "Eu o trouxe para gravar os sons da natureza, não vozes humanas."

1008403-19 = "[s]\"......Sounds of Nature? \""

1008403-20 = "Sim, porque nas montanhas é possível ouvir uma variedade de sons naturais que ajudam a acalmar o corpo e a mente, como o canto dos pássaros, a água corrente e o sussurro do vento. ......#n"

1008403-21 = "As listas de reprodução que ouço regularmente também contêm muitos desses sons ambientais."

1008403-22 = "No entanto, os sons ambientais são difíceis de gravar e muitos usam recursos gratuitos compartilhados na Internet. ......"

1008403-23 = "Vim me registrar para obter novos estímulos."

1008403-24 = "[s1] \"Parece divertido, não é? \"\n[s2] \"Não parece o Kotama ......, é claro que estou falando sério! \""

1008403-26 = "O que significa o fato de ele não ser como eu? ......"

1008403-27 = "[\"Então, o que exatamente você está gravando hoje? \""

1008403-28 = "Se for nesta época do ano, é o som dos pássaros da montanha cantando e o som da neve pisando. ......"

1008403-29 = "Afinal de contas, o inverno não passa sem o som de uma fogueira."

1008403-30 = "Enrolado em cobertores e ouvindo o som do fogo, você pode dormir como se estivesse balançando em uma cadeira em frente à lareira."

1008403-31 = "Então, hoje, vou gravá-lo aqui em torno de uma pequena fogueira."

1008403-32 = "[\"É seguro fazer uma fogueira aqui? \""

1008403-33 = "Sim, entramos em contato com as instalações próximas. Eles disseram que não há problema se for no terreno do camping."

1008403-34 = "Também preparamos extintores de incêndio em caso de emergência."

1008403-35 = "[\"Está tudo pronto. \""

1008403-36 = "...... porque não estamos dispostos a fazer isso sem permissão e misturar ruídos."

1008403-40 = "Agora vamos preparar a fogueira."

1008403-43 = "Se você juntar folhas mortas e galhos finos em um formato triangular: ......"

1008403-47 = "Coloque uma vara fina contra uma tábua de madeira fixa. ......"

1008403-48 = "Se você girar rapidamente com as duas mãos: ......"

1008403-53 = "[ns] \"Chi, espere um minuto, Kotama. \""

1008403-57 = "Há algo errado com você?"

