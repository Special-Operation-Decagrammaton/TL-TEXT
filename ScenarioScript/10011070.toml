[translation]
10011070-1 = "Episódio 7; Quarto Obstáculo: Casa de Truques"
10011070-6 = "Olá, olá! Bem-vindas ao quarto obstáculo!!"
10011070-7 = "Este é a \"Casa de Truques\", cheia de armadilhas e mecanismos! É uma das atrações mais famosas desta Vila Cinematográfica Uzumaki!"
10011070-8 = "Então é... uma mansão ninja?"
10011070-9 = "Eu não faço ideia!!"
10011070-10 = "De qualquer forma, o \"quarto obstáculo\" é esta Casa de Truques! A responsável sou eu, Kaede Isami, de 15 anos! Meu hobby é colecionar besouros!"
10011070-11 = "[s] \"Eu sabia que a Kaede também estaria aqui.\""
10011070-12 = "Hehehe... pois é! Aliás, parece que os vilões que sequestraram a princesa fugiram para dentro desta mansão! Provavelmente!"
10011070-13 = "E a regra deste obstáculo é simples!"
10011070-15 = "Entrem nesta Casa de Truques,"
10011070-18 = "e se chegarem à linha de chegada,"
10011070-21 = "está tudo bem!"
10011070-23 = "Mas, como há muitos desafios lá dentro, não vai ser nada fácil!"
10011070-24 = "Certo, entendi! Seja uma Casa de Truques ou uma mansão ninja, pode vir qualquer coisa!"
10011070-25 = "Ah, Presidente...!?"
10011070-26 = "Presidente, nós nem discutimos uma estratégia de antemão...!"
10011070-27 = "Tudo bem, tudo bem, se a gente seguir em frente, vai dar certo!"
10011070-28 = "Basicamente é para turistas, então não deve ser nada tão difícil...!"
10011070-32 = "Ah! Eu ainda estava no meio da explicação!"
10011070-38 = "...Hã?"
10011070-39 = "[s] \"Michiru, cuidado...!?\""
10011070-46 = "Nyahaha. Desafios surgindo um atrás do outro, e as garotas enfrentando todos eles..."
10011070-47 = "E, ao lado delas..."
10011070-48 = "Fufu... bem, eu tinha minhas expectativas, mas entendo."
10011070-49 = "Sim, sim, é interessante."
10011070-50 = "Niya-sama, que situação é esta, afinal...!?"
10011070-51 = "Hmm? O que houve, Kaho?"
10011070-52 = "Recebemos um contato do grupo encarregado de sequestrar a princesa. Eles perguntaram: \"Quando é a nossa vez de entrar?\"..."
10011070-53 = "Se isso for verdade, então quem é que está sequestrando a Ibuki agora...?"
10011070-54 = "Ora, ora, isso é bem estranho, não é?"
10011070-55 = "O que será que está acontecendo~?"
10011070-56 = "De novo esse tipo de situação... Para que serve tudo isso desta vez..."
10011070-60 = "De qualquer forma, cuidarei disso daqui em diante."
10011070-65 = "Nossa, você continua sempre tão séria♪"
10011070-69 = "Bem, bem, o que será que vai acontecer daqui para frente~?"
10011070-70 = "Até agora as coisas se resolveram, mas não seria estranho se os problemas começassem a aparecer logo..."
10011070-71 = "Bem, que tipo de resposta elas vão encontrar para isso..."
10011070-72 = "Estou na expectativa, Sensei♪"
10011070-81 = "Sendo assim, pessoal do Clube de Pesquisa de Ninjutsu, conto com vocês para a apresentação de logo mais~♪"
10011070-87 = "Então, vamos começar a ação. Avancem rapidamente e eliminem qualquer obstáculo... Vamos, \"Trupe Chimi - Estilo Caprichoso\"!"
10011070-93 = "A Bela Adormecida é aquela presidente do Clube de Treinamento, né? Ela é incrível, mas eu nunca ouvi falar muito desse \"Clube de Pesquisa de Ninjutsu\"..."
10011070-94 = "...Ainda assim, é um nome bem peculiar."
10011070-102 = "(Uma chance única na vida...)"
10011070-103 = "(Melhorar nossa imagem de uma vez, tornar-nos um clube oficial com orgulho...)"
10011070-104 = "(Esta é uma chance importante para eu conseguir ficar de cabeça erguida na frente da Izuna e da Tsukuyo...!)"
10011070-105 = "(Por isso, eu preciso, absolutamente...!)"
10011070-114 = "Ué, onde é que eu estou...?"
10011070-115 = "[s] \"Ah, acordou? Parece que uma armadilha foi ativada e nós caímos aqui.\""
10011070-116 = "...Armadilha?"
10011070-117 = "Então isso quer dizer que é uma mansão ninja mesmo!"
10011070-118 = "Ah! Não é hora para isso... Sensei, saia daqui rápido—"
10011070-119 = "[s1] \"Desculpe, pode esperar um pouco?\"\n[s2] \"Acho que torci o pé...\""
10011070-122 = "O pé? Isso significa que... quando caímos aqui...?"
10011070-123 = "Será que... eu não me machuquei porque... o Sensei...?"
10011070-124 = "Tudo por minha causa... porque eu saí correndo sozinha..."
10011070-125 = "[s] \"Não é culpa sua, Michiru, está tudo bem.\""
10011070-130 = "……"
10011070-131 = "[s] \"Michiru?\""
10011070-132 = "……Por minha causa."
10011070-133 = "Por minha causa, tudo foi arruinado... O-o que eu faço...! Desculpe, desculpe, Sensei...!!"
10011070-142 = "[ns] \"Já se acalmou um pouco?\""
10011070-143 = "Snif... sim."
10011070-144 = "[s3] \"Sobre o que você disse de ter 'arruinado tudo'...\"\n[s4] \"Pode me contar o que quer dizer com isso?\""
10011070-147 = "Desde o começo... tudo foi um capricho meu."
10011070-148 = "Quando aquela criança... Ibuki foi sequestrada, eu deveria ter avisado as autoridades imediatamente."
10011070-149 = "Se eu tivesse contatado o Departamento Onmyou ou o Hyakkiyako logo de cara, provavelmente já teria sido resolvido..."
10011070-150 = "Eu, com o meu egoísmo..."
10011070-151 = "[s] \"Para se tornar um clube oficial?\""
10011070-152 = "……!"
10011070-153 = "Sim..."
10011070-154 = "É verdade que quero espalhar a cultura ninja. Mas morro de medo de contar para as outras alunas e elas rirem de mim em vez de aceitarem..."
10011070-155 = "Por isso, aproveitei essa oportunidade para tentar me tornar um clube oficial o quanto antes."
10011070-156 = "Conseguir o reconhecimento oficial sem uma carta de recomendação... uma chance dessas pode nunca mais aparecer. Por isso, eu queria fazer dar certo de qualquer jeito."
10011070-161 = "Com a Izuna, que tem uma admiração tão pura,"
10011070-162 = "e a Tsukuyo, que eu envolvi sem ela saber de nada... Eu tenho responsabilidade por essas duas."
10011070-164 = "Você é a Tsukuyo?"
10011070-165 = "!!"
10011070-166 = "Se não se importar... quer entrar para o Clube de Pesquisa Ninjutsu?"
10011070-168 = "Eu queria ser uma veterana de quem elas pudessem se orgulhar..."
10011070-169 = "Na pior das hipóteses... se a apresentação falhar e a chance desaparecer, tudo bem."
10011070-173 = "Mas, por eu ter hesitado em denunciar... aquela criança que foi sequestrada pela trupe Chimi,"
10011070-175 = "pode estar chorando agora. Pode estar passando por momentos terríveis."
10011070-177 = "Tudo por minha causa..."
10011070-178 = "Se isso vier a público, a Izuna e a Tsukuyo podem acabar sendo julgadas por nada, só por estarem ligadas ao \"Clube de Pesquisa Ninjutsu\"."
10011070-179 = "Por causa do meu egoísmo, estou causando problemas para muita gente."
10011070-180 = "A Izuna, a Tsukuyo..."
10011070-181 = "Se souberem de tudo, com certeza vão se decepcionar. Tudo isso aconteceu porque eu estava com medo..."
10011070-182 = "Eu não consigo mais..."
10011070-183 = "[s] \"...Acho que meu pé sarou!!\""
10011070-184 = "S-Sensei!? Eu estava falando de algo muito sério agora pouco, sabia!?"
10011070-185 = "Era aquela cena clássica de anime, por volta do episódio 9 ou 10, onde a heroína principal revela seus dilemas mais profundos!!?"
10011070-186 = "E você trata isso com tanta leveza...!"
10011070-187 = "Eu já estou quase chorando! Quer dizer, já estou chorando metade...! Não é isso!"
10011070-188 = "[s] \"Você não entregou o 'formulário de inscrição' porque estava com medo?\""
10011070-189 = "……!"
10011070-190 = "I-isso é óbvio! Não tem como entregar um formulário de inscrição oficial...!"
10011070-192 = "\"O que é um ninja?\", \"O que é o Clube de Pesquisa Ninjutsu?\" — essa é a reação normal, não é?!"
10011070-193 = "É natural pensarem que é coisa de anime ou mangá...!"
10011070-194 = "Não posso pedir uma recomendação para um clube desses a ninguém...!"
10011070-195 = "Eu não conseguia imaginar que alguém fosse nos reconhecer..."
10011070-197 = "Se eu disser algo de um jeito errado, posso acabar sendo alvo de fofocas ou virar motivo de piada..."
10011070-198 = "Se fosse só eu, tudo bem, mas..."
10011070-199 = "Aqueles dois...!"
10011070-203 = "[ns5] \"Dali em diante, não é algo que eu possa concordar por conta própria.\"\n[ns6] \"Acho que só aqueles dois sabem a resposta para isso.\""
10011070-207 = "Se, Sensei...?"
10011070-208 = "[s] \"Bem, é hora de irmos. Como dizem, não adianta chorar pelo leite derramado.\""
10011070-209 = "……Sim."
10011070-210 = "De qualquer forma, precisamos sair daqui."
10011070-214 = "……Obrigada, Sensei."
10011070-215 = "[s] \"De nada... Ah, sua maquiagem está um pouco borrada.\""
10011070-216 = "Aaaah!?"
10011070-217 = "D-depois do que acabamos de falar, é assim que você trata uma dama!?"
10011070-218 = "Francamente..."
10011070-219 = "De qualquer modo, não importa sobre o que falemos, nada vai começar se não sairmos daqui..."
10011070-220 = "Mas, mesmo que a gente avance sem rumo..."
10011070-224 = "……Ué?"
10011070-225 = "[s] \"O que foi?\""
10011070-226 = "Este corredor, este layout..."
10011070-227 = "Eu já vi isso antes..."
10011070-228 = "Será que isso é a \"Lenda da Rajada de Vento Kamaboko\"...?"
10011070-229 = "Eu entendi, eu me lembro de tudo...!"
10011070-230 = "Sensei, por aqui!"
10011070-231 = "[ns] \"Certo, vamos lá.\""
10011070-252 = "É exatamente a mansão ninja da \"Lenda da Rajada de Vento Kamaboko\"...!"
10011070-253 = "Quer dizer, isso não é um problema de direitos autorais!?"
10011070-254 = "[s] \"É comum em pontos turísticos. Talvez seja uma colaboração...\""
10011070-255 = "Ugh, preciso questionar o responsável depois! Mas, antes disso..."
10011070-256 = "Ah, bom trabalho!"
10011070-257 = "[s] \"Ué, Kaede?\""
10011070-258 = "Poxa. Vocês dois saíram antes da explicação das regras, fiquei preocupada."
10011070-259 = "Bem, embora seja tarde, aqui vai a explicação das regras!"
10011070-260 = "Quem conseguir sair desta casa de truques ganhará o direito de me desafiar!"
10011070-262 = "Direito de desafiar...?"
10011070-263 = "Isso mesmo, o direito de desafiar! Ou seja..."
10011070-269 = "O direito de me desafiar, a Kaede!"
10011070-270 = "Se você me vencer, estará oficialmente aprovado! Então, lá vamos nós!"
10011070-271 = "No fim, vai acabar assim mesmo!?"
10011070-272 = "[s] \"Bem, é assim que as coisas são, né.\""
