[translation]
10024020-1 = "Episódio 2; Começo e Origem"
10024020-6 = "Rokuwakaku - Entrada"
10024020-7 = "[ns] \"Isto é...\""
10024020-9 = "Sim, este é o \"Rokuwakaku\" da Genryumon."
10024020-10 = "Faz tempo que não venho aqui, mas não mudou quase nada."
10024020-11 = "Bem, acho que está na hora de recebermos as \"boas-vindas calorosas\"..."
10024020-17 = "Ei, parem aí. Quem são vocês!"
10024020-18 = "Esta é a Presidente Rumi, da Associação Genbu, e o Sensei do Schale. #nEu sou Reijo, a escolta."
10024020-19 = "O Sensei quer encontrar a Kisaki, então eu o trouxe. #nPode nos deixar passar?"
10024020-20 = "A Mestra da Porta? #nNão fomos informados de nenhuma visita... Não podemos permitir a entrada de alguém sem agendamento—"
10024020-21 = "—Espere, você disse o Sensei do Schale? #nA Associação Genbu usando o Sensei como escudo, é bem a cara desse bando de covardes."
10024020-22 = "Bem, não é totalmente mentira, então não posso negar."
10024020-23 = "E então, o que vai fazer? #nVai nos mandar embora assim mesmo?"
10024020-24 = "Se fizerem isso, o boato de que \"até o Sensei do Schale foi barrado na porta\" vai se espalhar por todo o Kivotos."
10024020-25 = "—Isso certamente daria um ar de mistério à Genryumon, não é?"
10024020-26 = "[s] \"Isso foi um sarcasmo...?\""
10024020-27 = "Quem sabe? Se não for compreendido, não pode ser considerado sarcasmo, não é?"
10024020-28 = "...Está zombando de mim?"
10024020-29 = "Reijo, não viemos aqui para brigar, viemos?"
10024020-30 = "Ser subestimados a esse ponto, nossa reputação..."
10024020-31 = "[s] \"Desculpe. Por enquanto, poderia verificar se podemos entrar?\""
10024020-32 = "Co-cof. #nEspere um momento. Vou informar a Mestra da Porta."
10024020-37 = "As coisas ficam mais fáceis quando o Sensei está por perto."
10024020-38 = "Sim, como dizem os boatos."
10024020-39 = "[s] \"...Não fui um pouco insistente demais?\""
10024020-40 = "Ora, ora, se ficar se preocupando com detalhes, não consegue fazer negócios."
10024020-49 = "Sensei, você parece pálido... está tudo bem?"
10024020-50 = "[s1] \"Sinto como se tivesse sido convidado para uma organização secreta...\".\n[s2] \"Parece o esconderijo de uma máfia...\""
10024020-53 = "Não está longe da verdade, eu diria."
10024020-54 = "Sério, você não muda nada."
10024020-62 = "A Mestra da Porta está chegando!!!"
10024020-63 = "Chegando!!!"
10024020-69 = "..."
10024020-70 = "Já ouvi falar de você."
10024020-71 = "Seria mentira dizer que não estou feliz em te ver, mas... não queria que nosso encontro fosse desta forma."
10024020-72 = "[s] \"Bem... prazer em conhecê-la, Kisaki-chan.\""
10024020-73 = "Que insolência! #nMesmo sendo o Sensei, não é alguém que possa ser chamado de forma tão casual...!"
10024020-74 = "Não sabe se comportar de acordo com o tempo e o lugar!"
10024020-75 = "Não faça tanto barulho— ele é meu convidado."
10024020-76 = "Sim! Perdão, Mestra da Porta!"
10024020-77 = "Mestra da Porta! Por favor, nos perdoe!"
10024020-78 = "O Sensei do Schale é muito respeitado e—"
10024020-79 = "Ouvi dizer que é um estrategista habilidoso em maquinações, que não mede esforços para atingir seus objetivos."
10024020-83 = "[ns] \"Onde diabos você ouviu isso!?\""
10024020-84 = "Não se preocupe. #nPelo meu julgamento, você não é desse tipo."
10024020-85 = "Pelo contrário— consigo imaginar você sendo levado de um lado para o outro por causa da sua bondade."
10024020-86 = "[s] \"Isso é um elogio...?\""
10024020-87 = "Quem sabe? #nImaginar isso também é um divertimento."
10024020-88 = "O que será que está escondido no seu coração?"
10024020-94 = "Ah, esta é Mina, a Chefe de Execução. #nEla lidera a todos e é responsável pela minha segurança."
10024020-95 = "……。"
10024020-97 = "……。"
10024020-99 = "――Passemos ao assunto principal, Sensei."
10024020-100 = "Ultimamente, parece que "Ginsengs Milenares" não autorizados estão circulando fora de Shanhaijing."
10024020-101 = "[s] \"Você encontrou alguma prova de que a Associação Genbu está envolvida?\""
10024020-102 = "……Mina, traga-o aqui."
10024020-111 = "Isto é...?"
10024020-112 = "Como pode ver — não me diga que não sabe o que é?"
10024020-113 = "……É uma caixa de papelão usada pela Associação Genbu."
10024020-114 = "Presidente...!"
10024020-115 = "Esta é a prova — não temos tempo a perder. #nNão faríamos uma acusação sem evidências."
10024020-116 = "O Ginseng Milenar é valioso até mesmo em Shanhaijing, por isso é necessária uma permissão para colhê-lo."
10024020-117 = "Ouvir que tal especialidade está circulando fora de Shanhaijing — #ne ainda por cima sem o conhecimento da Genryumon — é algo que, naturalmente, não posso ignorar."
10024020-118 = "Como líder da escola, não posso deixar isso passar. #nE então — tem alguma explicação para isso?"
10024020-123 = "Eu conheço o pessoal da Associação Genbu melhor do que ninguém."
10024020-124 = "Nenhum dos responsáveis pela distribuição lida com Ginseng Milenar, e não há ninguém lá que faria algo assim pelas minhas costas."
10024020-125 = "Se houver alguém dentro da Associação Genbu envolvido em transações ilegais — #nfarei questão de trazê-lo aqui pessoalmente."
10024020-126 = "Pela minha honra — eu prometo."
10024020-130 = "……Que decepção."
10024020-131 = "Eu apresentei as provas — sendo assim, #nnão seria lógico que você também apresentasse uma contraprova?"
10024020-132 = "[s3] \"Provar isso agora é...\"\n[s4] \"Poderia nos dar um pouco de tempo?\""
10024020-141 = "O que mais há para ouvir, Líder da Escola!"
10024020-142 = "A Associação Genbu não é famosa por servir pratos criativos?!"
10024020-143 = "O Ginseng Milenar deve ter sido usado como um ingrediente importado de fora da escola!"
10024020-144 = "Mesmo que as tradições herdadas tenham seu valor e razão de ser!"
10024020-145 = "Estamos falando de pessoas que não entendem a importância da tradição! Não precisamos de mais explicações!"
10024020-146 = "Abaixem a cabeça e peçam desculpas logo!"
10024020-151 = "Ahaha... não dá para negar tudo, né."
10024020-152 = "Não estou dizendo que não entendo a importância da tradição."
10024020-153 = "Mas, se não adotarmos uma nova cultura — #nnunca mudaremos e continuaremos estagnados."
10024020-154 = "――Chega."
10024020-155 = "Este é um momento para comunicar as suspeitas contra a Associação Genbu e ouvir suas explicações. #nNão é um lugar para discussões."
10024020-157 = "Você é muito mole, Líder da Escola! #nA Associação Genbu é claramente a culpada!"
10024020-158 = "Exatamente! #nSe dermos tempo a eles, com certeza tentarão destruir as provas...!"
10024020-160 = "A liberdade dos alunos de Shanhaijing é garantida. #n...Sob a condição de que não prejudiquem a escola."
10024020-161 = "Mas agora mesmo! A Associação Genbu está causando danos!!"
10024020-162 = "Ainda não está claro se isso é um dano ou não — não tire conclusões precipitadas. #nEntende o que quero dizer?"
10024020-167 = "――Associação Genbu, escutem bem. #nEnquanto as suspeitas sobre vocês não forem esclarecidas, não poderei suspender a vigilância."
10024020-168 = "Dito isso, exigir uma contraprova imediata seria irracional."
10024020-170 = "Portanto — darei um prazo a vocês."
10024020-171 = "Se encontrarem provas que me convençam até a data limite, marcaremos uma nova audiência."
10024020-173 = "Mas — não se esqueçam."
10024020-174 = "Se a situação piorar — não terei escolha a não ser dissolver a Associação Genbu."
10024020-175 = "Esta é a decisão da líder da Genryumon — Kisaki."
10024020-177 = "Espere, Líder da Escola! #nIsso é uma armadilha de alguém para a Associação Genbu... Espera, Presidente Rumi!?"
10024020-178 = "Reijo, o fato de que o "Ginseng Milenar" estava na caixa da Associação Genbu não muda."
10024020-179 = "Já que chegamos a este ponto... por mais frustrante que seja, só nos resta capturar o culpado com nossas próprias mãos."
10024020-181 = "O que acha disso, Kisaki?"
10024020-182 = "Ah, não me oponho. Não há motivo para recusar, Presidente Rumi."
10024020-187 = "[ns] \"Então, por onde vamos começar?\""
10024020-189 = "Primeiro, precisamos coletar informações sobre o 'Ginseng Milenar'..."
10024020-195 = "Comércio Genbu, parem aí!"
10024020-196 = "Sensei, por favor, afaste-se!"
10024020-197 = "Vocês acharam mesmo que poderiam cruzar o território da Genryumon e ir embora tão facilmente?"
10024020-198 = "A Mestra do Portão é muito ingênua...!"
10024020-199 = "Criminosos aparecem descaradamente e ela simplesmente os deixa ir..."
10024020-200 = "Suspeitos não deveriam ser mantidos sob custódia até que todas as evidências sejam reunidas?"
10024020-201 = "Vocês não ouviram o que Kisaki disse agora pouco?"
10024020-202 = "Não ousem usar as palavras da Mestra do Portão, Comércio Genbu!#nQuem daria ouvidos às palavras de um pecador!"
10024020-204 = "Vocês, apareçam!"
10024020-212 = "……Sensei, por favor, não saia de trás de mim."
10024020-213 = "Falando nisso... ouvi dizer que com o seu comando, Sensei, #né possível reverter qualquer situação. É verdade?"
10024020-214 = "[s] \"Onde você ouviu esse tipo de boato...\""
10024020-215 = "Ahaha, boatos são algo que a gente não consegue controlar, né."
10024020-216 = "Sendo assim, deixo o comando com você.#nMostre para nós também o poder do Sensei!"
