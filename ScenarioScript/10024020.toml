[translation]
10024020-1 = "第2話;[ruby=こうしらんしょう]嚆矢濫觴[/ruby]"
10024020-6 = "六和閣・入口"
10024020-7 = "[ns] \"これが……\""
10024020-9 = "うん、玄龍門の[ruby=りくわかく]「六和閣」[/ruby]だよ。"
10024020-10 = "久しぶりに来たけど、あんまり変わってないね。"
10024020-11 = "さて、そろそろ「手厚いお出迎え」が来る頃かな……"
10024020-17 = "おい、止まれ。何者だ！"
10024020-18 = "こちらは玄武商会のルミ会長とシャーレの先生。#n私は護衛のレイジョです。"
10024020-19 = "先生がキサキに会いたいみたいだから、連れてきたよ。#n通してもらえるかな？"
10024020-20 = "門主様に？#n来客があるとは聞いていないが……アポイントなしの来訪を通すわけには――"
10024020-21 = "――待て、シャーレの先生と言ったか？#n玄武商会め、先生を盾にするとは、いかにも卑怯な連中の考えそうなことだ。"
10024020-22 = "まあ、あながち間違いじゃないし、否定はできないね。"
10024020-23 = "それで、どうするの？#nこのまま門前払いするつもり？"
10024020-24 = "そうなれば、「シャーレの先生でさえ門前払いされた」という噂がキヴォトス中に轟くことになるでしょうね。"
10024020-25 = "――玄龍門の秘密主義にさぞかし箔がつくのでは？"
10024020-26 = "[s] \"それは皮肉なんだよね……？\""
10024020-27 = "さあ？伝わらなければ皮肉にはならないのではないでしょうか？"
10024020-28 = "……バカにしてるのか？"
10024020-29 = "レイジョ、あたし達はケンカしに来たわけじゃないでしょ。"
10024020-30 = "ここまで見くびられては、我々のメンツが……"
10024020-31 = "[s] \"ごめんね。とりあえず、確認してきてもらえるかな？\""
10024020-32 = "ゴ、ゴホンッ。#n少々お待ちを。門主様にお伝えしてきます。"
10024020-37 = "先生がいてくれると、話が早いね。"
10024020-38 = "ええ、噂通りです。"
10024020-39 = "[s] \"……ちょっと強引じゃなかったかな？\""
10024020-40 = "まあまあ、細かいこと気にしてたら商売なんかやっていけないって。"
10024020-49 = "先生、顔色が悪いようですが……大丈夫ですか？"
10024020-50 = "[s1] \"秘密組織に招待された気分だよ……。\"\n[s2] \"マフィアのアジトみたいで……。\""
10024020-53 = "当たらずとも遠からず、ってところかな。"
10024020-54 = "ホント、相変わらずだね。"
10024020-62 = "門主様の、おなーりー！！！"
10024020-63 = "おなーりー！！！"
10024020-69 = "……。"
10024020-70 = "[ruby=そなた]其方[/ruby]のことは聞いておる。"
10024020-71 = "会えて嬉しくないと言えば嘘になるのじゃが……このような形で会いとうなかったな。"
10024020-72 = "[s] \"えっと……はじめまして、キサキちゃん。\""
10024020-73 = "無礼な！#nいくら先生とはいえ、そのように気安くお呼びして許される方ではないぞ……！"
10024020-74 = "時と場[ruby=わきま]を弁え[/ruby]ることもできないのか！"
10024020-75 = "そう騒ぐでない――[ruby=わらわ]妾の[/ruby][ruby=・   ・]客人[/ruby]ぞ。"
10024020-76 = "はっ！失礼いたしました、門主様！"
10024020-77 = "門主様！どうかお許しを！"
10024020-78 = "シャーレの先生は人望が厚く――"
10024020-79 = "目的のためであれば手段を選ばぬ、権謀術数に長けた策士だと聞き及んでおるぞ。"
10024020-83 = "[ns] \"一体どこで聞いたのソレ！？\""
10024020-84 = "案ずるでない。#n妾の見立てでは、其方はそのような類ではなかろうて。"
10024020-85 = "寧ろ――人の良さが[ruby=たた]祟[/ruby]って、振り回されている姿が目に浮かぶからの。"
10024020-86 = "[s] \"それは褒めてる……の……？\""
10024020-87 = "さあ、どちらじゃろうな？#nそれを想像するのもまた、一興。"
10024020-88 = "其方の心には、いったい何が秘められておるのやら。"
10024020-94 = "して、これは執行部長のミナじゃ。#n皆の先頭に立ち、妾の警護を務めてくれておる。"
10024020-95 = "……。"
10024020-97 = "……。"
10024020-99 = "――本題に移ろうではないか、先生。"
10024020-100 = "昨今、山海経の外で無許可の「萬年参」が流通しておるようでな。"
10024020-101 = "[s] \"何か、玄武商会と関与してる証拠が見つかったの？\""
10024020-102 = "……ミナ、持ってくるのじゃ。"
10024020-111 = "これは……？"
10024020-112 = "見ての通りじゃ――まさか知らぬとは申すまい？"
10024020-113 = "……玄武商会で扱ってるダンボールだね。"
10024020-114 = "会長……！"
10024020-115 = "これが証拠じゃよ――我らとて暇ではないからの。#n証拠もなく疑うような真似はせぬ。"
10024020-116 = "萬年参は山海経でも貴重ゆえ、採取するのにも許可が必要での。"
10024020-117 = "かような特産物が山海経の外に――#nそれも玄龍門の預かり知らぬところで流れておると聞けば、当然、黙ってはおれん。"
10024020-118 = "門主として、看過するわけにはいかぬからな。#nして――これに対しての申し開きはあるかの？"
10024020-123 = "玄武商会のみんなのことなら、あたしが一番よく知ってる。"
10024020-124 = "どの流通担当も萬年参を扱ってなんかいないし、あたしに隠れてそんなことをする子もいない。"
10024020-125 = "もしも、玄武商会内部で違法取引に手を出している者がいるのであれば――#n必ずここに連れてきます。"
10024020-126 = "私の力にかけて――お約束いたします。"
10024020-130 = "……期待外れじゃの。"
10024020-131 = "此方は証拠を提示したのじゃ――であれば、#n其方も反証を提示するのが道理ではないのかえ？"
10024020-132 = "[s3] \"今すぐ立証するのは……\"\n[s4] \"少し時間をくれないかな？\""
10024020-141 = "これ以上、何を聞くことがありますか、門主様！"
10024020-142 = "玄武商会は創作料理を出すことで有名ではありませんか！"
10024020-143 = "萬年参だって、学外の食材を仕入れるための道具として使われたに違いありません！"
10024020-144 = "受け継がれてきた伝統には、それ相応の価値と理由があるというのに！"
10024020-145 = "伝統の大切さを理解できないヤツらのことです！これ以上の申し開きなど不要！"
10024020-146 = "早く頭を垂れて謝罪しろ！"
10024020-151 = "あはは……全部を否定は流石にできないかな。"
10024020-152 = "伝統の重要性が分からないとは言わないけどね。"
10024020-153 = "でも、新しい文化を取り入れなくちゃ――#nいつまで経っても変わらないままだから。"
10024020-154 = "――そこまで。"
10024020-155 = "今は玄武商会にかかっておる嫌疑を伝え、申し開きを聞くための場じゃ。#n口論の場ではないぞ。"
10024020-157 = "甘すぎます、門主様！#n玄武商会が犯人に決まっています！"
10024020-158 = "そうです！#n時間を与えては、証拠隠滅を図るに違いありません……！"
10024020-160 = "山海経の生徒には自由が保障されておる。#n……学園の害にならぬという条件下での。"
10024020-161 = "今まさに！玄武商会は害を及ぼしているではありませんか！！"
10024020-162 = "害かどうか、まだ詳らかにはなっておらんじゃろうて――早計は禁物。#n妾の言っておる意味が分かるな？"
10024020-167 = "――玄武商会よ、聞くがよい。#n其方の容疑が晴れぬ限り、監視を解く事はできぬ。"
10024020-168 = "とはいえ、今すぐ反証を示せというのも理不尽じゃろうて。"
10024020-170 = "そこで――しばし猶予を与えよう。"
10024020-171 = "期日までに妾が納得する証拠が見つかれば、改めて審議の場を設けるとしようかの。"
10024020-173 = "じゃが――努々忘れるでないぞ。"
10024020-174 = "もしも、状況が悪化するのであれば――玄武商会の取り潰しも、致し方ないからの。"
10024020-175 = "以上を、玄龍門の門主――[ruby=りゅうげ]竜華[/ruby]キサキの裁決とする。"
10024020-177 = "お待ちください、門主様！#nこれは何者かが玄武商会を罠に……ッ、ルミ会長！？"
10024020-178 = "レイジョ、玄武商会の箱に「萬年参」が入ってた事実は変わらない。"
10024020-179 = "こうなった以上……悔しいけど、あたし達の手で犯人を捕まえるしかないよ。"
10024020-181 = "それでどうかな、キサキ[ruby=・  ・]門主[/ruby]？"
10024020-182 = "嗚呼、構わぬよ。認めぬ理由はどこにも無いからのう、ルミ[ruby=・  ・]会長[/ruby]。"
10024020-187 = "[ns] \"じゃあ、何から始めようか？\""
10024020-189 = "まずは、「萬年参」の情報を集めないとだね……"
10024020-195 = "玄武商会め、止まれ！"
10024020-196 = "先生、下がってください！"
10024020-197 = "[ruby=うち]玄龍門[/ruby]の敷地を跨いでおいて、そう簡単に帰れると思ったのか？"
10024020-198 = "門主様は甘すぎる……！"
10024020-199 = "犯罪者がノコノコ現れたというのに、そのまま放免するだなんて……。"
10024020-200 = "容疑者は、証拠が出揃うまで身柄を拘束すべきじゃないのか？"
10024020-201 = "さっきのキサキの話、聞いてなかったのかな？"
10024020-202 = "玄武商会が門主様の言葉を語るな！#n罪人の言葉など誰が聞くか！"
10024020-204 = "お前たち、出てこい！"
10024020-212 = "……先生、私の後ろから出ないでくださいね。"
10024020-213 = "そういえば……先生の指揮があれば、#nどんな状況でもひっくり返せるって聞いたんだけど、本当？"
10024020-214 = "[s] \"どこでそんな噂が……。\""
10024020-215 = "あははっ、噂って自分じゃどうしようもないからね。"
10024020-216 = "それじゃ、指揮は任せたよ。#n先生の力、あたし達にも見せてちょうだい！"
