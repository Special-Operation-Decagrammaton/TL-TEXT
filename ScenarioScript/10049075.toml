[translation]
10049075-2 = "Atacar o mascote? Vocês perderam o juízo!?"
10049075-4 = "É que... na verdade, dizem que o correto é ser atacado..."
10049075-5 = "Aquele cara assustador é o vilão, então... Aaaah!"
10049075-11 = "Não é isso! Eu estou falando da garota mágica!!"
10049075-12 = "Vocês não são aliadas? Por que estão atacando ela?!"
10049075-17 = "Aaaah!"
10049075-19 = "Thermite White! Por favor, use magia de cura na Stanag-chan!"
10049075-20 = "C-certo, entendi!"
10049075-27 = "Magia de cura!? Você quer dizer balas traçantes e napalm, não é!!"
10049075-28 = "Fique tranquila! Vou disparar todas as balas de slug que eu tiver nela!"
10049075-29 = "Aguenta firme, Stanag-chan!"
10049075-36 = "Vocês não deveriam ser as aliadas!?"
10049075-38 = "Isso é o golpe final!!"
10049075-39 = "Sopro de Dragão Curativo!"
10049075-45 = "Argh...!"
10049075-50 = "Stanag-chan!!"
10049075-51 = "Está tudo bem! Mesmo que ela caia... a Stanag-chan sempre se levanta!"
10049075-52 = "É verdade! Ela é espancada toda vez e sempre é curada, né!"
10049075-54 = "Não existe... um mascote... assim..."
10049075-59 = "Vou amarrá-la com a Corda de Cura Mágica—"
10049075-63 = "Tapei a boca dela com a Fita de Cura Mágica!"
10049075-64 = "Era! Eu definitivamente vou vingar a Stanag-chan!"
10049075-65 = "—Assim que eu terminar de tratar a Stanag-chan, eu volto!"
10049075-69 = "[ns5] \"Pessoal! Hora do intervalo!\"\n[ns6] (Shimiko, venha com a gente também!)"
10049075-75 = "No fim das contas, o que vocês pretendem fazer?"
10049075-76 = "Com essas roupas estranhas e fazendo isso com a gente..."
10049075-85 = "Isso... não é uma bateria de carro, é!?"
10049075-86 = "Capitã! Será que nós vamos... levar choques até confessar...!?"
10049075-87 = "Mas a gente não tem nada para confessar!?"
10049075-88 = "Espera, espera, espera, espera!!"
10049075-93 = "Aaaaaaaahhh!!"
