[translation]
103140-1 = "第14話;突入"
103140-5 = "今、私たちは箱舟の外壁に、頭を半分埋めているような状態です。"
103140-6 = "遠くから観測したとすれば、リンゴに爪楊枝が刺さったような姿かと……"
103140-7 = "はぁあ……つ、つかれたぁ～"
103140-8 = "皆さんご無事でしょうか。状況の報告をお願いします。"
103140-9 = "多次元解釈システム、問題ありません。#nただ、衝突の影響で中枢システムがダメージを受けたようです。"
103140-11 = "エンジンは完全にシャットダウンしてしまって……再起動シーケンスも動きません…… "
103140-12 = "メインコントロールシステムも動作不能ですね……。"
103140-13 = "各エリアの通信もダメ……それに、演算システムもボロボロ。"
103140-19 = "な、何でしょうか！？ "
103140-20 = "うわっ、サンクトゥムにいた敵じゃん！？#nこっちに向かってきてるよ！"
103140-31 = "ちょっと……全方向から来てるじゃない！"
103140-32 = "想定はしておりましたが、これほどまでに早く……！？#nまるで、待ち構えていたかのような……"
103140-33 = "まぁ、私たち……敵の本拠地にいますからね……"
103140-34 = "なんとかして止めないと……船が壊れたら、一巻の終わりだよ。#n交戦できる人は？"
103140-35 = "そ、そうね！交戦できる人は……"
103140-37 = "うへ～、おじさんたちの出番かな？"
103140-45 = "……ホシノ先輩！ "
103140-46 = "うんうん、準備万端ですよ！いつでも行けます！"
103140-47 = "はい！それでは私がサポートします。#n先輩方は、東側の通路の防衛をお願いします！"
103140-48 = "それじゃ、行こっか～"
103140-49 = "いくわよ！！"
103140-55 = "ふふっ。それでは、ここは私たちにお任せを。"
103140-56 = "うう……酔ったぁ。"
103140-58 = "何でまた私が……はぁ……。"
103140-59 = "美食研究会……いつの間に？"
103140-61 = "詳しいことは分かりませんが、ここでドッカーン★とすればいいんですよね？"
103140-62 = "ええ。私たち美食研究会は……探求を邪魔する者に背を向けたことはありません。 "
103140-63 = "そうだよ！宇宙食への旅路は、まだ始まったばかりだからね！"
103140-65 = "（その旅路、終わらないと思いますけど……）"
103140-66 = "はぁ……まあ、猫の手も借りたい状況ですし、"
103140-67 = "行きましょうか。#n私がサポートします。 "
103140-68 = "ありがとうございます、アコさん。 "
103140-69 = "では始めましょっか★"
103140-75 = "こ、ここはわたし達が守ります……。"
103140-76 = "ゲーム開発部！？い、いつからそこにいたの？"
103140-77 = "えっと……アリスちゃんはまだ寝てるけど、私たちが力になれたらと思って……"
103140-78 = "そう！私たちと先生なら、なんとかなるって！"
103140-80 = "……わ、分かったわよ！#nじゃあ私がサポートに回るけど、くれぐれも無茶はしないでよね？ "
103140-81 = "ユウカがサポートしてくれるなら、もう無敵じゃない？#nよぉし、いっくよ～！！"
103140-82 = "はい、よろしくお願いします！"
103140-83 = "い、行こう……！頑張ろうね……！"
103140-85 = "では先生。#n「ウトナピシュティムの本船」の防衛戦、総指揮をお願い致します！"
103140-92 = "[ns] \"対策委員会、ゲーム開発部、美食研究会のみんな……行こう！！\""
