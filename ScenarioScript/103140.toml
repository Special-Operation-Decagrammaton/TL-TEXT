[translation]
103140-1 = "Episódio 14; Invasão"
103140-5 = "Nesse exato momento, é como se tivéssemos enfiado a cabeça na parede externa da Arca."
103140-6 = "Se alguém estivesse observando de longe, acho que pareceria um palito de dente espetado em uma maçã..."
103140-7 = "Haa... c-cansada demais~"
103140-8 = "Pessoal, está tudo bem por aí? Por favor, me passem o relatório da situação."
103140-9 = "Sistema de interpretação multidimensional, sem problemas.#nMas parece que o impacto da colisão danificou o sistema central."
103140-11 = "O motor desligou completamente... e a sequência de reinicialização também não tá respondendo... "
103140-12 = "O sistema de controle principal também tá fora de combate... ."
103140-13 = "A comunicação entre as áreas não tá funcionando... e o sistema de cálculos também tá uma bagunça."
103140-19 = "Q-Que isso!?"
103140-20 = "Ué, não são os inimigos que tavam no Sanctum!?#nEles tão vindo pra cá!"
103140-31 = "Qual é... eles tão vindo de todas as direções!"
103140-32 = "Nós já imaginávamos que isso fosse acontecer, mas... tão cedo!?#nParece até que eles tavam só esperando a gente..."
103140-33 = "Bom, a gente... tá no quartel-general do inimigo, né..."
103140-34 = "Temos que dar um jeito de parar eles... se a nave quebrar, já era.#nQuem aqui consegue lutar?"
103140-35 = "A-Ah, é verdade! Quem consegue lutar é..."
103140-37 = "Uhe~, acho que chegou a nossa vez, né?"
103140-45 = "……Hoshino-senpai!"
103140-46 = "Uhum, uhum, estamos prontinhas aqui! Podemos ir a qualquer hora!"
103140-47 = "Certo! Então eu vou dar suporte. #nSenpais, por favor, cuidem da defesa do corredor leste!"
103140-48 = "Então bora lá~"
103140-49 = "Vamos nessa!!"
103140-55 = "Fufu. Nesse caso, deixem com a gente."
103140-56 = "Uuu... tô passando mal."
103140-58 = "Por que eu tenho que... haa..."
103140-59 = "Sociedade de Pesquisa Gourmet... desde quando vocês tão aí?"
103140-61 = "Não sei bem os detalhes, mas é só explodir tudo com um \"BUM★\" aqui, né?"
103140-62 = "Sim. Nós da Sociedade de Pesquisa Gourmet... nunca viramos as costas para quem tenta atrapalhar a nossa busca. "
103140-63 = "Isso aí! A jornada em busca da comida espacial só tá começando!"
103140-65 = "（Acho que essa jornada não tem fim, mas ok...）"
103140-66 = "Haa... bem, a situação tá desesperadora mesmo, então..."
103140-67 = "Vamos indo.#nEu vou dar o suporte. "
103140-68 = "Muito obrigada, Ako-san. "
103140-69 = "Então vamos começar logo★"
103140-75 = "E-Essa parte a gente defende..."
103140-76 = "Departamento de Desenvolvimento de Jogos!? D-Desde quando vocês tão aí?"
103140-77 = "Err... a Aris-chan ainda tá dormindo, mas a gente queria ajudar em alguma coisa..."
103140-78 = "Isso aí! Se a gente tiver com o Sensei, vai dar tudo certo!"
103140-80 = "……A-Ah, tá bom!#nEu vou dar suporte pra vocês, mas não façam nenhuma loucura, entenderam?"
103140-81 = "Se a Yuuka vai dar suporte, a gente não tá invencível?#nBeleza, vamo com tudo~!!"
103140-82 = "Sim, contamos com vocês!"
103140-83 = "V-Vamos...! Vamos dar o nosso melhor...!"
103140-85 = "Então, Sensei.#nPor favor, assuma o comando geral da defesa da \"Nave Principal de Utnapishtim\"!"
103140-92 = "[ns] \"Comitê de Medidas de Precaução, Departamento de Desenvolvimento de Jogos, pessoal da Sociedade de Pesquisa Gourmet... vamos nessa!!\""