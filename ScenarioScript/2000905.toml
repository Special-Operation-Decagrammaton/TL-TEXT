[translation]
2000905-1 = "防水の髭"
2000905-3 = "ふふっ、ふふふふふっ……。"
2000905-4 = "[s] \"チェリノ、何だか嬉しそうだね？\""
2000905-5 = "うむ。長らくおいらを苦しめてきた問題を解決できる、良い方法が浮かんだからな。"
2000905-6 = "これも全部、この前カムラッドがモモトークで教えてくれたことのおかげだ。"
2000905-7 = "おいらにインスピレーションを提供してくれたカムラッドには、特別に理知的髭栄誉章を授与しよう。"
2000905-8 = "光栄に思え、カムラッド！"
2000905-9 = "[s1] \"この前のってことは……。\"\n[s2] \"白鳥の話？\""
2000905-10 = "うむ。まずカムラッドからその話を聞いて、おいらはすぐに白鳥の生態を調べてみた。"
2000905-11 = "うむ。まずカムラッドからその話を聞いて、おいらはすぐに白鳥の生態を調べてみた。"
2000905-12 = "カムラッドの言う通り、白鳥は尾羽から出た油のおかげなどがあって、水に浮くことができるらしい。"
2000905-13 = "さらにそのキラキラ光る油のおかげで、羽毛が白く輝いて見える効果まであるとか……つまり白鳥の権威は、油から出ているといっても過言ではない！"
2000905-14 = "[s] \"……えっと、なるほど？\""
2000905-15 = "まあ聞けカムラッド……実はおいらは、温泉自体そこまで好きではない。"
2000905-16 = "熱いお湯のせいですぐにのぼせてしまうのも理由の一つだが……何よりも権威の象徴であるこの髭が、びっしょり濡れてしまうことが問題だ。"
2000905-17 = "濡れた髭はみっともない形になるのはもちろん、時々接着力が弱まって外れたりもするし……"
2000905-18 = "い、いや、実際に髭が外れるなんてことは無い！この髭はなにせ、本物の髭だからな！"
2000905-19 = "とにかく！そこでおいらは長い研究を経て、髭を濡らさずに温泉を楽しめる画期的な方法を発見したんだ。"
2000905-20 = "その方法とは……"
2000905-21 = "ズバリ、髭に油を塗れば良い！"
2000905-22 = "髭に油をたくさん塗っておくことで、白鳥の羽根のように水に濡れることなく、お風呂の中でもかっこいい髭の形を維持できる上に……。"
2000905-23 = "油を塗った髭はいつもよりもっと輝くはずだから、おいらの権威もまたこれまで以上に光り輝くんじゃないか？"
2000905-24 = "ふふっ、完璧だ……キラキラと輝くかっこいい髭を見て、感激する生徒たちの反応が目に浮かぶ。"
2000905-29 = "では早速、用意したこの油を髭に塗ってみよう。"
2000905-30 = "筆に油をつけて……。"
2000905-36 = "……ああもう、めんどくさい！"
2000905-41 = "こんな一本一本油を塗ってたらキリがない！"
2000905-42 = "髭ごと油の瓶に漬けて、放置しておけば大丈夫か。"
2000905-43 = "[s] \"髭、外れてるけど大丈夫……？\""
2000905-44 = "細かいことは気にするなカムラッド！"
2000905-45 = "じゃあおいらは少し昼寝をしてくるから、その間髭の監視を頼む！"
2000905-51 = "おお、ついに完成したか……おいらの防水髭！"
2000905-52 = "油で艶めくこの美しい姿……これを付けていれば生徒たちもこの輝く権威に対し、感激せずにはいられないだろう！"
2000905-53 = "さあ、それでは試着してみようか。"
2000905-59 = "ぐあぁぁっ！？"
2000905-64 = "な、なんだこれは！？カムラッド、髭からものすごい臭いがするぞ！？"
2000905-65 = "この鼻を刺すような臭い……頭が痛くなる……"
2000905-66 = "[s] \"これ、ごま油……？\""
2000905-67 = "なっ、それではダメなのか？"
2000905-68 = "でも確かこれを持ってくる時には、こんなにひどい臭いでは無かったはず……。"
2000905-69 = "[s] \"さすがに、そこまで至近距離で付けてると……。\""
2000905-70 = "そういうことか……どうしよう、今は予備の髭が無いし……。"
2000905-71 = "この髭をずっと付けるのは耐えられないし……。"
2000905-72 = "[s] \"しばらくは髭無しで過ごすしか……？\""
2000905-73 = "なっ……レッドウィンター連邦学園の書記長であり、生徒会長であるおいらが、髭無しで休暇を送らなきゃいけないなんて……。"
2000905-74 = "そんなこと、あってはならないのにっ……！"
