[translation]
2000905-1 = "Bigode à prova d'água"
2000905-3 = "Hehe, hehehehe..."
2000905-4 = "[s] \"Cherino, você parece bem feliz, não é?\""
2000905-5 = "Sim. Tive uma ótima ideia para resolver um problema que tem me atormentado há muito tempo."
2000905-6 = "E tudo isso graças ao que você me contou no MomoTalk outro dia, camarada."
2000905-7 = "Como você me deu a inspiração, vou conceder a você, camarada, a Medalha de Honra do Bigode Intelectual."
2000905-8 = "Sinta-se honrado, camarada!"
2000905-9 = "[s1] \"Quando você diz 'outro dia', quer dizer...\"\n[s2] \"A história dos cisnes?\""
2000905-10 = "Exato. Depois que ouvi isso de você, camarada, pesquisei imediatamente sobre o comportamento dos cisnes."
2000905-11 = "Exato. Depois que ouvi isso de você, camarada, pesquisei imediatamente sobre o comportamento dos cisnes."
2000905-12 = "Como você disse, camarada, parece que os cisnes conseguem flutuar na água graças ao óleo que sai de suas penas da cauda."
2000905-13 = "Além disso, graças a esse óleo brilhante, as penas parecem reluzir em branco... Ou seja, não é exagero dizer que a autoridade do cisne vem do óleo!"
2000905-14 = "[s] \"...Er, entendi?\""
2000905-15 = "Escute bem, camarada... Na verdade, eu não gosto tanto assim de fontes termais."
2000905-16 = "Uma das razões é que a água quente me deixa tonta rapidamente, mas... o maior problema é que este bigode, símbolo da minha autoridade, fica todo encharcado."
2000905-17 = "Um bigode molhado não só fica com uma aparência ridícula, como às vezes a cola enfraquece e ele acaba caindo..."
2000905-18 = "N-não, na verdade, o bigode nunca cai! Afinal, este bigode é um bigode de verdade!"
2000905-19 = "Enfim! Depois de uma longa pesquisa, descobri um método revolucionário para aproveitar as fontes termais sem molhar o bigode."
2000905-20 = "Esse método é..."
2000905-21 = "Simplesmente passar óleo no bigode!"
2000905-22 = "Ao passar bastante óleo no bigode, ele não ficará molhado na água, assim como as penas de um cisne, e poderei manter o formato imponente do meu bigode mesmo durante o banho, e além disso..."
2000905-23 = "Como o bigode oleado brilhará ainda mais do que o normal, minha autoridade também brilhará mais do que nunca, não é?"
2000905-24 = "Hehe, perfeito... Já consigo imaginar a reação dos alunos, maravilhados ao verem meu bigode brilhante e imponente."
2000905-29 = "Então, vamos começar passando este óleo que preparei no bigode."
2000905-30 = "Passando o óleo com o pincel..."
2000905-36 = "...Ah, quer saber, que trabalhoso!"
2000905-41 = "Não vou terminar nunca se ficar passando fio por fio!"
2000905-42 = "Vou apenas mergulhar o bigode inteiro no frasco de óleo e deixar lá, deve funcionar."
2000905-43 = "[s] \"O bigode caiu, tem certeza que isso vai dar certo...?\""
2000905-44 = "Não se preocupe com detalhes, camarada!"
2000905-45 = "Vou tirar uma soneca, então fique de olho no bigode enquanto isso!"
2000905-51 = "Oh, finalmente está pronto... meu bigode à prova d'água!"
2000905-52 = "Essa aparência linda e brilhante por causa do óleo... Com isso, os alunos não poderão deixar de se maravilhar com esta autoridade reluzente!"
2000905-53 = "Muito bem, vamos testar."
2000905-59 = "Guaaaaah!?"
2000905-64 = "Q-o que é isso!? Camarada, o bigode está com um cheiro terrível!"
2000905-65 = "Esse cheiro que fere o nariz... está me dando dor de cabeça..."
2000905-66 = "[s] \"Isso é... óleo de gergelim...?\""
2000905-67 = "O quê, isso não serve?"
2000905-68 = "Mas, quando trouxe isso, não parecia ter um cheiro tão forte..."
2000905-69 = "[s] \"Bem, é que você está com ele bem perto do rosto...\""
2000905-70 = "É isso então... O que eu faço? Não tenho um bigode reserva agora..."
2000905-71 = "E não consigo suportar ficar usando esse bigode..."
2000905-72 = "[s] \"Não vai ter que passar um tempo sem bigode...?\""
2000905-73 = "O quê... Eu, a Secretária-Geral da Academia Red Winter e Presidente do Conselho Estudantil, ter que passar as férias sem bigode..."
2000905-74 = "Isso não pode acontecer de jeito nenhum...!"
