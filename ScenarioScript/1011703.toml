[translation]
1011703-1 = "garota na rua"

1011703-2 = "(Enquanto caminhava pela cidade...)"

1011703-6 = "[ns] \"Isso é...\""

1011703-11 = "[ns] \"Hikari, o que você está fazendo?\""

1011703-13 = "Ah, Senseia."

1011703-14 = "Venha, venha rápido."

1011703-16 = "(Fui ao lado de Hikari que estava agachado)"

1011703-18 = "Você pode ver isso?"

1011703-22 = "[ns] \"Isto é...\""

1011703-24 = "(Formigas pretas e vermelhas estão envolvidas em uma batalha feroz)"

1011703-26 = "[ns] \"Guerra de formigas...!\""

1011703-27 = "Sim. #nNa esquina."

1011703-28 = "[s] \"Você estava assistindo isso.\""

1011703-29 = "Sim, o hobby de Hikari."

1011703-30 = "Posso assistir o tempo todo."

1011703-31 = "Qual lado do Sensei?"

1011703-32 = "[s1] \"Isso me lembra dos velhos tempos...\"\n[s2] \"Eu me pergunto qual deles...\""

1011703-38 = "O preto tem um corpo grande,"

1011703-39 = "Há muitas pessoas vermelhas."

1011703-40 = "[ns3] \"Preto!\"\n[ns4] \"Vermelho!\""

1011703-43 = "Bem, Hikari é o oposto."

1011703-44 = "Ah, o chefe formiga preta apareceu."

1011703-45 = "É enorme. O exército de formigas vermelhas está em apuros."

1011703-46 = "[s] \"Mas quando se trata de força militar, as formigas vermelhas são...!\""

1011703-47 = "Está ficando emocionante."

1011703-49 = "(Enquanto os dois observavam a situação da batalha...)"

1011703-51 = "Ah. Exército de formigas vermelhas, unidade de artilharia."

1011703-52 = "Estou começando a atirar."

1011703-53 = "[s5] \"Uma quantidade enorme de ácido fórmico!\"\n[s6] \"É perigoso, então recue um pouco...!\""

1011703-56 = "Quero isso!"

1011703-57 = "Uau, fui atingido por Hikari."

1011703-58 = "[s] \"Hikari, venha aqui!\""

1011703-60 = "(Ele rapidamente a levou até uma torneira próxima e lavou o ferimento com água.)"

1011703-62 = "Ugh... ferimento fatal..."

1011703-63 = "[s7] \"Simplesmente me atingiu...\"\n[s8] \"Está doendo?\""

1011703-66 = "500 milhões de pontos de dano por segundo..."

1011703-67 = "Retaliar. Hikari agora é um Vingador."

1011703-68 = "[s9] \"Hikari, você é uma boa garota, então por favor me perdoe...!\"\n[s10] \"Vamos, vamos comer algo delicioso...!\""

1011703-71 = "Uau, isso é delicioso..."

1011703-72 = "Mas se você não retaliar, será criticado..."

1011703-76 = "Hum..."

1011703-77 = "Pois bem, a quantidade de sangue que Hikari derramou é a mais deliciosa possível."

1011703-78 = "[s] \"Mas não há sangue...\""

1011703-80 = "(Depois de pagar minha mesada, saí para comer uma comida deliciosa.)"

