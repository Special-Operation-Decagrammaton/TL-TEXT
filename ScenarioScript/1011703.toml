[translation]
1011703-1 = "ガール・オン・ザ・ストリート "
1011703-2 = "（街を歩いていると……）"
1011703-6 = "[ns] \"あれは……。\""
1011703-11 = "[ns] \"ヒカリ、何してるの？\""
1011703-13 = "あー、先生ー。"
1011703-14 = "来て来てー早くー。"
1011703-16 = "（しゃがみこんでいるヒカリの隣に行った）"
1011703-18 = "これ見えるー？"
1011703-22 = "[ns] \"これは……。\""
1011703-24 = "（黒アリと赤アリが熾烈な戦いを繰り広げている）"
1011703-26 = "[ns] \"アリの戦争……！\""
1011703-27 = "イエース。#n街角の[ruby=ラグナロク]最終戦争[/ruby]ー。"
1011703-28 = "[s] \"これを見てたんだね。\""
1011703-29 = "そー、ヒカリの趣味ー。"
1011703-30 = "ずっと見てられるー。"
1011703-31 = "先生どっち派ー？"
1011703-32 = "[s1] \"なんか昔を思い出すね……。\"\n[s2] \"どっちだろう……。\""
1011703-38 = "黒の方は体がデカくてー、"
1011703-39 = "赤の方はいっぱいいる。"
1011703-40 = "[ns3] \"黒！\"\n[ns4] \"赤！\""
1011703-43 = "じゃあヒカリは反対のほー。"
1011703-44 = "あ、黒アリの親玉出てきたー。"
1011703-45 = "でっかーい。赤アリ軍ピンチ。"
1011703-46 = "[s] \"でも兵力なら赤アリが……！\""
1011703-47 = "盛り上がってきたー。"
1011703-49 = "（二人で戦況を見守っていると……）"
1011703-51 = "あっ。赤アリ軍、砲兵部隊しゅつどー。"
1011703-52 = "撃ち方はじめー。"
1011703-53 = "[s5] \"すごい勢いのギ酸！\"\n[s6] \"危ないから少し下がっ……！\""
1011703-56 = "いたーい！"
1011703-57 = "うあー、ヒカリ被弾したー。"
1011703-58 = "[s] \"ヒカリ、こっちに！\""
1011703-60 = "（急いで近くの水道に連れていき、傷口を水で流した）"
1011703-62 = "うぅ……致命傷ー……。"
1011703-63 = "[s7] \"ちょっと当たっちゃったけど……。\"\n[s8] \"痛む？\""
1011703-66 = "秒間5億ポイントのダメージー……。"
1011703-67 = "報復する。今のヒカリはアベンジャー。"
1011703-68 = "[s9] \"ヒカリ、いい子だから許してあげて……！\"\n[s10] \"ほら、美味しいもの食べに行こう……！\""
1011703-71 = "うー、美味しいもの……。"
1011703-72 = "でも、報復しないとナメられるー……。"
1011703-76 = "うーん……。"
1011703-77 = "じゃ、ヒカリが流した血の量だけ、美味しいものー。"
1011703-78 = "[s] \"血は出てないけどね……。\""
1011703-80 = "（手当を済ませて、美味しいものを食べに行った）"
