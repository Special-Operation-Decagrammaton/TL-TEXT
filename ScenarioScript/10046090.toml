10046090-190 = "Isso é... será que a Meg também é uma leitora...?#nEu só não sabia disso."
10046090-191 = "Eu não gosto muito, não é?#nSe tiver bastante desenho, tudo bem, mas o que a chefe lê só tem letras pequenas."
