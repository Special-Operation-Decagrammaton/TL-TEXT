[translation]
10046090-1 = "第9話;こうして日々は続いてく"
10046090-4 = "あ、先生。来てくれたんすね。"
10046090-5 = "なんか久しぶりに会った気分っす。#nそんなに時間経ってないんすけどね。"
10046090-6 = "えと、ティーパーティーに寄るんすよね？"
10046090-7 = "道中、お供しますね。"
10046090-14 = "……あれから、面倒事になる前に、ナギサ様が手を打ちました。"
10046090-15 = "ティーパーティーのプライベートビーチを、一般開放することにしたんです。"
10046090-16 = "おかげで温泉開発部の乱入は、なんとか誤魔化せたんすけど……。"
10046090-17 = "代わりに、ビーチはキヴォトス各地からのお客さんで賑わってしまって……。"
10046090-18 = "その後のことは、あまり思い出したくないっす。は、はは……。"
10046090-23 = "ん～？それってどういう意味かな～？"
10046090-24 = "これでもかみ砕いたつもりだったのだが……致し方ない。#n幼児でも理解できるくらい簡単に説明しよう。"
10046090-28 = "……はは、私はここまでにしておくっす。"
10046090-29 = "余計なことに首を突っ込みたくはないっすからね。"
10046090-30 = "[s1] \"案内ありがとう、イチカ。\"\n[s2] \"そうだ。一つ聞いてもいいかな。\""
10046090-35 = "……はい？温泉開発部っすか？"
10046090-36 = "えーと、私が知ってるのは……。"
10046090-42 = "はあ……。"
10046090-43 = "お二人とも……毎日喧嘩して、よく飽きませんね……。"
10046090-48 = "それは語弊があるな。#n喧嘩とは、対等な知性を持つ者同士でしか成り立たない。"
10046090-50 = "またそうやって……。"
10046090-52 = "へえ～？#nセイアちゃん、喧嘩上手なんだ～？"
10046090-57 = "乗せられやすいのも困りものですね……。"
10046090-59 = "喧嘩……自信はないな。"
10046090-60 = "……上手く加減をする自信がね。"
10046090-61 = "なにそれ？どういう意味？"
10046090-66 = "[ns3] \"みんな、おはよう。\"\n[ns4] \"今日も仲良いね。\""
10046090-71 = "せ、先生！？来てたの？"
10046090-73 = "私がお呼びしました。#nビーチでの一件について、後片づけが残っていますから。"
10046090-74 = "あまりに多くの利害関係が絡んでしまったので……#nシャーレの仲裁なしでは難しいと判断しました。"
10046090-75 = "ビーチを一般公開しただけで、あれほどの騒ぎになるとは……。"
10046090-76 = "先生にはしばらくお付き合いいただくことになるかと……。#n本当に、面目次第もありません。"
10046090-77 = "[s5] \"気にしなくていいんだよ。よろしく！\"\n[s6] \"私のことは好きなだけ使っていいからね！\""
10046090-80 = "じゃあ――！！"
10046090-81 = "ダメです。"
10046090-82 = "まだ言ってないのに！？"
10046090-83 = "ミカさんは早く、ビーチの予算管理表を提出してください。#n審査を通過するまで、先生とは距離を置くように。"
10046090-84 = "えっ、ヤだよ。"
10046090-85 = "ヤじゃありません。#nそもそも、進んで責任者になったのはミカさんでしょう？#nいつまでもお休み気分でいられては困ります。"
10046090-86 = "またお説教～？#nナギちゃんだってビーチではしゃいでたのに～"
10046090-87 = "あの時と今は違いますから。#n時と場合に応じた態度をとる。それが品位というものです。"
10046090-88 = "ティーパーティーは他の生徒の模範となるべき立場。#nただでさえ、最近のトリニティは風紀が緩んでいるのですから。"
10046090-89 = "……セイアさんも、ですよ！"
10046090-94 = "私は何も言っていないが……？"
10046090-96 = "うっ、耳が痛い……。"
10046090-97 = "[s] \"ビーチでの姿が嘘みたいだね。\""
10046090-102 = "だね、へへっ。"
10046090-110 = "ん？"
10046090-111 = "おぉ～これはこれは。"
10046090-117 = "こんなところまで、何のご用かな？"
10046090-118 = "うん？ああ、他の部員か。"
10046090-123 = "例の「ボランティア活動」が、風紀委員長の耳に入ったようでな。"
10046090-124 = "今、風紀委員会と出くわすのは少々遠慮したいところでね。"
10046090-125 = "我[ruby=パンデモニウム・ソサエティー]らが万魔殿の議[/ruby]長様が、またかき乱してくれるまで、しばし自粛中ってわけさ。"
10046090-126 = "これ幸いと、部員たちは夏季休暇を満喫中だ！ハーハッハッハ！"
10046090-130 = "ん？私だけがここにいる理由か？"
10046090-131 = "先生も知っての通り、私は人気者だろう？"
10046090-135 = "私と一緒では、休みが休みにならない。"
10046090-136 = "……という言い訳をして、読書の時間を確保したわけさ。"
10046090-137 = "良質なアウトプットのためには、インプットが欠かせないからなぁ！#nハーハッハッハ！"
10046090-138 = "ともあれ、温泉開発部は臨時休業中だ。#n誰を探しに来たのかは知らんが、部員の行方は私も把握していなくてね。"
10046090-139 = "なんだ、私に用があったのか。"
10046090-140 = "頼み事には対価が伴ってしかるべきだが……。"
10046090-141 = "でもまあ、先生には普段から世話になっている。#nここらで誠意を見せておくのも悪くはない。"
10046090-142 = "どれ。用件を聞こうじゃないか。"
10046090-143 = "[s7] \"ちょっと聞きたいことがあって。\"\n[s8] \"あの時、どうしてイチカを助けることにしたの？\""
10046090-146 = "その質問は、前提から間違っているぞ。"
10046090-147 = "奪われた工事資材も、プライベートビーチを開発できる権利も――#n対価はすべて受け取っている。"
10046090-148 = "善意で人助けをしたような言い草だが……あれは契約上の行いだった。#nそれだけの話さ。"
10046090-149 = "…………。"
10046090-150 = "ふむ、不服そうだ。#nこう言えばおおよそ納得してくれるんだがね。"
10046090-151 = "本音を引きずり出してもロクなことはないぞ？"
10046090-159 = "……特に理由はない。"
10046090-160 = "そんな気分だった。"
10046090-161 = "嘘？嘘じゃないさ。"
10046090-165 = "誰にだってそんな時はあるものだろう？"
10046090-166 = "普段なら絶対しないようなことを、やってしまう日。"
10046090-167 = "ちょうどそういう日だったんだよ。あのお嬢ちゃんも、私も。"
10046090-168 = "つまり、言わぬが花ってものさ。"
10046090-169 = "これ以上掘り起こすのはやめにしないか？"
10046090-175 = "部長～～！！"
10046090-179 = "わぷっ！？"
10046090-184 = "あれ、先生もいる！アイス買ってきたんだ！一緒に食べよ！"
10046090-185 = "あ、2個しかないんだった。これは部長と先生にあげる！#n私、もう1個買ってくるね！"
10046090-186 = "え……と？"
10046090-187 = "いやいや、待ってくれ。"
10046090-188 = "……なぜメグがここに？"
10046090-189 = "部長、どうしたの？#n自分から呼んだのに変な顔して……。"
10046090-190 = "その……実はメグも読書家だった……とかか？#n私が知らなかっただけで。"
10046090-191 = "あんまり好きじゃないかな～？#n絵がいっぱいのやつならいいけど、部長が読んでるのって小さい文字ばっかだし。"
10046090-192 = "まあ、そうだよな。そうだろうと思ったが。"
10046090-193 = "それなら、何をしにここへ？"
10046090-194 = "やりたいことやっていいって言ったのは部長だよ？#nだから、やりたいことをやってるの！"
10046090-195 = "ん？うーーーーん？"
10046090-202 = "あれ？メグも来てたんだ。"
10046090-203 = "ごめん、メグの分も買ってくればよかったね。"
10046090-209 = "……私の伝え方に問題があったかな？"
10046090-210 = "たしか、夏休みだと伝えたはずだが……。"
10046090-215 = "いや、まぁ……退屈してるんじゃないかなって思って。"
10046090-216 = "部長って一人になると、どっか閉じこもって本ばっか読むでしょ？"
10046090-217 = "意外と、考えることは同じだったっていうか……。"
10046090-218 = "そそ！私もさっき合流したんだ！"
10046090-226 = "あれ？みんな集まってるじゃん。"
10046090-227 = "もしかして、私たちだけ遅れた感じ？"
10046090-229 = "は……。"
10046090-233 = "ははっ。"
10046090-234 = "ハーハッハッハッハ！！先生、見たまえよ。"
10046090-235 = "……ははっ、ハーハッハッハ！！なんて頼もしい部員なんだ！"
10046090-236 = "その……悪いが、先生。"
10046090-237 = "[s9] \"うん、また来るね！\"\n[s10] \"カスミ、もしかして照れてる？\""
10046090-242 = "……照れてる？"
10046090-243 = "ははっ。"
10046090-256 = "つまり、言わぬが花ってものさ。"
10046090-257 = "夏空のやくそく"
