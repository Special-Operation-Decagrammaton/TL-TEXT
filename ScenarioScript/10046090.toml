10046090-16 = "Graças a isso, conseguimos disfarçar a invasão do Departamento de Desenvolvimento de Fontes Termais, mas……"
10046090-17 = "Em troca, a praia ficou lotada de visitantes de todos os cantos de Kivotos……"
10046090-18 = "Eu prefiro não lembrar do que aconteceu depois. Ha, haha……"
10046090-23 = "Hmm? O que isso quer dizer?"
10046090-24 = "Eu achei que tinha simplificado o suficiente…… mas não tem jeito. #nVou explicar de um jeito tão simples que até uma criança entenderia."
10046090-28 = "……Haha, vou parar por aqui."
10046090-29 = "Não quero me meter onde não sou chamada."
10046090-30 = "[s1] \"Obrigado por me guiar, Ichika.\"\n[s2] \"Entendi. Posso te perguntar uma coisa?\""
