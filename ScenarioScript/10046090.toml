10046090-227 = "Será que fomos os únicos que nos atrasamos?"
10046090-229 = "Ha..."
10046090-233 = "Haha."
10046090-234 = "Hahaha!! Sensei, veja só isso."
10046090-235 = "……Haha, Hahaha!! Que membros de clube tão confiáveis!"
10046090-236 = "Bem... desculpe, Sensei."
10046090-237 = "[s9] \"Sim, voltarei em breve!\"\n[s10] \"Kasumi, será que você está corada?\""
10046090-242 = "……Corada?"
10046090-243 = "Haha."
