10046090-52 = "Heeh~? #nSeia-chan, você é boa de briga, é?"
10046090-57 = "É complicado como ela cai fácil na provocação……"
10046090-59 = "Briga…… não tenho confiança nisso."
10046090-60 = "……Não tenho confiança em conseguir me controlar."
10046090-61 = "O que é isso? O que você quer dizer?"
10046090-66 = "[ns3] \"Bom dia, pessoal.\"\n[ns4] \"Vocês continuam se dando bem, hein?\""
10046090-71 = "Se, Sensei!? Você veio?"
10046090-73 = "Fui eu quem o chamei. #nAinda temos que resolver a bagunça do incidente na praia."
10046090-74 = "Muitos interesses diferentes se envolveram, então…… #njulguei que seria difícil resolver sem a mediação do Schale."
10046090-75 = "Quem diria que abrir a praia ao público causaria todo esse alvoroço……"
10046090-76 = "Acho que você terá que nos acompanhar por um tempo…… #nSinto muito por isso."
10046090-77 = "[s5] \"Não precisa se preocupar. Conto com vocês!\"\n[s6] \"Podem contar comigo para o que precisarem!\""
10046090-80 = "Então――!!"
10046090-81 = "Não."
10046090-82 = "Mas eu nem terminei de falar!?"
10046090-83 = "Mika-san, por favor, entregue logo a planilha de orçamento da praia. #nAté que ela seja aprovada, mantenha distância do Sensei."
10046090-84 = "Eh, não quero."
10046090-85 = "Não tem essa de querer ou não. #nPara começo de conversa, foi você quem se voluntariou para ser a responsável, não foi? #nNão posso deixar que você continue agindo como se estivesse de férias."
10046090-86 = "Lá vem sermão de novo~? #nAté a Nagi-chan estava se divertindo na praia~"
10046090-87 = "Aquela situação é diferente desta. #nSaber se comportar de acordo com a ocasião. Isso é o que chamamos de dignidade."
10046090-88 = "O Chá das Cinco deve ser um exemplo para as outras alunas. #nA disciplina em Trinity já está relaxada o suficiente ultimamente."
10046090-89 = "……Seia-san, você também!"
10046090-94 = "Eu não disse nada, disse……?"
10046090-96 = "Ugh, essa doeu……"
10046090-97 = "[s] \"É difícil acreditar que vocês são as mesmas da praia.\""
10046090-102 = "Pois é, hehe."
10046090-110 = "Hm?"
10046090-111 = "Oh~ vejam só."
10046090-117 = "O que traz você até aqui?"
10046090-118 = "Hm? Ah, outros membros do clube, é?"
10046090-123 = "Parece que aquela nossa 'atividade voluntária' chegou aos ouvidos da presidente do Comitê Disciplinar."
10046090-124 = "Eu preferiria evitar cruzar com o Comitê Disciplinar por enquanto."
10046090-125 = "Estamos em um período de autoimposição de silêncio até que a presidente do Pandemonium Society cause mais confusão."
10046090-126 = "Aproveitando a oportunidade, os membros do clube estão curtindo as férias de verão! Hahaha!"
10046090-130 = "Hm? Quer saber por que só eu estou aqui?"
10046090-131 = "Como você bem sabe, Sensei, eu sou uma pessoa popular, não sou?"
10046090-135 = "Se eu estiver com eles, as férias não serão realmente férias."
10046090-136 = "...Foi essa a desculpa que usei para garantir um tempo para ler."
10046090-137 = "Para ter um bom desempenho, é preciso investir em conhecimento!#nHahaha!"
10046090-138 = "De qualquer forma, o Departamento de Desenvolvimento de Fontes Termais está em recesso temporário.#nNão sei quem você veio procurar, mas eu também não faço ideia de onde os outros membros estão."
10046090-139 = "Ora, você tinha algum assunto comigo?"
10046090-140 = "Pedidos deveriam vir acompanhados de uma compensação, mas..."
10046090-141 = "Bem, você sempre cuida de mim, Sensei.#nNão seria nada mal mostrar um pouco de boa vontade agora."
10046090-142 = "Diga logo. Vamos ouvir o que você tem a dizer."
10046090-143 = "[s7] \"Eu queria perguntar uma coisa.\"\n[s8] \"Naquela época, por que você decidiu ajudar a Ichika?\""
10046090-146 = "Essa pergunta parte de uma premissa errada."
10046090-147 = "Tanto os materiais de construção que foram tomados quanto o direito de desenvolver uma praia particular —#nrecebi a compensação por tudo isso."
10046090-148 = "Parece que agi por pura bondade, mas... aquilo foi uma transação contratual.#nSimples assim."
10046090-149 = "............"
10046090-150 = "Hum, você parece insatisfeito.#nEu costumo convencer as pessoas dizendo isso."
10046090-151 = "Não vai sair nada de bom se você tentar arrancar a verdade de mim, sabe?"
10046090-159 = "...Não tem um motivo especial."
10046090-160 = "Eu só estava com vontade."
10046090-161 = "Mentira? Não é mentira."
10046090-165 = "Todo mundo tem dias assim, não tem?"
10046090-166 = "Um dia em que você acaba fazendo algo que normalmente nunca faria."
10046090-167 = "Era exatamente um dia desses. Tanto para aquela garota quanto para mim."
10046090-168 = "Em outras palavras, é melhor deixar como está."
10046090-169 = "Por que não paramos de cavar isso?"
10046090-175 = "Chefe~~!!"
10046090-179 = "Wapu!?"
10046090-184 = "Ah, o Sensei também está aqui! Eu comprei sorvete! Vamos comer juntos!"
10046090-185 = "Ah, só tem dois. Vou dar estes para a chefe e para o Sensei!#nEu vou lá comprar outro para mim!"
10046090-186 = "É... hã?"
10046090-187 = "Não, não, espere um pouco."
10046090-188 = "...Por que a Meg está aqui?"
