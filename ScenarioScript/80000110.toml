[translation]
80000110-1 = "局長のブレンドコーヒー"
80000110-2 = "（バレンタイン当日の朝、シャーレの仕事でヴァルキューレ警察学校を訪れた）"
80000110-8 = "ヴァルキューレ警察学校・行政室"
80000110-10 = "うーん、困ったな……"
80000110-11 = "……ん？"
80000110-15 = "[USERNAME]先生、おはようございます。"
80000110-16 = "こんな時間にいらっしゃるなんて……何か緊急の案件でしょうか？"
80000110-17 = "……今週のパトロール日程の確認に？"
80000110-18 = "……そうでしたか、安心しました。"
80000110-19 = "思いがけぬタイミングで先生とお会いしたものですから、何か起きたのかと思ってしまいました。"
80000110-20 = "[s] \"カンナは何をしてたの？\""
80000110-21 = "いつものように事件の報告書を作成していたところです。"
80000110-22 = "作戦中に消耗した弾丸の支出内訳や榴弾で発生した商店街の被害経緯を――"
80000110-27 = "ところで、今日は外がやけに騒がしいですね。#n何かイベントでもあるのでしょうか……？"
80000110-28 = "……バレンタインデー？"
80000110-29 = "ああ、もうそんな時期でしたか。"
80000110-30 = "駅周辺のお店にチョコレートが並んでいたので、なんとなくそろそろだとは思っていましたが……ここ数日、仕事が忙しくすっかり忘れていました。"
80000110-31 = "バレンタインデーか……この時期はD.U.各地でバレンタイン関連のイベントが行われる関係で、我々もパトロールを強化しています。"
80000110-32 = "特に小さな事故が頻繁に発生するため、生活安全局の生徒がいつも出動していて……"
80000110-33 = "……まぁ、重犯罪を扱う私たち公安局と直接の関係はありませんが。"
80000110-37 = "………。"
80000110-38 = "先生、せっかく来てくださったのですから、コーヒーでもいかがですか？"
80000110-39 = "よろしければ、すぐに淹れてきます。"
80000110-40 = "[s] \"じゃあ、お願いしてもいい？\""
80000110-41 = "はい、それでは「いつもの」を用意してきます。"
80000110-50 = "どうぞ。"
80000110-51 = "[s] \"ありがとう、いただきます。\""
80000110-57 = "[ns1] \"あれ……？\"\n[ns2] \"「いつもの」と少し違うような……？\""
80000110-60 = "……何か問題でも？"
80000110-61 = "[s] \"いや、味はいつも通り美味しいんだけど……\""
80000110-63 = "[ns] \"ほのかにチョコレートの香りがするような。\""
80000110-64 = "コーヒーはフルーツとも言いますし、チョコレートの香りがする豆も多いですから。"
80000110-65 = "丁寧に焙煎されたコーヒー豆からチョコレートの香りがしても、おかしいところはありません。"
80000110-66 = "[s] \"でも……これって普段と同じコーヒー豆だよね？\""
80000110-67 = "はい、いつものコーヒー豆を使いました。"
80000110-68 = "ただ、もしいつもより甘いとしたら……"
80000110-72 = "焙煎する過程で、[ruby=・   ・]感情[/ruby]が混ざったのかもしれませんね。"
80000110-77 = "……では、今日もお互い頑張りましょう。"
80000110-81 = "（その後、カンナが淹れてくれた甘いコーヒーを飲んでから、自分の仕事を再開した）"
