[translation]
80000110-1 = "O café coado da Chefe"
80000110-2 = "（Na manhã do Dia dos Namorados, visitei a Academia de Polícia Valkyrie a trabalho por causa da Schale）"
80000110-8 = "Academia de Polícia Valkyrie - Sala Administrativa"
80000110-10 = "Hmm, que complicado..."
80000110-11 = "……Hm?"
80000110-15 = "Professor [USERNAME], bom dia."
80000110-16 = "Vir a esta hora... aconteceu alguma emergência?"
80000110-17 = "……Veio confirmar o cronograma de patrulha desta semana?"
80000110-18 = "……Entendo, fico aliviada."
80000110-19 = "Como não esperava sua visita agora, achei que algo tivesse acontecido."
80000110-20 = "[s] \"O que a Kanna estava fazendo?\""
80000110-21 = "Estava escrevendo os relatórios de incidentes, como de costume."
80000110-22 = "Detalhando o gasto de munição durante a operação e os danos causados no centro comercial por granadas..."
80000110-27 = "Aliás, a rua está bem barulhenta hoje. #nSerá que tem algum evento acontecendo...?"
80000110-28 = "……Dia dos Namorados?"
80000110-29 = "Ah, já é essa época do ano?"
80000110-30 = "Vi chocolates nas lojas perto da estação e imaginei que estivesse chegando, mas... com o trabalho corrido nos últimos dias, acabei esquecendo completamente."
80000110-31 = "Dia dos Namorados, é... Nessa época, como há eventos relacionados por toda D.U., reforçamos nossas patrulhas."
80000110-32 = "Como acidentes pequenos ocorrem com frequência, as alunas do Departamento de Segurança Pública estão sempre em campo..."
80000110-33 = "……Bem, nós do Departamento de Segurança Pública não temos relação direta com isso, já que lidamos com crimes graves."
80000110-37 = "……."
80000110-38 = "Professor, já que veio até aqui, aceita um café?"
80000110-39 = "Se quiser, posso preparar agora mesmo."
80000110-40 = "[s] \"Então, aceito sim, por favor.\""
80000110-41 = "Certo, vou preparar o \"de sempre\"."
80000110-50 = "Aqui está."
80000110-51 = "[s] \"Obrigado, vou aproveitar.\""
80000110-57 = "[ns1] \"Ué...?\"\n[ns2] \"Está um pouco diferente do 'de sempre'...\""
80000110-60 = "……Algum problema?"
80000110-61 = "[s] \"Não, o sabor está delicioso como sempre, mas...\""
80000110-63 = "[ns] \"Sinto um leve aroma de chocolate.\""
80000110-64 = "Dizem que o café é um tipo de fruta, e muitos grãos possuem notas de chocolate."
80000110-65 = "Não há nada de estranho em sentir aroma de chocolate em grãos de café bem torrados."
80000110-66 = "[s] \"Mas... esses não são os mesmos grãos de sempre?\""
80000110-67 = "Sim, usei os grãos de sempre."
80000110-68 = "No entanto, se está mais doce que o habitual..."
80000110-72 = "Talvez seja porque misturei um pouco de sentimento no processo de torra."
80000110-77 = "……Bem, vamos nos esforçar hoje."
80000110-81 = "（Depois disso, tomei o café doce que a Kanna preparou e voltei ao meu trabalho）"
