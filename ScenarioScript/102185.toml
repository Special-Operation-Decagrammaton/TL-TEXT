[translation]
102185-4 = "だいたい片付いたみたいですね。"
102185-5 = "そ、その……助けていただき、ありがとうございました……"
102185-6 = "ふん、お礼は私ではなくイブキにするがいい。"
102185-8 = "イブキ殿！助太刀くださりありがとうございます！"
102185-9 = "えへへ、良かった！イブキね、おねえちゃんたちに怪我してほしくなかったから、#nマコト先輩にお願いしたの。"
102185-10 = "でもでも、大事な忍者の任務……イブキが邪魔しちゃったんじゃないかなって、ちょっと心配……"
102185-12 = "いえ、そんな事はありませんよイブキちゃん……！#nおかげで、誰も怪我をせずに済みました……！"
102185-13 = "イブキ殿のおかげで、危機を乗り越えることができました！"
102185-14 = "ほんとほんと！一瞬「忍術研究部・絶体絶命のピンチ！？」みたいな動画を録るとこだったよ。ナイスタイミング、イブキ！"
102185-15 = "ほんと？えへへ……よかったぁ～！"
102185-16 = "でもこれ以上、忍者のおねえちゃんたちの邪魔したらよくないよね。"
102185-17 = "だから、イブキは遠くから応援してるね。おねえちゃんたち、ファイト～！"
102185-18 = "うん。イブキの応援、確かに受け取った！ "
102185-19 = "はい！ありがとうございます！ニンニン！"
102185-20 = "ふぁ、ふぁいと！おー！"
102185-25 = "忍者との絆……というものでしょうか。"
102185-26 = "……。"
102185-27 = "……えっと、これでひと段落ですか？#n私、言いたいことがたくさんあるんですが……"
102185-28 = "マコト先輩、イロハ先輩！#nイブキのお願い、聞いてくれてありがとう！"
102185-29 = "そして、いつもイブキがワガママ言って、ごめんなさい……"
102185-30 = "……いえ、イブキが良いと言うのなら……"
102185-31 = "これも、悪くないような気がします……"
102185-32 = "さあ、ゲヘナに戻るぞイロハ。"
102185-33 = "……はい、帰りましょう。"
102185-35 = "次回;「D.U.シラトリ区」防衛"
