[translation]
102185-4 = "Parece que conseguimos dar conta da situação por aqui."
102185-5 = "A-aquele... muito obrigada por terem vindo nos salvar..."
102185-6 = "Hmph. Não agradeça a mim, agradeça à Ibuki."
102185-8 = "Ibuki-dono! Muito obrigada pela ajuda!"
102185-9 = "Ehehe, que bom! A Ibuki não queria ver as moças ninja machucadas,#nentão pediu ajuda pra Makoto-senpai."
102185-10 = "Mas... missão ninja é algo super importante, né...? A Ibuki ficou preocupada achando que podia ter atrapalhado vocês..."
102185-12 = "N-não, de jeito nenhum, Ibuki-chan...!#nGraças a você, ninguém se machucou...!"
102185-13 = "Foi graças à Ibuki-dono que conseguimos superar essa crise!"
102185-14 = "Sério mesmo! Por um instante já tava quase gravando um vídeo tipo 'Clube de Pesquisa Ninja em Perigo Mortal!?'! Timing perfeito, Ibuki!"
102185-15 = "Sério? Ehehe... ainda bem~!"
102185-16 = "Mas também não seria legal continuar atrapalhando a missão das moças ninja, né?"
102185-17 = "Então a Ibuki vai ficar torcendo de longe! Boa sorte, moças ninjaaa~!"
102185-18 = "Sim. A torcida da Ibuki chegou direitinho até nós!"
102185-19 = "Sim! Muito obrigada! Ninnin!"
102185-20 = "B-bom trabalho! Ooh!"
102185-25 = "Então isso é... o tal vínculo entre ninjas."
102185-26 = "......"
102185-27 = "...... Err... então acabou tudo por aqui?#nPorque eu ainda tenho MUITA coisa pra reclamar..."
102185-28 = "Makoto-senpai, Iroha-senpai!#nObrigada por atenderem o pedido da Ibuki!"
102185-29 = "E desculpa por a Ibuki sempre ficar sendo egoísta..."
102185-30 = "...... Não, se a Ibuki está feliz com isso..."
102185-31 = "Talvez... isso também não seja tão ruim assim..."
102185-32 = "Muito bem, vamos voltar pra Gehenna, Iroha."
102185-33 = "...... Sim, vamos voltar."
102185-35 = "Próximo episódio;Defesa do Distrito D.U. Shiratori"
