[translation]
1301102-1 = "ゲーマーの日常"
1301102-2 = "ミレニアム・ゲーム開発部"
1301102-4 = "[ns1] \"とりあえず来てみたけど……。\"\n[ns2] \"何をするの？\""
1301102-5 = "あっ、いらっしゃい、先生！"
1301102-6 = "あっ、いらっしゃい、先生！"
1301102-7 = "今日はね……！"
1301102-8 = "勉強、だよ！"
1301102-9 = "[s] \"……勉強？\""
1301102-10 = "そう、より面白いゲームを作るための勉強。"
1301102-11 = "良いゲームを作るために必要なことはたくさんあるけど、"
1301102-12 = "何よりもまず、いろんな種類のゲームをプレイすることが必要だと思うの。"
1301102-13 = "[s3] \"確かに。\"\n[s4] \"ただゲームがやりたいだけじゃなくて？\""
1301102-14 = "でしょ、やっぱり先生もそう思うよね！"
1301102-15 = "そっ、そんなことないもん！"
1301102-16 = "たまには可愛い生徒の純粋な向上心を褒めてくれたっていいじゃん！"
1301102-17 = "とにかく、うちのゲーム開発部はレトロゲーム専門ではあるけど、"
1301102-18 = "いや、レトロゲーム専門だからこそ！"
1301102-19 = "それ以外にも色んなジャンルのゲームをして、創作の素地を広げる必要があるってこと！"
1301102-20 = "そこで事前に用意しておいたゲームがこちら！"
1301102-23 = "[s] \"『ダークネス・スピリッツ４』……？\""
1301102-24 = "うん！スピリッツライク作品の名作、ダークネスシリーズの最新作だよ！"
1301102-25 = "このゲームはとんでもなく難しいことでも有名なんだけど、"
1301102-26 = "それ以外にもたくさん魅力があって、何よりこのダークネスシリーズはシナリオもすごく凝ってるの。"
1301102-27 = "シナリオを前面に押し出すっていうよりも、あちこちに落ちてるメモとか痕跡とかを調べていくと、ちょっとずつ色んな事が分かってくる感じで、"
1301102-28 = "ユーザーはいつの間にか物語の世界を理解してるっていうか、そうやって巧妙に仕掛けられてるっていうか……！"
1301102-29 = "[s5] \"そ、そうなんだ……。\"\n[s6] \"ユーザーを自然な形で世界に引き込むのが上手だよね。\""
1301102-30 = "反応が微妙！？"
1301102-31 = "まあでも、百聞は一見に如かずってね。"
1301102-33 = "さっ、隣で見ててね。先生。"
1301102-34 = "おっ、よく分かってるじゃん先生！"
1301102-35 = "うんうん！そういう点を上手く吸収したいなって思ってて。"
1301102-37 = "だから、私がプレイするのを隣で見ててね、先生！"
1301102-40 = "あっ、最初の敵発見！"
1301102-41 = "なんかすごく強そう……。"
1301102-42 = "でも、直前にポーションをいっぱい手に入れた今の私の敵じゃない！"
1301102-43 = "くらえ～！"
1301102-45 = "（ドガッ！バタン！）"
1301102-47 = "You Died"
1301102-48 = "ええぇぇぇっ！？い、一撃！？"
1301102-49 = "何かのバグじゃなくて！？ぐっ、もう一回！ワンモアチャンス！"
1301102-51 = "ふふふ……同じ手は食わないよ！"
1301102-52 = "タイミングに合わせて……回避っ！よしっ！"
1301102-53 = "ああっ！待って！？スタミナが足りない！？"
1301102-55 = "（ドスッ！バタン！）"
1301102-57 = "You Died"
1301102-58 = "嘘ぉ！？さすがに厳しすぎない！？"
1301102-59 = "うううっ！これしきで諦めると思わないで！！"
1301102-61 = "You Died"
1301102-62 = "う、うぅ……。"
1301102-63 = "[s] \"あの、モモイ？\""
1301102-64 = "先生、今の私はミジンコ以下の存在だよ……。"
1301102-65 = "ゲーム開発部とか言っておいて、最初の敵も倒せないなんて……。"
1301102-66 = "もう34回もゲームオーバーしてるし……。"
1301102-67 = "全然倒せる気がしない！これ本当に難易度設定合ってる！？"
1301102-68 = "絶対ゲームバランスおかしいよ！強すぎるでしょあいつ！？"
1301102-69 = "[s] \"ちょっとやってみてもいい？\""
1301102-70 = "……え、先生が？"
1301102-71 = "[s] \"全然歯が立たないかもだけど、やってみたいなって。\""
1301102-72 = "うっ、途中で断念して他の人に託すなんて……。"
1301102-73 = "ゲーマーとしてのプライドが……っ！"
1301102-74 = "でも、ずっとここで止まってるわけにも行かないし……！"
1301102-76 = "……し、仕方ないなあ。ここだけだよ、先生！？"
1301102-77 = "もしここクリアできたら代わってね！"
1301102-78 = "[s] \"うん、分かった。\""
1301102-82 = "（ブオンッ……！ドサッ！）"
1301102-83 = "わぁっ……！"
1301102-84 = "すごい！！！本当に倒すなんて！すごいよ先生！"
1301102-85 = "[s7] \"まあこれくらいなら。\"\n[s8] \"じゃあ、モモイに続きを……。\""
1301102-86 = "あっ！先生あっち！はじっこの方に宝箱！"
1301102-87 = "あっ！先生あっち！はじっこの方に宝箱！"
1301102-88 = "[s] \"え？あ、本当だ。\""
1301102-89 = "ほら、向こうから新しい敵が来てる！あっ、今度は矢を打ってきてるじゃん！？"
1301102-90 = "[s] \"え、えっ！？\""
1301102-91 = "先生！やっちゃって！"
1301102-93 = "そこっ、うん、良いね先生！あれ、そこの脇道、隠し通路じゃない？"
1301102-95 = "あっ、この新作の明太子味おいしい。先生もチップス食べる？"
1301102-97 = "あれっ、先生！そいつボスじゃない！？見た目的に電撃系の耐性がありそう！"
1301102-100 = "（そうして時間が過ぎ、いつの間に画面には壮大なEDが流れていた）"
1301102-101 = "[ns] \"お、終わった……。\""
1301102-102 = "すっごい……！さすが、評判通り最高のシナリオだった！あ、先生もお疲れ様！"
1301102-103 = "[s] \"結局何だかんだで、代わりに最後までやっちゃった……。\""
1301102-104 = "はー、面白かった！"
1301102-105 = "ゲームは一人でも楽しいけど、誰かと一緒にやっても楽しいね！"
1301102-106 = "よし、じゃあ次っ。"
1301102-107 = "[s] \"……次？\""
1301102-110 = "2周目に行こう、先生！"
1301102-111 = "このゲーム、2周目からが本番なんだって！"
1301102-112 = "[s] \"……。\""
1301102-115 = "（そうしてモモイの代わりに、ダークネススピリッツ４を2周目までプレイした）"
