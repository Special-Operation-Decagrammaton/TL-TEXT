[translation]
1301102-1 = "O cotidiano de uma gamer"
1301102-2 = "Departamento de Desenvolvimento de Jogos de Millennium"
1301102-4 = "[ns1] \"Eu vim porque você pediu, mas...\"\n[ns2] \"O que vamos fazer?\""
1301102-5 = "Ah, bem-vindo, Sensei!"
1301102-6 = "Ah, bem-vindo, Sensei!"
1301102-7 = "Hoje nós vamos...!"
1301102-8 = "Estudar!"
1301102-9 = "[s] \"...Estudar?\""
1301102-10 = "Isso mesmo, estudar para criar jogos ainda mais interessantes."
1301102-11 = "Existem muitas coisas necessárias para criar um bom jogo, mas..."
1301102-12 = "acredito que, antes de tudo, é preciso jogar vários tipos de jogos."
1301102-13 = "[s3] \"Faz sentido.\"\n[s4] \"Você não quer apenas jogar, quer?\""
1301102-14 = "Viu só? Eu sabia que o Sensei concordaria comigo!"
1301102-15 = "N-não é nada disso!"
1301102-16 = "De vez em quando, você poderia elogiar a busca sincera por conhecimento de uma aluna dedicada, sabia!"
1301102-17 = "De qualquer forma, nosso Departamento de Desenvolvimento de Jogos é especializado em jogos retrô, mas..."
1301102-18 = "Não, é justamente PORQUE somos especializados em retrô!"
1301102-19 = "Que precisamos jogar outros gêneros para expandir nossa base criativa!"
1301102-20 = "E para isso, aqui está o jogo que preparei com antecedência!"
1301102-23 = "[s] \"'Darkness Spirits 4'...?\""
1301102-24 = "Isso! É o mais novo título da série Darkness, uma obra-prima do gênero 'Spirits-like'!"
1301102-25 = "Esse jogo é famoso por ser absurdamente difícil, mas..."
1301102-26 = "ele tem muitos outros atrativos. Acima de tudo, a série Darkness tem um roteiro muito bem elaborado."
1301102-27 = "Em vez de jogar o roteiro na sua cara, conforme você investiga notas e vestígios espalhados pelo cenário, as coisas vão ficando claras aos poucos..."
1301102-28 = "O jogador acaba entendendo o mundo da história sem nem perceber. É tudo montado de forma tão engenhosa...!"
1301102-29 = "[s5] \"E-entendi...\"\n[s6] \"Eles são bons em atrair o jogador para o mundo de forma natural, né?\""
1301102-30 = "Essa reação foi meio morna!?"
1301102-31 = "Bom, mas como dizem, ver para crer."
1301102-33 = "Vamos lá, fique aqui do lado e observe, Sensei."
1301102-34 = "Ah, você entende bem, Sensei!"
1301102-35 = "Sim, sim! Eu quero aprender a absorver esses pontos positivos."
1301102-37 = "Por isso, fique aqui do meu lado enquanto eu jogo, Sensei!"
1301102-40 = "Ah, encontrei o primeiro inimigo!"
1301102-41 = "Ele parece ser muito forte..."
1301102-42 = "Mas agora que eu peguei um monte de poções logo antes, ele não é páreo para mim!"
1301102-43 = "Toma essa!"
1301102-45 = "(Pá! Tum!)"
1301102-47 = "You Died"
1301102-48 = "O quêêêê!? U-um golpe só!?"
1301102-49 = "Isso não é um bug!? Grr, mais uma vez! Mais uma chance!"
1301102-51 = "Hehehe... não vou cair no mesmo truque duas vezes!"
1301102-52 = "No tempo certo... esquiva! Isso!"
1301102-53 = "Ah! Espera!? Minha estamina acabou!?"
1301102-55 = "(Soco! Tum!)"
1301102-57 = "You Died"
1301102-58 = "Mentira!? Isso não é difícil demais não!?"
1301102-59 = "Uuuu! Não pense que vou desistir por causa disso!!"
1301102-61 = "You Died"
1301102-62 = "A-ai, ai..."
1301102-63 = "[s] \"Ei, Momoi?\""
1301102-64 = "Sensei, agora eu sou menos que uma pulga d'água..."
1301102-65 = "Dizemos que somos o Departamento de Desenvolvimento de Jogos, mas não consigo nem derrotar o primeiro inimigo..."
1301102-66 = "Já dei game over 34 vezes..."
1301102-67 = "Não sinto que consigo vencer de jeito nenhum! Será que a dificuldade está configurada certo!?"
1301102-68 = "O balanceamento desse jogo está totalmente errado! Aquele cara é forte demais, não é!?"
1301102-69 = "[s] \"Posso tentar jogar um pouco?\""
1301102-70 = "……Eh, você, Sensei?"
1301102-71 = "[s] \"Talvez eu não consiga fazer muita coisa, mas queria tentar.\""
1301102-72 = "Ugh, desistir no meio e passar para outra pessoa..."
1301102-73 = "Meu orgulho como gamer……!"
1301102-74 = "Mas também não posso ficar travada aqui para sempre……!"
1301102-76 = "……T-tá bom, não tem jeito. É só dessa vez, viu, Sensei!?"
1301102-77 = "Se você conseguir passar dessa parte, me devolve o controle!"
1301102-78 = "[s] \"Sim, entendi.\""
1301102-82 = "（Vuuuum……! Thump!）"
1301102-83 = "Uau……!"
1301102-84 = "Incrível!!! Você realmente derrotou! Incrível, Sensei!"
1301102-85 = "[s7] \"Bom, foi só isso.\"\n[s8] \"Então, vou passar o resto para a Momoi...\""
1301102-86 = "Ah! Sensei, ali! Tem um baú de tesouro no cantinho!"
1301102-87 = "Ah! Sensei, ali! Tem um baú de tesouro no cantinho!"
1301102-88 = "[s] \"Eh? Ah, é verdade.\""
1301102-89 = "Olha, um novo inimigo está vindo dali! Ah, agora ele está atirando flechas!?"
1301102-90 = "[s] \"E-eh!?\""
1301102-91 = "Sensei! Acaba com ele!"
1301102-93 = "Ali, isso, muito bem, Sensei! Ei, aquele caminho lateral, não é uma passagem secreta?"
1301102-95 = "Ah, esse salgadinho novo de sabor menta picante é bom. Quer um pouco, Sensei?"
1301102-97 = "Ei, Sensei! Aquele ali não é o chefe!? Pela aparência, parece que ele tem resistência a ataques elétricos!"
1301102-100 = "（E assim o tempo passou, e antes que percebessem, os créditos finais grandiosos já estavam rolando na tela）"
1301102-101 = "[ns] \"A-acabou…….\""
1301102-102 = "Incrível……! Como esperado, o cenário foi o melhor, exatamente como diziam as críticas! Ah, bom trabalho também, Sensei!"
1301102-103 = "[s] \"No fim das contas, acabei jogando tudo até o final por você...\""
1301102-104 = "Ah, foi divertido!"
1301102-105 = "Jogar sozinho é legal, mas jogar com alguém é ainda melhor!"
1301102-106 = "Beleza, então, o próximo."
1301102-107 = "[s] \"……Próximo?\""
1301102-110 = "Vamos para a segunda rodada, Sensei!"
1301102-111 = "Dizem que a verdadeira diversão desse jogo começa na segunda rodada!"
1301102-112 = "[s] \"…….\""
1301102-115 = "（E assim, no lugar da Momoi, joguei Darkness Spirits 4 até a segunda rodada）"
