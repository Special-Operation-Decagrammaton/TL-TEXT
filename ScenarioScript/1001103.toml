[translation]
1001103-1 = "Depois de comer, escove bem os dentes"
1001103-2 = "Shanhaijing, Jardim das Ameixeiras"
1001103-3 = "Pessoal, vocês comeram tudo no almoço?"
1001103-4 = "Sim!"
1001103-5 = "Fufu, muito bem. E vocês se lembram que é obrigatório escovar os dentes depois de comer, certo?"
1001103-6 = "Sim."
1001103-7 = "Mas, ultimamente, tem algumas crianças que não estão escovando os dentes direito. Por isso, hoje, junto com o Sensei, vou usar um teatro de fantoches para mostrar o que acontece se vocês não escovarem os dentes."
1001103-8 = "Vamos lá, prestem bastante atenção, tá bom?"
1001103-9 = "Quando vocês comem doces, pequenos pedaços ficam presos nos dentes assim. #nEntão, as terríveis bactérias da cárie sentem o cheiro e vêm correndo."
1001103-10 = "Agora, Sensei. É a sua vez. Por favor, faça o papel da bactéria da cárie."
1001103-12 = "[s] \"Gya, Gyaooo!\""
1001103-13 = "Que... que medo..."
1001103-14 = "Vejam só, não é assustador? Se vocês não escovarem os dentes direito, essas bactérias terríveis vão aparecer."
1001103-15 = "Mas não se preocupem, se escovarem os dentes direitinho, as bactérias da cárie não conseguirão fazer nada."
1001103-16 = "Agora, Sensei. Pode continuar, por favor."
1001103-18 = "[s] \"Ugh... escovar os dentes... que agonia...\""
1001103-21 = "Uau, a bactéria da cárie foi derrotada!"
1001103-22 = "E então, pessoal, o que acharam? #nDe agora em diante, escovem os dentes com bastante dedicação para que vocês também possam derrotar as terríveis bactérias da cárie, entenderam?"
1001103-23 = "Sim!"
1001103-25 = "Muito obrigada por me ajudar com o teatro de fantoches hoje. Sua atuação foi realmente maravilhosa!"
1001103-26 = "[s] \"Sinto-me um pouco envergonhado...\""
1001103-27 = "Mas foi extremamente eficaz com as crianças!"
1001103-28 = "Graças a você, as crianças do Jardim das Ameixeiras provavelmente vão escovar os dentes direitinho a partir de agora. Fufu..."
1001103-29 = "Ah, é verdade, o Sensei também escovou os dentes direitinho depois de comer hoje, não foi?"
1001103-30 = "[s] \"Claro que sim.\""
1001103-31 = "Hmm, não posso acreditar só na sua palavra. Por favor, abra a boca e diga 'ah'."
1001103-33 = "Vamos, não seja tímido, diga 'ah'..."
1001103-34 = "[s] Abre a boca relutantemente."
1001103-36 = "Impressionante, Sensei. Parece que você escova os dentes muito bem no dia a dia. Estão muito limpos."
1001103-37 = "Sendo assim, não precisa ter medo das terríveis bactérias da cárie, fufu..."
1001103-38 = "Ué, aconteceu alguma coisa?"
1001103-39 = "Você quer que eu me afaste porque meu rosto está muito perto?"
1001103-40 = "Fufu, não posso. Não posso me afastar sem verificar cada cantinho da sua boca."
1001103-41 = "Vamos, não seja tímido, abra a boca mais uma vez. Diga 'ah'..."
