[translation]
1001103-1 = "食事の後は、綺麗に歯磨き"
1001103-2 = "山海経・梅花園"
1001103-3 = "みなさ～ん、お昼は残さず食べましたか？"
1001103-4 = "は～い！"
1001103-5 = "ふふ、よくできました。そして食事の後は必ず歯磨きをするんでしたね？"
1001103-6 = "は～い。"
1001103-7 = "ですが、最近きちんと歯を磨かない子がいます。なので今日は先生と一緒に人形劇で、歯を磨かないとどうなってしまうのかをお見せしようと思います。"
1001103-8 = "さあ、しっかり見ていてくださいね～。"
1001103-9 = "みなさんが甘いものを食べた後、こうやって歯にその小さなカケラが残ってしまうんです。#nそうすると、恐ろしい虫歯菌が、その匂いを嗅いでやってくるんですよ。"
1001103-10 = "さあ、先生。今です。虫歯菌になってください。"
1001103-12 = "[s] \"ギャ、ギャオオオー。\""
1001103-13 = "こ、怖い……。"
1001103-14 = "見てください、怖いでしょう？きちんと歯を磨かないと、こんなに怖い虫歯菌がやってくるんですよ。"
1001103-15 = "でも大丈夫、歯をきちんと磨けば、虫歯菌も力を発揮できません。"
1001103-16 = "さあ、先生。続けてお願いします。"
1001103-18 = "[s] \"ううっ……歯を磨くとは……苦しい――。\""
1001103-21 = "わあ、虫歯菌が倒れた！"
1001103-22 = "さあ、みなさんいかがでしたか？#nこれからはみなさんも怖い虫歯菌を倒せるように、一生懸命歯を磨くんですよ？"
1001103-23 = "は～い！"
1001103-25 = "今日は人形劇を手伝っていただきありがとうございました。本当に素晴らしい演技でした！"
1001103-26 = "[s] \"なんだか恥ずかしい……。\""
1001103-27 = "でも、子供たちには効果てき面でした！"
1001103-28 = "おかげさまで[ruby=ばいかえん]梅花園[/ruby]の子たちも、これからはきちんと歯を磨いてくれそうです。ふふ……。"
1001103-29 = "そうだ、もちろん先生も、今日の食事の後にきちんと歯磨きされましたよね？"
1001103-30 = "[s] \"もちろん。\""
1001103-31 = "うーん、言葉だけでは信じられません。あ～ん、してみてください。"
1001103-33 = "ほら、恥ずかしがらないで、あ～ん……。"
1001103-34 = "[s] 仕方なく口を開ける。"
1001103-36 = "流石です、先生。普段からしっかり歯磨きをされているようですね。とってもきれいです。"
1001103-37 = "これなら怖い虫歯菌がやってくるのを怖がる必要はなさそうですね、ふふ……。"
1001103-38 = "あれ、どうかしましたか？"
1001103-39 = "顔が近すぎるから、離れてほしい、ですか？"
1001103-40 = "ふふ、ダメです。お口の中を隅々まで確認しないと離れられません。"
1001103-41 = "さあ、恥ずかしがらないで、もう一度お口を開けてください。あ～ん……。"
