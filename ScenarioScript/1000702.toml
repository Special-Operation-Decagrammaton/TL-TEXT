[translation]
1000702-1 = "模範的な市民"
1000702-2 = "交番"
1000702-3 = "うわあああん！先生ー！"
1000702-4 = "あたし、何も悪くないのに、急にお巡りさんに捕まって連れてこられて……。"
1000702-5 = "何も悪くないって、まだ反省してないのか！"
1000702-6 = "うわーん、先生ー！助けてー！"
1000702-7 = "この子の保護者ですか？"
1000702-8 = "[s] \"この子の先生です。\""
1000702-9 = "でしたら、この子が何をしていたのかご存じですか？"
1000702-10 = "悪いことはしてない！#nやるべきことをやっただけ！"
1000702-11 = "静かに！"
1000702-13 = "この子はですね、無断で人の私有地に入り込み……。"
1000702-15 = "落書きをしたんです！"
1000702-16 = "落書きじゃない！グラフィティだもん、芸術だもん！"
1000702-17 = "傍から見たらただの落書きだ！"
1000702-18 = "[s] \"落書き、ですか？\""
1000702-19 = "はい、グラフィティだかなんだか知りませんが、消せない油性ペイントを壁に大量に振りまいたんです！"
1000702-20 = "でもその後、大家さんは大丈夫だよって言ってたし！"
1000702-21 = "それはあくまで今回描いたことを許すって意味であって、描いても大丈夫って意味じゃない！#nしかも君は今回が初めてじゃないでしょう！"
1000702-22 = "KVハイウェイの高架下に、クロネコ市場の裏路地に……。"
1000702-23 = "人通りの少ないところならどこにでも落書きをするせいで、消す人がどれだけ苦労してるか知ってるのか？"
1000702-24 = "だから落書きじゃなくて芸術だってば！"
1000702-26 = "[s] \"すみません……。\""
1000702-27 = "謝罪は先生ではなく、この生徒さんがしなきゃいけないことです。"
1000702-28 = "嫌っ！あたしはこの薄暗い都市を、明るく飾ってあげただけなのに！"
1000702-29 = "[s] \"ちゃんと謝って、マキ。\""
1000702-30 = "でも……うう……。"
1000702-31 = "すみません……でした。ごめんなさい。"
1000702-32 = "ふう、今日はこれぐらいにしておきましょう。#nただし、もう次はありませんよ！"
1000702-34 = "あの、先生。えっと……その……。#nもしかして、怒ってる？"
1000702-35 = "[s] \"大丈夫。\""
1000702-36 = "やっぱり怒ってる、ううう……。"
1000702-37 = "でもさ～、あの薄暗い灰色の壁があたしに語り掛けてきたんだよ。可愛い色で彩って、って。"
1000702-38 = "も、もちろん人の物に勝手に描いちゃいけないってことは分かってたけど……"
1000702-39 = "燃え上がる芸術魂があたしを駆り立てて……。"
1000702-40 = "……ごめん、でもやっぱり先生にも嫌われたくない。"
1000702-41 = "グラフィティは好きだけど、先生に怒られるのは嫌だし。"
1000702-42 = "どうしよう……グラフィティはやりたいし、でも先生には怒られたくないし……。"
1000702-43 = "[s] \"大きなキャンバスを見つけて、そこに絵を描こう。\""
1000702-44 = "……大きなキャンバス？"
1000702-45 = "そっか、キャンバスをいくつも組み合わせれば壁の代わりに使えるかも！"
1000702-46 = "もしかしたら、本当の壁にグラフィティをするほど楽しくはないかもしれないけど……#n先生と一緒なら何でも楽しいはず。"
1000702-47 = "そしたら先生、今度あたしが大きなキャンバスを持ってきたら、一緒に絵を描いてくれる？"
1000702-48 = "[s] \"うん、一緒に絵を描こう。\""
1000702-49 = "ふふっ、約束だよ？#nありがと、先生！"
