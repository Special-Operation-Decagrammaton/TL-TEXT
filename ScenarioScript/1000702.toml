[translation]
1000702-1 = "Cidadã exemplar"
1000702-2 = "Delegacia"
1000702-3 = "Waaaaah! Sensei!"
1000702-4 = "Eu não fiz nada de errado, mas de repente o policial me pegou e me trouxe para cá..."
1000702-5 = "Diz que não fez nada de errado, mas ainda não se arrependeu de nada!"
1000702-6 = "Waaaah, Sensei! Me ajuda!"
1000702-7 = "Você é o responsável por esta criança?"
1000702-8 = "[s] \"Sou o professor dela.\""
1000702-9 = "Nesse caso, você sabe o que ela estava fazendo?"
1000702-10 = "Eu não fiz nada de ruim!#nEu só fiz o que tinha que ser feito!"
1000702-11 = "Silêncio!"
1000702-13 = "Esta criança invadiu uma propriedade privada sem permissão e..."
1000702-15 = "Fez pichações!"
1000702-16 = "Não é pichação! É grafite, é arte!"
1000702-17 = "Para quem vê de fora, não passa de pichação!"
1000702-18 = "[s] \"Pichação, é?\""
1000702-19 = "Sim, não sei se é grafite ou o que for, mas ela espalhou um monte de tinta a óleo permanente que não sai na parede!"
1000702-20 = "Mas depois o dono disse que estava tudo bem!"
1000702-21 = "Isso significa apenas que ele perdoou o que você fez desta vez, não que você pode continuar fazendo!#nAlém disso, não é a primeira vez que você faz isso!"
1000702-22 = "Embaixo do viaduto da rodovia KV, no beco atrás do mercado Kuroneko..."
1000702-23 = "Você tem noção do trabalho que dá para quem tem que limpar, já que você picha qualquer lugar que não tenha movimento?"
1000702-24 = "Eu já disse que não é pichação, é arte!"
1000702-26 = "[s] \"Sinto muito...\""
1000702-27 = "O pedido de desculpas não deve vir de você, Sensei, mas sim desta aluna."
1000702-28 = "Não quero! Eu só estava tentando decorar esta cidade sombria para deixá-la mais alegre!"
1000702-29 = "[s] \"Peça desculpas direito, Maki.\""
1000702-30 = "Mas... ugh..."
1000702-31 = "Sinto... muito. Me desculpa."
1000702-32 = "Ufa, vamos deixar por isso mesmo por hoje.#nMas não haverá uma próxima vez!"
1000702-34 = "Ei, Sensei. Bem... é que...#nPor acaso, você está bravo?"
1000702-35 = "[s] \"Está tudo bem.\""
1000702-36 = "Você está bravo sim, buááá..."
1000702-37 = "Mas sabe, aquela parede cinza e sombria falou comigo. Ela pediu para ser colorida com cores bonitas."
1000702-38 = "E-eu sabia que não podia desenhar nas coisas dos outros sem permissão, mas..."
1000702-39 = "Minha alma artística em chamas me impulsionou..."
1000702-40 = "...Desculpa, mas eu não quero que o Sensei me odeie."
1000702-41 = "Eu amo grafite, mas não quero que o Sensei fique bravo comigo."
1000702-42 = "O que eu faço... eu quero fazer grafite, mas não quero deixar o Sensei bravo..."
1000702-43 = "[s] \"Vamos encontrar uma tela grande e desenhar nela.\""
1000702-44 = "...Uma tela grande?"
1000702-45 = "É verdade, se eu juntar várias telas, talvez eu possa usá-las no lugar de uma parede!"
1000702-46 = "Talvez não seja tão divertido quanto fazer grafite em uma parede de verdade...#nMas com o Sensei, tudo deve ser divertido."
1000702-47 = "Então, Sensei, quando eu trouxer uma tela grande, você desenha comigo?"
1000702-48 = "[s] \"Sim, vamos desenhar juntos.\""
1000702-49 = "Hehe, é uma promessa, hein?#nObrigada, Sensei!"
