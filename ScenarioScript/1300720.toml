[translation]
1300720-1 = "努力の結晶"
1300720-6 = "（ジュンコが息を切らしながら飛び込んできた）"
1300720-7 = "[s1] \"早かったね、ジュンコ。\"\n[s2] \"それで、完成したものって……？\""
1300720-10 = "ふふーん、それはね……"
1300720-11 = "芝タウンエリアのグルメ手帳！"
1300720-12 = "[s] \"グルメ手帳？\""
1300720-13 = "そう！私がこれまで行ったレストランが書いてあるんだけど……。"
1300720-14 = "この手帳は、そこから「おいしいお店」だけをまとめたもの。"
1300720-15 = "当たり前なんだけど、私一人でキヴォトス中のお店に行けるわけじゃないから……"
1300720-16 = "エリア別に整理して、ちょっとずつ書いてたの。"
1300720-17 = "それで、やーっと芝タウンのおいしいお店をまとめられたのよ！"
1300720-18 = "[s] \"芝タウンの飲食店を全部回ったの！？\""
1300720-19 = "いや、流石にそれは難しいから、行くお店は絞ったわよ。"
1300720-20 = "それに、ハルナが爆発させなかったお店なら、ハルナのお墨付きをもらったってことだし……"
1300720-21 = "そういう風に行く店を絞っていけば、お金も時間も節約できて効率的でしょ？"
1300720-22 = "そうやってようやく作り上げたのがこの芝タウンをまとめた手帳ってわけ！"
1300720-23 = "[s3] \"そうかもしれないけど……。\"\n[s4] \"美食研究会の活動、このままにしていいものなのか……。\""
1300720-26 = "と、とにかく！"
1300720-27 = "これで芝タウンのおいしいお店は制覇したってことなの！"
1300720-28 = "[s] \"そういう風にしなくてもインターネットのグルメランキングとかあるんじゃない？\""
1300720-29 = "ふふっ。それこそ一を知って二を知らずよ、先生。"
1300720-30 = "インターネットのランキングはステマや業者が多いし、#n行ってみたら聞いてた話と違うってこともあるじゃない？"
1300720-31 = "それに、ああいうレビューって「私の好き」じゃなくて「誰かの好き」でしょ？"
1300720-32 = "確かにおいしいのかもしれないけど、私の好みに合うかどうかは別の話なの。"
1300720-33 = "でもね、このグルメ手帳は世界でたったひとつ……。#n私の好きが詰まった一冊なんだから！"
1300720-34 = "[s5] \"確かに、そう言われると……。\"\n[s6] \"美食の世界は奥が深いね。\""
1300720-37 = "そういう事。#n今日は手帳が完成した記念に、オススメのお店に行くわよ！"
1300720-38 = "さあ、先生も早く準備して！"
1300720-39 = "[s] \"えっ、私も？\""
1300720-40 = "当たり前じゃない！#nだいじょーぶ、今日は私が奢ってあげるから！"
1300720-49 = "ん～、おいしかった！#n先生はどう？おいしかった？"
1300720-50 = "[s] \"最高だったよ！\""
1300720-51 = "そっか、先生はそう思ったんだ。"
1300720-52 = "確かにおいしいけど、私はコスパがいいお店だと思ってるのよね。"
1300720-53 = "うーん、これは私の持論なんだけど、#nいいお店っていうのはお客さんを満足させられるお店のことだと思ってるわ。"
1300720-54 = "私の場合、満足度に直結するのはコスパなんだけど……"
1300720-55 = "あ、でも、だからといって、ただ安いだけじゃダメ。#nちゃんとおいしいって思えるラインは守ってくれないとね。"
1300720-56 = "[s] \"バランスが大切ってことだね。\""
1300720-57 = "そういう事！#nじゃあ、そろそろ行くわよ。#nすみません、お会計お願いしまーす！"
1300720-58 = "[s7] \"あ、お会計のことなんだけど……。\"\n[s8] \"ここは私が……。\""
1300720-61 = "ん、先生？どうしたの？"
1300720-62 = "後で手帳を共有してほしいって……？"
1300720-63 = "[s9] \"この辺りのおいしいお店を知っておきたくて。\"\n[s10] \"そのお返しということで、どうかな？\""
1300720-66 = "え……でも今日は、私が先生に奢ろうとしてたのに。"
1300720-67 = "思ってたのと違っちゃうような……。"
1300720-68 = "……やっぱり、たまには私に出させて。"
1300720-69 = "奢ってもらってばっかじゃ、なんか悪いし……。"
1300720-70 = "[s11] \"ふっふっふ。甘いですよ、ジュンコさん。\"\n[s12] \"私はあなたが地道に続けてきた努力の結晶を……\"\n[s13] \"ちょっと奢ったくらいで頂戴しようという悪い怪盗であーる！\""
1300720-74 = "……。"
1300720-78 = "あははっ、何それ！"
1300720-79 = "ま、それなら仕方ないよね！"
1300720-80 = "ここは怪盗さんのトリックに騙されてあげようじゃない！"
1300720-82 = "（笑顔のジュンコと過ごす帰り道は、楽しい[ruby=ひととき]一時[/ruby]だった）"
