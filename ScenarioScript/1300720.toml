[translation]
1300720-1 = "Fruto do esforço"
1300720-6 = "（Junko entra correndo, ofegante）"
1300720-7 = "[s1] \"Você foi rápida, Junko.\"\n[s2] \"Então, o que é que você terminou...?\""
1300720-10 = "Hehe, é o seguinte..."
1300720-11 = "O guia gastronômico da área de Shiba Town!"
1300720-12 = "[s] \"Guia gastronômico?\""
1300720-13 = "Isso! Tem anotado todos os restaurantes que visitei até agora..."
1300720-14 = "Este guia é uma compilação apenas dos \"lugares deliciosos\" que encontrei."
1300720-15 = "Obviamente, não tem como eu visitar todos os restaurantes de Kivotos sozinha..."
1300720-16 = "Então eu organizei por área e fui escrevendo aos poucos."
1300720-17 = "E finalmente, consegui reunir os melhores lugares de Shiba Town!"
1300720-18 = "[s] \"Você visitou todos os restaurantes de Shiba Town!?\""
1300720-19 = "Não, isso seria impossível, então eu selecionei os lugares que visitei."
1300720-20 = "Além disso, se for um lugar que a Haruna não explodiu, significa que tem o selo de aprovação dela..."
1300720-21 = "Se eu filtrar os lugares assim, economizo tempo e dinheiro, é bem eficiente, né?"
1300720-22 = "Foi assim que finalmente criei este guia de Shiba Town!"
1300720-23 = "[s3] \"Pode ser, mas...\"\n[s4] \"Será que as atividades do Clube de Pesquisa Gastronômica podem continuar assim...?\""
1300720-26 = "B-bem, de qualquer forma!"
1300720-27 = "Isso significa que eu conquistei todos os lugares deliciosos de Shiba Town!"
1300720-28 = "[s] \"Mas não existem rankings gastronômicos na internet para isso?\""
1300720-29 = "Hehe. Você não entende nada, Sensei."
1300720-30 = "Os rankings da internet estão cheios de propaganda e bots, e às vezes você vai lá e é totalmente diferente do que diziam, não é?"
1300720-31 = "Além disso, aquelas avaliações são o \"gosto de alguém\", não o \"meu gosto\"."
1300720-32 = "Pode até ser gostoso, mas se combina com o meu paladar, já é outra história."
1300720-33 = "Mas este guia gastronômico é único no mundo... #nÉ um livro recheado com o que eu gosto!"
1300720-34 = "[s5] \"Realmente, dito dessa forma...\"\n[s6] \"O mundo da gastronomia é profundo, não é?\""
1300720-37 = "Exatamente. #nHoje, para comemorar a conclusão do guia, vamos a um dos lugares recomendados!"
1300720-38 = "Vamos, Sensei, prepare-se logo!"
1300720-39 = "[s] \"Ah, eu também?\""
1300720-40 = "Claro que sim! #nNão se preocupe, hoje é por minha conta!"
1300720-49 = "Hum~, estava delicioso! #nO que achou, Sensei? Estava bom?"
1300720-50 = "[s] \"Estava incrível!\""
1300720-51 = "Entendi, então você achou isso."
1300720-52 = "É realmente gostoso, mas eu considero um lugar com um ótimo custo-benefício."
1300720-53 = "Hum, é uma teoria minha, mas... #num bom restaurante é aquele que consegue satisfazer o cliente."
1300720-54 = "No meu caso, o que está diretamente ligado à satisfação é o custo-benefício..."
1300720-55 = "Ah, mas não me entenda mal, não basta ser apenas barato. #nTem que manter um padrão de qualidade que eu considere delicioso."
1300720-56 = "[s] \"Então o equilíbrio é o mais importante.\""
1300720-57 = "Exatamente! #nBom, vamos indo. #nCom licença, a conta, por favor!"
1300720-58 = "[s7] \"Ah, sobre a conta...\"\n[s8] \"Deixa que eu pago...\""
1300720-61 = "Hum, Sensei? O que houve?"
1300720-62 = "Quer que eu compartilhe o guia com você depois...?"
1300720-63 = "[s9] \"Eu queria conhecer os lugares bons por aqui.\"\n[s10] \"Que tal se isso for a minha forma de retribuir?\""
1300720-66 = "Ah... mas hoje eu queria pagar para você, Sensei."
1300720-67 = "Sinto que as coisas não saíram como eu planejei..."
1300720-68 = "...Deixa eu pagar, pelo menos desta vez."
1300720-69 = "Ficar sendo convidada o tempo todo me faz sentir mal..."
1300720-70 = "[s11] \"Hehe. Você é muito ingênua, Junko-san.\"\n[s12] \"Eu sou um ladrão astuto que quer roubar o fruto do seu esforço...\"\n[s13] \"...apenas pagando uma refeição!\""
1300720-74 = "..."
1300720-78 = "Ahaha, que isso!"
1300720-79 = "Bem, nesse caso, não tem jeito, né!"
1300720-80 = "Vamos deixar o truque do ladrão nos enganar desta vez!"
1300720-82 = "（O caminho de volta para casa com a Junko sorridente foi um momento muito agradável）"
