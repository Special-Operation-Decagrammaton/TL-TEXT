[translation]
2002702-1 = "Snorkeling"
2002702-3 = "（Caminhei em direção ao rochedo onde Shiroko estava esperando）"
2002702-4 = "……Ah, Sensei. Por aqui."
2002702-5 = "[ns1] \"Desculpe a demora, Shiroko.\"\n[ns2] \"Este lugar é……\""
2002702-13 = "Um rochedo à beira-mar. É perfeito para coletar ingredientes."
2002702-14 = "……Hm?"
2002702-15 = "É verdade que ainda temos o que coletamos antes, mas……"
2002702-16 = "Hmm……"
2002702-17 = "Você tem razão……"
2002702-21 = "……Acho que não dá. Não podemos pegar mais do que isso."
2002702-25 = "[ns3] \"Só um pouquinho.\"\n[ns4] \"Tente não pegar demais.\""
2002702-28 = "Hm……"
2002702-29 = "Eu sabia que você diria isso, Sensei."
2002702-30 = "Por isso, me preparei bem. #nHoje não há brechas em mim."
2002702-40 = "Olhe, Sensei."
2002702-41 = "[s5] \"Equipamento de snorkeling.\"\n[s6] \"Você realmente está bem preparada.\""
2002702-44 = "Hm. Meu alvo de hoje é algo grande."
2002702-45 = "――A \"concha lendária\", que só pode ser encontrada por aqui."
2002702-46 = "……Você nunca ouviu falar dela, Sensei?"
2002702-47 = "……Na verdade, eu só vi em um panfleto. #nNão dá para saber se ela realmente existe sem verificar com os próprios olhos."
2002702-48 = "Hm…… Só tenho essa informação por enquanto, mas estou curiosa."
2002702-52 = "……Não é hora de ficar parada."
2002702-53 = "Sensei, espere um pouco. Já volto."
2002702-58 = "（……Antes que eu pudesse responder, Shiroko mergulhou）"
2002702-60 = "（Toda vez que Shiroko emergia da água, ela trazia algo estranho nas mãos……）"
2002702-65 = "[ns7] \"Será que……\"\n[ns8] \"Essa é a 'concha lendária'?\""
2002702-68 = "Não, não é essa."
2002702-72 = "……Vou mergulhar mais uma vez."
2002702-83 = "（No fim, mesmo ao anoitecer, a 'concha lendária' não foi encontrada）"
2002702-84 = "[ns9] \"Já está na hora……\"\n[ns10] \"Precisamos voltar logo……\""
2002702-87 = "Não."
2002702-88 = "Está tudo bem, Sensei."
2002702-92 = "De alguma forma……"
2002702-93 = "……Eu consegui a tempo."
2002702-96 = "[wa:1000]― [log=시로코 수영복]……Voltei, [wa:900]Sensei.[/log]"
2002702-98 = "[wa:600]― [log=시로코 수영복]……Hm, [wa:900]consegui.[wa:1800]……Agora, posso preparar.[/log]"
2002702-101 = "[wa:1300]― [log=시로코 수영복]Aquele prato, [wa:1400]que vi no panfleto.[/log]"
2002702-103 = "[wa:900]― [log=시로코 수영복]Também preparei os utensílios de cozinha, [wa:2100]então sem problemas.[/log]"
2002702-106 = "[wa:1300]― [log=시로코 수영복]……Fico feliz que o [wa:600]Sensei tenha vindo [wa:700]comigo.[/log]"
2002702-108 = "[wa:1000]― [log=시로코 수영복]Se estivesse sozinha, [wa:1400]talvez tivesse desistido no meio do caminho.[/log]"
2002702-111 = "[ns11] \"Eu não fiz nada.\"\n[ns12] \"Tenho certeza de que você teria conseguido sozinha, Shiroko.\""
2002702-114 = "[wa:500]― [log=시로코 수영복]Não…… [wa:1100]isso não é verdade.[/log]"
2002702-116 = "[wa:900]― [log=시로코 수영복]Até mesmo agora, [wa:1200]o motivo de eu ter começado a pensar nisso,[wa:1400] tudo isso.[/log]"
2002702-119 = "[wa:1400]― [log=시로코 수영복]Tudo…… [wa:1300]foi porque o [wa:300]Sensei estava aqui.[/log]"
2002702-122 = "[wa:1200]― [log=시로코 수영복]……Sensei.[wa:2000]……Obrigada.[/log]"
2002702-125 = "（Voltei para o resort com uma Shiroko de expressão radiante）"
2002702-126 = "（Parece que é chamada de 'concha lendária', mas……）"
2002702-133 = "（……Ao provar, tinha um gosto comum）"
