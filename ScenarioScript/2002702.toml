[translation]
2002702-1 = "シュノーケリング"
2002702-3 = "（シロコが待っている岩場に向かった）"
2002702-4 = "……あ、先生。こっち。"
2002702-5 = "[ns1] \"お待たせ、シロコ。\"\n[ns2] \"ここって……\""
2002702-13 = "海辺の岩場。食材集めに、丁度いいから。"
2002702-14 = "……ん？"
2002702-15 = "たしかに、前に採った分はまだ残ってるけど……"
2002702-16 = "うーん……"
2002702-17 = "それも、そうだね……"
2002702-21 = "……やっぱりダメかな。これ以上は。"
2002702-25 = "[ns3] \"少しだけだよ。\"\n[ns4] \"採りすぎないようにね。\""
2002702-28 = "ん……"
2002702-29 = "先生なら、そう言ってくれると思った。"
2002702-30 = "だから、ちゃんと準備してきたよ。#n今日の私に隙は無い。"
2002702-40 = "見て、先生。"
2002702-41 = "[s5] \"シュノーケリングの装備だ。\"\n[s6] \"たしかに準備バッチリだね。\""
2002702-44 = "ん。今日の狙いは大物だから。"
2002702-45 = "――この辺りでしか採れない、「幻の貝」。"
2002702-46 = "……先生も聞いたことないの？"
2002702-47 = "……実は私も、パンフレットで見ただけ。#n本当にあるかどうかは、自分の目で確かめなくちゃ分からない。"
2002702-48 = "ん……今はこれしか情報がないけど、気になる。"
2002702-52 = "……こうしてる場合じゃない。"
2002702-53 = "先生、ちょっと待ってて。すぐに戻るから。"
2002702-58 = "（……返事をする間もなく、シロコは潜ってしまった）"
2002702-60 = "（シロコは水中から浮き上がる度に、不思議な物を手に持っていた……）"
2002702-65 = "[ns7] \"もしかして……\"\n[ns8] \"それが「幻の貝」？\""
2002702-68 = "違う、これじゃない。"
2002702-72 = "……もう一回、潜ってくる。"
2002702-83 = "（結局、日が暮れる頃になっても「幻の貝」は採れなかった）"
2002702-84 = "[ns9] \"もう時間が……\"\n[ns10] \"そろそろ戻らないと……\""
2002702-87 = "ううん。"
2002702-88 = "大丈夫だよ、先生。"
2002702-92 = "なんとか……"
2002702-93 = "……間に合ったから。"
2002702-96 = "[wa:1000]― [log=시로코 수영복]……ただいま、[wa:900]先生。[/log]"
2002702-98 = "[wa:600]― [log=시로코 수영복]……ん、[wa:900]成功した。[wa:1800]……これで、作れるよ。[/log]"
2002702-101 = "[wa:1300]― [log=시로코 수영복]パンフレットで見た、[wa:1400]あの料理。[/log]"
2002702-103 = "[wa:900]― [log=시로코 수영복]料理道具も準備したから、[wa:2100]問題ない。[/log]"
2002702-106 = "[wa:1300]― [log=시로코 수영복]……先生が[wa:600]一緒に来てくれて[wa:700]よかった。[/log]"
2002702-108 = "[wa:1000]― [log=시로코 수영복]一人だったら、[wa:1400]途中でやめてたかもしれない。[/log]"
2002702-111 = "[ns11] \"私は何もしてないよ。\"\n[ns12] \"シロコなら、きっと1人でも頑張れたと思う。\""
2002702-114 = "[wa:500]― [log=시로코 수영복]ううん……[wa:1100]そんなことない。[/log]"
2002702-116 = "[wa:900]― [log=시로코 수영복]今も、[wa:1200]これを考えるようになった[wa:1400]きっかけも。[/log]"
2002702-119 = "[wa:1400]― [log=시로코 수영복]すべて……[wa:1300]先生が[wa:300]いてくれたから。[/log]"
2002702-122 = "[wa:1200]― [log=시로코 수영복]……先生。[wa:2000]……ありがとう。[/log]"
2002702-125 = "（嬉しそうな表情のシロコとリゾートに戻った）"
2002702-126 = "（「幻の貝」と呼ばれているみたいだが……）"
2002702-133 = "（……食べてみたら、普通の味だった）"
