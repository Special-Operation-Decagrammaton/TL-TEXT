[translation]
1001505-1 = "A escolha de Alice"
1001505-3 = "（Alice está sentada em um canto do café, jogando videogame com muita dedicação）"
1001505-4 = "（Ela está tão concentrada na tela que nem percebeu minha aproximação）"
1001505-5 = "[s1] \"Alice, bom dia.\"\n[s2] \"Que jogo você está jogando?\""
1001505-8 = "Ah, Sensei. Bom dia."
1001505-9 = "Dizem que é um jogo que está na moda ultimamente, mas é bem difícil. Estou em dúvida sobre o que devo fazer."
1001505-10 = "O jogo exige que eu faça escolhas difíceis o tempo todo... é um jogo de alta dificuldade."
1001505-11 = "[s3] \"Que tipo de jogo é?\"\n[s4] \"Que tipo de escolhas você tem que fazer?\""
1001505-12 = "Primeiro, o protagonista é o terceiro príncipe do Reino de Kuromaruno, conhecido como o Príncipe dos Pelos no Peito."
1001505-13 = "Primeiro, o protagonista é o terceiro príncipe do Reino de Kuromaruno, conhecido como o Príncipe dos Pelos no Peito."
1001505-14 = "[s] \"...Hã?\""
1001505-15 = "Dizem que os pelos no peito, que crescem como uma selva em seus músculos peitorais, são o auge do charme naquele reino."
1001505-16 = "[s] \"Sério...?\""
1001505-17 = "Os líderes dos países vizinhos travaram batalhas sangrentas para tentar se casar com o Príncipe dos Pelos no Peito,"
1001505-18 = "e agora, os finalistas são Sua Majestade Barba e o Imperador Careca."
1001505-19 = "Com quem o Príncipe dos Pelos no Peito será mais feliz: Sua Majestade Barba ou o Imperador Careca?"
1001505-20 = "Como ambos parecem capazes de fazer o príncipe feliz, a Alice está confusa..."
1001505-21 = "[s5] \"Hmm...\"\n[s6] \"É um problema difícil, hein...\""
1001505-22 = "Sua Majestade Barba tem o hobby de correr nu pela cidade. Então, ele pode compartilhar o mesmo hobby que o Príncipe dos Pelos no Peito,"
1001505-23 = "Sua Majestade Barba tem o hobby de correr nu pela cidade. Então, ele pode compartilhar o mesmo hobby que o Príncipe dos Pelos no Peito,"
1001505-24 = "E o Imperador Careca, além de sua cabeça notável, é o homem mais bonito deste mundo, tendo vencido o festival de músculos várias vezes. Tenho certeza de que ele deixará os músculos peitorais do príncipe ainda maiores e fará com que seus pelos no peito se destaquem ainda mais."
1001505-25 = "[s7] \"Esse jogo é seguro...?\"\n[s8] \"Parece um jogo bem perigoso...\""
1001505-26 = "O príncipe parece que será feliz com qualquer um dos dois, mas é por isso que, quando me pedem para definir uma prioridade... é um problema difícil demais."
1001505-27 = "O príncipe parece que será feliz com qualquer um dos dois, mas é por isso que, quando me pedem para definir uma prioridade... é um problema difícil demais."
1001505-28 = "[s9] \"...Isso é algo que a Alice precisa pensar e decidir por conta própria.\"\n[s10] \"Se foi a Alice quem escolheu depois de tanto pensar, com certeza ficará tudo bem.\""
1001505-31 = "Sim, obrigada, Sensei. Vou pensar bastante e tomar uma decisão."
1001505-32 = "Uma corrida de nus ou mais pelos no peito?"
1001505-33 = "Barba ou careca?"
1001505-34 = "[s11] \"...Isso não tem classificação indicativa?\"\n[s12] \"Será que é um jogo apropriado para a Alice...?\""
1001505-38 = "（Alice vasculhou sites de detonado por um tempo e, depois de pensar muito...）"
1001505-42 = "A Alice encontrou a solução ideal!"
1001505-43 = "Vou voltar para a sala do clube e testar!"
1001505-45 = "（Dizendo isso, ela foi embora com uma expressão muito feliz）"
