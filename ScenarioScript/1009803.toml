[translation]
1009803-1 = "ヒーロー、パトロール"
1009803-4 = "あ、先生。こっち、こっち。"
1009803-5 = "……あれ。#nなんか嬉しそうじゃん、何かあったの？"
1009803-6 = "[s] \"だって、ホシノのヒーロー姿がまた見られるんでしょ！\""
1009803-7 = "いや～ヒーローなんて言われても、おじさん変身できないよ？"
1009803-8 = "ま、とりあえず準備はできた？"
1009803-9 = "今日は砂に覆われてる場所もパトロールするからね。"
1009803-10 = "下手したら、今日中には帰ってこられないかもしれないし。"
1009803-11 = "[s] \"もちろん、準備万端だよ。\""
1009803-12 = "それじゃ、行こっか。"
1009803-18 = "相変わらず、人がいないねぇ。"
1009803-19 = "ん～？#nどうしてこんな遠くまでパトロールするのかって？"
1009803-20 = "そりゃ、先生を疲れさせるためかな。#nおじさんに変なこと言う体力がなくなるようにね。"
1009803-21 = "[s] \"そうだったの！？\""
1009803-22 = "冗談だよ、冗談。#n先生はリアクションが良いね。"
1009803-23 = "本当は、この間のトラブルが気になったんだ。"
1009803-24 = "ヘルメット団が学校の掲示板を盗もうとしてたでしょ？"
1009803-25 = "[s] \"あの時のホシノ、本当にカッコ良かったよ！\""
1009803-26 = "……それは置いといて、やけに良い装備をしてなかった？"
1009803-27 = "いつもは大したことなかったのに……。"
1009803-28 = "それで今日は遠くまでパトロールしようと思ったんだ。"
1009803-29 = "先生も怪しいと思わなかった？"
1009803-30 = "[s] \"たしかに、言われてみれば……。\""
1009803-31 = "そうでしょ？#nじゃ、早く行こっか。"
1009803-41 = "あれ？#nあの家、前に見た時は何ともなかったのに……。"
1009803-42 = "[s] \"完全に埋れてるね。\""
1009803-43 = "最近、砂嵐が多いからかな……。"
1009803-48 = "はぁ。#nやっぱり、一人じゃ無理だ……。"
1009803-55 = "……仕方ない、もう諦めるとするか。"
1009803-60 = "何か困ってるなら手伝おうか？"
1009803-61 = "……君は？"
1009803-62 = "あ～、ただの通りすがりの生――"
1009803-63 = "[s] \"通りすがりのヒーローです。\""
1009803-67 = "ちょっ、先生……！"
1009803-68 = "……ヒーロー？"
1009803-69 = "よく分からないけど、手伝ってくれるなら助かるよ。"
1009803-70 = "ここには昔、住んでいてね。#n探しものがあって久しぶりに来たんだ。"
1009803-71 = "でも砂嵐のせいか、この有り様で……。"
1009803-72 = "砂をいくら退かしたところで、キリがないんだ。"
1009803-74 = "たしかに、この量を一人で何とかするのは……。"
1009803-78 = "んじゃ、ここはおじさんが一肌脱ごうかな。"
1009803-79 = "[s] \"私も手伝うね。\""
1009803-80 = "うへへ。ありがとう、先生。"
1009803-88 = "ふぅ、これで大丈夫そうだね。"
1009803-89 = "す、すごい！#nあんな大量にあった砂が……！"
1009803-91 = "ありがとう、アビドスのヒーロー！"
1009803-95 = "まったく、先生が余計なこと言うから……。"
1009803-96 = "[s1] \"困っている人がいたら見過ごせない……。\"\n[s2] \"それが、ヒーローだよね。\""
1009803-99 = "う、うへぇ～。"
1009803-100 = "ほんと、先生は平気でそういうこと言うんだから……。"
1009803-102 = "（その後も、ホシノと一緒にアビドス自治区のパトロールを続けた）"
1009803-106 = "うーん。#nたしか、ここは通行路だったはずなのに。"
1009803-107 = "いつの間にか、砂に埋もれちゃってるね。"
1009803-108 = "[s] \"迂回する？\""
1009803-109 = "……。"
1009803-110 = "ん～。"
1009803-111 = "せっかくだし、ここの砂も退かしちゃおっか。"
1009803-117 = "うわぁ、砂埃で街灯がすごい汚れてるねぇ。"
1009803-121 = "先生、そこに登ってから肩車してもらえる？"
1009803-122 = "これじゃ、暗くなった時に困るしね。"
1009803-137 = "うへ～。#nいつの間にか、こんなところまで来ちゃったね。"
1009803-138 = "[s] \"いったん休憩しよっか。\""
1009803-139 = "そうだね、ずっと動きっぱなしだったし。"
1009803-140 = "……ねぇ先生。#nおじさんと一緒に来たこと、後悔してない？"
1009803-141 = "[s] \"まったくしてないよ。\""
1009803-143 = "[ns] \"アビドスを思うホシノの気持ちが、伝わってきたからね。\""
1009803-144 = "うへ～、照れるねぇ。"
1009803-145 = "でもおじさんが頑張れたのは、先生のおかげだよ。"
1009803-146 = "私だけだったら、途中でバテちゃってたかも。"
1009803-147 = "……だから、ありがとう先生。"
1009803-148 = "うん？#nヒーローの役に立てて嬉しい、って？"
1009803-149 = "ひ、ヒーローっていう設定、まだ続いてるんだ。"
1009803-150 = "ま、おじさんがヒーローだとしたら……。"
1009803-151 = "先生は「相棒」で良いんだよね？"
1009803-152 = "[s] \"相棒？\""
1009803-153 = "ヒーローと一緒に戦う存在だよ。"
1009803-154 = "まぁ、悪役にやられて、#nヒーローが覚醒するきっかけになるのが定番だけどね。"
1009803-155 = "[s] \"！？\""
1009803-156 = "うへへ。冗談だよ、冗談。"
1009803-160 = "とりあえず、これでも食べる？"
1009803-161 = "ポケットに入れてたせいで、グチャってなってるけど……。"
1009803-166 = "あ、あのぉ……。"
1009803-174 = "噂に聞いたんですが、#nあなたが最近この辺りで人助けをしているヒーローの方ですか？"
1009803-175 = "えぇ！？"
1009803-176 = "[s] \"噂が広がってるんだ……。\""
1009803-180 = "たぶん、その人で合ってると思うけど……。"
1009803-181 = "何か頼み事でもあるの？"
1009803-182 = "……忘れ物を探してほしいんです。"
1009803-183 = "この前、郊外を散歩していたら砂嵐に遭いまして。"
1009803-184 = "そこで放置されていた車両に身を隠した時までは、#n持っていたはずなんです。"
1009803-185 = "探しに行こうにも、砂漠の中なので場所が分からず……。"
1009803-187 = "大切な物なんです！#n必ずお礼をしますので、どうかお願いします！"
1009803-193 = "仕方ないかぁ。"
1009803-194 = "わざわざ探してくれたんだし、ちょうどパトロール中だしね。"
1009803-195 = "先生も、それで良い？"
1009803-196 = "[s] \"もちろん、相棒も付いていくよ！\""
1009803-197 = "うへへ、元気いっぱいだね。"
1009803-198 = "じゃあ、ざっくりとした方向で良いから教えてもらえるかな？"
1009803-199 = "はい！"
1009803-200 = "えっと、背中に朝日を浴びながら、町に戻っていたはずなので……。"
1009803-201 = "それじゃ、東のほうだね。"
1009803-205 = "行こうか、先生。"
1009803-207 = "（忘れ物を探すため、ホシノと一緒にアビドスの郊外へ向かった）"
1009803-216 = "うへ～、たぶんこれじゃないかな？"
1009803-220 = "無事に見つかったし、あとは持ち主に返すだけだね。"
1009803-221 = "先生もお疲れ様～。"
1009803-222 = "[s] \"ホシノもお疲れ様。\""
1009803-226 = "うへへ。"
1009803-227 = "でも、ちょっと困ったね。"
1009803-228 = "ほら……。"
1009803-237 = "[ns] \"あ、もうこんな時間だったんだ……。\""
1009803-238 = "そうなんだよねぇ。"
1009803-239 = "移動途中で完全に日が落ちたら、迷うかもしれないし……。"
1009803-240 = "……仕方ない。"
1009803-241 = "今日はここで一晩過ごそっか。"
1009803-242 = "先生も休も～。"
1009803-249 = "[wa:660]― [log=호시노 무장 모드 4]いやー[wa:1210]もうこんな時間になっちゃったかぁ。[/log]"
1009803-250 = "[wa:3320]― [log=호시노 무장 모드 4]こうなったら、[wa:980]朝まで待つしかないねぇ。[/log]"
1009803-253 = "[ns] \"ホシノと一緒だったら、待ってる時間も楽しいよ。\""
1009803-254 = "[wa:470]― [log=호시노 무장 모드 4]……へ？[/log]"
1009803-255 = "[wa:2020]― [log=호시노 무장 모드 4]またまたぁ～[wa:1840]こんなおじさんといたって、[wa:1240]別に楽しくないでしょ～[/log]"
1009803-258 = "[ns] \"ううん。だって、ホシノはヒーローだからね。\""
1009803-259 = "[wa:550]― [log=호시노 무장 모드 4]う、[wa:380]うへぇ～……[/log]"
1009803-260 = "[wa:1970]― [log=호시노 무장 모드 4]その設定、[wa:680]まだやるの……？[wa:1830]おじさんにはちょっと[wa:640]荷が重いかも～[/log]"
1009803-263 = "[wa:1170]― [log=호시노 무장 모드 4]……[wa:740]まあ、[wa:690]先生が相棒役を買って[wa:1380]出てくれるのなら、[/log]"
1009803-264 = "[wa:1030]― [log=호시노 무장 모드 4]合わせるけどさぁ。[/log]"
1009803-267 = "[wa:280]― [log=호시노 무장 모드 4]んじゃ、[wa:600]ヒーローと相棒の[wa:800]質素な夕食にしよっか。[wa:2260]……非常食だけど。[/log]"
1009803-270 = "[ns] \"これって、小さい子に人気のグミだよね？\""
1009803-271 = "[wa:1270]― [log=호시노 무장 모드 4]それは、[wa:1320]そうだけどさぁ～……[/log]"
1009803-272 = "[wa:5360]― [log=호시노 무장 모드 4]おじさんはこれが好きなんだ。[wa:2270]大目にみてよ～[/log]"
1009803-276 = "うへへ。#nポケットに入れっぱなしだったみたい。"
1009803-277 = "まあ、味は変わらないから安心して。"
1009803-278 = "これで、とりあえず今晩は何とかなりそうだね。"
1009803-279 = "[s] \"ホシノは、こういうことに慣れてるの？\""
1009803-283 = "それなりじゃない？"
1009803-284 = "おじさんは屋根がない場所でも野営してきたからね。"
1009803-285 = "それと比べたら、ここは随分と快適じゃないかな？#n良かったねぇ、先生。"
1009803-286 = "[s] \"そのセリフは、本当におじさんっぽいような……。\""
1009803-287 = "ええっ……。"
1009803-288 = "ま、まぁ、とにかく寝る準備しよっか。"
1009803-293 = "その辺の枯れ木を集めて火をつければ……"
1009803-301 = "うへ～、温かいね。"
1009803-302 = "非常用毛布を敷けば、寝床の完成だよ。"
1009803-303 = "夜の砂漠は冷えるし、体温を維持しないとね。"
1009803-304 = "まだ眠くないなら、#nしばらく列車にもたれかかりながら話でもしようか？"
1009803-305 = "……おじさんはどこで寝るのかって？"
1009803-306 = "気にしなくて平気平気。"
1009803-307 = "おじさんはどこでも寝られるからね～。"
1009803-308 = "[s] \"ホシノもこっちにおいでよ。\""
1009803-312 = "えっ。#nいやいや、それはさすがに……。"
1009803-313 = "[s3] \"体温維持は大切なんでしょ？\"\n[s4] \"二人で毛布に包まれば、温かいと思うよ。\""
1009803-318 = "うへぇ、たしかにそうだけど……。"
1009803-319 = "……はぁ。"
1009803-320 = "やっぱり先生って、平気でそういうこと言うよね。"
1009803-326 = "……まあ、お言葉に甘えてちょっとだけご一緒させてもらおうかな。"
1009803-328 = "（こうしてホシノと同じ毛布で、陽が昇るまで休憩した）"
