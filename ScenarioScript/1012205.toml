[translation]
1012205-1 = "浜辺に光るもの"
1012205-3 = "（海風を浴びに、浜辺を訪れた）"
1012205-12 = "[ns] \"ミカ？何してるの？\""
1012205-13 = "あ、先生！！"
1012205-18 = "ふふふ、じゃじゃーん☆"
1012205-19 = "[ns] \"これは……貝殻？\""
1012205-20 = "そうそう！可愛くない？"
1012205-21 = "割れちゃってるのばっかりだけど……中にはこんな綺麗なのもあるんだよ！"
1012205-22 = "ロマンチックだよね～"
1012205-23 = "たくさん集めて、首飾りにしちゃおっかな☆"
1012205-24 = "[s] \"ミカはアクセサリーが好きだもんね。\""
1012205-25 = "そうだね……可愛いものをたくさん集めてたなぁ。"
1012205-26 = "……今はあんまり残ってないんだけどね。"
1012205-27 = "それに、新しいのもあんまり買ってないんだ。#nちゃんと節約してるから！"
1012205-28 = "家計簿アプリだって入れてるんだよ？"
1012205-29 = "[s] \"偉すぎる……！\""
1012205-30 = "ふっふっふ……でしょ～？"
1012205-34 = "……コツコツやるのは、ちょっと苦手なんだけどね。"
1012205-35 = "この前なんて、まとめてたレシートがどっか行っちゃって……。"
1012205-36 = "でも、なんとかちゃんと記録してるんだ。"
1012205-37 = "[s1] \"十分偉いよ。\"\n[s2] \"私も、ミカを見習わないと……！\""
1012205-40 = "えへへ、先生に褒められちゃった！"
1012205-41 = "あっ！綺麗な子みっけ☆"
1012205-46 = "このサザエ、「メルジェラ」のイヤリングにそっくり！"
1012205-47 = "昔、お気に入りだったんだよね～！ラッキー☆"
1012205-48 = "本物のブランド品には敵わないかもだけど……。"
1012205-49 = "貝殻も綺麗だよね。"
1012205-50 = "[s] \"うん、とっても綺麗だね。\""
1012205-51 = "あはは、それって私のこと？なんちゃって☆"
1012205-55 = "[ns] \"ミカ、なんだか楽しそう。\""
1012205-56 = "うん？"
1012205-57 = "[ns] \"なんていうか、前よりのびのびしてる。\""
1012205-58 = "ええ～何それ。"
1012205-59 = "のびのび……？"
1012205-60 = "うーん……。"
1012205-61 = "余裕、あるのかなあ……？"
1012205-62 = "……。"
1012205-66 = "[ns] \"ミカ……？\""
1012205-67 = "うーん、えっと……。"
1012205-68 = "ま、色々あったからね！"
1012205-69 = "そう、色々……。"
1012205-70 = "……。"
1012205-74 = "先生！あっち行ってみない？貝殻たくさんありそう！"
