[translation]
1002203-1 = "Trabalhando com a Presidente"
1002203-2 = "（Após trocar mensagens com Hina pelo Momotalk, fui direto para o quarto onde ela estava hospedada）"
1002203-7 = "Quarto da Hina"
1002203-10 = "Hm? Sensei...?"
1002203-11 = "...O que faz aqui a essa hora, de repente?"
1002203-12 = "[s1] \"Eu queria que você descansasse um pouco, Hina.\"\n[s2] \"Já que viemos até a praia, seria um desperdício passar o tempo todo trabalhando.\""
1002203-13 = "Você veio até aqui só por esse motivo...?"
1002203-14 = "Você veio até aqui só por esse motivo...?"
1002203-15 = "Agradeço a intenção, mas... é justamente por isso que é um problema. Mesmo que estejamos em um resort, nosso objetivo principal aqui não é brincar..."
1002203-16 = "Embora tenhamos saído da academia para o acampamento, a pilha de coisas que preciso processar continua a mesma."
1002203-17 = "Se eu não terminar isso primeiro, não tem como eu sair para me divertir..."
1002203-18 = "E, para começo de conversa, esse tipo de rotina é normal para mim, então não é como se fosse um desperdício..."
1002203-19 = "[s] \"Mas você se deu ao trabalho de usar um traje de banho, seria um desperdício não aproveitar!\""
1002203-20 = "Eh, eh...?"
1002203-21 = "Mas, sobre o traje de banho, eu só usei porque é um lugar apropriado para isso... Não tem nenhum significado especial por trás disso..."
1002203-22 = "[s3] \"Certo, entendi. Eu vou te ajudar, Hina!\"\n[s4] \"Vamos terminar logo para podermos ir nos divertir!\""
1002203-23 = "Sensei, você vai me ajudar com o trabalho...?"
1002203-24 = "Sensei, você vai me ajudar com o trabalho...?"
1002203-25 = "...Fufu. Nossa, você é realmente uma pessoa curiosa."
1002203-26 = "...Bem, se você insiste tanto."
1002203-27 = "Vou aceitar sua ajuda com gratidão."
1002203-33 = "[ns] \"Então... Hina-san? O que é isso...?\""
1002203-34 = "...? O trabalho que preciso fazer hoje."
1002203-35 = "Primeiro, este é o plano operacional do segundo semestre do Comitê Disciplinar, este é o relatório do terceiro projeto de manutenção viária da Academia Gehenna, e estes são os relatórios e atas das reuniões de cada clube... e depois tem este aqui..."
1002203-36 = "Por enquanto, você poderia classificar o que precisa da minha aprovação e o que não precisa?"
1002203-37 = "Ah, claro, não termina só com isso."
1002203-38 = "Fufu. Já que você mesmo disse que ajudaria, vai ter que me acompanhar até o fim hoje."
1002203-41 = "（Lidando com a pilha de documentos um por um, outra pilha aparece por trás. Embora eu sinta vontade de desistir diante dessa batalha sem fim, ao ver o perfil sério da Hina, volto a lutar contra os papéis...）"
1002203-42 = "（Enquanto fazíamos isso, quase cinco horas se passaram sem que percebêssemos）"
1002203-45 = "Certo, este deve ser o último."
1002203-46 = "[s] \"Fi-finalmente acabou...\""
1002203-47 = "Pois é, bom trabalho."
1002203-48 = "Obrigada, Sensei. Graças a você, terminamos mais rápido do que eu pensava."
1002203-49 = "Acho que hoje vou conseguir jantar com calma."
1002203-50 = "[s] \"Então, vamos lá, vamos nos divertir!\""
1002203-51 = "Eh... você estava falando sério sobre isso? Não era brincadeira...?"
1002203-52 = "Mas já está tão tarde..."
1002203-53 = "Além disso, não tem nada de divertido em sair comigo..."
1002203-54 = "[s5] \"Vai ser muito divertido! Afinal, estou na praia com a Hina...!\"\n[s6] \"Eu estava esperando ansiosamente para vir à praia com você, Hina.\""
1002203-55 = "E-entendo..."
1002203-56 = "E-entendo..."
1002203-57 = "...Ora, não faça esse escândalo infantil."
1002203-58 = "（Eu, que só de poder ficar a sós com você assim, já me sinto...）"
1002203-59 = "[s] \"Hina? Não vai dar mesmo...?\""
1002203-60 = "E-eu já disse... é um problema, então pare de falar desse jeito manhoso..."
1002203-61 = "...Como já está tarde, a praia não vai dar."
1002203-62 = "Não que seja uma compensação, mas o lounge ainda deve estar aberto."
1002203-63 = "Se quiser, que tal jantarmos juntos...?"
1002203-64 = "[s] \"Com certeza! Deixe o acompanhamento comigo!\""
1002203-65 = "Lá vem você exagerando de novo..."
1002203-69 = "Hehe... Entendido. Então, conto com você, Sensei."
