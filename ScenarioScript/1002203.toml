[translation]
1002203-1 = "委員長と一緒にお仕事"
1002203-2 = "（ヒナとモモトークのやり取りをした後、すぐにヒナが泊まっている部屋へと向かった）"
1002203-7 = "ヒナの部屋"
1002203-10 = "ん？先生……？"
1002203-11 = "……こんな時間にどうしたの、急に？"
1002203-12 = "[s1] \"ヒナにもちょっと息抜きしてほしいなって。\"\n[s2] \"せっかく海に来たのに、仕事ばっかりだと勿体ないなって。\""
1002203-13 = "そんな理由で、わざわざここまで……。"
1002203-14 = "そんな理由で、わざわざここまで……。"
1002203-15 = "気持ちはありがたいけど……ありがたいからこそ、困る。いくらリゾート地に来たからって、私たちの主な目的は遊ぶことじゃないんだから……。"
1002203-16 = "合宿で学園の外に出たとはいえ、処理しなきゃいけないことは相変わらず山積みだし。"
1002203-17 = "取り合えずこれを終わらせないことには、遊びに行くだなんて……。"
1002203-18 = "それにそもそも勿体ないも何も、こういう日々はいつものことだし……。"
1002203-19 = "[s] \"だってせっかくヒナが水着を着てくれたのに、勿体ないよ！\""
1002203-20 = "え、え……？"
1002203-21 = "でも、水着姿と言っても、あくまでこういう場所だからそれに合わせただけで……別に今回は、それ以上の意味は無いって言うか……。"
1002203-22 = "[s3] \"よし、分かった。私もヒナを手伝う！\"\n[s4] \"ふたりで早く終わらせて、そしたら遊びに行こう！\""
1002203-23 = "先生が、私の仕事を手伝ってくれる……？"
1002203-24 = "先生が、私の仕事を手伝ってくれる……？"
1002203-25 = "……ふふっ。全く、本当に物好きなんだから。"
1002203-26 = "……じゃあ、そこまで言うなら。"
1002203-27 = "ありがたく、甘えさせてもらおうかな。"
1002203-33 = "[ns] \"えっと……ヒナさん？これは……？\""
1002203-34 = "……？今日やらなきゃいけない仕事。"
1002203-35 = "まずこれは風紀委員会の下半期の運営計画、こっちは第3次ゲヘナ学園道路整備事業報告書、それと各部活からの報告書と議事録……それからこっちは……。"
1002203-36 = "とりあえずこの中から、私の承認が要るものと要らないものを分類してくれる？"
1002203-37 = "あ、もちろんこれだけで終わりじゃないけど。"
1002203-38 = "ふふっ。自分の口で言ったんだから、今日は徹底的に付き合ってもらわないと。"
1002203-41 = "（ひとつひとつ、山のような書類を捌き、その奥からまた別の書類の山が見えてくる。終わりの見えない戦いに心が折れそうになるものの、真剣なヒナの横顔を目にして、また再び書類との格闘を始める……）"
1002203-42 = "（そうこうしているうちに、いつの間に5時間近くが経過していた）"
1002203-45 = "うん、これで最後のはず。"
1002203-46 = "[s] \"や、やっと終わった……。\""
1002203-47 = "そうね、お疲れ様。"
1002203-48 = "ありがとう、先生。おかげで思ったより早く終わった。"
1002203-49 = "今日はちゃんと夕食が取れそう。"
1002203-50 = "[s] \"そしたらほら、遊びに行こう！\""
1002203-51 = "えっ……それ、本気だったの？冗談じゃなく……？"
1002203-52 = "でも、もうこんな時間だし……。"
1002203-53 = "それに、私なんかと遊んでも、全然楽しくなんか……"
1002203-54 = "[s5] \"絶対楽しいよ！ヒナとの海だもの……！\"\n[s6] \"私はヒナと海に来られるのを、すっごく楽しみにしてた。\""
1002203-55 = "そ、そう、なんだ……。"
1002203-56 = "そ、そう、なんだ……。"
1002203-57 = "……もう、そんなに子どもっぽく騒がないの。"
1002203-58 = "（私はこうやって、少しでもふたりっきりでいられただけで、十分に……）"
1002203-59 = "[s] \"ヒナ？やっぱりダメ……？\""
1002203-60 = "だ、だから……困るから、そういう甘えた言い方はやめて……。"
1002203-61 = "……今日はもう遅いから、やっぱり海はダメ。"
1002203-62 = "その代わりにってわけじゃないけれど、まだラウンジは空いてるはずだから。"
1002203-63 = "良ければ、一緒に夕食でも……どう？"
1002203-64 = "[s] \"ぜひ！エスコートは任せて！\""
1002203-65 = "またそうやって大げさに……。"
1002203-69 = "ふふっ……分かった。じゃあお願いね、先生。"
