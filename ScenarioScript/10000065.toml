[translation]
10000065-1 = "Episódio 6; Festivais, sonhos e..."
10000065-2 = "Quando estou com o Sensei, a Pina é invencível!"
10000065-4 = "Guh!? Q-que força bruta é essa!"
10000065-5 = "Droga! V-vocês me pagam!"
10000065-7 = "Virar as costas e fugir é uma vergonha para um guerreiro!"
10000065-8 = "Não vou deixar vocês fugi... ah, mas a Pina também precisa proteger a Chefe...!"
10000065-9 = "O-o que eu devo fazer!?"
10000065-10 = "[s] \"Tudo bem, vá vingar o pessoal da barraca de recortes.\""
10000065-11 = "...Sim! Entendido! A Pina vai lá pela paz do festival!"
10000065-12 = "Chefe, por favor, volte para a Hyakkiyako! É perigoso se encontrar com o Grupo Chimi!"
10000065-15 = "(No momento em que pensei em me despedir da Pina e voltar calmamente para a Hyakkiyako)"
10000065-21 = "(Pulo)"
10000065-23 = "(Uma silhueta familiar entrou no meu campo de visão)"
10000065-26 = "Olhando em volta..."
10000065-27 = "Sussurro...!"
10000065-28 = "Izuna agora é uma ninja experiente que age nas sombras...!"
10000065-29 = "...O Sensei deve estar por aqui, com certeza..."
10000065-30 = "[s] \"Izuna, o que está fazendo aí?\""
10000065-31 = "Ah, bem, é que a Izuna está procurando o Sensei..."
10000065-32 = "Espera, Sensei!?"
10000065-33 = "N-não! A Izuna não está nem um pouco nervosa! Como eu declarei da última vez, vim aqui para derrotar o Sensei!"
10000065-34 = "Sensei, eu pensei sobre aquilo mais uma vez!"
10000065-35 = "Por que será que a Izuna perdeu da última vez...? Foi porque aquelas outras pessoas que ficam enganando o Sensei apareceram e fizeram toda aquela bagunça!"
10000065-36 = "Por isso, desta vez, vou agir como uma ninja de verdade! Vou me esgueirar silenciosamente e, lutando sozinha, com certeza conseguirei derrotar o Sensei!"
10000065-37 = "Prepare-se, Sensei!"
10000065-38 = "[s] \"Entendi. Então, que tal a gente dar um passeio por enquanto?\""
10000065-39 = "Com prazer!"
10000065-40 = "……Não é isso! E-eu vim aqui para derrotar o Sensei……!"
10000065-41 = "[s] \"Você não quer ficar comigo?\""
10000065-42 = "Ué, n-não, de jeito nenhum…… é, é……?"
10000065-45 = "Uau……! Sensei, tem caramelo aqui!"
10000065-46 = "Esse cheiro doce…… é algodão-doce!?"
10000065-48 = "Ah, yakisoba! Também estão vendendo yakisoba!"
10000065-51 = "Ehehe, está delicioso! Ah, Sensei, quer uma mordida?"
10000065-53 = "Ehehe…… Kon-kon!"
10000065-54 = "A Izuna ama de verdade o Festival das Flores de Cerejeira de Hyakkiyako!"
10000065-55 = "Por isso, poder aproveitar tudo isso junto com o Sensei me deixa muito, muito feliz……!"
10000065-56 = "[s] \"Pois é, está tão divertido que seria uma pena se fosse cancelado.\""
10000065-57 = "Eh……? Can-cancelado? Por que você disse isso de repente?"
10000065-58 = "[s1] \"Parece que tem alguém tentando arruinar este Festival das Flores de Cerejeira.\"\n[s2] \"Provavelmente é a pessoa que contratou a Izuna……\""
10000065-59 = "Arruinar o Festival das Flores...?"
10000065-60 = "Arruinar o Festival das Flores...?"
10000065-61 = "A-a ordem que a Izuna recebeu do contratante foi..."
10000065-62 = "Que havia pessoas atrapalhando os negócios, e que eu deveria derrotá-las..."
10000065-63 = "Mas, arruinar o Festival das Flores...? E-espera, o quê...?"
10000065-65 = "……!?"
10000065-66 = "[s] \"Izuna, você não poderia me contar quem é o seu contratante?\""
10000065-67 = "I-isso é..."
10000065-68 = "……Não! Revelar quem me contratou é algo que um ninja nunca deve fazer...!"
10000065-69 = "A Izuna vai se tornar uma ninja exemplar!"
10000065-70 = "Por isso, mesmo que seja o Sensei...!"
10000065-71 = "[s] \"Entendi, tudo bem.\""
10000065-72 = "……Hã?"
10000065-73 = "[s3] \"Se a Izuna não quer falar, não vou forçar você.\"\n[s4] \"Parece que essa é uma decisão que você mesma tomou.\""
10000065-74 = "Uma decisão... que eu tomei."
10000065-75 = "Uma decisão... que eu tomei."
10000065-76 = "[s5] \"Mas não posso deixar que atrapalhem o festival.\"\n[s6] \"Por isso, acho que vou ter que te impedir aqui, Izuna.\""
10000065-77 = "……! Então o Sensei e a Izuna estão destinados a isso...!"
10000065-78 = "……! Então o Sensei e a Izuna estão destinados a isso...!"
10000065-79 = "I-Izuna, vou me retirar por agora! Por algum motivo, acabamos aproveitando o festival juntos desta vez, mas...!"
10000065-80 = "A próxima não vai ser assim! Na próxima eu consigo!"
10000065-81 = "[s] \"Sim. Então até mais, Izuna.\""
10000065-82 = "……！！"
10000065-83 = "……Sim. Então, Sensei, até mais!"
10000065-87 = "[ns] \"Como esperado, a Izuna segue as ordens do seu empregador...\""
10000065-91 = "Bem, acho que chegou a nossa vez. Faz tempo, hein, Sensei do Schale."
10000065-92 = "Andar por aí num lugar desses sem escolta é perigoso, sabia?"
10000065-93 = "Se não quiser se machucar, é melhor se render pacificamente!"
10000065-94 = "Se tentar resistir, vai acabar se dando mal!"
10000065-95 = "Tem alguém que quer falar com você."
10000065-96 = "[s] \"Entendi, então vamos lá.\""
10000065-97 = "Haha! É, faz sentido, mas se for resistir, a gente também vai...!"
10000065-98 = "Hã!?"
10000065-99 = "Ele vai obedecer assim tão fácil!?"
10000065-100 = "É... bem, o plano era esse, mas será que tá tudo bem mesmo...?"
10000065-101 = "Ah, tanto faz! Se ele veio por conta própria, é mais fácil e conveniente. Vamos levá-lo!"
10000065-102 = "Entendido!"
10000065-106 = "Auuu... mais uma vez não consegui ser páreo para o Sensei..."
10000065-107 = "……Ehehe."
10000065-108 = "Ehehe... o yakisoba que comi com o Sensei estava delicioso..."
10000065-109 = "Eu disse que ia parar a Izuna, mas no final ela disse 'até mais'..."
10000065-110 = "……Pelo bem do Sensei, a Izuna não vai perder! Na próxima, com certeza, eu vou com estas mãos..."
10000065-117 = "O Circo Chimichami em um lugar desses? E quem está ao lado deles é..."
10000065-118 = "……Sensei?"
10000065-120 = "Muito obrigada! Bom trabalho!"
10000065-121 = "Uuuh, fi-finalmente acabou..."
10000065-122 = "Bom trabalho, Presidente! Por favor, aceite esta bebida!"
10000065-123 = "Obrigada, Feena."
10000065-125 = "Glup, glup... Ahhh, que geladinha..."
10000065-126 = "……Ei, a propósito, Feena."
10000065-127 = "Aconteceu alguma coisa, Presidente?!"
10000065-128 = "……Onde foi o Sensei?"
10000065-130 = "……Ué!?"
10000065-134 = "Chefe!? O Chefe desapareceu!? Eu não percebi!"
10000065-135 = "Droga...! Feena, que erro terrível!"
10000065-136 = "Ei, espera, isso significa que..."
10000065-137 = "Enquanto estávamos ajudando a garotinha perdida, o Sensei acabou se perdendo!?"
10000065-138 = "I-isso é um desastre!!"
10000065-139 = "Até adultos se perdem, né~."
10000065-140 = "Tsubaki-chan, não é hora de ficar relaxada!"
10000065-141 = "Se o Grupo Chimi estivesse secretamente esperando pelo momento em que o Sensei ficasse sozinho..."
10000065-142 = "Ugh, é possível...! Não podemos ficar parados!"
10000065-143 = "Feena, e todo mundo do Clube de Treinamento!"
10000065-144 = "Vamos procurar o Sensei, rápido...!"
10000065-145 = "(Plim)"
10000065-147 = "Hm? Isso é..."
