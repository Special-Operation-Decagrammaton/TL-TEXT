[translation]
10000065-1 = "第6話;お祭り、夢、そして……"
10000065-2 = "先生と一緒の時のフィーナは無敵デス！"
10000065-4 = "ぐっ！？な、なんだこの馬鹿力は！"
10000065-5 = "くそ！お、覚えとけよ！"
10000065-7 = "背を向けて逃げるとは、武士の恥！"
10000065-8 = "逃がしマセ……あっ、でもフィーナはお頭も守らなくては……！"
10000065-9 = "ど、どうすればいいのデショウ！？"
10000065-10 = "[s] \"大丈夫、かたぬき屋さんたちの仇を取ってあげて。\""
10000065-11 = "……ハイっ！分かりマシタ！フィーナ、お祭りの平和のために行ってきマス！"
10000065-12 = "お頭は百夜堂に戻っててクダサイ！魑魅一座に会ってしまうと危ないデスから！"
10000065-15 = "（フィーナを見送って、大人しく百夜堂に戻ろうかと思ったその時）"
10000065-21 = "（ぴょこん）"
10000065-23 = "（見覚えのあるシルエットが目に入った）"
10000065-26 = "きょろきょろ……。"
10000065-27 = "サササッ……！"
10000065-28 = "イズナは今、闇に紛れて暗躍せんとする熟練の忍び……！"
10000065-29 = "……先生は、きっとこの辺にいるはず……。"
10000065-30 = "[s] \"イズナ、そこで何してるの？\""
10000065-31 = "あっ、えっとですね、イズナは今先生を探して……"
10000065-32 = "って、先生！？"
10000065-33 = "い、いえ！イズナは慌ててなどいません！前回の宣言通り、先生を倒すためにここへ来たのです！"
10000065-34 = "イズナ、あの後もう一度考えました！"
10000065-35 = "前回イズナが負けたのは何故なのか……それは先生を騙しているあの、他の人たちまでわちゃわちゃと出てきてしまったせいなのでは、と！"
10000065-36 = "ですので次は忍者らしく！こっそりと忍び寄り！そして一人で戦えば、先生を倒せるはず！"
10000065-37 = "さあお覚悟です、先生！"
10000065-38 = "[s] \"うん。じゃあとりあえず、お散歩でもしよっか。\""
10000065-39 = "喜んで！"
10000065-40 = "……ではなく！で、ですからイズナは、先生を倒しに……！"
10000065-41 = "[s] \"私と一緒じゃ、嫌？\""
10000065-42 = "うえ、い、いえ、決してそんなことは……え、えぇ……？"
10000065-45 = "わあっ……！先生、カルメ焼きがありますよ！"
10000065-46 = "この甘い匂い……綿あめ！？"
10000065-48 = "あっ、焼きそば！焼きそばも売ってます！"
10000065-51 = "えへへっ、美味しいです！あっ、先生も一口いかがですか？"
10000065-53 = "えへへっ……コンコンッ！"
10000065-54 = "百夜ノ春ノ桜花祭、イズナ本当に大好きなんです！"
10000065-55 = "ですので、こうやって先生と一緒に楽しむことができて、イズナは今すごく嬉しいです……！"
10000065-56 = "[s] \"うん、こんなに楽しいのに、中止になってほしくないね。\""
10000065-57 = "え……？ちゅ、中止？急にどうされたんですか？"
10000065-58 = "[s1] \"この桜花祭を台無しにしようとしてる人がいるみたいで。\"\n[s2] \"多分イズナの雇い主の人なんだけど……。\""
10000065-59 = "桜花祭を台無しに……？"
10000065-60 = "桜花祭を台無しに……？"
10000065-61 = "い、イズナが受けた雇い主の命令は……。"
10000065-62 = "事業を邪魔するやつらがいるから、その者たちを倒せと……。"
10000065-63 = "それなのに、桜花祭が台無しに……？え、ええ……？"
10000065-65 = "……！？"
10000065-66 = "[s] \"イズナ、雇い主のこと教えてくれたりしない？\""
10000065-67 = "そ、それは……"
10000065-68 = "……いえ！誰に雇われているかを口にするなんて、#n忍びとしてやってはいけないこと……！"
10000065-69 = "い、イズナは立派な忍者になるんです！"
10000065-70 = "ですから、いくら先生だとしても……！"
10000065-71 = "[s] \"うん、分かった。\""
10000065-72 = "……へ？"
10000065-73 = "[s3] \"イズナが話したくないなら、無理にとは言わないよ。\"\n[s4] \"それは、イズナが自分で考えて決めたことみたいだから。\""
10000065-74 = "イズナが、決めたこと……。"
10000065-75 = "イズナが、決めたこと……。"
10000065-76 = "[s5] \"でもお祭りを邪魔するのを放ってはおけない。\"\n[s6] \"だから私は、ここでイズナのことを止めようかな。\""
10000065-77 = "……っ！先生とイズナはやはりそういう宿命……！"
10000065-78 = "……っ！先生とイズナはやはりそういう宿命……！"
10000065-79 = "い、イズナ、この場はお先に失礼します！今回はなぜだかこうして、一緒にお祭りを楽しんでしまいましたが……！"
10000065-80 = "次は違います！次こそは！"
10000065-81 = "[s] \"うん。じゃあまたね、イズナ。\""
10000065-82 = "……！！"
10000065-83 = "……はい。では先生、また！"
10000065-87 = "[ns] \"やっぱり、イズナは雇い主の命令に従って……。\""
10000065-91 = "さて、そろそろあたしらの出番かな。久しぶりだね～、シャーレの先生。"
10000065-92 = "護衛も無しにこんなところをぶらつくなんて、危ないっすよ？"
10000065-93 = "怪我したくなければ、大人しく投降しな！"
10000065-94 = "反抗なんてすると、痛い思いするっすよ！"
10000065-95 = "あんたに用があるって人がいてな。"
10000065-96 = "[s] \"そうなんだ、じゃあ行こっか。\""
10000065-97 = "ははっ！そりゃそうだ、でも抵抗するならこっちも……！"
10000065-98 = "えっ！？"
10000065-99 = "素直に応じるんすか！？"
10000065-100 = "ええ……いや、計画通りなんだけど、これで良いのか……？"
10000065-101 = "まあいい！わざわざ自分の足で来てくれるなら楽だし好都合だ、連れてくぞ！"
10000065-102 = "はいっす！"
10000065-106 = "あぅぅ……またしても先生に太刀打ちできず……。"
10000065-107 = "……えへっ。"
10000065-108 = "えへへっ……先生と一緒に食べた焼きそば、美味しかった……。"
10000065-109 = "イズナを止めるって言ってたけど、最後に「またね」って……。"
10000065-110 = "……先生のためにも、イズナは負けません！次こそ必ずこの手で先生を……！"
10000065-117 = "こんなところに魑魅一座？それに、横にいるのは……。"
10000065-118 = "……先生？"
10000065-120 = "ありがとうございます！お疲れ様でした！"
10000065-121 = "うう、や、やっと終わった……。"
10000065-122 = "お疲れ様デシタ、委員長！こちらのお飲み物をドウゾ！"
10000065-123 = "ありがと、フィーナ。"
10000065-125 = "ごくっごくっ……ぷはっ、冷たーい……。"
10000065-126 = "……あれ、ところでフィーナ。"
10000065-127 = "どうかしマシたか、委員長！"
10000065-128 = "……先生はどうしたの？"
10000065-130 = "……アレっ！？"
10000065-134 = "お頭！？お頭が失踪！？気づきませんデシタ！"
10000065-135 = "クッ……！フィーナ、痛恨のミスです！"
10000065-136 = "え、待って、っていうことは……。"
10000065-137 = "迷子の女の子を助けてる間に、先生が迷子になっちゃったってこと！？"
10000065-138 = "た、大変だあぁ！！"
10000065-139 = "大人でも迷子になるんだね～。"
10000065-140 = "ツバキちゃん、呑気にしてる場合じゃありません！"
10000065-141 = "先生が一人になるタイミングを、もし魑魅一座が密かに狙っていたとしたら……。"
10000065-142 = "うっ、あり得る……！こうしちゃいられない！"
10000065-143 = "フィーナ、それに修行部のみんな！"
10000065-144 = "早く先生を探しに……！"
10000065-145 = "（ピロン）"
10000065-147 = "ん？これって……。"
