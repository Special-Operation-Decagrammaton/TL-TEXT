[translation]
2300720-1 = "Uma garota difícil de entender"
2300720-2 = "（No caminho de volta após terminar o trabalho em Trinity……）"
2300720-3 = "……Ora."
2300720-4 = "Sério, é incrível como nos encontramos por acaso assim, não é?"
2300720-5 = "[s1] \"Essa voz é…… Hanako?\"\n[s2] Viro-me na direção de onde vieram os passos."
2300720-9 = "Terminou seu trabalho?#nSe eu tivesse demorado um pouco mais com meus assuntos aqui,#ntalvez não tivéssemos nos encontrado."
2300720-10 = "Que tipo de assunto, você pergunta?#nNão, não é nada de especial……"
2300720-16 = "Eu só estava indo buscar este livro que tinha sido confiscado."
2300720-17 = "[s3] \"……I-Isso é!!!\"\n[s4] \"Não me diga que esse livro é……!!\""
2300720-20 = "Fufu, por que essa reação?"
2300720-21 = "Está curioso sobre o livro que uma garota segura com tanto cuidado?#nSeria pelo conteúdo? Ou talvez pelo que está escrito nele?"
2300720-22 = "Se quiser, posso ler em voz alta agora mesmo?"
2300720-23 = "Para que seja fácil de ouvir, vou ler \"bem devagar e claramente\", está bem……?"
2300720-24 = "……Sim?"
2300720-25 = "Não quer? Entendo, que pena."
2300720-26 = "[s5] \"Você veio aqui porque sabia que eu estava?\"\n[s6] \"Não me diga que está tramando algo de novo……!?\""
2300720-29 = "Ora……?"
2300720-30 = "Fufu, então é assim que você interpreta?"
2300720-31 = "Eu sempre penso nisso……#nmas parece que as reações do Sensei são muito estimulantes para mim."
2300720-32 = "Por isso, sinto que está virando um hábito……#nquer dizer, talvez já tenha virado……"
2300720-36 = "……Fufu."
2300720-37 = "Bem, vamos parar por aqui hoje.#nHaverá muitas outras oportunidades no futuro……"
2300720-38 = "O Sensei disse que aceitaria se fosse de vez em quando,#nmas imagino que isso também signifique para eu não exagerar."
2300720-39 = "Eu entendo isso perfeitamente."
2300720-40 = "Em troca…… não que seja por isso, mas#nachei que poderia pelo menos te acompanhar até a saída……"
2300720-41 = "Sendo assim, não tem problema, certo?"
2300720-42 = "……Fufu, combinado então."
2300720-43 = "Então, vamos?"
2300720-48 = "（Depois disso, caminhei com Hanako até o ponto de ônibus perto de Trinity）"
2300720-49 = "（Conversamos sobre várias coisas, mas, como Hanako disse, não houve nenhum assunto constrangedor）"
2300720-51 = "……Chegamos."
2300720-52 = "Mas…… ainda sinto que faltou algo."
2300720-53 = "O Sensei não ficou entediado, ficou?"
2300720-54 = "Já que você veio de tão longe,#nachei que talvez estivesse esperando um pouco mais de estímulo……"
2300720-55 = "Se for esse o caso, temo não ter lido bem a situação#ne ter feito uma despedida entediante……"
2300720-56 = "[s7] \"Não, não, de jeito nenhum.\"\n[s8] \"Na verdade, acho que algo como hoje é perfeito!\""
2300720-59 = "Fufufu…… é mesmo?"
2300720-60 = "A propósito, Sensei…… você realmente não está curioso?#nSobre este livro que estou segurando o tempo todo."
2300720-61 = "Eu tenho uma ideia do que você está imaginando……"
2300720-62 = "Mas talvez, na verdade, não seja um livro com esse tipo de conteúdo, sabia?"
2300720-63 = "Livros desse tipo costumam ter capas parecidas, afinal."
2300720-64 = "Um diário…… um caderno de desabafos……#npode ser algo como um ensaio."
2300720-65 = "Ou talvez, algo ainda mais pessoal e franco#nesteja escrito aqui dentro……?"
2300720-69 = "[ns9] \"Se for esse o caso, menos ainda que eu deveria ver.\"\n[ns10] \"Pode continuar sendo um segredo.\""
2300720-75 = "……Ah."
2300720-76 = "……Desta vez foi um erro meu.#nDigamos que minha escolha de palavras foi ruim."
2300720-77 = "Eu deveria saber que, com aquela pergunta,#nSensei com certeza daria essa resposta."
2300720-78 = "……Fufu."
2300720-79 = "Entendido. Então, vamos parar por aqui."
2300720-80 = "Ah, mas o encontro de hoje foi realmente por acaso, viu?#nNão foi nenhuma travessura."
2300720-81 = "Portanto, hoje, eu vou dizer ao Sensei que "não fiz nada"."
2300720-82 = "……Sim."
2300720-83 = "Deixaremos as "travessuras" para uma próxima oportunidade, certo?♡"
2300720-85 = "（Depois disso, entrei no ônibus enquanto era despedida por um sorriso radiante da Hanako）"
