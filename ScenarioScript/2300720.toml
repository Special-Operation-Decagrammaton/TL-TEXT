[translation]
2300720-1 = "掴みどころのない女の子"
2300720-2 = "（トリニティでの仕事を終えた帰り道……）"
2300720-3 = "……あら。"
2300720-4 = "本当、こんなに偶然出会うこともあるのですね。"
2300720-5 = "[s1] \"この声は……ハナコ？\"\n[s2] 足音がした方に振り向く。"
2300720-9 = "お仕事が終わった後でしょうか？#nもう少しこちらの用事が長引けば#nお会いできなかったかもしれませんね。"
2300720-10 = "どんな用事か、ですか？#nいえ、大したことではなく……"
2300720-16 = "没収されていたこちらの本を取りに行っていただけですよ。"
2300720-17 = "[s3] \"……そ、それは！！！\"\n[s4] \"まさかその本は……！！\""
2300720-20 = "ふふっ、どうしてそんな反応を？"
2300720-21 = "女の子が大切に抱えている本が気になるのですか？#n内容が、でしょうか？それとも何が書かれているのか、ですか？ "
2300720-22 = "何なら、今ここで読み上げましょうか？"
2300720-23 = "聞きやすいように「ゆっくりはっきり」、ね……？"
2300720-24 = "……はい？"
2300720-25 = "大丈夫？そうですか、残念です。"
2300720-26 = "[s5] \"ここにいるとわかって来たの？\"\n[s6] \"まさかまた何かを企んで……！？\""
2300720-29 = "あら……？"
2300720-30 = "ふふっ、そう解釈されるのですね？"
2300720-31 = "いつも思っているのですが……#nどうやら先生の反応は、私にとってとても刺激的なようです。"
2300720-32 = "ですので、つい癖になってしまいそうで……#nいえ、もうなってしまったというか……。"
2300720-36 = "……ふふっ。"
2300720-37 = "まあ、今日はこの辺にしておきましょうか。#n機会はこの先いくらでもありますし……。"
2300720-38 = "先生は時々なら受け入れてくださると仰っていましたが、#nそれは同時に、あまりやり過ぎないようにという意味でもあるでしょうから。"
2300720-39 = "それは、私も理解しています。"
2300720-40 = "その代わり……という訳ではないのですが、#n見送りくらいはさせていただければと思いまして……。"
2300720-41 = "それでしたら、大丈夫ですよね？"
2300720-42 = "……ふふっ、決まりです。"
2300720-43 = "では行きましょうか？"
2300720-48 = "（その後、ハナコと一緒にトリニティ近郊のバス停まで歩いた）"
2300720-49 = "（色々と話したけれど、ハナコの言葉通り困るような話題はなかった）"
2300720-51 = "……着きましたね。"
2300720-52 = "ですが……やはり少し、物足りないような気がします。"
2300720-53 = "先生は、退屈されていないでしょうか？"
2300720-54 = "せっかく遠路はるばる来てくださったのですし、#n少しは刺激を期待していらっしゃったのではと思いまして……。"
2300720-55 = "だとすれば私は、空気を読めずに#nつまらない見送りをしてしまったのではないかと……。"
2300720-56 = "[s7] \"いやいや、そんなことはないよ。\"\n[s8] \"むしろ今日みたいな感じが丁度いいと思う！\""
2300720-59 = "ふふふ……そうですか。"
2300720-60 = "ところで先生……本当に気になりませんか？#n私がずっと持っているこの本のこと。"
2300720-61 = "先生が何を想像しているのかは#nなんとなく見当がつきますが……。"
2300720-62 = "もしかすると、実はそのような内容の本ではないかもしれませんよ？"
2300720-63 = "この手の本は、どれも表紙が似ていますからね。"
2300720-64 = "日記帳……悩みを綴ったノート……。#nエッセイのようなものかもしれません。"
2300720-65 = "それよりももっと、私的で率直な内容が#n書かれているかもしれませんよ……？"
2300720-69 = "[ns9] \"そういう内容なら、なおさら見れないよ。\"\n[ns10] \"秘密のままで大丈夫。\""
2300720-75 = "……あ。"
2300720-76 = "……今回は私のミスですね。#n例えが悪かったといいますか。"
2300720-77 = "あの問いかけであれば、#n先生なら絶対に今のような返事をするとわかっていたはずなのに。"
2300720-78 = "……ふふっ。"
2300720-79 = "わかりました。では、ここまでにしましょう。"
2300720-80 = "あ。ですが今日会ったのは本当に偶然ですよ。#nいたずらではありませんから。"
2300720-81 = "ですので今日、私は先生に「何もしなかった」ということで。"
2300720-82 = "……はい。"
2300720-83 = "「いたずら」をするのはまたの機会に、ですね♡"
2300720-85 = "（その後、明るい笑顔のハナコに見送られながらバスに乗った）"
