[translation]
1001502-1 = "Missão da Alice ~O Início da Aventura~"
1001502-2 = "Millennium - Centro da Cidade"
1001502-3 = "（Fiquei um pouco preocupado, então decidi ir até Millennium）"
1001502-7 = "（Encontrei a Alice caminhando de um lado para o outro rapidamente）"
1001502-8 = "……Sensei?"
1001502-9 = "[s1] \"Alice, parece que tudo está indo bem.\"\n[s2] \"Fiquei um pouco preocupado e vim ver como você estava.\""
1001502-10 = "Tan-tan-ta-ran!"
1001502-11 = "Tan-tan-ta-ran!"
1001502-12 = "[s3] \"！？\"\n[s4] \"Uma fanfarra repentina！？\""
1001502-13 = "Sensei se juntou ao grupo."
1001502-14 = "Sensei se juntou ao grupo."
1001502-15 = "O Herói obteve um companheiro e formou uma equipe."
1001502-16 = "[s5] \"Entendi. Muito bem, vamos dar o nosso melhor!\"\n[s6] \"Desde quando a Alice virou uma heroína……!\""
1001502-17 = "No entanto, o Sensei não é útil em combate. Não está equipado com armas e tem apenas 1 de vida."
1001502-18 = "No entanto, o Sensei não é útil em combate. Não está equipado com armas e tem apenas 1 de vida."
1001502-19 = "Mas não tem problema. Mesmo que o Sensei não ajude diretamente na luta, ele é uma presença muito útil como companheiro."
1001502-20 = "[s7] \"Então sou um suporte.\"\n[s8] \"Um curandeiro, talvez?\""
1001502-21 = "Não, você é um mascote."
1001502-22 = "Não, você é um mascote."
1001502-23 = "Você não ajuda em nada no combate, mas o seu papel é aumentar o moral dos companheiros por estar no grupo."
1001502-24 = "[s] \"Será que no final da história, alguma habilidade importante será revelada…….\""
1001502-25 = "Isso não vai acontecer, você só serve para animar o ambiente."
1001502-26 = "[s9] \"……。\"\n[s10] \"…………Entendi.\""
1001502-27 = "Mas eu acho que essa é uma habilidade incrível."
1001502-28 = "Mas eu acho que essa é uma habilidade incrível."
1001502-29 = "Como prova, agora, o ânimo da Alice está elevado."
1001502-30 = "Fazer com que os companheiros de equipe se sintam felizes não é algo que qualquer um consegue fazer."
1001502-31 = "Por isso é incrível, o Sensei é maravilhoso."
1001502-32 = "[s] \"O-obrigado…….\""
1001502-33 = "Registro no grupo concluído. Agora, chegou a hora de partir para a aventura."
1001502-34 = "Sobre o que faremos a seguir……."
1001502-35 = "……."
1001502-37 = "……Por enquanto, vamos seguir em frente."
1001502-38 = "[s] \"Senti que houve uma pausa estranha agora pouco.\""
1001502-39 = "Não houve nada disso, de qualquer forma, vamos seguir em frente. A aventura do herói começa dando o primeiro passo."
1001502-40 = "[s11] \"Isso, por acaso, não é só um passeio……？\"\n[s12] \"……Então, vamos seguir com calma.\""
1001502-45 = "（Caminhei pela cidade com a Alice, que parecia um pouco mais animada do que o habitual）"
