[translation]
1001502-1 = "アリスクエスト～冒険の始まり～"
1001502-2 = "ミレニアム・中心街"
1001502-3 = "（なんだか心配になって、ミレニアムの方へ行ってみた）"
1001502-7 = "（ぽてぽてと歩いてるアリスがすぐに見つかった）"
1001502-8 = "……先生？"
1001502-9 = "[s1] \"アリス、順調そうだね。\"\n[s2] \"ちょっと心配になって、見に来ちゃった。\""
1001502-10 = "パンパカパーン！"
1001502-11 = "パンパカパーン！"
1001502-12 = "[s3] \"！？\"\n[s4] \"唐突なファンファーレ！？\""
1001502-13 = "先生が合流しました。"
1001502-14 = "先生が合流しました。"
1001502-15 = "勇者は仲間を手に入れ、パーティになりました。"
1001502-16 = "[s5] \"なるほど。よし、一緒に頑張ろう！\"\n[s6] \"アリスがいつの間に勇者に……！\""
1001502-17 = "ですが、先生は戦闘には役立ちません。武器も装備してないですし、体力も1ぐらいです。"
1001502-18 = "ですが、先生は戦闘には役立ちません。武器も装備してないですし、体力も1ぐらいです。"
1001502-19 = "それでも大丈夫です。先生は戦闘には直接役に立たなくても、仲間としてはすごく助かる存在ですので。"
1001502-20 = "[s7] \"サポート役ってことだね。\"\n[s8] \"ヒーラーかな。\""
1001502-21 = "いえ、マスコットです。"
1001502-22 = "いえ、マスコットです。"
1001502-23 = "戦闘には全く役立ちませんが、パーティにいることで仲間の士気を上昇させる役割です。"
1001502-24 = "[s] \"物語終盤で、実は何か重要な能力が明かされるとか……。\""
1001502-25 = "そんなことはありません、ただテンションを上げてくれるだけです。"
1001502-26 = "[s9] \"……。\"\n[s10] \"…………そっかぁ。\""
1001502-27 = "ですが、これはすごい能力だと思います。"
1001502-28 = "ですが、これはすごい能力だと思います。"
1001502-29 = "その証拠に今、アリスの気持ちは高揚しています。"
1001502-30 = "パーティの仲間を幸せな気分にするのは、誰にでもできることではありません。"
1001502-31 = "だからすごいです、先生は素晴らしいです。"
1001502-32 = "[s] \"あ、ありがとう……。\""
1001502-33 = "パーティへの登録完了です。さあ、冒険に出発する時が来ました。"
1001502-34 = "これから何をするかと言いますと……。"
1001502-35 = "……。"
1001502-37 = "……とりあえず、前進します。"
1001502-38 = "[s] \"何だか不自然な間があった気が。\""
1001502-39 = "そんなことはありません、とにかく前進です。勇者の冒険はまず前進することから始まりますので。"
1001502-40 = "[s11] \"これ、もしかしてただの散歩では……？\"\n[s12] \"……それじゃあ、のんびり行ってみよっか。\""
1001502-45 = "（いつもより少し浮かれた様子のアリスと一緒に、街を散歩した）"
