[translation]
10040065-2 = "はぁ、はぁ……。"
10040065-3 = "ほんと、もうダメかと思いましたよ……。"
10040065-4 = "[s1] \"今日は走ってばっかりだね。\"\n[s2] \"ある意味で反省させられてるのかも……。\""
10040065-7 = "ところでヴェリタスの二人と連絡は取れますか？#n地下の深いところは、通過したはずですし。"
10040065-8 = "そろそろ連絡が来てもいい頃なんじゃ？"
10040065-9 = "あれ、もしかして道を間違えちゃいました……？"
10040065-10 = "はっ……！それとも……！"
10040065-16 = "ちゃんと聞こえてます。#n二人とも、無事たどり着けたようですね。"
10040065-17 = "あとはそこのドアから地上に出れば、脱出完了です。"
10040065-18 = "ほかにもいくつか出口はありますが、#n最も使用頻度が少ないのはそこです。"
10040065-20 = "いろいろ大変だったけど、なんとかたどり着けたね。"
10040065-21 = "じゃあ、マキにドアを開けるように連絡するよ。"
10040065-22 = "って、あれ……。"
10040065-28 = "今、何か音しなかった……？"
10040065-29 = "[s3] \"……音？\"\n[s4] \"何も聞こえなかったけど。\""
10040065-32 = "あ、そっちじゃなくて……。"
10040065-39 = "……！？"
10040065-40 = "……？"
10040065-41 = "ふ……。"
10040065-43 = "……副部長！？"
10040065-45 = "……ど、どうしてここに！！"
10040065-46 = "いえ違います、これは……！！"
10040065-50 = "[ns5] \"チヒロ……！？\"\n[ns6] \"ハレ！コタマ！大丈夫！？\""
10040065-53 = "こ、これは……！秘密……！"
10040065-54 = "まさか……！くっ、罠でしたか！#nこんな策をめぐらしていたなんて……！"
10040065-55 = "とりあえず、逃げて……！"
10040065-56 = "うああっ……！"
10040065-60 = "え、え～っと……。"
10040065-61 = "せ、先生、これって……。"
10040065-65 = "あ、ドアが開きますよ……！"
10040065-66 = "あっちでトラブルがあったみたいですけど、仕方ないですって、先生！#nひとまず、逃げないと……！"
10040065-67 = "マキさんと合流して、脱出を……！"
10040065-71 = "……？"
10040065-72 = "あれれ、これって……？"
10040065-73 = "[s7] \"……コユキ！？\"\n[s8] \"……どうしたの？\""
10040065-76 = "その、何だか……。"
10040065-77 = "すごく、嫌な予感がですね……。"
10040065-82 = "…………。"
10040065-83 = "……ふふ。"
10040065-84 = "ふふふ、ふふふふふっ……。"
10040065-85 = "にはは……結局こうなっちゃうんですね。"
10040065-94 = "[ns9] \"……コユキ！？\"\n[ns10] （うおっ……）"
10040065-97 = "……しっ。"
10040065-98 = "ここなら見つかりませんから。"
10040065-99 = "時間がないので、ひと言だけ。"
10040065-100 = "先生……。"
10040065-104 = "……どうか、ご無事で。"
10040065-106 = "コ～ユ～キ～～～！！"
10040065-125 = "ただでさえ忙しい年末に！"
10040065-129 = "またトラブルを起こしてくれちゃって！"
10040065-133 = "今日という今日は絶対に許さないんだから！！"
10040065-134 = "覚悟しなさいっ！！"
10040065-138 = "ぎやあああぁぁぁああっ！"
10040065-143 = "私のこと、忘れないでくださぁぁぁいっ！！！"
10040065-151 = "[ns] \"…………。\""
10040065-153 = "[ns11] コタマに指示されていた扉へ向かう。\n[ns12] コユキに感謝の祈りを捧げる。"
10040065-159 = "[ns] \"……？\""
10040065-161 = "[ns13] \"……あれ？\"\n[ns14] \"また足音が聞こえたような……。\""
10040065-166 = "[ns] 再び歩きだす。"
10040065-170 = "[ns] 歩く速度を上げる。"
10040065-179 = "[ns] 音を出さず静かに歩く。"
10040065-188 = "[ns] \"…………。\""
10040065-190 = "[ns] 全力で走る。"
