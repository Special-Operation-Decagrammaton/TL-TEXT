[translation]
10040065-2 = "Haa, haa..."
10040065-3 = "Sério, achei que não ia conseguir..."
10040065-4 = "[s1] \"Hoje foi só correria, né?\"\n[s2] \"De certa forma, talvez seja um castigo...\""
10040065-7 = "Aliás, consegue entrar em contato com as duas da Veritas?#nJá devemos ter passado pelas partes mais profundas do subsolo."
10040065-8 = "Já não está na hora de recebermos um retorno?"
10040065-9 = "Ué, será que pegamos o caminho errado...?"
10040065-10 = "Ah...! Ou será que...!"
10040065-16 = "Estou ouvindo perfeitamente.#nParece que as duas conseguiram chegar em segurança."
10040065-17 = "Agora é só sair por aquela porta para a superfície e a fuga estará completa."
10040065-18 = "Existem outras saídas, mas#naquela é a menos usada."
10040065-20 = "Foi complicado, mas conseguimos chegar até aqui."
10040065-21 = "Vou avisar a Maki para abrir a porta."
10040065-22 = "Mas, ué..."
10040065-28 = "Você ouviu algum barulho agora há pouco...?"
10040065-29 = "[s3] \"...Barulho?\"\n[s4] \"Não ouvi nada.\""
10040065-32 = "Ah, não é por ali..."
10040065-39 = "...!?"
10040065-40 = "...?"
10040065-41 = "Hum..."
10040065-43 = "...Vice-presidente!?"
10040065-45 = "...Po-por que você está aqui!!"
10040065-46 = "Não, não é isso, isso é...!!"
10040065-50 = "[ns5] \"Chihiro...!?\"\n[ns6] \"Hare! Kotama! Vocês estão bem!?\""
10040065-53 = "Is-isso é...! Segredo...!"
10040065-54 = "Não pode ser...! Droga, era uma armadilha!#nComo ela pôde planejar algo assim...!"
10040065-55 = "Por enquanto, fujam...!"
10040065-56 = "Aaaah...!"
10040065-60 = "E-ei, espera..."
10040065-61 = "Se-Sensei, isso é..."
10040065-65 = "Ah, a porta está abrindo...!"
10040065-66 = "Parece que houve um problema ali, mas não tem jeito, Sensei!#nPrecisamos fugir agora...!"
10040065-67 = "Vamos nos encontrar com a Maki e escapar...!"
10040065-71 = "...?"
10040065-72 = "Ué, o que é isso...?"
10040065-73 = "[s7] \"...Koyuki!?\"\n[s8] \"...O que houve?\""
10040065-76 = "É que, de alguma forma..."
10040065-77 = "Estou com um pressentimento muito ruim..."
10040065-82 = "............"
10040065-83 = "...Hehe."
10040065-84 = "Hehehe, hehehehehe..."
10040065-85 = "Nihehe... No fim, acabou assim mesmo."
10040065-94 = "[ns9] \"...Koyuki!?\"\n[ns10] (Uou...)"
10040065-97 = "...Psiu."
10040065-98 = "Aqui eles não vão nos encontrar."
10040065-99 = "Não temos tempo, então só vou dizer uma coisa."
10040065-100 = "Sensei..."
10040065-104 = "...Por favor, fique em segurança."
10040065-106 = "KOOOOYUUUKIIII!!!"
10040065-125 = "Logo no fim do ano, que já é uma correria!"
10040065-129 = "Você arrumou outro problema para a gente!"
10040065-133 = "Hoje, eu não vou te perdoar de jeito nenhum!!"
10040065-134 = "Prepare-se!!"
10040065-138 = "Gyaaaaaaaah!"
10040065-143 = "Por favor, não se esqueça de miiiiiim!!!"
10040065-151 = "[ns] \"…………。\""
10040065-153 = "[ns11] Seguir em direção à porta indicada por Kotama.\n[ns12] Oferecer uma prece de gratidão a Koyuki."
10040065-159 = "[ns] \"……？\""
10040065-161 = "[ns13] \"……Ué?\"\n[ns14] \"Parece que ouvi passos de novo…….\""
10040065-166 = "[ns] Começar a andar novamente."
10040065-170 = "[ns] Aumentar a velocidade da caminhada."
10040065-179 = "[ns] Andar silenciosamente, sem fazer barulho."
10040065-188 = "[ns] \"…………。\""
10040065-190 = "[ns] Correr com força total."
