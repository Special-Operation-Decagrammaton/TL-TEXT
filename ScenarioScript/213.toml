[translation]
213-1 = "Yesod: O Purificador do Poder que Controla a Fundação"
213-4 = "Ah, Sensei! Seja bem-vindo!"
213-5 = "Eu estava te esperando."
213-6 = "Hm? Tinha algo de estranho?"
213-7 = "N-não é nada disso!? ...Não é como se eu estivesse dormindo!"
213-8 = "Bem... meditação! Isso! Eu estava meditando!"
213-9 = "Eu sabia que você Sensei entenderia. Meditação é algo bom, né?"
213-10 = "Ah, é mesmo... sobre o motivo de eu ter te chamado—"
213-14 = "……O que era mesmo?"
213-15 = "N-não, não é isso! Eu gosto de conversar com você Sensei, mas era um assunto realmente importante...! Hmmm, bem... é..."
213-16 = "Lembrei!"
213-17 = "Quero que você ouça com atenção. Tem um assunto super interessante... digo, importante."
213-18 = "Dizem que uma parede de metal apareceu bem no meio de um mar sem rotas de navegação!"
213-19 = "Incrível, né? No começo, eu até achei que fosse só mais uma daquelas lendas urbanas que estão na moda."
213-20 = "Mas, como precisávamos investigar, enviei um drone de reconhecimento e..."
213-21 = "Depois de enviar apenas uma foto das coordenadas especificadas, a comunicação foi cortada abruptamente."
213-22 = "Pensei que fosse por causa de turbulência e enviei outros drones, mas todos tiveram o mesmo destino."
213-23 = "Mas, pelo menos uma coisa eu descobri."
213-24 = "Lá existe, de fato, uma parede de metal! E então—"
213-25 = "Dizem que uma parte dela se transforma em um gigante enorme!"
213-26 = "Nossa, um gigante de metal... que incrível!"
213-27 = "Será que ele é muito grande? Será que ele é forte? Queria até tirar uma queda de braço com ele!"
213-28 = "Como não tenho me exercitado nada ultimamente, estou ficando impaciente..."
213-29 = "Hm? É perigoso e é melhor eu não ir...?"
213-30 = "O que você está dizendo, Sensei? Educação física... esportes são assim, não são?"
213-31 = "Desafiar o perigo para se fortalecer — é um treinamento para o corpo e para a mente!"
213-32 = "Mas a realidade é que... tem tanta papelada de seguro que não sobra tempo para isso."
213-33 = "Ugh... odeio trabalho administrativo... Me dá dor de cabeça e ainda diminui meu tempo de exercício..."
213-37 = "Por isso, desculpe! Em nome do Conselho Estudantil, eu queria que você fosse investigar o gigante."
213-38 = "Hm? Como você vai chegar lá?"
213-39 = "Sobre isso... eu também estava preocupada..."
213-40 = "Mas, veja só, uma certa pessoa decidiu nos ajudar!"
213-41 = "Um navio de transporte, acho que é isso, eles prepararam um meio de transporte para você."
213-42 = "Nossa, essa pessoa é realmente muito boa! O espírito de cooperação é muito importante."
213-43 = "Em troca, pretendo ajudar sempre que eles precisarem de uma mãozinha."
213-44 = "Ah, é mesmo. Também tenho um recado para você."
213-45 = "O nome do gigante é 'Yesod'. O epíteto dele é 'O Purificador do Poder que Controla a Fundação'."
213-46 = "Eu não entendi nada do que isso significa, mas..."
213-47 = "Bem, tanto faz. De qualquer forma, conto com você! Quando voltar, vamos correr juntos!"
213-51 = "Ah..."
213-52 = "……"
213-53 = "Sensei, tipo..."
213-54 = "Você não tem um onigiri aí?"
