[translation]
213-1 = "イェソド：礎を御する力の浄化者"
213-4 = "あっ、先生！いらっしゃい！"
213-5 = "待ってたよ。"
213-6 = "ん？なんか変なところあった？"
213-7 = "ちっ、違うよ！？……寝てたわけじゃなくて！"
213-8 = "えーっと……瞑想！#nそう！瞑想してたんだ！"
213-9 = "先生ならわかってくれると思った。#n瞑想っていいよな。"
213-10 = "ああ、そうそう……呼び出した理由なんだけど――"
213-14 = "……なんだっけ？"
213-15 = "ち、ちがうよっ！先生と話すのも好きだけど、本当に大事な話だったんだ……！#nう～～ん、えーーーっと……。"
213-16 = "思い出した！"
213-17 = "ちゃんと聞いてほしいんだけど。#nめちゃくちゃ面白そ……大事な話があるんだ。"
213-18 = "――航路のない海のど真ん中に、金属の壁が出現したんだって！"
213-19 = "すごいよね。僕も最初は、最近流行ってる都市伝説の一つだと思ってたくらいだし。"
213-20 = "でもとりあえず調査はしなきゃいけないから偵察用ドローンを送ってみたら……。"
213-21 = "指定座標から写真1枚送ってきたっきり、パッタリ通信が途絶えちゃったんだ。"
213-22 = "乱気流の影響かと思って他のドローンも送ってみたんだけど、みーんな同じ。"
213-23 = "でも、これだけは分かったんだ。"
213-24 = "そこには本当に、金属の壁が存在する！#nそして――"
213-25 = "その一部は、でーっかい巨人に変身するんだって！"
213-26 = "いやぁー、金属の巨人……すごいなぁ！"
213-27 = "どれくらい大きいんだろ？パワーも強いのかな？腕相撲とかしてみたい！"
213-28 = "最近は全然身体動かしてないから、ムズムズしてるんだよな～……。"
213-29 = "ん？危ないからやめた方がいい……？"
213-30 = "何言ってんの先生。#n体育……スポーツって、こういうものだぞ？ "
213-31 = "危険に挑戦することで自らを鍛える――肉体と精神の修行だ！"
213-32 = "でも現実は……保険周りの書類が多すぎて、そんな時間も取れないんだけど。"
213-33 = "うう……事務作業やだ……。#n頭痛くなるし、運動する時間減るし……。"
213-37 = "だから、ごめん！#n連邦生徒会の代わりに、巨人を調べてきてほしいんだ。"
213-38 = "ん？どうやって行けばいいのか？"
213-39 = "それねー……僕も悩んでたんだけど……。"
213-40 = "なんと、とある人が手伝ってくれることになったんだ！"
213-41 = "輸送船？だっけ、移動手段を用意してくれてるよ。"
213-42 = "いやー本当にいい人だよな！#n助け合いの精神って大事だよ。"
213-43 = "お返しに、向こうが力を貸してほしい時はいつでも手伝おうと思ってるんだ。"
213-44 = "あっ、そうそう。伝言も預かってるぞ。 "
213-45 = "巨人の名は「イェソド」。#n異名は「礎を御する力の浄化者」、だって。"
213-46 = "僕には何を言っているのかさっぱりだけど……。"
213-47 = "まぁいっか。とにかくよろしく！#n帰ってきたら一緒にランニングしような！"
213-51 = "あ……。"
213-52 = "……。"
213-53 = "先生、その……。"
213-54 = "おにぎりとか、ない？"
