[translation]
83301100200-6 = "委員長……！本当に大丈夫ですか？"
83301100200-7 = "大丈夫って、何が？"
83301100200-8 = "いくら万魔殿の要求とはいえ、従う必要は……！"
83301100200-9 = "気にしなくていい。完全にマコトの言いがかりとは言えないし。"
83301100200-10 = "さっきも言ったけど……私も責任を感じてるから。"
83301100200-11 = "……それに、先生の期待には応えたい。"
83301100200-12 = "……？"
83301100200-13 = "……いや、何でもない。"
83301100200-14 = "そうですか……そこまで仰るのであれば分かりました。"
83301100200-15 = "とにかく、このまま考えなしに温泉開発部を追いかけるのは非効率的。手がかりを集めないと。"
83301100200-16 = "万魔殿の新議事堂前に温泉を開発しようとしたのには、きっと理由があるはず。"
83301100200-17 = "温泉開発部の部長……[ruby=きぬがわ]鬼怒川[/ruby]カスミは、衝動的に動いているようにも見えるけど……"
83301100200-18 = "計算高い人物だから。"
83301100200-19 = "理由、ですか……"
83301100200-23 = "あ、そういえば……少し前に噂が流れていましたね。"
83301100200-24 = "噂？"
83301100200-25 = "はい。何やら温泉開発部がゲヘナで大きな可能性を見つけたのだとか……"
83301100200-26 = "もし完成すれば温泉に一生困らないという謳い文句で、温泉の優先入場券を売っていたようです。"
83301100200-27 = "……はぁ。"
83301100200-28 = "よく分からないけれど、それが本当なら生徒たちに詳細を聞く必要があるわね。"
83301100200-29 = "ありがとう、アコ。"
83301100200-30 = "いえ！また気になることがあれば何でも言ってください！全力でお手伝いします！"
83301100200-31 = "……まずは現場に行ってみよう。"
