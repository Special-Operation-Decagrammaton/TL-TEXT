[translation]
83301100200-6 = "Presidente...! Você tem certeza de que está bem?"
83301100200-7 = "Bem? Por que não estaria?"
83301100200-8 = "Mesmo que seja uma exigência do Pandemonium, não há necessidade de obedecer...!"
83301100200-9 = "Não se preocupe com isso. Não dá para dizer que as acusações da Makoto são totalmente infundadas."
83301100200-10 = "Como eu disse antes... eu também me sinto responsável."
83301100200-11 = "...Além disso, quero corresponder às expectativas do Sensei."
83301100200-12 = "...?"
83301100200-13 = "...Não, não é nada."
83301100200-14 = "Entendo... se você insiste, então tudo bem."
83301100200-15 = "De qualquer forma, perseguir o Departamento de Desenvolvimento de Fontes Termais sem pensar é ineficiente. Precisamos reunir pistas."
83301100200-16 = "Deve haver um motivo para elas terem tentado construir uma fonte termal em frente ao novo prédio do conselho do Pandemonium."
83301100200-17 = "A chefe do Departamento de Desenvolvimento de Fontes Termais... Kasumi Kinugawa, pode parecer que age por impulso, mas..."
83301100200-18 = "Ela é uma pessoa calculista."
83301100200-19 = "Um motivo, é..."
83301100200-23 = "Ah, falando nisso... um boato circulou há pouco tempo."
83301100200-24 = "Um boato?"
83301100200-25 = "Sim. Dizem que o Departamento de Desenvolvimento de Fontes Termais encontrou um grande potencial em Gehenna..."
83301100200-26 = "Parece que elas estavam vendendo ingressos de entrada prioritária para a fonte termal, com a promessa de que, se fosse concluída, ninguém nunca mais precisaria se preocupar com fontes termais na vida."
83301100200-27 = "...Haa."
83301100200-28 = "Não entendi muito bem, mas se isso for verdade, precisamos perguntar os detalhes aos alunos."
83301100200-29 = "Obrigada, Ako."
83301100200-30 = "De nada! Se houver mais alguma coisa que te preocupe, é só falar! Farei o meu melhor para ajudar!"
83301100200-31 = "...Primeiro, vamos ao local."
