[translation]
2001506-1 = "そして少女は素敵なレディーに"
2001506-2 = "あ、先生！こっちこっち！"
2001506-3 = "[s1] \"えっと、とりあえず急いできたものの……。\"\n[s2] \"……非常事態？\""
2001506-4 = "先生、驚かないで聞いてね？"
2001506-5 = "先生、驚かないで聞いてね？"
2001506-6 = "私が極秘裏に入手した情報によると、今日の午後3時から大型スーパー・ぽんぽこで……。"
2001506-7 = "[s] \"スーパーで……？\""
2001506-8 = "『ムシクイーン』の、新しいパックが限定販売されるらしいの！"
2001506-9 = "[s] \"……？\""
2001506-10 = "この日のために、ちゃんと貯金してきたの！このチャンスを逃すわけにはいかない！"
2001506-11 = "[s] \"なるほど、非常事態……？\""
2001506-12 = "非常事態でしょ！？"
2001506-13 = "新しいパックが出ることによって、『ムシクイーン』の環境がどれだけ激変すると思ってるの！？"
2001506-14 = "[s] \"なるほどぉ……？\""
2001506-15 = "というわけで助けて、先生！"
2001506-16 = "多分壮絶な奪い合いになってるだろうから、私ひとりじゃ怖いし……"
2001506-17 = "お願い！"
2001506-18 = "先生も、『ムシクイーン』を目指す熱い魂が燃え上がってるでしょ！？いつか決勝戦で、私と運命のバトルして友情を再確認するんでしょ！？"
2001506-19 = "[s3] \"それは知らない展開だけど！？\"\n[s4] \"まあ買い物自体は、もちろん行くけども。\""
2001506-20 = "ありがと、先生！"
2001506-21 = "ありがと、先生！"
2001506-22 = "さあ今ここに、"
2001506-23 = "最強コンビが結成された！"
2001506-24 = "これでいつかラスボスと対峙したとしても……"
2001506-25 = "先生が犠牲になって、私が覚醒するイベントが発生するね！"
2001506-26 = "[s] \"犠牲かぁ……。\""
2001506-27 = "とにかく行こう、先生！"
2001506-28 = "（そうしてカエデに手を引かれ、大型スーパー・ぽんぽこへと向かった）"
2001506-31 = "早く早く、のんびりしてたら売り切れちゃうよ！"
2001506-35 = "ああっ、困りました……。"
2001506-36 = "ん？"
2001506-41 = "なんてことでしょう、こんなタイミングで落としてしまうだなんて……。"
2001506-43 = "……。"
2001506-44 = "[s] \"カエデ？どうしたの？\""
2001506-45 = "何か困ってそうな気配……。"
2001506-50 = "あのっ！"
2001506-51 = "えっと、お嬢さん？何かご用で……？"
2001506-52 = "私は修行部のカエデ！もしかして何か、困ってたりしない？"
2001506-53 = "あ、実はその、コンタクトレンズを落としてしまい……それを探していたのです。"
2001506-54 = "[s] \"それは大変だ。\""
2001506-55 = "な、何だか説明してしまいましたが、お気になさらず。どこかへ向かう途中なのでしょう？わざわざお手を煩わせるわけには……。"
2001506-56 = "そ、それはそうだけど、『ムシクイーン』は大事だけど……！"
2001506-57 = "ムシクイーン……？"
2001506-58 = "えっと、それでも……！"
2001506-59 = "[s] \"素敵なレディーとして、困ってる人を見捨てられない？\""
2001506-60 = "うん！そういうわけで、手伝うよ！"
2001506-61 = "あっ、ありがとうございます……！"
2001506-63 = "（その後）"
2001506-65 = "助かりました！まさかカラスのせいであんなところにあったとは……。"
2001506-66 = "[s] \"見つかって良かったです、もう使えないかもしれませんが……。\""
2001506-67 = "とにかく見つかって良かった！"
2001506-68 = "何とお礼を言えば良いのか……ああ、よろしければ私の名刺を……。"
2001506-69 = "あっ、そういえば忘れてた！"
2001506-70 = "急ごう、先生！じゃあね、またカラスに取られちゃダメだよー！"
2001506-72 = "[s] \"あ、待って……！えっと、失礼します！\""
2001506-76 = "あぁっ……！"
2001506-78 = "（そうしてカエデと共に走り出したものの……）"
2001506-79 = "あ、私のポピーちゃんが……！"
2001506-80 = "捕まえたー！！"
2001506-81 = "ありがとうございます、助かりました！"
2001506-82 = "ふふん！まあこれくらい、ムシクイーンバトラーの私と先生にかかれば朝飯前だよ！"
2001506-84 = "ああ、時限爆弾のカウントが……！ヴァルキューレの生徒がまだ来ていないのに、いったいどちらの線を切れば……！？"
2001506-85 = "えぇいっ！"
2001506-86 = "とりあえず赤！"
2001506-88 = "今日新発売の飲み物、売れるでしょうか……。"
2001506-90 = "すっごい美味しい！大丈夫！"
2001506-92 = "この新作のドーナッツ、果たして受け入れてもらえるものか……。"
2001506-94 = "うん、モチモチしてて良い感じ！"
2001506-96 = "（そうやって、幾つもの苦難を乗り越え……）"
2001506-99 = "はぁ、はぁ……ようやく着いた……。"
2001506-100 = "[s] \"本当に「ようやく」だね……。\""
2001506-101 = "でも、もう新しいパックは目の前！"
2001506-102 = "すみません、ムシクイーンの新しいのください！"
2001506-103 = "おや、運が良いですね。最後のひとつですよ、はいどうぞ。"
2001506-104 = "わあ……！すごいすごい！もうパックそのものがキラキラしてるよ！"
2001506-105 = "[s] \"うん、カエデが嬉しそうで良かった。\""
2001506-106 = "あっ、こうしてる場合じゃない！中にはレアカードが1枚は入ってるらしいし、早く帰ってデッキを"
2001506-107 = "え、売り切れ……！？"
2001506-108 = "……ん？"
2001506-110 = "申し訳ありません、ちょうど在庫が無くなってしまいまして……。"
2001506-111 = "うぅ……朝早く起きて、電車に4時間乗ってきたのに……売り切れなんて……。"
2001506-112 = "……先生。あの子、すごく遠くから来たみたい。"
2001506-113 = "[s] \"……そうだね。\""
2001506-114 = "ううっ……。"
2001506-115 = "そこの君、泣かないで！"
2001506-116 = "えっ……"
2001506-117 = "はい、これ！今日発売の新パックだよ！"
2001506-118 = "おねえちゃん……？これ、くれるの……？"
2001506-119 = "[s] \"カエデ、大丈夫？\""
2001506-120 = "うん！！遠くから、頑張ってきたんだし……。"
2001506-121 = "それに『ムシクイーン』でもね、そういう話があったの。"
2001506-122 = "どんなに難しいバトルだったとしても……最後まで努力した分は報われる。報われて良いんだ、って！"
2001506-123 = "あ、知ってる！『ムシクイーン』139話！"
2001506-124 = "そうそう！だから、はい！"
2001506-125 = "……あ、ありがとう！おねえちゃん！"
2001506-129 = "[ns] \"カエデ。\""
2001506-130 = "先生。さっきの私、素敵なレディーだったと思わない？"
2001506-131 = "[s] \"それはもう。\""
2001506-132 = "…………うん、なら良かった！"
2001506-133 = "ああっ、お二方！ここにいらっしゃったんですね……！"
2001506-134 = "あれ、確かさっき会ったコンタクトレンズの……？"
2001506-135 = "申し遅れました、こういう者です。"
2001506-136 = "[s] \"『ムシクイーン』プロジェクトの広報責任者……？\""
2001506-137 = "……えっ！？『ムシクイーン』の人！？"
2001506-138 = "ここに来る途中、何度もお二人に助けられたという方たちに会いました。"
2001506-139 = "急いでここに来ようとしてくれたのでしょう……そしてそれにも関わらず、困ってる人を見たら助けるというその精神……。"
2001506-140 = "まさに『ムシクイーンバトラー』としての精神そのものです！"
2001506-141 = "[s] \"そ、そうだったんですね。\""
2001506-142 = "そうだよ、ムシクイーンバトラーはある意味、素敵なレディーと一緒！"
2001506-143 = "はい、真のムシクイーンバトラーにして素敵なレディー……そんな姿を見せていただきました！そして良いアイディアも思いついたのです！"
2001506-144 = "……？"
2001506-145 = "よろしければ今日の出来事を、『ムシクイーン』の広報ドキュメンタリーとして使わせていただけないでしょうか？"
2001506-146 = "「ムシクイーンバトラー ～素敵なレディーを目指して～」というような形で！"
2001506-147 = "ああ、もちろんタダでとは言いません。まずはこちらをどうぞ。"
2001506-151 = "今は手元にこれくらいしか無いのですが、新パックです。まずはこれを20パック差し上げます！"
2001506-152 = "えぇぇっ！？ど、どうしよう先生！？"
2001506-153 = "お、お気に召しませんでしたでしょうか……？もちろん別のお礼も……。"
2001506-154 = "や、そんなことはないんだけど、でも……！"
2001506-155 = "ど、どうしよう……？"
2001506-156 = "[s5] \"これくらいは報われても良いんじゃないかな。\"\n[s6] \"カエデがさっき言ってた通りだよ。\""
2001506-157 = "あっ……。"
2001506-158 = "あっ……。"
2001506-159 = "「最後まで努力した分は報われる。報われて良いんだ」……。"
2001506-160 = "……うん！"
2001506-161 = "じゃあ、素敵なレディーとして……ありがたく貰うね！"
2001506-162 = "はい、是非！"
2001506-163 = "よし、じゃあ帰って早速バトルしよ、先生！"
2001506-164 = "手加減とかしないからね！"
2001506-165 = "[s] \"うん、そうだね。\""
2001506-167 = "（そうして部室に戻り、カエデと一緒にムシクイーンのバトルを始めた）"
2001506-169 = "じゃあまずは私のターン！サイコロを投げて……。"
2001506-170 = "数字は……6！じゃあカードを引くね！"
2001506-174 = "おお、「ドリルホーンのウサギ・究極体」！急にエースが来てくれた！"
2001506-175 = "カードの魂が、私の魂に応えてくれたんだね！"
2001506-176 = "[s] \"な、なるほど……？\""
2001506-177 = "じゃあまずは、「ドリルホーンのウサギ・究極体」を召喚するためのダンスを開始！"
2001506-178 = "ふんふふん～♪ふふんふん～♪よし、この踊りによって「ドリルホーンのウサギ・究極体」を特殊召喚！"
2001506-183 = "そして「ドリルホーンのウサギ・究極体」の能力を発動！この子の可愛さに加えて、私もすっごく可愛いから……！"
2001506-184 = "「ドリルホーンのウサギ・究極体」の攻撃力は、なんと10倍に！"
2001506-185 = "[s] \"バランスが心配になる数値……！\""
2001506-186 = "私のターンはまだまだ続くよ！"
2001506-187 = "さあ、覚悟……"
2001506-190 = "[wa:1200]― ……ふふっ。"
2001506-192 = "― なんだか今日は、[wa:1500]色んな事があったなー。"
2001506-195 = "[wa:800]― 色々バタバタの[wa:900]一日だったけど……。"
2001506-197 = "― 先生のおかげで、[wa:1300]また一歩立派なレディーに[wa:1200]近付けたかも！？"
2001506-200 = "[wa:900]― ありがとね、[wa:700]先生！"
2001506-202 = "― いつも私のこと、[wa:1100]手伝ってくれて！"
2001506-205 = "[ns7] \"急に何かと思ったら……。\"\n[ns8] \"先生だからね。何かあったら、またいつでも言って。\""
2001506-206 = "[wa:1300]― 本当！？[wa:1300]やった！"
2001506-207 = "[wa:1300]― 本当！？[wa:1300]やった！"
2001506-209 = "― じゃあ[wa:500]この嬉しい気持ちを込めて……[wa:3100]先生に[wa:1000]攻撃！"
2001506-212 = "[ns] \"良い雰囲気が攻撃力に転化された！？\""
2001506-213 = "[wa:1200]― くらえ、"
2001506-215 = "― 「ドリルホーンのウサギ・究極体」の[wa:2000]ドリルインパクトー！！"
2001506-218 = "― にひひっ！"
2001506-222 = "やった、私の勝ち！カエデの不敗神話はまだまだ続く！"
2001506-223 = "どう、先生？私強くない？最強じゃない？"
2001506-224 = "もしかして私、強くなり過ぎたかも……ふふっ。"
2001506-225 = "[s9] \"何回かやってもらったけど、ルールが分からない……。\"\n[s10] \"カエデスペシャル・ルールが多くて把握しきれない……！\""
2001506-226 = "大丈夫大丈夫、心配しないで！"
2001506-227 = "大丈夫大丈夫、心配しないで！"
2001506-228 = "先生が覚えられるまで、何回でも相手してあげるから！"
2001506-229 = "ほらもう一回やろ、先生！"
2001506-231 = "（そうして夜遅くまで、カエデと一緒にカードバトルを楽しんだ）"
