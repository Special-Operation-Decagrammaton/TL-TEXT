[translation]
2001506-1 = "E assim, a garota se torna uma dama encantadora"
2001506-2 = "Ah, Sensei! Por aqui, por aqui!"
2001506-3 = "[s1] \"Bem, eu vim correndo, mas...\"\n[s2] \"...Uma emergência?\""
2001506-4 = "Sensei, não se assuste, tá?"
2001506-5 = "Sensei, não se assuste, tá?"
2001506-6 = "De acordo com informações que obtive em segredo, hoje, a partir das 3 da tarde, no grande supermercado Ponpoko..."
2001506-7 = "[s] \"No supermercado...?\""
2001506-8 = "Vai ter uma venda limitada de um novo pacote de 'Mushiqueen'!"
2001506-9 = "[s] \"...?\""
2001506-10 = "Eu economizei dinheiro só para este dia! Não posso perder essa chance!"
2001506-11 = "[s] \"Entendi, uma emergência...?\""
2001506-12 = "É uma emergência, não é?!"
2001506-13 = "Você tem noção de quanto o cenário de 'Mushiqueen' vai mudar com o lançamento desse novo pacote?!"
2001506-14 = "[s] \"Entendo... entendo?\""
2001506-15 = "Então, por favor, me ajude, Sensei!"
2001506-16 = "Provavelmente vai ser uma disputa acirrada, então sozinha eu fico com medo..."
2001506-17 = "Por favor!"
2001506-18 = "O Sensei também tem uma alma ardente que busca o 'Mushiqueen', né?! Algum dia, vamos nos enfrentar em uma batalha do destino na final e reafirmar nossa amizade, não vamos?!"
2001506-19 = "[s3] \"Não sei que história é essa, mas tudo bem!?\"\n[s4] \"Bom, eu vou com você para as compras, claro.\""
2001506-20 = "Obrigada, Sensei!"
2001506-21 = "Obrigada, Sensei!"
2001506-22 = "Agora, aqui e agora,"
2001506-23 = "a dupla mais forte foi formada!"
2001506-24 = "Com isso, mesmo que a gente enfrente o chefão final algum dia..."
2001506-25 = "vai acontecer aquele evento onde o Sensei se sacrifica e eu desperto meus poderes!"
2001506-26 = "[s] \"Sacrifício, é...?\""
2001506-27 = "De qualquer forma, vamos lá, Sensei!"
2001506-28 = "(Assim, sendo puxado pela mão por Kaede, fomos em direção ao grande supermercado Ponpoko)"
2001506-31 = "Rápido, rápido! Se a gente for devagar, vai esgotar!"
2001506-35 = "Ah, que problema..."
2001506-36 = "Hm?"
2001506-41 = "Não acredito, deixar cair logo em um momento desses..."
2001506-43 = "..."
2001506-44 = "[s] \"Kaede? O que houve?\""
2001506-45 = "Parece que ela está com algum problema..."
2001506-50 = "Com licença!"
2001506-51 = "Bem, senhorita? Precisa de algo...?"
2001506-52 = "Eu sou a Kaede, do Clube de Treinamento! Por acaso você está com algum problema?"
2001506-53 = "Ah, na verdade, eu deixei cair minha lente de contato... e estava procurando por ela."
2001506-54 = "[s] \"Isso é um problema sério.\""
2001506-55 = "Ah, eu acabei explicando, mas não se preocupe. Você não estava a caminho de algum lugar? Não posso te incomodar com isso..."
2001506-56 = "I-isso é verdade, mas, embora o 'Mushiqueen' seja importante...!"
2001506-57 = "Mushiqueen...?"
2001506-58 = "Bem, mesmo assim...!"
2001506-59 = "[s] \"Como uma dama encantadora, você não pode abandonar alguém em apuros?\""
2001506-60 = "Isso! Por isso mesmo, eu vou ajudar!"
2001506-61 = "Ah, muito obrigada...!"
2001506-63 = "(Depois disso)"
2001506-65 = "Muito obrigada! Quem diria que um corvo teria levado para aquele lugar..."
2001506-66 = "[s] \"Fico feliz que tenha encontrado, embora talvez não dê mais para usar...\""
2001506-67 = "De qualquer forma, que bom que encontramos!"
2001506-68 = "Como posso agradecer... ah, se não se importar, aqui está o meu cartão de visitas..."
2001506-69 = "Ah, falando nisso, eu tinha esquecido!"
2001506-70 = "Vamos nos apressar, Sensei! Até mais, e não deixe que os corvos peguem de novo, hein!"
2001506-72 = "[s] \"Ah, espere...! Bem, com licença!\""
2001506-76 = "Aaaah...!"
2001506-78 = "(E assim, embora tenhamos começado a correr com a Kaede...)"
2001506-79 = "Ah, minha Poppy-chan...!"
2001506-80 = "Peguei!!"
2001506-81 = "Muito obrigada, você me salvou!"
2001506-82 = "Hmph! Bem, para mim, uma mestre em Mushiqueen, e para o Sensei, isso é moleza!"
2001506-84 = "Ah, a contagem da bomba-relógio está...! As alunas da Valkyrie ainda não chegaram, qual fio eu devo cortar...!?"
2001506-85 = "Ei!"
2001506-86 = "Vou no vermelho!"
2001506-88 = "Será que a bebida lançada hoje vai vender bem...?"
2001506-90 = "É super gostosa! Vai dar certo!"
2001506-92 = "Será que este novo donut será bem aceito...?"
2001506-94 = "Sim, está macio e muito bom!"
2001506-96 = "(E assim, superando várias dificuldades...)"
2001506-99 = "Haa, haa... finalmente chegamos..."
2001506-100 = "[s] \"Realmente, 'finalmente' é a palavra certa...\""
2001506-101 = "Mas o novo pacote já está bem na nossa frente!"
2001506-102 = "Com licença, me dê um novo pacote de Mushiqueen, por favor!"
2001506-103 = "Oh, que sorte a sua. É o último, aqui está."
2001506-104 = "Uau...! Incrível, incrível! O pacote em si está brilhando!"
2001506-105 = "[s] \"Sim, fico feliz que a Kaede esteja contente.\""
2001506-106 = "Ah, não é hora de ficar parada! Dizem que tem pelo menos uma carta rara dentro, preciso voltar logo para montar meu deck"
2001506-107 = "Hã, esgotado...!?"
2001506-108 = "...Hm?"
2001506-110 = "Sinto muito, o estoque acabou exatamente agora..."
2001506-111 = "Uuu... acordei cedo, viajei quatro horas de trem... e já esgotou..."
2001506-112 = "...Sensei. Aquela criança, parece que veio de muito longe."
2001506-113 = "[s] \"...É verdade.\""
2001506-114 = "Uuu..."
2001506-115 = "Ei, você aí, não chore!"
2001506-116 = "Hã..."
2001506-117 = "Toma, aqui! É o pacote novo que lançou hoje!"
2001506-118 = "Moça...? Você vai me dar isso...?"
2001506-119 = "[s] \"Kaede, tem certeza?\""
2001506-120 = "Sim!! Ela veio de longe e se esforçou tanto..."
2001506-121 = "Além disso, em 'Mushiqueen' também teve uma história assim."
2001506-122 = "Não importa o quão difícil seja a batalha... o esforço feito até o fim é recompensado. Ele merece ser recompensado!"
2001506-123 = "Ah, eu sei! Episódio 139 de 'Mushiqueen'!"
2001506-124 = "Isso mesmo! Então, aqui!"
2001506-125 = "...Ah, obrigada! Moça!"
2001506-129 = "[ns] \"Kaede.\""
2001506-130 = "Sensei. Você não acha que eu fui uma dama incrível agora há pouco?"
2001506-131 = "[s] \"Com certeza.\""
2001506-132 = "............Sim, então fico feliz!"
2001506-133 = "Ah, vocês dois! Então estavam aqui...!"
2001506-134 = "Ué, se não me engano, você é a pessoa das lentes de contato de agora pouco...?"
2001506-135 = "Peço desculpas pela demora, eu sou esta pessoa aqui."
2001506-136 = "[s] \"O responsável pelas relações públicas do projeto 'Mushiqueen'...?!\""
2001506-137 = "……Hã!? A pessoa do 'Mushiqueen'!?"
2001506-138 = "No caminho para cá, encontrei várias pessoas que disseram ter sido ajudadas por vocês dois."
2001506-139 = "Vocês devem ter se apressado para chegar aqui... e, mesmo assim, mantiveram o espírito de ajudar quem quer que estivesse em apuros..."
2001506-140 = "Esse é exatamente o espírito de um 'Mushiqueen Battler'!"
2001506-141 = "[s] \"E-entendo, era isso.\""
2001506-142 = "É isso mesmo, ser um Mushiqueen Battler é, de certa forma, ser uma dama elegante!"
2001506-143 = "Sim, uma verdadeira Mushiqueen Battler e uma dama elegante... vocês me mostraram isso! E tive uma ótima ideia!"
2001506-144 = "……?"
2001506-145 = "Se não se importarem, poderiam me deixar usar o que aconteceu hoje como um documentário promocional de 'Mushiqueen'?"
2001506-146 = "Algo como: 'Mushiqueen Battler: Em busca de ser uma dama elegante'!"
2001506-147 = "Ah, claro, não estou pedindo de graça. Primeiro, aceitem isto."
2001506-151 = "Só tenho isso comigo agora, mas são pacotes novos. Vou dar 20 pacotes para vocês!"
2001506-152 = "Eeeeh!? O-o que eu faço, Sensei!?"
2001506-153 = "O-o senhor não gostou...? É claro que posso oferecer outra recompensa..."
2001506-154 = "N-não é isso, mas, ainda assim...!"
2001506-155 = "O-o que eu faço...?"
2001506-156 = "[s5] \"Acho que não tem problema aceitar, já que se esforçaram.\"\n[s6] \"É como a Kaede disse agora pouco.\""
2001506-157 = "Ah..."
2001506-158 = "Ah..."
2001506-159 = "'O esforço feito até o fim é recompensado. Está tudo bem ser recompensado'..."
2001506-160 = "……Sim!"
2001506-161 = "Então, como uma dama elegante... eu aceito com gratidão!"
2001506-162 = "Sim, por favor!"
2001506-163 = "Ótimo, então vamos voltar e batalhar logo, Sensei!"
2001506-164 = "Não vou pegar leve, viu!"
2001506-165 = "[s] \"Sim, combinado.\""
2001506-167 = "(Assim, voltamos para a sala do clube e comecei a batalha de Mushiqueen com a Kaede)"
2001506-169 = "Então, primeiro é o meu turno! Vou jogar os dados..."
2001506-170 = "O número é... 6! Então vou comprar uma carta!"
2001506-174 = "Oh, 'Coelho de Chifre de Broca - Forma Suprema'! Meu ás apareceu de repente!"
2001506-175 = "A alma da carta respondeu à minha alma!"
2001506-176 = "[s] \"E-entendo...\""
2001506-177 = "Então, primeiro, vou começar a dança para invocar o 'Coelho de Chifre de Broca - Forma Suprema'!"
2001506-178 = "Fun-fufun~♪ fufun-fun~♪ Pronto, com essa dança, eu invoco especialmente o 'Coelho de Chifre de Broca - Forma Suprema'!"
2001506-183 = "E agora, ativo a habilidade do 'Coelho de Chifre de Broca - Forma Suprema'! Além da fofura dele, eu também sou super fofa, então...!"
2001506-184 = "O poder de ataque do 'Coelho de Chifre de Broca - Forma Suprema' aumenta em 10 vezes!"
2001506-185 = "[s] \"Esse valor faz o equilíbrio do jogo parecer preocupante...!\""
2001506-186 = "Meu turno ainda não acabou!"
2001506-187 = "Agora, prepare-se..."
2001506-190 = "[wa:1200]— ……Hehe."
2001506-192 = "— De alguma forma, hoje, [wa:1500] aconteceram muitas coisas."
2001506-195 = "[wa:800]— Foi um dia bem agitado, [wa:900] mas..."
2001506-197 = "— Graças ao Sensei, [wa:1300] talvez eu tenha ficado um passo mais perto [wa:1200] de ser uma dama exemplar!?"
2001506-200 = "[wa:900]— Obrigada, [wa:700] Sensei!"
2001506-202 = "— Por sempre [wa:1100] me ajudar!"
2001506-205 = "[ns7] \"Não esperava por isso de repente...\"\n[ns8] \"É o Sensei, afinal. Se precisar de algo, pode falar a qualquer momento.\""
2001506-206 = "[wa:1300]— Sério!? [wa:1300] Oba!"
2001506-207 = "[wa:1300]― Sério!?[wa:1300] Oba!"
2001506-209 = "― Então[wa:500] vou colocar todo esse sentimento de alegria...[wa:3100] em um ataque[wa:1000] no Sensei!"
2001506-212 = "[ns] \"Uma boa atmosfera foi convertida em poder de ataque!?\""
2001506-213 = "[wa:1200]― Toma essa,"
2001506-215 = "― O [wa:2000]Drill Impact da \"Coelha do Chifre de Broca - Forma Suprema\"!!"
2001506-218 = "― Nihihi!"
2001506-222 = "Isso, eu ganhei! O mito da invencibilidade da Kaede continua!"
2001506-223 = "E então, Sensei? Eu não sou forte? Não sou a mais forte?"
2001506-224 = "Será que eu fiquei forte demais...? Hehe."
2001506-225 = "[s9] \"Jogamos várias vezes, mas não entendi as regras...\"\n[s10] \"Tem regras especiais demais da Kaede, não consigo acompanhar...!\""
2001506-226 = "Tá tudo bem, não se preocupe!"
2001506-227 = "Tá tudo bem, não se preocupe!"
2001506-228 = "Vou jogar com você quantas vezes for preciso até você aprender!"
2001506-229 = "Vamos lá, mais uma vez, Sensei!"
2001506-231 = "（E assim, até tarde da noite, aproveitei a batalha de cartas com a Kaede）"
