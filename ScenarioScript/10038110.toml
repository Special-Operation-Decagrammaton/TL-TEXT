[translation]
10038110-1 = "エピローグ;月影祭"
10038110-2 = "（そうして、山海経全土を混乱に陥れた「若返り現象」事件は幕を閉じた……）"
10038110-7 = "ようやく月影祭が開催できますね。#n本当にお疲れ様でした。門主様。"
10038110-8 = "ああ。其方もご苦労じゃった。#n実に……様々なことがあったのう。"
10038110-9 = "あれらを全て祭りの準備と言えるかどうかは……また別の問題だとは思いますが。"
10038110-10 = "ですが、流石門主様です！#nあれだけの騒動を鎮圧し、滞りなく月影祭の開催にこぎつけるだなんて！"
10038110-11 = "門主様がいらっしゃらなかったら、山海経は未だに混沌の渦中にいたことでしょう！"
10038110-12 = "為すべき事をしたまでじゃ。落ち着け、ミナ。"
10038110-13 = "して……「騒動」を起こした構成員の措置は、どうなっている？"
10038110-14 = "はっ！全員再教育対象に分類し、ボランティアに専念するよう指示しました！"
10038110-15 = "私個人の感情としては、全員退部の上、どこにも属せないよう処罰したかったのですが……。"
10038110-16 = "もうよい。彼女らとて自身の正道を進んだだけじゃ。"
10038110-21 = "さて……これで本当に、祭りの時間じゃのう。"
10038110-25 = "あ、先生。お疲れ様です。"
10038110-26 = "いえ。私も今来たばかりで……"
10038110-27 = "これから、ルミ会長とキサキ門主様の命に従って……ってあれ？"
10038110-36 = "着いたか、先生？レイジョとは会ったか？"
10038110-37 = "ああ……本来、このようなことは執行部長のミナや、広報部長に任せるのじゃが。"
10038110-38 = "先生も知っての通り、あの二人は今回の月影祭で色々とやることが山積みじゃからのう。"
10038110-39 = "妾が直接先生を案内しようかとも思ったのじゃが……。"
10038110-40 = "いや、今のは失言じゃった。忘れてくれ。"
10038110-41 = "では、レイジョ。山海経を代表して、先生を頼むぞ。"
10038110-46 = "ふふ。また連絡するからの。"
10038110-52 = "……はあ。"
10038110-56 = "それでは参りましょう、先生。#n私が月影祭をご案内いたします。"
10038110-59 = "一時はどうなることかと思ったのですが……幸い、全てが滞りなく準備が進みました。"
10038110-60 = "今回の月影祭は、玄龍門も玄武商会に必要以上の干渉はしてこないと思います。"
10038110-61 = "まあ……それができるほどの余力もなさそうですし。"
10038110-70 = "お祭りの日まで制服着てるなんて、本当にあんたらしいね。"
10038110-71 = "制服推奨だったからな……そう書いてあるってことはほぼ絶対だろう？#nそれに、今年は他校生が多く来るっていうし……。"
10038110-72 = "玄龍門の構成員は、制服を着用して万が一の事態に備えるようにって……。"
10038110-73 = "え、じゃあなんか起きたほうが良い感じ？"
10038110-77 = "いや、それは本当に勘弁してほしいんだが……私は静かに暮らしたいんだ。#n特に今年の月影祭は……本当に……いろいろあったから……"
10038110-78 = "あ、そうだ。あんたの子供姿、本当に面白かったよ。"
10038110-79 = "いや、お前人のこと言えるか……？"
10038110-82 = "子供になっていた生徒の写真が、あちこちに出回っているようで……。"
10038110-83 = "……大半は友達同士でお互いをからかう目的で所持しているようですが。"
10038110-87 = "え？私がルミ会長の写真を！？"
10038110-88 = "わ、私をなんだと思っているのですか！#n私はそういう写真を取り締まる側です！"
10038110-92 = "まぁ……会長ご自身が、記念だとかいって写真を商会の正門に貼っているので、あまり取り締まる意味はないと思いますが……"
10038110-98 = "……あ、京劇の公演が始まったみたいですね。"
10038110-111 = "生徒の間では、京劇部が戻ってこられてよかったという声が聞こえてきます。"
10038110-112 = "……京劇部とカグヤに何が起きたのかは、公にならない方が良いのですが。"
10038110-113 = "少なくとも、今回の月影祭……山海経全土を他校生に開いたこの期間だけは、内部が安定しているほうがいいでしょう。"
10038110-114 = "商売人としては、市場には安定していてほしいものですから。#nおや……？"
10038110-121 = "祭りは楽しんでいるかのう？#nちょうど京劇の公演が始まったみたいじゃな。"
10038110-122 = "ん？用件？"
10038110-123 = "……そもそも、特別な用事などなくとも、いくらでもかけて良いのではないかえ？"
10038110-124 = "そうじゃよな？先生。"
10038110-125 = "それに……広く山海経を知ってもらうべく全区域を開放した件について、少し意見や感想を聞きたくてのう？"
10038110-130 = "ふむ……山海経の生徒にとっても、訪れてくれた生徒にとっても。#n互いに楽しく交流できておるのか……。"
10038110-131 = "ん？玄龍門の構成員が苦労しているようにも見える……？"
10038110-132 = "……。"
10038110-133 = "そもそも、そのための玄龍門じゃ。#nしかし、先生の心遣いには礼を言おう。"
10038110-134 = "では、引き続き祭りを楽しむと良い。"
10038110-139 = "……"
10038110-140 = "門主様……話したかっただけならそう言えばいいのに……。"
10038110-144 = "……何でもありません。いきましょうか。"
10038110-176 = "今回の山海経全域の開放は、私たち玄武商会にとって、とても良い結果となりました。"
10038110-177 = "……玄龍門が商会にとって得になる裁決をしてくれるとは、以前までは思いもしなかったです。"
10038110-178 = "ただ……売上は大幅に上がったのですが、管理しなければならない範囲もかなり増えてしまったので、人材の配分が大変ですが……。"
10038110-182 = "特にゲヘナ生とトリニティ生のいざこざは、私も初めてこの目で見ました。#n気を配らなければならないことが多いですね。"
10038110-183 = "あ、あそこでも……。"
10038110-202 = "ちょうど玄龍門……ミナ執行部長がパトロール中ですね。よかったです。"
10038110-203 = "……何となく、私たちが一緒にいるところを見られると厄介なことになりそうです。#n静かに移動しましょう。"
10038110-206 = "そういえば先生、桃源郷はもう慣れましたか？"
10038110-207 = "外部の生徒からは、新鮮だという意見と、お茶のことはよく分からないという意見に分かれているようで……。"
10038110-217 = "それが、桃源郷側としては少し戸惑いもあったようで……。"
10038110-218 = "100gで1万円ほどするお茶に、牛乳を混ぜて飲もうとする生徒が現れまして……。#nどう理解を示せば良いのか頭を悩ませているみたいです。"
10038110-219 = "私個人としては、好みは人それぞれ違うものですし――"
10038110-220 = "互いの迷惑にならない範囲であれば、尊重し合えば良いとは思うのですが……。"
10038110-221 = "でも……100g1万円の高級茶に牛乳を入れるのは、ええと……。"
10038110-222 = "……ここまでにしておきます。"
10038110-227 = "それって金で包丁を研ぐのと、一体何が違うのでしょうか……。"
10038110-228 = "まあ……結果からいえば、私たち玄武商会としてはそれほど悪いことではありませんでした。"
10038110-231 = "おかげさまで桃源郷から乳製品を仕入れたいという連絡がきましたし……。"
10038110-232 = "需要のあるところに供給のルートを開くのは、私たち商会の仕事ですので。"
10038110-235 = "ただ、そうですね……玄龍門は他の部活に比べて特にお茶好きが多いらしいので……。"
10038110-236 = "今回の件で、さらに私たちの事を悪く思うようになってしまったみたいですが……。"
10038110-237 = "まあでも、元々犬猿の仲ですし！嫌われる材料が増えた程度、大した違いはないんじゃないでしょうか！"
10038110-241 = "まぁ……私たちも、できれば仲良くしたいとは思っていますけどね。"
10038110-246 = "あ、花火が始まりました。#n窓際に行きましょうか、先生。"
10038110-254 = "花火を見ると、月影祭だという実感を得ます。"
10038110-255 = "……先生とこうして花火が見られるなんて。#nこれも……特別なことですね。"
10038110-261 = "あれ？#n門主様からだ……。"
10038110-267 = "今は桃源郷にいるようじゃのう、先生。"
10038110-268 = "月影祭は楽しんでおるか？#nふむ……山海経に他校生がいるのが新鮮？"
10038110-269 = "そうか……先生がそう感じてくれたのなら、幸いじゃ。"
10038110-270 = "――先生は、知っているかえ？#n山海経の……月影祭と神仙の伝承について。"
10038110-271 = "そうか。すでに聞いているのなら話は早い。"
10038110-274 = "月に旅立った神仙がこの地に舞い戻り、下界を周遊した後、また旅に出るという伝説じゃな。"
10038110-275 = "神仙は、伝承の中で本心の知れぬ存在として扱われておる。"
10038110-276 = "やさしい神仙ももちろんいるじゃろうが、中には「悪仙」や「妖仙」と呼ばれるような者もいたらしい。"
10038110-279 = "我らは……我らを訪ねてきた神仙が、どのような者なのか、最後まで分からぬこともあるじゃろう。"
10038110-280 = "もしかしたら、それ故に――神仙を「悪仙」や「妖仙」かもしれぬと思い込み――"
10038110-281 = "誰も受け入れようとしなかったのやもしれぬ。"
10038110-282 = "――大切なのは、無闇に怖がらないことだと思います、門主様。"
10038110-283 = "いま現在起きていることに集中することさえ難しいというのに。"
10038110-284 = "起きていないことまで心配していては、本当に身動きがとれなくなってしまいますから。"
10038110-289 = "ふふ……そうさな。"
10038110-290 = "商売というのは常に――素性の知れぬ者を、客として迎えることですので。"
10038110-291 = "それは……確かにそうじゃな。"
10038110-292 = "では、参りましょう先生。月影祭はまだまだ始まったばかりです。"
10038110-293 = "何を言ってるんですか。月影祭は3日もあるのですよ？#n今日はまだ初日です。"
10038110-294 = "ふふ。山海経の歓待を甘く見てもらっては困るからのう？"
10038110-299 = "さあ、先生。こちらです。#n最後までじっくりと楽しんでくださいね。"
10038110-328 = "五塵来降"
