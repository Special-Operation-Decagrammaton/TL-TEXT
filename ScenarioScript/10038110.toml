[translation]
10038110-1 = "Epílogo; Festival do Luar"
10038110-2 = "（E assim, o incidente do \"fenômeno de rejuvenescimento\" que mergulhou todo o Shanhaijing no caos chegou ao fim...）"
10038110-7 = "Finalmente podemos realizar o Festival do Luar. #nMuito obrigada pelo seu trabalho duro, Monshu."
10038110-8 = "Ah. Você também se esforçou bastante. #nRealmente... muitas coisas aconteceram."
10038110-9 = "Se podemos chamar tudo aquilo de preparação para o festival... bem, acho que isso é outra questão."
10038110-10 = "Mas, como esperado do Monshu! #nConseguir conter toda aquela confusão e ainda realizar o Festival do Luar sem problemas!"
10038110-11 = "Se não fosse pelo Monshu, Shanhaijing ainda estaria no meio do caos!"
10038110-12 = "Fiz apenas o que deveria ser feito. Acalme-se, Mina."
10038110-13 = "E então... como estão as medidas tomadas contra os membros que causaram a \"confusão\"?"
10038110-14 = "Sim! Classifiquei todos como alvos de reeducação e ordenei que se dediquem ao trabalho voluntário!"
10038110-15 = "Pessoalmente, eu queria que todos fossem expulsos e punidos para que não pudessem pertencer a lugar nenhum, mas..."
10038110-16 = "Já chega. Elas apenas seguiram o seu próprio caminho de retidão."
10038110-21 = "Bem... agora é realmente hora do festival."
10038110-25 = "Ah, Sensei. Bom trabalho."
10038110-26 = "Não, eu também acabei de chegar..."
10038110-27 = "Seguindo as ordens da Presidente Lumi e da Monshu Kisaki... espere, o quê?"
10038110-36 = "Chegou, Sensei? Encontrou a Reijo?"
10038110-37 = "Ah... normalmente, esse tipo de coisa seria deixado para a Chefe de Execução Mina ou para a Chefe de Relações Públicas."
10038110-38 = "Como você sabe, Sensei, essas duas estão com uma montanha de coisas para fazer neste Festival do Luar."
10038110-39 = "Eu pensei em guiar o Sensei pessoalmente, mas..."
10038110-40 = "Não, o que eu disse agora foi um deslize. Esqueça."
10038110-41 = "Então, Reijo. Representando Shanhaijing, conto com você para cuidar do Sensei."
10038110-46 = "Fufu. Entrarei em contato novamente."
10038110-52 = "……Ah."
10038110-56 = "Então vamos, Sensei. #nEu guiarei você pelo Festival do Luar."
10038110-59 = "Por um momento, pensei que tudo daria errado... mas, felizmente, tudo foi preparado sem problemas."
10038110-60 = "Neste Festival do Luar, acho que o Genryumon não interferirá mais do que o necessário na Associação Genbu."
10038110-61 = "Bem... não parece que eles tenham energia sobrando para isso."
10038110-70 = "Usar uniforme no dia do festival, é bem a sua cara mesmo."
10038110-71 = "Era recomendado usar uniforme... se está escrito, é quase obrigatório, não é? #nAlém disso, dizem que muitos alunos de outras escolas virão este ano..."
10038110-72 = "Os membros do Genryumon devem usar uniforme para se preparar para qualquer eventualidade..."
10038110-73 = "Eh, então você acha que seria bom se algo acontecesse?"
10038110-77 = "Não, eu realmente não quero que isso aconteça... eu só quero viver em paz. #nEspecialmente porque este Festival do Luar... realmente... teve muitas coisas..."
10038110-78 = "Ah, é verdade. Sua forma de criança foi muito engraçada."
10038110-79 = "Não, você pode falar alguma coisa sobre isso...?"
10038110-82 = "Parece que fotos dos alunos que viraram crianças estão circulando por aí..."
10038110-83 = "……A maioria parece estar com amigos que as guardam para provocar uns aos outros."
10038110-87 = "Eh? Eu com fotos da Presidente Lumi!?"
10038110-88 = "O-o que você pensa de mim! #nEu sou a pessoa que fiscaliza esse tipo de foto!"
10038110-92 = "Bem... a própria presidente colou as fotos no portão principal da associação como lembrança, então acho que não faz muito sentido fiscalizar..."
10038110-98 = "……Ah, parece que a apresentação da Ópera de Pequim começou."
10038110-111 = "Entre os alunos, ouvem-se vozes dizendo que é bom que o Clube de Ópera de Pequim tenha retornado."
10038110-112 = "……É melhor que o que aconteceu com o Clube de Ópera de Pequim e Kaguya não se torne público."
10038110-113 = "Pelo menos, durante este Festival do Luar... enquanto Shanhaijing estiver aberto para alunos de outras escolas, é melhor que o interior esteja estável."
10038110-114 = "Como comerciante, quero que o mercado esteja estável. #nOh...?"
10038110-121 = "Está aproveitando o festival? #nParece que a apresentação da Ópera de Pequim acabou de começar."
10038110-122 = "Hm? Algum assunto?"
10038110-123 = "……Afinal, mesmo que não haja um assunto especial, não posso ligar para você quando quiser?"
10038110-124 = "Não é verdade? Sensei."
10038110-125 = "Além disso... sobre a abertura de todas as áreas para que conheçam Shanhaijing, eu queria ouvir um pouco das suas opiniões e impressões?"
10038110-130 = "Hum... tanto para as alunas de Shanhaijing quanto para as alunas que nos visitaram. #nParece que estão conseguindo interagir de forma agradável, não é?"
10038110-131 = "Hm? Parece que os membros da Genryumon estão tendo dificuldades...?"
10038110-132 = "……"
10038110-133 = "Para começo de conversa, é para isso que a Genryumon existe. #nMas, agradeço pela sua consideração, Sensei."
10038110-134 = "Então, continue aproveitando o festival."
10038110-139 = "……"
10038110-140 = "Mestra... se só queria conversar, era só ter dito isso..."
10038110-144 = "……Não é nada. Vamos indo?"
10038110-176 = "A abertura de toda a área de Shanhaijing desta vez trouxe resultados muito bons para nós, da Associação Comercial Genbu."
10038110-177 = "……Eu nunca imaginei, até pouco tempo atrás, que a Genryumon tomaria decisões tão vantajosas para a nossa associação."
10038110-178 = "Só que... embora as vendas tenham aumentado drasticamente, a área que precisamos gerenciar também cresceu muito, então a distribuição de pessoal está sendo difícil..."
10038110-182 = "Especialmente as confusões entre as alunas de Gehenna e Trinity, eu vi com meus próprios olhos pela primeira vez. #nHá muitas coisas com as quais precisamos nos preocupar."
10038110-183 = "Ah, ali também..."
10038110-202 = "A Genryumon... a Chefe Executiva Mina está fazendo a patrulha agora. Que bom."
10038110-203 = "……De alguma forma, sinto que se nos virem juntas, teremos problemas. #nVamos nos mover silenciosamente."
10038110-206 = "Falando nisso, Sensei, já se acostumou com o Tougenkyou?"
10038110-207 = "Pelo que parece, as alunas de fora estão divididas entre achar o lugar refrescante e não entender muito bem sobre os chás..."
10038110-217 = "Parece que o pessoal do Tougenkyou ficou um pouco confuso com isso..."
10038110-218 = "Apareceram alunas querendo misturar leite em um chá que custa 10 mil ienes por 100g... #nEles parecem estar quebrando a cabeça sobre como lidar com isso."
10038110-219 = "Pessoalmente, acho que o gosto de cada um é diferente, e..."
10038110-220 = "Desde que não incomode os outros, acho que deveríamos respeitar as escolhas uns dos outros, mas..."
10038110-221 = "Mas... colocar leite em um chá de luxo de 10 mil ienes por 100g é, bem..."
10038110-222 = "……Vou parar por aqui."
10038110-227 = "Qual seria a diferença disso para afiar uma faca com ouro...?"
10038110-228 = "Bem... no fim das contas, para nós da Associação Comercial Genbu, não foi algo tão ruim assim."
10038110-231 = "Graças a isso, recebemos contatos querendo comprar laticínios do Tougenkyou..."
10038110-232 = "Abrir rotas de fornecimento onde há demanda é o trabalho da nossa associação."
10038110-235 = "Só que, bem... parece que na Genryumon há muitas pessoas que amam chá, mais do que em outros clubes..."
10038110-236 = "Com esse incidente, parece que eles passaram a nos ver com ainda mais maus olhos..."
10038110-237 = "Mas, bem, nós já somos como cão e gato mesmo! Mais um motivo para nos odiarem não faz tanta diferença assim, não é?"
10038110-241 = "Bem... nós também gostaríamos de nos dar bem, se possível."
10038110-246 = "Ah, os fogos de artifício começaram. #nVamos até a janela, Sensei?"
10038110-254 = "Ao ver os fogos de artifício, sinto que o Festival do Luar realmente começou."
10038110-255 = "……Poder ver os fogos de artifício assim com você, Sensei. #nIsso também é... algo especial."
10038110-261 = "Ué? #nÉ da Mestra..."
10038110-267 = "Parece que você está no Tougenkyou agora, Sensei."
10038110-268 = "Está aproveitando o Festival do Luar? #nHm... acha refrescante ter alunas de outras escolas em Shanhaijing?"
10038110-269 = "Entendo... fico feliz que você se sinta assim."
10038110-270 = "――Sensei, você sabe? #nSobre o Festival do Luar de Shanhaijing e a lenda dos imortais."
10038110-271 = "Entendo. Se já ouviu falar, então será mais rápido."
10038110-274 = "É a lenda de que um imortal que partiu para a lua retornou a estas terras, viajou pelo mundo inferior e depois partiu em uma nova jornada."
10038110-275 = "Nas lendas, os imortais são tratados como seres cujas verdadeiras intenções são desconhecidas."
10038110-276 = "Certamente existem imortais gentis, mas parece que também existiam aqueles chamados de 'imortais malignos' ou 'imortais demoníacos'."
10038110-279 = "Nós... talvez nunca saibamos, até o fim, que tipo de ser é o imortal que nos visitou."
10038110-280 = "Talvez por isso — por presumir que o imortal pudesse ser um 'imortal maligno' ou 'demoníaco' —"
10038110-281 = "ninguém tenha tentado aceitá-los."
10038110-282 = "――Acho que o importante é não ter medo sem necessidade, Mestra."
10038110-283 = "Já é difícil o suficiente focar no que está acontecendo agora."
10038110-284 = "Se ficarmos preocupados até com o que não aconteceu, acabaremos ficando paralisados."
10038110-289 = "Fufu... é verdade."
10038110-290 = "Negócios sempre envolvem... receber como clientes pessoas cuja procedência desconhecemos."
10038110-291 = "Isso é... certamente verdade."
10038110-292 = "Então, vamos lá, Sensei. O Festival do Luar está apenas começando."
10038110-293 = "O que está dizendo? O Festival do Luar dura três dias, não é?#nHoje é apenas o primeiro dia."
10038110-294 = "Fufu. Não subestime a hospitalidade de Shanhaijing, entendeu?"
10038110-299 = "Vamos, Sensei. Por aqui.#nAproveite cada momento até o fim."
10038110-328 = "Gojin Raiko"
