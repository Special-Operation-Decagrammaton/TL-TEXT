[translation]
1000802-1 = "朝、メイド、掃除！"
1000802-2 = "ミレニアム・近郊通り"
1000802-3 = "ふぁあー……。"
1000802-4 = "……また寝坊しちまったな、ったく。"
1000802-5 = "ちょっとギリギリかもな。急がねぇと遅刻か。"
1000802-6 = "まあ、今からでも走れば……ん？"
1000802-7 = "ったく……。"
1000802-8 = "どこのどいつだよ。"
1000802-9 = "道がめちゃくちゃじゃねぇか。誰かが自転車で、ゴミ箱にでも突っ込んだのか？"
1000802-10 = "……。"
1000802-11 = "はあ、仕方ねぇな。"
1000802-13 = "（ガサガサ）"
1000802-15 = "……大体こんなもんか。"
1000802-16 = "ったく、めんどくせぇ。"
1000802-17 = "通学路をこんな風にした奴を防犯カメラで探し出して、地獄を見せてやる。"
1000802-19 = "あぁ？何だこの缶……。"
1000802-20 = "これぐらいなら蹴っ飛ばしてゴミ箱に……。"
1000802-22 = "（カン！）"
1000802-23 = "あ？外れたか。"
1000802-24 = "はっ、おもしれぇ。"
1000802-27 = "よし、もう一度……。"
1000802-29 = "（カン！）"
1000802-30 = "ああ～、くそ！惜しかった！"
1000802-31 = "おし！今度こそ……。"
1000802-32 = "[s] \"おはよ、何してるの？\""
1000802-33 = "うわわわっ！な、なんだ！？"
1000802-34 = "は？先生！？何でこんなとこにいんだよ！？"
1000802-35 = "……い、いつから見てた？"
1000802-36 = "[s] ″「……また寝坊しちまったな、ったく」のところから。″"
1000802-37 = "最初からじゃねえか！ああもう！"
1000802-38 = "……おい、先生！#n今見たこと、どこかでバラしやがったらその時は覚悟しろよ！"
1000802-39 = "[s1] \"なんで掃除してたのを言っちゃダメなの？\"\n[s2] \"なんで缶を蹴飛ばして遊んでたのを言っちゃダメなの？\""
1000802-40 = "あぁん？そりゃ当たり前だろ。"
1000802-41 = "あぁん？そりゃ当たり前だろ。"
1000802-42 = "そもそもあたしは、ミレニアムのエージェントC&Cとしてだな……。"
1000802-43 = "えっと……その……。"
1000802-44 = "あー……だって……エージェントのリーダーであるあたしが、のんびり校門の前を掃除してたとか……。"
1000802-45 = "缶を飛ばして遊んでたなんて噂にでもなったら……。"
1000802-46 = "[s] \"恥ずかしいんだ？\""
1000802-47 = "恥ずかしいとかじゃねえから！！"
1000802-48 = "[s] \"じゃあ、私たち二人だけの秘密にしよう。\""
1000802-49 = "ひ、秘密？"
1000802-50 = "……うーん、二人だけの秘密、か。"
1000802-51 = "ははっ、何か悪くねぇ響きだな。"
1000802-52 = "いいぜ、先生。二人だけの秘密だからな、分かったか？約束は守れよ？"
1000802-53 = "これから先ずっと、ちゃんと守ってるか確認するからな？"
1000802-55 = "（ネルはなんだかすっきりした表情で、ミレニアムの方向に消えていった）"
