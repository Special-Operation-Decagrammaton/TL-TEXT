[translation]
1000802-1 = "Manhã, empregada, limpeza!"
1000802-2 = "Arredores de Millennium"
1000802-3 = "Bocejo..."
1000802-4 = "...Acabei perdendo a hora de novo, droga."
1000802-5 = "Talvez eu esteja bem em cima da hora. Se eu não me apressar, vou chegar atrasada."
1000802-6 = "Bom, se eu correr agora... hein?"
1000802-7 = "Droga..."
1000802-8 = "Quem foi o idiota que fez isso?"
1000802-9 = "A rua está uma bagunça. Alguém bateu com uma bicicleta na lixeira ou algo assim?"
1000802-10 = "..."
1000802-11 = "Ah, não tem jeito."
1000802-13 = "(Barulho de sacudir)"
1000802-15 = "...Acho que está bom assim."
1000802-16 = "Caramba, que saco."
1000802-17 = "Vou usar as câmeras de segurança para achar quem deixou o caminho da escola assim e vou fazer essa pessoa ver o inferno."
1000802-19 = "Hã? Que lata é essa..."
1000802-20 = "Se for só isso, posso chutar para dentro da lixeira..."
1000802-22 = "(Clang!)"
1000802-23 = "Hã? Errei?"
1000802-24 = "Hah, interessante."
1000802-27 = "Beleza, mais uma vez..."
1000802-29 = "(Clang!)"
1000802-30 = "Ah, droga! Quase!"
1000802-31 = "Beleza! Dessa vez vai..."
1000802-32 = "[s] \"Bom dia, o que está fazendo?\""
1000802-33 = "Uwaaa! Q-quem é!?"
1000802-34 = "Hã? Sensei!? Por que você está aqui!?"
1000802-35 = "...D-desde quando você estava olhando?"
1000802-36 = "[s] \"Desde a parte do 'Acabei perdendo a hora de novo, droga'.\""
1000802-37 = "Desde o começo, então!? Ah, droga!"
1000802-38 = "...Ei, Sensei! Se você contar para alguém o que viu agora, é melhor se preparar!"
1000802-39 = "[s1] \"Por que não posso contar que você estava limpando?\"\n[s2] \"Por que não posso contar que você estava brincando de chutar a lata?\""
1000802-40 = "Hã? Isso é óbvio, né."
1000802-41 = "Hã? Isso é óbvio, né."
1000802-42 = "Primeiro de tudo, eu sou uma agente da C&C de Millennium..."
1000802-43 = "Bem... é que..."
1000802-44 = "Ah... é que... se souberem que eu, a líder dos agentes, estava limpando a frente do portão da escola calmamente..."
1000802-45 = "Ou se espalhar o boato de que eu estava brincando de chutar latas..."
1000802-46 = "[s] \"Você está com vergonha?\""
1000802-47 = "Não é vergonha, não!!"
1000802-48 = "[s] \"Então, vamos manter isso como um segredo só nosso.\""
1000802-49 = "U-um segredo?"
1000802-50 = "...Hmm, um segredo só nosso, é?"
1000802-51 = "Haha, não soa nada mal."
1000802-52 = "Tudo bem, Sensei. É um segredo só nosso, entendeu? Cumpra sua promessa, hein?"
1000802-53 = "Vou ficar conferindo se você está mantendo isso daqui para frente, entendeu?"
1000802-55 = "(Neru foi embora em direção a Millennium com uma expressão um tanto aliviada)"
