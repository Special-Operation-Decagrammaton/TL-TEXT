[translation]
2004002-1 = "Kyogoku Satsuki sabe"
2004002-2 = "（Algum tempo depois de receber a mensagem de Satsuki...）"
2004002-6 = "Então este é o escritório do Sensei, hein...#nUfufu, é bem simples, como a Makoto-chan disse."
2004002-7 = "Ah, será que eu interrompi algo importante?"
2004002-8 = "[s] \"Talvez...\""
2004002-9 = "Bem, mesmo que tenha interrompido, não é como se isso me importasse."
2004002-10 = "Afinal, o meu assunto é o mais importante de todos."
2004002-11 = "[s1] \"Eu quero que você ouça a minha opinião!?\"\n[s2] \"O que houve?\""
2004002-14 = "Hmm?#nEu achei que o Sensei já soubesse..."
2004002-15 = "Nós somos próximos, não precisa esconder nada de mim, sabe?"
2004002-16 = "O plano atual do Pandemonium Society――"
2004002-17 = "A primeira fase do plano da Makoto-chan para o \"Controle do Discurso de Kivotos\" já começou a dar frutos."
2004002-22 = "Por isso, como você é nosso colaborador, quero que nos empreste sua força."
2004002-26 = "[ns3] \"Desde quando somos colaboradores...!?\"\n[ns4] \"É a primeira vez que ouço falar disso, o que é isso!?\""
2004002-29 = "Ora, não diga bobagens.#nOs documentos do Departamento de Informações nunca estão errados."
2004002-30 = "Você prometeu cooperar incondicionalmente enquanto lambia os sapatos da Makoto-chan na praça de Gehenna, onde todos podiam ver, não foi?"
2004002-31 = "[s] \"Eu não fiz isso!? De onde tiraram esse boato!?\""
2004002-32 = "Hmph... parece que há uma falha nas informações.#nTalvez eu devesse ter verificado melhor."
2004002-33 = "[s] \"Acho bom você verificar direito mesmo!?\""
2004002-37 = "Bem, tanto faz... então, vamos começar com a minha apresentação."
2004002-38 = "Eu, Kyogoku Satsuki, fui encarregada de assumir o Departamento de Informações do Conselho Estudantil de Gehenna."
2004002-39 = "O Departamento de Informações do Pandemonium Society herdou o know-how do departamento do antigo conselho estudantil#nque desapareceu dos palcos da história."
2004002-40 = "Não houve um procedimento formal, mas é assim que eu vejo as coisas."
2004002-41 = "[s] \"Ou seja, você assumiu por conta própria...?\""
2004002-42 = "...Vamos deixar as apresentações de lado e ir ao ponto principal."
2004002-43 = "Se você diz que não vai cooperar, Sensei――"
2004002-44 = "Não teremos escolha a não ser chantageá-lo com aquela coisa especial que nosso Departamento de Informações conseguiu..."
2004002-51 = "[ns] \"Aquela coisa especial...?\""
2004002-52 = "Sim. Sensei, o seu \"ponto fraco\"."
2004002-53 = "Ufufu... e então?#nEstá preparado mentalmente?"
2004002-54 = "[s] \"...\""
2004002-56 = "[ns] （Tenho tantos pontos fracos que nem consigo imaginar qual seja）"
2004002-57 = "Ponto fraco número um."
2004002-58 = "O Sensei..."
2004002-62 = "Tem o hobby de correr por Kivotos totalmente nu. É isso, não é?"
2004002-63 = "[s] \"I-Isso é parcialmente verdade, mas não é um hobby!?\""
2004002-64 = "Ora, será que você deveria admitir tão facilmente?"
2004002-65 = "Você não sente vergonha nem com esse nível de revelação...? Impressionante."
2004002-66 = "[s] \"É-É uma memória vergonhosa, com certeza...!\""
2004002-67 = "Hmph, mas isso não é tudo."
2004002-68 = "Afinal, o Sensei tem mais de 50 outros pontos fracos."
2004002-69 = "[s] \"Tantos assim!? Como eu consegui ficar bem até agora...?\""
2004002-70 = "Fufu... eu posso parar se você quiser.#nEm troca, você terá que prometer cooperar conosco por mais de 1000 anos."
2004002-71 = "Ponto fraco número dois do Sensei..."
2004002-72 = "[ns] （...Gulp）"
2004002-73 = "O Sensei..."
2004002-77 = "Faz doações mensais para apoiar estudantes carentes.#nÉ isso, não é? Fufu."
2004002-78 = "[s] \"...\""
2004002-80 = "[ns5] \"Não querendo me gabar, mas...\"\n[ns6] \"Isso é um ponto fraco ou uma boa ação?\""
2004002-83 = "Não, está errado."
2004002-84 = "Kivotos é um mundo de lei do mais forte. Um mundo de sobrevivência do mais apto."
2004002-85 = "Em um mundo tão cruel, mostrar qualquer tipo de compaixão superficial é o mesmo que expor suas próprias fraquezas."
2004002-86 = "[s] \"Eu sou o Sensei, então só estou fazendo o que é melhor para os alunos.\""
2004002-87 = "Entendo... então isso também não funciona com você."
2004002-88 = "Como esperado do Sensei. #nSe você mesmo admite, não há como usar essa informação contra você... você atingiu meu ponto cego."
2004002-89 = "[s] \"Não, é que, como eu disse, isso não é uma fraqueza...\""
2004002-90 = "Hmm... mas a próxima com certeza será fatal, não é?"
2004002-91 = "A fraqueza do Sensei, número três..."
2004002-95 = "Quando o Sensei faz macarrão instantâneo, ele coloca todos os farelos que sobram no fundo do pacote...!"
2004002-96 = "[s] \"…….\""
2004002-98 = "[ns] \"Isso não é normal...?\""
2004002-99 = "Fufu... a mesma ação pode ter significados diferentes dependendo de quem a pratica."
2004002-100 = "O Sensei do Schale, sempre perfeito e solitário, fazendo algo que qualquer outra pessoa faria..."
2004002-101 = "Como você acha que os alunos reagiriam se soubessem disso? #nNão acha que ficariam decepcionados?"
2004002-102 = "Mas o Pandemonium é diferente. Nós podemos até encobrir essas falhas do Sensei—"
2004002-103 = "[s] \"Não, está tudo bem...\""
2004002-106 = "Parece que você ainda não entendeu a situação, Sensei."
2004002-107 = "Eu estou te chantageando agora, sabia?"
2004002-112 = "Essa grande fraqueza... o segredo do Sensei, eu posso expor para o mundo inteiro a qualquer momento, entende?"
2004002-113 = "[s] \"Eu acho que provavelmente está tudo bem...\""
2004002-118 = "Hmm, você não se curva nem diante disso... fufu."
2004002-119 = "Não sei como você consegue ficar tão calmo, mas... não tem jeito."
2004002-120 = "Vamos parar com as chantagens baseadas em fraquezas."
2004002-121 = "Mas não pense que eu desisti, viu?"
2004002-122 = "Se for para conseguir a cooperação do Sensei, eu vou preparar métodos muito mais impressionantes."
2004002-123 = "Sendo assim, vou me retirar."
2004002-124 = "[s] \"Ah, sim... tome cuidado...\""
2004002-127 = "Ufufu, da próxima vez não vai ser tão fácil quanto hoje!"
2004002-132 = "[ns] \"...Sinto que houve um grande mal-entendido...\""
