[translation]
2004002-1 = "京極サツキは知っている"
2004002-2 = "（サツキからの連絡後、しばらくして……）"
2004002-6 = "ここが先生のオフィス、ねぇ……。#nうふふ、マコトちゃんの言う通り質素ねぇ。"
2004002-7 = "あ、もしかしてお取込み中だったかしら？"
2004002-8 = "[s] \"そんなところかな……\""
2004002-9 = "まあ、だとしても私には関係ないのだけど。"
2004002-10 = "だって、私の案件が一番重要だもの。"
2004002-11 = "[s1] \"私の意見を聞いてほしいな！？\"\n[s2] \"どうしたの？\""
2004002-14 = "ふうん？#n先生ならもう知ってると思ってたけど……。"
2004002-15 = "私たちの仲だもの、隠さなくて良いのよ？"
2004002-16 = "今進行[ruby=パンデモニウム・ソサエティー]中の万魔殿の計[/ruby]画――"
2004002-17 = "マコトちゃんの「キヴォトス言論掌握」の第1段階が、軌道に乗ってきたのよ。"
2004002-22 = "だから協力関係である先生にも、力を貸してもらいたいの。"
2004002-26 = "[ns3] \"いつの間に協力関係に……！？\"\n[ns4] \"初めて聞いたんだけどそれ何！？\""
2004002-29 = "あら、そんなわけないわ。#n情報部の文書に間違いなんてないもの。"
2004002-30 = "みんなが見守るゲヘナの広場で、マコトちゃんの靴を舐めながら無条件で協力すると約束したんでしょう？"
2004002-31 = "[s] \"やってないけど！？どこからそんな噂が！？\""
2004002-32 = "フンッ……情報にズレがあるようね。#nもっと精査しておけばよかったかしら。"
2004002-33 = "[s] \"ちゃんと確認した方が良いと思うよ！？\""
2004002-37 = "まあいいわ……じゃあ、私の紹介からしましょうか。"
2004002-38 = "私、[ruby=きょうごく]京極[/ruby]サツキは、ゲヘナ生徒会の情報部を引き継ぐことになったの。"
2004002-39 = "万魔殿の情報部は、歴史の表舞台から消えてしまった#n前生徒会の情報部からノウハウを引き継いでいるのよ。"
2004002-40 = "正式な手続きがあったわけじゃないけど、私はそう思っているわ。"
2004002-41 = "[s] \"つまり勝手に引き継いだってこと……？\""
2004002-42 = "……自己紹介はこの辺にして本題に入りましょう。"
2004002-43 = "先生が協力に応じない、と言うのなら――"
2004002-44 = "我ら情報部が手に入れた、とっておきのアレで脅迫するしか……。"
2004002-51 = "[ns] \"とっておきのアレ……？\""
2004002-52 = "ええ。先生、あなたの「弱点」よ。"
2004002-53 = "うふふっ……どう？#n心の準備はできたかしら？"
2004002-54 = "[s] \"……。\""
2004002-56 = "[ns] （弱点が多すぎて、想像がつかない）"
2004002-57 = "弱点その一。"
2004002-58 = "先生は……"
2004002-62 = "キヴォトスを全裸で駆け回る趣味がある。そうなのでしょう？"
2004002-63 = "[s] \"い、一部事実だけど、趣味じゃないよ！？\""
2004002-64 = "あら、そんなにあっさり認めてしまっていいのかしら？"
2004002-65 = "この程度では羞恥を感じない、と……？さすがね。"
2004002-66 = "[s] \"た、たしかに恥ずかしい記憶だけど……！\""
2004002-67 = "フンッ、でもこれで終わりではないわ。"
2004002-68 = "先生の弱点はあと50個以上あるんだから。"
2004002-69 = "[s] \"そんなに！？私、どうして今まで無事でいられたんだろう……。\""
2004002-70 = "ふふっ……やめてあげてもいいのよ？#nその代わり、私たちに1000年以上協力するって約束してもらうけど。"
2004002-71 = "先生の弱点その二……"
2004002-72 = "[ns] （……ごくり）"
2004002-73 = "先生は……"
2004002-77 = "貧困生徒を支援する募金に毎月募金している。#nそうでしょう？ふふっ。"
2004002-78 = "[s] \"……。\""
2004002-80 = "[ns5] \"自分で言うのもなんだけど……\"\n[ns6] \"それは弱点というか美談のような？\""
2004002-83 = "いいえ、違うわ。"
2004002-84 = "キヴォトスは弱肉強食。適者生存の世界なのよ。"
2004002-85 = "そんな冷酷な世界で、生半可な同情心を見せるのは自分の弱点を晒しているようなもの。"
2004002-86 = "[s] \"私は先生だから、生徒のためになることをやっているだけだよ。\""
2004002-87 = "そう……これも効かないとはね。"
2004002-88 = "さすが先生といったところかしら。#n本人が認めてしまえば、これ以上情報は悪用できない……盲点を突かれたわね。"
2004002-89 = "[s] \"いや、だからそれは弱点じゃないっていうか……\""
2004002-90 = "ふーん……でも、次こそ致命的なんじゃない？"
2004002-91 = "先生の弱点、その三……"
2004002-95 = "先生は袋麺を作る時、底に残った麺の欠片をすべて入れる……！"
2004002-96 = "[s] \"……。\""
2004002-98 = "[ns] \"普通じゃないの……？\""
2004002-99 = "ふふ……同じ行動でも、誰がやるかによって変わるのよ。"
2004002-100 = "いつも完璧で孤高のシャーレの先生が、他の人と同じようなことをするだなんて……"
2004002-101 = "これを生徒たちが知ったらどうなると思う？#n失望されると思わない？"
2004002-102 = "でも、[ruby=私たち]万魔殿[/ruby]は違うわ。先生のそんな欠点もカバーして――"
2004002-103 = "[s] \"ううん、大丈夫……。\""
2004002-106 = "まだ状況が分かっていないようね、先生。"
2004002-107 = "私はいま先生を脅迫しているのよ？"
2004002-112 = "この大きな弱点を……先生の秘密を、いつでも全世界に暴露できるのよ？"
2004002-113 = "[s] \"多分大丈夫だと思うよ……。\""
2004002-118 = "ふぅん、これにも屈しないなんて……ふふっ。"
2004002-119 = "どうしてそこまで平然としていられるのか分からないけど……仕方ないわ。"
2004002-120 = "弱点で脅すのはやめましょう。"
2004002-121 = "でも、まだ諦めたわけじゃないのよ？"
2004002-122 = "先生の協力を得るためなら、もっとすごいやり方を用意してやるんだから。"
2004002-123 = "それじゃ、私はこれで失礼するわ。"
2004002-124 = "[s] \"あ、うん……気をつけてね……。\""
2004002-127 = "うふふっ、次は今日みたいにはいかないわよ？"
2004002-132 = "[ns] \"……なんだかすごく誤解されてるような……。\""
