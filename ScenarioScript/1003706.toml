[translation]
1003706-1 = "保安委員長の誤解"
1003706-2 = "レッドウィンター連邦学園・第8地区郊外"
1003706-3 = "お前たち、こんなことをして無事で済むとでも思っているのか！"
1003706-4 = "事務局に帰ったら、粛清は免れんぞ！"
1003706-5 = "うるさい、黙れ！"
1003706-6 = "良いからおとなしくしていろ！！"
1003706-7 = "くっ、学生証を置いてきてしまったばっかりに……。"
1003706-8 = "[s] \"……これ、何があったの？\""
1003706-9 = "ん……？あんた、誰だ？"
1003706-10 = "こんな辺鄙な場所にいるなんて、馬鹿かスパイのどっちかだ。"
1003706-11 = "身分を証明できるものを見せろ！さもなくば、お前もスパイとして逮捕する！"
1003706-12 = "[s] 身分証を見せる。"
1003706-13 = "これは……なっ、シャーレの先生！？つまりあの書記長が頻繁に口にしている「カムラッド」とは、あなたのことか……！？"
1003706-14 = "こ、これは失礼いたしました。こんな僻地ですので、情報などが出回るのも遅く……初めてお姿を拝見しました。"
1003706-15 = "先生のご活躍は「レッドベア」でよく知っています。お会いできて光栄です！"
1003706-16 = "[s1] \"あ、ありがとう。ところでこの状況は……\"\n[s2] \"どうしてマリナは拘束されてるの？\""
1003706-17 = "ああ、この自称「保安委員長」のスパイですか。"
1003706-18 = "ああ、この自称「保安委員長」のスパイですか。"
1003706-19 = "このバカなスパイは、身分証も無いままに制限区域に立ち入ろうとしたのです。"
1003706-20 = "その上、図々しくも「自分は保安委員長だ」と名乗り……"
1003706-21 = "私は本当に保安委員長だ！どうして信じない！"
1003706-22 = "黙れ、このスパイめ！お前が保安委員長なわけがないだろう！？"
1003706-23 = "「レッドベア」の記事で、「マリナ保安委員長はやや背が低いものの、恐ろしいまでのオーラを纏っており、どんな猛獣も近づけないほどの豪傑」だと書かれていたんだぞ！"
1003706-24 = "「散歩中に道に迷った」と言い、さらには猫に追われて走っていくようなバカが保安委員長だなんて、あり得てたまるか！"
1003706-25 = "そ、それは……。"
1003706-26 = "「保安委員長」といえばチェリノ会長の身辺を警護する代表格、会長の一挙手一投足を管理する重役だというのに……"
1003706-27 = "なのにお前は、チェリノ会長の身長すら答えに窮した！"
1003706-28 = "お前のようなバカがマリナ様を名乗るだなんて、図々しいにもほどがある！"
1003706-29 = "本物のマリナ保安委員長は、お前よりもっともっと偉大な方なのだから！"
1003706-30 = "……。"
1003706-31 = "[s] \"えっと、それがその……\""
1003706-32 = "……先生、良いんだ。"
1003706-33 = "何だか情報が錯綜しているようだが……このような僻地でも一生懸命に働いている、この保安委員たちの夢を壊すことはできない……。"
1003706-34 = "だから今は、知らないふりをしてくれ。頼む……！"
1003706-36 = "（その後、上手い具合に保安委員を説得し、どうにかマリナを解放してもらった。）"
1003706-38 = "くぅっ、何という醜態を……。"
1003706-39 = "あの保安委員たちは、あんなにも委員長である私を信頼してくれていたのに、肝心の私はこの有様……しかも最終的には先生に助けてもらって……。"
1003706-40 = "私にはもうこれ以上、保安委員長を続ける資格は無い。"
1003706-41 = "事務局に帰って、すぐにでもチェリノ会長に辞表を……"
1003706-42 = "[s3] \"その必要は無いんじゃないかな。\"\n[s4] \"マリナはちゃんと、立派な保安委員長だよ。\""
1003706-43 = "……どうしてだ？"
1003706-44 = "……どうしてだ？"
1003706-45 = "私は野良猫にも勝てないし、すぐ道に迷う。チェリノ会長のプロフィールにすら自信が無い。そんな至らないところだらけの保安委員長なのに……。"
1003706-46 = "こんな私でも、まだ保安委員長を名乗っても良いのか……？"
1003706-47 = "[s] \"それは、えっと……。\""
1003706-48 = "そこで詰まるな！！"
1003706-49 = "応援してくれるなら、最後までちゃんとやれ！せめて私の良いところのひとつやふたつ挙げてみろ！"
1003706-50 = "[s5] \"マリナは、人の気持ちとか話を大事にしてくれる！\"\n[s6] \"マリナはトイレ掃除が上手だから！\""
1003706-51 = "……それが保安委員長の仕事と、どう関係があるんだ？"
1003706-52 = "部下たちの言うことをしっかり聞いて信じてくれるから、保安委員たちも安心して動ける……？"
1003706-53 = "確かに……保安委員たちはクーデターを起こす時も全く文句を言わず、私を信じてついてきてくれた……。"
1003706-54 = "……それが保安委員長の仕事と、どう関係があるんだ？"
1003706-55 = "どんな意味でも生徒の安全を守るのは、れっきとした保安委員会の活動……？"
1003706-56 = "なるほど……確かに私の知る限り、レッドウィンター連邦学園では衛生面での事故はほぼ起きていない。"
1003706-57 = "……ふっ、仕方がないな。先生がそう言うなら、今一度思いとどまってみるとしよう。"
1003706-58 = "しっかりと後任を務めてくれそうな後輩も、まだいないことだし……猿だって一度は木から落ちると言うからな！"
1003706-59 = "これから素晴らしい功績を上げ続けることで、今日の汚名を返上してみせる！"
1003706-61 = "（その後、足取りの軽いマリナと一緒に事務局へと戻った。）"
1003706-62 = "（しかしその帰り道も、マリナの自信満々な勘違いで再び道に迷ってしまった……。）"
