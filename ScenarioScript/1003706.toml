[translation]
1003706-1 = "O mal-entendido da Chefe do Comitê de Segurança"
1003706-2 = "Academia Red Winter, Subúrbios do 8º Distrito"
1003706-3 = "Vocês, acham mesmo que vão sair ilesos depois de fazerem isso?!"
1003706-4 = "Quando voltarmos para a secretaria, não escaparão de um expurgo!"
1003706-5 = "Cala a boca, silêncio!"
1003706-6 = "Fique quieta e comporte-se!!"
1003706-7 = "Droga, logo agora que eu esqueci minha carteira de estudante..."
1003706-8 = "[s] \"...O que aconteceu aqui?\""
1003706-9 = "Hm...? Quem é você?"
1003706-10 = "Estar em um lugar tão remoto assim... ou você é um idiota ou um espião."
1003706-11 = "Mostre algo que comprove sua identidade! Caso contrário, vou te prender como espião também!"
1003706-12 = "[s] Mostrar a identificação."
1003706-13 = "Isso é... Espera, o Sensei do Schale!? Então, o \"Camarada\" que a Secretária-Geral menciona com tanta frequência é você...!?"
1003706-14 = "P-peço perdão pela indelicadeza. Como estamos em um lugar tão isolado, as informações demoram a chegar... É a primeira vez que vejo o senhor."
1003706-15 = "O trabalho do Sensei é muito conhecido no \"Red Bear\". É uma honra conhecê-lo!"
1003706-16 = "[s1] \"Ah, obrigado. Mas, o que está acontecendo aqui...\"\n[s2] \"Por que a Marina está sendo mantida presa?\""
1003706-17 = "Ah, você quer dizer essa espiã que se autointitula \"Chefe do Comitê de Segurança\"?"
1003706-18 = "Ah, você quer dizer essa espiã que se autointitula \"Chefe do Comitê de Segurança\"?"
1003706-19 = "Essa espiã idiota tentou entrar em uma área restrita sem nem ter uma identificação."
1003706-20 = "Além disso, teve a audácia de dizer que \"ela mesma é a Chefe do Comitê de Segurança\"..."
1003706-21 = "Eu sou a verdadeira Chefe do Comitê de Segurança! Por que não acreditam em mim?!"
1003706-22 = "Cala a boca, sua espiã! Não tem como você ser a Chefe do Comitê de Segurança, tem?!"
1003706-23 = "O artigo do \"Red Bear\" diz que: \"A Chefe do Comitê de Segurança, Marina, embora um pouco baixa, emana uma aura aterrorizante e é uma heroína tão formidável que nenhuma fera selvagem ousa se aproximar\"!"
1003706-24 = "Uma idiota que diz que \"se perdeu durante um passeio\" e que sai correndo porque foi perseguida por um gato não pode ser a Chefe do Comitê de Segurança!"
1003706-25 = "I-isso é..."
1003706-26 = "A \"Chefe do Comitê de Segurança\" é a figura principal que protege a Presidente Cherino, uma executiva que gerencia cada passo da Presidente..."
1003706-27 = "E mesmo assim, você não conseguiu nem responder qual é a altura da Presidente Cherino!"
1003706-28 = "Ter a audácia de uma idiota como você se passar pela Marina-sama é o fim da picada!"
1003706-29 = "A verdadeira Chefe do Comitê de Segurança, Marina, é uma pessoa muito, muito mais grandiosa que você!"
1003706-30 = "..."
1003706-31 = "[s] \"Bem, é que...\""
1003706-32 = "...Sensei, está tudo bem."
1003706-33 = "Parece que as informações estão confusas, mas... não posso destruir o sonho dessas integrantes do Comitê de Segurança que trabalham tão duro, mesmo em um lugar tão remoto como este..."
1003706-34 = "Por isso, finja que não sabe de nada agora. Por favor...!"
1003706-36 = "(Depois disso, convenci as integrantes do Comitê de Segurança habilmente e consegui que libertassem a Marina.)"
1003706-38 = "Droga, que vexame..."
1003706-39 = "Aquelas integrantes do Comitê de Segurança confiavam tanto em mim como Chefe, e eu, a principal interessada, acabei assim... E, no fim, ainda precisei ser salva pelo Sensei..."
1003706-40 = "Não tenho mais qualificações para continuar como Chefe do Comitê de Segurança."
1003706-41 = "Vou voltar para a secretaria e entregar minha carta de demissão para a Presidente Cherino imediatamente..."
1003706-42 = "[s3] \"Não acho que precise fazer isso.\"\n[s4] \"Marina, você é uma ótima Chefe do Comitê de Segurança.\""
1003706-43 = "...Por que diz isso?"
1003706-44 = "...Por que diz isso?"
1003706-45 = "Eu não consigo nem vencer um gato de rua e sempre me perco. Nem tenho confiança no perfil da Presidente Cherino. Sou uma Chefe do Comitê de Segurança cheia de falhas..."
1003706-46 = "Mesmo sendo assim, ainda posso me intitular Chefe do Comitê de Segurança...?"
1003706-47 = "[s] \"Bem, é que...\""
1003706-48 = "Não hesite agora!!"
1003706-49 = "Se vai me apoiar, faça isso até o fim! Pelo menos cite uma ou duas qualidades minhas!"
1003706-50 = "[s5] \"A Marina valoriza os sentimentos e as conversas das pessoas!\"\n[s6] \"A Marina é ótima em limpar o banheiro!\""
1003706-51 = "...Como isso se relaciona com o trabalho de uma Chefe do Comitê de Segurança?"
1003706-52 = "Como você ouve e acredita no que suas subordinadas dizem, as integrantes do Comitê de Segurança podem agir com tranquilidade...?"
1003706-53 = "De fato... os membros do Comitê de Segurança não reclamaram de nada quando iniciamos o golpe e confiaram em mim para me seguir..."
1003706-54 = "...Como isso se relaciona com o trabalho de uma Chefe do Comitê de Segurança?"
1003706-55 = "Proteger a segurança dos alunos, independentemente do sentido, é uma atividade legítima do Comitê de Segurança...?"
1003706-56 = "Entendo... De fato, até onde eu sei, quase não ocorreram acidentes relacionados à higiene na Academia Federal Red Winter."
1003706-57 = "...Hmph, não tem jeito. Se o Sensei diz isso, vou reconsiderar mais uma vez."
1003706-58 = "Ainda não tenho nenhum subordinado que pareça capaz de assumir o meu lugar... e dizem que até os macacos caem das árvores de vez em quando!"
1003706-59 = "Vou limpar o meu nome de hoje em diante, alcançando feitos ainda mais grandiosos!"
1003706-61 = "(Depois disso, voltei para a secretaria junto com Marina, que caminhava com passos leves.)"
1003706-62 = "(No entanto, no caminho de volta, nos perdemos novamente por causa da confiança equivocada da Marina...)"
