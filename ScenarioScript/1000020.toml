[translation]
1000020-1 = "Precioso"
1000020-2 = "（E assim, o restaurante para o qual Aru me chamou parecia ser bastante luxuoso）"
1000020-4 = "[ns] \"Err... é aqui mesmo?\""
1000020-5 = "Sim, não há erro algum."
1000020-6 = "Se você se intimidar com algo desse nível, não conseguirá servir como nosso consultor de gestão, sabia?"
1000020-7 = "Vamos, Sensei, não se preocupe com nada e estufe o peito."
1000020-8 = "[s] \"Se eu sou um consultor de gestão, não deveria justamente me preocupar com esse tipo de coisa...?\""
1000020-9 = "E-entendo!?"
1000020-10 = "Como consultor de gestão, você estava preocupado com a saúde financeira da organização..."
1000020-11 = "......Não é isso!"
1000020-12 = "De qualquer forma, hoje está tudo bem!"
1000020-13 = "[s] \"Tudo bem... em que sentido?\""
1000020-14 = "Significa que você não precisa se preocupar com dinheiro."
1000020-15 = "Porque acabamos de concluir um grande pedido e recebemos uma recompensa generosa♪"
1000020-16 = "[s] \"Oh, isso é incrível.\""
1000020-17 = "Isso também é graças a você, Sensei."
1000020-18 = "Aquele conselho preciso que você me deu naquela época..."
1000020-19 = "A perspectiva de um adulto sobre como conduzir a organização... fiquei impressionada."
1000020-20 = "Como esperado do futuro consultor de gestão da nossa Problem Solver 68!"
1000020-21 = "[s1] \"Ah, não foi para tanto.\"\n[s2] \"S-será que eu disse algo tão incrível assim...?\""
1000020-22 = "Bem, é basicamente isso..."
1000020-23 = "Bem, é basicamente isso..."
1000020-24 = "Hoje é por minha conta, então pode comer à vontade!"
1000020-25 = "[s] \"Bom, então vou aceitar com prazer.\""
1000020-27 = "（E assim, aproveitei uma refeição deliciosa junto com a Aru）"
1000020-35 = "……E então, assim que nós da Problem Solver chegamos ao local, demos de cara com a organização do mercado negro de que tanto falavam."
1000020-36 = "[s] \"E, e então……!?\""
1000020-37 = "Fufufu... Quem você acha que eu sou, Sensei? Eu sou Rikuhachima Aru... a presidente da Problem Solver e uma verdadeira fora da lei."
1000020-38 = "Eu olhei para eles e disse exatamente isso."
1000020-39 = "“Não tenho nada contra vocês... mas o azar foi terem cruzado o nosso caminho.”"
1000020-40 = "“É melhor se arrependerem de ter nos encontrado quando estiverem no inferno!”……foi o que eu disse!"
1000020-41 = "[s] \"Isso foi muito hard-boiled……!\""
1000020-42 = "Não é? Você também acha, né!?"
1000020-43 = "É uma das 10 frases mais hard-boiled que eu sempre quis dizer♪"
1000020-44 = "Fufu, fufufufufu...!"
1000020-45 = "Ah, olha só que horas já são..."
1000020-46 = "Bem, acho que está na hora de irmos embora, não é?"
1000020-47 = "Hmm, mas a história estava chegando na melhor parte..."
1000020-48 = "[s] \"Realmente, foi interrompida bem na parte mais interessante.\""
1000020-49 = "N-não é?"
1000020-50 = "Se não se importar, que tal voltarmos ao escritório da Problem Solver 68 para ouvir o resto?"
1000020-51 = "Ótimo, decidido! Já que está decidido, não podemos perder tempo!"
1000020-53 = "Ah, aqui está, cliente. Estava do seu agrado?"
1000020-54 = "Sim, estava maravilhoso. A ponto de eu querer voltar com certeza."
1000020-55 = "Ora, ora, muito obrigado! Então, peço desculpas, mas a conta..."
1000020-56 = "Fufu."
1000020-60 = "……."
1000020-64 = "……."
1000020-68 = "…………！"
1000020-69 = "……Cliente?"
