[translation]
1000020-1 = "大切な"
1000020-2 = "（そうしてアルに呼ばれたレストランは、かなり高級そうなところだった）"
1000020-4 = "[ns] \"えっと……ここで合ってる？\""
1000020-5 = "ええ、何の間違いでもないわ。"
1000020-6 = "これくらいで怖気づいたら、うちの経営顧問は務まらないわよ？"
1000020-7 = "さあ先生、何も気にせず胸を張りなさい。"
1000020-8 = "[s] \"経営顧問なら、こういうことこそ気にするべきなんじゃ……？\""
1000020-9 = "な、なるほど！？"
1000020-10 = "経営顧問として、健全な財政状況を気にしていただなんて……。"
1000020-11 = "……じゃなくて！"
1000020-12 = "とりあえず今日は大丈夫なの！"
1000020-13 = "[s] \"大丈夫……っていうのは？\""
1000020-14 = "お金の心配ならしなくて良い、ってことよ。"
1000020-15 = "何故なら、大きめの依頼を成功させてたんまりと報酬を頂いたばっかりだから♪"
1000020-16 = "[s] \"おお、それはすごい。\""
1000020-17 = "これもまた、先生のおかげよ。"
1000020-18 = "あの時貰った、的確なアドバイス……。"
1000020-19 = "組織をどのように導くべきかという大人の視点……感心したわ。"
1000020-20 = "流石は我が便利屋における、未来の経営顧問ね！"
1000020-21 = "[s1] \"いやあそれほどでも。\"\n[s2] \"そ、そこまですごいこと言ったかな……？\""
1000020-22 = "まあ、つまりそういうことで……"
1000020-23 = "まあ、つまりそういうことで……"
1000020-24 = "今日は私が奢るから、遠慮なく食べると良いわ！"
1000020-25 = "[s] \"じゃあ、ありがたく頂こうかな。\""
1000020-27 = "（そうしてアルと一緒に、美味しい食事を楽しんだ）"
1000020-35 = "……それでね、私たち便利屋が現場に到着するや否や、噂されていたブラックマーケットの組織と出くわしたの。"
1000020-36 = "[s] \"そ、それで……！？\""
1000020-37 = "ふふふっ……私を誰だと思ってるの、先生？私は[ruby=りくはちま]陸八魔[/ruby]アル……便利屋の社長であり、真のアウトローよ。"
1000020-38 = "やつらに向かって、こう言ってやったわ。"
1000020-39 = "「あなた達に恨みは無いわ……ただ、私たちと出くわしたことが運の尽き」"
1000020-40 = "「こうして出会ったことを、地獄で後悔すると良いわ！」……ってね！"
1000020-41 = "[s] \"ハードボイルドだ……！\""
1000020-42 = "そうよね！そう思うわよね！？"
1000020-43 = "「一度は言ってみたいハードボイルドなセリフ」トップ10のひとつだもの♪"
1000020-44 = "ふふっ、ふふふふふっ……！"
1000020-45 = "あ、いつの間にもうこんな時間ね……。"
1000020-46 = "じゃあ、そろそろ帰るとしましょうか？"
1000020-47 = "うーん、ここからが良いところだったのに……。"
1000020-48 = "[s] \"たしかに、気になるところで中断になっちゃったね。\""
1000020-49 = "そ、そうよね？"
1000020-50 = "良ければその、便利屋の事務所に戻って続きを聞くのはどうかしら？"
1000020-51 = "よし、決まりね！そうと決まれば、悪は急げよ！"
1000020-53 = "ああ、これはお客様。お口に合いましたでしょうか？"
1000020-54 = "ええ、素晴らしかったわ。またぜひ来たいと思うくらいにはね。"
1000020-55 = "それはそれは、ありがとうございます！ではすみませんが、お会計を……"
1000020-56 = "ふふっ。"
1000020-60 = "……。"
1000020-64 = "……。"
1000020-68 = "…………！"
