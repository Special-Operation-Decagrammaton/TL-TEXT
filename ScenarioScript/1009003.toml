[translation]
1009003-1 = "Relembrando as memórias do festival"

1009003-4 = "Uau, professora!"

1009003-5 = "Bem vindo ao Hyakuyado~#nO que você gostaria de pedir?"

1009003-6 = "Recomendamos anmitsu de morango, yatsuhashi, dorayaki, manju e daifuku..."

1009003-7 = "Matcha é minha bebida favorita!"

1009003-8 = "[s1] \"Então...aquele que não é tão fofo!\"\n[s2] \"Então...o mais fofo!\""

1009003-11 = "sim! Seu pedido foi aceito! por favor espere um momento!"

1009003-20 = "[ns] \"Não há clientes hoje...?\""

1009003-21 = "Concordo. Às vezes há dias como este em que não temos muitos clientes."

1009003-22 = "Às vezes... uma ou duas vezes por semana?"

1009003-23 = "Mesmo nesses tempos, estamos prontos para receber os clientes a qualquer hora! #nNão vou fazer pausa...!"

1009003-24 = "...Eh? O professor vai permitir, então vamos fazer uma pausa juntos...?"

1009003-28 = "Pois bem, professor. Com licença, ok...?"

1009003-35 = "Suspiro...me sinto calmo quando sento... #nMinhas pernas também estavam cansadas, então..."

1009003-36 = "[s] \"Sim, isso mesmo.\""

1009003-37 = "A professora é gentil... sempre atenciosa..."

1009003-38 = "...Na verdade, três dias depois, houve um festival de marimo no lago. #nDepois que o Hyakuyado estiver aberto, também estamos nos preparando para o festival."

1009003-39 = "Além disso, tenho aulas e tenho que estudar para a prova..."

1009003-40 = "[s3] \"Ela está ocupada se preparando para o festival com Hyakuyado, mas também está estudando para a prova...\"\n[s4] \"Umika é uma trabalhadora...Sensei, isso está me fazendo chorar.\""

1009003-43 = "Não, não...! #nEstudar é dever do aluno, e é natural."

1009003-44 = "Ei, professora...? Isso é um exagero! ?"

1009003-48 = "Ah, por favor, não chore...! professor!"

1009003-54 = "[ns] \"Os preparativos para o festival estão indo bem?\""

1009003-55 = "Sim, tudo está indo bem."

1009003-56 = "Ehehe... Porém, ainda há muito trabalho a fazer."

1009003-57 = "Mas, incluindo este período de preparação, ainda é um festival!"

1009003-58 = "foto……? Por que você gosta tanto de festivais?"

1009003-59 = "Hehe, isso certamente pode parecer estranho."

1009003-65 = "...Quando participo de festivais, lembro do passado."

1009003-66 = "Quando eu era jovem, morei no campo."

1009003-67 = "O ar estava limpo e o lugar era tranquilo... #nÀs vezes, todos os dias pareciam um pouco chatos."

1009003-68 = "Mesmo que seja calmo e relaxante, às vezes... #n As crianças querem algum tipo de entretenimento, certo?"

1009003-69 = "[s] \"Até os adultos adoram se divertir!\""

1009003-70 = "E-eu vejo...?"

1009003-74 = "De qualquer forma, para as crianças do campo, o festival anual era o mais divertido."

1009003-75 = "Todos na comunidade local compareceram e começaram os preparativos com um mês de antecedência. #nPrepare bambu e papel para o festival, pinte e faça um mikoshi..."

1009003-76 = "Antes que eu percebesse, me tornei uma criança que trabalhou mais do que qualquer outra pessoa para se preparar para o festival. #nMesmo agora, não consigo esquecer a diversão que tive naquela época..."

1009003-77 = "Vim para Hyakki Yako e aprendi muitas coisas... #nHá muitas coisas que mudaram dentro de mim..."

1009003-78 = "Porém, a sensação de que adoro festivais nunca mudou."

1009003-79 = "Além disso, você pode ouvir informações sobre festivais de todos os Kivotos aqui, e é fácil visitar o festival de seu interesse!"

1009003-80 = "É difícil planejar e se preparar para um festival... #nHá tantas coisas que preciso aprender no Hyakuyado..."

1009003-81 = "Afinal, quando ouço a palavra “festival”, fico emocionado como quando era criança!"

1009003-82 = "Por causa disso, me disseram que não consigo ler a atmosfera ou que isso estraga a atmosfera..."

1009003-83 = "[s] \"Acho que você não precisa se preocupar.\""

1009003-87 = "E-É mesmo...?"

1009003-88 = "[s] \"Sim. Não estou incomodando ninguém.\""

1009003-89 = "Mas eu... eu mesmo sei disso. #nNão consigo ver o que está ao meu redor ou me mover sem pensar..."

1009003-90 = "[s5] \"É bom poder mergulhar em alguma coisa.\"\n[s6] \"Do meu ponto de vista, estou com ciúmes.\""

1009003-97 = "...É assim mesmo?"

1009003-98 = "Quando minha professora me contou isso, me senti mais confiante...!"

1009003-99 = "Ehehe, obrigado, professor. #nDepois de ouvir sua história, me senti um pouco melhor."

1009003-100 = "Bem... agora que tive uma folga, tenho que dar o meu melhor no trabalho do Hyakuyado!"

1009003-105 = "...No entanto, não há outros clientes além do professor."

1009003-112 = "Olá. #nTem mais recomendações para hoje?"

1009003-114 = "Ei, você é um cliente! #n-sensei...com licença por um momento!"

1009003-118 = "Bem-vindo! Nós o guiaremos até seu assento!"

1009003-122 = "(Hyakuyado está mais uma vez lotado de clientes)"

1009003-123 = "(Depois de acenar para a ocupada Umika e pagar a conta, ela voltou para a placa de Petri.)"

