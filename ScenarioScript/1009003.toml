1009003-81 = "Ainda fico empolgado quando ouço a palavra "festival", como quando eu era criança!"

1009003-82 = "Por causa disso, às vezes me dizem que não consigo ler o ar ou que estrago a atmosfera. ......#n Às vezes me dizem muitas coisas. ......"

