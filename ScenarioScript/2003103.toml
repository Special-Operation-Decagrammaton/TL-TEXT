[translation]
2003103-1 = "Às vezes, é preciso levar a sério"
2003103-2 = "（Junto com Shigure, visitei um banho público em uma vila um pouco afastada do antigo prédio escolar.）"
2003103-6 = "Ah... que banho maravilhoso."
2003103-7 = "Já vim por aqui algumas vezes para trocar animais que cacei por itens do dia a dia, mas nunca imaginei que houvesse uma casa de banho por aqui."
2003103-8 = "Obrigada por me convidar, Sensei. E ainda por cima pagar pelo banho para mim."
2003103-9 = "Mas... eu disse que o rio já bastava."
2003103-10 = "Você não está se preocupando demais com o que aconteceu antes?"
2003103-11 = "[s1] \"Seja qual for o motivo, fui eu quem te fez limpar.\"\n[s2] \"Não posso deixar que uma aluna pegue um resfriado.\""
2003103-14 = "……Você é um adulto realmente gentil, Sensei."
2003103-15 = "Obrigada novamente, Sensei. Graças a você, pude tomar um banho quente depois de tanto tempo."
2003103-16 = "Bem, já que terminamos de nos lavar, vamos voltar para o antigo prédio escolar?"
2003103-17 = "[s] \"Já que viemos até aqui, por que não relaxamos um pouco mais?\""
2003103-18 = "Neste banho público? Bem, por mim tudo bem, mas..."
2003103-23 = "……Hm? Isso aqui, por acaso, é leite com frutas? Fico feliz em ver algo assim em um lugar como este."
2003103-24 = "Você se lembra, Sensei? Aquele leite com frutas que eu fazia e vendia junto com os pães de onsen como lembrança da \"Estância Termal 227\"."
2003103-25 = "Não é por nada, mas era bem popular. Até hoje, às vezes, chegam pedidos no antigo prédio escolar perguntando se sobrou algum leite com frutas."
2003103-26 = "Bom, o leite com frutas vendido aqui parece ser industrializado, mas――"
2003103-31 = "A-ah, com licença... você não é a pessoa que trabalhava na \"Estância Termal 227\"...?"
2003103-32 = "……Ué? Você me conhece?"
2003103-33 = "Com certeza! Naquela época, quando ouvi dizer que uma grande estância termal tinha sido construída no terreno do antigo prédio escolar, eu fui lá visitar!"
2003103-34 = "A popularidade da \"Estância Termal 227\" era incrível. Tanto que o número de clientes deste banho público caiu pela metade..."
2003103-35 = "Ahaha... sinto muito por isso."
2003103-36 = "Não, não, por favor, não se preocupe. É que, se você trabalhava naquela estância, eu gostaria de lhe perguntar uma coisa."
2003103-37 = "De qual marca era o leite com frutas que vocês vendiam lá? Era tão delicioso que ficou marcado na minha memória..."
2003103-38 = "Procurei em todos os lugares, mas nenhuma loja vendia... Se não for pedir muito, poderia me dizer onde conseguir?"
2003103-39 = "Ah, aquele leite com frutas não é vendido em nenhum outro lugar. É uma receita minha."
2003103-40 = "Mas, se tivermos os ingredientes, posso fazer agora mesmo..."
2003103-41 = "Quer que eu prepare um pouco?"
2003103-42 = "Por favor, eu adoraria! Sinta-se à vontade para usar a cozinha!"
2003103-46 = "[ns3] \"Shigure. Só por precaução...\"\n[ns4] \"Não misture álcool, está bem?\""
2003103-49 = "Que isso, Sensei. Mesmo eu não misturaria álcool no leite com frutas."
2003103-50 = "Mas talvez eu misture algo fermentado...?"
2003103-51 = "[s] \"Tenho um mau pressentimento...\""
2003103-52 = "Vamos ver... Temos leite, açúcar e várias frutas..."
2003103-53 = "Certo, os ingredientes são suficientes. Então, vou me esforçar um pouco, ok?"
2003103-62 = "Pronto, terminei. Este é o \"Leite com Frutas Especial da Shigure\"."
2003103-63 = "Fiz bastante, então tome um copo também, Sensei."
2003103-67 = "É este! O sabor do leite com frutas que bebi naquela estância!"
2003103-68 = "Mas, como você conseguiu esse dulçor rico e sofisticado...?"
2003103-69 = "Ao fazer bebidas, é importante não economizar nos ingredientes, mas o equilíbrio é ainda mais importante."
2003103-70 = "O leite com frutas é uma bebida que precisa valorizar tanto a doçura das frutas quanto a suavidade do leite, então o equilíbrio do sabor pode ser arruinado dependendo da quantidade de fruta usada."
2003103-71 = "Além disso, em vez de triturar todas as frutas, é melhor cortar algumas e misturá-las. Assim, o sabor fica mais estável e você também pode aproveitar a textura."
2003103-72 = "E então, se você adicionar um pouco daquela conserva de frutas especial que uso para fazer compotas... o \"Leite com Frutas Especial da Shigure\" está pronto."
2003103-73 = "[s] \"Então aquele 'algo fermentado' era a conserva de frutas.\""
2003103-74 = "Isso mesmo. Como a doçura é mais suave que a do açúcar, ela se mistura melhor à bebida."
2003103-75 = "Como em tudo na vida, quanto mais tempo e esforço você dedica, mais delicioso fica."
2003103-79 = "Desculpe-me pela ousadia, mas..."
2003103-80 = "Você poderia me ensinar a receita dessa conserva de frutas especial que usou no leite?"
2003103-81 = "……A receita da conserva de frutas especial?"
2003103-82 = "Sim. Como pode ver, este banho público fica longe da cidade e as instalações não são nada luxuosas, então quase ninguém vem nos visitar..."
2003103-83 = "Mas, com um leite com frutas tão delicioso quanto este,#nnão há dúvidas de que o número de clientes vai aumentar!"
2003103-84 = "Hmm, eu até poderia te ensinar, mas..."
2003103-85 = "Em troca, tenho uma condição."
2003103-86 = "D-dinheiro?#nNão tem jeito. Devido às circunstâncias, não posso pagar muito, mas..."
2003103-87 = "Não, não é nada disso..."
2003103-88 = "Este banho público não fica tão longe do meu antigo prédio escolar, sabe?"
2003103-89 = "Então, durante o inverno, você poderia deixar que as alunas do antigo prédio escolar usassem este banho público, nem que seja de vez em quando?"
2003103-90 = "No verão é tranquilo, mas no inverno, tem muitas garotas que sofrem para se lavar."
2003103-91 = "Se for só isso, não há problema algum!#nSe a senhorita nos fornecer a receita,#npode usar nossas instalações o quanto quiser!"
2003103-92 = "Fufu, negócio fechado então."
2003103-93 = "Então, quer que eu te ensine a receita da conserva de açúcar agora mesmo?"
2003103-94 = "É melhor se preparar logo.#nQuanto mais tempo fermentar, mesmo que seja por um minuto ou um segundo, mais profundo será o sabor."
2003103-96 = "(Depois disso, ajudei a Shigure no trabalho de preparar a conserva de açúcar para o leite com frutas)"
