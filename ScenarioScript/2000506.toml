[translation]
2000506-1 = "夏限定のペロロ様グッズ"
2000506-2 = "海の家"
2000506-3 = "（ヒフミと二人で、色々と美味しいものを食べた）"
2000506-4 = "お腹いっぱいです～。"
2000506-5 = "見た目は普通の焼きそばだったのですが、普段のよりもすっごく美味しかったです……！"
2000506-6 = "このお店のソースは、普通のとは違うのでしょうか？"
2000506-7 = "[s] \"海で食べるのって美味しく感じるよね。お祭りと一緒で。\""
2000506-8 = "確かに、楽しい気分のおかげで、ますます美味しく感じられるのかもしれません。"
2000506-9 = "こういう風物詩は、どれも本当に美味しくて大好きです！"
2000506-10 = "さて、この後どうしましょう？"
2000506-11 = "何か甘いデザートとか……。"
2000506-12 = "そこのお嬢さん！食後のデザートなら、「ゴリゴリ君」のアイスはいかがですか？"
2000506-13 = "今この「ゴリゴリ君」を買うと、モモフレンズの人気キャラクター「ペロロ」のぬいぐるみが貰えるかもしれませんよ！"
2000506-14 = "ぺ、ペロロ様のぬいぐるみですか！？"
2000506-15 = "しかも、限定デザイン……！これはぜひとも手に入れなくちゃです！"
2000506-16 = "[s] \"相変わらず、すごいデザインだね……。\""
2000506-17 = "こういうコラボ商品はいつでも手に入るものではないので、一部のマニアにとっては下手をすると、普通のグッズより価値があったりもするんです……！"
2000506-19 = "先生、デザートはこのアイスにしましょう！"
2000506-20 = "[s1] \"うん、美味しそうだしね。\"\n[s2] \"じゃあ、二つで。\""
2000506-21 = "「ゴリゴリ君」ソーダ味、二つお願いします！"
2000506-22 = "「ゴリゴリ君」ソーダ味、二つお願いします！"
2000506-23 = "はい、ありがとうございます！"
2000506-26 = "う～ん……！冷たくて甘くて、美味しいです！"
2000506-27 = "夏の海辺で食べるアイスはまた格別ですね。"
2000506-28 = "えっと、抽選はこの、アイスの棒に書かれてる文字で決まるのでしょうか……？"
2000506-31 = "おめでとうございます！特別賞なので、「ゴリゴリ君」がさらに追加で貰えます！"
2000506-32 = "え？も、もう一本もらえるんですか……？"
2000506-33 = "はい。今回の抽選では「はずれ」は無く、50％ずつの確率で「ペロロのぬいぐるみ」か「ゴリゴリ君もう一本」が貰えるんです。"
2000506-34 = "もちろん、追加のゴリゴリ君にも当たり棒が入ってますので、どうぞこちらで食べていってください！"
2000506-35 = "なるほど……では、もう一度挑戦しましょう。"
2000506-37 = "先生は、まだ食べられそうですか……？"
2000506-38 = "[s] \"まだ大丈夫、だと思う……。\""
2000506-41 = "では、今度こそ……！"
2000506-44 = "……しかしその後も、なかなかペロロのぬいぐるみは当たらなかった。"
2000506-46 = "お、おめでとうございます！特別賞なので、「ゴリゴリ君」が追加で……。"
2000506-47 = "どうして……もう10個目なのに……どうして当たらないんでしょう……。"
2000506-48 = "そろそろ食べ過ぎて、頭がズキズキしてきました……。"
2000506-49 = "[s3] \"私も頭が痛い……。\"\n[s4] \"お腹が冷えてきた……。\""
2000506-50 = "お、おかしいですね。基本的に半々の確率で、他の方も今までこんなに当たらないことはなかったのですが……。"
2000506-51 = "お、おかしいですね。基本的に半々の確率で、他の方も今までこんなに当たらないことはなかったのですが……。"
2000506-53 = "（こそこそ）えっと、お客様……もしよろしければ私がペロロのぬいぐるみを裏でもらってきますので、そろそろお止めになった方が……。"
2000506-54 = "それはありがたいですが……ダメです！ここで折れてはペロロ様が悲しんでしまいます！"
2000506-55 = "正々堂々と戦わないと……ペロロ様に顔向けできません！"
2000506-57 = "先生、もう少し行けますか……？"
2000506-58 = "[s] \"……ガンバリマス。\""
2000506-59 = "……。"
2000506-61 = "次こそ……！"
2000506-65 = "お、おめでとうございます！限定コラボ版のペロロのぬいぐるみ、ついに当選です……！"
2000506-66 = "や、やりました……！"
2000506-67 = "先生のおかげです、ありがとうございます……！えへへ、やったぁ……！"
2000506-68 = "……あ、あれ？なんだか視界がぐるんって……？"
2000506-72 = "おっ、お客様！？大丈夫ですか！？"
2000506-73 = "は、早く医務室に……！"
2000506-74 = "[s] \"すみません……私の生徒を、お願いします……。\""
2000506-79 = "あ、あれっ！？こっちも！？"
2000506-80 = "大丈夫ですか、お客様！お客様！？"
2000506-82 = "…………"
2000506-83 = "（その後しばらくお腹は痛かったけど、ヒフミがとっても嬉しそうな表情をしていたので何よりだった。）"
