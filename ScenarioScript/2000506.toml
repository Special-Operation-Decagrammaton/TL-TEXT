[translation]
2000506-1 = "Artigos do Peroro-sama de edição limitada de verão"
2000506-2 = "Quiosque de praia"
2000506-3 = "（Comi várias coisas deliciosas junto com a Hifumi）"
2000506-4 = "Estou cheia~."
2000506-5 = "Parecia um yakisoba comum, mas estava muito mais gostoso do que o de costume...!"
2000506-6 = "Será que o molho deste lugar é diferente do normal?"
2000506-7 = "[s] \"Comer na praia deixa tudo mais gostoso, né? É igual em festivais.\""
2000506-8 = "Com certeza, talvez seja porque o clima divertido faz com que tudo pareça ainda mais saboroso."
2000506-9 = "Eu adoro essas tradições sazonais, são todas realmente deliciosas!"
2000506-10 = "Bem, o que faremos agora?"
2000506-11 = "Talvez uma sobremesa doce..."
2000506-12 = "Ei, senhorita! Que tal um sorvete \"Gorigori-kun\" de sobremesa?"
2000506-13 = "Se comprar este \"Gorigori-kun\" agora, você pode ganhar um bicho de pelúcia do \"Peroro\", o personagem popular da Momo Friends!"
2000506-14 = "U-um bicho de pelúcia do Peroro-sama!?"
2000506-15 = "E ainda por cima, um design limitado...! Eu preciso conseguir isso de qualquer jeito!"
2000506-16 = "[s] \"Como sempre, um design impressionante...\""
2000506-17 = "Produtos de colaboração como este não são fáceis de encontrar, então, para alguns colecionadores, eles podem acabar valendo mais do que itens comuns...!"
2000506-19 = "Sensei, vamos escolher este sorvete como sobremesa!"
2000506-20 = "[s1] \"Certo, parece gostoso.\"\n[s2] \"Então, dois por favor.\""
2000506-21 = "Dois \"Gorigori-kun\" sabor soda, por favor!"
2000506-22 = "Dois \"Gorigori-kun\" sabor soda, por favor!"
2000506-23 = "Sim, muito obrigado!"
2000506-26 = "Hum...! É gelado, doce e delicioso!"
2000506-27 = "Sorvete na praia durante o verão é algo especial."
2000506-28 = "Bem, o sorteio é decidido pelo que está escrito no palito do sorvete...?"
2000506-31 = "Parabéns! Como é um prêmio especial, você ganha mais um \"Gorigori-kun\"!"
2000506-32 = "Hã? V-vou ganhar outro...?"
2000506-33 = "Sim. Neste sorteio não existe \"perdedor\", você tem 50% de chance de ganhar um \"bicho de pelúcia do Peroro\" ou \"outro Gorigori-kun\"."
2000506-34 = "Claro, o Gorigori-kun adicional também tem um palito premiado, então pode comer aqui mesmo!"
2000506-35 = "Entendo... então, vamos tentar mais uma vez."
2000506-37 = "Sensei, você ainda consegue comer...?"
2000506-38 = "[s] \"Acho que ainda aguento...\""
2000506-41 = "Então, desta vez vai dar certo...!"
2000506-44 = "......Mas, mesmo depois disso, o bicho de pelúcia do Peroro não aparecia."
2000506-46 = "P-parabéns! Como é um prêmio especial, você ganha mais um \"Gorigori-kun\"..."
2000506-47 = "Por que... já é o décimo... por que não consigo ganhar...?"
2000506-48 = "Já comi tanto que minha cabeça começou a latejar..."
2000506-49 = "[s3] \"Minha cabeça também dói...\"\n[s4] \"Meu estômago está gelado...\""
2000506-50 = "I-isso é estranho. Basicamente a chance é de 50/50, e nunca aconteceu de alguém não ganhar nada até agora..."
2000506-51 = "I-isso é estranho. Basicamente a chance é de 50/50, e nunca aconteceu de alguém não ganhar nada até agora..."
2000506-53 = "（Sussurrando）Bem, cliente... se quiser, eu posso pegar um bicho de pelúcia do Peroro nos fundos, então talvez seja melhor parar por aqui..."
2000506-54 = "Eu agradeço, mas... não! Se eu desistir agora, o Peroro-sama ficará triste!"
2000506-55 = "Tenho que lutar de forma justa... não conseguiria encarar o Peroro-sama se não o fizesse!"
2000506-57 = "Sensei, consegue aguentar mais um pouco...?"
2000506-58 = "[s] \"...Vou dar o meu melhor.\""
2000506-59 = "......"
2000506-61 = "Desta vez...!"
2000506-65 = "P-parabéns! Você finalmente ganhou o bicho de pelúcia do Peroro da edição limitada de colaboração...!"
2000506-66 = "N-nós conseguimos...!"
2000506-67 = "Foi graças ao Sensei, muito obrigada...! Ehehe, conseguimos...!"
2000506-68 = "……Ah, ué? Por que minha visão está girando assim…?"
2000506-72 = "C-cliente!? Você está bem!?"
2000506-73 = "R-rápido, levem para a enfermaria…!"
2000506-74 = "[s] \"Desculpe… por favor, cuide da minha aluna…\""
2000506-79 = "A-ah, ué!? Aqui também!?"
2000506-80 = "Você está bem, cliente!? Cliente!?"
2000506-82 = "…………"
2000506-83 = "(Depois disso, minha barriga doeu por um tempo, mas como a Hifumi estava com uma expressão tão feliz, valeu a pena.)"
