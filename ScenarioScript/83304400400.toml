[translation]
83304400400-6 = "Pode me contar sobre o que aconteceu com a Makoto? Ouvi dizer que ela foi hipnotizada..."
83304400400-7 = "............Ah, é verdade. A veterana Makoto acabou caindo facilmente na hipnose da veterana Satsuki."
83304400400-8 = "Por causa disso, a Ibuki acabou se machucando..."
83304400400-9 = "Sinceramente, o que ela tem na cabeça?!"
83304400400-10 = "Foi bom que a hipnose tenha passado, mas agora ela começou a fazer um escândalo querendo preparar um presente de desculpas para a Ibuki..."
83304400400-11 = "Se a Ibuki tivesse se machucado mais gravemente, o que ela pretendia fazer?! Francamente!"
83304400400-12 = "I-isso parece bem difícil..."
83304400400-13 = "......Bem, não é como se eu quisesse que você entendesse."
83304400400-14 = "Pensando bem, nós duas somos pessoas que vivem sendo arrastadas pela veterana Makoto..."
83304400400-15 = "......Nós duas temos nossos problemas, não é?"
83304400400-16 = "Não é para tanto... Eu só estou fazendo o que posso."
83304400400-17 = "......Sim. Bem, vamos deixar por isso mesmo então."
