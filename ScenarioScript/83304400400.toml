[translation]
83304400400-6 = "マコトの話を聞かせてもらえる？催眠にかかったって聞いたのだけど……"
83304400400-7 = "…………はぁ、そうです。マコト先輩は、サツキ先輩の催眠術にあっさりかかってしまいまして。"
83304400400-8 = "そのせいでイブキが怪我を……"
83304400400-9 = "本当に何を考えているんでしょう！"
83304400400-10 = "催眠が解けたのは良かったですが、今度はイブキに謝罪のプレゼントを用意しろと騒ぎ出しましたし……"
83304400400-11 = "もしイブキがもっと大きな怪我をしていたら、どうするつもりだったんですか！まったく！"
83304400400-12 = "た、大変そうね……"
83304400400-13 = "……まあ別に、分かってもらいたいわけではありませんが。"
83304400400-14 = "考えてみれば、私たちはマコト先輩に振り回される者同士……"
83304400400-15 = "……お互い苦労してますね。"
83304400400-16 = "そこまでじゃ……ただ、自分にできることをやるだけだから。"
83304400400-17 = "……はい。まあ、そういうことにしておきましょうか。"
