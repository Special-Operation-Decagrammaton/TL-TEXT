[translation]
2002502-1 = "Fazendo um Kadomatsu"
2002502-2 = "（Decidi visitar a Haruka para celebrar o Ano Novo）"
2002502-4 = "（……No entanto, acabei me perdendo por causa da neve）"
2002502-5 = "[ns] \"…………。\""
2002502-8 = "Hmm... será que algo assim serve...?"
2002502-9 = "……Não, deve ter algo um pouco melhor por aí……"
2002502-10 = "[s1] \"……A voz da Haruka?\"\n[s2] Vou na direção de onde o som veio."
2002502-18 = "Ugh... desse jeito não vai dar……"
2002502-19 = "E o tempo está acabando... o que eu faço……"
2002502-20 = "[s3] \"Olá, Haruka.\"\n[s4] \"Está procurando alguma coisa?\""
2002502-21 = "……？"
2002502-22 = "……？"
2002502-23 = "……Eh……？"
2002502-24 = "……！？！？ Se-se-se-se-Sensei！？"
2002502-25 = "Po-po-por que você está em um lugar como este……！？"
2002502-26 = "Se-será que eu mandei uma mensagem para o Sensei por engano de novo……！？"
2002502-27 = "……A-afinal, é isso mesmo, não é！？"
2002502-28 = "Desculpe, desculpe, desculpe, desculpe, desculpe, desculpe……"
2002502-29 = "――Vou pedir perdão com a minha morte！！"
2002502-30 = "……Eh? U-um cumprimento de Ano Novo……?"
2002502-31 = "I-isso não pode ser! Por que faria algo assim para alguém como eu……！？"
2002502-32 = "……？"
2002502-33 = "Ah, bem, agora……"
2002502-34 = "Eu estava procurando por bambu... para usar em um \"Kadomatsu\"……"
2002502-35 = "Bem, o Ano Novo chegou... e eu pensei em fazer um para o pessoal do escritório e para o Sensei……"
2002502-36 = "Cla-claro que eu sei que não faz sentido eu me preocupar com essas coisas……！"
2002502-37 = "Mas para celebrar o Ano Novo, precisamos de um Kadomatsu……！"
2002502-38 = "Ah…… m-mas, um Kadomatsu feito por mim,"
2002502-39 = "pode não servir para nada……?"
2002502-40 = "A-afinal, eu fiz algo desnecessário de novo……！！"
2002502-41 = "[s5] \"Não é verdade. Acho que é uma ótima ideia.\"\n[s6] \"Posso te ajudar a procurar?\""
2002502-42 = "Eh? Ju-juntos……！？"
2002502-43 = "Eh? Ju-juntos……！？"
2002502-44 = "I-i-isso não pode ser……！！ Eu sozinha dou conta……! #nNão precisa se dar ao trabalho de me ajudar……！"
2002502-45 = "……Ah, mas recusar a gentileza do Sensei #ntambém não parece ser a coisa certa a se fazer……"
2002502-46 = "Ugh…… uuuu…… o que eu faço……"
2002502-50 = "……E-entendido. Então…… c-conto com você! #nEu vou procurar com toda a minha vida！！"
2002502-52 = "（Depois disso, procurei por bambus que pudessem ser usados junto com a Haruka）"
2002502-53 = "（……Procuramos por quase uma hora, mas não encontramos nada）"
2002502-55 = "…………。"
2002502-56 = "Se-Sensei…… sobre isso……"
2002502-57 = "De-desculpe…… como eu posso me desculpar por isso……"
2002502-58 = "[s7] \"Está tudo bem, não se preocupe.\"\n[s8] \"Podemos procurar de novo amanhã.\""
2002502-59 = "Ma-mas……! Além de tomar o seu tempo, #nnão consegui nenhum resultado……！"
2002502-60 = "Ma-mas……! Além de tomar o seu tempo, #nnão consegui nenhum resultado……！"
2002502-61 = "Nesse caso…… só me resta pagar com a minha vida……！"
2002502-62 = "……Eh……？"
2002502-63 = "O-o que você quer dizer com isso……？"
2002502-64 = "[s9] \"O que importa é o seu sentimento, Haruka.\"\n[s10] \"O importante é o desejo de fazer algo pelos outros.\""
2002502-65 = "……。"
2002502-66 = "……。"
2002502-67 = "É…… sério……?"
2002502-68 = "Ah, não! Com certeza é isso!#nAs palavras do Sensei não podem estar erradas!"
2002502-72 = "E-então…… não posso tomar mais o seu tempo, Sensei……."
2002502-73 = "P-por hoje…… é só isso……."
2002502-75 = "（Depois disso, encorajei Haruka, me despedi dela e voltei para o Schale）"
2002502-77 = "（No dia seguinte, visitei Haruka novamente）"
2002502-81 = "Será que…… isso está certo……?"
2002502-86 = "Será que está correto……?#nMas, ainda parece estranho……."
2002502-92 = "[ns11] Vou na direção de onde o som veio.\n[ns12] \"Haruka, você está aí……?\""
2002502-93 = "……? Ouvi alguma coisa agora……?"
2002502-94 = "……? Ouvi alguma coisa agora……?"
2002502-95 = "……!?"
2002502-96 = "I-iiiiiih!?"
2002502-99 = "[wa:350]― I-, [wa:600]iiiii……!?"
2002502-101 = "[wa:1000]― A-, [wa:1000]ah…….[wa:1100] Sensei……!?[wa:1250] Q-, [wa:650]quando você chegou……!?"
2002502-104 = "[wa:700]― N-, [wa:700]não![wa:900] É que,"
2002502-106 = "[wa:900]― Eu não estou tentando te pressionar[wa:1300] de jeito nenhum!![wa:1100] De verdade!!"
2002502-109 = "[wa:1300]― Ué, [wa:1300]sinto que[wa:1300] já passei por algo parecido antes……"
2002502-111 = "― Como se……"
2002502-114 = "[wa:100]― S-, [wa:800]sim……?[wa:1700] Isso[wa:950] aqui?"
2002502-116 = "― É um Kadomatsu……[wa:1600] mas……."
2002502-119 = "[wa:700]― O, [wa:800]o Sensei[wa:1400] disse que[wa:1200] o que importa é a intenção,"
2002502-121 = "― então……."
2002502-124 = "― Por isso, [wa:1100] pensei que talvez"
2002502-126 = "― essa criança que venho cuidando há tanto tempo fosse boa, [wa:1600] sabe……."
2002502-129 = "[wa:200]― S-, [wa:750]será que,"
2002502-131 = "― eu fiz algo desnecessário[wa:900] de novo……!?"
2002502-134 = "― Desculpe, desculpe, desculpe, desculpe, desculpe……."
2002502-137 = "[ns13] \"Não é nada disso. Acho que ficou incrível.\"\n[ns14] \"É realmente lindo. Você é incrível, Haruka.\""
2002502-138 = "[wa:550]― Eh, [wa:1500]hã……!?[wa:2000] Sim……?"
2002502-139 = "[wa:550]― Eh, [wa:1500]hã……!?[wa:2000] Sim……?"
2002502-141 = "― É, [wa:1100] verdade……[wa:1700] mesmo……?"
2002502-144 = "― Está……[wa:1600] tudo bem……?"
2002502-147 = "― ……He……."
2002502-149 = "― ……Hehe……."
2002502-152 = "（Depois disso, junto com Haruka, levamos os Kadomatsu, um por um, para o escritório）"
