[translation]
2002502-1 = "門松作り"
2002502-2 = "（新年を迎えてハルカを訪ねることにした）"
2002502-4 = "（……しかし雪のせいで道に迷ってしまった）"
2002502-5 = "[ns] \"…………。\""
2002502-8 = "うーん……こういうので、いいんでしょうか……。"
2002502-9 = "……いえ、もう少し丁度いいのが他にあるはず……。"
2002502-10 = "[s1] \"……ハルカの声？\"\n[s2] 音がした方向に向かう。"
2002502-18 = "うぅ……このままでは……。"
2002502-19 = "時間もないのに……どうすれば……。"
2002502-20 = "[s3] \"ハルカ、こんにちは。\"\n[s4] \"何か探しているの？\""
2002502-21 = "……？"
2002502-22 = "……？"
2002502-23 = "……えっ……？"
2002502-24 = "……！？！？せ、せせせせせ先生！？"
2002502-25 = "ど、どど、どうしてこんなところに……！？"
2002502-26 = "も、もしかして私、また間違えて先生にメッセージを……！？"
2002502-27 = "……や、やっぱりそうですよね！？"
2002502-28 = "すみませんすみませんすみませんすみませんすみませんすみません……"
2002502-29 = "――死んでお詫びを！！"
2002502-30 = "……え？し、新年の挨拶……？"
2002502-31 = "そそ、そんな！どうして私なんかに……！？"
2002502-32 = "……？"
2002502-33 = "あ、えっと、今は……。"
2002502-34 = "竹……を、探していたんです。「門松」に、使うための……。"
2002502-35 = "その、新年になりましたし……事務所のみんなや先生に、と思いまして……。"
2002502-36 = "も、もちろん私なんかがこんな気を遣っても#n意味がないのは分かっていますが……！"
2002502-37 = "けれど新しい年をお祝いするためには、門松が必要ですし……！"
2002502-38 = "あ……で、でも、私が作った門松なんて、"
2002502-39 = "何の役に立たない可能性も……？"
2002502-40 = "や、やっぱり私、また余計なことを……！！"
2002502-41 = "[s5] \"そんなことないよ。良い考えだと思う。\"\n[s6] \"私も一緒に探していい？\""
2002502-42 = "えっ？い、一緒に……！？"
2002502-43 = "えっ？い、一緒に……！？"
2002502-44 = "そ、そそ、そんなこと……！！私一人で十分です……！#nわざわざ手伝っていただかなくても……！"
2002502-45 = "……あ、でも、先生のご好意を断るのも#nそれはそれでダメな気が……。"
2002502-46 = "う……うううぅ……一体どうすれば……。"
2002502-50 = "……わ、分かりました。では……よ、よろしくお願いします！#n私、命がけで探しますから！！"
2002502-52 = "（その後、ハルカと一緒に使えそうな竹を探し回った）"
2002502-53 = "（……1時間近く探したものの、全く見つからなかった）"
2002502-55 = "…………。"
2002502-56 = "せ、先生……その……。"
2002502-57 = "す、すみません……私、どうやってお詫びすれば……。"
2002502-58 = "[s7] \"大丈夫、気にしないで。\"\n[s8] \"明日また探せばいいよ。\""
2002502-59 = "で、ですが……！先生の時間を奪った上、#n何の成果も上げられないなんて……！"
2002502-60 = "で、ですが……！先生の時間を奪った上、#n何の成果も上げられないなんて……！"
2002502-61 = "こうなっては……やはり死をもって償うしか……！"
2002502-62 = "……えっ……？"
2002502-63 = "そ、それはどういう……？"
2002502-64 = "[s9] \"大事なのはハルカの気持ちだよ。\"\n[s10] \"みんなのためっていう気持ちが大事ってことだよ。\""
2002502-65 = "……。"
2002502-66 = "……。"
2002502-67 = "そう……なんですか……？"
2002502-68 = "あ、いえ！きっとそうですよね！#n先生のお言葉が間違っているはずありません！"
2002502-72 = "で、では……これ以上、先生のお時間を使うわけにもいきませんし……。"
2002502-73 = "き、今日は……これくらいに……。"
2002502-75 = "（その後、励ましながらハルカを送って、シャーレに戻った）"
2002502-77 = "（翌日、再びハルカを訪ねた）"
2002502-81 = "これで……大丈夫、なんでしょうか……？"
2002502-86 = "合ってるんでしょうか……？#nでも、やっぱりおかしいような……。"
2002502-92 = "[ns11] 音がした方向に行ってみる。\n[ns12] \"ハルカ、いる……？\""
2002502-93 = "……？今、何か聞こえて……？"
2002502-94 = "……？今、何か聞こえて……？"
2002502-95 = "……！？"
2002502-96 = "ひ、ひいいいいいっ！？"
2002502-99 = "[wa:350]― ひ、[wa:600]ひいぃ……！？"
2002502-101 = "― あ、[wa:1000]あ……。[wa:1100]先生……！？[wa:1250]い、[wa:650]いつの間に……！？"
2002502-104 = "― い、[wa:700]いえ！[wa:900]その、"
2002502-106 = "― 別に[wa:900]問い詰めているつもりでは[wa:1300]ないんですけど！！[wa:1100]本当に！！"
2002502-109 = "[wa:1300]― あれ、[wa:1300]なんだか[wa:1300]前にも似たようなことが……"
2002502-111 = "― あったような……"
2002502-114 = "[wa:100]― は、[wa:800]はい……？[wa:1700]これ[wa:950]ですか？"
2002502-116 = "― 門松……[wa:1600]ですが……。"
2002502-119 = "[wa:700]― せ、[wa:800]先生が[wa:1400]こういうのは[wa:1200]気持ちが大事だと"
2002502-121 = "― 仰っていたので……。"
2002502-124 = "― それなら、[wa:1100]ずっと育ててきた"
2002502-126 = "― この子がいいのかな、[wa:1600]と……。"
2002502-129 = "[wa:200]― ま、[wa:750]まさか、"
2002502-131 = "― また余計なことを[wa:900]してしまいましたか……！？"
2002502-134 = "― すみませんすみませんすみませんすみませんすみません……。"
2002502-137 = "[ns13] \"そんなことないよ。立派だと思う。\"\n[ns14] \"本当に素敵だね。ハルカはすごいよ。\""
2002502-138 = "[wa:550]― えっ、[wa:1500]ん……！？[wa:2000]はい……？"
2002502-139 = "[wa:550]― えっ、[wa:1500]ん……！？[wa:2000]はい……？"
2002502-141 = "― ほ、[wa:1100]本当……[wa:1700]ですか……？"
2002502-144 = "― 大丈夫……[wa:1600]でしょうか……？"
2002502-147 = "― ……へ……。"
2002502-149 = "― ……へへ……。"
2002502-152 = "（その後、ハルカと一緒に、門松を一つずつ持って事務所へ向かった）"
