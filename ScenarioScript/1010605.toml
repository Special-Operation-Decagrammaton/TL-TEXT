[translation]
1010605-1 = "アイドルの輝き"
1010605-2 = "（約束した場所でサクラコを待っていた）"
1010605-3 = "……先生、お早いですね。"
1010605-7 = "こういった場所でお会いするのは久しぶりですし、少々緊張を……。"
1010605-8 = "あっ、嫌とかではなく、むしろ嬉しく思っております。"
1010605-9 = "どうかされましたか……？"
1010605-10 = "ああ、この格好ですか。"
1010605-11 = "今日もアイドルとしての活動がありまして。"
1010605-12 = "せっかく来ていただいたところ申し訳ありませんが……。"
1010605-13 = "もし連絡が来たら、先に戻らなくては……。"
1010605-14 = "……え？"
1010605-15 = "そんな心配は必要ない、と……？"
1010605-16 = "[s1] \"少し歩こうか。\"\n[s2] \"付いてきてもらっても良いかな？\""
1010605-19 = "わ、分かりました。"
1010605-20 = "きっと、何か理由があるのでしょうね。"
1010605-21 = "付いて参ります、先生。"
1010605-22 = "[s3] \"喜んでくれたらいいな。\"\n[s4] 歩き出す。"
1010605-28 = "あの、先生……？"
1010605-29 = "その、差し支えなければ……。"
1010605-30 = "行き先だけでも教えていただけますと……。"
1010605-31 = "[s5] \"もう着くよ。\"\n[s6] \"ここだよ。\""
1010605-34 = "……？"
1010605-35 = "何もないような……。"
1010605-36 = "もしかして……。"
1010605-37 = "二人きりになれる場所でないと話せないような案件が……？"
1010605-38 = "そうではなく、向こうを見てほしい、と……？"
1010605-39 = "わ、分かりました……。"
1010605-40 = "……？"
1010605-41 = "えっ……。"
1010605-43 = "……！？"
1010605-46 = "[wa:450]― [log=사쿠라코 아이돌]こ、[wa:700]これは……！？[/log]"
1010605-48 = "― [log=사쿠라코 아이돌]い、[wa:750]一体[wa:900]何ですか……！？[/log]"
1010605-51 = "[wa:1100]― [log=사쿠라코 아이돌]私の……[wa:1300]ポスター？[/log]"
1010605-53 = "― [log=사쿠라코 아이돌]い、いえ……[wa:1100]それは見れば分かるのですが……！[/log]"
1010605-56 = "[ns7] \"シスターフッドのみんなと作ったんだ。\"\n[ns8] \"写真と貼る場所は私が決めたんだ。\""
1010605-59 = "[wa:1100]― [log=사쿠라코 아이돌]シスターの皆様と、[wa:1600]先生が……？[/log]"
1010605-61 = "― [log=사쿠라코 아이돌]な……[wa:800]なんと申し上げれば[wa:1200]よいのでしょう……。[/log]"
1010605-64 = "[ns9] \"……サクラコ？\"\n[ns10] \"驚かせちゃったかな？\""
1010605-67 = "[wa:1100]― [log=사쿠라코 아이돌]その……[wa:1400]いえ、[wa:1100]申し訳ございません。[/log]"
1010605-68 = "[wa:1950]― [log=사쿠라코 아이돌]責めているわけではなくて……[/log]"
1010605-71 = "― [log=사쿠라코 아이돌]言葉にするのが[wa:1200]難しい[wa:800]だけで……[/log]"
1010605-74 = "[wa:1300]― [log=사쿠라코 아이돌]でも、[wa:1300]そうですね……[wa:2400]これだけはハッキリと伝えられます。[/log]"
1010605-77 = "― [log=사쿠라코 아이돌]本当に……[wa:2300]心の底から[/log]"
1010605-79 = "― [log=사쿠라코 아이돌]とても、[wa:1000]嬉しく思っております。[/log]"
1010605-82 = "まさか、こんなサプライズがあるとは思いもしませんでしたが……。"
1010605-83 = "ここ最近の皆様の行動を振り返ってみると、納得しました。"
1010605-84 = "てっきり、避けられているのかと……。"
1010605-85 = "……あれは、私の勝手な思い込みなのでしょうね。"
1010605-86 = "[s11] \"サクラコが努力したおかげだよ。\"\n[s12] \"みんな、本当は仲良くしたいんじゃないかな。\""
1010605-89 = "……でしたら、良かったです。"
1010605-90 = "変な人だと思われているのではないかと、ずっと不安だったので……。"
1010605-91 = "[s13] （完全には否定できないような……）\n[s14] \"それとこれとは別の話だとは思うよ……。\""
1010605-94 = "アイドル活動には、感謝しなくてはなりませんね。"
1010605-95 = "……もちろん、先生にも。"
1010605-96 = "挑戦してみた甲斐がありました。"
1010605-97 = "あの時、勇気を出して……。"
1010605-98 = "本当に、良かったです。"
1010605-102 = "……先生。"
1010605-103 = "もう一度、勇気を出してお伝えします……。"
1010605-104 = "次の予定まで、ほんの少しでも構いません。"
1010605-105 = "その、よろしければ……。"
1010605-109 = "せっかく、先生が選んでくださったのですし……#nもう少しだけ、一緒にいてくださらないでしょうか？"
1010605-111 = "（サクラコの写真の前で、束の間の休息を取った）"
