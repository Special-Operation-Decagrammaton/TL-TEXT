[translation]
1005605-1 = "1日救護騎士団体験"
1005605-8 = "あ、先生！こちらです！"
1005605-12 = "何だかわざわざすみません。"
1005605-13 = "[s] \"ううん、お疲れ様なのはセリナの方だから。\""
1005605-14 = "あはは、それはそうかもですが……。"
1005605-15 = "先生が来てくれて、嬉しいです。"
1005605-21 = "聖テレサ総合病院・病室"
1005605-22 = "こんにちは！#nサンタさんですよー！"
1005605-23 = "プレゼントが欲しい方、いますかー？#nもちろん、健康が一番のプレゼントですけどね！"
1005605-24 = "おお、サンタのセリナちゃん、#n病院にまで来てくれるとは、嬉しいな。"
1005605-25 = "後ろの方は、シャーレの先生サンタさんかい？#nお疲れさん。"
1005605-26 = "サンタが2人も来てくれたんだ。#nプレゼントは十分足りそうだね。"
1005605-27 = "はい、もちろんです！"
1005605-29 = "あ、そういえばお手を怪我されてましたね……。#n代わりにプレゼントの包装を解きますね、お任せください。"
1005605-30 = "た、たしかにサンタさん本人がプレゼントを開けるのは#n不思議な光景かもですが……。"
1005605-31 = "中には何が入っているのでしょう……？"
1005605-35 = "じゃじゃーん！どうですか、これ？"
1005605-37 = "サンタたちが来てくれただけで、#n十分プレゼントになったし嬉しかった……？"
1005605-38 = "ふふっ、ではもっと嬉しくなっていただきましょう！#nどれが良いですか？"
1005605-39 = "あ、ではこちらで！#nメリークリスマス！"
1005605-41 = "あれからしっかり食事は取られてますか？"
1005605-42 = "悪い患者さんにはプレゼントをあげませんよ？"
1005605-43 = "治療をしっかり受けて、#n食事もきちんと取って！"
1005605-44 = "約束してくれますか……？#nはい、ではプレゼントです！"
1005605-46 = "（そうしてセリナは、救護騎士団の仕事とサンタとしての仕事をテキパキとこなしていった）"
1005605-47 = "（セリナの手際が良すぎたこともあり、私にできることはほとんど無かった……)"
1005605-51 = "聖テレサ総合病院・ロビー"
1005605-53 = "[ns] \"セリナは、毎日こんな忙しさで……？\""
1005605-54 = "今日はサンタとしてやることもあったので、#n毎日こんな感じというわけではありませんが……。"
1005605-55 = "大丈夫ですか、先生？"
1005605-56 = "疲れてませんか？"
1005605-57 = "……はい、でしたら良かったです。"
1005605-58 = "[s] \"あらためて考えると、学業に救護騎士団に大変だね……。\""
1005605-59 = "そ、そうでしょうか？#nもう長い間こうなので、あまりそういう風には……。"
1005605-60 = "ただ毎日、やるべきことをやっているという感じです。"
1005605-61 = "学校生活は楽しいです。#n必要とされたり、色んなことをしたり。"
1005605-62 = "救護騎士団の仕事は、達成感があります。#n1日が終わったら、今日も頑張れたかもしれないなって。"
1005605-63 = "それぞれが好きなことで、気持ちが良いんです。"
1005605-64 = "[s1] \"日頃「無理しないで」って言ってくれるけど……。\"\n[s2] \"セリナも無理しないでね……？\""
1005605-67 = "そ、そう言われると確かにそうなのですが……。"
1005605-68 = "ですが、はい、大丈夫です。"
1005605-69 = "もし辛くなったり、限界だなって思った時には……#nその時は、真っ先に先生へご連絡しますから。"
1005605-74 = "ところで今日は、どうして急に参加されようと……？"
1005605-75 = "[s3] \"大した理由は無いんだけどね。\"\n[s4] \"セリナと救護騎士団のことについて、もっと知りたいなって思って。\""
1005605-78 = "え、えぇっ……！？"
1005605-79 = "そ、そんな、どうして急に……。"
1005605-80 = "えっと、なんだかそれは、照れちゃいますね……。#nすごく……。"
1005605-81 = "……。"
1005605-86 = "あの、先生？"
1005605-87 = "その……。"
1005605-88 = "であれば、その……。"
1005605-89 = "また今度も、手伝っていただけますか？"
1005605-90 = "今日も、先生と一緒に過ごせて……#n嬉しかったので……。"
1005605-91 = "[s5] \"もちろん、いつでも呼んで。\"\n[s6] \"いつでも、どこでもね。\""
1005605-97 = "あ、ありがとうございます。"
1005605-98 = "では……約束、ですね。"
1005605-99 = "私、忘れたりしませんからね？#n後で「忘れました」は無しですよ？"
1005605-100 = "……先生。"
1005605-101 = "先生がこうしていてくれて……私、本当に嬉しいんです。"
1005605-103 = "（頬を染めたセリナと一緒に、シャーレに戻った）"
