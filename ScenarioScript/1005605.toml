[translation]
1005605-1 = "1 dia de experiência com cavaleiros aliviados"

1005605-8 = "Ah, professora! Aqui está!"

1005605-12 = "Desculpe por qualquer inconveniente."

1005605-13 = "[s] \"Bem, obrigado pelo seu trabalho duro, Selina.\""

1005605-14 = "Haha, talvez seja verdade..."

1005605-15 = "Estou feliz que o professor veio."

1005605-21 = "Hospital Geral Santa Teresa/Quarto de Pacientes"

1005605-22 = "Olá! #nÉ o Papai Noel!"

1005605-23 = "Tem alguém que gostaria de um presente? #nClaro que a saúde é o melhor presente!"

1005605-24 = "Ah, estou tão feliz que Santa Selina veio para o hospital."

1005605-25 = "A pessoa que está atrás é o Papai Noel, o professor da placa de Petri? #nObrigado pelo seu trabalho duro."

1005605-26 = "Dois Papais Noéis também vieram. #nParece que haverá presentes suficientes."

1005605-27 = "Sim claro!"

1005605-29 = "Ah, pensando bem, sua mão estava machucada... #nVou desembrulhar o presente para você, deixa comigo."

1005605-30 = "Bem, pode ser estranho ver o próprio Papai Noel abrindo os presentes..."

1005605-31 = "O que há dentro...?"

1005605-35 = "Jajaan! O que você acha disso?"

1005605-37 = "Só ter o Papai Noel vindo já era um presente suficiente e eu já estava feliz...?"

1005605-38 = "Hehe, vamos te deixar ainda mais feliz! #nQual é melhor?"

1005605-39 = "Ah, aqui está! #nFeliz Natal!"

1005605-41 = "Você tem comido bem desde então?"

1005605-42 = "Não damos presentes para pacientes ruins, não é mesmo?"

1005605-43 = "Faça o tratamento adequado e coma bem!"

1005605-44 = "Você vai me prometer...? #nOk, aqui está o seu presente!"

1005605-46 = "(Assim, Selina foi capaz de realizar com eficiência seu trabalho com os Cavaleiros Socorros e seu trabalho como Papai Noel.)"

1005605-47 = "(Como Serina era tão habilidosa, havia pouco que eu pudesse fazer...)"

1005605-51 = "Saguão do Hospital Geral Santa Teresa"

1005605-53 = "[ns] \"Selina está tão ocupada todos os dias...?\""

1005605-54 = "Eu tinha algumas coisas para fazer como Papai Noel hoje, então não é assim todos os dias..."

1005605-55 = "Você está bem, senhor?"

1005605-56 = "Você não está cansado?"

1005605-57 = "...Sim, isso teria sido bom."

1005605-58 = "[s] \"Quando penso nisso novamente, é difícil para mim frequentar a escola e os Cavaleiros Socorros...\""

1005605-59 = "É assim mesmo? #nJá é assim há muito tempo, então eu realmente não penso assim..."

1005605-60 = "Eu simplesmente sinto que estou fazendo o que devo fazer todos os dias."

1005605-61 = "A vida escolar é divertida. #nSer necessário e fazer várias coisas."

1005605-62 = "O trabalho dos Cavaleiros Socorros me dá uma sensação de realização. #nDepois do primeiro dia, senti que poderia ter feito o meu melhor hoje."

1005605-63 = "É bom porque cada um de nós gosta do que faz."

1005605-64 = "[s1] \"Eles sempre me dizem: ``Não se esforce demais'', mas... \"\n[s2] \"Por favor, não se esforce demais, Selina...? \""

1005605-67 = "Bem, quando você diz isso, é verdade..."

1005605-68 = "Mas sim, está tudo bem."

1005605-69 = "Se ficar difícil ou você sentir que atingiu seu limite...#nNesse caso, entrarei em contato com o professor primeiro."

1005605-74 = "A propósito, por que de repente você quis participar hoje...?"

1005605-75 = "[s3] \"Não há grande razão.\"\n[s4] \"Eu queria saber mais sobre Selina e os Rescue Knights.\""

1005605-78 = "Ei, ei...! ?"

1005605-79 = "Bem, por que de repente...?"

1005605-80 = "Bem, eu me sinto meio envergonhado com isso... #nTanto..."

1005605-81 = "……."

1005605-86 = "Hum, professor?"

1005605-87 = "o……."

1005605-88 = "Se sim, então..."

1005605-89 = "Você poderia me ajudar novamente?"

1005605-90 = "Fiquei feliz em passar um tempo com você hoje também...#n."

1005605-91 = "[s5] \"Claro, me ligue a qualquer hora.\"\n[s6] \"A qualquer hora, em qualquer lugar.\""

1005605-97 = "Ah, muito obrigado."

1005605-98 = "Então... isso é uma promessa."

1005605-99 = "Não vou esquecer, ok? #nNão existe “esqueci” depois, certo?"

1005605-100 = "……professor."

1005605-101 = "先生がこうしていてくれて……私、本当に嬉しいんです。"
1005605-103 = "(Ele voltou para a placa de Petri com Serina, que corou.)"

