[translation]#[Texto Final. - Filipe 05/07.]
901010800340-6 = "Sobre as caixas encontradas na área de alimentos……"
901010800340-7 = "No centro do armazém, na área de mantimentos, não tinha outros gêneros, só caranguejo."
901010800340-8 = "Parecia até que iam fazer uma festa de caranguejo."
901010800340-9 = "O que a Família Carpaccio pretendia comprando tanto caranguejo?"
901010800340-10 = "Revender?"
901010800340-11 = "Revenda de frutos do mar é proibida em princípio.#nE um volume tão grande chamaria atenção."
901010800340-12 = "Então os caranguejos se juntaram lá por acaso?#nAlgum pescador pagou a Família Carpaccio com caranguejos em vez de dinheiro."
901010800340-14 = "Não sei se existe pescador com essa coragem, mas os caranguejos que a Niko encontrou no armazém foram comprados pela Família Carpaccio mesmo."
901010800340-15 = "Verifiquei os registros de compra do mercado: a Família Carpaccio arrematou uma grande quantidade."
901010800340-16 = "Por causa disso, os boatos em torno da Família Carpaccio se espalharam……"
901010800340-17 = "Talvez o ato de comprar caranguejo já fosse o objetivo."
901010800340-18 = "Então, o motivo de a Família Carpaccio ter comprado tanto caranguejo é――"
901010800340-26 = "Então, o motivo de a Família Carpaccio ter comprado tanto caranguejo é――\n[as1] Fazer uma festa de caranguejo.\n[as3] Revender para lucrar.\n[as2] Espalhar o boato do caranguejo."
901010800340-27 = "Bom, não é impossível."
901010800340-28 = "Mas não consigo imaginar a Família Carpaccio fazendo uma festinha animada."
901010800340-29 = "E também não explica por que só tinha caranguejo no armazém."
901010800340-30 = "Deve ter outro motivo."
901010800340-39 = "Sim, provavelmente para espalhar o boato do 'Caranguejo do Tambor'."
901010800340-40 = "A Família Carpaccio, que não tem nada a ver com transporte de frutos do mar, comprar caranguejo em massa certamente vai gerar especulação – e eles sabem disso."
901010800340-41 = "E com os boatos sobre o caranguejo monstro ligados aos desaparecimentos……"
901010800340-42 = "Quem não sabe dos detalhes pode facilmente acreditar que é verdade."
901010800340-43 = "Ahaha…… aí é forçar."
901010800340-44 = "Como eu disse antes, a revenda de frutos do mar é proibida, e o preço do caranguejo está caindo…… não dá pra lucrar revendendo."
901010800340-45 = "Se quisesse enfrentar a Sala de Finanças do Conselho, contrabandearia algo mais caro."
901010800340-52 = "Mas com tanto boato, por que a Valkyrie não investiga?"
901010800340-53 = "A Família Carpaccio também não se importa?"
901010800340-54 = "Talvez…… porque chegaram à mesma conclusão que a gente?"
901010800340-55 = "Mesma conclusão?"
901010800340-56 = "Por mais suspeito que seja o boato, quando investigam, descobrem que não há desaparecidos."
901010800340-57 = "Por isso a Valkyrie deve ter arquivado."
901010800340-59 = "Bom, a Valkyrie também tem recursos limitados.#nNão dá pra ficar atrás de todo boato."
901010800340-60 = "Eles são mais espertos do que eu pensava."