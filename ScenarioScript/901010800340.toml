[translation]
901010800340-6 = "About those boxes I found in the grocery area..."
901010800340-7 = "There weren't any other ingredients in the grocery area in the center of the warehouse, just a whole lot of crabs."
901010800340-8 = "It was enough to make me think they were planning a crab party."
901010800340-9 = "What could the Carpaccio Family possibly be planning to do with more crabs than they could ever eat?"
901010800340-10 = "Reselling them somewhere else?"
901010800340-11 = "Reselling marine products is strictly prohibited. #nBesides, wouldn't it be suspicious to circulate such a massive amount of crab?"
901010800340-12 = "Then maybe they just happened to end up there? #nLike, maybe a fisherman sent them to the Carpaccio Family in lieu of payment."
901010800340-14 = "I'm not sure if there's a fisherman that bold, but the crabs Niko found in the warehouse were definitely purchased by the Carpaccio Family."
901010800340-15 = "I checked the market transaction records, and there's a record of the Carpaccio Family winning a bid for a large quantity of crabs."
901010800340-16 = "That seems to be fueling some of the strange rumors surrounding the Carpaccio Family, but..."
901010800340-17 = "Perhaps there was a purpose behind the act of purchasing the crabs themselves."
901010800340-18 = "Then, the reason the Carpaccio Family bought so many crabs is—"
901010800340-26 = "Then, the reason the Carpaccio Family bought so many crabs is—\n[as1] To host a crab party.\n[as3] To make a profit by reselling the crabs.\n[as2] To spread rumors about the crabs."
901010800340-27 = "Well, that's not entirely impossible."
901010800340-28 = "But I can't really imagine the Carpaccio Family hosting a friendly, happy party."
901010800340-29 = "And that doesn't explain why there was nothing but crabs in the warehouse."
901010800340-30 = "I'm sure there's another reason."
901010800340-39 = "Yes, I believe it's likely related to the rumors about the 'Drum Can Crabs'."
901010800340-40 = "If the Carpaccio Family, who have nothing to do with transporting marine products, were to buy a massive amount of crabs, they would surely be aware that it would spark all sorts of speculation about their intentions."
901010800340-41 = "On top of that, rumors about a 'Monster Crab' have been spreading recently in connection with the disappearances—"
901010800340-42 = "To someone who doesn't know better, it wouldn't be strange for them to mistake it for the truth."
901010800340-43 = "Ahaha... that's a bit of a stretch."
901010800340-44 = "As I mentioned earlier, reselling marine products is prohibited, and the price of crab has been dropping lately... I don't think it would be very profitable to resell them."
901010800340-45 = "If they were planning to make an enemy of the General Student Council's Finance Office, they would be smuggling something much more valuable."
901010800340-52 = "But if there are so many rumors going around, why isn't Valkyrie investigating?"
901010800340-53 = "Shouldn't the Carpaccio Family be worried about that, too?"
901010800340-54 = "That might be... because they reached the same conclusion we did earlier?"
901010800340-55 = "The same conclusion?"
901010800340-56 = "No matter how many strange rumors are circulating, an investigation would reveal that there are no missing persons."
901010800340-57 = "That is likely why the Valkyrie Police School has dropped the investigation."
901010800340-59 = "Well, Valkyrie only has so many people available. #nI suppose there's a limit to how much they can chase down rumors."
901010800340-60 = "They're using more clever tactics than I thought."