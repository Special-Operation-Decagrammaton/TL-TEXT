[translation]
901010800340-6 = "Sobre as caixas que encontramos na área de mantimentos..."
901010800340-7 = "Não tinha mais nada na área central do depósito, só uma porrada de caranguejo."
901010800340-8 = "Até pensei que estivessem preparando uma festa de caranguejo."
901010800340-9 = "O que será que a Família Carpaccio queria fazer comprando mais caranguejo do que conseguem comer?"
901010800340-10 = "Revender?"
901010800340-11 = "Revenda de pescado é proibida em princípio. Além disso, se eles colocassem muito caranguejo no mercado, ia chamar a atenção, né?"
901010800340-12 = "Então seria coincidência? Tipo, algum pescador mandou caranguejo em vez de dinheiro pra família."
901010800340-14 = "Não sei se existe pescador com tanta coragem, mas os caranguejos que a Niko encontrou no depósito foram comprados pela Família Carpaccio sim."
901010800340-15 = "Eu estava olhando os registros de compra e venda do mercado, e tinha registro da Família Carpaccio arrematando uma grande quantidade de caranguejos."
901010800340-16 = "Por causa disso, parece que surgiram uns boatos estranhos em torno da família..."
901010800340-17 = "Talvez o ato de comprar caranguejo em si já fosse o objetivo."
901010800340-18 = "Então, o motivo de a Família Carpaccio ter comprado tanto caranguejo é –"
901010800340-26 = "Então, o motivo de a Família Carpaccio ter comprado tanto caranguejo é –\n[as1] Para fazer uma festa de caranguejo.\n[as3] Para revender e ganhar dinheiro.\n[as2] Para espalhar o boato sobre caranguejo."
901010800340-27 = "Até que não é impossível."
901010800340-28 = "Mas é difícil imaginar a Família Carpaccio fazendo uma festa alegre."
901010800340-29 = "E não explica por que só tinha caranguejo no depósito."
901010800340-30 = "Deve ter outro motivo."
901010800340-39 = "Sim, provavelmente é o boato do \"Caranguejo do Tambor\"."
901010800340-40 = "Se a Família Carpaccio, que não tem nada a ver com transporte de pescado, comprasse uma tonelada de caranguejo, as pessoas iam começar a especular, e eles sabem disso."
901010800340-41 = "Além disso, com os boatos sobre o caranguejo monstro relacionados aos desaparecimentos..."
901010800340-42 = "Para quem não sabe, não seria estranho acreditar que é verdade."
901010800340-43 = "Ahaha... isso é um pouco..."
901010800340-44 = "Como eu disse antes, a revenda de pescado é proibida, e o preço do caranguejo caiu... seria difícil lucrar com revenda."
901010800340-45 = "Se quisessem enfrentar o Departamento Financeiro do Conselho Estudantil Geral, contrabandeariam coisas mais caras."
901010800340-52 = "Mas com tanto boato circulando, por que a Valkyrie não investiga?"
901010800340-53 = "A Família Carpaccio também devia estar preocupada, né?"
901010800340-54 = "Isso... talvez porque chegaram à mesma conclusão que a gente na última vez?"
901010800340-55 = "Mesma conclusão?"
901010800340-56 = "Por mais suspeitos que sejam os boatos, quando investigam, não encontram desaparecidos."
901010800340-57 = "Por isso, a Academia de Polícia Valkyrie também pode ter arquivado a investigação."
901010800340-59 = "Bem, a Valkyrie também tem pessoal limitado. Não dá para investigar cada boato."
901010800340-60 = "Que estratégia mais esperta."