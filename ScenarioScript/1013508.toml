1013508-33 = "sim."

1013508-34 = "……."

1013508-35 = "...?"

1013508-36 = "Por favor, espere, senhor."

1013508-37 = "[s] \"O quê?\""

1013508-38 = "Você desviou o olhar agora há pouco?"

1013508-39 = "[s] \"É um mal-entendido, Sr. Kei.\""

1013508-40 = "Sr. Kei...?"

1013508-41 = "……."

1013508-42 = "professor."

1013508-43 = "Olhe nos meus olhos."

1013508-44 = "[s] \"E-eu não gosto disso! Não vou desistir!!\""

1013508-45 = "Por favor, dê uma olhada!"

1013508-46 = "[s] \"Kuuu...!\""

1013508-47 = "OK. Agora, coloque a mão no peito e responda."

1013508-48 = "Você costuma limpar sua casa corretamente?"

1013508-49 = "[s] \"...!\""

1013508-54 = "O que! ? Espere! Eu entendo tudo agora! Aqui está! Não fuja! !"

1013508-58 = "……."

1013508-59 = "[s] \"…….\""

1013508-60 = "professor."

1013508-61 = "[s] \"Ah, é?\""

1013508-62 = "Isto é... uma residência? É uma casa de lixo?"

1013508-63 = "Se você responder à primeira, você não tem moral, e se responder à segunda, você não é mais um ser humano."

1013508-64 = "Vou te dar 10 segundos. Comece a dar desculpas."

1013508-65 = "[s1] \"Escute, Kei-chan! Vou explicar tudo!\"\n[s2] \"Normalmente, a limpeza e o trabalho doméstico nunca deveriam acabar!?\""

1013508-68 = "Então?"

1013508-69 = "[s] \"Se você terminar a porção de hoje, a porção de amanhã ocorrerá novamente amanhã!\""

1013508-70 = "Sim, continue."

1013508-71 = "[s3] \"Então é melhor fazer tudo de uma vez quando tiver vontade!\"\n[s4] \"Você não acha que é bom e razoável!?\""

1013508-77 = "Você dá desculpas como um racionalista vestido de preto! ?"

1013508-78 = "Suspiro... você terminou com suas desculpas? #nBem então..."

1013508-84 = "Sério... por que eu...?"

1013508-90 = "É melhor que o quarto do Rio, mas... não, não dá nem para comparar..."

1013508-94 = "Essa quantidade de poeira... morar num lugar como esse vai te deixar doente...?"

1013508-101 = "Ufa..."

1013508-102 = "Então, professor?"

1013508-103 = "[s] \"Sim....\""

1013508-104 = "Tem algo a dizer?"

1013508-105 = "[s5] \"Lamentamos. Muito obrigado.\"\n[s6] \"Lamentamos. Obrigado.""

1013508-108 = "...Tudo bem, desde que você entenda."

1013508-109 = "Se estiver uma bagunça de novo..."

1013508-113 = "……."

