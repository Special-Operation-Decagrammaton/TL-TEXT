[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1013508-1 = "Sobre o Ambiente de Convívio"
1013508-3 = "Ah, você chegou."
1013508-4 = "Isso aqui...\né realmente um lugar onde pessoas moram?"
1013508-5 = "[s] \"Eu te ajudo.\""
1013508-6 = "Eh?"
1013508-7 = "Ah... certo, muito obrigada.\nBem, duas pessoas farão o trabalho mais rápido."
1013508-12 = "Haa... a Momoi só sabe bagunçar as coisas,\ne nunca arruma nada."
1013508-13 = "A Midori, por outro lado,\né boa em arrumar as coisas\ne tem algum senso de sobrevivência básica, mas――"
1013508-14 = "Ela quase nunca se dá ao trabalho\nde limpar nada..."
1013508-15 = "A Yuzu... apesar de estar perdendo o hábito\nde se esconder em armários,\nsó pensa em jogar ou programar..."
1013508-19 = "E a Aris...\nEu estou preocupada com a Aris."
1013508-20 = "Ela é a segunda melhor nas tarefas diárias\ndentre as quatro,\nmas no fim das contas,\nas pessoas acabam sendo moldadas pelas suas companhias...\nE as companhias dela são..."
1013508-21 = "Não, eu não quero dizer\nque elas são más influências.\nMuito pelo contrário, elas são ótimas pessoas.\nMas é que eu geralmente――"
1013508-30 = "Ufa...\nFinalmente parece um lugar habitável de novo."
1013508-31 = "……Mas eu aposto o que for\nque isso não vai durar nem três dias."
1013508-32 = "[s] \"Só três dias...\nCompreendo...\""
1013508-33 = "Exato."
1013508-34 = "……。"
1013508-35 = "……？"
1013508-36 = "Espere um segundo,\nSensei."
1013508-37 = "[s] \"O-O que foi?\""
1013508-38 = "Você acabou...\nde desviar o olhar, não é?"
1013508-39 = "[s] \"I-Isso é um mal-entendido,\nsenhorita Kei.\""
1013508-40 = "Senhorita Kei...?"
1013508-41 = "……。"
1013508-42 = "Sensei."
1013508-43 = "Olhe nos meus olhos."
1013508-44 = "[s] \"N-Nunca!\nEu jamais me renderei!\""
1013508-45 = "Eu mandei você\nolhar para mim!"
1013508-46 = "[s] \"Guh……！\""
1013508-47 = "Muito bem.\nAgora, coloque a mão no coração\ne me responda com sinceridade."
1013508-48 = "Você costuma limpar\no seu próprio escritório direitinho?"
1013508-49 = "[s] \"……！\""
1013508-54 = "O quê?! Volte já aqui!\nEu já entendi tudo só com essa sua reação!\nEi! Não fuja!!"
1013508-58 = "……。"
1013508-59 = "[s] \"……。\""
1013508-60 = "Sensei."
1013508-61 = "[s] \"U-Uh, sim?\""
1013508-62 = "Isso aqui... é um ambiente de trabalho?\nOu um lixão?"
1013508-63 = "Se responder a primeira opção,\nvocê não tem moral;\nse responder a segunda,\né um fracasso como ser humano."
1013508-64 = "Você tem 10 segundos.\nPode começar a se explicar."
1013508-65 = "[s1] \"E-Escuta aqui, Kei-chan!\nEu posso explicar!\"\n[s2] \"Naturalmente, tarefas domésticas e limpeza\nsão coisas que nunca têm fim, não acha?!\""
1013508-68 = "E daí?"
1013508-69 = "[s] \"Se eu termino o que tinha para hoje,\namanhã vai acumular de novo!\""
1013508-70 = "Certo, prossiga."
1013508-71 = "[s3] \"Por isso mesmo, achei que seria muito mais prático\nacumular tudo para limpar de uma vez só!\"\n[s4] \"Além de ser muito mais satisfatório,\nisso é incrivelmente racional, não concorda?!\""
1013508-77 = "Você está soando exatamente como\naquela racionalista viciada em roupas pretas, sabia?!"
1013508-78 = "Haa... Já acabou com as desculpas esfarrapadas?\nSendo assim――"
1013508-84 = "Sinceramente...\nPor que eu tenho que aturar isso...?"
1013508-90 = "Até que está em melhores condições que o quarto da Rio...\nNão, não há nem como comparar..."
1013508-94 = "Essa quantidade de poeira...\nVocê vai acabar ficando doente se continuar vivendo\nnesse tipo de ambiente, sabia...?"
1013508-101 = "Ufa……。"
1013508-102 = "E então, Sensei?"
1013508-103 = "[s] \"Sim……。\""
1013508-104 = "Tem algo a dizer?"
1013508-105 = "[s5] \"Perdão pela minha imaturidade.\nMinhas mais sinceras gratidões.\"\n[s6] \"Peço mil perdões.\nEu lhe agradeço de todo o coração.\""
1013508-108 = "……Contanto que você tenha entendido,\nestá tudo bem."
1013508-109 = "Se eu voltar aqui\ne estiver tudo bagunçado de novo……"
1013508-113 = "……。"
1013508-114 = "No fim das contas,\nvocê vai bagunçar tudo de novo, não vai?"
1013508-115 = "Haa... Apenas me chame\nem vez de tentar lidar com tudo sozinho."
1013508-116 = "[s7] \"……！？\"\n[s8] \"Você vai me ajudar...?\""
1013508-119 = "Você não vai mover um dedo\nse eu te deixar sozinho, de qualquer forma."
1013508-120 = "Além do mais,\nduas pessoas fazem o trabalho mais rápido,\nnão é?"
1013508-124 = "[ns] \"Como eu imaginava...\neu sabia...!!\""
1013508-125 = "Qual é o problema agora?\nNão faça tanto suspense..."
1013508-126 = "Ah, não, espere aí...\nEsse seu sorrisinho bobo..."
1013508-127 = "Se você disser qualquer coisa estranha de novo,\neu juro que――!"
1013508-128 = "[ns9] \"A Kei-chan é tão fofa!\"\n[ns10] \"A Kei-chan é tão fofa!!\"\n[ns11] \"A Kei-chan é tão fofa!!!\""
1013508-132 = "AaaaAaahhh~~~~~!!!!!!!"