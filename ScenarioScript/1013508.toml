[translation]
1013508-1 = "Sobre o ambiente de vida"

1013508-3 = "Ah, você precisava disso."

1013508-4 = "Este é realmente um lugar onde as pessoas vivem?"

1013508-5 = "[s] \"Eu vou te ajudar.""

1013508-6 = "foto?"

1013508-7 = "Ah... sim, obrigado. Bem, duas pessoas são mais rápidas."

1013508-12 = "Suspiro... Momoi continua fazendo bagunça e não tem como ela limpar."

1013508-13 = "Nesse ponto, Midori é boa em arrumar e tem um certo nível de habilidades para a vida, mas..."

1013508-14 = "Em primeiro lugar, a frequência de limpeza é baixa."

1013508-15 = "ユズは……隠れる癖は減りつつあっても、ゲームかコーディングばかり……。"

1013508-19 = "Alice...estou preocupada com Alice."

1013508-20 = "Dos quatro, ela tem a segunda maior capacidade de sobreviver, mas no final, os humanos tendem a se parecer com aqueles ao seu redor...#nE falando das pessoas ao seu redor..."

1013508-21 = "Não, não quero dizer que seja ruim. #nNa verdade, acho que eles são boas pessoas. Porém, eu costumo..."

1013508-30 = "Ufa... finalmente melhorou."

1013508-31 = "...Se durar 3 dias, você ficará bem. Você pode apostar."

