[translation]
80000059-1 = "すごく貴重な限定の"
80000059-2 = "……。"
80000059-6 = "（かれこれ15分以上、沈黙が続いていた）"
80000059-7 = "[s1] \"あの……もしかして用件ってバレンタインデーだったり？\"\n[s2] \"……チョコレートの件だったりする？\""
80000059-8 = "……っ！？"
80000059-9 = "……っ！？"
80000059-10 = "ああもおおぉぉぉっ！何で！何で言っちゃうのさ！？"
80000059-11 = "そうだよ、そうですけど！？その通りだけど何！？合ってるけど！！"
80000059-12 = "ああもうちょっと待ってて！まだ悩んでるんだから！"
80000059-13 = "……え、何を悩んでるか？"
80000059-14 = "バッカじゃないの！？言えるわけないでしょうが！！そんな簡単に言えるなら最初から言ってるってば！！"
80000059-15 = "……。"
80000059-19 = "はぁ……。"
80000059-20 = "……もう良い。どうせこのまま悩み続けてても、答えは出なさそうだし……。"
80000059-21 = "もう別に、笑われたところで……。"
80000059-30 = "……何か言ったら？"
80000059-31 = "いや別に分かってる！私だって分かってるし、「何これ」ってなる気持ちも分かるから！"
80000059-32 = "でも仕方ないじゃん、狙ってた限定チョコが売り切れだったんだから！ほとんど寝ないで並んでたのにっ！"
80000059-33 = "ネット注文の方も先着順で、ページを更新した瞬間に終わっちゃうし！"
80000059-34 = "だからといって、普通の市販のやつっていうのも……"
80000059-35 = "そう思って結局手作りに挑戦してみたら、こんな感じになっちゃって……！"
80000059-36 = "不器用で悪かったわね！？どうせみんなは、綺麗で可愛いのくれたんでしょ！？"
80000059-37 = "うぅ……あれが手に入ってさえいれば……。"
80000059-42 = "……せ、先生？"
80000059-43 = "な、何でそんな勢い良く食べて……！？"
80000059-44 = "[s3] \"すごく美味しい。\"\n[s4] \"その気持ちも合わさって本当に嬉しいよ、ありがとね。\""
80000059-45 = "……本当に？"
80000059-46 = "……本当に？"
80000059-47 = "いつもそんなこと言ってばっかりだし、リップサービスなのかもって理屈では分かってるけど……。"
80000059-48 = "……でも、ありがと。本来狙ってた限定チョコの方が美味しかったと思うけど……。"
80000059-49 = "[s5] \"これも限定版だよ。\"\n[s6] \"ヨシミが私にくれたチョコはこれだけだから。\""
80000059-50 = "……っ！！ああもう、分かったから！"
80000059-51 = "……っ！！ああもう、分かったから！"
80000059-52 = "はぁ、いっつもいっつもそうやって……！もうそういうの無し！"
80000059-53 = "ほんっと、いつものパターンなのに……。"
80000059-55 = "どうして、こう……。"
