[translation]
80000059-1 = "Uma edição limitada super valiosa"
80000059-2 = "……。"
80000059-6 = "（Já faziam mais de 15 minutos que o silêncio continuava）"
80000059-7 = "[s1] \"Ei... por acaso o assunto seria o Dia dos Namorados?\"\n[s2] \"...É sobre o chocolate, não é?\""
80000059-8 = "……!?"
80000059-9 = "……!?"
80000059-10 = "Ah, meu Deus! Por quê! Por que você teve que dizer isso!?"
80000059-11 = "Sim, é isso mesmo, mas e daí!? É verdade, mas o que tem!? Você acertou, mas e daí!!"
80000059-12 = "Ah, espera um pouco! Eu ainda estou decidindo!"
80000059-13 = "……Ei, quer saber com o que estou preocupada?"
80000059-14 = "Você é idiota!? Não tem como eu te contar isso!! Se fosse fácil de falar, eu já teria dito desde o começo!!"
80000059-15 = "……。"
80000059-19 = "Haa……."
80000059-20 = "……Esquece. De qualquer forma, continuar preocupada assim não vai me levar a lugar nenhum……."
80000059-21 = "Não importa mais se você rir de mim……."
80000059-30 = "……Vai dizer alguma coisa?"
80000059-31 = "Não, eu sei! Eu mesma sei, e entendo que você pense \"o que é isso?\"!"
80000059-32 = "Mas não tive culpa, aquele chocolate de edição limitada que eu queria esgotou! E olha que eu fiquei na fila quase sem dormir!"
80000059-33 = "As encomendas pela internet também eram por ordem de chegada, e acabaram no instante em que atualizei a página!"
80000059-34 = "Mas, mesmo assim, dar um chocolate comum de loja também não era..."
80000059-35 = "Foi pensando nisso que resolvi tentar fazer um caseiro, e acabou ficando assim……!"
80000059-36 = "Desculpa por ser desajeitada, tá bom!? Aposto que todo mundo te deu um lindo e fofinho, né!?"
80000059-37 = "Uuu…… se eu tivesse conseguido aquele……."
80000059-42 = "……Se-Sensei?"
80000059-43 = "Po-por que você está comendo com tanta vontade……!?"
80000059-44 = "[s3] \"Está muito gostoso.\"\n[s4] \"Fico muito feliz com o sentimento que você colocou nele, obrigado.\""
80000059-45 = "……Sério mesmo?"
80000059-46 = "……Sério mesmo?"
80000059-47 = "Eu sei racionalmente que você sempre diz essas coisas e que pode ser só educação……."
80000059-48 = "……Mas, obrigada. Acho que o chocolate de edição limitada que eu queria originalmente seria mais gostoso, mas……."
80000059-49 = "[s5] \"Este também é uma edição limitada.\"\n[s6] \"Porque este é o único chocolate que a Yoshimi me deu.\""
80000059-50 = "……!! Ah, chega, já entendi!"
80000059-51 = "……!! Ah, chega, já entendi!"
80000059-52 = "Haa, você sempre faz isso……! Chega, nada disso!"
80000059-53 = "Sério, é sempre o mesmo padrão……."
80000059-55 = "Por que, como……."
