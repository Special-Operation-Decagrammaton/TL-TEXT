[translation]
10027125-5 = "やはり……先生は……強いな……！"
10027125-12 = "[ns] \"ごめんね、マリナ。こっちも色々あって。\""
10027125-16 = "あ～やはり事務局だけでは力不足でしたかぁ～#n先生がついていたとは言え、友情パワー、凄いですねぇ。"
10027125-17 = "[s] \"出版部長～もうやめましょう～\""
10027125-18 = "まぁ、負けてしまっては致し方ない。残念ですが、ここは潔く退散させていただきます。原稿の譲渡もなしです。"
10027125-19 = "分かってもらえたみたいで、よかっ……"
10027125-20 = "次回の原稿をもらっちゃえばいいだけの話ですし。"
10027125-21 = "まだ諦めてないの！？"
10027125-22 = "すべてがハッピーエンドになるとでも？実に安直な考えですね！勇者が魔王を倒した後は、姫との結婚生活が残ってますよぉ！"
10027125-23 = "ある意味、その後の方が本格的な戦いとも言えます……！ムフフ……！"
10027125-24 = "怖い話しないでよ！？"
10027125-25 = "だってぇ～約束した事実は消えてませんしぃ？#nメルは人と交わした約束を、破ったりしませんよね？"
10027125-26 = "うっ！？"
10027125-27 = "[s] \"確かにそれは事実だね……。\""
10027125-28 = "さて、出版部はこの辺で帰らせていただきますねぇ。#n次回は、もっと実りあるお話し合いができたらいいのですが。"
10027125-30 = "それが双方にとって良いものであることを願います……。"
10027125-38 = "一件落着、ですね。"
10027125-39 = "……あんたんとこの部長のせいだけどね。"
10027125-40 = "部長は部長、私は私です。一緒にしないでください。"
10027125-42 = "では、本題に戻りまして……"
10027125-43 = "[s] \"ついに、タカネの感想を聞くときが……。\""
10027125-45 = "え……？だ、大丈夫そうですか、先生？#nなにか悪く言われてしまったら……！"
10027125-46 = "いや、あ、その、先生はともかく、私のメンタルがあんまり大丈夫じゃないと思うんだけど！？"
10027125-47 = "[s1] \"第三者の意見というのも……大切だからね。\"\n[s2] \"私たちも覚悟を決めよう……。\""
10027125-50 = "う、うっ……！"
10027125-51 = "ちょっと待ってください。#n私、深呼吸します……ふぅ、はあ……ふぅ、はあ……"
10027125-57 = "人のことを何だと思ってるんですか……。"
10027125-58 = "今から読ませていただきます。しばらくの間、集中させてください。"
10027125-69 = "……率直な感想を、お伝えする時間ですわ。"
10027125-75 = "ふ、ふふ。私頑張った。本当に頑張ったよ。けど頑張ったからって必ずいい結果に繋がるわけではない。それくらい今や幼稚園児だって知ってるけどさ。ふ、ふふ、ふふふ……。"
10027125-76 = "どうか、私たちを忘れないでください……すべてが消えてなくなっても、ここに一冊の本と、それを読んで語った人たちが存在していたことだけは、どうか……。"
10027125-78 = "……遺言か何かです？"
10027125-79 = "時間という言葉が出たのでお話しておきましょうか。#n時間というものほど、その価値が簡単に忘れられるものはありません。"
10027125-80 = "未来について考えたり、心配したりはしますが……本気で考えている人は極わずかです。"
10027125-81 = "過去も同じ。現在は過去の集大成と申しますが、過去をありのままに記憶しようとする人は少ないです。忘却し、美化し、思い出の向こうに押し込めていくだけ……"
10027125-82 = "そういう意味で私たちが大切にしているのは現在だけかもしれませんが、現在という物は存在しません。なぜならそれは、無限に訪れる「未来」と絶えず押し流されていく「過去」の狭間にだけ存在する一瞬の概念だからです。"
10027125-83 = "だからこそ現在を扱う話は……過去について、そして未来について話さなければなりません。それが時間という忘却に弱く、そこから抗えない「何か」に対する礼儀であり敬意です。"
10027125-84 = "この話では、『ルナ』の過去が描かれています。#nそれ故に現在の話でもあり、未来の話でもあるのです。"
10027125-85 = "物語自体は平易です。よく言えば無難。悪く言えば、これと言った特色はありませんが……真摯に向き合っていると感じられます。それがこの物語の長所と言えるでしょう。"
10027125-86 = "認めましょう――近年では珍しい、真面目ながらもクラシックなお話であったということを。そして――"
10027125-90 = "……そして……"
10027125-96 = "そして……？"
10027125-97 = "な、何ですか……？"
10027125-99 = "……。"
10027125-103 = "[ns3] \"時には、素直さは最高の美徳だと言うよね……。\"\n[ns4] \"それは私たちを自由に解放してくれるから……。\""
10027125-106 = "……！"
10027125-107 = "そうですね。いいでしょう！先生がそうおっしゃるのであれば……！"
10027125-108 = "……こほん！"
10027125-109 = "……良い話でした。そして十分な時間が与えられていたのであれば、#nどれほど素晴らしい作品になっていたでしょう。"
10027125-110 = "お疲れ様でした、知識解放戦線。"
10027125-112 = "おかしいな。#n思ってた評価と違ったんだけど……"
10027125-113 = "そうですね。メル先輩には身に余る評価だと思います。"
10027125-115 = "まぁ！私が意を決して伝えたというのに！"
10027125-116 = "もしかして今、モミジにも刺されなかった！？"
10027125-122 = "というわけですので、次回のプチオンリーの場所と日時をお知らせします。後でメールを確認しておいてください。"
10027125-123 = "よし。次の『ルナ』プチオンリーでは、全く違う姿を見せてあげる。"
10027125-124 = "その時には、少なくとも時間は十分あるはずですから！"
10027125-125 = "それでは、あまり期待せずに待っておりますわ。#n健闘を祈ります。「知識解放戦線」。"
10027125-129 = "よ～し、それじゃあ……。"
10027125-130 = "帰りましょうか。先輩、先生！"
10027125-131 = "そうしよっかー！#nうあぁ、今日は久しぶりにぐっすり眠れる……"
10027125-132 = "[s] \"私、これからまる2日は眠れる自信がある……。\""
10027125-133 = "改めて、今回は……"
10027125-134 = "メル先輩が私のために『ルナ』最終巻を描こうとしてくれて……"
10027125-135 = "私、それが……すごいと思ったというか……#n実は、とても嬉しかっ……"
10027125-136 = "へへん！やっぱりそうでしょう？#n振り返ったら、全部いい思い出になるって！"
10027125-137 = "結果よければ万事オーライ！ハッピーハッピーエンドだよ！"
10027125-138 = "……最後まで感想も言わせてくれないんですね。#nメル先輩って、本当せっかちなんだから……"
10027125-139 = "「結果よければ万事オーライ」と言いましたけど、それまでが大変だったじゃないですか！先生まで巻き込んで、4日も原稿を手伝わせたくせに！"
10027125-140 = "し、締め切り直前の漫画家の日常を体験させてあげたんだよ！"
10027125-141 = "それ自体が迷惑です！"
10027125-142 = "ちゃ、ちゃんと合意の上だよ！"
10027125-143 = "とはいえ、やっていいことと悪いことがあります！"
10027125-144 = "メル先輩、反省してくださいよ！#n先生にどれだけ迷惑をかけたんですか……！"
10027125-145 = "私も大変だったんだけど！？"
10027125-146 = "それは自業自得です！あと、私だって大変でしたからね？"
10027125-150 = "[ns] \"えっと、私は大丈夫だったよ……？\""
10027125-151 = "先生が大丈夫でも、私が大丈夫じゃありません！はい、そこに座ってください、メル先輩！今日こそ、お説教です！"
10027125-152 = "うあああ～後輩に殺される～説教反対！"
10027125-154 = "メ～ル～先～輩～！"
10027125-162 = "（「知識解放戦線」は、そうやって罵り合っていたものの……今回は心配せずに済んだ）"
10027125-166 = "[ns] \"まぁ。\""
10027125-171 = "[ns] \"今日も平和ということで。\""
10027125-173 = "学漫同人物語～２人が求める最終回～"
