[translation]
10027125-5 = "Como esperado…… o Sensei é…… forte……!"
10027125-12 = "[ns] \"Desculpe, Marina. Nós também tivemos nossos motivos.\""
10027125-16 = "Ah~ como esperado, apenas o secretariado não foi o suficiente~#nMesmo com o Sensei ao seu lado, o poder da amizade é incrível, não é?"
10027125-17 = "[s] \"Chefe do Departamento Editorial~ vamos parar por aqui~\""
10027125-18 = "Bem, se perdemos, não há o que fazer. É uma pena, mas vamos nos retirar graciosamente. Sem transferência de manuscritos também."
10027125-19 = "Fico feliz que tenha entendido, que bom……"
10027125-20 = "É só uma questão de pegar o próximo manuscrito."
10027125-21 = "Você ainda não desistiu!?"
10027125-22 = "Você acha mesmo que tudo termina em um final feliz? Que pensamento simplista! Depois que o herói derrota o rei demônio, ainda resta a vida de casado com a princesa, sabe!"
10027125-23 = "De certa forma, pode-se dizer que a batalha real começa depois disso……! Mufufu……!"
10027125-24 = "Não diga coisas assustadoras!?"
10027125-25 = "Ora~ o fato de termos feito uma promessa não desapareceu, certo?#nMeru, você não quebraria uma promessa feita a alguém, quebraria?"
10027125-26 = "Ugh!?"
10027125-27 = "[s] \"Certamente isso é um fato…….\""
10027125-28 = "Bem, o Departamento Editorial vai se retirar por aqui.#nEspero que possamos ter uma conversa mais frutífera na próxima vez."
10027125-30 = "Espero que isso seja algo bom para ambos os lados……."
10027125-38 = "Caso encerrado, então."
10027125-39 = "……embora a culpa seja da sua chefe."
10027125-40 = "A chefe é a chefe, e eu sou eu. Não me coloque no mesmo saco."
10027125-42 = "Bem, voltando ao assunto principal……"
10027125-43 = "[s] \"Finalmente, chegou a hora de ouvir a opinião da Takane…….\""
10027125-45 = "Eh……? E-está tudo bem, Sensei?#nSe ela disser algo ruim……!"
10027125-46 = "Não, ah, quer dizer, deixando o Sensei de lado, acho que o meu psicológico não está nada bem!?"
10027125-47 = "[s1] \"A opinião de terceiros também é…… importante, afinal.\"\n[s2] \"Vamos nos preparar mentalmente…….\""
10027125-50 = "U-ugh……!"
10027125-51 = "Espere um pouco.#nVou respirar fundo…… fuu, haa…… fuu, haa……"
10027125-57 = "O que você acha que eu sou……."
10027125-58 = "Vou começar a ler agora. Por favor, me deixem concentrar por um tempo."
10027125-69 = "……É hora de transmitir minha opinião sincera."
10027125-75 = "Fu, fufu. Eu me esforcei. Eu realmente me esforcei. Mas só porque você se esforça, não significa que terá um bom resultado. Até uma criança do jardim de infância sabe disso hoje em dia. Fu, fufu, fufufu……."
10027125-76 = "Por favor, não se esqueçam de nós…… mesmo que tudo desapareça, que pelo menos fique registrado que um livro existiu aqui, e que pessoas o leram e falaram sobre ele, por favor……."
10027125-78 = "……Isso é um testamento ou algo assim?"
10027125-79 = "Já que a palavra 'tempo' foi mencionada, devo falar sobre isso?#nNão há nada cujo valor seja esquecido tão facilmente quanto o tempo."
10027125-80 = "Nós pensamos e nos preocupamos com o futuro, mas…… pouquíssimas pessoas pensam nisso seriamente."
10027125-81 = "O passado é a mesma coisa. Dizem que o presente é o acúmulo do passado, mas poucas pessoas tentam lembrar do passado como ele realmente foi. Apenas esquecem, embelezam e empurram para o fundo das memórias……"
10027125-82 = "Nesse sentido, talvez o que valorizamos seja apenas o presente, mas o presente não existe. Porque ele é um conceito momentâneo que existe apenas entre o 'futuro' que chega infinitamente e o 'passado' que é constantemente levado pela correnteza."
10027125-83 = "É por isso que histórias que tratam do presente…… devem falar sobre o passado e sobre o futuro. Isso é uma cortesia e um respeito por 'algo' que é fraco contra o esquecimento chamado tempo e que não pode resistir a ele."
10027125-84 = "Nesta história, o passado de 'Luna' é retratado.#nPor isso, é uma história sobre o presente e também sobre o futuro."
10027125-85 = "A narrativa em si é simples. Para dizer de um jeito bom, é segura. Para dizer de um jeito ruim, não tem características marcantes…… mas sinto que vocês lidaram com isso com sinceridade. Esse pode ser considerado o ponto forte desta história."
10027125-86 = "Vamos admitir — foi uma história séria, porém clássica, algo raro nos últimos anos. E então……"
10027125-90 = "……E então……"
10027125-96 = "E então……?"
10027125-97 = "O-o que foi……?"
10027125-99 = "……."
10027125-103 = "[ns3] \"Às vezes, dizem que a honestidade é a maior das virtudes…….\"\n[ns4] \"Porque ela nos liberta…….\""
10027125-106 = "……!"
10027125-107 = "É verdade. Tudo bem! Se o Sensei diz isso……!"
10027125-108 = "……Ehem!"
10027125-109 = "……Foi uma boa história. E se tivessem tido tempo suficiente, #nque obra maravilhosa teria se tornado."
10027125-110 = "Bom trabalho, Frente de Libertação do Conhecimento."
10027125-112 = "Que estranho. #nA avaliação foi diferente do que eu esperava..."
10027125-113 = "Pois é. Acho que essa avaliação é generosa demais para a Mel-senpai."
10027125-115 = "Ora! E olha que eu tomei coragem para contar!"
10027125-116 = "Será que a Momiji acabou de me dar uma alfinetada também!?"
10027125-122 = "Sendo assim, informarei o local e a data do próximo petit-only. Verifiquem seus e-mails mais tarde."
10027125-123 = "Certo. No próximo petit-only de \"Luna\", vou mostrar um lado completamente diferente."
10027125-124 = "Dessa vez, pelo menos, teremos tempo de sobra!"
10027125-125 = "Bem, estarei aguardando, sem grandes expectativas. #nBoa sorte, \"Frente de Libertação do Conhecimento\"."
10027125-129 = "Muito bem, então..."
10027125-130 = "Vamos voltar? Senpai, Sensei!"
10027125-131 = "Vamos nessa! #nAi, hoje vou dormir como uma pedra depois de tanto tempo..."
10027125-132 = "[s] \"Eu tenho certeza de que consigo dormir por dois dias inteiros agora...\""
10027125-133 = "Pensando bem, desta vez..."
10027125-134 = "A Mel-senpai tentou desenhar o volume final de \"Luna\" por mim..."
10027125-135 = "Eu... achei isso incrível, na verdade... #nNa verdade, fiquei muito feliz..."
10027125-136 = "Hehe! Viu só? #nOlhando para trás, tudo vira uma boa lembrança!"
10027125-137 = "Se o resultado é bom, tudo está bem! Um final feliz, feliz!"
10027125-138 = "...Você nem me deixou terminar de falar o que eu achava. #nA Mel-senpai é mesmo muito apressada..."
10027125-139 = "Você disse \"se o resultado é bom, tudo está bem\", mas o caminho até lá foi um caos! Você até envolveu o Sensei e o fez ajudar com o manuscrito por quatro dias!"
10027125-140 = "E-eu só dei a ele a chance de vivenciar o cotidiano de uma mangaká perto do prazo final!"
10027125-141 = "Isso por si só já é um incômodo!"
10027125-142 = "F-foi tudo com consentimento, viu!"
10027125-143 = "Mesmo assim, existem limites para o que se pode fazer!"
10027125-144 = "Mel-senpai, reflita sobre isso! #nVocê tem noção de quanto trabalho deu ao Sensei...!?"
10027125-145 = "Mas eu também tive muito trabalho!?"
10027125-146 = "Isso é problema seu! Além disso, eu também tive muito trabalho, sabia?"
10027125-150 = "[ns] \"Bem, eu fiquei bem...?\""
10027125-151 = "Mesmo que o Sensei esteja bem, eu não estou! Vamos, sente-se ali, Mel-senpai! Hoje é dia de sermão!"
10027125-152 = "Aaaaah, vou ser morta pela minha kouhai! Nada de sermão!"
10027125-154 = "Me~l-senpa~i!"
10027125-162 = "(A \"Frente de Libertação do Conhecimento\" continuava discutindo daquele jeito... mas, desta vez, não precisei me preocupar.)"
10027125-166 = "[ns] \"Bem.\""
10027125-171 = "[ns] \"Mais um dia de paz, então.\""
10027125-173 = "Histórias de Mangás Escolares ~O Final que as Duas Buscam~"
