[translation]
1000703-1 = "Hack suspeito"
1000703-2 = "Mercado Negro - Entrada"
1000703-6 = "Ninguém está olhando, né...?#nEste lugar é um pouco escuro..."
1000703-7 = "Eu também não queria ter vindo até aqui, mas...#nNão tem jeito, preciso fazer isso para executar aquele plano."
1000703-8 = "Já trouxe o software que preparei com antecedência...#nBem, vamos dar início ao plano?"
1000703-11 = "[s] Estou um pouco preocupado, vou seguir a Maki."
1000703-13 = "Beleza, consegui me conectar ao programa de controle que acessa os quiosques desta área...#nAgora é só instalar o software que preparei."
1000703-14 = "Primeiro, vou executar o software que portei para rodar nesta versão...!"
1000703-16 = "(Bip)"
1000703-19 = "Loja de conveniência perto do Mercado Negro"
1000703-22 = "Bem-vindo."
1000703-23 = "Por favor, esquente um bento de bulgogi para mim."
1000703-24 = "Certo, por favor, aproxime seu cartão daquele terminal para pagar."
1000703-32 = "Q-que isso?#nPor que um jogo retrô apareceu de repente na tela do terminal...?"
1000703-33 = "O que é isso?#nUm demônio que parece ter vindo do espaço apareceu na tela!?"
1000703-34 = "P-por favor, mantenha a calma, cliente!#nIsso provavelmente é só um jogo..."
1000703-35 = "O que é isso afinal?#nEu não consigo comprar meu bento sem jogar esse jogo?"
1000703-36 = "Não, é um erro que eu também estou vendo pela primeira vez...#nNão faço ideia."
1000703-37 = "Não pode ser, com o terminal nesse estado, como vou pagar pelo bento..."
1000703-39 = "Ahaha! Eles estão confusos, estão confusos.#nComo esperado, \"BOOM\" é o melhor!"
1000703-40 = "[s] \"...O que você está fazendo?\""
1000703-41 = "Ué!? Sensei?#nDesde quando você estava olhando?"
1000703-42 = "O que estou fazendo?#nDá para ver, não dá?"
1000703-43 = "Hackeei o terminal da loja de conveniência e instalei o BOOM nele!"
1000703-44 = "...Hm? Será que o Sensei não conhece o BOOM?"
1000703-45 = "\"BOOM\" é um dos maiores clássicos entre os jogos retrô, uma obra-prima de ação!"
1000703-46 = "É um jogo onde o \"Policial Espacial Boomguy\" usa uma espingarda gigante para repelir alienígenas. Entre os hackers, o \"Desafio BOOM\", que consiste em instalar esse jogo em todo tipo de dispositivo, está super na moda!"
1000703-47 = "Não só em smartphones, mas em terminais de loja como este, painéis eletrônicos e até calculadoras!#nSe for um dispositivo de computador com monitor, dá para instalar o BOOM em qualquer lugar!"
1000703-48 = "E aí? Incrível, né, Sensei?"
1000703-49 = "[s] \"Todo mundo está com problemas, brincadeiras exageradas não são legais.\""
1000703-50 = "Mas...#nÉ tão divertido ver essas reações, seria um desperdício parar por aqui."
1000703-51 = "Deixa ver, o próximo será o painel eletrônico da Rodovia KV com o BOOM..."
1000703-52 = "[s] \"Se você não parar, eu vou ficar realmente bravo.\""
1000703-53 = "Ugh... Entendi.#nNão quero ver o Sensei bravo, então vou me contentar com isso por hoje."
1000703-56 = "Poxa, eu só queria fazer algo chamativo e legal,#nmas o Sensei diz não toda vez..."
1000703-57 = "Algo chamativo e legal que não incomode os outros...?#nSerá que existe algo assim?"
1000703-58 = "[s] \"Que tal fazer algo que todo mundo goste?\""
1000703-59 = "Algo que todo mundo goste? Será que existe...?"
1000703-60 = "Já sei! Então, da próxima vez, vou exibir vídeos relaxantes que curam a alma de quem assiste!"
1000703-61 = "[s] \"Eu disse que não pode incomodar os outros...\""
