[translation]
1000703-1 = "怪しいハッキング"
1000703-2 = "ブラックマーケット・入口"
1000703-6 = "誰にも見られてないよね……？#nこの辺、ちょっと薄暗いな……。"
1000703-7 = "あたしもこんなところまで来たくはなかったけど……#n例の計画を実行するためには仕方ないし。"
1000703-8 = "あらかじめ用意してたソフトウェアも持ってきたし……。#nさて、計画始動と行こうか？"
1000703-11 = "[s] なんとなく不安だから、マキについていこう。"
1000703-13 = "よし、この周辺のキオスク端末にアクセスできる制御プログラムにも接続できたし……#nあとは用意したソフトウェアを入れるだけかな。"
1000703-14 = "まずは、このバージョンで作動するようポーティングしたソフトを実行させて……！"
1000703-16 = "（ピーッ）"
1000703-19 = "ブラックマーケット付近のコンビニ"
1000703-22 = "いらっしゃいませ。"
1000703-23 = "プルコギ弁当をひとつ、温めてください。"
1000703-24 = "はい、お会計はそちらの端末にカードをかざしてください。"
1000703-32 = "な、なに？#n端末の画面に、急にレトロゲームが……？"
1000703-33 = "な、何だこれ？#n画面に、宇宙から来たみたいな、悪魔？が出てきた！？"
1000703-34 = "お、落ち着いてください、お客様！#nこれはおそらく、ただのゲームかと……。"
1000703-35 = "こ、これは何なんですか？#nこのゲームをプレイしないとお弁当を買えないんですか？"
1000703-36 = "いえ、私も初めて見るエラーで……#nよく分かりません。"
1000703-37 = "そんな、端末がこの状態で、お弁当の会計はどうすれば……。"
1000703-39 = "あははっ！困ってる困ってる。#nやっぱり「BOOM」は最高！"
1000703-40 = "[s] \"……何してるの？\""
1000703-41 = "うわっ！？先生？#nいつから見てたの？"
1000703-42 = "何をしてるかって？#n見ればわかるでしょ？"
1000703-43 = "コンビニの店頭端末をハッキングして、そこにBOOMをインストールしたの！"
1000703-44 = "……ん？もしかして先生、BOOMを知らない？"
1000703-45 = "「BOOM」はね、レトロゲームの中でも最高傑作の一つとされている名作アクションゲームだよ！"
1000703-46 = "「宇宙警察ブームガイ」が、巨大な散弾銃を手に宇宙人を撃退していくゲームなんだけど。ハッカーたちの間で今、このゲームをあらゆる機器にインストールする「BOOMチャレンジ」が大流行してるの！"
1000703-47 = "スマホはもちろんのこと、こういう店頭端末とか、電光掲示板、計算機にまで！#nモニターが存在するコンピューター機器なら、どこでもBOOMがインストールできるの！"
1000703-48 = "どう？すごいでしょ、先生。"
1000703-49 = "[s] \"みんな困ってるでしょ、行き過ぎたいたずらはダメ。\""
1000703-50 = "でも……#nせっかくこうやって面白い反応が見られるのに、これだけでもう終わりっていうのはちょっともったいないじゃん。"
1000703-51 = "どれどれ、次はKVハイウェイの電光掲示板にBOOMを……。"
1000703-52 = "[s] \"止めないと本当に怒るよ？\""
1000703-53 = "うっ……分かった。#n先生が怒るのは見たくないから、今日はこれくらいで我慢する。"
1000703-56 = "もう、あたしは派手で目立つカッコいいことがしたいのに、#n先生は毎回ダメって言うし……。"
1000703-57 = "他の人に迷惑をかけなくて、派手でカッコいいこと……？#nそんなのあるの？"
1000703-58 = "[s] \"みんなが好きそうなことをするのはどう？\""
1000703-59 = "みんなが好きそうなこと？そんなのあるかな……。"
1000703-60 = "そうだ！そしたら次は、見てるだけで心が癒されるヒーリング映像を流す！"
1000703-61 = "[s] \"だから、他の人に迷惑をかけるのはダメだって……。\""
