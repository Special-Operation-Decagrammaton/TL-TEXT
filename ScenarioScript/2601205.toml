[translation]
2601205-1 = "総合救護実習"
2601205-3 = "来てくださったのですね、先生！"
2601205-4 = "ライフセーバーの資格を取るために、ここまで頑張ってきた成果……。"
2601205-5 = "先生にお見せできるとは、光栄です！"
2601205-6 = "[s1] \"うん、期待してるね。\"\n[s2] \"早く見たい！\""
2601205-9 = "期待していてください！"
2601205-10 = "では、落水者を想定した5kgの重りを水中に投げてください！"
2601205-11 = "思いっきり投げてもらっても、大丈夫です！"
2601205-15 = "[ns] \"ほっ！\""
2601205-19 = "落水者を発見しました！#nライフセーバーキリノ、出動します！"
2601205-25 = "[ns] （早く重りを引き上げないと……！）"
2601205-26 = "ぷはっ！"
2601205-27 = "げほ、げほっ！"
2601205-28 = "[s3] （何だか……）\n[s4] （相変わらず不安だ……）"
2601205-32 = "ぷはぁっ！"
2601205-33 = "か、体が思うように動きませんね……。"
2601205-35 = "心肺蘇生法は、しっかりお任せください！"
2601205-36 = "よしっ！"
2601205-44 = "[ns5] \"ちょ、ちょっと力が強すぎるんじゃない？\"\n[ns5] \"模型がかわいそうなことになってるけど……。\""
2601205-48 = "いえ、これくらい圧迫しないと、血液がちゃんと循環しませんから！"
2601205-49 = "はっ！はっ！はっ！はっ！"
2601205-50 = "[s] \"キリノ、ちょっと落ち着い……。\""
2601205-55 = "[ns] \"あっ！？\""
2601205-58 = "先生！！"
2601205-64 = "[wa:730]― [log=키리노 수영복]先生！[/log]"
2601205-65 = "[wa:1070]― [log=키리노 수영복]大丈夫ですか！？[/log]"
2601205-68 = "[wa:730]― [log=키리노 수영복]よかった……[wa:1870]目が覚めたんですね。[/log]"
2601205-69 = "[wa:1870]― [log=키리노 수영복]大変なことになってしまったのかと[wa:1120]思いました。[/log]"
2601205-72 = "― [log=키리노 수영복]心肺蘇生法は……[/log]"
2601205-73 = "[wa:1840]― [log=키리노 수영복]必要なさそうですね。[/log]"
2601205-76 = "[ns7] \"ありがとう、キリノ。\"\n[ns8] \"ごめんね、もう大丈夫だよ。\""
2601205-79 = "[wa:730]― [log=키리노 수영복]水辺では、[wa:890]常に周囲の状況に[wa:1580]注意を払う必要があります！[/log]"
2601205-82 = "― [log=키리노 수영복]どんなに泳ぎに自信がある人でも、[/log]"
2601205-83 = "[wa:2010]― [log=키리노 수영복]不測の事態はいつでも[wa:930]起こりうるからです。[/log]"
2601205-86 = "[wa:900]― [log=키리노 수영복]もちろん、[wa:790]本官のようなライフセーバーがいれば[wa:1970]問題ないのですが！[/log]"
2601205-89 = "[wa:630]― [log=키리노 수영복]本官がいつも見守っているので[wa:1810]ご安心ください！[/log]"
2601205-93 = "訓練は中途半端に終わってしまいましたが……。"
2601205-94 = "ふう、何事もなくて良かったです。"
2601205-95 = "結局、重りは引き上げられませんでしたし、#n模型は壊してしまいましたね……。"
2601205-96 = "訓練の成果を見せるはずだったのに、こんなことになるとは……。"
2601205-97 = "[s] \"訓練の成果なら、充分見られたよ。\""
2601205-98 = "それは、どういう……？"
2601205-99 = "[s] \"私のこと、ちゃんと助けてくれたよね。\""
2601205-103 = "[ns] \"ライフセーバーとして成長した証だよ。\""
2601205-104 = "ほ、本官は無我夢中で水に飛び込んだだけで……！"
2601205-105 = "……あれ。#n重りより重いはずの先生を引き上げられたってことは……。"
2601205-109 = "本官、成長していたのかもしれません。"
2601205-110 = "いつの間にか、ライフセーバーとしての一歩を進んでいたようです！"
2601205-111 = "ありがとうございます、先生！#nおかげで最後まで訓練ができました！"
2601205-116 = "これからは、ライフセーバーキリノとお呼びください！"
