[translation]
2601205-1 = "Treinamento Geral de Salvamento"
2601205-3 = "Você veio, Sensei!"
2601205-4 = "Este é o resultado de todo o meu esforço para obter a certificação de salva-vidas..."
2601205-5 = "É uma honra poder mostrar isso a você, Sensei!"
2601205-6 = "[s1] \"Sim, estou ansioso por isso.\"\n[s2] \"Quero ver logo!\""
2601205-9 = "Pode ficar na expectativa!"
2601205-10 = "Então, por favor, jogue o peso de 5kg na água, simulando uma pessoa se afogando!"
2601205-11 = "Pode jogar com toda a força, não tem problema!"
2601205-15 = "[ns] \"Hah!\""
2601205-19 = "Vítima de afogamento localizada!#nSalva-vidas Kirino, em ação!"
2601205-25 = "[ns] (Preciso puxar o peso logo...!)"
2601205-26 = "Puh!"
2601205-27 = "Cof, cof!"
2601205-28 = "[s3] (De alguma forma...)\n[s4] (Continuo preocupado...)"
2601205-32 = "Puh!"
2601205-33 = "O-o meu corpo não está se movendo como eu queria..."
2601205-35 = "Pode deixar a reanimação cardiopulmonar comigo!"
2601205-36 = "Isso!"
2601205-44 = "[ns5] \"Ei, a força não está um pouco exagerada?\"\n[ns5] \"O boneco de treino está ficando em um estado deplorável...\""
2601205-48 = "Não, se eu não pressionar com essa força, o sangue não circulará corretamente!"
2601205-49 = "Hah! Hah! Hah! Hah!"
2601205-50 = "[s] \"Kirino, tente se acalmar...\""
2601205-55 = "[ns] \"Ah!?\""
2601205-58 = "Sensei!!"
2601205-64 = "[wa:730]― [log=키리노 수영복]Sensei![/log]"
2601205-65 = "[wa:1070]― [log=키리노 수영복]Você está bem!?[/log]"
2601205-68 = "[wa:730]― [log=키리노 수영복]Que bom... [wa:1870]você acordou.[/log]"
2601205-69 = "[wa:1870]― [log=키리노 수영복]Eu pensei que algo [wa:1120]terrível tinha acontecido.[/log]"
2601205-72 = "― [log=키리노 수영복]A reanimação cardiopulmonar...[/log]"
2601205-73 = "[wa:1840]― [log=키리노 수영복]parece que não será necessária.[/log]"
2601205-76 = "[ns7] \"Obrigado, Kirino.\"\n[ns8] \"Desculpe, já estou bem.\""
2601205-79 = "[wa:730]― [log=키리노 수영복]Perto da água, [wa:890]é preciso estar sempre [wa:1580]atento ao que acontece ao redor![/log]"
2601205-82 = "― [log=키리노 수영복]Não importa o quanto alguém confie em suas habilidades de natação,[/log]"
2601205-83 = "[wa:2010]― [log=키리노 수영복]imprevistos podem acontecer [wa:930]a qualquer momento.[/log]"
2601205-86 = "[wa:900]― [log=키리노 수영복]Claro, [wa:790]se houver uma salva-vidas como eu por perto, [wa:1970]não há problema![/log]"
2601205-89 = "[wa:630]― [log=키리노 수영복]Eu estarei sempre vigiando, [wa:1810]então fique tranquilo![/log]"
2601205-93 = "O treinamento acabou sendo interrompido..."
2601205-94 = "Ufa, ainda bem que nada de grave aconteceu."
2601205-95 = "No fim, não consegui puxar o peso e#nainda quebrei o boneco de treino..."
2601205-96 = "Eu deveria ter mostrado os resultados do meu treinamento, mas olha só o que aconteceu..."
2601205-97 = "[s] \"Os resultados do treinamento foram bem visíveis, sim.\""
2601205-98 = "O que quer dizer com isso...?"
2601205-99 = "[s] \"Você me salvou direitinho, não foi?\""
2601205-103 = "[ns] \"É a prova de que você cresceu como salva-vidas.\""
2601205-104 = "E-eu só pulei na água sem pensar...!"
2601205-105 = "...Espere.#nSe eu consegui puxar o Sensei, que é mais pesado que o peso..."
2601205-109 = "Talvez eu tenha evoluído."
2601205-110 = "Parece que, sem perceber, dei um passo adiante como salva-vidas!"
2601205-111 = "Obrigada, Sensei!#nGraças a você, consegui completar o treinamento até o fim!"
2601205-116 = "De agora em diante, pode me chamar de Salva-vidas Kirino!"
