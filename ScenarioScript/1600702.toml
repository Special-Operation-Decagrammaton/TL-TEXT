[translation]
1600702-1 = "Mentiras e mal-entendidos"
1600702-2 = "Perto do Schale - Grande Centro Comercial"
1600702-4 = "（Terminando as compras em segurança...）"
1600702-6 = "Muito obrigada. Graças a você, consegui terminar minhas compras sem me perder nem um pouco."
1600702-7 = "Embora este seja um centro comercial familiar para o Sensei, a sua habilidade de calcular instantaneamente a rota mais curta apenas com as minhas necessidades e percorrer as lojas com tanta eficiência..."
1600702-8 = "Como esperado do Sensei do Schale, em quem todos os alunos de Kivotos confiam."
1600702-9 = "[s1] \"Foi só uma orientação, mas fico feliz que tenha ajudado.\"\n[s2] \"Fico até sem jeito ouvindo isso...\""
1600702-10 = "De forma alguma. Afinal, julgamento rápido e preciso e a capacidade de percepção espacial são habilidades indispensáveis para comandar um grande número de pessoas..."
1600702-11 = "De forma alguma. Afinal, julgamento rápido e preciso e a capacidade de percepção espacial são habilidades indispensáveis para comandar um grande número de pessoas..."
1600702-12 = "Eu adoraria que você ensinasse isso aos executivos da nossa secretaria."
1600702-13 = "Eu, Tomoe, fiquei mais uma vez impressionada com a excelência das suas habilidades, Sensei."
1600702-14 = "[s] \"Você é muito boa em elogiar, Tomoe.\""
1600702-15 = "Fufu, ainda tenho muitos pontos a melhorar, mas... bem, é verdade."
1600702-16 = "Como chefe da secretaria que serve à Presidente Cherino, tenho muitas oportunidades de dialogar com vários alunos. Talvez minha oratória tenha sido treinada lá."
1600702-17 = "De qualquer forma, hoje você me ajudou muito, Sensei. Se não se importar, gostaria de retribuir o favor."
1600702-18 = "Na verdade, vi um café com um ambiente elegante ali há pouco... Oh?"
1600702-23 = "……Aquele é o famoso Sensei do Schale?"
1600702-24 = "Parece que sim, embora pela aparência não pareça tanto..."
1600702-25 = "Mas, se não me engano, o Sensei do Schale não é tão forte a ponto de parar um tanque com as mãos nuas? Dizem que a personalidade dele é terrível e que os clubes que o desafiaram simplesmente desapareceram no dia seguinte."
1600702-26 = "Entendo, então é por isso que nem os alunos mais fortes das academias ousam desafiá-lo..."
1600702-27 = "Realmente, não dá para julgar apenas pela aparência..."
1600702-28 = "……De alguma forma, ouvi coisas que não posso deixar passar."
1600702-29 = "Por que existem rumores assim..."
1600702-30 = "[s3] \"Acho que tem muitos mal-entendidos misturados aí...\"\n[s4] \"A primeira parte deve ser sobre o que aconteceu semana passada.\""
1600702-31 = "Oh, você tem alguma ideia do porquê?"
1600702-32 = "Oh, você tem alguma ideia do porquê?"
1600702-33 = "Se não for um incômodo, poderia me contar?"
1600702-34 = "Dependendo do conteúdo, talvez eu possa ser útil ao Sensei."
1600702-36 = "（Contei para a Tomoe sobre o que aconteceu na semana passada.）"
1600702-38 = "……Entendo. Então, na semana passada, você ajudou os alunos de plantão do Schale a subjugar uns delinquentes. E, por algum motivo, essa história ganhou proporções exageradas, resultando no boato de que \"o Sensei derrotou os delinquentes sozinho\"... é isso?"
1600702-39 = "E por causa disso, aquelas pessoas estão enganadas, achando que o Sensei é um \"ser de força sobre-humana e cruel\"..."
1600702-40 = "[s] \"Eu sozinho não conseguiria fazer algo assim...\""
1600702-41 = "Não, não, não precisa ser tão modesto. Mesmo que os alunos tenham lutado de fato, o papel de comandar e tomar decisões é do Sensei. Como diz o ditado: 'Não há soldados fracos sob um general corajoso'."
1600702-42 = "Portanto, não é exagero dizer que foi o Sensei quem derrotou os delinquentes."
1600702-43 = "Acho que o Sensei [USERNAME] deveria se orgulhar ainda mais disso."
1600702-44 = "Mas, deixando isso de lado... se fossem bons rumores, tudo bem, mas ser mal interpretado como um brutamontes incontrolável..."
1600702-45 = "Isso é algo que não posso deixar passar."
1600702-46 = "[s5] \"...Ei, Tomoe?\"\n[s6] \"Você não está pensando em ir falar com eles diretamente, está...?\""
1600702-47 = "Nessas horas, um discurso é eficaz."
1600702-48 = "Não, tentar desfazer os mal-entendidos um por um seria ineficiente."
1600702-49 = "Nessas horas, um discurso é eficaz."
1600702-50 = "Se eu falar sinceramente do palanque daquela praça que vemos daqui, muitas pessoas notarão e ouvirão, e os rumores certamente desaparecerão rapidamente."
1600702-51 = "Então, vamos começar... imediatamente!"
1600702-57 = "（Tomoe subiu no palanque e começou a falar）"
1600702-58 = "Olá a todos, que tarde maravilhosa."
1600702-59 = "De repente, decidi que hoje, neste lugar... vou revelar uma certa verdade."
1600702-60 = "Ultimamente, vocês devem ter ouvido falar muito sobre as atividades do Schale. Acho que ouviram várias histórias, algumas até contraditórias. Não acham estranho às vezes?"
1600702-61 = "Por exemplo, que o Sensei destruiu um trem com as mãos nuas, ou que ele desvia balas com reflexos sobre-humanos e força bruta, ou que, durante o combate, ele lambia os pés dos alunos por algum motivo..."
1600702-62 = "No entanto, tudo isso são \"boatos\" que não contêm nem um pingo de verdade!"
1600702-63 = "Hã, boatos...? E tudo isso...?"
1600702-64 = "Sim, exatamente!"
1600702-65 = "Como prova disso..."
1600702-66 = "Vocês sabiam que o Sensei é tão fraco que mal consegue levantar um par de hashis?"
1600702-67 = "Hã?"
1600702-68 = "Como é?"
1600702-69 = "[s] \"...Hã?\""
1600702-70 = "É difícil aceitar uma verdade inesperada... Eu entendo como vocês se sentem."
1600702-71 = "Vou explicar agora os motivos e episódios que tornam isso digno de confiança!"
1600702-73 = "(...E assim, Tomoe continuou a enfatizar o quão fraco eu sou.)"
1600702-75 = "...Em suma, o Sensei é uma pessoa tão fraca que nem consegue mover o próprio corpo direito sozinho!"
1600702-76 = "E-era isso então... Bem, agora tudo faz sentido..."
1600702-77 = "Afinal, se ele é tão fraco assim, não teria como subjugar aqueles valentões. Então, a história de que ele tem uma personalidade cruel e uma força sobre-humana era mentira."
1600702-78 = "[s7] \"Parece que o mal-entendido anterior foi resolvido, mas...\"\n[s8] \"Sinto que um novo mal-entendido surgiu...\""
1600702-79 = "Cobrir uma mentira com outra ainda maior para desviar a atenção é o básico da propaganda."
1600702-80 = "Cobrir uma mentira com outra ainda maior para desviar a atenção é o básico da propaganda."
1600702-81 = "Além disso, como o mal-entendido inicial foi resolvido, os novos mal-entendidos serão mais fáceis de desfazer do que os anteriores."
1600702-82 = "[s] \"Entendi...?\""
1600702-84 = "[s] \"Deixando isso de lado, foi uma história extremamente convincente...\""
1600702-85 = "Fufu, ouvir isso do próprio interessado... Talvez minha oratória seja realmente boa."
1600702-91 = "A propósito, Sensei, você vai conseguir continuar vivendo sendo tão fraco assim?"
1600702-92 = "Desculpe por acreditar naqueles boatos estranhos. Não que seja um pedido de desculpas, mas vou embrulhar bastante carne daqui para você levar e comer bastante no Schale!"
1600702-93 = "Ei, leve um pouco de enguia também!"
1600702-94 = "[s] \"Ah, muito obrigado. É muita coisa...\""
1600702-95 = "Você não vai aguentar comendo tão pouco, precisa se alimentar bem!"
1600702-96 = "Vamos, já que estamos aqui, leve este frango e este udon também! É melhor você fazer um chanko nabe!"
1600702-98 = "E assim, graças ao discurso de Tomoe, embora o mal-entendido de que eu era um \"indivíduo de personalidade cruel e força sobre-humana\" tenha sido resolvido..."
1600702-99 = "Acabei recebendo vários presentes de comida dos lojistas, acompanhados de um novo mal-entendido."
