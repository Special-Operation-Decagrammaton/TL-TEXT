[translation]
2600405-1 = "Em busca de tesouros"
2600405-2 = "Você veio, Sensei! É por aqui!"
2600405-3 = "……Ah? O que houve?"
2600405-4 = "Ah, não tem ninguém aqui apesar de ser dia porque hoje é dia de folga da biblioteca."
2600405-5 = "A biblioteca também precisa de um descanso. Temos que organizar as coisas e cuidar de várias tarefas."
2600405-6 = "Mas, deixando isso de lado, o motivo de eu ter chamado o Sensei hoje é……!"
2600405-7 = "É isto aqui!!"
2600405-8 = "[s1] \"Um leitor de código de barras?\"\n[s2] \"U-uma arma de fogo!?\""
2600405-9 = "Exatamente! Como esperado do Sensei, você já conhece!"
2600405-10 = "N-não é isso! É verdade que parece, mas é um leitor de código de barras!"
2600405-11 = "Se você apontar para o livro assim……"
2600405-13 = "Bip! Número de registro 00002853, \"Efeitos e Métodos de Preparo da Artemísia\"."
2600405-14 = "……É uma máquina que lê automaticamente as informações dos livros desse jeito."
2600405-15 = "Como vamos fazer uma caça ao tesouro com isso……? O que vamos fazer agora, para ser exata, é uma \"caça a livros raros\"."
2600405-16 = "Como esta é uma biblioteca pública onde alunos de todas as escolas se reúnem, a escala é bem grande……"
2600405-17 = "Por causa disso, não dá para dizer que o gerenciamento dos livros está perfeito."
2600405-18 = "Parece que existem até livros que foram colocados nas prateleiras sem nem terem sido registrados como livros da biblioteca……"
2600405-19 = "Existem centenas de livros acumulados desse jeito!"
2600405-20 = "……Eh?"
2600405-21 = "Parece muito divertido……? Ah, ahaha, talvez seja mesmo……"
2600405-22 = "Desculpe, mesmo que não tenha ninguém aqui, acabei falando alto demais."
2600405-23 = "Mas, se existe essa quantidade de livros não registrados……"
2600405-24 = "Pode ser que, entre eles, existam livros místicos e raros que nunca vimos ou ouvimos falar antes!"
2600405-25 = "Só de pensar que pode haver livros assim, não consigo conter a empolgação!!"
2600405-26 = "……Ah."
2600405-27 = "D-desculpe, comecei a falar sozinha de novo……"
2600405-28 = "De, de qualquer forma! Por isso, pensei que não seria legal fazer sozinha, então pedi para o Sensei vir procurar comigo."
2600405-29 = "……É um pouco tarde para perguntar, mas Sensei, você estava livre? Por acaso, eu não te forcei a vir, forcei……?"
2600405-30 = "Pensando bem agora, parece que eu te chamei só para te fazer trabalhar……"
2600405-31 = "C-claro que, para mim, não é trabalho, é algo divertido, mas não significa que seja o mesmo para o Sensei……!"
2600405-32 = "[s3] \"Parece divertido!\"\n[s4] \"É uma caça ao tesouro! Não tem como eu recusar!\""
2600405-33 = "Ah, muito obrigada! Como esperado do Sensei, um adulto que não esqueceu o espírito de criança!"
2600405-34 = "Ah, muito obrigada! Como esperado do Sensei, um adulto que não esqueceu o espírito de criança!"
2600405-37 = "(Enquanto dizia isso, Shimiko me entregou um leitor de código de barras também)"
2600405-39 = "(E então, como um peixe na água, ela começou a procurar pelos livros não registrados com passos alegres)"
2600405-41 = "(Passamos o dia inteiro percorrendo a biblioteca, e o número de livros verificados superou as expectativas de Shimiko, chegando a mais de mil)"
2600405-43 = "……"
2600405-44 = "Isso é……"
2600405-45 = "É muita coisa, não importa como se olhe…… e tem muitos livros duplicados também……"
2600405-46 = "Apesar disso, não encontramos aquele livro desconhecido que eu esperava…… eram todos livros que eu já conhecia."
2600405-47 = "Hum, provavelmente, são coisas que alunos que visitaram aqui esqueceram por descuido……"
2600405-48 = "Ou livros que as pessoas não sabiam como descartar e acabaram colocando nas prateleiras, parece que a maioria é assim."
2600405-49 = "……"
2600405-50 = "De alguma forma…… foi um resultado bem realista, longe de uma caça ao tesouro."
2600405-51 = "Haa……"
2600405-52 = "Desculpe, Sensei. Eu disse que era uma caça ao tesouro, mas acabou sendo apenas trabalho braçal."
2600405-53 = "[s5] \"Não, foi muito divertido.\"\n[s6] \"E foi gratificante também.\""
2600405-54 = "Eh……?"
2600405-55 = "Eh……?"
2600405-56 = "É verdade……? Mesmo que a gente tenha passado o dia inteiro apenas organizando livros……"
2600405-57 = "Eh, você encontrou um tesouro!? O-onde ele estava!?"
2600405-58 = "……Eh?"
2600405-59 = "……Eu?"
2600405-60 = "Uma expressão feliz……?"
2600405-61 = "……."
2600405-62 = "……！！"
2600405-63 = "O-o que você está dizendo!? P-por favor, não diga coisas estranhas de repente!!"
2600405-64 = "Mesmo para mim, é constrangedor ouvir algo assim diretamente……! Sério, chega……!"
2600405-65 = "Sensei, você realmente, chega……!"
2600405-66 = "……."
2600405-67 = "……Fufu."
2600405-68 = "Ahahaha! Tudo bem, vamos deixar por isso mesmo."
2600405-69 = "Mas, por você ter dito isso, me sinto um pouco mais leve. Obrigada, Sensei."
2600405-70 = "Além disso……."
2600405-71 = "Pensando bem, talvez eu também tenha acabado de encontrar um agora."
2600405-72 = "……Encontrei algo muito bom."
2600405-73 = "Está curioso?"
2600405-74 = "……Fufu. É segredo."
2600405-76 = "(Após dizer isso, Shimiko voltou à sua atmosfera habitual e começou a organizar os livros novamente)"
2600405-77 = "(Depois de ajudar Shimiko a organizar os livros por um tempo, deixei a biblioteca)"
