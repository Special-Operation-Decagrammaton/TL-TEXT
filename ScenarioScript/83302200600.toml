[translation]
83302200600-6 = "もしもし、先生。ちょうど聞きたいことがあったの。"
83302200600-7 = "[ns] \"美食研究会がフウカを誘拐したんだって？\""
83302200600-8 = "さすが、情報が早いね。もう掴んでいたなんて。"
83302200600-9 = "[ns] \"そこで、ヒナに助けてもらいたいんだけど……\""
83302200600-10 = "うん、最初からそのつもりだった。"
83302200600-11 = "じゃあ先生、美食研究会の居場所も分かったりする？"
83302200600-18 = "ありがとう、すぐ現場に向かう。"
