[translation]
1003203-1 = "正月には正月らしく！"
1003203-3 = "（ムツキと約束した場所に到着すると、既に人だかりができていた）"
1003203-8 = "あっ、先生～！"
1003203-9 = "くふふっ、遅れずにちゃーんと来たね？"
1003203-10 = "先生もしかしたら仕事で忙しくて、ぐすっ、来てくれないんじゃないかなって……思ったり思わなかったり？"
1003203-11 = "[s] \"せっかくムツキと、お出かけの約束をしたからにはね。\""
1003203-12 = "あはっ。"
1003203-13 = "ふーん、そうなんだ～？"
1003203-14 = "ところでやっぱりお正月だね、人の数がすごーい。"
1003203-15 = "んー……何だかもう疲れたし、ちょっと飽きてきたかも？"
1003203-16 = "[s] \"今来たばっかりじゃ……？\""
1003203-17 = "くふふっ、冗談冗談～。じゃあ、中の方に行こっか？"
1003203-18 = "先生、どうしたの？え、ここに来た理由？"
1003203-19 = "それはもちろんモモトークで言った通り、お願いごと！ここは特に、絵馬が可愛いって有名なこともあって！"
1003203-20 = "せっかくのお正月だし、お正月らしいことを楽しまないとなって思って♪"
1003203-24 = "ほらほら、こうしてる場合じゃないよ。早く行こっ、先生！"
1003203-30 = "（ムツキに引っ張られるようにして、中の方へと入っていく）"
1003203-34 = "……。"
1003203-38 = "ん～～～……"
1003203-39 = "あーもー、息苦しい～～！"
1003203-40 = "いっそのこと今ここで爆弾を使えば、スッキリするんじゃ……？"
1003203-41 = "[s] \"それはやめておこう！？\""
1003203-42 = "あはっ、冗談だよーもう先生ったら。"
1003203-43 = "いくら私でも、時と場所は選ぶって！"
1003203-47 = "……時と場所、今な気がしてきちゃった。"
1003203-48 = "[s] \"もう少し、もう少しだから！\""
1003203-49 = "（そうして何とかムツキを宥めつつ……）"
1003203-50 = "あら、失礼。"
1003203-51 = "あっ――"
1003203-52 = "[s] \"ムツキっ！\""
1003203-60 = "せ、先生……。"
1003203-61 = "[s] \"大丈夫？怪我は？\""
1003203-62 = "わ、私は大丈夫だけど、その……。"
1003203-63 = "そんなに情熱的に、手を握られると……。"
1003203-64 = "……くふふっ♪もしかして先生、こうやって私と大接近して、手を握るチャンスをずっと狙ってたり～？"
1003203-69 = "あははっ、そんなに慌てて離れなくても良いのに～。"
1003203-70 = "うん。でもまあ先生のおかげで、イライラは無くなったかな？"
1003203-71 = "まあさっきぶつかってきた人に爆弾をプレゼントすれば、もっとスッキリしそうだけど。"
1003203-72 = "[s] \"やめておこうね……。\""
1003203-73 = "くふふっ♪"
1003203-74 = "あっ、次私たちの番だよ、先生！"
1003203-79 = "この絵馬に願い事を書いて、あそこにかければいいんだって。"
1003203-80 = "それじゃ、書こっか？"
1003203-81 = "[s1] （今年一年、平和でありますように……）\n[s2] （今年も楽しいことがたくさんありますように……）"
1003203-82 = "先生、もう書いた？"
1003203-83 = "くふふっ……！"
1003203-87 = "何書いたか見ーせてっ！"
1003203-88 = "[s3] \"ちょっ、ムツキ！？\""
1003203-89 = "あはっ、これこそが今日最大の目的！先生が何を願うのか、見てみたいなーって！"
1003203-90 = "くふふっ、私の手のひらからは逃れられないんだから～♪"
1003203-91 = "やっ、はっ、それっ！あははっ！"
1003203-96 = "先生の絵馬ゲット～♪願い事は一体何なのかな～？"
1003203-100 = "んー……？「今年一年、平和でありますように」？"
1003203-101 = "えー、つまんな～い……。"
1003203-102 = "あーあ、先生ならもっと世俗的で～、腹黒くって～"
1003203-103 = "欲望に塗れた願いごとを書いてくれるのかな～って期待してたのに。残念。"
1003203-104 = "[s4] \"そんなの書いてる方がガッカリしない……？\""
1003203-105 = "んー、どうかな～？"
1003203-106 = "先生、もう書いた？"
1003203-107 = "くふふっ……！"
1003203-111 = "何書いたか見ーせてっ！"
1003203-112 = "[s5] \"ちょっ、ムツキ！？\""
1003203-113 = "あはっ、これこそが今日最大の目的！先生が何を願うのか、見てみたいなーって！"
1003203-114 = "くふふっ、私の手のひらからは逃れられないんだから～♪"
1003203-115 = "やっ、はっ、それっ！あははっ！"
1003203-120 = "先生の絵馬ゲット～♪願い事は一体何なのかな～？"
1003203-124 = "んー……？「今年も楽しいことがたくさんありますように」……？"
1003203-125 = "ふ～ん？これが先生の願い事なんだー。"
1003203-126 = "「楽しいこと」かー……これって先生は具体的に、何を想像してるのかな～？"
1003203-127 = "例えばぁ……私みたいな可愛い子と、あんなことやこんなことをして～……"
1003203-128 = "きゃーってなって、うわーってなるような？そういうやつ？"
1003203-129 = "[s6] \"……はい？\""
1003203-130 = "もしそういうことがしたいんだったら～、今すぐ私が叶えてあげよっか？"
1003203-131 = "……なーんちゃって☆"
1003203-132 = "あははははっ！先生、今もしかして結構ドキッとした？くふふっ♪"
1003203-133 = "[s] \"えっと、ところでムツキのお願いごとは？\""
1003203-134 = "んー、私？"
1003203-135 = "私は別に、そういうのあんまり無いもーん。だからほら、絵馬にも何も書いてないよ？"
1003203-136 = "くふふっ♪今日ここに来たのは、ただ先生がどんな願い事を書くのかな～って気になって遊びに来ただけだし。"
1003203-137 = "[s] \"じゃあ代わりに、ムツキのお願いごと書いてあげるね。\""
1003203-138 = "……え？"
1003203-139 = "えー……？別に私の願いごとなんか、どうでも良くない？"
1003203-140 = "そもそも私は、別に願いごととか――"
1003203-144 = "[ns] \"じゃあお任せで良い？\""
1003203-145 = "え、ちょっと、先生……？何書いてるの……？"
1003203-152 = "[ns7] \"こういうのでどう？\"\n[ns8] \"大切な人たちと、ずっとずっと一緒にいられますように。\""
1003203-153 = "あっ……"
1003203-154 = "あっ……"
1003203-155 = "先生そんなに真剣に、私の……"
1003203-156 = "……"
1003203-157 = "[s] \"……ムツキ？\""
1003203-161 = "くっ、くふふっ、あははははっ！"
1003203-162 = "な、何それ！そんな照れくさいこと、よくそんな真面目に……！あはははっ！"
1003203-163 = "うわー、ムツキちゃんもびっくりだよ……くふふふっ、さすが先生！面白過ぎっ！"
1003203-164 = "[s] \"そ、そんなに照れくさい内容かな……？\""
1003203-165 = "あはははっ！ほんっとお腹痛い！ひーっ！"
1003203-166 = "やっぱり先生、時々本当にレベル高いねー！"
1003203-167 = "あー、何だか今回はやられちゃった気分……"
1003203-168 = "あー、面白い。"
1003203-169 = "今回は負けちゃったけど、次はこんな風にやられたりしないから！"
1003203-170 = "次こそは先生を思いっきり慌てさせて、私が勝つんだからね！"
1003203-171 = "じゃあ先生、ばいばーい！"
1003203-176 = "[ns9] \"勝ち負けの基準が分からない……。\"\n[ns10] \"えぇ……？\""
1003203-180 = "（そうして、楽しそうに走っていくムツキが見えなくなるまで見送った）"
