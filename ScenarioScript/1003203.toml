[translation]
1003203-1 = "Ano Novo pede coisas de Ano Novo!"
1003203-3 = "（Ao chegar no local combinado com Mutsuki, já havia uma multidão.）"
1003203-8 = "Ah, Sensei~!"
1003203-9 = "Kufufu, você veio mesmo sem se atrasar, né?"
1003203-10 = "Eu estava pensando... será que o Sensei está ocupado com o trabalho e não vai vir? *Snif*... ou talvez não?"
1003203-11 = "[s] \"Já que combinamos de sair, eu não poderia faltar.\""
1003203-12 = "Ahaha."
1003203-13 = "Hmm, é mesmo é?"
1003203-14 = "Aliás, é Ano Novo mesmo, né? Quanta gente!"
1003203-15 = "Hmm... já estou meio cansada, talvez eu esteja ficando entediada?"
1003203-16 = "[s] \"Mas a gente acabou de chegar...?\""
1003203-17 = "Kufufu, brincadeira, brincadeira~. Então, vamos entrar?"
1003203-18 = "Sensei, o que foi? Ah, o motivo de termos vindo aqui?"
1003203-19 = "É claro que é para fazer um pedido, como eu disse no MomoTalk! Dizem que as placas de madeira daqui são especialmente fofas!"
1003203-20 = "Já que é Ano Novo, temos que aproveitar as tradições, né?♪"
1003203-24 = "Vamos, vamos, não temos tempo a perder. Vamos logo, Sensei!"
1003203-30 = "（Sendo puxado por Mutsuki, entramos no local.）"
1003203-34 = "……。"
1003203-38 = "Hmm~~~..."
1003203-39 = "Ah, droga, que sufoco!"
1003203-40 = "Será que se eu usasse uma bomba aqui agora, eu me sentiria melhor...?"
1003203-41 = "[s] \"É melhor não fazer isso!?\""
1003203-42 = "Ahaha, brincadeira, Sensei. Você é tão bobo."
1003203-43 = "Mesmo eu sei escolher a hora e o lugar!"
1003203-47 = "......Mas acho que agora é a hora e o lugar."
1003203-48 = "[s] \"Falta pouco, falta pouco!\""
1003203-49 = "（Enquanto tentava acalmar a Mutsuki de alguma forma...）"
1003203-50 = "Ora, com licença."
1003203-51 = "Ah—"
1003203-52 = "[s] \"Mutsuki!\""
1003203-60 = "Se-Sensei..."
1003203-61 = "[s] \"Você está bem? Se machucou?\""
1003203-62 = "E-eu estou bem, mas, sabe..."
1003203-63 = "Segurar minha mão com tanta paixão assim..."
1003203-64 = "......Kufufu♪ Será que o Sensei estava esperando uma chance de ficar tão perto de mim e segurar minha mão?"
1003203-69 = "Ahaha, não precisa se afastar tão rápido assim~."
1003203-70 = "Sim. Mas, bem, graças ao Sensei, a irritação passou."
1003203-71 = "Embora eu ainda ache que dar um presente explosivo para quem esbarrou na gente seria mais satisfatório."
1003203-72 = "[s] \"Vamos deixar isso de lado...\""
1003203-73 = "Kufufu♪"
1003203-74 = "Ah, é a nossa vez, Sensei!"
1003203-79 = "Dizem que é só escrever o pedido nessa placa e pendurar ali."
1003203-80 = "Então, vamos escrever?"
1003203-81 = "[s1] （Que este ano seja de paz...）\n[s2] （Que este ano seja cheio de coisas divertidas...）"
1003203-82 = "Sensei, já escreveu?"
1003203-83 = "Kufufu...!"
1003203-87 = "Deixa eu ver o que você escreveu!"
1003203-88 = "[s3] \"Ei, Mutsuki!?\""
1003203-89 = "Ahaha, esse é o meu maior objetivo de hoje! Eu queria muito ver o que o Sensei ia pedir!"
1003203-90 = "Kufufu, você não escapa da palma da minha mão~♪"
1003203-91 = "Ya, ha, isso! Ahaha!"
1003203-96 = "Peguei a placa de madeira do Sensei~♪ O que será que ele pediu, hein?"
1003203-100 = "Hmm...? \"Que este ano seja de paz\"?"
1003203-101 = "Ah, que sem graça..."
1003203-102 = "Poxa, eu esperava que o Sensei fosse escrever algo mais mundano, mais interesseiro..."
1003203-103 = "Algo cheio de desejos egoístas. Que decepção."
1003203-104 = "[s4] \"Não seria mais decepcionante se eu escrevesse algo assim...?\""
1003203-105 = "Hmm, será?"
1003203-106 = "Sensei, você já escreveu o seu?"
1003203-107 = "Kufufu...!"
1003203-111 = "Deixa eu ver o que você escreveu!"
1003203-112 = "[s5] \"Ei, Mutsuki!?\""
1003203-113 = "Ah, esse era o meu maior objetivo hoje! Eu queria muito ver o que o Sensei ia desejar!"
1003203-114 = "Kufufu, você não vai escapar das minhas mãos~♪"
1003203-115 = "Ya, ha, isso! Ahaha!"
1003203-120 = "Peguei a placa de madeira do Sensei~♪ O que será que ele pediu, hein?"
1003203-124 = "Hmm...? \"Que este ano também tenha muitas coisas divertidas\"...?"
1003203-125 = "Hmm? Então esse é o desejo do Sensei."
1003203-126 = "\"Coisas divertidas\", hein... O que exatamente você está imaginando com isso, Sensei?"
1003203-127 = "Por exemplo... fazer isso e aquilo com uma garota fofa como eu..."
1003203-128 = "Algo que te deixe todo animado e empolgado? É esse tipo de coisa?"
1003203-129 = "[s6] \"...Oi?\""
1003203-130 = "Se é isso que você quer, quer que eu realize para você agora mesmo?"
1003203-131 = "...Brincadeirinha☆"
1003203-132 = "Ahahaha! Sensei, por um momento você ficou nervoso, não ficou? Kufufu♪"
1003203-133 = "[s] \"Bem, mudando de assunto, qual é o seu desejo, Mutsuki?\""
1003203-134 = "Hmm, o meu?"
1003203-135 = "Eu não tenho nenhum desejo especial. Por isso, olha só, a minha placa está em branco."
1003203-136 = "Kufufu♪ Eu só vim aqui hoje porque estava curiosa para ver o que você ia escrever."
1003203-137 = "[s] \"Então, em troca, eu vou escrever um desejo para você.\""
1003203-138 = "...Hã?"
1003203-139 = "Ah... não precisa se preocupar com o meu desejo, né?"
1003203-140 = "Para começo de conversa, eu nem tenho desejos..."
1003203-144 = "[ns] \"Então posso escolher por você?\""
1003203-145 = "Ei, espera aí, Sensei...? O que você está escrevendo...?"
1003203-152 = "[ns7] \"Que tal isso?\"\n[ns8] \"Que eu possa ficar com as pessoas que amo para sempre.\""
1003203-153 = "Ah..."
1003203-154 = "Ah..."
1003203-155 = "Sensei, você foi tão sério com o meu..."
1003203-156 = "..."
1003203-157 = "[s] \"...Mutsuki?\""
1003203-161 = "Ku, kufufu, ahahaha!"
1003203-162 = "Q-que isso! Como você consegue dizer algo tão constrangedor com tanta seriedade...! Ahahaha!"
1003203-163 = "Nossa, até a Mutsuki-chan ficou surpresa... Kufufufu, como esperado do Sensei! Engraçado demais!"
1003203-164 = "[s] \"É, é tão constrangedor assim...?\""
1003203-165 = "Ahahaha! Minha barriga até dói! Ai, ai!"
1003203-166 = "Como sempre, o nível do Sensei é realmente alto!"
1003203-167 = "Ah, sinto que dessa vez eu fui derrotada..."
1003203-168 = "Ah, que divertido."
1003203-169 = "Dessa vez eu perdi, mas na próxima não vou ser pega de surpresa assim!"
1003203-170 = "Da próxima vez eu vou deixar o Sensei super apavorado e eu vou ganhar!"
1003203-171 = "Então, tchauzinho, Sensei!"
1003203-176 = "[ns9] \"Não entendo o critério de vitória ou derrota...\"\n[ns10] \"Hã...?\""
1003203-180 = "（E assim, fiquei observando a Mutsuki até ela desaparecer enquanto corria alegremente）"
