[translation]
10016020-1 = "Episódio 2: A Tentação da Área de Barracas"
10016020-2 = "Estádio Atlético - Área de Barracas"
10016020-4 = "（Após a reunião do comitê executivo, saímos do estádio para dar uma volta e ver o Grande Festival Esportivo）"
10016020-5 = "Vamos lá, aproximem-se! Cheguem mais e confiram! A famosa \"Associação Genbu\" de Shanhaijing chegou ao Festival Kourin!"
10016020-6 = "Temos iguarias que normalmente só podem ser saboreadas em Shanhaijing! #nExperimentem para acompanhar as partidas!"
10016020-7 = "Ah, é uma barraca da Associação Genbu."
10016020-8 = "Eu sempre quis provar a comida da Associação Genbu! #nQuem diria que encontraríamos uma aqui... que tal irmos lá?"
10016020-9 = "Tudo bem, mas... comida chinesa pesada logo de manhã é um pouco... acho que vai pesar no estômago."
10016020-13 = "Venda itinerante da Hyakkiyako chegando!"
10016020-14 = "Nosso novo produto, \"Soda de Sakura\"! #nQue tal para acompanhar as partidas?"
10016020-15 = "Também temos Monaka feito pela Shizuko!"
10016020-16 = "Ué, é a \"Hyakkiyako\"?"
10016020-17 = "Uma amiga que foi ao \"Festival das Flores de Cerejeira de Hyakkiyako\" disse que a comida de lá é realmente deliciosa..."
10016020-18 = "Será que eu deveria comer algo antes do início das partidas?"
10016020-22 = "[ns] \"O lado de fora do estádio também está bem movimentado...\""
10016020-25 = "Hum, estava uma delícia~"
10016020-26 = "Já estou de barriga cheia, quer ir para outro lugar?"
10016020-31 = "Ei, espere aí!"
10016020-32 = "Ah, hã? A vice-presidente do Comitê de Justiça...?"
10016020-33 = "Por favor, joguem o lixo na lixeira corretamente."
10016020-34 = "Não vou pedir que deixem o local mais limpo do que quando chegaram, mas, no mínimo, descartem seu lixo adequadamente."
10016020-35 = "（Ugh, quem diria que o Comitê de Justiça estaria trabalhando até no Grande Festival Esportivo...）"
10016020-36 = "D-desculpe!"
10016020-42 = "Haa... talvez seja a atmosfera do festival, mas muitos alunos estão perdendo a compostura."
10016020-43 = "Espero que não apareçam mais alunos que manchem a autoridade de Trinity..."
10016020-44 = "[s] \"Nos encontramos de novo, Hasumi.\""
10016020-45 = "……Professor(a) [USERNAME]?"
10016020-46 = "Peço desculpas pelo transtorno de mais cedo, não esperava encontrá-lo(a) novamente."
10016020-47 = "Está conseguindo aproveitar o festival?"
10016020-48 = "[s] \"Sim, graças a você.\""
10016020-50 = "[ns] \"Hasumi, você está trabalhando no comitê executivo?\""
10016020-51 = "Sim. Além de ajudar na organização, uma das minhas funções é orientar corretamente os alunos que se empolgam demais com o clima festivo e garantir a limpeza do local."
10016020-52 = "No entanto, dei uma volta rápida pelo local... #ne as instalações são maiores do que eu pensava, e há tantos alunos que..."
10016020-53 = "Parece que o dia inteiro vai ser gasto apenas mantendo a disciplina."
10016020-54 = "[s] \"……Você realmente não precisa participar como atleta?\""
10016020-55 = "……Isso está fora de questão."
10016020-56 = "O dever do comitê executivo é a organização, não a participação nas partidas."
10016020-57 = "Claro, não é como se os membros do comitê fossem proibidos de participar, mas..."
10016020-58 = "Como mencionei na reunião anterior, Trinity tem muitos alunos talentosos."
10016020-59 = "Como membro do comitê, pretendo me dedicar à disciplina dos alunos e à organização das competições."
10016020-60 = "[s] \"Entendi... deve ser difícil.\""
10016020-61 = "Não, não é bem assim."
10016020-62 = "É um festival que todos os alunos de Kivotos esperavam ansiosamente, mas #npara mim, não passa de uma extensão das minhas tarefas diárias."
10016020-63 = "Portanto, continuarei realizando a justiça silenciosamente, como sempre——"
10016020-64 = "Ora, que encontro inesperado..."
10016020-72 = "Ah, é o(a) Professor(a) [USERNAME]."
10016020-74 = "Ei, Professor(a)!"
10016020-75 = "[s1] \"Olá!\"\n[s2] \"O Clube de Pesquisa Gastronômica também veio.\""
10016020-76 = "Com certeza. O Grande Festival Esportivo é um festival gastronômico onde se pode desfrutar de vários pratos."
10016020-77 = "Com certeza. O Grande Festival Esportivo é um festival gastronômico onde se pode desfrutar de vários pratos."
10016020-78 = "Para nós, do Clube de Pesquisa Gastronômica, que buscamos a culinária suprema, perder esta oportunidade é algo impensável."
10016020-79 = "[s] \"O Festival Esportivo é um festival gastronômico...?\""
10016020-80 = "Sim. O 'Festival Halo' também desempenha o papel de uma exposição onde se pode conhecer as características de cada escola."
10016020-81 = "Com a tecnologia do Millennium... poderíamos extrair sabores específicos usando tecnologia de polímeros ou até mesmo condensá-los..."
10016020-82 = "Comida criada com novas tecnologias certamente trará um 'Big Bang' ao mundo gastronômico, que está preso a valores antiquados."
10016020-83 = "Além disso, há várias barracas no 'Festival Halo', sabe."
10016020-84 = "A comida de barraca, que você pode comer facilmente enquanto torce nas partidas, é uma especialidade que só se pode aproveitar no Festival Esportivo~"
10016020-85 = "Especialmente a 'Associação Genbu' e a 'Hyakkiyako'... lojas locais que você normalmente só consegue comer se for até o distrito autônomo também montam barracas, então tem gente que vem só para comer isso★"
10016020-86 = "[s] \"Falando nisso, acho que vi alunos de outras escolas...\""
10016020-87 = "E também tem a corrida do pão!"
10016020-88 = "Poder comer pão à vontade só por participar das partidas é o máximo~"
10016020-90 = "A corrida do pão não é um concurso de comer, sabia...?"
10016020-91 = "Falando nisso, ouvi dizer que entre as modalidades deste Festival Esportivo, há um concurso de comer onde se compete contra uma máquina que serve soba automaticamente..."
10016020-92 = "Fufu, estou ansiosa para ver o quanto isso vai me satisfazer~♥"
10016020-93 = "Todos estão animados desde cedo... que bando de idiotas."
10016020-97 = "Quem são vocês..."
10016020-98 = "Ora, se não é a vice-presidente do Comitê de Justiça."
10016020-99 = "(Já é constrangedor encontrar alunos de Gehenna, mas encontrar o infame Clube de Pesquisa Gastronômica, conhecido como um grupo de encrenqueiros...)"
10016020-100 = "(Isso se tornou... um pouco problemático.)"
10016020-101 = "É um prazer conhecê-las. No momento, não estou como vice-presidente do Comitê de Justiça, mas servindo como membro do comitê executivo do Festival Halo."
10016020-102 = "Espero que aproveitem o festival 'sem problemas e com segurança'."
10016020-103 = "Ora, é uma honra receber tal hospitalidade."
10016020-105 = "Não parece que ela está nos dando as boas-vindas de verdade..."
10016020-107 = "Falando nisso, isto que comprei na barraca agora pouco..."
10016020-111 = "Milho assado com bastante açúcar e queijo, que tal um como sinal de amizade?"
10016020-112 = "...(engole em seco)"
10016020-113 = "Ora... você não gosta de milho?"
10016020-114 = "Não é que eu não goste, mas... milho assado com tanto açúcar e queijo assim... é que..."
10016020-115 = "Comer isso assim tem muitas calorias... não, não é um pouco pesado para um lanche?"
10016020-116 = "Fufu, você está preocupada com as calorias?"
10016020-117 = "Não precisa se preocupar. Com esse tanto, basta correr um pouco que você queima tudo."
10016020-118 = "Na verdade, é mais provável que você deva se preocupar em emagrecer demais com os exercícios do Festival Halo."
10016020-119 = "Preocupar-me... em emagrecer...?"
10016020-121 = "Falando nisso, Haruna, você come bastante e continua magra, né."
10016020-122 = "Você está fazendo alguma dieta?"
10016020-123 = "Não, eu tenho um metabolismo que não me deixa engordar."
10016020-124 = "Além disso, sentir culpa por comer... eu não conseguiria suportar."
10016020-126 = "..."
10016020-127 = "Metabolismo que não engorda...? Não conseguiria suportar...?"
10016020-128 = "Isso... isso é..."
10016020-129 = "Eu não posso perdoar isso, Gehenna!"
10016020-130 = "[s] \"H-Hasumi...?\""
10016020-131 = "Mesmo sem isso, há tentações por todos os lados e estou me forçando a desviar o olhar..."
10016020-132 = "Ver algo assim bem na minha frente... eu não posso perdoar!"
10016020-133 = "Como o Sensei está aqui, tentei me controlar, mas... vou declarar mais uma vez."
10016020-134 = "Não importa o que aconteça, vou derrotar vocês e garantir a vitória geral para a Trinity!"
10016020-138 = "Ora... parece que tocamos em um ponto sensível."
10016020-139 = "[s] \"...Dessa vez a culpa foi sua, Haruna.\""
10016020-140 = "Eh? Nós só oferecemos uma comida deliciosa, não foi?"
10016020-141 = "Sim, sim! Não querer comer um milho delicioso... eu não consigo entender~"
10016020-143 = "Acho que só a Izumi é idiota o suficiente para se acalmar só de ganhar comida..."
10016020-144 = "Ah... Eu não tinha a menor intenção de participar de um novo menu estranho ou de um concurso de comer, então por que eu acabei vindo junto..."
10016020-145 = "Já comi quase todas as comidas de barraca, e não parece ter nada de diferente por aqui..."
10016020-146 = "[s] \"Junko,\""
10016020-147 = "Hm?"
10016020-148 = "[s] \"Que tal apenas aproveitar o Grande Festival Esportivo normalmente?\""
10016020-149 = "Dizer para aproveitar normalmente é fácil, mas..."
10016020-153 = "Em breve, a primeira partida do 'Festival Esportivo Halo' terá início."
10016020-154 = "Pedimos a todos os atletas que participarão da primeira partida que se reúnam na sala de espera."
10016020-156 = "Uau! Parece que a partida vai começar logo!"
10016020-157 = "E se eu chegar atrasada e os pães da corrida do pão acabarem?"
10016020-158 = "Ainda temos tempo de sobra."
10016020-159 = "Bem, então, que tal seguirmos cada um com nossa busca gastronômica?"
10016020-160 = "Então, já vou indo♥"
10016020-165 = "……Eu já vou indo."
10016020-170 = "(Depois de ver o Clube de Pesquisa Gastronômica partir, fui para dentro do estádio para assistir aos jogos.)"
