[translation]
10016020-1 = "第2話;屋台エリアの誘惑"
10016020-2 = "アスレチックスタジアム・屋台エリア"
10016020-4 = "（実行委員会の会議後、大運動会を見て回るために競技場の外に出た）"
10016020-5 = "さあさ、お立ち会い！寄ってらっしゃい見てらっしゃい！#n[ruby=せんがいきょう]山海経[/ruby]名物「玄武商会」が[ruby=こうりんたいさい]晄輪大祭[/ruby]にやって参りましたよ～！"
10016020-6 = "普段であれば山海経でしか味わえない珍味が勢ぞろい！#n試合のお供にどうぞご賞味あれ！"
10016020-7 = "あら、玄武商会の屋台ですよ。"
10016020-8 = "私、玄武商会の料理を一度味わってみたかったんです！#nこんなところで巡り会えるなんて……行ってみませんか？"
10016020-9 = "いいですけど……朝から重めの中華料理はちょっと……胃にきそうですね。"
10016020-13 = "[ruby=ももよどう]百夜堂[/ruby]出張販売で～す！"
10016020-14 = "新商品の「桜ソーダ」！#n試合のお供にいかがですか～？"
10016020-15 = "シズコお手製モナカもありますよ～！"
10016020-16 = "あれ、「百夜堂」だ？"
10016020-17 = "この前「百夜ノ春ノ桜花祭」に行った友達が、あそこの食べ物は本当においしいって言ってたような……"
10016020-18 = "本試合が始まる前に食べてみようかな？"
10016020-22 = "[ns] \"競技場の外もにぎやかだね……。\""
10016020-25 = "んー、ごちそうさま～"
10016020-26 = "腹も膨れたし、そろそろ他のとこ行く？"
10016020-31 = "そこ、お待ちなさい！"
10016020-32 = "あ、あれ？正義実現委員会の、副委員長……？"
10016020-33 = "ゴミはきちんとゴミ箱に捨ててください。"
10016020-34 = "来た時よりも美しくとまでは言いませんが、最低限のごみ捨てくらいはしてください。"
10016020-35 = "（うっ、まさか大運動会でも正義実現委員会が活動していたとは……）"
10016020-36 = "す、すいませんでしたー！"
10016020-42 = "はぁ……お祭りの雰囲気に当てられているのか、羽目を外している生徒が多いですね。"
10016020-43 = "どうか、トリニティの権威を失墜させる生徒がこれ以上出ないといいのですが……"
10016020-44 = "[s] \"また会ったね、ハスミ。\""
10016020-45 = "……[USERNAME]先生？"
10016020-46 = "先程はお騒がせいたしました、またお会いできるとは。"
10016020-47 = "お祭りは楽しめていますでしょうか？"
10016020-48 = "[s] \"うん、おかげさまで。\""
10016020-50 = "[ns] \"ハスミは実行委員のお仕事中？\""
10016020-51 = "はい。運営を手伝うほか、お祭りムードで羽目を外しすぎてしまった生徒を正しく導き、美化を整備することも仕事の一つですので。"
10016020-52 = "ですが、軽く会場を見て回ったところ……#n思った以上に施設が広く、生徒も多くて……どうにも。"
10016020-53 = "風紀を取り締まるだけで一日が終わってしまいそうなほどです。"
10016020-54 = "[s] \"……本当に、選手として参加しなくていいの？\""
10016020-55 = "……それはもちろんです。"
10016020-56 = "実行委員の本分は試合の参加ではなく運営にありますから。"
10016020-57 = "もちろん実行委員が試合に参加できないわけではありませんが……"
10016020-58 = "先ほどの会議でも申し上げた通り、トリニティには優秀な生徒がたくさんいますから。"
10016020-59 = "私は実行委員として、生徒の風紀と競技の運営に専念するつもりです。"
10016020-60 = "[s] \"そっか……大変だね。\""
10016020-61 = "いえ、そうでもないですよ。"
10016020-62 = "キヴォトス中の生徒が待ちわびてきたお祭りですが、#n私にとっては、普段の業務の延長に過ぎませんから。"
10016020-63 = "ですので、いつも通り黙々と正義を実現するだけ――"
10016020-64 = "あら、こんな所でお会いするなんて……奇遇ですね。"
10016020-72 = "あ、[USERNAME]先生だ。"
10016020-74 = "やっほー先生！"
10016020-75 = "[s1] \"やっほー！\"\n[s2] \"美食研究会も来てたんだ。\""
10016020-76 = "もちろんです。大運動会は様々な料理が楽しめる美食の祭典。"
10016020-77 = "もちろんです。大運動会は様々な料理が楽しめる美食の祭典。"
10016020-78 = "究極の美食を探求する私たち美食研究会がこの機を逃すなど、あり得ませんわ。"
10016020-79 = "[s] \"大運動会が美食の祭典……？\""
10016020-80 = "ええ。「晄輪大祭」は、各学園の特色を見て回れる博覧会の役割も担っておりますから。"
10016020-81 = "ミレニアムの技術力であれば……#n高分子化合技術で特定の味を抽出したり、凝縮する事だってできるはず……"
10016020-82 = "新技術で生み出された食べ物は、凝り固まった価値観の美食界隈にビッグバンをもたらしてくれる事でしょう。"
10016020-83 = "その他にも「晄輪大祭」には様々な屋台がありますからね。"
10016020-84 = "試合を応援しながら手軽に食べられる屋台料理は、#n大運動会でしか楽しめない名物なんですよ～"
10016020-85 = "特に「玄武商会」や「百夜堂」など……普段は自治区に行かないと食べられないローカルな名店も屋台を出すので、それを食べるために来る生徒もいるくらいなんです★"
10016020-86 = "[s] \"そういえば、他の学園の生徒を見たような……。\""
10016020-87 = "それにパン食い競争もあるからね！"
10016020-88 = "試合に参加するだけでパンを思う存分食べられるなんて、最高だよ～"
10016020-90 = "パン食い競争は大食い大会じゃないんだよ……？"
10016020-91 = "そういえば、今回の大運動会の種目の中には自動でわんこそばをついでくれる機械と勝負する大食い大会もあると伺いましたが……"
10016020-92 = "ふふ、どれだけ私を満足させてくれるか、今から楽しみですね～♥"
10016020-93 = "みんな朝から浮かれて……バカみたい。"
10016020-97 = "あなた方は……"
10016020-98 = "あら、そちらにいらっしゃるのは正義実現委員会の副委員長さんですね。"
10016020-99 = "（ただでさえゲヘナ生と会うのは気まずいのに……悪名高い問題児集団と噂の美食研究会と遭遇するだなんて……）"
10016020-100 = "（少し……厄介なことになりましたね）"
10016020-101 = "お会いできて嬉しいです。#n今は正義実現委員会の副委員長ではなく、晄輪大祭の実行委員を務めております。"
10016020-102 = "くれぐれも、「問題なくご安全に」お祭りを楽しんでいただければと思います。"
10016020-103 = "あら、ご歓待にあずかり光栄ですわ。"
10016020-105 = "全く歓迎しているようには見えないんだけど……"
10016020-107 = "そういえば、先ほど屋台で買ったこちら……"
10016020-111 = "お砂糖とチーズをたっぷりかけて焼いたトウモロコシ、#nお近づきの印に一本、いかがでしょう？"
10016020-112 = "……（ごくり）"
10016020-113 = "あら……トウモロコシ、お嫌いでしたか？"
10016020-114 = "嫌いではないのですが……#nこんなに砂糖やチーズをかけて焼いたトウモロコシは……その……"
10016020-115 = "このまま食べると少しカロリーが……#nいえ、間食には少し重くないですか？"
10016020-116 = "ふふ、カロリーを気にしてしまいましたか？"
10016020-117 = "心配する必要はありません。#nこの程度でしたら、軽く走れば十分消費できますわ。"
10016020-118 = "むしろ、晄輪大祭の運動で、痩せすぎてしまう事を心配した方が良いくらいです。"
10016020-119 = "痩せることを、心配……？"
10016020-121 = "そういえば、ハルナは結構食べるのに痩せてるわよね。"
10016020-122 = "何かダイエットでもしてるの？"
10016020-123 = "いえ、太らない体質なんです。"
10016020-124 = "それに、食べる事に罪悪感を持ってしまうなんて……#n私には耐えられませんわ。"
10016020-126 = "……。"
10016020-127 = "太らない体質……？#n耐えられない……？"
10016020-128 = "そんな……そんな事……"
10016020-129 = "絶対に許せません、ゲヘナ！"
10016020-130 = "[s] \"は、ハスミ……？\""
10016020-131 = "そうでなくても、あちこちから誘惑が多くて無理やり目をそらしているというのに……。"
10016020-132 = "目の前でこのような……絶対に許せません！"
10016020-133 = "先生の前ですから、我慢しようとしましたが……もう一度宣言します。"
10016020-134 = "どんな手を使ってでも[ruby=ゲヘナ]あなた達[/ruby]を破って#n[ruby=トリニティ]うちが[/ruby]総合優勝を取ってみせますから！"
10016020-138 = "あら……何か逆鱗に触れてしまったようですね。"
10016020-139 = "[s] \"……今のはハルナが悪いよ。\""
10016020-140 = "え？私たちは美味しい食べ物を勧めただけですよ？"
10016020-141 = "うんうん！美味しいトウモロコシを食べないなんて……理解できないよ～"
10016020-143 = "食べ物もらって怒りが収まるのはバカイズミくらいでしょうが……。"
10016020-144 = "はあ……私は変な新メニューも大食い大会も参加するつもりなかったのに、どうしてついてきちゃったんだろ……"
10016020-145 = "屋台料理もほとんど食べたことあるものだし、他の変わり種もなさそうだし……"
10016020-146 = "[s] \"ジュンコ、\""
10016020-147 = "ん？"
10016020-148 = "[s] \"普通に大運動会を楽しむのはどうかな？\""
10016020-149 = "普通に楽しむって言われても……"
10016020-153 = "まもなく「晄輪大祭」の第一試合が開始します。"
10016020-154 = "第一試合参加予定の選手の皆様は、控え室にお集まりください。"
10016020-156 = "わぁ！そろそろ試合が始まるみたい！"
10016020-157 = "遅刻してパン食い競争のパンが無くなっちゃったらどうしよう？"
10016020-158 = "まだ時間は十分です。"
10016020-159 = "では、そろそろ各自で美食探求と参りましょうか？"
10016020-160 = "それでは、行ってきま～す♥"
10016020-165 = "……行ってくるわね。"
10016020-170 = "（美食研究会を見送った後、観戦するためスタジアム内部に移動した）"
