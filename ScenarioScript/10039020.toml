[translation]
10039020-1 = "Episódio 2; O Caminho do Ídolo: Trajes"
10039020-2 = "……Entendo."
10039020-6 = "Nesse caso, deixe comigo!"
10039020-7 = "Primeiro de tudo, o visual é essencial, afinal, fofura é justiça!"
10039020-8 = "[s1] \"N-Nonomi...!?\"\n[s2] \"O olhar dela mudou de repente...\""
10039020-11 = "V-visual, você diz?"
10039020-12 = "Ué, a reação foi diferente do que eu esperava..."
10039020-13 = "Na verdade, nós também estamos nos preparando para ser ídolos."
10039020-14 = "Então, se tiverem alguma dúvida, podem perguntar o que quiserem!"
10039020-15 = "……!"
10039020-16 = "Muito obrigada!"
10039020-20 = "A propósito, sobre isso..."
10039020-21 = "Onde estão as outras pessoas além da Nonomi...?"
10039020-22 = "Sobre isso..."
10039020-26 = "……Fufu, talvez seja a hora perfeita."
10039020-27 = "Se não se importarem, poderiam me ajudar um pouco?"
10039020-28 = "[s3] \"Sim, claro.\"\n[s4] \"O que eu preciso fazer?\""
10039020-31 = "Talvez vocês acabem suando um pouco, mas..."
10039020-32 = "……?"
10039020-33 = "Suar?"
10039020-34 = "Eu explico depois☆"
10039020-35 = "É que todas são muito tímidas e eu estava em apuros."
10039020-36 = "S-sim!"
10039020-37 = "Se eu puder ajudar, com certeza!"
10039020-38 = "Muito obrigada~!"
10039020-39 = "Claro que o Sensei também vai vir com a gente, né?"
10039020-40 = "[s5] (Tenho um mau pressentimento sobre isso...)\n[s6] \"...Entendido.\""
10039020-43 = "Isso mesmo!"
10039020-44 = "Vocês duas, venham comigo~☆"
10039020-52 = "Está tudo bem, Shiroko-chan?"
10039020-53 = "Hum, é difícil."
10039020-54 = "Não achei que elas resistiriam tanto."
10039020-55 = "E a Hoshino-senpai?"
10039020-56 = "……Ali."
10039020-58 = "U-uhee... desculpe. #nA tia aqui já está chegando no limite..."
10039020-64 = "Até a Hoshino-senpai..."
10039020-65 = "[ns7] \"H-Hoshino!?\"\n[ns8] \"O que está acontecendo aqui!?\""
10039020-68 = "……É uma batalha!?"
10039020-69 = "Nonomi, quem é essa pessoa...?"
10039020-70 = "Ela é uma aluna de Trinity, né?"
10039020-72 = "Sim, é a Marie, da Sisterhood. #nEla veio nos ajudar junto com o Sensei."
10039020-73 = "……Pois é, primeiro precisamos explicar a situação."
10039020-74 = "De jeito nenhum, eu não vou vestir isso!"
10039020-78 = "[ns9] \"……Essa voz?\"\n[ns10] \"Serika...?\""
10039020-82 = "Ah, o Sensei também veio."
10039020-83 = "Puxa, que vergonha, acabaram vendo a gente nessa situação."
10039020-84 = "Nossas veteranas são muito tímidas. #nEu tentei \"convencê-las\", mas acabei sendo derrotada."
10039020-88 = "……Do que estamos falando?"
10039020-89 = "De ídolos!"
10039020-94 = "……Oi?"
10039020-95 = "Idol, você diz...?"
10039020-96 = "Não vejo como isso se relaciona com a situação atual..."
10039020-97 = "Vai ter um evento de idols no festival escolar de Trinity, sabe?"
10039020-98 = "Então surgiu a ideia de Abydos formar uma unidade para participar."
10039020-99 = "E também... por causa daquela 'promessa', não é?"
10039020-100 = "Parece que ainda restam vagas para inscrição!"
10039020-101 = "Hmm, uma unidade de duas alunas do primeiro ano."
10039020-105 = "[ns11] \"Entendo...\"\n[ns12] \"Realmente, houve esse assunto.\""
10039020-108 = "Ora, mas foram vocês mesmas que sugeriram."
10039020-109 = "Não é, Serika-chan, Ayane-chan?"
10039020-111 = "N-nós dissemos isso, mas...!"
10039020-112 = "Mas ninguém me avisou que teríamos que usar essas roupas!"
10039020-113 = "I-isso mesmo! Por mais que tentem, isso é impossível!"
10039020-115 = "[ns] (...Essas roupas?)"
10039020-117 = "Mas essas roupas são as que as idols usam de verdade, sabe?"
10039020-118 = "Tenho certeza de que vão ficar ótimas em vocês."
10039020-119 = "M-mas..."
10039020-120 = "Não fiquem envergonhadas, vamos logo mostrar o visual☆"
10039020-121 = "Se continuarmos assim, não vamos conseguir nos inscrever a tempo. Deixem-me tirar a foto logo."
10039020-122 = "Ayane-chan, você ouviu? Vamos fugir antes que o tempo acabe!"
10039020-123 = "S-sim!"
10039020-124 = "Eu nunca imaginei que a Ayane-chan chegaria a usar um helicóptero."
10039020-125 = "Uhee, elas devem estar muito envergonhadas mesmo."
10039020-126 = "Não podemos simplesmente arrastá-las à força..."
10039020-130 = "Se o Sensei e a irmã estiverem aqui, talvez consigamos resolver isso."
10039020-132 = "E-eh!?"
10039020-133 = "Eu, bem...!"
10039020-134 = "Desculpe, pessoal. Poderiam dar uma mãozinha para o tio aqui?"
10039020-135 = "...Afinal, nós fizemos uma 'promessa', não fizemos?"
10039020-136 = "Hmm, promessas são importantes."
10039020-140 = "[ns13] \"...É verdade.\"\n[ns14] \"Temos que cumprir nossas promessas.\""
10039020-143 = "...!"
10039020-144 = "...Entendido."
10039020-145 = "Farei o que estiver ao meu alcance para ajudar!"
10039020-147 = "Isso mesmo! Obrigada, Marie-san, Sensei!"
10039020-148 = "Então, vamos lá...!"
10039020-157 = "Lá vamos nós~☆"
