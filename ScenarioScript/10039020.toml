[translation]
10039020-1 = "第2話;アイドルの道：衣装"
10039020-2 = "……なるほど。"
10039020-6 = "でしたら、お任せください！"
10039020-7 = "まずはビジュアルでしょう、可愛いは正義ですから！"
10039020-8 = "[s1] \"の、ノノミ……！？\"\n[s2] \"さっきまでと目が……。\""
10039020-11 = "び、ビジュアルですか？"
10039020-12 = "あれ、思っていたよりも反応が……。"
10039020-13 = "実は、私たちもアイドルの準備をしているんです。"
10039020-14 = "なので、気になることがあれば何でも質問してくださいね！"
10039020-15 = "……！"
10039020-16 = "ありがとうございます！"
10039020-20 = "ところで、その……。"
10039020-21 = "ノノミさん以外の方は、どちらに……？"
10039020-22 = "それはですね……。"
10039020-26 = "……ふふっ、ちょうど良いかもしれません。"
10039020-27 = "よろしければ、少し手伝っていただけませんか？"
10039020-28 = "[s3] \"うん、もちろん。\"\n[s4] \"何をすれば良いの？\""
10039020-31 = "もしかしたら、少し汗をかくかもしれませんが……。"
10039020-32 = "……？"
10039020-33 = "汗？"
10039020-34 = "あとで説明しますね☆"
10039020-35 = "みんな、恥ずかしがり屋さんで困っていたところなんです。"
10039020-36 = "は、はい！"
10039020-37 = "私でよろしければ、ぜひ！"
10039020-38 = "ありがとうございます～！"
10039020-39 = "もちろん先生も、一緒に来てくれますよね？"
10039020-40 = "[s5] （少し嫌な予感がするけど……）\n[s6] \"……分かった。\""
10039020-43 = "うんうん！"
10039020-44 = "二人とも、私に付いてきてくださいね～☆"
10039020-52 = "大丈夫ですか、シロコちゃん？"
10039020-53 = "ん、手強い。"
10039020-54 = "ここまで抵抗されるとは思わなかった。"
10039020-55 = "ホシノ先輩は？"
10039020-56 = "……あっち。"
10039020-58 = "う、うへぇ……ごめんね。#nおじさん、そろそろ限界かも……。"
10039020-64 = "ホシノ先輩まで……。"
10039020-65 = "[ns7] \"ほ、ホシノ！？\"\n[ns8] \"いったい何が起きてるの！？\""
10039020-68 = "……戦闘ですか！？"
10039020-69 = "ノノミ、この人は……？"
10039020-70 = "トリニティの生徒だよね？"
10039020-72 = "はい、シスターフッドのマリーさんです。#n先生と一緒にお手伝いに来てくれました。"
10039020-73 = "……そうですね、まずは状況を説明しなくてはいけませんね。"
10039020-74 = "イヤよ、着るわけないでしょ！"
10039020-78 = "[ns9] \"……この声は？\"\n[ns10] \"セリカ……？\""
10039020-82 = "あれ、先生も来てたんだ。"
10039020-83 = "いやぁ、恥ずかしいところを見られちゃったね。"
10039020-84 = "うちの後輩たち、すっごい照れ屋さんでさ。#n「説得」するつもりが、逆にやられちゃったんだ。"
10039020-88 = "……何の話かって？"
10039020-89 = "アイドルです！"
10039020-94 = "……はい？"
10039020-95 = "アイドル、ですか……？"
10039020-96 = "この状況と、どのような関係があるのか私には……。"
10039020-97 = "トリニティの学園祭で、アイドルイベントがあるでしょ？"
10039020-98 = "そこでアビドスもユニットを結成しようって話になったんだ。"
10039020-99 = "……「例の約束」もあったところだし？"
10039020-100 = "まだ参加枠は残っているようですから！"
10039020-101 = "……ん、一年生の二人ユニット。"
10039020-105 = "[ns11] \"なるほど……。\"\n[ns12] \"そんな話もあったね。\""
10039020-108 = "いやぁ、自分たちで言い出したんだから。"
10039020-109 = "そうだよね……セリカちゃん、アヤネちゃん？"
10039020-111 = "た、たしかに言ったけど……！"
10039020-112 = "でも、だからって[ruby=・   ・   ・   ・]こんな服[/ruby]を着るとか聞いてないわよ！"
10039020-113 = "そ、そうですよ！#nいくら何でも、これは無理です！"
10039020-115 = "[ns] （……こんな服？）"
10039020-117 = "でも、その衣装は実際にアイドルさんが着るものですよ？"
10039020-118 = "絶対に似合いますから。"
10039020-119 = "で、ですが……。"
10039020-120 = "恥ずかしがってないで、早くお披露目しちゃいましょう☆"
10039020-121 = "このままじゃ参加締め切りに間に合わない。#n早く写真を撮らせて。"
10039020-122 = "アヤネちゃん、聞いた？#n時間まで逃げるわよ！"
10039020-123 = "う、うん！"
10039020-124 = "まさか、アヤネちゃんがヘリまで使うとは思わなかったよ。"
10039020-125 = "うへぇ、よっぽど恥ずかしかったんだね。"
10039020-126 = "力尽くで連れ出すわけにはいきませんが……。"
10039020-130 = "先生とシスターさんがいれば、何とかなるかもしれないです。"
10039020-132 = "え、ええ！？"
10039020-133 = "私は、その……！"
10039020-134 = "ごめんねぇ。#nちょっとおじさんたちに手を貸してくれないかな？"
10039020-135 = "……だって、「約束」したしねぇ？"
10039020-136 = "ん、約束は大事。"
10039020-140 = "[ns13] \"……たしかに。\"\n[ns14] \"約束は守らないとね。\""
10039020-143 = "……！"
10039020-144 = "……分かりました。"
10039020-145 = "微力ながらお手伝いいたします！"
10039020-147 = "うんうん！#nありがとうございます、マリーさん、先生！"
10039020-148 = "それじゃあ……！"
10039020-157 = "行きますよ～☆"
