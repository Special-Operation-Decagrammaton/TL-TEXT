[translation]
1300105-1 = "Noite de luar, compondo versos, algo especial"
1300105-2 = "（Recebi uma mensagem e vim até o parque）"
1300105-4 = "（Rustle）"
1300105-5 = "（Rustle, rustle）"
1300105-6 = "[s] \"...Chise? O que você está fazendo no meio dos arbustos?\""
1300105-7 = "Miau."
1300105-8 = "...Eu não sou a Chise agora, Sensei."
1300105-9 = "Agora eu sou um gato, miau..."
1300105-10 = "[s] \"Um gato...?\""
1300105-11 = "Estou sendo um gato que anda pelos arbustos."
1300105-12 = "Eu sou um gato, eu sou um gato..."
1300105-13 = "Sou um gato, miau~."
1300105-14 = "[s] \"Por que de repente...?\""
1300105-15 = "Porque preciso de inspiração."
1300105-16 = "Tenho que escrever um haikai."
1300105-17 = "[s1] \"Inspiração?\"\n[s2] \"Haikai?\""
1300105-18 = "Sim. Tentando várias coisas assim,"
1300105-19 = "Sim. Tentando várias coisas assim,"
1300105-20 = "quero escrever um haikai que toque o coração."
1300105-21 = "Falta pouco para o prazo final."
1300105-23 = "（Depois de ouvir enquanto analisava o 'idioma Chise', comecei a entender mais ou menos）"
1300105-26 = "[ns3] \"Então, como parte de um evento de relações públicas do Departamento Yin-Yang,\"\n[ns4] \"você precisa de um haikai para exibir no centro comunitário, é isso?\""
1300105-27 = "（Acena com a cabeça）"
1300105-28 = "（Acena com a cabeça）"
1300105-29 = "Para isso, vou compor um haikai."
1300105-30 = "[s] \"Falando nisso, você mencionou que estava fazendo esse tipo de atividade.\""
1300105-31 = "Sim, mas é uma emergência."
1300105-32 = "Minha mente está em branco e nada me vem à cabeça."
1300105-33 = "Por isso."
1300105-34 = "Quero que me ajude hoje para que eu consiga pensar em um bom haikai."
1300105-35 = "Você me ajuda...?"
1300105-36 = "[s] \"Claro, eu ajudo.\""
1300105-37 = "Obrigada, Sensei."
1300105-38 = "Então, primeiro, já que encontrei o Sensei..."
1300105-39 = "Vou compor o que sinto agora, como se eu fosse um gato..."
1300105-41 = "Sen#nsei#n miau"
1300105-43 = "Ah#n ah#n Sen#nsei#n miau"
1300105-45 = "Sen#nsei#n miau#n |"
1300105-49 = "[ns] \"Este é o haikai da Chise...\""
1300105-50 = "Se eu ficar mais tempo com o Sensei, talvez surjam muitas ideias."
1300105-51 = "Vamos, Sensei."
1300105-56 = "（Croac, croac, croac...）"
1300105-57 = "O coaxar."
1300105-58 = "[s] \"Sim, parece que tem um sapo por perto.\""
1300105-59 = "O sapinho está me chamando."
1300105-60 = "[s] \"Sim... Hã?\""
1300105-61 = "Croac, croac."
1300105-62 = "Croac, croac...?"
1300105-63 = "（Croac, croac! Croac, croac!）"
1300105-64 = "[s] \"Vocês estão se entendendo!?\""
1300105-65 = "Ah."
1300105-66 = "Graças aos sapinhos, eu tive uma ideia."
1300105-67 = "Acho que agora consigo compor."
1300105-69 = "Co#na#nco#na#nco"
1300105-71 = "Co#nro#ncor#nro#nso"
1300105-73 = "Pu#nla#n e#n sa#n lta"
1300105-76 = "……O que achou? Os sapinhos também gostaram?"
1300105-77 = "（Kero-kero!! Kero-kero!!）"
1300105-78 = "[s] \"Parece que eles gostaram bastante…… não é?\""
1300105-79 = "Que bom♪"
1300105-82 = "Bem-vindo!"
1300105-83 = "[s] \"Agora é uma loja de conveniência?\""
1300105-84 = "Sim."
1300105-85 = "Lojas de conveniência são tão coloridas e fofas,"
1300105-86 = "então pensei que poderia ter uma boa inspiração aqui."
1300105-87 = "[s] \"Hmm, mas não vejo nada que combine com um haikai...\""
1300105-88 = "Ah."
1300105-89 = "Sensei, olhe isto."
1300105-90 = "Ramune sabor matcha, é uma edição limitada."
1300105-91 = "[s] \"Ra, ramune sabor matcha……?\""
1300105-92 = "Ramune sabor matcha, e além disso, tantos doces coloridos……."
1300105-93 = "Ah, tive uma ideia."
1300105-94 = "[s] \"Até na loja de conveniência você consegue compor!\""
1300105-97 = "Bri#n lha#n nte"
1300105-99 = "Mes#n mo#n na#n es#n cu#n ri#n dão"
1300105-101 = "Co#n res#n lu#n zem"
1300105-104 = "O que achou, Sensei?"
1300105-105 = "[s5] \"Eu não entendo muito, mas acho que ficou ótimo.\"\n[s6] \"Acho que é um haikai maravilhoso.\""
1300105-106 = "Entendo. Hmm…… mas talvez só isso não seja o suficiente."
1300105-107 = "Entendo. Hmm…… mas talvez só isso não seja o suficiente."
1300105-108 = "O que está faltando…… hum……."
1300105-110 = "（Dessa forma, passei o dia inteiro caminhando por vários lugares com Chise）"
1300105-111 = "（Embora ela tenha composto vários haikais……）"
1300105-112 = "Algo está faltando."
1300105-113 = "Algo que toque mais o coração, algo assim……."
1300105-114 = "（Chise continuou inclinando a cabeça em dúvida o tempo todo）"
1300105-116 = "（Enquanto isso, o sol começou a se pôr……）"
1300105-118 = "[ns7] \"Caminhamos bastante hoje, né.\"\n[ns8] \"E então, surgiu alguma ideia?\""
1300105-119 = "……."
1300105-120 = "……."
1300105-121 = "Eu não sei bem."
1300105-122 = "Caminhei o dia todo com o Sensei e várias coisas me vieram à mente."
1300105-123 = "Mas sinto que não consegui capturar algo essencial."
1300105-124 = "Por que será?"
1300105-125 = "[s] \"Hmm, o que será…….\""
1300105-126 = "……."
1300105-127 = "[s] \"Mas eu me diverti muito hoje.\""
1300105-128 = "……Divertido?"
1300105-129 = "[s9] \"Pude ouvir os haikais da Chise,\"\n[s10] \"e foi muito bom passear com você.\""
1300105-130 = "Passear……."
1300105-131 = "Um passeio..."
1300105-132 = "...é divertido."
1300105-133 = "Ah."
1300105-134 = "[s] \"Chise?\""
1300105-135 = "Tive uma ideia repentina."
1300105-136 = "Preciso voltar e escrever."
1300105-140 = "[ns] \"E-espera! Chise!?\""
1300105-142 = "Academia Hyakkiyako - Antigo Prédio Escolar"
1300105-143 = "(Depois disso, corri atrás da Chise, que começou a correr de repente...)"
1300105-144 = "[s] \"Este lugar é... o antigo prédio escolar de Hyakkiyako?\""
1300105-145 = "Sensei, por aqui. Venha."
1300105-150 = "[wa:500]― Seja bem-vindo, [wa:1850] Sensei."
1300105-152 = "― Como aqui é [wa:1350] silencioso..."
1300105-155 = "― É o lugar perfeito [wa:1900] para escrever haicais."
1300105-158 = "[wa:350]― Hoje, [wa:800] estar com você, Sensei..."
1300105-160 = "[wa:50]― Foi [wa:650] muito divertido."
1300105-163 = "― E então eu [wa:2300] percebi."
1300105-165 = "― O haicai que eu [wa:800] queria escrever, [wa:3950] era..."
1300105-168 = "― Algo que expressasse [wa:1600] esse sentimento"
1300105-170 = "― que senti o dia todo."
1300105-173 = "O#n dia#n se#n põe#n"
1300105-175 = "Mas#n o#n som#n"
1300105-177 = "Ainda#n ecoa#n"
1300105-180 = "[wa:450]― ...Se for com você, Sensei, [wa:3050] sinto que"
1300105-182 = "[wa:50]― ainda posso escrever muitos outros."
1300105-185 = "[wa:200]― Da próxima vez, [wa:1950] você me acompanha de novo?"
1300105-188 = "[wa:150]― Ah... [wa:1650] Sensei, [wa:1700] olhe."
1300105-191 = "[ns] \"Hm? ...A lua?\""
1300105-192 = "[wa:1200]― A lua, [wa:1500] está linda, não é?"
1300105-195 = "[ns] \"Chise? Isso é, tipo, aquele...\""
1300105-196 = "― É realmente, [wa:2250] linda..."
1300105-199 = "[ns] \"Ah, você quer dizer que ela é literalmente bonita...\""
1300105-201 = "[ns11] \"Sim, como você disse, Chise, realmente...\"\n[ns12] \"A lua está linda.\""
1300105-205 = "(Sentei-me ao lado de Chise e passamos um longo tempo observando a lua juntos.)"
