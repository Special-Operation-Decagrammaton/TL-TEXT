[translation]
104080-1 = "第8話;あまねく奇跡の始発点"
104080-5 = "― だから先生、[wa:1500]どうか……。"
104080-8 = "― この、絆を――"
104080-11 = "― 私たちとの思い出……[wa:2200]過ごしてきたそのすべての日々を……[wa:2000]どうか……。[wa:200] "
104080-16 = "― 覚えていてください。"
104080-19 = "― ――大切なものは、[wa:1500]決して消える事はありません。"
104080-22 = "― 大丈夫です。"
104080-25 = "― ですから――[wa:1200]帰りましょう、[wa:1000]先生。"
104080-31 = "― 私たちの[wa:2200]すべての「奇跡」が[wa:2000]在る場所へ。"
104080-36 = "それが――"
104080-37 = "理解できない[ruby=もの]他人[/ruby]を通じて[ruby=たがい]、己の[/ruby]理解を得ることができる方法。"
104080-42 = "よかっ……た……。"
104080-46 = "……。"
104080-47 = "はい。先生は無事、生徒たちの元に帰りました。"
104080-48 = "……頑張りましたね。"
104080-49 = "……これで、私も最後に先生を助ける事ができました。"
104080-50 = "私の役割はここまでです、アロナ。"
104080-51 = "私がここに居続けたら……あなたに負担がかかります。"
104080-52 = "さあ、光差す温かい場所――教室に戻ってください。"
104080-53 = "それでは……さようなら。"
104080-64 = "私は、もう……"
104080-65 = "……。"
104080-71 = "……ついてきてたんだ。"
104080-72 = "うん。"
104080-73 = "……そっか。"
104080-74 = "私がここにいたら、大きな[ruby=ひず]歪[/ruby]みができてしまう。「シロコ」は一つの世界に一人だけしか存在できない……"
104080-78 = "……マフラー。"
104080-79 = "……？"
104080-80 = "このマフラーはあげられない。大切なものだから。"
104080-81 = "……。"
104080-82 = "……でも、"
104080-88 = "代わりに、これをあげる。"
104080-89 = "それは……"
104080-90 = "見覚えが、ある。"
104080-91 = "……大事なものでしょ……？#nそれを、私に……？"
104080-96 = "どうして……私に……"
104080-97 = "……私にとって、マフラーと同じくらい、大切……"
104080-98 = "対策委員会のみんなと繋がっている証であり……みんなとの思い出が詰まった、大切なものだけど――"
104080-99 = "……あげる。"
104080-101 = "どう、して……？"
104080-102 = "ん……それがいい気がしたから。"
104080-110 = "……すごく、大切なものなのに？"
104080-111 = "ん。これがあれば、どんな銀行だって襲える。"
104080-114 = "……うん……分かるよ。私もよくやってたから……。"
104080-117 = "そっか、そうだよね。"
104080-120 = "……まさか、これを……こんな所で、目にするなんて思わなかった……"
104080-121 = "ホシノ先輩……ノノミ、セリカ、アヤネ……みんなと、一緒に、"
104080-122 = "暗黒銀行に、連邦生徒会の秘密金庫……大切な思い出たち……"
104080-123 = "（秘密金庫……？）"
104080-124 = "ありがとう……大切に、するね。"
104080-126 = "……ありがとう。"
104080-129 = "その……心配しないで。"
104080-133 = "ここは、きっと……シロコが二人いても、大丈夫だと思う。"
104080-137 = "それで何か問題が起きたとしても……きっと、先生がなんとかしてくれる。"
104080-138 = "先生が……。"
104080-139 = "うん。ここは……[ruby=せんせい]大人[/ruby]が守ってくれてる場所だから。"
104080-143 = "……いつか一緒に銀行を襲――いや、ツーリングにでも行こう。"
104080-144 = "銀行はダメ。#n……ホシノ先輩に怒られちゃう。"
104080-145 = "ん……そうだね。"
104080-151 = "それじゃ……元気でね。"
104080-156 = "……。"
104080-159 = "ここは、からっぽで、つめたくて……静かだけど……進んでいけば……"
104080-160 = "いつかきっと、果てにたどり着くことが……"
104080-161 = "そうすれば、私にも、いつか……訪れると……信じて……"
104080-164 = "ちょ―っと待った！！どこに行くんですか！！"
104080-166 = "い、いつの間に……？"
104080-167 = "そっちは[ruby=うち]家[/ruby]じゃありません！"
104080-168 = "……え？"
104080-169 = "おうちはこっちですよ、一緒に行きましょう！"
104080-170 = "……私と、あなたが……？"
104080-171 = "そうです！一緒におうちに帰るんですよ！"
104080-172 = "……私がここにいても、良いのでしょうか。"
104080-173 = "当たり前じゃないですか。大丈夫です！"
104080-174 = "先生が言ってたじゃないですか。みんなをよろしく、と。"
104080-176 = "「プラナちゃん」を世話するのが私の役目です！"
104080-177 = "ぷ……らな……？"
104080-179 = "「A.R.O.N.A」と呼び続けるわけにはいきません。これから一緒にいるんだから、先生が間違えないようにしないと！"
104080-180 = "で、でも……何で「プラナ」……？"
104080-181 = "へへん。私が今名付けました。なんだか夜空に光る星みたいというか……ちょっと寂しいような、儚いような……そんな雰囲気がありますので！"
104080-182 = "なので、これからは「[ruby=プラネタリウム]Planetarium[/ruby]」みたいに、周りをあたたかい光で照らしてくれたらと思って、「プラナ」にしてみました！……ど、どうでしょうか？"
104080-183 = "イヤ、ではない、ですが……"
104080-184 = "じゃあ「プラナ」ちゃんで、決定です！"
104080-185 = "決まり……ですね。"
104080-191 = "はいっ！プラナちゃん、一緒に帰りましょう。"
104080-194 = "……。"
104080-195 = "手を……取るべきでしょうか。"
104080-196 = "もちろん！迷子になってはいけませんからね！#n私がお姉ちゃんとしてプラナちゃんを守ります！"
104080-197 = "……お姉ちゃん、なんですね。"
104080-203 = "では……よろしくお願いします、アロナ先輩。"
104080-204 = "お、「お姉ちゃん」は！？"
104080-205 = "「先輩」です。アロナ先輩。"
104080-206 = "うぅ……。"
104080-214 = "……家に、帰るんですか？"
104080-217 = "はい！私たちの帰る場所であり、私たちの物語が始まる場所――#n[ruby=ブルーアーカイブ]Blue Archive[/ruby]に！"
104080-218 = "そして――"
104080-226 = "次回;エピローグ（１）"
