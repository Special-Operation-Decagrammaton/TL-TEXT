[translation]
104080-1 = "Episódio 8; Ponto de partida dos milagres universais"

104080-5 = "- Então, professor, [wa:1500] por favor..."

104080-8 = "-Este vínculo-"

104080-11 = "- Memórias conosco... [wa:2200] Todos os dias que passamos juntos... [wa:2000] Por favor... [wa:200]"

104080-16 = "- Por favor, lembre-se."

104080-19 = "--- Coisas importantes nunca desaparecem [wa:1500]."

104080-22 = "- tudo bem."

104080-25 = "- Então... [wa:1200] Vamos para casa, [wa:1000] Sensei."

104080-31 = "- Para o lugar onde estão todos os nossos [wa:2200] "milagres" [wa:2000]."

104080-36 = "Isso é..."

104080-37 = "Uma maneira de obter compreensão de si mesmo [/ruby] através de [ruby=coisas]outras pessoas[/ruby] que você não consegue entender."

104080-42 = "bom……."

104080-46 = "……."

104080-47 = "sim. O professor voltou em segurança para seus alunos."

104080-48 = "...Você fez o seu melhor."

104080-49 = "...Com isso finalmente consegui ajudar a professora."

104080-50 = "Meu papel termina aqui, Alona."

104080-51 = "Se eu continuar aqui... será um fardo para você."

104080-52 = "Agora, por favor, volte para a luz quente e brilhante da sala de aula."

104080-53 = "Bem, então... adeus."

104080-64 = "eu já..."

104080-65 = "……."

104080-71 = "...Eu estava seguindo você."

104080-72 = "Sim."

104080-73 = "...Eu vejo."

104080-74 = "Se eu estivesse aqui, haveria uma enorme [ruby=distortion]distorção[/ruby]. Apenas um "Shiroko" pode existir em um mundo..."

104080-78 = "……silencioso."

104080-79 = "...?"

104080-80 = "このマフラーはあげられない。大切なものだから。"

104080-81 = "……."

104080-82 = "……mas,"

104080-88 = "Eu vou te dar isso em vez disso."

104080-89 = "isso é……"

104080-90 = "Parece familiar."

104080-91 = "...É importante, certo? #nDê para mim...?"

104080-96 = "Por que... eu..."

104080-97 = "...Para mim, é tão importante quanto um silenciador..."

104080-98 = "É a prova de que estou conectado com todos da força-tarefa...é uma coisa importante e cheia de lembranças com todos, mas..."

104080-99 = "……dar."

104080-101 = "Por que……?"

104080-102 = "Hmm... eu senti que isso era bom."

104080-110 = "...Mesmo sendo algo muito importante?"

104080-111 = "sim. Com isso, você pode roubar qualquer banco."

104080-114 = "...Sim... eu entendo. Eu também estava bem..."

104080-117 = "Entendo, está certo."

104080-120 = "...Nunca pensei que veria isso...em um lugar como este..."

104080-121 = "Hoshino-senpai... Nonomi, Celica, Ayane... junto com todos,"

104080-122 = "No banco escuro, o cofre secreto do Conselho Estudantil da Federação... memórias preciosas..."

104080-123 = "(Segredo seguro...?)"

104080-124 = "Obrigado... vou valorizar isso."

104080-126 = "……obrigado."

104080-129 = "Hum... não se preocupe."

104080-133 = "Tenho certeza... acho que vai ficar tudo bem mesmo que haja duas Shiroko aqui."

104080-137 = "Mesmo que algo dê errado... tenho certeza que o professor cuidará disso."

104080-138 = "A professora..."

104080-139 = "Sim. Este é um lugar onde... [ruby=Sensei]Adulto[/ruby] está me protegendo."

104080-143 = "...Vamos roubar um banco juntos algum dia - ou talvez até fazer um tour."

104080-144 = "Os bancos não são bons. #n...Hoshino-senpai fica bravo comigo."

104080-145 = "Hum... isso mesmo."

104080-151 = "Bem, então... espero que você esteja bem."

104080-156 = "……."

104080-159 = "Este lugar está vazio e frio... está quieto... mas conforme eu sigo em frente..."

104080-160 = "Um dia, tenho certeza que chegarei ao fim..."

104080-161 = "Se eu fizer isso, acreditarei que um dia... isso acontecerá..."

104080-164 = "Espere um minuto! ! Onde você está indo? !"

104080-166 = "Quando foi que...?"

104080-167 = "Essa não é [ruby=minha]casa[/ruby]!"

104080-168 = "……foto?"

104080-169 = "Esta é a minha casa, vamos juntos!"

104080-170 = "...Eu e você...?"

104080-171 = "isso mesmo! Vamos para casa juntos!"

104080-172 = "...Está tudo bem se eu ficar aqui?"

104080-173 = "Isso não é óbvio? tudo bem!"

104080-174 = "Não foi isso que seu professor disse? Por favor, cuide de todos."

104080-176 = "Meu papel é cuidar da “Prana-chan”!"

104080-177 = "Pu... ra...?"

104080-179 = "Não podemos continuar chamando isso de "A.R.O.N.A." Estaremos juntos a partir de agora, então temos que garantir que o professor não cometa erros!"

104080-180 = "Mas... por que "prana"...?"

104080-181 = "Hehehe. Acabei de nomeá-lo. É como uma estrela brilhando no céu noturno... é um pouco solitário e efêmero... tem esse tipo de atmosfera!"

104080-182 = "Então, de agora em diante, eu queria iluminar os arredores com uma luz quente como "[ruby=Planetarium]Planetarium[/ruby]", então decidi torná-lo "Prana"! ...O que você acha?"

104080-183 = "Eu não gosto disso, mas..."

104080-184 = "Bem, está decidido que será "Prana"!"

104080-185 = "Está decidido... certo?"

104080-191 = "Sim! Prana-chan, vamos para casa juntos."

104080-194 = "……."

104080-195 = "Devo pegar sua mão?"

104080-196 = "claro! Não se perca! #nEu protegerei Prana-chan como uma irmã mais velha!"

104080-197 = "...Minha irmã, o que é isso?"

104080-203 = "Pois bem... Muito obrigado, Arona-senpai."

104080-204 = "Ah, “irmã”! ?"

104080-205 = "“Sênior.” Alona sênior."

104080-206 = "Eca..."

104080-214 = "...Você vai para casa?"

104080-217 = "sim! O lugar para onde voltamos e onde nossa história começa---#n[ruby=Blue Archive]Blue Archive[/ruby]!"

104080-218 = "e--"

104080-226 = "Próxima vez; Epílogo (1)"

