[translation]
104080-1 = "Episódio 8; Onde Todo Milagre Desperta"
104080-5 = "― Por isso, Sensei, [wa:1500]por favor..."
104080-8 = "― Esses laços――"
104080-11 = "― As memórias com a gente... [wa:2200]todos os dias que passamos juntos... [wa:2000]por favor... [wa:200] "
104080-16 = "― Não se esqueça deles."
104080-19 = "― ――As coisas importantes [wa:1500]nunca desaparecem de verdade."
104080-22 = "― Vai ficar tudo bem."
104080-25 = "― Então――[wa:1200]vamos voltar para casa, [wa:1000]Sensei."
104080-31 = "― Para onde todos os nossos [wa:2200]\"milagres\" [wa:2000]estão."
104080-36 = "Isso é――"
104080-37 = "O método para alcançar a compreensão de si mesmo através do outro, a quem não podemos compreender."
104080-42 = "Que... bom..."
104080-46 = "……。"
104080-47 = "Sim. O Sensei voltou são e salvo para junto de seus alunos."
104080-48 = "……Você se esforçou bastante."
104080-49 = "……Com isso, eu pude ajudar o Sensei uma última vez."
104080-50 = "Meu papel termina aqui, Arona."
104080-51 = "Se eu continuar aqui... serei um fardo para você."
104080-52 = "Agora, volte para aquele lugar quente e iluminado――sua sala de aula."
104080-53 = "Então... adeus."
104080-64 = "Eu já não..."
104080-65 = "……。"
104080-71 = "……Você me seguiu."
104080-72 = "Sim."
104080-73 = "……Entendi."
104080-74 = "Se eu ficar aqui, vai criar uma grande distorção. Só pode existir uma \"Shiroko\" em cada mundo..."
104080-78 = "……O cachecol."
104080-79 = "……?"
104080-80 = "Eu não posso te dar esse cachecol. É muito importante pra mim."
104080-81 = "……。"
104080-82 = "……Mas,"
104080-88 = "Em vez disso, vou te dar isso."
104080-89 = "Isso é..."
104080-90 = "Eu lembro disso."
104080-91 = "……Isso também é importante pra você, não é...?#nVocê... quer me dar isso?"
104080-96 = "Por que... para mim..."
104080-97 = "……Para mim, isso é tão importante quanto o cachecol..."
104080-98 = "É a prova de que estou conectada com o pessoal do Comitê de Medidas de Precaução... É cheio de memórias importantes, mas――"
104080-99 = "……É seu."
104080-101 = "Por quê...?"
104080-102 = "Hum... Porque eu senti que era a coisa certa a se fazer."
104080-110 = "……Mesmo sendo algo tão importante assim?"
104080-111 = "Sim. Com isso aqui, dá pra assaltar qualquer banco."
104080-114 = "……É... eu sei. Eu também fazia muito isso..."
104080-117 = "Pois é, né."
104080-120 = "……Nunca imaginei que veria isso... em um lugar como este..."
104080-121 = "Hoshino-senpai... Nonomi, Serika, Ayane... Junto com todo mundo,"
104080-122 = "O Banco Clandestino, o cofre secreto do Conselho Estudantil Geral... Tantas lembranças preciosas..."
104080-123 = "（O cofre secreto...?）"
104080-124 = "Obrigada... Vou guardar com muito carinho."
104080-126 = "……Obrigada a você."
104080-129 = "Sabe... não precisa se preocupar."
104080-133 = "Aqui, eu tenho certeza... que não vai ter problema se tiver duas Shirokos."
104080-137 = "E mesmo que aconteça algum problema... o Sensei com certeza vai dar um jeito."
104080-138 = "O Sensei..."
104080-139 = "Sim. Aqui é... o lugar que um adulto protege."
104080-143 = "……Um dia a gente assalta um banco jun――quer dizer, a gente sai pra dar uma volta de bicicleta."
104080-144 = "Banco não pode.#n……A Hoshino-senpai vai brigar com a gente."
104080-145 = "É... Tem razão."
104080-151 = "Então... se cuida."
104080-156 = "……。"
104080-159 = "Aqui é tão vazio, frio e... silencioso... mas se eu continuar andando..."
104080-160 = "Um dia, com certeza vou chegar ao fim..."
104080-161 = "E então, um dia... vai chegar a minha vez também... É nisso que eu acredito..."
104080-164 = "Opa, espera um instantinho!! Onde você pensa que vai!?"
104080-166 = "D-Desde quando você...?"
104080-167 = "A nossa casa não é por aí!"
104080-168 = "……Hein?"
104080-169 = "A nossa casa é por aqui, vamos juntas!"
104080-170 = "……Eu e você... juntas?"
104080-171 = "Isso mesmo! Vamos voltar para casa juntas!"
104080-172 = "……Tem certeza que eu posso ficar aqui?"
104080-173 = "Mas é claro que sim. Vai dar tudo certo!"
104080-174 = "Você não ouviu o que o Sensei disse? Que eu deveria cuidar de vocês."
104080-176 = "A partir de agora, o meu papel é cuidar da 'Plana-chan'!"
104080-177 = "Pla... na...?"
104080-179 = "A gente não pode ficar te chamando de 'A.R.O.N.A' o tempo todo. A gente vai ficar juntas agora, então precisamos facilitar as coisas para o Sensei não se confundir!"
104080-180 = "M-Mas... por que 'Plana'...?"
104080-181 = "Hehe. Eu acabei de inventar esse nome. Você me lembra uma estrela brilhando no céu noturno... tem uma vibe meio solitária, mas ao mesmo tempo efêmera... É isso!"
104080-182 = "Por isso, escolhi 'Plana', para que você seja como um Planetarium e ilumine tudo ao redor com uma luz bem aconchegante! ...O-O que achou?"
104080-183 = "Eu não odeio, mas..."
104080-184 = "Então está decidido, será 'Plana-chan'!"
104080-185 = "Decidido... então."
104080-191 = "Isso aí! Vamos voltar pra casa juntas, Plana-chan."
104080-194 = "……。"
104080-195 = "Será que... eu deveria segurar sua mão?"
104080-196 = "É claro! Para não nos perdemos uma da outra!#nEu, como sua irmã mais velha, vou proteger você, Plana-chan!"
104080-197 = "……Irmã mais velha... é."
104080-203 = "Então... conto com você, Arona-senpai."
104080-204 = "Ué, e o \"irmã mais velha\"!?"
104080-205 = "Será 'senpai'. Arona-senpai."
104080-206 = "Uuuh..."
104080-214 = "……Nós vamos, voltar para casa?"
104080-217 = "Sim! Para o lugar para onde devemos voltar, e onde a nossa história vai começar――#nPara o Blue Archive!"
104080-218 = "E assim――"
104080-226 = "Próximo episódio; Epílogo (1)"