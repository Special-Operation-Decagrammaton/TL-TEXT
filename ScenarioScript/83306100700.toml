[translation]
83306100700-7 = "あっ！見つかっちゃった～！"
83306100700-8 = "あちゃー、見つかっちゃったね～！"
83306100700-9 = "さすが風紀委員長。あの噂は本当だったんだ。"
83306100700-11 = "あの噂は誤解よ。"
83306100700-12 = "えへへ！こんなすぐイブキを見つけるなんて、ヒナ先輩すごい！"
83306100700-13 = "楽しかった～！遊んでくれてありがとう、お姉ちゃんたち！"
83306100700-18 = "いえ～い！楽しかったよ、イブキちゃーん！"
83306100700-19 = "ふふ、意外と楽しかったね。"
83306100700-21 = "じゃあ、また遊んでくれる？"
83306100700-22 = "うん、そうね。また遊びましょう。"
83306100700-23 = "わぁい！約束だよ、絶対！"
