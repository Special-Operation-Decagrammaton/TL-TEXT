22240-201 = "Mesmo que a Aris...... seja uma Maou, se você me perdoar por isso......!"
22240-203 = "Sim! Se é isso que a Aris quer, então está tudo bem!"
22240-204 = "Mesmo uma Maou pode se tornar uma heroína."
22240-205 = "Na verdade, ultimamente histórias assim fazem muito sucesso!"
22240-206 = "Se...... mesmo que não houvesse esse sucesso...... #n nós podemos simplesmente criar uma história assim para o próximo jogo......."
22240-208 = "Porque nós quatro podemos transformar qualquer imaginação em realidade......!"
22240-209 = "Podemos criar qualquer coisa.........!"
22240-211 = "Porque somos o 'Clube de Desenvolvimento de Jogos'!"
