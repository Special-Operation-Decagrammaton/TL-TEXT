22240-145 = "Momoi...?"
22240-146 = "Salvar o clube... criar o jogo e brincar juntas!"
22240-147 = "Até mesmo ter ficado próxima da Neru-senpai, que antes só parecia assustadora!"
22240-148 = "Tudo! Absolutamente tudo!#nFoi porque a Alice estava conosco!"
22240-149 = "E mesmo assim, dizer que a Alice é uma Lorde Demônio, que ela nasceu para ser assim...#ne que por isso ela tem que desaparecer! Isso não faz sentido nenhum!!"
22240-150 = "Eu nunca vou aceitar uma coisa dessas!"
22240-151 = "Sim, nunca."
22240-152 = "Eu não posso... simplesmente deixar você desaparecer..."
22240-153 = "...P-por que?#nPessoal... por que vocês..."
22240-154 = "Mesmo que a Alice seja... uma Lorde Demônio..."
22240-155 = "Mesmo que todos tenham se ferido... por causa da Alice..."
22240-156 = "Por que vocês não... têm medo da Alice... ou a odeiam..."
22240-157 = "Por que vocês..."
