22240-133 = "Fim de Kivotos? Do que você está falando?"
22240-134 = "Só por causa da Alice, todos vão se machucar?"
22240-135 = "Quem foi que disse uma bobagem dessas!?"
22240-139 = "Conhecer a Alice..."
22240-140 = "Porque a Alice estava lá...!"
22240-141 = "Nós conseguimos criar o jogo!#nGanhamos um prêmio no Millennium Prize e conseguimos salvar o nosso clube!"
