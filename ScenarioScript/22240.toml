22240-162 = "'Final Fantasia', 'Dragon Test', 'Tales of Fate',#n'Dragon Knight Tradition', 'Hero Myth', 'Eyes Eternal'...#ne então — 'Tales Saga Chronicle'..."
22240-163 = "Não importa o jogo, os protagonistas..."
22240-164 = "[s] \"Nunca desistem de seus companheiros.\""
22240-165 = "Mesmo que a Alice seja uma Lorde Demônio, isso não importa...!"
22240-166 = "Isso é só uma classe, nada mais!"
22240-167 = "Quem você é, é algo que você mesma decide!"
22240-168 = "A Alice só precisa escolher a classe que quer ser e mudar de profissão!"
22240-169 = "Guerreira, cavaleira, maga, sacerdotisa — qualquer uma serve, Alice."
22240-170 = "Claro, pode ser qualquer outra profissão também."
22240-171 = "E... também existe a de heroína."
22240-172 = "[ns] \"Por isso, eu quero ouvir o que a Alice realmente sente.\""
22240-174 = "Mesmo que a Alice seja... uma Lorde Demônio..."
22240-175 = "Mesmo que ela vá... destruir o mundo..."
22240-176 = "............Mesmo assim..."
22240-178 = "......Ainda assim............ a Alice..."
22240-179 = "Tudo bem ser assim?"
22240-182 = "Continuar a aventura... com todo mundo..."
22240-183 = "Eu posso... continuar com a missão?"
22240-186 = "Mesmo sendo uma Alice como eu...?#nSério mesmo...?"
22240-187 = "[ns] \"Sim.\""
22240-189 = "[ns] \"Com certeza.\""
22240-193 = "Sendo assim... eu também... quero fazer isso..."
22240-196 = "A Alice também! Quero me tornar uma heroína...#ne com todos..."
22240-199 = "Momoi, Midori, Yuzu.#nE com o Sensei... eu quero continuar a aventura...!"
22240-201 = "Se a Alice, que é a Rainha Demônio... puder ser perdoada por fazer isso...!"
22240-203 = "Sim! Se é isso que a Alice quer, então é o suficiente!"
22240-204 = "Até uma Rainha Demônio pode se tornar uma heroína."
22240-205 = "Na verdade, esse tipo de história está fazendo muito sucesso ultimamente!"
22240-206 = "Mesmo que... não houvesse esse tipo de tendência...#nnós poderíamos simplesmente criar como nosso próximo jogo..."
22240-208 = "Porque nós quatro somos capazes de transformar várias imaginações em realidade...!"
22240-209 = "Podemos criar qualquer coisa...!"
22240-211 = "Porque somos o \"Departamento de Desenvolvimento de Jogos\"!"
22240-216 = "――Então, a Alice quer se tornar uma heroína."
22240-217 = "[ns] \"Sim. Você pode se tornar uma heroína.\""
22240-219 = "A Alice... quer ser a Alice...!"
22240-220 = "[ns] \"Você mesma pode decidir quem quer ser――Alice.\""
22240-223 = "Isso é...!"
