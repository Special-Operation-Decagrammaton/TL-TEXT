22240-171 = "E tem...... a de Heroína também."
22240-172 = "[ns] \"Então, me diga o que você realmente quer, Aris.\""
22240-174 = "A Aris...... mesmo sendo uma Maou......"
22240-175 = "Mesmo que vá...... destruir o mundo......"
22240-176 = "............Mesmo assim......"
22240-178 = "......Mesmo assim............ a Aris......"
22240-179 = "Mesmo sendo assim, tudo bem?"
22240-182 = "Continuar a aventura...... junto com todos......"
