22240-162 = "'Final Fantasia', 'Dragon Test', 'Tales of Fate', #n 'Ryuki Dento', 'Eiyu Shinwa', 'Eyes Eternal'...... #n E―― 'Tales Saga Chronicle'......"
22240-163 = "Não importa o jogo, os protagonistas......"
