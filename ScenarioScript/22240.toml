22240-156 = "Por que, todos...... não tem medo...... nem ódio da Aris......"
22240-157 = "Agindo desse jeito......"
22240-158 = "Porque! A Aris-chan é......"
22240-159 = "Nossa amiga......!"
22240-160 = "......!"
