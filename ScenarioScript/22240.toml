22240-150 = "Eu nunca vou aceitar isso!"
22240-151 = "Sim, nunca."
22240-152 = "Não posso deixar...... você desaparecer......"
22240-153 = "......P, por que? #n Pessoal...... por que......"
22240-154 = "A Aris...... mesmo sendo uma Maou......"
