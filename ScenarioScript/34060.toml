[translation]
34060-1 = "Episódio 6: A asa quebrada"
34060-3 = "S-sim! Você me contatou, então vim o mais rápido que pude."
34060-4 = "Pedir para conversar a sós... não é muito a sua cara, Seia-chan, então fiquei um pouco surpresa!"
34060-5 = "Pedi até para as meninas do Comitê de Justiça que sempre me vigiam esperarem do lado de fora da porta. Então..."
34060-6 = "Mika..."
34060-7 = "S-Seia-chan...? Ei, seu rosto está... você está bem? Seu corpo está tremendo... você está bem? Devo chamar alguém—"
34060-8 = "...Quando você entrou em contato com o Distrito Autônomo de Arius, você encontrou mais alguém além do 'Esquadrão'?"
34060-9 = "Hã... Arius...?"
34060-10 = "Você realmente nunca foi ao Distrito Autônomo de Arius?"
34060-11 = "Err... bem, Seia-chan...?"
34060-12 = "Você viu uma mulher alta vestindo um vestido? Que outras informações você tem sobre o 'Esquadrão'?"
34060-13 = "...E-ei, Seia-chan. O que você está..."
34060-14 = "Cof, cof..."
34060-15 = "Por você ter entrado em contato com Arius..."
34060-19 = "..."
34060-20 = "Ah... é, né? Por minha causa... várias coisas..."
34060-21 = "O Sensei está... sendo alvo do Esquadrão..."
34060-22 = "...!?"
34060-23 = "...Seia-chan, o que você disse agora...?"
34060-28 = "Foi porque você trouxe o Sensei...!"
34060-29 = "...!!?"
34060-30 = "...Não, não é sua culpa... Me desculpe."
34060-31 = "Cof, cof, cof...!!"
34060-33 = "Cof, cof, cof, cof...!!"
34060-34 = "(Ah... não dá. Meu corpo não me obedece...)"
34060-37 = "(Minha consciência está... ficando... aos poucos...)"
34060-41 = "..."
34060-42 = "...Onde é aqui?"
34060-43 = "Este estilo arquitetônico... não pode ser, o Distrito Autônomo de Arius...?"
34060-44 = "Sim — é o lugar chamado de 'Basílica' de Arius."
34060-45 = "!!"
34060-51 = "Ugh...!!"
34060-52 = "Pensei que houvesse um rato espiando, e era você mesma — não acredito que você me seguiu até este santuário."
34060-53 = "Você baixou a guarda por achar que estava em um sonho? O Arcanjo da Profecia... ou melhor, Seia Yurizono."
34060-54 = "...E-este é... aquele altar..."
34060-55 = "Sim. É um lugar secreto que nem os outros da Gematria visitaram. Sinta-se honrada."
34060-60 = "...!!!"
34060-63 = "S-Seia-chan! Aguente firme!!"
34060-64 = "Alguém!! Alguém chame ajuda!! A Seia-chan está... a Seia-chan está estranha!!"
34060-65 = "S-sim! E-entendido!!"
34060-67 = "(O que é aquilo... afinal...)"
34060-68 = "(Só de olhar... sinto uma presença sinistra...)"
34060-69 = "(Este altar é... afinal... não pode ser, para invocar aquilo...?)"
34060-71 = "(Ela é...!)"
34060-73 = "(...)"
34060-74 = "(Entendo, este ritual é... não pode ser... isso é...)"
34060-78 = "(Essa mulher... que tipo de calamidade ela pretende... trazer para Kivotos...)"
34060-80 = "Ah... Seia-chan, você acordou?"
34060-81 = "Por que... a Seia-chan está passando por isso..."
34060-82 = "O que eu devo fazer... Seia-chan... o que eu faço..."
34060-84 = "Mika... eu... mais uma vez... a mesma coisa..."
34060-85 = "Sinto muito, Mika... a culpa não é sua. Isso foi... um erro que eu mesmo causei..."
34060-86 = "...Sensei, se você consegue ouvir minha voz... por favor..."
34060-87 = "Fuja — o mais longe que puder... saia do Distrito Autônomo de Arius."
34060-88 = "Caso contrário... o Sensei vai..."
34060-89 = "...ser alvo daqueles que..."
34060-90 = "Sensei...!!"
34060-92 = "Algum lugar em Kivotos - Beco"
34060-94 = "[ns1] (...Agora há pouco, parece que ouvi a voz da Seia)\n[ns2] (Será que foi impressão minha... sinto um aperto no peito...)"
34060-95 = "(A cidade onde cheguei seguindo um e-mail de remetente desconhecido está deserta, e não há sinal de ninguém por perto.)"
34060-96 = "(A cidade onde cheguei seguindo um e-mail de remetente desconhecido está deserta, e não há sinal de ninguém por perto.)"
34060-101 = "[ns] (Tem alguém aí...?)"
34060-103 = "[ns] \"Saori...?\""
34060-104 = "..."
34060-110 = "Próximo episódio: Escolha e Decisão"
