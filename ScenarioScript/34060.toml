[translation]
34060-1 = "Episódio 6; As Asas Quebradas"
34060-3 = "S-Sim! Eu vim correndo assim que recebi o seu chamado."
34060-4 = "Dizer que queria conversar a sós... não é a sua cara, Seia-chan, então eu fiquei um pouco surpresa!"
34060-5 = "Até pedi para a garota do Comitê de Realização da Justiça que vive me vigiando esperar do lado de fora da porta. Então..."
34060-6 = "Mika..."
34060-7 = "S-Seia-chan...? Ué, você está pálida... tudo bem com você? Você está tremendo... você tá bem? É melhor eu chamar alguém――"
34060-8 = "......Quando você fez contato com o distrito autônomo de Arius, chegou a encontrar mais alguém além do 'Esquadrão'?"
34060-9 = "Hã... Arius...?"
34060-10 = "Você realmente nunca foi ao distrito autônomo de Arius, nem uma única vez?"
34060-11 = "Err... Hum, Seia-chan...?"
34060-12 = "Chegou a ver uma mulher alta usando um vestido? Sabe de mais alguma outra informação sobre o 'Esquadrão'?"
34060-13 = "......E-Err, Seia-chan. O que você..."
34060-14 = "*Cof, cof...*"
34060-15 = "Por sua culpa, por ter feito contato com a Arius..."
34060-19 = "......"
34060-20 = "Ah... C-Claro... né? Por minha causa... muitas coisas..."
34060-21 = "O Sensei... é o alvo do Esquadrão..."
34060-22 = "......!?"
34060-23 = "......Seia-chan, o que você acabou de dizer...?"
34060-28 = "Porque foi você quem trouxe o Sensei...!"
34060-29 = "......!!?"
34060-30 = "......Não, não é culpa sua... me perdoe."
34060-31 = "*Cof, cof, cof...!!*"
34060-33 = "*Cof, cof, cof, cof...!!*"
34060-34 = "(Ah... maldição. O meu corpo não me obedece...)"
34060-37 = "(Minha consciência está... aos... poucos...)"
34060-41 = "......"
34060-42 = "......Onde estou?"
34060-43 = "Este estilo arquitetônico... Não pode ser, o distrito autônomo de Arius...?"
34060-44 = "Sim――Um lugar em Arius chamado 'Basílica'."
34060-45 = "!!"
34060-51 = "Ugh...!!"
34060-52 = "Eu imaginei que houvesse um rato bisbilhotando e, como esperado, era você―――Mas pensar que me seguiria até este santuário."
34060-53 = "Baixou a guarda por achar que isso é apenas um sonho? Arcanjo das Profecias... ou melhor, Seia Yurizono."
34060-54 = "......E-Então este é... aquele altar..."
34060-55 = "Sim. Uma região inexplorada que nem os outros membros da Gematria visitaram. Sinta-se honrada."
34060-60 = "......!!!"
34060-63 = "S-Seia-chan! Fique comigo!!"
34060-64 = "Alguém!! Que alguém chame ajuda!! A Seia-chan... Tem algo errado com a Seia-chan!!"
34060-65 = "S-Sim! E-Entendido!!"
34060-67 = "(O que diabos... é aquilo...)"
34060-68 = "(Apenas de olhar para isso... já sinto uma presença agourenta...)"
34060-69 = "(O que é... este altar... Não me diga que, para invocar aquilo...?)"
34060-71 = "(Ela...!)"
34060-73 = "(......)"
34060-74 = "(Entendo, este ritual é... não pode ser... isso é...)"
34060-78 = "(O que diabos essa mulher... está tentando trazer... para Kivotos...)"
34060-80 = "Ah... Seia-chan, você acordou?"
34060-81 = "Por que... a Seia-chan tem que passar por isso..."
34060-82 = "O que eu devo fazer... Seia-chan... o que eu faço..."
34060-84 = "Mika... eu acabei... fazendo a mesma coisa com você de novo..."
34060-85 = "Me perdoe, Mika... a culpa não é sua. Isso é... um erro que eu mesma causei..."
34060-86 = "......Sensei, se estiver ouvindo a minha voz... por favor..."
34060-87 = "Fuja――para o mais longe possível... fique longe do distrito autônomo de Arius."
34060-88 = "Senão... você, Sensei..."
34060-89 = "......Por aqueles que miram em você..."
34060-90 = "Sensei...!!"
34060-92 = "Beco em algum lugar de Kivotos"
34060-94 = "[ns1] (......Tenho a impressão de ter ouvido a voz da Seia agora)\n[ns2] (Deve ser impressão minha... que pressentimento ruim...)"
34060-95 = "(A cidade na qual cheguei seguindo um e-mail de remetente desconhecido está deserta e não há sinal de ninguém por perto.)"
34060-96 = "(A cidade na qual cheguei seguindo um e-mail de remetente desconhecido está deserta e não há sinal de ninguém por perto.)"
34060-101 = "[ns] (Tem alguém aí...?)"
34060-103 = "[ns] \"Saori...?\""
34060-104 = "......"
34060-110 = "Próximo Episódio; Escolhas e Decisões"