[translation]
34060-1 = "Episódio 6;As Asas que se Quebraram"
34060-3 = "S-sim! Recebi o recado e vim correndo."
34060-4 = "Você querer conversar só nós duas…… não é a sua cara, Seia; até me assustei um pouco!"
34060-5 = "Até a menina do Comitê de Realização da Justiça que sempre me vigia tá esperando do lado de fora da porta. Então……."
34060-6 = "Mika……."
34060-7 = "S-Seia……? Ué, sua cor…… você tá bem? Seu corpo tá tremendo…… tá tudo bem? Melhor eu chamar alguém――"
34060-8 = "……Quando você contatou o distrito autônomo de Arius, você encontrou mais alguém além do \"Squad\"?"
34060-9 = "Hã…… Arius……?"
34060-10 = "Você, de verdade, nunca foi nem uma vez ao distrito autônomo de Arius?"
34060-11 = "É que…… ei, Seia……?"
34060-12 = "Você já viu uma mulher alta, de vestido? Que outras informações você conhece sobre o \"Squad\"?"
34060-13 = "……É-é que, Seia. O que……."
34060-14 = "Cof, cof……."
34060-15 = "Por você ter contatado a Arius……."
34060-19 = "……."
34060-20 = "Ah…… é-é, né? Por minha culpa…… tanta coisa……."
34060-21 = "O Sensei…… está sendo visado pelo Squad……."
34060-22 = "……!?"
34060-23 = "……Seia, o que você acabou de……?"
34060-28 = "Porque foi você que trouxe o Sensei……!"
34060-29 = "……!!?"
34060-30 = "……Não; a culpa não é sua…… perdão."
34060-31 = "Cof, cof, cof……!!"
34060-33 = "Cof, cof, cof, cof……!!"
34060-34 = "(Ah…… não dá. O corpo não obedece……)"
34060-37 = "(A consciência…… aos…… poucos…………)"
34060-41 = "……."
34060-42 = "……Onde é aqui?"
34060-43 = "Este estilo arquitetônico…… não me diga que é do distrito autônomo de Arius……?"
34060-44 = "Sim――é o lugar chamado \"Basílica\" de Arius."
34060-45 = "!!"
34060-51 = "Uh……!!"
34060-52 = "Achei que houvesse um rato bisbilhotando; então era você mesmo―――quem diria que me seguiria até este sanctum sanctorum."
34060-53 = "Baixou a guarda por achar que era dentro de um sonho? Arcanjo da profecia…… não; Seia Yurizono."
34060-54 = "……A-aqui é…… aquele altar……."
34060-55 = "Sim. Um recanto secreto que nem os demais da Gematria visitaram. Sinta-se honrada."
34060-60 = "……!!!"
34060-63 = "S-Seia! Firme!!"
34060-64 = "Alguém!! Alguém chama uma pessoa!! A Seia…… a Seia tá estranha!!"
34060-65 = "S-sim! E-entendido!!"
34060-67 = "(Aquilo…… o que era……)"
34060-68 = "(Só de pôr nos olhos…… uma aura agourenta……)"
34060-69 = "(Aquele altar…… o que é…… não me diga que é pra invocar AQUILO……?)"
34060-71 = "(Aquela mulher……!)"
34060-73 = "(……)"
34060-74 = "(Entendi; aquele ritual é…… não pode ser…… não……)"
34060-78 = "(Aquela mulher…… que calamidade, afinal, ela quer…… trazer sobre Kivotos……)"
34060-80 = "Ah…… Seia, você acordou?"
34060-81 = "Por que…… por que a Seia passa por isto……."
34060-82 = "O que eu faço…… Seia…… e agora……."
34060-84 = "Mika…… eu, com você…… de novo a mesma coisa……."
34060-85 = "Perdão, Mika…… a culpa não é sua. Isto é…… um fracasso que eu mesma convidei……."
34060-86 = "……Sensei, se você ouve a minha voz…… por favor……."
34060-87 = "fuja――o mais longe possível…… afaste-se do distrito autônomo de Arius."
34060-88 = "Senão…… você……."
34060-89 = "……Aquele que visa você……."
34060-90 = "Sensei……!!"
34060-92 = "Algum lugar de Kivotos - Beco"
34060-94 = "[ns1] （……Agora, eu tive a impressão de ouvir a voz da Seia）\n[ns2] （Impressão minha……? Um mau pressentimento……）"
34060-95 = "(A cidade a que chegou, guiado por um e-mail de remetente desconhecido, estava decadente, sem sinal de gente.)"
34060-96 = "(A cidade a que chegou, guiado por um e-mail de remetente desconhecido, estava decadente, sem sinal de gente.)"
34060-101 = "[ns] （Tem alguém……?）"
34060-103 = "[ns] \"Saori……?\""
34060-104 = "……."
