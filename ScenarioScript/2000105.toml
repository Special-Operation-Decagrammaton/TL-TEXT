[translation]
2000105-1 = "勉強は難しい（２）"
2000105-2 = "図書館"
2000105-3 = "……。"
2000105-4 = "ごめん、先生。あんなに手伝ってくれたのに……。"
2000105-5 = "追試の結果は……絶望的だ。"
2000105-6 = "このまま留年するところだった……けど。"
2000105-7 = "幸い、シャーレとメイド部の活動をしていたことが認められて、#n追加の課題だけちゃんとやればなんとかなりそうだ。"
2000105-8 = "けど、もし追加課題も終わらせられなかったら……その時は、本当に終わりだ。"
2000105-9 = "そうなったら、私のコールサインが「ゼロツー」から「バカ」に変わってしまうかもしれない。"
2000105-10 = "だからしばらくは、アルバイトもメイド部の活動も、全部保留する！"
2000105-11 = "ひたすら課題をやるとしよう、そうするしかない。"
2000105-12 = "[s] \"そんなに忙しいのにどうしてメイド部に入ったの？\""
2000105-13 = "それは……。"
2000105-14 = "……メイド服が、可愛い、から。"
2000105-15 = "[s1] \"そんな理由で？\"\n[s2] \"それは否定できない。\""
2000105-16 = "そ、そんな理由だなんて！"
2000105-17 = "そ、そうだろう？#n理解してくれるのか、先生。"
2000105-18 = "……重大事項だ。"
2000105-19 = "もともと私は、ミレニアム生徒会であるセミナーの……。"
2000105-20 = "保安部員、だったんだ。"
2000105-21 = "ミレニアムの技術力を欲しがる他の学園の工作員や外部組織の諜報員から、情報とかの無形財産を守る役割だった。"
2000105-22 = "この前先生と一緒に戦ったあいつらと似たような感じだ。"
2000105-23 = "とにかく戦闘やら諜報やら、そういうのに疲れて、退部を決心して他の部活動に入ろうとしていたんだ。"
2000105-24 = "そんな中……メイド部と出会った。"
2000105-25 = "家事だったり掃除だったり、料理とかそういうことを習うところに見えたんだ。"
2000105-26 = "一緒に学校を綺麗にして、午後には暖かい紅茶と甘いおやつで、ティータイムを楽しんで。"
2000105-27 = "……可愛い服が、着られる。"
2000105-28 = "……。"
2000105-29 = "はあ。そんなところだと、思っていたのに。"
2000105-30 = "[s] \"誤解だったのに、どうしてまだ続けているの？\""
2000105-32 = "私はこの部活が、好きになったから。"
2000105-33 = "たとえ誤解から始まった縁だとしても……"
2000105-34 = "そこから生まれた思い出と、仲間たちに、感謝してる。"
2000105-35 = "最初は単純に服が可愛いってだけだったけれど、もう私にとってメイド服はただの可愛い服じゃない。"
2000105-36 = "この服は、私がミレニアムのために奉仕してるというプライド、そのものみたいな物だから。"
2000105-38 = "ふふっ、私ったら、なんでこんなことまで話してるんだろうな。"
2000105-39 = "先生。この追加の課題が終わるまでそばにいてくれない？"
2000105-40 = "とりあえず先生のおかげで赤点は避けられたから、帰りにご飯でも奢るよ。"
