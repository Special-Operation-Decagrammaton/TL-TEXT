[translation]
2000105-1 = "Estudar é difícil (2)"
2000105-2 = "Biblioteca"
2000105-3 = "……."
2000105-4 = "Desculpe, Sensei. Mesmo depois de você ter me ajudado tanto……."
2000105-5 = "O resultado da prova de recuperação foi…… desesperador."
2000105-6 = "Eu quase fui reprovada de ano…… mas."
2000105-7 = "Felizmente, reconheceram minhas atividades no Schale e no Maid Club, então se eu fizer as tarefas adicionais corretamente, acho que vai dar tudo certo."
2000105-8 = "Mas, se eu não conseguir terminar as tarefas adicionais…… aí sim, será o meu fim."
2000105-9 = "Se isso acontecer, meu codinome pode acabar mudando de \"Zero Two\" para \"Idiota\"."
2000105-10 = "Por isso, por um tempo, vou suspender meu trabalho de meio período e as atividades do Maid Club!"
2000105-11 = "Vou me dedicar apenas às tarefas, não tenho outra escolha."
2000105-12 = "[s] \"Mesmo tão ocupada, por que você entrou para o Maid Club?\""
2000105-13 = "Isso é……."
2000105-14 = "……Porque o uniforme de empregada é fofo."
2000105-15 = "[s1] \"Por esse motivo?\"\n[s2] \"Isso é inegável.\""
2000105-16 = "Po-por esse motivo, você diz!"
2000105-17 = "É-é verdade, não é?#nVocê me entende, Sensei."
2000105-18 = "……É um assunto de extrema importância."
2000105-19 = "Originalmente, eu era do Seminar, o conselho estudantil do Millennium……."
2000105-20 = "Eu era um membro do Departamento de Segurança."
2000105-21 = "Meu papel era proteger bens intangíveis, como informações, de agentes de outras escolas ou espiões de organizações externas que cobiçavam a tecnologia do Millennium."
2000105-22 = "É algo parecido com aqueles caras que lutaram contra você junto comigo outro dia."
2000105-23 = "De qualquer forma, eu estava cansada de combates e espionagem, então decidi sair do departamento e tentar entrar em outro clube."
2000105-24 = "Foi nesse meio tempo…… que conheci o Maid Club."
2000105-25 = "Parecia um lugar onde eu aprenderia tarefas domésticas, limpeza, culinária e coisas do tipo."
2000105-26 = "Limpar a escola juntas, e à tarde, aproveitar a hora do chá com um chá quente e doces saborosos."
2000105-27 = "……E poder usar roupas fofas."
2000105-28 = "……."
2000105-29 = "Haa. Eu pensava que era um lugar assim."
2000105-30 = "[s] \"Mesmo sendo um mal-entendido, por que você continua lá?\""
2000105-32 = "Porque eu passei a gostar deste clube."
2000105-33 = "Mesmo que esse laço tenha começado por um mal-entendido……"
2000105-34 = "Sou grata pelas memórias que criei lá e pelas minhas companheiras."
2000105-35 = "No começo, era apenas porque o uniforme era fofo, mas agora, para mim, o uniforme de empregada não é apenas uma roupa fofa."
2000105-36 = "Este uniforme é como o próprio orgulho de servir ao Millennium."
2000105-38 = "Fufu, por que será que estou te contando tudo isso?"
2000105-39 = "Sensei. Você poderia ficar ao meu lado até que eu termine essas tarefas adicionais?"
2000105-40 = "Já que, graças a você, evitei a reprovação, vou te pagar um jantar na volta."
