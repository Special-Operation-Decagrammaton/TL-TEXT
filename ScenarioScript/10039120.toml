[translation]
10039120-1 = "後日談その4;生活安全局による広報活動"
10039120-10 = "あの話、聞いた？"
10039120-14 = "はい！#n新しい監視カメラの導入と道路交通法の改正なら、すでに聞いています！"
10039120-15 = "いや、それじゃなくて……というか、そんなのあった？"
10039120-16 = "とにかく！"
10039120-17 = "今度、トリニティで[ruby=カーニバル]謝肉祭[/ruby]が開催されるらしいよ。"
10039120-22 = "それでしたか、楽しみですね！"
10039120-23 = "……はぁ、私たちはどうせ見回りでしょ。"
10039120-24 = "要するに、仕事が増えるだけ。"
10039120-25 = "市民の安全が守れるなら、それで良いではありませんか！"
10039120-26 = "キリノは相変わらず元気だねぇ。#n私は考えるだけでも面倒なのに……。"
10039120-27 = "余計なことを考えるから、面倒に思うのかもしれないですよ！"
10039120-28 = "たしかに、考えるのもやめとこうかな……。"
10039120-36 = "[ruby=カーニバル]謝肉祭[/ruby]に派遣されてきた方たちですね？"
10039120-37 = "はい！"
10039120-38 = "お疲れ様です、これをお渡ししておきます。"
10039120-39 = "何かの衣装でしょうか……？"
10039120-40 = "私も分からないんですが、上からの指示なので……。"
10039120-44 = "それでは、よろしくお願いします！"
10039120-49 = "これは……。"
10039120-54 = "……「謝肉祭の対応用衣装」？"
10039120-55 = "ま、とりあえず着替えてみる？"
10039120-58 = "（しばらくして……）"
10039120-63 = "なにこれ……！"
10039120-64 = "いつも通りの市民対応じゃなかったの！？"
10039120-65 = "さ、さあ……。"
10039120-69 = "手違いで私たちのもとに届いたのでは……？"
10039120-70 = "上に抗議するしかないね！"
10039120-71 = "抗議ですか……？"
10039120-76 = "公安局長だ。用件は――"
10039120-80 = "……生活安全局か。"
10039120-81 = "この服、説明してほしいんだけど！"
10039120-85 = "何の話だ……。"
10039120-86 = "さっき急に渡されたんだけど、これ着て警備しろって言うの！？"
10039120-87 = "……ん？"
10039120-92 = "ああ、なるほど……。"
10039120-93 = "そういうことか。"
10039120-94 = "早く教えてよ！"
10039120-96 = "この衣装、本当に私たちが着るんですか！？"
10039120-101 = "二人とも、落ち着いて聞いてくれ。#nそれは今回の任務において、非常に重要なものだ。"
10039120-106 = "……えっ？"
10039120-108 = "民間企業から物資の支援を受ける代わりに、#n特別な衣装を着るよう指示があった。"
10039120-109 = "要するに……。"
10039120-115 = "企業の宣伝とヴァルキューレのイメージアップが目的で決定したらしい。"
10039120-117 = "き、聞いておりませんが！？"
10039120-118 = "ちょっと、責任が重すぎない？"
10039120-119 = "そもそも、これを着たくらいでイメージが変わると思ってるの？"
10039120-121 = "……少なくとも、私はよく似合っていると思う。"
10039120-122 = "たしかに、可愛いですが……。"
10039120-123 = "とにかく、上の決定には逆らえない。#n悪いが頑張ってくれ。"
10039120-124 = "なら局長も一緒に着てよ！"
10039120-128 = "おっと、通信が不安定のようだ……では、失礼する。"
10039120-133 = "もしもし？もしもし！？"
10039120-137 = "今、絶対に逃げたよね！？"
10039120-138 = "うーん……とりあえず、着るしかないようですね。"
10039120-139 = "ただでさえ面倒なのに、こんな格好まで……。"
10039120-140 = "こうなった以上、ストライキするよ！"
10039120-144 = "（そして、謝肉祭当日……）"
10039120-158 = "……。"
10039120-159 = "……。"
10039120-164 = "あの、トイレはどこですか？"
10039120-169 = "廊下の奥にあります！"
10039120-171 = "ありがとうございます。"
10039120-178 = "すまない、ステージ参加者の控え室を教えてもらいたいのだが……。"
10039120-179 = "204号から212号室です。#nそこを右に曲がって、階段をお上がりください！"
10039120-180 = "そうか、ありがとう。"
10039120-181 = "どういたしまして、頑張ってくださいね！"
10039120-186 = "さっきから何やってるの、私たちもアイドルとして参加してるのに。"
10039120-191 = "はっ、そうでした。#nつい、いつもの癖で……。"
10039120-192 = "さっきの方、アイドルのステージで着物姿とは、珍しいですね……。"
10039120-193 = "ドーナッツ屋さんの宣伝衣装よりマシじゃない？"
10039120-194 = "前向きに考えましょうよ、フブキ！"
10039120-195 = "はぁ……。"
10039120-196 = "開催期間中はドーナッツが食べ放題になりましたし……。"
10039120-197 = "新商品を先に味わえることになったんですから。"
10039120-198 = "それはラッキーだけどさぁ……。"
10039120-199 = "行きつけのドーナッツ屋さんに依頼されたと分かったせいで、#n断れなかったじゃん……。"
10039120-200 = "ほら、張り切って行きますよ！"
10039120-201 = "面倒くさい……。"
10039120-208 = "参加者の確認を行います。#n「プリティードーナッツ・ポリスガールズ」の皆さん、いらっしゃいますか？"
10039120-213 = "はい、こちらです！"
10039120-214 = "うぅ、名前も恥ずかしい……。"
10039120-215 = "まぁ、正式な参加者じゃなくて、#n協賛者としてステージに立つわけだからマシかな……。"
10039120-216 = "頑張りましょう！#n歌と踊りで、安全について周知する良い機会ですから！"
10039120-217 = "フブキだって、頑張って練習していたではありませんか！"
10039120-218 = "けど、みんなの前でやるのは……。"
10039120-224 = "はぁ、緊張で胃が……。"
10039120-225 = "だ、大丈夫ですか？#nまずは深呼吸でも……。"
10039120-230 = "お名前を確認します。#n[ruby=なかつかさ]中務[/ruby]キリノさん？"
10039120-234 = "はい、ほんか……いえ、私です！"
10039120-236 = "[ruby=ねむがき]合歓垣[/ruby]フブキさん？"
10039120-238 = "……はい。"
10039120-243 = "た、助けてください……。"
10039120-245 = "ん……？"
10039120-254 = "ちょっと、ここ！#n人が挟まってるよ？"
10039120-255 = "だ、大丈夫！？"
10039120-265 = "あ、ありがとうございます……。"
10039120-266 = "どうしてこんなところに……？"
10039120-267 = "その、出番が近くなったら緊張して……。"
10039120-268 = "人目のないところで深呼吸していたら、携帯を落としてしまったんです。#nそれを拾おうとしていたら……。"
10039120-269 = "大事に至らなくて良かったです……。"
10039120-270 = "おかげ様で助かりました。本当にありがとうございます。"
10039120-271 = "……あ、お二人もコンテストに参加されるんですか？"
10039120-276 = "ヴァルキューレの生活安全局として、ですが……。"
10039120-277 = "要するに、仕事だよ。"
10039120-278 = "……そうです！"
10039120-280 = "なるほど……。"
10039120-281 = "今日も平和のために……。"
10039120-286 = "そうだ、あの時は助かったよ。"
10039120-287 = "大活躍でしたね！"
10039120-289 = "ふふ、ありがとうございます。"
10039120-290 = "では、お二人も頑張ってくださいね。"
10039120-291 = "はい、シスターさんも頑張ってください！"
10039120-297 = "シスターさん、可愛かったね。"
10039120-298 = "そうですね。#n私たちのように、シスターフッドもイメージアップで参加しているのでしょうか？"
10039120-299 = "たぶん？"
10039120-300 = "ま、私はドーナッツのためだけど。"
10039120-301 = "あはは……。"
10039120-305 = "そういえば、何だか緊張が解けてませんか？"
10039120-309 = "たしかに……。"
10039120-310 = "シスターさんと話してたからかな。"
10039120-311 = "人の心に寄り添うのが得意な方なのかもしれませんね。"
10039120-316 = "――ガールズ」の皆さん！"
10039120-317 = "「プリティードーナッツ・ポリスガールズ」の皆さん、いらっしゃいませんか？"
10039120-321 = "あ、はい！こちらです！"
10039120-322 = "フブキ、いよいよ出番ですよ！"
10039120-323 = "はぁ、ついにこの時間が……。"
10039120-324 = "ほら立ってください！#n早く行きますよ！"
10039120-325 = "分かったよ……。"
10039120-337 = "（その後、ライブで宣伝したドーナッツ屋の売上は、倍以上になったらしい）"
