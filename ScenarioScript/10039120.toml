[translation]
10039120-1 = "Epílogo parte 4; Atividades de relações públicas do Departamento de Segurança Pública"
10039120-10 = "Você ouviu sobre aquilo?"
10039120-14 = "Sim! #nSe for sobre a introdução das novas câmeras de vigilância e a revisão da lei de trânsito, eu já estou sabendo!"
10039120-15 = "Não, não é isso... aliás, isso nem aconteceu, aconteceu?"
10039120-16 = "Enfim!"
10039120-17 = "Parece que o Carnaval vai ser realizado em Trinity em breve."
10039120-22 = "Era isso! Que empolgante!"
10039120-23 = "...Ah, de qualquer forma, nós vamos ficar só patrulhando, né."
10039120-24 = "Resumindo, é só mais trabalho."
10039120-25 = "Se pudermos proteger a segurança dos cidadãos, não é isso que importa?"
10039120-26 = "Kirino, você continua animada como sempre. #nEu fico cansada só de pensar nisso..."
10039120-27 = "Talvez você ache cansativo justamente porque fica pensando demais nessas coisas!"
10039120-28 = "É, talvez seja melhor parar de pensar mesmo..."
10039120-36 = "Vocês são as pessoas enviadas para o Carnaval, certo?"
10039120-37 = "Sim!"
10039120-38 = "Obrigada pelo trabalho. Vou entregar isto a vocês."
10039120-39 = "Isso seria algum tipo de traje...?"
10039120-40 = "Eu também não sei, mas são ordens dos superiores..."
10039120-44 = "Certo, contamos com vocês!"
10039120-49 = "Isso é..."
10039120-54 = "...'Traje para o Carnaval'?"
10039120-55 = "Bem, por que não experimentamos por enquanto?"
10039120-58 = "(Algum tempo depois...)"
10039120-63 = "O que é isso...!"
10039120-64 = "Não era para ser um atendimento normal aos cidadãos!?"
10039120-65 = "B-bem..."
10039120-69 = "Será que não enviaram para nós por engano...?"
10039120-70 = "Temos que protestar com os superiores!"
10039120-71 = "Protestar...?"
10039120-76 = "Aqui é a Chefe do Departamento de Segurança. Qual o assunto—"
10039120-80 = "...Departamento de Segurança Pública, é?"
10039120-81 = "Eu quero uma explicação sobre esse uniforme!"
10039120-85 = "Do que você está falando..."
10039120-86 = "Acabaram de nos entregar isso, você quer que a gente patrulhe usando isso!?"
10039120-87 = "...Hm?"
10039120-92 = "Ah, entendi..."
10039120-93 = "Então é isso."
10039120-94 = "Deveria ter nos avisado antes!"
10039120-96 = "Nós realmente vamos usar esse traje!?"
10039120-101 = "As duas, acalmem-se e escutem. #nIsso é algo extremamente importante para a missão atual."
10039120-106 = "...Hã?"
10039120-108 = "Em troca de recebermos suprimentos de empresas privadas, #nrecebemos ordens para usar trajes especiais."
10039120-109 = "Em resumo..."
10039120-115 = "Parece que a decisão foi tomada com o objetivo de promover as empresas e melhorar a imagem da Valkyrie."
10039120-117 = "N-nós não fomos informadas sobre isso!?"
10039120-118 = "Ei, a responsabilidade não é pesada demais?"
10039120-119 = "Além disso, você acha mesmo que a imagem vai mudar só por causa disso?"
10039120-121 = "...Pelo menos eu acho que combina muito com vocês."
10039120-122 = "É verdade, é fofo, mas..."
10039120-123 = "De qualquer forma, não podemos contrariar as decisões dos superiores. #nSinto muito, mas conto com vocês."
10039120-124 = "Então o Diretor também tem que vestir uma!"
10039120-128 = "Opa, a conexão parece estar instável... Com licença."
10039120-133 = "Alô? Alô!?"
10039120-137 = "Você fugiu agora, não foi!?"
10039120-138 = "Hmm... Bem, parece que não temos escolha a não ser vestir."
10039120-139 = "Já é um incômodo por si só, e ainda ter que usar esse traje..."
10039120-140 = "Já que chegou a esse ponto, eu vou entrar em greve!"
10039120-144 = "(E então, no dia do festival...)"
10039120-158 = "..."
10039120-159 = "..."
10039120-164 = "Com licença, onde fica o banheiro?"
10039120-169 = "Fica no final do corredor!"
10039120-171 = "Obrigada."
10039120-178 = "Desculpe, poderia me dizer onde fica a sala de espera dos participantes do palco...?"
10039120-179 = "São as salas 204 a 212. #nVire à direita ali e suba as escadas!"
10039120-180 = "Entendo, obrigado."
10039120-181 = "De nada, boa sorte!"
10039120-186 = "O que você está fazendo? Nós também estamos participando como idols."
10039120-191 = "Ah, é verdade. #nFoi força do hábito..."
10039120-192 = "Aquela pessoa de agora, usar quimono em um palco de idols é bem incomum..."
10039120-193 = "Não é melhor do que o traje de propaganda da loja de donuts?"
10039120-194 = "Vamos pensar positivo, Fubuki!"
10039120-195 = "Haa..."
10039120-196 = "Pelo menos durante o período do evento, podemos comer donuts à vontade..."
10039120-197 = "E podemos provar os novos produtos antes de todo mundo."
10039120-198 = "Isso é sorte, mas..."
10039120-199 = "Como descobrimos que foi um pedido da nossa loja de donuts favorita, #nnão tivemos como recusar..."
10039120-200 = "Vamos lá, anime-se!"
10039120-201 = "Que preguiça..."
10039120-208 = "Vou verificar os participantes. #nO pessoal das 'Pretty Donut Police Girls' está presente?"
10039120-213 = "Sim, estamos aqui!"
10039120-214 = "Ugh, até o nome é vergonhoso..."
10039120-215 = "Bem, não somos participantes oficiais, #nestamos subindo no palco como patrocinadoras, então acho que está tudo bem..."
10039120-216 = "Vamos dar o nosso melhor! #nÉ uma ótima oportunidade para divulgar a segurança através da música e da dança!"
10039120-217 = "A Fubuki também treinou bastante, não foi!"
10039120-218 = "Mas fazer isso na frente de todo mundo..."
10039120-224 = "Haa, meu estômago dói de tanto nervosismo..."
10039120-225 = "V-você está bem? #nPrimeiro, tente respirar fundo..."
10039120-230 = "Vou confirmar os nomes. #nKirino Nakatsukasa?"
10039120-234 = "Sim, honka... não, sou eu!"
10039120-236 = "Fubuki Nemugaki?"
10039120-238 = "...Sim."
10039120-243 = "P-por favor, me ajudem..."
10039120-245 = "Hm...?"
10039120-254 = "Ei, aqui! #nTem alguém presa aqui?"
10039120-255 = "V-você está bem!?"
10039120-265 = "O-obrigada..."
10039120-266 = "Por que você está em um lugar desses...?"
10039120-267 = "É que, quando a hora de subir no palco se aproximou, eu fiquei nervosa..."
10039120-268 = "Fui respirar fundo em um lugar sem ninguém e acabei derrubando meu celular. #nQuando tentei pegá-lo..."
10039120-269 = "Que bom que não aconteceu nada grave..."
10039120-270 = "Graças a vocês, tudo deu certo. Muito obrigada mesmo."
10039120-271 = "……Ah, vocês duas também vão participar do concurso?"
10039120-276 = "Bem, como representantes do Departamento de Segurança Pública da Valkyrie..."
10039120-277 = "Em resumo, é trabalho."
10039120-278 = "……É isso mesmo!"
10039120-280 = "Entendo……."
10039120-281 = "Pela paz de hoje também……."
10039120-286 = "É verdade, naquela hora vocês nos salvaram."
10039120-287 = "Vocês foram incríveis!"
10039120-289 = "Fufu, obrigada."
10039120-290 = "Então, boa sorte para vocês duas também."
10039120-291 = "Sim, boa sorte para a senhorita irmã também!"
10039120-297 = "A irmã era bem fofa, né?"
10039120-298 = "Concordo. #nSerá que a Sisterhood também está participando para melhorar a imagem, assim como nós?"
10039120-299 = "Talvez?"
10039120-300 = "Bem, eu estou aqui pelos donuts."
10039120-301 = "Ahaha……."
10039120-305 = "Falando nisso, não parece que a tensão diminuiu?"
10039120-309 = "É verdade……."
10039120-310 = "Talvez seja porque estávamos conversando com a irmã."
10039120-311 = "Talvez ela seja alguém que sabe como se aproximar do coração das pessoas."
10039120-316 = "――Garotas!"
10039120-317 = "As integrantes das 'Pretty Donut Police Girls', estão por aí?"
10039120-321 = "Ah, sim! Estamos aqui!"
10039120-322 = "Fubuki, finalmente chegou a nossa vez!"
10039120-323 = "Ah, finalmente chegou esse momento……."
10039120-324 = "Vamos, levante-se! #nPrecisamos ir logo!"
10039120-325 = "Tá bom, tá bom……."
10039120-337 = "(Depois disso, dizem que as vendas da loja de donuts que elas promoveram na live dobraram.)"
