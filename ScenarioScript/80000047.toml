[translation]
80000047-1 = "Sessão de degustação especial"
80000047-3 = "Ah, seja bem-vindo, Sensei! Bem-vindo à Hyakkiyako! ...Brincadeirinha!"
80000047-4 = "Hum-hum~♪ Pontual como sempre, Sensei. Muito bem!"
80000047-5 = "[s] \"Sim, você disse que precisava de um favor importante.\""
80000047-6 = "Fufufu... Sim, é isso mesmo. Não é segredo para ninguém que hoje é Dia dos Namorados, certo?"
80000047-7 = "Por isso, decidi que a partir desta tarde, a \"Hyakkiyako\" também venderá doces especiais de edição limitada!"
80000047-8 = "Mas o problema é decidir o que colocar neles..."
80000047-9 = "[s] \"Ah, então você ainda está nessa fase?\""
80000047-10 = "Sim, não podemos subestimar o Dia dos Namorados!"
80000047-11 = "Achar que só porque é Dia dos Namorados basta fazer chocolate... com essa mentalidade simplória..."
80000047-12 = "Não só os clientes habituais, mas até as pessoas extremamente exigentes com doces vão acabar fazendo críticas ácidas!!"
80000047-13 = "Além disso, ultimamente tem surgido um grupo misterioso chamado \"Tengu dos Doces\", que deixa avaliações terríveis com um olhar de crítico profissional...! Vencer pelo sabor é o básico, mas o número de estrelas nas avaliações também é importante!"
80000047-14 = "[s] \"O que é isso, que medo...\""
80000047-15 = "Por isso, preparei isto aqui!"
80000047-19 = "Vou trazer os doces que preparei um por um."
80000047-20 = "Então, gostaria que o Sensei experimentasse cada um e me desse sua opinião!"
80000047-21 = "[s] \"Sim, entendido!\""
80000047-23 = "(Assim, comecei a sessão de degustação de doces para ajudar a Shizuko.)"
80000047-25 = "(A sessão de degustação acabou sendo muito mais intensa do que eu imaginava...)"
80000047-26 = "O que achou deste doce?"
80000047-27 = "[s1] \"Pessoalmente, acho que poderia ser um pouco mais doce.\"\n[s2] \"Talvez adicionar um toque salgado ajude a comer até o final.\""
80000047-28 = "Hum-hum, entendo, entendo... Compreendido!"
80000047-29 = "Hum-hum, entendo, entendo... Compreendido!"
80000047-30 = "Então, agora, para a bebida que acompanhará este doce..."
80000047-31 = "[s3] \"Acho que matcha seria o ideal.\"\n[s4] \"Com esse sabor, talvez um chá preto?\"\n[s5] \"Coca-Cola! Só Coca-Cola! Vida longa à Coca-Cola!\""
80000047-32 = "Entendo... Realmente, faz sentido!"
80000047-33 = "Entendo... Realmente, faz sentido!"
80000047-34 = "Entendo... Realmente, faz sentido!"
80000047-35 = "Muito bom, está decidido!"
80000047-37 = "(Depois disso, passamos cerca de uma hora comendo doces...)"
80000047-39 = "Entendo... Não se limita apenas a este produto, mas acho que as opções de bebidas ainda não são suficientes."
80000047-40 = "Além disso, manter a essência da Hyakkiyako é importante, mas precisamos incorporar não apenas doces japoneses, mas uma grande variedade de sabores..."
80000047-41 = "Adicionar um pouco de doçura aqui, e ali, para realçar o sabor..."
80000047-45 = "Sim, está ótimo! Muito obrigada por tudo, o novo produto está pronto!"
80000047-50 = "[ns] \"Bom trabalho, fico feliz em ter ajudado.\""
80000047-51 = "Ah, isso foi de uma ajuda imensa."
80000047-52 = "Agora está perfeito, impecável!"
80000047-53 = "[s] \"A propósito, fiquei curioso com uma coisa.\""
80000047-54 = "Sim, o que seria?"
80000047-55 = "Ah, você quer saber se a opinião de apenas uma pessoa, o Sensei, é suficiente...?"
80000047-56 = "Ah, ah..."
80000047-57 = "Bem, é claro que... ah, ehehe! Ehehehehe!"
80000047-61 = "Este aqui é, por assim dizer, uma edição limitada... algo especial,"
80000047-62 = "um item feito sob medida para alguém muito, muito importante."
80000047-63 = "[s] \"...?\""
80000047-64 = "Chega de conversa! Agora, a Hyakkiyako abre suas portas secretamente!"
