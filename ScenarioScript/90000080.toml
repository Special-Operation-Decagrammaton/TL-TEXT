[translation]
90000080-1 = "Episódio 9; Operação de Busca"
90000080-3 = "Chefe, detectei o movimento de \"Kether\". #n――Está vindo na nossa direção."
90000080-4 = "Se continuar assim, vamos encontrá-lo em cerca de 3 minutos."
90000080-5 = "Esta rota também é um beco sem saída, então……."
90000080-6 = "Sim. Qualquer rota que escolhermos vai dar de cara com o Kether."
90000080-7 = "Para começo de conversa, talvez seja impossível despistar essa coisa……."
90000080-8 = "A busca pela \"Área Submersa das Ruínas\"…… parece que vai levar mais tempo do que o esperado……."
90000080-9 = "Eu até que tinha certa confiança no meu \"esconde-esconde\"…… mas não tem jeito."
90000080-10 = "Sensei, por favor, recue com a Eimi por enquanto. Vou pensar no próximo passo."
90000080-11 = "[s] \"Entendido.\""
