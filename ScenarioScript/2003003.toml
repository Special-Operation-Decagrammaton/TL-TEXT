[translation]
2003003-1 = "Isto sim é uma nova gastronomia."
2003003-6 = "（Enquanto patrulhava o local, uma silhueta familiar passou...）"
2003003-7 = "[ns] \"Ué, Haruna?\""
2003003-11 = "Ora, Sensei. Que bom que apareceu."
2003003-15 = "Por favor, experimente isto."
2003003-16 = "（Haruna estendeu uma colher com várias esferas roxas...）"
2003003-21 = "[ns1] \"Hm? O gosto é... mirtilo?\"\n[ns2] \"Uma textura estranha que estoura na boca...\""
2003003-24 = "Ufufu..."
2003003-25 = "O que achou, Sensei? Uma experiência refrescante, não é?"
2003003-26 = "[s] \"É a primeira vez que como algo assim. Que textura curiosa.\""
2003003-27 = "Essa experiência é um elemento essencial para trazer inovação ao mundo da gastronomia."
2003003-28 = "Por isso — pode-se dizer que a tentativa de fazer o Sensei provar a \"gastronomia molecular\" foi um sucesso."
2003003-29 = "Com isso, aquela pessoa do Millennium poderá descansar em paz..."
2003003-30 = "Não, eu ainda estou vivinha da silva, sabia?"
2003003-31 = "[s] \"O que é gastronomia molecular?\""
2003003-32 = "A gastronomia molecular é a vanguarda da reforma gastronômica, que rompe com os métodos tradicionais de preparo e aborda a comida de uma forma totalmente nova."
2003003-37 = "Na verdade, abrimos uma barraca com essa gastronomia molecular hoje, mas..."
2003003-39 = "（De acordo com o que ouvi de Haruna e as outras...）"
2003003-46 = "G-gostariam de experimentar a gastronomia molecular...!"
2003003-53 = "Só uma vez, por favor, experimentem...!"
2003003-59 = "Gastronomia molecular? O que é isso?"
2003003-65 = "Sei lá... não é aquela comida estranha?"
2003003-66 = "Hmm... é um pouco cara. #nE a aparência também é estranha..."
2003003-67 = "Pois é. E ainda por cima ter que fazer esforço para comer... #nTem tantas outras coisas gostosas, como takoyaki ou yakisoba."
2003003-68 = "Ah, agora que você falou, me deu vontade de comer takoyaki! #nVi uma barraca boa ali atrás, vamos?"
2003003-69 = "Boa ideia! Vamos logo!"
2003003-75 = "E-esperem...!"
2003003-79 = "Haa... não deu certo de novo."
2003003-80 = "Será que a gastronomia molecular é inovadora demais...?"
2003003-86 = "…Ora, que tentativa interessante vocês estão fazendo, não é?"
2003003-87 = "!!!"
2003003-90 = "Entendo. Então esta é a famosa gastronomia molecular..."
2003003-94 = "E isto aqui é suco de frutas solidificado? #nParece até caviar..."
2003003-95 = "Hehehe... se você pingar o suco misturado com alginato de sódio #nem água com cloreto de cálcio dissolvido, ele fica assim."
2003003-96 = "Interessante. Poderia me apresentar os outros pratos?"
2003003-97 = "C-claro!"
2003003-98 = "Este bife usa o método de cozimento a vácuo..."
2003003-99 = "Ah, já ouvi falar bastante desse método."
2003003-100 = "Sério?! Fico feliz que seja conhecido! No cozimento a vácuo, embalamos o alimento a vácuo e #ncolocamos em água a cerca de 60 graus. Ao aquecer em baixa temperatura por um longo tempo..."
2003003-102 = "Ele fica com uma textura super macia! #nUsamos a diferença na temperatura de desnaturação das proteínas #npara aproveitar ao máximo a qualidade da carne!"
2003003-103 = "Então era esse o princípio. #nE esta fruta? Senti um estímulo parecido com o de um refrigerante..."
2003003-104 = "Usei gelo seco! #nAo armazenar junto, o dióxido de carbono liberado entra na fruta #ne cria essa textura!"
2003003-106 = "Entendo. Fiquei surpresa por poder aproveitar a textura da fruta e o estímulo do refrigerante ao mesmo tempo."
2003003-107 = "Aliás, com a capacidade técnica do Millennium, #né possível extrair apenas sabores específicos, não é? #nSe for assim..."
2003003-113 = "（Dizem que, depois disso, Haruna continuou perguntando sobre os conceitos da gastronomia molecular e os utensílios utilizados）"
2003003-116 = "Foi nesse momento que o Sensei chegou, então #ne aproveitei para chamar você."
2003003-117 = "Mas é uma pena que todos não demonstrem interesse por uma culinária tão maravilhosa..."
2003003-118 = "Como alguém que trilha o caminho da gastronomia, meu coração dói..."
2003003-119 = "[s] \"É porque são pratos pouco familiares, né...\""
2003003-121 = "Sim... Se ao menos conseguíssemos resolver isso, #nacho que os clientes viriam..."
2003003-122 = "[s] \"Não tem nenhuma culinária molecular que seja mais acessível?\""
2003003-123 = "Hum..."
2003003-128 = "――Já sei!!!"
2003003-129 = "Ué!? O que aconteceu?"
2003003-131 = "[ns3] \"O olhar da Haruna ficou afiado!\"\n[ns4] \"Isso é a prova de que o sensor gourmet da Haruna foi ativado!\""
2003003-134 = "Sensor... gourmet...!?"
2003003-135 = "[s] \"...Desculpe, eu só disse por dizer.\""
2003003-136 = "Hã, sério!?"
2003003-137 = "Fufu. A resposta é, sem dúvida――"
2003003-138 = "Vamos de algodão-doce!"
2003003-140 = "Algodão-doce...?"
2003003-141 = "Sim. Afinal, a culinária molecular é um método de preparo que busca a inovação ao tratar os ingredientes em nível molecular..."
2003003-143 = "Sendo assim, o algodão-doce, que transforma o açúcar e cria uma textura completamente diferente da matéria-prima, também pode ser considerado uma #nculinária molecular maravilhosa!"
2003003-144 = "[s] \"Como esperado do sensor gourmet da Haruna!\""
2003003-146 = "Você não tinha acabado de dizer que foi só por dizer!?"
2003003-153 = "Se, sejam bem-vindos...! #nPor favor, experimentem a nossa culinária molecular...!"
2003003-154 = "Além de pratos inovadores, também temos o nostálgico algodão-doce."
2003003-155 = "O que acha? É doce e delicioso."
2003003-157 = "Algodão-doce, hein... que nostálgico."
2003003-158 = "Eu estava querendo comer algo doce mesmo, pode me dar um?"
2003003-159 = "Fufu, compreendido."
2003003-160 = "Vou colocar um topping de cortesia também. #nAqui está o nosso recomendado: caviar de mirtilo. #nPor favor, experimente?"
2003003-161 = "Ah, agradeço, mas..."
2003003-162 = "Isso é comestível? #nTem um formato bem estranho..."
2003003-163 = "Não se preocupe. #nA segurança é garantida por este Sensei aqui."
2003003-164 = "[s] \"Está tudo bem. Eu também comi.\""
2003003-165 = "Nesse caso..."
2003003-172 = "Nnn!?"
2003003-174 = "Minha boca está estalando...!?"
2003003-178 = "É aqui que fica aquela barraca de culinária molecular?"
2003003-179 = "Sim. Mas a fila não anda nada, não é? #nJá estamos esperando há mais de 30 minutos."
2003003-180 = "Isso só mostra o quanto é popular. #nAlém disso, quando tem gente na fila, a gente fica ainda mais curioso..."
2003003-181 = "Estou ansioso. Que tipo de prato será que eles servem?"
2003003-186 = "Eu realmente esperava que a barraca fosse um sucesso, mas..."
2003003-187 = "Não esperava que fosse ter uma fila desse tamanho!"
2003003-188 = "A culinária molecular demora para ser preparada, o que vamos fazer...?"
2003003-189 = "Fufu, o caminho da gastronomia é sempre cheio de dificuldades, não é..."
2003003-190 = "Aprendi mais uma lição hoje."
2003003-191 = "[s] \"Haruna-san, não tire conclusões sozinha, por favor...?\""
2003003-192 = "...Ah. Mas se pedirmos para o Clube de Engenharia #nfazer uma máquina para produção em massa..."
2003003-193 = "Com certeza vai dar certo!"
2003003-194 = "...Muito obrigada. Sensei, Haruna-san! #nGraças a vocês, acho que vou conseguir espalhar ainda mais a culinária molecular!"
2003003-196 = "Fufu, fico feliz em ter ajudado."
2003003-200 = "Então, Sensei, vamos indo?"
2003003-201 = "[s] \"Ué? Já vamos?\""
2003003-202 = "O objetivo de espalhar uma nova gastronomia para muitas pessoas já foi alcançado."
2003003-203 = "Além disso, o resto dos problemas provavelmente não precisa da minha intervenção, certo?"
2003003-204 = "Acima de tudo... acho que já provei tudo o que tinha para provar aqui."
2003003-205 = "[s] \"...É, talvez você tenha razão.\""
2003003-206 = "Aliás... ainda existem muitas outras barracas que não visitamos."
2003003-207 = "A gastronomia não existe apenas em pratos novos, mas também naqueles que já nos são familiares――"
2003003-212 = "Sendo assim, Sensei. #nVocê vai me acompanhar até o fim hoje também, não vai?"
