[translation]
1005305-1 = "cultura de apoio racional"
1005305-2 = "Placa de Petri/sala de descanso"
1005305-6 = "Olá, senhor. É sobre Korin Taisai..."
1005305-7 = "Eu gostaria de discutir vários assuntos, como pessoal e horário do dia..."
1005305-8 = "Ah, desculpe incomodá-lo enquanto estou de folga."
1005305-9 = "[s] \"Não, eu estava pensando em voltar ao trabalho, então está tudo bem.\""
1005305-10 = "Nesse caso, este é o documento..."
1005305-11 = "Huh? O que você está olhando?"
1005305-12 = "\"...Em seguida, a massa do Millennium...\""

1005305-13 = "Transmissão do Millennium Baseball Club..."
1005305-14 = "Aliás, hoje foram as preliminares regionais."
1005305-15 = "[s] \"O jogo Inter-High Baseball não está relacionado ao Festival Akira?\""
1005305-16 = "sim. O beisebol é popular e, mesmo quando praticado sozinho, muitas pessoas se reúnem."
1005305-17 = "Ao contrário do Akira Taisai, que realiza vários esportes ao mesmo tempo, os torneios de beisebol são realizados por seleção escolar."
1005305-18 = "No entanto, como mencionei antes, a equipa de basebol do Millennium é uma equipa fraca que só conseguiu chegar às eliminatórias regionais..."
1005305-19 = "Você não precisa se dar ao trabalho de verificar a programação, os jogadores ou ir ao estádio."
1005305-23 = "[ns1] \"Desculpe, vai demorar um pouco...\"\n[ns2] \"Sinto muito, mas você poderia esperar um momento?\"\"\n1005305-24 = \"Sim, está tudo bem.\"\n1005305-25 = \"Sim, está tudo bem.\"\n1005305-26 = \"É uma grande oportunidade e estarei assistindo à transmissão enquanto espero.\"\n1005305-28 = \"(depois de um tempo......)\"\n1005305-30 = \"“O próximo batedor do Millennium... ele foi pego em dois arremessos... ele rebateu em três arremessos!”\"\n1005305-31 = \"“O arremessador depois de duas rebatidas… ele largou e rebateu com um grande golpe!”\"\n1005305-32 = \"...Droga.\"\n1005305-33 = \"[s] \"O que há de errado?\"\"\n1005305-34 = \"Não, não. #nNão é nada...Ahaha.\"\n1005305-35 = \"Não se preocupe com isso.\"\n1005305-37 = \"“No final da quinta entrada, o Millennium conseguiu um corredor em uma derrota.”\"\n1005305-38 = \"\"Opa! Desta vez acertei o primeiro arremesso...\"\"\n1005305-39 = \"...! !\"\n1005305-40 = \"\"Isto é... Sanyuuma, é congestionado e curto! É um curso para começar!\"\"\n1005305-41 = \"Espere, onde você está batendo...!\"\n1005305-42 = \"[s] \"Você ligou?\"\"\n1005305-43 = \"Ah, desculpe. #nNão é nada.\"\n1005305-44 = \"[s3] \"Ok, continue.\"\n[s4] \"Isso acontece às vezes quando você está concentrado no jogo.\"\"\n1005305-45 = \"Não, não!\"\n1005305-46 = \"Não, não!\"\n1005305-47 = \"Não é a maneira certa para o público levantar a voz de alegria e desespero com o resultado!\"\n1005305-48 = \"Os esportes podem ser praticados de maneira saudável quando você apoia genuinamente os jogadores, sem se preocupar em ganhar ou perder.\"\n1005305-49 = \"É claro que fico deprimido quando o time pelo qual torço perde, mas...#nEles dizem: \"Vencer e perder é a vida de um guerreiro.\"\"\n1005305-50 = \"[s] \"Se Yuuka diz isso, tudo bem...\"\"\n1005305-52 = \"Por que não consigo nem acertar o Roku...?\"\n1005305-53 = \"Apenas restrinja seu objetivo...!\"\n1005305-54 = \"“Millennium Science School, no final da 7ª entrada, um corredor voltou à base, mas… foi uma contagem completa… Agora, o que vai acontecer?”\"\n1005305-55 = \"Ugh... desta vez...\"\n1005305-56 = \"\"Oitavo arremesso... acertei direto!\"\"\n1005305-60 = \"“É uma boa rebatida e há vento! O que você acha... errei o centro!”\"\n1005305-61 = \"Yay! Corrida em casa!\"\n1005305-62 = \"Sensei, você viu? ? #nMillennium fez um home run! É uma inversão completa!\"\n1005305-63 = \"Normalmente você não consegue seguir uma bola rápida como essa com os olhos. Mesmo sendo #n, você revida!\"\n1005305-64 = \"Como esperado do Millennium Baseball Club! Eu sabia que faria isso!\"\n1005305-65 = \"Vamos, sensei também! #n Vamos voar ~ Millennium!\"\n1005305-66 = \"[ns] \"Hum...Yuka, Sr.?\"\"\n1005305-68 = \"[ns] \"Ei, está chegando perto.\""

1005305-72 = "......"
1005305-73 = "Bem, isso é..."
1005305-74 = "Eu simplesmente me apaixonei por isso..."
1005305-75 = "Hum, não me entenda mal! Normalmente não fico tão animado!"
1005305-76 = "Ei, espere um minuto...! Por que você está rindo?"
1005305-77 = "Isso é realmente um mal-entendido, senhor!"
1005305-79 = "(Depois disso, acalmei Yuka, que estava em pânico por um tempo, e assistimos à transmissão juntos.)"
1005305-80 = "(...O Millennium Baseball Club manteve a liderança e venceu o jogo.)"
