[translation]
1005305-1 = "理性的な応援文化"
1005305-2 = "シャーレ・休憩室"
1005305-6 = "こんにちは、先生。[ruby=こうりんたいさい]晄輪大祭[/ruby]の件なんですが……。"
1005305-7 = "当日の人員配置やスケジュールなど、色々ご相談したくて……。"
1005305-8 = "あっ、休憩中なのに、お邪魔してすみません。"
1005305-9 = "[s] \"いや、そろそろ仕事に戻ろうと思ってたから大丈夫だよ。\""
1005305-10 = "それでしたら、こちらの書類なんですが……。"
1005305-11 = "あれ？何を見てるんですか？"
1005305-12 = "「……続いて、ミレニアムのバッターは……」"
1005305-13 = "ミレニアム野球部の中継……。"
1005305-14 = "そういえば今日は地区予選でしたね。"
1005305-15 = "[s] \"野球のインターハイは、晄輪大祭と関係ないの？\""
1005305-16 = "はい。野球は人気ですし、単独開催でも多くの人が集まりますから。"
1005305-17 = "色々な競技をまとめて行う晄輪大祭とは違い、野球は学校選抜で大会が開催されます。"
1005305-18 = "ただ、以前もお話しましたが、ミレニアムの野球部は地区予選止まりの弱小チームなので……。"
1005305-19 = "わざわざ日程や選手をチェックしたり、球場まで行くことはありません。"
1005305-23 = "[ns1] \"ごめんね、もうちょっとかかりそう……。\"\n[ns2] \"悪いけど、ちょっと待っててもらえる？\""
1005305-24 = "はい、大丈夫です。"
1005305-25 = "はい、大丈夫です。"
1005305-26 = "せっかくですし、中継でも見ながら待ってますね。"
1005305-28 = "（しばらくして……)"
1005305-30 = "「続くミレニアムのバッター……二球で追い込まれて……三球三振！」"
1005305-31 = "「ツーストライクからピッチャー……落とした、大きなスイングで空振り三振！」"
1005305-32 = "……くっ。"
1005305-33 = "[s] \"どうしたの？\""
1005305-34 = "い、いえっ。#n何でもないですから……あはは。"
1005305-35 = "気にしないでください。"
1005305-37 = "「5回裏の攻撃、ミレニアムはワンナウトからランナーが出ましたね」"
1005305-38 = "「おっと！今度は初球から打ったが……」"
1005305-39 = "……！！"
1005305-40 = "「これは……三遊間、詰まってショート！ゲッツーコースだ！」"
1005305-41 = "ちょっと、どこ打ってるの……！"
1005305-42 = "[s] \"呼んだ？\""
1005305-43 = "あ、すみません。#n何でもありませんから。"
1005305-44 = "[s3] \"いいよ、続けて続けて。\"\n[s4] \"試合に集中してたら、そういう時もあるよね。\""
1005305-45 = "ち、違います！"
1005305-46 = "ち、違います！"
1005305-47 = "結果に一喜一憂して声を上げるなんて、観客の正しい姿とは言えません！"
1005305-48 = "スポーツは勝ち負けにこだわらず、純粋に選手たちを応援してこそ、健全に楽しめるんです。"
1005305-49 = "もちろん、応援しているチームが負けたら落ち込みますけど……#n「勝敗は兵家の常」とも言いますし。"
1005305-50 = "[s] \"ユウカがそう言うなら、いいんだけど……。\""
1005305-52 = "どうしてロクにヒットも打てないの……？"
1005305-53 = "狙い球くらい絞りなさいよ……！"
1005305-54 = "「ミレニアムサイエンススクール、七回裏の攻撃で逆転のランナーが出塁しましたが……フルカウント……さあ、どうなる？」"
1005305-55 = "うぅ……今度こそ……。"
1005305-56 = "「八球目……ストレート、打ったぞ！」"
1005305-60 = "「いい当たりだ、風もある！どうだ……センター見送った！」"
1005305-61 = "やった！ホームラン！"
1005305-62 = "先生、見ましたか！？#nミレニアムがホームランを打ちました！一発逆転です！"
1005305-63 = "あんな剛速球、普通は目で追えませんよ。#nなのにそれを打ち返しちゃうなんて！"
1005305-64 = "流石はミレニアムの野球部！やると思ってましたから！"
1005305-65 = "さっ、先生も一緒に！#nかっ飛ばせ～ミレニアム！"
1005305-66 = "[ns] \"あの……ユウカ、さん？\""
1005305-68 = "[ns] \"ちょっと、近いなって。\""
1005305-72 = "……っ。"
1005305-73 = "そ、その、これは……。"
1005305-74 = "つい夢中になっちゃっただけで……。"
1005305-75 = "あの、誤解しないでください！普段はこんなに興奮しませんから！"
1005305-76 = "ちょ、ちょっと……！なんで笑うんですか！"
1005305-77 = "本当に誤解ですからね、先生！"
1005305-79 = "（その後、しばらく慌てるユウカを落ち着かせて、一緒に中継を見た)"
1005305-80 = "（……ミレニアム野球部はリードを守りきり、試合に勝利した）"
