[translation]
10053120-1 = "後日談その3;anonymous who?"
10053120-3 = "……なるほど。"
10053120-4 = "さすがですね、[USERNAME]先生。"
10053120-5 = "期待以上の収穫です。"
10053120-6 = "このデータを解析すれば……さらに一歩先へ――"
10053120-13 = "部長、なんで真っ暗で作業してるの？目悪くなっちゃうよ。\r\n\r\n"
10053120-14 = "ノックもなしに入るなんてマナー違反ですよ。\r\n\r\n\r\n\r\n"
10053120-15 = "で、何見てたの？また変なやつ？\r\n\r\n"
10053120-16 = "その言い方は訂正してください。#n私が普段から変なものばかり見ているみたいじゃないですか。\r\n\r\n\r\n"
10053120-17 = "え？見てるよね？宇宙人とか、UFOとか……。\r\n"
10053120-18 = "今回は……ツチノコ？それは時代遅れにもほどがあるよ。\r\n\r\n"
10053120-19 = "エイミ。宇宙人も、UFOも、そしてツチノコも、[ruby=・]変[/ruby][ruby=・]な[/ruby][ruby=・]も[/ruby][ruby=・]の[/ruby]ではありません。#nまだ[ruby=・]証[/ruby][ruby=・]明[/ruby][ruby=・]さ[/ruby][ruby=・]れ[/ruby][ruby=・]て[/ruby][ruby=・]い[/ruby][ruby=・]な[/ruby][ruby=・]い[/ruby]だけです。\n"
10053120-20 = "[ruby=・]証[/ruby][ruby=・]明[/ruby][ruby=・]さ[/ruby][ruby=・]れ[/ruby][ruby=・]て[/ruby][ruby=・]い[/ruby][ruby=・]な[/ruby][ruby=・]い[/ruby][ruby=・]か[/ruby][ruby=・]ら[/ruby][ruby=・]存[/ruby][ruby=・]在[/ruby][ruby=・]し[/ruby][ruby=・]な[/ruby][ruby=・]い[/ruby]と決めつけてしまったら、私たちはどうやって新しい発見をするのでしょうか？\n"
10053120-21 = "正論ではあるけど……部長が言うと説得力がなぁ。\r\n\r\n"
10053120-22 = "さっきからやけにトゲがありますね！？#n絶壁に咲く一輪の高嶺の花たる私は、優しく大事に扱ってもらうべき存在なんですよ？\r\n\r\n\r\n\r\n"
10053120-23 = "いや、部長の生命力は道端のタンポポでしょ。\r\n"
10053120-24 = "……まぁ私たちの仲ですし、無礼は水に流しましょう。#nそれより、丁度よかったです。呼ぼうと思っていたところでして。\r\n\r\n\r\n"
10053120-25 = "私を？特異現象捜査部の活動は終わったんじゃなかったの？\r\n\r\n"
10053120-26 = "……これを見てください。\r\n\r\n\r\n"
10053120-32 = "……？\r\n\r\n"
10053120-33 = "……なに、このデータ？\r\n\r\n"
10053120-34 = "分かりません。\r\n\r\n\r\n\r\n"
10053120-35 = "即答だね。\r\n"
10053120-36 = "実際、現時点で判明していることが1つもありませんので。\r\n\r\n"
10053120-37 = "「来るはずのない場所に現れたバス」、「勝手に動く石像」、#n「真夜中にかかってくる公衆電話」……。\r\n\r\n\r\n\r\n"
10053120-38 = "既存の常識でも理論でも説明不能な、超自然的な現象。\r\n\r\n\r\n"
10053120-39 = "まさに、「特異現象」だね。\r\n\r\n"
10053120-46 = "……ふふっ、どうです？\r\n"
10053120-47 = "私たちにはまだ──やるべきことが残っていると思いませんか？\r\n\r\n"
