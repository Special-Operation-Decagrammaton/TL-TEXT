[translation]
10053120-1 = "História posterior, parte 3; anônimo quem?"

10053120-3 = "……Eu vejo."

10053120-4 = "Como esperado de você, Sr. [NOME DE USUÁRIO]."

10053120-5 = "A colheita é mais do que eu esperava."

10053120-6 = "Se analisarmos esses dados... podemos dar um passo adiante――"

10053120-13 = "Gerente, por que você está trabalhando no escuro? Isso fará com que seus olhos pareçam piores. \r\n\r\n"

10053120-14 = "É falta de educação entrar sem bater. \r\n\r\n\r\n\r\n"

10053120-15 = "Então, o que você estava assistindo? Algo estranho de novo? \r\n\r\n"

10053120-16 = "Por favor, corrija essa afirmação. #nParece que só vejo coisas estranhas regularmente. \r\n\r\n\r\n"

10053120-17 = "foto? Você está assistindo? Alienígenas, OVNIs, etc... \r\n"

10053120-18 = "Desta vez... Tsuchinoko? Está muito atrasado. \r\n\r\n"

10053120-19 = "Amém. Não alienígenas, OVNIs ou Tsuchinoko. #nAinda não. \n"

10053120-20 = "Se decidirmos isso, como faremos novas descobertas? \n"

10053120-21 = "É verdade, mas... é muito convincente quando o gerente diz isso. \r\n\r\n"

10053120-22 = "Tem sido muito espinhoso há algum tempo! ? #nComo uma flor solitária desabrochando em um penhasco, sou alguém que deve ser tratado com gentileza e carinho, certo? \r\n\r\n\r\n\r\n"

10053120-23 = "Não, a vitalidade do gestor é como um dente-de-leão à beira da estrada. \r\n"

10053120-24 = "...Bem, somos amigos, então vamos acabar com qualquer grosseria. #nFoi simplesmente melhor que isso. Liguei para você quando estava planejando ligar para você. \r\n\r\n\r\n"

10053120-25 = "Meu? O trabalho do Departamento de Investigação de Fenômenos Peculiares não acabou? \r\n\r\n"

10053120-26 = "...Por favor, olhe isso. \r\n\r\n\r\n"

10053120-32 = "...? \r\n\r\n"

10053120-33 = "...Quais são esses dados? \r\n\r\n"

10053120-34 = "Eu não entendo. \r\n\r\n\r\n\r\n"

10053120-35 = "Essa é uma resposta imediata. \r\n"

10053120-36 = "Na verdade, não há nada conhecido neste momento. \r\n\r\n"

10053120-37 = "``Um ônibus que apareceu onde não deveria vir'', ``Uma estátua de pedra que se movia sozinha,'' #n ``Um telefone público que ligou no meio da noite.''... \r\n\r\n\r\n\r\n"

10053120-38 = "Um fenômeno sobrenatural que não pode ser explicado pelo bom senso ou pela teoria existente. \r\n\r\n\r\n"

10053120-39 = "Este é verdadeiramente um “fenômeno singular”. \r\n\r\n"

10053120-46 = "...Hehe, o que você acha? \r\n"

10053120-47 = "Você não acha que ainda há trabalho para fazermos? \r\n\r\n"

