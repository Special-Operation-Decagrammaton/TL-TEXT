[translation]
10044060-1 = "Episódio 6; Encontro de Fãs Mortal"
10044060-3 = "Se continuar assim, acho que vamos conseguir equilibrar as contas."
10044060-4 = "Embora seja um cálculo por cima."
10044060-5 = "Por um triz."
10044060-7 = "[ns] \"Que bom que conseguimos alcançar o trem sem nenhum arranhão.\""
10044060-8 = "Agora é só acelerar!"
10044060-9 = "……Era para ser, mas sinto que estou esquecendo de algo."
10044060-14 = "Ei! É aquele trem ali!!"
10044060-15 = "Ihuuu! Corram, corram!"
10044060-16 = "Ah……."
10044060-19 = "Encontrei vocês — seus pirralhos da Highlander!"
10044060-20 = "Como planejado, chefe!"
10044060-21 = "Vamos recuperar a carga e, desta vez, nós mesmos faremos a entrega —"
10044060-22 = "Um plano genial, se quer saber a minha opinião!"
10044060-23 = "Com isso, vamos ficar famosos em todo o Kivotos!!"
10044060-24 = "Nesta indústria, o que importa é o resultado!"
10044060-26 = "Chegou a hora da nossa Federação de Transportadores de Kivotos... ou, abreviando, a União de Velocidade Vrum-Vrum!!"
10044060-30 = "……Hm?"
10044060-31 = "O que foi?"
10044060-32 = "A-aquele helicóptero!?"
10044060-40 = "Onde houver um furo de reportagem, eu estarei lá! Sou Kawaru Shinon, do Departamento de Notícias de Kronos!"
10044060-41 = "Notícias de última hora! Nossas câmeras acabaram de capturar o famoso trem de carga! Dizem que a carga que ele transporta pode mudar o destino de Kivotos……!"
10044060-42 = "Grupos de motoqueiros já começaram a se reunir! De onde será que eles sentiram o cheiro disso?!"
10044060-43 = "O que será que tem lá dentro? Para onde esse trem está indo?"
10044060-44 = "Continuem ligados! O Canal Kronos trará a verdade para todos em Kivotos o mais rápido possível!"
10044060-51 = "A-aquela reportagem... será que eles têm algum rancor contra nós……."
10044060-52 = "A Kronos deve estar apenas sendo sensacionalista, mas... por que os motoqueiros estão nos seguindo?"
10044060-53 = "Rancor por causa da pizza?"
10044060-55 = "Não estou entendendo nada... mas esse caso não tem nada a ver com a Kronos, certo!?"
10044060-56 = "E-estarmos nessa situação é, pelo menos metade, culpa daquelas pessoas……!"
10044060-57 = "S-se a gente derrubasse eles, talvez ficasse mais silencioso……."
10044060-58 = "[ns] \"A-Aoba, calma!\""
10044060-59 = "O que aconteceu, aconteceu, não é?"
10044060-60 = "Precisamos pensar no que vem a seguir."
10044060-61 = "I-isso é verdade, mas……."
10044060-62 = "Bem, eu não tenho plano nenhum! Pahiya!"
10044060-63 = "P-pensei que fosse uma boa ideia……."
10044060-67 = "Poeira subindo, subindo."
10044060-68 = "……."
10044060-69 = "Tem algo vindo."
10044060-70 = "[ns] \"Eh…….\""
10044060-72 = "[ns] \"Parece que algo está nos perseguindo em uma velocidade incrível……?\""
10044060-75 = "Cahahaha! Encontrei vocês!"
10044060-76 = "Aquele trem é nosso! Saiam da frente, saiam da frente!!"
10044060-81 = "C-chefe! Tem uns caras estranhos vindo também!?"
10044060-82 = "O quê? Quem são eles? Será que foram atraídos pelas notícias da Kronos……?"
10044060-83 = "Droga! Aquela carga é nossa!"
10044060-85 = "A-aumentaram os perseguidores por causa da notícia……!!"
10044060-86 = "Motos, veículos blindados... uau, tem até um tanque?"
10044060-87 = "Super popular, um encontro de fãs mortal."
10044060-88 = "Se eu for ficar brincando aqui, vai escurecer, então vou acelerar e deixar eles para trás!"
10044060-89 = "M-mas me disseram que era apenas um transporte de carga comum..."
10044060-95 = "Nossa... o que a gente faz agora?"
10044060-96 = "Que problemão."
10044060-100 = "Wahahaha! Essa carga agora é nossa!"
10044060-101 = "Deixem tudo aí e caiam fora!!"
10044060-106 = "P-por que as coisas terminaram assim?!"
10044060-112 = "Pessoal que está assistindo ao canal!"
10044060-113 = "A situação está um caos absoluto! O trem em alta velocidade! A multidão perseguindo!"
10044060-114 = "Qual será o destino desse trem?! #nNão pisquem até o final!!"
10044060-116 = "Ué? Algo veio voando na nossa direção...?"
10044060-117 = "...Isso não é um lança-foguetes?"
10044060-118 = "Ah! Pessoal, é grave! Um foguete acabou de ser disparado contra o helicóptero—"
10044060-122 = "Este helicóptero?!?!"
10044060-125 = "Aaaaaaaahhh!!"
10044060-126 = "I-isso é censura à liberdade de expressão!!"
10044060-128 = "Pahyahya! Gostei, gostei! #nTem gente bem ousada por aí!"
10044060-129 = "Foi você quem atirou, Aoba?"
10044060-131 = "C-claro que não...! #nEu até pensei por um segundo, mas não atirei!!"
10044060-132 = "D-digo... tem alguém ali atirando! Ali!"
10044060-134 = "É hora do Chronos se retirar!"
10044060-135 = "Não quero perder tempo com esses peixes pequenos!"
10044060-139 = "Que fogos de artifício bonitos! Nada mal!"
10044060-146 = "Gah!"
10044060-148 = "Humph! Abram caminho! Aquele trem é nosso!!"
10044060-154 = "Chefe, o que a gente faz?! Nossos aliados estão sendo derrotados um por um!!"
10044060-155 = "Droga! A gente é só uma empresa de entregas, sabia?!"
10044060-159 = "Oh, essa foi uma boa decisão. Eliminar os rivais primeiro dá muitos pontos."
10044060-160 = "Candidato número um à vitória."
10044060-161 = "O que você está dizendo com tanta calma?! #nÉ este trem que está sendo visado!!"
10044060-162 = "Eu não esqueci, sabia?"
10044060-163 = "A-a distância não está diminuindo...?"
10044060-164 = "E essa rota... ela passa pelo distrito autônomo de Gehenna, não passa?!"
10044060-165 = "S-se as alunas de Gehenna se juntarem à confusão... #nN-não seria melhor desistir da carga e fugir...?"
10044060-166 = "Do que você está falando? Vamos concluir a missão."
10044060-167 = "M-mas... desse jeito, a missão vai ser o menor dos nossos problemas...!"
10044060-168 = "[ns1] \"Vamos tentar manter a calma e pensar.\" \n[ns2] \"Deve haver uma solução.\" "
10044060-171 = "Ugh... s-será mesmo...?"
10044060-172 = "V-vão roubar toda a carga, destruir o trem... #nE no final, vão culpar a gente e todos nós seremos punidos disciplinarmente..."
10044060-173 = "Pahyahya! Que imaginação fértil!"
10044060-174 = "É hora de rir de alguma coisa?!"
10044060-175 = "Buááá, snif, snif."
10044060-176 = "Se for fingir que está chorando, pelo menos faça direito!"
10044060-177 = "Buááá, descobriu."
10044060-179 = "[ns] \"Ué? O que está acontecendo ali...?\""
10044060-183 = "Oh, um novo desafiante."
