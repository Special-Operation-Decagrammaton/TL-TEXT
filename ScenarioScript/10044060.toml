[translation]
10044060-1 = "第6話;死のファンミーティング"
10044060-3 = "この調子ならなんとか帳尻は合いそうかな。"
10044060-4 = "ざっくり計算だけど。"
10044060-5 = "ギリギリー。"
10044060-7 = "[ns] \"無傷で列車に追いつけて良かったね。\""
10044060-8 = "これで後はかっ飛ばすだけ！"
10044060-9 = "……のはずだけど、なーんか忘れてる気がするんだよね。"
10044060-14 = "おい！あの列車だぞ！！"
10044060-15 = "ひゃっふー！走れ走れー！"
10044060-16 = "あー……。"
10044060-19 = "見つけたぞ――ハイランダーのガキども！"
10044060-20 = "計画通りだね、総長！"
10044060-21 = "積荷を取り返して、今度こそうちらが配達する――"
10044060-22 = "我ながら天才的な計画だぜ！"
10044060-23 = "これでキヴォトス中に名を売れるはずだ！！"
10044060-24 = "この業界は結果がすべてだからな！"
10044060-26 = "我らキヴォトス・トランスポーター連盟……略して、ブロロロ疾走連合の出番だぜ！！"
10044060-30 = "……ん？"
10044060-31 = "どうした？"
10044060-32 = "あ、あのヘリは！？"
10044060-40 = "特ダネとあらば、どこにでも駆けつける！#nクロノス報道部の[ruby=かわる]川流[/ruby]シノンです！"
10044060-41 = "続報です！今、話題の貨物列車をカメラが捉えました！#nその積荷は、キヴォトスの運命を左右するほどのモノなのだとか……！"
10044060-42 = "すでに暴走族が集まっているようです！#nどこからニオイを嗅ぎつけてきたのでしょうか！"
10044060-43 = "果たして、あの中には何があるのか！列車はどこに向かうのか！"
10044060-44 = "引き続き、チャンネルはそのままで！#nクロノスチャンネルはキヴォトスの皆様に、いちはやく真実をお伝えしていきます！"
10044060-51 = "あ、あんな報道……私たちに恨みでもあるんでしょうか……。"
10044060-52 = "クロノスは野次馬根性だろうけど……暴走族の方はどうしてついてくるわけ？"
10044060-53 = "ピザの恨みー？"
10044060-55 = "わけが分からないんですけど……この件とクロノスって関係ないですよね！？"
10044060-56 = "こ、こんなことになってるの、半分くらいあの人たちのせいなんですけど……！"
10044060-57 = "い、いっそ撃ち落としてしまえば静かになるはず……。"
10044060-58 = "[ns] \"あ、アオバ、落ち着いて！\""
10044060-59 = "起きたことはもうしょうがないじゃん？"
10044060-60 = "これからを考えないと。"
10044060-61 = "そ、それはそう、ですけど……。"
10044060-62 = "まっ、ノープランなんだけどね！パヒャッ！"
10044060-63 = "い、いい話だと思ったのに……。"
10044060-67 = "土煙ーもくもくー。"
10044060-68 = "……。"
10044060-69 = "なんか、くるー。"
10044060-70 = "[ns] \"えっ……。\""
10044060-72 = "[ns] \"何かがものすごいスピードで追ってくるような……？\""
10044060-75 = "キャハハッ！見つけたぜ！"
10044060-76 = "あの列車はうちらのもんだ！#nおらっ、退いた退いたーっ！！"
10044060-81 = "そ、総長！なんか変なやつらまできてるけど！？"
10044060-82 = "なっ、誰だあいつら！？まさかクロノスのニュースにつられて……？"
10044060-83 = "くそっ！あの積荷はうちらのだぞ！"
10044060-85 = "にゅ、ニュースのせいで追手が増えてしまいました……！！"
10044060-86 = "バイクに、装甲車……うわぁ、戦車までいるよ？"
10044060-87 = "ちょー人気ー、死のファンミーティングー。"
10044060-88 = "相手してたら日が暮れちゃうし、このまま振り切るよ！"
10044060-89 = "た、ただの貨物輸送だって聞いてたのに……。"
10044060-95 = "いやぁ～、どうしよっか、これ。"
10044060-96 = "大ピンチー。"
10044060-100 = "ワハハッ！その積荷はうちらのもんだ！"
10044060-101 = "ひとつ残らず置いてきなぁ！！"
10044060-106 = "ど、どうしてこうなってしまうんですかぁっ！！"
10044060-112 = "チャンネルをご覧の皆さん！"
10044060-113 = "状況は混迷を極めています！走る列車！追う群衆！"
10044060-114 = "果たして、あの列車の行方は――！#n最後まで、まばたき禁止ですよ！！"
10044060-116 = "あれ？何か飛んできて……？"
10044060-117 = "……ロケット砲じゃない？"
10044060-118 = "はっ！皆さん大変です！今、ロケット砲がヘリに向かって――"
10044060-122 = "このヘリ！？！？"
10044060-125 = "ぎゃぁぁああああーっ！！"
10044060-126 = "げ、言論弾圧だぁぁぁっ～！！"
10044060-128 = "パヒャヒャッ！いいねいいね！#n大胆なことするヤツもいるじゃん！"
10044060-129 = "撃ったのアオバー？"
10044060-131 = "ち、違います……！#n一瞬考えはしましたが撃ってません！！"
10044060-132 = "と、というか……向こうに撃ってるヤツいるんですけど！！あっち！！"
10044060-134 = "クロノスにはご退場願おうか！"
10044060-135 = "これ以上雑魚が群がるのは手間だからな！"
10044060-139 = "キレイな花火だったぜ！やるじゃんか！"
10044060-146 = "ぎゃふっ！"
10044060-148 = "ふんっ！道を開けろ！あの列車は我々のものだ！！"
10044060-154 = "総長、どうする！？仲間がどんどんやられてる！！"
10044060-155 = "くそっ！うちらは配達業者なんだぞ！？"
10044060-159 = "おっ、あれはいい判断だね。先にライバルを倒すのは得点高いよ。"
10044060-160 = "優勝候補ー、ナンバーワンー。"
10044060-161 = "な、なに悠長なこと言ってるんですかぁ！！#n狙われてるのはこの列車なんですけど！！"
10044060-162 = "忘れてないよー？"
10044060-163 = "な、なんか……どんどん距離が詰まってませんか……？"
10044060-164 = "それにこの路線――ゲヘナの自治区を通過しますよね！？"
10044060-165 = "げ、ゲヘナの生徒まで加勢してきたら……#nも、もう輸送は諦めて脱出しませんか……？"
10044060-166 = "なに言ってんのさ。任務はやりきるよ。"
10044060-167 = "だ、だって……このままだと任務どころじゃ……！"
10044060-168 = "[ns1] \"とりあえず落ち着いて考えてみよう。\"\n[ns2] \"打開策はあるはずだから。\""
10044060-171 = "うぅ……ほ、本当にそうなんでしょうか……。"
10044060-172 = "つ、積荷を全部奪われて、列車は破壊されて……#nさ、最後はその責任を問われて、どうせ全員で懲戒処分を受けるんです……。"
10044060-173 = "パヒャヒャッ！いい想像力じゃん！"
10044060-174 = "わ、笑ってる場合ですか！？"
10044060-175 = "うわーん、しくしくー。"
10044060-176 = "な、泣いたフリならもっと真剣にやって欲しいんですけど！"
10044060-177 = "うわーん、ばれたー。"
10044060-179 = "[ns] \"あれ？なんか向こうの様子が……。\""
10044060-183 = "おー、ニューチャレンジャー。"
