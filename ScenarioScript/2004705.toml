[translation]
2004705-1 = "Castelo do Coração"
2004705-11 = "（Aproveitamos para nadar na parte rasa）"
2004705-12 = "（Mesmo assim, Kikyou não soltou minha mão em nenhum momento）"
2004705-15 = "Talvez eu tenha me acostumado um pouco..."
2004705-16 = "……Ah, não entenda errado. #nNão é como se eu estivesse com medo nem nada."
2004705-17 = "Isso é puramente por segurança..."
2004705-18 = "……。"
2004705-19 = "Bem, deixando isso de lado."
2004705-20 = "Já nadamos o suficiente, então, sobre a outra coisa..."
2004705-21 = "Eu disse que queria fazer algo que não conseguimos antes, lembra?"
2004705-22 = "Fufu, está curioso?"
2004705-23 = "Vou te mostrar agora."
2004705-27 = "Primeiro, deite-se aqui."
2004705-28 = "O que vou fazer agora é uma recompensa para o Sensei, que me escoltou pelo mar."
2004705-29 = "[s1] \"U-uma recompensa?\"\n[s2] \"O que você vai fazer!?\""
2004705-32 = "Você vai entender logo."
2004705-33 = "Você só precisa ficar aí."
2004705-34 = "Deixe o resto comigo e não se mova."
2004705-35 = "Então... pode fechar os olhos?"
2004705-37 = "（Como pedido, fechei os olhos obedientemente）"
2004705-42 = "Eu disse para não se mover, não disse? Vai desmoronar."
2004705-47 = "Continue assim. Fique parado."
2004705-52 = "（Depois de um tempo...）"
2004705-57 = "Pronto. Já pode abrir os olhos."
2004705-60 = "E então?"
2004705-61 = "Meu banho de areia especial. O que achou?"
2004705-62 = "[s3] \"Meu corpo todo... está pesado!\"\n[s4] \"A-ajuda!\""
2004705-65 = "Não diga coisas que soem mal. É tudo para o seu próprio bem."
2004705-66 = "Isso tem vários efeitos benéficos."
2004705-67 = "Se a temperatura corporal subir, o suor limpa a pele, e se a frequência cardíaca aumentar, oxigênio e nutrientes são distribuídos pelo corpo todo."
2004705-68 = "Além disso, dizem que ajuda com dores nos nervos e nas articulações."
2004705-69 = "E então? Não sente que o cansaço está indo embora aos poucos?"
2004705-70 = "[s5] \"Mesmo assim...\"\n[s6] \"Não tem areia demais aqui?\""
2004705-73 = "Seria entediante se fosse normal, então fiz um castelo de areia."
2004705-74 = "O Sensei é alguém que protege os alunos, certo? #nAcho que combina com a imagem de um castelo."
2004705-75 = "Aqui, vou colocar meu boneco na torre principal. Aquele esculpido em madeira."
2004705-76 = "O tempo alvo é de 30 minutos. #nSe esse boneco cair no meio do caminho, terei que recomeçar a contagem."
2004705-77 = "[s7] \"Não posso deixar o boneco da Kikyou cair!\"\n[s8] \"Vou protegê-lo a qualquer custo...!\""
2004705-80 = "V-você consegue dizer coisas tão vergonhosas com tanta naturalidade..."
2004705-81 = "Fufu... vejo que ainda tem energia de sobra."
2004705-82 = "Então, este, este... e este também."
2004705-88 = "Adicionei mais bonecos."
2004705-89 = "Agora o destino da Hyakkiyako está nas mãos do Sensei... #nVocê consegue manter todos eles de pé, não consegue?"
2004705-90 = "[s] \"E-eu farei o meu melhor!\""
2004705-91 = "Prove o quão forte é a nossa aliança..."
2004705-92 = "[s] \"Acho que já somos fortes o suficiente...\""
2004705-94 = "[ns] \"Nossa... que castelo de areia impressionante.\""
2004705-95 = "Eu costumava fazer muito isso desde pequena."
2004705-96 = "Eu brincava de criar várias estratégias usando castelos de areia e bonecos."
2004705-97 = "[s] \"Então a Kikyou sempre foi uma estrategista, hein.\""
2004705-98 = "Antigamente era só uma brincadeira de faz de conta."
2004705-99 = "Mas as memórias são importantes. #nElas exercem uma grande influência nos nossos pensamentos e na nossa vida."
2004705-100 = "O castelo construído dentro do coração, com memórias como base de pedra... #nNão tem como desmoronar tão facilmente, tem?"
2004705-101 = "Até mesmo este momento que estou passando com você..."
2004705-105 = "……！"
2004705-106 = "E-esqueça o que eu acabei de dizer."
2004705-107 = "Foi só um deslize..."
2004705-112 = "Sensei? O castelo está tremendo, mas..."
2004705-113 = "[ns] \"……Kikyou!\""
2004705-114 = "O-o que você está fazendo de repente..."
2004705-118 = "Kyaa...!"
2004705-125 = "Se-Sensei?"
2004705-126 = "[s9] \"Se é para criar memórias, pode deixar comigo!\"\n[s10] \"Agora é a vez da Kikyou entrar no banho de areia!\""
2004705-129 = "Eu não me importo com isso, mas... antes disso."
2004705-130 = "Você derrubou o boneco, não foi? Sensei."
2004705-135 = "(Depois disso, passamos o tempo enterrando um ao outro e brincando na areia com a Kikyou)"
