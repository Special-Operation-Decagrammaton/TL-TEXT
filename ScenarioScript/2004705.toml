[translation]
2004705-1 = "こころの天守閣"
2004705-11 = "（浅いところで海水浴を楽しんだ）"
2004705-12 = "（それでもキキョウはずっと手を離さなかった）"
2004705-15 = "ちょっと慣れてきたかも……。"
2004705-16 = "……あ、誤解しないで。#n別に怖がってるわけじゃないから。"
2004705-17 = "これはあくまで安全のためで……。"
2004705-18 = "……。"
2004705-19 = "まあ、それはもういいとして。"
2004705-20 = "海水浴は十分だから、他のこと――"
2004705-21 = "この前できなかったことをしたい、って話したよね？"
2004705-22 = "ふふ、気になる？"
2004705-23 = "今から教えてあげる。"
2004705-27 = "まずはこっちに横になってみて。"
2004705-28 = "これからするのは、海の中をエスコートしてくれた先生へのご褒美なんだから。"
2004705-29 = "[s1] \"ご、ご褒美？\"\n[s2] \"なにをしてくれるの！？\""
2004705-32 = "すぐに分かるから。"
2004705-33 = "あんたはそうしてるだけでいいよ。"
2004705-34 = "あとは私に任せて、動かないで。"
2004705-35 = "じゃあ……目を閉じてもらえる？"
2004705-37 = "（言われるまま、大人しく目を閉じた）"
2004705-42 = "動かないでって言ったよね？崩れるでしょ。"
2004705-47 = "そのまま。じっとしてて。"
2004705-52 = "（しばらくして……）"
2004705-57 = "できた。もう目を開けていいよ。"
2004705-60 = "どう？"
2004705-61 = "私特製の砂風呂。ご感想は？"
2004705-62 = "[s3] \"全身が……重い！\"\n[s4] \"た、助けてー！\""
2004705-65 = "人聞きの悪いこと言わないで。全部あんたのためなんだから。"
2004705-66 = "これは、色んな効果が期待できるの。"
2004705-67 = "体温が上昇すれば発汗作用で肌を清潔にすることができるし、心拍数が増えれば全身に酸素と栄養が補給される。"
2004705-68 = "その上、神経痛と関節にも効くらしいよ。"
2004705-69 = "どう？少しずつ疲れが取れていく気がしない？"
2004705-70 = "[s5] \"そ、そうだとしても……。\"\n[s6] \"砂の量多すぎじゃない？\""
2004705-73 = "普通だと面白くないし、砂のお城にしてみたの。"
2004705-74 = "先生は生徒を守ってくれる存在でしょ？#nそれならお城のイメージにあってると思うけど。"
2004705-75 = "はい、天守閣に私の人形を置いてあげる。木彫りのヤツ。"
2004705-76 = "目標時間は30分。#n途中でこの子が倒れたら、30分数えなおしだからね。"
2004705-77 = "[s7] \"キキョウを倒すわけにはいかない！\"\n[s8] \"どんな手を使ってでも、守り抜いてみせる……！\""
2004705-80 = "よ、よくもまぁそんな恥ずかしい台詞が……。"
2004705-81 = "ふふっ……まだ余裕があるんだね。"
2004705-82 = "じゃあ、これと、これと……これも。"
2004705-88 = "人形、追加したから。"
2004705-89 = "これで百花繚乱の命運は先生に託されたわけだけど……。#nあんたなら一人も倒さないままでいられるよね？"
2004705-90 = "[s] \"が、頑張ります！\""
2004705-91 = "私たちの同盟がどのくらい強固なのか……証明して。"
2004705-92 = "[s] \"すでに強いと思いますけど……。\""
2004705-94 = "[ns] \"いやぁ……立派な砂のお城だね。\""
2004705-95 = "小さい頃からよくやってたからね。"
2004705-96 = "砂の城と人形で、色んな作戦を立てて遊んでたの。"
2004705-97 = "[s] \"キキョウは昔から参謀だったんだね。\""
2004705-98 = "昔はごっこ遊びだけどね。"
2004705-99 = "でも、思い出って大事だから。#n思考や人生に大きな影響を与えるもの。"
2004705-100 = "思い出を石垣に、心の中に建ってる城が――#nそう簡単に崩れるわけないでしょう？"
2004705-101 = "あんたと居るこの瞬間だって――"
2004705-105 = "……！"
2004705-106 = "い、今のは忘れて。"
2004705-107 = "つい口が滑っちゃっただけ……。"
2004705-112 = "先生？城が揺れているけど……。"
2004705-113 = "[ns] \"……キキョウ！\""
2004705-114 = "い、いきなり何を――"
2004705-118 = "きゃっ……！"
2004705-125 = "せ、先生？"
2004705-126 = "[s9] \"思い出づくりなら任せて！\"\n[s10] \"今度はキキョウが砂風呂に入る番だよ！\""
2004705-129 = "それは構わないけど……その前に。"
2004705-130 = "人形、倒したね？先生。"
2004705-135 = "（その後、埋めたり、埋められたり、#nキキョウと砂遊びをして過ごした）"
