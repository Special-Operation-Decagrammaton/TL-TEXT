[translation]
1300003-1 = "あなたが私のご主人様ですか？（２）"
1300003-2 = "シャーレ・執務室"
1300003-4 = "（爆発と共に、アカネがシャーレに訪れた、その時）"
1300003-5 = "初めまして。"
1300003-6 = "C&Cの、アカネです。"
1300003-7 = "先生に……いえ、ご主人様にご奉仕させていただくため、こちらに参りました。"
1300003-8 = "今回の任務は、シャーレから指示を受けるようにと伺い、こちらに参りました。"
1300003-9 = "ご存知の通り、C&Cはミレニアム……いいえ、キヴォトス最高のエージェントによって構成されています。"
1300003-10 = "ミレニアム周辺の不良サークルを「お掃除」したり、"
1300003-11 = "生徒たちを搾取していた悪徳企業の社長さんと「穏便なお話合い」を通じて、未払いの給料にボーナスを含めて支給させたのち、当人は故郷に帰っていただくなどなど、あらゆる「ご奉仕」を行っています。"
1300003-12 = "シャーレでも似たようなことをされているようですし、最高のエージェントの一人である私をお呼びしたのは……。"
1300003-13 = "キヴォトスの全生徒たちのための「ご奉仕」、が必要だからですよね？"
1300003-14 = "賢明なご判断です。私はコールサインゼロスリー、[ruby=むろかさ]室笠[/ruby]アカネ。ご主人様にあらためてご挨拶申し上げます。"
1300003-15 = "本日の任務は何でしょうか？"
1300003-16 = "要人の排除？裏工作？機密確保？組織の壊滅？産業スパイ？"
1300003-17 = "[s1] \"とりあえずこの残骸を何とかして？\"\n[s2] \"掃除を頼むつもりだったけど……。\""
1300003-18 = "なるほど、排除ですね。もしくは壊滅でしょうか？どちらでも可能です。ターゲットを教えてくだ……"
1300003-19 = "なるほど、排除ですね。もしくは壊滅でしょうか？どちらでも可能です。ターゲットを教えてくだ……"
1300003-20 = "……"
1300003-21 = "はい……？"
1300003-22 = "掃除というのは……ほ、本当にあの掃除ですか！？"
1300003-23 = "掃いて拭いて片付けて、綺麗で見栄えの良い空間にする、あの掃除のことですか！？"
1300003-24 = "信じられません……私のことをメイドか何かだとお思いなのですか！？"
1300003-25 = "……。"
1300003-26 = "あ……。"
1300003-27 = "な、なるほどです……ふう。も、申し訳ありません。たまに自分でも、自身のアイデンティティに混乱する時がありまして……。"
1300003-28 = "とにかく、分かりました。"
1300003-29 = "ご安心ください、私はC&Cの一員。どんな任務でも、完璧に実行してみせる自信があります。"
1300003-30 = "それではターゲット、もとい掃除するエリアは……この、ご主人様の執務室ですか？"
1300003-31 = "それでは、道具が必要ですね。"
1300003-32 = "（スッ）"
1300003-33 = "[s] \"どうして爆弾を取り出すの？\""
1300003-34 = "これが一番、一瞬で全てを綺麗にしてくれる道具ですから。"
1300003-35 = "ご心配なさらないでくださいご主人様、汚れの痕跡すら残りませんので。"
1300003-36 = "ふふっ。"
1300003-39 = "……冗談です。"
1300003-40 = "正直に言うと私、ご主人様からお呼びいただいて、少しドキドキしていたんです。"
1300003-41 = "そのせいもあって、動揺した姿を見られて恥ずかしくなってしまい……少し悪戯心が出てきてしまっただけです。ちょっとした照れ隠しみたいなものだと思ってください。"
1300003-42 = "お掃除とお料理でしたら、私も上級者レベルですので。特にお掃除は私の特技と言っても過言ではありません。"
1300003-43 = "有能なメイドがお傍にお仕えするということがどんなことなのか、教えて差し上げます。"
1300003-44 = "とりあえず、私が爆破させてしまった天井から修理しましょうか。"
1300003-46 = "（それから1時間、部屋を掃除した）"
1300003-48 = "ふふっ、いかがでしょう？"
1300003-49 = "シャーレは思ってたより広いですね、掃除のしがいがあります。"
1300003-50 = "一旦ご主人様の部屋と推察されるお部屋も調査……いえ、お掃除をいたしました。"
1300003-51 = "清潔さと衛生面を確保するということは、単純な見た目だけではなく……。"
1300003-52 = "健康と、品格を守るためにも必須です。"
1300003-53 = "ご覧ください、ご主人様。もし潔癖症の方が来ても歓声を上げるぐらい、綺麗な執務室になりました。"
1300003-55 = "[ns] \"ありがとう。\""
1300003-56 = "！？"
1300003-57 = "……。"
1300003-58 = "あ……失礼いたしました。"
1300003-59 = "ありがとう、という言葉を聞いたのは、ずいぶんと久しぶりなことでして。"
1300003-60 = "いつもは「ぐああっ！」「くっ、くそったれメイドめ！」「や、やられた！」といったような言葉ばかりでしたので……。"
1300003-61 = "先生は、いえ、ご主人様は、私が仕えるのにふさわしいお方のようですね。"
1300003-62 = "本日の任務はここまでですが、次回もご奉仕が必要でしたら……私をお呼びください。"
1300003-63 = "誠心誠意、ご奉仕いたしますので。"
1300003-65 = "ふふっ、今となっては楽しかった思い出ですね。"
1300003-66 = "[s] \"そういえばあの時、どうして爆弾を使って登場したの？\""
1300003-67 = "あれは……。"
1300003-68 = "せっかくなら、強烈な第一印象から始めたかったので。"
1300003-69 = "先生との縁を、です。ふふっ。"
1300003-70 = "これからもよろしくお願いしますね。"
