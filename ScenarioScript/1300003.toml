[translation]
1300003-1 = "Você é o meu mestre? (2)"
1300003-2 = "Schale - Escritório"
1300003-4 = "（Com uma explosão, Akane visita o Schale, naquele momento）"
1300003-5 = "Muito prazer."
1300003-6 = "Eu sou Akane, da C&C."
1300003-7 = "Vim até aqui para servir ao Sensei... não, ao meu mestre."
1300003-8 = "Fui informada de que a missão desta vez seria receber instruções do Schale, por isso vim."
1300003-9 = "Como deve saber, a C&C é composta pelos melhores agentes de Millennium... não, de Kivotos."
1300003-10 = "Nós fazemos uma \"limpeza\" nos grupos de delinquentes ao redor de Millennium,"
1300003-11 = "e através de \"conversas amigáveis\" com presidentes de empresas corruptas que exploravam os estudantes, garantimos que pagassem os salários atrasados com bônus, antes de enviá-los de volta para suas cidades natais, entre outros tipos de \"serviços\"."
1300003-12 = "Parece que vocês fazem algo parecido aqui no Schale, e se me chamaram, uma das melhores agentes..."
1300003-13 = "é porque precisam de um \"serviço\" para todos os estudantes de Kivotos, não é?"
1300003-14 = "Uma decisão sábia. Eu sou o codinome Zero-Three, Akane. Apresento meus cumprimentos novamente, mestre."
1300003-15 = "Qual é a missão de hoje?"
1300003-16 = "Eliminação de um alvo? Operações secretas? Garantia de sigilo? Destruição de uma organização? Espionagem industrial?"
1300003-17 = "[s1] \"Por enquanto, pode dar um jeito nesses destroços?\"\n[s2] \"Eu pretendia pedir uma limpeza, mas...\""
1300003-18 = "Entendo, eliminação. Ou seria destruição? Ambos são possíveis. Por favor, me diga o alvo..."
1300003-19 = "Entendo, eliminação. Ou seria destruição? Ambos são possíveis. Por favor, me diga o alvo..."
1300003-20 = "……"
1300003-21 = "Sim...?"
1300003-22 = "Limpeza... você quer dizer... a-aquela limpeza de verdade!?"
1300003-23 = "Aquela de varrer, passar pano e organizar para deixar o ambiente limpo e apresentável!?"
1300003-24 = "Não acredito... você me acha uma empregada doméstica ou algo do tipo!?"
1300003-25 = "……"
1300003-26 = "Ah..."
1300003-27 = "E-entendo... Ufa. P-peço perdão. Às vezes, até eu mesma fico confusa com a minha própria identidade..."
1300003-28 = "De qualquer forma, entendi."
1300003-29 = "Fique tranquilo, sou um membro da C&C. Tenho confiança de que posso executar qualquer missão com perfeição."
1300003-30 = "Então, o alvo, ou melhor, a área a ser limpa é... este escritório do mestre?"
1300003-31 = "Nesse caso, precisarei de ferramentas."
1300003-32 = "（*Sussurro*）"
1300003-33 = "[s] \"Por que você está tirando uma bomba daí?\""
1300003-34 = "Porque esta é a ferramenta que limpa tudo num instante."
1300003-35 = "Não se preocupe, mestre, não restará nem vestígio da sujeira."
1300003-36 = "Fufu."
1300003-39 = "……É brincadeira."
1300003-40 = "Para ser sincera, fiquei um pouco nervosa quando fui chamada pelo mestre."
1300003-41 = "Por causa disso, fiquei com vergonha de ser vista demonstrando hesitação... e acabei agindo de forma um pouco travessa. Considere isso apenas como uma forma de esconder meu constrangimento."
1300003-42 = "Se for limpeza e culinária, sou de nível avançado. Não é exagero dizer que a limpeza é minha especialidade."
1300003-43 = "Vou lhe mostrar como é ter uma empregada competente servindo ao seu lado."
1300003-44 = "Por enquanto, vamos consertar o teto que eu acabei explodindo."
1300003-46 = "（Depois disso, limpamos o quarto por uma hora）"
1300003-48 = "Fufu, o que achou?"
1300003-49 = "O Schale é mais espaçoso do que eu pensava, dá gosto de limpar."
1300003-50 = "Eu também investiguei... não, limpei o que presumi ser o seu quarto, mestre."
1300003-51 = "Garantir a limpeza e a higiene não é apenas uma questão de aparência..."
1300003-52 = "É essencial para proteger a saúde e a dignidade."
1300003-53 = "Veja só, mestre. O escritório ficou tão limpo que até alguém com TOC aplaudiria."
1300003-55 = "[ns] \"Obrigado.\""
1300003-56 = "！?"
1300003-57 = "……。"
1300003-58 = "Ah…… peço perdão."
1300003-59 = "Faz muito tempo que não ouço a palavra 'obrigada'."
1300003-60 = "Geralmente, só ouço coisas como 'Argh!', 'Droga, sua empregada maldita!' ou 'Eu fui derrotado!'..."
1300003-61 = "Sensei, ou melhor, mestre... parece que você é alguém digno de ser servido por mim."
1300003-62 = "A missão de hoje termina aqui, mas se precisar de meus serviços novamente... por favor, me chame."
1300003-63 = "Servirei você de todo o meu coração."
1300003-65 = "Fufu, agora que penso nisso, são lembranças divertidas."
1300003-66 = "[s] \"Falando nisso, por que você apareceu usando uma bomba naquela época?\""
1300003-67 = "Aquilo foi..."
1300003-68 = "Já que era uma oportunidade, eu queria começar com uma primeira impressão marcante."
1300003-69 = "O meu laço com você, Sensei. Fufu."
1300003-70 = "Conto com você daqui para frente."
