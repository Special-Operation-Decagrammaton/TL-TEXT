[translation]
1001503-1 = "Missão da Alice ~E então, para a lenda~"
1001503-2 = "Hoje é o dia perfeito para sair em uma aventura."
1001503-3 = "Aliás, como a Alice subiu de nível, algumas novas funções foram desbloqueadas."
1001503-4 = "[s1] \"Que tipo de funções?\"\n[s2] \"Por exemplo?\""
1001503-5 = "Exploração de itens."
1001503-6 = "Exploração de itens."
1001503-7 = "Vou mostrar na prática."
1001503-11 = "[s3] \"A-Alice!? O que você está fazendo!?\"\n[s4] \"Por que você virou a lixeira de repente!?\""
1001503-12 = "Fazendo assim, é possível obter itens."
1001503-13 = "Fazendo assim, é possível obter itens."
1001503-14 = "[s5] \"……!?\"\n[s6] \"O que significa isso!?\""
1001503-15 = "……? Você não sabia?"
1001503-16 = "……? Você não sabia?"
1001503-17 = "É possível encontrar itens em lugares como este. Foi assim no RPG que joguei antes, e também no jogo de plataforma que joguei antes daquele."
1001503-18 = "Ah, tem um item de cura no lixo!"
1001503-19 = "Veja, Sensei. A Alice descobriu um \"hambúrguer que alguém começou a comer\"!"
1001503-20 = "[s7] \"Alice, isso não!\"\n[s8] \"Se comer isso, sua vida vai diminuir!\""
1001503-21 = "……É mesmo?"
1001503-22 = "……É mesmo?"
1001503-23 = "……Então quer dizer que eu sofreria dano. A Alice também não gosta de sentir dor."
1001503-24 = "E não podemos desperdiçar magia de cura aqui……."
1001503-25 = "Vamos deixar isso de lado e partir."
1001503-26 = "[s] \"Certo, então para onde vamos?\""
1001503-27 = "Hoje, eu gostaria de ir a um lugar que a Alice não costuma frequentar."
1001503-28 = "Claro, o Sensei vai vir junto, não vai?"
1001503-29 = "[s9] Vou junto porque não posso te deixar sozinha.\n[s10] Vou junto porque estou preocupado."
1001503-30 = "Então, vamos partir!"
1001503-31 = "Então, vamos partir!"
1001503-33 = "Distrito Periférico de Millennium"
1001503-34 = "……Quando me dei conta, tínhamos chegado até aqui."
1001503-35 = "Acabamos nos perdendo…… onde será que estamos?"
1001503-36 = "[s11] \"É um lugar bem deserto…….\"\n[s12] \"Lugares assim geralmente têm delinquentes…….\""
1001503-43 = "Olha só, presas fáceis!"
1001503-44 = "Hehehehe!"
1001503-45 = "!!"
1001503-46 = "[s13] \"Eu sabia que eles viriam!\"\n[s14] \"O clichê de sempre!\""
1001503-47 = "Parece que vocês têm carteiras bem cheias, que sorte a nossa, hein?"
1001503-48 = "Parece que vocês têm carteiras bem cheias, que sorte a nossa, hein?"
1001503-49 = "Hehehe, se não entregarem todo o dinheiro, vão se arrepender!"
1001503-50 = "……?"
1001503-51 = "……."
1001503-52 = "Entendido, são monstros encontrados no campo."
1001503-53 = "(Clack!)"
1001503-54 = "Hã?"
1001503-55 = "Q-que arma é aquela?"
1001503-56 = "Então, vou com força total!"
1001503-57 = "[s] \"Ei, Alice, espere--\""
1001503-58 = "――――――Luz!"
1001503-60 = "(BOOOOOOOOOOOOM!)"
1001503-63 = "(Os delinquentes estavam jogados no chão como garrafas plásticas amassadas)"
1001503-65 = "……？"
1001503-66 = "……Estranho, Sensei. Eu a derrotei, mas não ganhei pontos de experiência."
1001503-67 = "Além disso, nenhuma recompensa apareceu."
1001503-68 = "Ah, será que o sistema exige que as moedas sejam coletadas manualmente?"
1001503-69 = "[s15] \"Não, não, não, espere, Alice!\"\n[s16] \"Desse jeito, é você quem vai parecer a delinquente!\""
1001503-73 = "(Consegui impedir a Alice de revistar os bolsos do delinquente caído)"
