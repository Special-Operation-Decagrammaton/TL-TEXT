[translation]
2000208-1 = "Poção do Amor"
2000208-2 = "Laboratório da Saya"
2000208-3 = "Hmm... ultimamente, sinto que algo está estranho comigo quando passo tempo com o Sensei."
2000208-4 = "Como posso dizer... meu coração dispara só de olhar para o Sensei e meu rosto esquenta... #nNão me sinto como eu mesma, é como se eu tivesse me tornado outra pessoa."
2000208-5 = "Como não consigo me concentrar na pesquisa desse jeito, perguntei para as outras integrantes do clube, e elas disseram que esses devem ser os sentimentos de alguém que se apaixonou."
2000208-6 = "Amor... Sensei, é um pouco vergonhoso, mas eu não sei muito sobre o amor. Por isso, hum..."
2000208-7 = "Bem, tome isto..."
2000208-8 = "[s] \"Isto é...?\""
2000208-9 = "É um elixir que faz a pessoa se apaixonar!"
2000208-10 = "Hahaha! Uma cientista brilhante como eu não confia cegamente no que os outros dizem!"
2000208-11 = "Para confirmar se esse sentimento é realmente amor, preciso observar o comportamento de alguém que está apaixonado."
2000208-12 = "Este elixir é... a minha \"Poção do Amor\" especial! #nSe você cheirar este frasco, vai ficar perdidamente apaixonado pela pessoa à sua frente!"
2000208-13 = "Se a sua reação ao tomar este remédio for igual à minha, então estará provado que eu me apaixonei, certo? Eu sou mesmo um gênio, hahaha!"
2000208-14 = "[s] \"Quem vai tomar esse remédio?\""
2000208-15 = "Ora, obviamente tem que ser o Sensei, não é?"
2000208-16 = "[s] Fugir."
2000208-17 = "Ah, não fuja! Este remédio não faz mal nenhum ao corpo! #nClaro que você não vai ficar dourado nem começar a criar pelos!"
2000208-18 = "Então, seja bonzinho e seja meu objeto de teste!"
2000208-19 = "[s] Apontar para o Nezuke."
2000208-20 = "Hm? O Nezuke? Sinto muito, mas este remédio não tem efeito em animais. #nPor isso, preciso que o Sensei faça o teste diretamente para eu ver o efeito."
2000208-22 = "Vamos... mostre-me a sua reação!"
2000208-23 = "[s] Afastar."
2000208-24 = "E-espere! Se você balançar as mãos assim, o frasco vai..."
2000208-26 = "Ah! O que você fez! #nA Poção do Amor que eu fiz com tanto esforço..."
2000208-30 = "— Isso não é nada parecido comigo, [wa:1700] cometer um erro desses..."
2000208-32 = "— Não pode ser, [wa:1500] não consigo tirar os olhos [wa:1000] do Sensei...!"
2000208-35 = "— Sensei, [wa:1500] saia de perto de mim... [wa:3000] na verdade, [wa:500] não saia!"
2000208-37 = "— Fique assim... [wa:1000] fique comigo só mais um pouco..."
2000208-40 = "— Ugh... [wa:2000] que problema."
2000208-42 = "— Mas, [wa:500] eu simplesmente não consigo tirar os olhos do Sensei..."
2000208-45 = "— Agora, aos meus olhos, o Sensei parece... [wa:3000] um pedaço de queijo delicioso!"
2000208-48 = "[wa:1000] — Não dá, [wa:1000] Sensei... [wa:1500] só um pouquinho, [wa:1000] uma mordida... [wa:1000] você não me deixa [wa:1500] dar só uma mordida?"
2000208-51 = "(Nhac)"
2000208-52 = "Depois disso, fui mordido no braço continuamente até que o efeito do remédio da Saya passasse..."
