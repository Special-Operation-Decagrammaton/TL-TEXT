[translation]
10036150-1 = "スクワッドがゲームを楽しむ方法（３）"
10036150-3 = "なんと！#n中級も見事クリアです！"
10036150-4 = "ひょっとして、これは本日初の景品獲得者になるのでは！？"
10036150-5 = "段々慣れてきたな。"
10036150-6 = "次で最後だよ。"
10036150-7 = "少し寂しいね。#nこれ、もう一回遊べるの？"
10036150-8 = "申し訳ございません！#nお一人様、一回限りの挑戦となっております！"
10036150-9 = "何度もチャレンジできると、#n景品をすべて持っていけてしまいますので。"
10036150-11 = "つまり、次のゲームで本当に最後ってことだね。"
10036150-12 = "分かりやすくて助かるよ。"
10036150-13 = "じゃあ、始めよう。"
10036150-20 = "……サッちゃん、どうしたの？"
10036150-24 = "……具合でも悪い？"
10036150-25 = "いや、そうじゃない。"
10036150-26 = "もう最後なのか、と思っただけだ。"
10036150-27 = "……こうやって4人で遊ぶの、初めてだもんね。"
10036150-29 = "そ、そうですよね……。"
10036150-30 = "……。"
10036150-31 = "……ふふ、悔いが残らないよう頑張ろう。"
10036150-35 = "悔いのないよう、か……なるほど。"
10036150-36 = "全力で遊ぶとしよう……！"
10036150-38 = "みんな、準備はいい？"
10036150-39 = "絶対に勝って、ヒヨリのために景品をゲットしようね。"
10036150-40 = "ああ！"
10036150-41 = "ここまで来たんだし、最後まで付き合ってあげるよ。"
10036150-42 = "え、えへへ、ありがとうございます……。"
10036150-46 = "でも、景品は……。"
10036150-47 = "次の難易度は、そう簡単にいかないでしょう！"
10036150-48 = "さあ、これが最後になります！"
10036150-49 = "果たして、景品をゲットできるのか！"
10036150-50 = "それとも、ここで脱落してしまうのか！"
10036150-52 = "上級、スタートです！"
