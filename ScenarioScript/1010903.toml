[translation]
1010903-1 = "Sem cheiro"

1010903-2 = "Dormitório Millennium Quarto Noah"

1010903-4 = "Estava esperando por você, senhor."

1010903-5 = "É um pouco estranho ter um professor na sua sala."

1010903-6 = "[s1] \"Você com certeza parece bem.\"\n[s2] \"Estou feliz que você esteja bem.\""

1010903-9 = "Obrigado à professora por fazer o mingau."

1010903-10 = "Mas ainda estou com um pouco de febre...#nYuka-chan me disse para descansar no meu quarto."

1010903-11 = "Eu estava lendo um livro em silêncio, mas se isso é tudo, então..."

1010903-12 = "Foi por isso que liguei para você. #nSinto muito pelo precioso feriado."

1010903-13 = "Lamento que você pareça estar usando o frio como desculpa, mas...#nVocê poderia me perdoar se sou um pouco egoísta?"

1010903-14 = "[s3] \"Claro.\"\n[s4] \"Você sempre pode confiar em mim.\""

1010903-17 = "Hehe. Afinal, é isso que o professor diz."

1010903-18 = "Pois bem, vamos começar."

1010903-19 = "Dito isto, não creio que demore muito, pois não há muitos itens."

1010903-20 = "Se você quer aumentar alguma coisa... você quer algo que lhe traga paz de espírito."

1010903-21 = "[s] \"Trouxe alguns.\""

1010903-27 = "... Entendo, é um troféu?"

1010903-28 = "[s] \"Deixei uma mensagem para Yuka e a trouxe do seminário.\""

1010903-29 = "Isso é tudo?"

1010903-30 = "Eu vejo. Um concurso de slogans na primeira série, um concurso de redação na escola..."

1010903-31 = "Até o troféu da última vez que ganhei o Prêmio Milênio...hehe."

1010903-32 = "Não percebi porque deixei lá, mas #n recebi isso."

1010903-33 = "Então, que tipo de efeito a exibição deste troféu tem?"

1010903-34 = "[s] \"Se você exibi-lo em vários lugares, você sempre poderá relembrar suas memórias!\""

1010903-35 = "...Em outras palavras, ao aproveitar os sucessos passados, você será capaz de enfrentar seu próximo desafio com mais liberdade."

1010903-36 = "Não parece ruim."

1010903-37 = "Vamos decorá-lo agora."

1010903-39 = "(depois de um tempo......)"

1010903-41 = "Hum..."

1010903-42 = "[s] \"Hmm...\""

1010903-43 = "Como esperado, isso é..."

1010903-44 = "[s] \"Isso mesmo...\""

1010903-45 = "数が多いせいで、邪魔になっていますね。"
1010903-46 = "Além disso, sinto que fico muito motivado e cansado."

1010903-47 = "[s5] \"Tudo bem, trouxe outra coisa!\"\n[s6] \"Que tal isso?\""

1010903-54 = "Oh céus. Muitos livros."

1010903-55 = "[s7] \"Noah gosta de ler.\"\n[s8] \"Achei que seria bom se fosse um lugar que ele sempre pudesse alcançar.\""

1010903-58 = "certamente……."

1010903-59 = "Se você tiver um livro ao seu alcance, poderá pegá-lo quando quiser lê-lo."

1010903-60 = "Agora, vamos alinhá-los."

1010903-62 = "(depois de um tempo......)"

1010903-64 = "pensando bem....."

1010903-65 = "[s] \"Sim...\""

1010903-66 = "Isso também parece ser um obstáculo."

1010903-67 = "Pode ser perfeito se você usá-lo como cobertura em batalha..."

1010903-68 = "Para o interior, um pouco..."

1010903-69 = "[s] \"Tsu, este é o próximo!\""

1010903-71 = "(Depois disso, a reforma foi repetida)"

1010903-73 = "Este grande boneco Peroro é perfeito para uma #n makeover, mas..."

1010903-74 = "Estou com um pouco de medo do olhar dele... sinto que meus sonhos vão piorar."

1010903-77 = "É uma piscina de vinil? Embora pareça interessante..."

1010903-78 = "……足をぶつけたら水がこぼれて大変なことになりそうですね。"
1010903-80 = "(...No final, nada parecia caber.)"

1010903-82 = "……やっぱり、難しいですね。"
1010903-83 = "Sinto muito, mas me dei ao trabalho de sugerir isso..."

1010903-84 = "[s] \"Bem, me desculpe, não posso ajudar em nada.\""

1010903-88 = "...Se você olhar assim, #ntalvez me sirva do jeito que é."

1010903-89 = "Os lugares e coisas que nos ajudam a relaxar variam de pessoa para pessoa."

1010903-90 = "Eu me diverti muito hoje só porque minha professora ouviu meu egoísmo...hehe."

1010903-91 = "[s9] \"Na verdade, tenho uma última ideia...\"\n[s10] \"Você gostaria de experimentar, se quiser?\""

1010903-98 = "isso é……."

1010903-99 = "É um difusor?"

1010903-100 = "[s] \"Talvez eu não precise me concentrar no que posso ver.\""

1010903-102 = "[ns11] \"Mesmo que pareça solitário...\"\n[ns12] \"Talvez esse perfume deixe sua mente tranquila.\""

1010903-106 = "Eu vejo……."

1010903-107 = "Concordo. #nO que você vê não é tudo... Isso mesmo."

1010903-111 = "Um perfume doce e suave, como um lírio florescendo na chuva..."

1010903-112 = "Isto...talvez seja a minha imagem...?"

1010903-113 = "[s] \"Não foi isso que eu quis dizer...!\""

1010903-114 = "Hehe, não entre em pânico, está tudo bem."

1010903-115 = "...É só uma piada."

