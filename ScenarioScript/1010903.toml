[translation]
1010903-1 = "無香"
1010903-2 = "ミレニアム寮・ノアの部屋"
1010903-4 = "お待ちしてました、先生。"
1010903-5 = "自分の部屋に先生がいるなんて、ちょっと変な感じがしますね。"
1010903-6 = "[s1] \"確かに新鮮だね。\"\n[s2] \"元気そうで良かったよ。\""
1010903-9 = "先生がおかゆを作ってくださったおかげです。"
1010903-10 = "でも、まだ少し熱があるので……#n部屋で休んでなさいとユウカちゃんに言われちゃいまして。"
1010903-11 = "おとなしく本を読んでいたのですが、それだけだと、やはりその……。"
1010903-12 = "そういうわけで、お呼び立てしてしまいました。#nせっかくの休日に申し訳ありません。"
1010903-13 = "風邪を口実に甘えているようで恐縮ですが……#n少しだけ、ワガママを言っても許していただけますか？"
1010903-14 = "[s3] \"もちろんだよ。\"\n[s4] \"いつでも頼ってくれて良いんだよ。\""
1010903-17 = "ふふっ。やっぱり先生はそう言いますよね。"
1010903-18 = "それじゃあ、さっそく始めましょうか。"
1010903-19 = "と言っても、物が少ないので時間はかからないと思いますけれど。"
1010903-20 = "何かを増やすなら……心のゆとりに繋がりそうなものが欲しいですよね。"
1010903-21 = "[s] \"いくつか持ってきてみたよ。\""
1010903-27 = "……なるほど、トロフィーですか。"
1010903-28 = "[s] \"ユウカに一言入れて、セミナーから持ってきたんだ。\""
1010903-29 = "これ、全部ですか？"
1010903-30 = "なるほど。一年生時のスローガンコンペに、校内作文コンクール……。"
1010903-31 = "前回のミレニアムプライスを受賞した際のトロフィーまで……ふふっ。"
1010903-32 = "置きっぱなしだったので気づいてませんでしたが、#nこんなにもらっていたんですね。"
1010903-33 = "それで、このトロフィーを飾ると、どういう効果があるのでしょう？"
1010903-34 = "[s] \"いろんなところに飾ったら、いつでも思い出を振り返れるよ！\""
1010903-35 = "……つまり、過去の成功を糧に、余裕を持って次の挑戦に臨めるようになる、と。"
1010903-36 = "悪くなさそうですね。"
1010903-37 = "さっそく飾ってみましょうか。"
1010903-39 = "（しばらくして……）"
1010903-41 = "うーん……。"
1010903-42 = "[s] \"うーん……。\""
1010903-43 = "さすがに、これは……。"
1010903-44 = "[s] \"そうだね……。\""
1010903-45 = "数が多いせいで、邪魔になっていますね。"
1010903-46 = "それに、やる気が出過ぎてしまって、気疲れしちゃいそうです。"
1010903-47 = "[s5] \"大丈夫、他にも持ってきたよ！\"\n[s6] \"これはどうかな？\""
1010903-54 = "まあ。本がたくさん。"
1010903-55 = "[s7] \"ノアは読書が好きだから。\"\n[s8] \"いつでも手に取れる場所にあったら良いかなって。\""
1010903-58 = "確かに……。"
1010903-59 = "手の届くところに本があれば、読みたい時に手に取れて良さそうですね。"
1010903-60 = "では、並べてみましょうか。"
1010903-62 = "（しばらくして……）"
1010903-64 = "やっぱり……。"
1010903-65 = "[s] \"うん……。\""
1010903-66 = "これも邪魔になってしまいそうです。"
1010903-67 = "戦闘で遮蔽に使うならぴったりかもしれませんが……。"
1010903-68 = "インテリアには、ちょっと……。"
1010903-69 = "[s] \"つ、次はこれ！\""
1010903-71 = "（その後も模様替えを繰り返した）"
1010903-73 = "この大きなペロロ人形は……#nイメージチェンジにはもってこいですが……。"
1010903-74 = "なんだか目つきが怖くて……夢見が悪くなってしまいそうですね。"
1010903-77 = "ビニールプールですか。おもしろそうではありますが……。"
1010903-78 = "……足をぶつけたら水がこぼれて大変なことになりそうですね。"
1010903-80 = "（……結局、どれもしっくりこないようだった）"
1010903-82 = "……やっぱり、難しいですね。"
1010903-83 = "申し訳ありません、せっかくご提案いただいたのに……。"
1010903-84 = "[s] \"ううん、役に立てなくてごめんね。\""
1010903-88 = "……こうしてみると、#nやはり私にはこのままがお似合いなのかもしれません。"
1010903-89 = "落ち着ける場所や物は、人それぞれですから。"
1010903-90 = "私のワガママを先生が聞いてくださっただけで、#n今日はとても楽しかったです……ふふっ。"
1010903-91 = "[s9] \"実は、最後の案があるんだけど……。\"\n[s10] \"良かったら試してみない？\""
1010903-98 = "それは……。"
1010903-99 = "ディフューザーですか？"
1010903-100 = "[s] \"目に見えるものにこだわらなくてもいいかなって\""
1010903-102 = "[ns11] \"たとえ、ものさびしく見えたとしても……。\"\n[ns12] \"この香りが、心のゆとりになるんじゃないかな。\""
1010903-106 = "なるほど……。"
1010903-107 = "そうですね。#n目に見えるものがすべてではない……その通りです。"
1010903-111 = "雨に濡れて咲く百合のような、甘くて優しい香り……。"
1010903-112 = "これは……もしかしてですが、私のイメージ……？"
1010903-113 = "[s] \"そういうつもりじゃ……！\""
1010903-114 = "ふふ、そんなに慌てなくて大丈夫ですよ。"
1010903-115 = "……ただの冗談ですから。"
