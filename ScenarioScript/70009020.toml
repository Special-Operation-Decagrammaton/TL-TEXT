70009020-99 = "E o Clube de Saída Livre? Já chegamos até aqui……?"
70009020-100 = "Aliás, já podíamos ter prendido o Clube de Música antes…… a música de fundo tocou durante toda a marcha……"
70009020-102 = "É ordem da líder!#nPelo sono das alunas, a prioridade é prender o Clube de Música!"
70009020-103 = "……Mas entendo a frustração."
