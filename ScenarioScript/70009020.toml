[translation]
70009020-1 = "Mas a Equipe de Vigilância continua correndo (2)"
70009020-3 = "Haa... cheguei."
70009020-7 = "E-estou exausta~"
70009020-8 = "Graças à Capitã da Vigilância deu tudo certo, mas... #nSe não tivéssemos chegado a tempo... ugh."
70009020-13 = "Ah, é verdade. Preciso adiantar as tarefas também..."
70009020-17 = "...deixo para amanhã."
70009020-21 = "Uaa... cama, você é a melhor."
70009020-25 = "...Quando foi a última vez que desenhei algo?"
70009020-26 = "Esquece, esquece, vou dormir logo."
70009020-27 = "Uaa... boa noite~"
70009020-32 = "BABABABA~M!! BABABABA~M!!"
70009020-33 = "Ué!? Q-que barulho é esse!?"
70009020-34 = "Se são pessoas fazendo show de rua a essa hora da noite..."
70009020-35 = "De novo não!! Eu estou privada de sono!!"
70009020-36 = "Alguém! Parem o Clube de Música de Fundo!!"
70009020-40 = "Todos de pé! Alinhamento no corredor em 5 minutos! #nRepito! Todos de pé! Alinhamento no corredor em 5 minutos!"
70009020-41 = "Aaaaaah..."
70009020-42 = "...Não tem jeito."
70009020-49 = "...Há cerca de 7 minutos, avistamos o Clube de Saídas Livres pulando a cerca da academia."
70009020-50 = "Ah, não! O Clube de Saídas Livres de novo."
70009020-51 = "Já é a quarta vez este mês... quando é que esse pessoal dorme?"
70009020-55 = "A partir de agora, nossa prioridade máxima é impedir a fuga. #nAlém disso, capturem a presidente do Clube de Saídas Livres assim que a virem. Alguma pergunta?"
70009020-56 = "Com licença... posso perguntar uma coisa?"
70009020-57 = "Não deveríamos deixar o Clube de Música de Fundo lá fora em paz? #nEstamos recebendo muitas reclamações dos dormitórios..."
70009020-58 = "Hum, o Clube de Música de Fundo pode continuar como está. #nAinda não recebemos ordens de prisão para eles."
70009020-59 = "Mas o sono das alunas..."
70009020-60 = "Suponhamos o seguinte: se um músico de uma orquestra ignorar o maestro #ne começar a tocar por conta própria, o que acontece?"
70009020-61 = "Hã? #n...Vira uma cacofonia, não é?"
70009020-62 = "Exatamente. Se a Capitã da Vigilância não emitiu uma ordem de prisão, não precisamos agir. #nO importante é apenas que 'o Clube de Música de Fundo não é o alvo desta vez'."
70009020-63 = "Não entendam as ordens com a cabeça... sintam com o coração!"
70009020-64 = "E-entendido...!"
70009020-66 = "(...Será que isso não acaba logo?)"
70009020-72 = "Então, todos em movimento! Avançar a toda velocidade!"
70009020-74 = "Perto da cerca da Academia Wildhunt"
70009020-76 = "Haa, haa..."
70009020-77 = "Por que no meio da noite... mas falta pouco..."
70009020-86 = "Sim!? N-não, entendido."
70009020-91 = "Todos, parem!"
70009020-95 = "...?"
70009020-96 = "A partir de agora, vamos prender o Clube de Música de Fundo!"
70009020-97 = "...Hã?"
70009020-99 = "E o Clube de Saídas Livres? Nós viemos até aqui...?"
70009020-100 = "E outra, a gente não podia ter prendido o Clube de Música de Fundo agora há pouco? #nEles estavam tocando música de apoio enquanto a gente marchava..."
70009020-102 = "Esta é uma ordem da Capitã da Vigilância! #nPara o bem do sono das alunas, a prisão do Clube de Música de Fundo é a prioridade máxima!"
70009020-103 = "...Mas entendo a insatisfação de vocês."
70009020-104 = "...Oh?"
70009020-105 = "Não devem estar convencidos de ter que voltar depois de vir até aqui."
70009020-107 = "(Agora... depois de tudo isso?)"
70009020-108 = "(Não, mas... se fosse você, com certeza conseguiria...!)"
70009020-110 = "Mas... é justamente aí que reside a verdadeira intenção da Capitã da Vigilância!"
70009020-111 = "Todos, recuar! Avancem a toda velocidade!"
70009020-116 = "Ah...!"
70009020-117 = "Ah, qual é!!!"
70009020-121 = "O que é essa escola, afinal~~~!!!"
70009020-125 = "Mas a equipe de supervisão do dormitório continua correndo"
