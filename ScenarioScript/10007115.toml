[translation]
10007115-1 = "Epílogo: Um certo dia na Academia Federal Red Winter"
10007115-4 = "Antigo Distrito Termal 227"
10007115-7 = "[ns] \"…….\""
10007115-9 = "Bem, foi uma explosão e tanto... Sensei, você está bem?"
10007115-10 = "[s1] \"Consegui fugir a tempo com todo mundo, então estou bem.\"\n[s2] \"Sim, de alguma forma...\""
10007115-11 = "Que bom."
10007115-12 = "Que bom."
10007115-13 = "O prédio..."
10007115-14 = "Nem um pilar sobrou, hein? De repente, tudo ficou cruelmente desolado..."
10007115-21 = "……."
10007115-22 = "As fontes termais secaram, e mesmo que a Presidente Cherino tenha tentado resolver no final, tudo foi explodido de uma vez..."
10007115-23 = "Voltamos àquela vida de antes..."
10007115-24 = "Além disso, estamos cobertos de cinzas por causa da explosão, é o pior cenário possível..."
10007115-28 = "...Mas não há o que fazer."
10007115-29 = "A vida ainda é longa, e tenho certeza de que uma oportunidade única como essa surgirá novamente algum dia... Só nos resta continuar seguindo em frente para que possamos ver muitas coisas bonitas no futuro."
10007115-35 = "Já que o Sensei e meus amigos estão a salvo... por hoje, isso é o suficiente."
10007115-36 = "Sim, o mais importante é que todos estão bem."
10007115-37 = "[s] \"...Vamos continuar dando o nosso melhor juntos, Nodoka.\""
10007115-38 = "...Sim! Obrigada, Sensei."
10007115-39 = "Ugh, mas ainda assim... minhas roupas e meu cabelo estão uma bagunça por causa da poeira da explosão..."
10007115-40 = "E mesmo que eu quisesse me lavar, as fontes termais acabaram de desaparecer..."
10007115-42 = "Eu também estou todo grudento! Ah, droga!"
10007115-43 = "Tem um monte de coisas estranhas grudadas no meu bigode, que sensação horrível..."
10007115-44 = "No antigo prédio escolar, não há instalações para se banhar...?"
10007115-45 = "Tem a pia do banheiro, mas a água foi cortada há muito tempo... Normalmente, a gente ferve água em tambores."
10007115-46 = "E-então, você está dizendo para mim, a maior autoridade da Academia Federal Red Winter, voltar para a secretaria com essa aparência ridícula? Isso acabaria com a minha reputação!"
10007115-52 = "Ei, Nodoka, parece que demos sorte e sobrou uma fonte termal ao ar livre ali."
10007115-53 = "A água está limpa, talvez ainda dê para usar."
10007115-54 = "Sério!?"
10007115-55 = "Oba,"
10007115-56 = "Então vamos nos lavar..."
10007115-57 = "Espere um pouco! Não aceito que as alunas do antigo prédio escolar entrem antes de mim!"
10007115-58 = "Pelo menos, eu vou entrar junto!"
10007115-60 = "Se a Cherino-chan vai entrar, eu também..."
10007115-61 = "Ufa, foi tudo tão barulhento... Quero entrar em uma banheira quente e descansar..."
10007115-62 = "N-não me diga que vocês pretendem monopolizar até o direito de se banhar...!?"
10007115-63 = "Se as alunas da secretaria vão entrar, nós também vamos!"
10007115-65 = "E-esperem! Todas juntas de uma vez é um pouco demais...!"
10007115-66 = "Bem, não tem problema, né? De vez em quando, entrar todas apertadinhas e animadas também é divertido."
10007115-67 = "Além disso... se ainda sobrou uma fonte termal, isso significa que aqui ainda é o \"Distrito Termal 227\", certo?"
10007115-68 = "Conto com você até o fechamento, \"Gerente\"."
10007115-69 = "...Ah."
10007115-70 = "Se você diz assim, não tenho escolha..."
10007115-74 = "\"Distrito Termal 227\", funcionamento temporário iniciado!"
10007115-78 = "Ufa... Que água realmente boa. É como se todo o cansaço do dia estivesse sendo levado embora..."
10007115-79 = "Hum. De fato, é uma pena não poder mais aproveitar fontes termais como esta."
10007115-80 = "Não haveria uma forma de criar um novo distrito termal sem causar danos à secretaria?"
10007115-81 = "Mais importante que isso, Cherino-chan, você não vai tirar a sujeira se lavar desse jeito, sabia?"
10007115-82 = "Venha aqui, eu mesma vou te lavar."
10007115-83 = "Ugh! Eu não sou criança, posso me lavar sozinha! Ei, quem foi que tocou no meu bigode agora!?"
10007115-88 = "Hehe, tomar mors enquanto relaxo na fonte termal assim é o máximo."
10007115-89 = "Hm? Que bebida é essa?"
10007115-90 = "Não me diga que você está bebendo álcool abertamente na frente de um membro do comitê de segurança da secretaria...?"
10007115-91 = "Este é um mors especial que eu preparei na primavera passada."
10007115-92 = "Bem, talvez tenha fermentado um pouco."
10007115-93 = "Entendo... não, espere, o que você disse agora?"
10007115-94 = "Hehe, não se preocupe com isso."
10007115-95 = "Se está tão curioso, por que não toma um pouco comigo?"
10007115-96 = "Bem, só um gole, talvez..."
10007115-101 = "Pessoal! Hoje nos ajoelhamos diante daquela nova arma do opressor maligno, mas... isso não é uma derrota nossa! Isso é apenas um passo estratégico para a nossa próxima vitória!"
10007115-102 = "Da próxima vez, vamos destruir aquele tanque irritante com antecedência e conquistar uma vitória revolucionária!"
10007115-103 = "Ooooooh!!"
10007115-108 = "Que barulhentos... é por isso que eu não queria entrar com todo mundo ao mesmo tempo..."
10007115-109 = "[s] \"Mas todos parecem estar se divertindo.\""
10007115-110 = "Ahaha... bem, pode-se dizer que as alunas de Red Winter são sempre assim..."
10007115-112 = "......Sensei."
10007115-113 = "As coisas ficaram um pouco agitadas, mas, hum..."
10007115-114 = "[s3] \"Foi muito divertido.\"\n[s4] \"Obrigado, Nodoka.\""
10007115-115 = "......Fico feliz que tenha pensado assim. Ehehe."
10007115-116 = "......Fico feliz que tenha pensado assim. Ehehe."
10007115-117 = "A fonte termal não existe mais, mas, por favor, venha ao antigo prédio da escola..."
10007115-118 = "Não, venha nos visitar na Classe Especial 227."
10007115-124 = "Mesmo que não seja na estância termal... nós sempre daremos as boas-vindas ao Sensei!"
10007115-125 = "Registro de operação da Estância Termal 227!"
