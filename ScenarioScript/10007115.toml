[translation]
10007115-1 = "エピローグ;レッドウィンター連邦学園のとある一日"
10007115-4 = "旧227号温泉郷"
10007115-7 = "[ns] \"……。\""
10007115-9 = "えっと、かなりの爆発でしたが……先生、ご無事ですか？"
10007115-10 = "[s1] \"みんなと咄嗟に逃げられたから大丈夫。\"\n[s2] \"うん、何とか……。\""
10007115-11 = "それは良かったです。"
10007115-12 = "それは良かったです。"
10007115-13 = "建物は……"
10007115-14 = "柱一本残っていない、か。いきなり、残酷なほどの殺風景に……。"
10007115-21 = "……。"
10007115-22 = "温泉は枯れて、チェリノ会長も最後には善処してくれたのに、まとめて爆破されて……。"
10007115-23 = "また、あの頃の生活に……。"
10007115-24 = "その上、爆発でこうして灰まみれで、もう最悪です……。"
10007115-28 = "……ですが、仕方ありませんね。"
10007115-29 = "人生まだまだ長いですし、いつかまたこうして千載一遇のチャンスがやってくることもあるはずですし……これからもたくさんの綺麗なものが見られるよう、何とかやっていくしかありません。"
10007115-35 = "先生も、お友達も無事だったのですから……今回はそれで良しとします。"
10007115-36 = "うん、みんな無事で何より。"
10007115-37 = "[s] \"……これからも一緒に頑張ろう、ノドカ。\""
10007115-38 = "……はい！ありがとうございます、先生。"
10007115-39 = "うぅ、それにしても……爆発の埃やら何やらで、服も髪もぐちゃぐちゃです……。"
10007115-40 = "洗い流そうにも、ちょうど温泉も無くなってしまって……。"
10007115-42 = "おいらもベトベトだ！もうっ！"
10007115-43 = "何か髭に色々変なのがくっついてて、気持ち悪い……。"
10007115-44 = "旧校舎に、身体を洗える設備などは……？"
10007115-45 = "お手洗いの洗面台があるんですけど、それもずいぶん前に水道が止まって……普段はドラム缶に水を入れて沸かしたりですね。"
10007115-46 = "で、では、レッドウィンター連邦学園の最高の権威を持つこのおいらに、こんなみっともない格好で事務局まで戻れと言うのか？そんなの、おいらの面子が立たない！"
10007115-52 = "ねえノドカ、あっちに運良く露天風呂が一つ残ってるみたい。"
10007115-53 = "お湯もキレイだし、まだ使えるかも。"
10007115-54 = "本当！？"
10007115-55 = "やった、"
10007115-56 = "じゃあ身体を洗いに……"
10007115-57 = "ちょっと待ったぁ！おいらを差し置いて、旧校舎の停生徒たちが先にだなんてありえない！"
10007115-58 = "せめて、おいらも一緒に入る！"
10007115-60 = "チェリノちゃんが入るなら、私も……。"
10007115-61 = "ふう、色々と騒がしかったな……温かい湯船に入って休みたい……。"
10007115-62 = "ま、まさか、身体を洗う権利まで独占するつもりじゃ……！？"
10007115-63 = "事務局の生徒たちが入るなら、あたしたちも一緒に入るから！"
10007115-65 = "ま、待ってください！こんなに大勢で一気にはちょっと……！"
10007115-66 = "まあ、良いんじゃない？たまにはぎゅうぎゅうに、賑やかに入るのも楽しいよ。"
10007115-67 = "それに……まだ温泉が残ってるってことは、ここはまだ「227号温泉郷」でしょ？"
10007115-68 = "営業終了までよろしくね、「支配人」。"
10007115-69 = "……はぁ。"
10007115-70 = "そう言われちゃったら仕方ない……"
10007115-74 = "「227号温泉郷」、臨時営業開始です！"
10007115-78 = "ふぅ……本当に良いお湯ですね。一日の疲れが全て流されるような……。"
10007115-79 = "うむ。やはりこういった温泉が楽しめなくなるのは残念だな。"
10007115-80 = "事務局に被害が及ばないようにしながら、新しい温泉郷を作る方法はないのか？"
10007115-81 = "それよりもチェリノちゃん、そんな洗い方じゃ汚れは取れませんよ？"
10007115-82 = "さあ、私が直接洗ってあげますからこちらへ。"
10007115-83 = "ううっ！おいらは子供じゃないんだからひとりで洗える！あ、おい、誰だ今髭に触ったのは！？"
10007115-88 = "ふふっ、こうして温泉に入りながらのモルスは最高だね。"
10007115-89 = "ん？何だその飲み物は？"
10007115-90 = "まさかとは思うが、事務局の保安委員の前で堂々とアルコールを……？"
10007115-91 = "これは去年の春に私が漬けた、特製モルスだよ。"
10007115-92 = "まあ、ちょっと発酵してるかもだけど。"
10007115-93 = "そうか……いや、今何と？"
10007115-94 = "ふふっ、気にしない気にしない。"
10007115-95 = "そんなに気になるなら、一緒に一杯どう？"
10007115-96 = "まあ、一口ぐらいなら……。"
10007115-101 = "皆の者！今日は邪悪なる圧制者、その新兵器の前に膝をついてしまったが……これはあたしたちの敗北じゃない！これはあくまで、次の勝利のための布石だ！"
10007115-102 = "次こそはあの鬱陶しい戦車を事前に破壊し、革命的な勝利をもぎ取ろう！"
10007115-103 = "おーーー！！"
10007115-108 = "騒がしいですね……ですからこんな一斉に入りたくなかったのですが……。"
10007115-109 = "[s] \"でも、みんな楽しそうだね。\""
10007115-110 = "あはは……まあレッドウィンターの生徒たちは、いつもこんな感じと言いますか……。"
10007115-112 = "……先生。"
10007115-113 = "何だか色々とバタバタしてしまいましたが、その……。"
10007115-114 = "[s3] \"すごく楽しかったよ。\"\n[s4] \"ありがとう、ノドカ。\""
10007115-115 = "……そう思っていただけたなら、良かったです。えへへ。"
10007115-116 = "……そう思っていただけたなら、良かったです。えへへ。"
10007115-117 = "もう温泉はありませんが、また旧校舎に……"
10007115-118 = "いえ、私たち227号特別クラスのところに来てくださいね。"
10007115-124 = "温泉郷でなくても……私たちはいつも、先生のことを歓迎しますから！"
10007115-125 = "227号温泉郷の運営記録！"
