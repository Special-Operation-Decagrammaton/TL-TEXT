[translation]
10011105-1 = "エピローグ;祭りの後にも"
10011105-4 = "（そうして大騒ぎになった一連の出来事は、表向きには何とか公演の一環として処理され……）"
10011105-9 = "キキキキキッ！うむ、実に愉快だったな！どうだイブキ、楽しかったか？"
10011105-10 = "うん！すっごく！！"
10011105-11 = "……私は疲れました。"
10011105-13 = "全く、依頼主だと言っていた「ニヤニヤ教授」とやらの足取りは掴めませんでしたし……。"
10011105-14 = "全く、いつもいつもどうしてこう……。"
10011105-15 = "面倒なことばっかり……なんでしょうね。"
10011105-17 = "イロハ、何だか知らんがすごい表情をしてないか……？"
10011105-21 = "……ところでイブキ、手に持ってるそれは何だ？見たことないオモチャだが。"
10011105-22 = "あ、これ？忍者のおねえちゃんたちがくれたの！忍者だよ！！"
10011105-23 = "……うん？それも忍者なのか？というか「忍者」とは、漫画やらドラマやらに出てくる、あれのことか？"
10011105-24 = "忍者は本当にいるんだよ、すっごくカッコ良いの！あとでイブキがお話してあげる！"
10011105-26 = "（そして、主役の忍術研究部はというと……）"
10011105-30 = "[ns] \"あっ、ちょうどやってる。\""
10011105-32 = "それでは、次のニュースです。"
10011105-33 = "今回の百鬼夜行連合学院とゲヘナ学園の交流会、そしてそこで活躍した忍術研究部に関してです。"
10011105-34 = "突如として現れた彼女たちについて、各地のみなさんに尋ねてみました。"
10011105-36 = "何か、あの「眠り姫」の試練もあっさりクリアしたんだって？"
10011105-37 = "聞いた話によると、その次の「読心術師」も軽々突破したとか。"
10011105-38 = "あ、そういえば何か、あの万魔殿のやつらと盛大にやり合ったとか！"
10011105-39 = "戦車で映画村を蹂躙したとか、とんでもないアウトローだよね。"
10011105-41 = "このように様々な噂が飛び交う「忍術研究部」なのですが……"
10011105-42 = "どうやらこの部活、現実には存在しないようなのです！"
10011105-43 = "果たして彼女たちの正体は一体何なのでしょうか？幽霊なのか、それとも陰陽部の密偵なのか？"
10011105-44 = "我々は、その真実を探るべく――"
10011105-48 = "[ns] \"うーん、マスコミは怖い……。\""
10011105-50 = "（そうして情報伝達の恐ろしさと難しさを感じていた時……）"
10011105-56 = "先生殿、ちょっと匿って！"
10011105-57 = "助けてください、先生……！"
10011105-58 = "ピンチです！"
10011105-59 = "[s] \"……ど、どうしたの？\""
10011105-60 = "カホたち陰陽部に追われてるの！"
10011105-61 = "その、先日の、事件のことで……！"
10011105-63 = "つまり要約すると、「今回の公演を無事成功に導いたから、正式な部活として認めてくれ」……と？"
10011105-64 = "もちろん、皆さんの活躍は大きいものでした。心より感謝しています。その上でのお話にはなりますが……"
10011105-70 = "こちらは今回、公演中に発生した損害賠償の請求書です。"
10011105-71 = "映画村の大半の施設が半壊……損害額は約8桁です。"
10011105-75 = "皆さんの功績をしっかりと勘定するには、まずこの辺りから清算せねばならないのですが……。"
10011105-77 = "でもさぁ、せめて戦車がなぎ倒した分は万魔殿と折半じゃない！？"
10011105-78 = "はぁ、もう文字通り何から何までめちゃくちゃだよ……。"
10011105-79 = "結果としては色々……。"
10011105-83 = "先生殿。"
10011105-84 = "[s] \"ん？\""
10011105-85 = "その、えっと……"
10011105-86 = "ご迷惑をおかけしました……"
10011105-87 = "[s] \"ミチルが謝るなんて……。\""
10011105-88 = "その驚き方はちょっと失礼では！？"
10011105-89 = "わ、私だって悪いと思ったら謝るよ！？"
10011105-90 = "今回はほとんど私のせいで、色々迷惑がかかっちゃったし……"
10011105-91 = "みっともないところも、たくさん見せちゃったし……。"
10011105-92 = "[s] \"大丈夫だよ、そういうのに付き合うのも先生だから。\""
10011105-93 = "うわ、大人だ……。"
10011105-95 = "あ、そういえばその、あの日帰ってから……イズナとツクヨと、相談したの。"
10011105-96 = "正式な部活にするにはまだ、勇気が足りないって言うか、"
10011105-97 = "周囲より自分の気持ち的な問題って言うか……。"
10011105-98 = "とにかく、時間が必要な気がするから……正式な部活になるのは、とりあえずもう少し後にしようって。"
10011105-99 = "そしたら、二人とも……"
10011105-101 = "[ns] \"「気にしないよ」って？\""
10011105-102 = "……うん。"
10011105-106 = "ほんと、私にはもったいないくらいの後輩たちだよ。"
10011105-109 = "[ns] \"よし、じゃあみんなで「ニンペロさん」グッズでも買いに行こうか。\""
10011105-110 = "えっ？"
10011105-111 = "え……？"
10011105-112 = "ほ、本当ですか主殿！？"
10011105-113 = "[s] \"うん。みんな頑張ったから、ご褒美も兼ねて。\""
10011105-114 = "やったぁ！やっぱり先生殿、最高！"
10011105-115 = "主殿からのプレゼント……！イズナ、家宝にします！一生の宝物です！"
10011105-116 = "[s] \"お、大げさだよ……。\""
10011105-117 = "私も、毎日おはようって言って、お風呂に入って、ドライヤーして……。"
10011105-118 = "[s] \"完全に飼ってる状態だ……。\""
10011105-119 = "だったら私も！先生だと思って、毎日一緒に散歩してあげる！"
10011105-120 = "[s] \"それはまた何か語弊がありそうな……！\""
10011105-122 = "（そうして事件は一件落着……）"
10011105-123 = "（……する前に、最後にもう一つやることがあった）"
10011105-129 = "（風が気持ち良い、映画村の片隅……）"
10011105-130 = "ふんふんふん～♪"
10011105-131 = "にゃははっ、今回も割と楽しめたねぇ。"
10011105-132 = "個人的にはそういう感想なんですが～……"
10011105-133 = "……先生の方はどうです？"
10011105-134 = "[s] \"や、こんばんは。\""
10011105-136 = "シャーレのご協力もあって、無事に交流会も終わりましたわ。"
10011105-137 = "お力添え、感謝しますよ～♪"
10011105-138 = "[s] \"どういたしまして。\""
10011105-140 = "[ns] \"ところで、本題に入って良い？\""
10011105-141 = "あらあら、小粋なアイスブレイクのつもりだったのに……急展開で残念ですねぇ。"
10011105-142 = "[s] \"全部ニヤの計画、ってことで合ってる？\""
10011105-143 = "あらまあ直球。探り合いも必要無し、という感じです？"
10011105-147 = "……ちなみに証拠は？"
10011105-148 = "[s] \"警備の位置とか全部把握した上でイブキを攫った、魑魅一座のあの動き方。\""
10011105-149 = "なるほど、ある意味高く買われてますねぇ。もし陰陽部が本当にしっかり警備していたら、こんなことはそもそも起こらなかったはず……。"
10011105-150 = "逆に言うと「陰陽部」が加担していない限り、あのようなことは起こらないはず……と？"
10011105-151 = "にゃははっ……"
10011105-152 = "バッチリ花丸、ご名答～♪"
10011105-153 = "[s] \"隠さないんだね。\""
10011105-155 = "まあ、隠す必要もありませんからねぇ。"
10011105-156 = "そもそも私は、ただ「シャーレ」の力をこの目で見たかっただけです。"
10011105-157 = "……忍術研究部、でしたっけ？"
10011105-158 = "まあ傍目から見ている分には、面白そうな子たちではありましたが……。"
10011105-160 = "正式な部活にもなれないまま慌てふためき、足掻き続ける子たち……。"
10011105-161 = "そんな彼女たちを連れて、本当にお姫様を救い出せるなんて。"
10011105-162 = "かなり厳しいはずだと読んでいましたが、あの手腕……"
10011105-163 = "噂通り……というところでしょうか。"
10011105-164 = "流石はシャーレの先生、感激しましたわ。"
10011105-165 = "[s] \"……そっか。\""
10011105-167 = "もしかして、ご気分を害してしまいました？"
10011105-168 = "全ての犯人が判明して、嫌な気持ちですか？"
10011105-169 = "それとも、これだけ人を振り回しておいて、"
10011105-170 = "面白おかしく笑ってる場合か……"
10011105-171 = "みたいな？"
10011105-172 = "[s] \"……ニヤ。\""
10011105-173 = "はいはい？"
10011105-174 = "[s] \"お説教。\""
10011105-178 = "……え？"
10011105-179 = "[s] \"そこに座って。\""
10011105-180 = "ええと……先生？"
10011105-181 = "自分で言うのも何ですが、その、様式美と言いますか……"
10011105-182 = "あの、今の私「ザ・黒幕」みたいなムーブだったんですが、このタイミングで「お説教」というのはその、流れ的にどうなんです……？"
10011105-183 = "[s] \"ちょっと長くなるけど、我慢してね。\""
10011105-189 = "えっと、あの……"
10011105-190 = "ちょっ、先生！？顔が怖っ……！？"
10011105-192 = "（そうして騒動はひと段落したものの、）"
10011105-193 = "（問題は幾つか残りそうであった）"
10011105-194 = "不忍ノ心"
