[translation]
10011105-1 = "Epílogo; Depois do festival"
10011105-4 = "（E assim, a série de eventos que causou um grande alvoroço foi, superficialmente, tratada como parte da apresentação...）"
10011105-9 = "Kikikiki! Hum, foi realmente divertido! E então, Ibuki, você se divertiu?"
10011105-10 = "Sim! Muito mesmo!!"
10011105-11 = "……Eu estou exausta."
10011105-13 = "Francamente, não conseguimos nem rastrear esse tal de \"Sensei Sorrisinho\" que diziam ser o cliente……."
10011105-14 = "Sério, por que as coisas sempre terminam assim……."
10011105-15 = "Sempre cheias de problemas…… não é?"
10011105-17 = "Iroha, não sei o que houve, mas você não está com uma expressão um tanto exagerada……?"
10011105-21 = "……A propósito, Ibuki, o que é isso que você está segurando? É um brinquedo que nunca vi antes."
10011105-22 = "Ah, isso? As irmãs ninjas me deram! São ninjas, viu!!"
10011105-23 = "……Hum? Isso também é um ninja? Digo, \"ninja\" não é aquele tipo de coisa que aparece em mangás e dramas?"
10011105-24 = "Ninjas existem de verdade, eles são super legais! Depois a Ibuki te conta a história!"
10011105-26 = "（E quanto aos protagonistas, o Clube de Pesquisa Ninjutsu……）"
10011105-30 = "[ns] \"Ah, está passando agora mesmo.\""
10011105-32 = "A seguir, as próximas notícias."
10011105-33 = "Sobre o encontro entre a Academia Hyakkiyako e a Academia Gehenna, e o Clube de Pesquisa Ninjutsu que se destacou lá."
10011105-34 = "Perguntamos a pessoas de vários lugares sobre elas, que surgiram de repente."
10011105-36 = "Dizem que elas superaram facilmente até o teste da \"Bela Adormecida\", não é?"
10011105-37 = "Ouvi dizer que elas também passaram tranquilamente pelo \"Leitor de Mentes\" logo depois."
10011105-38 = "Ah, falando nisso, parece que elas tiveram um grande confronto com aquele pessoal do Pandemonium!"
10011105-39 = "Dizem que devastaram a vila cinematográfica com um tanque, são fora da lei de primeira."
10011105-41 = "Embora existam vários rumores circulando sobre o \"Clube de Pesquisa Ninjutsu\"……"
10011105-42 = "Ao que parece, este clube nem sequer existe na realidade!"
10011105-43 = "Qual seria a verdadeira identidade delas? Seriam fantasmas ou espiãs do Departamento Yin-Yang?"
10011105-44 = "Nós, para descobrir a verdade――"
10011105-48 = "[ns] \"Hum, a mídia é assustadora…….\""
10011105-50 = "（E enquanto sentiam o medo e a dificuldade da transmissão de informações……）"
10011105-56 = "Sensei, por favor, nos esconda!"
10011105-57 = "Nos ajude, Sensei……!"
10011105-58 = "Estamos em apuros!"
10011105-59 = "[s] \"……O, o que aconteceu?\""
10011105-60 = "Estamos sendo perseguidas pela Kaho e o pessoal do Departamento Yin-Yang!"
10011105-61 = "Por causa daquele incidente de outro dia……!"
10011105-63 = "Ou seja, resumindo, vocês querem que eu reconheça o clube oficialmente porque \"conduziram a apresentação ao sucesso\"…… é isso?"
10011105-64 = "Claro, a contribuição de vocês foi grande. Agradeço de coração. Mas, partindo disso……"
10011105-70 = "Aqui está a fatura dos danos causados durante a apresentação."
10011105-71 = "A maior parte das instalações da vila cinematográfica foi destruída…… o valor do prejuízo chega a 8 dígitos."
10011105-75 = "Para contabilizar corretamente os feitos de vocês, primeiro precisamos acertar essas contas……."
10011105-77 = "Mas, pelo menos a parte que o tanque destruiu não deveria ser dividida com o Pandemonium!?"
10011105-78 = "Ah, tudo ficou literalmente uma bagunça……."
10011105-79 = "O resultado foi uma mistura de coisas……."
10011105-83 = "Sensei."
10011105-84 = "[s] \"Hum?\""
10011105-85 = "É que, bem……"
10011105-86 = "Desculpe por causar problemas……"
10011105-87 = "[s] \"A Michiru pedindo desculpas……\""
10011105-88 = "Essa reação de surpresa é um pouco ofensiva, sabia!?"
10011105-89 = "E, eu também peço desculpas quando sei que fiz algo errado, tá!?"
10011105-90 = "Desta vez, a culpa foi quase toda minha e acabei causando muitos problemas……"
10011105-91 = "Eu acabei mostrando um lado meu bem feio também..."
10011105-92 = "[s] \"Está tudo bem, lidar com essas coisas também é parte do meu trabalho como sensei.\""
10011105-93 = "Uau, que maduro..."
10011105-95 = "Ah, falando nisso... depois que voltei para casa naquele dia... eu conversei com a Izuna e a Tsukuyo."
10011105-96 = "Digo, ainda não temos coragem o suficiente para nos tornarmos um clube oficial,"
10011105-97 = "ou talvez seja mais uma questão dos nossos próprios sentimentos do que do que os outros pensam..."
10011105-98 = "De qualquer forma, sinto que precisamos de mais tempo... então decidimos deixar para nos tornarmos um clube oficial um pouco mais para frente."
10011105-99 = "E então, as duas..."
10011105-101 = "[ns] \"Disseram que 'não se importam'?\""
10011105-102 = "……Sim."
10011105-106 = "Sério, eu tenho umas kouhais boas demais para mim."
10011105-109 = "[ns] \"Certo, então vamos todos comprar alguns produtos do 'Ninpero-san'.\""
10011105-110 = "Hã?"
10011105-111 = "Eh...?"
10011105-112 = "S-Sério mesmo, Mestre!?"
10011105-113 = "[s] \"Sim. Vocês se esforçaram muito, então é uma recompensa também.\""
10011105-114 = "Eba! O Sensei é o melhor, como esperado!"
10011105-115 = "Um presente do Mestre...! A Izuna vai guardar como uma relíquia de família! É um tesouro para a vida toda!"
10011105-116 = "[s] \"V-você está exagerando...\""
10011105-117 = "Eu também, vou dizer bom dia todo dia, dar banho, secar o cabelo..."
10011105-118 = "[s] \"Isso é basicamente como se estivesse criando um animal de estimação...\""
10011105-119 = "Então eu também! Vou fingir que você é o sensei e te levar para passear todo dia!"
10011105-120 = "[s] \"Isso soa um pouco ambíguo...!\""
10011105-122 = "（E assim, o incidente foi resolvido...）"
10011105-123 = "（...mas antes disso, ainda havia uma última coisa a fazer）"
10011105-129 = "（Em um canto da Vila Cinematográfica, onde a brisa é agradável...）"
10011105-130 = "Hum hum hum~♪"
10011105-131 = "Nya-ha-ha, desta vez também foi bem divertido."
10011105-132 = "Essa é a minha impressão pessoal, mas..."
10011105-133 = "……E quanto ao Sensei?"
10011105-134 = "[s] \"Ah, boa noite.\""
10011105-136 = "Graças à cooperação do Schale, o evento de intercâmbio terminou sem problemas."
10011105-137 = "Agradeço pela sua ajuda~♪"
10011105-138 = "[s] \"De nada.\""
10011105-140 = "[ns] \"A propósito, posso entrar no assunto principal?\""
10011105-141 = "Ora, ora, eu pretendia fazer um quebra-gelo elegante... que pena que vamos direto ao ponto."
10011105-142 = "[s] \"Está correto dizer que tudo foi um plano da Niya?\""
10011105-143 = "Nossa, que direto. Parece que não precisamos nem de rodeios, não é?"
10011105-147 = "……A propósito, quais são as provas?"
10011105-148 = "[s] \"A forma como o Grupo Chimichanga agiu, sequestrando a Ibuki sabendo exatamente onde a segurança estava posicionada.\""
10011105-149 = "Entendo, de certa forma, você me valoriza bastante. Se o Yin-Yang fosse realmente eficiente na segurança, isso nunca teria acontecido..."
10011105-150 = "Ou seja, você quer dizer que, a menos que o \"Yin-Yang\" estivesse envolvido, tal coisa não deveria ter acontecido...?"
10011105-151 = "Nya-ha-ha..."
10011105-152 = "Nota dez, resposta correta~♪"
10011105-153 = "[s] \"Você não esconde nada, né.\""
10011105-155 = "Bem, não há necessidade de esconder, afinal."
10011105-156 = "Para começar, eu só queria ver o poder do \"Schale\" com meus próprios olhos."
10011105-157 = "……Clube de Pesquisa de Ninjutsu, era esse o nome?"
10011105-158 = "Bem, olhando de fora, elas pareciam ser crianças interessantes..."
10011105-160 = "Crianças que continuam se debatendo e entrando em pânico sem nem conseguir se tornar um clube oficial..."
10011105-161 = "Levar aquelas garotas com você e conseguir resgatar a verdadeira princesa..."
10011105-162 = "Eu previ que seria extremamente difícil, mas aquela habilidade..."
10011105-163 = "É exatamente como diziam os rumores, suponho."
10011105-164 = "Como esperado do Sensei do Schale, estou impressionada."
10011105-165 = "[s] \"...Entendi.\""
10011105-167 = "Por acaso, eu ofendi você?"
10011105-168 = "Você se sente mal por todos os culpados terem sido revelados?"
10011105-169 = "Ou talvez, depois de manipular tantas pessoas,"
10011105-170 = "você esteja pensando se é hora de rir e se divertir..."
10011105-171 = "Algo assim?"
10011105-172 = "[s] \"...Heh.\""
10011105-173 = "Sim, sim?"
10011105-174 = "[s] \"Hora da bronca.\""
10011105-178 = "...Hã?"
10011105-179 = "[s] \"Sente-se ali.\""
10011105-180 = "Err... Sensei?"
10011105-181 = "Eu mesma digo isso, mas, sabe, é uma questão de estética..."
10011105-182 = "Ei, eu acabei de fazer um movimento digno de um \"vilão clássico\", então, dar uma \"bronca\" agora não quebra um pouco o ritmo...?"
10011105-183 = "[s] \"Vai ser um pouco longo, mas aguente firme.\""
10011105-189 = "Ei, espere..."
10011105-190 = "Ei, Sensei!? Sua cara está assustadora...!?"
10011105-192 = "(E assim, embora o tumulto tenha se acalmado,)"
10011105-193 = "(alguns problemas ainda pareciam persistir.)"
10011105-194 = "Coração de Shinobi"
