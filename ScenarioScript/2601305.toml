[translation]
2601305-1 = "最後に撮ったもの"
2601305-2 = "（被写体探し中のアツコに連絡をもらい、お祭り会場へ向かった）"
2601305-4 = "こんにちは、先生。"
2601305-5 = "来てくれて、ありがとう。"
2601305-6 = "残りのバッテリーで何を撮るか、一人じゃ決められなくて。"
2601305-7 = "先生にアドバイスをもらいたかったの。"
2601305-8 = "[s1] \"うーん、何が良いかな……。\"\n[s2] \"……難しいね。\""
2601305-11 = "それなら、まずは会場を見て回るとか？"
2601305-12 = "歩いてるうちに、何か見つかるかもしれない。"
2601305-13 = "……どう、かな？"
2601305-14 = "[s] \"よし、そうと決まったら頑張るよ！\""
2601305-15 = "ふふ、私も頑張る。"
2601305-17 = "金魚すくい、今ならすぐできますよー！"
2601305-18 = "わあ、金魚がいっぱい。"
2601305-19 = "きれいだね、先生。"
2601305-20 = "[s] \"撮ってみる？\""
2601305-21 = "……ううん。#nもう少しほかのところも見ておきたい。"
2601305-22 = "行こう、先生。"
2601305-26 = "ヘルメット団のダンスステージが始まるぞ！"
2601305-27 = "私たちのパフォーマンスを見逃すなんて、もったいない！"
2601305-32 = "[ns] \"ダンスステージだってよ、アツコ！\""
2601305-33 = "バッテリーに余裕があったら、撮りたかったけど……。"
2601305-34 = "……最後の1枚かもしれないから。"
2601305-35 = "もっと良いシャッターチャンスを探したい。"
2601305-36 = "あっちに行ってみよう、先生。"
2601305-38 = "素敵な砂のお城があるよ。"
2601305-39 = "私の身長と同じくらい……すごい。"
2601305-40 = "……けど、これでもない。"
2601305-41 = "[s] \"それじゃあ、もう少し探そっか。\""
2601305-43 = "（その後も、最後の1枚に相応しいものを探し回ったが……）"
2601305-44 = "（納得のいくシャッターチャンスは見つからず……）"
2601305-46 = "……日が暮れちゃったね。"
2601305-47 = "結局、何を撮るか決められなかった。"
2601305-48 = "[s3] \"大丈夫だよ、夜もお祭りはやってるから！\"\n[s4] \"フラッシュを使えば撮れるよ！\""
2601305-51 = "……このカメラ、古いからフラッシュが壊れてるの。"
2601305-52 = "だから、もう何も……。"
2601305-53 = "……付き合ってもらったのに、ごめん。"
2601305-59 = "……あっ。"
2601305-64 = "花火……。"
2601305-65 = "[s] \"……本当だ、きれいだね。\""
2601305-66 = "花火のこと、すっかり忘れてた。"
2601305-67 = "……そうだ、これなら。"
2601305-72 = "[ns] \"最後の1枚は、花火にしたんだね。\""
2601305-73 = "えっ……う、うん。"
2601305-74 = "……ふふ、良い写真が撮れた。"
2601305-75 = "ありがとう、[ruby=・   ・]先生[/ruby]。"
2601305-79 = "[ns] \"私も見たいな。\""
2601305-80 = "……だ、ダメ。"
2601305-81 = "これは、私だけの宝物だから。"
2601305-82 = "けど……いつか、見せてあげるね。"
