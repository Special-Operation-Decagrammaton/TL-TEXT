[translation]
2601305-1 = "A última foto que tirei"
2601305-2 = "（Recebi uma mensagem da Atsuko enquanto ela procurava por um objeto para fotografar e fui até o local do festival）"
2601305-4 = "Olá, Sensei."
2601305-5 = "Obrigada por vir."
2601305-6 = "Não consigo decidir sozinha o que fotografar com o resto da bateria."
2601305-7 = "Eu queria pedir um conselho ao Sensei."
2601305-8 = "[s1] \"Hmm, o que seria bom...\"\n[s2] \"...É difícil, né.\""
2601305-11 = "Sendo assim, que tal dar uma volta pelo local primeiro?"
2601305-12 = "Enquanto caminhamos, talvez a gente encontre algo."
2601305-13 = "…O que acha?"
2601305-14 = "[s] \"Certo, decidido isso, vou dar o meu melhor!\""
2601305-15 = "Fufu, eu também vou dar o meu melhor."
2601305-17 = "Pescaria de peixinho dourado, pode começar agora mesmo!"
2601305-18 = "Uau, quantos peixinhos dourados."
2601305-19 = "É lindo, não é, Sensei?"
2601305-20 = "[s] \"Quer tirar uma foto?\""
2601305-21 = "…Não. #nQuero ver mais alguns lugares."
2601305-22 = "Vamos, Sensei."
2601305-26 = "O show de dança do Grupo Capacete vai começar!"
2601305-27 = "É um desperdício perder a nossa performance!"
2601305-32 = "[ns] \"É um show de dança, Atsuko!\""
2601305-33 = "Se eu tivesse bateria sobrando, eu gostaria de tirar uma foto, mas..."
2601305-34 = "…Pode ser a última foto."
2601305-35 = "Quero encontrar uma oportunidade de foto melhor."
2601305-36 = "Vamos para lá, Sensei."
2601305-38 = "Tem um castelo de areia maravilhoso ali."
2601305-39 = "É quase da minha altura... incrível."
2601305-40 = "…Mas não é isso também."
2601305-41 = "[s] \"Então, vamos procurar mais um pouco?\""
2601305-43 = "（Depois disso, continuamos procurando por algo digno de ser a última foto, mas...）"
2601305-44 = "（Não encontrei nenhuma oportunidade de foto que me convencesse...）"
2601305-46 = "…O sol já se pôs."
2601305-47 = "No fim, não consegui decidir o que fotografar."
2601305-48 = "[s3] \"Está tudo bem, o festival continua à noite!\"\n[s4] \"Você pode usar o flash!\""
2601305-51 = "…Esta câmera é antiga, então o flash está quebrado."
2601305-52 = "Por isso, não dá mais para..."
2601305-53 = "…Desculpe por ter te feito me acompanhar."
2601305-59 = "…Ah."
2601305-64 = "Fogos de artifício..."
2601305-65 = "[s] \"…É verdade, são lindos, né?\""
2601305-66 = "Eu tinha esquecido completamente dos fogos."
2601305-67 = "…Isso, pode ser isso."
2601305-72 = "[ns] \"Então você escolheu os fogos para a última foto.\""
2601305-73 = "Ah... s-sim."
2601305-74 = "…Fufu, consegui tirar uma boa foto."
2601305-75 = "Obrigada, Sensei."
2601305-79 = "[ns] \"Eu também quero ver.\""
2601305-80 = "…N-não."
2601305-81 = "Isso é um tesouro só meu."
2601305-82 = "Mas... um dia, eu te mostro."
