[translation]
2000503-1 = "Um desastre atrás do outro"
2000503-2 = "Interior do \"Crusader-chan\", equipamento do Clube de Estudos Suplementares"
2000503-4 = "A estrada por aqui está em más condições, então balança bastante, né."
2000503-5 = "Sensei, por favor, tome cuidado para não bater no corrimão acima."
2000503-6 = "Aquele corrimão ali tem algumas partes bem pontiagudas, então..."
2000503-7 = "Se fosse só para rasgar a roupa, tudo bem, mas é perigoso se você acabar se cortando nele."
2000503-8 = "[s] \"Sim, obrigado. Você também está de roupa de banho, Hifumi, tome cuidado.\""
2000503-9 = "S-sim, obrigada. Normalmente eu não andaria assim, mas... é que estamos indo para a praia, sabe."
2000503-10 = "Além disso, disseram que onde vamos não tem lugar para se trocar."
2000503-11 = "E acima de tudo, eu queria pular no mar assim que chegássemos, então já vim vestida!"
2000503-12 = "[s] \"Estar de roupa de banho dentro de um tanque é uma situação bem inusitada.\""
2000503-13 = "É, verdade... Ouvindo o sensei dizer isso, de repente me sinto muito envergonhada..."
2000503-14 = "Mas, do lado de fora do tanque, quase não dá para ver nada..."
2000503-15 = "E se for para o sensei, na verdade, é que...!"
2000503-16 = "Bem... v-vamos aumentar um pouco a velocidade?"
2000503-19 = "Ah, parece que chegamos!"
2000503-20 = "Sensei, vamos sair!"
2000503-24 = "Praia de Mui"
2000503-25 = "É o mar~~!"
2000503-26 = "[s] \"É o maaaaaar!!!!\""
2000503-27 = "Fufu, quando se fala em mar, a gente tem que dizer isso, né."
2000503-28 = "Eu adoraria pular logo na água, mas..."
2000503-29 = "Primeiro, vamos estacionar o tanque. Sensei, pode colocar o calço nas rodas?"
2000503-30 = "[s] \"Sim, pode deixar.\""
2000503-36 = "[ns] \"OK, tudo bem.\""
2000503-37 = "Obrigada! Eu também vou..."
2000503-39 = "Eita..."
2000503-40 = "...Hã? Acabei de ouvir um barulho estranho...!"
2000503-41 = "Aaaah!?"
2000503-45 = "[ns] \"O que houve?\""
2000503-49 = "É que... a minha roupa de banho, ela..."
2000503-50 = "[s] \"...Roupa de banho?\""
2000503-51 = "Ela prendeu no corrimão do tanque e, bem, rasgou..."
2000503-52 = "[ns] \"Sua roupa de banho rasgou!?\""
2000503-53 = "Ah, aaah!? P-por favor, não fale tão alto!"
2000503-54 = "O-o que eu faço, sensei!? Não posso sair daqui desse jeito...!"
2000503-55 = "Como eu já vim vestida, não trouxe nenhuma muda de roupa..."
2000503-56 = "[s] \"Quer que eu tente encontrar algo em alguma loja por aqui?\""
2000503-57 = "Mas não tem nem lojas de conveniência por perto..."
2000503-58 = "N-não tem jeito, teremos que voltar com o tanque...!"
2000503-62 = "[ns] \"Espere! O calço ainda está...!\""
2000503-65 = "A-ah? Será que a esteira do tanque...?"
2000503-67 = "..."
2000503-68 = "Sensei, você sabe consertar esteiras de tanque...?"
2000503-69 = "[s1] \"Eu não tenho essa habilidade...\"\n[s2] \"Vou buscar as coisas da Hifumi, pode esperar aqui?\""
2000503-70 = "Desculpe, se puder buscar minhas roupas... por favor..."
2000503-71 = "Desculpe, se puder buscar minhas roupas... por favor..."
2000503-73 = "No fim, caminhei por quase uma hora para buscar o uniforme da Hifumi."
2000503-74 = "No caminho, acabei sendo parado em uma blitz por estar carregando um uniforme..."
