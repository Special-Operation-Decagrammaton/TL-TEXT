[translation]
2000503-1 = "踏んだり蹴ったり破れたり"
2000503-2 = "補習授業部の備品「クルセイダーちゃん」内部"
2000503-4 = "この辺は道路の状態が悪くて、結構揺れますね。"
2000503-5 = "先生、上の手すりにぶつからないよう気をつけてください。"
2000503-6 = "そこの手すり、結構尖ってる部分もあるので……。"
2000503-7 = "服が引っ掛かって破れてしまうのならまだしも、当たって傷になってしまったりすると危ないですし。"
2000503-8 = "[s] \"うん、ありがとう。ヒフミも水着だし、気を付けてね。\""
2000503-9 = "は、はい、ありがとうございます。普段は流石にこんな状態では乗らないのですが……今回はその、海に向かってるということもありますし。"
2000503-10 = "それに、今から行くところは周りに着替える場所も無いそうでして。"
2000503-11 = "何より、着いたらすぐにそのまま早く海に飛び込みたいので、先に着替えてきちゃいました！"
2000503-12 = "[s] \"水着で戦車って、中々すごい状態だね。\""
2000503-13 = "た、確かに……先生にそう言われると、何だか今さら急に恥ずかしくなってきました……。"
2000503-14 = "ですが、戦車の外からはほとんど見えませんし……。"
2000503-15 = "せ、先生にでしたらむしろ、その……！"
2000503-16 = "えっと……も、もう少しスピードを出しましょうか？"
2000503-19 = "あっ、着いたみたいです！"
2000503-20 = "先生、外に出てみましょう！"
2000503-24 = "無為ヶ浜"
2000503-25 = "海だ～～！"
2000503-26 = "[s] \"海だーーーーー！！！！\""
2000503-27 = "ふふ、やっぱり海といえば、これは言っておかないとですね。"
2000503-28 = "早速飛び込みたい気持ちもやまやまなのですが……"
2000503-29 = "まず戦車を止めましょうか。先生、車止めの設置をお願いできますか？"
2000503-30 = "[s] \"うん、任せて。\""
2000503-36 = "[ns] \"OK、良いよ。\""
2000503-37 = "ありがとうございます！私も、"
2000503-39 = "よいしょ……"
2000503-40 = "……え？今、何か嫌な音が……！"
2000503-41 = "きゃぁっ！？"
2000503-45 = "[ns] \"どうしたの？\""
2000503-49 = "その、み、水着がちょっと……。"
2000503-50 = "[s] \"……水着？\""
2000503-51 = "戦車の手すりに引っかかってその、ビリっと……。"
2000503-52 = "[ns] \"水着、破れちゃったの！？\""
2000503-53 = "わっ、わあっ！？お、大きな声で言わないでください！"
2000503-54 = "ど、どうしましょう先生！？このままでは外に出られません……！"
2000503-55 = "そのまま着てきてしまったせいで、着替えも無いですし……。"
2000503-56 = "[s] \"その辺のお店で、てきとうに見繕ってこようか？\""
2000503-57 = "ですが、この辺にはコンビニすら無いですし……。"
2000503-58 = "し、仕方ありません、もう一度戦車で戻るしか……！"
2000503-62 = "[ns] \"待って！まだ車止めが……！\""
2000503-65 = "あ、あれっ？もしかして、戦車の履帯が……？"
2000503-67 = "……。"
2000503-68 = "先生、履帯って直せたりしますか……？"
2000503-69 = "[s1] \"ちょっとその技術は持ってないな……。\"\n[s2] \"ヒフミの荷物を取ってくるから、待っててくれる？\""
2000503-70 = "すみません、服、取ってきていただけますと……お願いします……。"
2000503-71 = "すみません、服、取ってきていただけますと……お願いします……。"
2000503-73 = "結局一時間近く歩いて、ヒフミの制服を取ってきた。"
2000503-74 = "途中、制服を持ち歩いていたせいで検問に引っ掛かってしまった……。"
