[translation]
1014305-1 = "Overwriting Memories"
1014305-3 = "[ns] \"…….\""
1014305-5 = "Sensei? I-is something the matter……?"
1014305-6 = "[s] \"Really…… doing the exact same thing as yesterday?\""
1014305-7 = "I-is it, perhaps…… a bother to you……?"
1014305-8 = "To think that we would go to the same place again, just to overwrite the memories of yesterday……."
1014305-9 = "[s1] \"That's not true at all!\"\n[s2] \"I just thought you might not be bored since it's the second time…….\""
1014305-12 = "No. That is not the case."
1014305-13 = "Because what I feel now that I am \"grown up\" is different from how I felt when I was \"young.\""
1014305-14 = "Oh…… Even if I feel that way, it must be boring for you, Sensei……?"
1014305-15 = "[s3] \"I-I'm looking forward to it!\"\n[s4] \"Because I'm with Shun today!\""
1014305-18 = "……."
1014305-19 = "Thank you for saying that."
1014305-20 = "Then, I look forward to spending the day with you."
1014305-25 = "Let's begin our fun rafting trip! I will now explain the safety precautions."
1014305-29 = "Let's head out, then!"
1014305-30 = "I look forward to it."
1014305-34 = "On the right, there is a rock with a large hole in it, isn't there?"
1014305-35 = "Um…… it looks like a water buffalo, so is it called \"Water Buffalo Rock\"?"
1014305-37 = "Oh my, how sharp! Did you already know about it? Thank you."
1014305-38 = "To your companion: I'm envious that you're with such a knowledgeable woman!"
1014305-39 = "E-eh!? Um, that is……!"
1014305-42 = "The waves are rough today, so please hold on tight!"
1014305-44 = "[ns] \"A-ah!?\""
1014305-45 = "Sensei!?"
1014305-56 = "Please hold on to each other tightly until we get past these rapids!"
1014305-57 = " H-hold on, she says."
1014305-58 = "……."
1014305-59 = "Come now…… don't be shy, please hold on tight."
1014305-60 = "[s] \"O-okay……!\""
1014305-62 = "That concludes today's rafting trip!"
1014305-66 = "Thank you very much!"
1014305-67 = "……."
1014305-68 = "H-how was it?"
1014305-69 = "Was it a new experience…… different from yesterday?"
1014305-70 = "I…… feel that it was."
1014305-71 = "[s] \"I-I think it was a new experience too!\""
1014305-72 = "I'm glad……."
1014305-73 = "Then! Shall we head to the shopping district now?"
1014305-76 = "Since the first thing we ate yesterday was skewers, today……."
1014305-77 = "……."
1014305-78 = "Um…… Sensei."
1014305-79 = "Today…… instead of as a guardian, would you walk with me as my travel partner?"
1014305-80 = "[s] \"Hm? Understood, let's do that.\""
1014305-81 = "Thank you, Sensei. Then……."
1014305-86 = "(Shun suddenly and casually linked her arm with mine……!)"
1014305-87 = "……This is okay, right? Because today, I am your partner……."
1014305-88 = "Hehe……."
1014305-89 = "Once again, thank you, Sensei."
1014305-91 = "(I strolled leisurely through the town with Shun.)"
1014305-92 = "(I got hungry along the way, so we had a meal at a restaurant on the street……)"
1014305-99 = "Thank you for letting me rely on you both yesterday and today."
1014305-100 = "[s] \"Thank you, too.\""
1014305-101 = "Hehe, I'm honored that you feel that way."
1014305-102 = "……."
1014305-103 = "I had a strange experience today."
1014305-104 = "[s] \"A strange experience?\""
1014305-105 = "Yesterday and today…… the situation was almost the same, but……."
1014305-106 = "My actions were a little different."
1014305-107 = "It might sound strange coming from me, but…… I think I behaved more like an \"adult\" than I did yesterday."
1014305-108 = "At the same time, I remembered my younger self, so……."
1014305-109 = "Somehow……."
1014305-110 = "Even though the mountains and rivers are the same, I felt like only I had changed."
1014305-111 = "[s] \"Mountains and rivers change slowly, too.\""
1014305-112 = "That's true. But that takes an incredibly long amount of time."
1014305-113 = "I'll have many experiences from here on out and eventually become an adult, but……."
1014305-114 = "I found myself wondering if I could ever become a \"proper adult\" like you, Sensei."
1014305-115 = "Eh? No, I'm not overestimating you."
1014305-116 = "[s] \"They say adults have three children living inside their hearts.\""
1014305-117 = "T-the fact that the number is so specific actually resonates with me……."
1014305-118 = "Do people, in the end, always keep a young heart?"
1014305-119 = "Hehe……."
1014305-120 = "If that's the case, then that means there's a mischievous child hiding inside you too, Sensei?"
1014305-121 = "[s5] \"Big Sister Shun! Let's play together!\"\n[s6] \"Hey, hey, play with me!\""
1014305-124 = "S-Sensei!?"
1014305-125 = "……."
1014305-126 = "Come here, [USERNAME]. Let's play together, shall we?"
1014305-127 = "[s7] \"Big Sister Shun, thank you!\"\n[s8] \"Yay! Big Sister Shun is so kind!\""
1014305-130 = "Yes. Let's play a lot together."
1014305-133 = "(The next moment, my vision was filled with Shun's softness……!)"
1014305-137 = "[ns] \"！？！？\""
1014305-139 = "Shh. You're such a good child, [USERNAME]."
1014305-140 = "You don't have to think about anything."
1014305-141 = "Just for now……."
1014305-145 = "[ns] \"…….\""
1014305-146 = "……."
1014305-147 = "[s] \"…….\""
1014305-148 = "……."
1014305-149 = "……S-Sensei……? Please say something……!"
1014305-150 = "……."
1014305-151 = "[s] \"……I-I'm sorry. I got caught up in the atmosphere……\""
1014305-152 = "N-no! It was me who……."
1014305-153 = "It didn't feel bad at all…… In fact, it was quite nice…… If I had to be greedy, I would have wanted it to last longer……."
1014305-154 = "A-ahem!"
1014305-155 = "Summer canyons are truly terrifying!"
1014305-156 = "[s] \"Y-you're right! They really are!\""
1014305-157 = "So let's just blame everything that just happened on the summer canyon!"
1014305-159 = "(I nodded in fierce agreement!)"
1014305-164 = "……."
1014305-165 = "Fufufu……!"
1014305-166 = "What's wrong, Sensei? You have such a look on your face."
1014305-167 = "Eh? Do I look different than usual, too?"
1014305-168 = "……."
1014305-169 = "Hehe, this is also…… the summer canyon's fault."
1014305-171 = "(I laughed with Shun until the awkwardness faded away.)"
1014305-173 = "By the way, Sensei?"
1014305-174 = "About yesterday and today……."
1014305-175 = "Which do you like better, the younger me or the current me?"
1014305-176 = "[ns] \"……!\""
1014305-178 = "[ns] \"B-both are the same Shun to me, so……!\""
1014305-179 = "……That won't do."
1014305-184 = "I cannot accept such a \"Sensei-like\" answer this time!"
1014305-186 = "(I managed to dodge Shun's persistent questioning and returned to our lodging……)"