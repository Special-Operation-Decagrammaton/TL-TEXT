[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
1014305-1 = "Sobrescrevendo as Memórias"
1014305-3 = "[ns] \"......\""
1014305-5 = "Sensei? A-Aconteceu alguma coisa...?"
1014305-6 = "[s] \"É que... vamos realmente fazer a mesma coisa de ontem?\""
1014305-7 = "Como eu imaginei... Fazer algo assim é muito incômodo e frustrante... não é?"
1014305-8 = "Retornar aos exatos mesmos lugares apenas para que eu possa sobrescrever as memórias vergonhosas que deixei lá ontem... Sou tão patética..."
1014305-9 = "[s1] \"Não diga isso, você não é patética de forma alguma!\"\n[s2] \"Estou apenas preocupado que você acabe achando tudo isso muito monótono por ser a nossa segunda vez aqui.\""
1014305-12 = "De jeito nenhum. Eu juro que não acharei isso."
1014305-13 = "Afinal, o que sentimos quando somos \"crianças\" é completamente distinto daquilo que enxergamos e absorvemos quando nos tornamos 'adultos'."
1014305-14 = "Ah... Isso vale apenas para mim, não é verdade? Tenho certeza de que, para você, Sensei, refazer os mesmos passos não passa de algo maçante..."
1014305-15 = "[s3] \"I-Imagina, eu estou muito empolgado com o passeio de hoje!\"\n[s4] \"Porque hoje a minha companhia é a 'Shun'!\""
1014305-18 = "......"
1014305-19 = "Saber disso me conforta profundamente. Muito obrigada."
1014305-20 = "Nesse caso, por favor, cuide bem de mim no dia de hoje."
1014305-25 = "Estamos prestes a iniciar a nossa experiência com o rafting! Prestarei agora alguns esclarecimentos e avisos que vocês devem seguir com rigor."
1014305-29 = "Então, vamos zarpar!"
1014305-30 = "Estaremos sob os seus cuidados."
1014305-34 = "Estão vendo aquela rocha imponente com um grande buraco do nosso lado direito?"
1014305-35 = "Ahn... Ela se parece com um búfalo da água, então seria a \"Rocha do Búfalo\"?"
1014305-37 = "Oho~ que percepção afiada! Ou quem sabe a senhorita já tinha conhecimento prévio? De qualquer modo, está corretíssima, muito obrigado."
1014305-38 = "Senhor passageiro, não posso deixar de expressar uma pontinha de inveja por estar tão bem acompanhado de uma dama de tão vasto conhecimento e intelecto!"
1014305-39 = "E-Eh!? E-Eu, isso... ahn...!"
1014305-42 = "As ondas hoje estão agitadíssimas, portanto, agarrem-se com força para não caírem!"
1014305-44 = "[ns] \"Ah, uwaaah!?\""
1014305-45 = "Sensei!?"
1014305-56 = "Até atravessarmos essa corredeira furiosa, segurem-se firme um no outro, e não soltem de maneira nenhuma!"
1014305-57 = "A g-guia pediu expressamente que nos segurássemos...!"
1014305-58 = "......"
1014305-59 = "Por favor... não se sinta tímido, Sensei. Pode me abraçar com quanta força desejar."
1014305-60 = "[s] \"T-Tudo bem... eu vou segurar forte!\""
1014305-62 = "E com isso concluímos a nossa aventura de rafting de hoje!"
1014305-66 = "Muito obrigada pelos seus excelentes serviços!"
1014305-67 = "......"
1014305-68 = "E-E então, qual foi a sua impressão?"
1014305-69 = "Isso tudo lhe trouxe uma experiência nova... muito diferente da vivida ontem?"
1014305-70 = "Eu... sinto no fundo do meu coração que sim."
1014305-71 = "[s] \"P-Pra mim também... foi uma experiência totalmente nova e incrível!\""
1014305-72 = "Fico muito aliviada em ouvir isso..."
1014305-73 = "Pois bem! Gostaria de irmos até a rua de comércio e darmos uma volta pelas barraquinhas agora?"
1014305-76 = "Como você se deliciou com os espetinhos ontem, hoje o que você acha de..."
1014305-77 = "......"
1014305-78 = "Com licença... Sensei."
1014305-79 = "Apenas por hoje... Você se importaria de não agir como um mero responsável e protetor de uma aluna infantil e inocente, #nmas sim caminhar ao meu lado como o meu verdadeiro parceiro nesta viagem?"
1014305-80 = "[s] \"Hmm? Eu adoraria.\""
1014305-81 = "Obrigada, Sensei. Sendo assim..."
1014305-86 = "(A Shun deu um passo tímido e, num gesto doce e repentino, enlaçou seu braço no meu...!)"
1014305-87 = "......Não há nenhum problema em andarmos colados assim, há? Afinal, hoje nós somos... p-p-p-parceiros."
1014305-88 = "Fufu..."
1014305-89 = "Mais uma vez, os meus mais sinceros agradecimentos, Sensei."
1014305-91 = "(Demos uma volta agradável e sossegada pelas barracas, abraçadinhos como dois namorados)"
1014305-92 = "(Aproveitamos as delícias locais em restaurantes pelo caminho, sentindo a tranquilidade do lugar invadir as nossas almas...)"
1014305-99 = "Você foi maravilhosamente atencioso e gentil comigo ontem e hoje. Eu não tenho palavras para demonstrar toda a minha gratidão."
1014305-100 = "[s] \"Eu é quem deveria te agradecer por momentos tão doces.\""
1014305-101 = "Fufu, ouvir isso de você enche o meu peito de alegria e honra."
1014305-102 = "......"
1014305-103 = "No entanto, sinto que o dia de hoje me trouxe descobertas muito intrigantes."
1014305-104 = "[s] \"Descobertas intrigantes?\""
1014305-105 = "Como você sabe... as situações que vivenciamos hoje foram quase idênticas às de ontem..."
1014305-106 = "Mas a maneira como agimos e percebemos essas mesmas situações foram fundamentalmente diferentes."
1014305-107 = "Sei que pode parecer muito pretensioso da minha parte mas... #nEu creio que me portei com muito mais elegância e postura de \"adulta\" hoje se comparado com as minhas atitudes de ontem."
1014305-108 = "Por outro lado... a pureza dos meus anos de infância também floresceu viva nas minhas lembranças... "
1014305-109 = "Tudo isso me fez perceber algo peculiar..."
1014305-110 = "Mesmo que as montanhas e os rios tenham se mantido absolutamente imutáveis desde ontem, eu fui a única que passou por uma metamorfose ali."
1014305-111 = "[s] \"Apesar de parecerem congelados no tempo, até os rios e as montanhas seguem mudando devagarzinho a cada dia, sabia?\""
1014305-112 = "Isso é verdade. Mas as mudanças deles demandam eras e eras para se tornarem reais."
1014305-113 = "Eu sei que... daqui por diante, passarei por uma miríade de experiências que lapidarão a minha alma até que eu me torne uma verdadeira adulta, mas..."
1014305-114 = "Não consigo evitar o medo de me perguntar se... serei capaz de um dia amadurecer e me tornar alguém tão responsável e gentil como o Sensei..."
1014305-115 = "Eh? Imagina, eu jamais lhe dedicaria elogios além daqueles que você já provou ser digno de merecer."
1014305-116 = "[s] \"Tem uma brincadeira entre as pessoas mais velhas que diz... que dentro de cada adulto de sucesso escondem-se três crianças encarregadas das emoções, sabia disso?\""
1014305-117 = "É mesmo... O fato de existir um número tão específico me fez levar essa história muito mais a sério e refletir a fundo..."
1014305-118 = "Será que, no fim das contas, independente da maturidade que alcançamos, carregaremos um coração infantil enjaulado nos nossos peitos pelo resto de nossas vidas?"
1014305-119 = "Fufu..."
1014305-120 = "Caso essa afirmação seja verídica, então... isso nos leva a deduzir que existe uma criança travessa adormecida no seu íntimo, não é mesmo, Sensei?"
1014305-121 = "[s5] \"Irmãzona Shun! A gente também quer brincar muito com você!\"\n[s6] \"Tia Shun, por favor, vem brincar com a gente!\""
1014305-124 = "S-Sensei!?"
1014305-125 = "......"
1014305-126 = "Ora, mas é claro, venha até aqui e achegue-se aos meus braços, pequena [USERNAME]. O que acha de nos divertirmos juntas agora?"
1014305-127 = "[s7] \"Obrigado, Irmãzona Shun! Você é a melhor!\"\n[s8] \"Ebaaaa! A Irmãzona Shun é tão doce e boazinha com a gente!\""
1014305-130 = "Isso, isso. Vamos brincar de montão e ser muito felizes juntinhas, sim?"
1014305-133 = "(No instante seguinte, tudo o que meus olhos conseguiam alcançar foi inundado pela maciez suave e o volume imenso e gentil da Shun...!)"
1014305-137 = "[ns] \"!?!?!?!?!?\""
1014305-139 = "Xiuu. Que garotinha mais fofa e comportada você é, [USERNAME]."
1014305-140 = "Não há motivo para deixar sua cabecinha ansiosa com pensamentos complicados agora, tudo bem?"
1014305-141 = "Apenas se entregue aos meus braços e me deixe mimar você enquanto durar esse instante mágico..."
1014305-145 = "[ns] \"......\""
1014305-146 = "......"
1014305-147 = "[s] \"......\""
1014305-148 = "......"
1014305-149 = "......S-S-Sensei...? Por favor, tire-me deste suplício de silêncio e diga alguma coisa...!"
1014305-150 = "......"
1014305-151 = "[s] \"...M-Me perdoe por isso. A atmosfera inebriante desse lugar acabou roubando a minha sanidade...\""
1014305-152 = "N-Não precisa se desculpar! É que os meus instintos acabaram reagindo sozinhos... "
1014305-153 = "Além do mais, a sensação de segurá-lo e afagá-lo contra o meu corpo não foi nem um pouco desagradável... E sendo muito honesta, eu diria que me trouxe muito conforto e calor... #nSe me for permitido pedir demais, confessaria que... eu desejava poder ter afofado você no meu colo por muito mais tempo..."
1014305-154 = "A-Ahem!"
1014305-155 = "Esse desfiladeiro de verão exerce uma força verdadeiramente estarrecedora e perigosa sobre as nossas mentes, não concorda!?"
1014305-156 = "[s] \"I-Isso mesmo! O calor mexe com as pessoas!\""
1014305-157 = "Portanto, tudo aquilo de que fomos vítimas e dissemos neste instante, repousará inteiramente sobre os ombros desse desfiladeiro de verão e nunca mais falaremos a respeito!"
1014305-159 = "(Balancei a cabeça e acenei furiosamente em aprovação total àquela sugestão!)"
1014305-164 = "......"
1014305-165 = "Fufufu...!"
1014305-166 = "O que foi, Sensei? Por que está fazendo essa cara tão estranha e perplexa?"
1014305-167 = "Eh? O meu comportamento também parece ter escapado à normalidade aos seus olhos?"
1014305-168 = "......"
1014305-169 = "Fufu, eu lhe afirmo com certeza absoluta de que isso também... é obra do poder incontrolável deste desfiladeiro de verão."
1014305-171 = "(Abracei os risos calorosos e suaves da Shun debaixo do céu de fim de tarde, até que toda a estranheza incômoda tivesse evaporado dos nossos corpos e derretido nos nossos corações)"
1014305-173 = "Por falar nisso, Sensei..."
1014305-174 = "Comparando os acontecimentos dos passeios de ontem e de hoje..."
1014305-175 = "Entre a minha forma pequenina e a mulher que está abraçando você neste momento, de qual das duas você gosta mais?"
1014305-176 = "[ns] \"......!\""
1014305-178 = "[ns] \"Q-Qualquer uma das duas é a mesma Shun para mim, as duas formas são incrivelmente preciosas pra mim...!\""
1014305-179 = "......Eu não deixarei você escapar com isso."
1014305-184 = "Uma reposta típica \"de um Sensei fugindo da pergunta\", eu proíbo que o Sensei utilize essa tática esquiva desta vez!"
1014305-186 = "(Tive que usar cada pingo de criatividade no meu cérebro para desviar das perguntas incansáveis da Shun que não queria desistir, até que finalmente alcançamos a porta da pousada...)"