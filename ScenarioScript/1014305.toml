[translation]
1014305-1 = "思い出の上書き"
1014305-3 = "[ns] \"……。\""
1014305-5 = "先生？ど、どうかしましたか……？"
1014305-6 = "[s] \"本当に……昨日と同じことを？\""
1014305-7 = "や、やはり……迷惑、でしょうか……？"
1014305-8 = "昨日の記憶を上書きするために、もう一度同じ場所に行こう……だなんて……。"
1014305-9 = "[s1] \"そんなことはないよ！\"\n[s2] \"二回目だから、退屈しないかと思って……。\""
1014305-12 = "いいえ。そんなことはありません。"
1014305-13 = "「幼い頃」と「大きくなってから」では感じるものが違いますから。"
1014305-14 = "あ……。私はそうでも、先生はつまらないですよね……？"
1014305-15 = "[s3] \"わ、私は楽しみだよ！\"\n[s4] \"今日は「シュン」と一緒だから！\""
1014305-18 = "……。"
1014305-19 = "そう言ってくださり、ありがとうございます。"
1014305-20 = "では、今日一日よろしくお願いしますね。"
1014305-25 = "楽しいラフティングを始めます！今から注意事項をお話ししますね。"
1014305-29 = "では出発しましょう！"
1014305-30 = "よろしくお願いします。"
1014305-34 = "右側に、大きな穴の開いた岩がありますよね？"
1014305-35 = "えっと……水牛みたいな形なので、「水牛岩」ですか？"
1014305-37 = "おお～鋭い！それともご存知でしたか？ありがとうございます。"
1014305-38 = "お連れの方、こんな博識な女性とご一緒とは羨ましいですね！"
1014305-39 = "え、え！？あの、その……！"
1014305-42 = "今日は波が荒いですから、しっかりつかまってください！"
1014305-44 = "[ns] \"あ、ああ！？\""
1014305-45 = "先生！？"
1014305-56 = "この急流を越えるまで、お互いにしっかりつかまっていてください！"
1014305-57 = " つ、つかまって、だそうです。"
1014305-58 = "……。"
1014305-59 = "ほら……遠慮なさらず、ぎゅっとお願いします。"
1014305-60 = "[s] \"う、うん……！\""
1014305-62 = "これで本日のラフティングは終了です！"
1014305-66 = "ありがとうございました！"
1014305-67 = "……。"
1014305-68 = "い、いかがでしたか？"
1014305-69 = "昨日とは違う……新しい経験になりましたか？"
1014305-70 = "私は……そんな気がします。"
1014305-71 = "[s] \"わ、私も……新しい経験だったよ！\""
1014305-72 = "良かったです……。"
1014305-73 = "では！これから商店街に行ってみましょうか？"
1014305-76 = "昨日最初に食べたものが串焼きでしたから、今日は……。"
1014305-77 = "……。"
1014305-78 = "あの……先生。"
1014305-79 = "今日は……保護者としてではなく、#n私の、旅のパートナーとして一緒に歩いてくれますか？"
1014305-80 = "[s] \"ん？分かった、そうしようか。\""
1014305-81 = "ありがとうございます、先生。それでは……。"
1014305-86 = "（シュンが突然、さりげなく腕を組んできた……！）"
1014305-87 = "……いい、ですよね？今日は[ruby=・]パ[/ruby][ruby=・]ー[/ruby][ruby=・]ト[/ruby][ruby=・]ナ[/ruby][ruby=・]ー[/ruby]……ですから。"
1014305-88 = "ふふ……。"
1014305-89 = "改めて、ありがとうございます。先生。"
1014305-91 = "（シュンと一緒に、のんびりと街を回った）"
1014305-92 = "（途中でお腹が空いたので、道中の飲食店で食事をした……）"
1014305-99 = "昨日も今日も甘えさせていただき、ありがとうございます。"
1014305-100 = "[s] \"こちらこそ、ありがとうね。\""
1014305-101 = "ふふ、そう思っていただけるなんて光栄です。"
1014305-102 = "……。"
1014305-103 = "今日は不思議な経験ができました。"
1014305-104 = "[s] \"不思議な経験？\""
1014305-105 = "昨日と今日……状況はほとんど同じでしたが……。"
1014305-106 = "行動は少し違いました。"
1014305-107 = "自分で言うのもなんですが……。#n昨日よりも「大人」の振る舞いをしていたと思うんです。"
1014305-108 = "同時に、幼い頃の自分も思い出したので……。"
1014305-109 = "なんだか……。"
1014305-110 = "山や川はそのままなのに、私だけが変わったように感じました。"
1014305-111 = "[s] \"山と川もゆっくりと変わるものだよ。\""
1014305-112 = "そうですね。でもそれは、本当に途方もない時間をかけてです。"
1014305-113 = "私もこれからいろんな経験をして、いつか大人になるのでしょうが……。"
1014305-114 = "先生のような「ちゃんとした大人」になれるのかな、と思ってしまいました。"
1014305-115 = "え？そんな、過大評価なんてしていません。"
1014305-116 = "[s] \"大人は……心の中に子供の自分が三人はいるらしいよ。\""
1014305-117 = "す、数字が具体的なのが、逆に心に響きますね……。"
1014305-118 = "人は結局、いつまでも幼い心を持っているのでしょうか？"
1014305-119 = "ふふ……。"
1014305-120 = "でしたら、先生の中にも……いたずらっ子が隠れているってことですね？"
1014305-121 = "[s5] \"シュンお姉ちゃん！一緒に遊ぼうよ！\"\n[s6] \"ねぇねぇ、遊んで！\""
1014305-124 = "せ、先生！？"
1014305-125 = "……。"
1014305-126 = "さあ、こっちにいらっしゃい。[USERNAME]ちゃん。一緒に遊びましょう？"
1014305-127 = "[s7] \"シュンお姉ちゃん、ありがとう！”\n[s8] \"わ～い！シュンおねえちゃん、やさしい！\""
1014305-130 = "はい。一緒にいっぱい遊びましょうね。"
1014305-133 = "（次の瞬間、目の前がシュンの柔らかさでいっぱいになった……！）"
1014305-137 = "[ns] \"！？！？\""
1014305-139 = "しーっ。いい子ですね、[USERNAME]ちゃん。"
1014305-140 = "なにも、考えなくていいんですよ。"
1014305-141 = "今だけは……。"
1014305-145 = "[ns] \"……。\""
1014305-146 = "……。"
1014305-147 = "[s] \"……。\""
1014305-148 = "……。"
1014305-149 = "……せ、先生……？何かおっしゃってください……！"
1014305-150 = "……。"
1014305-151 = "[s] \"……ご、ごめん。雰囲気に呑まれて……\""
1014305-152 = "い、いえ！私のほうが……。"
1014305-153 = "悪い気はしませんでしたし……。むしろ良かったというか……。#n欲を言えば、もっとしていたかったというか……。"
1014305-154 = "こ、コホンッ！"
1014305-155 = "夏の渓谷というのは！恐ろしいですね！"
1014305-156 = "[s] \"そ、そうだね！本当に！\""
1014305-157 = "ですから先ほどのことは、全て夏の渓谷のせいにしましょう！"
1014305-159 = "（激しく賛成してうなずいた！）"
1014305-164 = "……。"
1014305-165 = "ふふふっ……！"
1014305-166 = "どうしたんですか、先生？そんな顔をされて。"
1014305-167 = "え？私も普段と違うように見えますか？"
1014305-168 = "……。"
1014305-169 = "ふふっ、これも……夏の渓谷のせいですね。"
1014305-171 = "（シュンと一緒に、気まずさがなくなるまで笑った）"
1014305-173 = "ところで、先生？"
1014305-174 = "昨日と今日のことですが……。"
1014305-175 = "幼い私と今の私、どちらがお好きですか？"
1014305-176 = "[ns] \"……！\""
1014305-178 = "[ns] \"ど、どっちも先生にとっては同じシュンだから……！\""
1014305-179 = "……ダメです。"
1014305-184 = "そのような「先生らしい」お答え、今回は受け付けられません！"
1014305-186 = "（尚も食い下がるシュンをどうにかごまかして、宿泊先に帰った……）"
