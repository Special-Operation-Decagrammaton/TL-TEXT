[translation]
41085-2 = "Tsc. Onde essas ratazanas foram parar……?"
41085-3 = "Elas não podem ter ido longe…… Penteiem essa área!"
41085-8 = "Eu já disse que a gente não é ratazana, seu babaca!"
41085-9 = "Saki, segura a emoção. Vão descobrir a gente."
41085-13 = "Aqui é RABBIT 1 para Acampamento RABBIT. Chegamos no Ponto Echo. A \"Cenoura\" está assegurada. Zero baixas até o momento, mas……"
41085-14 = "Depois daquela troca de tiro agora há pouco, a nossa rota de fuga original foi pro ralo."
41085-15 = "Fora que pingou reforço inimigo no radar……"
41085-17 = "Eu já sabia que ia dar ruim quando colocaram a Saki de líder."
41085-18 = "A Saki é o terror da teoria, mas na prática, é só ladeira abaixo."
41085-19 = "Cala a boca! Tu também só faz besteira nas simulações reais, Moe!"
41085-20 = "Droga, onde foi que eu errei nos cálculos……?"
41085-21 = "[s] \"A vida real quase nunca segue o roteiro, né……\""
41085-22 = "Tsc, era a minha chance de ouro de mostrar que a SRT é elite…… e eu passo essa vergonha na frente da Schale……"
41085-24 = "……Aí, cadê a Miyu?"
41085-25 = "Ué, ela não tá grudada em você? O pontinho dela no GPS tá quase em cima do seu."
41085-27 = "Não me diga que……"
41085-31 = "Aquela anta……!"
41085-32 = "Ela deixou o rádio dentro da minha mochila!"
41085-33 = "Ela deve ter entrado em pânico na hora do tiroteio."
41085-34 = "Se ela correu daqui sozinha……"
41085-35 = "Provavelmente foi pro guindaste do Bloco B."
41085-36 = "Bloco B……? Aquela área ali tá entupida de segurança, cê viu?!"
41085-37 = "E não tem nenhuma cobertura por perto. Se ela tentar descer de lá sozinha, vai virar peneira……"
41085-38 = "……Saki, qual a call?"
41085-39 = "Qual a call? A gente tem que tirar ela de lá, ué."
41085-40 = "Mas pra isso, a gente vai ter que largar o tambor. Ninguém troca tiro no meio do fogo cruzado carregando um tambor de aço nas costas……"
41085-41 = "Concordo. Dói no peito, mas a \"Cenoura\" fica pra trás. A prioridade é resgatar a nossa franco-atiradora."
41085-42 = "O enxame de inimigo lá é grande…… é melhor a gente se preparar pro pior."
41085-46 = "……Sensei?"
41085-47 = "Cê tá pálido. Viu assombração?"
41085-48 = "[s] \"E se a gente vestisse os tambores igual roupa?\""
41085-50 = "……Você bebeu?"
41085-51 = "Andar por aí debaixo de um tambor pra passar despercebido……? Tipo desenho animado?"
41085-52 = "……Peraí, eu acho que já vi isso num manual."
41085-53 = "A lenda do espião fodão que invadia bases secretas inteiras usando caixa de papelão e barril……"
41085-54 = "Você só pode estar zoando, como que isso não ia levantar suspeita……?"
41085-55 = "Mas a gente não tem plano B, tem?"
41085-56 = "Eu também odeio ter que seguir ordens desse pervertido……"
41085-57 = "Mas entre vestir um tambor ou ver o esquadrão tomar bala por um erro meu……"
41085-58 = "……Tá decidido. Bora seguir a loucura dele."
41085-59 = "Peguem um tambor do tamanho de vocês."
41085-60 = "Missão de resgate RABBIT 4, iniciar!"
41085-66 = "……Ué? Tinha esse tanto de tambor aqui antes?"
41085-67 = "E eu vou saber? Cê acha que eu conto quantos tambores tem espalhados por esse porto inteiro?"
41085-68 = "Ah, faz sentido, mas……"
41085-69 = "Sei lá, sinto que eles tão meio…… esquisitos. Parece que aquela lata ali andou."
41085-70 = "Isso aí é sono. Falta de café."
41085-71 = "Bora achar logo essas invasoras e voltar pra guarita."
41085-77 = "……Eu não acredito que isso realmente funcionou."
41085-78 = "Eu tava rezando pra não morrer, e deu certo……"
41085-79 = "Acho que isso aqui camufla melhor do que traje ghillie e escombros."
41085-80 = "Se é tão roubado assim, a gente devia levar um estoque inteiro pra base."
41085-81 = "É, mas não dá pra carregar dois desses nas costas ao mesmo tempo."
41085-82 = "Quando a SRT voltar à ativa, eu vou pedir pra colocarem barris no orçamento de compras."
41085-86 = "……RABBIT 2, estamos chegando no ponto de encontro."
41085-91 = "M-Meninas…… por que vocês me deixaram……?"
41085-92 = "Saki-chan…… Miyako-chan……?"
41085-93 = "Eu não posso gritar senão me acham…… e o rádio ficou com elas……"
41085-94 = "É o meu fim…… vou ser esquecida aqui……"
41085-95 = "Vou secar no sol e virar um pedaço de cecina de coelho nesse guindaste……"
41085-99 = "……?"
41085-103 = "O-O TAMBOR ANDOU……?!"
41085-104 = "Miyu!"
41085-105 = "O TAMBOR FALOU……?!"
41085-106 = "O-O que é você?! Um alienígena?! Um demônio das trevas rastejante……?!"
41085-107 = "Caramba, sou eu! Entra logo num desses!"
41085-108 = "Hiiih, o monstro quer me engolir pra gente virar um só……!"
41085-109 = "S-Senhor Tambor de Aço, a minha carne é seca e dura, eu não sou saborosa, eu juro……!!"
41085-110 = "Deixa de ser idiota e entra na droga do tambor!!"
41085-111 = "Eu não quero morrer mastigada por um tambor do mal……!!"
41085-113 = "Que morte horrível……!!"
41085-115 = "AAAH, QUE ÓDIO!"
41085-119 = "SOU EU, CARAMBA! ACORDA PRA CUSPIR!"
41085-120 = "S-Saki-chan……?"
41085-121 = "A gente veio escondida nesses tambores. Bora, veste um e vaza!"
41085-122 = "S-Saki-chan…… Eu achei que vocês tinham me jogado pro escanteio de vez……"
41085-123 = "Nada a ver, caramba. Só veste isso e cala a boca."
41085-124 = "E uma cadete da SRT não chora em missão! Engole o choro!"
41085-125 = "T-Tá bom……"
41085-126 = "Beleza. Antes que a patrulha passe por a――"
41085-130 = "Achei elas! As invasoras tão ali!"
41085-134 = "Droga, sujou!!"
41085-136 = "Radar apitando contato inimigo na área…… Putz, é drone que não acaba mais."
41085-137 = "RABBIT 2, o que a gente faz?"
41085-138 = "Nessa situação……?"
41085-140 = "CORRE, SÓ CORRE!!"
41085-153 = "E assim, depois de correrem feito loucas usando tambores como armadura no meio do tiroteio…… elas conseguiram voltar pro parque inteiras."
41085-155 = "Parque dos Coelhinhos - Acampamento do Esquadrão"
41085-158 = "Haa, haa…… Aqui a gente tá safe……"
41085-159 = "Credo, o que é isso no tambor do Sensei? É um bicho? Um demônio das trevas?"
41085-160 = "……Sei lá, vou meter fogo pra garantir."
41085-161 = "NÃO FAZ ISSO! SOU EU AQUI DENTRO!"
41085-165 = "Que demônio das trevas o quê, caramba. Vocês inventam cada uma……"
41085-167 = "……Missão cumprida e voltamos pra base."
41085-168 = "E o melhor, todas estão inteiras."
41085-169 = "……Sensei [USERNAME], você tá ferido?"
41085-170 = "[s1] \"Tô safe.\"\n[s2] \"O tambor salvou a minha vida.\""
41085-171 = "Ufa. Se por algum infortúnio, você se machucasse acompanhando a gente……"
41085-172 = "Ufa. Se por algum infortúnio, você se machucasse acompanhando a gente……"
41085-173 = "Eu não duvido nada de que o Conselho Estudantil Geral ia arranjar outra desculpa pra botar a gente na cruz."
41085-175 = "Haha, mas convenhamos, a Saki pagou o maior mico do ano hoje. Tava toda machona antes da missão."
41085-176 = "Teoria não é prática, bebê~"
41085-177 = "Cala a boca! Se aquele guardinha inútil não tivesse saído da rota, em 5 minutos a gente tava em casa!"
41085-178 = "A realidade é sempre essa droga injusta……"
41085-179 = "M-Manuais de campo não preveem a dor de barriga dos outros……"
41085-181 = "Mas enfim, vocês mandaram bem hoje."
41085-182 = "Apesar dos pesares, a missão sob o comando da Saki foi um sucesso."
41085-183 = "……Humph."
41085-184 = "Credo, tô toda suada…… a farda tá colando nas coxas e eu tô fedendo a pólvora……"
41085-185 = "Tudo que eu queria era arrancar essa roupa e sentir a água quente escorrendo pelo corpo……"
41085-186 = "Kukuku, eu sabia que vocês iam ficar desesperadas pra tirar a roupa……"
41085-187 = "Então eu já deixei a lenha e o fogo tudo certinho pra gente derreter lá dentro! Bora tirar logo essa farda!"
41085-188 = "Cê tá me dizendo que preparou o banho enquanto a gente devia tá focada na missão……?"
41085-189 = "Se a escola tivesse aberta, você ia pra solitária…… Mas como eu tô desesperada pra ir pro banho e me limpar, eu vou perdoar hoje."
41085-193 = "……Bom, bora pro trampo pesado de esfregar as costas."
41085-196 = "Entendido!"
41085-207 = "Aaaahhn…… que delícia…… sinto cada poro do meu corpo se abrindo……"
41085-208 = "A água quente batendo na pele nua…… tô ficando toda molinha……"
41085-209 = "Sabe que o atrito do aço frio com a pele quente debaixo d\"água…… tem um toque meio proibido, né?"
41085-210 = "E a temperatura da água tá batendo certinho no ponto de fervura dos hormônios……"
41085-211 = "Mas acender fogo bem debaixo da nossa bunda me dá uma aflição……"
41085-212 = "Se subir a temperatura a gente vai ficar suando feito umas condenadas…… com a pele toda vermelhinha……"
41085-213 = "Relaxa. A câmera termográfica tá focada exatamente no calorzinho do corpo de vocês. Cada curvinha tá sendo mapeada."
41085-214 = "Ah, tá é muito morno isso aqui pro meu gosto."
41085-215 = "Querem que eu jogue pólvora termita na fogueira pra deixar todo mundo aqui fervendo de fogo…… digo, de calor?!"
41085-216 = "SÓ SE FOR A SUA LOUCURA! VAI ESTOURAR A GENTE NO BANHO AQUI!"
41085-217 = "E outra, a água tá no ponto. Um grau a mais e a gente derrete até a pureza."
41085-218 = "Sabe…… ficar assim, com nossos corpos se encostando nessa água apertada…… até que tem seu charme."
41085-219 = "A gente podia fazer uma noite das garotas daquelas lá nos dormitórios quando a SRT voltar……"
41085-220 = "[s] \"Vocês não acham que deviam ter colocado alguém de vigia pra ver se tem intrusos por perto espiando essa cena toda, né?\""
41085-221 = "Tá tranquilo, Sensei. a área tá limpa de tarados."
41085-222 = "A gente já cansou de se ver nua nos vestiários, não tem novidade. E a essa hora, nenhum civil normal pisa esse parque bizarro."
41085-223 = "Se brotar um pervertido, as minas e as torretas vão fazer picadinho dele antes que ele consiga ver qualquer coisa."
41085-224 = "……Peraí. Sensei…… Desde quando o senhor tá respirando ofegante aí essa moita?!"
41085-225 = "[s3] \"Foi meio que obra do destino ou aconteceu naturalmente………… eu acabei escorregando e caindo no fluxo de vocês……\"\n[s4] \"……Tô só…… fazendo o meu papel de \"vigia\"?\""
41085-232 = "……"
41085-234 = "VIGIA UMA OVA!! VOCÊ TAVA ESCONDIDO ESSE TEMPO TODO ESPIANDO O NOSSO BANHO, SEU TARADO NOJENTO!!"
41085-235 = "O SEU OLHAR TÁ SECANDO A GENTE, SEU PERVERTIDO!!! A GENTE VAI TE FUZILAR!!"
41085-236 = "E-EU SABIA!! O CONVITE PRO BANHO NA SCHALE ERA GOLPE! ELE VEIO ROUBAR A NOSSA PUREZA AQUI NO MATO!! SEU TARADO!!"
41085-237 = "……Moe, prepara o míssil. Trava a mira bem no meio das pernas dele."
41085-238 = "Hehehe…… Com prazer! Quer ver uma coisa \"potente\" e \"explosiva\" de perto, Sensei? DÁ ADEUS À SUA DIGNIDADE E TOMA CHUMBO QUENTE NO LOMBO, SEU SAFADO!!!"
41085-244 = "Parque dos Coelhinhos - Beco Escuro Próximo"
41085-245 = "Líder, tem gente nova invadindo o nosso parque."
41085-246 = "O destino é como o vento…… vem quando quer e vai quando quer……"
41085-247 = "Não devemos julgar se essa nova companhia é uma bênção ou uma maldição logo de cara."
41085-248 = "No entanto, se elas pretendem dividir o oxigênio deste parque conosco…… elas precisam aprender a desapegar das posses e abraçar a \"filosofia do nada\"."
41085-249 = "……E me digam, companheiros. O que os seus olhos viram? Essas meninas também são almas puras livres do peso dos bens materiais?"
41085-250 = "Aham. Puras igual lama. Elas tão é cegas de ganância."
41085-251 = "Fora que as filhas da mãe são rápidas no gatilho…… rasparam todo o lixo orgânico bom e levaram até as marmitas de broto de feijão que ficavam sobrando pra gente!!"
41085-252 = "E até as ripas de madeira pra fogueira elas cataram…… Nossos barracos tão desabando sem manutenção."
41085-253 = "Entendo…… Que pena. O destino nos trouxe almas corrompidas pelos pecados do materialismo…… "
41085-260 = "Eu sou um homem da paz, mas…… que seja. Peguem as armas do depósito."
41085-262 = "Está na hora de abençoar essas pecadoras engolidas pela ganância com……"
41085-264 = "O calor da dor da \"purificação material\"!"
41085-266 = "Próximo Episódio;A Sombra Rastejante"