[translation]
41085-2 = "Tsc, ladrãozinho... para onde ele foi?"
41085-3 = "Não deve ter ido muito longe... procurem por aqui!"
41085-8 = "Eu já disse que não sou uma ladra!"
41085-9 = "Saki, abaixe o tom de voz. Vão acabar nos descobrindo."
41085-13 = "Aqui é RABBIT 1 para o Acampamento RABBIT. Chegamos ao Ponto E. O alvo, a 'Cenoura', foi garantido com sucesso. Felizmente, não há feridos, mas..."
41085-14 = "Devido ao confronto anterior, a rota de fuga planejada originalmente tornou-se inutilizável."
41085-15 = "Além disso, confirmamos reforços inimigos..."
41085-17 = "Bem, eu já imaginava que isso aconteceria desde que a Saki virou a capitã."
41085-18 = "Ela é perfeita na teoria, mas na prática, só comete erros."
41085-19 = "Cala a boca! A Moe também não era um desastre nos exercícios práticos?!"
41085-20 = "Droga, o que foi que deu errado...?"
41085-21 = "[s] \"Muitas vezes as coisas não saem como planejado quando tentamos na prática, né?\""
41085-22 = "Tsc, era a chance perfeita de mostrar a força da SRT... e agora passamos por esse vexame na frente do Sensei..."
41085-24 = "...A propósito, onde está a Miyu?"
41085-25 = "Ué, ela não está com vocês? No GPS, os sinais estão sobrepostos."
41085-27 = "Não pode ser..."
41085-31 = "Aquela idiota...!"
41085-32 = "Ela deixou o rádio dentro da mochila!"
41085-33 = "Ela deve ter entrado em pânico durante o confronto anterior."
41085-34 = "Se ela saiu de lá..."
41085-35 = "Será que ela foi para aquele guindaste na Torre B?"
41085-36 = "Torre B...? Pelo que vi agora há pouco, aquele lugar está infestado de guardas."
41085-37 = "Não há cobertura por lá, não dá para esperar que ela escape sozinha..."
41085-38 = "...Saki, o que faremos?"
41085-39 = "O que faremos? Não temos escolha a não ser salvá-la."
41085-40 = "Nesse caso, teremos que deixar esse tambor para trás. Não dá para lutar carregando um tambor nas costas..."
41085-41 = "Concordo. É uma pena, mas vamos desistir da 'Cenoura' e focar no resgate."
41085-42 = "O número de inimigos é alto... é melhor nos prepararmos para o pior."
41085-46 = "...Sensei?"
41085-47 = "Aconteceu alguma coisa?"
41085-48 = "[s] \"Que tal se esconderem dentro dos tambores?\""
41085-50 = "...Você está falando sério?"
41085-51 = "Mover-se dentro de um tambor para enganar a visão dos inimigos...?"
41085-52 = "...Espere, eu realmente já li sobre isso em algum livro."
41085-53 = "A história de um agente lendário que completou várias missões de infiltração usando caixas de papelão e tambores..."
41085-54 = "Não, não tem como isso não levantar suspeitas..."
41085-55 = "Mas não temos outra opção, temos?"
41085-56 = "Eu também não queria seguir as ordens desse Sensei."
41085-57 = "Mas é pior se a missão falhar ou se alguém se ferir por causa dos meus erros..."
41085-58 = "...Entendido. Vamos seguir o plano."
41085-59 = "Certo, equipem os tambores que melhor se ajustam à altura de vocês."
41085-60 = "Vamos resgatar a RABBIT 4!"
41085-66 = "...Hm? Aquele tambor estava ali antes?"
41085-67 = "Sei lá. Você tem ideia de quantos tambores existem neste porto? Você não decorou a posição de todos, decorou?"
41085-68 = "Bem, é verdade, mas..."
41085-69 = "É que parece meio estranho, como se tivesse se movido..."
41085-70 = "Você deve estar cansado."
41085-71 = "Vamos logo, capture o ladrão para podermos descansar."
41085-77 = "...Não acredito que eles realmente não notaram."
41085-78 = "Eu também estava duvidando..."
41085-79 = "Parece ser mais eficaz do que qualquer camuflagem ou cobertura comum."
41085-80 = "Se é tão eficaz assim, adoraria levar mais algumas comigo."
41085-81 = "Bem, não é muito realista carregar mais de duas sozinha."
41085-82 = "Vamos considerar a compra quando voltarmos para a SRT."
41085-86 = "……RABBIT2, chegaremos ao ponto de encontro em breve."
41085-91 = "To, todas, para onde vocês foram……?"
41085-92 = "Saki-chan…… Miyako-chan……?"
41085-93 = "Nesta situação, não posso nem gritar, e meu rádio sumiu……."
41085-94 = "É o fim…… vou ser esquecida por todas assim……."
41085-95 = "Vou acabar secando e morrendo em cima deste guindaste……."
41085-99 = "……?"
41085-103 = "O, o barril se moveu……!?"
41085-104 = "Miyu!"
41085-105 = "E ainda falou……!?"
41085-106 = "O, o que é isso? Uma nova criatura não identificada!? O caos rastejante……!?"
41085-107 = "Aqui! Entre logo!"
41085-108 = "Uu, o monstro está me arrastando para dentro para nos tornarmos um só……!?"
41085-109 = "Ba, barril-san, mesmo que me coma, acho que não sou saborosa……!"
41085-110 = "É hora de dizer uma besteira dessas?!"
41085-111 = "Em vez de secar e morrer, acabar sendo comida por um barril……."
41085-113 = "Que, que tipo de fim é esse……!"
41085-115 = "Ah, chega!"
41085-119 = "Sou eu! Preste atenção!"
41085-120 = "Sa, Saki-chan……?"
41085-121 = "Usei o barril para chegar até aqui sem ser notada. Vamos, ande logo."
41085-122 = "Sa, Saki-chan…… eu achei que vocês tinham me abandonado……."
41085-123 = "Não é nada disso, agora entre logo."
41085-124 = "E pare de chorar durante uma operação da SRT!"
41085-125 = "U, uhum……."
41085-126 = "Então, vamos rápido antes que os guardas percebam――"
41085-130 = "Ali, são invasores!"
41085-134 = "Droga, fomos descobertas!"
41085-136 = "Aproximação inimiga confirmada…… ah, é uma quantidade absurda de drones."
41085-137 = "RABBIT2, o que faremos?"
41085-138 = "Nessas horas……"
41085-140 = "Apenas corram!!"
41085-153 = "Depois disso, corremos sob uma chuva de balas ainda usando os barris…… e de alguma forma conseguimos chegar ao parque."
41085-155 = "Parque dos Coelhinhos - Acampamento do Pelotão"
41085-158 = "Haa, haa…… acho que estamos seguras agora……."
41085-159 = "Uou, o que é isso? Uma criatura não identificada? O caos rastejante?"
41085-160 = "……Bem, vou queimar isso logo."
41085-161 = "Pare com isso! Sou eu, sou eu!"
41085-165 = "Quem é o caos rastejante? Aliás, a Miyu disse a mesma coisa agora pouco……."
41085-167 = "……Vocês voltaram em segurança."
41085-168 = "Fico feliz que ninguém tenha se ferido."
41085-169 = "……[USERNAME] Sensei, você se machucou?"
41085-170 = "[s1] \"Eu também estou bem.\"\n[s2] \"Graças ao barril.\""
41085-171 = "Entendo. Se, por um acaso, o Sensei se ferisse durante nossas operações……"
41085-172 = "Entendo. Se, por um acaso, o Sensei se ferisse durante nossas operações……"
41085-173 = "Não saberíamos que tipo de punição receberíamos do Conselho Estudantil Federal novamente."
41085-175 = "Nossa, mas a Saki passou uma vergonha daquelas, hein. E olha que ela estava tão confiante."
41085-176 = "Como sempre, ela não se sai bem na prática."
41085-177 = "Cala a boca. Se não fosse pelo imprevisto, teria acabado em 5 minutos."
41085-178 = "Poxa vida, a realidade é sempre assim..."
41085-179 = "É, as coisas não saem como no manual, né..."
41085-181 = "Mas, de qualquer forma, bom trabalho a todas."
41085-182 = "É inegável que a operação foi um sucesso sob o comando da Saki."
41085-183 = "...Humph."
41085-184 = "Mesmo assim, estou toda suada e grudenta..."
41085-185 = "É nessas horas que eu queria tomar um banho, mas..."
41085-186 = "Hehe, eu sabia que você diria isso..."
41085-187 = "Por isso eu já tinha preparado a lenha e tudo o que precisávamos com antecedência! Vamos, vamos, vamos tomar banho logo!"
41085-188 = "Isso significa que você ficou preparando o banho durante a operação...?"
41085-189 = "Em circunstâncias normais, isso daria uma punição disciplinar... mas, bem, se dá para tomar, vou aceitar com gratidão."
41085-193 = "...Bom, vamos para o próximo trabalho."
41085-196 = "Entendido!"
41085-207 = "Ah... sinto que voltei à vida..."
41085-208 = "Não tem nada melhor que um banho para recuperar as energias..."
41085-209 = "Esse banho de tambor não é tão ruim quanto eu pensava."
41085-210 = "A temperatura da água está ótima..."
41085-211 = "Parece difícil controlar a temperatura disso..."
41085-212 = "Como um sapo em água morna, eu poderia ficar assim para sempre..."
41085-213 = "Não se preocupe. Estou monitorando tudo com a câmera térmica."
41085-214 = "Na verdade, essa temperatura não está meio morna?"
41085-215 = "Quer que eu jogue um pouco de pó de termita?"
41085-216 = "Idiota! Vai explodir tudo, quer ver!?"
41085-217 = "Além disso, essa temperatura está perfeita. Se esquentar mais, vamos virar ensopado de coelho."
41085-218 = "É até divertido tomar banho todas juntas assim."
41085-219 = "Mesmo se um dia voltarmos para a SRT, de vez em quando, poderíamos..."
41085-220 = "[s] \"Ainda assim, precisamos ficar de olho para ver se ninguém aparece.\""
41085-221 = "Ah, deve estar tudo bem. Não tem ninguém por perto."
41085-222 = "Já estamos acostumadas a ver umas às outras sem roupa, e ninguém vem a este parque a essa hora."
41085-223 = "E se alguém aparecer, as minas e as torres de defesa devem reagir."
41085-224 = "...A propósito, por que o Sensei está aqui?"
41085-225 = "[s3] \"Foi o fluxo das coisas, ou algo assim...\"\n[s4] \"...Vigia?\""
41085-232 = "..."
41085-234 = "Ei, por que você está aqui!? Ver alunas tomando banho é inaceitável, sabia!?"
41085-235 = "Dessa vez, não pode reclamar nem se levar um tiro!"
41085-236 = "V-você estava esperando a operação acabar e a gente desarmar para atacar, não estava...!?"
41085-237 = "...Moe, me dê o míssil."
41085-238 = "Beleza, toma essa!!"
41085-244 = "Parque dos Coelhinhos - Beco próximo"
41085-245 = "Líder, parece que tem gente nova naquele parque."
41085-246 = "O destino é algo que chega como o vento e parte como o vento..."
41085-247 = "Não posso afirmar prontamente se isso é algo ruim ou não."
41085-248 = "No entanto, se elas desejam coexistir conosco... elas precisam ter o coração da \"não-posse\", aceitando as coisas como elas são."
41085-249 = "...Na visão de vocês, como foi? Elas também são seres nobres que se orgulham da não-posse, assim como nós?"
41085-250 = "Não. Longe de não-posse, elas estavam cheias de ganância."
41085-251 = "Além disso, elas são extremamente ativas e levaram quase todas as marmitas descartadas... até a de broto de feijão, que nunca sumia!"
41085-252 = "Levaram também todos os materiais de sucata... não conseguimos nem fazer nossos reparos."
41085-253 = "Entendo... Foi uma oportunidade valiosa, mas vocês foram corrompidos pela ganância..."
41085-260 = "Eu não queria causar alvoroço, mas... muito bem, preparem suas armas."
41085-262 = "Para esses vulgares que, cegos pela ganância, perderam a moral..."
41085-264 = "Vamos ensiná-los a 'alegria de não possuir nada'!"
41085-266 = "Próximo episódio: A Sombra que se Aproxima"
