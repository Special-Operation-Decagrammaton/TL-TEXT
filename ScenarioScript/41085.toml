[translation]
41085-2 = "Droga, aqueles ladrões… para onde foram?"
41085-3 = "Não devem ter ido longe… procurem!"
41085-8 = "Já disse que não somos ladrões!"
41085-9 = "Saki, abaixe a voz. Vão nos descobrir."
41085-13 = "Acampamento RABBIT, aqui RABBIT1. Chegamos ao Ponto Echo. A 'Cenoura' foi garantida. Sem feridos…"
41085-14 = "Mas a rota de fuga original foi comprometida."
41085-15 = "Reforços inimigos confirmados…"
41085-17 = "Bem, com a Saki no comando, já era de se esperar."
41085-18 = "Perfeita só na teoria. Na prática, só fracassa."
41085-19 = "Cala a boca! Você também errava nos treinos práticos!"
41085-20 = "Droga, o que deu errado…?"
41085-21 = "[s] \"Acontece, nem tudo sai como planejado.\""
41085-22 = "Tsc, era a chance de mostrar o poder da SRT… e ainda passar vergonha na frente da Schale…"
41085-24 = "…A propósito, onde está a Miyu?"
41085-25 = "Hã, não está com vocês? No GPS, os sinais estão sobrepostos."
41085-27 = "Não me diga…"
41085-31 = "Aquela idiota!"
41085-32 = "Ela deixou o rádio na mochila!"
41085-33 = "Na correria da luta, deve ter se desesperado."
41085-34 = "Se saiu daí…"
41085-35 = "Aquele guindaste do Bloco B."
41085-36 = "Bloco B… vi um monte de seguranças lá."
41085-37 = "Lá não tem cobertura, não dá para esperar que ela escape sozinha…"
41085-38 = "…Saki, o que faremos?"
41085-39 = "O quê, temos que resgatar."
41085-40 = "Então teremos que deixar os tambores para trás. Não dá para lutar carregando um tambor, não é mesmo?"
41085-41 = "Pois é. Infelizmente, vamos ter que abandonar a 'Cenoura' e priorizar o resgate."
41085-42 = "O inimigo é numeroso… vamos ter que nos preparar."
41085-46 = "…Professor?"
41085-47 = "O que foi?"
41085-48 = "[s] \"Que tal se esconderem debaixo dos tambores?\""
41085-50 = "…O senhor está falando sério?"
41085-51 = "Mover-se com um tambor na cabeça para enganar o inimigo…?"
41085-52 = "…Espera, já li sobre isso."
41085-53 = "A história de um agente lendário que usava caixas de papelão e tambores para se infiltrar…"
41085-54 = "Não, mesmo assim, não tem como não ser estranho…"
41085-55 = "Mas não temos outra opção."
41085-56 = "Eu também não quero seguir as ordens dele."
41085-57 = "Mas prefiro isso a falhar na operação ou ver alguém se machucar por minha causa…"
41085-58 = "…Entendido. Vamos fazer do jeito dele."
41085-59 = "Então, peguem os tambores do tamanho de vocês."
41085-60 = "Vamos resgatar a RABBIT4!"
41085-66 = "…Hã? Tinha um tambor ali?"
41085-67 = "Sei lá. Quantos tambores você acha que tem nesse porto? Não é como se você soubesse a posição de todos."
41085-68 = "É, mas…"
41085-69 = "Estava estranho, me pareceu que se mexeu…"
41085-70 = "É o cansaço."
41085-71 = "Vamos, peguemos logo os ladrões e descansemos."
41085-77 = "…Inacreditável, ninguém percebeu."
41085-78 = "Eu estava com minhas dúvidas…"
41085-79 = "Parece mais eficaz do que camuflagem ou cobertura comuns."
41085-80 = "Se é tão eficaz, daria para levar vários para casa."
41085-81 = "Bem, carregar mais de um por pessoa é inviável."
41085-82 = "Quando voltarmos à SRT, vamos considerar a compra."
41085-86 = "…RABBIT2, estamos quase no ponto de encontro."
41085-91 = "C-cade… onde estão…?"
41085-92 = "Saki-chan… Miyako-chan…?"
41085-93 = "Não posso gritar, e o rádio sumiu…"
41085-94 = "É o fim… vou ser esquecida…"
41085-95 = "Vou morrer aqui, seca…"
41085-99 = "…?"
41085-103 = "O tambor… se moveu?!"
41085-104 = "Miyu!"
41085-105 = "E ainda falou…?!"
41085-106 = "O quê, uma nova criatura? O Caos Rastejante?!"
41085-107 = "Aqui! Entra logo!"
41085-108 = "Ugh, o monstro está me arrastando para dentro… vai me engolir…?!"
41085-109 = "Ó, senhor tambor… eu não devo ser gostoso…"
41085-110 = "Você está falando o quê?"
41085-111 = "Em vez de morrer seca, vai morrer comida por um tambor…"
41085-113 = "Que fim horrível…"
41085-115 = "Ah, que inferno!"
41085-119 = "Sou eu, caramba! Acorda!"
41085-120 = "S-Saki-chan…?"
41085-121 = "Usei o tambor para vir até aqui sem ser notada. Anda, vamos."
41085-122 = "Saki-chan… pensei que tivesse sido abandonada…"
41085-123 = "Que nada, entra logo."
41085-124 = "E outra, uma elite da SRT não chora em operação!"
41085-125 = "H-hum…"
41085-126 = "Então, antes que os seguranças nos vejam…"
41085-130 = "Estão aí, intrusos!"
41085-134 = "Droga, fomos descobertos!"
41085-136 = "Inimigos se aproximando… ah, é um monte de drones."
41085-137 = "RABBIT2, o que fazemos?"
41085-138 = "Nessa hora…"
41085-140 = "Saiam correndo!!"
41085-153 = "Depois, correndo debaixo dos tambores com balas zunindo, conseguimos voltar ao parque."
41085-155 = "Parque dos Coelhinhos – Acampamento do Esquadrão"
41085-158 = "Haa, haa… aqui já estamos a salvo…"
41085-159 = "Opa, o que é isso? Uma criatura? O Caos Rastejante?"
41085-160 = "…Bem, vamos queimar."
41085-161 = "Para com isso! Sou eu, caramba!"
41085-165 = "Quem é o Caos Rastejante? E você também me chamou assim, Miyu…"
41085-167 = "……Voltamos bem."
41085-168 = "Ainda bem que não há feridos."
41085-169 = "……Professor [USERNAME], o senhor se machucou?"
41085-170 = "[s1] \"Estou bem.\"\n[s2] \"Graças ao tambor.\""
41085-171 = "Que bom. Se o senhor se machucasse durante nossa operação…"
41085-172 = "Que bom. Se o senhor se machucasse durante nossa operação…"
41085-173 = "O Conselho Estudantil poderia nos punir ainda mais."
41085-175 = "Nossa, Saki, você fez um papelão, hein. Toda confiante."
41085-176 = "Como sempre, fracassa na prática."
41085-177 = "Cala a boca. Se não fosse pelos imprevistos, teria terminado em 5 minutos."
41085-178 = "Puta merda, a realidade é sempre assim…"
41085-179 = "A-as coisas nunca saem como no manual…"
41085-181 = "De qualquer forma, bom trabalho."
41085-182 = "Com a Saki no comando, a operação foi um sucesso."
41085-183 = "……Hmph."
41085-184 = "Mesmo assim, estou todo suado…"
41085-185 = "Nessa hora, queria um banho…"
41085-186 = "Kuhihi, sabia que ia dizer isso…"
41085-187 = "Por isso, já preparei a lenha e o resto! Vamos, rápido, tomar banho!"
41085-188 = "Quer dizer que você ficou preparando o banho enquanto a operação rolava?"
41085-189 = "Normalmente seria suspensão… mas já que temos, vou aproveitar."
41085-193 = "…Bom, mais um trabalho."
41085-196 = "Entendido!"
41085-207 = "Ah… que vida…"
41085-208 = "Banho é mesmo a melhor coisa depois do cansaço…"
41085-209 = "O banho de tambor não é tão ruim."
41085-210 = "A temperatura está agradável…"
41085-211 = "Parece difícil de regular…"
41085-212 = "Igual um sapo na água morna, vou ficando…"
41085-213 = "Sem preocupações. Estou monitorando com termografia."
41085-214 = "Mas não está meio frio?"
41085-215 = "Que tal jogar pó de termite?"
41085-216 = "Idiota! Vai explodir tudo!"
41085-217 = "Essa temperatura está boa. Se esquentar mais, vira sopa de coelho."
41085-218 = "Assim, todo mundo junto, até que é divertido."
41085-219 = "Quando voltarmos à SRT, de vez em quando poderíamos…"
41085-220 = "[s] \"Só não podemos esquecer de vigiar para ninguém aparecer.\""
41085-221 = "Relaxa, não tem ninguém."
41085-222 = "Já estamos acostumadas a nos ver peladas, e ninguém vem a essa hora."
41085-223 = "Se alguém vier, as minas e as torretas vão detectar."
41085-224 = "…Aliás, o que o Professor está fazendo aqui?"
41085-225 = "[s3] \"É… é uma longa história…\"\n[s4] \"…De vigilante?\""
41085-232 = "……"
41085-234 = "Ei, por que está aí?! Ver alunas nuas é crime!"
41085-235 = "Se te atirarmos, não vai reclamar!"
41085-236 = "Viram? Ele esperou o fim da operação, quando estamos desarmadas…!"
41085-237 = "…Moe, o míssil."
41085-238 = "Isso aí, toma!!!"
41085-244 = "Parque dos Coelhinhos – Beco próximo"
41085-245 = "Líder, parece que chegaram novos no parque."
41085-246 = "As coincidências vêm e vão como o vento…"
41085-247 = "Não posso afirmar se isso é bom ou ruim."
41085-248 = "Mas, se elas desejarem coexistir conosco… precisarão abraçar o 'não-ter', o estado natural das coisas."
41085-249 = "…O que acharam? Elas também são seres nobres que prezam o não-ter?"
41085-250 = "Não. Longe disso, estavam cheias de desejos materiais."
41085-251 = "E agiram rápido. Levaram quase toda a comida descartada, até os bentôs de broto de feijão, que ninguém nunca queria!"
41085-252 = "Também levaram os materiais de sucata, dificultando nossos reparos."
41085-253 = "Entendo… uma coincidência, mas corrompidas pelo desejo material…"
41085-260 = "Não queria causar tumulto, mas tudo bem… preparem as armas."
41085-262 = "Aos corruptos, cegos pelo desejo material, que perderam a moral…"
41085-264 = "Vamos ensinar a 'alegria do não-ter'!"
41085-266 = "Próximo Episódio: A Sombra Rastejante"