[translation]
2004406-1 = "Pessoa em destaque"
2004406-3 = "Treinador, o que aconteceu?"
2004406-4 = "Você não parece bem. Gostaria de beber algo?"
2004406-5 = "Água, bebida isotônica, shake de proteína... o que prefere?"
2004406-6 = "[s1] \"E-eu vou querer água...!\"\n[s2] \"Sumire, você viu o link que eu te mandei?\""
2004406-9 = "Sim. É sobre a matéria na internet, certo?"
2004406-10 = "Mas, honestamente, não entendo o que está acontecendo..."
2004406-11 = "(Nesse momento, o monitor do centro de fitness começou a exibir uma reportagem!)"
2004406-16 = "A seguir, vamos para o quadro \"Kivotos de Hoje\"!"
2004406-17 = "Uma vendedora de bebidas que trabalha no estádio de Kivotos tornou-se o centro das atenções!"
2004406-18 = "Trabalhar como vendedora é uma tarefa árdua, pois exige carregar servidores pesados enquanto circula pelas arquibancadas――"
2004406-19 = "É um trabalho que exige muita resistência física."
2004406-23 = "No final das partidas, algumas vendedoras parecem tão exaustas que dá até pena de chamar. Mas, em meio a isso..."
2004406-24 = "Surgiu alguém que, até o último segundo, serviu bebidas sem nunca perder o sorriso!"
2004406-25 = "Essa atitude conquistou o coração das pessoas, a ponto de ser chamada de \"A Lenda do Estádio\"!"
2004406-26 = "Vamos conferir as imagens!"
2004406-32 = "Dizem que o estádio está sendo inundado de pedidos de pessoas querendo saber o turno dessa vendedora!"
2004406-33 = "As fotos tiradas com ela também estão causando um grande impacto na internet!"
2004406-34 = "Isso é, sem dúvida, o nascimento de uma nova estrela!"
2004406-35 = "Vale ressaltar que o departamento de jornalismo da Escola Chronos prioriza a proteção de informações pessoais, portanto――"
2004406-36 = "Não podemos revelar detalhes sobre a estrela do estádio! Mas..."
2004406-37 = "Segundo informações de uma fonte anônima, ela pertence ao Instituto de Ciências Millennium!"
2004406-42 = "Treinador."
2004406-43 = "[s] \"H-hã?\""
2004406-44 = "Isso é sobre mim, não é?"
2004406-45 = "[s] \"Pois é...\""
2004406-46 = "Eu apareci no noticiário..."
2004406-47 = "E criaram um fã-clube? O que isso significa?"
2004406-48 = "..."
2004406-49 = "Pessoal, vocês estão entendendo tudo errado."
2004406-50 = "Eu sou apenas uma estudante comum!"
2004406-56 = "Ué? Que notificação é essa..."
2004406-57 = "[s] \"...Um convite para uma reunião de uma fabricante de bebidas?\""
2004406-58 = "Hum..."
2004406-59 = "Estão me convidando para participar de uma reunião de planejamento de uma nova bebida esportiva e pedindo minha opinião como especialista..."
2004406-60 = "Dizem que querem que eu compartilhe meu conhecimento com os executivos da empresa."
2004406-61 = "[s] \"O-o que você vai fazer, Sumire!?\""
2004406-62 = "..."
2004406-63 = "Treinador, seria falta de educação recusar um convite tão gentil."
2004406-64 = "Além disso, se o assunto é sobre bebidas, eu aceito de bom grado."
2004406-65 = "Eu mesma já tinha várias opiniões como consumidora que gostaria de compartilhar!"
2004406-66 = "[s] \"V-você está falando sério?\""
2004406-67 = "Com certeza, treinador."
2004406-68 = "Uma reunião de planejamento de uma grande empresa..."
2004406-69 = "É a oportunidade perfeita para levar a voz de quem está no campo de batalha."
2004406-70 = "Vamos logo, treinador!"
2004406-72 = "(Sentindo uma ponta de preocupação com a confiança excessiva da Sumire...)"
2004406-73 = "(Decidi acreditar nela e acompanhá-la à reunião.)"
2004406-79 = "Senhoras e senhores, obrigado por comparecerem hoje."
2004406-80 = "Além dos nossos executivos, hoje temos..."
2004406-81 = "Para ouvir a opinião de quem está no campo de batalha, convidamos como nossa convidada especial a Othana Sumire, que está em alta na internet ultimamente!"
2004406-85 = "Muito prazer, sou Othana Sumire. Conto com a colaboração de todos hoje."
2004406-92 = "Bem, vamos começar a reunião imediatamente!"
2004406-94 = "Primeiro, apresentaremos as três propostas de bebidas preparadas pela nossa empresa."
2004406-98 = "A primeira é uma bebida esportiva com alta concentração de cafeína!"
2004406-99 = "Como a cafeína tem o efeito de elevar o desempenho físico, nosso objetivo é realizar uma promoção focada nesse ponto!"
2004406-100 = "De fato, sabe-se que consumir cafeína antes do exercício melhora a circulação sanguínea e aumenta temporariamente a capacidade física em cerca de 3 a 5%."
2004406-101 = "Também podemos esperar um efeito de aceleração na quebra de gordura, e..."
2004406-102 = "Treinador, você não acha que essa é uma ideia bastante interessante?"
2004406-103 = "[s] \"N-não é uma boa ideia...?\""
2004406-107 = "Em seguida, temos uma bebida que mistura extratos de vegetais com 14 tipos de frutas colhidas em várias partes de Kivotos."
2004406-108 = "A ideia é promover os benefícios da natureza para transmitir uma imagem saudável!"
2004406-109 = "É atraente, mas... não significa que só por usar frutas e vegetais seja saudável."
2004406-110 = "É preciso ter um pouco de cuidado com o consumo excessivo."
2004406-111 = "Bananas e maçãs, por exemplo, são adequadas para repor energia antes do exercício, mas..."
2004406-112 = "dependendo da variedade da fruta, algumas contêm muito açúcar."
2004406-117 = "Por fim, um novo produto com calorias drasticamente reduzidas em relação às bebidas convencionais!"
2004406-118 = "Ultimamente, tem havido críticas negativas a produtos que contêm xarope de milho rico em frutose, o que tem afetado as vendas."
2004406-119 = "Com esta opção, acredito que podemos almejar a recuperação das vendas e a melhoria da imagem da marca!"
2004406-120 = "Xarope de milho rico em frutose... De fato, às vezes mencionam seus malefícios, mas eu não penso assim."
2004406-121 = "Porém, dizer que não sobrecarrega o corpo de forma alguma também seria incorreto."
2004406-122 = "Consumir uma grande quantidade de açúcar em pouco tempo pode ser tanto uma vantagem quanto uma desvantagem."
2004406-123 = "O aumento do nível de açúcar no sangue sobrecarrega o pâncreas, afinal."
2004406-124 = "Esta proposta pode ser bem aceita por consumidores preocupados com a saúde."
2004406-126 = "Hum, é difícil descartar qualquer uma das propostas."
2004406-127 = "Não seria melhor a terceira proposta, a bebida com menos calorias, já que podemos aproveitar as instalações existentes?"
2004406-128 = "No entanto, melhorar a imagem da marca é urgente. Nesse ponto, o apelo à saúde da segunda proposta é ideal..."
2004406-129 = "É justamente em momentos assim que devemos pedir a sabedoria de alguém de fora."
2004406-130 = "Concordo. Gostaríamos muito de ouvir a opinião da Sumire."
2004406-131 = "Por favor, nos dê um conselho sob a perspectiva de quem está no campo."
2004406-135 = "Entendido..."
2004406-136 = "Cada proposta tinha seus pontos positivos... Mas, neste exato momento, o que o mercado realmente deseja é..."
2004406-137 = "Uma bebida proteica suave e cremosa!"
2004406-138 = "[s] \"Sumire!?\""
2004406-139 = "S-Sumire-san!? Nós somos uma empresa de bebidas esportivas, sabia!?"
2004406-140 = "Sim, esse é o ponto!"
2004406-141 = "Como assim!?"
2004406-142 = "Uma bebida que ajuda nos esportes, não seria essa a verdadeira bebida esportiva?"
2004406-143 = "É mais difícil do que se imagina atingir a ingestão diária de proteínas enquanto se treina."
2004406-144 = "Na academia, vi muitas pessoas que, além da alimentação diária, tentam suplementar proteínas."
2004406-145 = "A proteína é eficiente, mas muitas pessoas não a utilizam por ser difícil de beber..."
2004406-146 = "Para mudar essa realidade..."
2004406-147 = "Devemos causar uma nova revolução nas bebidas proteicas!"
2004406-148 = "Eu acredito nisso!"
2004406-153 = "B-bebida proteica... Eu nunca teria imaginado!"
2004406-154 = "É tão inesperado que não sei como julgar... Preciso de um tempo para pensar..."
2004406-155 = "Então essa é a voz do campo de batalha... Entendo."
2004406-156 = "E-espere um pouco!"
2004406-157 = "É verdade que desenvolvemos bebidas esportivas, mas também é importante que os consumidores possam adquiri-las facilmente..."
2004406-158 = "Esse tipo de refrigerante leve é o nosso principal produto!"
2004406-159 = "Essa é uma estratégia com uma visão muito limitada!"
2004406-160 = "O-o que você disse...!?"
2004406-161 = "Por que as pessoas que não se exercitam assistem a esportes?"
2004406-162 = "Claro, há o objetivo de entretenimento e alívio de estresse, mas..."
2004406-163 = "Essencialmente, não seria por causa do desejo de 'querer ser como eles'?"
2004406-164 = "Esse sentimento, um dia, os levará ao treinamento. É nisso que eu acredito!"
2004406-166 = "Q-qual é a base para isso...?"
2004406-167 = "Minha convicção é a minha base! E além disso..."
2004406-168 = "Nós temos a missão de abrir caminho para o futuro das pessoas que treinam!"
2004406-173 = "Pelo... futuro das pessoas...!"
2004406-174 = "Isso faz meu coração arder...! Ela nos faz lembrar de coisas importantes."
2004406-175 = "Sinto que, quando entrei na empresa, eu também guardava uma convicção assim no peito...!"
2004406-176 = "……."
2004406-177 = "(É, é o fim...)"
2004406-181 = "Então, como conclusão, vamos seguir com o desenvolvimento da nova bebida proteica...!"
2004406-182 = "Para atender a uma ampla gama de necessidades, vamos começar com três sabores: chocolate, morango e banana, e observar a reação do mercado."
2004406-183 = "Sumire, obrigado por compartilhar sua valiosa opinião de campo!"
2004406-184 = "Imagina! Eu que agradeço pela oportunidade."
2004406-188 = "(O que eu deveria escrever na ata da reunião...?)"
2004406-190 = "(Foi assim que a bebida proteica idealizada por Sumire foi lançada no mundo.)"
2004406-191 = "(Vou me abster de dar detalhes sobre as vendas, mas...)"
2004406-192 = "(Dizem que ela conquistou um grupo de fãs fervorosos e que a linha de produção continua ativa até hoje.)"
2004406-194 = "Com isso, o número de pessoas que começam a treinar em Kivotos vai aumentar. #nCaso encerrado, treinador."
2004406-195 = "[s] \"Será... mesmo...?\""
