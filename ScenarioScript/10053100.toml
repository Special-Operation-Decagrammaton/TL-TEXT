[translation]
10053100-1 = "História posterior, parte 1; Churrasco e pimenta"

10053100-3 = "Mmm, o cheiro de carne é tão bom! \r\n"

10053100-4 = "Ei, traga-me um prato! Vou compartilhar com você!"

10053100-9 = "……."

10053100-10 = "Qual é o problema, tire o prato? \r\n\r\n\r\n\r\n\r\n"

10053100-11 = "Não, estou grato... mas... \r\n\r\n\r\n\r\n"

10053100-12 = "Eu queria saber se não haveria problema em participarmos e fazermos um banquete. \r\n\r\n\r\n"

10053100-13 = "O que há com essa estranha reticência? \r\n\r\n\r\n\r\n"

10053100-14 = "Não adianta se não comermos juntos. Viver significa comer, certo? \r\n\r\n\r\n\r\n\r\n"

10053100-15 = "Não, não é disso que estou falando... \r\n\r\n\r\n\r\n"

10053100-16 = "Ei, feche a boca. Pare de bater na boca e coma sua comida. \r\n\r\n\r\n\r\n"

10053100-17 = "Como devo comer com a boca fechada...? \r\n\r\n\r\n\r\n"

10053100-18 = "……certamente? \r\n\r\n\r\n\r\n"

10053100-21 = "……. \r\n\r\n"

10053100-22 = "Sim? Há algo no meu rosto? \r\n\r\n\r\n\r\n"

10053100-23 = "...Se você for tão gentil comigo, eventualmente será traído em grande parte, certo? \r\n\r\n"

10053100-24 = "Hum? \r\n\r\n\r\n"

10053100-25 = "O que, de repente? fechar! Está perto! ! \r\n\r\n"

10053100-26 = "Isso significa que você está tão preocupado com sua irmã? \r\n\r\n\r\n\r\n"

10053100-27 = "Shhh! Você não disse isso! ? \r\n\r\n"

10053100-28 = "Mas não estou preocupado... não estou dizendo que não estou preocupado! \r\n\r\n\r\n"

10053100-29 = "Estou muito grato por você estar preocupado comigo~\r\n\r\n\r\n"

10053100-33 = "Então, deixe-me contar-lhe duas sabedorias especiais sobre a vida."

10053100-34 = "Uma coisa é que não importa qual seja a situação, se você tentar, conseguirá fazer funcionar."

10053100-35 = "Mais uma coisa, não há nada que não possa ser resolvido com força! Ahaha! \r\n\r\n\r\n\r\n"

10053100-41 = "Não adianta se preocupar com alguém que destrói um ônibus com as próprias mãos... \r\n"

10053100-43 = "Ah~ Esse é o gosto da felicidade~\r\n"

10053100-44 = "Desde quando comemos carne?"

10053100-49 = "……. \r\n"

10053100-50 = "Ha! \r\n\r\n\r\n\r\n"

10053100-51 = "Não, não, não. Quase perdi minha dignidade na frente dos sócios do clube. \r\n\r\n\r\n"

10053100-52 = "Gerente, o que aconteceu? Parece que meus pauzinhos pararam de funcionar porque estou na metade da refeição. \r\n\r\n"

10053100-53 = "Huh? Ah, não... comi tanta carne... acho que dá para dizer que cansei disso... #nAhaha. \r\n\r\n\r\n"

10053100-54 = "Como esperado do gerente! Mesmo quando você está fugindo, você ainda está balançando as asas! \r\n\r\n"

10053100-55 = "Claro! \r\n\r\n\r\n\r\n\r\n"

10053100-56 = "Mais do que isso... Tsubasa, você esteve ao meu lado esse tempo todo... está tudo bem? \r\n\r\n\r\n"

10053100-57 = "Ah, desculpe... Já faz um tempo, então estou feliz... \r\n"

10053100-58 = "Acho que foi um obstáculo... \r\n\r\n"

10053100-59 = "Não, não! Isso não pode ser verdade...! #nAcabei de perguntar! \r\n\r\n\r\n\r\n"

10053100-60 = "Bem... só mais um pouco... \r\n"

10053100-61 = "Hehehe. \r\n\r\n"

10053100-62 = "É difícil comer.... \r\n\r\n\r\n\r\n"

10053100-65 = "Ei, golpista. \r\n\r\n\r\n"

10053100-66 = "Por favor, pare de me chamar assim! \r\n\r\n\r\n\r\n\r\n"

10053100-67 = "Mesmo sendo uma fraude, ele é amado por seus subordinados? #nEssa é a primeira vez que vejo o diretor se apegando a alguém. \r\n\r\n\r\n\r\n"

10053100-68 = "Então não sou um golpista...! \r\n\r\n\r\n\r\n"

10053100-70 = "Você sabe, Konoka-kun. \r\n"

10053100-71 = "Este é um conselho sério, no entanto. É melhor não confiar muito na mídia."

10053100-73 = "……foto? \r\n\r\n\r\n\r\n"

10053100-75 = "Todos os principais meios de comunicação em Kivotos estão sob o controle do Conselho Estudantil da Federação. #n Além disso, a relação conspiratória entre o Conselho Estudantil da Federação e o Seminário é uma história bem conhecida neste mundo."

10053100-76 = "O gerente foi falsamente acusado."

10053100-77 = "O talento do gerente é simplesmente extraordinário. #nA “irmã mais velha” do seminário tomou medidas diretas para eliminá-los."

10053100-79 = "Ah... esse tipo de cenário?"

10053100-80 = "Não é um cenário, é um fato! Big Sister está sendo expulsa diretamente!"

10053100-81 = "Entendi, entendi ~"

10053100-82 = "Eu definitivamente não acredito! ?"

10053100-86 = "Bem, a história é diferente."

10053100-87 = "Não importa o quanto você diga, não é superprotetor subir ao segundo andar no meio da noite e espiar seu rosto adormecido?"

10053100-88 = "Bem, entendo que você esteja preocupado com o diretor."

10053100-89 = "...O que você está falando?"

