10053100-92 = "...?"

10053100-96 = "Naquele dia a ponte estava quebrada... Fiquei me perguntando o que fazer em frente à cabana na montanha. #nEntão, de repente ela abriu a janela e começou a gritar, então eu me assustei e fugi."

10053100-97 = "Ah, se for esse o caso, é isso que eu quero ouvir..."

