[translation]
10053100-1 = "後日談その1;バーベキュー＆チリ"
10053100-3 = "ん～っ、肉のいい匂い～！\r\n"
10053100-4 = "ほら、皿持ってきな！取り分けてやるから！"
10053100-9 = "……。"
10053100-10 = "何だよ、皿出しなって。\r\n\r\n\r\n\r\n\r\n"
10053100-11 = "いや、その……ありがたいんですけど……。\r\n\r\n\r\n\r\n"
10053100-12 = "うちら、ここに混ざってご馳走になっていいのかなーって。\r\n\r\n\r\n"
10053100-13 = "何だよ、その変な遠慮。\r\n\r\n\r\n\r\n"
10053100-14 = "一緒に食わなきゃ意味ないじゃん。生きるって、食べることでしょ？\r\n\r\n\r\n\r\n\r\n"
10053100-15 = "いや、そういう話じゃなくて……。\r\n\r\n\r\n\r\n"
10053100-16 = "ほら、口閉じる。無駄口叩いてないで食え食え。\r\n\r\n\r\n\r\n"
10053100-17 = "口を閉じて、どうやって食べろと……？\r\n\r\n\r\n\r\n"
10053100-18 = "……たしかに？\r\n\r\n\r\n\r\n"
10053100-21 = "……。\r\n\r\n"
10053100-22 = "うん？あたしの顔になにか付いてる？\r\n\r\n\r\n\r\n"
10053100-23 = "……そんなに優しくしてると、そのうち盛大に裏切られるよ？\r\n\r\n"
10053100-24 = "ふーん？\r\n\r\n\r\n"
10053100-25 = "な、なによ急に！近い！近いって！！\r\n\r\n"
10053100-26 = "つまり～そんなにお姉さんが心配だってわけ～？\r\n\r\n\r\n\r\n"
10053100-27 = "シャーッ！そんなこと言ってないでしょ！？\r\n\r\n"
10053100-28 = "心配なんかして……ないとは言わないけど！\r\n\r\n\r\n"
10053100-29 = "あたしの心配までしてくれるなんてありがたい話だね～\r\n\r\n\r\n"
10053100-33 = "じゃあ特別に、人生の知恵を2つ教えてあげよう。"
10053100-34 = "1つ、どんな状況でも、やってみりゃ案外なんとかなる。"
10053100-35 = "もう1つ、力で解決できないことは無い！あははっ！\r\n\r\n\r\n\r\n"
10053100-41 = "素手でバスを壊すような人……心配しても仕方ないか……。\r\n"
10053100-43 = "あぁ～幸せってこういう味してるんですね～\r\n"
10053100-44 = "お肉なんていつ以来でしょうか……。"
10053100-49 = "……。\r\n"
10053100-50 = "はっ！\r\n\r\n\r\n\r\n"
10053100-51 = "いけないいけない。部員の前で威厳を失うところでした。\r\n\r\n\r\n"
10053100-52 = "部長、どうしたんだ？食べかけで箸が止まっているようだが。\r\n\r\n"
10053100-53 = "えっ？あ、いや～っ……その、お肉は食べすぎて……飽きてしまったといいますか……#nあはは。\r\n\r\n\r\n"
10053100-54 = "さすが部長！逃亡中でも羽振りがいいんだな！\r\n\r\n"
10053100-55 = "と、当然です！\r\n\r\n\r\n\r\n\r\n"
10053100-56 = "それより……ツバサ、ずっと私の隣にいますが……いいんですか？\r\n\r\n\r\n"
10053100-57 = "あっ、すまない……。久しぶりだから、嬉しくて……。\r\n"
10053100-58 = "邪魔……だったかな……。\r\n\r\n"
10053100-59 = "い、いえいえ！そんなわけないじゃないですか……！#nちょっと聞いてみただけですから！\r\n\r\n\r\n\r\n"
10053100-60 = "じゃあ……もうちょっとだけ……。\r\n"
10053100-61 = "ふふふっ。\r\n\r\n"
10053100-62 = "食べづらい……。\r\n\r\n\r\n\r\n"
10053100-65 = "なぁ、詐欺師。\r\n\r\n\r\n"
10053100-66 = "その呼び方やめてくださいってば！\r\n\r\n\r\n\r\n\r\n"
10053100-67 = "詐欺師のくせに、部下には慕われてるのか。#n所長が誰かに懐いてるところ、初めて見たよ。\r\n\r\n\r\n\r\n"
10053100-68 = "だから詐欺師じゃなくて……！\r\n\r\n\r\n\r\n"
10053100-70 = "あのね、コノカ君。\r\n"
10053100-71 = "これは真面目な忠告なんだけどね。メディアを過信しないほうがいい。"
10053100-73 = "……え？\r\n\r\n\r\n\r\n"
10053100-75 = "キヴォトスの主要メディアは、全て連邦生徒会の管理下なんだ。#nしかも、連邦生徒会とセミナーの癒着関係は、この世界じゃ有名な話。"
10053100-76 = "部長は濡れ衣を着せられただけなんだ。"
10053100-77 = "部長の才能はあまりにも卓越しているからな。#nセミナーの「ビッグシスター」が直接手を回して排除したんだ。"
10053100-79 = "あー……そういう設定？"
10053100-80 = "設定ではなく事実です！ビッグシスター直々に追い出されてるんですからね！"
10053100-81 = "分かった分かった～"
10053100-82 = "絶対信じてないですよね！？"
10053100-86 = "んで、話は変わるんだけど。"
10053100-87 = "いくらなんでも、真夜中に2階まで上がって寝顔を覗くってのは、#nさすがに過保護じゃない？"
10053100-88 = "まあ、所長のことが心配なのは分かるけど。"
10053100-89 = "……何の話です？"
10053100-90 = "何って、窓の外にいたの、あんただろ？写真に写ってるし。"
10053100-91 = "心当たりがないのですが……。"
10053100-92 = "……？"
10053100-96 = "あの日は橋が壊れてて……どうしようか山小屋の前で悩んでたんですよ。#nそしたら急に窓開けて叫ぶもんだから、ビックリして逃げました。"
10053100-97 = "あぁ、それならこっちこそ聞きたいんですけど――"
10053100-98 = "あの時、窓に張りついてたの……誰なんです？#nここにはいないみたいですけど。"
10053100-103 = "……？"
10053100-104 = "え。"
10053100-106 = "えぇぇぇぇぇぇぇぇっ！？！？"
