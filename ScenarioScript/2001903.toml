[translation]
2001903-1 = "Case2. ゆっくり休んでください"
2001903-3 = "（書類の山との戦いを終えた）"
2001903-4 = "（今日は戦略的撤退だ！続きは明日の私が……）"
2001903-9 = "シャーレ・休憩室"
2001903-11 = "おかえりなさいませ、ご主人様！ぴょんぴょん！"
2001903-15 = "（今日も幻覚が……）"
2001903-16 = "（……いや、現実を受け入れよう）"
2001903-17 = "[s1] \"こんにちは、アカネ。ところで、なぜここに……？\"\n[s2] \"どうやって入ってきたの……？\""
2001903-18 = "ロックを解除させていただきました。"
2001903-19 = "ロックを解除させていただきました。"
2001903-20 = "どうやって、"
2001903-21 = "ですか？"
2001903-27 = "少しお力を借りたんです。"
2001903-28 = "なにせ非常事態ですので……ふふっ。"
2001903-29 = "爆弾でロックを吹き飛ばしても良かったのですが……"
2001903-30 = "それではご主人様がお困りになるだろうと思いまして。"
2001903-31 = "以前、爆弾はご主人様が控えるように申し付けられましたし……"
2001903-32 = "え？ここまでする必要はあったのか、と？"
2001903-33 = "それはもちろんです！"
2001903-34 = "私にとって、ご主人様の健康状態は常に最優先事項ですので。"
2001903-35 = "こんなにもお疲れのご様子で……。"
2001903-36 = "私、胸が痛くて堪りません。本当に心苦しいです……。"
2001903-37 = "[s] 気持ちだけでもうれしいよ。"
2001903-38 = "……私にできることはないでしょうか？"
2001903-39 = "装いこそ変わりましたが、私は永遠にご主人様のメイドですから。"
2001903-40 = "[s]それじゃあ、一緒に掃除しようか？"
2001903-44 = "掃除……本当にそれだけで……？"
2001903-45 = "ご主人様には欲というものがないのですか？"
2001903-46 = "ふふっ……お優しいのですね。"
2001903-47 = "分かりました。誠心誠意、ご主人様にご奉仕いたします。"
2001903-49 = "（その後、二人で掃除に没頭した）"
2001903-53 = "（手伝う隙もなく、ほとんどアカネが終わらせてしまった……）"
2001903-56 = "ふふっ……初めてお会いした日のことを思い出しますね。"
2001903-57 = "ご主人様は、あの時も掃除をお願いしましたから。"
2001903-58 = "どうでしょう。ホコリ一つないお部屋になりましたね。"
2001903-59 = "[s3] \"あの時のアカネも可愛かったね。\"\n[s4] \"今のアカネも可愛いよ。\""
2001903-64 = "ご、ご主人様？急にそんなことをおっしゃるだなんて……私……"
2001903-65 = "お、お待ちください！特別な茶葉が入ったんです。すぐにお持ちします！"
2001903-74 = "本日の一杯です。どうぞお召し上がりください。"
2001903-80 = "ふふっ、私もお気に入りの香りなんです。喜んでいただけて幸いです。"
2001903-81 = "実はずっと探していて……ようやく手に入ったのです。"
2001903-82 = "その一杯を、ご主人様と飲むことができて……"
2001903-83 = "アカネはとても幸せです。"
2001903-84 = "[s] \"そういえば、その格好もアカネのお気に入りなの？\""
2001903-85 = "バニーガールですか？"
2001903-86 = "そうですね……新鮮な気分になれます。服装が違うだけで、気分も変わりますから。"
2001903-87 = "動きやすい、というのもありますし……"
2001903-88 = "ですが、改めてメイドとして、メイド服も大切だと感じています。"
2001903-89 = "ご主人様はどう思われますか？"
2001903-90 = "[s] \"うーん、私は……。\""
2001903-91 = "ぜひ！ご主人様の意見を伺いたいです。"
2001903-92 = "実は……"
2001903-93 = "私の部屋を訪ねてくださった時から、ずっと思っていました。"
2001903-99 = "どうでしょう、ご主人様？"
2001903-100 = "メイドとしての私、バニーガールとしての私、どちらがお好きですか？"
2001903-104 = "――どちらにも良さがある？"
2001903-105 = "そ、それは嬉しいですが……"
2001903-106 = "ですが、ご主人様……アカネは白黒ハッキリつけたいのです。"
2001903-107 = "どちらの私がご主人様をご奉仕するのに、より相応しいのでしょうか？"
2001903-108 = "ご主人様の口から直接聞きたいのです！ぴょんぴょん！"
2001903-109 = "[s] \"ぴょんぴょん……？\""
2001903-110 = "はい。今の私はウサギのアカネですから。"
2001903-111 = "さあ、メイドですか？#nそれともウサギですか？"
2001903-115 = "（アカネの姿が鼻の先まできた）"
2001903-121 = "（あれ、急にまぶたが重く……）"
2001903-130 = "あら、ご主人様？"
2001903-134 = "ふふっ……本当にお疲れのようですね。"
2001903-138 = "私もこれにて失礼いたします。"
2001903-139 = "おやすみなさい、ご主人様。"
