[translation]
2001903-1 = "Caso 2. Por favor, descanse um pouco"
2001903-3 = "（Terminando a batalha contra a pilha de documentos）"
2001903-4 = "（Hoje é uma retirada estratégica! O resto fica para o meu eu de amanhã...）"
2001903-9 = "Schale - Sala de Descanso"
2001903-11 = "Bem-vindo de volta, Mestre! Pulo, pulo!"
2001903-15 = "（Alucinações de novo...）"
2001903-16 = "（...Não, preciso aceitar a realidade）"
2001903-17 = "[s1] \"Olá, Akane. A propósito, por que você está aqui...?\"\n[s2] \"Como você entrou...?\""
2001903-18 = "Eu desbloqueei a porta."
2001903-19 = "Eu desbloqueei a porta."
2001903-20 = "Como,"
2001903-21 = "você fez isso?"
2001903-27 = "Eu pedi um pequeno favor."
2001903-28 = "Já que é uma situação de emergência... hehe."
2001903-29 = "Eu poderia ter explodido a fechadura com uma bomba, mas..."
2001903-30 = "Pensei que isso causaria problemas ao Mestre."
2001903-31 = "Além disso, o Mestre me pediu anteriormente para evitar o uso de bombas..."
2001903-32 = "Hã? Se era necessário ir tão longe?"
2001903-33 = "Claro que sim!"
2001903-34 = "Para mim, o estado de saúde do Mestre é sempre a prioridade máxima."
2001903-35 = "Você parece tão cansado..."
2001903-36 = "Meu coração dói só de ver. Sinto-me realmente angustiada..."
2001903-37 = "[s] Fico feliz só com a intenção."
2001903-38 = "...Não há nada que eu possa fazer?"
2001903-39 = "Embora minha vestimenta tenha mudado, continuarei sendo sua empregada para sempre, Mestre."
2001903-40 = "[s] Então, que tal limparmos juntos?"
2001903-44 = "Limpar... É só isso mesmo...?"
2001903-45 = "O Mestre não tem nenhum desejo?"
2001903-46 = "Hehe... Você é tão gentil."
2001903-47 = "Entendido. Servirei ao Mestre de todo o meu coração."
2001903-49 = "（Depois disso, os dois se dedicaram à limpeza）"
2001903-53 = "（Sem chance de ajudar, Akane terminou quase tudo sozinha...）"
2001903-56 = "Hehe... Lembro-me do dia em que nos conhecemos."
2001903-57 = "Naquela época, o Mestre também me pediu para limpar."
2001903-58 = "O que acha? O quarto ficou sem um pingo de poeira."
2001903-59 = "[s3] \"A Akane daquela época também era fofa.\"\n[s4] \"A Akane de agora também é fofa.\""
2001903-64 = "M-Mestre? Dizer algo assim de repente... eu..."
2001903-65 = "E-Espere um momento! Consegui umas folhas de chá especiais. Vou trazer agora mesmo!"
2001903-74 = "Aqui está a xícara de hoje. Por favor, aproveite."
2001903-80 = "Hehe, esse também é um dos meus aromas favoritos. Fico feliz que tenha gostado."
2001903-81 = "Na verdade, eu estava procurando por ele há muito tempo... e finalmente consegui."
2001903-82 = "Poder tomar esta xícara com o Mestre..."
2001903-83 = "Akane está muito feliz."
2001903-84 = "[s] \"Falando nisso, esse visual também é um dos favoritos da Akane?\""
2001903-85 = "Coelhinha?"
2001903-86 = "Bem... é uma sensação refrescante. Apenas mudar de roupa já muda o humor."
2001903-87 = "Também é fácil de se mover..."
2001903-88 = "Mas, como empregada, sinto que o uniforme de empregada também é importante."
2001903-89 = "O que o Mestre acha?"
2001903-90 = "[s] \"Hmm, eu...\""
2001903-91 = "Com certeza! Eu adoraria ouvir a sua opinião, Mestre."
2001903-92 = "Na verdade..."
2001903-93 = "Desde que você visitou o meu quarto, eu venho pensando nisso."
2001903-99 = "O que me diz, Mestre?"
2001903-100 = "Eu como empregada ou eu como coelhinha, qual você prefere?"
2001903-104 = "――Ambas têm seus encantos?"
2001903-105 = "I-isso me deixa feliz, mas..."
2001903-106 = "Mas, Mestre... Akane quer uma resposta clara."
2001903-107 = "Qual de mim é mais adequada para servir você?"
2001903-108 = "Eu quero ouvir diretamente da sua boca! Pyon pyon!"
2001903-109 = "[s] \"Pyon pyon...?\""
2001903-110 = "Sim. Afinal, agora eu sou a Akane coelhinha."
2001903-111 = "Então, será a empregada?#nOu será a coelhinha?"
2001903-115 = "(O rosto de Akane está a centímetros do meu)"
2001903-121 = "(Ué, minhas pálpebras ficaram pesadas de repente...)"
2001903-130 = "Ora, Mestre?"
2001903-134 = "Fufu... Você parece realmente exausto."
2001903-138 = "Eu também vou me retirar por hoje."
2001903-139 = "Boa noite, Mestre."
