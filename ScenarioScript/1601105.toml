[translation]
1601105-1 = "Autocontrole"
1601105-3 = "（Pouco antes do meio-dia no dia do Grande Festival Esportivo）"
1601105-4 = "（Encontrei Hasumi comendo seu almoço em um canto do banco）"
1601105-8 = "[ns1] \"Hasumi?\"\n[ns2] \"Ué, está comendo sozinha?\""
1601105-13 = "……Hm?"
1601105-14 = "Ah, Sensei…… olá."
1601105-15 = "Não esperava encontrar você aqui……"
1601105-16 = "Eu? #nComo preciso guiar outros alunos durante o intervalo do almoço, acabei comendo um pouco mais cedo."
1601105-20 = "Sensei……? O que houve……?"
1601105-21 = "Por que está me encarando assim…… Ah, é por causa do meu almoço?"
1601105-22 = "Como pode ver,"
1601105-26 = "são batata-doce, ovo cozido e tomate."
1601105-27 = "Ah…… bem……."
1601105-28 = "Por acaso você está preocupado com o que eu disse no MomoTalk mais cedo? #nSinto muito, acabei falando demais……"
1601105-29 = "[s3] \"Isso seria, por acaso, um cardápio de dieta?\"\n[s4] \"Mesmo estando tão ocupada…… isso é o suficiente para você?\""
1601105-32 = "Ah, sobre isso…… em termos de calorias, está tudo bem."
1601105-33 = "Na verdade, como hoje é um dia como este, estou até esperando que seja mais eficaz que o normal."
1601105-34 = "Só que……"
1601105-35 = "[s] \"Só que……?\""
1601105-42 = "Uau! Estou com tanta fome! #nO intervalo do almoço já vai começar!"
1601105-43 = "Quero comer carne logo, carne!"
1601105-44 = "Você realmente gosta muito de carne, não é……"
1601105-45 = "Já que é uma ocasião especial, eu trouxe muitos doces."
1601105-46 = "O quê!? Por que doces!? E essa quantidade toda! #nÉ por isso que você engorda!"
1601105-47 = "Como vou me exercitar bastante, as calorias são zero!"
1601105-48 = "Um dia de exercícios é o momento perfeito para comer doces!"
1601105-49 = "Nesse caso, não seria melhor comer carne?"
1601105-50 = "É o dia perfeito para doces!!"
1601105-51 = "Carne!!"
1601105-52 = "Doces!!"
1601105-56 = "Carne! Vamos comer churrasco!!"
1601105-57 = "Doces! Doces! Parfait!!"
1601105-62 = "…………"
1601105-63 = "[s5] \"Então é por ser um dia como este…… entendi…….\"\n[s6] \"Você enfrenta várias tentações no dia a dia, não é?\""
1601105-66 = "B-bem, independentemente do que aconteça ao meu redor, esta é uma batalha contra mim mesma…… #nÉ vergonhoso admitir que minha determinação vacila por causa de algo assim……"
1601105-67 = "Ainda não sou boa o suficiente…… que vergonha."
1601105-68 = "……Ah? Sobre o limão em conserva no mel de outro dia?"
1601105-69 = "Ah, aquilo era para as meninas do Comitê de Justiça, não era para eu comer……"
1601105-70 = "Além disso, como você deve saber, mel é muito calórico…… #nSe eu comesse aquilo, o propósito da minha dieta iria por água abaixo……"
1601105-71 = "[ns] \"…….\""
1601105-78 = "[ns7] Entrego o limão em conserva no mel que recebi.\n[ns8] \"Não quer comer um pouco comigo?\""
1601105-83 = "!? S-Sensei……!? #nO-o que é isso……"
1601105-84 = "……Se dividirmos um, as calorias também serão divididas pela metade, não é……?"
1601105-85 = "B-bem, talvez seja verdade, mas……"
1601105-86 = "Isso foi algo que eu dei a você……!"
1601105-87 = "……N-não, não é que eu não queira……! #nÉ que……"
1601105-88 = "Ainda assim, como posso dizer…… isso……!"
1601105-92 = "……Haa."
1601105-93 = "Não é nada, acabei pensando em coisas estranhas de novo……"
1601105-94 = "Sinto muito."
1601105-95 = "Muito obrigada. Então, só um pouquinho..."
1601105-96 = "Só um pouquinho mesmo... vou aceitar."
1601105-105 = "[ns9] \"...Hasumi?\"\n[ns10] \"O que houve...?\""
1601105-108 = "Hmm..."
1601105-113 = "............!!"
1601105-114 = "Como eu só tenho comido comida de dieta, meu paladar se assustou com esse doce repentino...!"
1601105-115 = "Essa sensação... faz tanto tempo que eu não sentia..."
1601105-120 = "Ah... eu não consigo mais me segurar...!!"
1601105-128 = "[ns11] \"...Ha, Hasumi? Você está bem?\"\n[ns12] \"Hasumi, espere! Se comer tudo isso...!\""
1601105-139 = "...Ufa. Sinto como se... tivesse voltado à vida."
1601105-140 = "Estava delicioso... muito obrigada pela refeição."
1601105-144 = "............"
1601105-145 = "Ah..."
1601105-146 = "Se, Sensei...? Bem... isso é..."
1601105-147 = "Estava tão gostoso que... eu acabei... comendo tudo..."
1601105-151 = "Me desculpe..."
1601105-153 = "(Depois de consolar Hasumi dizendo que estava tudo bem, você se afasta da mesa)"
