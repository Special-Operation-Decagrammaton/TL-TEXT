[translation]
1601105-1 = "自己管理"
1601105-3 = "（大運動会当日のお昼前）"
1601105-4 = "（ベンチの片隅で、お弁当を食べているハスミを発見した）"
1601105-8 = "[ns1] \"ハスミ？\"\n[ns2] \"あれ、一人で食べてるの？\""
1601105-13 = "……ん？"
1601105-14 = "あ、先生……こんにちは。"
1601105-15 = "こんなところでお会いするとは……"
1601105-16 = "私ですか？#nお昼休みに他の生徒を案内しなければならないので、少し早くご飯をいただいていたんです。"
1601105-20 = "先生……？どうしたんですか……？"
1601105-21 = "そんなに見つめて……えっ、お弁当の中身？"
1601105-22 = "ご覧の通り、"
1601105-26 = "サツマイモとゆで卵、トマトです。"
1601105-27 = "ああ……えっと……。"
1601105-28 = "もしかして、先ほど送ったモモトークの件を気になさってます？#nすみません、私が余計なことを言ってしまったので……。"
1601105-29 = "[s3] \"これってもしかして、ダイエットメニュー？\"\n[s4] \"忙しそうなのに……これでご飯足りる？\""
1601105-32 = "あ、その……カロリー的には大丈夫です。"
1601105-33 = "むしろ、こういう日ですから、普段より効果があるのではと期待しているくらいです。"
1601105-34 = "ただ……。"
1601105-35 = "[s] \"ただ……？\""
1601105-42 = "わぁー！お腹空いた－！#nもうすぐお昼休みだね！"
1601105-43 = "早くお肉食べたい、お肉！"
1601105-44 = "あなたって本当にお肉好きね……"
1601105-45 = "せっかくだから私はスイーツをたくさん持ってきたんだ。"
1601105-46 = "えー！？どうしてスイーツ！？しかもすごい量！#nそんなんだから太るんだよ！"
1601105-47 = "いっぱい運動するんだからゼロカロリーだよ！"
1601105-48 = "運動する日こそ絶好のスイーツ日和じゃん！"
1601105-49 = "それだったらお肉のほうが良くない？"
1601105-50 = "スイーツ日和だよ！！"
1601105-51 = "お肉！！"
1601105-52 = "スイーツ！！"
1601105-56 = "お肉ー！焼肉でしょ！！"
1601105-57 = "スイーツ！スイーツ！パフェ！！"
1601105-62 = "…………"
1601105-63 = "[s5] \"こういう日だからって……そういう事か……。\"\n[s6] \"普段からいろんな誘惑があるんだね。\""
1601105-66 = "も、もちろん周囲がどうであれ、これは自分自身との戦いですし……#nこの程度で決意が揺らぐなんて……恥ずかしい事ではありますが……。"
1601105-67 = "まだまだ至らないようです……お恥ずかしい限りです。"
1601105-68 = "……え？この間のレモンのはちみつ漬け、ですか？"
1601105-69 = "あ、それは全部正義実現委員会の子たちの分で、自分で食べるつもりではなく……"
1601105-70 = "それに、ご存知だとは思いますが、はちみつはカロリーがとても高くて……#nアレを食べてしまったらダイエットの意味が……。"
1601105-71 = "[ns] \"……。\""
1601105-78 = "[ns7] もらったレモンのはちみつ漬けを渡す。\n[ns8] \"少しだけ、一緒に食べない？\""
1601105-83 = "！？せ、先生……！？#nそ、それは一体……。"
1601105-84 = "……一つを二人で分けるなら、カロリーも半分だから……？"
1601105-85 = "そ、それはそうかもしれませんが……。"
1601105-86 = "これは先生に差し上げたもので……！"
1601105-87 = "……い、いえ、決して嫌なわけではありませんが……！#nその……。"
1601105-88 = "やはり、なんと言いますか……その……！"
1601105-92 = "……はぁ。"
1601105-93 = "何でもありません、また変なことを考えてしまっておりました……"
1601105-94 = "すみません。"
1601105-95 = "ありがとうございます。#nそれでは、少しだけ……"
1601105-96 = "ほんの少しだけ……いただきますね。"
1601105-105 = "[ns9] \"……ハスミ？\"\n[ns10] \"どうしたの……？\""
1601105-108 = "ん……。"
1601105-113 = "…………！！"
1601105-114 = "ダイエット食ばかりだったので、急な甘味にお口がビックリしてしまって……！"
1601105-115 = "この感覚、本当に久しぶりの……。"
1601105-120 = "ああ……もう我慢できません……！！"
1601105-128 = "[ns11] \"……ハ、ハスミ？大丈夫？\"\n[ns12] \"ハスミ、待って！そんなに食べたら……！\""
1601105-139 = "……ふぅ。本当に……生き返った気分です……。"
1601105-140 = "美味しかったです……ごちそうさまでした。"
1601105-144 = "…………。"
1601105-145 = "あれ……。"
1601105-146 = "せ、先生……？あの……その……これは……。"
1601105-147 = "美味しすぎて……つい、全部……たべて、しまって……。"
1601105-151 = "ごめんなさい……。"
1601105-153 = "（大丈夫だよ、とハスミを慰めたあと席を離れた）"
