[translation]
10034190-1 = "1日前：出陣の時"
10034190-3 = "いよいよ最後の日だ、諸君。"
10034190-4 = "……長い、長い戦いだった。"
10034190-5 = "…………。"
10034190-6 = "…………。"
10034190-7 = "…………。"
10034190-9 = "雨にも負けず、風にも負けず、雪にも、えー……とにかく練習に励んだことにより。"
10034190-10 = "私たちは、ここまで強くなった。"
10034190-11 = "本番がどうなるのか、それは誰にも分からない……。"
10034190-12 = "それでも、私たちのやることは変わらない！"
10034190-13 = "セムラが待っている。"
10034190-14 = "……躊躇う理由は無し。"
10034190-15 = "怯まず走り抜け、この長い戦いに終止符を打とう！"
10034190-20 = "我々は必ずやセムラを手に入れる！"
10034190-21 = "百戦錬磨の放課後スイーツ団、出動！"
