[translation]
1006503-1 = "部長よりも部長らしいカホさん"
1006503-2 = "（カホに誘われて、陰陽部の部室に来た）"
1006503-8 = "[ns] \"カホ、お待たせ。\""
1006503-12 = "あ、先生、今日はお時間ありがとうございます。"
1006503-13 = "[s] \"ひょっとして取り込み中……？\""
1006503-14 = "あっ、大丈夫です。#n元々陰陽部の執務日ではないので。"
1006503-15 = "少々資料を整理していただけですから。"
1006503-20 = "……ふう。"
1006503-21 = "これで終わりです、お待たせしました。"
1006503-22 = "[s] \"うん、お疲れ様。\""
1006503-25 = "[ns] \"それでエスコートって？\""
1006503-26 = "先日シャーレにお伺いした際は、強引にこちらの意見を押し付けるような態度をお見せしてしまい……"
1006503-27 = "いま思い返しても……"
1006503-28 = "その……"
1006503-29 = "失態を晒してしまったな、と……。"
1006503-30 = "[s] \"失態だなんて、気にしないでよ。\""
1006503-31 = "いいえ、あれは紛れもなく失態です。"
1006503-32 = "あの日、部室に戻ってから、じっくり考えたところ結論が出ました。"
1006503-33 = "まず百鬼夜行とは何か、その魅力や広めたい理由は何なのか。"
1006503-34 = "協力関係の話をする前に、ご紹介するべきでした。"
1006503-35 = "[s] \"百鬼夜行の紹介を……？\""
1006503-36 = "はい。"
1006503-37 = "先生は以前、百鬼夜行の生徒たちを助けてくださったり、様々な問題を一緒に解決してくださいましたね。"
1006503-38 = "ですから、すでにご存知のことも多いかもしれませんが……"
1006503-39 = "それとこれとは別でして。"
1006503-40 = "まだ先生には、学園をしっかりと案内していないと気付きました。"
1006503-41 = "そこで本日は百鬼夜行を紹介したく思い、ご連絡したのです。"
1006503-42 = "[s] \"ああ、なるほど……エスコートってそういうことね。\""
1006503-44 = "[ns] \"気遣ってくれてありがとう、カホ。\""
1006503-48 = "い、いえ。"
1006503-49 = "これは広報支援部の戦略リーダーとして考え抜いた策……ではなく。"
1006503-50 = "計画……と言いましょうか。"
1006503-51 = "あくまで陰陽部として、先生に良い印象を与える作戦の一部です。"
1006503-52 = "[s] \"……本音が漏れてるよ。\""
1006503-56 = "こほん、何のことでしょう。"
1006503-60 = "こうしている場合ではありません、先生。準備が整い次第……"
1006503-65 = "[ns] \"お客さん？\""
1006503-66 = "そのようです……しかし、今日は休務日なのですが。"
1006503-67 = "どうぞ、お入りください。"
1006503-73 = "カホさん！た、助けてください！#n問題が起きてしまいまして……！"
1006503-74 = "生憎と本日の陰陽部は休務日で……"
1006503-75 = "す、すみません。でもそこを何とか……。"
1006503-79 = "……はい、交友の方のお願いとあらば。"
1006503-80 = "先生……申し訳ありませんが、少々席を外しても良いでしょうか？"
1006503-81 = "[s] \"うん、焦らなくて大丈夫だよ。\""
1006503-82 = "はい、では失礼して……。"
1006503-85 = "（休日に仕事の連絡を受けると……）"
1006503-86 = "（ついでにアレもコレもと頼まれるもので……）"
1006503-89 = "カホさん！"
1006503-90 = "お願いします！この書類に陰陽部の確認が必要でして……！"
1006503-91 = "副部長さん！部室の所有権を巡る問題で、陰陽部の確認が必要で……！"
1006503-92 = "ど、どうして今日に限って……こんなに……！？"
1006503-93 = "[s] \"仕事ってそういうものだよね。\""
1006503-94 = "先生……？"
1006503-96 = "（一つ終わらせたと思ったら、また別の仕事が押し寄せ……）"
1006503-97 = "（いくら処理しても、新たな問題がカホの耳に入ってきたが……）"
1006503-98 = "（全て迅速に的確な対応で乗り切った）"
1006503-101 = "どうぞ、この書類さえあれば、あちらの言い分は筋違いだと証明できます。"
1006503-103 = "あ、ありがとうございます！流石カホさん！"
1006503-104 = "カホさんが居なかったら……私たちは今頃……！"
1006503-105 = "何も出来ずに部室を奪われていたところです！"
1006503-106 = "このご恩、どうお返ししたら良いか……！"
1006503-107 = "お礼は結構ですよ。皆さん、これからも困ったことがありましたら、いつでも陰陽部を訪ねてくださいね。"
1006503-108 = "交友の方々を支援すること。#nそれが私たち陰陽部の役割ですから！"
1006503-109 = "はい、ありがとうございます！"
1006503-114 = "（そうして仕事の波が一段落し……）"
1006503-117 = "[ns] \"……カホはすごいね。\""
1006503-118 = "……？"
1006503-119 = "[s1] \"あれだけ大量の仕事が舞い込んでも……\"\n[s2] \"疲れた顔一つ見せずに全部やり遂げるなんて……\""
1006503-122 = "いいえ、そんな大したことでもありません。"
1006503-123 = "陰陽部として当然のことをしたまでです。"
1006503-124 = "[s] \"でも陰陽部って生徒会ではないんだよね……？\""
1006503-125 = "はい、その通りです。"
1006503-126 = "先生が仰るように、陰陽部は生徒会ではありません。"
1006503-127 = "なので他の学園の生徒会と違い、特別な権力は持っておりません。"
1006503-128 = "……厳密に言えば、「持てない」に近いのですが。"
1006503-129 = "[s] \"……？\""
1006503-130 = "問題が起きても、陰陽部が直接介入して事件を解決するようなことは出来ません。#n間に入って仲裁する程度です。"
1006503-131 = "なので必ずしも全ての問題を解決するのは難しく……#n出来ることは限られていますね。"
1006503-132 = "それでも、私たちは最善を尽くすのみです。"
1006503-133 = "悩みを抱える交友の方々のために、何が出来るのか……"
1006503-134 = "私たちの力では及ばない問題もあります。#nですが、もし助けを求められたのなら……"
1006503-135 = "全力でお応えするのが我々陰陽部の役割であり、責務ですから。"
1006503-136 = "[s] \"そっか……やっぱりカホはすごいよ。\""
1006503-137 = "いえ……そう何度も褒められるほどでは……。"
1006503-138 = "これくらいのこと、以前の百鬼夜行連合学院の状況と比べると……。"
1006503-139 = "そうです！カホさんはすごいです！"
1006503-140 = "えっ？"
1006503-141 = "カホさんのおかげで、色々な問題があっという間に解決されてますからね！"
1006503-142 = "カホさんが陰陽部の副部長になられてから、学院内の揉め事も減りましたし！"
1006503-143 = "いえ……それは皆さんの頑張りのおかげと言いますか……"
1006503-144 = "そもそも私は陰陽部の部長ではありませんし……"
1006503-145 = "だとしたら、もっとすごいです！"
1006503-146 = "部長よりも部長らしいカホさん！"
1006503-147 = "そ、そんな困ったお言葉を……。"
1006503-149 = "（次々と押し寄せる問題を全て解決した頃には、いつの間にか日が暮れていた）"
1006503-152 = "[ns] \"ふう……生徒はみんな帰ったみたいだね。\""
1006503-153 = "ですが……"
1006503-157 = "もう……こんな時間に……"
1006503-158 = "…………"
1006503-159 = "っ……ごめんなさい、先生。"
1006503-160 = "[s] \"カホ？\""
1006503-161 = "今日は先生に、百鬼夜行の素敵なところをご紹介したくて……"
1006503-162 = "エスコートするためにお呼びしたはずでしたが……"
1006503-163 = "またこうして……貴重なお時間を浪費させてしまうなんて……"
1006503-164 = "これでは、もう……"
1006503-165 = "[s] \"私に良い印象を与える作戦は失敗ってこと？\""
1006503-169 = "そっ、それは……"
1006503-170 = "[s] \"その作戦なら、大成功だよ。\""
1006503-171 = "……え？"
1006503-172 = "[s3] \"こんな遅くまでずっと頑張ってたのは……\"\n[s4] \"困っている生徒を見過ごせないから、だよね？\""
1006503-175 = "ですが……"
1006503-176 = "先生にご迷惑をおかけした事実は代わりありません。"
1006503-177 = "たとえ先生がお気になさらなくても……"
1006503-178 = "これは間違いなく私の落ち度です。申し訳ございません……[USERNAME]先生。"
1006503-179 = "[ns] \"カホは自分に厳しいんだね。\""
1006503-181 = "[ns] \"それなら、今日は貸しを作ったことにしよう。\""
1006503-182 = "貸し、ですか……？"
1006503-183 = "つまり……またエスコートの機会を頂けると？"
1006503-184 = "……本当に、それで良いのですか？"
1006503-185 = "[s] \"うん、また楽しみにしてるね。\""
1006503-189 = "そういうことなら……"
1006503-190 = "はい、分かりました。"
1006503-191 = "この失敗を踏み台に……次こそは…… "
1006503-192 = "次こそは、必ず完璧なエスコートをお約束します。"
1006503-193 = "[s] \"うん、また遊びに来るよ。\""
1006503-194 = "はい、私も……"
1006503-195 = "その時を、楽しみにしています。"
