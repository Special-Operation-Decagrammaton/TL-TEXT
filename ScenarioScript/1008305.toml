[translation]
1008305-1 = "隠したかった思い"
1008305-2 = "百鬼夜行・商店街"
1008305-4 = "（キキョウとの約束はキャンセルになったが、他の業務があったため百鬼夜行を訪れた）"
1008305-8 = "[ns] \"陰陽部の件は解決、と……\""
1008305-13 = "これはこれは、シャーレの先生じゃないですか。"
1008305-14 = "今日はどうされたんですか？"
1008305-15 = "[s] \"今日はシャーレの仕事があったもので。\""
1008305-16 = "はは、今日もお忙しそうですね。"
1008305-17 = "ですが、そのおかげで私たちは助かっていますし、ありがたいことです。"
1008305-18 = "そうでした。先日、問題児がまた暴れていたのですが、そのときは百花繚乱の方々にも助けていただきましてね。"
1008305-19 = "たしか……キキョウさん、だったか。#n的確に指示を出す姿が印象的で覚えていますよ。"
1008305-20 = "[s] \"そうだったんですね、キキョウが……\""
1008305-21 = "先生はたしか、百花繚乱の方ともよく一緒に居ましたよね？"
1008305-22 = "ちょうど良かった。"
1008305-29 = "こちら、当店の和菓子です。よろしければ受け取ってください。百花繚乱の皆さんにも、よろしくお伝えいただけると助かります。"
1008305-30 = "[s] \"あっ、はい。ありがたく頂きます。\""
1008305-31 = "今度は生徒さんと一緒にいらしてください。#nその際は、たっぷりおもてなし致しますので。はははっ。"
1008305-37 = "[ns] \"こんなにもらっちゃって良かったのかな……？\""
1008305-38 = "（思わぬ出来事に戸惑っていると……）"
1008305-42 = "あっ！先生だ！"
1008305-43 = "今日もパトロール？"
1008305-44 = "なんだ、違ったのか～じゃあキキョウさんは一緒じゃないんですね。"
1008305-45 = "キキョウさんに用事があったのかって？#nん～そうじゃないんですけど～前に助けてもらったから、お礼がしたくて。"
1008305-49 = "うーん……そうだ！"
1008305-53 = "これ、キキョウさんに渡そうと思ってたんだけど、直接渡すのはちょっと恥ずかしいし……"
1008305-54 = "[s] \"それじゃあ、代わりに渡しておくね。\""
1008305-58 = "ほんと！？ありがと、せんせ！"
1008305-60 = "おお、シャーレの先生じゃないか。今日も仕事かい？#nあはは、そうやって仕事ばっかしてたら、いつか倒れるかもしれないぞ？"
1008305-61 = "……なるほど、百花繚乱が戻ってきたから仕事量が減ったのか？#nそりゃ良かった！"
1008305-62 = "そういえば、キキョウって子に取引先とのトラブルを解決してもらったな……"
1008305-63 = "本当に賢いお嬢さんだ。"
1008305-68 = "よし、そうだな。仕入れてきたばかりの新鮮な魚をやろう！#n二匹渡すから、お嬢ちゃんと一緒に食べてくれ！"
1008305-70 = "[ns] \"百花繚乱が戻ってきてくれて良かった、か……\""
1008305-71 = "（色々なところで百花繚乱の活躍を聞き、自分のことのように嬉しくなった）"
1008305-75 = "[ns] \"……忙しいかもしれないけど、顔だけでも見せに行こうかな。\""
1008305-82 = "（……調停室を訪ねてみたが、反応は無かった）"
1008305-87 = "[ns] \"そろそろ戻ってると思ったんだけど……\""
1008305-92 = "[ns] \"勝手に入るのは失礼だし、また今度に……\""
1008305-93 = "（また今度にしようと思い、踵を返したところ……）"
1008305-99 = "う、うぅ…………"
1008305-103 = "[ns] \"……キキョウ？\""
1008305-112 = "はぁ……はあ……"
1008305-114 = "[ns] \"キキョウ！？\""
1008305-119 = "[ns] \"……すごい熱！？ちょっとごめんね？\""
1008305-141 = "……ここは？"
1008305-142 = "[s] \"キキョウ、大丈夫？気がついた？\""
1008305-146 = "先生……？どうしてあんたが……？"
1008305-147 = "百鬼夜行に用事があったの……？"
1008305-148 = "あんたって、本当に……"
1008305-153 = "ゲホッゲホッ……！"
1008305-154 = "[ns] \"こんなに体調が悪かったなら、言ってくれても……\""
1008305-155 = "……別に、これくらい。"
1008305-156 = "[s1] \"メッセージがおかしかったのは……\"\n[s2] \"約束を別の日にしようって言ってたのは……\""
1008305-157 = "おかしく、ない。"
1008305-158 = "……あれは、押し間違えただけ。"
1008305-159 = "誰にでもあるでしょ。"
1008305-160 = "ちょっと体調を崩したくらいで、先生は気にしすぎだから。"
1008305-161 = "でも結局、見られちゃうなんてね……"
1008305-162 = "それは……"
1008305-163 = "……もう、言い訳できないか。"
1008305-166 = "あんたにこんな姿……見せたくなかった。"
1008305-167 = "自分から約束したくせに、体調管理すらできない無責任な私を……"
1008305-168 = "……立っているのすらままならない、こんな醜態を晒しちゃって。"
1008305-169 = "あんたに迷惑を、かけるとか。"
1008305-170 = "これじゃあ……作戦参謀として失格だね。#nたかが風邪で……"
1008305-171 = "[s] \"日頃の疲れが溜まってるんじゃない？\""
1008305-175 = "疲れ？そんなわけないでしょう。"
1008305-176 = "百花繚乱の作戦参謀ともあろう者が……"
1008305-183 = "……なに、これ？"
1008305-184 = "[s] \"ここに来る途中で、みんなにもらったんだ。\""
1008305-188 = "（百花繚乱にお礼をしたいと言って渡された贈り物の量を見て、キキョウは目を丸くした）"
1008305-189 = "[ns] \"いつも頑張ってるんだね。\""
1008305-190 = "……当然でしょ。"
1008305-191 = "ここしばらく、まともに活動できてなかったから。"
1008305-192 = "……その埋め合わせをしただけ。"
1008305-193 = "私たちにできることなら何だってする。#n……そうでもしないと、信頼を取り戻せないし。"
1008305-194 = "[s] \"キキョウ……\""
1008305-195 = "ゲホ、ゲホッ！"
1008305-196 = "そう……ただ、それだけ。"
1008305-197 = "周りから甘く見られるのも、弱い姿を見せるのも嫌。"
1008305-198 = "まだ戻ってきたばかりだから仕方ない、なんて言われるのも嫌。"
1008305-199 = "これは私の意地。作戦参謀として、こう在りたいというワガママ。"
1008305-200 = "だから、もう十分。先生も忙しいんだし、これ以上は時間の無駄。#n私は別に一人でも……"
1008305-208 = "[ns] \"今は大人しく横になってて。\""
1008305-211 = "ちょ、ちょっと……い、今はそんなに近づかないで。"
1008305-212 = "[s] \"休息も大切なことくらい、キキョウも分かってるんだよね？\""
1008305-220 = "いや、あれは……"
1008305-221 = "それに……私の話、聞いてた？#n弱い姿を見せるのは嫌。それは、あんたも例外じゃない。"
1008305-222 = "[s] \"私はキキョウの事、弱いだなんて思ってないよ。\""
1008305-223 = "なっ……"
1008305-224 = "[s3] \"生徒が苦しんでたら、助けるものだから。\"\n[s4] \"先生として、当たり前でしょ？\""
1008305-227 = "[ns5] \"でも、もし頼りづらかったら……\"\n[ns6] \"都合の良いように使ってもらっても構わないよ。\""
1008305-230 = "[ns] \"「どんな手段だって厭わない」んでしょ？\""
1008305-231 = "……また、そうやって。"
1008305-232 = "それで、あんたに何の得があるの……？"
1008305-233 = "私には、何も返せない。"
1008305-234 = "そう……何も、返せないのに……"
1008305-235 = "私には、あんたに何もしてあげられないのに……"
1008305-239 = "…………。"
1008305-240 = "あんたみたいな人、初めて。"
1008305-244 = "変な人。"
1008305-245 = "……本当に。"
1008305-246 = "…………変な人。"
1008305-247 = "[s] \"わざわざ2回も言わなくても……\""
1008305-248 = "……ふん、思ったことを言っただけだから。"
1008305-249 = "……ゲホゲホッ！"
1008305-250 = "はあ……いいよ。#nどうぞ、勝手に、すれば……"
1008305-251 = "でも、ね……先生。"
1008305-252 = "あんたが言ったんだから。"
1008305-253 = "その言葉、後悔しないでね。"
1008305-254 = "百花繚乱の作戦参謀は……とても……"
1008305-255 = "こわい、ん……だから……"
1008305-258 = "…………。"
1008305-259 = "[s] \"うん。後悔しないよ、絶対に。\""
1008305-266 = "[ns] \"おやすみ、キキョウ。\""
