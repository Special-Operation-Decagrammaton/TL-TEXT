[translation]
1008305-1 = "Pensamentos que eu queria esconder"

1008305-2 = "Excursão noturna Hyakki/rua comercial"

1008305-4 = "(Meu encontro com Kikyo foi cancelado, mas visitei Hyakki Yako porque tinha outras tarefas a cumprir.)"

1008305-8 = "[ns] \"O problema da parte Yin-Yang foi resolvido...\""

1008305-13 = "Este não é o Sensei da placa de Petri?"

1008305-14 = "Como foi o seu dia?"

1008305-15 = "[s] \"Tive que trabalhar em placas de Petri hoje.\""

1008305-16 = "Haha, parece que você também está ocupado hoje."

1008305-17 = "No entanto, isso nos salvou e somos gratos por isso."

1008305-18 = "Era. Outro dia, a criança problemática estava agindo mal de novo e, naquela época, recebi ajuda do pessoal de Hyakka Ryouran."

1008305-19 = "Se bem me lembro... era Kikyo-san. #nLembro-me de como ele era impressionante ao dar instruções precisas."

1008305-20 = "[s] \"Isso mesmo, Kikyou...\""

1008305-21 = "Sensei, tenho certeza que você costuma sair com o pessoal de Hyakka Ryoran, certo?"

1008305-22 = "Estava certo."

1008305-29 = "Esses são os nossos doces japoneses. Por favor, aceite se quiser. Seria útil se você também pudesse desejar felicidades a todos em Hyakka Ryouran."

1008305-30 = "[s] \"Ah, sim. Obrigado.\""

1008305-31 = "Por favor, venha com seus alunos desta vez. #nNesse caso, ofereceremos muita hospitalidade. Hahaha."

1008305-37 = "[ns] \"Foi bom receber tanto...?\""

1008305-38 = "(Se você está confuso com um evento inesperado...)"

1008305-42 = "Ah! É o Sensei!"

1008305-43 = "Você está em patrulha hoje também?"

1008305-44 = "O que, isso está errado? Então Kikyo-san não está com você."

1008305-45 = "Kikyo-san tinha algo para fazer? #nNão, acho que não, mas você me ajudou antes, então queria agradecer."

1008305-49 = "Hum... isso mesmo!"

1008305-53 = "Eu estava pensando em dar isso para Kikyo-san, mas estou um pouco envergonhado de dar isso diretamente a ele..."

1008305-54 = "[s] \"Ok, em vez disso vou dar para você.\""

1008305-58 = "real! ? Obrigado, sensei!"

1008305-60 = "Ah, você não é o Sensei da placa de Petri? Você está trabalhando hoje também? #nAhaha, se você continuar trabalhando assim, um dia você pode desmaiar, certo?"

1008305-61 = "...Entendo, então a quantidade de trabalho diminuiu porque Hyakka Ryobi voltou? #nIsso foi ótimo!"

1008305-62 = "Pensando bem, uma garota chamada Kikyo resolveu um problema com um parceiro de negócios..."

1008305-63 = "Ela é uma garota muito inteligente."

1008305-68 = "Ok, isso mesmo. Vamos experimentar o peixe fresco que acabamos de comprar! #nVou te dar dois, para você comer com sua filha!"

1008305-70 = "[ns] \"Estou feliz que Hyakka Ryouran esteja de volta, hein...\""

1008305-71 = "(Quando ouvi sobre o sucesso de Hyakka Ryouran em vários lugares, fiquei feliz como se fosse meu.)"

1008305-75 = "[ns] \"...Posso estar ocupado, mas pensei em ir e mostrar meu rosto a você.\""

1008305-82 = "(...Visitei a sala de mediação, mas não houve resposta.)"

1008305-87 = "[ns] \"Achei que você voltaria logo...\""

1008305-92 = "[ns] \"É rude entrar sem permissão, então talvez da próxima vez...\""

1008305-93 = "(Decidi tentar novamente na próxima vez, então me virei...)"

1008305-99 = "Uh, uh………"

1008305-103 = "[ns] \"...campânula?\""

1008305-112 = "Suspiro...suspiro..."

1008305-114 = "[ns] \"Kikyo!?\""

1008305-119 = "[ns] \"...Estou com uma febre enorme!? Com ​​licença?\""

1008305-141 = "...Onde é isso?"

1008305-142 = "[s] \"Kikyo, você está bem? Você notou?\""

1008305-146 = "Sensei……? Por que você está...?"

1008305-147 = "Você teve algo a ver com Hyakki Yako...?"

1008305-148 = "Você realmente é..."

1008305-153 = "Gehogehoho…!"

1008305-154 = "[ns] \"Se você estivesse tão doente, mesmo que você me contasse...\""

1008305-155 = "...Isso é tudo que há para fazer."

1008305-156 = "[s1] \"A mensagem era estranha...\"\n[s2] \"Diz que deveríamos marcar uma consulta para outro dia...\""

1008305-157 = "Estranho, não."

1008305-158 = "...Isso foi apenas uma imprensa errada."

1008305-159 = "Todo mundo tem, certo?"

1008305-160 = "Eu simplesmente me senti um pouco mal e a Senseia ficou muito preocupada com isso."

1008305-161 = "Mas no final, não acredito que serei visto..."

1008305-162 = "isso é……"

1008305-163 = "...Não posso mais dar desculpas."

1008305-166 = "Eu não queria que você me visse assim..."

1008305-167 = "Apesar de ter prometido a mim mesmo, sou irresponsável e não consigo nem cuidar da minha saúde..."

1008305-168 = "...Não consigo nem ficar parado, me expondo a tamanha abominação."

1008305-169 = "Eu vou lhe causar problemas."

1008305-170 = "Isto... desqualifica-me como funcionário de operações. #nSó estou resfriado..."

1008305-171 = "[s] \"O cansaço diário não está aumentando?\""

1008305-175 = "Cansado? Isso não pode ser verdade."

1008305-176 = "Alguém que poderia ser considerado o pessoal operacional de Hyakka Ryouran..."

1008305-183 = "...O que é isso?"

1008305-184 = "[s] \"Todo mundo me deu no caminho para cá.\""

1008305-188 = "(Kikyo arregalou os olhos ao ver a quantidade de presentes que Hyakka Ryouran lhe deu para agradecer.)"

1008305-189 = "[ns] \"Você está sempre trabalhando duro.\""

1008305-190 = "...Claro, certo?"

1008305-191 = "Já faz algum tempo que não consigo trabalhar direito."

1008305-192 = "...Eu simplesmente compensei isso."

1008305-193 = "Faremos o que pudermos. #n...Se você não fizer isso, não será capaz de reconquistar a confiança."

1008305-194 = "[s] \"Kikyou...\""

1008305-195 = "Geô, Geô!"

1008305-196 = "Sim... isso é tudo."

1008305-197 = "Não quero que os outros me olhem levianamente ou mostrem meu lado fraco."

1008305-198 = "Não quero que me digam que não posso fazer nada porque acabei de voltar."

1008305-199 = "Esta é minha intenção. Como oficial de estratégia, sou egoísta e quero ser assim."

1008305-200 = "Então, basta. Os Senseies também estão ocupados, então mais seria uma perda de tempo. #nEu nem estou sozinho..."

1008305-208 = "[ns] \"Agora deite-se em silêncio.\""

1008305-211 = "Ei, ei... não chegue muito perto agora."

1008305-212 = "[s] \"Você sabe que descansar é importante, certo?\""

1008305-220 = "Não, isso..."

1008305-221 = "Além disso... você estava me ouvindo? #nNão gosto de mostrar meu lado fraco. Você não é exceção a isso."

1008305-222 = "[s] \"Eu não acho que Kikyou seja fraca.\""

1008305-223 = "O que..."

1008305-224 = "[s3] \"Se um aluno está com dificuldades, eu o ajudo.\"\n[s4] \"Como Sensei, isso não é normal?\""

1008305-227 = "[ns5] \"Mas se você acha difícil confiar em mim...\"\n[ns6] \"Você pode me usar como achar melhor.\""

1008305-230 = "[ns] \"Você está disposto a fazer o que for preciso, certo? \""

1008305-231 = "...Faça assim de novo."

1008305-232 = "Então, o que você ganha com isso...?"

1008305-233 = "Não posso devolver nada."

1008305-234 = "Sim... não posso devolver nada..."

1008305-235 = "Não posso fazer nada por você..."

1008305-239 = "…………."

1008305-240 = "É a primeira vez que vejo alguém como você."

1008305-244 = "Pessoa estranha."

1008305-245 = "……Realmente."

1008305-246 = "......Pessoa estranha."

1008305-247 = "[s] \"Você não precisa dizer isso duas vezes...\""

1008305-248 = "...Bem, eu acabei de dizer o que pensei."

1008305-249 = "... Gehogeho!"

1008305-250 = "Suspiro... Ok. #nPor favor, faça o que quiser..."

1008305-251 = "Mas... sensei."

1008305-252 = "Porque você disse isso."

1008305-253 = "Não se arrependa dessas palavras."

1008305-254 = "A equipe estratégica de Hyakka Ryouran é... muito..."

1008305-255 = "É assustador... então..."

1008305-258 = "…………."

1008305-259 = "[s] \"Sim. Você não vai se arrepender, com certeza.\""

1008305-266 = "[ns] \"Boa noite, Kikyo.\""

