[translation]
10013050-1 = "第5話;白い耳の怪物たち（１）"
10013050-7 = "（シズコの指示に従い、今度は物静かな海辺を訪れた）"
10013050-8 = "[ns] \"次の相手は「敗者を破滅に導く白い耳の怪物たち」……だっけ？\""
10013050-9 = "何と言いますか……何度聞いてもすごいお名前ですね。"
10013050-10 = "か、怪物……！はたして、イズナの忍術で退治できるでしょうか……？"
10013050-11 = "う～ん、それはわかりませんが……まあ、心配しなくても大丈夫ですよ！#nだって私たちにはチセさんがいますから！"
10013050-13 = "（……ごくり）"
10013050-19 = "……悪霊、退散？"
10013050-20 = "[s] \"とにかく、本当に怪物かどうかは行ってみれば分かるよ。\""
10013050-21 = "そうですね……温泉開発部だって、名前ばかりで実際目にしたら普通でしたし。"
10013050-22 = "そう考えると怪物というのも、名ばかりに違いありません。"
10013050-23 = "というか、そもそも幽霊だの怪物だのというものが存在するわけ――"
10013050-29 = "う、うあぁ……"
10013050-36 = "い、行かなきゃ……"
10013050-40 = "会場……に……"
10013050-46 = "……ね、ねえ。さっきのあれ……何？"
10013050-47 = "社長！どうやら一人だけじゃないみたいです……！"
10013050-52 = "は、早く……"
10013050-57 = "乗り遅れないよう……向かわないと……"
10013050-63 = "また一人……あの姿は、まるで……"
10013050-64 = "[s] \"何かに取り憑かれたように見えるね。例えば、怪物、とか。\""
10013050-66 = "はぇっ！？か、かか、怪物なんてものが存在するわけないじゃないですか！"
10013050-72 = "これは……船の汽笛です！あちらから聞こえます！"
10013050-78 = "わぁ……大きな船……。"
10013050-79 = "船体には――"
10013050-81 = "「ゴールデンフリース」号と書かれていますね。"
10013050-82 = "[s] \"ゴールデンフリース？どこかで聞いたような……。\""
10013050-87 = "乗船可能時間は残り30分ですー！"
10013050-88 = "本日のゲームに参加されるお客様は、遅れないようお願いいたします！"
10013050-93 = "うおおお……"
10013050-101 = "みなさん、まるで操り人形のような動きで船に乗っていきます！"
10013050-102 = "どど、どうしましょう！？社長！"
10013050-103 = "かなり怪しいけど……でも、このままじっとしているわけにはいかないわ！#n私たちには目的があるんだから！"
10013050-104 = "みんな、行くわよ！"
10013050-105 = "[s] \"うん。\""
10013050-119 = "[ns] \"すごく賑やかだね。\""
10013050-139 = "ここにいる方々は、何かに取り憑かれたかのように集中しているみたいですが……。"
10013050-140 = "一体ここで何が行われているんでしょう……？"
10013050-141 = "騒々しい雰囲気……魂が抜けたような乗客……#nそして外で聞いた「ゲーム」という言葉……"
10013050-142 = "――も、もしかして、ここって、違法なことをしている場所なんじゃ……！"
10013050-143 = "[s] \"ん？向こうで何か叫んでるよ。\""
10013050-148 = "で、では、今度はこちらの番だ……！"
10013050-149 = "じ、「人面カタツムリ」を特殊召喚！#n同時に――お、踊って！「人面カタツムリ」の、防御力を、上げる！"
10013050-150 = "な、なら拙者は！「優等生カマキリ」を召喚するでござる！"
10013050-151 = "同時に、この場でブリッジをすると……！優等生カマキリの、スピードが上昇！"
10013050-152 = "これで――攻撃するでござる！"
10013050-157 = "……はい？"
10013050-158 = "あっ、あれ見たことあります。たしか、カエデちゃんがやってた……"
10013050-159 = "ムシクイーンというゲームですね！"
10013050-160 = "ムシ……クイーン？"
10013050-161 = "[s] \"なるほど、そういうことだったのか。\""
10013050-162 = "ちょ、ちょっと待って！そもそも、なんでこんなところでそんなものを？"
10013050-163 = "しかも、あんな真面目な……いや魂が抜けたような状態で！？"
10013050-164 = "カエデちゃんはよく、こう口にしていました。"
10013050-165 = "ムシクイーンとは、互いの名誉と信念をかけて繰り広げられる――#n……恐ろしいゲームなのだと！"
10013050-166 = "ですです！ゲームで敗北した人は、カードに閉じ込められてしまうなんてこともある苛酷なゲームなんですよ！フィーナがそう言ってました！"
10013050-168 = "そ、そんなに恐ろしいものなのですか……！"
10013050-169 = "いやいやいや、それはあくまでアニメの話でしょう！？"
10013050-170 = "[s] \"でも、どうしてこんなところでムシクイーンの大会が……\""
10013050-176 = "お待たせしました！ムシクイーンバトラーの皆さん！"
10013050-182 = "本日もお互いのデッキをかけて繰り広げられる熱き戦場――"
10013050-183 = "「シークレット・ムシクイーン大会」へようこそ！"
10013050-184 = "シ、シークレット……？"
10013050-185 = "ご存知のようにこの船で開かれるムシクイーン大会は通常の大会とは異なります！"
10013050-186 = "そう、ここは勝者と敗者！その明暗が完璧に分かれる場所！#n勝者が全てを手に入れ、敗者が全てを奪われる場所でございます！"
10013050-187 = "つまり！敗者はお持ちのデッキとカードを全て奪われてしまうのです！#nああ！なんと恐ろしい！"
10013050-188 = "…………それってそんなに恐ろしいの？"
10013050-189 = "[s1] \"さ、さあ……？\"\n[s2] \"デッキという名の魂を奪うとは、なんて恐ろしい……！\""
10013050-190 = "そうまでしてこんな大会に参加する理由って一体何なんでしょうか……？"
10013050-191 = "先生は理解できるんですか！？"
10013050-192 = "それならそれで、なんでこんな大会に参加するのか全然理解できないんですけど！"
10013050-193 = "しかし、敗者に罰があるのなら……#n当然！勝者には褒美が用意されているものです！"
10013050-194 = "この大会で見事勝利を収めた方には、ムシクイーン限定カードパックに加えて……"
10013050-199 = "この闘技場を運営できる権利書――#n「リゾート使用権」も賞品として差し上げます！"
10013050-203 = "[ns] \"太っ腹な大会だね。\""
10013050-204 = "な、なんですってええええええ！？っていうか、いいの！？#nそれ渡しちゃったら、運営側も色々マズイんじゃないの！？それでもいいの！？"
10013050-206 = "そりゃいいに決まってるだろ！#nムシクイーンバトラーにあるのは勝利か死、そのどちらかだけなんだから！"
10013050-211 = "な、なによ。あんた達……"
10013050-212 = "騒いでいる奴がいるという通報を受けてきた！"
10013050-213 = "この神聖な会場で騒ぐとは、一体何者だ！"
10013050-214 = "わ、私たちは――"
10013050-215 = "ふむ……見たところ、大会の参加者ではないな？"
10013050-216 = "[s] \"見た目で分かるものなの？\""
10013050-217 = "ムシクイーンバトラーなら、燃え上がる闘志が目に宿っているはずだからな！"
10013050-218 = "意味がわからないんですけど！？"
10013050-220 = "とにかく一般人はさっさと出て行ってもらおうか！"
10013050-221 = "今からここは戦場に変わるのだからな！"
10013050-222 = "[s] \"すでに戦場の真っ只中にいるみたいなんだけど……。\""
10013050-223 = "それともまさか……お前たち、「リゾート狩り」に来たのか？"
10013050-224 = "ならば余計見過ごすことはできん！#n大会を邪魔する奴らはすぐに船外に追い出してやる！"
10013050-232 = "つまり、やって来た子たちは問答無用で海の外に追い出してきたってこと！？#nあなた達、海賊か何か！？"
10013050-233 = "しゃ、社長どうします？現在進行形で絶体絶命っぽいのですけど……"
10013050-234 = "主殿！ここはイズナが全身全霊をもって、みんなを！"
10013050-236 = "ふぁぁ～……"
10013050-237 = "……お待ちください。"
10013050-238 = "ムシクイーン大会に参加する意志があるのなら、乗船を許してくださるのですか？"
10013050-239 = "[s] \"ミモリ？\""
10013050-241 = "ん？まあ……その通りだが。"
10013050-242 = "ムシクイーンバトラーなら我々が追い出す理由はないしな。"
10013050-244 = "みなさん、これはチャンスですよ。#n「リゾート狩り」という形で戦う必要がないのですから。"
10013050-245 = "この大会で優勝さえしてしまえば、穏便に契約書が取り戻せます。"
10013050-246 = "でも、私はムシクイーンなんてよく分からないわよ？やったことすらないし……"
10013050-247 = "その辺はご心配なく。だって、私たちの周りにはムシクイーンの専門家……ムシクイーンバトラーがいるじゃないですか。"
10013050-248 = "そう！修行部と、お祭り運営委員会に！"
10013050-249 = "[s] \"……まさか！\""
10013050-250 = "あっ！"
10013050-261 = "なるほど！わかりマシタ、委員長！"
10013050-262 = "そういうことなら、私たちに任せてよ！"
10013050-264 = "はい、よろしくお願いいたします。"
10013050-265 = "頼りにしてますよ！フィーナ、カエデ！"
10013050-266 = "[s] \"……本当にこれで大丈夫かな？\""
10013050-267 = "こうなったら後は野となれ山となれ、ですよ！"
10013050-268 = "とにかく挑戦です！"
