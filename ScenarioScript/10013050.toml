[translation]
10013050-1 = "Episódio 5; Os Monstros de Orelhas Brancas (1)"
10013050-7 = "(Seguindo as instruções de Shizuko, desta vez visitamos uma praia tranquila)"
10013050-8 = "[ns] \"O próximo adversário é 'Os Monstros de Orelhas Brancas que levam os perdedores à ruína'... era isso?\""
10013050-9 = "Como posso dizer... é um nome impressionante, não importa quantas vezes eu ouça."
10013050-10 = "M-monstros...! Será que o ninjutsu da Izuna consegue derrotá-los...?"
10013050-11 = "Hmm, não tenho certeza, mas... bem, não precisa se preocupar!#nAfinal, temos a Chise conosco!"
10013050-13 = "(...Gulp)"
10013050-19 = "...Espíritos malignos, afastem-se?"
10013050-20 = "[s] \"De qualquer forma, saberemos se são monstros de verdade quando chegarmos lá.\""
10013050-21 = "É verdade... O Departamento de Desenvolvimento de Fontes Termais também tinha um nome chamativo, mas eram pessoas normais quando os vimos."
10013050-22 = "Pensando bem, 'monstros' deve ser apenas um nome também."
10013050-23 = "Aliás, será que fantasmas ou monstros realmente existem--"
10013050-29 = "U-uuaah..."
10013050-36 = "P-preciso ir..."
10013050-40 = "Para o... local..."
10013050-46 = "...Ei, ei. Aquilo de agora... o que foi?"
10013050-47 = "Presidente! Parece que não é só uma pessoa...!"
10013050-52 = "R-rápido..."
10013050-57 = "Não posso perder o horário... preciso ir..."
10013050-63 = "Mais um... aquele jeito, é como se..."
10013050-64 = "[s] \"Parece que estão possuídos por algo. Por exemplo, monstros.\""
10013050-66 = "Hã!? M-m-monstros não existem, não é possível!"
10013050-72 = "Isso é... o apito de um navio! Vem dali!"
10013050-78 = "Uau... que navio grande..."
10013050-79 = "No casco está escrito--"
10013050-81 = "'Golden Fleece', está escrito ali."
10013050-82 = "[s] \"Golden Fleece? Acho que já ouvi esse nome em algum lugar...\""
10013050-87 = "O tempo para embarque é de apenas 30 minutos!"
10013050-88 = "Pedimos aos clientes que participarão do jogo hoje que não se atrasem!"
10013050-93 = "Uooooh..."
10013050-101 = "Todos estão entrando no navio como se fossem marionetes!"
10013050-102 = "O-o que faremos!? Presidente!"
10013050-103 = "É bem suspeito... mas não podemos ficar paradas aqui!#nNós temos um objetivo!"
10013050-104 = "Pessoal, vamos!"
10013050-105 = "[s] \"Certo.\""
10013050-119 = "[ns] \"Está muito movimentado aqui.\""
10013050-139 = "As pessoas aqui parecem estar concentradas como se estivessem possuídas por algo..."
10013050-140 = "O que será que está acontecendo aqui...?"
10013050-141 = "Essa atmosfera barulhenta... passageiros com o olhar vazio...#ne a palavra 'jogo' que ouvimos lá fora..."
10013050-142 = "--S-será que este lugar está envolvido em algo ilegal...!"
10013050-143 = "[s] \"Hm? Estão gritando algo ali.\""
10013050-148 = "E-então, agora é a minha vez...!"
10013050-149 = "Eu invoco especialmente o 'Caracol Humano'!#nAo mesmo tempo... d-dance! Aumente a defesa do 'Caracol Humano'!"
10013050-150 = "N-nesse caso, eu! Invoco o 'Louva-a-deus Estudante'!"
10013050-151 = "Ao mesmo tempo, se eu fizer uma ponte aqui...! A velocidade do Louva-a-deus Estudante aumenta!"
10013050-152 = "Com isso... eu ataco!"
10013050-157 = "...Sim?"
10013050-158 = "Ah, eu já vi isso antes. Acho que a Kaede estava fazendo..."
10013050-159 = "É um jogo chamado Mushiking!"
10013050-160 = "Mushi... king?"
10013050-161 = "[s] \"Entendo, então era isso.\""
10013050-162 = "Ei, espere um pouco! Antes de tudo, por que algo assim em um lugar como este?"
10013050-163 = "E ainda por cima, naquele estado sério... não, naquele estado como se a alma tivesse saído do corpo!?"
10013050-164 = "A Kaede costumava dizer o seguinte:"
10013050-165 = "Que Mushiking é um jogo aterrorizante, onde se coloca em jogo a honra e as crenças de cada um!"
10013050-166 = "Isso mesmo! É um jogo tão cruel que quem perde pode acabar sendo aprisionado dentro de uma carta! Foi a Phina quem disse isso!"
10013050-168 = "É, é algo tão aterrorizante assim...!"
10013050-169 = "Não, não, não, isso é só coisa de anime, não é!?"
10013050-170 = "[s] \"Mas por que um torneio de Mushiking em um lugar como este...\""
10013050-176 = "Obrigado pela espera! A todos os batalhadores de Mushiking!"
10013050-182 = "Bem-vindos ao campo de batalha ardente, onde hoje também se coloca em jogo o próprio deck..."
10013050-183 = "Ao \"Torneio Secreto de Mushiking\"!"
10013050-184 = "Se-secreto...?"
10013050-185 = "Como vocês sabem, o torneio de Mushiking realizado neste navio é diferente dos torneios comuns!"
10013050-186 = "Sim, este é o lugar onde vencedores e perdedores têm seus destinos traçados! Onde o vencedor leva tudo e o perdedor perde tudo!"
10013050-187 = "Ou seja! O perdedor terá todo o seu deck e suas cartas confiscados! Ah! Que horror!"
10013050-188 = "............Isso é tão aterrorizante assim?"
10013050-189 = "[s1] \"Be-bem...\"\n[s2] \"Ter a alma, que chamam de deck, roubada... que terrível...!\""
10013050-190 = "Qual seria o motivo para alguém participar de um torneio desses...?"
10013050-191 = "Sensei, você consegue entender!?"
10013050-192 = "Se for assim, eu não consigo entender de jeito nenhum por que alguém participaria de um torneio desses!"
10013050-193 = "Porém, se há uma punição para o perdedor... naturalmente, há uma recompensa preparada para o vencedor!"
10013050-194 = "Para aquele que alcançar a vitória neste torneio, além de um pacote de cartas limitado de Mushiking..."
10013050-199 = "Daremos como prêmio a escritura que permite gerenciar esta arena: o \"Direito de Uso do Resort\"!"
10013050-203 = "[ns] \"É um torneio bem generoso.\""
10013050-204 = "O-o que você disseeeee!? Quer dizer, tudo bem!? Se entregarem isso, não vai ser um problema para a organização!? Mesmo assim, tudo bem!?"
10013050-206 = "Claro que está tudo bem! Pois para um batalhador de Mushiking, só existe vitória ou morte!"
10013050-211 = "O-o que foi? Vocês..."
10013050-212 = "Recebemos uma denúncia de que havia gente fazendo barulho!"
10013050-213 = "Quem são vocês para fazer barulho neste local sagrado!"
10013050-214 = "N-nós somos..."
10013050-215 = "Hum... pelo que vejo, vocês não são participantes do torneio, não é?"
10013050-216 = "[s] \"Dá para saber só de olhar?\""
10013050-217 = "Se fossem batalhadores de Mushiking, teriam um espírito de luta ardente nos olhos!"
10013050-218 = "Eu não estou entendendo nada!?"
10013050-220 = "De qualquer forma, pessoas comuns, tratem de sair logo daqui!"
10013050-221 = "Porque a partir de agora, este lugar se tornará um campo de batalha!"
10013050-222 = "[s] \"Parece que já estamos no meio de um campo de batalha...\""
10013050-223 = "Ou será que... vocês vieram para a \"Caça ao Resort\"?"
10013050-224 = "Se for esse o caso, não posso deixar passar! Vou expulsar do navio quem atrapalhar o torneio!"
10013050-232 = "Quer dizer que as pessoas que vieram aqui foram expulsas para o mar sem mais nem menos!? Vocês são piratas ou algo do tipo!?"
10013050-233 = "Pre-presidente, o que faremos? Parece que estamos em uma situação desesperadora..."
10013050-234 = "Mestre! Deixe que a Izuna use todo o seu poder para proteger a todos!"
10013050-236 = "Yaaawn..."
10013050-237 = "...Por favor, espere."
10013050-238 = "Se tivermos a intenção de participar do torneio de Mushiking, vocês nos permitirão ficar no navio?"
10013050-239 = "[s] \"Mimori?\""
10013050-241 = "Hm? Bem... é isso mesmo."
10013050-242 = "Se forem batalhadores de Mushiking, não temos motivos para expulsá-los."
10013050-244 = "Pessoal, esta é a nossa chance. Assim, não precisaremos lutar na forma de \"Caça ao Resort\"."
10013050-245 = "Se vencermos este torneio, poderemos recuperar o contrato pacificamente."
10013050-246 = "Mas eu não entendo nada de Mushiqueen, sabe? Nunca nem joguei..."
10013050-247 = "Não se preocupe com isso. Afinal, temos especialistas em Mushiqueen ao nosso redor... temos batalhadores de Mushiqueen, não temos?"
10013050-248 = "Isso mesmo! O Clube de Treinamento e o Comitê Organizador do Festival!"
10013050-249 = "[s] \"...Não pode ser!\""
10013050-250 = "Ah!"
10013050-261 = "Entendido! Compreendido, Presidente!"
10013050-262 = "Se é assim, pode deixar com a gente!"
10013050-264 = "Sim, conto com vocês."
10013050-265 = "Estou contando com vocês! Fina, Kaede!"
10013050-266 = "[s] \"...Será que isso vai dar certo mesmo?\""
10013050-267 = "Agora que chegamos a esse ponto, o que tiver que ser, será!"
10013050-268 = "De qualquer forma, vamos aceitar o desafio!"
