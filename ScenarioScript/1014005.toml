[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1014005-1 = "Uma Raposa Autoconsciente" 
1014005-2 = "Estação de Metrô perto da Schale" 
1014005-3 = "（A caminho da Schale de metrô,\napós terminar um trabalho externo……）" 
1014005-9 = "（Avistei a Kurumi dentro de uma\ncabine de fotos na estação.）" 
1014005-10 = "Ugh……\nQue nervosismo……" 
1014005-11 = "Olhe para frente……" 
1014005-13 = "（……Sentada na frente da máquina,\nKurumi parecia um tanto tensa.）" 
1014005-19 = "……Aí vou eu!" 
1014005-20 = "[ns] Me aproximo da Kurumi." 
1014005-25 = "― [log=쿠루미]Eh, [wa:630]aí vou eu![/log]" 
1014005-29 = "[wa:2510]― [log=쿠루미]Ah! [wa:460]Q-Q[wa:480]-Que susto, Sensei, [wa:1120]desde quando você está aí?[/log]" 
1014005-32 = "[ns] \"Você está nervosa……？\"" 
1014005-33 = "[wa:830]― [log=쿠루미]E-Eu [wa:460]não estou [wa:750]nem um pouco nervosa![/log]" 
1014005-35 = "― [log=쿠루미]É só…… [wa:1130]que é difícil acertar o tempo……[/log]" 
1014005-38 = "[wa:210]― [log=안내 음성]<A foto será tirada em―― [wa:1980]3, [wa:1370]2, [wa:1090]1.>[/log]" 
1014005-40 = "― [log=쿠루미]N-[wa:840]Nih![/log]" 
1014005-43 = "[wa:860]― [log=쿠루미]Ugh…… [wa:1020]Fechei os olhos de novo……[/log]" 
1014005-45 = "― [log=쿠루미]Essa contagem regressiva [wa:1650]me deixa muito ansiosa……[/log]" 
1014005-48 = "[wa:1550]― [log=쿠루미]Ah, [wa:280]não! [wa:660]Eu já disse que não estou nervosa![/log]" 
1014005-50 = "― [log=쿠루미]É só que [wa:620]eu acabo fechando os olhos――[/log]" 
1014005-53 = "[wa:570]― [log=안내 음성]<A foto será tirada em――>[/log]" 
1014005-55 = "― [log=쿠루미]Aí vem![/log]" 
1014005-58 = "― [log=안내 음성]<3, [wa:1220]2, [wa:1040]1.>[/log]" 
1014005-60 = "― [log=쿠루미]N-[wa:610]Nih![/log]" 
1014005-63 = "[wa:550]― [log=쿠루미]Argh! [wa:920]Fechei de novo……[/log]" 
1014005-65 = "― [log=쿠루미]Por que isso tá acontecendooo?! [/log]" 
1014005-68 = "Uuu, falhei de novo……" 
1014005-69 = "E eu nem tenho muito dinheiro……" 
1014005-70 = "[s] \"Por que você\nestá fechando os olhos?\"" 
1014005-71 = "……Eu acabo reagindo ao flash." 
1014005-72 = "Como sou Pointman, frequentemente recebo ataques com granadas de luz.\nO próprio escudo que eu uso tem um flash embutido." 
1014005-73 = "Desde a SRT, fui treinada para fechar os olhos\ne virar o rosto instantaneamente……" 
1014005-74 = "Por isso, acabo fechando os olhos\nna hora de tirar fotos também." 
1014005-75 = "[s] \"Até em\nfotos normais?\"" 
1014005-76 = "Não.\nSe não tiver flash, tudo bem……" 
1014005-77 = "Mas essas cabines de foto 3x4\nsempre usam flash, não é?" 
1014005-78 = "Acho que isso me deixa\nainda mais ansiosa……" 
1014005-79 = "Uuu……\nEu sabia que essas cabines eram uma má ideia." 
1014005-80 = "[s] \"Kurumi, você pode ficar\nencostada naquela parede ali?\"" 
1014005-81 = "Parede?\nAssim……？" 
1014005-85 = "[ns] \"Um pouquinho mais para o lado,\nna parte branca.\"" 
1014005-89 = "Eh? Do nada?\nNão estou entendendo……" 
1014005-90 = "Sensei,\no que você acha que――" 
1014005-94 = "……Ah!" 
1014005-95 = "O-O que você está fazendo de repente?!\nTirando foto com o celular?!" 
1014005-96 = "[s] \"Desculpe a surpresa.\"" 
1014005-100 = "[ns] \"Mas a foto\nficou ótima.\"" 
1014005-101 = "Como se eu fosse acreditar nisso\ndepois de uma foto surpresa dessas――！" 
1014005-105 = "……Ué?\nÉ verdade. Ficou boa mesmo." 
1014005-106 = "[s1] \"Cada um tem seu próprio tempo para relaxar.\"\n[s2] \"Sua expressão natural é a mais linda de todas, Kurumi.\"" 
1014005-108 = "L-Linda……?\nNão diga absurdos……!" 
1014005-109 = "Acha que eu vou te perdoar só por falar essas coisas?\nE o que você pretende fazer com uma foto de celular, afinal?" 
1014005-110 = "[s3] \"Alguns lugares imprimem fotos diretamente do celular.\"\n[s4] \"Vamos enviar esse arquivo e pedir para imprimirem como foto 3x4.\"" 
1014005-113 = "Eh?\nSe você tinha uma ideia dessas, por que não disse antes?!" 
1014005-114 = "……Bem,\nacho que a culpa também é minha por não ter explicado direito." 
1014005-115 = "Mas quem diria que seria resolvido\ntão fácil assim……" 
1014005-116 = "Que desperdício de\ntempo e dinheiro……" 
1014005-117 = "[s] \"Mas, para mim,\nfoi muita sorte.\"" 
1014005-118 = "Sorte por quê?" 
1014005-119 = "[s] \"Porque eu ganhei uma foto da Kurumi.\"" 
1014005-120 = "I-Isso é……" 
1014005-121 = "U-Uuuu……" 
1014005-122 = "Não vá usar isso\npara nada estranho, ouviu bem?!" 
1014005-124 = "（Depois disso, retornei à Schale junto com\numa Kurumi completamente envergonhada.）" 