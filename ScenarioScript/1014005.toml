[translation]
1014005-1 = "A Self-Conscious Fox"
1014005-2 = "Inside a subway station near Schale"
1014005-3 = "(After finishing some outside work, while taking the subway back to Schale...)"
1014005-9 = "(I saw Kurumi in a photo booth inside the subway station.)"
1014005-10 = "Ugh... I'm nervous..."
1014005-11 = "Look straight ahead..."
1014005-13 = "(...Kurumi seemed somewhat nervous sitting in front of the camera.)"
1014005-19 = "...Here goes!"
1014005-20 = "[ns] Approach Kurumi."
1014005-25 = "[wa:630]― [log=오토기]Eh, [wa:630]Ey![/log]"
1014005-29 = "[wa:2510]― [log=오토기]Wha-! [wa:460]Wh-[wa:480]What is it, Sensei, [wa:1120]how long have you been there?[/log]"
1014005-32 = "[ns] \"Are you nervous...?\""
1014005-33 = "[wa:830]― [log=오토기]I-[wa:460]It's not like [wa:750]I'm nervous or anything![/log]"
1014005-35 = "― [log=오토기]It's just... [wa:1130]the timing is a bit difficult...[/log]"
1014005-38 = "[wa:210]― [log=안내 음성]<Taking photo in——[wa:1980]3, [wa:1370]2, [wa:1090]1.>[/log]"
1014005-40 = "― [log=오토기]E-[wa:840]Eek![/log]"
1014005-43 = "[wa:860]― [log=오토기]Ugh... [wa:1020]I closed my eyes again...[/log]"
1014005-45 = "― [log=오토기]Getting counted down [wa:1650]somehow makes me nervous...[/log]"
1014005-48 = "[wa:1550]― [log=오토기]Ah, [wa:280]no! [wa:660]It's not like I'm nervous![/log]"
1014005-50 = "― [log=오토기]It's just [wa:620]that I keep closing my eyes——[/log]"
1014005-53 = "[wa:570]― [log=안내 음성]<Taking photo in——>[/log]"
1014005-55 = "― [log=오토기]Here it comes![/log]"
1014005-58 = "― [log=안내 음성]<3, [wa:1220]2, [wa:1040]1.>[/log]"
1014005-60 = "― [log=오토기]E-[wa:610]Eek![/log]"
1014005-63 = "[wa:550]― [log=오토기]Jeez! [wa:920]I closed them again...[/log]"
1014005-65 = "― [log=오토기]Why does this keep happening-![/log]"
1014005-68 = "Ugh, I messed up again..."
1014005-69 = "And I don't have that much money left..."
1014005-70 = "[s] \"Why do you keep closing your eyes?\""
1014005-71 = "...I react to the flash."
1014005-72 = "Since I'm a pointman, I get hit by a flashbang a lot. #nThe shield I normally use has a flash on it too."
1014005-73 = "Ever since my time at SRT, I've been trained to close my eyes and look away..."
1014005-74 = "That's why I tend to close my eyes during photo shoots."
1014005-75 = "[s] \"Even during normal photo shoots?\""
1014005-76 = "No. If there's no flash, I'm fine..."
1014005-77 = "But these photo booths always have a flash, don't they?"
1014005-78 = "So it seems that makes me even more nervous..."
1014005-79 = "Ugh... this is exactly why I didn't want to use a photo booth."
1014005-80 = "[s] \"Kurumi, could you stand over there by the wall for a second?\""
1014005-81 = "The wall? Like this...?"
1014005-85 = "[ns] \"Just a bit more to the side, by the white wall.\""
1014005-89 = "Eh? What is this all of a sudden? I don't get it..."
1014005-90 = "Sensei, what exactly are you——"
1014005-94 = "...Eh!"
1014005-95 = "Wh-What was that for all of a sudden! Taking a picture with your smartphone!"
1014005-96 = "[s] \"Sorry for doing that so suddenly.\""
1014005-100 = "[ns] \"But the photo came out perfect.\""
1014005-101 = "There's no way, you just took it out of nowhere——!"
1014005-105 = "...Huh? It's true. It came out looking great."
1014005-106 = "[s1] \"Everyone has their own timing for relaxing after all.\"\n[s2] \"Your natural expression is the most beautiful, Kurumi.\""
1014005-108 = "Beautiful, that's...!"
1014005-109 = "Did you think saying that would get you off the hook? #nWhat are we supposed to do with a smartphone photo anyway?"
1014005-110 = "[s3] \"There are businesses that will print out photos for you.\"\n[s4] \"Let's transfer this photo and have them make it into an ID photo.\""
1014005-113 = "Eh? If there was a way like that, you should have said so sooner!"
1014005-114 = "...No, I guess I'm also to blame for not explaining the details."
1014005-115 = "But to think it would be finished this easily..."
1014005-116 = "What a waste of time and money..."
1014005-117 = "[s] \"But I guess I was lucky.\""
1014005-118 = "What's lucky about it?"
1014005-119 = "[s] \"Because I managed to get a picture of you, Kurumi.\""
1014005-120 = "Th-That's..."
1014005-121 = "U-Uuuugh..."
1014005-122 = "Don't use it for anything weird!"
1014005-124 = "(After that, I headed back to Schale with an embarrassed Kurumi.)"