[translation]
1014005-1 = "意識するキツネ"
1014005-2 = "シャーレ近隣の地下鉄駅舎内"
1014005-3 = "（外回りの仕事を終え、地下鉄に乗ってシャーレに戻っている途中……）"
1014005-9 = "（地下鉄の駅舎内にある証明写真ボックスにいるクルミが見えた）"
1014005-10 = "うっ……緊張する……。"
1014005-11 = "ちゃんと前を見て……。"
1014005-13 = "（……写真機の前に座っているクルミはどこか緊張しているように見えた）"
1014005-19 = "……えい！"
1014005-20 = "[ns] クルミに近づく。"
1014005-25 = "― [log=쿠루미]えっ、[wa:630]えい！[/log]"
1014005-29 = "[wa:2510]― [log=쿠루미]なっ！[wa:460]な、[wa:480]なによ先生、[wa:1120]いつからいたの？[/log] "
1014005-32 = "[ns] \"緊張してるの……？\""
1014005-33 = "[wa:830]― [log=쿠루미]べ、[wa:460]別に[wa:750]緊張なんてしてないわ！[/log] "
1014005-35 = "― [log=쿠루미]ただ……[wa:1130]ちょっとタイミングが難しくて……。[/log] "
1014005-38 = "[wa:210]― [log=안내 음성]<撮影を行います――[wa:1980]3、[wa:1370]2、[wa:1090]1。>[/log]"
1014005-40 = "― [log=쿠루미]に、[wa:840]にっ！[/log] "
1014005-43 = "[wa:860]― [log=쿠루미]うっ……[wa:1020]また目瞑っちゃった……。[/log] "
1014005-45 = "― [log=쿠루미]数字を数えられると、[wa:1650]なんか緊張しちゃうのよね……。[/log] "
1014005-48 = "[wa:1550]― [log=쿠루미]あ、[wa:280]いや！[wa:660]緊張してるわけじゃないのよ！[/log]"
1014005-50 = "― [log=쿠루미]ただ、[wa:620]目を瞑っちゃうだけで――[/log]"
1014005-53 = "[wa:570]― [log=안내 음성]<撮影を行います――>[/log] "
1014005-55 = "― [log=쿠루미]来た！[/log] "
1014005-58 = "― [log=안내 음성]<3、[wa:1220]2、[wa:1040]1。>[/log] "
1014005-60 = "― [log=쿠루미]に、[wa:610]にっ！[/log] "
1014005-63 = "[wa:550]― [log=쿠루미]もう！[wa:920]また閉じちゃった……[/log]"
1014005-65 = "― [log=쿠루미]なんでなのよー！　[/log] "
1014005-68 = "うぅ、また失敗しちゃった……。"
1014005-69 = "あんまお金ないのに……。"
1014005-70 = "[s] \"目を瞑っちゃうのはなんで？\""
1014005-71 = "……フラッシュに反応しちゃうのよ。"
1014005-72 = "私はポイントマンだから、閃光攻撃を受けることが多いの。#n普段使っている盾にもフラッシュがついているし。"
1014005-73 = "SRTの頃から目を瞑って顔を背けるよう訓練されてきてて……。"
1014005-74 = "だから、写真撮影のときもつい目を閉じちゃうのよ。"
1014005-75 = "[s] \"普通の写真撮影の時も？\""
1014005-76 = "ううん。フラッシュがなければ大丈夫よ……。"
1014005-77 = "でも、こういう証明写真ボックスだと絶対フラッシュがついてるでしょう？"
1014005-78 = "だから余計に緊張しちゃうみたいで……。"
1014005-79 = "うぅ……だから証明写真ボックスはイヤだったのに。"
1014005-80 = "[s] \"クルミ、ちょっとそっちの壁側に立ってくれる？\""
1014005-81 = "壁？こう……？"
1014005-85 = "[ns] \"もうちょっと横の、白い壁の方。\""
1014005-89 = "え？何よいきなり。意味分かんないんだけど……。"
1014005-90 = "先生、これで一体何を――"
1014005-94 = "……うっ！"
1014005-95 = "い、いきなり何するのよ！スマホで撮るなんて！"
1014005-96 = "[s] \"急にごめんね。\""
1014005-100 = "[ns] \"でも写真は綺麗に撮れたよ。\""
1014005-101 = "急に撮ったのに、そんなわけ――！"
1014005-105 = "……あれ？本当だ。綺麗に写ってる。"
1014005-106 = "[s1] \"緊張が解けるタイミングは人それぞれだからね。\"\n[s2] \"クルミは自然な表情が一番綺麗だよ。\""
1014005-108 = "綺麗って、そんな……！"
1014005-109 = "そんなこと言ったら許されると思ったわけ？#nそもそもスマホの写真でどうするつもり？"
1014005-110 = "[s3] \"データを印刷してくれる業者さんもいるから。\"\n[s4] \"この写真を転送して、証明写真にしてもらおう。\""
1014005-113 = "え？そういう手があるなら早く言ってよ！"
1014005-114 = "……いや、まあ詳細を言わなかった私にも責任があるわね。"
1014005-115 = "でも、まさかこんな簡単に終わるなんて……。"
1014005-116 = "お金と時間がもったいなかったわね……。"
1014005-117 = "[s] \"でも私はラッキーだったかな。\""
1014005-118 = "なにがラッキーなのよ。"
1014005-119 = "[s] \"クルミの写真を1枚ゲットできたからね。\""
1014005-120 = "そ、そんな……。"
1014005-121 = "う、ううぅ……。"
1014005-122 = "変なことに使わないでよね！"
1014005-124 = "（その後、恥ずかしがるクルミと一緒にシャーレへと戻った）"
