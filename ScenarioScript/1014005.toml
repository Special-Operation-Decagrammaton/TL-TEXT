[translation]
1014005-1 = "raposa consciente"

1014005-2 = "Dentro do prédio da estação de metrô perto do Chalet"

1014005-3 = "(Depois de terminar meu trabalho externo, eu estava pegando o metrô de volta para a placa de Petri...)"

1014005-9 = "(Eu vi Kurumi na caixa de identificação dentro do prédio da estação de metrô)"

1014005-10 = "Ugh...estou nervoso..."

1014005-11 = "Olhe para frente...."

1014005-13 = "(...Kurumi, que estava sentada na frente da câmera, parecia nervosa de alguma forma.)"

1014005-19 = "……raio!"

1014005-20 = "[ns] Aproxime-se de Kurumi."

1014005-25 = "― [log=쿠루미]Eh, [wa:630]Ei! [/registro]"

1014005-29 = "[wa:2510]― [log=쿠루미]なっ！[wa:460]な、[wa:480]なによ先生、[wa:1120]いつからいたの？[/log] "
1014005-32 = "[ns] \"Você está nervoso...?\""

1014005-33 = "[wa:830]― [log=쿠루미]べ、[wa:460]別に[wa:750]緊張なんてしてないわ！[/log] "
1014005-35 = "― [log=쿠루미]Mas...[wa:1130]O momento foi um pouco difícil... [/log]"

1014005-38 = "[wa:210]― [log=안내 음성]<撮影を行います――[wa:1980]3、[wa:1370]2、[wa:1090]1。>[/log]"
1014005-40 = "- [log=쿠루미], [wa:840]! [/registro]"

1014005-43 = "[wa:860]― [log=쿠루미]うっ……[wa:1020]また目瞑っちゃった……。[/log] "
1014005-45 = "― [log=쿠루미]Quando tenho que contar números, [wa:1650] fico nervoso... [/log]"

1014005-48 = "[wa:1550]― [log=쿠루미]あ、[wa:280]いや！[wa:660]緊張してるわけじゃないのよ！[/log]"
1014005-50 = "― [log=쿠루미]Apenas [wa:620] apenas feche os olhos――[/log]"

1014005-53 = "[wa:570]― [log=안내 음성]<撮影を行います――>[/log] "
1014005-55 = "― [log=쿠루미]Aqui está! [/registro]"

1014005-58 = "― [log=안내 음성]<3, [wa:1220]2, [wa:1040]1. >[/log]"

1014005-60 = "- [log=쿠루미], [wa:610]! [/registro]"

1014005-63 = "[wa:550]― [log=쿠루미]もう！[wa:920]また閉じちゃった……[/log]"
1014005-65 = "― [log=쿠루미]Por quê? [/registro]"

1014005-68 = "Ugh, falhei de novo..."

1014005-69 = "Mesmo eu não tendo muito dinheiro..."

1014005-70 = "[s] \"Por que você fecha os olhos?\""

1014005-71 = "...Ele reage ao flash."

1014005-72 = "Eu sou um ponta-de-lança, então muitas vezes recebo ataques de flash. #nO escudo que costumo usar também tem flash."

1014005-73 = "Desde o SRT, fui treinado para fechar os olhos e virar a cabeça..."

1014005-74 = "É por isso que costumo fechar os olhos quando tiro fotos."

1014005-75 = "[s] \"Mesmo durante sessões de fotos normais?\""

1014005-76 = "Eca. Tudo bem, desde que não haja flash..."

1014005-77 = "Mas caixas de fotos de identificação como essa definitivamente vêm com flash, certo?"

1014005-78 = "É por isso que me sinto tão nervoso..."

1014005-79 = "Ugh... é por isso que não gostei da caixa com foto de identificação."

1014005-80 = "[s] \"Kurumi, você poderia, por favor, ficar aí perto da parede por um momento?\""

1014005-81 = "parede? assim……?"

1014005-85 = "[ns] \"Um pouco mais para o lado, em direção à parede branca.\""

1014005-89 = "foto? Que mudança repentina. Eu não entendo o que isso significa..."

1014005-90 = "Professor, o que diabos você está fazendo com isso?"

1014005-94 = "...Eca!"

1014005-95 = "O que você está fazendo de repente? Não acredito que tirei uma foto com meu smartphone!"

1014005-96 = "[s] \"Desculpe pela mudança repentina.\""

1014005-100 = "[ns] \"Mas as fotos ficaram lindas.\""

1014005-101 = "Mesmo que eu tenha tirado a foto de repente, não é isso!"

1014005-105 = "...Huh? É verdade. Parece lindo."

1014005-106 = "[s1] \"O momento em que a tensão é aliviada varia de pessoa para pessoa.\"\n[s2] \"A expressão natural de Kurumi é a mais bonita.\""

1014005-108 = "É tão lindo...!"

1014005-109 = "Você achou que seria perdoado por dizer isso? #nO que você planeja fazer com as fotos do seu smartphone?"

1014005-110 = "[s3] \"Existem empresas que imprimirão os dados para você.\"\n[s4] \"Vamos encaminhar esta foto e transformá-la em uma foto de identificação.\""

1014005-113 = "foto? Se você tiver esse método, por favor me avise!"

1014005-114 = "...Bem, também sou culpado por não dar detalhes."

1014005-115 = "Mas eu nunca esperei que isso terminasse tão facilmente..."

1014005-116 = "Foi uma perda de tempo e dinheiro..."

1014005-117 = "[s] \"Mas talvez eu tenha tido sorte.\""

1014005-118 = "O que é tanta sorte?"

1014005-119 = "[s] \"Consegui tirar a foto de uma noz.\""

1014005-120 = "Ah, é isso..."

1014005-121 = "Uh, uh..."

1014005-122 = "Não o use para coisas estranhas!"

1014005-124 = "(Depois, ele voltou para a placa de Petri com uma tímida Kurumi.)"

