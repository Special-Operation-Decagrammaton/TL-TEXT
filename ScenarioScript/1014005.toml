[translation]
1014005-1 = "The Self-Conscious Fox"
1014005-2 = "Inside a subway station near Schale"
1014005-3 = "(After finishing my field work, I'm on the subway heading back to Schale...)"
1014005-9 = "(I spotted Kurumi inside a photo booth at the subway station.)"
1014005-10 = "Ugh... I'm so nervous..."
1014005-11 = "Just keep looking forward..."
1014005-13 = "(...Kurumi, sitting in front of the camera, looked somewhat tense.)"
1014005-19 = "...Alright!"
1014005-20 = "[ns] Approach Kurumi."
1014005-25 = "― [log=쿠루미]Eek, [wa:630] alright![/log]"
1014005-29 = "[wa:2510]― [log=쿠루미]Wh-! [wa:460]Wh- [wa:480]What are you doing here, Sensei? [wa:1120]How long have you been there?[/log] "
1014005-32 = "[ns] \"Are you... nervous?\""
1014005-33 = "[wa:830]― [log=쿠루미]I- [wa:460]I'm not [wa:750]nervous at all![/log] "
1014005-35 = "― [log=쿠루미]It's just... [wa:1130]the timing is a little tricky...[/log] "
1014005-38 = "[wa:210]― [log=안내 음성]<Taking photo in—[wa:1980]3, [wa:1370]2, [wa:1090]1.>[/log]"
1014005-40 = "― [log=쿠루미]N- [wa:840]ngh![/log] "
1014005-43 = "[wa:860]― [log=쿠루미]Ugh... [wa:1020]I closed my eyes again...[/log] "
1014005-45 = "― [log=쿠루미]When it counts down like that, [wa:1650]I just get all tense...[/log] "
1014005-48 = "[wa:1550]― [log=쿠루미]Ah, [wa:280]no! [wa:660]It's not that I'm nervous![/log]"
1014005-50 = "― [log=쿠루미]It's just, [wa:620]I keep closing my eyes—[/log]"
1014005-53 = "[wa:570]― [log=안내 음성]<Taking photo in—>[/log] "
1014005-55 = "― [log=쿠루미]Here it comes![/log] "
1014005-58 = "― [log=안내 음성]<3, [wa:1220]2, [wa:1040]1.>[/log] "
1014005-60 = "― [log=쿠루미]N- [wa:610]ngh![/log] "
1014005-63 = "[wa:550]― [log=쿠루미]Geez! [wa:920]I closed them again...[/log]"
1014005-65 = "― [log=쿠루미]Why does this keep happening?! [/log] "
1014005-68 = "Ugh, I failed again..."
1014005-69 = "And I don't have much money left..."
1014005-70 = "[s] \"Why do you keep closing your eyes?\""
1014005-71 = "...I react to the flash."
1014005-72 = "As a point man, I'm often on the receiving end of flashbangs. #nThe shield I usually carry even has a built-in flash."
1014005-73 = "Ever since my SRT days, I've been trained to close my eyes and turn away..."
1014005-74 = "So, I end up doing it automatically during photo shoots, too."
1014005-75 = "[s] \"Even for regular photos?\""
1014005-76 = "No. It's fine if there's no flash..."
1014005-77 = "But these photo booths always have one, don't they?"
1014005-78 = "I think that's why I'm even more nervous than usual..."
1014005-79 = "Ugh... that's why I didn't want to use a photo booth."
1014005-80 = "[s] \"Kurumi, could you stand over by that wall for a second?\""
1014005-81 = "The wall? Like this...?"
1014005-85 = "[ns] \"A bit more to the side, against the white wall.\""
1014005-89 = "Huh? What's with the sudden request? I don't get it..."
1014005-90 = "Sensei, what on earth are you—"
1014005-94 = "...Ugh!"
1014005-95 = "Wh-what are you doing all of a sudden! Taking a picture with your phone!"
1014005-96 = "[s] \"Sorry for the surprise.\""
1014005-100 = "[ns] \"But the photo came out great.\""
1014005-101 = "You took it so suddenly, there's no way—!"
1014005-105 = "...Oh? You're right. It actually looks good."
1014005-106 = "[s1] \"Everyone has a different moment when they finally relax.\"\n[s2] \"You look best when you're being natural, Kurumi.\""
1014005-108 = "Best, you say...!"
1014005-109 = "Do you think saying that makes it okay? #nAnd what are you even going to do with a phone photo?"
1014005-110 = "[s3] \"There are services that can print them out for you.\"\n[s4] \"I'll send this file over and have it made into an ID photo.\""
1014005-113 = "Huh? If there's a way to do that, tell me sooner!"
1014005-114 = "...No, I guess it's my fault for not explaining the details."
1014005-115 = "Still, I can't believe it was that easy..."
1014005-116 = "What a waste of time and money..."
1014005-117 = "[s] \"But I think I got lucky.\""
1014005-118 = "What's so lucky about it?"
1014005-119 = "[s] \"Because I got a photo of you, Kurumi.\""
1014005-120 = "Th-that's..."
1014005-121 = "U-uuugh..."
1014005-122 = "Don't use it for anything weird!"
1014005-124 = "(Afterward, I headed back to Schale with a very embarrassed Kurumi.)"