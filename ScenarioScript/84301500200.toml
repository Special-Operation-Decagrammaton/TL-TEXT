[translation]
84301500200-5 = "アバンギャルド君から見つかった謎のチップ……。"
84301500200-6 = "データの更新状況をみるに、昨日か今日……#n少なくとも24時間以内に仕込まれたものね。"
84301500200-7 = "アバンギャルド君を暴走させた……狙いは一体……？"
84301500200-8 = "空売り、詐欺……それとも……何かのカモフラージュ？"
84301500200-9 = "時間をかければ、チップの出どころと製造元を追うこともできなくはないけれど……#n事は一刻を争う。"
84301500200-10 = "……そのチップは役に立てたのだろうか？"
84301500200-11 = "ええ、もちろん。"
84301500200-12 = "ただでさえ手がかりの少ない現状、明確な前進よ。"
84301500200-13 = "そうか……それは良かった。"
84301500200-17 = "いや……状況を鑑みるに良くはないな。済まない。"
84301500200-18 = "気にする必要はないわ。貴女個人は十分な働きをしてくれたもの。"
84301500200-19 = "経緯はどうあれ、今、貴女は作戦にメリットをもたらしている。#nそれは悪くないことよ。"
84301500200-20 = "……君も、変わりつつあるのだね。"
84301500200-21 = "それはお互い様じゃなくって？"
84301500200-22 = "……もう少しでネルが戻るはずよ。"
