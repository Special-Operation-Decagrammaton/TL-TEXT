[translation]
1601103-1 = "レモンのはちみつ漬け"
1601103-2 = "（ハスミに指定されたのは家庭科室だった）"
1601103-6 = "来てくださりありがとうございます、先生。"
1601103-13 = "[ns1] \"そのジャージ……。\"\n[ns2] \"ファスナー直らなかった……？\""
1601103-16 = "えっと、その……まだ新しいものが届いておらず……。"
1601103-17 = "その……"
1601103-18 = "気にしないでいただけますと、幸いです。"
1601103-19 = "あ、これですか？"
1601103-23 = "「レモンのはちみつ漬け」です。"
1601103-24 = "少し多めに作ったので、もしよろしければ。"
1601103-25 = "本当は明日お渡ししようと思ったのですが、大運動会当日はお忙しいでしょうし……"
1601103-26 = "負担でなければ、受け取っていただけると嬉しいです。"
1601103-27 = "[s3] \"負担なんかじゃないよ！ありがとう。\"\n[s4] \"ありがとう、いただきます。\""
1601103-30 = "良かったです……"
1601103-31 = "それではこちらの瓶を……"
1601103-36 = "……えっ？"
1601103-37 = "マネージャーとか、みんなのお姉さんみたい……ですか？"
1601103-38 = "たしかに……"
1601103-39 = "そういう事を少しはしていますが……。"
1601103-43 = "あっ……"
1601103-44 = "[s5] \"……ハスミ？\"\n[s6] （なんだか不吉な予感が……）"
1601103-47 = "……あの……もしかして。"
1601103-51 = "そう……見えるのでしょうか？"
1601103-52 = "生徒というよりは保護者というか……！！"
1601103-53 = "そんな風に……？"
1601103-54 = "[s7] \"は、ハスミ、落ち着いて……！\"\n[s8] \"そういう意味じゃないよ！！\""
1601103-57 = "ち、違うのですか？"
1601103-58 = "すみません……慌ててしまって。"
1601103-59 = "ふぅ……"
1601103-60 = "先生の前で取り乱してしまうなんて……申し訳ありません。"
1601103-61 = "こんな姿をお見せしたかったわけではないのですが……。"
1601103-62 = "はぁ……。"
1601103-63 = "……その。"
1601103-64 = "そういう意味ではないとしたら……"
1601103-65 = "[s9] \"そういう面倒見がいいところがハスミの魅力だと思うから。\"\n[s10] \"ハスミに面倒を見てもらえる生徒が羨ましいなって。\""
1601103-70 = "あ、ありがとうございます……別に大したことはしていませんよ。"
1601103-71 = "先生も、よろしければいつでも……"
1601103-72 = "……あ。"
1601103-73 = "あ、その、"
1601103-74 = "別に他意があるわけではなく……"
1601103-75 = "[s11] \"たまにはお願いしようかな？\"\n[s12] \"私はいつも歓迎だよ。ありがとう、ハスミ。\""
1601103-80 = "先生……。"
1601103-81 = "本当に、敵わないですね……"
1601103-82 = "いつもだったら、冗談はやめてくださいと断っていましたが……"
1601103-83 = "今日は、せっかくなので……"
1601103-84 = "先生がそう仰ってくださったのですから、前向きに覚えておきます。"
1601103-85 = "今度また、何か作ってシャーレに伺いますね。"
1601103-86 = "ふふ……その時は、よろしくお願いします。"
1601103-87 = "[s13] \"楽しみにしてるね！……普段よりちょっとテンション高い？\"\n[s14] \"制服じゃないからかな？\""
1601103-88 = "そう、見えるかもしれません。"
1601103-89 = "……これは格好とは関係ないお話です。"
1601103-90 = "……これは先生が悪いんですよ。"
1601103-91 = "とにかく、そういう事ですので。"
1601103-92 = "今日はお時間をいただき、ありがとうございました。"
1601103-98 = "それと……私に面倒を見る機会をくださり、ありがとうございます。"
1601103-100 = "（その後、ハスミと一緒に、正義実現委員会の分のレモンのはちみつ漬けを瓶に詰めた）"
1601103-101 = "（かなりの量があったものの、ハスミは作業中とても楽しそうだった）"
