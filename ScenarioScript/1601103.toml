[translation]
1601103-1 = "Limão em conserva no mel"
1601103-2 = "（O local indicado por Hasumi foi a sala de economia doméstica）"
1601103-6 = "Obrigada por vir, Sensei."
1601103-13 = "[ns1] \"Esse agasalho……\"\n[ns2] \"O zíper não consertou……?\""
1601103-16 = "Bem, é que…… o novo ainda não chegou……."
1601103-17 = "Isso……"
1601103-18 = "Ficaria feliz se você não se importasse com isso."
1601103-19 = "Ah, isso aqui?"
1601103-23 = "É \"limão em conserva no mel\"."
1601103-24 = "Fiz um pouco a mais, então, se quiser aceitar."
1601103-25 = "Na verdade, eu pretendia te entregar amanhã, mas como você estará ocupado no dia do Grande Festival Esportivo……"
1601103-26 = "Se não for um incômodo, ficaria feliz se pudesse aceitar."
1601103-27 = "[s3] \"Não é incômodo nenhum! Obrigado.\"\n[s4] \"Obrigado, vou aceitar.\""
1601103-30 = "Que bom……"
1601103-31 = "Então, aqui está o pote……"
1601103-36 = "……Eh?"
1601103-37 = "Pareço uma gerente ou uma irmã mais velha para todos……?"
1601103-38 = "Certamente……"
1601103-39 = "Eu faço esse tipo de coisa às vezes, mas……."
1601103-43 = "Ah……"
1601103-44 = "[s5] \"……Hasumi?\"\n[s6] （Sinto um presságio ruim……）"
1601103-47 = "……Ei…… por acaso."
1601103-51 = "É assim que…… eu pareço?"
1601103-52 = "Mais como uma responsável do que como uma aluna……!!"
1601103-53 = "Dessa forma……?"
1601103-54 = "[s7] \"H-Hasumi, calma……!\"\n[s8] \"Não foi nesse sentido!!\""
1601103-57 = "N-não foi?"
1601103-58 = "Desculpe…… acabei me apressando."
1601103-59 = "Ufa……"
1601103-60 = "Perder a compostura na frente do Sensei…… peço perdão."
1601103-61 = "Não era esse o tipo de imagem que eu queria te mostrar……."
1601103-62 = "Haa……."
1601103-63 = "……Isso."
1601103-64 = "Se não foi nesse sentido……"
1601103-65 = "[s9] \"Acho que esse seu lado prestativo é o seu charme, Hasumi.\"\n[s10] \"Tenho inveja das alunas que recebem seus cuidados.\""
1601103-70 = "Ah, obrigada…… não é nada demais, na verdade."
1601103-71 = "Sensei, se quiser, a qualquer momento……"
1601103-72 = "……Ah."
1601103-73 = "Ah, bem,"
1601103-74 = "Não que eu tenha segundas intenções……"
1601103-75 = "[s11] \"Quem sabe eu não peça um dia?\"\n[s12] \"Eu sempre aceito. Obrigado, Hasumi.\""
1601103-80 = "Sensei……."
1601103-81 = "Você realmente não tem jeito……"
1601103-82 = "Normalmente, eu teria recusado dizendo para parar com as brincadeiras……"
1601103-83 = "Mas hoje, já que estamos aqui……"
1601103-84 = "Já que você disse isso, vou levar em consideração."
1601103-85 = "Da próxima vez, farei algo e passarei no Schale."
1601103-86 = "Fufu…… nesse caso, conto com você."
1601103-87 = "[s13] \"Estou ansioso! ……Você está um pouco mais animada que o normal?\"\n[s14] \"Será que é porque não está de uniforme?\""
1601103-88 = "Talvez pareça que sim."
1601103-89 = "……Isso não tem nada a ver com a aparência."
1601103-90 = "……A culpa é sua, Sensei."
1601103-91 = "De qualquer forma, é isso."
1601103-92 = "Obrigada por reservar um tempo para mim hoje."
1601103-98 = "E também... obrigada por me dar a oportunidade de cuidar de você."
1601103-100 = "(Depois disso, junto com Hasumi, enchi potes com limões em conserva no mel para o Comitê de Justiça)."
1601103-101 = "(Embora fosse uma quantidade considerável, Hasumi parecia muito feliz durante o trabalho)."
