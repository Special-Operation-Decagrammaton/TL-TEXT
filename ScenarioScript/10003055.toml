[translation]
10003055-2 = "ふふふっ……やはり先生がいらっしゃる以上、厳しいですわね。"
10003055-5 = "では、一時撤退ということで……！"
10003055-7 = "ちっ、逃がすか……っ！"
10003055-8 = "いえ、待ってくださいイオリ。ここで追いかけて事態を大きくしてしまうと、それこそ委員長が気が付きかねません。"
10003055-9 = "[s1] \"とりあえず大騒ぎにならなくて良かったね……お疲れ様。\"\n[s2] \"美食研究会が作る焼きトウモロコシ、美味しそう……。\""
10003055-10 = "はぁ……美食研究会のやつらを捕まえ損ねたのは残念だけど、仕方ないな。"
10003055-11 = "はぁ……全く、先生は……。"
10003055-12 = "皆さん、お待たせしました……あら？"
10003055-13 = "何だか疲れた顔をしていますが、どうかしましたか？"
10003055-15 = "なるほど、美食研究会が……トウモロコシだか何だか知りませんが、とにかく。"
10003055-16 = "……あらためて、もうすぐ委員長も参加される歩行訓練の時間です。"
10003055-17 = "各位、もう少し頑張りましょう！委員長の穏やかな夏休みのために！"
10003055-18 = "はいはい、もうそれは分かったから……。"
10003055-19 = "では、戻りましょうか。"
10003055-23 = "（その後、ヒナと海辺のお散歩をする名目の歩行訓練が始まった。しかし、そこまでの間にヒナ以外の全員が身体を酷使していたせいで、ただ歩くだけで各位から悲鳴が上がる阿鼻叫喚状態だった）"
10003055-24 = "（そうして、日は暮れていき……）"
