[translation]
10003055-2 = "Fufufu... Como esperado, com o Sensei aqui, as coisas ficam difíceis."
10003055-5 = "Bem, então vamos recuar por enquanto...!"
10003055-7 = "Tsc, como se eu fosse deixar você escapar...!"
10003055-8 = "Não, espere, Iori. Se a perseguirmos agora e a situação escalar, a Presidente pode acabar percebendo."
10003055-9 = "[s1] \"Bem, pelo menos não virou uma confusão... Bom trabalho.\"\n[s2] \"O milho assado feito pelo Clube de Pesquisa Gourmet parece delicioso...\""
10003055-10 = "Haa... É uma pena que não conseguimos capturar o pessoal do Clube de Pesquisa Gourmet, mas não tem jeito."
10003055-11 = "Haa... Sério, Sensei..."
10003055-12 = "Pessoal, desculpem a espera... Ué?"
10003055-13 = "Vocês parecem cansados, aconteceu alguma coisa?"
10003055-15 = "Entendo, o Clube de Pesquisa Gourmet... Não sei se era milho ou o que quer que fosse, mas enfim."
10003055-16 = "...De qualquer forma, está quase na hora do treinamento de caminhada, no qual a Presidente também participará."
10003055-17 = "Pessoal, vamos nos esforçar mais um pouco! Pelo bem das férias de verão tranquilas da Presidente!"
10003055-18 = "Sim, sim, nós já entendemos isso..."
10003055-19 = "Então, vamos voltar?"
10003055-23 = "(Depois disso, começou o treinamento de caminhada, que na verdade era apenas um pretexto para passear na praia com Hina. No entanto, como todos, exceto Hina, haviam exaurido seus corpos até aquele momento, o simples ato de caminhar tornou-se um cenário de caos, com gritos de agonia vindo de todos os lados.)"
10003055-24 = "(E assim, o sol começou a se pôr...)"
