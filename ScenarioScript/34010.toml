[translation]
34010-1 = "Episódio 1; Prólogo"
34010-4 = "Ali estão eles!!"
34010-5 = "Por ali! Peguem-nos!!"
34010-10 = "J-já era... é um beco sem saída..."
34010-11 = "……O outro lado também. Estamos completamente cercados."
34010-12 = "Droga……."
34010-19 = "É melhor desistirem. #nVocês não vão escapar daqui."
34010-23 = "……."
34010-24 = "Ah, ahhh……."
34010-25 = "(Sussurro, sussurro……)"
34010-26 = "……Nossa munição quase acabou, e nossas forças estão no limite……."
34010-27 = "Os ferimentos da líder são graves. Desse jeito, em vez de fugir, a vida da líder corre perigo."
34010-33 = "……Ainda resta um último recurso. Com isso……."
34010-34 = "N-não pode ser."
34010-35 = "……Uma bomba para destruir o Halo."
34010-36 = "Misaki, Hiyori. Enquanto eu ganho tempo, levem a Princesa e…… saiam daqui."
34010-37 = "……Saori."
34010-38 = "Sair daqui…… e depois disso…… o que vem a seguir……."
34010-39 = "O que…… vem a seguir……."
34010-40 = "Saori."
34010-41 = "……Princesa?"
34010-46 = "Já chega. Nós nos esforçamos o suficiente."
34010-47 = "……."
34010-48 = "P-Princesa…… o que houve……?"
34010-53 = "O que «ela» quer sou eu…… não é?"
34010-54 = "Eu vou. Por isso, peço que deixem os outros membros irem."
34010-55 = "……."
34010-57 = "Atsuko!?…… O que você está fazendo!?"
34010-59 = "……Já chega, Saori. Tudo isso é inútil."
34010-60 = "O que nos espera depois de escaparmos daqui? Para onde vamos?"
34010-61 = "……."
34010-62 = "Trinity, Gehenna…… e até mesmo Arius estão nos caçando."
34010-63 = "Não existe lugar seguro para nós neste Kivotos. #nSó nos resta viver escondidas e fugindo até que nossas vidas cheguem ao fim."
34010-64 = "Mas isso só acontece por minha causa. Saori, Misaki, Hiyori. Tudo isso aconteceu por minha culpa……."
34010-66 = "Por isso, eu vou colocar um fim nisso."
34010-68 = "P-Princesa……."
34010-69 = "……Princesa."
34010-70 = "……Não, Atsuko, se você voltar, será morta…… você sabe disso, não sabe?"
34010-72 = "……Até agora, eu nunca tomei nenhuma decisão ou julgamento. Então, desta vez, eu posso decidir por mim mesma, não posso?"
34010-76 = "Pode me prometer? Que vai libertar a todos."
34010-77 = "……."
34010-78 = "……Espere um pouco, vou confirmar com a Madame."
34010-82 = "Oh."
34010-83 = "……Entendo, compreendido. Nós prometemos."
34010-84 = "Em nome disso, eu juro."
34010-85 = "Em nome……? E que significado isso tem?"
34010-86 = "Porque eu quero que você cumpra a promessa."
34010-87 = "Muito bem…… em nome de mim mesma, «Beatrice», a fantasia de todos os peregrinos, eu prometo."
34010-88 = "……Sim, é uma promessa."
34010-93 = "Princesa, pegue isto. É uma ordem da Madame. Não podemos permitir que tire a máscara por conta própria."
34010-98 = "Trate-a com cuidado, para que não sofra um único arranhão. O ritual começará amanhã de manhã, ao nascer do sol."
34010-100 = "……Fiquem bem. Saori, todos vocês — adeus."
34010-101 = "Princesa……."
34010-102 = "Princesinha……."
34010-107 = "Não pode ser…… Atsuko……."
34010-108 = "Se eu…… não conseguir proteger nem você……"
34010-109 = "Se minhas convicções…… e tudo o que eu deveria proteger…… desaparecerem por completo……."
34010-110 = "Eu……."
34010-113 = "Atsuko, eu……."
34010-114 = "Para que, afinal, eu vivi até agora……."
34010-118 = "Para que…… eu estou vivendo……?"
34010-119 = "……O que faremos com o restante do esquadrão?"
34010-120 = "Elimine todos eles."
34010-121 = "Como desejar."
34010-126 = "Atirem."
34010-128 = "……."
34010-129 = "……."
34010-130 = "……."
34010-135 = "Próximo episódio: Uma Festa do Chá Desigual"
