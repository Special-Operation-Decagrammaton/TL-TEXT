[translation]
34010-1 = "Episódio 1;Prólogo"
34010-4 = "Achei!!"
34010-5 = "É pra lá! Persigam!!"
34010-10 = "J-já era…… aqui é um beco sem saída……."
34010-11 = "……Do lado oposto também. Estamos completamente cercadas."
34010-12 = "Gh……."
34010-19 = "Desistam.#nDaqui vocês não escapam mais."
34010-23 = "……."
34010-24 = "H-hi……."
34010-25 = "(Suave, ssuave……)"
34010-26 = "……Munição, quase nada; e as forças também já estão no limite……."
34010-27 = "O ferimento da Líder também é grave. Do jeito que vai, mais que fugir, é a vida da Líder que corre perigo."
34010-33 = "……Ainda resta o último recurso. Com isto……."
34010-34 = "N-não me diga."
34010-35 = "……A bomba que destrói aureolas."
34010-36 = "Misaki, Hiyori. Enquanto eu ganho tempo, levem a Hime…… e saiam daqui."
34010-37 = "……Saori."
34010-38 = "Sair daqui…… e aí…… e depois……."
34010-39 = "E…… depois……."
34010-40 = "Saori."
34010-41 = "……Hime?"
34010-46 = "Já chega. Nós nos esforçamos."
34010-47 = "……."
34010-48 = "H-Hime…… o que deu em você……?"
34010-53 = "Quem \"ela\" quer sou eu…… não é?"
34010-54 = "Eu vou. Em troca, quero que deixem as outras irem."
34010-55 = "……."
34010-57 = "Atsuko!? ……O que você tá fazendo!?"
34010-59 = "……Já chega, Saori. É tudo, tudo sem sentido."
34010-60 = "E depois de atravessar isto? Pra onde, afinal, a gente vai?"
34010-61 = "……."
34010-62 = "Trinity, Gehenna――e até a Arius estão atrás da gente."
34010-63 = "Nesta Kivotos, não há lugar onde a gente possa ficar em paz.#nAté a nossa vida se esgotar, só resta uma vida de fugir e se esconder, prendendo a respiração."
34010-64 = "Mas isso é porque eu existo. A Saori, a Misaki, a Hiyori. Foi por minha culpa que deu nisto……."
34010-66 = "Por isso, eu ponho um fim."
34010-68 = "H-Hime……."
34010-69 = "……Hime."
34010-70 = "……Não pode, Atsuko; se você voltar, vai ser morta…… isso, ao menos, você sabe, não sabe?"
34010-72 = "……Até hoje, eu nunca decidi nem julguei nada. Então, ao menos desta vez, eu posso decidir sozinha, não posso?"
34010-76 = "Você promete? Que vai deixar todas livres."
34010-77 = "……."
34010-78 = "……Esperem um pouco; vou confirmar com a Madame."
34010-82 = "Ohh."
34010-83 = "……Sei, entendido. Prometo."
34010-84 = "Juro, por este nome."
34010-85 = "Pelo nome……? Que valor há nisso?"
34010-86 = "É que eu quero que a promessa seja cumprida sem falta."
34010-87 = "Pois bem…… pelo nome de \"Beatrice\", a ilusão de todos os peregrinos, eu prometo."
34010-88 = "……Sim; está prometido."
34010-93 = "Senhorita Hime, tome. São ordens da Madame. Não pode tirar a máscara por conta própria."
34010-98 = "Tratem-na com todo o cuidado, sem um único arranhão. O ritual começa amanhã cedo, junto com o nascer do sol."
34010-100 = "……Cuidem-se. Saori, meninas――adeus."
34010-101 = "Hime……."
34010-102 = "Hime……."
34010-107 = "Não pode…… Atsuko……."
34010-108 = "Se eu não conseguir proteger nem você……"
34010-109 = "Se a convicção…… o que eu devia proteger…… se tudo desaparecer……."
34010-110 = "Eu……."
34010-113 = "Atsuko, eu……."
34010-114 = "Pra que, afinal, eu, até hoje……."
34010-118 = "Pra que…… eu vivo……?"
34010-119 = "……E o que fazemos com o resto do Squad?"
34010-120 = "Deem cabo de todas."
34010-121 = "Como quiser."
34010-126 = "Fogo."
34010-128 = "……."
34010-129 = "……."
34010-130 = "……."
34010-135 = "Próximo Episódio;Um Tea Party Desalinhado"
