[translation]
34010-1 = "Episódio 1; Prólogo"
34010-4 = "Ali estão!!"
34010-5 = "Por ali! Atrás delas!!"
34010-10 = "E-É o nosso fim... aqui é um beco sem saída..."
34010-11 = "......Do outro lado também. Estamos completamente cercadas."
34010-12 = "Guh..."
34010-19 = "Desistam.#nVocês não têm mais para onde fugir."
34010-23 = "......"
34010-24 = "H-Hiii..."
34010-25 = "(Sss, Sss...)"
34010-26 = "......Quase não temos mais munição, e nossa estamina já está no limite..."
34010-27 = "A ferida da líder também é profunda. Desse jeito, em vez de fugir, a vida dela que vai correr perigo."
34010-33 = "......Ainda nos resta um último recurso. Com isso..."
34010-34 = "N-Não me diga que."
34010-35 = "......A bomba que destrói halos."
34010-36 = "Misaki, Hiyori. Enquanto eu ganho tempo, peguem a Princesa... e saiam daqui."
34010-37 = "......Saori."
34010-38 = "Sair daqui... e depois... o que vem depois..."
34010-39 = "E... depois..."
34010-40 = "Saori."
34010-41 = "......Princesa?"
34010-46 = "Já chega. Nós demos o nosso melhor."
34010-47 = "......"
34010-48 = "P-Princesa... o que você vai fazer...?"
34010-53 = "O que 'ela' quer sou eu... não é?"
34010-54 = "Eu vou. Em troca, quero que deixem as outras irem."
34010-55 = "......"
34010-57 = "Atsuko!? ......O que você tá fazendo!?"
34010-59 = "......Já chega, Saori. É tudo em vão."
34010-60 = "Mesmo que a gente saia dessa, o que vem depois? Para onde vamos?"
34010-61 = "......"
34010-62 = "Trinity, Gehenna... e até a Arius está atrás de nós."
34010-63 = "Não há um lugar seguro para nós em Kivotos.#nAté o fim de nossas vidas, será apenas uma existência fugindo e nos escondendo nas sombras."
34010-64 = "Mas, isso é só porque eu estou com vocês. Saori, Misaki, Hiyori. Tudo chegou a esse ponto por minha causa..."
34010-66 = "Por isso, eu vou acabar com isso."
34010-68 = "P-Princesa..."
34010-69 = "......Princesa."
34010-70 = "......Não, Atsuko, se você voltar, eles vão te matar... você sabe disso, não sabe?"
34010-72 = "......Até agora eu nunca decidi nem escolhi nada. Então, pelo menos desta vez, eu posso decidir por conta própria, não posso?"
34010-76 = "Você promete? Que vai deixá-las livres."
34010-77 = "......"
34010-78 = "......Espere um pouco, vou confirmar com a Madame."
34010-82 = "Oh"
34010-83 = "......Entendo, muito bem. Eu prometo."
34010-84 = "Jure, pelo seu nome."
34010-85 = "Pelo meu nome...? E que significado isso teria?"
34010-86 = "Eu quero que você cumpra a promessa, sem falta."
34010-87 = "Pois bem... Em nome da ilusão de todos os peregrinos, eu, 'Beatrice', prometo a você."
34010-88 = "......Certo. É uma promessa."
34010-93 = "Princesa, coloque isso. É uma ordem da Madame. Seria um problema se tirasse a máscara sem permissão."
34010-98 = "Tratem-na com cuidado para que não sofra um arranhão sequer. O ritual começará amanhã cedo, ao nascer do sol."
34010-100 = "......Cuidem-se. Saori, meninas... adeus."
34010-101 = "Princesa..."
34010-102 = "Princesa..."
34010-107 = "Não... Atsuko..."
34010-108 = "Se eu... não conseguir proteger nem você..."
34010-109 = "Se as minhas convicções... o que eu deveria proteger... se tudo desaparecer..."
34010-110 = "Eu..."
34010-113 = "Atsuko, eu..."
34010-114 = "Para que foi que eu vivi até agora...?"
34010-118 = "Para que... eu estou viva...?"
34010-119 = "......O que faremos com o resto do esquadrão?"
34010-120 = "Eliminem todas."
34010-121 = "Entendido."
34010-126 = "Fogo."
34010-128 = "......"
34010-129 = "......"
34010-130 = "......"
34010-135 = "Próximo Episódio; Uma Tea Party Irregular"