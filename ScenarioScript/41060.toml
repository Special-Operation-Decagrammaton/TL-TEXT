[translation]
41060-1 = "Episódio 6: Vamos Começar a Aquisição de Alimentos"
41060-2 = "(Na manhã seguinte, fui ao parque para ver como estavam.)"
41060-4 = "Em frente ao Parque dos Coelhinhos"
41060-11 = "[ns1] \"Uau!?\"\n[ns2] \"A-armadilha…?!\""
41060-16 = "……Ah, é o Professor."
41060-17 = "Estava se mexendo estranho, pensei que fosse um intruso ou um cachorro de rua."
41060-18 = "[s3] \"Cachorro de rua…\"\n[s4] \"Armadilhas no parque são perigosas!\""
41060-19 = "Nós não temos escolha."
41060-20 = "Nós não temos escolha."
41060-21 = "Para impedir intrusos, precisamos desse nível de segurança."
41060-22 = "Ah, Professor."
41060-23 = "Melhor tomar cuidado com o chão. Tem uma mina terrestre ali."
41060-24 = "[s5] \"Hã?!\"\n[s6] \"Espera aí, não consigo me mexer! Onde está a mina?!\""
41060-25 = "Onde mesmo… esqueci a localização exata."
41060-26 = "Onde mesmo… esqueci a localização exata."
41060-27 = "Bem, se explodir, você vai saber onde estava."
41060-28 = "[s] \"Por que vocês colocam coisas tão perigosas aqui?!\""
41060-29 = "Perigoso? É o mínimo para autodefesa."
41060-30 = "Isso aí, na verdade isso é muito pouco!"
41060-31 = "Gostaria de colocar minas antitanque e outras armadilhas ao redor do parque."
41060-32 = "[s] \"Isso é exagero, não acha?\""
41060-33 = "Em se tratando de segurança, não existe exagero. É preciso estar sempre preparado."
41060-34 = "Se vacilarmos, aqueles policiais cachorros podem voltar."
41060-41 = "Saki, Moe,"
41060-42 = "Aconteceu alguma coisa?"
41060-43 = "Hiii! P-Professor…?!"
41060-44 = "……Bom dia."
41060-45 = "O que quer a essa hora?"
41060-46 = "[s7] \"Vim ver se estavam bem.\"\n[s8] \"Precisam de alguma coisa?\""
41060-47 = "Como pode ver, está tudo bem."
41060-48 = "Como pode ver, está tudo bem."
41060-49 = "A SRT está acostumada com a vida de acampamento."
41060-50 = "Isso é fichinha para a SRT."
41060-51 = "É uma habilidade básica."
41060-53 = "Além disso, aqui tem água, é até confortável."
41060-54 = "E tem muita sombra, fácil de se esconder…"
41060-56 = "Portanto, não precisa se preocupar."
41060-57 = "Está tudo bem, pode ir embora!"
41060-62 = "[ns] \"Isso agora…\""
41060-63 = "……Pode ser que um trovão esteja próximo."
41060-65 = "Essa foi forçada… por que você não aguentou…"
41060-66 = "Como eu ia aguentar, é coisa da biologia!"
41060-67 = "Ugh…"
41060-69 = "……De qualquer forma, não há problema nenhum, então――"
41060-73 = "[ns] \"……Tem certeza?\""
41060-74 = "……"
41060-76 = "Ah, droga, ficar irritada só me deixa com mais fome…"
41060-77 = "É… na verdade…"
41060-78 = "Ah, que inferno, é que não comemos nada! Tá bom assim?!"
41060-80 = "Temos água, mas só água…"
41060-81 = "E não podemos contar com suprimentos…"
41060-82 = "Droga, devia ter trazido comida da SRT…"
41060-83 = "Se for para trazer um míssil antiaéreo, é mais lógico trazer comida…"
41060-84 = "Você está falando o quê? Míssil também é importante!"
41060-85 = "É lindo, acima de tudo!"
41060-86 = "Pior que isso é aquele manual pesado. Se tivesse deixado ele e trazido comida…"
41060-87 = "Idiota!"
41060-88 = "Um aluno não pode abandonar o manual!"
41060-90 = "Mesmo que quiséssemos comprar, a conta da escola está bloqueada…"
41060-91 = "Vamos morrer de fome desse jeito…"
41060-92 = "Ugh, quero voltar para a SRT…"
41060-96 = "[ns] Tiro um cup noodles da bolsa."
41060-100 = "A-ah, isso é…"
41060-101 = "…Cup noodles?"
41060-102 = "Frango com shoyu da Missin… meu favorito…!"
41060-103 = "[s9] \"Trouxe outras coisas também.\"\n[s10] \"Querem comer?\""
41060-104 = "…B-Bem, se o senhor está insistindo…"
41060-105 = "…B-Bem, se o senhor está insistindo…"
41060-107 = "…Esperem."
41060-108 = "Não podemos aceitar assim."
41060-109 = "Mostrar que tem recursos numa situação de escassez para depois exigir algo em troca…"
41060-110 = "É uma tática comum. Não podemos aceitar sem saber as reais intenções."
41060-111 = "[s] \"Não quero nada em troca…\""
41060-112 = "Hmph, acha que vou acreditar?"
41060-113 = "Em operações, o básico é não ingerir nada além do que foi trazido."
41060-114 = "Por que eu aceitaria comida sem garantia de segurança?"
41060-115 = "[s] Abro o cup noodles."
41060-119 = "O quê…!"
41060-120 = "Ei, eu disse que não vou comer!"
41060-124 = "[ns] Despejo a água quente."
41060-137 = "Ugh…!"
41060-138 = "Que cheiro bom… estou ficando com mais fome ainda…"
41060-139 = "[s11] \"Já que está aí, por que não come?\"\n[s12] \"Vai esfriar.\""
41060-142 = "…Não, obrigada. Achar que vai nos dobrar assim é ilusão."
41060-143 = "Se cairmos uma vez, seremos manipulados pelo senhor para sempre."
41060-144 = "N-não."
41060-145 = "Não vou me render por causa de um cup noodles!"
41060-146 = "B-Bem, se fosse um banquete mais elaborado, ainda dava para considerar…"
41060-147 = "[s] \"Então, com licença…\""
41060-153 = "Ugh, droga…!"
41060-154 = "Que cheiro delicioso…!"
41060-155 = "N-não posso perder…!"
41060-160 = "Nesses momentos, respire fundo!!"
41060-161 = "Aprendemos isso na escola, como lidar com tortura química!"
41060-162 = "Se a vontade não ceder, não importa o estímulo no cérebro! Engane de outra forma!"
41060-167 = "Ugh, preciso resistir…"
41060-168 = "Não vamos ceder à tortura…!"
41060-172 = "[ns] Adiciono um ovo."
41060-173 = "…Ah."
41060-175 = "Isso que você fez agora…"
41060-176 = "Adicionar ovo nesse momento é covardia…"
41060-178 = "Ugh, deve estar uma delícia…"
41060-179 = "Depois disso… não tem como…"
41060-180 = "…ugh, não aguento mais!"
41060-181 = "[s] \"…Vão comer?\""
41060-183 = "Vamos!"
41060-184 = "[s13] \"Aqui está. Aliás…\"\n[s14] \"E a Valkyrie, não rola mesmo? Pelo menos a comida seria resolvida…\""
41060-189 = "Então quer nos convencer abalando nossa resistência."
41060-190 = "Mostrou suas verdadeiras cores, seu pervertido."
41060-191 = "O mundo é mesmo feio…"
41060-193 = "Usa métodos repugnantes…"
41060-194 = "Não importa o que faça, nossos sentimentos pela nossa escola não mudam."
41060-195 = "Sim, sentimos fome, é desconfortável. Mas é assim que defendemos nossa convicção."
41060-196 = "Não trocamos isso por uma vida confortável."
41060-201 = "[ns] Entrego um bilhete."
41060-203 = "…O que é isso?"
41060-204 = "[s15] \"Se não gosta da ideia de esmola, que tal isso?\"\n[s16] \"Você pode conseguir comida sem parecer que foi por minha causa.\""
41060-205 = "…Quer dizer que se formos ali, teremos algo?"
41060-206 = "…Quer dizer que se formos ali, teremos algo?"
41060-207 = "Já dissemos que não vamos mudar de ideia, não importa o que façam…"
41060-210 = "(O que será que ele está pensando…)"
41060-213 = "…Entendido. Não sei do que se trata, mas vou aceitar."
41060-215 = "Apenas aceitar."
41060-220 = "O que será que ele quer, afinal…"
41060-221 = "Será que o Professor está tentando entender a gente…?"
41060-222 = "Ingênua, Miyu. Se confiar tão fácil, vai acabar se ferrando."
41060-223 = "Mas a expressão dele era séria. Não parecia estar brincando."
41060-224 = "Talvez no futuro ele possa nos ajudar a restaurar a SRT…"
41060-226 = "O endereço é este aqui."
41060-227 = "Estou tão faminta que mal consigo andar…"
41060-228 = "…Isso não é o escritório da Schale?"
41060-229 = "O que ele quer com a gente aqui…?"
41060-234 = "Ah, já deve ser a hora…"
41060-239 = "Ahm, viemos por indicação do Professor [USERNAME]."
41060-240 = "Ah, estava esperando…!"
41060-241 = "Já fui avisado pelo Professor."
41060-242 = "Vocês vão descartar o 'lixo' para mim, certo?!"
41060-243 = "…Hã?"
41060-244 = "Aqui não vem muita clientela, então o lixo acumula… é um desperdício…"
41060-245 = "Toda vez tenho que colocar em sacos de lixo orgânico e descartar, dá muito trabalho…"
41060-246 = "O Professor disse que vocês fariam isso no meu lugar… me salvou. Já deixei tudo aqui."
41060-253 = "……"
41060-255 = "…A-ah, hã? Houve algum engano?"
41060-256 = "Não, está tudo bem, pode deixar!"
41060-257 = "Fique tranquilo!"
41060-258 = "A-ah, sim… Aliás, você está bem? Sua cara está meio pálida…?"
41060-259 = "É fome… digo, tivemos uns perrengues…"
41060-260 = "Tem mais alguma coisa vencida? Vamos levar tudo."
41060-261 = "Ah, sim! Tem sim, só um momento…!"
41060-267 = "Espera aí! Moe, isso é errado em vários níveis!"
41060-268 = "Pegar comida descartada… isso é…"
41060-269 = "Mas vai ser jogado fora mesmo. Ainda está bom, é um desperdício. E não parece 'esmola', como ela disse."
41060-270 = "M-mas nós, da SRT… isso…"
41060-271 = "Bem, se a Saki não quer, tudo bem."
41060-272 = "Eu como tudinho!"
41060-276 = "N-não disse que não quero!"
41060-283 = "Ugh… ugh…"
41060-284 = "Vamos viver assim, pegando comida descartada…"
41060-289 = "Professor [USERNAME]…"
41060-290 = "Não esquecerei essa humilhação…"
41060-292 = "Próximo Episódio: Operação Cenoura (1)"