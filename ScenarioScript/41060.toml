[translation]
41060-1 = "Episódio 6; Vamos começar a buscar comida"
41060-2 = "（Na manhã seguinte, visitei o parque para verificar se todos estavam bem）"
41060-4 = "Em frente ao Parque dos Coelhinhos"
41060-11 = "[ns1] \"Uau!?\"\n[ns2] \"U-uma armadilha...!?\""
41060-16 = "……Ah, é você, Sensei."
41060-17 = "Você estava se movendo de um jeito estranho, achei que fosse um suspeito ou um cachorro de rua."
41060-18 = "[s3] \"Cachorro de rua...?\"\n[s4] \"Não é perigoso colocar armadilhas no parque!?\""
41060-19 = "Não tem como evitar, né."
41060-20 = "Não tem como evitar, né."
41060-21 = "Para impedir intrusos, temos que fazer isso."
41060-22 = "Ah, é o Sensei."
41060-23 = "É melhor tomar cuidado onde pisa aí. Tem minas terrestres enterradas."
41060-24 = "[s5] \"O quê!?\"\n[s6] \"Espera, espera, não consigo nem dar um passo! Onde estão as minas!?\""
41060-25 = "Onde será que estão…… esqueci a localização exata."
41060-26 = "Onde será que estão…… esqueci a localização exata."
41060-27 = "Bem, se explodir, é porque você achou."
41060-28 = "[s] \"Por que vocês continuam colocando coisas tão perigosas...!?\""
41060-29 = "Perigoso ou não, é uma medida de autodefesa básica."
41060-30 = "Pois é, na verdade, isso nem é o suficiente!"
41060-31 = "Se desse, eu queria colocar minas antitanque e várias outras armadilhas no perímetro do parque."
41060-32 = "[s] \"Isso claramente é exagero...\""
41060-33 = "Não existe \"exagero\" quando se trata de vigilância. Temos que estar sempre preparados para tudo."
41060-34 = "Se a gente baixar a guarda, vai saber se aquela polícia com cara de cachorro não aparece de novo."
41060-41 = "Saki, Moe,"
41060-42 = "Houve algum problema?"
41060-43 = "Hii, Se-Sensei……!?"
41060-44 = "……Bom dia."
41060-45 = "O que faz aqui tão cedo?"
41060-46 = "[s7] \"Eu só queria ver se vocês estavam bem.\"\n[s8] \"Estão precisando de alguma coisa?\""
41060-47 = "Como pode ver, não há problema algum."
41060-48 = "Como pode ver, não há problema algum."
41060-49 = "A Academia SRT está acostumada com a vida de acampamento."
41060-50 = "Para a SRT, isso é moleza."
41060-51 = "É uma habilidade básica."
41060-53 = "Além disso, aqui tem água, então é até confortável."
41060-54 = "Tem bastante sombra e é fácil de se esconder……"
41060-56 = "Por isso, não precisa se preocupar."
41060-57 = "Não tem problema nenhum, então vá embora logo!"
41060-62 = "[ns] \"O que foi isso……\""
41060-63 = "……Talvez esteja trovejando por perto."
41060-65 = "Essa desculpa não cola…… por que você não conseguiu segurar……?"
41060-66 = "Não tem como evitar, é uma necessidade fisiológica!"
41060-67 = "Ugh……"
41060-69 = "……Como eu disse antes, não há problema algum, então――"
41060-73 = "[ns] \"……Sério mesmo?\""
41060-74 = "……"
41060-76 = "Ah, droga, ficar irritada só me deixou com mais fome……"
41060-77 = "A-a verdade é que……"
41060-78 = "Ah, quer saber? A gente não comeu nada! Satisfeito!?"
41060-80 = "Temos água, mas, por outro lado, só temos água……"
41060-81 = "Não podemos contar com suprimentos nem nada do tipo..."
41060-82 = "Droga, se eu soubesse que ia acabar assim, deveria ter trazido comida da SRT..."
41060-83 = "Se era para trazer algo, pensando bem, comida seria muito mais útil que um míssil antiaéreo..."
41060-84 = "Do que você está falando? Mísseis também são importantes!"
41060-85 = "E, acima de tudo, eles são bonitos!"
41060-86 = "Mais importante, aquele manual pesado e sem graça que você trouxe é o verdadeiro problema. Devia ter deixado ele para trás e trazido comida..."
41060-87 = "Idiota!"
41060-88 = "Uma estudante não pode simplesmente jogar fora o seu manual!"
41060-90 = "Mesmo que quiséssemos comprar algo, as contas da escola foram bloqueadas, então..."
41060-91 = "Com certeza vamos morrer de fome desse jeito..."
41060-92 = "Uuu, eu quero voltar para a SRT..."
41060-96 = "[ns] Tira um macarrão instantâneo da mochila."
41060-100 = "A-aquilo é..."
41060-101 = "...Macarrão instantâneo?"
41060-102 = "Lámen de frango com shoyu da Misshin...! Minha comida favorita...!"
41060-103 = "[s9] \"Eu trouxe várias outras coisas também.\"\n[s10] \"Querem comer comigo?\""
41060-104 = "B-bem... se o Sensei insiste tanto assim..."
41060-105 = "B-bem... se o Sensei insiste tanto assim..."
41060-107 = "...Espere um pouco."
41060-108 = "Não podemos aceitar isso tão facilmente."
41060-109 = "Em uma situação de desespero, oferecer suprimentos essenciais para depois exigir algo ainda mais importante em troca..."
41060-110 = "É um truque muito comum. Não posso aceitar nada sem saber quais são suas verdadeiras intenções."
41060-111 = "[s] \"Não, eu não quero nada em troca...\""
41060-112 = "Hah, você acha que eu cairia nessa?"
41060-113 = "Em missões, é regra básica não ingerir nada além do que você mesmo trouxe."
41060-114 = "Não vou colocar na boca algo cuja segurança não foi garantida."
41060-115 = "[s] Abre a tampa do macarrão instantâneo."
41060-119 = "O quê...!"
41060-120 = "Ei, eu disse que não ia comer, não disse!?"
41060-124 = "[ns] Despeja a água quente."
41060-137 = "Ngh...!"
41060-138 = "Que cheiro bom... estou ficando com ainda mais fome..."
41060-139 = "[s11] \"Já que está pronto, por que não come?\"\n[s12] \"Vai esfriar, sabe?\""
41060-142 = "...Não, obrigado. É inútil tentar quebrar nossa vontade desse jeito."
41060-143 = "Se eu ceder uma vez, acabarei sendo arrastada pelas estratégias do Sensei."
41060-144 = "Eu,"
41060-145 = "Eu não vou me render por causa de um simples macarrão instantâneo!"
41060-146 = "Bem, se fosse um banquete de verdade, talvez..."
41060-147 = "[s] \"Então, vou começar a comer...\""
41060-153 = "Ugh, grrr...!"
41060-154 = "O cheiro está bom demais...!"
41060-155 = "Eu não vou perder...!"
41060-160 = "É nessas horas que preciso respirar fundo!!"
41060-161 = "Aprendemos na escola como lidar com torturas que usam substâncias químicas!"
41060-162 = "Não importa se meu cérebro está sendo estimulado, contanto que minha vontade não quebre, está tudo bem! Vou me distrair de outra forma!"
41060-167 = "Uuu, preciso aguentar..."
41060-168 = "Nós nunca vamos nos curvar diante de uma tortura...!"
41060-172 = "[ns] Adiciona um ovo cozido."
41060-173 = "...Ah."
41060-175 = "Isso agora, será que..."
41060-176 = "Ovo nesta fase é trapaça..."
41060-178 = "Ugh, deve estar delicioso..."
41060-179 = "Depois de fazerem isso, não dá mais..."
41060-180 = "……Ah, não consigo aguentar!"
41060-181 = "[s] \"……Quer comer?\""
41060-183 = "Eu quero!!"
41060-184 = "[s13] \"Sim. Aliás…… não existe mesmo a opção de ir para a Valkyrie?\"\n[s14] \"Pelo menos para o problema da comida, seria melhor fazer isso...\""
41060-189 = "Então eles querem negociar depois de abalar nossa paciência."
41060-190 = "Mostrou sua verdadeira face, seu canalha."
41060-191 = "Como esperado, o mundo é um lugar feio..."
41060-193 = "Que métodos desprezíveis eles usam..."
41060-194 = "Não importa o que façam, nossos sentimentos pela nossa escola não mudarão."
41060-195 = "É verdade que estamos com fome e é inconveniente. Mas, se não fizermos isso, não poderemos proteger nossas convicções."
41060-196 = "Não queremos uma vida de luxo se tivermos que abrir mão disso."
41060-201 = "[ns] Entrega o bilhete que trouxe."
41060-203 = "……Isso é?"
41060-204 = "[s15] \"Se não gostam de algo que pareça caridade, pensei nisso aqui.\"\n[s16] \"Não é algo vindo diretamente de mim, mas vocês podem conseguir comida.\""
41060-205 = "……Se formos aqui, teremos algo?"
41060-206 = "……Se formos aqui, teremos algo?"
41060-207 = "Já disse várias vezes que nosso coração não mudará, não importa o que façam..."
41060-210 = "（Sério, o que ele está pensando...）"
41060-213 = "……Entendido. Não sei do que se trata, mas vou aceitar isso."
41060-215 = "Apenas aceitar, nada mais."
41060-220 = "Aquele cara, o que ele está pensando de verdade..."
41060-221 = "Será que o Sensei também está tentando nos entender..."
41060-222 = "Você é ingênua, Miyu. Se baixar a guarda tão facilmente, vai acabar em apuros, sabia?"
41060-223 = "Mas a expressão dele agora parecia bem sincera. Não parece que ele está pensando em algo trivial."
41060-224 = "Talvez, no futuro, ele nos ajude a reviver a SRT..."
41060-226 = "O endereço escrito é aqui mesmo."
41060-227 = "Estou com tanta fome que não consigo dar mais um passo..."
41060-228 = "……Isso aqui não é o escritório do Schale?"
41060-229 = "Por que nos chamou aqui, afinal...?"
41060-234 = "Ué, não é quase a hora...?"
41060-239 = "Ah, viemos por recomendação do Sensei [USERNAME]."
41060-240 = "Ah, estávamos esperando por vocês……!"
41060-241 = "Já ouvi sobre o assunto do Sensei."
41060-242 = "Vocês vieram para descartar os \"itens descartados\" para nós, certo!"
41060-243 = "……Hã?"
41060-244 = "Como não recebemos muitos clientes aqui, temos muitos itens descartados... É um desperdício, mas..."
41060-245 = "Toda vez temos que colocar em sacos de lixo orgânico para processar, e isso dá bastante trabalho..."
41060-246 = "Ouvi do Sensei que vocês fariam isso por nós... que bom. Deixamos tudo reunido aqui."
41060-253 = "……."
41060-255 = "……A-ah, espera? Será que houve algum mal-entendido...?"
41060-256 = "Não, está tudo bem, tudo bem!"
41060-257 = "Deixe o resto com a gente!"
41060-258 = "E-entendo. Bem... mudando de assunto, vocês estão se sentindo bem? Estão com uma aparência um pouco pálida...?"
41060-259 = "É que estamos com fo... não, bem, aconteceram várias coisas!"
41060-260 = "Tem mais alguma coisa com o prazo de validade vencido? Vamos levar tudo."
41060-261 = "Ah, sim! Temos sim, por favor, esperem um pouco...!"
41060-267 = "Espera, espera, espera! Moe, isso não está nada certo, está!?"
41060-268 = "Aceitar marmitas descartadas, isso é...!"
41060-269 = "Mas elas vão ser jogadas fora, não vão? Ainda dá para comer, é um desperdício. E, sinceramente, isso não parece ser um ato de 'piedade'."
41060-270 = "Ma-mas nós da SRT, em uma situação dessas...!"
41060-271 = "Bem, se a Saki não quer comer, tudo bem por mim."
41060-272 = "Eu vou comer com gosto!"
41060-276 = "Eu, eu não disse que não ia comer!"
41060-283 = "Snif, snif..."
41060-284 = "Então é assim que vamos viver daqui para frente... sobrevivendo de marmitas descartadas."
41060-289 = "Professor [USERNAME]..."
41060-290 = "Eu não vou esquecer essa humilhação..."
41060-292 = "Próximo episódio: Operação Cenoura (1)"
