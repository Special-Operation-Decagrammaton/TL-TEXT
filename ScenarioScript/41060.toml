[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 10/06.
41060-1 = "Episódio 6: Em Busca de Suprimentos"
41060-2 = "（Na manhã seguinte, fui até o parque dar uma olhada se as meninas estavam bem）"
41060-4 = "Entrada do Parque dos Coelhinhos"
41060-11 = "[ns1] \"Uou?!\"\n[ns2] \"U-Uma armadilha...?!\""
41060-16 = "……Ah, é só você, Sensei."
41060-17 = "Vi um vulto ofegante se mexendo nas moitas, achei que fosse um cachorro sarnento ou um tarado querendo espiar a gente dormindo."
41060-18 = "[s3] \"Tarado da moita...?\"\n[s4] \"Vem cá, vocês têm noção do perigo de entupir um parque público de armadilha?!\""
41060-19 = "É o que tem pra hoje, fazer o quê."
41060-20 = "A gente tem que se virar com o que tem."
41060-21 = "Se a gente não forçar a barra, qualquer babão entra aqui de madrugada e tira proveito da gente."
41060-22 = "Ih, ó o Sensei aí."
41060-23 = "Ou, cuidado onde você pisa, tá? Acabei de plantar uma mina terrestre bem aí."
41060-24 = "[s5] \"Hã?!\"\n[s6] \"Pera, pera, eu não posso dar um passo! Onde tá a mina?!\""
41060-25 = "Puts... Onde é que tava mesmo? Esqueci a coordenada exata."
41060-26 = "Onde é que tava mesmo? Esqueci a coordenada exata."
41060-27 = "Ah, relaxa. Se o seu pé explodir e voar longe, é porque tava lá."
41060-28 = "[s] \"Por que vocês ficam armando esses perigos mortais um atrás do outro...?!\""
41060-29 = "Perigo que nada, isso é o mínimo pra proteger a nossa virtude."
41060-30 = "Na real, isso aí não é nem o começo!"
41060-31 = "Se eu tivesse material, queria ter entupido as bordas do parque com mina antitanque pra explodir qualquer pervertido."
41060-32 = "[s] \"Acho que a gente já passou da linha do exagero faz tempo...\""
41060-33 = "Pra proteger a nossa pureza, 'exagero' não existe no dicionário. Tem que dormir com a mão no fuzil."
41060-34 = "Vai que a gente vai se aliviar no mato e aquela cachorrada da polícia brota aqui pra encher o saco?"
41060-41 = "Saki, Moe."
41060-42 = "Deu algum B.O. por aí?"
41060-43 = "H-Hiiik... S-Sensei...?!"
41060-44 = "……Bom dia."
41060-45 = "Madrugando pra vir checar se a gente tava se trocando? Qual a sua tara a essa hora?"
41060-46 = "[s7] \"Eu só vim ver se vocês tavam vivas.\"\n[s8] \"Tá faltando alguma coisa? Precisam de ajuda?\""
41060-47 = "Como o senhor pode admirar com esses seus olhos cheios de segundas intenções, estamos em perfeita ordem."
41060-48 = "Como o senhor pode admirar com esses seus olhos cheios de segundas intenções, estamos em perfeita ordem."
41060-49 = "As cadetes da SRT nascem prontas pra acampar no inferno, se precisar."
41060-50 = "Isso aqui pra gente é fichinha."
41060-51 = "Tá no nosso sangue."
41060-53 = "Ainda mais que tem água encanada aqui, dá até pra tomar banho... Não que você vá ver."
41060-54 = "E tem bastante sombra pra gente se esconder dos seus olhares..."
41060-56 = "Resumindo, não precisa vir bancar o herói protetor com segundas intenções."
41060-57 = "Já viu que a gente tá inteira e vestida, né? Então mete o pé e vaza!"
41060-62 = "[ns] \"Que barulho foi esse...?\""
41060-63 = "……Deve ser trovão. Vai chover."
41060-65 = "Metendo esse migué na cara dura... Você não conseguia segurar a barriga só mais um pouco...?"
41060-66 = "Eu lá controlo meus órgãos, porra?! Fisiologia básica!"
41060-67 = "Uuugh..."
41060-69 = "……Repito, senhor. Não temos problema algum, então――"
41060-73 = "[ns] \"……Tem certeza?\""
41060-74 = "……"
41060-76 = "Aah, que ódio, ficar passando raiva com esse tarado só me deixa com mais fome..."
41060-77 = "E-Então, a verdade nua e crua é..."
41060-78 = "A gente não botou nada na boca até agora, caralho! Tá feliz em ver a gente assim?!"
41060-80 = "Como eu disse, tem água... Mas o problema é que *só* tem água."
41060-81 = "E rota de suprimento a gente não tem nenhuma..."
41060-82 = "Merda, se eu soubesse que ia dar esse ruim, eu tinha rapado a despensa da SRT..."
41060-83 = "Em vez de trazer um míssil antiaéreo formato cilíndrico, qualquer pessoa sã teria trazido comida..."
41060-84 = "Cê tá louca?! O míssil é super importante!"
41060-85 = "Fora que ele é mó grosso, bonitão e lisinho!"
41060-86 = "Prioridades, né. E esse seu manual de tática pesadão aí? Custava ter jogado essa porcaria fora e enfiado umas linguiças na mochila...?"
41060-87 = "Idiota!"
41060-88 = "Uma cadete de verdade jamais abandona a sua bíblia militar por carne!"
41060-90 = "A gente até tentou ir no mercadinho, mas a conta bancária da escola foi congelada..."
41060-91 = "É o nosso fim... A gente vai definhar e morrer de inanição aqui, à mercê dos lobos..."
41060-92 = "Uuuh, quero minha caminha na SRT..."
41060-96 = "[ns] (Tiro um pote de macarrão instantâneo da mochila.)"
41060-100 = "A-Aquilo ali é..."
41060-101 = "……Miojo"
41060-102 = "Lámen de frango com shoyu...! Meu ponto fraco...!"
41060-103 = "[s9] \"Eu trouxe um monte de outras coisas também.\"\n[s10] \"Querem comer comigo?\""
41060-104 = "……B-Bom? Se você insiste tanto implorando de joelhos pra gente aceitar?"
41060-105 = "……B-Bom? Se você insiste tanto implorando de joelhos pra gente aceitar?"
41060-107 = "……Alto lá. Não deem um passo."
41060-108 = "A gente não pode engolir qualquer coisa de um homem desses."
41060-109 = "Isolar garotas exaustas num canto, oferecer um leitinho ou uma comidinha quente, e depois cobrar 'favores indevidos' na surdina..."
41060-110 = "É o velho golpe do aproveitador disfarçado de professor. Não vamos pôr nada seu na boca até descobrir qual plano bizarro você quer realizar." #acho que exagerei
41060-111 = "[s] \"Hã? Favores indevidos?! Eu não quero cobrar nada, de onde você tirou...\""
41060-112 = "Hah, cê acha que a gente é ingênua demais pra cair nesse papinho?"
41060-113 = "Regra número um de sobrevivência: não deixar nenhum estranho colocar qualquer coisa na sua boca."
41060-114 = "Como é que eu vou saber se você não botou uma poção bizarra aí dentro pra deixar a gente caidinha?"
41060-115 = "[s] (Abro a tampa do macarrão instantâneo.)"
41060-119 = "Opa...!"
41060-120 = "Ei, a gente não falou que não ia engolir o seu negócio batizado?!"
41060-124 = "[ns] (Despejo a água quente fumegante.)"
41060-137 = "Ngh...!"
41060-138 = "Que cheiro absurdo de bom... Meu estômago tá latejando de vontade..."
41060-139 = "[s11] \"Eu já fiz, vão recusar mesmo?\"\n[s12] \"Vai esfriar, hein.\""
41060-142 = "……Passo. Você pode tentar quebrar nossa mente pela barriga pra obrigar a gente a implorar por você, mas não vamos ceder aos seus fetiches doentios."
41060-143 = "Se a gente engolir isso, vamos virar suas escravas pessoais pra sempre."
41060-144 = "E-Eu..."
41060-145 = "Eu não vou vender a minha pureza por um macarrão quente!"
41060-146 = "Q-Quer dizer, se fosse um banquete de picanha, a gente podia até tentar negociar os termos... brincadeira!"
41060-147 = "[s] \"Bom, quem avisa amigo é... Vou meter pra dentro então.\""
41060-153 = "Aaargh...!"
41060-154 = "Esse cheiro entrando nas narinas... É sacanagem...!"
41060-155 = "E-Eu não vou me entregar por um macarrão...!"
41060-160 = "Técnica de respiração!! Puxa, solta!"
41060-161 = "Tratem isso como tortura de gás da tentação! A gente treinou pra resistir a isso na Academia!"
41060-162 = "Deixa o cérebro formigar com o cheiro, mas trava as coxas! Distração mental, agora!"
41060-167 = "Uuuh, segura a emoção..."
41060-168 = "O nosso esquadrão não vai ceder aos prazeres da carne de um tarado...!"
41060-172 = "[ns] (Quebro um ovo com gema mole perfeito por cima do lámen.)"
41060-173 = "……Ah."
41060-175 = "Cê não fez isso..."
41060-176 = "Meter a gema molinha escorrendo bem agora... Que tentação... digo, golpe baixo do caramba..."
41060-178 = "Uuhh, esse caldinho grosso... Eu preciso engolir isso..."
41060-179 = "Apelou com esse ovinho, eu vou perder a linha..."
41060-180 = "……Foda-se a pureza, VEM COM TUDO!!"
41060-181 = "[s] \"……Querem?\""
41060-183 = "ME DÁ ISSO AGORA!!"
41060-184 = "[s13] \"Aqui. Mas mudando de assunto... A ideia de colar na Valkyrie tá 100% descartada mesmo?\"\n[s14] \"Porque pelo menos lá o estômago ia estar cheio...\""
41060-189 = "Ah... Então essa era a preliminar. Destruir nosso psicológico pela fome pra obrigar a gente a rastejar no chão e aceitar os seus termos."
41060-190 = "A sua máscara finalmente caiu. Predador sádico de merda."
41060-191 = "Esse mundo dos adultos é movido a luxúria mesmo..."
41060-193 = "Se aproveitar de garotas indefesas e famintas... Mó papelão de escroto..."
41060-194 = "Você pode usar a tática imunda que for pra tentar despir a nossa dignidade, mas o nosso amor pela escola é inviolável."
41060-195 = "Sim, a gente tá varada de fome e mijando no mato. Mas se a gente se submeter ao seu 'harém', nossa convicção vira lixo."
41060-196 = "Eu prefiro comer terra a ter uma vida de princesa de enfeite na sua cama se isso custar a nossa castidade."
41060-201 = "[ns] (Entrego um pedaço de papel com um endereço anotado para ela.)"
41060-203 = "……Que porra é essa?"
41060-204 = "[s15] \"Se aceitar da minha mão parece que tem 'segundas intenções', tenta ir nesse lugar aí.\"\n[s16] \"Não vou cobrar favor nenhum em troca, relaxa. Lá vocês arrumam o que botar pra dentro.\""
41060-205 = "……Você tá dizendo que aqui tem suprimentos de graça? Ou é o endereço do seu ninho de amor?"
41060-206 = "……Você tá dizendo que aqui tem suprimentos de graça? Ou é o endereço do seu ninho de amor?"
41060-207 = "Acho que já gastei saliva demais repetindo que não vou vender meu corpo pra você, mas..."
41060-210 = "（Sério, qual a tara bizarra desse cara...?）"
41060-213 = "……Beleza, tá avisado. Não sei se isso é o endereço de um clube noturno ou do seu cativeiro particular, mas vou aceitar o papel."
41060-215 = "Mas deixando bem claro: eu só tô pegando o papel, a roupa continua no corpo."
41060-220 = "Que tipo de fetiche será que passa na cabeça torta desse cara...?"
41060-221 = "Será que... o Sensei tá realmente tentando ser um pai pra gente e não um Sugar Daddy tarado...?"
41060-222 = "Deixa de ser ingênua, Miyu. Se a gente abaixar a guarda na primeira gentileza, a gente vira refém dele."
41060-223 = "Mas vou te falar, a cara dele agora foi de parceiro. Não parecia o olhar de quem quer levar a gente pra cama."
41060-224 = "Vai ver no futuro ele até banque a gente pra reerguer a SRT..."
41060-226 = "O endereço do papel dá bem aqui."
41060-227 = "Tô tão fraca de fome que tô vendo os anjinhos..."
41060-228 = "……Ué, peraí. Isso aqui não é a sede da Schale?"
41060-229 = "Será que ele chamou a gente pra trancar a porta e 'brincar de médico'...?!"
41060-234 = "Ah, se a memória não falha, agorinha mesmo..."
41060-239 = "Ahm, com licença, o Sensei [USERNAME] que mandou a gente aqui pra receber... err..."
41060-240 = "Opa, as senhoritas chegaram...!"
41060-241 = "O Sensei já deixou tudo avisadinho pra mim."
41060-242 = "Vocês vieram dar o fim no nosso 'lixo descartado', né?!"
41060-243 = "……O que?"
41060-244 = "Como a conveniência daqui não tem muito movimento, a gente acaba juntando muito produto vencido ou estragado... É um desperdício enorme..."
41060-245 = "Todo santo dia eu tenho que separar o lixo orgânico pra jogar fora, e dá um trabalhão..."
41060-246 = "Aí o Sensei disse que vocês iam ser as nossas garis e limpar esse lixo pra mim...! Salvou a minha vida. Já deixei tudo separado nesses sacos de lixo aqui no canto pra vocês."
41060-253 = "……"
41060-255 = "……Eita, ué? Será que teve algum mal-entendido...? Falei besteira?"
41060-256 = "Relaxa, chefe! Tá super sussa!"
41060-257 = "Deixa essa xepa com a gente!"
41060-258 = "A-Ah, que bom então. Err... mudando de assunto, vocês tão se sentindo bem? As caras de vocês tão pálidas que nem defunto..."
41060-259 = "Isso é só f-fome... Quer dizer, a gente tá no corre, sabe como é!"
41060-260 = "Sobrou mais alguma coisa fora da validade aí no fundo? Pode mandar que a gente engole tudo."
41060-261 = "Opa, tem sim! Só um segundinho que eu vou buscar no fundo...!"
41060-267 = "Pera, pera, pera! Moe, cê perdeu o juízo?! Isso é pior que vender o corpo!"
41060-268 = "Virar rata de lixeira de marmita vencida, onde já se viu...!"
41060-269 = "Frescura da porra. Iam jogar no lixo, mas tá fechadinho. Pelo menos não precisamos deitar na cama do Sensei pra comer, né."
41060-270 = "M-Mas nós somos a elite da SRT! Descer o nível pra comer resto orgânico...!"
41060-271 = "Bom, se madame Saki tá com nojinho, sobra mais."
41060-272 = "Eu vou lamber as tampas e amassar tudo sozinha!"
41060-276 = "E-Eu nunca disse que não ia botar na boca, sua gulosa!!"
41060-283 = "Uuuh, snif..."
41060-284 = "É isso... O nosso futuro glorioso agora é virar mendiga de marmita de loja de conveniência..."
41060-289 = "Sensei [USERNAME]..."
41060-290 = "A gente preferia aguentar um tarado! Eu jamais vou perdoar o gosto dessa humilhação... Escuta bem, a gente ainda vai se vingar..."
41060-292 = "Próximo Episódio: Operação Cenoura (1)"