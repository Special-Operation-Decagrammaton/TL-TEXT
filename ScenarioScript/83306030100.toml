[translation]
83306030100-6 = "はぁ……本当に困りましたね。"
83306030100-7 = "アコ、どうしたの？何かあった？"
83306030100-8 = "それがですね……"
83306030100-9 = "委員長が席を外している間に、いたずら電話がかかってきまして。"
83306030100-10 = "……どんな内容なの？"
83306030100-11 = "それが……自分の言いたいことを言ったら、すぐに切られてしまいます。"
83306030100-12 = "内容と言うほどのものは無く……"
83306030100-13 = "電話線を抜いておくのが手っ取り早いんですが……"
83306030100-14 = "緊急の連絡が来る可能性もあるので、それは避けておきたいなと。"
83306030100-15 = "分かった。じゃあ、次に電話が鳴ったら私が取る。"
83306030100-16 = "あっ、いえ！わざわざ委員長の手を借りるほどでは……"
83306030100-17 = "でも、仕事に支障を来たしてるんでしょう？"
83306030100-18 = "アコの時間は、私にとっても大事だもの。"
83306030100-19 = "委員長……"
83306030100-20 = "では、お願いします。"
