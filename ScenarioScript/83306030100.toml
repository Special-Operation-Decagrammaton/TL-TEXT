[translation]
83306030100-6 = "Haa... que situação complicada."
83306030100-7 = "Ako, o que houve? Aconteceu alguma coisa?"
83306030100-8 = "É que..."
83306030100-9 = "Enquanto a Presidente estava fora, recebi um trote."
83306030100-10 = "...E o que diziam?"
83306030100-11 = "Bem... a pessoa diz o que quer e desliga imediatamente."
83306030100-12 = "Não chega a ter um conteúdo propriamente dito..."
83306030100-13 = "O mais fácil seria tirar o telefone da tomada, mas..."
83306030100-14 = "Como pode chegar algum contato de emergência, eu queria evitar isso."
83306030100-15 = "Entendi. Então, da próxima vez que tocar, eu atendo."
83306030100-16 = "Ah, não! Não precisa incomodar a Presidente com isso..."
83306030100-17 = "Mas isso está atrapalhando o seu trabalho, não está?"
83306030100-18 = "O seu tempo também é importante para mim, Ako."
83306030100-19 = "Presidente..."
83306030100-20 = "Então, conto com você."
