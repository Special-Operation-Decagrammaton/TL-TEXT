[translation]
80000085-1 = "SRT、 reabastecendo!"
80000085-2 = "（Certo dia, a pedido de Miyako, você emprestou a sala de culinária do Schale para ela）"
80000085-7 = "Sensei, obrigado por me emprestar o local."
80000085-8 = "Se fosse algo simples, eu poderia fazer até no parque, mas..."
80000085-9 = "Eu não queria que as outras integrantes da equipe soubessem o que eu ia preparar agora."
80000085-10 = "[s] \"Não se preocupe, pode vir sempre que precisar.\""
80000085-12 = "[ns] \"A propósito, o que você vai fazer?\""
80000085-13 = "Bem... logo é Dia dos Namorados, não é?#nAs lojas da cidade estavam cheias de vários tipos de chocolate."
80000085-14 = "Mas no nosso acampamento, só tínhamos aquele chocolate militar, duro e amargo..."
80000085-15 = "Então, pensei em fazer algo doce para todas, que sempre se esforçam tanto."
80000085-16 = "Aliás, muito obrigada por me ceder a manteiga, os ovos e até o açúcar... de verdade."
80000085-17 = "Sinceramente, achei que não seria suficiente apenas com os ingredientes que eu tinha."
80000085-18 = "Se o Sensei não tivesse me ajudado, #nesta operação teria acabado ainda na fase de planejamento."
80000085-19 = "[s] \"Não precisa agradecer. Eu estava com ingredientes sobrando e não sabia o que fazer.\""
80000085-20 = "Fufu, obrigada."
80000085-24 = "Ah, parece que já assou."
80000085-25 = "Vou tirar do forno."
80000085-31 = "[ns] \"Uau...! Parece delicioso!\""
80000085-32 = "É um bolo de cenoura feito com chocolate."
80000085-33 = "Quando você coloca cenouras picadas na massa, #na textura fica melhor e o doce fica mais suave."
80000085-34 = "...Bem, a maior vantagem é que dá para economizar farinha de trigo."
80000085-35 = "[s] \"Incrível... onde você aprendeu a fazer isso?\""
80000085-36 = "Não foi em um lugar específico, mas como forças especiais costumam acampar muito, #eu acabei aprendendo a fazer preparos simples."
80000085-37 = "Quando eu estava na Academia SRT, #às vezes usávamos a marmita como forno para assar pãezinhos."
80000085-38 = "Fufu, que saudade..."
80000085-39 = "...Como tem quatro, vou dar três para as meninas..."
80000085-48 = "...Sensei. Se não se importar, você poderia aceitar este bolo?"
80000085-49 = "Já que tive o trabalho de fazer... queria aproveitar para agradecer pelo apoio de sempre."
80000085-50 = "[s1] \"Mas este bolo...\"\n[s2] \"Não é a sua parte, Miyako?\""
80000085-51 = "...Eu já provei um pouco enquanto estava preparando."
80000085-52 = "...Eu já provei um pouco enquanto estava preparando."
80000085-53 = "Além disso, dizem que doces não fazem bem para coelhos..."
80000085-54 = "Que tal comermos este bolo juntos...?"
80000085-55 = "...Tudo bem? #Acho que a quantidade já era pequena para dividir..."
80000085-56 = "[s3] \"Eu quero comer com a Miyako.\"\n[s4] \"Doces fazem mal para qualquer um se comer demais.\""
80000085-57 = "...Fufu, é verdade."
80000085-58 = "...Fufu, é verdade."
80000085-59 = "Obrigada por sempre ser tão atencioso. #Então, vamos comer."
80000085-61 = "（Saboreei o doce bolo de cenoura junto com a Miyako）"
