[translation]
600-1 = "Exercício de Fogo Conjunto"
600-2 = "Local do Exercício de Fogo Conjunto de Kivotos"
600-3 = "Puxa... finalmente chegou, né? Esse dia."
600-4 = "Hm? Que dia é hoje, você pergunta...? (Croc)"
600-5 = "Você não estava sabendo? É o dia do \"Exercício de Fogo Conjunto\"."
600-6 = "Basicamente, é um exercício que todas as alunas de Kivotos precisam participar periodicamente."
600-7 = "Desculpe, mas as alunas que estão de plantão na Schale não são exceção (Croc)."
600-8 = "Bem, já que estamos aqui, dê uma força para elas. Afinal, você é o Sensei."
600-9 = "Bom, eu vou indo embora. Não aguento ficar fazendo essas coisas entediantes (Croc)."
600-10 = "Sendo assim, o resto é com você~."
