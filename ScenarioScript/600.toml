[translation]
600-1 = "合同火力演習"
600-2 = "キヴォトス合同火力演習・会場"
600-3 = "いやー……来ちゃったねえ、この日が。"
600-4 = "ん？何の日かって……？（パリッ）"
600-5 = "聞いてなかったの？「合同火力演習」の日だよ。"
600-6 = "基本的にキヴォトスの全生徒が、定期的に参加しないといけない演習。"
600-7 = "悪いんだけど、シャーレで当番やってる生徒たちも例外じゃなくって（パリッ）。"
600-8 = "まあせっかくだし、応援でもしてあげてよ。先生なんだからさ。"
600-9 = "じゃ、私は先に帰るね。こんな怠いことやってらんないし（パリッ）。"
600-10 = "そういうわけで、後はよろしく～。"
