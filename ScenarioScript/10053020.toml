[translation]
10053020-1 = "Episódio 2; Uma garota com esse cenário"

10053020-2 = "Por que o Sensei está aqui? ? \r\n\r\n"

10053020-3 = "[s1] \"O quê!? Lena!?\"\r\n[s2] \"Por que você está aqui!?\""

10053020-6 = "Eu me pergunto por que... me inscrevi para sair normalmente."

10053020-7 = "Não, bem... eu sei como nossa escola é vista por outras escolas... \r\n"

10053020-8 = "\"Wild Hunt\" não é sobre prender estudantes, certo?"

10053020-9 = "Só que o procedimento para sair é um pouco problemático... \r\n"

10053020-10 = "Huh? Você e Gurumin se conheciam? \r\n\r\n\r\n\r\n"

10053020-11 = "[s3] \"Sim, eu o conheço muito bem.\"\r\n[s4] \"Ele é o mais novo da minha vida anterior.\""

10053020-14 = "Haha, que tipo de relacionamento é esse? \r\n\r\n\r\n\r\n"

10053020-15 = "Shhh! ! Não somos idosos, então não diga nada estranho! #nA história vai ficar complicada! ! \r\n\r\n\r\n"

10053020-16 = "Ou melhor, por que o Sensei está aqui? ? \r\n"

10053020-17 = "Você disse que nós três íamos procurar Tsuchinoko, certo? \r\n"

10053020-18 = "Desculpe, esqueci de te contar. \r\n\r\n\r\n\r\n"

10053020-19 = "Mas você sabe, é mais divertido quando tem mais gente, né? \r\n\r\n\r\n"

10053020-20 = "Não me force sua teoria positiva... \r\n\r\n"

10053020-21 = "A Senseia é ``Gurumin''...parece que ela e Rena são conhecidas, então não vou apresentá-la. \r\n\r\n\r\n"

10053020-22 = "Bem, então ――\r\n\r\n\r\n"

10053020-30 = "……. \r\n\r\n"

10053020-35 = "[ns5] \"Por que você está apontando para mim...?\"\r\n[ns6] Coloquei meu dedo no dedo que me foi oferecido."

10053020-36 = "...A telepatia é um fracasso? \r\n\r\n\r\n"

10053020-37 = "Parece que a frequência não coincide com a do Sensei. \r\n\r\n\r\n\r\n"

10053020-41 = "...! \r\n\r\n\r\n"

10053020-42 = "também! Acho que o Sensei tem a mesma aura que eu! \r\n\r\n\r\n\r\n"

10053020-47 = "……prazer em conhecê-lo. E vamos recebê-lo. \r\n"

10053020-48 = "Meu nome é Tsubasa. #nEle é o líder desta equipe de investigação e diretor do ``Moh Paranormal Research Institute''."

10053020-49 = "Por favor, me chame de ``Chefe Tsubasa.'' \r\n"

10053020-50 = "[ns7] \"Diretor...?\"\r\n[ns8] \"Hum, Lena...?\""

10053020-55 = "Eu sei o que você está tentando dizer, mas...#nNão se preocupe, sou uma pessoa de bom senso. \r\n"

10053020-56 = "\"Mo Paranormal Research Institute\" é o nome do canal de Tsubasa. #nSou um streamer."

10053020-57 = "Então, bem... chama-se \"esse tipo de cenário\"."

10053020-58 = "contexto? Lena-kun, você não pode ignorar isso. \r\n"

10053020-59 = "Nosso instituto é uma organização única em Kivotos que investiga fenômenos paranormais com base em métodos científicos."

10053020-60 = "Não é uma pessoa, não um grupo?"

10053020-61 = "Bem, existem algumas circunstâncias adultas complicadas... \r\n"

10053020-62 = "De qualquer forma, Sensei, por favor, não entenda mal! \r\n\r\n"

10053020-63 = "Fenômenos paranormais não são inciência!"

10053020-64 = "Ah, começou de novo... \r\n"

10053020-68 = "Fenômenos paranormais existem em Kivotos! #nE mais, isso acontece frequentemente no nosso dia a dia!"

10053020-69 = "Mesmo nessa época, houve um incidente terrível no milênio, certo? #nAcho que você sabe disso, mas..."

10053020-70 = "[s] \"...!\""

10053020-75 = "Hmm... esse rosto me parece familiar. \r\n"

10053020-76 = "Houve tanta confusão que não seria natural não saber disso. \r\n"

10053020-77 = "É isso mesmo – o “incidente de avistamento de OVNIs nos Alpes Orientais do Milênio”! \r\n"

10053020-78 = "[ns9] \"...Hmm?\"\r\n[ns10] \"Alpes Orientais...?\""

10053020-83 = "De acordo com relatos de testemunhas oculares, ao amanhecer, um objeto branco e luminoso em forma de disco voava como se ignorasse a gravidade."

10053020-84 = "A partir daqui, minha opinião é que esta é uma característica típica de um “OVNI do tipo Adamski”."

10053020-85 = "Alguns estudiosos descartam isso como um viés de confirmação, mas discordo veementemente!"

10053020-86 = "OVNIs são reais! ! \r\n\r\n\r\n"

10053020-91 = "O facto de avistamentos semelhantes terem sido relatados em todo Kivotos é prova disso! \r\n"

10053020-92 = "Na verdade, queria tentar comunicar localmente...#nInfelizmente, devido às circunstâncias, não pude entrar e sair livremente do Millennium... \r\n"

10053020-93 = "[s11] \"OVNI... contato...?\"\r\n[s12] \"Hum, Lena...?\""

10053020-96 = "Sou uma criança estranha... admito! É um pouco diferente! \r\n"

10053020-97 = "O que posso dizer... ao contrário dos meus mais velhos, eu diria que ele é um pouco mais realista, ou talvez seja alguém que consegue entender as coisas, mesmo que elas estejam um pouco erradas. \r\n"

10053020-98 = "Então, por que estou seguindo você? ? \r\n"

10053020-102 = "Ah, entendo, o diretor é bastante famoso nessa área... \r\n\r\n\r\n"

10053020-103 = "Estou transmitindo exploração de ruínas todos os dias~\r\n\r\n"

10053020-104 = "Que bairro é esse...#nNão é particularmente famoso. \r\n"

10053020-105 = "Na maioria das vezes, não é apenas uma transmissão de perambulação por um prédio abandonado. #nO número de visualizações e inscritos não aumentou em nada. \r\n\r\n"

10053020-107 = "[ns13] \"Explorando ruínas todos os dias...?\"\r\n[ns14] \"Tudo bem equilibrar isso com seus estudos...?\""

10053020-112 = "Bem, é claro! É impossível para um estudante do milênio negligenciar seus estudos! \r\n"

10053020-113 = "Tsubasa é um milênio? \r\n"

10053020-114 = "Ei, eu não te contei?"

10053020-115 = "Sim. Na verdade, é um pouco surpreendente... Achei que as crianças do Millennium não acreditariam nesse tipo de coisa."

10053020-116 = "O que significa “esse tipo de coisa”? \r\n"

10053020-117 = "Bem, olhe, Tsuchinoko... Yeti..."

10053020-118 = "Além disso… magia?"

10053020-119 = "Hmm, essa é uma afirmação que não posso ignorar como estudante do milênio."

10053020-120 = "Nenhuma teoria é comprovada desde o início. #nToda proposição pode se tornar uma verdade universal após ser verificada."

10053020-121 = "Sim……? \r\n"

10053020-125 = "Em outras palavras, negar algo porque ainda não foi provado equivale a negar os fundamentos da filosofia natural que foram construídos até agora."

10053020-126 = "Mesmo no Milénio, que ostenta a vanguarda da ciência moderna, permanecem áreas desconhecidas, como “ruínas”."

10053020-127 = "Fenômenos paranormais são problemas que nós, como cientistas, devemos resolver, e não algo que deva ser evitado."

10053020-128 = "Bom, entre os conservadores isso tende a ser tratado como oculto... \r\n"

10053020-133 = "oh……. Como esperado, os alunos do Millennium são diferentes..."

10053020-134 = "Mesmo que eu diga a mesma coisa, meu poder de persuasão é diferente do meu superior... \r\n"

10053020-135 = "O que você diz? Nesse sentido, somos aliados, certo? \r\n"

10053020-136 = "Rena-kun também veio procurar o não comprovado Tsuchinoko."

10053020-137 = "Não, não é nada disso."

10053020-138 = "Sim? \r\n"

10053020-142 = "Não quero ser mal interpretado, então vou dizer primeiro..."

10053020-143 = "Porque não acredito em Tsuchinoko! ! \r\n\r\n"

10053020-149 = "[ns15] \"Ah, essa é a configuração?\"\r\n[ns16] \"Entendo, entendo.\""

10053020-153 = "um pouco! Que reação! ? \r\n\r\n"

10053020-154 = "Não é mais parecido com esta linha?"

10053020-155 = "Se você não acredita em Tsuchinoko, por que participou desta investigação?"

10053020-156 = "Claro ――\r\n"

10053020-161 = "Suspiro... acho que a Senseia sabe, mas meus colegas de quarto são todos pessoas estranhas. #nTodo mundo gosta de ocultismo. \r\n"

10053020-162 = "Informações sobre avistamento de Tsuchinoko no SNS! Se eu encontrasse um, seria uma grande celebração."

10053020-163 = "É por isso que irei primeiro e assumirei o controle da cena! \r\n"

10053020-164 = "De qualquer forma, o avistamento recente foi provavelmente um erro de uma cobra ou de um lagarto."

10053020-165 = "Encontre a origem do boato e prove que é apenas um boato."

10053020-166 = "...Bem, duvido que os idosos voltem a si. \r\n"

10053020-167 = "[s17] \"Ah, esse tipo de cenário?\"\r\n[s18] \"Entendo, entendo.\""

10053020-170 = "Isso é diferente! \r\n"

10053020-175 = "Espere. Participar com tais segundas intenções é inaceitável."

10053020-176 = "Nosso objetivo é simplesmente verificar a existência do lendário Tsuchinoko."

10053020-177 = "Isso mesmo! \r\n"

10053020-178 = "E... para provar que na verdade é um drone de reconhecimento alienígena! \r\n"

10053020-179 = "...Eh, nossa casa era uma reunião tão suspeita? \r\n"

10053020-181 = "Porque é diferente! Não adicione configurações estranhas!"

10053020-182 = "Basta procurar por Tsuchinoko! \r\n\r\n"

10053020-183 = "……Eu vejo. Acho que foi um pouco difícil para iniciantes."

10053020-184 = "Mas esta não é minha fantasia. Este é um tema que está atraindo muita atenção no meio acadêmico."

10053020-185 = "Um artigo também foi publicado na última edição da famosa revista acadêmica da Red Winter, “Neopyramid Future”."

10053020-186 = "Essa é uma revista oculta!"

10053020-187 = "As gráficas do milênio se recusaram a publicá-lo, então a Red Winter, que irá imprimi-lo para você se você pagar por isso, está apenas publicando! ? \r\n"

10053020-188 = "diferente. Por trás desse incidente, há pessoas chamadas #n \"Seminário\" que controlam o mundo acadêmico do milênio sob o nome de ciência dominante ――\r\n"

10053020-189 = "……sim? Você sabe muito, não é? \r\n"

10053020-190 = "Mesmo entre os assinantes regulares, não creio que haja muitos que saibam dos detalhes dos bastidores..."

10053020-191 = "...! \r\n"

10053020-192 = "……Eu vejo. Então você também é um especialista com bastante teoria?"

10053020-193 = "Ok, isso é um desafio... eu aceito! \r\n"

10053020-194 = "Meu argumento permanece inalterado. Tsuchinoko é um drone de reconhecimento alienígena!"

10053020-195 = "Essa forma antinatural é o resultado de uma imitação tímida de criaturas indígenas. #nNo entanto, sua manobrabilidade e recursos evasivos são o próprio drone de reconhecimento! \r\n"

10053020-196 = "Não, eu estaria em apuros se não fosse uma cobra... \r\n\r\n"

10053020-197 = "Ainda há esperança para os clássicos. Porque as possibilidades da vida são infinitas."

10053020-198 = "Qual teoria está mais próxima da verdade? Essa pesquisa vai ser muito interessante! \r\n"

10053020-203 = "Não, é por isso que eu--"

10053020-204 = "Já basta. O objetivo é descobrir a verdade por trás dos rumores sobre Tsuchinoko. \r\n"

10053020-205 = "...Talvez eu seja a única pessoa sã em Kivotos?"

10053020-206 = "[ns19] \"Ah, essa é a configuração?\"\r\n[ns20] \"Entendo, entendo.\""

10053020-211 = "Shhh! Então pare de fazer isso! ! \r\n\r\n\r\n"

