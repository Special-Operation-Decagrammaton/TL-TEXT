[translation]
10053020-1 = "第2話;そういう設定の少女"
10053020-2 = "なんで先生がここにいるの！？\r\n\r\n"
10053020-3 = "[s1] \"えっ！？レナ！？\"\r\n[s2] \"どうしてここに！？\""
10053020-6 = "どうしてって……普通に外出申請したのよ。"
10053020-7 = "いや、まぁ……うちの学園が他校からどう見られてるかは知ってるけど……。\r\n"
10053020-8 = "別に「ワイルドハント」って、生徒を閉じ込めてるわけじゃないんだからね？"
10053020-9 = "外出手続きがちょっと面倒なだけで……。\r\n"
10053020-10 = "あれ？先生と「ぐるみん」、知り合いだったんすか？\r\n\r\n\r\n\r\n"
10053020-11 = "[s3] \"うん、よく知ってる。\"\r\n[s4] \"前世からの縁の後輩だよ。\""
10053020-14 = "あははっ、どんな関係っすか、それ。\r\n\r\n\r\n\r\n"
10053020-15 = "シャーッ！！先輩たちじゃないんだから変なこと言わないで！#n話がややこしくなるでしょ！！\r\n\r\n\r\n"
10053020-16 = "というか、なんで先生がここにいるの！？\r\n"
10053020-17 = "私たち3人でツチノコ探しに行くって話だったでしょ？\r\n"
10053020-18 = "ごめんごめん、伝えるの忘れてて。\r\n\r\n\r\n\r\n"
10053020-19 = "でもほら、人数多いほうが楽しいっしょ？\r\n\r\n\r\n"
10053020-20 = "陽キャ理論を押しつけないでよ……。\r\n\r\n"
10053020-21 = "先生は「ぐるみん」……レナとは知り合いみたいなんで、紹介は省略しますね。\r\n\r\n\r\n"
10053020-22 = "それじゃあ――\r\n\r\n\r\n"
10053020-30 = "……。\r\n\r\n"
10053020-35 = "[ns5] \"なんでこっちを指さしてるの……？\"\r\n[ns6] 差し出された指に、自分の指を合わせる。"
10053020-36 = "……テレパシーは失敗か。\r\n\r\n\r\n"
10053020-37 = "どうやら先生とは周波数が合わないようだ。\r\n\r\n\r\n\r\n"
10053020-41 = "……！\r\n\r\n\r\n"
10053020-42 = "やはり！先生も私と同じオーラを持っているのだな！\r\n\r\n\r\n\r\n"
10053020-47 = "……初めまして。そして、歓迎しよう。\r\n"
10053020-48 = "吾輩の名前は[ruby=はねもと]羽咋[/ruby]ツバサ。#nこの調査隊のリーダーであり、「モー超常現象研究所」の所長を務めている。"
10053020-49 = "どうか「ツバサ所長」と呼んでくれたまえ。\r\n"
10053020-50 = "[ns7] \"所長……？\"\r\n[ns8] \"えっと、レナ……？\""
10053020-55 = "言いたいことは分かるけど……#n一応常識人だから安心して。\r\n"
10053020-56 = "「モー超常現象研究所」っていうのは、ツバサがやってるチャンネルの名前。#n配信者なの。"
10053020-57 = "だからまぁ……「そういう設定」ってやつ。"
10053020-58 = "設定？レナ君、それは聞き捨てならないな。\r\n"
10053020-59 = "我が研究所は科学的手法に基づいて超常現象を調査する、#nキヴォトスでも唯一無二の団体だ。"
10053020-60 = "団体じゃなくて1人じゃないの？"
10053020-61 = "そ、それは……まぁちょっと複雑な大人の事情があってだね……。\r\n"
10053020-62 = "とにかく先生、誤解しないでいただきたい！\r\n\r\n"
10053020-63 = "超常現象は非科 学 などではない！"
10053020-64 = "あー、また始まった……。\r\n"
10053020-68 = "超常現象はこのキヴォトスに実在する！#nしかも、日常のすぐそばで頻繁に起こっているのだ！"
10053020-69 = "この間だって、ミレニアムで恐ろしい事件があっただろう？#n先生ならご存知だとは思うが……。"
10053020-70 = "[s] \"……！\""
10053020-75 = "ふむ……その顔、思い当たる節があるようだね。\r\n"
10053020-76 = "あれだけ騒ぎになっていたんだ、知らない方が不自然だろう。\r\n"
10053020-77 = "そう――「ミレニアム東アルプスUFO目撃事件」をね！\r\n"
10053020-78 = "[ns9] \"……ん？\"\r\n[ns10] \"東アルプス……？\""
10053020-83 = "目撃者の証言によると、明け方、白く発光する円盤状の物体が重力を無視するように飛行していたのだとか。"
10053020-84 = "ここからは私の見解なんだが、これは典型的な「アダムスキー型UFO」の特徴だ。"
10053020-85 = "確証バイアスだなんだと片づける学者もいるが、私は断固として異を唱える！"
10053020-86 = "UFOは実在する！！\r\n\r\n\r\n"
10053020-91 = "キヴォトス各地で同じような目撃談が報告されていることこそ、その証左だろう！\r\n"
10053020-92 = "本当は現地での交信を試みたかったんだが……#n残念ながら事情があって、ミレニアムには自由に出入りできなくてね……。\r\n"
10053020-93 = "[s11] \"UFO……交信……？\"\r\n[s12] \"えっと、レナ……？\""
10053020-96 = "変な子なのは……認めるけど！微妙に違うの！\r\n"
10053020-97 = "なんというか……先輩たちと違ってもうちょっと現実的というか、#n微妙にズレてるだけで、話は通じる方というか……。\r\n"
10053020-98 = "って、なんで私がフォローしてるの！？\r\n"
10053020-102 = "ああ見えて、所長はこの界隈じゃ結構有名で……。\r\n\r\n\r\n"
10053020-103 = "廃墟探索の配信を毎日やってるんすよ～\r\n\r\n"
10053020-104 = "それどこの界隈よ……#n別に全然有名でもないし。\r\n"
10053020-105 = "だいたい、廃ビルをウロウロするだけの配信じゃない。#n再生数も登録者も全然伸びてないし。\r\n\r\n"
10053020-107 = "[ns13] \"毎日、廃墟探検を……？\"\r\n[ns14] \"勉強との両立、大丈夫なのかな……？\""
10053020-112 = "も、もちろん！ミレニアムの生徒が学業を疎かにするなど有り得ないことだとも！\r\n"
10053020-113 = "ツバサってミレニアムなの？\r\n"
10053020-114 = "おや、言ってなかったかな？"
10053020-115 = "うん。というか、ちょっと意外……ミレニアムの子って、こういうの信じないと思ってた。"
10053020-116 = "「こういうの」とは？\r\n"
10053020-117 = "えっとほら、ツチノコとか……イエティとか……。"
10053020-118 = "あと……魔法とか？"
10053020-119 = "ふむ、それこそミレニアムの生徒として看過できない発言だね。"
10053020-120 = "どんな理論だって最初から証明されていたわけじゃない。#nすべての命題は、検証を経て普遍的な真理となり得るのだ。"
10053020-121 = "うん……？\r\n"
10053020-125 = "つまり、まだ証明されていないという理由で否定するのは、これまでに築き上げられた自然哲学の根幹を否定することと同義なのだよ。"
10053020-126 = "まして現代科学の最先端を誇るミレニアムでさえ、「廃墟」のように未知の領域が残っている。"
10053020-127 = "超常現象は我々科学の徒が解き明かすべき課題であって、#n忌避すべきものではないというわけさ。"
10053020-128 = "まぁ、保守派の間ではオカルト扱いされがちなんだがね……。\r\n"
10053020-133 = "おお……。さすがミレニアムの生徒は違うわね……。"
10053020-134 = "同じこと言っても、うちの先輩とは説得力が違う……。\r\n"
10053020-135 = "何を言うか。そのような探求心の点で、我々は仲間だろう？\r\n"
10053020-136 = "レナ君も、証明されていないツチノコを探しに来たわけなのだから。"
10053020-137 = "いや、別にそういうわけじゃないんだけど。"
10053020-138 = "うん？\r\n"
10053020-142 = "誤解されると困るから先に言っておくけど――"
10053020-143 = "私はツチノコなんて信じてないから！！\r\n\r\n"
10053020-149 = "[ns15] \"あー、そういう設定？\"\r\n[ns16] \"なるほど、分かる分かる。\""
10053020-153 = "ちょっと！何その反応！？\r\n\r\n"
10053020-154 = "それはむしろ、こちらのセリフなんだが？"
10053020-155 = "ツチノコを信じていないのならば、どうしてこの調査に参加したのだね？"
10053020-156 = "それは当然――\r\n"
10053020-161 = "はぁ……先生は知ってると思うけど、私のルームメイト、変わった人ばっかりで。#nみんなオカルト狂いなの。\r\n"
10053020-162 = "SNSでツチノコ目撃情報！なんて見つけたら、お祭り騒ぎになるくらいのね。"
10053020-163 = "だから私が先に行って現場を押さえるの！\r\n"
10053020-164 = "どうせ今回の目撃談だって、ヘビかトカゲの見間違いだろうし。"
10053020-165 = "噂の発信源を突き止めて、ただの噂だったって証明してやるの。"
10053020-166 = "……まあ、先輩たちがそれで正気に戻るかは怪しいけど。\r\n"
10053020-167 = "[s17] \"あー、そういう設定？\"\r\n[s18] \"なるほど、分かる分かる。\""
10053020-170 = "違うってば！\r\n"
10053020-175 = "待て。そのような不純な動機で参加するのは認められないな。"
10053020-176 = "我々の目的はあくまで、伝説の[ruby=UMA]未確認動物[/ruby]であるツチノコの実在を検証すること。"
10053020-177 = "そうだそうだ！\r\n"
10053020-178 = "そして――その正体が、宇宙人の偵察ドローンだと証明することだ！\r\n"
10053020-179 = "……え、うちってそんな怪しい集まりだったんすか？\r\n"
10053020-181 = "違うから！変な設定増やさないで！"
10053020-182 = "ツチノコを探すだけでしょ！\r\n\r\n"
10053020-183 = "……なるほど。初心者にはちょっと難しい話だったかな。"
10053020-184 = "だがこれは吾輩の妄想じゃない。学界でも大注目のテーマなんだ。"
10053020-185 = "レッドウィンターの著名な学術誌「ネオピラミッドフューチャー」の最新号にも記事が掲載されていたのだよ。"
10053020-186 = "それオカルト誌！"
10053020-187 = "ミレニアム中の印刷所が出版拒否したから、お金さえ出せば印刷してくれるレッドウィンターで出してるってだけだからね！？\r\n"
10053020-188 = "違う。あの事件の裏には、主流科学の名を借りてミレニアムの学界を牛耳る#n「セミナー」という連中が――\r\n"
10053020-189 = "……ん？君、ずいぶん詳しいのだね？\r\n"
10053020-190 = "定期購読者でも、その辺の裏事情まで知っている者は少ないと思うのだが……。"
10053020-191 = "……！\r\n"
10053020-192 = "……なるほど。君も相応に理論武装した専門家というわけか。"
10053020-193 = "いいだろう、その勝負……受けて立つ！\r\n"
10053020-194 = "吾輩の主張は変わらない。ツチノコは宇宙人の偵察ドローンだ！"
10053020-195 = "あの不自然なフォルムは、土着生物を中途半端に模倣した結果だ。#nしかし機動性と神出鬼没な点は、偵察用ドローンそのもの！\r\n"
10053020-196 = "いや、ヘビじゃないと困るんだけど……。\r\n\r\n"
10053020-197 = "古典派にもまだ希望はあるさ。生命の可能性は無限だからね。"
10053020-198 = "果たしてどちらの理論が真実に近いか――今回の調査、実に面白くなりそうだ！\r\n"
10053020-203 = "いや、だから私は――"
10053020-204 = "もういいや。どうせツチノコの噂の真相を突き止めるのが目的だし。\r\n"
10053020-205 = "……もしかして、キヴォトスでまともなのって私だけなの？"
10053020-206 = "[ns19] \"あー、そういう設定？\"\r\n[ns20] \"なるほど、分かる分かる。\""
10053020-211 = "シャーッ！だからそれやめてってば！！\r\n\r\n\r\n"
