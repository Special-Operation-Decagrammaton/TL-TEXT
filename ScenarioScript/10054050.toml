[translation]
10054050-1 = "第5話;恐ろしき幼稚園児"
10054050-2 = "ええ！もちろん弁えておりますとも！"
10054050-3 = "お昼の時間ですよね！#nお、お食事をお持ちしましょうか？"
10054050-4 = "まずは[ruby=チンジャオロース]青椒肉絲[/ruby]と蒸しパ――"
10054050-9 = "……これ、ピーマン？"
10054050-10 = "ペッペッ！よくもこんなもの入れやがりましたね。#nうちらはピーマンが大嫌い！雑魚大人はそんなのも分かんねぇんですか？"
10054050-11 = "仕方ありません。失敗した大人には、罰を与えないと。うふふっ。"
10054050-12 = "で、ですが！昨日おっしゃってたじゃないですか！#n青椒肉絲が食べたいって……！"
10054050-13 = "ピーマン抜きでは、この料理は成立しませんよ……？"
10054050-14 = "そ、そうです！元々は青唐辛子を入れるのですが、それでは辛くなってしまって……！"
10054050-15 = "知らない知らない知らない！ピーマンは嫌！"
10054050-16 = "――でさぁ。さっきから気になってたんだけど。#n何これ。ガチョウ？"
10054050-17 = "食材です！"
10054050-18 = "はぁ！？食べようってんですか！？#n可哀想じゃねぇですか。逃がしてやるですよ！早く！"
10054050-19 = "こ、これだって！#nガチョウの焼き料理が食べたいとおっしゃるから用意したのに！"
10054050-20 = "うふふ。それはそれ、これはこれです。"
10054050-21 = "ガアアアアッ！"
10054050-22 = "きゃぁっ！な、なに！？#nガチョウのくせにぃ～……さっさとどうにかして！"
10054050-23 = "え、でも放してやれと――"
10054050-24 = "その時はその時！今は今！#n雑魚大人すぎて頭がかってぇですね。"
10054050-29 = "[ns] \"あの子たち、誰なんだろう……？\""
10054050-31 = "それが分からずとも、大人に対するあの態度……。"
10054050-32 = "しつけが、なっていませんね。"
10054050-37 = "ふむ……。"
10054050-38 = "はあ。せっかくの良い気分が台無しです。"
10054050-39 = "やはり、罰が必要かと。"
10054050-46 = "ああ……店が……もう、おしまいだ……。"
10054050-47 = "……大丈夫だ。またやり直せばいい。"
10054050-48 = "お互い助け合おう。な？"
10054050-49 = "え、キモ。"
10054050-50 = "雑魚大人、キ～モ～す～ぎ～"
10054050-51 = "はぁ……まだムチが必要なんでしょうか？うふふっ。"
10054050-52 = "あなたたち、何してるの！！"
10054050-53 = "……誰？"
10054050-54 = "どういうこと？#nうちら以外は誰も来ないはずじゃ……。"
10054050-55 = "……どうやらネットで噂になっているようですね。#nこれだから縦型動画は。"
10054050-56 = "ま、いっか。特別に教えてあげる。#nあんたも仲間に入りたくなるに決まってるもん。"
10054050-57 = "そうそう！"
10054050-58 = "教えて差し上げましょう。#nやりたい放題、遊びたい放題、しつけは聞かない。#n私たちの名前は――"
10054050-59 = "[ruby=ひなどり]雛鳥[/ruby]組！"
10054050-60 = "[ruby=たかのす]鷹野主[/ruby]スイコ！#nこの組を作ったのは私！きゃははっ！"
10054050-61 = "[ruby=いおじゃく]五百雀[/ruby]ナゴミ。#nやられたら10倍でやり返す。やられなくてもやるけどね。"
10054050-62 = "それはただの迷惑では……。"
10054050-63 = "[ruby=うとう]烏頭尾[/ruby]ヨウコです。#nうふっ、うふふっ……。子供の恨みは……深いのですよ？"
10054050-64 = "ってか、あんた……。"
10054050-65 = "な、なに……？"
10054050-66 = "大人なんか放っといて、うちらと一緒に遊ばない？"
10054050-67 = "くだらないことばっか言う大人より、雛鳥組のほうが絶対面白いよ？"
10054050-68 = "だって、やりたくないことはやらなくていいの。#n目障りなものは全部吹き飛ばす！"
10054050-69 = "子供は可能性を秘めている存在ですからね。うふふっ……。"
10054050-70 = "何を言っているの……。"
10054050-73 = "あ、あの！うんめえ棒とイチゴミルクをご用意しました！#n今日のところは、これで……！"
10054050-74 = "ふーん？#nあ。これ、私の好きなやつだ。"
10054050-75 = "雑魚大人にしちゃ、いいセンスじゃねぇですか。"
10054050-76 = "こうなると……始末はどうしましょうね。"
10054050-77 = "うーん……。"
10054050-78 = "今日は特別！見逃したげる！"
10054050-79 = "でも、次はねぇですよ？#nそのときは……ここを火の海にしてやるです！"
10054050-80 = "昼間でも見える花火になりそうですね。うふふっ……。"
10054050-87 = "た、助かったぁ……。"
10054050-88 = "……君、大丈夫か？"
10054050-89 = "大丈夫じゃないけど……仕方ないさ。"
10054050-91 = "[ns] \"あの。今の子たちは……？\""
10054050-92 = "雛鳥組……という暴力団だ。"
10054050-93 = "暴力団！？#n幼稚園児にしか見えなかったが……？"
10054050-94 = "ああ……幼稚園児だ。"
10054050-95 = "「最近の子は怖い」とか……その類の例えですか？"
10054050-96 = "そんなところだ……。"
10054050-97 = "この辺りでは有名なのかえ？"
10054050-98 = "いや……いつの間にか現れたんだ。"
10054050-99 = "急に、ここを新たな拠点にするとかって言いだして……。"
10054050-100 = "状況は見ての通りだ。#n身勝手がすぎて、ほとほと手を焼いている。"
10054050-101 = "それなら、どうして好き放題させているんですか？#n教育のためにも、今の状況はよくないと思いますが。"
10054050-102 = "最初は色々やったさ。#nでも……あの子ら、後ろ盾が強いんだ。"
10054050-103 = "叱ったり、抵抗したり……全部、上手くいかなくて。"
10054050-104 = "しかもここを気に入ったらしい。#n独り占めするんだって息巻いてるよ。"
10054050-105 = "まあ、ここの渓谷は美しいからな。"
10054050-106 = "前までは知る人ぞ知る場所だったんだが、#n最近は投資してくれるところも出てきたってのに。#n施設を刷新するはずが、どうしてこんなことに……。"
10054050-107 = "見ての通り、雛鳥組が暴れ始めて途方に暮れてるってわけさ。"
10054050-108 = "……。"
10054050-109 = "これじゃ観光客を呼ぶどころか、施設の補修もままならない。"
10054050-110 = "[s] \"あの子たちの拠点は分かりますか？\""
10054050-111 = "この渓谷で一番歴史のあるホテルに宿をとっているらしい。"
10054050-112 = "ロープウェイと直結されてて、あの山の麓にあるんだ。"
10054050-113 = "ロープウェイと直結、ですか。"
10054050-114 = "ああ。だからこの辺じゃ値が張るホテルなんだが……#nそこに連泊できるくらい、ただ者じゃないんだ。"
10054050-115 = "でも……そういえば、ココナちゃんには友好的だったような？"
10054050-116 = "味方を増やしたかったんだろうな。"
10054050-117 = "嘘かほんとか、キヴォトスの園児を全員、雛鳥組にするつもりらしい。"
10054050-118 = "あんな失礼な子たちの仲間なんて願い下げです！"
10054050-119 = "ココナ……と言ったか？"
10054050-120 = "え？はい、[ruby=すのはら]春原[/ruby]ココナです。"
10054050-121 = "ココナは大人だね。本当に頼もしい。#nあの子たちには見習ってほしいよ。"
10054050-122 = "えっへん、もちろんです！"
10054050-124 = "[ns] \"ココナは立派なレディーですから。\""
10054050-125 = "せ、先生！？#nう、嬉しいんですけど、その……冗談はやめてください……。"
10054050-126 = "はい？本心……？"
10054050-127 = "つ、ついに先生も私の魅力に目覚めたんですね！"
10054050-128 = "……あれ？待ってください。#nということは……。"
10054050-129 = "普段は私をからかっていたってことですか……？"
10054050-130 = "[ns] \"……バレたか。\""
10054050-131 = "先生！！！"
10054050-134 = "（しばらくの間、ココナとの追いかけっこが続いた）"
10054050-136 = "改めて、来訪を歓迎するよ。よく来てくれたね。"
10054050-137 = "この感じ、久しぶりだ……。"
10054050-138 = "できる限りのおもてなしをするから、どうかゆっくりしていってくれ。"
10054050-139 = "ありがとうございます。"
10054050-140 = "……。"
10054050-141 = "そしたら、さっきの青椒肉絲と蒸しパンをいただけますか？"
10054050-142 = "作り直すから、少し待っててくれ。"
10054050-143 = "あ、いえ。さっきので大丈夫です！#n美味しい青椒肉絲は、冷めても美味しいんですから！"
10054050-144 = "えっ……ピーマン……でも、ニンジンよりは……。"
10054050-145 = "ううん。雛鳥組みたいに駄々をこねるわけにはいきません！"
10054050-147 = "（青椒肉絲は冷めていたが、すごく美味しかった）"
10054050-153 = "……美味しそうに食べてくれるんだね。"
10054050-154 = "そう、これだよこれ……。"
10054050-155 = "こういうのが見たくて商売を始めたんだよな。"
10054050-157 = "[ns] \"さて、そろそろ……。\""
10054050-158 = "この問題をどう解決するか、じゃな？"
10054050-159 = "大前提として、我々は観光に来ている身。"
10054050-160 = "それに、山海経の外じゃ。この地の問題は放置しようと差し支えない。"
10054050-161 = "ですが、そうは考えていらっしゃらないのでしょう？"
10054050-162 = "ほう？#n……では、其方ならどうする？"
10054050-163 = "まずは情報収集かと。"
10054050-164 = "商人たちの心意気を無下にはできません。"
10054050-165 = "雛鳥組の横暴を前にしてなお、ここを守ろうとする意志……#nまさに手本とすべき姿勢でした。"
10054050-166 = "それを見捨てるのは、義と侠に反します！"
10054050-167 = "実に其方らしい言葉じゃ。"
10054050-171 = "あたしも賛成。同じ商人として見過ごせない。#n商売にも最低限の道理があるからね。"
10054050-172 = "私も許せません！"
10054050-173 = "無礼で自分勝手――"
10054050-174 = "梅花園だったらお尻ペンペンですから！"
10054050-175 = "[ns] \"シュンはどう？\""
10054050-179 = "そうですね。"
10054050-180 = "……。"
10054050-181 = "とても多くのことを考えさせてくれる子たちでした。"
10054050-182 = "そのうえで……#nルミさんの言う通り、ここの商人さんたちのためにも。"
10054050-183 = "そして……あの子たちのためにも。"
10054050-184 = "見て見ぬふりはできません。"
10054050-185 = "そもそもあの子たちの行動は、玄武商会の投資に悪影響を及ぼしておる。"
10054050-186 = "我々は、投資に関する査察のためにこの地を訪れた。"
10054050-187 = "然らば、これも査察活動の延長と言えよう。"
10054050-188 = "[ns] \"これで方向性は決まったね。何から始めよっか。\""
10054050-189 = "まずは商店街の現状を調べたほうがいいと思う。"
10054050-190 = "雛鳥組のほうは……うーん。#n仲間に入れてもらうのが手っ取り早いけど、あたしたちじゃ年齢が……。"
10054050-191 = "だから、ココナにお願いできないかな。これは、ココナにしかできないことなんだよ。"
10054050-192 = "うぅ……それなら仕方ありませんが……。"
10054050-193 = "でも……やっぱり嫌です！#nあんな組織に入って……味方のフリをするなんて……！"
10054050-194 = "待ってください。#nたしかに[ruby=・]今[/ruby][ruby=・]は[/ruby]ココナちゃんにしか頼めないかもしれません。"
10054050-195 = "ですが、ココナちゃんの家族で……ひいては保護者として、#n危険なことには賛成できません。"
10054050-197 = "[ns] \"うん。私も同じ考えかな。\""
10054050-198 = "シュン姉さん……先生も……。"
10054050-199 = "ココナちゃん、無理はしなくていいんですよ。"
10054050-200 = "でも、それなら雛鳥組のほうはどうやって……。"
10054050-201 = "お姉さんに、少し考えがあります。"
10054050-202 = "きっと、キサキ様にも。"
10054050-203 = "そうなんですか……？"
10054050-208 = "（シュンとキサキがアイコンタクトを取った）"
10054050-209 = "（そして……）"
10054050-211 = "ああ。妙案があるのじゃ。"
10054050-212 = "じゃが、今日はもう遅い。#nゆっくり休んで、調査は明日から始めるとしよう。"
10054050-213 = "うーん……何をするつもりか、分かりそうで分からない……。"
10054050-214 = "でも、キサキが言うってことは大丈夫だろうし。#nあたしたちは商店街のほうを担当しよっか。"
10054050-215 = "はい……！"
10054050-216 = "こちらも異存はない。では、先に部屋へ戻るとしようか。"
10054050-226 = "[ns1] \"もしかして……。\"\n[ns2] \"あれ……なの？\""
10054050-230 = "ふふっ、どうでしょう？"
10054050-231 = "でも先生が少し口裏を合わせてくれれば、話はもっと早くなるかもしれませんよ？"
10054050-232 = "そうじゃ。こういうときこそ「大人の力」が必要なのじゃよ。"
10054050-234 = "（2人は意味深な笑みを浮かべた）"
10054050-235 = "（背筋に冷や汗をかきそうになった……）"
