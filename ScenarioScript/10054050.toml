[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10054050-1 = "Episódio 5: Crianças Assustadoras"
10054050-2 = "Sim! É claro que nós sabemos disso muito bem!"
10054050-3 = "Já está na hora do almoço, né!\nE-Então, vamos trazer a comida para vocês agora?"
10054050-4 = "Para começar, temos carne com pimentão\ne pãezinhos no vapo――"
10054050-9 = "......Isso é pimentão?"
10054050-10 = "Peh, peh! Como ousam servir isso pra gente?\nNós odiamos pimentão!\nAdultos lixosos não sabem nem disso?"
10054050-11 = "Não tem jeito. Precisamos punir\nos adultos fracassados. Ufufu."
10054050-12 = "M-Mas! Vocês mesmas disseram ontem!\nQue queriam comer carne com pimentão...!"
10054050-13 = "Sem o pimentão, esse prato nem sequer faria sentido...?"
10054050-14 = "I-Isso mesmo! O normal seria colocar pimenta verde,\nmas para não ficar muito ardido nós...!"
10054050-15 = "Não quero saber! Eu odeio pimentão!"
10054050-16 = "――E outra coisa. Eu já estava de olho nisso faz um tempo.\nO que é isso? Um ganso?"
10054050-17 = "São ingredientes!"
10054050-18 = "Hã!? Vocês querem comer isso!?\nQue crueldade. Soltem ele agora mesmo! Anda!"
10054050-19 = "M-Mas esse aqui também...!\nNós preparamos porque vocês disseram\nque queriam comer ganso assado!"
10054050-20 = "Ufufu. Uma coisa é uma coisa, outra coisa é outra coisa."
10054050-21 = "Gaaaaack!"
10054050-22 = "Kyaah! O-O que é isso!?\nÉ só um ganso e... anda logo, dá um jeito nele!"
10054050-23 = "Ué, mas você acabou de mandar a gente solt――"
10054050-24 = "Ontem foi ontem! Hoje é hoje!\nEsses adultos lixosos têm a cabeça dura demais."
10054050-29 = "[ns] \"Quem são essas crianças...?\""
10054050-31 = "Saber disso é o de menos,\nmas ver o jeito como tratam os adultos..."
10054050-32 = "É de uma tremenda falta de educação."
10054050-37 = "Fumu..."
10054050-38 = "Haa. Acabaram com a nossa paz e tranquilidade."
10054050-39 = "Como pensei, elas precisam ser punidas."
10054050-46 = "Aah... a loja... já era, acabou pra nós..."
10054050-47 = "......Calma. É só a gente começar de novo."
10054050-48 = "Vamos nos ajudar. Fechado?"
10054050-49 = "Eca, que nojo."
10054050-50 = "Adultos lixosos são mui~to~ no~jen~tos~"
10054050-51 = "Haa... Será que precisarei sacar o meu chicote? Ufufu."
10054050-52 = "O que vocês estão fazendo!!"
10054050-53 = "......Quem são vocês?"
10054050-54 = "O que tá rolando?\nNão era pra vir mais ninguém além da gente..."
10054050-55 = "......Parece que a gente tá viralizando na internet.\nIsso é o que dá ficar postando videozinho em pé."
10054050-56 = "Tanto faz. A gente conta pra vocês, só dessa vez.\nAté porque vocês com certeza vão\nquerer entrar pro bando depois."
10054050-57 = "É isso aí!"
10054050-58 = "Nós vamos lhes ensinar a verdade.\nFazer o que bem entender,\nbrincar o dia inteiro e ignorar qualquer disciplina.\nO nosso nome é――"
10054050-59 = "Gangue dos Passarinhos!"
10054050-60 = "Suiko Takanosu!\nQuem criou essa gangue fui eu! Kyahaha!"
10054050-61 = "Nagomi Iojaku.\nSe me bater, eu devolvo 10 vezes pior.\nE bato até se não fizerem nada comigo."
10054050-62 = "Isso me soa apenas como um tremendo incômodo..."
10054050-63 = "Sou a Youko Utou.\nUfu, ufufu... O rancor de uma criança...\né muito profundo, sabiam?"
10054050-64 = "Mas tipo, você aí..."
10054050-65 = "O-O que foi...?"
10054050-66 = "Deixa esses adultos pra lá, não querem brincar com a gente?"
10054050-67 = "Ficar com a Gangue dos Passarinhos é bem mais\nlegal do que aguentar adultos tagarelando, não acha?"
10054050-68 = "Afinal, a gente não precisa fazer nada do que não quer.\nE explodimos tudo que for chato no nosso caminho!"
10054050-69 = "Afinal, as crianças são o futuro e\ncarregam infinitas possibilidades. Ufufu..."
10054050-70 = "O que vocês estão dizendo..."
10054050-73 = "C-Com licença! Trouxemos uns salgadinhos\ne leite de morango fresquinho!\nPor favor, levem isso e nos deixem em paz hoje...!"
10054050-74 = "Hmm?\nAh. Eu gosto desse aqui."
10054050-75 = "Até que vocês têm bom gosto pra adultos lixosos."
10054050-76 = "E agora... como vamos nos livrar deles, hein."
10054050-77 = "Huum..."
10054050-78 = "Só por hoje é o dia de sorte de vocês! Vamos deixar passar!"
10054050-79 = "Mas que não tenha uma próxima vez, ouviram!?\nSenão... a gente transforma esse lugar num mar de fogo!"
10054050-80 = "E vai ser um baita show de fogos\nde artifício no meio do dia. Ufufu..."
10054050-87 = "E-Essa foi por pouco..."
10054050-88 = "......Você está bem?"
10054050-89 = "Bem eu não tô... mas não tem o que fazer."
10054050-91 = "[ns] \"Com licença. Aquelas crianças\nde agora há pouco...?\""
10054050-92 = "A Gangue dos Passarinhos... é um grupo de arruaceiros."
10054050-93 = "Arruaceiros!?\nElas pareciam crianças da\neducação infantil pra mim...?"
10054050-94 = "É... Elas são da educação infantil."
10054050-95 = "Isso é alguma piada do tipo\n'as crianças de hoje em dia metem medo'...?"
10054050-96 = "Bem que eu queria..."
10054050-97 = "Elas são famosas por aqui?"
10054050-98 = "Não... elas apareceram de repente."
10054050-99 = "E do nada começaram a berrar que\niriam transformar esse lugar na nova base delas..."
10054050-100 = "E a situação está como vocês viram.\nSão egoístas ao extremo,\ne a gente não sabe mais o que fazer."
10054050-101 = "Sendo assim, por que vocês deixam\nelas fazerem o que bem entendem?\nIsso também é terrível para a educação delas."
10054050-102 = "Nós tentamos de tudo no começo.\nMas... parece que elas têm contatos fortes."
10054050-103 = "Nós demos bronca, lutamos de volta... mas nada adiantou."
10054050-104 = "E o pior é que elas adoraram esse lugar.\nEstão batendo o pé dizendo que\nvão ser as donas de tudo."
10054050-105 = "Bom, não posso negar que este desfiladeiro é lindo."
10054050-106 = "Até pouco tempo atrás, esse era um lugar\nque só os mais antenados conheciam.\nMas recentemente, apareceram até\nuns investidores de fora.\nTínhamos esperança de reformar as instalações,\nmas como chegamos a esse ponto..."
10054050-107 = "Como viram, a Gangue dos Passarinhos começou a\nquebrar tudo e a gente ficou de mãos atadas."
10054050-108 = "......"
10054050-109 = "Desse jeito, não vamos conseguir nem consertar\no local, muito menos atrair turistas."
10054050-110 = "[s] \"Vocês sabem onde é a base da gangue?\""
10054050-111 = "Parece que estão hospedadas no hotel\nmais antigo daqui do desfiladeiro."
10054050-112 = "Aquele que tem um teleférico direto para lá,\nfica bem ao pé da montanha."
10054050-113 = "O que tem o teleférico direto... entendi."
10054050-114 = "Pois é. É o hotel mais caro da região...\nElas devem ser perigosas pra conseguir\npagar por vários dias ali sem suar."
10054050-115 = "Porém... parando para pensar, elas pareciam\nbem receptivas com a Kokona-chan, não é?"
10054050-116 = "Acho que elas queriam arranjar mais aliados."
10054050-117 = "E parece que é sério o boato de que elas querem\nrecrutar todas as crianças de Kivotos para a gangue."
10054050-118 = "Eu dispenso me juntar com meninas tão rudes!"
10054050-119 = "O nome dela é... Kokona?"
10054050-120 = "Hã? Sim, sou Kokona Sunohara."
10054050-121 = "Você é tão madura, Kokona.\nUma garota super confiável.\nQueria muito que elas seguissem o seu exemplo."
10054050-122 = "Ehem, claro que sou!"
10054050-124 = "[ns] \"Afinal de contas, a Kokona\né uma verdadeira dama.\""
10054050-125 = "S-Sensei!?\nE-Eu fico muito feliz com isso, mas, por favor...\npare de brincar comigo..."
10054050-126 = "Hã? É sério...?"
10054050-127 = "F-Finalmente você abriu os olhos\npara o meu charme, Sensei!"
10054050-128 = "......Espera aí.\nSe é assim..."
10054050-129 = "Isso quer dizer que você vivia\nzombando de mim até agora!?"
10054050-130 = "[ns] \"......Fui descoberto.\""
10054050-131 = "Senseeei!!!"
10054050-134 = "（Fiquei brincando de pega-pega com\na Kokona por um bom tempo）"
10054050-136 = "Novamente, bem-vindos ao nosso restaurante.\nFico feliz que estejam aqui."
10054050-137 = "Faz tanto tempo que eu não sentia essa paz..."
10054050-138 = "Nós faremos o melhor possível para atendê-los,\nentão fiquem à vontade."
10054050-139 = "Agradeço a gentileza."
10054050-140 = "......"
10054050-141 = "Sendo assim, você poderia trazer aquela porção\nde carne com pimentão e pãezinhos?"
10054050-142 = "Nós faremos tudo de novo, só um instante."
10054050-143 = "Ah, não, pode ser o de agora há pouco mesmo!\nAté porque carne com pimentão é uma\ndelícia até quando esfria!"
10054050-144 = "Ugh... Pimentão... Bom, ainda é melhor\nque cenoura, mas..."
10054050-145 = "Não! Não podemos fazer birra que nem a\nGangue dos Passarinhos!"
10054050-147 = "（A carne com pimentão já estava fria,\nmas continuava deliciosa）"
10054050-153 = "......Ver vocês comendo com tanto gosto\nenche meu peito de alegria."
10054050-154 = "É, é isso aí..."
10054050-155 = "Foi pra poder ver sorrisos assim\nque eu entrei nesse ramo."
10054050-157 = "[ns] \"Bem, acho que já é hora...\""
10054050-158 = "Como vamos contornar esta crise, não é?"
10054050-159 = "Em primeiro lugar, estamos aqui na\npele de turistas de férias."
10054050-160 = "E além disso, estamos no exterior de Shanhaijing.\nNão seria problema algum fecharmos os olhos\npara o que ocorre aqui."
10054050-161 = "Contudo, imagino que essa\nnão seja a sua intenção."
10054050-162 = "Oh?\n......E como você deseja agir?"
10054050-163 = "Acredito que o nosso primeiro passo\nseja colher informações."
10054050-164 = "Nós não podemos cuspir na determinação\ninabalável desses mercadores."
10054050-165 = "A sua vontade inquebrável de proteger este lugar\nmesmo debaixo das garras da Gangue dos Passarinhos...\nÉ uma virtude que merece os meus aplausos e admiração."
10054050-166 = "Abandoná-los à própria sorte iria ferir a\nminha justiça e a minha honra de forma imperdoável!"
10054050-167 = "São palavras muito condizentes com quem você é."
10054050-171 = "Eu tô contigo. Como uma colega de balcão,\na minha consciência doeria se eu recuasse.\nAté no mundo dos negócios a gente tem\nque seguir a nossa própria bússola moral."
10054050-172 = "Eu também não vou tolerar isso!"
10054050-173 = "Grossas e egoístas――"
10054050-174 = "Se estivessem no Jardim da Flor de Ameixeira,\niriam levar umas belas palmadas nas bundas!"
10054050-175 = "[ns] \"E você, Shun?\""
10054050-179 = "Bem..."
10054050-180 = "......"
10054050-181 = "Aquelas meninas abriram um mar de pensamentos\ne reflexões na minha cabeça."
10054050-182 = "E por conta disso...\nEu concordo com a Rumi-san.\nPelos mercadores também."
10054050-183 = "E, principalmente... pelo bem daquelas meninas."
10054050-184 = "É impossível virar as costas para elas\ne fingir que nada aconteceu."
10054050-185 = "Sem contar que as brincadeiras perversas delas estão\nminando a eficácia do investimento da Genbu Express."
10054050-186 = "E as raízes da nossa viagem se apoiam\nem inspecionar e resguardar esse investimento, não é?"
10054050-187 = "Logo, resolver isso é, no sentido mais estrito,\num prolongamento oficial da nossa inspeção."
10054050-188 = "[ns] \"E assim batemos o martelo da direção\nque vamos tomar. Onde damos a largada?\""
10054050-189 = "Eu voto para darmos uma geral em todo\no prejuízo da rua de comércio primeiro."
10054050-190 = "Quanto à Gangue dos Passarinhos... Hmm.\nO jeito mais fácil de entender a mente delas\né pedir para entrar na gangue,\nmas na nossa idade não vai rolar... "
10054050-191 = "Então, Kokona, a gente pode contar com você pra isso?\nEssa é uma tarefa que só você pode realizar para nós."
10054050-192 = "Uuuuh... Se não tem outro jeito,\nentão está bem..."
10054050-193 = "Mas... eu ainda não gosto muito da ideia!\nEntrar numa gangue dessas...\ne ter que me fingir de amiga delas...!?"
10054050-194 = "Um momento.\nVocê pode ter razão de que A-PE-NAS a\nKokona-chan pode fazer isso para nós agora."
10054050-195 = "Contudo, como família e... acima de tudo,\na responsável legal pela Kokona-chan,\nnão posso permitir que a coloquemos\nsob um risco tão evidente e perigoso."
10054050-197 = "[ns] \"Sim. Eu estou com a Shun nessa.\""
10054050-198 = "Irmãzona Shun... Sensei..."
10054050-199 = "Kokona-chan, você não precisa se\nforçar a fazer nada disso."
10054050-200 = "Poxa, mas aí como a gente resolve\na banda da Gangue dos Passarinhos..."
10054050-201 = "Eu tenho uma carta na manga para isso."
10054050-202 = "Tenho certeza que a Senhora Kisaki\ntambém está pensando no mesmo."
10054050-203 = "É verdade...?"
10054050-208 = "（Shun e Kisaki trocaram um olhar\nmuito expressivo e enigmático）"
10054050-209 = "（E logo em seguida...）"
10054050-211 = "Sim. Temos a jogada perfeita."
10054050-212 = "Mas o sol já se recolheu por hoje.\nO ideal seria dar folga aos pés, dormir,\ne iniciar as operações quando a luz da manhã abrir a cortina."
10054050-213 = "Hm... Não tenho certeza do que vocês estão\ntramando, me deixa um pouco na dúvida..."
10054050-214 = "Mas, se a Kisaki aprovou, sei que\npodemos confiar de olhos fechados.\nEntão deixem a patrulha e checagem nas\nruas de comércio na nossa conta."
10054050-215 = "Certo...!"
10054050-216 = "Acordo fechado.\nVamos nos retirar para os nossos quartos primeiro."
10054050-226 = "[ns1] \"Vocês não estão querendo dizer que...\"\n[ns2] \"Vão usar... aquilo?\""
10054050-230 = "Fufu, qual a sua aposta?"
10054050-231 = "Sabe, se o Sensei colaborar e nos apoiar na\nnossa invençãozinha tática, isso ia nos polpar\num longo tempo nas negociações..."
10054050-232 = "Certamente. É em horas decisivas como esta\nque necessitamos nos amparar no\ncélebre 'Poder do Adulto', não acha?"
10054050-234 = "（As duas abriram um sorriso cheio de conspirações\nindecifráveis para cima de mim）"
10054050-235 = "（Comecei a suar frio de repente...）"