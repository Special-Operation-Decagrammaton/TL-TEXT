[translation]
10038080-1 = "Episódio 8; Mesmo que nossos caminhos se cruzem várias vezes"
10038080-10 = "Kaguya, chefe do Clube de Ópera de Pequim, apresenta seus respeitos à Mestra da Seita."
10038080-12 = "Como tem sido, Kaguya?#nO trabalho que realizou em nome da Genryumon, tem se adaptado bem a ele?"
10038080-13 = "Há muitas partes difíceis, mas... acredito que darei um jeito."
10038080-14 = "Entendo... nesse caso, o nome do Clube de Ópera de Pequim deveria ser alterado, não acha?#nMas, se isso acontecer, quem herdará a ópera de Pequim daqui para frente?"
10038080-15 = "Ah... eu não sabia das suas intenções.#nSerá que a Genryumon, agora uma casca vazia, deveria encenar a ópera de Pequim?"
10038080-16 = "……."
10038080-17 = "Diga-me.#nO que você deseja?"
10038080-18 = "O objetivo do Clube de Ópera de Pequim é continuar substituindo a Genryumon?"
10038080-19 = "De forma alguma.#nO Clube de Ópera de Pequim existe para a ópera de Pequim."
10038080-20 = "E, nesse processo, pretendo proteger e transmitir as tradições de Shanhaijing."
10038080-21 = "Ho. #nA tradição de Shanhaijing da qual você fala — ao que se refere?"
10038080-22 = "Não creio que seja algo que possa ser dito aqui."
10038080-23 = "Hum, tudo bem. Então, deixarei que eu mesma diga.#nSeria... a ideologia e o modo de agir?"
10038080-24 = "……."
10038080-25 = "Proteger os fracos dos fortes que não possuem moral, e nunca esquecer a gratidão recebida.#nSeguir o caminho correto é o nosso orgulho, não é?"
10038080-26 = "Por que você me pergunta isso novamente?"
10038080-31 = "— Porque quero que você acredite em mim."
10038080-35 = "Isso é... o que quer dizer com isso?"
10038080-36 = "Você tem dúvidas sobre minhas ações, não tem?#nVocê, e parte da Genryumon, estão carregando suspeitas, não estão?"
10038080-37 = "Vou perguntar o contrário. A tradição de Shanhaijing que vocês protegeram — é algo tão frágil assim?"
10038080-38 = "！！"
10038080-40 = "！！！"
10038080-42 = "É algo que viraria de cabeça para baixo só porque um novo vento soprou de fora?"
10038080-43 = "Isso é...!"
10038080-47 = "Sendo assim — acredite."
10038080-52 = "Se não pode acreditar em si mesma, então acredite no peso da história que foi transmitida ininterruptamente até hoje."
10038080-53 = "A história e a tradição de Shanhaijing não são tão superficiais a ponto de serem abaladas por algo assim, não é?"
10038080-54 = "Mestra da Seita...!"
10038080-55 = "Fufu... por fim, farei apenas uma pergunta.#nAquele que está destruindo a tradição de Shanhaijing é — eu, ou Kai?"
10038080-56 = "A resposta para isso é... evidente."
10038080-57 = "Sendo assim — o Clube de Ópera de Pequim não deveria abrir este caminho?"
10038080-58 = "Se a Mestra da Seita abrir o caminho, ficarei extremamente honrada."
10038080-59 = "Ho... você diz coisas interessantes."
10038080-60 = "Isso é uma questão de dever, ou uma questão de interesse próprio?"
10038080-61 = "— Ambos."
10038080-62 = "Hum — diga-me."
10038080-63 = "Primeiro, há uma causa para o fenômeno de rejuvenescimento."
10038080-65 = "Ho...?"
10038080-66 = "Entendo. É um problema com o remédio, então."
10038080-67 = "Sinto-me sem lugar, por ter compreendido as minhas intenções."
10038080-68 = "E qual é a outra?"
10038080-74 = "……."
10038080-75 = "Direi mais uma vez à Mestra da Seita."
10038080-80 = "Por favor, derrote-me aqui e agora."
10038080-81 = "[s] \"O quê...!\""
10038080-83 = "— Continue."
10038080-84 = "Se não fizer isso — não será possível recuperar a autoridade da Mestra da Seita."
10038080-85 = "Ninguém tentará seguir as ordens da Mestra da Seita —#ne ninguém tentará compreender a vontade da Mestra da Seita."
10038080-86 = "Agora, a própria Mestra deve emitir as ordens.#nPara isso, este é o momento em que deve demonstrar o seu poder."
10038080-87 = "A lei existe para que não precisemos recorrer à força, mas..."
10038080-88 = "Infelizmente, em tempos de caos, isso raramente é respeitado."
10038080-89 = "O que deveria ser protegido logo se torna papel rasgado, e a razão acaba se tornando uma ferramenta nas mãos dos imorais."
10038080-90 = "É uma tragédia quando a situação exige que mostremos nossa força.#nEu mesma compreendo isso muito bem."
10038080-91 = "No entanto... em situações inevitáveis, não se pode hesitar.#nUm governante deve ser assim."
10038080-94 = "Mesmo sobre uma terra distorcida, é preciso encontrar o caminho correto."
10038080-95 = "Não se deve tolerar o grande mal."
10038080-96 = "Caso contrário, as pessoas não conseguirão mais viver como seres humanos."
10038080-101 = "E então... o rebelde neste lugar não é outro senão eu."
10038080-104 = "Levante sua arma, Mestra da Porta.#nNão hesite."
10038080-105 = "Você deve declarar com uma voz que ecoe pelos céus que é a Mestra da Porta quem deve guiar a todos."
10038080-109 = "O caminho de um governante, por vezes, exige estar preparado para a pólvora e as marcas de bala."
10038080-114 = "Lembro-me de que você tentou me transmitir uma advertência através da ópera de Pequim."
10038080-115 = "O que você pensa sobre isso?"
10038080-117 = "Pensando agora, acredito que deveria ter agido com mais cautela, mas..."
10038080-118 = "Ainda assim, não me arrependo nem um pouco de ter lhe feito aquela advertência."
10038080-119 = "Pois essa é a minha 'lealdade' e o caminho que escolhi."
10038080-120 = "Mesmo que o tempo voltasse inúmeras vezes...#nEu advertiria cem vezes, seria presa mil vezes e, não importa quantas vezes fosse, aceitaria o exílio com alegria!"
10038080-126 = "Fufu, você é uma pessoa interessante."
10038080-128 = "Diga-me... você quer que eu aponte uma arma para alguém que fala de 'lealdade'?"
10038080-132 = "..."
10038080-134 = "A pessoa que lhe fez a advertência naquela época é diferente de quem sou agora.#nVocê precisa distinguir isso."
10038080-137 = "A pessoa que sou agora é uma rebelde. Esse fato não muda."
10038080-138 = "Rebeldes devem ser punidos e servirem de exemplo."
10038080-142 = "Caso contrário, não haverá lógica.#nVocê não conseguirá mostrar o caminho correto a todos!"
10038080-146 = "Isso não foi algo que você fez por vontade própria, não é?"
10038080-147 = "..."
10038080-148 = "Eu não queria dizer isso, mas...#nJá que insiste tanto, parece que não tenho escolha a não ser abrir a boca e ser insolente."
10038080-149 = "Pode falar, eu permito."
10038080-154 = "Acredito que a própria Mestra da Porta também não está nesse posto por vontade própria."
10038080-155 = "E, ainda assim, você está tentando carregar todas as responsabilidades sozinha, não está?"
10038080-156 = "Eu sempre respeitei a Mestra da Porta por isso."
10038080-157 = "Eu pensava que era uma sorte a Mestra da Porta estar em Shanhaijing."
10038080-158 = "Se o meu sacrifício for necessário para a Mestra da Porta... mesmo que eu tenha que refazer tudo mil vezes, entregarei meu corpo a você com alegria!"
10038080-160 = "Esse é... o seu caminho?"
10038080-161 = "Sim... é o meu caminho."
10038080-165 = "Sendo assim... eu não seguirei esse caminho."
10038080-169 = "[ns] \"Kisaki...!\""
10038080-170 = "O que... isso significa?"
10038080-171 = "Fique aí e observe."
10038080-175 = "O caminho que a Mestra da Porta de Shanhaijing... irá trilhar a partir de agora."
10038080-179 = "Mestra da Porta...?"
