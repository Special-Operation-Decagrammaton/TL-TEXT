[translation]
10038080-1 = "第8話;幾度道を違えたとしても"
10038080-10 = "京劇部長カグヤ、門主様に拝謁いたします。"
10038080-12 = "どうじゃ、カグヤ。#n玄龍門に代わって行なった業務は、性に合っておったか？"
10038080-13 = "大変な部分も多いですが……なんとかなるのではないかと。"
10038080-14 = "そうさな……であれば、京劇部の名を変えるべきじゃろうな。#nじゃが、その場合、京劇はこの先誰が受け継ぐのじゃ？"
10038080-15 = "ああ……妾は其方の意向を知らなんだ。#n形骸化した玄龍門が京劇を演じれば良いのかえ？"
10038080-16 = "……。"
10038080-17 = "聞こう。#n何を望んでおる？"
10038080-18 = "このまま、玄龍門の代わりになることが京劇部の目的かの？"
10038080-19 = "滅相もないです。#n京劇部は京劇のために存在する部活ですので。"
10038080-20 = "そして、その過程で山海経の伝統を守り受け継いでいこうと思っております。"
10038080-21 = "ほう。#n其方が語る山海経の伝統とは――何を指す？"
10038080-22 = "この場で話せるものではないかと。"
10038080-23 = "ふむ、良いじゃろう。ならば代わりに妾が話してやろう。#nそれは――思想や行動様式ではないかえ？"
10038080-24 = "……。"
10038080-25 = "道徳のない強者から弱者を守り、受けた恩を忘れず。#n正道を進むのが我らの誇りであろう？"
10038080-26 = "何故、改め[ruby=わたくし]て私に[/ruby]尋ねるのでしょう？"
10038080-31 = "――其方に、信じてほしいからじゃ。"
10038080-35 = "それは……どういうことでしょうか？"
10038080-36 = "妾の行動に疑問を持っているのじゃろう？#n其方も、玄龍門の一部も疑念を抱いておるのじゃろう？"
10038080-37 = "逆に問おう。其方らが守ってきた山海経の伝統は――そんな脆いものかえ？"
10038080-38 = "！！"
10038080-40 = "！！！"
10038080-42 = "外部から新たな風が吹いてきたからと、根本からひっくり返るようなものかえ？"
10038080-43 = "それ、は……！"
10038080-47 = "であれば――信じるのじゃ。"
10038080-52 = "其方自身を信じられないのなら、今まで連綿と受け継がれてきた歴史の重さを信じるが良い。"
10038080-53 = "山海経の歴史と伝統は、その程度で揺らぐほど浅くはないじゃろう？"
10038080-54 = "門主様……！"
10038080-55 = "ふふ……最後に一つだけ問おう。#n山海経の伝統を破壊しているのは――妾か、カイか？"
10038080-56 = "その答えは……明白かと。"
10038080-57 = "なればこそ――京劇部はこの道を開けるべきではないのかえ？"
10038080-58 = "門主様が開けてくださるのなら、恐悦至極に存じます。"
10038080-59 = "ほう……面白いことを言うのう。"
10038080-60 = "それは本分の問題か、それとも実利の問題かえ？"
10038080-61 = "――両方でございます。"
10038080-62 = "ふむ――申してみよ。"
10038080-63 = "まず一つ。若返り現象には、原因がございます。"
10038080-65 = "ほう……？"
10038080-66 = "なるほど。薬の問題、じゃな。"
10038080-67 = "私めの意向を汲んでいただき、身の置き所がありません。"
10038080-68 = "して、もう一つは？"
10038080-74 = "……。"
10038080-75 = "もう一度、門主様に申し上げます。"
10038080-80 = "この場で、私を倒してくださいませ。"
10038080-81 = "[s] \"えっ……！\""
10038080-83 = "……続けよ。"
10038080-84 = "そうでなければ――門主の権威を取り戻すことは叶わないでしょう。"
10038080-85 = "誰も門主様の命令に従おうとしないでしょうし――#n門主様の意思を理解しようとしないでしょう。"
10038080-86 = "今は門主自ら令を下さねばなりません。#nそのために、御身のお力を発揮しなければならぬ時でございます。"
10038080-87 = "法道とは、力を見せぬために存在するものではあるが――"
10038080-88 = "しかして、乱世には中々まかり通らないものでございます。"
10038080-89 = "守るべきものはすぐに紙切れとなり、道理は無道徳な者の道具に成り下がる。"
10038080-90 = "力を見せなければならない状況というのは悲劇です。#n私自身も、それをよく理解しております。"
10038080-91 = "しかし――やむを得ない状況で、躊躇してはなりません。#n君主とはそういうものです。"
10038080-94 = "歪んだ大地の上でも、正道を見つける必要があります。"
10038080-95 = "巨悪を許してはなりません。"
10038080-96 = "そうでなければ、人が人として生きていけなくなってしまいます。"
10038080-101 = "そして……この場の反逆者は、他の誰でもない――私ですので。"
10038080-104 = "銃を上げてください、門主様。#n躊躇ってはなりませぬ。"
10038080-105 = "皆を導くべき立場にあるのは門主様ご自身である、と。#n天に轟くほどの声で宣言しなければならないのです。"
10038080-109 = "君主の道とは、時に火薬と弾痕を覚悟せねばなりませぬ。"
10038080-114 = "――其方が、京劇を通して妾に諫言を伝えようとしたことを覚えておるぞ。"
10038080-115 = "それについては、どう思っているのじゃ？"
10038080-117 = "今にして思えば、もっと慎重に事を成すべきであったと思っておりますが……。"
10038080-118 = "それでも、諫言を申し上げたことに……一切の後悔はありません。"
10038080-119 = "それが私の「忠義」であり、選んだ道ですので。"
10038080-120 = "幾度時間を巻き戻したとしても……#n私は百度諫言し、千度投獄され、何度だろうと喜んで追放されましょう！"
10038080-126 = "ふふっ、面白いやつじゃのう。"
10038080-128 = "して――「忠義」を語る者に銃を向けろと？"
10038080-132 = "……。"
10038080-134 = "諫言を申し上げた当時の私と、今の私は違います。#nそれを区別していただかなければ。"
10038080-137 = "今の私は反逆者です。その事実は変わりません。"
10038080-138 = "反逆者は処分し、見せしめにすべきです。"
10038080-142 = "そうでなければ筋が通りません。#n皆に正道を示せなくなってしまいます！"
10038080-146 = "それは、其方の意志で為したものではないじゃろうに。"
10038080-147 = "……。"
10038080-148 = "こんなことは申し上げたくなかったのですが……#nそうまで言われますと、私も生意気な口を開くしかなさそうです。"
10038080-149 = "聞こう、許す。"
10038080-154 = "門主様ご自身も、自らの意志でその座に居るわけではないと存じます。"
10038080-155 = "だというのに、すべての責務を、一人で背負おうとしているではありませんか。"
10038080-156 = "私は、いつもそんな門主様を尊敬してきました。"
10038080-157 = "そんな門主様が、山海経にいらっしゃってよかったと思っておりました。"
10038080-158 = "門主様のために私の犠牲が必要であるのなら――千度やり直そうとも、喜んでこの身を御身に捧げましょう！"
10038080-160 = "それが――其方の道か？"
10038080-161 = "ええ――私の道です。"
10038080-165 = "であれば――妾はその道を歩まぬ。"
10038080-169 = "[ns] \"キサキ……！\""
10038080-170 = "どういう……意味でしょうか？"
10038080-171 = "其方は、そこで見ているが良い。"
10038080-175 = "山海経の門主が――これから歩む道を。"
10038080-179 = "門主様……？"
