[translation]
84304300100-5 = "（ネルは隠れ家に戻り、リオとセイアに状況を説明した）"
84304300100-8 = "……なるほど。"
84304300100-9 = "相手はリオのことを知っている……単なる生徒会長として以上に。"
84304300100-10 = "そう考えて問題ないだろう。"
84304300100-11 = "ま、そこにはあんま振り回されない方がいんじゃねぇか？"
84304300100-12 = "……聞いてるか？リオ。"
84304300100-14 = "あ……ええ……そうね。 "
84304300100-15 = "それに……特に間違ったことは言っていないわ。"
84304300100-16 = "いや、気にしてんだろ？ほんと分かりやすいなお前。"
84304300100-17 = "実際その通りだわ。だから私は私を証明する必要がある。"
84304300100-18 = "（証明……）"
84304300100-19 = "いや、だから――"
84304300100-20 = "この件だってその延長線上にある。ミレニアムに戻るためには……生徒たちの前で胸を張るには……相応の功績が必要なのよ。"
84304300100-21 = "貴女には説明したはずだわ。"
84304300100-22 = "……はぁ。どうせ何言ってもお前には伝わらねえんだろうな。"
84304300100-24 = "功績……。"
84304300100-25 = "まあ、それはもういいだろ。今する話じゃねぇ。 "
84304300100-26 = "これからどうする？またあいつらが何か問題を起こすまで待つか？"
84304300100-27 = "それは望み薄だろう。追われていると分かった以上、向こうも慎重になるはずだ。"
84304300100-28 = "大丈夫。もう、これ以上の問題は起こさせない。"
84304300100-29 = "使う気は無かったのだけれど……他に方法がない。大事になる前に止めなければ。"
84304300100-33 = "何の話してんだ？"
84304300100-34 = "初めて聞かされる話だろうか。"
84304300100-36 = "二人とも知らない話よ。そもそも、私以外に知っている人はいないもの。"
84304300100-37 = "私がまだミレニアムにいた頃……秘密裏に使っていたシステム――"
84304300100-41 = "「ビッグシスターアルゴリズム」を使うわ。"
