[translation]
84304300100-5 = "（Neru retorna ao esconderijo e explica a situação para Rio e Seia）"
84304300100-8 = "……Entendo."
84304300100-9 = "O oponente conhece a Rio…… e não é apenas como uma presidente do conselho estudantil."
84304300100-10 = "Não há problema em pensar assim."
84304300100-11 = "Bem, não seria melhor não se deixar levar tanto por isso?"
84304300100-12 = "……Está ouvindo, Rio?"
84304300100-14 = "Ah…… sim…… é verdade."
84304300100-15 = "Além disso…… ela não disse nada particularmente errado."
84304300100-16 = "Não, você está preocupada, não está? Você é tão fácil de ler."
84304300100-17 = "Na verdade, é exatamente isso. Por isso preciso provar quem eu sou."
84304300100-18 = "（Provar……）"
84304300100-19 = "Não, é por isso que――"
84304300100-20 = "Este caso também é uma extensão disso. Para voltar ao Millennium…… para poder andar de cabeça erguida na frente dos alunos…… preciso de méritos correspondentes."
84304300100-21 = "Eu deveria ter explicado isso a você."
84304300100-22 = "……Haa. De qualquer forma, não importa o que eu diga, você não vai entender."
84304300100-24 = "Méritos……."
84304300100-25 = "Bem, esqueça isso por enquanto. Não é o momento para falar sobre isso."
84304300100-26 = "O que faremos agora? Vamos esperar até que eles causem outro problema?"
84304300100-27 = "É pouco provável. Agora que sabem que estão sendo perseguidos, eles devem ser mais cautelosos."
84304300100-28 = "Está tudo bem. Não vou deixar que causem mais problemas."
84304300100-29 = "Eu não queria usar isso, mas…… não há outro jeito. Preciso impedir antes que se torne algo grave."
84304300100-33 = "Do que você está falando?"
84304300100-34 = "Será que é algo que vocês estão ouvindo pela primeira vez?"
84304300100-36 = "É um assunto que nenhuma das duas conhece. Na verdade, não há mais ninguém além de mim que saiba disso."
84304300100-37 = "Quando eu ainda estava no Millennium…… eu usava um sistema em segredo――"
84304300100-41 = "Vou usar o \"Algoritmo Big Sister\"."
