[translation]
90001120-1 = "Episódio 12; Proposta"
90001120-3 = "Falando nisso, ouvi dizer que a Alice teve um papel fundamental naquela época."
90001120-4 = "Tudo o que me lembro é que o pessoal do Clube de Desenvolvimento de Jogos apareceu na sala do clube depois que tudo terminou."
90001120-5 = "A proposta da festa, os 2 kilobytes de dados, o chaveiro em formato de robô, a atmosfera apropriada, a música de fundo emocionante — e até o momento em que me tornei a heroína principal."
90001120-6 = "Aconteceram muitas coisas."
90001120-7 = "……Pff."
90001120-8 = "Entendo a primeira parte, mas…… o que foi a segunda?"
90001120-9 = "Só disse por dizer."
90001120-16 = "（Sinto que ela tem dito esse tipo de coisa com frequência ultimamente……）"
90001120-17 = "Naquela época, a arca que a Alice reconstruiu a partir da nave principal de Utnapishtim era…… a própria \"Prova do Herói\" da Alice."
90001120-18 = "Fufu. Ainda me lembro do nome que eu dei. #n\"Espada de Luz: Supernova de Atra-Hasis\"."
90001120-19 = "Eu não disse na hora, mas…… o seu senso de nomenclatura não é um pouco estranho?"
90001120-20 = "Eu não quero ouvir isso vindo de você!"
90001120-21 = "（Essas duas não aprendem mesmo……）"
90001120-22 = "Ehem."
90001120-23 = "Mas há um problema. #nNós não sabemos o que a Alice fez especificamente."
90001120-24 = "Não tínhamos como saber qual foi o mecanismo ou por quais processos ela passou para reconstruir aquilo……"
90001120-25 = "É verdade…… qual foi a fonte de energia, como a reconstrução da matéria foi realizada."
90001120-26 = "Não entendemos o princípio nem nada. Não tivemos tempo para compreender."
90001120-27 = "Para nós, foi apenas um \"evento momentâneo\"."
90001120-28 = "Ou seja, é extremamente difícil de reproduzir…… ou quase impossível, eu diria."
90001120-29 = "Um milagre que acontece apenas uma vez é romântico, é claro."
90001120-30 = "Mas é justamente por isso que ele é inimigo da teoria e da ciência."
90001120-31 = "Concordo. A ciência é um processo que exige reprodutibilidade."
90001120-32 = "Se você entende o processo, ele é feito para que o mesmo resultado possa ser alcançado."
90001120-33 = "……."
90001120-34 = "Eu acho que deveríamos falar diretamente com a Alice."
90001120-35 = "Isso significa…… chamar a Alice aqui?"
90001120-36 = "Sim. Pedir para a Alice analisar e reproduzir aquele momento."
90001120-37 = "……Você tem certeza de que isso é o certo?"
90001120-38 = "Existe outra maneira?"
90001120-43 = "……Isso também pode ser interpretado como usar a Alice como uma \"ferramenta\" para resolver o problema."
90001120-44 = "……É verdade."
90001120-45 = "……."
90001120-46 = "Presidente……."
90001120-51 = "Rio, não vou repetir duas vezes. #nNós já tivemos uma conversa parecida antes, não tivemos?"
90001120-52 = "Naquela época o alvo era a Toki, agora é a Alice."
90001120-53 = "Claro, não me importo se você se arrepender, já que você é como uma flor solitária no topo de um penhasco……"
90001120-54 = "Mas ver você repetir o mesmo erro…… não é nada agradável."
90001120-55 = "É verdade……."
90001120-56 = "[s] \"…….\""
90001120-60 = "[ns] \"Ei, Rio.\""
90001120-61 = "……O-o que foi?"
90001120-78 = "[ns] \"Será que a Alice é realmente necessária?\""
90001120-79 = "Desculpe. Eu também não tenho 100% de certeza. #n……Considere apenas como uma das possibilidades."
90001120-80 = "Esqueça o que eu disse por enquanto. #nNão é garantido que meu pensamento esteja correto."
90001120-81 = "[s] \"……Eu vou falar com a Alice e o Clube de Desenvolvimento de Jogos.\""
90001120-82 = "P-Professor!?"
90001120-83 = "Professor!?"
90001120-84 = "Ah, Professor? O que houve?"
90001120-85 = "Você tem certeza disso?#nDependendo de como se interpreta, isso pode ser..."
90001120-90 = "É porque essa situação... é especial?#nIsso é... verdade, mas..."
90001120-91 = "Contar isso para a Alice é trabalho do Sensei...?"
90001120-92 = "[s] \"Em troca, tenho uma proposta para a Rio.\""
90001120-93 = "Para mim...?"
90001120-94 = "[s] \"Quero que a Rio também venha à base na geleira.\""
90001120-95 = "¡?"
90001120-96 = "A presidente, pessoalmente!?"
90001120-97 = "Sensei, o que exatamente isso significa...?"
90001120-99 = "……."
90001120-100 = "Seria uma forma de \"assumir a responsabilidade juntos\"...?"
90001120-101 = "[s] \"Deixarei essa decisão nas mãos da Rio.\""
90001120-105 = "[ns] \"Assim como a Rio me propôs.\""
90001120-109 = "[ns] \"Eu também apenas fiz uma proposta.\""
90001120-110 = "……."
90001120-111 = "Eu não sei, Sensei.#nEu..."
90001120-112 = "Será que tenho qualificações para isso...?#nE se eu cometer um erro novamente...?"
90001120-116 = "...Desta vez, a senhorita Rio nos ajudou."
90001120-118 = "……."
90001120-123 = "Eu não entendo bem onde reside a \"justiça\" que a senhorita Rio menciona.#nSerá que é realmente possível fazer escolhas que nunca estejam erradas?"
90001120-124 = "Mas eu... quero ver a senhorita Rio mais uma vez."
90001120-125 = "Será que esse motivo não é suficiente?"
90001120-126 = "Toki..."
90001120-132 = "Rio.#nDesta vez, é a sua vez de escolher."
90001120-133 = "Eu entendo seus critérios de julgamento.#nIsso pode ser chamado, literalmente, de \"racionalidade\"."
90001120-134 = "Por favor, me diga a conclusão do seu julgamento racional."
90001120-138 = "…………."
90001120-139 = "Entendo... a comunicação por si só tem limites.#nTanto em termos de segurança quanto de proteção."
90001120-140 = "Se o sinal for interferido, existe a possibilidade de tudo dar errado.#nComo aconteceu desta vez."
90001120-141 = "Por isso, eu..."
90001120-142 = "Sim, está decidido então."
90001120-143 = "Nós também iremos para a base na geleira, então nos encontraremos lá."
90001120-144 = "...Entendido."
90001120-146 = "Presidente Rio... há algo que a esteja incomodando?"
90001120-147 = "Não é exatamente isso, mas..."
90001120-148 = "Será que eu realmente deveria ir...?"
90001120-149 = "……."
90001120-150 = "Estou enviando as coordenadas da base na geleira.#nQuanto ao meio de transporte... bem, você já deve ter preparado um há muito tempo, não é?"
90001120-151 = "...Sim."
90001120-152 = "Estou ansiosa para vê-la novamente, senhorita Rio."
90001120-153 = "Toki."
90001120-154 = "Sim. O que houve?"
90001120-160 = "Obrigada pelo seu trabalho até agora.#nE... obrigada."
90001120-161 = "Não há de quê."
90001120-164 = "(Enquanto todos estão ocupados com suas próprias tarefas, acabei ficando um momento sozinho)"
90001120-165 = "(Já que estou aqui...)"
90001120-171 = "Ué? Sensei?"
90001120-172 = "Bem-vindo de volta, Sensei. Aconteceu alguma coisa?"
90001120-173 = "Ah? Você queria ver nossos rostos?"
90001120-174 = "I-isso é muito gratificante, mas... hehe..."
90001120-175 = "Mas, se algo aconteceu, por favor, me conte."
90001120-176 = "Afirmação. Você está com uma aparência ruim. #nVou perguntar de novo, aconteceu alguma coisa?"
90001120-177 = "[s] \"Dá para perceber tanto assim no meu rosto...?\""
90001120-178 = "Quanto tempo você acha que passamos juntos?"
90001120-179 = "Mesmo que tente esconder, nós percebemos!"
90001120-180 = "Afirmação. O Sensei de agora talvez não saiba."
90001120-181 = "Mas o Sensei que eu conheço era exatamente assim."
90001120-182 = "Vamos, vamos, a Arona ouve qualquer coisa!"
90001120-183 = "Eu também."
90001120-184 = "Ah, sim. A Plana-chan também!"
90001120-188 = "[ns1] \"...É que pedir para os alunos resolverem os problemas é complicado.\"\n[ns2] \"É difícil colocar os alunos em perigo.\""
90001120-191 = "Sensei..."
90001120-192 = "..."
90001120-193 = "M-mas Sensei!"
90001120-194 = "O Sensei já resolveu situações parecidas várias vezes antes, não é? #n...Ou algo assim, hehe."
90001120-209 = "[ns] \"Sinto que desta vez é um pouco diferente daquela época.\""
90001120-211 = "Eh? Naquela época, você agia para consertar algo que já tinha acontecido, mas..."
90001120-212 = "Desta vez, é sobre os alunos poderem acabar em perigo por sua causa, certo?"
90001120-213 = "Entendido. Mas essa é a melhor estratégia, não é?"
90001120-216 = "[ns3] \"É verdade...\"\n[ns4] \"Mas, se for por isso que os alunos vão se colocar em perigo...\""
90001120-221 = "[ns] \"Eu me pergunto o que me diferencia deles.\""
90001120-224 = "..."
90001120-225 = "..."
90001120-227 = "[ns] \"Ah, quer saber! Será que eu não poderia ficar incrivelmente forte de repente?!\""
90001120-228 = "S-Sensei?"
90001120-229 = "Incompreensível. O que houve de repente, Sensei?"
90001120-230 = "[s5] \"Não, é que... veja só!\"\n[s6] \"Poder voar? Atravessar barreiras e tudo mais!\""
90001120-234 = "[ns7] \"Deuses sem nome, Decagrammaton, tudo isso!\"\n[ns8] \"Seria bom se eu tivesse o poder de resolver tudo de uma vez... é isso!\""
90001120-238 = "O-o que aconteceu...?"
90001120-239 = "Confusão. Não consigo entender. Solicito uma explicação detalhada."
90001120-243 = "[ns] \"Desculpe, estou bem. Só estava falando por falar.\""
90001120-253 = "[log]Por favor... cuide bem dos alunos.[/log]"
90001120-259 = "[ns] \"Não tenho escolha, né... Certo!\""
90001120-261 = "[ns9] \"Fazer tudo o que estiver ao meu alcance! Lutar até o fim!\"\n[ns10] \"E se mesmo assim não der certo...\""
90001120-264 = "S-se não der certo?"
90001120-268 = "[ns11] \"...Conversamos sobre isso outra hora!\"\n[ns12] \"Ainda não sabemos o que vai acontecer!\""
90001120-271 = "S-Sensei? Você está realmente bem... né?"
90001120-272 = "Dúvida, perplexidade. Solicito uma verificação do estado mental do Sensei."
90001120-273 = "[s] \"Estou bem! Estou bem!\""
90001120-278 = "E-eu fico feliz que esteja me fazendo carinho, mas... auuu..."
90001120-279 = "Confusão. Não entendo a intenção do Sensei."
90001120-281 = "(Assim, continuou fazendo carinho nas duas por um tempo)"
90001120-282 = "(Após confirmar que elas adormeceram, afastou-se silenciosamente)"
90001120-284 = "Próximo episódio: Partida"
