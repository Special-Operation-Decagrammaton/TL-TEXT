[translation]
90001120-1 = "第12話;提案"
90001120-3 = "そういえばあの時、アリスが大活躍したと聞きます。"
90001120-4 = "私が覚えているのは、全てが終わった後にゲーム開発部の皆さんが部室に来たことくらいですが。"
90001120-5 = "パーティの提案、2キロバイトのデータ、ロボット型のキーホルダー、適切な雰囲気、感動的なBGM――そして私がメインヒロインになるまで。"
90001120-6 = "色々ありました。"
90001120-7 = "……ふっ。"
90001120-8 = "前半は分かりますが……後半は何ですか？"
90001120-9 = "言ってみただけです。"
90001120-16 = "（最近なんかああいうのよく言ってくる気がする……）"
90001120-17 = "あの時、ウトナピシュティムの[ruby=もとぶね]本船[/ruby]からアリスが再構築した箱舟は――アリスの「勇者の証」そのものでした。"
90001120-18 = "ふふっ。今でも私が付けた名前を覚えています。#n「光の剣：アトラ・ハシースのスーパーノヴァ」。"
90001120-19 = "あの時は言わなかったけど……貴女のネーミングセンス、少し変じゃないかしら？"
90001120-20 = "あなたにそんなこと言われたくありません！"
90001120-21 = "（懲りないな、この二人は……）"
90001120-22 = "こほん。"
90001120-23 = "ですが、問題が一つ。#n私たちはアリスが具体的に何をしたのか分かっていません。"
90001120-24 = "どのようなメカニズムで、どのプロセスを経て再構築したのか……知る由もなかったのです。"
90001120-25 = "そうね……エネルギー源は何だったのか、物質の再構築はどのように行われたのか。"
90001120-26 = "原理も何も分からなかった。理解する時間もなかった。"
90001120-27 = "私たちにとっては、「一瞬の出来事」だったもの。"
90001120-28 = "つまり再現が非常に難しい……あるいは不可能に近いと言えるでしょう。"
90001120-29 = "一度きりの奇跡というのは、ロマンチックではありますが。"
90001120-30 = "だからこそ、理論や学問の敵でもあります。"
90001120-31 = "そうね。学問は再現性があるプロセスだもの。"
90001120-32 = "その過程を理解すれば、同じ結果が出せるように作られている。"
90001120-33 = "……。"
90001120-34 = "私は、アリスと直接話すべきだと思うのだけれど。"
90001120-35 = "それは……アリスをここに呼ぶ、と？"
90001120-36 = "ええ。アリスに当時を分析、再現してもらうのよ。"
90001120-37 = "……本当にそれでいいのですか？"
90001120-38 = "それ以外に方法があるのかしら？"
90001120-43 = "……アリスを問題解決の「道具」にする、とも解釈できるのだけれど。"
90001120-44 = "……そうね。"
90001120-45 = "……。"
90001120-46 = "会長……。"
90001120-51 = "リオ、二度は言いません。#n私たちは既に一度同じような話をしていますよね。"
90001120-52 = "その時はトキが対象で、今はアリス。"
90001120-53 = "もちろん清楚な崖の上の一輪の花は、あなたが後悔しようが気にしませんが……"
90001120-54 = "同じ過ちを繰り返す様を見せられるのは……愉快なことではありません。"
90001120-55 = "そうね……。"
90001120-56 = "[s] \"……。\""
90001120-60 = "[ns] \"ねえ、リオ。\""
90001120-61 = "……な、なにかしら？"
90001120-78 = "[ns] \"本当にアリスが必要なのかな？\""
90001120-79 = "ごめんなさい。私も100％の確信はないの。#n……可能性の一つと思ってもらって構わないわ。"
90001120-80 = "今の話は一旦忘れてちょうだい。#n私の考えが正しいとは限らないもの。"
90001120-81 = "[s] \"……私がアリスとゲーム開発部に話をしてみるよ。\""
90001120-82 = "せ、先生！？"
90001120-83 = "先生！？"
90001120-84 = "え、先生？どうしたの？"
90001120-85 = "本当に大丈夫なのですか？#nそれは、捉え方によっては……。"
90001120-90 = "この事態が……特殊だから？#nそれは……そう、だけれど……。"
90001120-91 = "アリスにその言葉を伝えるのは、先生の仕事……？"
90001120-92 = "[s] \"その代わり、リオに提案したいことがあるんだ。\""
90001120-93 = "私に……？"
90001120-94 = "[s] \"リオも氷河の拠点に来てほしい。\""
90001120-95 = "！？"
90001120-96 = "会長が、直接！？"
90001120-97 = "先生、それは一体……？"
90001120-99 = "……。"
90001120-100 = "「一緒に責任を負う姿勢」ということかしら……？"
90001120-101 = "[s] \"その判断は、リオに任せるよ。\""
90001120-105 = "[ns] \"リオが提案してくれたように。\""
90001120-109 = "[ns] \"私も、提案しただけだから。\""
90001120-110 = "……。"
90001120-111 = "分からないわ、先生。#n私は……。"
90001120-112 = "私にそんな資格があるのか……。#nまた、間違えてしまうのではないか……。"
90001120-116 = "……今回リオ様は私たちを助けてくださりました。"
90001120-118 = "……。"
90001120-123 = "私にはリオ様の言う「正しさ」がどこにあるのかよく分かりません。#n常に間違わない選択が果たして可能なのか。"
90001120-124 = "ですが私は……リオ様にもう一度会いたいです。"
90001120-125 = "そんな理由では、ダメなのでしょうか？"
90001120-126 = "トキ……。"
90001120-132 = "リオ。#n今度はあなたが選ぶ番です。"
90001120-133 = "あなたの判断基準は理解しています。#nそれは文字通り「合理」といえるでしょう。"
90001120-134 = "あなたの合理的な判断の結論を教えて下さい。"
90001120-138 = "…………。"
90001120-139 = "そうね……通信だけでは限度がある。#nセキュリティの面でも、安全の面でも。"
90001120-140 = "電波が妨害されてしまったら全てが狂う可能性もあるわ。#n今回もそうだったように。"
90001120-141 = "だから、私は……。"
90001120-142 = "はい、決まりですね。"
90001120-143 = "では、私たちも氷河の拠点に向かいますので、そこで落ち合いましょう。"
90001120-144 = "……わかっ、たわ。"
90001120-146 = "リオ会長……何か気になることでもあるの？"
90001120-147 = "そういうわけでは、ないのだけれど……。"
90001120-148 = "本当に、私が行っても良いのかしら……？"
90001120-149 = "……。"
90001120-150 = "氷河拠点の座標を送信します。#n移動手段は……まあ、あなたならとっくに用意しているのでしょう？"
90001120-151 = "……ええ。"
90001120-152 = "久しぶりにお会いできるのを楽しみにしております、リオ様。"
90001120-153 = "トキ。"
90001120-154 = "はい。いかがされましたか？"
90001120-160 = "今までお疲れ様。#nそして……ありがとう。"
90001120-161 = "とんでもございません。"
90001120-164 = "（皆がそれぞれのことで忙しい中、たまたま一人の時間ができた）"
90001120-165 = "（せっかくだから……）"
90001120-171 = "あれ？先生？"
90001120-172 = "おかえりなさい先生。どうかされましたか？"
90001120-173 = "え？私たちの顔が見たくなった？"
90001120-174 = "そ、それはとても嬉しいですけど……えへへ……。"
90001120-175 = "でも、何かあったなら言ってくださいね。"
90001120-176 = "肯定。顔色が悪いです。#nもう一度聞きますが、何かありましたか？"
90001120-177 = "[s] \"私ってそんなに顔に出てる……？\""
90001120-178 = "今までどれだけ一緒にいたと思ってるんですか？"
90001120-179 = "顔に出さないようにしたって、私たちにはわかりますよ！"
90001120-180 = "肯定。今の先生は、知らないかもしれませんが。"
90001120-181 = "私が知っている先生は、そういう方でした。"
90001120-182 = "さあさあ、アロナが何でも聞きますよ！"
90001120-183 = "私もです。"
90001120-184 = "あ、はい。プラナちゃんも！"
90001120-188 = "[ns1] \"……問題解決を生徒にお願いするのがちょっとね。\"\n[ns2] \"生徒を危険に晒すのが辛いんだ。\""
90001120-191 = "先生……。"
90001120-192 = "……。"
90001120-193 = "で、でも先生！"
90001120-194 = "先生は今までも……何度も、同じような状況を解決してきたじゃないですか！#nとか言ってみたり……えへへ。"
90001120-209 = "[ns] \"あの時とは少し違う気がするんだ。\""
90001120-211 = "え？あの時は、既に起こったことを、何とかするために動いてたけど……"
90001120-212 = "今回は、先生のせいで生徒が危険に晒されるかもしれない、と。"
90001120-213 = "納得。ですが、それが最善策なのですよね？"
90001120-216 = "[ns3] \"そうだね……。\"\n[ns4] \"でも、そのせいで生徒たちが危険な目に遭うのなら。\""
90001120-221 = "[ns] \"私は、彼らと何が違うんだろうなって。\""
90001120-224 = "……。"
90001120-225 = "……。"
90001120-227 = "[ns] \"あぁ、もう！急にめっちゃくちゃ強くならないかな！\""
90001120-228 = "せ、先生？"
90001120-229 = "理解不能。急にどうされたんですか、先生。"
90001120-230 = "[s5] \"いや、その……ほら！\"\n[s6] \"空も飛べたり？バリアだって何だって、全部突破して！\""
90001120-234 = "[ns7] \"名もなき神だのデカグラマトンだのぜーんぶ！\"\n[ns8] \"一気に解決できる能力が私にあったら良かったな……って！\""
90001120-238 = "ど、どうしたんですか……？"
90001120-239 = "混乱。理解できません。詳細な説明を要求します。"
90001120-243 = "[ns] \"ごめん、大丈夫。言ってみただけだから。\""
90001120-253 = "[log]生徒たちを……よろしく、お願いします。[/log]"
90001120-259 = "[ns] \"やるしかないか……よし！\""
90001120-261 = "[ns9] \"やれること全部やって！最後まで足掻いて！\"\n[ns10] \"それでもダメだったら！\""
90001120-264 = "だ、ダメだったら？"
90001120-268 = "[ns11] \"……この話はまた今度ね！\"\n[ns12] \"まだどうなるか分からないからね！\""
90001120-271 = "せ、先生？本当に大丈夫……ですよね？"
90001120-272 = "疑問、困惑。先生のメンタルチェックを要請します。"
90001120-273 = "[s] \"大丈夫！大丈夫！\""
90001120-278 = "な、撫でてくださるのは嬉しいですけど……あうぅ……。"
90001120-279 = "混乱。先生の意図が分かりません。"
90001120-281 = "（そうしてずっと二人を撫でて）"
90001120-282 = "（眠りについたのを確認してから、そっと離れた）"
90001120-284 = "次回;出発"
