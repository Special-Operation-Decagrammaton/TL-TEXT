[translation]
1003606-1 = "Coisas para levar no piquenique"
1003606-2 = "À beira do rio"
1003606-3 = "（Caminhando pela margem do rio, vi Hinata）"
1003606-4 = "……Ah, Sensei! Por aqui!"
1003606-5 = "Desculpe incomodá-lo, muito obrigada……!"
1003606-6 = "[s1] \"Bom dia, Hinata.\"\n[s2] \"Você parece estar com uma expressão melhor do que o normal.\""
1003606-7 = "Eh, ah, bem……."
1003606-8 = "Eh, ah, bem……."
1003606-9 = "S-será que dá para perceber……?"
1003606-10 = "É que, não é como se houvesse um motivo especial ou um assunto importante para tratar hoje……."
1003606-11 = "O-o que eu posso dizer……."
1003606-12 = "Hmm……."
1003606-13 = "É como se fosse um passeio……."
1003606-14 = "[s3] \"Tipo um piquenique?\"\n[s4] \"Tipo uma pequena excursão?\""
1003606-15 = "S-sim! É mais ou menos isso……!"
1003606-16 = "S-sim! É mais ou menos isso……!"
1003606-17 = "Incrível, Sensei, é como se você pudesse ler a minha mente……."
1003606-18 = "B-bem, de qualquer forma, você sempre me ajuda com tudo. Então, pensei em retribuir dessa forma, embora talvez não seja o suficiente para chamar de hospitalidade."
1003606-19 = "Preparei tudo do meu jeito, com muito carinho!"
1003606-20 = "Aqui está!"
1003606-21 = "[s5] \"……Onde?\"\n[s6] \"Eh……?\""
1003606-22 = "……?"
1003606-23 = "……?"
1003606-24 = "Ah, aqui, aqui. Dentro disto."
1003606-25 = "É, de fato, a minha \"bolsa de sempre\", mas……."
1003606-26 = "Na verdade, o interior desta bolsa é bem espaçoso……."
1003606-27 = "Normalmente eu guardo minha metralhadora aqui, mas, um momento."
1003606-32 = "[ns7] \"Hinata……!?\"\n[ns8] \"O que você vai atirar!?\""
1003606-33 = "Ah, não, está tudo bem……!"
1003606-34 = "Ah, não, está tudo bem……!"
1003606-35 = "É só para tirar por um instante. Pronto……."
1003606-40 = "E então, aqui embaixo……."
1003606-41 = "Ah, achei!"
1003606-42 = "[s9] \"……Ah, uma lancheira.\"\n[s10] \"Entendi, você guardou lá no fundo.\""
1003606-43 = "Sim, ehehe……."
1003606-44 = "Sim, ehehe……."
1003606-45 = "O tamanho é tão bom que sobra espaço mesmo com a metralhadora, é bem útil."
1003606-46 = "Além disso, costumo guardar livros ou roupas extras aqui também."
1003606-47 = "Bem, vou guardar isso de volta……."
1003606-51 = "……Pronto, OK."
1003606-52 = "Então, recomeçando……"
1003606-53 = "Ah, bem, não é como se eu tivesse muita confiança na minha culinária……."
1003606-54 = "M-mas, eu fiz com todo o meu esforço! P-para você, Sensei……."
1003606-55 = "Espero que seja do seu agrado……."
1003606-56 = "Então……"
1003606-60 = "Ah, diga 'ah'……!"
1003606-61 = "[s11] \"Ah…….\"\n[s12] Fecho os olhos e abro a boca."
1003606-62 = "P-por favor……!"
1003606-63 = "P-por favor……!"
1003606-65 = "（E assim, aproveitei um delicioso almoço com a Hinata）"
1003606-66 = "(Ela disse que não estava confiante, mas estava muito gostoso, e o tempero delicado da Hinata estava maravilhoso)"
