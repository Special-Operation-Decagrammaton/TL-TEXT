[translation]
1003606-1 = "ピクニックに持っていくもの"
1003606-2 = "川沿い"
1003606-3 = "（川沿いに歩いていくと、ヒナタの姿が見えた）"
1003606-4 = "……あ、先生！こちらです！"
1003606-5 = "わざわざすみません、ありがとうございます……！"
1003606-6 = "[s1] \"おはよう、ヒナタ。\"\n[s2] \"何だかいつも以上に、良い表情してるね。\""
1003606-7 = "え、あ、えっと……。"
1003606-8 = "え、あ、えっと……。"
1003606-9 = "や、やっぱりそう見えます、かね……？"
1003606-10 = "その、今日は何か特別な理由や、大事なお話があったわけではないのですが……。"
1003606-11 = "な、何と言いましょうか……。"
1003606-12 = "うーん……。"
1003606-13 = "お出かけと、言いますか……。"
1003606-14 = "[s3] \"ちょっとしたピクニックみたいな？\"\n[s4] \"ちょっとした遠足みたいな？\""
1003606-15 = "は、はい！およそそんな感じです……！"
1003606-16 = "は、はい！およそそんな感じです……！"
1003606-17 = "すごいですね先生、まるで私の心が読めるみたいな……。"
1003606-18 = "と、とにかく、先生にはいつも助けていただいてばかりなので。たまにはこういった形で、おもてなし……と言うには足りないかもしれませんが。"
1003606-19 = "自分なりに、しっかり用意してみました！"
1003606-20 = "こちらです！"
1003606-21 = "[s5] \"……どれ？\"\n[s6] \"えっと……？\""
1003606-22 = "……？"
1003606-23 = "……？"
1003606-24 = "あ、これです、これ。この中に。"
1003606-25 = "た、確かに「いつものカバン」なのですが……。"
1003606-26 = "実はこのカバン、中が結構広くって……。"
1003606-27 = "普段は機関銃を入れているのですが、んしょっ。"
1003606-32 = "[ns7] \"ヒナタ……！？\"\n[ns8] \"何を撃つの！？\""
1003606-33 = "あ、いえ、大丈夫です……！"
1003606-34 = "あ、いえ、大丈夫です……！"
1003606-35 = "一旦出すだけですので。よい、しょっと……。"
1003606-40 = "それで、この下に……。"
1003606-41 = "あ、ありました！"
1003606-42 = "[s9] \"……あ、お弁当箱。\"\n[s10] \"なるほど、下の方に入れてたんだね。\""
1003606-43 = "はい、えへへ……。"
1003606-44 = "はい、えへへ……。"
1003606-45 = "機関銃を入れても全然余裕があるサイズで、便利なんですよ。"
1003606-46 = "他にも普段は本とか、予備の服なんかを入れてたりするんです。"
1003606-47 = "えっと、これはもう一度しまって……。"
1003606-51 = "……はい、OKです。"
1003606-52 = "ではあらためて……"
1003606-53 = "あ、えっと、料理に自信があるわけではないのですが……。"
1003606-54 = "で、ですが、一生懸命作りました！せ、先生のために……。"
1003606-55 = "その、お気に召していただけると嬉しいのですが……。"
1003606-56 = "では……"
1003606-60 = "あ、あーん……！"
1003606-61 = "[s11] \"あーん……。\"\n[s12] 目を閉じて口を開ける。"
1003606-62 = "ど、どうぞ……っ！"
1003606-63 = "ど、どうぞ……っ！"
1003606-65 = "（そうしてヒナタと、美味しくお弁当を頂いた）"
1003606-66 = "（自信が無いとは言っていたけれどすごく美味しくて、ヒナタの繊細な味付けが素晴らしかった）"
