[translation]
1012605-1 = "唐突なお誘い"
1012605-2 = "（カノエがいる収録スタジオに到着した）"
1012605-6 = "ようこそ、先生。"
1012605-7 = "……早速だけど、機材の使い方についてレクチャーするよ。"
1012605-8 = "一緒に幸せな時間を過ごそうねぇ……イヒッ、イヒヒッ……。"
1012605-9 = "[s] \"しゅ、収録するだけだよね？\""
1012605-10 = "え……？#nもしかして、他のコトも期待してたぁ？"
1012605-11 = "……そっか。"
1012605-12 = "いい……よ？#n先生を呼んだときから、覚悟はしてるし……。"
1012605-13 = "きっと先生なら、この冷えた身体を温めてくれるんだよね？#n「あのとき」みたいに。"
1012605-14 = "[ns1] （ま、まずい……！）\n[ns2] （どうにかして逃げたほうが……）"
1012605-22 = "イヒヒ……逃がさないよ。"
1012605-23 = "[s] \"い、いつの間に……！？\""
1012605-24 = "先生……一体何を考えてたの？"
1012605-25 = "私にも教えて？一緒に楽しもう？"
1012605-26 = "イヒッ……イヒヒッ……！"
1012605-27 = "[s3] \"な、なんでもないよ！\"\n[s4] \"さ、さあ、機材の使い方を教えてほしいな……！\""
1012605-31 = "（その後、カノエから機材の使い方を教わった）"
1012605-32 = "（おかげで、簡単な操作くらいはできるようになった）"
1012605-37 = "さて、そろそろ始めようかぁ。"
1012605-38 = "手伝ってくれてるお礼に……#n私の本当の姿を見せてあげる。"
1012605-43 = "[wa:540]― [log=카노에]せ、[wa:930]先生……[wa:1470]その、[wa:1500]収録の前に……[/log]"
1012605-45 = "― [log=카노에]聞いてほしいことがあるの。[/log]"
1012605-48 = "― [log=카노에]じ、[wa:750]実は……[/log]"
1012605-50 = "― [log=카노에]私、[wa:1260]ずっと隠してたことがあって……。[/log]"
1012605-53 = "― [log=카노에]わ、[wa:590]私……[wa:1620]恥ずかしがり屋で、[/log]"
1012605-55 = "― [log=카노에]うまく話せなくて。[/log]"
1012605-58 = "[wa:510]― [log=카노에]それを隠すために、[/log]"
1012605-60 = "― [log=카노에]陰気なキャラを演じてた……。[/log]"
1012605-63 = "― [log=카노에]オカルトに手を出したのも、[/log]"
1012605-65 = "― [log=카노에]自分を変えたかったから。[/log]"
1012605-68 = "[wa:1200]― [log=카노에]これを知っているのは……[wa:2000]先生だけ。[/log]"
1012605-70 = "― [log=카노에]だから……[wa:1500]内緒にしてね？[/log]"
1012605-73 = "[wa:370]― [log=카노에]せ、[wa:770]先生のこと、[wa:1900]信じてる、[wa:1290]よ……。[/log]"
1012605-76 = "[ns] \"こ、これがカノエの本当の姿……？\""
1012605-77 = "[wa:150]― [log=카노에]……イヒッ、[wa:1020]イヒヒ。[/log]"
1012605-79 = "― [log=카노에]ねえ、[wa:1390]信じたぁ？[/log]"
1012605-82 = "― [log=카노에]先生は、[wa:1680]可愛いものが好きなんでしょ？[/log]"
1012605-85 = "[wa:550]― [log=카노에]じゃあ、[wa:1340]私のことも……[wa:2400]好き、[wa:1240]だよねぇ？[/log]"
1012605-87 = "― [log=카노에]イヒッ……！[/log]"
1012605-90 = "[ns] \"ま、また騙された……！\""
1012605-92 = "（その後も、カノエの収録を手伝った）"
1012605-93 = "（今回収録したのは、熱血スポコンもののドラマCDだった）"
1012605-95 = "うん……これで今日の収録は全部終わりかな。"
1012605-96 = "先生もお疲れ様。さすが、頼りになるね。"
1012605-97 = "[s] \"やっぱり、演技のレパートリーがすごいね。\""
1012605-98 = "でも、もっと頑張らないと……。"
1012605-99 = "最近の声優は、これくらいできて当たり前だよ。"
1012605-100 = "売れっ子だからって……気を緩めるわけにはいかないの。"
1012605-101 = "[s] \"夢を追いかけてる真っ最中なんだね。\""
1012605-105 = "うん……私にも夢があるよ……。"
1012605-106 = "どんな夢か当ててみてぇ？"
1012605-107 = "[s] \"有名な声優になること？\""
1012605-108 = "それもだけど……もっと大きな夢があるんだ。"
1012605-109 = "私の夢は――"
1012605-122 = "――前世の絆を取り戻すこと。"
1012605-123 = "先生、まだ思い出せないの？"
1012605-128 = "私だよ……手は冷たくても……心は熱い女。"
1012605-132 = "オカルトが好きで、黒猫とカラスに慕われる女――"
1012605-138 = "そう、[ruby=いたがき]板垣[/ruby]カノエ……！"
1012605-139 = "[s] \"そ、それはよく知ってるけど……！\""
1012605-141 = "（帰り道、カノエにご褒美をあげるべく近くのスイーツカフェに寄った）"
1012605-146 = "（収録を頑張った後だからか、カノエは甘いものを食べて満足そうにしていた）"
