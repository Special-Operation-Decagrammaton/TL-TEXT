[translation]
1012605-1 = "Um convite repentino"

1012605-2 = "(Chegou ao estúdio de gravação onde Kanoe está)"

1012605-6 = "Bem-vindo, professor."

1012605-7 = "...Vou dar uma palestra rápida sobre como usar o equipamento."

1012605-8 = "Vamos nos divertir juntos... Ihi, Ihihi..."

1012605-9 = "[s] \"Shu, é só gravar, certo?\""

1012605-10 = "foto……? #nTalvez você também estivesse esperando outra coisa?"

1012605-11 = "...Eu vejo."

1012605-12 = "OK...? #nEstou preparado desde o momento em que liguei para a professora..."

1012605-13 = "Tenho certeza que a professora vai aquecer esse corpo gelado, né? #nComo \"daquela vez\"."

1012605-14 = "[ns1] (Bem, isso é ruim...!)\n[ns2] (É melhor fugir de alguma forma...)"

1012605-22 = "Heehee... não vou deixar você escapar."

1012605-23 = "[s] \"Eu-quando foi que...!?\""

1012605-24 = "Professor... o que diabos você estava pensando?"

1012605-25 = "Você pode me dizer também? Vamos nos divertir juntos?"

1012605-26 = "Ihi... Ihihi...!"

1012605-27 = "[s3] \"Não é nada!\"\n[s4] \"Bem, agora, quero que você me ensine como usar o equipamento...!\""

1012605-31 = "(Mais tarde, Kanoe me ensinou como usar o equipamento.)"

1012605-32 = "(Graças a você, agora posso realizar operações simples.)"

1012605-37 = "Bem, vamos começar agora."

1012605-38 = "Como agradecimento por me ajudar...#nVou te mostrar meu verdadeiro eu."

1012605-43 = "[wa:540]― [log=카노에]せ、[wa:930]先生……[wa:1470]その、[wa:1500]収録の前に……[/log]"
1012605-45 = "― [log=카노에]Quero que você me pergunte uma coisa. [/registro]"

1012605-48 = "― [log=카노에]Ji, [wa:750]Na verdade...[/log]"

1012605-50 = "― [log=카노에][wa:1260]Há algo que venho escondendo há muito tempo... [/log]"

1012605-53 = "― [log=카노에]Eu, [wa:590]Eu...[wa:1620]Sou tímido[/log]"

1012605-55 = "― [log=카노에]Não consigo falar bem. [/registro]"

1012605-58 = "[wa:510]― [log=카노에]それを隠すために、[/log]"
1012605-60 = "― [log=카노에]Eu estava interpretando um personagem sombrio... [/log]"

1012605-63 = "― [log=카노에]A razão pela qual me envolvi com o ocultismo foi [/log]"

1012605-65 = "― [log=카노에]Porque eu queria mudar a mim mesmo. [/registro]"

1012605-68 = "[wa:1200]― [log=카노에]これを知っているのは……[wa:2000]先生だけ。[/log]"
1012605-70 = "― [log=카노에]Então...[wa:1500]Por favor, mantenha isso em segredo? [/registro]"

1012605-73 = "[wa:370]― [log=카노에]せ、[wa:770]先生のこと、[wa:1900]信じてる、[wa:1290]よ……。[/log]"
1012605-76 = "[ns] \"Esta é a verdadeira forma de Kanoe...?\""

1012605-77 = "[wa:150]― [log=카노에]……イヒッ、[wa:1020]イヒヒ。[/log]"
1012605-79 = "― [log=카노에]Ei, [wa:1390]Você acredita? [/registro]"

1012605-82 = "― [log=카노에]Você gosta de [wa:1680] coisas fofas? [/registro]"

1012605-85 = "[wa:550]― [log=카노에]じゃあ、[wa:1340]私のことも……[wa:2400]好き、[wa:1240]だよねぇ？[/log]"
1012605-87 = "― [log=카노에]Ei...! [/registro]"

1012605-90 = "[ns] \"Bem, fui enganado de novo...!\""

1012605-92 = "(Mesmo depois disso, ele ajudou Kanoe na gravação)"

1012605-93 = "(O que gravamos desta vez foi um CD dramático de fãs apaixonados por esportes)"

1012605-95 = "Sim... acho que essa é toda a gravação de hoje."

1012605-96 = "Obrigado pelo seu trabalho duro, professor. Como esperado, é confiável."

1012605-97 = "[s] \"Como esperado, seu repertório de atuação é incrível.\""

1012605-98 = "Mas tenho que me esforçar mais..."

1012605-99 = "É normal que os dubladores hoje em dia sejam capazes de fazer isso."

1012605-100 = "Só porque sou um grande vendedor... não posso baixar a guarda."

1012605-101 = "[s] \"Você está perseguindo seus sonhos.\""

1012605-105 = "Sim... eu também tenho um sonho..."

1012605-106 = "Você consegue adivinhar que tipo de sonho é?"

1012605-107 = "[s] \"Tornar-se um dublador famoso?\""

1012605-108 = "Mas...eu tenho um sonho maior."

1012605-109 = "meu sonho é-"

1012605-122 = "--Recuperando os laços de sua vida anterior."

1012605-123 = "Professor, ainda não consegue se lembrar?"

1012605-128 = "Sou eu... uma mulher com mãos frias mas um coração caloroso..."

1012605-132 = "Uma mulher que gosta de ocultismo e é adorada por gatos pretos e corvos."

1012605-138 = "Sim, Kanoé...!"

1012605-139 = "[s] \"E-eu sei disso muito bem...!\""

1012605-141 = "(No caminho para casa, parei em uma cafeteria próxima para dar uma guloseima a Kanoe.)"

1012605-146 = "(Talvez depois de trabalhar duro na gravação, Kanoe comeu algo doce e pareceu satisfeito.)"

