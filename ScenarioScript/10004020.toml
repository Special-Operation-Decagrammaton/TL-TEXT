[translation]
10004020-1 = "Episódio 2: Tanghulu na Terra do Nunca"
10004020-2 = "Shanhaijing - Associação Genbu"
10004020-3 = "Sensei, olhe! É um tanghulu de tangerina!"
10004020-4 = "Eu vejo muito tanghulu de espinheiro, mas é a primeira vez que vejo um feito com tangerina!"
10004020-5 = "A tangerina no espeto brilha como se fosse feita de ouro... só de olhar, já fico empolgada!"
10004020-6 = "Sensei, por que não experimenta? Tenho certeza de que é doce, azedinho e delicioso!"
10004020-7 = "[s1] \"É tipo uma fruta cristalizada? Parece gostoso, mas...\"\n[s2] \"Agora precisamos encontrar a Shun primeiro.\""
10004020-8 = "M-mas o cardápio aqui muda conforme a estação, se perdermos a chance agora, talvez nunca mais possamos comer..."
10004020-9 = "M-mas o cardápio aqui muda conforme a estação, se perdermos a chance agora, talvez nunca mais possamos comer..."
10004020-10 = "Eu vou escovar os dentes direitinho depois de comer e vou ouvir o que as instrutoras disserem também~!"
10004020-11 = "Só um espeto,"
10004020-12 = "por favor..."
10004020-16 = "[ns3] \"Com essa carinha, fica difícil recusar...\"\n[ns4] \"Tudo bem, vamos comprar e depois procuramos a Shun.\""
10004020-17 = "Eba! Muito obrigada, Sensei!"
10004020-18 = "Eba! Muito obrigada, Sensei!"
10004020-21 = "(É impressão minha, ou o Sensei está mais gentil do que o normal hoje...?)"
10004020-22 = "(Será por causa desta minha aparência?)"
10004020-23 = "(Sinto que é um pouco injusto usar esta forma para mimar o Sensei, mas... já que estamos aqui...!)"
10004020-27 = "Hum~, é doce e delicioso! O tanghulu da Associação Genbu é realmente especial!"
10004020-28 = "O açúcar que cobre a tangerina derrete na boca como se fosse geleia...!"
10004020-29 = "O que achou, Sensei? Não é delicioso?"
10004020-30 = "[s5] \"Sim, é muito gostoso.\"\n[s6] \"A comida da Associação Genbu é sempre de alto nível, não é?\""
10004020-31 = "Pois é! A Associação Genbu é um ponto gastronômico que reúne todo tipo de coisa de Kivotos, então tem muita comida variada, e tudo o que você come aqui é delicioso!"
10004020-32 = "Pois é! A Associação Genbu é um ponto gastronômico que reúne todo tipo de coisa de Kivotos, então tem muita comida variada, e tudo o que você come aqui é delicioso!"
10004020-33 = "Especialmente a presidente Lumi, que lidera a associação. Ela não conhece apenas a culinária tradicional de Shanhaijing, mas também é versada em pratos e ingredientes de várias outras escolas...! Ela vive desenvolvendo novos menus!"
10004020-34 = "Mas o conselho estudantil de Shanhaijing, o \"Genryumon\", detesta essa culinária multicultural da Associação Genbu, dizendo que \"perturba a tradição e a estabilidade de Shanhaijing\"..."
10004020-35 = "Dizem por aí que, nos bastidores, os dois grupos travam uma disputa sangrenta pelo controle de Shanhaijing..."
10004020-36 = "[s] \"Kokona, você entende bastante sobre a situação de Shanhaijing, hein...?\""
10004020-37 = "I-isso é porque... é, isso! A irmã Shun vive comentando sobre isso...!"
10004020-38 = "Acabei aprendendo naturalmente enquanto ouvia as conversas dela... ah, ahaha..."
10004020-39 = "Como membro da Ame-hana... não, digo, pessoalmente, acho que tanto o pessoal do Genryumon quanto o da Associação Genbu são pessoas gentis e boas... então, se possível, eu gostaria que eles não brigassem..."
10004020-40 = "Imagino que administrar uma organização enorme deva ser difícil. Afinal, até cuidar de crianças já é tão trabalhoso..."
10004020-41 = "[s7] \"Kokona, você é uma criança muito sensata.\"\n[s8] \"Kokona, você tem pensamentos bem maduros para a sua idade.\""
10004020-42 = "E-eu pareço tão velha assim!?"
10004020-43 = "E-eu pareço tão velha assim!?"
10004020-44 = "Eu estava tranquila por causa do meu estado atual, mas... será que eu realmente pareço assim...!?"
10004020-45 = "Mesmo ficando mais jovem, não consigo esconder minha verdadeira essência...!?"
10004020-46 = "[s] \"Ah, eu só quis dizer isso como um elogio...\""
10004020-47 = "......Ah, é, é mesmo?"
10004020-48 = "É, claro! Crianças geralmente querem ser adultas, querem parecer mais maduras... então \"parecer madura\" é um elogio, né! Ah, ahahaha..."
10004020-49 = "Ai, ai, a Kokona e suas interpretações erradas..."
10004020-50 = "[s] \"A propósito, se eu não ouvi errado, você disse 'ficando mais jovem' agora pouco...\""
10004020-51 = "Sensei, já terminou o seu tanghulu!? Terminou, né! Parece que a irmã Shun não está aqui, então vamos nos mover?"
10004020-52 = "Vamos para outro lugar onde a irmã Shun possa estar!"
10004020-53 = "Vamos, por aqui! Sensei!"
