[translation]
10004020-1 = "第2話;タンフールー in ネバーランド"
10004020-2 = "山海経・玄武商会"
10004020-3 = "先生、見てください！ミカンのタンフールーですよ！"
10004020-4 = "サンザシのタンフールーはよく見ますが、ミカンを使ったものは初めてです！"
10004020-5 = "串に刺さったミカンが、まるで黄金色に輝いて……見ているだけでワクワクしてしまいます！"
10004020-6 = "先生、食べてみませんか！きっと甘酸っぱくて美味しいですよ！"
10004020-7 = "[s1] \"フルーツ飴みたいなものかな？確かに美味しそうだけど……\"\n[s2] \"今はまずシュンを探さないとね。\""
10004020-8 = "で、ですが、ここのメニューは季節ごとに変わるので、今を逃すともう食べられないかもしれませんし……。"
10004020-9 = "で、ですが、ここのメニューは季節ごとに変わるので、今を逃すともう食べられないかもしれませんし……。"
10004020-10 = "食べ終わったらきちんと歯も磨きますし、教官のお姉さんたちの言うことも聞きますから～！"
10004020-11 = "一本だけ、"
10004020-12 = "お願いします……。"
10004020-16 = "[ns3] \"そんな表情で頼まれると……。\"\n[ns4] \"じゃあ、買ってからシュンを探そうか。\""
10004020-17 = "わーい！ありがとうございます、先生！"
10004020-18 = "わーい！ありがとうございます、先生！"
10004020-21 = "（気のせいでしょうか、何だかいつも以上に先生が優しいような……？）"
10004020-22 = "（この姿のせい、でしょうか？）"
10004020-23 = "（この姿を利用して先生に甘えるのは、何だかずるい気もしますが……今はせっかくですし……！）"
10004020-27 = "う～ん、甘くて美味しいです！やっぱり玄武商会のタンフールーは格別ですね！"
10004020-28 = "ミカンをコーティングしているお砂糖が、お口に入れた途端にまるでゼリーみたいにとろけて……！"
10004020-29 = "どうですか、先生？美味しいと思いません？"
10004020-30 = "[s5] \"うん、これすっごく美味しいね。\"\n[s6] \"玄武商会の食べ物って、どれもレベルが高いよね。\""
10004020-31 = "ですよね！玄武商会はキヴォトス全域から様々なものが集まるグルメの名所ですから、色々な食べ物がありますし、そのどれを食べても美味しいんです！"
10004020-32 = "ですよね！玄武商会はキヴォトス全域から様々なものが集まるグルメの名所ですから、色々な食べ物がありますし、そのどれを食べても美味しいんです！"
10004020-33 = "特に商会の代表であるルミ会長は、[ruby=せんがいきょう]山海経[/ruby]の伝統的な料理はもちろん、それ以外の様々な学校の料理や食材にも精通していて……！たびたび色んな新メニューを開発してくれるんです！"
10004020-34 = "ですが山海経の生徒会である「[ruby=げんりゅうもん]玄龍門[/ruby]」は、このような玄武商会の多国籍感あふれる食べ物について、「山海経の伝統と安定を乱すものだ」と嫌がっていまして……。"
10004020-35 = "裏では山海経における主導権を握ろうと、その二つの勢力が血で血を洗う抗争を繰り広げているとかいないとか……。"
10004020-36 = "[s] \"シュエリン、山海経の事情にずいぶん詳しいんだね……？\""
10004020-37 = "こ、これはその……そ、そうです！シュンお姉ちゃんが時々言っていまして……！"
10004020-38 = "そのお話をすぐそばで聞いている内に、自然と詳しく……あ、あはは……。"
10004020-39 = "梅花え……いえ、私個人としては、玄龍門の方々も玄武商会の方々も、みなさん親切で良い方々なので……できれば喧嘩はしないでいただきたいのですが……。"
10004020-40 = "きっと巨大な組織を運営するというのは、大変なのだと思います。子どもたちの面倒を見ることですら、あれだけ大変なのですから……。"
10004020-41 = "[s7] \"シュエリンは、思慮深くて良い子だね。\"\n[s8] \"シュエリンはしっかりした、大人びた考えができるんだね。\""
10004020-42 = "わ、私、そんなに歳を取ってる感じしますか！？"
10004020-43 = "わ、私、そんなに歳を取ってる感じしますか！？"
10004020-44 = "今の状態ならと安心していましたが……やっぱり私、そう見えるんでしょうか……！？"
10004020-45 = "いくら幼くなっても、内面は隠せないという……！？"
10004020-46 = "[s] \"えっと、単純に誉め言葉のつもりだったんだけど……。\""
10004020-47 = "……あ、そ、そうなんですか？"
10004020-48 = "そ、そうですよね！子どもは普通大人になりたい、大人っぽくなりたいと思うものですし……「大人っぽい」みたいな言葉は、誉め言葉ですよね！あは、あははは……。"
10004020-49 = "しゅ、シュエリンったら変な勘違いを……。"
10004020-50 = "[s] \"ところでさっき、聞き間違いでなければ「幼くなって」って……\""
10004020-51 = "先生はタンフールー食べ終わりましたか！？食べ終わりましたね！シュンお姉ちゃんはここにいないみたいですし、移動しましょうか！？"
10004020-52 = "他の、シュンお姉ちゃんがいそうな場所に行きましょう！"
10004020-53 = "さあ、こっちです！先生！"
