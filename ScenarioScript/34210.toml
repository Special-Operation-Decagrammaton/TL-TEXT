[translation]
34210-1 = "Episódio 21; Ao Santo dos Santos"
34210-4 = "Haa... haa..."
34210-12 = "[ns] \"Mika! Você está bem?\""
34210-13 = "……."
34210-14 = "……Eu vou atrair aquilo."
34210-18 = "Saori... agora eu entendo um pouco o motivo de você querer salvar aquela criança."
34210-19 = "Porque eu também me sentia assim... então..."
34210-20 = "Enquanto eu a distraio — vá salvar a Atsuko."
34210-21 = "Sensei... me desculpe. #nSempre causando problemas..."
34210-22 = "E... obrigada. #nPor me dizer que eu ainda tenho uma chance..."
34210-23 = "Você é..."
34210-24 = "Vá logo, Saori! #nNão estamos sem tempo?"
34210-28 = "……Sim."
34210-29 = "[s] \"Mika, tome cuidado...\""
34210-30 = "……Não se preocupe, Sensei. #nVocê sabe, não sabe? — Eu sou bem forte, sabia?"
34210-44 = "……."
34210-45 = "……Mulher egoísta."
34210-46 = "……Vamos nos apressar."
