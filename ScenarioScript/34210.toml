[translation]
34210-1 = "Episódio 21;Rumo ao Sanctum Sanctorum"
34210-4 = "Haa…… haa……"
34210-12 = "[ns] \"Mika! Você tá bem?\""
34210-13 = "……."
34210-14 = "……Aquilo, eu atraio."
34210-18 = "Saori…… o motivo de você querer salvar aquela menina, eu entendo um pouquinho."
34210-19 = "Porque comigo também foi assim…… por isso……"
34210-20 = "enquanto eu seguro a atenção dela――vão salvar a Atsuko."
34210-21 = "Sensei…… me desculpa.#nEu só arrumo problema, sempre……."
34210-22 = "E…… obrigada.#nPor dizer que ainda existe uma chance pra mim……."
34210-23 = "Você……."
34210-24 = "Vai, Saori!#nVocê tá sem tempo, né?"
34210-28 = "……Sim."
34210-29 = "[s] \"Mika, se cuida…….\""
34210-30 = "……Não se preocupa, Sensei.#nVocê sabe, né?――Eu sou bem forte, viu?"
34210-44 = "……."
34210-45 = "……Que mulher egoísta."
34210-46 = "……Vamos correr."
