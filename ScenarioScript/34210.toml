[translation]
34210-1 = "Episódio 21; Para o Santuário"
34210-4 = "Haa... haa..."
34210-12 = "[ns] \"Mika! Tudo bem com você?\""
34210-13 = "......"
34210-14 = "......Eu cuido daquela ali."
34210-18 = "Saori... acho que entendo um pouquinho do porquê você quer salvar aquela garota."
34210-19 = "Porque eu era igual a ela... por isso..."
34210-20 = "Enquanto eu a distraio――vai lá salvar a Atsuko."
34210-21 = "Sensei... Me desculpe.#nPor estar sempre causando problemas..."
34210-22 = "E também... muito obrigada.#nPor me dizer que eu ainda tenho uma chance..."
34210-23 = "Você..."
34210-24 = "Vai logo, Saori!#nVocê não tá sem tempo?"
34210-28 = "......Aham."
34210-29 = "[s] \"Tome cuidado, Mika...\""
34210-30 = "......Não se preocupe, Sensei.#nSabe como é, né? ――Eu sou bem fortinha, viu?"
34210-44 = "......"
34210-45 = "......Que mulher egoísta."
34210-46 = "......Vamos nos apressar."