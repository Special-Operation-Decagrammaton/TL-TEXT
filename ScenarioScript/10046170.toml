[translation]
10046170-3 = "Comitê de Justiça. Então vocês estavam aqui."
10046170-4 = "Você é, se não me engano..."
10046170-9 = "（Shirasu Azusa. Uma aluna da Turma de Reforço, assim como a Koharu... mas...）"
10046170-14 = "（Sua verdadeira identidade é a 'Bruxa de Gelo', uma encrenqueira que causou uma série de incidentes inimagináveis.）"
10046170-15 = "（Ao contrário da sua aparência pequena e frágil, ela é uma especialista em guerrilha...）"
10046170-16 = "（...Para ser sincera, ela é a última pessoa que eu queria encontrar em um momento tão ocupado quanto este.）"
10046170-21 = "Vou perguntar por via das dúvidas, mas... vocês estavam procurando pelo Comitê de Justiça porque...#né por causa disso, né?"
10046170-22 = "Não sei exatamente o que você quer dizer com 'por causa disso'."
10046170-23 = "Eu vim para ajudar vocês."
10046170-27 = "...Oi?"
10046170-28 = "Bem... você não odiava a gente?"
10046170-29 = "Por que eu odiaria?"
10046170-30 = "Vocês vivem lutando contra o Comitê..."
10046170-31 = "É verdade que houve conflitos armados entre nós."
10046170-32 = "Mas isso foi apenas porque cada lado estava dando o seu melhor. Vocês estavam cumprindo seu dever de manter a ordem pública."
10046170-33 = "Na verdade, eu respeito a postura de vocês de sempre tentarem cumprir suas obrigações."
10046170-34 = "Ah, muito obrigada..."
10046170-35 = "E não é só isso."
10046170-36 = "Graças ao Comitê de Justiça, pude criar memórias preciosas com a Hifumi, a Mashiro e a presidente do Comitê."
10046170-37 = "Por isso, sou grata a todos do Comitê."
10046170-38 = "E-entendo..."
10046170-39 = "Então, qual seria o motivo da sua visita...?"
10046170-40 = "Dívidas devem ser pagas. Foi isso que todos me ensinaram."
10046170-41 = "Claro, isso se você estiver de acordo..."
10046170-42 = "É que... você é um tipo raro, bem diferente da impressão que eu tinha. Ah, claro, digo isso de um jeito bom!"
10046170-43 = "...Bem, estamos precisando de ajuda mesmo. Vamos considerar que estamos quites com isso!"
10046170-44 = "Não sei o quanto serei útil, mas... farei o meu melhor."
10046170-45 = "Fui treinada para lidar com qualquer tipo de situação."
10046170-46 = "Só... por precaução, você sabe o que precisa ser feito, né?"
10046170-47 = "Claro. É uma operação para localizar e eliminar os invasores, certo?"
10046170-48 = "Sim...?"
10046170-49 = "Já que eles já invadiram, cada segundo conta."
10046170-50 = "Não temos tempo a perder. Vamos logo."
10046170-56 = "...Você tem certeza disso?"
