[translation]
10046170-3 = "正義実現委員会。ここにいたのか。"
10046170-4 = "あなたはたしか……。"
10046170-9 = "（[ruby=しらす]白洲[/ruby]アズサ。#nコハルと同じ補習授業部の生徒……だけど……）"
10046170-14 = "（その正体は、想像もつかないような事件を次々と起こした問題児「氷の魔女」）"
10046170-15 = "（小柄で華奢な見た目とは裏腹に、ゲリラ戦のエキスパートだ……）"
10046170-16 = "（……正直、この忙しい時に一番会いたくなかった相手なんだけど）"
10046170-21 = "一応聞くっすけど、正義実現委員会を探してたのは……#nやっぱり、そういう意味っすよね？"
10046170-22 = "「そういう意味」が何を意味しているのかは分からないが。"
10046170-23 = "私はあなたを助けにきた。"
10046170-27 = "……はい？"
10046170-28 = "ええと……私たちのことを嫌ってたんじゃ？"
10046170-29 = "何故だ？"
10046170-30 = "委員会としょっちゅう戦ってるじゃないっすか……。"
10046170-31 = "たしかに、武力衝突があったのは事実だ。"
10046170-32 = "でも、それは各々が最善を尽くしていただけ。#nあなた達は治安維持という任務を[ruby=まっと]全[/ruby]うしていた。"
10046170-33 = "むしろ、常に責務を果たそうとする姿勢は尊敬している。"
10046170-34 = "あ、ありがとうございます……。"
10046170-35 = "それだけじゃない。"
10046170-36 = "正義実現委員会のおかげで、#n私はヒフミとマシロ、正義実現委員会の委員長と大切な思い出を作ることができた。"
10046170-37 = "だから、委員会のみんなには感謝している。"
10046170-38 = "そ、そうっすか……。"
10046170-39 = "それで、用件というのは……？"
10046170-40 = "借りは返すもの。私はみんなに、そう教わってきた。"
10046170-41 = "もちろん、あなたさえよければ、の話だけど……。"
10046170-42 = "なんか……思ってた印象と違うというか、珍しいタイプっすね。#nあっ、もちろんいい意味でっすよ。"
10046170-43 = "……まあ、ちょうど人手が足りなかったところなんで。#nこれでチャラってことにするっすかね！"
10046170-44 = "どの程度、力になれるかは分からないが……最善を尽くそう。"
10046170-45 = "どんな状況にも対処できるよう、訓練は受けている。"
10046170-46 = "その……念のための確認っすけど、何をするかは分かってるっすよね？"
10046170-47 = "もちろん。[ruby=サーチ・アンド・デストロイ]侵入者を索敵し、殲滅する作戦[/ruby]だろう？"
10046170-48 = "はい……？"
10046170-49 = "すでに侵入されている以上、対応は一刻を争う。"
10046170-50 = "こんなことをしている場合ではないな。急ごう。"
10046170-56 = "……本当に大丈夫っすか？"
