[translation]
1601805-1 = "A força do Sensei"
1601805-2 = "[ns] \"Haa... haa...\""
1601805-3 = "……"
1601805-4 = "[s] \"Haa, haa, haa...!\""
1601805-8 = "[ns] \"Zeee-haa-zeee-haa...\""
1601805-10 = "[ns] \"Suuuu~ haaaaaa...\""
1601805-11 = "Até quando você pretende ficar assim...?"
1601805-12 = "O quanto você correu?"
1601805-13 = "[s] \"Desde o Schale!\""
1601805-14 = "Normalmente, você não pegaria um trem ou um táxi? Haa..."
1601805-15 = "Eu só mencionei o Mercado Negro e você veio correndo, você é um idiota, né?"
1601805-16 = "...Sabe, isso acaba elevando as expectativas."
1601805-17 = "Não é nada demais..."
1601805-18 = "Olha aqui, veja."
1601805-19 = "[s1] \"Uma máquina de vendas?\"\n[s2] \"Você comprou a máquina inteira? Que incrível.\""
1601805-20 = "Sim, uma máquina de vendas."
1601805-21 = "Quer dizer, não é nada disso!"
1601805-22 = "Não é uma máquina comum. Olha, veja o preço?"
1601805-23 = "Inacreditáveis 20 ienes por unidade!"
1601805-24 = "Se você se lembrar disso, vai ser útil quando vier aqui de novo, não vai?"
1601805-28 = "É, é só isso."
1601805-29 = "[s3] \"Informação ultrassecreta do Mercado Negro que a Love me contou...\"\n[s4] \"Tenho que anotar...\""
1601805-32 = "Você é tão exagerado!"
1601805-33 = "Bem, tanto faz. Já que você veio até aqui, vou te pagar uma."
1601805-34 = "O trabalho tem ido bem ultimamente, então isso não é nada."
1601805-35 = "[s] \"O suco que a Love me pagou... quero colocar em um museu.\""
1601805-36 = "Cala a boca!!"
1601805-41 = "Aqui."
1601805-42 = "[s5] \"Obrigado!!\"\n[s6] \"Isso refresca até a alma...!!\""
1601805-45 = "Depois de correr tanto, deve estar delicioso, não é?"
1601805-46 = "...Gu."
1601805-47 = "Gugu... o que é isso...! Ngu-gugu!"
1601805-48 = "[s7] \"Está com dor em algum lugar?\"\n[s8] \"Será que você está com febre?\"\n[s9] \"Está com fome!?\""
1601805-52 = "Sensei, já te disseram que você é superprotetor?"
1601805-53 = "É só que... não está abrindo!"
1601805-54 = "Ngu-gu...!!"
1601805-55 = "Ah, que irritante!! Será que abre se eu der um tiro nele!?"
1601805-56 = "[s] \"Deixa eu ver.\""
1601805-57 = "Cuidado. É tão duro que você pode acabar se machucando."
1601805-58 = "Se não der certo, use luvas de borracha—"
1601805-63 = "[ns] \"Aqui, pronto.\""
1601805-64 = "……"
1601805-65 = "V-você está me zoando!?"
1601805-66 = "[s] \"Eu nem disse nada ainda...\""
1601805-67 = "Uuu..."
1601805-68 = "Sabe, eu tenho confiança na minha resistência física."
1601805-69 = "Mas minha força de preensão é quase nula. Por isso, não costumo beber essas coisas na frente dos membros do grupo."
1601805-70 = "Que vergonha, mostrar esse lado para o Sensei..."
1601805-71 = "[s] \"Eu posso abrir para você sempre que precisar.\""
1601805-72 = "O-o que você está dizendo, meu Deus!?"
1601805-73 = "E-enfim!#nSe você contar para alguém que eu não consegui abrir a tampa, você já sabe o que te espera, né!?"
1601805-74 = "Devolve! O meu suco!"
1601805-75 = "[s] \"Ah...\""
1601805-80 = "(Love saiu correndo como se estivesse fugindo)"
1601805-81 = "(Ela roubou o meu suco...)"
