[translation]
1601505-1 = "シュガークラッシュ"
1601505-2 = "（アイリがいつも練習していた場所へと向かった）"
1601505-6 = "……先生？"
1601505-10 = "こ、こんにちは！#nどうしてこちらに？"
1601505-11 = "今日は何の予定も、無かったはずですが……？"
1601505-12 = "……え？"
1601505-13 = "わ、私……ですか？"
1601505-14 = "た、確かにそうですね……。"
1601505-15 = "無意識でと言いますか、気づけばこの格好ですし……。"
1601505-19 = "そ、それより先生は何のご用事で……！？"
1601505-20 = "私を、探しに……？"
1601505-21 = "そ、それでも、どうしてここにいるって分かったんですか？"
1601505-22 = "な、何となく、ですか……。"
1601505-23 = "だとしても、よくここに来られましたね。"
1601505-24 = "何となくでも、感じたということですか？"
1601505-25 = "[s1] \"そろそろレンタル期間も終わりだし。\"\n[s2] \"アイリなら、最後に来るだろうなって思って。\""
1601505-28 = "……。"
1601505-29 = "……そうですね。"
1601505-30 = "確かに……名残惜しいと、思っているのかもしれません。"
1601505-34 = "……そこまでお見通しだった、ということですね。"
1601505-35 = "……えへへ。"
1601505-36 = "半分正解ですが……半分は、不正解でしょうか。"
1601505-37 = "名残惜しいのもそうですが……実は……。"
1601505-38 = "……。"
1601505-39 = "ちょっと、辛いと言いますか……。"
1601505-40 = "[ns3] \"バンドが終わったから？\"\n[ns4] \"元に戻っちゃう気がして……？\""
1601505-44 = "……はい。"
1601505-45 = "あはは……半分不正解なんて言いましたが、そちらも分かってましたか。"
1601505-46 = "別に消えてなくなるわけじゃないって、頭では分かってるんですが。"
1601505-47 = "それでも、気持ちは止められないみたいで。"
1601505-48 = "……居場所が一つ消えてしまう感じ、と言いますか。"
1601505-49 = "やっぱり無理ですよね。#n「放課後スイーツ部」が、そのままバンド活動もするなんて。"
1601505-50 = "続けるには労力が要りますし、全部を同時になんて無理ですし……。"
1601505-51 = "逆に、バンドだけをやりたい！というわけでもなくて……。"
1601505-52 = "……分かってるんです。"
1601505-53 = "私たちは「放課後スイーツ部」ですから。"
1601505-55 = "いつもみたいに集まっておしゃべりをして……スイーツを食べて……。"
1601505-56 = "そういう……いつもの私たちに戻るんです。#nそれが、大好きな私の居場所ですから。"
1601505-58 = "何か問題や、プレッシャーがあるわけでも無い日常……。"
1601505-59 = "も、もちろん嫌とかじゃないんですよ！？"
1601505-60 = "でも……。"
1601505-61 = "後悔でも、好き嫌いでもなくて……。"
1601505-62 = "過ぎ去ると分かっていることが……ただ、ちょっと辛くって。"
1601505-63 = "[s5] \"確かに、バンドを続けるわけじゃないなら……。\"\n[s6] \"その場にあったものは、一時的にでも無くなっちゃうかもね。\""
1601505-66 = "……はい。"
1601505-67 = "そう、ですよね……。"
1601505-68 = "[s] \"……それでも。\""
1601505-69 = "……？"
1601505-70 = "それ、でも……？"
1601505-71 = "……全部が無くなるわけじゃない？"
1601505-72 = "それって……。"
1601505-73 = "でも私たちは、放課後スイーツ部で……。"
1601505-74 = "[s7] \"それに縛られることは無いよ。\"\n[s8] \"今回バンドをやったように、近い将来また何かあるかもしれない。\""
1601505-77 = "………！！"
1601505-78 = "先生……。"
1601505-79 = "ありがとうございます。"
1601505-80 = "そうですね……確かに、終わると分かっていても。"
1601505-81 = "それは、次が無いという意味ではないですよね……。"
1601505-82 = "……ふふっ。"
1601505-83 = "先生が、どこまで本気なのかは分かりませんが……。"
1601505-84 = "それでもやっぱり、落ち着くんです。先生の傍は。"
1601505-85 = "……えへへ。"
1601505-86 = "いずれにせよ……バンド活動は一旦終わりです。#nちゃんと、最後を見届けないと！"
1601505-90 = "……先生。"
1601505-95 = "……次は何をしましょうか？"
