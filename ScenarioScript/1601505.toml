[translation]
1601505-1 = "Sugar Crash"
1601505-2 = "（Fui até o local onde a Airi sempre praticava）"
1601505-6 = "……Sensei?"
1601505-10 = "O-Olá!#nPor que você está aqui?"
1601505-11 = "Não tínhamos nenhum compromisso hoje, tínhamos……?"
1601505-12 = "……Eh?"
1601505-13 = "V-Você veio…… por mim?"
1601505-14 = "É, pensando bem…… é verdade."
1601505-15 = "Foi algo inconsciente, quando percebi já estava vestida assim……."
1601505-19 = "M-Mas, por que você veio me procurar……!?"
1601505-20 = "Você veio…… me buscar?"
1601505-21 = "M-Mas como você sabia que eu estaria aqui?"
1601505-22 = "Foi…… um palpite, é?"
1601505-23 = "Mesmo assim, é impressionante que tenha conseguido me achar."
1601505-24 = "Então, mesmo sendo um palpite, você sentiu que eu estaria aqui?"
1601505-25 = "[s1] \"O período de aluguel está quase acabando.\"\n[s2] \"Pensei que a Airi viria aqui uma última vez.\""
1601505-28 = "……."
1601505-29 = "……É verdade."
1601505-30 = "Com certeza…… talvez eu esteja sentindo um pouco de nostalgia."
1601505-34 = "……Então você já sabia de tudo isso."
1601505-35 = "……Hehehe."
1601505-36 = "Você acertou metade, mas…… talvez tenha errado a outra metade."
1601505-37 = "É verdade que sinto nostalgia, mas…… na verdade……."
1601505-38 = "……."
1601505-39 = "É que, sinto um pouco de tristeza, por assim dizer……."
1601505-40 = "[ns3] \"Por causa do fim da banda?\"\n[ns4] \"Sente que tudo vai voltar ao que era antes……?\""
1601505-44 = "……Sim."
1601505-45 = "Ahaha…… eu disse que você acertou metade, mas você também sabia disso, não é?"
1601505-46 = "Eu sei racionalmente que as coisas não vão simplesmente desaparecer."
1601505-47 = "Mas, mesmo assim, parece que não consigo controlar meus sentimentos."
1601505-48 = "……É como se um dos meus lugares especiais estivesse sumindo."
1601505-49 = "Acho que não dá mesmo, né?#nO \"Clube de Doces Pós-Escola\" continuar com as atividades da banda ao mesmo tempo."
1601505-50 = "Exige muito esforço para continuar, e é impossível fazer tudo ao mesmo tempo……."
1601505-51 = "E, por outro lado, não é como se eu quisesse apenas focar na banda……."
1601505-52 = "……Eu sei disso."
1601505-53 = "Porque nós somos o \"Clube de Doces Pós-Escola\"."
1601505-55 = "Nos reunirmos como sempre para conversar…… e comer doces……."
1601505-56 = "Voltaremos a ser…… nós mesmas de sempre.#nEsse é o meu lugar favorito, afinal."
1601505-58 = "Um cotidiano sem problemas ou pressões……."
1601505-59 = "N-Não que eu não goste disso, claro!?"
1601505-60 = "Mas……."
1601505-61 = "Não é arrependimento, nem questão de gostar ou não……."
1601505-62 = "É só que…… saber que esse momento vai passar, me deixa um pouco triste."
1601505-63 = "[s5] \"É verdade, se não for para continuar com a banda…….\"\n[s6] \"Talvez o que existia aqui acabe desaparecendo, mesmo que temporariamente.\""
1601505-66 = "……Sim."
1601505-67 = "É, você tem razão……."
1601505-68 = "[s] \"……Ainda assim.\""
1601505-69 = "……?"
1601505-70 = "Ainda assim……?"
1601505-71 = "……Nem tudo vai desaparecer?"
1601505-72 = "Isso é..."
1601505-73 = "Mas nós somos do Clube de Doces depois da aula, e..."
1601505-74 = "[s7] \"Não há necessidade de se prender a isso.\"\n[s8] \"Assim como fizemos a banda desta vez, talvez algo novo aconteça num futuro próximo.\""
1601505-77 = "………！！"
1601505-78 = "Sensei..."
1601505-79 = "Muito obrigada."
1601505-80 = "É verdade... certamente, mesmo sabendo que vai acabar."
1601505-81 = "Isso não significa que não haverá uma próxima vez, não é..."
1601505-82 = "……Hehe."
1601505-83 = "Não sei o quanto você está falando sério, Sensei, mas..."
1601505-84 = "Ainda assim, eu me sinto tranquila. Ao seu lado, Sensei."
1601505-85 = "……Ehehe."
1601505-86 = "De qualquer forma... as atividades da banda terminaram por enquanto. #nPreciso acompanhar o final como se deve!"
1601505-90 = "……Sensei."
1601505-95 = "……O que faremos a seguir?"
