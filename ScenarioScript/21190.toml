[translation]
21190-1 = "Episódio 19; Double O"
21190-2 = "Departamento de Desenvolvimento de Jogos do Millennium"
21190-4 = "Irmã! Ainda não!?"
21190-5 = "E-espera, não me apressa! Só preciso digitar isso e pronto...!"
21190-6 = "Faltam só 2 minutos!? Não tem como não te apressar!"
21190-7 = "Para ser exata, são 96 segundos. Enquanto dizíamos isso, restam 92 segundos..."
21190-8 = "Tá, tá bom! Já terminei!"
21190-12 = "Vou só fazer um teste rápido aqui... pronto."
21190-13 = "Sem erros, Momoi!"
21190-14 = "Beleza! Fazendo upload do arquivo, tempo estimado para concluir... 15 segundos! Alice, quantos segundos faltam!?"
21190-15 = "Restam 19 segundos...!"
21190-16 = "P-por favor...!"
21190-20 = "Transferência concluída..."
21190-22 = "A inscrição para o Millennium Prize foi concluída."
21190-23 = "Conseguimos aaaaaa!"
21190-24 = "Por um triz... achei que meu coração ia parar..."
21190-25 = "Agora é só... esperar o anúncio daqui a 3 dias, né."
21190-26 = "Pelo menos conseguimos enviar a tempo, mas o resultado ainda não saiu."
21190-27 = "Daqui a 3 dias... será decidido se poderemos continuar nesta sala do clube ou não."
21190-28 = "...Mas 3 dias é bastante tempo, não é? Então, tenho uma sugestão,"
21190-29 = "que tal fazermos o upload da versão web de 'Tales Saga Chronicle 2' agora?"
21190-31 = "!?"
21190-32 = "P-por quê?"
21190-33 = "Eu não consigo esperar 3 dias! Além disso, não quer ver a reação dos usuários antes da avaliação dos juízes!?"
21190-34 = "Hmm, mas talvez seja um pouco assustador... estou preocupada com comentários negativos também."
21190-35 = "O que você está dizendo! Afinal, não fizemos esse jogo apenas para participar do Millennium Prize, certo!"
21190-36 = "Vamos mostrar com confiança! Nós demos o nosso melhor!"
21190-37 = "B-bem, isso é verdade, mas..."
21190-38 = "...Tudo bem, vamos fazer o upload."
21190-39 = "Hã?"
21190-40 = "Acho que uma obra só é concluída quando existem pessoas para vê-la e jogá-la."
21190-41 = "Eu quero... completar nosso jogo de verdade."
21190-42 = "Yuzu-chan..."
21190-43 = "Está tudo bem. Mesmo que seja uma enxurrada de comentários negativos como da última vez..."
21190-44 = "Nós nos esforçamos ao máximo. E além disso... como estamos todas juntas, com certeza vamos conseguir lidar com isso."
21190-46 = "Eu já estou bem."
21190-48 = "..."
21190-49 = "Então, upload agora mesmo!"
21190-50 = "Ah! E-espera! Preciso me preparar mentalmente...!"
21190-52 = "Transferência concluída! Vai levar pelo menos 2 ou 3 horas até que as pessoas joguem e deixem comentários, então vamos descansar um pouco!"
21190-53 = "...Ah, é verdade."
21190-55 = "..."
21190-57 = "..."
21190-58 = "Hum, Alice? Por que você está sentada na frente do computador?"
21190-59 = "Vou ficar de prontidão."
21190-60 = "Parece que as pessoas começaram a baixar, estou curiosa."
21190-61 = "Vai levar um tempo até que elas joguem, então acho que não teremos respostas tão rápido, sabe?"
21190-62 = "Sim, mesmo assim, vou esperar."
21190-63 = "E-eu também..."
21190-64 = "De qualquer forma, estou nervosa demais para dormir..."
21190-65 = "Eu também, estou esperando."
21190-66 = "……Sim."
21190-67 = "Não dá, eu também estou começando a ficar nervosa."
21190-68 = "Estou tão preocupada que meu coração não para de bater forte... Ugh, fui eu quem comecei isso, mas a tensão está me deixando maluca!"
21190-69 = "（Plim）"
21190-70 = "Ah, primeiro comentário."
21190-71 = "O que diz!? O que diz!?"
21190-72 = "＜hermet021：Uau, essa é a sequência daquele jogo que ficou em 1º lugar no ranking de piores jogos da última vez? Achei que tinham parado de fazer jogos, mas vocês não aprendem mesmo, hein.＞"
21190-73 = "……."
21190-74 = "A-Alice, não ligue muito para esse tipo de coisa……"
21190-75 = "……."
21190-76 = "Entrando em contato com a Maki. Vou disparar o canhão de feixe com potência máxima na direção do endereço IP correspondente."
21190-77 = "I-Isso não pode!"
21190-78 = "……Está tudo bem."
21190-79 = "É um comentário de alguém que nem jogou o jogo... Então não se preocupe, tá?"
21190-80 = "（Plim）"
21190-81 = "＜Kotoha0507：O 'TSC' anterior talvez não fosse uma obra que pudesse ser elogiada sem ressalvas. Mas tinha um frescor e, pelo menos, não era uma obra comum. Estou ansiosa para ver que tipo de novidade vocês trarão nesta sequência.＞"
21190-82 = "Opa, aos poucos estão vindo reações decentes……."
21190-83 = "（Plim）"
21190-84 = "＜QueenC：Bem, vamos ver o que nos espera... Já que é para ser, não quero algo mediano. Quero uma experiência extrema, não importa para que lado penda.＞"
21190-85 = "（Plim）"
21190-86 = "＜kirakiraNO1：Joguei o anterior, mas não guardo boas lembranças. Pelo contrário, consigo me lembrar vividamente de várias memórias amargas. Mas, por que será... mesmo sabendo que é uma sequência, acabei baixando.＞"
21190-87 = "I-Incrível! Parece que nosso jogo está gerando uma expectativa enorme, não está!?"
21190-88 = "No geral, parece que eles estão \"se divertindo tentando desarmar uma bomba-relógio\"……."

21190-89 = "É como se fosse aquela curiosidade mórbida……."
21190-91 = "（Plim, plim）"
21190-92 = "＜cat0808：Tenho uma prova de recuperação daqui a 2 horas... mas, mais do que isso, estou com vontade de jogar esse jogo agora.＞"
21190-93 = "＜You-me：Provas você vai ter aos montes daqui para frente. O melhor momento para jogar isso é agora, que acabou de ser lançado!＞"
21190-94 = "Err, se possível... eu gostaria que você fosse fazer a prova……."
21190-95 = "O-O número de downloads já passou de 2000!? Isso não é estranho demais!?"
21190-96 = "Ah... parece que um portal de notícias famoso publicou um artigo sobre o lançamento do nosso jogo."
21190-97 = "Uau...! Eu só esperava que não fossem indiferentes! Com esse número subindo tanto, de repente fiquei com medo!"
21190-100 = "……."
21190-101 = "……Meu coração está batendo forte."
21190-102 = "Ugh! Com tanta expectativa e ansiedade, sinto que meu coração vai explodir!"
21190-103 = "（BOOOOM!）"
21190-104 = "！？"
21190-105 = "O-O seu coração realmente explodiu?"
21190-106 = "N-Não! Não foi o meu coração!"
21190-107 = "O que foi isso...!? O console explodiu!?"
21190-108 = "Será que joguei por tempo demais……?"
21190-109 = "Não! Esse disparo é de um canhão de 13.97mm... da Karin-senpai!"
21190-110 = "（BUMMM!）"
21190-111 = "Hya!?"
21190-112 = "Ataque de longa distância confirmado, vindo da direção das 11 horas em relação à frente da sala do clube! Distância, cerca de 1km……!"
21190-113 = "V-Vingança pelo que aconteceu antes!?"
21190-114 = "Iniciando contra-ataque!"
21190-115 = "Não, Alice, vamos sair daqui primeiro! Se ficarmos aqui, o Sensei vai acabar sendo envolvido, e além disso……."
21190-116 = "Se lutarmos aqui, nossa sala do clube vai ser destruída!"
21190-117 = "Irmã……."
21190-118 = "A-até o pessoal do conselho estudantil está lá fora...! É uma retaliação por causa do \"espelho\"...!?"

21190-119 = "E-eu até que me senti um pouco culpada, mas...!"
21190-120 = "Eek, lá vêm eles de novo!"
21190-121 = "[s1] \"Calma.\"\n[s2] \"Enquanto eles recarregam, vamos sair daqui de qualquer jeito.\""
21190-122 = "Sensei...!"
21190-123 = "Sensei...!"
21190-124 = "Certo!"
21190-125 = "Alice, eu e a Yuzu vamos ficar na frente!"
21190-126 = "Entendido."
21190-127 = "Alice protegerá o Sensei e todos os outros."
21190-129 = "Certo, vamos nessa!!"
