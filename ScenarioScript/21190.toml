[translation]
21190-1 = "Episódio 19; Double O"
21190-2 = "Millennium - Depto. de Desenvolvimento de Jogos"
21190-4 = "Mana! Ainda não!?"
21190-5 = "E-Espera um pouco, não me apresse! Só falta eu terminar de digitar isso aqui e já acaba...!"
21190-6 = "Mas só faltam 2 minutos!? É impossível não te apressar agora!"
21190-7 = "Para ser exata, são 96 segundos, e enquanto dizemos isso, já caíram para 92 segundos..."
21190-8 = "T-Tá bom, tá bom! Já terminei!"
21190-12 = "Por aqui eu já fiz uns testes simples e... sim."
21190-13 = "Nenhum erro detectado, Momoi!"
21190-14 = "Ok! Fazendo o upload do arquivo, tempo estimado para a conclusão... 15 segundos! Aris, faltam quantos segundos!?"
21190-15 = "Faltam 19 segundos...!"
21190-16 = "P-Por favor...!"
21190-20 = "Transferência concluída..."
21190-22 = "Inscrição para o Millennium Prize realizada com sucesso."
21190-23 = "Deu tempooooooooo!"
21190-24 = "Na mosca... achei que o meu coração ia parar..."
21190-25 = "Agora... é só esperar pelo resultado daqui a 3 dias."
21190-26 = "Pelo menos conseguimos entregar a tempo, mas o resultado ainda não saiu."
21190-27 = "Daqui a 3 dias... nós vamos saber se continuaremos ou não nesta sala de clube."
21190-28 = "......Mas 3 dias é bastante tempo, não é? O que acham dessa proposta?"
21190-29 = "Que tal subirmos a versão web de 'Tales Saga Chronicle 2' primeiro?"
21190-31 = "!?"
21190-32 = "P-Por que isso?"
21190-33 = "Eu não aguento esperar 3 dias! E além do mais, não querem ver a reação dos jogadores antes da avaliação dos jurados!?"
21190-34 = "Hmmm, mas dá um pouco de medo... e eu também me preocupo com os comentários negativos."
21190-35 = "O que você tá dizendo! Pra começar, a gente não fez esse jogo *apenas* para participar do Millennium Prize!"
21190-36 = "Vamos ter confiança e mostrar o nosso jogo! Afinal de contas, nós demos o nosso melhor!"
21190-37 = "I-Isso é verdade, mas..."
21190-38 = "......Sim, vamos fazer o upload."
21190-39 = "Eh?"
21190-40 = "Porque eu acredito que uma obra... só se torna completa quando alguém a vê e brinca com ela."
21190-41 = "Eu quero... que o nosso jogo, de fato, seja finalizado."
21190-42 = "Yuzu-chan..."
21190-43 = "Tudo bem. Se virar aquele monte de comentários negativos igual da última vez..."
21190-44 = "Nós fizemos tudo o que podíamos. Além disso... Como estamos todas juntas, nós conseguiremos aceitar isso."
21190-46 = "Eu já não tenho mais medo."
21190-48 = "......"
21190-49 = "Então vamos subir ele agoora!"
21190-50 = "Aahh! E-Espera aí! Ainda não me preparei mentalmente...!"
21190-52 = "Upload concluído! Provavelmente vai demorar pelo menos umas 2 ou 3 horas até que alguém jogue e mande as impressões, então agora a gente pode dar uma pausa!"
21190-53 = "......Phew, tem razão."
21190-55 = "......"
21190-57 = "......"
21190-58 = "Hm, Aris? Por que você tá sentada na frente do computador?"
21190-59 = "Entrando em estado de espera."
21190-60 = "Parece que todos começaram a baixar o jogo. Estou curiosa."
21190-61 = "Eles vão demorar um tempão jogando, mesmo que você fique esperando não vão terminar tão cedo, sabe?"
21190-62 = "Sim, mesmo assim eu esperarei."
21190-63 = "E-Eu também..."
21190-64 = "De qualquer jeito, eu nem vou conseguir dormir de tanta ansiedade mesmo..."
21190-65 = "Eu também, vou esperar."
21190-66 = "......Sim."
21190-67 = "Isso é mal, o meu coração começou a bater forte também."
21190-68 = "O meu coração não para de bater de tanta preocupação... Ughh, eu que dei a ideia, mas acho que vou enlouquecer de tanta ansiedade!"
21190-69 = "(Pliink)"
21190-70 = "Ah, primeiro comentário."
21190-71 = "O que ele disse!? O que ele disse!?"
21190-72 = "<hermet021: Uau, é a sequência daquele lá que ficou em 1º no ranking de Piores Jogos? Achei que tivessem parado de fazer jogos, mas vocês não desistem mesmo, hein.>"
21190-73 = "......"
21190-74 = "A-Aris, você não deve ligar muito para essas coisas..."
21190-75 = "......"
21190-76 = "Contatando a Maki. Solicitarei um ataque com canhão de feixe em potência máxima em direção ao endereço de IP correspondente."
21190-77 = "N-Não faça isso!"
21190-78 = "......Tá tudo bem."
21190-79 = "Esse é o comentário de alguém que nem jogou o jogo ainda... Não se importe com isso, tá bom?"
21190-80 = "(Pliink)"
21190-81 = "<Kotoha0507: É verdade que o 'TSC' anterior não foi algo que pudesse ser elogiado abertamente. No entanto, havia frescor e, no mínimo, não era uma obra genérica. Estou curioso para ver o que vocês farão de novo com este 2.>"
21190-82 = "Oh, as reações de verdade estão começando a aparecer..."
21190-83 = "(Pliink)"
21190-84 = "<QueenC: E então, será que vai sair um ogro ou uma cobra... Já que é pra ser assim, espero uma experiência extrema de um lado ou de outro, em vez de algo só ok.>"
21190-85 = "(Pliink)"
21190-86 = "<kirakiraNO1: Joguei o anterior, mas não ficou como uma boa lembrança. Pelo contrário, lembro de várias coisas ruins claramente. Mas por que será... Mesmo sabendo que é uma sequência, acabei baixando.>"
21190-87 = "I-Incrível! Sinto que estão botando muita expectativa no nosso jogo, não estão!?"
21190-88 = "Em geral, sinto que é mais algo como 'Eles parecem estar se divertindo tentando desarmar uma bomba-relógio'..."
21190-89 = "Como a sensação de querer ver o que dá medo..."
21190-91 = "(Pliink, Pliink)"
21190-92 = "<cat0808: Tenho um exame de recuperação daqui a 2 horas... mas agora eu sinto mais vontade de jogar este jogo do que fazer isso.>"
21190-93 = "<You-me: Você vai ter vários testes daqui pra frente. Mas a melhor hora pra jogar isso é agora mesmo, logo depois que lançou!>"
21190-94 = "Ehm, se for possível, acho melhor... que ele faça o teste..."
21190-95 = "O-O número de downloads já passou de 2000!? Isso é muito insano!?"
21190-96 = "Ah... parece que saiu uma notícia sobre o lançamento do nosso jogo num site famoso."
21190-97 = "Uwaaaahhh...! Eu estava pensando que, com tanto que não passassem despercebido tava bom, mas! Ter tanta gente assim de repente está me dando medo!"
21190-100 = "......"
21190-101 = "......Estou nervosa."
21190-102 = "Uuuuh! Sinto que o meu coração vai explodir de tanta expectativa e ansiedade!"
21190-103 = "(BOOOOOOMMMM!)"
21190-104 = "!?"
21190-105 = "O, o seu coração realmente explodiu?"
21190-106 = "N-Não! Não foi o meu coração!"
21190-107 = "Então o que explodiu...! O console do jogo!?"
21190-108 = "Eh, será que a gente jogou demais...?"
21190-109 = "Não! Esse fogo de artilharia é do canhão de 13.97mm... Da Karin-senpai!"
21190-110 = "(BDOOOOOMMMM!)"
21190-111 = "Hyaah!?"
21190-112 = "Ataque de longa distância detectado, em direção às 11 horas à frente da sala do clube! Distância de, aproximadamente 1km...!"
21190-113 = "É, é o troco por causa daquela vez!?"
21190-114 = "Iniciando contra-ataque!"
21190-115 = "Não, Aris, vamos sair daqui! O Sensei pode se machucar aqui dentro e, além disso..."
21190-116 = "Se nós lutarmos aqui desse jeito, a sala do nosso clube vai acabar sendo destruída!"
21190-117 = "Mana..."
21190-118 = "O-O pessoal do Conselho Estudantil também está lá fora...! Uma retaliação pelo incidente do 'Espelho'...!"
21190-119 = "E-Eu até que tava me sentindo um pouco mal por causa daquilo, mas...!"
21190-120 = "Hiii, aí vem de novo!"
21190-121 = "[s1] \"Mantenham a calma.\"\n[s2] \"Vamos sair daqui enquanto eles recarregam.\""
21190-122 = "Sensei...!"
21190-123 = "Sensei...!"
21190-124 = "Sim!"
21190-125 = "Aris, eu e a Yuzu iremos na frente!"
21190-126 = "Entendido."
21190-127 = "A Aris protegerá o Sensei e a todas."
21190-129 = "Muito bem, vamos!!"