[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21190-1 = "Episódio 19: Double-O"
21190-2 = "Millennium · Clube de Desenvolvimento de Jogos"
21190-4 = "Mana! Ainda não!?"
21190-5 = "P-peraí, não me apressa! Só falta digitar\nisto aqui e acabou……!"
21190-6 = "Faltam 2 minutos, viu!? Não tem como\nnão apressar!"
21190-7 = "Pra ser exata, 96 segundos; e, enquanto você\nfala, já são 92……"
21190-8 = "T-tá, tá! Já terminei!"
21190-12 = "Aqui é só rodar um teste rapidinho……\né, prontinho."
21190-13 = "Não deu erro, Momoi!"
21190-14 = "Okay! Subindo o arquivo, tempo estimado pra\nconcluir…… 15 segundos! Aris, faltam quantos!?"
21190-15 = "Restam 19 segundos……!"
21190-16 = "P-por favor……!"
21190-20 = "Transferência concluída……"
21190-22 = "Inscrição no Prêmio Millennium concluída."
21190-23 = "Deu tempooo!"
21190-24 = "No limite…… achei que meu coração ia parar……"
21190-25 = "Agora é só…… esperar o anúncio, daqui a 3 dias."
21190-26 = "Por ora deu tempo, mas ainda não saiu\no resultado, né."
21190-27 = "Daqui a 3 dias…… vai se decidir se a gente\ncontinua nesta sala ou não."
21190-28 = "……Mas 3 dias é bastante coisa, né? Aí eu tenho\numa proposta, ó:"
21190-29 = "que tal a gente subir antes a versão web\ndo \"Tales Saga Chronicle 2\"?"
21190-31 = "!?"
21190-32 = "P-por quê?"
21190-33 = "Não dá pra esperar 3 dias inteiros! E, antes da\navaliação dos jurados, você não quer ver a reação\ndos jogadores!?"
21190-34 = "Hmm, mas é meio assustador……\ntô com medo dos comentários de avaliação baixa."
21190-35 = "Que é isso! Pra começar, não foi um jogo feito\nsó pra concorrer no Prêmio Millennium, foi!"
21190-36 = "Vamos mostrar com orgulho! Porque a gente\ndeu o nosso melhor!"
21190-37 = "I-isso é verdade, mas……"
21190-38 = "……Sim, vamos subir."
21190-39 = "Hã?"
21190-40 = "Uma obra…… só se completa de verdade quando\ntem quem a veja, quem a jogue, eu acho."
21190-41 = "Eu…… quero completar o nosso jogo direito."
21190-42 = "Yuzu……"
21190-43 = "Tá tudo bem. Mesmo que vire de novo, igual antes,\numa enxurrada de comentários ruins……"
21190-44 = "A gente se esforçou ao máximo. E, além disso……\ncom todo mundo junto, com certeza eu aguento."
21190-46 = "Eu, agora, já tô bem."
21190-48 = "……"
21190-49 = "Então bora subir agora mesmo!"
21190-50 = "Aah! P-peraí! Meu preparo emocional……!"
21190-52 = "Transferência concluída! Até alguém jogar e mandar\numa opinião deve levar umas 2, 3 horas, no mínimo;\nentão, por ora, vamos dar uma descansada!"
21190-53 = "……Haah, é mesmo."
21190-55 = "……"
21190-57 = "……"
21190-58 = "Hm, Aris? Por que você tá sentada\nna frente do computador?"
21190-59 = "Vou aguardar."
21190-60 = "Parece que começaram a baixar; fiquei curiosa."
21190-61 = "Pra jogar daqui vai levar um tempo de novo, então,\nmesmo esperando, acho que não vem nada tão\nrápido, viu?"
21190-62 = "Sim, ainda assim eu aguardo."
21190-63 = "E-eu também……"
21190-64 = "De qualquer jeito, de tão tensa, não consigo\ndormir mesmo……"
21190-65 = "Eu também, vou esperar."
21190-66 = "……Tá."
21190-67 = "Que nada, agora eu também fiquei tensa."
21190-68 = "Eu, de preocupada, não paro de tremer……\nuuh, fui eu mesma que propus, e tô quase\npirando de tensão!"
21190-69 = "(Plim)"
21190-70 = "Ah, primeiro comentário."
21190-71 = "Diz o quê!? Diz o quê!?"
21190-72 = "＜hermet021: uau, isto é a continuação daquele que\nficou em 1º no ranking de jogo porcaria da última\nvez? Achei que tinham parado de fazer jogo, mas\nnão aprendem, né＞"
21190-73 = "……"
21190-74 = "A-Aris, esse tipo de coisa, melhor não ligar……"
21190-75 = "……"
21190-76 = "Vou contatar a Maki. Vou descarregar um canhão de\nfeixe de potência máxima na direção do IP em questão."
21190-77 = "I-isso não pode!"
21190-78 = "……Calma."
21190-79 = "É fala de alguém que nem jogou o jogo……\nnão liga, tá?"
21190-80 = "(Plim)"
21190-81 = "＜Kotoha0507: o \"TSC\" anterior, de fato, talvez não\nfosse uma obra digna de elogio sem ressalvas. Mas\ntinha um frescor, e, no mínimo, não era uma obra\nbanal. Que novidade o 2 vai nos mostrar desta vez?\nEstou ansioso＞"
21190-82 = "Oh, aos poucos vão chegando reações decentes……"
21190-83 = "(Plim)"
21190-84 = "＜QueenC: bom, vai que vai ser o céu ou o inferno……\njá que é pra ser, em vez de algo morno, eu espero\numa experiência radical, não importa pra que lado＞"
21190-85 = "(Plim)"
21190-86 = "＜kirakiraNO1: joguei o anterior, mas não ficou como\nboa lembrança. Pelo contrário, lembro vividamente de\nvárias memórias amargas. Mas, sei lá por quê……\nmesmo sabendo que é continuação, acabei baixando＞"
21190-87 = "Q-que incrível! O nosso jogo, sei lá,\nas pessoas tão super ansiosas por ele, né!?"
21190-88 = "No geral, é meio que…… \"tentando desarmar uma\nbomba-relógio toda animada\", sabe……"
21190-89 = "Tipo aquela curiosidade mórbida……"
21190-91 = "(Plim, plim)"
21190-92 = "＜cat0808: daqui a 2 horas tenho prova no reforço,\nmas…… mais que isso, agora eu tô a fim mesmo\né de jogar este jogo＞"
21190-93 = "＜You-me: prova vai ter um monte, daqui pra frente.\nO melhor momento pra jogar isto é só agora, que\nacabou de sair!＞"
21190-94 = "Ãh, isso aí, se der……\neu queria que ele fosse fazer a prova……"
21190-95 = "O-o número de downloads já passou de 2000!?\nIsso não é estranho demais!?"
21190-96 = "Ah…… parece que saiu uma matéria, num portal\nfamoso, dizendo que o nosso jogo foi lançado."
21190-97 = "Uaaah……! Eu só esperava \"tomara que não\nseja indiferença\", e agora, com o número subindo\nassim, de repente bateu o medo!"
21190-100 = "……"
21190-101 = "……Coração disparado."
21190-102 = "Uuh! De expectativa e ansiedade,\nmeu coração vai explodir!"
21190-103 = "(KABÃÃÃM!)"
21190-104 = "!?"
21190-105 = "S-será que o seu coração explodiu de verdade?"
21190-106 = "N-não! Não é o meu coração!"
21190-107 = "Que negócio é……! O console explodiu!?"
21190-108 = "Hã, será que eu joguei tempo demais……?"
21190-109 = "Não! Esse disparo é de canhão 13,97 mm……\né da Karin!"
21190-110 = "(DOGÃÃÃM!)"
21190-111 = "Hyá!?"
21190-112 = "Ataque de longa distância confirmado, direção das\n11 horas em relação à frente da sala! Distância,\ncerca de 1 km……!"
21190-113 = "É-é a vingança da última vez!?"
21190-114 = "Iniciando contra-ataque!"
21190-115 = "Não, Aris, vamos sair daqui primeiro! Aqui a gente\nacaba envolvendo o Sensei, e, além disso……"
21190-116 = "Se a gente lutar aqui, a nossa sala do clube\nse destrói!"
21190-117 = "Mana……"
21190-118 = "L-lá fora tem gente do Conselho também……!\nA represália do caso do \"Espelho\"……!?"
21190-119 = "T-tá, eu até me sinto um pouco culpada, mas……!"
21190-120 = "Iih, vem mais!"
21190-121 = "[s1] \"Calma.\"\n[s2] \"Enquanto eles recarregam, bora sair logo lá pra fora.\""
21190-122 = "Sensei……!"
21190-123 = "Sensei……!"
21190-124 = "Sim!"
21190-125 = "Aris, eu e a Yuzu vamos na frente!"
21190-126 = "Sim."
21190-127 = "A Aris vai proteger o Sensei e todas vocês."
21190-129 = "Boa, bora!!"