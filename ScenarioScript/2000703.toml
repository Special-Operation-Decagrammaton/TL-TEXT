[translation]
2000703-1 = "バーチャル・シンガーの悩み"
2000703-5 = "ライブハウス・控室"
2000703-7 = "（控室に向かうと、ミクが誰かと話し合っていた）"
2000703-11 = "えぇっ、歌えなくなった！？"
2000703-12 = "はい……理由は分からないんですが、急に……。"
2000703-13 = "原因不明だなんて、どういうことなんだ……。"
2000703-14 = "こうしてお話はできるのですが、何故か声が出なくて……"
2000703-15 = "くっ、あいつら「身体のメンテナンスは完璧さ」って言ってたのに……！"
2000703-16 = "というかマズい、これではライブが……！？"
2000703-17 = "あの、今から中止、あるいは延期というのは……？"
2000703-18 = "いや、今からは難しい……その場合、とんでもないお金が……！"
2000703-19 = "広告費はもちろんのこと、ライブハウスのお金も技術周りのお金も戻ってこないし……。"
2000703-20 = "中止にならなかったとしても、凄まじい金額の請求書が降ってくる……！"
2000703-21 = "とにかく、中止は無理だ！私の方でも解決方法を探してみるが、何とかならないか色々試してみてくれ……！"
2000703-22 = "は、はい……。"
2000703-27 = "ふぅ……。"
2000703-28 = "[s] \"ミク、大丈夫？\""
2000703-30 = "あ、先生。来てくださったんですね。"
2000703-31 = "すみません、タイミングが悪かったですね。お恥ずかしい所をお見せしてしまいました。"
2000703-32 = "[s] \"さっきのは、ライブの主催者？\""
2000703-33 = "はい。今回のライブを企画した、責任者の方だそうで。"
2000703-34 = "ギリギリまでは何とか方法を探しつつ、黙っていようと思ったのですが……"
2000703-35 = "そろそろ時間的にも難しいかなと。"
2000703-36 = "聞かれていたかもしれませんが、やはりライブの中止や延期はできないそうです……。"
2000703-37 = "[s] \"大人の事情ってやつだね……。\""
2000703-38 = "そうみたいですね……ただ、元を辿れば私の責任ですから。"
2000703-39 = "それにもし中止になった場合、私の歌を楽しみにしてくれたファンのみなさんをガッカリさせてしまいます。だから私も、何とかライブをやり遂げたいです。"
2000703-40 = "[s1] \"あんまり思い詰めすぎないで。\"\n[s2] \"ミクならきっと大丈夫だよ。\""
2000703-41 = "……ありがとうございます。"
2000703-42 = "……ありがとうございます。"
2000703-43 = "あ、ところで先生。モモトークで仰っていた「いくつかの方法」というのは……？"
2000703-44 = "[s] \"とりあえず片っ端から試してみようかなって。\""
2000703-51 = "これは……ネギ？"
2000703-52 = "風邪や病気の時、首にネギを巻くと、喉が良くなる……ですか？"
2000703-53 = "たしかに、私も聞いたことがある気がしますが……。"
2000703-54 = "バーチャル・シンガーの私に、こういった民間療法は効くんでしょうか？"
2000703-55 = "[s] \"まずは試してみよう。\""
2000703-59 = "はい、そうですね。確かに今は疑っている場合でも、えり好みしている場合でもありません。"
2000703-66 = "んしょ……あ、何だか巻いてみたら、喉が少し暖まっていく気がします。"
2000703-67 = "もしかしたら、これで……"
2000703-68 = "……では初音ミク、歌います！"
2000703-74 = "……ダメ、ですね。"
2000703-75 = "やはり私がバーチャル・シンガーだから、効かないんでしょうか？ネギ、嫌いではないのですが……。"
2000703-76 = "[s3] \"まだ諦めるには早いよ。\"\n[s4] \"次はこれ！\""
2000703-85 = "これは……エナジードリンク？"
2000703-86 = "どこかで見たような……それに、何だか缶に気持ち悪……不思議な見た目の鳥さんが描かれてますね？"
2000703-87 = "[s5] \"一部の生徒たちに人気のエナジードリンク。\"\n[s6] \"飲むとペロロみたいに翼が手に入るらしいよ。\""
2000703-88 = "そ、それは飲んでも大丈夫なのでしょうか……いえ、先生を疑っているわけではないのですが……。"
2000703-89 = "そ、それは飲んでも大丈夫なのでしょうか……いえ、先生を疑っているわけではないのですが……。"
2000703-90 = "……喉が悪化しないことを願います。"
2000703-91 = "では……"
2000703-95 = "初音ミク、チャレンジしてみます！"
2000703-98 = "（……その後も、先生が用意してきた様々な方法を試してみたが、特にミクの調子が変わることは無かった。）"
2000703-100 = "うーん、上手く行きませんね……。"
2000703-101 = "[s] \"チョコミントでもダメか……。\""
2000703-102 = "今さらですが、チョコミントアイスって何か喉と関係があったのでしょうか……？確かに少しスースーしましたが……。"
2000703-103 = "何だか後半は色んなスイーツを食べてばかりで、ちょっとしたお菓子パーティみたいになってしまいましたね。"
2000703-104 = "ですがおかげさまで、気分転換になりました。ありがとうございます。もしかして……これを狙ってましたか？"
2000703-105 = "思えば、最近はライブのことばかり考えて、他のことをしたり考えたりする時間がありませんでした……。"
2000703-106 = "こうしてちょっとふざけ合ったりしながら、楽しい時間を過ごしたのは久しぶりです。"
2000703-107 = "[s] \"ご、ごめん、ふざけたつもりは無かったんだけど……。\""
2000703-108 = "あ、いえ！すみません、先生を責めたわけではなく……！"
2000703-109 = "大勢の方に歌を届けるために生まれた私が、こんな感情を持てることが新鮮と言いますか、ちょっと不思議な感じで。"
2000703-110 = "何だか、変な感じです。これが、「楽しい」……。"
2000703-111 = "[s] \"ミクが楽しんでくれたなら良かった。私はそれが嬉しいよ。\""
2000703-112 = "……そう言っていただけると、私も「嬉しい」、です。"
2000703-113 = "今日もありがとうございました、先生。"
2000703-119 = "引き続き、よろしくお願いします！"
