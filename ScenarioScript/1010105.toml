[translation]
1010105-1 = "二人だけの打ち上げ"
1010105-2 = "（サオリに連絡をもらい、会場のDJステージにやって来ていた）"
1010105-6 = "めっちゃ良かったね！"
1010105-7 = "DJの人、新人みたいだけど超うまかったし！"
1010105-8 = "だよね、分かる！#nこっちまで熱が伝わってきたもん！"
1010105-13 = "[ns1] （サオリ、すごく頑張ってたな……）\n[ns2] （観客にも伝わっていたみたいだ）"
1010105-22 = "[ns] \"サオリ。\""
1010105-26 = "……ん？"
1010105-27 = "あ、先生。"
1010105-28 = "……ステージ、大丈夫だったか？"
1010105-29 = "[s3] \"すっごく楽しかったよ！\"\n[s4] \"おかげでテンション上がったよ！\""
1010105-32 = "そ、そうか……。"
1010105-33 = "それは良かった。"
1010105-34 = "先生がそう言ってくれると安心する。"
1010105-35 = "おかげで気が楽になった。"
1010105-38 = "[ns] \"ところで、ほかのスタッフは？\""
1010105-39 = "あぁ、みんなは打ち上げに向かった。"
1010105-40 = "私も誘われたんだが……。"
1010105-41 = "まだ機材の片付けも残っているからな。#n……それに、賑やかな場所は、あまり得意じゃない。"
1010105-42 = "だから一人で――"
1010105-46 = "ごほっ！"
1010105-47 = "[s] \"大丈夫？\""
1010105-48 = "し、心配ない。"
1010105-49 = "ちょっと喉が乾燥しただけだ。"
1010105-53 = "……これは？#n差し入れのジュース……？"
1010105-54 = "ありがとう、先生。#nいつも世話になってばかりだな。"
1010105-55 = "[s] \"気にしなくて良いんだよ。\""
1010105-60 = "少し座ろうか。#n先生もこっちに来てくれ。"
1010105-67 = "[wa:1090]― [log=사오리 수영복]終演後の客席というのは、[wa:2200]寂しいものだな。[/log]"
1010105-68 = "[wa:2670]― [log=사오리 수영복]大勢いた観客がはけ、[wa:2130]照明はすべて消えて……[/log]"
1010105-71 = "[wa:1380]― [log=사오리 수영복]華やかなステージは[wa:1660]跡形もなく、[wa:1640]静寂に沈んでいる。[/log]"
1010105-74 = "― [log=사오리 수영복]熱気と歓声に満ちていた空間が[wa:2360]突如静まると……[/log]"
1010105-75 = "[wa:2410]― [log=사오리 수영복]どこか、[wa:1570]切なさを覚えるほどだ。[/log]"
1010105-78 = "[wa:670]― [log=사오리 수영복]……[wa:940]でも、[wa:2050]今はもう、[wa:1260]大丈夫だ。[/log]"
1010105-81 = "[wa:1340]― [log=사오리 수영복]変わったことは何もないが、[wa:2300]穏やかでいられる。[/log]"
1010105-84 = "[wa:790]― [log=사오리 수영복]……[wa:2020]先生が隣にいるから、[wa:2760]かもしれないな。[/log]"
1010105-87 = "ありがとう、先生。#nおかげで元気になった。"
1010105-88 = "[s] \"ジュースだけで足りた？\""
1010105-89 = "あ、ああ。まったく問題――"
1010105-94 = "……問題、あるようだ。"
1010105-95 = "ステージで体力を使いすぎたな。"
1010105-96 = "[s5] \"じゃあ、一緒に打ち上げをしようか？\"\n[s6] \"二人でなら、どうかな？\""
1010105-101 = "……先生なら、そう言うだろうと思った。"
1010105-106 = "もちろんだ、行こう。"
