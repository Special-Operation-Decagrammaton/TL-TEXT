[translation]
84310100400-10 = "Com licença... posso falar com você?"
84310100400-14 = "Ah, olá! Por acaso você gostaria de treinar?"
84310100400-15 = "Treinar... então vocês estavam se exercitando."
84310100400-16 = "(Embora o clima não pareça muito com isso...)"
84310100400-17 = "Uma mente sã habita em um corpo são!"
84310100400-18 = "Veja só, as expressões revigoradas de todos!"
84310100400-23 = "Revigoradas!?"
84310100400-24 = "...Não, espera, nem dá para ver o rosto deles por causa dos capacetes!?"
84310100400-26 = "(Isso é...)"
84310100400-27 = "Mas, sinto muito. No momento estamos lotados..."
84310100400-28 = "Não se preocupe. Eu só vim para observar."
84310100400-33 = "Ei, você ouviu isso?"
84310100400-34 = "Ela disse que está lotado e não dá para entrar, né!?"
84310100400-35 = "A chance é agora... esse tipo de gente perigosa—"
84310100400-42 = "—não é nada disso, seria um desperdício guardar esse exercício revigorante e divertido só para nós, não acha?"
84310100400-43 = "Isso mesmo! Vamos abrir um espaço para você!"
84310100400-48 = "...Eh."
84310100400-53 = "(Que sensação é essa...? Meu corpo está reagindo como se eu não devesse me envolver...)"
84310100400-54 = "(Entendo. Isso é...)"
84310100400-55 = "(Instinto de sobrevivência)"
84310100400-63 = "Pessoal, que consideração maravilhosa por um novo cliente...!"
84310100400-64 = "Isso sim é uma mentalidade positiva causada pela liberação de endorfinas!"
84310100400-65 = "Sendo assim... já preparamos um lugar para você. Por aqui, por favor!"
84310100400-66 = "Venha comigo para o mundo do treinamento..."
84310100400-70 = "...Ué?"
84310100400-74 = "...Para onde será que ele foi?"
