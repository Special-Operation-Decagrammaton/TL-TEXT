[translation]
84310100400-10 = "失礼……話を聞いてもいいかい？"
84310100400-14 = "あっ、こんにちは！もしかして、トレーニングをご希望ですか？"
84310100400-15 = "トレーニング……運動中だったのか。"
84310100400-16 = "（その割には温度感が……）"
84310100400-17 = "健全な精神は、健全な肉体に宿るもの！"
84310100400-18 = "ご覧ください、皆さんの爽やかな表情を！"
84310100400-23 = "爽やか！？"
84310100400-24 = "……いや、そもそもヘルメットで顔見えないだろ！？"
84310100400-26 = "（これは……）"
84310100400-27 = "ただ、大変申し訳ありません。今はいっぱいでして……。"
84310100400-28 = "気にしないでくれ。見学をと思って来ただけだからね。"
84310100400-33 = "おい、聞いたか？"
84310100400-34 = "いっぱいでできないって言ったよな！？"
84310100400-35 = "チャンスは今しかない……こんなタチの悪――"
84310100400-42 = "くなんてない、爽やかで楽しい運動を独り占めなんてもったいないだろ？"
84310100400-43 = "そうそう！場所なら空けてやるから！"
84310100400-48 = "……えっ。"
84310100400-53 = "（この感覚はなんだ……？関わってはいけないと、体が反応している……）"
84310100400-54 = "（そうか。これが……）"
84310100400-55 = "（生存本能）"
84310100400-63 = "皆さん、新しいお客様のためにそんなご配慮を……！"
84310100400-64 = "これこそ、エンドルフィンの分泌によるプラスマインドですね！"
84310100400-65 = "と、いうことで……場所のご用意ができました。こちらへどうぞ！"
84310100400-66 = "私と共にトレーニングの世界へ……。"
84310100400-70 = "……あら？"
84310100400-74 = "……どこに行ったのでしょう。"
