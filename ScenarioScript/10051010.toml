[translation]
10051010-1 = "Episódio 1: Uma oferta que não se pode recusar"
10051010-2 = "Hyakkiyako, uma sala de aula no antigo prédio 38"
10051010-3 = "（Um dia após a confusão na loja de lámen...）"
10051010-4 = "Chefe... qual seria o assunto, exatamente?"
10051010-5 = "U-um anúncio importante, você disse...?"
10051010-6 = "Ah! A câmera foi consertada!?"
10051010-7 = "I-isso ainda não..."
10051010-8 = "Não consigo encontrar um bom técnico de reparos, ahaha."
10051010-9 = "……Bem, na verdade é só que não tenho dinheiro para o conserto."
10051010-10 = "Então... não me diga que é uma ordem de fechamento do clube...!?"
10051010-11 = "Claro que não."
10051010-12 = "Para começo de conversa, nem somos um clube oficial. Não tem nem o que fechar."
10051010-13 = "O verdadeiro motivo de eu ter chamado vocês duas é—"
10051010-15 = "Fui chamada pelo Departamento de Yin-Yang, então queria compartilhar o que aconteceu."
10051010-16 = "S-será que é sobre a confusão de ontem...?"
10051010-17 = "Eu acho que não!"
10051010-18 = "Aquilo foi legítima defesa!"
10051010-19 = "Bem, na verdade é sobre a loja de lámen..."
10051010-20 = "Sim?"
10051010-21 = "Parece que o que aconteceu ontem chegou aos ouvidos da Niya."
10051010-22 = "Eeeeeh!?"
10051010-23 = "E ela disse para eu ir ao Departamento de Yin-Yang hoje, porque tem algo para conversar."
10051010-24 = "Ah, e ela acrescentou: 'por favor, mantenha isso em sigilo'."
10051010-25 = "I-isso significa..."
10051010-26 = "Será que vão empurrar algum trabalho problemático para a gente...?"
10051010-27 = "Hmm, eu gostaria de acreditar que ela não faria isso..."
10051010-28 = "Não, é aquela chefe traiçoeira, afinal..."
10051010-29 = "Enfim! Quando eu voltar, conto os detalhes!"
10051010-30 = "B-boa sorte... chefe!"
10051010-31 = "Vá com cuidado! Nin-nin!"
10051010-33 = "Departamento de Yin-Yang, sala do clube"
10051010-34 = "Desculpe pelo incômodo, chefe do Clube de Pesquisa de Ninjutsu."
10051010-35 = "A batalha de ontem na loja de lámen... nossa, foi realmente impressionante."
10051010-36 = "Você estava lá? Por quê?"
10051010-37 = "Lojas de lámen não são lugares para comer lámen?"
10051010-38 = "Nossa, a Niya também come lámen..."
10051010-39 = "Eu tinha a impressão de que você só comia culinária kaiseki..."
10051010-40 = "De jeito nenhum, não sou tão refinada assim."
10051010-41 = "De qualquer forma, aquele seu ninjutsu descuidado usando fogos de artifício... me divertiu muito. Nyaha."
10051010-42 = "O que você quer dizer com descuidado!"
10051010-43 = "Ora. A 'falta de cuidado' não seria parte da tática?"
10051010-44 = "Usar fogos de artifício para desviar o olhar e atacar pelas costas... uma tática clássica de 'fazer barulho no leste para atacar no oeste'."
10051010-45 = "E ainda por cima, sem descuidar da segurança do dono da loja..."
10051010-46 = "Fiquei muito impressionada."
10051010-47 = "I-isso é..."
10051010-48 = "Exatamente!"
10051010-49 = "Você tem bom olho!"
10051010-50 = "Nyaha, eu sabia."
10051010-51 = "Um trabalho em equipe daquele nível não é algo que se consegue da noite para o dia."
10051010-52 = "Julgamento rápido, ações corajosas e uma coordenação fluida—"
10051010-53 = "Ficou bem claro o quão rigoroso é o treinamento que vocês realizam diariamente."
10051010-54 = "Ah... o-obrigada...?"
10051010-55 = "（A gente nem faz treinamento nenhum, na verdade...!?）"
10051010-56 = "（É só porque a gente se conhece há muito tempo que estamos em sintonia...）"
10051010-57 = "（E outra, ela está elogiando demais só hoje...）"
10051010-58 = "（Ela não é do tipo que diz essas coisas a menos que esteja tramando algo, né?）"
10051010-59 = "Bem, chega de preâmbulos."
10051010-60 = "Hii!?"
10051010-61 = "Vamos entrar no assunto principal."
10051010-62 = "Sendo direta, gostaria de pedir a ajuda do Clube de Pesquisa de Ninjutsu."
10051010-63 = "……Eh?"
10051010-64 = "Ué? Não era sobre uma punição ou algo assim?"
10051010-65 = "Sim?"
10051010-66 = "Vocês foram as protagonistas que resolveram a confusão, por que seriam punidas?"
10051010-67 = "Eh, ah..."
10051010-68 = "Por que você tem que falar coisas tão sensatas...!"
10051010-69 = "Não acho que isso seja algo exclusivo de hoje, na verdade."
10051010-70 = "Ehem, voltando ao assunto. O Comitê Yin-Yang gostaria de solicitar a ajuda de vocês."
10051010-71 = "Temos um pedido de missão de escolta extremamente importante."
10051010-72 = "Escolta……!?"
10051010-73 = "Shine Cat — vocês conhecem esse nome?"
10051010-74 = "Shine Cat……?"
10051010-75 = "Desculpa, nunca ouvi falar."
10051010-76 = "Então, vou explicar."
10051010-78 = "Shine Cat é o estilista mais renomado de Kivotos."
10051010-79 = "Se você tiver o mínimo de interesse em moda, com certeza já ouviu falar."
10051010-80 = "O cronograma de grandes desfiles de moda muda só com uma palavra dele."
10051010-81 = "Se o Shine Cat não vier, o desfile não começa — dizem que existe até um acordo tácito sobre isso."
10051010-82 = "E desta vez, foi decidido que ele comparecerá ao desfile de moda que será realizado em Hyakkiyako."
10051010-84 = "Sendo assim..."
10051010-85 = "Gostaríamos de confiar essa escolta ao Clube de Pesquisa de Ninjutsu!"
10051010-86 = "Oh……!"
10051010-90 = "……Hm? Ei, espera um pouco!? O assunto não avançou rápido demais!?"
10051010-91 = "Você acha?"
10051010-92 = "Pelo incidente na loja de lámen, julguei que vocês seriam as mais adequadas para esta missão..."
10051010-93 = "Algum problema com isso...?"
10051010-94 = "É bom ser reconhecida, mas..."
10051010-95 = "Esse tipo de coisa não seria melhor para o pessoal da Hyakka Ryoran!?"
10051010-96 = "E-eu sei que, no fim das contas, os ninjas são os melhores, mas...!?"
10051010-97 = "Hum... se falarmos de força de combate pura, eles levariam a melhor, com certeza."
10051010-98 = "Mas se a escolha da escolta dependesse apenas de força de combate, não bastaria colocar uma bomba termobárica no local?"
10051010-99 = "É esse o tipo de lógica que você usa...?"
10051010-100 = "Sim. Uma escolta excelente não se resume apenas à força de combate."
10051010-101 = "Rapidez, discrição e uma coordenação minuciosa —"
10051010-102 = "Em locais onde muitas pessoas se reúnem, esses elementos são os mais importantes."
10051010-103 = "E eu vi essas qualidades em vocês."
10051010-104 = "……Isso ainda não convence vocês?"
10051010-105 = "Bom, rapidez e discrição são o básico de um ninja, mas..."
10051010-106 = "Ah, e não precisam levar isso tão a sério."
10051010-107 = "A segurança pessoal do Sr. Shine Cat será feita pela equipe exclusiva dele."
10051010-108 = "Gostaria que vocês se misturassem à multidão no local para realizar a segurança――"
10051010-110 = "O que chamamos de trabalho \"à paisana\"."

10051010-111 = "À paisana……!"
10051010-112 = "Claro, é apenas um gesto, mas também preparamos uma recompensa."
10051010-113 = "Sé-sério mesmo!?"
10051010-114 = "Ora, de jeito nenhum."
10051010-115 = "Eu jamais faria vocês trabalharem de graça usando o poder como escudo……"
10051010-116 = "Quando você nega tão categoricamente, fica ainda mais suspeito……"
10051010-117 = "Então, qual é a recompensa?"
10051010-118 = "Nyahaha."
10051010-119 = "No depósito do Departamento Yin-Yang, várias coisas estão guardadas."
10051010-120 = "Recentemente, descobrimos uma câmera em excelente estado de conservação."
10051010-121 = "Uma câmera?"
10051010-122 = "Sim, com ótima qualidade de imagem e uma bateria de longa duração."
10051010-123 = "Acho que ela tem especificações até melhores que a câmera do Clube de Pesquisa Ninjutsu, não é?"
10051010-124 = "……!"
10051010-125 = "Ontem, a câmera de vocês ficou coberta de sopa de tonkotsu, não foi?"
10051010-126 = "Sendo assim, há uma grande chance de que ela tenha quebrado――"
10051010-127 = "Vocês não precisam de uma câmera nova?"
10051010-128 = "Como você sabe tanto sobre isso……"
10051010-129 = "Se aceitarem o pedido―― eu darei essa câmera a vocês."
10051010-130 = "Como é um equipamento compartilhado, não posso dá-la oficialmente, mas……"
10051010-131 = "Se a tratarmos como um \"aluguel de 9999 anos\", não haverá problema."

10051010-132 = "Isso…… é basicamente dizer que vou virar pó antes de devolver……"
10051010-133 = "Então, o que vão fazer?"
10051010-134 = "Hmm……"
10051010-135 = "Um ninja nunca abandona alguém que está em apuros……"
10051010-136 = "Certo! Nós aceitamos o pedido!"
10051010-137 = "……Ah! Não pensem que é por causa da câmera, entenderam!?"
10051010-138 = "Se for para ganhar, é claro que aceitarei com gratidão!"
10051010-139 = "Nyahaha! Então, contrato estabelecido."
10051010-140 = "A partir de agora――"
10051010-145 = "Vamos falar sobre as \"condições\" do pedido."

10051010-146 = "O que é essa maleta!?"
10051010-147 = "É a parte mais importante deste pedido."
10051010-148 = "As condições que vocês precisam cumprir para a execução da missão――"
10051010-149 = "Estão todas guardadas aqui dentro."
10051010-150 = "Eu não ouvi nada sobre isso!?"
10051010-151 = "Mas, há pouco, o contrato foi estabelecido."
10051010-152 = "Um ninja não voltaria atrás na própria palavra…… voltaria?"
10051010-153 = "Grr……!"
10051010-154 = "Fufu, então――"
10051010-161 = "Click……"
10051010-163 = "Vamos conferir o conteúdo juntos?"
10051010-164 = "Antes disso, me responda uma coisa."
10051010-165 = "Sim?"
10051010-166 = "Você me chamou aqui sozinha por causa…… dessa maleta?"
10051010-167 = "Não?"
10051010-168 = "Ent-então……?"
10051010-169 = "É que――"
10051010-171 = "――Porque é interessante?"
10051010-175 = "……。"
10051010-176 = "……Abra logo."
