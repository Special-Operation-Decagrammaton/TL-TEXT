[translation]
1301303-1 = "集める理由"
1301303-2 = "ブラックマーケット"
1301303-3 = "（ブラックマーケットのパトロールを補助することになった、ある日のこと……）"
1301303-7 = "ご協力ありがとうございます、先生。"
1301303-8 = "おかげで何事もなくパトロールを終えることができました。"
1301303-9 = "[s] \"う、うん。私は何もしてないような気も……\""
1301303-10 = "いえ！先生に同行していただけるだけで、私たちは大変助かっております。"
1301303-11 = "先生が顔を見せるという噂が流れると、それだけで問題児は大人しくなりますから！"
1301303-12 = "……それでも問題を起こす怖いもの知らずもいますが。"
1301303-13 = "出てきなさい！"
1301303-20 = "ふええぇぇえん……。"
1301303-21 = "[ns] \"モミジ？\""
1301303-23 = "もしかして、お知り合いですか？"
1301303-24 = "そ、そうでしたか、では……[ruby=あきいずみ]秋泉[/ruby]モミジさんの身柄は先生にお預けしましょう。"
1301303-25 = "次の仕事もありますので、私たちとしても助かります。"
1301303-29 = "先生、後のことはお任せしました！"
1301303-33 = "あ、ありがとうございます、先生！"
1301303-34 = "あのままレッドウィンターに引き渡されていたら、ブラックマーケットに無断侵入した疑いで……"
1301303-35 = "少なくとも2週間は、日の当たらないトイレ掃除の粛清を受けていました……"
1301303-36 = "[s1] \"でもモミジが違法な取引をしていたなんて……\"\n[s2] \"先生は悲しいよ……\""
1301303-39 = "ち、違います！#nブラックマーケットに侵入したのは事実ですが……"
1301303-40 = "決して違法取引で来たわけではないんです！信じてください……！"
1301303-41 = "……ここに来た本当の理由、ですか？"
1301303-45 = "ルリエル様の絶版本が、ここでしか手に入らないと聞いて……"
1301303-46 = "この前お話した、私が集めている本のことです……"
1301303-47 = "[s] \"なるほど……それで、本は見つかったの？\""
1301303-48 = "はい！見てください！これ、ほとんど傷もない状態で！"
1301303-49 = "えへへ……危ない場面にも遭遇して怖かったですし、予算もオーバーしてしまいましたけど……"
1301303-50 = "無事に購入できて、本当に良かったです！"
1301303-51 = "そんなに貴重な本なのかって……？"
1301303-52 = "うーん……人によりますね……"
1301303-53 = "これはルリエル様が有名になる前に出した2作目なので……そもそも部数が少なくて。"
1301303-54 = "なので、よっぽどのファンじゃなければ、わざわざブラックマーケットまで探しには来ないかもしれません。"
1301303-55 = "[s3] \"なんとなく分かる気がする。\"\n[s4] \"需要はそんなに無いけど、だからこそ高値で取引されてるんだね。\""
1301303-58 = "そうなんです！流石です、先生！"
1301303-59 = "え？先生も1体10万円の変形ロボットを購入したことが……！？"
1301303-60 = "ふあぁ……ケタが違う……これが大人の力？#n大人の……恐ろしさ……？"
1301303-61 = "[s5] \"……私の話はさておき。\"\n[s6] \"モミジはその「ルリエル様」のグッズを全部集めているの？\""
1301303-64 = "いえ、そこまでじゃ……集めてるのは絶版本だけです。#nちょっとしたコレクションみたいなものでしょうか。"
1301303-65 = "集めてる理由、ですか……？"
1301303-69 = "……私は、知識解放戦線の部員ですから。#n知識を集めるために、様々な本に触れるようにしているんです。"
1301303-70 = "古い本ほど傷んでいる場合が多いですし、価値がないものとして扱われてしまいますが……"
1301303-71 = "なぜか……そういうものほど愛着が湧いて、読んでみたくなるんです。"
1301303-72 = "だって、どんな本も読まれるために生まれてきたんですから。"
1301303-73 = "[s] \"……なんか、良い話だね。\""
1301303-74 = "ご、ごめんなさい。こんなしんみりした空気にさせるつもりでは……！"
1301303-75 = "……そうですね。あとは予算の問題もあります。"
1301303-76 = "気になるグッズはたくさんありますけど……"
1301303-77 = "これは、私に限った話じゃなくて……#nレッドウィンター連邦学園の生徒は、その……あまり生活に余裕がないので……"
1301303-78 = "うまくやりくりしないと……大変なんですよね……"
1301303-79 = "なので、お財布と相談した結果、集めるのは本が中心になりました。"
1301303-80 = "……実は、事務局に新刊と合わせて絶版本を何度も申請しているんですが……"
1301303-81 = "ほとんど却下されるので、悲しいを通り越して……腹立たしくなってきます！"
1301303-82 = "たしかにレッドウィンター連邦学園の図書館は、[ruby=へんぴ]辺鄙[/ruby]な場所にありますけど！"
1301303-83 = "そのせいで規模の割に利用者は少ないですけど！"
1301303-84 = "たまに来てくれる生徒のために、私は蔵書を増やしたいと思っているんです！"
1301303-85 = "はぁ……人生、なかなか思い通りにいかないものですね。"
1301303-86 = "[s] \"新刊と一緒に絶版本も申請するって言ったよね……？\""
1301303-87 = "い、言いましたけど……？"
1301303-88 = "[s7] \"それって、モミジが個人的に読みたいものだったり？\"\n[s8] \"蔵書を増やす名目で、コレクションを増やしてたり？\" "
1301303-95 = "……。"
1301303-96 = "ご、ごめんなさい……ふええぇぇん……"
1301303-97 = "自分の都合で蔵書を発注するなんて……"
1301303-98 = "これじゃ司書としても、知識解放戦線としてもダメですよね……？"
1301303-99 = "もしみんなに知られたら、私は……"
1301303-100 = "[s] \"大丈夫、2人だけの秘密にしよう。\""
1301303-101 = "本当、ですか……？"
1301303-107 = "じゃあ、これで先生は……私と共犯ですね？#nえへへ……"
1301303-109 = "（照れながらもどこか嬉しそうなモミジの手を取って、レッドウィンター連邦学園に戻った）"
