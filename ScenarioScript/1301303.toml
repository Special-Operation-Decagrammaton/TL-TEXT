[translation]
1301303-1 = "O motivo da coleção"
1301303-2 = "Mercado Negro"
1301303-3 = "（Certo dia, acabei ajudando em uma patrulha no Mercado Negro...）"
1301303-7 = "Obrigada pela cooperação, Sensei."
1301303-8 = "Graças a você, conseguimos terminar a patrulha sem incidentes."
1301303-9 = "[s] \"Ah, sim. Sinto que não fiz nada, na verdade...\""
1301303-10 = "Não diga isso! Só de ter o Sensei nos acompanhando, já nos ajuda imensamente."
1301303-11 = "Quando corre o boato de que o Sensei está por perto, os encrenqueiros já ficam quietos!"
1301303-12 = "……Embora ainda existam alguns destemidos que causam problemas mesmo assim."
1301303-13 = "Saia daí!"
1301303-20 = "Waaaaah……."
1301303-21 = "[ns] \"Momiji?\""
1301303-23 = "Por acaso, vocês se conhecem?"
1301303-24 = "Ah, entendo. Nesse caso... deixarei a custódia de Momiji Akiizumi com o Sensei."
1301303-25 = "Temos outros trabalhos a fazer, então isso também nos ajuda."
1301303-29 = "Sensei, deixo o resto com você!"
1301303-33 = "Ah, muito obrigada, Sensei!"
1301303-34 = "Se eu tivesse sido entregue à Red Winter daquele jeito, por suspeita de invasão ao Mercado Negro..."
1301303-35 = "Eu teria sido submetida a pelo menos duas semanas de expurgo limpando banheiros escuros..."
1301303-36 = "[s1] \"Mas Momiji, você estava fazendo uma transação ilegal...\"\n[s2] \"O Sensei está triste...\""
1301303-39 = "N-não é isso! #nÉ verdade que invadi o Mercado Negro, mas..."
1301303-40 = "Eu não vim aqui para fazer transações ilegais! Acredite em mim...!"
1301303-41 = "……O verdadeiro motivo de eu ter vindo aqui, você pergunta?"
1301303-45 = "Ouvi dizer que um livro esgotado da Srta. Luriel só poderia ser encontrado aqui..."
1301303-46 = "É sobre aquele livro que mencionei antes, que estou colecionando..."
1301303-47 = "[s] \"Entendo... E então, você encontrou o livro?\""
1301303-48 = "Sim! Veja só! E está em perfeitas condições, quase sem nenhum arranhão!"
1301303-49 = "Hehehe... Foi assustador passar por situações perigosas e acabei estourando o orçamento, mas..."
1301303-50 = "Estou muito feliz por ter conseguido comprar!"
1301303-51 = "Se é um livro tão valioso assim...?"
1301303-52 = "Hmm... depende da pessoa..."
1301303-53 = "Como este é o segundo trabalho que a Srta. Luriel lançou antes de ficar famosa... a tiragem foi bem pequena."
1301303-54 = "Por isso, a menos que alguém seja um fã fervoroso, talvez não venha até o Mercado Negro procurar por ele."
1301303-55 = "[s3] \"Acho que entendo o que quer dizer.\"\n[s4] \"Não tem tanta demanda, mas é justamente por isso que é negociado por um preço alto.\""
1301303-58 = "É exatamente isso! Como esperado do Sensei!"
1301303-59 = "Ah? O Sensei também já comprou um robô transformável de 100 mil ienes...!?"
1301303-60 = "Uau... outro nível... isso é o poder de um adulto? #nO... terror de um adulto...?"
1301303-61 = "[s5] \"……Deixando meu caso de lado.\"\n[s6] \"Momiji, você coleciona todos os itens da 'Srta. Luriel'?\""
1301303-64 = "Não, não chega a tanto... Só coleciono os livros esgotados. #nÉ como uma pequena coleção, eu acho."
1301303-65 = "O motivo de eu colecionar, você pergunta...?"
1301303-69 = "……Eu sou um membro da Frente de Libertação do Conhecimento. #nPara reunir conhecimento, tento entrar em contato com vários tipos de livros."
1301303-70 = "Livros antigos costumam estar bem danificados e acabam sendo tratados como se não tivessem valor, mas..."
1301303-71 = "Por algum motivo... quanto mais assim eles são, mais apego eu sinto e mais vontade tenho de lê-los."
1301303-72 = "Afinal, todo livro nasceu para ser lido."
1301303-73 = "[s] \"……Isso é uma história bonita, de certa forma.\""
1301303-74 = "D-desculpe. Eu não queria deixar o clima tão melancólico...!"
1301303-75 = "……É verdade. Também tem a questão do orçamento."
1301303-76 = "Tem muitos itens que me interessam, mas..."
1301303-77 = "Isso não é algo exclusivo meu... #nOs alunos da Academia Federal Red Winter, bem... não temos muita folga no orçamento..."
1301303-78 = "Se não administrarmos bem... as coisas ficam difíceis..."
1301303-79 = "Então, depois de consultar a minha carteira, decidi focar apenas em colecionar livros."
1301303-80 = "……Na verdade, eu tenho solicitado repetidamente à secretaria tanto os lançamentos quanto livros fora de catálogo……"
1301303-81 = "Mas como quase tudo é rejeitado, já passei da fase da tristeza e estou começando a… ficar irritada!"
1301303-82 = "É verdade que a biblioteca da Academia Federal de Red Winter fica em um lugar remoto!"
1301303-83 = "E por causa disso, tem poucos usuários para o tamanho que tem!"
1301303-84 = "Mas eu quero aumentar o acervo para os alunos que aparecem de vez em quando!"
1301303-85 = "Haa… a vida realmente não sai como a gente planeja, não é?"
1301303-86 = "[s] \"Você disse que solicitava livros fora de catálogo junto com os lançamentos, não foi...?\""
1301303-87 = "E-eu disse, mas…?"
1301303-88 = "[s7] \"Isso não seria algo que a Momiji quer ler por conta própria?\"\n[s8] \"Você não estaria aumentando sua coleção pessoal sob o pretexto de aumentar o acervo?\""
1301303-95 = "……."
1301303-96 = "D-desculpa… buááá…"
1301303-97 = "Pedir livros para o acervo por motivos pessoais…"
1301303-98 = "Isso não é nada digno de uma bibliotecária, nem da Frente de Libertação do Conhecimento, né…?"
1301303-99 = "Se todo mundo souber disso, eu…"
1301303-100 = "[s] \"Tudo bem, vamos manter isso como um segredo entre nós dois.\""
1301303-101 = "Sério… mesmo?"
1301303-107 = "Então, a partir de agora, Sensei… você é meu cúmplice, né?#nhehe…"
1301303-109 = "(Segurei a mão da Momiji, que parecia um pouco feliz apesar de estar envergonhada, e voltamos para a Academia Federal de Red Winter)"
