[translation]
1300703-1 = "Culinária Falsa"
1300703-2 = "Academia Gehenna - Refeitório"
1300703-3 = "Você está atrasado, Sensei!"
1300703-4 = "Eu me dei ao trabalho de preparar um prato valioso e você se atrasa 10 minutos! Isso merece a morte!"
1300703-5 = "Não, esquece, se você morrer, não vai conseguir comer o prato que eu preparei com tanto esforço..."
1300703-6 = "Vou te perdoar só desta vez! Não se atrase na próxima!"
1300703-7 = "[s] \"Mas antes, que história é essa de frutos do mar de luxo?\""
1300703-8 = "Claro que eu não preparei os de verdade, frutos do mar de luxo são caríssimos."
1300703-9 = "Em vez disso, o que eu preparei hoje é... um prato para enganar o paladar!"
1300703-10 = "[s] \"Um prato para enganar o paladar?\""
1300703-11 = "Sim, a língua humana é um órgão muito sensível. #nÀs vezes, quando você come várias coisas ao mesmo tempo, não parece que o sabor muda completamente?"
1300703-12 = "Eu vi na internet que, usando esse método e misturando ingredientes baratos, dá para reproduzir o sabor de frutos do mar de luxo."
1300703-13 = "O nome é... Falso Ouriço!"
1300703-14 = "[s] \"Isso é... pudim de loja de conveniência com shoyu?\""
1300703-15 = "Sim, de acordo com a informação que eu vi, se você colocar shoyu no pudim e comer, tem gosto de ouriço."
1300703-16 = "Não sei qual é o princípio por trás disso... mas é uma combinação que ninguém faz normalmente, então com certeza deve ter um sabor misterioso!"
1300703-17 = "Vamos lá, Sensei, experimente!"
1300703-18 = "[s] Você dá uma garfada no pudim coberto de shoyu."
1300703-19 = "E aí? Realmente tem gosto de ouriço?"
1300703-20 = "[s] \".........Não sei dizer.\""
1300703-21 = "Que estranho, diziam que realmente tinha gosto de ouriço... (nham)"
1300703-22 = "............"
1300703-23 = "É salgado... e doce... e meio estranho..."
1300703-24 = "O que é isso! Onde que isso parece com gosto de ouriço? É completamente diferente!"
1300703-25 = "Uuu... fui enganada por informações falsas..."
1300703-26 = "M-mas tudo bem! Ainda tem muitas receitas para testar!"
1300703-27 = "A próxima é esta!"
1300703-28 = "[s] \"...Abacate?\""
1300703-29 = "Sim, seguindo um princípio parecido, dizem que se você colocar shoyu no abacate e comer, tem gosto de atum!"
1300703-30 = "O abacate também é gorduroso como o atum, então desta vez deve ter um gosto decente, não acha?"
1300703-32 = "Bom, então... vamos comer!"
1300703-34 = ".........Fui enganada."
1300703-35 = "Fui completamente enganada! O que é isso! #nNão tem nada aqui que tenha um gosto decente!"
1300703-36 = "A combinação de abacate com shoyu que diziam ter gosto de atum, a de tangerina com shoyu que diziam ter gosto de ovas... tudo tem um gosto estranho!"
1300703-37 = "Ninguém além da Izumi comeria isso!"
1300703-38 = "Uuu, eu estava esperando poder comer muitos frutos do mar de luxo por um preço acessível..."
1300703-39 = "Hã? Você disse que com o dinheiro que eu gastei nesses ingredientes, dava para comprar frutos do mar de verdade?"
1300703-40 = "Bem... o kit de pudim, o shoyu, o abacate, e a tangerina..."
1300703-42 = "É verdade! Dá o valor de uma refeição em um restaurante de sushi giratório!"
1300703-43 = "Fui enganada de novo! A internet só tem informações falsas! Buááá!"
