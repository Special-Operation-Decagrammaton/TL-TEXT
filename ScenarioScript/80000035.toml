[translation]
80000035-1 = "とにかく準備したので！"
80000035-3 = "まあ、こんなものでしょうか。あとこっちの書類を……。"
80000035-8 = "[ns] \"アコ、この書類どこに置けば良いかな？\""
80000035-9 = "あぁ、それはこちらに。"
80000035-10 = "ふぅ……急に忙しくなってしまったので、助かりました。"
80000035-11 = "こういう時は、猫の手ならぬ先生の手も役に立つものですね。"
80000035-12 = "[s] \"それは何より……。\""
80000035-13 = "何やら不満そうな顔ですが、文句は受け付けませんよ。"
80000035-14 = "ですが、そうですね……仕方ありません。書類を一枚片付けるたびに、ひとつご褒美を差し上げましょう。"
80000035-16 = "[s] \"チョコレートだ、ありがとう。\""
80000035-17 = "では、引き続きお願いいたしますね？"
80000035-21 = "[ns] \"この書類もOK、ここに置いておくね。\""
80000035-22 = "はい。ありがとうございます、ではこれをどうぞ。"
80000035-23 = "[s] \"頂きます。\""
80000035-26 = "ではこちらのチョコを……。"
80000035-30 = "はい、ではこれを……。"
80000035-35 = "お疲れ様です、どうぞ。"
80000035-37 = "（そうやってアコから、書類を渡すたびにチョコレートを貰い続け……）"
80000035-40 = "[ns] \"……もしかしてだけどこのチョコ、アコの手作り？\""
80000035-41 = "なっ！？"
80000035-42 = "い、一体いつからそのことに……！？"
80000035-43 = "[s1] \"最初にチョコをくれたタイミングで。\"\n[s2] \"何となく初めの方から。\""
80000035-44 = "最初から気づいていたのに、知らない振りをしていたと……！？"
80000035-45 = "最初から気づいていたのに、知らない振りをしていたと……！？"
80000035-46 = "ああもう、性格悪いですね！！"
80000035-47 = "[s] \"ごめん、嬉しくって……。\""
80000035-48 = "はぁ……まあ、そんなことはバレても構いません。どうでも良いことですので。"
80000035-49 = "それより……。"
80000035-50 = "せっかくバレたんですから、感想の一つでもくださいね。"
80000035-51 = "それなりにちゃんと作りましたし……。"
80000035-52 = "[s] \"じゃあ、せっかくだしひと休みする？コーヒー淹れてくるから。\""
80000035-56 = "……まあ、良いでしょう。"
80000035-57 = "エスプレッソでお願いします。"
80000035-59 = "（その後もアコから仕事の愚痴を聞きながら、ゆっくりチョコレートとコーヒーを味わった）"
