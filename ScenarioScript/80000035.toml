[translation]
80000035-1 = "De qualquer forma, eu já preparei tudo!"
80000035-3 = "Bem, acho que é isso. E quanto a estes documentos aqui..."
80000035-8 = "[ns] \"Ako, onde devo colocar estes documentos?\""
80000035-9 = "Ah, coloque aqui, por favor."
80000035-10 = "Ufa... as coisas ficaram agitadas de repente, então sua ajuda foi muito bem-vinda."
80000035-11 = "Em momentos assim, até a ajuda do Sensei é útil, não é mesmo?"
80000035-12 = "[s] \"Fico feliz em ajudar...\""
80000035-13 = "Você parece insatisfeito, mas não aceito reclamações."
80000035-14 = "Mas, bem... não tem jeito. Para cada documento que você terminar, eu lhe darei uma recompensa."
80000035-16 = "[s] \"É chocolate, obrigado.\""
80000035-17 = "Então, por favor, continue com o trabalho."
80000035-21 = "[ns] \"Este documento também está pronto, vou deixar aqui.\""
80000035-22 = "Sim. Obrigada. Aqui, pegue isto."
80000035-23 = "[s] \"Obrigado.\""
80000035-26 = "Aqui está o chocolate..."
80000035-30 = "Sim, aqui está..."
80000035-35 = "Bom trabalho, aqui está."
80000035-37 = "(Dessa forma, continuei recebendo chocolates da Ako a cada documento que eu entregava...)"
80000035-40 = "[ns] \"...Por acaso, esses chocolates foram feitos por você, Ako?\""
80000035-41 = "O quê!?"
80000035-42 = "D-desde quando você sabia disso...!?"
80000035-43 = "[s1] \"Desde a primeira vez que você me deu um.\"\n[s2] \"Eu meio que já sabia desde o começo.\""
80000035-44 = "Você sabia desde o início e fingiu que não sabia...!?"
80000035-45 = "Você sabia desde o início e fingiu que não sabia...!?"
80000035-46 = "Ah, chega! Você tem uma personalidade terrível!!"
80000035-47 = "[s] \"Desculpe, é que eu fiquei feliz...\""
80000035-48 = "Haa... bem, não me importo que tenha descoberto. Isso não tem a menor importância."
80000035-49 = "Mas, mudando de assunto..."
80000035-50 = "Já que descobriu, pelo menos me diga o que achou."
80000035-51 = "Eu me esforcei bastante para fazer..."
80000035-52 = "[s] \"Então, que tal fazermos uma pausa? Vou preparar um café.\""
80000035-56 = "...Bem, tudo bem."
80000035-57 = "Um expresso, por favor."
80000035-59 = "(Depois disso, continuei ouvindo as reclamações da Ako sobre o trabalho enquanto saboreávamos o chocolate e o café.)"
