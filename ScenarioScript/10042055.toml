[translation]
10042055-2 = "ねぇジュリ、口に出すか悩んだんだけど……。"
10042055-3 = "その、えっと……。"
10042055-4 = "だ、大丈夫です……話してください。"
10042055-6 = "……よく、ここまで育ったね？"
10042055-7 = "せ、先輩！？"
10042055-8 = "[ns1] \"頭がくらくらする……。\"\n[ns2] \"パンちゃんは成長期だったんだね……。\""
10042055-11 = "たしかに、もう探す必要はありませんね。"
10042055-12 = "ええ、実に興味深いです。"
10042055-13 = "そんなこと言ってる場合！？"
10042055-14 = "……そうですね。"
10042055-15 = "どうやら――"
10042055-16 = "――冗談を言っている場合ではなさそうです。"
