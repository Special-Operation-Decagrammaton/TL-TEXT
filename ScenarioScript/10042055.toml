[translation]
10042055-2 = "Ei, Juri, eu estava em dúvida se deveria dizer isso em voz alta, mas..."
10042055-3 = "Bem, é que..."
10042055-4 = "T-tudo bem... pode falar."
10042055-6 = "...Você cresceu bastante, não é?"
10042055-7 = "S-Senpai!?"
10042055-8 = "[ns1] \"Minha cabeça está girando...\"\n[ns2] \"Então o Pan-chan estava na fase de crescimento...\""
10042055-11 = "De fato, não há mais necessidade de procurar."
10042055-12 = "Sim, é realmente fascinante."
10042055-13 = "É hora de dizer uma coisa dessas!?"
10042055-14 = "...É verdade."
10042055-15 = "Ao que parece—"
10042055-16 = "—não é o momento para piadas."
