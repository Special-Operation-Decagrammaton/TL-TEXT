[translation]
10001050-1 = "第5話;それは昼寝にぴったりの"
10001050-2 = "レッドウィンター連邦学園・旧校舎"
10001050-3 = "ふぁあ……眠い……。"
10001050-4 = "お昼寝の時間まではまだ少し早いですが……もうおねむですか、会長？"
10001050-5 = "さっき甘いのを食べ過ぎたせいか……まぶたが重くて、眠い……。"
10001050-6 = "そういえば、今日は旧校舎まで移動するために長い時間、山道を登りましたからね。お疲れなのも無理はありません。"
10001050-7 = "[s] \"そのうち半分は、私がおんぶしてたけど。\""
10001050-8 = "何を仰っているのですか、先生？いくらおんぶされたままの移動とはいえ、山道は山道です！"
10001050-9 = "ずっと事務局に引きこもってほとんど動こうとしない会長にとって、急な山道なんて激務と同じです。"
10001050-10 = "このまま作戦を進めても支障が出てしまいますし……会長のお疲れが取れるまで、この辺りで休むことにしましょう！"
10001050-12 = "さあ、会長。旧校舎の休憩室で、しばらくお昼寝しましょうか？"
10001050-13 = "この旧校舎で寝るのは嫌だ……熊が出ると言っていたではないか……。"
10001050-14 = "熊が出たら私が追い払いますので、ご心配なさらず！"
10001050-15 = "それに、さっき布団の中に虫がいるって……。"
10001050-16 = "うーん、どうしましょう……会長が安心してお昼寝ができるような場所があれば良いのですが……。"
10001050-17 = "……おいらにいい考えがある。"
10001050-18 = "なんと。どうかそのご意見を。"
10001050-19 = "静かで、適度に暖かくて、ほんのりいい匂いがする。#nそんな昼寝にぴったりの場所、それは……。"
10001050-20 = "図書館だ！"
10001050-21 = "[s] \"図書館？\""
10001050-23 = "トリニティ総合学園の大きな図書館にはやや劣るかもしれないが、我がレッドウィンター連邦学園にも立派な図書館が一つあるのだ。"
10001050-24 = "うるさくする生徒もいないし、適度な明るさで目にも優しいし……"
10001050-25 = "しかも枕にちょうどいい本もいっぱいある、まさに昼寝のための空間だと言っても過言ではない！"
10001050-26 = "おいらも失脚させられる前は、よく昼寝をしに図書館に行っていたものだ！"
10001050-27 = "[s1] \"胸を張って言うことじゃないと思うけど……。\"\n[s2] \"図書館って、良い感じに眠くなるよね。\""
10001050-28 = "安らかに昼寝ができる場所というのは、日々の生活においてかなりの重要事項だぞ、カムラッド！きちんと昼寝をしないと、午後の仕事に影響を及ぼすからな。"
10001050-29 = "だろう？やはりカムラッドなら分かってくれると思っていた！"
10001050-30 = "しかし、この計画には一つ重大な問題があるのだ、カムラッド。"
10001050-31 = "レッドウィンター連邦学園の図書館には、おいらにいちいち反抗してくる、反乱分子がいる！"
10001050-32 = "あいつらは本が好きすぎるあまりに、認可されてない不法な書籍まで手に入れようとする本の虫たちの集まりで、その名も知識……知識……"
10001050-33 = "えっと、なんだっけ？"
10001050-34 = "「知識解放戦線」です。"
10001050-35 = "そう、知識解放戦線！#nやつら、「図書館では本を読むこと以外の行為は許されない」という詭弁を主張して、しょっちゅうおいらの昼寝を邪魔してくるのだ！"
10001050-36 = "あいつらを追い払って、安らかな昼寝場所を確保する。これが今のおいら達の、第一目標だ！"
10001050-37 = "さすがはチェリノ会長！眠さに耐えながらも、事務局を奪還するための計画を立てていたのですね！"
10001050-38 = "ん、え？事務局？おいらは今、昼寝について話していたのだが……。"
10001050-39 = "レッドウィンター連邦学園の図書館といえば、簡単には近づけない丘の上にある、まさに「天然の要塞」！ここを占拠すれば、事務局を攻撃するための拠点として使えるはずです！"
10001050-40 = "それに知識解放戦線は、レッドウィンター連邦学園の中でも3本の指に入るほど生徒数の多い、かなり大きな部活！"
10001050-41 = "彼女たちを味方にできたら、マリナ委員長率いる親衛隊を相手にするのも決して不可能な話ではありません！"
10001050-42 = "こんなに短い時間で、ここまで完璧な戦略を練るだなんて……"
10001050-43 = "さすがはチェリノ会長ですね！"
10001050-44 = "そ、そうか？へへ、えへへ……。"
10001050-45 = "そ、そんなに褒めても何も出ないぞ！今は失脚しているからな！"
10001050-46 = "思い立ったが吉日です。計画も決まりましたし、今すぐ図書館に向かいましょう！"
10001050-47 = "ふぁあ……しょうがないな。"
10001050-48 = "おいらの安らかな昼寝のために、出発だ！"
10001050-50 = "レッドウィンター連邦学園・図書館"
10001050-51 = "えへへ、やっと手に入れました！ルリエル先生の新作「シャル×レイ」の同人誌……！"
10001050-52 = "トリニティの即売会だけでしか手に入らない限定本……"
10001050-53 = "ほとんど諦めていたのに運が良かったです！"
10001050-54 = "ああ……今回の作品では、どんな素敵なストーリーで二人の愛を描いてくださったのでしょうか？"
10001050-55 = "今週末は出かけずに一日中図書館に引きこもって、のんびりこの作品を堪能しなくちゃ。えへへ……。"
10001050-56 = "[s] \"それは素敵な休日だね。\""
10001050-57 = "……え、ええっ！？せ、先生！？それに、チェリノ会長まで？"
10001050-58 = "い、いつからここにいらっしゃったんですか？"
10001050-59 = "結構前からいたぞ。"
10001050-60 = "[s] \"新作の同人誌を手にしたあたりから。\""
10001050-62 = "本当に最初からじゃないですか！？"
10001050-63 = "うう……ところで急に、どうされたんですか？「知識解放戦線」に何かご用でも……。"
10001050-64 = "よくぞ聞いてくれた！"
10001050-65 = "おいらがここに来た理由は――"
10001050-67 = "いえ、聞かなくても分かります。私たち知識解放戦線の大事な蔵書を、押収しに来たんですよね？"
10001050-68 = "いや、本を押収しに来たのではなく――"
10001050-70 = "でも、この本だけはダメです！まだ一読すらできていないのに！"
10001050-71 = "待て、だからおいらがここに来た理由は――"
10001050-72 = "せめて三回は……"
10001050-73 = "いや、十回は熟読させてください！本当に手に入れるの、大変だったんですから！"
10001050-76 = "人の話を聞け！そもそもおいらはその本に興味など無い！"
10001050-77 = "……へ？"
10001050-78 = "それではどうして、こんな遠い図書館までいらっしゃったんですか？"
10001050-79 = "ふふ、おいらがここに来た理由なんて決まっている。"
10001050-80 = "昼寝をしに来たのだ！"
10001050-82 = "……図書館は仮眠室ではないんですよ？"
10001050-83 = "そんなことはいちいち言われなくても分かっている。"
10001050-84 = "どれどれ……。"
10001050-89 = "うむ、ここがよさそうだな！"
10001050-90 = "暖炉にも近くて床も暖かいし、本棚が絶妙に影になってくれて、昼寝に最適な環境になっているではないか！"
10001050-91 = "トモエ、この位置に用意を。"
10001050-93 = "はい、チェリノ会長。すぐに寝床をお作りします。"
10001050-99 = "ま、待ってください！ここに布団を敷いたら、本を読みに来た生徒たちの邪魔になってしまいます！"
10001050-100 = "しかも、これから昼寝すると言った直後に、なぜ本棚を漁っているのですか！"
10001050-101 = "そんなの、枕にちょうどいい分厚い本を探しているに決まっているだろう。"
10001050-102 = "ふむ……どれどれ。首をしっかり支えてくれそうな分厚い本は、と……。"
10001050-103 = "おお、『バスティーユの薔薇～30周年限定エディション～』。これが良さそうだ！"
10001050-104 = "ま、ま、待ってください！その本は絶対にダメです！"
10001050-105 = "その本は100冊しか出回ってなくて、もうレッドウィンター連邦学園ではもちろん、キヴォトスのどこでも手に入れることができない、本当に希少な本なんですよ！"
10001050-106 = "単に分厚い本が必要なら、こっちの百科事典を使えばいいじゃないですか？"
10001050-107 = "嫌だ、それは固すぎる。"
10001050-108 = "こっちの方が、表紙が革の装丁になっててフカフカで、枕にちょうど良さそうだ。"
10001050-109 = "いったいどうしてさっきから、この図書館にこだわるんですか！フカフカな寝具が必要なら、事務局でお休みになればいいじゃないですか！"
10001050-110 = "それは無理な相談だ。"
10001050-111 = "それはまたどうして！"
10001050-112 = "おいらは今事務局から追い出されて、マリナ委員長に追われてる立場だからな。"
10001050-113 = "呑気に事務局で昼寝などできない。"
10001050-114 = "はい？チェリノ会長、また失脚されたんですか？"
10001050-115 = "[s] \"……また？\""
10001050-116 = "レッドウィンター連邦学園では、会長の座を狙ってる生徒たちが頻繁にクーデターを起こしていて……チェリノ会長はしょっちゅう失脚させられているんです。"
10001050-117 = "はい、今月に入ってのクーデターはもう三回目ですね。"
10001050-118 = "ですが、今回はまさかあのマリナ委員長に追われてるなんて……それはちょっと大変そうですね。"
10001050-119 = "そう、まったくもってその通りなんだ。だから今日は静かに昼寝をさせてくれ。ふぁあ……。"
10001050-125 = "だからその本はダメですってば！"
10001050-126 = "本の価値も分からない方に、貴重な蔵書は渡せません！"
10001050-127 = "ううっ！なんでそんなに頑固なんだ！おいらが枕にしたからって、本が減ってなくなるわけじゃないだろう！"
10001050-128 = "減ります！限定版の価値とか、他にも色んな貴重なものが！"
10001050-129 = "そういうことなら……"
10001050-130 = "実力行使で奪わせてもらうとしようか！"
10001050-132 = "ふん、だ。そう仰っても、親衛隊もいない、今はただの逃亡者に過ぎないチェリノ会長なんてちっとも怖くありません！"
10001050-133 = "さあ、知識解放戦線の皆さん。知識を得る自由と、私たちの蔵書を守るために……"
10001050-134 = "戦いましょう！"
