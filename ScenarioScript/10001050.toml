[translation]
10001050-1 = "Episódio 5: O lugar perfeito para uma soneca"
10001050-2 = "Academia Federal Red Winter - Antigo Prédio Escolar"
10001050-3 = "Ahhh... que sono..."
10001050-4 = "Ainda é um pouco cedo para a hora da soneca, mas... já está com sono, Presidente?"
10001050-5 = "Talvez seja porque comi muitos doces agora há pouco... minhas pálpebras estão pesadas, estou com sono..."
10001050-6 = "Pensando bem, hoje subimos a trilha da montanha por muito tempo para chegar ao antigo prédio escolar. Não é de se estranhar que esteja cansada."
10001050-7 = "[s] \"Metade desse tempo, eu que te carreguei nas costas, aliás.\""
10001050-8 = "O que está dizendo, Sensei? Mesmo que tenha sido carregada, uma trilha de montanha ainda é uma trilha de montanha!"
10001050-9 = "Para a Presidente, que vive trancada na secretaria e quase não se move, uma trilha íngreme é o mesmo que um trabalho exaustivo."
10001050-10 = "Se continuarmos com a operação assim, teremos problemas... vamos descansar por aqui até que a Presidente recupere as energias!"
10001050-12 = "Vamos lá, Presidente. Que tal tirarmos uma soneca na sala de descanso do antigo prédio escolar?"
10001050-13 = "Não quero dormir neste prédio antigo... você disse que aparecem ursos aqui..."
10001050-14 = "Se um urso aparecer, eu o espantarei, então não se preocupe!"
10001050-15 = "Além disso, você disse que tinha insetos dentro do futon..."
10001050-16 = "Hmm, o que faremos... seria bom se houvesse um lugar onde a Presidente pudesse tirar uma soneca com tranquilidade..."
10001050-17 = "...Eu tenho uma boa ideia."
10001050-18 = "Ora. Por favor, compartilhe sua opinião."
10001050-19 = "Silencioso, moderadamente quente e com um cheirinho agradável. #nEsse lugar perfeito para uma soneca é..."
10001050-20 = "A biblioteca!"
10001050-21 = "[s] \"A biblioteca?\""
10001050-23 = "Pode ser um pouco inferior à grande biblioteca da Academia Trinity, mas nossa Academia Federal Red Winter também tem uma biblioteca magnífica."
10001050-24 = "Não há alunos fazendo barulho, a iluminação é adequada e agradável aos olhos..."
10001050-25 = "E ainda tem muitos livros que servem perfeitamente como travesseiro, não é exagero dizer que é um espaço feito para tirar uma soneca!"
10001050-26 = "Eu mesma, antes de ser deposta, costumava ir à biblioteca para tirar sonecas!"
10001050-27 = "[s1] \"Não acho que seja algo para se orgulhar...\"\n[s2] \"Bibliotecas dão um sono muito bom, né?\""
10001050-28 = "Um lugar onde se pode tirar uma soneca em paz é um item de extrema importância na vida cotidiana, camarada! Se não tirar uma soneca adequada, isso afetará o trabalho da tarde."
10001050-29 = "Não é? Eu sabia que você entenderia, camarada!"
10001050-30 = "No entanto, este plano tem um problema grave, camarada."
10001050-31 = "Na biblioteca da Academia Federal Red Winter, existem elementos rebeldes que vivem me desafiando!"
10001050-32 = "Eles gostam tanto de livros que tentam colocar as mãos até em publicações ilegais não autorizadas, são um bando de devoradores de livros, o nome deles é Conhecimento... Conhecimento..."
10001050-33 = "Hum, como era mesmo?"
10001050-34 = "É a \"Frente de Libertação do Conhecimento\"."
10001050-35 = "Isso, Frente de Libertação do Conhecimento! #nEles usam o sofisma de que \"na biblioteca não é permitido fazer nada além de ler livros\" e vivem atrapalhando minhas sonecas!"
10001050-36 = "Expulsá-los e garantir um lugar tranquilo para dormir. Esse é o nosso primeiro objetivo agora!"
10001050-37 = "Como esperado da Presidente Cherino! Mesmo resistindo ao sono, você já estava traçando um plano para retomar a secretaria!"
10001050-38 = "Hã, o quê? Secretaria? Eu estava falando sobre tirar uma soneca..."
10001050-39 = "Falando na biblioteca da Academia Federal Red Winter, ela fica no topo de uma colina de difícil acesso, é uma verdadeira \"fortaleza natural\"! Se a ocuparmos, poderemos usá-la como base para atacar a secretaria!"
10001050-40 = "Além disso, a Frente de Libertação do Conhecimento é um dos três maiores clubes da Academia Federal Red Winter em número de alunos!"
10001050-41 = "Se conseguirmos tê-las como aliadas, enfrentar a guarda pessoal liderada pela Comissária Marina não será algo impossível!"
10001050-42 = "Elaborar uma estratégia tão perfeita em tão pouco tempo..."
10001050-43 = "Como esperado da Presidente Cherino!"
10001050-44 = "É, é mesmo? Hehe, ehehe..."
10001050-45 = "N-não adianta me elogiar tanto! Afinal, estou deposta agora!"
10001050-46 = "Não há tempo a perder. O plano está decidido, vamos para a biblioteca agora mesmo!"
10001050-47 = "Ahhh... não tem jeito."
10001050-48 = "Pela minha soneca tranquila, vamos partir!"
10001050-50 = "Academia Federal Red Winter - Biblioteca"
10001050-51 = "Ehehe, finalmente consegui! O novo doujinshi de \"Char x Rei\" da professora Ruriel...!"
10001050-52 = "Um livro limitado que só pode ser obtido no evento de vendas da Trinity..."
10001050-53 = "Eu quase tinha desistido, que sorte a minha!"
10001050-54 = "Ah... que tipo de história maravilhosa será que usaram para retratar o amor dos dois nesta obra?"
10001050-55 = "Não vou sair neste fim de semana, vou me trancar na biblioteca o dia todo para aproveitar essa obra com calma. Ehehe..."
10001050-56 = "[s] \"Esse parece um ótimo feriado.\""
10001050-57 = "…E-eh!? P-Sensei!? E a Presidente Cherino também?"
10001050-58 = "D-desde quando vocês estão aqui?"
10001050-59 = "Estamos aqui faz um bom tempo."
10001050-60 = "[s] \"Desde que você pegou esse novo doujinshi.\""
10001050-62 = "Então vocês estão aqui desde o começo!?"
10001050-63 = "Ugh... mas afinal, por que vieram aqui de repente? Precisam de algo da \"Frente de Libertação do Conhecimento\"...?"
10001050-64 = "Que bom que perguntou!"
10001050-65 = "O motivo de eu ter vindo aqui é—"
10001050-67 = "Não, eu já sei mesmo sem perguntar. Vieram confiscar nosso precioso acervo da Frente de Libertação do Conhecimento, não é?"
10001050-68 = "Não, não viemos confiscar livros—"
10001050-70 = "Mas, este livro aqui não! Eu nem sequer li uma vez ainda!"
10001050-71 = "Espere, eu disse que o motivo de eu ter vindo aqui é—"
10001050-72 = "Pelo menos umas três vezes..."
10001050-73 = "Não, me deixe ler pelo menos dez vezes! Foi muito difícil conseguir este exemplar!"
10001050-76 = "Escute quando alguém estiver falando! Para começar, eu não tenho interesse nenhum nesse livro!"
10001050-77 = "…Hã?"
10001050-78 = "Então por que vieram até uma biblioteca tão distante?"
10001050-79 = "Fufu, o motivo de eu ter vindo aqui é óbvio."
10001050-80 = "Vim tirar uma soneca!"
10001050-82 = "…A biblioteca não é um dormitório, sabia?"
10001050-83 = "Eu sei disso sem que precisem me dizer."
10001050-84 = "Vejamos..."
10001050-89 = "Hum, aqui parece ser um bom lugar!"
10001050-90 = "Perto da lareira, o chão está quentinho, e a estante faz uma sombra perfeita. É o ambiente ideal para uma soneca!"
10001050-91 = "Tomoe, prepare tudo nesta posição."
10001050-93 = "Sim, Presidente Cherino. Vou preparar sua cama imediatamente."
10001050-99 = "E-espere! Se colocar um futon aqui, vai atrapalhar os alunos que vieram ler!"
10001050-100 = "E além disso, por que está mexendo na estante logo depois de dizer que ia tirar uma soneca?"
10001050-101 = "Ora, é óbvio que estou procurando um livro grosso o suficiente para servir de travesseiro."
10001050-102 = "Hum... vejamos. Um livro grosso que sustente bem o pescoço..."
10001050-103 = "Oh, \"A Rosa da Bastilha ~Edição Limitada de 30 Anos~\". Este parece perfeito!"
10001050-104 = "E-e-espere! Esse livro não, de jeito nenhum!"
10001050-105 = "Só foram impressas 100 cópias dele, e não é possível encontrá-lo em lugar nenhum de Kivotos, nem mesmo na Academia Red Winter! É um livro raríssimo!"
10001050-106 = "Se só precisa de um livro grosso, por que não usa esta enciclopédia?"
10001050-107 = "Não quero, é dura demais."
10001050-108 = "Esta aqui tem uma capa de couro, é bem macia e parece perfeita para um travesseiro."
10001050-109 = "Por que você insiste tanto nesta biblioteca? Se precisa de algo macio para dormir, por que não descansa no escritório administrativo?"
10001050-110 = "Isso é impossível."
10001050-111 = "E por que seria?!"
10001050-112 = "Porque fui expulsa do escritório e estou sendo perseguida pela Comissária Marina."
10001050-113 = "Não posso tirar uma soneca tranquila lá."
10001050-114 = "Hã? Presidente Cherino, você foi deposta de novo?"
10001050-115 = "[s] \"...De novo?\""
10001050-116 = "Na Academia Red Winter, os alunos que cobiçam o cargo de presidente vivem fazendo golpes de estado... e a Presidente Cherino é deposta com frequência."
10001050-117 = "Sim, este já é o terceiro golpe só este mês."
10001050-118 = "Mas, ser perseguida pela própria Comissária Marina... isso parece um pouco sério."
10001050-119 = "Sim, é exatamente isso. Por isso, me deixe tirar uma soneca em paz hoje. Bocejo..."
10001050-125 = "Eu já disse que esse livro não pode!"
10001050-126 = "Não posso entregar livros valiosos para alguém que não entende o valor deles!"
10001050-127 = "Ugh! Por que você é tão teimosa?! Só porque eu usei como travesseiro, não significa que o livro vai sumir ou diminuir!"
10001050-128 = "Ele diminui, sim! O valor de uma edição limitada e várias outras coisas preciosas!"
10001050-129 = "Se é assim, então..."
10001050-130 = "Acho que vou ter que usar a força para tomar de você!"
10001050-132 = "Hmph. Mesmo dizendo isso, a Presidente Cherino, que não tem sua guarda pessoal e agora não passa de uma fugitiva, não me assusta nem um pouco!"
10001050-133 = "Vamos lá, pessoal da Frente de Libertação do Conhecimento. Pela liberdade de obter conhecimento e para proteger nosso acervo..."
10001050-134 = "Vamos lutar!"
