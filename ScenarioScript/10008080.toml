[translation]
10008080-1 = "第8話;危機一髪（2）"
10008080-8 = "[ns] \"……多いね。\""
10008080-9 = "うーん、このままだとキリがなさそうだけど……"
10008080-10 = "アルちゃん、どうする？"
10008080-11 = "あ、アル様……！"
10008080-12 = "ちょっ、これ多過ぎない！？"
10008080-13 = "どうしろって言うのよ！？"
10008080-15 = "ははっ！"
10008080-16 = "我々「黒亀組」を甘く見てもらっては困る。"
10008080-26 = "ひゃぁぁっ！？"
10008080-27 = "ちょっと、マズくない！？"
10008080-28 = "……っ。"
10008080-36 = "ふむ、そろそろ終わりそうですね。"
10008080-37 = "ボス、大変です！いつの間に、カイテンジャーが全員逃走してしまいました！"
10008080-38 = "……放っておきなさい。賽銭箱は取り戻しましたし、構いません。"
10008080-39 = "それに、未だに「カイテンジャーが賽銭箱を持っている」と思っているバカ共が、勝手に追いかけてくれるでしょう。"
10008080-40 = "その間に私たちは、予定通りに事を進めれば良いだけです。あとは、ここに倒れてる愚かな方々を……"
10008080-41 = "[s] \"……こんなことをしたって、すぐにバレるよ。\""
10008080-42 = "……そうですね、いつかはバレるでしょう。しかし、その前に逃げてしまえば良いだけの話。そうは思いませんか？"
10008080-43 = "ここで正体がバレたところで、他の地域に行ってやり直せば良いのです。"
10008080-44 = "次はどこにしましょう？百鬼夜行？ワイルドハント？"
10008080-45 = "純粋なお嬢さんでいっぱいの、トリニティも悪くありませんね？"
10008080-47 = "くふふっ、ずいぶん自信満々じゃん？"
10008080-48 = "それはそうですよ。あなたたちのように、SNSで広がった「願い事が叶う場所」なんて文言を信じてくれるバカたちが、この世には溢れているのですから。"
10008080-49 = "……っ！"
10008080-50 = "そんなバカが減らない限り、何も怖くなどありませんねぇ。はっはっはっはっは！"
10008080-51 = "ボス、賽銭箱は車に積みました！"
10008080-52 = "では、行くとしましょうか。朝を迎える前に色々と終わらせないといけませんからね。"
10008080-53 = "ちょ、ちょっと！！"
10008080-54 = "では、後片付けは頼みましたよ。"
10008080-55 = "それでは。恨むならどうか、こんな美味しい話に易々と首を突っ込んだ自分たちを恨まれますように。"
10008080-62 = "命令だ、悪く思うなよ。"
10008080-63 = "調子に乗って深入りするからだ！"
10008080-64 = "さて、どうやって料理してやろうか……！"
10008080-66 = "ど、どどどどうすれば……！？"
10008080-67 = "あははっ！もしかしてピンチって感じ？"
10008080-68 = "せ、先生……！"
10008080-75 = "[ns1] \"………！\"\n[ns2] \"落ち着いて、大丈夫。\""
10008080-76 = "……先生？何を――"
10008080-77 = "……先生？何を――"
10008080-82 = "な、何者だ！？"
10008080-83 = "何者、ねぇ……。"
10008080-85 = "この声……！"
10008080-90 = "強いて答えるなら……大事な後輩とその他諸々を助けに来た、「ヒーロー」ってところかな～？"
10008080-91 = "[s] \"ホシノ！\""
10008080-92 = "先生にも年明け早々会えて、おじさんは嬉しいなぁ。"
10008080-96 = "さて、じゃあ挨拶の前に……とりあえず、邪魔者には退いてもらおっか？"
