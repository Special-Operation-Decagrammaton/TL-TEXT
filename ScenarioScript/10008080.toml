[translation]
10008080-1 = "Episódio 8; Por um Triz (2)"
10008080-8 = "[ns] \"……Tem muita gente, né.\""
10008080-9 = "Hum, desse jeito não vai ter fim..."
10008080-10 = "Aru-chan, o que a gente faz?"
10008080-11 = "A-Aru-sama...!"
10008080-12 = "Ei, não tem gente demais aqui!?"
10008080-13 = "O que você quer que eu faça!?"
10008080-15 = "Haha!"
10008080-16 = "Seria um erro subestimar o nosso grupo, a \"Kurokame-gumi\"."
10008080-26 = "Kyaaa!?"
10008080-27 = "Ei, isso não é ruim!?"
10008080-28 = "……."
10008080-36 = "Hum, parece que está quase acabando."
10008080-37 = "Chefe, é uma emergência! De repente, todos os Kaitengers fugiram!"
10008080-38 = "……Deixe-os. Já recuperamos a caixa de ofertas, não importa."
10008080-39 = "Além disso, os idiotas que ainda acham que os \"Kaitengers estão com a caixa de ofertas\" vão persegui-los por conta própria."
10008080-40 = "Enquanto isso, só precisamos seguir com o plano como planejado. Agora, quanto a esses tolos caídos aqui..."
10008080-41 = "[s] \"……Mesmo fazendo isso, logo vão descobrir.\""
10008080-42 = "……É verdade, uma hora vão descobrir. Mas basta fugir antes disso. Não concorda?"
10008080-43 = "Mesmo que nossa identidade seja revelada aqui, podemos apenas ir para outra região e recomeçar."
10008080-44 = "Para onde devemos ir agora? Hyakkiyako? Wild Hunt?"
10008080-45 = "Trinity, cheia de garotas ingênuas, também não seria uma má ideia, não é?"
10008080-47 = "Kufufu, você está bem confiante, hein?"
10008080-48 = "É claro que estou. O mundo está cheio de idiotas como vocês, que acreditam em frases espalhadas pelas redes sociais sobre um \"lugar onde desejos se realizam\"."
10008080-49 = "……!"
10008080-50 = "Enquanto esses idiotas não diminuírem, não tenho nada a temer. Hahahaha!"
10008080-51 = "Chefe, a caixa de ofertas já está no carro!"
10008080-52 = "Então, vamos indo. Temos muitas coisas para terminar antes do amanhecer."
10008080-53 = "Ei, espere aí!!"
10008080-54 = "Bem, deixo a limpeza com vocês."
10008080-55 = "Até mais. Se quiserem culpar alguém, culpem a si mesmos por terem se metido tão facilmente em uma história tão boa."
10008080-62 = "É uma ordem, não leve para o lado pessoal."
10008080-63 = "É isso que dá se empolgar e se meter onde não deve!"
10008080-64 = "Bem, como vamos lidar com vocês...!"
10008080-66 = "O-o-o-o que a gente faz...!?"
10008080-67 = "Ahaha! Será que estamos em apuros?"
10008080-68 = "Se-Sensei...!"
10008080-75 = "[ns1] \"………!\"\n[ns2] \"Fiquem calmos, está tudo bem.\""
10008080-76 = "……Sensei? O que você está—"
10008080-77 = "……Sensei? O que você está—"
10008080-82 = "Q-quem é você!?"
10008080-83 = "Quem sou eu, é..."
10008080-85 = "Essa voz...!"
10008080-90 = "Se eu tivesse que responder... diria que sou uma \"heroína\" que veio salvar uma kouhai importante e o resto do pessoal, sabe?"
10008080-91 = "[s] \"Hoshino!\""
10008080-92 = "Fico feliz em ver o Sensei logo no início do ano."
10008080-96 = "Bem, antes das apresentações... que tal a gente tirar esses estorvos do caminho primeiro?"
