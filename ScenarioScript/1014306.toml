[translation]
1014306-1 = "水遊びの引率"
1014306-4 = "こんにちは、先生。#n今日は子供たちのためにお時間を作っていただき、ありがとうございます。"
1014306-5 = "みなさん？先生にご挨拶しましょうね。"
1014306-7 = "よろしくお願いします、先生！"
1014306-9 = "[ns] \"よろしくね！\""
1014306-11 = "（シュンと共に、引率を始めた！）"
1014306-18 = "さあ、みなさん。一人ずつプールに入りましょうね。"
1014306-22 = "……あら、どうしました？次はあなたの番ですよ？"
1014306-23 = "[ns] \"具合が悪いの？\""
1014306-25 = "だって……水怖いもん。プールに入るの、いや。"
1014306-26 = "そうだったんですね……。#nでも……水とお友達になれたら、プールはとても楽しいですよ？"
1014306-27 = "私もお手伝いするので、チャレンジしてみましょう？"
1014306-29 = "うん……分かった……。"
1014306-31 = "これでもくらえー！"
1014306-32 = "冷たっ！もう……お返しっ！"
1014306-36 = "さあ……ここは浅いですから、大丈夫ですよ。"
1014306-37 = "私がちゃんと掴んでいてあげますからね。"
1014306-39 = "ほんと？ぜったいだよ……？"
1014306-43 = "（子供はシュンの手を握り、ゆっくりとプールの中を歩き始めた）"
1014306-44 = "（それでもまだ水が怖いようだ……）"
1014306-46 = "[ns] \"ねぇ、このビート板を両手でしっかり掴んでみてくれる？\""
1014306-47 = "先生……？"
1014306-51 = "こう？"
1014306-52 = "[ns] \"上手にできてるよ！そしたら、ほらっ……！\""
1014306-54 = "せ、先生！？！？"
1014306-56 = "（ビート板を引っ張って、勢いよく水面を滑らせてあげた）"
1014306-61 = "わああああああ！？"
1014306-62 = "だ、大丈夫！？"
1014306-64 = "さ、さいこー！"
1014306-65 = "えっ……？"
1014306-66 = "[ns] \"楽しいでしょう！？次はこうだよ！\""
1014306-72 = "すっごく楽しい！！！"
1014306-74 = "……。"
1014306-75 = "怖いものを……怖くないものではなく、楽しいものにしてあげるなんて……。"
1014306-76 = "さすがは先生です。ふふっ。"
1014306-78 = "子供たちがウォータースライダーをやりたいと言うので来たのですが……。#nどうやらみなさん身長が足りないみたいで……。"
1014306-82 = "さあ、みんな。ウォータースライダーはまだ危ないから、#n他のアトラクションで遊ぼうね。"
1014306-85 = "ええー！これやりたい！"
1014306-86 = "私も、もう水怖くないよ！"
1014306-87 = "[ns] \"残念だけど、決まりだから仕方ないね……。\""
1014306-88 = "じゃあ、先生とシュン教官がやってみて！"
1014306-90 = "えっ！？"
1014306-92 = "そうだ！先生とシュン教官はできるんでしょ！どんなのか見てみたい！"
1014306-94 = "せ、先生……？"
1014306-95 = "[ns] \"いいね、やってみようか！\""
1014306-96 = "えぇ……！？"
1014306-97 = "わ、私もですか……？"
1014306-102 = "あのー、先生と一緒にっていうのは……。"
1014306-104 = "すみません、一人ずつお願いします！"
1014306-105 = "ですよね！"
1014306-107 = "[ns] \"いやっほー！！！\""
1014306-109 = "（ウォータースライダーを楽しんだ！）"
1014306-115 = "（大人も十分に満足できるコースだった！）"
1014306-117 = "きゃあああぁぁぁっ！？"
1014306-118 = "[ns] \"シュン！？\""
1014306-120 = "た、助けてください！！！"
1014306-126 = "はあ、はあ、はあっ……ありがとうございます、先生……。"
1014306-127 = "……。"
1014306-128 = "ええ。実を言うと、このようなものは苦手で……。"
1014306-129 = "た、たしかに……正直に言えば良かったのですが……。"
1014306-130 = "子供たちも見ていたので、つい……。"
1014306-132 = "わあ！シュン教官と先生が抱き合ってる！"
1014306-134 = "[ns] \"！？！？\""
1014306-139 = "あれは、吊り橋効果みたいなものだね。"
1014306-144 = "緊張時のドキドキを、他の感情と勘違いするというものなんだけど……。"
1014306-145 = "シュン教官なら、それを利用してもおかしくはない……か。"
1014306-146 = "！！？？"
1014306-148 = "君の話は、たまに理解できないよ……。"
1014306-149 = "す、すす、すみません！先生！"
1014306-150 = "[s] \"全然大丈夫だよ！\""
1014306-152 = "みなさん、ここが波のプールですよ。"
1014306-153 = "まるで本物の海みたいに波が来るんです。"
1014306-154 = "今は小さな波が続いていますが、後ですごく大きな波が来ます。"
1014306-155 = "そのときは放送案内がありますから、よく聞いていてくださいね。"
1014306-159 = "みなさん！大変です！"
1014306-160 = "非常に大きな波が近づいています！気をつけてお楽しみください！"
1014306-161 = "当ウォーターパークの波の高さは最大2.4メートルなので……。#n十分にご注意ください！"
1014306-162 = "おっきな波が来るって！"
1014306-166 = "あはははは！"
1014306-168 = "見て！波乗りできた！"
1014306-169 = "みなさん、くれぐれも気を付けてくださいね！"
1014306-171 = "先生！シュン教官！お腹が空きました！"
1014306-172 = "たこ焼き食べたいです！ホットドッグも！"
1014306-173 = "[ns] \"順番に買ってあげるから！\""
1014306-175 = "みなさん。ちゃんと並んで、いい子で待っていましょうね？"
1014306-180 = "シュン教官も先生も、今日は本当にお疲れさまでした。"
1014306-181 = "こうして時間を作ってくださった先生には、何とお礼を申し上げたらいいのか……。"
1014306-182 = "[s] \"このくらい、お安い御用ですよ。\""
1014306-183 = "いえ、先生には本当に感謝しています……。"
1014306-184 = "一日中子供たちの面倒を見ていて、ご自身はほとんど楽しめませんでしたよね……。"
1014306-185 = "では、ここからは私たちで引率するので。"
1014306-186 = "みなさ～ん？[ruby=せんがいきょう]山海経[/ruby]に戻る時間ですよ～"
1014306-188 = "ええー……。もっと遊びたいのに……。"
1014306-189 = "わがまま言っちゃダメですよ。みなさんは、時間を守れる良い子ですよね？"
1014306-191 = "はーい。"
1014306-194 = "……。"
1014306-195 = "一日があっという間でしたね。"
1014306-196 = "[s] \"シュンもお疲れさま。\""
1014306-197 = "いえ、私はいつものことですから。"
1014306-198 = "あの、先生。"
1014306-199 = "先ほど、ふと思いついたんですが……。"
1014306-204 = "少しだけでいいので……これからこっそり、遊びま……せんか？"
1014306-205 = "[ns] \"……！\""
1014306-207 = "[ns] \"遊ぼう！\""
1014306-208 = "はい♡"
1014306-210 = "（そうしてシュンと一緒に、思い切り楽しんだ）"
1014306-211 = "（楽しみ過ぎたあまり、終電を逃しそうになった……）"
