[translation]
1014306-1 = "Chaperoning at the Water Park"
1014306-4 = "Hello, Sensei. #nThank you for making time for the children today."
1014306-5 = "Everyone? Let's greet Sensei."
1014306-7 = "It's a pleasure to have you, Sensei!"
1014306-9 = "[ns] \"Nice to meet you all!\""
1014306-11 = "（Together with Shun, the chaperoning began!）"
1014306-18 = "Alright, everyone. Let's enter the pool one by one."
1014306-22 = "……Oh, what's wrong? It's your turn next, you know?"
1014306-23 = "[ns] \"Are you feeling unwell?\""
1014306-25 = "Because... I'm scared of the water. I don't want to go in the pool."
1014306-26 = "I see... #nBut... if you can make friends with the water, the pool is actually a lot of fun, you know?"
1014306-27 = "I'll help you, so why don't we give it a try?"
1014306-29 = "Okay... I understand..."
1014306-31 = "Take this!"
1014306-32 = "Cold! Hey... take this back!"
1014306-36 = "Now... it's shallow here, so you'll be fine."
1014306-37 = "I'll hold onto you properly, okay?"
1014306-39 = "Really? You promise...?"
1014306-43 = "（The child grabbed Shun's hand and began to walk slowly into the pool）"
1014306-44 = "（They still seem scared of the water, though...）"
1014306-46 = "[ns] \"Hey, could you try holding this kickboard firmly with both hands?\""
1014306-47 = "Sensei...?"
1014306-51 = "Like this?"
1014306-52 = "[ns] \"You're doing great! Now, watch this...!\""
1014306-54 = "Se, Sensei！？！？"
1014306-56 = "（I pulled the kickboard and let it glide across the water surface with momentum）"
1014306-61 = "Waaaaaaaah！？"
1014306-62 = "A, are you okay!?"
1014306-64 = "Th, that was awesome!"
1014306-65 = "Eh...?"
1014306-66 = "[ns] \"Isn't it fun!? Now, try this!\""
1014306-72 = "It's super fun!!!"
1014306-74 = "……."
1014306-75 = "To take something scary... and turn it not just into something not scary, but something fun..."
1014306-76 = "As expected of Sensei. Fufu."
1014306-78 = "We came because the children wanted to go on the water slide... #nbut it seems they aren't tall enough..."
1014306-82 = "Alright, everyone. The water slide is still dangerous, so #nlet's go play on other attractions."
1014306-85 = "Nooo! I want to do this one!"
1014306-86 = "Me too, I'm not scared of the water anymore!"
1014306-87 = "[ns] \"I'm sorry, but rules are rules...\""
1014306-88 = "Then, Sensei and Instructor Shun should do it!"
1014306-90 = "Eh!?"
1014306-92 = "That's right! Sensei and Instructor Shun can do it, right! We want to see what it's like!"
1014306-94 = "Se, Sensei...?"
1014306-95 = "[ns] \"Sounds good, let's do it!\""
1014306-96 = "Eh...!?"
1014306-97 = "A, am I doing it too...?"
1014306-102 = "Um, about doing it together with Sensei..."
1014306-104 = "I'm sorry, please go one at a time!"
1014306-105 = "Right, of course!"
1014306-107 = "[ns] \"Yippee!!!\""
1014306-109 = "（Enjoyed the water slide!）"
1014306-115 = "（It was a course that even adults could fully enjoy!）"
1014306-117 = "Kyaaaaaaa!?"
1014306-118 = "[ns] \"Shun!?\""
1014306-120 = "H, help me!!!"
1014306-126 = "Haa, haa, haa... Thank you, Sensei..."
1014306-127 = "……."
1014306-128 = "Yes. To tell you the truth, I'm not very good with things like this..."
1014306-129 = "I, it's true... I should have been honest about it..."
1014306-130 = "But the children were watching, so I just..."
1014306-132 = "Wow! Instructor Shun and Sensei are hugging!"
1014306-134 = "[ns] \"！？！？\""
1014306-139 = "That's like the suspension bridge effect."
1014306-144 = "It's when you mistake the heart-pounding feeling of nervousness for other emotions..."
1014306-145 = "If it's Instructor Shun, it wouldn't be strange for her to take advantage of that..."
1014306-146 = "！！？？"
1014306-148 = "Sometimes I can't understand what you're saying..."
1014306-149 = "I, I, I'm sorry! Sensei!"
1014306-150 = "[s] \"It's totally fine!\""
1014306-152 = "Everyone, this is the wave pool."
1014306-153 = "Waves come just like the real ocean."
1014306-154 = "Small waves are continuing now, but a very large wave will come later."
1014306-155 = "There will be an announcement when that happens, so please listen carefully."
1014306-159 = "Everyone! It's an emergency!"
1014306-160 = "A very large wave is approaching! Please be careful and enjoy!"
1014306-161 = "The maximum wave height at this water park is 2.4 meters... #nplease be very careful!"
1014306-162 = "They said a big wave is coming!"
1014306-166 = "Ahahahaha!"
1014306-168 = "Look! I was able to surf the wave!"
1014306-169 = "Everyone, please be very careful!"
1014306-171 = "Sensei! Instructor Shun! We're hungry!"
1014306-172 = "We want to eat takoyaki! And hot dogs too!"
1014306-173 = "[ns] \"I'll buy them for you in order!\""
1014306-175 = "Everyone. Let's line up properly and wait like good children, okay?"
1014306-180 = "Instructor Shun and Sensei, thank you very much for your hard work today."
1014306-181 = "I don't know how to thank you enough for making time like this, Sensei..."
1014306-182 = "[s] \"It's no trouble at all.\""
1014306-183 = "No, I am truly grateful to you, Sensei..."
1014306-184 = "You spent the whole day looking after the children, and you barely got to enjoy yourself..."
1014306-185 = "Well then, we will take over chaperoning from here."
1014306-186 = "Everyone~? It's time to go back to Shanhaijing~"
1014306-188 = "Nooo... We want to play more..."
1014306-189 = "You shouldn't be selfish. You're all good children who can keep track of time, right?"
1014306-191 = "Okay~"
1014306-194 = "……."
1014306-195 = "The day went by in a flash."
1014306-196 = "[s] \"Good work today, Shun.\""
1014306-197 = "No, this is just my usual routine."
1014306-198 = "Um, Sensei."
1014306-199 = "I just had a thought a moment ago..."
1014306-204 = "It only needs to be for a little while... would you like to... play with me in secret?"
1014306-205 = "[ns] \"……！\""
1014306-207 = "[ns] \"Let's play!\""
1014306-208 = "Yes♡"
1014306-210 = "（And so, I enjoyed myself to the fullest with Shun）"
1014306-211 = "（We had so much fun that we almost missed the last train...）"