[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
1014306-1 = "Acompanhante no Parque Aquático"
1014306-4 = "Olá, Sensei.#nObrigada por tirar um tempinho na sua agenda lotada para as crianças hoje."
1014306-5 = "Crianças? Vamos cumprimentar o Sensei."
1014306-7 = "Muito prazer, Sensei!"
1014306-9 = "[ns] \"O prazer é todo meu!\""
1014306-11 = "(Comecei a atuar como acompanhante das crianças junto com a Shun!)"
1014306-18 = "Certo, meninas. Vamos entrar na piscina uma de cada vez, sem correr, tá bom?"
1014306-22 = "......Ara, o que foi? É a sua vez de entrar agora, sabia?"
1014306-23 = "[ns] \"Você não está se sentindo bem?\""
1014306-25 = "É que... Eu tenho medo da água. Eu não quero entrar na piscina."
1014306-26 = "Ah, então é isso...#nMas sabe... Se você fizer amizade com a água, nadar na piscina fica super divertido."
1014306-27 = "A instrutora Shun vai segurar a sua mãozinha e te ajudar em tudo, então o que acha da gente tentar pelo menos um pouquinho?"
1014306-29 = "Uhum... tá bom..."
1014306-31 = "Sente só o poder da água gelada no rosto!"
1014306-32 = "Nossa, que frio! Eeeeei... agora você vai ver, toma isso de volta!"
1014306-36 = "Vem, pode vir... A água aqui bate no joelho, então não tem com o que se preocupar."
1014306-37 = "Eu vou te segurar bem firme pelos bracinhos."
1014306-39 = "Sério? Você não vai soltar mesmo...?"
1014306-43 = "(A garotinha se segurou forte na Shun e foi colocando o pezinho na piscina com bastante receio)"
1014306-44 = "(Ela continua com os olhos fechados de tanto medo da água...)"
1014306-46 = "[ns] \"Vem cá, por que você não experimenta segurar essa prancha com as duas mãozinhas?\""
1014306-47 = "Sensei...?"
1014306-51 = "Assim?"
1014306-52 = "[ns] \"Você tá mandando super bem! E agora... lá vai o jato-propulsor do Sensei!\""
1014306-54 = "S-Sensei!?!?"
1014306-56 = "(Puxei a ponta da prancha e saí correndo raso adentro, fazendo a garotinha deslizar super rápido pela água)"
1014306-61 = "Uwaaaaaaaaaaaah!?"
1014306-62 = "V-Você está bem!?"
1014306-64 = "I-Isso foi... incrível!"
1014306-65 = "Eh...?"
1014306-66 = "[ns] \"Não foi divertido!? Então olha só isso agora!\""
1014306-72 = "É muito legal!!!"
1014306-74 = "......"
1014306-75 = "Transformar os maiores pesadelos e pavores de uma criança em algo... totalmente divertido e mágico em vez de apenas \"não dar medo\"..."
1014306-76 = "Com certeza algo de tamanho talento e gentileza só poderia vir de você. Fufu."
1014306-78 = "Nós viemos até aqui porque as crianças estavam doidinhas para ir no toboágua...#nMas me parece que nenhuma delas atingiu a altura mínima pra entrar no brinquedo..."
1014306-82 = "Meninas, preste atenção. O toboágua ainda é muito grande e perigoso pra vocês,#nPor isso, o que acham da gente ir caçar outras brincadeiras legais no parque?"
1014306-85 = "Ahh, que chato! Eu queria tanto ir!"
1014306-86 = "É, e eu perdi todo o medo da água agora!"
1014306-87 = "[ns] \"É uma pena enorme mesmo, meninas, mas as regras são assim pra proteger vocês e não podemos quebrá-las...\""
1014306-88 = "Então... A Instrutora Shun e o Sensei podiam ir no nosso lugar!"
1014306-90 = "Eh!?"
1014306-92 = "É verdade! O Sensei e a Instrutora já são adultos grandões, então vocês podem entrar lá no escorregador! Eu quero muito ver como é ir lá de cima até a piscina!"
1014306-94 = "S-Sensei...?"
1014306-95 = "[ns] \"Perfeito, nós vamos mostrar a vocês como adultos de verdade escorregam!\""
1014306-96 = "Ehhh...!?"
1014306-97 = "E-Eu também tenho que ir...?"
1014306-102 = "Com licença... sobre nós irmos juntos no mesmo bote, eu..."
1014306-104 = "Sinto muito, senhora! Nossa política atual exige que cada visitante desça individualmente por razões de segurança, tudo bem?"
1014306-105 = "É mesmo, né! Claro, eu compreendo totalmente!"
1014306-107 = "[ns] \"YAAAHHHOOO!!!\""
1014306-109 = "(E então descemos no escorregador aquático numa velocidade enorme!)"
1014306-115 = "(Foi um percurso alucinante, grande o suficiente pra fazer adultos gritarem de emoção!)"
1014306-117 = "KYAAAAAAAAAAAHHH!?"
1014306-118 = "[ns] \"Shun!?\""
1014306-120 = "P-POR FAVOR, ME SALVE!!!"
1014306-126 = "Hah, hah, hah... M-Muito obrigada por segurar a minha mão, Sensei..."
1014306-127 = "......"
1014306-128 = "Sim... Como você pode ver... Brinquedos alucinantes como aquele não são a minha especialidade..."
1014306-129 = "T-Tem toda a razão... eu deveria ter sido franca e dito logo que estava com medo desde o início..."
1014306-130 = "Mas as meninas estavam todas olhando pra mim e torcendo com aqueles olhinhos cheios de esperança e brilho... que eu não consegui admitir..."
1014306-132 = "Uau! Olha, o Sensei e a Instrutora tão se abraçando super apertado ali embaixo!"
1014306-134 = "[ns] \"!?!?!?\""
1014306-139 = "Eles devem estar sofrendo daquele tal de \"Efeito da Ponte Pênsil\"!"
1014306-144 = "É quando você acaba se confundindo com a sua mente que acelerou muito de repente por conta de um estresse, tipo despencar de um escorregador gigante, e aí os seus batimentos do coração que dão os pulos loucos vão tentar enganar as suas emoções e fazer você acreditar profundamente que acabou de se apaixonar por uma garota fofinha, quando na verdade, tudo é um delírio fisiológico assustador e uma grande confusão mental..."
1014306-145 = "Até que faz sentido a Instrutora Shun que é esperta e velha usar desse truque maligno e baixo pra arrastar o pobre Sensei pras garras dela..."
1014306-146 = "!!??"
1014306-148 = "Tem vezes em que as coisas malucas que você explica não entram muito na nossa cabeça..."
1014306-149 = "M-M-M-Me perdoe, Sensei!"
1014306-150 = "[s] \"Imagina, não tem problema nenhum!\""
1014306-152 = "Venham meninas, esta é a piscina de ondas."
1014306-153 = "Aqui, ondas artificiais batem na borda da mesma forma que elas fazem no mar de verdade."
1014306-154 = "Por enquanto, a máquina está mandando apenas marolinhas, mas uma onda gigantesca virá mais tarde para empurrar todos vocês."
1014306-155 = "E quando essa grande onda for ativada, eles avisarão no alto-falante, então escutem a moça do parque com muita atenção para não serem arrastadas pro fundo, viu?"
1014306-159 = "Atenção, atenção a todos os visitantes!"
1014306-160 = "Uma onda gigantesca e feroz está a caminho! Cuidado para não engolirem água enquanto curtem a atração!"
1014306-161 = "Lembramos a todos os visitantes que as ondas podem atingir o nível máximo de até 2,4 metros na nossa piscina... #nPor isso, solicitamos extrema cautela com as crianças!"
1014306-162 = "Oba, a onda gigante vem aí!"
1014306-166 = "Ahahahaha!"
1014306-168 = "Olha eu aqui, Sensei! Eu peguei uma onda de verdade!"
1014306-169 = "Meninas, por favor, segurem-se na borda para não serem puxadas pro fundo!"
1014306-171 = "Sensei! Instrutora Shun! O meu estômago tá roncando pra caramba agora!"
1014306-172 = "Eu quero ir lá na moça comprar aquele Takoyaki recheado! E eu vi um cachorro-quente grandão também, eu quero!"
1014306-173 = "[ns] \"Certo, façam uma fila e eu compro um pra cada de vocês!\""
1014306-175 = "Isso mesmo, meninas. Fiquem na filinha e se comportem muito bem enquanto o Sensei não volta com as comidinhas, hein?"
1014306-180 = "Sensei, você trabalhou tão duro brincando e cuidando de todas elas hoje. Muito obrigada."
1014306-181 = "Você separou o seu precioso e escasso tempo para guiar e vigiar todas as nossas criancinhas em segurança. Eu nem tenho palavras bonitas o bastante para agradecê-lo... "
1014306-182 = "[s] \"Imagina, pra mim não foi trabalho nenhum, muito pelo contrário, me diverti bastante com elas.\""
1014306-183 = "N-Não, sinto muito por você ter que perder o seu dia fazendo sacrifícios... "
1014306-184 = "Você passou as últimas horas inteiras protegendo e brincando apenas com as meninas na piscina que eu vi perfeitamente que o Sensei não encontrou nem cinco minutos pra esticar as pernas e focar nos próprios prazeres e mergulhos para se divertir e desestressar o corpo... "
1014306-185 = "Sendo assim... nós já podemos nos encarregar da viagem de volta e guiar as crianças até as caminhas..."
1014306-186 = "Meniiinaaaas~? Já está dando a nossa hora, temos que dar tchau para esse lugar e voltar para Shanhaijing, ok~?"
1014306-188 = "Eeeeeehh... Mas eu não queria ir embora, ainda tá super claro lá fora... "
1014306-189 = "Nananinanão, não aceito essas birrinhas egoístas, ok? Vocês são as boas meninas da Instrutora que seguem os horários bonitinhas até o fim, não são?"
1014306-191 = "Siiiim..."
1014306-194 = "......"
1014306-195 = "Sabe... eu sinto que o dia simplesmente voou e evaporou tão depressa que nem senti."
1014306-196 = "[s] \"Você fez um trabalho exemplar também, Shun. Bom descanso pra vocês.\""
1014306-197 = "Ah, muito obrigada. Cuidar de um jardim assim já virou rotina normal para mim, então eu consigo aguentar esse cansaço brincando."
1014306-198 = "Por falar nisso, Sensei."
1014306-199 = "Tive um pensamento muito intrometido agora mesmo... "
1014306-204 = "Nós podíamos fugir para algum buraco um minutinho apenas... e brincarmos bastante juntos... sozinhos e escondidos de todo o resto...?"
1014306-205 = "[ns] \"......!\""
1014306-207 = "[ns] \"Com todo o prazer!\""
1014306-208 = "Sim... ♡"
1014306-210 = "(Depois disso, eu e a Shun nos escondemos das meninas, invadimos as atrações aquáticas e brincamos a tarde toda como duas crianças sem limites)"
1014306-211 = "(Perdemos tanto a linha que quase não conseguimos pegar o último trem para voltar pra casa...)"