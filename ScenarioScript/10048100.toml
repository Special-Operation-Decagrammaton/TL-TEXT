[translation]
10048100-1 = "第10話;テストの結果"
10048100-2 = "ワイルドハントの校門"
10048100-3 = "（次の日の朝……）"
10048100-4 = "すごい人混みだなー！"
10048100-5 = "さすがベロニカの展示会……何時オープンだっけ？"
10048100-6 = "みてみて、この絵も展示されるって！"
10048100-7 = "うそ！？これ、教科書で見たことあるよ！"
10048100-11 = "（ざわざわ）"
10048100-17 = "（……芸術を理解できないくせに、好き勝手盛り上がっているな）"
10048100-18 = "（ニセモノをありがたがるバカどもめ）"
10048100-19 = "（……あの頃を思い出すよ）"
10048100-21 = "（心血を注いだ私の作品を、非難していた評論家たち……）"
10048100-22 = "（あいつらは、私の描く贋作を褒め称えた）"
10048100-23 = "（絵そのものを見る者などいない）"
10048100-24 = "（興味があるのは、その向こうにある耳心地のいい情報だけ）"
10048100-25 = "（大衆は、ハナから審美眼など持ち合わせていないのだ……！）"
10048100-27 = "[log=시민 동물6 의뢰인]そんなヤツらに――[/log]"
10048100-31 = "[log=시민 동물6 의뢰인]真作を鑑賞する資格など、ない……！[/log]"
10048100-34 = "（だから私は、世界の名作を全てすり替えてやると決めたんだ）"
10048100-35 = "（無知な奴らの前に晒され、好き勝手に批評されるなど真作にとっては屈辱だろう）"
10048100-36 = "（……昨晩、特殊交易部からも連絡があった）"
10048100-37 = "（依頼を完了した、と）"
10048100-38 = "（……ふっ。いよいよ始まりだ）"
10048100-39 = "（せいぜい、贋作をありがたがるといい）"
10048100-40 = "（お前たちにはそれで十分だ……！）"
10048100-42 = "まもなくオープンします！"
10048100-43 = "あらかじめ、チケットをお手元にご用意ください！"
10048100-44 = "ふふっ……時間だな。"
10048100-45 = "さて、行くとするか……！"
10048100-50 = "ベロニカ特別展・会場"
10048100-51 = "（ざわざわ……）"
10048100-55 = "な、なんだ……？"
10048100-56 = "えっ、何……？同じ絵が2枚？"
10048100-58 = "でもあれって……有名な絵だよね？"
10048100-59 = "え？わざとあんな展示の仕方をしてるのかな？"
10048100-64 = "何の騒ぎだ？"
10048100-65 = "みんな一か所に集まって……。"
10048100-66 = "いったいどうしたというんだ。"
10048100-67 = "ちょっと失礼。"
10048100-72 = "なっ……なんだこれは！"
10048100-77 = "同じ絵が、同時に2枚……！？"
10048100-78 = "どっ、どういうことだ……！？"
10048100-80 = "[log]昨晩――[/log]"
10048100-82 = "ワイルドハント・空き地"
10048100-83 = "……あなたは、誰のことも信じていないんですよね？"
10048100-84 = "みんなには審美眼なんてない、と。"
10048100-85 = "そうお考えなんですよね？"
10048100-86 = "ええ――その通りです。"
10048100-87 = "では、もう一つお聞きします。"
10048100-88 = "あなたはその考えを、試してみたことはありますか？"
10048100-89 = "試す？"
10048100-90 = "はい。本当に観客は無知なのか、テストしてみませんか。"
10048100-91 = "ふむ――独創的な発想ですね。興味深い。"
10048100-92 = "いいでしょう。どのように試すのですか？"
10048100-97 = "……『誰が紫、青を愛でるのか』の贋作と真作を、同じ場所に展示します。 "
10048100-98 = "……！"
10048100-99 = "最初、観客は混乱するはずです。 "
10048100-100 = "でもしばらくして、ふたつのグループに分かれるでしょう。"
10048100-101 = "ある方は本物の前に。また、ある方は偽物の前に……。"
10048100-102 = "観客が確かな審美眼を持っていれば、本物の前にたくさんの方が集まるはずです。"
10048100-103 = "……もしくは、半々に分かれるか。"
10048100-104 = "……ふむ。"
10048100-105 = "真作の前にたくさん集まれば、あなたが絵を盗む理由もなくなるはず。"
10048100-106 = "観客は、自分たちの審美眼を証明したことになるのですから。"
10048100-107 = "ふふ……そうですね。 "
10048100-108 = "いいでしょう……その時は、私もこの絵を諦めます。"
10048100-109 = "……でも、そうでなかったときは？"
10048100-110 = "私の美学こそが正しいと証明された時――お嬢さんは何をしてくださるのですか？"
10048100-111 = "……。"
10048100-112 = "……今度、力をお貸しします。"
10048100-113 = "特殊交易部の名をもって。"
10048100-114 = "み、ミヨ……ミヨ！？それはあ、あまりにも危険すぎるよ！？"
10048100-115 = "もしお客さんたちが、予想通りに動かなかったらどうするの！？"
10048100-116 = "……でも、本物が盗まれるのをただ見てるよりはマシです。"
10048100-120 = "いいでしょう――その賭けに乗りましょう。"
10048100-121 = "お嬢さんの美学を尊重いたします。"
10048100-122 = "絵の展示は私にお任せください。"
10048100-123 = "……ありがとうございます。"
10048100-124 = "――それでは、これにて失礼。"
10048100-125 = "そう遠からず、別の姿でお会いする事になるでしょうけれど――ミヨさん。"
10048100-126 = "……そして、先生も。"
10048100-127 = "[s] \"またね、怪盗さん。\""
10048100-128 = "怪盗さん、まったね～！"
10048100-129 = "ふふっ……では、その時まで良い夢を。bye！"
10048100-135 = "ミヨ！本物の方にみんな集まってる……！"
10048100-136 = "勝ったんだよ、私たち！"
10048100-137 = "……。"
10048100-138 = "よ、よかっ……た……。"
10048100-143 = "ミヨっ！？"
10048100-144 = "ミヨちゃん！？"
10048100-150 = "ふむ……こっちはなんか違うような。"
10048100-151 = "同じ絵だけど……そうですね。"
10048100-153 = "……私もこっちの方が好きかも。"
10048100-154 = "わたしもわたしも。"
10048100-159 = "……。"
10048100-160 = "（なぜ……）"
10048100-161 = "（なぜ皆、本物の方に集まる？）"
10048100-162 = "（無知な奴らが、どうして本物に気がつくんだ！？）"
10048100-163 = "（それに、特殊交易部は確かに依頼を完了したと……！）"
10048100-164 = "失礼します。"
10048100-170 = "な、なんですか？"
10048100-171 = "『誰が紫、青を愛でるのか』の贋作制作の容疑がかかっております。ご同行願えますか。"
10048100-172 = "なっ、何だと！？"
10048100-173 = "詳しい話はあちらで。"
10048100-174 = "ですが、私たちはヴァルキューレではありませんので。あしからず。#n黙秘権は適用されません。"
10048100-175 = "ちっ、ちがう！私じゃない！！"
10048100-176 = "これは、特殊交易部……！そう！全部あいつらがやったんだ！"
10048100-177 = "……特殊交易部？"
10048100-178 = "ふふっ……。"
10048100-179 = "……？"
10048100-183 = "ワイルドハントにそんな組織はありません。"
10048100-190 = "連れていけ。"
10048100-195 = "ちっ、違う！！私には使命が……#nバカな奴らから芸術を守る使命があるんだ――！"
10048100-209 = "今回は私の負けでしたね、後輩のみなさん。"
10048100-210 = "ですが――次の舞台では、加減などいたしませんよ。"
10048100-211 = "ふふっ、ご存じなのでしょう？先生。"
10048100-212 = "[s] \"……まだ怪盗をやめるつもりはないんだね。\""
10048100-213 = "怪盗……何のことでしょうか？"
10048100-214 = "私は贋作を作った者を逮捕し、特殊交易部の存在を隠しただけの……。"
10048100-215 = "……ただの寮監隊員ですよ。"
10048100-216 = "[s1] \"つまり……。\"\n[s2] \"ここでは、寮監隊員と先生でいたいってこと？\""
10048100-219 = "ふふ、そう受け取ってもらって構いません。"
10048100-220 = "ふむ……ですが、度を過ぎた時――先生は私を追うのでしょうか？"
10048100-221 = "……。"
10048100-222 = "それもかまいません。むしろ、先生になら……。"
10048100-223 = "先生が私を追いかけてくださることそのものが、美学だといえましょう。"
10048100-224 = "怪盗は……自らを捕らえてくれる探偵を待ち望んでいるものですから。"
10048100-225 = "[s] \"ん？ちょっとよく聞こえなかったんだけど……。\""
10048100-226 = "……ふふっ、何でもありません。"
10048100-227 = "そういえば、今日は追加の業務がありまして。"
10048100-228 = "[s] \"追加の……？\""
10048100-229 = "その……せ、先生の、展示会のガイドを……。"
10048100-230 = "本業務に、ご協力……願えませんでしょうか？"
10048100-231 = "[s] \"うん、そういうことならよろしくね。\""
10048100-232 = "ふ、ふふっ……では。"
10048100-237 = "まず『誰が紫、青を愛でるのか』、こちらからご案内いたしましょう。"
