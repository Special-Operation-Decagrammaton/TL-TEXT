[translation]
10048100-1 = "Episódio 10; Resultado do Teste"
10048100-2 = "Portão da Escola Wildhunt"
10048100-3 = "（Manhã do dia seguinte...）"
10048100-4 = "Quanta gente!"
10048100-5 = "Como esperado da exposição de Veronica... Que horas abre mesmo?"
10048100-6 = "Olha, olha, dizem que este quadro também será exibido!"
10048100-7 = "Mentira!? Eu já vi esse no livro didático!"
10048100-11 = "（Murmúrios）"
10048100-17 = "（...Eles nem entendem de arte, mas estão se divertindo como bem entendem）"
10048100-18 = "（Bando de idiotas que veneram falsificações）"
10048100-19 = "（...Isso me faz lembrar daquela época）"
10048100-21 = "（Os críticos que condenavam minhas obras, nas quais derramei sangue e alma...）"
10048100-22 = "（Eles elogiavam as falsificações que eu pintava）"
10048100-23 = "（Ninguém olha para a pintura em si）"
10048100-24 = "（O que lhes interessa é apenas a informação agradável por trás dela）"
10048100-25 = "（As massas não possuem senso estético desde o princípio...!）"
10048100-27 = "[log=시민 동물6 의뢰인]Para esse tipo de gente――[/log]"
10048100-31 = "[log=시민 동물6 의뢰인]Não há qualificação para apreciar uma obra original...! [/log]"
10048100-34 = "（Por isso decidi que iria substituir todas as obras-primas do mundo）"
10048100-35 = "（Ser expostas diante de ignorantes e criticadas à vontade deve ser uma humilhação para as originais）"
10048100-36 = "（...Ontem à noite, recebi um contato do Departamento de Comércio Especial）"
10048100-37 = "（Disseram que o pedido foi concluído）"
10048100-38 = "（...Hmph. Finalmente vai começar）"
10048100-39 = "（Aproveitem bem as falsificações）"
10048100-40 = "（Para vocês, isso é o suficiente...!）"
10048100-42 = "Abriremos em breve!"
10048100-43 = "Por favor, tenham seus ingressos em mãos!"
10048100-44 = "Fufu... Chegou a hora."
10048100-45 = "Bem, é hora de ir...!"
10048100-50 = "Exposição Especial de Veronica - Local"
10048100-51 = "（Murmúrios...）"
10048100-55 = "O-o que é isso...?"
10048100-56 = "Ei, o que...? Dois quadros iguais?"
10048100-58 = "Mas aquilo é... um quadro famoso, não é?"
10048100-59 = "Hã? Será que eles fizeram esse tipo de exibição de propósito?"
10048100-64 = "Que confusão é essa?"
10048100-65 = "Todo mundo reunido em um só lugar..."
10048100-66 = "O que será que aconteceu?"
10048100-67 = "Com licença."
10048100-72 = "O que... o que é isso!"
10048100-77 = "Dois quadros iguais, ao mesmo tempo...!?"
10048100-78 = "O-o que isso significa...!?"
10048100-80 = "[log]Ontem à noite――[/log]"
10048100-82 = "Wildhunt - Terreno baldio"
10048100-83 = "...Você não confia em ninguém, não é?"
10048100-84 = "Diz que ninguém tem senso estético."
10048100-85 = "É isso que você pensa, certo?"
10048100-86 = "Sim... exatamente."
10048100-87 = "Então, vou lhe perguntar mais uma coisa."
10048100-88 = "Você já tentou colocar esse pensamento à prova?"
10048100-89 = "Testar?"
10048100-90 = "Sim. Que tal testarmos se o público é realmente ignorante?"
10048100-91 = "Hum... uma ideia criativa. Interessante."
10048100-92 = "Muito bem. Como pretende testar isso?"
10048100-97 = "…Exibiremos uma falsificação e a obra original de 'Quem admira o roxo e o azul' no mesmo lugar."
10048100-98 = "…!"
10048100-99 = "No início, o público ficará confuso."
10048100-100 = "Mas, depois de um tempo, eles se dividirão em dois grupos."
10048100-101 = "Alguns ficarão diante do original. Outros, diante da falsificação…"
10048100-102 = "Se o público tiver um bom senso estético, a maioria se reunirá diante do original."
10048100-103 = "…Ou talvez se dividam meio a meio."
10048100-104 = "…Hum."
10048100-105 = "Se a maioria se reunir diante da obra original, você não terá motivos para roubá-la."
10048100-106 = "Pois o público terá provado o seu próprio senso estético."
10048100-107 = "Fufu… entendo."
10048100-108 = "Muito bem… nesse caso, eu também desistirei desta pintura."
10048100-109 = "…Mas, e se não for esse o caso?"
10048100-110 = "Quando for provado que a minha estética é a correta — o que você fará, senhorita?"
10048100-111 = "…"
10048100-112 = "…Desta vez, eu lhe emprestarei minha força."
10048100-113 = "Em nome do Departamento de Comércio Especial."
10048100-114 = "Mi-Miyo… Miyo!? Isso é… isso é perigoso demais!?"
10048100-115 = "O que faremos se os clientes não agirem como esperamos!?"
10048100-116 = "…Mas é melhor do que apenas assistir ao original ser roubado."
10048100-120 = "Muito bem… aceito essa aposta."
10048100-121 = "Respeitarei a estética da senhorita."
10048100-122 = "Deixe a exibição da pintura comigo."
10048100-123 = "…Obrigada."
10048100-124 = "— Então, com licença."
10048100-125 = "Embora não demore muito para nos encontrarmos novamente sob outra forma — Miyo."
10048100-126 = "…E você também, Sensei."
10048100-127 = "[s] \"Até mais, Ladrão Fantasma.\""
10048100-128 = "Ladrão Fantasma, até mais!"
10048100-129 = "Fufu… então, até lá, tenha bons sonhos. Tchau!"
10048100-135 = "Miyo! Todos estão se reunindo diante do original…!"
10048100-136 = "Nós vencemos!"
10048100-137 = "…"
10048100-138 = "Que… alívio…"
10048100-143 = "Miyo!?"
10048100-144 = "Miyo-chan!?"
10048100-150 = "Hum… este aqui parece um pouco diferente."
10048100-151 = "É a mesma pintura, mas… é verdade."
10048100-153 = "…Eu também gosto mais deste."
10048100-154 = "Eu também, eu também."
10048100-159 = "…"
10048100-160 = "(Por que…)"
10048100-161 = "(Por que todos estão se reunindo diante do original?)"
10048100-162 = "(Como esses ignorantes conseguiram notar qual é o original!?)"
10048100-163 = "(Além disso, o Departamento de Comércio Especial certamente completou o pedido…!)"
10048100-164 = "Com licença."
10048100-170 = "Q-que é isso?"
10048100-171 = "Você é suspeito de produzir a falsificação de 'Quem admira o roxo e o azul'. Poderia nos acompanhar?"
10048100-172 = "O-o que você disse!?"
10048100-173 = "Explicaremos os detalhes lá."
10048100-174 = "Mas, como não somos da Valkyrie, não espere cortesia. #nO direito ao silêncio não se aplica."
10048100-175 = "N-não, está errado! Não fui eu!!"
10048100-176 = "Isso é coisa do Departamento de Comércio Especial...! Isso! Foram eles que fizeram tudo!"
10048100-177 = "……Departamento de Comércio Especial?"
10048100-178 = "Fufu……."
10048100-179 = "……?"
10048100-183 = "Não existe tal organização na Wild Hunt."
10048100-190 = "Levem-no."
10048100-195 = "Não, está errado!! Eu tenho uma missão... #nUma missão de proteger a arte desses idiotas――!"
10048100-209 = "Desta vez eu perdi, minhas queridas veteranas."
10048100-210 = "Mas――no próximo palco, não pegarei leve."
10048100-211 = "Fufu, você sabe, não é? Sensei."
10048100-212 = "[s] \"……Então você ainda não pretende parar de ser uma ladra fantasma.\""
10048100-213 = "Ladra fantasma…… do que está falando?"
10048100-214 = "Eu apenas prendi quem fez a falsificação e ocultei a existência do Departamento de Comércio Especial……."
10048100-215 = "……Sou apenas uma integrante do Comitê Disciplinar."
10048100-216 = "[s1] \"Ou seja…….\"\n[s2] \"Você quer ser apenas uma integrante do Comitê Disciplinar e o Sensei aqui?\""
10048100-219 = "Fufu, pode interpretar dessa forma se quiser."
10048100-220 = "Hum…… mas, quando eu passar dos limites―― o Sensei irá me perseguir?"
10048100-221 = "……."
10048100-222 = "Isso também não seria um problema. Na verdade, se for o Sensei……."
10048100-223 = "O fato de o Sensei me perseguir já pode ser considerado uma estética por si só."
10048100-224 = "Afinal, uma ladra fantasma…… sempre espera pelo detetive que a capturará."
10048100-225 = "[s] \"Hm? Eu não ouvi direito…….\""
10048100-226 = "……Fufu, não é nada."
10048100-227 = "Falando nisso, tenho um trabalho adicional hoje."
10048100-228 = "[s] \"Adicional……?\""
10048100-229 = "É que…… p-poderia ser o guia da exposição do Sensei……."
10048100-230 = "Poderia… colaborar com o meu trabalho?"
10048100-231 = "[s] \"Sim, se é assim, pode contar comigo.\""
10048100-232 = "Fu, fufu…… então vamos."
10048100-237 = "Primeiro, vamos começar guiando você por 'Quem admira o roxo e o azul'."
