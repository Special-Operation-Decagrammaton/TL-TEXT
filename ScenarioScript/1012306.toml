[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
1012306-1 = "Em Busca da Distância (e do Atrito) Confortável"
1012306-2 = "Escritório da Schale"
1012306-3 = "(Não demorou muito para que a Seia desse as caras de novo)"
1012306-8 = "[ns1] \"...Seia?\"\n[ns2] \"Você voltou para a sua roupa normal.\""
1012306-11 = "Sim. Eu já guardei o meu maiôzinho na gaveta, como prometido.#nAlém disso, a pauta de hoje é completamente diferente.\nNão há com o que se preocupar."
1012306-12 = "Hoje... eu vim aqui só pra 'me gabar' e me exibir um pouquinho."
1012306-13 = "Sobre as mudanças suadas e intensas\nque a minha existência sofreu."
1012306-14 = "Pode parecer uma diferençazinha inútil pra quem vê de fora.#nAo ponto de que alguns hesitariam até mesmo em chamar de 'diferença'."
1012306-15 = "Mas o que importa aqui não é a quantidade absurda de mudanças,\ne sim o fato de que a semente germinou e cresceu."
1012306-16 = "...É o que você diria para mim, não é?"
1012306-17 = "[s3] \"Isso é a sua intuição?\"\n[s4] \"Ou foi você mesma que deduziu isso, Seia?\""
1012306-20 = "É a minha própria dedução e conclusão."
1012306-21 = "Algo que difere categoricamente de uma intuição\nvaga ou de um sinal efêmero――"
1012306-22 = "Eu acredito com força que é algo com\num peso e um significado imenso."
1012306-23 = "Na verdade, se você tentar adivinhar as coisas\nsó confiando cegamente no poder e na intuição...\nsó vai criar uma distorção."
1012306-27 = "Desculpe, vamos voltar aos trilhos.\nA pauta de hoje são relações íntimas e interpessoais."
1012306-28 = "Sinto que, ultimamente, as minhas trocas de palavras e fluidos...\ndigo, a minha comunicação com a Nagisa e a Mika,\nficaram um pouco mais leves."
1012306-29 = "Claro, isso não significa que nós 'não éramos íntimas' desde o início.#nAo menos para mim, a existência delas é algo que guardo com muito carinho.#n...Independentemente do que elas pensem de mim, claro."
1012306-30 = "......"
1012306-31 = "Não, espera. Retiro o que eu disse.#n'Assim como eu sou valiosa para elas',\neu também as guardo com um amor e zelo preciosos."
1012306-32 = "[s5] \"Isso é incrível!\"\n[s6] \"Foi um avanço enorme!\""
1012306-35 = "Sim, era algo que eu nunca\npoderia sequer imaginar antes."
1012306-36 = "O único lado não tão belo da moeda é que...\nesse estado 'despreocupado' nem sempre se traduz\nem algo elegante e agradável aos olhos."
1012306-38 = "Primeiro, a nossa guerra de ironias e palavras afiadas...\nchegou a um nível absurdamente alto em relação ao que era antes."
1012306-39 = "Quando a gente acha que a Mika esfriou a cabeça, as falas dela ficam ainda mais rudes e diretas.#nE a Nagisa não poupa mais as cordas vocais para impor o tom."
1012306-40 = "...Ou seja, isso é o que chamam de 'quebrar o gelo'.#nEntendi. De fato, o gelo 'quebrou' muito bem.#nDe certa forma, nossa relação se transformou num caos absurdo e barulhento."
1012306-42 = "Ainda estou tentando processar se essa foi a resposta certa ou não.#nPara quem olha de fora, é apenas um bando de garotas brigando e rolando no chão.#nDefinitivamente não pode ser chamado de algo 'belo e gracioso'."
1012306-43 = "Talvez chegue o dia em que eu vou chorar de saudade da época em que a gente só fingia ter 'uma relação bela onde nos preocupávamos umas com as outras' na superfície."
1012306-44 = "Mas... hm..."
1012306-45 = "[s7] \"Se der problema de novo, a gente dá um jeito juntos.\"\n[s8] \"Vocês ainda estão no processo gostoso de achar a relação ideal entre vocês.\""
1012306-48 = "...Fufu."
1012306-49 = "Eu já imaginava e estava ansiosa para ouvir\nesse tipo de palavra doce sair da sua boca.#nOu melhor, posso dizer que o real motivo\nde eu ter vindo até aqui foi só pra escutar isso de você."
1012306-50 = "Da minha parte, a resposta e o clímax de\ntudo isso já estavam claros desde o começo."
1012306-51 = "Falar com ironias picantes faz parte da minha natureza,\nmas... parece que elas aprenderam muito bem a ignorar os meus truques."
1012306-52 = "Antes que eu percebesse,\nelas começaram a desviar as minhas palavras com a maior leveza."
1012306-53 = "E até eu mesma parei de descartar tanto as ideias malucas da Mika.#nAs atitudes dela podem ser infantis e patéticas, mas...\na fundação por trás de tudo isso é assustadoramente pura e honesta."
1012306-54 = "A Nagisa sempre teima em cravar os próprios ideais com unhas e dentes... mas eu entendo o peso e os motivos que a forçaram a ser assim.#nE, obviamente, não fecho os olhos para o fato de que eu e a Mika temos grande culpa nisso."
1012306-55 = "Hmm..."
1012306-56 = "Desatar a falar de si mesma assim acaba prolongando a conversa. Que indelicadeza."
1012306-57 = "[s9] \"Que isso, graças a você eu pude entender tudo muito melhor.\"\n[s10] \"Seia, eu tenho certeza que vocês vão se dar super bem.\""
1012306-60 = "Fufu... Sim. Tomara que as coisas continuem\nesquentando e fluindo bem pra gente."
1012306-61 = "...No entanto."
1012306-62 = "...Tanto você, quanto eu."
1012306-63 = "[s11] \"...Eu?\"\n[s12] \"O que você quer dizer com isso...?\""
1012306-66 = "Está se fingindo de sonso e cego?\n#nOu será que... você realmente\nnão se tocou das minhas intenções?"
1012306-67 = "A esse ponto, não faz a menor diferença.\n#nAfinal, não sobrou nenhuma outra\nopção pro Sensei escolher."
1012306-68 = "Bom, vamos lá? Deixei o carro estacionado bem aqui na frente.\n#nSe enrolarmos mais... podem acabar\npregando uma multa gigante na gente..."
1012306-69 = "Fufu, parece que você ainda não engoliu a situação...\nmas essa não é a nossa 'primeira vez'\nfazendo isso, não é?"
1012306-70 = "...Tudo o que eu faço, também é pelo\nbem (e alívio de estresse) da minha aluna. Certo, Sensei?"
1012306-77 = "Vamos explorar qual é a distância\n(e o atrito físico) mais gostosa para nós dois."