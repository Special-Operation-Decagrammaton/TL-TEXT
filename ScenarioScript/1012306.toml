[translation]
1012306-1 = "Procurando uma distância confortável"
1012306-2 = "Escritório da placa de Petri"
1012306-3 = "(Em breve, Seia apareceu.)"
1012306-8 = "[ns1] \"...Seia?\"\n[ns2] \"Você está de volta com essas roupas.\""
1012306-11 = "ah. Guardei meu maiô outro dia. #nAlém disso, há outra coisa para falar hoje. Não haverá problema."
1012306-12 = "Hoje...vim aqui para me exibir."
1012306-13 = "Esta é uma história sobre as mudanças pelas quais passei."
1012306-14 = "Em alguns casos, pode ser uma diferença trivial. #nIsso é tanto que tenho medo até de chamar isso de \"diferença\"."

1012306-15 = "Contudo, o que é importante não é a quantidade total de mudança, mas a ocorrência da mudança em si."
1012306-16 = "...Não é isso que você diria?"
1012306-17 = "[s3] \"Isso é intuição?\"\n[s4] \"Ideia de Seia?\""
1012306-20 = "Esta é minha própria consideração."
1012306-21 = "Algo que é definitivamente diferente da intuição incerta e dos presságios fugazes."
1012306-22 = "Acredito que seja muito mais significativo e pesado."
1012306-23 = "Na verdade, se você tentar descobrir as coisas confiando na força... isso só causará distorção."
1012306-27 = "Não consigo terminar, vamos voltar ao assunto. O tema de discussão de hoje são as relações interpessoais."
1012306-28 = "Ultimamente, sinto que minha comunicação com Nagisa e Mika ficou um pouco mais fácil."
1012306-29 = "Claro, isso não significa que eles não estivessem “próximos” para começar. #nEles são importantes para mim, pelo menos. #n...Não importa o que as pessoas em questão pensam."
1012306-30 = "……."
1012306-31 = "Não, isso não é verdade. #nEu também os estimo, assim como ambos."
1012306-32 = "[s5] \"Isso é incrível!\"\n[s6] \"Isso é um grande progresso!\""
1012306-35 = "Ah, isso era impensável antes."
1012306-36 = "Infelizmente, ser “fácil” não significa necessariamente que pareça bom."
1012306-38 = "Primeiro, houve um aumento nas trocas sarcásticas em comparação com antes."
1012306-39 = "Mika parecia ter se acalmado um pouco, e suas palavras ficaram mais diretas, e a voz de #n Nagisa não estava mais reservada."
1012306-40 = "...Em outras palavras, acho que é isso que significa ser capaz de se abrir. #nEntendo, costuma-se dizer que isso pode ser resolvido. #nDe certa forma, o relacionamento tornou-se completamente caótico."
1012306-42 = "Ainda estou indeciso se esta é a resposta correta. #nSe você olhar de fora, significa apenas mais discussões. #nNão é necessariamente um formato bonito."
1012306-43 = "Mesmo que seja apenas superficialmente, pode chegar o dia em que vocês sentirão falta dos dias em que tinham um lindo relacionamento em que cuidavam um do outro."
1012306-44 = "Mas... hum..."
1012306-45 = "[s7] \"Se surgir um problema, você deve resolvê-lo naquele momento.\"\n[s8] \"É um processo para encontrar o melhor relacionamento para ambas as partes.\""
1012306-48 = "...Hehe."
1012306-49 = "Achei que você diria isso. #nBem, acho que você poderia dizer que vim aqui para ouvir isso."
1012306-50 = "Na minha opinião, a resposta já estava à vista."
1012306-51 = "É da minha natureza querer ser sarcástico, mas essas crianças parecem ter aprendido a lidar com as coisas com calma."
1012306-52 = "Antes que eu percebesse, comecei a me sentir menosprezado."
1012306-53 = "Além disso, a frequência com que desrespeito as ideias de Mika está diminuindo. #nEla pode ser ingênua e imatura em seus modos, mas no centro de suas ações, ela é verdadeiramente honesta."
1012306-54 = "Nagisa teimosamente quer manter suas crenças... mas ele entende por que foi forçado a fazer isso. #nClaro, Mika e eu teremos um papel nisso."
1012306-55 = "Hum..."
1012306-56 = "A conversa interna não deve demorar muito."
1012306-57 = "[s9] \"Não, graças a você eu entendo.\"\n[s10] \"Tenho certeza que Seia e os outros se sairão bem.\""
1012306-60 = "Hehe... isso mesmo. Espero que sim."
1012306-61 = "...Mas... #nNão acho que seja algo que você deva ouvir como se fosse problema de outra pessoa."
1012306-62 = "...Você e eu."
1012306-63 = "[s11] \"...Eu?\"\n[s12] \"O que diabos você quer dizer?\""
1012306-66 = "Você é burro? #nOu você realmente não percebe?"
1012306-67 = "Neste caso, não importa qual. #nDe qualquer forma, o sensei não tem escolha."
1012306-68 = "Vamos, vamos. Meu carro está estacionado na frente dele. #nSe isso continuar... talvez eu consiga uma multa..."
1012306-69 = "Hehe, não consigo entender a situação... mas não é como se fosse a primeira vez, certo?"
1012306-70 = "...Isso também é para os alunos. sensei."
1012306-77 = "Vamos encontrar uma distância confortável."
