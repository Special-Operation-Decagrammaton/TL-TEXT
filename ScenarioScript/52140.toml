[translation]
52140-1 = "第14話;花鳥風月部の怪芸家"
52140-3 = "なっ、何言ってんだ……？アザミさんが、花鳥風月部？"
52140-4 = "そのままの意味だよ。こいつ――[ruby=はぶ]土生[/ruby]アザミは、エビス分校の生徒なんかじゃない。"
52140-5 = "私の仮説が正しければ――北部自治区で目撃されていた怪異は全て彼女が操っていたんだと思う。"
52140-6 = "最初から、私たちは泳がされてたの。"
52140-11 = "すばらしい洞察力です！さすがは、百花繚乱の作戦参謀さま。"
52140-12 = "まあ、もう隠す意味もないからいいんですけど……いつから気づいていたのです？"
52140-13 = "それ、皮肉……？#nあんな下手な芝居、気づけなかったのが情けないよ。"
52140-14 = "まず、エビス分校の近隣住民は、あなたの顔を覚えてなかった。"
52140-19 = "たまたまかと思ったけど……小さい町で、自治委員会の会長を知らないなんてことある？"
52140-20 = "そして……箭吹シュロがアヤメに撃たれたとき"
52140-28 = "怪書の能力は百物語だけでなく、怪談家にも適用されるはず。でも、あの時のシュロは、普通の銃で撃たれていた。"
52140-29 = "それに、あの子は怪書を持ってない。……なら、他に部員が潜んでいるはずでしょ。"
52140-32 = "最後に、この家に刻まれていたのは……勘解由小路家の家紋だった。"
52140-33 = "20年前、勘解由小路家がこの「彼岸邸」を使っていたのなら……。"
52140-34 = "今は廃墟だとしても、その歴史をエビス自治委員会が知らないなんてことある？"
52140-35 = "……何か、嘘をつく理由があるなら別だけど。"
52140-40 = "あはは……あはははっ！"
52140-41 = "いやー、つい聞き入ってしまいました。"
52140-42 = "では、改めて自己紹介を……。"
52140-53 = "私は花鳥風月部の怪談の主「コクリコ」様に仕えし者。[ruby=じゃ]蛇[/ruby]の舌で弱き心を撫ぜる[ruby=もの]蛇女[/ruby]にして――"
52140-54 = "「怪芸」を生み出す、[ruby=かいげいか]怪芸家[/ruby]。#n……土生アザミと申します。"
52140-55 = "かわいそうなシュロちゃんの代わりに、皆さんをこの「彼岸邸」に案内するのが私の任務だったのですが……。"
52140-56 = "道中も楽しまれていたようで、なによりですよ。"
52140-57 = "こいつ……！覚悟しろよ……！"
52140-58 = "ふふっ、威勢が良いのは結構ですけど……。"
52140-59 = "皆さん、本気で私に勝てるとお思いですか？頼みの綱のシャーレの先生も、ナグサさんもいないというのに。"
52140-60 = "……どの道、今のナグサさんでは戦力にならないでしょうけど。"
52140-64 = "あんた……ナグサ先輩に何したの？"
52140-65 = "う～ん、すぐに明かしてもつまらないなぁ……当ててみてください。"
52140-69 = "ああぁ……っ！それそれ！その[ruby=かお]表情[/ruby]が見たかったんです。"
52140-70 = "怒りに燃えているようでいて――その実、先の見えない恐怖に蝕まれつつある。"
52140-74 = "その感情が、私の怪書、「[ruby=とうていぶっかいろく]稲亭物怪録[/ruby]」に力を与えてくれます……！"
52140-75 = "皆さんが思い描く「恐怖」こそが、稲亭物怪録を美しく彩るのですよ。"
52140-90 = "どうぞ、想像の翼を広げてください。"
52140-91 = "皆さんが悶え苦しみ、最期の[ruby=ひといき]一呼吸[/ruby]を吐き出すその瞬間まで……物語は続きます。"
