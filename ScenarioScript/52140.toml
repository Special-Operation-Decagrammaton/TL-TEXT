[translation]
52140-1 = "Episódio 14; A Artista de Variedades do Clube Kacho Fugetsu"
52140-3 = "O-o que você está dizendo...? A Azami-san, do Clube Kacho Fugetsu?"
52140-4 = "Exatamente o que você ouviu. Essa garota — Habu Azami — não é uma aluna da filial de Ebisu."
52140-5 = "Se a minha hipótese estiver correta, acho que foi ela quem manipulou todas as aparições estranhas avistadas no Distrito Norte."
52140-6 = "Desde o início, fomos deixadas à mercê dela."
52140-11 = "Que perspicácia maravilhosa! Como esperado da estrategista da Hyakkiyako."
52140-12 = "Bem, não há mais motivo para esconder, então não importa... mas desde quando você percebeu?"
52140-13 = "Isso é sarcasmo...? #nÉ patético que eu não tenha percebido uma atuação tão ruim."
52140-14 = "Primeiro, os moradores próximos à filial de Ebisu não reconheciam o seu rosto."
52140-19 = "Pensei que pudesse ser coincidência, mas... como alguém em uma cidade pequena não conheceria a presidente do comitê autônomo?"
52140-20 = "E então... quando Yabuki Shuro foi baleada por Ayame"
52140-28 = "A habilidade do Livro Estranho deveria se aplicar não apenas aos Cem Contos, mas também aos contadores de histórias de terror. Mas, naquela época, Shuro foi atingida por uma arma comum."
52140-29 = "Além disso, aquela garota não carrega o Livro Estranho. ...Então, deve haver outro membro escondido por perto."
52140-32 = "Por fim, o que estava gravado nesta casa era... o brasão da família Kadenokoji."
52140-33 = "Se a família Kadenokoji usava esta 'Mansão Higan' há 20 anos..."
52140-34 = "Mesmo que agora seja uma ruína, como o Comitê Autônomo de Ebisu não saberia dessa história?"
52140-35 = "...A menos que houvesse algum motivo para mentir."
52140-40 = "Ahaha... ahahahaha!"
52140-41 = "Nossa, acabei ouvindo tudo com atenção."
52140-42 = "Bem, então, permitam-me apresentar-me novamente..."
52140-53 = "Eu sou aquela que serve à mestre dos contos de terror do Clube Kacho Fugetsu, 'Kokuriko'. Sendo uma mulher-serpente que acaricia corações fracos com uma língua de cobra —"
52140-54 = "Uma artista de variedades que cria 'Artes Estranhas'. #n...Chamo-me Habu Azami."
52140-55 = "Minha missão era guiar vocês até esta 'Mansão Higan' no lugar da pobre Shuro, mas..."
52140-56 = "Fico feliz que tenham aproveitado o caminho."
52140-57 = "Sua...! Prepare-se...!"
52140-58 = "Fufu, é bom ter esse espírito, mas..."
52140-59 = "Vocês realmente acham que podem me vencer? Mesmo sem o Sensei do Schale, que é sua última esperança, e sem a Nagusa-san."
52140-60 = "...De qualquer forma, a Nagusa-san atual não seria capaz de lutar, não é?"
52140-64 = "Você... o que você fez com a Nagusa-senpai?"
52140-65 = "Hmm, não teria graça se eu revelasse agora... tentem adivinhar."
52140-69 = "Ahhh...! Isso mesmo! Era essa expressão que eu queria ver."
52140-70 = "Parece que você está queimando de raiva, mas, na verdade, está sendo consumida por um medo de um futuro incerto."
52140-74 = "Essa emoção dá poder ao meu Livro Estranho, o 'Totei Bukairoku'!"
52140-75 = "O 'medo' que vocês imaginam é o que colore lindamente o Totei Bukairoku."
52140-90 = "Por favor, abram as asas da imaginação."
52140-91 = "Até o momento em que vocês se contorcerem de dor e soltarem o último suspiro... a história continuará."
