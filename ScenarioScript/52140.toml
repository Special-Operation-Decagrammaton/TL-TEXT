[translation]
52140-1 = "Episódio 14; A Artista de Histórias Misteriosas do Clube das Flores, Pássaros, Vento e Lua"
52140-3 = "O, o que você está dizendo......? A Azami-san, do Clube das Flores, Pássaros, Vento e Lua?"
52140-4 = "É exatamente isso. Esta pessoa―― Azami Habu, não é uma aluna da Filial Ebisu."
52140-5 = "Se minha hipótese estiver correta―― acho que foi ela quem controlou todas as assombrações avistadas no Distrito Norte."
52140-6 = "Fomos deixadas à mercê dela desde o início."
52140-11 = "Que percepção maravilhosa! Como esperado da estrategista da Hyakkaryouran."
52140-12 = "Bem, não tem mais sentido esconder, então não importa...... mas há quanto tempo você percebeu?"
52140-13 = "Isso é um sarcasmo......? #n É lamentável que eu não tenha percebido uma atuação tão ruim quanto a sua."
52140-14 = "Para começar, os residentes locais perto da Filial Ebisu não lembravam do seu rosto."
52140-19 = "Achei que pudesse ser coincidência...... mas em uma cidade pequena, como é possível não conhecer a presidente do Comitê de Autonomia?"
52140-20 = "E também...... quando Shuro Yabuki foi atingida por Ayame"
52140-28 = "A capacidade do livro misterioso deveria se aplicar não apenas à Hyakumonogatari, mas também ao contador de histórias. Porém, a Shuro daquela hora foi atingida por balas comuns."
52140-29 = "Além disso, a garota não estava com o livro misterioso. ......Então, outros membros devem estar escondidos por aqui, certo?"
52140-32 = "Por fim, o que estava gravado nesta casa era...... o brasão da família Kadenokouji."
52140-33 = "Se a família Kadenokouji usava esta 'Mansão Higantei' há 20 anos......"
52140-34 = "Mesmo sendo uma ruína agora, como o Comitê de Autonomia de Ebisu não saberia dessa história?"
52140-35 = "......Bem, isso seria diferente se houvesse algum motivo para mentir."
52140-40 = "Ahahaha...... Ahahahaha!"
52140-41 = "Nossa, acabei escutando com atenção."
52140-42 = "Então, permita-me apresentar-me novamente......"
52140-53 = "Sou alguém que serve à Kokuriko-sama, a mestra das histórias de fantasmas do Clube das Flores, Pássaros, Vento e Lua. Sou a 'mulher-serpente' que acaricia corações fracos com sua língua de serpente, e――"
52140-54 = "Uma 'artista de histórias misteriosas' que dá vida a 'artes misteriosas'. #n ......Chamo-me Azami Habu."
52140-55 = "No lugar da pobre Shuro-chan, minha missão era guiar vocês até esta 'Mansão Higantei'......"
52140-56 = "Mas parece que vocês se divertiram no caminho, o que é o mais importante."
52140-57 = "Sua......! Prepare-se......!"
52140-58 = "Fufu, agradeço o entusiasmo, mas......"
52140-59 = "Pessoal, vocês realmente acham que podem me vencer? Mesmo sem o Sensei da Schale ou a Nagusa-san, que são seus trunfos?"
52140-60 = "......De qualquer forma, a Nagusa-san atual não serviria de força de combate, de qualquer jeito."
52140-64 = "Você...... o que você fez com a Nagusa-senpai?"
52140-65 = "Hmm, seria sem graça revelar logo de cara...... tentem adivinhar."
52140-69 = "Ahhh......! Isso mesmo! Eu queria ver essa expressão!"
52140-70 = "Parece que estão queimando de raiva―― mas, na verdade, estão sendo corroídas pelo medo do desconhecido."
52140-74 = "Essa emoção dá poder ao meu livro misterioso, o 'Inotei Mononokeroku'......!"
52140-75 = "O 'medo' que vocês imaginam é o que colore lindamente o Inotei Mononokeroku."
52140-90 = "Por favor, abram as asas da sua imaginação."
52140-91 = "Até o momento em que vocês se contorcerem em agonia e soltarem seu último fôlego...... a história continuará."

