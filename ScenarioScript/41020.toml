[translation]
41020-1 = "Episódio 2; Visitantes Indesejados"
41020-3 = "Eita!? Tiros!?"
41020-4 = "Aqui é um ponto cego, com certeza... De onde eles estão vindo?"
41020-9 = "...Ingênuo."
41020-10 = "Não conhece nem câmeras térmicas? Não adianta nada se esconder."
41020-14 = "Moe, imobilização concluída! Bombardeiem logo!"
41020-15 = "Coordenadas, VK4-0-4-5!"
41020-16 = "Vai!"
41020-22 = "Hehehe, cansei de esperar!"
41020-30 = "Drones!?"
41020-31 = "Estão vindo direto para cá, fujam!!"
41020-37 = "Que explosão foi essa?!"
41020-41 = "Esquadrão Alfa, respondam!"
41020-43 = "Estão conseguindo ver?"
41020-44 = "O Departamento de Segurança Pública está na defensiva!"
41020-45 = "Depois do Departamento de Guarda, parece que até o Departamento de Segurança Pública vai cair! Será que ainda resta alguma unidade da Valkyrie capaz de lutar, além do Departamento de Segurança Comunitária...!?"
41020-46 = "Disseram que quem está protestando são alunas da Academia SRT, mas mesmo assim, eles estão sendo completamente esmagados."
41020-47 = "Como será que isso vai terminar...!"
41020-48 = "Pois é, será que a Valkyrie tem algum trunfo na manga!?"
41020-49 = "Ah, chega, que barulheira!"
41020-50 = "Quem deu permissão para filmar?! Desliguem essa câmera agora!"
41020-51 = "Opa, deu ruim!"
41020-52 = "Melhor a gente se afastar antes que sobre pra nós!"
41020-53 = "Não atrapalhe! Saia da frente!"
41020-54 = "Droga, o Chronos... como sempre, barulhentos demais...!"
41020-55 = "Dito isso, é verdade que o pessoal já era... e aqueles idiotas do Departamento de Segurança Comunitária não servem para nada..."
41020-56 = "[s] \"Que situação tensa...\""
41020-58 = "...Quem é você?"
41020-59 = "Não está vendo que estamos em combate? Pessoas de fora, caiam fora daqui."
41020-65 = "[ns] Entrego a carta de recomendação da Rin."
41020-66 = "Isso é... uma carta de recomendação da Administradora?"
41020-67 = "Em vez do Gabinete de Defesa... você é do 'Schale'!?"
41020-68 = "...Peço mil desculpas pela minha grosseria."
41020-69 = "Acho que é a primeira vez que nos encontramos pessoalmente."
41020-75 = "Sou a responsável pela operação no local. Sou Kanna, chefe do Departamento de Segurança Pública da Academia de Polícia Valkyrie."
41020-76 = "[s1] \"Prazer em conhecê-la.\"\n[s2] \"Como está a situação?\""
41020-77 = "Bem, como pode ver..."
41020-78 = "Bem, como pode ver..."
41020-79 = "Quase não restam tropas e o moral está no fundo do poço."
41020-80 = "A intenção inicial era subjugar pelo número, mas o poder de fogo da SRT é absurdo..."
41020-81 = "O pessoal que restou já está..."
41020-86 = "Desculpem a demora, aqui é a Kirino, do Departamento de Segurança Comunitária!"
41020-87 = "Já podemos entrar em ação!?"
41020-88 = "...Não parece que já acabou? Acho que não precisamos mais entrar em cena."
41020-90 = "Apenas este 'Departamento de Segurança Comunitária'."
41020-91 = "Ah, Sensei! Que coincidência, veio nos ajudar na Valkyrie?"
41020-92 = "Vir até um lugar desses... você continua sendo muito dedicado, hein."
41020-93 = "Com a sua liderança, Sensei, a operação já é um sucesso!"
41020-94 = "Vamos lá, não podemos deixar as coisas como estão! Vamos entrar em ação!"
41020-95 = "Espere, não se mova por conta própria. O que vocês acham que vão conseguir fazendo isso?"
41020-96 = "Tanto o Departamento de Segurança quanto o de Polícia Pública foram praticamente derrotados. Vocês acham mesmo que são páreo para eles?"
41020-97 = "Para começar, vocês nem têm armas decentes... Em que base acham que podem vencer?"
41020-98 = "...Eu pensei que vocês tivessem noção das próprias habilidades, mas pelo visto não."
41020-99 = "M-mas, os cidadãos estão com medo... Não podemos simplesmente ficar aqui olhando..."
41020-100 = "...Admiro a disposição. Mas só determinação não resolve nada."
41020-101 = "Até encontrarmos outra solução, fiquem aqui e aguardem."
41020-102 = "S-sim, senhor..."
41020-103 = "Que sorte. Bem, ele não deixa de ter razão."
41020-104 = "[s] \"Você tem alguma informação sobre as alunas que ocuparam este lugar?\""
41020-105 = "Sim, é uma equipe do primeiro ano da \"Academia SRT\"... o \"Esquadrão RABBIT\"."
41020-106 = "Originalmente, com o fechamento da SRT, elas deveriam ter sido transferidas para o Departamento de Segurança da Valkyrie, mas..."
41020-107 = "Não sei o que aconteceu, mas de repente elas ocuparam o parque. O motivo foi para protestar contra o fechamento da escola."
41020-108 = "Embora sejam poucas, o equipamento delas é de ponta. É principalmente por isso que estamos tendo tanta dificuldade..."
41020-109 = "[s] \"Entendo. Dentro do que você pode me mostrar, tem mais algum detalhe?\""
41020-110 = "Bem, se for a ficha de cada aluna fornecida pelo Conselho Estudantil Federal..."
41020-114 = "Ah, talvez seja mais rápido ver o rosto delas por ali. É frustrante, mas parece que um drone de transmissão da Chronos conseguiu entrar."
41020-119 = "...Hm? Ei, o que você está olhando? Quer levar um MANPADS na cara?"
41020-120 = "Hehehe... Ei, não precisa ficar tão nervosa assim."
41020-121 = "De qualquer forma, o curso da batalha não vai mudar. Não tem problema nenhum se filmarem agora, né?"
41020-122 = "Já que estamos nisso, por que não aproveitam para espalhar a tolice do Conselho Estudantil Federal?"
41020-123 = "Então é isso... Conselho Estudantil Federal, estão assistindo?"
41020-124 = "Já não perceberam que a decisão de vocês foi um erro?"
41020-125 = "Enquanto estivermos aqui, a Academia SRT não vai acabar!"
41020-127 = "Saki, Moe. Por favor, evitem provocações desnecessárias."
41020-128 = "O que precisamos é obter uma posição vantajosa para negociações através do combate. Não há necessidade de fazer mais nada além disso agora."
41020-130 = "Que sem graça... A Miyako é sempre tão séria."
41020-134 = "...O zumbido desse drone é irritante. Acho que vou explodi-lo logo."
41020-138 = "Ainda temos bastante munição... Que tal testar disparando algumas rajadas?"
41020-139 = "Saki~, você está pensando em algo divertido, né?"
41020-140 = "Vamos fazer? Vamos fazer algo bem chamativo?"
41020-141 = "Já que vamos usar, por que não gastamos toda a munição e fazemos parecer fogos de artifício?"
41020-142 = "Nossa, deve ser lindo... haa, haa..."
41020-143 = "Isso é ótimo, mas... sinto que estamos esquecendo de algo..."
41020-149 = "S-será que isso é sobre mim...?"
41020-150 = "No bombardeio, não me incluam onde eu estou, tá...?"
41020-152 = "...Ah."
41020-153 = "E-eu sei! Não esqueci, então não se preocupe!"
41020-155 = "E-entendi..."
41020-156 = "Aliás, já posso ir para casa...? O oponente já foi embora..."
41020-157 = "É que aqui... é úmido e tem muitos insetos..."
41020-158 = "E, sabe, eu fico com medo de ficar sozinha..."
41020-159 = "Miyu. Uma elite da SRT não deveria ficar reclamando por causa de insetos."
41020-160 = "Se vai continuar dizendo essas coisas, deveria ter ido para a Valkyrie logo de uma vez."
41020-161 = "Lá, você poderia viver tranquilamente controlando o tráfego, sem passar por situações desagradáveis."
41020-162 = "I-isso é, bem..."
41020-163 = "...Mais importante, Miyu, você está vendo o drone?"
41020-164 = "Me avise quando conseguir medir a altitude, vou derrubá-lo imediatamente."
41020-165 = "C-certo... espere um pouco..."
41020-167 = "Saki, espere. Não recomendo disparos desnecessários. Como não podemos contar com suprimentos agora, devemos vigiar os arredores enquanto..."
41020-168 = "Cala a boca!"
41020-169 = "Por que você está me dando ordens!?"
41020-170 = "Bem, no fim das contas, somos todas alunas do 1º ano."
41020-171 = "Sem a Presidente do Conselho Estudantil e sem mais amarras, acho que não precisamos mais seguir ordens, né?"
41020-172 = "Ma-mas..."
41020-174 = "Saki-chan, confirmei as coordenadas. Altitude 900m, distância 2500m, azimute 0-3-0..."
41020-175 = "Certo,"
41020-179 = "Alvo travado."
41020-180 = "Moe, deixo o disparo com você."
41020-181 = "Ah, momentos assim são tão empolgantes..."
41020-185 = "Muito bem..."
41020-186 = "Fogo!!"
41020-196 = "Dron de transmissão... perdido."
41020-197 = "Elas sabem que não pertence à Valkyrie, e mesmo assim atacam..."
41020-198 = "Que pessoal descuidado... Como alguém assim conseguiu entrar na SRT?"
41020-199 = "[s] \"Elas são bem animadas, não são?\""
41020-200 = "...Você só pode estar brincando. Queria dizer \"idiotas\", não é?"
41020-201 = "Se fossem apenas idiotas, tudo bem, mas são idiotas com um poder excessivo. É impossível conversar com elas, é o pior tipo de problema."
41020-202 = "Nesse caso, deveríamos solicitar apoio ao Comitê Disciplinar de cada distrito..."
41020-206 = "Primeiro, contate o Comitê Disciplinar de Gehenna—"
41020-207 = "[s3] \"...Deixe comigo, provavelmente vai dar certo.\"\n[s4] \"Talvez a gente consiga dar um jeito.\""
41020-208 = "...Sim?"
41020-209 = "...Sim?"
41020-210 = "Nesta situação, com menos de 5 pessoas capazes de lutar...?"
41020-211 = "[s5] \"Kirino, Fubuki, vamos lá.\"\n[s6] \"Vamos parar o Esquadrão RABBIT.\""
41020-214 = "Sim! ...Sim!?"
41020-215 = "Vo-você está brincando, né...?"
41020-216 = "O oponente é a SRT, sabia?"
41020-221 = "...Sinto muito, Sensei."
41020-222 = "Basicamente, elas não são combatentes, pertencem ao Departamento de Segurança Pública, que vive no mundo da lua."
41020-223 = "Nem o Departamento de Guarda nem o de Segurança Pública conseguiram lidar com elas. Você acha mesmo que elas sozinhas podem contê-las?"
41020-224 = "Já ouvi rumores sobre o Sensei, mas com esse grupo improvisado..."
41020-225 = "Existe um abismo intransponível entre a elite e as outras alunas."
41020-226 = "[s] \"Para mim, todas elas continuam sendo apenas \"alunas\".\""
41020-230 = "...Entendo."
41020-231 = "Já que o Schale assumirá a responsabilidade... bem, não vou impedi-lo."
41020-235 = "...Atenção, todos os que ainda podem lutar. A partir de agora, sigam as instruções do Sensei do Schale e deem suporte às alunas do Departamento de Segurança Pública!"
41020-237 = "Ei, espera um pouco! É sério!? Você está falando sério!?"
41020-238 = "Não pode ser, a gente vai ser derrotada na hora! Sensei, você enlouqueceu!?"
41020-239 = "[s7] \"Estou são, sim.\"\n[s8] \"Vai dar tudo certo, tenho certeza.\""
41020-240 = "Fubuki, vai dar certo! Se tivermos o comando do Sensei [USERNAME], a gente consegue! Provavelmente!!"
41020-241 = "Fubuki, vai dar certo! Se tivermos o comando do Sensei [USERNAME], a gente consegue! Provavelmente!!"
41020-242 = "Além disso, para proteger a segurança dos cidadãos... não podemos simplesmente ignorar essa situação!"
41020-243 = "Ah, droga, meus cálculos foram por água abaixo... Se soubesse disso, teria fingido estar doente..."
41020-244 = "Ora, ora. Se a gente conseguir completar a missão, talvez ganhemos até uma folga especial."
41020-245 = "E talvez até consigamos uma chance de transferência para o Departamento de Guarda!"
41020-246 = "A segunda parte não me importa muito, mas fazer o quê..."
41020-247 = "Vamos tentar só um pouquinho, vai?"
41020-248 = "Departamento de Segurança Pública,"
41020-249 = "Entrando em ação!"
