[translation]
41020-1 = "Episódio 2;Visitas Indesejadas"
41020-3 = "Uou!?#nTiros?!"
41020-4 = "Aqui é um ponto cego, certeza……#nDe onde estão atirando?!"
41020-9 = "……Quanta ingenuidade."
41020-10 = "Não conhecem câmera térmica? Não adianta nada se esconder."
41020-14 = "Moe, alvos contidos!#nManda o bombardeio!"
41020-15 = "Coordenadas, [ruby=Víctor Kilo]VK4[/ruby]-0-4-5!"
41020-16 = "Fogo!"
41020-22 = "Hehehe, já tava cansando de esperar!"
41020-30 = "Um drone?!"
41020-31 = "Está vindo direto pra cá, corre!!"
41020-37 = "Que explosão foi essa?!"
41020-41 = "Esquadrão Alpha, respondam!"
41020-43 = "Vocês estão vendo isso,#ntelespectadores?"
41020-44 = "Os Departamentos de Segurança não consegue nem revidar!"
41020-45 = "Depois dos Departamentos de Segurança Comuns,#nparece que o \"Departamento de Segurança Especial\" também vai rodar!#nSerá que a única força que sobrou na Valkyrie é o#nDepartamento de Segurança Comunitária……?!"
41020-46 = "Disseram que o protesto era só de algumas alunas da Academia Especial SRT,#nmas mesmo assim a diferença de poder é brutal."
41020-47 = "O que será que vai acontecer a partir daqui……!"
41020-48 = "Pois é, será que a Valkyrie tem alguma carta na manga?!"
41020-49 = "Ah, que saco, calem a boca!"
41020-50 = "Quem deu permissão pra filmar?!#nDesliga essa câmera logo!"
41020-51 = "Opa, deu ruim!"
41020-52 = "Melhor a gente dar no pé antes que a bronca piore!"
41020-53 = "Não atrapalhem! Saiam da frente!"
41020-54 = "Droga, a Kronos……#nInsuportáveis como sempre……!"
41020-55 = "Mas não dá pra negar que estamos sem pessoal……#nE aquelas idiotas do Departamento de Segurança Comunitária#nnão servem pra nada……"
41020-56 = "[s] \"Nossa, o bicho tá pegando aqui, hein……\""
41020-58 = "……Quem diabos é você?"
41020-59 = "Não está vendo que estamos no meio de um tiroteio!?#nCivis não podem ficar aqui, dá o fora!!!"
41020-65 = "[ns] Entrego a carta de recomendação da Rin-chan."
41020-66 = "Isso é……#numa carta da Chefe de Administração……?"
41020-67 = "No lugar do Escritório de Defesa……#na \"Schale\"?!"
41020-68 = "……P-Peço mil perdões pela grosseria……"
41020-69 = "Acredito que esta seja a primeira vez que nos encontramos."
41020-75 = "Sou a responsável em campo por esta operação.#nChefe do Departamento de Ordem Pública da Academia Polícial Valkyrie,#nKanna."
41020-76 = "[s1] \"Prazer em conhecê-la.\"\n[s2] \"Como tá a situação por aqui?\""
41020-77 = "Bom, é mais ou menos o que você tá vendo……"
41020-78 = "Bom, é mais ou menos o que você tá vendo……"
41020-79 = "Quase não temos mais tropas e a moral das meninas está no fundo do poço."
41020-80 = "No começo a gente ia esmagar elas com a vantagem numérica,#nmas o poder de fogo da SRT é um absurdo……"
41020-81 = "O pessoal que sobrou também já……"
41020-86 = "Chegamos!#nKirino do Departamento de Segurança Comunitária, se apresentando!"
41020-87 = "A gente já pode entrar em ação?!"
41020-88 = "……Isso aqui não tá meio que acabado já?#nNão há mais o que a gente fazer."
41020-90 = "Só nos sobrou a \"Departamento de Segurança Comunitária\"."
41020-91 = "Ah, Sensei!#nQue coincidência, você veio dar suporte pra nós?!"
41020-92 = "Vir parar no meio desse fogo cruzado, você não tem sossego mesmo,#nhein."
41020-93 = "Se a gente tiver os comandos do Sensei, a missão já tá concluída!"
41020-94 = "Vamos, não podemos ficar aqui de braços cruzados!#nVamos para cima!"
41020-95 = "Esperem aí, não façam nada sem uma ordem!#nO que vocês acham que vão conseguir!?"
41020-96 = "Os Departamentos de Seguranças já quase foram totalmente aniquiladas.#nAcham mesmo que dão conta do recado?"
41020-97 = "Vocês mal têm armas que prestem……#nDe onde tiraram a ideia de que podem vencer?"
41020-98 = "……Eu achei que vocês pelo menos tivessem noção da própria incapacidade."
41020-99 = "M-mas os civis estão apavorados……#nA gente não pode só ficar aqui olhando……"
41020-100 = "……Admiro a coragem,#nmas só força de vontade não ganha batalha."
41020-101 = "Até pensarmos em outro plano, fiquem de prontidão aqui."
41020-102 = "S-sim, senhora……"
41020-103 = "Sorte a nossa……#nPior que ela tá certa……"
41020-104 = "[s] \"Vocês têm alguma informação sobre as alunas que ocuparam o parque?\""
41020-105 = "Sim, é um Esquadrão de calouras da \"Academia Especial SRT\"……#nO\"Esquadrão RABBIT\"."
41020-106 = "Com o fechamento da SRT,#nelas deveriam ter sido transferidas para os nossos departamentos de seguranças,#nmas……"
41020-107 = "Vai saber o que deu nelas,#ndo nada ocuparam o parque e começaram um motim exigindo o#n\"cancelamento do fechamento da academia especial SRT\"."
41020-108 = "Elas estão em poucas, mas usam equipamentos de ponta.#nÉ por isso que estamos apanhando tanto……"
41020-109 = "[s] \"Entendi. Tem mais algum detalhe sobre elas que eu possa ver?\""
41020-110 = "Bem, temos as fichas que o Conselho Estudantil Geral nos forneceu……"
41020-114 = "Ah, pra ver o rosto delas?#nAh, é mais rápido olhar pra ali!#nInfelizmente, parece que um drone de transmissão da Kronos conseguiu infiltrar lá no meio."
41020-119 = "……Hã? Tá olhando o quê?#nQuer tomar uns [ruby=Sistemas de Defesa Aérea Portáteis]MANPADS[/ruby] na cara aí?"
41020-120 = "Hehehe…… relaxa, pra que tanto nervosismo?"
41020-121 = "Elas não vão conseguir virar esse jogo mesmo.#nQual o problema se filmarem a gente agora?"
41020-122 = "Já que estão filmando,#nvamos expor pro mundo a incompetência daquele Conselho Estudantil Geral."
41020-123 = "Então…… Conselho Estudantil Geral, tão assistindo a gente~?"
41020-124 = "Acho que já deu pra perceber que a ideia de vocês foi uma tremenda burrice,#nné?"
41020-125 = "Enquanto nós estivermos aqui,#na Academia Especial SRT nunca vai acabar!"
41020-127 = "Saki, Moe.#nParem de provocar."
41020-128 = "Nossa missão é usar o combate para conseguir uma posição de vantagem nas negociações.#nNão precisamos ficar fazendo \"showzinho\"."
41020-130 = "Poxa, que chatice……#nA Miyako leva tudo a sério demais."
41020-134 = "……Esse zumbido do drone tá me irritando.#nBora explodir isso logo."
41020-138 = "Ainda temos um monte de munição……#nQuer testar uns tirinhos de leve?"
41020-139 = "Saki~, você tá bolando alguma parada divertida aí, não tá?"
41020-140 = "Vamo nessa? Vamo mandar tudo pros ares?!"
41020-141 = "Por que a gente não descarrega a munição toda igual fogos de artifício?!"
41020-142 = "Caraca, ia ser tão lindo……#nhaha, ai ai……"
41020-143 = "A ideia é boa, mas……#nsinto que a gente está se esquecendo de alguma coisa……"
41020-149 = "V-vocês não tão falando de mim, né……?"
41020-150 = "N-Não vão jogar uma bomba onde eu tô, né……?"
41020-152 = "……Ah."
41020-153 = "C-Claro que não!#nA gente não tinha esquecido de você miyu!#nfica calma!"
41020-155 = "E-entendi……"
41020-156 = "M-mas vem cá, será que eu já posso ir embora……?#nNão tem mais ninguém pra neutralizar……"
41020-157 = "Esse lugar é muito úmido, está cheio de insetos……"
41020-158 = "Eu tô com medo de ficar sozinha aqui……"
41020-159 = "Miyu.#nUma elite da SRT não fica choramingando por causa de uns insetos."
41020-160 = "Se vai ficar de choro, é só ir lá pra Valkyrie agora."
41020-161 = "Aí você vai ter uma vida mansa e sem problemas só controlando o trânsito."
41020-162 = "E-eu, hum……"
41020-163 = "……Foca aqui, Miyu.#nTá vendo o drone?"
41020-164 = "Me passa a altitude dele, vou derrubar."
41020-165 = "C-copiado…… espera um pouquinho……"
41020-167 = "Saki, espera.#nGastar munição à toa não é recomendado.#nNão temos como reabastecer agora,#nentão devemos focar em vigiar o perímetro e……"
41020-168 = "Cala a boca!"
41020-169 = "Quem disse que você manda em mim?!"
41020-170 = "Ah, no fim das contas a gente é tudo do 1º ano mesmo."
41020-171 = "A Presidente sumiu, não tem mais ninguém pra botar coleira na gente,#nentão acho que ninguém aqui precisa receber ordem de ninguém."
41020-172 = "M-mas……"
41020-174 = "……Saki-chan, peguei as coordenadas.#nAltitude 900m, distância 2500m, rumo 0-3-0……"
41020-175 = "Beleza,"
41020-179 = "Alvo na mira."
41020-180 = "Moe, o disparo é seu."
41020-181 = "Nossa, eu chego a arrepiar essas horas……"
41020-185 = "Bora lá……"
41020-186 = "Fogoooo!!"
41020-196 = "……Perdemos o sinal do drone de transmissão."
41020-197 = "Elas sabiam que o drone não era nosso,#ne mesmo assim atiraram……"
41020-198 = "Bando de baderneiras……#nComo gente assim conseguiu entrar na SRT?"
41020-199 = "[s] \"Elas têm bastante energia.\""
41020-200 = "……Só pode tá de brincadeira, você quis dizer \"bastante idiotice\"."
41020-201 = "Se fossem só idiotas tava bom, mas são idiotas armadas até os dentes.#nNão dá nem pra conversar, é o pior cenário possível."
41020-202 = "Desse jeito,#né melhor pedirmos ajuda para o Comitê Disciplinar de algum distrito……"
41020-206 = "Vou entrar em contato com o Comitê de Morais Públicas da Gehenna--"
41020-207 = "[s3] \"……Deixa comigo, acho que dou conta.\"\n[s4] \"Posso dar um jeito nisso.\""
41020-208 = "……Quê?"
41020-209 = "……Quê?"
41020-210 = "Nesta situação?#nSendo que não temos nem mesmo cinco oficiais de pé……?"
41020-211 = "[s5] \"Bora lá, Kirino, Fubuki.\"\n[s6] \"Vamos parar o Esquadrão RABBIT.\""
41020-214 = "Sim!……#nPera, quê?!"
41020-215 = "V-Você tá zoando, né……?"
41020-216 = "O nosso alvo é a SRT, esqueceu?!"
41020-221 = "……Com todo respeito, Sensei."
41020-222 = "Essas meninas não são soldadas.#nElas são do Departamento de Segurança Comunitária,#nvivem na moleza cuidando de ocorrências pacíficas."
41020-223 = "Nem os Departamentos de Segurança Comuns#nou o Departamento de Segurança Especial deram conta.#nVocê acha mesmo que só elas duas vão dar jeito nisso?"
41020-224 = "Eu já ouvi os boatos sobre os seus milagres,#nmas mandar um bando de amadoras pra linha de frente……"
41020-225 = "Existe um abismo de diferença insuperável#nentre as alunas de elite e as comuns."
41020-226 = "[s] \"Sabe de uma coisa Kanna? Para mim, todas elas ainda são as minhas alunas. Eu não vejo diferença alguma.\""
41020-230 = "……Se você diz."
41020-231 = "Já que a Schale vai assumir toda a responsabilidade caso algo dê errado……#nNão vou tentar te impedir Sensei."
41020-235 = "……Atenção, quem ainda estiver em condições de combate:#na partir de agora, sigam as ordens do Sensei da Schale#ne deem suporte para as garotas do Deparamento de Segurança Comunitária!!!"
41020-237 = "P-Peraí, rapidão!#nTá falando sério?!#nSério mesmo?!"
41020-238 = "Isso é loucura, a gente vai ser aniquilada em cinco segundos!#nSensei, você bateu a cabeça?!"
41020-239 = "[s7] \"Estou perfeitamente lúcido.\"\n[s8] \"Vai dar tudo certo, eu acredito em vocês!!!\""
41020-240 = "Fubuki, vai ficar tudo bem!#nSe o Sensei estiver comandando a gente,#nvai dar certo!#nEu acho!!"
41020-241 = "Fubuki, vai ficar tudo bem!#nSe o Sensei estiver comandando a gente,#nvai dar certo!#nEu acho!!"
41020-242 = "Fora que a nossa missão é proteger os civis……#nNão podemos ignorar essa situação!"
41020-243 = "Ai que saco, minha vida virou de ponta-cabeça……#nDevia ter inventado uma dor de barriga pra não vir trabalhar……"
41020-244 = "Calma, calma.#nSe a gente conseguir resolver isso aqui,#nquem sabe não ganhamos uma folga remunerada?"
41020-245 = "Além disso, de repente talvez eu até ganhe a minha transferência#npro Departamento de Ordem Pública!"
41020-246 = "Eu tô pouco me importante para a sua transferência,#nmas fazer o quê, né……"
41020-247 = "Vamos tentar só um pouquinho pra ver no que dá?"
41020-248 = "Departamento de Segurança Comunitária,"
41020-249 = "Entrando em Combate!!!"