[translation]
41020-1 = "Episódio 2: Visitantes Indesejados"
41020-3 = "Nossa! Tiro?!"
41020-4 = "Isso aqui é ângulo morto, não é…? De onde está vindo?"
41020-9 = "…Ingênuo."
41020-10 = "Câmera termal. Se esconder é inútil."
41020-14 = "Moe, interdição concluída! Manda o bombardeio!"
41020-15 = "Coordenadas, VK4-0-4-5!"
41020-16 = "Fogo!"
41020-22 = "Kuhihi, já estava ficando impaciente!"
41020-30 = "Um drone?!"
41020-31 = "Vindo direto na nossa direção, corram!!"
41020-37 = "Que explosão foi aquela?!"
41020-41 = "Esquadrão Alfa, respondam!"
41020-43 = "Estão vendo isso?"
41020-44 = "O Bureau de Segurança está totalmente na defensiva!"
41020-45 = "Depois do Esquadrão de Segurança, agora o Bureau… Só nos resta o Departamento de Segurança da Vida?!"
41020-46 = "Os manifestantes são da Academia SRT, mas mesmo assim a diferença de poder é brutal."
41020-47 = "O que será que vai acontecer depois disso…?!"
41020-48 = "Pois é, será que a Valkyrie tem algum trupe na manga?"
41020-49 = "Ah, que inferno, que barulheira!"
41020-50 = "Quem autorizou essa filmagem? Desliguem essas câmeras agora!"
41020-51 = "Opa, deu ruim!"
41020-52 = "Melhor dar no pé antes que a gente tome uma bronca!"
41020-53 = "Não atrapalhem! Saiam da frente!"
41020-54 = "Droga, a Kronos… como sempre, um saco…"
41020-55 = "Dito isso, é verdade que não temos mais efetivo… o bando de inúteis do Departamento de Segurança da Vida é inútil mesmo…"
41020-56 = "[s] \"Parece que a coisa tá feia, hein…\""
41020-58 = "…Quem é você?"
41020-59 = "Não está vendo? Estamos em combate. Cai fora."
41020-65 = "[ns] Entrego a carta de apresentação da Rin."
41020-66 = "Isso é… uma carta da Oficial Administrativa?"
41020-67 = "Em vez do Escritório de Defesa… 'Schale'?!"
41020-68 = "…M-mil perdões pela grosseria."
41020-69 = "Acredito que seja a primeira vez que nos encontramos pessoalmente."
41020-75 = "Sou a comandante de campo desta operação. Chefe do Bureau de Segurança Pública da Academia Valkyrie, Kanna."
41020-76 = "[s1] \"Sim, prazer.\"\n[s2] \"Como está a situação?\""
41020-77 = "Bem… como pode ver."
41020-78 = "Bem… como pode ver."
41020-79 = "O efetivo está quase inexistente, e o moral foi pro espaço."
41020-80 = "No início, planejávamos sufocar com números, mas o poder de fogo da SRT é surreal…"
41020-81 = "Os que restaram…"
41020-86 = "Com licença! Departamento de Segurança da Vida, Kirino, presente!"
41020-87 = "Podemos sair agora?"
41020-88 = "…Parece que já acabou, não? Isso aí já não é trabalho pra gente."
41020-90 = "Só resta o 'Departamento de Segurança da Vida'."
41020-91 = "Ah, Professor! Que coincidência, o senhor veio nos ajudar?"
41020-92 = "Até nesse tipo de local, hein. Tão ocupado como sempre."
41020-93 = "Com o Professor no comando, o sucesso da operação já está garantido!"
41020-94 = "Vamos, não podemos deixar isso assim! Vamos partir imediatamente!"
41020-95 = "Esperem, não saiam do lugar. O que vocês pensam que vão fazer?"
41020-96 = "Os Esquadrões de Segurança e o Bureau foram praticamente aniquilados. Acham que vão dar conta?"
41020-97 = "Aliás, vocês mal têm equipamento decente… Em que base acham que vencem?"
41020-98 = "…Ora, já deveriam saber da nossa capacidade."
41020-99 = "M-mas os cidadãos estão assustados… não podemos ficar só olhando…"
41020-100 = "…A intenção é louvável. Mas disposição não ganha guerra."
41020-101 = "Aguardem aqui até que encontremos uma outra forma."
41020-102 = "S-Sim senhora…"
41020-103 = "Que sorte. Bem, o que ela disse faz sentido."
41020-104 = "[s] \"Vocês têm alguma informação sobre os alunos que ocuparam o local?\""
41020-105 = "Sim. São um time de primeiro ano da 'Academia SRT'… o 'Esquadrão RABBIT'."
41020-106 = "Originalmente, com o fechamento da SRT, elas seriam transferidas para o Esquadrão de Segurança da Valkyrie…"
41020-107 = "Por alguma razão, de repente ocuparam o parque e iniciaram um protesto, exigindo o 'cancelamento do fechamento'."
41020-108 = "São poucas, mas o equipamento delas é de ponta. É principalmente por isso que estamos apanhando tanto…"
41020-109 = "[s] \"Entendo. Sem comprometer o sigilo, pode me passar mais detalhes?\""
41020-110 = "Bem, temos os dossiês de cada aluna fornecidos pelo Conselho Estudantil…"
41020-114 = "Ah, se quiser ver os rostos, é mais rápido vendo aquilo. Contra a minha vontade, o drone de transmissão da Kronos conseguiu entrar."
41020-119 = "…Hã? Ei, o que estão olhando? Querem levar um Míssil Antiaéreo Portátil no lombo?"
41020-120 = "Kuhihi… não precisa ficar tão na defensiva."
41020-121 = "A essa altura, a situação já não vai se reverter. Que mal tem filmar agora?"
41020-122 = "Já que é assim, podiam até divulgar a burrice do Conselho Estudantil."
41020-123 = "Tá vendo, Conselho Estudantil? Tão vendo?"
41020-124 = "Já perceberam que a ideia de vocês estava errada?"
41020-125 = "Enquanto estivermos aqui, a SRT não acabou!"
41020-127 = "Saki, Moe. Chega de provocações desnecessárias."
41020-128 = "O que precisamos é conquistar vantagem nas negociações através do combate. Não há necessidade de fazer mais do que isso agora."
41020-130 = "Chato… Miyako é sempre tão certinha."
41020-134 = "…O barulho desse drone está irritante. Hora de derrubá-lo."
41020-138 = "Ainda temos munição de sobra… que tal mandar uns tiros pra testar?"
41020-139 = "Saki~, está pensando em algo divertido?"
41020-140 = "Vamos detonar? Com estrondo?"
41020-141 = "Já que é assim, que tal usar toda a munição de uma vez, tipo fogos de artifício?"
41020-142 = "Nossa, que lindo… haaah, haaah…"
41020-143 = "Até que seria bom, mas… estou sentindo que esqueci alguma coisa…"
41020-149 = "A-ah, peraí, isso não seria…"
41020-150 = "O bombardeio… não vai me pegar de jeito nenhum, né…?"
41020-152 = "…Ah."
41020-153 = "J-já sei, não se preocupa! Não esqueci, não!"
41020-155 = "A-ah, sim…"
41020-156 = "Aliás, já posso ir embora? Não tem mais inimigos…"
41020-157 = "Aqui é úmido, tem muito inseto…"
41020-158 = "E também… sozinha é um pouco assustador…"
41020-159 = "Miyu. Uma elite da SRT não chora por causa de insetos."
41020-160 = "Se é pra ficar com esses lamentos, melhor ir logo para a Valkyrie."
41020-161 = "Lá você pode ter seus dias sem preocupações, fazendo bico de guarda de trânsito."
41020-162 = "B-bem, isso é…"
41020-163 = "…Miyu, você está vendo o drone?"
41020-164 = "Se conseguir medir a altitude, me avise. Vou abater agora."
41020-165 = "E-entendido… só um momento…"
41020-167 = "Saki, espere. Não recomendo disparos desnecessários. Não podemos contar com reposição agora, então precisamos manter a vigilância e…"
41020-168 = "Cala a boca!"
41020-169 = "Por que você está me dando ordens?!"
41020-170 = "Bem, originalmente somos todas do mesmo ano, né."
41020-171 = "E sem a Presidente do Conselho, sem amarras… realmente, não vejo por que obedecer a alguém."
41020-172 = "M-mas…"
41020-174 = "…Saki-chan, confirmei as coordenadas. Altitude 900m, distância 2500m, direção 0-3-0…"
41020-175 = "Certo,"
41020-179 = "Target lockado."
41020-180 = "Moe, o disparo é seu."
41020-181 = "Ah, que momento… até me arrepio…"
41020-185 = "Então…"
41020-186 = "Fire!!"
41020-196 = "…Drone de transmissão perdido."
41020-197 = "Elas sabem que não era da Valkyrie, e mesmo assim atacam…"
41020-198 = "Que gente bruta… como é que essas caras conseguiram entrar na SRT?"
41020-199 = "[s] \"São garotas animadas.\""
41020-200 = "…Brincadeira. São 'idiotas'."
41020-201 = "Idiotas já seria ruim, mas idiotas com poder é pior ainda. Difíceis de conversar e extremamente problemáticas."
41020-202 = "A essa altura, melhor pedir reforço para os comitês de disciplina de cada distrito…"
41020-206 = "Primeiro, contate o Comitê de Disciplina de Gehenna…"
41020-207 = "[s3] \"…Deixa comigo. Acho que dá certo.\"\n[s4] \"Deve ter um jeito.\""
41020-208 = "…Hã?"
41020-209 = "…Hã?"
41020-210 = "Nessa situação, com menos de 5 pessoas disponíveis…?"
41020-211 = "[s5] \"Kirino, Fubuki. Vamos.\"\n[s6] \"Vamos deter o Esquadrão RABBIT.\""
41020-214 = "Sim senhora!… Sim senhora?!"
41020-215 = "É brincadeira, né…?"
41020-216 = "O inimigo é a SRT, sabia?"
41020-221 = "…Desculpe, Professor."
41020-222 = "Elas são basicamente não-combatentes. São do Departamento de Segurança da Vida, uma turma relaxada."
41020-223 = "Nem o Esquadrão de Segurança, nem o Bureau conseguiram deter. O senhor acha que essas aí vão conseguir?"
41020-224 = "Ouvi falar da sua reputação, Professor, mas com essa escória…"
41020-225 = "Há um abismo intransponível entre a elite e os comuns."
41020-226 = "[s] \"Para mim, todas são 'alunas'. Não vejo diferença.\""
41020-230 = "…É mesmo."
41020-231 = "O senhor assume a responsabilidade pela Schale… então não vou interferir."
41020-235 = "…Aos que ainda podem lutar. A partir de agora, sigam as ordens do Professor da Schale e apoiem o Departamento de Segurança da Vida!"
41020-237 = "E-ei, peraí! É sério mesmo?! É sério?!"
41020-238 = "Brincadeira, né? Vamos morrer! Professor, tá louco?!"
41020-239 = "[s7] \"Tô louco, sim.\"\n[s8] \"Relaxa, vai dar certo.\""
41020-240 = "Fubuki, vai dar certo! Com o Professor [USERNAME] no comando, a gente consegue! Sei lá! Mas consegue!"
41020-241 = "Fubuki, vai dar certo! Com o Professor [USERNAME] no comando, a gente consegue! Sei lá! Mas consegue!"
41020-242 = "E, acima de tudo, pela segurança dos cidadãos… não podemos ignorar essa situação!"
41020-243 = "Ah, droga, tudo errado… se soubesse, tinha metido um atestado…"
41020-244 = "Bem, fazer o quê. Se a operação der certo, quem sabe ganhamos uma licença extra."
41020-245 = "E talvez consiga uma transferência para o Esquadrão de Segurança."
41020-246 = "A segunda eu dispenso, mas fazer o quê…"
41020-247 = "Vamos tentar rapidinho, só um pouco?"
41020-248 = "Departamento de Segurança da Vida,"
41020-249 = "Partindo!"