[translation]
10048050-1 = "Episódio 5; O pé do arco-íris é"
10048050-3 = "[log]O caracol chora[/log]"
10048050-4 = "[log]O céu rígido se distorce[/log]"
10048050-5 = "[log]Apenas o rei sorri[/log]"
10048050-6 = "[log]A porta se fecha, tingida pelo arco-íris――[/log]"
10048050-7 = "[log]Vamos nos encontrar no instante mágico[/log]"
10048050-11 = "Essa é a carta da famosa Ladra da Benevolência!?"
10048050-13 = "Não, esta é uma cópia. O original está com a Equipe de Supervisão do Dormitório."
10048050-14 = "Eu sei disso! Mas o conteúdo é verdadeiro, né?"
10048050-15 = "Sim."
10048050-16 = "Ei, ei, quem é a Ladra da Benevolência?"
10048050-17 = "É uma ladra que tem como alvo obras de arte. Dizem que ela sempre consegue o que quer..."
10048050-18 = "Ela também é uma das Sete Prisioneiras."
10048050-19 = "Então, e essa carta? Ela avisa antes de roubar?"
10048050-20 = "É isso que a diferencia de um ladrão comum."
10048050-21 = "A Ladra da Benevolência sempre envia um aviso de crime com antecedência, informando o horário e o alvo."
10048050-22 = "Ah~ então isso é um aviso de crime."
10048050-23 = "Pensei que fosse algum tipo de poema!"
10048050-25 = "É verdade, pode parecer assim mesmo."
10048050-26 = "A Ladra da Benevolência sempre envia esses documentos enigmáticos e elaborados."
10048050-27 = "Mas, não entendo..."
10048050-28 = "Hm?"
10048050-29 = "Por que a vice-capitã da Equipe de Supervisão mostrou isso para a Miyo?"
10048050-30 = "Porque... a Hiromi-chan também é da área de literatura."
10048050-31 = "Não, esse tipo de coisa não é informação confidencial?"
10048050-32 = "Ah... bem, é sim, mas..."
10048050-33 = "Mas?"
10048050-34 = "Como ninguém consegue decifrar, parece que deixou de ser tratado como confidencial..."
10048050-35 = "Ah..."
10048050-36 = "Por isso, me pediram para avisar caso eu consiga decifrar."
10048050-40 = "Então, a Miyo já sabe o que está escrito?"
10048050-41 = "Não, ainda não."
10048050-42 = "E agora não é hora de pensar em decifrar..."
10048050-43 = "Como assim?"
10048050-44 = "A ladra também está de olho na Exposição Especial Veronica. E, para piorar, ela até enviou um aviso de crime..."
10048050-45 = "Isso significa que a Equipe de Supervisão vai reforçar a segurança do local da exposição e do depósito várias vezes mais."
10048050-47 = "...!"
10048050-48 = "Então, o trabalho que a Miyo-chan escreveu virando a noite..."
10048050-49 = "Foi por água abaixo. Tenho que reescrever do zero."
10048050-50 = "E ainda tem a decifração do aviso de crime... ugh."
10048050-51 = "Ah... ugh..."
10048050-52 = "Ah... entendi... boa sorte."
10048050-53 = "Miyo-chan..."
10048050-54 = "Eu... vou para a biblioteca..."
10048050-55 = "Quero me acalmar um pouco..."
10048050-56 = "Vou aproveitar e tentar decifrar o aviso de crime também."
10048050-57 = "Já volto."
10048050-62 = "Galeria de Arte de Wildhunt"
10048050-63 = "Ufa..."
10048050-64 = "Certo, vou ler mais uma vez."
10048050-65 = "『O caracol chora, o céu rígido se distorce, e apenas o rei sorri』……。"
10048050-66 = "『Nos encontraremos no instante mágico em que a porta se fecha e tudo se tinge de arco-íris』……。"
10048050-67 = "……O que isso significa?"
10048050-72 = "（Não havia nenhuma pintura com um caracol no catálogo da exposição da Veronica）"
10048050-73 = "（Pelo contrário, há muitas pinturas que retratam o céu…… quer dizer, o que seria um céu rígido?）"
10048050-74 = "（Existem algumas pinturas do rei, mas…… todas com uma expressão severa, nenhuma em que ele esteja sorrindo）"
10048050-75 = "（……Qual pintura será que eles estão visando?）"
10048050-76 = "（Haa…… por que eu fui me meter nessa situação complicada……）"
10048050-82 = "Hm…… um livro……?"
10048050-83 = "Ah, me desculpe! Eu deixei cair……."
10048050-84 = "Não, está tudo bem."
10048050-85 = "Aqui, pegue."
10048050-86 = "Ah, muito obrigada!"
10048050-91 = "（『Introdução à Magia de Invocação』『Encruzilhadas do Tarot』『Convite ao Plano Astral』……）"
10048050-92 = "Ei…… por acaso, você é a Eri do Clube de Pesquisa de Ocultismo……?"
10048050-93 = "Ah! Miyo-san!?"
10048050-94 = "Está tudo bem?#nVocê parecia estar com uma expressão bem preocupada……."
10048050-95 = "Ah, é que…… estou com um pequeno problema……."
10048050-96 = "Tem um enigma difícil que preciso resolver……."
10048050-97 = "Falando nisso, qual é a especialidade da Eri mesmo……?"
10048050-98 = "Sim! Pintura!"
10048050-99 = "Então, você sabe de algo sobre uma pintura que tenha um caracol……?#nRelacionada à exposição da Veronica……."
10048050-100 = "Hã? Caracol……?"
10048050-101 = "Hum…… não me lembro de ter visto……."
10048050-102 = "E quanto a uma pintura onde o céu seja o protagonista?"
10048050-103 = "O céu?"
10048050-104 = "Existem muitas pinturas com o céu, mas como protagonista…… hum……."
10048050-105 = "Então, você não se lembra de ter ouvido a expressão \"céu rígido\"?"
10048050-106 = "Céu rígido……?"
10048050-107 = "Hum, sinto muito. Também não me soa familiar……."
10048050-108 = "Ah!"
10048050-109 = "Céu rígido……."
10048050-111 = "Talvez, possa ser isso!"
10048050-112 = "Você sabe o que é!?"
10048050-113 = "Provavelmente, deve ser lápis-lazúli!"
10048050-114 = "Lápis-lazúli é uma pedra preciosa de cor azul, também chamada de pedra azul."
10048050-115 = "Lapis significa \"pedra\" e lazuli significa \"céu\"…… no sentido de \"pedra do céu\"――"
10048050-116 = "Talvez possamos interpretar isso como \"céu rígido\"."
10048050-117 = "Lápis-lazúli…… pedra do céu…… céu rígido."
10048050-118 = "Entendo…… vou investigar novamente usando \"lápis-lazúli\" como pista."
10048050-119 = "Muito obrigada, Eri-san."
10048050-120 = "Nyufufu, de nada!"
10048050-121 = "A Eri-san entende bastante de pedras preciosas, hein."
10048050-122 = "Hm? Ah, não é bem assim."
10048050-123 = "É que o lápis-lazúli também é usado em tintas!#nComo eu sou da especialidade de pintura."
10048050-124 = "Pedras preciosas…… em tintas!?"
10048050-125 = "Sim. Existe uma tinta chamada ultramarino, feita triturando lápis-lazúli."
10048050-126 = "É uma das tintas mais caras que existem…… hoje em dia, como podemos fazer o ultramarino com outros materiais, o lápis-lazúli natural quase não é mais usado."
10048050-127 = "Dizem que antigamente, alguns pintores chegaram a falir por usar demais o ultramarino!"
10048050-128 = "「……O céu rígido se distorce」"
10048050-129 = "Hã?"
10048050-131 = "Eles trituraram lápis-lazúli, uma pedra do céu, para fazer tinta...!"
10048050-132 = "……?"
10048050-137 = "Ah, me desculpe!#nMe chamaram, então com licença!"
10048050-143 = "O 'céu rígido' se refere à tinta..."
10048050-144 = "Então, 'o caracol chora' também pode ser..."
10048050-145 = "……Vamos investigar. #nSe eu procurar por pigmentos e arredores, devo encontrar alguma pista."
10048050-151 = "(Algumas horas depois...)"
10048050-153 = "Wild Hunt - Terreno baldio"
10048050-158 = "Haa, haa..."
10048050-159 = "Pessoal, vocês estavam aqui..."
10048050-160 = "Eu procurei por toda parte... sério."
10048050-161 = "Ah, é que eu tive um compromisso..."
10048050-162 = "Mas o que houve? Você parecia estar com muita pressa."
10048050-163 = "Ah, Miyo-chan."
10048050-164 = "Aconteceu alguma coisa?"
10048050-165 = "……Eu consegui."
10048050-166 = "?"
10048050-168 = "Eu consegui decifrar a carta de aviso."
