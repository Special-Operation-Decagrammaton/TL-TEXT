[translation]
10048050-1 = "第5話;虹のふもとは"
10048050-3 = "[log]蝸牛は哭き[/log]"
10048050-4 = "[log]硬き空がゆがみ[/log]"
10048050-5 = "[log]王のみぞ微笑む[/log]"
10048050-6 = "[log]戸が閉まり、虹に染まる――[/log]"
10048050-7 = "[log]魔法の刹那にお会いしましょう[/log]"
10048050-11 = "これがかの有名な慈愛の怪盗の手紙！？"
10048050-13 = "いや、これは書き写したもの。原本は寮監隊が持っています。"
10048050-14 = "それは分かってるけど！でも、内容は本物なんだよね？"
10048050-15 = "ええ。"
10048050-16 = "ねね、慈愛の怪盗ってなあに？"
10048050-17 = "芸術品を狙う盗人です。狙った物は必ず手に入れるって噂で……。"
10048050-18 = "七囚人の一人でもあります。"
10048050-19 = "じゃあ[ruby=これ]手紙[/ruby]は？#n盗む前にわざわざ教えてくれるんだ？"
10048050-20 = "それが普通の泥棒と違うところですね。"
10048050-21 = "慈愛の怪盗は事前に必ず犯行予告をし、決行時間とターゲットを知らせる。"
10048050-22 = "へえ～これが予告状なんだ。"
10048050-23 = "なんかの詩かと思った！"
10048050-25 = "たしかに、そうも見えるかも。"
10048050-26 = "慈愛の怪盗は、いつもこういう凝った怪文書を送るんだよね。"
10048050-27 = "でも、わかんないな……。"
10048050-28 = "うん？"
10048050-29 = "どうして寮監隊の副隊長が、これをミヨに見せたの？"
10048050-30 = "だって……ヒロミちゃんも、文学専攻だし。"
10048050-31 = "いや、こういうのって機密情報じゃない？"
10048050-32 = "あ……えっと、そうなんですけど……。"
10048050-33 = "けど？"
10048050-34 = "誰も解読できないから、機密扱いじゃなくなったみたいで……。"
10048050-35 = "あー……。"
10048050-36 = "だから、解読できたら教えてって言われているんです。"
10048050-40 = "じゃあ、ミヨはもう中身がわかってるの？"
10048050-41 = "ううん、まだ。"
10048050-42 = "それに今は解読どころじゃないし……。"
10048050-43 = "どういうこと？"
10048050-44 = "怪盗もベロニカ特別展を狙っているんです。#n最悪なことに、予告状まで出して……。"
10048050-45 = "ということは、寮監隊は展示場と収蔵庫の警備を何倍にも強化するでしょう。"
10048050-47 = "……！"
10048050-48 = "じゃあ、ミヨちゃんが徹夜で書いた作品は……。"
10048050-49 = "水の泡。一から書き直しです。"
10048050-50 = "あと、予告状の解読も……ううっ。"
10048050-51 = "はぁ……うぅ……。"
10048050-52 = "あー……うん……がんばって。"
10048050-53 = "ミヨちゃん……。"
10048050-54 = "私……図書館に行ってきます……。"
10048050-55 = "少し、落ち着きたくて……。"
10048050-56 = "予告状の解読もついでにやってみますね。"
10048050-57 = "いってきます。"
10048050-62 = "ワイルドハントの芸術情報館"
10048050-63 = "ふぅ……。"
10048050-64 = "よし、もう一度読んでみよう。"
10048050-65 = "『蝸牛は哭き、硬き空がゆがみ、王のみぞ微笑む』……。"
10048050-66 = "『戸が閉まり虹に染まる魔法の刹那にお会いしましょう』……。"
10048050-67 = "……どういうこと？"
10048050-72 = "（ベロニカ展の図録に、蝸牛が描かれてる絵なんてなかった）"
10048050-73 = "（逆に、空を描いた絵はたくさんある……というか、硬き空ってなに？）"
10048050-74 = "（王様の絵は何枚かあるけど……険しい顔のばかりで、微笑んでいるものはない）"
10048050-75 = "（……どの絵を狙ってるんだろう）"
10048050-76 = "（はぁ……なんでこんなややこしい事態に……）"
10048050-82 = "あれ……本……？"
10048050-83 = "あっ、ごめんなさい！落としてしまって……。"
10048050-84 = "いえ、大丈夫です。"
10048050-85 = "はい、どうぞ。"
10048050-86 = "わ、ありがとうございます！"
10048050-91 = "（『召喚魔法入門』『タロットの分かれ道』『アストラル界へのいざない』……）"
10048050-92 = "あの……もしかして、オカルト研究会のエリさん……？"
10048050-93 = "あーっ！ミヨさん！？"
10048050-94 = "大丈夫ですか？#nなにやら険しい顔をされてましたが……。"
10048050-95 = "あ、その……少し悩んでて……。"
10048050-96 = "難しい謎解きがあるんです……。"
10048050-97 = "そういえばエリさんの専攻は……。"
10048050-98 = "はいっ！絵画です！"
10048050-99 = "その、カタツムリが描かれた絵について何か知りませんか……？#nベロニカ展関係で……。"
10048050-100 = "へっ？カタツムリ……？"
10048050-101 = "んん……なかったような……。"
10048050-102 = "じゃあ空を主役に描かれた絵は？"
10048050-103 = "空？"
10048050-104 = "空が描かれた絵はたくさんありますが、主役……うーん……。"
10048050-105 = "じゃあ「硬き空」という言葉に、聞き覚えはありませんか？"
10048050-106 = "硬き空……？"
10048050-107 = "うーん、ごめんなさい。それもちょっと……。"
10048050-108 = "あっ！"
10048050-109 = "硬き空……。"
10048050-111 = "もしかしたら、あれのことかもしれません！"
10048050-112 = "知っているんですか！？"
10048050-113 = "おそらく、ラピスラズリのことでは！？"
10048050-114 = "ラピスラズリは青色をした宝石で、青金石とも呼ばれています。"
10048050-115 = "ラピスは「石」、ラズリは「空」……「空の石」という意味で――"
10048050-116 = "それを、「硬き空」と解釈できるかもしれません。"
10048050-117 = "ラピスラズリ……空の石……硬き空。"
10048050-118 = "なるほど……「ラピスラズリ」を手掛かりに、もう一度調べてみます。"
10048050-119 = "ありがとうございます、エリさん。 "
10048050-120 = "にゅふふっ、いえいえ！ "
10048050-121 = "エリさんは宝石に詳しいんですね。"
10048050-122 = "ん？ああっ、そういうわけではないんです。"
10048050-123 = "ラピスラズリは絵の具にも使いますから！#n私は絵画専攻ですし。"
10048050-124 = "宝石を……絵の具に！？"
10048050-125 = "ええ。ウルトラマリンという、ラピスラズリを砕いて作る絵の具があるんです。"
10048050-126 = "絵の具の中でも高級なものでして……最近は他の材料でもウルトラマリンを作れるので、天然のラピスラズリはほとんど使われなくなりましたが。"
10048050-127 = "昔はウルトラマリンを使いすぎて、破産した画家もいたのだとか！"
10048050-128 = "「……硬き空がゆがみ」"
10048050-129 = "へっ？"
10048050-131 = "空の石であるラピスラズリを砕いて、絵の具を作った……！"
10048050-132 = "……？"
10048050-137 = "あっ、ごめんなさい！#nちょっと呼ばれたのでお先に失礼します！"
10048050-143 = "「硬き空」は絵の具のこと……。"
10048050-144 = "じゃあ「蝸牛は哭き」も、もしかして……。"
10048050-145 = "……探してみよう。#n顔料やその近辺を当たれば、何か手掛かりが見つかるはず。"
10048050-151 = "（数時間後……）"
10048050-153 = "ワイルドハント・空き地"
10048050-158 = "はぁ、はぁ……。"
10048050-159 = "みんな、ここに居たんですね……。"
10048050-160 = "探しましたよ……もう。"
10048050-161 = "ああ、ちょっと用事があって……。"
10048050-162 = "で、どうしたの？やけに急いでたみたいだけど。"
10048050-163 = "あっ、ミヨちゃん。"
10048050-164 = "なにかあった？"
10048050-165 = "……できました。"
10048050-166 = "？"
10048050-168 = "予告状の解読が――できました。"
