[translation]
1001615-1 = "思い出は続くものですよ、先生"
1001615-6 = "（そうしてミドリと一緒に……）"
1001615-7 = "（モンスター狩りに励んでいた、そのとき……！）"
1001615-12 = "あっ、スタンが入りましたね！今なら……！"
1001615-17 = "えっ……！？"
1001615-18 = "[ns] \"ミ、ミドリのキャラが固まってる！\""
1001615-19 = "で、電源が落ちちゃいました……。"
1001615-21 = "（色んな方法を試してみるもゲーム機は再起動せず。修理窓口へ持ち込むことになった……）"
1001615-25 = "うーん……一世代前の機種ですか……。"
1001615-26 = "このパーツは生産終了してますし、こっちも新しいのに取りかえないとですが……#n仮に換えたとして、正常に動作する保証は……。"
1001615-27 = "難しい……ですか？"
1001615-28 = "一旦、本社に在庫を確認しますね。少々お待ちください。"
1001615-29 = "はい……。"
1001615-34 = "[ns] \"直るといいね……。\""
1001615-35 = "あとちょっとで倒せそうだったんですが……。"
1001615-36 = "ふぅ……ひさびさに先生と二人きりだったのに……。"
1001615-43 = "お待たせしました。申し訳ありません……本社にも、こちらのパーツの在庫がないようでして。"
1001615-44 = "ええっ！そんな……。"
1001615-45 = "お力になれず――"
1001615-46 = "あ、あの！"
1001615-50 = "どうしても、ダメですか……？た、例えば、中古ショップからパーツを取り寄せるとか……！"
1001615-51 = "こちらはメーカー直営の窓口ですので、そういった規定外のご対応は……。"
1001615-52 = "データが破損するリスクもありますし……。"
1001615-53 = "デ、データが消えちゃう！？そんなの絶対ダメです！"
1001615-54 = "でしたら、こちらはいかがでしょうか。"
1001615-55 = "ちょうど、データ移行サービスが無料になるキャンペーンを実施しておりまして。#n最新機種をお買い上げいただいた方が対象なのですが……。"
1001615-56 = "……。"
1001615-57 = "[ns] \"……。\""
1001615-58 = "それしか、ないんですよね……？"
1001615-59 = "分かりました……。"
1001615-60 = "領収書は、ミレニアムサイエンススクールのゲーム開発部宛てで。"
1001615-61 = "先生、大丈夫……です！これは正当な部費の請求ですから！セミナーも分かってくれます。#nきっと……多分……！"
1001615-62 = "それではデータ移行完了後にお呼びしますので、少々お待ちください。"
1001615-63 = "はい……よろしくお願いします。"
1001615-67 = "[ns] \"……ゲーム機、モモイとお揃いだったりする？\""
1001615-68 = "えっ！ど、どうしてそれを！？"
1001615-69 = "[s] \"なんとなくそう思って。\""
1001615-70 = "顔に出ていましたか……。"
1001615-71 = "そうです。#nあれは、前にお姉ちゃんと一緒に買ったもので……。"
1001615-72 = "お姉ちゃんはゲームをやりすぎて先に壊しちゃったけど……私はずっと使い続けてて……。"
1001615-73 = "でも、ついに私のも……。"
1001615-77 = "そんな顔しないでください先生。いつかは壊れるものですし……。"
1001615-78 = "いや、やっぱりちょっと悔しいですけど……。"
1001615-79 = "あのゲーム機は、お姉ちゃんが頑張って節約したお金で買ってくれたんです。"
1001615-80 = "私を――堕落させるために。"
1001615-84 = "[ns] \"だ、堕落！？\""
1001615-85 = "そうですよ！"
1001615-86 = "もともと、私はそこまでゲーム好きじゃなかったんです……。"
1001615-87 = "い、今では堕落させられましたけど、それでもプレイ時間はお姉ちゃんより短いし……！"
1001615-88 = "対戦の勝率も、私のほうがちょっと上だし、実質私の勝利です！"
1001615-89 = "[s] \"そ、そうだったんだ……。\""
1001615-93 = "でも……やっぱりお姉ちゃんはすごいです。いつも前向きだし……。"
1001615-94 = "面白そうなことにはすぐ飛び込んで、新しいものを見つけては、それを自分の物語に取り入れる……。"
1001615-95 = "クリエイターとして、尊敬しています……。"
1001615-96 = "毎回トラブルに私を巻き込むのは、勘弁してほしいんですけどね。"
1001615-97 = "……それでも、ゲームの世界が眩しすぎて、距離を取ろうとしてた私より、ずっと凄いです。"
1001615-98 = "[s] \"ゲームの世界が眩しい？\""
1001615-99 = "はい……。"
1001615-100 = "ゲームに触れていく中で……。"
1001615-101 = "すごく綺麗なイラストを見たとき――"
1001615-102 = "つい、比べてしまうんです。#nプロの作品と、自分の絵を。"
1001615-103 = "あのときは今より下手だったから、なおさら……。"
1001615-104 = "[s1] \"そうだったんだ。\"\n[s2] \"迷っちゃうときも、あるよね。\""
1001615-107 = "はい……。"
1001615-108 = "他人からの評価を気にしすぎて、何を描きたいのか分からなくなった時期もありました。"
1001615-109 = "……でも、お姉ちゃんは違います。いつだって自分を貫くんです。"
1001615-110 = "好きなものに「好き」と言えて、嫌なことがあってもすぐ忘れちゃう。"
1001615-111 = "この世界は素敵なものであふれてるから、それに触れるだけで精一杯だよって……。"
1001615-112 = "ご、ごめんなさい！つい、昔話を……。"
1001615-113 = "[s] \"ううん。いい話が聞けたよ。\""
1001615-114 = "そ、そうですか？"
1001615-115 = "それは、よかったです……。"
1001615-118 = "お待たせしました！データの移行が完了しました。#nこちらが……お持ちいただいた端末と、購入された最新機種になります。"
1001615-122 = "ありがとうございます。"
1001615-123 = "……前のゲーム機、どうしようかな。"
1001615-124 = "[s3] \"スタンドとショーケースを買って飾ろっか！\"\n[s4] \"記念品だし、大事に保管しなきゃね！\""
1001615-127 = "えっ？そ、そこまでは……。"
1001615-128 = "思い出の品……。"
1001615-129 = "それはそうですけど……。"
1001615-130 = "用意する……？スタンドとケースをですか！？"
1001615-131 = "そそそ、そこまでお世話になるわけには……！"
1001615-132 = "余ってるから譲る……？"
1001615-133 = "……。"
1001615-134 = "どうして余ってるんですか！？"
1001615-135 = "[s] \"大人が積んでるのは、ゲームだけじゃないんだよ！\""
1001615-136 = "そ、そんな悲しいことって……！"
1001615-137 = "……。"
1001615-138 = "先生、実は……。"
1001615-139 = "お姉ちゃんも、前に壊したゲーム機をそうやって飾っていたんです。"
1001615-140 = "私もゲーム機の寿命が来たらやろうと思ってたんですが……。"
1001615-141 = "……お姉ちゃんのマネをしてるみたいで、ちょっと悔しいですね。"
1001615-142 = "[s] \"でも、ミドリにはミドリの眩しさがあるから。\""
1001615-143 = "ありがとうございます……。"
1001615-144 = "……つい、お姉ちゃんに対抗しちゃうんですよね。"
1001615-145 = "姉妹って、ずっとケンカする[ruby=さだめ]運命[/ruby]なのかな……。"
1001615-146 = "[s] \"……まぁ、ほどほどにね！\""
1001615-147 = "安心してください！"
1001615-148 = "対戦では私のほうが強いですから！"
1001615-150 = "（ミドリと一緒に戻って、モンスター狩りを再開した）"
1001615-151 = "（そして……無事狩猟は成功した！）"
