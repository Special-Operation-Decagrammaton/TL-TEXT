[translation]
1001615-1 = "As memórias são algo que perdura, Sensei."
1001615-6 = "（E assim, junto com a Midori...）"
1001615-7 = "（Estávamos nos esforçando na caça aos monstros, quando de repente...!）"
1001615-12 = "Ah, ela foi atordoada! Agora é a hora...!"
1001615-17 = "Hã...!?"
1001615-18 = "[ns] \"M-Midori, o jogo travou!\""
1001615-19 = "O, o console desligou..."
1001615-21 = "（Tentamos vários métodos, mas o console não reiniciou. Acabamos levando-o à assistência técnica...）"
1001615-25 = "Hum... é um modelo de uma geração atrás, não é?"
1001615-26 = "Esta peça já saiu de linha, e teríamos que trocar esta outra também...#nMesmo que trocássemos, não há garantia de que funcionará normalmente..."
1001615-27 = "É... difícil?"
1001615-28 = "Vou verificar o estoque na nossa sede. Por favor, aguarde um momento."
1001615-29 = "Sim..."
1001615-34 = "[ns] \"Espero que consigam consertar...\""
1001615-35 = "Estávamos quase derrotando o chefe..."
1001615-36 = "Puxa... fazia tempo que eu não ficava a sós com o Sensei..."
1001615-43 = "Desculpe pela demora. Sinto muito... parece que a sede também não tem essa peça em estoque."
1001615-44 = "Ah, não! Não pode ser..."
1001615-45 = "Não há nada que possamos fazer—"
1001615-46 = "A-ah, espere!"
1001615-50 = "Não tem jeito mesmo...? Por exemplo, pedir a peça de uma loja de usados...!"
1001615-51 = "Como somos uma assistência autorizada do fabricante, não podemos realizar procedimentos fora das normas..."
1001615-52 = "Além disso, há o risco de corromper os dados..."
1001615-53 = "O, os dados vão sumir!? Isso é impossível, de jeito nenhum!"
1001615-54 = "Nesse caso, que tal isto?"
1001615-55 = "Estamos justamente com uma campanha de transferência de dados gratuita.#nÉ válida para quem adquirir o modelo mais recente, mas..."
1001615-56 = "..."
1001615-57 = "[ns] \"...\""
1001615-58 = "É a única opção, não é...?"
1001615-59 = "Entendido..."
1001615-60 = "Pode emitir o recibo em nome do Departamento de Desenvolvimento de Jogos da Millennium Science School."
1001615-61 = "Sensei, está tudo bem...! Isso é uma solicitação legítima de verba do departamento! O Seminar vai entender. #nCom certeza... provavelmente...!"
1001615-62 = "Certo, chamaremos você assim que a transferência de dados for concluída, por favor, aguarde."
1001615-63 = "Sim... agradeço desde já."
1001615-67 = "[ns] \"...O seu console era igual ao da Momoi?\""
1001615-68 = "Hã! C-como você sabia disso!?"
1001615-69 = "[s] \"Tive um palpite.\""
1001615-70 = "Ficou tão óbvio assim no meu rosto..."
1001615-71 = "Sim. #nAquele foi um que comprei junto com a minha irmã..."
1001615-72 = "Minha irmã jogava tanto que acabou quebrando o dela primeiro... mas eu continuei usando o meu por muito tempo..."
1001615-73 = "Mas, finalmente, o meu também..."
1001615-77 = "Não fique com essa cara, Sensei. Tudo acaba quebrando um dia..."
1001615-78 = "Não, na verdade, eu ainda estou um pouco frustrada..."
1001615-79 = "Aquele console foi comprado com o dinheiro que minha irmã economizou com tanto esforço."
1001615-80 = "Para me... corromper."
1001615-84 = "[ns] \"C-corromper!?\""
1001615-85 = "Sim!"
1001615-86 = "Originalmente, eu nem gostava tanto de jogos assim..."
1001615-87 = "B-bem, agora eu fui corrompida, mas mesmo assim, meu tempo de jogo é menor que o da minha irmã...!"
1001615-88 = "E minha taxa de vitórias em partidas é um pouco maior, então, na prática, eu venci!"
1001615-89 = "[s] \"E-entendi...\""
1001615-93 = "Mas... eu ainda acho que a minha irmã é incrível. Ela é sempre tão positiva..."
1001615-94 = "Ela mergulha de cabeça em qualquer coisa que pareça interessante, descobre coisas novas e as incorpora em suas próprias histórias..."
1001615-95 = "Como criadora, eu a respeito muito..."
1001615-96 = "Embora eu preferisse que ela não me arrastasse para os problemas dela toda vez."
1001615-97 = "...Ainda assim, ela é muito mais incrível do que eu, que tentava manter distância porque o mundo dos jogos brilhava demais para mim."
1001615-98 = "[s] \"O mundo dos jogos brilhava demais?\""
1001615-99 = "Sim..."
1001615-100 = "Enquanto eu jogava..."
1001615-101 = "Quando eu via ilustrações muito bonitas――"
1001615-102 = "Eu acabava comparando. #nAs obras dos profissionais com os meus próprios desenhos."
1001615-103 = "Naquela época eu era ainda pior do que agora, então era ainda pior..."
1001615-104 = "[s1] \"Entendo.\"\n[s2] \"Às vezes a gente se sente perdido mesmo, né?\""
1001615-107 = "Sim..."
1001615-108 = "Teve uma época em que eu me preocupava tanto com a avaliação dos outros que esqueci o que eu queria desenhar."
1001615-109 = "...Mas a minha irmã é diferente. Ela sempre se mantém fiel a si mesma."
1001615-110 = "Ela consegue dizer que gosta do que gosta, e esquece rápido quando algo ruim acontece."
1001615-111 = "Ela diz que o mundo está cheio de coisas maravilhosas, e que só de entrar em contato com elas já é o suficiente..."
1001615-112 = "D-desculpe! Acabei falando do passado..."
1001615-113 = "[s] \"Não, tudo bem. Foi bom ouvir isso.\""
1001615-114 = "É-é mesmo?"
1001615-115 = "Fico feliz em saber disso..."
1001615-118 = "Obrigada por esperar! A transferência de dados foi concluída. #nAqui estão... o dispositivo que você trouxe e o modelo mais recente que você comprou."
1001615-122 = "Muito obrigada."
1001615-123 = "...O que eu faço com o console antigo?"
1001615-124 = "[s3] \"Vamos comprar um suporte e uma vitrine para exibir!\"\n[s4] \"É uma lembrança, você tem que guardar com carinho!\""
1001615-127 = "Hã? N-não precisa chegar a tanto..."
1001615-128 = "Uma lembrança..."
1001615-129 = "É verdade, mas..."
1001615-130 = "Preparar...? Um suporte e uma vitrine!?"
1001615-131 = "N-n-não posso aceitar tanto trabalho assim...!"
1001615-132 = "Você tem sobrando e vai me dar...?"
1001615-133 = "..."
1001615-134 = "Por que você tem sobrando!?"
1001615-135 = "[s] \"Não são só jogos que os adultos acumulam!\""
1001615-136 = "Q-que coisa triste...!"
1001615-137 = "..."
1001615-138 = "Sensei, na verdade..."
1001615-139 = "A minha irmã também exibia o console que ela quebrou antes desse jeito."
1001615-140 = "Eu também estava pensando em fazer isso quando o meu console chegasse ao fim da vida útil..."
1001615-141 = "...É um pouco frustrante parecer que estou copiando a minha irmã."
1001615-142 = "[s] \"Mas a Midori tem o seu próprio brilho.\""
1001615-143 = "Muito obrigada..."
1001615-144 = "...Eu acabo sempre competindo com a minha irmã."
1001615-145 = "Será que irmãs estão destinadas a brigar para sempre...?"
1001615-146 = "[s] \"...Bem, tente pegar leve!\""
1001615-147 = "Pode deixar!"
1001615-148 = "Nas partidas, eu sou melhor que ela!"
1001615-150 = "(Voltei com a Midori e retomamos a caça aos monstros)"
1001615-151 = "(E... a caçada foi um sucesso!)"
