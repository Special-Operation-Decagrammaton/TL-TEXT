[translation]
10033005-1 = "Prólogo; Um pressentimento como um raio em céu azul"
10033005-2 = "Ufa..."
10033005-3 = "Faz tempo que não temos um momento tão tranquilo assim, não é?"
10033005-4 = "Talvez sim~."
10033005-5 = "Sem acidentes ou incidentes dignos de nota. #nUm momento calmo e sereno, e acima de tudo, com você ao meu lado—"
10033005-11 = "Quem dera o tempo pudesse parar aqui mesmo..."
10033005-12 = "...!"
10033005-17 = "Carpa koi"
10033005-18 = "Nas ondulações que saltam"
10033005-19 = "O tempo se move"
10033005-23 = "E ainda por cima, até um haiku da Chise-chan...!"
10033005-24 = "E assim, o mundo viveu em paz para sempre..."
10033005-28 = "E viveram felizes para sempre~."
10033005-29 = "Dito isso, o próximo assunto é: #nParece que o pessoal de Gehenna virá para uma viagem escolar, né?"
10033005-31 = "Entendo, é mesmo?"
10033005-32 = "Animador, não é?"
10033005-33 = "Pois é."
10033005-35 = "Pois é, né."
10033005-39 = "...Niya-sama, o que disse agora?"
10033005-40 = "Viagem escolar. De Gehenna, para cá."
10033005-41 = "Quando digo 'cá', quero dizer para Hyakkiyako."
10033005-42 = "Isso mesmo♪"
10033005-46 = "Isso foi repentino demais, não acha!?"
10033005-48 = "Foi uma surpresa, né?"
10033005-49 = "D-desde quando!? #nE digo mais, e o cronograma!? E o planejamento!?"
10033005-50 = "Não precisa falar tudo de uma vez~?"
10033005-51 = "...Não é só isso. #nMeios de transporte, arranjos de refeições, hospedagem, lojas de lembranças, há uma infinidade de coisas para preparar...!"
10033005-52 = "Ora, ora, dizem que a pressa é inimiga da perfeição, não é?"
10033005-54 = "I-isso tem um fundo de verdade, mas...!"
10033005-55 = "Não precisa se preocupar, não preparei nada ainda♪"
10033005-56 = "Eu imaginei que diria isso!!"
10033005-57 = "Desculpa, né? #nEu esqueci completamente—"
10033005-63 = "...Embora não seja mentira, #nsabe, eu pensei: 'A Kaho vai dar um jeito, né?' tipo isso?"
10033005-64 = "Eu confiei tanto que acabei relaxando... tipo isso?"
10033005-69 = "Você acha mesmo que isso é desculpa!?"
10033005-70 = "Não fica brava~♪"
10033005-75 = "Telefone~?"
10033005-77 = "Alô, aqui é a Waraku Chise."
10033005-78 = "Chise-chan, isso é uma notificação de mensagem!"
10033005-82 = "E, sem querer ser pessimista, isso não seria uma mensagem do lado de Gehenna...?"
10033005-87 = "...É, como eu imaginei."
10033005-92 = "Bem... #nEm relação à viagem escolar, uma reunião entre o Comitê Disciplinar de Gehenna e o Comitê de Mediação de Conflitos Hyakka Ryoran... Sim, o quê!?"
10033005-93 = "E querem que o Departamento Yin-Yang organize tudo... é isso."
10033005-99 = "Kaho, está com sono? #nSe for dormir, vamos logo para a cama~?"
10033005-104 = "É um convite tentador...! #nMas! Não é hora de desmaiar aqui!"
10033005-105 = "Primeiro, vamos organizar a situação!"
10033005-106 = "Kaho, relaxa, relaxa~♪"
10033005-112 = "Não tem como relaxar em uma situação dessas!"
10033005-113 = "Foi mal~..."
10033005-114 = "O pessoal da Academia Gehenna virá para Hyakkiyako em uma viagem escolar... #nIsso é um fato confirmado, certo?"
10033005-115 = "Bem, parece que sim, não é?"
10033005-116 = "Francamente..."
10033005-117 = "Com certeza, nenhum dos procedimentos ou documentos avançou nada, não é?"
10033005-118 = "Resposta correta~♪"
10033005-122 = "Está planejado que, ao mesmo tempo que a viagem escolar, ocorra uma reunião entre o \"Comitê Disciplinar de Gehenna\" e o \"Comitê de Mediação Hyakkaryouran\"..."
10033005-123 = "E nós, o Departamento Yin-Yang, vamos organizar isso."
10033005-125 = "Bem, o Departamento Yin-Yang é, na prática, o conselho estudantil de Hyakkiyako...#nIsso é inevitável."
10033005-126 = "Não temos escolha a não ser nos esforçar, né?"
10033005-134 = "Kaho, está praticando hula?"
10033005-139 = "Não, estou apenas sentindo uma tontura...#nNão posso desmaiar na frente da senhorita Chise."
10033005-140 = "Além disso, não é como se eu estivesse incomodada com essa situação.#nJá que escolheram Hyakkiyako, que se orgulha de seu turismo, como destino da viagem escolar,#nprecisamos nos esforçar...!"
10033005-141 = "Oh, parece que você se animou, hein?"
10033005-146 = "Naturalmente.#nA primeira coisa a fazer é ir até o pessoal do Hyakkaryouran, não acha?"
10033005-147 = "Hum, qual a razão disso?"
10033005-148 = "É apenas uma questão de seguir a ordem."
10033005-149 = "\"Comece por si mesmo\"...#nSe não organizarmos a situação do nosso lado primeiro,#nnão teremos como conversar com o lado de Gehenna."
10033005-150 = "Pelo que parece, o pessoal do Comitê Disciplinar de Gehenna#nchegará amanhã..."
10033005-151 = "Entendo. E o que faremos quanto ao resto?"
10033005-153 = "...Não há o que fazer além do que já estamos fazendo."
10033005-155 = "Niya-sama, por favor, faça tudo o que estiver ao seu alcance também! É só isso!"
10033005-160 = "Nossa, a Kaho é mesmo muito séria."
10033005-161 = "Será que ela vai ficar bem?"
10033005-162 = "Vai ficar tudo bem, sim.#nPara a Kaho, isso é algo de sempre, sabe?"
10033005-163 = "...Bem, o que vamos fazer por aqui?"
10033005-164 = "Qual a razão disso~?"
10033005-165 = "Oh, você aprendeu mais uma resposta, hein, Chise.#nBem, não seria nada divertido fazer um guia turístico comum, não é?"
10033005-166 = "Só superando as expectativas é que algo fica marcado na memória."
10033005-167 = "Talvez seja verdade~?"
10033005-168 = "Então, vamos começar com o trabalho de bastidores?"
10033005-174 = "#video;10033"
