[translation]
10033005-1 = "プロローグ;青天の霹靂な予感"
10033005-2 = "ふぅ……。"
10033005-3 = "これほどゆったりとした時間は、久しぶりですね。"
10033005-4 = "そうかもー。"
10033005-5 = "これといった事故や事件も無し。#n静かで落ち着いた時間、その上、何より隣には――"
10033005-11 = "このまま時が止まってしまえば良いのに……。"
10033005-12 = "……！"
10033005-17 = "錦鯉"
10033005-18 = "跳ねた波紋に"
10033005-19 = "時動く"
10033005-23 = "その上、チセちゃんの俳句まで……っ！"
10033005-24 = "こうして、世界は平和になりましたとさ……。"
10033005-28 = "めでたしめでたし～。"
10033005-29 = "というわけで次の話題なんやけど、#n修学旅行でゲヘナの人たちが来るらしいねぇ？"
10033005-31 = "なるほど、左様ですか。"
10033005-32 = "楽しみだねぇ？"
10033005-33 = "だねー。"
10033005-35 = "そうですねぇ。"
10033005-39 = "……ニヤ様、今なんと？"
10033005-40 = "修学旅行だって。ゲヘナから、うちに。"
10033005-41 = "うちというのは、百鬼夜行に。"
10033005-42 = "そそ♪"
10033005-46 = "いきなりですねぇ！？"
10033005-48 = "ビックリだねー？"
10033005-49 = "い、いつからですか！？#nと言いますか、スケジュールは！？計画は！？"
10033005-50 = "そんな一気に言われても～？"
10033005-51 = "……それだけではありません。#n移動手段や食事の手配、宿やお土産屋さん、準備することが無限に……！"
10033005-52 = "まぁまぁ、急いては事を仕損じるっていうし？"
10033005-54 = "そ、それも一理ありますが……！"
10033005-55 = "心配しなくても、一つも準備してないよん♪"
10033005-56 = "そうだと思いましたよ！！"
10033005-57 = "ごめんねぇ？#nすっかり忘れちゃ――"
10033005-63 = "……というのも嘘じゃないけど、#nほら、カホなら何とかしてくれるし？みたいな？"
10033005-64 = "信頼しきって安心してたらつい……みたいな？"
10033005-69 = "それで許してもらえるとでも！？"
10033005-70 = "怒っちゃや～ん♪"
10033005-75 = "電話～？"
10033005-77 = "もしもし、和楽チセでーす。"
10033005-78 = "チセちゃん、それはメッセージの着信です！"
10033005-82 = "そして、もしかしなくてもそれは、#nゲヘナ側からのメッセージなのでは……？"
10033005-87 = "……や、やはり。"
10033005-92 = "えぇっと……#n修学旅行に際して、ゲヘナ風紀委員会と百花繚乱紛争調停委員会、二者間での会合を……はいぃ！？"
10033005-93 = "その仕切りを、陰陽部に行ってほしい……と。"
10033005-99 = "カホ、眠いの？#n寝るなら早くベッド行こー？"
10033005-104 = "それは魅力的なお誘い……！#nですが！ここで倒れている場合ではありません！"
10033005-105 = "まずは状況を整理しましょう！"
10033005-106 = "カホ、リラックスリラックス～♪"
10033005-112 = "こんな状況でリラックスできるわけないでしょう！"
10033005-113 = "ごめんて～……。"
10033005-114 = "ゲヘナ学園の皆さんが、修学旅行として百鬼夜行にいらっしゃる……#nこれは確定事項なのですね？"
10033005-115 = "まあそうみたいだねぇ？"
10033005-116 = "まったく……。"
10033005-117 = "きっと、手続きや書類周りは何一つ進んでいませんよね？"
10033005-118 = "ご名答～♪"
10033005-122 = "修学旅行と同時に「ゲヘナ風紀委員会」と「百花繚乱調停委員会」との会合が行われる予定……。"
10033005-123 = "それを、私たち陰陽部がセッティングすると。"
10033005-125 = "まぁ陰陽部は実質的に、百鬼夜行の生徒会……#nこれ自体はやむを得ませんね。"
10033005-126 = "頑張るしかないねぇ？"
10033005-134 = "カホ、フラダンスの練習中～？"
10033005-139 = "いえ、眩暈がしてるだけです……#nチセ様の前で倒れるわけには。"
10033005-140 = "それに、この事態を疎んでいるわけでもありません。#n何せ観光が自慢の百鬼夜行を修学旅行先に選んでくれたのですから、#nこれは頑張らねば……！"
10033005-141 = "おっ、やる気出てきたみたいだね～？"
10033005-146 = "当然です。#nまずやるべきは、百花繚乱の元に向かうことでしょうか。"
10033005-147 = "ふむ、その心は？"
10033005-148 = "順番通り、というだけのお話です。"
10033005-149 = "「隗より始めよ」……#nまずはこちら側の状況を整えねば、#nゲヘナ側と話しようがありません。"
10033005-150 = "どうやらゲヘナ風紀委員会の皆さんは、#n明日にはいらっしゃるようですし……。"
10033005-151 = "成程ねぇ、それ以外はどうする？"
10033005-153 = "……どうするも何もありませんよ。"
10033005-155 = "ニヤ様も、やれるだけのことはやっておいてください！以上です！"
10033005-160 = "いやはや、カホは真面目だなぁ。"
10033005-161 = "大丈夫そう～？"
10033005-162 = "大丈夫大丈夫。#nカホにとってはいつものことやし？"
10033005-163 = "……さて、こっちは何をしようかねぇ？"
10033005-164 = "その心は～？"
10033005-165 = "お、また一つ返しを覚えたねぇチセ。#nまぁ、普通の観光案内をしたって、面白うないやん？"
10033005-166 = "想像を超えてこそ、思い出には残るもんやろ。"
10033005-167 = "そうかもね～？"
10033005-168 = "それじゃ、裏方作業も始めるとしよか？"
10033005-174 = "#video;10033"
