[translation]
2003505-1 = "Bom sono, bons sonhos"
2003505-5 = "（O trabalho acabou demorando mais do que eu pensava...）"
2003505-6 = "（Finalmente fui liberado... mas já está bem tarde.）"
2003505-9 = "[ns] \"Eu disse que entraria em contato, mas... será que a Tsubaki já está dormindo?\""
2003505-13 = "Alô? Professor?"
2003505-14 = "Ah... terminou agora, né? Sim, sim..."
2003505-15 = "Desculpe por te fazer esperar...? Não, está tudo bem. #nEu estava dormindo até agora pouco~."
2003505-16 = "Então, Professor. Vou aí te buscar agora mesmo, espere um pouco."
2003505-22 = "（Esperando por 5 minutos...）"
2003505-24 = "Aqui, Professor~."
2003505-25 = "Fufu. Ver o Professor a essa hora, parece algo meio novo..."
2003505-26 = "[s] \"Você não parece com sono hoje. Seus olhos estão mais abertos que o normal.\""
2003505-27 = "É mesmo? Então... #nacho que hoje nós dois estamos vendo um lado diferente um do outro."
2003505-28 = "...Vamos. É por aqui, Professor."
2003505-29 = "Neste momento, eu sou do Clube de Treinamento de Hyakkiyako e também sua guia. Vou te mostrar um pouco de Hyakkiyako à noite."
2003505-30 = "[s] \"Obrigado, Tsubaki.\""
2003505-42 = "[ns] \"De alguma forma, a Tsubaki está cheia de energia hoje.\""
2003505-43 = "Sim...? Parece que estou?"
2003505-44 = "Fufu. Meu horário de atividade normal é à noite, afinal."
2003505-48 = "Ei, Professor... #nHyakkiyako à noite... não acha que é um lugar misterioso?"
2003505-49 = "Durante o dia é tão cheio de vida... #nmas à noite, fica silencioso, como se o tempo tivesse parado."
2003505-50 = "Dizem que tem gente que não gosta dessa atmosfera e evita sair à noite, mas..."
2003505-51 = "Eu gosto. #nPorque essa também é uma das faces que Hyakkiyako nos mostra."
2003505-52 = "[s] \"É verdade... isso também é Hyakkiyako... com certeza, é sim...\""
2003505-53 = "Ué, Professor... está um pouco ofegante?"
2003505-54 = "Seu ritmo de caminhada diminuiu e seu rosto está vermelho, será...?"
2003505-55 = "Professor... por acaso, você estava cansado hoje?"
2003505-56 = "[s] \"Desculpe por isso...\""
2003505-57 = "Não precisa se desculpar, mas... cuide da sua saúde, tá?"
2003505-58 = "Se o Professor desmaiar, muitas pessoas ficarão tristes."
2003505-59 = "Eu, inclusive, sou uma delas..."
2003505-60 = "[s] \"Eu gostaria de ter tempo para me exercitar...\""
2003505-61 = "O Professor vive ocupado todos os dias, né. #nEu... não posso ser sua guia de exercícios, mas..."
2003505-62 = "Mas... é verdade. Vamos descansar um pouco ali na frente."
2003505-63 = "Cuidar da energia de quem eu estou guiando também é parte do trabalho de guia."
2003505-65 = "（Guiado pela Tsubaki, cheguei a um local de descanso próximo...）"
2003505-74 = "[wa:830]― [log=츠바키 가이드]Ufa...[wa:2830] acho que meus[wa:1800] pés estão doendo.[/log]"
2003505-77 = "― [log=츠바키 가이드]Ainda não estou[wa:2000] acostumada com este sapato.[wa:3630] Sim.[/log]"
2003505-80 = "[wa:830]― [log=츠바키 가이드]O que foi,[wa:1300] Professor?[/log]"
2003505-81 = "[wa:2110]― [log=츠바키 가이드]Ficando me encarando assim...[/log]"
2003505-84 = "[wa:830]― [log=츠바키 가이드]Eh?[wa:2160] Eu pareço...[wa:3050] diferente do[wa:1090] normal...?[/log]"
2003505-87 = "[wa:670]― [log=츠바키 가이드]...[wa:2870] Que estranho.[/log]"
2003505-90 = "― [log=츠바키 가이드]Fufu.[wa:1960] Mas[wa:1600] se o Professor me olha[wa:2880] desse jeito...[/log]"
2003505-91 = "[wa:3740]― [log=츠바키 가이드]Talvez isso[wa:1680] não seja ruim?[/log]"
2003505-94 = "[wa:830]― [log=츠바키 가이드]Ei,[wa:1370] Professor.[/log]"
2003505-95 = "[wa:2110]― [log=츠바키 가이드]Hoje, nós dois...[wa:4360] seria bom se pudéssemos[wa:2680] ter bons sonhos.[/log]"
2003505-99 = "[ns1] \"De alguma forma, parece que já estou dentro de um sonho.\"\n[ns2] \"Tem momentos em que a Tsubaki parece uma personagem de um sonho.\""
2003505-102 = "Fufu. Dentro de um sonho...? Se for no sonho do Professor, talvez eu queira aparecer..."
2003505-103 = "...O Professor de hoje, realmente, parece um pouco diferente do habitual..."
2003505-104 = "Aqui... ainda não é um sonho. #nBons sonhos só acontecem se você tiver um sono tranquilo."
2003505-105 = "Por isso... sempre que quiser dormir profundamente, pode me chamar."
2003505-106 = "Eu ficarei ao seu lado até você pegar no sono."
2003505-107 = "[ns] \"Sim... obrigado...\""
2003505-117 = "Professor? Você dormiu...?"
2003505-121 = "Você estava realmente exausto hoje, não é?"
2003505-125 = "Boa noite, Professor. Tenha bons sonhos."
2003505-126 = "Se possível... eu gostaria que..."
2003505-127 = "Eu aparecesse neles também."
2003505-132 = "[ns3] \"...Ah! Onde é aqui...? Lá fora?\"\n[ns4] \"Tsubaki, acorde! Vamos nos atrasar!\""
2003505-135 = "(Balancei o ombro da Tsubaki que estava dormindo ao meu lado)"
2003505-140 = "Hmm... me deixa dormir só mais um pouquinho..."
2003505-144 = "...Ué? Mimori... não, é o Professor...?"
2003505-145 = "Hmm... Entendi... Ontem nós estávamos aqui..."
2003505-149 = "Bom dia, Professor. Conseguiu dormir bem?"
2003505-150 = "[s5] \"Bom dia, Tsubaki. Obrigado por ontem.\"\n[s6] \"Vamos, precisamos nos apressar ou vamos nos atrasar!\""
2003505-153 = "...É verdade, né... sim."
2003505-154 = "Mas, se pudesse, eu queria ter ficado mais um pouco com você..."
2003505-158 = "(Acalmei a Tsubaki, que parecia relutante em se despedir, e fui trabalhar no Schale)"
