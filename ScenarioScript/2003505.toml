[translation]
2003505-1 = "良い眠り、良い夢"
2003505-5 = "（思ったよりも仕事が長引いてしまった……）"
2003505-6 = "（ようやく解放されたけど……。もうだいぶ遅い時間だ）"
2003505-9 = "[ns] \"連絡すると言ったけど……ツバキはもう寝てるかな？\""
2003505-13 = "もしもし～先生？"
2003505-14 = "あ……今終わったんだね。うん、うん……。"
2003505-15 = "待たせてごめん……？ううん、大丈夫。#nすこし前まで寝てたから～。"
2003505-16 = "それじゃあ、先生。すぐ迎えに行くから、ちょっと待っててね。"
2003505-22 = "（待つこと5分……）"
2003505-24 = "ここだよ、先生～。"
2003505-25 = "ふふっ。こんな時間に先生を見るの、なんだか新鮮な感じがする……。"
2003505-26 = "[s] \"今日は眠たそうじゃないね。いつもより目がぱっちりしてる。\""
2003505-27 = "そうかな？それなら……#n今日はお互いにいつもとは違う一面を見てるってことになるのかな。"
2003505-28 = "……行こう。こっちだよ、先生。"
2003505-29 = "今の私は、百鬼夜行の修行部であり、ガイドでもあるからね。先生に夜の百鬼夜行をすこし案内してあげる。"
2003505-30 = "[s] \"ありがとう、ツバキ。\""
2003505-42 = "[ns] \"なんだか、今日のツバキは元気いっぱいだね。\""
2003505-43 = "うん……？そう見えるかな？"
2003505-44 = "ふふっ。私の普段の活動時間は、夜だからね。"
2003505-48 = "ねえ、先生……。#n夜の百鬼夜行って……なんだか不思議だと思わない？"
2003505-49 = "昼はあんなに活気に溢れてるのに……。#n夜はまるで時間が止まってしまったみたいに静かになるの。"
2003505-50 = "この雰囲気が苦手で、夜は外に出ないようにしてる人もいるらしいけど……。"
2003505-51 = "私は好きなんだ。#nだって、これも百鬼夜行が見せてくれる顔の一つだから。"
2003505-52 = "[s] \"そうだね……これも、百鬼夜行……たしかに、そう……。\""
2003505-53 = "あれ、先生……ちょっと息切れしてる？"
2003505-54 = "歩くスピードも落ちたし、顔も赤くなってるかな……？"
2003505-55 = "先生……もしかして、今日は疲れてた？"
2003505-56 = "[s] \"なんか、ごめんね……。\""
2003505-57 = "謝らなくていいけど……健康には気をつけてね？"
2003505-58 = "先生が倒れたら、悲しむ人がたくさんいるんだよ。"
2003505-59 = "私だって、その一人だから……。"
2003505-60 = "[s] \"運動する時間があればいいんだけど……\""
2003505-61 = "先生は毎日忙しくしてるもんね。#n私は……運動のガイドはしてあげられないけど……。"
2003505-62 = "でも……そうだね。ちょっと歩いたところで、すこし休憩しよう。"
2003505-63 = "案内する人の体力を気遣うのも、ガイドの仕事だから。"
2003505-65 = "（ツバキに案内されて近くの休憩所にやってきた……）"
2003505-74 = "[wa:830]― [log=츠바키 가이드]ふぅ……[wa:2830]ちょっと[wa:1800]足が痛いかも。[/log]"
2003505-77 = "― [log=츠바키 가이드]この靴は[wa:2000]まだ慣れていなくて。[wa:3630]うん。[/log]"
2003505-80 = "[wa:830]― [log=츠바키 가이드]どうしたの、[wa:1300]先生？[/log]"
2003505-81 = "[wa:2110]― [log=츠바키 가이드]こっちをじっと見て……[/log]"
2003505-84 = "[wa:830]― [log=츠바키 가이드]え？[wa:2160]私が何か……[wa:3050]いつもと[wa:1090]違う感じに見える……？[/log]"
2003505-87 = "[wa:670]― [log=츠바키 가이드]……[wa:2870]変なの。[/log]"
2003505-90 = "― [log=츠바키 가이드]ふふっ。[wa:1960]でも[wa:1600]先生がそういう風に[wa:2880]私を見てくれるんだったら……[/log]"
2003505-91 = "[wa:3740]― [log=츠바키 가이드]それも[wa:1680]悪くないかも？[/log]"
2003505-94 = "[wa:830]― [log=츠바키 가이드]ねえ、[wa:1370]先生。[/log]"
2003505-95 = "[wa:2110]― [log=츠바키 가이드]今日は私たち二人とも……[wa:4360]いい夢が見られたら、[wa:2680]いいね。[/log]"
2003505-99 = "[ns1] \"なんだか、もう夢のなかにいるみたいだ。\"\n[ns2] \"ツバキが夢のなかの登場人物みたいに感じる時があって。\""
2003505-102 = "ふふっ。夢のなか……？先生の夢なら出てみたいかも……。"
2003505-103 = "……今日の先生、やっぱりいつもとすこし感じが違うね……。"
2003505-104 = "ここは……まだ夢のなかじゃないよ。#nいい夢は、安眠あってこそ見られるものなんだから。"
2003505-105 = "だからね……ぐっすり眠りたい時はいつでも私を呼んで。"
2003505-106 = "先生が眠るまで、私がずっとそばにいてあげる。"
2003505-107 = "[ns] \"うん……ありがとう……。\""
2003505-117 = "先生？眠っちゃったの……？"
2003505-121 = "今日は本当に疲れてたんだね。"
2003505-125 = "おやすみ、先生。いい夢を見てね。"
2003505-126 = "できれば……その夢のなかにも……。"
2003505-127 = "私が、出てきたらいいな。"
2003505-132 = "[ns3] \"……はっ！ここは……外？\"\n[ns4] \"ツバキ、起きて！遅刻するよ\""
2003505-135 = "（隣で寝ているツバキの肩を揺さぶった）"
2003505-140 = "んん……もうちょっと寝かせてぇ……。"
2003505-144 = "……あれぇ？ミモリ……じゃなくて、先生……？"
2003505-145 = "んー……。そっか……昨日はここで……。"
2003505-149 = "おはよ～先生。よく眠れた？"
2003505-150 = "[s5] \"おはよう、ツバキ。昨日はありがとう。\"\n[s6] \"さあ。いそいで準備しないと遅刻するよ！\""
2003505-153 = "……それは、そうだよね……うん。"
2003505-154 = "でも、できればもうすこし、一緒にいたかったなぁ……。"
2003505-158 = "（なんだか名残惜しそうにしているツバキをなだめて、シャーレに出勤した）"
