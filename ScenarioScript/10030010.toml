[translation]
10030010-1 = "第1話;初日の出を見るなら"
10030010-2 = "ミレニアム・スタディーエリア"
10030010-5 = "うう……休みの日にこんな朝早く起きるとかつらすぎ……"
10030010-7 = "同感です。貴重な休日……それも年末は街中で面白い音が聞けるというのに。#nどうして静かな郊外に行かなくては……"
10030010-8 = "いつもなら寝てる時間なのに……無理して起きたからか、頭痛が……"
10030010-14 = "[ns] \"でも、みんな約束通り来てくれたんだね。\""
10030010-18 = "あれ、[USERNAME]先生？"
10030010-19 = "こんな朝早くからどうしたの……？"
10030010-20 = "[s1] \"チヒロから旅行の話を聞いて……\"\n[s2] \"今日は引率として来たんだけど……\""
10030010-23 = "[ns] \"……もしかして、余計なお世話だったかな？\""
10030010-24 = "ううん！先生ならいつでも歓迎だよ！"
10030010-26 = "一日中[USERNAME]先生の声を聴けるなら、むしろ……"
10030010-27 = "私たちだけかと思って、適当な格好で来ちゃった……"
10030010-29 = "ね。先生が来るって聞いてたら、もっとカッコいいカラーの服にしたのに。"
10030010-30 = "……こんな貴重な情報を逃していたとは、ヴェリタスの一員として甘かったですね。"
10030010-31 = "[s3] \"みんな可愛いよ？\"\n[s4] \"冬服もすごく似合ってるね！\""
10030010-34 = "先生がそう言ってくれるなら、まあいいけど……"
10030010-35 = "それより、あたし達を呼び出したチヒロ先輩はどこ？"
10030010-36 = "「ラフな格好で」と私たちに言っていましたが、もしかして自分だけ気合いが入ってたり――"
10030010-44 = "全員ちゃんと揃ってるね。起こしに行かずに済んで良かった。"
10030010-49 = "チヒロ先輩、その格好は……？"
10030010-50 = "……別の意味で、ものすごく気合いが入ってますね。"
10030010-51 = "先輩、どうしたのそれ。#n山にでも登るの？"
10030010-53 = "うん、そうだけど。"
10030010-54 = "あれ……話してなかったっけ？"
10030010-59 = "キャンプ～っ！？"
10030010-61 = "ただ初日の出を見るだけだったら、わざわざ大晦日の朝に呼び出さないでしょ。"
10030010-64 = "今日これから行くところは、ミレニアム自治区の「東アルプス」。"
10030010-65 = "日の出の名所として有名なんだけど[ruby=ふもと]、麓は[/ruby]キャンプの隠れ名所としても知られてるの。"
10030010-68 = "今日は山の麓にテントを張って、朝になったら山頂まで登って初日の出を見るよ。"
10030010-69 = "文明から離れて、自然に囲まれながら健康的な一日を過ごせば、モニターの外にも楽しい世界があるって気づけるんじゃないかな。"
10030010-75 = "あっ、そうだ先輩！あたし約束があったの思い出した！"
10030010-76 = "うっ、持病のカフェイン欠乏症が……"
10030010-77 = "設置していた盗聴器から緊急の支援要請が――"
10030010-79 = "ダメ。言ったでしょ、これは副部長としての命令だって。"
10030010-80 = "ヒマリにも許可はもらってるから。今日は大人しく私の指示に従うこと。"
10030010-83 = "うぅ……ひどい！鬼！悪魔！"
10030010-84 = "こうしてミレニアムの新たなビッグシスターが誕生するのですね……"
10030010-85 = "先生、助けて……"
10030010-86 = "[s] \"そんな目で見られても……\""
10030010-90 = "[ns5] \"意外と楽しいかもしれないよ！\"\n[ns6] \"私も一緒だから、みんなで頑張ろう？\""
10030010-95 = "先生がそう言うなら……"
10030010-96 = "一日だけなら、耐えられるかも。"
10030010-97 = "先生の声を録音できるなら、私は構いません。"
10030010-99 = "それじゃ、出発前に……"
10030010-104 = "全員カバンを出して。"
10030010-108 = "えっ！？なんで！？"
10030010-109 = "小学生じゃないんだし、おやつは500円まで！なんてルールは無いよね……？"
10030010-111 = "おやつはいくらでも持ち込んでいいけど、キャンプと関係ない電子機器はダメ。"
10030010-112 = "もし持ってきてるなら、各自部室に置いていってね。"
10030010-113 = "なんで！？"
10030010-114 = "さっきも言ったけど、文明から離れて自然の中で過ごすのが目的だからね。"
10030010-115 = "電子機器を持って行ったら、場所が変わるだけでいつもと変わらないでしょう？"
10030010-116 = "私も置いていくから。#n荷物はキャンプに必要な物だけにするよ。"
10030010-117 = "電子機器って……スマホも？"
10030010-118 = "万が一に備えてスマホは持ってくけど、たぶん出番は無いかな。"
10030010-119 = "これから向かうキャンプ場は、電波が悪いからね。"
10030010-120 = "うっ……"
10030010-121 = "それじゃマキから、バッグを出して。"
10030010-125 = "……えっと。"
10030010-129 = "……ソーラー発電機？"
10030010-131 = "えっと、その……"
10030010-132 = "き、緊急の連絡をしたい時、スマホのバッテリーが無いと大変だからさ！"
10030010-133 = "ソーラー発電機があったら、いつでもどこでも充電できるでしょ！"
10030010-134 = "……スマホの出番は無いって言ったでしょ。#n持っていくとしても、モバイルバッテリーで十分。"
10030010-135 = "ポータブル冷蔵庫を使うわけじゃないんだし要らないかな。"
10030010-139 = "こっちは、っと……"
10030010-140 = "……携帯用パラボラアンテナ？"
10030010-141 = "も、もしもの事態に備えて、遭難信号を送るための物です！"
10030010-142 = "電波の届きにくい山では、連絡が取れないと思いますし……"
10030010-143 = "指向性アンテナを使うほどの辺ぴな場所には行かないよ。"
10030010-144 = "というかコレ、インターネット受信用のアンテナじゃない……"
10030010-145 = "他に変なものもってないよね……"
10030010-149 = "……サーバーコンピューター？"
10030010-154 = "キャンプ場に簡易通信拠点でも作るつもりなの！？"
10030010-159 = "だって、丸一日ネットを使えないと思ったら不安で……"
10030010-160 = "それに、最近はノマドワークという働き方もありますから。"
10030010-161 = "せめてネットに接続できる機器くらい、あった方がいいんじゃないかなって？"
10030010-163 = "ダメ、全部置いてきて。"
10030010-164 = "今回のキャンプくらいは、ネットを絶って自然と触れ合うよ。"
10030010-165 = "一日二日くらい、そんな日があってもいいんじゃない？"
10030010-168 = "いや、ネットなしはしんどいって……"
10030010-169 = "たしかに自然と触れ合えるけど……"
10030010-170 = "せっかく先生と過ごせるというのに、録音できないなんて……"
10030010-173 = "……テントに防寒具、調理器具、食材、全部良し。"
10030010-174 = "これで忘れ物は無いかな。"
10030010-179 = "それじゃみんな、張り切ってキャンプ場に向かうよ！"
10030010-180 = "[s] \"おーっ！\""
10030010-183 = "ぶー……"
