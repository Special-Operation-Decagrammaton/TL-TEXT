[translation]
10030010-1 = "Episódio 1; Se for para ver o primeiro nascer do sol"
10030010-2 = "Área de Estudos do Millennium"
10030010-5 = "Ugh... acordar tão cedo num dia de folga é doloroso demais..."
10030010-7 = "Concordo. Um feriado tão precioso... e ainda por cima no fim do ano, quando se pode ouvir sons interessantes pela cidade. #nPor que temos que ir para um subúrbio silencioso..."
10030010-8 = "É um horário em que eu estaria dormindo... talvez seja por ter forçado a barra para acordar, mas estou com dor de cabeça..."
10030010-14 = "[ns] \"Mas, todo mundo veio como prometido, não é?\""
10030010-18 = "Ué, Sensei [USERNAME]?"
10030010-19 = "O que faz aqui tão cedo...?"
10030010-20 = "[s1] \"Ouvi sobre a viagem da Chihiro...\"\n[s2] \"Vim hoje como acompanhante...\""
10030010-23 = "[ns] \"...por acaso, eu fui um incômodo?\""
10030010-24 = "Não! Se é o Sensei, é sempre bem-vindo!"
10030010-26 = "Se eu puder ouvir a voz do Sensei [USERNAME] o dia todo, na verdade..."
10030010-27 = "Achei que seríamos só nós, então vim com qualquer roupa..."
10030010-29 = "É. Se soubesse que o Sensei viria, teria escolhido roupas com cores mais legais."
10030010-30 = "...deixar passar uma informação tão valiosa, como membro da Veritas, fui descuidada."
10030010-31 = "[s3] \"Vocês estão todas lindas, sabia?\"\n[s4] \"As roupas de inverno caíram muito bem em vocês!\""
10030010-34 = "Se o Sensei diz isso, então tudo bem, mas..."
10030010-35 = "Mais importante, onde está a Chihiro-senpai que nos chamou?"
10030010-36 = "Ela nos disse para vir com \"roupas casuais\", mas será que só ela está super preparada—"
10030010-44 = "Estão todas aqui. Que bom que não precisei ir acordar ninguém."
10030010-49 = "Chihiro-senpai, esse visual é...?"
10030010-50 = "...de um jeito diferente, você está super preparada, hein."
10030010-51 = "Senpai, o que é isso? #nVai escalar uma montanha ou algo assim?"
10030010-53 = "Sim, é exatamente isso."
10030010-54 = "Ué... eu não tinha contado?"
10030010-59 = "Acampamento!?"
10030010-61 = "Se fosse só para ver o primeiro nascer do sol, eu não teria chamado vocês na manhã da véspera de Ano Novo, né."
10030010-64 = "O lugar para onde vamos agora é o \"Alpes Orientais\" do Distrito Autônomo de Millennium."
10030010-65 = "É famoso por ser um ponto turístico para ver o nascer do sol, mas a base também é conhecida como um local escondido para acampar."
10030010-68 = "Hoje vamos montar barracas na base da montanha e, quando amanhecer, subiremos até o topo para ver o primeiro nascer do sol."
10030010-69 = "Se passarem um dia saudável longe da civilização e cercadas pela natureza, talvez percebam que existe um mundo divertido fora dos monitores."
10030010-75 = "Ah, é verdade, Senpai! Lembrei que tinha um compromisso!"
10030010-76 = "Ugh, minha deficiência crônica de cafeína está atacando..."
10030010-77 = "Recebi um pedido de suporte urgente de uma escuta que instalei—"
10030010-79 = "Não. Eu disse, isso é uma ordem como vice-presidente."
10030010-80 = "Já tenho a permissão da Himari. Hoje, vocês vão seguir minhas instruções sem reclamar."
10030010-83 = "Uuu... que cruel! Uma ogra! Um demônio!"
10030010-84 = "Então é assim que nasce a nova irmã mais velha do Millennium..."
10030010-85 = "Sensei, me ajuda..."
10030010-86 = "[s] \"Mesmo que me olhem assim...\""
10030010-90 = "[ns5] \"Pode acabar sendo divertido!\"\n[ns6] \"Eu também estarei lá, então vamos nos esforçar juntas?\""
10030010-95 = "Se o Sensei diz isso..."
10030010-96 = "Se for só por um dia, talvez eu aguente."
10030010-97 = "Se eu puder gravar a voz do Sensei, por mim tudo bem."
10030010-99 = "Então, antes de partirmos..."
10030010-104 = "Todas, coloquem suas mochilas aqui."
10030010-108 = "Hã!? Por quê!?"
10030010-109 = "Não somos mais crianças do primário, não existe essa regra de \"o lanche só pode custar 500 ienes\", né...?"
10030010-111 = "Podem trazer quantos lanches quiserem, mas nada de aparelhos eletrônicos que não tenham relação com o acampamento."
10030010-112 = "Se trouxeram algum, deixem na sala do clube."
10030010-113 = "Por que!?"
10030010-114 = "Como eu disse antes, o objetivo é se afastar da civilização e passar um tempo na natureza."
10030010-115 = "Se levarmos aparelhos eletrônicos, não vai mudar nada além do lugar, não é?"
10030010-116 = "Eu também vou deixar os meus para trás. #nVamos levar apenas o necessário para o acampamento."
10030010-117 = "Aparelhos eletrônicos... tipo o celular também?"
10030010-118 = "Vou levar o celular por precaução, mas provavelmente não vamos usá-lo."
10030010-119 = "O acampamento para onde vamos tem um sinal muito ruim."
10030010-120 = "Ugh..."
10030010-121 = "Então, Maki, tire as coisas da sua mochila."
10030010-125 = "...Bem."
10030010-129 = "...Um gerador solar?"
10030010-131 = "Bem, é que..."
10030010-132 = "S-se precisarmos fazer uma ligação de emergência, vai ser um problema se a bateria do celular acabar!"
10030010-133 = "Com um gerador solar, dá para carregar em qualquer lugar e a qualquer hora, né!"
10030010-134 = "...Eu disse que não vamos usar o celular. #nMesmo que leve, um carregador portátil já basta."
10030010-135 = "Não é como se fôssemos usar uma geladeira portátil, então não precisa disso."
10030010-139 = "E aqui, vejamos..."
10030010-140 = "...Uma antena parabólica portátil?"
10030010-141 = "É-é para o caso de uma emergência, para enviar um sinal de socorro!"
10030010-142 = "Como o sinal é ruim nas montanhas, acho que não conseguiríamos contato..."
10030010-143 = "Nós não vamos para um lugar tão remoto a ponto de precisar de uma antena direcional."
10030010-144 = "E aliás, isso não é uma antena para receber internet...?"
10030010-145 = "Você não trouxe mais nada estranho, trouxe...?"
10030010-149 = "...Um servidor de computador?"
10030010-154 = "Você pretende montar uma base de comunicações no acampamento!?"
10030010-159 = "É que, só de pensar em ficar um dia inteiro sem internet, eu fico ansiosa..."
10030010-160 = "Além disso, ultimamente existe esse estilo de trabalho chamado nômade digital."
10030010-161 = "Não seria melhor ter pelo menos um aparelho que consiga conectar na internet?"
10030010-163 = "Nada disso, deixe tudo aí."
10030010-164 = "Pelo menos neste acampamento, vamos nos desconectar da internet e aproveitar a natureza."
10030010-165 = "Um ou dois dias assim não fazem mal a ninguém, não acha?"
10030010-168 = "Não, ficar sem internet é muito difícil..."
10030010-169 = "É verdade que dá para aproveitar a natureza, mas..."
10030010-170 = "Já que vou passar um tempo com o Sensei, é uma pena não poder gravar nada..."
10030010-173 = "...Barraca, roupas de frio, utensílios de cozinha, comida, tudo pronto."
10030010-174 = "Acho que não esquecemos de nada."
10030010-179 = "Então pessoal, vamos animadas para o acampamento!"
10030010-180 = "[s] \"Oba!\""
10030010-183 = "Buu..."
