[translation]
52030-1 = "第3話;新たなお祭り"
52030-5 = "ほら、落っことすなよ！"
52030-6 = "足元気をつけて、ゆっくり行けよ。"
52030-12 = "っと……！この看板、聞いてた話よりデカくないです？"
52030-13 = "お祭り運営委員会の発注ミスだったり……？"
52030-14 = "いや、こいつ[ruby=おんみょうぶ]は陰陽部の[/ruby]特注だよ。#n元々このサイズなんだって。"
52030-15 = "なんでもチセ様直筆の俳句を飾りたいんだそうだ。#nそれも、お祭り会場のどこからでも見えるように。"
52030-29 = "うわっ……！？"
52030-30 = "こんなところで走んな！あぶねーだろ！"
52030-35 = "おい、平気か？"
52030-40 = "ちっ、失敗だな……。"
52030-44 = "んん……？"
52030-50 = "リーダー！#n「チセ様の看板を壊してすり替える作戦」は失敗です！"
52030-55 = "ん……？そんな作戦立てたっけ？"
52030-56 = "あっ、やっぱ[ruby=私たち]魑魅一座[/ruby]らしく、#n「銃撃戦の間に素早くトレード作戦」がいいですかね！？"
52030-58 = "魑魅一座……？#nどっかで聞いたような――"
52030-62 = "あ！思い出した！#nお祭りが近づくと出てくる不良集団！#n難癖つけてクーポンを強奪していくってのはお前たちか！"
52030-64 = "ふんっ。#n他の祭りならともかく、#n「和楽まつり」のクーポンなんざ興味ねえよっ！"
52030-65 = "そーだ！そーだ！#nいくら和楽姫でも、#nリーダーのカリスマと比べちゃ足元にも及ばないんだから！"
52030-66 = "そ、そう思ってくれてるのは嬉しいけど……。"
52030-67 = "今、言うことじゃないというか……。"
52030-69 = "はあ？それならどうして邪魔すんだよ！"
52030-70 = "もしかして、本気でチセ様に恨みが――"
52030-72 = "和楽姫なんか関係ないっての！"
52030-73 = "その看板、先週の俳句大会のやつだろ！？"
52030-75 = "ああ、陰陽部主催の？優勝したのはチセ様だったな。"
52030-77 = "そうだよ！#nリーダーも気合いを入れて参加したのに……。"
52030-78 = "ううっ……卑劣な妨害工作で予選さえも……。"
52030-83 = "予選は出てるからな！？"
52030-85 = "みんな和楽姫ばっか褒めるけど、リーダーの句の方がすごいのに！"
52030-86 = "そーだそーだ！文字に込められた想いに魂が震えたんだからな！"
52030-87 = "みんなもリーダーの俳句を見たら、その素晴らしさに気づくはずなのに！"
52030-89 = "へへっ……ちょっと照れるな。"
52030-93 = "……って、そのために看板すり替えようとしたのか！？"
52030-95 = "だってリーダー、#n大会の後からずっとしょんぼりしてたじゃないですか。"
52030-96 = "だから、リーダーの俳句をお祭り会場のど真ん中に置いて、#nその素晴らしさを広めようかなって！"
52030-97 = "こうなってしまったなら仕方ない……#nここでリーダーの俳句をみんなに聞かせてやりましょう！"
52030-99 = "ま、待て！それは――"
52030-106 = "祭#nり#nの#nご#nは#nん#nは"
52030-108 = "割#n引#n券#nな#nし#nじ#nゃ"
52030-110 = "楽#nし#nめ#nな#nい#nよ#nね"
52030-121 = "ほら、リーダー！みんな感動して声も出ないみたいですよ！"
52030-123 = "……そもそもそれ、俳句か？"
52030-124 = "まぁ……祭りは夏の季語だけど。"
52030-126 = "うるさいな、リーダーが俳句と言ったら俳句なんだ！"
52030-127 = "芸術を型にはめようとするな！"
52030-132 = "やっぱ俳句じゃないような……。"
52030-134 = "う……ううっ……！"
52030-138 = "こ、こうなったら、とりあえず祭りをぶち壊してやる！"
52030-146 = "騒がしいと思ったら……。"
52030-152 = "だ、誰だっ。"
52030-161 = "俳句を披露したい気持ちは分かるけど、お祭りの邪魔はさせないよ。"
52030-162 = "個人的な恨みで暴れようだなんて、感心しないね。"
52030-164 = "みんなの青春を台無しにするつもりか？"
52030-165 = "これ以上の狼藉は、身共たちが許しませんわ！"
52030-171 = "ひゃ、百花繚乱……！"
52030-172 = "り、リーダー、どうしましょう！？#nなんか前より人増えてますけど！"
52030-174 = "百花繚乱対策は……考えてある！"
52030-178 = "勝負だ！今日こそ雪辱を果たすぞ……！"
