[translation]
52030-1 = "Episódio 3; Um novo festival"
52030-5 = "Ei, não derruba isso!"
52030-6 = "Cuidado onde pisa, vai devagar."
52030-12 = "Eita...! Essa placa não é maior do que tinham falado?"
52030-13 = "Será que foi um erro de pedido do comitê organizador do festival...?"
52030-14 = "Não, isso é uma encomenda especial do Departamento Yin-Yang. Dizem que o tamanho original é esse mesmo."
52030-15 = "Dizem que querem exibir um haiku escrito à mão pela própria Chise. E que seja visível de qualquer lugar do local do festival."
52030-29 = "Uau...!?"
52030-30 = "Não corra num lugar desses! É perigoso!"
52030-35 = "Ei, você está bem?"
52030-40 = "Tsc, falhamos..."
52030-44 = "Hmm...?"
52030-50 = "Líder! A 'operação para destruir e substituir a placa da Chise' falhou!"
52030-55 = "Hmm...? A gente tinha planejado uma operação dessas?"
52030-56 = "Ah, então é melhor a gente fazer o nosso estilo, o da Trupe Chimi: 'operação de troca rápida durante o tiroteio'!?"
52030-58 = "Trupe Chimi...? Já ouvi esse nome em algum lugar..."
52030-62 = "Ah! Lembrei! Aquele grupo de delinquentes que aparece quando o festival se aproxima! Então são vocês que ficam arrumando confusão para roubar cupons!"
52030-64 = "Humpf. Mesmo que fosse outro festival, não temos interesse nenhum nos cupons do 'Festival Waraku'!"
52030-65 = "É isso aí! É isso aí! Por mais que a Princesa Waraku seja popular, ela não chega aos pés do carisma do nosso líder!"
52030-66 = "B-bem, fico feliz que pensem assim, mas..."
52030-67 = "Acho que não é hora de dizer isso..."
52030-69 = "Hã? Então por que estão atrapalhando?!"
52030-70 = "Será que vocês têm algum rancor real contra a Chise...?"
52030-72 = "A Princesa Waraku não tem nada a ver com isso!"
52030-73 = "Essa placa é daquele concurso de haiku da semana passada, né?!"
52030-75 = "Ah, o organizado pelo Departamento Yin-Yang? A Chise venceu, não foi?"
52030-77 = "Exatamente! O líder também se esforçou muito para participar, mas..."
52030-78 = "Ugh... por causa de uma sabotagem covarde, nem passamos das eliminatórias..."
52030-83 = "Vocês nem chegaram a participar das eliminatórias, né?!"
52030-85 = "Todo mundo só elogia a Princesa Waraku, mas o haiku do líder é muito melhor!"
52030-86 = "É isso aí! A alma tremeu com os sentimentos colocados naquelas palavras!"
52030-87 = "Se todo mundo visse o haiku do líder, perceberiam o quão maravilhoso é!"
52030-89 = "Hehe... estou até ficando sem graça."
52030-93 = "...Então foi por isso que tentaram trocar a placa?!"
52030-95 = "É que o líder ficou deprimido desde o fim do concurso."
52030-96 = "Por isso, pensamos em colocar o haiku do líder bem no meio do festival para espalhar a sua genialidade!"
52030-97 = "Já que chegamos a esse ponto, não tem jeito... Vamos fazer todo mundo ouvir o haiku do líder agora mesmo!"
52030-99 = "E-esperem! Isso é..."
52030-106 = "A#n #nco#n #nm#n #nida#n #ndo#n #nfe#n #nst#n #niv#n #nal"
52030-108 = "Sem#n #ncu#n #npon#n #nde#n #ndes#n #ncon#n #nto"
52030-110 = "Não#n #nda#n #nda#n #npa#n #nra#n #nap#n #nro#n #nve#n #nita"
52030-121 = "Viu só, líder! Todo mundo está tão emocionado que nem consegue falar!"
52030-123 = "...Pra começo de conversa, isso é um haiku?"
52030-124 = "Bem... 'festival' é uma palavra que remete ao verão."
52030-126 = "Cala a boca, se o líder disse que é um haiku, então é um haiku!"
52030-127 = "Não tente prender a arte em padrões!"
52030-132 = "Ainda acho que não é um haiku..."
52030-134 = "Ugh... ughhh...!"
52030-138 = "Já que é assim, vou acabar com esse festival de uma vez!"
52030-146 = "Pensei que estava barulhento demais por aqui..."
52030-152 = "Q-Quem está aí?!"
52030-161 = "Eu entendo que você queira recitar haicais, mas não vou deixar que atrapalhe o festival."
52030-162 = "Não é nada admirável querer causar confusão por rancor pessoal."
52030-164 = "Você pretende arruinar a juventude de todos?"
52030-165 = "Nós não permitiremos mais nenhuma desordem!"
52030-171 = "H-Hyakka Ryoran...!"
52030-172 = "L-Líder, o que faremos?! #nTem ainda mais gente do que antes!"
52030-174 = "Eu já pensei... em uma estratégia contra a Hyakka Ryoran!"
52030-178 = "É hora do duelo! Hoje eu finalmente vou me vingar...!"
