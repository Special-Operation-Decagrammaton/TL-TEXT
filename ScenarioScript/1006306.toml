[translation]
1006306-1 = "日頃の行い"
1006306-3 = "（……シャーレの用事で市内を歩いていると、ゲームセンターでコユキを見かけた）"
1006306-4 = "ああっ！どうか、どうか！お願いだから今度こそ～～～！"
1006306-9 = "……おっ？"
1006306-15 = "お！お！お！お！お！お！お……！"
1006306-20 = "おおおおおおおおおー！！"
1006306-29 = "あああああああああー！！"
1006306-30 = "なんでえええ！#nこんなのって、ほんと！ありえないでしょ！"
1006306-31 = "これで何回連続失敗！？#nなんで！？私、何か悪いことした！？"
1006306-32 = "もうっ！#nこの！"
1006306-39 = "あああああああああっ！！"
1006306-49 = "[ns1] \"コユキ、どうしたの？\"\n[ns2] \"そんなに台を叩いたら壊れちゃうよ。\""
1006306-52 = "……はっ！#nす、すみません……！"
1006306-56 = "って、あれ！？私、先生にゲーセンにいるって言いましたっけ……？"
1006306-57 = "シャーレの仕事で近くまで……？#nにはは、そんな偶然もあるんですね！"
1006306-58 = "……え？ああ……#n見ての通りゲームしてました！「喫茶店登山」って知ってます？"
1006306-59 = "もうほんと、とんでもないクソゲーなんです！#n操作難易度も高いんですけど、ランダム要素もあるから理不尽に負け続けて……！"
1006306-60 = "はぁ……。他の人はてきとーに遊んでても、あっさり5階くらい行っちゃうものなんですけどね。どうして私は3階にすら届かないのか……。"
1006306-61 = "[s3] \"コユキは本当にゲームが好きなんだね。\"\n[s4] \"前にも似たような光景を見たことがあったような……。\""
1006306-64 = "まあ、そうです……かね？"
1006306-65 = "でも、最近はみんなゲームくらいやりますよね？#nもしかして、先生はゲームが嫌いなんですか？"
1006306-66 = "なーんだ、好きなんじゃないですか！#nにはは、そうだと思ってましたよ！"
1006306-67 = "……え？"
1006306-68 = "ゲームなら何でも好きなのか、って？いやー、何でもってわけじゃないですよ。"
1006306-69 = "チェスとかそういうのはちょっと……。#nたまに先輩たちから誘われますけど、逃げてますね！"
1006306-70 = "どこに何を打って～、今度はこっちに～って計算しないといけないじゃないですか？#nそういうのはあんまり好きじゃなくって。"
1006306-71 = "もっと予想できないようなのがいいんですよ！#nこんなの無理～～～ってところから、いけちゃうみたいな！#nそのほうが面白くないですか？"
1006306-72 = "無理だと思ってたのが成功すると、すごく気持ちいいじゃないですか！#nダメだって言われてることほど、やってやったときに爽快なのと同じですよ！！論理的にはダメですけど！"
1006306-73 = "[s5] \"この前のこと、反省してない……？\"\n[s6] \"何となく理解はできるけど……。\""
1006306-76 = "にはははは！"
1006306-77 = "まあ、残念ながら私は運があまりいいほうじゃないので、いつもこうやって負けてばっかですけど……。"
1006306-78 = "思い通りにいかないからこそ、成功したときに達成感がありますので！"
1006306-79 = "そう、たとえ先輩たちに何度捕まったとしても、諦めずに脱出するのと同じように！！"
1006306-80 = "[s7] \"そこにつなげるんだ？\"\n[s8] \"全然楽しそうには見えなかったけど……。\""
1006306-83 = "もーっ！そこはツッコまないでくださいよ！#nいろんな考え方があるってことです！！"
1006306-84 = "……ん？"
1006306-85 = "日頃の行いが良ければ、ゲーム運も上がるかもしれない、って？"
1006306-86 = "えー……。"
1006306-87 = "先生こそ、そこにつなげるんですか？"
1006306-88 = "どう考えても日頃の行いは関係しないと思いますけど……。"
1006306-89 = "はっ、もしかして私を丸め込もうとしてましたね！？"
1006306-93 = "……つまり？"
1006306-94 = "もし先生の話が本当だとしたら……。"
1006306-95 = "私と違って普段から良い行いをしてる先生は、きっとゲーム運がものすごく高いはず！#nそういうことですよね、ね？"
1006306-96 = "……はい？"
1006306-97 = "……必ずとは言ってない、と？"
1006306-98 = "まあ、そういう言葉が返ってくると思ってましたけど……。"
1006306-99 = "あいにくと先生は～……。"
1006306-100 = "自信が～……。"
1006306-101 = "……なさそう、ですし～？"
1006306-102 = "[s9] \"…………。\"\n[s10] \"私に自信がないって……そう言ったね？\""
1006306-105 = "なんだかんだ、私は自分の運のなさに文句を言いながらも、2階までは到達しましたからね～！"
1006306-106 = "先生がおっしゃる通り～？#n「日頃の行い」が関係してるなら……？"
1006306-107 = "10階くらい、簡単に到達すると思ったんですけどねー！"
1006306-108 = "まー、ダメなときだってありますよ！#n今日はたまたま調子が良くないんですよね？"
1006306-109 = "でも……そうじゃないなら、せめて3階くらい到達できるんじゃないですか？#nどうです、先生？"
1006306-114 = "……にひひっ。やる気になりました？"
1006306-115 = "[s11] \"……そこまで言うなら！\"\n[s12] \"大人の本気を見せてあげようか。\"\n[s13] \"後悔させてあげましょう。\""
1006306-126 = "（それから、コユキの横で「喫茶店登山」を始めた）"
1006306-128 = "（……持っていたお小遣いを全部使っても、2階が限界だった）"
