[translation]
1006306-1 = "o comportamento habitual de alguém (comportamento)"

1006306-3 = "(...... Eu estava andando pela cidade em uma tarefa para Shahreh e vi Koyuki em um fliperama)."

1006306-4 = "Ah! Por favor, por favor! Por favor, desta vez~~!"

1006306-9 = "...... Whoa?"

1006306-15 = "O! O! O! O! O! O! Oh! ......!"

1006306-20 = "Oh, oh, oh, oh, oh!"

1006306-29 = "Aaahhh!"

1006306-30 = "Sim! #nIsso não é possível, de verdade! Não pode ser, não é?"

1006306-31 = "Quantas falhas consecutivas já ocorreram! #n Por quê! Eu fiz algo errado!"

1006306-32 = "Mooo! #n isso!"

1006306-39 = "Aaahhh!"

1006306-49 = "[ns1] \"Koyuki, o que há de errado? \"\n[ns2] \"Se você bater na plataforma com tanta força, ela vai quebrar. \"\"\n[ns2]""

1006306-52 = "...... ha! #n Desculpe, desculpe. ......"

1006306-56 = "O que isso significa? Eu disse ao professor que estava no fliperama ......?"

1006306-57 = "Eu estava nas proximidades para um trabalho em uma placa de Petri ......? #n ha, essas coincidências acontecem, não é mesmo?"

1006306-58 = "...... Eh? Oh ......#n como você pode ver, eu estava jogando um jogo! Você já ouviu falar de "escalada em cafeteria"?"

1006306-59 = "Já é um jogo muito, muito ruim! #nA dificuldade dos controles é alta, mas também há um elemento aleatório, então você continua perdendo de forma irracional. ......"

1006306-60 = "....... Outras pessoas conseguem chegar facilmente ao quinto andar, mesmo se estiverem jogando corretamente. Por que não consigo chegar nem ao terceiro andar? ......"

1006306-61 = "[s3] \"Koyuki realmente gosta de jogos. \"\n[s4] \"Acho que já vi uma cena semelhante antes. ...... \"\n[s3]""

1006306-64 = "Bem, sim. ......?"

1006306-65 = "Mas todo mundo pelo menos joga jogos hoje em dia, não é mesmo? #Quer dizer que seu professor não gosta de jogos?"

1006306-66 = "Não, achei que você tinha gostado! #n ha, achei que você tinha gostado!"

1006306-67 = "...... O quê?"

1006306-68 = "Você me pergunta se eu gosto de algum tipo de jogo? Ah, não, eu não gosto de nada."

1006306-69 = "Não sou fã de xadrez ou algo do gênero. ...... #nDe vez em quando, sou convidado pelos idosos para jogar, mas fujo deles!"

1006306-70 = "Você tem que calcular onde acertar o que - e desta vez aqui, não é? #Eu realmente não gosto desse tipo de coisa."

1006306-71 = "Quero algo mais imprevisível! #nÉ como se você pudesse ir de um lugar onde é impossível fazer algo assim~~! #Isso não seria mais interessante?"

1006306-72 = "É uma ótima sensação quando você consegue fazer algo que achava impossível, não é? #É como quando você faz algo que lhe disseram que não conseguiria fazer, é emocionante quando você consegue! Logicamente, porém, isso não é bom!"

1006306-73 = "[s5] \"\"\"\"\"......? \"\"\n[s6] \"Eu até entendo, mas ....... \""

1006306-76 = "Ha ha ha!"

1006306-77 = "Bem, infelizmente não sou um cara muito sortudo, então sempre perco assim. ......"

1006306-78 = "É porque as coisas não acontecem do jeito que você quer que você sinta uma sensação de realização quando tem sucesso!"

1006306-79 = "Sim, assim como você fugiria sem desistir, não importa quantas vezes fosse pego por seus superiores!"

1006306-80 = " \"\n[s8] \"Não me pareceu nada divertido. ...... \""

1006306-83 = "Ah, não! Por favor, não seja exigente! #nIsso significa que há muitas maneiras de pensar!"

1006306-84 = "...... hmm?"

1006306-85 = "Se você se sair bem regularmente, poderá ter mais sorte no jogo, você acha?"

1006306-86 = "Consulte ......."

1006306-87 = "É o professor que faz a conexão com isso?"

1006306-88 = "Não acho que isso tenha algo a ver com sua rotina diária, nem de longe. ......"

1006306-89 = "Ha, talvez você estivesse tentando me prender!"

1006306-93 = "Quero dizer, ......?"

1006306-94 = "Se a história do professor for verdadeira, acesse ......."

1006306-95 = "Ao contrário de mim, um professor que costuma fazer boas ações deve ter uma sorte tremenda no jogo! #nÉ isso que quero dizer, certo?"

1006306-96 = "...... Sim?"

1006306-97 = "...... nem sempre, você diz?"

1006306-98 = "Bem, eu sabia que você me responderia com essas palavras. ......"

1006306-99 = "Infelizmente, o professor é ~......."

1006306-100 = "Confiança - ......."

1006306-101 = "...... parece não ser, e -?"

1006306-102 = "[s9] \"............. \"\n[s10] \"Você disse em ...... que não tem certeza sobre mim, não disse? \""

1006306-105 = "Que diabos, cheguei ao segundo andar, apesar de ter reclamado da minha falta de sorte!"

1006306-106 = "Como diz o médico -? #n Se a "rotina diária" estiver envolvida ......?"

1006306-107 = "Achei que seria fácil chegar a, digamos, 10 andares!"

1006306-108 = "Bem, às vezes não é bom! #nPor acaso você não está em boa forma hoje, está?"

1006306-109 = "Mas ...... se não, você pode pelo menos chegar ao terceiro andar? #nO que o senhor acha, doutor?"

1006306-114 = "Hihihi para ....... Motivado?"

1006306-115 = "[s11] \"......Se você insiste tanto assim! \"\n[s12] \"Vamos mostrar a eles o quão maduro você realmente é. \"\n[s13] \"Vamos fazer você se arrepender. \"\n[s13]""

1006306-126 = "(Então ele começou a "escalar a cafeteria" ao lado de Koyuki)"

1006306-128 = "(...... Mesmo com todo o dinheiro que eu tinha, o segundo andar era meu limite)"

