[translation]
1006306-1 = "atividades diárias"

1006306-3 = "(...Quando eu estava andando pela cidade a negócios com uma placa de Petri, vi Koyuki no centro de jogos.)"

1006306-4 = "Ah! Por favor, por favor! Por favor, desta vez, por favor!"

1006306-9 = "...Oh?"

1006306-15 = "oh! oh! oh! oh! oh! oh! oh……!"

1006306-20 = "Ooooooooooooo! !"

1006306-29 = "Aaaaaaaaaaa! !"

1006306-30 = "Porque sim! #nIsso é verdade! Isso é impossível!"

1006306-31 = "Quantas vezes seguidas eu falhei nisso? ? #nPor que! ? Eu fiz algo errado! ?"

1006306-32 = "Já! #nIsso!"

1006306-39 = "Aaaaaaaaaaaaaaaaa! !"

1006306-49 = "[ns1] \"Koyuki, o que há de errado?\"\n[ns2] \"Se você bater tanto na mesa, ela vai quebrar.\""

1006306-52 = "...Ah! #nSinto muito...!"

1006306-56 = "É isso! ? Eu contei ao meu Sensei que estava em um fliperama...?"

1006306-57 = "Perto de trabalhar em uma placa de Petri...? Existem tais coincidências em #n!"

1006306-58 = "……foto? Ah...#nComo você pode ver, eu estava jogando! Você conhece a \"escalada em cafeterias\"?"

1006306-59 = "もうほんと、とんでもないクソゲーなんです！#n操作難易度も高いんですけど、ランダム要素もあるから理不尽に負け続けて……！"
1006306-60 = "Suspiro... Mesmo que outras pessoas estivessem jogando muito bem, elas acabariam indo para o 5º andar facilmente. Por que não consigo nem chegar ao terceiro andar?"

1006306-61 = "[s3] \"Koyuki realmente gosta de jogos.\"\n[s4] \"Acho que já vi uma cena parecida antes...\""

1006306-64 = "Bem, isso mesmo... certo?"

1006306-65 = "Mas hoje em dia todo mundo joga, certo? #nTalvez seu Sensei não goste de jogos?"

1006306-66 = "Ei, você gosta, não é? #n pensei assim!"

1006306-67 = "……foto?"

1006306-68 = "Você gosta de todos os tipos de jogos? Não, não se trata de nada."

1006306-69 = "Xadrez e coisas assim... #nÀs vezes meus mais velhos me convidam, mas eu os evito!"

1006306-70 = "Você tem que calcular o que acertar, onde e dessa vez, certo? #nEu realmente não gosto desse tipo de coisa."

1006306-71 = "Eu gosto que seja mais imprevisível! #nÉ como se eu não conseguisse fazer isso, mas não consigo! #nIsso não é mais interessante?"

1006306-72 = "É ótimo quando você consegue algo que pensava ser impossível! #nQuanto mais você diz que não adianta, mais emocionante é fazer isso! ! É logicamente errado!"

1006306-73 = "[s5] \"Você não se arrepende do que aconteceu outro dia...?\"\n[s6] \"Eu posso entender, mas...\""

1006306-76 = "Hahahaha!"

1006306-77 = "Bom, infelizmente não tenho muita sorte, então sempre acabo perdendo assim..."

1006306-78 = "Como as coisas nem sempre saem como planejado, sinto uma sensação de realização quando consigo!"

1006306-79 = "Isso mesmo, não importa quantas vezes você seja pego pelos mais velhos, não desista e fuja! !"

1006306-80 = "[s7] \"Você vai conectá-lo aí?\"\n[s8] \"Não parecia nada divertido...\""

1006306-83 = "Uau! Por favor, não zombe disso! #nExistem muitas maneiras diferentes de pensar! !"

1006306-84 = "……sim?"

1006306-85 = "Você acha que se você se sair bem no dia a dia poderá ter mais sorte no jogo?"

1006306-86 = "Eh..."

1006306-87 = "É o Sensei quem pode conectá-lo a isso?"

1006306-88 = "Não importa como você pense sobre isso, não acho que tenha nada a ver com o que você faz diariamente..."

1006306-89 = "Ha, talvez você estivesse tentando me prender! ?"

1006306-93 = "……Em outras palavras?"

1006306-94 = "Se a história do Sensei for verdadeira..."

1006306-95 = "Ao contrário de mim, os Senseies que sempre fazem coisas boas com certeza terão muita sorte no jogo! #nIsso é o que significa, certo?"

1006306-96 = "……sim?"

1006306-97 = "...Não estou dizendo necessariamente?"

1006306-98 = "Bem, eu esperava que você dissesse algo assim, mas..."

1006306-99 = "Infelizmente, o Sensei..."

1006306-100 = "Confiança..."

1006306-101 = "...Acho que não, certo?"

1006306-102 = "[s9] \"………….\"\n[s10] \"Você disse que não confiava em mim, certo?\""

1006306-105 = "De alguma forma, mesmo reclamando da minha falta de sorte, consegui chegar ao segundo andar!"

1006306-106 = "É como o Sensei diz? #nE se \"comportamento diário\" estiver envolvido...?"

1006306-107 = "Achei que seria fácil chegar ao 10º andar!"

1006306-108 = "Bem, há momentos em que não funciona! #nAcontece que não estou me sentindo bem hoje, certo?"

1006306-109 = "Mas... se não for esse o caso, então você pode pelo menos chegar ao 3º andar, certo? #nO que você acha, senhor?"

1006306-114 = "... Nihihi. Você está motivado?"

1006306-115 = "[s11] \"...Se você fala isso!\"\n[s12] \"Vamos mostrar o quão sério um adulto é.\"\n[s13] \"Vamos fazer você se arrepender.\""

1006306-126 = "(Então, comecei a \"escalar uma cafeteria\" ao lado de Koyuki.)"

1006306-128 = "(... mesmo que eu usasse todo o dinheiro que tinha, o segundo andar era meu limite)"

