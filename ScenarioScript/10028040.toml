[translation]
10028040-1 = "第4話;The good, The bad, The trinity"
10028040-12 = "――おい、列車は今どのあたりにいる？"
10028040-13 = "私たちの約3km後ろです。現在の速度は300km……"
10028040-14 = "……いえ、310km……！315km！#nどんどん速度が上がってます！"
10028040-15 = "くっ……こちらも速度を上げます！"
10028040-19 = "上げたところで意味はあるのか！？#nあっちは300kmを超えてるんだぞ！"
10028040-20 = "お、おかしいんじゃないか……！？#n2分後に衝突します！！"
10028040-21 = "怯むな、しっかりしろ！！"
10028040-22 = "すぐに追い付かれるぞ……いいか、それでも今の速度を維持するんだ！"
10028040-23 = "……まったく、停車駅を無視して暴走中とは聞いたけど、本当だったとは。"
10028040-24 = "いったい中で何が……？#nこのままじゃゲヘナ自治区に列車が……"
10028040-28 = "……まぁいい、この目で確認する。"
10028040-29 = "列車を止めて関係者を洗い出す！#n全員、乗車準備をしろ！"
10028040-30 = "はい！！"
10028040-36 = "また速度が上がった……！？"
10028040-37 = "接触まで残り15秒！！"
10028040-38 = "準備はいいか！"
10028040-39 = "――はい！"
10028040-43 = "……行くぞ！！"
10028040-53 = "残り何両でしょうかね……"
10028040-55 = "えーと、4か？いや、3だな。"
10028040-56 = "良かった良かった、あと少しじゃあないか！ハーハッハッハッハ！"
10028040-58 = "はは……どうしてこうなったんだか……"
10028040-59 = "でも、他の乗客も助けてくれたおかげで、なんとかなってるっす。#nやっぱ停車駅がスキップされたのが大きかったんすかね。"
10028040-63 = "それにしても、あのカスミとかいう人……#nこの短時間で大勢を動かす巧みな話術……"
10028040-64 = "やっぱり、並の指名手配犯じゃないっすね。"
10028040-65 = "これ以上関わると、危ないのでは……"
10028040-66 = "……カバンのことさえなければ……#nいや、せめてこんな関わり方さえしなければ……"
10028040-67 = "ぐうう……"
10028040-68 = "[ns1] \"お疲れ様、イチカ……\"\n[ns2] \"早く一緒にカバンを取り戻そうね。\""
10028040-71 = "やれやれ、独り言の多いお嬢ちゃんだ。"
10028040-72 = "ちなみに、気づいてるか？#n……実は我々が結構似ていることに。"
10028040-74 = "……はい？"
10028040-75 = "な、何を……いったいどこが似てるって言うんすか。"
10028040-76 = "私は「トリニティの正義実現委員会」で、そちらは「ゲヘナのテロリスト」っすよ？"
10028040-77 = "なんなら正反対の立場で、何ひとつ似たところはないと思いますが。"
10028040-79 = "ふーん、そうか？私は違うと思うぞ～"
10028040-80 = "お嬢ちゃん、一見普通そうに見えるけど……"
10028040-81 = "お上品なトリニティのお嬢様というよりは……[ruby=・   ・   ・   ・]こっち側[/ruby]の人間じゃないのか？#nフフフッ。"
10028040-83 = "はぁ……何を言うかと思えば……"
10028040-84 = "適当なこと言わないでほしいっす。#n私はすぐにでもこの列車から降りたいんで。"
10028040-86 = "ハーハッハッハッ！分かったよ！#nとりあえず、そういうことにしとこうじゃないか！"
10028040-87 = "でも、あまり急がないようにな。急がば回れと言うだろう。"
10028040-88 = "残りの前方車両は3つ……先頭まで距離的には短いが、これは――"
10028040-101 = "――どんどん本隊に近づいている、という意味だからな。"
10028040-103 = "ヤツらがここまで来たぞ！！"
10028040-104 = "おい！「アレ」の出番だ！早く出せ！！"
10028040-105 = "……ん？"
10028040-106 = "「アレ」……？"
10028040-107 = "ほぉ……どうやら何かサプライズを用意しているみたいだな？"
10028040-108 = "この身勝手な奴らめ……いつまでもやられっぱなしだと思うなよ！"
10028040-109 = "こんなときのために用意しておいたんだ、覚悟しろ！！"
10028040-124 = "……おおっと！"
10028040-125 = "これはこれは……敵さんは準備がいいじゃないか。"
10028040-126 = "まさか、大砲まで出てくるとはねぇ。"
10028040-128 = "ただの大砲なんかじゃない！#nこれは暴動鎮圧用キャノン砲だ！！"
10028040-130 = "ハハッ、正確にはそうなんだろうが……"
10028040-134 = "……まあ、カッコいいから良しとするか。"
10028040-135 = "[s3] \"……たしかにカッコいいね。\"\n[s4] \"さぞ暴動が多かったんだろうね……\""
10028040-142 = "れ、列車の中であんなものを……"
10028040-143 = "困ったっすね。一旦ここは流れを変えて――"
10028040-144 = "やってみなきゃ分からないだろう！！"
10028040-145 = "さあ、全員突撃だ！あのよく分からん大砲をぶち壊せ――！！！"
10028040-156 = "……はぁ。"
10028040-161 = "……狙われてるぞ！"
10028040-162 = "ま、そうっすよね。"
10028040-169 = "……来たな！！！"
10028040-171 = "――止まれ！！"
10028040-181 = "[ns] \"……この声は！！\""
10028040-182 = "全員、そこまでだ！！"
10028040-183 = "武器を捨てて、両手を上げろ！！"
10028040-184 = "……んん！？"
10028040-185 = "こんなタイミングで乱入だと？"
10028040-186 = "列車の外からっすか？"
10028040-187 = "この列車、まだ元気に走ってるっすけど？"
10028040-188 = "……あっ。もしかして、あの格好は。"
10028040-197 = "……？"
10028040-198 = "……おっ！？"
10028040-199 = "これはこれは～！風紀委員会の皆さんじゃないか！！"
10028040-200 = "聞こえなかったのか？#n止まれと言ったはずだ！"
10028040-205 = "これよりこの列車は……ゲヘナの風紀委員会が統制する！！"
10028040-206 = "今後はすべて、こちらの指示にしたがっ……"
10028040-207 = "てもら……"
10028040-211 = "……せ、先生？"
10028040-212 = "どういうことだ……？#nなぜ先生がこんなところに？"
10028040-213 = "[s5] \"やっほ、イオリ！\"\n[s6] \"会えて嬉しいよ！\""
10028040-216 = "はぁ……今度は何をやらかしたんだ？#n……まぁ、どうせしょうもないことだろうけど。"
10028040-217 = "……で、その隣の人は。"
10028040-219 = "……ど、どうも。イチカと言います。"
10028040-220 = "ええっと、私たちは――"
10028040-221 = "ひゅ～！我らが風紀委員、イオリ様じゃないか！！"
10028040-222 = "久しぶりだな、元気にしてたか？"
10028040-226 = "そうそう、もし可能なら……#nちょっと助けてもらえるとありがたいんだが。"
10028040-227 = "我々はもう旧知の仲だろう？#nこれからの関係性も考えると……な？"
10028040-228 = "あの、私が言うのもアレっすが……"
10028040-233 = "お二人は、敵対関係ですよね。"
10028040-236 = "なっ……"
10028040-237 = "何なんだよ、この組み合わせは――！？"
10028040-238 = "この列車、ゲヘナ行きだろ……？#n何でトリニティの正義実現委員がここにいるんだよ！？"
10028040-239 = "それにカスミって……あのカスミか……！？"
10028040-240 = "まさか先生、ずっとアイツと一緒にいたんじゃないよな……？#nなあ……違うと言ってくれ！！"
10028040-241 = "一発で思い出すとは、さすがはイオリじゃないか！ハーハッハッハ！"
10028040-242 = "お前は黙っておけ！"
10028040-243 = "先生！！本当なのか？本当にコイツと……？#nコイツの仲間になったとか……そんなんじゃ、ないよな！？"
10028040-244 = "私たちがコイツを捕まえるために、どれだけ苦労してるのか知ってる先生が……！"
10028040-245 = "……へ？"
10028040-246 = "私を信じてくれないの……って？"
10028040-247 = "冗談言ってる場合か！そう言うなら信じさせてくれ！！#nこっちは今の状況を理解するので精一杯なんだよ！！"
10028040-251 = "……ん？"
10028040-252 = "今はそれどころじゃない……？"
10028040-253 = "……後ろ？"
10028040-254 = "後ろにいったい何が……？"
10028040-259 = "[ns7] \"キャノン砲が……\"\n[ns8] \"いつの間にか真正面に……\""
10028040-263 = "……これは何だ？"
10028040-267 = "何でこんなものがここに――"
10028040-273 = "[ns9] \"イオリ……！\"\n[ns10] \"だ、大丈夫、イオリ！？\""
10028040-280 = "くっ……よくも！！#n総員、攻撃――！！！！！！"
10028040-281 = "ハーハッハッハッハ！そうこなくってはな！！！"
