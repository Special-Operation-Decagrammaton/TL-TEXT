[translation]
10028040-1 = "Episódio 4; The good, The bad, The trinity"
10028040-12 = "――Ei, onde o trem está agora?"
10028040-13 = "Está a cerca de 3km atrás de nós. A velocidade atual é de 300km……"
10028040-14 = "……Não, 310km……! 315km! #nA velocidade continua aumentando!"
10028040-15 = "Droga…… nós também vamos aumentar a velocidade!"
10028040-19 = "Vai adiantar alguma coisa aumentar agora!? #nEles já passaram dos 300km!"
10028040-20 = "I-isso não é normal……!? #nVamos colidir em 2 minutos!!"
10028040-21 = "Não hesitem, mantenham a calma!!"
10028040-22 = "Eles vão nos alcançar logo…… escutem, mesmo assim, mantenham a velocidade atual!"
10028040-23 = "……Francamente, ouvi dizer que estavam ignorando as estações e correndo desenfreados, mas era verdade."
10028040-24 = "O que diabos está acontecendo lá dentro……? #nSe continuar assim, o trem vai chegar ao Distrito de Gehenna……"
10028040-28 = "……Tanto faz, vou verificar com meus próprios olhos."
10028040-29 = "Vamos parar o trem e descobrir quem são os responsáveis! #nTodos, preparem-se para o embarque!"
10028040-30 = "Sim!!"
10028040-36 = "A velocidade aumentou de novo……!?"
10028040-37 = "Faltam 15 segundos para o contato!!"
10028040-38 = "Estão prontos?"
10028040-39 = "――Sim!"
10028040-43 = "……Vamos nessa!!"
10028040-53 = "Quantos vagões faltam, eu me pergunto……"
10028040-55 = "Hum, quatro? Não, três."
10028040-56 = "Que bom, que bom, falta pouco agora! Hahaha!"
10028040-58 = "Haha…… como foi que chegamos a esse ponto……"
10028040-59 = "Mas, graças à ajuda dos outros passageiros, estamos conseguindo nos virar. #nAcho que o fato de terem pulado as estações de parada foi o que mais pesou."
10028040-63 = "Ainda assim, essa tal de Kasumi…… #nEssa lábia habilidosa para mover tanta gente em tão pouco tempo……"
10028040-64 = "Definitivamente, ela não é uma criminosa procurada comum."
10028040-65 = "Não seria perigoso nos envolvermos mais com isso……?"
10028040-66 = "……Se não fosse pela bolsa…… #nNão, se pelo menos eu não tivesse me envolvido desse jeito……"
10028040-67 = "Grrr……"
10028040-68 = "[ns1] \"Bom trabalho, Ichika……\"\n[ns2] \"Vamos recuperar a bolsa logo juntos.\""
10028040-71 = "Ora, ora, que garota que fala sozinha."
10028040-72 = "A propósito, você percebeu? #n……Na verdade, somos bem parecidos."
10028040-74 = "……Sim?"
10028040-75 = "O-o que…… onde exatamente você acha que somos parecidos?"
10028040-76 = "Eu sou do \"Comitê de Justiça de Trinity\", e vocês são \"terroristas de Gehenna\", não é?"
10028040-77 = "Se bobear, estamos em posições opostas, não acho que tenhamos nada em comum."
10028040-79 = "Hum, é mesmo? Eu acho que não~"
10028040-80 = "Garota, você parece normal à primeira vista, mas……"
10028040-81 = "Em vez de uma dama refinada de Trinity…… você não seria uma pessoa do nosso lado? #nFufufu."
10028040-83 = "Ah…… não acredito no que estou ouvindo……"
10028040-84 = "Por favor, não diga bobagens. #nEu quero descer deste trem o mais rápido possível."
10028040-86 = "Hahaha! Entendido! #nPor enquanto, vamos deixar por isso mesmo!"
10028040-87 = "Mas não tenha tanta pressa. Como dizem, a pressa é inimiga da perfeição."
10028040-88 = "Restam três vagões à frente…… a distância até a locomotiva é curta, mas isso é――"
10028040-101 = "――significa que estamos nos aproximando cada vez mais do grupo principal."
10028040-103 = "Eles chegaram até aqui!!"
10028040-104 = "Ei! É a vez daquela \"coisa\"! Tragam logo!!"
10028040-105 = "……Hm?"
10028040-106 = "Aquela \"coisa\"……?"
10028040-107 = "Ho…… parece que eles prepararam alguma surpresa, não é?"
10028040-108 = "Seus egoístas... não pensem que vou ficar apanhando para sempre!"
10028040-109 = "Eu preparei isso justamente para momentos como este, preparem-se!!"
10028040-124 = "……Opa!"
10028040-125 = "Ora, ora... parece que o inimigo está bem preparado."
10028040-126 = "Quem diria que eles trariam até um canhão."
10028040-128 = "Não é um canhão qualquer!#nEste é um canhão de controle de distúrbios!!"
10028040-130 = "Haha, tecnicamente é isso mesmo, mas..."
10028040-134 = "……Bem, é estiloso, então está valendo."
10028040-135 = "[s3] \"……Realmente, é estiloso.\"\n[s4] \"Deve ter tido muitos distúrbios, hein……\""
10028040-142 = "De, dentro do trem, usar uma coisa dessas..."
10028040-143 = "Isso é um problema. Vamos mudar o rumo das coisas por aqui――"
10028040-144 = "Só saberemos se tentarmos!!"
10028040-145 = "Vamos lá, todos ao ataque! Destruam esse canhão estranho――!!!"
10028040-156 = "……Haa."
10028040-161 = "……Estamos na mira!"
10028040-162 = "É, imagino que sim."
10028040-169 = "……Eles vieram!!!"
10028040-171 = "――Parem!!"
10028040-181 = "[ns] \"……Essa voz!!\""
10028040-182 = "Todos, parem por aí!!"
10028040-183 = "Larguem as armas e levantem as mãos!!"
10028040-184 = "……Hmm!?"
10028040-185 = "Uma invasão bem nessa hora?"
10028040-186 = "De fora do trem?"
10028040-187 = "Este trem ainda está correndo a todo vapor, sabia?"
10028040-188 = "……Ah. Será que, aquele uniforme..."
10028040-197 = "……?"
10028040-198 = "……Opa!?"
10028040-199 = "Ora, ora~! Não são vocês do Comitê Disciplinar!!"
10028040-200 = "Não ouviram?#nEu disse para pararem!"
10028040-205 = "A partir de agora, este trem está sob o controle do Comitê Disciplinar de Gehenna!!"
10028040-206 = "De agora em diante, todos devem seguir nossas instruções……"
10028040-207 = "……"
10028040-211 = "……Se, Sensei?"
10028040-212 = "O que significa isso……?#nPor que o Sensei está aqui?"
10028040-213 = "[s5] \"Olá, Iori!\"\n[s6] \"Estou feliz em te ver!\""
10028040-216 = "Haa... o que vocês aprontaram dessa vez?#n……Bem, deve ser algo trivial de qualquer forma."
10028040-217 = "……E quem é essa pessoa ao seu lado?"
10028040-219 = "……O, olá. Meu nome é Ichika."
10028040-220 = "Bem, nós somos――"
10028040-221 = "Uau! Se não é a nossa querida Iori, do Comitê Disciplinar!!"
10028040-222 = "Quanto tempo, como você tem passado?"
10028040-226 = "Ah, é mesmo, se for possível...#nseria de grande ajuda se pudesse nos dar uma mãozinha."
10028040-227 = "Já somos velhos conhecidos, não somos?#nPensando no nosso relacionamento futuro…… né?"
10028040-228 = "Ei, eu sei que não deveria dizer isso, mas..."
10028040-233 = "Vocês dois são inimigos, não são?"
10028040-236 = "O quê……"
10028040-237 = "O que é essa combinação――!?"
10028040-238 = "Este trem está indo para Gehenna, não está……?#nPor que membros do Comitê de Justiça de Trinity estão aqui!?"
10028040-239 = "E essa tal de Kasumi... será que é aquela Kasumi……!?"
10028040-240 = "Não me diga, Sensei, que você esteve com aquele cara esse tempo todo...?#nEi... me diz que não é verdade!!"
10028040-241 = "Me reconhecer de primeira, como esperado da Iori! Hahaha!"
10028040-242 = "Fique calado!"
10028040-243 = "Sensei!! É verdade? Você realmente estava com ele...?#nVocê não virou aliado dele... né!?"
10028040-244 = "Você sabe o quanto sofremos para tentar capturar esse sujeito, Sensei...!"
10028040-245 = "...Hã?"
10028040-246 = "Você está perguntando se eu não confio em você...?"
10028040-247 = "Não é hora para brincadeiras! Se quer que eu acredite, me dê motivos!!#nEu já estou no meu limite tentando entender a situação atual!!"
10028040-251 = "...Hm?"
10028040-252 = "Não é hora para isso agora...?"
10028040-253 = "...Atrás?"
10028040-254 = "O que diabos tem atrás de mim...?"
10028040-259 = "[ns7] \"O canhão...\"\n[ns8] \"Quando foi que ele veio parar bem na nossa frente...\""
10028040-263 = "...O que é isso?"
10028040-267 = "Por que algo assim está aqui—"
10028040-273 = "[ns9] \"Iori...!\"\n[ns10] \"V-você está bem, Iori!?\""
10028040-280 = "Droga... como ousa!!#nTodos, atacar——!!!!!!"
10028040-281 = "Hahahahaha! É assim que se fala!!!"
