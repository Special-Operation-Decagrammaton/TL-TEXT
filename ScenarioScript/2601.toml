[translation]
2601-1 = "大人のオモチャ（１）"
2601-3 = "玄武商会・事務所"
2601-4 = "あっ。こんにちは、ルミ会長。"
2601-5 = "あら、ココナちゃん。いらっしゃい。"
2601-6 = "ココナちゃんじゃなくて、ココナ教官ですっ！"
2601-7 = "何度も言ってますが、私も姉さんと同じ立派な教官なんですからね。子ども扱いしないでくださいっ！"
2601-8 = "ははっ、ごめんごめん。どうもこの呼び方に慣れちゃってね。"
2601-9 = "それで、ココナ教官？今日はどうして玄武商会の事務所に？"
2601-10 = "あっ、もしかしてお腹空いちゃった？チャーハンでも作ろっか？"
2601-11 = "いえ、今日はご飯ではなく、食材を頂きに来まして。"
2601-12 = "ん、食材？"
2601-13 = "はい。シュン姉さんから玄武商会に行って、梅花園の子たちのお食事に使う食材をもらってきてほしい……と頼まれたんです。"
2601-14 = "……あれ、もしかして連絡が行ってませんでしたか？"
2601-15 = "ああいや、連絡は貰ってたんだけどね。そっか、今日だったか。仕事でバタバタして、すっかり忘れてたよ。"
2601-16 = "ちょっと待っててね、すぐに持ってくるからさ。"
2601-19 = "えーっと、キャベツに筍、人参、玉ねぎと……カップラーメンと豆乳、それから……"
2601-20 = "あ、そこにある桃も持っていきな。デザートにはぴったりだし、みんな喜んでくれるでしょ。"
2601-21 = "え、これ全部ですか？こ、こんなにたくさん頂いて良いんですか……？"
2601-22 = "今日は、余った食材を頂きに来ただけなのに……。"
2601-23 = "良いんだよこれくらい、子どもたちは山海経の未来だからね。いっぱい食べて、早く大きくなってもらわないと！"
2601-24 = "……あ、でもそれ全部ココナちゃんが一人で持って行くには、ちょーっと重すぎるかな？"
2601-25 = "そ、そんなことはありません！私はこれでも教官なのですから、これくらい大丈夫です！"
2601-26 = "ふふっ、じゃあ持っていってもらおうかな。"
2601-27 = "あ、そうだ。これも一緒にお願いね。"
2601-30 = "紙袋……？これは一体何ですか？"
2601-31 = "この間、シュン教官から玄武商会に依頼があったもんだよ。"
2601-32 = "中身は――"
2601-34 = "……秘密さ、ふふっ。"
2601-35 = "えっ、えぇ……？"
2601-36 = "悪いんだけど、当のシュン教官が「その中身は誰にも言わないでください」って言ってたもんだから。"
2601-37 = "いくらシュンの妹とはいえ、顧客の情報は守らないとね。うちの信用問題にも直結するからさ。"
2601-38 = "うぅ、そう言われると逆に気になってしまいます……。"
2601-40 = "……硬いですね。揺らすと音が……これは、何かしらのオモチャ、でしょうか？"
2601-41 = "まあ、当たらずとも遠からず、ってところかな。言いようによっては、「大人のオモチャ」とも言えるからね。"
2601-42 = "大人の、オモチャ……？"
2601-43 = "うん。その中にはね、ココナちゃんみたいな子どもが見たら大変なことになっちゃう、それはそれは恐ろしいものが入ってるのさ。"
2601-44 = "だから、「帰り道でこっそり確認してみよう」なんてことは考えない方が良いよ？"
2601-45 = "子ども子どもって、そっ、それを言うならルミ会長やシュン姉さんも、別に大人というわけではないじゃないですか！"
2601-46 = "私だって教官なのに……私にだけ教えてくれないなんて、ずるいです！"
2601-47 = "ふふふっ。でもね、ココナちゃん。世の中には、知らない方が良いことっていうのはたくさんあるものなんだよ。"
2601-48 = "例えば……山海経の生徒会「[ruby=げんりゅうもん]玄龍門[/ruby]」の幹部たちは、学校の機密を守るためだったら目撃者・関係者を丸ごと処分してしまう……ってのは有名な話だろう？"
2601-49 = "だからこそ、山海経の生徒たちの大半は、「玄龍門」って聞いただけで逃げ出そうとする。それと似たような話さ。危ないものにはどんな形であれ、まずは関わらないことが一番良いんだよ。"
2601-50 = "げ、玄龍門……！？つまり、この中には玄龍門に関する秘密が……！？"
2601-51 = "うーん……じゃあまあ、そういうことにしておこうかな。"
2601-52 = "だからココナちゃん。それ、途中で開けたりせずにちゃんと届けるんだよ？"
2601-53 = "ごくり……は、はいっ！"
2601-54 = "分かりました。これは誰にも中身を見られないよう、きちんと私が責任をもってシュン姉さんに届けます！"
2601-55 = "うん、頼んだよ。じゃ、よろしくね～。"
2601-60 = "ははっ……ちょっと脅しちゃったけど、まあこれで大丈夫でしょう。"
2601-62 = "玄武商会前"
2601-66 = "しかし、触ってはいけない大人のオモチャ……考えないようにしようと思えば思うほど、何だか気になってしまいますね。"
2601-67 = "ですが私はできる子。ルミ会長に約束した通り、何があってもきちんと私が守って、ちゃんと届けてみせますっ。"
2601-68 = "[s] \"あ、ココナ？\""
2601-69 = "あっ、先生。こんにちは。"
2601-70 = "[s1] \"何だか重そうなものをたくさん持ってるね。\"\n[s2] \"何を運んでるの？\""
2601-71 = "えと、玄武商会で分けてもらった色々な食材と……"
2601-72 = "えと、玄武商会で分けてもらった色々な食材と……"
2601-73 = "シュン姉さんの、「大人のオモチャ」を持って行くところなんです。"
2601-74 = "[s] \"……大人のオモチャ？\""
2601-76 = "……ああっ！ルミ会長から「秘密に」って言われたばかりなのに……！"
2601-77 = "ど、どうしましょう……！今にもどこからか玄龍門の怖い先輩たちが現れて、私たちは連れ去られてしまうのでは……！？"
2601-78 = "……あ、でも先生は大人ですし、「大人のオモチャ」について話しても大丈夫……だったりしますか？"
2601-79 = "[s] \"……それって、実際にはどういう物なの？\""
2601-80 = "えっと、私も詳しい中身は聞かされていなくって……ただ、シュン姉さんが玄武商会に注文した特別な品だ、と。"
2601-81 = "何となく長さがあって、硬い器具な気はするのですが……。"
2601-82 = "ルミ会長は、この「大人のオモチャ」の秘密がバレてしまったら、山海経に大変なことが起きてしまう……というようなことを言っていました。"
2601-83 = "……先生はこれ、何だか分かりますか？"
2601-84 = "[s3] \"新しい銃、とか……？\"\n[s4] \"えっと、美容グッズ……みたいなもの、かも？\""
2601-85 = "なるほど……確かに、そうかもしれませんね。"
2601-86 = "例えば、子どもには扱えないような複雑で強力な銃だとしたら……ルミ会長があそこまで口を酸っぱくしていたのも分かります。"
2601-87 = "もしかしたら、かつての禁じられた技術で作られた、恐ろしい武器なのかも――"
2601-88 = "うーん……でも、美容グッズをこんな風に秘密にするものでしょうか？"
2601-89 = "それに、シュン姉さんがお肌の美容のためにあれこれ怪しい器具を買っていることなんて、私以外の生徒たちもみんな知ってることです。まあシュン姉さん本人は、バレてるとは思ってないみたいですが。"
2601-90 = "私が思うにこれは、子どもには扱えないような恐ろしい新型の武器か爆弾――"
2601-91 = "あ、そんなことを話していたら、もうこんな時間ですね？"
2601-92 = "このままでは、おやつの時間に遅れてしまいます。急がないと……"
2601-95 = "あ、先生！「大人のオモチャ」については秘密にしておいてくださいね！絶対、絶対にですよ！絶対に「大人のオモチャ」の話だけはしちゃダメですからね！"
2601-101 = "梅花園"
2601-103 = "ただいま戻りましたー。"
2601-104 = "あら、ココナ。何だかたくさんね。ご苦労様。"
2601-105 = "うん。ルミ会長がどうせ余ってるからって、色々とくれて。"
2601-106 = "キャベツ、筍、人参、桃……"
2601-107 = "あ、あとこれ。シュン姉さんが注文した秘密の――"
2601-108 = "あっ、えっ！？"
2601-114 = "る、ルミ会長ったら……！後で自分で取りに行くって言ったのに……！"
2601-115 = "えっと……ココナちゃん？まさかとは思いますが、中身を見たりなんてことは……？"
2601-116 = "見てないよ。ルミ会長が、絶対に見ちゃダメって言ってたから……。"
2601-117 = "な、なら良かったです。"
2601-118 = "とにかく、お疲れ様でした。私はみんなのおやつの準備をしてきますので、もし疲れてなかったらこのまま、食材の整理をお願いできると嬉しいです♪"
2601-122 = "ココナちゃんココナちゃん、玄武商会からなにもらってきたのー？"
2601-123 = "ココナちゃんじゃなくて、ココナ教官！"
2601-124 = "ただみんなのご飯に使う食材を貰ってきたの。すぐにシュン姉さんが美味しいおやつを出してくれるから、ちょっと待っててね。"
2601-125 = "さっきシュンおねーちゃん、何か持ってたよ？カタカタ音がしてたけど、あれなーに？"
2601-126 = "えっと、あれは食べ物じゃなくて、「大人のオモチャ」って言うか……。"
2601-127 = "オモチャ……？私も見たい！どんなオモチャなの？"
2601-128 = "そ、それはダメ！「大人のオモチャ」なんだから、子どもが見たら大変なことになるの！"
2601-129 = "……大変？何で？怖いオモチャなの？"
2601-130 = "そ、そう！ものすごく恐ろしい見た目のオモチャなの！ごつごつしてて、変なトゲみたいのが付いてて、見た目もグロテスクだし変な動きもするし、みんなが見たらきっと泣いちゃうんだから。"
2601-131 = "こ、こわい……。"
2601-132 = "……念のため言っておくけど、これは絶対に秘密だよ！他のみんなには絶対に言っちゃダメだからね？"
2601-133 = "うん、分かった。"
2601-134 = "よしよし、良い子ね。"
2601-135 = "じゃあ私はこの辺を整理して、シュン姉さんのおやつの準備を手伝いに行くから。もう少し待っててね。"
2601-140 = "ねえねえ、さっきシュンお姉ちゃんとココナちゃんが何か持ってたよ？"
2601-141 = "うん、ココナちゃんが持ってたのは食べ物で、シュンおねーちゃんが持ってたのは「大人のオモチャ」なんだって！"
2601-142 = "大人のオモチャ……？って、なあに？"
2601-143 = "これは内緒なんだけどね、シュンおねーちゃんが玄武商会からこっそり買ったもので、トゲがたくさん付いててウニョウニョ動く怖いオモチャなんだって……。"
2601-144 = "な、なにそれ……。"
2601-145 = "なにしてるの？ないしょのお話？"
2601-146 = "うん、これは秘密なんだけど、実はシュンお姉ちゃんが……。"
2601-148 = "その後「シュンが怪しいオモチャを購入した」という噂は、梅花園の園児たちの口から山海経の全域へと、瞬く間に広まっていった。"
