[translation]
2601-1 = "Brinquedo de adulto (1)"
2601-3 = "Associação Genbu - Escritório"
2601-4 = "Ah. Olá, Presidente Lumi."
2601-5 = "Ora, olá, Kokona-chan. Seja bem-vinda."
2601-6 = "Não é Kokona-chan, é Instrutora Kokona!"
2601-7 = "Já disse várias vezes, eu sou uma instrutora exemplar, assim como a minha irmã mais velha. Por favor, não me trate como uma criança!"
2601-8 = "Haha, perdão, perdão. É que eu já me acostumei a te chamar assim."
2601-9 = "Então, Instrutora Kokona? O que a traz ao escritório da Associação Genbu hoje?"
2601-10 = "Ah, será que você está com fome? Quer que eu prepare um arroz frito?"
2601-11 = "Não, hoje não vim por causa de comida, mas sim para buscar ingredientes."
2601-12 = "Hm, ingredientes?"
2601-13 = "Sim. A Shun-nee me pediu para vir à Associação Genbu buscar os ingredientes que serão usados para as refeições das crianças do Jardim Meika..."
2601-14 = "...Ué, será que o aviso não chegou até você?"
2601-15 = "Ah, não, eu recebi o aviso sim. Entendi, era hoje. Com a correria do trabalho, acabei esquecendo completamente."
2601-16 = "Espere um pouco, vou buscar agora mesmo."
2601-19 = "Bem, repolho, broto de bambu, cenoura, cebola e... macarrão instantâneo, leite de soja, e então..."
2601-20 = "Ah, leve esses pêssegos que estão ali também. São perfeitos para a sobremesa, tenho certeza que todas vão adorar."
2601-21 = "Hã, tudo isso? P-posso levar tanta coisa assim...?"
2601-22 = "Eu só vim buscar os ingredientes que sobraram..."
2601-23 = "Não tem problema, as crianças são o futuro de Shanhaijing. Elas precisam comer bastante para crescerem logo!"
2601-24 = "...Ah, mas será que não está um pouco pesado demais para a Kokona-chan carregar tudo sozinha?"
2601-25 = "I-isso não é verdade! Mesmo sendo uma instrutora, eu dou conta disso!"
2601-26 = "Fufu, então vou deixar você levar."
2601-27 = "Ah, é verdade. Leve isto junto também, por favor."
2601-30 = "Um saco de papel...? O que é isso exatamente?"
2601-31 = "Foi um pedido que a Instrutora Shun fez à Associação Genbu outro dia."
2601-32 = "O conteúdo é..."
2601-34 = "...Segredo, fufu."
2601-35 = "Hã, é mesmo...?"
2601-36 = "Desculpe, mas a própria Instrutora Shun disse: 'Por favor, não conte a ninguém o que tem aqui dentro'."
2601-37 = "Por mais que você seja irmã da Shun, preciso proteger as informações dos clientes. Isso está diretamente ligado à credibilidade da nossa empresa."
2601-38 = "Uu, agora que você disse isso, fiquei ainda mais curiosa..."
2601-40 = "...É duro. E faz barulho quando balanço... Isso seria algum tipo de brinquedo?"
2601-41 = "Bem, não está longe da verdade. Dependendo de como você fala, pode ser chamado de 'brinquedo de adulto'."
2601-42 = "Brinquedo de... adulto...?"
2601-43 = "Sim. Dentro dele tem algo terrível que seria um problema se uma criança como a Kokona-chan visse."
2601-44 = "Por isso, é melhor nem pensar em 'dar uma espiadinha no caminho de volta', entendeu?"
2601-45 = "Ficar me chamando de criança... Se for por isso, a Presidente Lumi e a Shun-nee também não são exatamente adultas, não é?!"
2601-46 = "Eu também sou uma instrutora... É injusto não me contar só porque sou eu!"
2601-47 = "Fufufu. Mas veja bem, Kokona-chan. Existem muitas coisas no mundo que é melhor não saber."
2601-48 = "Por exemplo... é famoso o fato de que os executivos do conselho estudantil de Shanhaijing, o Genryumon, eliminam testemunhas e pessoas envolvidas se for para proteger os segredos da escola, não é?"
2601-49 = "É por isso que a maioria dos alunos de Shanhaijing tenta fugir só de ouvir o nome 'Genryumon'. É uma história parecida. O melhor é não se envolver com coisas perigosas de jeito nenhum."
2601-50 = "Ge, Genryumon...!? Então, dentro disso há segredos sobre o Genryumon...!?"
2601-51 = "Hmm... bem, vamos deixar por isso mesmo então."
2601-52 = "Por isso, Kokona-chan. Não abra no caminho e entregue direitinho, viu?"
2601-53 = "Gulp... S-sim!"
2601-54 = "Entendido. Vou assumir a responsabilidade de entregar isso à Shun-nee sem que ninguém veja o conteúdo!"
2601-55 = "Isso, conto com você. Então, até mais."
2601-60 = "Haha... dei um susto nela, mas acho que agora vai dar certo."
2601-62 = "Em frente à Associação Genbu"
2601-66 = "Mas, esse brinquedo de adulto que não se deve tocar... quanto mais tento não pensar nisso, mais curiosa eu fico."
2601-67 = "Mas eu sou uma criança capaz. Como prometi à presidente Lumi, não importa o que aconteça, vou proteger isso e entregar como deve ser."
2601-68 = "[s] \"Ah, Kokona?\""
2601-69 = "Ah, Sensei. Olá."
2601-70 = "[s1] \"Você parece estar carregando muitas coisas pesadas.\"\n[s2] \"O que está transportando?\""
2601-71 = "Bem, são vários ingredientes que ganhei da Associação Genbu e..."
2601-72 = "Bem, são vários ingredientes que ganhei da Associação Genbu e..."
2601-73 = "Estou levando o \"brinquedo de adulto\" da Shun-nee-san."
2601-74 = "[s] \"...Brinquedo de adulto?\""
2601-76 = "...Ahhh! A presidente Lumi acabou de me dizer para manter segredo...!"
2601-77 = "O-o que eu faço...! Será que os veteranos assustadores da Genryumon vão aparecer do nada e nos levar embora...!?"
2601-78 = "...Ah, mas o Sensei é um adulto, então... será que não tem problema falar sobre o \"brinquedo de adulto\"?"
2601-79 = "[s] \"...O que é isso na verdade?\""
2601-80 = "Bem, eu não sei os detalhes do conteúdo... só sei que é um item especial que a Shun-nee-san encomendou da Associação Genbu."
2601-81 = "Tenho a impressão de que é um utensílio comprido e rígido..."
2601-82 = "A presidente Lumi disse que, se o segredo desse \"brinquedo de adulto\" for revelado, algo terrível acontecerá em Shanhaijing..."
2601-83 = "...Sensei, o senhor sabe o que é isso?"
2601-84 = "[s3] \"Uma arma nova, talvez...?\"\n[s4] \"Bem, talvez seja algo como... um item de beleza?\""
2601-85 = "Entendo... certamente, pode ser isso."
2601-86 = "Por exemplo, se for uma arma complexa e poderosa que uma criança não conseguiria manusear... entendo por que a presidente Lumi insistiu tanto."
2601-87 = "Talvez seja uma arma terrível feita com uma tecnologia proibida do passado..."
2601-88 = "Hmm... mas será que alguém esconderia um item de beleza desse jeito?"
2601-89 = "Além disso, todos os outros alunos, além de mim, sabem que a Shun-nee-san compra vários utensílios estranhos para cuidar da pele. Bem, a própria Shun-nee-san parece achar que ninguém sabe."
2601-90 = "Na minha opinião, isso deve ser uma arma nova e assustadora ou uma bomba que crianças não deveriam manusear..."
2601-91 = "Ah, falando nisso, já está na hora, não é?"
2601-92 = "Se eu continuar assim, vou me atrasar para o lanche. Preciso me apressar..."
2601-95 = "Ah, Sensei! Por favor, mantenha o \"brinquedo de adulto\" em segredo! Absolutamente, absolutamente, viu! Não fale sobre o \"brinquedo de adulto\" de jeito nenhum!"
2601-101 = "Plum Blossom Garden"
2601-103 = "Cheguei."
2601-104 = "Ora, Kokona. Você trouxe bastante coisa. Bom trabalho."
2601-105 = "Sim. A presidente Lumi disse que estava sobrando, então me deu várias coisas."
2601-106 = "Repolho, broto de bambu, cenoura, pêssego..."
2601-107 = "Ah, e isso aqui. O item secreto que a Shun-nee-san encomendou..."
2601-108 = "Ah, hã!?"
2601-114 = "A-a presidente Lumi...! Eu disse que buscaria depois...!"
2601-115 = "Bem... Kokona-chan? Não quero nem pensar, mas você por acaso viu o conteúdo...?"
2601-116 = "Não vi. A presidente Lumi disse que eu não podia ver de jeito nenhum..."
2601-117 = "A-ainda bem."
2601-118 = "De qualquer forma, bom trabalho. Vou preparar o lanche de todos, então, se não estiver cansada, ficaria feliz se pudesse organizar os ingredientes."
2601-122 = "Kokona-chan, Kokona-chan, o que você trouxe da Associação Genbu?"
2601-123 = "Não é Kokona-chan, é Instrutora Kokona!"
2601-124 = "Só trouxe os ingredientes para a comida de todos. A Shun-nee-san vai preparar um lanche delicioso logo, então esperem um pouco."
2601-125 = "A Shun-nee-san estava segurando algo agora pouco, né? Fazia um barulho de chocalho, o que é aquilo?"
2601-126 = "Bem, aquilo não é comida, é um... \"brinquedo de adulto\"."
2601-127 = "Brinquedo...? Eu quero ver! Que tipo de brinquedo é?"
2601-128 = "I-isso não pode! É um \"brinquedo de adulto\", se uma criança vir, vai ser um desastre!"
2601-129 = "...Desastre? Por quê? É um brinquedo assustador?"
2601-130 = "I-isso mesmo! É um brinquedo com uma aparência extremamente assustadora! É todo irregular, tem uns espinhos estranhos, a aparência é grotesca e ele faz movimentos estranhos. Se todos virem, com certeza vão chorar."
2601-131 = "Q-que medo..."
2601-132 = "...Só por precaução, isso é um segredo absoluto! Não contem para mais ninguém, entenderam?"
2601-133 = "Sim, entendi."
2601-134 = "Isso, isso, que criança boazinha."
2601-135 = "Bem, eu vou organizar as coisas por aqui e ajudar a preparar o lanche da irmã Shun. Espere só mais um pouco, tá?"
2601-140 = "Ei, ei, você viu que a irmã Shun e a Kokona estavam segurando algo agora pouco?"
2601-141 = "Sim, o que a Kokona estava segurando era comida, e o que a irmã Shun estava segurando era um 'brinquedo de adulto'!"
2601-142 = "Brinquedo de adulto...? O que é isso?"
2601-143 = "Isso é segredo, mas dizem que a irmã Shun comprou escondido da Associação Genbu, e que é um brinquedo assustador cheio de espinhos que se mexe todo..."
2601-144 = "Q-que horror..."
2601-145 = "O que vocês estão fazendo? Estão contando segredos?"
2601-146 = "Sim, isso é um segredo, mas na verdade a irmã Shun..."
2601-148 = "Depois disso, o boato de que 'Shun comprou um brinquedo suspeito' espalhou-se rapidamente da boca das crianças do Jardim de Infância Plum para toda a região de Shanhaijing."
