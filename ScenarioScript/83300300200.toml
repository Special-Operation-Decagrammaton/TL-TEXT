[translation]
83300300200-6 = "Presidente! Onde você estava até agora?"
83300300200-7 = "Eu tinha alguns assuntos para tratar. O que houve, Iori?"
83300300200-8 = "Na verdade, até agora pouco, alguns encrenqueiros estavam causando confusão perto do prédio do Comitê Disciplinar."
83300300200-9 = "Isso não é algo que acontece sempre?"
83300300200-10 = "Hmm. Bem, dito dessa forma, é verdade."
83300300200-11 = "Desta vez, a confusão parece diferente do habitual."
83300300200-12 = "Como Chinatsu disse, eles atacaram como se estivessem esperando nosso retorno do treinamento."
83300300200-13 = "Não é só o fato de saberem nossa agenda, mas o jeito que agiram sem hesitação..."
83300300200-14 = "Parecia até que estavam sendo comandados por alguém."
83300300200-15 = "Senti que a intenção deles era restringir nossas ações e nos manter presas aqui."
83300300200-16 = "O fato de terem fugido assim que perceberam a desvantagem durante o combate também foi suspeito."
83300300200-17 = "Ou seja... eles tinham algum objetivo?"
83300300200-18 = "Sim, deve haver alguém por trás disso."
83300300200-19 = "Interferir com o Comitê Disciplinar justamente neste momento..."
83300300200-20 = "Me diga para onde os encrenqueiros fugiram. Eu vou atrás deles."
