[translation]
83300300200-6 = "委員長！さっきまでどこに行ってたの？"
83300300200-7 = "ちょっと用事があって。どうしたの、イオリ。"
83300300200-8 = "実は、ついさっきまで風紀委員会の建物の近くで問題児たちが暴れてたんだ。"
83300300200-9 = "それならいつものことでしょう？"
83300300200-10 = "うーん。いや、そう言われたらそうなんだけど。"
83300300200-11 = "今回の騒動は、いつもと違うようです。"
83300300200-12 = "チナツの言う通り、訓練から戻るのを待っていたかのように襲ってきた。"
83300300200-13 = "私たちのスケジュールを知っていたのもそうだけど、行動に迷いがなかったのは……"
83300300200-14 = "まるで誰かに命令されているみたいで。"
83300300200-15 = "私たちの行動を制限して、ここに留めておく意図を感じた。"
83300300200-16 = "戦闘中、不利な状況を察してすぐに逃げ出した点も怪しかったですね。"
83300300200-17 = "つまり……何か目的があった、と？"
83300300200-18 = "うん、雇い主が居るはず。"
83300300200-19 = "このタイミングで風紀委員会を邪魔してくるだなんて……"
83300300200-20 = "問題児がどっちに逃げたか教えて。私が追いかける。"
