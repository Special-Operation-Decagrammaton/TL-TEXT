[translation]
2601102-1 = "Eu sou a lenda urbana"
2601102-2 = "（Recebi uma mensagem da Saten e fui até a rua comercial）"
2601102-7 = "（Ao chegar, encontrei Saten observando a paisagem da cidade com os olhos brilhando）"
2601102-15 = "I-Isso é... isso é a realidade...!?"
2601102-16 = "Não é um parque temático ou uma pegadinha, né...?"
2601102-17 = "Também não é um set de filmagem, né...!?"
2601102-18 = "Tem alguém com asas ali... e, nossa, aquela pessoa ali tem chifres...!#nE pessoas com orelhas e caudas de formatos estranhos..."
2601102-19 = "Até pessoas com aparência de animais...!"
2601102-20 = "[s1] \"...Saten?\"\n[s2] \"O que está fazendo aqui?\""
2601102-28 = "Tem até pilares de luz misteriosos e anéis no céu...!"
2601102-29 = "[s3] \"Ela parece tão distraída que nem me ouviu...\"\n[s4] \"Ei, Saten-san...?\""
2601102-32 = "...Uau!?"
2601102-33 = "Ah... Sensei, você veio!"
2601102-34 = "Que susto... Na verdade, acabei de ser abordada por alguém que parecia um cachorrinho e acabei fugindo."
2601102-35 = "Eu achei que ela era fofa, mas..."
2601102-36 = "...Hein?"
2601102-37 = "Diz que não preciso me preocupar porque todos são boas pessoas...?"
2601102-38 = "Ah, bem..."
2601102-42 = "...Não é que eu estivesse com medo, sabe?"
2601102-43 = "[s5] \"...Não é?\"\n[s6] \"Então, o que foi aquilo...?\""
2601102-46 = "Se for para dizer, foi mais um choque por ser tudo tão misterioso."
2601102-47 = "...Parece que acabei te preocupando.#nAhaha... desculpe, não era minha intenção."
2601102-48 = "O lugar onde eu morava não tinha nada parecido com essas paisagens..."
2601102-49 = "No começo, quando ouvi falar da Cidade Acadêmica, pensei que seria parecido, mas olhando bem, é totalmente diferente..."
2601102-50 = "Deixa eu ver, hum..."
2601102-51 = "É como se fosse um mundo onde todas as lendas urbanas que eu sempre persegui estivessem reunidas, sabe?"
2601102-52 = "Por isso, esta cidade está envolta em mistério para mim!"
2601102-53 = "Mas..."
2601102-57 = "...É estranho.#nMesmo nessa situação, sinto que estou estranhamente calma."
2601102-58 = "Como todos vivem aqui como se isso fosse normal, não parece uma lenda urbana..."
2601102-59 = "[s7] \"É que aqui, isso é uma cena comum...\"\n[s8] \"Lendas urbanas não nascem de forma relativa?\""
2601102-62 = "É... verdade, você tem razão."
2601102-66 = "...Ah."
2601102-67 = "...!?#nIsso significa que, na verdade, a minha existência é que é uma lenda urbana nesta cidade...!?"
2601102-68 = "[s9] \"...Por ser alguém que veio de outro mundo?\"\n[s10] \"Com certeza, é exatamente isso.\""
2601102-71 = "...!!"
2601102-72 = "Eu, de todas as pessoas, deixei passar isso!"
2601102-73 = "Lenda urbana... eu, me tornando uma lenda urbana..."
2601102-74 = "...Oh, ohhh...!"
2601102-75 = "Se, Sensei..."
2601102-81 = "...Eu pareço uma lenda urbana?"
2601102-82 = "[s11] \"Bem...\"\n[s12] \"Como será que é a resposta certa para isso?\""
2601102-85 = "Você não parece nem um pouco surpreso, que pena."
2601102-86 = "De qualquer forma, entendi que o que parece raro para mim é o cotidiano aqui."
2601102-87 = "Mas, esta cidade também deve ter uma ou duas lendas urbanas, certo?#nClaro, histórias de fantasmas e ocultismo também..."
2601102-88 = "[s13] \"Você realmente gosta de lendas urbanas, hein.\"\n[s14] \"Você tem o estilo de sair procurando por elas...\""
2601102-91 = "Com certeza! Se não desistirmos, talvez encontremos algo!"
2601102-92 = "Vamos, Sensei! Vamos procurar juntos!"
2601102-96 = "[ns] \"...E-Espere!\""
2601102-98 = "[ns] Corri apressado atrás de Saten."
2601102-100 = "(Depois disso, dei uma volta pela cidade de Kivotos com a Saten, mas...)"
2601102-101 = "(Não conseguimos encontrar nada que pudesse ser chamado de \"lenda urbana\".)"
