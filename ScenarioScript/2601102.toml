[translation]
2601102-1 = "あたしが都市伝説"
2601102-2 = "（佐天に連絡をもらい、商店街に向かった）"
2601102-7 = "（到着すると、そこには目をキラキラさせながら街並みを見回している佐天がいた）"
2601102-15 = "こ、これが……これが現実……！？"
2601102-16 = "テーマパークとかドッキリじゃないよね……？"
2601102-17 = "映画のロケ地でもない、よね……！？"
2601102-18 = "あそこに翼の生えてる人が……えっ、あっちの人は角が……！#n珍しい形の耳と尻尾がある人に……"
2601102-19 = "動物の姿をした人まで……！"
2601102-20 = "[s1] \"……佐天？\"\n[s2] \"ここで何してるの？\""
2601102-28 = "空にも不思議な光の柱と輪っかがある……！"
2601102-29 = "[s3] \"夢中で聞こえてなさそう……。\"\n[s4] \"えっと、佐天さーん……？\""
2601102-32 = "……わっ！？"
2601102-33 = "あっ……先生、来てくれたんですね！"
2601102-34 = "ビックリしたぁ……実はさっき、ワンちゃんみたいな人に話しかけられて、つい逃げちゃったんです。"
2601102-35 = "可愛いな～とは思ったんですけど……"
2601102-36 = "……え？"
2601102-37 = "みんな良い人だから、心配する必要はない、ですか……？"
2601102-38 = "あ、えっと……"
2601102-42 = "……別に怖かったわけではないですよ？"
2601102-43 = "[s5] \"……違うの？\"\n[s6] \"じゃあ、さっきのは……。\""
2601102-46 = "どちらかといえば、不思議すぎてビックリしたというか。"
2601102-47 = "……なんか気を遣わせちゃったみたいですね。#nあはは……すみません、そんなつもりじゃなかったんですけど。"
2601102-48 = "あたしが住んでたところには、なかった光景ばかりで……"
2601102-49 = "最初は学園都市って聞いて、似てるのかな～なんて思ってましたが、よく見ると全然違うし……"
2601102-50 = "そうだなぁ、うーん……"
2601102-51 = "昔から追いかけてきた都市伝説が、ぜーんぶ集まってる世界、みたいな？"
2601102-52 = "だから、この街は私にとって不思議に包まれてるんです！"
2601102-53 = "でも……"
2601102-57 = "……なんか、変なんです。#nこんな状況なのに、どこか落ち着いている自分がいて。"
2601102-58 = "みんな、これが当たり前のように暮らしてるから、都市伝説っぽくないし……。"
2601102-59 = "[s7] \"ここでは、ありふれた光景だからね……。\"\n[s8] \"都市伝説は、相対的に生まれるものじゃないかな。\""
2601102-62 = "そう……ですよね、やっぱり。"
2601102-66 = "……あれっ。"
2601102-67 = "……！？#nってことは、むしろこの街ではあたしの存在の方が都市伝説なんじゃ……！？"
2601102-68 = "[s9] \"……異世界から来た人、だから？\"\n[s10] \"たしかに、その通りだね。\""
2601102-71 = "……！！"
2601102-72 = "私としたことが、見落としてましたっ！"
2601102-73 = "都市伝説……あたしが、都市伝説に……"
2601102-74 = "……おお、おおお……！"
2601102-75 = "せ、先生……"
2601102-81 = "……あたし、都市伝説っぽいですか？"
2601102-82 = "[s11] \"えっと……。\"\n[s12] \"ど、どう答えるのが正解なのかな。\""
2601102-85 = "ぜーんぜん不思議そうな顔してませんね、残念です。"
2601102-86 = "とりあえず、あたしにとっては珍しく映るものも、ここじゃ日常なんだなって分かりました。"
2601102-87 = "でも、この街にも都市伝説の一つや二つ、ありますよね？#nもちろん、怪談やオカルトも……"
2601102-88 = "[s13] \"本当に都市伝説が好きなんだね。\"\n[s14] \"逆に探していくスタイルなんだ……。\""
2601102-91 = "もちろんです！諦めなければ、何か見つかるかもしれませんから！"
2601102-92 = "さ、先生！一緒に探しに行きましょう！"
2601102-96 = "[ns] \"……ま、待って！\""
2601102-98 = "[ns] 急いで佐天の後を追った。"
2601102-100 = "（その後、佐天と一緒にキヴォトス市内をぐるっと回ったが……）"
2601102-101 = "（「都市伝説」と呼べるようなものは見つからなかった）"
