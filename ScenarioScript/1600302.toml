[translation]
1600302-1 = "トリニティの自警団"
1600302-2 = "（トリニティの街外れ、とあるコンビニ）"
1600302-3 = "「目がぱちっ☆ドリンク」3つ、「豚肉炒め弁当」、「すご苦コーヒー」……合計1,130円です。"
1600302-4 = "お買い上げありがとうございます、またお越しくださいませー。"
1600302-5 = "ウィィィィン"
1600302-6 = "あっ、いらっしゃいませー……"
1600302-7 = "ダダダダダッ！ダダダダダッ！ダンッ！"
1600302-8 = "……っ！？"
1600302-9 = "動くな！！あんたたち、全員手を頭の上に組んでうつぶせになれ！ここはあたしらが占拠した！"
1600302-10 = "無駄な抵抗なんて考えるなよ！！痛い思いをしたくなかったら大人しくしな！"
1600302-11 = "ひっ！？あ、あなたたち、ここはトリニティの自治区ですよ！？こんなことをしてもすぐ……っ！"
1600302-12 = "捕まるだろうって？はっ、そんなこと百も承知でやってるに決まってるだろう！"
1600302-13 = "正義実現委員会なら今この辺りにはいない、確認済みだ！"
1600302-14 = "いくらあいつらでも、こんな街の外れまではそうそう来ないからな……。"
1600302-15 = "無駄な期待はやめておきな！早く金庫を開けて、中のものを全部出せ！"
1600302-16 = "……？"
1600302-17 = "あん？誰だお前……？"
1600302-18 = "ははっ、大人だからって、こんな夜にひとりで危ないぞ～？"
1600302-19 = "あんまり不用心にふらふらしてると、あたしらみたいな悪い女子高生に、ひどい目に遭わされちゃうからなあ！"
1600302-20 = "ちょっと分からせてやったほうが良いかい？どれ、お姉さんとちょっと愉しいことでも……。"
1600302-21 = "カチッ！"
1600302-22 = "……ん？？なんだ、これ？"
1600302-23 = "……閃光弾？"
1600302-25 = "バンッッ！！キイイイイィィィィィン――"
1600302-26 = "うああっ！？め、目が見えない！？"
1600302-27 = "念のためパトロールに来ていて正解でした、やはりあなたたちでしたか。"
1600302-28 = "そ、その声！あ、あんたまさか！なぜここに……っ！"
1600302-31 = "ダンッ！ガッ！バキッ、ドスッ！"
1600302-32 = "うっ……ぐうううっ……があっ！"
1600302-33 = "なっ、なんてこった、ぐっ！"
1600302-35 = "懲りない人たちですね、本当に……。"
1600302-36 = "……？あれ、先生？先生がどうしてこんなところに……。"
1600302-37 = "[s] \"やあ。\""
1600302-38 = "こんばんは、先生。まさかこんなところでお会いするとは。"
1600302-39 = "またいつかお会い出来たらとは言いましたが、こんなに早く実現するなんて思っていませんでした。"
1600302-40 = "ですが大人とはいえ、どうしてこんな時間にこんなところに……。"
1600302-41 = "悪い生徒に捕まってしまいますよ、早くお戻りになることを勧めます。"
1600302-42 = "え、エスコートしてほしい……？"
1600302-43 = "……悪い生徒は怖いから、ぜひ私に？"
1600302-44 = "……ふう。"
1600302-45 = "承知しました、そういうことなのであれば、私の出番ですね。"
1600302-46 = "まずはこの不良たちを制圧してからですが……。"
1600302-47 = "ひ、ひいいっ！！な、何をする気だい！？"
1600302-48 = "ご心配なく、危害は加えません。ただ無力化しなければいけませんので……。"
1600302-50 = "お二人を電柱に縛り付けてから、耳元で「オスティン・ビーバー」の『ベイビー』でもかけておくとしましょう。"
1600302-52 = "……！？"
1600302-53 = "な、なんてセンスだ！？いったいいつの時代の曲だよ！？"
1600302-54 = "おじさんだ、センス押し付けおじさんがいる！！「なんでこれが分からないかな」って昔の歌に酔いしれながら若者に古い趣味を押し付けるおじさん（？）があああ！！"
1600302-56 = "うあああああああああ！！"
1600302-59 = "[ns1] \"恐ろしい罰……なのかな？\"\n[ns2] \"お疲れ様。\""
1600302-60 = "コンビニ強盗をしようとしたのですから、これぐらいは当然かと。"
1600302-61 = "いえ、当然のことをしたまでです。"
1600302-62 = "では行きましょう、先生。私と一緒にいれば安全ですから、ご心配なく。"
1600302-63 = "さあ。"
1600302-65 = "[ns] （スズミについて行く）"
1600302-68 = "（その後、スズミと二人でシャーレの近くまで30分ほど歩いた）"
1600302-69 = "……もうあそこの角を曲がればすぐでしたか、お疲れさまでした。"
1600302-70 = "ここからはお一人でも大丈夫かと思います。もう遅いので、寄り道せずにお帰りください。"
1600302-71 = "いえ、わざわざ感謝されるほどのことではありません。自警団として当然のことです。"
1600302-72 = "正式な部活ではありませんが……。"
1600302-73 = "トリニティも外からのイメージ以上に色々なことが起こる場所ですので、こうでもしないと危ないですからね。"
1600302-74 = "……え、楽しかった、ですか？"
1600302-75 = "それはまた、変わった感想ですね。"
1600302-76 = "事件に巻き込まれるところだったのですよ。それが楽しかったのですか？"
1600302-77 = "……？"
1600302-78 = "ここまでの道のりが……？"
1600302-79 = "普通の道だったと思いますが……。"
1600302-80 = "[s3] \"スズミにエスコートしてもらえたから。\"\n[s4] \"スズミと一緒にいられたから。\""
1600302-81 = "……！！"
1600302-82 = "……！！"
1600302-83 = "そ、それはありがたいことですが、そんなことを言われましても今日はもう終わりです。早くお戻りください。"
1600302-84 = "……。"
1600302-86 = "……でも考えてみると、私も、楽しかったかもしれません。"
1600302-87 = "私はこういう性格ですので、あまり会話は得意ではないのですが、全く退屈ではありませんでした。"
1600302-88 = "なんだか先生と一緒にいると……自分が今、自警団として行動してるのだということを忘れてしまいそうなくらいです。"
1600302-89 = "次はこういう形ではなく、もっとゆったりとした形でお話しできると良いですね。"
1600302-90 = "こんな夜中ではなく、日中にでも。"
1600302-94 = "……そうだ、これはちょっとしたプレゼントなのですが。"
1600302-95 = "[s] \"……閃光弾？\""
1600302-96 = "銃器は持たないにしても、自衛できるくらいの道具は持っていても良いかと思います。"
1600302-97 = "どうか受け取ってください。"
1600302-98 = "……え、必要ない？どうして……。"
1600302-99 = "私が守ってくれるから？そ、それは……！"
1600302-100 = "そ、それはもちろん私も努力しますが！それだけに頼っているといざという時……！"
1600302-101 = "……。"
1600302-102 = "いえ、分かりました。私が自警団として、しっかり先生をお守りできれば良いだけの話ですね。"
1600302-103 = "……頑張ります、信頼に応えられるよう。ではまた、おやすみなさい。"
1600302-105 = "（スズミは身を翻して、すたすたと早歩きで暗闇の中に消えていった）"
1600302-106 = "（なんだかその歩き方は、さっきまでと違って少しだけぎこちなく見えた）"
