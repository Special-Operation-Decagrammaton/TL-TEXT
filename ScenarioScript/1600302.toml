[translation]
1600302-1 = "Vigilantes de Trinity"
1600302-2 = "（Nos arredores de Trinity, uma certa loja de conveniência）"
1600302-3 = "Três energéticos \"Olhos Abertos☆\", uma \"Marmita de Porco Frito\" e um \"Café do Esforço\"... o total é 1.130 ienes."
1600302-4 = "Obrigada pela compra, volte sempre."
1600302-5 = "Vruuum"
1600302-6 = "Ah, bem-vindo... ah..."
1600302-7 = "Taca-taca-taca! Taca-taca-taca! Bam!"
1600302-8 = "……!?"
1600302-9 = "Não se movam!! Vocês aí, todos coloquem as mãos na cabeça e deitem de bruços! Nós tomamos este lugar!"
1600302-10 = "Nem pensem em resistir!! Se não quiserem se machucar, fiquem quietas!"
1600302-11 = "Hii!? V-vocês, aqui é o distrito autônomo de Trinity, sabia!? Se fizerem algo assim, logo...!"
1600302-12 = "Que seremos pegas? Ha! É claro que sabemos disso, estamos fazendo isso sabendo muito bem!"
1600302-13 = "O Comitê de Justiça não está por perto agora, já confirmamos!"
1600302-14 = "Mesmo aquelas lá não viriam até um fim de mundo desses tão cedo..."
1600302-15 = "Parem de ter esperanças inúteis! Abram logo o cofre e tirem tudo o que tem dentro!"
1600302-16 = "……?"
1600302-17 = "Hã? Quem é você...?"
1600302-18 = "Haha, só porque é um adulto, não sabe que é perigoso andar sozinho a essa hora da noite?"
1600302-19 = "Se ficar andando por aí sem cuidado, pode acabar passando por maus bocados com garotas más como a gente!"
1600302-20 = "Quer que a gente te ensine uma lição? Vamos lá, que tal nos divertirmos um pouco com a titia aqui..."
1600302-21 = "Click!"
1600302-22 = "……Hm?? O que é isso?"
1600302-23 = "……Uma granada de luz?"
1600302-25 = "BAM!! KIIIIIIIIIIIN――"
1600302-26 = "Aaaah!? M-meus olhos, não consigo ver nada!?"
1600302-27 = "Foi uma boa decisão vir patrulhar por precaução. Como eu suspeitava, eram vocês."
1600302-28 = "E-essa voz! V-você, não pode ser! Por que você está aqui...!"
1600302-31 = "Bam! Pow! Crack, soco!"
1600302-32 = "Ugh... guuuuh... argh!"
1600302-33 = "N-não pode ser, ugh!"
1600302-35 = "Vocês nunca aprendem, não é mesmo..."
1600302-36 = "……? Ué, Sensei? Por que o Sensei está em um lugar como este..."
1600302-37 = "[s] \"Olá.\""
1600302-38 = "Boa noite, Sensei. Não esperava encontrar você em um lugar desses."
1600302-39 = "Eu disse que esperava nos encontrarmos novamente, mas não imaginei que seria tão cedo."
1600302-40 = "Mas, sendo um adulto, por que está aqui a esta hora..."
1600302-41 = "Você vai acabar sendo pego por alunas más. Recomendo que volte logo."
1600302-42 = "Ah, quer que eu te escolte...?"
1600302-43 = "……Como alunas más são assustadoras, quer que eu vá com você?"
1600302-44 = "……Fuu."
1600302-45 = "Entendido. Se é assim, então é a minha vez de agir."
1600302-46 = "Mas primeiro, preciso neutralizar essas delinquentes..."
1600302-47 = "H-hiii!! O-o que você pretende fazer!?"
1600302-48 = "Não se preocupem, não vou causar danos. Mas preciso neutralizá-las..."
1600302-50 = "Depois de amarrar as duas no poste de luz, vou colocar \"Baby\" do \"Austin Bieber\" para tocar bem perto dos seus ouvidos."
1600302-52 = "……!?"
1600302-53 = "Q-que gosto musical é esse!? De que época é essa música!?"
1600302-54 = "É um tiozão, tem um tiozão chato aqui!! Aquele tipo de tiozão (?) que fica curtindo músicas antigas dizendo \"por que vocês não entendem isso?\" enquanto empurra seus gostos antiquados para os jovens!!"
1600302-56 = "Aaaaaaaaaaaaaah!!"
1600302-59 = "[ns1] \"Um castigo terrível... eu acho?\"\n[ns2] \"Bom trabalho.\""
1600302-60 = "Já que eles tentaram assaltar a loja de conveniência, acho que isso é o mínimo."
1600302-61 = "Não, eu apenas fiz o que era necessário."
1600302-62 = "Então vamos, Sensei. Fique comigo e estará seguro, não se preocupe."
1600302-63 = "Vamos."
1600302-65 = "[ns] （Seguir Suzumi）"
1600302-68 = "（Depois disso, caminhei com Suzumi por cerca de 30 minutos até perto do Schale）"
1600302-69 = "……Já chegamos na esquina, então é logo ali. Bom trabalho hoje."
1600302-70 = "Acho que daqui você consegue ir sozinho. Já está tarde, então por favor, vá direto para casa sem desvios."
1600302-71 = "Não, não precisa me agradecer por isso. É o meu dever como membro do comitê de vigilância."
1600302-72 = "Embora não seja um clube oficial……"
1600302-73 = "Trinity é um lugar onde acontecem mais coisas do que as pessoas de fora imaginam, então é perigoso se não tomarmos precauções assim."
1600302-74 = "……Eh, você se divertiu?"
1600302-75 = "Essa é uma impressão bem incomum."
1600302-76 = "Você quase foi envolvido em um incidente, sabe? E mesmo assim, se divertiu?"
1600302-77 = "……？"
1600302-78 = "O caminho até aqui……?"
1600302-79 = "Acho que foi um caminho comum……"
1600302-80 = "[s3] \"Porque fui escoltado por você, Suzumi.\"\n[s4] \"Porque pude ficar ao seu lado, Suzumi.\""
1600302-81 = "……！！"
1600302-82 = "……！！"
1600302-83 = "I-isso é gentil da sua parte, mas mesmo que me diga essas coisas, o dia já acabou. Por favor, volte logo."
1600302-84 = "……。"
1600302-86 = "……Mas pensando bem, talvez eu também tenha me divertido."
1600302-87 = "Como sou desse jeito, não sou muito boa em conversar, mas não foi nada entediante."
1600302-88 = "De alguma forma, quando estou com você, Sensei…… quase esqueço que estou agindo como membro do comitê de vigilância."
1600302-89 = "Seria bom se pudéssemos conversar de uma forma mais tranquila na próxima vez."
1600302-90 = "Não no meio da noite assim, mas durante o dia."
1600302-94 = "……Ah, isso é um pequeno presente."
1600302-95 = "[s] \"……Uma granada de luz?\""
1600302-96 = "Mesmo que você não carregue armas de fogo, acho bom ter pelo menos algo para se autodefender."
1600302-97 = "Por favor, aceite."
1600302-98 = "……Eh, não precisa? Por que……"
1600302-99 = "Porque você vai me proteger? I-isso é……！"
1600302-100 = "E-eu também me esforço, é claro! Mas se depender só disso, quando chegar a hora……！"
1600302-101 = "……。"
1600302-102 = "Não, entendi. Basta que eu, como membro do comitê de vigilância, proteja você adequadamente, Sensei."
1600302-103 = "……Vou me esforçar para estar à altura da sua confiança. Então, até mais, boa noite."
1600302-105 = "（Suzumi se virou e desapareceu na escuridão com passos rápidos）"
1600302-106 = "（De alguma forma, o jeito que ela caminhava parecia um pouco mais desajeitado do que antes）"
