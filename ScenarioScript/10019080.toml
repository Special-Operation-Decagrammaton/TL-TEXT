[translation]
10019080-2 = "Confirmamos a extinção de todos os cinco Sanctums...!!"
10019080-3 = "Mas a energia do sexto Sanctum está crescendo cada vez mais...#nO que diabos está acontecendo?"
10019080-4 = "Isso é... confirmamos que a energia de todos os Sanctums está se concentrando em um único ponto."
10019080-5 = "Hã!? Como assim!?"
10019080-6 = "O poder de todos os Sanctums se uniu em um só—#ne a \"Torre do Sanctum Final\" está sendo gerada."
10019080-8 = "Entendo... Compreendido. Muito obrigada."
10019080-9 = "Sensei... provavelmente, esta será a batalha final. Esteja preparado."
10019080-17 = "Fufu... está quase na hora da minha arma secreta entrar em cena."
10019080-18 = "Chefe, você tinha uma arma secreta? Quer dizer que você estava escondendo isso esse tempo todo?"
10019080-19 = "Dizer que eu estava escondendo... para ser mais precisa, diria que... ela acabou de ser concluída agora."
10019080-20 = "Chi-chan, você está pronta?"
10019080-21 = "Eu estou pronta, mas... não posso garantir nada."
10019080-22 = "Sim, eu entendo. Como sempre, começaremos com um teste de funcionamento. #nMeu horóscopo de hoje estava bom, então não deve haver problemas."
10019080-23 = "Que tipo de arma secreta é essa?"
10019080-24 = "Ah... é um pouco difícil de explicar, mas..."
10019080-25 = "Usando a energia do Sanctum, talvez possamos causar um fenômeno que transcende as leis da física. Embora seja algo limitado."
10019080-26 = "Transcender... as leis da física?"
10019080-28 = "Sim. Em termos simples—"
10019080-29 = "É a \"Gigantificação de Matéria\"."
10019080-34 = "Hã... entendi...?"
10019080-35 = "Haa... parece uma piada, mas os fenômenos que estão acontecendo em Kivotos agora também parecem uma piada."
10019080-36 = "...Por isso, não se preocupe com os detalhes. Nem eu mesma entendo muito bem."
10019080-38 = "Pois é... acho que podemos considerar como um tipo de fenômeno singular."
10019080-39 = "Err, então, em outras palavras. Para lutar contra aquele monstro gigante, vamos \"gigantificar\" alguma coisa?"
10019080-40 = "Isso. Teoricamente, enquanto este \"Sanctum da Falsidade\" estiver ativo em Kivotos, o efeito será mantido por cerca de 3 minutos."
10019080-41 = "3 minutos... é mais curto do que eu pensava."
10019080-42 = "Fenômenos singulares são assim mesmo."
10019080-43 = "Então, vamos procurar um alvo para gigantificar."
10019080-44 = "Hum... se vamos enfrentar um monstro gigante... tanques, helicópteros, nenhum deles parece uma má ideia..."
10019080-45 = "[s] \"Nesse caso...\""
10019080-46 = "Oh. Sensei, você tem alguma sugestão?"
10019080-47 = "[s] \"Nesse caso, tenho o candidato perfeito\""
10019080-48 = "...? Do que você está falando?"
10019080-55 = "Hahhahhahhahha!"
10019080-56 = "Esquadrão Sushi Rotativo Infinito, Kaitenger! Retornando! Em cena!"
10019080-57 = "A existência perfeita para a gigantificação! Sim, não somos nós mesmos?"
10019080-58 = "Hum, que seja. Se é assim, não tem jeito. Vamos dar o nosso melhor."
10019080-59 = "Entendido. Se é esse o caso, cobraremos uma taxa especial de serviço!"
10019080-60 = "Não temos escolha a não ser fazer isso."
10019080-61 = "Certo! Então, Sensei, diga aquela frase!!"
10019080-63 = "[ns1] \"Vamos lá!! Esquadrão Sushi Rotativo Infinito, Kaiten FX Mk.∞!!\"\n[ns2] \"Kraken—!!!\"\n[ns3] \"Okeranva—!!!\""
10019080-65 = "Entendo. 0 e ∞ são dois lados da mesma moeda... então é por isso o nome."
10019080-67 = "...Sim? O que exatamente você quer dizer com..."
10019080-68 = "[s] \"...Já que estamos aqui, eu queria dizer...\""
10019080-70 = "...Sim? O que exatamente você quer dizer com..."
10019080-71 = "[s] \"...Já que estamos aqui, eu queria dizer...\""
10019080-72 = "Err..."
10019080-73 = "A propósito, esse desenrolar está tudo bem...?"
10019080-74 = "[s] \"É legal, então está tudo bem.\""
10019080-79 = "Aquilo é...!!"
10019080-80 = "Eu vi isso num filme outro dia, Hifumi!"
10019080-81 = "O-o que é isso...!?"
10019080-83 = "Vamos lá!! Esquadrão de Sushi Rotativo Infinito, Kaitenger#nO robô supremo!!"
10019080-88 = "Kaiten FX Mk.∞, lançar!!"
10019080-101 = "A-aaaaah!?"
10019080-102 = "Incríveeeel! É um robô de sushi!!"
10019080-104 = "Fufu... Isso é realmente, não sei nem o que dizer..."
10019080-105 = "É tipo um 'Cabrum! Crash!★', né?#nAcho que é bem fácil de entender!"
