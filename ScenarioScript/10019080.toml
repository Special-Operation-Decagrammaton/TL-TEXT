[translation]
10019080-2 = "5つのサンクトゥム、全て消滅を確認……！！"
10019080-3 = "でも、6つ目のサンクトゥムのエネルギーがどんどん大きくなってるんだけど……#n一体何が起きてんの？"
10019080-4 = "これは……全てのサンクトゥムからエネルギーが一箇所に集中している事を確認しました。"
10019080-5 = "うえっ！？どゆこと！？"
10019080-6 = "全てのサンクトゥムの力が一つに集まり――#n「最後のサンクトゥムタワー」が生成されています。"
10019080-8 = "なるほど……分かりました。ありがとうございます。"
10019080-9 = "先生……おそらく、これが最後の戦いとなります。ご準備を。"
10019080-17 = "ふふっ……そろそろ私の秘密兵器の出番ですね。"
10019080-18 = "部長、秘密兵器なんてあったの？今まで隠してたってこと？"
10019080-19 = "隠していたと言いますか、正確には……今完成したと言いますか。"
10019080-20 = "チーちゃん、準備はできましたか？"
10019080-21 = "準備はできてるけど……何も保証できないよ。"
10019080-22 = "ええ、承知しております。いつも通り、まずは試運転からですね。#n私、今日の運勢は良かったので問題無いかと。"
10019080-23 = "その秘密兵器ってどんなやつ？ "
10019080-24 = "あー……説明するのがちょっと難しい、けど……"
10019080-25 = "サンクトゥムのエネルギーを利用して、物理法則を超越する現象を起こせるかもしれないの。限定的なものだけど。"
10019080-26 = "物理法則を、超越……？"
10019080-28 = "はい。簡単に言えば――"
10019080-29 = "「物質の巨大化」です。"
10019080-34 = "へぇ……なるほど……？"
10019080-35 = "はぁ……冗談みたいな話だけど、今キヴォトスで起きている現象だって、冗談みたいな話だからね。"
10019080-36 = "……だから、細かいことは気にしないでほしい。私もあまりよく分かってないんだ。"
10019080-38 = "そうですね……一種の[ruby=・   ・   ・   ・]特異現象[/ruby]と考えれば良いかと。"
10019080-39 = "えーっと、つまり。あの巨大怪獣と戦うために、何かを「巨大化」するってこと？"
10019080-40 = "そう。理論上だと、この「虚妄のサンクトゥム」がキヴォトスで活性化している間の約3分間、維持される。"
10019080-41 = "3分……思ったより短いね。"
10019080-42 = "特異現象とはそういうものです。"
10019080-43 = "それでは、巨大化する対象を探しましょう。"
10019080-44 = "ふむ……巨大怪獣を相手するのであれば……タンク、ヘリ、どれも悪くなさそうですね……"
10019080-45 = "[s] \"それなら……\""
10019080-46 = "おや。先生、何かご提案があるのでしょうか？"
10019080-47 = "[s] \"それなら、ピッタリの候補があるよ\""
10019080-48 = "……？一体何の事ですか？"
10019080-55 = "はっはっはっはっはっはっ！"
10019080-56 = "無限回転寿司戦隊・カイテンジャー！再び！参上！"
10019080-57 = "巨大化に最適な存在！そう、我々がいるではないか！"
10019080-58 = "ふん、まったく。そういうことなら仕方ない。全力を尽くしてやろう。"
10019080-59 = "承知しました。そういうことでしたら、特別にサービス料金で承りましょう！"
10019080-60 = "これはやるしかないね。"
10019080-61 = "よし！それでは、あの台詞を頼むぞ先生！！"
10019080-63 = "[ns1] \"行くよ！！無限回転寿司戦隊・カイテンFX [ruby=インフィニティ]Mk.∞！！[/ruby]\"\n[ns2] \"クラーケン――！！！\"\n[ns3] \"オケランヴァ――！！！\""
10019080-65 = "なるほど。0と∞は表裏一体の存在……それ故の名称なのですね。"
10019080-67 = "……はい？それは一体、どういう……"
10019080-68 = "[s] \"……せっかくだから、言ってみたくて……\""
10019080-70 = "……はい？それは一体、どういう……"
10019080-71 = "[s] \"……せっかくだから、言ってみたくて……\""
10019080-72 = "えっと……"
10019080-73 = "ところで、この展開大丈夫……？"
10019080-74 = "[s] \"カッコイイから大丈夫。\""
10019080-79 = "あれは……！！ "
10019080-80 = "この前、映画で見たぞヒフミ！ "
10019080-81 = "な、何でしょうかこれは……！？"
10019080-83 = "行くぞ！！無限回転寿司戦隊・カイテンジャー#n究極体のスーパーロボット！！"
10019080-88 = "カイテンFX [ruby=インフィニティ]Mk.∞、出[/ruby]撃！！"
10019080-101 = "う、うわぁああああっ！？ "
10019080-102 = "すっごーい！お寿司ロボットだー！！"
10019080-104 = "ふふ……これは本当に、何が何やら……"
10019080-105 = "ドカーンガシャーン★って事ですよね？#n分かりやすくて良いと思います！"
