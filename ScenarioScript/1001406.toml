[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
1001406-1 = "Este Momento Que Passamos Juntos"
1001406-3 = "[ns1] \"A propósito, a busca pelo caminho do ninja...\"\n[ns2] \"O que exatamente vamos fazer hoje?\""
1001406-6 = "Em primeiro lugar, o que é um ninja...?"
1001406-7 = "Gostaria de começar explorando essa raiz profunda!"
1001406-8 = "Dramas de época também são ótimos materiais de referência, é claro..."
1001406-9 = "Mas a Izuna tem certeza de que há coisas que não podem ser aprendidas apenas através de imagens e filmes!"
1001406-10 = "[s3] \"Pode ser verdade.\"\n[s4] \"Quanto mais referências você tiver, melhor.\""
1001406-11 = "Sim! Então, onde podemos ir para aprender mais sobre os ninjas...?"
1001406-12 = "Sim! Então, onde podemos ir para aprender mais sobre os ninjas...?"
1001406-13 = "Após uma pesquisa meticulosa, criei esta lista!"
1001406-14 = "Seguiremos exatamente este cronograma, se me acompanhar!"
1001406-15 = "[s] \"Claro, vamos tentar seguir a lista.\""
1001406-16 = "Sim! Vamos nessa!"
1001406-19 = "[ns5] \"Aqui é... uma cafeteria?\"\n[ns6] \"Isso vai nos ensinar algo sobre ninjas?\""
1001406-20 = "Sim! Dê uma olhada nisso aqui."
1001406-21 = "Sim! Dê uma olhada nisso aqui."
1001406-23 = "(A Izuna me mostrou um menu que dizia o seguinte:)"
1001406-24 = "(Evento de Colaboração da série do Shiba Inu Wanzou: 'Festival de Doces Ninja - 77 Tipos')"
1001406-25 = "[s] \"Uma colaboração...?\""
1001406-26 = "Sim, uma colaboração! Justamente da maior obra-prima do diretor Shiba Inu Wanzou...!"
1001406-28 = "Meu Mestre! O que você vai pedir?"
1001406-29 = "A recomendação da Izuna é o 'Parfait Errante'."
1001406-30 = "Ah, mas o 'Crepe Solitário' e os 'Biscoitos Shuriken' também parecem muito bons!"
1001406-31 = "Oh! Meu Mestre, se pedirmos 4 ou mais itens do menu, eles nos darão um papel ilustrado com uma cena icônica do filme!"
1001406-32 = "[s] \"A-Ah, é mesmo...?\""
1001406-33 = "Vamos pedir de uma vez! Meu Mestre!"
1001406-35 = "(Pedi 4 itens do menu com a Izuna e ganhamos a ilustração comemorativa...)"
1001406-38 = "[ns] \"Depois dos doces, vamos a uma loja de lamen!?\""
1001406-39 = "Ué, a Izuna não avisou?"
1001406-40 = "Eles também estão vendendo o Lamen Ninja como parte da colaboração!"
1001406-41 = "[s] \"Lamen Ninja!?\""
1001406-42 = "Meu Mestre! Vamos dar uma lida juntos!"
1001406-43 = "Ah, aqui tem um panfleto. Vamos ver..."
1001406-44 = "Aparentemente, o lamen que os ninjas comem é à base de caldo de porco,"
1001406-45 = "Com macarrão fino, muito alho e porco assado de acompanhamento!"
1001406-46 = "A Izuna também vai tentar esse mesmo prato!"
1001406-47 = "[s] \"E-Eh...?\""
1001406-50 = "Slurp!"
1001406-52 = "(A partir daí, fui arrastado para todo lado pela Izuna e experimentei diversos conteúdos de ninja)"
1001406-53 = "(Takoyaki Ninja, Ramune Ninja, Arremesso Livre Ninja...)"
1001406-55 = "Uhn~! Aprendi tantas coisas sobre ninjas hoje com o Meu Mestre!"
1001406-56 = "[s] \"Isso parece menos sobre a busca ninja e mais...\""
1001406-57 = "Ah, Meu Mestre! Olhe ali!"
1001406-58 = "Diz ali que têm barcos para a gente ter uma experiência ninja!"
1001406-59 = "[s] \"Você está falando sobre Mizugumo? ...Espera, aquilo não é só um barco normal...?\""
1001406-62 = "(A Izuna está lendo atentamente o painel descritivo ao lado do embarcadouro)"
1001406-63 = "Aha... entendi..."
1001406-64 = "Fascinante... Os ninjas remam em barcos para treinar os seus corpos..."
1001406-66 = "Meu Meeeeeestre!"
1001406-67 = "[s7] \"Sim, sim.\"\n[s8] \"Nós vamos juntos, certo?\""
1001406-68 = "O-O que, telepatia...!? Você lê mentes...!"
1001406-69 = "O-O que, telepatia...!? Você lê mentes...!"
1001406-70 = "O Meu Mestre é um ninja com poderes psíquicos...?"
1001406-71 = "[s] \"Eu sou um ninja? Ou um telepata?\""
1001406-72 = "É brincadeira, ehehe! Vamos, Meu Mestre!"
1001406-73 = "Vamos remar juntos!"
1001406-78 = "― Ah, [wa:1000] Meu Mestre, [wa:500] Meu Mestre! [wa:1000] Você viu isso!?"
1001406-80 = "[wa:500]― Uma carpa acabou de saltar [wa:500]na superfície [wa:500]da água!"
1001406-83 = "[ns] \"Calma, se o barco balançar muito é perigoso.\""
1001406-84 = "― Ah, [wa:500] é verdade. [wa:1000] Acalme-se, [wa:500] Izuna... [wa:1200] Controle [wa:800] o seu espírito..."
1001406-86 = "― ......Ehe, [wa:1000] ehehehe."
1001406-89 = "[ns] \"Izuna, você parece estar se divertindo muito.\""
1001406-90 = "[wa:500]― Sim! [wa:500] É muito divertido. [wa:1500] Estar tão feliz assim é, com certeza..."
1001406-92 = "― Porque estou junto [wa:1500] com o Meu Mestre, [wa:1500] que eu tanto amo?"
1001406-95 = "[wa:800]― O dia de hoje, [wa:1200] com certeza [wa:800] será uma memória que a Izuna [wa:700] guardará para a vida toda."
1001406-98 = "[ns9] \"Tenho certeza de que não será a única memória que faremos hoje.\"\n[ns10] \"A partir de hoje, sempre vou estar ao seu lado para passarmos um tempo juntos.\""
1001406-101 = "[wa:500]― ...! [wa:1500] Sim, [wa:500] Meu Mestre! [wa:1000] Eu posso ser um pouco inexperiente, mas...!"
1001406-103 = "― Por favor, [wa:1000] continue cuidando da Izuna! [wa:1500] Ehehe! [wa:500]"
1001406-106 = "(Ficamos lá por um tempo remando e, na companhia da Izuna, desfrutamos de momentos tranquilos e divertidos juntos)"