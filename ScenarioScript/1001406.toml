[translation]
1001406-1 = "Este momento em que podemos estar juntos"
1001406-3 = "[ns1] \"A propósito, sobre a busca pelo caminho ninja,\"\n[ns2] \"o que você faz especificamente?\""
1001406-6 = "Primeiro, vamos começar do zero: o que é um ninja..."
1001406-7 = "Eu gostaria de investigar essa parte fundamental!"
1001406-8 = "Dramas de época são, claro, materiais excelentes, mas..."
1001406-9 = "Izuna acha que deve haver coisas que não podem ser compreendidas apenas assistindo!"
1001406-10 = "[s3] \"Talvez você tenha razão.\"\n[s4] \"Quanto mais material, melhor, né?\""
1001406-11 = "Sim! Então, para saber onde podemos aprender sobre ninjas..."
1001406-12 = "Sim! Então, para saber onde podemos aprender sobre ninjas..."
1001406-13 = "Após uma pesquisa preliminar exaustiva, eu fiz uma lista!"
1001406-14 = "Vamos visitar os lugares seguindo esta lista, espero que você possa me acompanhar!"
1001406-15 = "[s] \"Certo, então vamos seguir isso e dar uma olhada.\""
1001406-16 = "Sim! Então vamos lá!"
1001406-19 = "[ns5] \"Aqui... um café?\"\n[ns6] \"É aqui que vamos aprender sobre ninjas?\""
1001406-20 = "Exatamente! Por favor, dê uma olhada nisto."
1001406-21 = "Exatamente! Por favor, dê uma olhada nisto."
1001406-23 = "(O menu que Izuna me mostrou dizia o seguinte)"
1001406-24 = "(Evento de colaboração da série de dramas de época do Shiba Inu Wanzou: 'Festival de Doces Ninja: 77 Tipos')"
1001406-25 = "[s] \"Uma colaboração...?\""
1001406-26 = "Sim, uma colaboração! E ainda por cima, com uma das obras-primas do diretor Shiba Inu Wanzou...!"
1001406-28 = "Mestre! Qual você vai escolher?"
1001406-29 = "A recomendação da Izuna é este 'Parfait Errante'."
1001406-30 = "Ah, mas este 'Crepe Solitário' e os 'Biscoitos Shuriken' também parecem ótimos!"
1001406-31 = "Ah! Mestre, se pedirmos 4 itens do menu aqui, ganhamos um shikishi com cenas famosas do filme impressas!"
1001406-32 = "[s] \"E-entendi...\""
1001406-33 = "Vamos pedir logo! Mestre!"
1001406-35 = "(Pedi 4 itens do menu junto com a Izuna e ganhei o shikishi de brinde da colaboração...)"
1001406-38 = "[ns] \"Depois da sobremesa, uma loja de lámen!?\""
1001406-39 = "Ué, Izuna, eu não tinha mencionado?"
1001406-40 = "Aqui eles também vendem um lámen ninja como produto da colaboração!"
1001406-41 = "[s] \"Lámen ninja!?\""
1001406-42 = "Mestre! Vamos investigar juntos!"
1001406-43 = "Ah, tem um panfleto aqui. Vejamos..."
1001406-44 = "O lámen que os ninjas costumam comer tem base de tonkotsu,"
1001406-45 = "e é comum comer com macarrão fino, bastante alho e cobertura de chashu!"
1001406-46 = "Izuna também vai encarar o mesmo menu!"
1001406-47 = "[s] \"A-ah, entendi...\""
1001406-50 = "Slurp!"
1001406-52 = "(Depois disso, Izuna me levou a vários lugares para experimentar conteúdos ninjas)"
1001406-53 = "(Takoyaki ninja, ramune ninja, arremesso de lance livre ninja, e por aí vai...)"
1001406-55 = "Nham! Hoje eu pude aprender muito sobre ninjas com você, Mestre!"
1001406-56 = "[s] \"Isso é realmente uma busca sobre ninjas...?\""
1001406-57 = "Ah, Mestre! Olhe ali!"
1001406-58 = "Dizem que tem um barco onde podemos vivenciar a experiência ninja!"
1001406-59 = "[s] \"Você diz o mizugumo? ...Mas aquilo não é só um barco comum...?\""
1001406-62 = "(Izuna está lendo seriamente o texto explicativo fixado ao lado do cais)"
1001406-63 = "Hmm, hmm..."
1001406-64 = "Entendo... Para treinar o corpo, os ninjas remavam barcos..."
1001406-66 = "Mestre!"
1001406-67 = "[s7] \"Sim, sim.\"\n[s8] \"Vamos subir juntos, né?\""
1001406-68 = "O quê, leitura de mentes...!? Ler o coração de alguém assim...!"
1001406-69 = "O quê, leitura de mentes...!? Ler o coração de alguém assim...!"
1001406-70 = "Mestre, você é um ninja com superpoderes...?"
1001406-71 = "[s] \"Isso é coisa de ninja ou de superpoderoso?\""
1001406-72 = "É brincadeira, ehehe! Vamos, Mestre!"
1001406-73 = "Vamos subir os dois!"
1001406-78 = "― Ah, [wa:1000]Mestre, [wa:500]Mestre! [wa:1000]Você viu aquilo agora!?"
1001406-80 = "[wa:500]― Uma carpa [wa:500]saltou [wa:500]na superfície da água!"
1001406-83 = "[ns] \"Calma, é perigoso se o barco balançar, sabia?\""
1001406-84 = "― Ah, [wa:500]é verdade. [wa:1000]Calma, [wa:500]Izuna... [wa:1200]Mantenha a [wa:800]calma..."
1001406-86 = "― ...Ehe, [wa:1000]ehehehe."
1001406-89 = "[ns] \"Izuna, você parece estar se divertindo muito.\""
1001406-90 = "[wa:500]― Sim! [wa:500]Estou me divertindo, [wa:1500]e será que é porque..."
1001406-92 = "― Estou junto com o meu querido Mestre, [wa:1500]que estou tão feliz?"
1001406-95 = "[wa:800]― Este dia de hoje, [wa:1200]para a Izuna, [wa:800]com certeza [wa:700]será uma lembrança para a vida toda."
1001406-98 = "[ns9] \"Não vai ser só hoje que vamos criar lembranças.\"\n[ns10] \"De agora em diante, estarei sempre ao seu lado.\""
1001406-101 = "[wa:500]― ...! [wa:1500]Sim, [wa:500]Mestre! [wa:1000]Embora eu ainda seja inexperiente...!"
1001406-103 = "― Por favor, [wa:1000]continue cuidando da Izuna daqui para frente! [wa:1500]Ehehe! [wa:500] "
1001406-106 = "(Enquanto remava o barco por um tempo, passei um momento tranquilo e divertido com a Izuna)"
