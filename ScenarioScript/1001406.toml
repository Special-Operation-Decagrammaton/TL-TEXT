[translation]
1001406-1 = "一緒にいられるこの今を"
1001406-3 = "[ns1] \"ところで、忍者の道の追求って、\"\n[ns2] \"具体的には何をするの？\""
1001406-6 = "まずはあらためて、忍者とは何か……。"
1001406-7 = "その根本的な部分を追求してみようと思います！"
1001406-8 = "時代劇も、もちろん立派な資料ですが……。"
1001406-9 = "映像だけでは分からないものがきっとあるのではないかと、イズナは思います！"
1001406-10 = "[s3] \"確かにそうかも。\"\n[s4] \"資料は多ければ多いほどいいよね。\""
1001406-11 = "はい！そこで、どこに行けば忍者について知ることができるのか……"
1001406-12 = "はい！そこで、どこに行けば忍者について知ることができるのか……"
1001406-13 = "徹底的な事前調査の末に、そのリストを作ってきました！"
1001406-14 = "この通りに巡りますので、お付き合いいただければと！"
1001406-15 = "[s] \"うん、じゃあそれに従って行ってみよっか。\""
1001406-16 = "はい！では行きましょう！"
1001406-19 = "[ns5] \"ここ……カフェ？\"\n[ns6] \"ここで忍者のことが分かるの？\""
1001406-20 = "そうです！こちらを見てください、これです。"
1001406-21 = "そうです！こちらを見てください、これです。"
1001406-23 = "（イズナが見せてくれたメニューにはこう書いてあった）"
1001406-24 = "（柴犬ワン蔵の時代劇シリーズコラボイベント『忍者スイーツ祭り77種』）"
1001406-25 = "[s] \"コラボ……？\""
1001406-26 = "はい、コラボです！それも柴犬ワン蔵監督の代表作の……！"
1001406-28 = "主殿！主殿はどれにしますか？"
1001406-29 = "イズナのおすすめはこの「彷徨うパフェ」ですね。"
1001406-30 = "あっ、でもこちらの「孤独なクレープ」や「手裏剣クッキー」も良さそうです！"
1001406-31 = "えっ！主殿っ、ここでメニューを4つ以上頼むと、映画の名場面がプリントされた色紙もくれるそうです！"
1001406-32 = "[s] \"そ、そっか……。\""
1001406-33 = "早く頼みましょう！主殿！"
1001406-35 = "（イズナと一緒にメニューを4つ頼んで、コラボの特典色紙をもらった……）"
1001406-38 = "[ns] \"デザートの次は、ラーメン屋！？\""
1001406-39 = "あれっ、イズナ、言っていませんでしたっけ？"
1001406-40 = "ここでも、コラボ商品として忍者ラーメンを売っているんです！"
1001406-41 = "[s] \"忍者ラーメン！？\""
1001406-42 = "主殿！一緒に調べてみましょう！"
1001406-43 = "あっ、冊子がありますね。どれどれ……。"
1001406-44 = "忍者が普段食べるラーメンは豚骨がベースになっており、"
1001406-45 = "細麺、ニンニク多め、チャーシュートッピングで食べるのが常である、とのことです！"
1001406-46 = "イズナも同じメニューに挑戦します！"
1001406-47 = "[s] \"う、うん……？\""
1001406-50 = "ズルズルっ！"
1001406-52 = "（その後もイズナにあちこちに連れられて、忍者コンテンツを体験していった）"
1001406-53 = "（忍者たこ焼き、忍者ラムネ、忍者フリースローなどなど……）"
1001406-55 = "ん～！今日は主殿と、忍者についてたくさん学ぶことができました！"
1001406-56 = "[s] \"これ、忍者についての追求っていうか……。\""
1001406-57 = "あっ、主殿！あそこを見てください！"
1001406-58 = "忍者を体験できるボートがあるそうです！"
1001406-59 = "[s] \"水蜘蛛のこと？……って、あれはただのボートでは……？\""
1001406-62 = "（イズナは、ボート乗り場の横に立てられた説明文を真剣に読んでいる）"
1001406-63 = "ふむふむ……。"
1001406-64 = "なるほど……忍者たちは身体を鍛えるために、ボートを漕いで……。"
1001406-66 = "主殿ーっ！"
1001406-67 = "[s7] \"はいはい。\"\n[s8] \"一緒に乗るんでしょ？\""
1001406-68 = "なっ、読心術……！？心を読むだなんて……！"
1001406-69 = "なっ、読心術……！？心を読むだなんて……！"
1001406-70 = "主殿は、超能力忍者だったのですか……？"
1001406-71 = "[s] \"それは忍者なの？超能力者なの？\""
1001406-72 = "冗談です、えへへっ！さっ、主殿！"
1001406-73 = "二人で乗りましょう！"
1001406-78 = "― あっ、[wa:1000]主殿、[wa:500]主殿！[wa:1000]今の見ましたか！？"
1001406-80 = "[wa:500]― 鯉が[wa:500]水面で[wa:500]跳ねていましたよ！"
1001406-83 = "[ns] \"落ち着いて、船が揺れると危ないよ？\""
1001406-84 = "― あ、[wa:500]そうですね。[wa:1000]落ち着いて、[wa:500]イズナ……[wa:1200]精神を[wa:800]落ち着けて……。"
1001406-86 = "― ……えへっ、[wa:1000]えへへへっ。"
1001406-89 = "[ns] \"イズナ、すごく楽しそうだね。\""
1001406-90 = "[wa:500]― はい！[wa:500]楽しいです、[wa:1500]こんなにも楽しいのはやはり……"
1001406-92 = "― 大好きな主殿と、[wa:1500]一緒だから、[wa:1500]でしょうか？"
1001406-95 = "[wa:800]― 今日のこの日は、[wa:1200]イズナにとって[wa:800]きっと[wa:700]一生の思い出になります。"
1001406-98 = "[ns9] \"思い出になるのはきっと、今日だけじゃないよ。\"\n[ns10] \"これから先もずっと、いくらでも付き合うから。\""
1001406-101 = "[wa:500]― ……っ！[wa:1500]はい、[wa:500]主殿！[wa:1000]不束者ではありますが……！"
1001406-103 = "― これからもイズナを、[wa:1000]よろしくお願いいたします！[wa:1500]えへへっ！[wa:500] "
1001406-106 = "（しばらくボートを漕ぎながら、イズナと一緒に静かで楽しい時間を過ごした）"
