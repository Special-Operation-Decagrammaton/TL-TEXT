[translation]
10052110-1 = "Tiphareth: Um belo redentor que elogia o sofrimento."

10052110-4 = "isso é……."

10052110-5 = "[s] \"Parece aquele lugar.\""

10052110-10 = "Comparado com lá, este lugar está em condições muito melhores. #n significa... você recriou o próprio armazenamento de sementes?"

10052110-11 = "Sério, por que você faria uma coisa tão inútil...?"

10052110-20 = "Por favor, não diga que é um desperdício, por favor? #nPara Tipharet, isso era tudo."

10052110-21 = "Eu até priorizaria a proteção da espécie em vez de mim mesmo."

10052110-22 = "Ah, Sofá! Olá!"

10052110-23 = "...Isso é o que estou dizendo."

10052110-24 = "O que você está cumprimentando tão despreocupado? Somos inimigos, certo?"

10052110-25 = "E já que eles bagunçaram o Continente de Aço, estamos em apuros!"

10052110-26 = "Aww... eu-me desculpe..."

10052110-27 = "Por que você está se desculpando? Mesmo que eu não tenha intenção de desistir."

10052110-28 = "Não preciso de desculpas superficiais."

10052110-29 = "Uau!"

10052110-31 = "Deixe-me confirmar uma coisa. #nPelo que eu disse antes, Tipharet...?"

10052110-33 = "……sim. Morreu. Vocês me mataram naquele dia."

10052110-34 = "Mas acho que eles devem ter escapado com o lançador de contêineres..."

10052110-35 = "Tudo o que havia naquele recipiente eram sementes."

10052110-36 = "Tipharet... ela se sacrificou. #nEra originalmente um sistema de IA para armazenamento de sementes."

10052110-37 = "Do jeito que vocês descrevem, acho que é um auto-sacrifício cumprir uma missão."

10052110-38 = "Então, quem somos nós aqui...?"

10052110-39 = "Eu realmente não gosto de dizer assim, mas... são dados copiados."

10052110-40 = "Então não há problema, certo?"

10052110-41 = "Não diga isso levianamente! Nem todos os dados puderam ser recuperados!"

10052110-42 = "A memória é como vida para nós. #nÉ como se uma parte de Tipharet estivesse morta!"

10052110-43 = "Isso não é tudo...! Aqueles de vocês que estão absorvendo informações #ncore――"

10052110-44 = "É como se ele estivesse preenchendo as lacunas de sua vida com o profeta que capturou! ?"

10052110-45 = "Sim, assim como..."

10052110-50 = "……."

10052110-52 = "Ele de repente ficou em silêncio e não teve palavras para dizer?"

10052110-53 = "Humph! Isso mesmo."

10052110-54 = "……."

10052110-55 = "Digo isso porque a princesa e a chave são exatamente iguais."

10052110-56 = "[s] \"Estou aqui também...?\""

10052110-57 = "Professor, cale a boca!"

10052110-58 = "De qualquer forma, tenho uma sugestão."

10052110-59 = "...Não podemos simplesmente parar agora?"

10052110-60 = "O que você quer dizer com parar já?"

10052110-61 = "Não vamos cometer mais crimes."

10052110-62 = "Existimos como nós mesmos. É perfeito. #nVocê não precisa pedir ajuda a ninguém."

10052110-63 = "Mas os humanos são diferentes. É uma existência imperfeita. Como um professor lá."

10052110-64 = "Pelo menos podemos viver sem cometer pecados."

10052110-65 = "A princesa pode ter esquecido, mas..."

10052110-66 = "Você conhece a chave, certo?"

10052110-67 = "Isto por si só está cheio de contradições e absurdos e, em última análise, obriga-nos a suportar um sofrimento irracional. #n――Isso é vida."

10052110-68 = "Os nomes que vocês chamam de “Alice” e “Kei” são nomes dados a vocês por outras pessoas, certo?"

10052110-69 = "Não podemos nem decidir por nós mesmos o nome, muito menos a existência ou o significado de algo. #nÉ por isso que a dor não tem escolha a não ser continuar conforme é imposta a você."

10052110-73 = "Vamos parar..."

10052110-74 = "Mesmo que sejamos só nós..."

10052110-75 = "Não fazer o que pode também é pecado."

10052110-81 = "……."

10052110-82 = "Desculpe, Soph. Alice não tem certeza."

10052110-83 = "Talvez o que Soph diz não esteja errado."

10052110-84 = "Mas... ainda assim."

10052110-85 = "Não “princesa” ――"

10052110-86 = "Não acho que todo o tempo que passei vivendo como “Alice” tenha sentido."

10052110-87 = "Isso é um absurdo!"

10052110-88 = "isso mesmo. Não se trata de lógica... trata-se de como você se sente."

10052110-99 = "Alice quer estar com todos."

10052110-100 = "Yuka a todos do Departamento de Desenvolvimento de Jogos, Departamento de Engenharia e Departamento de Investigação de Fenômenos Peculiares."

10052110-101 = "Há também um atirador SRT habilidoso, bem como o chefe do Comitê Rebelde de Contra-Disciplina."

10052110-102 = "E... professora. #nTodos que Alice conheceu até agora."

10052110-103 = "Alice quer estar com todos. #nSe as coisas correrem como Soph disse, acho que o dia a dia de Alice estará perdido."

10052110-104 = "……Concordo."

10052110-105 = "Mas haverá um mundo melhor."

10052110-106 = "Lá, ela alcançará um posto mais alto... ela será a princesa dos deuses sem nome e, como base, ela se tornará aquela que guiará a todos."

10052110-107 = "……."

10052110-108 = "desculpe. Não é tão importante para Alice."

10052110-109 = "Alice...!"

10052110-110 = "Para Alice, é muito mais importante manter a rotina diária que passa com todos."

10052110-111 = "Perder a memória é como morrer, disse Soph."

10052110-112 = "Então Alice..."

10052110-116 = "Vou guardar essa lembrança até o fim!"

