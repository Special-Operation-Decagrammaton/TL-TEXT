[translation]
2002503-1 = "Senso de estação"
2002503-2 = "（Ao sair na rua comercial do bairro, Haruka estava olhando ao redor）"
2002503-7 = "（……Ela está usando um quimono de bainha curta que vi uma vez antes）"
2002503-8 = "[ns1] \"Haruka!\"\n[ns2] \"É por aqui!\""
2002503-9 = "……Ah! Se, Sensei……!!"
2002503-10 = "……Ah! Se, Sensei……!!"
2002503-11 = "De, desculpe! Você estava tão perto e eu nem percebi……!!"
2002503-12 = "……Eh?"
2002503-13 = "En, entendi…… vou te seguir……."
2002503-20 = "Se, Sensei……? Por que você está em um lugar como este……."
2002503-21 = "Veio para um lugar mais quente porque parecia estar com frio……?"
2002503-22 = "Po, por favor…… não há necessidade de fazer isso por alguém como eu……."
2002503-23 = "……Si, sim? O que foi?"
2002503-24 = "[s3] \"Bem…… posso te perguntar sobre esse quimono?\"\n[s4] \"Tem algum motivo para ter escolhido ele?\""
2002503-25 = "Ah…… bem…… is, isso é……."
2002503-26 = "Ah…… bem…… is, isso é……."
2002503-27 = "Não, não há um motivo especial…… #nÉ só que…… este era o mais……."
2002503-28 = "O preço…… era barato……."
2002503-29 = "[s5] \"……Entendo…….\"\n[s6] \"Então foi por isso que escolheu um quimono curto…….\""
2002503-30 = "Co, como eu pensei……! Não importa o quão barato seja, #num quimono tão bonito não combina comigo, não é……!?"
2002503-31 = "Co, como eu pensei……! Não importa o quão barato seja, #num quimono tão bonito não combina comigo, não é……!?"
2002503-32 = "Na verdade, eu não pretendia comprar, mas se eu fosse a única no escritório com roupas comuns, eu me destacaria demais…… pensei que acabaria causando problemas……!"
2002503-33 = "Então, comprei para combinar com todo mundo, mas…… #nainda sinto que não estou à altura……."
2002503-34 = "Desculpe, desculpe, desculpe……!!"
2002503-35 = "……Eh?"
2002503-36 = "Então, por que você perguntou sobre o quimono……?"
2002503-37 = "[s7] \"Ele combina com você, mas queria ver um quimono mais apropriado para o inverno.\"\n[s8] \"O dinheiro não é problema, quer ir comprar um novo comigo?\""
2002503-38 = "Ah…… si, sim……."
2002503-39 = "Ah…… si, sim……."
2002503-40 = "……Sim?"
2002503-41 = "Eh…… Sensei……? O que você disse agora……?"
2002503-45 = "…………."
2002503-46 = "Não, não, não, não, não, não, não, não, não, não, não, não!!!"
2002503-47 = "Is, isso não pode acontecer! Gastar o dinheiro precioso do Sensei com alguém como eu! #nDefinitivamente…… isso não pode…… acontecer……!!"
2002503-48 = "Se isso acontecesse…… a cada poeira que caísse na roupa, #neu teria que morrer para me desculpar……!!"
2002503-49 = "Re, realmente não precisa! Então, por favor…… #npor favor, reconsidere……!!"
2002503-50 = "[s9] \"Es, está tão preocupada assim……?\"\n[s10]（Será que acabei deixando ela mais nervosa……）"
2002503-51 = "A, além disso, essa roupa tem suas vantagens! #nÉ fácil de se mover, e para o preço, a aparência é boa……"
2002503-52 = "A, além disso, essa roupa tem suas vantagens! #nÉ fácil de se mover, e para o preço, a aparência é boa……"
2002503-53 = "E, acima de tudo, graças a esta roupa, pude vir aqui com o Sensei……!"
2002503-54 = "……!! Es, es, es, esqueça o que eu disse!! #nEu só tentei inventar uma desculpa e acabei falando demais……!!"
2002503-55 = "Ah, não, eu não quis dizer nada sem pensar……! #nUuu…… o, o que eu deveria dizer……."
2002503-56 = "Bem……!"
2002503-57 = "Po, por isso……!!"
2002503-58 = "…………."
2002503-62 = "――Eu vou morrer mesmo!!!"
2002503-64 = "（Depois disso, acalmei a Haruka e comprei doces de um café para ela, em vez do quimono）"
2002503-66 = "De, desculpe…… por minha causa……."
2002503-67 = "……Eh? Ma, mas eu fiz todo aquele escândalo…… #ne além disso, o Sensei pagou por tudo……."
2002503-68 = "……Sim?"
2002503-69 = "Uma promessa...? Q-que tipo de promessa...?"
2002503-70 = "N-não, é claro que, não importa o conteúdo, se o Sensei está pedindo, eu a cumprirei mesmo que custe a minha vida, mas..."
2002503-71 = "[s11] \"Não se esforce demais quando estiver usando esse quimono.\"\n[s12] \"Se sentir que vai pegar um resfriado, vá para um lugar aquecido.\""
2002503-72 = "......Eh, bem... por que você quer fazer esse tipo de promessa...?"
2002503-73 = "......Eh, bem... por que você quer fazer esse tipo de promessa...?"
2002503-74 = "M-mas... sim, eu entendi! Eu com certeza vou cumprir! Afinal, é uma promessa com o Sensei!!"
2002503-75 = "......I-isso está bom... será...?"
2002503-76 = "S-se o Sensei está satisfeito, então tudo bem, mas... hum..."
2002503-77 = "[s13] \"...?\"\n[s14] \"Se tiver algo que te incomoda, pode me dizer, tá?\""
2002503-78 = "Ah, não! Não é nada disso!!"
2002503-79 = "Ah, não! Não é nada disso!!"
2002503-80 = "Dizer que o Sensei está errado..."
2002503-81 = "Isso é algo que jamais aconteceria!"
2002503-82 = "Se alguém disser o contrário, eu mesma vou acabar com eles!!"
2002503-83 = "............"
2002503-84 = "......He... Hehe..."
2002503-86 = "(Depois disso, comprei um aquecedor de mãos para a Haruka e voltei para o Schale)"
