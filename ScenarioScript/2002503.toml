2002503-76 = "せ、先生が満足ならいいんですが……うぅん……。"
2002503-77 = "[s13] \"……？\"\n[s14] \"気になることがあるなら言ってね？\""
2002503-78 = "あ、いえ！そんなことはありません！！"
2002503-79 = "あ、いえ！そんなことはありません！！"
