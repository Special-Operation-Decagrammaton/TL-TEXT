2002503-72 = "……え、っと……どうしてそのような約束を……？"
2002503-73 = "……え、っと……どうしてそのような約束を……？"
2002503-74 = "で、でも……はい、分かりました！必ず守ります！#n他ならぬ先生との約束ですから！！"
