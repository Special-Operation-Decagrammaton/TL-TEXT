[translation]
2002503-1 = "季節感"
2002503-2 = "（近所の商店街に出ると、ハルカが周りを見回していた）"
2002503-7 = "（……前に一度見た、丈の短い着物を着ている）"
2002503-8 = "[ns1] \"ハルカ！\"\n[ns2] \"こっちだよ！\""
2002503-9 = "……あ！せ、先生……！！"
2002503-10 = "……あ！せ、先生……！！"
2002503-11 = "す、すみません！すぐ近くにいらっしゃったのに、#n見つけられずにいたなんて……！！"
2002503-12 = "……え？"
2002503-13 = "わ、分かりました……ついて行きます……。"
2002503-20 = "せ、先生……？どうしてこんなところに……。"
2002503-21 = "寒そうだから暖かい場所に来た……？"
2002503-22 = "そ、そんな……私なんかのために、そうしていただく必要は……。"
2002503-23 = "……は、はい？何でしょう？"
2002503-24 = "[s3] \"えっと……その着物のこと、聞いてもいい？\"\n[s4] \"選んだ理由とか、あったりするの？\""
2002503-25 = "あ……えっと……こ、これは……。"
2002503-26 = "あ……えっと……こ、これは……。"
2002503-27 = "と、特別な理由があるわけではないのですが……。#nただ……これが、一番……。"
2002503-28 = "値段が……安くて……。"
2002503-29 = "[s5] \"……なるほど……。\"\n[s6] \"それで丈の短い着物を……。\""
2002503-30 = "や、やっぱりそうですよね……！どんなに安くても、#n私なんかにこんな綺麗な着物は似合わないですよね……！？"
2002503-31 = "や、やっぱりそうですよね……！どんなに安くても、#n私なんかにこんな綺麗な着物は似合わないですよね……！？"
2002503-32 = "本当は買わないつもりだったのですが、事務所の中で私だけ普通の服だったら、浮いてしまいますから……迷惑をかけてしまうのでは、と思いまして……！"
2002503-33 = "それで、みんなに合わせて買ったはいいものの……#nやはり身の程知らずのような気がして……。"
2002503-34 = "すみませんすみませんすみません……！！"
2002503-35 = "……え？"
2002503-36 = "では、どうして着物の話を……？"
2002503-37 = "[s7] \"それも似合ってるけど、冬らしい着物も見てみたいな。\"\n[s8] \"お金は大丈夫だから、一緒に新しい着物を買いに行かない？\""
2002503-38 = "あ……は、はい……。"
2002503-39 = "あ……は、はい……。"
2002503-40 = "……はい？"
2002503-41 = "え……先生……？今、何と……？"
2002503-45 = "…………。"
2002503-46 = "いえいえいえいえいえいえいえいえいえいえいえいえいえ！！！"
2002503-47 = "い、いいいい、いけません！私なんかに先生の貴重なお金を使うなんて！#n絶対に……そんなこと……起きてはいけません……っ！！"
2002503-48 = "もしそうなったら……服にホコリが一つ付くたび#n死んでお詫びするしか……！！"
2002503-49 = "ほ、本当に大丈夫です！なのでどうか……#nどうか考え直してください……！！"
2002503-50 = "[s9] \"そ、そこまで……？\"\n[s10]（余計に気を遣わせちゃったかな……）"
2002503-51 = "そ、それに、この服にも長所があるんですよ！#n動きやすいですし、値段の割に見た目もいいですし……"
2002503-52 = "そ、それに、この服にも長所があるんですよ！#n動きやすいですし、値段の割に見た目もいいですし……"
2002503-53 = "な、なによりこの服のおかげで、先生とここに来られましたから……！"
2002503-54 = "……！！い、いいいいい、今のはナシです！！#n理由をつけようとしたら、ちょっと口が滑っただけで……！！"
2002503-55 = "あ、いえ、決して適当なことを言おうとしたわけではなく……！#nうぅ……な、なんて言えばいいんでしょう……。"
2002503-56 = "えっと……！"
2002503-57 = "だ、だから……！！"
2002503-58 = "…………。"
2002503-62 = "――やっぱり死にます！！！"
