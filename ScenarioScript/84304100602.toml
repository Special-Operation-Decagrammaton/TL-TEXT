[translation]
84304100602-6 = "だ、大丈夫ですか先輩？怪我はないですか？"
84304100602-7 = "ええ、なんとか。気にかけてくれてありがとうございます。"
84304100602-8 = "やはり、コハルは優しいですね。"
84304100602-10 = "申し訳ありません。マシンの整備が行き届かずご迷惑を……。"
84304100602-11 = "他のマシンにも問題がないか、すぐに確認いたしますので。"
84304100602-12 = "よろしくお願いします。せっかく来たのですし、目標分は達成したいですから。"
84304100602-13 = "あっ、コハルも一緒にいかがですか？軽めのものなら大丈夫かもしれません。私が隣で見てあげますよ。"
84304100602-14 = "先輩が、私を……！？"
84304100602-15 = "は、はいっ……ぜひ！"
