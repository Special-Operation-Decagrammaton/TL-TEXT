[translation]
84304100602-6 = "V-você está bem, Senpai? Não se machucou?"
84304100602-7 = "Sim, estou bem. Obrigado por se preocupar."
84304100602-8 = "Como esperado, a Koharu é muito gentil."
84304100602-10 = "Sinto muito. A manutenção da máquina não estava em dia e acabei causando problemas..."
84304100602-11 = "Vou verificar imediatamente se há problemas com as outras máquinas também."
84304100602-12 = "Conto com você. Já que viemos até aqui, quero atingir a meta estabelecida."
84304100602-13 = "Ah, Koharu, o que acha de vir junto? Talvez algo mais leve seja tranquilo. Eu ficarei ao seu lado observando."
84304100602-14 = "O Senpai... quer que eu...!"
84304100602-15 = "S-sim... com certeza!"
