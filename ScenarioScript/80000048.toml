[translation]
80000048-1 = "主殿と忍者の味を"
80000048-2 = "あ、主殿！ちょうど主殿のもとに馳せ参じようかと思っていたところでした！"
80000048-3 = "イズナがそう考えた途端に、こうして現れてくださるなんて……これも何かの忍術でしょうか！？"
80000048-4 = "[s1] \"いや、特にそういうわけではないかな……。\"\n[s2] \"ちょっとシャーレの仕事の関係でね。\""
80000048-5 = "主殿の忍術ではない、ということは……。"
80000048-6 = "主殿の忍術ではない、ということは……。"
80000048-7 = "つまり逆に、主殿に会いたいというイズナの切実な願いが、新たな能力を開花させたのでしょうか！？"
80000048-8 = "このところ頑張って忍術を勉強していましたので、その甲斐があったのかもしれません！"
80000048-9 = "[s] \"そ、そうかもね……？ところで今日は、何か用事とか？\""
80000048-10 = "あ、そうです！主殿、今日はバレンタインデーですよね？"
80000048-11 = "バレンタインデーといえば、イズナはやはりチョコレートだと思うのです！"
80000048-12 = "[s] \"うん、確かに。\""
80000048-13 = "ということでイズナ、「例のモノ」を手に入れることに成功しました！ご覧ください！"
80000048-18 = "[ns] \"これ……手裏剣？\""
80000048-19 = "はい！しかし手裏剣だけではありません、他にも撒菱や苦無など！"
80000048-20 = "忍者の使う道具がたくさん入っているのです！"
80000048-21 = "最近「百鬼夜行・渦巻映画村」で販売されている大人気商品、特製忍者グッズ49番「チョコレートセット」です！"
80000048-22 = "これは柴犬ワン蔵監督の代表作「犬連れ忍者」にも出ているグッズでして……！"
80000048-23 = "イズナ、これを手に入れるために夜中から並び……何とか手に入れることができました！"
80000048-24 = "[s] \"……忍者で柴犬でチョコレート？\""
80000048-25 = "この鮮やかな色つや、そして甘いチョコレートの香り……。"
80000048-26 = "イズナ、このセットを手にしているだけで、何だか忍術がたくさん使えるようになった気分です……"
80000048-27 = "やっぱり忍具は良いですね！見ているだけで楽しいです！"
80000048-28 = "……はっ！いえ、気分の問題だけではなく、イズナはすでに立派な忍者なのですが！"
80000048-29 = "そうですよね、主殿！"
80000048-30 = "[s] \"色々よく分からないけど、イズナが喜んでるのは嬉しい。\""
80000048-31 = "そ、そうですか？えへへっ……。"
80000048-32 = "で、ではなく！主殿、こちらを受け取ってください！"
80000048-36 = "[ns3] \"え、これ私が貰って良いの？\"\n[ns4] \"イズナが苦労して買ったんじゃ……？\""
80000048-37 = "それはそうなのですが……。"
80000048-38 = "それはそうなのですが……。"
80000048-39 = "イズナ、本来の目的としてはこのチョコを、主殿と一緒に食べたいなと思いまして……。"
80000048-40 = "[s] \"イズナ……！\""
80000048-41 = "そのために、主殿を探していたんです！"
80000048-42 = "早速一緒に食べましょう、きっと忍者の味がするはずですから！"
80000048-43 = "[s] \"なるほど、忍者の味でござるか。\""
80000048-44 = "ああっ、チョコを渡しただけでもう主殿が立派な忍者に！？"
80000048-45 = "イズナも負けてはいられません！イズナはこの撒菱のチョコを頂きます！主殿にはこちらの手裏剣チョコを！"
80000048-46 = "さあ主殿、どうぞ！ニンニン～！"
80000048-50 = "（そうやってニコニコ笑いながらチョコを差し出してくるイズナと一緒に、忍者チョコのセットを美味しく食べた）"
