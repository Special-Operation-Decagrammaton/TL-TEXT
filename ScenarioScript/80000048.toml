[translation]
80000048-1 = "O sabor do mestre e do ninja"
80000048-2 = "Ah, mestre! Eu estava justamente pensando em ir até onde o senhor está!"
80000048-3 = "Aparecer assim no momento em que Izuna pensou nisso... será que isso também é algum tipo de ninjutsu!?"
80000048-4 = "[s1] \"Não, não é nada disso...\"\n[s2] \"É só por causa do trabalho no Schale.\""
80000048-5 = "Se não é o ninjutsu do mestre, então..."
80000048-6 = "Se não é o ninjutsu do mestre, então..."
80000048-7 = "Isso significa que, pelo contrário, o desejo sincero de Izuna de ver o mestre despertou uma nova habilidade!?"
80000048-8 = "Tenho me esforçado muito estudando ninjutsu ultimamente, então talvez tenha valido a pena!"
80000048-9 = "[s] \"E-é, talvez seja isso...? Mas, afinal, você precisa de algo hoje?\""
80000048-10 = "Ah, é verdade! Mestre, hoje é Dia dos Namorados, não é?"
80000048-11 = "E falando em Dia dos Namorados, Izuna acha que tem que ser chocolate!"
80000048-12 = "[s] \"Sim, com certeza.\""
80000048-13 = "Sendo assim, Izuna conseguiu colocar as mãos na \"tal coisa\"! Dê uma olhada!"
80000048-18 = "[ns] \"Isso... é uma shuriken?\""
80000048-19 = "Sim! Mas não é só uma shuriken, tem também makibishi, kunai e muito mais!"
80000048-20 = "Está cheio de ferramentas que os ninjas usam!"
80000048-21 = "É o produto de grande sucesso vendido recentemente na \"Vila Cinematográfica Uzumaki de Hyakkiyako\", o conjunto especial de ninja número 49, o \"Conjunto de Chocolate\"!"
80000048-22 = "Este é um item que aparece na obra-prima do diretor Shiba Inu Wanzou, \"Ninja com Cachorro\"...!"
80000048-23 = "Izuna ficou na fila desde a madrugada para conseguir isso... e finalmente consegui!"
80000048-24 = "[s] \"...Ninja, cachorro e chocolate?\""
80000048-25 = "Este brilho vívido e o aroma doce do chocolate..."
80000048-26 = "Só de segurar este conjunto, Izuna sente como se pudesse usar muitos ninjutsus..."
80000048-27 = "Ferramentas ninja são realmente ótimas! Só de olhar já é divertido!"
80000048-28 = "...Ah! Não, não é só uma questão de sentimento, Izuna já é uma ninja exemplar!"
80000048-29 = "Não é, mestre?"
80000048-30 = "[s] \"Não entendi muito bem, mas fico feliz que você esteja animada, Izuna.\""
80000048-31 = "S-sério? Hehehe..."
80000048-32 = "N-não, espera! Mestre, por favor, aceite isto!"
80000048-36 = "[ns3] \"Ei, eu posso mesmo aceitar isso?\"\n[ns4] \"Você não teve muito trabalho para comprar?\""
80000048-37 = "Bem, isso é verdade, mas..."
80000048-38 = "Bem, isso é verdade, mas..."
80000048-39 = "O objetivo original de Izuna era comer este chocolate junto com o mestre..."
80000048-40 = "[s] \"Izuna...!\""
80000048-41 = "Foi por isso que eu estava procurando pelo mestre!"
80000048-42 = "Vamos comer logo, com certeza deve ter gosto de ninja!"
80000048-43 = "[s] \"Entendo, gosto de ninja, é?\""
80000048-44 = "Ah, só de entregar o chocolate, o mestre já se tornou um ninja exemplar!?"
80000048-45 = "Izuna não pode ficar para trás! Vou comer este chocolate de makibishi! E para o mestre, este chocolate de shuriken!"
80000048-46 = "Vamos, mestre, pegue! Nin-nin!"
80000048-50 = "(Comi o conjunto de chocolates ninja com a Izuna, que me estendeu o chocolate com um sorriso radiante)"
