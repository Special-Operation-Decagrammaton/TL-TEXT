[translation]
1008406-1 = "反響"
1008406-7 = "はぁ、はぁ……"
1008406-8 = "どうして、急に……山頂に登ろうだなんて……"
1008406-9 = "そこまで登らずとも、良い音は録れますし……"
1008406-10 = "むしろ山頂は風が強くて、雑音が入りやすいのに……"
1008406-11 = "[s] \"でも、いつもは聴けない音にこそ価値があるんだよね？\""
1008406-12 = "うぅ……"
1008406-13 = "まさか、その言葉が自分に返ってくるとは……"
1008406-14 = "[s1] \"もう少しだから頑張ろう。\"\n[s2] \"山頂はすぐそこだよ！\""
1008406-17 = "くっ……"
1008406-18 = "先生も毒されてしまったようですね……"
1008406-27 = "到着、しました……"
1008406-28 = "足が、震えて……これ以上は、もう……"
1008406-32 = "先生……？#n山の向こうに何か見えるのですか？"
1008406-37 = "[ns] \"ヤッホー！\""
1008406-41 = "……ヤッホォォ。"
1008406-43 = "[ns3] \"コタマ、聴こえた？\"\n[ns4] \"声が返ってきたよ。\""
1008406-46 = "……なるほど、山びこですね。"
1008406-47 = "今の季節は草木が枯れている分、いつもより大きく跳ね返ってきているのかもしれませんね。"
1008406-48 = "[s5] \"……なんだか元気が無いね。\"\n[s6] \"ごめん、無理させちゃったよね。\""
1008406-51 = "いえ、そこまで疲れているわけでは……"
1008406-52 = "ただ、私は反響音というものが、あまり好きではないのです。"
1008406-53 = "[s] \"どうして？\""
1008406-54 = "……録音の邪魔になるからです。"
1008406-58 = "反響音とは、音が壁に当たって反射し発生するもの。"
1008406-59 = "録音するときは、いつもノイズが乗らないよう試行錯誤していますが……"
1008406-60 = "それでもゼロに抑えるのは難しく、本来の音を完璧に残すのは容易ではありません。"
1008406-61 = "先ほどもそうです。もっと正確に、先生の声を残したかったのに……"
1008406-62 = "[s] \"それで元気が無かったんだね。\""
1008406-64 = "[ns] \"でも、環境音も含めての記録なんじゃない？\""
1008406-65 = "いえ。正確な音源さえ録れていれば、後からいくらでもエコーをかけられます。"
1008406-66 = "結局、反響音はオリジナルの劣化にすぎませんから。"
1008406-67 = "それに、山びこは[ruby=こだま]木霊[/ruby]とも言うでしょう？"
1008406-68 = "小さい頃、それでイジられたこともあって……"
1008406-69 = "……あまり良い思い出がないのです。"
1008406-70 = "[s] \"でも、単純な劣化ではないんじゃない？\""
1008406-71 = "どうしてですか？"
1008406-72 = "オリジナルの波形を真似た雑音に、一体どんな価値があるのでしょうか？"
1008406-73 = "[s7] \"山と洞窟では別の跳ね返り方をするし……\"\n[s8] \"反響音によって、環境の違いを楽しめると思ったんだ。\""
1008406-76 = "[ns] \"そう考えたら、オリジナルって何だろうなって。\""
1008406-80 = "……詭弁ですね。"
1008406-81 = "先生にそう言われたところで、木霊を好きにはなれません。"
1008406-82 = "ですが……"
1008406-89 = "ヤッホー！"
1008406-93 = "ヤッホォォ……"
1008406-97 = "……それが先生の声なら、別かもしれませんね。"
1008406-98 = "多少のノイズが入ったところで、価値があるのもそうですが……"
1008406-99 = "先生の[ruby=・   ・   ・]コダマ[/ruby]、と考えたら――"
1008406-105 = "……先生、良ければ一緒に木霊を作りませんか？"
1008406-106 = "ここでしか聞けない……先生と私の声が混ざり合った[ruby=コダマ]和音[/ruby]を……"
1008406-107 = "じっくり、聴きたいです。"
1008406-109 = "（その後、山頂でしか聞けない音をコタマと楽しんでから山を下った）"
