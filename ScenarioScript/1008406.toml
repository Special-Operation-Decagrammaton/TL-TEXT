[translation]
1008406-1 = "Reação"

1008406-7 = "Ha, ha..."

1008406-8 = "Por que de repente quis subir ao topo da montanha?"

1008406-9 = "Mesmo se você não subir tão longe, ainda poderá gravar um bom som..."

1008406-10 = "Na verdade, o vento é forte no topo da montanha, por isso é fácil ouvir barulho..."

1008406-11 = "[s] \"Mas os sons que normalmente você não consegue ouvir têm valor, certo?\""

1008406-12 = "Eca..."

1008406-13 = "Nunca pensei que essas palavras voltariam para mim..."

1008406-14 = "[s1] \"Estamos quase lá, então vamos fazer o nosso melhor.\"\n[s2] \"O topo da montanha está chegando!\""

1008406-17 = "Droga..."

1008406-18 = "Parece que a professora também foi envenenada..."

1008406-27 = "eu cheguei..."

1008406-28 = "Minhas pernas estão tremendo... não mais..."

1008406-32 = "professor……? #nVocê consegue ver alguma coisa além da montanha?"

1008406-37 = "[ns] \"Yahoo!\""

1008406-41 = "... Yahoo."

1008406-43 = "[ns3] \"Kotama, você me ouviu?\"\n[ns4] \"A voz voltou.\""

1008406-46 = "...Entendo, é uma montanha."

1008406-47 = "Nesta temporada, as plantas podem estar murchando, então podem estar se recuperando mais do que o normal."

1008406-48 = "[s5] \"...Você não parece estar se sentindo bem.\"\n[s6] \"Desculpe, fiz você se esforçar.\""

1008406-51 = "Não, não estou tão cansado..."

1008406-52 = "No entanto, eu realmente não gosto de sons de eco."

1008406-53 = "[s] \"Por quê?\""

1008406-54 = "...Isso ocorre porque interfere na gravação."

1008406-58 = "O som reverberante é gerado quando o som atinge uma parede e é refletido."

1008406-59 = "Ao gravar, sempre tento errar para evitar ruídos..."

1008406-60 = "Mesmo assim, é difícil reduzir o som a zero e não é fácil preservar perfeitamente o som original."

1008406-61 = "O mesmo que antes. Eu gostaria de ter gravado a voz da professora com mais precisão..."

1008406-62 = "[s] \"É por isso que você não estava se sentindo bem.\""

1008406-64 = "[ns] \"Mas não é um disco que inclui sons ambientais?\""

1008406-65 = "lar. Contanto que você grave a fonte de som exata, poderá adicionar quantos ecos desejar posteriormente."

1008406-66 = "結局、反響音はオリジナルの劣化にすぎませんから。"
1008406-67 = "Além disso, você pode dizer Yamabiko, certo?"

1008406-68 = "Quando eu era pequeno sofri bullying por causa disso..."

1008406-69 = "...Não tenho boas lembranças."

1008406-70 = "[s] \"でも、単純な劣化ではないんじゃない？\""
1008406-71 = "Por que?"

1008406-72 = "Qual é o valor do ruído que imita a forma de onda original?"

1008406-73 = "[s7] \"山と洞窟では別の跳ね返り方をするし……\"\n[s8] \"反響音によって、環境の違いを楽しめると思ったんだ。\""
1008406-76 = "[ns] \"そう考えたら、オリジナルって何だろうなって。\""
1008406-80 = "...Isso é sofisma."

1008406-81 = "Mesmo que seu professor lhe diga isso, você não conseguirá se apaixonar por Kodama."

1008406-82 = "Mas..."

1008406-89 = "Yahoo!"

1008406-93 = "Yahoo..."

1008406-97 = "...Se essa fosse a voz do professor talvez fosse diferente."

1008406-98 = "Mesmo que haja algum barulho, vale a pena..."

1008406-99 = "Quando pensei no professor..."

1008406-105 = "...Sensei, se não se importa, gostaria de fazer um Kodama juntos?"

1008406-106 = "Só dá para ouvir aqui...a voz da professora e a minha misturadas..."

1008406-107 = "Eu quero ouvir com atenção."

1008406-109 = "(Depois, apreciamos os sons que só podem ser ouvidos no topo da montanha e depois descemos a montanha.)"

