[translation]
1001009-1 = "Entrevista individual"
1001009-2 = "Abydos - Sala de aula"
1001009-4 = "（Shiroko aguardava com uma expressão levemente tensa）"
1001009-5 = "Hum..."
1001009-6 = "Vim como prometido, Sensei. O que houve?"
1001009-7 = "É sobre o trabalho no Schale? Ou algo relacionado a Abydos?"
1001009-8 = "De qualquer forma, quer que eu me sente? Entendido..."
1001009-12 = "..."
1001009-15 = "[wa:700]― Tem algo que você queira que eu faça?[wa:2000]"
1001009-19 = "[wa:500]― （Estou curioso sobre o que ela está pensando）[wa:2000]"
1001009-23 = "― （O que será que ela pretende fazer a partir de agora...?[wa:1500]）"
1001009-27 = "― Estou aqui para ajudar o Sensei, então.[wa:2500]"
1001009-32 = "[wa:500]― E-eu não me importo de ser acariciada assim...[wa:700]"
1001009-34 = "― Não é como se isso fosse um problema...[wa:1000]"
1001009-37 = "[ns] Perguntar o que ela estava fazendo ontem à noite."
1001009-39 = "Ontem à noite? Fui dar uma volta de bicicleta, voltei para casa, tomei um banho e comi peixe grelhado no jantar..."
1001009-40 = "Antes disso? Antes da pedalada, subi no painel luminoso da rodovia KV e fiz uma simulação de assalto a um carro-forte..."
1001009-41 = "Ah, você sabia?"
1001009-42 = "[s] Dizer que está preocupado com suas ações perigosas."
1001009-43 = "......Hum."
1001009-44 = "Entendi o que você quer dizer... mas isso é como um vício..."
1001009-45 = "Hum... mas, qualquer coisa que eu disser vai soar como desculpa..."
1001009-46 = "..."
1001009-47 = "Entendido. Como o Sensei está dizendo isso por preocupação, vou levar a sério."
1001009-48 = "Hum... desculpe por ser uma aluna tão problemática."
1001009-49 = "Acabei deixando o Sensei preocupado."
1001009-50 = "..."
1001009-53 = "...Obrigada."
1001009-55 = "（Com uma expressão que parecia um pouco feliz, Shiroko saiu da sala de aula）"
