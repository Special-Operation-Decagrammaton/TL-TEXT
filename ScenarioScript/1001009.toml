[translation]
1001009-1 = "個人面談"
1001009-2 = "アビドス・教室"
1001009-4 = "（シロコが少し緊張した面持ちで待っていた）"
1001009-5 = "ん……。"
1001009-6 = "約束通り来たよ、先生。どうしたの？"
1001009-7 = "シャーレのお仕事の話？それともアビドスに関係すること？"
1001009-8 = "とにかく座ってって？分かった……。"
1001009-12 = "……。"
1001009-15 = "[wa:700]― 何かやってほしい事[wa:2000]ある？"
1001009-19 = "[wa:500]― （何を考えてるのか[wa:2000]気になる）"
1001009-23 = "― （これから[wa:1500]何をするつもりだろう……？）"
1001009-27 = "― 先生を手伝うために[wa:2500]ここにいるから。"
1001009-32 = "[wa:500]― こ、[wa:700]こんなに撫でられても……。"
1001009-34 = "― 別に[wa:1000]困ることなんて……。"
1001009-37 = "[ns] 昨日の夜、何をしていたか聞く。"
1001009-39 = "昨日の夜？ライディングをして、家に帰ってシャワーを浴びて、夕飯には焼き魚を……。"
1001009-40 = "その前？ライディングの前はKVハイウェイの電光掲示板に登って、現金輸送車両を奪取するシミュレーションを……。"
1001009-41 = "え、知ってた？"
1001009-42 = "[s] 危険な行動について心配してると伝える。"
1001009-43 = "……う、うーん。"
1001009-44 = "言いたいことは分かった……けど、これは癖みたいなもので……。"
1001009-45 = "うーん……でも、何を話しても言い訳になるから……。"
1001009-46 = "……。"
1001009-47 = "分かった。先生は私のことを心配して言ってるんだから、肝に銘じる。"
1001009-48 = "ん……ごめん、こんな不良な生徒で。"
1001009-49 = "先生に心配をかけちゃった。"
1001009-50 = "……。"
1001009-53 = "……ありがとう。"
1001009-55 = "（どこか嬉しそうな表情で、シロコは教室を出た）"
