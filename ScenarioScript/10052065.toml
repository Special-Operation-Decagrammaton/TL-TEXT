[translation]
10052065-2 = "O silêncio de Ketel foi confirmado."

10052065-3 = "Uuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuu."

10052065-4 = "Yuzu, você fez um ótimo trabalho."

10052065-5 = "Sim…."

10052065-6 = "Kay! Aqui está!"

10052065-10 = "sim. Por favor, Himari."

10052065-11 = "Eu confirmei. Vou lhe enviar as coordenadas agora."

10052065-12 = "A descida começa!"

10052065-16 = "Irmã, por favor, tome cuidado... já estou fazendo isso..."

10052065-23 = "Ufa... essa é uma maneira muito rápida de mesclar..."

10052065-24 = "Concordo plenamente...."

10052065-25 = "O controle da área está quase completo. #nK, você acha que consegue proteger o núcleo?"

10052065-26 = "Sim, não há problema. Mas enquanto isso..."

10052065-28 = "[ns] \"Pode haver um ataque inimigo, então forneça escolta.""

10052065-29 = "Por favor, deixe isso comigo. Esta é minha especialidade."

10052065-30 = "...Você não diz que é bom em tudo...?"

10052065-31 = "Isso mesmo. #nSe você quer ser a melhor e perfeita empregada e agente, é isso que você deve alcançar."

10052065-32 = "(Parece que os estranhos hábitos de Himari foram transferidos para ela...)"

10052065-33 = "Desta vez é a vez de Alice proteger Kei...Alice, farei o meu melhor!"

10052065-34 = "Alice, muito obrigado..."

10052065-35 = "sim! Deixe isso para Alice!"

10052065-36 = "Aliás, ouvi dizer que a área de pesquisa de Ketel foi totalmente fechada devido a enchentes causadas pelo rompimento de uma barragem."

10052065-37 = "Concordo. No final das contas, tudo que eu sabia naquele momento era que o corpo principal do Deka Grammaton era a IA de uma máquina de venda automática."

10052065-38 = "Além disso, foi dito que ele próprio se tornou um super IA depois de experimentar alucinações auditivas."

10052065-39 = "Sim, foi."

10052065-40 = "Diretor, naquela época... você chamou o Big Grammaton de megalomaníaco."

10052065-41 = "Porque é um fato. Existe algum problema?"

10052065-42 = "Achei que eles estavam se expressando como humanos."

10052065-43 = "Veja bem, o gerente é muito rigoroso na escolha das palavras."

10052065-44 = "isso é……."

10052065-45 = "...Não quero traçar uma linha divisória entre nossos amigos."

10052065-46 = "Por outras palavras, é melhor restringir ao máximo os critérios de classificação...!"

10052065-47 = "?"

10052065-48 = "……."

10052065-49 = "Entendo, é um padrão de classificação do ponto de vista da racionalidade. Será útil."

10052065-50 = "Pelo menos você, eu não acho que você deveria encarar dessa forma..."

10052065-51 = "Oh sério?"

10052065-52 = "...O bate-papo acabou. Protegemos o núcleo com sucesso."

10052065-53 = "Iremos compartilhá-lo com a “Árvore da Vida” mostrada no display do navio de transporte, então, por favor, dê uma olhada."

10052065-54 = "...consegui confirmar o reflexo. Obrigado a todos pelo seu trabalho duro."

10052065-55 = "Pampakapaan! O nível de Kei aumentou em 10! #nVamos continuar subindo de nível com esse impulso!"

10052065-56 = "Concordo."

10052065-61 = "...Sensei, tenho um pequeno pedido..."

10052065-62 = "[s] \"O que é isso?\""

10052065-63 = "Shhh! Fique quieto! Está alto!"

10052065-64 = "Depois disso... mais tarde, Himari..."

10052065-65 = "Por favor, diga obrigado."

10052065-66 = "[ns] \"…….\""

10052065-68 = "[ns] \"Sim! Avisarei você!""

10052065-69 = "É por isso que está tão alto!"

10052065-70 = "Kay, professora? Aconteceu alguma coisa?"

10052065-71 = "Não, vovó, não é nada! Ei, professor! ?"

10052065-75 = "[ns] \"É isso! Kei-chan está aqui!\""

10052065-77 = "professor--! ! ! ! ! !"

