[translation]
901010400130-11 = "……Hello there!"
901010400130-15 = "……!"
901010400130-16 = "You startled me... What if you'd made me slip up?"
901010400130-17 = "My apologies. I just had some big news I couldn't wait to share."
901010400130-22 = "……Big news?"
901010400130-24 = "Yes. You get a little hungry in the evening, don't you?#nFor everyone feeling that way—"
901010400130-25 = "I've prepared a special promotion for you!"
901010400130-26 = "If you participate in the survey currently being held by 'FOX EATS'—"
901010400130-30 = "We'll give you a free bento box from the famous inari sushi shop, 'Yoshino Inari'!"
901010400130-31 = "Would you like to take this opportunity?"
901010400130-33 = "……That sounds suspicious."
901010400130-34 = "A free bento... Are you plotting something?"
901010400130-36 = "Of course, there are a few conditions for the survey in exchange for the meal……."
901010400130-37 = "This survey will be used for product and service improvements at 'FOX EATS' and may be provided to third parties for the purpose of research and publicity regarding specific products. Survey results will be stored for 36 months from the time of the survey, and if you have any objections to the content, please contact the 'FOX EATS' customer service desk—"
901010400130-39 = "……That's enough, I get it."
901010400130-40 = "Hah... Looks like some marketing firm is wasting money on nonsense again."
901010400130-41 = "Well, the food itself isn't to blame, I suppose."
901010400130-42 = "And I was just starting to get hungry anyway."
901010400130-43 = "Let's see……."
901010400130-49 = "Oh, this is actually quite good……."
901010400130-50 = "Delicious! The rice is fluffy, and the fried tofu skin is nice and thick... I like it."
901010400130-51 = "Though, there is one thing that bothers me……."
901010400130-53 = "Was there something?"
901010400130-54 = "We always welcome feedback!"
901010400130-55 = "……Is this filling imitation crab?"
901010400130-56 = "It's such a tasty inari, it's a waste to use imitation crab."
901010400130-60 = "But 'real crab' is extremely expensive, so……."
901010400130-61 = "If we used high-end ingredients like crab, the profit margins on the bento would—"
901010400130-62 = "What era are you living in? Crab prices hit rock bottom months ago."
901010400130-64 = "Ah…… They've become way too cheap. #nLately, I've even been considering cutting back on how often I head out to fish."
901010400130-66 = "Is that so? It still seems expensive at the markets and supermarkets, though……."
901010400130-67 = "If you don't believe me, go take a look at that logistics warehouse over there.#nThere's a mountain of unsold crab just sitting there."
901010400130-68 = "I see…… Thank you very much.#nI'll be sure to pass this feedback along to the shop."
901010400130-69 = "Oh, right. I have one more thing I'd like to ask."
901010400130-70 = "——Do you happen to know anything about 'Drum Can Crabs'?"
901010400130-71 = "Drum can crabs……? Are there people transporting crabs in oil drums?"
901010400130-73 = "I don't know about others, but we deliver ours in wooden crates.#nI think you'll find your answer if you go to the logistics warehouse."
901010400130-74 = "Yes! Thank you for your cooperation."
901010400130-75 = "Have a wonderful day!"