[translation]#[Texto Final. - Filipe 05/07.]
901010400130-11 = "……Olá!"
901010400130-15 = "……!"
901010400130-16 = "Me assustou…… se eu errasse o movimento, ia dar ruim."
901010400130-17 = "Desculpa. É que eu tinha uma grande novidade."
901010400130-22 = "……Grande novidade?"
901010400130-24 = "Sim. Vocês não ficam com fome no fim da tarde? Então――"
901010400130-25 = "trouxe uma promoção especial!"
901010400130-26 = "Quem responder à pesquisa do 'FOX EATS'――"
901010400130-30 = "ganha uma marmita de inarizushi da famosa 'Yoshino Inari'!"
901010400130-31 = "Que tal?"
901010400130-33 = "……Suspeito."
901010400130-34 = "Marmita grátis…… qual é a pegadinha?"
901010400130-36 = "Claro, a pesquisa tem algumas condições……"
901010400130-37 = "Esta pesquisa será usada para melhorar os produtos e serviços do 'FOX EATS', e poderá ser compartilhada com terceiros para pesquisas e divulgação. Os dados serão armazenados por 36 meses, e em caso de objeção, entre em contato com a central de atendimento ao cliente do 'FOX EATS'――"
901010400130-39 = "……Já chega, entendi."
901010400130-40 = "Haa…… mais uma empresa de marketing gastando dinheiro em besteira."
901010400130-41 = "Bom, comida de graça não se recusa."
901010400130-42 = "Até que tava com fome."
901010400130-43 = "Vamos ver……"
901010400130-49 = "Nossa, isso é……"
901010400130-50 = "Delícia! O arroz soltinho, a fritura grossa…… gostei."
901010400130-51 = "Mas uma coisa me incomoda……"
901010400130-53 = "O que foi?"
901010400130-54 = "Sugestões são sempre bem-vindas!"
901010400130-55 = "……Esse recheio é kani kama?"
901010400130-56 = "Um inarizushi tão gostoso com kani kama…… que desperdício."
901010400130-60 = "Mas 'caranguejo de verdade' é muito caro……"
901010400130-61 = "Usar ingrediente nobre num bento ia estragar a margem――"
901010400130-62 = "De quando você tá falando? O preço do caranguejo caiu meses atrás."
901010400130-64 = "Ah…… caiu tanto que tô pensando em reduzir as saídas pro mar."
901010400130-66 = "É mesmo? No mercado e supermercado ainda tá caro……"
901010400130-67 = "Se não acredita, olha lá no armazém.#nTem caranguejo encalhado até dizer chega."
901010400130-68 = "Entendi…… muito obrigado.#nVou repassar a sugestão."
901010400130-69 = "Ah, sim. Posso fazer mais uma pergunta?"
901010400130-70 = "――O senhor sabe alguma coisa sobre o 'Caranguejo do Tambor'?"
901010400130-71 = "Caranguejo do Tambor……? Tem algum fornecedor que transporta caranguejo em tambor?"
901010400130-73 = "Não sei de outros, mas a gente entrega em caixa de madeira.#nÉ só dar uma olhada no armazém."
901010400130-74 = "Certo! Obrigada pela ajuda."
901010400130-75 = "Tenha um bom dia!"