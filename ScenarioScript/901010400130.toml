[translation]
901010400130-11 = "... Olá!"
901010400130-15 = "... Uau!"
901010400130-16 = "Me assustou... se eu erro a mão, já viu."
901010400130-17 = "Desculpa. É que eu estava tão animada pra dar a grande notícia que acabei nem pensando."
901010400130-22 = "... Grande notícia?"
901010400130-24 = "Isso. Começa a dar fome no fim da tarde, né? Pensando nisso..."
901010400130-25 = "Trouxe uma promoção imperdível!"
901010400130-26 = "Se você colaborar com a nossa pesquisa de opinião que está rolando no 'FOX EATS'..."
901010400130-30 = "Ganha um bentô grátis da famosa loja de inarizushi 'Yoshino Inari'!"
901010400130-31 = "Que tal aproveitar essa oportunidade?"
901010400130-33 = "... Que coisa suspeita."
901010400130-34 = "Bentô grátis... qual é a intenção?"
901010400130-36 = "Bom, para ganhar o bentô, a pesquisa tem alguns pré-requisitos..."
901010400130-37 = "Esta pesquisa de opinião será usada para melhorar os produtos e serviços do 'FOX EATS', e poderá ser fornecida a terceiros para fins de pesquisa e divulgação de produtos específicos. Os resultados serão armazenados por 36 meses a partir da data da pesquisa e, caso haja alguma objeção, entre em contato com o serviço de atendimento ao cliente do 'FOX EATS' –"
901010400130-39 = "... Já chega, entendi."
901010400130-40 = "Ah... alguma empresa de marketing gastando dinheiro com coisa desnecessária de novo."
901010400130-41 = "Bem, comida não tem culpa."
901010400130-42 = "E eu estava com fome mesmo."
901010400130-43 = "Vamos ver..."
901010400130-49 = "Opa, isso aqui é... bem..."
901010400130-50 = "Gostoso! O arroz está soltinho e a pele do tofu é bem grossa... Aprovado."
901010400130-51 = "Uma coisa me incomoda..."
901010400130-53 = "Algum problema?"
901010400130-54 = "Estamos abertos a sugestões!"
901010400130-55 = "... Este recheio é 'kani-kama' (imitação de carne de caranguejo), não é?"
901010400130-56 = "Um inarizushi tão gostoso desses, usar kani-kama é um desperdício."
901010400130-60 = "Mas 'caranguejo de verdade' é muito caro, então..."
901010400130-61 = "Com ingredientes tão nobres igual caranguejo, a margem de lucro do bentô seria –"
901010400130-62 = "De quando você está falando? Já faz meses que o preço do caranguejo caiu até o chão."
901010400130-64 = "Ah... caiu tanto que a gente tá pensando em reduzir a frequência das pescarias."
901010400130-66 = "Sério? No mercado e no supermercado ainda parece bem caro..."
901010400130-67 = "Se não acredita, dá uma olhada no depósito de logística ali. Tem um monte de caranguejo encalhado."
901010400130-68 = "Entendo... Muito obrigada. Vou repassar o feedback para a loja."
901010400130-69 = "Ah, tem mais uma coisa que eu queria perguntar."
901010400130-70 = "– Você sabe de alguma coisa sobre o 'Caranguejo do Tambor'?"
901010400130-71 = "Caranguejo do Tambor? ... Tem empresa que transporta caranguejo em tambor?"
901010400130-73 = "Outros lugares não sei, mas aqui a gente entrega em caixa de madeira. Se quiser saber mais, é só ir no depósito de logística."
901010400130-74 = "Certo! Obrigado pela colaboração."
901010400130-75 = "Tenha um bom dia!"