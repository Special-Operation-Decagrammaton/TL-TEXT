[translation]
1703-1 = "無人フロアの幽霊さん（３）"
1703-2 = "聖テレサ総合病院・4階無人フロア"
1703-3 = "えっ？幽霊さんは本当の幽霊じゃなかったんですか？"
1703-4 = "そうだよ！さっきから何度も言ってるじゃないか！"
1703-5 = "見た目もそうですし、言動も本物みたいでしたし……本物の幽霊かと思いました。"
1703-6 = "では、幽霊さんはなぜ病院を徘徊されてたんですか？#nこんな暗くて人もいないところで、一人でかくれんぼです？"
1703-7 = "そんなくだらない理由で幽霊の真似なんてするか！#n私がこの病院に忍び込んだ理由は誰も居なくなった隙に、モノを盗むためだ！"
1703-8 = "盗む？盗むのは悪いことですよ！？"
1703-9 = "それぐらい私だって知ってる！でも、でもっ、無くしてしまった父の遺品を取り戻すためには仕方がなかったんだ……！"
1703-10 = "お父さんの遺品、ですか？どうしてそれを病院で？"
1703-11 = "そ、それは……私の父が去年、この病院で手術を受けたんだ。そしてその時うっかり、父のネックレスをこの病院のどこかで無くしてしまって……そのまま、見つからずに遺品になってしまったんだ。"
1703-12 = "私も他の患者さんたちに迷惑をかけたくはなかった……でも、何を言っても病院に入れてくれないから、仕方がなかったんだ！"
1703-14 = "そんな事情が……それでは、仕方ないかもしれません。"
1703-15 = "でしたら、私たちも一緒にそのネックレスを探しますよ！"
1703-17 = "ほ、本当に？幽霊の真似をしながら泥棒をしようとした私を、手伝ってくれるのか……？"
1703-18 = "辛くて苦しんでいる方がいたら、誰であろうと助ける。それが私たち、救護騎士団ですから。#nただその代わり、他の貴重品には絶対に手を触れてはダメですよ！"
1703-19 = "それはもちろんだ！父のネックレスを発見したら、すぐに帰ることを約束する！"
1703-20 = "さあ、ハナエちゃん。この辺りにないか、一緒に探しましょう！"
1703-22 = "はい、先輩！"
1703-25 = "先輩！ここ、棚の上に鉄の箱が！#n貴重品とかがたくさん入ってそうな……手伝ってくれませんか！"
1703-26 = "ま、待ってください！"
1703-28 = "よいしょっ！#nすっごく重い……。こんな重くて、何が入ってるんでしょう？"
1703-29 = "……っ、その金庫だ！"
1703-30 = "よこせ！"
1703-34 = "わっ！い、いきなりどうしたんですか幽霊さん！"
1703-35 = "はははっ、騙されやがって！バカめが！"
1703-36 = "そもそも父の遺品なんてものは最初っから無いんだよ！私がこの病院に侵入したのは、はなっから遊ぶ金のためだ！"
1703-37 = "それも知らずに手伝うなんて、やっぱりトリニティの生徒たちはバカみたいに純粋だな！はははっ！"
1703-38 = "そんなっ！？人の好意を利用するなんて……ひどすぎます！"
1703-39 = "何言ってんだ！騙された方が悪いに決まってる、騙す方には誠実に振舞う責任なんてないんだからな！"
1703-40 = "じゃあな、この金庫は私がいただいた！"
1703-43 = "せ、先輩！大丈夫ですか？"
1703-44 = "だ、大丈夫です。それより金庫を、早く取り返さないと……。"
1703-45 = "心配無用です、先輩！#n先ほど目の前で見たらあの箱、ただの金庫ではなく、病院で使う高圧滅菌機でしたので！"
1703-46 = "……え？高圧滅菌機？"
1703-47 = "貴重なものがたくさん入ってるという点は金庫と同じですが、あの中には同時に高圧の蒸気もたくさん詰まってます。もし無理やり扉を開けたようとしたらその時は……ドカンッ！て爆発しますから！"
1703-48 = "ドカアアアアァァァァン！！"
1703-49 = "ぐああぁぁっっ！"
1703-50 = "…………。"
1703-51 = "…………。"
1703-52 = "ハナエちゃん。これからは、そういう情報はもっと早く言ってくださいね。#n怪我人が増えちゃったじゃありませんか。"
1703-53 = "はーい。"
1703-55 = "聖テレサ総合病院・病室"
1703-56 = "次の日の朝。"
1703-57 = "みなさん、救護騎士団が到着しました！"
1703-58 = "皆さんおはようございます！昨夜は良く眠れましたか？"
1703-59 = "それが……昨日は上の階が一晩中うるさくて全然眠れなかったんだよ……。"
1703-60 = "しばらく銃声が続いて、最後なんて何かが爆発したんだよ！？もう大騒ぎだったんだから！"
1703-61 = "そういえば昨晩は、看護師さんたちの代わりにお二人が当直だったんだって？怪しい人とかいなかったかい？"
1703-62 = "さ、さあ……。私たちは幽霊が出るという噂が怖かったので、4階には近づきませんでしたから。#nば、爆弾も……特に知りませんね。"
1703-63 = "夜の病院によくいるのに、幽霊が怖いのかい？"
1703-64 = "でも、そういうところもまたセリナちゃんらしくて可愛いよね。はははっ！#n新入りの君も、そう思わないか？"
1703-65 = "そ、そうですね。ははは……。"
1703-66 = "あらっ、幽霊さんじゃないですか。こちらにいらしたんですね。"
1703-67 = "昨日は何も言わずいなくなったので、ずいぶんと探したんですよ！"
1703-68 = "なんだ、ハナエちゃん。入院したのは今朝なのに、もうこの新入りの人と知り合いなのかい？"
1703-69 = "新入りのくせにすぐにハナエちゃんと仲良くなるなんて……ずるい！"
1703-70 = "それより幽霊さんだなんて、変なあだ名だね。なんで幽霊さんなんてあだ名がついたんだい？"
1703-71 = "あ、それはですね。幽霊さんは、4階で幽霊の真似を――"
1703-72 = "いっ、いやいやいや！その、幽霊みたいに怖い顔をしてるから、ってことで付いたあだ名なんです！"
1703-73 = "なんだ、そんな理由なのか。もっと面白い事情でもあるのかと……。"
1703-75 = "お、お前たちは何者なんだ！？#nなんで入院先まで付きまとってくるんだ？！"
1703-76 = "私たちの正体、ですか？私たちは患者さんがいる場所ならどこにでも駆け付ける、救護騎士団です。"
1703-77 = "私たちは幽霊さんに付きまとってるのではなく、治療をしようとしてるんです！#nちっとも怖がる必要はありません！"
1703-78 = "でもお前たち、昨日のことを根に持って……。"
1703-79 = "根に持つだなんてそんな。私たちのミスのせいで怪我をされてしまったので、早く回復できるよう、お手伝いするだけですよ？"
1703-83 = "ただ……私の注射、少ーしだけちくっとしますので。覚悟、してくださいね……？"
1703-90 = "ひっ！？わ、私が悪かった！だから痛いのだけは……#nお願いだから許してくれ―！"
1703-91 = "無人フロアの幽霊さん"
