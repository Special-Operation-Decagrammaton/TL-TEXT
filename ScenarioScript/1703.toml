[translation]
1703-1 = "O Fantasma do Andar Deserto (3)"
1703-2 = "Hospital Geral Santa Teresa - 4º Andar, Ala Deserta"
1703-3 = "Hã? Então o fantasma não era um fantasma de verdade?"
1703-4 = "É isso mesmo! Eu não estou dizendo isso há um tempão?!"
1703-5 = "É que a aparência e o jeito de falar pareciam tão reais... achei que fosse um fantasma de verdade."
1703-6 = "Então, por que o fantasma estava vagando pelo hospital?#nBrincando de esconde-esconde sozinho em um lugar tão escuro e vazio?"
1703-7 = "Eu não fingiria ser um fantasma por um motivo tão idiota!#nEu invadi este hospital para roubar coisas enquanto não havia ninguém por perto!"
1703-8 = "Roubar? Roubar é uma coisa errada, sabia?!"
1703-9 = "Eu sei disso! Mas, mas... eu não tive escolha se quisesse recuperar a lembrança do meu pai que eu perdi...!"
1703-10 = "A lembrança do seu pai? Por que isso estaria no hospital?"
1703-11 = "I-isso é... meu pai passou por uma cirurgia neste hospital no ano passado. E, naquela época, acabei perdendo o colar dele em algum lugar daqui... e ele acabou se tornando uma lembrança sem que eu pudesse encontrá-lo."
1703-12 = "Eu não queria causar problemas aos outros pacientes... mas como não me deixavam entrar no hospital de jeito nenhum, eu não tive escolha!"
1703-14 = "Então era essa a situação... nesse caso, talvez não tenha sido por mal."
1703-15 = "Se for assim, nós vamos ajudar você a procurar esse colar!"
1703-17 = "S-sério? Vocês vão ajudar alguém que tentou roubar o hospital fingindo ser um fantasma...?"
1703-18 = "Se houver alguém sofrendo, nós ajudaremos, não importa quem seja. É para isso que existimos, a Sociedade de Socorro.#nMas, em troca, você não pode tocar em nenhum outro objeto de valor, entendeu?!"
1703-19 = "Isso é óbvio! Prometo que irei embora assim que encontrar o colar do meu pai!"
1703-20 = "Vamos lá, Hanae-chan. Vamos procurar por aqui para ver se encontramos!"
1703-22 = "Sim, senpai!"
1703-25 = "Senpai! Ali, tem uma caixa de ferro em cima da prateleira!#nParece que tem um monte de objetos de valor dentro... pode me ajudar?!"
1703-26 = "E-espere um pouco!"
1703-28 = "Heave-ho!#nÉ muito pesada... O que será que tem aqui dentro para ser tão pesado?"
1703-29 = "......! Esse cofre é meu!"
1703-30 = "Passe para cá!"
1703-34 = "Ué! O que deu em você de repente, fantasma?!"
1703-35 = "Hahaha, caíram direitinho! Seus idiotas!"
1703-36 = "Não existe lembrança de pai nenhuma desde o começo! Eu invadi este hospital só para conseguir dinheiro para me divertir!"
1703-37 = "E vocês ainda me ajudaram sem saber... as alunas da Trinity são puras a ponto de serem estúpidas! Hahaha!"
1703-38 = "Como é que é...?! Aproveitar-se da bondade alheia... isso é horrível!"
1703-39 = "Do que você está falando?! Quem é enganado é que é o culpado, não existe obrigação de ser honesto com quem se engana!"
1703-40 = "Até mais, esse cofre agora é meu!"
1703-43 = "Se-senpai! Você está bem?"
1703-44 = "E-estou bem. Mas, antes disso, precisamos recuperar o cofre..."
1703-45 = "Não se preocupe, senpai!#nQuando olhei de perto agora há pouco, vi que aquela caixa não era apenas um cofre, era uma autoclave usada no hospital!"
1703-46 = "......Hã? Uma autoclave?"
1703-47 = "É igual a um cofre no sentido de guardar coisas valiosas, mas também está cheia de vapor de alta pressão. Se ela tentar forçar a porta para abrir, então... BOOM! Vai explodir!"
1703-48 = "BOOOOOOOOM!!!"
1703-49 = "Aaaaaaaah!"
1703-50 = "......"
1703-51 = "......"
1703-52 = "Hanae-chan. Da próxima vez, por favor, me avise sobre essas informações mais cedo.#nOlha só, acabamos com mais uma pessoa ferida."
1703-53 = "Tá bom."
1703-55 = "Hospital Geral Santa Teresa - Quarto de Paciente"
1703-56 = "Na manhã seguinte."
1703-57 = "Pessoal, a Sociedade de Socorro chegou!"
1703-58 = "Bom dia a todos! Dormiram bem ontem à noite?"
1703-59 = "É que... ontem o andar de cima ficou fazendo barulho a noite toda e não conseguimos dormir nada..."
1703-60 = "Teve tiros por um tempo, e no final algo explodiu, sabia?! Foi uma confusão enorme!"
1703-61 = "Falando nisso, soube que vocês duas estavam de plantão ontem à noite no lugar das enfermeiras, não é? Viram alguém suspeito?"
1703-62 = "E-eu não sei... Como estávamos com medo dos boatos sobre o fantasma, não chegamos perto do 4º andar.#nE sobre... bombas... também não sabemos de nada."
1703-63 = "Você vive no hospital à noite, mas tem medo de fantasmas?"
1703-64 = "Mas esse seu jeito também é a cara da Serina, e é fofo, né? Hahaha!#nVocê, que é novato, não acha?"
1703-65 = "B-bem, eu acho... Hahaha..."
1703-66 = "Ora, não é o Fantasma? Então você estava aqui."
1703-67 = "Você foi embora ontem sem dizer nada, então eu te procurei por toda parte!"
1703-68 = "O que foi, Hanae? Ele só deu entrada no hospital hoje de manhã, e você já o conhece?"
1703-69 = "Mesmo sendo novato, já ficou amigo da Hanae... Que injusto!"
1703-70 = "E aliás, Fantasma é um apelido estranho. Por que te chamam assim?"
1703-71 = "Ah, é que... O Fantasma estava imitando um fantasma no 4º andar..."
1703-72 = "N-não, não, não! É, tipo, porque ele tem uma cara assustadora que nem um fantasma, por isso o apelido!"
1703-73 = "Ah, é só por isso? Achei que tivesse algum motivo mais interessante..."
1703-75 = "Q-quem são vocês!?#nPor que estão me seguindo até no hospital?!"
1703-76 = "Nossa identidade? Nós somos o Esquadrão de Socorro, corremos para onde quer que haja pacientes."
1703-77 = "Nós não estamos te seguindo, estamos tentando te tratar!#nNão precisa ter medo de nada!"
1703-78 = "Mas vocês ainda estão guardando rancor do que aconteceu ontem..."
1703-79 = "Guardar rancor? Que nada. Como você se machucou por causa de um erro nosso, só queremos ajudar na sua recuperação, entende?"
1703-83 = "Só que... minha injeção dói um pouquinho. Esteja preparado, tá bom...?"
1703-90 = "Hii!? E-eu estava errado! Por favor, só não me faça sentir dor...#nEu te imploro, me perdoa!"
1703-91 = "O Fantasma do andar vazio"
